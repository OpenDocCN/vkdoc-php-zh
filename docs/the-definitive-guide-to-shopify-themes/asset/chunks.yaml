  trans: '

    ### 商品集合页的设计目标


    优秀的商品集合页应达成三个关键设计目标：


    -   为用户呈现当前集合中商品（或通过当前筛选条件匹配的商品）的清晰概览。

    -   为用户提供充足的商品信息，使其能够判断是否对特定商品感兴趣。

    -   为用户提供易用的导航和筛选工具，以便他们能够优化商品列表，更精准地匹配自身兴趣。


    商品集合页通常被视为顾客初次访问网站到进入商品详情页之间的“垫脚石”，顾客在详情页将商品加入购物车并最终完成购买。然而，不应低估它们在帮助顾客通过视觉和信息对比来选择感兴趣商品方面的重要作用。


    由于 Shopify 中的商品集合可以关联自身的图片和文本内容，商品集合页还能通过提供针对顾客可能搜索的关键词类型的内容，在店铺的搜索引擎优化（SEO）中发挥重要作用（见图
    [6-7]）。对于某些类型的店铺，商品集合页甚至更为重要，因为预期顾客能在此获得足够信息，无需访问商品详情页即可直接将商品加入购物车（见图 [6-8]）。


    ![A437216_1_En_6_Fig8_HTML.jpg](img/A437216_1_En_6_Fig8_HTML.jpg)


    **图 6-8**


    Youfoodz 期望顾客直接从“午餐与晚餐”集合页将单个商品（餐食）加入购物车。请注意，他们在每份餐食下方提供了一个形似“加号”按钮的操作提示，并且顾客如果需要在做出购买决定前获取更多信息，仍可以深入查看单个餐食的详细信息。


    ![A437216_1_En_6_Fig7_HTML.jpg](img/A437216_1_En_6_Fig7_HTML.jpg)


    **图 6-7**


    《纽约时报》“畅销书”集合包含一些集合专属的文本内容，旨在为顾客提供其所查看集合的上下文信息，并帮助搜索引擎将“纽约时报畅销书”等搜索词直接导向此页面。


    我将在本章后续部分，随着对集合页各功能实现的逐步讲解，更详细地讨论这些设计目标。


    ### Shopify 商品集合页概念


    在开始着手实现一个满足上述设计目标的商品集合页之前，有必要先概览一些关键的主题集合概念，并理解 Shopify 期望如何对商品进行分类和导航。


    #### Shopify 中的分类


    在 Shopify 之外，电子商务系统通常拥有“嵌套式分类”结构，商品可被分配到一个或多个存在于多层级体系中的分类。Shopify 的层级结构则扁平得多——商品可以属于零个或多个商品集合，且没有固有的子分类概念。商品集合分为两种类型：**手动集合**（也称为自定义集合），由店主手动分配商品成员；以及**智能集合**，其成员由一组规则决定（例如，“类型为‘衬衫’的商品”）。


    进一步的商品分类可以通过商品标签实现（稍后在“筛选”部分讨论）。我见过很多尝试使用嵌套导航列表或通过句柄和标签名链接的集合，在 Shopify 主题中塞入更复杂分类结构的做法，但总的来说，我认为最好坚持使用
    Shopify 的基本概念。如果商家拥有的产品系列需要更复杂的分类方法，那么研究一个专门构建的搜索和筛选应用程序是值得的，Shopify 应用商店中有大量此类应用。


    #### 筛选


    如上述所暗示的，Shopify 允许我们通过使用商品标签进一步细化集合中展示的商品。商家可以从 Shopify 后台为商品添加任意数量的标签，将标签名称追加到集合页面的
    URL 末尾，将仅显示带有相应标签的商品。


    例如，在 Shopify 店铺中访问 `/collections/shirts/blue` 将显示“衬衫”集合中所有标记为“蓝色”的商品。标签的常见用途包括颜色、尺寸、性别、商品类型、“促销中”或“库存有限”标记，等等。


    虽然你可以按多个标签进行筛选（例如 `/collections/shirts/blue+large`），但需要注意筛选是以合取方式应用的（在此例中，意味着仅显示同时标记了“蓝色”和“大号”的商品）。无法使用标签应用范围筛选（例如，“价格在
    100 到 200 美元之间”）或析取逻辑（例如，“蓝色”或“红色”）。


    #### 排序


    Shopify 提供了几个常用属性，你可以根据它们对展示的商品集合进行排序（“A-Z”、“Z-A”、“价格：从低到高”、“价格：从高到低”、“畅销商品”等）。所需的排序顺序可以通过
    URL 中的 `sort_by` 查询参数传递——例如 `/collections/shirts?sort_by=price-ascending`。


    商家可以从 Shopify 后台设置集合中商品的默认排序顺序，但目前无法在不使用第三方应用程序的情况下定义自定义排序属性。


    #### 分页


    Shopify 还支持在集合 URL 中使用 `page` 查询参数（`/collections/shirts?page=3`）。要使用分页功能，你需要使用
    `{% paginate %}` 标签包裹在集合中遍历商品的 Liquid 代码，你很快就会看到。


    目前，Shopify 在对集合进行分页时，每页商品数量上限为 50 件。


    #### 视图


    与商品模板类似，我们也可以为商品集合页创建备选商品模板，并通过使用 `view` 查询参数在它们之间切换（如需回顾其工作原理，请参阅第 [5] 章的“创建备选页面模板”）。


    在商品集合页的上下文中，备选模板在允许顾客切换集合的不同视图（例如列表视图与网格视图）时非常有用。我将在即将进行的实现阶段中讨论何时以及为何可能需要这样做。


    #### 整合所有要素


    图 [6-9] 将所有商品集合 URL 参数整合在一起，并展示了每个参数的作用。


    ![A437216_1_En_6_Fig9_HTML.jpg](img/A437216_1_En_6_Fig9_HTML.jpg)


    **图 6-9**


    生成商品集合 URL 时可用选项的分解说明


    因此，商品集合页的实现就变成了这样一个练习：（a）以对用户最有用的方式展示商品列表，以及（b）提供一个简单的用户界面，使用户能够通过生成和操作商品集合 URL
    在商品系列中进行导航。


    ### 实现商品集合页


    正如商品模板位于 `templates/product.liquid`，Shopify 用于渲染商品集合页的模板位于 `templates/collection.liquid`，这也是本章余下部分的重点。与商品页和首页一样，起点将是一个“原型”商品集合页布局，如图
    [6-10] 所示。


    ![A437216_1_En_6_Fig10_HTML.jpg](img/A437216_1_En_6_Fig10_HTML.jpg)


    **图 6-10**


    显示我们在此示例主题中将要实现的商品集合页布局的线框图


    如您所见，我们将致力于实现前面讨论过的商品集合页的所有关键功能——排序、备选视图样式的支持、分类级别筛选、标签级别筛选以及分页。让我们开始吧！

    '
- fmt: "### Adding a Product Loop with Pagination\n\nTo start off with, we’ll add\
    \ some initial code (see Listing [6-5](#A437216_1_En_6_Chapter.html#Par63)) to\
    \ `templates/collection.liquid` to perform the most crucial of functions—listing\
    \ products.\n\n```\n{{ collection.title | escape }}\n\n{%- paginate collection.products\
    \ by 12 -%}\n\n{%- for product in collection.products -%}\n{%- include 'product'\
    \ -%}\n{%- endfor -%}\n{%- if paginate.pages > 1 -%}\n{{ paginate | default_pagination\
    \ }}\n{%- endif -%}\n\n{%- endpaginate -%}\n\nListing 6-5\nBasic Collection Page\
    \ that Lists and Paginates Products\n```\n\nThe key points to note in Listing\
    \ [6-5](#A437216_1_En_6_Chapter.html#Par63) is the product loop (`{%- for product\
    \ in collection.products -%}`), which iterates over the products in the collection\
    \ and uses the product snippet created earlier to render the product itself (`{%\
    \ include 'product' %}`). The products available in this iteration loop are controlled\
    \ by the `{% paginate %}` Liquid tag that wraps the loop. As you can see, I’ve\
    \ chosen initially to paginate the collection in groups of 12. Twelve, eighteen,\
    \ or twenty-four products per page is a common choice for listing pages, as they\
    \ have a number of divisors that make it easier to create responsive layouts.\
    \ In this example, with 12 products per page, we can display four across on larger\
    \ desktop screens, three across on tablets and other smaller devices, and perhaps\
    \ two across on mobile devices.\n\nThe other “new” thing we’ve introduced is the\
    \ `{{ paginate | default_pagination }}` tag at the bottom of the page. As its\
    \ name suggests, this handy Liquid helper takes the information present in the\
    \ `paginate` variable (current page, total number of products, etc.) and renders\
    \ it as a simple set of links that allows users to move through each page of the\
    \ collection. You can see how these links look, along with the rest of the initial\
    \ implementation, in Figure [6-11](#A437216_1_En_6_Chapter.html#Fig11).\n\n![A437216_1_En_6_Fig11_HTML.jpg](A437216_1_En_6_Fig11_HTML.jpg)\n\
    \n**Figure 6-11**  \nThe initial implementation of the collection page (left),\
    \ with a detail view of the pagination links rendered at the bottom of the initial\
    \ page of 12 products (right)\n\n### Adding Sort Functionality\n\nNext, we’ll\
    \ add support for sorting the collection using any of the predefined methods supported\
    \ by Shopify. To do this, we’re going to add a dropdown control in the left column\
    \ of the collection template and populate it with a list of possible sorting mechanisms.\
    \ In order to start with a JavaScript-free solution to begin with, we wrap all\
    \ of our collection controls inside a `<form>` element and require the user to\
    \ submit that form in order to apply their selected sort option.\n\nLet’s see\
    \ what that looks like for the collection template in Listing [6-6](#A437216_1_En_6_Chapter.html#Par68).\n\
    \n```\n{{ collection.title | escape }}\n\n{%- assign current_sort_by = collection.sort_by\
    \ | default: collection.default_sort_by  -%}\nSort by...\n\nFeatured\nPrice: Low\
    \ to High\nPrice: High to Low\nA-Z\nZ-A\nOldest to Newest\nNewest to Oldest\n\
    Best Selling\n\nUpdate\n\n{%- paginate collection.products by 12 -%}\n\n{%- for\
    \ product in collection.products -%}\n{%- include 'product' -%}\n{%- endfor -%}\n\
    {%- if paginate.pages > 1 -%}\n{{ paginate | default_pagination | replace: '&laquo;\
    \ Previous', '&larr;' | replace: 'Next &raquo;', '&rarr;' }}\n{%- endif -%}\n\n\
    {%- endpaginate -%}\n\nListing 6-6\nThe Collection Template Once We’ve Added Sorting\
    \ Controls\n```\n\nThe addition of this code results in a dropdown select being\
    \ rendered on the collection page. Users are able to select a sort method and\
    \ submit the form by clicking **Update**. They are then redirected to the same\
    \ collection URL but with the appropriate `sort_by` query parameter set (thanks\
    \ to the `method=\"get\"` attribute on the form wrapping the new controls, which\
    \ sends the user to a new URL based on the form input on submission, rather than\
    \ “posting” it to the server). You can view the result in Figure [6-12](#A437216_1_En_6_Chapter.html#Fig12).\n\
    \n![A437216_1_En_6_Fig12_HTML.jpg](A437216_1_En_6_Fig12_HTML.jpg)\n\n**Figure\
    \ 6-12**  \nThe addition of a sorting control in the left column of the collection\
    \ page\n\nYou may wonder why I’ve implemented this wrapping `<form>` pattern,\
    \ rather than, say, adding a JavaScript event handler to the `change` event on\
    \ the `<select>` element and updating the collection URL directly, which would\
    \ arguably be less work for the user than having to make a sort selection and\
    \ submit the form.\n\nI am taking this approach for a couple of reasons. As discussed\
    \ back in Chapter [3](#A437216_1_En_3_Chapter.html), building functionality that\
    \ doesn’t rely on JavaScript helps page load times, as well as keeping the site\
    \ usable in situations where JavaScript breaks or hasn’t yet had the chance to\
    \ load. Furthermore, keeping a focus on the fundamental components tends to result\
    \ in simpler, easier-to-manage design patterns. You’ll see this toward the end\
    \ of this chapter, when we use progressive enhancement to add a JavaScript layer\
    \ over the top of the existing, simple, form-based controls. I think you’ll be\
    \ surprised at how little additional code we need to implement “dynamic” user\
    \ interface patterns when we’re starting from solid foundations."
  raw: '#### Adding a Product Loop with Pagination


    To start off with, we’ll add some initial code (see Listing [6-5](#A437216_1_En_6_Chapter.html#Par63))
    to `templates/collection.liquid` to perform the most crucial of functions—listing
    products.


    ```

    {{ collection.title | escape }}


    {%- paginate collection.products by 12 -%}


    {%- for product in collection.products -%}

    {%- include ''product'' -%}

    {%- endfor -%}

    {%- if paginate.pages > 1 -%}

    {{ paginate | default_pagination }}

    {%- endif -%}


    {%- endpaginate -%}


    Listing 6-5

    Basic Collection Page that Lists and Paginates Products

    ```


    The key points to note in Listing [6-5](#A437216_1_En_6_Chapter.html#Par63) is
    the product loop `({%- for product in collection.products -%}`), which iterates
    over the products in the collection and uses the product snippet created earlier
    to render the product itself (`{% include ''product'' %}`). The products available
    in this iteration loop are controlled by the `{% paginate %}` Liquid tag that
    wraps the loop. As you can see, I’ve chosen initially to paginate the collection
    in groups of 12\. Twelve, eighteen, or twenty-four products per page is a common
    choice for listing pages, as they have a number of divisors that make it easier
    to create responsive layouts. In this example, with 12 products per page, we can
    display four across on larger desktop screens, three across on tablets and other
    smaller devices, and perhaps two across on mobile devices.


    The other “new” thing we’ve introduced is the `{{ paginate | default_pagination
    }}` tag at the bottom of the page. As its name suggest, this handy Liquid helper
    takes the information present in the paginate variable (current page, total number
    of products, etc.) and renders it as a simple set of links that allows users to
    move through each page of the collection. You can see how these links look, along
    with the rest of the initial implementation, in Figure [6-11](#A437216_1_En_6_Chapter.html#Fig11).


    ![A437216_1_En_6_Fig11_HTML.jpg](A437216_1_En_6_Fig11_HTML.jpg)


    Figure 6-11


    The initial implementation of the collection page (left), with a detail view of
    the pagination links rendered at the bottom of the initial page of 12 products
    (right)


    #### Adding Sort Functionality


    Next, we’ll add support for sorting the collection using any of the predefined
    methods supported by Shopify. To do this, we’re going to add a dropdown control
    in the left column of the collection template and populate it with a list of possible
    sorting mechanisms. In order to start with a JavaScript-free solution to begin
    with, we wrap all of our collection controls inside a `<form>` element and require
    the user to submit that form in order to apply their selected sort option.


    Let’s see what that looks like for the collection template in Listing [6-6](#A437216_1_En_6_Chapter.html#Par68).


    ```


    {{ collection.title | escape }}


    {%- assign current_sort_by = collection.sort_by | default: collection.default_sort_by  -%}

    Sort by...


    Featured

    Price: Low to High

    Price: High to Low

    A-Z

    Z-A

    Oldest to Newest

    Newest to Oldest

    Best Selling


    Update


    {%- paginate collection.products by 12 -%}


    {%- for product in collection.products -%}

    {%- include ''product'' -%}

    {%- endfor -%}

    {%- if paginate.pages > 1 -%}

    {{ paginate | default_pagination | replace: ''&laquo; Previous'', ''&larr;'' |
    replace: ''Next &raquo;'', ''&rarr;'' }}

    {%- endif -%}


    {%- endpaginate -%}


    Listing 6-6

    The Collection Template Once We’ve Added Sorting Controls

    ```


    The addition of this code results in a dropdown select being rendered on the collection
    page. Users are able to select a sort method and submit the form by clicking Update.
    They are then redirected to the same collection URL but with the appropriate `sort_by`
    query parameter set (thanks to the `method="get"` attribute on the form wrapping
    the new controls, which sends the user to a new URL based on the form input on
    submission, rather than “posting” it to the server). You can view the result in
    Figure [6-12](#A437216_1_En_6_Chapter.html#Fig12).


    ![A437216_1_En_6_Fig12_HTML.jpg](A437216_1_En_6_Fig12_HTML.jpg)


    Figure 6-12


    The addition of a sorting control in the left column of the collection page


    You may wonder why I’ve implemented this wrapping `<form>` pattern, rather than,
    say, adding a JavaScript event handler to the change event on the `<select>` element
    and updating the collection URL directly, which would arguably be less work for
    the user than having to make a sort selection and submit the form.


    I am taking this approach for a couple of reasons. As discussed back in Chapter
    [3](#A437216_1_En_3_Chapter.html), building functionality that doesn’t rely on
    JavaScript helps page load times, as well as keeping the site usable in situations
    where JavaScript breaks or hasn’t yet had the chance to load. Furthermore, keeping
    a focus on the fundamental components tends to result in simpler, easier-to-manage
    design patterns. You’ll see this toward the end of this chapter, when we use progressive
    enhancement to add a JavaScript layer over the top of the existing, simple, form-based
    controls. I think you’ll be surprised at how little additional code we need to
    implement “dynamic” user interface patterns when we’re starting from solid foundations
    .'
  trans: "\n### 添加带分页的商品循环\n\n首先，我们在 `templates/collection.liquid` 中添加一些初始代码（见列表 6-5），以实现最关键的功能——列出商品。\n\
    \n```\n{{ collection.title | escape }}\n\n{%- paginate collection.products by\
    \ 12 -%}\n\n{%- for product in collection.products -%}\n{%- include 'product'\
    \ -%}\n{%- endfor -%}\n{%- if paginate.pages > 1 -%}\n{{ paginate | default_pagination\
    \ }}\n{%- endif -%}\n\n{%- endpaginate -%}\n\n列表 6-5\n用于列出和分页商品的基础集合页面\n```\n\n\
    列表 6-5 中需要关注的重点是商品循环（`{%- for product in collection.products -%}`），它会遍历集合中的商品，并使用之前创建的商品代码片段来渲染商品本身（`{%\
    \ include 'product' %}`）。此迭代循环中可用的商品由包裹该循环的 `{% paginate %}` 的 Liquid 标签控制。如您所见，我最初选择按每组\
    \ 12 个对集合进行分页。每页显示 12、18 或 24 个商品是列表页面的常见选择，因为它们具有许多约数，从而更容易创建响应式布局。在此示例中，每页显示\
    \ 12 个商品，我们可以在较大的桌面屏幕上每行显示四个，在平板电脑和其他较小设备上每行显示三个，而在移动设备上也许每行显示两个。\n\n我们引入的另一项“新”内容是页面底部的\
    \ `{{ paginate | default_pagination }}` 标签。顾名思义，这个方便的 Liquid 辅助工具会获取 `paginate`\
    \ 变量中的信息（当前页面、商品总数等），并将其渲染为一组简单的链接，允许用户浏览集合的每一页。您可以在图 6-11 中看到这些链接的样式，以及初始实现的其余部分。\n\
    \n![A437216_1_En_6_Fig11_HTML.jpg](img/A437216_1_En_6_Fig11_HTML.jpg)\n\n**图 6-11**\
    \  \n集合页面的初始实现（左），以及在初始 12 个商品页面底部渲染的分页链接的详细视图（右）\n\n### 添加排序功能\n\n接下来，我们将添加对集合进行排序的支持，使用\
    \ Shopify 支持的任意预定义排序方式。为此，我们将在集合模板的左列中添加一个下拉控件，并用一系列可能的排序机制填充它。为了从无 JavaScript\
    \ 的解决方案开始，我们将所有集合控件包裹在一个 `<form>` 元素内，并要求用户提交该表单以应用所选排序选项。\n\n让我们看看列表 6-6 中集合模板的效果。\n\
    \n```\n{{ collection.title | escape }}\n\n{%- assign current_sort_by = collection.sort_by\
    \ | default: collection.default_sort_by  -%}\n排序方式...\n\n精选\n价格：从低到高\n价格：从高到低\n\
    字母顺序 A-Z\n字母顺序 Z-A\n从旧到新\n从新到旧\n最畅销\n\n更新\n\n{%- paginate collection.products\
    \ by 12 -%}\n\n{%- for product in collection.products -%}\n{%- include 'product'\
    \ -%}\n{%- endfor -%}\n{%- if paginate.pages > 1 -%}\n{{ paginate | default_pagination\
    \ | replace: '&laquo; Previous', '&larr;' | replace: 'Next &raquo;', '&rarr;'\
    \ }}\n{%- endif -%}\n\n{%- endpaginate -%}\n\n列表 6-6\n添加排序控件后的集合模板\n```\n\n添加此代码后，集合页面上会渲染出一个下拉选择框。用户能够选择排序方式，并点击**更新**按钮提交表单。然后，他们会被重定向到同一个集合\
    \ URL，但会带有相应的 `sort_by` 查询参数（这得益于包裹新控件的表单上的 `method=\"get\"` 属性，该属性会根据提交时的表单输入将用户发送到一个新的\
    \ URL，而不是将数据“发布”到服务器）。您可以在图 6-12 中查看结果。\n\n![A437216_1_En_6_Fig12_HTML.jpg](img/A437216_1_En_6_Fig12_HTML.jpg)\n\
    \n**图 6-12**  \n在集合页面左列添加排序控件\n\n您可能会疑惑，为什么我选择实现这种包裹 `<form>` 的模式，而不是（比如说）向 `<select>`\
    \ 元素的 `change` 事件添加一个 JavaScript 事件处理程序，并直接更新集合 URL？对于用户来说，后者可能比必须选择排序方式并提交表单更省事。\n\
    \n我采用这种方法有几个原因。正如在第 3 章中讨论过的，构建不依赖 JavaScript 的功能有助于加快页面加载时间，并在 JavaScript 出错或尚未加载的情况下保持网站可用。此外，专注于基础组件往往能产生更简单、更易于管理的设计模式。您将在本章末尾看到这一点，届时我们将使用渐进增强技术，在现有简单的基于表单的控件之上添加一个\
    \ JavaScript 层。我想，当您看到基于坚实的基础开始实现“动态”用户界面模式时，需要的额外代码竟然如此之少，您会感到惊讶。\n"
- fmt: '### Alternative Views of Product Listings


    As discussed, one of the primary goals of collection page design is to allow customers
    to effectively get a sense of the range of products in the current collection,
    as well as being able to compare specific products without having to drill down
    to the product page level.


    The best way to allow customers to do this often depends on the type of product
    being sold and the context of the customer. A classic illustration of this is
    the decision on whether to display your products in a “grid” (how the example
    theme currently lists products) or as a “list” (with one item per row).


    Conventional wisdom suggests that a grid view is most appropriate when:


    - The appearance of the products is more important than information about the
    products.

    - The products being presented are visually distinct from one another.

    - Customers are less likely to be making direct comparisons between the products
    on display.

    - Customers are more likely to be browsing than searching for a specific product.


    The corollary to that is that list views are therefore more appropriate when:


    - Information about the products is more important than the appearance of the
    products.

    - The products being presented are visually similar or identical.

    - Customers are likely to want to compare the products on display.

    - Customers are likely to be searching for a specific product.


    A good example of the first scenario would be a “What’s New” collection for a
    clothing store. It’s likely to contain completely different types of clothing
    (scarves, hats, and jackets) and customers will probably be browsing through without
    a specific goal in mind. In general, stores selling inventory where the visual
    appearance of the product is crucial are more likely to use a grid view (see Figure
    [6-13](#A437216_1_En_6_Chapter.html#Fig13)).


    ![A437216_1_En_6_Fig13_HTML.jpg](A437216_1_En_6_Fig13_HTML.jpg)


    Figure 6-13


    Fashion stores and others with a strong visual element to their products often
    use grid views


    The converse example would be the “LCD Television” listing in an electronics store.
    Televisions all look quite similar—the important things are the specifications
    (size, contrast, and features), and customers are likely to want to compare two
    or more options. Where the product details are more important, a list view is
    more likely to be used (see Figure [6-14](#A437216_1_En_6_Chapter.html#Fig14)).


    ![A437216_1_En_6_Fig14_HTML.jpg](A437216_1_En_6_Fig14_HTML.jpg)


    Figure 6-14


    Stores with lots of technical information or where comparison is important often
    use a list view


    It’s reasonably common for Ecommerce sites to offer the ability to switch between
    the two types of views. Adding this sort of functionality is extra work, but can
    be useful if:


    - You’re uncertain about the types of product the theme you’re designing will
    offer (common if you’re building a theme for sale to multiple merchants).

    - You have some product collections that are more suited to a grid view, and some
    that are more suited to a list view.

    - You have large collections where a customer may want to narrow down their choices
    visually with a grid view before comparing a selection of products in a list view.


    I’m always an advocate for keeping things simple and reducing the cognitive overhead
    of user interfaces, so if you think your collection page can do its job with only
    a grid view or only a list view, I’d stick with that. If you do feel the need
    to offer a choice between the views, make sure to add theme options (see Chapter
    [8](#A437216_1_En_8_Chapter.html)) to allow storeowners to turn each view on or
    off, as well as set the default view type.


    You should also take some time to consider how the information you’re displaying
    to customers may change depending on the view type. If we consider the classic
    case where a grid view is used primarily for browsing, then “top-level” information
    like the product’s appearance, title, and price is probably sufficient for a user
    to know if they’d like to investigate further. List views are often more information-dense
    so that customers can conduct more thorough comparisons from the collection page
    (see Figure [6-15](#A437216_1_En_6_Chapter.html#Fig15)).


    ![A437216_1_En_6_Fig15_HTML.jpg](A437216_1_En_6_Fig15_HTML.jpg)


    Figure 6-15


    The Kershaw knives site displays only the product image, title, and price in the
    grid view


    Changing to the list view exposes more detailed information like component materials
    and blade specifications. This makes comparison easier, although the size of the
    product images in the list view makes comparison of more than two products at
    a time difficult.'
