  \ `PHP` – 高效优化与瓶颈检测” – Howard Yeend。[`www.puremango.co.uk/2010/04/fast-php/`](http://www.puremango.co.uk/2010/04/fast-php/)“优化\
  \ `PHP` 的指南” – `phpLens`。[`phplens.com/lens/php-book/optimizing-debugging-php.php`](http://phplens.com/lens/php-book/optimizing-debugging-php.php)\
  \ |\n\n### 9.22 长时间运行进程的稳定性与性能\n\n本章讨论的问题不仅影响性能，还会影响脚本的稳定性。这里的稳定性本质上指的是“崩溃”。`PHP`\
  \ 最初被设计为“用完即死”，即它更适合短时间运行的脚本，数分钟后仍在运行就已经是重大问题，更不用说数小时甚至数天后了。话虽如此，只要精心编程，你完全能够创建出几乎可以无限运行（通常是守护进程）的脚本。\n\
  \n设计稳定程序时需要考虑的关键领域包括：\n\n\n\n*   **资源超时**：已打开的资源（如数据库连接和网络套接字）可能会“消失”。导致这种情况的原因多种多样，例如所连接服务的“无活动”时限、网络故障、密码/凭据变更、会话时间/资源限制等等。你可能习惯于在脚本开头打开一个数据库连接，然后在需要运行\
  \ SQL 查询时直接使用该资源句柄。在 Web 环境下，这通常没问题——如果你能顺利连接到数据库，意味着在脚本运行期间发生问题的概率微乎其微。然而，当你的脚本需要运行数小时甚至数天时，出现故障的概率就会大大增加。针对这个问题，有几种处理策略：\n\
  \    *   仅在需要时打开连接，并立即关闭。这对于偶尔的连接是可以接受的，但对于那些连接开销会导致对时间敏感的脚本产生响应延迟的情况，就不那么适用了。\n\
  \    *   通过定期与服务交互（例如使用 `ticks`）来保持连接开放。对于你连接的服务运营商来说，这可能是不可接受的，而且你仍然需要检查是否因其他原因（例如网络故障）而断开连接，不过可以与定期连接同时进行，以减少在“真正”交互时需要重新连接的几率。\n\
  \    *   定期关闭并重新打开连接。这与上述策略有着相似的优缺点。\n    *   在每次尝试访问资源时检查连接状态。这通常是最安全的方式，能在需要时立即重新连接，尽管这通常需要你（程序员）付出更多努力。它还可以结合上述两种策略，以降低资源“消失”的几率，这对于时间敏感的响应脚本至关重要。\n\
  *   **内存过度消耗与内存泄漏**：如果你的脚本使用了过多内存，或者使用了会“泄漏”内存的函数或扩展，最终脚本将达到某个限制。这个限制可能是 PHP 配置中设定的（例如在\
  \ `php.ini` 中），也可能是机器本身可用内存的自然上限。无论哪种情况，这都会导致致命错误，使脚本停止运行。即使未达到这些限制，过度消耗导致系统（例如）开始将内存交换到磁盘，也可能导致整个系统变慢和不稳定（最终可能让用户强制重启）。持久存在的小量内存使用，例如在全局作用域中反复创建新变量（而不进行后续的\
  \ `unset`），或在函数内创建新的静态变量，即使在数小时的性能分析中可能也不明显。但是，经过数天、数周或数月，这些微小的内存占用累积起来，可能会导致意外的崩溃。因此，务必尽可能进行长时间的性能分析，并检视持久作用域中的内存使用情况（例如动态创建变量和函数）。\n\
  *   **致命错误处理**：PHP 有一系列处理错误的函数，但有少数几种错误类型无法在 PHP 内部处理。致命运行时错误（特别是 `E_ERROR`、`E_CORE_ERROR`、`E_COMPILE_ERROR`\
  \ 和 `E_USER_ERROR`）是不可恢复的，并且总会导致脚本退出。这些错误可能由多种原因引起，例如内存分配问题（内存不足）、缺少已命名的函数等。在 Web\
  \ 环境下，意外的瞬时 `E_ERROR`（例如系统临时内存不足）通常不是大问题，Web 用户只需在浏览器中点击刷新，下一次运行可能就会成功。但是，如果你的守护进程遇到了意外的\
  \ `E_ERROR`，那就“游戏结束”了，因为你的守护进程将完全停止运行。处理这些错误的策略包括：\n    *   更好的测试（例如全量单元测试），以确保这些错误不发生。\n\
  \    *   更好的资源管理，例如做好内存管理。更多信息请参阅本章其余部分！\n    *   在外部监督下运行。使用像 `supervisord` 这样的系统来监控守护进程，并在必要时重启它。这可以作为后备方案，但不能替代从根本上阻止致命错误发生的措施。\n\
  \nPHP 本身内部的内存泄漏和资源持续性问题有时更难解决，但在今天这些问题已经相当罕见，并且只要有可能，升级到现代版本绝对值得。现代版本更好的资源利用率和更高的性能，也能最大限度地减少你自身代码低效所带来的影响。\n\
  \n\n\n### 9.23 避免微观优化和过早优化\n\n既然我已经说服你考虑性能的必要性，并指导你掌握 PHP 中关于速度和资源管理的精细技巧，现在我打算劝说你将这些放到脑后，至少暂时如此。人们很容易陷入性能和优化的漩涡，并让其影响到你的工作流程和生产力。虽然在开发的所有阶段遵循良好实践并考虑代码性能通常是积极的，但过早优化往往就是“过早”，而微观优化通常也不值一提。\n\
  \n作为作者，我有一个令人尴尬的坦白。多年前我开始用 PHP 编程时，在字符串周围使用单引号和双引号之间的性能差异在某些情况下是可测量的（或者至少是“常识”），时至今日，我发现自己每次输入字符串时仍会不自觉地考虑使用哪种引号，这并非出于语法原因，而是出于性能考虑。尽管如今两者之间的性能差异绝对是极其、极其微小的。不过旧习难改，你在网上能找到的许多微观优化也属于类似情况。对代码进行性能分析，你很可能会发现，一次冗长的数据库调用所节省的时间，会让通过多次调用\
  \ `isset()` 检查变量（而不是使用 `@` 来简单地抑制警告）节省的时间显得微不足道（这并不是说没有其他充分的理由这么做！）。开发人员在编写和思考微观优化上所花费的时间，通常比执行未优化代码所用的额外处理器周期要昂贵得多。\n\
  \n过早优化通常发生在开发者还没让任何代码正常运行并部署之前，就开始考虑如何扩展代码的时候。为一个可能永远无法面世（因为项目超期且未能交付）的代码设计扩展方案毫无意义。除非你确定将要处理的客户/用户/数据量，否则更好的做法通常是先让某个东西运转起来（至少作为概念验证），然后在确定需要时再进行扩展。事实上，扩展方法很大程度上取决于你的代码具体需要做什么，而这通常在你有东西在运行之前是无法最终确定的。因此，即使你按时交付，与项目的最终功能实现方式相比，你的扩展努力也可能全部走错了方向。\n\
  \n“但是，但是，但是……”你可能会抗议，你的项目与众不同。也许确实如此，你可能足够幸运，能参与一个规模庞大、资金充足且具有明确高性能要求的项目，或者正在开发一个专门面向高性能用途的工具。恭喜你，你可以忽略本节内容（前提是你的水平已经到了阅读本书有用的程度！）。对于我们其他人（这涵盖了大多数\
  \ PHP 项目），请专注于先让代码运行并部署。在开发过程中牢记性能，但不要让它过度干扰你的工作流程。大多数项目失败的原因并非性能不佳。\n\n| ![提示信息](img/image00248.jpeg)\
  \ | **延伸阅读** 《PHP: Require/Include vs Autoloader》。这是一篇鼓吹一种肯定属于过早优化（甚至可能永远不值得做）的方法的文章示例。文章显示，在一个*重复执行\
  \ 100 次*函数的脚本中，你可以总共节省*整整 6 毫秒*。对大多数人来说，这根本不值一提，他们最多也只会调用几次，而且无论如何，6 毫秒完全不是一个需要关注的问题。\
  \ [`www.endyourif.com/php-requireinclude-vs-autoloader/`](http://www.endyourif.com/php-requireinclude-vs-autoloader/)\
  \ |\n|---|---|\n\n## 10. 分发与部署问题\n\n现在你已经编写出了完美的软件，你的用户正翘首以盼，希望将其交付并安装到他们宝贵的机器上。分发和部署软件会带来一系列新的难题，这些难题超出了你仅仅编写代码时所遇到的。本章涵盖了你思考软件部署和分发时可能遇到的一些问题，这些问题可能与\
  \ PHP 网站常见的将代码推送到自己服务器的情况有所不同。具体来说，我们探讨的是你分发软件后，软件不再受你直接控制、也不在你自己的系统上运行的场景。\n\n\n\
  \n### 10.1 错误处理和日志记录\n\n在使用 CLI SAPI 运行脚本时，您需要考虑如何处理和记录错误（及其他信息）。您可以使用 PHP 标准的错误处理函数，并允许\
  \ PHP 将错误记录到 `php.ini` 中 `error_log` 指定的文件。但请注意，您可能无法控制运行软件的用户，因此需要将日志记录到合适的位置，确保该用户拥有写入权限。\n\
  \n在 PHP 中，除了标准的“记录到文件”方法外，另一种选择是将错误和其他日志信息发送到系统的 `syslog`。在 Linux 系统中，这对应的是 `syslog(3)`（更多信息请参阅\
  \ `man syslog`），在 Windows 中则对应系统 `事件日志`。使用 `syslog` 有几个优点：\n\n*   几乎所有用户都有权限记录到系统日志（通常而言）。\n\
  *   无需管理日志轮转、截断、并发访问/文件锁定等其他例行任务。\n*   有大量用于浏览和操作系统日志的工具生态。\n*   对于系统守护进程和其他关键软件，系统管理员通常期望在系统日志中找到（至少是重要的）日志/错误信息。\n\
  *   在面向可扩展性设计的系统中，系统日志通常会被重定向到中央日志服务器/系统。将日志写入系统日志意味着您的软件无需更改任何代码，即可扩展到集中管理的日志服务器。\n\
  \n要自动将错误发送到系统日志，您只需在 `php.ini` 中将 `error_log` 设置为特殊字符串 `syslog` 而非文件名。您也可以在脚本内部通过\
  \ `ini_set('error_log', 'syslog')` 进行设置。如果要记录 PHP 自身错误之外的信息，或者您选择在内部处理 PHP 错误并需要随后手动记录这些错误，可以使用\
  \ `syslog()` 函数。`syslog()` 接受两个参数：一个优先级级别，以及要记录的消息。优先级级别范围从最低级别的调试消息 `LOG_DEBUG`\
  \ 到描述系统不可用错误的 `LOG_EMERG`。第二个参数是包含要记录消息的字符串。在调用 `syslog()` 之前，您需要先使用 `openlog()`\
  \ 打开到系统日志的连接。以下是一个简短的示例：\n\n```\n 1 <?\n\n3 # openlog 接受一个出现在日志中的“标识”（ident）如 ('mysoftware')，用于帮助您快速过滤自己的软件，\n\
  \ 4 # 一组用“或”运算组合的选项（我们使用 LOG_PERROR 来同时将日志打印到 STDERR，\n 5 # 以及使用 LOG_PID 将进程 ID\
  \ 包含在日志中），\n 6 # 以及一个“设施”（facility）来指定记录日志的软件类型（在 Windows 中仅 LOG_USER 有效，\n 7 #\
  \ 在 Linux 中可以使用 LOG_DAEMON、LOG_AUTH 等）。\n\n10 openlog('mysoftware', LOG_PERROR |\
  \ LOG_PID, LOG_USER);\n\n12 # 我们将记录一个“通知”（notice），即常规的值得注意的消息\n\n14 syslog(LOG_NOTICE,\
  \ 'Script started. All running smoothly.');\n\n16 # 然后，当情况失控时，我们将升级到警报级别（alert level）的消息。\n\
  \n19 syslog(LOG_ALERT, 'BACON ALERT! Script has run out of bacon!. OMG.');\n\n21\
  \ # 最后，由于没有更多消息需要记录，我们可以关闭日志。如果我们在 php.ini 中将 syslog\n22 # 指定为错误消息的位置，那么这些错误消息会继续被记录，\n\
  23 # 这里关闭的仅仅是我们用于记录自定义消息的通道。\n26 closelog();\n```\n\n如果在终端中运行此脚本，您将看到消息被打印到 STDERR（通常回到命令行）。然后，如果您查看系统日志（在\
  \ Linux 上，通常可以通过 `tail /var/log/syslog` 查看），您应该会看到类似以下的两条记录：\n\n```\n1 Oct  4 19:44:46\
  \ dev-machine mysoftware[6205]: Script started. All running sm\\\n2 oothly.\n3 Oct\
  \  4 19:44:46 dev-machine mysoftware[6205]: BACON ALERT! Script has run ou\\\n4\
  \ t of bacon!.\n```\n\n在 Windows 中，您可以使用事件查看器工具来查看日志，通常位于 `开始->控制面板->系统和维护->管理工具->事件查看器`。\n\
  \n下面列出了一些其他的日志工具以及此领域的进一步阅读资料。\n\n| ![](img/image00249.gif) | **替代 PHP 监控器 (Alternative\
  \ PHP Monitor)** |\n| --- | --- |\n| | 收集错误事件并将其存储在本地 SQLite 数据库中 |\n| | **主要网站**:\
  \ [`code.google.com/p/peclapm/`](http://code.google.com/p/peclapm/) |\n| | **主要文档与安装信息**:\
  \ [`code.google.com/p/peclapm/w/list`](http://code.google.com/p/peclapm/w/list)\
  \ |\n\n| ![information](img/image00248.jpeg) | **进一步阅读**关于使用日志服务器 (Graylog2) 进行\
  \ PHP 日志记录的文章 [`jeremycook.ca/2012/10/02/turbocharging-your-logs/`](http://jeremycook.ca/2012/10/02/turbocharging-your-logs/)Mark\
  \ van der Velden 的“日志记录最佳实践” [`blog.dynom.nl/archives/Logging-best-practices_20120304_63.html`](http://blog.dynom.nl/archives/Logging-best-practices_20120304_63.html)\
  \ |\n\n### 10.2 安装程序与文件打包\n\n在第 3 章中，我们探讨了运行 PHP 的不同方式，但在运行 PHP 脚本之前，您需要将它们（以及任何相关资源）部署到目标机器上。通用的软件安装程序系统广泛可用，并且许多平台都有自己文档完善的软件仓库和打包系统，因此我们在此不再详细讨论（不过我们会在章节末尾提及几个优秀的开源方案）。取而代之，我们将介绍几个\
  \ PHP 特有的打包文件和资源以便分发和安装的选项。\n\n### 10.3 PHP 脚本末尾的内嵌数据文件\n\n如果我们只需要在 PHP 脚本中包含一块数据，可以使用\
  \ PHP 5.1 引入的语言结构：`__halt_compiler()` 指令。简单来说，将其放在 PHP 脚本末尾，之后您就可以放置任何内容（文本字符串、二进制数据、另一个\
  \ PHP 脚本等）。当 PHP 执行到 `__halt_compiler()` 这一行时，它会像遇到文件末尾一样直接停止。这意味着其后的内容不会被执行，也不会引发任何语法错误或类似问题。您的脚本可以通过打开一个指向自身文件句柄，并定位到\
  \ `__COMPILER_HALT_OFFSET__` 常量（当存在 `__halt_compiler()` 指令时自动创建）来访问后续数据。以下示例展示了如何从\
  \ PHP 文件中“解包”一个文本文件。\n\n```\n 1 <?\n\n3 # 使用魔术常量 __FILE__ 打开一个指向本文件的指针\n\n 5 $thisfile\
  \ = fopen(__FILE__, 'r');\n\n 7 # 将指针定位到 __halt_compiler(); 指令之后的第一个字节。\n 8 # 该位置存储在自动创建的\
  \ __COMPILER_HALT_OFFSET__ 常量中。\n\n11 fseek($thisfile, __COMPILER_HALT_OFFSET__);\n\
  \n13 # 让我们获取之后的所有内容 ...\n\n15 $ourtext = stream_get_contents($thisfile);\n\n17 #\
  \ 并将其写入到一个新文件中。\n\n19 file_put_contents('textfile.txt', $ourtext);\n\n21 # 我们的脚本在这里停止。\n\
  \n23 __halt_compiler();附加内容从这里开始。\n\n25 这是一个文本文件。\n26 如果这段文本被直接转储到 PHP 文件中，通常会导致\
  \ PHP 致命语法错误。\n```\n\n如果运行此脚本，然后查看生成的 `textfile.txt` 文件，您会看到它包含了我们脚本的剩余部分，从 `附加内容从这里开始。`\
  \ 这一行开始。\n\n虽然我们在书中为了便于展示而使用了纯文本，但这并不妨碍您添加二进制文件、PHP 文件，甚至包含多个文件的 tar/zip 归档文件，您的脚本可以保存并解压这些文件。但是，如果您打算包含多个文件或大量数据，可能需要考虑接下来讨论的\
  \ Phar 格式选项。\n\n\n\n### 10.4 Phar 可执行包\n\nPhar 包是一种原生的 PHP 方式，用于将大量文件（包括 PHP 代码和辅助数据文件）整合到一个文件中以便分发。Phar\
  \ 包核心上是一个 zip 文件、tar 文件或自定义的 phar 格式文件。你可以像处理普通文件一样，在不解包的情况下，使用 `phar` 流封装器访问包中的各个文件。例如，如果你有一个名为\
  \ `mybundle.phar` 的包，你可以这样做：\n\n```\n 1 <?\n 2 include('phar://home/rob/mybundle.phar/sample.php');\n\
  \n 4 # 或者\n\n 6 $data = file_get_contents('phar://home/rob/mybundle.phar/data.csv');\n\
  \n 8 # 或者\n\n10 $resource = 'phar://home/rob/mybundle.phar/images/cat.jpg';\n11\
  \ $fp = fopen($resource, 'rb');\n12 header(\"Content-Type: image/jpeg\");\n13 header(\"\
  Content-Length: \" . filesize($resource));\n14 fpassthru($fp);\n```\n\n请注意，与独立文件相比，访问\
  \ phar 中的文件会有轻微的开销，但在大多数应用中这种开销小到可以忽略不计。以这种方式使用 Phar 非常适合轻松部署支持文件，并且可以使用现有的 zip/tar\
  \ 识别程序以及 PHP 来打开和管理它们。然而，它仍然需要你至少部署一个 PHP 脚本来访问 phar 文件并控制整个过程，并且需要启用 Phar 扩展才能访问它们。具有自定义\
  \ phar 格式（而非 zip 或 tar 格式）的 Phar 包还有一些独门技巧，可以消除这些需求。\n\n使用自定义 phar 格式，你可以指定 PHP\
  \ “存根（stub）” 代码。这个存根代码允许你直接执行 phar 文件，就像它是一个标准的 PHP 文件一样。这意味着在命令行中，你可以执行类似 `php\
  \ mybundle.phar -x something -l something-else` 的操作来运行你的应用程序。它还可以让 PHP 将该文件识别为标准\
  \ PHP 文件，从而无需 phar 扩展可用。设置好正确的文件关联后，你甚至可以像标准 PHP 脚本一样，让 phar 文件自行执行（见第 2 章）。存根代码仅仅充当\
  \ PHP 的入口点，告诉它从哪里开始，通常只是一个针对包中主 PHP 脚本的 `require()` 语句。即使有了存根代码，外部脚本仍然可以使用 `phar://`\
  \ 流封装器来访问 phar 文件，因此它可以同时作为可执行包和简单的文件集合。自定义 phar 格式唯一真正的缺点是它只能由 PHP 本身创建（特别是使用 phar\
  \ 扩展）。而 zip 和 tar 变体则可以使用大多数第三方归档工具创建。\n\n| ![信息](img/image00248.jpeg) | **延伸阅读**“Phar:\
  \ PHP libraries included with a single file”教程，作者 Giorgio Sironi [`css.dzone.com/articles/phar-php-libraries-single-file`](http://css.dzone.com/articles/phar-php-libraries-single-file)PHP\
  \ 手册中的 Phar 文档\n[`www.php.net/manual/en/intro.phar.php`](http://www.php.net/manual/en/intro.phar.php)\
  \ |\n\n### 10.5 通用安装器\n\n以下是一些值得注意的开源通用安装器。它们可用于安装 PHP 本身以及与你的 PHP 应用程序一起的其他软件，并且当然可以用于部署和运行\
  \ phar 包（参见上一节）。\n\n| ![](img/image00249.gif) | ***WiX Toolset*** |\n|   |   |\n\
  |   | 用于创建 Windows .msi 和 .exe 安装器的综合工具集 |\n|   |   |\n|   | ***主站*** : [`wixtoolset.org/`](http://wixtoolset.org/)\
  \ |\n|   |   |\n|   | ***主要文档与安装信息*** : [`wixtoolset.org/documentation/manual/`](http://wixtoolset.org/documentation/manual/)\
