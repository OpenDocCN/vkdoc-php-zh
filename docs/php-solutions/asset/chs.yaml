- '# 1. 什么是 PHP——以及我为何要关心它？


  PHP 的官方全称是 PHP：超文本预处理器。这个拗口的名称给人一种印象，仿佛它只是极客或书呆子的专属。这完全是大错特错。几年前，在 PHP 通用邮件列表（[`http://news.php.net/php.general`](http://news.php.net/php.general)）上曾有过一场轻松有趣的讨论，建议将
  PHP 的全称改为"积极快乐的人们"或"相当快乐的程序员"。本书旨在帮助你实际运用 PHP——并在此过程中，让你理解究竟是什么让 PHP 程序员如此快乐。


  PHP 是一种脚本语言，它能通过以下方式让网站"活"起来：


  - 将网站上的反馈直接发送到你的邮箱

  - 通过网页上传文件

  - 从大图片生成缩略图

  - 读写文件

  - 动态显示和更新信息

  - 使用数据库来显示和存储信息

  - 使网站具备可搜索性

  - 还有更多……


  通过阅读本书，你将能够实现所有这些功能。PHP 易于学习；它不依赖特定平台，因此相同的代码可以在 Windows、Mac OS X 和 Linux 上运行，而且你开发
  PHP 所需的所有软件都是开源的，因此完全免费。


  在本章中，你将了解以下内容：


  - PHP 如何成长为动态网站最广泛使用的技术

  - PHP 如何让网页变得动态

  - PHP 学习起来有多难——或者多容易

  - PHP 是否安全

  - 编写 PHP 需要哪些软件


  ## PHP 的发展历程


  PHP 现在是创建动态网站最广泛使用的技术，但它始于 1995 年，当时的目标相当谦逊——而且名字也不同。它最初被称为个人主页工具（PHP Tools）。其主要目标之一是通过收集在线表单的信息并在网页上显示来创建一个留言簿。三年内，开发团队决定从名称中去掉"个人主页"，因为它听起来像是爱好者的玩物，无法体现此后添加的一系列复杂功能。


  PHP 多年来持续发展，不断添加新功能。根据 W3Techs（[`http://w3techs.com/technologies/details/pl-php/all/all`](http://w3techs.com/technologies/details/pl-php/all/all)）的数据，在其定期调查的
  1000 万个网站中，超过 80% 使用 PHP 来创建动态内容。它是驱动诸如 Drupal（[`http://drupal.org/`](http://drupal.org/)）、Joomla!（[`www.joomla.org`](http://www.joomla.org/)）和
  WordPress（[`http://wordpress.org/`](http://wordpress.org/)）等广受欢迎的内容管理系统（CMS）的语言。它同时驱动着一些访问量最高的网站，包括
  Facebook（[`www.facebook.com`](http://www.facebook.com/)）和 Wikipedia（[`www.wikipedia.org`](http://www.wikipedia.org/)）。


  不过，该语言的一大魅力在于，它始终不忘初心。PHP 的原始创建者拉斯马斯·勒德尔夫曾将其描述为"一种非常对程序员友好的脚本语言，既适合编程经验很少或完全没有经验的人，也适合需要快速完成工作的资深
  Web 开发人员"。你无需学习大量理论知识就能开始编写有用的脚本，同时又能确信自己正在使用一种有能力开发工业级应用的技术。


  注意


  在撰写本书时，当前版本是 PHP 5.6。本书中的代码假设你至少使用 PHP 5.4，该版本移除了几个过时的功能，例如"魔术引号"。如果你有虚拟主机方案，请确保服务器至少运行
  PHP 5.4。


  PHP 的下一个主要版本将被称为 PHP 7。决定跳过 PHP 6 是为了避免与一个因过于雄心勃勃而在 2010 年被放弃的版本混淆。本书的重点在于现在就能工作的代码，而不是那些可能在未来的某个不确定时间才能工作的东西。不过，我完全预期本书中的大部分（如果不是全部）代码和技术在
  PHP 7 中仍能继续工作。


  ## PHP 如何让页面变得动态


  PHP 最初被设计为嵌入在网页的 HTML 中，这也仍然是它通常的使用方式。例如，如果你想在版权声明中显示当前年份，可以在页脚中放入以下代码：


  ```

  <p>&copy; <?php echo date(''Y''); ?> PHP Solutions</p>

  ```


  在启用了 PHP 的 Web 服务器上，`<?php` 和 `?>` 标签之间的代码会被自动处理，并显示如下年份：


  ![A978-1-4842-0635-5_1_Figa_HTML.jpg](img/A978-1-4842-0635-5_1_Figa_HTML.jpg)


  这只是一个简单的例子，但它说明了使用 PHP 的一些优势：


  - 任何在元旦午夜钟声敲响后访问你网站的用户，都会看到正确的年份。

  - 日期由 Web 服务器计算，因此不受用户计算机时钟设置错误的影响。


  虽然像这样将 PHP 代码嵌入 HTML 很方便，但这样做很重复且容易导致错误。这也可能使你的网页难以维护，特别是当你开始使用更复杂的 PHP 代码时。因此，通常的做法是将大量动态代码存储在单独的文件中，然后使用
  PHP 从不同的组件来构建你的页面。这些单独的文件——通常称为包含文件——可以只包含 PHP、只包含 HTML，或者两者混合。


  举个简单的例子，你可以将网站导航菜单放在一个包含文件中，然后使用 PHP 将其包含在每个页面中。每当你需要对菜单进行任何更改时，只需编辑一个文件，即包含文件，这些更改就会自动反映在每个包含该菜单的页面中。想象一下，对于一个有几十个页面的网站来说，这能节省多少时间！


  对于普通的 HTML 页面，内容由 Web 开发人员在设计时确定并上传到 Web 服务器。当有人访问该页面时，Web 服务器只是简单地发送 HTML 和其他资源，如图片和样式表。这是一个简单的事务——浏览器发出请求，服务器发回固定内容。当你使用
  PHP 构建网页时，发生的事情要多得多。图 1-1 展示了这一过程。


  ![A978-1-4842-0635-5_1_Fig1_HTML.jpg](img/A978-1-4842-0635-5_1_Fig1_HTML.jpg)


  图 1-1. Web 服务器根据请求动态构建每个 PHP 页面


  当访问一个由 PHP 驱动的网站时，会触发以下一系列事件：


  1. 浏览器向 Web 服务器发送请求。

  2. Web 服务器将请求交给嵌入在服务器中的 PHP 引擎。

  3. PHP 引擎处理代码。在许多情况下，它可能还会在构建页面之前查询数据库。

  4. 服务器将完成后的页面发送回浏览器。


  这个过程通常只需要几分之一秒，因此访问 PHP 网站的访客几乎感觉不到任何延迟。因为每个页面都是单独构建的，PHP 网站可以对用户输入做出响应，在用户登录时显示不同的内容，或者显示数据库搜索的结果。


  ### 创建能够自主思考的页面


  PHP 是一种服务器端语言。PHP 代码保留在 Web 服务器上。处理完毕后，服务器只发送脚本的输出。通常这个输出是 HTML，但 PHP 也可以用来生成其他
  Web 语言，例如 JSON（JavaScript 对象表示法）。


  PHP 使你能够基于条件选择，将逻辑引入到网页中。一些决策是基于 PHP 从服务器收集的信息做出的：日期、时间、星期几、页面 URL 中的信息等等。如果是星期三，它会显示星期三的电视节目表。在其他时候，决策则基于用户输入，PHP
  会从在线表单中提取这些输入。如果你注册了某个网站，它会显示个性化信息——诸如此类。




  '
- '# PHP 的学习与使用难度如何？


  PHP 并不算什么高深学问，但别指望五分钟就能成为专家。新手面临的最大冲击或许是：`PHP` 对错误的容忍度远低于浏览器对待`HTML`。如果你在`HTML`中遗漏了结束标签，大多数浏览器仍能渲染页面。但如果在`PHP`中遗漏了闭合引号、分号或花括号，你就会看到像图
  1-2 那样毫不妥协的错误信息。这一点影响所有编程语言，如`JavaScript`和`C#`，而不仅仅是`PHP`。


  ![A978-1-4842-0635-5_1_Fig2_HTML.jpg](img/A978-1-4842-0635-5_1_Fig2_HTML.jpg)


  图 1-2. 像`PHP`这样的服务器端语言对大多数编码错误零容忍


  如果你是那种使用 Adobe Dreamweaver 等可视化设计工具、从不查看底层代码的网页设计师或开发者，那么是时候重新考虑你的方法了。将`PHP`与结构混乱的`HTML`混合使用很可能会导致问题。`PHP`使用循环来执行重复性任务，例如显示数据库搜索结果。循环会重复执行同一段代码——通常是`PHP`和`HTML`的混合——直到所有结果都显示完毕。如果你将循环放在错误的位置，或者`HTML`结构糟糕，你的页面很可能会像纸牌屋一样崩溃。


  如果你还没有这个习惯，建议使用万维网联盟（W3C）的标记验证服务（[`http://validator.w3.org/unicorn`](http://validator.w3.org/unicorn)）来检查你的页面。


  注意：W3C 是一个制定`HTML`和`CSS`等标准的国际组织，旨在确保网络的长期发展。它由万维网发明者蒂姆·伯纳斯-李领导。要了解 W3C 的使命，请参阅[`www.w3.org/Consortium/mission`](http://www.w3.org/Consortium/mission)。


  ## 我可以直接复制粘贴代码吗？


  复制本书中的代码没有任何问题。代码的作用就在于此。我将本书编排为一系列实践项目。我会解释代码的用途及其存在的理由。即使你不完全理解所有细节，这也足以让你有充分的信心，知道哪些部分可以根据自己的需求进行调整，哪些部分最好保留原样。但要充分利用本书，你需要开始尝试使用书中介绍的工具，然后提出自己的解决方案。


  `PHP` 是一个功能强大的工具箱。它有数千个内置函数，可以执行各种任务，例如将文本转换为大写、从全尺寸图像生成缩略图，或者连接数据库。真正的力量来自于以不同的方式组合这些函数，并添加你自己的条件逻辑。


  ## PHP 的安全性如何？


  `PHP` 就像你家里的电或厨房刀具：使用得当，非常安全；使用不当，则可能造成巨大破坏。本书第一版的写作灵感之一，源于当时一波利用电子邮件脚本漏洞的攻击，这些攻击将网站变成了垃圾邮件中继站。解决方案其实相当简单，你将在第
  5 章中学到，但即使在十年后，我仍然看到有人使用相同的不安全技术，使他们的网站暴露在攻击之下。


  `PHP` 并不危险，也并非每个人都需要成为安全专家才能使用它。重要的是理解`PHP`安全的基本原则：在*处理用户输入之前始终对其进行检查*。你会发现这是贯穿本书的一个永恒主题。大多数安全风险只需极少的努力就能消除。


  保护自己最好的方法就是理解你正在使用的代码。


  ## 编写 PHP 需要什么软件？


  严格来说，编写`PHP`脚本不需要任何特殊软件。`PHP`代码是纯文本，可以在任何文本编辑器中创建，例如 Windows 上的`Notepad`或 Mac OS
  X 上的`TextEdit`。话虽如此，但如果你使用具备加快开发流程功能的程序，你的生活将会轻松得多。目前有许多可用选项——既有免费的，也有付费的。


  ### 选择 PHP 编辑器时应关注什么


  如果你的代码有错误，你的页面很可能永远无法到达浏览器，你只会看到一条错误信息。你应该选择一个具备以下功能的脚本编辑器：


  - `PHP` 语法检查：过去这只有昂贵的专用程序中才有，但现在许多免费程序也具备此功能。语法检查器会在你键入代码时进行监控并高亮显示错误，从而节省大量时间并减少挫败感。

  - `PHP` 语法着色：代码会根据其扮演的角色以不同颜色高亮显示。如果你的代码出现了意想不到的颜色，这肯定是你犯错的一个迹象。

  - `PHP` 代码提示：`PHP` 有如此多的内置函数，即使是经验丰富的用户也可能难以记住所有用法。许多脚本编辑器会自动显示工具提示，提醒你某段特定代码的工作方式。

  - 行号：快速定位特定行能极大简化故障排除过程。

  - “花括号匹配”功能：圆括号`()`、方括号`[]`和花括号`{}`必须始终成对出现。很容易忘记关闭一对。所有优秀的脚本编辑器都能帮助找到匹配的括号、方括号或花括号。


  你当前用于构建网页的程序可能已经具备这些功能。例如，Adobe Dreamweaver CS5 及更高版本就具备这些功能（[`www.adobe.com/products/dreamweaver/`](http://www.adobe.com/products/dreamweaver/)）。它还内置了`PHP`文档。


  即使你不打算大量进行`PHP`开发，如果你的网页开发程序不支持语法检查，你也应考虑使用专用的脚本编辑器。以下专用脚本编辑器具备所有基本功能，如语法检查和代码提示。这不是一个详尽的列表，而是基于个人经验的推荐。


  - PhpStorm（[`www.jetbrains.com/phpstorm/`](http://www.jetbrains.com/phpstorm/)）：虽然这是一个专用的`PHP`编辑程序，但它也对`HTML`、`CSS`和`JavaScript`有出色的支持。这是我目前最喜欢的`PHP`开发程序。

  - Sublime Text（[`www.sublimetext.com/`](http://www.sublimetext.com/)）：如果你是 Sublime
  Text 的粉丝，有用于`PHP`语法着色、语法检查和文档的插件可用。

  - Zend Studio（[`www.zend.com/en/products/studio/`](http://www.zend.com/en/products/studio/)）：如果你对`PHP`开发非常认真，Zend
  Studio 是`PHP`功能最全面的集成开发环境（IDE）。它由 Zend 公司创建，该公司的运营者正是`PHP`开发的主要贡献者。Zend Studio 可在
  Windows、Mac OS X 和 Linux 上运行。它过去价格高昂，但现在对个人开发者的价格更为亲民，并且包含 12 个月的免费升级和技术支持。

  - PHP Development Tools（[`www.eclipse.org/pdt/`](http://www.eclipse.org/pdt/)）：`PDT`实际上是
  Zend Studio 的精简版，其优点是免费。它运行在 Eclipse 上，这是一个支持多种计算机语言的开源 IDE。如果你曾使用 Eclipse 处理其他语言，你会发现它相对容易上手。`PDT`可在
  Windows、Mac OS X 和 Linux 上运行，既可以作为 Eclipse 插件获取，也可以作为自动安装 Eclipse 和`PDT`插件的集成包使用。

  - Komodo Edit（[`http://komodoide.com/komodo-edit/`](http://komodoide.com/komodo-edit/)）：这是一个免费的、为`PHP`及其他多种流行计算机语言设计的开源
  IDE。它适用于 Windows、Mac OS X 和 Linux。它是 Komodo IDE（一款具有更高级功能的付费程序）的精简版。




  '
- '# 那么，让我们继续吧……


  本章仅简要概述了 PHP 能为你的网站增添动态功能的能力，以及实现这一目标所需的软件。使用 PHP 的第一步是搭建测试环境。下一章将介绍 Windows 和 Mac
  OS X 所需的内容。


  '
- '# 准备工作：开始使用 PHP


  既然你已决定使用 PHP 来丰富你的网页，就需要确保拥有继续阅读本书后续内容所需的一切。虽然你可以在远程服务器上进行测试，但通常在本地计算机上测试 PHP 页面会更方便。你需要安装的所有软件都是免费的。在本章中，我将介绍
  Windows 和 Mac OS X 的各种选项。Linux 系统通常默认安装了必要的组件。


  本章涵盖的内容：


  - 检查你的网站是否支持 PHP

  - 为什么 PHP 5.4 应是最低版本

  - 决定是否创建本地测试环境

  - 在 Windows 和 Mac OS X 中使用现成的集成包

  - 存储 PHP 文件的位置

  - 检查本地和远程服务器上的 PHP 配置


  ## 检查你的网站是否支持 PHP


  判断你的网站是否支持 PHP 最简单的方法是询问你的托管公司。另一种方法是将一个 PHP 页面上传到你的网站，然后查看它是否能正常运行。即使你知道网站支持 PHP，也请执行以下测试来确认运行的版本：


  打开文本编辑器（如记事本或 TextEdit），在空白页面中输入以下代码：


  ```

  <?php echo phpversion(); ?>

  ```


  将文件保存为`phpversion.php`。务必确保你的操作系统不会在`.php`后添加`.txt`扩展名。Mac 用户还应确保 TextEdit 不会以富文本格式（RTF）保存文件。如果你不确定，可以使用本书配套文件`ch02`文件夹中的`phpversion.php`。


  像上传 HTML 页面一样，将`phpversion.php`上传到你的网站，然后在浏览器中输入 URL。假设你将文件上传到网站的根目录，URL 将类似于 [`www.example.com/phpversion.php`](http://www.example.com/phpversion.php)。


  如果屏幕上显示一个三位数的版本号（如 5.6.1），说明你成功了：PHP 已启用。该数字告诉你服务器上运行的 PHP 版本。你至少需要 5.4.0 版本才能使用本书中的所有代码。


  如果收到类似"Parse error"的消息，说明 PHP 支持，但你在文件中输入代码时出现了错误。请改用`ch02`文件夹中的版本。


  如果你只看到原始代码，则说明 PHP 不受支持。


  PHP 5.3 的官方支持已于 2014 年 8 月终止。如果你的服务器运行的是 PHP 5.3 或更早版本，请联系你的主机服务商，告诉他们你需要最新的稳定版
  PHP。如果主机服务商拒绝，那就该更换托管公司了。


  ### 为什么 PHP 5.4 应是最低版本


  作为一般原则，PHP 在次级版本之间（即仅版本号中第一个点之后的数字发生变化）会尽量保持向后兼容性。然而，PHP 5.4 移除了一些过时特性，并为数组引入了新语法。


  尽管本书中的大部分代码在较旧版本的 PHP 上也能正确运行，但如果你的服务器仍依赖这些被移除的特性，你可能会得到意想不到的结果。影响本书代码的最重要变化是安全模式和魔术引号的移除。


  安全模式常用于共享托管环境中。它的影响包括限制包含文件的位置以及可读写文件的权限。由于 PHP 5.4 移除了安全模式，这些限制不再存在。


  魔术引号是一个错误的尝试，旨在通过在用户提交的数据中的引号前插入反斜杠，来让 PHP 对缺乏经验的开发者更安全。其目的是防止被称为 SQL 注入的恶意攻击。不幸的是，魔术引号引发的问题比解决的问题更多，经常使文本中充斥着不必要的反斜杠。如果你在
  PHP 5.3 或更早版本上运行本书的代码，且魔术引号未被禁用，你就会遇到不必要的反斜杠。


  本书中的代码还使用了数组的简化语法，这在较旧版本的 PHP 中无法运行。


  不使用旧版 PHP 最重要的原因是安全性。当发现漏洞时，仅会对当前版本和之前两个版本提供安全更新。在撰写本书时，当前版本是 PHP 5.6。这意味着 PHP 5.4
  和 5.5 将受益于任何安全更新。但一旦下一个版本发布，PHP 5.4 将不再修补安全威胁。使用最新版本的 PHP 不仅仅是获得最新功能的问题；它有助于保护你的网站和宝贵数据免受恶意攻击。


  ### 决定测试页面的地点


  与普通网页不同，你不能直接在 Windows 文件资源管理器或 Mac 的 Finder 中双击 PHP 页面并在浏览器中查看。它们需要通过支持 PHP 的网络服务器进行解析或处理。如果你的托管公司支持
  PHP，你可以将文件上传到你的网站并在那里进行测试。但是，每次修改后都需要重新上传文件。在早期阶段，你可能会发现由于代码中的一些小错误需要频繁上传。随着你经验的积累，你仍然需要频繁上传文件，因为你想要尝试不同的想法。


  如果你想立即开始使用 PHP，完全可以把自己的网站当作测试平台。然而，你很快就会发现搭建本地 PHP 测试环境的必要性。本章的其余部分将专门介绍如何在 Windows
  和 Mac OS X 上完成此操作。


  ## 本地测试环境所需组件


  要在本地计算机上测试 PHP 页面，你需要安装以下软件：


  - Web 服务器：这是一个显示网页的软件，而非独立的计算机

  - PHP

  - MySQL 以及 MySQL 的基于 Web 的前端`phpMyAdmin`，这是使用数据库所必需的


  > **提示：** 某些 Linux 发行版会安装 MariaDB（ [`mariadb.org/`](https://mariadb.org/) ）作为 MySQL
  的直接替代品。本书中的代码与 MariaDB 完全兼容。


  所有需要的软件都是免费的。你唯一需要付出的成本就是下载必要文件的时间，当然，还要确保所有设置正确无误的时间。在大多数情况下，你应该能在不到一小时内（很可能远少于这个时间）完成配置并运行。只要你有至少
  1GB 的可用磁盘空间，即使配置一般的计算机也能安装所有软件。


  > **提示：** 如果你的本地计算机上已有 PHP 测试环境，则无需重新安装。只需查看本章结尾题为"检查你的 PHP 设置"的部分即可。




  '
- '# 独立组件还是一体化集成包？


  多年来，我一直主张分别安装 PHP 测试环境的各个组件，而不推荐使用一次性安装 Apache、PHP、MySQL 和 phpMyAdmin 的集成包。我的建议基于早期一些集成包的品质问题，它们安装简单但几乎无法卸载或升级。不过，目前市面上的集成包质量极佳，我现在毫不犹豫地推荐使用它们。


  在我的电脑上，Windows 系统使用 `XAMPP`（[www.apachefriends.org/index.html](http://www.apachefriends.org/index.html)），Mac
  OS X 系统使用 `MAMP`（[www.mamp.info/en/](http://www.mamp.info/en/)）。其他集成包也可用，选择哪个并不重要。


  **提示**


  使用集成包搭建 PHP 测试环境通常毫无问题。主要困难在于与使用端口 80 的其他程序发生冲突，该端口是 Web 服务器用于监听页面请求的。如果安装了 Skype，请进入
  **工具** ➤ **选项** ➤ **高级** ➤ **连接**，确保端口 80 未被用于传入连接。可改用端口 33087。


  ## 在 Windows 上搭建环境


  在继续操作前，请确保以管理员身份登录。


  ### 让 Windows 显示文件扩展名


  默认情况下，大多数 Windows 计算机会隐藏文件扩展名（如 `.doc` 或 `.html`），因此在对话框和 Windows 文件资源管理器中只能看到 `thisfile`，而非
  `thisfile.doc` 或 `thisfile.html`。Windows 8 会显示 PHP 文件的扩展名，但建议对所有文件开启扩展名显示。在 Windows
  7 中，这是使用 PHP 必备操作。


  按以下步骤在 Windows 8 中启用文件扩展名显示：


  - 打开文件资源管理器。

  - 选择 **查看** 以展开文件资源管理器窗口顶部的功能区。

  - 勾选“文件扩展名”复选框。


  在 Windows 7 中按以下步骤操作：


  - 打开 **开始** ➤ **计算机**。

  - 选择 **组织** ➤ **文件夹和搜索选项**。

  - 在打开的对话框中选择 **查看** 选项卡。

  - 在 **高级设置** 部分，取消勾选“隐藏已知文件类型的扩展名”。

  - 点击 **确定**。


  显示文件扩展名更安全——你可以识别病毒编写者是否将 `.exe` 或 `.scr` 可执行文件附加在看似无害的文档上。


  ### 选择 Web 服务器


  大多数 PHP 安装运行在 Apache Web 服务器上。两者均为开源且协同良好。不过，Windows 自带 Web 服务器 Internet Information
  Services（IIS），也支持 PHP。微软与 PHP 开发团队密切合作，将 PHP 在 IIS 上的性能提升至与 Apache 大致相当。那么，该如何选择？


  答案取决于你是否使用 ASP 或 ASP.NET 开发网页，或计划这样做。ASP 和 ASP.NET 需要 IIS。你可以将 Apache 与 IIS 安装在同一台电脑上，但两者都监听端口
  80 的请求。无法在同一端口上同时运行两个服务器。


  除非你需要 IIS 用于 ASP 或 ASP.NET，否则我建议使用 `XAMPP` 或其他集成包安装 Apache，详见下一节。如果需要使用 IIS，最便捷的方式是通过
  Microsoft Web Platform Installer（Web PI）安装 PHP，可从 [www.microsoft.com/web/downloads/platform.aspx](http://www.microsoft.com/web/downloads/platform.aspx)
  下载。


  ### 在 Windows 上安装集成包


  Windows 上有三种流行的集成包可在一次操作中安装 Apache、PHP、MySQL、phpMyAdmin 及其他工具：`XAMPP`（[www.apachefriends.org/index.html](http://www.apachefriends.org/index.html)）、`WampServer`（[www.wampserver.com/en/](http://www.wampserver.com/en/)）和
  `EasyPHP`（[www.easyphp.org](http://www.easyphp.org/)）。安装过程通常只需几分钟。安装完成后，你可能需要更改一些设置，本章后续将说明。


  印刷书籍出版周期内版本可能发生变化，因此我不描述具体安装流程。每个包在其网站上均有说明。David Gassner 在 lynda.com 上的《安装 Apache、MySQL
  和 PHP》课程中也有关于 `WampServer` 和 `XAMPP` 设置的有用视频。尽管 lynda.com 是订阅服务，但在撰写本文时，该课程的所有视频即使非订阅用户也可免费观看（[www.lynda.com/Apache-HTTP-Server-tutorials/Installing-Apache-MySQL-PHP/77958-2.html](http://www.lynda.com/Apache-HTTP-Server-tutorials/Installing-Apache-MySQL-PHP/77958-2.html)）。


  ## 在 Mac OS X 上搭建环境


  Apache Web 服务器和 PHP 已预装在 Mac OS X 上，但默认未启用。我建议使用 `MAMP` 而非预装版本，它可一次性安装 Apache、PHP、MySQL、phpMyAdmin
  及其他工具。


  为避免与预装的 Apache 和 PHP 版本冲突，`MAMP` 将所有应用程序存放在硬盘的专用文件夹中。这样，如果决定不再需要 `MAMP`，只需将 `MAMP`
  文件夹拖入废纸篓即可轻松卸载所有内容。


  ### 安装 MAMP


  开始前，请确保以管理员权限登录电脑。


  1. 访问 [www.mamp.info/en/downloads/](http://www.mamp.info/en/downloads/)，选择 **MAMP
  & MAMP PRO** 的链接。这将下载包含 `MAMP` 免费版和付费版的磁盘映像。

  2. 下载完成后，启动磁盘映像。你将看到许可协议。必须点击 **同意** 才能继续挂载磁盘映像。

  3. 按照屏幕指示操作。

  4. 确认 `MAMP` 已安装在 **应用程序** 文件夹中。


  **注意**


  `MAMP` 会自动将免费版和付费版分别安装在名为 `MAMP` 和 `MAMP PRO` 的独立文件夹中。付费版更便于配置 PHP 和处理虚拟主机，但免费版完全够用，尤其适合初学者。如需删除
  `MAMP PRO` 文件夹，请勿直接拖入废纸篓。请打开文件夹并双击 `MAMP PRO` 卸载图标。付费版需要保留两个文件夹。




  ### 测试和配置 MAMP


  默认情况下，MAMP 为 Apache 和 MySQL 使用非标准端口。除非你在运行多个 Apache 和 MySQL 实例，否则应该修改端口设置。


  双击 `Applications/MAMP` 中的 MAMP 图标。你的默认浏览器应启动并显示 MAMP 欢迎页面。请注意，浏览器地址栏中的 URL 以 `localhost:8888`
  开头。`:8888` 表示 Apache 正在非标准端口 8888 上监听请求。


  最小化浏览器，找到 MAMP 控制面板（见图 2-1），它应正在你的桌面上运行。Apache Server 和 MySQL Server 右侧的绿色小灯表示两个服务器都在运行。


  点击“偏好设置”图标，然后在打开的窗口顶部选择“端口”。它显示 Apache 和 MySQL 分别在端口 8888 和 8889 上运行（见图 2-2）。


  ![A978-1-4842-0635-5_2_Fig1_HTML.jpg](img/A978-1-4842-0635-5_2_Fig1_HTML.jpg)


  图 2-1. MAMP 控制面板


  点击“将 Web 和 MySQL 端口设置为 80 和 3306”，如图 2-2 所示。端口号将更改为标准端口：Apache 为 80，MySQL 为 3306。


  ![A978-1-4842-0635-5_2_Fig2_HTML.jpg](img/A978-1-4842-0635-5_2_Fig2_HTML.jpg)


  图 2-2. 修改 Apache 和 MySQL 端口


  > **注意：** MAMP 现在支持将 Nginx 作为备选 Web 服务器。当我点击“将 Web 和 MySQL 端口设置为 80 和 3306”时，Apache
  Port 和 Nginx Port 都变成了 80，这会导致设置无法被接受。如果发生这种情况，请手动将 Nginx Port 重置为 7888。


  点击“确定”，并在系统提示时输入你的 Mac 密码。MAMP 会重新启动两个服务器。


  > **提示：** 如果任何其他程序正在使用端口 80，Apache 将无法重启。如果你找不到是什么阻止了 Apache 使用端口 80，请打开 MAMP 偏好设置面板，然后点击“将
  MAMP 端口设置为默认值”。


  当两个指示灯再次变为绿色时，点击 MAMP 控制面板中的“打开起始页”。这会重新在浏览器中加载 MAMP 欢迎页面。这次，URL 中 `localhost` 后面不应再跟有冒号和数字，因为
  Apache 正在默认端口上监听。


  ## 你的 PHP 文件应放在哪里（Windows 和 Mac）


  你需要将文件创建在 Web 服务器能够处理它们的位置。通常，这意味着文件应放在服务器的文档根目录或文档根目录的子文件夹中。最常见配置的文档根目录默认位置如下：


  *   XAMPP：`C:\xampp\htdocs`

  *   WampServer：`C:\wamp\www`

  *   EasyPHP：`C:\EasyPHP\www`

  *   IIS：`C:\inetpub\wwwroot`

  *   MAMP：`Macintosh HD:Applications:MAMP:htdocs`


  要查看 PHP 页面，你需要在浏览器中使用 URL 加载它。在本地测试环境中，Web 服务器文档根目录的 URL 是 `http://localhost/`。


  > **警告：** 如果你需要将 MAMP 重置为默认端口，则必须使用 `http://localhost:8888` 代替 `http://localhost`。


  如果你将本书的文件存储在文档根目录下名为 `phpsols` 的子文件夹中，那么 URL 将是 `http://localhost/phpsols/` 后跟文件夹名（如果有的话）和文件名。


  > **提示：** 如果你使用 `http://localhost/` 时遇到问题，请改用 `http://127.0.0.1/`。`127.0.0.1` 是所有计算机用于引用本机的回环
  IP 地址。


  ### 使用虚拟主机


  除了将你的 PHP 文件存储在 Web 服务器的文档根目录之外，另一种选择是使用虚拟主机。虚拟主机为每个站点创建一个唯一的地址，这也是托管公司管理共享主机的方式。MAMP
  PRO 通过其控制面板简化了虚拟主机的设置。EasyPHP 也有一个用于管理虚拟主机的插件模块。


  手动设置虚拟主机需要编辑计算机的一个系统文件，以在本地机器上注册主机名。你还需要告诉本地测试环境中的 Web 服务器文件的位置。这个过程并不困难，但每次设置新的虚拟主机时都需要执行一次。


  在虚拟主机中设置每个站点的好处在于，它能更准确地匹配真实网站的结构。然而，在学习 PHP 时，使用测试服务器文档根目录下的子文件夹可能更方便。一旦你获得了 PHP
  经验，就可以进阶使用虚拟主机。关于如何在 Apache 中手动设置虚拟主机的说明，请访问我网站上的以下地址：


  *   Windows：`http://foundationphp.com/tutorials/apache_vhosts.php`

  *   MAMP：`http://foundationphp.com/tutorials/vhosts_mamp.php`


  > **提示：** 请记得先启动测试环境中的 Web 服务器，然后再查看 PHP 页面。


  ## 检查你的 PHP 设置


  安装 PHP 后，最好检查一下它的配置设置。除了核心功能外，PHP 还有大量可选扩展。本书所用的一体化安装包和 Microsoft Web PI 都会安装所有需要的扩展。但有些基本配置设置可能略有不同。为避免意外问题，请调整你的
  PHP 配置，使其与下页建议的设置保持一致。




  ### 使用 `phpinfo()` 显示服务器配置


  PHP 有一个内置命令 `phpinfo()`，用于显示 PHP 在服务器上的配置详情。`phpinfo()` 产生的信息量可能会让人感觉信息过载，但对于确定为何某些功能在本地计算机上运行完美，而在实际网站上却无法运行，它却是无价之宝。问题通常在于远程服务器禁用了某个功能，或者没有安装可选扩展。


  集成软件包使得运行 `phpinfo()` 变得很简单：


  *   XAMPP：点击 XAMPP 欢迎屏幕左侧菜单中的 `phpinfo` 链接。

  *   MAMP：点击 MAMP 启动页面顶部主菜单中的 `phpinfo`。

  *   WampServer：打开 WampServer 菜单，点击 Localhost。`phpinfo()` 的链接位于“工具”下方。


  或者，按照以下说明创建一个简单的测试文件，并在浏览器中加载它：


  确保 Apache 或 IIS 在本地计算机上正在运行。在脚本编辑器中输入以下内容：


  ```

  <?php phpinfo(); ?>

  ```


  文件中不应有其他任何内容。


  将文件命名为 `phpinfo.php`，并保存在服务器的文档根目录下（请参阅本章前面的“在哪里放置你的 PHP 文件（Windows 和 Mac）”）。


  **注意**

  确保你的编辑器不会在 `.php` 后面添加 `.txt` 或 `.rtf` 扩展名。


  在浏览器地址栏中输入 `http://localhost/phpinfo.php` 并按下回车键。你应该会看到一个类似于图 2-3 的页面，显示 PHP 版本，然后是
  PHP 配置的详细信息。记下“已加载配置文件”项的值。这会告诉你 `php.ini` 的位置，`php.ini` 是你需要编辑以更改 PHP 多数设置的文本文件。滚动到标记为“Core”的部分，并将设置与表
  2-1 中的推荐设置进行比较。记下任何不同之处，以便你可以按照本章后文所述进行更改。


  ![A978-1-4842-0635-5_2_Fig3_HTML.jpg](img/A978-1-4842-0635-5_2_Fig3_HTML.jpg)


  **图 2-3.** 运行 `phpinfo()` 命令会显示 PHP 配置的完整详细信息


  配置页面的其余部分显示哪些 PHP 扩展已被启用。尽管页面看起来没完没了，但所有扩展在 Core 之后都按字母顺序列出。要配合本书阅读，请确保已启用以下扩展：


  **表 2-1.** 推荐的 PHP 配置设置


  | 指令 | 本地值 | 备注 |

  | --- | --- | --- |

  | `display_errors` | On | 对于调试脚本中的错误至关重要。如果设置为 Off，错误会导致完全空白的屏幕，让你对可能的原因毫无头绪。 |

  | `error_reporting` | 32767 | 这将错误报告设置为最高级别。 |

  | `file_uploads` | On | 允许你使用 PHP 将文件上传到网站。 |

  | `log_errors` | Off | 当 `display_errors` 设置为 On 时，你不需要用错误日志填满硬盘。 |


  *   `gd`：使 PHP 能够生成和修改图像及字体。

  *   `mysqli`：连接到 MySQL（注意其中的“i”，代表“improved”，用于将此扩展与旧的 `mysql` 扩展区分开来，后者不应再使用）。

  *   `PDO`：为数据库提供软件中立的支持（可选）。

  *   `pdo_mysql`：连接到 MySQL 的替代方法（可选）。

  *   `session`：会话维护与用户关联的信息，并用于用户身份验证等功能。


  你还应该在你的远程服务器上运行 `phpinfo()`，以检查哪些功能已启用。如果列出的扩展不受支持，当你将文件上传到网站时，本书中的某些代码将无法运行。在共享主机上，`PDO`
  和 `pdo_mysql` 并不总是启用，但你可以改用 `mysqli`。`PDO` 的优势在于它是软件中立的，因此你可以仅通过更改一两行代码，就能让脚本适配
  MySQL 以外的数据库。而使用 `mysqli` 则会让你绑定在 MySQL 上。


  如果你的设置中的任何 Core 设置与表 2-1 中的推荐设置不同，你将需要按照下一节所述编辑 PHP 配置文件 `php.ini`。


  ### 编辑 `php.ini`


  PHP 配置文件 `php.ini` 是一个非常长的文件，这常常会让编程新手感到紧张，但其实没什么可担心的。它是以纯文本编写的，文件长的其中一个原因是因为它包含了大量解释各种选项的注释。话虽如此，在编辑
  `php.ini` 之前最好做一个备份，以防出错。


  如何打开 `php.ini` 取决于你的操作系统以及你安装 PHP 的方式：


  *   如果你在 Windows 上使用了集成软件包（如 XAMPP），请在 Windows 资源管理器中双击 `php.ini`。该文件将自动在记事本中打开。

  *   如果你使用 Microsoft Web PI 安装了 PHP，`php.ini` 通常位于 Program Files 的一个子文件夹中。虽然你可以通过双击打开
  `php.ini`，但将无法保存所做的任何更改。相反，请右键单击记事本，然后选择“以管理员身份运行”。（在 Windows 7 中，你需要从“开始”菜单访问记事本，它位于“附件”文件夹中。）在记事本中，选择“文件”➤“打开”，并将选项设置为显示所有文件
  (*.*)。导航到 `php.ini` 所在的文件夹，选择该文件，然后单击“打开”。

  *   在 Mac OS X 上，`php.ini` 在 Finder 中显示为一个可执行文件。使用文本编辑器（如 BBEdit 或 TextWrangler，两者均可从
  [`www.barebones.com`](http://www.barebones.com/) 获得）打开 `php.ini`。


  以分号（`;`）开头的行是注释。你需要编辑的行不以分号开头。


  使用文本编辑器的“查找”功能来定位你需要更改的设置，使其与表 2-1 中的推荐设置匹配。大多数指令前面都有一个或多个如何设置它们的示例。确保不要错误地编辑了某个注释掉的示例。


  对于使用 `On` 或 `Off` 值的指令，只需将值更改为推荐值即可。例如，如果需要打开错误消息的显示，请编辑以下行：


  ```

  display_errors = Off

  ```


  将其更改为：


  ```

  display_errors = On

  ```


  要设置错误报告级别，你需要使用 PHP 常量，这些常量以大写字母书写，并且区分大小写。该指令应如下所示：


  ```

  error_reporting = E_ALL

  ```


  编辑完 `php.ini` 后，保存文件，然后重新启动 Apache 或 IIS，以使更改生效。如果 Web 服务器无法启动，请检查服务器的错误日志文件。它可以在以下位置找到：


  *   XAM 如果：在 XAMPP 控制面板中，点击 Apache 旁边的“日志”按钮，然后选择 Apache (error.log)。

  *   MAMP：在 Applications:MAMP:logs 中，双击 `apache_error.log` 以在控制台中打开。

  *   WampServer：在 WampServer 菜单中，选择 Apache ➤ Apache 错误日志。

  *   EasyPHP：右键单击系统托盘中的 EasyPHP 图标，然后选择“日志文件” ➤ Apache。

  *   IIS：日志文件的默认位置是 `C:\inetpub\logs`。


  错误日志中最新的条目应该能指示出导致服务器无法重启的原因。利用该信息纠正你对 `php.ini` 所做的更改。如果这不起作用，你应该庆幸自己在编辑 `php.ini`
  之前做了备份。重新使用一份干净的副本开始，并仔细检查你的编辑。


  ## 下一步是什么？


  既然你已经为 PHP 建立了一个可用的测试环境，你无疑已经跃跃欲试了。我最不想做的就是打击任何积极性，但是在将 PHP 用于实际网站之前，你应该对该语言的规则有一个基本的了解。所以，在跳入那些酷炫内容之前，请先阅读下一章，其中解释了如何编写
  PHP 脚本。不要跳过它——这真的非常重要。




