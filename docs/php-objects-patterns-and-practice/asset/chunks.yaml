  raw: '### Implementation


    The Null Object pattern allows us to delegate the doing of nothing to a class
    of an expected type. In this case, I will create a `NullUnit` class .


    ```

    // listing 11.58

    class NullUnit extends Unit

    {

    public function bombardStrength(): int

    {

    return 0;

    }

    public function getHealth(): int

    {

    return 0;

    }

    public function getDepth(): int {

    return 0;

    }

    }

    ```


    This implementation of `Unit` respects the interface, but does precisely nothing.
    Now, I can amend `UnitAcquisition` to create a `NullUnit` rather than use a `null`:


    ```

    // listing 11.59

    public function getUnits(int $x, int $y): array

    {

    $army = new Army();

    $army->addUnit(new Archer());

    $found = [

    new Cavalry(),

    new NullUnit(),

    new LaserCanonUnit(),

    $army

    ];

    return $found;

    }

    ```


    The client code in `TileForces` can call any methods it likes on a `NullUnit`
    object without problem or error:


    ```

    // listing 11.60

    // TileForces

    public function firepower(): int {

    $power = 0;

    foreach($this->units as $unit) {

    $power += $unit->bombardStrength();

    }

    return $power;

    }

    ```


    Take a look at any substantial project and count up the number of inelegant checks
    that have been forced on its coders by methods that return null values. How many
    of those checks could be dispensed with if more of us used Null Object?


    Of course, sometimes you will need to know that you are dealing with a null object.
    The most obvious way of doing this would be to test an object with the `instanceof`
    operator. That is even less elegant than the original `is_null()` call, however.


    Perhaps the neatest solution is to add an `isNull()` method to both a base class
    (returning `false`) and to the Null Object (returning `true`):


    ```

    // listing 11.61

    if (! $unit->isNull()) {

    // do something

    } else {

    print "null - no action\n";

    }

    ```


    That gives us the best of both worlds. Any method of a `NullUnit` object can be
    safely called. And any `Unit` object can be queried for null status.


    ## Summary


    In this chapter, I wrapped up my examination of the Gang of Four patterns, placing
    a strong emphasis on how to get things done. I began by showing you how to design
    a mini-language and build its engine with the Interpreter pattern.


    In the Strategy pattern, you encountered another way of using composition to increase
    flexibility and reduce the need for repetitive subclassing. And with the Observer
    pattern, you learned how to solve the problem of notifying disparate and varying
    components about system events. You also revisited the Composite example; and
    with the Visitor pattern, learned how to pay a call on, and apply many operations
    to, every component in a tree. You even saw how the Command pattern can help you
    to build an extensible tiered system. Finally, you saved yourself a heap of checking
    for nulls with the Null Object pattern.


    In the next chapter, I will step further beyond the Gang of Four to examine some
    patterns specifically oriented toward enterprise programming.


    # 12. Enterprise Patterns


    PHP is, first and foremost, a language designed for the Web. And, because of its
    extensive support for objects, we can take advantage of patterns hatched in the
    context of other object-oriented languages, particularly Java.


    I develop a single example in this chapter, using it to illustrate the patterns
    I cover. Remember, though, that by choosing to use one pattern, you are not committed
    to using all of the patterns that work well with it. Nor should you feel that
    the implementations presented here are the only way you might go about deploying
    these patterns. Rather, you should use the examples here to help you understand
    the thrust of the patterns described, feeling free to extract what you need for
    your projects.


    Because of the amount of material to cover, this is one this book’s longest and
    most involved chapters, and it may be a challenge to traverse it in one sitting.
    It is divided into an introduction and two main parts. These dividing lines might
    make good break points.


    I also describe the individual patterns in the “Architecture Overview” section.
    Although these are interdependent to some extent, you should be able to jump straight
    to any particular pattern and work through it independently, moving on to related
    patterns at your leisure.


    This chapter will cover several key topics:


    *   Architecture overview : An introduction to the layers that typically comprise
    an enterprise application

    *   Registry pattern : Managing application data

    *   Presentation layer : Tools for managing and responding to requests and for
    presenting data to the user

    *   Business logic layer : Getting to the real purpose of your system, which is
    addressing business problems


    ## Architecture Overview


    With a lot of ground to cover, let’s kick off with an overview of the patterns
    to come, followed by an introduction to building layered, or tiered, applications.


    ### The Patterns


    I will explore several patterns in this chapter. You may read from start to finish
    or dip into those patterns that fit your needs or pique your interest:


    *   Registry : This pattern is useful for making data available to all classes
    in a process. Through careful use of serialization, it can also be used to store
    information across a session or even across instances of an application.

    *   Front Controller : Use this for larger systems in which you know that you
    will need as much flexibility as possible in managing many different views and
    commands.

    *   Application Controller : Create a class to manage view logic and command selection.

    *   Template View : Create pages that manage display and user interface only,
    incorporating dynamic information into display markup with as little raw code
    as possible.

    *   Page Controller : Lighter weight but less flexible than Front Controller,
    Page Controller addresses the same need. Use this pattern to manage requests and
    handle view logic if you want fast results and your system is unlikely to grow
    substantially in complexity.

    *   Transaction Script : When you want to get things done fast, with minimal up-front
    planning, fall back on procedural library code for your application logic. This
    pattern does not scale well.

    *   Domain Model : At the opposite pole from Transaction Script, use this pattern
    to build object-based models of your business participants and processes.


    Note


    The Command pattern is not described individually here (I wrote about it in Chapter
    [11](#A314621_5_En_11_Chapter.html)); however, it is encountered once again in
    both the Front Controller and Application Controller patterns.'
  trans: "\n### 实现\n\n空对象模式让我们可以将“什么都不做”这一行为委托给一个预期类型的类。在这个例子中，我将创建一个 `NullUnit` 类。\n\
    \n```\n// 清单 11.58\nclass NullUnit extends Unit\n{\npublic function bombardStrength():\
    \ int\n{\nreturn 0;\n}\npublic function getHealth(): int\n{\nreturn 0;\n}\npublic\
    \ function getDepth(): int {\nreturn 0;\n}\n}\n```\n\n这个 `Unit` 的实现遵循了接口，但确实什么也不做。现在，我可以修改\
    \ `UnitAcquisition`，让它创建一个 `NullUnit` 而不是返回 `null`：\n\n```\n// 清单 11.59\npublic\
    \ function getUnits(int $x, int $y): array\n{\n$army = new Army();\n$army->addUnit(new\
    \ Archer());\n$found = [\nnew Cavalry(),\nnew NullUnit(),\nnew LaserCanonUnit(),\n\
    $army\n];\nreturn $found;\n}\n```\n\n`TileForces` 中的客户端代码可以随意调用 `NullUnit` 对象上的任何方法，而不会出现任何问题或错误：\n\
    \n```\n// 清单 11.60\n// TileForces\npublic function firepower(): int {\n$power\
    \ = 0;\nforeach($this->units as $unit) {\n$power += $unit->bombardStrength();\n\
    }\nreturn $power;\n}\n```\n\n审视任何一个大型项目，数一数那些因返回空值的方法而被迫对程序员施加的不优雅检查的数量。如果我们更多使用空对象，又有多少这种检查可以省去呢？\n\
    \n当然，有时你需要知道自己正在处理的是一个空对象。最显而易见的方式是使用 `instanceof` 运算符来测试对象。但这甚至比原始的 `is_null()`\
    \ 调用更不优雅。\n\n或许最简洁的解决方案是，在基类（返回 `false`）和空对象（返回 `true`）中都添加一个 `isNull()` 方法：\n\
    \n```\n// 清单 11.61\nif (! $unit->isNull()) {\n// 执行某些操作\n} else {\nprint \"null\
    \ - 无操作\\n\";\n}\n```\n\n这样我们就两全其美了。`NullUnit` 对象的任何方法都可以安全调用。并且，任何 `Unit` 对象都可以被查询其空状态。\n\
    \n## 总结\n\n在本章中，我结束了对“四人帮”模式的探讨，并着重强调了如何将事情付诸实践。我首先向你展示了如何设计一个迷你语言，并用解释器模式构建其引擎。\n\
    \n在策略模式中，你遇到了另一种使用组合来增加灵活性、减少重复子类化需求的方法。通过观察者模式，你学会了如何解决向不同且变化的组件通知系统事件的问题。你还重温了组合模式示例；并通过访问者模式，学习了如何访问树中的每个组件并对其应用多种操作。你还看到了命令模式如何帮助你构建可扩展的分层系统。最后，你借助空对象模式省去了大量空值检查工作。\n\
    \n在下一章中，我将进一步超越“四人帮”模式，探讨一些专门面向企业级编程的模式。\n\n# 12. 企业模式\n\nPHP 首先是为 Web 设计的语言。并且，由于它对对象的广泛支持，我们可以利用在其他面向对象语言（特别是\
    \ Java）背景下孵化出的模式。\n\n我在本章中开发了一个示例，并用它来说明我所涵盖的模式。但请记住，选择使用某个模式，并不意味着你必须使用所有与之配合良好的模式。也不要觉得这里呈现的实现方式是部署这些模式的唯一途径。相反，你应该利用这里的示例来帮助你理解所描述模式的精髓，并可以自由地为你的项目提取所需内容。\n\
    \n由于要涵盖的材料很多，这是本书最长、最复杂的章节之一，一口气读完可能颇有挑战。本章分为引言和两个主要部分。这些分界线可以作为不错的暂停点。\n\n我还会在“架构概述”部分描述各个独立的模式。尽管这些模式在某种程度上相互依赖，但你应该能够直接跳转到任何一个特定模式，并独立地学习它，然后从容地转向相关模式。\n\
    \n本章将涵盖几个关键主题：\n\n*   架构概述：介绍通常构成企业应用的分层\n*   注册表模式：管理应用数据\n*   表示层：用于管理和响应用户请求并向用户展示数据的工具\n\
    *   业务逻辑层：触及系统的真正目的，即解决业务问题\n\n## 架构概述\n\n由于要覆盖的内容很多，让我们先概述一下即将讨论的模式，然后介绍构建分层应用的方法。\n\
    \n### 诸模式\n\n我将在本章中探讨几个模式。你可以从头到尾阅读，也可以挑选那些符合你需求或引起你兴趣的模式来深入研读：\n\n*   注册表：此模式对于使数据在进程内所有类中可用非常有用。通过谨慎使用序列化，它还可以跨会话甚至跨应用实例存储信息。\n\
    *   前端控制器：用于较大的系统，在这些系统中你知道需要尽可能灵活地管理许多不同的视图和命令。\n*   应用控制器：创建一个类来管理视图逻辑和命令选择。\n\
    *   模板视图：创建仅管理显示和用户界面的页面，以尽可能少的原始代码将动态信息整合到显示标记中。\n*   页面控制器：比前端控制器更轻量但灵活性稍差，页面控制器满足同样的需求。如果你想要快速获得结果，并且你的系统不太可能在复杂性上大幅增长，可以使用此模式来管理请求和处理视图逻辑。\n\
    *   事务脚本：当你想要快速完成任务，且只需最少的预先规划时，可以依赖过程化的库代码来处理应用逻辑。此模式的可扩展性不佳。\n*   领域模型：与事务脚本处于对立面，使用此模式为你的业务参与者和流程构建基于对象的模型。\n\
    \n> **注**  \n> 命令模式在此处不单独描述（我在第 11 章中已经介绍过）；不过，它会在前端控制器和应用控制器模式中再次出现。\n"
- fmt: '# Applications and Layers


    Many (most, in fact) of the patterns in this chapter are designed to promote the
    independent operation of several distinct tiers in an application. Just as classes
    represent specializations of responsibilities, so do the tiers of an enterprise
    system, albeit on a coarser scale. Figure [12-1](#A314621_5_En_12_Chapter.html#Fig1)
    shows a typical breakdown of the layers in a system.


    ![A314621_5_En_12_Fig1_HTML.gif](A314621_5_En_12_Fig1_HTML.gif)


    Figure 12-1. The layers, or tiers, in a typical enterprise system


    The structure shown in Figure [12-1](#A314621_5_En_12_Chapter.html#Fig1) is not
    written in stone: some of these tiers may be combined, and different strategies
    can be used for communication between them, depending on the complexity of your
    system. Nonetheless, Figure [12-1](#A314621_5_En_12_Chapter.html#Fig1) illustrates
    a model that emphasizes flexibility and reuse, and many enterprise applications
    follow it to a large extent.


    - The view layer contains the interface that a system''s users actually see and
    interact with. It is responsible for presenting the results of a user''s request
    and providing the mechanism by which the next request can be made to the system.

    - The command and control layer processes the request from the user. Based on
    this analysis, it delegates to the business logic layer any processing required
    in order to fulfill the request. It then chooses which view is best suited to
    present the results to the user. In practice, this and the view layer are often
    combined into a single presentation layer. Even so, the role of display should
    be strictly separated from those of request handling and business logic invocation.

    - The business logic layer is responsible for seeing to the business of a request.
    It performs any required calculations and marshals the resulting data.

    - The data layer insulates the rest of the system from the mechanics of saving
    and acquiring persistent information. In some systems, the command and control
    layer uses the data layer to acquire the business objects with which it needs
    to work. In other systems, the data layer is hidden as much as possible.


    So what is the point of dividing a system in this way? As with so much else in
    this book, the answer lies with decoupling. By keeping business logic independent
    of the view layer, you make it possible to add new interfaces to your system with
    little or no rewriting.


    Imagine a system for managing event listings (this will be a very familiar example
    by the end of the chapter). The end user will naturally require a slick HTML interface.
    Administrators maintaining the system may require a command-line interface for
    building into automated systems. At the same time, you may be developing versions
    of the system to work with cell phones and other handheld devices. You may even
    begin to consider `SOAP` or a `RESTful API`.


    If you originally combined the underlying logic of your system with the HTML view
    layer (which is still a common strategy), these requirements would trigger an
    instant rewrite. If, on the other hand, you had created a tiered system, you would
    be able to bolt on new presentation strategies without the need to reconsider
    your business logic and data layers.


    By the same token, persistence strategies are subject to change. Once again, you
    should be able to switch between storage models with minimal impact on the other
    tiers in a system.


    Testing is another good reason for creating systems with separate tiers. Web applications
    are notoriously hard to test. In an insufficiently tiered system, automated tests
    must negotiate the HTML interface at one end and risk triggering random queries
    to a database at the other, even when their focus is aimed at neither of these
    areas. Although any testing is better than none, such tests are necessarily haphazard.
    In a tiered system, on the other hand, the classes that face other tiers are often
    written so that they extend an abstract superclass or implement an interface.
    This supertype can then support polymorphism. In a test context, an entire tier
    can be replaced by a set of dummy objects (often called "stubs" or "mock" objects).
    In this way, you can test business logic using a fake data layer, for example.
    You can read more about testing in Chapter [18](#A314621_5_En_18_Chapter.html).


    Layers are useful even if you think that testing is for wimps and your system
    will only ever have a single interface. By creating tiers with distinct responsibilities,
    you build a system whose constituent parts are easier to extend and debug. You
    limit duplication by keeping code with the same kinds of responsibility in one
    place (rather than lacing a system with database calls, for example, or with display
    strategies). Adding to such a system is relatively easy because your changes tend
    to be nicely vertical, as opposed to messily horizontal.


    A new feature, in a tiered system, might require a new interface component, additional
    request handling, some more business logic, and an amendment to your storage mechanism.
    That''s vertical change. In a nontiered system, you might add your feature and
    then remember that five separate pages reference your amended database table.
    Or was it six? There may be dozens of places where your new interface may potentially
    be invoked, so you need to work through your system, adding code for that. This
    is horizontal amendment.


    In reality, of course, you never entirely escape from horizontal dependencies
    of this sort, especially when it comes to navigation elements in the interface.
    A tiered system can help to minimize the need for horizontal amendment, however.


    **Note**


    While many of these patterns have been around for a while (patterns reflect well-tried
    practices, after all), the names and boundaries are drawn either from Martin Fowler''s
    key work on enterprise patterns, *Patterns of Enterprise Application Architecture*
    (Addison-Wesley Professional, 2002), or from the influential *Core J2EE Patterns:
    Best Practices and Design Strategies* (Prentice Hall, 2001) by Alur et al. For
    the sake of consistency, I have tended to use Fowler''s naming conventions where
    the two sources diverge.


    All the examples in this chapter revolve around a fictional listings system with
    the whimsical-sounding name, "Woo," which stands for something like "What''s On
    Outside."


    Participants of the system include venues (e.g., theaters, clubs, or cinemas),
    spaces (e.g., screen 1 or the stage upstairs) and events (e.g., The Long Good
    Friday or The Importance of Being Earnest).


    The operations I will cover include creating a venue, adding a space to a venue,
    and listing all venues in the system.


    Remember that the aim of this chapter is to illustrate key enterprise design patterns
    and not to build a working system. Reflecting the interdependent nature of design
    patterns, most of these examples overlap to a large extent with code examples,
    making good use of ground covered elsewhere in the chapter. As this code is mainly
    designed to demonstrate enterprise patterns, much of it does not fulfill all the
    criteria demanded by a production system. In particular, I omit error checking
    where it might stand in the way of clarity. You should approach the examples as
    a means of illustrating the patterns they implement, rather than as building blocks
    in a framework or application.


    ## Cheating Before We Start


    Most of the patterns in this book find a natural place in the layers of an enterprise
    architecture. But some patterns are so basic that they stand outside of this structure.
    The `Registry` pattern is a good example of this. In fact, `Registry` is a powerful
    way of breaking out of the constraints laid down by layering. It is the exception
    that allows for the smooth running of the rule.'
  raw: '### Applications and Layers


    Many (most, in fact) of the patterns in this chapter are designed to promote the
    independent operation of several distinct tiers in an application. Just as classes
    represent specializations of responsibilities, so do the tiers of an enterprise
    system, albeit on a coarser scale. Figure [12-1](#A314621_5_En_12_Chapter.html#Fig1)
    shows a typical breakdown of the layers in a system.


    ![A314621_5_En_12_Fig1_HTML.gif](A314621_5_En_12_Fig1_HTML.gif)


    Figure 12-1.


    The layers, or tiers, in a typical enterprise system


    The structure shown in Figure [12-1](#A314621_5_En_12_Chapter.html#Fig1) is not
    written in stone: some of these tiers may be combined, and different strategies
    can be used for communication between them, depending on the complexity of your
    system. Nonetheless, Figure [12-1](#A314621_5_En_12_Chapter.html#Fig1) illustrates
    a model that emphasizes flexibility and reuse, and many enterprise applications
    follow it to a large extent.


    *   The view layer contains the interface that a system’s users actually see and
    interact with. It is responsible for presenting the results of a user’s request
    and providing the mechanism by which the next request can be made to the system.

    *   The command and control layer processes the request from the user. Based on
    this analysis, it delegates to the business logic layer any processing required
    in order to fulfill the request. It then chooses which view is best suited to
    present the results to the user. In practice, this and the view layer are often
    combined into a single presentation layer. Even so, the role of display should
    be strictly separated from those of request handling and business logic invocation.

    *   The business logic layer is responsible for seeing to the business of a request.
    It performs any required calculations and marshals the resulting data.

    *   The data layer insulates the rest of the system from the mechanics of saving
    and acquiring persistent information. In some systems, the command and control
    layer uses the data layer to acquire the business objects with which it needs
    to work. In other systems, the data layer is hidden as much as possible.


    So what is the point of dividing a system in this way? As with so much else in
    this book, the answer lies with decoupling. By keeping business logic independent
    of the view layer, you make it possible to add new interfaces to your system with
    little or no rewriting.


    Imagine a system for managing event listings (this will be a very familiar example
    by the end of the chapter). The end user will naturally require a slick HTML interface
    . Administrators maintaining the system may require a command-line interface for
    building into automated systems. At the same time, you may be developing versions
    of the system to work with cell phones and other handheld devices. You may even
    begin to consider SOAP or a RESTful API .


    If you originally combined the underlying logic of your system with the HTML view
    layer (which is still a common strategy), these requirements would trigger an
    instant rewrite. If, on the other hand, you had created a tiered system, you would
    be able to bolt on new presentation strategies without the need to reconsider
    your business logic and data layers.


    By the same token, persistence strategies are subject to change. Once again, you
    should be able to switch between storage models with minimal impact on the other
    tiers in a system.


