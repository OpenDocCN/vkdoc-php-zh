    \ = $nospaces;\n    }\n}\n```\n\n该方法首先将 `$newName` 属性设置为 `null`（换句话说，即没有值）。该类最终将能够处理多个文件上传。因此，每次都需要重置该属性。\n\
    \n然后，`str_replace()` 函数将文件名中的空格替换为下划线，并将结果赋给 `$nospaces`。`str_replace()` 函数在《PHP\
    \ 解决方案 5-4》中已有描述。\n\n将 `$nospaces` 的值与 `$file['name']` 进行比较。如果两者不相同，则将 `$nospaces`\
    \ 赋值为 `$newName` 属性的值。\n\n这样就处理了文件名中的空格。在处理重复文件名之前，我们先修复将上传文件移动到目标位置的代码。\n\n5.\
    \ 如果文件名已更改，`moveFile()` 方法在保存文件时需要使用修改后的名称。像这样更新 `moveFile()` 方法的开头部分：\n\n```\n\
    protected function moveFile($file) {\n    $filename = $this->newName ?? $file['name'];\n\
    \    $success = move_uploaded_file($file['tmp_name'],\n        $this->destination\
    \ . $filename);\n    if ($success) {\n```\n\n新的第一行使用空合并运算符（参见第 4 章“使用空合并运算符设置默认值”）为\
    \ `$filename` 赋值。如果 `$newName` 属性已由 `checkName()` 方法设置，则使用新名称。否则，将包含 `$_FILES`\
    \ 数组中原始值的 `$file['name']` 赋给 `$filename`。\n\n在第二行中，`$filename` 替换了连接到 `$destination`\
    \ 属性的值。因此，如果名称已更改，则使用新名称存储文件。但如果没有进行任何更改，则使用原始名称。\n\n6. 让用户知道文件名是否已更改是个好主意。对 `moveFile()`\
    \ 中在文件成功上传时创建消息的条件语句进行如下更改：\n\n```\nif ($success) {\n    $result = $file['name']\
    \ . ' was uploaded successfully';\n    if (!is_null($this->newName)) {\n     \
    \   $result .= ', and was renamed ' . $this->newName;\n    }\n    $this->messages[]\
    \ = $result;\n}\n```\n\n如果 `$newName` 属性不为 `null`，则说明文件已被重命名，并且会使用组合连接运算符（`.=`）将该信息添加到存储在\
    \ `$result` 中的消息里。\n\n7. 保存 `Upload.php` 并测试上传文件名中带有空格的文件。空格应被替换为下划线，如图 9-7 所示。\n\
    \n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig7_HTML.jpg](img/332054_4_En_9_Fig7_HTML.jpg)\n\
    \n**图 9-7.** 空格已被替换为下划线\n\n8. 接下来，将重命名重复文件的代码添加到 `checkName()` 方法中。在方法结束的花括号之前插入以下代码：\n\
    \n```\nif ($renameDuplicates) {\n    $name = $this->newName ?? $file['name'];\n\
    \    if (file_exists($this->destination . $name)) {\n        // 重命名文件\n      \
    \  $basename = pathinfo($name, PATHINFO_FILENAME);\n        $extension = pathinfo($name,\
    \ PATHINFO_EXTENSION);\n        $this->newName = $basename . '_' . time() . \"\
    .$extension\";\n    }\n}\n```\n\n条件语句检查 `$renameDuplicates` 是 `true` 还是 `false`。花括号内的代码仅在它为\
    \ `true` 时执行。\n\n条件块内的第一行代码使用空合并运算符设置 `$name` 的值。这与 `moveFile()` 方法中使用的技术相同。如果\
    \ `$newName` 属性有值，则将该值赋给 `$name`。否则，使用原始名称。\n\n然后，我们可以通过将 `$name` 连接到 `$destination`\
    \ 属性上以获取完整路径，并将其传递给 `file_exists()` 函数，来检查是否已存在同名文件。如果上传目录中已存在同名的文件，此函数返回 `true`。\n\
    \n如果已存在同名文件，接下来的两行使用 `pathinfo()` 将该文件名分别拆分为基本名称和扩展名，所用常量分别为 `PATHINFO_FILENAME`\
    \ 和 `PATHINFO_EXTENSION`。现在，我们已经将基本名称和扩展名分别存储在单独的变量中，通过在基本名称和扩展名之间插入一个数字来构建新名称就变得很容易了。理想情况下，这些数字应从\
    \ 1 开始递增。然而，在一个繁忙的网站上，这样做会消耗大量资源，并且无法保证避免两个用户同时上传同名文件时出现的竞争条件。我选择了一种更简单的解决方案，即在基本名称和扩展名之间插入一个下划线，后跟当前的\
    \ Unix 时间戳。`time()` 函数返回以自 1970 年 1 月 1 日午夜 UTC（协调世界时）以来经过的秒数表示的当前时间。\n\n9. 保存\
    \ `Upload.php` 并在 `file_upload.php` 中测试修订后的类。首先，将 `false` 作为第四个参数传递给 `upload()`\
    \ 方法，如下所示：\n\n```\n$loader->upload('image', $max, ['application/pdf'], false);\n\
    ```\n\n10. 多次上传同一文件。您应该会收到上传成功的消息，但当您检查 `upload_test` 文件夹的内容时，应该只有一份该文件的副本。每次上传都会覆盖之前的文件。\n\
    \n11. 从对 `upload()` 的调用中移除最后一个参数：\n\n```\n$loader->upload('image', $max, ['application/pdf']);\n\
    ```\n\n12. 保存 `file_upload.php` 并重复测试，多次上传同一文件。每次上传该文件时，您应该都会看到一条消息，提示该文件已被重命名。\n\
    \n13. 通过检查 `upload_test` 文件夹的内容来查看结果。您应该会看到类似于图 9-8 的内容。\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig8_HTML.jpg](img/332054_4_En_9_Fig8_HTML.jpg)\n\
    \n**图 9-8.** 该类可去除文件名中的空格并防止文件被覆盖\n\n如有必要，您可以对照 `ch09/PhpSolutions/File` 文件夹中的\
    \ `Upload_04.php` 检查您的代码。\n\n**提示**  \n虽然 `upload()` 方法的最后三个参数是可选的，但如果您只想更改第四个参数，则不能省略第二个和第三个参数。在这种情况下，第二个和第三个参数的默认值为\
    \ `null`，因此在设置第四个参数之前，您需要向它们中的每一个传递 `null` 或一个明确的值。选择可选参数的顺序是一种设计决策。将最不可能更改的参数放在最后。\n"
- fmt: "# Uploading Multiple Files\n\nYou now have a flexible class for file uploads,\
    \ but it can handle only one file at a time. Adding the `multiple` attribute to\
    \ the file field’s `<input>` tag permits the selection of multiple files in an\
    \ HTML5-compliant browser. Older browsers also support multiple uploads if you\
    \ add extra file fields to your form. The final stage in building the `Upload`\
    \ class is to adapt it to handle multiple files. To understand how the code works,\
    \ you need to see what happens to the `$_FILES` array when a form allows for multiple\
    \ uploads.\n\n## How the `$_FILES` Array Handles Multiple Files\n\nSince `$_FILES`\
    \ is a multidimensional array, it’s capable of handling multiple uploads. In addition\
    \ to adding the `multiple` attribute to the `<input>` tag, you need to add an\
    \ empty pair of square brackets to the `name` attribute, like this:\n\n```\n<input\
    \ type=\"file\" name=\"image[]\" multiple>\n```\n\nAs you learned in Chapter [6](#332054_4_En_6_Chapter.xhtml),\
    \ adding square brackets to the `name` attribute submits multiple values as an\
    \ array. You can examine how this affects the `$_FILES` array by using `multi_upload_01.php`\
    \ or `multi_upload_02.php` in the `ch09` folder. Figure [9-9](#332054_4_En_9_Chapter.xhtml#Fig9)\
    \ shows the result of selecting three files in a modern desktop browser that supports\
    \ the `multiple` attribute.\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig9_HTML.jpg](images/332054_4_En_9_Chapter/332054_4_En_9_Fig9_HTML.jpg)\n\
    \n**Figure 9-9.** The `$_FILES` array can upload multiple files in a single operation\n\
    \nAlthough this structure is not as convenient as having the details of each file\
    \ stored in a separate subarray, the numeric keys keep track of the details that\
    \ refer to each file. For example, `$_FILES['image']['name'][2]` relates directly\
    \ to `$_FILES['image']['tmp_name'][2]`, and so on.\n\nAll modern desktop browsers\
    \ support the `multiple` attribute, as does Safari on iOS (since version 6.1).\
    \ This attribute is not supported in Internet Explorer 9 or earlier, nor in Android\
    \ and some other mobile browsers. Browsers that don’t support the `multiple` attribute\
    \ upload a single file using the same structure, so the name of the file is stored\
    \ as `$_FILES['image']['name'][0]`.\n\n> **Tip**  \n> If you need to support multiple\
    \ file uploads on older browsers, omit the `multiple` attribute and create separate\
    \ file input fields for however many files you want to upload simultaneously.\
    \ Give each `<input>` tag the same `name` attribute followed by square brackets.\
    \ The resulting structure of the `$_FILES` array is the same as in Figure [9-9](#332054_4_En_9_Chapter.xhtml#Fig9).\n\
    \n## PHP Solution 9-6: Adapting the Class to Handle Multiple Uploads\n\nThis PHP\
    \ solution shows how to adapt the `upload()` method of the `Upload` class to handle\
    \ multiple file uploads. The class automatically detects when the `$_FILES` array\
    \ is structured as in Figure [9-9](#332054_4_En_9_Chapter.xhtml#Fig9) and uses\
    \ a loop to handle however many files are uploaded.\n\nWhen you upload a file\
    \ from a form designed to handle only single uploads, the `$_FILES` array stores\
    \ the filename as a string in `$_FILES['image']['name']`. But when you upload\
    \ from a form capable of handling multiple uploads, `$_FILES['image']['name']`\
    \ is an array. Even if only one file is uploaded, its name is stored as `$_FILES['image']['name'][0]`.\
    \ So, by detecting if the `name` element is an array, you can decide how to process\
    \ the `$_FILES` array. If the `name` element is an array, you need to extract\
    \ the details of each file into separate arrays, and then use a loop to process\
    \ each one.\n\nWith that in mind, continue working with your existing class file.\
    \ Alternatively, use `Upload_04.php` in the `ch09/PhpSolutions/File` folder.\n\
    \n1.  Amend the `upload()` method by adding a conditional statement to check if\
    \ the `name` element of `$uploaded` is an array:\n\n    ```\n    public function\
    \ upload($fieldname, $size = null, array $mime = null,\n    $renameDuplicates\
    \ = true) {\n    $uploaded = $_FILES[$fieldname];\n    if (!is_null($size) &&\
    \ $size > 0) {\n    $this->max = (int) $size;\n    }\n    if (!is_null($mime))\
    \ {\n    $this->permitted = array_merge($this->permitted, $mime);\n    }\n   \
    \ if (is_array($uploaded['name'])) {\n    // deal with multiple uploads\n    }\
    \ else {\n    if ($this->checkFile($uploaded)) {\n    $this->checkName($uploaded,\
    \ $renameDuplicates);\n    $this->moveFile($uploaded);\n    }\n    }\n    }\n\
    \    ```\n\n    If `$uploaded['name']` is an array, it needs special handling.\
    \ The existing call to `checkFile()` now goes inside the `else` block.\n\n2. \
    \ In order to deal with multiple uploads, the challenge is to gather the five\
    \ values associated with a single file (`name`, `type`, etc.) before passing them\
    \ to the `checkFile()`, `checkName()`, and `moveFile()` methods.\n\n    If you\
    \ refer to Figure [9-9](#332054_4_En_9_Chapter.xhtml#Fig9), each element in the\
    \ `$uploaded` array is an indexed array. So, the name of the first file is at\
    \ index 0 of the name subarray, its type is at index 0 of the type subarray, and\
    \ so on. We can use a loop to extract each value at index 0 and combine the values\
    \ with the relevant keys.\n\n    First, we need to find out how many files have\
    \ been uploaded. That’s easily done by passing the name subarray to the `count()`\
    \ function. Add the following code after the multiple uploads comment like this:\n\
    \n    ```\n    // deal with multiple uploads\n    $numFiles = count($uploaded['name']);\n\
    \    ```\n\n3.  Next, extract the subarray keys by adding the following code on\
    \ the next line:\n\n    ```\n    $keys = array_keys($uploaded);\n    ```\n\n \
    \   This creates an array consisting of `name`, `type`, `tmp_file`, and so on.\n\
    \n4.  Now we can create a loop to build an array of the details of each file.\
    \ Add the following code after the code you have just inserted:\n\n    ```\n \
    \   for ($i = 0; $i < $numFiles; $i++) {\n    $values = array_column($uploaded,\
    \ $i);\n    $currentfile = array_combine($keys, $values);\n    print_r($currentfile);\n\
    \    }\n    ```\n\n    The loop reorganizes the contents of the `$_FILES` array\
    \ so that the details of each file are available as if they had been uploaded\
    \ individually. In other words, instead of all the name, type, and other elements\
    \ being grouped together, `$currentfile` contains an associative array of a single\
    \ file’s details that can be processed using the methods we’ve already defined\
    \ in the `Upload` class.\n\n    It achieves this with just two lines of code.\
    \ So, let’s examine what’s going on. The `array_column()` function extracts from\
    \ a multidimensional array all elements in subarrays that have the same key or\
    \ index passed to it as the second argument. In this case, the second argument\
    \ is the counter `$i`. When the loop first runs, `$i` is 0. So, it extracts the\
    \ value at index 0 in each subarray of `$uploaded` (in other words `$_FILES['image']`).\
    \ The fact that each subarray has a different key (`name`, `type`, etc.) is irrelevant;\
    \ `array_column()` searches only for matching keys or indexes inside each subarray.\
    \ In effect, it gets the details of the first file that has been uploaded.\n\n\
    \    The `array_combine()` function then builds an array, assigning each value\
    \ to its related key. So, the value at index 0 of the name subarray becomes `$currentfile['name']`,\
    \ the value at index 0 of the type subarray becomes `$currentfile['type']`, and\
    \ so on.\n\n    The next time the loop runs, `$i` is incremented, building an\
    \ array of the second file’s details. The loop keeps on running until the details\
    \ of all files have been processed. Because this can be difficult to grasp conceptually,\
    \ I’ve added `print_r()` to inspect the results.\n\n5.  Save `Upload.php`. To\
    \ test it, update `file_upload.php` by adding a pair of square brackets at the\
    \ end of the `name` attribute in the file field and insert the `multiple` attribute,\
    \ like this:\n\n    ```\n    <input type=\"file\" name=\"image[]\" multiple>\n\
    \    ```"
