- "# 使用变量表示变化的值\n\n图 3-1 中的代码看起来像是显示年份范围的一种非常冗长的方式。直接输入实际日期肯定简单得多？是的，确实如此，但从长远来看，PHP\
  \ 解决方案能为你节省时间。无需每年手动更新版权声明，PHP 代码会自动完成。你只需编写一次代码，之后便可高枕无忧。更重要的是，正如你在下一章将看到的，如果将代码存储在外部文件中，对外部文件所做的任何更改都会反映在网站的每个页面上。\n\
  \n这种自动显示年份的能力依赖于 PHP 的两个关键方面：变量和函数。顾名思义，函数用于执行操作；它们执行预设任务，例如获取当前日期并将其转换为人类可读的格式。稍后我会介绍函数，所以让我们先来看变量。图\
  \ 3-1 中的脚本包含两个变量：`$startYear` 和 `$thisYear`。\n\n**提示**\n\n变量只是你赋予某个可能变化或你事先未知事物的一个名称。PHP\
  \ 中的变量总是以 `$`（美元符号）开头。\n\n尽管变量的概念听起来很抽象，但我们在日常生活中一直在使用变量。当你第一次见到某人时，你首先会问的问题之一是\"\
  你叫什么名字？\"无论你刚认识的人是汤姆、迪克还是哈利，\"名字\"这个词始终保持不变。同样，对于你的银行账户，资金不断进出（似乎主要是支出），但如图 3-2\
  \ 所示，无论你是囊中羞涩还是富甲一方，可用金额始终被称为余额。\n\n![A978-1-4842-0635-5_3_Fig2_HTML.jpg](img/A978-1-4842-0635-5_3_Fig2_HTML.jpg)\n\
  \n图 3-2. 银行对账单上的余额是变量的一个日常例子——名称保持不变，即使数值可能每天都在变化\n\n所以，\"名字\"和\"余额\"就是日常生活中的变量。只需在它们前面加上美元符号，就得到了两个现成的\
  \ PHP 变量，就像这样：\n\n`$name`\n\n`$balance`\n\n很简单。\n\n## 命名变量\n\n你可以选择几乎任何你喜欢的内容作为变量名，只要记住以下规则即可：\n\
  \n- 变量始终以美元符号（`$`）开头。\n- 美元符号后的第一个字符不能是数字。\n- 不允许有空格或标点符号，下划线（`_`）除外。\n- 变量名区分大小写：`$startYear`\
  \ 和 `$startyear` 不是同一个变量。\n\n在为变量选择名称时，明智的做法是选择一个能说明其用途的名称。你目前看到的变量——`$startYear`、`$thisYear`、`$name`\
  \ 和 `$balance`——就是很好的例子。由于变量名中不能使用空格，一个好习惯是在组合多个单词时，将第二个及后续单词的首字母大写（有时称为驼峰式命名）。另一种方法是使用下划线（`$start_year`、`$this_year`等）。\n\
  \n从技术上讲，你可以使用下划线作为美元符号后的第一个字符，但不推荐这样做。PHP 预定义变量（例如本章稍后描述的超级全局数组）以下划线开头，因此你可能会意外选择相同的名称，从而给脚本带来问题。\n\
  \n不要试图通过使用非常短的变量来节省时间。使用 `$sy`、`$ty`、`$n` 和 `$b` 而不是更具描述性的名称，会使代码更难理解——从而增加编写难度。更重要的是，这会使错误更难发现。当然，规则总有例外。按照惯例，`$i`、`$j`\
  \ 和 `$k` 经常用于记录循环运行的次数，而 `$e` 则用于错误检查。你将在本章后面看到这些示例。\n\n**注意**\n\n尽管在变量名的选择上有相当大的自由度，但不能使用\
  \ `$this`，因为它在 PHP 面向对象编程中具有特殊含义。还建议避免使用 [`php.net/manual/en/reserved.php`](http://php.net/manual/en/reserved.php)\
  \ 中列出的任何关键字。\n\n## 为变量赋值\n\n变量从多种来源获取值，包括以下途径：\n\n- 通过在线表单的用户输入\n- 数据库\n- 外部来源，例如新闻供稿或\
  \ XML 文件\n- 计算结果\n- 直接包含在 PHP 代码中\n\n无论值来自何处，都始终使用等号（`=`）进行赋值，如下所示：\n\n`$variable\
  \ = value;`\n\n变量放在等号左侧，值放在右侧。因为它负责赋值，所以等号被称为赋值运算符。\n\n**注意**\n\n从小对等号的熟悉使得我们很难改掉认为它表示\"\
  等于\"的习惯。然而，PHP 使用两个等号（`==`）来表示相等。这是初学者犯错的主要原因，也常常让经验更丰富的开发者措手不及。`=` 和 `==` 之间的区别将在本章后面更详细地介绍。\n\
  \n## 以分号结束命令\n\nPHP 由一系列命令或语句编写而成。每条语句通常告诉 PHP 引擎执行特定操作，并且其后必须始终跟一个分号，如下所示：\n\n\
  ```\n<?php\n执行这个;\n现在执行其他操作;\n?>\n```\n\n与所有规则一样，存在一个例外：如果代码块中只有一条语句，则可以省略分号。但是，不要这样做。与\
  \ JavaScript 不同，如果你省略分号，PHP 不会自动假设行尾应该有一个分号。这有一个很好的副作用：你可以将长语句分布在多行上，并为了便于阅读而安排代码的布局。PHP\
  \ 和 HTML 一样，会忽略代码中的空白。相反，它依靠分号来指示一条命令在何处结束，下一条命令在何处开始。\n\n**提示**\n\n在 PHP 语句（或命令）的末尾使用分号总是正确的。缺少分号会使你的脚本戛然而止。\n\
  \n## 注释脚本\n\nPHP 会将开始和结束 PHP 标签之间的所有内容视为要执行的语句，除非你通过将一段代码标记为注释来告诉它不要这样做。以下三个原因解释了你可能想要这样做的原因：\n\
  \n- 插入提醒，说明脚本的功能\n- 为稍后要添加的代码插入占位符\n- 临时禁用一段代码\n\n当脚本在你的脑海中还很清晰时，插入任何不会被处理的内容似乎没有必要。但是，如果你需要在几个月后修改脚本，你会发现注释比尝试单独理解代码更容易阅读。当你在团队中工作时，注释也至关重要。它们帮助你的同事理解代码的意图。\n\
  \n在测试期间，阻止一行代码甚至整个部分运行通常很有用。PHP 会忽略任何标记为注释的内容，因此这是一种打开和关闭代码的有用方法。\n\n添加注释有三种方式：两种用于单行注释，一种用于跨越多行的注释。\n\
  \n\n\n### 单行注释\n\n最常见的添加单行注释的方法是在前面加上两个斜杠，如下所示：\n\n```\n// this is a comment and\
  \ will be ignored by the PHP engine\n```\n\nPHP 会忽略从双斜杠到行尾的所有内容，因此你也可以将注释放在代码旁边（但只能放在右侧）：\n\
  \n```\n$startYear = 2006; // this is a valid comment\n```\n\n注释不是 PHP 语句，因此它们不以分号结尾。但不要忘记与注释在同一行的\
  \ PHP 语句末尾的分号。\n\n另一种风格是使用井号（`#`），如下所示：\n\n```\n# this is another type of comment\
  \ that will be ignored by the PHP engine\n```\n\n```\n$startYear = 2006; # this\
  \ also works as a comment\n```\n\n因为当多个 `#` 一起使用时非常醒目，这种注释风格通常用于指示较长脚本的章节，如下所示：\n\
  \n```\n##################\n# Menu section ##\n##################\n```\n\n### 多行注释\n\
  \n若要跨越几行进行注释，请使用与层叠样式表 (CSS) 和 JavaScript 中相同的注释风格。`/*` 和 `*/` 之间的任何内容都被视为注释，如下所示：\n\
  \n```\n/* This is a comment that stretches\nover several lines. It uses the same\n\
  beginning and end markers as in CSS. */\n```\n\n多行注释在测试或故障排除时特别有用，因为它们可以用来禁用大段脚本而无需删除它们。\n\
  \n> **提示**  \n> 良好的注释与精心选择的变量名相结合，使代码更易于理解和维护。\n\n## 使用数组存储多个值\n\n与其他编程语言一样，PHP\
  \ 允许你将多个值存储在一个称为数组的特殊类型变量中。思考数组的一种简单方式是，它们就像一张购物清单。尽管每个项目可能不同，但你可以用一个名字来统称它们。图 [3-3]\
  \ 展示了这一概念：变量 `$shoppingList` 统指所有五个项目——葡萄酒、鱼、面包、葡萄和奶酪。\n\n![A978-1-4842-0635-5_3_Fig3_HTML.jpg](img/A978-1-4842-0635-5_3_Fig3_HTML.jpg)\n\
  \n**图 3-3.** 数组是存储多个项目的变量，就像一张购物清单\n\n单个项目（或数组元素）通过变量名后紧跟方括号中的数字来标识。PHP 会自动分配该数字，但需要注意的是，编号总是从\
  \ 0 开始。因此，在我们的示例中，数组中的第一个项目（葡萄酒）被引用为 `$shoppingList[0]`，而不是 `$shoppingList[1]`。尽管有五个项目，但最后一个（奶酪）是\
  \ `$shoppingList[4]`。该数字被称为数组键或索引，这种类型的数组称为索引数组。\n\nPHP 使用另一种类型的数组，其中键是一个单词（或任何字母和数字的组合）。例如，一个包含本书详细信息的数组可能如下所示：\n\
  \n```\n$book['title'] = 'PHP Solutions: Dynamic Web Design Made Easy, Third Edition';\n\
  $book['author'] = 'David Powers';\n$book['publisher'] = 'Apress';\n$book['ISBN']\
  \ = '978-1-4842-0636-2';\n```\n\n这种类型的数组称为关联数组。请注意，数组键需要用引号括起来（单引号或双引号都可以）。它不应包含任何空格或标点符号，下划线除外。\n\
  \n数组是 PHP 中重要且有用的部分。你将大量使用它们，从下一章开始，你将把图片的详细信息存储到数组中，以便在网页上显示随机图像。当你以一系列数组的形式获取搜索结果时，数组也广泛用于数据库操作。\n\
  \n> **注意**  \n> 你可以在本章后半部分学习创建数组的各种方法。\n\n## PHP 的内置超全局数组\n\nPHP 有几个内置数组，它们会自动填充有用的信息。它们被称为超全局数组，并且都以美元符号后跟下划线开头。你经常会看到的两个是\
  \ `$_POST` 和 `$_GET`。它们分别包含通过超文本传输协议 (HTTP) 的 `post` 和 `get` 方法从表单传递的信息。超全局变量都是关联数组，并且\
  \ `$_POST` 和 `$_GET` 的键会自动从 URL 末尾表单元素的名称或查询字符串中的变量派生而来。\n\n假设你在表单中有一个名为 `\"address\"\
  ` 的文本输入字段；当表单通过 `post` 方法提交时，PHP 会自动创建一个名为 `$_POST['address']` 的数组元素，或者如果使用 `get`\
  \ 方法，则创建 `$_GET['address']`。如图 [3-4] 所示，`$_POST['address']` 包含访问者在文本字段中输入的任何值，使你可以将其显示在屏幕上、插入数据库、发送到你的电子邮件收件箱，或执行任何你想做的操作。\n\
  \n![A978-1-4842-0635-5_3_Fig4_HTML.jpg](img/A978-1-4842-0635-5_3_Fig4_HTML.jpg)\n\
  \n**图 3-4.** 你可以通过 `$_POST` 数组检索用户输入的值，该数组在使用 `post` 方法提交表单时自动创建\n\n你将在第 5 章中使用\
  \ `$_POST` 数组，通过电子邮件将在线反馈表单的内容发送到你的收件箱。你在本书中将使用的其他超全局数组包括用于从网络服务器获取信息的 `$_SERVER`（第\
  \ 4、12 和 13 章）、用于将文件上传到网站的 `$_FILES`（第 7 章），以及用于创建简单登录系统的 `$_SESSION`（第 9 章和第 17\
  \ 章）。\n\n> **警告**  \n> 不要忘记 PHP 是区分大小写的。所有超全局数组名称都大写。例如，`$_Post` 或 `$_Get` 将无法工作。\n\
  \n\n\n### 理解何时使用引号\n\n仔细观察图 3-1 中的 PHP 代码块，你会注意到第一个变量所赋的值并没有用引号括起来。它看起来像这样：\n\n\
  `$startYear = 2006;`\n\n然而，“使用数组存储多个值”的所有示例都使用了引号，例如：\n\n`$book['title'] = 'PHP\
  \ Solutions: Dynamic Web Design Made Easy, Third Edition';`\n\n简单的规则如下：\n\n- 数字：无需引号\n\
  - 文本：需要引号\n\n作为一般原则，在文本或字符串（PHP 和其他计算机语言中对文本的称呼）周围使用单引号还是双引号并不重要。实际情况其实比这更复杂一些，正如本章后半部分所述，因为\
  \ PHP 引擎对单引号和双引号的处理方式存在细微差别。\n\n**注意**\n\n“字符串”（string）一词借用于计算机和数学科学，它指的是一系列简单对象——在这里，就是文本中的字符。\n\
  \n现在需要记住的重点是，引号必须始终成对匹配。这意味着在单引号字符串中需要小心处理撇号（单引号），或在双引号字符串中处理双引号。请看下面这行代码：\n\n`$book['description']\
  \ = 'This is David's latest book on PHP.';`\n\n乍一看，似乎没什么问题。然而，PHP 引擎的解读方式与人眼不同，如图\
  \ 3-5 所示。\n\n![A978-1-4842-0635-5_3_Fig5_HTML.jpg](img/A978-1-4842-0635-5_3_Fig5_HTML.jpg)\n\
  \n*图 3-5. 单引号字符串中的撇号会混淆 PHP 引擎*\n\n解决这个问题有两种方法：\n\n- 如果文本中包含撇号，则使用双引号。\n- 在撇号前加上反斜杠（这称为转义）。\n\
  \n因此，以下两种写法都是可行的：\n\n`$book['description'] = \"This is David's latest book on PHP.\"\
  ;`\n\n`$book['description'] = 'This is David\\'s latest book on PHP.';`\n\n同样的规则也适用于双引号字符串中的双引号（只是规则反过来了）。下面的代码会引起问题：\n\
  \n`$play = \"Shakespeare's \\\"Macbeth\"\";`\n\n这种情况下，撇号没问题，因为它与双引号不冲突，但 Macbeth\
  \ 前面的双引号会导致字符串提前结束。要解决这个问题，以下两种写法均可接受：\n\n`$play = 'Shakespeare\\'s \"Macbeth\"\
  ';`\n\n`$play = \"Shakespeare's \\\"Macbeth\\\"\";`\n\n在第一个示例中，整个字符串被括在单引号内。这解决了\
  \ Macbeth 周围双引号的问题，但需要对 Shakespeare's 中的撇号进行转义。撇号在双引号字符串中没问题，但 Macbeth 两边的双引号都需要转义。因此，总结如下：\n\
  \n- 在双引号字符串中，单引号和撇号是安全的。\n- 在单引号字符串中，双引号是安全的。\n- 其他任何情况都必须使用反斜杠进行转义。\n\n**提示**\n\
  \n关键在于记住最外层的引号必须匹配。我偏好使用单引号，而将双引号保留用于它们具有特殊含义的情况，正如本章后半部分所述。\n\n### 特殊情况：True、False\
  \ 和 Null\n\n虽然文本应该用引号括起来，但有三种特殊情况——`true`、`false` 和 `null`——永远不应该用引号括起来，除非你想将它们视为真正的文本（或字符串）。前两者的意思正如你所想；最后一个，`null`，表示“无”或“无值”。\n\
  \n**注意**\n\n从技术上讲，`true` 和 `false` 是布尔值。这个名字来源于十九世纪数学家乔治·布尔，他设计了一套逻辑运算系统，该系统后来成为现代计算机运算的基础。这是一个复杂的主题，但你可以在\
  \ [`http://en.wikipedia.org/wiki/Boolean_algebra`](http://en.wikipedia.org/wiki/Boolean_algebra)\
  \ 了解更多。对大多数人来说，知道布尔值意味着 `true` 或 `false` 就足够了。\n\n如下一节所述，PHP 根据某事物是否等同于 `true` 或\
  \ `false` 来做决策。给 `false` 加上引号会产生令人惊讶的后果。请看下面这段代码：\n\n`$OK = false;`\n\n它的效果正如你所预期：使\
  \ `$OK` 为 false。现在，再看看这个：\n\n`$OK = 'false';`\n\n这与你预期的效果完全相反：它让 `$OK` 变成了 true！为什么？因为\
  \ `false` 周围的引号将它变成了字符串，而 PHP 将字符串视为 `true`。（本章后半部分的“PHP 眼中的真理”一节有更详细的解释。）\n\n关于\
  \ `true`、`false` 和 `null` 还需要注意的一点是，它们是大小写不敏感的。以下示例都是有效的：\n\n`$OK = TRUE;`\n\n`$OK\
  \ = tRuE;`\n\n`$OK = true;`\n\n因此，总结一下，PHP 将 `true`、`false` 和 `null` 视为特殊情况。\n\n\
  - 不要用引号括起它们。\n- 它们对大小写不敏感。\n\n\n\n### 做出决策\n\n决策、决策、决策……生活中充满了决策。PHP 也是如此。它们让 PHP\
  \ 能够根据不同的情况显示不同的输出。PHP 中的决策使用了条件语句。其中最常见的条件语句使用 `if`，并且其结构与日常语言非常相似。在现实生活中，你可能会遇到以下决策（诚然，如果你住在英国，这种情况并不常见）：如果天气热，我就去海滩。\n\
  \n用 PHP 伪代码表示，同样的决策是这样的：\n\n```\nif (天气热) {\n    我去海滩;\n}\n```\n\n被测试的条件放在圆括号内，执行的动作放在花括号之间。这是基本的决策模式：\n\
  \n```\nif (条件为真) {\n    // 如果条件为真，则执行此处的代码\n}\n```\n\n> **提示**  \n> 条件语句是控制结构，后面不需要跟分号。花括号将一组打算作为一个整体执行的语句聚合在一起。\n\
  \n只有当条件为 `true` 时，花括号内的代码才会被执行。如果条件为 `false`，PHP 会忽略花括号内的所有内容，并继续执行下一段代码。PHP 如何判断一个条件是\
  \ `true` 还是 `false` 将在下一节中描述。\n\n有时，`if` 语句就足够了，但你通常希望在条件不满足时执行一个默认动作。为此，可以使用 `else`，如下所示：\n\
  \n```\nif (条件为真) {\n    // 如果条件为真，则执行此处的代码\n} else {\n    // 如果条件为假，则执行的默认代码\n}\n\
  ```\n\n如果你想要更多的备选方案，可以像这样添加更多的条件语句：\n\n```\nif (条件为真) {\n    // 如果条件为真，则执行此处的代码\n\
  } else {\n    // 如果条件为假，则执行的默认代码\n}\n\nif (第二个条件为真) {\n    // 如果第二个条件为真，则执行此处的代码\n\
  } else {\n    // 如果第二个条件为假，则执行的默认代码\n}\n```\n\n在这种情况下，两个条件语句都会被执行。如果你希望只执行一个代码块，可以使用\
  \ `elseif`，如下所示：\n\n```\nif (条件为真) {\n    // 如果第一个条件为真，则执行此处的代码\n} elseif (第二个条件为真)\
  \ {\n    // 如果第一个条件为假，但第二个条件为真，则执行此处的代码\n} else {\n    // 如果两个条件都为假，则执行的默认代码\n}\n\
  ```\n\n你可以在一个条件语句中使用任意多的 `elseif` 子句。只有第一个计算结果为 `true` 的条件才会被执行；其他所有条件，即使也为真，也会被忽略。这意味着你需要按照你想要评估的优先级顺序来构建条件语句。这是一个严格的“先到先得”的层次结构。\n\
  \n> **注意**  \n> 尽管 `elseif` 通常写作一个单词，你也可以将 `else if` 作为两个独立的单词使用。\n\n另一种决策结构——`switch`\
  \ 语句——将在本章的后半部分介绍。\n\n### 进行比较\n\n条件语句只关心一件事：被测试的条件是否为 `true`。如果不是 `true`，那就必须是\
  \ `false`。没有折中或“可能”的余地。条件通常依赖于两个值的比较。这个比那个大吗？它们相等吗？等等。\n\n为了测试相等性，PHP 使用两个等号（`==`），如下所示：\n\
  \n```\nif ($status == 'administrator') {\n    // 发送到管理员页面\n} else {\n    // 拒绝进入管理区域\n\
  }\n```\n\n> **警告**  \n> 不要在第一行使用单个等号（`$status = 'administrator'`）。这样做会将你网站的管理区域开放给所有人。为什么？因为这会自动将\
  \ `$status` 的值设置为 `administrator`；它不是在比较两个值。要比较值，你必须使用两个等号。这是一个常见错误，但其后果可能具有灾难性。\n\
  \n大小比较使用数学符号小于（`<`）和大于（`>`）来进行。假设你在允许文件上传到服务器之前检查文件的大小。你可以像这样设置一个 50 KB 的最大大小（1\
  \ 千字节 = 1024 字节）：\n\n```\nif ($bytes > 51200) {\n    // 显示错误消息并放弃上传\n} else {\n\
  \    // 继续上传\n}\n```\n\n> **注意**  \n> 本章后半部分将介绍如何同时测试多个条件。\n\n### 使用缩进和空白提高清晰度\n\
  \n缩进代码有助于将语句组织成逻辑组，使理解脚本的流程变得更加容易。没有固定的规则；PHP 会忽略代码内的任何空白，因此你可以采用任何你喜欢的风格。重要的是要保持一致，这样你就能发现任何看起来不对劲的地方。\n\
  \n大多数人发现缩进四到五个空格能使代码最易读。风格上最大的差异可能在于各个开发者安排花括号的方式。我将代码块的开始花括号放在与前一行代码相同的行上，并将结束花括号放在代码块之后的新行上，如下所示：\n\
  \n```\nif ($bytes > 51200) {\n    // 显示错误消息并放弃上传\n} else {\n    // 继续上传\n}\n```\n\
  \n然而，其他人更喜欢这种风格：\n\n```\nif ($bytes > 51200)\n{\n    // 显示错误消息并放弃上传\n}\nelse\n{\n\
  \    // 继续上传\n}\n```\n\n风格并不重要。重要的是你的代码保持一致且易于阅读。\n\n### 使用循环处理重复性任务\n\n循环是巨大的时间节省器，因为它们一遍又一遍地执行相同的任务，但涉及的代码却非常少。它们经常与数组和数据库结果一起使用。你可以逐个遍历每个项目，寻找匹配项或执行特定任务。循环与条件语句结合使用时尤其强大，允许你一次遍历就对大量数据有选择地执行操作。最好通过在实际场景中运用循环来理解它们。所有循环结构的详细信息以及示例，请参阅本章的后半部分。\n\
  \n\n\n### 使用函数执行预设任务\n\n正如我之前提到的，函数用于执行各种操作……在 PHP 中，其数量之多令人难以置信。一个典型的 PHP 环境会为你提供数千个内置函数。别担心：你实际需要用到的只有一小部分，但知道\
  \ PHP 是一种功能完备的语言，这让人很安心。\n\n你在本书中将使用的函数能完成非常实用的任务，例如获取图像的高度和宽度、从现有图像创建缩略图、查询数据库、发送电子邮件等等。你能在\
  \ PHP 代码中识别出函数，因为它们总是跟随着一对圆括号。有时括号是空的，就像你在上一章 `phpversion.php` 中使用的 `phpversion()`\
  \ 那样。不过，更常见的情况是括号内包含变量、数字或字符串，就像图 3-1 脚本中的这行代码：\n\n`$thisYear = date('Y');`\n\n\
  这段代码计算当前年份并将其存储在变量 `$thisYear` 中。它的工作原理是将字符串 `'Y'` 传递给 PHP 内置函数 `date()`。像这样将值放在括号之间的操作被称为向函数传递参数（argument）。函数接收参数中的值并进行处理，以产生（或返回）结果。例如，如果你向\
  \ `date()` 传递字符串 `'M'` 而不是 `'Y'`，它将返回当前月份的三字母缩写（例如 Mar、Apr、May）。如下例所示，你将函数的结果赋值给一个命名恰当的变量来捕获它：\n\
  \n`$thisMonth = date('M');`\n\n**注意：** 第 14 章会深入介绍 PHP 如何处理日期和时间。\n\n有些函数接受多个参数。在这种情况下，需要在括号内用逗号分隔参数，就像这样：\n\
  \n`$mailSent = mail($to, $subject, $message);`\n\n不难理解，这会将一封电子邮件发送到第一个参数中存储的地址，主题行是第二个参数的内容，而消息体是第三个参数。你将在第\
  \ 5 章中了解这个函数的具体工作方式。\n\n**提示：** 你经常会看到术语“参数”替代“参数（argument）”出现。从技术上讲，parameter 指的是函数定义中使用的变量，而\
  \ argument 指的是传递给函数的实际值。在实践中，这两个术语往往可以互换使用。\n\n似乎所有内置函数还不够，PHP 还允许你构建自己的自定义函数。即使你不喜欢自己创建函数，在本书中你也会用到我创建的一些函数。使用它们的方式完全相同。\n\
  \n### 理解 PHP 类和对象\n\n函数和变量赋予了 PHP 巨大的能力和灵活性，但类和对象则将这门语言提升到了更高的层次。类是面向对象编程（OOP）的基本构建块，这是一种旨在使代码可重用且更易于维护的编程方法。PHP\
  \ 对 OOP 提供了广泛的支持，并且新特性通常以面向对象的方式实现。\n\n对象是一种复杂的数据类型，可以存储和操作值。类是定义对象特征的代码，可以被视为创建对象的蓝图。在\
  \ PHP 众多的内置类中，有两个特别引人关注：`DateTime` 和 `DateTimeZone` 类，它们处理日期和时区。你将在本书中使用的另外两个内置类是\
  \ `MySQLi` 和 `PDO`，它们用于与数据库通信。\n\n要创建对象，你需要使用 `new` 关键字和类名，就像这样：\n\n`$now = new\
  \ DateTime();`\n\n这将创建 `DateTime` 类的一个实例，并将其存储在一个名为 `$now` 的 `DateTime` 对象中。这与上一节中的\
  \ `date()` 函数的不同之处在于，`DateTime` 对象不仅知道它被创建的日期和时间，还知道 Web 服务器所使用的时区。而 `date()` 函数仅仅是根据传递给它的参数生成一个包含格式化日期的数字或字符串。\n\
  \n在前面的例子中，没有向类传递任何参数，但类可以像函数一样接受参数，你将在下一个例子中看到这一点。\n\n大多数类还具有属性和方法，它们类似于变量和函数，区别在于它们与类的特定实例相关。例如，你可以使用\
  \ `DateTime` 类的方法来更改某些值，比如月份、年份或时区。`DateTime` 对象还能够执行日期计算，而使用普通函数来实现则会复杂得多。\n\n\
  你可以使用 `->` 运算符（一个连字符后跟一个大于号）来访问对象的属性和方法。要重置 `DateTime` 对象的时区，可以像这样将一个 `DateTimeZone`\
  \ 对象作为参数传递给 `setTimezone()` 方法：\n\n`$westcoast = new DateTimeZone('America/Los_Angeles');`\n\
  \n`$now->setTimezone($westcoast);`\n\n这会将 `$now` 中存储的日期和时间重置为洛杉矶的当前日期和时间，无论 Web\
  \ 服务器位于何处，并会自动处理夏令时的调整。\n\n`DateTime` 和 `DateTimeZone` 类没有属性，但你可以使用相同的方式通过 `->`\
  \ 运算符来访问对象的属性：\n\n`$someObject->propertyName`\n\n如果你觉得对象、属性和方法这些概念难以理解，也不必担心。你只需要知道如何用\
  \ `new` 关键字实例化对象，以及如何使用 `->` 运算符访问属性和方法。\n\n**提示：** 关于 PHP 中 OOP 的深入讨论及大量动手示例，请参阅我的书《PHP\
  \ 面向对象解决方案》（friends of ED, 2008, ISBN: 978-1-4302-1011-5）。\n\n### 显示 PHP 输出\n\n\
  除非你能在网页中显示结果，否则所有这些后台的魔法就没有多大意义。在 PHP 中有两种方法可以做到这一点：使用 `echo` 或 `print`。两者之间有一些细微的差别，但这些差别非常微妙，你可以把它们视为完全相同。我个人更喜欢\
  \ `echo`，仅仅是因为它少一个字母。\n\n你可以将 `echo` 与变量、数字和字符串一起使用；只需把它放在你想要显示的任何内容前面，就像这样：\n\n\
  `$name = 'David';`\n\n`echo $name;   // 显示 David`\n\n`echo 5;       // 显示 5`\n\n\
  `echo 'David'; // 显示 David`\n\n当使用 `echo` 和 `print` 处理变量时，它们只能用于包含单个值的变量。你不能用它们来显示数组或数据库结果的内容。这正是循环如此有用的地方：你在循环内部使用\
  \ `echo` 或 `print` 来逐个显示每个元素。在本书的剩余部分，你将会看到很多这样的实际例子。\n\n你可能会看到脚本中 `echo` 和 `print`\
  \ 使用了括号，就像这样：\n\n`echo('David'); // 显示 David`\n\n括号没有区别。除非你喜欢为了打字而打字，否则可以省略它们。\n\
  \n#### 使用 Echo 简写语法\n\n当你只想显示单个变量或表达式的值（且没有其他内容）时，可以使用一个简写的 PHP 开始标签，它由一个左尖括号、一个问号和一个等号组成，就像这样：\n\
  \n`<p>My name is <?= $name; ?>.</p>`\n\n这会产生与以下代码完全相同的输出：\n\n`<p>My name is <?php\
  \ echo $name; ?>.</p>`\n\n因为它是 `echo` 的简写形式，所以同一个 PHP 块中不能有其他代码，但在将数据库结果嵌入网页时，它特别有用。不言而喻，在使用此简写之前，变量的值必须在之前的\
  \ PHP 块中设置好。\n\n**注意：** 在 PHP 5.4 之前，`echo` 简写语法只有在 `php.ini` 中启用了 `short_open_tag`\
  \ 配置设置时才有效。自 PHP 5.4 起，`<?=` 始终可用。\n\n\n\n### 连接字符串\n\nPHP 有一种相当独特的连接字符串（文本）的方式。尽管许多其他计算机语言使用加号（`+`），但\
  \ PHP 使用句点、点号或句号（`.`），如下所示：\n\n```\n$firstName = 'David';\n$lastName = 'Powers';\n\
  echo $firstName.$lastName; // 输出 DavidPowers\n```\n\n正如最后一行代码中的注释所示，当两个字符串这样连接时，PHP\
  \ 不会在它们之间留下任何间隙。不要误以为在句点后添加一个空格就能解决问题。实际上，你可以在句点的两侧随意添加任意数量的空格；结果始终相同，因为 PHP 会忽略代码中的空白字符。事实上，为了可读性，建议在句点的两侧各留一个空格。\n\
  \n要在最终输出中显示一个空格，你必须要么在其中一个字符串中包含一个空格，要么将空格作为一个独立的字符串插入，如下所示：\n\n```\necho $firstName\
  \ . ' ' . $lastName; // 输出 David Powers\n```\n\n**提示**：句点——或者赋予其正确名称的“连接运算符”——在其他大量代码中可能难以辨认。请确保你的脚本编辑器中的字体大小足够大，以便能够轻松阅读，不至于费力去区分句点和逗号。\n\
  \n"
- "# 处理数字\n\nPHP 可以对数字进行大量操作，从简单的加法到复杂的数学运算。本章后半部分将详细说明你可以在 PHP 中使用的算术运算符。目前你需要记住的是，数字除了小数点外不得包含任何标点符号。如果你给\
  \ PHP 提供包含逗号（或其他任何内容）作为千位分隔符的数字，PHP 会报错。\n\n## 理解 PHP 错误消息\n\n错误消息是编程生活中不可避免的现实，因此你需要理解它们试图告诉你什么。下图展示了一条典型的错误消息。\n\
  \n![A978-1-4842-0635-5_3_Figa_HTML.jpg](img/A978-1-4842-0635-5_3_Figa_HTML.jpg)\n\
  \nPHP 错误消息会报告 PHP 发现问题的行号。大多数新手——很自然地——会认为那就是寻找错误的地方。但这是错误的……\n\n大多数时候，PHP 是在告诉你发生了意外情况。换句话说，错误位于那行代码之前。上面的错误消息意味着\
  \ PHP 在原本不应该有 `echo` 命令的地方发现了一个 `echo` 命令。（错误消息总是用 `T_` 作为 PHP 元素的前缀，`T_` 代表标记。忽略它就好。）\n\
  \n与其担心 `echo` 命令可能出了什么问题（很可能没问题），不如开始往回查找，寻找任何缺失的内容，可能上一行缺少了一个分号或结束引号。\n\n有时，消息会在脚本的最后一行报告错误。这通常意味着你在页面更靠前的位置遗漏了一个闭合的花括号。\n\
  \n错误主要有七种类型，按重要性从高到低排列如下：\n\n- **致命错误**：错误之前的任何 HTML 输出都会显示，但一旦遇到该错误——正如其名——其他所有内容都会立即被终止。致命错误通常由引用不存在的文件或函数引起。\n\
  - **可恢复错误**：这种错误仅在抛出特定类型的错误（称为异常）时发生。错误消息包含大量细节，解释了问题的原因和位置，但初学者可能难以理解。要避免可恢复错误，请使用“处理异常”部分中描述的\
  \ `try` 和 `catch` 块。\n- **解析错误**：这意味着你的代码语法中存在错误，例如引号不匹配、缺少分号或闭合花括号。它会立即停止脚本，甚至不允许显示任何\
  \ HTML 输出。\n- **警告**：这提醒你存在一个严重问题，例如缺少包含文件（包含文件是第 4 章的主题）。但是，该错误严重程度不足以阻止脚本的其余部分执行。\n\
  - **弃用**：这警告你某些功能计划在未来的 PHP 版本中移除。如果你看到这种类型的错误消息，你应该认真考虑更新你的脚本，因为如果你的服务器升级，它可能突然停止工作。\n\
  - **严格**：这种类型的错误消息会警告你使用了不被认为是良好实践的技术。\n- **通知**：这告知你一些相对较小的问题，例如使用了未声明的变量。尽管这种错误不会阻止你的页面显示（并且你可以关闭通知的显示），但你应始终尝试消除它们。任何错误都是对输出的威胁。\n\
  \n### 为什么我的页面是空白的？\n\n许多初学者将 PHP 页面加载到浏览器中并看到完全空白的内容时，都会感到困惑。没有错误消息，只是一个空白页面。当出现解析错误（即代码中存在错误）并且\
  \ `php.ini` 中的 `display_errors` 指令被关闭时，就会发生这种情况。\n\n如果你遵循了上一章的建议，在你的本地测试环境中应该已启用\
  \ `display_errors`。然而，大多数托管公司会关闭 `display_errors`。这对于安全性有好处，但会使在远程服务器上进行故障排除变得困难。除了解析错误，缺少包含文件也经常导致空白页面。\n\
  \n你可以通过在页面顶部添加以下代码来为单个脚本开启错误显示：\n\n```\nini_set('display_errors', '1');\n```\n\n\
  将此代码放在 PHP 开始标签后的第一行，或者如果 PHP 代码在页面下方，则放在页面顶部的一个独立 PHP 代码块中。当你上传页面并刷新浏览器时，你应该会看到\
  \ PHP 生成的任何错误消息。\n\n如果在添加这行代码后仍然看到空白页面，这意味着你的语法存在错误。在本地使用开启了 `display_errors` 的环境测试页面，以找出导致问题的原因。\n\
  \n**注意**：纠正错误后，请移除开启错误显示的代码。如果稍后脚本中其他部分出现故障，你不想在实时网站上暴露潜在的漏洞。\n\n\n\n#### 处理异常\n\
  \nPHP 5 引入了一种新的错误处理方式，与许多其他编程语言类似，称为异常。当问题发生时，许多内置类会自动抛出异常——即生成一种特殊类型的对象，其中包含错误原因和发生位置的详细信息。你也可以使用关键字\
  \ `throw` 抛出自定义异常，如下所示：\n\n```\nif (错误发生) {\n    throw new Exception('休斯顿，我们遇到问题了');\n\
  }\n```\n\n括号内的字符串用作错误消息。显然，在实际脚本中，你需要让消息更明确。当异常被抛出时，你应在另一个代码块中处理它，这个代码块被恰当地称为 `catch`。\n\
  \n当使用对象时，将你的主脚本包裹在一个名为 `try` 的块中，并将错误处理代码放在 `catch` 块中。如果抛出异常，PHP 引擎会放弃 `try` 块中的代码，并仅执行\
  \ `catch` 块中的代码。其优点是，你可以使用 `catch` 块将用户重定向到错误页面，而不是在屏幕上显示难看的错误消息——如果关闭了错误消息显示（在线网站应如此设置），则可能显示空白屏幕。\n\
  \n> **注意**：`try` 和 `catch` 块必须始终成对使用。不能只有一个而没有另一个。\n\n在开发阶段，你应该使用 `catch` 块来显示异常生成的错误消息，如下所示：\n\
  \n```\ntry {\n    // 主脚本写在这里\n} catch (Exception $e) {\n    echo $e->getMessage();\n\
  }\n```\n\n这会生成一条错误消息，通常比可恢复错误生成的长篇消息更容易理解。在前述问题的情况下，它会输出“休斯顿，我们遇到问题了”。虽然我之前建议使用描述性变量名，但在异常处理中使用\
  \ `$e` 是一种常见惯例。\n\n> **提示**：如果你能读到这里，恭喜你。现在你应该拥有足够的知识来开始实践了。本章剩余部分将更详细地介绍编写 PHP\
  \ 脚本的各个方面。与其硬着头皮继续，我建议你稍作休息，然后进入下一章。当你获得一些 PHP 实践经验后再回来查阅下面的参考部分，因为那时你会更容易理解。\n\n\
  ## PHP：快速参考\n\n以下各节并不试图涵盖 PHP 语法的所有方面。为此，你应该参考 [`http://php.net/manual/en/`](http://php.net/manual/en/)\
  \ 上的 PHP 文档，或查阅更详细的参考书，例如 W. Jason Gilmore 所著的 *Beginning PHP and MySQL: From Novice\
  \ to Professional, Fourth Edition*（Apress, 2010，ISBN: 978-1-4302-3114-1）。\n\n###\
  \ 在现有网站中使用 PHP\n\n在同一网站中混合使用 `.html` 和 `.php` 页面是没有问题的。但是，PHP 代码通常仅在具有 `.php` 文件扩展名的文件中才会被处理，因此，即使并非所有页面都包含动态功能，最好也为所有页面使用相同的扩展名。这样，你就可以灵活地向页面添加\
  \ PHP，而不会破坏现有链接或丢失搜索引擎排名。\n\n### PHP 中的数据类型\n\nPHP 是一种所谓的弱类型语言。实际上，这意味着与某些其他计算机语言（例如\
  \ Java 或 C#）不同，PHP 不关心你在变量中存储什么类型的数据。\n\n大多数时候，这非常方便，但你需要小心处理用户输入。你可能期望用户在表单中输入数字，但如果遇到的是单词，PHP\
  \ 也不会反对。仔细检查用户输入是后续章节的主要主题之一。\n\n尽管 PHP 是弱类型，但它使用以下八种数据类型：\n\n- **整型（Integer）**：这是一个整数，例如\
  \ 1、25、42 或 2006。整数不得包含任何逗号或其他标点作为千位分隔符。你也可以使用十六进制数，它们应以 `0x` 开头（例如 `0xFFFFFF`、`0x000000`）。\n\
  - **浮点数（Floating-point number）**：这是一个包含小数点的数字，例如 9.99、98.6 或 2.1。PHP 不支持使用逗号作为小数点（这在许多欧洲国家很常见）。你必须使用句点。与整型一样，浮点数不得包含千位分隔符。（此类型也称为\
  \ float 或 double。）\n- **字符串（String）**：字符串是任意长度的文本。它可以短至零个字符（空字符串），并且没有上限。\n- **布尔型（Boolean）**：此类型只有两个值：`true`\
  \ 或 `false`。但是，PHP 会将其他值隐式视为真或假。请参阅本章后面的“根据 PHP 判断真假”。\n- **数组（Array）**：数组是一种能够存储多个值的变量，尽管它可能不包含任何值（空数组）。数组可以保存任何数据类型，包括其他数组。数组的数组称为多维数组。有关如何向数组填充值的详细信息，请参阅本章后面的“创建数组”。\n\
  - **对象（Object）**：对象是一种复杂的数据类型，能够存储和操作值。你将在第 6 章了解更多关于对象的内容。\n- **资源（Resource）**：当\
  \ PHP 连接到外部数据源（如文件或数据库）时，它会将对它的引用存储为资源。\n- **NULL**：这是一个特殊的数据类型，表示变量没有值。\n\nPHP\
  \ 弱类型的一个重要副作用是，如果将整数或浮点数括在引号中，PHP 会自动将其从字符串转换为数字，从而无需任何特殊处理即可执行计算。这与 JavaScript\
  \ 不同，可能会产生意想不到的后果。当 PHP 看到加号（`+`）时，它假设你想要执行加法，因此它会尝试将字符串转换为整数或浮点数，如下例所示（代码位于 `ch03`\
  \ 文件夹中的 `data_conversion_01.php`）：\n\n```\n$fruit = '2 apples';\n$veg = ' 2 carrots';\n\
  echo $fruit + $veg;  // 显示 4\n```\n\nPHP 发现 `$fruit` 和 `$veg` 都以数字开头，因此它提取数字并忽略其余部分。但是，如果字符串不是以数字开头，PHP\
  \ 会将其转换为 0，如下例所示（代码位于 `data_conversion_02.php`）：\n\n```\n$fruit = '2 apples';\n\
  $veg = ' and 2 carrots';\necho $fruit + $veg;  // 显示 2\n```\n\n弱类型有利有弊。它使 PHP 对初学者非常容易，但这也意味着在使用变量之前，通常需要检查它是否包含正确的数据类型。\n\
  \n### 使用 PHP 进行计算\n\nPHP 非常擅长处理数字，可以执行各种计算，从简单的算术到复杂的数学运算。此参考部分仅涵盖标准算术运算符。有关 PHP\
  \ 支持的数学函数和常量的详细信息，请参见 [`http://php.net/manual/en/book.math.php`](http://php.net/manual/en/book.math.php)。\n\
  \n> **注意**：常量与变量类似，都使用名称来表示值。但是，常量的值一旦定义就不能更改。所有 PHP 预定义常量都是大写的。与变量不同，它们不以美元符号开头。例如，π\
  \ 的常量是 `M_PI`。\n\n\n\n## 算术运算符\n\n标准算术运算符的工作方式与你预期的一致，尽管有些运算符看起来与你在学校学到的略有不同。例如，星号（`*`）用作乘号，斜杠（`/`）用于表示除法。表\
  \ 3-1 展示了标准算术运算符如何工作的示例。为演示其效果，设置了以下变量：\n\n```\n$x = 20;\n$y = 10;\n$z = 3;\n```\n\
  \n**表 3-1.** PHP 中的算术运算符\n\n| 操作 | 运算符 | 示例 | 结果 |\n| --- | --- | --- | --- |\n\
  | 加法 | `+` | `$x + $y` | `30` |\n| 减法 | `-` | `$x - $y` | `10` |\n| 乘法 | `*` | `$x\
  \ * $y` | `200` |\n| 除法 | `/` | `$x / $y` | `2` |\n| 取模 | `%` | `$x % $z` | `2`\
  \ |\n| 自增（加 1） | `++` | `$x++` | `21` |\n| 自减（减 1） | `--` | `$y--` | `9` |\n| 乘方\
  \ | `**` | `$y**$z` | `1000` |\n\n取模运算符在运算前会通过去除小数部分将两个数字转换为整数，然后返回除法的余数，如下所示：\n\
  \n```\n5 % 2.5    // 结果为 1，而不是 0（2.5 的小数部分被去除）\n10 % 2     // 结果为 0\n```\n\n取模运算对于判断一个数是奇数还是偶数非常有用。`$number\
  \ % 2` 总是产生 0 或 1。如果结果为 0，则表示没有余数，因此该数为偶数。\n\n自增（`++`）和自减（`--`）运算符可以放在变量之前或之后。当它们位于变量之前时，会在进行任何进一步计算之前加\
  \ 1 或减 1。当它们位于变量之后时，会先执行主要计算，然后再加 1 或减 1。由于美元符号是变量名的组成部分，当自增和自减运算符用于变量前面时，它们会放在美元符号之前：\n\
  \n```\n++$x\n--$y\n```\n\n乘方运算符需要 PHP 5.6 或更高版本。在 PHP 5.6 之前，请使用 `pow()` 函数，该函数接受两个参数：底数和指数。例如，`pow(10,\
  \ 3)` 等同于 `10**3`。两者都表示 10 的 3 次方。\n\n## 确定计算顺序\n\nPHP 中的计算遵循与标准算术相同的优先级规则。表 3-2\
  \ 按照优先级顺序列出了算术运算符，最高优先级位于顶部。\n\n**表 3-2.** 算术运算符的优先级\n\n| 分组 | 运算符 | 规则 |\n| ---\
  \ | --- | --- |\n| 括号 | `()` | 先计算括号内的操作。如果这些表达式嵌套，则最先计算最内层的。 |\n| 乘方 | `**` | |\n\
  | 自增/自减 | `++ --` | |\n| 乘法和除法 | `* / %` | 如果表达式包含两个或更多这些运算符，它们将从左到右进行计算。 |\n| 加法和减法\
  \ | `+ -` | 如果表达式包含两个或更多这些运算符，它们将从左到右进行计算。 |\n\n## 结合计算与赋值\n\nPHP 提供了一种简写方式，可以通过组合赋值运算符对变量执行计算并将结果重新赋值给该变量。主要的运算符列于表\
  \ 3-3。\n\n**表 3-3.** PHP 中使用的组合算术赋值运算符\n\n| 运算符 | 示例 | 等同于 |\n| --- | --- | ---\
  \ |\n| `+=` | `$a += $b` | `$a = $a + $b` |\n| `-=` | `$a -= $b` | `$a = $a - $b`\
  \ |\n| `*=` | `$a *= $b` | `$a = $a * $b` |\n| `/=` | `$a /= $b` | `$a = $a / $b`\
  \ |\n| `%=` | `$a %= $b` | `$a = $a % $b` |\n| `**=` | `$a **= $b` | `$a = $a **\
  \ $b` |\n\n组合乘方赋值运算符（`**=`）仅在 PHP 5.6 及更高版本中可用。\n\n### 向现有字符串添加内容\n\n相同的便捷简写方式允许你通过组合句点和等号，向现有字符串末尾添加新内容，如下所示：\n\
  \n```\n$hamlet = 'To be';\n$hamlet .= ' or not to be';\n```\n\n请注意，除非你希望两个字符串无间断地连接，否则需要在附加文本的开头创建一个空格。这种简写方式被称为组合连接运算符，在连接多个字符串时非常有用，例如在构建电子邮件内容或循环遍历数据库搜索结果时。\n\
  \n> **提示**  \n> 复制代码时，等号前面的句点很容易被忽略。当你看到同一个变量在一系列语句的开头重复出现时，这通常是一个明确的信号，表明你需要使用\
  \ `.=` 而不是单独的 `=`。\n\n### 关于引号你想知道的一切——以及更多\n\n在任何计算机语言（不仅仅是 PHP）中处理引号都可能充满困难，因为计算机总是将第一个匹配的引号视为字符串的结束。结构化查询语言（SQL）——用于与数据库通信的语言——也使用字符串。由于你的字符串可能包含撇号，单引号和双引号的组合并不足够。此外，PHP\
  \ 在双引号内对变量和转义序列（某些前面带有反斜杠的字符）给予特殊处理。在接下来的几页中，我将为你理清这个纠缠并让你完全理解它。\n\n#### PHP 如何处理字符串内的变量\n\
  \n选择使用双引号还是单引号可能看起来只是个人喜好问题，但 PHP 处理它们的方式有一个重要区别。\n\n* 单引号之间的任何内容都被视为纯文本。\n* 双引号充当处理变量和称为转义序列的特殊字符的信号。\n\
  \n在以下示例中，`$name` 被赋值，然后在单引号字符串中使用。因此 `$name` 被当作普通文本处理（代码在 `quotes_01.php` 中）：\n\
  \n```\n$name = 'Dolly';\necho 'Hello, $name';  // Hello, $name\n```\n\n如果你将第二行中的单引号替换为双引号（参见\
  \ `quotes_02.php`），`$name` 会被处理，其值将显示在屏幕上：\n\n```\n$name = 'Dolly';\necho \"Hello,\
  \ $name\";  // Hello, Dolly\n```\n\n> **注意**  \n> 在两个示例中，第一行的字符串都是单引号。导致变量被处理的原因是它位于双引号字符串中，而不是它最初是如何获取值的。\n\
  \n由于双引号在这方面非常有用，许多人一直使用它们。从技术上讲，当你不需要处理任何变量时使用双引号是低效的。我个人的偏好是除非字符串包含变量，否则使用单引号。\n\
  \n\n\n### 在双引号内使用转义序列\n\n双引号还有另一个重要作用：它会以特殊方式处理转义序列。所有转义序列都是通过在字符前放置反斜杠来形成的。其中大多数旨在避免与变量使用的字符发生冲突，但有三个具有特殊含义：`\\\
  n` 插入换行符，`\\r` 插入回车符，`\\t` 插入制表符。表 3-4 列出了 PHP 支持的主要转义序列。\n\n**表 3-4.** PHP 的主要转义序列\n\
  \n| 转义序列 | 在双引号字符串中表示的字符 |\n| --- | --- |\n| `\\\"` | 双引号 |\n| `\\n` | 换行 |\n| `\\\
  r` | 回车 |\n| `\\t` | 制表符 |\n| `\\\\` | 反斜杠 |\n| `\\$` | 美元符号 |\n| `\\{` | 左花括号 |\n\
  | `\\}` | 右花括号 |\n| `\\[` | 左方括号 |\n| `\\]` | 右方括号 |\n\n**注意**\n\n除 `\\\\` 外，表 3-4\
  \ 中列出的转义序列仅在双引号字符串中有效。在单引号字符串中，它们会被视为字面反斜杠后跟第二个字符。字符串末尾的反斜杠始终需要转义。否则，它会被解释为转义紧随其后的引号。在单引号字符串中，请按照本章前半部分所述，使用反斜杠转义单引号和撇号。\n\
  \n### 在字符串中嵌入关联数组元素\n\n在双引号字符串中处理关联数组元素有一个令人讨厌的“陷阱”。以下代码行尝试将本章前半部分中的 `$book` 关联数组的几个元素嵌入到双引号字符串中：\n\
  \n`echo \"$book['title'] was written by $book['author'].\";`\n\n这看起来没问题。数组元素的键使用了单引号，因此不存在引号不匹配的问题。然而，如果你将\
  \ `quotes_03.php` 加载到浏览器中，会得到如下神秘的错误消息。\n\n![A978-1-4842-0635-5_3_Figb_HTML.jpg](img/A978-1-4842-0635-5_3_Figb_HTML.jpg)\n\
  \n解决方案很简单。你需要将关联数组变量用花括号括起来，如下所示（参见 `quotes_04.php`）：\n\n`echo \"{$book['title']}\
  \ was written by {$book['author']}.\";`\n\n现在变量值会正确显示，如下面的截图所示。\n\n![A978-1-4842-0635-5_3_Figc_HTML.jpg](img/A978-1-4842-0635-5_3_Figc_HTML.jpg)\n\
  \n索引数组元素（例如 `$shoppingList[2]`）不需要这种特殊处理，因为数组索引是数字且未用引号括起来。\n\n**注意**\n\n有些人试图通过从数组键中去除引号来避免关联数组元素的问题，例如：`$book[title]`。虽然这样能工作，但去除数组键的引号会创建一个未定义的常量，这可能导致你的代码在未来出现问题。\n\
  \n### 使用 Heredoc 语法避免转义引号\n\n使用反斜杠转义一两个引号并不是什么大负担，但我经常看到代码示例中反斜杠似乎乱用一气。这样的代码肯定难以输入，也肯定难以阅读。而且，这完全是多余的。PHP\
  \ heredoc 语法提供了一种相对简单的方法来将文本赋值给变量，而无需对引号进行任何特殊处理。\n\n**注意**\n\n“heredoc”这个名称源自 here-document，这是一种在\
  \ Unix 和 Perl 编程中使用的技术，用于向命令传递大量文本。\n\n使用 heredoc 将字符串赋值给变量包括以下步骤：\n\n1. 输入赋值运算符，后跟\
  \ `<<<` 和一个标识符。该标识符可以是字母、数字和下划线的任意组合，但不能以数字开头。稍后将使用相同的组合来标识 heredoc 的结束。\n2. 在新的一行开始字符串。它可以包含单引号和双引号。任何变量都会以与双引号字符串相同的方式处理。\n\
  3. 在字符串结束后另起一行放置标识符。该行末尾除了一个分号外不应有任何其他内容。此外，标识符必须位于行首，不能有缩进。\n\n看实际例子会容易理解得多。以下简单示例可在本章文件的\
  \ `heredoc.php` 中找到：\n\n```\n$fish = 'whiting';\n\n$book['title'] = 'Alice in Wonderland';\n\
  \n$mockTurtle = <<< Gryphon\n\n\"Will you walk a little faster?\" said a $fish to\
  \ a snail.\n\n\"There's a porpoise close behind us, and he's treading on my tail.\"\
  \n\n(from {$book['title']})\n\nGryphon;\n\necho $mockTurtle;\n```\n\n在这个例子中，`Gryphon`\
  \ 是标识符。字符串从下一行开始，双引号被视为字符串的一部分。所有内容都会被包含，直到遇到新行开头的标识符为止。\n\n**注意**\n\n虽然 heredoc\
  \ 语法避免了转义引号的需要，但关联数组元素 `$book['title']` 仍然需要用花括号括起来，如上一节所述。\n\n从下面的截图可以看出，heredoc\
  \ 显示了双引号，并处理了 `$fish` 和 `$book['title']` 变量。\n\n![A978-1-4842-0635-5_3_Figd_HTML.jpg](img/A978-1-4842-0635-5_3_Figd_HTML.jpg)\n\
  \n要获得相同的效果而不使用 heredoc 语法，你需要添加双引号并像这样转义它们：\n\n```\n$mockTurtle = \"\\\"Will you\
  \ walk a little faster?\\\" said a $fish to a snail.\n\n\\\"There's a porpoise close\
  \ behind us, and he's treading on my tail.\\\" (from\n\n{$book['title']})\";\n```\n\
  \n当你有一个长字符串和/或大量引号时，heredoc 语法非常有用。如果你想将 XML 文档或冗长的 HTML 部分赋值给变量，它也很方便。\n\n**注意**\n\
  \n还有一种相关的技术称为 nowdoc 语法，它处理变量的方式与单引号相同——换句话说，将其视为字面文本。要使用 nowdoc 语法创建字符串，请将标识符用单引号括起来，如下所示：`<<<\
  \ 'Gryphon'`。结束标识符不使用引号。参见 [`http://php.net/manual/en/language.types.string.php#language.types.string.syntax.nowdoc`](http://php.net/manual/en/language.types.string.php#language.types.string.syntax.nowdoc)。\n\
  \n如果使用双引号将标识符括起来，则该字符串被视为 heredoc 语法。\n\n## 创建数组\n\n如前所述，数组有两种类型：索引数组（使用数字标识每个元素）和关联数组（使用字符串）。你可以通过直接为每个元素赋值来构建这两种类型的数组。让我们再看一下\
  \ `$book` 关联数组：\n\n```\n$book['title'] = 'PHP Solutions: Dynamic Web Design Made\
  \ Easy, Third Edition';\n$book['author'] = 'David Powers';\n$book['publisher'] =\
  \ 'Apress';\n$book['ISBN'] = '978-1-4842-0636-2';\n```\n\n要直接构建索引数组，请使用数字而不是字符串作为数组键。索引数组从\
  \ 0 开始编号，因此要构建图 3-3 中描绘的 `$shoppingList` 数组，你应这样声明：\n\n```\n$shoppingList[0] = 'wine';\n\
  $shoppingList[1] = 'fish';\n$shoppingList[2] = 'bread';\n$shoppingList[3] = 'grapes';\n\
  $shoppingList[4] = 'cheese';\n```\n\n虽然这两种都是创建数组的完全有效的方法，但每次都不得不输入变量名很烦人；有一些更简洁的方法来实现。每种数组类型的语法略有不同。\n\
  \n\n\n### 构建索引数组\n\n自 PHP 5.4 起，你可以选择在单条语句中定义数组。快捷方式是使用简写语法，这与 JavaScript 中的数组字面量相同。通过将逗号分隔的值列表放在一对方括号内来创建数组，如下所示：\n\
  \n`$shoppingList = ['wine', 'fish', 'bread', 'grapes', 'cheese'];`\n\n**注意**：逗号必须放在引号外面，这与美式排版惯例不同。为便于阅读，我在每个逗号后加了一个空格，但这不是必需的。\n\
  \n另一种方法是将逗号分隔的列表传递给`array()`，如下所示：\n\n`$shoppingList = array('wine', 'fish', 'bread',\
  \ 'grapes', 'cheese');`\n\nPHP 会自动为每个数组元素从 0 开始编号，因此两种方法创建的都是完全相同的数组，就像你逐个编号一样。要在数组末尾添加新元素，可以使用一对方括号，如下所示：\n\
  \n`$shoppingList[] = 'coffee';`\n\nPHP 会使用下一个可用编号，因此这将成为 `$shoppingList[5]`。\n\n\
  ### 构建关联数组\n\n关联数组使用 `=>` 运算符（等号后跟大于号）为每个数组键赋值。使用简写的方括号语法，结构如下：\n\n`$arrayName =\
  \ ['key1' => 'element1', 'key2' => 'element2'];`\n\n使用 `array()` 也能达到相同效果：\n\n`$arrayName\
  \ = array('key1' => 'element1', 'key2' => 'element2');`\n\n因此，这是构建 `$book` 数组的简写方式：\n\
  \n```\n$book = [\n    'title'     => 'PHP Solutions: Dynamic Web Design Made Easy,\
  \ Third Edition',\n    'author'    => 'David Powers',\n    'publisher' => 'Apress',\n\
  \    'ISBN'      => '978-1-4842-0636-2'\n];\n```\n\n将开头和结尾的大括号放在单独的行中，以及像我那样对齐 `=>`\
  \ 运算符并非必需，但这能使代码更易于阅读和维护。\n\n### 创建空数组\n\n你可能想要创建空数组的原因有以下两个：\n\n- 创建（或初始化）一个数组，使其准备好可以在循环中添加元素\n\
  - 清空现有数组中的所有元素\n\n要创建空数组，只需使用一对空方括号：\n\n`$shoppingList = [];`\n\n或者，使用 `array()`\
  \ 且括号内不留任何内容，如下所示：\n\n`$shoppingList = array();`\n\n`$shoppingList` 数组现在不包含任何元素。如果使用\
  \ `$shoppingList[]` 添加新元素，它将自动从 0 重新开始编号。\n\n### 多维数组\n\n数组元素可以存储任何数据类型，包括其他数组。例如，`$book`\
  \ 数组只保存一本书的详细信息。创建一个数组的数组（即多维数组）来包含多本书的详细信息可能更方便，如下所示（使用方括号简写）：\n\n```\n$books =\
  \ [\n    [\n        'title'     => 'PHP Solutions: Dynamic Web Design Made Easy,\
  \ Third Edition',\n        'author'    => 'David Powers',\n        'publisher' =>\
  \ 'Apress',\n        'ISBN'      => '978-1-4842-0636-2'\n    ],\n    [\n       \
  \ 'title'     => 'Beginning PHP and MySQL: From Beginner to Professional, Fourth\
  \ Edition',\n        'author'    => 'W. Jason Gilmore',\n        'publisher' =>\
  \ 'Apress',\n        'ISBN'      => '978-1-4302-3114-1'\n    ]\n];\n```\n\n这个示例展示了关联数组嵌套在索引数组中的情况，但多维数组可以嵌套任何一种类型。要引用特定元素，请使用两个数组的键；例如：\n\
  \n`$books[1]['author']`  // 值是 `'W. Jason Gilmore'`\n\n处理多维数组并不像初看那么困难。秘诀是使用循环来获取嵌套数组。然后你可以像处理普通数组一样处理它。这就是处理数据库搜索结果的方式，结果通常包含在多维数组中。\n\
  \n**提示**：简写语法仅适用于 PHP 5.4 或更高版本，而 `array()` 适用于所有 PHP 版本。使用 `array()` 的微弱优势是使结构更易于可视化，但从\
  \ JavaScript 借用的数组字面量语法输入更少，并且大多数 Web 开发人员可能都很熟悉。使用你觉得舒服的即可。\n\n### 使用 `print_r()`\
  \ 检查数组\n\n要在测试时检查数组内容，请将数组传递给 `print_r()`，如下所示（参见 `inspect_array_01.php`）：\n\n`print_r($books);`\n\
  \n将 `inspect_array_01.php` 加载到浏览器中，了解 `print_r()` 如何输出普通数组的内容。以下截图显示了 PHP 如何显示多维数组（代码在\
  \ `inspect_array_02.php` 中）。通常，切换到“源代码”视图有助于检查细节，因为浏览器会忽略底层输出中的缩进。或者，在 PHP 代码块外添加\
  \ HTML `<pre>` 标签以保留缩进。\n\n![A978-1-4842-0635-5_3_Fige_HTML.jpg](img/A978-1-4842-0635-5_3_Fige_HTML.jpg)\n\
  \n**提示**：始终使用 `print_r()` 来检查数组；`echo` 和 `print` 不起作用。要在网页中显示数组内容，请使用 `foreach`\
  \ 循环，本章后面会介绍。\n\n### PHP 中的“真”与“假”\n\nPHP 条件语句中的决策基于互斥的布尔值 `true` 和 `false`。如果条件等于\
  \ `true`，则执行条件块内的代码。如果为 `false`，则忽略。条件是否为 `true` 或 `false` 通过以下方式之一确定：\n\n- 显式设置为布尔值之一的变量\n\
  - PHP 隐式解释为 `true` 或 `false` 的值\n- 两个非布尔值的比较\n\n#### 显式布尔值\n\n如果变量被赋值为 `true` 或\
  \ `false` 并在条件语句中使用，则基于该值进行决策。关键字 `true` 和 `false` 不区分大小写，且不得用引号括起来；例如：\n\n```\n\
  $OK = false;\n\nif ($OK) {\n    // 执行某些操作\n}\n```\n\n条件语句内的代码不会被执行，因为 `$OK` 是 `false`。\n\
  \n#### 隐式布尔（“真值”和“假值”）值\n\n使用隐式布尔值提供了一种便捷的简写方式，尽管它有一个缺点——至少对初学者来说——不够清晰。隐式布尔值——有时称为“真值”和“假值”——依赖于\
  \ PHP 对其视为 `false` 的相对狭窄的定义，即：\n\n- 不区分大小写的关键字 `false` 和 `null`\n- 作为整数（`0`）、浮点数（`0.0`）或字符串（`'0'`\
  \ 或 `\"0\"`）的零\n- 空字符串（单引号或双引号之间无空格）\n- 空数组\n- 由空标签创建的 SimpleXML 对象\n\n其他所有值都是 `true`。\n\
  \n**提示**：这解释了为什么 PHP 将 `\"false\"`（带引号）解释为 `true`。它是一个字符串，所有字符串——除了空字符串——都是 `true`。\n\
  \n\n\n#### 通过比较两个值来做出决策\n\n大多数 `true/false`（真/假）决策都是基于使用比较运算符对两个值进行比较。表 3-5 列出了\
  \ PHP 中使用的比较运算符。\n\n**表 3-5.** 用于决策的 PHP 比较运算符\n\n| 符号 | 名称 | 示例 | 结果 |\n| --- |\
  \ --- | --- | --- |\n| `==` | 等于 | `$a == $b` | 如果 `$a` 和 `$b` 相等，则返回 `true`；否则返回\
  \ `false` |\n| `!=` | 不等于 | `$a != $b` | 如果 `$a` 和 `$b` 不相等，则返回 `true`；否则返回 `false`\
  \ |\n| `===` | 全等 | `$a === $b` | 判断 `$a` 和 `$b` 是否全等。它们不仅需要值相同，而且数据类型也必须相同（例如，都是整数）。\
  \ |\n| `!==` | 不全等 | `$a !== $b` | 判断 `$a` 和 `$b` 是否不全等（判断标准与上一个运算符相同） |\n| `>`\
  \ | 大于 | `$a > $b` | 如果 `$a` 大于 `$b`，则返回 `true` |\n| `>=` | 大于等于 | `$a >= $b` |\
  \ 如果 `$a` 大于等于 `$b`，则返回 `true` |\n| `<` | 小于 | `$a < $b` | 如果 `$a` 小于 `$b`，则返回 `true`\
  \ |\n| `<=` | 小于等于 | `$a <= $b` | 如果 `$a` 小于等于 `$b`，则返回 `true` |\n\n> **注意：** 单个等号不执行比较操作；它用于赋值。当比较两个值时，必须始终使用相等运算符（`==`）、全等运算符（`===`）或其否定形式（`!=`\
  \ 和 `!==`）。\n\n#### 测试多个条件\n\n通常，仅比较两个值是不够的。PHP 允许你使用逻辑运算符设置一系列条件，以指定是需要满足所有条件还是仅需满足部分条件。\n\
  \nPHP 中最主要的逻辑运算符列于表 3-6。逻辑非运算符应用于单个条件，而非一系列条件。\n\n**表 3-6.** PHP 中用于决策的主要逻辑运算符\n\
  \n| 符号 | 名称 | 示例 | 结果 |\n| --- | --- | --- | --- |\n| `&&` | 与 | `$a && $b` | 如果\
  \ `$a` 和 `$b` 均为 `true`，则结果为 `true` |\n| `&#124;&#124;` | 或 | `$a &#124;&#124; $b`\
  \ | 如果 `$a` 或 `$b` 中任意一个为 `true`，则结果为 `true`；否则为 `false` |\n| `!` | 非 | `!$a` |\
  \ 如果 `$a` 不为 `true`，则结果为 `true` |\n\n从技术上讲，可以测试的条件数量没有限制。每个条件会从左到右依次被评估，一旦达到决定性的判断点，便不再进行后续测试。当使用\
  \ `&&` 时，所有条件都必须满足，因此一旦某个条件为 `false`，测试便会停止。同样，当使用 `||` 时，只需满足一个条件即可，因此一旦某个条件为 `true`，测试便会停止。\n\
  \n```\n$a = 10;\n$b = 25;\nif ($a > 5 && $b > 20) // 返回 true\nif ($a > 5 || $b >\
  \ 30) // 返回 true，$b 从未被测试\n```\n\n你应该始终设计测试条件，以期获得最快的结果。如果所有条件都必须满足，先评估最有可能失败的那个。如果只需满足一个条件，先评估最有可能成功的那个。如果一组条件需要作为一个整体来考虑，请将它们括在圆括号中，如下所示：\n\
  \n```\nif (($a > 5 && $a < 8) || ($b > 20 && $b < 40))\n```\n\n> **注意：** PHP 也允许使用\
  \ `AND` 代替 `&&`，使用 `OR` 代替 `||`。然而，它们并非完全等同。为避免出现问题，建议坚持使用 `&&` 和 `||`。\n\n####\
  \ 使用 Switch 语句进行决策链\n\n`switch` 语句为使用 `if . . . else` 进行决策提供了一种替代方案。其基本结构如下所示：\n\
  \n```\nswitch(被测试的变量) {\n    case 值 1:\n        要执行的语句\n        break;\n    case\
  \ 值 2:\n        要执行的语句\n        break;\n    default:\n        要执行的语句\n}\n```\n\n\
  `case` 关键字表示传递给 `switch()` 的变量可能匹配的值。每个备选值前必须加上 `case`，后跟冒号。当找到匹配项时，会执行后续的每一行代码，直到遇到\
  \ `break` 或 `return` 关键字，此时 `switch` 语句结束。以下是一个简单的示例：\n\n```\nswitch($myVar) {\n\
  \    case 1:\n        echo '$myVar 是 1';\n        break;\n    case 'apple':\n  \
  \  case 'orange':\n        echo '$myVar 是一种水果';\n        break;\n    default:\n\
  \        echo '$myVar 既不是 1 也不是水果';\n}\n```\n\n关于 `switch` 需要注意的要点如下：\n\n* `case`\
  \ 关键字后面的表达式通常是数字或字符串。不能使用像数组或对象这样的复杂数据类型。\n* 要在 `case` 中使用比较运算符，必须重复被测试的变量。因此 `case\
  \ > 100:` 无法工作，但 `case $myVar > 100:` 可以。\n* 每个代码块通常应以 `break` 或 `return` 结尾，除非你特别希望继续执行\
  \ `switch` 语句中的后续代码。\n* 可以将多个 `case` 关键字组合在一起，对它们应用相同的代码块。\n* 如果没有找到匹配项，则执行 `default`\
  \ 关键字后面的任何语句。如果未设置 default 情况，`switch` 语句会静默退出并继续执行下一个代码块。\n\n#### 使用三元运算符\n\n三元运算符（`?:`）是表示条件语句的一种简写方法。其名称来源于它通常使用三个操作数。基本语法如下所示：\n\
  \n```\n条件 ? 值为真时的结果 : 值为假时的结果 ;\n```\n\n以下是其使用示例：\n\n```\n$age = 17;\n$fareType\
  \ = $age >= 16 ? 'adult' : 'child';\n```\n\n第二行测试 `$age` 的值。如果它大于等于 16，`$fareType`\
  \ 被设置为 `adult`，否则 `$fareType` 被设置为 `child`。使用 `if . . . else` 的等效代码如下所示：\n\n```\n\
  if ($age >= 16) {\n    $fareType = 'adult';\n} else {\n    $fareType = 'child';\n\
  }\n```\n\n`if . . . else` 版本更易读，但条件运算符更简洁。大多数初学者讨厌这种简写，但一旦熟悉它，你就会意识到它有多方便。\n\n你可以省略问号和冒号之间的值。这会产生如下效果：如果条件为真，则将条件本身的值赋给变量。前面的例子可以重写如下：\n\
  \n```\n$age = 17;\n$adult = $age >= 16 ?: false; // $adult 为 true\n```\n\n在这种情况下，问号前面的表达式是一个比较，因此它只能等于\
  \ `true` 或 `false`。然而，如果问号前面的表达式是“真值”（隐式为真），则返回该值本身。例如：\n\n```\n$age = 17;\n$years\
  \ = $age ?: 'unknown';  // $years 为 17\n```\n\n> **注意：** 省略问号和冒号之间的值是三元运算符的一种特殊用法。在这里提到它，只是为了提醒你，如果在其他地方遇到它时，了解其含义。\n\
  \n### 创建循环\n\n循环是一段被重复执行的代码，直到满足某个特定条件为止。循环通常通过设置一个变量来计数迭代次数进行控制。每次将变量递增 1，当变量达到预设值时循环停止。循环也可以通过遍历数组中的每个元素来控制。当没有更多元素需要处理时，循环停止。循环中通常包含条件语句，因此尽管它们结构非常简单，但可用于创建以相当复杂的方式处理数据的代码。\n\
  \n\n\n"
- "# 使用 While 和 Do . . . While 循环\n\n最简单的循环类型称为 `while` 循环。其基本结构如下：\n\n```\nwhile\
  \ (条件为真) {\n    执行某些操作\n}\n```\n\n以下代码在浏览器中显示从 1 到 100 的每个数字（你可以在本章配套文件中的 `while.php`\
  \ 中测试）。它首先将变量（`$i`）设置为 1，然后使用该变量作为控制循环的计数器，同时在屏幕上显示当前数字。\n\n```\n$i = 1;  // 设置计数器\n\
  while ($i <= 100) {\n    echo \"$i<br>\";\n    $i++; // 将计数器增加 1\n}\n```\n\n**提示**\n\
  \n在本章前半部分，我警告过不要使用含义模糊的变量名。然而，使用 `$i` 作为计数器是一种广泛接受的约定。如果 `$i` 已被使用，通常的做法是使用 `$j`\
  \ 或 `$k` 作为计数器。\n\n`while` 循环的一种变体使用关键字 `do`，其基本模式如下：\n\n```\ndo {\n    要执行的代码\n\
  } while (待测试的条件);\n```\n\n`do . . . while` 循环与 `while` 循环的区别在于，`do` 块中的代码至少会执行一次，即使条件永远不为真。以下代码（位于\
  \ `dowhile.php` 中）会显示 `$i` 的值一次，即使该值大于预期的最大值。\n\n```\n$i = 1000;\ndo {\n    echo\
  \ \"$i<br>\";\n    $i++; // 将计数器增加 1\n} while ($i <= 100);\n```\n\n使用 `while` 和\
  \ `do . . . while` 循环的危险在于忘记设置结束循环的条件，或者设置了不可能实现的条件。这被称为无限循环，它可能会冻结你的计算机或导致浏览器崩溃。\n\
  \n## 多功能的 for 循环\n\n`for` 循环不太容易产生无限循环，因为你需要在第一行声明循环的所有条件。`for` 循环使用以下基本模式：\n\n\
  ```\nfor (初始化循环; 条件; 每次迭代后执行的代码) {\n    要执行的代码\n}\n```\n\n以下代码的功能与之前的 `while` 循环完全相同，显示从\
  \ 1 到 100 的每个数字（参见 `forloop.php`）：\n\n```\nfor ($i = 1; $i <= 100; $i++) {\n   \
  \ echo \"$i<br>\";\n}\n```\n\n括号内的三个表达式控制循环的动作（注意，它们用分号分隔，而不是逗号）：\n\n- 第一个表达式在循环开始前执行。在此例中，它将计数器变量\
  \ `$i` 的初始值设置为 1。\n- 第二个表达式设置决定循环应持续运行多长时间的条件。它可以是一个固定数字、一个变量或一个计算值的表达式。\n- 第三个表达式在循环的每次迭代结束时执行。在此例中，它将\
  \ `$i` 增加 1，但你可以使用更大的增量。例如，将此示例中的 `$i++` 替换为 `$i+=10` 将显示 1、11、21、31，依此类推。\n\n##\
  \ 使用 Foreach 遍历数组和对象\n\nPHP 中的最后一种循环类型用于数组和对象。它有两种形式，两者都使用临时变量来处理每个元素。如果你只需要对元素的值进行操作，`foreach`\
  \ 循环采用以下形式：\n\n```\nforeach (变量名 as 元素) {\n    对元素执行某些操作\n}\n```\n\n以下示例遍历 `$shoppingList`\
  \ 数组并显示每个项目的名称（代码位于 `foreach_01.php`）：\n\n```\n$shoppingList = ['wine', 'fish',\
  \ 'bread', 'grapes', 'cheese'];\nforeach ($shoppingList as $item) {\n    echo $item.'<br>';\n\
  }\n```\n\n**注意**\n\n`foreach` 关键字是一个单词。在 `for` 和 `each` 之间插入空格是无效的。\n\n虽然前面的示例使用了索引数组，但你也可以将\
  \ `foreach` 循环的简单形式用于关联数组。\n\n`foreach` 循环的另一种形式可以访问每个元素的键和值。它采用这种略有不同的形式：\n\n```\n\
  foreach (变量名 as 键 => 值) {\n    对键和值执行某些操作\n}\n```\n\n下一个示例使用本章前面“创建数组”部分中的 `$book`\
  \ 关联数组，并将每个元素的键和值合并到一个简单的字符串中，如下面的屏幕截图所示（参见 `foreach_02.php`）：\n\n```\nforeach ($book\
  \ as $key => $value) {\n    echo \"$key: $value<br>\";\n}\n```\n\n![A978-1-4842-0635-5_3_Figf_HTML.jpg](img/A978-1-4842-0635-5_3_Figf_HTML.jpg)\n\
  \n**注意**\n\n除了数组之外，`foreach` 循环的主要用途是处理一种称为迭代器的特殊类型对象。你将在第 7 章中了解如何使用迭代器。\n\n##\
  \ 跳出循环\n\n为了在满足特定条件时提前结束循环，可以在条件语句中插入 `break` 关键字。一旦脚本遇到 `break`，它将退出循环。\n\n要在满足特定条件时跳过循环中的代码，请使用\
  \ `continue` 关键字。它不是退出循环，而是返回到循环顶部并处理下一个元素。例如，以下循环在 `$photo` 没有值时跳过当前元素：\n\n```\n\
  foreach ($photos as $photo) {\n    if (empty($photo)) continue;\n    // 显示照片的代码\n\
  }\n```\n\n"
- "# 使用函数模块化代码\n\n函数提供了一种执行频繁操作任务的便捷方式。除了大量内置函数外，PHP 还允许你创建自己的函数。其优点是你只需编写一次代码，而不需要在需要它的每个地方重新输入。这不仅加快了开发速度，还使代码更易于阅读和维护。如果函数中的代码有问题，你只需在一个地方更新它，而不必在整个网站中搜索。此外，函数通常可以加快页面的处理速度。\n\
  \n在 PHP 中构建自己的函数很容易。你只需将一段代码用一对花括号括起来，并使用 `function` 关键字为新函数命名。函数名后面总是跟着一对圆括号。以下（虽然微不足道）示例演示了自定义函数的基本结构（参见本章配套文件中的\
  \ `functions_01.php`）：\n\n```\nfunction sayHi() {\n    echo 'Hi!';\n}\n```\n\n只需在\
  \ PHP 代码块中放置 `sayHi();` 就会在屏幕上显示 `Hi!`。这种类型的函数就像一个无人机：它总是执行完全相同的操作。为了使函数能够响应不同的情况，你需要将值作为参数传递给它。\n\
  \n## 向函数传递值\n\n假设你想要调整 `sayHi()` 函数，使其显示某人的名字。你可以通过在函数声明的圆括号之间插入一个变量来实现这一点。然后在函数内部使用相同的变量来显示传递给函数的任何值。要向函数传递多个参数，请在起始圆括号内用逗号分隔变量。这是修改后的函数的样子（参见\
  \ `functions_02.php`）：\n\n```\nfunction sayHi($name) {\n    echo \"Hi, $name!\"\
  ;\n}\n```\n\n你现在可以在页面中使用此函数来显示传递给 `sayHi()` 的任何变量的值。例如，如果你有一个在线表单，将某人的姓名保存在名为 `$visitor`\
  \ 的变量中，并且 Ben 访问了你的网站，你可以通过在你的页面中放置 `sayHi($visitor);` 来向他显示如下屏幕截图所示的个性化问候。\n\n\
  ![A978-1-4842-0635-5_3_Figg_HTML.jpg](img/A978-1-4842-0635-5_3_Figg_HTML.jpg)\n\n\
  PHP 弱类型的一个缺点是，如果 Ben 特别不配合，他可能会在表单中键入 5 而不是他的名字，这带给你的可能不是你期望的那种击掌（high five）。\n\n\
  ![A978-1-4842-0635-5_3_Figh_HTML.jpg](img/A978-1-4842-0635-5_3_Figh_HTML.jpg)\n\n\
  这就是为什么在任何关键情况下使用用户输入之前，应先检查用户输入的原因。\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您的指示，完成以下翻译任务。\n\n\
  \n#### 变量作用域——函数如同黑盒子\n\n理解函数会创建一个类似于黑盒子的独立环境也很重要。通常，函数内部的操作不会影响脚本的其他部分，除非它返回一个值，这将在下一节中描述。函数内部的变量是函数独有的。下面的例子可以说明这一点（参见\
  \ `functions_04.php`）：\n\n```\nfunction doubleIt($number) {\n    $number *= 2;\n\
  \    echo '$number is ' . $number . '<br>';\n}\n\n$number = 4;\ndoubleIt($number);\n\
  echo '$number is ' . $number;\n```\n\n前四行定义了一个名为 `doubleIt()` 的函数，它接收一个数字，将其加倍，并显示在屏幕上。脚本的其余部分将值\
  \ 4 赋给 `$number`。然后，它将 `$number` 作为参数传递给 `doubleIt()` 函数。函数处理 `$number` 并显示 8。函数结束后，`echo`\
  \ 将 `$number` 显示在屏幕上。这一次，它的值是 4 而不是 8，如下面的截图所示：\n\n![A978-1-4842-0635-5_3_Figi_HTML.jpg](img/A978-1-4842-0635-5_3_Figi_HTML.jpg)\n\
  \n这表明主脚本中的 `$number` 与函数内部同名的变量完全无关。这被称为变量的作用域。即使在函数内部改变了变量的值，外部同名的变量也不会受到影响。为了避免混淆，最好在脚本的其余部分使用与函数内部不同的变量名。但这并不总是可能做到，因此，理解函数像小黑盒子一样工作，并且通常不会直接影响脚本其余部分中的变量值，是很有用的。\n\
  \n变量作用域的另一个方面是，函数通常无法访问外部脚本中的值，除非这些值作为参数传递给函数。\n\n**注意：** PHP 的超全局变量，如 `$_POST`\
  \ 和 `$_GET`，不受变量作用域的影响。它们始终可用，这就是为什么它们被称为超全局变量。\n\n#### 从函数返回值\n\n让函数改变传递给它的参数的值不止一种方法，但最重要的方法是使用\
  \ `return` 关键字，并将结果赋给同一个变量或另一个变量。这可以通过修改 `doubleIt()` 函数来演示，如下所示（代码在 `functions_05.php`\
  \ 中）：\n\n```\nfunction doubleIt($number) {\n    return $number *= 2;\n}\n\n$num\
  \ = 4;\n$doubled = doubleIt($num);\necho '$num is: ' . $num . '<br>';\necho '$doubled\
  \ is: ' . $doubled;\n```\n\n![A978-1-4842-0635-5_3_Figj_HTML.jpg](img/A978-1-4842-0635-5_3_Figj_HTML.jpg)\n\
  \n这次，我为变量使用了不同的名称以避免混淆。我还将 `doubleIt($num)` 的结果赋给了一个新变量。这样做的好处是，原始值和计算结果现在都可以使用。你并不总是需要保留原始值，但有时它非常有用。\n\
  \n#### 通过引用传递——改变参数的值\n\n尽管函数通常不会改变传递给它们的参数的值，但有时你确实希望改变原始值，而不是捕获返回值。为此，在定义函数时，你需要在想要改变的参数前加上一个与符号（ampersand），如下所示：\n\
  \n```\nfunction doubleIt(&$number) {\n    $number *= 2;\n}\n```\n\n请注意，这个版本的 `doubleIt()`\
  \ 函数既没有 `echo` `$number` 的值，也没有返回计算结果的值。因为括号内的参数前面加了一个与符号，所以作为参数传递给函数的变量的原始值将被改变。这被称为**通过引用传递**。\n\
  \n下面的代码（位于 `functions_06.php` 中）演示了这一效果：\n\n```\n$num = 4;\necho '$num is: ' . $num\
  \ . '<br>';\ndoubleIt($num);\necho '$num is now: ' . $num;\n```\n\n![A978-1-4842-0635-5_3_Figk_HTML.jpg](img/A978-1-4842-0635-5_3_Figk_HTML.jpg)\n\
  \n与符号仅用于函数定义中，在调用函数时不需要使用。\n\n**注意：** 一般来说，使用函数来改变传递给它的参数的原始值并不是一个好主意，因为如果该变量在脚本的其他地方使用，可能会产生意想不到的后果。然而，在某些情况下这样做是很有意义的。例如，内置的数组排序函数就使用传递引用来影响原始数组。\n\
  \n#### 自定义函数的位置\n\n如果自定义函数位于使用它的同一个页面中，那么在哪里声明该函数并不重要；可以在使用它的前面或后面。然而，最好将函数集中存储，放在页面的顶部或底部。这样可以使它们更容易查找和维护。\n\
  \n在多个页面中使用的函数最好存储在一个外部文件中，并在每个页面中包含该文件。使用 `include` 和 `require` 包含外部文件将在下一章中详细介绍。当函数存储在外部文件中时，你必须在调用任何函数之前包含该外部文件。\n\
  \n### 动态创建新变量\n\nPHP 支持创建所谓的**可变变量**。虽然这看起来像是一个排版错误，但事实并非如此。简单来说，可变变量会创建一个新变量，其名称源自一个现有变量。这个概念可能难以理解，但下面的例子应该能说明情况（代码在\
  \ `variable_variables.php` 中）。\n\n以下语句将字符串 “city” 赋给一个名为 `$location` 的变量：\n\n```\n\
  $location = 'city';\n```\n\n通过使用两个美元符号来创建一个可变变量，如下所示：\n\n```\n$$location = 'London';\n\
  ```\n\n这个可变变量以原始变量的值作为其名称。换句话说，`$$location` 等同于 `$city`。\n\n```\necho $city; //\
  \ London\n```\n\n虽然这演示了可变变量的工作原理，但它并不是一个非常实用的例子。因此，让我们考虑一个动态创建新变量的场景。假设你有一个像这样的关联数组：\n\
  \n```\n$fields = [\n    'name'     => 'David',\n    'email'    => 'david@example.com',\n\
  \    'comments' => \"What's a variable variable?\"\n];\n```\n\n要获取数组元素的值，你可以在数组变量后面使用方括号括起来的键名（作为字符串），如下所示：\n\
  \n```\necho $fields['name'];  // David\n```\n\n你可以不使用这种语法，而是使用一个 `foreach` 循环来动态生成\
  \ `$name`、`$email` 和 `$comments` 变量作为可变变量，如下所示：\n\n```\nforeach ($fields as $key\
  \ => $value) {\n    $$key = $value;\n}\n\necho $name . '<br>';\necho $email . '<br>';\n\
  echo $comments;\n```\n\n这会产生以下输出：\n\n![A978-1-4842-0635-5_3_Figl_HTML.jpg](img/A978-1-4842-0635-5_3_Figl_HTML.jpg)\n\
  \n在循环内部，`$$key` 是一个可变变量，它根据 `$key` 的值创建一个新变量。循环还将 `$value` 赋给 `$$key`。第一次运行循环时，`$key`\
  \ 是 “name”，`$value` 是 “David”。因此它创建了一个名为 `$name` 且值为 “David” 的变量。随着循环继续运行，`$$key`\
  \ 会创建名为 `$email` 和 `$comments` 的新变量。\n\n你将在第 5 章的邮件处理脚本中看到这种技术。\n\n**提示：** 为了表明双\
  \ `$` 是有意为之，我喜欢将用于创建可变变量的变量用花括号括起来，像这样：`${$key}`。花括号完全是可选的，但可以使代码更易于阅读。\n\n\n\n"
- '# PHP 快速入门清单


  本章包含大量信息，不可能一次消化完。但希望前半部分已经让你对 PHP 的运行机制有了一个宏观的了解。后半部分则补充了许多关键细节，你可以在学习本书的过程中随时查阅。以下是部分要点回顾：


  -   始终为 PHP 页面使用正确的文件扩展名，通常是 `.php`。

  -   将所有 PHP 代码括在正确的标签内：`<?php` 和 `?>`。

  -   避免使用短标签 `<?` 作为开始标记。使用 `<?php` 更为可靠。

  -   建议在仅包含 PHP 代码的文件中省略 PHP 结束标签。

  -   PHP 变量以 `$` 开头，后面跟一个字母或下划线。

  -   选择有意义的变量名，并记住它们**区分大小写**。

  -   使用注释来提醒自己脚本的功能。

  -   记住，数字不需要引号，但字符串（文本）需要。

  -   可以使用单引号或双引号，但必须配对使用。

  -   使用反斜杠来转义字符串内部的同类引号。

  -   要将相关项存储在一起，请使用数组。

  -   使用条件语句（例如 `if` 和 `if . . . else`）进行决策。

  -   使用循环简化重复性任务。

  -   使用函数执行预设任务。

  -   使用 `echo` 或 `print` 显示 PHP 输出。

  -   使用 `print_r()` 检查数组的内容。

  -   对于大多数错误消息，从指示的位置向前回溯。

  -   保持微笑——并记住，PHP 并不难。


  '
- "# 4. 使用包含文件轻松减轻工作量\n\n能够将一个文件的内容包含在另一个文件中，是 PHP 最强大的特性之一，也是最容易实现的功能之一。\n\n网站中的大多数页面都共享通用元素，例如页眉、页脚和导航菜单。你可以通过更改外部样式表中的样式规则来改变这些元素在整个站点中的外观。但是，CSS\
  \ 更改页面元素内容的能力有限。如果你想在菜单中添加一个新项目，你需要编辑显示该菜单的每一个页面的 HTML。像 Dreamweaver 这样的网页制作工具具有模板系统，可以自动更新所有连接到主文件的页面，但你仍然需要将所有文件上传到远程服务器。\n\
  \n使用 PHP 则无需如此，它支持服务器端包含（SSI）。服务器端包含是一个外部文件，其中包含你想要合并到多个页面中的动态代码或 HTML（或两者）。PHP\
  \ 将内容合并到服务器上的每个网页中。由于每个页面都使用相同的外部文件，你可以通过编辑和上传单个文件来更新菜单或其他通用元素——这大大节省了时间。\n\n在学习本章的过程中，你将了解\
  \ PHP 包含的工作原理、PHP 在哪里查找包含文件，以及如何在找不到包含文件时防止出现错误消息。此外，你还会学习使用 PHP 实现一些酷炫的技巧，例如创建随机图像生成器。\n\
  \n本章涵盖以下主题：\n\n-   理解不同的包含命令\n-   告诉 PHP 在哪里找到你的包含文件\n-   为通用页面元素使用 PHP 包含\n-  \
  \ 保护包含文件中的敏感信息\n-   自动化“你在这里”的菜单链接\n-   从文件名生成页面标题\n-   自动更新版权声明\n-   显示带有标题的随机图像\n\
  -   处理包含文件的错误\n-   更改你的 Web 服务器的 `include_path`\n\n图 4-1 展示了页面的四个元素如何通过 PHP 的包含文件魔法而受益。\n\
  \n![A978-1-4842-0635-5_4_Fig1_HTML.jpg](img/A978-1-4842-0635-5_4_Fig1_HTML.jpg)\n\
  \n图 4-1. 识别可通过 PHP 改进的静态网页元素\n\n菜单和版权声明出现在每个页面上。通过将它们转换为包含文件，你只需更改一个页面即可使更改在整个站点中传播。借助\
  \ PHP 的条件逻辑，你还可以让菜单显示正确的样式，以指示访问者当前所在的页面。类似的 PHP 魔法可以自动更改版权声明中的日期和页面标题中的文本。PHP 还可以通过显示随机图像和标题来增加多样性。图像不必是相同大小；PHP\
  \ 函数会在 `<img>` 标签中插入正确的 `width` 和 `height` 属性。\n\n## 从外部文件包含代码\n\n从其他文件包含代码的能力是\
  \ PHP 的核心部分。所需要做的就是使用一个 PHP 包含命令，并告诉服务器在哪里找到该文件。\n\n### 介绍 PHP 包含命令\n\nPHP 有四个可用于从外部文件包含代码的命令，即：\n\
  \n-   `include`\n-   `include_once`\n-   `require`\n-   `require_once`\n\n它们的基本功能相同，那为什么要有四个呢？根本区别在于，即使外部文件缺失，`include`\
  \ 也会尝试继续处理脚本，而 `require` 则带有强制性的意味：如果文件缺失，PHP 引擎会停止处理并抛出一个致命错误。实际上，这意味着如果你的页面即使没有外部文件的内容也能保持可用，就应该使用\
  \ `include`。如果页面依赖于外部文件，则使用 `require`。\n\n另外两个命令 `include_once` 和 `require_once`\
  \ 工作方式相同，但它们能防止同一个文件在页面中被包含多次。这在包含定义了函数或类的文件时尤其重要。在脚本中多次尝试定义一个函数或类会触发致命错误。因此，使用\
  \ `include_once` 或 `require_once` 可以确保函数和类只被定义一次，即使脚本试图多次包含外部文件（例如当命令位于条件语句中时）也是如此。\n\
  \n提示\n\n对于非关键任务的外部文件使用 `include`，对于定义了函数和类的文件使用 `require_once`。\n\n### PHP 查找包含文件的位置\n\
  \n要包含一个外部文件，请使用四个包含命令之一，后跟文件路径（字符串形式）——换句话说，文件路径必须放在引号中（单引号或双引号都可以）。文件路径可以是绝对路径，也可以是相对于当前文档的路径。例如，以下任何一项都可以正常工作（只要目标文件存在）：\n\
  \n`include 'includes/menu.php';`\n\n`include 'C:/xampp/htdocs/phpsols/includes/menu.php';`\n\
  \n`include '/Applications/MAMP/htdocs/phpsols/includes/menu.php';`\n\n注意\n\nPHP\
  \ 在 Windows 文件路径中接受正斜杠。\n\n你可以选择性地对包含命令使用括号，因此以下写法也有效：\n\n`include('includes/menu.php');`\n\
  \n`include('C:/xampp/htdocs/phpsols/includes/menu.php');`\n\n`include('/Applications/MAMP/htdocs/phpsols/includes/menu.php');`\n\
  \n当使用相对文件路径时，建议使用 `./` 来表示路径从当前文件夹开始。因此，将第一个示例重写如下会更高效：\n\n`include './includes/menu.php';\
  \ // 路径从当前文件夹开始`\n\n什么是不行的？使用相对于站点根目录的文件路径，如下所示：\n\n`include '/includes/menu.php';\
  \ // 这样不行`\n\nPHP 还会在 PHP 配置中定义的 `include_path` 中查找。我将在本章后面回到这个话题。在此之前，让我们将 PHP\
  \ 包含付诸实践。\n\n\n\n### PHP 方案 4-1：将菜单和页脚移至包含文件\n\n我们将把图 4-1 所示的页面转换为使用包含文件。因为菜单和页脚出现在日本之旅网站的每个页面上，所以它们是包含文件的最佳候选。清单\
  \ 4-1 显示了页面主体的代码，其中菜单和页脚以粗体突出显示。\n\n**清单 4-1.** `index.php` 的静态版本\n\n```\n<header>\n\
  <h1>日本之旅</h1>\n</header>\n<div id=\"wrapper\">\n<ul id=\"nav\">\n<li><a href=\"\
  index.php\" id=\"here\">首页</a></li>\n<li><a href=\"blog.php\">日志</a></li>\n<li><a\
  \ href=\"gallery.php\">画廊</a></li>\n<li><a href=\"contact.php\">联系</a></li>\n</ul>\n\
  <main>\n<h2>用 PHP 穿越日本之旅</h2>\n<p>使用 PHP 的好处之一……</p>\n<figure>\n<img src=\"images/water_basin.jpg\"\
  \ alt=\"龙安寺的水盆\"\nwidth=\"350\" height=\"237\">\n<figcaption>龙安寺的水盆</figcaption>\n\
  </figure>\n<p>Ut enim ad minim veniam, quis nostrud . . .</p>\n<p>Eu fugiat nulla\
  \ pariatur. Ut labore et dolore . . .</p>\n<p>Sed do eiusmod tempor incididunt ullamco\
  \ . . .</p>\n</main>\n<footer>\n<p>&copy; 2006&ndash;2014 大卫·鲍尔斯</p>\n</footer>\n\
  </div>\n```\n\n将 `ch04` 文件夹中的 `index_01.php` 复制到 `phpsols` 站点根目录，并重命名为 `index.php`。如果你使用的是\
  \ Dreamweaver 等提供更新页面链接功能的程序，请勿更新它们。下载文件中的相对链接是正确的。通过在浏览器中加载 `index.php`，检查 CSS\
  \ 和图片是否正常显示。它应该与图 4-1 相同。\n\n将 `ch04` 文件夹中的 `blog.php`、`gallery.php` 和 `contact.php`\
  \ 复制到你的站点根目录。这些页面目前还无法在浏览器中正确显示，因为所需的包含文件尚未创建。不过很快就会解决。\n\n在 `index.php` 中，选中清单\
  \ 4-1 中以粗体显示的 `nav` 无序列表，然后将其剪切（Ctrl+X/Cmd+X）到你的计算机剪贴板。\n\n在 `includes` 文件夹中创建一个名为\
  \ `menu.php` 的新文件。删除编辑程序插入的任何代码；该文件必须完全空白。\n\n将剪贴板中的代码粘贴（Ctrl+V/Cmd+V）到 `menu.php`\
  \ 中并保存文件。`menu.php` 的内容应如下所示：\n\n```\n<ul id=\"nav\">\n<li><a href=\"index.php\"\
  \ id=\"here\">首页</a></li>\n<li><a href=\"blog.php\">日志</a></li>\n<li><a href=\"\
  gallery.php\">画廊</a></li>\n<li><a href=\"contact.php\">联系</a></li>\n</ul>\n```\n\
  \n不用担心你的新文件没有 `DOCTYPE` 声明或任何 `<html>`、`<head>` 或 `<body>` 标签。包含此文件内容的其他页面会提供这些元素。\n\
  \n打开 `index.php`，在 `nav` 无序列表留下的空间中插入以下内容：\n\n```\n<?php require './includes/menu.php';\
  \ ?>\n```\n\n这使用了指向 `menu.php` 的文档相对路径。在路径开头使用 `./` 效率更高，因为它明确表示路径从当前文件夹开始。\n\n\
  > **提示：** 我使用 `require` 命令是因为导航菜单至关重要。没有它，就无法在网站中导航。\n\n保存 `index.php` 并在浏览器中加载该页面。它应该与之前完全一样。尽管菜单和页面的其余部分来自不同的文件，但\
  \ PHP 在向浏览器发送任何输出之前会将它们合并。\n\n> **注意：** 别忘了 PHP 代码需要由 Web 服务器处理。如果你将文件存储在服务器文档根目录的子文件夹\
  \ `phpsols` 中，则应使用 URL `http://localhost/phpsols/index.php` 访问 `index.php`。如需查找服务器文档根目录的帮助，请参阅第\
  \ 2 章中的“在哪里放置你的 PHP 文件（Windows 和 Mac）”。\n\n对 `footer` 执行相同操作。剪切清单 4-1 中以粗体显示的行，并将其粘贴到\
  \ `includes` 文件夹中一个名为 `footer.php` 的空白文件中。然后在 `<footer>` 留下的间隙中插入包含新文件的命令：\n\n```\n\
  <?php include './includes/footer.php'; ?>\n```\n\n这次我使用了 `include` 而不是 `require`。`<footer>`\
  \ 是页面的重要组成部分，但如果找不到包含文件，网站仍然可以使用。\n\n保存所有页面，并在浏览器中重新加载 `index.php`。它应该看起来与原始页面完全相同。如果你导航到网站中的其他页面，菜单和页脚应该会出现在每个页面上。包含文件中的代码现在正在为所有页面提供服务。\n\
  \n为了证明菜单来自单个文件，请更改 `menu.php` 中“日志”链接的文本，如下所示：\n\n```\n<li><a href=\"blog.php\"\
  >博客</a></li>\n```\n\n保存 `menu.php` 并重新加载网站。此更改会反映在所有页面上。你可以对照 `ch04` 文件夹中的 `index_02.php`、`menu_01.php`\
  \ 和 `footer_01.php` 检查你的代码。\n\n如图 4-2 所示，当前的代码存在一个问题。即使你离开首页导航到其他页面，指示当前所在页面的样式也不会改变（它由\
  \ `<a>` 标签中的 `here` ID 控制）。\n\n![A978-1-4842-0635-5_4_Fig2_HTML.jpg](img/A978-1-4842-0635-5_4_Fig2_HTML.jpg)\n\
  \n**图 4-2.** 当前页面指示器仍指向首页\n\n幸运的是，通过一点 PHP 条件逻辑可以轻松解决这个问题。在此之前，我们先来看看 Web 服务器和 PHP\
  \ 引擎如何处理包含文件。\n\n## 为包含文件选择正确的文件扩展名\n\n正如你刚刚看到的，包含文件可以包含原始 HTML。当 PHP 引擎遇到包含命令时，它会在外部文件的开头停止处理\
  \ PHP，并在末尾继续处理。如果希望外部文件使用 PHP 代码，则代码必须包含在 PHP 标签中。由于外部文件作为包含它的 PHP 文件的一部分进行处理，因此包含文件可以使用任何文件扩展名。\n\
  \n一些开发者使用 `.inc` 作为文件扩展名，以明确表示该文件旨在被包含在另一个文件中。然而，大多数服务器将 `.inc` 文件视为纯文本。如果该文件包含敏感信息（例如数据库的用户名和密码），这会带来安全风险。如果该文件存储在网站根文件夹中，任何发现该文件名称的人只需在浏览器地址栏中键入\
  \ URL，浏览器就会乖乖地显示所有秘密细节！\n\n另一方面，任何带有 `.php` 扩展名的文件都会在发送到浏览器之前自动发送给 PHP 引擎进行解析。只要你的秘密信息位于\
  \ PHP 代码块内且文件扩展名为 `.php`，就不会被暴露。这就是为什么一些开发者使用 `.inc.php` 作为 PHP 包含文件的双重扩展名。`.inc`\
  \ 部分提醒你这是一个包含文件，但服务器只关心末尾的 `.php`，这确保了所有 PHP 代码都能被正确解析。\n\n在很长一段时间里，我遵循使用 `.inc.php`\
  \ 作为包含文件扩展名的惯例。但由于我将所有包含文件存储在一个名为 `includes` 的单独文件夹中，我认为双重扩展名是多余的。现在我只使用 `.php`。\n\
  \n选择哪种命名约定由你决定，但单独使用 `.inc` 是安全性最低的。\n\n\n\n## PHP 解决方案 4-2：测试包含文件的安全性\n\n本方案演示了使用\
  \ `.inc` 和 `.php`（或 `.inc.php`）作为包含文件的扩展名之间的区别。请使用上一节中的 `index.php` 和 `menu.php`。或者使用\
  \ `ch04` 文件夹中的 `index_02.php` 和 `menu_01.php`。如果你使用下载的文件，请在使用前从文件名中移除 `_02` 和 `_01`。\n\
  \n将 `menu.php` 重命名为 `menu.inc`，并相应编辑 `index.php` 来包含它：\n\n```\n<?php require './includes/menu.inc';\
  \ ?>\n```\n\n在浏览器中加载 `index.php`。你应该看不到任何区别。\n\n修改 `menu.inc` 内部的代码，将密码存储在 PHP 变量中，如下所示：\n\
  \n```\n<ul id=\"nav\">\n<li><a href=\"index.php\" id=\"here\">首页</a></li>\n<?php\
  \ $password = 'topSecret'; ?>\n<li><a href=\"blog.php\">博客</a></li>\n<li><a href=\"\
  gallery.php\">画廊</a></li>\n<li><a href=\"contact.php\">联系</a></li>\n</ul>\n```\n\
  \n![A978-1-4842-0635-5_4_Fig4_HTML.jpg](img/A978-1-4842-0635-5_4_Fig4_HTML.jpg)\n\
  \n图 4-4. 在浏览器中直接加载 `menu.inc` 会暴露 PHP 代码\n\n现在在浏览器中直接加载 `menu.inc`。图 4-4 显示了会发生什么。\n\
  \n![A978-1-4842-0635-5_4_Fig3_HTML.jpg](img/A978-1-4842-0635-5_4_Fig3_HTML.jpg)\n\
  \n图 4-3. PHP 代码没有输出，因此只有 HTML 被发送到浏览器\n\n重新加载页面。如图 4-3 所示，密码在源代码中保持隐藏。尽管包含文件没有 `.php`\
  \ 扩展名，但其内容已与 `index.php` 合并，所以 PHP 代码被处理了。\n\n服务器和浏览器都不知道如何处理 `.inc` 文件，因此整个内容都会显示在屏幕上：原始的\
  \ HTML、你的秘密密码，一切都会暴露。\n\n将包含文件的名称改为 `menu.inc.php`，然后通过在之前步骤使用的 URL 末尾添加 `.php`，直接在浏览器中加载它。这次，你应该会看到一个无序的链接列表。检查浏览器的源代码视图。PHP\
  \ 代码没有被暴露。\n\n将名称改回 `menu.php`，并通过直接在浏览器中加载包含文件并再次查看源代码来测试它。\n\n移除你在步骤 3 中添加至 `menu.php`\
  \ 中的密码 PHP 代码，并将 `index.php` 中的包含命令改回原始设置，如下所示：\n\n```\n<?php require './includes/menu.php';\
  \ ?>\n```\n\n## PHP 解决方案 4-3：自动标识当前页面\n\n现在你已经了解了使用 `.inc` 和 `.php` 作为文件扩展名之间的区别，让我们修复菜单不标识当前页面的问题。该解决方案涉及使用\
  \ PHP 找出当前页面的文件名，然后使用条件语句在相应的 `<a>` 标签中插入一个 ID。\n\n继续使用相同的文件。或者使用 `ch04` 文件夹中的 `index_02.php`、`contact.php`、`gallery.php`、`blog.php`、`menu_01.php`\
  \ 和 `footer_01.php`，确保从所有文件名中移除 `_01` 和 `_02`。\n\n打开 `menu.php`。当前代码如下所示：\n\n```\n\
  <ul id=\"nav\">\n<li><a href=\"index.php\" id=\"here\">首页</a></li>\n<li><a href=\"\
  blog.php\">博客</a></li>\n<li><a href=\"gallery.php\">画廊</a></li>\n<li><a href=\"\
  contact.php\">联系</a></li>\n</ul>\n```\n\n控制当前页面指示的样式由第 2 行高亮的 `id=\"here\"` 定义。你需要\
  \ PHP 在以下情况插入 `id=\"here\"`：如果当前页面是 `blog.php`，则插入到 `blog.php <a>` 标签中；如果页面是 `gallery.php`，则插入到\
  \ `gallery.php <a>` 标签中；如果页面是 `contact.php`，则插入到 `contact.php <a>` 标签中。\n\n希望你现在已经得到了提示——你需要在每个\
  \ `<a>` 标签中加入一个 `if` 语句（参见第 3 章中的“做出决策”）。第 2 行需要看起来像这样：\n\n```\n<li><a href=\"index.php\"\
  \ <?php if ($currentPage == 'index.php') { echo 'id=\"here\"'; } ?>>首页</a></li>\n\
  ```\n\n其他链接应以类似的方式进行修改。但是 `$currentPage` 如何获取其值呢？你需要找出当前页面的文件名。\n\n暂时将 `menu.php`\
  \ 放在一边，创建一个名为 `get_filename.php` 的新 PHP 页面。在一对 PHP 标签之间插入以下代码（或者使用 `ch04` 文件夹中的\
  \ `get_filename.php`）：\n\n```\necho $_SERVER['SCRIPT_FILENAME'];\n```\n\n保存 `get_filename.php`\
  \ 并在浏览器中查看它。在 Windows 系统上，你应该会看到类似以下截图的内容。（`ch04` 文件夹中的版本包含此步骤和下一步的代码，并附有文本说明哪个是哪个。）\n\
  \n![A978-1-4842-0635-5_4_Figa_HTML.jpg](img/A978-1-4842-0635-5_4_Figa_HTML.jpg)\n\
  \n在 Mac OS X 上，你应该会看到类似这样的内容：\n\n![A978-1-4842-0635-5_4_Figb_HTML.jpg](img/A978-1-4842-0635-5_4_Figb_HTML.jpg)\n\
  \n`$_SERVER['SCRIPT_FILENAME']` 来自 PHP 内置的超全局数组之一，它总是给出当前页面的绝对文件路径。你现在需要的是提取出文件名的方法。\n\
  \n像这样修改上一步中的代码：\n\n```\necho basename($_SERVER['SCRIPT_FILENAME']);\n```\n\n保存 `get_filename.php`\
  \ 并点击浏览器中的“重新加载”按钮。你现在应该只看到文件名：`get_filename.php`。\n\n内置的 PHP 函数 `basename()` 以文件路径作为参数并提取出文件名。就这样——你找到了一种找出当前页面文件名的方法。\n\
  \n像这样修改 `menu.php` 中的代码（更改部分以粗体显示）：\n\n```\n<?php $currentPage = basename($_SERVER['SCRIPT_FILENAME']);\
  \ ?>\n<ul id=\"nav\">\n<li><a href=\"index.php\" <?php if ($currentPage == 'index.php')\
  \ { echo 'id=\"here\"';} ?>>首页</a></li>\n<li><a href=\"blog.php\" <?php if ($currentPage\
  \ == 'blog.php') { echo 'id=\"here\"';} ?>>博客</a></li>\n<li><a href=\"gallery.php\"\
  \ <?php if ($currentPage == 'gallery.php') { echo 'id=\"here\"';} ?>>画廊</a></li>\n\
  <li><a href=\"contact.php\" <?php if ($currentPage == 'contact.php') { echo 'id=\"\
  here\"';} ?>>联系</a></li>\n</ul>\n```\n\n**注意：** 确保你正确结合了单引号和双引号。虽然 HTML 允许在属性值周围省略引号，但通常最佳实践是使用它们。由于我在\
  \ `here` 周围使用了双引号，所以我将字符串 `'id=\"here\"'` 用单引号括起来。我本可以写成 `\"id=\\\"here\\\"\"`，但混合使用单引号和双引号更容易阅读。\n\
  \n如有必要，将你的代码与 `ch04` 文件夹中的 `menu_02.php` 进行比较。\n\n![A978-1-4842-0635-5_4_Fig5_HTML.jpg](img/A978-1-4842-0635-5_4_Fig5_HTML.jpg)\n\
  \n图 4-5. 包含文件中的条件代码为每个页面生成不同的输出\n\n保存 `menu.php` 并在浏览器中加载 `index.php`。菜单看起来应该和之前没有区别。使用菜单导航到其他页面。这次，如图\
  \ 4-5 所示，当前页面的边框应该是白色的，指示你在网站中的位置。如果你在浏览器中查看页面的源代码视图，你会看到 `here` ID 已自动插入到正确的链接中。\n\
  \n\n\n### PHP 方案 4-4：根据文件名自动生成页面标题\n\n既然你已经知道如何获取当前页面的文件名，那么自动生成每个页面的 `<title>`\
  \ 标签内容也会很有用。本方案使用 `basename()` 提取文件名，然后利用 PHP 字符串函数格式化名称，以便插入到 `<title>` 标签中。\n\n\
  此方法仅适用于文件名能体现页面内容的场景，但由于这是一种良好的实践，所以其实算不上限制。虽然以下步骤使用的是 Japan Journey 网站，但你可以在任何页面上尝试。\n\
  \n创建一个名为 `title.php` 的新 PHP 文件，并将其保存在 `includes` 文件夹中。删除脚本编辑器自动插入的代码，然后输入以下代码：\n\
  \n```\n<?php\n$title = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n```\n\n**提示：**\
  \ 由于该文件仅包含 PHP 代码，请勿在末尾添加 PHP 结束标签。当同一文件中 PHP 代码后无其他内容时，结束标签是可选的。省略该标签有助于避免包含文件中常见的“headers\
  \ already sent（标头已发送）”错误。你将在 PHP 方案 4-8 中了解更多关于此错误的信息。\n\nPHP 方案 4-3 中使用的 `basename()`\
  \ 函数有一个可选的第二个参数：一个字符串，包含前面带点号的文件扩展名。添加第二个参数可以提取文件名并去除其扩展名。因此，这段代码会找到当前页面的文件名，去除\
  \ `.php` 扩展名，并将结果赋值给变量 `$title`。\n\n打开 `contact.php`，并在 `DOCTYPE` 上方输入以下代码来引入 `title.php`：\n\
  \n```\n<?php include './includes/title.php'; ?>\n```\n\n像这样修改 `<title>` 标签：\n\n\
  ```\n<title>Japan Journey <?php echo \"&#8212;{$title}\"; ?></title>\n```\n\n这里使用\
  \ `echo` 显示 `—`（长破折号的数字实体）后跟 `$title` 的值。由于字符串被双引号括起来，PHP 会显示 `$title` 的值。变量 `$title`\
  \ 被花括号括起来，因为长破折号和 `$title` 之间没有空格。虽然并非总是必要，但在双引号字符串中使用变量且没有空格时，将变量括在花括号内是一个好习惯。这可以使变量对开发者和\
  \ PHP 引擎都更清晰。\n\n我没有使用 `echo` 的简写形式（`<?=`），因为我们稍后会向此代码块添加更多脚本。\n\n你的页面开头几行应如下所示：\n\
  \n![A978-1-4842-0635-5_4_Figc_HTML.jpg](img/A978-1-4842-0635-5_4_Figc_HTML.jpg)\n\
  \n**注意：** 通常情况下，网页中 `DOCTYPE` 声明之前不应有任何内容。但这不适用于 PHP 代码，只要它不向浏览器发送任何输出即可。`title.php`\
  \ 中的代码仅给 `$title` 赋值，因此 `DOCTYPE` 声明仍然是浏览器看到的第一个输出。\n\n看起来不错，但如果你希望标题中来自文件名的部分首字母大写怎么办？PHP\
  \ 有一个简洁的小函数 `ucfirst()`，正是用于此目的（一旦你意识到 `uc` 代表“大写”，就很容易记住这个名字）。在第 2 步的代码中添加另一行，如下所示：\n\
  \n![A978-1-4842-0635-5_4_Fig6_HTML.jpg](img/A978-1-4842-0635-5_4_Fig6_HTML.jpg)\n\
  \n图 4-6. 提取文件名后，即可动态生成页面标题\n\n保存两个页面，然后在浏览器中加载 `contact.php`。不带 `.php` 扩展名的文件名已添加到浏览器标签页中，如图\
  \ 4-6 所示。\n\n```\n<?php\n$title = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n\
  $title = ucfirst($title);\n```\n\n如果你是编程新手，这看起来可能令人困惑，但一旦分析起来其实很简单：PHP 标签后的第一行代码获取文件名，去掉末尾的\
  \ `.php`，并将其存储为 `$title`。下一行获取 `$title` 的值，将其传递给 `ucfirst()` 来大写首字母，然后将结果存回 `$title`。因此，如果文件名是\
  \ `contact.php`，`$title` 初始值为 `contact`，但在执行下一行后，它变成了 `Contact`。\n\n**提示：** 你可以通过将这两行合并为一行来缩短代码，如下所示：\n\
  \n```\n$title = ucfirst(basename($_SERVER['SCRIPT_FILENAME'], '.php'));\n```\n\n\
  当像这样嵌套函数时，PHP 会先处理最内层的函数，并将结果传递给外层函数。这使代码更短，但可读性较差。\n\n这种技术的一个缺点是文件名只包含一个单词——至少应该是这样。URL\
  \ 中不允许有空格，这就是大多数网页设计软件将空格替换为 `%20` 的原因，这在 URL 中看起来既丑陋又不专业。你可以通过使用下划线来解决这个问题。\n\n\
  将 `contact.php` 的文件名更改为 `contact_us.php`。\n\n像这样修改 `title.php` 中的代码：\n\n```\n<?php\n\
  $title = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n$title = str_replace('_',\
  \ ' ', $title);\n$title = ucwords($title);\n```\n\n中间一行使用名为 `str_replace()` 的函数来查找每个下划线并将其替换为空格。该函数接受三个参数：要查找的字符、替换字符以及要修改的字符串。\n\
  \n**提示：** 你也可以使用 `str_replace()` 来删除字符，方法是将空字符串（一对中间没有任何内容的引号）作为第二个参数。这会将第一个参数中的字符串替换为空，从而有效地删除它。\n\
  \n最后一行动态生成代码使用了与 `ucfirst()` 相关的函数 `ucwords()`，该函数会将每个单词的首字母大写。\n\n![A978-1-4842-0635-5_4_Fig8_HTML.jpg](img/A978-1-4842-0635-5_4_Fig8_HTML.jpg)\n\
  \n图 4-8. 从 `index.php` 生成页面标题会产生不理想的结果\n\n保存 `title.php`，然后在浏览器中加载重命名后的 `contact_us.php`。图\
  \ 4-7 显示了结果。（Google Chrome 会截断标签页中的标题，但你可以通过工具提示看到完整标题。）\n\n![A978-1-4842-0635-5_4_Fig7_HTML.jpg](img/A978-1-4842-0635-5_4_Fig7_HTML.jpg)\n\
  \n图 4-7. 下划线已被移除，并且两个单词都首字母大写\n\n将文件名称改回 `contact.php`，然后重新加载文件到浏览器中。`title.php`\
  \ 中的脚本仍然有效。因为没有下划线需要替换，所以 `str_replace()` 会保持 `$title` 的值不变，而 `ucwords()` 会将首字母转换为大写，即使只有一个单词。\n\
  \n对 `index.php`、`blog.php` 和 `gallery.php` 重复步骤 3 和 4。\n\nJapan Journey 网站的主页名为\
  \ `index.php`。如图 4-8 所示，将当前方案应用于此页面似乎不太合适。\n\n有两种解决方案：要么不对此类页面应用此技术，要么使用条件语句（`if`\
  \ 语句）来处理特殊情况。例如，要显示 Home 而非 Index，可以像这样修改 `title.php` 中的代码：\n\n```\n<?php\n$title\
  \ = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n$title = str_replace('_', '\
  \ ', $title);\nif ($title == 'index') {\n    $title = 'home';\n}\n$title = ucwords($title);\n\
  ```\n\n条件语句的第一行使用两个等号来检查 `$title` 的值。下一行使用单个等号将新值赋给 `$title`。如果页面名称不是 `index.php`，花括号内的行将被忽略，`$title`\
  \ 保持其原始值。\n\n**提示：**\n\n\n\nPHP 是区分大小写的，因此这个解决方案仅在`\"index\"`全为小写时才有效。要进行不区分大小写的比较，请将上述代码第四行修改为：\n\
  \n```\nif (strtolower($title) == 'index') {\n```\n\n函数`strtolower()`将字符串转换为小写（因此得名），常用于进行不区分大小写的比较。小写转换并非永久性的，因为`strtolower($title)`并未赋值给变量；它仅用于比较操作。要使更改永久生效，需要将结果赋值回变量，例如最后一行将`ucwords($title)`赋值回`$title`。\n\
  \n要将字符串转换为大写，请使用`strtoupper()`。\n\n返回`contact.php`，你将看到页面标题仍然从页面名称正确派生。\n\n![A978-1-4842-0635-5_4_Fig9_HTML.jpg](img/A978-1-4842-0635-5_4_Fig9_HTML.jpg)\n\
  \n**图 4-9**\n\n条件语句将`index.php`上的标题更改为 Home。保存`title.php`并在浏览器中重新加载`index.php`。页面标题现在看起来更自然，如图\
  \ 4-9 所示。\n\n最后还需要改进一点。`<title>`标签内的 PHP 代码依赖于变量`$title`的存在，如果包含文件出现问题，该变量将不会被设置。在尝试显示来自外部来源的变量内容之前，最好使用名为`isset()`的函数检查该变量是否存在。\n\
  \n将`echo`命令包裹在条件语句中并测试变量是否存在，如下所示：\n\n```\n<title>Japan Journey<?php if (isset($title))\
  \ { echo \"—{$title}\"; } ?></title>\n```\n\n如果`$title`不存在，则忽略其余代码，保留默认站点标题 Japan\
  \ Journey。你需要将此更改应用到所有四个页面：`index.php`、`blog.php`、`gallery.php`和`contact.php`。\n\
  \n你可以将代码与`title.php`以及`ch04`文件夹中`index_03.php`、`blog_02.php`、`gallery_02.php`和`contact_02.php`的更新版本进行比对。\n\
  \n## 创建内容变化的页面\n\n到目前为止，我们已经使用 PHP 根据页面的文件名生成不同的输出。接下来的两个解决方案将生成独立于文件名变化的内容：一个在\
  \ 1 月 1 日自动更新年份的版权声明，以及一个随机图像生成器。\n\n### PHP 解决方案 4-5：自动更新版权声明\n\n目前，`footer.php`中的版权声明仅包含静态\
  \ HTML。此 PHP 解决方案将展示如何使用`date()`函数自动生成当前年份。代码还指定了版权起始年份，并使用条件语句判断当前年份是否不同。如果不同，则同时显示两个年份。\n\
  \n继续使用 PHP 解决方案 4-4 中的文件。或者，使用`ch04`文件夹中的`index_03.php`和`footer_01.php`，并移除文件名中的数字。如果使用`ch04`文件夹中的文件，请确保`includes`文件夹中有`title.php`和`menu.php`的副本。\n\
  \n打开`footer.php`。它包含以下 HTML：\n\n```\n<footer>\n<p>&copy; 2006&ndash;2014 David Powers</p>\n\
  </footer>\n```\n\n日期之间的`&ndash;`是短破折号的字符实体。\n\n使用包含文件的优点在于，只需更改这一个文件即可更新整个网站的版权声明。然而，更高效的方法是自动增加年份，从而完全无需每年更新。\n\
  \nPHP 的`date()`函数可以非常简洁地处理这个问题。将段落中的代码修改如下：\n\n```\n<p>&copy; 2006&ndash;<?php echo\
  \ date('Y'); ?> David Powers</p>\n```\n\n这将替换第二个日期，并使用四位数字显示当前年份。请确保向`date()`传递大写字母\
  \ Y 作为参数。\n\n保存`footer.php`并在浏览器中加载`index.php`。页面底部的版权声明应看起来与之前相同——当然，除非你是在 2015\
  \ 年或之后阅读本文，在这种情况下将显示当前年份。与大多数版权声明一样，这里涵盖了一个年份范围，表示网站首次上线的时间。由于第一个日期是过去的日期，可以硬编码。但如果你正在创建一个新网站，则只需要当前年份。直到\
  \ 1 月 1 日才需要年份范围。\n\n你不可能为了更新版权声明而中断新年狂欢。必须有更好的方法。多亏了 PHP，你可以在新年前夜尽情狂欢。\n\n要显示年份范围，你需要知道起始年份和当前年份。如果两个年份相同，则仅显示当前年份；如果不同，则同时显示并用短破折号分隔。这是一个简单的`if...else`场景。将`footer.php`中的段落代码修改如下：\n\
  \n```\n<p>&copy;\n<?php\n$startYear = 2006;\n$thisYear = date('Y');\nif ($startYear\
  \ == $thisYear) {\n    echo $startYear;\n} else {\n    echo \"{$startYear}&ndash;{$thisYear}\"\
  ;\n}\n?>\nDavid Powers</p>\n```\n\n与 PHP 解决方案 4-4 一样，我在`else`子句中使用了花括号包裹变量，因为它们位于不含空格的双引号字符串中。\n\
  \n保存`footer.php`并在浏览器中重新加载`index.php`。版权声明应看起来与之前相同。将传递给`date()`函数的参数改为小写 y，如下所示：\n\
  \n```\n$thisYear = date('y');\n```\n\n保存`footer.php`并点击浏览器的刷新按钮。第二个年份将仅显示最后两位数字，如下截图所示：\n\
  \n![A978-1-4842-0635-5_4_Figd_HTML.jpg](img/A978-1-4842-0635-5_4_Figd_HTML.jpg)\n\
  \n> **提示**\n> \n> 这应提醒你 PHP 是区分大小写的。对于`date()`函数，大写 Y 和小写 y 会产生不同的结果。忘记大小写敏感性是 PHP\
  \ 中最常见的错误原因之一。\n\n将传递给`date()`的参数改回大写 Y。将`$startYear`的值设置为当前年份并重新加载页面。这次，你应该只看到当前年份显示。你现在拥有了一个全自动的版权声明。完成后的代码位于`ch04`文件夹中的`footer_02.php`。\n\
  \n\n\n### PHP 方案 4-6：显示随机图片\n\n显示随机图片非常简单。你只需要一个可用图片列表，并将其存储在索引数组中（参见第 3 章中的“创建数组”）。由于索引数组从\
  \ 0 开始编号，你可以通过生成一个介于 0 和数组长度减 1 之间的随机数来随机选择一张图片。这一切只需几行代码即可完成……\n\n继续使用相同的文件。或者，使用\
  \ `ch04` 文件夹中的 `index_03.php` 并将其重命名为 `index.php`。由于 `index_03.php` 使用了 `title.php`、`menu.php`\
  \ 和 `footer.php`，请确保这三个文件都在你的 `includes` 文件夹中。图片已存放在 `images` 文件夹中。\n\n在 `includes`\
  \ 文件夹中创建一个空白的 PHP 页面，并将其命名为 `random_image.php`。插入以下代码（该代码也存在于 `ch04` 文件夹的 `random_image_01.php`\
  \ 中）：\n\n```php\n<?php\n\n$images = ['kinkakuji', 'maiko', 'maiko_phone', 'monk',\
  \ 'fountains',\n\n'ryoanji', 'menu', 'basin'];\n\n$i = rand(0, count($images)-1);\n\
  \n$selectedImage = \"images/{$images[$i]}.jpg\";\n```\n\n这就是完整的脚本：一个不包含 `.jpg` 文件扩展名的图片名称数组（无需重复共享信息——它们都是\
  \ JPEG 格式）、一个随机数生成器，以及一个用于构建选中文件正确路径名的字符串。\n\n**注意：** 此脚本使用了自 PHP 5.4 起引入的简写数组语法。\n\
  \n要在指定范围内生成随机数，请将最小值和最大值作为参数传递给 `rand()` 函数。由于数组中有八张图片，你需要一个介于 0 到 7 之间的数字。简单的做法是使用\
  \ `rand(0, 7)` — 简单但效率低下。每次更改 `$images` 数组时，你都需要手动计算它包含多少个元素，并修改传递给 `rand()` 的最大值。\n\
  \n让 PHP 替你计数要容易得多，而这正是 `count()` 函数的作用：它计算数组中元素的数量。你需要一个比数组元素数量少一的数字，因此传递给 `rand()`\
  \ 的第二个参数变成了 `count($images)-1`，结果存储在 `$i` 中。\n\n最后一行使用这个随机数为选中的文件构建正确的路径名。变量 `$images[$i]`\
  \ 被嵌入到一个双引号字符串中，且与周围字符之间没有空格，因此它被包含在花括号内。数组从 0 开始，所以如果随机数是 1，`$selectedImage` 就是\
  \ `images/maiko.jpg`。\n\n如果你是 PHP 新手，可能会觉得理解以下代码有些困难：\n\n```php\n$i = rand(0, count($images)-1);\n\
  ```\n\n其实，传递给 `rand()` 的第二个参数是一个表达式，而不是一个数字。如果这样能让你更容易理解，可以将代码重写如下：\n\n```php\n\
  $numImages = count($images); // $numImages 是 8\n$max = $numImages - 1;       //\
  \ $max 是 7\n$i = rand(0, $max);          // $i = rand(0, 7)\n```\n\n打开 `index.php`，通过在与\
  \ `title.php` 相同的代码块中插入命令来引入 `random_image.php`，如下所示：\n\n```php\n<?php include './includes/title.php';\n\
  include './includes/random_image.php'; ?>\n```\n\n由于 `random_image.php` 不会直接向浏览器发送任何输出，因此将其放在\
  \ `DOCTYPE` 之上是安全的。\n\n向下滚动 `index.php`，找到在 `<figure>` 元素中显示图片的代码。它看起来像这样：\n\n```html\n\
  <figure>\n<img src=\"images/basin.jpg\" alt=\"Water basin at Ryoanji temple\"\n\
  width=\"350\" height=\"237\">\n<figcaption>Water basin at Ryoanji temple</figcaption>\n\
  </figure>\n```\n\n不要使用固定的 `images/basin.jpg` 图片，而是用 `$selectedImage` 替换它。所有图片都有不同的尺寸，因此删除\
  \ `width` 和 `height` 属性，并使用通用的 `alt` 属性。同时移除 `<figcaption>` 元素中的文本。第三步中的代码现在应该如下所示：\n\
  \n```html\n<figure>\n<img src=\"<?= $selectedImage; ?>\" alt=\"Random image\">\n\
  <figcaption></figcaption>\n</figure>\n```\n\n**注意：** PHP 代码块只显示一个值，因此你可以使用简写 `<?=`。\n\
  \n![A978-1-4842-0635-5_4_Fig10_HTML.jpg](img/A978-1-4842-0635-5_4_Fig10_HTML.jpg)\n\
  \n**图 4-10.** 将图片文件名存储在索引数组中可以轻松显示随机图片\n\n保存 `random_image.php` 和 `index.php`，然后在浏览器中加载\
  \ `index.php`。此时图片应该会随机显示。点击浏览器中的“重新加载”按钮；你应该会看到各种不同的图片，如图 4-10 所示。\n\n你可以将代码与 `ch04`\
  \ 文件夹中的 `index_04.php` 和 `random_image_01.php` 进行对比。\n\n这是一种简单有效的随机图片显示方式，但如果能动态设置不同尺寸图片的宽度和高度，并为图片添加描述性标题，效果会更好。\n\
  \n\n\n#### PHP 方案 4-7：为随机图片添加标题\n\n本方案使用多维数组（即数组的数组）来存储每张图片的文件名和标题。如果你觉得多维数组的概念抽象难懂，不妨把它想象成一个大箱子，里面装了许多信封，每个信封里都有一张照片和它的标题。箱子是顶层数组，里面的信封则是子数组。\n\
  \n这些图片尺寸各不相同，但 PHP 恰好提供了一个名为 `getimagesize()` 的函数。猜猜它是做什么的。\n\n此 PHP 方案基于之前的方案构建，因此请继续使用相同的文件。\n\
  \n打开 `random_image.php` 并将代码修改如下：\n\n```\n<?php\n\n$images = [\n    ['file'    =>\
  \ 'kinkakuji',\n     'caption' => '京都金阁寺'],\n    ['file'    => 'maiko',\n     'caption'\
  \ => '舞伎——京都的见习艺伎'],\n    ['file'    => 'maiko_phone',\n     'caption' => '每个舞伎都应该有一个——当然是手机'],\n\
  \    ['file'    => 'monk',\n     'caption' => '在京都化缘的僧人'],\n    ['file'    => 'fountains',\n\
  \     'caption' => '东京市中心的喷泉'],\n    ['file'    => 'ryoanji',\n     'caption' =>\
  \ '京都龙安寺的秋叶'],\n    ['file'    => 'menu',\n     'caption' => '京都先斗町餐厅外的菜单'],\n \
  \   ['file'    => 'basin',\n     'caption' => '京都龙安寺的水盆']\n];\n\n$i = rand(0, count($images)-1);\n\
  $selectedImage = \"images/{$images[$i]['file']}.jpg\";\n$caption = $images[$i]['caption'];\n\
  ```\n\n**注意**  \n代码需要仔细处理。每个子数组由一对方括号括起来，后跟一个逗号，用于与下一个子数组分隔。按照图示对齐数组键和值，你会发现构建和维护多维数组会更容易。\n\
  \n虽然代码看起来复杂，但它只是一个普通的索引数组，包含八个元素，每个元素都是一个关联数组，定义了 `'file'` 和 `'caption'`。多维数组的定义构成了一条语句，因此在第\
  \ 19 行之前没有分号。该行的右括号与第 2 行的左括号匹配。\n\n用于选择图片的变量也需要更改，因为 `$images[$i]` 不再包含字符串，而是包含一个数组。要获取正确的图片文件名，需要使用\
  \ `$images[$i]['file']`。所选图片的标题包含在 `$images[$i]['caption']` 中，并存储在一个较短的变量中。\n\n\
  现在需要修改 `index.php` 中的代码以显示标题，如下所示：\n\n```\n<figure>\n<img src=\"<?= $selectedImage;\
  \ ?>\" alt=\"随机图片\">\n<figcaption><?= $caption; ?></figcaption>\n</figure>\n```\n\
  \n在 `random_image.php` 末尾添加以下代码：\n\n```\nif (file_exists($selectedImage) && is_readable($selectedImage))\
  \ {\n    $imageSize = getimagesize($selectedImage);\n}\n```\n\n`if` 语句使用了两个函数 `file_exists()`\
  \ 和 `is_readable()`，以确保 `$selectedImage` 不仅存在，而且可以访问（它可能已损坏或权限错误）。这些函数返回布尔值（`true`\
  \ 或 `false`），因此可以直接用作条件语句的一部分。`if` 语句内的单行代码使用 `getimagesize()` 函数获取图片的尺寸，并将其存储在\
  \ `$imageSize` 中。你将在第 8 章了解更多关于 `getimagesize()` 的信息。目前，你需要关注以下两条信息：\n\n* `$imageSize[0]`：图片的宽度（像素）\n\
  * `$imageSize[3]`：一个字符串，包含图片的高度和宽度，格式化为可插入 `<img>` 标签的内容\n\n首先，让我们修复 `<img>` 标签中的代码。按如下方式修改：\n\
  \n![A978-1-4842-0635-5_4_Fig11_HTML.jpg](img/A978-1-4842-0635-5_4_Fig11_HTML.jpg)\n\
  \n**图 4-11.** 长标题超出了图片范围，并将其向左偏移过多\n\n保存 `index.php` 和 `random_image.php`，然后在浏览器中加载\
  \ `index.php`。大多数图片看起来正常，但手持手机的舞伎图片右侧会出现一个难看的空白，如图 4-11 所示。\n\n```\n<img src=\"\
  <?= $selectedImage; ?>\" alt=\"随机图片\" <?= $imageSize[3]; ?>>\n```\n\n这会在 `<img>`\
  \ 标签中插入正确的 `width` 和 `height` 属性。\n\n虽然这设置了图片的尺寸，但仍需控制标题的宽度。你不能在外部样式表中使用 PHP，但这并不妨碍你在\
  \ `index.php` 的 `<head>` 中创建一个 `<style>` 块。在结束的 `</head>` 标签之前插入以下代码。\n\n```\n<?php\
  \ if (isset($imageSize)) { ?>\n<style>\nfigcaption {\n    width: <?= $imageSize[0];\
  \ ?>px;\n}\n</style>\n<?php } ?>\n```\n\n这段代码只有短短七行，但却是 PHP 和 HTML 的奇特混合。让我们从第一行和最后一行开始。如果去掉\
  \ PHP 标签并用注释替换 HTML `<style>` 块，你会得到以下内容：\n\n```\nif (isset($imageSize)) {\n   \
  \ // 如果 $imageSize 已设置，则执行某些操作\n}\n```\n\n换句话说，如果变量 `$imageSize` 尚未设置（定义），PHP 引擎会忽略花括号之间的所有内容。括号之间的代码大部分是\
  \ HTML 和 CSS，这无关紧要。如果 `$imageSize` 尚未设置，PHP 引擎会跳转到右花括号，中间代码不会发送到浏览器。\n\n**提示** \
  \ \n许多经验不足的 PHP 编码人员错误地认为需要在条件语句中使用 `echo` 或 `print` 来生成 HTML 输出。只要开闭花括号匹配，你就可以像这样使用\
  \ PHP 隐藏或显示 HTML 部分。这比一直使用 `echo` 整洁得多，也省去了大量输入。\n\n如果 `$imageSize` 已设置，则会创建 `<style>`\
  \ 块，并使用 `$imageSize[0]` 为包含标题的段落设置正确的宽度。\n\n![A978-1-4842-0635-5_4_Fig12_HTML.jpg](img/A978-1-4842-0635-5_4_Fig12_HTML.jpg)\n\
  \n**图 4-12.** 通过创建与图片大小直接相关的样式规则，消除了难看的空白\n\n保存 `random_image.php` 和 `index.php`，然后在浏览器中重新加载\
  \ `index.php`。点击“重新加载”按钮，直到出现手持手机的舞伎图片。这一次，它看起来应该像图 4-12。如果查看浏览器的源代码，样式规则会使用正确的图片宽度。\n\
  \n**注意**  \n如果标题仍然突出，请确保 `<style>` 块中结束的 PHP 标签和 `px` 之间没有空格。CSS 不允许值和度量单位之间有空白。\n\
  \n`random_image.php` 底部的条件语句仅当所选图片存在且可读时才设置 `$imageSize`，因此如果设置了 `$imageSize`，你就知道一切准备就绪。在\
  \ `index.php` 中，在显示图片的 `<figure>` 元素周围添加条件语句的开闭块，如下所示：\n\n![A978-1-4842-0635-5_4_Fig13_HTML.jpg](img/A978-1-4842-0635-5_4_Fig13_HTML.jpg)\n\
  \n**图 4-13.** 包含文件中的错误可能会破坏页面外观\n\n`random_image.php` 中的代码和你刚刚插入的代码防止了所选图片无法找到时出现错误，但显示图片的代码缺少类似的检查。临时更改\
  \ `random_image.php` 或 `images` 文件夹中某个图片的名称。多次重新加载 `index.php`。最终，你应该会看到类似图 4-13\
  \ 中的错误消息。这看起来非常不专业。\n\n```\n<?php if (isset($imageSize)) { ?>\n<figure>\n<img src=\"\
  <?= $selectedImage; ?>\" alt=\"随机图片\"\n<?= $imageSize[3]; ?>>\n<figcaption><?= $caption;\
  \ ?></figcaption>\n</figure>\n<?php } ?>\n```\n\n\n\n已存在的图像会正常显示，但即使文件缺失或损坏，你也能避免令人尴尬的错误信息——这显得更加专业。别忘了恢复你在上一步中修改的图像名称。\n\
  \n你可以在`ch04`文件夹中的`index_05.php`和`random_image_02.php`文件中核对你的代码。\n\n## 使用包含文件防止错误\n\
  \n许多主机商会关闭通知级别的错误报告，因此，如果你只在远程服务器上进行测试，可能不会意识到图 4-13 所示的问题。然而，在互联网上部署 PHP 页面之前，消除所有错误非常重要。仅仅因为你看不到错误信息，并不意味着你的页面没有问题。\n\
  \n使用 PHP 这类服务器端技术的页面会处理许多未知因素，因此明智的做法是进行防御性编码，在使用值之前先进行检查。本节将介绍一些措施，你可以用来预防和排查包含文件相关的错误。\n\
  \n### 检查变量的存在性\n\n从 PHP 解决方案 4-7 中可以得出的教训是，你应该始终使用`isset()`来验证来自包含文件的变量是否存在，并将使用该变量的任何代码包装在条件语句中。在这个特定案例中，如果`$imageSize`不存在，你就知道没有图像可显示，因此需要移除`<figure>`元素。不过，在其他情况下，你或许可以为变量分配一个默认值，如下所示：\n\
  \n```\nif (!isset($someVariable)) {\n    $someVariable = default value;\n}\n```\n\
  \n这段代码使用了逻辑`非`运算符（参见第 3 章的表格 3-6），检查`$someVariable`是否未被设置。如果`$someVariable`不存在，则为其分配一个默认值，该值可以在后面的脚本中使用。如果它已存在，则条件语句内的代码会被跳过，并会使用原始值。\n\
  \n### 检查函数或类是否已定义\n\n包含文件经常用于定义自定义函数或类。尝试使用一个未定义的函数或类会触发致命错误。要检查一个函数是否已定义，请将函数名作为字符串传递给`function_exists()`。在向`function_exists()`传递函数名时，省略函数名末尾的括号。例如，你可以这样检查一个名为`doubleIt()`的函数是否已定义：\n\
  \n```\nif (function_exists('doubleIt')) {\n    // 使用 doubleIt()\n}\n```\n\n要检查一个类是否已定义，可以类似地使用`class_exists()`，将一个包含类名的字符串作为参数传递：\n\
  \n```\nif (class_exists('MyClass')) {\n    // 使用 MyClass\n}\n```\n\n假设你想使用该函数或类，那么更实用的方法是：如果函数或类尚未定义，则使用条件语句来包含定义文件。例如，如果`doubleIt()`的定义位于名为`utilities.php`的文件中：\n\
  \n```\nif (!function_exists('doubleIt')) {\n    require_once './includes/utilities.php';\n\
  }\n```\n\n## 在线上网站中抑制错误信息\n\n假设你的包含文件在远程服务器上正常工作，那么前几节概述的措施可能就是你需要的全部错误检查了。但是，如果你的远程服务器显示了错误信息，你应该采取措施来抑制它们。以下技术可以隐藏所有错误信息，而不仅仅是与包含文件相关的那些。\n\
  \n### 使用错误控制运算符\n\n一种比较粗糙但有效的技术是使用 PHP 错误控制运算符（`@`），它可以抑制与其所在行相关的错误信息。你可以将`@`放在行的开头，或者直接放在你可能认为会生成错误的函数或命令前面，如下所示：\n\
  \n```\n@ include './includes/random_image.php';\n```\n\n错误控制运算符的问题在于，它隐藏了错误，而不是绕开它们解决问题。它只有一个字符，因此很容易忘记你使用过它。结果，你可能在脚本的错误部分浪费大量时间查找错误。如果你使用了错误控制运算符，那么在排查问题时，`@`标记应该是你第一个移除的东西。\n\
  \n另一个缺点是，你需要在每一个可能生成错误信息的行上都使用错误控制运算符，因为它只影响当前行。\n\n### 在 PHP 配置中关闭`display_errors`\n\
  \n在线上网站中抑制错误信息的一个更好方法是，在 Web 服务器的配置中关闭`display_errors`指令。最有效的方式是你的主机商允许你控制`php.ini`设置时，直接编辑它。找到`display_errors`指令，并将其从`On`改为`Off`。\n\
  \n如果你无法控制`php.ini`，许多主机商允许你通过一个名为`.htaccess`或`.user.ini`的文件来更改有限范围的配置设置。具体使用哪个文件取决于\
  \ PHP 在服务器上的安装方式，因此请咨询你的主机商以确定使用哪一个。\n\n如果你的服务器支持`.htaccess`文件，请在服务器根目录下的`.htaccess`文件中添加以下命令：\n\
  \n```\nphp_flag display_errors Off\n```\n\n在`.user.ini`文件中，命令则很简单：\n\n```\ndisplay_errors\
  \ Off\n```\n\n`.htaccess`和`.user.ini`都是纯文本文件。与`php.ini`一样，每个命令都应单独占一行。如果这些文件在你的远程服务器上尚不存在，你可以直接在文本编辑器中创建它们。确保你的编辑器不会自动在文件名末尾添加`.txt`。然后，将该文件上传到你的网站服务器根目录。\n\
  \n> **提示**\n> Mac OS X 会隐藏以点号开头的文件名，因此你在 Mac Finder 中将无法看到它们。但是，你应该可以使用专门的脚本编辑器打开它们。在“文件\
  \ ➤ 打开”对话框中，选择“启用: 所有项目”并勾选“显示隐藏项目”复选框。\n\n#### 在单个文件中关闭`display_errors`\n\n如果你无法控制服务器配置，可以通过在任何脚本的顶部添加以下代码行来阻止错误信息显示：\n\
  \n```\n<?php ini_set('display_errors', '0'); ?>\n```\n\n\n\n### PHP 解决方案 4-8：在无法找到包含文件时进行重定向\n\
  \n到目前为止所有建议的技术都只是抑制在找不到包含文件时的错误消息。如果缺少包含文件会导致页面失去意义，那么你应该在包含文件缺失时将用户重定向到错误页面。\n\n\
  一种实现方式是抛出异常，像这样：\n\n```\n$file = './includes/menu.php';\nif (file_exists($file)\
  \ && is_readable($file)) {\n    include $file;\n} else {\n    throw new Exception(\"\
  $file can't be found\");\n}\n```\n\n当使用可能抛出异常的代码时，你需要将其包装在 `try` 块中，并创建一个 `catch`\
  \ 块来处理异常（参见第 3 章中的\"处理异常\"）。这个 PHP 解决方案展示了如何做到这一点，即当找不到包含文件时，使用 `catch` 块将用户重定向到不同的页面。\n\
  \n如果你已经彻底设计和测试了你的网站，那么在大多数使用包含文件的页面上应该不需要用到这种技术。然而，这绝非一个毫无意义的练习。它展示了 PHP 的几个重要特性：如何抛出和捕获异常，以及如何重定向到另一个页面。正如你将从下面的说明中看到的，重定向并不总是那么简单。这个\
  \ PHP 解决方案展示了如何克服最常见的问题。\n\n继续使用 PHP 解决方案 4-7 中的 `index.php`。或者，使用 `ch04` 文件夹中的\
  \ `index_05.php`。\n\n将 `ch04` 文件夹中的 `error.php` 复制到站点根目录。如果你的编辑程序提示你更新页面中的链接，请不要更新。这是一个静态页面，包含一条通用错误消息和返回其他页面的链接。在你的编辑程序中打开\
  \ `index.php`。导航菜单是最不可或缺的包含文件，因此像这样编辑 `index.php` 中的 `require` 命令：\n\n```\n$file\
  \ = './includes/menu.php';\nif (file_exists($file) && is_readable($file)) {\n  \
  \  require $file;\n} else {\n    throw new Exception(\"$file can't be found\");\n\
  }\n```\n\n提示：像这样将包含文件的路径存储在一个变量中，可以避免重复输入四次，从而减少拼写错误的可能性。\n\n要重定向用户到另一个页面，请使用 `header()`\
  \ 函数。但是，如果在调用 `header()` 之前有任何输出已经发送到浏览器，重定向就不会工作。除非存在语法错误，否则 PHP 引擎通常会从页面顶部开始处理，输出\
  \ HTML，直到遇到问题。这意味着当 PHP 引擎执行到这段代码时，输出已经开始了。为了防止这种情况，在任何输出生成之前启动 `try` 块。（这在许多设置上实际上不会起作用，但请稍安勿躁，因为它展示了一个重要的点。）\n\
  \n滚动到页面顶部，像这样编辑开头的 PHP 代码块：\n\n```php\n<?php try {\n    include './includes/title.php';\n\
  \    include './includes/random_image.php'; ?>\n```\n\n这样就打开了 `try` 块。\n\n向下滚动到页面底部，在结束的\
  \ `</html>` 标签之后添加以下代码：\n\n```php\n<?php } catch (Exception $e) {\n    header('Location:\
  \ http://localhost/phpsols/error.php ');\n} ?>\n```\n\n这样就关闭了 `try` 块并创建了一个 `catch`\
  \ 块来处理异常。`catch` 块中的代码使用 `header()` 将用户重定向到 `error.php`。\n\n`header()` 函数向浏览器发送一个\
  \ HTTP 头。它接受一个字符串作为参数，该字符串包含由冒号分隔的头及其值。在这里，它使用 `Location` 头将浏览器重定向到冒号后 URL 指定的页面。如果需要，请调整\
  \ URL 以匹配你自己的设置。\n\n![A978-1-4842-0635-5_4_Fig14_HTML.jpg](img/A978-1-4842-0635-5_4_Fig14_HTML.jpg)\n\
  \n图 4-14。如果输出已经发送到浏览器，`header()` 函数将无法工作。\n\n保存 `index.php` 并在浏览器中测试该页面。它应该正常显示。更改\
  \ `$file`（你在第 2 步中创建的变量）的值，使其指向一个不存在的包含文件，例如 `men.php`。保存 `index.php` 并在浏览器中重新加载它。如果你在测试环境中使用\
  \ XAMPP，你很可能被正确地重定向到 `error.php`。使用 MAMP（以及其他测试环境），你很可能会看到图 4-14 中的消息。\n\n图 4-14\
  \ 中的错误消息可能是导致最多人捶键盘的原因了。（我也心头带伤。）如前所述，如果输出已经发送到浏览器，则不能使用 `header()` 函数。那么，到底发生了什么？\n\
  \n答案就在错误消息中，但并非一目了然。它说错误发生在第 51 行，这是调用 `header()` 函数的地方。你真正需要知道的是输出是在哪里生成的。这个信息隐藏在这里：\n\
  \n`(output started at /Applications/MAMP/htdocs/phpsols/index.php:8)`\n\n冒号后面的数字\
  \ 8 是行号。那么，`index.php` 的第 8 行是什么？正如你从下面的屏幕截图中看到的，第 8 行使用 `echo` 来显示 `$title` 的值。\n\
  \n![A978-1-4842-0635-5_4_Fige_HTML.jpg](img/A978-1-4842-0635-5_4_Fige_HTML.jpg)\n\
  \n因为直到这一点代码都没有错误，PHP 引擎已经输出了 HTML。一旦发生这种情况，`header()` 就无法重定向页面。\n\n即使你删除这行 PHP 代码，错误消息也只会报告输出是从包含\
  \ PHP 块的下一行开始的。实际发生的情况是，web 服务器正在输出 `DOCTYPE` 之后的所有 HTML，但 PHP 引擎需要处理一个 PHP 代码块才能报告行号。这就提出了一个问题：在输出已经发送到浏览器之后，如何重定向页面。幸运的是，PHP\
  \ 提供了答案，它允许你将输出存储在一个缓冲区（web 服务器的内存）中。\n\n注意：你在 XAMPP 和其他一些设置中不会收到此错误消息的原因是，PHP 配置中已启用输出缓冲。XAMPP\
  \ 将该值设置为 4096，这意味着在 HTTP 头发送到浏览器之前，缓冲区中存储了 4 KB 的输出。虽然这很有用，但它给你一种虚假的安全感，因为你的远程服务器上可能没有启用输出缓冲。所以，即使你被正确重定向了，也请继续阅读。\n\
  \n像这样编辑 `index.php` 顶部的代码块：\n\n```php\n<?php ob_start();\ntry {\n    include './includes/title.php';\n\
  \    include './includes/random_image.php'; ?>\n```\n\n`ob_start()` 函数会开启输出缓冲，防止在调用\
  \ `header()` 函数之前有任何输出被发送到浏览器。\n\nPHP 引擎会在脚本结束时自动刷新缓冲区，但最好显式地进行刷新。像这样编辑页面底部的 PHP\
  \ 代码块：\n\n```php\n<?php } catch (Exception $e) {\n    ob_end_clean();\n    header('Location:\
  \ http://localhost/phpsols/error.php ');\n}\nob_end_flush();\n?>\n```\n\n这里添加了两个不同的函数。当重定向到另一个页面时，你不希望缓冲区中存储的\
  \ HTML 被发送出去。因此，在 `catch` 块内部，调用了 `ob_end_clean()`，它会关闭缓冲区并丢弃其内容。\n\n然而，如果没有抛出异常，你希望显示缓冲区的内容，因此在\
  \ `try` 和 `catch` 两个块之后的页面末尾调用了 `ob_end_flush()`。这会刷新缓冲区的内容并将其发送到浏览器。\n\n将 `$file`\
  \ 的值改回 `./includes/menu.php` 并保存 `index.php`。当你点击错误页面上的 Home 链接时，`index.php` 应该会正常显示。\n\
  \n![A978-1-4842-0635-5_4_Fig15_HTML.jpg](img/A978-1-4842-0635-5_4_Fig15_HTML.jpg)\n\
  \n图 4-15。\n\n\n\n"
- "# 排版后的文本\n\n缓冲输出（Buffering）使浏览器能够重定向到错误页面。保存`index.php`并在浏览器中重新加载。这次，您应该会被重定向到错误页面，如图\
  \ 4-15 所示。\n\n您可以将代码与`ch04`文件夹中的`index_06.php`进行比较。\n\n## 选择包含文件（Include Files）的存放位置\n\
  \nPHP 包含文件的一个有用特性是它们可以放在任何位置，只要使用`include`命令的页面知道在哪里找到它们即可。包含文件甚至不需要放在 Web 服务器的根目录内。这意味着您可以将包含敏感信息（如密码）的包含文件保护在浏览器无法访问的私有目录（文件夹）中。因此，如果您的托管公司提供了服务器根目录之外的存储区域，您应该认真考虑将部分（如果不是全部）包含文件存放在那里。\n\
  \n`include`命令需要一个相对路径或完整路径。如果两者都未指定，PHP 会自动在 PHP 配置中指定的`include_path`中查找。下一节将解释如何更改\
  \ PHP 自动搜索包含文件的文件夹。\n\n## 调整您的`include_path`\n\n将包含文件存放在 Web 服务器的`include_path`中指定的文件夹中的好处是，您无需担心相对路径或绝对路径是否正确。您只需要文件名即可。如果您使用大量包含文件，或者您的站点层级较深，这将非常有用。更改`include_path`有三种方法：\n\
  \n- 编辑`php.ini`中的值：如果您的托管公司允许您访问`php.ini`，这是添加自定义包含文件夹的最佳方式。\n- 使用`.htaccess`或`.user.ini`：如果您的托管公司允许通过`.htaccess`或`.user.ini`文件更改配置，这是一个很好的替代方案。\n\
  - 使用`set_include_path()`：仅在其他选项不可用时使用此方法，因为它仅影响当前文件的`include_path`。\n\n运行`phpinfo()`时，您的\
  \ Web 服务器的`include_path`值会列在配置详情的 Core 部分。它通常以句点开头，表示当前文件夹，后跟每个要搜索的文件夹的绝对路径。在 Linux\
  \ 和 Mac OS X 上，每个路径由冒号分隔。在 Windows 上，分隔符是分号。在 Linux 或 Mac 服务器上，您现有的`include_path`指令可能如下所示：\n\
  \n```\n.:/php/PEAR\n```\n\n在 Windows 服务器上，等效内容如下所示：\n\n```\n.;C:\\php\\PEAR\n```\n\
  \n### 在`php.ini`或`.user.ini`中编辑`include_path`\n\n在`php.ini`中，找到`include_path`指令。要在您自己的站点中添加一个名为`includes`的文件夹，请在现有值的末尾添加一个冒号或分号（取决于服务器的操作系统），后跟`includes`文件夹的绝对路径。\n\
  \n在 Linux 或 Mac 服务器上，像这样使用冒号：\n\n```\ninclude_path=\".:/php/PEAR:/home/mysite/public_html/includes\"\
  \n```\n\n在 Windows 服务器上，使用分号：\n\n```\ninclude_path=\".;C:\\php\\PEAR;C:\\sites\\\
  mysite\\www\\includes\"\n```\n\n`.user.ini`文件的命令相同。`.user.ini`中的值会覆盖默认值，因此请确保从`phpinfo()`复制现有值并将新路径添加到其中。\n\
  \n### 使用`.htaccess`更改`include_path`\n\n`.htaccess`文件中的值会覆盖默认值，因此请从`phpinfo()`复制现有值并将新路径添加到其中。在\
  \ Linux 或 Mac 服务器上，值应类似于以下内容：\n\n```\nphp_value include_path \".:/php/PEAR:/home/mysite/public_html/includes\"\
  \n```\n\n在 Windows 上命令相同，只不过需要用分号分隔路径：\n\n```\nphp_value include_path \".;C:\\php\\\
  PEAR;C:\\sites\\mysite\\www\\includes\"\n```\n\n注意：在`.htaccess`中，不要在`include_path`和路径名列表之间插入等号。\n\
  \n### 使用`set_include_path()`\n\n虽然`set_include_path()`仅影响当前页面，但您可以轻松创建代码片段并将其粘贴到要使用它的页面中。PHP\
  \ 还简化了获取现有`include_path`并以平台无关的方式将其与新路径结合的操作。\n\n将新路径存储在一个变量中，然后与现有值结合，如下所示：\n\n\
  ```php\n$includes_folder = '/home/mysite/public_html/includes';\nset_include_path(get_include_path()\
  \ . PATH_SEPARATOR . $includes_folder);\n```\n\n看起来像是向`set_include_path()`传递了三个参数，但实际上只有一个；这三个元素由连接运算符（句点）连接，而不是逗号。\n\
  \n- `get_include_path()` 获取现有的`include_path`。\n- `PATH_SEPARATOR`是一个 PHP 常量，它会根据操作系统自动插入冒号或分号。\n\
  - `$includes_folder`添加新路径。\n\n这种方法的问题在于，新`includes`文件夹的路径在远程服务器和本地测试服务器上可能不相同。您可以使用条件语句来解决这个问题。超全局变量`$_SERVER['HTTP_HOST']`包含网站的域名。如果您的域名是`www.example.com`，您可以像这样为每个服务器设置正确的路径：\n\
  \n```php\nif ($_SERVER['HTTP_HOST'] == 'www.example.com') {\n    $includes_folder\
  \ = '/home/example/public_html/includes';\n} else {\n    $includes_folder = 'C:/xampp/htdocs/phpsols/includes';\n\
  }\nset_include_path(get_include_path() . PATH_SEPARATOR . $includes_folder);\n```\n\
  \n对于不使用许多包含文件的小型网站来说，使用`set_include_path()`可能并不值得。但在更复杂的项目中，您可能会发现它很有用。\n\n## 为什么我不能在\
  \ PHP 包含文件中使用站点根目录相对链接？\n\n嗯，您可以使用，但也不能用。为清楚起见，我将首先解释文档相对链接和站点根目录相对链接之间的区别。\n\n\
  ### 文档相对链接\n\n当您单击链接转到另一个页面时，`<a>`标签中的路径告诉浏览器如何从当前页面到达下一个页面。大多数 Web 创作工具指定的路径是相对于当前文档的。如果目标页面在同一文件夹中，则仅使用文件名。如果目标页面比当前页面高一级，则文件名前会加上`../`。这被称为文档相对路径或链接。如果您的站点有许多文件夹层级，这种类型的链接可能难以理解（至少对人类来说如此）。\n\
  \n### 站点根目录相对链接\n\n另一种类型的链接始终以正斜杠开头，它是站点根目录的简写。站点根目录相对路径的优点是，无论当前页面在站点层级中多深，开头的正斜杠都能保证\
  \ Web 服务器将从站点的顶层开始查找。尽管站点根目录相对链接更容易阅读，但 PHP 的`include`命令无法处理它们。您必须使用文档相对路径、绝对路径，或者在`include_path`指令中指定`includes`文件夹。\n\
  \n您可以通过将超全局变量`$_SERVER['DOCUMENT_ROOT']`连接到路径的开头来将站点根目录相对路径转换为绝对路径，如下所示：\n\n```php\n\
  include $_SERVER['DOCUMENT_ROOT'] . '/includes/filename.php';\n```\n\n大多数服务器支持`$_SERVER['DOCUMENT_ROOT']`，但您应该检查`phpinfo()`显示的配置详情底部的\
  \ PHP Variables 部分以确认。\n\n\n\n### 包含文件中的链接\n\n这一点往往会让人困惑。尽管 PHP 的包含命令不理解站点根目录相对链接，但包含文件中的链接通常应该相对于站点根目录。这是因为包含文件可能被放入站点层级中的任何位置，因此当文件被包含在不同层级时，文档相对链接就会失效。\n\
  \n**注意：** `menu.php` 中的导航菜单使用的是文档相对链接，而非相对于站点根目录的链接。之所以特意保留这种写法，是因为除非你创建了虚拟主机，否则站点根目录是\
  \ `localhost`，而不是 `phpsols`。这是在 Web 服务器文档根目录的子文件夹中测试站点的一个缺点。本书全程使用的日本之旅网站只有一个层级，因此文档相对链接可以正常工作。当开发多级文件夹的站点时，请在包含文件中使用站点根目录相对链接，并考虑设置虚拟主机用于测试（详见第\
  \ 2 章）。\n\n### 嵌套包含文件\n\n一旦一个文件被包含到另一个文件中，相对路径的计算将基于父文件，而不是被包含的文件。这给需要包含另一个外部文件的外部文件中的函数或类定义带来了问题。\n\
  \n如果两个外部文件位于同一文件夹中，你可以仅通过文件名来包含嵌套文件，像这样：\n\n`require_once 'Thumbnail.php';`\n\n\
  在这种情况下，相对路径不应以 `./` 开头，因为 `./` 表示“从此文件夹开始”。对于包含文件来说，“此文件夹”指的是父文件的文件夹，而不是包含文件本身的文件夹，这会导致嵌套文件的路径错误。\n\
  \n当包含文件位于不同文件夹时，你可以使用 PHP 常量 `__DIR__` 构建目标文件的绝对路径。该常量返回包含文件所在目录（文件夹）的绝对路径，且不带尾部斜杠。将\
  \ `__DIR__`、一个正斜杠和文档相对路径拼接起来，就能将相对路径转换为绝对路径。例如，假设从一个包含文件到另一个包含文件的相对路径如下：\n\n`'../File/Upload.php'`\n\
  \n你可以这样将其转换为绝对路径：\n\n`__DIR__ . '/../File/Upload.php'`\n\n为了方便，在文档相对路径的开头添加了正斜杠。这样做的效果是，先找到包含文件的父文件夹，然后向上返回一级，以找到正确的路径。\n\
  \n你将在第 8 章中看到一个使用示例，其中一个包含文件需要包含另一个位于不同文件夹中的文件。\n\n## 包含文件的安全注意事项\n\n包含文件是 PHP 的一个非常强大的特性。这种强大也带来了安全风险。只要外部文件可访问，PHP\
  \ 就会包含它，并将其中的任何代码整合到主脚本中。但正如本章前面提到的，包含文件可以位于任何位置。从技术上讲，它们甚至可以在不同的服务器上。然而，这被认为是一种安全风险，以至于在\
  \ PHP 5.2 中引入了一个新的配置指令 `allow_url_include`。默认设置为 `Off`，因此除非你能完全控制服务器的配置，否则现在无法包含来自不同服务器的文件。与\
  \ `include_path` 不同，`allow_url_include` 指令除了服务器管理员之外，其他任何人都无法覆盖。\n\n即使你同时控制着两个服务器，也绝不应该包含来自其他服务器的文件。攻击者有可能伪造地址，并尝试在你的站点上执行恶意脚本。\n\
  \n### 本章回顾\n\n本章已经将你带入 PHP 的世界，使用了包含文件、数组和多维数组。它向你展示了如何提取当前页面的名称、显示随机图像以及获取图像的尺寸。你还学习了如何抛出和捕获异常，以及如何重定向到不同的页面。内容很多，如果一次不能完全消化，也不必担心。使用\
  \ PHP 越多，你就越熟悉这些基本技术。在下一章中，你将学习 PHP 如何处理来自在线表单的输入，并运用这些知识将来自网站的用户反馈发送到你的电子邮箱。\n\n"
- '# 5. 让表单生动起来


  表单是 PHP 工作的核心。你可以使用表单登录受限页面、注册新用户、向在线商店下单、在数据库中输入和更新信息、发送反馈……这样的例子不胜枚举。所有这些用途背后的原理都是相同的，因此你在本章获得的知识将在大多数
  PHP 应用中具有实用价值。为了演示如何处理表单信息，我将向你展示如何收集网站访问者的反馈，并将其发送到你的邮箱。


  不幸的是，用户的输入可能会让你的网站暴露于恶意攻击之下。在接受数据之前，检查表单提交的数据非常重要。虽然 HTML5 表单元素在最新的浏览器中会验证用户输入，但你仍然需要在服务器端检查数据。HTML5
  验证有助于合法用户避免提交带有错误的表单，但恶意用户可以轻松绕过在浏览器中执行的检查。服务器端验证并非可有可无，而是至关重要的。本章中的 PHP 解决方案将向你展示如何过滤或阻止任何可疑或危险的内容。防止恶意攻击并不需要耗费太多精力。同时，如果表单不完整或发现错误，保留用户输入并重新显示也是一个好主意。


  这些解决方案将构建一个完整的邮件处理脚本，该脚本可以在不同的表单中重复使用，因此按顺序阅读它们很重要。


  在本章中，你将了解以下内容：


  - 理解用户输入如何从在线表单传输

  - 在不丢失用户输入的情况下显示错误

  - 验证用户输入

  - 通过电子邮件发送用户输入




  '
- "# PHP 如何从表单中收集信息\n\n虽然 HTML 包含了构建表单所需的所有标签，但它并未提供任何在提交时处理表单的方法。为此，你需要一个服务器端解决方案，例如\
  \ PHP。\n\n日本之旅网站包含一个简单的反馈表单（见图 5-1）。其他元素——如单选按钮、复选框和下拉菜单——稍后会添加。\n\n![A978-1-4842-0635-5_5_Fig1_HTML.jpg](img/A978-1-4842-0635-5_5_Fig1_HTML.jpg)\n\
  \n图 5-1. 处理反馈表单是 PHP 最流行的用途之一\n\n首先，让我们看一下该表单的 HTML 代码（位于 `ch05` 文件夹的 `contact_01.php`\
  \ 中）：\n\n```\n<form method=\"post\" action=\"\">\n<p>\n<label for=\"name\">Name:</label>\n\
  <input name=\"name\" id=\"name\" type=\"text\">\n</p>\n<p>\n<label for=\"email\"\
  >Email:</label>\n<input name=\"email\" id=\"email\" type=\"text\">\n</p>\n<p>\n\
  <label for=\"comments\">Comments:</label>\n<textarea name=\"comments\" id=\"comments\"\
  ></textarea>\n</p>\n<p>\n<input name=\"send\" type=\"submit\" value=\"Send message\"\
  >\n</p>\n</form>\n```\n\n前两个 `<input>` 标签和 `<textarea>` 标签都包含 `name` 和 `id` 属性，且被设置为相同的值。这种重复的原因是：HTML、CSS\
  \ 和 JavaScript 都引用 `id` 属性，而表单处理脚本依赖于 `name` 属性。因此，尽管 `id` 属性是可选的，但对于每个需要处理的元素，你必须使用\
  \ `name` 属性。\n\n另外需要注意的两点是，起始 `<form>` 标签中的 `method` 和 `action` 属性。`method` 属性决定了表单如何发送数据。它可以设置为\
  \ `post` 或 `get`。`action` 属性告诉浏览器当点击“提交”按钮时将数据发送到哪里进行处理。如果该值留空（如此处所示），则页面会尝试自行处理表单。\n\
  \n**注意**\n\n我刻意没有使用任何新的 HTML5 表单功能，例如 `type=\"email\"` 和 `required` 属性。这样可以更轻松地测试\
  \ PHP 服务器端验证脚本。测试完成后，你可以更新表单以使用 HTML5 验证功能。浏览器中的验证主要是为了方便用户，防止提交不完整的信息，因此它是可选的。服务器端验证则绝不可省略。\n\
  \n## 理解 `post` 和 `get` 的区别\n\n演示 `post` 和 `get` 方法之间区别的最佳方式是使用一个真实的表单。如果你完成了上一章，可以继续使用相同的文件。\n\
  \n否则，`ch05` 文件夹中包含日本之旅网站的完整文件集，其中包含了 第 4 章 中的所有代码。将 `contact_01.php` 复制到站点根目录，并将其重命名为\
  \ `contact.php`。另外，将 `ch05/includes` 文件夹的内容复制到站点根目录的 `includes` 文件夹中。\n\n找到 `contact.php`\
  \ 中的起始 `<form>` 标签，并将 `method` 属性的值从 `post` 改为 `get`，如下所示：\n\n```\n<form method=\"\
  get\" action=\"\">\n```\n\n保存 `contact.php` 并在浏览器中加载该页面。在表单中输入你的姓名、电子邮件地址和一条简短的消息，然后点击“发送消息”。\n\
  \n![A978-1-4842-0635-5_5_Figa_HTML.jpg](img/A978-1-4842-0635-5_5_Figa_HTML.jpg)\n\
  \n查看浏览器地址栏。你应该会看到表单的内容附加在 URL 的末尾，如下所示：\n\n![A978-1-4842-0635-5_5_Figb_HTML.jpg](img/A978-1-4842-0635-5_5_Figb_HTML.jpg)\n\
  \n如果你分解这个 URL，它看起来是这样的：\n\n```\nhttp://localhost/phpsols/contact.php\n?name=David+Powers\n\
  &email=david%40example.com\n&comments=I+hope+you+get+this.+%3B-%29\n&send=Send+message\n\
  ```\n\n基本 URL 之后的每一行都以表单元素的 `name` 属性开头，后跟一个等号和输入字段的内容。URL 不能包含空格或某些字符（例如我的笑脸符号），因此浏览器将它们编码为十六进制值，这个过程称为\
  \ URL 编码（有关完整的值列表，请参见 [`www.w3schools.com/tags/ref_urlencode.asp`](http://www.w3schools.com/tags/ref_urlencode.asp)）。\n\
  \n第一个 `name` 属性前面有一个问号（`?`），其余前面有一个 & 符号（`&`）。在使用搜索引擎时你会看到这种类型的 URL，这有助于解释为什么问号之后的所有内容被称为查询字符串。\n\
  \n回到 `contact.php` 的代码中，将 `method` 改回 `post`，如下所示：\n\n```\n<form method=\"post\"\
  \ action=\"\">\n```\n\n保存 `contact.php` 并在浏览器中重新加载页面。输入另一条消息并点击“发送消息”。你的消息应该会消失，但不会发生其他任何事情。消息并没有丢失，只是你还未做任何处理。\n\
  \n在 `contact.php` 中，在结束的 `</form>` 标签正下方添加以下代码：\n\n```\n<pre>\n<?php if ($_POST)\
  \ { print_r($_POST); } ?>\n</pre>\n```\n\n如果已发送任何 `post` 数据，这将显示 `$_POST` 超全局数组的内容。如\
  \ 第 3 章 所述，`print_r()` 函数允许你检查数组的内容；`<pre>` 标签只是让输出更易于阅读。\n\n保存页面并点击浏览器中的“刷新”按钮。你可能会看到一个类似于下面的警告。这告诉你数据将被重新发送，这完全正是你想要的。确认你希望再次发送信息。\n\
  \n![A978-1-4842-0635-5_5_Figc_HTML.jpg](img/A978-1-4842-0635-5_5_Figc_HTML.jpg)\n\
  \n来自第 6 步的代码现在应该会在表单下方显示你消息的内容，如图 5-2 所示。所有内容都已存储在 PHP 的超全局数组 `$_POST` 中，该数组包含使用\
  \ `post` 方法发送的数据。每个表单元素的 `name` 属性被用作数组键，这使得检索内容变得很容易。\n\n![A978-1-4842-0635-5_5_Fig2_HTML.jpg](img/A978-1-4842-0635-5_5_Fig2_HTML.jpg)\n\
  \n图 5-2. `$_POST` 数组使用表单的 `name` 属性来标识每个数据元素\n\n正如你刚刚看到的，`get` 方法以一种非常暴露的方式发送数据，使其容易受到篡改。此外，某些浏览器将\
  \ URL 的最大长度限制在约 2000 个字符，因此 `get` 方法只能用于少量数据。`post` 方法更安全，并且可以用于更大量的数据。默认情况下，PHP\
  \ 允许最多 8 MB 的 `post` 数据，尽管托管公司可能会设置不同的限制。\n\n因此，在处理表单时，你通常应使用 `post` 方法。`get` 方法主要与数据库搜索结合使用；将你的搜索结果加入书签非常有用，因为所有搜索条件都包含在\
  \ URL 中。我们将在本书后面再次讨论 `get` 方法。本章重点介绍 `post` 方法及其相关的超全局数组 `$_POST`。\n\n**警告**\n\n\
  尽管 `post` 方法比 `get` 更安全，但你不应假设它是 100% 安全的。为了实现安全传输，你需要使用加密技术或安全套接字层（SSL），并且 URL\
  \ 必须以 `https://` 开头。\n\n\n\n### 使用 PHP 超全局变量获取表单数据\n\n`$_POST` 超全局数组包含通过 `post`\
  \ 方法发送的数据。不出所料，通过 `get` 方法发送的数据则存储在 `$_GET` 数组中。\n\n要访问表单提交的值，只需将表单元素的 `name` 属性值用引号括起来，放在\
  \ `$_POST` 或 `$_GET` 后面的方括号中，具体使用哪个取决于表单的 `method` 属性。因此，如果通过 `post` 方法发送，`email`\
  \ 就变成 `$_POST['email']`；如果通过 `get` 方法发送，则变成 `$_GET['email']`。就是这么简单。\n\n你可能会遇到使用\
  \ `$_REQUEST` 的脚本，它无需区分 `$_POST` 或 `$_GET`。但这种做法安全性较低。请始终使用 `$_POST` 或 `$_GET`。\n\
  \n旧版脚本可能使用 `$HTTP_POST_VARS` 或 `$HTTP_GET_VARS`，它们与 `$_POST` 和 `$_GET` 含义相同。不过旧版变量在大多数服务器上已无法使用，请改用\
  \ `$_POST` 和 `$_GET`。\n\n**注意**\n\n忽略那些建议你通过启用 PHP 配置中的 `register_globals` 来简化表单数据获取的“建议”。`register_globals`\
  \ 指令已在 PHP 5.4 中永久禁用，以提高安全性。你无法再将其重新开启。\n\n## 处理并验证用户输入\n\n本章的最终目标是将 `contact.php`\
  \ 表单中的输入通过电子邮件发送到你的收件箱。使用 PHP 的 `mail()` 函数相对简单，它至少需要三个参数：邮件发送的目标地址、包含主题行的字符串，以及包含邮件正文的字符串。你可以通过将输入字段的内容拼接（连接）成一个字符串来构建邮件正文。\n\
  \n大多数互联网服务提供商（ISP）实施的安全措施使得在本地测试环境中测试 `mail()` 函数变得困难，甚至不可能。因此，在 PHP 解决方案 5-1 至\
  \ 5-4 中，我们不会直接使用 `mail()`，而是专注于验证用户输入，确保必填字段已填写并显示错误消息。实施这些措施能让你的在线表单更加用户友好和安全。\n\
  \n多年来，网页设计师一直使用 JavaScript 在点击提交按钮时检查用户输入。这一角色正逐渐被支持 HTML5 的浏览器所取代。这被称为客户端验证，因为它发生在用户的计算机（或客户端）上。这种验证很有用，因为它几乎是即时的，并且无需向服务器发送不必要的往返请求就能提醒用户出现问题。然而，你绝不能仅仅依赖客户端验证，因为它太容易被绕过。恶意用户只需通过自定义脚本提交数据，你的检查就形同虚设。使用\
  \ PHP 在服务器端检查用户输入同样至关重要。\n\n### 创建可重用脚本\n\n能够为多个网站重复使用同一个脚本（可能只需少量编辑）能大大节省时间。然而，将输入数据发送到单独的文件进行处理，会导致难以在保留用户输入的同时提醒用户错误。为了解决这个问题，本章采用的方法被称为自处理表单。\n\
  \n当表单提交时，页面会重新加载，并通过条件语句运行处理脚本。如果服务器端验证发现了错误，表单会重新显示，并附带错误消息，同时保留用户的输入。\n\n表单特有的脚本部分将嵌入在\
  \ `DOCTYPE` 声明之上。通用的、可重用的脚本部分将放在一个单独的文件中，该文件可以被任何需要邮件处理脚本的页面引用。\n\n#### PHP 解决方案\
  \ 5-1：确保必填字段不为空\n\n当必填字段留空时，你不仅无法获得所需信息，而且用户可能永远得不到回复，尤其是在联系方式被遗漏的情况下。\n\n继续使用上一个练习中的文件。或者，使用\
  \ `ch05` 文件夹中的 `contact_02.php`，并从文件名中移除 `_02`。\n\n处理脚本使用两个名为 `$errors` 和 `$missing`\
  \ 的数组来存储错误信息和未填写的必填字段。这些数组将用于控制表单标签旁边错误消息的显示。页面首次加载时不应有任何错误，因此在 `contact.php` 顶部的\
  \ PHP 代码块中将 `$errors` 和 `$missing` 初始化为空数组，如下所示：\n\n```\n<?php\ninclude './includes/title.php';\n\
  $errors = [];\n$missing = [];\n?>\n```\n\n邮件处理脚本应仅在表单已提交时运行。如图 5-2 所示，`$_POST` 数组包含提交按钮的名称/值对，在\
  \ `contact.php` 中该按钮名为 `send`。只有当表单被提交时，`$_POST['send']` 的值才会被定义（设置）。因此，你可以使用条件语句和\
  \ `isset()` 函数来控制是否运行处理脚本。将以下高亮显示的代码添加到页面顶部的 PHP 代码块中。\n\n```\n<?php\ninclude './includes/title.php';\n\
  $errors = [];\n$missing = [];\n\n// 检查表单是否已提交\nif (isset($_POST['send'])) {\n  \
  \  // 邮件处理脚本\n}\n?>\n```\n\n**注意**\n\n此表单中提交按钮的 `name` 属性是 `send`。如果你为提交按钮指定了不同的名称，则需要使用该名称。\n\
  \n虽然你暂时还不会发送邮件，但可以先定义两个变量来存储邮件的目标地址和主题行。以下代码应放置在上一步创建的条件语句内部：\n\n```\nif (isset($_POST['send']))\
  \ {\n    // 邮件处理脚本\n    $to = 'david@example.com'; // 请使用你自己的电子邮件地址\n    $subject\
  \ = '来自 Japan Journey 的反馈';\n}\n```\n\n接下来，创建两个数组：一个列出表单中每个字段的 `name` 属性，另一个列出所有必填字段。为了演示，我们将\
  \ `email` 字段设为可选，因此只有 `name` 和 `comments` 字段是必填的。在条件块内部，紧接着定义主题行的代码之后添加以下代码：\n\n\
  ```\n$subject = '来自 Japan Journey 的反馈';\n\n// 列出预期的字段\n$expected = ['name', 'email',\
  \ 'comments'];\n\n// 设置必填字段\n$required = ['name', 'comments'];\n}\n```\n\n**提示**\n\
  \n为什么需要 `$expected` 数组？这是为了防止攻击者向 `$_POST` 数组中注入其他变量，试图覆盖你的默认值。通过只处理你预期会出现的变量，你的表单会更加安全。任何无关的值都会被忽略。\n\
  \n下一段代码并非此表单所特有，因此应放在一个外部文件中，以便任何邮件处理脚本都能引用。在 `includes` 文件夹中创建一个名为 `processmail.php`\
  \ 的新 PHP 文件。然后，在 `contact.php` 中紧接上一步输入的代码之后包含它，如下所示：\n\n```\n$required = ['name',\
  \ 'comments'];\nrequire './includes/processmail.php';\n}\n```\n\n`processmail.php`\
  \ 中的代码首先检查 `$_POST` 变量中是否有未填写的必填字段。删除编辑器插入的任何默认代码，并将以下内容添加到 `processmail.php` 中：\n\
  \n```\n<?php\nforeach ($_POST as $key => $value) {\n    // 赋值给临时变量，如果不是数组则去除首尾空白\n\
  \    $temp = is_array($value) ? $value : trim($value);\n\n    // 如果为空且是必填字段，则添加到\
  \ $missing 数组\n    if (empty($temp) && in_array($key, $required)) {\n        $missing[]\
  \ = $key;\n        ${$key} = '';\n    } elseif (in_array($key, $expected)) {\n \
  \       // 否则，赋给一个与 $key 同名的变量\n        ${$key} = $temp;\n    }\n}\n```\n\n\n\n\n\
  简单来说，这个 `foreach` 循环会遍历 `$_POST` 数组，去除文本字段中的首尾空白字符，并将字段内容赋值给同名的变量（例如 `$_POST['email']`\
  \ 变成 `$email`，以此类推）。如果某个必填字段留空，其 `name` 属性的值会被添加到 `$missing` 数组中，同时相关变量被设置为空字符串。只有\
  \ `$_POST` 数组中键名存在于 `$required` 和 `$expected` 数组中的元素才会被处理。\n\n去除首尾空白字符可以防止有人通过多次按空格键来规避填写必填字段。同时，我们还会获得一个未填写的必填字段列表，并且表单中的所有值都会被赋值给简化后的变量，这样后续处理起来更方便。\n\
  \n如果你不需要了解代码运行的细节，可以直接跳到第 7 步。但如果你想深入理解这段代码，请继续往下读。\n\n循环内的第一行代码使用了三元运算符（参见第 3 章中的“使用三元运算符”）。这是一种根据条件为真或假来赋值的便捷简写方式。同样的代码行可以改写如下：\n\
  \n```\nif (is_array($value) {\n  $temp = $value;\n} else {\n  $temp = trim($value);\n\
  }\n```\n\n`is_array()` 函数用于检查当前值是否为数组。如果是，则将该值原封不动地赋值给名为 `$temp` 的变量。但如果不是数组，则 `trim()`\
  \ 函数会先去除该值的首尾空白字符，然后再将其赋值给 `$temp`。\n\n循环的其余部分使用条件语句来处理 `$_POST` 数组中每个元素的键和值。第一个条件使用\
  \ `empty()` 函数检查 `$temp` 在上一行去除首尾空白字符后是否仍然包含值。如果 `empty()` 返回 `true`，则 `in_array()`\
  \ 函数会检查当前数组键是否存在于 `$required` 数组中。如果该项也返回 `true`，则意味着必填字段没有设置值。因此，`if` 块中的两行代码会将这个键添加到\
  \ `$missing` 数组中，然后根据键名动态创建一个变量，并将其值设置为空字符串。\n\n条件语句的 `elseif` 部分会检查该键是否存在于 `$expected`\
  \ 数组中。如果存在，则会根据键名动态创建一个变量，并将 `$temp` 的值赋给它。\n\n> **注意**：关于如何使用数组键创建同名新变量的详细解释，请参见第\
  \ 3 章中的“动态创建新变量”。\n\n保存 `processmail.php`，稍后还会向其中添加更多代码。现在让我们转向 `contact.php` 的主体部分。如果缺少任何内容，你需要显示一条警告。在页面内容中，`<h2>`\
  \ 标题和第一段之间添加一个条件语句，如下所示：\n\n```\n<h2>联系我们</h2>\n<?php if ($missing || $errors) {\
  \ ?>\n  <p class=\"warning\">请修正指出的问题。</p>\n<?php } ?>\n<p>Ut enim ad minim veniam\
  \ . . . </p>\n```\n\n这会检查 `$missing` 和 `$errors` 两个变量，你已经在第 1 步中将它们初始化为空数组。正如第 3\
  \ 章中“PHP 的‘真值’判断”所解释的，空数组被视为 `false`，因此条件语句内的段落会在页面首次加载时不显示。但是，如果在提交表单时必填字段没有填写，该字段的名称就会被添加到\
  \ `$missing` 数组中。至少包含一个元素的数组会被视为 `true`。这里的 `||` 表示“或”，因此，如果必填字段留空或检测到错误，就会显示这个警告段落。（`$errors`\
  \ 数组将在 PHP 解决方案 5-3 中发挥作用。）\n\n为确保到目前为止一切正常，请保存 `contact.php` 并在浏览器中正常加载（不要点击刷新按钮）。警告消息不会显示。在未填写任何字段的情况下点击“发送消息”。现在你应该看到关于缺失项目的消息，如下面的截图所示。\n\
  \n![A978-1-4842-0635-5_5_Figd_HTML.jpg](img/A978-1-4842-0635-5_5_Figd_HTML.jpg)\n\
  \n为了在每个缺失的必填字段旁边显示合适的消息，请使用 PHP 条件语句在 `<label>` 标签内插入一个 `<span>`，如下所示：\n\n```\n\
  <label for=\"name\">姓名：\n<?php if ($missing && in_array('name', $missing)) { ?>\n\
  \  <span class=\"warning\">请输入您的姓名</span>\n<?php } ?>\n</label>\n```\n\n第一个条件检查\
  \ `$missing` 数组。如果数组为空，条件语句失败，`<span>` 永远不会显示。但如果 `$missing` 包含任何值，`in_array()`\
  \ 函数会检查 `$missing` 数组中是否包含值 `name`。如果包含，则显示 `<span>`。\n\n为 `email` 和 `comments`\
  \ 字段插入类似的警告，如下所示：\n\n```\n<label for=\"email\">电子邮件：\n<?php if ($missing && in_array('email',\
  \ $missing)) { ?>\n  <span class=\"warning\">请输入您的电子邮件地址</span>\n<?php } ?>\n</label>\n\
  <input name=\"email\" id=\"email\" type=\"text\">\n</p>\n<p>\n<label for=\"comments\"\
  >评论：\n<?php if ($missing && in_array('comments', $missing)) { ?>\n  <span class=\"\
  warning\">请输入您的评论</span>\n<?php } ?>\n</label>\n```\n\nPHP 代码完全相同，只是在 `$missing`\
  \ 数组中查找的值不同。该值与表单元素的 `name` 属性相同。\n\n保存 `contact.php` 并再次测试该页面，首先在所有字段中不输入任何内容。表单标签应显示为图\
  \ 5-3。\n\n![A978-1-4842-0635-5_5_Fig3_HTML.jpg](img/A978-1-4842-0635-5_5_Fig3_HTML.jpg)\n\
  \n**图 5-3.** 通过验证用户输入，您可以显示有关必填字段的警告\n\n尽管你为 `email` 字段的 `<label>` 添加了警告，但它并未显示，因为\
  \ `email` 尚未被添加到 `$required` 数组中。因此，`processmail.php` 中的代码也不会将其添加到 `$missing` 数组中。\n\
  \n将 `email` 添加到 `comments.php` 顶部代码块中的 `$required` 数组，如下所示：\n\n```\n$required =\
  \ ['name', 'comments', 'email'];\n```\n\n再次在不填写任何字段的情况下点击“发送消息”。这次，每个标签旁边都会出现一条警告消息。在“姓名”字段中输入您的姓名。在“电子邮件”和“评论”字段中，只需按下几次空格键，然后点击“发送消息”。“姓名”字段旁边的警告消息消失了，但其他两个警告消息仍然存在。`processmail.php`\
  \ 中的代码会去除文本字段中的空白字符，因此它会拒绝通过输入一系列空格来绕过必填字段的尝试。\n\n如果遇到任何问题，请将您的代码与 `ch05` 文件夹中的\
  \ `contact_02.php` 和 `includes/processmail_01.php` 进行比较。\n\n更改必填字段只需要更改 `$required`\
  \ 数组中的名称，并在表单内相应输入元素的 `<label>` 标签中添加适当的提示信息即可。这样做很容易，因为您始终使用表单输入元素的 `name` 属性。\n\
  \n### 表单未完成时保留用户输入\n\n想象一下，您花了十分钟填写一个表单。您点击“提交”按钮，然后收到回复说某个必填字段缺失。如果必须重新填写所有字段，那会让人抓狂。由于每个字段的内容都在\
  \ `$_POST` 数组中，所以在发生错误时重新显示这些内容是很容易的。\n\n\n\n### PHP 方案 5-2：创建粘性表单字段\n\n本 PHP 方案演示了如何使用条件语句从\
  \ `$_POST` 数组中提取用户输入，并将其重新显示在文本输入字段和文本区域中。\n\n请继续使用之前的文件进行操作。或者，使用 `ch05` 文件夹中的\
  \ `contact_02.php` 和 `includes/processmail_01.php`。\n\n页面首次加载时，你希望输入字段中不显示任何内容，但如果必填字段缺失或存在错误，则需要重新显示内容。关键在于：如果\
  \ `$missing` 或 `$errors` 数组包含任何值，则应重新显示每个字段的内容。你通过 `<input>` 标签的 `value` 属性为文本输入字段设置默认文本，因此请按如下方式修改\
  \ `name` 的 `<input>` 标签：\n\n```\n<input name=\"name\" id=\"name\" type=\"text\"\n\
  <?php if ($missing || $errors) {\n    echo 'value=\"' . htmlentities($name) . '\"\
  ';\n} ?>>\n```\n\n花括号内的那一行包含引号和句点的组合，可能会让你感到困惑。首先需要明白的是，这里只有一个分号——就在行尾——因此 `echo`\
  \ 命令适用于整行。如第 3 章所述，句点被称为连接运算符，用于连接字符串和变量。你可以将整行分解为以下三个部分：\n\n-   `'value=\"' .`\n\
  -   `htmlentities($name)`\n-   `. '\"'`\n\n第一部分输出文本 `value=\"`，并使用连接运算符将其连接到下一部分，第二部分将\
  \ `$name` 传递给一个名为 `htmlentities()` 的函数。我将稍后解释该函数的作用，第三部分再次使用连接运算符连接下一部分，该部分仅由一个双引号组成。因此，如果\
  \ `$missing` 或 `$errors` 包含任何值，并且 `$_POST['name']` 包含 `Joe`，那么 `<input>` 标签内将生成如下内容：\n\
  \n```\n<input name=\"name\" id=\"name\" type=\"text\" value=\"Joe\">\n```\n\n`$name`\
  \ 变量包含原始用户输入，该输入通过 `$_POST` 数组传输。你在 PHP 方案 5-1 的 `processmail.php` 中创建的 `foreach`\
  \ 循环会处理 `$_POST` 数组，并将每个元素分配给同名的变量。这允许你直接将 `$_POST['name']` 作为 `$name` 访问。\n\n那么，`htmlentities()`\
  \ 函数有什么作用呢？顾名思义，该函数将某些字符转换为其对应的 HTML 字符实体。这里我们需要关注的是双引号。假设 Elvis 真的还在世，并决定通过表单发送反馈。如果你仅使用\
  \ `$name`（不使用 `htmlentities()`），图 5-4 展示了当省略必填字段时会发生的情况。\n\n![A978-1-4842-0635-5_5_Fig4_HTML.jpg](img/A978-1-4842-0635-5_5_Fig4_HTML.jpg)\n\
  \n**图 5-4.** 在重新显示表单字段之前，引号需要特殊处理\n\n然而，将 `$_POST` 数组元素的内容传递给 `htmlentities()` 后，字符串中间的双引号会被转换为\
  \ `&quot;`。如图 5-5 所示，内容不再被截断。\n\n![A978-1-4842-0635-5_5_Fig5_HTML.jpg](img/A978-1-4842-0635-5_5_Fig5_HTML.jpg)\n\
  \n**图 5-5.** 在显示之前将值传递给 `htmlentities()` 解决了问题\n\n很酷的一点是，当表单重新提交时，字符实体 `&quot;`\
  \ 会被转换回双引号。因此，在发送电子邮件之前无需进一步转换。\n\n**注意：** 在 PHP 5.4 之前，`htmlentities()` 默认使用 ISO-8859-1（西欧）编码进行转换。这在\
  \ PHP 5.4 中更改为 UTF-8。在 PHP 5.6 中，它又更改为服务器 PHP 配置中 `default_charset` 的值。这一最新更改不会影响大多数人，因为\
  \ UTF-8 是 `default_charset` 的默认值。但如果你有特殊需求，这意味着你可以设置自己的默认编码。\n\n如果 `htmlentities()`\
  \ 导致文本乱码，你可以通过向该函数传递第二个和第三个可选参数来直接在脚本中设置编码。例如，要将编码设置为简体中文，请使用 `htmlentities($name,\
  \ ENT_COMPAT, 'GB2312')`。详情请参阅文档：[`http://php.net/manual/en/function.htmlentities.php`](http://php.net/manual/en/function.htmlentities.php)。\n\
  \n以同样方式编辑 `email` 字段，使用 `$email` 代替 `$name`。`comments` 文本区域需要稍作不同处理，因为 `<textarea>`\
  \ 标签没有 `value` 属性。你必须将 PHP 代码块放在文本区域的开始和结束标签之间，如下所示（新代码以粗体显示）：\n\n```\n<textarea\
  \ name=\"comments\" id=\"comments\"><?php\nif ($missing || $errors) {\n    echo\
  \ htmlentities($comments);\n} ?></textarea>\n```\n\n务必将 PHP 开始和结束标签紧贴着 `<textarea>`\
  \ 标签放置。如果不这样做，文本区域内会出现不需要的空白字符。\n\n保存 `contact.php` 并在浏览器中测试页面。如果任何必填字段被省略，表单将显示原始内容以及任何错误消息。\n\
  \n你可以使用 `ch05` 文件夹中的 `contact_03.php` 检查你的代码。\n\n**警告：** 使用此技术会阻止表单的重置按钮清除已被 PHP\
  \ 脚本更改的任何字段。与在提交不完整表单时保留现有内容所带来的更高可用性相比，这是一个小不便。\n\n### 过滤潜在攻击\n\n一种被称为电子邮件标头注入的特别恶劣的攻击技术，试图将在线表单变成垃圾邮件中继。防止这种情况的一个简单方法是查找字符串\
  \ `Content-Type:`、`Cc:` 和 `Bcc:`，因为这些是攻击者注入到你的脚本中以诱骗其发送包含多个收件人的 HTML 电子邮件的电子邮件标头。如果你在用户输入中检测到任何这些字符串，几乎可以肯定你成为了攻击目标，因此你应该阻止该消息。无辜的消息也可能被阻止，但阻止攻击的优势超过了这个微小的风险。\n\
  \n\n\n#### PHP 方案 5-3：拦截包含特定短语的邮件\n\n此 PHP 方案检查用户输入中是否存在可疑短语。如果检测到，则将一个布尔变量设置为 `true`。稍后将利用此变量阻止邮件发送。\n\
  \n继续处理与之前相同的页面。或者，使用 `ch05` 文件夹中的 `contact_03.php` 和 `includes/processmail_01.php`。\n\
  \nPHP 条件语句依赖于真/假测试来决定是否执行某段代码。过滤可疑短语的方法是创建一个布尔变量，一旦检测到这些短语中的任何一个，该变量就会切换为 `true`。检测是通过搜索模式或正则表达式完成的。将以下代码添加到\
  \ `processmail.php` 顶部现有的 `foreach` 循环之前：\n\n```\n// 假设没有可疑内容\n$suspect = false;\n\
  // 创建用于定位可疑短语的模式\n$pattern = '/Content-Type:|Bcc:|Cc:/i';\nforeach ($_POST as $key\
  \ => $value) {\n```\n\n赋值给 `$pattern` 的字符串将用于执行不区分大小写的搜索，查找以下任一内容：“Content-Type:”、“Bcc:”或“Cc:”。它采用一种称为\
  \ Perl 兼容正则表达式（PCRE）的格式编写。搜索模式被括在一对正斜杠中，最后一个斜杠后面的 `i` 使模式不区分大小写。\n\n**提示**  \n有关正则表达式（regex）的基础介绍，请参阅我在\
  \ [`www.adobe.com/devnet/dreamweaver/articles/regular_expressions_pt1.html`](http://www.adobe.com/devnet/dreamweaver/articles/regular_expressions_pt1.html)\
  \ 上的教程。如需更深入的讲解，*《正则表达式食谱（第 2 版）》*由 Jan Goyvaerts 和 Steven Levithan 合著（O’Reilly，2012\
  \ 年，ISBN：978-1-4493-1943-4）非常出色。\n\n现在，您可以使用存储在 `$pattern` 中的 PCRE 来过滤 `$_POST`\
  \ 数组中的任何可疑用户输入。目前，`$_POST` 数组的每个元素仅包含一个字符串。但是，多选表单元素（例如复选框组）会返回一个结果数组。因此，您需要深入任何子数组并分别检查每个元素的内容。这正是以下自定义函数\
  \ `isSuspect()` 的作用。将其紧接在第 1 步的 `$pattern` 变量之后插入：\n\n```\n$pattern = '/Content-Type:|Bcc:|Cc:/i';\n\
  // 用于检查可疑短语的函数\nfunction isSuspect($val, $pattern, &$suspect) {\n    // 如果变量是数组，则遍历每个元素\n\
  \    // 并将其递归传递回同一个函数\n    if (is_array($val)) {\n        foreach ($val as $item)\
  \ {\n            isSuspect($item, $pattern, $suspect);\n        }\n    } else {\n\
  \        // 如果找到其中一个可疑短语，则将布尔值设置为 true\n        if (preg_match($pattern, $val))\
  \ {\n            $suspect = true;\n        }\n    }\n}\nforeach ($_POST as $key\
  \ => $value) {\n```\n\n`isSuspect()` 函数是一段代码，您可能只想复制粘贴，而无需深入了解其工作原理。需要注意的重要一点是，第三个参数前面有一个\
  \ &（`&$suspect`）。这意味着，传递给 `isSuspect()` 作为第三个参数的变量所做的任何更改，都会影响该变量在脚本其他位置的值。这种技术称为按引用传递（参见第\
  \ 3 章中的“按引用传递——更改参数的值”）。\n\n该函数的另一个特点是它被称为递归函数。它会不断调用自身，直到找到一个可以使用 `preg_match()`\
  \ 函数与正则表达式进行比较的值，如果找到匹配项，`preg_match()` 将返回 `true`。\n\n要调用该函数，请将 `$_POST` 数组、模式和\
  \ `$suspect` 布尔变量作为参数传递给它。紧跟在函数定义之后插入以下代码：\n\n```\n// 检查 $_POST 数组及其任何子数组中是否有可疑内容\n\
  isSuspect($_POST, $pattern, $suspect);\n```\n\n**注意**  \n这次您不需要在 `$suspect` 前面加上\
  \ &。仅当在第 2 步定义函数时才需要 &，调用时不需要。\n\n如果检测到可疑短语，`$suspect` 的值将变为 `true`。此时也没有必要进一步处理\
  \ `$_POST` 数组。将处理 `$_POST` 变量的代码包装在如下条件语句中：\n\n```\nif (!$suspect) {\n    foreach\
  \ ($_POST as $key => $value) {\n        // 赋值给临时变量，如果不是数组则去除空白\n        $temp =\
  \ is_array($value) ? $value : trim($value);\n        // 如果为空且是必填项，则添加到 $missing\
  \ 数组\n        if (empty($temp) && in_array($key, $required)) {\n            $missing[]\
  \ = $key;\n            ${$key} = '';\n        } elseif (in_array($key, $expected))\
  \ {\n            // 否则，赋给一个与 $key 同名的变量\n            ${$key} = $temp;\n        }\n\
  \    }\n}\n```\n\n仅当 `$suspect` 不为 `true` 时，此代码才会处理 `$_POST` 数组中的变量。\n\n不要忘记添加额外的花括号来关闭条件语句。\n\
  \n编辑 `contact.php` 中 `<h2>` 标题之后的 PHP 块，在表单上方添加一条新的警告消息，如下所示：\n\n```\n<h2>联系我们</h2>\n\
  <?php if ($_POST && $suspect) { ?>\n<p class=\"warning\">抱歉，您的邮件无法发送。请稍后重试。</p>\n\
  <?php } else if ($missing || $errors) { ?>\n<p class=\"warning\">请修正指出的项目。</p>\n\
  <?php } ?>\n```\n\n这设置了一个新条件，通过被优先考虑来覆盖原始警告消息。它检查 `$_POST` 数组是否包含任何元素——换句话说，表单是否已提交——以及\
  \ `$suspect` 是否为 `true`。该警告故意保持语气中立。没有必要激怒攻击者。更重要的是，它避免冒犯任何可能无意中使用了可疑短语的人。\n\n保存\
  \ `contact.php` 并在其中一个字段中输入其中一个可疑短语来测试表单。您应该会看到第二条警告消息，但您的输入将不会被保留。\n\n您可以将您的代码与\
  \ `ch05` 文件夹中的 `contact_04.php` 和 `includes/processmail_02.php` 进行比对。\n\n## 发送邮件\n\
  \n在进一步操作之前，有必要解释一下 PHP 的 `mail()` 函数是如何工作的，因为它将帮助您理解处理脚本的其余部分。\n\nPHP 的 `mail()`\
  \ 函数最多接受五个参数，所有参数均为字符串，如下所示：\n\n- 收件人的地址\n- 主题行\n- 邮件正文\n- 其他邮件标头列表（可选）\n- 附加参数（可选）\n\
  \n第一个参数中的电子邮件地址可以是以下两种格式之一：\n\n```\n'user@example.com'\n'Some Guy <user2@example.com>'\n\
  ```\n\n要发送到多个地址，请使用逗号分隔的字符串，如下所示：\n\n```\n'user@example.com, another@example.com,\
  \ Some Guy <user2@example.com>'\n```\n\n邮件正文必须作为单个字符串呈现。这意味着您需要从 `$_POST` 数组中提取输入数据并格式化消息，添加标签以标识每个字段。默认情况下，`mail()`\
  \ 函数仅支持纯文本。新行必须同时使用回车符和换行符。还建议将行的长度限制为不超过 78 个字符。虽然听起来很复杂，但您可以使用大约 20 行 PHP 代码自动构建邮件正文，您将在\
  \ PHP 方案 5-5 中看到这一点。\n\n添加其他邮件标头将在下一节详细介绍。\n\n许多托管公司现在要求提供第五个参数。它确保邮件由受信任的用户发送，通常由您自己的电子邮件地址前面加上\
  \ `-f`（中间没有空格）组成，并全部括在引号中。请查看您托管公司的说明，以了解是否需要此参数及其应采用的准确格式。\n\n\n\n### 安全使用额外的邮件头\n\
  \n您可以在 [`www.faqs.org/rfcs/rfc2076`](http://www.faqs.org/rfcs/rfc2076) 找到完整的邮件头列表，但一些最知名且实用的邮件头能让您将邮件副本发送到其他地址（抄送和密件抄送）或更改编码。除最后一个外，每个新邮件头都必须在单独的一行上，并以回车符和换行符结尾。这意味着要在双引号字符串中使用\
  \ `\\r` 和 `\\n` 转义序列（请参阅第 3 章中的表 3-4）。\n\n默认情况下，`mail()` 使用 Latin1 (ISO-8859-1)\
  \ 编码，这种编码不支持重音字符。如今的网页编辑器经常使用 Unicode (UTF-8)，它支持大多数书面语言，包括欧洲语言中常用的重音，以及非字母文字，例如中文和日文。为确保邮件消息不乱码，请使用\
  \ `Content-Type` 邮件头将编码设置为 UTF-8，如下所示：\n\n```\n$headers = \"Content-Type: text/plain;\
  \ charset=utf-8\\r\\n\";\n```\n\n您还需要在网页的 `<head>` 部分的 `<meta>` 标签中添加 UTF-8 作为 `charset`\
  \ 属性，如下所示，这是在 HTML5 中：\n\n```\n<meta charset=\"utf-8\">\n```\n\n如果您仍在使用 HTML 4.01，`<meta>`\
  \ 标签会更为冗长：\n\n```\n<meta http-equiv=\"Content-Type\" content=\"text/html; charset=utf-8\"\
  >\n```\n\n假设您还想将消息的副本发送给其他部门，外加一份发送给另一个不希望其他人看到的地址。由 `mail()` 发送的邮件通常被标识为来自 `nobody@yourdomain`（或任何分配给\
  \ Web 服务器的用户名），因此添加一个更友好的“发件人”地址是个好主意。以下是构建这些额外邮件头的方法，使用组合连接运算符（`.=`）将每个邮件头添加到现有变量中：\n\
  \n```\n$headers .= \"From: Japan Journey<feedback@example.com>\\r\\n\";\n$headers\
  \ .= \"Cc: sales@example.com, finance@example.com\\r\\n\";\n$headers .= 'Bcc: secretplanning@example.com';\n\
  ```\n\n构建完您想使用的邮件头集合后，将包含它们的变量作为第四个参数传递给 `mail()`，如下所示（假设目标地址、主题和消息正文已存储在变量中）：\n\
  \n```\n$mailSent = mail($to, $subject, $message, $headers);\n```\n\n像这样的硬编码额外邮件头不会带来安全风险，但任何来自用户输入的内容在使用前都必须经过过滤。最大的危险来自要求用户输入电子邮件地址的文本字段。一种广泛使用的技术是将用户的电子邮件地址合并到\
  \ `From` 或 `Reply-To` 邮件头中，这使得您可以通过点击电子邮件程序中的“回复”按钮直接回复收到的消息。这非常方便，但攻击者经常试图在电子邮件输入字段中塞入大量伪造的邮件头。\n\
  \n虽然电子邮件字段是攻击者的主要目标，但如果您允许用户更改值，目标地址和主题行都很容易受到攻击。用户输入应始终被视为可疑。PHP Solution 5-3 仅对可疑短语进行了基本测试。在直接在邮件头中使用外部输入之前，您需要应用更严格的测试，如\
  \ PHP Solution 5-4 所示。\n\n#### PHP Solution 5-4：添加邮件头并自动设置回复地址\n\n此 PHP 解决方案为邮件添加了三个邮件头：`From`、`Content-Type`（用于将编码设置为\
  \ UTF-8）和 `Reply-To`。在将用户的电子邮件地址添加到最后一个邮件头之前，它使用内置的 PHP 过滤器来验证提交的值是否符合有效电子邮件地址的格式。\n\
  \n继续使用之前的页面进行练习。或者，使用 `ch05` 文件夹中的 `contact_04.php` 和 `includes/processmail_02.php`。\n\
  \n邮件头通常特定于某个网站或页面，因此 `From` 和 `Content-Type` 邮件头将被添加到 `contact.php` 的脚本中。将以下代码添加到页面顶部\
  \ `processmail.php` 被引入之前的 PHP 代码块中：\n\n```\n$required = ['name', 'comments', 'email'];\n\
  \n// 创建额外的邮件头\n$headers = \"From: Japan Journey<feedback@example.com>\\r\\n\";\n\
  $headers .= 'Content-Type: text/plain; charset=utf-8';\n\nrequire './includes/processmail.php';\n\
  ```\n\n`From` 邮件头末尾的 `\\r\\n` 是一个转义序列，用于插入回车符和换行符，因此该字符串必须放在双引号中。目前，`Content-Type`\
  \ 是最后一个邮件头，因此它后面没有跟回车符或换行符，并且该字符串放在单引号中。\n\n验证电子邮件地址的目的是确保其格式有效，但该字段可能为空，原因可能是您决定不将其设为必填项，或者用户忽略了它。如果该字段是必填项但为空，它将被添加到\
  \ `$missing` 数组中，并且您在 PHP Solution 5-1 中添加的警告将会显示。如果该字段不为空，但输入无效，您需要显示一条不同的消息。\n\
  \n切换到 `processmail.php` 并将以下代码添加到脚本底部：\n\n```\n// 验证用户的电子邮件\nif (!$suspect && !empty($email))\
  \ {\n    $validemail = filter_input(INPUT_POST, 'email', FILTER_VALIDATE_EMAIL);\n\
  \    if ($validemail) {\n        $headers .= \"\\r\\nReply-To: $validemail\";\n\
  \    } else {\n        $errors['email'] = true;\n    }\n}\n```\n\n这首先检查是否未发现可疑短语，并且\
  \ `email` 字段不为空。两个条件前都使用了逻辑非运算符（`!`），因此如果 `$suspect` 和 `empty($email)` 都为 `false`，则返回\
  \ `true`。您在 PHP Solution 5-1 中添加的 `foreach` 循环会将 `$_POST` 数组中的所有预期元素分配给更简单的变量，因此\
  \ `$email` 包含与 `$_POST['email']` 相同的值。\n\n下一行使用 `filter_input()` 来验证电子邮件地址。第一个参数是一个\
  \ PHP 常量 `INPUT_POST`，它指定值必须存在于 `$_POST` 数组中。第二个参数是您要测试的元素的名称。最后一个参数是另一个 PHP 常量，它指定您要检查该元素是否符合电子邮件的有效格式。\n\
  \n如果 `filter_input()` 函数测试的值有效，则返回该值。否则，返回 `false`。因此，如果用户提交的值看起来像有效的电子邮件地址，则 `$validemail`\
  \ 包含该地址。如果格式无效，则 `$validemail` 为 `false`。`FILTER_VALIDATE_EMAIL` 常量只接受单个电子邮件地址，因此任何插入多个电子邮件地址的尝试都将被拒绝。\n\
  \n**注意：** `FILTER_VALIDATE_EMAIL` 检查的是格式，而不是地址是否真实有效。\n\n如果 `$validemail` 不为 `false`，则可以安全地将其合并到\
  \ `Reply-To` 邮件头中。由于步骤 1 中添加到 `$headers` 的最后一个值没有以回车符和换行符结尾，因此会在 `Reply-To` 之前添加它们。在构建\
  \ `$headers` 字符串时，只要用回车符和换行符将它们分隔开，将 `\\r\\n` 放在一个邮件头的末尾还是下一个邮件头的开头都没有关系。\n\n如果\
  \ `$validemail` 为 `false`，则将 `$errors['email']` 添加到 `$errors` 数组中。\n\n您现在需要修改 `contact.php`\
  \ 中 `email` 字段的 `<label>`，如下所示：\n\n```\n<label for=\"email\">电子邮件:\n```\n\n\n\n\
  // 重新排版的 Markdown 文档\n\n```php\n<?php if ($missing && in_array('email', $missing))\
  \ { ?>\n```\n\n```php\n<span class=\"warning\">Please enter your email address</span>\n\
  ```\n\n```php\n<?php } elseif (isset($errors['email'])) { ?>\n```\n\n```php\n<span\
  \ class=\"warning\">Invalid email address</span>\n```\n\n```php\n<?php } ?>\n```\n\
  \n```php\n</label>\n```\n\n这段代码在第一个条件语句中添加了一个`elseif`子句，如果电子邮件地址验证失败，则显示不同的警告信息。\n\
  \n保存`contact.php`并通过将所有字段留空并单击“发送消息”来测试表单。您将看到原始错误消息。通过在“电子邮件”字段中输入非电子邮件地址的值再次测试。这次，您将看到无效消息。如果输入两个电子邮件地址，也会发生同样的情况。\n\
  \n您可以对照`ch05`文件夹中的`contact_05.php`和`includes/processmail_03.php`检查您的代码。\n\n### PHP\
  \ 解决方案 5-5：构建消息正文并发送邮件\n\n许多 PHP 教程演示了如何像这样手动构建消息正文：\n\n```php\n$message = \"Name:\
  \ $name\\r\\n\\r\\n\";\n$message .= \"Email: $email\\r\\n\\r\\n\";\n$message .=\
  \ \"Comments: $comments\";\n```\n\n这种方式为每个输入字段添加标签以标识其来源，并在每个字段之间插入两个回车和换行符。对于少量字段来说这很好，但当字段增多时，操作会变得繁琐。只要您为表单字段指定了有意义的`name`属性，就可以通过`foreach`循环自动构建消息正文，这也是本\
  \ PHP 解决方案采用的方法。\n\n> **注意**：`name`属性不能包含空格。要使用多个单词命名表单字段，请用下划线或连字符连接它们，例如`first_name`或`first-name`。\n\
  \n继续使用与之前相同的文件。或者，使用`ch05`文件夹中的`contact_05.php`和`includes/processmail_03.php`。\n\
  \n在`processmail.php`脚本的底部添加以下代码：\n\n```php\n$mailSent = false;\n```\n\n这将初始化一个变量，用于在邮件发送后将用户重定向到感谢页面。在确定`mail()`函数成功之前，它需要设置为`false`。\n\
  \n现在添加构建消息的代码。它紧跟在刚刚初始化的变量之后：\n\n```php\n// go ahead only if not suspect, all required\
  \ fields OK, and no errors\nif (!$suspect && !$missing && !$errors) {\n    // initialize\
  \ the $message variable\n    $message = '';\n    // loop through the $expected array\n\
  \    foreach($expected as $item) {\n        // assign the value of the current item\
  \ to $val\n        if (isset(${$item}) && !empty(${$item})) {\n            $val\
  \ = ${$item};\n        } else {\n            // if it has no value, assign 'Not\
  \ selected'\n            $val = 'Not selected';\n        }\n        // if an array,\
  \ expand as comma-separated string\n        if (is_array($val)) {\n            $val\
  \ = implode(', ', $val);\n        }\n        // replace underscores and hyphens\
  \ in the label with spaces\n        $item = str_replace(['_', '-'], ' ', $item);\n\
  \        // add label and value to the message body\n        $message .= ucfirst($item).\"\
  : $val\\r\\n\\r\\n\";\n    }\n    // limit line length to 70 characters\n    $message\
  \ = wordwrap($message, 70);\n    $mailSent = true;\n}\n```\n\n这是另一个复杂的代码块，您可能更愿意直接复制粘贴。尽管如此，您需要知道它的作用。简而言之，代码检查`$suspect`、`$missing`和`$errors`是否都为`false`。如果是，它通过遍历`$expected`数组来构建消息正文，将结果存储为一系列标签/值对。\n\
  \n理解这段代码工作原理的关键在于以下条件语句：\n\n```php\nif (isset(${$item}) && !empty(${$item})) {\n\
  \    $val = ${$item};\n}\n```\n\n看起来有点奇怪的`${$item}`根据`$item`的值动态创建一个变量。这是变量变量（参见第\
  \ 3 章中的“动态创建新变量”）的另一个示例。每次循环运行时，`$item`包含`$expected`数组中当前元素的值。第一个元素是`name`，所以`${$item}`动态创建一个名为`$name`的变量。实际上，条件语句变成了这样：\n\
  \n```php\nif (isset($name) && !empty($name)) {\n    $val = $name;\n}\n```\n\n在下一次循环中，`${$item}`创建了一个名为`$email`的变量，依此类推。\n\
  \n> **注意**：关于此脚本的关键点是，它只从`$expected`数组中的项目构建消息正文。要使它正常工作，您必须将所有表单字段的名称列出在`$expected`数组中。\n\
  \n如果未指定为必填的字段留空，则其值设置为“Not selected”。代码还会处理来自多选元素（如复选框组和`<select>`列表）的值，这些值作为`$_POST`数组的子数组传输。`implode()`函数将子数组转换为逗号分隔的字符串。\n\
  \n\n\n每个标签都从输入字段的`name`属性派生，该属性位于`$expected`数组的当前元素中。`str_replace()`的第一个参数是一个包含下划线和连字符的数组。如果在`name`属性中找到其中任意一个字符，它就会被替换为第二个参数，即一个由单个空格组成的字符串。然后，第一个字母通过`ucfirst()`被设置成大写。\n\
  \n在消息体被合并成单个字符串后，它会被传递给`wordwrap()`函数，以将行长度限制为 70 个字符。发送电子邮件的代码仍需添加，但出于测试目的，`$mailSent`已被设置为`true`。\n\
  \n保存`processmail.php`。在`contact.php`底部找到以下代码块：\n\n```\n<?php if ($_POST) {print_r($_POST);}\
  \ ?>\n```\n\n将其更改为：\n\n```\n<?php if ($_POST && $mailSent) {\n    echo \"Message\
  \ body\\n\\n\";\n    echo htmlentities($message) . \"\\n\";\n    echo 'Headers:\
  \ '. htmlentities($headers);\n} ?>\n```\n\n这会检查表单是否已被提交且邮件是否准备发送。然后，它会显示`$message`和`$headers`中的值。这两个值都传递给`htmlentities()`以确保它们在浏览器中正确显示。\n\
  \n保存`contact.php`，并通过输入你的姓名、电子邮件地址和简短评论来测试表单。当你点击“发送消息”时，你应该会在页面底部看到消息体和头部信息，如图\
  \ 5-6 所示。\n\n![A978-1-4842-0635-5_5_Fig6_HTML.jpg](img/A978-1-4842-0635-5_5_Fig6_HTML.jpg)\n\
  \n图 5-6：验证消息体和头部信息是否正确形成\n\n假设消息体和头部信息在页面底部正确显示，你就可以添加发送电子邮件的代码了。如果你的代码不起作用，请对照`ch05`文件夹中的`contact_06.php`和`includes/processmail_04.php`进行检查。\n\
  \n在`processmail.php`中，添加发送邮件的代码。找到以下行：\n\n`$mailSent = true;`\n\n将其更改为：\n\n```\n\
  $mailSent = mail($to, $subject, $message, $headers);\nif (!$mailSent) {\n    $errors['mailfail']\
  \ = true;\n}\n```\n\n这会将目标地址、主题行、消息体和头部信息传递给`mail()`函数，如果成功将电子邮件交给 Web 服务器的邮件传输代理（MTA），该函数会返回`true`。如果失败（可能因为邮件服务器宕机），`$mailSent`会被设置为`false`，并且条件语句会向`$errors`数组添加一个元素，从而允许你在重新显示表单时保留用户的输入。\n\
  \n在`contact.php`顶部的 PHP 块中，紧接在包含`processmail.php`的命令之后，添加以下条件语句：\n\n```\nrequire\
  \ './includes/processmail.php';\nif ($mailSent) {\n    header('Location: http://www.example.com/thank_you.php\
  \ ');\n    exit;\n}\n}\n?>\n```\n\n将[www.example.com](http://www.example.com/)替换为你自己的域名。这会检查`$mailSent`是否为`true`。如果是，`header()`函数会将用户重定向到`thank_you.php`，一个确认消息已发送的页面。下一行的`exit`命令确保页面重定向后脚本终止。\n\
  \n`ch05`文件夹中有一个`thank_you.php`的副本。\n\n如果`$mailSent`为`false`，则会重新显示`contact.php`；你需要警告用户消息无法发送。编辑紧接在`<h2>`标题之后的条件语句，如下所示：\n\
  \n`<h2>Contact Us </h2>`\n\n```\n<?php if ( ($_POST && $suspect) || ($_POST && isset($errors['mailfail']))\
  \ ) { ?>\n<p class=\"warning\">Sorry, your mail could not be sent. . . .\n```\n\n\
  原始条件和新的条件都已用括号括起来，因此每一对被当作一个整体来处理。如果表单已提交且发现了可疑短语，或者表单已提交且设置了`$errors['mailfail']`，则会显示消息未发送的警告。\n\
  \n删除`contact.php`底部显示消息体和头部信息的代码块（包括`<pre>`标签）。\n\n在本地测试这很可能会导致显示感谢页面，但电子邮件永远不会到达。这是因为大多数测试环境没有\
  \ MTA。即使你设置了一个，大多数邮件服务器也会拒绝来自未识别来源的邮件。将`contact.php`和所有相关文件（包括`processmail.php`和`thank_you.php`）上传到你的远程服务器，并在那里测试联系表单。不要忘记`processmail.php`需要放在名为`includes`的子文件夹中。\n\
  \n你可以对照`ch05`文件夹中的`contact_07.php`和`includes/processmail_05.php`来检查你的代码。\n\n####\
  \ 故障排除：`mail()`\n\n理解`mail()`不是一个电子邮件程序这一点很重要。PHP 的责任在其将地址、主题、消息和头部信息传递给 MTA 后就结束了。它无法得知电子邮件是否送达了预期目的地。通常情况下，电子邮件会即刻到达，但网络拥塞可能会导致延迟数小时甚至一两天。\n\
  \n如果你从`contact.php`发送消息后被重定向到感谢页面，但收件箱中什么也没有收到，请检查以下内容：\n\n*   消息是否被垃圾邮件过滤器拦截了？\n\
  *   你是否检查了`$to`中存储的目标地址？尝试使用另一个电子邮件地址，看看是否有区别。\n*   你在`From`头中是否使用了真实地址？使用虚假或无效的地址很可能会导致邮件被拒绝。请使用与你的\
  \ Web 服务器属于同一域的有效地址。\n*   向你的托管公司咨询，看看`mail()`的第五个参数是否是必需的。如果是，它通常应该是一个由`-f`后跟你的电子邮件地址组成的字符串。例如，`david@example.com`变成`'-fdavid@example.com'`。\n\
  \n如果你仍然没有收到来自`contact.php`的消息，请创建一个包含以下脚本的文件：\n\n```\n<?php\nini_set('display_errors',\
  \ '1');\n$mailSent = mail('you@example.com', 'PHP mail test', 'This is a test email');\n\
  if ($mailSent) {\n    echo 'Mail sent';\n} else {\n    echo 'Failed';\n}\n```\n\n\
  将`you@example.com`替换为你自己的电子邮件地址。将文件上传到你的网站，并在浏览器中加载该页面。\n\n如果你看到一条关于没有`From`头的错误消息，请添加一个作为`mail()`函数的第四个参数，如下所示：\n\
  \n`$mailSent = mail('you@example.com', 'PHP mail test', 'This is a test email',\
  \ 'From: me@example.com');`\n\n通常最好使用一个与第一个参数中的目标地址不同的地址。\n\n如果你的托管公司要求第五个参数，请按如下方式调整代码：\n\
  \n`$mailSent = mail('you@example.com', 'PHP mail test', 'This is a test email',\
  \ null, '-fme@example.com');`\n\n使用第五个参数通常可以替代提供`From`头的需要，因此使用`null`（不带引号）作为第四个参数表示它没有值。\n\
  \n如果你看到“Mail sent”但没有邮件到达，或者在尝试了所有五个参数后看到“Failed”，请向你的托管公司寻求建议。\n\n如果你收到了此脚本的测试邮件，但没有收到来自`contact.php`的邮件，说明你的代码中有错误或者你忘记上传`processmail.php`。另外，按照第\
  \ 3 章中的“为什么我的页面是空白的？”所述，临时打开错误显示，以检查`contact.php`是否能够找到`processmail.php`。\n\n\n\n"
- "# 处理多项选择表单元素\n\n`contact.php` 中的表单仅使用了文本输入字段和文本区域。为了成功处理表单，你还需要了解如何处理多项选择元素，即：\n\
  \n- 单选按钮\n- 复选框\n- 下拉选项菜单\n- 多项选择列表\n\n它们背后的原理与你一直使用的文本输入字段相同：表单元素的 `name` 属性作为\
  \ `$_POST` 数组中的键。然而，存在一些重要差异：\n\n- 复选框组和多项选择列表将选中的值存储为数组，因此你需要在 `name` 属性的末尾添加一对空方括号。例如，对于一个名为\
  \ `interests` 的复选框组，每个 `<input>` 标签中的 `name` 属性应为 `name=\"interests[]\"`。如果省略方括号，则只有最后选中的项目会通过\
  \ `$_POST` 数组传递。\n- 复选框组或多项选择列表中选中项目的值会作为 `$_POST` 数组的子数组传递。PHP 解决方案 5-5 中的代码会自动将这些子数组转换为逗号分隔的字符串。但是，当将表单用于其他目的时，你需要从子数组中提取值。你将在后续章节中了解如何操作。\n\
  - 如果未选中任何值，则单选按钮、复选框和多项选择列表不会包含在 `$_POST` 数组中。因此，在处理表单时，在尝试访问它们的值之前，必须使用 `isset()`\
  \ 检查它们是否存在，这一点至关重要。\n\n本章中剩余的 PHP 解决方案展示了如何处理多项选择表单元素。我不会详细讲解每个步骤，而是重点强调关键点。在完成本章剩余部分时，请牢记以下几点：\n\
  \n- 处理这些元素依赖于 `processmail.php` 中的代码。\n- 必须将每个元素的 `name` 属性添加到 `$expected` 数组中，才能将其添加到消息正文中。\n\
  - 若要将字段设为必填项，请将其 `name` 属性添加到 `$required` 数组中。\n- 如果非必填字段留空，`processmail.php` 中的代码会将其值设置为“未选择”。\n\
  \n图 5-7 展示了将每种输入类型添加到原始设计后的 `contact.php`。\n\n![A978-1-4842-0635-5_5_Fig7_HTML.jpg](img/A978-1-4842-0635-5_5_Fig7_HTML.jpg)\n\
  \n*图 5-7. 包含多项选择表单元素示例的反馈表单*\n\n> **提示：** HTML5 新增了许多表单输入类型。它们都使用 `name` 属性，并以文本或\
  \ `$_POST` 数组的子数组形式发送值，因此你应该能够相应调整代码。\n\n## PHP 解决方案 5-6：处理单选按钮组\n\n单选按钮组允许你仅选择一个值。虽然在\
  \ HTML 标记中设置默认值很常见，但这不是必须的。本 PHP 解决方案展示了如何处理这两种情况。\n\n处理单选按钮的简单方法是将其中的一个设为默认值。由于始终会选中一个值，因此单选按钮组始终包含在\
  \ `$_POST` 数组中。\n\n带有默认值的单选按钮组代码如下所示（`name` 属性和 PHP 代码以粗体突出显示）：\n\n```\n<fieldset\
  \ id=\"subscribe\">\n  <h2>订阅时事通讯？</h2>\n  <p>\n    <input name=\"subscribe\" type=\"\
  radio\" value=\"是\" id=\"subscribe-yes\"\n    <?php\n    if ($_POST && $_POST['subscribe']\
  \ == '是') {\n      echo 'checked';\n    } ?> >\n    <label for=\"subscribe-yes\"\
  >是</label>\n\n    <input name=\"subscribe\" type=\"radio\" value=\"否\" id=\"subscribe-no\"\
  \n    <?php\n    if (!$_POST || $_POST['subscribe'] == '否') {\n      echo 'checked';\n\
  \    } ?> >\n    <label for=\"subscribe-no\">否</label>\n  </p>\n</fieldset>\n```\n\
  \n单选按钮组的所有成员共享相同的 `name` 属性。因为只能选择一个值，所以 `name` 属性不以一对空方括号结尾。\n\n与“是”按钮相关的条件语句检查\
  \ `$_POST` 以查看表单是否已提交。如果已提交且 `$_POST['subscribe']` 的值为“是”，则向 `<input>` 标签添加 `checked`\
  \ 属性。\n\n在“否”按钮中，条件语句使用了 `||`（或）。第一个条件是 `!$_POST`，当表单尚未提交时，该条件为 `true`。如果为 `true`，则在页面首次加载时将\
  \ `checked` 属性作为默认值添加。如果为 `false`，则表示表单已提交，因此会检查 `$_POST['subscribe']` 的值。\n\n当单选按钮没有默认值时，它不会包含在\
  \ `$_POST` 数组中，因此不会被 `processmail.php` 中构建 `$missing` 数组的循环检测到。为了确保单选按钮元素包含在 `$_POST`\
  \ 数组中，你需要在表单提交后测试其是否存在。如果未包含，你需要将其值设置为空字符串，如下所示：\n\n```\n$required = ['name', 'comments',\
  \ 'email', 'subscribe'];\n// 为可能不存在的变量设置默认值\nif (!isset($_POST['subscribe'])) {\n\
  \  $_POST['subscribe'] = '';\n}\n```\n\n如果单选按钮组是必填项但未选择，则在表单重新加载时需要显示错误消息。你还需要更改\
  \ `<input>` 标签中的条件语句以反映不同的行为。\n\n以下清单展示了 `contact_08.php` 中的 `subscribe` 单选按钮组，所有\
  \ PHP 代码以粗体突出显示：\n\n```\n<fieldset id=\"subscribe\">\n  <h2>订阅时事通讯？\n    <?php if\
  \ ($missing && in_array('subscribe', $missing)) { ?>\n      <span class=\"warning\"\
  >请做出选择</span>\n    <?php } ?>\n  </h2>\n  <p>\n    <input name=\"subscribe\" type=\"\
  radio\" value=\"是\" id=\"subscribe-yes\"\n    <?php\n    if ($_POST && $_POST['subscribe']\
  \ == '是') {\n      echo 'checked';\n    } ?> >\n    <label for=\"subscribe-yes\"\
  >是</label>\n\n    <input name=\"subscribe\" type=\"radio\" value=\"否\" id=\"subscribe-no\"\
  \n    <?php\n    if ($_POST && $_POST['subscribe'] == '否') {\n      echo 'checked';\n\
  \    } ?> >\n    <label for=\"subscribe-no\">否</label>\n  </p>\n</fieldset>\n```\n\
  \n控制 `<h2>` 标签中警告消息的条件语句使用了与文本输入字段相同的技术。如果单选按钮组是必填项且位于 `$missing` 数组中，则会显示该消息。\n\
  \n两个单选按钮中围绕 `checked` 属性的条件语句相同。它检查表单是否已提交，并且仅当 `$_POST['subscribe']` 中的值匹配时才显示\
  \ `checked` 属性。\n\n\n\n### PHP 解决方案 5-7：处理复选框组\n\n复选框可以单独使用，也可以成组使用。处理它们的方法略有不同。本\
  \ PHP 解决方案将说明如何处理名为 `interests` 的复选框组。PHP 解决方案 5-10 则介绍如何处理单个复选框。\n\n当作为一组使用时，组内所有复选框共享同一个\
  \ `name` 属性，该属性需要以一对空的方括号结尾，以便 PHP 将选中的值作为数组传输。为了识别哪些复选框被选中，每个复选框需要一个唯一的 `value`\
  \ 属性。\n\n如果没有选中任何项目，则该复选框组不会包含在 `$_POST` 数组中。表单提交后，你需要检查 `$_POST` 数组，看它是否包含针对该复选框组的子数组。如果不包含，你需要创建一个空的子数组，作为\
  \ `processmail.php` 中脚本的默认值。\n\n为节省篇幅，仅展示该组中的前两个复选框。`name` 属性和 PHP 代码段以粗体突出显示。\n\
  \n```\n<fieldset id=\"interests\">\n<h2>对日本的兴趣</h2>\n<div>\n<p>\n<input type=\"\
  checkbox\" name=\"interests[]\" value=\"Anime/manga\"\nid=\"anime\"\n<?php\nif ($_POST\
  \ && in_array('Anime/manga', $_POST['interests'])) {\necho 'checked';\n} ?>>\n<label\
  \ for=\"anime\">动漫/漫画</label>\n</p>\n<p>\n<input type=\"checkbox\" name=\"interests[]\"\
  \ value=\"Arts & crafts\"\nid=\"art\"\n<?php\nif ($_POST && in_array('Arts & crafts',\
  \ $_POST['interests'])) {\necho 'checked';\n} ?>>\n<label for=\"art\">艺术与手工艺</label>\n\
  </p>\n. . .\n</div>\n</fieldset>\n```\n\n每个复选框共享相同的 `name` 属性，该属性以一对空的方括号结尾，因此数据被当作数组处理。如果省略方括号，`$_POST['interests']`\
  \ 将仅包含被选中的第一个复选框的值。\n\n> **注：** 虽然为了实现多选必须在 `name` 属性中添加方括号，但选中值的子数组位于 `$_POST['interests']`\
  \ 中，而不是 `$_POST['interests[]']`。\n\n每个复选框元素内的 PHP 代码与单选按钮组中的代码功能相同，都是将 `checked`\
  \ 属性包裹在条件语句中。第一个条件检查表单是否已提交。第二个条件使用 `in_array()` 函数检查与该复选框关联的 `value` 是否存在于 `$_POST['interests']`\
  \ 子数组中。如果存在，则表示该复选框被选中。\n\n表单提交后，你需要检查 `$_POST['interests']` 是否存在。如果它尚未设置，你必须创建一个空数组作为脚本其余部分处理的默认值。其代码模式与单选按钮组相同：\n\
  \n```\n$required = ['name', 'comments', 'email', 'subscribe', 'interests'];\n//\
  \ 为可能不存在的变量设置默认值\nif (!isset($_POST['subscribe'])) {\n    $_POST['subscribe'] =\
  \ '';\n}\nif (!isset($_POST['interests'])) {\n    $_POST['interests'] = [];\n}\n\
  ```\n\n要设置最少数量的必选复选框，请使用 `count()` 函数确认从表单传输过来的值的数量。如果数量少于最低要求，则将该组添加到 `$errors`\
  \ 数组中，如下所示：\n\n```\nif (!isset($_POST['interests'])) {\n    $_POST['interests']\
  \ = [];\n}\n// 最少需要的复选框数量\n$minCheckboxes = 2;\nif (count($_POST['interests']) <\
  \ $minCheckboxes) {\n    $errors['interests'] = true;\n}\n```\n\n`count()` 函数返回数组中的元素数量，因此，如果选中的复选框少于两个，则会创建\
  \ `$errors['interests']`。你可能想知道为什么我使用变量而不是直接使用数字，如下所示：\n\n```\nif (count($_POST['interests'])\
  \ < 2) {\n```\n\n这样做当然可以，而且输入更少，但 `$minCheckboxes` 可以在错误消息中重复使用。将数量存储在变量中意味着此条件和错误消息始终保持同步。\n\
  \n表单正文中的错误消息如下所示：\n\n```\n<h2>对日本的兴趣\n<?php if (isset($errors['interests'])) { ?>\n\
  <span class=\"warning\">请至少选择 <?= $minCheckboxes;?> 项</span>\n<?php } ?>\n</h2>\n\
  ```\n\n### PHP 解决方案 5-8：使用下拉选项菜单\n\n使用 `<select>` 标签创建的下拉选项菜单与单选按钮组类似，通常都允许用户从几个选项中选择一个。它们的不同之处在于，下拉菜单中总是会选中一个项目，即使它只是提示用户选择其他选项的第一个项目。因此，`$_POST`\
  \ 数组始终包含一个引用 `<select>` 菜单的元素，而单选按钮组则会被忽略，除非预设了默认值。\n\n以下代码显示了 `contact_08.php`\
  \ 中下拉菜单的前两个项目，PHP 代码以粗体突出显示。与所有多项选择元素一样，PHP 代码包裹了指示哪个项目被选中的属性。虽然此属性在单选按钮和复选框中都称为\
  \ `checked`，但在 `<select>` 菜单和列表中称为 `selected`。如果表单因缺少必填项而重新提交，使用正确的属性来重新显示所选项非常重要。当页面首次加载时，`$_POST`\
  \ 数组不包含任何元素，因此你可以通过测试 `!$_POST` 来选择第一个 `<option>`。一旦表单提交，`$_POST` 数组始终包含来自下拉菜单的元素，因此你无需测试其是否存在。\n\
  \n```\n<p>\n<label for=\"howhear\">您是如何了解到 Japan Journey 的？</label>\n<select name=\"\
  howhear\" id=\"howhear\">\n<option value=\"No reply\"\n<?php\nif (!$_POST || $_POST['howhear']\
  \ == 'No reply') {\necho 'selected';\n} ?>>请选择</option>\n<option value=\"Apress\"\
  \n<?php\nif (isset($_POST && $_POST['howhear'] == 'Apress')) {\necho 'selected';\n\
  } ?>>Apress</option>\n. . .\n</select>\n</p>\n```\n\n尽管下拉菜单中总有一个选项被选中，但你可能会强制用户做出除默认选项之外的选择。为此，请将\
  \ `<select>` 菜单的 `name` 属性添加到 `$required` 数组中，然后将默认选项的 `value` 属性和 `$_POST` 数组元素设置为空字符串，如下所示：\n\
  \n```\n<option value=\"\"\n<?php\nif (!$_POST || $_POST['howhear'] == '') {\necho\
  \ 'selected';\n} ?>>请选择</option>\n```\n\n在 `<option>` 标签中，`value` 属性不是必需的，但如果你省略它，表单将使用开始和结束标签之间的文本作为选中的值。因此，有必要将\
  \ `value` 属性显式设置为空字符串。否则，\"请选择\" 将作为选中的值传输。\n\n如果未做出选择，显示警告消息的代码遵循熟悉的模式：\n\n```\n\
  <label for=\"select\">您是如何了解到 Japan Journey 的？\n<?php if ($missing && in_array('howhear',\
  \ $missing)) { ?>\n<span class=\"warning\">请做出选择</span>\n<?php } ?>\n</label>\n\
  ```\n\n\n\n### PHP 方案 5-9：处理多选列表\n\n多选列表与复选框组类似：允许用户选择零个或多个项目，因此结果会以数组形式存储。如果未选择任何项目，则多选列表不会包含在\
  \ `$_POST` 数组中，因此你需要像处理复选框组一样，添加一个空子数组。\n\n以下代码展示了 `contact_08.php` 中多选列表的前两个项目，其中\
  \ `name` 属性和 PHP 代码已加粗高亮。`name` 属性后附加的方括号确保其结果以数组形式存储。该代码的工作方式与 PHP 方案 5-7 中的复选框组完全相同。\n\
  \n```\n<p>\n<label for=\"characteristics\">您认为日本具有哪些特征？</label>\n<select name=\"\
  characteristics[]\" size=\"6\" multiple=\"multiple\" id=\"characteristics\">\n<option\
  \ value=\"Dynamic\"\n<?php\nif ($_POST && in_array('Dynamic', $_POST['characteristics']))\
  \ {\n    echo 'selected';\n} ?>\n>充满活力</option>\n<option value=\"Honest\"\n<?php\n\
  if ($_POST && in_array('Honest', $_POST['characteristics'])) {\n    echo 'selected';\n\
  } ?>\n>诚实守信</option>\n. . .\n</select>\n</p>\n```\n\n在处理消息的代码中，为多选列表设置默认值的方式与处理复选框数组相同：\n\
  \n```\nif (!isset($_POST['interests'])) {\n    $_POST['interests'] = [];\n}\nif\
  \ (!isset($_POST['characteristics'])) {\n    $_POST['characteristics'] = [];\n}\n\
  ```\n\n要将多选列表设为必填项并设置最小选择数量，请使用 PHP 方案 5-7 中用于复选框组的相同技术。\n\n### PHP 方案 5-10：处理单个复选框\n\
  \n处理单个复选框的方式与处理复选框组略有不同。对于单个复选框，你不需要在 `name` 属性后附加方括号，因为它无需作为数组处理。此外，`value` 属性是可选的。如果你不设置\
  \ `value` 属性，当复选框被选中时，其值默认为“On”。然而，如果复选框未被选中，其名称就不会包含在 `$_POST` 数组中，因此你需要测试其是否存在。\n\
  \n此 PHP 方案演示了如何添加一个用于确认用户是否已接受网站条款的单个复选框。它假定必须选中该复选框。\n\n以下代码展示了单个复选框，其中 `name`\
  \ 属性和 PHP 代码已加粗高亮。\n\n```\n<p>\n<input type=\"checkbox\" name=\"terms\" value=\"\
  accepted\" id=\"terms\"\n<?php\nif ($_POST && !isset($errors['terms'])) {\n    echo\
  \ 'checked';\n} ?>\n>\n<label for=\"terms\">我接受使用本网站的条款\n<?php if (isset($errors['terms']))\
  \ { ?>\n<span class=\"warning\">请选择该复选框</span>\n<?php } ?>\n</label>\n</p>\n```\n\
  \n`<input>` 元素内的 PHP 代码块仅在 `$_POST` 数组包含值且 `$errors['terms']` 尚未设置时，才插入 `checked`\
  \ 属性。这确保了页面首次加载时复选框不会被选中。如果用户提交表单时未确认接受条款，复选框也会保持未选中状态。\n\n如果设置了 `$errors['terms']`，第二个\
  \ PHP 代码块会在标签旁边显示错误消息。\n\n除了将 `terms` 添加到 `$expected` 和 `$required` 数组之外，你还需要为 `$_POST['terms']`\
  \ 设置一个默认值；然后在提交表单时处理数据的代码中设置 `$errors['terms']`：\n\n```\nif (!isset($_POST['characteristics']))\
  \ {\n    $_POST['characteristics'] = [];\n}\nif (!isset($_POST['terms'])) {\n  \
  \  $_POST['terms'] = '';\n    $errors['terms'] = true;\n}\n```\n\n仅当复选框为必填项时，你才需要创建\
  \ `$errors['terms']`。对于可选的复选框，如果它不包含在 `$_POST` 数组中，只需将其值设置为空字符串即可。\n\n### 本章回顾\n\
  \n构建 `processmail.php` 投入了大量工作，但该脚本的妙处在于它适用于任何表单。唯一需要更改的部分是 `$expected` 和 `$required`\
  \ 数组，以及与表单相关的细节，例如目标地址、邮件头和为那些未选择值就不会包含在 `$_POST` 数组中的多选元素设置的默认值。\n\n我避免讨论 HTML\
  \ 电子邮件，因为 `mail()` 函数只处理纯文本电子邮件。`www.php.net/manual/en/function.mail.php` 上的 PHP\
  \ 在线手册展示了通过添加额外邮件头发送 HTML 邮件的方法。然而，这不是一个好主意，因为 HTML 邮件应始终为不接受 HTML 的电子邮件程序提供纯文本替代版本。如果你想发送\
  \ HTML 邮件或附件，请尝试使用 PHPMailer (`https://github.com/Synchro/PHPMailer/`)。\n\n正如你将在后续章节中看到的，在线表单几乎是你用\
  \ PHP 做所有事情的核心。它们是浏览器和 Web 服务器之间的网关。你会反复用到本章学到的技术。\n\n"
- "# 6. 上传文件\n\nPHP 处理表单的能力不仅限于文本。它还可以用于将文件上传到服务器。例如，你可以构建一个房地产网站，供客户上传其房产图片；或者一个供所有亲朋好友上传假期照片的网站。然而，仅仅因为你可以这样做，并不一定意味着你应该这样做。允许他人向你的网站上传材料可能会使你面临各种问题。你需要确保图片尺寸正确、质量合适，并且不包含任何非法内容。你还需要确保上传的文件不包含恶意脚本。换句话说，你需要像保护自己的计算机一样仔细保护你的网站。\n\
  \nPHP 使得限制接受的文件类型和大小相对简单。但它无法检查内容的合适性。请仔细考虑安全措施，例如通过将上传表单放置在受密码保护的区域，将上传权限限制给已注册和受信任的用户。\n\
  \n在你学习如何使用 PHP（在第 9 章和第 17 章）限制对页面的访问之前，如果在公共网站上部署，请仅在本章中的受密码保护目录中使用 PHP 解决方案。大多数托管公司通过网站的控制面板提供简单的密码保护。\n\
  \n本章的第一部分致力于理解文件上传的机制，这将使你更容易理解后续的代码。这是一章内容相当丰富的章节，而不是快速解决方案的集合。但到本章结束时，你将构建一个能够处理单个和多个文件上传的\
  \ PHP 类。然后，你只需编写几行代码，就可以在任何表单中使用该类。\n\n你将学习以下内容：\n\n- 理解 `$_FILES` 数组\n- 限制上传的大小和类型\n\
  - 防止文件被覆盖\n- 处理多个上传\n\n## PHP 如何处理文件上传\n\n术语“上传”意味着将文件从一台计算机移动到另一台计算机，但就 PHP 而言，所发生的一切只是将文件从一个位置移动到另一个位置。这意味着你可以在本地计算机上测试本章中的所有脚本，而无需将文件上传到远程服务器。\n\
  \nPHP 默认支持文件上传，但托管公司可能限制上传的大小或完全禁用上传。在进一步操作之前，最好检查一下远程服务器上的设置。\n\n\n\n### 检查服务器是否支持文件上传\n\
  \n所有你需要的信息都显示在 PHP 的主要配置页面中，你可以通过在远程服务器上运行 `phpinfo()` 来显示该页面，如第 2 章所述。向下滚动，直到在\
  \ Core 部分找到 `file_uploads`。\n\n如果本地值（Local Value）为 On，你就可以开始了，但你也应该检查表 6-1 中列出的其他配置设置。\n\
  \n**表 6-1.** 影响文件上传的 PHP 配置设置\n\n| 指令 | 默认值 | 描述 |\n| --- | --- | --- |\n| `max_execution_time`\
  \ | 30 | PHP 脚本可以运行的最大秒数。如果脚本运行时间更长，PHP 会生成一个致命错误。 |\n| `max_file_uploads` | 20\
  \ | 可以同时上传的最大文件数量。如果超过此限制，多余的文件会被静默忽略。 |\n| `max_input_time` | 60 | PHP 脚本被允许解析\
  \ `$_POST` 和 `$_GET` 数组以及文件上传的最大秒数。非常大的上传可能会超时。 |\n| `post_max_size` | 8M | 所有 `$_POST`\
  \ 数据（包括文件上传）允许的最大大小。虽然默认值是 8 MB，但托管公司可能会设置更小的限制。 |\n| `upload_tmp_dir` |   | PHP\
  \ 在此处存储上传的文件，直到你的脚本将它们移动到永久位置。如果在 `php.ini` 中未定义任何值，PHP 将使用系统的默认临时目录（在 Mac/Linux\
  \ 上为 `C:\\Windows\\Temp` 或 `/tmp`）。 |\n| `upload_max_filesize` | 2M | 单个上传文件允许的最大大小。虽然默认值是\
  \ 2 MB，但托管公司可能会设置更小的限制。单独的数字表示允许的字节数。后跟 K 的数字表示允许的千字节数。 |\n\n从 PHP 5.6 开始，PHP 可以处理大于\
  \ 2 GB 的单个文件上传，但实际限制由表 6-1 中的设置决定。`post_max_size` 的默认值 8 MB 包含了 `$_POST` 数组的内容，因此典型服务器上可以同时上传的文件总大小小于\
  \ 8 MB，且没有单个文件大于 2 MB。服务器管理员可以更改这些默认值，因此检查托管公司设置的限制很重要。如果你超过这些限制，一个原本完美无缺的脚本将会失败。\n\
  \n如果 `file_uploads` 的本地值为 Off，则上传功能已被禁用。对此你无能为力，只能询问你的托管公司是否提供启用了文件上传的套餐。你唯一的选择是迁移到其他主机，或使用不同的解决方案，例如通过\
  \ FTP 上传文件。\n\n**提示**\n\n使用 `phpinfo()` 检查远程服务器的设置后，最好删除该脚本或将其放入受密码保护的目录中。\n\n###\
  \ 向表单添加文件上传字段\n\n向 HTML 表单添加文件上传字段很容易。只需在开始的 `<form>` 标签中添加 `enctype=\"multipart/form-data\"\
  `，并将 `<input>` 元素的 `type` 属性设置为 `file`。以下代码是一个简单的上传表单示例（它位于 `ch06` 文件夹中的 `file_upload_01.php`\
  \ 文件中）：\n\n```html\n<form action=\"\" method=\"post\" enctype=\"multipart/form-data\"\
  \ id=\"uploadImage\">\n  <p>\n    <label for=\"image\">上传图片：</label>\n    <input\
  \ type=\"file\" name=\"image\" id=\"image\">\n  </p>\n  <p>\n    <input type=\"\
  submit\" name=\"upload\" id=\"upload\" value=\"上传\">\n  </p>\n</form>\n```\n\n尽管这是标准的\
  \ HTML，但它在网页中的呈现方式取决于浏览器（见图 6-1）。大多数现代浏览器会显示一个“选择文件”或“浏览”按钮，右侧显示状态消息或所选文件的名称。Internet\
  \ Explorer 会显示一个文本输入字段，右侧有一个“浏览”按钮。较新版本的 Internet Explorer 使其成为只读字段，一旦你点击字段内部，就会启动文件选择面板。这些差异不会影响上传表单的操作，但在设计布局时需要考虑它们。\n\
  \n![A978-1-4842-0635-5_6_Fig1_HTML.jpg](img/A978-1-4842-0635-5_6_Fig1_HTML.jpg)\n\
  \n**图 6-1.** 文件输入字段的外观因浏览器而异\n\n### 理解 `$_FILES` 数组\n\n令许多人困惑的是，他们的文件在上传后似乎消失了。这是因为你不能像处理文本输入那样，在\
  \ `$_POST` 数组中引用上传的文件。PHP 在一个独立的超全局数组（恰当地命名为 `$_FILES`）中传输上传文件的详细信息。此外，文件会上传到临时文件夹，除非你显式地将它们移动到所需位置，否则会被删除。虽然这听起来很麻烦，但这样做是有充分理由的：你可以在接受上传之前对文件进行安全检查。\n\
  \n#### 检查 `$_FILES` 数组\n\n理解 `$_FILES` 数组工作原理的最佳方式是实际查看它的运作。如果你已经安装了本地测试环境，可以在自己的电脑上测试所有功能。它的工作方式与将文件上传到远程服务器完全相同。\n\
  \n在 `phpsols` 站点根目录中创建一个名为 `uploads` 的新文件夹。在 `uploads` 文件夹中创建一个名为 `file_upload.php`\
  \ 的新 PHP 文件，并插入上一节的代码。或者，从 `ch06` 文件夹复制 `file_upload_01.php` 并将文件重命名为 `file_upload.php`。在结束的\
  \ `</form>` 标签之后立即插入以下代码（它也在 `file_upload_02.php` 中）：\n\n```php\n</form>\n\n<pre>\n\
  <?php\nif (isset($_POST['upload'])) {\n    print_r($_FILES);\n}\n?>\n</pre>\n\n\
  </body>\n```\n\n这段代码使用 `isset()` 来检查 `$_POST` 数组是否包含 `upload`（即提交按钮的 `name` 属性）。如果包含，你就知道表单已提交，因此可以使用\
  \ `print_r()` 来检查 `$_FILES` 数组。`<pre>` 标签使输出更易于阅读。\n\n保存 `file_upload.php` 并在浏览器中加载它。点击“浏览”（或“选择文件”）按钮，并在硬盘上选择一个文件。点击“打开”（在\
  \ Mac 上为“选择”）关闭文件选择对话框，然后点击“上传”。你应看到类似图 6-2 的内容。\n\n你可以看到 `$_FILES` 数组实际上是一个多维数组——数组的数组。顶层数组只包含一个元素，该元素的键（或索引）来自文件输入字段的\
  \ `name` 属性，在本例中是 `image`。\n\n![A978-1-4842-0635-5_6_Fig2_HTML.jpg](img/A978-1-4842-0635-5_6_Fig2_HTML.jpg)\n\
  \n**图 6-2.** `$_FILES` 数组包含上传文件的详细信息\n\n`image` 元素包含另一个数组（或子数组），由五个元素组成，分别是：\n\n\
  *   `name`：上传文件的原始名称\n*   `type`：上传文件的 MIME 类型\n*   `tmp_name`：上传文件的位置\n*   `error`：一个整数，表示上传状态\n\
  *   `size`：上传文件的大小，以字节为单位\n\n不要浪费时间搜索 `tmp_name` 指示的临时文件：它将不复存在。如果你不立即保存它，PHP 会将其丢弃。\n\
  \n不选择文件就点击上传。`$_FILES` 数组应如图 6-3 所示。\n\n![A978-1-4842-0635-5_6_Fig3_HTML.jpg](img/A978-1-4842-0635-5_6_Fig3_HTML.jpg)\n\
  \n**图 6-3.** 当没有文件上传时，`$_FILES` 数组仍然存在\n\n错误级别为 4 表示未上传文件；0 表示上传成功。本章后面的表 6-2 列出了所有错误代码。\n\
  \n选择一个程序文件并点击上传按钮。在很多情况下，表单会尝试上传该程序，并将其类型显示为 `application/zip`、`application/octet-stream`\
  \ 或类似内容。这是一个警告，表明检查上传文件的 MIME 类型非常重要。\n\n\n\n### 建立上传目录\n\n另一个容易混淆的问题是权限问题。一个在本地运行完美的上传脚本，当你将其传输到远程服务器时，可能会遇到类似如下的报错信息：\n\
  \n```\nWarning: move_uploaded_file(/home/user/htdocs/testarea/kinkakuji.jpg)\n[function.move-uploaded-file]:\
  \ failed to open stream: Permission denied in\n/home/user/htdocs/testarea/upload_test.php\
  \ on line 3\n```\n\n为什么会被拒绝权限？多数主机服务商使用 Linux 服务器，这类系统对文件和目录的所有权有严格规定。大多数情况下，PHP\
  \ 并非以你的用户名运行，而是作为 Web 服务器用户——通常是 `nobody` 或 `apache`。除非 PHP 已被配置为以你的用户名运行，否则你需要为每个想上传文件的目录授予全局访问权限（`chmod\
  \ 777`）。\n\n由于 777 是最不安全的设置，请先从 700 权限开始测试上传。如果不行，再尝试 770，只有在万不得已时才使用 777。上传目录不必位于你的网站根目录内。如果你的主机服务商在网站根目录外提供了私人目录，请在该私人目录中为上传文件创建子目录。或者，你可以在网站根目录内创建一个目录，但不要在任何网页中链接到它。给它起一个无害的名称，例如\
  \ `lastyear`。\n\n#### 在 Windows 上创建用于本地测试的上传文件夹\n\n在接下来的练习中，我建议你在 C 盘根目录下创建一个名为\
  \ `upload_test` 的文件夹。Windows 系统没有权限问题，所以只需这样做即可。\n\n#### 在 Mac OS X 上创建用于本地测试的上传文件夹\n\
  \nMac 用户可能需要多做一点准备工作，因为文件权限与 Linux 类似。在你的主文件夹中创建一个名为 `upload_test` 的文件夹，并按照 PHP\
  \ 方案 6-1 中的说明进行操作。\n\n如果一切顺利，你无需额外操作。但如果你收到 PHP“failed to open stream”的警告，请按如下方式更改\
  \ `upload_test` 文件夹的权限：\n\n在 Mac Finder 中选择 `upload_test`，然后选择 文件 ➤ 显示简介（Cmd-I）打开其信息面板。在“共享与权限”中，点击右下角的挂锁图标解锁设置，然后将“everyone”的权限从“只读”更改为“读与写”，如下方截图所示。\n\
  \n![A978-1-4842-0635-5_6_Figa_HTML.jpg](img/A978-1-4842-0635-5_6_Figa_HTML.jpg)\n\
  \n再次点击挂锁图标以保存新设置，然后关闭信息面板。现在你应该能够使用 `upload_test` 文件夹继续本章剩余的内容。\n\n## 上传文件\n\n在构建文件上传类之前，最好先创建一个简单的文件上传脚本，以确保你的系统能正确处理上传。\n\
  \n### 将临时文件移动到上传文件夹\n\n上传文件的临时版本存在时间极短。如果你不对文件进行任何操作，它会被立即丢弃。你需要告诉 PHP 将其移动到哪里，以及将其命名为什么。这可以通过\
  \ `move_uploaded_file()` 函数来实现，该函数接受以下两个参数：\n\n- 临时文件的名称\n- 文件新位置的完整路径，包括文件名本身\n\
  \n获取临时文件的名称很简单：它存储在 `$_FILES` 数组中，键名为 `tmp_name`。由于第二个参数需要完整路径，这为你提供了重命名文件的机会。现在，我们保持简单，使用原始文件名，它存储在\
  \ `$_FILES` 数组中，键名为 `name`。\n\n#### PHP 方案 6-1：创建基础文件上传脚本\n\n继续使用上一个练习中的同一个文件。或者，使用\
  \ `ch06` 文件夹中的 `file_upload_03.php`。本 PHP 方案的最终脚本位于 `file_upload_04.php`。\n\n如果你使用的是上一个练习中的文件，请删除\
  \ `</form>` 和 `</body>` 标签之间加粗显示的代码：\n\n```\n</form>\n<pre>\n<?php\nif (isset($_POST['upload']))\
  \ {\n  print_r($_FILES);\n}\n?>\n</pre>\n</body>\n```\n\n除了 PHP 配置中设置的内置限制（见表 6-1），你还可以在\
  \ HTML 表单中指定上传文件的最大大小。在文件输入字段之前立即添加以下加粗显示的行：\n\n```\n<label for=\"image\">上传图片：</label>\n\
  <input type=\"hidden\" name=\"MAX_FILE_SIZE\" value=\"<?= $max; ?>\">\n<input type=\"\
  file\" name=\"image\" id=\"image\">\n```\n\n这是一个隐藏表单字段，因此不会在屏幕上显示。但是，必须将其放在文件输入字段之前，否则它将无法工作。`name`\
  \ 属性 `MAX_FILE_SIZE` 是固定的，并且区分大小写。`value` 属性以字节为单位设置上传文件的最大大小。\n\n我没有直接指定数值，而是使用了一个名为\
  \ `$max` 的变量。该值也将在服务器端文件上传验证中使用，因此只需定义一次是有意义的，这样可以避免在一个地方更改它而忘记在其他地方更改的可能性。\n\n\
  在 `DOCTYPE` 声明上方的 PHP 代码块中定义 `$max` 的值，如下所示：\n\n```\n<?php\n// 设置最大上传大小（以字节为单位）\n\
  $max = 51200;\n?>\n<!DOCTYPE HTML>\n```\n\n这将最大上传大小设置为 50 KB（51,200 字节）。\n\n将上传文件从其临时位置移动到永久位置的代码需要在表单提交后运行。在你刚刚在页面顶部创建的\
  \ PHP 代码块中插入以下代码：\n\n```\n$max = 51200;\nif (isset($_POST['upload'])) {\n  // 定义上传文件夹的路径\n\
  \  $destination = '/path/to/upload_test/';\n  // 将文件移动到上传文件夹并重命名\n  move_uploaded_file($_FILES['image']['tmp_name'],\n\
  \                     $destination . $_FILES['image']['name']);\n}\n?>\n```\n\n\
  虽然代码很短，但包含了很多操作。条件语句通过检查“上传”按钮的键是否存在于 `$_POST` 数组中，来确保仅在点击该按钮时才执行代码。\n\n`$destination`\
  \ 的值取决于你的操作系统和 `upload_test` 文件夹的位置。\n\n- 如果你使用的是 Windows，并且在 C 盘根目录创建了 `upload_test`\
  \ 文件夹，则应如下所示：\n\n```\n$destination = 'C:/upload_test/';\n```\n\n请注意，我使用的是正斜杠，而不是\
  \ Windows 约定使用的反斜杠。你可以使用任意一种，但如果使用反斜杠，最后一个反斜杠需要用另一个反斜杠进行转义，如下所示（否则反斜杠会转义引号）：\n\n\
  ```\n$destination = 'C:\\upload_test\\\\';\n```\n\n- 在 Mac 上，如果你在主文件夹中创建了 `upload_test`\
  \ 文件夹，则应如下所示（将 username 替换为你的 Mac 用户名）：\n\n```\n$destination = '/Users/username/upload_test/';\n\
  ```\n\n- 在远程服务器上，你需要将完全限定的文件路径作为第二个参数。在 Linux 上，可能如下所示：\n\n```\n$destination = '/home/user/private/upload_test/';\n\
  ```\n\n`if` 语句内的最后一行使用 `move_uploaded_file()` 函数移动文件。该函数接受两个参数：临时文件的名称和文件将要保存到的完整路径。\n\
  \n`$_FILES` 是一个多维数组，其名称来自文件输入字段。因此，`$_FILES['image']['tmp_name']` 是临时文件，`$_FILES['image']['name']`\
  \ 包含原始文件的名称。第二个参数 `$destination . $_FILES['image']['name']` 将上传的文件以其原始名称存储在上传文件夹中。\n\
  \n**警告**\n\n\n\n\n你可能遇到过使用`copy()`而非`move_uploaded_file()`的脚本。如果没有其他检查机制，`copy()`会让你的网站面临严重的安全风险。例如，恶意用户可能试图欺骗你的脚本，让它复制本不应有权访问的文件（如密码文件）。请始终使用`move_uploaded_file()`；它安全得多。\n\
  \n保存`file_upload.php`，并在浏览器中加载它。点击“浏览”或“选择文件”按钮，从`phpsols`站点的`images`文件夹中选择一个文件。如果你从其他位置选择文件，请确保其大小小于\
  \ 50KB。点击“打开”（Mac 上为“选择”）以在表单中显示文件名。在显示文件输入字段的浏览器中，你可能无法看到完整路径。这是一个外观问题，留待你自己通过\
  \ CSS 解决。点击“上传”按钮。如果在本地测试，表单输入字段应该几乎立即清空。导航到`upload_test`文件夹，确认你选择的图片副本已存在。如果不在，请对照`file_upload_04.php`检查你的代码。另外，检查上传文件夹是否已设置正确的权限（如有必要）。\n\
  \n注意：下载文件使用`C:/upload_test/`。请根据你的环境进行调整。\n\n如果没有收到错误信息但找不到文件，请确保图片没有超过`upload_max_filesize`（参见表\
  \ 6-1）。同时检查你是否遗漏了`$destination`末尾的尾部斜杠。你可能会在`upload_test`文件夹中找不到`myfile.jpg`，而是在磁盘结构中高一级的位置发现`upload_testmyfile.jpg`。\n\
  \n将`$max`的值改为`3000`，保存`file_upload.php`，然后通过选择一个大于 2.9KB 的文件（`images`文件夹中的任何文件都可以）再次测试。点击“上传”按钮并检查`upload_test`文件夹。该文件应该不在那里。\n\
  \n如果你有实验兴趣，请将`MAX_FILE_SIZE`隐藏字段移到文件输入字段下方，然后再次尝试。请确保你选择的文件与步骤 6 中使用的文件不同，因为`move_uploaded_file()`会覆盖同名的现有文件。稍后你将学习如何为文件赋予唯一名称。\n\
  \n这次，文件应被复制到你的上传文件夹中。在继续之前，将隐藏字段移回其原始位置。\n\n使用`MAX_FILE_SIZE`的好处是，如果文件大于规定值，PHP\
  \ 会放弃上传，从而避免因文件过大而产生不必要的延迟。不幸的是，用户可以通过伪造隐藏字段提交的值来绕过这一限制，因此本章剩余部分将要开发的脚本也会在服务器端检查文件大小。\n\
  \n## 创建 PHP 文件上传类\n\n正如你刚刚所见，上传文件只需几行代码，但这本身并不足以使任务完成。你需要通过执行以下步骤来提高过程的安全性：\n\n\
  *   检查错误级别。\n*   在服务器端验证文件是否超过最大允许大小。\n*   检查文件类型是否可接受。\n*   从文件名中移除空格。\n*   重命名与现有文件同名的文件以防止覆盖。\n\
  *   自动处理多个文件上传。\n*   告知用户结果。\n\n每次上传文件时都需要执行这些步骤，因此构建一个易于重用的脚本很有意义。这就是我选择使用自定义类的原因。构建\
  \ PHP 类通常被视为高级主题，但不要因此望而却步。\n\n类是一组旨在协同工作的函数的集合。这虽然是一种过度简化，但足以让你理解基本概念。类中的每个函数通常应专注于单一任务，因此你将构建独立的函数来实现前面列表中概述的步骤。代码还应该是通用的，不能局限于特定的网页。一旦构建了类，你就可以在任何表单中重用。尽管类定义很长，但使用该类只需编写几行代码。\n\
  \n如果你赶时间，完成的类位于`ch06/PhpSolutions`文件夹中。即使你不亲手构建脚本，也请通读说明，以便清楚地了解其工作原理。\n\n### 定义\
  \ PHP 类\n\n定义 PHP 类非常简单。使用`class`关键字，后跟类名，然后将类的所有代码放在一对花括号之间。按照惯例，类名以大写字母开头，并存储在与其同名的单独文件中。\n\
  \n#### 使用命名空间避免命名冲突\n\n如果你编写自己的脚本，通常不必担心命名冲突。我们将要创建一个用于上传文件的类，因此`Upload`或`FileUpload`似乎是合乎逻辑的名称。但一旦你开始使用他人（包括本书）编写的脚本和类，就可能存在多个类具有相同名称的风险。\n\
  \n避免使用常见名称冲突的原始策略是将类定义存储在描述其功能的文件夹结构中，并为顶级文件夹赋予一个基于域名或公司名称的唯一名称。然后，类名通过使用下划线代替斜杠，从文件夹结构中创建出来。这经常导致笨拙的类名，例如`Zend_File_Transfer_Adapter_Http`。\n\
  \n注意：将类定义存储在基于类名和命名空间的文件和文件夹中，可以方便地使用自动加载脚本自动加载类。我们不会使用自动加载器，因为在上传表单所在的文件中只需要包含一个类定义。自动加载器主要在处理多个类时派上用场。\n\
  \nPHP 5.3 引入了一种使用命名空间的更简洁系统。PHP 命名空间仍然基于文件夹结构，但它们使用反斜杠代替下划线。命名空间也单独声明，允许你使用简单的类名。\n\
  \n我们将要构建的类名为`Upload`，但为了避免命名冲突，它将在名为`PhpSolutions\\File`的命名空间中创建。\n\n使用`namespace`关键字在文件顶部声明命名空间，后跟命名空间，如下所示：\n\
  \n`namespace PhpSolutions\\File;`\n\n注意：PHP 在所有操作系统上都使用反斜杠作为命名空间分隔符。不要试图在 Linux\
  \ 或 Mac OS X 上将其改为正斜杠。\n\n因此，如果我们在此命名空间中创建一个名为`Upload`的类，其完全限定名称为`PhpSolutions\\\
  File\\Upload`。表面上看，这似乎很难说是进步。该类仍然有一个使用反斜杠代替下划线的笨拙名称。区别在于，你可以导入一个带命名空间的类并使用较短的名称。\n\
  \n#### 导入带命名空间的类\n\n为避免每次引用带命名空间的类时都必须使用其完全限定名称，你可以在脚本开头使用`use`关键字导入该类，如下所示：\n\n\
  `use PhpSolutions\\File\\Upload;`\n\n导入类之后，你就可以将其引用为`Upload`，而不是使用完全限定名称。导入带命名空间的类与包含它不同。它仅仅是一个声明，表明你想使用该类的较短名称。事实上，你可以使用`as`关键字为导入的类分配别名，如下所示：\n\
  \n`use PhpSolutions\\File\\Upload as FileUploader;`\n\n然后该类可以被称为`FileUploader`。使用别名主要在大型应用程序中两个不同框架的类同名时有用。\n\
  \n注意：你仍需单独包含类定义。事实上，在加载类定义之前导入带命名空间的类是很常见的，因为`use`关键字必须在脚本的顶层声明。它不能嵌套在条件语句内部。\n\n\
  \n\n\n### PHP 方案 6-2：创建基础文件上传类\n\n在本 PHP 方案中，你将创建一个名为 `Upload` 的类的基本定义来处理文件上传。你还会创建该类的一个实例（一个\
  \ `Upload` 对象），并使用它来上传一张图片。请留出充足的时间来完成以下步骤。这些步骤并不困难，但会介绍一些你可能不熟悉的概念（如果你之前从未接触过 PHP\
  \ 类）。\n\n在 `phpsols` 站点根文件夹中创建一个名为 `PhpSolutions` 的子文件夹。文件夹名中的大小写字母组合请与此保持一致。然后在\
  \ `PhpSolutions` 文件夹中创建一个名为 `File`（大写 F）的子文件夹。在新的 `PhpSolutions/File` 文件夹中，创建一个名为\
  \ `Upload.php` 的文件。文件名中的大小写字母组合也请保持正确。然后插入以下代码：\n\n```php\n<?php\n\nnamespace PhpSolutions\\\
  File;\n\nclass Upload {\n\n}\n```\n\n所有剩余的代码都放在这对花括号之间。此文件仅包含 PHP 代码，因此你不需要添加 PHP\
  \ 结束标签。\n\nPHP 类通过将一些变量和函数声明为 `protected` 来隐藏其内部工作机制。如果你在变量或函数前加上关键字 `protected`，那么它只能在类内部或子类中被访问。这可以防止值被意外更改。\n\
  \n`Upload` 类需要为以下项目设置受保护的变量：\n\n- 上传文件夹的路径\n- 最大文件大小\n- 报告上传状态的消息\n- 允许的 MIME 类型\n\
  \n通过在花括号内添加它们来创建这些变量，如下所示：\n\n```php\nclass Upload {\n\n    protected $destination;\n\
  \n    protected $max = 51200;\n\n    protected $messages = [];\n\n    protected\
  \ $permitted = [\n        'image/gif',\n        'image/jpeg',\n        'image/pjpeg',\n\
  \        'image/png'\n    ];\n\n}\n```\n\n这些属性可以通过 `$this->` 在类的其他位置访问，`$this` 指向当前对象。例如，在类定义内部，你可以将\
  \ `$destination` 作为 `$this->destination` 来访问。\n\n**注意：** 首次在类内部声明属性时，它和任何其他变量一样以美元符号开头。但是，在\
  \ `->` 运算符之后，你需要省略属性名中的美元符号。\n\n除了 `$destination` 之外，每个受保护的属性都设置了默认值：\n\n- `$max`\
  \ 将最大文件大小设置为 50 KB（51200 字节）。\n- `$messages` 是一个空数组。\n- `$permitted` 包含一个图像 MIME\
  \ 类型数组。\n\n`$destination` 的值将在创建类的实例时被设置。其他值将由类内部控制，但你也会创建函数（或在类中称为方法）来更改 `$max`\
  \ 和 `$permitted` 的值。\n\n当创建类的实例（对象）时，类定义文件会自动调用类的构造函数方法，该方法用于初始化对象。所有类的构造函数方法都叫\
  \ `__construct()`（两个下划线）。与你在上一步中定义的属性不同，构造函数需要在类外部可访问，因此你需要在它的定义前加上 `public` 关键字。\n\
  \n**注意：** `public` 和 `protected` 关键字控制属性和方法的可见性。公有属性和方法可以在任何地方被访问。任何在类定义或子类外部访问受保护属性或方法的尝试都会触发致命错误。\n\
  \n`Upload` 类的构造函数接受一个参数，即你想要上传文件的目标文件夹的路径，并将其赋值给 `$destination`。在受保护属性列表之后，类定义结束花括号之前，添加以下代码：\n\
  \n```php\npublic function __construct($path) {\n    if (!is_dir($path) || !is_writable($path))\
  \ {\n        throw new \\Exception(\"$path 必须是有效且可写的文件夹。\");\n    }\n    $this->destination\
  \ = $path;\n}\n```\n\n构造函数内部的判断语句将 `$path` 传递给 `is_dir()` 和 `is_writable()` 函数，这两个函数检查提交的值是否为一个可写的有效文件夹。如果任一条件不满足，构造函数就会抛出一个异常，并附带一条说明问题的消息。\n\
  \n**注意：** `Exception` 前面的反斜杠表示要使用 PHP 核心命令，而不是在命名空间内定义的。只有在可能存在歧义时，才需要用反斜杠作为核心命令的前缀。类可以定义自己的异常，因此在这里这样做是必要的。\n\
  \n如果 `$path` 没问题，它就会被赋值给当前对象的 `$destination` 属性。\n\n接下来，创建一个名为 `upload()` 的公有方法。该方法将在文件上传之前启动一系列测试。紧接在你之前定义的构造函数方法之后，插入以下代码：\n\
  \n```php\npublic function upload() {\n    $uploaded = current($_FILES);\n    if\
  \ ($this->checkFile($uploaded)) {\n        $this->moveFile($uploaded);\n    }\n\
  }\n```\n\n要访问 PHP 方案 6-1 中 `$_FILES` 数组里的文件，你需要知道文件输入字段的 `name` 属性。`file_upload.php`\
  \ 中的表单使用了 `image`，所以你需要将文件名作为 `$_FILES['image']['name']` 来访问。但是，如果该字段使用了不同的名称，比如\
  \ `upload`，你就需要使用 `$_FILES['upload']['name']`。为了让脚本更灵活，`upload()` 方法的第一行将 `$_FILES`\
  \ 数组传递给 `current()` 函数，该函数返回数组的当前元素。因此，无论表单中使用的名称是什么，`$uploaded` 都持有对 `$_FILES`\
  \ 数组中第一个元素的引用。这是构建通用代码的第一个好处。最初需要付出更多努力，但最终能节省时间。\n\n**提示：** `$_FILES` 是 PHP 的超级全局数组之一，因此在脚本的所有部分都可以使用它。这就是为什么无需将其作为参数传递给类构造函数方法的原因。\n\
  \n`upload()` 方法中的条件语句使用了 `$this` 关键字来调用 `checkFile()`。`$this` 关键字也用于调用在类内部定义的函数（方法）。接下来我们需要定义\
  \ `checkFile()`。现阶段，我们假设文件没问题，因此 `checkFile()` 将简单地返回 `true`。在类定义中添加以下代码：\n\n```php\n\
  protected function checkFile($file) {\n    return true;\n}\n```\n\n在定义前加上 `protected`\
  \ 关键字意味着此方法只能在类内部访问。我们将在 PHP 方案 6-3 中回到 `checkFile()`，在上传文件之前添加一系列测试。\n\n**提示：**\
  \ 类内部函数（方法）定义的顺序无关紧要，只要它们都位于包含该类的花括号之内即可。不过，通常的做法是将所有公有方法放在一起置于顶部，而受保护的方法放在底部。\n\
  \n如果文件通过了测试系列，`upload()` 方法中的条件语句会将该文件传递给另一个名为 `moveFile()` 的内部方法，该方法基本上是我们在 PHP\
  \ 方案 6-1 中使用的 `move_uploaded_file()` 函数的一个包装器。代码如下所示：\n\n```php\nprotected function\
  \ moveFile($file) {\n    $success = move_uploaded_file($file['tmp_name'],\n    \
  \    $this->destination . $file['name']);\n    if ($success) {\n        $result\
  \ = $file['name'] . ' 上传成功';\n        $this->messages[] = $result;\n    } else {\n\
  \        $this->messages[] = '无法上传 ' . $file['name'];\n    }\n}\n```\n\n如果上传成功，`move_uploaded_file()`\
  \ 返回 `true`。否则，返回 `false`。通过将返回值存储在 `$success` 中，相应的消息会被存储到 `$messages` 数组中。\n\n\
  由于 `$messages` 是一个受保护的属性，你需要创建一个公有方法来获取数组的内容。\n\n```php\npublic function getMessages()\
  \ {\n    return $this->messages;\n}\n```\n\n\n\n"
