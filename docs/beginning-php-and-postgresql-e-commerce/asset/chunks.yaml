    \ arial, tahoma;\n  font-size: 12px;\n  font-weight: bold;\n  margin: 1px;\n \
    \ padding: 3px;\n  text-align: left;\n}\n\ntd\n{\n  background: #e6e6e6;\n  border-bottom:\
    \ solid 1px #000000;\n  font-family: verdana, arial, tahoma;\n  font-size: 11px;\n\
    \  margin: 1px;\n  padding: 3px;\n}\n\nselect\n{\n  font-family: tahoma, verdana,\
    \ arial;\n  font-size: 11px;\n}\n```\n\n### 3. 修改`include/app_top.php`，在其开头添加以下两行。调用`ob_start()`——参见`http://www.php.net/ob_start`——开启输出缓冲，这能提升性能并确保使用`header`函数（参见下一步的`admin.php`）进行页面重定向时不会产生错误。\n\
