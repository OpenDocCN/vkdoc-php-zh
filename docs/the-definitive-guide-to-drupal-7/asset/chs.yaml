  ![images](img/square.jpg) **Ryan Szrama** 通过网络开发起步，当时他受雇于位于肯塔基州路易斯维尔（他居住超过 10 年的家乡）的一家在线销售公司。正是在那里，他作为项目负责人和项目的社区代言人，将
  Ubercart 从雏形培育到被超过 20,000 个网站使用。Ryan 于 2009 年加入 Commerce Guys，并继续领导 Ubercart，直到转向
  Drupal Commerce——这是一个新计划，旨在让用户能够利用 Drupal 7 提供的最佳新功能来构建电子商务网站。他的大部分时间都用于开发代码库、发展项目的贡献者社区，以及在线和在社区活动中培训新用户。


  ![images](img/square.jpg) **Brian Travis** 自出生后不久就开始拆解技术。在计算机出现之前，他乐于拆解家用电器。作为“从错误中学习”学派的倡导者，Brian
  从不害怕犯错。他住在美丽的新罕布什尔州。


  ![images](img/square.jpg) **Kay VanValkenburgh** 是一位常驻波士顿的 Drupal 项目总监，非常注重培训和指导。他最新的创业项目是
  OwnSourcing，始于 2010 年，旨在开发实践培训和项目特定文档，帮助非开发人员利用 Drupal 做出精彩的事情。在同一理念下，Kay 创立了一个导师计划，帮助崭露头角的
  Drupal 开发者起步（参见 [`ownsourcing.com/mentorship`](http://ownsourcing.com/mentorship)）。Kay
  痴迷于可用的软件、人们的学习方式、世界语言以及竞技帆船。


  ![images](img/square.jpg) **Peter Wolanin** 与 Drupal 的缘分始于 2005 年底，当时一位曾支持霍华德·迪恩的朋友邀请他参与一个项目，为当地民主党俱乐部建立新的网站。他们开始使用
  Drupal 4.7 测试版构建该网站。Peter 很快就对在 Drupal 核心和贡献模块中修复错误和添加功能的挑战产生了兴趣，其兴趣程度甚至超过了实际的网站构建。他成为
  Drupal 5、6 和 7 的知名贡献者；Drupal 文档团队成员；Drupal 安全团队成员；并于 2010 年被选为 Drupal 协会的常任成员。Peter
  于 2008 年加入 Acquia 工程团队，并享受与杰出同事共事的乐趣。Peter 毕业于普林斯顿大学，在密歇根大学获得物理学博士学位，并在生物物理学和分子生物学领域进行了博士后和工业研究。


