  trans: "\n# 按多条件排序多维数组\n\n按多条件排序多维数组的第一步是将待排序的值提取到独立的数组中。使用`array_column()`函数可以轻松实现，该函数接受两个参数：顶层数组和要从每个子数组中提取的键。在`$playlist`数组（位于`multisort_04.php`中）之后添加以下代码：\n\
    \n```\n$tracks = array_column($playlist, 'track');\n$ratings = array_column($playlist,\
    \ 'rating');\nprint_r($tracks);\nprint_r($ratings);\n```\n\n3. 保存文件并在浏览器中测试。如图\
    \ 8-5 所示，多维数组中的值已被提取到两个索引数组中。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig5_HTML.jpg](img/332054_4_En_8_Fig5_HTML.jpg)\n\
    \n**图 8-5.** 排序所需的值已被提取到独立的索引数组中\n\n4. 我们不再需要检查`$tracks`和`$ratings`数组的内容，因此注释掉或删除两处`print_r()`调用。\n\
    \n5. 现在，我们可以使用`array_multisort()`对多维数组进行排序。传递给该函数的参数顺序决定了最终排序的优先级。我希望播放列表先按评分降序排列，然后按曲目名称字母顺序排列。因此，第一个参数需要是`$ratings`数组，后跟排序方向；然后是`$tracks`数组，后跟排序方向；最后是`$playlist`，即多维数组。\n\
    \n在脚本底部添加以下代码：\n\n```\narray_multisort($ratings, SORT_DESC, $tracks, SORT_ASC,\
    \ $playlist);\n```\n\n6. 多维数组现在已从最高评分到最低评分重新排序，评分相同的曲目按字母顺序排列。我们可以通过如下方式遍历`$playlist`数组来验证（代码位于`multisort_05.php`中）：\n\
    \n```\necho '<ul>';\nforeach ($playlist as $item) {\n    echo \"<li>{$item['rating']}\
    \ {$item['track']} by {$item['artist']}</li>\";\n}\necho '</ul>';\n```\n\n图 8-6\
    \ 证明了它已生效。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig6_HTML.jpg](img/332054_4_En_8_Fig6_HTML.jpg)\n\
    \n**图 8-6.** 多维数组已按多条件排序\n\n> **注意：** 在上述 PHP 解决方案中，`array_column()`与关联子数组一起使用，因此第二个参数是一个包含要提取值的键的字符串。该函数也能够从索引子数组中提取值。只需将要提取值的索引作为第二个参数传递即可。你将在下一章的\
    \ PHP 解决方案 9-6“调整类以处理多文件上传”中看到一个实际示例。\n\n# PHP 解决方案 8-7：查找数组的所有排列\n\n此 PHP 解决方案改编自\
    \ Python。它在递归生成器（参见第 4 章的“生成器——一种特殊的持续产出函数”）内部使用`array_slice()`和`array_merge()`函数，将数组拆开并以不同顺序重新合并元素。它是递归的，因为生成器重复调用自身，直到处理完所有元素。\n\
    \n1. 生成器的定义如下所示（代码位于`ch08`文件夹的`permutations.php`中）：\n\n```\nfunction permutations(array\
    \ $elements) {\n    $len = count($elements);\n    if ($len <= 1) {\n        yield\
    \ $elements;\n    } else {\n        foreach(permutations(array_slice($elements,\
    \ 1)) as $permutation) {\n            foreach(range(0, $len - 1) as $i) {\n  \
    \              yield array_merge(\n                    array_slice($permutation,\
    \ 0, $i),\n                    [$elements[0]],\n                    array_slice($permutation,\
    \ $i)\n                );\n            }\n        }\n    }\n}\n```\n\n第 7 行开始的`foreach`循环使用`array_slice()`函数递归调用生成器，提取除第一个元素之外的所有元素。在\
    \ PHP 解决方案 8-4“以逗号连接数组”中使用`array_slice()`时，我们传递了三个参数：数组、起始元素的索引以及要提取的元素数量。在这里，仅使用了前两个参数。当省略`array_slice()`的最后一个参数时，它会返回从起始点到数组末尾的所有元素。因此，如果字母`ABC`作为数组传递给它，`array_slice($elements,\
    \ 1)`将返回`BC`，这在循环内部被称为`$permutation`。\n\n嵌套的`foreach`循环使用`range()`函数创建一个从 0 到`$elements`数组长度减\
    \ 1 的数字数组。每次循环运行时，生成器都会使用`array_merge()`和`array_slice()`的组合产生一个重新排序的数组。第一次循环运行时，计数器`$i`为`0`，因此`array_slice($permutation,\
    \ 0, 0)`从`BC`中提取不到任何内容。`$elements[0]`为`A`，而`array_slice($permutation, 0)`为`BC`。结果，原始数组`ABC`被产出。\n\
    \n下次循环运行时，`$i`为`1`，因此从`$permutation`中提取`B`，`$elements[0]`仍然是`A`，而`array_slice($permutation,\
    \ 1)`为`C`，产出的结果为`BAC`，以此类推。\n\n2. 要使用`permutations()`生成器，将一个索引数组作为参数传递，并将生成器赋值给一个变量，如下所示：\n\
    \n```\n$perms = permutations(['A', 'B', 'C']);\n```\n\n3. 然后，你可以使用`foreach`循环与生成器一起获取数组的所有排列（代码位于`permutations.php`中）：\n\
    \n```\nforeach ($perms as $perm) {\n    echo implode(' ', $perm) . '<br>';\n}\n\
    ```\n\n这将显示 ABC 的所有排列，如下面的截图所示：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figu_HTML.jpg](img/332054_4_En_8_Figu_HTML.jpg)\n\
    \n# 处理数组数据\n\n在本节中，我们将研究两个用于处理存储在数组中的数据的 PHP 解决方案：从多维关联数组自动构建 HTML 嵌套列表，以及从 JSON\
    \ 源中提取数据。\n\n## PHP 解决方案 8-8：自动构建嵌套列表\n\n此 PHP 解决方案重新探讨了标准 PHP 库（SPL）中的`RecursiveIteratorIterator`，我们在第\
    \ 7 章的“使用 FilesystemIterator 检查文件夹内容”中使用了它来深入文件系统。像`RecursiveIteratorIterator`这样的类的一个有用特性是，你可以通过扩展它们来根据自己的需求进行调整。当你扩展一个类时，**子类**——通常被称为**子类**——会继承其父类的所有公共和受保护的方法和属性。你可以添加新的方法和属性，或通过覆盖来改变父类方法的工作方式。`RecursiveIteratorIterator`暴露了几个公共方法，这些方法可以被覆盖，以便在遍历多维关联数组时在数组键和值之间注入\
    \ HTML 标签。\n\n> **注意：** 类可以将方法和属性声明为公共、受保护或私有。公共意味着可以在类定义外部访问它们。受保护意味着只能在该类或其子类内部访问。私有意味着只能在该类定义内部访问，而不能在子类中访问。\n\
    \n在构建 PHP 脚本之前，让我们检查一下 HTML 中嵌套列表的结构。下图展示了一个简单的嵌套列表：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figv_HTML.jpg](img/332054_4_En_8_Figv_HTML.jpg)\n\
    \nHTML 代码如下所示：\n\n```\n<ul>\n  <li>标签 1\n    <ul>\n      <li>项目 1</li>\n     \
    \ <li>项目 2</li>\n    </ul>\n  </li>\n</ul>\n```\n"
- fmt: '# Markdown 文档排版结果


    The important point to note is that the indented list is nested inside the top-level
    list item. The closing `</li>` tag for Label 1 comes after the closing `</ul>`
    tag of the nested list. Hand-coding HTML nested lists is prone to error because
    it can be difficult to keep track of where list items open and close. We need
    to bear in mind this structure when automating nested lists with PHP.


    1. Create a file called `ListBuilder.php` in the `ch08` folder. If you just want
    to study the completed code, it’s in `ListBuilder_end.php` complete with comments.


    2. Define a class called `ListBuilder` to extend `RecursiveIteratorIterator` and
    create two protected properties for the array to be processed and for the output
    HTML:


    ```

    class ListBuilder extends RecursiveIteratorIterator

    {

    protected $array;

    protected $output = '''';

    }

    ```


    The `$output` property is initialized as an empty string.


    3. Most classes have a constructor method to initialize them and accept any arguments.
    The `ListBuilder` class needs to take an array as its argument and prepare it
    for use. Add the following code to the class definition (all the `ListBuilder`
    code needs to go before the closing curly brace of the code in step 2):


    ```

    public function __construct(array $array) {

    $this->array = new RecursiveArrayIterator($array);

    // Call the RecursiveIteratorIterator parent constructor

    parent::__construct($this->array, parent::SELF_FIRST);

    }

    ```


    The name of the constructor method is the same for all classes, and it begins
    with two underscores. This constructor takes a single argument: the array that
    will be converted into nested unordered lists.


    To use an array with an SPL iterator, it must first be converted to an iterator,
    so the first line inside the constructor creates a new instance of `RecursiveArrayIterator`
    and assigns it to the `ListBuilder`''s `$array` property.


    Because we''re overriding the `RecursiveIteratorIterator` constructor, we need
    to invoke the parent constructor and pass it the `$array` property as the first
    argument. Calling `parent::SELF_FIRST` as the second argument gives access to
    both the keys and values of the array being processed. Without this second argument,
    we wouldn''t have access to the keys.


    > **Tip:** You''ll learn more about classes and extending them in Chapters [9](#332054_4_En_9_Chapter.xhtml)
    and [10](#332054_4_En_10_Chapter.xhtml).


    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig7_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fig7_HTML.jpg)


    **Figure 8-7.** `ListBuilder` extends `RecursiveIteratorIterator` to automate
    building nested lists from a multidimensional associative array


    1. An HTML unordered list begins and ends with opening and closing `<ul>` tags.
    `RecursiveIteratorIterator` has public methods that are called automatically at
    the beginning and end of a loop, so we can override them to add the necessary
    tags to the `$output` property with the combined concatenation operator like this:


    ```

    public function beginIteration() {

    $this->output .= '''';

    }

    public function endIteration() {

    $this->output .= '''';

    }

    ```


    2. Two public methods are also called automatically at the beginning and end of
    each subarray. We can use these to insert the opening `<ul>` tag of a nested list
    and to close the nested list and its parent list item:


    ```

    public function beginChildren() {

    $this->output .= '''';

    }

    public function endChildren() {

    $this->output .= '''';

    }

    ```


    3. To process each array element, we can override the `nextElement()` public method
    that''s called automatically… Yes, you''ve guessed it. This is slightly more complex
    because we need to check whether the current element has a subarray. If it has,
    we need to add an opening `<li>` tag and the subarray''s key. Otherwise, we need
    to add the current value between a pair of `<li>` tags like this:


    ```

    public function nextElement() {

    // Check whether there''s a subarray

    if (parent::callHasChildren()) {

    // Display the subarray''s key

    $this->output .= '''' . self::key();

    } else {

    // Display the current array element

    $this->output .= '''' . self::current() . '''';

    }

    }

    ```


    Most of this code is self-explanatory. The condition calls the parent''s—in other
    words, `RecursiveIteratorIterator`''s—`callHasChildren()` method. This returns
    `true` if the current element has child elements—in other words, a subarray. If
    it has, an opening `<li>` tag is concatenated onto the `$output` property, followed
    by `self::key()`. This calls the `ListBuilder`''s `key()` method, which is inherited
    from `RecursiveIteratorIterator`, to get the value of the current key. There''s
    no closing `</li>` tag because that won''t be added until the subarray has been
    processed.


    The `else` clause is executed if the current element doesn''t have any children.
    It calls the `current()` method to get the value of the current element, which
    is sandwiched between a pair of `<li>` tags.


    4. To display the nested lists, we need to iterate over the array and return the
    `$output` property. We can use the magic `__toString()` method. Define it like
    this:


    ```

    public function __toString() {

    // Generate the list

    $this->run();

    return $this->output;

    }

    ```


    5. To complete the `ListBuilder` class, define the `run()` method like this:


    ```

    protected function run() {

    self::beginIteration();

    while (self::valid()) {

    self::next();

    }

    self::endIteration();

    }

    ```


    This simply calls four methods that are inherited from `RecursiveIteratorIterator`.
    They call `beginIteration`, then run the array through a `while` loop, and end
    the iteration.


    6. To test the `ListBuilder`, open `multidimensional_01.php` in the `ch08` folder.
    It contains a multidimensional associative array called `$wines`. Include the
    `ListBuilder` definition, and then generate the output and display it by adding
    the following code (the completed code is in `multidimensional_02.php`):


    ```

    require ''./ListBuilder.php'';

    echo new ListBuilder($wines);

    ```


    Figure [8-7](#332054_4_En_8_Chapter.xhtml#Fig7) shows the result.


    ## PHP Solution 8-9: Extracting Data from JSON


    In the previous chapter, we used `SimpleXML` to digest an RSS news feed. The disadvantage
    of RSS and other forms of XML to distribute data is that the tags used to wrap
    the data make it verbose. JavaScript Object Notation (JSON) is increasingly being
    used to distribute data online because it''s more succinct. While the succinct
    format makes JSON faster to download and consumes less bandwidth, the disadvantage
    is that it''s less easy to read.


    This PHP solution accesses a JSON feed from San Francisco Open Data ([`https://datasf.org/opendata/`](https://datasf.org/opendata/)),
    converts it to an array, builds a multidimensional associative array of the data,
    and then filters it to extract the desired information. It sounds like a lot of
    hard work, but it involves relatively little code.


    1. The JSON data feed for this PHP solution is in `film_locations.json` in the
    `ch08/data` folder. Alternatively, you can obtain the most up-to-date version
    from [`https://data.sfgov.org/api/views/yitu-d5am/rows.json?accessType=DOWNLOAD`](https://data.sfgov.org/api/views/yitu-d5am/rows.json%3FaccessType%3DDOWNLOAD).
    If you access the online version, save it as a `.json` file on your local hard
    disk to avoid the need to keep accessing the remote feed.'
