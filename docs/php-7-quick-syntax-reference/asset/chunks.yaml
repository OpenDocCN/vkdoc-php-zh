    \ ? $x : 'unknown';\n```\n\n## 确定类型\n\nPHP 有几个用于确定变量类型的有用函数。这些函数可以在表 [20-1](#A317139_2_En_20_Chapter.html#Tab1)\
    \ 中查看。\n\n**表 20-1. 用于确定变量类型的函数**\n\n| 名称                                 | 描述\
