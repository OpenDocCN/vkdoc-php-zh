  trans: '

    # 6.1 理解缓存架构


    在当前的应用中，数据库是主要的瓶颈。这意味着增加更多的 Web 服务器并不会大幅提升云环境能够处理的负载。当你发现一个瓶颈时，最好花些时间思考如何避免这个瓶颈。


    在我们的案例中，数据其实并不经常变化。即使它经常变化，从留言板获取精确到秒的数据也并非那么关键。如果有人需要等待几秒甚至几分钟才能看到最新的留言条目，这也不是世界末日。


    当你拥有经常被访问、但可以容忍稍微（甚至很大程度）过期的内容时，就可以实施*缓存*来加速处理。缓存仅仅意味着拥有一个可以快速访问的临时结果存储。数据库之所以慢，是因为数据库主要关注*数据完整性*。你需要知道你的数据是安全的、存储在磁盘上、不会丢失，并且可以通过任意查询访问。而缓存则是短暂的——它们通常只存储在内存中。它们的目标是不惜一切代价实现快速数据检索。例如，许多缓存如果内存满了，就会直接开始丢弃数据。这没关系，因为如果缓存中不存在某个数据，我们可以去数据库重新获取。


    简而言之，数据库关乎持久性和可靠性，而缓存则关乎尽可能快速地获取我想要的东西。缓存通常以简单的键/值对实现，并且通常带有一个过期时间。也就是说，缓存存储的每条数据都有一个指定的“键”。例如，由于所有留言条目只有一个列表，我们可以为此设置一个单一的缓存“键”。在应用中，这个键将被称为
    `entrylist`。然而，每条单独的留言条目可能都会有自己的缓存键（这样缓存就能知道它是唯一的），该键会包含该条目的数据库 ID。缓存键通常只是普通的字符串，并且在大多数缓存系统中，内容可以是任何东西。缓存不做任何特殊处理，它们只存储你在给定键下请求的任何内容，因此你必须小心，不要为两个不同的东西使用相同的键！


    缓存的使用方式是：程序首先确定要为数据使用哪个键。目标是能够从 URL 参数中轻松推断出缓存键。程序首先检查缓存中是否有该缓存键对应的值。如果缓存包含该值，则使用该值。如果没有，程序则通过“正常”方式获取值（即通常从数据库获取值，并可能进行一些额外的计算或处理），然后将其连同过期时间一起保存到缓存。接着，无论该值是来自缓存还是“正常”方式，都会在应用中使用。一旦过期时间过去（或者缓存中值太多被填满），那么缓存的值就会在下次查询时消失，迫使程序通过“正常”方式获取一个全新的值。


    ![../images/487291_1_En_6_Chapter/487291_1_En_6_Fig1_HTML.jpg](img/487291_1_En_6_Fig1_HTML.jpg)


    **图 6-1** — 带本地缓存的两层架构


    如你所见，这种缓存与正常访问的方法确保了在优先使用缓存机制的同时，非缓存机制同样可用，并且这个非缓存机制会填充缓存。


    如前所述，数据库通常被认为是任何应用中的慢速部分，因为它必须非常小心地正确处理你的数据并永久保存。而另一方面，缓存被认为是短暂的。如果我们突然想清除缓存，这不会影响页面的运行，因为它会直接回到数据库再次获取值。


    如果一个网站负载很高，并且持续请求相同的内容，即使只缓存几秒钟，也能极大提高速度并减少资源使用。我们之前对此集群进行了负载测试，发现列表页每秒能处理大约 250
    个请求。如果我们将该页面的结果缓存 10 秒，那么在这段时间内就能减少 2500 次数据库请求！


    图 6-1 展示了如何修改我们标准的两层架构以添加缓存层。在此架构中，每个 Web 服务器维护自己的结果缓存。这可能导致 Web 服务器之间出现微小不一致，因为它们可能在不同时间刷新了结果。但是，如果过期时间设置得不是太远，这些问题就很小。此外，如果出现问题，请记住在第
    5.6 节我们讨论过负载均衡器的“粘滞性”。这会将特定用户绑定到特定服务器，意味着该用户将始终在同一台服务器上，因此也将始终使用同一台服务器的缓存。此外，这也使缓存更高效，因为每台服务器只需要为一部分用户缓存数据。


    ![../images/487291_1_En_6_Chapter/487291_1_En_6_Fig2_HTML.jpg](img/487291_1_En_6_Fig2_HTML.jpg)


    **图 6-2** — 带全局缓存的两层架构


    缓存什么以及缓存多久，非常依赖于具体的应用。对于许多架构来说，有些部分可以缓存几分钟甚至几天，而其他部分则只能缓存几秒或根本无法缓存。缓存常常会导致意想不到的结果，因此在开发时，最好包含一个能够完全关闭缓存的功能，以便查看你的缓存是否是问题的根源。


    如果在所有服务器之间保持缓存一致性很重要，另一种可考虑的架构是使用全局缓存，如图 6-2 所示。在这种架构中，不是每个 Web 服务器维护自己的缓存，而是存在一个所有服务器都访问的共享缓存。这会增加一点网络延迟，因为所有缓存调用都必须通过网络进行，但它增加了结果的一致性。


    根据实现方式的不同，这种外部缓存也可能成为瓶颈。然而，有许多缓存服务器可以跨多台服务器进行扩展，并在这些服务器之间平衡请求。尽管如此，这也为整个系统增加了一层管理复杂性。


    在几乎所有情况下，我发现设置和维护一个单一的外部缓存服务都很困难，而且几乎没有什么好处。对于大多数情况，将缓存放在每个 Web 服务器上能为你带来最大的可扩展效率，即使这会以牺牲一点一致性为代价，但如前所述，这一点可以通过使用负载均衡器的“粘滞性”来缓解。

    '
- fmt: "## 6.2 Implementing Caching in the Application\n\nThe caching architecture\
    \ we are going to implement here is the one shown in Figure [6-1](#487291_1_En_6_Chapter.xhtml#Fig1),\
    \ both because it is easier to implement and because it is easier to manage in\
    \ the long run. What we are going to do is perform the configuration change on\
    \ the `template_node` machine, and then simply turn off our existing `webnodeX`\
    \ boxes and replace them with new boxes replicated from `template_node`. This\
    \ is a lot easier (and less error-prone) than going through every server and making\
    \ the change.\n\nThe first thing we need to do is to install the caching service.\
    \ We will use `memcached` for our caching service because it is straightforward\
    \ to run, access, and manage. To install `memcached` and turn it on, just enter\
    \ the following commands as root:\n\n```\nyum install -y memcached\nsystemctl\
    \ enable memcached\nsystemctl start memcached\n```\n\nYou will also need the PHP\
    \ extensions for `memcached`. These have to be compiled, so we will need to install\
    \ a few more extensions (again, as root).\n\n![../images/487291_1_En_6_Chapter/487291_1_En_6_Fig3_HTML.png](images/487291_1_En_6_Chapter/487291_1_En_6_Fig3_HTML.png)\n\
    \nFigure 6-3\n\nMemcache Connection Function\n\n```\nyum install -y libmemcached\n\
    yum install -y php74-php-pecl-memcached\n```\n\nDon’t forget the “d” at the end\
    \ of `memcached`, because there is another extension named just `memcache` which\
    \ does not do what we want. Note that this also enables the extension in PHP.\
    \ It does this for us, but if you needed to tweak the PHP side of the configuration,\
    \ the file is located in the directory `/etc/opt/remi/php74/php.d`.\n\nNow we\
    \ need to restart our PHP-FPM process to use the new PHP extensions:\n\n```\n\
    systemctl restart php74-php-fpm\n```\n\nNext, we need to modify our application\
    \ to create a connection to our local `memcached` service. Therefore, add the\
    \ code from Figure [6-3](#487291_1_En_6_Chapter.xhtml#Fig3) into `common.php`.\
    \ The number `11211` referred to in the code is the port that `memcached` is listening\
    \ on by default.\n\nThe way that your code should use the cache is as follows:\n\
    \n1.  Create a cache key to uniquely identify the information in the cache.\n\
    2.  Check to see if the information already exists in the cache. If so, use it.\n\
    3.  If the information doesn’t already exist in the cache, find the information\
    \ the slow way (i.e., perform the database query).\n\n    ![../images/487291_1_En_6_Chapter/487291_1_En_6_Fig4_HTML.png](images/487291_1_En_6_Chapter/487291_1_En_6_Fig4_HTML.png)\n\
    \n    Figure 6-4\n\n    Rewriting `list.php` to Use the Cache\n\n4.  Take the\
    \ information and store it in the cache using that key with a future expiration\
    \ time (in this case, we will set the expiration to be 10 seconds from when it\
    \ was set).\n\nNext, we will update the `list.php` function to use the cache.\
    \ Figure [6-4](#487291_1_En_6_Chapter.xhtml#Fig4) shows how to rewrite `list.php`\
    \ to use the cache. This is just the top portion of the script which stores the\
    \ result of the query in `$result`. The actual HTML output code remains the same.\n\
    \n## 6.3 Reimaging the Cluster\n\nNow we need to deploy this to our cluster. To\
    \ do this, we will need to first make another snapshot backup of `template_node`\
    \ and then perform the following steps for every `webnodeX` server in our cluster:\n\
    \n1.  Go to the node balancer and remove the `webnodeX` server from the configuration.\n\
    2.  Power off and delete the `webnodeX` server (deleting can be done from the\
    \ “Settings” tab of the node’s screen).\n3.  Create a new `webnodeX` server in\
    \ its place (with the same name) based on our `template_node` backup (be sure\
    \ to add a private IP). Power it on if necessary.\n4.  Add the new `webnodeX`\
    \ server to the node balancer configuration.\n\nFor a production system, this\
    \ is not always the best way to do a code or a system update. We will cover additional\
    \ ways of doing this in Chapter [12](#487291_1_En_12_Chapter.xhtml). This method\
    \ simply removes all of your `webnodeX` servers and replaces them with new ones.\
    \ It is a pretty clean mechanism, though you would want to perform it slowly to\
    \ be sure your site stays up while you are reimaging the servers.\n\n## 6.4 Testing\
    \ Our Caching Architecture\n\nOnce you have your new cloud cluster up and running,\
    \ it is time to test out the new architecture and see if we made any performance\
    \ gains.\n\nFor this setup, I ran ApacheBench on individual servers and on the\
    \ balanced cluster. The individual servers, since they no longer relied on the\
    \ database for a bottleneck, were able to serve up over 800 requests per second!\n\
    \nAlso, because there was no bottleneck on the database, the performance was able\
    \ to scale almost linearly. Linear scaling means that each box you add gives you\
    \ the same performance boost. In this case, with a single server, our performance\
    \ was 800 requests per second, two servers yielded around 1,500 requests per second,\
    \ and at three servers, we were able to consistently serve up over 2,300 requests\
    \ per second!\n\nNote that if you are not seeing similar performance gains, check\
    \ your balancer configuration to be sure that you didn’t turn on session stickiness\
    \ at any point, as this will restrict your ApacheBench sessions to a single server.\
    \ Also, on the “Settings” tab, be sure that the “Client Connection Throttle” isn’t\
    \ turned on, either.\n\nFigure [6-5](#487291_1_En_6_Chapter.xhtml#Fig5) shows\
    \ the output of ApacheBench on the full cluster.\n\nSo, what we have learned is\
    \ that not only did caching improve the speed of the application, it improved\
    \ the *scalability* of the application. Because we only have to hit the database\
    \ when the cache expires, the speed of the database is now relatively unimportant.\
    \ In fact, even if we sped up the database again (like we did at the end of Chapter\
    \ [5](#487291_1_En_5_Chapter.xhtml)), it would have relatively little impact on\
    \ our total efficiency, simply because it is rarely used.\n\nOn the downside,\
    \ if you actually use the app, you will find that after you post a guestbook entry,\
    \ it won’t immediately display on the site. In fact, if you reload the page quickly,\
    \ you might find it appearing and disappearing, depending on when the server you\
    \ are on refreshes its cache.\n\nThis can be mitigated in a variety of ways. First,\
    \ you can lower the amount of time that the data is being cached for. It makes\
    \ very little difference in this benchmark whether you cache for 1 second or for\
    \ 10. So, just changing the cache expiration line to the following (i.e., setting\
    \ the expiration time to `1` second instead of `10`) will make the app very quickly\
    \ refresh without significantly impacting the performance on these massive loads\
    \ we are testing against:\n\n```\n$expiration_seconds = 1;\n```\n\n![../images/487291_1_En_6_Chapter/487291_1_En_6_Fig5_HTML.png](images/487291_1_En_6_Chapter/487291_1_En_6_Fig5_HTML.png)\n\
    \nFigure 6-5\n\nApacheBench Output for Cached Configuration\n\nEven more, if you\
    \ keep sessions tied to a particular server, you can actually tell the server\
    \ to clear individual keys or even the whole cache on certain events. Therefore,\
    \ at the end of `create.php`, we could add the following lines to clear out the\
    \ list cache on that server:\n\n```\n$cache = getCache();\n$cache->delete(\"entrylist\"\
    );\n```\n\nOr, if an app was complex enough that there were a whole lot of keys\
    \ that had to be deleted, the code could just clear out the whole cache altogether\
    \ with `$cache->flush();`.\n\nIn any case, as you can see, caching architectures\
    \ can make your app slightly more complex and difficult to manage, but they are\
    \ usually worth it from the often dramatic performance and scalability boost."
