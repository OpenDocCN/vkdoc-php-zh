- fmt: "# 9. Now everything is in its place, and you can see the results. Log in to\
    \ your site, add some products to your shopping cart, and then click the Checkout\
    \ button on your shopping cart page. Your page will look something like Figure\
    \ 11-9 shown earlier.\n\n## How It Works: The `checkout_info` Componentized Template\n\
    \nIn the `init()` method of the `CheckoutInfo` class, you start by checking whether\
    \ the customer clicked the Place Order button. If so, you save the order into\
    \ the database and redirect the customer to the home page:\n\n```\n// If the Place\
    \ Order button was clicked, save the order to database\nif ($this->_mPlaceOrder\
    \ == 1)\n{\n  $order_id = ShoppingCart::CreateOrder();\n\n  // Redirect to index.php\n\
    \  $redirect_link = 'http://' . getenv('SERVER_NAME');\n\n  // If HTTP_SERVER_PORT\
    \ is defined and different than default\n  if (defined('HTTP_SERVER_PORT') &&\
    \ HTTP_SERVER_PORT != '80')\n  {\n    // Append server port\n    $redirect_link\
    \ .= ':' . HTTP_SERVER_PORT;\n  }\n\n  $redirect_link .= VIRTUAL_LOCATION . 'index.php';\n\
    \n  header('Location:' . $redirect_link);\n  exit;\n}\n```\n\nYou then need to\
    \ set up some variables for the template to use:\n\n```\n// Set members for use\
    \ in the Smarty template\n$this->mCartItems = ShoppingCart::GetCartProducts(GET_CART_PRODUCTS);\n\
    $this->mTotalAmountLabel = ShoppingCart::GetTotalAmount();\n$this->mContinueShopping\
    \ = $_SESSION['page_link'];\n$this->mCustomerData = Customer::Get();\n```\n\n\
    If the customer didn't enter credit card information or a shipping address yet,\
    \ a notice is displayed, and the Place Order button is disabled. If credit card\
    \ information exists for the customer, you decrypt it and prepare to display the\
    \ credit card type and the last four digits of its number:\n\n```\n// We allow\
    \ placing orders only if we have complete customer details\nif (empty ($this->mCustomerData['credit_card']))\n\
    {\n  $this->mOrderButtonVisible = 'disabled=\"disabled\"';\n  $this->mNoCreditCard\
    \ = 'yes';\n}\nelse\n{\n  $this->mPlainCreditCard = Customer::DecryptCreditCard(\n\
    \    $this->mCustomerData['credit_card']);\n  $this->mCreditCardNote = 'Credit\
    \ card to use: ' .\n    $this->mPlainCreditCard['card_type'] .\n    '<br />Card\
    \ number: ' .\n    $this->mPlainCreditCard['card_number_x'];\n}\n\nif (empty ($this->mCustomerData['address_1']))\n\
    {\n  $this->mOrderButtonVisible = 'disabled=\"disabled\"';\n  $this->mNoShippingAddress\
    \ = 'yes';\n}\n```\n\nThe rest of the code is straightforward.\n\n## Enforcing\
    \ SSL Connections\n\nWhen building the catalog admin pages, you also learned that\
    \ it's good to use SSL for securing the data that passes between your server and\
    \ the client's browser. Back then, SSL was semi-optional because the administrative\
    \ pages could have been restricted for local access only.\n\nHowever, now that\
    \ you have customers sending you extremely sensitive data, using SSL isn't optional\
    \ anymore! Depending on the settings you've implemented in Chapter 7, the customer\
    \ details pages should be protected already. Remember that you have the `config.php`\
    \ file that you can use to set the behavior of your site regarding SSL.\n\nYou\
    \ still need to *force* the sensitive pages to be accessed through SSL. Say, if\
    \ someone tried to access `http://localhost/hatshop/index.php?UpdateCreditCardDetails`,\
    \ the visitor should be redirected automatically to `https://localhost/hatshop/index.php?UpdateCreditCardDetails`.\n\
    \nObviously, you don't need SSL connections for all areas of the site, and you\
    \ shouldn't enforce it in all places because that reduces performance. However,\
    \ you *do* want to make sure that the checkout, customer login, customer registration,\
    \ and customer detail modification pages are accessible only via SSL.\n\nAssuming\
    \ that your site is working correctly with SSL, you should make some updates to\
    \ ensure that the pages can't be accessed via HTTP. Add the following code at\
    \ the beginning of `index.php`:\n\n```\n// Load Smarty library and config files\n\
    require_once 'include/app_top.php';\n\n// Is the page being accessed through an\
    \ HTTPS connection?\nif (getenv('HTTPS') != 'on')\n  $is_https = false;\nelse\n\
    \  $is_https = true;\n\n// Visiting a sensitive page?\nif (isset($_GET['RegisterCustomer'])\
    \ ||\n    isset($_GET['UpdateAccountDetails']) ||\n    isset($_GET['UpdateAddressDetails'])\
    \ ||\n    isset($_GET['UpdateCreditCardDetails']) ||\n    isset($_GET['Checkout'])\
    \ ||\n    isset($_POST['Login']))\n  $is_sensitive_page = true;\nelse\n  $is_sensitive_page\
    \ = false;\n\n// Use HTTPS when accessing sensitive pages\nif ($is_sensitive_page\
    \ && $is_https == false && USE_SSL != 'no')\n{\n  header ('Location: https://'\
    \ . getenv('SERVER_NAME') .\n    getenv('REQUEST_URI'));\n  exit;\n}\n\n// Don't\
    \ use HTTPS for nonsensitive pages\nif (!$is_sensitive_page && $is_https == true)\n\
    {\n  $link = 'http://' . getenv('SERVER_NAME');\n\n  // If HTTP_SERVER_PORT is\
    \ defined and different than default\n  if (defined('HTTP_SERVER_PORT') && HTTP_SERVER_PORT\
    \ != '80')\n  {\n    // Append server port\n    $link .= ':' . HTTP_SERVER_PORT;\n\
    \  }\n\n  $link .= getenv('REQUEST_URI');\n\n  header ('Location: ' . $link);\n\
    \  exit;\n}\n\n/* If not visiting a product page, save the link to the current\
    \ page\n   in the page_link session variable; it will be used to create the\n\
    \   Continue Shopping link in the product details page and the links\n   to product\
    \ details pages */\nif (!isset ($_GET['ProductID']) && !isset ($_GET['CartAction']))\n\
    ```\n\nRight now, trying to load `http://localhost/hatshop/index.php?UpdateCreditCardDetails`\
    \ would redirect you to `https://localhost/hatshop/index.php?UpdateCreditCardDetails`,\
    \ provided that you're logged in.\n\n## Summary\n\nIn this chapter, you've implemented\
    \ a customer account system that customers can use to store their details for\
    \ use during order processing. You've looked at many aspects of the customer account\
    \ system, including encrypting sensitive data and securing web connections for\
    \ obtaining it.\n\nYou started by looking at a new table in your database, `customer`,\
    \ with fields for storing customer information.\n\nNext, you created the security\
    \ classes in your business tier, which handle hashing and encrypting strings,\
    \ and a secure credit card representation that makes it easy to exchange credit\
    \ card details between the encrypted and decrypted format.\n\nAfter this, you\
    \ used these classes to create the login, registration, and customer detail editing\
    \ web pages. This required a bit more code, but the result turned out to be simple\
    \ to understand.\n\nIn the next chapter, we'll be looking at how to create the\
    \ framework for the order-processing pipeline, enabling you to automate even more\
    \ of the supply process.\n\n---\n\n# Chapter 12: Storing Customer Orders\n\nThe\
    \ HatShop e-commerce application is shaping up nicely. You've added customer account\
    \ management capabilities, and you're keeping track of customer addresses and\
    \ credit card information, which is stored in a secure way. However, you're not\
    \ currently using this information—you're delegating responsibility to PayPal.\n\
    \nIn this chapter, you'll make the modifications required for customers to place\
    \ orders that are associated with their user profiles. The main modification here\
    \ is that the customer associated with an order will be identified by a new piece\
    \ of information in the `orders` table, and much of the rest of the modifications\
    \ will be made to use this information."
