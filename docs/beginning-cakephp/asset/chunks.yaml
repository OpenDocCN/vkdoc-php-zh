  trans: '

    # 附录 A：安装问题


    ## 第三步：运行 MAMP 应用程序


    您随时可以通过运行 `/Applications/MAMP/MAMP` 应用程序来管理您的本地主机设置。主屏幕如图 A-1 所示。


    **图 A-1.** *MAMP 主应用程序屏幕*


    点击**启动服务器**后，该程序将维持本地主机环境。您现在可以开始执行 PHP 代码，但需要知道在硬盘上何处访问本地主机。


    ## 第四步：配置本地主机根文件夹


    默认情况下，`/Applications/MAMP/htdocs` 文件夹中的任何文件都可在本地主机环境中访问。总体来说这也不算太差，但我个人更倾向于将网站放在
    `Applications` 文件夹之外。更改此设置只需进入 MAMP 应用程序的偏好设置区域即可。


    点击**偏好设置**打开偏好设置区域。点击 **Apache** 选项卡，您会找到一个名为**文档根目录**的字段。其内容应为 `/applications/mamp/htdocs`
    或类似路径。点击**选择**将文档根目录更改为其他位置。在此示例中，我将选择 `~/Sites/` 文件夹（如果我的 Mac OS X 用户名是 `dave`，则路径将显示为
    `/Users/dave/Sites`）。从现在开始，放置在 `Sites` 文件夹中的任何文件夹或文件都将由 MAMP 本地主机设置执行，而非 Mac OS
    X 的默认 Web 共享。


    ## 第五步：更改本地主机端口


    现在仍留在偏好设置区域，点击**端口**选项卡。其中列出了 **Apache 端口**和 **MySQL 端口**。默认情况下，这些字段的值分别设置为 `8888`
    和 `8889`。为了更好地模拟典型的远程 Web 服务器，应更改这些端口。在 Apache 端口字段中输入 `80`，在 MySQL 端口字段中输入 `3306`。（您也可以点击**设置为默认
    Apache 和 MySQL 端口**按钮。）


    由于端口按此方式配置，您现在可以在想要执行脚本和文件时，打开 Safari 并输入 `http://localhost` 来替代 `http://localhost:8888`。此外，在配置需与
    MySQL 协同工作的程序时，您只需在服务器设置中输入 `localhost` 即可，无需输入 `localhost:8888`。


    ## 第六步：让本地主机更易管理


    在 Mac 上搭建本地主机环境，没有比这更简单的方法了。但 MAMP 应用程序的一个缺陷是：必须保持运行，本地主机环境才能工作。因此，如果退出 MAMP，您将无法再通过本地主机运行
    PHP 代码。幸运的是，Living-e 提供了一个 Dashboard 小工具，它能执行与 MAMP 应用程序完全相同的操作来保持本地主机活跃。只需启动
    `Mamp Control.wdgt` 文件，然后点击**启动服务器**即可激活本地主机。此后它将在后台通过 Dashboard 运行。


    ---


    # 在 Windows 上设置


    Windows XP Pro 内置了微软的 Web 服务器，称为 Internet 信息服务 (IIS)。安装 IIS 非常简单。然而，大多数 PHP 和
    MySQL 场景更容易通过 Apache Friends 提供的集成式本地主机安装程序 XAMPP 来处理。以下各节概述了在 PC 上安装和配置 XAMPP
    的步骤。


    ## 第一步：下载软件


    您可以从 Apache Friends 网站下载 XAMPP。截至本书出版时，直接链接如下：


    [`www.apachefriends.org/en/xampp-windows.html`](http://www.apachefriends.org/en/xampp-windows.html)


    您可以下载安装程序应用程序、ZIP 文件或自解压的 7-ZIP 存档。最简单的选项是直接运行安装程序应用程序。因此，向下滚动到页面的下载区域，点击**安装程序**。下载将立即开始。


    ## 第二步：运行安装程序


    该程序将引导您完成 XAMPP 的安装。它会询问 XAMPP 的目标文件夹，默认位置为 `c:\xampp`。我建议坚持使用此配置，因为您很可能希望 XAMPP
    能够访问 C 驱动器的任何区域。点击**下一步**，在下一个屏幕上，将服务部分复选框留空。最后，点击末尾的**安装**按钮。它将解压所有必要文件，并在 `c:\xampp`
    文件夹中为您提供一个方便的本地主机环境。


    ![图 51](img/index-307_1.jpg)


    ## 第三步：打开 XAMPP 控制面板


    安装完成后，您将进入 XAMPP 控制面板。将来可以通过点击桌面上的快捷方式图标或进入**开始 / Apache Friends / XAMPP / XAMPP
    控制面板**来访问此面板。屏幕如图 A-2 所示。


    **图 A-2.** *XAMPP 控制面板屏幕*


    点击**启动**按钮可启动重要的 Web 服务器服务，如 Apache、MySQL 等。使用**启动**按钮启动 Apache 和 MySQL，然后打开您的
    Web 浏览器。在 URL 字段中输入 `http://localhost`。您将进入 XAMPP 欢迎屏幕。


    ## 第四步：保护本地主机


    遗憾的是，XAMPP 并未预先安装更安全的本地主机环境。在某些方面这可能是件好事，但目前最不想要的就是危及网络或计算机的安全。如果您认为其他用户访问您的本地主机几乎无需担心（这实际上仅在工作环境中，当其他同事使用同一子网或网络时才可能发生），那么您可以跳过此步骤。如果其他用户有任何可能访问您的本地主机，那么您可能只需花点时间让
    XAMPP 更安全。在 XAMPP 启动网页的左侧有一个**安全**链接。点击它，会弹出安全信息页面。大多数项目（如果不是全部）将被标记为“不安全”。让我们让它们全部亮起绿灯。


    主表下方有一个名为 `http://localhost/security/xamppsecurity.php` 的链接，点击后会进入一些字段，这些字段允许您保护本地主机。更改
    MySQL root 密码，然后点击**更改密码**。在 MySQL root 密码字段下方还有另一组字段，用于保护 XAMPP 目录（`.htaccess`）。在那里输入用户名和密码。对于这两项，请确保不要将密码保存在纯文本文件中。


    从现在开始，您需要登录才能访问 XAMPP 控制页面。重启 Apache 和 MySQL 以传播您已创建的设置。


    ---


    # 运行 MySQL


    用于设置和运行 MySQL 的最强大的基于 Web 的工具是 PHPMyAdmin，它是另一个随 MAMP 和 XAMPP 安装的开源应用程序。两个本地主机环境的启动屏幕都包含指向
    PHPMyAdmin 的链接。这是在 MySQL 中开始工作的最快方式，因为我们已经安装了一个本地主机环境，该程序已预先配置好并随时可用。许多开发者更喜欢
    PHPMyAdmin 而非其他基于桌面的 MySQL 应用程序，因为它基于 Web 且免费，而且说实话，它是一款出色的应用程序。我本人更喜欢基于桌面的应用程序，因为它们速度快，而且可以避免屏幕刷新，而
    PHPMyAdmin 因为是 Web 应用程序，所以无法避免屏幕刷新。


    ## 在哪里可以找到其他 MySQL 工具


    如果您希望使用桌面应用程序来管理数据库，可以在以下各节中找到一些列出的工具。它们可能需要额外的配置才能与您的本地主机环境配合使用。我将列出它们，然后解释一些使其正常工作的必要设置。


    ### CocoaMySQL

    '
- fmt: '# On the Mac, probably the simplest freeware application for running MySQL
    is `CocoaMySQL`.


    It’s available by going to [http://cocoamysql.sourceforge.net](http://cocoamysql.sourceforge.net).


    ## MySQL Query Browser


    On both Mac and PC, `MySQL Query Browser` is a reliable and easy freeware application
    that lets you navigate MySQL through a graphical interface (see [http://dev.mysql.com/downloads/gui-tools](http://dev.mysql.com/downloads/gui-tools)).


    ## HeidiSQL


    This is much like `CocoaMySQL` on the Mac, except built for Windows. The layout
    is, in some ways, much easier to navigate than `MySQL Query Browser` and will
    require less MySQL prowess to get started. It, too, is open source, so giving
    it a try can’t hurt (visit [www.heidisql.com](http://www.heidisql.com)).


    # Typical Settings When Running MySQL


    No matter what application you decide to use, each one will need some parameters
    before it can connect to MySQL. The following sections highlight the common ones
    that get you connected.


    ## Host


    This will almost always be just `localhost`, even when you’re setting up a script
    to run on your remote server. If you are trying to access a remote database, it
    might be the domain name of the site, but you’ll need to have the details provided
    from the web-hosting provider. With the configurations outlined earlier, simply
    enter `localhost`. Should this not work, just identify the IP address of your
    computer, which is usually defaulted to `127.0.0.1`.


    ## User and Password


    MySQL supports multiple users and groups for administering and maintaining databases.
    These can be added or changed once you’ve logged into your application and accessed
    the necessary areas to add or change an account. In this example, this will be
    both `root` for the username and password, unless you entered something different
    instead. Sometimes web hosts will set up shared hosting accounts for you; in these
    cases, you may need to add a prefix to the username, like `cake_`.


    ## Socket


    When MySQL is running, the connecting point for the application and PHP is called
    the *socket*. The default path for this is `/var/mysql/mysql.sock`, but with these
    quick and easy localhost setup configurations, this will be a dead end. If you
    know that the MySQL socket is stored in its default location (like on most hosting
    setups), then you can leave this setting blank. On the localhost, you’ll have
    to specify the path. On the PC, the defaults connect correctly if you followed
    the tutorial. On a Mac, Table A-1 contains the path strings, if necessary.


    **Table A-1.** *Path Strings for Connecting Your Application to the MySQL Socket*


    | **Web Server Software** | **Path** |

    |------------------------|----------|

    | Mac OS X Server | `/` |

    | MAMP | `/applications/mamp/tmp/mysql/mysql.sock` |

    | XAMPP | `/applications/xampp/xamppfiles/var/mysql/mysql.sock` |


    ## Port


    The default port for MySQL is `3306`. Enter this only if the application asks
    you or if you somehow altered the port number to something else.


    # How CakePHP Compares with Other Frameworks


    To give you a sense of what to expect from Cake, this appendix compares it to
    some other popular web frameworks.


    ## PHP Frameworks


    Currently, the most popular PHP frameworks include the following:


    - CakePHP ([www.cakephp.org](http://www.cakephp.org))

    - CodeIgniter ([www.codeigniter.com](http://www.codeigniter.com))

    - Symfony ([www.symfony-project.org](http://www.symfony-project.org))

    - Zend Framework ([http://framework.zend.com](http://framework.zend.com))


    Each of these frameworks is built in the PHP language, but they differ in their
    methods and libraries. Other frameworks could be listed here as well (PHP has
    a large and growing number of frameworks compared to other languages), but I’ll
    stick with these four. No doubt others will emerge, but I expect these to continue
    to be the most dominant players in the PHP frameworks market. For a comparison
    of some of these frameworks’ basic information, see Table B-1.


    **Table B-1.** *Basic Information*


    | **Framework** | **Official Support Group** | **Latest Version1** |

    |---------------|---------------------------|---------------------|

    | CakePHP | Cake Software Foundation | 1.2 rc1 |

    | CodeIgniter | EllisLab | 1.6.2 |

    | Symfony | Sensio Labs | 1.1 rc2 |

    | Zend Framework | Zend Technologies | 1.5.2 |


    1\. As of the writing of this book.


    ## Using the Various Frameworks


    Each of these frameworks has been released as open source projects, which means
    that a lot of the development work relies on community support. Tracking bugs,
    writing supporting documentation, and providing general support are tasks that
    involve developers like you. Many times, regardless of the framework you choose,
    you’ll go to the online community for help. The size of the community and the
    available online resources may have an impact on how well you experience the framework.


    In the following sections, I discuss some of the current features of each framework’s
    online community and how they assist their users in developing software. I’ll
    also describe some basic observations when using the various frameworks and compare
    each one to Cake. I recognize that much more could be said about each framework,
    but my aim is to give you an overview of the user experience relative to Cake,
    not to write an exhaustive comparison of all the frameworks. You’ll get a general
    sense of what it’s like to move from one of these frameworks to Cake and where
    to begin when considering making Cake your primary development framework.


    ## CakePHP


    Throughout the book, I’ve mentioned some main web sites where you can participate
    in the Cake community. Table B-2 lists these and other web sites to check out
    for more information on CakePHP.


    **Table B-2.** *CakePHP Community Web Sites*


    | **URL** | **Details** |

    |---------|-------------|

    | [www.cakephp.org](http://www.cakephp.org) | Home page of CakePHP |

    | [http://bakery.cakephp.org](http://bakery.cakephp.org) | The Bakery; contains
    articles, code, and other announcements about CakePHP |

    | [http://groups.google.com/group/cake-php](http://groups.google.com/group/cake-php)
    | Discussion group; contains thousands of discussions about the framework and
    is a great resource for getting questions answered |

    | [www.cakeforge.org](http://www.cakeforge.org) | Repository for open source CakePHP
    projects; great resource for downloading third-party Cake applications and plugins
    |

    | [http://trac.cakephp.org](http://trac.cakephp.org) | Cake’s support web site
    and tracking system; here, you can view and submit tickets related to releases
    of Cake |

    | [http://live.cakephp.org](http://live.cakephp.org) | The Show; a live Internet
    radio podcast for all things CakePHP |

    | [irc://irc.freenode.net/cakephp](irc://irc.freenode.net/cakephp) | Main IRC
    chat room for discussing CakePHP |


    The amount of activity on the web sites and chat room listed in Table B-2 is high;
    to date, Cake has been downloaded more than 680,000 times and remains one of the
    most often searched web frameworks. The discussion group has almost 9,000 active
    members and has an archive of more than 54,000 moderated threads. At any given
    moment, the IRC chat room usually has between 100–200 visitors.'
