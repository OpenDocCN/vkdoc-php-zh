    \ and\nneither one of them can be instantiated. The key differences are, first,\n\
    that the abstract class can contain non-abstract members, while the\ninterface\
    \ cannot. Second, a class can implement any number of interfaces\nbut only inherit\
    \ from one class, abstract or not.\n\n```\n// Defines default functionality and\
    \ definitions\nabstract class Shape\n{\npublic $x = 100, $y = 100;\nabstract public\
    \ function getArea();\n}\n// Class is a Shape\nclass Rectangle extends Shape {\
    \ /*...*/ }\n// Defines a specific functionality\ninterface iComparable\n{\nfunction\
    \ compare();\n}\n// Class can be compared\nclass MyClass implements iComparable\
    \ { /*...*/ }\n```\n\nAbstract Guideline\n\nAn abstract class provides a partially\
    \ implemented base class that\ndictates how child classes must behave. They are\
    \ most useful when child\nclasses share some similarities, but differ in other\
    \ implementations\nthat child classes are required to define. Just like interfaces,\n\
    abstract classes are useful constructs in object-oriented programming\nthat help\
    \ developers follow good coding standards.\n\n16. Traits"
