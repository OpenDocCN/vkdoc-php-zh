- fmt: "Illustrative code always involves a difficult balancing act. It needs to be\
    \ clear enough to make its point, which often means sacrificing error checking\
    \ and fitness for its ostensible purpose. In other words, the example here is\
    \ really intended to illustrate issues of design and duplication rather than the\
    \ best way to parse and write file data. For this reason, I omit implementation\
    \ where it is not relevant to the issue at hand.\n\nAs you can see, I have had\
    \ to use the test for the XML extension in each of the functions. It is this repetition\
    \ that might cause us problems down the line. If I were to be asked to include\
    \ yet another parameter format, I would need to remember to keep the `readParams()`\
    \ and `writeParams()` functions in line with one another.\n\nNow I’ll address\
    \ the same problem with some simple classes. First, I create an abstract base\
    \ class that will define the interface for the type:\n\n```\n// listing 06.04\n\
    abstract class ParamHandler\n{\nprotected $source;\nprotected $params = [];\n\
    public function __construct(string $source)\n{\n$this->source = $source;\n}\n\
    public function addParam(string $key, string $val)\n{\n$this->params[$key] = $val;\n\
    }\npublic function getAllParams(): array\n{\nreturn $this->params;\n}\npublic\
    \ static function getInstance(string $filename): ParamHandler\n{\nif (preg_match(\"\
    /\\.xml$/i\", $filename)) {\nreturn new XmlParamHandler($filename);\n}\nreturn\
    \ new TextParamHandler($filename);\n}\nabstract public function write(): bool;\n\
    abstract public function read(): bool;\n}\n```\n\nI define the `addParam()` method\
    \ to allow the user to add parameters to the protected `$params` property and\
    \ `getAllParams()` to provide access to a copy of the array.\n\nI also create\
    \ a static `getInstance()` method that tests the file extension and returns a\
    \ particular subclass according to the results. Crucially, I define two abstract\
    \ methods, `read()` and `write()`, ensuring that any subclasses will support this\
    \ interface.\n\n> **Note**\n> \n> Placing a static method for generating child\
    \ objects in the parent class is convenient. Such a design decision has its own\
    \ consequences, however. The `ParamHandler` type is now essentially limited to\
    \ working with the concrete classes in this central conditional statement. What\
    \ happens if you need to handle another format? Of course, if you are the maintainer\
    \ of `ParamHandler`, you can always amend the `getInstance()` method. If you are\
    \ a client coder, however, changing this library class may not be so easy (in\
    \ fact, changing it won’t be hard, but you face the prospect of having to reapply\
    \ your patch every time you reinstall the package that provides it). I will discuss\
    \ issues of object creation in Chapter [9](#A314621_5_En_9_Chapter.html).\n\n\
    Now, I’ll define the subclasses, once again omitting the details of implementation\
    \ to keep the example clean:\n\n```\n// listing 06.05\nclass XmlParamHandler extends\
    \ ParamHandler\n{\npublic function write(): bool\n{\n// write XML\n// using $this->params\n\
    }\npublic function read(): bool\n{\n// read XML\n// and populate $this->params\n\
    }\n}\n// listing 06.06\nclass TextParamHandler extends ParamHandler\n{\npublic\
    \ function write(): bool\n{\n// write text\n// using $this->params\n}\npublic\
    \ function read(): bool\n{\n// read text\n// and populate $this->params\n}\n}\n\
    ```\n\nThese classes simply provide implementations of the `write()` and `read()`\
    \ methods. Each class will write and read according to the appropriate format.\n\
    \nClient code will write to both text and XML formats entirely transparently,\
    \ according to the file extension:\n\n```\n// listing 06.07\n$test = ParamHandler::getInstance(__DIR__\
    \ . \"/params.xml\");\n$test->addParam(\"key1\", \"val1\");\n$test->addParam(\"\
    key2\", \"val2\");\n$test->addParam(\"key3\", \"val3\");\n$test->write(); // writing\
    \ in XML format\n```\n\nWe can also read from either file format:\n\n```\n// listing\
    \ 06.08\n$test = ParamHandler::getInstance(__DIR__ . \"/params.txt\");\n$test->read();\
    \ // reading in text format\n$params = $test->getAllParams();\nprint_r($params);\n\
    ```\n\nSo, what can we learn from these two approaches?\n\n### Responsibility\n\
    \nThe controlling code in the procedural example takes responsibility for deciding\
    \ about format—not once, but twice. The conditional code is tidied away into functions,\
    \ certainly, but this merely disguises the fact of a single flow, making decisions\
    \ as it goes. Calls to `readParams()` and to `writeParams()` take place in different\
    \ contexts, so we are forced to repeat the file extension test in each function\
    \ (or to perform variations on this test).\n\nIn the object-oriented version,\
    \ this choice about file format is made in the static `getInstance()` method,\
    \ which tests the file extension only once, serving up the correct subclass. The\
    \ client code takes no responsibility for implementation. It uses the provided\
    \ object with no knowledge of, or interest in, the particular subclass it belongs\
    \ to. It knows only that it is working with a `ParamHandler` object, and that\
    \ it will support `write()` and `read()`. While the procedural code busies itself\
    \ about details, the object-oriented code works only with an interface, unconcerned\
    \ about the details of implementation. Because responsibility for implementation\
    \ lies with the objects and not with the client code, it would be easy to switch\
    \ in support for new formats transparently.\n\n### Cohesion\n\nCohesion is the\
    \ extent to which proximate procedures are related to one another. Ideally, you\
    \ should create components that share a clear responsibility. If your code spreads\
    \ related routines widely, you will find them harder to maintain as you have to\
    \ hunt around to make changes.\n\nOur `ParamHandler` classes collect related procedures\
    \ into a common context. The methods for working with XML share a context in which\
    \ they can share data and where changes to one method can easily be reflected\
    \ in another if necessary (e.g., if you needed to change an XML element name).\
    \ The `ParamHandler` classes can therefore be said to have high cohesion.\n\n\
    The procedural example, on the other hand, separates related procedures. The code\
    \ for working with XML is spread across functions.\n\n### Coupling\n\nTight coupling\
    \ occurs when discrete parts of a system’s code are tightly bound up with one\
    \ another so that a change in one part necessitates changes in the others. Tight\
    \ coupling is by no means unique to procedural code, though the sequential nature\
    \ of such code makes it prone to the problem.\n\nYou can see this kind of coupling\
    \ in the procedural example. The `writeParams()` and `readParams()` functions\
    \ run the same test on a file extension to determine how they should work with\
    \ data. Any change in logic you make to one will have to be implemented in the\
    \ other. If you were to add a new format, for example, you would have to bring\
    \ the functions into line with one another, so that they both implement a new\
    \ file extension test in the same way. This problem can only get worse as you\
    \ add new parameter-related functions.\n\nThe object-oriented example decouples\
    \ the individual subclasses from one another and from the client code. If you\
    \ were required to add a new parameter format, you could simply create a new subclass,\
    \ amending a single test in the static `getInstance()` method."
