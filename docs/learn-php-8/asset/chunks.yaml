    \    1.  前往 Microsoft Windows 任务管理器（同时按下 `Ctrl+Alt+Delete`）。\n    2.  选择“服务”选项卡。\n"
- fmt: "3.  在 Windows 10 中查找以下任一服务：`SQL Server Reporter`、`Web Deployment Agent`、`BranchCache`、`Sync\
    \ Share Service`、`WAS`（`IIS Administrator`）和 `W3SVC`。如果发现某个服务正在运行，右键单击它并将其关闭。然后尝试重新启动\
    \ `Apache`。如果不起作用，请重新打开该服务，然后尝试其他服务。（具体名称可能因 Windows 版本而异。）\n\n2.  如果你需要其他服务保持运行，或者你没有关闭\
    \ 80 端口上服务的管理员权限，则可以更改 `Apache` 的默认监听端口。\n\n*   *Wikipedia 对端口（port）的定义如下：*\n\n\
    *   *在计算机网络中，端口是一种特定于应用程序或进程的软件结构，作为计算机主机操作系统中的通信端点。端口的作用是唯一标识单台计算机上运行的不同应用程序或进程，从而使它们能够共享到分组交换网络（如互联网）的单个物理连接。在互联网协议（Internet\
    \ Protocol）的上下文中，端口与主机的 IP 地址以及用于通信的协议类型相关联。*\n\n*   *有关端口的更多信息，请访问* [`http://en.wikipedia.org/wiki/Port_(computer_networking)`](http://en.wikipedia.org/wiki/Port_%2528computer_networking%2529)。\n\
    \n转到系统托盘（屏幕右下角）。通过滚动图标找到 `easyPHP` 图标。每个图标应显示相应的描述。如果未看到图标，请单击系统托盘中的向上箭头以查看更多图标。右键单击\
    \ `easyPHP` 图标。选择 `Dashboard`。这将在默认浏览器中打开。尝试单击 `HTTP Server`（默认设置为 `Apache`）下方的启动按钮。如果收到端口冲突错误，请单击齿轮图标（`Server\
    \ Settings`）。然后你可以在下一个屏幕上更改端口。（将其更改为 `8080` 或 `81`。）通过单击绿色启动按钮再次尝试启动 `Apache`。返回\
    \ `Dashboard` 并通过单击启动按钮启动数据库。\n\n### 缺失文件（Missing Files）\n如果你收到与此相关的错误消息，则说明你的文件在安装前已损坏。返回\
    \ `easyPHP` 网站并重新下载文件。此外，如果你不小心弄乱了 `Apache` 配置文件，请返回并重新安装该产品。\n\n### 无法在 Program\
    \ Files 目录中安装文件（Cannot Install Files in Program Files Directory）\n这表明你或其他对象对该目录有高安全限制。重新运行安装程序，并将安装位置更改为其他目录。请记住，当本书后面引用\
    \ `Program Files` 目录时，你应该查看你的文件实际安装到的目录。\n\n### Apache 延迟和挂起（Apache Delays and\
    \ Hang-Ups）\n在 Windows 中，你可能会遇到 `Apache` 运行缓慢或挂起的问题。要解决此问题，请转到系统托盘（屏幕右下角）。通过滚动图标找到\
    \ `easyPHP` 图标。每个图标应显示相应的描述。如果未看到图标，请单击系统托盘中的向上箭头以查看更多图标。右键单击 `easyPHP` 图标。选择\
    \ `Dashboard`。当 `Dashboard` 在默认浏览器中打开时，选择齿轮图标（`Server Settings`）。然后单击 `Configuration\
    \ File` 按钮。文件内容将显示在按钮下方。单击铅笔图标以编辑 `Apache` 配置文件。这将在默认文本编辑器（可能是 `Notepad`）中打开 `Apache`\
    \ 配置文件（`httpd.conf`）。首先将文件副本保存在某处，以防出错。这将使你能够从任何重大错误中恢复。\n\n> **注意**  \n> 使用 `Notepad`\
    \ 或任何其他文本编辑器时，请确保使用 `Save As`，然后选择 `All Files` 作为文件类型。另外，请确保包含 `.conf` 文件扩展名。\
    \  \n> 如果不将文件类型更改为所有文件，你的文件将保存为 `httpd.conf.txt`。如果发生这种情况，服务器将找不到该文件。你可以通过重新打开文件并以正确方法保存来轻松解决此问题。\n\
    \n然后在文件底部添加以下两行：\n\n```\nAcceptFilter http none\nAcceptFilter https none\n```\n\
    \n通过执行 `Save As` ➤ 选择 `All Files` 重新保存文件（确保将原始文件重新保存到原始位置）。它应显示该文件将保存在配置文件夹中。\n\
    \n### 其他错误（Other Errors）\n对于此处未讨论的错误，请将错误消息复制并粘贴到搜索引擎中。查找提供解决错误建议的答案列或博客。互联网上有很多免费资源。不要为网站（或其他人）付费来解决你的问题。\n\
    \n### 配置（Configurations）\n你需要确定何时希望 `Apache` 运行。可以将 `Apache` 设置为在启动 PC 时运行、在应用程序需要时运行或手动运行。要更改设置，你可以右键单击系统托盘（屏幕右下角）中的\
    \ `easyPHP` 图标，然后选择 `Dashboard`。如果未看到该图标，请单击系统托盘中的向上箭头。选择左侧菜单中的 `Settings and\
    \ Applications`。然后你可以选中（或取消选中）复选框以自动启动服务器和 `PHP`。然后单击 `save` 按钮。\n有许多可选库，你可以根据需要链接或取消链接到\
    \ `PHP`。在许多情况下，库已加载，只需链接即可。你可以通过转到 `PHP` 配置文件（`php.ini`）并删除行首的注释（`;`）字符来添加这些库。可以轻松地通过右键单击系统托盘中的\
    \ `easyPHP` 图标找到 `PHP` 配置文件。然后选择 `Dashboard`。接着单击 `HTTP server` 旁边的齿轮图标（`Server\
    \ Settings`）。单击 `Configuration File` 按钮。文件将显示在按钮下方。单击文件内容右上角的铅笔图标。该文件将在默认文本编辑器（可能是\
    \ `Notepad`）中打开。在进行任何更改之前，请确保保存备份副本。同时确保使用 `Save As` 并选择 `All Files`。否则，你的文件可能以\
    \ `.txt` 结尾，而不是以 `.config` 结尾。目前不需要进行任何更改。还建议仅在需要时进行这些更改。\n\n### XAMPP\n虽然 **XAMPP**\
    \ 与 `easyPHP` 类似，但 `XAMPP` 更受欢迎，因为它有免费的 Windows、Linux 和 OS X 版本。它还包含许多附加组件，包括一些最受欢迎的内容管理系统——`Drupal`、`Joomla`\
    \ 和 `WordPress`。`XAMPP` 使用 `MariaDB` 代替 `MySQL`。此更改发生在 `Oracle` 收购 `MySQL` 时。`MariaDB`\
    \ 和 `MySQL` 的基础知识非常相似。我们将在本书后面探讨如何更改为最新版本的 `MySQL`。在某些设置中，`XAMPP` 仍然引用 `MySQL`，而实际上它是\
    \ `MariaDB`。最新版本可以直接从 `XAMPP` 官方网站或许多其他下载站点获取。[www.​apachefriends.​org/​](https://www.apachefriends.org/)\n\
    \n> **警告**  \n> 注意你点击网站上的哪些按钮。你可能会下载到不想安装的额外项目。"
  raw: "3.  Look for any of the following services in Windows 10: SQL Server\n   \
    \     Reporter, Web Deployment Agent, BranchCache, Sync Share Service, WAS\n \
    \       (IIS Administrator), and W3SVC. If you find one running, right-click it\n\
    \        and turn it off. Then try restarting Apache again. If that does not\n\
    \        work, turn that one back on and try another one. (The names may be\n\
    \        slightly different depending on the version of Windows.)\n\n2.  If you\
    \ need your other services running or you\n    do not have the administrative\
    \ privileges to turn off services on port\n    80, you can change the default\
    \ listening port location for Apache.\n\n*   *Wikipedia defines a port as*\n\n\
    *   *In computer networking, a port is an application-specific or\n    process-specific\
    \ software construct serving as a communications endpoint\n    in a computer's\
    \ host operating system. The purpose of ports is to\n    uniquely identify different\
    \ applications or processes running on a\n    single computer and thereby enable\
    \ them to share a single physical\n    connection to a packet-switched network\
    \ like the Internet. In the\n    context of the Internet Protocol, a port is associated\
    \ with an IP\n    address of the host, as well as the type of protocol used for\n\
    \    communication.*\n\n*   *For more information on ports, visit* [`http://en.wikipedia.org/wiki/Port_(computer_networking)`](http://en.wikipedia.org/wiki/Port_%2528computer_networking%2529).\n\
    \nGo to your system tray (bottom-right corner of your screen). Find the\neasyPHP\
    \ icon by scrolling over the icons. A description of each should\nappear. If you\
    \ do not see the icon, click the up arrow in the system\ntray to see more icons.\
    \ Right-click the easyPHP icon. Select Dashboard.\nThis will open up in your default\
    \ browser. Try clicking the start button\nbelow the HTTP Server (which is defaulted\
    \ to Apache). If you receive an\nerror that you have a port conflict, click the\
    \ gear icon (Server\nSettings). You can then change the port on the next screen.\
    \ (Change it\nto 8080 or 81.) Attempt to start Apache again by clicking the green\n\
    start button. Go back to the Dashboard and start the database by\nclicking the\
    \ start button below.\n\nMissing Files\nIf you receive an error message related\
    \ to this,\nsomehow your files have become corrupted before installation. Return\
    \ to\nthe easyPHP web site and download the files again. Also, if you somehow\n\
    mess up the Apache configuration file, go back and reinstall the product\nagain.\n\
    \nCannot Install Files in Program Files Directory\nThis indicates that you or\
    \ something else\nhas a high security restriction on that directory. Rerun the\n\
    installation and change the location of your installation to another\ndirectory.\
    \ Just remember, when we reference the program files directory\nlater in this\
    \ book, that you should instead look at the directory in\nwhich your files were\
    \ installed.\n\nApache Delays and Hang-Ups\nIn Windows you may experience problems\
    \ with Apache\nworking slowly or hanging up. To correct this problem, go to your\
    \ system\ntray (bottom-right corner of your screen). Find the easyPHP icon by\n\
    scrolling over the icons. A description of each should appear. If you do\nnot\
    \ see the icon, click the up arrow in the system tray to see more\nicons. Right-click\
    \ the easyPHP icon. Select Dashboard. When the\nDashboard opens in your default\
    \ browser, select the gear icon (Server\nSettings). Then click the Configuration\
    \ File button. The contents of the\nfile will display below the button. Click\
    \ the pencil icon to edit the\nApache configuration file. This will open the Apache\
    \ configuration file\n(httpd.conf) into your default text editor (probably Notepad).\
    \ First\nsave a copy of this file somewhere in case you make an error. This will\n\
    allow you to recover from any major mistakes that occur.\n\nNote\n\nMake sure\
    \ when you are using Notepad or any other text editor that\nyou use Save As, and\
    \ then select All Files for the file type. Also make\nsure to include the `.conf`\
    \ file extension.\nIf you do not change the file type to all files, your file\
    \ will be saved\nas `httpd.conf.txt`. If\nthat happens, the server will not see\
    \ the file. You can easily fix the\nproblem by reopening the file and saving it\
    \ in the proper method.\n\nThen add the following two lines to the bottom of the\
    \ file:\n\n```\nAcceptFilter http none\nAcceptFilter https none\n```\n\nResave\
    \  the\nfile (make sure you are resaving the original file to the original\nlocation)\
    \ by doing a Save As ➤ Select All Files. It should show you that\nthe file is\
    \ to be saved in the configuration folder.\n\nOther Errors\nFor errors that\n\
    have not been discussed here, copy and paste the error into a search\nengine.\
    \ Locate an answer column or blog that provides suggestions to fix\nyour error.\
    \ There are many free resources on the Internet. Do not pay\nfor a web site (or\
    \ someone else) to fix your problem.\n\nConfigurations\nYou need to determine\
    \ when you want Apache to run.\nApache can be set to run when you boot your PC,\
    \ when an application\nneeds it, or manually. To change settings, you can right-click\
    \ the\neasyPHP Icon in the system tray (bottom-right corner of your screen) and\n\
    then select Dashboard. If you do not see the icon, click the up arrow in\nthe\
    \ system tray. Select Settings and Applications on the left-side menu.\nYou can\
    \ then click the check boxes (or unclick them) to AutoStart both\nthe server and\
    \ PHP. Then click the save button.\nThere are many optional libraries that you\
    \ can link or unlink to PHP\nas needed. In many cases the libraries are already\
    \ loaded and just need\nto be linked. You can add these libraries by going to\
    \ the PHP\nconfiguration file (`php.ini`) and removing\nthe comment (`;`)\ncharacter\
    \ at the beginning of the line. The PHP configuration file can\neasily be found\
    \ by right-clicking the easyPHP icon in the system tray.\nThen select the Dashboard.\
    \ Then click the gear icon (Server Settings)\nnext to the HTTP server. Click the\
    \ Configuration File button. The file\nwill display below the button. Click the\
    \ pencil icon to the upper right\nof the file contents. The file will open in\
    \ your default text editor\n(probably Notepad). Make sure to save a backup copy\
    \ before you make any\nchanges. Also make sure to use Save As and select All Files.\
    \ Otherwise,\nyour file might end with a .txt ending instead of a .config ending.\
    \ It\nis not necessary to make any changes at this point. It is also suggested\n\
    that you make these changes only when needed.\n\nXAMPP\nAlthough **XAMPP** is\
    \ similar to easyPHP, XAMPP is more\npopular because it has free Windows, Linux,\
    \ and OS X versions. It also\nincludes a lot of add-ons, including some of the\
    \ most popular content\nmanagement systems—Drupal, Joomla, and WordPress. XAMPP\
    \ uses MariaDB\ninstead of MySQL. This change occurred when Oracle bought MySQL.\
    \ The\nbasics of MariaDB and MySQL are very similar. We will explore changing\n\
    to the latest version of MySQL later in the book. In some settings XAMPP\nstill\
    \ refers to MySQL when it is actually MariaDB. The latest downloads\ncan be accessed\
    \ directly at the official XAMPP web site or at many other\ndownload locations.[www.​apachefriends.​org/​](https://www.apachefriends.org/)\n\
    \nWarning\n\nPay attention to what buttons you click on the web site. You might\n\
    download extra items you do not want to install."
