    $this->Post->find(''all'',array(''conditions''=>array(''User.id''=>''<> 1'')));
    Cake parses other SQL expressions, which include LIKE, BETWEEN, and REGEX, but
    you must have a space between the operator and the value. You can search for date
    or datetime fields by enclosing the field name in the SQL DATE() parameter.


    Setting Multiple Conditions


    Cake supports multiple conditions. By using the array to format the conditions,
    multiple searches are easily managed:


    $this->Post->find(''all'',array(''conditions''=>➥


    array(''User.id''=>1,''DATE(Post.date)''=>''CURDATE()'')));


    09775ch07final 7/1/08 9:46 PM Page 96


    **96**


    C H A P T E R 7 ■ W O R K I N G W I T H C O N T R O L L E R S A N D M O D E L
    S


    The default way of pulling the conditions into a single query is by using the
    AND boolean operator. In other words, the previous example will tell the model
    to find all posts owned by the user with an ID of 1 *and* all posts with a date
    equal to today.


    Suppose you need to perform a multiple condition query with the OR operator instead.


    You do this by setting the condition’s array as the value in an array with the
    key or like so: $this->Post->find(''all'',array(''conditions''=>array(


    ''or''=>array(


    ''User.id''=>1,''DATE(Post.date)''=>''CURDATE()''


    )


    )));


    All valid SQL boolean operations can be used in place of OR in this example. These
    include AND, OR, NOT, or XOR.


    You can also have Cake search for multiple values in a field. Simply attach an
    array to a field key with all the possible values for which to search:


    $this->Post->find(''all'',array(''conditions''=>array(''User.id''=>array(1,2,5,10))));
    **Displaying the Most Recent Posts**


    As the posts table grows, the results returned by the current find() function
    in the Index action will grow as well. To guarantee that the server load is not
    compromised down the road and because you need only the five most recent posts,
    you can customize the find conditions to return only five records and not (potentially)
    hundreds.


    The easiest way to do this is to set the limit to 5 and order the results by creation
    date, descending:


    $this->Post->find(''all'',array(''order''=>''date DESC'',''limit''=>5,''recursive''=>0));
    Now, the find() function will pull all Post records and their owners (in this
    case User records associated with the post), sort by the date field with the most
    recent first, and limit the results to five.


    The example database is structured with an auto_increment in the ID field, meaning
    that the ID field not only identifies records by a unique value but also tells
    you the order of creation. Because, in theory, the administrator could manipulate
    the date field but not the ID


    field, it may be worthwhile in some instances to order by ID rather than by date.
    This, though, is at the discretion of the client or developer. In this blog, we’ll
    trust that the date assigned to the post will determine when the post appears
    in the site.


    Insert the new conditions into the find() function in line 2 of Listing 7-4 and
    replace the Index action with the resulting code.


    **Adjusting the Index View**


    The Index view will need to be adjusted as well, if only to remove administrative
    actions from the reach of the user.


    Go into the app/views/posts/index.ctp file and insert the following code, or work
    in your own customized view code that displays the content in a more storylike
    form:


