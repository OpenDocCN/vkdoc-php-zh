    \ JavaScript 和 XML 请求（AJAX）实现，本章后续部分将详细介绍。\n\n如以下示例所示，可以在查询字符串和请求体中使用相同的变量名：\n\
    ```\n<form method=\"POST\" action=\"/?p2=value\">\n    <input name=\"p1[a]\" type=\"\
    text\" />\n    <input name=\"p1[b]\" type=\"text\" />\n    <input name=\"p2\"\
    \ type=\"text\" />\n    <input type=\"submit\" />\n</form>\n```\n\n这将导致`$_GET`和`$_POST`数组中都包含`p2`的值。\n\
    \n`$_GET`的内容将如下所示：\n```\nArray (\n    [p2] => value\n)\n```\n\n而`$_POST`数组仍将包含这些值：\n\
    ```\nArray (\n    [p1] => Array (\n        [a] => abc\n        [b] => def\n  \
    \  )\n    [p2] => 123\n)\n```\n\n## 配方 12-3 Cookie\n"
- fmt: '# Problem


    Because of the nature of how web servers and browsers interact where every request
    is a new connection between the browser and the server, there is no easy way for
    the server to know that the request is coming from the same browser. The server
    could use the IP address of the request and/or the user agent string. But in an
    environment where multiple users can share the same public IP address (NAT) this
    does not guarantee that the requests are from the same user. Is it possible to
    identify the requests as coming from the same client?


    # Solution


    One of the headers that can be exchanged between the client and server is the
    cookie header. This value originates on the server as part of a response. If the
    server sets a cookie, the browser will automatically include that cookie on subsequent
    requests to the same server. It can be set with the `header()` function but the
    format of the cookie is not trivial so PHP offers a `SetCookie()` function that
    takes a number of parameters that makes the setting and clearing of cookies relatively
    easy.


    Browsers can store cookies in a couple of different places. A cookie can be stored
    on disk. This makes it possible to have cookies that will be persisted on the
    client for a long time, and they will be accessible even if the browser application
    is closed and restarted. All cookies must have an expiration time. When a non-zero
    value is set the cookie will automatically be written to disk and the browser
    will purge it after the expiration date/time.


    Another option is to use an in-memory cookie, where the expiration time is set
    to 0. This will not be written to disk and it will be deleted when the browser
    is closed. In addition the `SetCookie()` function has a couple of options to set
    the cookie as secure, meaning it will only be used if the connection is over HTTPS
    and the cookie can be defined as HTTP only. This will prevent the client-side
    scripting code (JavaScript) from accessing the cookie.


    The user of the browser can clear the cookies at any time, and as cookies are
    just files on a disk they can be faked. The code on the server side should take
    appropriate actions to handle cookies. In addition many countries require that
    the web site announce the use of cookies alongside with the purpose.


    ## How it Works


    This next example shows how a cookie can be used to track if a user has visited
    the web site before and print a special message accordingly.


    ```php

    //12_3.php


    if ($_COOKIE[''visited'']) {


    echo "Welcome Back!";


    }


    else {


    echo "Welcome to mydomain.com";


    }


    SetCookie(''visited'', time(), time() + 30 * 86400);

    ```


    All parameters except the first (`name`) to the `SetCookie()` function are optional.


    First we check the super global variable `$_COOKIE` for a key called `visited`.
    This is the way to check if a cookie is set. Based on that check the script will
    print one of two messages and then set the cookie with an expiration date 30 days
    in the future. The value of the cookie is set to the current time. This could
    be used to show additional information about when the user was last visiting the
    site.


    The first time a user requests the script they will get the generic welcome message
    and if the page is refreshed or the user returns within the 30 days they will
    get the welcome back message.


    Cookies that are in-memory only are often used to store information about the
    user so the site can operate without the user having to log in again and again.
    This can be used as a timer that checks the time since the last request to the
    server and if too much time has gone by since the previous request, force the
    user to provide credentials again.


    ```php

    //12_4.php


    if (empty($_COOKIE[''access'']) || $_COOKIE[''access''] < time() - 15 * 60) {


    SetCookie(''access'');


    Login();


    }


    else {


    SetCookie(''access'', time(), 0);


    // Perform action;


    }

    ```


    In this example we check for a cookie called `access` and if it’s not defined
    or the value is older than 15 minutes the user is forced to perform the login,
    otherwise the value of the `access` cookie is set to the current time allowing
    the user another 15 minutes before the next action to stay locked in.


    The `SetCookie()` function is also called with a single parameter, the name of
    the cookie. This will cause the cookie to be set but with an empty value. Deleting
    the cookie is done by setting the cookie with an expiration time in the past.
    Deleting a cookie will work for in-memory cookies as well as cookies written to
    disk.


    In section 12-5 we will discuss the use of session data. When session data is
    used PHP will automatically generate a cookie called `PHPSESSID`. This is a memory-only
    cookie used to identify the data stored on the server side for the specific browser.


    ## Recipe 12-4. Server Variables


    ### Problem


    We have seen how we can change the program flow based on the user’s interaction
    with the web site, but what if we can’t react to where the user is located in
    the world or whether they use the HTTP or HTTPS version of the site?


    ### Solution


    There are a number of values stored in the `$_SERVER` super global that has to
    do with the request. These values can be used to provide specific content or to
    redirect the user to a different site. The request scheme can be checked with
    `$_SERVER[''REQUEST_SCHEME'']`. The values can be `http` or `https`.


    You can also get the public IP address of the client machine with `$_SERVER[''REMOTE_ADDR'']`.
    This can be used to detect the country the user is originating from. This information
    is not always accurate as users can go through a number of proxies before accessing
    the Internet and thus it will be the IP address of the last proxy the request
    is coming from that will be populated in the `$_SERVER` variable.


    If you decide to “trust” the IP address you can use services like GeoIP to translate
    the IP address to a location. This can be a country and perhaps a state/province
    and a city name depending on the type of subscription you are using with GeoIP.


    ### How it Works


    If you wanted to make sure a user is on the secure version of your site when they
    are accessing certain URLs you can add this to the script:


    ```php

    // 12_5.php


    if ($_SERVER[''REQUEST_SCHEME''] == ''http'') {


    $Location = $_SERVER[''SERVER_NAME''] . $_SERVER[''REQUEST_URI''];


    header("Location: https://" . $Location);


    exit;


    }

    ```


    As an alternative you can use the browser’s Geolocation API to get the user’s
    location. This is available in most browsers that support the HTML 5 standard.
    Although the API is supported in most browsers it comes with the caveat that the
    user will have to approve the revealing of the information. Geolocation provides
    longitude and latitude data that can be used to locate the browser or to serve
    content that is relevant to the user’s current location.


    The Geolocation API is implemented in JavaScript and you will need a form or an
    AJAX request to submit the data to the server side. The next example shows an
    HTML 5 document that will detect if Geolocation is available, and if the user
    accepts the request it will get and print the latitude and longitude.


    ```html

    <!DOCTYPE html>

    <!-- Position.html -->

    <html>

    <head>

    <script>

    function showPosition(position) {

    document.write("Latitude: " + position.coords.latitude +

    "<br>Longitude: " + position.coords.longitude);

    }


    if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(showPosition);

    }

    else {

    document.write("Geolocation is not supported by this browser.");

    }

    </script>

    </head>

    <body>

    </body>

    </html>

    ```


    If the device the browser is running on is equipped with a GPS receiver the position
    is more accurate than a laptop or desktop computer connected to the Internet.'
