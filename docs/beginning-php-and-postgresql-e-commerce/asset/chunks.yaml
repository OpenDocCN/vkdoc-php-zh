    **T**he HatShop e-commerce application is shaping up nicely. You’ve added customer
    account management capabilities, and you’re keeping track of customer addresses
    and credit card information, which is stored in a secure way. However, you’re
    not currently using this information—you’re delegating responsibility to PayPal.


    In this chapter, you’ll make the modifications required for customers to place
    orders that are associated with their user profiles. The main modification here
    is that the customer associated with an order will be identified by a new piece
    of information in the orders table, and much of the rest of the modifications
    will be made to use this information.'
  trans: "\n# 9. 现在一切就绪，你可以看到效果了。登录你的网站，向购物车中添加一些商品，然后点击购物车页面上的结算按钮。你的页面看起来会像前面图 11-9\
    \ 所示的样子。\n\n## 工作原理：`checkout_info` 组件化模板\n\n在 `CheckoutInfo` 类的 `init()` 方法中，首先检查客户是否点击了“下订单”按钮。如果是，则将订单保存到数据库，并将客户重定向到首页：\n\
    \n```\n// 如果点击了“下订单”按钮，则将订单保存到数据库\nif ($this->_mPlaceOrder == 1)\n{\n  $order_id\
    \ = ShoppingCart::CreateOrder();\n\n  // 重定向到 index.php\n  $redirect_link = 'http://'\
    \ . getenv('SERVER_NAME');\n\n  // 如果定义了 HTTP_SERVER_PORT 且不是默认端口\n  if (defined('HTTP_SERVER_PORT')\
    \ && HTTP_SERVER_PORT != '80')\n  {\n    // 追加服务器端口\n    $redirect_link .= ':'\
    \ . HTTP_SERVER_PORT;\n  }\n\n  $redirect_link .= VIRTUAL_LOCATION . 'index.php';\n\
    \n  header('Location:' . $redirect_link);\n  exit;\n}\n```\n\n然后需要设置一些供模板使用的变量：\n\
    \n```\n// 设置成员变量，用于 Smarty 模板\n$this->mCartItems = ShoppingCart::GetCartProducts(GET_CART_PRODUCTS);\n\
    $this->mTotalAmountLabel = ShoppingCart::GetTotalAmount();\n$this->mContinueShopping\
    \ = $_SESSION['page_link'];\n$this->mCustomerData = Customer::Get();\n```\n\n\
    如果客户尚未输入信用卡信息或收货地址，则会显示一条提示，并且“下订单”按钮将被禁用。如果客户已存在信用卡信息，则将其解密，并准备显示信用卡类型和卡号后四位：\n\
    \n```\n// 仅在拥有完整的客户详细信息时才允许下订单\nif (empty ($this->mCustomerData['credit_card']))\n\
    {\n  $this->mOrderButtonVisible = 'disabled=\"disabled\"';\n  $this->mNoCreditCard\
    \ = 'yes';\n}\nelse\n{\n  $this->mPlainCreditCard = Customer::DecryptCreditCard(\n\
    \    $this->mCustomerData['credit_card']);\n  $this->mCreditCardNote = '要使用的信用卡：'\
    \ .\n    $this->mPlainCreditCard['card_type'] .\n    '<br />卡号：' .\n    $this->mPlainCreditCard['card_number_x'];\n\
    }\n\nif (empty ($this->mCustomerData['address_1']))\n{\n  $this->mOrderButtonVisible\
    \ = 'disabled=\"disabled\"';\n  $this->mNoShippingAddress = 'yes';\n}\n```\n\n\
    其余代码则比较直接。\n\n## 强制使用 SSL 连接\n\n在构建管理后台页面时，你也了解到使用 SSL 来保护服务器与客户端浏览器之间传输的数据是很好的做法。当时\
    \ SSL 是半可选的，因为管理页面可以限制为仅限本地访问。\n\n然而，既然现在有客户向你发送极其敏感的数据，SSL 就不再是可选项了！根据你在第 7 章实现的配置，客户详情页面应该已经得到了保护。请记住，你可以使用\
    \ `config.php` 文件来设置站点关于 SSL 的行为。\n\n你仍然需要*强制*敏感页面通过 SSL 访问。例如，如果有人试图访问 `http://localhost/hatshop/index.php?UpdateCreditCardDetails`，访问者应被自动重定向到\
    \ `https://localhost/hatshop/index.php?UpdateCreditCardDetails`。\n\n显然，你并不需要站点的所有区域都使用\
    \ SSL 连接，也不应该在所有地方强制执行，因为这会降低性能。但是，你*确实*需要确保结算、客户登录、客户注册以及客户详情修改页面仅能通过 SSL 访问。\n\
    \n假设你的站点已正确配置了 SSL，你应该进行一些更新以确保这些页面无法通过 HTTP 访问。在 `index.php` 的开头添加以下代码：\n\n```\n\
    // 加载 Smarty 库和配置文件\nrequire_once 'include/app_top.php';\n\n// 页面是否通过 HTTPS 连接访问？\n\
    if (getenv('HTTPS') != 'on')\n  $is_https = false;\nelse\n  $is_https = true;\n\
    \n// 是否正在访问敏感页面？\nif (isset($_GET['RegisterCustomer']) ||\n    isset($_GET['UpdateAccountDetails'])\
    \ ||\n    isset($_GET['UpdateAddressDetails']) ||\n    isset($_GET['UpdateCreditCardDetails'])\
    \ ||\n    isset($_GET['Checkout']) ||\n    isset($_POST['Login']))\n  $is_sensitive_page\
    \ = true;\nelse\n  $is_sensitive_page = false;\n\n// 访问敏感页面时使用 HTTPS\nif ($is_sensitive_page\
    \ && $is_https == false && USE_SSL != 'no')\n{\n  header ('Location: https://'\
    \ . getenv('SERVER_NAME') .\n    getenv('REQUEST_URI'));\n  exit;\n}\n\n// 非敏感页面不使用\
    \ HTTPS\nif (!$is_sensitive_page && $is_https == true)\n{\n  $link = 'http://'\
    \ . getenv('SERVER_NAME');\n\n  // 如果定义了 HTTP_SERVER_PORT 且不是默认端口\n  if (defined('HTTP_SERVER_PORT')\
    \ && HTTP_SERVER_PORT != '80')\n  {\n    // 追加服务器端口\n    $link .= ':' . HTTP_SERVER_PORT;\n\
    \  }\n\n  $link .= getenv('REQUEST_URI');\n\n  header ('Location: ' . $link);\n\
    \  exit;\n}\n\n/* 如果当前不在访问商品页面，则将当前页面的链接保存到 page_link 会话变量中；\n   该变量将用于在商品详情页面创建“继续购物”链接以及指向商品详情页面的链接\
    \ */\nif (!isset ($_GET['ProductID']) && !isset ($_GET['CartAction']))\n```\n\n\
    现在，如果你已登录，尝试加载 `http://localhost/hatshop/index.php?UpdateCreditCardDetails` 将会被重定向到\
    \ `https://localhost/hatshop/index.php?UpdateCreditCardDetails`。\n\n## 总结\n\n\
    在本章中，你实现了一个客户账户系统，客户可以使用该系统存储其详细信息以供订单处理时使用。你了解了客户账户系统的多个方面，包括加密敏感数据以及为获取这些数据而保护网络连接。\n\
    \n首先，你了解了数据库中的新表 `customer`，该表包含用于存储客户信息的字段。\n\n接着，你创建了业务层的安全类，用于处理字符串的哈希和加密，以及一个安全的信用卡表示形式，使其能够轻松地在加密和解密格式之间交换信用卡详细信息。\n\
    \n之后，你利用这些类创建了登录、注册和客户详情编辑的网页。这需要更多的代码，但结果却简单易懂。\n\n在下一章中，我们将研究如何创建订单处理管道的框架，从而能够进一步自动化供应流程。\n\
    \n---\n\n# 第 12 章：存储客户订单\n\nHatShop 电子商务应用正在逐步完善。你已经添加了客户账户管理功能，并且正在跟踪客户的地址和信用卡信息，这些信息都以安全的方式存储。然而，你目前并未使用这些信息——而是将责任委托给了\
    \ PayPal。\n\n在本章中，你将进行必要的修改，以便客户能够下达与其用户配置文件关联的订单。这里的主要修改是，与订单关联的客户将通过 `orders`\
    \ 表中的一条新信息来标识，其余大部分修改都将围绕使用这条信息进行。\n"
- fmt: '# Also in This Chapter


    Also in this chapter, you’ll take a look at dealing with another common feature
    of e-commerce sites: tax and shipping charges. Many options are available for
    implementing this functionality, but we’ll just examine a simple way of doing
    things and lay the groundwork for your own further development.


    This chapter is divided into three parts as follows:


    - Enable customers to place orders through their accounts.

    - Modify the orders admin section to integrate the new features.

    - Add tax and shipping charges.


    In the next chapter, you’ll start to implement a more sophisticated order system,
    and the code you’ll write in this chapter will facilitate this. Because of this,
    you’ll be making some modifications that won’t seem necessary at this stage, but
    they’ll make your life easier later on.


    ## Adding Orders to Customer Accounts


    To enable customers to place orders, you need to make several modifications. You’ll
    modify the database and business tier to enable customer orders to be placed and
    provide new code in the presentation tier to expose this functionality.


    First, we’ll modify the database to make it ready to hold information about customer
    orders. You’ll first modify the `orders` table and then the `shopping_cart_create_order`
    function.


    Currently the `orders` table doesn’t allow for as much information as you’ll need
    to implement customer orders. You’ll also make some modifications in later chapters,
    so you need to add new columns to the `orders` table.


    **Caution** The new `orders` table isn’t totally compatible with the previous
    data in this table, and you’ll be required to delete all the existing data. You
    need to back up your database and eventually save your current data before making
    these changes.


    More specifically, these are the changes you’ll make to the `orders` table:


    - Clear all the existing data.

    - Remove the `customer_name`, `shipping_address`, and `customer_email` fields.

    - Add `customer_id`, `auth_code`, and `reference` fields. The `customer_id` field
    references the `customer` table, specifying the customer who made the order. The
    other two fields are related to processing credit card data, and will be discussed
    in Chapter 14.


    You’ll also modify the `shopping_cart_create_order` function to reflect the changes
    in the `orders` table.


    Follow the steps in the following exercise to change your `orders` table and the
    `shopping_cart_create_order` function.


    ### Exercise: Adding Orders to Customer Accounts


    1. Load pgAdmin III, and connect to the `hatshop` database.


    2. Click Tools ➤ Query tool (or click the SQL button on the toolbar). A new query
    window should appear.


    3. Be sure to back up your data. Then use the query tool to execute this code,
    which deletes the data stored in the `order_details` and `orders` tables from
    your `hatshop` database.


    ```sql

    -- Delete all records from order_detail table

    DELETE FROM order_detail;


    -- Delete all records from orders table

    DELETE FROM orders;

    ```


    4. Drop the `customer_name`, `shipping_address`, and `customer_email` fields from
    the `orders` table, which are no longer required. This data is now held in the
    `customer` table.


    ```sql

    -- Drop customer_name field from orders table

    ALTER TABLE orders DROP COLUMN customer_name;


    -- Drop shipping_address field from orders table

    ALTER TABLE orders DROP COLUMN shipping_address;


    -- Drop customer_email field from orders table

    ALTER TABLE orders DROP COLUMN customer_email;

    ```


    5. Add the new fields (`customer_id`, `auth_code`, and `reference`), and a constraint
    that checks the value in the `customer_id` field will reference an existing customer.


    ```sql

    -- Adding a new field named customer_id to orders table

    ALTER TABLE orders ADD COLUMN customer_id INTEGER;


    -- Adding a new field named auth_code to orders table

    ```'
