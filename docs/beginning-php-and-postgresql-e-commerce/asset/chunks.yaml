    A P P E N D I X B


    Project Management


    Considerations


    **I**t feelsgreat tofinish building a complete e-commerce store, doesn’t it? For
    the purposes of this book, we dealt with many design issues on a chapter-by-chapter
    basis, while also covering the theory concepts. However, in real-world projects,
    many times, you’ll need to consider the complete picture from the very start.
    This appendix discusses how to effectively manage building complete solutions.


    Maybe it seems easier to just start coding without any upfront design, and with
    some luck, you might even create something that works on the second day; however,
    when it comes to large projects, you’ll face a lot of problems in the long term
    by taking this route.


    A project’s life cycle includes much more than simply coding—it should not be
    done hastily. For example, for almost any real-world software project, a critical
    part of its success is the database design, even if it only counts for a small
    part of the project’s development cycle.


    This makes perfect sense if you consider that e-commerce sites, web portals, search
    engines, and customer interfaces for service providers (banking, IT, insurance,
    and so on) are all basically interfaces to a backend database.


    Of course, the way you display the data and the reports you present to the client
    also plays an important role in the success of the software. However, you can
    think of the database as the foundation of a house; if you make mistakes in the
    foundation, no matter how nice or trendy the house looks, it will still be torn
    down by the first gust of wind.


    **Developing Software Solutions**


    In fact, the software solution’s technical design is only a part of the software
    project’s life cycle.


    To give you an idea of the steps involved in managing a complete software solution,
    imagine a real-world example, such as building an ERP (Enterprise Resource Planning)
    application for a clothing factory.


    For starters, you need to know exactly what the client requires from the software,
    so you talk to the client about the goals of implementing such software in the
    network. This involves gathering both system requirements and software requirements
    for the application you will eventually build.


    After you (as the project manager) fully understand the customer’s requirements
    and discuss a budget allocation and a timeline for the project, a team of analysts
    works with the customer to compile information about the tasks performed in the
    factory, the work schedule, and the manufacturing equipment. Your analysts must
    become knowledgeable of the region’s **583**


