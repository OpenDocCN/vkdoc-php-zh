    is that you should not display the user’s existing password in the

    update form. If you’re using password hashing, you can’t, anyway.


    Where Next?

    This book has covered a massive amount of ground. If you’ve mastered

    all the techniques covered here, you are well on your way to becoming an

    intermediate PHP developer, and with a little more effort, you will

    enter the advanced level. If it’s been a struggle, don’t worry. Go over

    the earlier chapters again. The more you practice, the easier it

    becomes.

    You’re probably thinking, “How on earth can I remember all this?” You

    don’t need to. Don’t be ashamed to look things up. Bookmark the PHP

    online manual ( [`www.php.net/manual/en/`](http://www.php.net/manual/en/) ) and
    use it regularly. It’s constantly updated, and

    it has lots of useful examples. Type a function name into the search box

    at the top right of every page to be taken straight to a full

    description of that function. Even if you can’t remember the correct

    function name, the manual takes you to a page that suggests the most

    likely candidates. Most pages have practical examples showing how the

    function or class is used.

    What makes dynamic web design easy is not an encyclopedic knowledge

    of PHP functions and classes but a solid grasp of how conditional

    statements, loops, and other structures control the flow of a script.

    Once you can visualize your projects in terms of “if this happens, what

    should happen next?” you’re the master of your own game. I consult the

    PHP online manual frequently. To me, it’s like a dictionary. Most of the

    time, I just want to check that I have the arguments in the right order,

    but I often find that something catches my eye and opens up new

    horizons. I may not use that knowledge immediately, but I store it at

    the back of my mind for future use and go back when I need to check the

    details.

    The MySQL online manual ( [`https://dev.mysql.com/doc/refman/8.0/en/`](https://dev.mysql.com/doc/refman/8.0/en/)
    ) is equally useful. The documentation for MariaDB is

    at [`https://mariadb.com/kb/en/library/documentation/`](https://mariadb.com/kb/en/library/documentation/)
    . Make both the PHP and database online manuals your

    friends, and your knowledge will grow by leaps and bounds.


