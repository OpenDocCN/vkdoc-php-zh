- fmt: "# Secure Programming\n\nDon’t expose information to the user that they don’t\
    \ need to know. In a live environment, we would not use `print_r` to display information\
    \ to the user because it will show them all information we are passing between\
    \ the programs. This might cause a major security problem with the data we are\
    \ using in the program.\n\n## Curly’s Law: Do One Thing\n\nHave you ever seen\
    \ the 1991 movie *City Slickers*? Yes, that feel-good western comedy featuring\
    \ Billy Crystal. Jack Palance played Curly, a rugged, old cowboy who knew the\
    \ secret of life and reluctantly shared it with Crystal’s character, Mitch:\n\n\
    * *Curly*: Do you know what the secret of life is?\n* *(Holds up one finger)*\n\
    * *Curly*: This!\n* *Mitch*: Your finger?\n* *Curly*: One thing. Just one thing.\
    \ You stick to that, and the rest don’t mean shit.\n* *Mitch*: But what is the\
    \ “one thing”?\n* *Curly*: (*smiles*) That’s what *you* have to find out.\n\n\
    We can probably rest assured that Curly wasn’t talking about principles of clean\
    \ code. But incidentally, he formulated a principle we can use to write clean\
    \ functions. Every function should do one thing. Just one thing.\n\n> **Note**\
    \  \n> Jeff Atwood wrote a funny and interesting blog entry about applying Curly’s\
    \ law to clean code. Read it at [http://blog.codinghorror.com/curlys-law-do-one-thing/](http://blog.codinghorror.com/curlys-law-do-one-thing/).\n\
    \n## Program Design and Logic\n\nClean code is code that is easier to understand.\
    \ If functions do just one thing, they normally will be short. Short code is easier\
    \ to read and understand than long code. A function should almost never be more\
    \ than a screen’s worth of instructions. If you discover that your functions become\
    \ long, reevaluate the logic of your design. Can the function be broken down into\
    \ multiple simpler functions? If we can read and understand our code, it becomes\
    \ much easier to find errors – and we *will* make errors! Don’t be surprised if\
    \ you spend 50% of your development time chasing errors in your code.\n\nIn the\
    \ earlier code examples, we saw two clean functions, each doing just one thing.\
    \ One function shows the quiz; the other function shows a response.\n\n## Code\
    \ Is Poetry\n\nStrive for expressive, beautiful code. Strive for code that is\
    \ easy to read. When you develop new solutions with code, you will spend a very\
    \ significant part of your time reading your own code. Code is like poetry. You\
    \ write it once but read it many times. So, write your code as if you were writing\
    \ poetry: choose your words carefully.\n\nBefore we finish with our coding examples,\
    \ let’s make some changes to the Page Data Class to tighten down security.\n\n\
    ## OOP: Using Constructors, Getters, and Setters\n\nIt has been a while since\
    \ we updated the Page Data Class. In case you forgot its current structure, see\
    \ the following code.\n\n```\nListing 3-18\nPage_Data.class.php\n```\n\nAs we\
    \ can see, the class name and file name are the same. It is standard practice\
    \ in object-oriented languages to have this relationship. We initially created\
    \ our strings within the class itself and set them to empty strings. However,\
    \ classes include a unique method (function) called a *constructor*, whose main\
    \ purpose is to initiate properties (variables). We can provide default values\
    \ within the constructor for each of our strings. The constructor is automatically\
    \ called when an object is created from the class, using the `new` keyword.\n\n\
    ```\nfunction __construct() {\nprint \"In constructor\";\n}\n```\n\nFor PHP classes,\
    \ two underscore symbols (`__`) and the word `construct` identify the constructor.\
    \ In this example, we are simply printing out a message. However, we will soon\
    \ provide some meaningful information.\n\nLet’s look a little deeper at object-oriented\
    \ programming to understand why the use of constructors is important.\n\nA true\
    \ object-oriented program must provide three methodologies. These include:\n\n\
    * **Encapsulation**: Protecting all parts of the program by forming a shield (capsule)\
    \ around the code, using classes, objects, and other object-oriented techniques.\n\
    * **Polymorphism**: The ability to call and use items (such as methods/functions)\
    \ with the same name but accepting and producing different results. For example,\
    \ the ability to have two functions called `adder`. One function adds two integers,\
    \ and one adds two floating-point numbers. How does the program know which to\
    \ use? By what is passed into the function (integers or floating point) and what\
    \ is returned by the function, commonly called the function header information.\n\
    * **Inheritance**: The ability for one object to inherit the characteristics of\
    \ another object. The same as us inheriting the characteristics of our parents,\
    \ but still keeping some uniqueness about ourselves.\n\nLet’s provide some improved\
    \ encapsulation of our class while, at the same time, increasing both the reliability,\
    \ integrity, and security of our program.\n\n```\nListing 3-19\nConstruct_Page_Data.class.php\n\
    ```\n\nIn the preceding example, we are declaring (creating) each property at\
    \ the beginning of the class. Then the constructor is called to give each property\
    \ an initial value in case whatever program uses this class does not use the property.\
    \ However, we still have a potential problem that almost anything can be loaded\
    \ into the properties by any program. This could cause harm to the display of\
    \ the web page, or even worse, when we discuss databases, open up the ability\
    \ for a hacker to attempt to access our information. Let’s add a little better\
    \ security and reliability by rejecting content submitted that does not meet our\
    \ requirements. To accomplish this, we will create setter and getter methods.\n\
    \n```\ntitle = \"Title Goes Here\";\n$this->content = \"Page Content Goes Here\"\
    ;\n$this->css = \"CSS Goes Here\";\n$this->embeddedStyle = \"Embedded CSS Goes\
    \ Here\";\n}\npublic function getTitle() : string {\nreturn $this->title;\n}\n\
    public function setTitle(string $value) {\nif (strpos($value, '^')) {\n$this->title\
    \ = $value;\n}\n}\npublic function getContent() : string {\nreturn $this->content;\n\
    }\npublic function setContent(string $value) {\nif (strpos($value, 'content =\
    \ $value;\n}\n}\npublic function appendContent(string $value) {\nif (strpos($value,\
    \ 'content .= $value;\n}\n}\nListing 3-20\nPartial Listing of Private_Page_Data.class.php\n\
    ```\n\nListing [3-20](#323857_3_En_3_Chapter.xhtml#PC40) is a partial listing\
    \ of the code changes for the Page Data Class. For a complete listing, review\
    \ the code in `Private_Page_data.class.php`.\n\n```\nprivate string $title = \"\
