  raw: '#### Handling Multiple Rows


    The `find()` method is pretty straightforward because it only needs to return
    a single object. What do you do, though, if you need to pull lots of data from
    the database? Your first thought may be to return an array of objects. This will
    work, but there is a major problem with the approach.


    If you return an array, each object in the collection will need to be instantiated
    first, which, if you have a result set of 1,000 objects, may be needlessly expensive.
    An alternative would be to simply return an array and let the calling code sort
    out object instantiation. This is possible, but it violates the very purpose of
    the `Mapper` classes.


    There is one way that you can have your cake and eat it. You can use the built-in
    `Iterator` interface.


    The `Iterator` interface requires implementing classes to define methods for querying
    a list. If you do this, your class can be used in `foreach` loops just like an
    array.


    Table [13-1](#A314621_5_En_13_Chapter.html#Tab1) shows the methods that the `Iterator`
    interface requires.


    Table 13-1.


    Methods Defined by the Iterator Interface


    | Name | Description |

    | --- | --- |

    | `rewind()` | Send pointer to the start of list |

    | `current()` | Return element at current pointer position |

    | `key()` | Return current key (i.e., pointer value) |

    | `next()` | Return element at current pointer and advance pointer |

    | `valid()` | Confirm that there is an element at the current pointer position
    |


    In order to implement an `Iterator`, you need to implement its methods and keep
    track of your place within a dataset. How you acquire that data, order it, or
    otherwise filter it is hidden from the client.


    Here is an `Iterator` implementation that wraps an array but also accepts a `Mapper`
    object in its constructor for reasons that will become apparent:


    ```

    // listing 13.05

    abstract class Collection implements \Iterator

    {

    protected $mapper;

    protected $total = 0;

    protected $raw = [];

    private $pointer = 0;

    private $objects = [];

    public function __construct(array $raw = [], Mapper $mapper = null)

    {

    $this->raw = $raw;

    $this->total = count($raw);

    if (count($raw) && is_null($mapper)) {

    throw new AppException("need Mapper to generate objects");

    }

    $this->mapper = $mapper;

    }

    public function add(DomainObject $object)

    {

    $class = $this->targetClass();

    if (! ($object instanceof $class)) {

    throw new AppException("This is a {$class} collection");

    }

    $this->notifyAccess();

    $this->objects[$this->total] = $object;

    $this->total++;

    }

    abstract public function targetClass(): string;

    protected function notifyAccess()

    {

    // deliberately left blank!

    }

    private function getRow($num)

    {

    $this->notifyAccess();

    if ($num >= $this->total || $num objects[$num])) {

    return $this->objects[$num];

    }

    if (isset($this->raw[$num])) {

    $this->objects[$num] = $this->mapper->createObject($this->raw[$num]);

    return $this->objects[$num];

    }

    }

    public function rewind()

    {

    $this->pointer = 0;

    }

    public function current()

    {

    return $this->getRow($this->pointer);

    }

    public function key()

    {

    return $this->pointer;

    }

    public function next()

    {

    $row = $this->getRow($this->pointer);

    if (! is_null($row)) {

    $this->pointer++;

    }

    }

    public function valid()

    {

    return (! is_null($this->current()));

    }

    }

    ```


    The constructor expects to be called with no arguments or with two (the raw data
    that may eventually be transformed into objects and a mapper reference).


    Assuming that the client has set the `$raw` argument (it will be a `Mapper` object
    that does this), this is stored in a property together with the size of the provided
    dataset. If raw data is provided, an instance of the `Mapper` is also required,
    as it’s this that will convert each row into an object.


    If no arguments were passed to the constructor, the class starts out empty; note,
    however, that the `add()` method is available for adding to the collection.


    The class maintains two arrays: `$` `objects` and `$` `raw` . If a client requests
    a particular element, the `getRow()` method looks first in `$objects` to see if
    it has one already instantiated. If so, that gets returned. Otherwise, the method
    looks in `$raw` for the row data. `$raw` data is only present if a `Mapper` object
    is also present, so the data for the relevant row can be passed to the `Mapper::`
    `createObject()` method you encountered earlier. This returns a `DomainObject`
    object, which is cached in the `$objects` array with the relevant index. The newly
    created `DomainObject` object is returned to the user.


    The rest of the class is simple manipulation of the `$pointer` property and calls
    to `getRow()`. Apart, that is, from the `notifyAccess()` method , which will become
    important when you encounter the Lazy Load pattern.


    You may have noticed that the `Collection` class is abstract. You need to provide
    specific implementations for each domain class:


    ```

    // listing 13.06

    class VenueCollection extends Collection

    {

    public function targetClass(): string

    {

    return Venue::class;

    }

    }

    ```


    The `VenueCollection` class simply extends `Collection` and implements a `targetClass()`
    method . This, in conjunction with the type checking in the super class’s `add()`
    method , ensures that only `Venue` objects can be added to the collection. You
    could provide additional checking in the constructor as well if you wanted to
    be even safer.


    Clearly, this class should only work with a `VenueMapper`. In practical terms,
    though, this is a reasonably type-safe collection, especially as far as the Domain
    Model is concerned.


    There are parallel classes for `Event` and `Space` objects, of course.


    Figure [13-2](#A314621_5_En_13_Chapter.html#Fig2) shows some `Collection` classes
    .


    ![A314621_5_En_13_Fig2_HTML.gif](A314621_5_En_13_Fig2_HTML.gif)


    Figure 13-2.


    Managing multiple rows with collections


    Because the Domain Model needs to instantiate `Collection` objects, and because
    I may need to switch the implementation at some point (especially for testing
    purposes), I provide convenience getter methods in the Registry to acquire empty
    collections. As your system grows, you may delegate this to a dedicated factory.
    During development, though, I tend to begin with the simplest approach and default
    to using the Registry for most object creation. Here’s how I get an empty `VenueCollection`
    object :


    ```

    // listing 13.07

    $reg = Registry::instance();

    $collection = $reg->getVenueCollection();

    $collection->add(new Venue(-1, "Loud and Thumping"));

    $collection->add(new Venue(-1, "Eeezy"));

    $collection->add(new Venue(-1, "Duck and Badger"));

    foreach ($collection as $venue) {

    print $venue->getName() . "\n";

    }

    ```


    With the implementation I have built here, there isn’t much else you can do with
    this collection; however, adding `elementAt()`, `deleteAt()`, `count()`, and similar
    methods is a trivial exercise. (And fun, too! Enjoy!)


    Note that I used the `::class` syntax to get a fully qualified string representation
    of the class. This feature has only been available since PHP 5.5\. Prior to that,
    I would have had to have been careful to provide the full `namespace` path myself.'
  trans: "\n### 处理多行数据\n\n`find()` 方法非常直接，因为它只需返回单个对象。但如果需要从数据库中获取大量数据，你该怎么办？你的第一反应可能是返回一个对象数组。这确实可行，但这种方法存在一个主要问题。\n\
    \n如果返回数组，集合中的每个对象都必须先实例化。如果结果集包含 1,000 个对象，这可能会造成不必要的性能开销。另一种方案是直接返回数组，让调用代码自行处理对象实例化。这虽然可行，但却违背了\
    \ `Mapper` 类的根本目的。\n\n有一种方法可以让你两者兼得：使用内置的 `Iterator` 接口。\n\n`Iterator` 接口要求实现类定义用于查询列表的方法。如果这样做了，你的类就可以像数组一样在\
    \ `foreach` 循环中使用。\n\n表 13-1 显示了 `Iterator` 接口要求实现的方法。\n\n**表 13-1. Iterator 接口定义的方法**\n\
