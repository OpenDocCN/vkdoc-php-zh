    \ 方法插入到 `<option>` 标签的 `value` 属性中。\n\n在你于第 9 章创建的 `upload_test` 文件夹内，创建一个名为 `thumbs`\
    \ 的新文件夹，确保它具有 PHP 写入所需的权限。如果需要，请回顾上一章的“建立上传目录”部分。\n\n#### 构建 Thumbnail 类\n\n为了生成缩略图，该类需要执行以下步骤：\n\
