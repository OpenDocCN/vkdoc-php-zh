- '# 名称和描述


  访客输入的文本可以通过以下几种方式进行搜索：


  **精确匹配搜索：** 如果访客输入的搜索字符串由多个单词组成，系统将按原样在目录中搜索该字符串，而不会拆分单词并分别搜索。


  **全词搜索：** 访客输入的搜索字符串会被拆分为单词，从而搜索包含访客输入的每个单词的产品。这与精确匹配搜索类似，它仍然搜索所有输入的单词，但这次单词的顺序不再重要。


  **任意词搜索：** 搜索字符串中的至少一个单词必须匹配到某个产品。


  这个简单的分类绝不完整。搜索引擎可以像现代搜索引擎提供的工具一样复杂，提供多种选项和功能，并显示排序后的结果列表；也可以简单到只在数据库中搜索访客提供的精确字符串。


  `HatShop` 将支持任意词和全词搜索模式。这一决策影响了搜索功能的视觉设计（见图 5-1）。


  **图 5-1.** *搜索功能的设计*


  文本输入框如预期般存在，旁边还有一个复选框，允许访客在全词搜索和任意词搜索之间进行选择。


  您在此需要做的另一个决定是搜索结果的显示方式。搜索结果页面应该是什么样子？毕竟，您希望显示符合搜索条件的产品列表。


  显示搜索结果最简单的解决方案是复用您在上一章构建的 `products_list` 组件化模板。一个示例搜索页面将如图 5-2 所示。


  **图 5-2.** *示例搜索结果*


  您还可以在图中看到该网站使用了分页。如果搜索结果很多，您每页只会显示固定数量（但可配置）的产品，并允许访客通过“上一页”和“下一页”链接浏览页面。


  让我们像往常一样，从数据层开始实现这一功能。


  ## 教数据库自己搜索


  在数据库中实现搜索主要有两种选择：


  - 使用 `WHERE` 和 `LIKE` 实现搜索。

  - 使用 `tsearch2` 模块进行搜索。


  让我们分析一下这些选项。


  ### 使用 WHERE 和 LIKE 进行搜索


  最直接且常用于实现搜索的方法，是在 `SELECT` 语句的 `WHERE` 子句中使用 `LIKE`。让我们看一个简单的例子，它返回描述中包含单词“war”的产品：


  ```sql

  SELECT name FROM product WHERE description LIKE ''%war%''

  ```


  `LIKE` 运算符匹配字符串的一部分，百分号通配符（`%`）用于指定任意数量的字符（零个或多个）。这就是为什么在前面的例子中，模式 `%war%` 会匹配所有其
  `description` 列中某处包含单词“war”的记录。此搜索不区分大小写。


  如果您想检索所有产品名称或描述中某处包含单词“war”的产品，查询语句如下所示：


  ```sql

  SELECT name FROM product

  WHERE description LIKE ''%war%'' OR name LIKE ''%war%'';

  ```


  这种搜索方法有三个重要的缺点：


  **速度：** 因为我们需要在 `description` 和 `name` 字段内部搜索文本，每次查询都必须搜索整个数据库。当执行数据库搜索时，这会显著降低
  `HatShop` 的整体性能，尤其是在数据库中有大量产品的情况下。


  **搜索结果的**质量：** 这种方法不容易实现各种高级功能，例如按搜索相关性对匹配的产品进行排序。


  **高级搜索功能：** 这些功能包括使用布尔运算符（`AND`、`OR`）进行搜索、搜索单词的屈折形式（例如复数形式和各种动词时态）或位置相近的单词。


  那么，如何实现具备这些功能的更好的搜索呢？如果您有一个需要频繁搜索的大型数据库，如何才能在不压垮服务器的情况下进行搜索呢？


  答案是使用 PostgreSQL 的 `tsearch2` 模块。


  ### 使用 PostgreSQL 的 tsearch2 模块进行搜索


  `tsearch2` 是我们将用于实现网站搜索功能的搜索模块。该模块随 PostgreSQL 一起发布，它允许通过使用特殊的搜索索引对数据库执行高级搜索。有关安装说明，请阅读附录
  A。


  在构建目录搜索功能的数据层时，需要考虑两个方面：


  - 准备要搜索的数据库

  - 使用 SQL 搜索数据库


  #### 创建支持搜索的数据结构


  在我们的场景中，用于搜索的表是 `product`，因为这是访客要查找的对象。要使用 `tsearch2` 模块使该表可搜索，您需要分三步准备该表：


  1.  向 `product` 表添加一个新字段，用于保存*搜索向量*。搜索向量是一个字符串，其中包含您要搜索的数据（例如产品名称和描述）的已准备（可搜索）版本。在我们的案例中，命令如下所示（现在不要执行，我们将在练习中处理这件事）：


  ```sql

  ALTER TABLE product ADD COLUMN search_vector tsvector;

  ```


  2.  通过在新添加的字段上添加 `gist` 索引来更新 `product` 表。`gist` 是执行实际搜索的引擎，它是伯克利广义搜索树的一种实现（有关 `gist`
  的更多详细信息，请访问 <http://gist.cs.berkeley.edu/>）。在 `product` 表上添加 `gist` 索引的命令是：


  ```sql

  CREATE INDEX idx_search_vector ON product USING gist(search_vector);

  ```


  3.  用搜索向量填充 `product` 表的 `search_vector` 字段。这些搜索向量是每个产品可供搜索的单词列表。对于 `HatShop`，我们将考虑产品名称和产品描述中出现的单词，并赋予出现在名称中的单词更高的相关性。这样，如果多个产品匹配某个特定搜索字符串，在名称中有匹配项的产品将显示在结果列表的顶部。在此步骤中，我们还会过滤所谓的*停用词*（也称为噪声词），这些词与搜索无关，例如“的”、“或”、“在”等等。


  以下命令使用 `to_tsvector` 函数（创建搜索向量）和 `setweight`（用于赋予名称中的单词更高的相关性）为每个产品设置搜索向量：


  ```sql

  UPDATE product

  SET search_vector =

  setweight(to_tsvector(name), ''A'') || to_tsvector(description);

  ```


  `setweight` 的 `''A''` 参数赋予出现在产品名称中的单词最高相关性。有关这些函数如何工作的详细信息，请参考位于 <http://www.sai.msu.su/~megera/postgres/gist/tsearch/V2/docs/tsearch2-ref.html>
  的 *`tsearch2` 参考*。您可以在 <http://rhodesmill.org/brandon/projects/tsearch2-guide.html>
  找到一份 `tsearch2` 指南，并在 <http://www.devx.com/opensource/Article/21674> 找到一篇优秀的文章。


  例如，请参见表 5-1，它展示了“Santa Jester Hat”（小丑圣诞帽）的搜索向量。





  '
- "# 搜索引擎目录\n\n请注意，向量保留了单词的位置（尽管我们并不真正需要这一点），并且“A”相关性因子被添加到来自产品名称的单词中。同时要注意，同一单词的各种形式都会被识别（例如“fit”），而停用词不会被考虑。\n\
  \n**表 5-1.** *产品的搜索向量*\n\n| **字段** | **值** |\n| --- | --- |\n| `product_id` | |\n\
  | `name` | Santa Jester Hat |\n| `description` | This three-prong velvet jester\
  \ is one size fits all and has an adjustable touch fastener back for perfect fitting.\
  \ |\n| `search_string` | `'fit':13,24 'hat':3A 'one':11 'back':21 'size':12 'prong':7\
  \ 'santa':1A 'three':6 'touch':19 'adjust':18 'fasten':20 'jester':2A,9 'velvet':8\
  \ 'perfect':23 'three-prong':5` |\n\n■**注意**  当向表中添加新产品或更新现有产品时，需要确保同时（重新）创建它们的搜索向量。负责解析这些向量的索引会自动完成其工作，但向量本身必须手动创建。你将在第\
  \ 7 章中处理这个问题，届时将添加目录管理功能。在此之前，如果你手动更改了产品，只需执行之前的 SQL 命令来更新搜索向量。\n\n## 搜索数据库\n\n\
  现在你已经为每个产品构建了搜索向量，让我们看看如何用它进行搜索。\n\n要执行搜索，同样需要三个步骤：\n\n1. **构建一个*搜索字符串***，表达你究竟在查找什么。它可以包含布尔运算符；我们在全词搜索时使用\
  \ `&`（AND），在任意词搜索时使用 `|`（OR）。\n2. **对查询字符串应用 `to_tsquery` 函数**。这将把查询字符串准备成可用于搜索的形式。\n\
  3. **执行搜索时**，使用条件 `search_vector @@ prepared_search_string`，如果匹配则返回 `TRUE`，否则返回\
  \ `FALSE`。这里，`search_vector` 是之前计算的结果（上一部分的步骤 3），而 `prepared_search_string` 是步骤\
  \ 2 的结果。\n\n让我们看看这在实践中如何应用。以下查询对“yankee war”搜索字符串执行全词搜索：\n\n```sql\nSELECT product_id,\
  \ name\nFROM product\nWHERE search_vector @@ to_tsquery('yankee & war')\nORDER BY\
  \ product_id;\n```\n\n对于示例产品数据库，此查询应得到表 5-2 所示的结果。\n\n**表 5-2.** *匹配“yankee & war”的帽子*\n\
  \n| `product_id` | `name` |\n| --- | --- |\n| | Civil War Union Slouch Hat |\n|\
  \ | Union Civil War Kepi Cap |\n\n要执行任意词搜索，应在搜索字符串中使用 `|` 代替 `&`：\n\n```sql\nSELECT\
  \ product_id, name\nFROM product\nWHERE search_vector @@ to_tsquery('yankee | war')\n\
  ORDER BY product_id;\n```\n\n如预期，这次将会有更多匹配的产品，如表 5-3 所示（因为列表未排序，结果顺序可能不同）。\n\n**表\
  \ 5-3.** *匹配“yankee | war”的帽子*\n\n| `product_id` | `name` |\n| --- | --- |\n| |\
  \ Military Beret |\n| | Confederate Civil War Kepi |\n| | Uncle Sam Top Hat |\n\
  | | Confederate Slouch Hat |\n| | Civil War Union Slouch Hat |\n| | Civil War Leather\
  \ Kepi Cap |\n| | Union Civil War Kepi Cap |\n\n## 按相关性排序结果\n\n前面的查询显示了匹配的产品，但未按特定顺序排序。数据库引擎会以其认为简单的方式返回结果。对于搜索，我们更希望首先显示相关性更高的匹配项。请记住，我们为来自产品标题的匹配赋予了更高优先级，因此一切已准备就绪。\n\
  \n`tsearch2` 引擎提供了 `rank` 函数，可用于对结果进行排序。默认顺序是先显示排名较低的匹配项，因此还需要使用 `ORDER BY` 的 `DESC`\
  \ 选项将更好的匹配项置于顶部。\n\n\n\n```sql\n-- 以下查询对“yankee war”执行了带排名的任意词搜索：\nSELECT rank(search_vector,\
  \ to_tsquery('yankee | war')) as rank, product_id, name FROM product\nWHERE search_vector\
  \ @@ to_tsquery('yankee | war')\nORDER BY rank DESC;\n```\n\n这次，结果将按顺序排列。您还可以看到搜索排名。在`name`字段中有匹配项的产品的排名明显更高。\n\
  \n**表 5-4.** *按排名排序的搜索结果*\n\n| 排名      | product_id | 名称                       \
  \    |\n|----------|------------|--------------------------------|\n| 0.341959 |\
  \            | 内战联邦宽松帽                 |\n| 0.33436  |            | 联邦内战凯皮帽    \
  \             |\n| 0.31684  |            | 内战皮革凯皮帽                 |\n| 0.303964\
  \ |            | 邦联内战凯皮帽                 |\n| 0.0379954|            | 军用贝雷帽    \
  \                 |\n| 0.0303964|            | 邦联宽松帽                     |\n| 0.0303964|\
  \            | 山姆大叔高顶礼帽               |\n\n现在，您应该已经准备好实现网站的搜索功能了。要了解有关`tsearch2`引擎内部工作原理的更多信息，请查阅其官方文档。\n\
  \n## 练习：编写数据库搜索代码\n\n1.  加载 pgAdmin III，并连接到 `hatshop` 数据库。\n2.  点击工具 ➤ 查询工具（或点击工具栏上的\
  \ SQL 按钮）。一个新的查询窗口应该会出现。\n3.  在查询工具中编写以下代码，然后按 F5 键执行它。此命令将 `product` 表配置为使用 `tsearch2`\
  \ 引擎进行搜索，正如本章前面所述。\n\n    ```sql\n    -- 修改 product 表，添加 search_vector 字段\n    ALTER\
  \ TABLE product ADD COLUMN search_vector tsvector;\n\n    -- 为 product 表中的 search_vector\
  \ 字段创建索引\n    CREATE INDEX idx_search_vector ON product USING gist(search_vector);\n\
  \n    -- 更新 product 表中新添加的 search_vector 字段\n    UPDATE product\n    SET search_vector\
  \ =\n    setweight(to_tsvector(name), 'A') || to_tsvector(description);\n    ```\n\
  \n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n    648XCH05.qxd 10/31/06\
  \ 10:04 PM 第 176 页\n\n    **176**\n    第 5 章 ■ 搜索产品目录\n\n4.  使用查询工具执行以下代码，该代码将在您的\
  \ `hatshop` 数据库中创建 `catalog_flag_stop_words` 函数：\n\n    ```sql\n    -- 创建 catalog_flag_stop_words\
  \ 函数\n    CREATE FUNCTION catalog_flag_stop_words(TEXT[])\n    RETURNS SETOF SMALLINT\
  \ LANGUAGE plpgsql AS $$\n    DECLARE\n        inWords ALIAS FOR $1;\n        outFlag\
  \ SMALLINT;\n        query TEXT;\n    BEGIN\n        FOR i IN array_lower(inWords,\
  \ 1)..array_upper(inWords, 1) LOOP\n            SELECT INTO query\n            \
  \    to_tsquery(inWords[i]);\n            IF query = '' THEN\n                outFlag\
  \ := 1;\n            ELSE\n                outFlag := 0;\n            END IF;\n\
  \            RETURN NEXT outFlag;\n        END LOOP;\n    END;\n    $$;\n    ```\n\
  \n5.  使用查询工具执行以下代码，该代码将在您的 `hatshop` 数据库中创建 `catalog_count_search_result` 函数：\n\n\
  \    ```sql\n    -- 函数返回与搜索字符串匹配的产品数量\n    CREATE FUNCTION catalog_count_search_result(TEXT[],\
  \ VARCHAR(3))\n    RETURNS INTEGER LANGUAGE plpgsql AS $$\n    DECLARE\n       \
  \ -- inWords 是一个数组，包含用户搜索字符串中的单词\n        inWords ALIAS FOR $1;\n        -- inAllWords\
  \ 对于“全部词”搜索为 'on'\n        -- 对于“任意词”搜索为 'off'\n        inAllWords ALIAS FOR $2;\n\
  \        outSearchResultCount INTEGER;\n        query TEXT;\n        search_operator\
  \ VARCHAR(1);\n    BEGIN\n        -- 将查询初始化为空字符串\n        query := '';\n       \
  \ -- 确定在准备搜索字符串时要使用的运算符\n        IF inAllWords = 'on' THEN\n            search_operator\
  \ := '&';\n        ELSE\n            search_operator := '|';\n        END IF;\n\
  \        -- 组合搜索字符串\n        FOR i IN array_lower(inWords, 1)..array_upper(inWords,\
  \ 1) LOOP\n            IF i = array_upper(inWords, 1) THEN\n                query\
  \ := query || inWords[i];\n            ELSE\n                query := query || inWords[i]\
  \ || search_operator;\n            END IF;\n        END LOOP;\n        -- 返回匹配的数量\n\
  \        SELECT INTO outSearchResultCount\n            count(*)\n        FROM product,\n\
  \            to_tsquery(query) AS query_string\n        WHERE search_vector @@ query_string;\n\
  \        RETURN outSearchResultCount;\n    END;\n    $$;\n    ```\n\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \    648XCH05.qxd 10/31/06 10:04 PM 第 177 页\n\n    **177**\n    第 5 章 ■ 搜索产品目录\n\
  \n6.  使用查询工具执行以下代码，该代码将在您的 `hatshop` 数据库中创建 `catalog_search` 函数：\n\n    ```sql\n\
  \    -- 创建 catalog_search 函数\n    CREATE FUNCTION catalog_search(TEXT[], VARCHAR(3),\
  \ INTEGER, INTEGER, INTEGER)\n    RETURNS SETOF product_list LANGUAGE plpgsql AS\
  \ $$\n    DECLARE\n        inWords ALIAS FOR $1;\n        inAllWords ALIAS FOR $2;\n\
  \    ```\n\n\n\n```sql\ninShortProductDescriptionLength ALIAS FOR $3;\ninProductsPerPage\
  \ ALIAS FOR $4;\ninStartPage ALIAS FOR $5;\noutProductListRow product_list;\nquery\
  \ TEXT;\nsearch_operator VARCHAR(1);\nquery_string TSQUERY;\n\nBEGIN\n  -- 用空字符串初始化查询\n\
  \  query := '';\n\n  -- 匹配所有词还是任一词？\n  IF inAllWords = 'on' THEN\n    search_operator\
  \ := '&';\n  ELSE\n    search_operator := '|';\n  END IF;\n\n  -- 组合搜索字符串\n  FOR\
  \ i IN array_lower(inWords, 1)..array_upper(inWords, 1) LOOP\n    IF i = array_upper(inWords,\
  \ 1) THEN\n      query := query||inWords[i];\n    ELSE\n      query := query||inWords[i]||search_operator;\n\
  \    END IF;\n  END LOOP;\n\n  query_string := to_tsquery(query);\n\n  -- 返回搜索结果\n\
  \  FOR outProductListRow IN\n    SELECT product_id, name, description, price,\n\
  \           discounted_price, thumbnail\n    FROM product\n    WHERE search_vector\
  \ @@ query_string\n    ORDER BY rank(search_vector, query_string) DESC\n    LIMIT\
  \ inProductsPerPage\n    OFFSET inStartPage\n  LOOP\n    IF char_length(outProductListRow.description)\
  \ >\n       inShortProductDescriptionLength THEN\n      outProductListRow.description\
  \ :=\n        substring(outProductListRow.description, 1,\n                  inShortProductDescriptionLength)\
  \ || '...';\n    END IF;\n    RETURN NEXT outProductListRow;\n  END LOOP;\nEND;\n\
  $$;\n```\n\n## 工作原理解析：目录搜索功能\n\n在本练习中，您创建了支持产品搜索业务层逻辑的数据库功能。在添加了本章开头说明的必要结构后，您新增了三个函数：\n\
  \n- `catalog_flag_stop_words`：如前所述，访问者输入的搜索字符串中的某些词可能不会用于搜索，因为它们被视为噪音词。默认情况下，`tsearch2`\
  \ 引擎会移除这些噪音词，但我们需要找出被移除的词，以便将这些词告知访问者。我们通过 `catalog_flag_stop_words` 函数实现此目的，该函数将由业务层的\
  \ `FlagStopWords` 方法调用。\n\n- `catalog_count_search_result`：此函数用于统计搜索结果的数量。表示层需要知道要显示多少个搜索结果页面。\n\
  \n- `catalog_search`：执行实际的产品搜索。\n\n## 实现业务层\n\n搜索功能的业务层包含两个方法：`FlagStopWords` 和\
  \ `Search`。我们先实现它们，然后讨论其工作原理。\n\n### 练习：实现业务层\n\n1. 全文搜索功能会自动移除短于指定长度的词。进行搜索时，您需要告知访问者哪些词已被移除。首先，通过\
  \ `FlagStopWords` 方法找出哪些词被移除。该方法接收一个词数组作为参数，并返回两个数组：一个用于停用词，另一个用于可接受词。将此方法添加到 `business/catalog.php`\
  \ 中的 `Catalog` 类：\n\n```php\n// 在搜索查询中标记停用词\npublic static function FlagStopWords($words)\n\
  {\n  // 构建 SQL 查询\n  $sql = 'SELECT *\n          FROM catalog_flag_stop_words(:words);';\n\
  \n  // 构建参数数组\n  $params = array (':words' => '{' . implode(', ', $words) . '}');\n\
  \n  // 使用 PDO 特定功能准备语句\n  $result = DatabaseHandler::Prepare($sql);\n\n  // 执行查询\n\
  \  $flags = DatabaseHandler::GetAll($result, $params);\n\n  $search_words = array\
  \ ('accepted_words' => array (),\n                         'ignored_words' => array\
  \ ());\n\n  for ($i = 0; $i < count($flags); $i++)\n    if ($flags[$i]['catalog_flag_stop_words'])\n\
  \      $search_words['ignored_words'][] = $words[$i];\n    else\n      $search_words['accepted_words'][]\
  \ = $words[$i];\n\n  return $search_words;\n}\n```\n\n2. 最后，在 `Catalog` 类中添加 `Search`\
  \ 方法：\n\n```php\n// 搜索目录\npublic static function Search($searchString, $allWords,\
  \ $pageNo, &$rHowManyPages)\n{\n  // 搜索结果将按以下格式的数组返回\n```\n\n\n\n```php\n$search_result\
  \ = array (\n    'accepted_words' => array (),\n    'ignored_words' => array (),\n\
  \    'products' => array ()\n);\n\n// 如果搜索字符串为空，则返回空结果\nif (empty ($searchString))\n\
  \    return $search_result;\n\n// 搜索字符串分隔符\n$delimiters = ',.; ';\n\n// 使用 strtok\
  \ 获取搜索字符串的第一个单词\n$word = strtok($searchString, $delimiters);\n$words = array ();\n\
  \n// 构建单词数组\nwhile ($word)\n{\n    $words[] = $word;\n    // 获取搜索字符串的下一个单词\n   \
  \ $word = strtok($delimiters);\n}\n\n// 将搜索单词分为两类：接受和忽略\n$search_words = Catalog::FlagStopWords($words);\n\
  $search_result['accepted_words'] = $search_words['accepted_words'];\n$search_result['ignored_words']\
  \ = $search_words['ignored_words'];\n\n// 如果所有单词都是停用词，则返回空结果\nif (count($search_result['accepted_words'])\
  \ == 0)\n    return $search_result;\n\n// 统计搜索结果数量\n$sql = 'SELECT catalog_count_search_result(:words,\
  \ :all_words);';\n$params = array (\n    ':words' => '{' . implode(', ', $search_result['accepted_words'])\
  \ . '}',\n    ':all_words' => $allWords\n);\n\n// 计算显示产品所需的页数\n$rHowManyPages =\
  \ Catalog::HowManyPages($sql, $params);\n\n// 计算起始条目\n$start_item = ($pageNo - 1)\
  \ * PRODUCTS_PER_PAGE;\n\n// 检索匹配的产品列表\n$sql = 'SELECT *\n        FROM catalog_search(:words,\n\
  \                            :all_words,\n                            :short_product_description_length,\n\
  \                            :products_per_page,\n                            :start_page);';\n\
  $params = array (\n    ':words' => '{' . implode(', ', $search_result['accepted_words'])\
  \ . '}',\n    ':all_words' => $allWords,\n    ':short_product_description_length'\
  \ => SHORT_PRODUCT_DESCRIPTION_LENGTH,\n    ':products_per_page' => PRODUCTS_PER_PAGE,\n\
  \    ':start_page' => $start_item\n);\n\n// 准备并执行查询，然后返回结果\n$result = DatabaseHandler::Prepare($sql);\n\
  $search_result['products'] = DatabaseHandler::GetAll($result, $params);\nreturn\
  \ $search_result;\n```\n\n## 工作原理：业务层的搜索方法\n\n`FlagStopWords`方法的主要目的是分析哪些单词将用于搜索，哪些不会。\n\
  \nPostgreSQL 的全文搜索功能默认会自动过滤少于四个字母的单词，你在业务层中无需干预此行为。不过，你需要找出哪些单词会被 PostgreSQL 忽略，以便告知访客。\n\
  \n业务层的 `Search` 方法由表示层调用，并带有以下参数（注意除第一个参数外，其余参数与数据层 `Search` 方法的参数相同）：\n\n- `$searchString`\
  \ 包含访客输入的搜索字符串。\n- `$allWords` 为 “on” 时表示全词搜索。\n- `$pageNo` 表示所请求的产品页数。\n- `$rHowManyPages`\
  \ 表示总页数。\n\n该方法以关联数组的形式将结果返回给表示层。\n\n## 实现表示层\n\n目录搜索功能包含两个需要实现的独立界面元素：\n\n- 一个名为\
  \ `search_box` 的组件化模板，其作用是为访客提供输入搜索字符串的途径（请参考图 5-1）。\n- 一个名为 `search_results` 的组件化模板，用于显示与搜索条件匹配的产品（请参考图\
  \ 5-2）。\n\n你将通过两个独立的练习来创建这两个组件化模板。\n\n### 创建搜索框\n\n按照练习中的步骤构建 `search_box` 组件化模板，并将其集成到\
  \ HatShop 中。\n\n\n\n"
- "# 练习：创建组件化模板 `search_box`\n\n## 1. 在 `presentation/templates` 文件夹中新建一个名为 `search_box.tpl`\
  \ 的模板文件，并向其中添加以下代码：\n\n```\n{* search_box.tpl *}\n{load_search_box assign=\"search_box\"\
  }\n{* 搜索框开始 *}\n<div class=\"left_box\" id=\"search_box\">\n<p>搜索目录</p>\n<form action={\"\
  index.php\"|prepare_link:\"http\"}>\n<input maxlength=\"100\" id=\"Search\" name=\"\
  Search\"\nvalue=\"{$search_box->mSearchString}\" size=\"23\" />\n<input type=\"\
  submit\" value=\"搜索!\" /><br />\n<input type=\"checkbox\" id=\"AllWords\" name=\"\
  AllWords\"\n{if $search_box->mAllWords == \"on\" } checked=\"checked\" {/if}/> 搜索所有单词\n\
  </form>\n</div>\n{* 搜索框结束 *}\n```\n\n## 2. 在 `presentation/smarty_plugins` 文件夹中新建一个名为\
  \ `function.load_search_box.php` 的 Smarty 函数插件文件，并包含以下代码：\n\n```\n<?php\n// 插件文件中的插件函数必须命名为：smarty_type_name\n\
  function smarty_function_load_search_box($params, $smarty)\n{\n  // 创建 SearchBox\
  \ 对象\n  $search_box = new SearchBox();\n  // 分配模板变量\n  $smarty->assign($params['assign'],\
  \ $search_box);\n}\n\n// 管理搜索框\nclass SearchBox\n{\n  // Smarty 模板的公共变量\n  public\
  \ $mSearchString = '';\n  public $mAllWords = 'off';\n\n  // 类构造函数\n  public function\
  \ __construct()\n  {\n    if (isset ($_GET['Search']))\n      $this->mSearchString\
  \ = $_GET['Search'];\n\n    if (isset ($_GET['AllWords']))\n      $this->mAllWords\
  \ = $_GET['AllWords'];\n  }\n}\n?>\n```\n\n## 3. 将 `search_box` 模板文件所需的以下样式添加到 `hatshop.css`\
  \ 文件中：\n\n```\n#search_box\n{\n  border: 1px solid #0583b5;\n}\n#search_box p\n\
  {\n  background: #0583b5;\n}\nform\n{\n  margin: 2px;\n}\ninput\n{\n  font-family:\
  \ tahoma, verdana, arial;\n  font-size: 11px;\n}\n```\n\n## 4. 修改 `index.tpl` 文件以加载新创建的模板文件：\n\
  \n```\n...\n{include file=\"departments_list.tpl\"}\n{include file=\"$categoriesCell\"\
  }\n{include file=\"search_box.tpl\"}\n...\n```\n\n## 5. 在浏览器中加载你的项目，你会看到搜索框完美地放置在它该在的位置（参见图\
  \ 5-1）。\n\n## 工作原理：组件化模板 `search_box`\n\n到目前为止，你应该已经熟悉了我们如何将函数插件与 Smarty 模板结合使用。在本例中，我们使用插件来维护执行搜索后搜索框的状态。当点击“搜索！”按钮重新加载页面时，我们希望保留文本框中输入的字符串，同时保持\
  \ `AllWords` 复选框的状态。\n\n`load_search_box` 函数插件只是保存了 `Search` 和 `AllWords` 查询字符串参数的值，同时检查这些参数是否确实存在于查询字符串中。这些值随后在\
  \ `search_box.tpl` Smarty 模板中被用于恢复之前的状态。\n\n请注意，我们本可以通过使用 `$smarty.get.Search` 和\
  \ `$smarty.get.AllWords` 读取 `Search` 和 `AllWords` 查询字符串参数的值来实现此功能，而无需使用插件。然而，使用插件能让你更好地控制整个流程，并且还能避免在提及的参数不存在于查询字符串中时生成警告。\n\
  \n## 显示搜索结果\n\n在下一个练习中，你将创建用于显示搜索结果的组件化模板。\n\n为了简化工作，你可以重用 `product_list` 组件化模板来显示实际的产品列表。这正是我们迄今为止用于主页、部门和类别产品列表的组件化模板。当然，如果你希望以其他格式显示搜索结果，则必须创建另一个用户控件。\n\
  \n\n\n你需要修改产品列表（`products_list.php`）的 `templates-logic` 文件，使其能够识别何时被调用以显示搜索结果，从而调用业务层的正确方法来获取产品列表。\n\
  \n在接下来的练习中，我们来创建 `search_result` 模板，并更新 `products_list` 组件化模板的 `templates-logic`\
  \ 文件。\n\n## 练习：创建 `search_results` 组件化模板\n\n**1.** 在 `presentation/templates` 目录中创建一个名为\
