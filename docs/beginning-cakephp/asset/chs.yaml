  \n### 使用 Tree 行为的其他函数\n\n与 `children()` 函数类似，`Tree` 行为的其他函数可以通过引用模型，在模型或控制器中调用。在控制器中，通过输入模型名称并调用所需的\
  \ `Tree` 行为函数来实现，*而不要*输入行为名称：\n\n```\n$this->Model->children($id); // 这种方式可行\n$this->Model->Tree->children($id);\
  \ // 这种方式不可行\n```\n\n在模型中，模型名称被省略，就像引用其他模型函数一样，例如：\n\n```\n$this->children($id);\
  \ // 这种方式可行\n$this->Tree->children($id); // 这种方式不可行\n$this->Model->children($id);\
  \ // 这种方式也不可行\n```\n\n#### childCount\n\n`childCount()` 函数返回给定父 ID 的子节点数量。\n\n**`childCount(\
