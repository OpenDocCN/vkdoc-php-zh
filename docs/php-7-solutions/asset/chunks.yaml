    \ && !$_POST) {\n    // prepare SQL query\n    $sql = 'SELECT article_id, image_id,\
    \ title, article FROM blog\n    WHERE article_id = ?';\n    $stmt = $conn->prepare($sql);\n\
    \    // pass the placeholder value to execute() as a single-element array\n  \
    \  $OK = $stmt->execute([$_GET['article_id']]);\n    // bind the results\n   \
    \ $stmt->bindColumn(1, $article_id);\n    $stmt->bindColumn(2, $image_id);\n \
    \   $stmt->bindColumn(3, $title);\n    $stmt->bindColumn(4, $article);\n    $stmt->fetch();\n\
    }\n```\n\n2. 在表单内部，需要显示 `images` 表中存储的文件名。由于第二个 `SELECT` 语句不依赖于外部数据，使用 `query()`\
    \ 方法比预处理语句更简单。在 `article` 文本区域之后添加以下代码（所有代码都是新增的，但 PHP 部分以加粗显示以便参考）：\n\n```\n\
    Uploaded image:\n\nSelect image\n    query($getImages) as $row) {\n    ?>\n  \
    \  \"\n    >\n\n```\n\n第一个 `<option>` 标签硬编码了标签 `Select image`，其 `value` 设置为空字符串。其余\
    \ `<option>` 标签由 `foreach` 循环填充，该循环执行 `$getImages SELECT` 查询并将每条记录提取到名为 `$row`\
    \ 的数组中。\n"
- fmt: "# Conditional Statement and Database Queries\n\n## Conditional Statement for\
    \ Image Selection\n\nA conditional statement checks whether the current `image_id`\
    \ is the same as the one already stored in the `articles` table. If it is, `selected`\
    \ is inserted into the `<option>` tag so that it displays the correct value in\
    \ the drop-down menu.\n\nMake sure you don’t omit the third character in the following\
    \ line:\n\n```\n    ?>>\n```\n\nIt’s the closing angle bracket of the `<option>`\
    \ tag, sandwiched between two PHP tags.\n\n## Saving and Testing the Page\n\n\
    3. Save the page and load it into a browser. You should be automatically redirected\
    \ to `blog_list_pdo.php`. Select one of the `EDIT` links, and make sure that your\
    \ page looks like Figure [17-4](#332054_4_En_17_Chapter.xhtml#Fig4). Check the\
    \ browser source code view to verify that the value attributes of the `<option>`\
    \ tags contain the primary key of each image.\n\n4. The final stage is to add\
    \ the `image_id` to the `UPDATE` query. When a blog entry isn’t associated with\
    \ an image, you need to enter `null` in the `image_id` column. This involves changing\
    \ the way the values are bound to the anonymous placeholders in the prepared statement.\
    \ Instead of passing them as an array to the `execute()` method, you need to use\
    \ `bindValue()` and `bindParam()`. The revised code looks like this:\n\n```\n\
    \    // if form has been submitted, update record\n    if (isset($_POST['update']))\
    \ {\n    // prepare update query\n    $sql = 'UPDATE blog SET image_id = ?, title\
    \ = ?, article = ?\n    WHERE article_id = ?';\n    $stmt = $conn->prepare($sql);\n\
    \    if (empty($_POST['image_id'])) {\n    $stmt->bindValue(1, NULL, PDO::PARAM_NULL);\n\
    \    } else {\n    $stmt->bindParam(1, $_POST['image_id'], PDO::PARAM_INT);\n\
    \    }\n    $stmt->bindParam(2, $_POST['title'], PDO::PARAM_STR);\n    $stmt->bindParam(3,\
    \ $_POST['article'], PDO::PARAM_STR);\n    $stmt->bindParam(4, $_POST['article_id'],\
    \ PDO::PARAM_INT);\n    // execute query\n    $done = $stmt->execute();\n    }\n\
    ```\n\nThe values are bound to the anonymous placeholders using numbers, counting\
    \ from 1, to identify which placeholder they should be applied to. A conditional\
    \ statement checks whether `$_POST['image_id']` is empty. If it is, `bindValue()`\
    \ sets the value to `null`, using the keyword `NULL` as the second argument and\
    \ a PDO constant as the third argument. As explained in \"Embedding variables\
    \ in PDO prepared statements\" in Chapter [13](#332054_4_En_13_Chapter.xhtml),\
    \ you need to use `bindValue()` when the value being bound is anything other than\
    \ a variable.\n\nThe remaining values are all variables, so they’re bound using\
    \ `bindParam()`. I’ve used the PDO constants for integer and string for the remaining\
    \ values. This isn’t strictly necessary, but it makes the code clearer.\n\nFinally,\
    \ the array of values has been removed from between the parentheses of the `execute()`\
    \ method.\n\n5. Test the page again, select a filename from the drop-down menu,\
    \ and click `Update Entry`. You can verify whether the foreign key has been inserted\
    \ into the `articles` table by refreshing `Browse` in phpMyAdmin or by selecting\
    \ the same article for updating. This time, the correct filename should be displayed\
    \ in the drop-down menu.\n\nCheck your code against `blog_update_pdo_04.php` in\
    \ the `ch17` folder, if necessary.\n\n## Selecting Records from Multiple Tables\n\
    \nThere are several ways to link tables in a `SELECT` query, but the most common\
    \ is to list the table names, separated by `INNER JOIN`. On its own, `INNER JOIN`\
    \ produces all possible combinations of rows (a Cartesian join). To select only\
    \ related values, you need to specify the primary-key/foreign-key relationship.\
    \ For example, to select articles and their related images from the `blog` and\
    \ `images` tables, you can use a `WHERE` clause, like this:\n\n```\nSELECT title,\
    \ article, filename, caption\nFROM blog INNER JOIN images\nWHERE blog.image_id\
    \ = images.image_id\n```\n\nThe `title` and `article` columns exist only in the\
    \ `blog` table. Likewise, `filename` and `caption` exist only in the `images`\
    \ table. They’re unambiguous and don’t need to be qualified. However, `image_id`\
    \ exists in both tables, so you need to prefix each reference with the table name\
    \ and a period.\n\nFor many years, it was common practice to use a comma in place\
    \ of `INNER JOIN`, like this:\n\n```\nSELECT title, article, filename, caption\n\
    FROM blog, images\nWHERE blog.image_id = images.image_id\n```\n\n> **Caution**:\
    \ Using a comma to join tables can result in SQL syntax errors because of changes\
    \ made to the way joins are handled since MySQL 5.0.12. Use `INNER JOIN` instead.\n\
    \nInstead of a `WHERE` clause, you can use `ON`, like this:\n\n```\nSELECT title,\
    \ article, filename, caption\nFROM blog INNER JOIN images ON blog.image_id = images.image_id\n\
    ```\n\nWhen both columns have the same name, you can use the following syntax,\
    \ which is my personal preference:\n\n```\nSELECT title, article, filename, caption\n\
    FROM blog INNER JOIN images USING (image_id)\n```\n\n> **Note**: The column name\
    \ after `USING` must be in parentheses.\n\n## PHP Solution 17-4: Building the\
    \ Details Page\n\nThis PHP solution shows how to join the `blog` and `images`\
    \ tables to display a selected article with its associated photo. The code for\
    \ MySQLi and PDO is almost identical, so this solution covers both.\n\n1. Copy\
    \ `details_01.php` from the `ch17` folder to the `phpsols-4e` site root and rename\
    \ it `details.php`. Do not update the links if your editing environment prompts\
    \ you to do so. Make sure that `footer.php` and `menu.php` are in the `includes`\
    \ folder, and load the page in a browser. It should look like Figure [17-5](#332054_4_En_17_Chapter.xhtml#Fig5).\n\
    \n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig5_HTML.jpg](images/332054_4_En_17_Chapter/332054_4_En_17_Fig5_HTML.jpg)\n\
    \n*Figure 17-5. The details page contains a placeholder image and text*\n\n2.\
    \ Load `blog_list_mysqli.php` or `blog_list_pdo.php` into a browser and update\
    \ the following three articles by assigning the image filename as indicated:\n\
    \n   * Basin of Contentment: `basin.jpg`\n   * Tiny Restaurants Crowded Together:\
    \ `menu.jpg`\n   * Trainee Geishas Go Shopping: `maiko.jpg`\n\n3. Navigate to\
    \ the `blog` table in phpMyAdmin and click the `Browse` tab to check that the\
    \ foreign keys have been registered. At least one article should have `NULL` as\
    \ the value for `image_id`, as shown in Figure [17-6](#332054_4_En_17_Chapter.xhtml#Fig6).\n\
    \n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig6_HTML.jpg](images/332054_4_En_17_Chapter/332054_4_En_17_Fig6_HTML.jpg)\n\
    \n*Figure 17-6. The foreign key of the article not associated with an image is\
    \ set to NULL*\n\n4. Before attempting to display an image, we need to make sure\
    \ that it comes from where we expect and that it is actually an image. Create\
    \ a variable at the top of `details.php` to store the relative path to the images\
    \ directory (complete with trailing slash) like this:\n\n```\n    // Relative\
    \ path to image directory\n    $imageDir = './images/';\n```\n\n5. Next, include\
    \ `utility_funcs.php` from the previous chapter (if necessary, copy it from the\
    \ `ch16` folder to the `includes` folder). Then include the database connection\
    \ file, create a read-only connection, and prepare the SQL query inside a PHP\
    \ code block above the `DOCTYPE` declaration, like this."
