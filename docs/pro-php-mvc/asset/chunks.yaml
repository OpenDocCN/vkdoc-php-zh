    **Chapter 8**


    **Templates**


    At the heart of MVC is separation of concerns, and nowhere in our framework is
    that more important than between the view and the controller. Typically, when
    one thinks about the front end (or client side) of an application, they think
    of HTML, CSS, and JavaScript. Throw in server-side interaction, and an unavoidable
    portion of PHP enters the picture.


    What’s worse is we will often need to work with data, supplied to us by the controller,
    using PHP directly in our views. Many people have tried solving this problem with
    template languages (and parsers). It might not make a whole lot of sense—substituting
    PHP for yet another intermediary dialect—but there are advantages. Whether or
    not you choose to use template parsing in your framework, it remains a good exercise
    in the kind of analytical thinking required to build your own framework.


    Goals


    • We need to define a dialect on which to base our template parser. A dialect
    is simply another word for the grammar or commands by which a template can be
    defined.


    • We need to formalize this dialect into a template implementation class.


    • We need to build a template parser class that utilizes the template implementation
    class in order to convert template strings to parsed templates.


    Idea


    In order to build a functional template parser, we first need to define how it
    should work. It should accept a standardized template language, yet be flexible
    to change. It should be fast. It should not require a lot of learning before one
    can use it. Take a look at our basic template dialect in Listing 8-1.


    ***Listing 8-1.*** Basic Template Dialect


    {if $name && $address}


    name: {echo $name}


    address: {echo $address}


    {/if}


    {elseif $name}


    name: {echo $name}


    {/elseif}


    {else}


    no name or address


    {/else}


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 8 ■ TEmPlATEs


    {foreach $value in $stack}


    value: {echo $value}


    {/foreach}


    {else}


    no values in $stack


    {/else}


    Listing 8-1 demonstrates the kind of templates we are likely to need to parse
    in our views. We will need to jump through a few hoops before this becomes more
    than theoretical.


    Alternatives


    Creating our own template parser is merely a learning exercise. There are already
    so many good, free template libraries for PHP that it would make little to no
    sense trying to create another competing standard unless what we were creating
    was truly unique. If you are keen to see what’s available, take a look at Smart[y
    (www.smarty.net)](http://www.smarty.net)


    and Twi[g (http://twig.sensiolabs.org).](http://twig.sensiolabs.org)


