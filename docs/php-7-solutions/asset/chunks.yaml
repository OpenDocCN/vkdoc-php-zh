  trans: "\n# 一起来约会吧\n\n日期和时间对现代生活如此重要，以至于我们很少停下来思考它们有多复杂。每分钟有 60 秒，每小时有 60 分钟，但每天有\
    \ 24 小时。月份的天数在 28 到 31 天之间变化，而一年要么是 365 天，要么是 366 天。混乱还不止于此，因为 7 月 4 日对美国或日本人来说是\
    \ 7/4，但对欧洲人来说是 4 月 7 日。更令人困惑的是，PHP 处理日期的方式与 MySQL 不同。是时候拨乱反正了……\n\n> **备注**：MariaDB\
    \ 处理日期的方式相同。为避免不必要的重复，我将仅提及 MySQL。\n\n## MySQL 如何处理日期\n\n在 MySQL 中，日期和时间始终按从大到小的降序表示：年、月、日、时、分、秒。小时始终使用\
    \ 24 小时制，午夜表示为`00:00:00`。即使这对你来说似乎不熟悉，但这也是国际标准化组织（ISO）推荐的标准。MySQL 允许在单位之间的分隔符方面有相当大的灵活性（任何标点符号都可以接受），但顺序是确定的，不可更改。如果你尝试以年、月、日以外的任何格式存储日期，MySQL\
    \ 会在数据库中插入 `0000-00-00`。\n\n稍后我会回过头来讨论如何向 MySQL 插入日期，因为最好使用 PHP 来验证和格式化它们。首先，让我们看看日期存储在\
    \ MySQL 后，你可以用它做些什么。MySQL 有许多日期和时间函数，在 [`https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html`](https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html)\
    \ 上有列表和示例。最有用的函数之一是 `DATE_FORMAT()`，它名副其实。\n\n### 在 `SELECT` 查询中使用 `DATE_FORMAT()`\
    \ 格式化日期\n\n`DATE_FORMAT()` 的语法如下：\n\n```\nDATE_FORMAT(date, format)\n```\n\n通常，*date*\
    \ 是要格式化的表列，而 *format* 是由格式化说明符和你希望包含的任何其他文本组成的字符串。表 16-1 列出了最常见的说明符，所有这些说明符都区分大小写。\n\
    \n**表 16-1. 常用的 MySQL 日期格式说明符**\n\n| 时间段 | 说明符 | 描述 | 示例 |\n| --- | --- | ---\
    \ | --- |\n| 年 | `%Y` | 四位数字格式 | 2014 |\n| | `%y` | 两位数字格式 | 14 |\n| 月 | `%M`\
    \ | 完整名称 | January, September |\n| | `%b` | 缩写名称，三个字母 | Jan, Sep |\n| | `%m` |\
    \ 带前导零的数字 | 01, 09 |\n| | `%c` | 不带前导零的数字 | 1, 9 |\n| 月中日 | `%d` | 带前导零 | 01,\
    \ 25 |\n| | `%e` | 不带前导零 | 1, 25 |\n| | `%D` | 带英文文本后缀 | 1st, 25th |\n| 工作日名称\
    \ | `%W` | 完整文本 | Monday, Thursday |\n| | `%a` | 缩写名称，三个字母 | Mon, Thu |\n| 小时\
    \ | `%H` | 带前导零的 24 小时制 | 01, 23 |\n| | `%k` | 不带前导零的 24 小时制 | 1, 23 |\n| | `%h`\
    \ | 带前导零的 12 小时制 | 01, 11 |\n| | `%l` (小写“L”) | 不带前导零的 12 小时制 | 1, 11 |\n| 分钟\
    \ | `%i` | 带前导零 | 05, 25 |\n| 秒 | `%S` | 带前导零 | 08, 45 |\n| 上午/下午 | `%p` | | |\n\
    \n如前所述，在 SQL 查询中使用函数时，需要使用 `AS` 关键字将结果赋给一个别名。参考表 16-1，你可以将 `blog` 表中 `created`\
    \ 列的日期格式化为常见的美国样式，并赋给一个别名，如下所示：\n\n```\nDATE_FORMAT(created, '%c/%e/%Y') AS date_created\n\
    ```\n\n要以欧洲样式格式化相同的日期，请反转前两个说明符，如下所示：\n\n```\nDATE_FORMAT(created, '%e/%c/%Y')\
    \ AS date_created\n```\n\n> **提示**：使用 `DATE_FORMAT()` 时，不要使用原始列名作为别名，因为值会被转换为字符串，这会严重扰乱排序顺序。选择不同的别名，并使用原始列名对结果进行排序。\n\
    \n### PHP 解法 16-2：格式化 MySQL 日期或时间戳\n\n此 PHP 解法对第 15 章博客条目管理页面中的日期进行格式化。\n\n1.\
    \ 在 `admin` 文件夹中打开 `blog_list_mysqli.php` 或 `blog_list_pdo.php`，并找到 SQL 查询。它看起来像这样：\n\
    \n   ![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig4_HTML.jpg](img/332054_4_En_16_Fig4_HTML.jpg)\n\
    \n   **图 16-4.** MySQL 时间戳现在已格式整齐\n\n2. 如下所示进行修改：\n\n   ```sql\n   $sql = 'SELECT\
    \ article_id, title,\n   DATE_FORMAT(created, \"%a, %b %D, %Y\") AS date_created\n\
    \   FROM blog ORDER BY created DESC';\n   ```\n\n   我在整个 SQL 查询周围使用了单引号，因此 `DATE_FORMAT()`\
    \ 内部的格式字符串需要使用双引号。\n\n   确保 `DATE_FORMAT()` 的左括号前没有空格。\n\n   格式字符串以 `%a` 开头，它显示工作日名称的前三个字母。如果使用原始列名作为别名，`ORDER\
    \ BY` 子句将按反向字母顺序对日期排序：Wed、Thu、Sun，等等。使用不同的别名可以确保日期仍按时间顺序排列。\n\n3. 在页面正文的第一个表格单元格中，将\
    \ `$row['created']` 更改为 `$row['date_created']`，以匹配 SQL 查询中的别名。\n\n4. 保存页面并将其加载到浏览器中。现在日期应格式化如图\
    \ 16-4 所示。尝试使用其他说明符以满足你的偏好。\n\n```sql\n$sql = 'SELECT * FROM blog ORDER BY created\
    \ DESC';\n```\n\n`blog_list_mysqli.php` 和 `blog_list_pdo.php` 的更新版本位于 `ch16` 文件夹中。\n\
    \n## 日期的加减运算\n\n处理日期时，添加或减去特定时间段通常很有用。例如，你可能希望显示过去 7 天内添加到数据库的项目，或者停止显示超过 3 个月未更新的文章。MySQL\
    \ 通过 `DATE_ADD()` 和 `DATE_SUB()` 使这变得简单。这两个函数分别有同义词 `ADDDATE()` 和 `SUBDATE()`。\n\
    \n它们的基本语法相同，如下所示：\n\n```\nDATE_ADD(date, INTERVAL value interval_type)\n```\n\n\
    使用这些函数时，*date* 可以是包含要更改日期的列、包含特定日期（采用 `YYYY-MM-DD` 格式）的字符串，或 MySQL 函数（如 `NOW()`）。`INTERVAL`\
    \ 是一个关键字，后跟一个值和一个间隔类型，表 16-2 列出了最常见的间隔类型。\n\n**表 16-2. `DATE_ADD()` 和 `DATE_SUB()`\
    \ 最常用的间隔类型**\n\n| 间隔类型 | 含义 | 值格式 |\n| --- | --- | --- |\n| `DAY` | 天数 | 数字 |\n\
    | `DAY_HOUR` | 天和小时 | 以 `'DD hh'` 格式呈现的字符串 |\n| `WEEK` | 周数 | 数字 |\n| `MONTH`\
    \ | 月数 | 数字 |\n| `QUARTER` | 季度数 | 数字 |\n| `YEAR` | 年数 | 数字 |\n| `YEAR_MONTH`\
    \ | 年和月 | 以 `'YY-MM'` 格式呈现的字符串 |\n\n间隔类型是常量，因此不要在 `DAY`、`WEEK` 等末尾添加“S”使其变为复数。\n\
    \n这些函数最有用的应用之一是仅显示表中最近的项目。\n\n### PHP 解法 16-3：显示过去一周内更新的项目\n\n此 PHP 解法展示了如何根据特定时间间隔限制数据库结果的显示。使用\
    \ PHP 解法 16-1 中的 `blog.php`。\n\n1. 在 `blog.php` 中找到 SQL 查询。它看起来像这样：\n\n   ```sql\n\
    \   $sql = 'SELECT * FROM blog ORDER BY created DESC';\n   ```\n\n2. 如下所示进行修改：\n\
    \n   ```sql\n   $sql = 'SELECT * FROM blog\n   WHERE updated > DATE_SUB(NOW(),\
    \ INTERVAL 1 WEEK)\n   ORDER BY created DESC';\n   ```\n\n   这将告诉 MySQL，你只想要过去一周内更新过的项目。\n"
- fmt: "### 3. Save and reload the page in your browser.\nDepending on when you last\
    \ updated an item in the `blog` table, you should see either nothing or a limited\
    \ range of items. If necessary, change the interval type to `DAY` or `HOUR` to\
    \ test that the time limit is working.\n\n### 4. Open `blog_list_mysqli.php` or\
    \ `blog_list_pdo.php`, select an item that isn’t displayed in `blog.php`, and\
    \ edit it.\nReload `blog.php`. The item that you have just updated should now\
    \ be displayed.\n\nYou can compare your code with `blog_limit_mysqli.php` and\
    \ `blog_limit_pdo.php` in the `ch16` folder.\n\n---\n\n## Inserting Dates into\
    \ MySQL\n\nMySQL’s requirement for dates to be formatted as `YYYY-MM-DD` presents\
    \ a headache for online forms that allow users to input dates. As you saw in Chapter\
    \ [15](#332054_4_En_15_Chapter.xhtml), the current date and time can be inserted\
    \ automatically by using a `TIMESTAMP` column. You can also use the MySQL `NOW()`\
    \ function to insert the current date in a `DATE` or `DATETIME` column. It’s when\
    \ you need any other date that problems arise.\n\nThe HTML5 `date` input type\
    \ should, in theory, have solved the problem. Browsers that support date input\
    \ fields usually display a date picker when the field gets focus, and insert the\
    \ date in the local format. There’s an example in `date_test.php` in the `ch16`\
    \ folder. Figure [16-5](#332054_4_En_16_Chapter.xhtml#Fig5) shows how Google Chrome\
    \ displays the date on my computer in the correct European format; but when the\
    \ form is submitted the value is converted to the ISO format. Unfortunately, even\
    \ by early 2019 more than 10 percent of browsers in current use still don’t support\
    \ `date` input fields. They treat them as plain text input.\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig5_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Fig5_HTML.jpg)\n\
    \n**Figure 16-5.** HTML5 date input fields display dates in local format, but\
    \ submit them in the ISO format.\n\nAs a result, using a single input field for\
    \ a date relies on users being trusted to follow a set pattern for inputting dates,\
    \ such as `MM/DD/YYYY`. If everybody complies, you can use the `explode()` function\
    \ to rearrange the date parts, like this:\n\n```php\nif (isset($_POST['theDate']))\
    \ {\n    $date = explode('/', $_POST['theDate']);\n    $mysqlFormat = \"$date[2]-$date[0]-$date[1]\"\
    ;\n}\n```\n\nIf someone deviates from the format, you end up with invalid dates\
    \ in your database. Consequently, the most reliable method of gathering dates\
    \ from an online form remains the use of separate input fields for month, day,\
    \ and year.\n\n---\n\n## PHP Solution 16-4: Validating and Formatting Dates for\
    \ MySQL Input\n\nThis PHP solution concentrates on checking the validity of a\
    \ date and converting it to MySQL format. It’s designed to be incorporated in\
    \ an insert or update form of your own.\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig7_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Fig7_HTML.jpg)\n\
    \n**Figure 16-7.** The date has been validated and converted to ISO format.\n\n\
    ### 1. The code that performs all the checks is a custom function in `utility_funcs.php`.\
    \ It looks like this:\n\n```php\nfunction convertDateToISO($month, $day, $year)\
    \ {\n    $month = trim($month);\n    $day = trim($day);\n    $year = trim($year);\n\
    \    $result[0] = false;\n    if (empty($month) || empty($day) || empty($year))\
    \ {\n        $result[1] = 'Please fill in all fields';\n    } elseif (!is_numeric($month)\
    \ || !is_numeric($day) ||\n              !is_numeric($year)) {\n        $result[1]\
    \ = 'Please use numbers only';\n    } elseif (($month < 1 || $month > 12) || ($day\
    \ < 1 || $day > 31) ||\n              ($year < 1000 || $year > 9999)) {\n    \
    \    $result[1] = 'Please use numbers within the correct range';\n    } elseif\
    \ (!checkdate($month, $day, $year)) {\n        $result[1] = 'You have used an\
    \ invalid date';\n    } else {\n        $result[0] = true;\n        $result[1]\
    \ = sprintf('%d-%02d-%02d', $year, $month, $day);\n    }\n    return $result;\n\
    }\n```\n\nThe function takes three arguments: month, day, and year, all of which\
    \ should be numbers. The first three lines of code trim any whitespace from either\
    \ end of the input, and the next line initializes the first element of an array\
    \ called `$result`. If the input fails validation, the first element of the array\
    \ is `false`, and the second element contains an error message. If it passes validation,\
    \ the first element of `$result` is `true`, and the second element contains the\
    \ formatted date ready for insertion into MySQL.\n\nThe series of conditional\
    \ statements checks the input values to see if they are empty or not numeric.\
    \ The third test looks for numbers within acceptable ranges. The range for years\
    \ is dictated by the legal range for MySQL. In the unlikely event that you need\
    \ a year out of that range, you must choose a different column type to store the\
    \ data.\n\nBy using a series of `elseif` clauses, this code stops testing as soon\
    \ as it meets the first mistake. Even though the form is prepopulated with values,\
    \ there’s no guarantee that the input will come from your form. It could come\
    \ from an automated script, which is why these checks are necessary.\n\nIf the\
    \ input has survived the first three tests, it’s then subjected to the PHP function\
    \ `checkdate()`, which is smart enough to know when it’s a leap year and prevents\
    \ mistakes such as September 31.\n\nFinally, if the input has passed all these\
    \ tests, it’s rebuilt in the correct format for insertion into MySQL using the\
    \ `sprintf()` function. This takes as its first argument a formatting string,\
    \ in which `%d` represents an integer and `%02d` represents a two-digit integer\
    \ padded with a leading zero if necessary. The hyphens are treated literally.\
    \ The following three arguments are the values to be slotted into the formatting\
    \ string. This produces the date in ISO format, with leading zeros on the month\
    \ and day.\n\n**Note** See [`www.php.net/manual/en/function.sprintf.php`](http://www.php.net/manual/en/function.sprintf.php)\
    \ for `sprintf()` details.\n\n### 2. For testing purposes, add this code just\
    \ below the form in the main body of the page:\n\n```php\nif (isset($_POST['convert']))\
    \ {\n    $converted = convertDateToISO($_POST['month'], $_POST['day'],\n     \
    \                             $_POST['year']);\n    if ($converted[0]) {\n   \
    \     echo 'Valid date: ' . $converted[1];\n    } else {\n        echo 'Error:\
    \ ' . $converted[1] . '';\n        echo 'Input was: ' . $months[$_POST['month']-1]\
    \ . ' ' .\n             safe($_POST['day']) . ', ' . safe($_POST['year']);\n \
    \   }\n}\n```\n\nThis checks whether the form has been submitted. If it has been,\
    \ it passes the form values to the `convertDateToISO()` function, saving the result\
    \ in `$converted`.\n\nIf the date is valid, `$converted[0]` is `true`, and the\
    \ formatted date is found in `$converted[1]`. If the date cannot be converted\
    \ to ISO format, the `else` block displays the error message stored in `$converted[1]`,\
    \ together with the original input. To display the correct value for the month,\
    \ 1 is subtracted from the value of `$_POST['month']`, and the result is used\
    \ as the key for the `$months` array. The values of `$_POST['day']` and `$_POST['year']`\
    \ are passed to the `safe()` function as a precaution against the form being used\
    \ for a remote exploit.\n\n### 3. Save the page and test it by entering a date\
    \ and clicking Convert.\nIf the date is valid, you should see it converted to\
    \ ISO format, as shown in Figure [16-7](#332054_4_En_16_Chapter.xhtml#Fig7).\n\
    \n### 4. Create a page called `date_converter.php` and insert a form containing\
    \ the following code (or use `date_converter_01.php` in the `ch16` folder):\n\n\
    ```html\n<form>\n    Month: <input type=\"text\" name=\"month\"><br>\n    Date:\
    \ <input type=\"text\" name=\"day\"><br>\n    Year: <input type=\"text\" name=\"\
    year\"><br>\n    <input type=\"submit\" name=\"convert\" value=\"Convert\">\n\
    </form>\n```"
