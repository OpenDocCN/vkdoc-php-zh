    现在，我们可以查询、处理和输出很多信息了。然而，我们仍然缺少编程的一个重要特性：数据的存储以及将来检索数据的技术。


    大多数 PHP 项目使用 SQL 数据库。在每个数据库中，数据存储在表中。就像 MS Excel 一样，每个表由单独的列和行组成。在本章中，我们将学习如何访问各个值。


    ### 在 PHP 中连接到数据库


