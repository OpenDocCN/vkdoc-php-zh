    C H A P T E R 8


    Implementing Ajax Features


    **I**nrecent years Ajax has become a more common method for handling requests
    among popular web sites. In short, Ajax makes it possible for the user to interact
    with the web site without waiting for the page to load or refresh. By working
    with HTTP requests this way, the web site behaves more like a desktop application.
    Methods that were thought to be impossible for web browsers have not only changed
    the Internet landscape but are turning the tides on software development. Many
    developers call this phenomenon the rise of “Web 2.0.” However, building a rich
    Web 2.0 application is no simple task and usually requires a heavy dose of JavaScript.


    With Cake’s help, you can bring common Ajax procedures into an application without
    much headache, and the amount of JavaScript you will have to use is minimized.


    In this chapter, you will use the Ajax helper to build a comments section for
    your extensive blog application. Users will be able to add comments and vote other
    users’ comments up or down, all without waiting for the page to reload or refresh.
    Along the way, I’ll mention the possibilities of the Ajax helper and also introduce
    some Ajax methods that go beyond the scope of this helper. This chapter won’t
    dive into all the possibilities Ajax provides, simply because that could be a
    book all by itself, but it will explain how Ajax can work in a Cake application
    and open up the door to other more complex methods you can try on your own.


    Let’s first examine how Ajax is supposed to work and then use it to improve your
    blog.


    **How Ajax Works**


    In Chapter 6 I discussed asynchronous sequences and how Cake uses the render()
    function to pull a view without loading the whole page. In your blog application,
    you’ll use Ajax to manage comment submissions in this way, meaning that the user
    will submit a comment, and they will see the comment post to the page instantly.
    In other words, the comments form will disappear, the text of the comment will
    appear below any other previously posted comments, and everything else on the
    page will remain in place. Figure 8-1 shows how Ajax works behind the scenes to
    add comments to a given post.


