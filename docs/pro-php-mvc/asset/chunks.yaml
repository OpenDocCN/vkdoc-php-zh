  raw: 'It is important to note that, out of the three frameworks we are focusing
    on, Zend Framework handles routes in a manner most similar to how our framework
    does. The important differences are that Zend Framework’s router class is a singleton,
    where ours is managed by a registry, and that Zend Framework’s routes are all
    named.


    If you try to access any of these new routes you will see an error. This is because
    we have not yet created the corresponding controllers, actions, and so forth.
    In Chapter 27, we will create the controllers, models, and views required for
    most of these routes to function correctly.


    ■ **Note** You can find more details about Zend Framework routing a[t](http://framework.zend.com/manual/en/zend.controller.router.html)


    [http://framework.zend.com/manual/en/zend.controller.router.html](http://framework.zend.com/manual/en/zend.controller.router.html).


    Questions


    1\. Why should we add routes in the Zend_Application_Bootstrap_Bootstrap class?


    Can’t we simply define them in the public/index.php file?


    2\. Can you think of some ways in which automated build scripts (such as the one
    we used in this chapter) could speed up application development?


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 26 ■ ZEnd FRAmEwoRk: BooTsTRAPPing


    Answers


    1\. There is no hard and fast rule here. It’s simply one of the ways in which
    Zend recommends the addition of custom routes. There is nothing stopping us from
    adding routes directly in the public/index.php file if we wanted to.


    2\. Apart from creating the initial structure of an application, automated build
    scripts could be used to create additional controllers, models, or even views.
    The Zend


    Framework command line tools can do all of these things.


    Exercises


    1\. In this chapter, we created all the routes our example application requires.
    Now try creating a route that uses a username to invoke the users/profile action.


    2\. Having all these routes without any controllers and actions isn’t very helpful
    to us.


    Try creating a controller and action to handle a few of the routes we defined.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Chapter 27**


    **Zend Framework: MVC**


    Zend Framework is much closer to our framework than CodeIgniter, in terms of the
    tools it offers us with which to build a sample application. We’ve already seen
    the similarities between Zend Framework’s routing system and that of our framework,
    but it also has an ORM system similar to our own. We will come to appreciate these
    things as we use them in this chapter.


    Goals


    We need to recognize the differences between our framework and Zend Framework
    when it comes to creating the controllers, models, and views for our example application.


    • We need to create the models for users, friends, files, and messages.


    • We need to create the corresponding views and controllers.


    The Differences


    Of the frameworks on which this book focuses, Zend Framework is actually the most
    similar to our framework.


    Where they differ, among other things, is how closely they follow the MVC pattern.
    It might be tempting to think that our framework does it better, but Zend has
    actually chosen a loosely coupled model for Zend Framework, and it is visible
    right out of the gate. You do not download an MVC framework, neatly organized
    in a familiar folder structure. Rather, you download a collection of classes that
    work really well when the MVC pattern is applied to them.


    Because of this, it will seem like we are writing more code than we required getting
    our own framework to perform the equivalent actions concerning users, friends,
    files, and messages. This is simply because our framework couples things like
    the ORM and controllers more tightly than Zend Framework couples its ORM


    and controllers.


    Models


    We will begin our model work by looking at a few of the ways in which we can use
    Zend Framework’s ORM to select and modify database records. Before we can alter
    the database records, we need to define the database tables our application will
    be using. For now, we need only the user table, which is shown in Listing 27-1.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 27 ■ ZEnd FRAmEwoRk: mVC


    ***Listing 27-1.*** The user Table


    CREATE TABLE ''user'' (


    ''id'' int(11) NOT NULL AUTO_INCREMENT,


    ''live'' tinyint(4) DEFAULT NULL,


    ''deleted'' tinyint(4) DEFAULT NULL,


    ''created'' datetime DEFAULT NULL,


    ''modified'' datetime DEFAULT NULL,


    ''first'' varchar(32) DEFAULT NULL,


    ''last'' varchar(32) DEFAULT NULL,


    ''email'' varchar(100) DEFAULT NULL,


    ''password'' varchar(32) DEFAULT NULL,


    PRIMARY KEY (''id'')


    ) ENGINE = InnoDB DEFAULT CHARSET = utf8 ;


    With this table in place, we can perform database operations, such as the select
    operation shown in Listing 27-2.


    ***Listing 27-2.*** Selecting Rows


    $db = Zend_Db::factory(


    "pdo_mysql",


    array(


    "host" = > "localhost",


    "username" = > "prophpmvc",


    "password" = > "prophpmvc",


    "dbname" = > "prophpmvc-zendframework"


    )


    );


    $table = new Zend_Db_Table(array(


    "name" = > "user",


    "db" = > $db


    ));


    $select = $table- > select()


    - > where("first = ?", "Chris")


    - > order("id ASC");


    $user = $table- > fetchRow($select);


    The first two statements aren’t specific to selecting rows, but rather establish
    a connection to the database and request an interface for working with the user
    table. We will shortly move them to a better place, but it’s important to understand
    how they work.


    The Zend_Db factory class is used simply to return an instance of a database adapter,
    in a manner quite similar to our own database factory class. The Zend_Db_Table
    class likewise returns an interface with which to query/manipulate the user database
    table we created previously. It supports a similar query interface to our framework
    and CodeIgniter.


    Listing 27-3 demonstrates how we can modify the user rows.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 27 ■ ZEnd FRAmEwoRk: mVC


    ***Listing 27-3.*** Modifying User Rows


    $id = $table->insert(array(


    "first" => "Joe",


    "last" => "Blogs",


    "email" => "joe@example.com",


    "password" => "password",


