  \n![A978-1-4842-1672-9_1_Fig23_HTML.jpg](img/A978-1-4842-1672-9_1_Fig23_HTML.jpg)\n\
  \n*图 1-23. 成功安装 WampServer 后，浏览器显示服务器配置*\n\n恭喜，您的 WampServer 已成功安装。这也意味着 Apache、MySQL\
