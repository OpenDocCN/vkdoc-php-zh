    # CHAPTER 4


    Naming Files and Designing the Database


    In the previous chapter, I discussed how Cake was able to wrap some standard web
    functionality around the database structure to produce a to-do list application.
    Although you could change some things in the application to improve the user experience,
    overall Cake handles the typical operations of adding, deleting, editing, and
    viewing records in the database without much code. This is possible because of
    an important aspect of Cake: *convention.* Because you followed Cake’s conventions
    when naming and setting up the database table, when creating the model and controller
    files, and when entering the URL in the browser to run the application, Cake was
    able to piece together your various operations and deliver a handy web program
    in little time.


    ## Convention Over Configuration


    Cake’s developers adhered to “convention over configuration” when building the
    core, meaning they intended not only to provide a framework chock-full of features
    and functions but to develop an *overall method* for building web applications.
    In other words, their philosophy is that *how* you go about developing web programs
    is just as important as *what* you are building.


    For example, this is why the `app` folder is structured the way it is—to provide
    conventions for dividing up the operations of the web application into more standardized
    areas and to provide conventions for which parts of the application serve which
    functions. The conventions you learn when using Cake can save you just as much
    time as the useful tools that come with Cake.


    ## Intercepting Cake


    An effective way of visualizing the “convention over configuration” idea is to
    imagine the frame of a house. None of the appliances, wiring, walls, windows,
    or doors is present; only a wood frame that delineates the structure of the house
    is present. If the construction crew was to suddenly assemble the house without
    your input, they would naturally place doors in certain areas, place windows in
    other areas, and finish the walls with particular materials.


    This is how Cake is assembled when the application launches. It has an overall
    convention for how it pieces together the application, and knowing that the main
    objective of the framework is to produce a web-based application, it will automatically
    go about it in a certain way. In dealing with the controllers, for example, Cake
    will render its own scaffold or look for specific view files *unless* you intercept
    it and tell it otherwise.


    09775ch04final 7/1/08 9:40 PM Page 30


    **30**


    C H A P T E R 4 ■ N A M I N G F I L E S A N D D E S I G N I N G T H E D ATA B
    A S E


    Other frameworks such as the Zend Framework and Struts go about building applications
    in a different way. Imagine that the construction crew gave you a catalog of possibilities
    from which to furnish the house, but in the end, they make you do the assembly
    work. Some frameworks give you a large array of functions and tools to use in
    your application but leave the configuration up to you. In a sense, you could
    use these frameworks in any previously built PHP application because they aren’t
    there to supply you with a specific convention; they are just nice collections
    of typical web application operations bundled together.


    Cake, in a sense, is one large (rather blank) PHP *object*, and your job is to
    add, here and there, your custom pieces to that object. This object has the capability
    of providing you with many tools, like the many possible configurations of a house,
    but by default few of these tools are executed. You draw on them as you extend
    objects with your own classes and functions.


    Because of the convention the Cake developers used to build the framework, there
    is an expected method by which you extend Cake’s objects. From naming tables in
    the database to coding large chunks of operations, keep in mind that each time
    you stick to convention, you avoid having to specify with lines of code where
    the different pieces of your application are located and how they should be assembled.


    ## Starting with the Database


    Conventions in Cake begin with the database. If you start with designing how your
    application will store and work with data, then the rest of the code can more
    easily fall into place. If you go wrong, however, then you will most certainly
    discover bugs in the application that will need adjustment to conform to Cake’s
    conventions. Before I show how to build more elaborate Cake applications, I will
    take the time to nail down Cake’s MVC structure and other naming and database
    conventions.


    ## MVC Default Behaviors


    When a Cake application launches, various PHP objects that are already assembled
    in the Cake libraries are run. The advantage of the MVC structure is that models,
    views, and controllers are specifically designed for specific operations. Thus,
    a model, by virtue of being a model and not something else, is automatically expected
    to do some database operations.


    These default operations could be mere placeholders, or they could have some default
    functions, depending on how the framework operates when launched.'
