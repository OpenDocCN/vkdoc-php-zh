  trans: "\n# 第 11 章：用户身份验证与密码存储\n\n第 11 章介绍了使用密码保护网站部分的用户身份验证和会话原理，但所有登录脚本都依赖于存储在\
    \ CSV 文件中的用户名和密码。将用户详细信息存储在数据库**既更安全又更高效**。数据库不仅可以存储用户名和密码列表，还能存储其他详细信息，例如名字、姓氏、电子邮件地址等。数据库还允许你选择使用**哈希处理（单向且不可逆）或加密（双向）**。在本章的第一节中，我们将探讨这两者之间的区别。然后，你将针对这两种存储方式创建注册和登录脚本。\n\
    \n本章涵盖：\n\n*   决定如何存储密码\n*   使用单向密码哈希处理进行用户注册和登录\n*   使用双向加密进行用户注册和登录\n*   解密密码\n\
    \n## 选择密码存储方法\n\n第 11 章中的 PHP 解决方案使用了密码哈希处理——一旦密码被哈希，就无法逆转该过程。这既是一个优点也是一个缺点。它为用户提供了更高的安全性，因为以这种方式存储的密码仍然保密。然而，无法重新发放丢失的密码，因为即使是网站管理员也无法解密它。唯一的解决方案是**重置它**。\n\
    \n另一种方法是使用**密钥加密**。这是一个双向、可逆的过程，依赖于一对函数：一个用于加密密码，另一个用于将其转换回纯文本，从而可以轻松为健忘的用户重新发放密码。双向加密使用一个**密钥**，该密钥被传递给这两个函数以执行转换。这个密钥只是一个你自己构造的字符串。显然，为了确保数据安全，密钥需要足够难以猜测，并且**绝不应存储在数据库中**。但是，你需要将密钥嵌入到注册和登录脚本中——直接嵌入或通过包含文件嵌入——因此，如果你的脚本被暴露，你的安全性将彻底崩溃。\n\
    \nMySQL 和 MariaDB 提供了许多双向加密函数，但 `AES_ENCRYPT()` 被认为是最安全的。它使用美国**政府批准**的**高级加密标准**，具有\
    \ **128 位密钥长度**（AES-128），用于保护最高 SECRET 级别的机密材料（TOP SECRET 材料需要 AES-192 或 AES-256）。\n\
    \n哈希处理和密钥加密各有优缺点。许多安全专家建议密码应经常更改。因此，因为密码无法解密而强迫用户更改忘记的密码，可被视为一项良好的安全措施。另一方面，用户每次忘记现有密码都需要处理一个新密码，这可能会让他们感到沮丧。我将由你根据自身情况决定哪种方法最适合，我将仅专注于技术实现。\n\
    \n## 使用密码哈希处理\n\n为了保持简单，我将使用与第 11 章相同的基本表单，因此数据库中仅存储用户名和哈希后的密码。\n\n### 创建存储用户详细信息的表\n\
    \n在 phpMyAdmin 中，在 `phpsols` 数据库中创建一个名为 `users` 的新表。该表需要三列，设置如表 19-1 所示。\n\n**表\
    \ 19-1. users 表的设置**\n\n| 名称       | 类型      | 长度/值 | 属性       | Null | 索引   \
    \   | A_I |\n|------------|-----------|---------|------------|------|-----------|-----|\n\
    | `user_id`   | `INT`     |         | `UNSIGNED` | 取消选择 | `PRIMARY` | 已选择 |\n\
    | `username`  | `VARCHAR` | `15`    |            | 取消选择 | `UNIQUE`  |     |\n\
    | `pwd`       | `VARCHAR` | `255`   |            | 取消选择 |           |     |\n\n\
    为了确保没有人可以注册已存在的相同用户名，`username` 列被赋予了 `UNIQUE` 索引。用于存储密码的 `pwd` 列允许存储最长 255 个字符的字符串。这比\
    \ `password_hash()` 使用的默认哈希算法所需的 60 个字符长得多。但是，`PASSWORD_DEFAULT` 常量旨在随着 PHP 添加新的、更强的算法而随着时间的推移而改变。因此，建议的大小为\
    \ 255 个字符。\n\n### 在数据库中注册新用户\n\n要在数据库中注册用户，你需要创建一个要求输入用户名和密码的注册表单。`username` 列已定义为\
    \ `UNIQUE` 索引，因此如果有人试图注册与现有用户名相同的用户名，数据库将返回错误。除了验证用户输入外，处理脚本还需要检测错误并建议用户选择不同的用户名。\n\
    \n#### PHP 解决方案 19-1：创建用户注册表单\n\n此 PHP 解决方案展示了如何改编第 11 章的注册脚本以用于 MySQL 或 MariaDB。它使用了\
    \ PHP 解决方案 11-3 中的 `CheckPassword` 类和 PHP 解决方案 11-4 中的 `register_user_csv.php`。\n\
    \n如有必要，将 `CheckPassword.php` 从 `ch19/PhpSolutions/Authenticate` 文件夹复制到 `phpsols-4e`\
    \ 站点根目录下的 `PhpSolutions/Authenticate` 文件夹，并将 `register_user_csv.php` 从 `ch19`\
    \ 文件夹复制到 `includes` 文件夹。你还应阅读 PHP 解决方案 11-3 和 11-4 中的说明，以了解原始脚本的工作原理。\n\n1.  将\
    \ `register_db.php` 从 `ch19` 文件夹复制到 `phpsols-4e` 站点根目录下名为 `authenticate` 的新文件夹中。该页面包含与第\
    \ 11 章相同的基本用户注册表单，包含用于用户名的文本输入字段、密码字段、用于确认的另一个密码字段以及用于提交数据的按钮，如下面的屏幕截图所示：\n\n\
    \    ![../images/332054_4_En_19_Chapter/332054_4_En_19_Figa_HTML.jpg](img/332054_4_En_19_Figa_HTML.jpg)\n\
    \n2.  在 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码：\n\n    ```\n    if (isset($_POST['register']))\
    \ {\n        $username = trim($_POST['username']);\n        $password = trim($_POST['pwd']);\n\
    \        $retyped = trim($_POST['conf_pwd']);\n        require_once '../includes/register_user_mysqli.php';\n\
    \    }\n    ```\n\n    这与 PHP 解决方案 11-4 中的代码非常相似。如果表单已提交，用户输入将被去除首尾空白并分配给简单变量。然后包含一个名为\
    \ `register_user_mysqli.php` 的外部文件。如果你计划使用 PDO，请将包含文件命名为 `register_user_pdo.php`。\n\
    \n3.  处理用户输入的文件基于你在第 11 章中创建的 `register_user_csv.php`。复制原始文件并将其保存在 `includes`\
    \ 文件夹中，命名为 `register_user_mysqli.php` 或 `register_user_pdo.php`。\n\n4.  在你刚刚复制并重命名的文件中，找到以如下内容开头的条件语句（大约在第\
