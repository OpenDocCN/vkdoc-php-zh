  trans: '

    # 预览目录管理页面


    虽然长长的目标列表乍看之下可能令人生畏，但实现起来却相当容易。我们已经在前面章节中介绍了大部分理论，但在本章中你仍将学到不少新内容。


    创建目录管理页面的第一步是实现登录机制，该机制将通过一个如图 7-1 所示的简单登录页面来实现。


    **图 7-1.** *HatShop 登录页面*


    接下来，你需要通过创建以下内容来构建网站的管理部分：主页面（`admin.php`）、与之关联的 Smarty 模板（`admin.tpl`）、用于导航后续章节将开发的各个管理区的主菜单模板（`admin_menu.tpl`）、用于管理身份验证的组件化模板（`admin_login`），以及四个用于目录管理的组件化模板（`admin_departments`、`admin_categories`、`admin_products`和`admin_product`）。


    登录后，管理员将看到部门列表（由从管理主页面 `admin.php` 加载的 Smarty 模板 `admin_departments` 生成），如图 7-2
    所示。


    你将为部门实现的功能，与后续为类别和产品实现的功能大致相同。具体来说，管理员可以：


    - 点击**编辑**按钮修改部门的名称或描述。

    - 点击**编辑类别**按钮编辑特定部门下的类别。

    - 点击**删除**按钮从数据库中完全移除某个部门（仅当该部门下没有关联类别时有效）。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00143.png)


    ![](img/00087.png)


    648XCH07a.qxd 10/25/06 10:56 PM Page 201


    **第七章 ■ 目录管理**


    **201**


    **图 7-2.** *HatShop 部门管理页面*


    当点击**编辑**按钮时，表格中对应的行将进入编辑模式，其字段变为可编辑状态，如图 7-3 所示。同时，你可以看到原来**编辑**按钮的位置变成了**更新**和**取消**按钮。点击**更新**将把修改内容保存到数据库，而点击**取消**则退出编辑模式。


    **图 7-3.** *编辑部门信息*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00078.png)


    648XCH07a.qxd 10/25/06 10:56 PM Page 202


    **202**


    **第七章 ■ 目录管理**


    管理员可以通过在表格下方的文本框中输入新部门的名称和描述，然后点击**添加**按钮来添加新部门。


    当管理员点击**编辑类别**按钮时，`admin.php` 页面会重新加载，但查询字符串中会多出一个参数：`DepartmentID`。该参数指示 `admin.php`
    加载 `admin_categories` Smarty 模板，从而允许管理员编辑属于所选部门的类别（参见图 7-4）。


    **图 7-4.** *HatShop 类别管理页面*


    此页面的工作方式与部门编辑页面类似。你还会看到一个链接（返回到部门...），点击后可返回部门管理页面。


    部门、类别和产品管理页面之间的导航逻辑是通过查询字符串参数实现的。如图 7-4 所示，当选择一个部门后，其 ID 会被附加到查询字符串中。


    你在 `index.php` 页面中已经实现了类似的功能。在那里，你通过分析查询字符串参数来决定（在运行时）加载哪个组件化模板。


    关于 `admin.php` 及其模板的更多细节，我们将在你实际构建它们时再进行讨论。


    现在，让我们先从处理安全机制开始。


    # 设置目录管理页面


    网站的目录管理部分将由 `admin.php` 页面以及多个其他 PHP 文件和 Smarty 模板组成。你将逐一构建这些组件。

    '
- fmt: '对于每个组件，您首先需要实现表示层，然后编写业务层代码，最后编写数据层方法。


    然而，在构建管理页面之前，您需要建立一种机制来保护对它们的访问。您当然不希望任何人访问您的管理页面！另外，为了进一步提高安全性，如果管理页面需要通过互联网（而不仅仅是本地内网）访问，您可能还需要通过`SSL`加载它们。


    您的管理员将能够登录并执行各种管理任务。在本章中，您只实现目录管理功能，但在开发的第二阶段，您还将让他们管理客户订单。在实现自己的订单处理系统时，您将自行处理客户账户，并存储敏感数据，例如客户信用卡号、电话号码等。


    这清楚地表明了提前规划为网站敏感区域实现安全连接的重要性。


    ## 使用安全连接


    `HTTP`不是一个安全的协议，即使您的网站使用密码（或其他形式的身份验证）保护敏感区域，传输的数据也可能被截获和窃取。为避免这种情况，您需要设置应用程序以使用`SSL`（安全套接字层）连接，即`HTTPS`协议（超文本传输协议
    - 安全版）。


    为此，您首先需要做一些准备工作。除非您的`Web`服务器已经使用`SSL`连接，否则您很可能没有正确的配置。此配置涉及为您的服务器获取安全证书并将其安装在您的`Apache``Web`服务器上。（如果托管服务由第三方提供，该托管服务可能也提供启用`SSL`的选项。）安全证书本质上是公钥-私钥对，类似于异步加密算法中使用的那些。如果您的域控制器被配置为证书颁发机构，您可以生成这些证书，但如果您不是受信任的证书颁发机构，此方法可能会出现问题。数字签名的`SSL`证书可能会导致使用这些证书的浏览器无法验证您的证书颁发机构的身份，从而怀疑您的安全性。


    当某人访问安全页面，而其证书不是由受信任的证书颁发机构颁发时，浏览器将显示警告消息。当保护供公司人员访问的页面时，这并不算灾难，但如果出现此类警告消息，例如在他们尝试支付订单时，肯定会打击客户的信心。


    要自行设置`Apache`，我们建议您查看`http://www.sitepoint.com/article/securing-apache-2-server-ssl`上的文章。由于启用`SSL`可能是一个耗时的过程，出于测试目的，您可以从`http://www.devside.net/web/server/free/download`获取一个已配置好的`Apache`版本。有关更多详细信息，请参阅附录A。


    另一种方法是向知名的、专注于`Web`安全的信誉良好的组织获取`SSL`证书，例如：


    *   `VeriSign`（`http://www.verisign.com/`）

    *   `Thawte`（`http://www.thawte.com/`）

    *   `InstantSSL`（`http://www.instantssl.com/`）


    `Web`浏览器内置了来自此类组织的根证书，并且能够验证由它们提供的`SSL`证书的数字签名。这意味着不会出现警告消息，并且可以轻松建立`SSL`安全连接。


    例如，在`Opera`中，您可以在`URL`旁边看到注册`SSL`证书的公司名称（见图7-5）。


    **图 7-5.** *在 Opera 中打开安全网页*


    出于本章的目的，我安装了`XAMPP`软件包，它附带了一个启用`SSL`的`Apache`服务器。我的本地机器颁发了证书，正如您所猜测的，它不在受信任的证书提供商列表中。


    通过此设置，我可以向您展示加载没有受信任证书的`HTTPS`地址时得到的结果（见图7-6）。


    **图 7-6.** *未找到证书签名者*


    如果您单击查看，您可以看到该证书已由`localhost`为`Apache Friends`颁发。`Apache Friends`（`http://www.apachefriends.org`）是`XAMPP`软件包的制造商。


    使用不受信任的证书时出现的警告消息因浏览器而异。在`Internet Explorer 7`中，消息甚至更明显（见图7-7）。


    **图 7-7.** *Internet Explorer 不信任不受信任的证书。*


    ## 为 SSL 配置 HatShop


    如果您决定使用`SSL`，则需要安装一个`SSL`证书，如下几页所示。使用`SSL`时，还建议强制任何敏感页面通过`SSL`访问；也就是说，如果有人尝试通过`http://`访问敏感页面（例如登录页面），请求将被自动重定向到`https://`
    `URL`。


    但是，如果您想推迟处理`SSL`并希望暂时专注于构建管理页面，您可以这样做。为了使解决方案可配置，您在第3章中将以下配置选项添加到了您的`include/config.php`文件中。


    ```php

    // We enable and enforce SSL when this is set to anything else than ''no''

    define(''USE_SSL'', ''yes'')

    ```


    如果您现在不想使用`SSL`，只需将`USE_SSL`常量设置为`no`。


    ### 获取 SSL 证书


    获取证书是一个相对简单的过程。我们在此介绍从`VeriSign`获取证书所需的步骤，但其他提供商的过程也类似。完整说明可在`VeriSign`网站（`http://www.verisign.com/`）上找到。


    您还可以从`VeriSign`获取测试证书，这些证书在试用期内可以免费使用。以下是基本步骤：


    1.  在`VeriSign`网站上注册试用证书。

    2.  在您的`Web`服务器上生成证书签名请求（`CSR`）。这涉及填写各种个人信息，包括您的网站名称等。为此，您需要在`Web`服务器中安装一个`SSL`模块，如附录A所述。

    3.  将生成的`CSR`的内容复制到`VeriSign`请求系统中。

    4.  不久之后，您将收到来自`VeriSign`的证书，将其复制到您的`Web`服务器以安装该证书。


    步骤比这要多一点，但如前所述，`VeriSign`网站上有详细说明，您不应该遇到任何困难。


    ### 强制使用 SSL 连接


    安装证书后，您可以通过`SSL`连接访问`Web`服务器上的任何网页，只需将用于访问页面的`URL`中的`http://`部分替换为`https://`即可（假设您的防火墙设置为允许`SSL`连接，默认使用端口`443`）。'
  raw: 'For each component, you’ll first implement the presentation layer, then write
    the business tier code, and finally write the data tier methods.


    Before building the admin pages, however, you need to put in place a mechanism
    to secure access to them. You don’t want to give anyone access to your admin pages!
    Also, for an even increased level of security, if the admin pages are to be accessed
    through the Internet (and not only in a local intranet), you may also want to
    load them through SSL.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH07a.qxd 10/25/06 10:56 PM Page 203


    C H A P T E R 7 ■ C ATA L O G A D M I N I S T R AT I O N


    **203**


    Your administrators will be able to log in and perform various administrative
    tasks. In this chapter, you’re only implementing catalog administration features,
    but at stage two of development, you’ll also have them manage customers’ orders.
    When implementing your own order-processing system, you’ll handle customer accounts
    yourself and store sensitive data such as customer credit cards, phone numbers,
    and so on.


    This makes it obvious how important it is to plan ahead for implementing secure
    connections to the sensitive areas of your web site.


    **Using Secure Connections**


    HTTP isn’t a secure protocol, and even if your site protects sensitive areas using
    passwords (or other forms of authentication), the transmitted data could be intercepted
    and stolen. To avoid this, you need to set up the application to work with SSL
    (Secure Socket Layer) connections, using the HTTPS protocol (Hypertext Transport
    Protocol - Secure).


    To do this, you have a bit of groundwork to get through first. Unless you have
    already been using an SSL connection on your web server, you are unlikely to have
    the correct configuration to do so. This configuration involves obtaining a security
    certificate for your server and installing it on your Apache web server. (If the
    hosting service is provided by a third party, the hosting service probably also
    has an option of enabling SSL.) Security certificates are basically public-private
    key pairs similar to those used in asyn-chronous encryption algorithms. You can
    generate these if your domain controller is configured as a certification authority,
    but if you’re not a trusted certification authority, this method may be problematic.
    Digitally signed SSL certificates may cause browsers that use these certificates
    to be unable to verify the identity of your certification authority and therefore
    doubt your security.


    When someone accesses secure pages whose certificate isn’t issued by a trusted
    certification authority, the browser will show a warning message. This isn’t disastrous
    when securing pages that are to be visited by your company personnel, but would
    certainly affect customer confidence if such a warning message shows up, for example,
    when they try to pay for their order.


    To set up Apache on your own, we recommend you check out the article at http://www.


    sitepoint.com/article/securing-apache-2-server-ssl. Because enabling SSL can be
    a time-consuming process, for test purposes, you can get an already-configured
    Apache version from http://www.devside.net/web/server/free/download. Review Appendix
    A for more details.


    The alternative is to obtain SSL certificates from a known and respected organization
    that specializes in web security, such as:


    • VeriSign (http://www.verisign.com/)


    • Thawte (http://www.thawte.com/)


    • InstantSSL (http://www.instantssl.com/)


    Web browsers have built-in root certificates from organizations such as these
    and are able to authenticate the digital signature of SSL certificates supplied
    by them. This means that no warning message will appear, and an SSL-secured connection
    will be available with a minimum of fuss.


    For example, in Opera, you can see the name of the company that registered the
    SSL certificate next to the URL (see Figure 7-5).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00038.png)


    ![](images/00129.png)


    648XCH07a.qxd 10/25/06 10:56 PM Page 204


    **204**


    C H A P T E R 7 ■ C ATA L O G A D M I N I S T R AT I O N


    **Figure 7-5.** *Opening a secured web page in Opera* For the purpose of this
    chapter, I’ve installed the XAMPP package, with comes with an SSL-enabled Apache
    server. My local machine issued the certificate, which, as you can guess, isn’t
    in the list of trusted certificate providers.


    With this setup, I can show you what you get when loading an HTTPS address that
    doesn’t have a trusted certificate (see Figure 7-6).


    **Figure 7-6.** *Certificate signer not found*


    If you click View, you can see that the certificate has been issued by localhost,
    for Apache Friends. Apache Friends (http://www.apachefriends.org) is the maker
    of the XAMPP package.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00036.png)


    648XCH07a.qxd 10/25/06 10:56 PM Page 205


    C H A P T E R 7 ■ C ATA L O G A D M I N I S T R AT I O N


    **205**


    The warning message you get when using an untrusted certificate varies from browser
    to browser. In Internet Explorer 7, the message is even more obvious (see Figure
    7-7).


    **Figure 7-7.** *Internet Explorer doesn’t like untrusted certificates.*


    **Configuring HatShop for SSL**


    If you decide to use SSL, you’ll need to install an SSL certificate, as shown
    in the next few pages. When using SSL, it’s also advisable to enforce any sensitive
    page to be accessed through SSL; that is, in case anyone tries accessing a sensitive
    page (such as the login page) through http://, the request will be automatically
    redirected to an https:// URL.


    However, if you want to postpone handling SSL and want to focus on building the
    admin pages for the moment, you can. To make the solution configurable, you added
    the following configuration option to your include/config.php file, back in Chapter
    3.


    // We enable and enforce SSL when this is set to anything else than ''no''


    define(''USE_SSL'', ''yes'')


    If you prefer not to use SSL for now, simply set the USE_SSL constant to no.


    **Obtaining an SSL Certificate**


    Obtaining a certificate is a relatively painless experience. We’re covering here
    the steps required to get a certificate from VeriSign, but the process is similar
    with the other providers as well. The full instructions are available on the VeriSign
    web site (http://www.verisign.com/).


    You can also get test certificates from VeriSign, which are free to use for a
    trial period. Here are the basic steps:


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH07a.qxd 10/25/06 10:56 PM Page 206


    **206**


    C H A P T E R 7 ■ C ATA L O G A D M I N I S T R AT I O N


    **1.** Sign up for a trial certificate on the VeriSign web site.


    **2.** Generate a Certificate Signing Request (CSR) on your web server. This involves
    filling out various personal information, including the name of your web site,
    and so on.


    For this to work, you need to install an SSL module in your web server, as described
    in Appendix A.


    **3.** Copy the contents of the generated CSR into the VeriSign request system.


    **4.** Shortly afterwards, you will receive a certificate from VeriSign that you
    copy into your web server to install the certificate.


    There is a little more to it than that, but as noted previously, detailed instructions
    are available on the VeriSign web site, and you shouldn’t run into any difficulties.


    **Enforcing SSL Connections**


    After you’ve installed the certificate, you can access any web pages on your web
    server using an SSL connection, simply by replacing the http:// part of the URL
    used to access the page with https:// (assuming that your firewall is set up to
    allow an SSL connection, which by default uses port 443).'
