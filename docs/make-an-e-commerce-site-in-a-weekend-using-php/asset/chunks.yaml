    \ 引言\n\n电子补充材料 本章的在线版本（doi:[10.1007/978-1-4842-1672-9_1](http://dx.doi.org/10.1007/978-1-4842-1672-9_1)）包含补充材料，授权用户可获取。\n\
    \n在本书中，你将学习如何开发一个电子商务网站。电子商务，也称为电商，是指通过计算机/智能手机利用互联网购买和销售产品或服务。如今，几乎所有企业都需要一个电子商务网站。为什么呢？以下是一些原因：\n\
    \n- 在线销售无需办公空间或任何产品展示空间。\n- 你可以全天候/每周 7 天/每年 365 天进行销售；没有商店营业时间的限制。\n- 消费者可以在家中方便且随时购买。他们可以节省大量在交通拥堵中前往商店所浪费的时间。\n\
    - 你可以将产品销往全球。\n- 资金在线转移快速、方便且用户友好。\n\n因此，大多数公司都通过开发电子商务网站在互联网上展示自己的存在。你在本书中将要学习开发的电子商务网站将销售几乎所有商品，包括书籍、智能手机、笔记本电脑等。该网站将通过一个下拉菜单展示不同的产品类别，并在顶部提供一个搜索框。用户可以选择产品并在线支付。该网站将所有产品、订单和客户信息存储在数据库中。\n\
    \n尽管你可以通过不同网站托管提供商提供的免费电子商务网站设计工具非常轻松地创建一个网站，但这会存在以下限制：\n\n- 设计工具可能不够灵活。菜单、表格和其他界面可能不适合你的需求。\n\
    - 你可能会遇到数据库连接和其他身份验证过程的问题。\n- 你可能无法获得支持来获取网站管理任务所需的信息。\n- 如果你通过其专利工具构建网站，那么更换网站托管商将会非常困难。\n\
    \n因此，你将从头开始使用 PHP 开发这个电子商务网站。\n\n在本章中，你将学习：\n\n- 全书将制作的电子商务网站的概要\n- 开发网站所需的软件\n\
    - 安装 WampServer\n- 配置 MySQL\n- 网站中所需的数据库表的详细信息\n"
- fmt: '# Why PHP?


    PHP stands for “PHP Hypertext Preprocessor” and is one of the most popular web
    scripting engines among developers. The question is, why is it so popular?


    The reasons are many, but the first one is that it is a server-side scripting
    language, so all PHP scripts are executed on the server instead of the client’s
    machine. Consequently, the script execution does not consume the client’s resources
    but the server’s. You will see some client-side `JavaScript` code in this book
    also, where it’s appropriate and makes sense to use it.


    The PHP script runs on the server and its output is sent to the client as plain
    HTML, which makes it very secure. The visitor of your web site can never see the
    PHP source code by selecting the View Source option in the browser. The visitor
    can only view the output from the PHP script, which is plain HTML.


    Besides this, PHP supports many databases (`MySQL`, `Informix`, `Oracle`, `Sybase`,
    `Solid`, `PostgreSQL`, `Generic ODBC`, etc.). So you can store the customer’s
    information, visitor’s information, and your service and product information into
    the database and then retrieve them whenever required.


    PHP is open source software (OSS) and so is freely available. You don’t have to
    pay for using PHP. Moreover, a mass community is involved in developing and enhancing
    PHP features. This ensures faster bug fixing and availability of enhanced features.


    PHP commonly runs on an open source platform, called `LAMP`. The full form of
    `LAMP` is `Linux`, `Apache`, `MySQL`, and `PHP`. Again, being open source, you
    get the continuous support of developers around the world for the platform.


    PHP can be easily embedded with HTML tags and scripts. So, the code that’s not
    very important can be written in HTML and the crucial code can be written in PHP.
    The combination runs faster than code that is written purely in PHP.


    PHP runs on any platform—`Linux`, `Unix`, `Mac OS X`, and `Windows`. Besides this,
    PHP has a garbage collector and an efficient memory manager that optimizes the
    memory consumption of any site.


    # How the E-Commerce Site Will Appear


    Let’s have a quick look at the final result of this book. The e-commerce site
    that you will be developing throughout this book will appear as shown in the following
    figures.


    The first screen on execution of the shopping cart site that you’ll see is shown
    in Figure [1-1](#A978-1-4842-1672-9_1_Chapter.html#Fig1).


    ![A978-1-4842-1672-9_1_Fig1_HTML.jpg](A978-1-4842-1672-9_1_Fig1_HTML.jpg)


    Figure 1-1. The first screen upon launching the e-commerce site


    You can see that at the top is a header that contains the title of the web site
    and a Cart icon at the top-right corner (a handy tool for users to know what they
    have selected in their carts). Below the header is a drop-down menu that displays
    the list of product categories that are available on the site (see Figure [1-2](#A978-1-4842-1672-9_1_Chapter.html#Fig2)).


    ![A978-1-4842-1672-9_1_Fig2_HTML.jpg](A978-1-4842-1672-9_1_Fig2_HTML.jpg)


    Figure 1-2. Drop-down menu showing different product categories


    If you select a category, say Laptops, to see all the products in the category,
    you get the output shown in Figure [1-3](#A978-1-4842-1672-9_1_Chapter.html#Fig3).


    ![A978-1-4842-1672-9_1_Fig3_HTML.jpg](A978-1-4842-1672-9_1_Fig3_HTML.jpg)


    Figure 1-3. Page showing different laptops available for sale


    The product image and its name include a link that, when clicked, will display
    detailed information on the selected product. For example, on clicking the Asus
    `X200CA-KX219D` laptop, its detailed information will be displayed, as shown in
    Figure [1-4](#A978-1-4842-1672-9_1_Chapter.html#Fig4).


    ![A978-1-4842-1672-9_1_Fig4_HTML.jpg](A978-1-4842-1672-9_1_Fig4_HTML.jpg)


    Figure 1-4. Page showing detailed information of the selected laptop


    The Quantity text box is where you enter how many of the selected product you
    want. If you leave it blank and click the Add To Cart button, the default quantity
    is 1. Suppose you want to purchase one selected laptop, you can either enter the
    value 1 in the Quantity text box, followed by clicking the Add To Cart button,
    or you can also directly click the Add To Cart button because the default quantity
    is always 1.


    The selected item, along with the entered quantity, is added to the cart as shown
    in Figure [1-5](#A978-1-4842-1672-9_1_Chapter.html#Fig5).


    ![A978-1-4842-1672-9_1_Fig5_HTML.jpg](A978-1-4842-1672-9_1_Fig5_HTML.jpg)


    Figure 1-5. Items selected in the cart


    You can always change the quantity of the product selected in the cart. Also,
    you can delete any item from the cart. To change the quantity of the Asus laptop
    in the cart to 2, modify its value in the Quantity column and click the Change
    Quantity button. The quantity and the total price will change in the cart, as
    shown in Figure [1-6](#A978-1-4842-1672-9_1_Chapter.html#Fig6).


    ![A978-1-4842-1672-9_1_Fig6_HTML.jpg](A978-1-4842-1672-9_1_Fig6_HTML.jpg)


    Figure 1-6. Quantity of the item in cart has changed


    You can even purchase more items belonging to another category. Suppose you need
    to see all the items under the Smartphone category, you select the category from
    the drop-down menu on the top. All the products in the Smartphone category will
    be displayed, as shown in Figure [1-7](#A978-1-4842-1672-9_1_Chapter.html#Fig7).


    ![A978-1-4842-1672-9_1_Fig7_HTML.jpg](A978-1-4842-1672-9_1_Fig7_HTML.jpg)


    Figure 1-7. Page showing different smart phones available for sale


    Again, each product’s image and name includes a link which, when clicked, displays
    detailed information about the selected product.


    If you click on the `Micromax-Canvas-Knight-2-E471` smart phone, its detailed
    information will appear as shown in Figure [1-8](#A978-1-4842-1672-9_1_Chapter.html#Fig8).


    ![A978-1-4842-1672-9_1_Fig8_HTML.jpg](A978-1-4842-1672-9_1_Fig8_HTML.jpg)


    Figure 1-8. Page showing detailed information about the selected smart phone'
