  \n**注** 请记得同时更新您的模型，使其引用 `Shared\\Model` 而非 `Framework\\Model`。\n\n### 注册\n\n在创建用户账户之前，我们需要执行的另一个步骤是创建新用户注册时使用的表单。清单\
