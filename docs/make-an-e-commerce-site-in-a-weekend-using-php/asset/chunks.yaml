    \nFigure 1-13.\n\nWelcome message for the signed-in customer\n\nWhen you select\
    \ the link for supplying shipping information, you get a few text boxes to indicate\
    \ where your products should be delivered, as shown in Figure [1-14](#A978-1-4842-1672-9_1_Chapter.html#Fig14).\n\
    \n![A978-1-4842-1672-9_1_Fig14_HTML.jpg](A978-1-4842-1672-9_1_Fig14_HTML.jpg)\n\
    \nFigure 1-14.\n\nPage for supplying shipping information\n\nAfter filling in\
    \ the shipping information, you click the `Supply Payment Information` button.\
    \ You will be taken to a page that asks you to enter payment information, as shown\
    \ in Figure [1-15](#A978-1-4842-1672-9_1_Chapter.html#Fig15).\n\n![A978-1-4842-1672-9_1_Fig15_HTML.jpg](A978-1-4842-1672-9_1_Fig15_HTML.jpg)\n\
    \nFigure 1-15.\n\nPage for entering payment information\n\nOn clicking the `Submit`\
    \ button, the order details will be stored in the database along with a unique\
