- fmt: "If the `length` parameter is omitted then all elements from the `offset` to\
    \ the end of the array will be removed. If it is positive the function will remove\
    \ that number of elements from the `offset` position. If `length` is negative\
    \ the end of the removed elements will be found by counting that number of elements\
    \ from the end of the array. These calculations are similar to the `substr()`\
    \ function that can have positive and negative values for both `offset` and `length`.\n\
    \nIn the following example there are two arrays being spliced. Because the `array_splice()`\
    \ function works directly on the source array it is necessary to create a copy\
    \ of the array before calling the function (only because the same array is being\
    \ used in all three samples).\n\n```php\n// 4_27.php\n\n$a = array(\n    'apple',\n\
    \    'orange',\n    'banana',\n    'animal' => 'horse',\n    'vechicle' => 'truck'\n\
    );\n\n$b = array(\n    'kiwi',\n    'grape'\n);\n\n// Remove all but two elements\
    \ from the array\n$a1 = $a;\n$r = array_splice($a1, 2, 2);\nprint_r($r);\nprint_r($a1);\n\
    \n// insert $b into $a\n$a1 = $a;\n$r = array_splice($a1, 2, 0, $b);\nprint_r($r);\n\
    print_r($a1);\n\n// remove one element and insert $b\n$a1 = $a;\n$r = array_splice($a1,\
    \ 2, 1, $b);\nprint_r($r);\nprint_r($a1);\n```\n\nThe output of this example gives\
    \ the following six arrays:\n\n```\nArray\n(\n    [0] => banana\n    [animal]\
    \ => horse\n)\nArray\n(\n    [0] => apple\n    [1] => orange\n    [vechicle] =>\
    \ truck\n)\nArray\n(\n)\nArray\n(\n    [0] => apple\n    [1] => orange\n    [2]\
    \ => kiwi\n    [3] => grape\n    [4] => banana\n    [animal] => horse\n    [vechicle]\
    \ => truck\n)\nArray\n(\n    [0] => banana\n)\nArray\n(\n    [0] => apple\n  \
    \  [1] => orange\n    [2] => kiwi\n    [3] => grape\n    [animal] => horse\n \
    \   [vechicle] => truck\n)\n```\n\n## Recipe 4-9\\. Debugging Arrays\n\n### Problem\n\
    \nArrays are printed directly as output so knowing the exact value of a super\
    \ global or an array variable that is generated from a database query or an API\
    \ call requires the use of other outputting methods.\n\n### Solution\n\nPHP has\
    \ three functions that make debugging of array variables easy. These are `print_r()`,\
    \ `var_dump()`, and `var_export()`. The `print_r()` function walks through the\
    \ array recursively and prints the keys and values in a nice readable way. The\
    \ `var_dump()` and `var_export()` functions will also print information the data\
    \ type and size of the elements.\n\n### How it Works\n\nIn this example we use\
    \ an array with mixed numerical and string keys to show how the debug information\
    \ looks when the three output methods are used.\n\n```php\n// 4_28.php\n\n$a =\
    \ array(\n    'apple',\n    'orange',\n    'banana',\n    'animal' => 'horse',\n\
    \    'vechicle' => 'truck'\n);\n\nprint_r($a);\nvar_dump($a);\nvar_export($a);\n\
    ```\n\nThe output from this code looks like this:\n\n```\nArray\n(\n    [0] =>\
    \ apple\n    [1] => orange\n    [2] => banana\n    [animal] => horse\n    [vechicle]\
    \ => truck\n)\narray(5) {\n  [0]=>\n  string(5) \"apple\"\n  [1]=>\n  string(6)\
    \ \"orange\"\n  [2]=>\n  string(6) \"banana\"\n  [\"animal\"]=>\n  string(5) \"\
    horse\"\n  [\"vechicle\"]=>\n  string(5) \"truck\"\n}\narray (\n  0 => 'apple',\n\
    \  1 => 'orange',\n  2 => 'banana',\n  'animal' => 'horse',\n  'vechicle' => 'truck',\n\
    )\n```\n\nThe first and the third example are the easiest to read but they do\
    \ not contain any type info. Only the `var_export()` function produces output\
    \ that can be used in an `eval` statement or written directly to a php script\
    \ file to be included or executed at a later time. This can be useful for writing\
    \ config files.\n\nNote that these outputs should be included in a `<pre>..</pre>`\
    \ tag when they are used in a browser context in order for the formatting to be\
    \ as shown above.\n\n## Recipe 4-10\\. Storing Arrays\n\n### Problem\n\nArrays\
    \ are defined differently in different languages and are often not supported natively\
    \ by file systems or databases, so how can the values of arrays be stored?\n\n\
    ### Solution\n\nWith the use of `serialize()` and `unserialize()` or `json_encode()`\
    \ and `json_decode()` it’s possible to stringify any array (and other types of\
    \ PHP variables) so they can be written to a file or saved as a value in a `varchar`\
    \ column in a database. The `json_*` functions are also useful to convert arrays\
    \ to a structure that can be interpreted by the JavaScript engine in a browser."
