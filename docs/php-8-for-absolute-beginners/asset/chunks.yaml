    我已根据您的要求对文本进行了排版处理。处理过程包括：


    1. 重新划分标题层级，保留合理的`#`、`##`、`###`结构

    2. 优化段落格式，删除多余空行

    3. 保留正文核心内容，不删减有价值信息

    4. 对所有单独出现的变量名、函数名、类名、路径名、命令名及其语句或表达式添加反引号；如果被粗体或斜体包围，已去掉星号再加反引号

    5. 代码块前后加上三个反引号

    6. 未修改语义，确保输出为标准Markdown格式


    ---


    ## 排版后的文本


    We will make one more update to our PHP code to provide a more secure and stable
    program. The program depends on the existence of variables from our library files.
    `$nav`, `$page`, and `$info` are all populated with contents from various files.
    However, what if those variables do not exist?


    ```

    title = "Thomas Blom Hansen: Portfolio site";

    $pageData->content = $nav;

    //changes begin here

    $navigationIsClicked = isset($_GET[''page'']);

    if ($navigationIsClicked ) {

    $fileToLoad = $_GET[''page''];

    } else {

    $fileToLoad = "skills";

    }

    include_once "views/$fileToLoad.php";

    $pageData->content .= $info;

    require "templates/newerpage.php";

    echo $page;

    ?>

    ```


    **Note:** `securenavigation.php` has been updated to link to the current version
    of the program.


    You might have thought that we would again use `isset` to check on the existence
    of the variables; we could. However, an easier way is to provide *default values*
    for `$nav` and `$info`. Both are created with a string data type and set to `""`
    in Listing [2-18](#323857_3_En_2_Chapter.xhtml#PC32) to provide a holder for future
    information. `$page` was already given a default value earlier. Now our program
    can handle situations in which these variables might be missing due to corruption
    or missing information. A more stable program for sure.


    ## Validating Your HTML


    The process of generating HTML pages is a bit abstract. It is easy to assume that
    everything is perfect if the right page view is displayed at the right time. If
    you see the right action, your PHP script works perfectly. But that does not mean
    your HTML is perfectly valid. Remember that any contents within the `echo` text
    strings are treated as a nonexecutable string by the PHP interpreter. Thus, the
    interpreter does not check the validity of any code (HTML) within the string.


    How can we check our HTML contents? Remember, dynamic web pages should conform
    to web standards, just as static HTML pages should.


    **Note:** You could load a dynamic page in your browser and view the generated
    HTML source code through your browser. When you see the generated HTML source
    code, you can select it all, copy it, and paste it into an online HTML validation
    service, such as [`http://validator.w3.org/`](http://validator.w3.org/), to determine
    if the code is valid.


    ## Styling the Site with CSS


    When the HTML of all page views validates, we can start styling our site with
    CSS. We add CSS exactly as we would normally style a static HTML site: create
    an external style sheet with style rules for the visual design of our site. Using
    an external page will allow us to attach the CSS to all pages within the website,
    providing a consistent feel and look. To do that for the portfolio site, we will
    create a new folder called `css` in our project folder. Then we will create a
    new file called `layout.css` in the `css` folder.


    ```

    nav {

    background-color: #CCCCDE;

    padding-top: 10px;

    }

    nav a{

    display:inline-block;

    text-decoration:none;

    color: #000;

    margin-left: 10px;

    }

    nav a:hover{text-decoration: underline;}

    ```


    ### CSS Review


    The CSS `nav` tags define the area of navigation as defined by the `<nav>` HTML
    tags in our pages. The background color displays a light gray. The `padding` setting
    provides a small amount of space padding above the navigation menu. `"Nav a"`
    defines the look and feel of the link itself. It translates the display into an
    inline block, which creates a block (box) for the links, instead of the original
    text links. The text itself is unchanged (`text-decoration: none`). The color
    is set to black (`#000`). Space is provided between each link as specified with
    the `margin-left` setting.


    For more information on CSS, review the free tutorials on the Web, such as [`www.w3schools.com`](http://www.w3schools.com),
    or a free video series on YouTube.


    You can change or add any style rules you prefer. The preceding `css` is just
    to get us started. We will style all our dynamic HTML pages, so let''s build this
    functionality into the page template. We will add one new placeholder for `<link>`
    elements pointing to external style sheets.


    ```

    $pageData->title


    $pageData->css


    $pageData->content


    ";

    ?>

    ```


    The new property `css` is used as placeholder for `<link>` elements referencing
    external style sheets. To use the updated page template, we must update our index
    file and declare a value for the new property.


    ```

    title = "Thomas Blom Hansen: Portfolio site";

    $pageData->css = "";

    $pageData->content = $nav;

    $navigationIsClicked = isset($_GET[''page'']);

    if ($navigationIsClicked ) {

    $fileToLoad = $_GET[''page''];

    } else {

    $fileToLoad = "skills";

    }

    include_once "views/$fileToLoad.php";

    $pageData->content .= $info;

    require "templates/pagewithcss.php";

    echo $page;

    ?>

    ```


    **Note:** `cssnavigation.php` has been updated to link to the current version
    of the program.


    ```

    $pageData->css = "";

    ```


    The `css` variable in `$pageData` is set to a link which will attach the external
    style sheet. The output is shown in Figure [2-10](#323857_3_En_2_Chapter.xhtml#Fig11).


    This window represents the cascading style sheets in the information that will
    be set by the connection and joined to the outside templates.


    **Exercise:** Adjust the CSS file to create a better-looking navigation bar which
    is more pleasing to the user.


    ## Declaring a Page_Data Class


    Sometimes, it can be quite useful to use internal CSS to supplement external style
    sheets. We can easily update the page template with a placeholder for a `<style>`
    element.


    ```

    $pageData->title


    $pageData->css

    $pageData->embeddedStyle


    $pageData->content


    ";

    ?>

    ```


    We can declare a property value from `indexwithcss.php`, but let''s do something
    different. The problem is that sometimes you don''t need any embedded `<style>`
    element and sometimes you do.


    Now that our template has a placeholder for embedded CSS, that property must always
    have a value. We don''t want to waste time declaring a value for a redundant `<style>`
    element, so let''s make a more intelligent solution. Let''s take the next step
    toward object-oriented programming and create a *custom class* for page data.
    We will create a new folder called `classes` in our project folder. Then let''s
    create a new file called `Page_Data.class.php` in this folder.


    ```

    <?php

    class Page_Data {

    public string $title = "";

    public string $content = "";

    public string $css = "";

    public string $embeddedStyle = "";

    }

    ?>

    ```


    We have saved the class information in a file with the ending `class.php`. There
    is nothing magical about this file ending. However, by including the class name
    in the file ending, it makes it more apparent that a stand-alone class is contained
    in the file. Also note that the file name begins with a capital letter. This is
    also a common style to indicate that it is a class file. PHP does not care what
    file name is used. However, it is a good programming technique to use common practices
    that the industry uses for identification.


    The class structure is defined with the lowercase word `class`. The class name
    (`Page_Data`) is an exact match for the file name containing the class. Class
    names should match file names. Variables (properties) and methods used by the
    class are created between the curly brackets. We created this class with predefined
    empty string values for those properties required by the page template. We have
    declared each string with the `string` data type. This declaration will help increase
    security within our program by only allowing strings to be saved. In later chapters,
    we will increase the security of our classes by setting access to `private` and
    use `get` and `set` methods to update values. The use of declared class within
    our program, rather than using `stdClass`, provides us the ability to protect
    the data we are storing.'
