    **116**


    C H A P T E R 8 ■ I M P L E M E N T I N G A J A X F E AT U R E S


    Like all other helpers, the Ajax helper must be initialized in the controller
    by including it as a value in the var $helpers array:


    var $helpers = array(''Html'',''Form'',''Ajax'');


    Then, in the view, the Ajax helper functions are called by using the $ajax object.
    For example:


    $ajax->submit();


    Of course, parameters are passed to the function, depending on the function being
    used.


    $ajax->submit(''Submit'',array(''url''=>''/comments/add'',''update''=>''comments_add''));
    **Preparing the Ajax Helper**


    Before you can use the Ajax helper, one or two important steps must be taken that
    are unique to this helper. Because it depends on Prototype, you must ensure that
    Prototype JavaScript files are included in each page. You will also need to make
    these scripts accessible for all the views that could potentially use the Ajax
    helper.


    **Installing Prototype**


    Download the latest version of Prototype fr[om www.prototypejs.org/download.](http://www.prototypejs.org/download)
    You should end up with a JavaScript file named something like prototype-1.x.x.x.js.
    Place this file in the app/webroot/js folder. It is now accessible by the whole
    application. To finish installing Prototype, you need to edit the default layout.
    Somewhere between the <head> tags in the app/views/layouts/default.ctp file, include
    the following line:


    $javascript->link(array(''prototype''));


    Here, you are using the JavaScript helper to produce a link to the JavaScript
    file. These links appear something like this to include the script in the web
    page:


    <script type="text/javascript" src="/js/prototype.js"></script> Of course, the
    JavaScript helper automatically produces the correct URL to the JavaScript file.


    **Including the JavaScript Helper in the App Controller File**


    If you went ahead and refreshed the application, you may have noticed the following
    error: Undefined variable: javascript [APP/views/layouts/default.ctp, line 5]


    This error occurs whenever the helper is not initialized properly. In this case,
    you’re trying to use a helper in the layout file, and since the default layout
    is meant to be called for all controllers, you will need to initialize the JavaScript
    helper in all controllers.


    There is a way around going into each controller individually. By creating your
    own App controller file, you can place functions to be used by all controllers
    in it and thereby cut down on redundant code. To do this, however, there are some
    conventions to be used so that Cake can recognize the App controller.


    09775ch08final 7/1/08 9:47 PM Page 117


    C H A P T E R 8 ■ I M P L E M E N T I N G A J A X F E AT U R E S


    **117**


    The location of the App controller is app/app_controller.php. Like other controllers,
    the file must include the proper PHP code to create a new instance of the App
    controller object:


    <?


    class AppController extends Controller {


    }


    ?>


    **Making Helpers Available for the Whole Application**


    In the App controller, you can also include any helpers that may be used in any
    or all controllers. This is done, as in an individual controller, by assigning
    a list of helpers in the array of the var $helpers attribute.


    For the sake of your blog application, let’s go ahead and include all the helpers
    you will need to use. Insert the following line into line 3 of the new App controller:
    var $helpers = array(''Html'',''Form'',''Ajax'',''Javascript'');


    The $javascript->link() function in the default layout file should now work properly.


    Generally, when using helpers in layouts, you should use the App controller to
    include those helpers; it will save you from having to do helper includes in every
    controller.


    **Adding Comments to the Blog**


    Before you can use the Ajax helper to handle user comments, you will need to create
    the table to store the comments in the database. Make the new table with the name
    comments in the database, and create the fields shown in Listing 8-1.


    **Listing 8-1.** *SQL for Creating the* comments *Table* CREATE TABLÈcomments`
    (


