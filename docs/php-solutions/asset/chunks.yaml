    \nSQL syntax doesn’t have many rules, and all of them are quite simple."
  raw: '#### PHP Solution 11-4: Counting records in a result set (PDO)


    PDO doesn’t have a direct equivalent to the MySQLi `num_rows` property. With most
    databases you need to execute an SQL query to count the number of items in the
    table and then fetch the result. However, the PDO `rowCount()` method fulfills
    a dual purpose with both MySQL and MariaDB. Normally, it reports only the number
    of rows affected by inserting, updating, or deleting records, but with MySQL and
    MariaDB, it also reports the number of records found by a `SELECT` query.


    Create a new folder called `pdo` in the `phpsols` site. Then create a file called
    `pdo.php` in the folder you have just created. The page will eventually be used
    to display a table, so it should have a `DOCTYPE` declaration and an HTML skeleton.
      Include the connection file in a PHP block above the `DOCTYPE` declaration,
    then create a PDO connection to the `phpsols` database using the read-only account,
    like this:  


    `require_once ''../includes/connection.php'';`


    `$conn = dbConnect(''read'', ''pdo'');`


    Next, prepare the SQL query:  


    `$sql = ''SELECT * FROM images'';`


    Now execute the query and store the result in a variable, like this:  


    *   This means “select every record in the `images` table.” The asterisk (`*`)
    is shorthand for “all columns.”


    `$result = $conn->query($sql);`


    To check if there’s a problem with the query, you can get an array of error messages
    from the database using the connection object’s `errorInfo()` method. The third
    element of the array is created only if something goes wrong. Add the following
    code to the script:  


    `$errorInfo = $conn->errorInfo();`


    `if (isset($errorInfo[2])) {`


    `$error = $errorInfo[2];`


    `}`


    To get the number of rows in the result set, create an `else` block and call the
    `rowCount()` method on the `$result` object, like this:  


    *   The array generated by `$conn->errorInfo()` is stored as `$errorInfo`, so
    you can tell if anything went wrong by using `isset()` to check whether `$errorInfo[2]`
    has been defined. If it has, the error message is assigned to $error.


    `if (isset($errorInfo[2])) {`


    `$error = $errorInfo[2];`


    `}` `else {`


    `$numRows = $result->rowCount();`


    `}`


    You can now display the outcome of the query in the body of the page, as follows:
     


    `<?php`


    `if (isset($error)) {`


    `echo "<p>$error</p>";`


    `} else {`


    `echo "<p>A total of $numRows records were found.</p>";`


    `}`


    `?>`


    Save the page and load it into a browser. You should see the same result as shown
    in step 8 of PHP Solution 11-2\. Check your code, if necessary, with `pdo_01.php`.


    #### Counting records with PDO in other databases


    Using the PDO `rowCount()` to report the number of items found by a `SELECT` query
    works with both MySQL and MariaDB, but it cannot be guaranteed to work on all
    other databases. If `rowCount()` doesn’t work, use the following code instead:


    `// prepare the SQL query`


    `$sql = ''SELECT` `COUNT(*)` `FROM images'';`


    `// submit the query and capture the result`


    `$result = $conn->query($sql);`


    `$errorInfo = $conn->errorInfo();`


    `if (isset($errorInfo[2])) {`


    `$error = $errorInfo[2];`


    `} else {`


    `// find out how many records were retrieved`


    `$numRows = $result->` `fetchColumn();`


    `// free the database resource`


    `$result->closeCursor();`


    `}`


    This uses the SQL `COUNT()` function with an asterisk to count all items in the
    table. There’s only one result, so it can be retrieved with the `fetchColumn()`
    method, which gets the first column from a database result. After storing the
    result in `$numRows`, you must call the `closeCursor()` method to free the database
    resource for any further queries.


    #### PHP Solution 11-5: Displaying the images table using PDO


    To display the results of a `SELECT` query with PDO, you can use the `query()`
    method in a `foreach` loop to extract the current row as an associative array.
    Each element in the array is named after the corresponding column in the table.


    Continue working with the same file as in the previous PHP solution.


    Remove the closing curly brace at the end of the `else` block in the body of the
    page (it should be around line 26). Although most of the code to display the `images`
    table is HTML, it needs to be inside the `else` block.   Insert a blank line after
    the closing PHP tag, then add the closing brace on the next line in a separate
    PHP block. The revised code should look like this:  


    `} else {`


    `echo "<p>A total of $numRows records were found.</p>";`


    `?>`


    `<?php } ?>`


    `</body>`


    Add the following table between the two PHP blocks in the main body of `pdo.php`
    so that it’s controlled by the `else` block. This is to prevent errors if the
    SQL query fails. The PHP code that displays the result set is displayed in bold.
     


    `<table>`


    `<tr>`


    `<th>image_id</th>`


    `<th>filename</th>`


    `<th>caption</th>`


    `</tr>`


    `<?php foreach ($conn->query($sql) as $row) { ?>`


    `<tr>`


    `<td>` `<?php echo $row[''image_id'']; ?>` `</td>`


    `<td>` `<?php echo $row[''filename'']; ?>` `</td>`


    `<td>` `<?php echo $row[''caption'']; ?>` `</td>`


    `</tr>`


    `<?php } ?>`


    `</table>`


    Save the page and view it in a browser. It should look like the screenshot in
    PHP Solution 11-3\. You can compare your code against `pdo_02.php` in the `ch11`
    folder.


    #### PDO connection crib sheet


    Table [11-2](#A978-1-4842-0635-5_11_Chapter.html#Tab2) summarizes the basic details
    of connection and database queries with PDO. Some commands will be used in later
    chapters, but are included here for ease of reference.


    Table 11-2.


    Database connection with PDO


    | Action | Usage | Comments |

    | --- | --- | --- |

    | Connect | `$conn = new PDO($DSN,$u,$p);` | In practice, requires three arguments:
    data source name (DSN), username, password. Must be wrapped in try/catch block.
    |

    | Submit `SELECT` query | `$result = $conn->query($sql);` | Returns results as
    a `PDOStatement` object. |

    | Extract records | `foreach($conn->query($sql) as $row) {` | Submits `SELECT`
    query and gets current row as associative array in a single operation. |

    | Count results | `$numRows = $result->rowCount()` | In MySQL/MariaDB, returns
    number of results from `SELECT`. Not supported in most other databases. |

    | Get single result | `$item = $result->fetchColumn();` | Gets first record in
    first column of result. To get result from other columns, use column number (counting
    from 0) as argument. |

    | Get next record | `$row = $result->fetch();` | Gets next row from result set
    as associative array. |

    | Release DB resources | `$result->closeCursor();` | Frees up connection to allow
    new query. |

    | Submit non-`SELECT` query | `$affected = $conn->exec($sql);` | Although `query()`
    can be used for non-`SELECT` queries, `exec()` returns the number of affected
    rows. |


    ## Using SQL to Interact with a Database


    As you have just seen, PHP connects to the database, sends the query, and receives
    the results, but the query itself needs to be written in SQL. Although SQL is
    a common standard, there are many dialects of SQL. Each database vendor, including
    MySQL, has added extensions to the standard language. These improve efficiency
    and functionality, but are usually incompatible with other databases. The SQL
    in this book works with MySQL 5.1 or later, but it won’t necessarily transfer
    to Microsoft SQL Server, Oracle, or another database.


    ### Writing SQL queries


    SQL syntax doesn’t have many rules, and all of them are quite simple.'
  trans: "\n### PHP 解决方案 11-4：计算结果集中的记录数（PDO）\n\nPDO 没有与 MySQLi 的 `num_rows` 属性直接对应的功能。对于大多数数据库，你需要执行一条\
    \ SQL 查询来计算表中项目的数量，然后获取结果。然而，PDO 的 `rowCount()` 方法在 MySQL 和 MariaDB 中具有双重用途。通常，它仅报告插入、更新或删除记录所影响的行数，但在\
    \ MySQL 和 MariaDB 中，它还能报告 `SELECT` 查询找到的记录数。\n\n在 `phpsols` 站点中创建一个名为 `pdo` 的新文件夹。然后在你刚刚创建的文件夹中创建一个名为\
    \ `pdo.php` 的文件。该页面最终将用于显示一个表格，因此它应包含 `DOCTYPE` 声明和 HTML 骨架。在 `DOCTYPE` 声明上方的\
    \ PHP 代码块中包含连接文件，然后使用只读账户创建到 `phpsols` 数据库的 PDO 连接，如下所示：\n\n```\nrequire_once\
    \ '../includes/connection.php';\n$conn = dbConnect('read', 'pdo');\n```\n\n接下来，准备\
    \ SQL 查询：\n\n```\n$sql = 'SELECT * FROM images';\n```\n\n现在执行查询并将结果存储在一个变量中，如下所示：\n\
    \n-   这意味着“选择 `images` 表中的所有记录。”星号 (`*`) 是“所有列”的简写形式。\n\n```\n$result = $conn->query($sql);\n\
    ```\n\n要检查查询是否存在问题，你可以使用连接对象的 `errorInfo()` 方法从数据库获取错误信息数组。仅当出现问题时，才会创建该数组的第三个元素。将以下代码添加到脚本中：\n\
    \n```\n$errorInfo = $conn->errorInfo();\nif (isset($errorInfo[2])) {\n    $error\
    \ = $errorInfo[2];\n}\n```\n\n要获取结果集中的行数，创建一个 `else` 块并在 `$result` 对象上调用 `rowCount()`\
