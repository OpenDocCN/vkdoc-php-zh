    **44**


    C H A P T E R 2 ■ L AY I N G O U T T H E F O U N D AT I O N S


    **Handling and Reporting Errors**


    Although the code will be written to run without any unpleasant surprises, there’s
    always a possibility that something might go wrong when processing client requests.
    The best strategy to deal with these unexpected problems is to find a centralized
    way to handle these errors and perform certain actions when they do happen.


    PHP is known for its confusing error messages. If you’ve worked with other programming
    languages, you probably appreciate the information you can get from displaying
    the stack trace when you have an error. Tracing information is not displayed by
    default when you have a PHP error, so you’ll want to change this behavior. In
    the development stage, tracing information will help you debug the application,
    and in a release version, the error message must be reported to the site administrator.
    Another problem is the tricky E_WARNING error message type because it’s hard to
    tell whether it’s fatal or not for the application.


    ■**Tip** If you don''t remember or don’t know what a PHP error message looks like,
    try adding the following line in your include/app_top.php file:


    require_once ''inexistent_file.php'';


    Load the web site in your favorite browser, and notice the error message you get.
    If you do this test, make sure to remove the problematic line afterwards!


    In the context of a live web application, errors can happen unexpectedly for various
    reasons, such as software failures (operating system or database server crashes,
    viruses, and so on) and hardware failures. It’s important to be able to log these
    errors and eventually inform the web site administrator (perhaps by sending an
    email message), so the error can be taken care of as fast as possible.


    For these reasons, we’ll start establishing an efficient error-handling and reporting
    strategy. You’ll create a class named ErrorHandler that will manage the error
    handling. In this class, you’ll create a static user-defined error handler method
    named Handler, which will get executed anytime a PHP error happens during runtime.
    In PHP, you define a custom error handler using the set_error_handler() function.


    ■**Caution** As you’ll see, the second parameter of set_error_handler() is used
    to specify the error types that the specified handler function should handle.
    However, this second parameter is supported only since PHP 5\. Read more details
    at http://www.php.net/set_error_handler. You can also find more info about PHP
    errors and logging in the PHP manual at http://www.php.net/manual/en/


    ref.errorfunc.php.


    Serious error types (E_ERROR, E_PARSE, E_CORE_ERROR, E_CORE_WARNING, E_COMPILE_ERROR,
    and E_COMPILE_WARNING) cannot be intercepted and handled by ErrorHandler::Handler,
    but the other types of PHP errors (E_WARNING for example) can be.'
  trans: "\n最后，需要注意如何在另一个 Smarty 模板中包含一个 Smarty 模板。`index.tpl` 引用了 `header.tpl`，后者也将在其他许多页面中重复使用：\n\
    \n```html\n<body>\n\n<div>\n\n<div class=\"left_box\">\n\n在此放置部门列表\n\n</div>\n\
    \n{include file=\"header.tpl\"}\n\n<div id=\"content\">\n\n在此放置内容\n\n</div>\n\n\
    </div>\n\n</body>\n\n</html>\n```\n\n另外值得一提的是，我们使用了 CSS（层叠样式表）。CSS 允许将格式化选项集中在一个文档中，该文档被\
    \ HTML 文件引用。如果操作得当，并且在网站中一致地使用 CSS，你只需通过编辑 CSS 文件，就能以极小的代价对整个站点（或站点的部分区域）进行视觉上的改动。市面上有许多关于\
    \ CSS 的书籍和教程，包括你可以在 [`www.w3.org/Style/CSS/`](http://www.w3.org/Style/CSS/) 和\
    \ [`www.w3schools.com/css/default.asp`](http://www.w3schools.com/css/default.asp)\
    \ 找到的免费资源。许多实用的 CSS 相关资源可以在 [`www.csszengarden.com/`](http://www.csszengarden.com/)\
    \ 找到。强烈推荐使用 CSS，因为它能带来显著的好处。你将在第 3 章看到更多关于 CSS 的实际应用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 处理与报告错误\n\n虽然代码的编写会尽量避免出现任何不愉快的意外，但在处理客户端请求时，总有可能出现问题。处理这些意外问题的最佳策略是找到一种集中的方式来处理这些错误，并在错误发生时执行某些特定操作。\n\
    \nPHP 以其令人困惑的错误消息而闻名。如果你使用过其他编程语言，你可能很欣赏在出现错误时通过显示堆栈跟踪所获得的信息。但在 PHP 错误发生时，默认情况下不会显示跟踪信息，因此你需要改变这种行为。在开发阶段，跟踪信息将帮助你调试应用程序，而在发布版本中，错误消息必须报告给网站管理员。另一个问题是棘手的\
    \ `E_WARNING` 错误消息类型，因为它很难判断对应用程序来说是否致命。\n\n> **提示** 如果你不记得或不知道 PHP 错误消息的样子，请尝试在你的\
    \ `include/app_top.php` 文件中添加以下代码行：\n> \n> `require_once 'inexistent_file.php';`\n\
    > \n> 然后在常用浏览器中加载该网站，并留意你收到的错误消息。如果你进行此测试，请务必随后删除有问题的代码行！\n\n在在线 Web 应用程序的背景下，错误可能因各种原因意外发生，例如软件故障（操作系统或数据库服务器崩溃、病毒等）和硬件故障。能够记录这些错误并最终通知网站管理员（例如通过发送电子邮件）非常重要，以便尽快处理错误。\n\
    \n基于这些原因，我们将开始建立一种高效的错误处理和报告策略。你将创建一个名为 `ErrorHandler` 的类来管理错误处理。在此类中，你将创建一个名为\
    \ `Handler` 的静态用户自定义错误处理方法，该方法将在运行时发生 PHP 错误时执行。在 PHP 中，你可以使用 `set_error_handler()`\
    \ 函数来定义自定义错误处理器。\n\n> **警告** 如你将要看到的，`set_error_handler()` 的第二个参数用于指定应由特定处理器函数处理的错误类型。然而，这个第二个参数仅在\
    \ PHP 5 及以上版本中受支持。更多详细信息请访问 [`www.php.net/set_error_handler`](http://www.php.net/set_error_handler)。你也可以在\
    \ PHP 手册 [`www.php.net/manual/en/ref.errorfunc.php`](http://www.php.net/manual/en/ref.errorfunc.php)\
    \ 中找到关于 PHP 错误和日志记录的更多信息。\n\n严重的错误类型（`E_ERROR`、`E_PARSE`、`E_CORE_ERROR`、`E_CORE_WARNING`、`E_COMPILE_ERROR`\
    \ 和 `E_COMPILE_WARNING`）不能被 `ErrorHandler::Handler` 拦截和处理，但其他类型的 PHP 错误（例如 `E_WARNING`）则可以。\n"
