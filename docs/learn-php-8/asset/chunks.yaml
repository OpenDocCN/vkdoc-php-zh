    \ include a link next to the record to be deleted. We then will add a `delete`\
    \ method, move the display code to a `display` method (so it can be called whenever\
    \ needed), and create a `saveChanges` method to update the log file.\n\n```\n\"\
    ;\necho \" table { border: 2px solid #5c744d;}  \";\necho \"\";\necho \"Log File:\
    \ \" . ERROR_LOG . \"\";\necho \"Date/TimeError TypeError Message\";\nfor ($J=$row_Count;\
    \ $J >= 0; $J--) {\necho \"Delete\";\nfor($I=0; $I  \" . $error_Array[$J][$I]\
    \ . \"  \";\n}\necho \"\";\n}\necho \"\";\necho \"\";\n} // main section\nconst\
    \ ERROR_LOG = \"Errors.log\";\n$logFile = fopen(ERROR_LOG, \"r\");\n$row_Count\
    \ = 0;\nwhile(!feof($logFile))\n{\n$error_Array[$row_Count] = explode(' | ', fgets($logFile));\n\
    $row_Count++;\n}\nfclose($logFile);\nif(isset($_GET['rn']))\n{\ndeleteRecord($_GET['rn'],\
