    ```\n\n**练习**：创建一个程序，使用条件语句来确定字符串中包含的颜色。如果颜色是绿色，则显示“我爱地球。”如果颜色是蓝色，则显示“天空很美。”如果颜色是黄色或橙色，则显示“我爱日落。”对于任何其他颜色，显示“selectedcolor\
