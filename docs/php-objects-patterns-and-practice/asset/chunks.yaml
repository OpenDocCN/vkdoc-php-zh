    You can read more about mock and stub objects in Chapter [18](#A314621_5_En_18_Chapter.html).


    ### Registry, Scope, and PHP


    The term scope is often used to describe the visibility of an object or value
    in the context of code structures. The lifetime of a variable can also be measured
    over time. There are three levels of scope you might consider in this sense. The
    standard is the period covered by an HTTP request. PHP also provides built-in
    support for session variables. These are serialized and saved to the file system
    or the database at the end of a request, and then restored at the start of the
    next. A session ID stored in a cookie or passed around in query strings is used
    to keep track of the session owner. Because of this, you can think of some variables
    as having session scope. You can take advantage of this by storing some objects
    between requests, saving a trip to the database. Clearly, you need to be careful
    that you don’t end up with multiple versions of the same object, so you may need
    to consider a locking strategy when you check an object that also exists in a
    database into a session.


    In other languages, notably Java and Perl (running on the `ModPerl` Apache module),
    there is the concept of application scope. Variables that occupy this space are
    available across all instances of the application. This is fairly alien to PHP;
    but in larger applications, it might be considered useful to have access to an
    application-wide space for accessing configuration variables.


    In previous editions of this book, I demonstrated examples of session- and application-scoped
    registry classes; but in the ten years or so since I first wrote that sample code,
    I have never had cause to use anything but a request-scoped registry. There is
    an initialization cost to this per-request approach, but you will typically use
    caching strategies to manage this.


    ### Consequences


    `Registry` objects make their data globally available. This means that any class
    that acts as a client for a registry will exhibit a dependency that is not declared
    in its interface. This can become a serious problem if you begin to rely on `Registry`
    objects for lots of the data in your system. `Registry` objects are best used
    sparingly, for a well-defined set of data items.


    ## The Presentation Layer


    When a request hits your system, you must interpret the requirement it carries,
    invoke any business logic needed, and finally, return a response. For simple scripts,
    this whole process often takes place entirely inside the view itself, with only
    the heavyweight logic and persistence code split off into libraries.


    > **Note:** A view is an individual element in the view layer. It can be a PHP
    page (or a collection of composed view elements) whose primary responsibility
    is to display data and provide the mechanism by which new requests can be generated
    by the user. It could also be a template in a system such as `Twig`.


    As systems grow in size, this default strategy becomes less tenable with request
    processing, business logic invocation, and view dispatch logic necessarily duplicated
    from view to view.


    In this section, I look at strategies for managing these three key responsibilities
    of the presentation layer. Because the boundaries between the view layer and the
    command and control layer are often fairly blurred, it makes sense to treat them
    together under the common term, "presentation layer."


    ### Front Controller


    This pattern is diametrically opposed to the traditional PHP application with
    its multiple points of entry. The Front Controller pattern presents a central
    point of access for all incoming requests, ultimately delegating to a view the
    task of presenting results back to the user. This is a key pattern in the Java
    enterprise community. It is covered in great detail in `Core J2EE Patterns: Best
    Practices and Design Strategies`, which remains one of the most influential enterprise
    patterns resources. The pattern is not universally loved in the PHP community,
    partly because of the overhead that initialization sometimes incurs.


    Most systems I write tend to gravitate toward the Front Controller. That is, I
    may not deploy the entire pattern to start with, but I will be aware of the steps
    necessary to evolve my project into a Front Controller implementation should I
    need the flexibility it affords.


    #### The Problem


    Where requests are handled at multiple points throughout a system, it is hard
    to keep duplication from the code. You may need to authenticate a user, translate
    terms into different languages, or simply access common data. When a request requires
    common actions from view to view, you may find yourself copying and pasting operations.
    This can make alteration difficult, as a simple amendment may need to be deployed
    across several points in your system. For this reason, it becomes easy for some
    parts of your code to fall out of alignment with others. Of course, a first step
    might be to centralize common operations into library code, but you are still
    left with the calls to the library functions or methods distributed throughout
    your system.


    Difficulty in managing the progression from view to view is another problem that
    can arise in a system where control is distributed among its views. In a complex
    system, a submission in one view may lead to any number of result pages, according
    to the input and the success of any operations performed at the logic layer. Forwarding
    from view to view can get messy, especially if the same view might be used in
    different flows.'
