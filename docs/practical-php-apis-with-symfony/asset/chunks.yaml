- fmt: '### Conclusion


    We have used the `lazy` parameter of the `Autoconfigure` attribute so that all
    the operations that implement the `LazyOperation` interface are loaded in lazy
    mode. This allows us to improve performance and instantiate heavy operations only
    when they are executed.


    In the next section, we will shift our focus to validation. We will explore strategies
    for ensuring that incoming requests adhere to the expected requirements, paving
    the way for reliable and error-free operation execution.


    ## Section 5. Validating Operations


    In “Section 1. Request Inputs and Outputs,” we discussed defining operations that
    might require specific parameters for execution. Ensuring these parameters are
    valid and consistent is crucial to avoiding errors during the operation execution.


    This section explores how to leverage [Symfony’s validation](https://symfony.com/doc/6.4/validation.html)
    capabilities to achieve this goal.


    ### The Validation Service


    Let’s start creating a service to encapsulate the validation logic:


    ```

    namespace App\Validation;

    use App\Exception\InvalidPayloadException;

    use Symfony\Component\Serializer\SerializerInterface;

    use Symfony\Component\Validator\Exception\ValidationFailedException;

    use Symfony\Component\Validator\Validator\ValidatorInterface;

    class ValidationHandler

    {

    public function __construct(

    private readonly SerializerInterface $serializer,

    private readonly ValidatorInterface $validator

    ){}

    public function deserializeAndValidate(array|string $payload, string $className)

    {

    try{

    $object = (is_array($payload))

    ? $this->serializer->denormalize($payload, $className)

    : $this->serializer->deserialize($payload, $className, ''json'')

    ;

    }

    catch(\Symfony\Component\Serializer\Exception\ExceptionInterface $e) {

    throw new InvalidPayloadException();

    }

    $errors = $this->validator->validate($object);

    if(count($errors) > 0) {

    throw new ValidationFailedException(null, $errors);

    }

    return $object;

    }

    }

    ```


    This service utilizes two key Symfony components:


    - **Symfony Serializer**: The handler first employs the serializer service to
    transform the incoming request payload into the input model specified in the metadata
    input parameter. The payload format can be either JSON (encoded string) or an
    array.

    - **Symfony Validator**: Once deserialized, the input model is validated using
    the Symfony validator service. This ensures the data adheres to pre-defined constraints,
    guaranteeing consistency and preventing potential errors during operation execution.


    If the validation process concludes without errors, the deserialized input model
    is returned, ready for further processing by the operation handler. In case of
    validation failures (invalid data), a Symfony `ValidationFailedException` is thrown.


    We wrapped deserialization in a try-catch block to handle potential errors such
    as incorrect data types, missing required fields, or invalid JSON. If any of these
    issues occur, an `InvalidPayloadException` is thrown instead:


    ```

    namespace App\Exception;

    use Symfony\Component\HttpFoundation\Response;

    class InvalidPayloadException extends \RuntimeException

    {

    public function __construct(string $msg = ''Malformed or unrecognized payload''
    , int $code = Response::HTTP_BAD_REQUEST, ?\Throwable $previous = null)

    {

    parent::__construct($msg, $code, $previous);

    }

    }

    ```


    The `InvalidPayloadException` simply adds a message that informs that an invalid
    payload has been sent.


    ### Validating Before Performing the Operation


    Let’s make some changes to the `ApiOperationHandler` so that the data is validated
    before performing the operation.


    ```

    use App\Api\Collection\OperationCollection;

    use App\Api\Input\ApiInput;

    use App\Api\Output\ApiOutput;

    use App\Validation\ValidationHandler;

    class ApiOperationHandler

    {

    public function __construct(

    private readonly ValidationHandler $validationHandler,

    private readonly OperationCollection $operationCollection,

    ){ }

    public function performOperation(ApiInput $apiInput): ApiOutput

    {

    $operation = $this->operationCollection->getOperation($apiInput->operation);

    $inputData = ($operation->metadata->input)

    ? $this->validationHandler->deserializeAndValidate($apiInput->data, $operation->metadata->input)

    : $apiInput->data

    ;

    return $operation->handler->perform($inputData);

    }

    }

    ```


    Now, the constructor also injects the `ValidationHandler` service. The `performOperation`
    validates the API input data (if the operation’s metadata specifies an input model
    class). If the validation fails, a `ValidationFailedException` will be thrown
    and the operation will not be executed.


    ### Handling Deserializing and Validating Errors


    As we did for the `NotFoundOperationException`, we must handle the validation
    errors exception (`InvalidPayloadException` and `ValidationFailedException`) so
    that we can return a readable JSON output. Let’s modify the `KernelSubscriber`.


    ```

    namespace App\EventSubscriber;

    use App\Exception\InvalidPayloadException;

    use App\Exception\NotFoundOperationException;

    use Symfony\Component\EventDispatcher\EventSubscriberInterface;

    use Symfony\Component\HttpFoundation\JsonResponse;

    use Symfony\Component\HttpKernel\Event\ExceptionEvent;

    use Symfony\Component\HttpKernel\KernelEvents;

    use Symfony\Component\Validator\Exception\ValidationFailedException;

    class KernelSubscriber implements EventSubscriberInterface

    {

    public static function getSubscribedEvents(): array

    {

    return [

    KernelEvents::EXCEPTION => ''onException'',

    ];

    }

    public function onException(ExceptionEvent $event): void

    {

    $exception = $event->getThrowable();

    if($exception instanceof ValidationFailedException){

    $errors = [];

    foreach($exception->getViolations() as $violation) {

    $errors[$violation->getPropertyPath()] = $violation->getMessage();

    }

    $event->setResponse( new JsonResponse([

    ''errors'' => $errors

    ], 400));

    return;

    }

    if($exception instanceof InvalidPayloadException) {

    $event->setResponse( new JsonResponse([

    ''payload'' => $exception->getMessage()

    ], 400));

    return;

    }

    if($exception  instanceof NotFoundOperationException){

    $event->setResponse( new JsonResponse([

    ''errors'' => [

    ''operation'' => $exception->getMessage()

    ]

    ], 404));

    return;

    }

    }

    }

    ```


    We have included two `if` blocks to deal with the `InvalidPayloadException` and
    the `ValidationFailedException`. For the `ValidationFailedException`, it loops
    through the violation constraints and creates an array where the keys are the
    properties causing an error and the values are the error messages. For the `InvalidPayloadException`,
    it returns the exception message.


    ### Conclusion


    Having established mechanisms for executing operations and ensuring the validity
    of the incoming payloads, we only have to create the endpoint to receive operation
    requests.


    ## Section 6. Connecting the Dots: Building an API Endpoint


    We have established the core components for handling operation executions. Now,
    it’s time to enable clients to interact with the API. This section focuses on
    creating a Symfony controller that will serve as an endpoint for receiving operation
    requests.


    By defining a route within this controller, we will establish a designated URL
    that clients can use to submit operation requests.


    Let’s explore how this connects the various services we have created to the outside
    world, allowing our API to handle incoming operation calls.


    ### Creating the Controller


    In “Section 1. Request Inputs and Outputs,” we learned how to structure our `ApiInput`
    so that we can encapsulate into it both the operation to be executed and the data
    required to execute such operation. Although it may seem that our controller must
    strictly receive the data according to the structure of the `ApiInput` model,
    this does not have to be the case and, during the rest of the section, we will
    learn how, with just a little extra code, we can receive the input data in various
    ways.'
