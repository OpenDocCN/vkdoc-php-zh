    **5.** Load index.php in your browser, click on a product to view its product
    details page, and admire the results (refer to Figure 16-1 at the beginning of
    this chapter). You must be logged in to add new reviews.


    **How It Works: The reviews Componentized Template**


    The reviews componentized template takes care of both displaying the reviews and
    adding a new review. The first part of the reviews.tpl file determines whether
    you have any reviews to display for the current product. If you don’t, a short
    message appears encouraging your visitor to write the first review.


    {if $reviews->mTotalReviews != 0}


    <span class="description">Customer reviews:</span><br />


    **[a list with reviews]**


    {else}


    <span class="description">


    Be the first person to voice your opinion!<br /><br />


    </span>


    {/if}


    The second part of the template displays a form to add a review or a message that
    invites your visitor to “log in” to be able to add a review:


    {if $reviews->mEnableAddProductReviewForm}


    {* add review form *}


    <span class="description"> Add a review:</span><br /><br />


    **[add review form]**


    {else}


    <span>


    <strong>You must log in to add a review.<strong/>


    </span>


    {/if}


    The code from the function plugin is pretty straightforward and should not be
    a problem for you.


    **Summary**


    Yep, it was that simple. Although you might want to add certain improvements for
    your own solution (for example, allow the visitors to edit their reviews, or forbid
    them from adding more reviews), the base is there, and it works as expected.


    You’re now all set to proceed to the final chapter of this book, where you’ll
    learn how to sell items to your customer from Amazon.com by using XML Web Services.


