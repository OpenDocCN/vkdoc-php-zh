- fmt: "## Conclusion\n\nIn this section, we have learned how to set up the right\
    \ configuration to route operation messages to a `Redis` transport. We have also\
    \ explored how to check that an operation has been successfully routed checking\
    \ the corresponding `Redis` key and we finally have run a worker to execute the\
    \ operation. As a plus, we have shown how to use `Supervisor` to manage our workers\
    \ and restart them.\n\nIn the next section, we will see how to create separated\
    \ queues for routing operations depending on its priority.\n\n## Section 5. Prioritizing\
    \ Operations\n\nThere can be situations where the volume of operations that must\
    \ be sent to the background is too high. In these cases, it may be interesting\
    \ to choose to segment the volume of operations by queues based, for example,\
    \ on priority. This is what we are going to implement in this section. To achieve\
    \ this, we will rely on the [Symfony Prioritized Transports](https://symfony.com/doc/current/messenger.html)\
    \ feature.\n\n### Defining the Priorities\n\nTo define the available operation\
    \ priorities, let’s create an enum for holding them:\n\n```php\nenum Priority\n\
    {\n    case NORMAL;\n    case HIGH;\n}\n```\n\nFor simplicity, the enum holds\
    \ two cases that represent the priorities: `NORMAL` and `HIGH`.\n\n### Modifying\
    \ the Metadata Attribute\n\nNow, we need to add a new parameter to the `Background`\
    \ class attribute so that we can flag an operation with a specified priority.\n\
    \n```php\nclass Background\n{\n    public function __construct(\n        public\
    \ readonly ?int $delay = null,\n        public readonly ?Priority $priority =\
    \ Priority::NORMAL\n    ){ }\n}\n```\n\nAs you can see, the `Background` class\
    \ constructor takes a `Priority` enum case as a second constructor argument. By\
    \ default, all background operations hold a `NORMAL` priority.\n\n### Creating\
    \ a Message for the HIGH Priority Operations\n\nThe operations with a `NORMAL`\
    \ priority will be routed using the existing `OperationMessage` message class.\
    \ If we remember from \"Section 4. Routing Operations,\" after dispatching an\
    \ `OperationMessage`, it is routed to the `operations` transport. In order to\
    \ separate `NORMAL` and `HIGH` operations, we must route them to different transports,\
    \ so first of all, we need a new message class for `HIGH` priority messages:\n\
    \n```php\nuse App\\Messenger\\OperationMessage;\n\nclass HighPriorityOperationMessage\
    \ extends OperationMessage\n{\n}\n```\n\nAs both `NORMAL` priority operations\
    \ and `HIGH` priority ones hold the same parameters, we can simply extend the\
    \ existing `OperationMessage` class.\n\n### Creating a Transport for Each Priority\n\
    \nAs we want to separate operations by priority in different transports, we need\
    \ to make some changes in the transports configuration.\n\n```yaml\nframework:\n\
    \    messenger:\n        transports:\n            operations:\n              \
    \  dsn: '%env(MESSENGER_TRANSPORT_DSN)%'\n                options:\n         \
    \           group: 'normal'\n            operations_high:\n                dsn:\
    \ '%env(MESSENGER_TRANSPORT_DSN)%'\n                options:\n               \
    \     group: 'high'\n        routing:\n            App\\Messenger\\OperationMessage:\
    \ 'operations'\n            App\\Messenger\\HighPriorityOperationMessage: 'operations_high'\n\
    ```\n\nLet’s take a look to the new configuration.\n\n*   There are two transports:\n\
    \    *   `operations`: For routing operations with `NORMAL` priority\n    *  \
    \ `operations_high`: For routing operations with `HIGH` priority\n*   Each option\
    \ sets the `group` parameter. When using the Symfony `redis-transport`, you can\
    \ use the `group` parameter under the `options` section to set the priority. Symfony\
    \ internally uses the `Redis` streams groups and consumers features to achieve\
    \ it.\n*   Each message will be routed to its corresponding transport.\n\n###\
    \ Modifying the Message Handler\n\nThe message handler should be able to handle\
    \ both kind of messages. Symfony messenger allows us to achieve this by using\
    \ the `AsMessageHandler` attribute at the method level instead of using it at\
    \ the class level.\n\n```php\nclass OperationMessageHandler\n{\n    public function\
    \ __construct(\n        private readonly OperationCollection $operationCollection,\n\
    \        private readonly EventDispatcherInterface $eventSubscriber,\n       \
    \ private readonly EntityManagerInterface $em\n    ){ }\n\n    #[AsMessageHandler]\n\
    \    public function handleNormalPriorityOperations(OperationMessage $message):\
    \ void\n    {\n        $this->handleMessage($message);\n    }\n\n    #[AsMessageHandler]\n\
    \    public function handleHighPriorityOperations(HighPriorityOperationMessage\
    \ $message): void\n    {\n        $this->handleMessage($message);\n    }\n\n \
    \   private function handleMessage(OperationMessage|HighPriorityOperationMessage\
    \ $message): void\n    {\n        $apiOperation = $this->operationCollection->getOperation($message->operation);\n\
    \        $user = null;\n        if($message->user && $apiOperation->handler instanceof\
    \ OperationRequiresUserInterface) {\n            $user = $this->em->getRepository(User::class)->findOneByEmail($message->user);\n\
    \            $apiOperation->handler->setUser($user);\n        }\n        $apiOperation->handler->perform($message->operationInput);\n\
    \    }\n}\n```\n\nAs you can see in the code above, we create a method named `handleNormalPriorityOperations`\
    \ to handle `NORMAL` operations and another one named `handleHighPriorityOperations`\
    \ to handle the `HIGH` ones. Since both methods execute the same code, we have\
    \ moved the handler code to a private method named `handleMessage`.\n\n### Dispatching\
    \ the Message Depending on the Priority\n\nHere, we have to come back to the previous\
    \ sections. There, we modified the `ApiOperationHandler` class to check whether\
    \ we had to queue the operation execution or not. Now, we need to modify it again\
    \ to check the operation priority and use the corresponding message class.\n\n\
    ```php\nif($operation->metadata->background) {\n    $stamps = ($operation->metadata->background->delay)\n\
    \        ? [new DelayStamp($operation->metadata->background->delay * 1000)]\n\
    \        : []\n    ;\n    $message = ($operation->metadata->background->priority\
    \ === Priority::NORMAL)\n        ?  new OperationMessage($operation->metadata->name,\
    \ $inputData, $userIdentifier)\n        :  new HighPriorityOperationMessage($operation->metadata->name,\
    \ $inputData, $userIdentifier)\n    ;\n    $this->bus->dispatch($message, $stamps);\n\
    \    return new ApiOutput(['status' => 'queued'], 202);\n}\n```\n\nAs you can\
    \ see above, after checking the metadata delay parameter, we create an `OperationMessage`\
    \ message class for `NORMAL` priority operations or a `HighPriorityOperationMessage`\
    \ for `HIGH` priority operations.\n\n### Conclusion\n\nIn this section, we have\
    \ learned how to use Symfony messenger capabilities to balance operation messages\
    \ between queues based on a priority parameter. This allows us to prioritize certain\
    \ operation executions so that they could take too much to have to wait for other\
    \ operations to be processed.\n\nIn the next chapter, we will use the Symfony\
    \ event system to dispatch an event after a background operation finishes.\n\n\
    ## Section 6. Triggering Post-Execution Notifications\n\nSome operations could\
    \ require that users be notified after the operation execution finishes. For instance,\
    \ after sending a payment, the user could receive an email or an SMS with information\
    \ about the payment process.\n\nWe are going to implement the post-execution notifications\
    \ only for the background operations because, as the user does not know when the\
    \ operation will end, it would be useful to inform them about it.\n\n### Marking\
    \ an Operation to Send a Notification\n\nSince not all operations would need to\
    \ send a notification, we need a way to specify that an operation requires sending\
    \ a notification after being processed. Let’s add a new parameter to the `OperationMetadata`\
    \ attribute to specify that the operation requires sending a notification.\n\n\
    ```php\n#[\\Attribute(\\Attribute::TARGET_CLASS)]\nclass OperationMetadata\n{\n\
    \    public function __construct(\n        public readonly string $name,\n   \
    \     public readonly ?string $version = null,\n        public readonly ?string\
    \ $input = null,\n        public readonly ?bool $validateByRole= null,\n     \
    \   public readonly ?Background $background = null,\n        public readonly ?bool\
    \ $requiresNotification = null\n    ){ }\n}\n```\n\nThe code in charge of deciding\
    \ whether to send the notification or not will have to check the `$requiresNotification`\
    \ parameter. We will deal with this in the next section."
  raw: "### Conclusion\n\nIn this section, we have learned how to set up the right\
    \ configuration to route operation messages to a Redis transport. We have also\
    \ explored how to check that an operation has been successfully routed checking\
    \ the corresponding Redis key and we finally have run a worker to execute the\
    \ operation. As a plus, we have shown how to use Supervisor to manage our workers\
    \ and restart them.\n\nIn the next section, we will see how to create separated\
    \ queues for routing operations depending on its priority.\n\n## Section 5\\.\
    \ Prioritizing Operations\n\nThere can be situations where the volume of operations\
    \ that must be sent to the background is too high. In these cases, it may be interesting\
    \ to choose to segment the volume of operations by queues based, for example,\
    \ on priority. This is what we are going to implement in this section. To achieve\
    \ this, we will rely on the [Symfony Prioritized Transports](https://symfony.com/doc/current/messenger.html)\
    \ feature.\n\n### Defining the Priorities\n\nTo define the available operation\
    \ priorities, let’s create an enum for holding them:\n\n```\nenum Priority\n{\n\
    case NORMAL;\ncase HIGH;\n}\n```\n\nFor simplicity, the enum holds two cases that\
    \ represent the priorities: **NORMAL** and **HIGH**.\n\n### Modifying the Metadata\
    \ Attribute\n\nNow, we need to add a new parameter to the Background class attribute\
    \ so that we can flag an operation with a specified priority.\n\n```\nclass Background\n\
    {\npublic function __construct(\npublic readonly ?int $delay = null,\npublic readonly\
    \ ?Priority $priority = Priority::NORMAL\n){ }\n}\n```\n\nAs you can see, the\
    \ **Background** class constructor takes a Priority enum case as a second constructor\
    \ argument. By default, all background operations hold a NORMAL priority.\n\n\
    ### Creating a Message for the HIGH Priority Operations\n\nThe operations with\
    \ a NORMAL priority will be routed using the existing OperationMessage message\
    \ class. If we remember from “Section 4\\. Routing Operations,” after dispatching\
    \ an OperationMessage, it is routed to the operations transport. In order to separate\
    \ NORMAL and HIGH operations, we must route them to diferent transports, so first\
    \ of all, we need a new message class for HIGH priority messages:\n\n```\nuse\
    \ App\\Messenger\\OperationMessage;\nclass HighPriorityOperationMessage extends\
    \ OperationMessage\n{\n}\n```\n\nAs both NORMAL priority operations and HIGH priority\
    \ ones hold the same parameters, we can simply extend the existing **OperationMessage**\
    \ class.\n\n### Creating a Transport for Each Priority\n\nAs we want to separate\
    \ operations by priority in different transports, we need to make some changes\
    \ in the transports configuration.\n\n```\nframework:\nmessenger:\ntransports:\n\
    operations:\ndsn: '%env(MESSENGER_TRANSPORT_DSN)%'\noptions:\ngroup: 'normal'\n\
    operations_high\ndsn '%env(MESSENGER_TRANSPORT_DSN)%'\noptions\ngroup 'high'\n\
    routing\nApp\\Messenger\\OperationMessage 'operations'\nApp\\Messenger\\HighPriorityOperationMessage\
    \ 'operations_high'\n```\n\nLet’s take a look to the new configuration.\n\n* \
    \  There are two transports:\n    *   **operations**: For routing operations with\
    \ NORMAL priority\n\n    *   **operations_high**: For routing operations with\
    \ HIGH priority\n\n*   Each option sets the group parameter. When using the Symfony\
    \ redis-transport, you can use the group parameter under the “options” section\
    \ to set the priority. Symfony internally uses the Redis streams groups and consumers\
    \ features to achieve it.\n\n*   Each message will be routed to its corresponding\
    \ transport.\n\n### Modifying the Message Handler\n\nThe message handler should\
    \ be able to handle both kind of messages. Symfony messenger allows us to achieve\
    \ this by using the **AsMessageHandler** attribute at the method level instead\
    \ of using it at the class level.\n\n```\nclass OperationMessageHandler\n{\npublic\
    \ function __construct(\nprivate readonly OperationCollection $operationCollection,\n\
    private readonly EventDispatcherInterface $eventSubscriber,\nprivate readonly\
    \ EntityManagerInterface $em\n){ }\n#[AsMessageHandler]\npublic function handleNormalPriorityOperations(OperationMessage\
    \ $message): void\n{\n$this->handleMessage($message);\n}\n#[AsMessageHandler]\n\
    public function handleHighPriorityOperations(HighPriorityOperationMessage $message):\
    \ void\n{\n$this->handleMessage($message);\n}\nprivate function handleMessage(OperationMessage|HighPriorityOperationMessage\
    \ $message): void\n{\n$apiOperation = $this->operationCollection->getOperation($message->operation);\n\
    $user = null;\nif($message->user && $apiOperation->handler instanceof OperationRequiresUserInterface)\
    \ {\n$user = $this->em->getRepository(User::class)->findOneByEmail($message->user);\n\
    $apiOperation->handler->setUser($user);\n}\n$apiOperation->handler->perform($message->operationInput);\n\
    }\n}\n```\n\nAs you can see in the code above, we create a method named **handleNormalPriorityOperations**\
    \ to handle NORMAL operations and another one named **handleHighPriorityOperations**\
    \ to handler the HIGH ones. Since both methods execute the same code, we have\
    \ moved the handler code to a private method named **handleMessage**.\n\n### Dispatching\
    \ the Message Depending on the Priority\n\nHere, we have to come back to the previous\
    \ sections. There, we modified the ApiOperationHandler class to check whether\
    \ we had to queue the operation execution or not. Now, we need to modify it again\
    \ to check the operation priority and use the corresponding message class.\n\n\
    ```\nif($operation->metadata->background) {\n$stamps = ($operation->metadata->background->delay)\n\
    ? [new DelayStamp($operation->metadata->background->delay * 1000)]\n: []\n;\n\
    $message = ($operation->metadata->background->priority === Priority::NORMAL)\n\
    ?  new OperationMessage($operation->metadata->name, $inputData, $userIdentifier)\n\
    :  new HighPriorityOperationMessage($operation->metadata->name, $inputData, $userIdentifier)\n\
    ;\n$this->bus->dispatch($message, $stamps);\nreturn new ApiOutput(['status' =>\
    \ 'queued'], 202);\n}\n```\n\nAs you can see above, after checking the metadata\
    \ delay parameter, we create an “OperationMessage” message class for NORMAL priority\
    \ operations or a “HighPriorityOperationMessage” for HIGH priority operations.\n\
    \n### Conclusion\n\nIn this section, we have learned how to use symfony messenger\
    \ capabilities to balance operation messages between queues based on a priority\
    \ parameter. This allows us to prioritize certain operation executions so that\
    \ they could take too much to have to wait for other operations to be processed.\n\
    \nIn the next chapter, we will use the Symfony event system to dispatch an event\
    \ after a background operation finishes.\n\n## Section 6\\. Triggering Post-Execution\
    \ Notifications\n\nSome operations could require that users be notified after\
    \ the operation execution finishes. For instance, after sending a payment, the\
    \ user could receive an email or an SMS with information about the payment process.\n\
    \nWe are going to implement the post-execution notifications only for the background\
    \ operations because, as the user does not know when the operation will end, it\
    \ would be useful to inform them about it.\n\n### Marking an Operation to Send\
    \ a Notification\n\nSince not all operations would need to send a notification,\
    \ we need a way to specify that an operation requires sending a notification after\
    \ being processed. Let’s add a new parameter to the OperationMetadata attribute\
    \ to specify that the operation requires sending a notification.\n\n```\n#[\\\
    Attribute(\\Attribute::TARGET_CLASS)]\nclass OperationMetadata\n{\npublic function\
    \ __construct(\npublic readonly string $name,\npublic readonly ?string $version\
    \ = null,\npublic readonly ?string $input = null,\npublic readonly ?bool $validateByRole=\
    \ null,\npublic readonly ?Background $background = null,\npublic readonly ?bool\
    \ $requiresNotification = null\n){ }\n}\n```\n\nThe code in charge of deciding\
    \ whether to send the notification or not will have to check the *$requiresNotification*\
    \ parameter. We will deal with this in the next section."
  trans: "\n## 结论\n\n在本节中，我们学习了如何设置正确的配置，将操作消息路由到`Redis`传输层。我们还探讨了如何通过检查对应的`Redis`键来验证操作是否成功路由，并最终运行了一个工作进程来执行该操作。此外，我们还展示了如何使用`Supervisor`来管理工作进程并在其崩溃后重启。\n\
    \n下一节，我们将学习如何根据优先级创建独立的队列来路由操作。\n\n## 第 5 节 操作优先级排序\n\n在某些情况下，需要发送到后台处理的操作量可能非常大。这时，根据优先级等因素将操作量按队列进行分段管理会显得很实用。这就是我们本节要实现的内容。为此，我们将依赖\
    \ [Symfony 优先级传输](https://symfony.com/doc/current/messenger.html) 这一特性。\n\n###\
    \ 定义优先级\n\n为了定义可用的操作优先级，我们先创建一个枚举来存储它们：\n\n```php\nenum Priority\n{\n    case\
    \ NORMAL;\n    case HIGH;\n}\n```\n\n为简单起见，该枚举包含两个表示优先级的选项：`NORMAL` 和 `HIGH`。\n\
    \n### 修改元数据属性\n\n现在，我们需要在 `Background` 类属性中新增一个参数，以便用指定的优先级来标记操作。\n\n```php\n\
    class Background\n{\n    public function __construct(\n        public readonly\
    \ ?int $delay = null,\n        public readonly ?Priority $priority = Priority::NORMAL\n\
    \    ){ }\n}\n```\n\n如你所见，`Background` 类的构造函数将 `Priority` 枚举值作为第二个构造参数。默认情况下，所有后台操作都拥有\
    \ `NORMAL` 优先级。\n\n### 为高优先级操作创建消息\n\n`NORMAL` 优先级的操作将继续使用现有的 `OperationMessage`\
    \ 消息类。回顾“第 4 节 路由操作”，分派一个 `OperationMessage` 后，它会被路由到 `operations` 传输层。为了区分 `NORMAL`\
    \ 和 `HIGH` 操作，我们必须将它们路由到不同的传输层。因此，首先我们需要为 `HIGH` 优先级的消息创建一个新的消息类：\n\n```php\n\
    use App\\Messenger\\OperationMessage;\n\nclass HighPriorityOperationMessage extends\
    \ OperationMessage\n{\n}\n```\n\n由于 `NORMAL` 优先级和 `HIGH` 优先级操作拥有相同的参数，我们可以简单地继承现有的\
    \ `OperationMessage` 类。\n\n### 为每种优先级创建传输层\n\n由于我们希望将不同优先级的操作分离到不同的传输层，需要对传输层配置进行一些修改。\n\
    \n```yaml\nframework:\n    messenger:\n        transports:\n            operations:\n\
    \                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'\n                options:\n\
    \                    group: 'normal'\n            operations_high:\n         \
    \       dsn: '%env(MESSENGER_TRANSPORT_DSN)%'\n                options:\n    \
    \                group: 'high'\n        routing:\n            App\\Messenger\\\
    OperationMessage: 'operations'\n            App\\Messenger\\HighPriorityOperationMessage:\
    \ 'operations_high'\n```\n\n让我们看一下这个新配置。\n\n*   这里有两条传输层：\n    *   `operations`：用于路由\
    \ `NORMAL` 优先级的操作\n    *   `operations_high`：用于路由 `HIGH` 优先级的操作\n*   每个选项都设置了\
    \ `group` 参数。在使用 Symfony 的 `redis-transport` 时，你可以在 `options` 部分使用 `group` 参数来设置优先级。Symfony\
    \ 在内部利用 `Redis` 的流组和消费者特性来实现此功能。\n*   每条消息将被路由到其对应的传输层。\n\n### 修改消息处理器\n\n消息处理器需要能够处理这两种类型的消息。Symfony\
    \ Messenger 允许我们通过使用方法级别的 `AsMessageHandler` 属性来实现这一点，而不是在类级别使用。\n\n```php\nclass\
    \ OperationMessageHandler\n{\n    public function __construct(\n        private\
    \ readonly OperationCollection $operationCollection,\n        private readonly\
    \ EventDispatcherInterface $eventSubscriber,\n        private readonly EntityManagerInterface\
    \ $em\n    ){ }\n\n    #[AsMessageHandler]\n    public function handleNormalPriorityOperations(OperationMessage\
    \ $message): void\n    {\n        $this->handleMessage($message);\n    }\n\n \
    \   #[AsMessageHandler]\n    public function handleHighPriorityOperations(HighPriorityOperationMessage\
    \ $message): void\n    {\n        $this->handleMessage($message);\n    }\n\n \
    \   private function handleMessage(OperationMessage|HighPriorityOperationMessage\
    \ $message): void\n    {\n        $apiOperation = $this->operationCollection->getOperation($message->operation);\n\
    \        $user = null;\n        if($message->user && $apiOperation->handler instanceof\
    \ OperationRequiresUserInterface) {\n            $user = $this->em->getRepository(User::class)->findOneByEmail($message->user);\n\
    \            $apiOperation->handler->setUser($user);\n        }\n        $apiOperation->handler->perform($message->operationInput);\n\
    \    }\n}\n```\n\n如上代码所示，我们创建了一个名为 `handleNormalPriorityOperations` 的方法来处理 `NORMAL`\
    \ 操作，以及另一个名为 `handleHighPriorityOperations` 的方法来处理 `HIGH` 操作。由于这两个方法执行相同的代码，我们将处理逻辑移到了一个名为\
    \ `handleMessage` 的私有方法中。\n\n### 根据优先级分派消息\n\n这里，我们需要回顾一下前面的章节。在那里，我们修改了 `ApiOperationHandler`\
    \ 类来检查是否需要将操作执行放入队列。现在，我们需要再次修改它，以检查操作优先级并使用相应的消息类。\n\n```php\nif($operation->metadata->background)\
    \ {\n    $stamps = ($operation->metadata->background->delay)\n        ? [new DelayStamp($operation->metadata->background->delay\
    \ * 1000)]\n        : []\n    ;\n    $message = ($operation->metadata->background->priority\
    \ === Priority::NORMAL)\n        ?  new OperationMessage($operation->metadata->name,\
    \ $inputData, $userIdentifier)\n        :  new HighPriorityOperationMessage($operation->metadata->name,\
    \ $inputData, $userIdentifier)\n    ;\n    $this->bus->dispatch($message, $stamps);\n\
    \    return new ApiOutput(['status' => 'queued'], 202);\n}\n```\n\n如上所示，在检查了元数据的延迟参数之后，我们为\
    \ `NORMAL` 优先级操作创建 `OperationMessage` 消息类的实例，或者为 `HIGH` 优先级操作创建 `HighPriorityOperationMessage`\
    \ 消息类的实例。\n\n### 结论\n\n在本节中，我们学习了如何利用 Symfony Messenger 的功能，根据优先级参数来平衡操作消息在队列间的分布。这使我们能够优先处理某些操作，使其不必等待其他操作处理完毕。\n\
    \n下一章，我们将使用 Symfony 事件系统，在后台操作完成后分派一个事件。\n\n## 第 6 节 触发执行后通知\n\n某些操作可能需要在执行完成后通知用户。例如，在发送一笔付款后，用户可能会收到一封包含付款流程信息的电子邮件或短信。\n\
    \n我们将只对后台操作实现执行后通知，因为用户不知道操作何时结束，通知他们将非常有用。\n\n### 标记需要发送通知的操作\n\n由于并非所有操作都需要发送通知，我们需要一种方法来指定某个操作在处理后需要发送通知。让我们在\
    \ `OperationMetadata` 属性中添加一个新参数来指定这一点。\n\n```php\n#[\\Attribute(\\Attribute::TARGET_CLASS)]\n\
    class OperationMetadata\n{\n    public function __construct(\n        public readonly\
    \ string $name,\n        public readonly ?string $version = null,\n        public\
    \ readonly ?string $input = null,\n        public readonly ?bool $validateByRole=\
    \ null,\n        public readonly ?Background $background = null,\n        public\
    \ readonly ?bool $requiresNotification = null\n    ){ }\n}\n```\n\n负责决定是否发送通知的代码将需要检查\
    \ `$requiresNotification` 参数。我们将在下一节处理这个问题。\n"
- fmt: '### Creating the Event and the Subscriber


    First of all, we need an event to trigger after an operation execution finishes
    and a subscriber that will keep listening to that event.


    ```php

    use Symfony\Contracts\EventDispatcher\Event;

    class OperationPerformedEvent extends Event

    {

    public function __construct(

    public readonly OperationMetadata $operationMetadata,

    public readonly mixed $inputData,

    public readonly mixed $outputData,

    public readonly ?UserInterface $user

    ){}

    }

    ```


    The above event carries with it the following data:


    - **operationMetadata**: The operation metadata.

    - **inputData**: The operation input data from the ApiInput model.

    - **outputData**: The operation result data from the ApiOutput model.

    - **user**: The operation user. It can be null because not all operations require
    the user. Only those which implement the `OperationRequiresUserInterface`.


    Now, let''s code the subscriber, which will keep listening to the `OperationPerformedEvent`
    event.


    ```php

    use Symfony\Component\EventDispatcher\EventSubscriberInterface;

    class OperationSubscriber implements EventSubscriberInterface

    {

    public static function getSubscribedEvents(): array

    {

    return [

    OperationPerformedEvent::class => ''onOperationPerformed''

    ];

    }

    public function onOperationPerformed(OperationPerformedEvent $event): void

    {

    }

    }

    ```


    As we have said, the subscriber will keep listening to the `OperationPerformedEvent`
    event and will execute the `onOperationPerformed` method after the event has been
    triggered. We will define the method content later.


    ### Creating the Notifier Service


    The notifier service should send the notification to the user.


    ```php

    class Notifier {

    public function notify(string $operation, mixed $inputData, mixed $outputData,
    ?UserInterface $user) : void

    {

    }

    }

    ```


    The `notify` method is empty. In this method, we would write the necessary code
    to send the notification. We could send an email using a service like Amazon or
    an SMS using a service like Twilio. We should inject the notifier service into
    the subscriber and use it in the `onOperationPerformed` method. The `notify` method
    receives the operation name, the input and output data, and the user as parameters.


    ### Handling the Notification Based on the Operation


    Operations that require sending a notification could manage it differently. That
    is why we need to encapsulate the notification logic for each operation in different
    services.


    #### Creating a NotificationHandlerInterface


    This interface will define the contract that all notification handlers will have
    to implement.


    ```php

    use Symfony\Component\Security\Core\User\UserInterface;

    interface NotificationHandlerInterface {

    public function handleNotification(mixed $inputData, mixed $outputData, ?UserInterface
    $user);

    }

    ```


    The handlers will have to implement the sending notification logic within the
    `handleNotification` method.


    #### Creating a Notification Handler


    Below, we are showing the notification handler for the SendPayment operation.
    It implements the `NotificationHandlerInterface` defining the `handleNotification`
    method. Within this method, we would implement the sending logic (SMS, email …).
    As required by the interface, the `handleNotification` method receives the input
    and output data and the user. The user can be null since not all operations require
    it.


    It is important to take into account that most notifications will need the user
    since the notification is normally send to the user.


    ```php

    use App\Api\Notification\NotificationHandlerInterface;

    use Symfony\Component\Security\Core\User\UserInterface;

    class SendPaymentNotificationHandler implements NotificationHandlerInterface {

    public function handleNotification(mixed $inputData, mixed $outputData, ?UserInterface
    $user) : void

    {

    }

    }

    ```


    But, how can we link handlers with operations? Let''s rely on [Symfony Service
    Subscribers](https://symfony.com/doc/6.4/service_container/service_subscribers_locators.html)
    to achieve that goal.


    #### Creating the Service Subscriber


    Service Subscribers give us access to a set of predefined services while instantiating
    them only when needed through a Service Locator, a separated lazy-loaded container.
    Let''s write the service subscriber.


    ```php

    use App\Api\Notification\Types\SendPaymentNotificationHandler;

    use App\Security\Miscelanea\OperationNames;

    use Psr\Container\ContainerInterface;

    use Symfony\Contracts\Service\ServiceSubscriberInterface;

    class NotificationHandlerSubscriber implements ServiceSubscriberInterface

    {

    public function __construct(

    private readonly ContainerInterface $locator,

    ) { }

    public static function getSubscribedServices(): array

    {

    return [

    OperationNames::SendPayment->name => SendPaymentNotificationHandler::class

    ];

    }

    public function getHandler(string $operationName): NotificationHandlerInterface

    {

    return $this->locator->get($operationName);

    }

    }

    ```


    The service subscriber is pretty straightforward. The constructor injects the
    locator, which will only hold the services defined in the `getSubscribedServices`
    method. The `getSubscribedServices` method loads the available services with a
    key-value array, on which the keys are the service key (we use operation names
    as keys) and the value is the service class. The `getHandler` method uses the
    locator service to return the service related to the `$operationName` argument.


    #### Using the Service Subscriber


    Finally, we must use the subscriber to send the notification using the right handler.
    Let''s modify the `Notifier` service.


    ```php

    use Symfony\Component\Security\Core\User\UserInterface;

    class Notifier {

    public function __construct(

    private readonly NotificationHandlerSubscriber $notificationHandlerSubscriber

    ){}

    public function notify(string $operation, mixed $inputData, mixed $outputData,
    ?UserInterface $user) : void

    {

    $handler = $this->notificationHandlerSubscriber->getHandler($operation);

    $handler->handleNotification($inputData, $outputData, $user);

    }

    }

    ```


    Now, the `Notifier` service uses the corresponding handler according to the operation
    name. It injects the recently created `NotificationHandlerSubscriber` and uses
    it to get the handler. Then, it uses the handler to send the notification.


    ### Using the Notifier Service


    Having the Notifier service ready, we can use it in the OperationSubscriber.


    ```php

    use App\EventSubscriber\Event\OperationPerformedEvent;

    use Symfony\Component\EventDispatcher\EventSubscriberInterface;

    class OperationSubscriber implements EventSubscriberInterface

    {

    public function __construct(

    private readonly Notifier $notifier

    ){}

    public static function getSubscribedEvents(): array

    {

    return [

    OperationPerformedEvent::class => ''onOperationPerformed''

    ];

    }

    public function onOperationPerformed(OperationPerformedEvent $event): void

    {

    if($event->operationMetadata->requiresNotification){

    $this->notifier->notify($event->operationMetadata->name, $event->inputData, $event->outputData,
    $event->user);

    }

    }

    }

    ```


    The `onOperationPerformed` method will only send the notification if the operation
    requires doing it. It figures out it by checking the metadata `requiresNotification`
    parameter.'
