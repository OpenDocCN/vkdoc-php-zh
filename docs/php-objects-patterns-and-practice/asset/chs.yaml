  \n### 触发构建\n\n如果团队中的某人必须记住手动点击以启动每次构建，那么所有这些丰富的信息几乎都没用。自然，Jenkins 提供了可以自动触发构建的机制。\n\
  \n你可以设置 Jenkins 按固定时间间隔构建，或者按指定时间间隔轮询版本控制仓库。时间间隔可以使用 cron 格式设置，这种格式提供了精细但有些神秘的调度控制。幸运的是，Jenkins\
  \ 为这种格式提供了良好的在线帮助，并且如果你不需要精确调度，还有一些简单的别名。这些别名包括`@hourly`、`@midnight`、`@daily`、`@weekly`和`@monthly`。在图\
  \ 21-12 中，我将构建配置为每天运行一次，或者每次仓库发生变化时运行，这基于每小时进行一次的变更轮询。\n\n![A314621_5_En_21_Fig12_HTML.jpg](img/A314621_5_En_21_Fig12_HTML.jpg)\n\
  \n图 21-12. 调度构建\n\n### 测试失败\n\n到目前为止，一切似乎进展顺利，即使`userthing`短期内不会赢得任何代码合规徽章。但测试在失败时才算成功，所以我最好破坏一些东西，以确保\
