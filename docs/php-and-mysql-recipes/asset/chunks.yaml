    City: {$weather->name}\\n\";\n\n$k = $weather->main->temp;\n\n$c = $k - 273.15;\n\
    \n$f = $c * 9 / 5 + 32;\n\nprintf(\"Temperature: %3.1f K / %3.1f C / %3.1f F\\\
    n\", $k, $c, $f); echo \"Wind: {$weather->wind->speed} mph, direction: {$weather->wind->deg}\\\
    n\";\n```\n\n此脚本将生成类似于示例`14_4.php`中的输出。\n\n```\nCity: Los Angeles\nTemperature:\
    \ 290.7 K / 17.6 C / 63.7 F\nWind: 1.31 mph, direction: 201.001\n```\n\n# 配方 15-4.\
    \ JSON API\n\n## 问题\n\n当客户端从多个来源消费 API 时，每个来源通常对内容的格式以及在响应中包含哪些元素有自己的定义。这使得处理这些\
    \ API 变得更加困难。\n\n## 解决方案\n\n2015 年，一个名为 JSON API 的新标准达到了 1.0 版本。该标准定义了 API 请求和响应应如何格式化的所有头部信息和其他细节。该标准记录在`http://jsonapi.org`。其目标是改善缓存，从而减少与\
    \ API 交互所需的网络流量。更少的网络流量使得在相同硬件上为更多用户提供服务成为可能。\n\n所有 API 的基本结构是一个 JSON 结构，包含以下三个顶级对象中的一个或多个：`data`（数据）、`errors`（错误）和`meta`（元数据）。此外，还允许包含`jsonapi`、`links`（链接）和`includes`（包含）作为顶级对象。\n\
    \n`data`对象应包含响应的主要数据。对于返回单个资源的 API，它可以是一个对象或`null`；对于返回资源列表的 API，它可以是一个对象数组或空数组。\n\
    \n一个用于获取网站访问者数量的简单 API 响应可能如下所示：\n\n```json\n{\n  'data': {\n    'type': 'statistics',\n\
    \    'id': 'visitors',\n    'attributes': {\n      'value': 25\n    }\n  }\n}\n\
    ```\n\n每个资源必须包含`type`和`id`，且它们必须是字符串。可以在顶级添加一个`link`对象来表示 API 的链接。\n\n```json\n\
    {\n  'data': {\n    'type': 'statistics',\n    'id': 'visitors',\n    'attributes':\
    \ {\n      'value': 25\n    }\n  },\n  'links': {\n    'self': \"http://localhost/statistics/visitors\"\
    \n  }\n}\n```\n\n`link`部分也可用于引用同一数据集中的其他数据。如果 API 返回一篇博客文章，并且你想要链接到同一系列中的下一篇、上一篇、第一篇和最后一篇文章，响应可能如下所示：\n\
    \n```json\n{\n  'data': {\n    'type': 'articles',\n    'id': '5',\n    'attributes':\
    \ {\n      'title': 'PHP and MySQL Recipes'\n    }\n  },\n  'links': {\n    'self':\
    \ \"http://localhost/articles/5\",\n    'next': \"http://localhost/articles/6\"\
    ,\n    'prev': \"http://localhost/articles/4\",\n    'first': \"http://localhost/articles/1\"\
    ,\n    'last': \"http://localhost/articles/17\"\n  }\n}\n```\n\n所有请求和响应必须使用`Content-Type:\
    \ application/vnd.api+json`，该标准还描述了如何处理相关数据（如博客文章的评论等）。\n\n## 工作原理\n\n使用像 JSON\
    \ API 这样的标准的好处之一是，它能够通过一组通用的工具进行处理。\n\n```php\n<?php\n\n// 15_5.php\n\nclass JsonResource\
    \ {\n  function __construct($type, $id) {\n    $this->type = $type;\n    $this->id\
    \ = $id;\n    $this->addLink('self', \"$type/$id\");\n  }\n\n  function addAttribute($name,\
    \ $value) {\n    if (!$this->attributes) {\n      $this->attributes = new stdClass();\n\
    \    }\n    $this->attributes->$name = $value;\n  }\n}\n```\n"
