  raw: 'Note how the insert statements for the second album have two quotes where
    the apostrophe is. This is necessary as the single quote is the string delimiter
    and in order to insert a single quote it must be escaped to tell the parser that
    it’s not the end of the string.


    The Id columns are added automatically as the insert statements did not provide
    them and the description field was left unspecified and shows the NULL value.


    The next example shows how to create a class that extends the mysqli class.


    <?php


    // 16_6.php


    ini_set(''display_errors'', 1);


