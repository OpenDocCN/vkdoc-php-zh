    ```


    仅在单引号之前或字符串末尾才需要转义反斜杠。


    ### 字符引用


    字符串中的字符可以通过在字符串变量后的方括号中指定所需字符的索引（从零开始）来引用。这既可用于访问单个字符，也可用于修改单个字符。


    ```

    $s = ''Hello'';

    $s[0] = ''J'';

    echo $s; // "Jello"

    ```


    `strlen`函数用于获取字符串参数的长度。例如，这可用于修改字符串的最后一个字符。


    ```

    $s[strlen($s)-1] = ''y'';

    echo $s; // "Jelly"

    ```


    ### 字符串比较


    比较两个字符串的方法是直接使用等于运算符。这不会像某些其他语言那样比较内存地址。


    ```

    $a = ''test'';

    $b = ''test'';

    $c = ($a == $b); // true

    ```


