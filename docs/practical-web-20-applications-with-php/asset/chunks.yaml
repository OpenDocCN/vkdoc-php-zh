    C H A P T E R 1 4 ■ D E P L OY M E N T A N D M A I N T E N A N C E


    The way we are going to do this is by writing values to the web server environment
    in the Apache configuration. Using the Apache SetEnv direct, we are going to write
    a value that specifies the name of the configuration section to use, as well as
    the name of the settings file to use.'
