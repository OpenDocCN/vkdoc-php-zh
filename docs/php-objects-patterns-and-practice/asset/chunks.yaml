    \ Git repositories\n |\n\nxUnit Plug-in\n |\n  Integration with the xUnit family\
    \ of tools including PHPUnit\n |\n\nPhing Plug-in\n |\n  Invoke Phing targets\n\
    \ |\n\nClover PHP Plug-in\n |\n  Accesses clover XML file and HTML files generated\
    \ by PHPUnit and\ngenerates report\n |\n\nHTML Publisher Plug-in\n |\n  Integrates\
    \ HTML reports. Used for PHPDocumentor output\n |\n\nCheckstyle Plug-in\n |\n\
    \  Accesses the XML file generated by PHPCodeSniffer and generates report\n |\n\
    \nYou can see the Jenkins plug-in page in Figure [21-3](#A314621_5_En_21_Chapter.html#Fig3).\n\
    \n![A314621_5_En_21_Fig3_HTML.jpg](A314621_5_En_21_Fig3_HTML.jpg)\n\nFigure 21-3.\n\
    \nThe Jenkins plug-in screen\n\nHaving installed these plug-ins, I’m almost ready\
    \ to create and\nconfigure my project.\n\nSetting up the Git Public Key\n\nBefore\
    \ I can use the Git plug-in, I need to ensure that I have access to\na Git repository.\
    \ In Chapter [17](#A314621_5_En_17_Chapter.html) I described the process of\n\
    generating a public key in order to access a remote Git repository. We\nneed to\
    \ repeat this process here. But where does Jenkins call home?\n\nThis location\
    \ is configurable, but naturally Jenkins will clue you in. I\nclick on `Manage\
    \ Jenkins` and then `Configure System`. I\nfind Jenkins’ home directory listed\
    \ there. Of course, I could also check\nthe `/etc/passwd`\nfile for information\
    \ relating to the `jenkins` user. In my\ncase, the directory is `/var/lib/jenkins.`\n\
    \nNow I need to configure an `SSH` directory:\n\n```\n$ sudo su jenkins -s /bin/bash\n\
    $ cd ∼\n$ mkdir .ssh\n$ chmod 0700 .ssh\n$ ssh-keygen\n```\n\nI switch to the\
    \ `jenkins` user,\nspecifying the shell to use (because shell access may be deactivated\
    \ by\ndefault). I change to this user’s home directory. The `ssh-keygen` command\n\
    generates the SSH keys. When prompted for a password, I just hit Return,\nso Jenkins\
    \ will be authenticated by its key only. I make sure that the\nfile generated\
    \ at `.ssh/id_rsa` is\nneither world- nor group-readable:\n\n```\n$ chmod 0600\
    \ .ssh/id_rsa\n```\n\nNow I can acquire the public key from `.ssh/id_rsa.pub`\
    \ and\nadd it to my remote Git repository. See Chapter [17](#A314621_5_En_17_Chapter.html)\
    \ for more on that.\n\nI’m not quite there yet. I need to ensure that my Git server\
    \ is an SSH\nknown host. I can combine setting this up with a command-line test\
    \ of my\nGit configuration. I make sure I’m still logged in as the `jenkins` user\
    \ when I\ndo this:\n\n```\n$ cd /tmp\n$ git clone git@bitbucket.org:getinstance/userthing.git\n\
    ```\n\nI am prompted to confirm my Git host, and it’s then added to the `jenkins`\
    \ user’s `.ssh/known_hosts`\nfile. This prevents Jenkins from tripping over later\
    \ when it makes its\nGit connection.\n\nInstalling a Project\n\nFrom the Jenkins\
    \ dashboard page, I click on `New Item`. From this\nnew screen I can, at last,\
    \ create my `userthing` project.\nYou can see the setup screen in Figure [21-4](#A314621_5_En_21_Chapter.html#Fig4).\n\
    \n![A314621_5_En_21_Fig4_HTML.jpg](A314621_5_En_21_Fig4_HTML.jpg)\n\nFigure 21-4.\n\
    \nThe project setup screen\n\nI chose `Freestyle project` and hit `OK`. That leads\
    \ me to\nthe project configuration screen. My first order of business is to link\n\
    up with the remote Git repository. I choose the Git radio button in the\n`Source\
    \ Code Manager section` and add my repository. You can see this in Figure [21-5](#A314621_5_En_21_Chapter.html#Fig5).\n\
    \n![A314621_5_En_21_Fig5_HTML.jpg](A314621_5_En_21_Fig5_HTML.jpg)\n\nFigure 21-5.\n\
    \nSetting up the version-control repository\n\nIf all has gone well, I should\
    \ be able to access my source code. I can\ncheck that by saving and choosing `Build`\
    \ from the\ndashboard page. In order to see some meaningful action, however, I\n\
    should also set up Phing. This is simple if you’ve installed Phing\ncentrally.\
    \ If you’re using Composer, however, things are just a little\nmore complicated.\
    \ You must tell Jenkins where to find the Phing\nexecutable. You can do this by\
    \ choosing `Manage Jenkins` from\nthe main menu, and then `Global Tool Configuration`.\
    \ Because I have installed the Phing plug-in, I will\nfind a configuration area\
    \ for the tool there. In Figure [21-6](#A314621_5_En_21_Chapter.html#Fig6), I\
    \ add the\npath to the `phing` script’s\nlocation (or at least to the location\
    \ it will end up once Composer has\nbeen run).\n\n![A314621_5_En_21_Fig6_HTML.jpg](A314621_5_En_21_Fig6_HTML.jpg)\n\
    \nFigure 21-6.\n\nSpecifying Phing’s location\n\nWith that step complete I can\
    \ configure Phing for my project. I return\nto the `userthing` project\narea and\
    \ the `Configure` menu. I\nscroll to the `Build` section and\nchoose two items\
    \ from the `Add build step`\npulldown. First, I choose `Execute shell`. I need\n\
    to make sure that Jenkins runs `composer install`, or\nnone of the tools my project\
    \ depends upon will be installed. Figure\n[21-7](#A314621_5_En_21_Chapter.html#Fig7)\
    \ shows the\nconfiguration.\n\n![A314621_5_En_21_Fig7_HTML.jpg](A314621_5_En_21_Fig7_HTML.jpg)\n\
    \nFigure 21-7.\n\nSetting up shell execution\n\nThe next item I choose from the\
    \ `Add build step`\npulldown is `Invoke Phing targets`. Here can I add my Phing\
    \ targets to the text field.\nYou can see this step in Figure [21-8](#A314621_5_En_21_Chapter.html#Fig8).\n\
    \n![A314621_5_En_21_Fig8_HTML.jpg](A314621_5_En_21_Fig8_HTML.jpg)\n\nFigure 21-8.\n\
    \nConfiguring Phing\n\nRunning the First Build\n\nI save the configuration screen\
    \ and click `Build Now` to run the\nbuild and test process. This is the moment\
    \ of truth! A build link should\nappear in the `Build History` area of the screen.\
    \ I click on that, and then on `Console Output` to\nconfirm that the build went\
    \ ahead as hoped. You can see the output\n(albeit from a later build) in Figure\
    \ [21-9](#A314621_5_En_21_Chapter.html#Fig9).\n\n![A314621_5_En_21_Fig9_HTML.jpg](A314621_5_En_21_Fig9_HTML.jpg)\n\
    \nFigure 21-9.\n\nConsole output\n\nJenkins checks the `userthing` code out\n\
    from the Git server, and runs all the build and test targets.\n\nConfiguring the\
    \ Reports\n\nThanks to my build file, Phing saves reports into the `build/reports`\n\
    directory and documentation into `build/docs`. The\nplug-ins that I activated\
    \ can be configured from the `Add post-build action`\npulldown in the project-configuration\
    \ screen.\n\nFigure [21-10](#A314621_5_En_21_Chapter.html#Fig10) shows some\n\
    of these configuration items.\n\n![A314621_5_En_21_Fig10_HTML.jpg](A314621_5_En_21_Fig10_HTML.jpg)\n\
    \nFigure 21-10.\n\nConfiguring report plug-in items\n\nRather than subject you\
    \ to screenshot after screenshot, it will be\nclearer to compress the configuration\
    \ items into a table. Table [21-2](#A314621_5_En_21_Chapter.html#Tab2) shows some\n\
    post-build action fields and the corresponding values I set up in my\nPhing build\
    \ file.\n\nTable 21-2.\n\nReport configuration\n\nConfiguration item\n |\n  Phing\
    \ Task\n |\n  Field\n |\n  Value\n |\n\n| --- | --- | --- | --- | --- | --- |\
    \ --- | --- | --- |\n\nPublish Checkstyle analysis results\n |\n  `phpcodesniffer`\n\
    \ |\n  Checkstyle results\n |\n  `reports/checkstyle.xml`\n |\n\nPublish Clover\
    \ PHP Coverage Report\n |\n  `phpunit`\n |\n  Clover XML Location\n |\n  `reports/cloverreport.xml`\n\
