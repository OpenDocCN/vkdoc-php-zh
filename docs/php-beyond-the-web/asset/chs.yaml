  \ **主要网站**: [`pecl.php.net/package/win32std`](http://pecl.php.net/package/win32std)\
  \ |\n|   |   |\n|   | **主要文档和安装信息**: 请参阅下载包中的 README 文件。 |\n|   |   |\n|   | **备用文档**:\
  \ [`wildphp.free.fr/wiki/doku.php?id=win32std:index`](http://wildphp.free.fr/wiki/doku.php?id=win32std:index)\
  \ |\n\n\n\n### 5.7 静态 HTML 输出\n\nPHP 当然非常擅长生成 HTML 输出，这毕竟是它最初存在的意义。在 CLI 运行结束时，HTML\
  \ 可用于显示信息、图表、数据等，你可以使用 PHP 内置的 HTML 工具来实现这一点。这一过程通常通过像 Apache 这样的 Web 服务器完成，因此对于如何从\
  \ CLI 脚本创建和显示 HTML，可能不是那么一目了然。最终目标是创建一个或多个 HTML 文件来显示输出，将其保存到磁盘，并由本地 Web 浏览器展示。\n\
  \n你可能可以想象以字符串形式创建 HTML，然后类似于创建其他文本/数据文件的方式，顺序写入磁盘。然而，PHP 为我们提供了一个巧妙的技巧，称为**输出缓冲**，它允许我们假装自己实际上是在正常的\
  \ Web 服务器环境中发送 HTML。这使我们能够使用诸如将 HTML 块与代码交错、`echo` 和 `print_r` 数据等功能，但 PHP 不会将其发送到\
  \ Web 服务器，而是为我们捕获这些内容，并允许我们将其批量写入磁盘。如果你有来自基于 Web 的项目的现有报告或模板代码，并且希望轻松地在命令行中复用，这将特别有用。\n\
  \n以下示例展示了如何告知 PHP 开始收集输出，自行生成一些输出，将其保存到磁盘，并最终在本地 Web 浏览器中打开它。\n\n```\n 1 <?\n\n\
  \ 3 echo(\"这段文本将照常输出到 STDOUT（你的终端）\\n\");\n\n 5 # 开始缓冲输出，而不是将其发送到 STDOUT\n\n 7 ob_start();\n\
  \n 9 # echo 和 print 会写入 php://output 流。默认情况下，\n10 # php://output 写入 STDOUT，这就是 echo\
  \ 通常将内容打印回终端的原因。\n11 # ob_start() 会捕获 php://output 流，\n12 # 然而，如果我们想告知用户当前的操作，仍然可以直接写入\
  \ STDOUT（而不是通过 echo）。\n\n15 fwrite(STDOUT, \"开始生成 HTML...\\n\"); # 显示在终端中\n\n17\
  \ # 因此，我们就像在“网络上”一样创建 HTML\n\n19 echo('<html>');\n\n21 print(\"<head><title>我的 HTML\
  \ 页面</title></head>\\n\");\n\n23 ?>\n24 <body>\n25 <h1> 交错一些 HTML</h1>\n26 <p>以传统的\
  \ PHP 方式</p>\n27 <p>\n28 <a href=\"http://www.php.net\">一个重要的链接</A>|||\n29 <?\n\n\
  31 echo('</body></html>');\n\n33 fwrite(STDOUT, \"HTML 生成完毕\\n\"); # 显示在终端中\n\n\
  35 # ob_get_contents() 创建一个包含到目前为止所有缓冲内容的字符串。\n\n37 $ourHtml = ob_get_contents();\n\
  \n39 # 如果需要，我们可以继续缓冲，或者在此情况下我们\n40 # 使用 \"ob_end_clean\" 优雅地结束。如果我们改用 ob_end_flush()，\n\
  41 # 那么缓冲区的内容将被推送到 php://output，在结束缓冲后\n42 # 该输出流就是 STDOUT，这不是我们想要的。\n\n44 ob_end_clean();\n\
  \n46 echo (\"这段文本将输出到 STDOUT\\n\"); # 现在我们已经结束了缓冲\n\n48 # 最后，我们想将缓冲的 HTML 保存到一个文件中。让我们创建一个\n\
  49 # 唯一的临时文件名 ....\n\n51 $filename = tempnam(sys_get_temp_dir(), 'my_report_').'.html';\n\
  \n53 # 并将 HTML 字符串写入其中。\n\n55 file_put_contents($filename, $ourHtml);\n\n57 # 最后，我们想打开一个\
  \ Web 浏览器来查看刚刚创建的 HTML \"报告\"。\n58 # 这里我们使用 \"see\" 命令（在大多数基于 Debian 的发行版上可用）\n\
  59 # 来打开该文件类型（HTML）的默认查看器。\n60 # 在其他平台上，\"open\" 命令可实现同样的效果。你也可以指定\n61 # 特定的浏览器，例如\
  \ `firefox $filename`\n\n64 `see $filename`;\n```\n\n| ![信息](img/image00248.jpeg)\
  \ | **延伸阅读** PHP 手册中的输出缓冲控制 [`www.php.net/manual/en/book.outcontrol.php`](http://www.php.net/manual/en/book.outcontrol.php)\
  \ |\n\n### 5.8 完整的图形界面（GUI）\n\n如今，许多用户期望完整的图形用户界面，这非常有道理。设计得当的 GUI 有利于功能发现和交互的便利性。它们能够以直观、人性化的方式呈现数据和信息，并且非常适合基于事件的编程。\n\
  \n大多数 GUI 程序都使用“控件工具包”（也称为 GUI 工具包）编写。这些工具包或框架提供了构建 GUI 基本元素的代码：窗口、表单、按钮、列表、鼠标交互、菜单、事件等等。控件工具包数量众多，有些是低级且特定于平台的，例如适用于\
  \ Windows 的 Windows API 或适用于 Mac OS X 的 Carbon；有些是高级且跨平台的，例如 GTK+ 和 QT；还有一些是语言特定的，例如适用于\
  \ Java 的 Swing 和适用于 Object Pascal 的 LCL。维基百科上有一个相当全面的列表。\n\n| ![信息](img/image00248.jpeg)\
  \ | **延伸阅读** 维基百科上的控件工具包 [`en.wikipedia.org/wiki/List_of_widget_toolkits`](http://en.wikipedia.org/wiki/List_of_widget_toolkits)\
  \ |\n\n在 PHP 中有两种方法可以使用这些工具包来创建图形界面。第一种是通过直接绑定——你的 PHP 脚本通过库或 PHP 扩展直接调用工具包。第二种是通过辅助应用程序——你的\
  \ PHP 脚本使用中间语言（如 HTML 或 XUL）告诉辅助应用程序想要显示什么，然后辅助应用程序负责调用工具包（或其自身代码）的必要元素，并为你显示界面。前者是编写图形应用程序的传统方式，后者则更类似于\
  \ Web 方法（在 Web 方法中，浏览器是辅助应用程序，你的脚本向其发送 HTML）。两种方法各有利弊，下面我们将了解这两种方法当前的一些实现。\n\n\n\
  ### 5.9 理解 GUI 和事件驱动编程\n\n在此值得花点时间来探讨 GUI 应用与命令行编程之间的一个主要区别。大多数 GUI 编程都属于事件驱动编程，如果你以前没有使用过这种编程风格，可能需要一些时间才能理解。\n\
  \n在 GUI 程序中，你通常会像往常一样从“顺序”编程开始：打开一个窗口或表单，并用按钮、文本、图像、数据或其他元素填充它。\n\n此时，程序会进入一个等待循环，通常等待用户（有时是系统）执行某个操作。这可能是在等待用户点击按钮、输入文本、选择选项，或者等待新数据的到达。这些操作中的每一个都被称为事件，而你通常无法预测它们发生的顺序。因此，你的代码会将事件绑定到函数或方法，并在相关事件发生时调用它们。\n\
  \n这意味着你的代码常常不按顺序执行，因此对状态的跟踪要比从上到下顺序执行的命令行脚本甚至 Web 脚本复杂得多。处理基于事件的程序最常用的方法是使用面向对象（OO）编程技术，事实上，GUI\
  \ 软件的兴起也推动了面向对象编程的发展（或者说是紧随其后，具体说法因人而异）。当然，使用传统的“命令式”编程风格也完全可以，特别是如果你对状态和作用域等问题保持谨慎的话；但如果你打算大量进行\
  \ GUI 编程，而又不熟悉面向对象，那么找一本面向对象入门书籍快速翻看一下，或许会对你大有裨益。\n\n| ![信息图标](img/image00248.jpeg)\
  \ | **延伸阅读**维基百科上的面向对象编程 [`en.wikipedia.org/wiki/Object-oriented_programming`](http://en.wikipedia.org/wiki/Object-oriented_programming)Lorna\
  \ Mitchell 的“PHP OOP 入门” [`www.lornajane.net/posts/2012/introduction-to-php-oop`](http://www.lornajane.net/posts/2012/introduction-to-php-oop)Jason\
  \ Lengstorf 的“面向初学者的面向对象 PHP” [`net.tutsplus.com/tutorials/php/object-oriented-php-for-beginners/`](http://net.tutsplus.com/tutorials/php/object-oriented-php-for-beginners/)\
  \ |\n\n从某种意义上说，Web 编程也是事件驱动的：你通常向用户展示一个 HTML 页面，然后等待他们点击按钮或链接，并通过另一个 HTML 页面（或者使用不同参数再次运行同一个脚本）来处理该“事件”。你的每个\
  \ HTML 页面（或生成它们的 PHP 脚本）在某种程度上等价于 GUI 脚本中调用的单个函数或方法，而你的 Web 服务器（如 `Apache` 等）则等价于\
  \ GUI 程序中的等待循环，它负责维系一切并对事件做出反应。不同之处在于，在 Web 编程中（尤其是使用 PHP 时），我们基于“无共享”（或几乎无共享）的原则运行——每次脚本执行或\
  \ HTML 页面获取都是刻意独立的，除非我们主动共享某些状态。而在 GUI 编程中，我们通常是在同一进程内的同一脚本集合中运行，因此这是一种“几乎共享一切”的架构。一旦你理解了这一概念，就会发现规划和设计软件变得容易得多。\n\
  \n现在让我们来看看一些可用的 GUI 工具包。\n\n### 5.10 wxPHP\n\n`wxPHP` 始于 2005 年，近期发展迅猛，是目前这里列出的部件库绑定中最活跃的一个。`wxPHP`\
  \ 提供了 `wxWidgets` 的绑定，`wxWidgets` 是一个跨平台的原生部件库，支持 Linux、Windows 和 Mac OS X。最新的构建版本可直接从\
  \ `wxPHP` 的 Github 仓库获取，随后会在主站上发布正式版本。`wxWidgets` 主要是一个基于 C++ 的库，但也提供了多种其他语言的绑定，并且得到了良好的支持，内容全面且广泛，正处于积极开发中。一些观察者批评许多\
  \ wxWidgets 应用外观单调、风格保守（想想“大片的灰色”），但用它也能创建出相当吸引人的界面，`wxPHP` 网站上展示了使用 PHP 绑定创建的应用实例截图。\n\
  \n关于文档的简要说明：`wxPHP` 提供的文档（类参考等）相当简略，它们是在每次构建新版绑定时自动生成的，基本上只列出了支持的部件和属性。更有用的信息来源是官方的\
  \ `wxWidgets` 文档以及 `wxWidgets` 维基。它们共同提供了每个部件功能的详细信息以及指南和教程。这些内容并非 PHP 专用，但无论你使用哪种语言，通常都很有用。你应该将\
  \ `wxPHP` 文档视为一个简单的参考，用以确认特定部件或方法是否已在 PHP 中实现。\n\n| ![信息图标](img/image00248.jpeg)\
  \ | **延伸阅读**官方 wxWidgets 文档 [`wxwidgets.org/docs/`](http://wxwidgets.org/docs/)官方\
  \ wxWidgets 维基 [`wiki.wxwidgets.org/`](http://wiki.wxwidgets.org/) |\n\n安装完成后，创建应用就相当直接了。窗口（通常称为表单或框架）可以通过在\
  \ PHP 脚本中直接添加按钮、方框、输入框等元素，以编程方式构建。对于更复杂的布局，这种设计界面的方式可能比较繁琐。幸运的是，`WxFormBuilder`（可在大多数基于\
  \ Debian 的 Linux 发行版的软件仓库中找到）是一个用于 `wxWidgets` 的图形化布局工具，它允许你通过将元素拖放到窗口中来设计界面，并且现在支持输出必要的\
  \ PHP 代码，以便在程序中使用你的设计。你还可以用它来管理事件，例如指定在点击按钮时执行哪些函数。借助 `wxFormBuilder`，`wxPHP` 有充分理由将自己定位为领先的\
  \ PHP 快速应用开发（RAD）环境。\n\n让我们来看一些 `wxPHP` 的示例代码。这将帮助你理解 GUI 应用在 PHP 中通常是如何构建的，以及它与典型\
  \ Web 应用的区别。虽然下面的代码是 `wxPHP` 专用的，但许多 GUI 工具包至少都遵循相同的面向对象、事件驱动的结构。以下代码由 `wxPHP` 项目编写，并经其许可转载。行内注释是我添加的。\n\
  \n```\n 1 <?php\n\n3 # 每个框架或窗口都是通过扩展 wxFrame 类来设计的，\n  4 # 并添加按钮、菜单、文本框等图形元素，\n\
  \  5 # 以及用于响应“事件”（如鼠标点击和窗口关闭）的函数。\n\n8 # 我们将创建一个名为 \"MainFrame\" 的类，描述应用程序的窗口\n\n\
  10 class MainFrame extends wxFrame\n 11 {\n\n13 \t# 我们将添加一个函数，在退出时销毁框架对象。\n\n15\
  \ \tfunction onQuit()\n 16 \t{\n 17 \t\t$this->Destroy();\n 18 \t}\n\n20 \t# 我们将添加一个函数，显示关于对话框以展示应用程序的信息\n\
  \n23 \tfunction onAbout()\n 24 \t{\n 25 \t\t# \"wxMessageDialog\" 是该工具包中众多组件或“部件”之一。\n\
  26 \t\t# 这可以避免你为了显示消息而创建新的框架/窗口。\n```\n\n\n\n```php\n$dlg = new wxMessageDialog(\n\
  \    $this,\n    \"欢迎使用 wxPHP！！\\n 基于 wxWidgets 3.0.0\\n\\n\".\n    \"这是一个极简的 wxPHP\
  \ 示例！\",\n    \"关于对话框...\",\n    wxICON_INFORMATION\n);\n\n# 显示我们上面创建的对话框。\n$dlg->ShowModal();\n\
  \n# 添加一个构造函数。当我们通过这个类创建新对象来创建应用程序窗口时，会运行此函数。\nfunction __construct()\n{\n    # 这将调用我们继承的\
  \ wxFrame 类中的构造函数，创建一个标题为\n    # \"Minimal wxPHP App\" 的框架窗口，位于屏幕默认位置，\n    # 初始大小为\
  \ 350 x 260 像素。请注意，此框架默认情况下是不可见的，\n    # 它目前只是在内存中创建。这意味着我们可以在显示给用户之前，\n    # 向它添加内容并充分准备它，而不是用户看到一个空白窗口，\n\
  \    # 然后突然被按钮等填满。\n    parent::__construct(null, null, \"Minimal wxPHP App\", \n\
  \        wxDefaultPosition, new wxSize(350, 260));\n\n    # 我们将向窗口添加带有各种选项的菜单，\n\
  \    # 这意味着首先添加一个菜单栏，然后将菜单放入其中。\n    $mb = new wxMenuBar();\n\n    # 现在我们添加菜单。首先是一个带有\"\
  退出\"选项的\"文件\"菜单。\n    $mn = new wxMenu();\n    $mn->Append(2, \"E&xit\", \"退出此程序\"\
  );\n    $mb->Append($mn, \"&File\");\n\n    # 然后是一个带有\"关于\"选项的\"帮助\"菜单。\n    $mn\
  \ = new wxMenu();\n    $mn->AppendCheckItem(4, \"&About...\", \"显示关于对话框\");\n  \
  \  $mb->Append($mn, \"&Help\");\n\n    # 请注意，上面的菜单和选项都带有\"&\"符号。它位于\n    # 应作为键盘快捷键使用的字母之前。使用这样的窗口小部件工具包意味着\n\
  \    # 您不必编写自己的代码来管理键盘快捷键之类的事情，\n    # 从而节省时间和精力，并为用户创造一致的体验。\n\n    # 最后将菜单栏添加到框架中。\n\
  \    $this->SetMenuBar($mb);\n\n    # 让我们向框架添加一个源代码编辑框，这是该工具包中另一个可用的\n    # 小部件，具有语法高亮、智能缩进等功能。\n\
  \    $scite = new wxStyledTextCtrl($this);\n\n    # 我们要添加的最后一个小部件是窗口底部的状态栏。\n  \
  \  $sbar = $this->CreateStatusBar(2);\n    $sbar->SetStatusText(\"欢迎使用 wxPHP...\"\
  );\n\n    # 在这个类的开头，我们定义了几个函数，一个\n    # 用于显示关于对话框，一个用于退出应用程序。它们本身\n    # 不会做任何事情，我们需要将它们连接到我们之前创建的菜单\n\
  \    # 选项上。更具体地说，连接到当用户从菜单中选择某项时\n    # 被调用的\"wxEVT_COMMAND_MENU_SELECTED\"事件。\n\
  \    $this->Connect(2, wxEVT_COMMAND_MENU_SELECTED, \n        array($this,\"onQuit\"\
  ));\n    $this->Connect(4, wxEVT_COMMAND_MENU_SELECTED, \n        array($this,\"\
  onAbout\"));\n}\n```\n\n```php\n# 我们现在已经设计好了框架，并用小部件和函数填充了它，\n# 但在代码的这个阶段，它还不存在。我们需要使用我们的类创建一个\n\
  # 新对象，这将使其活跃起来，并调用上面的构造函数。\n$mf = new mainFrame();\n\n# 框架现在存在了，它填充了小部件，并且所有函数\n\
  # 都已连接到事件上。但是它是隐藏的，所以我们需要\n# 使其可见。\n$mf->Show();\n\n# 此时，我们需要让 wxWidgets 接管并运行程序。\n\
  # 调用 wxEntry 让 wxWidgets 管理应用程序，等待并\n# 响应事件，并调用我们之前指定的函数。\n# 如您所见，我们需要在到达此点之前指定所有应用程序代码。\n\
  wxEntry();\n\n# 如果我们到达此点，意味着我们的应用程序已退出（要么\n# 用户关闭了它，要么我们代码中的某些东西关闭了它），并且\n# 我们可以进行任何必要的清理工作或直接退出。\n\
  ?>\n```\n\n安装了 wxPHP 后，上面的代码可以简单地保存为例如 `\"myapp.php\"`，并以与任何其他 PHP CLI 脚本相同的方式执行，例如通过调用\
  \ `php myapp.php`。\n\n从上面的代码可以看出，与过程式 Web 脚本的主要区别之一是，我们通常不会边执行边执行代码。一切都在前期定义好，通常是在类中，然后根据用户输入的需要按需执行。这就是为什么面向对象代码特别适合\
  \ GUI 和基于事件的编程，因为它提供了一种模型，可以更自然地映射到通常\"不按顺序\"执行的代码，而窗口和小部件的视觉隐喻也自然地关联到类和对象的编程隐喻。\n\
  \n上面的示例非常简单，并不特别实用。要查看一个使用 wxPHP 编写的完整、实用的应用程序示例，请查看下面的 `phar-gui` 项目。这是一个由 wxPHP\
  \ 项目维护者编写的开源 Phar 文件浏览器（关于 Phar 文件的信息请参见第 10 章）。它演示了较大型应用程序的结构，并演示了如何使用 wxFormBuilder\
