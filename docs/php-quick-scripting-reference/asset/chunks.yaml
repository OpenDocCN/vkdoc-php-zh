    \ inconsistencies. Traits provide a way to avoid this shortcoming in single inheritance\
    \ by enabling code reuse that is independent of the class hierarchy.\n\n# CHAPTER\
    \ 17\n\n![image](images/frontdot.jpg)\n\n## Importing Files\n\nThe same code often\
    \ needs to be called on multiple pages. This can be done by first placing the\
    \ code inside a separate file and then including that file using the `include`\
    \ statement. This statement takes all the text in the specified file and includes\
    \ it in the script, just as if the code had been copied to that location. Just\
    \ like `echo`, `include` is a special language construct and not a function, so\
    \ parentheses should not be used.\n\n```php\n<?php\ninclude 'myfile.php';\n?>\n\
    ```\n\nWhen a file is included parsing changes to HTML mode at the beginning of\
    \ the target file and resumes PHP mode again at the end. For this reason any code\
    \ inside the included file that needs to be executed as PHP code must be enclosed\
    \ within PHP tags.\n\n```php\n<?php\n// myfile.php\n?>\n```\n\n### Include path\n\
    \nAn include file can either be specified with a relative path, an absolute path\
    \ or without a path. A relative file path will be relative to the importing file’s\
    \ directory, and an absolute file path will include the full file path.\n\n```php\n\
    // Relative path\ninclude 'myfolder\\myfile.php';\n\n// Absolute path\ninclude\
    \ 'C:\\xampp\\htdocs\\myfile.php';\n```\n\nWhen a relative path or no path is\
    \ specified, `include` will first search for the file in the current working directory,\
    \ which defaults to the directory of the importing script. If the file is not\
    \ found there, `include` will check the folders specified by the `include_path`[¹](#9781430262831_Ch17.xhtml#Fn1)\
    \ directive defined in `php.ini` before failing.\n\n```php\n// No path\ninclude\
    \ 'myfile.php';\n```\n\nIn addition to `include` there are three other language\
    \ constructs available for importing the content of one file into another: `require`,\
    \ `include_once` and `require_once`.\n\n### Require\n\nThe `require` construct\
    \ includes and evaluates the specified file. It is identical to `include`, except\
    \ in how it handles failure. When a file import fails `require` will halt the\
    \ script with an error, whereas `include` will only issue a warning. An import\
    \ may fail either because the file is not found or because the user running the\
    \ web server does not have read access to it.\n\n```php\nrequire 'myfile.php';\
    \ // halt on error\n```\n\nGenerally it is best to use `require` for any complex\
    \ PHP application or CMS site. That way the application will not attempt to run\
    \ in case a key file is missing. For less critical code segments and simple PHP\
    \ websites `include` may suffice, in which case PHP will go on and show the output\
    \ even if the included file is missing.\n\n### Include_once\n\nThe `include_once`\
    \ statement behaves like `include`, except that if the specified file has already\
    \ been included it will not be included again.\n\n```php\ninclude_once 'myfile.php';\
    \ // include only once\n```\n\n### Require_once\n\nThe `require_once` statement\
    \ works like `require`, but will not import a file if it has already been imported\
    \ before.\n\n```php\nrequire_once 'myfile.php'; // require only once\n```\n\n\
    The `include_once` and `require_once` statements may be used instead of `include`\
    \ and `require` in cases where the same file might be imported more than once\
    \ during a particular execution of a script. This avoids errors caused by, for\
    \ example, function and class redefinitions.\n\n### Return\n\nIt is possible to\
    \ execute a `return` statement inside an imported file. This will stop the execution\
    \ and return to the script that called the file import.\n\n```php\n<?php\n// myimport.php\n\
    return 'OK';\n?>\n```\n\nIf a return value is specified, the import statement\
    \ will evaluate to that value just as a normal function.\n\n```php\n<?php\n//\
    \ myfile.php\nif ((include 'myimport.php') == 'OK')\n   echo 'OK';\n?>\n```\n\n\
    ### Auto load\n\nFor large web applications the number of includes required in\
    \ every script may be substantial. This can be avoided by defining an `__autoload`\
    \ function. This function is automatically invoked when an undefined class or\
    \ interface is used in order to try to load that definition. It takes one parameter,\
    \ which is the name of the class or interface that PHP is looking for.\n\n```php\n\
    function __autoload($class_name){\n   include $class_name . '.php';\n}\n\n// Attempt\
    \ to auto include MyClass.php\n$obj = new MyClass();\n```\n\nA good coding practice\
    \ to follow when writing object-oriented applications is to have one source file\
    \ for every class definition and to name the file according to the class name.\
    \ Following this convention the `__autoload` function above will be able to load\
    \ the class, provided that it is in the same folder as the script file that needed\
    \ it.\n\n```php\n<?php\n// myclass.php\nclass MyClass {}\n?>\n```\n\nIf the file\
    \ is located in a subfolder the class name can include underscore characters to\
    \ symbolize this. The underscore characters would then need to be converted into\
    \ directory separators in the `__autoload` function.\n\n[¹](#9781430262831_Ch17.xhtml#_Fn1)`http://www.php.net/manual/en/ini.core.php#ini.include-path`\n\
    \n# CHAPTER 18\n\n![image](images/frontdot.jpg)\n\n## Type Hinting\n\nPHP relies\
    \ on the proper documentation of functions for developers to know what arguments\
    \ a function can take. To simplify this PHP 5 introduced type hinting, which allows\
    \ a function to specify the type of arguments it accepts. Allowed types include\
    \ classes, interfaces and the pseudo types `array` and `callable`.\n\n| Name |\
    \ Description |\n| --- | --- |\n| class name | Argument must be an object of this\
    \ class or a child. |\n| interface name | Argument must be an object implementing\
    \ this interface. |\n| `array` | Argument must be an array. |\n| `callable` |\
    \ Argument must be callable as a function. |\n\nA type hint is set by prefixing\
    \ the parameter with the type in the function signature. Below is an example using\
    \ the `array` pseudo type introduced in PHP 5.1.\n\n```php\nfunction myprint(array\
