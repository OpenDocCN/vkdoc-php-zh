- fmt: "If the `$dog_app` value is not passed into the class, the `else` statement\
    \ is executed. It is assumed that the user wants to create a `getBreeds` object.\
    \ An instance of the `dog_container` is created (`$container`) and it passes the\
    \ value `selectbox`. (If the object cannot be created, `\"System Error #4\"` will\
    \ display.) The words “selectbox” are passed into the array `$properties_array`\
    \ (Note: The `array` keyword must be used, or we would be creating a property\
    \ not an array.) The container object (`$container`) will then call the `create_object`\
    \ (passing the `$properties_array` to create an instance of the `getBreeds` class\
    \ (`$lab`). If the `getBreeds` object is successfully created (`$lab != FALSE`),\
    \ we then need to find the location of the `get_breeds.xml` file (which contains\
    \ the list of breeds). So, we reset the app property (by calling `set_app`) in\
    \ the container to “breeds”. This tells the container program we are a `getBreeds`\
    \ object, not a `dog` object. We then use the `get_dog_application` method of\
    \ the container to find the location of the breeds XML file.\n\n*For more information\
    \ on arrays, visit* [*www.php.net/manual/en/function.array.php*](http://www.php.net/manual/en/function.array.php)*.*\n\
    \nThe PHP method `get_class_methods` is used to create an array of methods contained\
    \ in `getBreeds`. Since the `get_select` method is the only method (besides the\
    \ constructor), it is also the last method in the array. Its name is pulled from\
    \ the array and then it is called using the property `$method_name ($result =\
    \ $dog_data->$method_name($dog_app)`). This allows the `getBreed` class to be\
    \ completely independent of the `dog_interface`. The developer can change the\
    \ name of the `get_select` method and everything would still work (as long as\
    \ it is the last method in the class). This provides a complete split between\
    \ the interface tier and the business rules tier.\n\nThe location of the XML file\
    \ is passed into the `get_select` method of the `getBreeds` object (`$lab`), which\
    \ uses the XML file for the data to create the select list box. The code for the\
    \ select list box is dropped into `$result`. If the code did get dropped into\
    \ `$result`, the code is displayed (`print $result`) back into the HTML form for\
    \ the user to select a breed. If the file name was not valid, an error message\
    \ (`print \"System Error #3\"`) will display instead of the select box.\n\nThe\
    \ only other changes required are two slight changes to the `lab.html` and `get_breeds.js`\
    \ files.\n\n```\nfunction AjaxRequest($value)\n```\n\nIn the `get_breed.js` file,\
    \ the function header for the `AjaxRequest` method has been changed to pass the\
    \ actual file being called (this was not a requirement of this design, but it\
    \ allows this file to be used for any program that is called via AJAX).\n\n```\n\
    xmlHttp.open(\"GET\", $value, true);\n```\n\nIn addition, the `open` statement\
    \ has been adjusted to use `$value` instead of a file name.\n\nIn the `lab.html`\
    \ program, there are a couple of additional changes.\n\n```\nAjaxRequest('dog_interface.php');\n\
    ```\n\nThe call to the JavaScript function now passes the file name, which has\
    \ also been changed to the `dog_interface.php` file.\n\nFinally, the action tag\
    \ (in both form tag locations) for the HTML form has been changed to call the\
    \ `dog_interface.php` program. Notice that, now, whenever we want to use the `Dog`\
    \ application we call the interface first. Then the interface determines what\
    \ we want to accomplish (get the breeds select box or process the properties for\
    \ the dog you are creating). We must communicate to all of our classes through\
    \ the interface. The interface, in turn, must create any required objects by using\
    \ the container (except, of course, for the container itself). This follows the\
    \ concepts of tier design.\n\nYou will not see any different output than previously\
    \ seen (unless you have some system errors). However, now you can easily change\
    \ file names and locations (via the XML file) in the application without changing\
    \ any program code! In a later chapter we will look at the ability to preload\
    \ our most used files to improve the efficiently of the program.\n\n## Do It\n\
    \n1.  Download the files for this section from the book’s web site. Change the\
    \ file names for the `get_breeds.xml` file, the `get_breeds.php` file, and the\
    \ `dog.php` file. Try to run the program via the `lab.html` file. The select box\
    \ will not display and the program will not run. Now go to the `dog_applications.xml`\
    \ file and change the data in the XML file to the new file names you just created.\
    \ Go back to your `lab.html` file (reload it). You should now see the select box.\
    \ Fill in and select the information and click the Submit button. The application\
    \ should now work.\n\n## Chapter Terms\n\n| Validate | `validator` Method |\n\
    | --- | --- |\n| JavaScript Hide/Show | HTML `onSubmit` |\n| Form Validation |\
