    ### Combining several variables (arrays)


    If you have several variables to represent a number of similar values, it makes
    sense to include them in an array.


    Here are two examples that have the same output:


    ```php

    <?php


    $value1 = 2;


    $value2 = 4;


    $value3 = 8;


    $value4 = 16;


    $value5 = 32;


    echo $value1 . "<br />";


    echo $value2 . "<br />";


    echo $value3 . "<br />";


    echo $value4 . "<br />";


    echo $value5 . "<br />";


    ?>

    ```


    ```php

    <?php


    $valueArray = array(2,4,8,16,32);


    echo $valueArray[0] . "<br />"; echo $valueArray[1] . "<br />"; echo $valueArray[2]
    . "<br />"; echo $valueArray[3] . "<br />"; echo $valueArray[4] . "<br />";


    ?>

    ```


    Both have the following output:


    You can access the values of an array by using `$array[index]`. The entries are
    numbered in ascending order from 0 to the number of elements. You can also set
    the index by yourself:


    ```php

    <?php


    $myArray = array("index1" => "value1"); echo $myArray["index1"];


    echo "<br />";


    $myArray["index1"] = "value2"; echo $myArray["index1"];


    ?>

    ```


    Output:

    ```

    value1

    value2

    ```


    Later, we will learn how to automate the output of all the values in an array
    in succession and process them. This is useful in arrays that contain dozens of
    entries.


    ### Sort arrays


    If we fill an array dynamically and we want to sort the values alphabetically,
    there is a simple function: `sort()`.


    ```php

    <?php


    $myArray = array("Zita", "Anton", "Hans");


    // unsorted output


    echo $myArray[0];


    echo "<br />";


    echo $myArray[1];


    echo "<br />";


    echo $myArray[2];


    // Sort array


    sort($myArray);


    echo "<br /><br />";


    // Sorted output


    echo $myArray[0];


    echo "<br />";


    echo $myArray[1];


    echo "<br />";


    echo $myArray[2];


    ?>

    ```


    Output:

    ```

    Zita

    Anton

    Hans

    Anton

    Hans

    Zita

    ```


    ### Multidimensional arrays


    An array could, again, contain as a value, another array:


    ```php

    <?php


    $myArray = array();


    $myArray["index1"] = array("value1", "value2"); $myArray["index2"] = array("value3",
    "value4"); echo $myArray["index1"][0];


    echo "<br />";


    echo $myArray["index2"][1];


    ?>

    ```


    Output:

    ```

    value1

    value4

    ```


    So, you could save coordinates and read them, for example, as a coordinate system
    with X, Y:


    ```php

    <?php


    [...]


    echo $chessboard[10][2];


    ?>

    ```


    This would depend on how your script is constructed. For example, you could show
    the pitch in the 10th row and the second column.


