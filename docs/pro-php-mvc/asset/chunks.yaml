    * @readwrite


    */


    protected $_defaultPath = "application/views";


    /**


    * @readwrite


    */


    protected $_defaultKey = "_data";


    /**


    * @readwrite


    */


    protected $_index = 0;


    public function __construct($options = array())


    {


    parent::__construct($options);


    $this- > _map = array(


    "partial" = > array(


    "opener" = > "{partial",


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ SEARCH


    "closer" = > "}",


    "handler" = > "_partial"


    ),


    "include" = > array(


    "opener" = > "{include",


    "closer" = > "}",


    "handler" = > "_include"


    ),


    "yield" = > array(


    "opener" = > "{yield",


    "closer" = > "}",


    "handler" = > "yield"


    )


    ) + $this- > _map;


    $this- > _map["statement"]["tags"] = array(


    "set" = > array(


    "isolated" = > false,


    "arguments" = > "{key}",


    "handler" = > "set"


    ),


    "append" = > array(


    "isolated" = > false,


    "arguments" = > "{key}",


    "handler" = > "append"


    ),


    "prepend" = > array(


    "isolated" = > false,


    "arguments" = > "{key}",


    "handler" = > "prepend"


    )


    ) + $this- > _map["statement"]["tags"];


    }


    }


    }


    The first three template constructs we want to add are single-tag constructs,
    so we add them to the main $_map array. This means our template parser won’t go
    looking for closing tags, or creating hierarchies from the child data.


    The last three template constructs, on the other hand, are statements (with opening/closing
    tags and child data). These we add to the statements subarray, where they will
    be parsed in the same way as the if/else loop constructs are parsed.


    Next, we need to create the handlers for each of these new constructs. The first
    one we will tackle is the _include() handler, shown in Listing 15-3.


    ***Listing 15-3.*** The _include() Handler


    protected function _include($tree, $content)


    {


    $template = new Template(array(


    "implementation" = > new self()


