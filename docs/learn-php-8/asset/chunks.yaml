    \ It also provides the ability to return either an integer or a float. This provides\
    \ added validation of data while still allowing flexibility of the actual use\
    \ of the function itself.\n\nAs of PHP 8, the current valid data types are:\n\n\
    - `array`\n- `bool`\n- `callable`\n- `int`\n- `float`\n- `null`\n- `object`\n\
    - `resource`\n- `string`\n\nAs you use functions, you will discover that some\
