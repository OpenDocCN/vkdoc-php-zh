  trans: "\nOOP 原则旨在用于创建大型程序。一个大型程序通常包含数千行代码甚至更多。\n\n因此，在面向对象编程框架内编写程序意味着要创建对象。对象是基于被称为*类*的模板创建的。\n\
    \n让我们用另一个比喻来理解类与对象之间的区别。假设你想建造一所房子（类比为对象）。但是要建房子，你需要一份建造所依据的计划或方案（类比为类）。你拿到一份计划，然后按照计划建造房子。类似地，你拿到一个类，然后基于这个类创建对象。基于同一份计划可以建造多所房子。它们类型相同，但在物理上是不同的。如果你根据不同的计划建造房子，就会得到不同的房子。同样，基于一个类也可以创建多个对象。它们类型相同（功能相同），但同时，物理上它们是不同的。如果你基于不同的类创建对象，那么对象也是不同的。还有一种情况是，有蓝图但没有建筑物。同样，你可以创建一个类，但不基于它创建任何对象。\n\
    \n这就是核心思想。接下来，你必须学习如何声明类并基于它们创建对象。\n\n> **注意**  \n> 回到封装、多态和继承，有必要提及以下几点。它们是 OOP\
    \ 的三种基本机制。封装意味着数据和用于处理数据的代码被组合成一个单一的单元，即对象。多态意味着使用通用接口与对象、函数和方法进行交互。最后，继承允许你通过继承现有类中的属性来创建新类。所有这些机制都将在示例中逐步讲解。\n\
    \n## 创建类和对象\n\n现在是深入实践问题的时候了。让我们从创建类开始。\n\n类的声明以 `class` 关键字开头，后跟类名。然后，在由大括号定义的代码块中，描述类的内容。类声明的模板如下所示。\n\
    \n```\nclass 名称{\n```\n"
- fmt: "# The contents of the class\n\nBut the intrigue remains: what can be described\
    \ in a class? The short answer is that you can describe methods and fields there.\
    \ The fields are actually variables. Unlike ordinary variables, the fields are\
    \ described in the class. There is no need to assign values to them; it is just\
    \ enough to specify their presence in the class. Methods are the same as functions.\
    \ But contrary to the functions, the methods are described in the class.\n\n>\
    \ **Note**  \n> The fields are sometimes also called properties or attributes.\
    \ The fields and methods of a class are called members of the class.\n\nThe following\
    \ is an example of a simple class with only a single field.\n\n```\nclass MyClass{\n\
    public $number;\n}\n```\n\nThe class contains only one `public $number` statement,\
    \ which means that the class describes a field called `$number`. The `public`\
    \ keyword is called an *access level specifier*, meaning the field is public.\
    \ The “publicity” of the field, in turn, allows you to access the field not only\
    \ inside the class but also outside of it.\n\n> **Note**  \n> In addition to the\
    \ `public` access level specifier, the `private` (a private field) and `protected`\
    \ (a protected field) keywords can be used. How the access level specifier affects\
    \ the field properties is discussed later.\n\nSo, there is the `MyClass` class\
    \ with a single `$number` field. What does that mean? That means if you create\
    \ an object based on the `MyClass` class, the object has the `$number` field.\n\
    \n| Details |\n| --- |\n| A field is like a variable. If you imagine an object\
    \ as a container, then the field of the object is a variable put in that container.\
    \ If you have several objects created based on the same class, they have the same\
    \ set of fields. However, these are different variables since each object has\
    \ its own fields. Therefore, it is not enough to specify the field’s name when\
    \ referring to an object field. You must also specify the object to which that\
    \ field belongs. |\n\nTo create an object based on a class, use the `new` instruction\
    \ followed by the name of the class to be the basis for creating the object. A\
    \ reference to that object is written to a variable (an object variable) identified\
    \ with the object. The template of the statement that creates an object is as\
    \ follows.\n\n```\n$variable=new ClassName;\n```\n\nFor example, if you want to\
    \ create an object of the `MyClass` class, the corresponding command could look\
    \ like the following.\n\n```\n$obj=new MyClass;\n```\n\nThis command creates an\
    \ object of the `MyClass` class, and a reference to the created object is written\
    \ to the `$obj` variable. If you need to access the object, use the `$obj` variable.\n\
    \n> **The PHP 8 Standard**  \n> In PHP 8, you can use the `$obj::class` statement\
    \ to get the name of that class based on which the `$obj` object was created.\
    \ In the previous versions of PHP, the `get_class()` function is used for that\
    \ purpose, and the corresponding command looks like `get_class($obj)`.\n\nBut\
    \ an object is primarily its fields and methods. Therefore, access to the object\
    \ is access to its fields and methods. To do that, put the arrow `->` after the\
    \ object variable and then place the field name without the `$` symbol. In this\
    \ case, you access the `$number` field of the `$obj` object using the `$obj->number`\
    \ instruction.\n\nListing [7-1](#613529_1_En_7_Chapter.xhtml#PC5) is a program\
    \ in which you describe a class, create an object based on the class, and then\
    \ perform some operations with the object’s field.\n\n```\n<?php\n// The class\
    \ description:\nclass MyClass{\npublic $number;\n}\n// Creates an object:\n$obj=new\
    \ MyClass;\n// Assigns a value to the field:\n$obj->number=123;\n// Displays the\
    \ field:\necho \"The field \\$number: $obj->number\\n\";\n// The new value of\
    \ the field:\n$obj->number=321;\n// Displays the field:\necho \"The field \\$number:\
    \ $obj->number\\n\";\n?>\nListing 7-1\nCreating an Object\n```\n\nThe following\
    \ is the result of the program execution.\n\n```\nThe output of the program (from\
    \ Listing 7-1)\nThe field $number: 123\nThe field $number: 321\n```\n\nThe program\
    \ begins with a description of the `MyClass` class. Based on the class, the `$obj=new\
    \ MyClass` instruction creates the `$obj` object. It has the `$number` field,\
    \ assigned the value `123` using the `$obj->number=123` statement. Then, use the\
    \ `echo \"The field \\$number: $obj->number\\n\"` statement to display the `$number`\
    \ field of the `$obj` object.\n\n> **Note**  \n> Instead of the `$obj->number`\
    \ instructions in the string literal in double quotes, the value of that instruction\
    \ is displayed.\n\nAfter that, the `$obj->number=321` command assigns the new\
    \ value `321` to the `$number` field of the `$obj` object. The check shows that\
    \ the field value has changed.\n\n| Details |\n| --- |\n| The `public` access\
    \ level specifier in the description of the `$number` field in the `MyClass` class\
    \ makes it possible to access the field in the `$obj->number` format outside the\
    \ `MyClass` code. |\n\n## The Methods\n\nAs mentioned, in addition to describing\
    \ fields in a class, you can describe methods there. A method is described in\
    \ the same way as a function, but only in the body of the class. The main feature\
    \ of the method is related to how it is called. When you call a function, you\
    \ have to specify the name of the function and the list of its arguments. When\
    \ you call a method, you need to specify the object from which the method is called.\
    \ The method has access to all fields and methods described in the class.\n\n\
    > **Note**  \n> From here, you examine ordinary (non-static) fields and methods.\
    \ In addition to ordinary class members, there exist static members. Operations\
    \ with them have their own peculiarities, which are discussed later.\n\nListing\
    \ [7-2](#613529_1_En_7_Chapter.xhtml#PC7) is a small modification of the previous\
    \ example. Now, the `MyClass` class contains two methods besides the `$number`\
    \ field.\n\n```\n<?php\n// The class description:\nclass MyClass{\npublic $number;\n\
    // The method to display the field:\nfunction show(){\nprint(\"The field \\$number:\
    \ $this->number\\n\");\n}\n// The method to assign a value to the field:\nfunction\
    \ set($n){\n$this->number=$n;\n}\n}\n// Creates objects:\n$A=new MyClass;\n$B=new\
    \ MyClass;\n// The fields are assigned values:\n$A->set(100);\n$B->set(200);\n\
    // Displays the fields:\n$A->show();\n$B->show();\n?>\nListing 7-2\nUsing Methods\n\
    ```\n\nThe following is the result of the program execution.\n\n```\nThe output\
    \ of the program (from Listing 7-2)\nThe field $number: 100\nThe field $number:\
    \ 200\n```\n\nThe main changes are related to the `MyClass` code. In addition\
    \ to the `$number` field, the class contains the methods `show()` and `set()`.\
    \ The `show()` method has no arguments and allows you to display the `$number`\
    \ field of the object from which the method is called. The `set()` method assigns\
    \ a value to the `$number` field of the object from which the method is called.\
    \ The method’s argument (named `$n`) determines the value assigned to the `$number`\
    \ field.\n\nYou are faced with an essential problem in the description of these\
    \ methods. Namely, a method is called from an object. That means that to call\
    \ the method, it is necessary to specify the name of the method and the object\
    \ from which the method is called. The method, in turn, accesses the field `$number`\
    \ of the object. When accessing the field, you must specify the object (which\
    \ owns the field). But when you describe the method, the object does not yet exist.\
    \ In other words, you need to denote somehow the object from which the method\
    \ is called. That is what the `$this` identifier is used for. The `$this` instruction,\
    \ when used within the method code, denotes the object from which the method is\
    \ called. Therefore, for example, the `$this->number` command is a reference to\
    \ the `$number` field of the object from which the method is called.\n\nIn particular,\
    \ in the body of the `show()` method, use the `print(\"The field \\$number: $this->number\\\
    n\")` statement, which displays the `$number` field of the object from which the\
    \ method is called. In the body of the `set()` method, the `$this->number=$n`\
    \ statement assigns the `$n` argument of the method to the `$number` field.\n\n\
    In the program, create two objects, `$A` and `$B`, of the `MyClass` class. To\
    \ do that, use the `$A=new MyClass` and `$B=new MyClass` commands, respectively.\
    \ Each object has the `$number` field, but these are different fields despite\
    \ the coinciding names: one belongs to the `$A` object, and the other belongs\
    \ to the `$B` object. You use the `set()` and `show()` methods to perform operations\
    \ with fields. The `$A->set(100)` instruction assigns `100` to the field `$number`\
    \ of `$A`, and the `$B->set(200)` instruction assigns `200` to the field `$number`\
    \ of `$B`. After that, using the `$A->show()` command, display the `$number` field\
    \ of the `$A` object, and to display the `$number` field of the `$B` object, use\
    \ the `$B->show()` command.\n\n| Details |\n| --- |\n| It might be interesting\
    \ that when trying to assign a value to a field that doesn’t exist in an object,\
    \ such a field appears (a so-called dynamic property). For example, if the `$obj`\
    \ object has no `$name` field, then after executing the `$obj->name=\"php\"` command,\
    \ the `$obj` object gets the `$name` field with the value `\"php\"`. Nevertheless,\
    \ since PHP 8.2, that possibility is deprecated. If you still want to use it,\
    \ you should put the `#[\\AllowDynamicProperties]` annotation before the class\
    \ description. You can use the `unset()` function to remove a field from an object.\
    \ For example, to delete the `$name` field from the `$obj` object, the `unset($obj->name)`\
    \ instruction could be helpful. It is also worth mentioning that methods, like\
    \ fields, can be described with the `public`, `private`, and `protected` specifiers\
    \ of access level. If a method is described without a specifier of access level\
    \ (as in the earlier examples), then the method is a public one by default. A\
    \ good practice is to specify the public access level explicitly for public methods.\
    \ Nevertheless, let’s use the default (public) access level (so the `public` keyword\
    \ is not used) for some methods to demonstrate PHP’s flexibility and power. Also,\
    \ you can assign values to fields in the description of a class. In that case,\
    \ when creating an object based on the class, the corresponding field of the object\
    \ has the value assigned to the field in the class. |\n\n> **The PHP 8 Standard**\
    \  \n> In the PHP 8 version, you can use the `?->` instruction instead of `->`\
    \ when accessing the fields and methods of objects. For example, you can use an\
    \ expression like `$object?->method` instead of the expression like `$object->method`.\
    \ The former option is safer because if the value of the `$object` variable is\
    \ an empty `null` reference, then there is no fatal error.\n\n## The Constructor\
    \ and the Destructor\n\nIn the examples, you created objects based on a class,\
    \ and then the fields of the objects were assigned values. If there are many objects\
    \ and they have many fields, then the process can become tedious. So, it is advisable\
    \ to automate it. In that sense, two special methods may be useful: the *constructor*\
    \ and the *destructor*.\n\nThe constructor is a method called automatically when\
    \ an object is created. The constructor’s name is `__construct()` (the name starts\
    \ with a double underscore). The constructor can take arguments. Typically, the\
    \ constructor contains commands that assign values to fields or perform other\
    \ operations.\n\n| Details |\n| --- |\n| If the constructor has arguments, then\
    \ those arguments must be specified when an object is created. Arguments of the\
    \ constructor are specified in parentheses after the class name in the command\
    \ based on the `new` instruction that creates the object. |\n\nThe destructor\
    \ is a method automatically called when an object is removed from memory. The\
    \ destructor’s name is `__destruct()`, and it has no arguments. Listing [7-3](#613529_1_En_7_Chapter.xhtml#PC9)\
    \ illustrates how to use the constructor and the destructor.\n\n```\n<?php\n//\
    \ The class description:\nclass MyClass{\npublic $code;\n// The constructor:\n\
    function __construct($code){\n$this->code=$code;\necho \"The object is created:\
    \ \",$this->code,\"\\n\";\n}\n```"
