    `rand(0, 7)`—simple, but inefficient. Every time you change the `$images` array,
    you need to count how many elements it contains and change the maximum number
    passed to `rand()`.


    It’s much easier to get PHP to count them for you, and that’s exactly what the
    `count()` function does: it counts the number of elements in an array. You need
    a number one less than the number of elements in the array, so the second argument
    passed to `rand()` becomes `count($images)-1`, and the result is stored in `$i`.


    The random number is used in the final line to build the correct path name for
    the selected file. The variable `$images[$i]` is embedded in a double-quoted string
    with no whitespace separating it from surrounding characters, so it’s enclosed
    in curly braces. Arrays start at 0, so if the random number is 1, `$selectedImage`
    is `images/maiko.jpg`.


    If you’re new to PHP, you may find it difficult to understand code like this:


    `$i = rand(0, count($images)-1);`


    All that’s happening is that the second argument passed to `rand()` is an expression
    rather than a number. If it makes it easier for you to follow, rewrite the code
    like this:


    `$numImages = count($images); // $numImages is 8`


    `$max = $numImages – 1;       // $max is 7`


    `$i = rand(0, $max);          // $i = rand(0, 7)`


    Open `index.php` and include `random_image.php` by inserting the command in the
    same code block as `title.php`, like this:


    `<?php include ''./includes/title.php'';`


    `include ''./includes/random_image.php'';` `?>`


    Since `random_image.php` doesn’t send any direct output to the browser, it’s safe
    to put it above the `DOCTYPE`.


    Scroll down inside `index.php`, and locate the code that displays the image in
    the figure element. It looks like this:


    `<figure>`


    `<img src="images/basin.jpg" alt="Water basin at Ryoanji temple"`


    `width="350" height="237">`


    `<figcaption>Water basin at Ryoanji temple</figcaption>`


    `</figure>`


    Instead of using `images/basin.jpg` as a fixed image, replace it with `$selectedImage`.
    All the images have different dimensions, so delete the `width` and `height` attributes
    and use a generic `alt` attribute. Also remove the text in the `figcaption` element.
    The code in step 3 should now look like this:


    `<figure>`


    `<img src="` `<?= $selectedImage; ?>` `" alt="` `Random image` `">`


    `<figcaption></figcaption>`


    `</figure>`


    Note


    The PHP block displays only a single value, so you can use the shortcut `<?=`.


    ![A978-1-4842-0635-5_4_Fig10_HTML.jpg](A978-1-4842-0635-5_4_Fig10_HTML.jpg)


    Figure 4-10.


    Storing image filenames in an indexed array makes it easy to display a random
    image Save both `random_image.php` and `index.php`, then load `index.php` into
    a browser. The image should now be chosen at random. Click the Reload button in
    your browser; you should see a variety of images, as shown in Figure [4-10](#A978-1-4842-0635-5_4_Chapter.html#Fig10).


    You can check your code against `index_04.php` and `random_image_01.php` in the
    `ch04` folder.


    This is a simple and effective way of displaying a random image, but it would
    be much better if you could set the width and height for different-sized images
    dynamically, as well as add a caption to describe the image.'
  trans: '

    ### PHP 方案 4-6：显示随机图片


    显示随机图片非常简单。你只需要一个可用图片列表，并将其存储在索引数组中（参见第 3 章中的“创建数组”）。由于索引数组从 0 开始编号，你可以通过生成一个介于
    0 和数组长度减 1 之间的随机数来随机选择一张图片。这一切只需几行代码即可完成……


    继续使用相同的文件。或者，使用 `ch04` 文件夹中的 `index_03.php` 并将其重命名为 `index.php`。由于 `index_03.php`
    使用了 `title.php`、`menu.php` 和 `footer.php`，请确保这三个文件都在你的 `includes` 文件夹中。图片已存放在
    `images` 文件夹中。


    在 `includes` 文件夹中创建一个空白的 PHP 页面，并将其命名为 `random_image.php`。插入以下代码（该代码也存在于 `ch04`
    文件夹的 `random_image_01.php` 中）：


    ```php

    <?php


    $images = [''kinkakuji'', ''maiko'', ''maiko_phone'', ''monk'', ''fountains'',


    ''ryoanji'', ''menu'', ''basin''];


    $i = rand(0, count($images)-1);


    $selectedImage = "images/{$images[$i]}.jpg";

    ```


    这就是完整的脚本：一个不包含 `.jpg` 文件扩展名的图片名称数组（无需重复共享信息——它们都是 JPEG 格式）、一个随机数生成器，以及一个用于构建选中文件正确路径名的字符串。


    **注意：** 此脚本使用了自 PHP 5.4 起引入的简写数组语法。


    要在指定范围内生成随机数，请将最小值和最大值作为参数传递给 `rand()` 函数。由于数组中有八张图片，你需要一个介于 0 到 7 之间的数字。简单的做法是使用
    `rand(0, 7)` — 简单但效率低下。每次更改 `$images` 数组时，你都需要手动计算它包含多少个元素，并修改传递给 `rand()` 的最大值。


    让 PHP 替你计数要容易得多，而这正是 `count()` 函数的作用：它计算数组中元素的数量。你需要一个比数组元素数量少一的数字，因此传递给 `rand()`
    的第二个参数变成了 `count($images)-1`，结果存储在 `$i` 中。


    最后一行使用这个随机数为选中的文件构建正确的路径名。变量 `$images[$i]` 被嵌入到一个双引号字符串中，且与周围字符之间没有空格，因此它被包含在花括号内。数组从
    0 开始，所以如果随机数是 1，`$selectedImage` 就是 `images/maiko.jpg`。


    如果你是 PHP 新手，可能会觉得理解以下代码有些困难：


    ```php

    $i = rand(0, count($images)-1);

    ```


    其实，传递给 `rand()` 的第二个参数是一个表达式，而不是一个数字。如果这样能让你更容易理解，可以将代码重写如下：


    ```php

    $numImages = count($images); // $numImages 是 8

    $max = $numImages - 1;       // $max 是 7

    $i = rand(0, $max);          // $i = rand(0, 7)

    ```


    打开 `index.php`，通过在与 `title.php` 相同的代码块中插入命令来引入 `random_image.php`，如下所示：


    ```php

    <?php include ''./includes/title.php'';

    include ''./includes/random_image.php''; ?>

    ```


    由于 `random_image.php` 不会直接向浏览器发送任何输出，因此将其放在 `DOCTYPE` 之上是安全的。


    向下滚动 `index.php`，找到在 `<figure>` 元素中显示图片的代码。它看起来像这样：


    ```html

    <figure>

    <img src="images/basin.jpg" alt="Water basin at Ryoanji temple"

    width="350" height="237">

    <figcaption>Water basin at Ryoanji temple</figcaption>

    </figure>

    ```


    不要使用固定的 `images/basin.jpg` 图片，而是用 `$selectedImage` 替换它。所有图片都有不同的尺寸，因此删除 `width`
    和 `height` 属性，并使用通用的 `alt` 属性。同时移除 `<figcaption>` 元素中的文本。第三步中的代码现在应该如下所示：


    ```html

    <figure>

    <img src="<?= $selectedImage; ?>" alt="Random image">

    <figcaption></figcaption>

    </figure>

    ```


    **注意：** PHP 代码块只显示一个值，因此你可以使用简写 `<?=`。


    ![A978-1-4842-0635-5_4_Fig10_HTML.jpg](img/A978-1-4842-0635-5_4_Fig10_HTML.jpg)


    **图 4-10.** 将图片文件名存储在索引数组中可以轻松显示随机图片


    保存 `random_image.php` 和 `index.php`，然后在浏览器中加载 `index.php`。此时图片应该会随机显示。点击浏览器中的“重新加载”按钮；你应该会看到各种不同的图片，如图
    4-10 所示。


    你可以将代码与 `ch04` 文件夹中的 `index_04.php` 和 `random_image_01.php` 进行对比。


    这是一种简单有效的随机图片显示方式，但如果能动态设置不同尺寸图片的宽度和高度，并为图片添加描述性标题，效果会更好。

