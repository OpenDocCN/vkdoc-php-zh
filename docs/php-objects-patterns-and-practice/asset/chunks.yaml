- fmt: '### Patterns Define a Vocabulary


    By providing developers with names for techniques, patterns make communication
    richer. Imagine a design meeting. I have already described my `Abstract Factory`
    solution, and now I need to describe my strategy for managing the data the system
    compiles. I describe my plans to Bob:


    - Me: I’m thinking of using a `Composite`.

    - Bob: I don’t think you’ve thought that through.


    Okay, Bob didn’t agree with me. He never does. But he knew what I was talking
    about, and therefore why my idea sucked. Let’s play that scene through again without
    a design vocabulary.


    - Me: I intend to use a tree of objects that share the same type. The type’s interface
    will provide methods for adding child objects of its own type. In this way, we
    can build up complex combinations of implementing objects at runtime.

    - Bob: Huh?


    Patterns, or the techniques they describe, tend to interoperate. The `Composite`
    pattern lends itself to collaboration with the `Visitor` pattern, for example:


    - Me: And then we can use `Visitor`s to summarize the data.

    - Bob: You’re missing the point.


    Ignore Bob. I won’t describe the tortuous nonpattern version of this; I will cover
    `Composite` in Chapter [10](#A314621_5_En_10_Chapter.html) and `Visitor` in Chapter
    [11](#A314621_5_En_11_Chapter.html).


    The point is that, without a pattern language, we would still use these techniques.
    They precede their naming and organization. If patterns did not exist, they would
    evolve on their own, anyway. Any tool that is used sufficiently will eventually
    acquire a name.


    ### Patterns Are Tried and Tested


    So if patterns document good practice, is naming the only truly original thing
    about pattern catalogs? In some senses, that would seem to be true. Patterns represent
    best practice in an object-oriented context. To some highly experienced programmers,
    this may seem an exercise in repackaging the obvious. To the rest of us, patterns
    provide access to problems and solutions we would otherwise have to discover the
    hard way.


    Patterns make design accessible. As pattern catalogs emerge for more and more
    specializations, even the highly experienced can find benefits as they move into
    new aspects of their fields. A GUI programmer can gain fast access to common problems
    and solutions in enterprise programming, for example. A web programmer can quickly
    chart strategies for avoiding the pitfalls that lurk in tablet and smart phone
    projects.


    ### Patterns Are Designed for Collaboration


    By their nature, patterns should be generative and composable. This means that
    you should be able to apply one pattern and thereby create conditions suitable
    for the application of another. In other words, in using a pattern you may find
    other doors opened for you.


    Pattern catalogs are usually designed with this kind of collaboration in mind,
    and the potential for pattern composition is always documented in the pattern
    itself.


    ### Design Patterns Promote Good Design


    Design patterns demonstrate and apply principles of object-oriented design. So,
    a study of design patterns can yield more than a specific solution in a context.
    You can come away with a new perspective on the ways that objects and classes
    can be combined to achieve an objective.


    ### Design Patterns are Used By Popular Frameworks


    This book is primarily about designing from the ground up. The patterns and principles
    covered here should enable you to design your own core frameworks with the needs
    of your projects in mind. However, laziness is also a virtue, and you may wish
    to work with (or you may inherit code that already uses) a framework such as `Zend`,
    `Laravel`, or `Symfony`. A good understanding of core design patterns will help
    you as you engage with these framework APIs.


    ## PHP and Design Patterns


    There is little in this chapter that is specific to `PHP`, which is characteristic
    of our topic to some extent. Many patterns apply to many object-capable languages
    with few or no implementation issues.


    This is not always the case, of course. Some enterprise patterns work well in
    languages in which an application process continues to run between server requests.
    `PHP` does not work that way. A new script execution is kicked off for every request.
    This means that some patterns need to be treated with more care. `Front Controller`,
    for example, often requires some serious initialization time. This is fine when
    the initialization takes place once at application startup, but it’s more of an
    issue when it must take place for every request. That is not to say that we can’t
    use the pattern; I have deployed it with very good results in the past. We must
    simply ensure that we take account of PHP-related issues when we discuss the pattern.
    `PHP` forms the context for all the patterns that this book examines.


    I referred to object-capable languages earlier in this section. You could code
    in `PHP` without defining any classes at all. With a few notable exceptions, however,
    objects and object-oriented design lie at the heart of most `PHP` projects and
    libraries.


    ## Summary


    In this chapter, I introduced design patterns, showed you their structure (using
    the Gang of Four form), and suggested some reasons why you might want to use design
    patterns in your scripts.


    It is important to remember that design patterns are not snap-on solutions that
    can be combined like components to build a project. They are suggested approaches
    to common problems. These solutions embody some key design principles. It is these
    that we will examine in the next chapter.


    # 8. Some Pattern Principles


    Although design patterns simply describe solutions to problems, they tend to emphasize
    solutions that promote reusability and flexibility. To achieve this, they manifest
    some key object-oriented design principles. We will encounter some of them in
    this chapter and in more detail throughout the rest of the book.


    This chapter will cover the following topics:


    - Composition: How to use object aggregation to achieve greater flexibility than
    you could with inheritance alone

    - Decoupling: How to reduce dependency between elements in a system

    - The power of the interface: Patterns and polymorphism

    - Pattern categories: The types of patterns that this book will cover'
  raw: '### Patterns Define a Vocabulary


    By providing developers with names for techniques, patterns make communication
    richer. Imagine a design meeting. I have already described my Abstract Factory
    solution, and now I need to describe my strategy for managing the data the system
    compiles. I describe my plans to Bob:


    *   Me: I’m thinking of using a Composite.

    *   Bob: I don’t think you’ve thought that through.


    Okay, Bob didn’t agree with me. He never does. But he knew what I was talking
    about, and therefore why my idea sucked. Let’s play that scene through again without
    a design vocabulary.


    *   Me: I intend to use a tree of objects that share the same type. The type’s
    interface will provide methods for adding child objects of its own type. In this
    way, we can build up complex combinations of implementing objects at runtime.

    *   Bob: Huh?


    Patterns, or the techniques they describe, tend to interoperate. The Composite
    pattern lends itself to collaboration with the Visitor pattern, for example:


    *   Me: And then we can use Visitors to summarize the data.

    *   Bob: You’re missing the point.


    Ignore Bob. I won’t describe the tortuous nonpattern version of this; I will cover
    Composite in Chapter [10](#A314621_5_En_10_Chapter.html) and Visitor in Chapter
    [11](#A314621_5_En_11_Chapter.html).


    The point is that, without a pattern language, we would still use these techniques.
    They precede their naming and organization. If patterns did not exist, they would
    evolve on their own, anyway. Any tool that is used sufficiently will eventually
    acquire a name.


    ### Patterns Are Tried and Tested


    So if patterns document good practice, is naming the only truly original thing
    about pattern catalogs? In some senses, that would seem to be true. Patterns represent
    best practice in an object-oriented context. To some highly experienced programmers,
    this may seem an exercise in repackaging the obvious. To the rest of us, patterns
    provide access to problems and solutions we would otherwise have to discover the
    hard way.


    Patterns make design accessible. As pattern catalogs emerge for more and more
    specializations, even the highly experienced can find benefits as they move into
    new aspects of their fields. A GUI programmer can gain fast access to common problems
    and solutions in enterprise programming, for example. A web programmer can quickly
    chart strategies for avoiding the pitfalls that lurk in tablet and smart phone
    projects.


    ### Patterns Are Designed for Collaboration


    By their nature, patterns should be generative and composable. This means that
    you should be able to apply one pattern and thereby create conditions suitable
    for the application of another. In other words, in using a pattern you may find
    other doors opened for you.


    Pattern catalogs are usually designed with this kind of collaboration in mind,
    and the potential for pattern composition is always documented in the pattern
    itself.


    ### Design Patterns Promote Good Design


    Design patterns demonstrate and apply principles of object-oriented design. So,
    a study of design patterns can yield more than a specific solution in a context.
    You can come away with a new perspective on the ways that objects and classes
    can be combined to achieve an objective.


    ### Design Patterns are Used By Popular Frameworks


    This book is primarily about designing from the ground up. The patterns and principles
    covered here should enable you to design your own core frameworks with the needs
    of your projects in mind. However, laziness is also a virtue, and you may wish
    to work with (or you may inherit code that already uses) a framework such as Zend,
    Laravel, or Symfony. A good understanding of core design patterns will help you
    as you engage with these framework APIs.


    ## PHP and Design Patterns


    There is little in this chapter that is specific to PHP, which is characteristic
    of our topic to some extent. Many patterns apply to many object-capable languages
    with few or no implementation issues.


    This is not always the case, of course. Some enterprise patterns work well in
    languages in which an application process continues to run between server requests.
    PHP does not work that way. A new script execution is kicked off for every request.
    This means that some patterns need to be treated with more care. Front Controller,
    for example, often requires some serious initialization time. This is fine when
    the initialization takes place once at application startup, but it’s more of an
    issue when it must take place for every request. That is not to say that we can’t
    use the pattern; I have deployed it with very good results in the past. We must
    simply ensure that we take account of PHP-related issues when we discuss the pattern.
    PHP forms the context for all the patterns that this book examines.


    I referred to object-capable languages earlier in this section. You could code
    in PHP without defining any classes at all. With a few notable exceptions, however,
    objects and object-oriented design lie at the heart of most PHP projects and libraries.


    ## Summary


    In this chapter, I introduced design patterns, showed you their structure (using
    the Gang of Four form), and suggested some reasons why you might want to use design
    patterns in your scripts.


    It is important to remember that design patterns are not snap-on solutions that
    can be combined like components to build a project. They are suggested approaches
    to common problems. These solutions embody some key design principles. It is these
    that we will examine in the next chapter.


    # 8. Some Pattern Principles


    Although design patterns simply describe solutions to problems, they tend to emphasize
    solutions that promote reusability and flexibility. To achieve this, they manifest
    some key object-oriented design principles. We will encounter some of them in
    this chapter and in more detail throughout the rest of the book.


    This chapter will cover the following topics:


    *   Composition : How to use object aggregation to achieve greater flexibility
    than you could with inheritance alone

    *   Decoupling : How to reduce dependency between elements in a system

    *   The power of the interface : Patterns and polymorphism

    *   Pattern categories : The types of patterns that this book will cover'
  trans: '

    ### 模式定义了一种词汇表


    通过为开发者提供技术的名称，模式使沟通更加丰富。想象一次设计会议。我已经描述了我的 `Abstract Factory` 解决方案，现在需要说明管理系统编译数据的策略。我向鲍勃描述我的计划：


    -   我：我正考虑使用 `Composite`。

    -   鲍勃：我觉得你还没想清楚。


    好吧，鲍勃不同意我的看法。他向来如此。但他明白我在说什么，因此也知道我的想法为什么糟糕。让我们在没有设计词汇的情况下重新演绎这个场景：


    -   我：我打算使用一个共享相同类型的对象树。该类型的接口将提供用于添加自身类型的子对象的方法。通过这种方式，我们可以在运行时构建出实现对象的复杂组合。

    -   鲍勃：啊？


    模式，或者说它们所描述的技术，往往是相互协作的。例如，`Composite` 模式倾向于与 `Visitor` 模式协同工作：


    -   我：然后我们可以使用 `Visitor` 来汇总数据。

    -   鲍勃：你没抓住重点。


    忽略鲍勃。我就不描述这种没有模式时的曲折版本了；我将在第 10 章 介绍 `Composite`，在第 11 章 介绍 `Visitor`。


    关键在于，即使没有模式语言，我们仍然会使用这些技术。它们先于其命名和组织而存在。即使模式不存在，它们也终究会自行演化。任何被充分使用的工具最终都会获得一个名称。


    ### 模式是经过考验的


    因此，如果模式记录了良好实践，那么命名是否就是模式目录中唯一真正原创的东西？从某种意义上说，这似乎是事实。模式代表了面向对象环境中的最佳实践。对于某些经验丰富的程序员来说，这似乎只是对显而易见之事的重新包装。对于其他人来说，模式提供了一条接触问题和解决方案的途径，否则我们只能通过艰难的方式去发现它们。


    模式让设计变得平易近人。随着越来越多特定领域的模式目录出现，即使是经验丰富的人在涉足其领域的新方面时也能从中受益。例如，GUI 程序员可以快速了解企业编程中的常见问题和解决方案。Web
    程序员可以快速制定策略，避免平板电脑和智能手机项目中潜藏的陷阱。


    ### 模式是为协作而设计的


    就其本质而言，模式应该是可生成和可组合的。这意味着你应该能够应用一个模式，从而创造出适合应用另一个模式的条件。换句话说，使用一个模式时，你可能会发现其他门路为你敞开。


    模式目录的设计通常都会考虑到这种协作，而模式组合的可能性也总是记录在模式本身。


    ### 设计模式提升良好设计


    设计模式展示并应用了面向对象设计的原则。因此，研究设计模式不仅仅能让你获得特定上下文中的解决方案，你还能对组合对象和类以实现目标的方式产生新的视角。


    ### 设计模式被流行框架所使用


    本书主要讨论从头开始设计。这里涵盖的模式和原则应能使你根据项目需求设计自己的核心框架。然而，懒惰也是一种美德，你或许希望使用像 `Zend`、`Laravel`
    或 `Symfony` 这样的框架（或者你可能会接手已经使用这些框架的代码）。深入理解核心设计模式将有助于你在使用这些框架 API 时更好地开展工作。


    ## PHP 与设计模式


    本章几乎没有特定于 `PHP` 的内容，这在某种程度上是这个话题的特点。许多模式适用于多种支持对象的语言，几乎没有或根本不存在实现问题。


    当然，情况并非总是如此。有些企业级模式在那些应用进程能在服务器请求之间持续运行的语言中效果很好。`PHP` 并非如此。每次请求都会启动一次新的脚本执行。这意味着某些模式需要更谨慎地对待。例如，`Front
    Controller` 通常需要一些显著初始化时间。如果在应用程序启动时只进行一次初始化，这没问题，但每次请求都必须初始化时，就成问题了。这并非说我们不能使用该模式；我过去曾部署过它并取得了非常好的效果。我们只是必须确保在讨论该模式时考虑到与
    PHP 相关的问题。`PHP` 构成了本书所讨论所有模式的上下文。


    我在本节前面提到了支持对象的语言。你可以完全不定义任何类就用 `PHP` 编写代码。然而，除少数几个显著的例外情况外，对象和面向对象设计是大多数 `PHP`
    项目和库的核心。


    ## 总结


    在本章中，我介绍了设计模式，向您展示了它们的结构（使用"四人帮"的形式），并提出了一些在脚本中使用设计模式的原因。


    重要的是要记住，设计模式不是像组件一样拼凑起来就能构建项目的即插即用解决方案。它们是针对常见问题的建议性方法。这些解决方案体现了一些关键的设计原则。这些原则正是我们将在下一章中要探讨的内容。


    # 8. 一些模式原则


    尽管设计模式只是描述问题的解决方案，但它们往往强调那些能促进可重用性和灵活性的解决方案。为了实现这一点，它们展现了一些关键的面向对象设计原则。我们将在本章中见到其中一些原则，并在本书后续部分进行更详细探讨。


    本章将涵盖以下主题：


    -   组合：如何使用对象聚合实现比单纯继承更大的灵活性

    -   解耦：如何降低系统中元素之间的依赖关系

    -   接口的力量：模式与多态性

    -   模式分类：本书将涵盖的模式类型'
- fmt: "# The Pattern Revelation\n\nI first started working with objects in the Java\
    \ language. As you might expect, it took a while before some concepts clicked.\
    \ When it did happen, though, it happened very fast, almost with the force of\
    \ revelation. The elegance of inheritance and encapsulation bowled me over. I\
    \ could sense that this was a different way of defining and building systems.\
    \ I got polymorphism, working with a type and switching implementations at runtime.\
    \ It seemed to me that this understanding would solve most of my design problems,\
    \ and help me design beautiful and elegant systems.\n\nAll the books on my desk\
    \ at the time focused on language features and the very many APIs available to\
    \ the Java programmer. Beyond a brief definition of polymorphism, there was little\
    \ attempt to examine design strategies.\n\nLanguage features alone do not engender\
    \ object-oriented design. Although my projects fulfilled their functional requirements,\
    \ the kind of design that inheritance, encapsulation and polymorphism had seemed\
    \ to offer continued to elude me.\n\nMy inheritance hierarchies grew wider and\
    \ deeper as I attempted to build a new class for every eventuality. The structure\
    \ of my systems made it hard to convey messages from one tier to another without\
    \ giving intermediate classes too much awareness of their surroundings, binding\
    \ them into the application and making them unusable in new contexts.\n\nIt wasn’t\
    \ until I discovered *Design Patterns: Elements of Reusable Object-Oriented Software*\
    \ (Addison-Wesley Professional, 1995), otherwise known as the Gang of Four book,\
    \ that I realized I had missed an entire design dimension. By that time, I had\
    \ already discovered some of the core patterns for myself, but others contributed\
    \ to a new way of thinking.\n\nI found that I had over-privileged inheritance\
    \ in my designs, trying to build too much functionality into my classes. But where\
    \ else can functionality go in an object-oriented system?\n\nI found the answer\
    \ in composition. Software components can be defined at runtime by combining objects\
    \ in flexible relationships. The Gang of Four boiled this down into a principle:\
    \ “favor composition over inheritance.” The patterns described ways in which objects\
    \ could be combined at runtime to achieve a level of flexibility impossible in\
    \ an inheritance tree alone.\n\n## Composition and Inheritance\n\nInheritance\
    \ is a powerful way of designing for changing circumstances or contexts. It can\
    \ limit flexibility, however, especially when classes take on multiple responsibilities.\n\
    \n### The Problem\n\nAs you know, child classes inherit the methods and properties\
    \ of their parents (as long as they are protected or public elements). You can\
    \ use this fact to design child classes that provide specialized functionality.\n\
    \nFigure [8-1](#A314621_5_En_8_Chapter.html#Fig1) presents a simple example using\
    \ the UML.\n\n![A314621_5_En_8_Fig1_HTML.gif](A314621_5_En_8_Fig1_HTML.gif)\n\n\
    Figure 8-1.  \nA parent class and two child classes\n\nThe abstract `Lesson` class\
    \ in Figure [8-1](#A314621_5_En_8_Chapter.html#Fig1) models a lesson in a college.\
    \ It defines abstract `cost()` and `chargeType()` methods. The diagram shows two\
    \ implementing classes, `FixedPriceLesson` and `TimedPriceLesson`, which provide\
    \ distinct charging mechanisms for lessons.\n\nUsing this inheritance scheme,\
    \ I can switch between lesson implementations. Client code will know only that\
    \ it is dealing with a `Lesson` object, so the details of cost will be transparent.\n\
    \nWhat happens, though, if I introduce a new set of specializations? I need to\
    \ handle lectures and seminars. Because these organize enrollment and lesson notes\
    \ in different ways, they require separate classes. Now I have two forces that\
    \ operate upon my design. I need to handle pricing strategies, and separate lectures\
    \ and seminars.\n\nFigure [8-2](#A314621_5_En_8_Chapter.html#Fig2) shows a brute-force\
    \ solution.\n\n![A314621_5_En_8_Fig2_HTML.gif](A314621_5_En_8_Fig2_HTML.gif)\n\
    \nFigure 8-2.  \nA poor inheritance structure\n\nFigure [8-2](#A314621_5_En_8_Chapter.html#Fig2)\
    \ shows a hierarchy that is clearly faulty. I can no longer use the inheritance\
    \ tree to manage my pricing mechanisms without duplicating great swathes of functionality.\
    \ The pricing strategies are mirrored across the `Lecture` and `Seminar` class\
    \ families.\n\nAt this stage, I might consider using conditional statements in\
    \ the `Lesson` super class, removing those unfortunate duplications. Essentially,\
    \ I remove the pricing logic from the inheritance tree altogether, moving it up\
    \ into the super class. This is the reverse of the usual refactoring, where you\
    \ replace a conditional with polymorphism. Here is an amended `Lesson` class:\n\
    \n```\n// listing 08.01\nabstract class Lesson\n{\nprotected $duration;\nconst\
    \     FIXED = 1;\nconst     TIMED = 2;\nprivate   $costtype;\n\npublic function\
    \ __construct(int $duration, int $costtype = 1)\n{\n$this->duration = $duration;\n\
    $this->costtype = $costtype;\n}\n\npublic function cost(): int\n{\nswitch ($this->costtype)\
    \ {\ncase self::TIMED:\nreturn (5 * $this->duration);\nbreak;\ncase self::FIXED:\n\
    return 30;\nbreak;\ndefault:\n$this->costtype = self::FIXED;\nreturn 30;\n}\n\
    }\n\npublic function chargeType(): string\n{\nswitch ($this->costtype) {\ncase\
    \ self::TIMED:\nreturn \"hourly rate\";\nbreak;\ncase self::FIXED:\nreturn \"\
    fixed rate\";\nbreak;\ndefault:\n$this->costtype = self::FIXED;\nreturn \"fixed\
    \ rate\";\n}\n}\n\n// more lesson methods...\n}\n\n// listing 08.02\nclass Lecture\
    \ extends Lesson\n{\n// Lecture-specific implementations ...\n}\n\n// listing\
    \ 08.03\nclass Seminar extends Lesson\n{\n// Seminar-specific implementations\
    \ ...\n}\n```\n\nHere’s how I might work with these classes:\n\n```\n// listing\
    \ 08.04\n$lecture = new Lecture(5, Lesson::FIXED);\nprint \"{$lecture->cost()}\
    \ ({$lecture->chargeType()})\\n\";\n$seminar = new Seminar(3, Lesson::TIMED);\n\
    print \"{$seminar->cost()} ({$seminar->chargeType()})\\n\";\n```\n\nAnd here’s\
    \ the output:\n\n```\n30 (fixed rate)\n15 (hourly rate)\n```\n\nYou can see the\
    \ new class diagram in Figure [8-3](#A314621_5_En_8_Chapter.html#Fig3).\n\n![A314621_5_En_8_Fig3_HTML.gif](A314621_5_En_8_Fig3_HTML.gif)\n\
    \nFigure 8-3.  \nInheritance hierarchy improved by removing cost calculations\
    \ from subclasses\n\nI have made the class structure much more manageable, but\
    \ at a cost. Using conditionals in this code is a retrograde step. Usually, you\
    \ would try to replace a conditional statement with polymorphism. Here, I have\
    \ done the opposite. As you can see, this has forced me to duplicate the conditional\
    \ statement across the `chargeType()` and `cost()` methods.\n\nI seem doomed to\
    \ duplicate code."
  raw: '## The Pattern Revelation


    I first started working with objects in the Java language. As you might expect,
    it took a while before some concepts clicked. When it did happen, though, it happened
    very fast, almost with the force of revelation . The elegance of inheritance and
    encapsulation bowled me over. I could sense that this was a different way of defining
    and building systems. I got polymorphism, working with a type and switching implementations
    at runtime. It seemed to me that this understanding would solve most of my design
    problems, and help me design beautiful and elegant systems.


    All the books on my desk at the time focused on language features and the very
    many APIs available to the Java programmer. Beyond a brief definition of polymorphism,
    there was little attempt to examine design strategies.


    Language features alone do not engender object-oriented design. Although my projects
    fulfilled their functional requirements, the kind of design that inheritance,
    encapsulation and polymorphism had seemed to offer continued to elude me.


    My inheritance hierarchies grew wider and deeper as I attempted to build a new
    class for every eventuality. The structure of my systems made it hard to convey
    messages from one tier to another without giving intermediate classes too much
    awareness of their surroundings, binding them into the application and making
    them unusable in new contexts.


    It wasn’t until I discovered Design Patterns: Elements of Reusable Object-Oriented
    Software (Addison-Wesley Professional, 1995), otherwise known as the Gang of Four
    book, that I realized I had missed an entire design dimension. By that time, I
    had already discovered some of the core patterns for myself, but others contributed
    to a new way of thinking.


    I found that I had over-privileged inheritance in my designs, trying to build
    too much functionality into my classes. But where else can functionality go in
    an object-oriented system?


    I found the answer in composition. Software components can be defined at runtime
    by combining objects in flexible relationships. The Gang of Four boiled this down
    into a principle: “favor composition over inheritance.” The patterns described
    ways in which objects could be combined at runtime to achieve a level of flexibility
    impossible in an inheritance tree alone.


    ## Composition and Inheritance


    Inheritance is a powerful way of designing for changing circumstances or contexts.
    It can limit flexibility, however, especially when classes take on multiple responsibilities.


    ### The Problem


    As you know, child classes inherit the methods and properties of their parents
    (as long as they are protected or public elements). You can use this fact to design
    child classes that provide specialized functionality.


    Figure [8-1](#A314621_5_En_8_Chapter.html#Fig1) presents a simple example using
    the UML.


    ![A314621_5_En_8_Fig1_HTML.gif](A314621_5_En_8_Fig1_HTML.gif)


    Figure 8-1.


    A parent class and two child classes


    The abstract `Lesson` class in Figure [8-1](#A314621_5_En_8_Chapter.html#Fig1)
    models a lesson in a college. It defines abstract `cost()` and `chargeType()`
    methods . The diagram shows two implementing classes, `FixedPriceLesson` and `TimedPriceLesson`,
    which provide distinct charging mechanisms for lessons.


    Using this inheritance scheme, I can switch between lesson implementations. Client
    code will know only that it is dealing with a `Lesson` object, so the details
    of cost will be transparent.


    What happens, though, if I introduce a new set of specializations? I need to handle
    lectures and seminars. Because these organize enrollment and lesson notes in different
    ways, they require separate classes. Now I have two forces that operate upon my
    design. I need to handle pricing strategies, and separate lectures and seminars.


    Figure [8-2](#A314621_5_En_8_Chapter.html#Fig2) shows a brute-force solution .


    ![A314621_5_En_8_Fig2_HTML.gif](A314621_5_En_8_Fig2_HTML.gif)


    Figure 8-2.


    A poor inheritance structure


    Figure [8-2](#A314621_5_En_8_Chapter.html#Fig2) shows a hierarchy that is clearly
    faulty. I can no longer use the inheritance tree to manage my pricing mechanisms
    without duplicating great swathes of functionality. The pricing strategies are
    mirrored across the `Lecture` and `Seminar` class families.


    At this stage, I might consider using conditional statements in the `Lesson` super
    class, removing those unfortunate duplications. Essentially, I remove the pricing
    logic from the inheritance tree altogether, moving it up into the super class.
    This is the reverse of the usual refactoring, where you replace a conditional
    with polymorphism. Here is an amended `Lesson` class :


    ```

    // listing 08.01

    abstract class Lesson

    {

    protected $duration;

    const     FIXED = 1;

    const     TIMED = 2;

    private   $costtype;

    public function __construct(int $duration, int $costtype = 1)

    {

    $this->duration = $duration;

    $this->costtype = $costtype;

    }

    public function cost(): int

    {

    switch ($this->costtype) {

    case self::TIMED:

    return (5 * $this->duration);

    break;

    case self::FIXED:

    return 30;

    break;

    default:

    $this->costtype = self::FIXED;

    return 30;

    }

    }

    public function chargeType(): string

    {

    switch ($this->costtype) {

    case self::TIMED:

    return "hourly rate";

    break;

    case self::FIXED:

    return "fixed rate";

    break;

    default:

    $this->costtype = self::FIXED;

    return "fixed rate";

    }

    }

    // more lesson methods...

    }

    // listing 08.02

    class Lecture extends Lesson

    {

    // Lecture-specific implementations ...

    }

    // listing 08.03

    class Seminar extends Lesson

    {

    // Seminar-specific implementations ...

    }

    ```


    Here’s how I might work with these classes:


    ```

    // listing 08.04

    $lecture = new Lecture(5, Lesson::FIXED);

    print "{$lecture->cost()} ({$lecture->chargeType()})\n";

    $seminar = new Seminar(3, Lesson::TIMED);

    print "{$seminar->cost()} ({$seminar->chargeType()})\n";

    ```


    And here’s the output:


    ```

    30 (fixed rate)

    15 (hourly rate)

    ```


    You can see the new class diagram in Figure [8-3](#A314621_5_En_8_Chapter.html#Fig3).


    ![A314621_5_En_8_Fig3_HTML.gif](A314621_5_En_8_Fig3_HTML.gif)


    Figure 8-3.


    Inheritance hierarchy improved by removing cost calculations from subclasses


    I have made the class structure much more manageable, but at a cost. Using conditionals
    in this code is a retrograde step. Usually, you would try to replace a conditional
    statement with polymorphism. Here, I have done the opposite. As you can see, this
    has forced me to duplicate the conditional statement across the `chargeType()`
    and `cost()` methods.


