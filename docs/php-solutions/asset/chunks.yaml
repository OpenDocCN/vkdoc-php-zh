    \nFor PDO, use this:\n\n```\n$result = $conn->query($sql);\n\n$errorInfo = $conn->errorInfo();\n\
    \nif (isset($errorInfo[2])) {\n    $error = $errorInfo[2];\n}\n```\n\nAdd a conditional\
    \ statement just before the table to display any error message, and wrap the table\
    \ in the `else` block. The code before the table looks like this:\n\n```\n<?php\
    \ if (isset($error)) {\n    echo \"<p>$error</p>\";\n} else { ?>\n```\n\nThe closing\
    \ curly brace goes in a separate PHP block after the closing `</table>` tag.\n\
    \nYou now need to enclose the second table row in a loop and retrieve each record\
