  trans: '好的，身为高级文档工程师和翻译员，我将严格按照您的要求，完成以下翻译工作。



    ### ![../images/487291_1_En_5_Chapter/487291_1_En_5_Figb_HTML.jpg](img/487291_1_En_5_Figb_HTML.jpg)
    恢复到更大的机器


    如果你将备份恢复到更大的机器上，可能无法使用全部已购买的磁盘空间。由于分区是直接复制的，旧分区的大小将与它被复制时所在服务器上的大小相同，这可能小于你可用的空间。


    要解决这个问题，首先关闭你的服务器。然后，在节点的控制面板上，点击“高级”选项卡。你可以选择添加另一个磁盘来使用剩余空间（这更难管理，所以我不推荐），或者调整主磁盘大小以使用所有空间。要调整磁盘大小，请在“磁盘”下找到主磁盘。它应该被命名为类似“CentOS
    7 磁盘”的名称（不要选择标有“交换镜像”的磁盘）。点击主磁盘旁边的省略号（即 `...`），然后选择“调整大小”。接着，你可以将大小设置为它告诉你的最大值，然后点击“调整大小”按钮。


    调整大小完成后，你可以重新启动机器，现在一切都就绪了。


    ## 5.3 设置你的私有网络


    因为我们有两台机器，所以需要它们能够通信。它们*可以*通过公共 IP 地址通信，但这会导致几个问题。首先，如果你有一些不希望公开的服务（比如你的数据库），如果你只有一个公共
    IP 地址，那么阻止公众访问这些服务会更加困难。此外，Linode 会对公共 IP 地址的流量收费，所以，如果你通过那个 IP 地址通信，Linode 会向你收取*内部*流量的费用。因此，拥有一个私有
    IP 地址很重要，因为它可以让计算机通过一个快速、免费、更安全的内部网络相互通信。


    为了解决这些问题，Linode 允许你为服务器设置一个内部网络。一个账户内的所有服务器如果都为之进行了设置，它们就可以共享一个内部网络。要将服务器添加到你的内部网络，你只需要进入节点的“网络”选项卡，然后点击“添加私有
    IPv4”。系统会提供一些关于私有地址的额外信息，你只需点击“分配”即可继续。这将为计算机分配一个私有 IP 地址。因为所有的 Web 服务器都将与这台服务器通信，你需要记下生成的这个私有
    IP 地址。从现在开始，我们将这个地址称为 `DB.MASTER.PRIVATE.IP`，所以请始终用你刚刚记下的服务器的私有 IP 地址来替换它。


    请注意，在某些云平台（包括 Linode）上，私有 IP 地址并非完全私有。也就是说，同一数据中心内的其他云客户可能也在该网络上。因此，虽然它肯定比在公共网络上更安全，但云上的私有网络并不能保证只有我们自己的计算机才能连接。因此，在生产系统上，即使在内部网络中，你仍然需要采取预防措施以防止未经授权的访问。不过，Linode
    确实会过滤发往每个节点的流量，所以你不必担心有人在内部网络上窥探数据流量。


    你需要重启节点来完成这个过程。


    启动完成后，你仍然可以通过 `http://NEW.NODE.PUBLIC.IP/list.php` 访问该应用，但你无法通过私有 IP 地址访问它，因为如前所述，它是私有的。


    要查看服务器上的地址列表，请以 root 用户身份登录并执行命令：


    ```

    ip addr show

    ```


    这会打印出分配给该节点的所有 IP 地址。


    ### ![../images/487291_1_En_5_Chapter/487291_1_En_5_Figc_HTML.jpg](img/487291_1_En_5_Figc_HTML.jpg)
    私有 IP 地址


    如果你不熟悉 IP 寻址，一些 IPv4 地址已被保留供内部网络使用。这些地址包括：


    *   `192.168.X.X`


    *   `172.16–31.X.X`


    *   `10.X.X.X`


    这些 IP 地址都不允许用于互联网上的公共通信。


    因此，在设置你的内部网络时，Linode 会从这些地址池中选择 IP 地址来配置你的机器。


    另一个广为人知的 IP 地址是 `127.0.0.1`，它被称为*回环*地址，是机器用来指代自身的 IP 地址（实际上，整个 `127.X.X.X` 范围都为此目的而保留，但通常只使用
    `127.0.0.1`）。


    ## 5.4 处理来自其他服务器的数据库连接


    这台机器现在拥有完整的应用和数据库副本。但是，它仍然被配置为一个单服务器系统。我们需要将其配置为服务器集群的主数据库。本节操作应以 root 用户身份执行，将展示实现此目标所需执行的步骤。


    由于此机器是 `template_node` 的克隆，这意味着所有用户、程序和配置都已复制到此节点。因此，你可以使用之前设置的密码以 root 用户身份通过
    `ssh` 登录到该机器。


    要将其用作其他节点的数据库服务器，你需要启用数据库以监听来自这些节点的连接。默认情况下，PostgreSQL 仅监听 localhost 接口上的连接。我们*不希望*
    PostgreSQL 监听公共互联网上的连接。因此，我们希望配置 PostgreSQL，使其同时监听 localhost 及其*私有*IP 地址上的连接。


    为此，以 root 用户身份，使用 `nano` 打开文件 `/var/lib/pgsql/data/postgresql.conf`，并修改写着 `listen_addresses`
    的那一行。将该行修改为：


    ```

    listen_addresses = ''localhost,DB.MASTER.PRIVATE.IP''

    ```


    确保将 `DB.MASTER.PRIVATE.IP` 替换为你节点的*实际*私有 IP 地址。如果该行开头有注释标记（`#`），请务必将其删除；否则该命令将不会生效。使用
    control-o 保存文件（如果提示，只需按回车键确认文件名）。然后，使用 control-x 退出。现在使用以下命令重启 PostgreSQL：


    ```

    systemctl restart postgresql

    ```


    此外，你需要打开防火墙，使其能够接受 PostgreSQL 的远程连接。你可以使用以下命令完成此操作：


    ```

    firewall-cmd --add-service postgresql

    firewall-cmd --add-service postgresql --permanent

    ```


    通常，我会让 Web 服务器在数据库服务器上运行，以便我能够检查它。但是，如果你愿意，可以使用以下命令关闭 Web 服务器：


    ```

    systemctl stop httpd

    systemctl disable httpd

    ```

    '
- fmt: '### 5.5 Setting Up a Web Server


    Now that we have the database configured, it is time to set up our web servers.


    Note that we will not actually use `template_node` as a server. I like to keep
    a small machine around that is simply used as a template for future boxes, especially
    for webnodes. This way, I can have one small machine that is up-to-date, backed
    up, and so on, and when I’m ready to create a new “image,” I just create a named
    backup to use. Note that this will overwrite the previous snapshot image, but
    for my purposes, that is usually okay. If you need to keep old versions around,
    just keep a template node around for each configuration you want to maintain.


    Now we will configure `template_node` for being a web server template. There are
    only three changes we need to make:


    1. Turn off the database on this machine.

    2. Change the code for the web application to point to our new database.

    3. Enable a private IP address on the machine to enable it to use the private
    network.


    To accomplish the first task, all we need to do is log in to the `template_node`
    machine as root and run:


    ```

    systemctl stop postgresql

    systemctl disable postgresql

    ```


    To accomplish the second task, we need only modify the `common.php` file. I would
    suggest modifying it on your local machine and using SFTP to transmit the new
    file. However, you can also use `nano` on the server to modify it directly. All
    you have to do is to change the connection string. Where it currently says `host=localhost`,
    change it to read `host=DB.MASTER.PRIVATE.IP`, where `DB.MASTER.PRIVATE.IP` is
    the private IP address of your `dbmaster` node. You will need to make this change
    twice—once in the `getReadOnlyConnection()` function and once in the `getReadWriteConnection()`
    function. Once you are done, load the code back onto the server with SFTP.


    At this point, the code will not work because it cannot access the `dbmaster`
    machine. This is because PostgreSQL is *only* listening on its private IP address,
    and `template_node` does not yet have a private IP address to communicate on.
    Therefore, you need to add a private IP address to the machine, so that it can
    connect to `dbmaster` on its private IP address.


    Use the process outlined in Section 5.3 to create a private IP address for the
    machine (don’t forget to reboot afterward!).


    Once you have completed these steps, your `template_node` machine should be able
    to connect to `dbmaster`, so test it out. Go to the IP address of your `template_node`
    server and see if it can still function. If it does, then congratulations, because
    you just implemented a small, two-tier system!


    Now, as I said earlier, we actually aren’t going to use `template_node` to actually
    serve requests. The goal is to use it so that we can easily boot up new web server
    nodes to expand capacity as we need to.


    Therefore, now that `template_node` is fully set up to be a web server, take a
    new backup snapshot. This step is critically important. Anytime you make a change
    in `template_node`, you should make a new backup snapshot so that new nodes you
    create from it will have your new changes (though it doesn’t affect existing nodes
    at all).


    We will now create three (or however many you want) web server nodes for our cluster.


    Here are the steps for each new web server node:


    1. Create a new node using the steps in Section 5.2. Be sure that (a) it gets
    created in the same datacenter as `dbmaster`, and (b) set the name of the node
    to `webnode1` (or 2, or 3).

    2. Add a private IP address to the node so that it can connect to `dbmaster` on
    the private network using the steps in Section 5.3.

    3. After the machine finishes booting up, verify that it is fully functional by
    looking at your web application on the public IP address of the node (i.e., `http://WEB.NODE.PUBLIC.IP/list.php`).


    At the end of this, you should have three machines, `webnode1`, `webnode2`, and
    `webnode3`, each of which can act as a front end to your web application. Now
    you just need to link them all together, which will be covered in the next section.


    ### 5.6 Setting Up the Load Balancer


    Now we have three front-end machines, all connected to a single database. How
    do we connect them together? One way we could do this is to set up a DNS round-robin
    scheme. The way this works is to set up *multiple* A records in DNS for a single
    hostname. Then the browsers themselves will pick which host they want to connect
    to. The problem with this is that if one of your machines goes down, there is
    no way to direct users away from that IP address. Linode actually has some support
    for this sort of failover now, but its usage is outside the scope of this book.


    ![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig4_HTML.jpg](images/487291_1_En_5_Chapter/487291_1_En_5_Fig4_HTML.jpg)


    Figure 5-4: Creating a Node Balancer


    Load balancers are a much more turnkey solution. A load balancer sits out in front
    of your cluster and takes connections for you and then forwards those connections
    to the servers that are available for handling them. Additionally, if one of your
    servers fails, the load balancer will detect this and move traffic onto the remaining
    servers. Then, when your server recovers, the load balancer will also detect this
    and move traffic back to the server.


    Setting up a load balancer in Linode is easy. Linode calls its load balancers
    “Node Balancers.” To set up a Node Balancer, click “Create” and then select the
    “Node Balancer” menu item. This will bring you to the screen shown in Figure [5-4](#487291_1_En_5_Chapter.xhtml#Fig4).


    Just like everything else, you need to


    - Set the name of the balancer (we will use “primary-balancer”).

    - Put the balancer in the same datacenter as your nodes.


    Additionally, you need to add some additional configuration, as shown in Figure
    [5-5](#487291_1_En_5_Chapter.xhtml#Fig5). Be sure the following are selected:


    - “Port” should be set to “80.”

    - “Protocol” should be set to “HTTP.”

    - “Algorithm” should be set to “Round Robin.”

    - “Session Stickiness” should be set to “None.”

    - “Active Health Checks” should be set to “None.”

    - “Passive Health Checks” should be on.


    After that, you need to add at least one node to your balancer (more can be added
    after creating the balancer). Put in the name of the node in the “Label” field
    (we’ll assume `webnode1`). Then, in the “IP Address” field, choose the IP address
    for your node from the drop-down. Make sure the port is set to “80.”


    When these settings are completed, click “Create” to create the balancer.


    Once your balancer is created, you can add the rest of the nodes by going into
    “Configurations,” then “Port 80,” and then “Add Node” at the bottom. Add as many
    nodes as you created. Then click “Save” when done.


    It sometimes takes a few minutes for the balancer to add a node to its list. To
    check on the status, go back to the node balancer configuration screen. Each server
    will have a “Status” field next to it. When the status is “Up,” the server is
    successfully connected to the balancer.


    If you wanted to have a load balancer for another port, you can use the “Add Another
    Configuration” button for this.


    ![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig5_HTML.jpg](images/487291_1_En_5_Chapter/487291_1_En_5_Fig5_HTML.jpg)


    Figure 5-5: Node Balancer Additional Settings'
