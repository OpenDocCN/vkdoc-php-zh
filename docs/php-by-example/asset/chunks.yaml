    \ $this->number;\n    }\n    public function set($number){\n        $this->number\
    \ = $number;\n    }\n}\n```\n\n这是一个可以描述类的表达式。区别在于你没有指定类名，并且出现了`new`指令。结果是，这个对象是基于该指令所描述的类创建的，但是这个类没有名字。\n\
    \n> **注意**  \n> 在整个结构末尾要加上分号，它作为创建对象的命令。\n\n## 总结\n\n* 抽象类用`abstract`关键字描述，并包含抽象方法。抽象方法没有实现，仅声明。抽象方法的声明也使用`abstract`关键字。除了抽象方法，抽象类还可以包含常规（非抽象）方法和字段。抽象类用于通过继承创建基于它们的子类。\n\
    \n* 接口就像一个“完全抽象”的类。接口没有字段（但可以有常量），并且其中只声明方法。接口用`interface`关键字描述。如果一个类实现了某个接口，该类必须实现接口中的每个方法。要在类中实现接口，在类描述中，需要在类名后放置`implements`关键字和要实现的接口名。如果一个类实现了多个接口，它们列在`implements`关键字后，用逗号分隔。\n\
    \n* 接口可以继承另一个接口。在这种情况下，使用`extends`关键字，就像在类继承中一样。\n\n* 一个类可以同时继承另一个类并实现多个接口。\n\n\
    * Trait 包含可以包含在类描述中的代码块。Trait 使用`trait`关键字描述。要将 trait 内容包含到类中，需要放置`use`指令，然后列出要包含在类中的\
    \ trait，并用逗号分隔。\n\n* 如果将接口名指定为函数参数类型，则可以将实现该接口的类对象作为参数传递给该函数。如果将类名（通常是抽象类）指定为参数类型，则可以将任何子类的对象作为参数传递。`instanceof`指令可用于检查对象或参数的类型。\n\
    \n* 要创建命名空间，使用`namespace`指令，后跟命名空间的名称。应将适当的文件导入到程序中以包含该命名空间。通过指定命名空间名称来访问命名空间中的工具。使用`as`指令创建别名。\n\
    \n* 当只需要基于一个类创建一个对象时，使用匿名类。在这种情况下，将一个表达式赋值给对象变量，该表达式以`new`和`class`关键字开头，后跟花括号中实际的类描述，基于该描述创建对象。\n\
    \n# 10. 错误处理\n\n*我有没有搞砸过什么？嗯，最近呢？*\n\n*—《ALF》电视剧*\n\n即使代码可靠且经过深思熟虑，也不可能总是保证其执行过程中不会发生错误。而原因往往是客观的。例如，用户可能输入了无效的值，或者程序可能找不到它需要运行的文件。在这种情况下，就需要进行错误处理，这也是本章要讨论的内容。\n"
- fmt: "# Exception Handling Principles\n\nThe PHP language is quite democratic in\
    \ many ways. That is also applicable to the reaction to error raising. While in\
    \ most programming languages, an error usually means that the program is terminated\
    \ (unless a special error-handling system is involved), things are not always\
    \ so tragic in PHP. Even if something unpleasant like an error happens, it does\
    \ not mean that the program abruptly terminates. Often, it is limited to a warning\
    \ message or even no warning at all. In other words, there are quite different\
    \ errors. Errors that cause the program to terminate are usually called fatal\
    \ errors or *exceptions*. First, let’s explore how to handle such errors.\n\n\
    The idea behind exception handling is very simple. You must provide some program\
    \ code to execute when an exception occurs. In PHP, you can implement that idea\
    \ in many different ways. Let’s start with the simplest case and then explore\
    \ the problem in detail.\n\n> **Note:** Once again, it should be noted that errors\
    \ and exceptions in the context of PHP are not the same. However, from now on,\
    \ unless it leads to misunderstandings, terms such as *exception* and *error*\
    \ are synonyms.\n\nSo, let’s say there is a code block, and you suspect an error\
    \ may occur during its execution. What do you have to do? There is a simple recipe.\
    \ It assumes putting the mentioned code (the controlled code) in a special block\
    \ that begins with the `try` keyword and is enclosed in curly braces. After the\
    \ `try` block with the controlled code, the `catch` block is placed, containing\
    \ the code to be executed in an error. The following is the template for the whole\
    \ `try-catch`.\n\n```\ntry{\n    // The controlled code\n}catch(Error_type $object_name){\n\
    \    // The code to handle the error\n}\n```\n\nThe `catch` keyword is followed\
    \ by the error class name and a formal notation in parentheses for the error object\
    \ (the variable identified with the error object).\n\n**Details:** The point is\
    \ that when an error occurs, an object that contains information about the error\
    \ is automatically created. The information can, in principle, be used when processing\
    \ the error. The `catch` block contains the name of the error class (the error\
    \ type) and the error object. You can use different processing methods to handle\
    \ errors of different types. If so, then in the `try-catch` construction, use\
    \ several `catch` blocks—each one for an error of a specific type.\n\n> **PHP\
    \ 8 Standard:** In PHP 8, you can (if you need to) specify only the exception\
    \ class name in the `catch` block description in parentheses after the `catch`\
    \ keyword without any variable for the exception object.\n\nThe code with the\
    \ `try-catch` construction is performed as follows. First, the controlled code\
    \ is executed. If there is no error, the `catch` block is ignored. If there is\
    \ an error in the `try` block while executing the controlled code, the `try` block\
    \ is stopped, and the `catch` block is executed. Then, the command after the `try-catch`\
    \ construction is run. How that looks in practice is illustrated in Listing 10-1.\n\
    \n```\nListing 10-1\nThe Exception Handling Principles\n```\n\nThe program, in\
    \ this case, is simple. The user is asked to enter an expression specifying the\
    \ value of the `$x` variable. You discard leading and trailing spaces in the read\
    \ string. The `$input=\"\\$x=\".trim(fgets(STDIN)).\";\"` instruction forms the\
    \ command that assigns a value to the `$x` variable. The corresponding string\
    \ is written into the `$input` variable. That command is executed when you pass\
    \ the string from the `$input` variable as an argument to the `eval()` function.\
    \ Next, the value of the `$x` variable is displayed. All commands are placed inside\
    \ the `try` block. The point is that the `eval($input)` statement may cause an\
    \ error because the value entered by the user is invalid. That type of error belongs\
    \ to the `ParseError` class. To catch errors, use the `catch` block, in which\
    \ the `echo \"There was an error\\n\"` command is executed.\n\nThus, if no error\
    \ of the `ParseError` class occurs during the code execution in the `try` block,\
    \ then the `catch` block is ignored, and the calculated value of the `$x` variable\
    \ is displayed. If an error occurs, the value of `$x` is not displayed, and the\
    \ code in the `catch` block is executed instead. But in any case, the `echo \"\
    The program is over\\n\"` command is executed after the `try-catch` construction.\n\
    \nThe result of the program execution depends on what expression the user enters.\
    \ If the expression is a correct PHP statement, the result is as follows (the\
    \ user input is marked in bold).\n\n```\nThe output of the program (from Listing\
    \ 10-1)\nThe value of the variable $x: 3+4*5\n$x = 23\nThe program is over\n```\n\
    \nIf the expression that should determine the value of the `$x` variable is incorrect,\
    \ the result is as follows.\n\n```\nThe output of the program (from Listing 10-1)\n\
    The value of the variable $x: 3++4\nThere was an error\nThe program is over\n\
    ```\n\nYou can handle errors of different types in the way described.\n\n## Exception\
    \ Classes\n\nThe classes corresponding to errors of different types (exceptions\
    \ of different classes) form a hierarchy based on the inheritance of classes and\
    \ the implementation of interfaces. Why is it important? The reason is that if\
    \ the `catch` block is designed to handle errors of a specific class, then it\
    \ also handles errors of all child classes of that class.\n\nNext, let’s discuss\
    \ the main classes related to error handling. But let’s begin with the `Throwable`\
    \ interface. It is important since the classes used for error handling directly\
    \ or indirectly implement that interface. Therefore, methods declared in the interface\
    \ are common to many exception classes. Those methods are listed and described\
    \ in Table 10-1.\n\n**Table 10-1** `Throwable` Interface Methods\n\n| Method |\
    \ Description |\n| --- | --- |\n| `getMessage()` | The method returns a message\
    \ associated with the exception. |\n| `getCode()` | The method returns the exception\
    \ code. |\n| `getFile()` | The method returns a string with the name of the file\
    \ in which the exception object was created. |\n| `getLine()` | The integer result\
    \ of the method determines the line on the execution of which the exception object\
    \ was created. |\n| `getTrace()` | The stack trace is returned (as an array).\
    \ |\n| `getTraceAsString()` | The stack trace is returned (as a string). |\n|\
    \ `getPrevious()` | Returns a reference to the previous exception object. |\n\
    | `__toString()` | The method returns a string representation for the exception\
    \ object. |\n\n> **Note:** In the interface, the methods are only declared. The\
    \ purpose of the methods is given following how they are defined in the classes\
    \ that implement the interface.\n\nThe exception classes are presented in Table\
    \ 10-2.\n\n**Table 10-2** The Exception Classes\n\n| Class | Description |\n|\
    \ --- | --- |\n| `ArgumentCountError` | It inherits the `TypeError` class. An\
    \ exception of this class is thrown if fewer arguments than necessary are passed\
    \ when calling a function or method. |"
