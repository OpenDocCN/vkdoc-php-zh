    Web 服务器的性能与效率。此外，正如你将看到的，通过在浏览器中进行验证，文本框中的内容仍然可供用户调整。如果验证在 Web 服务器上完成，HTML 表单中的信息可能会丢失，因为每次与
    Web 服务器收发信息时，网页都会重新加载。


    浏览器中验证的目标是确保用户提供的信息满足服务器上程序的要求。你最初可能会对这个示例向用户显示所需信息的格式感到不满。然而，目标不是保护数据安全；目标是确保数据有效。向用户告知所请求的数据格式并非安全漏洞。


