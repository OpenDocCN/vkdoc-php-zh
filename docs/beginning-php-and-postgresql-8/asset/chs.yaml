  \ PHP 自动测试用户的网络速度：向用户发送相对大量的数据，然后记录完成传输所需的时间。\n\n创建将要传输给用户的数据文件。实际上，该文件可以是任何内容，因为用户永远不会真正看到它。建议通过生成大量文本并写入文件的方式来创建它。例如，以下脚本将生成一个大约\
  \ 1500KB 大小的文本文件：\n\n```\n<?php\n\n// 创建一个新文件，命名为\"textfile.txt\"\n\n$fh = fopen(\"\
  textfile.txt\",\"w\");\n\n// 重复向文件写入单词\"bandwidth\"\n\nfor ($x=0;$x<170400;$x++)\
  \ fwrite($fh,\"bandwidth\");\n\n// 关闭文件\n\nfclose($fh);\n\n?>\n```\n\n现在我们来编写计算网络速度的脚本。该脚本如清单\
  \ 16-3 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**398**\n\n**清单\
  \ 16-3** *计算网络带宽*\n\n```\n<?php\n\n// 获取要发送给用户的数据\n\n$data = file_get_contents(\"\
  textfile.txt\");\n\n// 确定数据的总大小（以千字节为单位）\n\n$fsize = filesize(\"textfile.txt\")\
  \ / 1024;\n\n// 定义开始时间\n\n$start = time();\n\n// 将数据发送给用户\n\necho \"<!-- $data -->\"\
  ;\n\n// 定义结束时间\n\n$stop = time();\n\n// 计算发送数据所用的时间\n\n$duration = $stop - $start;\n\
  \n// 用文件大小除以传输所用的秒数\n\n$speed = round($fsize / $duration,2);\n\n// 以千字节每分钟显示计算出的速度\n\
  \necho \"您的网络速度：$speed KB/秒。\";\n\n?>\n```\n\n执行此脚本会产生类似以下内容的输出：\n\n```\nYour network\
  \ speed: 249.61 KB/sec.\n```\n\n### 本章小结\n\n\n"
- '# PHP 与 LDAP


  PHP 的网络功能不会很快取代命令行或其他成熟客户端中已有的工具。然而，随着 PHP 命令行功能的不断普及，你很可能很快就会发现本章介绍的一些内容派上用场。


  下一章将介绍 PHP 如何有效与其他企业技术交互的最有力示例之一，向你展示使用 PHP 的 LDAP 扩展与你首选的目录服务器交互是多么容易。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ## 第 17 章：PHP 与 LDAP


  随着过去十年企业硬件和软件基础设施的扩展，IT 专业人员发现自己被管理快速增加的企业资源所需的行政开销所淹没。打印机、工作站、服务器、交换机和其他各种网络设备都需要持续监控和管理，用户资源访问和网络权限也是如此。


  通常，系统管理员会拼凑出自己内部的工作方式来维持秩序，而这些系统往往设计糟糕、不安全且不可扩展。另一种同样低效的替代方案涉及部署大量独立的系统，每个系统各自负责管理企业的一部分，但由于缺乏集成，带来了相当大的开销。结果是用户和管理员都因缺乏全面的管理解决方案而受苦，直到目录服务的出现。


  目录服务为系统管理员、开发人员和最终用户提供了一种一致、高效且安全的方式来查看和管理资源，如人员、文件、打印机和应用程序。这些针对读取优化的数据存储库的结构通常紧密模拟实际的企业组织结构，图
  17-1 展示了一个示例。


  **图 17-1.** *典型企业组织结构的模型*


  正如你所能想象的，长期以来一直有（并且现在仍有）对强大目录服务产品的需求。许多领先的软件供应商已经构建了旗舰产品，并且实际上围绕这些产品开展了整个业务。以下只是其中一些较受欢迎的目录服务产品：


  - **Novell eDirectory:** http://www.novell.com/products/edirectory/

  - **Fedora Directory Server:** http://directory.fedora.redhat.com/

  - **Microsoft Active Directory:** http://www.microsoft.com/activedirectory/

  - **Oracle Collaboration Suite:** http://www.oracle.com/collabsuite/


  你可能会觉得有趣的是，上述所有产品都严重依赖于一个称为轻量级目录访问协议（LDAP）的开放规范。在本章中，你将了解 LDAP，并学习如何通过 PHP 的 LDAP
  扩展轻松与 LDAP 通信。到本章结束时，你将掌握通过 PHP 应用程序开始与目录服务通信所需的知识。在深入探讨这个出色的扩展之前，对于不熟悉该主题的读者，有必要先对
  LDAP 进行初步介绍。虽然这绝不算全面的介绍，但希望它能吸引那些之前没有 LDAP 知识或经验的读者花些时间进一步了解这项极具价值的技术。


  ### LDAP 简介


  LDAP 是当今访问目录服务器的事实标准，它提供了一种用于存储、检索、操作和保护目录数据的明确模型。或许对 LDAP 的最佳描述出现在 IBM 的《LDAP 红皮书》（http://www.redbooks.ibm.com/redbooks/SG244986/）中，该书将
  LDAP 描述为一种由四个关键模型组成的协议：




  • **信息：** 正如关系型数据库定义了表中数据必须遵循的列属性，LDAP 也定义了目录服务器中存储信息的结构。


  • **命名：** LDAP 提供了一种明确定义的结构，用于确定如何导航、标识和检索 LDAP 信息。这种结构被称为通用目录结构或模式（schema），它非常类似于常用于组织信息的层级模型。此类实体的例子包括动植物分类法、公司组织层级（类似于图
  17-1 所示的结构）、同义词词典和家谱。


  • **功能：** LDAP 定义了可以对目录服务器中存储的信息执行的操作，规定了如何检索、插入、更新和删除数据。此外，LDAP 还定义了 LDAP 客户端与服务器之间通信所使用的格式和传输方法。


  • **安全性：** LDAP 提供了一种方案，用于确定如何以及由谁来访问 LDAP 目录中存储的信息。它提供了多种访问级别，包括读取、插入、更新、删除和管理等访问权限级别。此外，LDAPv3
  的传输层安全（TLS）扩展通过使用加密技术，提供了一种在客户端和服务器之间进行身份验证和数据传输的安全手段。


  从上述总结中你可能已经推断出，LDAP 既定义了信息存储方式，也定义了通信方法。LDAP 在实现方面几乎不留想象空间，这也是它被广泛使用的原因之一。


  ### 深入了解 LDAP


  除了大量关于该主题的书籍外，互联网上也充满了关于 LDAP 的信息。本节将提供一些指向更有用的在线资源的指引：


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  • **LDAP v3 规范** (http://www.ietf.org/rfc/rfc3377.txt)：轻量级目录访问协议版本 3 的官方规范


  • **OpenLDAP 官方网站** (http://www.openldap.org/)：广泛使用的 LDAP 开源实现的官方网站


  • **IBM LDAP Redbook** (http://www.redbooks.ibm.com/)：IBM 提供的 194 页免费 LDAP 入门指南


  ### 在 PHP 中使用 LDAP


  PHP 的 LDAP 扩展似乎从未得到其应得的关注，因为它提供了极大的灵活性、强大功能和易用性，这正是开发人员在创建通常较为复杂的 LDAP 驱动应用程序时所渴望的三个特性。本节将深入探讨这些功能，介绍
  PHP 的大部分 LDAP 函数，并穿插大量关于如何充分利用 PHP/LDAP 集成的提示和技巧。


  #### 连接到 LDAP 服务器


  使用 LDAP 与使用数据库服务器非常相似，因为在进行任何交互之前，必须先建立与服务器的连接。PHP 的 LDAP 服务器连接函数称为 `ldap_connect()`。


  `ldap_connect()`


  `resource ldap_connect ([string *hostname* [, int *port*]])` `ldap_connect()` 函数建立到由
  `hostname` 指定的 LDAP 服务器的连接，端口号为 `port`。如果未指定可选的 `port` 参数，并且服务器名称前带有 `ldap://` URL
  方案，或者完全省略了该 URL 方案，则假定使用 LDAP 的标准端口 `389`。如果使用 `ldaps://` 方案，则假定使用端口 `636`。如果连接成功，则返回一个链接标识符；如果出错，则返回
  `FALSE`。一个简单的使用示例如下：


  ```php

  <?php


  $ldapHost = "ldap://ad.example.com";


  $ldapPort = "389";


  $ldapconn = ldap_connect($ldapHost, $ldapPort)


  or die("Can''t establish LDAP connection");


  ?>

  ```


  尽管安全 LDAP（LDAPS）被广泛部署，但它并非官方规范。OpenLDAP 2.0 确实支持 LDAPS，但实际上它已被弃用，转而采用另一种名为 Start
  TLS 的机制来确保安全的 LDAP 通信。


  `ldap_start_tls()`




