  trans: '

    ### 选择服务器


    Linode 根据（a）服务器将处理的工作负载类型和（b）服务器配备的内存大小对其服务器进行分类。工作负载类型包括：“Nanode”（超小型且超便宜的实例）、“标准型”（CPU/内存均衡）、“专用
    CPU” 和 “高内存”（还有 “GPU”，但那类实例属于完全不同的云计算类型，不在此书讨论范围内）。


    在每种工作负载下，服务器根据其配备的内存大小命名。一台“Linode 4GB”服务器，你猜对了，配备 4 GB 内存。它还会指定配备多少个虚拟 CPU 以及多少磁盘空间。通常，内存的增加速度比核心数更快，这是合理的，因为内存往往比
    CPU 性能更成为更强的限制因素。它们各自的磁盘空间大小也不同，但我认为磁盘空间是次要考虑因素，因为第 8 章将介绍如何设置一个拥有无限可用磁盘空间的服务。


    在选择生产服务器时，出于后续将更明确的原因，我通常为数据库选择相当大的规格（因为它们更难复制），而为 Web 服务器选择低端到中端规格（因为我可以通过增加更多服务器来轻松扩展容量）。


    ## 3.2 登录并查看


    那么，你已经有了一台机器，但它在哪里，你如何访问它呢？


    点击仪表盘上的“网络”选项卡。它看起来应该像图 3-3。在“访问”下方有一个名为“SSH 访问”的区域。这里包含了你需要输入到命令行中以进行登录的命令。使用你为节点创建的密码进行登录。


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig3_HTML.jpg](img/487291_1_En_3_Fig3_HTML.jpg)


    图 3-3


    网络选项卡


    ### 命令行？那是什么？


    命令行是访问计算机的老式方法。早在漂亮的图形界面出现之前，人们就通过输入命令来与计算机交互。对于许多事情，*尤其是*与系统管理相关的任务，命令行仍然是管理系统的最佳方式。


    如果你没有任何使用命令行的经验，别担心！本书并不假定你在这方面有专业知识，并会逐步引导你完成每个步骤。如果你只是想弄清楚如何*进入*命令行，以下是每种主要操作系统的操作方法：


    * **Windows 10**：Windows 实际上拥有*两种*命令行系统：较旧的“命令提示符”（`cmd.exe`）和较新的 PowerShell。只需点击
    Windows 图标并输入 `PowerShell` 即可开始。至少需要 2018 年 4 月更新才能无需额外设置即可运行这里的命令。


    * **MacOS X**：每台 Mac 都带有一个名为“终端”的应用程序。你可以通过 Spotlight 搜索找到它，或者前往“应用程序”，然后进入“实用工具”中找到它。我建议你将它添加到
    Dock 栏，因为你可能会经常使用它。


    * **Linux**：每个 Linux 发行版都安装有一个命令行程序，通常名为“终端”或“Bash 提示符”之类的。


    当你第一次启动命令行时，它会显示一些文本，随后是一个闪烁的光标。现在你就可以开始输入命令了！


    如果你不熟悉 Linux，`ssh` 是一个非常方便的工具，它允许远程、安全地连接到你的服务器命令行。也就是说，你可以 `ssh` 进入你的机器，其工作方式就像你登录到控制台一样。此外，连接是加密的，所以你无需担心有人窃听你或窃取你的密码。`ssh`
    在每个主流操作系统上都是默认安装的，所以你应该已经安装了它。如果你使用的是旧版 Windows，你可能需要下载一个单独的 `ssh` 应用程序，例如 `PuTTY`，可以从
    [`www.putty.org`](http://www.putty.org) 免费下载.


    要登录你的机器，只需打开一个命令行，并输入“SSH 访问”下列出的命令。它应该类似于 `ssh root@MY.IP.ADDRESS.HERE`，其中 `MY.IP.ADDRESS.HERE`
    是你的 Linode 的 IP 地址。由于 `ssh` 之前没有见过这台计算机，它很可能会警告你无法确认主机的真实性，并询问你是否要继续连接。只需回答 `yes`。它只会在第一次询问你，因为
    `ssh` 会记住远程计算机。然后，在输入密码时，输入你在设置机器时设置的密码。图 3-4 显示了这大概会是什么样子。


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig4_HTML.png](img/487291_1_En_3_Fig4_HTML.png)


    图 3-4


    从命令行登录


    现在你已经成功登录到你的机器了！


    最后一行被称为“命令提示符”。它提供了关于你当前会话状态的基本信息。`root` 是你的用户名。这是 Linux 上管理用户的名称。`li1125-199`（或者
    `@` 符号后面的任何内容）是你的机器名称。最后，`~` 告诉你当前所在的目录（对于新程序员，“目录”是“文件夹”的旧称）。`~` 表示用户的“家”目录。


    如果你不熟悉 Linux，有几个命令是值得了解的。

    '
- fmt: '*   `pwd`: This stands for “print working directory.” This tells you what
    directory you are currently working in. If you do this when you first log in,
    it should say `/root`. Linux directories, rather than starting with a drive letter,
    start with a slash (`/`) as the top-level directory. `/root` is the home directory
    for the root user.

    *   `mkdir`: This stands for “make directory.” This creates a new directory inside
    the current directory.

    *   `cd`: This stands for “change directory.” If you give it a directory name,
    it will go to that directory. If you type in the command without any parameters,
    it will take you to your home directory. The command `cd /` will take you to the
    root directory (note that the root directory is a term for the top-level directory,
    not the root user’s directory). If a directory name starts with a slash, the `cd`
    command will assume that it is an absolute path, starting with the root directory.
    If a directory name starts with a tilde (`~`), the `cd` command will interpret
    the path relative to your home directory. Otherwise, it will interpret the path
    as being relative to the current directory.

    *   `ls`: This stands for “list,” which gives you a list of files in the current
    directory. To see the file permissions, add the option `-l` to the command. To
    see hidden files as well, add the option `-a`. Therefore, to see *both* hidden
    files and file permissions, type in `ls -l -a`.

    *   `nano`: Nano is your easy-to-use text editor. If you are going to run machines
    as part of your job, you should also learn `vim` as it will be more efficient
    for you, but that is a more difficult task. Nano is easy to use and will be sufficient
    for getting started. If you want to create a file in the current directory called
    `test.txt`, type in `nano test.txt` and start typing. The key combination control-o
    will save (i.e., output) your file, and control-x will exit.

    *   `systemctl`: This command handles starting and stopping system services on
    certain Linux distributions, including CentOS. You will be introduced to how to
    use it later in this chapter.

    *   `logout`: This exits the current user session. You can also do this by typing
    `exit` or control-d.


    I encourage you to take some time playing around with the commands `mkdir`, `cd`,
    `ls`, and `nano`. Try creating a new directory, going into it, and creating a
    new file there. Then, try logging out, logging back in with `ssh`, finding your
    file, and viewing it. Do this several times until you are completely comfortable
    with the process of logging in, logging out, navigating directories, and editing
    files.


    After you are comfortable making files and directories inside your home directory,
    you should branch out and look around at other directories. You shouldn’t edit
    files there yet (files outside your home directory may mean something important
    to the operating system), but there is no harm in looking around.


    To get started looking around, go to the root directory (`cd /`) and look around
    (`ls`). You will see a number of directories, most of which are documented in
    the Linux Filesystem Hierarchy Standard (see `www.pathname.com/fhs`). Even though
    the Filesystem Hierarchy Standard is a good place for general information about
    what the directories are for, it is no longer strictly adhered to, so don’t be
    surprised by some amount of deviation. However, in short, `/etc` contains server
    configuration information, `/home` contains home directories for users other than
    root, `/usr` contains installed programs, `/opt` contains customized programs
    and other server-specific items, and `/var` contains information that changes
    regularly (e.g., log files, caches, queues, etc.).


    ## 3.3 Updating Your System


    The first thing you should do after your system is up and running is to update
    the server with the latest upgrades and security packages. CentOS uses `yum` to
    manage system software installations. `yum` handles downloading, installing, upgrading,
    removing, and verifying software packages simply and safely. When you ask `yum`
    to install or update a package, it is smart enough to find the package on a remote
    server, verify the package’s authenticity, look up and install any other software
    that the package depends on, and keep track of all installed packages and their
    files. `yum` can only be run by the root user, but so far that is the only user
    we have available.


    The first thing you should do when you have a new server is to update all of its
    installed packages to their latest versions. Fortunately, this is really easy
    with `yum`. Just run the following command:


    ```

    yum -y update

    ```


    This will often download a *very large* number of packages—that’s just fine. CentOS
    is continually fixing bugs and solving security issues in every piece of software
    in the distribution, and so these updates can get large. However, CentOS is also
    very careful to make sure that the revisions that it includes do not include any
    incompatible upgrades. So, by running `yum update`, you are keeping yourself up
    to date, and you are unlikely to accidentally break anything by running it.'
