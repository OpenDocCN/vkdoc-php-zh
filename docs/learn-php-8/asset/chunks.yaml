    \n```\n\";\necho \" table { border: 2px solid #5c744d;}  \";\necho \"\";\necho\
    \ \"日志文件: \" . ERROR_LOG . \"\";\necho \"日期/时间错误类型错误消息\";\nfor ($J=$row_Count;\
    \ $J >= 0; $J--) {\necho \"删除\";\nfor($I=0; $I  \" . $error_Array[$J][$I] . \"\
    \  \";\n}\necho \"\";\n}\necho \"\";\necho \"\";\n} // 主程序段\nconst ERROR_LOG =\
    \ \"Errors.log\";\n$logFile = fopen(ERROR_LOG, \"r\");\n$row_Count = 0;\nwhile(!feof($logFile))\n\
    {\n$error_Array[$row_Count] = explode(' | ', fgets($logFile));\n$row_Count++;\n\
    }\nfclose($logFile);\nif(isset($_GET['rn']))\n{\ndeleteRecord($_GET['rn'], $row_Count,\
    \ $error_Array);\nsaveChanges($row_Count,$error_Array,ERROR_LOG);\n}\ndisplayRecords($row_Count,$error_Array);\n\
    ?>\n```\n\n示例 6-8 `readerrorlog.php`文件\n\n![../images/394210_2_En_6_Chapter/394210_2_En_6_Fig2_HTML.jpg](img/394210_2_En_6_Fig2_HTML.jpg)\n\
    \n图 6-2 包含用户错误的`readerrorlog.php`文件\n\n在示例 6-8 中，`displayRecords`方法包含了之前展示的大部分代码。新增了一些\
    \ CSS 代码，使显示效果更专业。同时，每条记录都附带了一个 HTML `href`链接。该链接会重新调用程序，并传递用户想要删除的记录编号。位于“主程序段”（首先执行的代码行）中的代码集创建了一个常量`ERROR_LOG`，用于定义日志文件的位置和名称。文件的打开和数组的加载方式与之前相同。\n\
    \n数组加载完毕后，程序会检查是否由某条记录的删除链接所调用。如果通过 HTTP `GET`传递了某个值，程序就会调用`deleteRecord`方法。`deleteRecord`方法执行完毕后，程序接着调用`saveChanges`方法。无论程序是否接收到值，它都会执行最后一条语句，即调用`displayRecords`方法。\n\
    \n- **程序说明**——`deleteRecords`方法的方法头（`function deleteRecord($recordNumber, &$row_Count,\
    \ &$error_Array)`）使用了按引用传递而非按值传递，以便在方法中更新`$row_Count`和`$error_Array`。默认情况下，传入方法的参数不能被该方法修改（按值传递）。`&`表示该参数是按引用传递的，这允许参数的值被修改。`deleteRecords`可以调整数组的行数（`$row_Count`）以及数组本身的信息（`$error_Array`）。\n\
    - 按值传递是将参数中包含的内容（数据）传入方法。按引用传递是将参数的内存地址传入方法，这使得方法可以修改参数在内存中的值。\n\n`deleteRecords`方法接受待删除的记录编号作为其参数之一。数组中任何位于此记录编号之上的位置保持不变。任何位于此记录之下的位置都必须向上移动一位。例如，如果一个数组有十个位置（0–9），并且要删除第五个位置（4），那么位置\
    \ 5–9 必须变成位置 4–8。在下面的示例中，对于待删除的`$recordNumber`之后的任何记录，位置`$J+1`被放入位置 J：\n\n![../images/394210_2_En_6_Chapter/394210_2_En_6_Figa_HTML.jpg](img/394210_2_En_6_Figa_HTML.jpg)\n\
    \n数组的最后一个位置不再需要了。数组的最后一个位置被释放（使用`unset`）。这将告知操作系统，该内存空间不再需要。操作系统会调用其垃圾回收器来释放该内存位置。在后续章节讨论关联数组时，我们会发现完成此任务的更简单方法。数组重新配置后，会调用`saveChanges`方法替换日志文件中的记录。显示的代码与本章前面的示例非常相似，只有一个例外。`fopen`方法使用了参数`\"\
    w\"`。`\"w\"`参数会清除文件中已存在的所有内容，并用当前写入文件的内容替换它。在此示例中，文件将被更新（替换）为排除了已删除记录的新记录集。每次调用程序时（无论是否删除了记录），都会调用`displayRecords`方法。此方法显示日志文件的内容。\n\
    \n- **编程说明**——检索在整个程序中都会用到的数据的程序，通常在代码的初始阶段检索信息，并将其放入数据结构（数组、列表或数据集）中。当数据在程序中被更新时，数据结构中的信息也会被更新。数据处理完成后，信息会被送回原始位置（文本文件或数据库）。更新文本文件或数据库通常在程序的最后阶段之一完成。用户退出程序的过程会提供一个事件，指示应保存更新后的数据。\n\
    \n## 动手实践\n\n1.  从本书网站下载示例 6-8 的代码。添加一个`try` catch 块来处理任何意外问题（例如日志文件不存在）。测试并保存你的更改。\n\
    \n2.  调整#1 或本书网站中的示例 6-8 代码，允许用户选择要读取的日志文件。程序应允许用户选择用户日志文件或通用系统日志文件。测试并保存你的更改。\n\
    \n## 章节术语\n\n| 错误 | 异常 |\n| --- | --- |\n| `try/catch` 块 | `$e->getMessage();`\
    \ |\n| `switch` 语句 | 嵌入式 `if` 语句 |\n| 默认代码 | `extends` |\n| 异常类 | 继承 |\n| 子类 |\
    \ 父类 |\n| `trigger_error` | 异常处理层次结构 |\n| 引发（抛出）异常 | 捕获异常 |\n| 代码态度 | 推送错误 |\n\
    | 拉取错误 | 日志文件 |\n| 默认 PHP 错误文件 | `error_log` |\n| `时间戳` | `date.timezone` |\n\
    | 应用程序日志文件 | 常量 |\n| 电子邮件警报 | `display_errors` |\n| 文本文件 | 顺序文件 |\n| `Fopen` |\
    \ `fwrite` |\n| `指针` | `fclose` |\n| `Fgets` | `while` 循环 |\n| `Feof` | `! 运算符`\
    \ |\n| `EngineException` | `explode` |\n| 二维数组 | 行 |\n| 列 | 下标 |\n| 动态数组 | 数组的第一行\
    \ |\n| `print_f` | 递增 |\n| 递减 | `for` 循环 |\n| HTML HREF | `unset` |\n\n## 章节问答与项目\n\
    \n### 选择题\n\n1.  关于 PHP 程序错误，以下哪项是正确的？\n    1.  在 PHP 5.0 之前，它们用于所有异常情况。\n   \
    \ 2.  它们由操作系统处理。\n    3.  它们可能会显示给用户。\n    4.  以上所有选项。\n\n2.  关于 PHP 程序异常，以下哪项是正确的？\n\
    \    1.  在 PHP 5.0 之后，它们用于所有异常情况。\n    2.  它们可以由操作系统处理。\n    3.  它们可能会显示给用户。\n\
    \    4.  以上所有选项。\n\n3.  `try/catch`块用于执行以下哪项操作？\n    1.  捕获所有错误\n    2.  仅捕获已知错误\n\
    \    3.  捕获所有异常\n    4.  仅捕获已知异常\n\n4.  继承具有以下哪项功能？\n    1.  是面向对象编程的一部分\n"
- fmt: "2.  允许子类使用其父类的所有属性\n3.  允许子类创建自己的方法或属性\n4.  以上皆是\n5.  文本文件具备以下哪些特性？\n    1.\
    \  易于在 PHP 中使用\n    2.  比使用数据库更安全\n    3.  是非顺序的\n    4.  以上皆非\n6.  PHP 日志文件具备以下哪些特性？\n\
    \    1.  由`error_log`方法创建\n    2.  由`error_log`方法更新\n    3.  应位于与应用程序不同的目录中\n\
    \    4.  以上皆是\n7.  以下哪项描述的是二维数组？\n    1.  它们类似于 HTML 表格，包含行和列。\n    2.  应不惜一切代价避免使用它们，因为它们效率低下且难以使用。\n\
    \    3.  它们要求所有列在行之前加载数据。\n    4.  以上皆非。\n8.  以下哪项描述的是二维数组的第一个位置？\n    1.  它的下标为\
    \ 0。\n    2.  它的下标为 1。\n    3.  它有一个默认值。\n    4.  以上皆非。\n9.  应用程序日志文件应包含以下哪些内容？\n\
    \    1.  用户日志文件\n    2.  错误日志文件\n    3.  信息性日志文件\n    4.  以上皆是\n10. 因程序异常而生成的电子邮件应执行哪些操作？\n\
    \    1.  包含所有错误信息，包括错误描述\n    2.  包含导致错误的代码行\n    3.  包含错误发生的日期和时间\n    4.  以上皆是\n\
    \n**True/False**\n\n1.  所有异常都应显示给用户。\n2.  当确切知道循环次数时，应使用`for`循环。\n3.  `while`循环将持续循环，直到条件语句变为真。\n\
    4.  可以使用`unset`释放数组中的一个位置。\n5.  所有 PHP 数组在使用前必须声明。\n6.  指针指向对象在内存中所在的位置。\n7. \
    \ `!`运算符将`TRUE`结果反转成`FALSE`结果。\n8.  可以使用`print_f`来显示数组的内容。\n9.  `Try/Catch`块应位于业务规则层和数据层，但不应位于界面层。\n\
    10. 只有程序代码有意抛出的`Exceptions`才应该被捕获。\n\n**Short Answer/Essay**\n\n1.  解释异常处理层次结构如何与三层应用程序协同工作。\n\
    2.  错误和异常之间的区别是什么？\n3.  如果 PHP 提供了错误的时间戳，如何修正时区？\n4.  PHP 程序员如何尝试捕获错误，以便将它们视为异常来处理？\n\
    5.  为什么应用程序生成多个日志文件很重要？\n\n**Projects**\n\n1.  调整第 [4](#394210_2_En_4_Chapter.xhtml)\
    \ 章项目 #1（或 #2）中的代码，以包含异常处理和日志记录。\n2.  创建一个应用程序，为你最喜欢的游戏节目注册参赛者。包括使用 HTML5 和 JavaScript\
    \ 对输入数据进行验证。同时，在数据传递给应用程序时也要进行验证。该应用程序应包含一个接口 PHP 程序（界面层）和一个注册类（业务规则层）。注册类应包括异常处理（包括用户异常和程序异常）。接口程序应使用本章所示的`try/catch`块来处理异常。\n\
    \n**Term Project**\n\n1.  更新 ABC 电脑零件仓库库存应用程序以包含异常处理。该应用程序应尽可能尝试处理所有异常和错误。\n\n\
    用户异常应记录到用户日志中。所有其他异常应记录到系统日志中。如果异常被认为是严重的（将导致程序崩溃），则应向系统管理员发送电子邮件。提示：`Try/Catch`块应仅存在于界面层。\n\
    \n# 7. 数据类\n\n*我是一个理想主义者。我不知道我要去哪里，但我已在路上。——*卡尔·桑德堡*，《偶发事件》(1904)*\n\n## 章节目标\
    \ / 学生学习成果\n\n完成本章后，学生将能够：\n\n*   创建一个用于插入、更新和删除 XML 或 JSON 数据的数据类\n*   解释如何使用\
    \ SQL 脚本创建一个用于更新 MySQL 数据的数据类\n*   创建一个用于生成变更备份日志的 PHP 程序\n*   创建一个能够从先前备份中恢复数据的\
    \ PHP 程序\n*   应用更改以创建最新的有效信息\n*   使用依赖注入将数据类附加到业务规则层的另一个类\n*   创建一个三层 PHP 应用程序\n\
    \n## 数据类\n\n界面层和业务规则层不应存储应用程序信息。这些层甚至不应知道信息的存储方式（文本文件、XML 或数据库）或存储位置。任何需要存储的信息都必须从业务规则层传递到数据层。数据层还负责响应来自业务规则层的信息请求。\n\
    \n这使得界面层和业务规则层无需了解存储方法类型（文本文件、XML 或数据库）或存储项目位置的任何更改。数据层接受的签名（参数）和返回的项目在应用程序的生命周期内应保持不变。只要这些不变，当数据层发生更改时，其他层也应无需更改。\n\
    \n*   *安全与性能——在使用数据库时，在业务规则层构建 SQL 字符串并将该字符串传递给数据层似乎是合理的。但这会在应用程序中造成一个主要的安全漏洞。黑客可以传递任何\
    \ SQL 字符串（包括* *delete* *字符串）。将 SQL 更新命令（DELETE、* *UPDATE 和* *INSERT）传递给数据层似乎也很合理。同样，这也提供了一个主要漏洞。为\
    \ SQL 的* *WHERE* *命令传递数据也是一个坏主意，因为它可能允许黑客删除或更改数据库中任意组合的数据。*\n\n数据类应提供操作信息的完整功能。这包括读取、插入、更新和删除信息的能力。即使当前应用程序不需要所有这些命令，从逻辑上讲，它们也应存在于数据类中以便将来使用。\n\
    \n在性能和存储信息的需求之间应取得平衡。虽然高度重要的信息可能需要立即存储，但其他信息可以保存在应用程序的数据结构（列表、数组、数据集）中，直到用户完成所有更新。在服务器的内存中保存和对信息进行更改，而不是在存储位置进行，效率要高得多。仅在所有更改完成后才存储信息，可以将对存储位置的多次调用减少到两次（初始检索信息和保存更新后的信息）。在内存中对信息进行更改总是比在存储设备（如硬盘驱动器）上进行更改更高效。\n\
    \n然而，当数据发生变化时，可能会发生冲突。应用程序正在对数据进行更改的同时，数据结构中驻留的实时数据可能也正在被更新。有多种方法可以减少或消除冲突的可能性。所需的方法取决于数据的使用频率和更改频率。可以设计锁定机制来限制对当前正在使用的数据的访问。这些技术通常是在数据结构本身内部处理的。对于频繁更改的数据，这些技术是保留有效数据所必需的。本书示例中使用的数据不经常更改。因此，冲突的可能性大大降低。"
