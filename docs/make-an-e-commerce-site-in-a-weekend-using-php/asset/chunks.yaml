    The mesaage you see when the cart is empty


    ## Displaying the Cart Count in the Site Header Using AJAX


    The header of the site looks great (see Figure [4-5](#A978-1-4842-1672-9_4_Chapter.html#Fig5)),
    but something is still missing that is required in an e-commerce site. First,
    the count of the items in the cart, i.e., if the visitor selects a product in
    the cart, a numeric value `1` should appear next to the cart icon in the header
    to indicate that one product is in the cart. The numeric value should keep updating
    when the user adds more products to the cart or removes any products from the
    cart. The second thing that is missing in the header is the e-mail address of
    the signed-in user. That is, if the user is signed into the site, the Login link
    above the cart icon should display a welcome message, along with the visitor’s
    e-mail address. You’ll learn how to add these two things now.


    To display the count of the items selected in the cart and the visitor information
    in the site header, you’ll use AJAX.


    AJAX stands for Asynchronous JavaScript and XML. It is an umbrella term used for
    creating dynamic and highly responsive web pages. Usually, in a web application,
    partial updating of a web page is not possible. For example, when the user prompts
    for some information from the database on the server, the entire web page is refreshed
    to display the fetched information. That is, even if the fetched information is
    meant to be displayed in a small region of the web page, the entire page is reloaded.
    With AJAX, only the region that is supposed to display the fetched information
    is refreshed, which makes it highly responsive.


    Secondly, with AJAX, the data is sent to and accessed from the server in the background.
    This makes it much faster at displaying responses.


    AJAX uses the `XMLHttpRequest` object and JavaScript to communicate with the server
    and to display data on web pages, respectively.


    Note


    Web pages are typically a bit slow at displaying results desired by the users
    because of the round trip process. The round trip process refers to the time taken
    by the request from the client and the response generated by the server. The request
    of desired information is sent from the client to the web server. The web server,
    in return, accesses the required information from the database or processes it
    if required and sends it back to the client. The client reloads the entire web
    page to display the server’s response. Even if the server’s response is supposed
    to be displayed in a small region of the web page, the entire web page is refreshed.
    Whereas in AJAX, a small region of the web page can be refreshed, making it much
    faster at delivering results.


    To display the count of items selected in the cart along with the visitor’s e-mail
    address, the existing `topmenu.php` script is modified to appear as shown in Listing
    [4-3](#A978-1-4842-1672-9_4_Chapter.html#FPar5). Note that only the code in bold
    is new.


