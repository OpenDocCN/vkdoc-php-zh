    \ $apiOutput->data, $user),\n        );\n    }\n}\n```\n\n我们注入了 Symfony 事件分发器服务，并在获取操作结果后，使用\
    \ `dispatch` 方法来触发事件。事件触发后，`OperationSubscriber` 将检测到触发的事件并做出响应。此外，我们将用户初始化为 null\
    \ 值，以避免在将其传递给事件构造函数时出现“未定义变量”错误。\n\n### 结论\n\n本章节结束之际，我们已掌握了如何在后台操作完成后分发事件，从而能够通知用户。在下一章中，我们将实现必要的机制，确保端点只能执行与其上下文相关的操作。\n\
    \n# 4. 上下文特定操作\n\n在前面的章节中，我们已经学习了以下内容：\n\n- 如何创建能够根据请求有效负载内容处理操作的端点\n- 如何保护我们的端点和操作\n\
    - 如何在后台执行操作\n\n在本章中，我们将深入探讨将端点封装在特定上下文中的过程，确保它只能执行为该上下文定义的操作。这种方法不仅增强了我们 API 的安全性和清晰度，而且通过促进关注点的清晰分离，简化了多个控制器的管理。这样做可以精简我们的代码库，使其随着应用程序的发展更易于维护和扩展。\n\
    \n有必要澄清一点，我们不应将保护操作（确保只有特定角色才能执行操作，如第 2 章所述）与端点上下文化的概念混为一谈。基于角色的访问控制主要关注用户权限，而上下文化则根据其指定的上下文限制端点可用的操作。这种区分促进了更有组织性和可维护性的代码结构。这两种策略可以有效地结合使用以增强安全性。例如，“支付”上下文可能只允许与支付相关的操作，其中某些操作限制为特定角色才能执行，从而确保敏感操作仅由授权用户执行。\n\
    \n## 第一节 上下文化端点\n\n在本节中，我们将构建必要的元素，以便能够为端点包裹一个上下文。\n\n### 上下文枚举\n\n首先，我们将创建一个枚举，用于保存上下文以及这些上下文相关的操作。\n\
    \n```\nenum Context\n{\n    case inventoryManagement;\n    case payment;\n   \
    \ case orderManagement;\n\n    public function getAllowedOperations()\n    {\n\
    \        match($this) {\n            self::inventoryManagement => [\n        \
    \        'AddInventoryItem',\n                'UpdateInventoryItem',\n       \
    \         'RemoveInventoryItem',\n                'ListInventoryItems'\n     \
    \       ],\n            self::payment => [\n                'SendPayment',\n \
    \               'RefundPayment',\n                'ChargePayment'\n          \
    \  ],\n            self::orderManagement => [\n                'CreateOrder',\n\
    \                'UpdateOrder',\n                'CancelOrder'\n            ]\n\
    \        };\n    }\n}\n```\n\n上述枚举包含以下情况：\n\n- **inventoryManagement**：表示与库存管理相关的操作的上下文。\n\
    - **payment**：表示与支付相关的操作的上下文。\n- **orderManagement**：表示与订单管理操作的上下文。\n\n`getAllowedOperations`\
    \ 方法返回一个包含该上下文所允许操作的数组。\n\n### OperationContext 属性\n\n在本节中，我们将创建用于为端点包裹上下文的属性。\n\
    \n```\nuse App\\Api\\Context;\n\n#[\\Attribute(\\Attribute::TARGET_METHOD)]\n\
    class OperationContext\n{\n    public function __construct(\n        public readonly\
    \ Context $context\n    ){ }\n}\n```\n\n如你所见，`OperationContext` 属性的构造函数接收一个 `Context`\
    \ 枚举作为参数。这使得我们可以简单地指定上下文，正如我们将在下一节中看到的那样。\n\n### 为端点包裹上下文\n\n在本节中，我们将使用 `OperationContext`\
    \ 属性来指定面向操作的端点上下文。\n\n```\n#[Route('/inventory-management/operation', name: 'api_inventory_management_operation',\
    \ methods: ['POST'])]\n#[OperationContext(Context::inventoryManagement)]\npublic\
    \ function inventoryManagementOperationsAction(#[MapRequestPayload] ApiInput $apiInput):\
    \ JsonResponse\n{\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
    \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n\n#[Route('/payment/operation',\
    \ name: 'api_payment_operation', methods: ['POST'])]\n#[OperationContext(Context::payment)]\n\
    public function paymentOperationsAction(#[MapRequestPayload] ApiInput $apiInput):\
    \ JsonResponse\n{\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
    \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n\n#[Route('/order-management/operation',\
    \ name: 'api_order_management_operation', methods: ['POST'])]\n#[OperationContext(Context::orderManagement)]\n\
    public function orderManagementOperationsAction(#[MapRequestPayload] ApiInput\
    \ $apiInput): JsonResponse\n{\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
    \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n```\n\n\
    如你所见，我们使用了 `OperationContext` 属性来指定每个端点只能执行其上下文允许的操作。\n\n### 结论\n\n在本节中，我们创建了一个\
    \ PHP 枚举，用于集中特定上下文所允许的操作，并实现了一个 `OperationContext` 属性来指定可以在控制器中执行的操作。最后，我们创建了三个不同的端点（每个上下文一个），并使用\
    \ `OperationContext` 属性将它们包裹起来，并将相应的上下文传递给其构造函数。\n\n在下一节中，我们将创建一个专用的订阅者来监听 Symfony\
    \ 的 `KernelController` 事件。该订阅者需要确定所请求的操作执行是否可以被该端点执行。\n\n## 第二节 检测指定上下文中的端点\n\n\
    我们需要一种方法来检测请求是否已路由到指定了上下文的端点，以便检查要执行的操作是否被允许。为了实现这一点，让我们依赖 Symfony 的[控制器内核事件](https://symfony.com/doc/6.4/reference/events.html%23kernel-controller)。\n"
- fmt: "### Listening to the Kernel Controller Event\n\nWe are going to add a method\
    \ in the `KernelSubscriber` class that we created in Chapter [1](#663561_1_En_1_Chapter.xhtml)\
    \ to listen to the controller event.\n\n#### An Exception for Informing About\
    \ Context Invalid Operations\n\nBefore coding the event-associated subscriber,\
    \ let’s write the exception that will be thrown when the operation cannot be performed.\n\
    \n```\nuse Symfony\\Component\\HttpKernel\\Attribute\\WithHttpStatus;\n#[WithHttpStatus(403)]\n\
    class InvalidContextForOperationException extends \\RuntimeException\n{\n    public\
    \ function __construct(string $context, string $operation, int $code = 403, ?\\\
    Throwable $previous = null)\n    {\n        $msg = sprintf('Operation %s does\
    \ not belong to context %s', $operation, $context);\n        parent::__construct($msg,\
    \ $code, $previous);\n    }\n}\n```\n\nThe above exception extends the PHP `RuntimeException`.\
    \ The `WithHttpStatus` attribute is responsible for the HTTP response that will\
    \ be sent to the client when the exception is thrown, while the `$code` variable\
    \ refers to the error code of the exception itself. In this specific case, both\
    \ are set to 403, but they could be different if desired. We use a 403 Access\
    \ Denied exception because we are denying access to the execution of an operation,\
    \ although for different reasons than when we did it in Chapter [3](#663561_1_En_3_Chapter.xhtml)\
    \ when we used the Symfony voters.\n\n#### The Kernel-Controller Subscriber\n\n\
    Now that we have an exception to report context errors, let’s finally code the\
    \ kernel-controller subscriber.\n\n```\npublic function onKernelController(ControllerEvent\
    \ $event): void\n{\n    $controllerAttributes = $event->getAttributes();\n   \
    \ $operationContextAttributes = $controllerAttributes[OperationContext::class]\
    \ ?? null;\n    if(count($operationContextAttributes) > 0) {\n        $operationContextAttribute\
    \ = $operationContextAttributes[0];\n        $apiInput = $this->validationHandler->deserializeAndValidate($event->getRequest()->getContent(),\
    \ ApiInput::class, null);\n        if(!in_array($apiInput->operation, $operationContextAttribute->context->getAllowedOperations()))\
    \ {\n            throw new InvalidContextForOperationException($operationContextAttribute->context->name,\
    \ $apiInput->operation);\n        }\n    }\n}\n```\n\nThe above listener works\
    \ as follows:\n\n- It checks whether the event-associated controller is annotated\
    \ with the `OperationContext` attribute.\n- If the controller is wrapped with\
    \ that attribute, it checks whether the operation can be executed using the `getAllowedOperations`\
    \ method of the `Context` enum. If not, it throws an `InvalidContextForOperationException`\
    \ to inform about the error.\n\n#### Checking for an `InvalidContextForOperationException`\
    \ in the `KernelSubscriber`\n\nAs we have done with all exceptions so far, we\
    \ must instruct the `KernelSubscriber` subscriber so that it can detect this exception\
    \ and format the message as JSON.\n\n```\nif($exception instanceof InvalidContextForOperationException){\n\
    \    $event->setResponse(new JsonResponse([\n        'errors' => [\n         \
    \   'operation_endpoint_context' => $exception->getMessage()\n        ]\n    ],\
    \ 400));\n}\n```\n\nAs you can see, we have only added another condition for the\
    \ `InvalidContextForOperationException`.\n\n### Conclusion\n\nAgain, we have resorted\
    \ to Symfony’s event system to capture the controller requests. This way, we can\
    \ check whether the controller method is decorated with the `OperationContext`\
    \ attribute and, if so, ensure that the context allows the requested operation\
    \ execution.\n\nIn the next chapter, we will create the necessary application\
    \ tests to ensure that our API behaves as expected.\n\n# 5. Testing the API\n\n\
    Having constructed and secured our operation-oriented API, it’s crucial to solidify\
    \ its functionality and ensure it behaves as intended. This final chapter will\
    \ show you how to use Symfony application tests to check the API works as expected.\n\
    \n## Section 1. Creating the Test Class\n\nThe Symfony Test Pack component allows\
    \ us to easily create a test class by using the Symfony maker, so let’s use it\
    \ to automatically generate the test class.\n\n```\nbin/console make:test\n```\n\
    \nAfter executing the above command, it will require you to enter some input to\
    \ create the test class:\n\n- **The test type you want to generate**: Choose the\
    \ `WebTestCase` type.\n- **The name of the class**: Write the name you want.\n\
    \nAfter it is finished, it will generate the test class in the `/tests/` directory\
    \ at the root of the project typically as `tests/Controller/ApiControllerTest.php`.\
    \ If we open the test class, we will see something like this:\n\n```\nnamespace\
    \ App\\Tests;\nuse Symfony\\Bundle\\FrameworkBundle\\Test\\WebTestCase;\nclass\
    \ ApiControllerTest extends WebTestCase\n{\n    public function testSomething():\
    \ void\n    {\n        $client = static::createClient();\n        $crawler = $client->request('GET',\
    \ '/');\n        $this->assertResponseIsSuccessful();\n        $this->assertSelectorTextContains('h1',\
    \ 'Hello World');\n    }\n}\n```\n\nThe class contains an example test (`testSomething`).\
    \ Let’s examine its content line by line:\n\n1. Creates a client instance so we\
    \ can make requests\n2. Executes a GET request to the URL\n3. Checks that the\
    \ response status code is in the 200–299 range\n4. Checks whether the `h1` selector\
    \ contains the \"Hello World\" text\n\nThis is only a template. If you run the\
    \ test as is, it will fail because the \"/\" route and the expected HTML content\
    \ (`<h1>Hello World</h1>`) do not exist in the application yet.\n\nLet’s write\
    \ our tests in the next section.\n\n### Conclusion\n\nIn this section, we explored\
    \ how to create a test class using the Symfony Test Pack component with the help\
    \ of the Symfony maker. By executing the command `bin/console make:test`, we can\
    \ easily generate a template for our test class, which includes a basic example\
    \ test. In the next section, we are going to fill the test class with a set of\
    \ tests so that we can cover the maximum number of use cases possible.\n\n## Section\
    \ 2. The API Tests\n\nThe following sections show a bunch of tests which test\
    \ a specific case of use.\n\n- To be able to send our custom HTTP headers, specifically\
    \ the authentication token, we must prefix the header keys with the `HTTP_` string.\n\
    \nWhen creating your own tests, you should use your User fixtures authentication\
    \ tokens to authenticate against the API.\n\n### Test a Successful Operation Execution\n\
    \nThis test checks that an operation is performed successfully.\n\n```\npublic\
    \ function testOperationSuccess(): void\n{\n    $client = static::createClient();\n\
    \    $client->request('POST', '/api/v1/operation', [], [], [\n        'HTTP_X-AUTH-TOKEN'\
    \ => 'fYDg7nMhlvxAtL7KfBnS',\n        'HTTP_Content-Type' => 'application/json'\n\
    \    ], json_encode([\n        'operation' => 'SendPayment',\n        'data' =>\
    \ [\n            'amount' => 13.69,\n            'receiver' => 'hghgfyyfg'\n \
    \       ]\n    ]));\n    $this->assertResponseStatusCodeSame(200);\n}\n```\n\n\
    The test sends an existing token, the operation payload contains an existing operation,\
    \ and the required parameters are valid so that the test should return a `200\
