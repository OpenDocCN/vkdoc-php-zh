    出于某些非常奇怪的原因，我们决定在互联网上搜索“绿色猫”。当我们把字符串输入到最常用的搜索引擎（本例中为 Google）并点击搜索按钮时，信息会被传送到某个地方的
    Google 服务器集群。在哪里？谁知道呢，可能在地球上的任何地方。但互联网的力量在于，只要我们能够快速得到结果，我们就不在乎具体位置。好吧，我得说，看到有
    8.83 亿个关于绿色猫的可能链接，我感到非常惊讶。哇，这个数字在 2014 年还只有 1 亿多。也许我们应该再过滤一下。然而，关键在于，Google 返回了一个网页，其中列出了链接以及这些链接的描述（外加广告）。Google
    返回的是一个已经存在的*静态*页面吗？不。服务器是根据用户的请求创建了一个*动态*页面。Google 的算法（软件）搜索了庞大的 Google 数据库集群。请求首先从用户的浏览器发送到
    Google 的 Web 服务器。然后，Web 服务器向 Google 数据库（实际上使用的是类似于 SQL 的 Google 查询语言）发送请求，以返回关于“绿色猫”的信息。接着，Web
    服务器上的软件编译结果，添加 HTML 和 JavaScript（以及一些 Google 脚本语言代码）来格式化结果页面，最后将信息返回给用户。


    -   **静态网页与动态网页** —— 静态网页不会根据用户请求或输入而改变。该页面由 Web 开发人员创建并驻留在 Web 服务器上。当用户通过浏览器请求该页面时，页面的副本会被发送到浏览器进行显示。动态页面不存在于
    Web 服务器中。该页面是利用用户的输入创建的。驻留在 Web 服务器上的程序会创建并格式化页面。程序创建的页面随后会被下载到用户的浏览器中。（通常）不会在
    Web 服务器上保留该页面的副本。有关静态网页的更多信息，请访问 [`en.wikipedia.org/wiki/Static_web_page`](http://en.wikipedia.org/wiki/Static_web_page)。有关动态网页的更多信息，请访问
    [`en.wikipedia.org/wiki/Dynamic_web_page`](http://en.wikipedia.org/wiki/Dynamic_web_page)。


    是否每个页面都被下载到了用户的 Web 浏览器？不，只有第一页。第一页结果底部的页面链接会将信息返回给 Web 服务器，请求下一组信息（以便动态创建第二页或其他请求的页面）。你可能已经开始意识到，我们刚才讨论的关于在互联网上处理
    PHP 文件的相同过程，是创建动态页面的一种非常常见的过程。你可能已经注意到结果页面的 URL 地址有些有趣的地方。这个地址是 `www.google.com/search?source=hp&ei=KQ2KXtaJOOW3ggeY9IWQBw&q=green+cats&oq=green+cats&gs_lcp=CgZwc3ktYWIQAzICCAAyAggAMgIIADICCAAyAggAMgIIADICCAAyAggAMgIIADICCAA6BQgAEIMBSioIFxImMGcxMTRnMTAyZzk2ZzEwMGcxMjFnMTA3Zzk3ZzExNmcxMDNnOTBKGQgYEhUwZzFnMWcxZzFnMWcxZzFnMWcxZzFQr01Y93Bgv-AHaAJwAHgAgAFliAG3BpIBAzkuMZgBAKABAaoBB2d3cy13aXo&sclient=psy-ab&ved=0ahUKEwiWwvP639HoAhXlm-AKHRh6AXIQ4dUDCAg&uact=5`，而不是
    `www.google.com`。Google 算法在向服务器发送搜索请求时使用 *GET HTTP 请求*。


    -   **HTTP —— 超文本传输协议**是在互联网上的节点（计算机和服务器）之间传输消息（文本和网页）的协议（标准）。它是一种请求-响应协议。例如，用户通过浏览器“请求”一个网页。Web
    服务器“响应”该请求并将页面返回给浏览器。浏览器将请求转换为一个 HTTP GET 请求（例如 `GET /pages/mypage.html HTTP/3`），发送给
    Web 服务器。Web 服务器则返回所请求的信息以及一个状态码（例如 `HTTP/3 200 OK`）。有关 HTTP 的更多信息，请访问 [`en.wikipedia.org/wiki/Hypertext_Transfer_Protocol#Request_methods`](http://en.wikipedia.org/wiki/Hypertext_Transfer_Protocol%2523Request_methods)。


    ```

    Name:

    ```


    让我们看一个更简单的例子来了解发生了什么。假设上述代码保存在本地主机网站的 `projects` 文件夹下的 `index.html` 文件中。如果用户在浏览器显示的文本框中输入
    `Fred`，结果页面（通过解释并执行 Web 服务器上的 `searchprocess.php` 文件，并将结果发送回浏览器而创建）将显示 URL 行：


    ```

    http://127.0.0.1/projects/searchprocess.php?customername=Fred.

    ```

