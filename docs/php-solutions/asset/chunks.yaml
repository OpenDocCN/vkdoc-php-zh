    # 独立组件还是一体化集成包？


    多年来，我一直主张分别安装 PHP 测试环境的各个组件，而不推荐使用一次性安装 Apache、PHP、MySQL 和 phpMyAdmin 的集成包。我的建议基于早期一些集成包的品质问题，它们安装简单但几乎无法卸载或升级。不过，目前市面上的集成包质量极佳，我现在毫不犹豫地推荐使用它们。


    在我的电脑上，Windows 系统使用 `XAMPP`（[www.apachefriends.org/index.html](http://www.apachefriends.org/index.html)），Mac
    OS X 系统使用 `MAMP`（[www.mamp.info/en/](http://www.mamp.info/en/)）。其他集成包也可用，选择哪个并不重要。


    **提示**


    使用集成包搭建 PHP 测试环境通常毫无问题。主要困难在于与使用端口 80 的其他程序发生冲突，该端口是 Web 服务器用于监听页面请求的。如果安装了 Skype，请进入
    **工具** ➤ **选项** ➤ **高级** ➤ **连接**，确保端口 80 未被用于传入连接。可改用端口 33087。


    ## 在 Windows 上搭建环境


    在继续操作前，请确保以管理员身份登录。


    ### 让 Windows 显示文件扩展名


    默认情况下，大多数 Windows 计算机会隐藏文件扩展名（如 `.doc` 或 `.html`），因此在对话框和 Windows 文件资源管理器中只能看到
    `thisfile`，而非 `thisfile.doc` 或 `thisfile.html`。Windows 8 会显示 PHP 文件的扩展名，但建议对所有文件开启扩展名显示。在
    Windows 7 中，这是使用 PHP 必备操作。


    按以下步骤在 Windows 8 中启用文件扩展名显示：


    - 打开文件资源管理器。

    - 选择 **查看** 以展开文件资源管理器窗口顶部的功能区。

    - 勾选“文件扩展名”复选框。


    在 Windows 7 中按以下步骤操作：


    - 打开 **开始** ➤ **计算机**。

    - 选择 **组织** ➤ **文件夹和搜索选项**。

    - 在打开的对话框中选择 **查看** 选项卡。

    - 在 **高级设置** 部分，取消勾选“隐藏已知文件类型的扩展名”。

    - 点击 **确定**。


    显示文件扩展名更安全——你可以识别病毒编写者是否将 `.exe` 或 `.scr` 可执行文件附加在看似无害的文档上。


    ### 选择 Web 服务器


    大多数 PHP 安装运行在 Apache Web 服务器上。两者均为开源且协同良好。不过，Windows 自带 Web 服务器 Internet Information
    Services（IIS），也支持 PHP。微软与 PHP 开发团队密切合作，将 PHP 在 IIS 上的性能提升至与 Apache 大致相当。那么，该如何选择？


    答案取决于你是否使用 ASP 或 ASP.NET 开发网页，或计划这样做。ASP 和 ASP.NET 需要 IIS。你可以将 Apache 与 IIS 安装在同一台电脑上，但两者都监听端口
    80 的请求。无法在同一端口上同时运行两个服务器。


    除非你需要 IIS 用于 ASP 或 ASP.NET，否则我建议使用 `XAMPP` 或其他集成包安装 Apache，详见下一节。如果需要使用 IIS，最便捷的方式是通过
    Microsoft Web Platform Installer（Web PI）安装 PHP，可从 [www.microsoft.com/web/downloads/platform.aspx](http://www.microsoft.com/web/downloads/platform.aspx)
    下载。


    ### 在 Windows 上安装集成包


    Windows 上有三种流行的集成包可在一次操作中安装 Apache、PHP、MySQL、phpMyAdmin 及其他工具：`XAMPP`（[www.apachefriends.org/index.html](http://www.apachefriends.org/index.html)）、`WampServer`（[www.wampserver.com/en/](http://www.wampserver.com/en/)）和
    `EasyPHP`（[www.easyphp.org](http://www.easyphp.org/)）。安装过程通常只需几分钟。安装完成后，你可能需要更改一些设置，本章后续将说明。


    印刷书籍出版周期内版本可能发生变化，因此我不描述具体安装流程。每个包在其网站上均有说明。David Gassner 在 lynda.com 上的《安装 Apache、MySQL
    和 PHP》课程中也有关于 `WampServer` 和 `XAMPP` 设置的有用视频。尽管 lynda.com 是订阅服务，但在撰写本文时，该课程的所有视频即使非订阅用户也可免费观看（[www.lynda.com/Apache-HTTP-Server-tutorials/Installing-Apache-MySQL-PHP/77958-2.html](http://www.lynda.com/Apache-HTTP-Server-tutorials/Installing-Apache-MySQL-PHP/77958-2.html)）。


    ## 在 Mac OS X 上搭建环境


    Apache Web 服务器和 PHP 已预装在 Mac OS X 上，但默认未启用。我建议使用 `MAMP` 而非预装版本，它可一次性安装 Apache、PHP、MySQL、phpMyAdmin
    及其他工具。


    为避免与预装的 Apache 和 PHP 版本冲突，`MAMP` 将所有应用程序存放在硬盘的专用文件夹中。这样，如果决定不再需要 `MAMP`，只需将 `MAMP`
    文件夹拖入废纸篓即可轻松卸载所有内容。


    ### 安装 MAMP


    开始前，请确保以管理员权限登录电脑。


    1. 访问 [www.mamp.info/en/downloads/](http://www.mamp.info/en/downloads/)，选择 **MAMP
    & MAMP PRO** 的链接。这将下载包含 `MAMP` 免费版和付费版的磁盘映像。

    2. 下载完成后，启动磁盘映像。你将看到许可协议。必须点击 **同意** 才能继续挂载磁盘映像。

    3. 按照屏幕指示操作。

    4. 确认 `MAMP` 已安装在 **应用程序** 文件夹中。


    **注意**


    `MAMP` 会自动将免费版和付费版分别安装在名为 `MAMP` 和 `MAMP PRO` 的独立文件夹中。付费版更便于配置 PHP 和处理虚拟主机，但免费版完全够用，尤其适合初学者。如需删除
    `MAMP PRO` 文件夹，请勿直接拖入废纸篓。请打开文件夹并双击 `MAMP PRO` 卸载图标。付费版需要保留两个文件夹。

    '
- fmt: '### Testing and Configuring MAMP


    By default, MAMP uses nonstandard ports for Apache and MySQL. Unless you’re using
    multiple installations of Apache and MySQL, you should change the port settings.


    Double-click the MAMP icon in `Applications/MAMP`. Your default browser should
    launch and present you with the MAMP welcome page. Note that the URL in the browser
    address bar begins with `localhost:8888`. The `:8888` indicates that Apache is
    listening for requests on the nonstandard port 8888.


    Minimize the browser and locate the MAMP control panel (see Figure [2-1](#A978-1-4842-0635-5_2_Chapter.html#Fig1)),
    which should be running on your desktop. The tiny green lights to the right of
    Apache Server and MySQL Server indicate that both servers are running.


    Click the Preferences icon and select Ports at the top of the panel that opens.
    It shows that Apache and MySQL are running on ports 8888 and 8889 (see Figure
    [2-2](#A978-1-4842-0635-5_2_Chapter.html#Fig2)).


    ![A978-1-4842-0635-5_2_Fig1_HTML.jpg](A978-1-4842-0635-5_2_Fig1_HTML.jpg)


    Figure 2-1. The MAMP control panel


    Click "Set Web & MySQL ports to 80 & 3306" as shown in Figure [2-2](#A978-1-4842-0635-5_2_Chapter.html#Fig2).
    The numbers change to the standard ports: 80 for Apache and 3306 for MySQL.


    ![A978-1-4842-0635-5_2_Fig2_HTML.jpg](A978-1-4842-0635-5_2_Fig2_HTML.jpg)


    Figure 2-2. Changing the Apache and MySQL ports


    > **Note:** MAMP now supports Nginx as an alternative web server. When I clicked
    "Set Web & MySQL ports to 80 & 3306," both Apache Port and Nginx Port changed
    to 80, which prevented the settings from being accepted. If this happens, manually
    reset Nginx Port to 7888.


    Click OK and enter your Mac password when prompted. MAMP restarts both servers.


    > **Tip:** If any other program is using port 80, Apache won''t restart. If you
    can''t find what''s preventing Apache from using port 80, open the MAMP preferences
    panel and click "Set MAMP ports to default."


    When both lights are green again, click "Open start page" in the MAMP Control
    Panel. This reloads the MAMP welcome page into your browser. This time, the URL
    shouldn’t have a colon followed by a number appearing after `localhost` because
    Apache is now listening on the default port.


    ## Where to Locate Your PHP Files (Windows & Mac)


    You need to create your files in a location where the web server can process them.
    Normally, this means that the files should be in the server’s document root or
    in a subfolder of the document root. The default location of the document root
    for the most common setups is as follows:


    *   XAMPP: `C:\xampp\htdocs`

    *   WampServer: `C:\wamp\www`

    *   EasyPHP: `C:\EasyPHP\www`

    *   IIS: `C:\inetpub\wwwroot`

    *   MAMP: `Macintosh HD:Applications:MAMP:htdocs`


    To view a PHP page, you need to load it in a browser using a URL. The URL for
    the web server’s document root in your local testing environment is `http://localhost/`.


    > **Caution:** If you needed to reset MAMP back to its default ports, you will
    need to use `http://localhost:8888` instead of `http://localhost`.


    If you store the files for this book in a subfolder of the document root called
    `phpsols`, the URL is `http://localhost/phpsols/` followed by the name of the
    folder (if any) and file.


    > **Tip:** Use `http://127.0.0.1/` if you have problems with `http://localhost/`.
    `127.0.0.1` is the loopback IP address all computers use to refer to the local
    machine.


    ### Using Virtual Hosts


    The alternative to storing your PHP files in the web server’s document root is
    to use a virtual host. A virtual host creates a unique address for each site and
    is how hosting companies manage shared hosting. MAMP PRO simplifies setting up
    virtual hosts through its control panel. EasyPHP also has a plug-in module for
    administering virtual hosts.


    Manually setting up virtual hosts involves editing one of your computer’s system
    files to register the host name on your local machine. You also need to tell the
    web server in your local testing environment where the files are located. The
    process isn’t difficult, but it needs to be done each time you set up a new virtual
    host.


    The advantage of setting up each site in a virtual host is that it matches more
    accurately the structure of a live website. However, when learning PHP, it’s probably
    more convenient to use a subfolder of your testing server’s document root. Once
    you have gained experience with PHP, you can advance to using virtual hosts. Instructions
    for manually setting up virtual hosts in Apache are on my website at the following
    addresses:


    *   Windows: `http://foundationphp.com/tutorials/apache_vhosts.php`

    *   MAMP: `http://foundationphp.com/tutorials/vhosts_mamp.php`


    > **Tip:** Remember to start the web server in your testing environment to view
    PHP pages.


    ## Checking Your PHP Settings


    After installing PHP, it’s a good idea to check its configuration settings. In
    addition to the core features, PHP has a large number of optional extensions.
    Both the all-in-one packages and the Microsoft Web PI install all the extensions
    that you need for this book. However, some of the basic configuration settings
    might be slightly different. To avoid unexpected problems, adjust your PHP configuration
    to match the settings recommended in the following pages.'
