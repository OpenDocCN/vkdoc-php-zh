  trans: "\n在`usort()`、`uasort()` 和 `uksort()` 中使用的回调比较函数必须接受两个参数，并返回一个小于、等于或大于零的整数，具体取决于第一个参数是小于、等于还是大于第二个参数。PHP\
    \ Solution 8-5 展示了如何使用 PHP 7 太空船操作符实现这一点。\n\n## PHP Solution 8-5：使用太空船操作符进行自定义排序\n\
    \n表 8-2 中的前八个排序函数在处理大部分排序操作时表现出色。然而，它们无法涵盖所有场景。这时，自定义排序函数就派上了用场。本 PHP 解决方案展示了\
    \ PHP 7 太空船操作符如何简化自定义排序。\n\n1.  打开 `ch08` 文件夹中的 `spaceship_01.php`。其中包含一个音乐播放列表的多维数组以及一个将其显示为无序列表的循环：\n\
    \n    ```php\n    $playlist = [\n        ['artist' => 'Jethro Tull', 'track' =>\
    \ 'Locomotive Breath'],\n        ['artist' => 'Dire Straits', 'track' => 'Telegraph\
    \ Road'],\n        ['artist' => 'Mumford and Sons', 'track' => 'Broad-Shouldered\
    \ Beasts'],\n        ['artist' => 'Ed Sheeran', 'track' => 'Nancy Mulligan'],\n\
    \        ['artist' => 'Dire Straits', 'track' => 'Sultans of Swing'],\n      \
    \  ['artist' => 'Jethro Tull', 'track' => 'Aqualung'],\n        ['artist' => 'Mumford\
    \ and Sons', 'track' => 'Thistles and Weeds'],\n        ['artist' => 'Ed Sheeran',\
    \ 'track' => 'Eraser']\n    ];\n    echo '';\n    foreach ($playlist as $item)\
    \ {\n        echo \"{$item['artist']}: {$item['track']}\";\n    }\n    echo '';\n\
    \    ```\n\n2.  在循环之前插入一行，使用 `asort()` 对数组进行排序：\n\n    ```php\n    asort($playlist);\n\
    \    ```\n\n3.  保存文件，并将其加载到浏览器中。如图 8-1 所示，`asort()` 不仅按字母顺序对艺术家进行了排序；与每位艺术家关联的曲目也按字母顺序排列了。\n\
    \n    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig1_HTML.jpg](img/332054_4_En_8_Fig1_HTML.jpg)\n\
    \n    **图 8-1.** `asort()` 函数轻松完成了多维关联数组值的排序工作。\n\n4.  然而，假设你想按曲目名称的字母顺序对播放列表进行排序。为此，你需要一个自定义排序。将你在步骤\
    \ 2 中插入的代码行替换为以下内容：\n\n    ```php\n    usort($playlist, function ($a, $b) {\n\
    \        return $a['track'] <=> $b['track'];\n    });\n    ```\n\n    这使用了 `usort()`\
    \ 函数以及一个匿名回调函数。回调函数的两个参数（`$a` 和 `$b`）代表你想要比较的两个数组元素。在函数体内，当前曲目元素的值使用 PHP 7 太空船操作符进行比较，该操作符返回一个小于、等于或大于零的整数，具体取决于左操作数是小于、等于还是大于右操作数。回调函数返回比较结果。\n\
    \n5.  为了使自定义排序的结果更清晰，调换每个列表项中显示的艺术家和曲目的顺序：\n\n    ```php\n    echo \"{$item['track']}:\
    \ {$item['artist']}\";\n    ```\n\n6.  保存文件并在浏览器中重新加载。曲目现在按字母顺序列出（见图 8-2）。\n\n\
    \    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig2_HTML.jpg](img/332054_4_En_8_Fig2_HTML.jpg)\n\
    \n    **图 8-2.** 播放列表现已按曲目名称的字母顺序排序。\n\n7.  要反转自定义排序的顺序，交换太空船操作符两侧操作数的顺序：\n\n\
    \    ```php\n    usort($playlist, function ($a, $b) {\n        return $b['track']\
    \ <=> $a['track'];\n    });\n    ```\n\n8.  你可以将代码与 `ch08` 文件夹中的 `spaceship_02.php`\
    \ 进行核对。\n\n## 使用 `array_multisort()` 进行复杂排序\n\n`array_multisort()` 函数有两个用途，即：\n\
    \n*   排序多个需要保持同步的数组\n*   按一个或多个维度对多维数组进行排序\n\n`multisort_01.php` 中的代码包含一个在重新排序时需要保持同步的数组示例。`$states`\
    \ 数组按字母顺序列出各州，而 `$population` 数组包含以相同顺序列出的每个州的人口数据：\n\n```php\n$states = ['Arizona',\
    \ 'California', 'Colorado', 'Florida', 'Maryland', 'New York', 'Vermont'];\n$population\
    \ = [7171646, 39557045, 5695564, 21299325, 6042718, 19542209, 626299];\n```\n\n\
    然后，一个循环显示每个州的名称及其人口：\n\n```php\necho '';\nfor ($i = 0, $len = count($states);\
    \ $i < $len; $i++) {\n    echo \"<li>$states[$i]: $population[$i]</li>\";\n}\n\
    echo '';\n```\n\n图 8-3 显示了输出结果。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig3_HTML.jpg](img/332054_4_En_8_Fig3_HTML.jpg)\n\
    \n**图 8-3.** 尽管州和人口数据在不同的数组中，但它们的顺序是正确的。\n\n然而，如果你想要按升序或降序对人口数据重新排序，则两个数组需要保持同步。\n\
    \n`multisort_02.php` 中的代码展示了如何使用 `array_multisort()` 实现这一点：\n\n```php\narray_multisort($population,\
    \ SORT_ASC, $states);\n```\n\n`array_multisort()` 的第一个参数是你要首先排序的数组。其后可以跟两个可选参数：使用常量\
    \ `SORT_ASC` 或 `SORT_DESC` 分别指定升序和降序的排序方向，以及使用表 8-3 中列出的常量之一指定排序类型。其余参数是你要与第一个数组同步排序的其他数组。每个后续数组后面也可以跟上用于排序方向和类型的可选参数。\n\
    \n在此示例中，`$population` 数组按升序排序，`$states` 数组与之同步重新排序。如图 8-4 所示，人口数据与州名称之间的正确关系得以保持。\n\
    \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig4_HTML.jpg](img/332054_4_En_8_Fig4_HTML.jpg)\n\
    \n**图 8-4.** 人口数字现在按升序排列，并与之保持了正确的州名称。\n\n下一个 PHP 解决方案展示了一个使用 `array_multisort()`\
    \ 按多个维度对多维数组进行重新排序的示例。\n\n## PHP Solution 8-6：使用 `array_multisort()` 排序多维数组\n\n\
    在前一个 PHP 解决方案中，我们使用了太空船操作符通过比较分配给单个键的值来自定义排序多维数组。在本解决方案中，我们将使用 `array_multisort()`\
    \ 来执行更复杂的排序操作。\n\n1.  `multisort_03.php` 中的代码包含了来自 PHP Solution 8-5 的 `$playlist`\
    \ 多维数组的更新版本。每个子数组中都添加了一个评级（rating）键，如下所示：\n\n    ```php\n    $playlist = [\n \
    \       ['artist' => 'Jethro Tull', 'track' => 'Locomotive Breath', 'rating' =>\
    \ 8],\n        ['artist' => 'Dire Straits', 'track' => 'Telegraph Road', 'rating'\
    \ => 7],\n        ['artist' => 'Mumford and Sons', 'track' => 'Broad-Shouldered\
    \ Beasts', 'rating' => 9],\n        ['artist' => 'Ed Sheeran', 'track' => 'Nancy\
    \ Mulligan', 'rating' => 10],\n        ['artist' => 'Dire Straits', 'track' =>\
    \ 'Sultans of Swing', 'rating' => 9],\n        ['artist' => 'Jethro Tull', 'track'\
    \ => 'Aqualung', 'rating' => 10],\n        ['artist' => 'Mumford and Sons', 'track'\
    \ => 'Thistles and Weeds', 'rating' => 6],\n        ['artist' => 'Ed Sheeran',\
    \ 'track' => 'Eraser', 'rating' => 8]\n    ];\n    ```\n\n2.  正如之前的解决方案所展示的，使用\
    \ `usort()` 和太空船操作符按曲目名称的字母顺序对数组排序很容易。我们也可以按评级对数组排序；但同时按评级和曲目排序则需要不同的方法。\n"
- fmt: "# Sorting a Multidimensional Array by Multiple Criteria\n\nThe first step\
    \ to sorting a multidimensional array by multiple criteria is to extract into\
    \ separate arrays the values to be sorted. This is easily done using the `array_column()`\
    \ function, which takes two arguments: the top-level array and the key you want\
    \ to extract from each subarray. Add the following code after the `$playlist`\
    \ array (it’s in `multisort_04.php`):\n\n```\n$tracks = array_column($playlist,\
    \ 'track');\n$ratings = array_column($playlist, 'rating');\nprint_r($tracks);\n\
    print_r($ratings);\n```\n\n3. Save the file and test it in a browser. As Figure\
    \ [8-5](#332054_4_En_8_Chapter.xhtml#Fig5) shows, the values from the multidimensional\
    \ array have been extracted to two indexed arrays.\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig5_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fig5_HTML.jpg)\n\
    \n**Figure 8-5.** The values needed for sorting have been extracted to separate\
    \ indexed arrays\n\n4. We don’t need to inspect the contents of the `$tracks`\
    \ and `$ratings` arrays any more, so comment out or delete the two calls to `print_r()`.\n\
    \n5. We can now use `array_multisort()` to sort the multidimensional array. The\
    \ order of arguments passed to the function determines the priority that’s assigned\
    \ to the final sort. I want the playlist to be sorted by ratings in descending\
    \ order, and then by tracks alphabetically. So, the first argument needs to be\
    \ the `$ratings` array, followed by the sort direction; then the `$tracks` array,\
    \ followed by the sort direction; and finally, `$playlist`, the multidimensional\
    \ array.\n\nAdd the following code to the bottom of the script:\n\n```\narray_multisort($ratings,\
    \ SORT_DESC, $tracks, SORT_ASC, $playlist);\n```\n\n6. The multidimensional array\
    \ has now been resorted from the highest to the lowest ratings, with equally rated\
    \ tracks in alphabetical order. We can verify that by looping through the `$playlist`\
    \ array like this (the code is in `multisort_05.php`):\n\n```\necho '<ul>';\n\
    foreach ($playlist as $item) {\n    echo \"<li>{$item['rating']} {$item['track']}\
    \ by {$item['artist']}</li>\";\n}\necho '</ul>';\n```\n\nFigure [8-6](#332054_4_En_8_Chapter.xhtml#Fig6)\
    \ shows proof that it worked.\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig6_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fig6_HTML.jpg)\n\
    \n**Figure 8-6.** The multidimensional array has been sorted by multiple criteria\n\
    \n> **Note:** In the preceding PHP solution, `array_column()` was used with associative\
    \ subarrays, so the second argument was a string containing the key of values\
    \ we wanted to extract. The function is also capable of extracting values from\
    \ indexed subarrays. Just pass the index of the values you want to extract as\
    \ the second argument. You’ll see a practical example in PHP Solution 9-6 “Adapting\
    \ the class to handle multiple uploads” in the next chapter.\n\n# PHP Solution\
    \ 8-7: Finding All Permutations of an Array\n\nThis PHP solution is adapted from\
    \ Python. It uses the `array_slice()` and `array_merge()` functions inside a recursive\
    \ generator (see “Generators—a special type of function that keeps on giving”\
    \ in Chapter [4](#332054_4_En_4_Chapter.xhtml)) to pull an array apart and merge\
    \ back the elements in a different order. It’s recursive because the generator\
    \ calls itself repeatedly until it gets to the end of elements to process.\n\n\
    1. The definition of the generator looks like this (the code is in `permutations.php`\
    \ in the `ch08` folder):\n\n```\nfunction permutations(array $elements) {\n  \
    \  $len = count($elements);\n    if ($len <= 1) {\n        yield $elements;\n\
    \    } else {\n        foreach(permutations(array_slice($elements, 1)) as $permutation)\
    \ {\n            foreach(range(0, $len - 1) as $i) {\n                yield array_merge(\n\
    \                    array_slice($permutation, 0, $i),\n                    [$elements[0]],\n\
    \                    array_slice($permutation, $i)\n                );\n     \
    \       }\n        }\n    }\n}\n```\n\nThe `foreach` loop that begins on line\
    \ 7 calls the generator recursively using the `array_slice()` function to extract\
    \ all but the first element of the array passed to it. When we used `array_slice()`\
    \ in PHP Solution 8-4 “Joining an array with commas,” we passed it three arguments:\
    \ the array, the index of the element to start from, and the number of elements\
    \ to extract. In this case, just the first two arguments are used. When the final\
    \ argument to `array_slice()` is omitted, it returns all elements from the start\
    \ point to the end of the array. So, if the letters `ABC` are passed to it as\
    \ an array, `array_slice($elements, 1)` returns `BC`, which is referred to inside\
    \ the loop as `$permutation`.\n\nThe nested `foreach` loop uses the `range()`\
    \ function to create an array of numbers from 0 to the length of the `$elements`\
    \ array minus 1. Each time the loop runs, the generator yields a reordered array\
    \ using a combination of `array_merge()` and `array_slice()`. The first time the\
    \ loop runs, the counter `$i` is `0`, so `array_slice($permutation, 0, 0)` extracts\
    \ nothing from `BC`. `$elements[0]` is `A`, and `array_slice($permutation, 0)`\
    \ is `BC`. As a result, the original array `ABC` is yielded.\n\nThe next time\
    \ the loop runs, `$i` is `1`, so `B` is extracted from `$permutation`, `$elements[0]`\
    \ is still `A`, and `array_slice($permutation, 1)` is `C`, yielding `BAC`, and\
    \ so on.\n\n2. To use the `permutations()` generator, pass it an indexed array\
    \ as an argument, and assign the generator to a variable like this:\n\n```\n$perms\
    \ = permutations(['A', 'B', 'C']);\n```\n\n3. You can then use a `foreach` loop\
    \ with the generator to get all permutations of the array (the code is in `permutations.php`):\n\
    \n```\nforeach ($perms as $perm) {\n    echo implode(' ', $perm) . '<br>';\n}\n\
    ```\n\nThis displays all permutations of ABC, as shown in the following screenshot:\n\
    \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figu_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figu_HTML.jpg)\n\
    \n# Processing Array Data\n\nIn this section, we’ll look at two PHP solutions\
    \ for processing data stored in arrays: building HTML nested lists automatically\
    \ from a multidimensional associative array and extracting data from a JSON feed.\n\
    \n## PHP Solution 8-8: Building Nested Lists Automatically\n\nThis PHP solution\
    \ revisits the `RecursiveIteratorIterator` from the Standard PHP Library (SPL)\
    \ that we used in “Inspecting the Contents of a Folder with FilesystemIterator”\
    \ in Chapter [7](#332054_4_En_7_Chapter.xhtml) to burrow down the file system.\
    \ A useful feature of classes like the `RecursiveIteratorIterator` is that you\
    \ can adapt them to your own needs by extending them. When you extend a class,\
    \ the **subclass**—often referred to as the **child class**—inherits all public\
    \ and protected methods and properties of its parent. You can add new methods\
    \ and properties or change how the parent class’s methods work by overriding them.\
    \ The `RecursiveIteratorIterator` exposes several public methods that can be overridden\
    \ to inject HTML tags between array keys and values while looping over a multidimensional\
    \ associative array.\n\n> **Note:** Classes can declare methods and properties\
    \ to be public, protected, or private. Public means they can be accessed outside\
    \ the class definition. Protected means they can be accessed only inside the class\
    \ definition or in a child class. Private means they can be accessed only inside\
    \ the class definition and not in a child class.\n\nBefore building the PHP script,\
    \ let’s examine the structure of nested lists in HTML. The following illustration\
    \ shows a simple nested list:\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figv_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figv_HTML.jpg)\n\
    \nThe HTML code looks like this:\n\n```\n<ul>\n  <li>Label 1\n    <ul>\n     \
    \ <li>Item 1</li>\n      <li>Item 2</li>\n    </ul>\n  </li>\n</ul>\n```"
