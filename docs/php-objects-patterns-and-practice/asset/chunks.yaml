    ### 访问宿主类的属性


    你可能认为，就 trait 而言，静态方法确实是唯一可行的方式。即使那些没有声明为静态的 trait 方法，本质上也是静态的，对吧？嗯，实际上这么想是错误的——你可以访问宿主类中的属性和方法：


    ```

    // listing 04.36

    trait PriceUtilities

    {

    function calculateTax(float $price): float

    {

    // 这样设计好吗？

    return (($this->taxrate / 100) * $price);

    }

    // 其他工具方法

    }

    // listing 04.37

    class UtilityService extends Service

    {

    public $taxrate = 17;

    use PriceUtilities;

    }

    // listing 04.38

    $u = new UtilityService();

    print $u->calculateTax(100) . "\n";

    ```


    在上面的代码中，我修改了 `PriceUtilities` trait，使其能够访问宿主类中的一个属性。如果你认为这是一个糟糕的设计，那么你是对的。这是一个非常糟糕的设计。虽然
    trait 访问其宿主类设置的数据很有用，但并没有任何东西要求 `UtilityService` 类必须提供一个 `$taxrate` 属性。请记住，trait
    应该能被许多不同的类使用。有什么保证，或者说有多大可能性，所有宿主类都会声明一个 `$taxrate` 呢？


    另一方面，如果能建立一个约定，本质上说“如果你使用这个 trait，那么你必须为其提供某些资源”，那将非常棒。


    事实上，你可以精确地实现这种效果。Trait 支持抽象方法。


    ### 在 Trait 中定义抽象方法


    你可以在 trait 中定义抽象方法，就像在类中定义一样。当一个类使用了某个 trait，它就有义务实现该 trait 中声明的所有抽象方法。


    有了这个知识，我可以重新实现之前的例子，使得 trait 强制使用它的类提供税率信息：


    ```

    // listing 04.39

    trait PriceUtilities

    {

    function calculateTax(float $price): float

    {

    // 更好的设计……我们知道 getTaxRate() 已经被实现了

    return (($this->getTaxRate() / 100) * $price);

    }

    abstract function getTaxRate(): float;

    // 其他工具方法

    }

    // listing 04.40

    class UtilityService extends Service

    {

    use PriceUtilities;

    public function getTaxRate(): float

    {

    return 17;

    }

    }

    // listing 04.41

    $u = new UtilityService();

    print $u->calculateTax(100) . "\n";

    ```


    通过在 `PriceUtilities` trait 中声明一个抽象的 `getTaxRate()` 方法，我强制 `UtilityService` 类提供一个实现。当然，由于
    PHP 不约束返回类型，`UtilityService::calculateTax()` 方法不能绝对确定它能从 `getTaxRate()` 得到一个合理的值。你可以通过编写各种检查例程来在一定程度上克服这个问题，但这偏离了重点。通过要求实现一个或两个方法，向客户端程序员发出她应该提供某些信息的信号，这很可能已经足够了。


    ### 更改 Trait 方法的访问权限


    当然，你可以将 trait 方法声明为 `public`、`private` 或 `protected`。但是，你也可以在使用该 trait 的类内部更改此访问权限。你已经看到
    `as` 运算符可以用来为方法起别名。如果你在此运算符的右侧使用访问修饰符，它将更改方法的访问级别，而不是其名称。


    例如，假设你希望只在 `UtilityService` 内部使用 `calculateTax()`，而不让实现代码访问它。以下是你需要如何更改 `use`
    语句：


    ```

    // listing 04.42

    trait PriceUtilities

    {

    public function calculateTax(float $price): float

    {

    return (($this->getTaxRate() / 100) * $price);

    }

    public abstract function getTaxRate(): float;

    // 其他工具方法

    }

    // listing 04.43

    class UtilityService extends Service

    {

    use PriceUtilities {

    PriceUtilities::calculateTax as private;

    }

    private $price;

    public function __construct(float $price)

    {

    $this->price = $price;

    }

    public function getTaxRate(): float

    {

    return 17;

    }

    public function getFinalPrice(): float

    {

    return ($this->price + $this->calculateTax($this->price));

    }

    }

    // listing 04.44

    $u = new UtilityService(100);

    print $u->getFinalPrice() . "\n";

    ```


    我将 `as` 运算符与 `private` 关键字结合使用，以便将 `calculateTax()` 设置为私有访问。这意味着我可以从 `getFinalPrice()`
    方法内部访问它。以下是从外部尝试访问 `calculateTax()` 的代码：


    ```

    $u = new UtilityService(100);

    print $u->calculateTax()."\n";

    ```


    不幸的是，这段代码会产生一个错误：


    ```

    Error: Call to private method popp\ch04\batch06_9\UtilityService::calculateTax()
    from context ...

    ```

