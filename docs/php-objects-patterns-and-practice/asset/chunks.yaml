    \    return $product;\n}\n```\n\n`getInstance()` 方法使用一个大型的 `if/else` 语句来决定实例化哪个子类。这样的条件判断在工厂代码中很常见。尽管你应该尝试从项目中移除大型条件语句，但这样做通常会将条件判断推回到对象生成的那一刻。这通常不是一个严重的问题，因为通过将决策回推至此，你从代码中消除了并行的条件语句。\n\
    \n因此，在本章中，我将探讨一些用于生成对象的经典“四人帮”设计模式。\n"
- fmt: '# The Singleton Pattern


    The global variable is one of the great bugbears of the object-oriented programmer.
    The reasons should be familiar to you by now. Global variables tie classes into
    their context, undermining encapsulation (see Chapter [6](#A314621_5_En_6_Chapter.html),
    “Objects and Design,” and Chapter [8](#A314621_5_En_8_Chapter.html), “Some Pattern
    Principles,” for more on this). A class that relies on global variables becomes
    impossible to pull out of one application and use in another, without first ensuring
    that the new application itself defines the same global variables.


    Although this is undesirable, the unprotected nature of global variables can be
    a greater problem. Once you start relying on global variables, it is perhaps just
    a matter of time before one of your libraries declares a global that clashes with
    another declared elsewhere. You have seen already that, if you are not using namespaces,
    PHP is vulnerable to class name clashes. But this is much worse. PHP will not
    warn you when globals collide. The first you will know about it is when your script
    begins to behave oddly. Worse still, you may not notice any issues at all in your
    development environment. By using globals, though, you potentially leave your
    users exposed to new and interesting conflicts when they attempt to deploy your
    library alongside others.


    Globals remain a temptation, however. This is because there are times when the
    sin inherent in global access seems a price worth paying in order to give all
    of your classes access to an object.


    As I hinted, namespaces provide some protection from this. You can at least scope
    variables to a package, which means that third-party libraries are less likely
    to clash with your own system. Even so, the risk of collision exists within the
    namespace itself.


    ## The Problem


    Well-designed systems generally pass object instances around via method calls.
    Each class retains its independence from the wider context, collaborating with
    other parts of the system via clear lines of communication. Sometimes, though,
    you find that this forces you to use some classes as conduits for objects that
    do not concern them, introducing dependencies in the name of good design.


    Imagine a `Preferences` class that holds application-level information. We might
    use a `Preferences` object to store data such as DSN strings (Data Source Names
    hold table and user information about a database), URL roots, file paths, and
    so on. This is the sort of information that will vary from installation to installation.
    The object may also be used as a notice board, a central location for messages
    that could be set or retrieved by otherwise unrelated objects in a system.


    Passing a `Preferences` object around from object to object may not always be
    a good idea. Many classes that do not otherwise use the object could be forced
    to accept it simply so that they could pass it on to the objects that they work
    with. This is just another kind of coupling.


    You also need to be sure that all objects in your system are working with the
    same `Preferences` object. You do not want objects setting values on one object,
    while others read from an entirely different one.


    Let’s distill the forces in this problem:


    *   A `Preferences` object should be available to any object in your system.

    *   A `Preferences` object should not be stored in a global variable, which can
    be overwritten.

    *   There should be no more than one `Preferences` object in play in the system.
    This means that object Y can set a property in the `Preferences` object, and object
    Z can retrieve the same property, without either one talking to the other directly
    (assuming both have access to the `Preferences` object).


    ## Implementation


    To address this problem, I can start by asserting control over object instantiation.
    Here, I create a class that cannot be instantiated from outside of itself. That
    may sound difficult, but it’s simply a matter of defining a private constructor:


    ```

    class Preferences

    {

    private $props = [];

    private function __construct()

    {

    }

    public function setProperty(string $key, string $val)

    {

    $this->props[$key] = $val;

    }

    public function getProperty(string $key): string

    {

    return $this->props[$key];

    }

    }

    ```


    Of course, at this point, the `Preferences` class is entirely unusable. I have
    taken access restriction to an absurd level. Because the constructor is declared
    `private`, no client code can instantiate an object from it. The `setProperty()`
    and `getProperty()` methods are therefore redundant.


    I can use a static method and a static property to mediate object instantiation:


    ```

    // listing 09.11

    class Preferences

    {

    private $props = [];

    private static $instance;

    private function __construct()

    {

    }

    public static function getInstance()

    {

    if (empty(self::$instance)) {

    self::$instance = new Preferences();

    }

    return self::$instance;

    }

    public function setProperty(string $key, string $val)

    {

    $this->props[$key] = $val;

    }

    public function getProperty(string $key): string

    {

    return $this->props[$key];

    }

    }

    ```


    The `$instance` property is private and static, so it cannot be accessed from
    outside the class. The `getInstance()` method has access, though. Because `getInstance()`
    is public and static, it can be called via the class from anywhere in a script:


    ```

    // listing 09.12

    $pref = Preferences::getInstance();

    $pref->setProperty("name", "matt");

    unset($pref); // remove the reference

    $pref2 = Preferences::getInstance();

    print $pref2->getProperty("name") ."\n"; // demonstrate value is not lost

    ```


    The output is the single value we added to the `Preferences` object initially,
    available through a separate access:


    ```

    matt

    ```


    A static method cannot access object properties because it is, by definition,
    invoked in a class and not an object context. It can, however, access a static
    property. When `getInstance()` is called, I check the `Preferences::$instance`
    property. If it is empty, then I create an instance of the `Preferences` class
    and store it in the property. Then I return the instance to the calling code.
    Because the static `getInstance()` method is part of the `Preferences` class,
    I have no problem instantiating a `Preferences` object, even though the constructor
    is private.


    Figure 9-2 shows the Singleton pattern.


    ![A314621_5_En_9_Fig2_HTML.gif](A314621_5_En_9_Fig2_HTML.gif)


    **Figure 9-2.** An example of the Singleton pattern


    ## Consequences


    So, how does the Singleton approach compare to using a global variable? First,
    the bad news. Both Singletons and global variables are prone to misuse. Because
    Singletons can be accessed from anywhere in a system, they can serve to create
    dependencies that can be hard to debug. Change a Singleton, and classes that use
    it may be affected. Dependencies are not a problem in themselves. After all, we
    create a dependency every time we declare that a method requires an argument of
    a particular type. The problem is that the global nature of the Singleton lets
    a programmer bypass the lines of communication defined by class interfaces. When
    a Singleton is used, the dependency is hidden away inside a method and not declared
    in its signature. This can make it harder to trace the relationships within a
    system. Singleton classes should therefore be deployed sparingly and with care.


    Nevertheless, I think that moderate use of the Singleton pattern can improve the
    design of a system, saving you from horrible contortions as you pass objects unnecessarily
    around your system.


    Singletons represent an improvement over global variables in an object-oriented
    context. You cannot overwrite a Singleton with the wrong kind of data.'
  raw: '## The Singleton Pattern


    The global variable is one of the great bugbears of the object-oriented programmer.
    The reasons should be familiar to you by now. Global variables tie classes into
    their context, undermining encapsulation (see Chapter [6](#A314621_5_En_6_Chapter.html),
    “Objects and Design,” and Chapter [8](#A314621_5_En_8_Chapter.html), “Some Pattern
    Principles,” for more on this). A class that relies on global variables becomes
    impossible to pull out of one application and use in another, without first ensuring
    that the new application itself defines the same global variables.


    Although this is undesirable, the unprotected nature of global variables can be
    a greater problem. Once you start relying on global variables, it is perhaps just
    a matter of time before one of your libraries declares a global that clashes with
    another declared elsewhere. You have seen already that, if you are not using namespaces,
    PHP is vulnerable to class name clashes. But this is much worse. PHP will not
    warn you when globals collide. The first you will know about it is when your script
    begins to behave oddly. Worse still, you may not notice any issues at all in your
    development environment. By using globals, though, you potentially leave your
    users exposed to new and interesting conflicts when they attempt to deploy your
    library alongside others.


    Globals remain a temptation, however. This is because there are times when the
    sin inherent in global access seems a price worth paying in order to give all
    of your classes access to an object.


    As I hinted, namespaces provide some protection from this. You can at least scope
    variables to a package, which means that third-party libraries are less likely
    to clash with your own system. Even so, the risk of collision exists within the
    namespace itself.


    ### The Problem


    Well-designed systems generally pass object instances around via method calls.
    Each class retains its independence from the wider context, collaborating with
    other parts of the system via clear lines of communication. Sometimes, though,
    you find that this forces you to use some classes as conduits for objects that
    do not concern them, introducing dependencies in the name of good design.


    Imagine a `Preferences` class that holds application-level information. We might
    use a `Preferences` object to store data such as DSN strings (Data Source Names
    hold table and user information about a database), URL roots, file paths, and
    so on. This is the sort of information that will vary from installation to installation.
    The object may also be used as a notice board, a central location for messages
    that could be set or retrieved by otherwise unrelated objects in a system.


    Passing a `Preferences` object around from object to object may not always be
    a good idea. Many classes that do not otherwise use the object could be forced
    to accept it simply so that they could pass it on to the objects that they work
    with. This is just another kind of coupling.


    You also need to be sure that all objects in your system are working with the
    same `Preferences` object. You do not want objects setting values on one object,
    while others read from an entirely different one.


    Let’s distill the forces in this problem:


    *   A `Preferences` object should be available to any object in your system.

    *   A `Preferences` object should not be stored in a global variable, which can
    be overwritten.

    *   There should be no more than one `Preferences` object in play in the system.
    This means that object Y can set a property in the `Preferences` object, and object
    Z can retrieve the same property, without either one talking to the other directly
    (assuming both have access to the `Preferences` object).


    ### Implementation


    To address this problem, I can start by asserting control over object instantiation.
    Here, I create a class that cannot be instantiated from outside of itself. That
    may sound difficult, but it’s simply a matter of defining a private constructor
    :


    ```

    class Preferences

    {

    private $props = [];

    private function __construct()

    {

    }

    public function setProperty(string $key, string $val)

    {

    $this->props[$key] = $val;

    }

    public function getProperty(string $key): string

    {

    return $this->props[$key];

    }

    }

    ```


    Of course, at this point, the `Preferences` class is entirely unusable. I have
    taken access restriction to an absurd level. Because the constructor is declared
    `private`, no client code can instantiate an object from it. The `setProperty()`
    and `getProperty()` methods are therefore redundant.


    I can use a static method and a static property to mediate object instantiation:


    ```

    // listing 09.11

    class Preferences

    {

    private $props = [];

    private static $instance;

    private function __construct()

    {

    }

    public static function getInstance()

    {

    if (empty(self::$instance)) {

    self::$instance = new Preferences();

    }

    return self::$instance;

    }

    public function setProperty(string $key, string $val)

    {

    $this->props[$key] = $val;

    }

    public function getProperty(string $key): string

    {

    return $this->props[$key];

    }

    }

    ```


    The `$instance` property is private and static, so it cannot be accessed from
    outside the class. The `getInstance()` method has access, though. Because `getInstance()`
    is public and static, it can be called via the class from anywhere in a script:


    ```

    // listing 09.12

    $pref = Preferences::getInstance();

    $pref->setProperty("name", "matt");

    unset($pref); // remove the reference

    $pref2 = Preferences::getInstance();

    print $pref2->getProperty("name") ."\n"; // demonstrate value is not lost

    ```


    The output is the single value we added to the `Preferences` object initially,
    available through a separate access:


    ```

    matt

    ```


    A static method cannot access object properties because it is, by definition,
    invoked in a class and not an object context. It can, however, access a static
    property. When `getInstance()` is called, I check the `Preferences::$instance`
    property. If it is empty, then I create an instance of the `Preferences` class
    and store it in the property. Then I return the instance to the calling code.
    Because the static `getInstance()` method is part of the `Preferences` class,
    I have no problem instantiating a `Preferences` object, even though the constructor
    is private.


    Figure [9-2](#A314621_5_En_9_Chapter.html#Fig2) shows the Singleton pattern.


    ![A314621_5_En_9_Fig2_HTML.gif](A314621_5_En_9_Fig2_HTML.gif)


    Figure 9-2.


    An example of the Singleton pattern


    ### Consequences


    So, how does the Singleton approach compare to using a global variable? First,
    the bad news. Both Singletons and global variables are prone to misuse. Because
    Singletons can be accessed from anywhere in a system, they can serve to create
    dependencies that can be hard to debug. Change a Singleton, and classes that use
    it may be affected. Dependencies are not a problem in themselves. After all, we
    create a dependency every time we declare that a method requires an argument of
    a particular type. The problem is that the global nature of the Singleton lets
    a programmer bypass the lines of communication defined by class interfaces. When
    a Singleton is used, the dependency is hidden away inside a method and not declared
    in its signature. This can make it harder to trace the relationships within a
    system. Singleton classes should therefore be deployed sparingly and with care.


    Nevertheless, I think that moderate use of the Singleton pattern can improve the
    design of a system, saving you from horrible contortions as you pass objects unnecessarily
    around your system.


    Singletons represent an improvement over global variables in an object-oriented
    context. You cannot overwrite a Singleton with the wrong kind of data.'
  trans: '

    # 单例模式


    全局变量是面向对象程序员最头疼的问题之一。其缘由你现在应该已经很熟悉了。全局变量会将类与其上下文环境绑定，从而破坏封装性（关于这一点，请参考第 6 章“对象与设计”和第
    8 章“一些模式原则”）。如果一个类依赖于全局变量，那么在不首先确保新应用程序也定义了相同全局变量的前提下，它几乎无法从一个应用程序中提取出来并在另一个应用程序中使用。


    尽管这本身并不可取，但全局变量的无保护特性可能是一个更严重的问题。一旦你开始依赖全局变量，你的某个库声明的一个全局变量与别处声明的另一个全局变量发生冲突，可能只是时间问题。你已经知道，如果不使用命名空间，PHP
    很容易发生类名冲突。但全局变量的冲突要糟糕得多。当全局变量冲突时，PHP 不会给你任何警告。你最先察觉到问题将是在你的脚本开始出现异常行为时。更糟糕的是，在你的开发环境中你可能根本注意不到任何问题。然而，通过使用全局变量，你可能会让你的用户在尝试将你的库与其他库一同部署时，暴露在新的、有趣的冲突面前。


    尽管如此，全局变量仍然是一种诱惑。这是因为，有时全局访问所带来的固有弊端，似乎也值得付出代价，以便让你所有的类都能访问到一个对象。


    正如我提到的，命名空间对此提供了一些保护。你至少可以将变量限定在一个包的作用域内，这意味着第三方库与你的系统发生冲突的可能性更低。即便如此，在命名空间内部仍然存在冲突的风险。


    ## 问题


    设计良好的系统通常通过方法调用来传递对象实例。每个类都保持其相对于更广泛上下文的独立性，并通过清晰的通信线路与系统的其他部分协作。然而，有时你会发现，这迫使你将某些类用作传递它们并不关心的对象的管道，从而以良好设计的名义引入了依赖关系。


    想象一个保存应用程序级别信息的 `Preferences` 类。我们可能会使用一个 `Preferences` 对象来存储诸如 DSN 字符串（数据源名称包含数据库的表和用户信息）、URL
    根目录、文件路径等数据。这类信息会因不同的安装环境而异。该对象也可以被用作一个公告板，系统内其他不相关的对象可以在此设置或检索消息。


    将一个 `Preferences` 对象从一个对象传递到另一个对象并不总是一个好主意。许多本来不使用该对象的类可能被迫接受它，仅仅是为了能将这个对象传递给它们协作的对象。这不过是另一种耦合。


    你还需要确保系统中的所有对象都在使用同一个 `Preferences` 对象。你不希望一些对象在一个对象上设置值，而其他对象却从一个完全不同的对象上读取值。


    让我们提炼一下这个问题中的核心要素：


    *   系统中的任何对象都应该能够访问到一个 `Preferences` 对象。

    *   `Preferences` 对象不应存储在可能被覆盖的全局变量中。

    *   系统中应该只有一个 `Preferences` 对象在起作用。这意味着对象 Y 可以在这个 `Preferences` 对象中设置一个属性，而对象
    Z 可以检索到同一个属性，且两者无需直接通信（假设两者都能访问到这个 `Preferences` 对象）。


    ## 实现


    为了解决这个问题，我可以从控制对象的实例化入手。这里，我创建了一个无法从自身外部实例化的类。这听起来可能有些困难，但其实只需定义一个私有构造函数即可：


    ```

    class Preferences

    {

    private $props = [];

    private function __construct()

    {

    }

    public function setProperty(string $key, string $val)

    {

    $this->props[$key] = $val;

    }

    public function getProperty(string $key): string

    {

    return $this->props[$key];

    }

    }

    ```


    当然，此时 `Preferences` 类完全无法使用。我将访问限制发挥到了荒谬的程度。因为构造函数被声明为 `private`，没有任何客户端代码能从中实例化一个对象。因此
    `setProperty()` 和 `getProperty()` 方法成了摆设。


    我可以使用一个静态方法和一个静态属性来协调对象的实例化：


    ```

    // listing 09.11

    class Preferences

    {

    private $props = [];

    private static $instance;

    private function __construct()

    {

    }

    public static function getInstance()

    {

    if (empty(self::$instance)) {

    self::$instance = new Preferences();

    }

    return self::$instance;

    }

    public function setProperty(string $key, string $val)

    {

    $this->props[$key] = $val;

    }

    public function getProperty(string $key): string

    {

    return $this->props[$key];

    }

    }

    ```


    `$instance` 属性是私有且静态的，所以无法从类外部访问。但 `getInstance()` 方法可以访问它。由于 `getInstance()`
    是公有且静态的，它可以通过该类从脚本的任何地方被调用：


    ```

    // listing 09.12

    $pref = Preferences::getInstance();

    $pref->setProperty("name", "matt");

    unset($pref); // 移除引用

    $pref2 = Preferences::getInstance();

    print $pref2->getProperty("name") ."\n"; // 演示值并未丢失

    ```


    输出结果是我们最初添加到 `Preferences` 对象的唯一值，它可以通过另一个独立的访问点获取：


    ```

    matt

    ```


    静态方法无法访问对象属性，因为根据定义，它是在类上下文中而非对象上下文中调用的。但它可以访问静态属性。当 `getInstance()` 被调用时，我检查
    `Preferences::$instance` 属性。如果它为空，我就创建一个 `Preferences` 类的实例并将其存储在属性中。然后我将该实例返回给调用代码。因为静态方法
    `getInstance()` 是 `Preferences` 类的一部分，尽管构造函数是私有的，我仍然可以毫无问题地实例化一个 `Preferences`
    对象。


    图 9-2 展示了单例模式。


    ![A314621_5_En_9_Fig2_HTML.gif](img/A314621_5_En_9_Fig2_HTML.gif)


    **图 9-2.** 单例模式示例


    ## 结果


    那么，单例方法与使用全局变量相比如何呢？首先，坏消息是：单例和全局变量都容易被滥用。由于单例可以从系统的任何地方访问，它们可能会创建难以调试的依赖关系。改变一个单例，使用它的类就可能受到影响。依赖关系本身并不是问题。毕竟，每当我们声明一个方法需要特定类型的参数时，我们就在创建依赖关系。问题在于，单例的全局性使得程序员可以绕过由类接口定义的通信线路。当使用单例时，依赖关系隐藏在方法内部，并未在其签名中声明。这会增加追踪系统内部关系的难度。因此，单例类应该谨慎且有节制地使用。


    尽管如此，我认为适度使用单例模式可以改善系统的设计，让你免于在系统中不必要地传递对象而带来的各种别扭。


    在面向对象的上下文中，单例模式代表了对全局变量的一种改进。你不能用错误类型的数据覆盖一个单例。

    '
- fmt: '# Factory Method Pattern


    Object-oriented design emphasizes the abstract class over the implementation.
    That is, it works with generalizations rather than specializations. The `Factory
    Method` pattern addresses the problem of how to create object instances when your
    code focuses on abstract types. The answer? Let specialist classes handle instantiation.


    ## The Problem


    Imagine a personal organizer project that manages `Appointment` objects, among
    other object types. Your business group has forged a relationship with another
    company, and you must communicate appointment data to it using a format called
    BloggsCal. The business group warns you that you may face yet more formats as
    time wears on, though.


    Staying at the level of interface alone, you can identify two participants right
    away. You need a data encoder that converts your `Appointment` objects into a
    proprietary format. Let’s call that class `ApptEncoder`. You need a manager class
    that will retrieve an encoder and maybe work with it to communicate with a third
    party. You might call that `CommsManager`. Using the terminology of the pattern,
    the `CommsManager` is the creator, and the `ApptEncoder` is the product. You can
    see this structure in Figure 9-3.


    ![A314621_5_En_9_Fig3_HTML.gif](A314621_5_En_9_Fig3_HTML.gif)


    Figure 9-3. Abstract creator and product classes


    How do you get your hands on a real concrete `ApptEncoder`, though?


    You could demand that an `ApptEncoder` be passed to the `CommsManager`, but that
    simply defers your problem, and you want the buck to stop about here. Here I instantiate
    a `BloggsApptEncoder` object directly within the `CommsManager` class:


    ```

    // listing 09.13

    abstract class ApptEncoder

    {

    abstract public function encode(): string;

    }

    // listing 09.14

    class BloggsApptEncoder extends ApptEncoder

    {

    public function encode(): string

    {

    return "Appointment data encoded in BloggsCal format\n";

    }

    }

    // listing 09.15

    class MegaApptEncoder extends ApptEncoder

    {

    public function encode(): string

    {

    return "Appointment data encoded in MegaCal format\n";

    }

    }

    // listing 09.16

    class CommsManager

    {

    public function getApptEncoder(): ApptEncoder

    {

    return new BloggsApptEncoder();

    }

    }

    ```


    The `CommsManager` class is responsible for generating `BloggsApptEncoder` objects.
    When the sands of corporate allegiance inevitably shift, and we are asked to convert
    our system to work with a new format called MegaCal, we can simply add a conditional
    into the `CommsManager::getApptEncoder()` method. This is the strategy we have
    used in the past, after all. Let’s build a new implementation of `CommsManager`
    that handles both BloggsCal and MegaCal formats:


    ```

    // listing 09.17

    class CommsManager

    {

    const BLOGGS = 1;

    const MEGA = 2;

    private $mode;

    public function __construct(int $mode)

    {

    $this->mode = $mode;

    }

    public function getApptEncoder(): ApptEncoder

    {

    switch ($this->mode) {

    case (self::MEGA):

    return new MegaApptEncoder();

    default:

    return new BloggsApptEncoder();

    }

    }

    }

    // listing 09.18

    $man = new CommsManager(CommsManager::MEGA);

    print (get_class($man->getApptEncoder())) . "\n";

    $man = new CommsManager(CommsManager::BLOGGS);

    print (get_class($man->getApptEncoder())) . "\n";

    ```


    I use constant flags to define two modes in which the script might be run: `MEGA`
    and `BLOGGS`. I use a `switch` statement in the `getApptEncoder()` method to test
    the `$mode` property and instantiate the appropriate implementation of `ApptEncoder`.


    There is little wrong with this approach. Conditionals are sometimes considered
    examples of bad "code smells," but object creation often requires a conditional
    at some point. You should be less sanguine if you see duplicate conditionals creeping
    into your code. The `CommsManager` class provides functionality for communicating
    calendar data. Imagine that the protocols you work with require you to provide
    header and footer data to delineate each appointment. I can extend the previous
    example to support a `getHeaderText()` method:


    ```

    // listing 09.19

    class CommsManager

    {

    const BLOGGS = 1;

    const MEGA = 2;

    private $mode;

    public function __construct(int $mode)

    {

    $this->mode = $mode;

    }

    public function getApptEncoder(): ApptEncoder

    {

    switch ($this->mode) {

    case (self::MEGA):

    return new MegaApptEncoder();

    default:

    return new BloggsApptEncoder();

    }

    }

    public function getHeaderText(): string

    {

    switch ($this->mode) {

    case (self::MEGA):

    return "MegaCal header\n";

    default:

    return "BloggsCal header\n";

    }

    }

    }

    ```


    As you can see, the need to support header output has forced me to duplicate the
    protocol conditional test. This will become unwieldy as I add new protocols, especially
    if I also add a `getFooterText()` method.


    So, let''s summarize the problem so far:


    - I do not know until runtime the kind of object I need to produce (`BloggsApptEncoder`
    or `MegaApptEncoder`)

    - I need to be able to add new product types with relative ease (SyncML support
    is just a new business deal away!)

    - Each product type is associated with a context that requires other customized
    operations (e.g., `getHeaderText()`, `getFooterText()`)


    Additionally, I am using conditional statements, and you have seen already that
    these are naturally replaceable by polymorphism. The Factory Method pattern enables
    you to use inheritance and polymorphism to encapsulate the creation of concrete
    products. In other words, you create a `CommsManager` subclass for each protocol,
    each one implementing the `getApptEncoder()` method.


    ## Implementation


    The Factory Method pattern splits creator classes from the products they are designed
    to generate. The creator is a factory class that defines a method for generating
    a product object. If no default implementation is provided, it is left to creator
    child classes to perform the instantiation. Typically, each creator subclass instantiates
    a parallel product child class.


    I can redesignate `CommsManager` as an abstract class. That way, I keep a flexible
    superclass and put all my protocol-specific code in the concrete subclasses. You
    can see this alteration in Figure 9-4.


    ![A314621_5_En_9_Fig4_HTML.gif](A314621_5_En_9_Fig4_HTML.gif)


    Figure 9-4. Concrete creator and product classes


    Here''s some simplified code:


    ```

    // listing 09.20

    abstract class ApptEncoder

    {

    abstract public function encode(): string;

    }

    // listing 09.21

    class BloggsApptEncoder extends ApptEncoder

    {

    public function encode(): string

    {

    return "Appointment data encode in BloggsCal format\n";

    }

    }

    // listing 09.22

    abstract class CommsManager

    {

    abstract public function getHeaderText(): string;

    abstract public function getApptEncoder(): ApptEncoder;

    abstract public function getFooterText(): string;

    }

    // listing 09.23

    class BloggsCommsManager extends CommsManager

    {

    public function getHeaderText(): string

    {

    return "BloggsCal header\n";

    }

    public function getApptEncoder(): ApptEncoder

    {

    return new BloggsApptEncoder();

    }

    public function getFooterText(): string

    {

    return "BloggsCal footer\n";

    }

    }

    // listing 09.24

    $mgr = new BloggsCommsManager();

    print $mgr->getHeaderText();

    print $mgr->getApptEncoder()->encode();

    print $mgr->getFooterText();

    BloggsCal header

    Appointment data encode in BloggsCal format

    BloggsCal footer

    ```


    So, when I am required to implement MegaCal, supporting it is simply a matter
    of writing a new implementation for my abstract classes. Figure 9-5 shows the
    MegaCal classes.


    ![A314621_5_En_9_Fig5_HTML.gif](A314621_5_En_9_Fig5_HTML.gif)


    Figure 9-5. Extending the design to support a new protocol'
