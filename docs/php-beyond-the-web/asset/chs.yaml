  \ |\n\n\n\n### 5.14 Web 套接字与浏览器\n\n上述 Web 服务器/浏览器场景的一种变体是使用 Web 套接字，这是不断发展的 HTML5\
  \ 规范的一部分，旨在允许浏览器中的双向通信和“推送”类型的数据流。LAMP 类技术栈和 `PHP Built in Web Server` 默认不处理 Web\
  \ 套接字连接。该规范相当新，浏览器的支持情况各不相同，你需要部署一个专用的 Web 套接字服务器或一个 PHP Web 套接字服务器库（通常基于生成 `PHP\
  \ CLI` 进程来处理通信）。除此之外，其优缺点与传统 Web 服务器通信中讨论的基本相同。由于套接字的“推送”能力，通信可能更快且频率更低。\n\n| ![](img/image00249.gif)\
