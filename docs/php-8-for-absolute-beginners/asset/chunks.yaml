  trans: '

    #### 块注释与单行注释


    在 PHP 中，我们必须清晰地界定注释，以免 PHP 将注释误当作实际的生产代码进行解析。我们来看看在 PHP 中编写代码注释的两种方式：*块注释*和*单行注释*。


    ```

    单行注释以 // 开头。注释仅存在于单行中。

    当然，我们可以通过添加多个 // 来增加多行注释。

    然而，块注释格式允许你使用开始分隔符 /* 和结束分隔符 */。

    使用块注释格式时，可以在不重复每行使用 // 的情况下包含多行注释。

    ```


    #### 避免命名冲突


    程序可能包含数百行代码。这些程序会使用许多变量，每个变量都必须具有唯一且有意义的名称。在 PHP 中，很容易意外地重复使用变量。由于变量是通过类似的指令创建和更新的，程序可能会错误地替换变量中已有的数据。我们需要避免潜在的命名冲突，以防这种情况发生。


    **注意**


    在需要先声明变量才能使用的语言中，如果再次尝试声明变量，则会引发错误。PHP 不要求声明变量，并且如果意外重复使用变量，也不会引发错误。然而，高效的程序可以有目的地重复使用变量，而不是使用不必要的内存来创建额外的变量。


    ```php

    <?php

    $title = "欢迎来到我的博客";

    /*

    几百行代码之后

    */

    $title = "Web 开发者";

    ?>

    ```


    你看得出上面这段代码的问题吗？最初，一个名为 `$title` 的变量用于表示 HTML 页面 `<title>` 元素的值。在同一个程序的后面很远的地方，另一个同样名为
    `$title` 的变量被用来存储一个职位名称。当将库文件导入现有程序时，这种情况尤其容易发生。该库文件可能包含与调用程序中使用的变量名相同的变量。`namespace`
    指令可用于分隔程序的各个部分，以避免潜在冲突。这对于使用许多库的程序尤其有用。


    **练习**：访问 [php.net](http://php.net) 网站并搜索关于命名空间的信息。你也可以在 YouTube 上观看关于 PHP 命名空间的视频。我们如何调整所展示的示例程序，使其使用命名空间而不是对象？


    我们还可以通过创建一个*对象*来避免命名冲突。在*面向对象编程*中，一个对象可以包含多个变量（*属性*）和函数（*方法*——代码块）。例如，一个对象可以包含关于我们居住地点的信息，以及生成前往该地点驾驶路线的能力。一个用于声明对象内容的
    `class`（类），类似于建造房屋的蓝图。蓝图提供了关于房屋的许多细节，但它并不是真正的房屋。实际的房屋必须按照蓝图建造。这样，房屋才存在。要使对象在编程中存在，必须先声明它（使用类），然后创建其实例（使用
    `new` 关键字）。类的实例就是对象。该对象存在于内存中（拥有自己的变量和代码块），供调用程序使用。当不再需要该对象时，可以在程序内部将其释放。当程序结束时，所有已存在的对象将自动被释放。


    ```php

    $pageData = new StdClass();

    $pageData->title = "欢迎来到我的博客";

    /*

    几百行代码之后

    */

    $jobData = new StdClass();

    $jobData->title = "Web 开发者";

    ?>

    ```


    在不深入探讨面向对象编程的前提下（毕竟这只是第 2 章），我们可以轻松创建一个对象来保存多个值。我们将使用 PHP 原生的 `StdClass` 类来实现。在上面的代码示例中，我们看到两个不同的对象，每个对象都有一个
    `title` 属性。`new` 关键字用于从现有类创建对象。在此示例中，`$pageData` 和 `$jobData` 是从 `StdClass` 创建的。然后，每个对象在自身内部创建一个
    `title` 变量（属性）。`$pageData->title` 创建其自身独立的 `title` 属性。稍后在程序中，指令 `$jobData->title`
    为 `$jobData` 创建一个不同的 `title` 属性。该对象提供了一个上下文，这将使我们更容易在代码中的正确位置使用正确的标题。我们可以使用对象将代码组织成有意义的、属于一起的单元。我们可以说，对象及其属性非常像一个文件夹和其中的文件。


    **注意**


    对于快速开发一组与特定名称（对象）关联的变量（属性）列表，`stdClass` 是很有用的。然而，它没有数组高效，因为对于这类任务来说，它会创建不必要的对象代码。它也不允许创建可以增加对象数据安全性和可靠性的
    `set` 和 `get` 例程。在本章后面，我们将创建自己的类与对象，这将使我们能够对数据、数据的可访问性及其可靠性进行更多控制。在你的代码中使用对象，是在系统中处理复杂性而不引入不必要复杂性的实际标准。在本书中，我们将学习更多关于使用对象进行编程的知识。


    #### 对象运算符


    要从对象属性中获取值，我们必须指定两件事：获取哪个对象以及获取它的哪个属性。为此，我们可以使用 PHP 的*对象运算符*。其通用语法如下：


    ```php

    $objectName->propertyName;

    ```


    PHP 的对象运算符看起来像一个箭头。它表示你正在从特定对象（在左侧指明）内部使用一个特定的属性（在右侧指明）。我们也可以选择使用*点号表示法*。如前所述，要保持一致性，选择一种你使用起来舒服的风格，并在整个程序中保持一致。


    **练习**：访问 [php.net](http://php.net) 并研究在 PHP 中使用点号表示法。调整我们之前的代码示例，使其使用点号表示法而不是对象运算符。你更喜欢哪种风格？为什么？


    #### 使用 `StdClass` 对象处理页面数据


    让我们使用一个对象来重构 `index.php` 和页面模板，以防止恼人的命名冲突。以下是新的 `index.php` 文件。


    ```php

    <?php

    $pageData = new StdClass();

    $pageData->title = "新的，面向对象的测试标题";

    $pageData->content = "来自一个对象的问候";

    require "templates/newerpage.php";

    echo $page;

    ?>

    ```


    **代码清单 2-8** `newerindex.php`


    我们还需要更新 `page.php`，使其在正确的位置使用新创建的对象及其属性。我们现在将其命名为 `newerpage.php`。


    ```php

    <?php

    $page = "

    <html>

    <head>

    <title>$pageData->title</title>

    </head>

    <body>

    $pageData->content

    </body>

    </html>

    ";

    ?>

    ```


    **代码清单 2-9** `newerpage.php`


    在浏览器中加载 `index.php`。你应该会看到 `<title>` 和 `<body>` 元素中的值发生了变化。不过，所有其他的显示和源代码保持不变。


    #### 页面视图


    个人作品集网站很可能有几个不同的页面。可能一个是关于技能和教育背景的页面，另一个是提供工作示例链接的页面。因为我们在制作一个动态网站，所以我们将使用模板来显示作品集的页面。实际上我们并不是在创建多个页面；我们是在创建多个*页面视图*。页面视图是看起来像独立页面的东西。一个页面视图可能由几个较小的视图组成。我们可以将页面视图想象成一个乐高房子，而将视图想象成乐高积木：较小的部分组合起来构建更大的东西。对了，我到底把那个乐高海盗船放在哪儿了？

    '
- fmt: '# 文档排版


    记住，成功编程的一个关键因素是保持组织性。因此，我们将所有视图放在一个文件夹中。让我们在现有项目文件夹内创建一个名为`views`的新文件夹。我们还将创建一个新文件`skills.php`，保存在`views`文件夹中，内容如清单2-10所示。


    ```

    Skills and educational background

    Read all about my skills and my formal training

    ";

    ?>

    Listing 2-10

    skills.php

    ```


    我们只需要在文件中包含任何我们想要显示的信息。模板将完成所有其他工作。此时，完整的文件是一个相当小的视图。在开发代码时，从小处着手通常是个好主意。任何可能出现的错误在较少的代码行中更容易被发现。让我们也创建另一个包含项目信息的小视图（文件）。


    ```

    Projects I have worked on


    Ahem, this will soon be updated

    ";

    ?>

    Listing 2-11

    projects.php

    ```


    ## HTML 回顾


    在清单2-10中，引入了HTML标签`<h1>`。此标签以及其他类似标签，用于显示标题文本以在网页上逻辑地划分信息。图2-6展示了一些最流行的标题标签大小。


    ![](images/323857_3_En_2_Chapter/323857_3_En_2_Fig7_HTML.jpg)


    此窗口表示超文本标记语言中使用的不同标题，主要大小有`h1`、`h2`、`h3`和`h4`。


    图2-6 `headers.php`输出


    在清单2-11中，`<ul>`标签创建一个无序列表（不编号）。`<li>`标签用于创建各个列表项。清单2-12提供了无序列表的另一个示例。


    ```


    An unordered list


    Food I like To Eat

    Pizza

    Snails

    Lizards


    Listing 2-12

    unorderedlist.php

    ```


    执行此HTML的结果将产生如图2-7所示的显示。


    ![](images/323857_3_En_2_Chapter/323857_3_En_2_Fig8_HTML.jpg)


    此窗口反映了一个无序摘要标签，例如"我喜欢吃的食物：披萨、蜗牛和蜥蜴"。


    图2-7 `unorderedlist.php`输出


    标题标签和列表都有许多其他选项。有关更多信息，请访问一个免费的教程网站，例如[w3schools.com](http://w3schools.com)。


    ## 制作动态网站导航


    我们必须在正确的时间显示正确的视图。我们可以用几行代码制作一个全局的、*持久的站点导航*，即一个在网站每个页面都相同的导航。因为PHP可以包含文件，我们可以将导航代码存储在一个文件中，并将其包含在每个需要它的脚本中。将其保存为单独文件的一个优点是，可以更改该文件中的导航，并且更改会自动反映在每个站点页面上，无论存在多少页面。让我们在`views`文件夹中创建我们的新文件`navigation.php`，其代码如清单2-13所示。


    ```

    My skills and background

    Some projects


    ";

    ?>

    Listing 2-13

    navigation.php

    ```


    整个导航字符串用双引号分隔。我们使用单引号来分隔`href`属性值。双引号（甚至单引号）不能放在其他双引号（或单引号）内。这会混淆解释器。它将无法确定字符串的开始和结束位置。尝试这样做会导致错误。


    ### HTML 回顾


    HTML标签`<nav>`用于标识页面内的任何导航。`<a href>`标签将在页面内创建一个超链接。要显示的页面包含在等号之后的引号内。要点击的文本放在实际标签之间。可以使用下面讨论的*HTTP
    GET*方法将附加信息传递给被调用的页面。


    我们现在需要将导航添加到`newerindex.php`文件中。我们将此文件重命名为`indexnav.php`。


    ```

    title = "Thomas Blom Hansen: Portfolio site";

    $pageData->content = $nav;

    require "templates/newerpage.php";

    echo $page;

    ?>

    Listing 2-14

    indexnav.php

    ```


    我们使用`include_once`，因为虽然导航会使我们的页面功能完整，但如果导航缺失，我们仍然可以显示有价值的信息。使用`once`选项确保导航在页面上只出现一次，即使我们错误地尝试再次包含导航文件。让我们保存并运行代码。我们应该看到一个带有导航的页面。暂时不要期望看到任何视图。


    ## 使用 PHP 传递信息


    传递数据的能力是动态网页与静态网页的区别所在。通过根据用户的选择定制体验，我们能够为网站增加全新的价值。


    我们有两种选择来传递信息：HTTP GET 和 HTTP POST。


    *   **HTTP GET**：通过在URL行中创建URL变量来传递信息。这不需要额外的服务器内存，但确实会将传递的信息暴露给网站的所有用户。

    *   **HTTP POST**：信息被传递到服务器内存。然后PHP程序可以从内存中检索信息。虽然我们不想说这种信息比HTTP变量更安全，但它不会显示给每个用户看。然而，由于此过程使用服务器内存，对于高流量网站，如果可能的话，HTTP
    GET可能是更好的选择。例如，谷歌使用HTTP GET传递搜索信息，因为这不是安全信息，因此不需要使用服务器内存。


    由于我们的信息不需要高级别的安全措施，我们将通过*URL变量*使用HTTP GET方法将其传递给PHP。在清单2-13中，我们在导航中看到了两个URL变量。让我们仔细看看导航`<a>`元素中的`href`属性。


    ```

    newindexnav.php?page=skills

    newindexnav.php?page=projects

    ```


    `href`表示点击导航项将加载`newindexnav.php`（此页面将很快创建）并将单词`skills`或`projects`放入名为`page`的*URL变量*中。如果点击一个链接，名为`page`的URL变量将获得值`skills`。如果点击另一个链接，`page`将获得值`projects`。我们的PHP程序可以访问URL变量并使用它来确定正确时间显示的正确页面视图。URL变量是动态站点的命脉。


    ### 访问URL变量


    为了访问URL变量，我们使用*$_GET超全局数组*。以下是我们如何在新的`newindexnav.php`程序中使用它的方法。


    ```

    title = "Thomas Blom Hansen: Portfolio site";

    $pageData->content = $nav;

    //changes begin here

    $navigationIsClicked = isset($_GET[''page'']);

    if ($navigationIsClicked ) {

    $fileToLoad = $_GET[''page''];

    $pageData->content .= "Will soon load $fileToLoad.php";

    }

    //end of changes

    require "templates/newerpage.php";

    echo $page;

    ?>

    Listing 2-15

    newindexnav.php

    ```


    添加到代码中的这几行实际上完成了相当多的工作！我们使用HTTP GET来访问我们的URL变量。要访问名为`page`的URL变量的值，我们使用PHP指令`$_GET[''page'']`。`page`中包含的值（`skills`或`projects`）随后被保存到变量`$fileToLoad`中。记住，这个值是根据用户是点击了请求`skills`还是`projects`的链接来设置的。只有当用户点击了导航项之一时，才会存在名为`page`的URL变量。


    ### 使用 `isset()` 测试变量是否已设置


    如果我们尝试使用一个不存在的变量，将会触发PHP错误。因此，在尝试访问变量之前，我们应该确保该变量已设置。PHP有一个语言结构（`isset()`）用于此目的。我们已经看到它在实际应用中的使用。


