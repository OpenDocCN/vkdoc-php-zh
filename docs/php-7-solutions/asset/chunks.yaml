- fmt: "# Telling the Server to Process PHP\n\nPHP is a **server-side language**.\
    \ The web server—usually Apache—processes your PHP code and sends only the results,\
    \ usually as HTML, to the browser. Because all the action is on the server, you\
    \ need to tell it that your pages contain PHP code. This involves two simple steps:\n\
    \n- Give every page a PHP filename extension; the default is `.php`. Use a different\
    \ extension only if you are specifically told to do so by your hosting company.\n\
    - Identify all PHP code with PHP tags.\n\nThe opening tag is `<?php` and the closing\
    \ tag is `?>`. If you put the tags on the same line as surrounding code, there\
    \ doesn’t need to be a space before the opening tag or after the closing one,\
    \ but there must be a space after the `php` in the opening tag like this:\n\n\
    ```text\nThis is HTML with embedded PHP.\n```\n\nWhen inserting more than one\
    \ line of PHP, it’s a good idea to put the opening and closing tags on separate\
    \ lines for the sake of clarity.\n\nYou may come across `<?` as an alternative\
    \ short version of the opening tag. However, `<?` isn’t enabled on all servers.\
    \ Stick with `<?php`, which is guaranteed to work. When a file contains only PHP\
    \ code, it’s strongly recommended to omit the closing PHP tag. This avoids potential\
    \ problems when working with include files (see Chapter [5](#332054_4_En_5_Chapter.xhtml)).\n\
    \n> **Note**  \n> To save space, most examples in this book omit the PHP tags.\
    \ You must always use them when writing your own scripts or embedding PHP into\
    \ a web page.\n\n## Embedding PHP in a Web Page\n\nPHP is an **embedded language**.\
    \ This means that you can insert blocks of PHP code inside ordinary web pages.\
    \ When somebody visits your site and requests a PHP page, the server sends it\
    \ to the PHP engine, which reads the page from top to bottom looking for PHP tags.\
    \ HTML and JavaScript pass through untouched, but whenever the PHP engine encounters\
    \ a `<?php` tag, it starts processing your code and continues until it reaches\
    \ the closing `?>` tag (or the end of the script if nothing follows the PHP code).\
    \ If the PHP produces any output, it’s inserted at that point.\n\n> **Tip**  \n\
    > A page can have multiple PHP code blocks, but they cannot be nested inside each\
    \ other.\n\nFigure [3-1](#332054_4_En_3_Chapter.xhtml#Fig1) shows a block of PHP\
    \ code embedded in an ordinary web page and what it looks like in a browser and\
    \ in a page-source view after it has been passed through the PHP engine. The code\
    \ calculates the current year, checks whether it’s different from a fixed year\
    \ (represented by `$startYear` in line 26 of the code on the left of the figure),\
    \ and displays the appropriate year range in a copyright statement. As you can\
    \ see from the page-source view at the bottom right of the figure, there’s no\
    \ trace of PHP in what’s sent to the browser.\n\n![../images/332054_4_En_3_Chapter/332054_4_En_3_Fig1_HTML.jpg](images/332054_4_En_3_Chapter/332054_4_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1. The PHP code remains on the server; only the output is sent to the\
    \ browser\n\n> **Tip**  \n> PHP doesn’t always produce direct output for the browser.\
    \ It may, for instance, check the contents of form input before sending an email\
    \ message or inserting information into a database. Therefore, some code blocks\
    \ are placed above or below the main HTML code, or in external files. Code that\
    \ produces direct output, however, goes where you want the output to be displayed.\n\
    \n## Storing PHP in an External File\n\nAs well as embedding PHP in HTML, it’s\
    \ common practice to store frequently used code in separate files. When a file\
    \ contains only PHP code, the opening `<?php` tag is mandatory, but the closing\
    \ `?>` tag is optional. In fact, the recommended practice is to leave out the\
    \ closing PHP tag. However, you *must* use the closing `?>` tag if the external\
    \ file contains HTML after the PHP code.\n\n## Using Variables to Represent Changing\
    \ Values\n\nThe code in Figure [3-1](#332054_4_En_3_Chapter.xhtml#Fig1) probably\
    \ looks like a very long-winded way to display a range of years. But the PHP solution\
    \ saves you time in the long run. Instead of your needing to update the copyright\
    \ statement every year, the PHP code does it automatically. You write the code\
    \ once and forget it. What’s more, as you’ll see in Chapter [5](#332054_4_En_5_Chapter.xhtml),\
    \ if you store the code in an external file, any changes to the external file\
    \ are reflected on every page of your site.\n\nThis ability to display the year\
    \ automatically relies on two key aspects of PHP: **variables** and **functions**.\
    \ As the name suggests, functions do things; they perform preset tasks, such as\
    \ getting the current date and converting it into human-readable form. I’ll cover\
    \ functions a little later, so let’s work on variables first. The script in Figure\
    \ [3-1](#332054_4_En_3_Chapter.xhtml#Fig1) contains two variables: `$startYear`\
    \ and `$thisYear`.\n\n> **Tip**  \n> A **variable** is simply a name that you\
    \ give to something that may change or that you don’t know in advance. Variables\
    \ in PHP always begin with `$` (a dollar sign).\n\nWe use variables all the time\
    \ in everyday life without thinking about it. When you meet somebody for the first\
    \ time, you might ask “What’s your name?” It doesn’t matter whether the person\
    \ is called Tom, Dick, or Harriet, the word “name” remains constant. Similarly,\
    \ with your bank account, money goes in and out all the time (mostly out, it seems),\
    \ but as Figure [3-2](#332054_4_En_3_Chapter.xhtml#Fig2) shows, it doesn’t matter\
    \ whether you’re scraping the bottom of the barrel or as rich as Croesus, the\
    \ amount available is always called the balance.\n\n![../images/332054_4_En_3_Chapter/332054_4_En_3_Fig2_HTML.jpg](images/332054_4_En_3_Chapter/332054_4_En_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2. The balance on your bank statement is an everyday example of a variable—the\
    \ name stays the same, even though the value may change from day to day\n\nSo,\
    \ “name” and “balance” are everyday variables. Just put a dollar sign in front\
    \ of them and you have two ready-made PHP variables, like this:\n\n```php\n$name\n\
    $balance\n```\n\nSimple.\n\n### Naming Variables\n\nYou can name a variable just\
    \ about anything you like, as long as you keep the following rules in mind:\n\n\
    - Variables always begin with a dollar sign (`$`).\n- Valid characters are letters,\
    \ numbers, and the underscore.\n- The first character after the dollar sign must\
    \ be a letter or the underscore (`_`).\n- No spaces or punctuation marks are allowed,\
    \ except for the underscore.\n- Variable names are case-sensitive: `$startYear`\
    \ and `$startyear` are not the same.\n\nWhen naming variables, choose something\
    \ that tells you what it’s for. The variables you’ve seen so far—`$startYear`,\
    \ `$thisYear`, `$name`, and `$balance`—are good examples. It’s a good idea to\
    \ capitalize the first letter of the second or subsequent words when combining\
    \ them (sometimes called **camel case**). Alternatively, you can use an underscore\
    \ (`$start_year`, `$this_year`, etc.).\n\n> **Tip**  \n> Accented characters commonly\
    \ used in Western European languages are valid in variables. For example, `$prénom`\
    \ and `$förnamn` are acceptable. In practice, you can also use other alphabets,\
    \ such as Cyrillic, and nonalphabetic scripts, such as Japanese kanji, in variable\
    \ names in PHP 7; but at the time of this writing, such use is undocumented, so\
    \ I recommend sticking to the preceding rules.\n\nDon’t try to save time by using\
    \ really short variables. Using `$sy`, `$ty`, `$n`, and `$b` instead of the more\
    \ descriptive ones makes code harder to understand—and that makes it hard to write.\
    \ More important, it makes errors more difficult to spot. As always, there are\
    \ exceptions to a rule. By convention, `$i`, `$j`, and `$k` are frequently used\
    \ to keep count of the number of times a loop has run, and `$e` and `$t` are used\
    \ in error checking. You’ll see examples of these later in this chapter."
  raw: "### Telling the server to process PHP\n\nPHP is a **server-side language**\
    \ . The web server—usually Apache—processes your PHP code and sends only the results,\
    \ usually as HTML, to the browser. Because all the action is on the server, you\
    \ need to tell it that your pages contain PHP code. This involves two simple steps:\n\
    \n*   Give every page a PHP filename extension; the default is `.php`. Use a different\
    \ extension only if you are specifically told to do so by your hosting company.\n\
    \n*   Identify all PHP code with PHP tags.\n\nThe opening tag is `<?php` and the\
    \ closing tag is `?>`. If you put the tags on the same line as surrounding code,\
    \ there doesn’t need to be a space before the opening tag or after the closing\
    \ one, but there must be a space after the `php` in the opening tag like this:\n\
    \n```\nThis is HTML with embedded PHP.\n```\n\nWhen inserting more than one line\
    \ of PHP, it’s a good idea to put the opening and closing tags on separate lines\
    \ for the sake of clarity.\n\n```\nYou may come across `<?` as an\nalternative\
    \ short version of the opening tag. However, `<?` isn’t enabled\non all servers.\
    \ Stick with `<?php`, which is\nguaranteed to work.\nWhen a file contains only\
    \ PHP code, it’s strongly recommended to omit\nthe closing PHP tag. This avoids\
    \ potential problems when working with\ninclude files (see Chapter [5](#332054_4_En_5_Chapter.xhtml)).\n\
    \nNote\nTo save space, most examples in this book omit the PHP tags. You must\n\
    always use them when writing your own scripts or embedding PHP into a\nweb page.\n\
    \nEmbedding PHP in a Web Page\nPHP is an **embedded** language . This means that\
    \ you\ncan insert blocks of PHP code inside ordinary web pages. When somebody\n\
    visits your site and requests a PHP page, the server sends it to the PHP\nengine,\
    \ which reads the page from top to bottom looking for PHP tags.\nHTML and JavaScript\
    \ pass through untouched, but whenever the PHP engine\nencounters a `<?php` tag,\
    \ it\nstarts processing your code and continues until it reaches the closing\n\
    `?>` tag (or\nthe end of the script if nothing follows the PHP code). If the PHP\n\
    produces any output, it’s inserted at that point.\n\nTip\nA page can have multiple\
    \ PHP code blocks, but they cannot be nested\ninside each other.\n\nFigure [3-1](#332054_4_En_3_Chapter.xhtml#Fig1)\
    \ shows a block of\nPHP code embedded in an ordinary web page and what it looks\
    \ like in a\nbrowser and in a page-source view after it has been passed through\
    \ the\nPHP engine. The code calculates the current year, checks whether it’s\n\
    different from a fixed year (represented by `$startYear` in line 26\nof the code\
    \ on the left of the figure), and displays the appropriate\nyear range in a copyright\
    \ statement. As you can see from the page-source\nview at the bottom right of\
    \ the figure, there’s no trace of PHP in\nwhat’s sent to the browser.\n\n![../images/332054_4_En_3_Chapter/332054_4_En_3_Fig1_HTML.jpg](images/332054_4_En_3_Chapter/332054_4_En_3_Fig1_HTML.jpg)\n\
    \nFigure 3-1.\nThe PHP code remains on the server; only the output is sent to\
    \ the\nbrowser\n\nTip\nPHP doesn’t always produce direct output for the browser.\
    \ It may, for\ninstance, check the contents of form input before sending an email\n\
    message or inserting information into a database. Therefore, some code\nblocks\
    \ are placed above or below the main HTML code, or in external\nfiles. Code that\
    \ produces direct output, however, goes where you want\nthe output to be displayed.\n\
    \nStoring PHP in an External File\nAs well as embedding PHP in HTML, it’s common\n\
    practice to store frequently used code in separate files. When a file\ncontains\
    \ only PHP code, the opening `<?php` tag is\nmandatory, but the closing `?>` tag\
    \ is\noptional. In fact, the recommended practice is to leave out the closing\n\
    PHP tag. However, you *must* use the closing `?>` tag if the\nexternal file contains\
    \ HTML after the PHP code.\n\nUsing Variables to Represent Changing Values\nThe\
    \ code in Figure [3-1](#332054_4_En_3_Chapter.xhtml#Fig1) probably looks\nlike\
    \ a very long-winded way to display a range of years. But the PHP\nsolution saves\
    \ you time in the long run. Instead of your needing to\nupdate the copyright statement\
    \ every year, the PHP code does it\nautomatically. You write the code once and\
    \ forget it. What’s more, as\nyou’ll see in Chapter [5](#332054_4_En_5_Chapter.xhtml),\
    \ if you store the code in an\nexternal file, any changes to the external file\
    \ are reflected on every\npage of your site.\nThis ability to display the year\
    \ automatically relies on two key\naspects of PHP: **variables** and\n**functions**\n\
    . As the name suggests, functions do things; they perform preset\ntasks, such\
    \ as getting the current date and converting it into\nhuman-readable form. I’ll\
    \ cover functions a little later, so let’s work\non variables first. The script\
    \ in Figure [3-1](#332054_4_En_3_Chapter.xhtml#Fig1) contains two\nvariables:\
    \ `$startYear` and `$thisYear`.\n\nTip\nA **variable** is simply a name that you\
    \ give to\nsomething that may change or that you don’t know in advance. Variables\n\
    in PHP always begin with `$` (a dollar\nsign).\n\nWe use variables all the time\
    \ in everyday life without thinking about\nit. When you meet somebody for the\
    \ first time, you might ask “What’s\nyour name?” It doesn’t matter whether the\
    \ person is called Tom, Dick, or\nHarriet, the word “name” remains constant. Similarly,\
    \ with your bank\naccount, money goes in and out all the time (mostly out, it\
    \ seems), but\nas Figure [3-2](#332054_4_En_3_Chapter.xhtml#Fig2) shows, it\n\
    doesn’t matter whether you’re scraping the bottom of the barrel or as\nrich as\
    \ Croesus, the amount available is always called the balance.\n\n![../images/332054_4_En_3_Chapter/332054_4_En_3_Fig2_HTML.jpg](images/332054_4_En_3_Chapter/332054_4_En_3_Fig2_HTML.jpg)\n\
    \nFigure 3-2.\nThe balance on your bank statement is an everyday example of a\n\
    variable—the name stays the same, even though the value may change from\nday to\
    \ day\n\nSo, “name” and “balance” are everyday variables. Just put a dollar sign\n\
    in front of them and you have two ready-made PHP variables, like this:\n\n```\n\
    $name\n$balance\n```\n\nSimple.\n\nNaming\nvariables\n\nYou can name a variable\
    \ just about anything you like, as long as you\nkeep the following rules in mind:\n\
    \n*   Variables always begin with a dollar sign (`$`).\n\n*   Valid characters\
    \ are letters, numbers, and the\n    underscore.\n\n*   The first character after\
    \ the dollar sign must be a letter or the\n    underscore(`_`).\n\n*   No spaces\
    \ or punctuation marks are allowed, except for the\n    underscore.\n\n*   Variable\
    \ names are case-sensitive: `$startYear` and `$startyear` are not\n    the same.\n\
    \nWhen naming variables, choose something that tells you what it’s for.\nThe variables\
    \ you’ve seen so far—`$startYear`, `$thisYear`, `$name`, and `$balance`—are good\n\
    examples. It’s a good idea to capitalize the first letter of the second\nor subsequent\
    \ words when combining them (sometimes called **camel\ncase**). Alternatively,\
    \ you can use an underscore (`$start_year`, `$this_year`,\netc.).\n\nTip\nAccented\
    \ characters commonly used in Western European languages are\nvalid in variables.\
    \ For example, `$prénom` and `$förnamn` are\nacceptable. In practice, you can\
    \ also use other alphabets, such as\nCyrillic, and nonalphabetic scripts, such\
    \ as Japanese kanji, in variable\nnames in PHP 7; but at the time of this writing,\
    \ such use is\nundocumented, so I recommend sticking to the preceding rules.\n\
    \nDon’t try to save time by using really short variables. Using `$sy`, `$ty`,\
    \ `$n`, and `$b` instead of the\nmore descriptive ones makes code harder to understand—and\
    \ that makes it\nhard to write. More important, it makes errors more difficult\
    \ to spot.\nAs always, there are exceptions to a rule. By convention, `$i`, `$j`,\
    \ and `$k` are frequently\nused to keep count of the number of times a loop has\
    \ run, and `$e` and `$t` are used in error\nchecking. You’ll see examples of these\
    \ later in this chapter."
  trans: "\n# 告知服务器处理 PHP\n\nPHP 是一种**服务器端语言**。Web 服务器（通常是 Apache）会处理你的 PHP 代码，并且只将结果（通常为\
    \ HTML）发送到浏览器。由于所有操作都在服务器端进行，你需要告诉服务器你的页面包含 PHP 代码。这涉及两个简单的步骤：\n\n-   为每个页面指定一个\
    \ PHP 文件扩展名；默认是 `.php`。只有在托管公司明确要求时，才使用其他扩展名。\n-   使用 PHP 标签标识所有 PHP 代码。\n\n起始标签是\
    \ `<?php`，结束标签是 `?>`。如果你将标签与周围代码放在同一行，起始标签前或结束标签后不需要有空格，但起始标签中的 `php` 后面必须有一个空格，如下所示：\n\
    \n```text\n这是嵌入了 PHP 的 HTML。\n```\n\n当插入多行 PHP 代码时，为了清晰起见，最好将起始和结束标签分别放在单独的行上。\n\
    \n你可能会遇到 `<?` 作为起始标签的短格式替代版本。然而，并非所有服务器都启用了 `<?`。请坚持使用 `<?php`，这能保证正常工作。当一个文件只包含\
    \ PHP 代码时，强烈建议省略结束的 PHP 标签。这可以避免在处理包含文件时出现潜在问题（参见第 5 章）。\n\n> **注意**  \n> 为了节省篇幅，本书中的大多数示例都省略了\
    \ PHP 标签。在你编写自己的脚本或将 PHP 嵌入网页时，必须始终使用它们。\n\n## 在网页中嵌入 PHP\n\nPHP 是一种**嵌入式语言**。这意味着你可以在普通网页中插入\
    \ PHP 代码块。当有人访问你的网站并请求一个 PHP 页面时，服务器会将其发送给 PHP 引擎，该引擎从上到下读取页面，寻找 PHP 标签。HTML 和\
    \ JavaScript 会原封不动地通过，但只要 PHP 引擎遇到 `<?php` 标签，它就会开始处理你的代码，并一直持续到遇到结束的 `?>` 标签（或者如果\
    \ PHP 代码之后没有内容，则持续到脚本末尾）。如果 PHP 产生了任何输出，它就会在该位置插入。\n\n> **提示**  \n> 一个页面可以有多个\
    \ PHP 代码块，但它们不能互相嵌套。\n\n图 3-1 显示了一个嵌入在普通网页中的 PHP 代码块，以及它在浏览器中以及经过 PHP 引擎处理后的页面源代码视图中的样子。该代码计算当前年份，检查它是否与一个固定年份（由图中左侧代码第\
    \ 26 行的 `$startYear` 表示）不同，并在版权声明中显示适当的年份范围。从图右下角的页面源代码视图中可以看到，发送给浏览器的内容中没有任何\
    \ PHP 的痕迹。\n\n![../images/332054_4_En_3_Chapter/332054_4_En_3_Fig1_HTML.jpg](img/332054_4_En_3_Fig1_HTML.jpg)\n\
    \n图 3-1. PHP 代码保留在服务器上；只有输出被发送到浏览器\n\n> **提示**  \n> PHP 并不总是直接为浏览器生成输出。例如，它可能在发送电子邮件或向数据库插入信息之前，检查表单输入的内容。因此，某些代码块被放置在主要\
    \ HTML 代码的上方或下方，或者放在外部文件中。然而，产生直接输出的代码，则应放在你想要显示输出的位置。\n\n## 将 PHP 存储在外部文件中\n\n\
    除了将 PHP 嵌入到 HTML 中，将常用代码存储在单独的文件中也是常见做法。当一个文件只包含 PHP 代码时，起始的 `<?php` 标签是必须的，但结束的\
    \ `?>` 标签是可选的。事实上，推荐的做法是省略结束的 PHP 标签。但是，如果外部文件在 PHP 代码之后包含了 HTML，那么你*必须*使用结束的\
    \ `?>` 标签。\n\n## 使用变量表示变化的值\n\n图 3-1 中的代码看起来可能是一种非常冗长的显示年份范围的方式。但从长远来看，PHP 解决方案可以节省你的时间。无需每年手动更新版权声明，PHP\
    \ 代码会自动完成。你只需编写一次代码，之后就可以不管了。更重要的是，正如你将在第 5 章中看到的，如果你将代码存储在外部文件中，对该外部文件的任何更改都会反映在你网站的每个页面上。\n\
    \n这种自动显示年份的能力依赖于 PHP 的两个关键方面：**变量**和**函数**。顾名思义，函数用于执行操作；它们执行预设的任务，例如获取当前日期并将其转换为人类可读的格式。我稍后会介绍函数，所以让我们先来学习变量。图\
    \ 3-1 中的脚本包含了两个变量：`$startYear` 和 `$thisYear`。\n\n> **提示**  \n> **变量**只是你赋予某个可能变化或你事先不知道的事物的一个名称。PHP\
    \ 中的变量总是以 `$`（美元符号）开头。\n\n我们在日常生活中一直在使用变量，却没有意识到。当你第一次见到某人时，你可能会问“你叫什么名字？”不管这个人叫汤姆、迪克还是哈丽特，“名字”这个词是恒定不变的。类似地，对于你的银行账户，资金进进出出（看起来大多是出去），但如图\
    \ 3-2 所示，无论你是穷得叮当响还是富甲一方，可用的金额始终被称为余额。\n\n![../images/332054_4_En_3_Chapter/332054_4_En_3_Fig2_HTML.jpg](img/332054_4_En_3_Fig2_HTML.jpg)\n\
    \n图 3-2. 银行对账单上的余额是变量的日常例子——名称保持不变，即使价值可能每天都在变化\n\n所以，“名字”和“余额”是日常生活中的变量。只需在它们前面加上一个美元符号，你就得到了两个现成的\
    \ PHP 变量，如下所示：\n\n```php\n$name\n$balance\n```\n\n很简单。\n\n### 命名变量\n\n只要你记住以下规则，你可以任意命名变量：\n\
    \n-   变量总是以美元符号（`$`）开头。\n-   有效字符是字母、数字和下划线。\n-   美元符号后的第一个字符必须是字母或下划线（`_`）。\n\
    -   除了下划线外，不允许有空格或标点符号。\n-   变量名区分大小写：`$startYear` 和 `$startyear` 是不同的。\n\n在命名变量时，选择能表明其用途的名称。你目前看到的变量——`$startYear`、`$thisYear`、`$name`\
    \ 和 `$balance`——都是很好的例子。组合多个单词时，将第二个或后续单词的首字母大写是一个好习惯（有时称为**驼峰命名法**）。或者，你可以使用下划线（`$start_year`、`$this_year`\
    \ 等）。\n\n> **提示**  \n> 西欧语言中常用的带重音的字符在变量中是有效的。例如，`$prénom` 和 `$förnamn` 是可以接受的。实际上，在\
    \ PHP 7 中，你还可以在变量名中使用其他字母表，如西里尔字母，以及非字母文字，如日语汉字；但在撰写本文时，这种用法尚未有文档记录，因此我建议坚持使用前面的规则。\n\
    \n不要试图通过使用非常短的变量名来节省时间。使用 `$sy`、`$ty`、`$n` 和 `$b` 而不是更具描述性的名称，会使代码难以理解——这也会使编写变得困难。更重要的是，它使得错误更难以发现。像往常一样，任何规则都有例外。按照惯例，`$i`、`$j`\
    \ 和 `$k` 经常用于记录循环运行的次数，而 `$e` 和 `$t` 用于错误检查。你将在本章后面看到这些示例。\n"
- fmt: "> **Caution**  \nAlthough you have considerable freedom in the choice of variable\
    \ names, you can’t use `$this`, because it has a special meaning in PHP object-oriented\
    \ programming. It’s also advisable to avoid using any of the keywords listed at\
    \ [`https://secure.php.net/manual/en/reserved.php`](https://secure.php.net/manual/en/reserved.php).\n\
    \n## Assigning values to variables\n\nVariables get their values from a variety\
    \ of sources, including the following:\n\n- User input through online forms\n\
    - A database\n- An external source, such as a news feed or XML file\n- The result\
    \ of a calculation\n- Direct inclusion in the PHP code\n\nWherever the value comes\
    \ from, it’s always assigned with an equal sign (`=`), like this:\n\n```php\n\
    $variable = value;\n```\n\nThe variable goes on the left of the equal sign, and\
    \ the value goes on the right. Because it assigns a value, the equal sign is called\
    \ the **assignment operator**.\n\n> **Caution**  \n> Familiarity with the equal\
    \ sign from childhood makes it difficult to get out of the habit of thinking that\
    \ it means “is equal to.” However, PHP uses two equal signs (`==`) to signify\
    \ equality. This is a major cause of beginner mistakes, and it sometimes catches\
    \ more experienced developers, too. The difference between `=` and `==` is covered\
    \ in more detail later in this chapter.\n\n## Ending commands with a semicolon\n\
    \nPHP is written as a series of commands or statements. Each statement normally\
    \ tells the PHP engine to perform an action, and it must always be followed by\
    \ a semicolon, like this:\n\n```php\necho \"Hello, World!\";\n```\n\nAs with all\
    \ rules, there is an exception: you can omit the semicolon after the last statement\
    \ in a code block. However, **don’t do it** except when using the short `echo`\
    \ tag as described later in this chapter. Unlike JavaScript, PHP won’t assume\
    \ there should be a semicolon at the end of a line if you leave it out. This has\
    \ a nice side effect: you can spread long statements over several lines for ease\
    \ of reading. PHP, like HTML, ignores whitespace in code. Instead, it relies on\
    \ semicolons to indicate where one command ends and the next one begins.\n\n>\
    \ **Tip**  \n> A missing semicolon will bring your script to a grinding halt.\n\
    \n## Commenting scripts\n\nPHP treats everything as statements to be executed\
    \ unless you mark a section of code as a comment. The following three reasons\
    \ explain why you may want to do this:\n\n- To insert a reminder of what the script\
    \ does\n- To insert a placeholder for code to be added later\n- To disable a section\
    \ of code temporarily\n\nWhen a script is fresh in your mind, it may seem unnecessary\
    \ to insert anything that isn’t going to be processed. However, if you need to\
    \ revise the script several months later, you’ll find comments much easier to\
    \ read than trying to follow the code on its own. Comments are also vital when\
    \ you’re working in a team. They help your colleagues understand what the code\
    \ is intended to do.\n\nDuring testing, it’s often useful to prevent a line of\
    \ code, or even a whole section, from running. PHP ignores anything marked as\
    \ a comment, so this is a useful way of turning on and off code.\n\nThere are\
    \ three ways of adding comments: two for single-line comments and one for comments\
    \ that stretch over several lines.\n\n### Single-line comments\n\nThe most common\
    \ type of single-line comment begins with two forward slashes, like this:\n\n\
    ```php\n// this is a comment and will be ignored by the PHP engine\n```\n\nPHP\
    \ ignores everything from the double slashes to the end of the line, so you can\
    \ also place comments alongside code (but only to the right):\n\n```php\n$startYear\
    \ = 2018; // this is a valid comment\n```\n\nComments aren’t PHP statements, so\
    \ they don’t end with a semicolon. But don’t forget the semicolon at the end of\
    \ a PHP statement that’s on the same line as a comment.\n\nAn alternative style\
    \ uses the hash or pound sign (`#`), like this:\n\n```php\n# this is another type\
    \ of comment that will be ignored by the PHP engine\n$startYear = 2018; # this\
    \ also works as a comment\n```\n\nThis style of commenting often indicates sections\
    \ of a longer script, like this:\n\n```php\n##################\n## Menu section\
    \ ##\n##################\n```\n\n### Multiline comments\n\nFor a comment to stretch\
    \ over several lines, use the same style as in Cascading Style Sheets (CSS) and\
    \ JavaScript. Anything between `/*` and `*/` is treated as a comment, like this:\n\
    \n```php\n/* This is a comment that stretches\nover several lines. It uses the\
    \ same\nbeginning and end markers as in CSS. */\n```\n\nMultiline comments are\
    \ particularly useful when testing or troubleshooting, as they can be used to\
    \ disable long sections of script without the need to delete them.\n\n> **Tip**\
    \  \n> Good comments and well-chosen variable names make code easier to understand\
    \ and maintain.\n\n## Using arrays to store multiple values\n\nPHP lets you store\
    \ multiple values in a special type of variable called an **array**. A simple\
    \ way of thinking about arrays is that they’re like a shopping list. Although\
    \ each item might be different, you can refer to them collectively by a single\
    \ name. Figure 3-3 demonstrates this concept: the variable `$shoppingList` refers\
    \ collectively to all five items—wine, fish, bread, grapes, and cheese.\n\n![../images/332054_4_En_3_Chapter/332054_4_En_3_Fig3_HTML.jpg](images/332054_4_En_3_Chapter/332054_4_En_3_Fig3_HTML.jpg)\n\
    \n**Figure 3-3.** Arrays are variables that store multiple items, just like a\
    \ shopping list\n\nIndividual items—or **array elements** —are identified by means\
    \ of a number in square brackets immediately following the variable name. PHP\
    \ assigns the number automatically, but it’s important to note that the numbering\
    \ always begins at 0. So the first item in the array, wine in our example, is\
    \ referred to as `$shoppingList[0]`, not `$shoppingList[1]`. And although there\
    \ are five items, the last one (cheese) is `$shoppingList[4]`. The number is referred\
    \ to as the array **key** or **index**, and this type of array is called an **indexed\
    \ array**.\n\nPHP uses another type of array in which the key is a word (or any\
    \ combination of letters and numbers). For instance, an array containing details\
    \ of this book might look like this:\n\n```php\n$book['title'] = 'PHP 7 Solutions:\
    \ Dynamic Web Design Made Easy, Fourth Edition';\n$book['author'] = 'David Powers';\n\
    $book['publisher'] = 'Apress';\n```\n\nThis type of array is called an **associative\
    \ array**. Note that the array key is enclosed in quotes (single or double, it\
    \ doesn’t matter).\n\nArrays are an important and useful part of PHP. You’ll use\
    \ them a lot, starting with Chapter 5, when you’ll store details of images in\
    \ an array to display a random image on a web page. Arrays are also used extensively\
    \ with databases as you fetch the results of a search in a series of arrays.\n\
    \n> **Note**  \n> You can learn the various ways of creating arrays in Chapter\
    \ 4.\n\n## PHP’s built-in superglobal arrays\n\nPHP has several built-in arrays\
    \ that are automatically populated with useful information. They are called **superglobal\
    \ arrays**, and they normally begin with a dollar sign followed by an underscore.\
    \ The only exception is `$GLOBALS`, which contains references to all variables\
    \ in the **global scope** of the script (see “Variable scope—functions as black\
    \ boxes” in Chapter 4 for a description of scope).\n\nTwo superglobals that you\
    \ will see frequently are `$_POST` and `$_GET`. They contain information passed\
    \ from forms through the Hypertext Transfer Protocol (HTTP) `post` and `get` methods,\
    \ respectively. The superglobals are all associative arrays, and the keys of `$_POST`\
    \ and `$_GET` are automatically derived from the names of form elements or variables\
    \ in a query string at the end of a URL."
