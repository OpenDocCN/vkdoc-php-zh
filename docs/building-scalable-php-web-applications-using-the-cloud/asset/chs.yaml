  \ URL 的链接。你可以点击它，它会带你进入示例应用程序。\n\n在上传我们的应用程序之前，我们需要先设置数据库。为此，请进入“Configuration”部分，然后转到“Database”并点击“Modify”。这将允许你为应用程序创建一个\
