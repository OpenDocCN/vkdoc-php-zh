    **Timestamps**


    The way dates and times are handled in PHP, MySQL, and PostgreSQL is often misunderstood.


    Before we go any further, I will quickly cover some important points to be aware
    of when using dates and times in MySQL.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch03CMP4 11/13/07 9:37 PM Page 48


    **48**


    C H A P T E R 3 ■ U S E R A U T H E N T I C AT I O N, A U T H O R I Z AT I O N,
    A N D M A N A G E M E N T


    MySQL does not store time zone information with its date and time data. This means
    that your MySQL server must be set to use the same time zone as PHP; otherwise
    you may notice odd behavior with timestamps. For example, if you want to use the
    PHP date() function to format a timestamp from a MySQL table, be cautious—if you
    use the MySQL unix_timestamp() function when retrieving that timestamp, the incorrect
    date will be retrieved if the time zones do not match up.


    There are three major drawbacks to using the date field types in MySQL:


    • If you need to move your database to another server (let’s say you change web
    hosts), the moved data will be incorrect if the server uses a different time zone.
    The server configuration would need to be modified, which most web hosts will
    not do for you.


    • Various issues can arise concerning when daylight savings starts and finishes
    (assuming your location uses daylight savings).


    • It is difficult to store timestamps from different time zones. You must convert
    all timestamps to the server time zone before inserting them.


    If you think these aren’t problems that will occur often, you are probably right,
    although here’s a practical example. A web application I wrote stored the complete
    schedule for a sports league (among other things). Week to week, all games took
    place in different cities, and therefore in different time zones. For accurate
    scheduling data to be output on the web application (for instance, “3 hours until
    game time”), the time zone data needed to be accurate.


    PostgreSQL does not have the datetime data type. Instead, I prefer to use the
    timestamptz column, which stores a date, time, and time zone. If you don’t specify
    the time zone when inserting a value into this column, it uses the server’s time
    zone (for instance, both 2007-04-18


    23:32:00 and 2007-04-18 23:32:00+09:30 are valid; the former will use the server’s
    time zone and the latter will use +09:30).


    In the sports schedule example, I used PostgreSQL, which allowed me to easily
    store the time zone of the game. PostgreSQL’s equivalent of unix_timestamp(ts_column)
    is extract(epoch from ts_column). Using timestamptz, this returns an accurate
    value that can be used in PHP’s date() function. It also seamlessly deals with
    daylight savings.


    **User Profiles**


    You may have noticed that the users table (Listing 3-1) didn’t store any useful
    information about the user, such as their name or e-mail address. To store this
    data, we will create an extra table called users_profile.


    By using an extra table to store this information, we can easily store an arbitrary
    amount of information about the user without modifying the users table at all.
    For instance, we can store their name, e-mail address, phone number, location,
    favorite food, or anything else.


    Additionally, we can use this table to store preferences for each user.


    Each record in the users_profile table corresponds to a single user profile value.
    That is, one record will correspond to a user’s e-mail address, while another
    record will hold their name. There is slightly more overhead in retrieving this
    data at runtime, but the added flexibility makes it well worth it. All that is
    required in this table is three columns:


    • user_id: This column links the profile value to a record in users.


    • profile_key: This is the name of the profile value. For instance, we would use
    the value email here if the record holds an e-mail address.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


