- fmt: '# 创建 Git 仓库


    为了创建一个 Git 仓库，首先必须创建一个包含目录。我通过 SSH 登录到一台新配置的远程服务器。我打算在`/var/git`下创建我的仓库。一般来说，只有
    root 用户才能在那里创建和修改目录，因此我使用`sudo`运行以下命令：


    ```

    $ sudo mkdir -p /var/git/megaquiz

    $ cd /var/git/megaquiz/

    ```


    我创建了`/var/git`（作为我仓库的父目录）和一个名为`megaquiz`的示例项目子目录。现在我可以准备这个目录本身了：


    ```

    $ sudo git init --bare

    Initialized empty Git repository in /var/git/megaquiz/

    ```


    `--bare`标志告诉 Git 初始化一个没有工作目录的仓库。如果你试图推送到一个没有以这种方式创建的仓库，Git 会报错。


    目前，只有 root 用户才能在`/var/git`下进行操作。我可以创建一个名为`git`的用户和组，并将其设为该目录的所有者来改变这一情况：


    ```

    $ sudo adduser git

    $ sudo chown -R git:git /var/git

    ```


    ## 为本地用户准备仓库


    尽管这是一台指定的远程服务器，我也应该确保本地用户能够提交到仓库。如果不小心，这可能会导致所有权和权限问题（特别是对于拥有`sudo`权限的用户推送代码时）。


    ```

    $ sudo chmod -R g+rws /var/git

    ```


    这赋予了`git`组的成员对`/var/git`的写权限，并使此处创建的所有文件和目录都继承`git`组。现在，只要我确保他们是`git`组的成员，本地用户就能写入该仓库。不仅如此，任何创建的文件也将对该组的其他成员可写。


    你可以像这样将本地用户添加到`git`组：


    ```

    $ sudo usermod -aG git bob

    ```


    现在用户`bob`是`git`组的成员。


    ## 为用户提供访问权限


    上一节中提到的用户`bob`的所有者可以登录到服务器并从其 shell 中与仓库交互。不过，通常你不会希望为所有用户提供 shell 访问权限。无论如何，大多数用户会更倾向于利用
    Git 的分布式特性，并在本地处理他们克隆的数据。


    授予用户 SSH 访问权限的一种方法是通过公钥认证。为此，你首先需要获取用户的公共 SSH 密钥。用户可能已经拥有此密钥——在 Linux 机器上，他可能会在配置目录`.ssh`中的一个名为`id_rsa.pub`的文件中找到它。否则，他可以轻松生成一个新密钥。在类
    Unix 机器上，只需运行`ssh-keygen`命令并复制它生成的值即可：


    ```

    $ ssh-keygen

    $ cat .ssh/id_rsa.pub

    ```


    作为仓库管理员，我会要求你提供此密钥的副本。一旦我拿到了它，就必须将其添加到仓库服务器上`git`用户的 SSH 设置中。这只需将公钥粘贴到`.ssh/authorized_keys`文件中即可。在我设置第一个密钥时，可能需要创建`.ssh`配置目录（我从`git`用户的主目录运行这些命令）：


    ```

    $ mkdir .ssh

    $ chmod 0700 .ssh

    ```'
  raw: 'In order to create a Git repository, I must first create a containing

    directory. I log into a freshly provisioned remote server via SSH. I am

    going to create my repository under `/var/git`. Generally

    speaking, only the root user can create and modify directories there, so

    I run the following command using `sudo`:


    ```

    $ sudo mkdir -p /var/git/megaquiz

    $ cd /var/git/megaquiz/

    ```


    I create `/var/git`, a parent

    directory for my repositories, and a subdirectory for a sample project

    called `megaquiz`

    . Now I can prepare the directory itself:


    ```

    $ sudo git init --bare

    Initialized empty Git repository in /var/git/megaquiz/

    ```


    The `--bare flag`

    tells Git to initialize a repository without a working directory. Git

    will complain if you try to push to a repository that has not been

    created in this way.


    At the moment, only the root user can mess around under `/var/git`. I can

    change this by creating a user and a group named `git and making it the directory’s
    owner:`


    ```

    $ sudo adduser git

    $ sudo chown -R git:git /var/git

    ```


    Preparing the Repository for Local Users


    Although this is a designated remote server, I should also ensure that

    local users can commit to the repository. If you’re not careful, this

    can cause ownership and permissions issues (especially if users with

    `sudo` privileges

    push code).


    ```

    $ sudo chmod -R g+rws /var/git

    ```


    This gives members of the `git` group write

    access to `/var/git` and causes

    all files and directories created here to take on the `git` group. Now, as

    long as I ensure that they are members of the `git` group, local

    users will be able to write to the repository. Not only that, any files

    created will be writable by other members of the group.


    You can add a local user to the `git` group like this:


    ```

    $ sudo usermod -aG git bob

    ```


    Now user `bob` is

    a member of the `git` group.


    Providing Access to Users


    The owner of the `bob` user mentioned in

    the previous section can log into the server and interact with the

    repository from his shell. Generally, though, you won’t want to provide

    shell access to all your users. In any case, most users will prefer to

    take advantage of Git’s distributed nature and to work locally with

    their cloned data.


    One way to grant a user SSH access is via public-key authentication. To

    do this, you first need to acquire the user’s public SSH key. The user

    may already have this—on a Linux machine, he will probably find the key

    in the configuration directory, `.ssh`, in a file named

    i`d_rsa.pub`.

    Otherwise, he can easily generate a new key. On a Unix-like machine,

    this is a matter of running the `ssh-keygen` command

    and copying the value that it generates:


    ```

    $ ssh-keygen

    $ cat .ssh/id_rsa.pub

    ```


    As the repository administrator, I will have asked you for a copy of

    this key. Once I have it, I must add it to the `git` user’s SSH set up

    on the repository server. This is merely a matter of pasting the public

    key into the `.ssh/authorized_keys`

    file. I may need to create the `.ssh` configuration

    directory for the first key I set up (I am running these commands from

    the `git` user’s

    home directory):


    ```

    $ mkdir .ssh

    $ chmod 0700 .ssh'
