    to process the result sets.


    **Attaching and Detaching Behaviors**


    Whenever dealing with data, any application can get inundated with information.
    Not just in web development but in programming in general, managing memory and
    CPU load is essential for keeping the program running at optimum performance.
    In the case of web development, anything you can do to decrease the load on the
    server will improve the user experience, especially since speed is a factor when
    considering how a user interacts with the site. The model trims the amount of
    data that gets pulled from across the datasource by making use of detailed find
    conditions, recursive settings, and its bindModel() and unbindModel() functions.
    In a similar way the model can curb its load on the server by efficiently attaching
    or detaching behaviors. Other reasons for attaching and detaching behaviors exist
    that generally center on streamlining the application, whether to decrease server
    load or to clean up code. A few functions are built into the model to manage how
    much it uses behaviors and which behaviors get used.


    Detaching and Disabling Behaviors


    There are two ways to trim down a model’s use of a behavior: make the model “turn
    off”


    all a behavior’s callbacks or make the model stop completely from adopting the
    specified behavior. The disable() and detach() functions, respectively, perform
    these tasks. Simply provide an array containing the name of each behavior to be
    either disabled or detached from the current model. The only catch is that these
    functions are called through the Behaviors class:


    $this->Tag->Behaviors->detach(array(''Tree''));


    So, to completely remove a behavior from working in the current model, use the
    detach() function; to limit the callback responses the behavior will send to the
    model, use the disable() function. When disable() has been used, model functions
    may still use the behavior’s functions. Just remember that automatic callback
    processes, such as when a record is saved to the database, will not run; these
    processes will have to be called manually in the model.


    09775ch14final 7/1/08 9:57 PM Page 268


    **268**


    C H A P T E R 1 4 ■ D ATA S O U R C E S A N D B E H AV I O R S


    Attaching and Enabling Behaviors


    Just as with detach() and disable(), you can tell the model manually when and
    where to use certain behaviors. With enable(), you tell the model to allow the
    behavior to begin working during callbacks. This means that the model will automatically
    consult the behavior as it performs callback methods such as saving to the database
    or deleting a file from the database.


    The attach() function is used to start the behavior. Settings here are passed
    along just as in the $actsAs array. Simply format an array as you would the $actsAs
    property, and place it as the first parameter in this function.


    To test whether a specific behavior has been enabled or disabled (not necessarily
    attached or detached), use the enabled() function. This contains the name of a
    behavior and checks whether it is enabled in the model. The enabled() function
    will return either a true value or a false value indicating whether the specified
    behavior is enabled.


    **Writing Custom Behaviors**


    Conventionally, behaviors are used for extending the model, so they should not
    contain any logic that would normally appear in a controller or component. Here’s
    a simple checklist for determining whether the particular task or set of tasks
    ought to be performed by a behavior:


    • Does the task involve handling data for the model?


    • Does the task do more than perform data validation?


    • Does the task perform more than one query when fetching data?'
  trans: "\n# 翻译行为\n\n`Translate`行为也涉及更复杂的方法来将其集成到应用程序中。本行为的教程超出了本书的总体范围，因为它需要掌握另一种语言（以及英语）的知识。因此，请记住，如果您的项目需要复杂的数据映射来更改语言设置，那么`Translate`行为是您以动态方式使用这些方法的最佳选择。简而言之，`Translate`可以动态地映射字段名、路由等。\n\
    \n## 使用 Containable 行为\n\n通过向模型提供特定的查找条件，您可以有效地搜索数据库，并精确过滤掉结果集中不需要的内容。您不仅可以避免编写和循环复杂的查询，坚持使用\
    \ Cake 的模型函数，还可以使用规范化的数据库，并扩展您的应用程序以适应更复杂的模式。但面对所有这些可能性，您可能会注意到，构建能够与数据库协作并精确提供所需内容的查找条件，本身也可能变得困难。或者更糟的是，您可能会发现自己编写了复杂的循环或辅助函数来在视图中过滤数据，尤其是在处理复杂的多对多关联时。\n\
    \n最好让模型向控制器和视图提供精确的数据片段，但当使用复杂的关联时，必须采用额外的查找方法。这就是`Containable`行为发挥作用的地方——它对关联模型和记录应用过滤方法，使您在检索关联数据时能够更加具体。\n\
    \n与所有其他行为一样，`Containable`必须包含在`$actsAs`属性中。为了说明`Containable`的工作方式，考虑一下我们博客应用程序中一些表的排列方式：文章拥有多条评论，标签与文章是多对多关系，用户拥有多篇文章。现在，考虑这样一个场景：假设您想从`Post`模型基于特定的评论作者获取一篇文章。`Containable`使此操作变得简单。\n\
    \n在控制器中，您可以输入以下内容：\n\n```\n$this->Post->find('all', array('contain'=>'Comment.name\
    \ = \"Superman\"'));\n```\n\n这个字符串将返回所有包含评论且评论的`name`值为`Superman`的文章。\n\n`Containable`还可以“包含”关联模型，这意味着您可以将结果集限制为特定模型，而无需使用`unbindModel()`或更改递归参数。\n\
    \n例如，如果您想检索数据库中的所有文章，但只包含关联的评论（不包含关联的标签），`Containable`可以通过以下方式简化该操作：\n\n```\n\
    $this->Post->find('all',array('contain'=>'Comment'));\n```\n\n如果没有`Containable`，您需要使用`unbindModel()`来产生相同的结果，如下所示：\n\
    \n```\n$this->Post->undbindModel(array('hasAndBelongsToMany'=>'Tag'));\n$this->Post->find('all');\n\
    ```\n\n`Containable`还可以在关联的结果集中返回特定字段。例如，您可能只想要文章作者的姓名，而不需要用户表中的其他字段（例如密码和角色）。使用以下代码：\n\
    \n```\n$this->Post->find('all',array('contain'=>'User.username'));\n```\n\n仍会为您提供每篇文章的关联用户，但只包含`username`和`id`字段。以这种方式使用`Containable`返回的一篇文章的示例数组如下所示：\n\
    \n```\nArray\n(\n    [Post] => Array\n    (\n        [id] => 1\n        [name]\
    \ => 示例文章标题\n        [date] => 2008-12-01 00:00:00\n         => 示例内容。\n    )\n\
    \    [User] => Array\n    (\n        [id] => 1\n        [username] => 示例用户\n \
    \   )\n)\n```\n\n注意，`User`数组中只返回了`id`和`username`。使用`Containable`，您可以为模型执行的查找操作应用更具体的规则，并显著减少在应用程序中传递的数据量，更不用说在控制器或视图中处理结果集所需的工作量了。\n\
    \n## 附加和分离行为\n\n在处理数据时，任何应用程序都可能被信息淹没。不仅在 Web 开发中，在一般的编程中，管理内存和 CPU 负载对于保持程序以最佳性能运行至关重要。在\
    \ Web 开发中，任何可以减少服务器负载的措施都能改善用户体验，尤其是考虑到速度是用户与网站交互的一个因素。模型通过使用详细的查找条件、递归设置及其`bindModel()`和`unbindModel()`函数，来减少从数据源拉取的数据量。类似地，模型可以通过有效地附加或分离行为来减轻其服务器的负载。附加和分离行为还有其他原因，通常围绕着精简应用程序，无论是为了减少服务器负载还是清理代码。模型内置了一些函数来管理它对行为的使用程度以及使用哪些行为。\n\
    \n### 分离和禁用行为\n\n有两种方法可以减少模型对行为的使用：让模型“关闭”某个行为的所有回调，或者让模型完全停止采用指定的行为。`disable()`和`detach()`函数分别执行这些任务。只需提供一个包含每个行为名称的数组，这些行为将被禁用或从当前模型中分离。唯一的注意事项是这些函数通过`Behaviors`类调用：\n\
    \n```\n$this->Tag->Behaviors->detach(array('Tree'));\n```\n\n因此，要完全从当前模型中移除某个行为，请使用`detach()`函数；要限制行为将发送给模型的回调响应，请使用`disable()`函数。当使用了`disable()`时，模型函数可能仍然可以使用该行为的函数。只需记住，自动回调过程（例如将记录保存到数据库时）将不会运行；这些过程必须在模型中手动调用。\n\
    \n### 附加和启用行为\n\n与`detach()`和`disable()`一样，您可以手动告诉模型何时何地使用特定行为。使用`enable()`，您可以告诉模型允许该行为在回调期间开始工作。这意味着模型在执行回调方法（如保存到数据库或从数据库删除文件）时，将自动咨询该行为。\n\
    \n`attach()`函数用于启动行为。此处的设置与`$actsAs`数组中的设置一样传递。只需像设置`$actsAs`属性那样格式化一个数组，并将其作为此函数的第一个参数。\n\
    \n要测试特定行为是已启用还是已禁用（不一定是已附加或已分离），请使用`enabled()`函数。该函数接受一个行为名称，并检查该行为在模型中是否已启用。`enabled()`函数将返回`true`或`false`值，指示指定的行为是否已启用。\n\
    \n## 编写自定义行为\n\n按照惯例，行为用于扩展模型，因此它们不应包含通常出现在控制器或组件中的任何逻辑。以下是一个简单的清单，用于判断特定任务或一组任务是否应由行为执行：\n\
    \n-   该任务是否涉及为模型处理数据？\n-   该任务是否不仅仅执行数据验证？\n-   该任务在获取数据时是否执行了多个查询？\n"
