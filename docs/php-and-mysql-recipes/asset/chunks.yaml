    Recipe 15-6\. API Authentication


    Problem


    What is the best way to authenticate a user of an API?


    Solution


    First of all you should never send user names and passwords in clear text when
    you are calling an API, and you should never include any of the authentication
    parameters as part of the URI as that gets logged by the server. These should
    always be sent as headers or as part of the body.


    Providers of API’s will often issue an app key or other id that’s unique for each
    user. This is typically some sort of hash value that can’t be linked to a specific
    user account. Some sites also provide a secret code that should be used when generating
    a hash of the request, but the code should not be included with the request. The
    server will know the secret and it can generate the hash on the server side and
    compare it to the hash that was included with the request. If they match, the
    server can assume the requester is who they claim to be.


