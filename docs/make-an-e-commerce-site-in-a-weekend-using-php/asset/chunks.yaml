  trans: "\n所有现代浏览器——Chrome、IE7+、Firefox、Safari 和 Opera——都有一个内置的`XMLHttpRequest`对象。\n\
    \n向服务器发出异步请求时，您需要监视请求的状态以及请求的响应。为此，语句#6 中使用了一个名为`xmlhttp.onreadystatechange`的函数，它会持续检查请求的状态。\n\
    \n语句#7 中所示的`readyState`属性保存了服务器响应的状态。每次`readyState`发生变化时，都会执行`onreadystatechange`函数。以下是`readyState`属性的可能取值：\n\
    \n- 状态 0：请求未初始化\n- 状态 1：请求已建立\n- 状态 2：请求已发送\n- 状态 3：请求正在处理\n- 状态 4：请求已完成\n\n语句#7\
    \ 中的`status`属性表示 HTTP 请求的状态。如果`status`值为`500`，则表示服务器内部错误；`400`值表示错误请求；`401`表示未授权；`403`表示禁止访问；`404`表示未找到，依此类推。状态值`200`表示没有错误。`onreadystatechange`函数会检查请求的状态。如果`state`的值为`4`，则表示已收到完整的服务器响应。如果`status`的值为`200`，则表示响应没有错误，您可以继续处理它。\n\
    \n语句#8 访问具有`cartcountinfo`ID 的元素。`cartcountinfo`是添加到购物车图标后页眉中的`span`元素的 ID。通过此元素，将显示由`countcart.php`文件返回的购物车数量。\n\
    \n语句#9 显示欢迎消息以及用户的电子邮件地址（如果用户已登录且会话变量存在）。此外，如果用户已登录，语句#10 会显示“注销”链接，点击该链接将调用`logout.php`文件。\n\
    \n为了显示购物车中的商品数量，清单 4-4 中所示的`countcart.php`脚本会访问`cart`表中与站点访问者的会话 ID 匹配的商品，并返回获取的行数。\n\
    \n**清单 4-4。`countcart.php`文件计算并返回购物车中选择的商品数量**\n\n```php\n<?php\n$totalquantity=0;\n\
    if (session_status() == PHP_SESSION_NONE) {\n    session_start();\n}\n$connect\
    \ = mysqli_connect(\"localhost\", \"root\", \"gold\", \"shopping\") or die(\"\
    Please, check your server connection.\");\n$sess = session_id();\n$query=\"select\
    \ * from cart where cart_sess = '$sess'\";\n$results = mysqli_query($connect,\
    \ $query) or die(mysql_error());\nwhile ($row = mysqli_fetch_array($results, MYSQLI_ASSOC))\
    \ {\n    extract($row);\n    $totalquantity = $totalquantity + $cart_quantity;\n\
    }\necho $totalquantity;\n?>\n```\n\n您可以在这段代码中看到，建立了到 MySQL 服务器的连接，激活了`shopping`数据库，并且访问了`cart`表中与访问者会话\
    \ ID 匹配的所有行。购物车中商品的数量会被累加，并将总数量作为购物车计数返回。假设访问者在购物车中选择了两件商品，购物车计数`2`将出现在站点页眉的购物车图标旁边，如图\
    \ 4-7 所示。\n\n![A978-1-4842-1672-9_4_Fig7_HTML.jpg](img/A978-1-4842-1672-9_4_Fig7_HTML.jpg)\n\
    \n图 4-7.\n\n显示购物车中选择商品数量的网站页眉\n\n点击“登录”链接后，将执行`signin.php`脚本，它会提示用户输入电子邮件地址和密码。如果用户输入了有效的电子邮件地址和密码，欢迎消息将显示在站点页眉以及页面正文中，如图\
    \ 4-8 所示。\n\n![A978-1-4842-1672-9_4_Fig8_HTML.jpg](img/A978-1-4842-1672-9_4_Fig8_HTML.jpg)\n\
    \n图 4-8.\n\n已登录用户的欢迎消息显示在站点页眉中\n\n## 前往结账\n\n一旦访问者完成向购物车添加商品并希望购买它们，他们可以随时点击位于购物车底部的“结账”按钮（见图\
    \ 4-7）。点击“结账”按钮时，系统会检查访问者的状态，以确定他们是否已登录。为了保存商品交付的发货信息，访问者需要在站点注册并登录。如果访问者尚未登录，将显示两个链接——一个允许用户登录，另一个允许用户在尚未注册时创建账户。根据访问者的当前状态，他们可以创建新账户或登录站点。\n\
    \n清单 4-5 中所示的`checklogin.php`脚本会检查访问者的登录/登录状态。\n\n**清单 4-5。`checklogin.php`脚本检查访问者的登录状态**\n\
    \n```php\n<?php\ninclude('topmenu.php');\nif (session_status() == PHP_SESSION_NONE)\
    \ {\n    session_start();\n}\n$connect = mysqli_connect(\"localhost\", \"root\"\
    , \"gold\", \"shopping\") or die(\"Please, check your server connection.\");\n\
    $cartamount=0;\n$cartamount = $_POST['cartamount'];\n$_SESSION['cartamount']=$cartamount;\n\
    if (isset($_SESSION['emailaddress']))\n{\n    $email_address=$_SESSION['emailaddress'];\n\
    \    echo \"Welcome \" . $email_address . \". <br/>\";\n}\nif (isset($_SESSION['password']))\n\
    {\n    $password=$_SESSION['password'];\n}\nif ((isset($_SESSION['emailaddress'])\
    \ && $_SESSION['emailaddress'] != \"\") ||   (isset($_SESSION['password']) &&\
    \ $_SESSION['password'] != \"\")) {\n    $sess = session_id();\n    $query=\"\
    select * from cart where cart_sess = '$sess'\";\n    $result = mysqli_query($connect,\
    \ $query) or die(mysql_error());\n    if(mysqli_num_rows($result)>=1)\n    {\n\
    \        echo \"If you have finished Shopping \";\n        echo \"<a href=shipping_info.php>Click\
    \ Here</a> to supply Shipping Information\";\n        echo \" Or You can do more\
    \ purchasing by selecting items from the menu \";\n    }\n    else\n    {\n  \
    \      echo \"You can do purchasing by selecting items from the menu on left side\"\
    ;\n    }\n}\nelse\n{\n    ?>\n    <html>\n    <head>\n    </head>\n    <body>\n\
    \    <h3>Not Logged in yet</h1>\n    <p>\n    You are currently not logged into\
    \ our system.<br>\n    You can do purchasing only if you are logged in.<br>\n\
    \    If you have already registered,\n    <a href=\"signin.php\">click here</a>\
    \ to login, or if would like to create an account, <a href=\"create_account.php\"\
    >click here</a> to register.\n    </p>\n    </body>\n    </html>\n    <?php\n\
    }\n?>\n```\n\n由于每个用户在其唯一的会话中都拥有各自选择的商品，因此在读取会话变量之前会调用`session_start()`函数。之后，建立到\
    \ MySQL 服务器的连接并选择`shopping`数据库。检索`$_SESSION`数组中的电子邮件地址和密码，以防它们被任何网页先前设置过。\n\n\
    `$_SESSION`数组元素只有在用户注册并登录站点时才能被设置；否则，其元素不会被设置。如果`$_SESSION`数组中设置了电子邮件地址和密码（即用户已登录），则会向用户提供两个选项。如果他已经完成购物，必须提供发货信息（见图\
    \ 4-9），或者他可以通过从顶部菜单中选择商品类别来继续购物。但是，如果`$_SESSION`数组中未设置电子邮件地址和密码，则会要求用户登录或创建一个账户。\n\
    \n![A978-1-4842-1672-9_4_Fig9_HTML.jpg](img/A978-1-4842-1672-9_4_Fig9_HTML.jpg)\n\
    \n图 4-9.\n\n检查访问者登录状态后显示的消息\n\n假设用户已经注册，下一步便是提供商品交付的发货信息。您将在下一节中进行此操作。\n"
