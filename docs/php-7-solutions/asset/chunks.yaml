  trans: "  \n当 PHP 由于内部错误而抛出异常时，它会立即停止脚本运行。如果你已开启错误信息显示（建议在测试环境中这样做），PHP 会显示一条消息说明发生了什么。有时这些消息难以解读，因此**捕获异常**通常是个好主意。你可以通过将主脚本包装在\
    \ `try` 块中，并将错误处理代码放在 `catch` 块中来实现，如下所示：  \n\n```\ntry {\n    // main script\
    \ goes here\n} catch (Throwable $t) {\n    echo $t->getMessage();\n}\n```\n\n\
    提示  \n`catch` 块中的 `Throwable` 类型声明是 PHP 7 新增的。它涵盖了内部错误和脚本抛出的异常（用户异常）。你可能从 PHP\
    \ 5 中了解的 `Exception` 类型声明仅涵盖用户异常。  \n\n这产生了一条错误消息，通常比某些错误生成的长篇消息更容易理解。  \n\n你可以使用\
    \ `throw` 关键字抛出自定义异常，如下所示：  \n\n```\nif (error occurs) {\n    throw new Exception('Houston,\
    \ we have a problem.');\n}\n```\n\n括号内的字符串用作错误消息，可以在 `catch` 块中被捕获。  \n\n警告  \n\
    错误消息在开发过程中至关重要。它们帮助你解决问题。但是，当你将脚本部署到实时网站时，它们不仅看起来丑陋；还可能泄露对恶意攻击者有用的信息。在上线时，将 `catch`\
    \ 块中的错误消息显示替换为中性消息。或者，使用 `catch` 块将访问者重定向到错误页面。  \n\n### 动态创建新变量  \n\nPHP 支持创建所谓的**变量变量**。虽然这看起来像是打字错误，但并非如此。简单来说，变量变量创建一个新变量，该变量从现有变量派生其名称。以下示例展示了其工作原理（参见\
    \ `variable_variables.php`）。  \n\n```\n$location = 'city';\n```\n\n上述语句将字符串“city”赋给一个名为\
    \ `$location` 的变量。你可以通过使用*两个*美元符号来创建一个变量变量，如下所示：  \n\n```\n$$location = 'London';\n\
    ```\n\n变量变量将原始变量的值作为其名称。换句话说，`$$location` 等同于 `$city`。  \n\n```\necho $city; //\
    \ London\n```\n\n你将在第 6 章的邮件处理脚本中看到此技术的实际应用示例。  \n\n提示  \n为了表明双 `$` 是有意为之，请将用于创建变量变量的变量用花括号括起来，如下所示：`${$location}`。花括号是可选的，但能使代码更易读。\
    \  \n\n### 现在进入解决方案部分  \n\n前四章专注于理论——这很重要，但不太有趣。本书的其余部分将进入实际问题：让 PHP 解决现实世界的问题。那么，闲话少叙，让我们开始\
    \ PHP 7 解决方案。  \n\n## 5. 使用包含文件减轻工作量  \n\n将一个文件的内容包含到另一个文件中的能力是 PHP 最强大的特性之一。它也是最容易实现的特性之一。这意味着代码可以被合并到多个页面中——例如，常见元素，如页眉、页脚或导航菜单。PHP\
    \ 在服务器端将内容合并到每个页面中，允许你通过编辑和上传单个文件来更新菜单或其他常见元素——这是一个巨大的省时工具。当你完成本章的学习时，你将了解 PHP\
    \ 包含的工作方式、PHP 在哪里查找包含文件，以及如何在找不到包含文件时防止错误消息。你还将学习用 PHP 做一些很酷的技巧，例如创建随机图像生成器。 \
    \ \n\n本章涵盖以下主题：  \n\n- 理解不同的包含命令  \n- 告诉 PHP 在哪里找到你的包含文件  \n- 对常见页面元素使用 PHP 包含\
    \  \n- 在包含文件中保护敏感信息  \n- 自动生成“你在这里”菜单链接  \n- 根据文件名生成页面标题  \n- 自动更新版权声明  \n- 显示带标题的随机图像\
    \  \n- 处理包含文件的错误  \n- 更改 Web 服务器的 `include_path`  \n\n### 从外部文件包含代码  \n\n从其他文件包含代码的能力是\
    \ PHP 的核心部分。只需要使用 PHP 的包含命令之一，并告诉服务器在哪里找到该文件。  \n\n#### 介绍 PHP 包含命令  \n\nPHP 有四个命令可用于从外部文件包含代码，分别是：\
    \  \n\n- `include`  \n- `include_once`  \n- `require`  \n- `require_once`  \n\n\
    它们都执行基本相同的事情，那为什么要有四个呢？根本区别在于，即使找不到外部文件，`include` 也会尝试继续处理你的脚本，而 `require` 则具有强制性的含义：如果文件缺失，PHP\
    \ 引擎会停止处理并抛出致命错误。实际上，这意味着如果你即使没有外部文件的内容，页面仍能保持可用，则应使用 `include`。如果页面依赖于外部文件，则应使用\
    \ `require`。  \n\n另外两个命令 `include_once` 和 `require_once` 阻止同一文件在一个页面中被多次包含。尝试在脚本中多次定义一个函数或类会触发致命错误。因此，`include_once`\
    \ 或 `require_once` 确保函数和类只定义一次，即使脚本尝试多次包含外部文件（例如当这些命令位于条件语句中时）也是如此。  \n\n提示  \n\
    如果有疑问，始终使用 `require`，但对于定义函数和类的文件，应使用 `require_once`。依赖即使找不到外部文件脚本仍能正常工作，可能会使你面临安全风险。\
    \  \n\n### PHP 查找包含文件的位置  \n\n要包含一个外部文件，请使用四个包含命令之一，后跟引号（单引号或双引号均可）中的文件路径。文件路径可以是绝对路径，也可以是相对于当前文档的路径。例如，以下任何一项都可以工作（只要目标文件存在）：\
    \  \n\n```\nrequire 'includes/menu.php';\nrequire 'C:/xampp/htdocs/phpsols-4e/includes/menu.php';\n\
    require '/Applications/MAMP/htdocs/phpsols-4e/includes/menu.php';\n```\n\n注意 \
    \ \nPHP 接受包含命令中 Windows 文件路径的正斜杠。  \n\n你也可以选择性地在包含命令中使用括号，因此以下方式也可以工作：  \n\n```\n\
    require('includes/menu.php');\nrequire('C:/xampp/htdocs/phpsols-4e/includes/menu.php');\n\
    require('/Applications/MAMP/htdocs/phpsols-4e/includes/menu.php');\n```\n\n使用相对文件路径时，建议使用\
    \ `./` 来表示路径从当前文件夹开始。因此，将第一个示例重写如下会更高效：  \n\n```\nrequire './includes/menu.php';\
    \ // path begins in current folder\n```\n\n*不*起作用的是使用相对于站点根目录的文件路径，如下所示：  \n\n\
    ```\nrequire '/includes/menu.php'; // THIS WILL NOT WORK\n```\n\n这不起作用，因为 PHP\
    \ 包含命令将前导斜杠解释为硬盘的根目录。换句话说，PHP 将其视为绝对路径，而不是相对于站点根目录的路径。PHP 还会在 PHP 配置中定义的 `include_path`\
    \ 中查找。我将在本章后面回到这个主题。在此之前，让我们将 PHP 包含投入实际使用。  \n\n#### PHP 解决方案 5-1：将菜单和页脚移至包含文件\
    \  \n\n图 5-1 展示了页面的四个元素如何通过包含文件中的一点 PHP 魔法而受益。  \n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig1_HTML.jpg](img/332054_4_En_5_Fig1_HTML.jpg)\
    \  \n\n图 5-1. 识别静态网页中可以使用 PHP 改进的元素  \n"
- fmt: "# PHP Include 文件与文件扩展名安全\n\n## 页面布局与 Include 文件\n\n`menu` 和 `footer` 出现在 Japan\
    \ Journey 网站的每个页面上，因此它们非常适合作为 include 文件。清单 [5-1](#332054_4_En_5_Chapter.xhtml#PC5)\
    \ 展示了页面主体的代码，其中 `menu` 和 `footer` 以粗体标出。\n\n## 操作步骤\n\n1.  从 `ch05` 文件夹复制 `index_01.php`\
    \ 到 `phpsols-4e` 站点根目录，并重命名为 `index.php`。如果你使用像 Dreamweaver 这类会提示更新页面链接的程序，请不要更新链接。下载文件中的相对链接是正确的。通过在浏览器中加载\
    \ `index.php`，检查 CSS 和图片是否正常显示。页面应看起来与图 [5-1](#332054_4_En_5_Chapter.xhtml#Fig1)\
    \ 相同。\n\n2.  从 `ch05` 文件夹复制 `blog.php`、`gallery.php` 和 `contact.php` 到你的站点根目录。这些页面暂时无法在浏览器中正确显示，因为必要的\
    \ include 文件尚未创建。不过这种情况很快就会改变。\n\n3.  在 `index.php` 中，选中 `<nav>` 元素（如清单 [5-1](#332054_4_En_5_Chapter.xhtml#PC5)\
    \ 中粗体所示），然后剪切（Ctrl+X/Cmd+X）到剪贴板。\n\n4.  在站点根目录创建一个名为 `includes` 的新文件夹。然后在该文件夹中创建一个名为\
    \ `menu.php` 的文件。删除编辑程序自动插入的任何代码；文件必须完全空白。\n\n5.  将剪贴板中的代码粘贴（Ctrl+V/Cmd+V）到 `menu.php`\
    \ 中并保存文件。`menu.php` 的内容应如下所示：\n    ```\n    Home\n        Journal\n        Gallery\n\
    \        Contact\n    ```\n    不用担心新文件没有 `DOCTYPE` 声明或任何 `<html>`、`<head>`、`<body>`\
    \ 标签。其他包含该文件内容的页面会提供这些元素。\n\n6.  打开 `index.php`，在 `nav` 无序列表留下的空白处插入以下代码：\n  \
    \  ```\n    Japan Journey\n\n    Home\n    Journal\n    Gallery\n    Contact\n\
    \n    A journey through Japan with PHP\n    One of the benefits of using PHP .\
    \ . .\n\n    Water basin at Ryoanji temple\n\n    Ut enim ad minim veniam, quis\
    \ nostrud . . .\n    Eu fugiat nulla pariatur. Ut labore et dolore . . .\n   \
    \ Sed do eiusmod tempor incididunt ullamco . . .\n\n    © 2006&ndash;2019 David\
    \ Powers\n\n    Listing 5-1.\n    The static version of index.php\n    ```\n \
    \   这里使用了文档相对路径指向 `menu.php`。在路径开头使用 `./` 效率更高，因为它明确表示路径从当前文件夹开始。\n\n> **提示**\n\
    > 我使用 `require` 命令是因为导航菜单至关重要。没有它，网站将无法导航。\n\n7.  保存 `index.php` 并在浏览器中加载该页面。页面应与之前完全相同。虽然菜单和页面其余部分来自不同的文件，但\
    \ PHP 会在向浏览器发送任何输出之前将它们合并。\n\n> **注意**\n> 不要忘记 PHP 代码需要由 Web 服务器处理。如果你将文件存储在服务器文档根目录下名为\
    \ `phpsols-4e` 的子文件夹中，则应使用 URL `http://localhost/phpsols-4e/index.php` 访问 `index.php`。如需帮助查找服务器的文档根目录，请参阅第\
    \ [2](#332054_4_En_2_Chapter.xhtml) 章中的“在哪里放置你的 PHP 文件（Windows 和 Mac）”。\n\n8.\
    \  对 `footer` 执行相同操作。剪切清单 [5-1](#332054_4_En_5_Chapter.xhtml#PC5) 中以粗体标出的行，粘贴到\
    \ `includes` 文件夹中名为 `footer.php` 的空白文件中。然后在 `<footer>` 留下的空白处插入包含新文件的命令：\n   \
    \ ```\n    This time, I’ve used `include` rather than\n    `require`. The\n  \
    \  `<footer>`\n    is an important part of the page, but the site remains usable\
    \ if the\n    include file can’t be found.\n    ```\n\n> **警告**\n> 如果某个 include\
    \ 文件丢失（例如意外删除），你应该始终替换该文件或移除 include 命令。不要依赖 `include` 在找不到外部文件时仍尝试处理页面其余部分这一特性。一旦发现问题，务必立即修复。\n\
    \n9.  保存所有页面并在浏览器中重新加载 `index.php`。同样，页面应与原始页面完全相同。如果你导航到网站的其他页面，`menu` 和 `footer`\
    \ 应出现在每个页面上。现在 include 文件中的代码服务于所有页面。\n\n10. 为了证明菜单是从单个文件中提取的，请修改 `menu.php` 中“Journal”链接的文本，如下所示：\n\
    \    ```\n    Blog\n    ```\n\n11. 保存 `menu.php` 并重新加载网站。所有页面都会反映该更改。你可以对照 `ch05`\
    \ 文件夹中的 `index_02.php`、`menu_01.php` 和 `footer_01.php` 来检查代码。\n\n## 问题与解决方案\n\n\
    如图 [5-2](#332054_4_En_5_Chapter.xhtml#Fig2) 所示，存在一个问题。指示当前页面的样式没有改变（它由 `<a>` 标签中的\
    \ `here` ID 控制）。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig2_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig2_HTML.jpg)\n\
    \n**图 5-2.** 当前页面指示器仍然指向首页\n\n使用 PHP 条件逻辑可以轻松解决这个问题。在此之前，让我们先了解 Web 服务器和 PHP 引擎如何处理\
    \ include 文件。\n\n## 为 Include 文件选择正确的文件扩展名\n\n当 PHP 引擎遇到 include 命令时，它会暂停处理 PHP，在外部文件开头停止，并在文件结尾处恢复。这就是\
    \ include 文件只包含原始 HTML 的原因。如果你希望外部文件使用 PHP 代码，代码必须包含在 PHP 标签内。由于外部文件是作为包含它的 PHP\
    \ 文件的一部分被处理的，因此 include 文件可以使用任何文件扩展名。\n\n有些开发人员使用 `.inc` 作为文件扩展名，以明确表示该文件是要包含在另一个文件中的。然而，大多数服务器将\
    \ `.inc` 文件视为纯文本。如果文件包含敏感信息（如数据库的用户名和密码），这会带来安全风险。如果文件存储在网站根文件夹内，任何发现该文件名的人都可以直接在浏览器地址栏中输入\
    \ URL，浏览器就会乖乖地显示你的所有秘密信息！\n\n另一方面，任何具有 `.php` 扩展名的文件都会在发送到浏览器之前自动发送到 PHP 引擎进行解析。只要你的秘密信息位于\
    \ PHP 代码块中，并且文件具有 `.php` 扩展名，它就不会暴露。这就是为什么有些开发人员使用 `.inc.php` 作为 PHP include 文件的双重扩展名。`.inc`\
    \ 部分提醒你这是一个 include 文件，但服务器只关心末尾的 `.php`，这确保了所有 PHP 代码都能被正确解析。\n\n很长时间以来，我一直遵循使用\
    \ `.inc.php` 作为 include 文件扩展名的约定。但由于我将所有 include 文件存储在一个名为 `includes` 的单独文件夹中，我认为双重扩展名是多余的。我现在只使用\
    \ `.php`。选择哪种命名约定取决于你，但单独使用 `.inc` 是最不安全的。\n\n## PHP 解决方案 5-2：测试 include 文件的安全性\n\
    \n本方案演示了使用 `.inc` 和 `.php`（或 `.inc.php`）作为 include 文件扩展名之间的区别。使用上一节中的 `index.php`\
    \ 和 `menu.php`。或者，使用 `ch05` 文件夹中的 `index_02.php` 和 `menu_01.php`。如果使用下载文件，请在使用前从文件名中去除\
    \ `_02` 和 `_01`。\n\n1.  将 `menu.php` 重命名为 `menu.inc`，并相应修改 `index.php` 以包含它：\n\
    \n2.  在浏览器中加载 `index.php`。你应该看不到任何区别。\n\n3.  修改 `menu.inc` 内部的代码，将密码存储在 PHP 变量中，如下所示：\n\
    \    ```\n    Home\n\n    Blog\n    Gallery\n    Contact\n    ```"
  raw: "The menu and footer appear on every page of the Japan Journey site, so\nthey’re\
    \ prime candidates for include files. Listing [5-1](#332054_4_En_5_Chapter.xhtml#PC5)\
    \ shows the code\nfor the body of the page with the menu and footer highlighted\
    \ in bold.\n\n1.  Copy `index_01.php` from the\n    `ch05` folder to\n    the\
    \ `phpsols-4e`\n    site root and rename it `index.php`. If you are\n    using\
    \ a program like Dreamweaver that offers to update the page links,\n    don’t\
    \ update them. The relative links in the download file are correct.\n    Check\
    \ that the CSS and images are displaying properly by loading `index.php` into\
    \ a\n    browser. It should look the same as Figure [5-1](#332054_4_En_5_Chapter.xhtml#Fig1).\n\
    \n2.  Copy `blog.php`, `gallery.php`, and\n    `contact.php`\n    from the `ch05`\n\
    \    folder to your site root folder. These pages won’t display correctly in\n\
    \    a browser yet because the necessary include files still haven’t been\n  \
    \  created. That’ll soon change.\n\n3.  In `index.php`, highlight\n    the `<nav>`\n\
    \    element as shown in bold in Listing [5-1](#332054_4_En_5_Chapter.xhtml#PC5),\
    \ then cut\n    (Ctrl+X/Cmd+X) it to your computer clipboard.\n\n4.  Create a\
    \ new folder called `includes` in the site\n    root. Then create a file called\
    \ `menu.php` inside the\n    folder you have just created. Remove any code inserted\
    \ by your editing\n    program; the file must be completely blank.\n\n5.  Paste\
    \ (Ctrl+V/Cmd+V) the code from your clipboard into `menu.php` and save the\n \
    \   file. The contents of `menu.php` should look\n    like this:\n\n```\n\nHome\n\
    \    Journal\n    Gallery\n    Contact\n\n```\n\nDon’t worry that your new file\
    \ doesn’t have a `DOCTYPE` declaration\n    or any `<html>`, `<head>`, or\n  \
    \  `<body>`\n    tags. The other pages that include the contents of this file\
    \ will supply\n    those elements.\n\n6.  Open `index.php` and insert\n    the\
    \ following in the space left by the `nav` unordered\n    list:\n\n```\nJapan\
    \ Journey\n\nHome\nJournal\nGallery\nContact\n\nA journey through Japan with PHP\n\
    One of the benefits of using PHP . . .\n\nWater basin at Ryoanji temple\n\nUt\
    \ enim ad minim veniam, quis nostrud . . .\nEu fugiat nulla pariatur. Ut labore\
    \ et dolore . . .\nSed do eiusmod tempor incididunt ullamco . . .\n\n© 2006&ndash;2019\
    \ David Powers\n\nListing 5-1.\nThe static version of index.php\n```\n\nThis uses\
    \ a document-relative path to `menu.php`. Using `./` at the beginning\nof the\
    \ path is more efficient because it explicitly indicates that the\npath starts\
    \ in the current folder.\n\nTip\nI’m using the `require` command\nbecause the\
    \ navigation menu is mission critical. Without it, there would\nbe no way to navigate\
    \ around the site.\n\n1.  Save `index.php` and load\n    the page into a browser.\
    \ It should look exactly the same as before.\n    Although the menu and the rest\
    \ of the page are coming from different\n    files, PHP merges them before sending\
    \ any output to the browser.\n\nNote\nDon’t forget that PHP code needs to be processed\
    \ by a web server. If\nyou have stored your files in a subfolder of your server’s\
    \ document root\ncalled `phpsols-4e`, you\nshould access `index.php` using the\n\
    URL `http://localhost/phpsols-4e/index.php`.\nSee “Where to locate your PHP files\
    \ (Windows and Mac)” in Chapter [2](#332054_4_En_2_Chapter.xhtml) if you need\
    \ help finding the\nserver’s document root.\n\n1.  Do the same with the `footer`.\
    \ Cut the lines\n    highlighted in bold in Listing [5-1](#332054_4_En_5_Chapter.xhtml#PC5)\
    \ and paste them\n    into a blank file called `footer.php` in the\n    `includes`\n\
    \    folder. Then insert the command to include the new file in the gap left\n\
    \    by the `<footer>`:\n\n```\n    This time, I’ve used `include` rather than\n\
    \    `require`. The\n    `<footer>`\n    is an important part of the page, but\
    \ the site remains usable if the\n    include file can’t be found.\n\n```\n\n\
    Caution\nIf an include file is missing, for example, if you accidentally\ndelete\
    \ it, you should always replace it or remove the include command.\nDon’t rely\
    \ on the fact that `include` tries to\nprocess the rest of the page even if it\
    \ can’t find the external file.\nAlways fix problems as soon as you become aware\
    \ of them.\n\n1.  Save all pages and reload `index.php` in your\n    browser.\
    \ Again, it should look identical to the original page. If you\n    navigate to\
    \ other pages in the site, the menu and footer should appear\n    on every page.\
    \ The code in the include files is now serving all\n    pages.\n\n2.  To prove\
    \ that the menu is being drawn from a single file, change the\n    text in the\
    \ Journal link in `menu.php,` like\n    this:\n\n```\n    Blog\n    ```\n\n3.\
    \  Save `menu.php` and reload\n    the site. The change is reflected on all pages.\
    \ You can check your code\n    against `index_02.php`, `menu_01.php`, and\n  \
    \  `footer_01.php`\n    in the `ch05`\n    folder.\n\nAs Figure [5-2](#332054_4_En_5_Chapter.xhtml#Fig2)\
    \ shows, there’s a\nproblem. The style that indicates which page you’re on doesn’t\
    \ change\n(it’s controlled by the `here` ID in the `<a>` tag).\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig2_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2.\nThe current page indicator still points to the Home page\n\nThat’s\
    \ easily fixed with PHP conditional logic. Before doing so,\nlet’s examine how\
    \ the web server and the PHP engine handle include\nfiles.\n\nChoosing the Right\
    \ Filename Extension for\nIncludes\nWhen the PHP engine encounters an include\
    \ command, it stops\nprocessing PHP at the beginning of the external file and\
    \ resumes at the\nend. That’s why the include files contained only raw HTML. If\
    \ you want\nthe external file to use PHP code, the code must be enclosed in PHP\n\
    tags. Because the external file is processed as part of the PHP file\nthat includes\
    \ it, an include file can have any filename extension.\nSome developers use `.inc`\
    \ as the filename\nextension to make it clear that the file is intended to be\
    \ included in\nanother file. However, most servers treat `.inc` files as plain\n\
    text. This poses a security risk if the file contains sensitive\ninformation,\
    \ such as the username and password to your database. If the\nfile is stored within\
    \ your web site’s root folder, anyone who discovers\nthe name of the file can\
    \ simply type the URL in a browser address bar,\nand the browser will obligingly\
    \ display all your secret details!\nOn the other hand, any file with a `.php`\
    \ extension is\nautomatically sent to the PHP engine for parsing before it’s sent\
    \ to the\nbrowser. As long as your secret information is inside a PHP code block\n\
    and in a file with a `.php` extension, it\nwon’t be exposed. That’s why some developers\
    \ use `.inc.php` as a double extension for PHP\nincludes. The `.inc` part reminds\
    \ you\nthat it’s an include file, but servers are only interested in the `.php`\
    \ on the end,\nwhich ensures that all PHP code is correctly parsed.\nFor a long\
    \ time, I followed the convention of using\n`.inc.php` for\ninclude files. But\
    \ since I store all my include files in a separate\nfolder called `includes`,\
    \ I’ve\ndecided that the double extension is superfluous. I now use just `.php`.\n\
    Which naming convention you choose is up to you, but using `.inc` on its own is\n\
    the least secure.\n\nPHP Solution 5-2: Testing the security of\nincludes\n\nThis\
    \ solution demonstrates the difference between using\n`.inc` and `.php` (or `.inc.php`)\
    \ as the\nfilename extension for an include file. Use `index.php` and `menu.php`\
    \ from the\nprevious section. Alternatively, use `index_02.php` and\n`menu_01.php`\n\
    from the `ch05`\nfolder. If you use the download files, remove the `_02` and `_01`\
    \ from the\nfilenames before using them.\n\n1.  Rename `menu.php` to `menu.inc`\
    \ and edit\n    `index.php`\n    accordingly to include it:\n\n2.  Load `index.php`\
    \ into a\n    browser. You should see no difference.\n\n3.  Amend the code inside\
    \ `menu.inc` to store a\n    password inside a PHP variable, like this:\n\n```\n\
    \    Home\n\nBlog\n    Gallery\n    Contact\n\n```"
  trans: "\n# PHP Include 文件与文件扩展名安全\n\n## 页面布局与 Include 文件\n\n`menu` 和 `footer` 出现在\
    \ Japan Journey 网站的每个页面上，因此它们非常适合作为 include 文件。清单 5-1 展示了页面主体的代码，其中 `menu` 和 `footer`\
    \ 以粗体标出。\n\n## 操作步骤\n\n1.  从 `ch05` 文件夹复制 `index_01.php` 到 `phpsols-4e` 站点根目录，并重命名为\
    \ `index.php`。如果你使用像 Dreamweaver 这类会提示更新页面链接的程序，请不要更新链接。下载文件中的相对链接是正确的。通过在浏览器中加载\
    \ `index.php`，检查 CSS 和图片是否正常显示。页面应看起来与图 5-1 相同。\n\n2.  从 `ch05` 文件夹复制 `blog.php`、`gallery.php`\
    \ 和 `contact.php` 到你的站点根目录。这些页面暂时无法在浏览器中正确显示，因为必要的 include 文件尚未创建。不过这种情况很快就会改变。\n\
    \n3.  在 `index.php` 中，选中 `<nav>` 元素（如清单 5-1 中粗体所示），然后剪切（Ctrl+X/Cmd+X）到剪贴板。\n\n\
    4.  在站点根目录创建一个名为 `includes` 的新文件夹。然后在该文件夹中创建一个名为 `menu.php` 的文件。删除编辑程序自动插入的任何代码；文件必须完全空白。\n\
    \n5.  将剪贴板中的代码粘贴（Ctrl+V/Cmd+V）到 `menu.php` 中并保存文件。`menu.php` 的内容应如下所示：\n    ```\n\
    \    Home\n        Journal\n        Gallery\n        Contact\n    ```\n    不用担心新文件没有\
    \ `DOCTYPE` 声明或任何 `<html>`、`<head>`、`<body>` 标签。其他包含该文件内容的页面会提供这些元素。\n\n6.  打开\
    \ `index.php`，在 `nav` 无序列表留下的空白处插入以下代码：\n    ```\n    Japan Journey\n\n    Home\n\
    \    Journal\n    Gallery\n    Contact\n\n    A journey through Japan with PHP\n\
    \    One of the benefits of using PHP . . .\n\n    Water basin at Ryoanji temple\n\
    \n    Ut enim ad minim veniam, quis nostrud . . .\n    Eu fugiat nulla pariatur.\
    \ Ut labore et dolore . . .\n    Sed do eiusmod tempor incididunt ullamco . .\
    \ .\n\n    © 2006&ndash;2019 David Powers\n\n    Listing 5-1.\n    The static\
    \ version of index.php\n    ```\n    这里使用了文档相对路径指向 `menu.php`。在路径开头使用 `./` 效率更高，因为它明确表示路径从当前文件夹开始。\n\
    \n> **提示**\n> 我使用 `require` 命令是因为导航菜单至关重要。没有它，网站将无法导航。\n\n7.  保存 `index.php` 并在浏览器中加载该页面。页面应与之前完全相同。虽然菜单和页面其余部分来自不同的文件，但\
    \ PHP 会在向浏览器发送任何输出之前将它们合并。\n\n> **注意**\n> 不要忘记 PHP 代码需要由 Web 服务器处理。如果你将文件存储在服务器文档根目录下名为\
    \ `phpsols-4e` 的子文件夹中，则应使用 URL `http://localhost/phpsols-4e/index.php` 访问 `index.php`。如需帮助查找服务器的文档根目录，请参阅第\
    \ 2 章中的“在哪里放置你的 PHP 文件（Windows 和 Mac）”。\n\n8.  对 `footer` 执行相同操作。剪切清单 5-1 中以粗体标出的行，粘贴到\
    \ `includes` 文件夹中名为 `footer.php` 的空白文件中。然后在 `<footer>` 留下的空白处插入包含新文件的命令：\n   \
    \ ```\n    This time, I’ve used `include` rather than\n    `require`. The\n  \
    \  `<footer>`\n    is an important part of the page, but the site remains usable\
    \ if the\n    include file can’t be found.\n    ```\n\n> **警告**\n> 如果某个 include\
    \ 文件丢失（例如意外删除），你应该始终替换该文件或移除 include 命令。不要依赖 `include` 在找不到外部文件时仍尝试处理页面其余部分这一特性。一旦发现问题，务必立即修复。\n\
    \n9.  保存所有页面并在浏览器中重新加载 `index.php`。同样，页面应与原始页面完全相同。如果你导航到网站的其他页面，`menu` 和 `footer`\
    \ 应出现在每个页面上。现在 include 文件中的代码服务于所有页面。\n\n10. 为了证明菜单是从单个文件中提取的，请修改 `menu.php` 中“Journal”链接的文本，如下所示：\n\
    \    ```\n    Blog\n    ```\n\n11. 保存 `menu.php` 并重新加载网站。所有页面都会反映该更改。你可以对照 `ch05`\
    \ 文件夹中的 `index_02.php`、`menu_01.php` 和 `footer_01.php` 来检查代码。\n\n## 问题与解决方案\n\n\
    如图 5-2 所示，存在一个问题。指示当前页面的样式没有改变（它由 `<a>` 标签中的 `here` ID 控制）。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig2_HTML.jpg](img/332054_4_En_5_Fig2_HTML.jpg)\n\
    \n**图 5-2.** 当前页面指示器仍然指向首页\n\n使用 PHP 条件逻辑可以轻松解决这个问题。在此之前，让我们先了解 Web 服务器和 PHP 引擎如何处理\
    \ include 文件。\n\n## 为 Include 文件选择正确的文件扩展名\n\n当 PHP 引擎遇到 include 命令时，它会暂停处理 PHP，在外部文件开头停止，并在文件结尾处恢复。这就是\
    \ include 文件只包含原始 HTML 的原因。如果你希望外部文件使用 PHP 代码，代码必须包含在 PHP 标签内。由于外部文件是作为包含它的 PHP\
    \ 文件的一部分被处理的，因此 include 文件可以使用任何文件扩展名。\n\n有些开发人员使用 `.inc` 作为文件扩展名，以明确表示该文件是要包含在另一个文件中的。然而，大多数服务器将\
    \ `.inc` 文件视为纯文本。如果文件包含敏感信息（如数据库的用户名和密码），这会带来安全风险。如果文件存储在网站根文件夹内，任何发现该文件名的人都可以直接在浏览器地址栏中输入\
    \ URL，浏览器就会乖乖地显示你的所有秘密信息！\n\n另一方面，任何具有 `.php` 扩展名的文件都会在发送到浏览器之前自动发送到 PHP 引擎进行解析。只要你的秘密信息位于\
    \ PHP 代码块中，并且文件具有 `.php` 扩展名，它就不会暴露。这就是为什么有些开发人员使用 `.inc.php` 作为 PHP include 文件的双重扩展名。`.inc`\
    \ 部分提醒你这是一个 include 文件，但服务器只关心末尾的 `.php`，这确保了所有 PHP 代码都能被正确解析。\n\n很长时间以来，我一直遵循使用\
    \ `.inc.php` 作为 include 文件扩展名的约定。但由于我将所有 include 文件存储在一个名为 `includes` 的单独文件夹中，我认为双重扩展名是多余的。我现在只使用\
    \ `.php`。选择哪种命名约定取决于你，但单独使用 `.inc` 是最不安全的。\n\n## PHP 解决方案 5-2：测试 include 文件的安全性\n\
    \n本方案演示了使用 `.inc` 和 `.php`（或 `.inc.php`）作为 include 文件扩展名之间的区别。使用上一节中的 `index.php`\
    \ 和 `menu.php`。或者，使用 `ch05` 文件夹中的 `index_02.php` 和 `menu_01.php`。如果使用下载文件，请在使用前从文件名中去除\
    \ `_02` 和 `_01`。\n\n1.  将 `menu.php` 重命名为 `menu.inc`，并相应修改 `index.php` 以包含它：\n\
    \n2.  在浏览器中加载 `index.php`。你应该看不到任何区别。\n\n3.  修改 `menu.inc` 内部的代码，将密码存储在 PHP 变量中，如下所示：\n\
    \    ```\n    Home\n\n    Blog\n    Gallery\n    Contact\n    ```\n"
- fmt: "4.  Reload the page. As Figure [5-3](#332054_4_En_5_Chapter.xhtml#Fig3) shows,\
    \ the password remains hidden in the source code. Although the include file doesn’t\
    \ have a `.php` filename extension, its contents have been merged with `index.php`,\
    \ so the PHP code is processed.\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig3_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3. There’s no output from the PHP code, so only the HTML is sent to\
    \ the browser\n\n5.  Now load `menu.inc` directly in the browser. Figure [5-4](#332054_4_En_5_Chapter.xhtml#Fig4)\
    \ shows what happens.\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig4_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig4_HTML.jpg)\n\
    \nFigure 5-4. Loading `menu.inc` directly in a browser exposes the PHP code\n\n\
    Neither the server nor the browser knows how to deal with an `.inc` file, so the\
    \ entire contents are displayed onscreen: raw HTML, your secret password, everything.\n\
    \n6.  Change the name of the include file to `menu.inc.php` and load it directly\
    \ into your browser by adding `.php` to the end of the URL you used in the previous\
    \ step. This time, you should see an unordered list of links. Inspect the browser’s\
    \ source view. The PHP isn’t exposed.\n\n7.  Change the name back to `menu.php`\
    \ and test the include file by loading it directly in your browser and viewing\
    \ the source code again.\n\n8.  Remove the password PHP code you added to `menu.php`\
    \ in step 3 and change the include command inside `index.php` back to its original\
    \ setting, like this:\n\nPHP Solution 5-3: Automatically indicating the Current\
    \ Page\n\nLet’s fix the problem with the menu not indicating the current page.\
    \ The solution involves using PHP to find out the filename of the current page\
    \ and then using conditional statements to insert an ID in the corresponding `<a>`\
    \ tag.\n\nContinue working with the same files. Alternatively, use `index_02.php`,\
    \ `contact.php`, `gallery.php`, `blog.php`, `menu_01.php`, and `footer_01.php`\
    \ from the `ch05` folder, making sure to remove the `_01` and `_02` from any filenames.\n\
    \n1.  Open `menu.php`. The code currently looks like this:\n\n```html\n<body>\n\
    \    <ul>\n        <li><a href=\"index.php\">Home</a></li>\n        <li><a href=\"\
    blog.php\">Blog</a></li>\n        <li><a href=\"gallery.php\">Gallery</a></li>\n\
    \        <li><a href=\"contact.php\">Contact</a></li>\n    </ul>\n</body>\n```\n\
    \nThe style that indicates the current page is controlled by the `id=\"here\"\
    ` highlighted in line 2. You need PHP to insert `id=\"here\"` into the `blog.php\
    \ <a>` tag if the current page is `blog.php`, into the `gallery.php <a>` tag if\
    \ the page is `gallery.php`, and into the `contact.php <a>` tag if the page is\
    \ `contact.php`.\n\nHopefully, you have got the hint by now—you need an `if` statement\
    \ (see “Making decisions” in Chapter [3](#332054_4_En_3_Chapter.xhtml)) in each\
    \ `<a>` tag. Line 2 needs to look like this:\n\n```html\n<li><a href=\"blog.php\"\
    >Home</a></li>\n```\n\nThe other links should be amended in a similar way. But\
    \ how does `$currentPage` get its value? You need to find out the filename of\
    \ the current page.\n\n2.  Leave `menu.php` to one side for the moment and create\
    \ a new PHP page called `get_filename.php`. Insert the following code (alternatively,\
    \ use `get_filename.php` in the `ch05` folder):\n\n```php\n<?php echo $_SERVER['SCRIPT_FILENAME'];\
    \ ?>\n```\n\n3.  Save `get_filename.php` and view it in a browser. On a Windows\
    \ system, you should see something like the following screenshot. (The version\
    \ in the `ch05` folder contains the code for this step and the next, together\
    \ with text indicating which is which.)\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Figa_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Figa_HTML.jpg)\n\
    \nOn macOS, you should see something like this:\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Figb_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Figb_HTML.jpg)\n\
    \n`$_SERVER['SCRIPT_FILENAME']` comes from one of PHP’s built-in superglobal arrays,\
    \ and it always gives you the absolute file path for the current page. What you\
    \ need now is a way of extracting just the filename."
