- fmt: "# Using the Limiter\n\nWe will use the `apiLimiter` service within the subscriber\
    \ we created in Chapter [1](#663561_1_En_1_Chapter.xhtml). Concretely, we are\
    \ going to listen to the Symfony `KernelRequest` event to check whether we can\
    \ continue with the request, that is, there are tokens available. This way, we\
    \ can check the limit before the call arrives at the controller.\n\n```\nuse App\\\
    Exception\\InvalidPayloadException;\nuse App\\Exception\\NotFoundOperationException;\n\
    use App\\Validation\\ValidationHandler;\nuse Symfony\\Component\\EventDispatcher\\\
    EventSubscriberInterface;\nuse Symfony\\Component\\HttpFoundation\\JsonResponse;\n\
    use Symfony\\Component\\HttpKernel\\Event\\ExceptionEvent;\nuse Symfony\\Component\\\
    HttpKernel\\Event\\RequestEvent;\nuse Symfony\\Component\\HttpKernel\\KernelEvents;\n\
    use Symfony\\Component\\RateLimiter\\RateLimiterFactory;\nuse Symfony\\Component\\\
    Validator\\Exception\\ValidationFailedException;\nuse Symfony\\Component\\RateLimiter\\\
    Exception\\RateLimitExceededException;\n\nclass KernelSubscriber implements EventSubscriberInterface\n\
    {\n    public function __construct(\n        private readonly ValidationHandler\
    \ $validationHandler,\n        private readonly RateLimiterFactory $apiLimiter\n\
    \    ){}\n\n    public static function getSubscribedEvents(): array\n    {\n \
    \       return [\n            KernelEvents::EXCEPTION => 'onException',\n    \
    \        KernelEvents::REQUEST => 'onKernelRequest'\n        ];\n    }\n\n   \
    \ public function onKernelRequest(RequestEvent $event): void\n    {\n        $limiter\
    \ = $this->apiLimiter->create($event->getRequest()->getClientIp());\n        $limiter->consume()->ensureAccepted();\n\
    \    }\n\n    public function onException(ExceptionEvent $event): void\n    {\n\
    \        $exception = $event->getThrowable();\n        if($exception instanceof\
    \ ValidationFailedException){\n            $errors = [];\n            foreach\
    \ ($exception->getViolations() as $violation) {\n                $errors[$violation->getPropertyPath()]\
    \ = $violation->getMessage();\n            }\n            $event->setResponse(new\
    \ JsonResponse([\n                'errors' => $errors\n            ], 400));\n\
    \            return;\n        }\n        if($exception instanceof RateLimitExceededException)\
    \ {\n            $event->setResponse(new JsonResponse([\n                'error'\
    \ => 'Api Rate limit exceeded'\n            ], 429));\n            return;\n \
    \       }\n        if($exception instanceof InvalidPayloadException) {\n     \
    \       $event->setResponse(new JsonResponse([\n                'error' => $exception->getMessage()\n\
    \            ], 400));\n            return;\n        }\n        if($exception\
    \ instanceof NotFoundOperationException){\n            $event->setResponse(new\
    \ JsonResponse([\n                'errors' => [\n                    'operation'\
    \ => $exception->getMessage()\n                ]\n            ], 400));\n    \
    \        return;\n        }\n    }\n}\n```\n\nThe `onKernelRequest` method gets\
    \ the limiter by using the `apiLimiter` service and checks whether the request\
    \ is accepted. If not, it throws a `RateLimitExceededException`. We also check\
    \ for this exception on the `onException` method and return a *429 Too Many Requests*\
    \ HTTP code to the client.\n\n# Conclusion\n\nAs a plus to finish this chapter,\
    \ we have added an extra security layer that helps us to prevent DoS attacks by\
    \ setting a limit to the requests that the API can handle by using a token-bucket\
    \ strategy. In the next chapter, we will delve into the utilization of Symfony\
    \ messenger, a robust tool within the Symfony framework, to enable asynchronous\
    \ execution of large operations, that is, operations that can take some time to\
    \ be processed.\n\n# 3. Background Execution of API Operations\n\nSo far, we have\
    \ learned how to manage operations through a single endpoint, how to secure our\
    \ endpoint using a Symfony firewall, and how to grant or deny access to our operations\
    \ using Symfony voters. In this chapter, we will learn how to execute operations\
    \ in the background so that the client does not have to wait until the operation\
    \ is performed. This is useful for operations that can take some time to be executed.\
    \ Our `SendPayment` operation would be a good example since it would probably\
    \ connect to a payment provider to send the money. As we do not know how much\
    \ time this kind of connection can take, it is preferable to execute it in the\
    \ background and send a notification to the client (can be an email, SMS, or push\
    \ notification, among others) after the operation finishes.\n\n## Section 1. Marking\
    \ Operations As Background\n\nWe created the `OperationMetadata` attribute in\
    \ Chapter [1](#663561_1_En_1_Chapter.xhtml) to store the following data related\
    \ to the operation:\n\n- The operation name\n- The class-name, which holds the\
