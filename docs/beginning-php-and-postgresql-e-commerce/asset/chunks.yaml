    \ Contains the `PasswordHasher` class, which contains the static method `Hash()`\
    \ that returns the hash value for the password supplied.\n- `secure_card.php`:\
    \ Contains the `SecureCard` class, which represents a credit card. This class\
    \ can be supplied with credit card information, which is then accessible in encrypted\
    \ format. This class can also take encrypted credit card data and supply access\
