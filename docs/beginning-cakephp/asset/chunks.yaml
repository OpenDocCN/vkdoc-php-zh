    \n返回 `app/views/layouts/default.ctp` 文件，将第 4 行修改为以下内容：\n\n```\n<?=$html->css('cake.generic');?>\n\
    ```\n\n刷新 Posts 控制器屏幕后，您会注意到 Cake 的样式已生效，但不再包含脚手架默认的标题等内容。通过这些样式更改，脚手架仍在生成各个 CRUD\
    \ 操作视图，但此时已不再使用 Cake 的内置布局。\n\n## 创建独立视图\n\n如果想直接操控视图该怎么办？例如，您想移除页面顶部显示\"Posts\"\
