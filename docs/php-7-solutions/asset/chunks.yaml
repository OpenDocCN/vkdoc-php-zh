    As you have just seen, the `get` method sends your data appended to the URL, whereas
    the `post` method sends it with the HTTP headers so it’s hidden from view. Some
    browsers limit the maximum length of a URL to about 2,000 characters, so the `get`
    method can be used only for small amounts of data. The `post` method can be used
    for much larger amounts of data. By default, PHP permits up to 8 MB of `post`
    data, although hosting companies may set a different limit. However, the most
    important difference between the two methods is their intended use. The `get`
    method is designed to be used for requests that result in no change on the server
    no matter how many times it’s made. Consequently, it’s used mainly for database
    searches; bookmarking your search result is useful because all the search criteria
    are in the URL. On the other hand, the `post` method is designed for requests
    that result in changes on the server. So, it’s used to insert, update, or delete
    records in a database, upload files, or send an email. We’ll return to the `get`
    method later in the book. This chapter concentrates on the `post` method and its
    associated superglobal array, `$_POST`.


    ## Getting form data with PHP superglobals


    The `$_POST` superglobal array contains data sent using the `post` method. It
    should come as no surprise that data sent by the `get` method is in the `$_GET`
    array. To access values submitted by a form, just put the `name` attribute of
    the form element in quotes between square brackets after `$_POST` or `$_GET`,
    depending on the form’s `method` attribute. So `email` becomes `$_POST[''email'']`
    if sent by the `post` method, and `$_GET[''email'']` if sent by the `get` method.
    That’s all there is to it.


    You may come across scripts that use `$_REQUEST`, which avoids the need to distinguish
    between `$_POST` or `$_GET`. It’s less secure. You should always know where user
    information comes from. `$_REQUEST` also includes the values of cookies, so you
    have no idea if you’re dealing with a value submitted by the `post` method, or
    one transmitted through the URL, or injected by a cookie. Always use `$_POST`
    or `$_GET`. Old scripts may use `$HTTP_POST_VARS` or `$HTTP_GET_VARS`, which have
    the same meaning as `$_POST` and `$_GET`. The old versions have been removed.
    Use `$_POST` and `$_GET` instead.


    ## Processing and Validating User Input


    The ultimate aim of this chapter is to send the input from the form in `contact.php`
    by email to your inbox. Using the PHP `mail()` function is relatively simple.
    It takes a minimum of three arguments: the address(es) the email is being sent
    to, a string containing the subject line, and a string containing the body of
    the message. You build the body of the message by concatenating (joining) the
    contents of the input fields into a single string.


    Security measures implemented by most Internet service providers (ISPs) make it
    difficult if not impossible to test the `mail()` function in a local testing environment.
    Instead of jumping straight into the use of `mail()`, PHP Solutions 6-2 through
    6-5 concentrate on validating user input to make sure required fields are filled
    in and displaying error messages. Implementing these measures makes your online
    forms more user-friendly and secure.


    Using JavaScript or HTML5 form elements and attributes to check user input is
    called **client-side validation** because it happens on the user’s computer (or
    client). It’s useful because it’s almost instantaneous and can alert the user
    to a problem without making an unnecessary round trip to the server. However,
    client-side validation is easy to sidestep. All a malicious user has to do is
    to submit data from a custom script and your checks are rendered useless. It’s
    vital to check user input with PHP, too.


    > **Tip** Client-side validation on its own is insufficient. Always verify the
    data from an external source using server-side validation with PHP.


    ### Creating a reusable script


    The ability to reuse the same script—perhaps with only a few edits—for multiple
    web sites is a great timesaver. However, sending the input data to a separate
    file for processing makes it difficult to alert users to errors without losing
    their input. To get around this problem, the approach taken in this chapter is
    to use what’s known as a **self-processing form**.


    When the form is submitted, the page reloads and a conditional statement runs
    the processing script. If the server-side validation detects errors, the form
    can be redisplayed with error messages while preserving the user’s input. Parts
    of the script specific to the form will be embedded above the `DOCTYPE` declaration.
    Generic, reusable parts will be in a separate file that can be included in any
    page that requires an email-processing script.


