    ## 30. Exception Handling


    PHP 5 introduced exceptions, a built-in mechanism for handling program failures
    within the context in which they occur. Unlike errors, which generally need to
    be fixed by the developer, exceptions are handled by the script. They represent
    an irregular run-time situation that should have been expected as a possibility
    and which the script should be able to handle on its own.


    ### Try-catch Statement


    To handle an exception, it must be caught using a `try-catch` statement. This
    statement consists of a `try` block containing the code that may cause the exception,
    and one or more `catch` clauses.


    ```php

    try

    {

    $div = invert(0);

    }

    catch (LogicException $e) {}

    ```


    If the `try` block successfully executes, the program then continues running after
    the `try-catch` statement. However, if an exception occurs, the execution is then
    passed to the first `catch` block able to handle that exception type.


    ### Throwing Exceptions


    When a situation occurs that a function cannot recover from, it can generate an
    exception to signal to the caller that the function has failed. This is done using
    the `throw` keyword, followed by a new instance of the `Exception` class or a
    child class of `Exception`, such as `LogicException`.[¹](#A317139_2_En_30_Chapter.html#Fn1)


    ```php

    function invert($x)

    {

    if ($x == 0)

    throw new LogicException(''Division by zero'');

    return 1 / $x;

    }

    ```


    ### Catch Block


    In the previous example, the `catch` block is set to handle the built-in `LogicException`
    type. If the code in the `try` block could throw more kinds of exceptions, multiple
    `catch` blocks can be used, allowing different exceptions to be handled in different
    ways.


    ```php

    catch (LogicException $e) {}

    catch (RuntimeException $e) {}

    // ...

    ```


    To catch a more specific exception, the `catch` block needs to be placed before
    exceptions that are more general. For example, the `LogicException` inherits from
    `Exception`, so the `LogicException` needs to be caught first.


    ```php

    catch (LogicException $e) {}

    catch (Exception $e) {}

    ```


    The `catch` clause defines an exception object. This object can be used to obtain
    more information about the exception, such as a description of the exception using
    the `getMessage` method.


    ```php

    catch (LogicException $e)

    {

    echo $e->getMessage(); // "Division by zero"

    }

    ```


    ### Finally Block


    PHP 5.5 introduced the `finally` block, which can be added as the last clause
    in a `try-catch` statement. This block is used to clean up resources allocated
    in the `try` block. It always executes whether or not there is an exception.


    ```php

    $resource = myopen();

    try { myuse($resource); }

    catch(Exception $e) {}

    finally { myfree($resource); }

    ```


    ### Rethrowing Exceptions


    Sometimes an exception cannot be handled where it is first caught. It can then
    be rethrown using the `throw` keyword followed by the exception object.


    ```php

    try { $div = invert(0); }

    catch (LogicException $e) { throw $e; }

    ```


    The exception then propagates up the caller stack until it is caught by another
    `try-catch` statement. If the exception is never caught, it becomes an error of
    level `E_ERROR`, which halts the script, unless an uncaught exception handler
    has been defined.


    ### Uncaught Exception Handler


    The `set_exception_handler` function allows any uncaught exceptions to be caught.
    It takes a single argument, which is the callback function that is raised for
    such an event.


    ```php

    set_exception_handler(''myException'');

    ```


    The callback function only needs one parameter, the exception object that was
    thrown.


    ```php

    function myException($e)

    {

    $file = ''exceptionlog.txt'';

    file_put_contents($file,$e->getMessage(),FILE_APPEND);

    require_once(''my_error_page.php'');

    exit;

    }

    ```'
