  \ [, int *month* [, int *year*]])`\n\n`setToWeekday()`方法将日期设置为某年某月的第 n 个星期*weekday*，成功返回`TRUE`，否则返回`FALSE`。如果未提供月份和年份，则使用当前月份和年份。在撰写本文时，此方法存在缺陷；很可能在本书出版时已被修复。\n\
  \n##### `getDayOfYear()`\n\n`integer getDayOfYear()`\n\n`getDayOfYear()`方法返回日期对象指定日期的数值偏移量。示例如下：\n\
  \n```\n$date = new Date();\n$date->setDMY(4,7,1776);\necho $date->getDayOfYear();\n\
  ```\n\n结果是：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 12 章 ■ 日期和时间**\n\
  \n**299**\n\n##### `getWeekOfYear()`\n\n`integer getWeekOfYear()`\n\n`getDayOfYear()`方法返回日期对象指定周数的数值偏移量：\n\
  \n```\n$date = new Date();\n$date->setDMY(4,7,1776);\necho $date->getWeekOfYear();\n\
  ```\n\n返回：\n\n##### `getISOWeekOfYear()`\n\n`integer getISOWeekOfYear()`\n\n`getISOWeekOfYear()`方法根据\
  \ ISO 8601 规范返回日期对象所代表日期的周数。ISO 8601 规定，一年的第一周是包含第一个星期四的那一周。例如，2005 年的第一天是星期日，但\
  \ 1 月 2 日至 8 日包含了第一个星期四；因此，1 月 1 日甚至不算在第一周内。你可能觉得这有点奇怪；然而，这个决定几乎是随意的，它只是标准化了确定一年中第一周的方法。让我们通过查询\
  \ 1 月 4 日所在的周数来实际看看这个解释：\n\n```\n$date = new Date();\n$date->setDMY(4,1,2005);\n\
  echo $date->getISOWeekOfYear();\n```\n\n返回结果如下：\n\n那么，既然 1 月 1 日不符合第一周的条件，它落在哪一周呢？你可能会惊讶地发现，ISO\
  \ 标准实际上认为它是 2004 年的第 53 周：\n\n```\n$date = new Date();\n$date->setDMY(1,1,2005);\n\
  echo $date->getISOWeekOfYear();\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**300**\n\n**第 12 章 ■ 日期和时间**\n\n返回：\n\n##### `setToLastMonthDay()`\n\n`boolean\
  \ setToLastMonthDay()`\n\n`setToLastMonthDay()`方法将日期对象的`day`属性调整为`month`属性指定月份的最后一天，成功返回`TRUE`，否则返回`FALSE`。示例如下：\n\
  \n```\n$date = new Date();\n$date->setDMY(1,4,2006);\n$date->setToLastMonthDay();\n\
  echo $date->getDay();\n```\n\n返回以下输出结果：\n\n##### `setFirstDow()`\n\n`boolean setFirstDow()`\n\
  \n`setFirstDow()`方法将日期对象的`day`属性设置为`weekstart`属性指定的一周中的第一天，成功返回`TRUE`，否则返回`FALSE`。默认情况下，`weekstart`设置为星期一。以下示例将日期设置为\
  \ 2006 年 4 月 28 日（星期五），然后将日期移动到该周的第一天（星期一）：\n\n```\n$date = new Date();\n$date->setDMY(28,4,2006);\n\
  $date->setFirstDow();\n$dcs = $date->getArray();\nprint_r($dcs);\n```\n\n返回：\n\n\
  ```\nArray (\n[day] => 24 [month] => 4 [year] => 2006\n[hour] => 0 [min] => 0 [sec]\
  \ => 0\n)\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 12 章 ■\
  \ 日期和时间**\n\n**301**\n\n##### `setLastDow()`\n\n`boolean setLastDow()`\n\n`setLastDow()`方法将日期对象的`day`属性设置为一周中的最后一天，成功返回`TRUE`，否则返回`FALSE`。这一天取决于`weekstart`属性的值，默认设置为星期一。以下示例将日期设置为\
  \ 2006 年 4 月 28 日（星期五），然后将日期移动到该周的最后一天（星期日）：\n\n```\n$date = new Date();\n$date->setDMY(28,4,2006);\n\
  $date->setLastDow();\n$dcs = $date->getArray();\nprint_r($dcs);\n```\n\n返回：\n\n\
  ```\nArray (\n[day] => 30 [month] => 4 [year] => 2006\n[hour] => 0 [min] => 0 [sec]\
  \ => 0\n)\n```\n\n**摘要**\n\n\n\n本章涵盖了大量内容，首先概述了在日常 PHP 编程任务中几乎每天都会出现的几个日期和时间函数。接着，我们深入探讨了“日期功夫”这门古老技艺，学习了如何结合这些函数的功能来执行有用的时间处理任务。我们还介绍了实用的\
