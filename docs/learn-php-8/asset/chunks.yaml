    \ 3.  Conditional statements\n    4.  Machine code\n\n22. When working with a\
    \ comma-delimited string, which character is used to separate the data in the\
    \ string?\n    1.  Space\n    2.  Semicolon\n    3.  Asterisk\n    4.  Comma\n\
    \n### True/False\n\n1.  Methods are functions that belong to a class.\n2.  You\
    \ would use the symbol `||` or the word `or` when you want both conditions to\
    \ be true.\n3.  When a function is private, it can only be used inside the class\
    \ in which it exists.\n4.  The `explode` method can be used to separate a string\
    \ at the specified delimiter.\n5.  The `new` keyword tells the operating system\
    \ that an instance of that class should be created in memory.\n6.  The function\
    \ `ctype_alpha` will return `true` when a number is passed into it.\n7.  `require_once`\
    \ will not execute if the file has already been attached to the program.\n8. \
    \ The `ctype_digit` function determines if the characters passed are alphabetic.\n\
    9.  The `ctype_alpha` function determines if the characters passed are alphabetic.\n\
    10. A PHP constructor has the same name as the class.\n11. A ternary operator\
    \ is shorthand for a `while` loop.\n12. If a file has already been included in\
    \ a program, the `require_once` function will generate only a warning and allow\
    \ the program to continue.\n13. Destructor methods are called when there are no\
    \ remaining references to an object or when that object has been explicitly destroyed.\n\
    14. Objects are blocks of code that have already been compiled for use in an application.\n\
    15. The `else` statement extends an `if` statement by allowing code to execute\
    \ when the `if` statement evaluates to `FALSE`.\n16. `include` or `require` statements\
    \ can only be placed at the top of an PHP program.\n17. Programmers can pull their\
    \ own libraries of code into an application via the `require` or `require_once`\
    \ statement.\n\n### Short Answer/Essay\n\n1.  Explain the meaning of encapsulation\
    \ and how classes are encapsulated.\n2.  Why should a programmer use `set` and\
    \ `get` methods?\n3.  Why should every entry on a web page from a user be validated?\n\
    \n### Projects"
