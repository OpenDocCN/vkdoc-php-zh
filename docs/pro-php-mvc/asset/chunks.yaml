- fmt: "Depending on the kinds of database engines you are likely to support, you\
    \ may choose to keep minimal code within the base `Query` class, and have each\
    \ `Query` subclass implement similar logic for the engine in question.\n\n**Note**\
    \ The collation you choose to apply to your database tables will determine whether\
    \ your SQL queries will be case sensitive, in terms of the comparison between\
    \ string values and table column data. This can be overridden on a per-query basis,\
    \ but this sort of advanced SQL falls outside the scope of this book.\n\nAs I\
    \ am familiar with more relational SQL database engines than not, I have opted\
    \ to keep all the reusable SQL creation code in the base `Query` class, and only\
    \ need one method in the actual MySQL `Query` subclass. Let’s take a look at the\
    \ complete `Query` class in Listing 9-15.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 9 ■ Databases\n\n### ***Listing 9-15.*** The `Database\\Query` Class\n\
    \n```php\nnamespace Framework\\Database\n{\n\nuse Framework\\Base as Base;\nuse\
    \ Framework\\ArrayMethods as ArrayMethods;\nuse Framework\\Database\\Exception\
    \ as Exception;\n\nclass Query extends Base\n{\n\n    /**\n     * @readwrite\n\
    \     */\n    protected $_connector;\n\n    /**\n     * @read\n     */\n    protected\
    \ $_from;\n\n    /**\n     * @read\n     */\n    protected $_fields;\n\n    /**\n\
    \     * @read\n     */\n    protected $_limit;\n\n    /**\n     * @read\n    \
    \ */\n    protected $_offset;\n\n    /**\n     * @read\n     */\n    protected\
    \ $_order;\n\n    /**\n     * @read\n     */\n    protected $_direction;\n\n \
    \   /**\n     * @read\n     */\n    protected $_join = array();\n\n    /**\n\n\
    \     * @read\n     */\n    protected $_where = array();\n\n    protected function\
