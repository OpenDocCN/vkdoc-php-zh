  raw: '### Registry


    The Registry pattern is all about providing system-wide access to objects. These
    days, it is almost an article of faith that globals are bad. Like other sins,
    though, global data is fatally attractive. This is so much the case that object-oriented
    architects have felt it necessary to reinvent globals under a new name. You encountered
    the Singleton pattern in Chapter [9](#A314621_5_En_9_Chapter.html), although it
    is true that singleton objects do not suffer from all the ills that beset global
    variables. In particular, you cannot overwrite a singleton by accident. Singletons
    , then, are low-fat globals. You should remain suspicious of singleton objects,
    though, because they invite you to anchor your classes into a system, thereby
    introducing coupling.


    Nevertheless, singletons are so useful at times that many programmers (including
    me) can’t bring themselves to give them up.


    #### The Problem


    As you have seen, many enterprise systems are divided into layers, with each layer
    communicating with its neighbors only through tightly defined conduits. This separation
    of tiers makes an application flexible. You can replace or otherwise develop each
    tier with the minimum impact on the rest of the system. What happens, though,
    when you acquire information in a tier that you later need in another noncontiguous
    layer?


    Let’s say that I acquire configuration data in an `ApplicationHelper` class :


    ```

    // listing 12.01

    class ApplicationHelper

    {

    public function getOptions(): array

    {

    $optionfile = __DIR__ . "/data/woo_options.xml";

    if (! file_exists($optionfile)) {

    throw new AppException("Could not find options file");

    }

    $options = simplexml:load_file($optionfile);

    $dsn = (string) $options->dsn;

    // what do we do with this now?

    // ...

    }

    }

    ```


    Acquiring the information is easy enough, but how would I get it to the data layer,
    where it is later used? And what about all the other configuration information
    I must disseminate throughout my system?


    One answer would be to pass this information around the system from object to
    object: from a controller object responsible for handling requests; to objects
    in the business logic layer; and finally, to an object responsible for talking
    to the database.


    This is entirely feasible. In fact, you could pass the `ApplicationHelper` object
    itself around or, alternatively, a more specialized `Context` object. Either way,
    contextual information is transmitted through the layers of your system to the
    object or objects that need it.


    The tradeoff is that, in order to do this, you must alter the interface of all
    the objects that relay the context object, whether they need to use it or not.
    Clearly, this undermines loose coupling to some extent.


    The Registry pattern provides an alternative that is not without its own consequences.


    A registry is simply a class that provides access to data (usually, but not exclusively,
    objects) via static methods (or via instance methods on a singleton). Every object
    in a system, therefore, has access to these objects.


    The term “Registry” is drawn from Fowler’s Patterns of Enterprise Application
    Architecture; but, as with all patterns, implementations pop up everywhere. In
    The Pragmatic Programmer: from Journeyman to Master (Addison-Wesley Professional,
    1999), David Hunt and David Thomas liken a registry class to a police incident-notice
    board. Detectives on one shift leave evidence and sketches on the board, which
    are then picked up by new detectives on another shift. I have also seen the Registry
    pattern called Whiteboard and Blackboard.


    ### Implementation


    Figure [12-2](#A314621_5_En_12_Chapter.html#Fig2) shows a `Registry` object that
    stores and serves `Request` objects.


    ![A314621_5_En_12_Fig2_HTML.gif](A314621_5_En_12_Fig2_HTML.gif)


    Figure 12-2.


    A simple registry


    Here is this class in code form:


    ```

    // listing 12.02

    class Registry

    {

    private static $instance = null;

    private $request;

    private function __construct()

    {

    }

    public static function instance(): self

    {

    if (is_null(self::$instance)) {

    self::$instance = new self();

    }

    return self::$instance;

    }

    public function getRequest(): Request

    {

    if (is_null($this->request)) {

    $this->request = new Request();

    }

    return $this->request;

    }

    }

    // listing 12.03

    class Request

    {

    }

    ```


    You can then access the same `Request` from any part of your system:


    ```

    // listing 12.04

    $reg = Registry::instance();

    print_r($reg->getRequest());

    ```


    As you can see, the `Registry` is simply a singleton (see Chapter [9](#A314621_5_En_9_Chapter.html)
    if you need a reminder about singleton classes). The code creates and returns
    a sole instance of the `Registry` class via the `instance()` method . This can
    then be used to retrieve a `Request` object.


    I have been known to throw caution to the wind and use a key-based system , like
    this:


    ```

    // listing 12.05

    class Registry

    {

    private static $instance=null;

    private $values = [];

    private function __construct()

    {

    }

    public static function instance(): self

    {

    if (is_null(self::$instance)) {

    self::$instance = new self();

    }

    return self::$instance;

    }

    public function get(string $key)

    {

    if (isset($this->values[$key])) {

    return $this->values[$key];

    }

    return null;

    }

    public function set(string $key, $value)

    {

    $this->values[$key] = $value;

    }

    }

    ```


    The benefit here is that you don’t need to create methods for every object you
    wish to store and serve. The downside, though, is that you reintroduce global
    variables by the back door. The use of arbitrary strings as keys for the objects
    you store means that there is nothing stopping one part of your system from overwriting
    a key/value pair when adding an object. I have found it useful to use this map-like
    structure during development, and then shift over to explicitly named methods
    when I’m clear about the data I am going to need to store and retrieve.


    Note


    The Registry pattern is not the only way of managing the services a system requires.
    In Chapter [10](#A314621_5_En_10_Chapter.html), we covered a similar strategy
    named Dependency Injection, which is used in popular frameworks like Symfony.


    You can also use registry objects as factories for common objects in your system.
    Instead of storing a provided object, the `Registry` class creates an instance
    and then caches the reference. It may do some setup behind the scenes as well,
    perhaps retrieving data from a configuration file or combining a number of objects:


    ```

    // listing 12.06

    // class Registry

    private $treeBuilder = null;

    private $conf = null;

    // ...

    public function treeBuilder(): TreeBuilder

    {

    if (is_null($this->treeBuilder)) {

    $this->treeBuilder = new TreeBuilder($this->conf()->get(''treedir''));

    }

    return $this->treeBuilder;

    }

    public function conf(): Conf

    {

    if (is_null($this->conf)) {

    $this->conf = new Conf();

    }

    return $this->conf;

    }

    ```


    `TreeBuilder` and `Conf` are just dummy classes, included to demonstrate a point.
    A client class that needs a `TreeBuilder` object can simply call `Registry::treeBuilder()`,
    without bothering itself with the complexities of initialization. Such complexities
    may include application-level data such as the dummy `Conf` object, and most classes
    in a system should be insulated from them.


    Registry objects can be useful for testing, too. The static `instance()` method
    can be used to serve up a child of the `Registry` class, primed with dummy objects.
    Here’s how I might amend `instance()` to achieve this:'
