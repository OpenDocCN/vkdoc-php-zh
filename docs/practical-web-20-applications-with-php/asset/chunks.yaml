    Implementing the indexAction() Method


    The first change we will make is to the indexAction() method in the UserController
    class. We created a placeholder for this method earlier in this chapter, but we
    will now implement it by retrieving the relevant posts using the GetPosts() method
    from DatabaseObject_BlogPost.


    This method begins by determining the number of posts to retrieve. We first check
    for the num_posts setting (making sure the value is at least 1 by using max()).
    If this setting isn’t found in the user profile, a default value of 10 is used.


    Next, we will build an array of options to pass to DatabaseObject_BlogPost::GetPosts().


    In this array, we will include the $limit variable just created, and we’ll specify
