- "# 循环中的括号与替代语法\n\n与条件语句类似，循环中的括号可以改写为使用冒号和`endwhile`、`endfor`或`endforeach`关键字的替代语法。\n\
  \n```\nwhile ($i < 10): echo $i++; endwhile;\nfor ($i = 0; $i < 10; $i++): echo\
  \ $i; endfor;\nforeach ($a as $v): echo $v; endforeach;\n```\n\n这样做的主要好处是提高了可读性，尤其是在处理较长循环时。\n\
  \n## `break`\n\n有两个特殊的关键字可以在循环内部使用——`break`和`continue`。`break`关键字结束循环结构的执行。\n\n\
  ```\nfor (;;) { break; } // 结束 for 循环\n```\n\n它可以接受一个数字参数，指定要跳出多少层嵌套的循环结构。\n\n```\n\
  $i = 0;\nwhile ($i++ < 10)\n{\n    for (;;) { break 2; } // 结束 for 和 while 循环\n\
  }\n```\n\n## `continue`\n\n`continue`关键字可以在任何循环语句中使用，用于跳过当前循环的剩余部分，并继续执行下一次迭代的开始处。\n\
  \n```\nwhile ($i++ < 10) { continue; } // 开始下一次迭代\n```\n\n该关键字可以接受一个参数，指定要跳过多少层封闭循环的剩余部分。\n\
  \n```\n$i = 0;\nwhile ($i++ < 10)\n{\n    for (;;) { continue 2; } // 开始下一次 while\
  \ 迭代\n}\n```\n\n与许多其他语言不同，`continue`语句也适用于`switch`，在`switch`中它的行为与`break`相同。因此，要从`switch`内部跳过一次迭代，需要使用`continue\
  \ 2`。\n\n```\n$i = 0;\nwhile ($i++ < 10)\n{\n    switch ($i)\n    {\n        case\
  \ 1: continue 2; // 开始下一次 while 迭代\n    }\n}\n```\n\n## `goto`\n\nPHP 5.3 引入了第三个跳转语句`goto`，它可以跳转到指定的标签。标签是一个名称后跟一个冒号（`:`）。\n\
  \n```\ngoto myLabel; // 跳转到标签\nmyLabel:      // 标签声明\n```\n\n目标标签必须位于同一个脚本文件和作用域内。因此，`goto`不能用于跳入循环结构，只能跳出。\n\
  \n```\nloop:\nwhile (!$finished)\n{\n    // ...\n    if ($try_again) goto loop;\
  \ // 重新开始循环\n}\n```\n\n通常，最好避免使用`goto`语句，因为它往往会使执行流程难以理解。\n\n"
- "# 8. 函数\n\n函数是可重用的代码块，仅在调用时执行。它们允许将代码划分为更小、更易于理解和重用的部分。\n\n### 定义函数\n\n要创建函数，需要使用`function`关键字，后跟函数名、一对圆括号以及一个代码块。函数的命名约定与变量相同——使用描述性名称，每个单词首字母大写，但第一个单词除外。\n\
  \n```\nfunction myFunc()\n{\n    echo 'Hello World';\n}\n```\n\n函数代码块可以包含任何有效的 PHP\
  \ 代码，包括其他函数的定义。\n\n### 调用函数\n\n一旦定义，就可以通过输入函数名后跟一对圆括号，从页面的任何位置调用（激活）该函数。函数名不区分大小写，但最好使用与其定义中相同的大小写。\n\
  \n```\nmyFunc(); // \"Hello World\"\n```\n\n即使函数定义位于脚本文件的后面，也可以调用该函数。\n\n```\nfoo();\
  \ // 正确\nfunction foo() {}\n```\n\n例外情况是当函数仅在满足特定条件时才被定义时。必须先执行该条件代码，然后才能调用函数。\n\
  \n```\nbar(); // 错误\nif (true) { function bar() {} }\nbar(); // 正确\n```\n\n### 函数参数\n\
  \n函数名后面的圆括号用于向函数传递参数。为此，必须首先在函数定义中以逗号分隔的变量列表形式指定相应的参数。然后可以在函数中使用这些参数。\n\n```\nfunction\
  \ myFunc($x, $y)\n{\n    echo $x . $y;\n}\n```\n\n指定参数后，可以使用相同数量的参数调用函数。\n\n```\n\
  myFunc('Hello', ' World'); // \"Hello World\"\n```\n\n准确地说，**参数（parameters）**出现在函数定义中，而**实参（arguments）**出现在函数调用中。然而，这两个术语有时可以互换使用。\n\
  \n### 默认参数\n\n可以通过在参数列表中为参数赋值来指定参数的默认值。这样，如果在调用函数时未指定该实参，则使用默认值。为了使其按预期工作，重要的是将带有默认值的参数声明在不带默认值的参数的右侧。\n\
  \n```\nfunction myFunc($x, $y = ' Earth')\n{\n    echo $x . $y;\n}\nmyFunc('Hello');\
  \ // \"Hello Earth\"\n```\n\n### 可变参数列表\n\n函数调用时传递的实参不能少于其声明中指定的数量，但可以多于声明中指定的数量。这允许传递可变数量的参数，然后可以使用几个内置函数来访问这些参数。要一次获取一个参数，可以使用`func_get_arg`函数。该函数接受一个参数，即要返回的参数的索引，从零开始。\n\
  \n```\nfunction myArgs()\n{\n    $x = func_get_arg(0);\n    $y = func_get_arg(1);\n\
  \    $z = func_get_arg(2);\n    echo $x . $y . $z;\n}\nmyArgs('Fee', 'Fi', 'Fo');\
  \ // \"FeeFiFo\"\n```\n\n还有两个与参数列表相关的函数。`func_num_args`函数获取传递的参数数量，`func_get_args`返回包含所有这些参数的数组。它们可以一起使用，以允许函数处理可变数量的参数。\n\
  \n```\nfunction myArgs2()\n{\n    $num  = func_num_args();\n    $args = func_get_args();\n\
  \    for ($i = 0; $i < $num; $i++)\n        echo $args[$i];\n}\nmyArgs2('Fee', 'Fi',\
  \ 'Fo'); // \"FeeFiFo\"\n```\n\n可变参数列表的使用在 PHP 5.6 中得到了简化。从该版本开始，参数列表可以包含一个可变参数（variadic\
  \ parameter），由省略号（`...`）标记表示，它接受可变数量的参数。可变参数的行为类似于数组，并且必须始终是列表中的最后一个参数。\n\n```\n\
  function myArgs3(...$args)\n{\n    foreach($args as $v) {\n        echo $v;\n  \
  \  }\n}\nmyArgs3(1, 2, 3); // \"123\"\n```\n\n作为补充功能，省略号标记也可以用于将值集合解包到参数列表中。\n\n\
  ```\n$a = [1, 2, 3];\nmyArgs3(...$a); // \"123\"\n```\n\n## `return` 语句\n\n`return`是一个跳转语句，它会导致函数结束执行并返回到调用它的位置。\n\
  \n```\nfunction myFunc()\n{\n    return;    // 退出函数\n    echo 'Hi'; // 永远不会执行\n\
  }\n```\n\n它可以可选地被赋予一个要返回的值，在这种情况下，它使函数调用计算为该值。\n\n```\nfunction myFunc()\n{\n  \
  \  // 退出函数并返回值\n    return 'Hello';\n}\necho myFunc(); // \"Hello\"\n```\n\n没有返回值的函数会自动返回`null`。\n\
  \n```\nfunction myNull() {}\nif (myNull() === null)\n    echo 'true'; // \"true\"\
  \n```\n\n### 作用域与生命周期\n\n通常，PHP 变量的作用域从其声明处开始，一直持续到页面结束。然而，在函数内部会引入一个局部函数作用域。默认情况下，在函数内部使用的任何变量都仅限于此局部作用域。一旦函数作用域结束，局部变量就会被销毁。\n\
  \n```\n$x = 'Hello'; // 全局变量\nfunction myFunc()\n{\n    $y = ' World'; // 局部变量\n\
  }\n```\n\n在 PHP 中，尝试从函数内部访问全局变量是行不通的，反而会创建一个新的局部变量。为了使全局变量可访问，必须通过使用`global`关键字声明该变量的作用域，将其扩展到函数内部。\n\
  \n```\n$x = 'Hello'; // 全局变量 $x\nfunction myFunc()\n{\n    global $x;      // 使用全局变量\
  \ $x\n    $x .= ' World'; // 修改全局变量 $x\n}\nmyFunc();\necho $x; // \"Hello World\"\
  \n```\n\n访问全局作用域变量的另一种方法是使用预定义的`$GLOBALS`数组。通过变量名（指定为不带美元符号的字符串）来引用该变量。\n\n```\n\
  function myFunc()\n{\n    $GLOBALS['x'] .= ' World'; // 修改全局变量 $x\n}\n```\n\n\n\n"
- '# PHP 控制结构与特性


  与许多其他语言不同，PHP 的控制结构（例如循环和条件语句）没有自己的变量作用域。因此，在这样的代码块中定义的变量在代码块结束时不会被销毁。


  ```

  if(true)

  {

  $x = 10; // 全局变量 $x

  }

  echo $x; // 输出 "10"

  ```


  除了全局变量和局部变量，PHP 还有属性变量；这些将在下一章中讨论。


  ### 匿名函数


  PHP 5.3 引入了匿名函数（anonymous functions），它允许将函数作为参数传递并赋值给变量。匿名函数的定义方式与普通函数类似，只是没有指定名称。该函数可以使用正常的赋值语法（包括分号）赋值给一个变量。然后可以像调用函数一样调用该变量。


  ```

  $say = function($name)

  {

  echo "Hello " . $name;

  };

  $say("World"); // 输出 "Hello World"

  ```


  匿名函数主要用作回调函数（callback functions）。这是一个作为参数传递给另一个函数的函数，另一个函数预期在执行过程中调用它。


  ```

  function myCaller($myCallback)

  {

  echo $myCallback();

  }

  // 输出 "Hello"

  myCaller( function() { echo "Hello"; } );

  ```


  通过这种方式，可以将功能注入到现有函数中，从而增加其通用性。例如，内置函数`array_map`将其回调应用于给定数组的每个元素。


  ```

  $a = [1, 2, 3];

  $squared = array_map(function($val)

  {

  return $val * $val;

  }, $a);

  foreach ($squared as $v)

  echo $v; // 输出 "149"

  ```


  使用匿名函数的一个好处是，它们提供了一种简洁的方式来定义那些只在特定位置使用一次的函数。这也防止了此类一次性的函数污染全局作用域。


  ### 闭包


  闭包（closure）是一种可以捕获其创建时所在作用域内局部变量的匿名函数。在 PHP 中，所有匿名函数都是闭包。它们可以在函数头部通过`use`子句指定要捕获的变量。


  ```

  $x = 1;

  $y = 2;

  $myClosure = function($z) use ($x, $y)

  {

  return $x + $y + $z;

  };

  echo $myClosure(3); // 输出 "6"

  ```


  ### 生成器


  生成器（generator）是一个用于生成一系列值的函数。每个值通过`yield`语句返回。与`return`不同，`yield`语句会保存函数的状态，使其在被再次调用时能够从上次离开的地方继续执行。


  ```

  function getNum()

  {

  for ($i = 0; $i < 5; $i++) {

  yield $i;

  }

  }

  ```


  生成器函数的行为类似于迭代器；因此，它可以与`foreach`循环一起使用。循环会一直持续到生成器没有更多的值可以`yield`为止。


  ```

  foreach(getNum() as $v)

  echo $v; // 输出 "01234"

  ```


  生成器是在 PHP 5.5 中引入的。在 PHP 7 中通过`yield from`语句扩展了其用途，该语句允许一个生成器从另一个生成器、迭代器或数组中`yield`值。


  ```

  function countToFive()

  {

  yield 1;

  yield from [2, 3, 4];

  yield 5;

  }

  foreach (countToFive() as $v)

  echo $v; // 输出 "12345"

  ```


  由于生成器只在需要时逐个生成值，因此它们无需一次性计算并存储整个序列。在生成大量数据时，这可以带来显著的性能优势。


  ### 内置函数


  PHP 带有大量始终可用的内置函数，例如字符串和数组处理函数。其他函数取决于 PHP 编译时包含了哪些扩展；例如，用于与 MySQL 数据库通信的 MySQLi
  扩展。有关 PHP 内置函数的完整参考，请参阅 PHP 函数参考。²


