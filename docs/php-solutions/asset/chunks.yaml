- fmt: '### Joining Strings Together


    PHP has a rather unusual way of joining strings (text). Although many other computer
    languages use the plus sign (`+`), PHP uses a period, dot, or full stop (`.`),
    like this:


    ```

    $firstName = ''David'';

    $lastName = ''Powers'';

    echo $firstName.$lastName; // displays DavidPowers

    ```


    As the comment in the final line of code indicates, when two strings are joined
    like this, PHP leaves no gap between them. Don’t be fooled into thinking that
    adding a space after the period will do the trick. It won’t. You can put as much
    space on either side of the period as you like; the result will always be the
    same, because PHP ignores whitespace in code. In fact, it’s recommended to leave
    a space on either side of the period for readability.


    To display a space in the final output, you must either include a space in one
    of the strings or insert the space as a string in its own right, like this:


    ```

    echo $firstName . '' '' . $lastName; // displays David Powers

    ```


    **Tip**: The period—or concatenation operator, to give it its correct name—can
    be difficult to spot among a lot of other code. Make sure the font size in your
    script editor is large enough to read without straining to see the difference
    between periods and commas.


    ### Working With Numbers


    PHP can do a lot with numbers, from simple addition to complex math. The second
    half of this chapter contains details of the arithmetic operators you can use
    with PHP. All you need to remember at the moment is that numbers must not contain
    any punctuation other than a decimal point. PHP will choke if you feed it numbers
    that contain commas (or anything else) as the thousands separator.


    ## Understanding PHP Error Messages


    Error messages are an unfortunate fact of life, so you need to understand what
    they’re trying to tell you. The following illustration shows a typical error message.


    ![A978-1-4842-0635-5_3_Figa_HTML.jpg](A978-1-4842-0635-5_3_Figa_HTML.jpg)


    PHP error messages report the line where PHP discovered a problem. Most newcomers—quite
    naturally—assume that’s where to look for their mistake. Wrong...


    Most of the time, PHP is telling you that something unexpected has happened. In
    other words, the mistake lies before that point. The preceding error message means
    that PHP discovered an `echo` command where there shouldn’t have been one. (Error
    messages always prefix PHP elements with `T_`, which stands for token. Just ignore
    it.)


    Instead of worrying what might be wrong with the `echo` command (probably nothing),
    start working backward, looking for anything missing, probably a semicolon or
    closing quote on a previous line.


    Sometimes, the message reports the error on the last line of the script. That
    always means you have omitted a closing curly brace somewhere further up the page.


    There are seven main categories of errors, presented here in descending order
    of importance:


    - **Fatal error**: Any HTML output preceding the error will be displayed, but
    once the error is encountered—as the name suggests—everything else is killed stone
    dead. A fatal error is normally caused by referring to a nonexistent file or function.

    - **Recoverable error**: This type of error occurs only when a particular type
    of error known as an exception is thrown. The error message contains much detail,
    explaining the cause and location of the problem, but it can be difficult for
    beginners to understand. To avoid recoverable errors, use `try` and `catch` blocks
    as described in the “Handling exceptions” section.

    - **Parse error**: This means there’s a mistake in your code syntax, such as mismatched
    quotes or a missing semicolon or closing brace. It stops the script in its tracks,
    and it doesn’t even allow any HTML output to be displayed.

    - **Warning**: This alerts you to a serious problem, such as a missing include
    file. (Include files are the subject of [Chapter 4](#A978-1-4842-0635-5_4_Chapter.html).)
    However, the error is not serious enough to prevent the rest of the script from
    being executed.

    - **Deprecated**: This warns you about features that are scheduled to be removed
    from a future version of PHP. If you see this type of error message, you should
    seriously consider updating your script, as it could suddenly stop working if
    your server is upgraded.

    - **Strict**: This type of error message warns you about using techniques that
    are not considered good practice.

    - **Notice**: This advises you about relatively minor issues, such as the use
    of a nondeclared variable. Although this type of error won’t stop your page from
    displaying (and you can turn off the display of notices), you should always try
    to eliminate them. Any error is a threat to your output.


    ### Why is My Page Blank?


    Many beginners are left scratching their heads when they load a PHP page into
    a browser and see absolutely nothing. There’s no error message, just a blank page.
    This happens when there’s a parse error—in other words, a mistake in the code—and
    the `display_errors` directive in `php.ini` is turned off.


    If you followed the advice in the previous chapter, `display_errors` should be
    enabled in your local testing environment. However, most hosting companies turn
    off `display_errors`. This is good for security, but it can make it difficult
    to troubleshoot problems on your remote server. As well as parse errors, a missing
    include file often causes blank pages.


    You can turn on the display of errors for an individual script by adding the following
    code right at the top of the page:


    ```

    ini_set(''display_errors'', ''1'');

    ```


    Put this code on the first line after the opening PHP tag, or in a separate PHP
    block at the top of the page if the PHP is lower down the page. When you upload
    the page and refresh the browser, you should see any error messages generated
    by PHP.


    If you still see a blank page after adding this line of code, it means there’s
    an error in your syntax. Test the page locally with `display_errors` turned on
    to find out what’s causing the problem.


    **Caution**: After correcting the error, remove the code that turns on the display
    of errors. If something else breaks in the script at a later stage, you don’t
    want to expose potential vulnerabilities on your live website.'
