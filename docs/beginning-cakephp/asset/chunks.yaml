- fmt: "# 自定义控制器与模型\n\n本操作中的大部分逻辑与本章“自定义博客控制器”部分讨论的命令类似。不同之处在于它使用了模型函数。在第6章中，我简要讨论了`save()`函数，现在我将更详细地解释这个模型函数。\n\
    \n## `save()`函数\n\n如前所述，`save()`函数接受一个格式化数组（通常是自动格式化的`$this->data`数组），并将其值保存到数据库中匹配的字段中。\n\
    \n该函数还提供了一些其他参数，用于数据验证和指定数据将保存到哪些字段（请参见表7-6）。\n\n**表7-6.** `save()`模型函数中可用的参数（按顺序）\n\
    \n| 名称 | 类型 | 默认值 | 说明 |\n|------|------|--------|------|\n| `data` | `Array`\
    \ | `null` | 要保存到数据库的数据，按字段和值进行键控 |\n| `validate` | `Boolean` | `true` | 触发在相应模型中指定的数据验证\
    \ |\n| `fieldList` | `Array` | `null` | 允许写入数据的字段列表 |\n\n`save()`函数根据保存的成功与否返回`true`或`false`。\n\
    \n例如，当数据验证发生并未通过测试（如模型中指定的那样）时，模型将返回`false`。在控制器中，可以指定诸如闪存消息或对失败验证做出反应等其他方法。\n\
    \n请注意，清单7-6中的第4行已经用于处理`save()`函数的返回结果。换句话说，如果`save()`函数返回`true`，第4行会触发第5-6行的执行。要运行验证测试，你不必使用控制器（实际上，你应该避免使用控制器），你可以在模型内部单独运行验证。\n\
    \n## 数据验证\n\nWeb开发中最繁琐的任务之一可能就是对用户提交的表单进行数据验证测试。这项任务如此繁琐的一个原因是，当你给用户一个开放式字段时，他们真的可以向应用程序提交任何内容。\n\
    \n应用程序如何知道如何处理用户可能提供的无数文本变体？与其陷入关于正则表达式的冗长而艰苦的讨论中，Cake让你用更少的技术术语来解决这个问题。\n\n为用户提交的表单（如添加操作）设置数据验证的第一步是打开模型并开始定义验证规则。转到`app/models/post.php`文件。\n\
    \n它应该看起来像清单7-7中的代码。\n\n**清单7-7.** Post模型\n\n```php\n<?\nclass Post extends AppModel\
    \ {\n    var $name = 'Post';\n    var $belongsTo = array('User');\n    var $hasAndBelongsToMany\
    \ = array('Tag');\n}\n?>\n```\n\n你已经构建了与`User`和`Tag`模型的关联。通过在5行和6行之间插入一个新行，开始构建你的验证规则。\n\
    \n```php\nvar $validate = array();\n```\n\n到目前为止，`$validate`属性数组中还没有输入任何规则。要创建验证规则，只需将数组键控为对应于字段及其规则。如果在保存过程中任何规则未满足，模型将向控制器返回错误并退出保存过程。\n\
    \n`posts`表将接收`name`、`date`和`content`字段的数据，并将接收关联的`User`模型的ID。你可以通过为每个字段提供一个键并在`$validate`数组中提供一个规则来验证为这些字段提供的数据类型。在这里，数据库中的字段类型将帮助你确定要存储的数据类型。`name`字段是一个标准的`varchar`字段，因此你可能希望验证此处存储的唯一字符是字母数字。只需将以下字符串添加到`$validate`数组中：`var\
    \ $validate = array('name'=>'alphaNumeric');`"
  raw: 'Most of the logic in this action resembles the commands discussed in the “Customizing
    the Controller for the Blog” section of this chapter. Where this action differs
    is in its use of model functions. In Chapter 6, I briefly discussed the save()
    function; now I’ll explain this model function more carefully.


    **The save() Function**


    As previously mentioned, the save() function takes a formatted array (usually
    the automatically formatted $this->data array) and saves its values to matching
    fields in the database.


    Some other parameters are available for this function that allow for data validation
    and specifying to which fields the data will be saved (see Table 7-6).


    **Table 7-6.** *Parameters, in Order, Available in the* save() *Model Function*
    **Name**


    **Type**


    **Default Value**


    **Explanation**


    data


    Array


    null


    The data, keyed by field and value, to be saved to the


    database


    validate


    Boolean


    true


    Triggers data validation as specified in the


    corresponding model


    fieldList


    Array


    null


    A list of fields to which data is allowed to be written


    09775ch07final 7/1/08 9:46 PM Page 102


    **102**


    C H A P T E R 7 ■ W O R K I N G W I T H C O N T R O L L E R S A N D M O D E L
    S


    The save() function returns either a true or false depending on the success of
    the save.


    For example, when data validation occurs and fails a test (as specified in the
    model), the model will return false. In the controller, processes such as flash
    messaging or reacting to a failed validation in other methods can be specified.


    Notice that Line 4 in Listing 7-6 already is made to handle a returned result
    of the save() function. In other words, line 4 fires off lines 5–6 if the save()
    function returns true. To run a validation test, you don’t have to use the controller
    (in fact, you should avoid using the controller); you can run validations in the
    model alone.


    **Validating Data**


    Perhaps one of the most cumbersome tasks in web development is running data validation
    tests on user-submitted forms. One reason why this can be such a detailed task
    is that users really can throw just about anything at the application when you
    give them an open field.


    How is the application supposed to know how to deal with an infinite number of
    textual variations the user could provide? Rather than get pulled into a long
    and grueling conversation about regular expressions, Cake lets you tackle this
    problem in much less technical terms.


    The first step to setting up data validation for user-submitted forms, as in the
    Add action, is to open the model and begin defining validation rules. Go to the
    app/models/post.php file.


    It should appear like the code in Listing 7-7.


    **Listing 7-7.** *The Post Model*


    <?


    class Post extends AppModel {


    var $name = ''Post'';


    var $belongsTo = array(''User'');


    var $hasAndBelongsToMany = array(''Tag'');


    }


    ?>


    You have already built the model’s associations with the User and Tag models.
    Begin building your validation rules by inserting a new line between lines 5 and
    6.


    var $validate = array();


    So far, no rules have been entered in the $validate attribute array. To create
    a validation rule, simply key the array to correspond to fields and their rules.
    If any of the rules are not met during a save, the model will then return an error
    to the controller and exit the save process.


    The posts table will receive data for the name, date, and content fields and will
    receive the ID for the associated User model. You can validate the type of data
    being supplied for each of these fields by providing a key for each and a rule
    in the $validate array. Here is where the type of field in the database will help
    you determine the kinds of data you want to store. The name field is a standard
    varchar field, so you may want to validate that the only characters to be stored
    here are alphanumeric. Simply add the following string to the $validate array:
    var $validate = array(''name''=>''alphaNumeric'');


