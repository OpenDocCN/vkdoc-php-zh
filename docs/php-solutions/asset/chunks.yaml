- fmt: '### Choosing Between `Date()` and the `DateTime` Class


    When it comes to displaying a date, it’s always a two-step process with the `DateTime`
    class. You need to instantiate the object before you can call the `format()` method.
    With the `date()` function, you can do it in a single pass. Since they both use
    the same format characters, `date()` wins hands down when dealing with the current
    date and/or time.


    For simple tasks like displaying the current date, time, or year, use `date()`.
    Where the `DateTime` class comes into its own is when working with date-related
    calculations and time zones using the methods listed in Table [14-5](#A978-1-4842-0635-5_14_Chapter.html#Tab5)。


    Table 14-5. The main `DateTime` methods


    | Method | Arguments | Description |

    | --- | --- | --- |

    | `format()` | Format string | Formats the date/time using the format characters
    in Table 14-4. |

    | `setDate()` | Year, month, day | Changes the date. The arguments should be separated
    by commas. Months or days in excess of the permitted range are added to the resulting
    date, as described in the main text. |

    | `setTime()` | Hours, minutes, seconds | Resets the time. Arguments are comma-separated
    values. Seconds are optional. Values in excess of the permitted range are added
    to the resulting date/time. |

    | `modify()` | Relative date string | Changes the date/time using a relative expression,
    such as ‘+2 weeks’. |

    | `getTimestamp()` | None | Returns the Unix timestamp for the date/time. |

    | `setTimestamp()` | Unix timestamp | Sets the date/time according to the Unix
    timestamp. |

    | `setTimezone()` | `DateTimeZone` object | Changes the time zone. |

    | `getTimezone()` | None | Returns a `DateTimeZone` object representing the `DateTime`
    object’s time zone. |

    | `getOffset()` | None | Returns the time zone offset from UTC, expressed in seconds.
    |

    | `add()` | `DateInterval` object | Increments the date/time by the set period.
    |

    | `sub()` | `DateInterval` object | Deducts the set period from the date/time.
    |

    | `diff()` | `DateTime` object, Boolean | Returns a `DateInterval` object representing
    the difference between the current `DateTime` object and the one passed as an
    argument. Using `true` as the optional second argument converts negative values
    to their positive equivalent. |


    Adding out-of-range values with `setDate()` and `setTime()` results in the excess
    being added to the resulting date or time. For example, using 14 as the month
    sets the date to February of the following year. Setting the hour to 26 results
    in 2am on the following day.


    A useful trick with `setDate()` allows you to set the date to the last day of
    any month by setting the month value to the following month, and the day to 0.
    The code in `setDate.php` demonstrates this with the last day of February 2015
    and 2016 (a leap year).


    ```

    <?php


    $format = ''F j, Y'';


    $date = new DateTime();


    $date->setDate(2015, 3, 0);


    ?>

    ```


    ```

    <p>Non-leap year: <?= $date->format($format); ?>.</p>


    <p>Leap year: <?php $date->setDate(2016, 3, 0);


    echo $date->format($format); ?>.</p>

    ```


    The preceding example produces the following output:


    ![A978-1-4842-0635-5_14_Figc_HTML.jpg](A978-1-4842-0635-5_14_Figc_HTML.jpg)


    ### Handling Overflows with Relative Dates


    The `modify()` method accepts a relative date string, which can produce unexpected
    results. For example, if you add one month to a `DateTime` object that represents
    January 31, 2011, the resulting value is not the last day of February, but March
    3.


    This happens because adding one month to the original date results in February
    31, but February has only 28 days in a non-leap year. So, the out-of-range value
    is added to the month, resulting in March 3. If you subsequently subtract one
    month from the same `DateTime` object, it brings you back to February 3, not to
    the original starting date. The code in `date_modify_01.php` illustrates this
    point, as Figure [14-9](#A978-1-4842-0635-5_14_Chapter.html#Fig9) shows.


    ```

    <?php


    $format = ''F j, Y'';


    $date = new DateTime(''January 31, 2015'');


    ?>

    ```


    ```

    <p>Original date: <?= $date->format($format); ?>.</p>


    <p>Add one month: <?php


    $date->modify(''+1 month'');


    echo $date->format($format);


    $date->modify(''-1 month'');


    ?>


    <p>Subtract one month: <?= $date->format($format); ?>

    ```


    ![A978-1-4842-0635-5_14_Fig9_HTML.jpg](A978-1-4842-0635-5_14_Fig9_HTML.jpg)


    Figure 14-9. Adding and subtracting months can lead to unexpected results


    The way to avoid this problem is to use `''last day of''` in the relative expression,
    like this (the code is in `date_modify_02.php`):


    ```

    <?php


    $format = ''F j, Y'';


    $date = new DateTime(''January 31, 2015'');


    ?>

    ```


    ```

    <p>Original date: <?= $date->format($format); ?>.</p>


    <p>Add one month: <?php


    $date->modify(''last day of +1 month'');


    echo $date->format($format);


    $date->modify(''last day of -1 month'');


    ?>


    <p>Subtract one month: <?= $date->format($format); ?>

    ```


    As Figure [14-10](#A978-1-4842-0635-5_14_Chapter.html#Fig10) shows, this now produces
    the desired result.


    ![A978-1-4842-0635-5_14_Fig10_HTML.jpg](A978-1-4842-0635-5_14_Fig10_HTML.jpg)


    Figure 14-10. Using ‘last day of’ in the relative expression eliminates the problem'
