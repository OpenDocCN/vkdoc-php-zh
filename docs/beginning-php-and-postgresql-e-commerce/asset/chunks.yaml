    <br /><br />\n\n&lt;input type=\"text\" name=\"department_name\" value=\"[name]\"\
    \ size=\"30\" /&gt;\n&lt;input type=\"text\" name=\"department_description\" value=\"\
    [description]\"\nsize=\"60\" /&gt;\n\n&lt;input type=\"submit\" name=\"submit_add_dep_0\"\
    \ value=\"Add\" /&gt;\n</form>\n</code></pre>\n\n<ol start=\"2\">\n<li>Create\
    \ a new plugin file named <code>function.load_admin_departments.php</code> in\
    \ the <code>presentation/smarty_plugins</code> folder, and add the following to\
    \ it:</li>\n</ol>\n\n```php\n<?php\n\n/* Smarty plugin function that gets called\
    \ when the\nload_admin_departments function plugin is loaded from a template */\n\
    \nfunction smarty_function_load_admin_departments($params, $smarty)\n{\n    //\
    \ Create AdminDepartments object\n    $admin_departments = new AdminDepartments();\n\
    \    $admin_departments->init();\n\n    // Assign template variable\n    $smarty->assign($params['assign'],\
    \ $admin_departments);\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH07a.qxd 10/25/06 10:56 PM Page 219\n\nCHAPTER 7 ■ CATALOG ADMINISTRATION\n\
    \n**219**\n\n```php\n// Class that supports departments admin functionality\n\
    class AdminDepartments\n{\n    // Public variables available in smarty template\n\
    \    public $mDepartmentsCount;\n    public $mDepartments;\n    public $mErrorMessage\
    \ = '';\n    public $mEditItem;\n    public $mAdminDepartmentsTarget = 'admin.php?Page=Departments';\n\
    \n    // Private members\n    public $mAction = '';\n    public $mActionedDepartmentId;\n\
    \n    // Class constructor\n    public function __construct()\n    {\n       \
    \ // Parse the list with posted variables\n        foreach ($_POST as $key =>\
    \ $value)\n            // If a submit button was clicked ...\n            if (substr($key,\
    \ 0, 6) == 'submit')\n            {\n                /* Get the position of the\
    \ last '_' underscore from submit button name e.g strtpos('submit_edit_dep_1',\
    \ '_') is 16 */\n                $last_underscore = strrpos($key, '_');\n\n  \
    \              /* Get the scope of submit button\n                (e.g 'edit_dep'\
    \ from 'submit_edit_dep_1') */\n                $this->mAction = substr($key,\
    \ strlen('submit_'),\n                    $last_underscore - strlen('submit_'));\n\
    \n                /* Get the department id targeted by submit button\n       \
    \         (the number at the end of submit button name)\n                e.g '1'\
    \ from 'submit_edit_dep_1' */\n                $this->mActionedDepartmentId =\
    \ substr($key, $last_underscore + 1);\n                break;\n            }\n\
    \    }\n\n    public function init()\n    {\n        // If adding a new department\
    \ ...\n        if ($this->mAction == 'add_dep')\n        {\n            $department_name\
    \ = $_POST['department_name'];\n            $department_description = $_POST['department_description'];\n\
    \n            if ($department_name == null)\n                $this->mErrorMessage\
    \ = 'Department name required';\n\n            if ($this->mErrorMessage == null)\n\
    \                Catalog::AddDepartment($department_name, $department_description);\n\
    \        }\n\n        // If editing an existing department ...\n        if ($this->mAction\
    \ == 'edit_dep')\n            $this->mEditItem = $this->mActionedDepartmentId;\n\
    \n        // If updating a department ...\n        if ($this->mAction == 'update_dep')\n\
    \        {\n            $department_name = $_POST['name'];\n            $department_description\
    \ = $_POST['description'];\n\n            if ($department_name == null)\n    \
