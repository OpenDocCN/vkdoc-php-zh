  trans: "\n# 处理异常\n\n作为程序员，你应尽一切可能确保程序不会崩溃。任何使用你应用的人，如果不得不应对系统崩溃，都会感到非常糟糕。你可能也经历过这种情况。作为用户，你可能会因为差评而选择某个应用而非另一个。一旦某个应用被认定为“漏洞百出”，即使新版本修正了部分或全部问题，也很难说服客户使用该产品。必须创建一个能够处理所有可能意外事件的应用。\n\
    \n程序必须审视每种场景，并判断是继续运行还是必须关闭。总有可能因意外事件导致应用无法继续运行。设计得当的程序会在不崩溃的情况下告知用户存在问题。当一个应用要求用户“稍后重试”时（假设问题在他们返回网站前已修复），用户更有可能理解。\n\
    \n## 错误\n\n`错误`是由系统处理的程序事件，会导致程序关闭。在某些情况下，系统可以关闭程序并显示错误消息。有些错误会直接导致程序崩溃（例如服务器本身崩溃）。错误通常是程序控制范围之外的事件，并非直接由程序中的代码（或代码缺失）引起。例如，内存不足会导致应用错误。\n\
    \n## 异常\n\n`异常`是不属于程序逻辑正常流程的事件。所有异常都应由程序处理。当应用预见到问题（如文件缺失）或用户做了非常规操作（如输入无效信息）时，可以“引发”异常。程序应“捕获”所有异常，然后检查异常并判断是否可以纠正、忽略，或者应用必须关闭。如果程序不捕获异常，系统将显示异常消息并关闭应用。\n\
    \n根据具体情况，PHP 会产生错误和异常的混合体。在 PHP 5 之前，并不存在异常处理机制。因此，一些较旧的 PHP 命令会产生错误（导致程序关闭）而非异常。自\
    \ PHP 7 起，异常处理成为了“规则”。错误可以通过异常处理技术来处理。如果异常未通过程序代码处理，程序将像遇到致命错误一样停止运行。\n\n任何依赖外部因素的应用，都可能在某时出现问题。例如，在\
    \ `Dog` 应用中，期望用户输入正确的信息。应用必须预见到并非所有用户都会输入正确信息。该应用还依赖于服务器上的几个文件（`dog_interface`、`dog_container`、`dog_applications`\
    \ 和 `get_breeds`）。如果这些文件中任何一个缺失，应用都无法继续正常运行。\n\n大多数面向对象编程语言使用标准格式来处理异常。当前版本的 PHP\
    \ 也采用这种方法。当你在互联网上探索 PHP 示例时，会发现一些现有的 PHP 代码并未使用这种标准格式。标准方法使用 `try-catch` 块。\n\n\
    ```php\ntry {\n// 可能引发异常的代码\n}\ncatch(Throwable $t) {\n// PHP 7+ 格式，用于捕获所有异常。无法捕获\
    \ PHP 7 之前的问题。\n}\ncatch(Error $e) {\n// PHP 7+ 捕获并处理错误。无法捕获无法恢复的错误，例如服务器内存错误。\n\
    }\ncatch(Exception $e) {\n// 捕获 PHP 5+ 异常的代码。本书示例中未包含。\n}\n```\n\n任何可能引发异常的代码都应包含在\
    \ `try` 块中。此外，你可能还需要考虑将其他条件（例如数学计算）也放入 `try` 块中。\n\n```php\ntry {\n$result = $firstNumber\
    \ / $secondNumber;\n}\ncatch(Throwable $t) {\n// 发生异常时执行的代码\n$t->getMessage();\n\
    }\ncatch(Error $e) {\n// PHP 7+ 捕获并处理错误\n$e->getMessage();\n}\n```\n\n如果 `$secondNumber`\
    \ 包含零（除以零），此示例可能会产生异常。如果发生异常，代码将跳转到 `Throwable` 的 `catch` 块。该块中的任何代码随后都会被执行。语句\
    \ `$t->getMessage();` 将显示与异常相关的任何系统消息（在此例中，是关于尝试除以零的消息）。但是，你不必非得使用系统消息；你可以使用 `echo`\
    \ 或 `print` 向用户显示消息。\n\n```php\ntry {\n$result = $firstNumber / $secondNumber;\n\
    }\ncatch(Throwable $t) {\necho \"您为第二个数字输入了零。您的输入必须大于零\";\n}\n```\n\n然而，这些示例存在一个问题。如果你试图在\
    \ `try` 块中捕获多种类型的异常，所有异常都会进入同一个 `catch` 块。任何异常都会显示相同的消息。\n\n有几种不同的方法可以处理这种情况。\n\
    \n一种方法是自行抛出异常，而不是让系统抛出异常。\n\n- **编程注释**——除了 `getMessage` 方法外，`Exception` 和 `Error`\
    \ 对象还包括：\n  - `getCode()`——显示导致异常的代码\n  - `getFile()`——显示包含抛出异常代码的文件名\n  - `getLine()`——显示抛出异常的行号\n\
    \  - `getTrace()` 和 `getTraceAsString()`——显示回溯（异常在程序中的流程）信息\n  - 在某些情况下，向用户显示\
    \ `Exception` 或 `Error` 消息可能是合适的。然而，其他方法应仅用于调试或日志记录。向用户提供代码信息通常是不必要的，并且是一种安全漏洞。\n\
    \n```php\ntry {\nif ($secondNumber == 0)\n{ throw new Exception(\"零异常\"); }\n\
    else { $result = $firstnumber / $secondnumber; }\n// 其他可能产生异常的代码\n}\ncatch(Exception\
    \ $e) {\nswitch ($e->getMessage()) {\ncase \"零异常\":\necho \"第二个数字的值必须大于零\";\n\
    break;\ncase \"其他某种异常\":\necho \"您做了其他错误操作\";\nbreak;\n}\n}\ncatch(Throwable $t)\
    \ {\necho $t->getMessage();\n}\n```\n\n在这个示例中，`catch` 块中使用了一个 `switch` 语句来检查可能的异常消息。`switch`\
    \ 语句完成了与内嵌 `if` 语句相同的任务。你也可以使用：\n\n```php\nIf($e->getMessage == \"零异常\")\n{ echo\
    \ \"第二个数字的值必须大于零\"; }\nelse if($e->getMessage == \"其他某种异常\")\n{ echo \"您做了其他错误操作\"\
    ; }\n```\n\n对于某些人来说，当需要检查同一属性（变量）的多个可能值或执行某个方法得到的结果时（如本例所示），`switch` 语句更容易理解。`switch`\
    \ 语句的 `default` 部分（或内嵌 `if` 语句中的最后一个 `else` 语句）用于捕获你未预料到的任何情况。\n\n如前所述，处理所有异常和错误非常重要。通过包含默认代码，你能够处理那些你从未预料到的异常和错误。请注意，每个\
    \ `case` 部分都必须以 `break` 作为最后一条语句。这可以防止代码继续执行到下一个 `case` 语句。\n\n处理多个异常的另一种方法是创建你自己的异常、抛出它们，然后再捕获它们。你需要为自己的异常创建一个类。\n"
- fmt: '```php

    class zeroException extends Exception {

    public function errorMessage() {

    $errorMessage = "Second Number cannot be " . $this->getMessage();

    return $errorMessage;

    }

    }

    try {

    if ($secondNumber == 0)

    { throw new zeroException("Zero"); }

    else

    { $result = $firstnumber / $secondnumber; }

    // other code with exceptions

    }

    catch(zeroException $e) {

    echo $e->errorMessage();

    }

    catch(Throwable $t) {

    Echo $t->getMessage();

    }

    ```


    `zeroException`类*继承*自`Exception`类。`extends`关键字用于继承`Exception`**类**的所有功能。*继承*是面向对象编程的另一个关键组成部分（与封装和多态一起）。*子***类**（如`zeroException`）可以继承其*父*类（`Exception`）的所有属性和方法。然后子类可以添加特定于该类的方法（例如`errorMessage`函数）。由于`zeroException`继承了`Exception`，它被当作其他任何异常一样对待。可以抛出`zeroException`（`throw
    new zeroException("Zero")`），也可以捕获它（`catch(zeroException $e)`）。


    *   *程序说明——程序员创建的异常类继承自* *`Exception`。因此，任何新的异常类都可以使用* *`Exception`* *类的全部功能。*

    *   *`class zeroException extends Exception { }`*

    *   *上述代码创建了一个有效的新的* *`zeroException`* *类，且没有新方法。*

    *   *`catch(zeroException $e) { echo $e->getMessage(); }`*

    *   *这个* *`catch`* *块将被新的异常调用，并显示由* *`Exception`* *类生成的异常消息。*


    对于每个创建并抛出的异常类，都必须有一个`catch`块来捕获该异常。在示例中，有两个`catch`块：一个捕获`zeroException`，另一个捕获可能出现的任何其他异常。就像之前使用`switch`默认或`if
    else`语句的示例一样，应该始终让最后一个`catch`块处理任何剩余的异常或错误。如果通用`catch`块排在第一位，则所有异常都会由该块捕获，而不会由特定的异常处理块捕获。

    如前所述，开发人员应尽一切努力防止应用程序崩溃。然而，错误被设计为显示消息并使用错误代码关闭程序（即你认为的“崩溃”程序）。在 PHP 7 之前，在某些情况下，可以通过创建处理错误的方法来覆盖此功能。


    自 PHP 7 起，`Error`对象将许多潜在的系统错误作为异常来捕获。


    ```

    try {

    call_method(null); // no such method!

    }

    catch (Error $e)

    {

    echo $e->getMessage();

    }

    ```


    以前，调用一个不存在的函数会导致致命错误。使用`EngineException`对象允许程序员处理该错误。这项新技术旨在让程序员对错误有更多的控制。如果未包含此`catch`块，任何“错误”都会导致程序崩溃并显示`"Fatal
    error: Uncaught exception"`消息。尽可能使用新的`Error`对象和`Exception`对象来避免致命错误。


    *   *安全性和性能——通常，使用抛出和捕获异常可以减少程序所需的代码量。然而，存在权衡。一些针对不同面向对象编程语言的研究得出的结论是，异常处理效率（性能）低于使用开发者创建的例程。开发人员应将异常用作应用程序正常流程的真正“例外”。对于更频繁发生的情况，开发人员应该在应用程序中创建情况处理例程。*


    ![../images/394210_2_En_6_Chapter/394210_2_En_6_Fig1_HTML.jpg](images/394210_2_En_6_Chapter/394210_2_En_6_Fig1_HTML.jpg)


    Figure 6-1

    Dog 应用程序的数据流


    在`Dog`应用程序中，信息在许多不同程序之间流动。这些程序中的每一个都必须能正确处理异常。然而，消息处理应全部在接口中发生。属于业务规则层的任何对象（`dog_container`、`dog`和`get_breeds`）都应将所有异常消息传递给接口来处理。起初这听起来可能是一项复杂且令人困惑的任务。然而，异常处理的层次结构将极大地简化此任务。正如你将看到的，使用异常处理将减少所需的代码量。

    当抛出异常时，环境将在程序（或类）内部查找是否存在可以处理该异常的`catch`块。如果没有`catch`块，它会向上移动一个层次级别，并检查任何调用程序（或创建该类实例的程序）是否存在`catch`块。此过程将一直持续，直到发现某个`catch`块，或者确定必须由环境本身来处理该异常。

    使用此过程，我们可以在`dog_container`、`dog`和`get_breeds`模块中抛出异常，而无需使用`catch`块。在`dog_interface`中，我们可以围绕对这些文件的调用创建一个`try`块。可以在接口中创建多个`catch`块（或一个带有`switch`语句的`catch`块）来处理来自接口和所有其他模块的异常。这满足了三层编程的一个要求。业务规则层（和数据层）将消息传递给接口层。然后接口层决定如何处理这些消息。它可以将消息显示给用户、将其放入日志文件（我们将在本章后面介绍），或者忽略它们（前提是不对应用程序的操作产生不利影响）。


    在我们更改`Dog`应用程序代码之前，让我们看一个通过层次结构处理异常的示例。


    ```

    produceerror();

    echo “This line does not display”;

    $tester->throwexception(); // will not execute if produceerror() is executed

    echo “This line does not display”;

    }

    catch (errorException $e ){

    echo $e->getMessage();

    }

    catch (userException $e) {

    echo $e->getMessage();

    }

    catch (Throwable $t) {

    echo $t->getMessage();

    }

    echo “This line will display”;

    ?>

