  trans: '

    # 验证 Twitter 卡片标记


    与 `Open Graph` 标记不同，你需要“验证”新的标记后，`Twitter` 才会使用它。


    为此，请直接访问 Twitter 的卡片验证器 [`https://cards-dev.twitter.com/validator`](https://cards-dev.twitter.com/validator)（你需要登录
    `Twitter`）。在 `Card Catalog` 中选择 `Product`，接着选择 `Validate & Apply` 选项卡，并输入你网站上任意商品页面的
    `URL`。


    点击 `Go`，你应能看到确认信息，表明你的卡片标记已通过验证，同时还会显示预览效果，展示当有人从你的主题分享商品时的呈现样式，如图 9-4 所示。


    ![A437216_1_En_9_Fig4_HTML.jpg](img/A437216_1_En_9_Fig4_HTML.jpg)


    图 9-4 Twitter 卡片验证器会根据提取的数据显示预览


    ## 重视分享


    一旦你花费精力设置好这些标记，你就应充分利用它，鼓励访问你网站的访客分享你的商品和内容页面。


    ### 决定支持哪些分享选项


    首先，你需要认识到，“多多益善”这句口号并不适用于分享小部件。相反，网站若专注于少数几个关键社交网络，而非在商品页面上堆砌大量图标，通常能获得更好的社交流量（见图
    9-5）。


    ![A437216_1_En_9_Fig5_HTML.jpg](img/A437216_1_En_9_Fig5_HTML.jpg)


    图 9-5 像这样散弹枪式的分享方式很少有效，用户参与度也不高


    用户很容易被过多的选择压垮，因此简化选择（比如“我该分享到 `Facebook` 还是 `Twitter`？”）能提高他们采取其中一项操作的可能性，而不是彻底放弃。将重点放在两三个网络上，也能让店主在运营店铺时更容易管理这些网络并与用户互动，而不会因为精力分散而力不从心。


    如果你是在为特定客户工作，与他们进行沟通将有助于你们共同确定哪些网络对其最有益。¹ 根据具体情况，更多小众或针对特定地理位置的平台也可能很重要。


    如果你是在构建一个供多家店铺使用的主题，那么你应该添加对所有主流社交网络的支持，并允许店主在主题设置页面中开启或关闭它们（请参考第 8 章关于主题设置定制的内容）。


    无论你选择专注于哪些网络，我强烈建议你为用户提供一种通过邮件分享页面的简便方式。虽然并非所有人都习惯你使用的社交网络，但电子邮件无所不在，并且是与特定个人分享商品最常用的方式。添加邮件分享支持非常简单，只需添加一个
    `mailto:` 链接，设置空白收件人、简短的预设主题和正文，让用户通过自己的邮件客户端发送消息即可。


    ### 整合分享功能


    所有主流社交网络都允许你非常轻松地整合分享按钮，通常只需一小段 JavaScript 代码片段。然而，使用这些默认按钮存在两个主要问题：


    -   它们很可能与你主题的设计美学不匹配

    -   它们往往会带来性能开销，可能拖慢你的网站


    第一个问题在于，如果按钮与页面其他部分不匹配，最终可能会分散用户对页面主要内容的注意力。第二个问题是可用性问题，尤其是在移动设备上，添加四五个脚本（这些脚本又通常会加载额外的脚本）会严重影响性能。


    幸运的是，这两个问题的解决方案都非常简单！所有社交网络都允许用户通过简单的 `<a href="">` 链接触发分享操作，你当然可以随意设计它的样式（图 9-6
    展示了在 Shopify 的 `Pop` 主题中如何实现这一点）。


    ![A437216_1_En_9_Fig6_HTML.jpg](img/A437216_1_En_9_Fig6_HTML.jpg)


    图 9-6 `Pop` 主题中的分享触发器被重新设计为与美学风格匹配的简单链接


    为不同社交网络构建 `href` 属性所需的 `URL` 可能会有点棘手。以下是一个例子，展示我如何在 `Liquid` 中为 `Twitter` 分享链接实现这一点：


    ```

    Tweet this!

    ```


    Twitter 的用例相当简单，因为它只要求我们传递文本和 `URL` 参数。像 `LinkedIn` 这样的网络则需要更多参数。


    本书附带资源中的 `code/snippets/social-share.liquid` 示例包含一个处理多个社交网络分享链接的模式，并且能够根据所使用的页面类型（商品、文章或内容页面）进行适配，欢迎你在自己的主题中复用。


    ## 练习：SEO 与社交分享


    按照本章各节的内容，逐一检查你的练习主题，确保其符合 `SEO` 最佳实践，并已为社交分享做好配置。


    你应检查的一些事项包括：


    -   每个页面都包含一个 `<h1>` 标题和一个 `meta` 描述。

    -   你的 `theme.liquid` 使用 `Liquid` 的 `{{ canonical_url }}` 标签为每个页面定义了规范 `URL`。

    -   所有图片都定义了合适的 `alt` 属性。

    -   在首页、商品页面和文章页面上，通过 `Microdata` 或 `JSON-LD` 提供了 `Schema.org` 标记。

    -   商品和文章页面定义了 `Open Graph` 和 `Twitter Card` 标记。

    -   商品可通过页面内链接轻松分享。


    你可以随意使用可下载资源中提供的 `JSON-LD`、`Open Graph`、`Twitter Card` 和 `Social Sharing` 代码片段来实现这些功能。但请务必花几分钟浏览一下代码，以确保你清楚每个片段的作用。


    ## 总结


    本章讨论了页面内 `SEO` 与页面外 `SEO` 的区别。随后，重点介绍了在主题中改进页面内 `SEO` 的技术，因为这些元素通常是我们作为设计师和开发者最能控制的。


    本章还探讨了如何帮助客户从主题中分享内容，并研究了你的主题支持哪些分享机制才有意义。


    ## 脚注


    [1] Kevan Lee 发表的一篇名为“如何为你的企业选择合适的社交网络”的精彩博文为此提供了极佳的指导：[`https://blog.bufferapp.com/how-to-choose-a-social-network`](https://blog.bufferapp.com/how-to-choose-a-social-network)。


    # 10. 性能


    本章解释了主题性能——为什么它很重要，如何衡量它，以及如何改进它。讨论了我们可以用来减少初始加载时间和提高 `Shopify` 商店界面感知响应速度的技术。


    虽然从主题设计的第一天就开始考虑这些想法会大有裨益，但这里讨论的技术对于那些需要精简优化的现有主题同样有用。

    '
- fmt: '# Why Performance Matters


    Way, way back in the olden days of the web (2009), Eric Schurman at Bing and Jake
    Brutlag at Google ran a series of experiments to see how their users responded
    to controlled increases in server response time.[¹](#A437216_1_En_10_Chapter.html#Fn1)


    The results were compelling: in Google’s case, an added delay of less than half
    a second led to a 0.6% drop in user engagement. Bing went even further and subjected
    their test users to a full two-second delay and saw engagement (and revenue per
    user) drop by over 4%. Their conclusion was that the phrase “speed matters” is
    not just lip service, and that “delays of under half a second impact business
    metrics.”


    This performance impact isn’t something that’s just confined to lab experiments,
    either:


    * Mozilla shaved 2.2 seconds from their page load time and downloads increased
    by 15.4%.

    * Barack Obama’s campaign sped up their site by 60% and donations increased by
    14%.


    In the context of Ecommerce today, I feel that site performance is more important
    than ever. As more and more businesses move to the web, consumers have more choices
    on where to spend their money online, and their patience for less-than-optimal
    purchasing experiences decreases.


    > Consumers are expecting a faster web. Businesses succeed with a faster web.
    —Steve Souders, “How Fast Are We Going Now?”[²](#A437216_1_En_10_Chapter.html#Fn2)


    It can be tempting to dismiss this type of performance concern by pointing to
    devices that are becoming more and more powerful and Internet connections that
    are offering more and more bandwidth. I think this is dangerous thinking, for
    a couple of reasons:


    * Since 2014, the majority of traffic to Shopify stores has been on mobile devices,
    where processing power isn’t as prevalent and 3G (or slower) connections are spotty.

    * There’s a great deal of growth in Ecommerce in developing markets where the
    demand for online sales is high but Internet connections are often lagging.

    * Even in developed countries, it’s common to be shopping online with a poor network
    connection (I’m writing this sentence right now in a Swedish café with pretty
    lackluster WiFi).

    * With the rise of the Internet of things, the number of Internet-capable but
    low-power devices (think TVs or fridges) that customers could be loading your
    sites on is increasing.


    Moreover, ourselves yourself of responsibility for the performance of our Shopify
    themes in the first place makes it easy for our work to snowball into bloated
    monstrosities of sites.


    ## Why Performance Gets Ignored


    If you’re doing conversion rate optimization for a client and get a lift of 1%,
    that’s a huge win. You’ll be popping champagne and discussing what the business
    is going to be doing with the tens of thousands of dollars you just made them
    (hopefully cutting you a bonus check, but that’s wishful thinking).


    So, considering that a poorly performing web site can have a negative impact on
    conversion well in excess of that 1%, you’d imagine that performance optimization
    is high on the list of priorities for theme developers, right?


    Nope.


    While some sites running on Shopify do take performance seriously, the vast majority
    of them are grossly unoptimized—they have huge images, lots of HTTP requests,
    and poorly structured pages.


    When I started work on my own theme framework for Shopify, I conducted a “performance
    roundup” of existing themes in the Shopify Theme store. The results were pretty
    damning—the average theme in the store loaded 2MB of assets with 58 HTTP requests
    on page load.


    I’ve got a theory as to why this was so: clients can’t see it so they won’t pay
    for it as a priority.


    Unlike all of those pretty images or snazzy JavaScript features, a client can’t
    “see” the speed of their sites. They might feel something’s slightly amiss when
    a page takes ten seconds to load, but even then they’re looking at their site
    with the mindset of a storeowner, not a potential customer. It rarely occurs to
    them that, had the site they were loading not been their own, they would have
    closed the tab five seconds ago and moved on to the next result in Google.


    Designers and developers aren’t immune to this problem, either. When we’re sitting
    on a high-speed desktop connection, developing locally and with a populated browser
    cache, a lot of performance issues are going to go unnoticed. And just like the
    client, our minds aren’t in the same place when the page does load—we’re looking
    for alignment issues, checking that colors match up, and that the new lightbox
    works as expected.


    When these factors combine, it makes it easy as a theme creator to let performance
    become a low priority.


    This is especially true when building a theme for widespread sale (for example,
    in the Shopify Theme Store). There’s no “sort by performance” option in the Theme
    Store listing—what’s going to sell your theme are big glossy images and slick
    CSS animations.


    ## Performance Analysis and Metrics


    So, proceeding on the assumption that you want to be one of the enlightened theme
    creators who takes performance seriously, what’s your first move?


    Well, like so many things, the first step in being able to improve performance
    is to know where you stand currently (“you can’t manage what you can’t measure”
    and all that). The next sections therefore look at a couple of different tools
    useful for doing just that.


    ### Performance Measuring Tools


    I’ll cover three tools here, but you don’t need to spend too much time worrying
    about which one is “best”. Most performance tools will cover a similar set of
    metrics—the key thing is to be using something before and after your optimization
    work, so that you can evaluate whether your changes had any effect.


    #### PageSpeed Insights


    Google’s PageSpeed utility is probably the most commonly-used performance analysis
    tool. Running the PageSpeed test from the online tool will give you a breakdown
    of the performance issues with your theme, as well as a prioritized list of what
    to tackle first (see Figure [10-1](#A437216_1_En_10_Chapter.html#Fig1)).


    ![A437216_1_En_10_Fig1_HTML.jpg](A437216_1_En_10_Fig1_HTML.jpg)


    *Figure 10-1 — The online PageSpeed Insights tool. Looks like this theme’s got
    some work to do!*


    #### Yahoo YSlow


    If you have a philosophical objection to Google or just want to try something
    different, YSlow is a browser plugin available for both Safari and Firefox that
    offers much the same sort of analysis as PageSpeed (see Figure [10-2](#A437216_1_En_10_Chapter.html#Fig2)).


    ![A437216_1_En_10_Fig2_HTML.jpg](A437216_1_En_10_Fig2_HTML.jpg)


    *Figure 10-2 — A YSlow report in Safari*'
  raw: '## Why Performance Matters


    Way, way back in the olden days of the web (2009), Eric Schurman at Bing and Jake
    Brutlag at Google ran a series of experiments to see how their users responded
    to controlled increases in server response time.[¹](#A437216_1_En_10_Chapter.html#Fn1)


    The results were compelling: in Google’s case, an added delay of less than half
    a second led to a 0.6% drop in user engagement. Bing went even further and subjected
    their test users to a full two-second delay and saw engagement (and revenue per
    user) drop by over 4%. Their conclusion was that the phrase “speed matters ” is
    not just lip service, and that “delays of under half a second impact business
    metrics.”


    This performance impact isn’t something that’s just confined to lab experiments,
    either:


    *   Mozilla shaved 2.2 seconds from their page load time and downloads increased
    by 15.4%.

    *   Barack Obama’s campaign sped up their site by 60% and donations increased
    by 14%.


    In the context of Ecommerce today, I feel that site performance is more important
    than ever. As more and more businesses move to the web, consumers have more choices
    on where to spend their money online, and their patience for less-than-optimal
    purchasing experiences decreases.


    > Consumers are expecting a faster web. Businesses succeed with a faster web.
    —Steve Souders, “How Fast Are We Going Now?”[²](#A437216_1_En_10_Chapter.html#Fn2)


    It can be tempting to dismiss this type of performance concern by pointing to
    devices that are becoming more and more powerful and Internet connections that
    are offering more and more bandwidth. I think this is dangerous thinking, for
    a couple of reasons :


    *   Since 2014, the majority of traffic to Shopify stores has been on mobile devices,
    where processing power isn’t as prevalent and 3G (or slower) connections are spotty.

    *   There’s a great deal of growth in Ecommerce in developing markets where the
    demand for online sales is high but Internet connections are often lagging.

    *   Even in developed countries, it’s common to be shopping online with a poor
    network connection (I’m writing this sentence right now in a Swedish café with
    pretty lackluster WiFi).

    *   With the rise of the Internet of things, the number of Internet-capable but
    low-power devices (think TVs or fridges) that customers could be loading your
    sites on is increasing.


    Moreover, ourselves yourself of responsibility for the performance of our Shopify
    themes in the first place makes it easy for our work to snowball into bloated
    monstrosities of sites.


    ## Why Performance Gets Ignored


    If you’re doing conversion rate optimization for a client and get a lift of 1%,
    that’s a huge win. You’ll be popping champagne and discussing what the business
    is going to be doing with the tens of thousands of dollars you just made them
    (hopefully cutting you a bonus check, but that’s wishful thinking).


    So, considering that a poorly performing web site can have a negative impact on
    conversion well in excess of that 1%, you’d image that performance optimization
    is high on the list of priorities for theme developers, right?


    Nope.


    While some sites running on Shopify do take performance seriously, the vast majority
    of them are grossly unoptimized—they have huge images, lots of HTTP requests,
    and poorly structured pages.


    When I started work on my own theme framework for Shopify, I conducted a “performance
    roundup” of existing themes in the Shopify Theme store. The results were pretty
    damning—the average theme in the store loaded 2MB of assets with 58 HTTP requests
    on page load.


    I’ve got a theory as to why this was so: clients can’t see it so they won’t pay
    for it as a priority.


    Unlike all of those pretty images or snazzy JavaScript features, a client can’t
    “see” the speed of their sites. They might feel something’s slightly amiss when
    a page takes ten seconds to load, but even then they’re looking at their site
    with the mindset of a storeowner, not a potential customer. It rarely occurs to
    them that, had the site they were loading not been their own, they would have
    closed the tab five seconds ago and moved on to the next result in Google.


    Designers and developers aren’t immune to this problem, either. When we’re sitting
    on a high-speed desktop connection, developing locally and with a populated browser
    cache, a lot of performance issues are going to go unnoticed. And just like the
    client, our minds aren’t in the same place when the page does load—we’re looking
    for alignment issues, checking that colors match up, and that the new lightbox
    works as expected.


    When these factors combine, it makes it easy as a theme creator to let performance
    become a low priority.


    This is especially true when building a theme for widespread sale (for example,
    in the Shopify Theme Store). There’s no “sort by performance” option in the Theme
    Store listing—what’s going to sell your theme are big glossy images and slick
    CSS animations.


    ## Performance Analysis and Metrics


    So, proceeding on the assumption that you want to be one of the enlightened theme
    creators who takes performance seriously, what’s your first move?


    Well, like so many things, the first step in being able to improve performance
    is to know where you stand currently (“you can’t manage what you can’t measure”
    and all that). The next sections therefore look at a couple of different tools
    useful for doing just that.


    ### Performance Measuring Tools


    I’ll cover three tools here, but you don’t need to spend too much time worrying
    about which one is “best”. Most performance tools will cover a similar set of
    metrics—the key thing is to be using something before and after your optimization
    work, so that you can evaluate whether your changes had any effect.


    #### PageSpeed Insights


    Google’s PageSpeed utility is probably the most commonly-used performance analysis
    tool. Running the PageSpeed test from the online tool will give you a breakdown
    of the performance issues with your theme, as well as a prioritized list of what
    to tackle first (see Figure [10-1](#A437216_1_En_10_Chapter.html#Fig1)).


    ![A437216_1_En_10_Fig1_HTML.jpg](A437216_1_En_10_Fig1_HTML.jpg)


    Figure 10-1


    The online PageSpeed Insights tool. Looks like this theme’s got some work to do!


    #### Yahoo YSlow


    If you have a philosophical objection to Google or just want to try something
    different, YSlow is a browser plugin available for both Safari and Firefox that
    offers much the same sort of analysis as PageSpeed (see Figure [10-2](#A437216_1_En_10_Chapter.html#Fig2)).


    ![A437216_1_En_10_Fig2_HTML.jpg](A437216_1_En_10_Fig2_HTML.jpg)


    Figure 10-2


    A YSlow report in Safari'
  trans: '

    # 为什么性能很重要


    早在遥远的网页古早时代（2009 年），必应的 Eric Schurman 和谷歌的 Jake Brutlag 进行了一系列实验，观察用户对服务器响应时间受控增加的反应。¹


    结果令人信服：以谷歌为例，增加不到半秒的延迟导致用户参与度下降 0.6%。必应则更进一步，让测试用户经历了整整两秒的延迟，结果参与度（和每用户收入）下降了超过
    4%。他们的结论是，“速度很重要”并非空谈，而且“不到半秒的延迟就会影响业务指标”。


    这种性能影响并不仅仅局限于实验室实验：


    *   Mozilla 将页面加载时间缩短了 2.2 秒，下载量增加了 15.4%。

    *   巴拉克·奥巴马的竞选团队将网站速度提升了 60%，捐款额增加了 14%。


    在当今的电子商务背景下，我认为网站性能比以往任何时候都更加重要。随着越来越多的企业转向网络，消费者在网上花钱的地方有了更多选择，他们对欠佳购物体验的耐心也越来越低。


    > 消费者期待更快的网络。企业因更快的网络而成功。— Steve Souders，“我们现在有多快？”²


    人们很容易通过指出设备性能越来越强大、互联网连接提供的带宽越来越高来忽视这类性能问题。我认为这是一种危险的想法，原因如下：


    *   自 2014 年以来，Shopify 商店的大部分流量来自移动设备，这些设备的处理能力不那么普遍，且 3G（或更慢）的连接也不稳定。

    *   在发展中市场，电子商务增长迅速，这些市场对在线销售的需求很高，但互联网连接常常滞后。

    *   即使在发达国家，在网络连接不佳的情况下进行网购也很常见（我现在就在一家瑞典咖啡馆里写这句话，这里的 WiFi 相当差劲）。

    *   随着物联网的兴起，客户可能用来加载你网站的、能够联网但功耗低的设备（比如电视或冰箱）数量正在增加。


    此外，最初我们若将自身对 Shopify 主题性能的责任推卸掉，很容易让我们的工作像滚雪球一样，变成臃肿的怪物网站。


    ## 为什么性能会被忽视


    如果你为客户做转化率优化，并且提升了 1%，那将是一个巨大的成功。你会打开香槟庆祝，并讨论你将为他们赚到的数万美元该如何使用（希望能给你一笔奖金，但那只是美好愿望）。


    那么，考虑到一个性能不佳的网站对转化的负面影响可能远超 1%，你会以为性能优化是主题开发者的首要任务之一，对吧？


    并非如此。


    虽然一些在 Shopify 上运行的网站确实重视性能，但绝大多数网站都严重未经优化——它们拥有巨大的图片、大量的 HTTP 请求以及结构不佳的页面。


    当我开始为自己的 Shopify 主题框架工作时，我对 Shopify 主题商店中的现有主题进行了一次“性能汇总”。结果相当糟糕——商店中的平均主题在页面加载时加载了
    2MB 的资源，并产生了 58 个 HTTP 请求。


    我对此有自己的一套理论：客户看不到性能，所以他们不会将其作为优先事项来付费。


    与所有那些漂亮的图片或时髦的 JavaScript 功能不同，客户无法“看到”他们网站的速度。当一个页面需要十秒钟才能加载时，他们可能会感到有点不对劲，但即便如此，他们也是以店主的心态（而非潜在客户的心态）来审视自己的网站。他们很少会想到，如果加载的不是他们自己的网站，他们五秒钟前就会关闭标签页，然后转向谷歌搜索结果中的下一个链接。


    设计师和开发者也不能免于此问题。当我们坐在高速桌面连接上，在本地开发且浏览器缓存中已填充内容时，许多性能问题会被忽略。就像客户一样，当页面加载时，我们的心思也不在性能上——我们在寻找对齐问题，检查颜色是否匹配，以及新的灯箱效果是否按预期工作。


    当这些因素结合在一起时，作为主题创建者，很容易让性能问题变成低优先级事项。


    在构建用于广泛销售的主题时（例如，在 Shopify 主题商店中），情况尤其如此。主题商店列表中没有“按性能排序”的选项——能卖出你主题的是大型光鲜图片和流畅的
    CSS 动画。


    ## 性能分析与指标


    那么，假设你想成为一位开明且重视性能的主题创建者，你的第一步是什么？


    和许多事情一样，提高性能的第一步是了解你当前的状况（“你无法管理你无法衡量的东西”，诸如此类）。因此，接下来的几个部分将介绍几种有助于此的不同工具。


    ### 性能测量工具


    我将在这里介绍三种工具，但你无需花太多时间纠结哪个“最好”。大多数性能工具都会涵盖一组相似的指标——关键是在优化工作之前和之后都使用某个工具，这样你就能评估你的更改是否产生了效果。


    #### PageSpeed 见解（PageSpeed Insights）


    谷歌的 PageSpeed 工具可能是最常用的性能分析工具。通过在线工具运行 PageSpeed 测试，将显示你的主题存在的性能问题明细，以及需要优先处理的事项列表（见图
    10-1）。


    ![A437216_1_En_10_Fig1_HTML.jpg](img/A437216_1_En_10_Fig1_HTML.jpg)


    *图 10-1 — 在线 PageSpeed Insights 工具。看来这个主题还有改进空间！*


    #### 雅虎 YSlow


    如果你在理念上反对谷歌，或者只是想尝试点不同的东西，YSlow 是一个适用于 Safari 和 Firefox 的浏览器插件，提供与 PageSpeed 类似的分析功能（见图
    10-2）。


    ![A437216_1_En_10_Fig2_HTML.jpg](img/A437216_1_En_10_Fig2_HTML.jpg)


    *图 10-2 — Safari 中的 YSlow 报告*

