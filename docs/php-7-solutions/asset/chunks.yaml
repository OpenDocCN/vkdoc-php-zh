    # PHP 的成长历程


    PHP 起步于 1995 年，当时的目标相当有限。它最初被称为个人主页工具（`PHP Tools`）。其主要目标之一是通过收集在线表单的信息并在网页上显示，从而创建留言簿。三年之内，人们决定从名称中删除“个人主页”，因为它听起来像是业余爱好者的东西，无法充分体现此后添加的一系列复杂功能。这就留下了首字母缩写
    PHP 应该代表什么的问题。最终，它被命名为 PHP 超文本预处理器——一个相当不雅的选择，因此大多数人干脆直接称其为 `PHP`。


    多年来，PHP 不断发展，不断添加新功能。除了被一些大型网站使用之外，它还是驱动着 Laravel（`https://laravel.com/`）、Drupal（`http://drupal.org/`）和
    WordPress（`http://wordpress.org/`）等极其流行的框架和内容管理系统（`CMSs`）的语言。


    该语言的一大吸引力在于它始终不忘初心。尽管它支持复杂的面向对象编程，但你无需深入复杂的理论就可以开始使用它。PHP 的原始创建者拉斯马斯·勒德尔夫曾将其描述为“一种非常对程序员友好的脚本语言，适合几乎没有或完全没有编程经验的人，也适合需要快速完成工作的经验丰富的
    Web 开发人员。”你可以立即开始编写有用的脚本，同时自信地知道你正在使用一种能够开发工业级应用程序的技术。


    ### 注意

    尽管 PHP 7 大部分向后兼容 PHP 5，但本书中的许多代码使用了 PHP 7 的新特性。PHP 6 从未正式发布。


    # PHP 如何使页面动态化


    PHP 最初被设计为嵌入到网页的 HTML 中，并且至今仍常以这种方式使用。例如，要在版权声明中显示当前年份，你可以将其放在页脚中：


    ```

    &copy;  PHP 7 解决方案

    ```


    在启用了 PHP 的 Web 服务器上，`<?php` 和 `?>` 标签之间的代码会被自动处理并像这样显示年份：


    ![images/332054_4_En_1_Chapter/332054_4_En_1_Figa_HTML.jpg](img/332054_4_En_1_Figa_HTML.jpg)


    这只是一个简单的例子，但它说明了使用 PHP 的一些优势：


    * 任何在元旦午夜钟声敲响后访问你网站的人都会看到正确的年份。

    * 日期由 Web 服务器计算，因此即使用户计算机的时钟设置不正确，也不会受到影响。


    虽然像这样将 PHP 代码嵌入 HTML 很方便，但它是重复性的，并且可能导致错误。它还可能使你的网页难以维护，尤其是当你开始使用更复杂的 PHP 代码时。因此，常见的做法是将大量动态代码存储在单独的文件中，然后使用
    PHP 从不同的组件构建你的页面。这些单独的文件——或者通常被称为*包含文件*——可以只包含 PHP、只包含 HTML，或者两者都包含。


    举一个简单的例子，你可以将网站的导航菜单放在一个包含文件中，并使用 PHP 将其包含在每个页面中。每当需要更改菜单时，你只需编辑这个包含文件，更改就会自动反映在每个包含该菜单的页面中。想象一下，对于一个拥有几十个页面的网站来说，这能节省多少时间！


    对于普通的 HTML 页面，内容由 Web 开发人员在设计时固定并上传到 Web 服务器。当有人访问该页面时，Web 服务器只是发送 HTML 和其他资源，例如图片和样式表。这是一个简单的事务——请求来自浏览器，固定的内容由服务器发回。当你使用
    PHP 构建网页时，情况要复杂得多。图 1-1 展示了这个过程。


    ![images/332054_4_En_1_Chapter/332054_4_En_1_Fig1_HTML.png](img/332054_4_En_1_Fig1_HTML.png)


    图 1-1. Web 服务器响应请求动态构建每个 PHP 页面


    当访问一个由 PHP 驱动的网站时，会触发以下一系列事件：


    1. 浏览器向 Web 服务器发送请求。

    2. Web 服务器将请求交给嵌入在服务器中的 PHP 引擎。

    3. PHP 引擎处理代码。在许多情况下，它可能在构建页面之前还会查询数据库。

    4. 服务器将完成的页面发送回浏览器。


    这个过程通常只需要几分之一秒，因此 PHP 网站的访问者不太可能注意到任何延迟。由于每个页面都是单独构建的，PHP 网站可以响应用户输入，在用户登录时显示不同的内容，或显示数据库搜索的结果。


    ## 创建能够自主思考的页面


    PHP 是一种服务器端语言。PHP 代码保留在 Web 服务器上。经过处理后，服务器只发送脚本的输出。通常，输出是 HTML，但 PHP 也可用于生成其他
    Web 语言，例如 `JSON`（JavaScript 对象表示法）或 `XML`（可扩展标记语言）。


    PHP 使你能够将基于条件判断的逻辑引入网页。一些决策是利用 PHP 从服务器收集的信息做出的：日期、时间、星期几、页面 URL 中的信息等等。如果是星期三，它将显示星期三的电视节目表。在其他时候，决策基于用户输入，PHP
    从在线表单中提取这些输入。如果你已在某个网站注册，它将显示个性化信息——诸如此类。


    # PHP 使用和学习的难度如何？


    PHP 并非高深莫测，但也不要期望在 5 分钟内成为专家。对新手来说，最大的冲击或许是 PHP 对错误的容忍度远低于浏览器对 HTML 的容忍度。如果你在
    HTML 中省略了一个结束标签，大多数浏览器仍然会渲染页面。但如果你在 PHP 中省略了一个结束引号、分号或大括号，你会得到一个毫不妥协的错误消息，如图 1-2
    所示。这不仅适用于 PHP，也影响所有编程语言，例如 JavaScript 和 `C#`。


    ![images/332054_4_En_1_Chapter/332054_4_En_1_Fig2_HTML.jpg](img/332054_4_En_1_Fig2_HTML.jpg)


    图 1-2. 像 PHP 这样的服务器端语言对大多数编码错误是零容忍的


    如果你是那种使用 Adobe Dreamweaver 这样的可视化设计工具，并且从不查看底层代码的 Web 设计师或开发者，那么是时候重新思考你的方法了。将
    PHP 与结构不良的 HTML 混合很可能会导致问题。PHP 使用循环来执行重复性任务，例如显示数据库搜索结果。循环会重复执行同一段代码——通常是 PHP
    和 HTML 的混合——直到所有结果都显示完毕。如果你将循环放在错误的位置，或者你的 HTML 结构糟糕，你的页面很可能会像纸牌屋一样坍塌。


    如果你还没有养成这种习惯，那么使用万维网联盟（`W3C`）的标记验证服务（`http://validator.w3.org/unicorn`）检查你的页面是一个好主意。


    ### 注意

    `W3C` 是制定 HTML 和 CSS 等标准以确保 Web 长期发展的国际组织。它由万维网的发明者蒂姆·伯纳斯-李领导。要了解 `W3C` 的使命，请参阅
    `www.w3.org/Consortium/mission`。

