  **引言**


  《PHP 5 食谱：问题-解决方案方法》于 2005 年发布。当时仍有许多网站使用较旧的 PHP 4 版本脚本语言，而 PHP 5 引入了许多新特性和一个完全重新设计的面向对象编程模型。自那以后，PHP
  经历了多次版本发布，现在是时候更新内容与食谱，以涵盖自第一本书出版以来十一年间该语言新增的一些特性。PHP 的当前版本是 5.6.x，开发团队最近发布了 7.0
  版本，与 PHP 5.6 相比，其性能有望翻倍，内存使用减半。从 PHP 5 直接跳到 PHP 7，跳过了主版本 6，是因为一个名为 PHP 6 的研究项目因复杂性和性能问题而被放弃。


  PHP 是一种最常用于创建动态 Web 内容的脚本语言；事实上，大约 80% 的 Web 服务器都以某种形式安装了 PHP。PHP 也可用作 Shell 脚本的通用脚本语言，甚至可以通过
  PHP-GTK 扩展创建桌面应用程序。本书将重点介绍 Web 和 Shell 脚本，面向初学者和高级用户。




  PHP 是一种松散类型的脚本语言。在使用变量前无需声明，且变量类型会随内容变化而改变。作为一种脚本语言，PHP 在执行前无需编译或进行其他代码处理。当解释器被指示执行脚本时，它会加载文件内容、执行编译，并在未发现编译错误时执行代码。各种形式的缓存机制可以跳过编译阶段，直接进入执行流程。


  '
- '# 第 1 章：安装与配置


  自《*PHP 5 实战：问题解决方案*》出版以来已过去约十年，PHP 以及整个网络技术在此期间取得了长足发展。是时候更新部分实战方案了。


  本书中的示例代码专为当前版本（PHP 5.6 和 PHP 7）设计，但多数示例也可在更早的 PHP 5 版本上运行。PHP 7 仍较新，许多站点所有者尚未升级。PHP
  7 基本兼容 PHP 5.6，但确实包含一些新功能和少数向后兼容问题。并非所有扩展都已更新以适配新的 Zend 引擎（PHP 的内部运行机制）。


  强烈建议使用最新版本的 PHP。这将确保最佳性能和安全性，并能访问最新功能。


  PHP 最初被设计为一种脚本语言，用于生成动态 Web 内容，其形式是对客户端（通常是浏览器）通过 HTTP 协议向 Web 服务器发出的请求进行响应。如今，浏览器已不再是这些脚本的唯一客户端类型。在越来越多数据通过返回
  JSON、XML 或其他结构化格式的 Web 服务访问的世界里，我们看到客户端可以是任何东西：从智能手机上的应用程序、其他应用程序，乃至相互通信以交换数据的服务器。


  ## 方案 1-1：安装 PHP


  ### 问题描述


  PHP 是一种开源脚本语言，已被移植到许多不同平台。它能运行在从树莓派到大型 IBM 主机的任何设备上。过去安装 PHP 需要用户从源代码编译解释器，但现在许多操作系统都提供了便于安装的软件包。无论你选择使用哪种操作系统和
  Web 服务器，问题都是一样的：如何让 Web 服务器执行脚本并返回响应？


  ### 解决方案


  所支持的操作系统、Web 服务器和服务器 API 的数量相当庞大，而不同的组合更是数不胜数。互联网上使用 PHP 作为脚本语言的大多数 Web 服务器都运行着某种形式的
  Linux，也有一部分运行 Windows。在开发环境方面，常见的有 Windows、Mac OSX 和 Linux 系统。除此之外，至少还有三种类型的 Web
  服务器：Apache、Nginx 和 Windows 上的 Internet 信息服务（IIS）。


  **电子补充材料** 本章的在线版本（[doi: 10.1007/978-1-4842-0605-8_1](http://dx.doi.org/10.1007/978-1-4842-0605-8_1)）包含补充材料，仅供授权用户使用。


  © Frank M. Kromann 2016


  F.M. Kromann，《*PHP 与 MySQL 实战*》，DOI 10.1007/978-1-4842-0605-8_1


  所有这些配置共同要解决的核心问题，是将脚本解析器注入 Web 服务器，使得对某些文件的请求能够触发脚本执行并返回脚本生成的输出。对于 Web 服务器的其他类型请求，例如静态
  HTML、图像、JavaScript 和 CSS 文件等，则由 Web 服务器直接处理——服务器会将请求解析为文件系统上的文件，并将原文件返回给请求者。


  通常的配置是告诉 Web 服务器，具有特定文件扩展名（`.php`）的文件应由 PHP 解释处理。当收到对此类文件的请求时，Web 服务器会将请求传递给 PHP，并等待输出。


  ### 工作原理


  鉴于操作系统、Web 服务器以及将 PHP 链接到 Web 服务器的方式可能存在大量组合，我选择了少数几种组合在以下示例中进行描述。第一个示例介绍如何使用包管理工具
  `yum` 在全新的 CentOS 7 操作系统上安装 Apache 和 PHP。后续示例将展示如何在 Windows 上执行相同操作。


  包管理器 `yum` 用于从 CentOS 仓库安装、更新或删除软件包，也可用来列出可用软件包。在安装新软件包之前，确保系统已完全更新始终是一个好习惯。这可以通过运行以下命令来实现：


  ```

  yum update

  ```


  这将确保所有内核和应用程序包都更新到最新版本。安装新内核后，必须重启系统。


  Apache 软件包的名称是 `httpd`，因此要列出所有与 Apache Web 服务器相关的软件包，我们可以发出以下命令。




  '
- '# `yum list httpd*`


  可用软件包


  `httpd.x86_64` 2.4.6-40.el7.centos base

  `httpd-devel.x86_64` 2.4.6-40.el7.centos base

  `httpd-manual.noarch` 2.4.6-40.el7.centos base

  `httpd-tools.x86_64` 2.4.6-40.el7.centos base


  请注意，许多 `yum` 命令应以 **root** 用户身份运行。请使用 `su -` 切换到 root 账户，或在每个命令前加上 `sudo` 以 root
  用户身份执行该命令。


  输出显示，此环境中有五个可用软件包。只需安装第一个软件包即可，可通过以下命令完成：


  ```

  yum install httpd

  ```


  这将安装启动基本 Web 服务器所需的所有软件包。Apache Web 服务器依赖于 `apr`、`apr-util`、`httpd-tools` 和 `mailcap`
  这些软件包。安装完成后，可以通过以下调用将服务器配置为自动启动：


  ```

  systemctl enable httpd

  ```


  并通过以下命令启动：


  ```

  systemctl start httpd

  ```


  这将为您提供一个标准的 Apache 2.4 配置。它已准备好提供静态 HTML 文件服务，但要让其能够处理对 PHP 脚本的请求，还需要几个步骤。要测试新的
  Web 服务器配置，需要创建第一个 HTML 文档。默认配置将文档根目录设置为 `/var/www/html`。此外，默认配置将默认文档设置为 `index.html`。如果请求未指定具体文档，则会使用此文件。使用
  VI 或您喜欢的编辑器，在文件夹 `/var/www/html` 中创建 `index.html`，内容可以如下所示：


  ```

  <!DOCTYPE html>

  <html>

  <head>

  <title>Apache</title>

  </head>

  <body>

  <h1>It works!</h1>

  </body>

  </html>

  ```


  可以使用 `wget` 命令测试 Web 服务器是否响应，或者将 Web 浏览器指向服务器的主机名或 IP 地址。根据操作系统的配置，您可能需要先安装 `wget`
  命令。如果安装了防火墙，您可能还需要配置它以允许 TCP 流量通过端口 80 到达服务器。


  现在，我们可以创建第一个简单的 PHP 脚本，而不是静态 HTML 文档。在安装 PHP 之前，它不会做太多事情，但它将展示 PHP 脚本在未配置为处理 PHP
  脚本请求的服务器上如何工作。第一个 PHP 脚本可以像下面这样简单：


  ```

  <?php

  // 1_1.php

  phpinfo();

  ?>

  ```


  最后的结束标签 `?>` 并非必需，除非文件在结束标签之后包含任何将直接发送到客户端而不经 PHP 解释的内容。实际上，对于仅包含 PHP 代码的脚本，通常的标准是省略结束的
  `?>`。


  如果将浏览器指向 Web 服务器（在我的例子中地址是 `http://192.168.23.148/phpinfo.php`），输出将显示文件的内容：


  ```

  <?php

  phpinfo();

  ?>

  ```


  下一步是安装一个或多个 PHP 软件包。要获取可用软件包列表，请使用 `yum` 命令：


  ```

  # yum list PHP*

  ```


