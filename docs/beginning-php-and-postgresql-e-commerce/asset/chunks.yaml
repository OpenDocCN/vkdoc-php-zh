- fmt: "`elseif ($admin_page == 'Products')`\n\n`$pageContentsCell = 'admin_products.tpl';`\n\
    \n`648XCH07a.qxd 10/25/06 10:56 PM Page 252`\n\n**252**\n\nC H A P T E R 7 ■ C\
    \ ATA L O G A D M I N I S T R AT I O N\n\n`elseif ($admin_page == 'ProductDetails')`\n\
    \n`$pageContentsCell = 'admin_product.tpl';`\n\n**How It Works: admin_product**\n\
    \nEven though you can’t execute the page yet, it’s worth taking a look at the\
    \ new elements the new template contains.\n\nThe `admin_product.tpl` template\
    \ contains a single form with the `enctype=\"multipart/form-data\"` attribute.\
    \ This attribute is needed for uploading product pictures, and works in conjunction\
    \ with the HTML code that enables file uploading:\n\n```\n...\n<input name=\"\
    ImageUpload\" type=\"file\" value=\"Upload\" />\n<input type=\"submit\" name=\"\
    Upload\" value=\"Upload\" /><br />\n...\n```\n\nAt the end of the `admin_product.tpl`\
    \ template file, you’ll find a similar piece of code used for uploading the thumbnail\
    \ image of the product:\n\n```\n...\n<input name=\"ThumbnailUpload\" type=\"file\"\
    \ value=\"Upload\" />\n<input type=\"submit\" name=\"Upload\" value=\"Upload\"\
    \ /><br />\n...\n```\n\nThe reaction to clicking these Upload buttons is implemented\
    \ in the `init()` method from the `AdminProduct` class (in `presentation/smarty_plugins/function.load_admin_product.php`):\n\
    \n```\n// If uploading a product picture ...\nif (isset ($_POST['Upload']))\n\
    {\n    /* Check whether we have write permission on the\n       product_images\
    \ folder */\n    if (!is_writeable(SITE_ROOT . '/product_images/'))\n    {\n \
    \       echo \"Can't write to the product_images folder\"; exit;\n    }\n\n  \
    \  // If the error code is 0, the first file was uploaded ok\n    if ($_FILES['ImageUpload']['error']\
    \ == 0)\n    {\n        /* Use the move_uploaded_file PHP function to move the\
    \ file\n           from its temporary location to the product_images folder */\n\
    \        move_uploaded_file($_FILES['ImageUpload']['tmp_name'],\n            \
    \               SITE_ROOT . '/product_images/' .\n                           $_FILES['ImageUpload']['name']);\n\
    \n        // Update the product's information in the database\n        Catalog::SetImage($this->mProductId,\n\
    \                          $_FILES['ImageUpload']['name']);\n    }\n\n    // If\
    \ the error code is 0, the second file was uploaded ok\n    if ($_FILES['ThumbnailUpload']['error']\
    \ == 0)\n    {\n        // Move the uploaded file to the product_images folder\n\
    \        move_uploaded_file($_FILES['ThumbnailUpload']['tmp_name'],\n        \
    \                   SITE_ROOT . '/product_images/' .\n                       \
    \    $_FILES['ThumbnailUpload']['name']);\n\n        // Update the product's information\
    \ in the database\n        Catalog::SetThumbnail($this->mProductId,\n        \
    \                      $_FILES['ThumbnailUpload']['name']);\n    }\n}\n```\n\n\
    The `$_FILES` superglobal variable is a two-dimensional array that stores information\
    \ about your uploaded file (or files). If the `$_FILES['ImageUpload']['error']`\
    \ variable is set to 0, then the main image of the product has uploaded successfully\
    \ and must be handled. The `$_FILES['ImageUpload']['tmp_name']` variable stores\
    \ the temporary file name of the uploaded file on the server, and the `$_FILES['ImageUpload']['name']`\
    \ variable stores the name of the file as specified when uploaded to the server.\n\
    \n> **Note:** A complete description of the `$_FILES` superglobal is available\
    \ at `http://www.php.net/manual/en/features.file-upload.php`.\n\nThe `move_uploaded_file`\
    \ PHP function is used to move the file from the temporary location to the `product_images`\
    \ folder:\n\n```\n/* Use the move_uploaded_file PHP function to move the file\n\
    \   from its temporary location to the product_images folder */\nmove_uploaded_file($_FILES['ImageUpload']['tmp_name'],\n\
    \                   SITE_ROOT . '/product_images/' .\n                   $_FILES['ImageUpload']['name']);\n\
    ```\n\nAfter uploading a product picture, the file name must be stored in the\
    \ database (otherwise, the file upload has no effect):\n\n```\n// Update the product's\
    \ information in the database\nCatalog::SetImage($this->mProductId,\n        \
    \          $_FILES['ImageUpload']['name']);\n```\n\nAs you can see, it’s pretty\
    \ simple to handle file uploads with PHP.\n\n`648XCH07a.qxd 10/25/06 10:56 PM\
    \ Page 254`\n\n**254**\n\nC H A P T E R 7 ■ C ATA L O G A D M I N I S T R AT I\
    \ O N\n\n**Implementing the Business Tier**"
