- fmt: '## Interfaces


    Although abstract classes let you provide some measure of implementation, interfaces
    are pure templates. An interface can only define functionality; it can never implement
    it. An interface is declared with the `interface` keyword. It can contain properties
    and method declarations but not method bodies.


    Here’s an interface:


    ```

    // listing 04.08

    interface Chargeable

    {

    public function getPrice(): float;

    }

    ```


    As you can see, an interface looks very much like a class. Any class that incorporates
    this interface commits to implementing all the methods it defines, or it must
    be declared abstract.


    A class can implement an interface using the `implements` keyword in its declaration.
    Once you have done this, the process of implementing an interface is the same
    as extending an abstract class that contains only abstract methods. Now I will
    make the `ShopProduct` class implement `Chargeable`:


    ```

    // listing 04.09

    class ShopProduct implements Chargeable

    {

    // ...

    protected $price;

    // ...

    public function getPrice(): float

    {

    return $this->price;

    }

    // ...

    }

    ```


    `ShopProduct` already had a `getPrice()` method, so why might it be useful to
    implement the `Chargeable` interface? Once again, the answer has to do with types.
    An implementing class takes on the type of the class it extends and the interface
    that it implements.


    This means that the `CdProduct` class belongs to the following:


    ```

    CdProduct

    ShopProduct

    Chargeable

    ```


    This can be exploited by client code. To know an object’s type is to know its
    capabilities. Consider this method:


    ```

    public function cdInfo(CdProduct $prod)

    {

    // ...

    }

    ```


    The method knows that the `$prod` object has a `getPlayLength()` method in addition
    to all the methods defined in the `ShopProduct` class and `Chargeable` interface.


    Passed the same object, the method knows that `$prod` supports all the methods
    in `ShopProduct`:


    ```

    public function addProduct(ShopProduct $prod)

    {

    // ...

    }

    ```


    Without further testing, however, the method will know nothing of the `getPlayLength()`
    method.


    Once again, passed the same `CdProduct` object, the method knows nothing at all
    of the `ShopProduct` or `CdProduct` types:


    ```

    public function addChargeableItem(Chargeable $item)

    {

    //...

    }

    ```


    However, this method is only concerned with whether the `$item` argument contains
    a `getPrice()` method.


    Because any class can implement an interface (in fact, a class can implement any
    number of interfaces), interfaces effectively join types that are otherwise unrelated.
    I might define an entirely new class that implements `Chargeable`:


    ```

    class Shipping implements Chargeable

    {

    public function getPrice(): float

    {

    //...

    }

    }

    ```


    I can pass a `Shipping` object to the `addChargeableItem` method just as I can
    pass it a `ShopProduct` object.


    The important thing to a client working with a `Chargeable` object is that it
    can call a `getPrice()` method. Any other available methods are associated with
    other types, whether through the object’s own class, a superclass, or another
    interface. These are irrelevant to the client.


    A class can both extend a superclass and implement any number of interfaces. The
    `extends` clause should precede the `implements` clause:


    ```

    class Consultancy extends TimedService implements Bookable, Chargeable

    {

    // ...

    }

    ```


    Notice that the `Consultancy` class implements more than one interface. Multiple
    interfaces follow the `implements` keyword in a comma-separated list.


    PHP only supports inheritance from a single parent, so the `extends` keyword can
    precede a single class name only.


    ## Traits


    As we have seen, interfaces help you manage the fact that, like Java, PHP does
    not support multiple inheritance. In other words, a class in PHP can only extend
    a single parent. However, you can make a class promise to implement as many interfaces
    as you like; for each interface it implements, the class takes on the corresponding
    type.


    So interfaces provide types without implementation. But what if you want to share
    an implementation across inheritance hierarchies? PHP 5.4 introduced traits, and
    these let you do just that.


    A trait is a class-like structure that cannot itself be instantiated but can be
    incorporated into classes. Any methods defined in a trait become available as
    part of any class that uses it. A trait changes the structure of a class, but
    doesn’t change its type. Think of traits as includes for classes.


    Let’s look at why a trait might be useful.


    ### A Problem for Traits to Solve


    Here is a version of the `ShopProduct` class with a `calculateTax()` method:


    ```

    // listing 04.10

    class ShopProduct

    {

    private $taxrate = 17;

    // ...

    public function calculateTax(float $price): float

    {

    return (($this->taxrate / 100) * $price);

    }

    }

    // listing 04.11

    $p = new ShopProduct("Fine Soap", "", "Bob''s Bathroom", 1.33);

    print $p->calculateTax(100) . "\n";

    ```


    The `calculateTax()` method accepts a `$price` argument and calculates a sales
    tax amount based on the private `$taxrate` property.


    Of course, a subclass gains access to `calculateTax()`. But what about entirely
    different class hierarchies? Imagine a class named `UtilityService`, which inherits
    from another class, `Service`. If `UtilityService` needs to use an identical routine,
    I might find myself duplicating `calculateTax()` in its entirety:


    ```

    abstract class Service

    {

    // service oriented stuff

    }

    class UtilityService extends Service

    {

    private $taxrate = 17;

    function calculateTax(float $price): float

    {

    return ( ( $this->taxrate/100 ) * $price );

    }

    }

    $u = new UtilityService();

    print $u->calculateTax(100)."\n";

    ```


    ### Defining and Using a Trait


    One of the core object-oriented design goals I will cover in this book is the
    removal of duplication. As you will see in Chapter [11](#A314621_5_En_11_Chapter.html),
    one solution to this kind of duplication is to factor it out into a reusable strategy
    class. Traits provide another approach—less elegant, perhaps, but certainly effective.


    Here I declare a single trait that defines a `calculateTax()` method, and then
    I include it in both `ShopProduct` and `UtilityService`:


    ```

    // listing 04.12

    trait PriceUtilities

    {

    private $taxrate = 17;

    public function calculateTax(float $price): float

    {

    return (($this->taxrate / 100) * $price);

    }

    // other utilities

    }

    // listing 04.13

    class ShopProduct

    {

    use PriceUtilities;

    }

    // listing 04.14

    abstract class Service

    {

    // service oriented stuff

    }

    // listing 04.15

    class UtilityService extends Service

    {

    use PriceUtilities;

    }

    // listing 04.16

    $p = new ShopProduct();

    print $p->calculateTax(100) . "\n";

    $u = new UtilityService();

    print $u->calculateTax(100) . "\n";

    ```


    I declare the `PriceUtilities` trait with the `trait` keyword. The body of a trait
    looks very similar to that of a class. It is simply a set of methods and properties
    collected within braces. Once I have declared it, I can access the `PriceUtilities`
    trait from within my classes. I do this with the `use` keyword followed by the
    name of the trait I wish to incorporate. So having declared and implemented the
    `calculateTax()` method in a single place, I go ahead and incorporate it into
    both the `ShopProduct` and the `UtilityService` classes.'
