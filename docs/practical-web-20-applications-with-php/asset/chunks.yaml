    **8**


    C H A P T E R 1 ■ A P P L I C AT I O N P L A N N I N G A N D D E S I G N


    Some of the ways we will make our code easily maintainable and extensible include


    • Using a template engine to separate application logic from display logic.


    • Using database abstraction to handle database server interaction.


    • Making heavy use of the object oriented programming (OOP) features in PHP 5
    to organize code.


    **Version Control and Unit Testing**


    There are two other reasonably important aspects of the web development process
    that we won’t be covering in this book, but that you should at least be aware
    of: version control and unit testing. While they are important, they don’t directly
    concern the concepts and libraries we will be looking at in this book.


    Almost all web development projects I undertake use some form of version control
    (typically Subversion). This allows me to track any and all changes made to the
    files, and it also aids with code deployment. If you’re not familiar with Subversion,
    I encourage you to use it for your own development projects. You can download
    it fr[om http://subversion.tigris.org, and y](http://subversion.tigris.org)ou
    can download the free O’Reilly book on Subversion from [http://svnbook.red-bean.com.](http://svnbook.red-bean.com)


    Unit testing is another important tool that should be used when developing your
    own web sites (or when developing libraries you can use in multiple applications).
    A unit test is a script designed to test the functionality of a class (or of an
    entire package, or just individual methods inside a class).


    You can perform automated testing using multiple unit tests, which will assist
    in finding regression bugs if they occur (that is, bugs that occur incidentally
    as a result of changing code that previously worked).


    All of the code provided in this book has been tested, so including unit tests
    with all of the code would be somewhat redundant. For your own unit testing, you
    can use a package such as Simple Test ([http://www.lastcraft.com/simple_test.php).](http://www.lastcraft.com/simple_test.php)


    **Summary**


    In this chapter, we have looked at the required features of our Web 2.0 application,
    and briefly at how they will be implemented. From here on in, we will work on
    the actual application development, starting with the initial setup in Chapter
    2.


