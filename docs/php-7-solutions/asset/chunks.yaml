    \ 步添加到 `menu.php` 中的密码 PHP 代码，并将 `index.php` 中的包含命令恢复到原始设置，如下所示：\n\nPHP 方案 5-3：自动指示当前页面\n\
    \n让我们解决菜单不指示当前页面的问题。解决方案是通过 PHP 获取当前页面的文件名，然后使用条件语句在相应的 `<a>` 标签中插入一个 ID。\n\n\
