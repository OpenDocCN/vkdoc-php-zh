    \n尽管 PHP 是弱类型，但它使用以下八种数据类型：\n\n- **整型（Integer）**：这是一个整数，例如 1、25、42 或 2006。整数不得包含任何逗号或其他标点作为千位分隔符。你也可以使用十六进制数，它们应以\
    \ `0x` 开头（例如 `0xFFFFFF`、`0x000000`）。\n- **浮点数（Floating-point number）**：这是一个包含小数点的数字，例如\
    \ 9.99、98.6 或 2.1。PHP 不支持使用逗号作为小数点（这在许多欧洲国家很常见）。你必须使用句点。与整型一样，浮点数不得包含千位分隔符。（此类型也称为\
    \ float 或 double。）\n- **字符串（String）**：字符串是任意长度的文本。它可以短至零个字符（空字符串），并且没有上限。\n- **布尔型（Boolean）**：此类型只有两个值：`true`\
    \ 或 `false`。但是，PHP 会将其他值隐式视为真或假。请参阅本章后面的“根据 PHP 判断真假”。\n- **数组（Array）**：数组是一种能够存储多个值的变量，尽管它可能不包含任何值（空数组）。数组可以保存任何数据类型，包括其他数组。数组的数组称为多维数组。有关如何向数组填充值的详细信息，请参阅本章后面的“创建数组”。\n\
    - **对象（Object）**：对象是一种复杂的数据类型，能够存储和操作值。你将在第 6 章了解更多关于对象的内容。\n- **资源（Resource）**：当\
    \ PHP 连接到外部数据源（如文件或数据库）时，它会将对它的引用存储为资源。\n- **NULL**：这是一个特殊的数据类型，表示变量没有值。\n\nPHP\
    \ 弱类型的一个重要副作用是，如果将整数或浮点数括在引号中，PHP 会自动将其从字符串转换为数字，从而无需任何特殊处理即可执行计算。这与 JavaScript\
    \ 不同，可能会产生意想不到的后果。当 PHP 看到加号（`+`）时，它假设你想要执行加法，因此它会尝试将字符串转换为整数或浮点数，如下例所示（代码位于 `ch03`\
    \ 文件夹中的 `data_conversion_01.php`）：\n\n```\n$fruit = '2 apples';\n$veg = ' 2 carrots';\n\
    echo $fruit + $veg;  // 显示 4\n```\n\nPHP 发现 `$fruit` 和 `$veg` 都以数字开头，因此它提取数字并忽略其余部分。但是，如果字符串不是以数字开头，PHP\
    \ 会将其转换为 0，如下例所示（代码位于 `data_conversion_02.php`）：\n\n```\n$fruit = '2 apples';\n\
    $veg = ' and 2 carrots';\necho $fruit + $veg;  // 显示 2\n```\n\n弱类型有利有弊。它使 PHP\
    \ 对初学者非常容易，但这也意味着在使用变量之前，通常需要检查它是否包含正确的数据类型。\n\n### 使用 PHP 进行计算\n\nPHP 非常擅长处理数字，可以执行各种计算，从简单的算术到复杂的数学运算。此参考部分仅涵盖标准算术运算符。有关\
    \ PHP 支持的数学函数和常量的详细信息，请参见 [`http://php.net/manual/en/book.math.php`](http://php.net/manual/en/book.math.php)。\n\
    \n> **注意**：常量与变量类似，都使用名称来表示值。但是，常量的值一旦定义就不能更改。所有 PHP 预定义常量都是大写的。与变量不同，它们不以美元符号开头。例如，π\
    \ 的常量是 `M_PI`。\n"
- fmt: "## Arithmetic Operators\n\nThe standard arithmetic operators all work the\
    \ way you would expect, although some of them look slightly different from those\
    \ you learned at school. For instance, an asterisk (`*`) is used as the multiplication\
    \ sign, and a forward slash (`/`) is used to indicate division. Table [3-1](#A978-1-4842-0635-5_3_Chapter.html#Tab1)\
    \ shows examples of how the standard arithmetic operators work. To demonstrate\
    \ their effect, the following variables have been set:\n\n```\n$x = 20;\n$y =\
    \ 10;\n$z = 3;\n```\n\n**Table 3-1.** Arithmetic operators in PHP\n\n| Operation\
    \ | Operator | Example | Result |\n| --- | --- | --- | --- |\n| Addition | `+`\
    \ | `$x + $y` | `30` |\n| Subtraction | `-` | `$x - $y` | `10` |\n| Multiplication\
    \ | `*` | `$x * $y` | `200` |\n| Division | `/` | `$x / $y` | `2` |\n| Modulus\
    \ | `%` | `$x % $z` | `2` |\n| Increment (add 1) | `++` | `$x++` | `21` |\n| Decrement\
    \ (subtract 1) | `--` | `$y--` | `9` |\n| Exponentiation | `**` | `$y**$z` | `1000`\
    \ |\n\nThe modulus operator converts both numbers to integers by stripping the\
    \ decimal portion before processing and returns the remainder of a division, as\
    \ follows:\n\n```\n5 % 2.5    // result is 1, not 0 (the decimal fraction is stripped\
    \ from 2.5)\n10 % 2     // result is 0\n```\n\nModulus is useful for working out\
    \ whether a number is odd or even. `$number % 2` always produces 0 or 1. If the\
    \ result is 0, there is no remainder, so the number is even.\n\nThe increment\
    \ (`++`) and decrement (`--`) operators can come either before or after the variable.\
    \ When they come before the variable, 1 is added or subtracted before any further\
    \ calculation is carried out. When they come after, the main calculation is carried\
    \ out first, and then 1 is either added or subtracted. Since the dollar sign is\
    \ an integral part of the variable name, the increment and decrement operators\
    \ go before the dollar sign when used in front:\n\n```\n++$x\n--$y\n```\n\nThe\
    \ exponentiation operator requires PHP 5.6 or later. Prior to PHP 5.6, use the\
    \ `pow()` function, which takes two arguments: the base number and the exponent.\
    \ For example, `pow(10, 3)` is equivalent to `10**3`. Both raise 10 to the power\
    \ of 3.\n\n## Determining the Order of Calculations\n\nCalculations in PHP follow\
    \ the same rules of precedence as standard arithmetic. Table [3-2](#A978-1-4842-0635-5_3_Chapter.html#Tab2)\
    \ lists arithmetic operators in order of precedence, with the highest precedence\
    \ at the top.\n\n**Table 3-2.** Precedence of arithmetic operators\n\n| Group\
    \ | Operators | Rule |\n| --- | --- | --- |\n| Parentheses | `()` | Operations\
    \ contained within parentheses are evaluated first. If these expressions are nested,\
    \ the innermost is evaluated foremost. |\n| Exponentiation | `**` | |\n| Increment/decrement\
    \ | `++ --` | |\n| Multiplication and division | `* / %` | If an expression contains\
    \ two or more of these operators, they are evaluated from left to right. |\n|\
    \ Addition and subtraction | `+ -` | If an expression contains two or more of\
    \ these operators, they are evaluated from left to right. |\n\n## Combining Calculations\
    \ and Assignment\n\nPHP offers a shorthand way of performing a calculation on\
    \ a variable and reassigning the result to the variable through combined assignment\
    \ operators. The main ones are listed in Table [3-3](#A978-1-4842-0635-5_3_Chapter.html#Tab3).\n\
    \n**Table 3-3.** Combined arithmetic assignment operators used in PHP\n\n| Operator\
    \ | Example | Equivalent to |\n| --- | --- | --- |\n| `+=` | `$a += $b` | `$a\
    \ = $a + $b` |\n| `-=` | `$a -= $b` | `$a = $a - $b` |\n| `*=` | `$a *= $b` |\
    \ `$a = $a * $b` |\n| `/=` | `$a /= $b` | `$a = $a / $b` |\n| `%=` | `$a %= $b`\
    \ | `$a = $a % $b` |\n| `**=` | `$a **= $b` | `$a = $a ** $b` |\n\nThe combined\
    \ exponentiation assignment operator (`**=`) is available only in PHP 5.6 and\
    \ later.\n\n### Adding to an existing string\n\nThe same convenient shorthand\
    \ allows you to add new material to the end of an existing string by combining\
    \ a period and an equal sign, like this:\n\n```\n$hamlet = 'To be';\n$hamlet .=\
    \ ' or not to be';\n```\n\nNote that you need to create a space at the beginning\
    \ of the additional text unless you want both strings to run on without a break.\
    \ This shorthand, known as the combined concatenation operator, is extremely useful\
    \ when combining many strings, such as is required when building the content of\
    \ an email message or looping through the results of a database search.\n\n> **Tip**\
    \  \n> The period in front of the equal sign is easily overlooked when copying\
    \ code. When you see the same variable repeated at the beginning of a series of\
    \ statements, it's often a sure sign that you need to use `.=` instead of `=`\
    \ on its own.\n\n### All You Ever Wanted to Know About Quotes—and More\n\nHandling\
    \ quotes within any computer language—not just PHP—can be fraught with difficulties\
    \ because computers always take the first matching quote as marking the end of\
    \ a string. Structured Query Language (SQL)—the language used to communicate with\
    \ databases—also uses strings. Since your strings may include apostrophes, the\
    \ combination of single and double quotes isn't enough. Moreover, PHP gives variables\
    \ and escape sequences (certain characters preceded by a backslash) special treatment\
    \ inside double quotes. Over the next few pages, I'll unravel this tangle and\
    \ make sense of it all for you.\n\n#### How PHP Treats Variables Inside Strings\n\
    \nChoosing whether to use double quotes or single quotes might just seem like\
    \ a question of personal preference, but there's an important difference in the\
    \ way that PHP handles them.\n\n* Anything between single quotes is treated literally\
    \ as text.\n* Double quotes act as a signal to process variables and special characters\
    \ known as escape sequences.\n\nIn the following example, `$name` is assigned\
    \ a value and then used in a single-quoted string. So `$name` is treated like\
    \ normal text (the code is in `quotes_01.php`):\n\n```\n$name = 'Dolly';\necho\
    \ 'Hello, $name';  // Hello, $name\n```\n\nIf you replace the single quotes in\
    \ the second line with double ones (see `quotes_02.php`), `$name` is processed\
    \ and its value is displayed onscreen:\n\n```\n$name = 'Dolly';\necho \"Hello,\
    \ $name\";  // Hello, Dolly\n```\n\n> **Note**  \n> In both examples, the string\
    \ in the first line is in single quotes. What causes the variable to be processed\
    \ is the fact that it's in a double-quoted string, not how it originally got its\
    \ value.\n\nBecause double quotes are so useful in this way, many people use them\
    \ all the time. Technically speaking, using double quotes when you don't need\
    \ to process any variables is inefficient. My preference is to use single quotes\
    \ unless the string contains variables."
  raw: '#### Arithmetic Operators


    The standard arithmetic operators all work the way you would expect, although
    some of them look slightly different from those you learned at school. For instance,
    an asterisk (`*`) is used as the multiplication sign, and a forward slash (`/`)
    is used to indicate division. Table [3-1](#A978-1-4842-0635-5_3_Chapter.html#Tab1)
    shows examples of how the standard arithmetic operators work. To demonstrate their
    effect, the following variables have been set:


    `$x = 20;`


    `$y = 10;`


    `$z = 3;`


    Table 3-1.


    Arithmetic operators in PHP


    | Operation | Operator | Example | Result |

    | --- | --- | --- | --- |

    | Addition | `+` | `$x + $y` | `30` |

    | Subtraction | `-` | `$x - $y` | `10` |

    | Multiplication | `*` | `$x * $y` | `200` |

    | Division | `/` | `$x / $y` | `2` |

    | Modulus | `%` | `$x % $z` | `2` |

    | Increment (add 1) | `++` | `$x++` | `21` |

    | Decrement (subtract 1) | `--` | `$y--` | `9` |

    | Exponentiation | `**` | `$y**$z` | `1000` |


    The modulus operator converts both numbers to integers by stripping the decimal
    portion before processing and returns the remainder of a division, as follows:


    `5 % 2.5    // result is 1, not 0 (the decimal fraction is stripped from 2.5)`


    `10 % 2     // result is 0`


    Modulus is useful for working out whether a number is odd or even. `$number %
    2` always produces 0 or 1\. If the result is 0, there is no remainder, so the
    number is even.


    The increment (`++`) and decrement (`--`) operators can come either before or
    after the variable. When they come before the variable, 1 is added or subtracted
    before any further calculation is carried out. When they come after, the main
    calculation is carried out first, and then 1 is either added or subtracted. Since
    the dollar sign is an integral part of the variable name, the increment and decrement
    operators go before the dollar sign when used in front:


    `++$x`


    `--$y`


    The exponentiation operator requires PHP 5.6 or later. Prior to PHP 5.6, use the
    `pow()` function, which takes two arguments: the base number and the exponent.
    For example, `pow(10, 3)` is equivalent to `10**3`. Both raise 10 to the power
    of 3.


    #### Determining the Order of Calculations


    Calculations in PHP follow the same rules of precedence as standard arithmetic.
    Table [3-2](#A978-1-4842-0635-5_3_Chapter.html#Tab2) lists arithmetic operators
    in order of precedence, with the highest precedence at the top.


    Table 3-2.


    Precedence of arithmetic operators


    | Group | Operators | Rule |

    | --- | --- | --- |

    | Parentheses | `()` | Operations contained within parentheses are evaluated first.
    If these expressions are nested, the innermost is evaluated foremost. |

    | Exponentiation | `**` |   |

    | Increment/decrement | `++ --` |   |

    | Multiplication and division | `* / %` | If an expression contains two or more
    of these operators, they are evaluated from left to right. |

    | Addition and subtraction | `+ -` | If an expression contains two or more of
    these operators, they are evaluated from left to right. |


    #### Combining Calculations and Assignment


    PHP offers a shorthand way of performing a calculation on a variable and reassigning
    the result to the variable through combined assignment operators. The main ones
    are listed in Table [3-3](#A978-1-4842-0635-5_3_Chapter.html#Tab3).


    Table 3-3.


    Combined arithmetic assignment operators used in PHP


    | Operator | Example | Equivalent to |

    | --- | --- | --- |

    | `+=` | `$a += $b` | `$a = $a + $b` |

    | `-=` | `$a -= $b` | `$a = $a - $b` |

    | `*=` | `$a *= $b` | `$a = $a * $b` |

    | `/=` | `$a /= $b` | `$a = $a / $b` |

    | `%=` | `$a %= $b` | `$a = $a % $b` |

    | `**=` | `$a **= $b` | `$a = $a ** $b` |


    The combined exponentiation assignment operator (**=) is available only in PHP
    5.6 and later.


    ### Adding to an existing string


    The same convenient shorthand allows you to add new material to the end of an
    existing string by combining a period and an equal sign, like this:


    `$hamlet = ''To be'';`


    `$hamlet .= '' or not to be'';`


    Note that you need to create a space at the beginning of the additional text unless
    you want both strings to run on without a break. This shorthand, known as the
    combined concatenation operator, is extremely useful when combining many strings,
    such as is required when building the content of an email message or looping through
    the results of a database search.


    Tip


    The period in front of the equal sign is easily overlooked when copying code.
    When you see the same variable repeated at the beginning of a series of statements,
    it’s often a sure sign that you need to use `.=` instead of `=` on its own.


    ### All You Ever Wanted to Know About Quotes—and More


    Handling quotes within any computer language—not just PHP—can be fraught with
    difficulties because computers always take the first matching quote as marking
    the end of a string. Structured Query Language (SQL)—the language used to communicate
    with databases—also uses strings. Since your strings may include apostrophes,
    the combination of single and double quotes isn’t enough. Moreover, PHP gives
    variables and escape sequences (certain characters preceded by a backslash) special
    treatment inside double quotes. Over the next few pages, I’ll unravel this tangle
    and make sense of it all for you.


    #### How PHP Treats Variables Inside Strings


    Choosing whether to use double quotes or single quotes might just seem like a
    question of personal preference, but there’s an important difference in the way
    that PHP handles them.


    *   Anything between single quotes is treated literally as text.

    *   Double quotes act as a signal to process variables and special characters
    known as escape sequences.


    In the following example, `$name` is assigned a value and then used in a single-quoted
    string. So `$name` is treated like normal text (the code is in `quotes_01.php`):


    `$name = ''Dolly'';`


    `echo ''Hello, $name'';  // Hello, $name`


    If you replace the single quotes in the second line with double ones (see `quotes_02.php`),
    `$name` is processed and its value is displayed onscreen:


    `$name = ''Dolly'';`


    `echo` `"Hello, $name"` `;  // Hello, Dolly`


    Note


    In both examples, the string in the first line is in single quotes. What causes
    the variable to be processed is the fact that it’s in a double-quoted string,
    not how it originally got its value.


    Because double quotes are so useful in this way, many people use them all the
    time. Technically speaking, using double quotes when you don’t need to process
    any variables is inefficient. My preference is to use single quotes unless the
    string contains variables.'
  trans: "\n## 算术运算符\n\n标准算术运算符的工作方式与你预期的一致，尽管有些运算符看起来与你在学校学到的略有不同。例如，星号（`*`）用作乘号，斜杠（`/`）用于表示除法。表\
    \ 3-1 展示了标准算术运算符如何工作的示例。为演示其效果，设置了以下变量：\n\n```\n$x = 20;\n$y = 10;\n$z = 3;\n\
    ```\n\n**表 3-1.** PHP 中的算术运算符\n\n| 操作 | 运算符 | 示例 | 结果 |\n| --- | --- | --- | ---\
    \ |\n| 加法 | `+` | `$x + $y` | `30` |\n| 减法 | `-` | `$x - $y` | `10` |\n| 乘法 |\
    \ `*` | `$x * $y` | `200` |\n| 除法 | `/` | `$x / $y` | `2` |\n| 取模 | `%` | `$x\
    \ % $z` | `2` |\n| 自增（加 1） | `++` | `$x++` | `21` |\n| 自减（减 1） | `--` | `$y--`\
    \ | `9` |\n| 乘方 | `**` | `$y**$z` | `1000` |\n\n取模运算符在运算前会通过去除小数部分将两个数字转换为整数，然后返回除法的余数，如下所示：\n\
    \n```\n5 % 2.5    // 结果为 1，而不是 0（2.5 的小数部分被去除）\n10 % 2     // 结果为 0\n```\n\n取模运算对于判断一个数是奇数还是偶数非常有用。`$number\
    \ % 2` 总是产生 0 或 1。如果结果为 0，则表示没有余数，因此该数为偶数。\n\n自增（`++`）和自减（`--`）运算符可以放在变量之前或之后。当它们位于变量之前时，会在进行任何进一步计算之前加\
    \ 1 或减 1。当它们位于变量之后时，会先执行主要计算，然后再加 1 或减 1。由于美元符号是变量名的组成部分，当自增和自减运算符用于变量前面时，它们会放在美元符号之前：\n\
    \n```\n++$x\n--$y\n```\n\n乘方运算符需要 PHP 5.6 或更高版本。在 PHP 5.6 之前，请使用 `pow()` 函数，该函数接受两个参数：底数和指数。例如，`pow(10,\
    \ 3)` 等同于 `10**3`。两者都表示 10 的 3 次方。\n\n## 确定计算顺序\n\nPHP 中的计算遵循与标准算术相同的优先级规则。表 3-2\
    \ 按照优先级顺序列出了算术运算符，最高优先级位于顶部。\n\n**表 3-2.** 算术运算符的优先级\n\n| 分组 | 运算符 | 规则 |\n| ---\
    \ | --- | --- |\n| 括号 | `()` | 先计算括号内的操作。如果这些表达式嵌套，则最先计算最内层的。 |\n| 乘方 | `**` |\
    \ |\n| 自增/自减 | `++ --` | |\n| 乘法和除法 | `* / %` | 如果表达式包含两个或更多这些运算符，它们将从左到右进行计算。\
    \ |\n| 加法和减法 | `+ -` | 如果表达式包含两个或更多这些运算符，它们将从左到右进行计算。 |\n\n## 结合计算与赋值\n\nPHP 提供了一种简写方式，可以通过组合赋值运算符对变量执行计算并将结果重新赋值给该变量。主要的运算符列于表\
    \ 3-3。\n\n**表 3-3.** PHP 中使用的组合算术赋值运算符\n\n| 运算符 | 示例 | 等同于 |\n| --- | --- | ---\
    \ |\n| `+=` | `$a += $b` | `$a = $a + $b` |\n| `-=` | `$a -= $b` | `$a = $a -\
    \ $b` |\n| `*=` | `$a *= $b` | `$a = $a * $b` |\n| `/=` | `$a /= $b` | `$a = $a\
    \ / $b` |\n| `%=` | `$a %= $b` | `$a = $a % $b` |\n| `**=` | `$a **= $b` | `$a\
    \ = $a ** $b` |\n\n组合乘方赋值运算符（`**=`）仅在 PHP 5.6 及更高版本中可用。\n\n### 向现有字符串添加内容\n\n\
    相同的便捷简写方式允许你通过组合句点和等号，向现有字符串末尾添加新内容，如下所示：\n\n```\n$hamlet = 'To be';\n$hamlet\
    \ .= ' or not to be';\n```\n\n请注意，除非你希望两个字符串无间断地连接，否则需要在附加文本的开头创建一个空格。这种简写方式被称为组合连接运算符，在连接多个字符串时非常有用，例如在构建电子邮件内容或循环遍历数据库搜索结果时。\n\
    \n> **提示**  \n> 复制代码时，等号前面的句点很容易被忽略。当你看到同一个变量在一系列语句的开头重复出现时，这通常是一个明确的信号，表明你需要使用\
    \ `.=` 而不是单独的 `=`。\n\n### 关于引号你想知道的一切——以及更多\n\n在任何计算机语言（不仅仅是 PHP）中处理引号都可能充满困难，因为计算机总是将第一个匹配的引号视为字符串的结束。结构化查询语言（SQL）——用于与数据库通信的语言——也使用字符串。由于你的字符串可能包含撇号，单引号和双引号的组合并不足够。此外，PHP\
    \ 在双引号内对变量和转义序列（某些前面带有反斜杠的字符）给予特殊处理。在接下来的几页中，我将为你理清这个纠缠并让你完全理解它。\n\n#### PHP 如何处理字符串内的变量\n\
    \n选择使用双引号还是单引号可能看起来只是个人喜好问题，但 PHP 处理它们的方式有一个重要区别。\n\n* 单引号之间的任何内容都被视为纯文本。\n* 双引号充当处理变量和称为转义序列的特殊字符的信号。\n\
    \n在以下示例中，`$name` 被赋值，然后在单引号字符串中使用。因此 `$name` 被当作普通文本处理（代码在 `quotes_01.php` 中）：\n\
    \n```\n$name = 'Dolly';\necho 'Hello, $name';  // Hello, $name\n```\n\n如果你将第二行中的单引号替换为双引号（参见\
    \ `quotes_02.php`），`$name` 会被处理，其值将显示在屏幕上：\n\n```\n$name = 'Dolly';\necho \"Hello,\
    \ $name\";  // Hello, Dolly\n```\n\n> **注意**  \n> 在两个示例中，第一行的字符串都是单引号。导致变量被处理的原因是它位于双引号字符串中，而不是它最初是如何获取值的。\n\
    \n由于双引号在这方面非常有用，许多人一直使用它们。从技术上讲，当你不需要处理任何变量时使用双引号是低效的。我个人的偏好是除非字符串包含变量，否则使用单引号。\n"
- fmt: '### Using Escape Sequences Inside Double Quotes


    Double quotes have another important effect: they treat escape sequences in a
    special way. All escape sequences are formed by placing a backslash in front of
    a character. Most of them are designed to avoid conflicts with characters that
    are used with variables, but three of them have special meanings: `\n` inserts
    a new line character, `\r` inserts a carriage return, and `\t` inserts a tab.
    Table [3-4](#A978-1-4842-0635-5_3_Chapter.html#Tab4) lists the main escape sequences
    supported by PHP.


    **Table 3-4.** The main PHP escape sequences


    | Escape sequence | Character represented in double-quoted string |

    | --- | --- |

    | `\"` | Double quote |

    | `\n` | New line |

    | `\r` | Carriage return |

    | `\t` | Tab |

    | `\\` | Backslash |

    | `\$` | Dollar sign |

    | `\{` | Opening curly brace |

    | `\}` | Closing curly brace |

    | `\[` | Opening square bracket |

    | `\]` | Closing square bracket |


    **Caution**


    With the exception of `\\`, the escape sequences listed in Table [3-4](#A978-1-4842-0635-5_3_Chapter.html#Tab4)
    work only in double-quoted strings. In a single-quoted string, they are treated
    as a literal backslash followed by the second character. A backslash at the end
    of the string always needs to be escaped. Otherwise, it’s interpreted as escaping
    the following quotation mark. In a single-quoted string, escape single quotes
    and apostrophes with a backslash as described in the first half of this chapter.


    ### Embedding Associative Array Elements in a String


    There’s a nasty “gotcha” with associative array elements in a double-quoted string.
    The following line of code attempts to embed a couple of elements from the `$book`
    associative array found in the first half of this chapter inside a double-quoted
    string:


    `echo "$book[''title''] was written by $book[''author''].";`


    It looks OK. The keys of the array elements use single quotes, so there’s no mismatch
    of quotes. Yet, if you load `quotes_03.php` into a browser, you get this enigmatic
    error message.


    ![A978-1-4842-0635-5_3_Figb_HTML.jpg](A978-1-4842-0635-5_3_Figb_HTML.jpg)


    The solution is simple. You need to enclose the associative array variables in
    curly braces like this (see `quotes_04.php`):


    `echo "{$book[''title'']} was written by {$book[''author'']}.";`


    The values are now displayed correctly, as shown in the following screenshot.


    ![A978-1-4842-0635-5_3_Figc_HTML.jpg](A978-1-4842-0635-5_3_Figc_HTML.jpg)


    Indexed array elements, such as `$shoppingList[2]`, don’t need this special treatment
    because the array index is a number and is not enclosed in quotes.


    **Caution**


    Some people try to avoid the problem with associative array elements by removing
    the quotes from the array key, like this: `$book[title]`. Although it works, removing
    the quotes from the array key creates an undefined constant, which could result
    in your code breaking in the future.


    ### Avoiding the Need to Escape Quotes with Heredoc Syntax


    Using a backslash to escape one or two quotation marks isn’t a great burden, but
    I frequently see examples of code where backslashes seem to have run riot. It
    must be difficult to type, and it’s certainly difficult to read. Moreover, it’s
    totally unnecessary. The PHP heredoc syntax offers a relatively simple method
    of assigning text to a variable without any special handling of quotes.


    **Note**


    The name “heredoc” is derived from here-document, a technique used in Unix and
    Perl programming to pass large amounts of text to a command.


    Assigning a string to a variable using heredoc involves the following steps:


    1. Type the assignment operator, followed by `<<<` and an identifier. The identifier
    can be any combination of letters, numbers, and the underscore, as long as it
    doesn’t begin with a number. The same combination is used later to identify the
    end of the heredoc.

    2. Begin the string on a new line. It can include both single and double quotes.
    Any variables will be processed in the same way as in a double-quoted string.

    3. Place the identifier on a new line after the end of the string. Nothing else
    should be on the same line, except for a final semicolon. Moreover, the identifier
    must be at the beginning of the line; it cannot be indented.


    It’s a lot easier when you see it in practice. The following simple example can
    be found in `heredoc.php` in the files for this chapter:


    ```

    $fish = ''whiting'';


    $book[''title''] = ''Alice in Wonderland'';


    $mockTurtle = <<< Gryphon


    "Will you walk a little faster?" said a $fish to a snail.


    "There''s a porpoise close behind us, and he''s treading on my tail."


    (from {$book[''title'']})


    Gryphon;


    echo $mockTurtle;

    ```


    In this example, `Gryphon` is the identifier. The string begins on the next line,
    and the double quotes are treated as part of the string. Everything is included
    until you reach the identifier at the beginning of a new line.


    **Caution**


    Although heredoc syntax avoids the need to escape quotes, the associative array
    element `$book[''title'']` still needs to be enclosed in braces, as described
    in the previous section.


    As you can see from the following screenshot, the heredoc displays the double
    quotes and processes the `$fish` and `$book[''title'']` variables.


    ![A978-1-4842-0635-5_3_Figd_HTML.jpg](A978-1-4842-0635-5_3_Figd_HTML.jpg)


    To achieve the same effect without using the heredoc syntax, you need to add the
    double quotes and escape them like this:


    ```

    $mockTurtle = "\"Will you walk a little faster?\" said a $fish to a snail.


    \"There''s a porpoise close behind us, and he''s treading on my tail.\" (from


    {$book[''title'']})";

    ```


    The heredoc syntax is mainly of value when you have a long string and/or lots
    of quotes. It’s also useful if you want to assign an XML document or a lengthy
    section of HTML to a variable.


    **Note**


    There’s a related technique called nowdoc syntax, which treats variables in the
    same way as single quotes—in other words, as literal text. To create a string
    using nowdoc syntax, enclose the identifier in single quotes like this: `<<< ''Gryphon''`.
    The closing identifier does not use quotes. See [`http://php.net/manual/en/language.types.string.php#language.types.string.syntax.nowdoc`](http://php.net/manual/en/language.types.string.php#language.types.string.syntax.nowdoc).


    If you wrap the identifier in double quotes, the string is treated as heredoc
    syntax.


    ## Creating Arrays


    As explained earlier, there are two types of arrays: indexed arrays, which use
    numbers to identify each element, and associative arrays, which use strings. You
    can build both types by assigning a value directly to each element. Let’s take
    another look at the `$book` associative array:


    ```

    $book[''title''] = ''PHP Solutions: Dynamic Web Design Made Easy, Third Edition'';

    $book[''author''] = ''David Powers'';

    $book[''publisher''] = ''Apress'';

    $book[''ISBN''] = ''978-1-4842-0636-2'';

    ```


    To build an indexed array the direct way, use numbers instead of strings as the
    array keys. Indexed arrays are numbered from 0, so to build the `$shoppingList`
    array depicted in Figure [3-3](#A978-1-4842-0635-5_3_Chapter.html#Fig3), you would
    declare it like this:


    ```

    $shoppingList[0] = ''wine'';

    $shoppingList[1] = ''fish'';

    $shoppingList[2] = ''bread'';

    $shoppingList[3] = ''grapes'';

    $shoppingList[4] = ''cheese'';

    ```


    Although both are perfectly valid ways of creating arrays, it’s a nuisance to
    have to type out the variable name each time; there are shorter ways of doing
    it. The syntax is slightly different for each type of array.'
