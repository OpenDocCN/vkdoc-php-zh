- fmt: "### Daily Meetings\n\nDuring each sprint, the team has daily meetings. This\
    \ is stage 5. The meetings are no more than 15 minutes and concern what was completed\
    \ yesterday, what will be worked on today, and any potential roadblocks.\n\n###\
    \ Sprint Review\n\nAt the end of every sprint, the working product created during\
    \ the sprint is shown. This is stage 6.\n\n### Sprint Retrospective\n\nAt the\
    \ end of each sprint retrospective—stage 7—is a meeting during which the team\
    \ discusses how the sprint went and ideas for improvements in the next sprint.\n\
    \n## Summary\n\nIn this chapter, I covered Agile Software Development principles\
    \ and phases. You learned how CakePHP supports Agile development. Even if you\
    \ follow other development methods, CakePHP offers you useful tools for them also.\n\
    \n# 6. Preparing for Testing\n\n![A337704_2_En_6_Figa_HTML.jpg](A337704_2_En_6_Figa_HTML.jpg)\n\
    \nBill felt his training was not complete\n\n## Installing\n\nTo have everything\
    \ up and running, you have to install a web server, MySQL server, PHP, CakePHP\
    \ (`http://book.cakephp.org`), and PHPUnit (`http://phpunit.de`). I will go through\
    \ all these procedures, using Ubuntu 16.04 as an example. Other systems, such\
    \ as MacOS or Windows, and even other Linux systems, have different installation\
    \ methods.\n\nWe will install everything via Terminal, for which you will require\
    \ the system's root password.\n\n### Install Webserver\n\nWebserver, or HTTP server,\
    \ is a software that processes requests from browsers. Its primary function is\
    \ to store, deliver, and process web pages. The most widely used is Apache (`https://httpd.apache.org/`).\n\
    \nOpen your terminal and issue the following command. This will install the latest\
    \ Apache web server into your system, if it is not already installed.\n\n```\n\
    $ sudo apt-get install apache2\n```\n\nThe result is quite long but should start\
    \ and finish with something like the following:\n\n```\nReading package lists...\
    \ Done\nBuilding dependency tree\nReading state information... Done\nThe following\
    \ package was automatically installed and is no longer required:\n...\nProcessing\
    \ triggers for libc-bin (2.23-0ubuntu3) ...\nProcessing triggers for systemd (229-4ubuntu6)\
    \ ...\nProcessing triggers for ureadahead (0.100.0-19) ...\nProcessing triggers\
    \ for ufw (0.35-0ubuntu2) ...\n```\n\n### Install MySQL\n\nMySQL is the most popular\
    \ open source relational database system for web applications. If you require\
    \ some database in which to store your application's data, MySQL is the easiest\
    \ option.\n\nOpen your terminal and issue the following command to install the\
    \ MySQL server:\n\n```\n$ sudo apt-get install mysql-server\n```\n\nThis result\
    \ is also very long, so I cut out the middle.\n\n```\nReading package lists...\n\
    Building dependency tree...\nReading state information...\nThe following package\
    \ was automatically installed and is no longer required:\nlibnghttp2-14\n...\n\
    Preparing to unpack .../mysql-server_5.7.12-0ubuntu1_all.deb ...\nUnpacking mysql-server\
    \ (5.7.12-0ubuntu1) ...\nSetting up mysql-server (5.7.12-0ubuntu1) ...\n```\n\n\
    ### Install PHP\n\nPHP is a server-side scripting language designed mainly for\
    \ web development. It is very popular: more than 80% of web servers are installed\
    \ with PHP. It is easy to learn, flexible, and robust, and is perhaps the language\
    \ behind CakePHP.\n\nThe latest version is PHP 7, which represents the next great\
    \ leap after PHP 5. PHP 7 introduced scalar type declarations, return type declarations,\
    \ the null coalescing operator, spaceship operator, anonymous classes, and many\
    \ other features.\n\nPHP should be installed with a few modules, to get everything\
    \ to work. We will run PHP as an Apache module and install MySQL, mbstring, intl,\
    \ and xml modules.\n\n```\n$ sudo apt-get install php7.0 libapache2-mod-php7.0\
    \ php7.0-mysql php7.0-mbstring php7.0-intl php7.0-xml\n```\n\nThe output result\
    \ is also shortened.\n\n```\nReading package lists...\nBuilding dependency tree...\n\
    Reading state information...\nThe following packages were automatically installed\
    \ and are no longer required:\nlibjs-excanvas mercurial mercurial-common php-cli-prompt\
    \ php-composer-semver\n...\nCreating config file /etc/php/7.0/mods-available/xsl.ini\
    \ with new version\nProcessing triggers for libapache2-mod-php7.0 (7.0.4-7ubuntu2.1)\
    \ ...\n```\n\n### Post Installation\n\nWe should enable `mod_rewrite` to get the\
    \ best of CakePHP routing. As on a development server, we will install CakePHP\
    \ into a user directory, so we have to enable and set this up also.\n\nLet's enable\
    \ `userdir` first.\n\n```\n$ sudo a2enmod userdir\n```\n\nEdit `/etc/apache2/mods-enabled/userdir.conf`\
    \ and paste the following code:\n\n```\n2     UserDir public_html\n3     UserDir\
    \ disabled root\n\n6       AllowOverride FileInfo AuthConfig Limit Indexes\n7\
    \       Options MultiViews Indexes SymLinksIfOwnerMatch IncludesNoExec\n\n9  \
    \       Require all granted\n\n12       Require all denied\n```\n\nThe next file\
    \ to edit is `/etc/apache2/mods-available/php7.0.conf`. On Ubuntu, running PHP\
    \ scripts in the user directory is disabled, so we should enable it. Comment out\
    \ the last five lines of the file.\n\n```\n21  #\n22  #    \n23  #        php_admin_flag\
    \ engine Off\n24  #    \n25  #\n```\n\nLet's enable and set up `mod_rewrite`.\n\
    \n```\n$ sudo a2enmod rewrite\n```\n\nTo let everything load and work, we should\
    \ restart Apache.\n\n```\n$ sudo service apache2 restart\n```\n\n### Install Composer\n\
    \nComposer is the application-level package manager for PHP and provides a standard\
    \ format for managing dependencies of PHP software and required libraries. It\
    \ is an essential tool for any PHP development. As Composer is the recommended\
    \ way of installing CakePHP, we will install it first.\n\nOpen your terminal and\
    \ issue the following command to download Composer via `curl`, and install it\
    \ to the current directory.\n\n```\n$ curl -s https://getcomposer.org/installer\
    \ | php\n```\n\n### Install CakePHP\n\nAs an example, we'll use a blog to familiarize\
    \ ourselves with CakePHP unit testing. First, create a new CakePHP project with\
    \ Composer.\n\n```\n$ cd ~/public_html\n$ php composer.phar create-project --prefer-dist\
    \ cakephp/app cakeBlog\n```\n\nThis will create a `cakeBlog` folder in the current\
    \ working directory and download the latest version of `cakephp` (which is 3.2.8\
    \ at the time of writing) and all required packages.\n\nAfter install, you should\
    \ set write permissions to `/tmp` and `/logs` folders for the web server user.\n\
    \nComposer creates a `composer.json` and a `composer.lock` file in the project's\
    \ directory. These files describe the project's identification data, dependencies,\
    \ and other dependency related settings.\n\nAs we enabled the user directory with\
    \ Apache and PHP, I did this at my home (`/home/rrd`) directory's `public_html`\
    \ folder, so I will access my app at `http://localhost/~rrd/cakeBlog/` and use\
    \ this URL in my examples.\n\nIf everything is OK, you should be able to navigate\
    \ to your install path through your browser. You'll see something such as in Figure\
    \ 6-1.\n\n![A337704_2_En_6_Fig1_HTML.jpg](A337704_2_En_6_Fig1_HTML.jpg)\n\n**Figure\
    \ 6-1.** My blog after install\n\nDo not worry about the error message regarding\
    \ the database connection. I will get back to that soon.\n\n### Installing PHPUnit\n\
    \nPHPUnit is the de facto standard for unit testing in PHP. PHPUnit is integrated\
    \ into CakePHP for unit testing. Thanks to Composer, it is really simple to install\
    \ with all of its required packages. We do not need PHPUnit on the production\
    \ server, so we will use the `--dev` option.\n\n```\n$ cd ~/public_html/cakeBlog\n\
    $ php composer.phar require --dev phpunit/phpunit\n```\n\nIf you use the `--dev`\
    \ option, Composer will put this dependency into `composer.json`'s `require-dev`\
    \ section. Then, on the production server, you can skip installation of these\
    \ dependencies, which are required only for development, by using the following\
    \ command:\n\n```\n$ php composer.phar --no-dev install\n```"
