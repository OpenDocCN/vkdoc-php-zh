  trans: '

    # PHP 中的变量


    使用变量前无需进行任何特殊声明；只需在需要时写入美元符号后跟变量名即可定义。变量可以在 `assign` 语句中使用，也可以作为语句或计算的一部分。如果在语句中使用变量时尚未为其赋值，系统可能会产生一条提示信息。这取决于
    `php.ini` 中 `error_reporting` 的配置。向新变量赋值时不会出现这种情况，但如果使用未赋值的值，则会发出提示并使用默认值。该默认值可能是空字符串，也可能是值为
    0 的整数，具体取决于使用该变量的上下文环境。


    ## 配方 10-1. 转换变量类型


    ### 问题


    在像 PHP 这样的松散类型语言中，无法定义变量为特定类型。计算的结果决定了实际使用的类型。


    ### 解决方案


    使用新值覆写变量，或将值强制转换为不同类型，可以帮助程序员控制变量的具体类型。


    © Frank M. Kromann 2016


    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_10


    第十章 ■ 变量


    ### 工作原理


    变量没有严格的类型，任何变量的类型都可以在脚本执行期间的任何时候通过赋值为不同类型或强制转换为新类型来改变。在下面的例子中，变量 `$a` 首先被赋值为整数
    5，然后被赋值为一个字符串。当新值被赋值时，对整数值的引用丢失，整数使用的内存被释放。变量 `$b` 也被赋值为整数 5，然后将其转换为字符串并重新赋值给自己。


    ```php

    <?php


    // 10_1.php


    $a = 5;


    $a = "Some string";


    $b = 5;


    $b = (string)$b;

    ```


    PHP 会尝试转换任何变量值，以使其最佳匹配变量所使用的环境。如果变量是字符串，并且在数学运算中使用，它将在数学运算应用之前被转换为数值。如果字符串无法转换为数值，这可能导致值为
    0。变量类型的转换只是临时的，不会影响变量本身。必须进行转换才能使比较或计算有意义。


    在下面的例子中，两个变量（整数和字符串）进行了比较。这通过先将字符串 `"10"` 转换为整数值 10，然后再比较两者来完成。


    ```php

    <?php


    // 10_2.php


    $a = 5;


    $b = "10";


    if ($b > $a) {


    echo ''$b is greater than $a'';


    }

    ```


    ## 配方 10-2. 分配内存


    ### 问题


    当定义变量并赋值时，系统会根据数据的类型和大小处理所有需要的内存分配。当变量大小改变时，也会根据需要分配内存。可用内存限制由 `php.ini` 中的配置选项
    `memory_limit` 控制。如果内存超过允许的最大大小，将抛出致命错误并停止执行。出于性能原因，建议将此配置保持在较低值，但要足够大以处理网站任何请求所需的内存。


    使用太多变量或在数组或字符串中存储大量数据可能会导致内存溢出。在这些情况下，方便的做法是清除未使用的变量并释放它们占用的内存。


    ### 解决方案


    在大多数情况下，无需清除变量或释放内存。当脚本结束时，所有对它们的引用都会自动移除，所有使用的内存都会释放回系统。由于 PHP 的主要用途是生成对 HTTP
    请求的响应，脚本通常应该运行不超过几秒甚至几百毫秒。如果脚本处理大型数据集，在为新变量赋值之前移除不再需要的变量引用，有助于控制内存消耗。这有助于使内存使用量保持在配置的限制以下。


    第十章 ■ 变量


    ### 工作原理


    如果脚本用于向网络浏览器提供动态内容，脚本通常会快速终止，在大多数情况下，即使对于大型数据集也无需执行清理。在某些情况下，内存限制可能不允许在内存中保留大量数据，因此可能需要分批处理数据。如果脚本从命令行或作为
    cron 作业执行，它可能会运行很长时间并处理大量数据。在这些情况下，最好保守一些，释放未使用的资源。


    通过将变量赋值为 `null` 值或使用 `unset()` 函数来释放内存。


    ```php

    <?php


    // 10_3.php


    $a = array("abc", "def", "ghi");


    $a = null;


    $a = array("abc", "def", "ghi");


    unset($a);

    ```


    两种方法都会清除数据并释放内存，如果使用 `isset()`、`empty()` 或 `is_null()` 来检查该变量，它们都会给出相同的结果，分别为
    `false`、`true` 和 `true`。下一个示例展示了在赋值为 `null` 值或使用 `unset()` 函数取消设置的变量上使用这三个函数的情况。


    ```php

    <?php


    // 10_4.php


    $a = 5;


    $a = null;


    var_dump(isset($a));


    var_dump(empty($a));


    var_dump(is_null($a));


    unset($a);


    var_dump(isset($a));


    var_dump(empty($a));


    var_dump(is_null($a));

    ```


    将产生以下输出：


    ```

    bool(false)


    bool(true)


    bool(true)


    bool(false)


    bool(true)


    bool(true)

    ```


    结果显示有换行，如同使用 PHP 命令行版本执行代码时一样。如果添加内容类型头部并将其设置为 `text/plain`，在浏览器中也会得到相同的结果。


    第十章 ■ 变量


    ## 配方 10-3. 确定内存使用量


    ### 问题


    在处理大型数据集或调试系统资源使用时，了解脚本使用了多少内存是非常有益的。


    ### 解决方案


    PHP 有几个内置函数来检查当前脚本的实际内存使用量。它们分别叫做 `memory_get_usage()` 和 `memory_get_peak_usage()`。这些函数返回以字节为单位的值。要获得
    kb、Mb、Gb 等单位，这些结果必须除以 1024（2 的 10 次方）的倍数。第一个函数返回当前内存使用量，第二个函数返回执行期间的最大使用量。两个函数都返回以字节为单位的内存使用量。


    ### 工作原理


    下面的例子展示了数组如何从空增长到包含 100 个元素，以及当添加和移除元素时内存使用量如何增加和减少。


    ```php

    <?php


    // 10_5.php


    $a = array();


    for ($i = 0; $i < 100; $i++) {


    $a[] = "This is a short string";


    echo "Memory usage for $i elements = " . memory_get_usage() . "\n";


    }


    while (($i = sizeof($a))) {


    echo "Memory usage for $i elements = " . memory_get_usage() . "\n"; unset($a[$i
    - 1]);


    }


    echo "Maximum memory usage = " . memory_get_peak_usage() . "\n";

    ```


    这个脚本会产生相当长的输出。以下是前几行的列表。


    ```

    Memory usage for 0 elements = 352736


    Memory usage for 1 elements = 352768


    Memory usage for 2 elements = 352768


    Memory usage for 3 elements = 352768


    Memory usage for 4 elements = 352768


    Memory usage for 5 elements = 352768


    Memory usage for 6 elements = 352768


    Memory usage for 7 elements = 352768


    Memory usage for 8 elements = 353088


    Memory usage for 9 elements = 353088


    Memory usage for 10 elements = 353088


    Memory usage for 11 elements = 353088


    Memory usage for 12 elements = 353088

    ```

