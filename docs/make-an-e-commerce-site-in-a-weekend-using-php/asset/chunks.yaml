    \n图 1-15.\n\n用于输入付款信息的页面\n\n单击`Submit`按钮后，订单详细信息将连同唯一的订单号一起存储在数据库中。该订单号会显示给用户，以便日后沟通。\n\
    \n## 开发网站所需的软件\n\n由于您将使用 PHP 开发此电子商务网站，因此需要以下三种软件产品来运行 PHP 脚本：\n\n- **Apache 网络服务器**\
    \ — 用于在本地机器上运行和调试 PHP 脚本的本地网络服务器。\n- **PHP 解释器** — 用于解释 PHP 代码。Apache 网络服务器使用\
    \ PHP 解释器来解释 PHP 代码并生成 HTML 代码。\n- **MySQL** — 与 PHP 最流行的数据库系统，用于存储用户输入的数据以供日后参考。\n\
    \n您不必单独安装这些产品，可以安装 WampServer 或 XAMPP 服务器。这些服务器会同时在您的机器上安装所有三种产品：Apache、PHP 和\
    \ MySQL。接下来，您将学习如何安装 WampServer。\n\n> **注意**  \n> WampServer 为 Apache、MySQL 和\
    \ PHP 数据库提供了 Windows 网络开发环境。\n\n## 安装 WampServer\n\n为了在上传到实际服务器之前在本地检查和调试 PHP\
    \ 脚本，您需要在本地机器上安装 WampServer。因此，请从[`http://www.wampserver.com/en`](http://www.wampserver.com/en)下载免费的\
    \ WampServer 副本。撰写本文时可用的最新 WampServer 版本是 2.5。下载 WampServer 后，双击其 `.exe` 文件并选择\
    \ `Run`。\n\n> **注意**  \n> WampServer 是一个开源、易于使用的服务器。它包含一个出色的图形化工具 `phpMyAdmin`，使得管理\
    \ MySQL 变得非常容易。WampServer 的工具非常易于使用，您不需要任何先验知识。在本章后面，您将学习如何使用 WampServer 及其工具。\n\
    \n第一个界面是欢迎界面，指示将要安装的 WampServer 版本，如图 1-16 所示。单击 `Next` 按钮。\n\n![A978-1-4842-1672-9_1_Fig16_HTML.jpg](img/A978-1-4842-1672-9_1_Fig16_HTML.jpg)\n\
    \n图 1-16.\n\nWampServer 安装向导的欢迎界面\n\n下一个窗口显示使用 WampServer 的许可协议和条款与条件（见图 1-17）。接受许可协议并单击\
    \ `Next`。\n\n![A978-1-4842-1672-9_1_Fig17_HTML.jpg](img/A978-1-4842-1672-9_1_Fig17_HTML.jpg)\n\
    \n图 1-17.\n\n显示许可协议的界面\n\n选择安装 WampServer 的文件夹（见图 1-18）。最好保留默认的文件夹位置。单击 `Next`\
    \ 按钮。\n\n![A978-1-4842-1672-9_1_Fig18_HTML.jpg](img/A978-1-4842-1672-9_1_Fig18_HTML.jpg)\n\
    \n图 1-18.\n\n提示选择安装文件夹的界面\n\n将显示复选框（见图 1-19），询问您是否要将 WampServer 图标添加到桌面和快速启动栏。勾选复选框。单击\
    \ `Next` 继续。\n\n![A978-1-4842-1672-9_1_Fig19_HTML.jpg](img/A978-1-4842-1672-9_1_Fig19_HTML.jpg)\n\
    \n图 1-19.\n\n提示是否显示快速启动和桌面图标的界面\n\n下一个窗口显示您到目前为止所选择的项目以供复查。您可以单击 `Back` 按钮进行任何更改。让我们单击\
    \ `Install` 按钮以启动安装过程（见图 1-20）。\n\n![A978-1-4842-1672-9_1_Fig20_HTML.jpg](img/A978-1-4842-1672-9_1_Fig20_HTML.jpg)\n\
