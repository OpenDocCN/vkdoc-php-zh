    # Chapter 3: User Authentication, Authorization, and Management


    In Chapter 2 we looked at the Model-View-Controller design pattern, which allowed
    us to easily separate our application logic from the display logic, and we implemented
    it using `Zend_Controller_Front`. We will now extend our application controller
    to deal with user authentication, user authorization, and user management.


    At this stage, you may be wondering what the difference between *authentication*
    and *authorization* is.


    - **Authentication:** Determines whether a user is in fact who they claim to be.
    This is typically performed using a unique username (their *identity*) and a password
    (their *credentials*).

    - **Authorization:** Determines whether a user is allowed to access a particular
    *resource*, given that we now know who they are from the authentication process.
    Authorization also determines what an unauthenticated user is allowed to do. In
    our application, a resource is essentially a particular action or page, such as
    the action of submitting a new blog post.


    In this chapter, we will set up user authentication in our application using the
    `Zend_Auth` component of the Zend Framework. This includes setting up database
    tables to store user details. We will then use the `Zend_Acl` component to manage
    which resources in the application each user has access to. Additionally, we must
    tie in our permissions system to work with `Zend_Controller_Front`.


    ## Creating the User Database Table


    Since our application will hold user accounts for multiple users, we need to track
    each of these user accounts. To do so, we will create a database table called
    `users`. This table will contain one record for each user, and it will hold their
    username and password, as well as other important details.


    There will be three classes of users that access our web application: *guests*,
    *members*, and *administrators*. A user visiting the application will be automatically
    classed as a guest until they log in as a member. In order to distinguish members
    from administrators, the `users` table will include a column that denotes the
    *role* of each user. We will use this column when implementing the access control
    lists with `Zend_Acl`.'
