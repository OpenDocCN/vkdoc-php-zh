    \n我们的配置类将是我们创建的第一个工厂类。我们希望将来能够扩展它，以支持多种不同的配置可能性，但（牢记我们的目标）我们将只创建一个驱动。首先，让我们看看工厂类，如清单\
    \ 4-5 所示。\n\n***清单 4-5.*** 配置工厂类\n\n```\nnamespace Framework\n{\n    use Framework\\\
    Base as Base;\n    use Framework\\Configuration as Configuration;\n    use Framework\\\
    Configuration\\Exception as Exception;\n\n    class Configuration extends Base\n\
    \    {\n        /**\n         * @readwrite\n         */\n        protected $_type;\n\
    \n        /**\n         * @readwrite\n         */\n        protected $_options;\n\
    \n        protected function _getExceptionForImplementation($method)\n       \
    \ {\n            return new Exception\\Implementation(\"{$method} method not implemented\"\
    );\n        }\n\n        public function initialize()\n        {\n           \
    \ if (!$this->type)\n            {\n                throw new Exception\\Argument(\"\
    Invalid type\");\n            }\n\n            switch ($this->type)\n        \
    \    {\n                case \"ini\":\n                {\n                   \
    \ return new Configuration\\Driver\\Ini($this->options);\n                   \
    \ break;\n                }\n                default:\n                {\n   \
    \                 throw new Exception\\Argument(\"Invalid type\");\n         \
    \           break;\n                }\n            }\n        }\n    }\n}\n```\n\
    \n配置文件工厂类也是我们第一次使用通过`Base`类创建的 getter/setter。`$_type`和`$_options`都可以被读取和写入。如果你回顾一下`Base`类的`__construct()`方法，你会发现它接受第一个参数中给出的键/值，并设置它能找到的任何受保护的属性。如果你的初始化数组有一个`options`键，那么受保护的`$_options`属性将包含该值。\n\
