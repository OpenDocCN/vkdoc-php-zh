    INSERT INTO orders (created_on) VALUES (NOW());


    -- Obtain the new Order ID

    SELECT INTO outOrderId

    currval(''orders_order_id_seq'');

    ```


    这是提取新生成的ID的基本机制。在`INSERT`语句之后，您将`currval`返回的值保存到一个变量中。您必须在插入新行后立即执行此操作，因为在下一次成功插入操作后，`currval`返回的值会递增。`currval`返回序列的当前值，该值等于最后插入的`order_id`。


