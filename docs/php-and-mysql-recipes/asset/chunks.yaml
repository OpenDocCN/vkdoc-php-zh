  trans: "\n# 内存使用量\n\n```\n13 个元素的内存使用量 = 353088\n14 个元素的内存使用量 = 353088\n15 个元素的内存使用量\
    \ = 353088\n16 个元素的内存使用量 = 353728\n```\n\n## 第 10 章：变量\n\n第一个循环将相同的字符串添加到数组 100\
    \ 次，每次都会打印出内存使用量。第二个循环运行的次数与数组中的元素数量相同，每次都会打印当前内存使用量，并移除数组的最后一个元素。\n\n### 方案 10-4：利用变量作用域\n\
    \n#### 问题\n\n同一个变量可以在代码的不同位置使用，并持有不同的值。因此，相同的名称可用于指示不同的变量。临时变量或循环中使用的变量（`$i`、`$j`、`$k`）通常就是这种情况。\n\
    \n#### 解决方案\n\n变量在其定义的作用域内有效。PHP 中最基本的作用域是全局作用域。除了全局作用域，PHP 还有类作用域和函数/方法作用域。在全局作用域中定义的变量仅在全局作用域中有效和可用。如果不同作用域中的变量使用了相同的变量名，它们将被视为两个不同的变量，除非使用特殊措施来引用同一个变量。\n\
    \n始终建议使用唯一的变量名以避免混淆。\n\n#### 工作原理\n\n在以下示例中，变量 `$a` 在全局作用域中被定义并赋值为 5。`$a` 也在 `MyTest()`\
    \ 函数中被定义为一个变量，并在此处被赋值为 7。在运行时，函数被调用，局部版本的 `$a` 被赋值，但函数在其执行任何其他操作前结束，局部版本的 `$a`\
    \ 被丢弃。全局变量 `$a` 不受该函数影响。\n\n```php\n<?php\n// 10_6.php\n$a = 5;\n\nfunction MyTest()\
    \ {\n    $a = 7;\n}\n\nMyTest();\necho $a;\n```\n\n可以从函数或类方法内部访问全局作用域中的变量。通过在首次使用变量之前在其前面加上关键字\
    \ `global`，将使局部变量成为全局变量的引用，并且对局部变量的任何更新也会影响全局变量。如果该变量在全局作用域中未定义，它将在全局作用域中被定义，并且赋给它的任何值都将在函数结束后保留。\n\
    \n在以下示例中，内部变量 `$a` 被赋值为 7。稍后在同一个函数中，`$a` 被更改为全局版本 `$a` 的引用，然后被赋予一个新值。因此，在执行此脚本后，全局版本\
    \ `$a` 的值变为 6。当变量从局部变量变为全局变量的引用时，局部值将丢失。\n\n```php\n<?php\n// 10_7.php\n$a = 5;\n\
    \nfunction MyTest() {\n    $a = 7;\n    global $a;\n    $a = 6;\n}\n\nMyTest();\n\
    echo $a;\n```\n\n### 方案 10-5：使用超全局变量避免全局变量问题\n\n#### 问题\n\n使用 `global` 关键字访问全局变量时，如果你忘记使用它，可能会引发问题。在这种情况下，该变量会变成局部变量，代码的行为将不同于预期。\n\
    \n#### 解决方案\n\n使用 `global` 关键字的一种替代方法是使用所谓的超全局变量来引用全局作用域中的变量。超全局变量是预定义的变量，可以在全局作用域以及任何函数或方法作用域中访问，而无需使用\
    \ `global` 关键字。这些变量填充了 get（`$_GET`）、post（`$_POST`）、cookie（`$_COOKIE`）、环境（`$_ENV`）、服务器（`$_SERVER`），以及一个用于全局变量的特殊版本（`$GLOBALS`）。\n\
    \n超全局变量的可用性由 `php.ini` 中一个名为 `variables_order` 的配置选项控制。此配置是一个由字母 `E`、`G`、`P`、`C`\
    \ 和 `S` 组成的字符串，分别代表环境（Environment）、GET、POST、Cookie 和服务器（Server）。如果配置设置为空字符串，则这些超全局变量都不会被填充。\n\
    \n#### 工作原理\n\n所有超全局变量都是关联数组（键值对），变量名都以 `$_` 开头，但 `$GLOBALS` 除外。这是历史原因造成的，因为它在其他任何超全局变量被引入该语言之前就这样命名了。下一个示例展示了如何使用\
    \ `$GLOBALS` 变量来更改全局变量的值。\n\n```php\n<?php\n// 10_8.php\n$a = 5;\n\nfunction MyTest()\
    \ {\n    $GLOBALS['a'] += 7;\n}\n\nMyTest();\necho $a;\n```\n\n当脚本同时使用 GET（查询字符串）和\
    \ POST（请求体）请求时，可以访问一个名为 `$_REQUEST` 的单一超全局变量中的内容。这可以简化代码，只需检查一个变量中是否存在特定值，而无需同时检查\
    \ `$_GET` 和 `$_POST`。该数组的元素按照配置选项 `request_order` 指定的顺序填充，如果未定义该配置，则系统将使用与配置 `variables_order`\
    \ 相同的顺序。\n\n如果 `request_order` 设置为 “GP”，系统将首先获取所有对应 `$_GET` 数组的变量，然后应用 `$_POST`\
    \ 中的所有值。如果两个数组中的索引相同，`$_REQUEST` 变量将仅包含来自 `$_POST` 的值。将配置改为 “PG” 将改变顺序，如果设置为 “P”\
    \ 或 “G”，则 `$_REQUEST` 变量将仅包含 GET 或 POST 的值。\n\n### 方案 10-6：确定变量类型\n\n#### 问题\n\
    \nPHP 中的变量可以根据赋值和计算结果等改变类型。我们如何知道给定变量的实际类型？\n\n> **注意：** 方案 10-1 涵盖了如何更改 PHP 变量的类型。\n\
    \n#### 解决方案\n\nPHP 中的基本变量类型包括整型、浮点型、字符串、数组、对象和资源，每种类型都有对应的函数来检查数据类型，并根据变量的实际类型返回\
    \ `true` 或 `false`：`is_integer()`、`is_float()`、`is_string()`、`is_array()`、`is_object()`\
    \ 和 `is_resource()`。\n\n除此之外，还有其他一些 `is_*` 函数可用于检查变量的内容：`is_numeric()`、`is_nan()`（非数字）、`is_finite()`、`is_infinite()`、`is_null()`、`empty()`\
    \ 和 `isset()`。`empty()` 和 `isset()` 这两个名称之所以保持这样，是出于历史原因，以保持与旧版本 PHP 的兼容性。\n\n\
    #### 工作原理\n\n当整型变量被赋予大于 `PHP_INT_MAX` 常量的值时，该变量会自动变为浮点型。`PHP_INT_MAX` 的实际值取决于\
    \ PHP 的平台和版本。对于 32 位版本，该值为 2 的 31 次方；对于 64 位版本，该值为 2 的 63 次方。最后一位用于符号，因为 PHP 中的所有整型值都是有符号的。\n\
    \n除了检查特定类型的变量外，还可以使用 `gettype()` 函数来获取类型的字符串表示。`gettype()` 可能的返回值是 “Boolean”、“integer”、“double”、“string”、“array”、“object”、“resource”、“NULL”\
    \ 和 “unknown type” 这些字符串之一。这在下一个示例中得到了演示，其中变量被赋值为 `PHP_INT_MAX`，然后递增。\n\n```php\n\
    <?php\n// 10_9.php\n$i = PHP_INT_MAX;\necho $i . \"\\n\";\necho gettype($i) .\
    \ \"\\n\";\n$i++;\necho $i . \"\\n\";\necho gettype($i) . \"\\n\";\n```\n\n第一次调用\
    \ `gettype()` 将返回 ‘integer’，第二次将返回 ‘double’。出于历史原因，此处使用字符串 double 而不是 float。\n\
    \n在 64 位系统上，输出将如下所示：\n\n```\ninteger\n9.2233720368548E+18\ndouble\n```\n"
- fmt: "# 变量与资源\n\n无法在不调用返回资源的函数的情况下创建 `resource` 类型的变量。这可以是内置函数，也可以是来自众多扩展的函数。`resource`\
    \ 类型用于文件句柄、数据库连接和结果集等场景。这些资源通常由打开文件或连接数据库的函数返回，并在针对该特定资源执行操作（如向数据库发送查询或向文件写入内容）时传递给其他函数。\n\
    \n函数 `is_finite()` 和 `is_infinite()` 在 32 位和 64 位平台上可能产生不同的结果，因为它们使用 `float` 类型的极限来判断数字是否能够容纳。\n\
    \n---\n\n## 方法 10-7：通过引用减少内存使用\n\n### 问题\n\n在某些情况下，让多个变量指向内存中的同一个值是很有用的。这将减少对额外内存的需求。\n\
