  \n `caption` varchar(120) NOT NULL,\n\nPRIMARY KEY (`image_id`)\n\n) ENGINE=InnoDB\
  \  DEFAULT CHARSET=latin1 AUTO_INCREMENT=9 ;\n```\n\n像这样从 SQL 文件导入数据，就是将数据从本地测试环境传输到网站所在的远程服务器的方式。假设您的托管公司提供\
  \ phpMyAdmin 来管理远程数据库，那么传输数据所需做的就是启动远程服务器上的 phpMyAdmin 版本，点击 `Import` 选项卡，选择本地计算机上的\
  \ SQL 文件，然后点击 `Go`。\n\n下一节将介绍如何创建 SQL 文件。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将以下英文文本翻译成中文。\n\
  \n\n### 创建用于备份和数据传输的 SQL 文件\n\nMySQL 并不会将你的数据库存储在单个文件中，让你可以简单地将其上传到你的网站。即使你找到了正确的文件，除非\
  \ MySQL 服务器已关闭，否则你很可能会损坏它们。无论如何，大多数主机公司不会允许你上传原始文件，因为这还需要关闭他们的服务器，给所有人带来极大的不便。\n\
  \n尽管如此，将一个数据库从一个服务器移动到另一个服务器是很容易的。这只需要创建一个数据的备份转储，然后使用 `phpMyAdmin` 或任何其他数据库管理程序将其加载到另一个数据库中。这个转储文件是一个文本文件，包含了填充单个表，乃至整个数据库所需的所有\
  \ SQL 命令。`phpMyAdmin` 可以为你的整个 MySQL 服务器、单个数据库、选定的表或单个表创建备份。\n\n**提示**  \n在你准备将数据传输到另一台服务器或创建备份之前，不需要阅读关于如何创建转储文件的细节。\n\
  \n为简单起见，这些说明只展示了如何备份单个数据库。\n\n在 `phpMyAdmin` 中，从左侧的列表中选择 `phpsols` 数据库。如果该数据库已经被选中，请点击屏幕顶部的\
  \ `Database: phpsols` 面包屑导航，如下所示：\n\n![A978-1-4842-0635-5_10_Fign_HTML.jpg](img/A978-1-4842-0635-5_10_Fign_HTML.jpg)\n\
  \n从屏幕顶部的选项卡中选择 `导出`。有两种导出方法：快速（Quick）和自定义（Custom）。快速方法对于导出文件的格式只有一个选项。默认是 SQL，所以你只需点击\
  \ `执行`，`phpMyAdmin` 就会创建 SQL 转储文件并将其保存到浏览器的默认 `下载` 文件夹。该文件与数据库同名，因此对于 `phpsols`\
  \ 数据库，它被称为 `phpsols.sql`。\n\n快速方法适用于导出少量数据，但你通常需要对导出选项进行更多控制；请选择 `自定义` 单选按钮。有很多选项，让我们逐节查看它们。\n\
  \n`表` 部分列出了你数据库中的所有表。默认情况下，所有表都被选中，但你可以通过点击 `取消全选`，然后在 Windows 上按住 Control 键或在 Mac\
  \ 上按住 Command 键并选择你想要导出的表，来选择导出哪些表。在下面的截图中，只选择了 `images` 表，因此 `images_backup` 不会被导出。\n\
  \n![A978-1-4842-0635-5_10_Figo_HTML.jpg](img/A978-1-4842-0635-5_10_Figo_HTML.jpg)\n\
  \n**提示**  \n通常，备份单个表而不是整个数据库是个好主意，因为大多数 PHP 服务器被配置为将上传限制在 2 MB。如下一步所述，压缩转储文件也有助于规避大小限制。\n\
  \n`输出` 部分有单选按钮，让你可以选择将 SQL 转储保存到文件（这是默认设置）或将输出视为文本。如果你想在创建文件之前检查生成的 SQL，将输出视为文本会很有用。\n\
  \n![A978-1-4842-0635-5_10_Figp_HTML.jpg](img/A978-1-4842-0635-5_10_Figp_HTML.jpg)\n\
  \n*   `文件名模板` 包含一个位于 `@` 标记之间的值。这会根据你导出的内容（是服务器、数据库还是表）自动生成文件名。这个模板的一个非常酷的特性是，你可以使用\
  \ PHP 的 `strftime()` 格式化字符来增强它（参见 [`http://php.net/manual/en/function.strftime.php`](http://php.net/manual/en/function.strftime.php)）。例如，你可以在文件扩展名之前自动添加当前日期到文件名，如下所示：\n\
  \n    `@DATABASE@` `_%Y-%m-%d`\n\n*   `格式` 部分默认为 SQL，但提供了一系列其他格式，包括 CSV、JSON 和 XML。在\
  \ `格式特定选项` 中，你可以选择最大化与不同数据库系统或旧版本 MySQL 的输出兼容性。通常，该值应设置为默认值：`NONE`。\n*   `文件的字符集`\
  \ 的默认值是 `utf-8`。仅当你的数据以特定的区域格式存储时，你才需要更改此选项。\n*   `压缩` 是一个非常有用的选项。默认情况下，转储文件不被压缩，但下拉菜单提供了使用\
  \ zip、gzip 或 bzip 压缩的选项。这可以大大减小转储文件的大小，从而加快向另一台服务器传输数据的速度。在导入压缩文件时，`phpMyAdmin`\
  \ 会自动检测压缩类型并解压缩它。\n\n![A978-1-4842-0635-5_10_Figq_HTML.jpg](img/A978-1-4842-0635-5_10_Figq_HTML.jpg)\n\
  \n`对象创建选项` 部分允许你微调用于创建数据库和表的 SQL。下面的截图显示了默认设置。\n\n*   单选按钮为你提供了仅导出结构、仅导出数据或同时导出结构和数据的选项。默认是同时导出两者。\n\
  *   如果你选择了 `结构` 或 `数据` 单选按钮，页面上的其余一些选项将被移除。\n\n![A978-1-4842-0635-5_10_Figr_HTML.jpg](img/A978-1-4842-0635-5_10_Figr_HTML.jpg)\n\
  \n`数据创建选项` 部分控制数据如何插入到表中。在大多数情况下，默认设置就可以了。但是，你可能对更改前四个选项感兴趣，如下面的截图所示。\n\n*   在创建备份时，通常最好选中\
  \ `添加 DROP TABLE / VIEW / PROCEDURE / FUNCTION / EVENT 语句` 复选框，因为备份通常用于替换已损坏的现有数据。\n\
  *   最后一个复选框（默认选中）将表和列名包裹在反引号（`` ` ``）中，以避免与包含无效字符或使用保留字的名称产生问题。我建议始终勾选此选项。\n\n![A978-1-4842-0635-5_10_Figs_HTML.jpg](img/A978-1-4842-0635-5_10_Figs_HTML.jpg)\n\
  \n当你做出所有选择后，点击页面底部的 `执行`。现在你有了一个备份，可以用来将数据库的内容传输到另一台服务器。\n\n*   第一个复选框允许你在插入数据之前清空表。如果你想替换现有数据（例如，在数据损坏时），这会很有用。\n\
  *   另外两个复选框影响 `INSERT` 命令的执行方式。`INSERT DELAYED` 不适用于默认的 InnoDB 表。而且，它在 MySQL 5.6.6\
  \ 中已被弃用，因此最好避免使用它。\n*   `INSERT IGNORE` 会跳过错误，例如重复的主键。就我个人而言，我认为最好能收到错误警报，所以我不推荐使用它。\n\
  *   标记为 `转储数据时使用的函数` 的下拉菜单允许你选择 `INSERT`、`UPDATE` 或 `REPLACE`。默认是使用 `INSERT` 插入新记录。如果你选择\
  \ `UPDATE`，则仅更新现有记录。`REPLACE` 在必要时进行更新，如果新记录不存在则插入它们。\n\n**提示**  \n默认情况下，`phpMyAdmin`\
  \ 创建的文件只包含用于创建和填充数据库表的 SQL 命令。除非你选择自定义选项来执行此操作，否则它不包含创建数据库的命令。这意味着你可以将表导入到任何数据库中。它的名称不需要与本地测试环境中的名称相同。\n\
  \n### 在 MySQL 中选择正确的数据类型\n\n当你为 `image_id` 列选择 `类型` 时，你可能会感到有点震惊。`phpMyAdmin` 列出了所有可用的数据类型——在\
  \ MySQL 5.6 中将近有 40 种。为了避免用不必要的细节使你困惑，我将只解释那些最常用的。\n\n你可以在 MySQL 文档中找到所有数据类型的完整详细信息，网址是\
  \ [`http://dev.mysql.com/doc/refman/5.6/en/data-types.html`](http://dev.mysql.com/doc/refman/5.6/en/data-types.html)。\n\
  \n\n\n### 存储文本\n\n主要文本数据类型之间的区别，归结于单个字段可存储的最大字符数、对尾随空格的处理方式，以及是否可设置默认值。\n\n-   `CHAR`：固定长度字符串。您必须在“长度/值”字段中指定所需长度。最大允许值为\
  \ 255。在内部，字符串会用空格右填充至指定长度，但在检索值时，尾随空格会被剥离。您可以定义默认值。\n-   `VARCHAR`：可变长度字符串。您必须指定计划使用的最大字符数（在\
  \ phpMyAdmin 中，在“长度/值”字段中输入该数字）。在 MySQL 5.0 之前，限制为 255。在 MySQL 5.0 中，该限制增加到了 65,535。如果存储的字符串包含尾随空格，则在检索时会保留这些空格。接受默认值。\n\
  -   `TEXT`：存储最多 65,535 个字符（大约比本章节长 50%）的文本。无法定义默认值。\n\n`TEXT` 很方便，因为您不需要指定最大大小（实际上，您也无法指定）。尽管在\
  \ MySQL 5.0 及更高版本中 `VARCHAR` 的最大长度与 `TEXT` 相同，但其他因素可能会限制实际可存储的数量。\n\n**提示：** 保持简单：对于较短的文本项使用\
  \ `VARCHAR`，对于较长的文本项使用 `TEXT`。\n\n### 存储数字\n\n最常用的数字列类型如下：\n\n-   `INT`：介于 –2,147,483,648\
  \ 和 2,147,483,647 之间的任何整数。如果列被声明为 `UNSIGNED`，则范围为 0 到 4,294,967,295。\n-   `FLOAT`：浮点数。您可以选择指定两个用逗号分隔的数字来限制范围。第一个数字指定最大位数，第二个数字指定小数点后应有多少位。由于\
  \ PHP 会在计算后格式化数字，我建议您使用不带可选参数的 `FLOAT`。\n-   `DECIMAL`：带小数的数字；在小数点后包含固定位数。在定义表时，您需要指定最大位数以及小数点后应有多少位。在\
  \ phpMyAdmin 中，在“长度/值”字段中输入用逗号分隔的数字。例如，`6,2` 允许范围从 –9999.99 到 9999.99 的数字。如果您不指定大小，当值存储在此类型的列中时，小数部分将被截断。\n\
  \n`FLOAT` 和 `DECIMAL` 的区别在于精度。浮点数被视为近似值，并且容易受到舍入误差的影响（详细解释，请参阅 [`http://dev.mysql.com/doc/refman/5.6/en/problems-with-float.html`](http://dev.mysql.com/doc/refman/5.6/en/problems-with-float.html)）。\n\
  \n使用 `DECIMAL` 存储货币。然而，需要注意的是，在 MySQL 5.0.3 之前，`DECIMAL` 数据类型是作为字符串存储的，因此无法与 SQL\
  \ 函数（如 `SUM()`）一起用于在数据库内部执行计算。如果您使用的远程服务器运行的是较旧版本的 MySQL，请将货币以“分”为单位存储在 `INT` 列中；如果是英镑，则使用“便士”。然后使用\
  \ PHP 将结果除以 100 并按需格式化货币。更好的是，迁移到运行 MySQL 5.0 或更高版本的服务器上。\n\n**注意：** 不要使用逗号或空格作为千位分隔符。除数字外，数字中只允许使用负号（`-`）和小数点（`.`）。\n\
  \n### 存储日期和时间\n\nMySQL 仅以一种格式存储日期：`YYYY-MM-DD`。这是国际标准化组织（ISO）批准的标准，并避免了不同国家惯例固有的歧义。我将在第\
  \ 14 章中回到日期这个话题。最重要的日期和时间列类型如下：\n\n-   `DATE`：以 `YYYY-MM-DD` 格式存储的日期。范围是从 1000-01-01\
  \ 到 9999-12-31。\n-   `DATETIME`：以 `YYYY-MM-DD HH:MM:SS` 格式显示的日期和时间组合。\n-   `TIMESTAMP`：时间戳（通常由计算机自动生成）。有效值范围从\
  \ 1970 年初到 2038 年 1 月中旬的某段时间。\n\n**注意：** MySQL 的时间戳基于人类可读的日期，并且自 MySQL 4.1 起，使用与\
  \ `DATETIME` 相同的格式。因此，它们与基于自 1970 年 1 月 1 日以来经过的秒数的 Unix 和 PHP 时间戳不兼容。请不要混淆它们。\n\
  \n### 存储预定义列表\n\nMySQL 允许您存储两种类型的预定义列表，它们可以被视为数据库中单选按钮和复选框状态的等效物：\n\n-   `ENUM`：此列类型存储来自预定义列表的单个选择，例如“是、否、不知道”或“男、女”。预定义列表中可以存储的项目最大数量是令人难以置信的\
  \ 65,535——好一个单选按钮组！\n-   `SET`：此列类型存储来自预定义列表的零个或多个选择。该列表最多可容纳 64 个选择。\n\n虽然 `ENUM`\
  \ 非常有用，但 `SET` 往往不那么有用，主要是因为它违反了在每个字段中仅存储一条信息的原则。它可以发挥作用的情况包括：记录汽车的选装配件或调查中的多项选择。\n\
  \n### 存储二进制数据\n\n存储诸如图像之类的二进制数据并不是一个好主意。它会使您的数据库变得臃肿，并且您无法直接从数据库显示图像。但是，以下的列类型是为二进制数据设计的：\n\
  \n-   `TINYBLOB`：最多 255 字节\n-   `BLOB`：最多 64 KB\n-   `MEDIUMBLOB`：最多 16 MB\n-  \
  \ `LONGBLOB`：最多 4 GB\n\n拥有如此异想天开的名字，发现 `BLOB` 代表“二进制大对象”（binary large object）时，难免会有些失望。\n\
  \n## 章节回顾\n\n本章的大部分内容都致力于理论，解释了良好数据库设计的基本原则。您需要仔细规划数据库的结构，将重复信息移到单独的表中，而不是像电子表格那样，将所有要存储的信息放在一个单一的大表中。只要您为表中的每条记录提供一个唯一标识符——即它的主键——您就可以跟踪信息，并通过使用外键将其与其他表中的相关记录关联起来。使用外键的概念一开始可能难以理解，但在本书结束时应该会变得更加清晰。\n\
  \n您还学习了如何创建具有有限权限的 MySQL 用户账户，以及如何定义表以及如何使用 SQL 文件导入和导出数据。在下一章中，您将使用 PHP 连接到 `phpsols`\
  \ 数据库，以显示 `images` 表中存储的数据。\n\n\n\n"
- "# 11. 使用 PHP 和 SQL 连接数据库\n\nPHP 提供了三种不同的方式来连接和与 MySQL 数据库交互：原始的 MySQL 扩展、MySQL\
  \ Improved（`MySQLi`）或 PHP Data Objects（`PDO`）。选择哪一种是一个重要的决定，因为它们使用不兼容的代码。你不能在同一个脚本中混用它们。原始的\
  \ MySQL 扩展在 PHP 5.5 中已被弃用，并将在未来某个未指定的日期被移除。本书不涉及它。\n\n如果你计划只使用 MySQL（或其替代品 `MariaDB`），我推荐你使用\
  \ `MySQLi`。它专门为与 MySQL 协作而设计，并且与 `MariaDB` 完全兼容。\n\n另一方面，如果数据库的灵活性对你很重要，请选择 `PDO`。`PDO`\
  \ 的优势在于它是软件中立的。至少在理论上，你可以通过只修改几行 PHP 代码，将你的网站从 MySQL 切换到 Microsoft SQL Server 或其他数据库系统。在实践中，你通常需要重写至少部分\
  \ SQL 查询，因为每个数据库供应商都在标准 SQL 之上添加了自定义函数。\n\n本书的其余章节将同时涵盖 `MySQLi` 和 `PDO`。如果你只想专注于其中一种，只需忽略与另一种相关的部分即可。\n\
  \n尽管 PHP 连接到数据库并存储任何结果，但数据库查询需要用 SQL 编写。本章教你在表中检索存储信息的基础知识。\n\n在本章中，我们将涵盖以下内容：\n\
  \n*   使用 `MySQLi` 和 `PDO` 连接到 MySQL 和 MariaDB\n*   计算表中的记录数\n*   使用 `SELECT` 查询检索数据并在网页中显示\n\
  *   使用预处理语句和其他技术保持数据安全\n\n## 检查你的远程服务器设置\n\nXAMPP 和 MAMP 同时支持 `MySQLi` 和 `PDO`，但你需要检查远程服务器的\
  \ PHP 配置以验证其提供的支持程度。在你的远程服务器上运行 `phpinfo()`，滚动配置页面，并查找以下部分。它们是按字母顺序列出的，因此你需要向下滚动很长一段距离才能找到它们。\n\
  \n![A978-1-4842-0635-5_11_Figa_HTML.jpg](img/A978-1-4842-0635-5_11_Figa_HTML.jpg)\n\
  \n所有托管公司都应该拥有前两个部分（`mysql` 和 `mysqli`）。如果只列出了第一个，那么你的服务器已经危险地过时了。你的主机至少应该列出 `mysqli`。如果你计划使用\
  \ `PDO`，你不仅需要检查 `PDO` 是否已启用，还必须确保列出了 `pdo_mysql`。`PDO` 需要为每种类型的数据库提供不同的驱动程序。\n\n\
  **厘清困惑**\n\nPHP 弃用原始 MySQL 扩展的决定，加上对 Oracle 关于 MySQL 计划的不确定性，导致一些人宣称 MySQL 已经死亡。事实并非如此。如前一章所述，MySQL\
  \ 在 2014 年底排名第二的数据库。排名第一的数据库是 Oracle。一个拥有前两大数据库的公司不太可能扼杀这样一个成功的产品。即使它这样做了，`MariaDB`\
  \ 也是 MySQL 的无缝替代品。\n\n运行 MariaDB 的大部分代码是相同的，因为 MySQL 是一个开源项目。许多在 MariaDB 上工作的工程师来自最初的\
  \ MySQL 团队，因此他们非常有资格维护和开发它。MariaDB 在保持 MySQL 所有核心功能的同时，已经开始添加新功能。除非你需要 MariaDB 的新功能，否则\
  \ MySQL 和 MariaDB 是可互换的。\n\nPHP 放弃原始 MySQL 扩展的决定完全无关。MySQL Improved（`MySQLi`）于 2004\
  \ 年在 PHP 5.0 中引入，作为原始 MySQL 扩展的替代品，但 PHP 5 的缓慢采用使得无法淘汰旧函数。\n\n尽管本书不使用原始的 MySQL 扩展，但你需要意识到它的存在，并知道如何识别使用它的脚本。原始\
  \ MySQL 扩展中的所有函数都以`mysql_`开头。避免使用它们的所有脚本、文章和书籍。它们现在已经完全过时了。\n\n`MySQLi` 可以用两种方式编写：使用普通函数（过程式代码）或使用对象。在本书中，我使用\
  \ `MySQLi` 对象，因为它们涉及更少的输入。然而，如果你遇到使用 `MySQLi` 函数的其他来源，你可以识别它们，因为它们以`mysqli_`开头。但是，请注意：它们中的大多数都有对应的`mysql_`版本。例如，`mysql_connect()`和`mysqli_connect()`，`mysql_query()`和`mysqli_query()`，等等。乍一看，它们很容易混淆。名称上唯一的区别是在下划线前多了字母“i”。尽管它们相似，但从旧函数转换到新函数并不仅仅是插入那个“i”的问题。函数接受的参数通常略有不同。\n\
  \n最后，如果你担心 MySQL 的未来，简单的答案是学习如何使用 `PDO`。有超过 10 个主要数据库的 `PDO` 驱动程序。你可能需要对 SQL 进行一些更改以使其适用于不同的数据库，但本书中教授的所有\
  \ PHP 代码都将完全相同。\n\n## PHP 如何与数据库通信\n\n无论你使用 `MySQLi` 还是 `PDO`，过程总是遵循以下顺序：\n\n1.\
  \  使用主机名、用户名、密码和数据库名称连接到数据库。\n2.  准备一个 SQL 查询。\n3.  执行查询并保存结果。\n4.  从结果中提取数据（通常使用循环）。\n\
  \n用户名和密码是你刚刚创建的账户或托管公司提供给你的账户的用户名和密码。但是主机名呢？在本地测试环境中，它是`localhost`。令人惊讶的是，即使在远程服务器上，它通常也是`localhost`。这是因为在许多情况下，数据库服务器位于与你网站相同的服务器上。换句话说，显示页面的\
  \ Web 服务器和数据库服务器是彼此本地的。然而，如果数据库服务器位于单独的机器上，你的托管公司会告诉你使用的地址。需要理解的重要一点是，主机名与你的网站域名不同。\n\
  \n让我们快速看一下如何通过每种方法连接到数据库。\n\n### 使用 MySQL Improved 扩展连接\n\n`MySQLi` 有两个接口：过程式和面向对象式。过程式接口旨在简化从原始\
  \ MySQL 函数的过渡。由于面向对象版本更紧凑，这里采用该版本。\n\n要连接到 MySQL 或 MariaDB，你通过向构造函数方法传递四个参数来创建一个`mysqli`对象：主机名、用户名、密码和数据库名称。以下是你如何连接到`phpsols`数据库的方法：\n\
  \n```\n$conn = new mysqli($hostname, $username, $password, 'phpsols');\n```\n\n\
  这将连接对象存储为`$conn`。\n\n如果你的数据库服务器使用非标准端口，你需要将端口号作为第五个参数传递给`mysqli`构造函数。\n\n提示\n\n\
  MAMP 使用套接字连接到 MySQL，因此即使 MySQL 在端口 8889 上监听，也无需添加端口号。这同时适用于 `MySQLi` 和 `PDO`。\n\n\
  \n\n### 连接 PDO\n\n`PDO` 的使用方式略有不同。最重要的区别在于，如果连接失败，`PDO` 会抛出异常。如果不捕获这个异常，调试信息会显示所有连接细节，包括你的用户名和密码。因此，你需要将代码包裹在`try`块中并捕获异常，以防止敏感信息被泄露。\n\
  \n`PDO` 构造方法的第一个参数是数据源名称（DSN）。它是一个字符串，由 PDO 驱动名称、冒号以及 PDO 驱动特定的连接细节组成。\n\n要连接 MySQL\
  \ 或 MariaDB，DSN 需要采用以下格式：\n\n`'mysql:host=hostname;dbname=databaseName'`\n\n如果你的数据库服务器使用了非标准端口，DSN\
  \ 还应包含端口号，如下所示：\n\n`'mysql:host=hostname;port=portNumber;dbname=databaseName'`\n\
  \n在 DSN 之后，你需要将用户名和密码传递给 `PDO()` 构造方法。因此，连接到 `phpsols` 数据库的代码如下所示：\n\n```php\ntry\
  \ {\n    $conn = new PDO(\"mysql:host=$hostname;dbname=phpsols\", $username, $password);\n\
  } catch (PDOException $e) {\n    echo $e->getMessage();\n}\n```\n\n在测试期间，使用 `echo`\
  \ 显示异常生成的消息是可以接受的，但当你将脚本部署到线上网站时，需要将用户重定向到一个错误页面，如 PHP 解决方案 4-8 所述。\n\n**提示**\n\n\
  要连接到不同的数据库系统，PHP 代码中唯一需要修改的部分就是 DSN。其余所有 PDO 代码都是完全与数据库无关的。有关如何为 PostgreSQL、Microsoft\
  \ SQL Server、SQLite 以及其他数据库系统创建 DSN 的详细信息，请参阅 [`http://php.net/manual/en/pdo.drivers.php`](http://php.net/manual/en/pdo.drivers.php)。\n\
  \n### PHP 解决方案 11-1：创建可复用的数据库连接器\n\n连接数据库是一项常规工作，从现在开始，每个页面都需要执行此操作。本 PHP 解决方案创建了一个存储在外部文件中的简单函数，用于连接数据库。它主要是为了方便在后续章节中测试不同的\
  \ MySQLi 和 PDO 脚本，而无需每次重新输入连接细节或在不同的连接文件之间切换。\n\n在 `includes` 文件夹中创建一个名为 `connection.php`\
  \ 的文件，并插入以下代码（`ch11` 文件夹中有一个完整的脚本副本）：\n\n```php\n<?php\nfunction dbConnect($usertype,\
  \ $connectionType = 'mysqli') {\n    $host = 'localhost';\n    $db = 'phpsols';\n\
  \    if ($usertype == 'read') {\n        $user = 'psread';\n        $pwd = 'K1y0mi$u';\n\
  \    } elseif ($usertype == 'write') {\n        $user = 'pswrite';\n        $pwd\
  \ = '0Ch@Nom1$u';\n    } else {\n        exit('Unrecognized user');\n    }\n   \
  \ // 连接代码写在这里\n}\n```\n\n将 `连接代码写在这里` 注释替换为以下代码：\n\n*   该函数接受两个参数：用户类型和连接类型。第二个参数默认为\
  \ `mysqli`。如果你希望专注于使用 PDO，可以将第二个参数的默认值设置为 `pdo`。\n*   函数内部的前两行存储了要连接的主机服务器和数据库名称。\n\
  *   条件语句检查第一个参数的值，并在 `psread` 和 `pswrite` 用户名及密码之间进行切换。如果用户账户无法识别，`exit()` 函数会停止脚本并显示\
  \ `Unrecognized user`。\n\n```php\nif ($connectionType == 'mysqli') {\n    $conn\
  \ = @ new mysqli($host, $user, $pwd, $db);\n    if ($conn->connect_error) {\n  \
  \      exit($conn->connect_error);\n    }\n    return $conn;\n} else {\n    try\
  \ {\n        return new PDO(\"mysql:host=$host;dbname=$db\", $user, $pwd);\n   \
  \ } catch (PDOException $e) {\n        echo $e->getMessage();\n    }\n}\n```\n\n\
  *   如果第二个参数设置为 `mysqli`，则会创建一个名为 `$conn` 的 MySQLi 连接对象。错误控制运算符（`@`）可以防止构造方法显示错误消息。如果连接失败，原因会存储在对象的\
  \ `connect_error` 属性中。如果该属性为空，则被视为 `false`，因此会跳过下一行，并返回 `$conn` 对象。但如果出现问题，`exit()`\
  \ 会显示 `connect_error` 的值并终止脚本。\n*   否则，该函数返回一个 PDO 连接对象。无需对 `PDO` 构造方法使用错误控制运算符，因为如果有问题，它会抛出\
  \ `PDOException`。`catch` 块使用异常的 `getMessage()` 方法来显示问题的原因。\n\n**提示**\n\n如果你的数据库服务器使用了非标准端口，请不要忘记将端口号作为第五个参数添加到\
  \ `mysqli()` 构造方法中，并将其包含在 PDO 的 DSN 中，如前几节所述。如果数据库使用套接字连接（这在 Mac OS X 和 Linux 上很常见），则无需此操作。\n\
  \n在 `phpsols` 站点根文件夹中创建一个名为 `connection_test.php` 的文件，并插入以下代码：\n\n```php\n<?php\n\
  require_once './includes/connection.php';\nif ($conn = dbConnect('read')) {\n  \
  \  echo 'Connection successful';\n}\n```\n\n这将包含连接脚本，并使用 `psread` 用户账户和 MySQLi 进行测试。\n\
  \n保存页面并在浏览器中加载。如果你看到 `Connection successful`，则一切正常。如果收到错误消息，请参阅下一节的故障排除提示。\n\n使用\
  \ `pswrite` 用户和 MySQLi 测试连接：\n\n```php\nif ($conn = dbConnect('write')) {\n    echo\
  \ 'Connection successful';\n}\n```\n\n通过向 `dbConnect()` 添加第二个参数 `'pdo'`，使用 PDO 测试两个用户账户。\n\
  \n假设一切顺利，你就可以开始与 `phpsols` 数据库进行交互了。如果遇到问题，请查看下一节。\n\n### 数据库连接问题故障排除\n\n连接数据库失败最常见的原因是用户名或密码错误。密码和用户名区分大小写。请仔细检查拼写。例如，以下截图展示了如果将\
  \ `psread` 改为 `Psread` 会发生什么。\n\n![A978-1-4842-0635-5_11_Figb_HTML.jpg](img/A978-1-4842-0635-5_11_Figb_HTML.jpg)\n\
  \n访问被拒绝，因为没有这样的用户。用户名开头的字母大小写至关重要。但即使用户名正确，你也可能会收到类似的错误消息，如下所示：\n\n![A978-1-4842-0635-5_11_Figc_HTML.jpg](img/A978-1-4842-0635-5_11_Figc_HTML.jpg)\n\
  \n这让很多人感到困惑。错误消息确认你正在使用密码。那么为什么访问会被拒绝呢？这是因为密码错误。\n\n如果错误消息显示 `using password: NO`，表示你忘记提供密码了。`using\
  \ password` 这个短语是提示问题与登录凭据相关。\n\n当该短语缺失时，则表明是另一个问题，如下图所示。\n\n![A978-1-4842-0635-5_11_Figd_HTML.jpg](img/A978-1-4842-0635-5_11_Figd_HTML.jpg)\n\
  \n这里的问题是数据库名称不正确。如果你拼错了主机，你会收到一条消息，提示没有这样的主机。\n\n本节中的截图由 MySQLi 生成。PDO 会生成相同的消息，但还会包含错误编号和代码。\n\
  \n\n\n### 查询数据库并显示结果\n\n在尝试显示数据库查询结果之前，最好先确定结果的数量。如果没有结果，你就无从显示。此外，在为长结果集创建分页导航系统时，也需要知道结果数量（你将在下一章学习如何实现）。在用户身份验证中（详见第\
  \ 17 章），如果搜索用户名和密码时没有结果，则意味着登录应该失败。\n\n`MySQLi` 和 `PDO` 在计数和显示结果时使用了不同的方法。接下来的两个\
  \ PHP 解决方案展示了如何使用 `MySQLi` 实现。至于 `PDO`，请直接跳到 PHP 解决方案 11-4。\n\n#### PHP 解决方案 11-2：统计结果集中的记录数（MySQLi）\n\
  \n本 PHP 解决方案演示如何提交一条 SQL 查询，该查询选择 `images` 表中的所有记录，并将结果存储在 `MySQLi_Result` 对象中。该对象的\
  \ `num_rows` 属性包含查询检索到的记录数。\n\n在 `phpsols` 站点根目录下创建一个名为 `mysqli` 的新文件夹，然后在该文件夹内创建一个名为\
  \ `mysqli.php` 的新文件。该页面最终将用于显示表格，因此它应包含 `DOCTYPE` 声明和 HTML 骨架。在 `DOCTYPE` 声明上方的\
  \ PHP 代码块中包含连接文件，并使用只读权限的账户连接到 `phpsols` 数据库，如下所示：\n\n`require_once '../includes/connection.php';`\n\
  \n`$conn = dbConnect('read');`\n\n接下来，准备 SQL 查询。在上一步之后（但在关闭 PHP 标签之前）立即添加此代码：\n\n\
  `$sql = 'SELECT * FROM images';`\n\n这表示“从 `images` 表中选择所有数据”。星号（`*`）是“所有列”的简写。\n\
  \n现在，通过调用连接对象的 `query()` 方法并将 SQL 查询作为参数传递来执行查询，如下所示：\n\n`$result = $conn->query($sql);`\n\
  \n结果存储在一个变量中，我将其命名为 `$result`。\n\n如果出现问题，`$result` 将为 `false`。要找出问题所在，我们需要获取错误消息，该消息存储在\
  \ `mysqli` 连接对象的 `error` 属性中。在前一行之后添加以下条件语句：\n\n```php\nif (!$result) {\n    $error\
  \ = $conn->error;\n}\n```\n\n假设没有问题，`$result` 现在持有一个 `MySQLi_Result` 对象，它有一个名为 `num_rows`\
  \ 的属性。要获取查询找到的记录数，请在条件语句中添加一个 `else` 块，并将该值赋给一个变量，如下所示：\n\n```php\nif (!$result)\
  \ {\n    $error = $conn->error;\n} else {\n    $numRows = $result->num_rows;\n}\n\
  ```\n\n你现在可以在页面主体中像这样显示结果：\n\n```php\n<?php\nif (isset($error)) {\n    echo \"<p>$error</p>\"\
  ;\n} else {\n    echo \"<p>A total of $numRows records were found.</p>\";\n}\n?>\n\
  ```\n\n保存 `mysqli.php` 并在浏览器中加载它。你应该会看到以下结果：\n\n- 如果出现问题，`$error` 将被设置，因此会显示出来。否则，`else`\
  \ 块会显示找到的记录数。这两个字符串都嵌入了变量，因此它们用双引号括起来。\n\n![A978-1-4842-0635-5_11_Fige_HTML.jpg](img/A978-1-4842-0635-5_11_Fige_HTML.jpg)\n\
  \n如有必要，请与 `ch11` 文件夹中的 `mysqli_01.php` 核对你的代码。\n\n#### PHP 解决方案 11-3：使用 MySQLi 显示\
  \ images 表\n\n显示 `SELECT` 查询结果的最常见方法是使用循环一次从结果集中提取一行。`MySQLi_Result` 有一个名为 `fetch_assoc()`\
  \ 的方法，它将当前行作为关联数组检索出来，以便在网页中显示。数组中的每个元素都以表中相应列的名称命名。\n\n本 PHP 解决方案演示如何循环遍历 `MySQLi_Result`\
  \ 对象以显示 `SELECT` 查询的结果。继续使用 PHP 解决方案 11-2 中的文件。\n\n删除页面主体中 `else` 块末尾的右花括号（大约在第\
  \ 25 行）。虽然显示 `images` 表的代码大部分是 HTML，但它需要位于 `else` 块内部。在闭合的 PHP 标签后插入一个空行，并在下一行的单独\
  \ PHP 块中添加右花括号。修改后的代码应如下所示：\n\n```php\n} else {\n    echo \"<p>A total of $numRows\
  \ records were found.</p>\";\n?>\n<?php } ?>\n```\n\n在 `mysqli.php` 主体中的两个 PHP 块之间添加以下表格，使其受\
  \ `else` 块控制。这样做的目的是防止 SQL 查询失败时出现错误。显示结果集的 PHP 代码以粗体突出显示。\n\n```php\n<table>\n\
  \    <tr>\n        <th>image_id</th>\n        <th>filename</th>\n        <th>caption</th>\n\
  \    </tr>\n    <?php while ($row = $result->fetch_assoc()) { ?>\n    <tr>\n   \
  \     <td><?= $row['image_id']; ?></td>\n        <td><?= $row['filename']; ?></td>\n\
  \        <td><?= $row['caption']; ?></td>\n    </tr>\n    <?php } ?>\n</table>\n\
  ```\n\n`while` 循环遍历数据库结果，使用 `fetch_assoc()` 方法将每条记录提取到 `$row` 中。`$row` 的每个元素都显示在一个表格单元格中。循环持续进行，直到\
  \ `fetch_assoc()` 到达结果集的末尾。\n\n保存 `mysqli.php` 并在浏览器中查看。你应该会看到 `images` 表的内容显示出来，如下面的屏幕截图所示：\n\
  \n![A978-1-4842-0635-5_11_Figf_HTML.jpg](img/A978-1-4842-0635-5_11_Figf_HTML.jpg)\n\
  \n如有必要，你可以将你的代码与 `ch11` 文件夹中的 `mysql_02.php` 进行比较。\n\n#### MySQLi 连接备忘单\n\n表 11-1\
  \ 总结了 `MySQLi` 连接和数据库查询的基本细节。\n\n**表 11-1.** 使用 MySQL 改进版面向对象接口连接到 MySQL/MariaDB\n\
  \n| 操作 | 用法 | 注释 |\n| --- | --- | --- |\n| 连接 | `$conn = new mysqli($h,$u,$p,$d);`\
  \ | 所有参数均为可选；实践中始终需要前四个参数：主机名、用户名、密码、数据库名。创建连接对象。 |\n| 选择数据库 | `$conn->select_db('dbName');`\
  \ | 用于选择不同的数据库。 |\n| 提交查询 | `$result = $conn->query($sql);` | 返回结果对象。 |\n| 统计结果\
  \ | `$numRows = $result->num_rows;` | 返回结果对象中的行数。 |\n| 提取记录 | `$row = $result->fetch_assoc();`\
  \ | 将当前行作为关联数组从结果对象中提取出来。 |\n| 提取记录 | `$row = $result->fetch_row();` | 将当前行作为索引（编号）数组从结果对象中提取出来。\
  \ |\n\n\n\n### PHP 解决方案 11-4：计算结果集中的记录数（PDO）\n\nPDO 没有与 MySQLi 的 `num_rows` 属性直接对应的功能。对于大多数数据库，你需要执行一条\
  \ SQL 查询来计算表中项目的数量，然后获取结果。然而，PDO 的 `rowCount()` 方法在 MySQL 和 MariaDB 中具有双重用途。通常，它仅报告插入、更新或删除记录所影响的行数，但在\
  \ MySQL 和 MariaDB 中，它还能报告 `SELECT` 查询找到的记录数。\n\n在 `phpsols` 站点中创建一个名为 `pdo` 的新文件夹。然后在你刚刚创建的文件夹中创建一个名为\
  \ `pdo.php` 的文件。该页面最终将用于显示一个表格，因此它应包含 `DOCTYPE` 声明和 HTML 骨架。在 `DOCTYPE` 声明上方的 PHP\
  \ 代码块中包含连接文件，然后使用只读账户创建到 `phpsols` 数据库的 PDO 连接，如下所示：\n\n```\nrequire_once '../includes/connection.php';\n\
  $conn = dbConnect('read', 'pdo');\n```\n\n接下来，准备 SQL 查询：\n\n```\n$sql = 'SELECT\
  \ * FROM images';\n```\n\n现在执行查询并将结果存储在一个变量中，如下所示：\n\n-   这意味着“选择 `images` 表中的所有记录。”星号\
  \ (`*`) 是“所有列”的简写形式。\n\n```\n$result = $conn->query($sql);\n```\n\n要检查查询是否存在问题，你可以使用连接对象的\
  \ `errorInfo()` 方法从数据库获取错误信息数组。仅当出现问题时，才会创建该数组的第三个元素。将以下代码添加到脚本中：\n\n```\n$errorInfo\
  \ = $conn->errorInfo();\nif (isset($errorInfo[2])) {\n    $error = $errorInfo[2];\n\
  }\n```\n\n要获取结果集中的行数，创建一个 `else` 块并在 `$result` 对象上调用 `rowCount()` 方法，如下所示：\n\n-\
  \   `$conn->errorInfo()` 生成的数组存储为 `$errorInfo`，因此你可以通过使用 `isset()` 检查 `$errorInfo[2]`\
  \ 是否已定义来判断是否出现任何问题。如果已定义，则将错误信息赋值给 `$error`。\n\n```\nif (isset($errorInfo[2])) {\n\
  \    $error = $errorInfo[2];\n} else {\n    $numRows = $result->rowCount();\n}\n\
  ```\n\n现在你可以在页面主体中显示查询结果，如下所示：\n\n```\n<?php\nif (isset($error)) {\n    echo \"\
  <p>$error</p>\";\n} else {\n    echo \"<p>共找到 $numRows 条记录。</p>\";\n}\n?>\n```\n\
  \n保存页面并在浏览器中加载。你应该会看到与 PHP 解决方案 11-2 步骤 8 相同的结果。如有必要，可将你的代码与 `pdo_01.php` 进行对照检查。\n\
  \n#### 在其他数据库中使用 PDO 统计记录数\n\n使用 PDO 的 `rowCount()` 来报告 `SELECT` 查询找到的记录数在 MySQL\
  \ 和 MariaDB 中均有效，但无法保证在所有其他数据库上都能工作。如果 `rowCount()` 不起作用，请改用以下代码：\n\n```\n// 准备\
  \ SQL 查询\n$sql = 'SELECT COUNT(*) FROM images';\n// 提交查询并捕获结果\n$result = $conn->query($sql);\n\
  $errorInfo = $conn->errorInfo();\nif (isset($errorInfo[2])) {\n    $error = $errorInfo[2];\n\
  } else {\n    // 找出检索到了多少条记录\n    $numRows = $result->fetchColumn();\n    // 释放数据库资源\n\
  \    $result->closeCursor();\n}\n```\n\n这段代码使用带星号的 SQL `COUNT()` 函数来计算表中的所有项目。结果只有一个，因此可以使用\
  \ `fetchColumn()` 方法检索，该方法从数据库结果中获取第一列。将结果存储在 `$numRows` 中后，你必须调用 `closeCursor()`\
  \ 方法来释放数据库资源，以便进行任何后续查询。\n\n### PHP 解决方案 11-5：使用 PDO 显示 images 表\n\n要使用 PDO 显示 `SELECT`\
  \ 查询的结果，你可以在 `foreach` 循环中使用 `query()` 方法，将当前行作为关联数组提取出来。数组中的每个元素以表中相应的列名命名。\n\n\
  继续处理上一个 PHP 解决方案中的同一个文件。\n\n删除页面主体中 `else` 块末尾的右花括号（大约在第 26 行）。尽管显示 `images` 表的大部分代码是\
  \ HTML，但它需要位于 `else` 块内部。在结束 PHP 标签后插入一个空行，然后在下一行的一个单独 PHP 代码块中添加右花括号。修改后的代码应如下所示：\n\
  \n```\n} else {\n    echo \"<p>共找到 $numRows 条记录。</p>\";\n?>\n<?php } ?>\n</body>\n\
  ```\n\n在 `pdo.php` 页面主题的两个 PHP 代码块之间添加以下表格，使其受 `else` 块控制。这是为了防止 SQL 查询失败时出现错误。显示结果集的\
  \ PHP 代码以粗体显示。\n\n```\n<table>\n<tr>\n    <th>image_id</th>\n    <th>文件名</th>\n\
  \    <th>说明</th>\n</tr>\n<?php foreach ($conn->query($sql) as $row) { ?>\n<tr>\n\
  \    <td><?php echo $row['image_id']; ?></td>\n    <td><?php echo $row['filename'];\
  \ ?></td>\n    <td><?php echo $row['caption']; ?></td>\n</tr>\n<?php } ?>\n</table>\n\
  ```\n\n保存页面并在浏览器中查看。它应该看起来像 PHP 解决方案 11-3 中的截图。你可以将你的代码与 `ch11` 文件夹中的 `pdo_02.php`\
  \ 进行对照。\n\n### PDO 连接速查表\n\n表 11-2 总结了使用 PDO 进行连接和数据库查询的基本细节。一些命令将在后续章节中使用，但这里列出以便于参考。\n\
  \n**表 11-2.** 使用 PDO 进行数据库连接\n\n| 操作 | 用法 | 说明 |\n| --- | --- | --- |\n| 连接 | `$conn\
  \ = new PDO($DSN,$u,$p);` | 实践中需要三个参数：数据源名称（DSN）、用户名、密码。必须包裹在 `try/catch` 块中。 |\n\
  | 提交 `SELECT` 查询 | `$result = $conn->query($sql);` | 将结果作为 `PDOStatement` 对象返回。\
  \ |\n| 提取记录 | `foreach($conn->query($sql) as $row) {` | 在一次操作中提交 `SELECT` 查询并以关联数组形式获取当前行。\
  \ |\n| 统计结果数 | `$numRows = $result->rowCount()` | 在 MySQL/MariaDB 中，返回 `SELECT`\
  \ 查询的结果数。大多数其他数据库不支持。 |\n| 获取单个结果 | `$item = $result->fetchColumn();` | 获取结果第一列中的第一条记录。要从其他列获取结果，请使用列号（从\
  \ 0 开始计数）作为参数。 |\n| 获取下一条记录 | `$row = $result->fetch();` | 从结果集中以关联数组形式获取下一行。 |\n\
  | 释放数据库资源 | `$result->closeCursor();` | 释放连接以允许新查询。 |\n| 提交非 `SELECT` 查询 | `$affected\
  \ = $conn->exec($sql);` | 虽然 `query()` 可用于非 `SELECT` 查询，但 `exec()` 返回受影响的行数。 |\n\
  \n## 使用 SQL 与数据库交互\n\n正如你刚才所见，PHP 连接到数据库、发送查询并接收结果，但查询本身需要用 SQL 编写。尽管 SQL 是一个通用标准，但存在许多\
  \ SQL 方言。包括 MySQL 在内的每个数据库供应商都对标准语言进行了扩展。这些扩展提高了效率和功能，但通常与其他数据库不兼容。本书中的 SQL 适用于\
  \ MySQL 5.1 或更高版本，但不一定能移植到 Microsoft SQL Server、Oracle 或其他数据库。\n\n### 编写 SQL 查询\n\
  \nSQL 语法规则不多，而且所有规则都非常简单。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的格式和注意事项，将以下英文文本翻译成中文。\n\
  \n\n"
- '# SQL 不区分大小写


  从 `images` 表中检索所有记录的查询如下所示：


  `SELECT * FROM images`


  大写单词是 SQL 关键字。这纯粹是一种约定。以下写法都是同样正确的：


  `SELECT * FROM images`


  `select * from images`


  `SeLEcT * fRoM images`


  尽管 SQL 关键字不区分大小写，但数据库列名并非如此。使用大写关键字的优点是能让 SQL 查询更易于阅读。您可以自由选择最适合自己的风格，但最后一个例子中的“勒索信”风格最好避免。


  '
