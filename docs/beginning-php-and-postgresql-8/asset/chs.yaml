- "# 第 37 章 数据导入与导出\n\n`COPY`命令\n\n向表中复制数据及从表中导出数据\n\n通过 PHP 脚本调用`COPY`\n\n使用`phpPgAdmin`导入导出数据\n\
  \n本章小结\n\n## 索引\n\n关于作者\n\n**W. 杰森·吉尔摩**在过去七年中开发了无数 PHP 应用程序，并撰写了数十篇关于此主题及其他与互联网应用开发相关议题的文章。他的文章曾刊登于《Linux\
  \ Magazine》和 Developer.com 等媒体，并被联合国及福特基金会教育项目采用。杰森著有包括畅销书《Beginning PHP and MySQL\
  \ 5: From Novice to Professional》（现已推出第二版）在内的三本著作。如今，杰森将时间分配在管理 Apress 开源项目、探索空间感知型网络应用，以及启动远超他实际能完成数量的家居装修改造项目上。\n\
  \n\n\n## 关于技术审校者\n\n可通过 `jason@wjgilmore.com` 联系杰森，并务必访问他的网站 `http://www.wjgilmore.com`。\n\
  \n**罗伯特·H·特里特** 是一位资深开源用户、开发者及倡导者。他曾参与多个项目，但最钟爱的无疑是 PostgreSQL。他目前的工作包括协助维护 `postgresql.org`\
  \ 网站、开发 `phpPgAdmin` 项目，并尽可能为 PostgreSQL 核心代码贡献力量。他曾为 PostgreSQL 的\"技术文档\"站点撰写多篇文章，多次在\
  \ OSCon 上发表演讲，在 `SourceForge.net` 担任 PHP 论坛管理员，并因其在 PostgreSQL 社区的贡献而被认定为“主要开发者”。在自由软件世界之外，罗伯特喜欢与他的孩子们——罗伯特、迪伦和艾玛，以及妻子安珀共度时光。\n\
  \n**xxv**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图片 4](img/index-26_1.png)\n\
  \n**格雷格·萨比诺·穆兰** 使用过许多数据库，但坚信没有哪个能与 PostgreSQL 媲美。他协助维护 PostgreSQL 邮件列表和网站，在 OSCon\
  \ 上两次就 PostgreSQL 主题发表演讲，并为 PostgreSQL 核心贡献过代码。他是 `DBD::Pg` 模块的主要开发者，因其在 PostgreSQL\
  \ 方面的所有工作而被认定为 PostgreSQL 主要开发者。他对 PGP 和密码学有浓厚兴趣，并尽可能频繁地参加密钥签名活动。他的 PGP 指纹是 `2529\
  \ DF6A B8F7 9407 E944 45B4 BC9B 9067 1496 4AC8`，而且他有时会将其偷偷植入自己编写的代码中。他目前在 End Point\
  \ 公司担任软件开发人员，主要从事 PostgreSQL、Perl 和 PHP 相关工作。他和妻子乔伊热爱旅行，每年至少尝试进行一次海外旅行。\n\n**马特·韦德**\
  \ 白天是数据库分析师，晚上则是自由职业的 PHP 开发者。他在微软 SQL Server 到 MySQL 等多种数据库技术方面拥有丰富经验。马特同时也是一位出色的系统管理员，精通各种版本的\
  \ Windows 和 FreeBSD。马特与妻子米歇尔以及三个孩子——马修、乔纳森和阿曼达居住在佛罗里达州。他利用（为数不多的）空闲时间摆弄鱼缸、在教堂参与活动，或者只是小憩片刻。马特是\
  \ `Codewalkers.com` 的创始人，这是一个面向 PHP 开发者的资源网站。\n\n**xxvii**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 致谢\n\n首先，我要感谢罗伯特·特里特加入我这个漫长但令人兴奋的项目。你做得非常出色，期待与你再次合作！\n\n我还要感谢优秀的 Apress 团队，让我有机会再次与地球上最出色的计算机图书出版商合作。项目经理贝丝·克里斯马斯和劳拉·邱出色地完成了让罗伯特和我保持“可控”的任务，他们可以作证这绝非易事。技术审校者马特·韦德和格雷格·萨比诺·穆兰在整个项目过程中提供了关键建议。文字编辑比尔·麦克马纳斯和妮可·勒克莱尔出色地将我们经常蹩脚的文笔润色成更连贯的格式。马特·穆迪不辞辛劳地审阅了后期章节草稿。设计大师库尔特·克拉姆斯再次制作了精美的封面。当然，也要感谢团队中所有其他成员，他们不仅为本书，也为\
  \ Apress 的所有书籍做出了巨大贡献。在此预先向市场营销团队表示由衷感谢，他们将不懈努力让全世界了解我们的书！当然，若未提及出版商加里·康奈尔、副出版商格蕾丝·黄以及助理出版商多米尼克·沙夫茨伯里的大力支持，这篇对促成此书问世的工作人员的简短致谢便不完整。\n\
  \n当然，如果没有全球各地志愿者对 PHP 和 PostgreSQL 项目所做的惊人贡献，这本书也不会存在。感谢你们将如此出色的软件奉献给世界。\n\n\n\n\
  ### PHP 简介\n\n本章旨在帮助你更好地了解 PHP 的基础知识，深入探寻其起源、流行度和用户群体。这些信息为讨论 PHP 的特性集（包括 PHP 5\
  \ 中的新特性）奠定了基础。阅读完本章后，你将了解到：\n\n- 一位加拿大开发者的网页点击计数器如何催生了世界上最流行的脚本语言之一\n- PHP 的开发者如何再次革新该语言，使第\
  \ 5 版成为迄今为止最好的版本\n- PHP 的哪些特性吸引了新手和专家级程序员\n\n#### 历史\n\nPHP 的起源可以追溯到 1995 年，当时一位名为拉斯马斯·勒德尔夫的独立软件开发承包商编写了一个\
  \ Perl/CGI 脚本，使他自己能够知道有多少访客在阅读他的在线简历。他的脚本执行了两项任务：记录访客信息，以及在网页上显示访客数量。由于我们今天所熟知的\
  \ Web 在当时还处于萌芽阶段，这类工具尚不存在，因此人们纷纷发来电子邮件询问勒德尔夫的脚本。勒德尔夫于是开始免费提供他的这套工具，并将其命名为 *Personal\
  \ Home Page*（PHP）。\n\n人们对 PHP 工具集的渴求促使勒德尔夫继续开发该语言，其中最早也最引人注目的变化或许是他添加了一项功能，可将 HTML\
  \ 表单中输入的数据转换为符号变量，从而便于导出到其他系统中。\n\n为了实现这一目标，他选择继续用 C 代码而非 Perl 进行开发。PHP 工具集的持续扩充最终在\
  \ 1997 年 11 月促成了 PHP 2.0（即 Personal Home Page—Form Interpreter，简称 PHP-FI）的发布。随着\
  \ PHP 日益流行，2.0 版本的发布汇集了来自全球程序员的众多增强与改进。\n\n新发布的 PHP 版本极受欢迎，很快便有一个核心开发团队加入勒德尔夫的行列。他们保留了将代码直接嵌入\
  \ HTML 中的原始概念，并重写了解析引擎，从而诞生了 PHP 3.0。到 1998 年 6 月 3.0 版本发布时，已有超过 50,000 名用户使用 PHP\
  \ 来增强他们的网页。\n\n---\n\n**注** 同样是在 1997 年，PHP 缩写所代表的含义从 Personal Home Page 改为递归缩写\
  \ Hypertext Preprocessor（超文本预处理器）。\n\n---\n\n在接下来的两年里，开发工作以惊人的速度持续进行，增加了数百个函数，用户数量也突飞猛进地增长。1999\
  \ 年初，Netcraft（http://www.netcraft.com/）给出了一个保守估计，称用户基数已超过 1,000,000，使 PHP 成为世界上最流行的脚本语言之一。其受欢迎程度甚至超出了开发者最乐观的预期，因为用户很快就开始将\
  \ PHP 用于远比最初设想规模更大的应用程序。两位核心开发者——兹夫·苏拉斯基和安迪·古特曼斯——主动对 PHP 的运行方式进行了彻底反思，最终重写了 PHP\
  \ 解析器，并将其命名为 Zend 脚本引擎。这一工作的成果体现在 PHP 4 的发布中。\n\n---\n\n**注** 除了主导 Zend 引擎的开发并在引领\
  \ PHP 语言的总体发展方面发挥重要作用外，总部位于以色列的 Zend Technologies Ltd.（http://www.zend.com/）还提供了一系列用于开发和部署\
  \ PHP 的工具。这些工具包括 `Zend Studio`、`Zend Encoder` 和 `Zend Optimizer` 等。更多信息请查看 Zend\
  \ 网站。\n\n---\n\n#### PHP 4\n\n\n\n#### PHP 4.0 发布与特性\n\n2000 年 5 月 22 日，大约在新开发工作的首次正式公告发布\
  \ 18 个月后，`PHP 4.0`发布了。许多人认为`PHP 4`的发布是该语言在企业开发领域的正式首秀，这一观点得到了该语言迅速崛起的支持。就在这次重大发布几个月后，Netcraft（http://www.netcraft.com/）估计`PHP`已被安装在超过\
  \ 360 万个域名上。\n\n##### 特性\n\n`PHP 4`包含多项企业级改进，包括以下内容：\n\n• **改进的资源处理**：版本 3.X 的主要缺点之一是可扩展性。\n\
  \n这主要是因为设计者低估了该语言在大型应用程序中的使用程度。该语言最初并非用于运行企业级网站，后续的尝试导致开发者重新思考该语言的许多机制。其结果是版本 4\
  \ 中大幅改进的资源处理功能。\n\n• **面向对象支持**：版本 4 引入了一定程度的面向对象功能，尽管它被认为是一个比较普通的实现。尽管如此，这些新特性在吸引习惯于使用传统面向对象编程语言的用户方面发挥了重要作用。标准类和对象开发方法得以提供，此外还有对象重载和运行时类信息。更全面的`OOP`实现已在版本\
  \ 5 中提供，并在第 5 章中介绍。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\nC H A\
  \ P T E R 1 ■ A N I N T R O D U C T I O N T O P H P\n\n**3**\n\n• **原生会话处理支持**：版本\
  \ 3.X 用户通过第三方包`PHPLIB`（http://phplib.sourceforge.net）可用的`HTTP`会话处理，在版本 4 中原生集成。该特性为开发者提供了一种手段，以前所未有的效率和简便性跟踪用户活动和偏好。第\
  \ 15 章介绍了`PHP`的会话处理能力。\n\n• **加密**：`MCrypt`（http://mcrypt.sourceforge.net）库被纳入默认发行版，为用户提供使用`Blowfish`、`MD5`、`SHA1`和`TripleDES`等加密算法的完整加密和哈希加密。第\
  \ 18 章深入探讨了`PHP`的加密能力。\n\n• **ISAPI 支持**：`ISAPI`支持使用户能够将`PHP`与微软的`IIS` Web 服务器结合作为`ISAPI`模块使用，显著提高了其性能和安全性。\n\
  \n• **原生 COM/DCOM 支持**：对 Windows 用户的另一个好处是`PHP 4`能够访问和实例化`COM`对象。这一功能打开了与 Windows\
  \ 应用程序广泛的互操作性。\n\n• **原生 Java 支持**：在提升`PHP`互操作性的另一项举措中，从`PHP`应用程序绑定到`Java`对象的支持在版本\
  \ 4.0 中提供。\n\n• **Perl 兼容正则表达式（PCRE）库**：`Perl`语言长期以来被誉为字符串解析领域的王者。开发者知道强大的正则表达式功能将在`PHP`的广泛接受中发挥重要作用，因此选择直接整合`Perl`的功能而非重新实现，将`PCRE`库包纳入`PHP`的默认发行版（从版本\
  \ 4.2.0 开始）。第 9 章详细介绍了这一重要特性，并对通常令人困惑的正则表达式语法进行了概述。\n\n除了这些特性外，版本 4 还添加了数百个函数，极大地增强了该语言的能力。在本书中，将讨论这些功能的很大一部分，因为它们在版本\
  \ 5 发布中仍然同样重要。\n\n##### 缺点\n\n`PHP 4`代表了该语言成熟度的一次巨大飞跃。新版本提供的新功能、强大能力和可扩展性吸引了大量新兴和专家级开发者，使其稳固地跻身于\
  \ Web 脚本巨擘之列。然而，在语言业务中维持用户的喜爱是一项艰巨的任务；程序员通常持有一种“你最近为我做了什么？”的心态。`PHP`开发团队牢记这一点，因为不久之后他们又着手进行另一项艰巨的任务，一项可能使该语言成为\
  \ Web 脚本世界 800 磅大猩猩的任务：`PHP 5`。\n\n#### PHP 5\n\n版本 5 是`PHP`语言发展史上的又一个分水岭。尽管之前的主要版本拥有大量新的库添加，但版本\
  \ 5 对现有功能进行了改进，并添加了通常与成熟编程语言架构相关的若干特性：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**4**\n\nC H A P T E R 1 ■ A N I N T R O D U C T I O N T O P H P\n\n• **大幅改进的面向对象能力**：对`PHP`面向对象架构的改进是版本\
  \ 5 最显著的特性。版本 5 包含众多功能添加，例如显式构造函数和析构函数、对象克隆、类抽象、变量作用域、接口，以及`PHP`在处理对象管理方面的重大改进。第\
  \ 6 章和第 7 章对此主题进行了全面介绍。\n\n• **Try/Catch 异常处理**：在结构化编程语言中设计自定义错误处理策略，讽刺的是，容易出错且不一致。为解决此问题，版本\
  \ 5 现在支持异常处理。作为许多语言（包括`C++`、`C#`、`Python`和`Java`）中错误管理的主流方式，异常处理为标准化错误报告逻辑提供了极佳的手段。这种新的便捷方法将在第\
  \ 8 章介绍。\n\n• **改进的字符串处理**：早期版本的`PHP`默认将字符串视为数组，这种做法表明了该语言传统的对数据类型松散的态度。这一策略在版本\
  \ 5 中得到了调整，引入了专用的字符串偏移语法，并且之前的做法已被弃用。新特性、变化以及新语法带来的影响将在第 9 章讨论。\n\n• **改进的 XML 和\
  \ Web 服务支持**：`XML`支持现在基于`libxml2`库，并引入了一个用于解析和操作`XML`的、颇具前景的新扩展，称为`SimpleXML`。此外，`SOAP`扩展现已可用。在第\
  \ 20 章中，将介绍这两个新扩展，以及一些优秀的第三方 Web 服务扩展。\n\n• **原生支持 SQLite**：始终热衷于提供选择的开发者们，为强大而紧凑的`SQLite`数据库服务器（http://www.sqlite.org/）添加了支持。`SQLite`为那些寻求一些重量级数据库产品中的许多功能、但又不希望承担相应管理开销的开发者提供了一个便捷的解决方案。`PHP`对该强大数据库引擎的支持将在第\
  \ 22 章介绍。\n\n版本 5 还提供了许多其他改进和添加，本书将在相关章节中酌情介绍。\n\n随着版本 5 的发布，`PHP`的普及率达到历史最高点。截至本书付印时，`PHP`已安装在近\
  \ 1900 万个域名上（Netcraft，http://www.netcraft.com/）。根据 E-Soft, Inc.（http://www.securityspace.com/）的数据，`PHP`是迄今为止最流行的\
  \ Apache 模块，在几乎 54%的 Apache 安装中可用。\n\n到目前为止，本章仅讨论了该语言的特定版本特性。每个版本都共享一组共同的特征，这些特征在吸引和保留大量用户方面发挥着非常重要的作用。在下一节中，您将了解这些基础特性。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，对给定英文文本进行翻译。以下是译文：\n\n\n### 通用语言特性\n\n每个用户使用\
  \ PHP 来实现关键任务应用都有其特定的理由，尽管可以说这些动机大致可归为四类：*实用性、强大性*、*可能性*和*价格*。\n\n#### 实用性\n\n从一开始，PHP\
  \ 语言就是本着实用性而创建的。毕竟，勒多夫最初的想法并不是要设计一门全新的语言，而是要解决一个当时没有现成解决方案的问题。此外，PHP 早期发展的许多方面并非源于改进语言本身的明确意图，而是为了增加其对用户的实用性。其结果就是一门*极简*的语言，无论是对用户的要求还是语言的语法要求都是如此。首先，一个实用的\
  \ PHP 脚本可以少至一行；与 C 语言不同，它不需要强制包含库。例如，以下便是一个完整的 PHP 脚本，其目的是输出当前日期，此处格式化为类似“September\
  \ 23, 2005”的形式：\n\n```\n<?php echo date(\"F j, Y\");?>\n```\n\n该语言偏爱简洁的另一个例子是其嵌套函数的能力。例如，您可以通过按特定顺序堆叠函数，在同一行内对一个值进行多次修改，如下例所示，生成一个由五个字母数字字符组成的伪随机字符串，例如\
  \ `a3jh8`：\n\n```\n$randomString = substr(md5(microtime()), 0, 5);\n```\n\nPHP 是一种弱类型语言，这意味着不需要显式地创建、类型转换或销毁变量，尽管您也可以这么做。PHP\
  \ 在内部处理这些事务，在脚本调用变量时即时创建它们，并使用一种“最佳猜测”公式来自动转换变量类型。例如，PHP 认为下面的一组语句完全有效：\n\n```\n\
  <?php\n$number = \"5\"; # $number 是一个字符串\n$sum = 15 + $number; # 将一个整数和一个字符串相加，产生整数\
  \ $sum = \"twenty\"; # 用字符串覆盖 $sum。\n?>\n```\n\nPHP 还会在脚本执行完毕后自动销毁变量并将资源归还给系统。在这些以及许多其他方面，通过尝试在内部处理编程的许多管理性工作，PHP\
  \ 允许开发者几乎完全专注于最终目标，即一个可工作的应用程序。\n\n#### 强大性\n\n早期对 PHP 5 的介绍提到了一个事实：与之前的版本相比，新版本更侧重于质的提升而非量的增加。此前的主要版本都伴随着\
  \ PHP 默认库的巨大扩充，每次发布都增加了数百个新函数。目前，有 113 个库可用，其中总共包含超过 1,000 个函数。尽管您可能知道 PHP 能够与数据库交互、处理表单信息以及动态创建页面，但您可能不知道\
  \ PHP 还可以执行以下操作：\n\n- 创建和操作 Macromedia Flash、图像以及便携式文档格式（PDF）文件\n- 通过与语言词典以及易破解模式进行对比，评估密码的可猜测性\n\
  - 与轻量级目录访问协议（LDAP）通信\n- 使用基于 POSIX 和 Perl 的正则表达式库来解析即使是最复杂的字符串\n- 根据存储在平面文件、数据库甚至微软\
  \ Active Directory 中的登录凭据对用户进行身份验证\n- 与多种协议通信，包括 IMAP、POP3、NNTP 和 DNS 等\n- 与多种信用卡处理解决方案进行通信\n\
  \n当然，接下来的章节将尽可能多地涵盖 PHP 的这些以及其他有趣且有用的特性。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n### 可能性\n\nPHP 开发者很少受限于单一的实施方案。相反，用户通常面临着该语言提供的诸多选择。例如，考虑 PHP 提供的数据库支持选项。它为超过\
  \ 25 种数据库产品提供了原生支持，包括 `Adabas D`、`dBase`、`Empress`、`FilePro`、`FrontBase`、`Hyperwave`、`IBM\
  \ DB2`、`Informix`、`Ingres`、`Interbase`、`mSQL`、直接 `MS-SQL`、`MySQL`、`Oracle`、`Ovrimos`、`PostgreSQL`、`Solid`、`Sybase`、`Unix\
  \ dbm` 和 `Velocis`。此外，还有用于访问 Berkeley DB 风格数据库的抽象层函数。最后，有两个可用的数据库抽象层，一个叫做 `dbx`\
  \ 模块，另一个通过 `PEAR` 提供，名为 `PEAR DB`。\n\nPHP 强大的字符串解析能力是体现其提供给用户可能性的另一个特性。除了超过 85 个字符串处理函数外，它还同时支持基于\
  \ `POSIX` 和 `Perl` 的正则表达式格式。这种灵活性为拥有不同技能组合的用户提供了机会，使他们不仅能够立即开始执行复杂的字符串操作，还能快速地将具有类似功能（例如\
  \ `Perl` 和 `Python`）的程序移植到 `PHP` 上。\n\n你更偏爱一种拥抱函数式编程的语言吗？或者是一种拥抱面向对象范式的语言？`PHP`\
  \ 对两者都提供了全面的支持。尽管 `PHP` 最初纯粹是一种函数式语言，但其开发者很快意识到了提供流行的 `OOP` 范式的重要性，并采取措施实现了一个广泛的解决方案。\n\
  \n这里反复出现的主题是，`PHP` 让你能够在投入极少时间的情况下，快速利用你当前的技能组合。这里列举的例子只是这种策略的一小部分，这种策略在整门语言中随处可见。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 价格\n\n自诞生以来，`PHP` 就没有使用、修改和重新分发的限制。\n\
  \n近年来，满足此类开放许可条件的软件被称为*开源*软件。开源软件和互联网就像面包和黄油一样密不可分。像 `Sendmail`、`Bind`、`Linux` 和\
  \ `Apache` 这样的开源项目在当今整个互联网的持续运行中都扮演着巨大的角色。尽管开源软件可免费使用这一事实是媒体宣传最多的特点，但其他几个特点即使不是更重要，也同样重要：\n\
  \n-   **不受大多数商业产品的许可限制：** 开源软件用户摆脱了商业软件通常会有的绝大多数许可限制。尽管不同许可证变体之间确实存在一些差异，但用户基本上可以自由地修改、重新分发该软件，并将其集成到其他产品中。\n\
  -   **开放的开发和审计流程：** 尽管发生过一些事件，但开源软件长久以来在安全性方面享有盛誉。如此高的标准是开放开发和审计流程的结果。由于源代码可供任何人自由检查，安全漏洞和潜在问题可以迅速被发现和修复。开源倡导者埃里克·S·雷蒙德也许最好地总结了这一优势，他写道：“只要有足够多的眼球，所有\
  \ bug 都是浅显的。”\n-   **鼓励参与：** 开发团队不限于某个特定组织。任何有兴趣和能力的人都可以自由加入项目。成员限制的缺失极大地增强了特定项目的人才库，最终有助于产出更高质量的产品。\n\
  \n### 总结\n\n本章为本书大部分内容所致力于的这门奇妙语言提供了一些预示。我们首先回顾了 `PHP` 的历史，然后概述了版本 4 和 5 的核心特性，为后续章节奠定了基础。\n\
  \n在第二章中，准备好亲自动手，因为你将深入 `PHP` 的安装和配置过程。尽管读者通常将大多数此类章节比作指甲刮黑板，但通过了解更多关于这个过程的信息，你可以获得很多好处。就像一个职业自行车手或赛车手一样，那些对调整和维护过程有实践知识的程序员，往往比那些没有这些知识的程序员更有优势，因为他们能更好地理解软件的行为和特性。所以，抓点零食，舒服地坐在键盘前；是时候开始构建了。\n\
