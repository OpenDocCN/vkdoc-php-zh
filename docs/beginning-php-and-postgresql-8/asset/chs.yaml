  #### 子网转换器


  你可能曾经挠头苦思，试图解决某个晦涩的网络配置问题。最常见的情况是，罪魁祸首往往是网线故障或未插好。而第二常见的问题，大概就是计算必要的基本网络要素（IP 地址、子网掩码、广播地址、网络地址等）时出错。为解决这个问题，可以利用几个
  PHP 函数和位运算来帮你进行计算。清单 16-2 中的示例演示了如何在给定 IP 地址和位掩码后，计算出这些组件。




