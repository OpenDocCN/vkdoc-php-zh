    \ is the subscript range?\n\n1.  1 through 30\n\n2.  1 through 29\n\n3.  0 through\
    \ 29\n\n4.  None of the above\n\n7.  `in_array` does\n    which of the following?\n\
    \n1.  Searches for the number of empty spaces in an array\n\n2.  Searches for\
    \ the number of characters in an array"
  trans: "\n如果 `$dog_app` 值未传入类中，则会执行 `else` 语句。此时假定用户想要创建一个 `getBreeds` 对象。创建了 `dog_container`\
    \ 的一个实例（`$container`），并向其传递值 `selectbox`。（如果对象无法创建，则会显示 `\"System Error #4\"`。）字符串“selectbox”被传入数组\
    \ `$properties_array`（注意：必须使用 `array` 关键字，否则我们创建的是属性而非数组）。然后，容器对象（`$container`）会调用\
    \ `create_object`（传入 `$properties_array` 以创建 `getBreeds` 类的一个实例（`$lab`））。如果 `getBreeds`\
    \ 对象成功创建（`$lab != FALSE`），那么我们需要找到 `get_breeds.xml` 文件（其中包含品种列表）的位置。因此，我们重置容器中的应用程序属性（通过调用\
    \ `set_app`）为“breeds”。这告诉容器程序我们是一个 `getBreeds` 对象，而不是一个 `dog` 对象。然后，我们使用容器的 `get_dog_application`\
    \ 方法来查找品种 XML 文件的位置。\n\n*有关数组的更多信息，请访问* [*www.php.net/manual/en/function.array.php*](http://www.php.net/manual/en/function.array.php)*。*\n\
    \nPHP 方法 `get_class_methods` 用于创建一个包含 `getBreeds` 中方法的数组。由于 `get_select` 方法是唯一的方法（除了构造函数），因此它也是数组中的最后一个方法。从数组中提取其名称，然后使用属性\
    \ `$method_name` 调用它（`$result = $dog_data->$method_name($dog_app)`）。这使得 `getBreed`\
    \ 类完全独立于 `dog_interface`。开发者可以更改 `get_select` 方法的名称，一切仍能正常工作（只要它是类中的最后一个方法）。这实现了界面层与业务规则层的完全分离。\n\
    \nXML 文件的位置被传入 `getBreeds` 对象（`$lab`）的 `get_select` 方法中，该方法使用 XML 文件中的数据来创建选择列表框。选择列表框的代码被放入\
    \ `$result` 中。如果代码确实被放入了 `$result`，则代码会显示（`print $result`）回 HTML 表单中，供用户选择品种。如果文件名无效，则会显示错误消息（`print\
    \ \"System Error #3\"`）而不是选择框。\n\n唯一需要的其他更改是对 `lab.html` 和 `get_breeds.js` 文件的两处轻微改动。\n\
    \n```\nfunction AjaxRequest($value)\n```\n\n在 `get_breed.js` 文件中，`AjaxRequest`\
    \ 方法的函数头已更改，以传递实际被调用的文件（这不是此设计的要求，但它允许此文件用于任何通过 AJAX 调用的程序）。\n\n```\nxmlHttp.open(\"\
    GET\", $value, true);\n```\n\n此外，`open` 语句已调整为使用 `$value` 而不是文件名。\n\n在 `lab.html`\
    \ 程序中，还有几处额外的更改。\n\n```\nAjaxRequest('dog_interface.php');\n```\n\n对 JavaScript\
    \ 函数的调用现在传入了文件名，该文件名也已更改为 `dog_interface.php` 文件。\n\n最后，HTML 表单的 action 标签（在两个表单标签位置）已更改为调用\
    \ `dog_interface.php` 程序。请注意，现在，每当我们想要使用 `Dog` 应用程序时，我们首先调用界面。然后界面确定我们要完成什么（获取品种选择框或处理您正在创建的狗的属性）。我们必须通过界面与所有类进行通信。反过来，界面必须使用容器创建任何所需的对象（当然，容器本身除外）。这遵循了分层设计的概念。\n\
    \n您将看不到与之前任何不同的输出（除非您有一些系统错误）。然而，现在您可以轻松地在应用程序中更改文件名和位置（通过 XML 文件），而无需更改任何程序代码！在后面的章节中，我们将探讨预加载最常用文件的能力，以提高程序的效率。\n\
    \n## 动手实践\n\n1.  从本书网站下载本节的这些文件。更改 `get_breeds.xml` 文件、`get_breeds.php` 文件和 `dog.php`\
    \ 文件的文件名。尝试通过 `lab.html` 文件运行程序。选择框将不会显示，程序也将无法运行。现在转到 `dog_applications.xml`\
    \ 文件，将 XML 文件中的数据更改为您刚刚创建的新文件名。返回您的 `lab.html` 文件（重新加载它）。您现在应该能看到选择框。填写并选择信息，然后单击“提交”按钮。应用程序现在应该可以工作了。\n\
    \n## 章节术语表\n\n| 验证 | `validator` 方法 |\n| --- | --- |\n| JavaScript 隐藏/显示 | HTML\
    \ `onSubmit` |\n| 表单验证 | JavaScript 警告框 |\n| HTML 传递“表单” | JavaScript 点表示法 |\n\
    | JavaScript `if` 语句 | JavaScript `length` 方法 |\n| `&& AND` | `&#124;&#124; OR`\
    \ |\n| 正则表达式 | JavaScript `match` 方法 |\n| 过滤/过滤操作 | `isset` |\n| `$_POST` | `str_ireplace`\
    \ |\n| `Stripslashes` | `htmlentities` |\n| `strip_tags` | `$__SERVER` |\n| `exit`\
    \ | `else` |\n| HTML 选择列表 | XML |\n| XML 数据格式 | XML 父子关系 |\n| `foreach` 循环 | HTML\
    \ 单选按钮 |\n| `private` 函数 | `stristr` |\n| 依赖注入 | `function_exists` |\n| `break`\
    \ 语句 | `method` 签名 |\n| `getElementsByTagName` | `getAttribute` |\n| `array` |\
    \ `array subscript` |\n| `get_declared_classes` | `Count` |\n| 数组的大小 | 数组的最后一个位置\
    \ |\n| `array` 关键字 | 传递对象 |\n| `get_class_methods` |   |\n\n## 章节问题与项目\n\n###\
    \ 选择题\n\n1.  使用表单验证时，以下哪项是正确的？\n    1.  服务器会自动成功处理输入值，而不会出现任何错误。\n    2.  检查必填字段以确保其包含内容。\n\
    \    3.  更新动态网页。\n    4.  所有信息都发送到服务器。\n\n2.  以下哪项可以使用验证器进行验证？\n    1.  电子邮件\n\
    \    2.  IP 地址\n    3.  整数\n    4.  以上所有\n\n3.  为什么必须验证您的代码？\n    1.  查看您的浏览器是否能完成任务\n\
    \    2.  确保您的信息正确且安全\n    3.  确保您的浏览器能运行 JavaScript 和 HTML5\n    4.  验证您的计算机是否能运行最新版本的\
    \ PHP\n\n4.  PHP 文件中的验证代码执行以下哪项操作？\n    1.  将接收到的信息与预期的标准格式进行比较\n    2.  验证用户程序的交互\n\
    \    3.  检查并消除用户输入的有害数据\n    4.  检查是否使用了不正确的 PHP 函数\n\n5.  `stripslashes` 执行以下哪项操作？\n\
    \    1.  删除引号中的反斜杠\n    2.  将 HTML 字符转换为其等效的 HTML 实体\n    3.  删除任何 PHP 或 HTML\
    \ 标签\n    4.  以上所有\n\n6.  如果数组的大小是 29，那么下标范围是多少？\n    1.  1 到 30\n    2.  1 到\
    \ 29\n    3.  0 到 29\n    4.  以上都不对\n\n7.  `in_array` 执行以下哪项操作？\n    1.  搜索数组中空格的数量\n\
    \    2.  搜索数组中字符的数量\n"
- fmt: "### Multiple Choice\n\n3.  Searches for a value in an array\n4.  None of the\
    \ above\n\n8.  The PHP method `count` will return which of the following of an\
    \ array?\n    1.  `last_position`\n    2.  `subscript`\n    3.  `size`\n    4.\
    \  None of these\n\n9.  Which method will produce a variable that you can use\
    \ to refer to the last position of the array?\n    1.  `$last_position=count($class_array)\
    \ - 1;`\n    2.  `$class_array=$last_position(count - 1);`\n    3.  `$count=$last_position\
    \ - 1($class_array);`\n    4.  `$last_position=$class_array -1 (count);`\n\n10.\
    \ The `exit` command does which of the following?\n    1.  Automatically directs\
    \ the user to a new page\n    2.  Closes the program if it is not called from\
    \ the correct HTML page\n    3.  Turns off your computer\n    4.  None of the\
    \ above\n\n11. What is not true in relation to the `foreach` command?\n    1.\
    \  Works only with arrays and objects\n    2.  Used to parse through each key/value\
    \ pair in an array\n    3.  Can be iterated by reference\n    4.  The equivalent\
    \ to an `if/then` statement\n\n12. The `break` statement does which of the following?\n\
    \    1.  Ends execution of the `for`, `foreach`, `do-while`, and/or `switch` structure(s)\n\
    \    2.  Executes the `for`, `foreach`, `do-while`, and/or `switch` structure(s)\n\
    \    3.  Ensures the execution of `for`, `foreach`, `do-while`, and/or `switch`\
    \ structure(s)\n    4.  Breaks the `for`, `foreach`, `do-while`, and/or `switch`\
    \ structure(s) before they are executed\n\n13. Using the `getAttribute` will do\
    \ which of the following?\n    1.  Return the value of the attribute\n    2. \
    \ Print a list of data\n    3.  Load a new HTML page\n    4.  None of these\n\n\
    14. Which function converts HTML tags into their entities versions?\n    1.  `strlen`\n\
    \    2.  `htmlentities`\n    3.  `explode`\n    4.  `getAttribute`\n\n15. Which\
    \ is a commonly used function to find the length of a string?\n    1.  `strlen`\n\
    \    2.  `getLength`\n    3.  String concatenation\n    4.  `__toString`\n\n###\
    \ True/False\n\n1.  The `count` function returns the number of elements in an\
    \ array.\n2.  When using an array, the index must not exceed the size of the array.\n\
    3.  A subscript is the name given to position where the item currently exists\
    \ in the array and is usually contained in `[]`.\n4.  A `private` function is\
    \ an event in PHP to network for a job.\n5.  One purpose of `exit` is to end the\
    \ program.\n6.  The `getElementsByTagName` searches for occurrences that correspond\
    \ to a specific XML tag.\n7.  `get_declared_classes` returns an array of all classes\
    \ that currently exist in a program in order from first to last.\n8.  Dependency\
    \ injection allows the program client to enter a block of code to know the implementation\
    \ of the block of code it will be using.\n\n### Short Answer/Essay\n\n1.  Why\
    \ should you validate user input both within the interface tier and business rules\
    \ tier?\n2.  Why should input received in the business rules tier be filtered?\
    \ What are the different ways you can filter the information?\n3.  Explain how\
    \ you can reduce errors from user input by the type of HTML objects (such as radio\
    \ buttons) used to accept information.\n4.  What causes the example code shown\
    \ in the dependency injection section of this chapter inefficient? How does this\
    \ code help a developer with version changes to the application?\n\n### Projects\n\
    \n1.  Create an application that registers a runner for the local 5K road race.\
    \ The interface should accept all necessary personal information (name, address,\
    \ gender, age, and T-shirt size). Whenever possible, use HTML objects that restrict\
    \ input (such a select object for T-shirt size and state). Validate all information\
    \ in the interface tier using both HTML5 and JavaScript. If the information is\
    \ valid, pass the information to the business rules tier. The business rules tier\
    \ will validate the information received and filter out any harmful information.\
    \ Once all information has been accepted, the program will display the cost of\
    \ entering the race ($25). Any shirts over XL will add an additional charge of\
    \ $2\\. Any runner 65 or older will be charged $5 less.\n2.  Develop the application\
    \ described in #1 to use dependency injection to allow the developer to change\
    \ file name and locations without requiring code changes to the application itself.\n\
    \n### Term Project\n\n1.  Update the Chapter [4](#394210_2_En_4_Chapter.xhtml)\
    \ Term Project to validate all information as it is entered into an HTML form\
    \ (via HTML as shown in Chapter [5](#394210_2_En_5_Chapter.xhtml)) in the interface\
    \ tier. After the information is validated, it is passed to the business rules\
    \ tier. The business rules tier will validate the information received and filter\
    \ out any harmful information. Once the information is accepted (and stored in\
    \ the properties), the application will display all fields of the product stored\
    \ in the warehouse of the ABC Computer Parts Company. The interface tier and the\
    \ business rules tier must be separated using dependency injection (via an XML\
    \ file), as shown. Your completed project should use logic similar to the examples\
    \ shown in this chapter.\n\n## 6. Handling and Logging Exceptions\n\n*The education\
    \ of a man is never completed until he dies.* —Robert E. Lee (as quoted in *Peter's\
    \ Quotations: Ideas for Our Time* (1977) by Laurence J. Peter, p. 175)\n\n###\
    \ Chapter Objectives/Student Learning Outcomes\n\nAfter completing this chapter,\
    \ the student will be able to:\n\n*   Explain the difference between errors and\
    \ exceptions\n*   Create a PHP program that can handle general exceptions\n* \
    \  Create a PHP program that can create, raise, and handle user exceptions\n*\
    \   Explain and use a `switch` and/or embedded `if/else` statement\n*   Create\
    \ a PHP program that uses the `while` loop and/or the `for` loop\n*   Create a\
    \ program that reads/updates a text file using a two-dimensional array\n*   Create\
    \ a PHP program that logs exceptions and emails support personnel"
