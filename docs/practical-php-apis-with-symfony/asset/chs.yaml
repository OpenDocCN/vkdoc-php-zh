- "# 1. 设计输入、输出和操作\n\n在本章中，我们将构建面向操作 API 的基本核心功能。具体来说，我们将编写必要的代码来：\n\n*   创建用于表示输入和输出的模型\n\
  *   创建用于表示操作的服务\n*   创建一个可访问的集合来存储和检索这些操作\n*   根据请求负载执行操作\n*   验证负载\n*   创建接收并执行操作请求的端点\n\
  \n## 第 1 节 请求输入和输出\n\n在 API 请求的上下文中，以下是对输入和输出的快速分解：\n\n*   **输入**：指您提供给 API 的数据或指令。根据\
  \ API 的设计，这些数据通常出现在请求负载或请求头中。例如，在“发送付款”操作中，输入可能包括收款人信息、金额以及可能的参考代码。\n\n*   **输出**：指\
  \ API 处理完您的请求后，您从 API 收到的数据或响应。输出格式可能因 API 而异，但通常以 JSON 或 XML 格式提供。例如，“发送付款”操作的输出可能是一个包含成功状态和交易\
  \ ID 的确认消息。\n\n在接下来的章节中，我们将为请求输入和输出创建一个类，以便稍后对其进行反序列化和验证。\n\n*   您会注意到在本节中，一些模型的属性被包裹了\
  \ Symfony 验证约束。在“第 5 节 验证操作”中，我们将学习如何根据这些属性所持有的约束条件来验证这些模型。\n\n### 输入模型\n\n下面是一个表示\
  \ API 输入请求模型的类：\n\n```\nnamespace App\\Api\\Input;\n\nuse Symfony\\Component\\Validator\\\
  Constraints\\NotBlank;\n\nreadonly class ApiInput\n{\n    public function __construct(\n\
  \        #[NotBlank(message: '操作名称不能为空')]\n        public string $operation,\n \
  \       public array $data = []\n    ) {}\n}\n```\n\n输入模型包含以下属性：\n\n*   **操作**：保存我们要执行的操作的名称。\n\
  *   **数据**：保存执行操作所需的数据。如果操作不需要数据，则此属性可以为空。\n\n前面的 `ApiInput` 模型使用了 `NotBlank` Symfony\
  \ 验证约束，这意味着操作名称不能为空。\n\n### 输出模型\n\n```\nnamespace App\\Api\\Output;\n\nreadonly\
  \ class ApiOutput\n{\n    public function __construct(\n        public mixed $data,\n\
  \        public int $code\n    ) {}\n}\n```\n\n输出模型包含以下属性：\n\n*   **数据**：操作执行结果。它可以是一个对象数组、一个简单对象，如果操作不返回任何结果，甚至可以为空。\n\
  *   **代码**：响应中返回的 HTTP 状态码。在选择输出 HTTP 状态码时，我们应该考虑以下提示：\n    *   如果我们返回最终的操作结果，我们应该选择\
  \ `200 OK` HTTP 状态码。\n    *   如果我们返回一个操作进程跟踪键（端点接受执行，但执行被延迟），我们应该选择 `202 ACCEPTED`\
  \ HTTP 状态码。\n    *   如果我们不返回任何操作结果，我们应该选择 `204 NO CONTENT` HTTP 状态码。`204` 只能在不返回任何内容时使用，即使是一个空的\
  \ JSON 对象也不应该返回。\n\n\n\n### 操作输入模型\n\n每个操作执行时都可能需要一些数据。例如，一个支付操作需要指定支付金额和收款方。由于每个操作执行的任务不同，它们的输入模型也各不相同。\n\
  \n以下示例展示了一个假设的支付操作模型：\n\n```\nuse Symfony\\Component\\Validator\\Constraints as\
  \ Assert;\nreadonly class SendPaymentInput\n{\npublic function __construct(\n#[Assert\\\
  NotBlank(message: '收款方不能为空')]\npublic string $receiver,\n#[Assert\\NotBlank(message:\
  \ '金额不能为空')]\n#[Assert\\GreaterThan(0, message: '金额必须大于 0')]\npublic float|int $amount,\n\
  ){}\n}\n```\n\n与之前的 `ApiInput` 模型类似，`SendPaymentInput` 模型也使用了 Symfony 的 [NotBlank](https://symfony.com/doc/current/reference/constraints/NotBlank.html)\
  \ 约束，以指定 `receiver` 和 `amount` 属性值都是必填的。这意味着如果缺少其中任何一个值，`SendPayment` 操作就无法执行。此外，它还使用了\
  \ [GreaterThan](https://symfony.com/doc/current/reference/constraints/GreaterThan.html)\
  \ 约束来指定金额必须大于 0。\n\n最后一个输入模型指定了 `receiver` 和 `amount` 属性都是必填的。然而，有些输入模型可能允许某些参数是可选的。例如，`SendPaymentInput`\
  \ 模型可以包含一个可选的支付标签。我们可以利用 PHP 的类型提示功能将 `label` 标记为可选：\n\n```\nuse Symfony\\Component\\\
  Validator\\Constraints as Assert;\nreadonly class SendPaymentInput\n{\npublic function\
  \ __construct(\n#[Assert\\NotBlank(message: '收款方不能为空')]\npublic string $receiver,\n\
  #[Assert\\NotBlank(message: '金额不能为空')]\n#[Assert\\GreaterThan(0, message: '金额必须大于\
  \ 0')]\npublic float|int $amount,\npublic ?string $label = null\n){}\n}\n```\n\n\
  如你所见，该模型将 `label` 声明为一个可选的字符串（使用了 `?` 修饰符），并将 `null` 作为其默认值。\n\n### 操作输出模型\n\n与我们为输入数据创建模型的方式相同，我们也可以为输出数据创建模型。继续以\
  \ `SendPaymentInput` 操作为例，我们来创建一个包含两个属性（`id` 和 `status`）的输出模型。\n\n```\nreadonly\
  \ class SendPaymentOutput\n{\npublic function __construct(\npublic string $id,\n\
  public string $status\n){}\n}\n```\n\n这个输出模型将在操作执行后用于表示结果。\n\n```\n$id = '......';\n\
  $status = 'ACCEPTED';\nreturn new ApiOutput(\nnew SendPaymentOutput($id, $status),\n\
  \n);\n```\n\n这种方式比使用原始数组要好，因为它为返回的数据提供了清晰的结构。这使得开发者更容易理解预期的响应格式。\n\n对于从数据库返回结果数据的操作（例如，返回一个\
  \ `Client` 实体的元素列表的操作），我们应该创建具体的输出数据对象，而不是直接序列化实体本身。通过创建专门的输出对象（也称为 DTO – 数据传输对象），你可以在业务逻辑和数据表示之间保持清晰的分离。这有助于防止持久化逻辑和基础设施关注点泄露到表示层。\n\
  \n在下一节中，我们将分析一个完整的示例。\n\n"
- '# 总结


  在本节中，我们创建了开始构建操作所需的基本模型。在下一节中，我们将学习如何创建操作以及如何创建必要的服务来容纳它们。


  ## 第 2 节：构建操作


  本节概述了创建定义良好的 API 操作的关键原则：


  - **接口强制**：每个操作都必须实现一个特定的接口。该接口定义了一个标准方法，所有操作都必须使用它来封装其执行逻辑。这有助于提升一致性并简化操作管理。

  - **元数据用于清晰**：每个操作都将用一个元数据属性进行标记。该属性作为一个中心位置，用于存储有关操作的基本信息，例如其名称和表示其输入模型的类。这种元数据增强了代码的可读性并简化了操作的发现。


  总之，这些原则确保了 API 操作结构良好、可维护，并具有清晰的执行逻辑和易于访问的元数据。


  ### 操作接口


  `OperationInterface` 充当一个契约，所有操作都必须实现它。`perform` 方法将是操作用来封装其逻辑的方法。


  ```

  namespace App\Api\Operation;

  use App\Api\Output\ApiOutput;

  use Symfony\Component\DependencyInjection\Attribute\Autoconfigure;

  #[Autoconfigure(tags: [''api.operation''])]

  interface OperationInterface

  {

  public function perform(mixed $data): ApiOutput;

  }

  ```


  [AutoConfigure](https://symfony.com/doc/current/service_container/tags.html%2523autoconfiguring-tags)
  属性告诉 Symfony 内核，那些实现了此接口的服务将被标记为 `api.operation`。这意味着每个操作在实现了 `OperationInterface`
  后都会被如此标记。


  `perform` 方法必须返回一个 `ApiOutput` 类的实例。如果你还记得上一节的内容，这个类保存了操作请求的结果。


  ### 操作元数据


  操作元数据属性包含两个属性。第一个指定操作名称，第二个指定操作输入模型的类。


  ```

  namespace App\Api\Attribute;

  #[\Attribute(\Attribute::TARGET_CLASS)]

  readonly class OperationMetadata

  {

  public function __construct(

  public string $name,

  public ?string $input = null

  ){ }

  }

  ```


  一个请求操作的有效负载将在执行操作之前被反序列化为由 `$input` 参数指定的输入类。如果输入类的属性使用了 Symfony 验证约束进行注解，那么反序列化后的模型还将被验证，以确保接收到的数据是有效的。


  我们将在本章的剩余部分看到整个过程。


  ### 一个操作类


  到目前为止，我们知道一个操作必须实现 `OperationInterface`，并且需要使用 `OperationMetadata` 属性进行标记。在本节中，我们将展示一个操作类的示例。


  ```

  namespace App\Api\Operation;

  use App\Api\Attribute\OperationMetadata;

  use App\Api\Input\Operation\SendPaymentInput;

  use App\Api\Output\ApiOutput;

  #[OperationMetadata(

  name: ''SendPayment'',

  input: SendPaymentInput::class

  )]

  class SendPaymentOperation implements OperationInterface

  {

  /**

  * @param SendPaymentInput $data

  */

  public function perform(mixed $data): ApiOutput

  {

  // 该方法将包含负责发送支付的代码

  $id = ''......'';

  $status = ''ACCEPTED'';

  return new ApiOutput(new SendPaymentOutput($id, $status), 202);

  }

  }

  ```


  操作元数据属性指定了操作名称（`SendPayment`）和输入数据类名（`SendPaymentInput`）。`perform` 方法将执行操作，并返回包含输出模型形式的结果以及
  HTTP 响应码的 `ApiOutput`。


  为了避免在元数据的 `name` 参数中硬编码操作名称，我们可以创建一个 PHP 枚举来集中管理所有操作名称：


  ```

  enum OperationNames

  {

  case SendPayment;

  }

  ```


  现在，我们可以这样修改 `OperationMetadata` 的 `name` 参数：


  ```

  #[OperationMetadata(

  name: OperationNames::SendPayment->name,

  input: SendPaymentInput::class

  )]

  ```




  ### `Array` 作为操作结果输出


  在上一节中，我们讨论了从数据库返回结果数据的操作。我们明确指出，最好创建一个具体的输出模型，而不是直接序列化数据库实体，这样能防止持久化逻辑和基础设施问题泄露到表示层。假设我们正在创建一个操作来返回数据库中存储的客户数据。我们可以将这个操作命名为：`GetClients`。


  在创建操作之前，我们先为客户实体创建一个输出模型。假设我们只想返回客户名称、企业邮箱、联系人姓名和联系人电话。


  ```

  readonly class ClientOutput {

  public function __construct(

  public string $name,

  public string $email,

  public string $contactName,

  public string $contactPhone

  ){}

  }

  ```


  现在，我们已经准备好创建 `GetClientsOperation` 类：


  ```

  #[OperationMetadata(

  name: ''GetClients'',

  input: GetClientsInput::class

  )]

  class GetClientsOperation implements OperationInterface

  {

  public function __construct(

  private readonly EntityManagerInterface $em

  ){}

  /**

  * @param GetClientsInput $data

  */

  public function perform(mixed $data): ApiOutput

  {

  $clients = $this->em->getRepository(Client::class)->findAll();

  $clientsOutput = [];

  foreach($clients as $client) {

  $clientsOutput[] = new ClientOutput(

  $client->getName(),

  $client->getEmail(),

  $client->getContactName(),

  $client->getContactPhone()

  );

  }

  return new ApiOutput($clientsOutput, 200);

  }

  }

  ```


  如上述代码所示，即使对 `Client` 实体进行了修改，也不会影响到表示层，这可以防止某些类型的错误，例如序列化过程中的循环引用问题。


  我想强调的是，负责遍历客户列表并为每个客户创建 `ClientOutput` 的代码应该放在主操作之外，理想情况下应置于一个独立的服务中。通过这样做，我们可以有效地解耦功能，增强可维护性和可扩展性。由于本书并非专注于
  SOLID 原则或如何构建面向领域的应用，我们不会再对此方面进行深入讨论。


