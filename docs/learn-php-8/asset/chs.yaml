  $lab = $container->create_object($properties_array);\nif ($lab != FALSE) {\nerror_check_dog_app($lab);\n\
  get_properties($lab);  }\nelse { print \"系统错误 #2\"; }\n}\nelse {\nprint \"缺少或参数无效。\n\
  请返回 dog.html 页面以输入有效信息。\";\nprint \"创建狗狗页面\";\n} }\n```\n\n然后，程序创建一个 `dog_container`\
  \ 实例（`$container`），并将 `$dog_app` 的值传递给该 `$container` 对象。`Dog` 对象的每个属性均使用 `filter_var`\
  \ 方法进行过滤。接着，这些属性被传递到 `$properties_array` 数组中。该数组随后被传递给 `dog_container` 对象（`$container`）的\
  \ `create_object` 方法。如果 `Dog` 对象（`$lab`）创建成功，则会调用 `error_check_dog_app` 方法来验证每个属性的信息是否有效。然后调用\
  \ `get_properties` 方法来显示每个属性。\n\n如果 `Dog` 对象所需的任何属性缺失，系统会提示用户返回 `lab.html` 页面重新输入所需信息。\n\
  \n```\nelse\n{ //获取品种\n$container = new dog_container(\"selectbox\");\n$properties_array\
  \ = array(\"selectbox\");\n$lab = $container->create_object($properties_array);\n\
  if ($lab != FALSE)\n{\n$container->set_app(\"breeds\");\n$dog_app = $container->get_dog_application();\n\
  $method_array = get_class_methods($lab);\n$last_position = count($method_array)\
  \ - 1;\n$method_name = $method_array[$last_position];\n$result = $lab->$method_name($dog_app);\n\
  if ( $result == FALSE) // 选择框未创建\n{\nprint \"系统错误 #3\";\n}\nelse\n{\nprint $result;\
  \ // 选择框已创建！\n}\n}\nelse\n{\nprint \"系统错误 #4\";\n}\n```\n\n\n\n如果 `$dog_app` 值未传入类中，则会执行\
  \ `else` 语句。此时假定用户想要创建一个 `getBreeds` 对象。创建了 `dog_container` 的一个实例（`$container`），并向其传递值\
  \ `selectbox`。（如果对象无法创建，则会显示 `\"System Error #4\"`。）字符串“selectbox”被传入数组 `$properties_array`（注意：必须使用\
  \ `array` 关键字，否则我们创建的是属性而非数组）。然后，容器对象（`$container`）会调用 `create_object`（传入 `$properties_array`\
  \ 以创建 `getBreeds` 类的一个实例（`$lab`））。如果 `getBreeds` 对象成功创建（`$lab != FALSE`），那么我们需要找到\
  \ `get_breeds.xml` 文件（其中包含品种列表）的位置。因此，我们重置容器中的应用程序属性（通过调用 `set_app`）为“breeds”。这告诉容器程序我们是一个\
  \ `getBreeds` 对象，而不是一个 `dog` 对象。然后，我们使用容器的 `get_dog_application` 方法来查找品种 XML 文件的位置。\n\
  \n*有关数组的更多信息，请访问* [*www.php.net/manual/en/function.array.php*](http://www.php.net/manual/en/function.array.php)*。*\n\
  \nPHP 方法 `get_class_methods` 用于创建一个包含 `getBreeds` 中方法的数组。由于 `get_select` 方法是唯一的方法（除了构造函数），因此它也是数组中的最后一个方法。从数组中提取其名称，然后使用属性\
  \ `$method_name` 调用它（`$result = $dog_data->$method_name($dog_app)`）。这使得 `getBreed`\
  \ 类完全独立于 `dog_interface`。开发者可以更改 `get_select` 方法的名称，一切仍能正常工作（只要它是类中的最后一个方法）。这实现了界面层与业务规则层的完全分离。\n\
  \nXML 文件的位置被传入 `getBreeds` 对象（`$lab`）的 `get_select` 方法中，该方法使用 XML 文件中的数据来创建选择列表框。选择列表框的代码被放入\
  \ `$result` 中。如果代码确实被放入了 `$result`，则代码会显示（`print $result`）回 HTML 表单中，供用户选择品种。如果文件名无效，则会显示错误消息（`print\
  \ \"System Error #3\"`）而不是选择框。\n\n唯一需要的其他更改是对 `lab.html` 和 `get_breeds.js` 文件的两处轻微改动。\n\
  \n```\nfunction AjaxRequest($value)\n```\n\n在 `get_breed.js` 文件中，`AjaxRequest` 方法的函数头已更改，以传递实际被调用的文件（这不是此设计的要求，但它允许此文件用于任何通过\
