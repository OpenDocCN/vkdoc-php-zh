    如您所见，`readRecords()` 方法比 `displayRecords()` 方法更简单。该方法结果的所有格式化工作都留给调用程序（如果需要）。请记住，输出的显示和格式化发生在界面层，而不是数据层（或业务规则层）。此方法允许调用程序请求所有记录或特定记录。无论哪种情况，它都会返回一个数组，其中包含一行（请求的特定记录）或所有行。当返回所有行时，会移除顶层数组（代表行的
    XML 标签），以保持两种选择下的维度（二维）相同。


    `insertRecords()` 方法接受一个关联数组，其下标名称如前所述。然而，为了实现对 XML 文件标签名称的依赖注入和灵活性，调用程序直到创建了
    `dog_data` 类的实例后才需要知道标签名称。这可以通过使用 `readRecords()` 方法拉取第一条记录，然后让调用程序检查从该记录返回的下标名称来实现。


    ```

    function insertRecords($records_array)

    {

    $dogs_array_size = count($this->dogs_array["dog"]);

    for($I=0;$I<count($records_array);$I++)

    {

    $this->dogs_array["dog"][$dogs_array_size + $I] = $records_array[$I];

    }

    }

    ```


    **注意**


    使用前面展示的 JSON 函数创建 `dog_array` 的过程会在创建 `dog_array` 时产生一个不一致之处。如果 `dog_data.xml`
    文件只包含一条记录，JSON 函数将不会创建数字索引（例如 `''0''`）。当 XML 文件中包含多条记录时，则会创建数字索引（例如 `''0''`、`''1''`）。


    在 `insertRecords()` 方法中，所有记录都被添加到数组的末尾（调用程序可以在需要时对其进行排序）。`dogs_array` 的当前大小由 `count`
    方法确定并存储在 `$dogs_array_size` 中。`for` 结构内部也使用了 `count` 方法来确定 `$records_array` 的大小以及循环次数。由于
    `count` 方法的结果给出了数组的大小，该值比最后一个下标位置大 1，因此 `count` 的结果也提供了可插入记录的下一个可用位置。在第一次循环中，`$I`
    为 0。`$records_array` 的第一条记录被放置在 `$dogs_array_size` 加 0 的位置，即 `$dogs_array_size`（第一个用于放置记录的空行）。下一次循环时，`$records_array`
    的第二条记录（`$I` 已由循环递增）被放置在位置 `$dogs_array_size` 加 1 处。这是插入第一条记录后的下一个可用位置。循环将持续进行，直到
    `$records_array` 中没有更多记录。顺便说一句，此方法也适用于仅插入一条记录的情况（只要它作为关联数组传递）。循环将仅执行一次。


    我们需要考察的最后一个方法是 `update` 方法。此方法是析构方法的一种非常简单的形式。


    ```

    function updateRecords($records_array)

    {

    foreach ($records_array as $records=>$records_value) {

    foreach ($records_value as $record => $record_value) {

    $this->dogs_array["dog"][$records] = $records_array[$records];

    }

    }

    }

    ```


    这个非常小巧的方法将接受任何大小的关联数组并更新 `dogs` 数组。它基于 PHP 动态构建数组的能力。


    ```

    $records_array = Array (

    0 => Array ( "dog_name" => "Jeffrey", "dog_weight" => "19",

    "dog_color" => "Green", "dog_breed" => "Lab" ),

    2 => Array ( "dog_name" => "James", "dog_weight" => "21",

    "dog_color" => "Black", "dog_breed" => "Mixed" ));

    ```


    动态构建的数组不需要为数组中的每个位置都包含值。如果前面展示的动态数组被传递给 `updateRecords()` 方法，那么记录 0 和记录 2 的将被新信息更新。`dogs`
    数组中位置 1 的值将保持不变。花点时间看看这些方法。在这些方法中，只有两个 XML 标签被硬编码（`dogs` 和 `dog`）。即便这两个标签也可以从
    XML 文件中获取。但是，假设这些标签始终存在于一个有效的狗类 XML 文件中，这在逻辑上是合理的。通过从 XML 文件动态提取所有其他标签（`dog_name`、`dog_weight`、`dog_color`
    和 `dog_breed`），可以在不引起任何代码更改的情况下对文件进行修改。可以添加、删除和/或更改额外的标签。


