  \ $value);\n            }\n        }\n\n        // get the users\n        if ($row\
  \ = $table->fetchRow($query))\n        {\n            $user->_populate($row->toArray());\n\
  \            return $user;\n        }\n\n        return null;\n    }\n\n    public\
  \ static function count($where = null)\n    {\n        $user = new self();\n   \
  \     $table = $user->getTable();\n        $query = $table->select()->from($table,\
  \ array(\"num\" => \"COUNT(1)\"))->limit(1);\n\n        // narrow search\n     \
  \   if (is_array($where))\n        {\n            foreach ($where as $key => $value)\n\
  \            {\n                $query->where($key, $value);\n            }\n  \
