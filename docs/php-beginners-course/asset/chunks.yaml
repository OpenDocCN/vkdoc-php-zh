- fmt: '打开您选择的文本编辑器，并输入以下代码行：


    ```php

    <?php


    echo "Hello World!";


    ?>

    ```


    将此文本保存在Web服务器安装目录下的`htdocs`文件夹中，并将文件命名为`hello.php`。


    文件扩展名`.php`表明这是一个PHP脚本。我们的脚本以`<?php`开头，服务器会识别出接下来的代码行直到`?>`为止：这些行不会被直接输出，而是首先由PHP解释器处理。


    在编程世界中，有所谓的解释器和编译器。编译器会先处理完整的程序代码，并生成一个用机器语言编写的最终程序，可以像`.exe`或`.app`文件那样干净地打包交付给客户。这个过程称为编译。复杂项目的编译有时需要很长时间。特别是在动态Web开发领域，访问者不希望等待太久才能看到页面完全组装好。因此，PHP始终是从代码中重新解释的，也就是说，在每个页面请求时，代码会逐行执行，并实时组装页面（尽管最终交付给访问者的仍然是完整的页面）。


    在我们简短的代码示例中，可以看到`echo "Hello World!";`这一行，这才是我们真正的脚本。PHP中的每条命令都以分号结尾，分号位于该行末尾。一条命令可以跨越多行，此时只有最后一行以分号结尾。`echo`命令在PHP中负责向访问者的浏览器返回一个文本字符串。字符串必须用引号括起来，这样PHP才能知道哪些是命令、哪些是字符串。在大多数情况下，使用单引号还是双引号并无区别。


    只需注意，所有字符串应使用同一字符闭合。大多数文本编辑器会高亮显示字符串，因此可以轻松识别它们是否正确闭合。


    当我们在浏览器中访问以下地址时：`http://127.0.0.1/hello.php`（或根据操作系统不同，也可能是`http://127.0.0.1:4444/hello.php`）


    我们的PHP脚本就会执行。


    如果服务器配置正确且PHP脚本能够执行，浏览器中会显示以下输出：


    ```

    Hello World!

    ```


    如果你也看到了这个结果，恭喜你成功运行了第一个PHP脚本。


    如果没有成功，可能的错误原因包括：服务器未运行或已自行关闭，或者`echo`命令所在代码行的末尾缺少分号。


    **变量（信息存储器）**


    现代编程语言的关键组成部分之一是变量。它们充当小型的信息存储器。变量可以存储各种类型的值，例如文本字符（称为`String`）、数字（无小数位时称为`Integer`，有小数时称为`Decimal`或`Float`）、日期或其他一些值。


    在许多编程语言中，创建变量时需要定义你想保存的值的类型。因此有只能存储文本字符串的`Char`变量，或者只能存储数字的`Integer`变量。PHP的变量类型是动态的。你无需指定一个变量只能存储数字、字符或其他特定类型的信息。PHP中的变量可以先包含文本，之后在脚本中再变成一串数字。


    在本文后续内容中，你将学习如何根据变量的当前值预判或控制变量的程序运行走向。


    **初始化变量**


    在我们之前的第一个PHP脚本中，我们编写了文本"`Hello World!`"。现在，我们不直接将文本放在`echo`命令之后，而是先将其保存在一个变量中，然后让`echo`命令输出该变量的内容。


    ```php

    <?php


    $myText = "Hello World!";


    echo $myText;


    ?>

    ```


    在PHP中，变量前面要加上美元符号（`$`）。变量名可以任意，但不能包含空格，只能由大小写字母、数字和下划线组成。'
  raw: 'Open the text editor of your choice and type in the following lines of code:


    <?php


    echo "Hello World!";


    ?>


    Save this text in the htdocs folder inside the web server installation and name
    the file hello.php.


    Already the file extension .php shows that there is a PHP script on one file.
    Our script begins with the line are PHP code and not 1 <?php, which our server
    will recognize that the following lines to ?>: 1 output, but to be first processed
    by our PHP interpreter.


    In the world of programming, there are so-called interpreters and compilers. Compilers
    first process a complete program code and generate a finished program in machine
    language that can be supplied clean packed, for example in an .exe or .app file
    to the customer. This process is called compiling. The compilation of complex
    projects can sometimes take a long time. Especially in the field of dynamic web
    development the visitors don’t want to wait to long for the site to be fully assembled.
    So PHP is always interpreted fresh out of the code, that is, on every page request
    the code line by line and went for quasi live assembled the page (it is still
    only the finished page delivered to the visitors).


    In our short code example, we find also the line echo "Hello World!"; which is
    our original script. Each command within PHP is terminated with a semicolon, which
    is located at the end of the line. A command could be long over several lines,
    then only the last line is terminated with a semicolon. The echo command returns
    in PHP a text string to the visitor''s browser. Strings must be enclosed by quotation
    marks, so that PHP knows what’s a command and what’s a string. Whether single
    or double quotes are used, in most cases, does not matter.


    Just be aware that once again includes all strings with the same character. Most
    text editors raise strings produce color and thus can be recognized, if they were
    again closed properly easy.


    When we call now following in our browser the following address http://127.0.0.1/hello.php
    (or http://127.0.0.1:4444/hello.php depending on the operating system)


    our script from PHP gets executed.


    If the server is set up correctly and the PHP script could be executed, then the
    following output is displayed within the browser:


    Hello World!


    If this is the case for you, congratulations on your first PHP script.


    If not, it could be a possible source of error that either the server is not running
    or has disabled itself, or that the semicolon is missing at the end of the line
    of code with the echo command.


    **Variables (information stores)**


    One of the key components of a modern programming language are variables. These
    serve as small information stores. Variables can store values of various kinds.
    E.g. text characters (called String), numbers (without decimal digits they are
    named Integer, with Decimal or Float), a date or a number of other values.


    In many programming languages you to define which type of values you want to save
    when you create a variable. So there are Char variables that can store text strings
    only, or so-called integer variables, where you can store numbers. PHP is dynamic
    in variable types. You don’t need to specify whether a variable can only store
    numbers, characters, or else a certain type of information. A variable in PHP
    can also first contain a text and later in the script only a sequence of numbers.


    Later in this text you will learn how to anticipate or control the variable program
    runoff depending on the current value of a variable.


    **Initialize variables**


    In our previous first PHP script, we wrote the text "Hello World!". Now we would
    not set the text right behind the echo command, but save it first in a variable
    and then the echo command should give us the content of this variable.


    <?php


    $myText = "Hello World!";


    echo $myText;


    ?>


    In PHP variables are preceded by a dollar sign ($). The variable name is arbitrary,
    but it must not contain spaces, but only small and uppercase letters, numbers
    and underscores.'
