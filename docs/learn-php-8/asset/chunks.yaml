    \ button, and the contents in\nthe property are the contents of the `value` attribute\
    \ of\nthe button selected. This will help `dog_interface`\ndetermine which type\
    \ of changes the user is requesting. These buttons\nare also included on the non-JavaScript-enabled\
    \ form. Remember, in this\nexample, non-JavaScript-enabled browsers will require\
    \ users to enter all\ninformation needed to successfully accomplish an `insert`,\
    \ `delete`, or `update`.\nHopefully, the changes we just looked at are pretty\
    \ understandable.\nWe are now going to look at some JavaScript code to handle\
    \ this data. As\nmentioned, the manipulation of data by JavaScript is a common\
    \ task in\nweb applications. While this is not a JavaScript book, it is important\n\
    that any web applications developer be familiar with JavaScript. I think\nyou\
    \ will see that the structure of the JavaScript language is similar to\nthe structure\
    \ of the PHP language.\n\nFirst, we will look at the changes to the `get_breeds.js`\
    \ file\n(from Chapter [5](#394210_2_En_5_Chapter.xhtml)). The file is renamed\
    \ to `getlists.js` to\nreflect that it will now handle the `getBreeds`  and\n\
    `dogs` list\nboxes.\n\n```\nfunction HandleResponse(response)\n{\nvar responsevalues\
    \ = response.split('|');\ndocument.getElementById('AjaxResponse').innerHTML =\
    \ responsevalues[0];\ndocument.getElementById('AjaxReturnValue').innerHTML = responsevalues[1];\n\
    obj = JSON.parse(responsevalues[2]);\n}\n```\n\nAll the code changes are in the\
    \ `HandleResponse`\nmethod  of the\nJavaScript file. Previously, the values in\
    \ the response property (passed\nto the method) were directly passed into the\
    \ `div` tag with the\n`AjaxResponse`\nID. At that point, only the list box code\
    \ for the breeds was returned.\nNow the method will accept three types of information\
    \ (the breeds list\nbox, the dogs list box, and the dogs array). To reduce the\
    \ number of\ncalls to the web server, one AJAX call is made. It returns all the\n\
    information into the `response` property.\nThe information will be separated by\
    \ using the pipeline (`|`) symbol. Soon we\nwill see that the formation of this\
    \ string will occur in the `dog_interface`\nprogram."
  trans: "\n# 图 9-1\n带有狗狗列表框的 `lab.php` 文件\n\n图 9-2 展示了当用户选择“新建”时的结果。所提供的默认值与前面章节中显示的一致。唯一可见的变化是输入按钮的文本。这种方法的缺点在于当用户未启用\
    \ JavaScript 时会出现问题。在这个例子中，如果 JavaScript 未启用，我们将要求输入所有信息。我们可以通过 `Dog` 类从 `dog_data`\
    \ 类请求单个狗狗的信息。虽然这种方法不如我们即将使用的 JavaScript 方法高效，但比起要求输入所有信息，它对用户更加友好。\n\n![../images/394210_2_En_9_Chapter/394210_2_En_9_Fig2_HTML.jpg](img/394210_2_En_9_Fig2_HTML.jpg)\n\
    \n# 图 9-2\n选择了“新建”的 `lab.php` 文件\n\n图 9-3 展示了当选中一只已有狗狗时的结果。列表框中显示了狗狗的名字和品种（以尽可能确保唯一性）。此外，也可以提供一个狗狗\
    \ ID 来标识特定的狗狗。当选中狗狗时，狗狗信息（`dog_name`、`dog_color`、`dog_weight` 和 `dog_breed`）会填入表单中。然后用户可以更新或删除该狗狗信息。\n\
    \n![../images/394210_2_En_9_Chapter/394210_2_En_9_Fig3_HTML.jpg](img/394210_2_En_9_Fig3_HTML.jpg)\n\
    \n# 图 9-3\n选中了一只狗狗的 `lab.php` 文件\n\n> **注意**\n>\n> 此示例中提供的代码并未限制重复条目。因此，在实际运行环境中，需要使用一个额外的字段（狗狗\
    \ ID）来确保狗狗的唯一性。\n\n之前当执行 `insert` 操作时，系统会显示一条消息指示更改成功。如果需要再次更改，用户必须重新加载 `lab.php`\
    \ 文件。我们可以通过让 `dog_interface` 程序设置一个包含待返回消息的会话属性来解决这个问题。然后 `dog_interface` 可以调用\
    \ `lab.php` 文件，而该文件进而可以检查是否有消息需要显示。\n\n![../images/394210_2_En_9_Chapter/394210_2_En_9_Fig4_HTML.jpg](img/394210_2_En_9_Fig4_HTML.jpg)\n\
    \n# 图 9-4\n处理来自 `dog_interface` 消息的 `lab.php` 文件\n\n我们将结合使用 PHP 代码、JavaScript\
    \ 代码和 CSS 代码来达到预期的效果。让我们逐项来看。\n\n```\n<?php\necho \"<h3>\";\necho \"登录 | 创建账户\"\
    ;\necho \"</h3>\";\n}\nelse if(($_SERVER['HTTP_REFERER'] ==\n'http://127.0.0.1:8080/mysite/bgchapter8/ExampleFile8/e8login.php')\
    \ || ($_SERVER['HTTP_REFERER'] ==\n'http://127.0.0.1:8080/mysite/bgchapter8/ExampleFile8/e8lab.php'))\n\
    {\nif (isset($_SESSION['message'])) {\necho $_SESSION['message'];\n}\nelse {\n\
    echo \"欢迎回来，\" . $_SESSION['username'] . \"\";\n}}\n?>\n```\n\n位于实验室程序顶部的 PHP\
    \ 代码现在将包含一项额外的检查，以确定是否有消息被返回。虽然语句的 `if` 部分不需要任何更改，但 `else` 部分有几处额外的改动。请注意，新的 `if`\
    \ 语句会检查实验室程序是否是由自身调用的。当 `dog_interface` 使用 `header` 方法重新调用 `lab.php` 时，`$_SERVER['HTTP_REFERER']`\
    \ 方法会将 `lab.php` 返回为调用程序。此外，同一个 `if` 语句还会检查 `login.php` 是否调用了 `lab`。现在这是对 `lab.php`\
    \ 程序发起的唯一两种合法调用。`else` 块中的另一个 `if` 语句使用 `isset` 方法检查是否有 `$_SESSION['message']`\
    \ 被返回。如果它被返回了，则说明 `lab.php` 是由 `dog_interface` 调用的，因为登录不会返回 `$_SESSION['message']`。现在实验室程序会显示该消息。如果没有\
    \ `$_SESSION['message']`，则显示欢迎消息。\n\n现在我们来查看 `lab.php` 中的 HTML 代码。然后我们再看 CSS 和\
    \ JavaScript 代码。\n\n```\n<h1>ABC 犬类收容所预约系统</h1>\n\n<script>\nAjaxRequest('e8dog_interface.php');\n\
    </script>\n\n从下拉框中选取要更改的狗狗名字和品种，然后点击按钮。如需新建狗狗信息，请选择“新建”。\n请选择“新建”或狗狗的名字/品种\n\n\
    请留意信息的必需格式。\n\n输入狗狗的名字（最多 20 个字符，仅限字母） \n选择狗狗的颜色：\n棕色\n黑色\n黄色\n白色\n混色\n输入狗狗的体重（仅限数字）\n\
    \n选择狗狗的品种\n\n```\n\n除了一些小的显示消息更改外，还创建了一个新的 `div` 标签，其 ID 为 `AjaxReturnValue`，用于容纳狗狗列表框（它将为用户提供可供选择的狗狗列表）。后面跟着一个\
    \ HTML 按钮（不是提交按钮）。点击该按钮将导致 JavaScript 函数 (`process_select`) 执行。还添加了另一个包含 HTML\
    \ 表单的 `div` 标签。此表单将被隐藏，直到用户点击按钮。程序顶部包含了 CSS 代码 (`#input_form { display:none; }`)\
    \ 以防止表单显示。额外的 CSS 代码也阻止了按钮的显示。在表单底部，创建了一个隐藏属性 (`index`) 来保存所选狗狗的索引（来自狗狗数组）。初始值设置为\
    \ `-1`。当用户选择狗狗时，此属性将被更改。原始的提交按钮被三个提交按钮（一个用于插入，一个用于删除，一个用于更新）取代。无论点击哪个按钮，都会创建一个属性（`insert`、`delete`\
    \ 或 `update`）并设置为一个值。属性名称是按钮的 ID，属性中的内容是被点击按钮的 `value` 属性的内容。这将帮助 `dog_interface`\
    \ 确定用户请求的是哪种类型的更改。这些按钮也包含在未启用 JavaScript 的表单中。请记住，在这个例子中，未启用 JavaScript 的浏览器将要求用户输入成功执行\
    \ `insert`、`delete` 或 `update` 所需的所有信息。希望我们刚才看到的更改相当容易理解。\n\n现在我们来看一些处理这些数据的 JavaScript\
    \ 代码。正如前面提到的，通过 JavaScript 操纵数据是 Web 应用程序中的常见任务。虽然这不是一本 JavaScript 书籍，但任何 Web\
    \ 应用程序开发人员都熟悉 JavaScript 是很重要的。我想你会看到 JavaScript 语言的结构与 PHP 语言的结构相似。\n\n首先，我们将查看对\
    \ `get_breeds.js` 文件（来自第 5 章）的更改。该文件被重命名为 `getlists.js`，以反映它将处理 `getBreeds` 和\
    \ `dogs` 列表框。\n\n```\nfunction HandleResponse(response)\n{\nvar responsevalues\
    \ = response.split('|');\ndocument.getElementById('AjaxResponse').innerHTML =\
    \ responsevalues[0];\ndocument.getElementById('AjaxReturnValue').innerHTML = responsevalues[1];\n\
    obj = JSON.parse(responsevalues[2]);\n}\n```\n\n所有代码更改都在 JavaScript 文件的 `HandleResponse`\
    \ 方法中。以前，响应属性（传递给该方法）中的值被直接传递到 ID 为 `AjaxResponse` 的 `div` 标签中。那时，只返回了品种的列表框代码。现在该方法将接受三种类型的信息（品种列表框、狗狗列表框和狗狗数组）。为了减少对\
    \ Web 服务器的调用次数，只发起一次 AJAX 调用。它将所有信息返回到 `response` 属性中。信息将使用管道符 (`|`) 分隔。稍后我们将看到，这个字符串的形成将在\
    \ `dog_interface` 程序中进行。\n"
- fmt: 'We will need to break the data in a similar way that we broke previous data
    using the PHP `explode` method. In JavaScript, the `split` method will break a
    string into an array using a parameter provided (`|`). In the example, this will
    create the array `responsevalues`. `var` creates this array as local to the method.
    It will be destroyed, because it will no longer be needed, when the method closes
    (hits the `}` symbol). The array now has three rows. The first row (`[0]`) contains
    the `getBreeds` list box code. The second row (`[1]`) contains the `dogs` list
    box code. The third row (I bet you guessed that one) contains the complete dogs
    array.


    *Security and performance—In this application, the dogs information is not highly
    sensitive. Also, the information is displayed to the users. This allows the users
    to see and fix any data that might have been corrupted. For more sensitive information,
    the array should be declared using `private` to keep the data accessible only
    to the current method (function).*


    The subscripts (0, 1, and 2) can now be used to pull each part of the array and
    release it to the proper place. `responsevalues[0]` is placed in `AjaxResponse`
    to display the `getBreeds` list. `responsevalues[1]` is placed in `AjaxReturnValue`
    to display the dogs list box. The dogs array, since we will not know yet which
    dog the user has selected, will be placed in a JSON object (`obj`). As we have
    seen, JSON data includes named indexes and values, which are very similar to associative
    arrays in PHP. The `var` statement is not used because this object must be public
    and available to the complete application.


    If you remember from previous chapters, arrays cannot be directly formatted into
    strings. Arrays must be serialized. However, JSON data can also be passed in a
    string. We will soon see that the “array” in `responsevalues[3]` has been formatted
    as JSON data by the `dog_interface` program. JavaScript’s `JSON.parse` method
    has the ability to look at data and, if it is valid, transform it into a JSON
    object. This is very similar to the PHP method `json_encode`. Now let us look
    at how we can populate the form when the user picks a dog from the dogs list box.


    The JavaScript method `process_select` (called by the HTML button after the user
    picks from the dogs list) has been placed at the top of the code in the `lab.php`
    file. It could have also been placed in its own JS file and imported in the same
    way as the `getlists.js` file. This new method uses the information contained
    in `obj` (the JSON dogs object containing all the dogs) to populate the text boxes
    (`dog_name` and `dog_weight`), radio buttons (`dog_color`), and list box (`dog_breed`)
    with the information for the dog the user selects in the list box.


    ```

    function process_select() {

    var colorbuttons = document.getElementsByName(''dog_color'');

    ```


    First, all the color values from the radio buttons will be pulled from the HTML
    form and placed into an array called `colorbuttons` using the JavaScript method
    `getElementsByName`. `dog_color` (the name of each radio button) is passed into
    the method. This process will create an array of the radio buttons with the same
    indexes as the radio button subscripts for the color. For instance, the `0` position
    of the array will now contain `brown`, which is the first radio button displayed
    in the HTML form. This will allow us to set the proper color radio button by referencing
    its position (such as `colorbuttons[0]` to set `brown`).


    ```

    if(!(document.getElementById(''dogs'').value == -1))

    {

    index = document.getElementById(''dogs'').selectedIndex -1;

    document.getElementById(''index'').value = index;

    document.getElementById(''dog_name'').value = obj.dogs[index].dog_name;

    document.getElementById(''dog_weight'').value = obj.dogs[index].dog_weight;

    ```


    HTML list boxes include both text and values. The text is what the user sees;
    the value is what it represents. This is very similar to PHP associative arrays—keys
    (indexes) and values. The `if` statement checks the dogs array to determine its
    current value. If the value is `-1`, this indicates that the user did not select
    anything, or they selected NEW. The JavaScript `!` symbol works the same as the
    PHP `!` symbol. The symbol changes the `if` portion of the statement to execute
    when the value for `''dogs''` is not `-1`. Thus, the code will execute if the
    user has selected a dog from the dogs list box.


    The `selectedIndex` property of a list box indicates the index selected by the
    user. However, the HTML list box is numbered starting at 1. JavaScript arrays
    and JSON object indexes start at 0. This causes the `selectedIndex` to be one
    more than the position in a JavaScript array or JSON object. The code, in the
    example, subtracts 1 to balance out the relationship. This value is placed in
    index. It is also saved in the hidden property (on the HTML form) with the same
    name (`index`). Since `index` is a property and not a `div` tag, the JavaScript
    `value` property must be used to set the value of index.


    `obj` is the JSON object (with all the dogs) that was created when the AJAX call
    occurred. Information can be retrieved from a JSON object in a very similar way
    as PHP associative arrays. The `obj` object is similar to the multidimensional
    dogs array shown in previous chapters. The top array is the dogs “array”. In the
    dogs array are the “arrays” for each individual dog. These do not have an associated
    key name, but have a numerical index. Each dog array contains the individual elements
    (`dog_name`, `dog_color`, `dog_breed`, and `dog_weight`). The `index` property,
    set in the previous code line, contains the dog index selected by the user. It
    will be used to pull the selected dog information from `obj` to populate the form
    objects. Since we know the exact location of the data to be retrieved (in index),
    loops are not needed.


    `obj.dogs[index].dog_name` uses the JSON object name (`obj`), the top array name
    (`dogs`), the number of the dog array needed (`index`), and the name of the field
    required (`dog_name`) to access the required information. Again, the format is
    similar to pulling information from a PHP associative array. The `dog_name` and
    `dog_weight` values use this dot notation format to pull the information from
    the `obj` JSON object and place it in the appropriate text box on the HTML form.


    ```

    dog_color = obj.dogs[index].dog_color;

    if(dog_color == "Brown")

    {

    colorbuttons[0].checked = true;

    } else if (dog_color == "Black")

    {

    colorbuttons[1].checked = true;

    } else if (dog_color == "Yellow")

    {

    colorbuttons[2].checked = true;

    } else if (dog_color == "White")

    {

    colorbuttons[3].checked = true;

    }

    ```


    Setting the color requires a little more work. The `dog_color` is pulled from
    the `obj` object (`dog_color = obj.dogs[index].dog_color;`) and placed into a
    property (`dog_color`). An `if` statement is then used to determine what color
    exists in this property. (Yes, JavaScript has a `case` statement that you could
    have also used.) The `if` statement sets the `checked` property of the correct
    radio button to `true`, causing the radio button to be selected. Notice that the
    default value (`''mixed''`) is not included in the `if` statement. If the dog
    is `''mixed''`, or somehow the color did not have a value in the object, there
    is no reason to change from the default value (`''mixed''`).


    ```

    dog_breed = obj.dogs[index].dog_breed;

    document.getElementById(''dog_breed'').value = dog_breed;

    document.getElementById(''update'').style.display = "inline";

    document.getElementById(''delete'').style.display = "inline";

    document.getElementById(''insert'').style.display = "none";

    }

    ```'
