- fmt: '# The Controller


    The controller is the component that connects models and views together. Controllers
    isolate the business logic of a model from the user interface elements of a view,
    and handle how the application will respond to user interaction in the view. Controllers
    are the first point of entry into this trio of components, because the request
    is first passed to a controller, which will then instantiate the models and views
    required to fulfill a request to the application. See Figure [1-1](#index_split_000.html#p7).


