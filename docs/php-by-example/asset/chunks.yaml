    比起使用 `$number=(integer)trim(fgets(STDIN))` 语句，你也可以对 `$number` 变量进行显式赋值：例如，`$number=5`
    或 `$number=15`。


    另一个使用条件语句的示例见代码清单 3-2。它使用了一个复杂条件（包含逻辑运算符）以及条件语句的另一种语法形式。


    ```

    代码清单 3-2

    条件语句的另一种语法形式

    ```


    程序运行时，会提示用户输入一个介于 `1` 到 `5` 之间的质数。如果用户输入数字 `2`、`3` 或 `5`，则会显示消息 `You are correct!`。如果输入其他任何数字，则会显示消息
    `You are wrong!`。以下展示了用户输入指定范围内的质数时程序的输出效果（输入值以粗体显示）。


    ```

    程序的输出（来自代码清单 3-2）

    请输入一个介于 1 到 5 之间的质数：3

    You are correct!

    ```


    如果输入了 `2`、`3` 或 `5` 以外的数字，结果如下所示。


    ```

    程序的输出（来自代码清单 3-2）

    请输入一个介于 1 到 5 之间的质数：4

    You are wrong!

    ```


    你可以使用嵌套的条件语句来依次检查多个条件。但更好的做法是使用带有 `elseif` 分支的条件语句变体。以下展示了这种条件语句的调用语法。


    ```

    if(condition){

    # 命令

    }

    elseif(condition){

    # 命令

    }

    elseif(condition){

    # 命令

    }

    else{

    # 命令

    }

    ```


    这里使用了两个 `elseif` 分支，但原则上你可以使用任意多个 `elseif` 分支。接下来讨论一下条件语句的执行过程。首先检查 `if` 关键字后面的条件，如果该条件为真，则执行对应的命令分支。如果该条件为假，则检查
    `elseif` 分支中的条件。如果该条件为真，则执行对应 `elseif` 分支中的命令。如果该条件为假，则继续检查下一个 `elseif` 分支中的条件，以此类推。如果所有检查过的条件都为假，则执行
    `else` 分支中的命令。`else` 分支是可选的。


    以下是使用 `elseif` 分支的条件语句的另一种语法形式。


    ```

    if(condition):

    # 命令

    elseif(condition):

    # 命令

    elseif(condition):

    # 命令

    else:

    # 命令

    endif;

    ```


    也就是说，不使用花括号，而是在每个分支的开头放置一个冒号，并且整个结构以 `endif` 关键字结束（后跟分号）。


    来看一个求解 *Ax* = *B* 形式方程式的示例程序。根据参数 *A* 和 *B* 的取值，可能对应三种情况。第一种情况是 *A* ≠ 0，此时方程有唯一解
    *x* = *B*/*A*。第二种情况是两个参数都为零，即 *A* = 0 且 *B* = 0。如果这样，则方程的解为任意数。最后，第三种情况是 *A* =
    0 且 *B* ≠ 0，此时方程无解。代码清单 3-3 中的程序使用条件语句跟踪了所有这些情况。


    ```

    代码清单 3-3

    求解方程式

    ```


    程序会提示用户输入方程的参数，之后计算并输出结果。结果在很大程度上取决于输入的值。以下是方程有唯一解时程序的执行结果（用户输入的值以粗体显示）。


    ```

    程序输出（来自代码清单 3-3）

    求解方程 Ax=B

    A = 5.0

    B = 12.6

    x = 2.52

    ```


    以下是将两个参数都设为零时程序的执行结果。


    ```

    程序输出（来自代码清单 3-3）

    求解方程 Ax=B

    A = 0

    B = 0

    解为任意数

    ```


    也可能完全没有解。


    ```

    程序输出（来自代码清单 3-3）

    求解方程 Ax=B

    A = 0

    B = 1

    该方程无解

    ```


    在程序中，用户为 `$A` 和 `$B` 变量输入值。你使用 `(double)` 指令将其强制转换为 `double` 类型。求解过程通过条件语句实现。首先检查
    `$A!=0` 条件（即 `$A` 变量的值不为 `0`）。如果条件成立，则通过 `$x=$B/$A` 命令计算方程的解，并在控制台中显示。


    如果 `$A!=0` 条件为假（即 `$A` 变量的值为 `0`），则检查 `elseif` 分支中的 `$B==0` 条件。该条件为真（考虑到 `$A!=0`
    条件为假）意味着任意数都可作为解。


    最后，如果 `$B==0` 条件也为假，则方程无解。条件语句的 `else` 分支负责处理这种情况。

