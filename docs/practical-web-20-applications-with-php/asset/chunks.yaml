    in your code. Just remember to remove it afterward; otherwise, you will receive
    many e-mails.


    $logger->crit(''Test message'');


    Now whenever a critical message is recorded in your application logger, you will
    automatically be e-mailed! If you have an e-mail address that sends you an SMS
    message whenever you receive an e-mail, you can be instantly notified when something
    critical occurs.


    ■**Caution** With a system such as this, you must be very careful how the e-mail
    reporting works, since you will be e-mailed for every single HTTP request on your
    site that generates an error. If you run a high-traffic site, it’s likely you
    will bog down your own server and perhaps even be blacklisted from your mail server
    for sending so much e-mail. Because of this, you should strongly consider adding
    extra mechanisms so that duplicate messages aren’t sent within a short timeframe.
    For example, you could hash the generated messages and write this hash to the
    filesystem (using either the application temporary directory or the system temporary
    directory). Then the next time you go to send an e-mail, look for the hash of
    the new messages; if it exists and its age is less than *n* minutes (such as 15
    minutes), you can safely skip sending the e-mail.


    **Using Application Logs**


    It’s difficult to say exactly how you should use your log files because everybody’s
    mileage will differ. Certainly the e-mail capabilities improve the system in that
    you will be instantly notified if something goes wrong, but it’s also good to
    audit application data.


    As an example, we’re tracking user login attempts. We are recording both successful
    and unsuccessful attempts. We recorded successful attempts with the “notice” priority,
    while we recorded unsuccessful attempts with “warning” priority.


    If you wanted to find all unsuccessful login attempts, command-line tools such
    as grep will aid you with this:'
  trans: '

    # cp fckeditor_php5.php /var/www/phpweb20/include/FCKeditor.php


    现在我们来创建一个名为 `wysiwyg` 的新 Smarty 插件，以便在模板中通过 `{wysiwyg}` 调用。清单 8-25 展示了存储在 `./include/Templater/plugins`
    目录下的 `function.wysiwyg.php` 文件的内容。


    **清单 8-25.** 创建模板中 FCKeditor 的 Smarty 插件 (function.wysiwyg.php)


    ```

    <?php


    function smarty_function_wysiwyg($params, $smarty)


    {


    $name = '''';


    $value = '''';


    if (isset($params[''name'']))


    $name = $params[''name''];


    if (isset($params[''value'']))


    $value = $params[''value''];


    $fckeditor = new FCKeditor($name);


    $fckeditor->BasePath = ''/js/fckeditor/'';


    $fckeditor->ToolbarSet = ''phpweb20'';


    $fckeditor->Value = $value;


    return $fckeditor->CreateHtml();


    }


    ?>

    ```


    当我们在模板中调用这个 Smarty 函数时，需要提供两个参数：`name` 参数和 `value` 参数。`name` 参数定义了用户 HTML 提交所在的表单元素的名称。`value`
    参数设置 WYSIWYG 编辑器中显示的默认值。


    初始化这些参数后，我们实例化 `FCKeditor` 类。接下来，我们必须告诉 `$fckeditor` 对象编辑器代码相对于 Web 根目录的存储位置（我们将其存储在
    `http://phpweb20/js/fckeditor`）。然后，我们必须告诉它使用我们刚刚创建的新工具栏（`phpweb20`），而不是默认工具栏（`Default`）。接着，我们将默认值传递给该类。最后，我们调用
    `CreateHtml()` 方法生成 FCKeditor 的 HTML 代码，并将其返回给模板。


    **注意：** 你还可以设置编辑器的宽度和高度。默认情况下，使用 100% 的宽度和 200 像素的高度。要将高度更改为 300 像素，可以使用 `$fckeditor->Height
    = 300;`。


    现在唯一剩下的事情就是在 `./templates/blogmanager` 目录下的 `edit.tpl` 模板中调用 `{wysiwyg}`。清单 8-26
    展示了我们对此模板所做的修改。我将 WYSIWYG 编辑器移到了 `fieldset` 之外，以使表单看起来更美观。此外，我还将其包裹在一个类名为 `.wysiwyg`
    的 `div` 中，这样我们就可以添加一个新的 CSS 类，为编辑器周围添加一些额外的间距。


    这段新代码替换了模板中原来的 `textarea`。


    **清单 8-26.** 在模板中加载 WYSIWYG 编辑器


    ```

    <!-- // ... 其他代码 -->

    <fieldset>

    <legend>博客文章详情</legend>

    <!-- // ... 其他代码 -->

    </fieldset>

    <div class="wysiwyg">

    {wysiwyg name=''content'' value=$fp->content}

    {include file=''lib/error.tpl'' error=$fp->getError(''content'')}

    </div>

    <!-- // ... 其他代码 -->

    ```


    最后，我们在 `styles.css`（位于 `./htdocs/css`）中添加一个额外的样式，为编辑器周围添加一些额外的间距，如清单 8-27 所示。


    **清单 8-27.** 为 WYSIWYG 编辑器添加间距 (styles.css)


    ```

    .wysiwyg { margin : 10px 0; }

    ```


    通过创建一个 Smarty 插件来帮助加载 WYSIWYG 编辑器，加载编辑器变得非常简单，并且我们能够保持模板代码非常简洁。此外，你可以轻松地为该插件定义新参数，然后根据需要与
    `FCKeditor` 类一起使用。


    **总结**


    在本章中，我们扩展了第 7 章开始的博客文章管理工具。我们首先研究了如何高效地从数据库中选择大量数据，然后利用这些数据帮助用户管理他们的博客。


    接下来，我们扩展了博客文章列表的功能，使其支持 Ajax，从而更易于使用（因为每个页面加载速度更快）。我们实现的最大优势之一是，如果用户没有使用 JavaScript，它会自动回退到非
    Ajax 解决方案。


    本章的最后一步是实现 FCKeditor，这是一个开源 WYSIWYG 编辑器，允许用户轻松使用 HTML 格式化他们的博客文章。


    在下一章中，我们将专注于为每个用户创建一个公共首页，用于列出他们所有已发布的博客文章。届时，我们还将更新应用程序的首页，使其显示所有选择公开博客文章的用户所发布的文章。


    ---


    ## 第 9 章：个性化用户区域


    在第 7 章和第 8 章中，我们创建了用户管理博客所需的表单和工具，使他们能够创建、编辑和删除文章。在本章中，我们将进一步扩展 Web 应用程序，为每个用户创建一个公共首页，用于显示他们的博客文章。


    除了为每个用户创建首页外，我们还将填充 Web 应用程序的主页。主页将包含所有选择公开其博客文章的用户所发布的文章。用户可以通本章我们将添加到“你的账户详情”页面中的选项来进行选择。


    本章我们将探讨的一个关键技术是定义自定义 URL 方案，而不是使用之前使用的 `/控制器`/`操作` 方法。用户首页的地址将由他们的用户名定义，我们将操纵
    `Zend_Controller_Front` 的请求处理，以便 `http://phpweb20/user/*username*` 成为用户页面的唯一地址。将此与为博客文章定义的
    URL 字段相结合，我们还将为数据库中的每篇博客文章创建一个唯一的永久 URL。


    **控制用户设置**


    本章我们要做的第一件事是为用户实现一个设置管理系统。这将允许他们控制博客的行为方式。以下是我们要让用户能够控制的设置：


    -   **是否在应用程序主页上显示文章。** 在本章的最后一节中，我们将修改应用程序，如果用户选择公开，则在主页上显示所有注册用户的博客文章。默认情况下，我们不会在主页上包含用户的文章，但如果他们愿意，可以更改此设置。

    -   **其个人主页上显示的文章数量。** 当我们设置用户主页时，将在该页面上列出最新的文章。此设置允许用户控制其主页上显示的文章数量。要查看更多文章，访客可以点击某个月份以查看该月的所有文章。


    当我们在第 3 章创建用于管理用户数据的数据库表时，我们创建了两个表：`users` 和 `users_profile`。`users_profile` 表的设计目的是让我们能够轻松扩展为每个用户帐户存储的数据量。我们将使用此表来存储本节添加的设置。


    由于此系统的设计方式，如果你希望给用户更多控制其帐户或公共主页工作方式的权利，将来可以对其进行扩展。


    **注意：** 由于我们还为博客文章创建了一个配置文件表（`blog_posts_profile`），我们甚至可以添加针对每篇文章的设置。你可以在多种不同的场景中使用它。例如，如果你允许访客在博客文章上发布评论，你可以使用针对每篇文章的设置来禁用单篇文章的评论功能。将这些设置添加到界面的合适位置是在第
    7 章添加的“编辑博客文章”表单中。


    **向用户展示可自定义的设置**


    为了让用户控制这些设置，我们将其添加到“你的账户详情”页面。这涉及为此页面的模板添加必要的 HTML 元素，以及更新处理此表单的类（`FormProcessor_UserDetails`）。


    **注意：** 更新用户详情的代码在第 4 章末尾引入。我们实际上并没有在本书中实现这段代码，因此你需要先下载源代码来实现本节中的功能。这包括 `./include/FormProcessor`
    中的 `UserDetails.php` 文件、`./include/Controllers/AccountController.php` 中的 `detailsAction()`
    和 `detailscompleteAction()` 方法，以及 `./templates/account` 中的 `details.tpl` 和 `detailscomplete.tpl`
    模板。


    为了实现设置管理，我们首先要将前面描述的设置添加到“你的账户详情”模板中。清单 9-1 显示了我们将添加到 `./templates/account/details.tpl`
    模板中的 HTML 代码。这段代码还包含来自表单处理器的几个变量。我们稍后将会把这些变量添加到表单处理器中。


    **清单 9-1.** 允许用户在更新账户详情时配置设置 (details.tpl)


    ```

    {include file=''header.tpl'' section=''account''}

    <form method="post" action="{geturl action=''details''}">

    <fieldset>

    <legend>更新你的详情</legend>

    <!-- // ... 其他代码 -->

    </fieldset>

    <fieldset>

    <legend>账户设置</legend>

    <dl>

    <dt>

    你希望在你的主页上显示多少篇博客文章？

    </dt>

    <dd>

    <input type="text" name="num_posts" value="{$fp->num_posts}" />

    </dd>

    <dt>

    你希望在你的博客文章显示在网站主页上吗？

    </dt>

    <dd>

    <select name="blog_public">

    <option value="0"

    {if !$fp->blog_public} selected="selected"{/if}>否</option>

    <option value="1"

    {if $fp->blog_public} selected="selected"{/if}>是</option>

    </select>

    </dd>

    </dl>

    </fieldset>

    <div class="submit">

    <input type="submit" value="保存新详情" />

    </div>

    </form>

    {include file=''footer.tpl''}

    ```


    **提示：** 要创建符合标准的 XHTML，我们必须使用 `selected="selected"` 来选择 `<select>` 元素中的预选值。这与
    HTML 4.01 规范有所不同，该规范规定此类布尔值应使用不带属性值的 `selected` 来指定。类似地，在预选复选框（`<input type="checkbox"
    … />`）的状态时，应使用 `checked="checked"`。有关此内容的更多信息，请参考 `http://www.w3.org/TR/xhtml1/#h-4.5`
    上的“属性最小化”部分。


    已登录用户可以在 `http://phpweb20/account/details` 查看此表单。


    **处理用户设置的更改**


    接下来我们要做的更改是对处理 `details.tpl` 模板的表单处理器进行修改。首先，我们将从用户配置文件中检索现有设置，以便在表单中使用它们。然后，我们将处理提交的值并将其保存到用户配置文件。


    清单 9-2 显示了我们将对 `./include/FormProcessor` 中的 `UserDetails.php` 文件所做的更改。


    **清单 9-2.** 用户详情表单处理器的更改 (UserDetails.php)


    ```

    <?php

    class FormProcessor_UserDetails extends FormProcessor

    {

    // ... 其他代码

    public function __construct($db, $user_id)

    {

    // ... 其他代码

    $this->blog_public = $this->user->profile->blog_public;

    $this->num_posts = $this->user->profile->num_posts;

    }

    public function process(Zend_Controller_Request_Abstract $request)

    {

    // ... 其他代码

    // 处理用户设置

    $this->blog_public = (bool) $request->getPost(''blog_public'');

    $this->num_posts = max(1, (int) $request->getPost(''num_posts''));

    $this->user->profile->blog_public = $this->blog_public;

    $this->user->profile->num_posts = $this->num_posts;

    // 如果没有发生错误，则保存用户

    if (!$this->hasError()) {

    $this->user->save();

    }

    // 如果没有发生错误，则返回 true

    return !$this->hasError();

    }

    }

    ?>

    ```


    现在，用户可以通过提交图 9-1 所示的表单来更新他们的设置。


    **图 9-1.** 允许用户更新账户设置


    **创建默认用户设置**


    如果你仔细看图 9-1，可能会注意到 `num_posts` 设置是空的。换句话说，此设置只有在表单提交后才会设置。最好包含一些默认值，以便用户在使用此表单时对更改设置有个参考点。


    为了给新用户帐户分配默认设置，我们将修改 `DatabaseObject_User` 类上的 `preInsert()` 方法。此方法会在新用户记录保存到数据库之前自动调用——我们之前使用此方法为新帐户创建了密码。


    清单 9-3 显示了我们将对 `./include/DatabaseObject` 中的 `User.php` 文件所做的更改。我将 `num_posts`
    的默认值设置为 10，并为 `blog_public` 选择了 `false` 作为默认设置。你可能更喜欢不同的值。


    **清单 9-3.** 为用户分配默认设置 (User.php)


    ```

    <?php

    class DatabaseObject_User extends DatabaseObject

    {

    // ... 其他代码

    protected function preInsert()

    {

    $this->_newPassword = Text_Password::create(8);

    $this->password = $this->_newPassword;

    // 默认帐户设置

    $this->profile->blog_public = false;

    $this->profile->num_posts = 10;

    return true;

    }

    // ... 其他代码

    }

    ?>

    ```


    **注意：** 你可以在用户注册时向他们展示这些设置，这样就不需要在此处设置任何默认值。但是，你通常希望鼓励人们注册，因此希望使注册过程尽可能简单，并允许他们在登录后进一步自定义其帐户。


    要测试此功能是否正常工作，请尝试在应用程序中注册为新用户。注册后，你可以检查数据库中的 `users_profile` 表以查看保存了哪些值，或者使用新帐户登录并访问我们刚刚修改的“你的账户详情”表单，查看设置值是否正确预填充。


    **UserController 类**


    接下来我们要做的是创建一个新的控制器，供 `Zend_Controller_Front` 显示公共页面。我们将其命名为 `UserController`。在这个类中，我们将实现三个主要操作：


    -   `indexAction()`：此方法将用于为每个用户生成首页，可通过 `http://phpweb20/user/*username*` 访问。在此页面上，我们将列出给定用户博客的最新文章。显示的文章数量由我们在上一节中添加的
    `num_posts` 设置控制。

    -   `archiveAction()`：此方法将用于生成单个月份的所有文章列表（我称之为月度存档）。输出基本上与 `indexAction()` 相同。默认情况下，将选择当前月份。

    -   `viewAction()`：此方法将用于显示单篇博客文章。`indexAction()` 和 `monthAction()` 方法中列出的文章将链接到此方法。


    在这些页面的左侧列中，将显示包含博客文章的月份列表，这与博客管理器中的非常相似。主要区别在于，此列表是供访客查看博客存档的，而博客管理器中的列表则允许博客所有者访问他们的文章以进行更新。


    除了这三个主要操作之外，我们还将实现两个名为 `userNotFoundAction()` 和 `postNotFoundAction()` 的方法，前者用于处理
    URL 中出现的无效用户名，后者用于处理尝试显示不存在的博客文章的情况。


    **将请求路由到 UserController**


    对于目前为止我们创建的所有其他控制器，访问 URL 的格式都是 `http://phpweb20/*controller*/*action*`；例如，blogmanager
    控制器的编辑操作的 URL 是 `http://phpweb20/blogmanager/edit`。如果未指定操作，则 `index` 是用于控制器的默认操作。因此，对于
    `blogmanager`，可以使用 `http://phpweb20/blogmanager` 或 `http://phpweb20/blogmanager/index`
    来访问 index 操作。


    在 `UserController` 中，我们将改变 URL 的工作方式，因为该控制器中的所有操作都将关联到特定的用户。为了指定用户，我们将 URL 方案更改为
    `http://phpweb20/user/*username*/*action*`。如你所见，我们在控制器名称（`user`）和操作之间插入了用户名。


    为了实现这一点，我们必须修改前端控制器的*路由器*。路由器（`Zend_Controller_Router` 的一个实例）负责根据请求 URL 确定应处理用户请求的控制器和操作。当在我们的引导文件
    `index.php` 中实例化 `Zend_Controller_Front` 时，会自动创建一组默认路由，以便使用 `http://phpweb20/*controller*/*action*`
    方案路由请求。我们希望为所有其他请求保留这些路由，但对于 `UserController`，我们希望添加一个额外的路由。为此，我们必须定义路由，然后将其注入到前端控制器的路由器中。


    **创建新路由**


    要创建新路由，可以使用三个 `Zend_Controller` 类（或者你可以开发自己的类）。现有的类如下：


    -   `Zend_Controller_Router_Route`：这是 Zend_Controller 使用的标准路由，允许在 URL 中组合使用静态和动态变量。动态变量通过在变量名前加冒号来表示，例如
    `:controller`。到目前为止，我们在本应用程序中使用的路由是 `/:controller/:action`。例如，在 `http://phpweb20/blogmanager/edit`
    中，`blogmanager` 被分配给 `controller` 请求变量，而 `edit` 被分配给 `action` 请求变量。

    -   `Zend_Controller_Router_Route_Static`：在某些情况下，你想要使用的 URL 不需要任何动态变量，这时你可以使用此静态路由类型。例如，如果你想要一个像
    `http://phpweb20/sitemap` 这样的 URL，它在内部由某个控制器中的 `sitemapAction()` 控制器操作处理，你可以使用
    `/sitemap` 作为静态路由来相应地路由此 URL。

    -   `Zend_Controller_Router_Route_Regex`：这种路由类型允许你基于正则表达式匹配来路由 URL。例如，如果你想要路由所有类似
    `http://phpweb20/*1234*` 的请求（其中 1234 可以是任何数字），你可以使用 `/([0-9]+)` 来匹配路由。与默认路由结合使用时，任何不匹配此正则表达式的请求都将使用标准的
    `/:controller/:action` 路由进行路由。


    我们现在将创建一个新路由来匹配 `http://phpweb20/user/*username*/*action*` 的 URL 方案。由于此路由仅用于我们即将实现的
    `UserController` 类，我们将硬编码控制器名称（`user`），而用户名和操作值将动态确定。如果 URL 中未指定操作（如 `http://phpweb20/user/*username*`），则操作将默认为
    `index`，与之前一样。


    我们将使用的路由是 `user/:username/:action/*`。由于我们只将此路由用于 `UserController`，因此不在字符串中包含 `:controller`。实例化
    `Zend_Controller_Router_Route` 时，第一个参数是这个字符串，第二个参数是一个数组，用于指定请求的默认参数。由于我们知道此请求的控制器是
    `user`，因此可以指定它。我们还可以指定 `index` 作为默认操作。因此，我们用来创建这个新路由的代码如下：


    ```

    $route = new Zend_Controller_Router_Route(

    ''user/:username/:action/*'',

    array(''controller'' => ''user'',

    ''action'' => ''index'')

    );

    ```


    **将路由注入到路由器中**


    创建路由后，必须将其注入到路由器中，以便后续的用户请求能够与该路由进行匹配（除了任何现有路由之外）。


    通过调用 `Zend_Controller` 路由器的 `addRoute()` 方法来添加路由，可以通过调用 `getRouter()` 从前端控制器访问路由器。`addRoute()`
    的第一个参数是用于标识路由的唯一名称——它实际上不会影响路由的行为。


    清单 9-4 显示了我们将添加到 `./htdocs/index.php` 中以创建此路由的代码。该路由应正好在 `$controller->dispatch()`
    分发请求之前添加。


    **清单 9-4.** 为用户首页定义新路由 (index.php)


    ```

    <?php

    // ... 其他代码

    // 为用户首页设置路由

    $route = new Zend_Controller_Router_Route(''user/:username/:action/*'',

    array(''controller'' => ''user'',

    ''action'' => ''index''));

    $controller->getRouter()->addRoute(''user'', $route);

    $controller->dispatch();

    ?>

    ```


    **注意：** 对于本节中创建的路由，另一种解决方案是创建类似 `http://phpweb20/*username*` 的 URL，而不在 URL 中包含
    `user` 控制器名称。虽然这相对容易实现，但需要对编码进行一些其他更改。例如，当用户在注册表单中输入用户名时，你需要确保输入的用户名不与现有的控制器名称（或文件名或目录名）冲突。你还需要注意将来可能创建的任何控制器，因为它们不能与现有的用户名冲突。


    添加此路由后，你将能够通过在 `UserController` 的任何操作中调用 `$request->getUserParam(''username'')`
    来访问 URL 中的 `username` 参数。


    **为自定义路由动态生成 URL**


    当我们在第 6 章实现 `{geturl}` Smarty 插件以及 `CustomControllerAction` 类中的 `getUrl()` 方法时，我们使用了
    `Url` 助手。我们使用了这个类的 `simple()` 方法来根据控制器和操作名称生成 URL。此助手还提供了一个名为 `url()` 的方法，可用于基于自定义路由（例如我们在清单
    9-4 中添加的路由）生成更复杂的 URL。我们现在将使用此方法为每个用户的主页生成 URL。


    要使用 `Url` 助手的 `url()` 方法生成链接，你将路由参数（在我们的例子中，是操作的名称和用户名）作为第一个参数传递，并将为其构建路由的名称作为第二个参数传递。然后
    `Url` 助手将根据这些参数重新构建一个 URL。


    现在让我们看一个具体的例子。在清单 9-4 中，我们创建的路由名称是 `user`。因此，如果我们想要为用户名为 `qz` 的用户生成一个指向其主页的链接，将使用以下代码：


    ```

    $helper = Zend_Controller_Action_HelperBroker::getStaticHelper(''url'');

    $url = $helper->url(

    array(''username'' => ''qz''),

    ''user''

    );

    ```


    这段代码将生成以下字符串：


    ```

    /user/qz/

    ```


    我们希望在自己的代码中使用此功能，不仅用于本章将要添加的操作，还用于本书后面我们将添加到此控制器的其他操作。


    为此，我们将在 `./include` 中的 `CustomControllerAction.php` 文件中添加一个新函数。清单 9-5 显示了 `getCustomUrl()`
    方法的代码，该方法接受 URL 参数作为第一个参数，路由名称作为第二个参数。如第 6 章所述，我们可以从控制器内部使用 `$this->_helper->url`
    访问此助手。


    **清单 9-5.** 为自定义路由构建复杂 URL (CustomControllerAction.php)


    ```

    <?php

    class CustomControllerAction extends Zend_Controller_Action

    {

    // ... 其他代码

    public function getUrl($action = null, $controller = null)

    {

    $url = rtrim($this->getRequest()->getBaseUrl(), ''/'') . ''/'';

    $url .= $this->_helper->url->simple($action, $controller);

    return $url;

    }

    public function getCustomUrl($options, $route = null)

    {

    return $this->_helper->url->url($options, $route);

    }

    // ... 其他代码

    }

    ?>

    ```


    为了从我们的模板中使用此助手生成 URL，我们还将对 `{geturl}` Smarty 插件进行一些更改。我们将修改此插件，以便如果指定了一个名为 `route`
    的参数，我们将使用 `Url` 助手的 `url()` 方法；否则，我们将回退到之前生成 URL 的方法（使用 `simple()`）。


    例如，要从模板中生成一个指向用户 `qz` 首页的 URL，我们可以在模板中使用以下代码：


    ```

    {geturl route=''user'' username=''qz''}

    ```


    清单 9-6 显示了我们将对 `./include/Templater/plugins` 中的 `function.geturl.php` 文件所做的更改。


    **清单 9-6.** 扩展 geturl Smarty 插件以支持自定义路由 (function.geturl.php)


    ```

    <?php

    function smarty_function_geturl($params, $smarty)

    {

    $action = isset($params[''action'']) ? $params[''action''] : null;

    $controller = isset($params[''controller'']) ? $params[''controller''] : null;

    $route = isset($params[''route'']) ? $params[''route''] : null;

    $helper = Zend_Controller_Action_HelperBroker::getStaticHelper(''url'');

    if (strlen($route) > 0) {

    unset($params[''route'']);

    $url = $helper->url($params, $route);

    }

    else {

    $request = Zend_Controller_Front::getInstance()->getRequest();

    $url = rtrim($request->getBaseUrl(), ''/'') . ''/'';

    $url .= $helper->simple($action, $controller);

    }

    return $url;

    }

    ?>

    ```


    **注意：** `Url` 助手的 `url()` 方法会自动在 `Zend_Controller` 基 URL 前面添加内容，但 `simple()` 方法则不会。这就是为什么我们在此代码中仅手动为
    `simple()` 调用执行此操作的原因。


    **生成其他必需的路由**


    除了清单 9-4 中添加的路由外，我们还将添加另外两个路由：一个用于显示单篇博客文章，另一个用于显示用户博客的月度存档。


    当我们在第 7 章和第 8 章实现博客管理工具时，我们在每篇博客文章中包含了一个 `url` 字段。此字段的值对于单个用户博客中的每篇文章都是唯一的。现在我们将使用此值为单篇博客文章创建
    URL。每篇博客文章将具有 `/user/*username*/view/*blog-post-url*` 形式的 URL。处理对此路由的请求的控制器操作将称为
    `viewAction()`——我们将在本章后面实现此方法。


    在这种特定情况下，控制器和操作名称在 URL 中是硬编码的；唯一的是用户名和博客文章 URL。因此，我们可以使用以下代码来生成这个新路由：


    ```

    $route = new Zend_Controller_Router_Route(

    ''user/:username/view/:url/*'',

    array(''controller'' => ''user'',

    ''action'' => ''view'')

    );

    ```


    例如，如果我创建了一篇标题为“我的假期”的博客文章，这将生成一个唯一的 URL `my-holiday`。这篇博客文章（记住我的用户名是 `qz`）的完整
    URL 将是 `/user/qz/view/my-holiday`。


    如果我想从 Smarty 模板生成一个指向此文章的链接，我可以使用我们在清单 9-6 中修改的 `{geturl}` 插件，如下所示：


    ```

    {geturl user=''qz'' url=''my-holiday'' route=''post''}

    ```


    **注意：** 这假设当我们将前面的路由注入到路由器时，我们使用了一个名为 `post` 的名称。我们稍后将执行此操作。


    类似地，我们现在可以创建另一个路由来处理博客文章归档。博客归档的 URL 格式将是 `/user/*username*/archive/*year*/*month*`。因此，要查看我博客在
    2007 年 11 月的归档，URL 将是 `/user/qz/archive/2007/11`。


    一旦添加了此路由（名称为 `archive`），我们就可以在 Smarty 中生成指向此特定页面的链接，如下所示：


    ```

    {geturl user=''qz'' year=2007 month=11 route=''archive''}

    ```


    我们用来创建此路由的代码如下：


    ```

    $route = new Zend_Controller_Router_Route(

    ''user/:username/archive/:year/:month/*'',

    array(''controller'' => ''user'',

    ''action'' => ''archive'')

    );

    ```


    清单 9-7 显示了我们需要对引导文件（`./htdocs/index.php`）进行的更改，以便创建这些新路由并将它们添加到路由器中。


    **清单 9-7.** 将文章和归档路由添加到路由器 (index.php)


    ```

    <?php

    // ... 其他代码

    // 为用户首页设置路由

    $route = new Zend_Controller_Router_Route(

    ''user/:username/:action/*'',

    array(''controller'' => ''user'',

    ''action'' => ''index'')

    );

    $controller->getRouter()->addRoute(''user'', $route);

    // 为查看博客文章设置路由

    $route = new Zend_Controller_Router_Route(

    ''user/:username/view/:url/*'',

    array(''controller'' => ''user'',

    ''action'' => ''view'')

    );

    $controller->getRouter()->addRoute(''post'', $route);

    // 为查看月度归档设置路由

    $route = new Zend_Controller_Router_Route(

    ''user/:username/archive/:year/:month/*'',

    array(''controller'' => ''user'',

    ''action'' => ''archive'')

    );

    $controller->getRouter()->addRoute(''archive'', $route);

    $controller->dispatch();

    ?>

    ```


