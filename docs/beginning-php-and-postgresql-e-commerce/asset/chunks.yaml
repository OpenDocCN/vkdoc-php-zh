    **How It Works: The shopping_cart Table**


    Let’s look at each field in shopping_cart:


    • cart_id stores a unique ID that you’ll generate for each shopping cart. This
    is not an integer field like other ID columns you’ve created so far. It is a char
    field and will be filled with an MD5 hash of a unique ID, which will be a 32-character
    string.


    • product_id references the ID of an existing product.


    • quantity stores the product’s shopping cart quantity.


    • buy_now helps you implement the Save for Later functionality. The buy_now field
    is a boolean type with the default value of true. When the customer proceeds to
    check out, only the products that have this value set to true are added to the
    order, whereas the Save for Later products remain in the shopping cart. This feature
    is useful because it allows the visitor to keep more products in the shopping
    cart than he or she can afford (or wants to buy) at the moment and allows the
    visitor to order only a selection of the products in the shopping cart.


    • added_on will be populated with the current date when a new product is added
    to the cart and is useful when deleting old shopping carts from the database.


    ■**Note** The shopping_cart table has a composite primary key formed of both cart_id
    and product_id fields. This make sense because a particular product can exist
    only once in a particular shopping cart, so a (cart_id, product_id) pair shouldn’t
    appear more than once in the table.


    **Implementing the Data Tier**


    In this section, you’ll create the usual functions that query the database for
    the shopping cart operation. Before going further with the code, let’s review
    the functions you’ll add to the hatshop database:


    • shopping_cart_add_product adds a product to the shopping cart.


    • shopping_cart_update modifies shopping cart products’ quantities.


    • shopping_cart_remove_product deletes a record from the visitor’s shopping cart.


    • shopping_cart_get_products gets the list of products in the specified shopping
    cart and is called when you want to show the user his shopping cart.


    • shopping_cart_get_saved_products gets the list of products saved in the shopping
    cart to buy later and is called when the user requests to view the shopping cart
    details page.


    • shopping_cart_get_total_amount returns the total costs of the products in the
    specified product cart.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH08.qxd 10/31/06 10:07 PM Page 272


    **272**


    C H A P T E R 8 ■ T H E S H O P P I N G C A RT


    • shopping_cart_save_product_for_later saves a product to a shopping cart for
    later purchase.


    • shopping_cart_move_product_to_cart moves a product from the Save for Later list
    back to the “main” shopping cart.


    Now let’s create each method one at a time in the following exercise.


    **Exercise: Implementing the Functions**


    **1.** Load pgAdmin III, and connect to the hatshop database.


    **2.** Click Tools ➤ Query tool (or click the SQL button on the toolbar). A new
    query window should appear.


    **3.** Use the query tool to execute this code, which creates the shopping_cart_add_product
    function in your hatshop database:


    -- Create shopping_cart_add_product function


    CREATE FUNCTION shopping_cart_add_product(CHAR(32), INTEGER) RETURNS VOID LANGUAGE
    plpgsql AS $$


    DECLARE


    inCartId ALIAS FOR $1;


    inProductId ALIAS FOR $2;


    productQuantity INTEGER;


    BEGIN


    SELECT INTO productQuantity


    quantity


    FROM shopping_cart


    WHERE cart_id = inCartId AND product_id = inProductId; IF productQuantity IS NULL
    THEN


    INSERT INTO shopping_cart(cart_id, product_id, quantity, added_on) VALUES (inCartId,
    inProductId , 1, NOW());


    ELSE


    UPDATE shopping_cart


    SET quantity = quantity + 1, buy_now = true


    WHERE cart_id = inCartId AND product_id = inProductId; END IF;


    END;


    $$;


    The shopping_cart_add_product function is called when the visitor clicks on the
    Add to Cart button for one of the products. If the selected product already exists
    in the shopping cart, its quantity is increased by one; if the product doesn''t
    exist, one unit is added to the shopping cart (a new shopping_cart record is created).


    Not surprisingly, shopping_cart_add_product receives two parameters, namely inCartId
    and, of course, inProductId.


