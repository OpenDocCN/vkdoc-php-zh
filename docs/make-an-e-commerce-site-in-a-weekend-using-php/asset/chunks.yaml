    # 1. Introduction


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1672-9_​1](http://dx.doi.org/10.1007/978-1-4842-1672-9_1))
    contains supplementary material, which is available to authorized users.


    In this book, you will learn how to develop an e-commerce site. Electronic commerce,
    also known as e-commerce, involves purchasing and selling products or services
    through computers/smart phones using the Internet. Today, almost all businesses
    need an e-commerce site. Why? Here are a few reasons:


    *   Selling online does not require office space or any product display space.

    *   You can sell 24/7/365; no store time constraints.

    *   Consumers can purchase when it’s convenient from their home and at any time.
    They can save a lot of time wasted in travelling to the store in traffic.

    *   You can sell your products globally.

    *   Quick, convenient, and user-friendly transfer of funds online.


    Hence, most companies are showing their presence on the Internet by developing
    e-commerce sites. The e-commerce site that you will be learning to develop in
    this book will sell almost everything, including books, smart phones, laptops,
    and so on. The site will display different product categories via a drop-down
    menu along with a search box at the top. Users can select the products and can
    pay online. The site will store all the products, orders, and customer information
    in the database.


    Although you can create a web site quite easily through the free e-commerce web
    design tools provided by different web site hosting providers, doing so has the
    following limitations:


    *   The design tool may not be that flexible. The menu, table, and other interfaces
    might not suit your requirements.

    *   You might face issues like database connectivity and other authentication
    processes.

    *   You might not get support to fetch information for web site administrative
    tasks.

    *   It will be very difficult for you to change your web host if you get the site
    built through its patented tools.


    Hence, you will be developing this e-commerce site from scratch in PHP.


    In this chapter, you will learn:


    *   The outline of the e-commerce web site that will be made throughout the book

    *   The software required for developing the site

    *   Installing the WampServer

    *   Configuring MySQL

    *   Details of the database tables that will be required in web site'
