    **Adding CAPTCHA to the User Registration Form**


    Now that we have the core functionality of the user registration system working,
    we can improve it slightly by adding a simple yet effective security measure to
    ensure that registrations come only from real people and not computer programs.
    This security measure is called CAPTCHA, which stands for Completely Automated
    Public Turing test to tell Computers and Humans Apart. There are many different
    types of CAPTCHA tests available, but we will be using what is probably the most
    common one. This is where a series of characters are shown as an image, and the
    user is required to identify these characters by typing them in as part of the
    form they are submitting.


    We will be using the Text_CAPTCHA component from PEAR (the PHP Extension and Application
    Repository) to generate our CAPTCHA images. Note that we will be using a CAPTCHA
    test for several forms in our web application, not just the registration form.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 11](index-111_1.jpg)


    9063CH04CMP4 11/20/07 9:20 PM Page 89


    C H A P T E R 4 ■ U S E R R E G I S T R AT I O N, L O G I N, A N D L O G O U T


    **89**


    An example of a CAPTCHA image that Text_CAPTCHA generates is shown in Figure 4-2\.
    The random lines and shapes help to fool optical character recognition (OCR) software
    that may try to automatically decipher the CAPTCHA.


    **Figure 4-2.** *A sample CAPTCHA image generated by PEAR’s Text_CAPTCHA* Circumventing
    CAPTCHA


    Although the point of the CAPTCHA test is to tell computers and humans apart,
    it is technically possible to write a program that can solve a CAPTCHA automatically.
    In the case of the text CAPTCHA we will be using, OCR software could be used to
    determine the characters in the image.


    Because of this, we try to distort the images to a point where using OCR software
    is not possible, but not too far so that humans cannot determine which characters
    are being displayed. This means avoiding characters such as zero and the letter
    O completely, which can easily be confused.


    CAPTCHA and Accessibility


    Another important consideration when implementing a CAPTCHA test in your web applications
    is accessibility. If somebody is unable to pass the test, they will be unable
    to complete the form protected by the CAPTCHA test. As such, it is important to
    have alternative methods available.


    One possible solution is to implement an audio CAPTCHA in addition to the text
    CAPTCHA.


    This would involve generating an audio file that reads back letters, numbers,
    or words, which the user must then type in.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063CH04CMP4 11/20/07 9:20 PM Page 90


    **90**


    C H A P T E R 4 ■ U S E R R E G I S T R AT I O N, L O G I N, A N D L O G O U T


    Another alternative is to have a manual registration system, where the user can
    e-mail their details to the site administrator who can then save their details
    on their behalf. In Chapter 14 we will discuss the implementation of an administration
    area in our web application.


    Part of this administration area will be a user management section where an administrator
    could manually create new users.


    PEAR’s Text_CAPTCHA


    To generate CAPTCHA images, we will be using the Text_CAPTCHA component from PEAR.


    Text_CAPTCHA will generate the series of characters to appear in the image and
    then create an image with those characters appearing at a random angles in random
    locations. It will also add some random noise to prevent OCR software from reading
    the letters. This noise is a series of lines and shapes that will be placed randomly
    on the image.


