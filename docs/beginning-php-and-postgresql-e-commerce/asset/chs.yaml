  \n现在再次在浏览器中加载 `index.php`，欣赏你全新设计的错误信息，如图 2-10 所示。\n\n**图 2-10.** *显示回溯信息的错误信息*\n\
  \n在继续之前，别忘了删除 `app_top.php` 中用来制造错误的那行代码。\n\n### 工作原理：错误处理\n\n拦截网站错误并对其进行处理的方法是\
  \ `ErrorHandler::Handler`（位于 `error_handler.php` 中）。将 `ErrorHandler::Handler` 函数注册为网站错误处理器的代码位于\
  \ `ErrorHandler::SetHandler` 方法中，该方法在 `app_top.php` 中被调用：\n\n```php\n/* 将用户错误处理方法设置为\
  \ ErrorHandler::Handler 方法 */\npublic static function SetHandler($errTypes = ERROR_TYPES)\n\
  {\n  return set_error_handler(array ('ErrorHandler', 'Handler'), $errTypes);\n}\n\
  ```\n\n> **注意** `set_error_handler` 的第二个参数指定了应被拦截的错误范围。`E_ALL` 指定了所有类型的错误，包括 `E_NOTICE`\
  \ 错误，这些错误在网站开发期间应被报告。\n\n当被调用时，`ErrorHandler::Handler` 借助名为 `ErrorHandler::GetBacktrace`\
  \ 的方法构建错误信息，然后将错误信息转发给客户端浏览器、日志文件、管理员（通过电子邮件），或它们的任意组合，具体方式可通过编辑 `config.php` 进行配置。\n\
  \n\n\n`GetBacktrace` 从 `debug_backtrace` 函数（该函数自 PHP 4.3.0 引入）中获取回溯信息，并更改其输出格式，以生成类似\
  \ Java 错误的 HTML 错误消息。除非你想要自定义出错时显示的回溯信息，否则无需理解 `GetBacktrace` 中的每一行代码。传递给 `GetBacktrace`\
  \ 的 `2` 参数指定回溯结果应省略前两个条目（即对 `ErrorHandler::Handler` 和 `ErrorHandler::GetBacktrace`\
  \ 的调用）。\n\n在 `ErrorHandler::Handler` 中构建详细的错误字符串，其中包含回溯信息：`$backtrace = ErrorHandler::GetBacktrace(2);`\n\
  \n```php\n// 待显示、记录或发送的错误消息\n$error_message = \"\\nERRNO: $errNo\\nTEXT: $errStr\"\
  \ .\n\"\\nLOCATION: $errFile, line \" .\n\"$errLine, at \" . date('F j, Y, g:i a')\
  \ .\n\"\\nShowing backtrace:\\n$backtrace\\n\\n\";\n```\n\n根据 `config.php` 文件中的配置选项，你可以决定是否显示、记录和/或通过邮件发送错误。这里我们使用\
  \ PHP 的 `error_log` 方法，它知道如何通过邮件发送或将错误详情写入日志文件：\n\n```php\n// 如果 SEND_ERROR_MAIL\
  \ 为 true，则通过邮件发送错误详情\nif (SEND_ERROR_MAIL == true)\n    error_log($error_message,\
  \ 1, ADMIN_ERROR_MAIL, \"From: \" .\n    SENDMAIL_FROM . \"\\r\\nTo: \" . ADMIN_ERROR_MAIL);\n\
  \n// 如果 LOG_ERRORS 为 true，则记录错误日志\nif (LOG_ERRORS == true)\n    error_log($error_message,\
  \ 3, LOG_ERRORS_FILE);\n```\n\n**注意** 如果你希望能够向本地主机的邮件账户（`your_name@localhost`）发送错误邮件，那么你应该在机器上启动一个\
  \ SMTP（简单邮件传输协议）服务器。在 Red Hat（或 Fedora）Linux 发行版上，你可以使用以下命令启动 SMTP 服务器：`service\
  \ sendmail start`\n\n**注意** 在 Windows 系统上，你应该在 IIS（Internet 信息服务）管理器中检查“默认 SMTP\
  \ 虚拟服务器”，并确保它已启动。\n\n在开发网站期间，`DEBUGGING` 常量应设置为 `true`，但在网站上线后，你应将其设置为 `false`，这样在发生严重错误时会显示用户友好的错误消息，而非调试信息；在发生非致命错误时则完全不显示任何消息。\n\
  \n`E_WARNING` 类型的错误非常棘手，因为你不知道哪些错误应终止请求的执行。在 `config.php` 中设置的 `IS_WARNING_FATAL`\
  \ 常量决定了此类错误是否应被视为项目的致命错误。此外，`E_NOTICE` 和 `E_USER_NOTICE` 类型的错误不被视为致命错误：\n\n```php\n\
  /* 如果 IS_WARNING_FATAL 为 false，警告不会中止执行\n   E_NOTICE 和 E_USER_NOTICE 错误不会中止执行 */\n\
  if (($errNo == E_WARNING && IS_WARNING_FATAL == false) ||\n    ($errNo == E_NOTICE\
  \ || $errNo == E_USER_NOTICE))\n    // 如果错误是非致命的 ...\n{\n    // 仅在 DEBUGGING 为 true\
  \ 时显示消息\n    if (DEBUGGING == true)\n        echo '<pre>' . $error_message . '</pre>';\n\
  }\nelse\n    // 如果错误是致命的 ...\n{\n    // 显示错误消息\n    if (DEBUGGING == true)\n   \
  \     echo '<pre>' . $error_message . '</pre>';\n    else\n        echo SITE_GENERIC_ERROR_MESSAGE;\n\
  \    // 停止处理请求\n    exit;\n}\n```\n\n在接下来的章节中，你将需要使用 PHP 的 `trigger_error` 函数手动触发错误，该函数允许你指定要生成的错误类型。默认情况下，它会生成\
  \ `E_USER_NOTICE` 错误，这类错误不被视为致命错误，但会被 `ErrorHandler::Handler` 代码记录和报告。\n\n## 准备数据库\n\
  \n本章的最后一步是创建 PostgreSQL 数据库，不过直到下一章你才会用到它。我们将向你展示如何创建数据库，以及如何使用 PostgreSQL 自带的 `pgAdmin\
  \ III` 工具创建一个拥有完全权限的用户。如果你使用的是托管服务托管的数据库，该服务可能会通过基于 Web 的工具（如 `phpPgAdmin`）为你提供数据库访问权限。有关使用\
  \ `phpPgAdmin` 的更多详情，请参见 [`phppgadmin.sourceforge.net/`](http://phppgadmin.sourceforge.net/)。\n\
  \n在继续之前，请确保你已经安装了 PostgreSQL 8。有关安装说明，请查阅附录 A。按照练习中的步骤创建数据库和新的用户账户。\n\n### 练习：创建\
  \ `hatshop` 数据库和新的用户账户\n\n1. 启动 `pgAdmin III` 工具，然后从左侧窗格中选择你的数据库服务器（在 Windows 中，通过选择“开始\
  \ ➤ 程序 ➤ PostgreSQL ➤ pgAdmin III”来启动 `pgAdmin III`）。窗口应如图 2-11 所示。\n\n   **图 2-11.**\
  \ *pgAdmin III 主页面*\n\n2. 选中数据库服务器后，选择“工具 ➤ 连接”。或者，你也可以右键单击数据库服务器条目，从上下文菜单中选择“连接”。如果提示，请输入\
  \ root 密码并单击“确定”。\n\n3. 你已使用超级用户账户连接到数据库服务器。对于我们的项目，我们想要创建一个仅能访问 `hatshop` 数据库的普通用户账户。展开数据库服务器节点，右键单击“登录角色”节点，然后从上下文菜单中选择“新建登录角色”。在角色名称和密码字段中输入\
  \ `hatshopadmin`，并勾选“超级用户”复选框，如图 2-12 所示。然后单击“确定”。\n\n   **图 2-12.** *创建新的数据库角色*\n\
  \n4. 现在创建 `hatshop` 数据库。右键单击“数据库”节点，然后从上下文菜单中选择“新建数据库”。将名称设置为 `hatshop`，并从“所有者”下拉列表中选择\
  \ `hatshopadmin`。如果你打算存储非 ASCII 数据，还应选择 UTF-8 编码，如图 2-13 所示。单击“确定”，等待过程完成并关闭“新建数据库”对话框。\n\
  \n   **图 2-13.** *创建新的数据库*\n\n   **注意** 使用 `pgAdmin III` 工具执行的所有操作也可以通过执行 SQL 代码来完成。SQL\
  \ 是与数据库交互的语言，而 `pgAdmin III` 可以作为在数据库中执行 SQL 命令的界面。在完成本书练习的过程中，你将学习更多关于 SQL 的知识。\n\
  \n5. 最后，选择 `hatshop` 节点。你可以浏览树形结构以查看空数据库的样子，但别担心，你将在下一章开始向其中填充数据。`pgAdmin III` 甚至还会友好地显示用于创建数据库的\
  \ SQL 查询（参见图 2-14）。\n\n   **图 2-14.** *你全新的数据库*\n\n6. 从现在开始，当连接到 `hatshop` 数据库时，你将不再使用\
  \ PostgreSQL 超级用户，而是使用 `hatshopadmin` 账户。快速测试一下：选择数据库服务器，然后选择“工具 ➤ 断开连接”。右键单击数据库服务器，选择“属性”，并在“用户名”文本框中输入\
  \ `hatshopadmin`，如图 2-15 所示。单击“确定”。在下次尝试连接到服务器时，系统会要求你输入 `hatshopadmin` 用户的密码。登录后，你将只能访问\
  \ `hatshop` 数据库以及任何其他数据库的公共对象。\n\n   **图 2-15.** *配置 hatshopadmin 用户*\n\n\n\n**图\
  \ 2-15.** *以 hatshopadmin 身份登录*\n\n**下载代码**\n\n您可以在作者网站 `http://www.emilianbalanescu.ro`\
  \ 或 `http://www.cristiandarie.ro`，或者 Apress 网站源码/下载部分的 `http://www.apress.com` 找到最新的代码下载及\
  \ HatShop 在线版本的链接。您可以轻松地通读本书并逐步构建自己的解决方案；不过，如果您想从我们正在使用的版本中核对某些内容，也完全可以。关于各章节加载的说明，可在下载文件中的\
  \ `welcome.html` 文档中找到。\n\n**总结**\n\n嘿，我们在这一章里涉及了很多内容，不是吗？我们讨论了三层架构，以及它如何帮助你创建出色、灵活且可扩展的应用程序。我们还了解了本书中使用的每种技术是如何适应三层架构的。\n\
  \n到目前为止，我们拥有一个非常灵活且可扩展的应用程序，因为它还没有太多功能，但在接下来的章节中，你会感受到使用规范编码方式带来的真正优势。在本章中，你只编写了表示层的基本静态部分，实现了一些错误处理代码，并创建了\
  \ hatshop 数据库，这是对数据层的支持。在下一章中，你将开始实现产品目录，并学习如何利用中间层以及表示层中智能快速的控件和组件，使用数据库中存储的数据动态生成可视化内容。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH02.qxd 11/8/06 9:33\
