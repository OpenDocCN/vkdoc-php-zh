    This class looks quite similar to the Registry class, but it’s better that we
    keep them separated. The add() method adds the provided $callback to the $_callbacks
    array, so that it can be executed when any $type events happen.


    The fire() method emits/triggers an event. If you provide an optional $parameters
    array, this array will be available to all the callbacks executed. The remove()
    method simply removes the stored $callback from the $_callbacks array. It requires
    a reference to the original callback that it should remove. Let’s see how we can
    use this new class to listen for events and trigger them, as shown in Listing
    19-17.


    ***Listing 19-17.*** Using the Events Class


    use Framework\Events as Events;


    Events::add("the.state.changed", function($message) {


    echo "state changed to: " . $message;


    });


    Events::fire("the.state.changed", array("new state"));


    Events::fire("the.state.changed", array("another new state")); This matches our
    previous example, almost exactly. The order of array elements translates directly
    into the order of the callback’s arguments. If you provide four array elements,
    you can expect four arguments in the callback.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ ExTEnding


    Events


    We should take this opportunity to add some events to our framework, so that other
    developers can create listeners for our framework classes. We will create the
    first two together. These events will be called framework.


    controller.destruct.before and framework.controller.destruct.after. This method
    should be fired as late as possible in the __destruct() method, and will look
    like that shown in Listing 19-18.


    ***Listing 19-18.*** Modified Controller Class


    namespace Framework


    {


    use Framework\Events as Events;


    class Controller extends Base


    {


    /**


    * @read


    */


    protected $_name;


    protected function getName()


    {


    if (empty($this- >_name))


    {


    $this- >_name = get_class($this);


    }


    return $this- >_name;


    }


    public function __destruct()


    {


    Events::fire("framework.controller.destruct.before", array($this- >name)); $this-
    >render();


    Events::fire("framework.controller.destruct.after", array($this- >name));


    }


    }


    }


    The new events will be fired before and after the templates are rendered, and
    the callbacks will be provided the name of the current controller. If there are
    no listeners waiting for this event, nothing will happen (no error messages either).


    We should also see a useful way in which one of these new events can help us.
    If you consider the Shared\Controller class we created (in Chapter 15), you might
    remember that we connected to a database but never disconnected from it. We are
    essentially opening a connection to the database on each request, and then never
    closing any. This could be made more efficient by closing the connection after
    the templates are rendered, as shown in Listing 19-19.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ ExTEnding


    ***Listing 19-19.*** Modified Shared\Controller Class


    namespace Shared


    {


    use Framework\Events as Events;


    use Framework\Registry as Registry;'
