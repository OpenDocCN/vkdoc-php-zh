  trans: "\n1.  更新`Dog`类中的构造函数，使其也能接收`dog_gender`值（Male 或 Female）。修改`lab.php`程序以通过构造函数传递性别。同时更新`lab.php`，将`$lab`字符串分割成五个部分（为`dog_gender`增加一个部分）。然后评估`gender_error`返回的结果（`'TRUE'`或`'FALSE'`），以显示`\"\
    Gender update successful\"`或`\"Gender update not successful\"`。\n\n## 章节术语\n\n\
    `PHP Extensions` | `PEAR` | | --- | --- | --- | --- | --- | | `require` | `require_once`\
    \ | 类 | 属性 | | 变量 | 方法 | 函数 | 对象 | | 封装 | 私有 | `set`方法 | `get`方法 | | `$this`指针\
    \ | 字符串连接 | `Include` | `include_once` | | `new`关键字 | `return` | 逗号分隔字符串 | `explode`方法\
    \ | | 子字符串 | `set`方法 | 布尔值 | 条件语句 | | 三元运算符 | 整数 | 参数 | Null 合并运算符 | | `&&, And`\
    \ | `ctype_alpha` | `strlen` | `ctype_digit` | | `||, Or` | 宇宙飞船运算符 | NULL | 运算顺序\
    \ | | 构造方法 | 析构方法 | `__toString` | 列出对象 |\n\n## 章节问题与项目\n\n### 选择题\n\n1.  PHP\
    \ 变量以哪个符号开头？\n    1.  ?\n    2.  `!`\n    3.  `$`\n    4.  `&`\n\n2.  有效的函数名可以以下列哪个开头？\n\
    \    1.  一个字母\n    2.  一个下划线\n    3.  一个数字\n    4.  选项 A 和 B\n\n3.  哪种条件语句语法对\
    \ PHP 有效？\n    1.  `IF (condition) { execution };`\n    2.  `IF (condition) {\
    \ execution }`\n    3.  `if (condition) { execution };`\n    4.  `if (condition)\
    \ {execution}`\n\n4.  以下哪个包含了可在应用程序中发生的属性和行为（方法或函数）？\n    1.  类\n    2.  `set`方法\n\
    \    3.  `get`方法\n    4.  `for`循环\n\n5.  构造方法执行哪个基本功能？\n    1.  定义属性\n    2. \
    \ 定义方法\n    3.  将类的一个实例放入内存\n    4.  选项 A 和 B\n\n6.  `&&`符号和/或单词`AND`\n    1.\
    \  是关系运算符，使用时要求所有被检查的语句都为真，整个`if`语句才被视为`true`\n    2.  是 PHP 中用于连接程序的连词\n    3.\
    \  是关系运算符，使用时只要求一个被检查的语句为真，整个`if`语句就被视为`true`\n    4.  是 PHP 中用于连接程序的关系运算符和连词\n\
    \n7.  整数是以下哪种？\n    1.  一个字符串或文本值\n    2.  一个浮点数\n    3.  一个整数（整数）\n    4.  一个分数\n\
    \n8.  三元运算符是以下哪种？\n    1.  设置变量的一种替代方案\n    2.  使用`if-else`条件语句的一种替代方案\n    3.\
    \  使用嵌入式`if-else`条件语句的一种替代方案\n    4.  选项 B 和 C\n\n9.  如何在 PHP 中创建类`fred`的一个实例并执行构造方法？\n\
    \    1.  `$this->fred`\n    2.  `$variable = new fred`\n    3.  `$load_class =\
    \ fred`\n    4.  `$fred`\n\n10. `ctype_digit`方法的作用是什么？\n    1.  随机生成一个整数值\n  \
    \  2.  判断输入的字符是否为数字\n    3.  判断一个类的输出是否为数字\n    4.  将字符串值转换为整数\n\n11. PEAR 是哪个短语的缩写？\n\
    \    1.  PHP Extends and Applies Registry\n    2.  PHP Excellence in Applied Requirements\n\
    \    3.  PHP Extension and Application Repository\n    4.  Properties of Extension\
    \ and Application Registry\n\n12. 在类内部创建`set`方法\n    1.  允许属性被自动更改\n    2.  不应该这样做，因为会损坏数据\n\
    \    3.  提供了在属性更新之前让类验证信息的能力\n    4.  提供了在属性更新之后让类验证信息的能力\n\n13. `if`语句\n    1.\
    \  也被称为条件语句\n    2.  可以比较两个值以判断它们是否相同或不同\n    3.  使用比较运算符（`==`、`<`、`>`、`<=`、`>=`）来判断语句是真还是假\n\
    \    4.  以上全部\n\n14. 当`$x`和`$y`都为什么时，`$x && $y`条件为`TRUE`？\n    1.  都为真\n    2.\
    \  其中一个为真\n    3.  都为假\n    4.  其中一个为假\n\n15. 选择关于布尔值的错误陈述。\n    1.  布尔是一种具有两个可能值（TRUE\
    \ 和 FALSE）的数据类型。\n    2.  布尔值代表逻辑的真值。\n    3.  布尔值仅与条件语句相关联。\n    4.  在 PHP 布尔字面量中，TRUE\
    \ 和 FALSE 是区分大小写的。\n\n16. 这些数字中哪一个是整数的例子？\n    1.  1.01\n    2.  2f\n    3.  423\n\
    \    4.  .002\n\n17. 保护对象的数据免受类外部代码的访问被称为什么？\n    1.  继承\n    2.  封装\n    3. \
    \ 分类\n    4.  阻塞\n\n18. 哪种方法比`set`方法更容易编码，并且被称为只读方法，因为它们不更改任何属性值？\n    1.  `explode`方法\n\
    \    2.  `get`方法\n    3.  `constructor`方法\n    4.  `match`方法\n\n19. 为什么要在程序中包含对象？\n\
    \    1.  在代码中做笔记\n    2.  制作迷你移动程序\n    3.  使代码更复杂\n    4.  保护代码免受直接访问\n\n20.\
    \ 如何调用名为`myFunction`的函数？\n    1.  `call myFunction();`\n    2.  `myFunction();`\n\
    \    3.  `call function myFunction；`\n    4.  `call.myFunction();`\n\n21. 一个类可以包含以下所有内容，除了\n\
    \    1.  属性\n    2.  方法或函数\n    3.  条件语句\n    4.  机器码\n\n22. 当处理逗号分隔的字符串时，使用哪个字符来分隔字符串中的数据？\n\
    \    1.  空格\n    2.  分号\n    3.  星号\n    4.  逗号\n\n### 判断题\n\n1.  方法是属于类的函数。\n\
    2.  当希望两个条件都为真时，会使用符号`||`或单词`or`。\n3.  当一个函数是私有时，它只能在其存在的类内部使用。\n4.  `explode`方法可用于在指定的分隔符处分割字符串。\n\
    5.  `new`关键字告诉操作系统应在内存中创建该类的一个实例。\n6.  `ctype_alpha`函数在传入数字时会返回`true`。\n7.  `require_once`如果文件已被附加到程序将不会执行。\n\
    8.  `ctype_digit`函数判断传递的字符是否为字母。\n9.  `ctype_alpha`函数判断传递的字符是否为字母。\n10. PHP 构造方法与类具有相同的名称。\n\
    11. 三元运算符是`while`循环的简写形式。\n12. 如果一个文件已经包含在程序中，`require_once`函数将只生成一个警告并允许程序继续执行。\n\
    13. 当没有对对象的剩余引用或该对象已被显式销毁时，会调用析构方法。\n14. 对象是已经编译好用于应用程序的代码块。\n15. `else`语句通过允许在`if`语句评估为`FALSE`时执行代码来扩展`if`语句。\n\
    16. `include`或`require`语句只能放在 PHP 程序的顶部。\n17. 程序员可以通过`require`或`require_once`语句将自己的代码库拉入应用程序。\n\
    \n### 简答题/论述题\n\n1.  解释封装的含义以及类是如何被封装的。\n2.  为什么程序员应该使用`set`和`get`方法？\n3.  为什么来自用户的网页上的每个条目都应该被验证？\n\
    \n### 项目\n"
- fmt: '1. 创建一个包含 `Student` 类的 PHP 程序，该类具有以下属性：`student_id`、`student_name`、`student_address`、`student_state`、`student_zip`
    和 `student_age`。该程序为每个属性包含 `get` 和 `set` 方法。验证传递给每个属性的数据的正确类型和大小。该程序还允许每个属性通过构造函数来设置值。创建一个该类的实例，并通过构造函数传递属性。使用
    `set` 方法更改其中两个属性。使用 `get` 方法显示这些属性。


    2. 创建一个用于跟踪杂货店库存的 PHP 程序。每个 `item`（`class`）包括一个商品编号、描述、尺寸、售价、过道、数量和价格。在条目被接受之前，必须验证每个字段的正确信息。商品编号范围从
    00000 到 99999。商店有 16 个过道（00–15）。商店中没有商品价格超过 1000 美元。所有条目通过构造函数或 `set` 方法进行编码。在所有条目被正确接受后，程序将生成一个条目报告（使用
    `get` 方法）。


    **Term Project**


    1. 使用第 [2](##394210_2_En_2_Chapter.xhtml) 章期末项目的设计，创建一个 PHP 程序，该程序将为输入 ABC 计算机零件公司的仓库库存项目提供界面。PHP
    类必须验证从每个字段传递的信息内容（通过 `set` 方法），以确保没有发生损坏。每个属性必须在类中存在 `Set` 和 `Get` 方法。构造函数应使用
    `set` 方法来填充属性。同时创建一个界面程序，该程序将创建一个类的实例并测试填充属性的能力。测试程序应生成一个已入库项目的报告（类似于本章中所示的输出）。创建的文件应使用与本章示例中所示的逻辑相似的逻辑。


    5. Secured User Interfaces


    *所有伟大的想法对于那些失败者来说都像坏主意。用一个已知的失败者来测试一个新想法总是好的，以确保他们不喜欢它。 — Dilbert 1997年11月18日
    (http://dilbert.com/strips/comic/1997-11-18/)*


    **Chapter Objectives/Student Learning Outcomes**


    完成本章后，学生将能够：


    *   解释为什么必须在界面和业务规则层验证用户输入

    *   解释为什么必须在业务规则层过滤用户输入

    *   使用 HTML5 代码验证用户输入

    *   使用 PHP `if` 语句（条件语句）验证和过滤输入

    *   使用 `foreach` 循环从 XML 文件动态创建 HTML 选择框

    *   使用简单数组进行过滤和验证

    *   将简单数组传递给方法（函数）


    **Secured User Interaction**


    在第 [2](##394210_2_En_2_Chapter.xhtml) 章中，`Hello World` 示例包含了用户交互（点击提交按钮）来调用 PHP
    程序。本章将使用 HTML web 表单来接受用户的信息，然后将这些信息传递给 PHP 程序。


    *不要信任你的用户！* 你必须为你的用户在 web 表单中输入的任何类型的信息做好准备。你还必须确保在每次接受信息进入你的程序之前对其进行验证和保护。你必须记住，用户可能会选择不允许
    JavaScript 在其浏览器中运行。因此，你的程序不能依赖 JavaScript 代码来进行输入验证。你必须能够处理以下场景：


    1.  如果用户使用的是支持 HTML5 的浏览器，你可以在将输入发送到 web 服务器上的 PHP 程序之前，使用 HTML5 和/或 JavaScript
    验证所有输入。这将减少客户端机器和服务器之间的信息传递。信息在验证通过之前不会被传递。

    2.  如果用户使用的浏览器不具备 HTML5 能力，用户输入仍然可以由 web 服务器上的 PHP 程序进行验证。


    最好使用第一种方法进行初始验证。这将在信息发送到服务器之前，大部分时间验证正确信息。第二种方法会导致更多的服务器调用，因为信息必须发送到服务器进行验证，然后任何错误消息必须发送回浏览器供用户更正。


    即使你使用方法#1 验证了信息，当 PHP 程序在 web 服务器上接收到信息时，数据也必须再次进行评估。即使用户可能发送了有效信息，数据包嗅探程序也可以将有效信息更改为有害信息。


    **HTML5 Form Validation**


    当构建 HTML5 表单时，你可以验证用户输入的信息。如前所述，这将减少客户端机器和服务器之间的流量。安全的程序会限制接受用户文本输入的对象数量（如文本框）。在可能的情况下，向用户提供一个有效选项列表以供选择要安全得多。请记住，尚未实现
    HTML5 技术（或全部 HTML5）的浏览器会将这些对象（如文本框）视为普通的非验证对象。框中的信息将被接受而不进行任何验证。然而，服务器上的 PHP 程序也会验证数据。


    *   *安全性和性能——安全编程只是保护你信息完整过程的一部分。文件、目录、服务器、网络和数据库也必须得到适当的保护。此外，任何高度重要的信息（如信用卡号）必须通过安全通道（HTTPS）发送以进一步保护信息。用户
    ID 和密码应进行哈希处理（加密），以使数据包嗅探软件难以获取。*


    我们将继续第 [4](##394210_2_En_4_Chapter.xhtml) 章的示例，通过更新 `Dog` 类来接受用户为我们属性输入的信息。`Dog`
    类已经具备了安全性；我们不需要对其进行额外的安全更新。


    ```

    Dog Object


    Dog Object Creator


    Please complete ALL fields. Please note the required format of information.

    Your Dog''s Name (max 20 characters, alphabetic)


    Your Dog''s Breed (max 35 characters, alphabetic)


    Your Dog''s Color (max 15 characters , alphabetic)


    Your Dog''s Weight (numeric only)


    Example 5-1

    The lab.html file with some validation

    ```


    ![../images/394210_2_En_5_Chapter/394210_2_En_5_Fig1_HTML.jpg](images/394210_2_En_5_Chapter/394210_2_En_5_Fig1_HTML.jpg)


    **Figure 5-1**

    The lab.html file


    在示例 [5-1](##394210_2_En_5_Chapter.xhtml#PC1) 中，`dog_name`、`dog_breed` 和 `dog_color`
    文本框将字段长度设置为与第 [4](##394210_2_En_4_Chapter.xhtml) 章中 `Dog` 类验证的相同最大值。它们还使用 HTML5
    `pattern` 属性（[a-zA-Z]）来只允许字母字符。`title` 属性用于在输入错误信息时向用户显示错误。`dog_weight` 文本框使用
    `number` 输入类型，这自动限制了输入。`min` 和 `max` 参数也被设置，以将狗的体重限制在 1 到 120 磅之间。如前所述，如果浏览器没有完全实现
    HTML5 标准，它可能不会解释这些限制。然而，这些信息将在服务器上的 PHP 程序中进行验证。'
  raw: "1.  Create a PHP program with a class (`Student`) with the\n    following\
