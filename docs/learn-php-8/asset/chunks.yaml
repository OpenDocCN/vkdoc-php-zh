    NULL 值的属性时会显示错误消息。此外，在使用属性进行数学计算时，设置默认值非常重要。PHP 会再次尝试将 NULL 值转换为零以进行计算。但是，在某些情况下，这不会发生，从而会产生错误。在许多编程语言中，当尝试使用
    NULL 值进行计算时，会产生错误消息。建立适用于所有语言的编程习惯将帮助您快速培养处理多种语言的技能。*


