    The program describes two classes: the `Alpha` parent class and the `Bravo` child
    class created based on the `Alpha` parent class. The `Alpha` class has the public
    `$number` field and the public one-argument `setNumber()` method for assigning
    a value to the field. Since the `Bravo` child class is based on the `Alpha` class,
    the `Bravo` class also has the `$number` field and the `setNumber()` method, even
    though these class members are not defined in the `Bravo` class. But they are
    inherited from the `Alpha` class. In addition to the inherited members, you explicitly
    declared the public `$symbol` field and three public methods in the `Bravo` class.
    The `setSymbol()` method with one argument is designed to assign a value to the
    `$symbol` field. The `setAll()` method has two arguments. The method assigns values
    to the `$number` and `$symbol` fields. It contains the commands that call the
    `setSymbol()` and `setNumber()` methods. The `show()` method has no arguments.
    When the method is called, it displays the `$symbol` and `$number` fields of the
    object from which it is called.


    > **Note**: In the body of the child class, you handle the fields and methods
    inherited from the parent class as if they were declared directly in the child
    class.


    The `$obj=new Bravo` command is used to create the `$obj` object based on the
    `Bravo` class.


    > **Note**: You do not create an object of the `Alpha` parent class since it is
    not particularly interesting. It would be an ordinary object of an ordinary class.


    First, the `$obj->setNumber(100)` and `$obj->setSymbol(''A'')` commands assign
    values to the fields of the `$obj` object. You check the fields using the `show()`
    method. The `$obj->setAll(200,''B'')` command is another way to change the fields
    of the `$obj` object.


    | Details |

    | --- |

    | You also could directly access the `$number` and `$symbol` fields of `$obj`.
    Note that a member must be public to be accessed outside the class. It is also
    worth mentioning that there is a way to prevent a particular class from being
    inherited. In that case, the class should be declared with the `final` keyword.
