    Questions


    1\. How does testing for the presence of certain fields help us to further ensure
    the stability of our application?


    2\. Is there a reason why we should avoid testing forms that require the user
    to be logged in?


    3\. What are some other ways in which we can test our application?


    Answers


    1\. The fields contained in a form are indicative of the action a user should
    want to perform. While fields can change over time, this is a good way to know
    if something has broken the basic structure of each form.


    2\. On the contrary, we should be testing everything we can get our hands on.
