    \ needs to use the amended name when saving the file. Update the beginning of\
    \ the `moveFile()` method like this:\n\n```\nprotected function moveFile($file)\
    \ {\n    $filename = $this->newName ?? $file['name'];\n    $success = move_uploaded_file($file['tmp_name'],\n\
    \        $this->destination . $filename);\n    if ($success) {\n```\n\nThe new\
    \ first line uses the null coalescing operator (see \"Setting a default value\
    \ with the null coalescing operator\" in Chapter [4](#332054_4_En_4_Chapter.xhtml))\
    \ to assign a value to `$filename`. If the `$newName` property has been set by\
    \ the `checkName()` method, the new name is used. Otherwise, `$file['name']`,\
    \ which contains the original value from the `$_FILES` array, is assigned to `$filename`.\n\
    \nIn the second line, `$filename` replaces the value concatenated to the `$destination`\
    \ property. So, if the name has been changed, the new name is used to store the\
