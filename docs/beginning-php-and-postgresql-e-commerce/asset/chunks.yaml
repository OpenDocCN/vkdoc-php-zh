    \n至于通过 PHP 代码查询 PostgreSQL 数据库，你将要使用的工具是 `PDO`（PHP 数据对象）。\n\n### 使用 PDO 实现数据库集成\n\
    \n**`PDO`（PHP 数据对象）** 是一个原生的数据访问抽象库，随 PHP 5.1 一起提供\n"
- fmt: 'PDO is offered as a PECL extension for PHP 5.0. (PECL is a repository of PHP
    extensions, located at `http://pecl.php.net/`.) The official PDO manual, together
    with installation instructions (which can also be found in Appendix A), is available
    at `http://php.net/pdo`.


    PDO offers a uniform way to access a variety of data sources. Using PDO increases
    your application’s portability and flexibility because if the backend database
    changes, the effects on your data access code are kept to a minimum (in many cases,
    all that needs to change is the connection string for the new database).


    After you become familiar with the PDO data-access abstraction layer, you can
    use the same programming techniques on other projects that might require a different
    database solution.


    To demonstrate the difference between accessing the database using the old PHP
    functions and PDO, let’s take a quick look at two short PHP code snippets.


    **Note** If you aren’t familiar with how the code works, don’t worry—we’ll analyze
    everything in greater detail in the following chapters.


    The following shows database access using PHP native (PostgreSQL-specific) functions:


    ```php

    // Connecting to PostgreSQL


    $link = pg_connect(''host=localhost dbname=hatshop'' .


    ''user='' . $username . '' password='' . $password)


    or die(''Could not connect: '' . pg_last_error($link));


    // Execute SQL query


    $queryString = ''SELECT * FROM product'';


    $result = pg_query($link, $queryString)


    or die(''Query failed : '' . pg_last_error($link));


    // Close connection


    pg_close($link);

    ```


    Next, the same action is shown, this time using PDO:


    ```php

    try


    {


    // Create a new PDO instance


    $database_handler =


    new PDO(''pgsql:host=localhost;dbname=hatshop'',


    $username, $password);


    // Prepare the SQL query


    $statement_handler =


    $database_handler->prepare(''SELECT * FROM product'');


    // Execute SQL query


    $statement_handler->execute();


    // Retrieve result


    $result = $statement_handler->fetchAll();


    // Clear the PDO object instance


    $database_handler = null;


    }


    catch (PDOException $e)


    {


    /* If something goes wrong we catch the exception thrown by the object, print
    the message and stop the execution of script */


    print ''Error! <br />'' . $e->getMessage() . ''<br />''; exit;


    }

    ```


    The version of the code that uses PDO is longer, but it includes a powerful error-handling
    mechanism and *prepared statements* (which protect you from injection-based attacks).
    If these concepts sound foreign, once again, wait until the later chapters where
    we’ll put PDO to work, and you’ll learn more about it there.


    Also, when using PDO, you won’t need to change the data access code if, for example,
    you decide to use MySQL instead of PostgreSQL. On the other hand, the first code
    snippet, which uses PostgreSQL-specific functions, would need to change completely
    (use `mysql_connect` and `mysql_query` instead of `pg_connect` and `pg_query`,
    and so on). In addition, some MySQL-specific functions have different parameters
    than the similar PostgreSQL functions.


    When using a database abstraction layer (such as PDO), you’ll probably only need
    to change the connection string when changing the database backend. Note that
    here we’re only talking about the PHP code that interacts with the database. In
    practice, you might also need to update some SQL queries if the database engines
    support different dialects of SQL.


    **Note** To keep your SQL queries as portable as possible, keep their syntax as
    close as possible to the SQL-92 standard. You’ll learn more about SQL details
    in Chapter 3.


    ## PostgreSQL and the Three-Tier Architecture


    It is clear by now that PostgreSQL is somehow related to the data tier. However,
    if you haven’t worked with databases until now, it might be less than obvious
    that PostgreSQL is more than a simple store of data. Apart from the actual data
    stored inside, PostgreSQL is also capable of storing logic in the form of stored
    procedures, maintaining table relationships, ensuring various data integrity rules
    are obeyed, and so on.


    You can communicate with PostgreSQL through SQL (Structured Query Language), which
    is a language used to interact with the database. SQL is used to transmit to the
    database instructions such as “Send me the last 10 orders” or “Delete product
    #123.”


    Although it’s possible to compose SQL statements in your PHP code and then submit
    them for execution, this is generally a *bad practice*, because it incurs security,
    consistency, and performance penalties. In our solution, we’ll store all data
    tier logic using **database functions**.


    The code presented in this book was designed to work with PostgreSQL 8.1 (the
    most recent stable version at the time of writing). PostgreSQL consists of the
    data store in the e-commerce software project, as shown in Figure 2-5.


    **Figure 2-5.** *The technologies you’ll use to develop HatShop*


    ## Choosing Naming and Coding Standards


    Although coding and naming standards might not seem that important at first, they
    definitely shouldn’t be overlooked. Not following a set of rules for your code
    will almost always result in code that’s hard to read, understand, and maintain.
    On the other hand, when you follow a consistent way of coding, you can almost
    say your code is already half documented, which is an important contribution toward
    the project’s maintainability, especially when more people are working on the
    same project at the same time.


    **Tip** Some companies have their own policies regarding coding and naming standards,
    whereas in other cases, you''ll have the flexibility to use your own preferences.
    In either case, the golden rule to follow is be consistent in the way you code.
    Commenting your code is another good practice that improves the long-term maintainability
    of your code.


    Naming conventions refer to many elements within a project, simply because almost
    all of a project’s elements have names: the project itself, files, classes, variables,
    methods, method parameters, database tables, database columns, and so on. Without
    some discipline when naming all those elements, after a week of coding you won’t
    understand a single line of what you’ve written.


    When developing HatShop, we followed a set of naming conventions that are popular
    among PHP developers. Some of the most important rules are summarized here and
    in the following piece of code:


    ```php

    class WarZone


    {


    public $mSomeSoldier;


    private $_mSomeOtherSoldier;


    function SearchAndDestroy($someEnemy, $someOtherEnemy)


    {


    $master_of_war = ''Soldier'';


    $this->mSomeSoldier = $someEnemy;


    $this->_mSomeOtherSoldier = $someOtherEnemy;


    }


    }

    ```


    - Class names and method names should be written using Pascal casing (uppercase
    letters for the first letter in every word), such as in `WarZone` or `IsDataValid`.

    - Public class attribute names follow the same rules as class names but should
    be prepended with the character `m`. So, valid public attribute names look like
    this: `$mSomeSoldier`.

    - Private class attribute names follow the same rules as public class attribute
    names, except they’re also prepended with an underscore, such as in `$_mSomeOtherSoldier`.'
