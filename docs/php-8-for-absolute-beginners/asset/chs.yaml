  \n> **注意**  \n> `entry_id` 会在两处出现。在程序的一部分中，代码通过 `$_POST['id']` 查找 `entry_id`；在另一部分中，代码则通过\
  \ `$_GET['id']` 查找。两者值相同但用途不同，这一点略有特殊。  \n>  \n> 每次用户点击列出的博客标题时，都会生成 `$_GET['id']`\
  \ 的编码值。因此，`$_GET['id']` 代表用户希望在条目编辑器中看到的博客条目的 `entry_id`。  \n> 每次条目被加载到编辑器时，都会生成\
  \ `$_POST['id']` 的编码值。它代表用户刚刚在编辑器中看到的条目的 `entry_id`。因此，`$_GET['id']` 表示待加载的条目，而\
  \ `$_POST['id']` 表示已加载的条目。\n\n现在我们有了一个可以创建新条目并删除已有条目的编辑器。接下来，我们通过允许管理员更新条目来完成整个流程。\n\
  \n### 准备模型以更新数据库中的条目\n\n更新数据库中的已有条目显然是模型的任务。让我们向 `Blog_Entry_Table` 中添加一个更新方法。\n\
  \n```php\n// models/Newest_Blog_Entry_Table.class.php 的部分代码\n// 声明新方法\npublic function\
