    私有成员与继承

    ```


    以下是程序执行的结果。


    ```

    程序输出（来自列表 8-5）

    已创建对象: 123

    字段 $code: 321

    ```


    `Alpha` 类有一个私有的 `$code` 字段和两个公有方法：`set()` 方法允许你给字段赋值，`get()` 方法返回字段的值。基于 `Alpha`
    类，通过继承创建了 `Bravo` 类。它继承了公有的 `set()` 和 `get()` 方法，但没有（根据常规术语）继承私有的 `$code` 字段。结果发现
    `Bravo` 类拥有 `set()` 和 `get()` 方法，这些方法需要 `$code` 字段才能正常运行，但该字段本身并未被继承。这怎么可能？要回答这个问题，有必要澄清“未继承”的含义。事实是，私有字段
    `$code` 并没有在 `Bravo` 类中继承，因为你不能在 `Bravo` 类的主体中直接访问 `$code` 字段。你可以将这种情况解释为该类“不知道”这个字段的存在，但从技术上讲，这样的字段是存在的，并且
    `set()` 和 `get()` 方法可以操作它。`set()` 和 `get()` 方法在 `Bravo` 类构造函数中使用。`$this->set($code)`
    命令为 `$code` 字段赋值，`$this->get()` 指令用于获取字段的值。


    使用 `$obj=new Bravo(123)` 命令创建子类对象。该对象拥有公有的 `set()` 和 `get()` 方法。这些方法又引用了即使对 `Bravo`
    类来说也是“不可见”的 `$code` 字段。因此，`$obj->set(321)` 命令将值 `321` 写入该字段，而 `$obj->get()` 指令用于获取其值。


    | 详细信息 |

    | --- |

    | 在处理私有类成员时，你必须记住以下重要情况。如果给一个不存在的对象字段赋值，那么该对象就会获得这样一个字段。因此，如果在子类中给一个来自父类的未继承的私有字段赋值，那么该对象就会拥有这样一个字段，并且它并不是在父类中描述的那个字段。
    |


    ## 类的受保护成员


    除了公有成员和私有成员之外，一个类还可以拥有受保护的类成员。受保护的类成员使用 `protected` 访问级别说明符描述。与私有成员一样，类的受保护成员仅在类代码内部可用。但与私有成员不同，受保护成员是可以被继承的。列表
    8-6 展示了一个使用受保护类成员的例子。


    ```

    code=$code;

    }

    // 显示字段的方法：

    public function show(){

    echo "字段 \$code = ",$this->code,"\n";

    }

    }

    // 创建子类对象：

    $obj=new Bravo;

    // 为字段赋值：

    $obj->set(123);

    // 显示字段：

    $obj->show();

    ?>

