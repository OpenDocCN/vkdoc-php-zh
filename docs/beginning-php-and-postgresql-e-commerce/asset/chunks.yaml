    with UPDATE, be careful with this command because if you forget to specify a WHERE


    clause, you’ll end up deleting all of the rows in the table. The following query
    deletes all the records in department. The table itself isn’t deleted by the DELETE
    command.


    DELETE FROM department;


    **PostgreSQL Functions and Types**


    Database functions are objects that store programs written in a language that
    PostgreSQL


    understands. PostgreSQL knows how to deal with functions written in more languages,
    such as Perl or Python, but we’ll stick to the standard, which is an SQL-based
    language called **PL/pgSQL**. You can find an introduction to the language at
    http://www.postgresql.org/docs/


    current/interactive/plpgsql.html#PLPGSQL-OVERVIEW.


    You don’t need to use database functions if you want to perform database operations.
    You can directly send SQL commands from an external application (such as a PHP
    script of your HatShop application) to your PostgreSQL database. When using functions,
    instead of passing the SQL code you want executed, you just call the function
    and the values for any parameters it might have. Using functions for data operations
    has the following advantages:


    • The performance can be better because PostgreSQL generates and caches the function’s
    execution plan when it’s first executed.


    • Using functions allows for better maintainability of the data access and manipulation
    code, which is stored in a central place, and permits easier implementation of
    the three-tier architecture (the database functions forming the data tier).


    • Security can be better controlled because PostgreSQL permits setting different
    security permissions for each individual function.


    • SQL queries created ad hoc in PHP code are more vulnerable to SQL injection
    attacks, which is a major security threat. (Many Internet resources cover this
    security subject, such as the article at http://www.sitepoint.com/article/


    sql-injection-attacks-safe.)


    • This might be a matter of taste, but separating the SQL logic from the PHP code
    keeps the PHP code cleaner and easier to manage; it looks better to just query
    a function, than to join strings to build SQL queries to pass to the database.


    When developing HatShop, we’ll save all the data access code as PostgreSQL **functions**
    inside the hatshop database. These functions, as functions in any respectable
    language, have input parameters and return types. In some of our examples, we’ll
    define custom types for returning the results.


    The syntax for creating functions is


    CREATE FUNCTION <name>(<param1 type>, <param2 type> ... ) RETURNS [SETOF] <return
    type> LANGUAGE plpgsql AS $$


    <code>


    $$


    Alternatively, you can specify the language (LANGUAGE plpgsql) at the end of the
    function code, after the closing $$.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


