    \ and follow the instructions (for detailed instructions please see Appendix A).\
    \ Then, for example, you could execute the following PostgreSQL statement to see\
    \ the PostgreSQL SHA1 in action:\n> ```sql\n> SELECT ENCODE(DIGEST('freedom',\
    \ 'sha1'), 'hex');\n> ```\n> Of course, when relying on PostgreSQL’s hashing functionality,\
    \ the passwords travel in “plain format” to your PostgreSQL server, so if the\
    \ PostgreSQL server is on another network (which is quite unlikely, however),\
    \ you must secure the connection between your web server and the PostgreSQL server\
    \ by using SSL connections.\n> This can be avoided by handling hashing in the\
    \ PHP code, which also offers better portability because it doesn’t rely on PostgreSQL-specific\
    \ functions. Remember that for the same portability reason, we chose to use PDO\
    \ instead of using PHP PostgreSQL-specific functions.\n\n## Implementing the Encryption\
    \ Functionality in the Business Tier\n\nEncryption comes in many shapes and sizes\
    \ and continues to be a hot topic. There is no definitive solution to encrypting\
    \ data, although there is plenty of advice on the subject. In general, the two\
    \ forms of encryption are\n\n**Symmetric encryption:** A single key is used both\
    \ to encrypt and decrypt data."
