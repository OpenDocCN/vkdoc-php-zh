- fmt: '# Using the Example Files


    All the files necessary for working through this book can be downloaded from the
    Apress web site via the **Download Source Code** button located at [`www.apress.com/9781484243374`](http://www.apress.com/9781484243374).


    Set up a PHP development environment, as described in Chapter [2](#332054_4_En_2_Chapter.xhtml).
    Unzip the files and copy the `phpsols-4e` folder and all its contents into your
    web server’s document root. The code for each chapter is in a folder named after
    the chapter: `ch01`, `ch02`, and so on. Follow the instructions in each PHP solution,
    and copy the relevant files to the site root or the work folder indicated.


    Where a page undergoes several changes during a chapter, I have numbered the different
    versions like this: `index_01.php`, `index_02.php`, and so on. When copying a
    file that has a number, remove the underscore and number from the filename, so
    `index_01.php` becomes `index.php`. If you are using a program that prompts you
    to update links when moving files from one folder to another, do not update them.
    The links in the files are designed to pick up the right images and style sheets
    when located in the target folder. I have done this so you can use a file comparison
    utility to check your files against mine.


    If you don’t have a file comparison utility, I strongly urge you to install one.
    It will save you hours of head scratching when trying to spot the difference between
    your version and mine. A missing semicolon or mistyped variable can be hard to
    spot in dozens of lines of code. Windows users can download WinMerge for free
    from [`http://winmerge.org/`](http://winmerge.org/). I use Beyond Compare ([`www.scootersoftware.com`](http://www.scootersoftware.com)),
    which is now available for Windows, macOS, and Linux. It’s not free but is excellent
    and reasonably priced. BBEdit on a Mac includes a file comparison utility. If
    you’re comfortable using Terminal on a Mac, the `diff` utility is installed by
    default.


    ## Layout Conventions


    To keep this book as clear and easy to follow as possible, the following text
    conventions are used throughout:


    - Important words or concepts are normally highlighted on the first appearance
    in **bold type**.

    - Code is presented in `fixed-width font`.

    - New or changed code is normally presented in **`bold fixed-width font`**.

    - Pseudocode and variable input are written in *`italic fixed-width font`*.

    - Menu commands are written in the form Menu ➤ Submenu ➤ Submenu.

    - Where I want to draw your attention to something, I’ve highlighted it, like
    this:


    Ahem, don’t say I didn’t warn you.


    ## Acknowledgments


    Many people have contributed to this book, each one helping improve it as it has
    moved over four editions. I’m particularly grateful to Chris Mills, the editor
    of the first edition, whose idea it was to move away from the cookbook formula
    of isolated solutions that left the reader with little or no idea about the practical
    use of a technique. Chris’s successors, Ben Renow-Clarke (for the second and third
    editions) and Mark Powers (for this edition), have both provided a light touch,
    nudging me in the right direction and forgiving my late delivery times. By the
    way, if you think we’re keeping it in the family, Mark is no relation in spite
    of his splendid surname.


    A really big thank you is due to the technical reviewers of this edition, Rob
    Aley and Massimo Nardone. By the time a book gets to its fourth edition, an author
    hopes to get something of a free ride, expecting all the problems to have been
    sorted out in previous editions. Fortunately for you, the reader, they subjected
    my code and text to almost forensic analysis, making really helpful suggestions.
    As a result, the book has been greatly improved. Any errors or inconsistencies
    that remain are my responsibility alone.


    Thanks are also due to everyone involved in the production chain at Apress. A
    book would never see the light of day without their diligent work behind the scenes.


    Finally, I would like to pay tribute to my late wife, Toshiko, who put up with
    me disappearing for hours on end working on the previous editions of this book.
    We should have spent more time together. Miss you.


    ### About the Author and About the Technical Reviewers

    #### About the Author

    #### About the Technical Reviewers


    # 1. What Is PHP—And Why Should I Care?


    PHP is often described by its critics as one of the worst programming languages,
    yet it’s also one of the most popular. It helps power Google, Yahoo, and Wikipedia,
    among others. According to Web Technology Surveys ([`https://w3techs.com/technologies/details/pl-php/all/all`](https://w3techs.com/technologies/details/pl-php/all/all)),
    it’s deployed on more than four in every five web sites that use a server-side
    language. So, PHP has obviously got something going for it. Indeed, it has. PHP
    was specifically designed for building dynamic web sites. It’s free; it has a
    very gentle learning curve; and this book will show you how to put it to practical
    use.


    Most of the criticism levelled at PHP can be disregarded. Because of the way the
