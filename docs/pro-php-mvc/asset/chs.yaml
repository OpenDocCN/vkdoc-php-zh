  , \"photo field not found\");\n        $this->assertQuery(\"input[name='save']\"\
  , \"register button not found\");\n    }\n\n    public function testRegisterWorks()\n\
  \    {\n```\n\n\n```php\n$this->request->setMethod(\"POST\")\n->setPost(array(\n\
  \    \"first\" => \"testing\",\n    \"last\" => \"testing\",\n    \"email\" => $this->_email,\n\
  \    \"password\" => $this->_password,\n    \"save\" => \"register\"\n));\n$this->dispatch(\"\
  /users/register\");\n$this->assertQueryContentContains(\"p\", \"account has been\
  \ created\");\n}\n\npublic function testLoginHasFields()\n{\n$this->dispatch(\"\
  /users/login\");\n$this->assertQuery(\"input[name='email']\", \"email field not\
