    We then set the timer delay of 200 milliseconds (or 0.2 seconds). Additionally,
    we define a placeholder to hold the timer returned from the setTimeout() function.
    Finally, we add a placeholder to hold the current query.


    ■**Note** Although we specify the delay here in seconds, setTimeout() accepts
    the delay in milliseconds.


    This means we must multiply the delay by 1,000\. We do this only as a convention
    since Prototype and Scriptaculous do the same thing.


