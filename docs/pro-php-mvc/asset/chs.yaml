  \            if (rename($file, \"{$path}/{$filename}\"))\n            {\n      \
  \          // get image size/mime\n                $dimensions = getimagesize(\"\
  {$path}/{$filename}\");\n                // create new file + save\n           \
  \     $file = new Application_Model_File(array(\n                    \"name\" =>\
  \ $filename,\n                    \"mime\" => $dimensions[\"mime\"],\n         \
  \           \"size\" => $size,\n                    \"width\" => $dimensions[0],\n\
  \                    \"height\" => $dimensions[1],\n                    \"user\"\
  \ => $user\n                ));\n                $file->save();\n            }\n\
  \        }\n    }\n    public function registerAction()\n    {\n        $valid =\
