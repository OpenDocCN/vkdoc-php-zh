    `article2cat` cross-reference table. If a record is deleted in either the `blog`
    or `categories` parent tables, the related values need to be deleted in the cross-reference
    table.


    The relationship between the `images` and `blog` tables is different. If you delete
    a record from the `images` table, you probably don’t want to delete related articles
    in the `blog` table. In that case, `SET NULL` is an appropriate choice. When a
    record is deleted from the `images` table, the foreign key in related articles
    is set to `NULL`, but the articles remain intact.


    On the other hand, if images are vital to the understanding of articles, select
    `RESTRICT`. Any attempt to delete an image that still has related articles is
    automatically halted.


    These considerations affect how you handle deletion scripts. When the foreign-key
    constraint is set to `CASCADE` or `SET NULL`, you don’t need to do anything special.
    You can use a simple `DELETE` query and leave the rest to the database.


    However, if the foreign-key constraint is set to `RESTRICT`, the `DELETE` query
    will fail. To display an appropriate error message, use the `errno` property of
    a MySQLi statement object. The MySQL error code for a query that fails as a result
    of a foreign-key constraint is `1451`. After calling the `execute()` method, you
    can check for errors in MySQLi as follows:


    `$stmt->execute();`


