  \ size=\"20\" type=\"password\" name=\"repassword\"></td></tr>\n            <tr><td>全名：</td><td><input\
  \ size=\"50\" type=\"text\" name=\"complete_name\"></td></tr>\n            <tr><td>地址：</td><td><input\
  \ size=\"80\" type=\"text\" name=\"address1\"></td></tr>\n            <tr><td></td><td><input\
  \ size=\"80\" type=\"text\" name=\"address2\"></td></tr>\n            <tr><td>城市：</td><td><input\
  \ size=\"30\" type=\"text\" name=\"city\"></td></tr>\n            <tr><td>州/省：</td><td><input\
  \ size=\"30\" type=\"text\" name=\"state\"></td></tr>\n            <tr><td>国家：</td><td><input\
  \ size=\"30\" type=\"text\" name=\"country\"></td></tr>\n            <tr><td>邮政编码：</td><td><input\
  \ size=\"20\" type=\"text\" name=\"zipcode\"></td></tr>\n            <tr><td>电话号码：</td><td><input\
  \ size=\"30\" type=\"text\" name=\"phone_no\"></td></tr>\n            <tr><td><input\
  \ type=\"submit\" name=\"submit\" value=\"提交\"></td><td>\n            <input type=\"\
  reset\" value=\"取消\"></td></tr>\n        </table>\n    </form>\n</body>\n</html>\n\
  ```\n\n该 PHP 脚本的输出如图 2-5 所示。可以看到，页面上显示了多个文本框，供用户输入电子邮件地址、密码、全名、地址、城市、州/省、国家、邮政编码和电话号码。在各个文本框中输入的数据会被传递给\
  \ `addcustomer.php` 脚本，用于将信息存储到数据表中。表单通过 HTTP POST 请求方法提交。回顾一下，`$_POST` 是一个数组，用于存储通过\
  \ HTTP POST 方法发送的变量名和值。这也意味着，在 `addcustomer.php` 脚本中，新用户的信息将通过 `$_POST` 数组获取。\n\n\
  ![A978-1-4842-1672-9_2_Fig5_HTML.jpg](img/A978-1-4842-1672-9_2_Fig5_HTML.jpg)\n\n\
  **图 2-5.** 用于创建新账户的注册表单\n\n如果用户正确填写了电子邮件地址、密码等必要信息，这个 PHP 脚本似乎完全正常运行。但如果用户把某些必要的文本框留空了呢？\n\
  \n前面的 PHP 脚本没有应用验证检查。接下来，让我们学习如何为注册表单应用验证检查。\n\n### 应用验证检查\n\n为了向应用程序提供正确的输入，数据验证是必不可少的。数据验证是确保输入到\
  \ Web 表单中的数据正确且符合所需格式的过程。数据验证包括检查以下几点：\n\n*   必填字段是否已输入数据。没有关键字段留空。\n*   输入数据时是否出错。例如，数字字段中未输入文本，反之亦然。\n\
  *   数据是否以所需格式输入。例如，日期是否以要求的格式输入。\n\n您将使用 JavaScript 为注册表单应用验证检查。PHP 脚本 `validatesignup.php`\
  \ 如清单 2-10 所示。\n\n**清单 2-10.** 用于创建新账户的注册表单 (`validatesignup.php`)\n\n```html\n\
  <html>\n<head>\n<script language=\"JavaScript\" type=\"text/JavaScript\" src=\"\
  checkform.js\"></script>\n</head>\n<body>\n<form action=\"addcustomer.php\" method=\"\
  post\" onsubmit=\"return validate(this);\">\n<table border=\"0\" cellspacing=\"\
  1\" cellpadding=\"3\">\n<tr><td colspan=\"2\" align=\"center\">请输入您的信息</td></tr>\n\
  <tr><td>电子邮件地址：</td><td><input size=\"20\" type=\"text\" name=\"emailaddress\" ><span\
  \ id=\"emailmsg\"></span></td></tr>\n<tr><td>密码：</td><td><input size=\"20\" type=\"\
  password\" name=\"password\" ><span id=\"passwdmsg\"></span></td></tr>\n<tr><td>重新输入密码：</td><td><input\
  \ size=\"20\" type=\"password\" name=\"repassword\"><span id=\"repasswdmsg\"></span></td></tr>\n\
  <tr><td>全名：</td><td><input size=\"50\" type=\"text\" name=\"complete_name\" ><span\
  \ id=\"usrmsg\"></span></td></tr>\n<tr><td>地址：</td><td><input size=\"80\" type=\"\
  text\" name=\"address1\"></td></tr>\n<tr><td></td><td><input size=\"80\" type=\"\
  text\" name=\"address2\"></td></tr>\n<tr><td>城市：</td><td><input size=\"30\" type=\"\
  text\" name=\"city\"></td></tr>\n<tr><td>州/省：</td><td><input size=\"30\" type=\"\
  text\" name=\"state\"></td></tr>\n<tr><td>国家：</td><td><input size=\"30\" type=\"\
  text\" name=\"country\"></td></tr>\n<tr><td>邮政编码：</td><td><input size=\"20\" type=\"\
  text\" name=\"zipcode\"></td></tr>\n<tr><td>电话号码：</td><td><input size=\"30\" type=\"\
  text\" name=\"phone_no\"></td></tr>\n<tr><td><input type=\"submit\" name=\"submit\"\
  \ value=\"提交\"></td><td>\n<input type=\"reset\" value=\"取消\"></td></tr>\n</table>\n\
  </form>\n</body>\n</html>\n```\n\n首先要提到的语句是将 JavaScript 文件 `checkform.js` 导入到当前网页中：\n\
  \n```html\n<script language=\"JavaScript\" type=\"text/JavaScript\" src=\"checkform.js\"\
  ></script>\n```\n\n由于本章使用了 JavaScript，因此需要对其进行简要介绍。\n\nJavaScript 是一种编程语言，用于通过实现动态页面和执行验证检查来扩展网站的功能。JavaScript\
  \ 的一些特性包括：\n\n*   它是一种轻量级的、解释型编程语言。\n*   它通常在客户端机器上执行，因此消耗更少的服务器资源，并避免了过多的服务器流量。\n\
  *   它响应速度非常快。由于它在客户端机器上处理和执行，因此其响应速度比其他服务器端脚本语言更快。\n*   它相对容易学习，因为其语法接近英语。\n\nJavaScript\
  \ 文件 `checkform.js` 包含用于验证 `validatesignup.php` 文件中不同字段的代码。\n\n在网页中包含 JavaScript\
  \ 有两种方式：\n\n*   将 JavaScript 放置在 `<head>` 元素中。\n*   将 JavaScript 放在一个单独的文件中，以 `.js`\
  \ 扩展名保存，然后使用 `<script>` 元素来包含该代码文件。（通过包含该 JavaScript 文件，其代码将在该位置合并到 HTML 中。）这种方法更可取，因为它能使\
  \ HTML 代码保持简洁，并将所有 JavaScript 代码集中在一处。\n\n\n\n`onsubmit=\"return validate(this);\"\
  ` 调用了 JavaScript 文件中的 `validate()` 函数，并将 `this`（即当前表单作为参数）传入，以便在 `validate` 函数中验证其所有字段。此外，只有当\
  \ `validate` 函数返回 `true` 时，表单才会提交并跳转到 `addcustomer.php` 脚本。如果该函数返回 `false`（即任何字段验证失败），则不会提交表单。相反，会显示错误信息，并提示用户修正该字段。\n\
  \n`<span id=\"emailmsg\"></span>` 定义了一个带有 ID 的位置，该 ID 为 `emailmsg`，当用户在邮箱地址框中输入错误的邮箱地址时，将使用此位置显示错误信息。类似地，后续的输入框也定义了带有\
  \ ID 的位置：`passwdmsg`、`repasswdmsg` 和 `usrmsg`，以便在密码、确认密码和完整姓名字段验证失败时显示错误信息。\n\n\
  JavaScript 文件 `checkform.js` 对注册表单 `validatesignup.php` 应用验证检查。该文件如清单 2-11 所示。\n\
  \n### 清单 2-11. JavaScript 文件 (checkform.js)\n\n```\nfunction validate(userForm)\
  \ {\n\ndiv=document.getElementById(\"emailmsg\"); // #1\n\ndiv.style.color=\"red\"\
  ;                   // #2\n\nif(div.hasChildNodes())                  // #3\n\n\
  {\n\ndiv.removeChild(div.firstChild);     // #4\n\n}\n\nregex=/(^\\w+\\@\\w+\\.\\\
  w+)/;                // #5\n\nmatch=regex.exec(userForm.emailaddress.value);\n\n\
  if(!match)\n\n{\n\ndiv.appendChild(document.createTextNode(\"Invalid Email\"));\
  \   // #6\n\nuserForm.emailaddress.focus();       // #7\n\nreturn false;       \
  \                 // #8\n\n}\n\ndiv=document.getElementById(\"passwdmsg\");\n\n\
  div.style.color=\"red\";\n\nif(div.hasChildNodes())\n\n{\n\ndiv.removeChild(div.firstChild);\n\
  \n}\n\nif(userForm.password.value.length <=5)  // #9\n\n{\n\ndiv.appendChild(document.createTextNode(\"\
  The password should be of at least size 6\"));\n\nuserForm.password.focus();\n\n\
  return false;\n\n}\n\ndiv=document.getElementById(\"repasswdmsg\");\n\ndiv.style.color=\"\
  red\";\n\nif(div.hasChildNodes())\n\n{\n\ndiv.removeChild(div.firstChild);\n\n}\n\
  \nif(userForm.password.value != userForm.repassword.value) // #10\n\n{\n\ndiv.appendChild(document.createTextNode(\"\
  The two passwords don’t match\"));\n\nuserForm.password.focus();\n\nreturn false;\n\
  \n}\n\nvar div=document.getElementById(\"usrmsg\");\n\ndiv.style.color=\"red\";\n\
  \nif(div.hasChildNodes())\n\n{\n\ndiv.removeChild(div.firstChild);\n\n}\n\nif(userForm.complete_name.value.length\
  \ ==0) // #11\n\n{\n\ndiv.appendChild(document.createTextNode(\"Name cannot be blank\"\
  ));\n\nuserForm.complete_name.focus();\n\nreturn false;\n\n}\n\nreturn true;\n\n\
  }\n```\n\n当点击“提交”按钮时，会调用 `validate()` 方法。该方法检查各个文本框中输入的数据是否正确。`document.getElementById()`\
  \ 方法用于在网页表单中查找具有指定 ID 的对象。表单中任何位置放置的给定 ID 的对象都会通过此方法被搜索到。语句 #1 在网页表单上搜索 ID 为 `emailmsg`\
  \ 的元素，并将其赋值给名为 `div` 的对象（名称可以是任意值）。语句 #2 将显示在 `emailmsg` ID 指定位置的内容设置为红色。\n\n语句\
  \ #3 中的 `hasChildNodes()` 方法检查 `emailmsg` ID 位置是否已显示了一条消息。如果已经显示了一条错误消息，则通过语句 #4\
  \ 中的 `removeChild()` 方法将其移除。语句 #5 中的正则表达式用于检查有效的邮箱地址。如果用户输入了无效的邮箱地址，语句 #6 会使用 `appendChild()`\
  \ 方法在 `emailmsg` ID 位置显示错误消息 `\"Invalid Email\"`，如图 2-6 所示。`appendChild()` 方法用于将给定的节点附加到文档中。请记住，除非使用\
  \ `appendChild()` 方法将节点附加到文档中，否则节点永远不会在浏览器窗口中显示。子节点可以附加到任何元素上。\n\n![A978-1-4842-1672-9_2_Fig6_HTML.jpg](img/A978-1-4842-1672-9_2_Fig6_HTML.jpg)\n\
  \n**图 2-6.** 输入无效邮箱地址后出现无效邮箱错误信息\n\n因为输入了无效的邮箱地址，所以通过语句 #7 应用于邮箱地址框的 `focus()` 方法，将光标置于该框中，从而要求用户重新输入。语句\
  \ #8 返回 `false`，以便表单无法提交。只有当 `validate()` 方法返回 `true` 时，表单才能成功提交，而这只有在所有必填字段的数据均正确输入后才有可能实现。\n\
  \n语句 #9 确保输入的密码长度不小于 5。语句 #10 确保在“密码”和“确认密码”文本框中输入的密码完全相同。如果这两个密码不匹配，则会在 `repasswdmsg`\
  \ ID 代表的位置显示 `\"The two passwords don’t match\"`（两次输入的密码不匹配）错误消息（参见图 2-7）。\n\n![A978-1-4842-1672-9_2_Fig7_HTML.jpg](img/A978-1-4842-1672-9_2_Fig7_HTML.jpg)\n\
  \n**图 2-7.** 如果两次输入的密码不匹配，则显示两次密码不匹配错误信息\n\n语句 #11 确保用户没有将完整姓名字段留空。如果有任何验证检查失败，`validate()`\
  \ 方法会返回 `false`。如果所需的文本框成功通过各项验证检查，验证方法则返回 `true`，从而表单被提交，输入的数据被传输到 `addcustomer.php`\
  \ 脚本以保存到数据库表中。\n\n为了通过 PHP 将数据保存到 MySQL 服务器的数据库表中，你需要了解 PHP 和 MySQL 之间是如何建立连接的。你将在下一节学习如何实现。\n\
  \n### 连接 PHP 与 MySQL 的代码\n\n要连接到 MySQL 服务器，你需要使用有效的用户名和密码执行 `mysqli_connect()` 方法。建立连接的语法如下：\n\
  \n```\n$variable = mysqli_connect(\"localhost\", $user, $password, $database) or\
  \ die (\"Error Message.\");\n```\n\n**注意：** PHP 和 MySQL 版本 5 的支持不再捆绑在标准 PHP 发行版中，因此你需要显式配置\
  \ PHP 以利用此扩展。\n\n在上述语法中，`localhost` 表示 MySQL 服务器安装在本地机器上，但如果你要连接到远程服务器，此字符串将被替换为服务器的\
  \ IP 地址或服务器名称。`$user` 和 `$password` 包含管理员提供的有效用户 ID 和密码。变量 `$database` 代表你要连接并对其执行\
  \ SQL 语句以插入或获取所需信息的数据库。关键词 `die` 用于在信息有误时打印错误消息。以下示例将 root 用户连接到 `shopping` 数据库：\n\
  \n```\n$connect = mysqli_connect(\"localhost\", \"root\", \"gold\", \"shopping\"\
  ) or die (\"Please, check the server connection.\");\n```\n\n此语句如果执行成功，将返回一个代表与\
  \ MySQL 服务器和指定数据库连接的对象。\n\n\n\n#### 通过 PHP 执行 SQL 命令\n\n建立与数据库的连接后，下一步任务就是在该数据库上执行所需的\
  \ SQL 语句。要在数据库上执行所需的 SQL 语句，需使用 `mysqli_query()` 方法，其语法如下：\n\n```\n$result = mysqli_query($connect,\
  \ $sql) or die(mysql_error());\n```\n\n`$connect` 变量表示与 MySQL 服务器的连接，`$sql` 表示要在已连接的数据库上执行的\
  \ SQL 语句。`$result` 变量将存储 SQL 语句的执行结果。\n\n清单 2-12 中的 PHP 脚本用于检查是否已建立与 MySQL 服务器的连接。\n\
  \n**清单 2-12.** `checkconnection.php` 脚本确认与 MySQL 服务器的连接是否已建立\n\n```\n<?php\n   \
  \ // 连接到数据库服务器\n    $MySQLi = new MySQLi(\"localhost\", \"root\", \"gold\", \"shopping\"\
  );\n    if ($MySQLi->errno) {\n        printf(\"无法连接到数据库：<br /> %s\",$MySQLi->error);\n\
  \        exit();\n    }\nelse\n    printf(\"已成功连接到 MySQL 服务器并打开了 shopping 数据库\"\
  );\n?>\n```\n\n在上述代码中，建立了与 MySQL 服务器的连接并选择了 `shopping` 数据库。连接成功后，您将看到如图 2-8 所示的消息。\n\
  \n![A978-1-4842-1672-9_2_Fig8_HTML.jpg](img/A978-1-4842-1672-9_2_Fig8_HTML.jpg)\n\
  \n**图 2-8.** 消息确认已成功连接到 MySQL 服务器并打开了 `shopping` 数据库\n\n##### 在数据库表中存储信息\n\n用于在底层数据库表中存储新用户信息的\
  \ PHP 脚本如清单 2-13 所示。\n\n**清单 2-13.** `addcustomer.php` 脚本将客户信息保存到数据库表中\n\n```\n\
  <?php\n$connect = mysqli_connect(\"localhost\", \"root\", \"gold\", \"shopping\"\
  ) or die (\"请检查服务器连接。\");\n$email_address = $_POST['emailaddress'];\n$password =\
  \ $_POST['password'];\n$repassword = $_POST['repassword'];\n$completename = $_POST['complete_name'];\n\
  $address1 = $_POST['address1'];\n$address2 = $_POST['address2'];\n$city = $_POST['city'];\n\
  $state = $_POST['state'];\n$country = $_POST['country'];\n$zipcode = $_POST['zipcode'];\n\
  $phone_no = $_POST['phone_no'];\n$sql = \"INSERT INTO customers (email_address,\
  \ password, complete_name, address_line1, address_line2, city, state, zipcode, country,\
  \ cellphone_no) VALUES ('$email_address',(PASSWORD('$password')), '$completename',\
  \ '$address1','$address2','$city', '$state', '$zipcode', '$country', '$phone_no')\"\
  ;\n$result = mysqli_query($connect, $sql) or die(mysql_error());\nif ($result)\n\
  {\n?>\n    <p>\n    尊敬的，<?php echo $completename; ?> 您的账户已成功创建\n<?php\n}\nelse\n\
  {\n    echo \"发生了一些错误。请使用不同的邮箱地址\";\n}\n?>\n```\n\n此 PHP 脚本将用户通过 `validatesignup.php`\
  \ 脚本（参见清单 2-10）显示的网络表单中输入的信息保存到 `shopping` 数据库的 `customers` 表中。回顾一下，在第 1 章中，您创建了\
  \ `shopping` 数据库以及该电子商务网站所需的不同表。\n\n您可以看到，首先建立了与 MySQL 服务器的连接并选择了 `shopping` 数据库。用户输入的\
  \ `validatesignup.php` 脚本中的信息被赋值给 `$_POST` 数组。然后检索 `$_POST` 数组中的信息并存储到不同的变量中。之后，执行一条在\
  \ `customers` 表中插入记录的 SQL 语句，并通知用户账户创建成功，如图 2-9 所示。\n\n![A978-1-4842-1672-9_2_Fig9_HTML.jpg](img/A978-1-4842-1672-9_2_Fig9_HTML.jpg)\n\
  \n**图 2-9.** 消息确认用户账户创建成功\n\n##### 从数据库访问信息\n\n存储在数据库中的信息是为了将来使用。这意味着您可以在需要时从数据库访问信息。要从数据库访问信息，可使用以下四种方法：\n\
  \n*   `mysqli_num_rows()` — 返回给定记录集中的行数。\n*   `mysqli_affected_rows()` — 返回受指定 SQL\
  \ 命令影响的行数。\n*   `mysqli_fetch_array()` — 一次从给定记录集中返回一行。\n*   `extract()` — 提取指定行中的列或字段。\n\
  \n让我们详细讨论这些方法。\n\n###### `mysqli_num_rows()`\n\n`mysqli_num_rows()` 方法返回指定记录集中存在的行数。使用此方法的语法如下：\n\
  \n```\nint mysqli_num_rows(recordset)\n```\n\n其中 `recordset` 表示通过 `mysqli_query()`\
  \ 方法执行 SQL `SELECT` 语句后检索到的记录或行。\n\n###### `mysqli_affected_rows()`\n\n`mysqli_affected_rows()`\
  \ 方法返回指定 SQL 查询中执行的 `DELETE`、`INSERT`、`REPLACE` 或 `UPDATE` 语句影响的行数。此方法应在通过 `mysqli_query()`\
  \ 方法执行 SQL 语句后立即使用。使用此方法的语法如下：\n\n```\nint mysqli_affected_rows()\n```\n\n######\
  \ `mysqli_fetch_array()`\n\n`mysqli_fetch_array()` 函数一次从指定的记录集或行数组中取出一行。它从给定记录集中获取一行并返回\
  \ `true`。每行以关联数组或数字数组的形式返回。当记录集中没有更多行时，该函数返回 `false`。使用此方法的语法是：\n\n```\nrow = mysqli_fetch_array(recordset,\
  \ array_type)\n```\n\n其中 `recordset` 表示执行 `mysqli_query()` 函数后返回的行。\n\n`array_type`\
  \ 参数是可选的，它表示取出的行需要返回的数组格式。该参数的可用选项有：\n\n*   `MYSQL_ASSOC` — 以关联数组格式返回一行。\n*   `MYSQL_NUM`\
  \ — 以数字数组格式返回一行。\n*   `MYSQL_BOTH` — 默认值。返回一个既可以作为关联数组又可以作为数字数组使用的行。也就是说，返回的数组同时具有关联和数字索引。\n\
  \n取出一行后，`mysqli_fetch_array()` 函数会自动移动到记录集中的下一行。每次后续调用此函数都会返回指定记录集中的下一行。例如，以下语句从指定的\
  \ `$result`（即记录集）中取出一行，并以关联数组格式返回该行：\n\n```\n$row = mysqli_fetch_array($result,\
  \ MYSQLI_ASSOC)\n```\n\n###### `extract()`\n\n`extract()` 函数提取指定数组或行中存储的所有变量或列。使用此方法的语法如下：\n\
  \n```\nextract(array/row)\n```\n\n例如，这会提取指定行中的所有列：\n\n```\nextract($row);\n```\n\
  \n现在让我们看看如何应用这些方法来验证用户身份。\n\n\n\n## 实现身份验证\n\n对用户进行身份验证意味着判断访问者是否已在电子商务网站上注册。实现身份验证包含两个步骤：\n\
  \n您已经学习了如何显示并执行一个脚本，让访问者能够在您的网站上注册并创建账户。为了验证访问者是否已注册，系统会提供一个登录表单，提示他们输入有效的电子邮件地址和密码。当用户输入电子邮件地址和密码后，点击登录表单中的“提交”按钮，就会被引导至另一个脚本，该脚本访问\
  \ `customers` 表，并确认是否存在与所提供电子邮件地址和密码匹配的客户（行）。如果存在与指定电子邮件地址和密码匹配的客户，则表明该访问者已在您的网站注册，屏幕上将显示一条欢迎消息。如果\
  \ `customers` 表中没有与所提供电子邮件地址和密码匹配的行，则表明该访问者尚未在您的网站注册，或输入了错误的信息。因此，系统会向访问者提供两个链接供其选择——一个引导他们创建新账户，另一个允许他们重新尝试登录。\n\
  \n名为 `signin.php` 的 PHP 脚本如代码清单 2-14 所示。它执行实现身份验证的第一步——显示登录表单。\n\n**代码清单 2-14.**\
  \ 用于显示登录表单的 `signin.php` 脚本\n\n```\n<html>\n<head>\n</head>\n<body>\n<form action=\"\
  validateuser.php\" method=\"post\">\n<table border=\"0\" cellspacing=\"1\" cellpadding=\"\
  3\">\n<tr><td>电子邮件地址：</td><td><input type=\"text\" name=\"emailaddress\"></td></tr>\n\
  <tr><td>密码：</td><td><input type=\"password\" name=\"password\"></td></tr>\n<tr><td\
  \ colspan=2 align=\"center\"><input type=\"submit\" name=\"submit\" value=\"登录\"\
  ></td></tr>\n</table>\n</form>\n</body>\n</html>\n```\n\n该脚本向访问者显示两个文本框，一个用于输入电子邮件地址，另一个用于输入密码（见图\
  \ 2-10）。用户输入电子邮件地址和密码并点击“提交”后，表单中输入的信息将被赋值给 `$_POST` 数组，并发送至 `validateuser.php`\
  \ 脚本，以检查 `customers` 表中是否存在与所提供电子邮件地址和密码匹配的用户。\n\n![A978-1-4842-1672-9_2_Fig10_HTML.jpg](img/A978-1-4842-1672-9_2_Fig10_HTML.jpg)\n\
  \n**图 2-10.** 提示用户输入有效电子邮件地址和密码的登录表单\n\n名为 `validateuser.php` 的 PHP 脚本如代码清单 2-15\
  \ 所示。它执行身份验证的第二步——验证访问者输入的信息是否有效。\n\n**代码清单 2-15.** 用于对用户进行身份验证的 `validateuser.php`\
  \ 脚本\n\n```\n<html>\n<head>\n</head>\n<body>\n<?php\n$connect = mysqli_connect(\"\
  localhost\", \"root\", \"gold\", \"shopping\") or die(\"请检查您的服务器连接。\");\n$query\
  \ = \"SELECT email_address, password, complete_name FROM customers WHERE email_address\
  \ like '\" . $_POST['emailaddress'] . \"' \" .\n\"AND password like (PASSWORD('\"\
  \ . $_POST['password'] . \"'))\";\n$result = mysqli_query($connect, $query) or die(mysql_error());\n\
  if (mysqli_num_rows($result) == 1) {\nwhile ($row = mysqli_fetch_array($result,\
  \ MYSQLI_ASSOC)) {\nextract($row);\necho \"欢迎 \" . $complete_name . \" 来到我们的购物中心<br>\"\
  ;\n}\n}\nelse {\n?>\n无效的电子邮件地址和/或密码<br>\n尚未注册？\n<a href=\"validatesignup.php\">点击此处</a>\
  \ 进行注册。<br><br><br>\n想要重试？<br>\n<a href=\"signin.php\">点击此处</a> 重新登录。<br>\n<?php\n\
  }\n?>\n</body>\n</html>\n```\n\n如预期那样，建立了与 MySQL 服务器的连接，并选择了 `shopping` 数据库。编写了一条\
  \ SQL 语句用于在 `customers` 表中搜索。该 SQL 语句检查 `customers` 表中是否存在任何一行的电子邮件地址和密码与 `$_POST`\
  \ 数组中的电子邮件地址和密码匹配。回想一下，通过 `signin.php` 脚本显示的表单中输入的电子邮件地址和密码会被赋值给 `$_POST` 数组，并导航至\
  \ `validateuser.php`。\n\n如果 `customers` 表中存在与所提供电子邮件地址和密码匹配的客户，则会向用户显示一条欢迎消息（见图\
  \ 2-11 — 底部）。\n\n![A978-1-4842-1672-9_2_Fig11_HTML.jpg](img/A978-1-4842-1672-9_2_Fig11_HTML.jpg)\n\
  \n**图 2-11.** 输入错误的电子邮件地址或密码时出现的消息（顶部）以及输入正确的电子邮件地址和密码时显示的欢迎消息（底部）\n\n如果 `customers`\
  \ 表中不存在（与访问者的电子邮件地址和密码匹配的）行，则假定访问者尚未注册，或输入了无效的电子邮件地址或密码。因此，会向访问者显示两个链接供其选择——一个用于创建新账户（`validatesignup.php`），另一个用于重新尝试登录（`signin.php`）（见图\
  \ 2-11 — 顶部）。\n\n## 本章小结\n\n在本章中，您学习了如何编写和运行您的第一个 PHP 脚本。您还了解了信息如何从一个脚本传递到另一个脚本。您学习了通过创建注册表单从用户那里获取信息。为了存储新客户的信息，您学习了在\
  \ PHP 和 MySQL 服务器之间建立连接所需的方法。\n\n您学习了创建和执行用于将用户信息存储在 `customers` 表中的脚本。最后，您学习了从数据库访问信息所需的方法，并利用这些知识对用户进行身份验证（通过创建登录脚本）。\n\
  \n在下一章中，您将学习如何访问 `products` 表并显示其中的产品列表。此外，您还将学习显示产品图片。您将学习在电子商务网站上实现搜索框，以便访问者快速搜索所需产品，记住访问者的喜好，最后，您还将学习会话处理。\n\
  \n"
- "# 3. 使用 PHP 访问数据库\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-1672-9_3](http://dx.doi.org/10.1007/978-1-4842-1672-9_3))\
  \ 包含补充材料，可供授权用户使用。\n\n在电子商务网站上，将产品信息与其图片并列显示，并且信息尽可能详细，这一点至关重要。由于产品数量可能非常庞大，这些信息都存储在数据库中。回想一下，您已经创建了一个包含多个产品的\
  \ `products` 表，这些产品被分类到不同的区域。本章首先解释如何从 `products` 表中访问产品信息并将其显示在屏幕上。\n\n在本章中，您将学习以下内容：\n\
  \n*   访问产品并显示在屏幕上\n*   创建下拉菜单\n*   显示特定类别的产品\n*   添加网站页眉\n*   实现搜索功能\n*   显示产品详情\n\
  *   会话处理\n*   登录与登出\n*   定义网站主页\n\n\n\n## 访问产品并将其显示在屏幕上\n\n你已经学习了用于与 MySQL 服务器建立连接以及打开数据库以执行操作的函数。你还学习了在指定数据库上执行\
  \ SQL 查询的过程。如清单 3-1 所示的 `allitemslist.php` 脚本，使用这些函数从 `products` 表中访问产品信息，并以表格形式将其显示在屏幕上。\n\
  \n**清单 3-1.** 用于显示 `products` 表中项目的 `allitemslist.php` 脚本\n\n```\n<html>\n<head>\n\
  </head>\n<body>\n<?php\n$connect = mysqli_connect(\"localhost\", \"root\", \"gold\"\
  , \"shopping\") or die(\"请检查您的服务器连接。\");\n$query = \"SELECT item_code, item_name,\
  \ description, imagename, price FROM products\";\n$results = mysqli_query($connect,\
  \ $query) or die(mysql_error());\necho \"<table border=\\\"0\\\">\";\n$x=1;\necho\
  \ \"<tr>\";\nwhile ($row = mysqli_fetch_array($results, MYSQLI_ASSOC))  {\nif ($x\
  \ <= 3)\n{\n$x = $x + 1;\nextract($row);\necho \"<td style=\\\"padding-right:15px;\\\
  \">\";\necho \"<a href=itemdetails.php?itemcode=$item_code>\";\necho '<img src='\
  \ . $imagename . ' style=\"max-width:220px;max-height:240px;width:auto;height:auto;\"\
  ></img><br/>';\necho $item_name .'<br/>';\necho \"</a>\";\necho '$'.$price .'<br/>';\n\
  echo \"</td>\";\n}\nelse\n{\n$x=1;\necho \"</tr><tr>\";\n}\n}\necho \"</table>\"\
  ;\n?>\n</body>\n</html>\n```\n\n这段代码首先以用户 `root` 身份连接到 MySQL 服务器，并选择 `shopping`\
  \ 数据库。然后，编写一条 SQL 语句，用于检索 `products` 表中的所有行。执行 SQL 查询，从 `products` 表中获取数据行，并将其赋值给\
  \ `$results` 数组。之后，借助 `while` 循环，每次从 `$results` 数组中取出一行，并将产品信息以表格形式显示在屏幕上（参见图 3-1）。变量\
  \ `x` 用于确保每行显示三个产品。\n\n![A978-1-4842-1672-9_3_Fig1_HTML.jpg](img/A978-1-4842-1672-9_3_Fig1_HTML.jpg)\n\
  \n**图 3-1.** `products` 表中的所有项目及其图片一同显示\n\n为了链接到不同的网页，使用户能够从网站访问所需的信息，你需要创建一个下拉菜单。我们来看看如何实现。\n\
  \n## 创建下拉菜单\n\n假设你的网站销售电子产品、家居家具产品和书籍，那么下拉菜单需要提供指向这些产品分类的链接。同时，假设该网站销售智能手机、笔记本电脑、相机和电视，这些产品类别必须归在电子产品分类下。如清单\
  \ 3-2 所示的 `menu.php` 文件，定义了一个提供指向这些产品类别链接的下拉菜单。\n\n**清单 3-2.** 用于显示电子商务网站下拉菜单的 `menu.php`\
  \ 脚本\n\n```\n<!DOCTYPE html>\n<head>\n<meta charset=\"utf-8\">\n<title>宾图在线集市</title>\n\
  <link rel=\"stylesheet\" href=\"css/style.css\">\n</head>\n<body>\n<div class=\"\
  container\">\n<nav>\n<ul class=\"nav\">\n<li><a href=\"index.php\">首页</a></li>\n\
  <li class=\"dropdown\">\n<a href=\"index.php\">电子产品</a>\n<ul>\n<li><a href=\"itemlist.php?category=CellPhone\"\
  >智能手机</a></li>\n<li><a href=\"itemlist.php?category=Laptop\">笔记本电脑</a></li>\n<li><a\
  \ href=\"index.php\">相机</a></li>\n<li><a href=\"index.php\">电视</a></li>\n</ul>\n\
  </li>\n<li class=\"dropdown\">\n<a href=\"index.php\">家居 & 家具</a>\n<ul class=\"\
  large\">\n<li><a href=\"index.php\">厨房用品</a></li>\n<li><a href=\"index.php\">卫浴用品</a></li>\n\
  <li><a href=\"index.php\">家具</a></li>\n<li><a href=\"index.php\">餐具与盛具</a></li>\n\
  <li><a href=\"index.php\">炊具</a></li>\n</ul>\n</li>\n<li><a href=\"index.php\">图书</a></li>\n\
  </ul>\n</nav>\n</div>\n<p>\n```\n\n你可以在这段代码中看到，下拉菜单是使用无序列表元素制作的。该菜单包含四个主要部分：首页、电子产品、家居\
  \ & 家具和图书。电子产品菜单有四个子菜单选项——智能手机、笔记本电脑、相机和电视。类似地，家居 & 家具菜单显示了不同的子菜单选项。当用户通过任何子菜单选项选择了产品类别后，页面将导航到名为\
  \ `itemlist.php` 的 PHP 脚本。他们所选的产品类别也会被发送到 `itemlist.php` 脚本，该脚本进而从数据库表中获取该类别下的所有产品，并将其显示在屏幕上。\n\
  \n为了在下拉菜单以及鼠标悬停时的菜单选项上应用前景色和背景色，该脚本使用了一个名为 `style.css` 的层叠样式表。该样式表已链接到脚本中。接下来是 CSS\
  \ 的简要介绍。\n\n### CSS\n\nCSS 代表层叠样式表，其中包含网站的不同样式、布局、字体和颜色。使用样式表的优点包括：\n\n-   所有样式都保存在一个地方，因此易于维护。要更改某个元素的样式，无需搜索整个网站，只需在一个地方进行编辑即可。\n\
  -   可以非常轻松地更改网站的布局和设计。\n-   通过 CSS 应用样式可以使代码更高效，并减少网站加载时间。\n\n回到本网站，清单 3-3 显示了在\
  \ `style.css` 文件中定义的样式。\n\n**清单 3-3.** `style.css` 样式表文件为电子商务网站的不同 HTML 元素应用样式\n\
  \n```\nimg {\nmax-width:180px;\nmax-height:200px;\nwidth:auto;\nheight:auto;\n}\n\
  \nol, ul {\nlist-style: none;\n}\n\nnav {\nheight: 30px;\nborder-bottom: 5px solid\
  \ white;\n}\n\n.nav {\nmargin: 0 auto;\nwidth: 600px;\n}\n\n.nav a {\ndisplay: block;\n\
  text-decoration: none;\n}\n\n.nav > li {\nfloat: left;\nmargin-right: 5px;\n}\n\n\
  .nav > li > a {\nheight: 34px;\nline-height: 34px;\npadding: 0 20px;\nfont-weight:\
  \ bold;\ncolor: white;\ntext-decoration: none;\nborder-radius: 3px 3px 0 0;\nbackground-color:\
  \ blue;\n}\n\n.nav > li > a:hover {\ntext-decoration: none;\nbackground: blue;\n\
  background-color: navy;\n}\n\n.nav > li.active > a, .nav > li > a:active, .nav >\
  \ .dropdown:hover > a {\nbackground: white;\ncolor: blue;\n}\n\n.dropdown {\nposition:\
  \ relative;\nborder-bottom: 5px solid white;\n}\n\n.dropdown:hover ul {\n```\n\n\
  \n\n```css\ndisplay: block;\n}\n\n.dropdown ul {\n  display: none;\n  position:\
  \ absolute;\n  top: 39px;\n  left: -1px;\n  z-index: 20000;\n  min-width: 160px;\n\
  \  padding: 0 0 5px;\n  background: blue;\n  border: 1px solid #dadada;\n  border-top:\
  \ 0;\n  border-radius: 0 0 3px 3px;\n}\n\n.dropdown ul.large {\n  min-width: 200px;\n\
  }\n\n.dropdown li {\n  display: block;\n  margin: 0 18px;\n  overflow: visible;\n\
