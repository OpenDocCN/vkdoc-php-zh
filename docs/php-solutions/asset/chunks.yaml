    ```\n\n当你在 phpMyAdmin 中运行它时，你将获得所有四篇文章，如图 15-10 所示。\n\n![A978-1-4842-0635-5_15_Fig10_HTML.jpg](img/A978-1-4842-0635-5_15_Fig10_HTML.jpg)\n\
    \n**图 15-10.** `LEFT JOIN` 包含在右表中没有匹配的记录\n\n如你所见，来自右表（`images`）的空字段显示为 `NULL`。\n\
