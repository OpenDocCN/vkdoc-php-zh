- '# Drupal 协会的成立


  在 Drupal 4.7 正式发布约一个半月后，Dries 在他的博客 `buytaert.net` 上宣布，他打算通过吸取“FOSS 和互联网社区中最聪明的一些人”的智慧，继续研究社区基础设施的相关问题。Dries
  的“Drupal 旧金山之路”行程包括与以下人士的私人会面：蒂姆·奥莱利（O''Reilly & Associates 创始人兼 CEO）、克里斯·迪博纳（Google
  开源项目主管）、米奇·卡普尔（Lotus-1-2-3 联合创始人、开源应用基金会创始人、电子前线基金会联合创始人、Mozilla 基金会主席）、杰弗里·维恩（Adaptive
  Path 联合创始人、Measure Map 项目负责人、Google 用户体验主管）、香奈儿·惠勒又名 chanel（`drupal.org/user/4733`，雅虎软件应用开发人员）、布拉德利·格林伍德（雅虎首席软件工程师/开源软件布道师）、贾尼斯·弗雷泽（Adaptive
  Path CEO）、吉多·范罗苏姆（Python 项目创始人、Google 员工）、拉里·M·奥古斯丁（VA Linux 创始人兼 CEO）、安德斯·谢恩隆德（SpikeSource
  支持服务副总裁）以及布莱恩·贝伦多夫（Apache 基金会联合创始人）^(26)。


  _____________________


  ²³ Drupal，“2005 年波特兰 DrupalCon：Drupal 基金会会议”，`drupal.org/node/28338`


  ²⁴ Drupal，“2005 年波特兰 DrupalCon：Drupal 基金会会议”，`drupal.org/node/28338`


  ²⁵ Drupal，“Dries 和 Karlijn 结婚”，`drupal.org/node/55814`


  ²⁶ 多种来源。[`http://buytaert.net/drupal-road-trip-san-francisco`](http://buytaert.net/drupal-road-trip-san-francisco),
  [`www.adaptivepath.com/about`](http://www.adaptivepath.com/about), [`www.linkedin.com/in/jeffreyveen/`](http://www.linkedin.com/in/jeffreyveen/),
  [`www.linkedin.com/in/chanelwheeler`](http://www.linkedin.com/in/chanelwheeler),
  `younoodle.com/people/bradley_greenwood`


  这些讨论为 Dries Buytaert、Dries Knapen 和 Steven Wittens 随后数月的深入研究提供了起点。这三个人此前在国际税法领域均无任何专长，但（以经典的开源方式）他们花费大量时间向该领域的专家征询意见。到
  2006 年 9 月，他们已起草了未来 Drupal 协会的章程和细则草案。


  但等等，我们不是要谈基金会吗？这个协会是怎么回事？


  经过研究，Dries Buytaert、Dries Knapen 和 Steven Wittens 做出的决定之一是将协会设在比利时，而不是美国。比利时法律对协会和基金会有明确的区分。根据
  Drupal 协会常见问题解答，两者间最重要的区别在于：


  -   协会由多个个人共同组建，他们在投票和讨论后就协会的目标达成一致；而基金会可以由一个人（或少数人）组建。

  -   组建时，基金会创始人必须投入初始资产（资金）。协会则不需要。

  -   协会有成员。基金会不能有成员，只能有一个董事会……换句话说，协会允许比基金会更为民主的运作模式……[并且]因此比基金会更能反映一个真实（或在线）社区人们的工作方式。^(27)


  经过为此专门创建的邮件列表成员对草案进行了一些审查和修订后，Dries 利用 2006 年布鲁塞尔 DrupalCon 的场合公开宣布了已取得的成果。^(28)
  会议的参与者提供了反馈，协会的邮件列表也随之壮大。11 月，Dries Buytaert、Dries Knapen 和 Steven Wittens 从通过该邮件列表提交候选申请的个人中选出了第一批永久成员，这是建立协会成员身份的第一步。^(29)
  2006 年 12 月 7 日，Drupal 协会的章程获得了比利时法院的合法认可，^(30) 并于 2007 年 2 月 26 日，在 `drupal.org`
  和 `association.drupal.org` 上发布了协会的正式公告。^(31)


  那么，这些章程包含了什么内容呢？经过数年的讨论、数月的研究、数周的密集工作以及社区源源不断的反馈，这三个几乎毫无法律文件撰写经验的技术极客最终拿出了什么样的成果？


  简而言之，他们设法找到了一种结构，确保对 Drupal 的控制权始终掌握在那些致力于创造它的人手中，并且确保这些人不会因为承担行政职责的负担而分散了改进项目的时间和精力。


  正如协会非常谨慎地阐明的那样，“Drupal 协会对 Drupal 开源项目本身的规划或开发没有发言权。然而，Drupal 协会可以执行以下任何事项：


  _____________________


  ²⁷ Drupal，常见问题解答，`association.drupal.org/about/faq`


  ²⁸ 谷歌视频，DrupalCon，2006。`video.google.com/videoplay?docid=7038940559530825104`


  ²⁹ Drupal，常见问题解答，`association.drupal.org/about/faq`


  ³⁰ Drupal，“公告：Drupal 协会成立”，`association.drupal.org/node/71`


  ³¹ Drupal，多项公告，`drupal.org/node/122835`，`association.drupal.org/node/71`，`association.drupal.org/node/87`


  -   接受捐赠和拨款。

  -   组织并/或赞助 Drupal 活动，并在活动中代表 Drupal 项目。

  -   与其他组织建立合作伙伴关系。

  -   获取和管理支持 Drupal 项目所需的基础设施。

  -   通过发放补助金或支付工资来支持开发。

  -   撰写并发布新闻稿和宣传材料。”^(32)


  就上述问题进行投票的成员机构（即构成会员大会的永久成员），与缴纳会费支持协会的成员机构（即接纳成员）是分开的，这确保了无力支付会费的人不会因此丧失参与决策过程的资格。


  章程和细则还明确界定并限制了企业、公司及其他“法人实体”在协会中可扮演的角色。虽然企业和公司可以购买会员资格并成为接纳成员，但明确禁止其在协会的决策机构——会员大会中拥有投票权。不过，如果获得了会员大会某个成员的推荐，企业或其他法人实体可以成为咨询成员。咨询成员虽无权投票，但可以参加会员大会的会议，并且……嗯……提供咨询。^(33)




  '
- '# 第 35 章：*[来自前文的标题]*


  这种架构使得社区内的商业实体能够及时了解协会正在讨论的问题，同时让大会的投票成员能够从这些商业实体处获得知情意见，并且避免了商业利益控制协会合同、拨款或薪酬发放的可能性。此外，董事会有权拒绝任何申请加入的实体，"如果董事会认为有证据表明新成员申请人的行为、思想/观点/信仰和/或动机对协会利益不利"，^(34)并且随时，"一位被接纳的成员可以通过董事会的简单决议终止其成员资格。"^(35)


  对于永久成员而言，加入（和终止）的程序则更加民主。要成为永久成员，个人必须由一位已经是永久成员的人推荐。获得推荐后，该个人需向董事会主席提交申请。由大会投票决定是否接纳该申请人；如果有三分之二的大会成员同意，则该个人被接纳为永久成员。顾名思义，永久成员没有任期限制（“永久成员资格期限无限。”），但永久成员资格可由大会三分之二多数投票撤销。^(36)


