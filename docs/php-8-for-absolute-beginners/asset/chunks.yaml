    //Declare new method in Blog_Entry_Table class

    public function searchEntry ( $searchTerm ) {

    $sql = "SELECT entry_id, title FROM blog_entry

    WHERE title LIKE ?

    OR entry_text LIKE ?";

    $data = array( "%$searchTerm%", "%$searchTerm%" );

    $statement = $this->executeSQL($sql, $data);

    return $statement;

    }

    ```

    Listing 8-21

    Partial Listing `Searched_Blog_Entry_Table.class.php`


    Perhaps the `$data` array warrants a few words of explanation. Isn’t it strange
    to create an array with two separate items *when the items are identical*? Well,
    the number of unnamed placeholders in your SQL must exactly match the number of
    items in the array executed. Because there are two placeholders in the SQL, we
    need an array with two values to use in the search. In the preceding example,
    the code will search for the same search term in two different table columns (`title`
    and `entry_text`).


    ## Searching with a LIKE Condition


    The preceding SQL statement demonstrates an SQL keyword we have not used in the
    previous examples in this book: `LIKE`.


    ```php

    $sql = "SELECT entry_id, title FROM blog_entry

    WHERE title LIKE ?

    OR entry_text LIKE ?";

    $data = array( "%$searchTerm%", "%$searchTerm%" );

    ```


    The `%` character represents a wildcard character. A wildcard character represents
    anything. The query would return a result set of all rows where the `title` or
    the `entry_text` contains the search value, wherever it exists within these columns.
    For example, if the search value is “test,” a row with a `title` of “test if it
    works” could be returned. A row with an `entry_text` value of “This is a test”
    could also be returned. Since the wildcard character is both in the front and
    back of the term to be searched, both are possible results.


    ## A Search Result View


    To show a search result in a way a user might appreciate, we will need a search
    view. We will wrap some HTML around the returned data.


    ```php

    You searched for $searchTerm";

    while ( $searchRow = $searchData->fetchObject() ){

    $href = "seaarchedindex.php?page=searchedblog&id=$searchRow->entry_id";

    $searchedHTML .= "$searchRow->title";

    }

    $searchedHTML .= "";

    $info .= $searchedHTML;

    ?>

    ```

    Listing 8-22

    `searched-results-html.php`


    The preceding code assumes the existence of a `$searchData` variable. If it is
    not found, an error will be triggered. If the `$searchData` variable is found,
    the code will iterate through the result set with a `while` statement. The `while`
    loop will create an `<li>` element for each `blog_entry` that matches the search.


    ## Loading a Search Result View from the Controller


    To display the search results in a browser, we must load the search result view.
    Hooking up a view with a model is a task for a controller.


    ```php

    searchEntry( $searchTerm ) ;

    include_once "views/searched-results-html.php";

    }

    ?>

    ```

    Listing 8-23

    `searched.php`


    That is it. The front controller will only show either the blog or the search
    page. The search page will show search results – even if there were no matches.


