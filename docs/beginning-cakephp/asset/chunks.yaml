    ## Using Other Built-in Helpers


    Useful as they are, the HTML and Form helpers are not the only helpers that Cake
    has to offer.


    Cake 1.2 includes a handful of other helpers that extend the available functions
    that your application can use. For a list of each helper''s current function set,
    refer to the Cake 1.2 API ([http://api.cakephp.org](http://api.cakephp.org)).
    Here, I''ll just explain each helper and give an overview of what it does.


    ### The Ajax Helper


    In Chapter 8, you worked with the Ajax helper to create a comments voting system.
    I explained that many of its functions require the Prototype JavaScript framework
    to behave properly in the view. Be sure that you have that installed correctly
    to make full use of this helper. Not only can the Ajax helper simplify using Prototype,
    but it can also make animation effects easier to use. (For a more in-depth explanation
    of the Ajax helper, see Chapter 8; to see a list of Ajax functions, refer to Table
    8-1.)


    ### The JavaScript Helper


    This helper is used mainly to simplify coding JavaScript. A common function that
    you have already referenced is the `$javascript->link()` function that works as
    an automator for creating `<script>` tags in the view. Other uses of this helper
    include JavaScript object and event functions that provide some common JavaScript
    functions and code. Both this helper and the Ajax helper can simplify emerging
    Ajax technologies and implementing advanced JavaScript methods.


    To include this helper in the application, use this:


    ```php

    var $helpers = array(''Javascript'');

    ```


    The JavaScript helper comes with the functions listed in Table 9-6.


    ### Table 9-6. Functions in the JavaScript Helper


    **Function** | **Description**

    --- | ---

    `$javascript->afterRender()` | Callback for after rendering; writes cached events
    to the view or a temp file

    `$javascript->blockEnd()` | Ends a block of JavaScript code

    `$javascript->cacheEvents()` | Caches JavaScript events created with the `event()`
    function

    `$javascript->codeBlock()` | Wraps JavaScript code with the `<script>` tag

    `$javascript->escapeScript()` | Escapes carriage returns and single or double
    quotes for JavaScript code segments

    `$javascript->escapeString()` | Escapes strings to be JavaScript compatible

    `$javascript->event()` | Used with the Prototype framework to attach an event
    to an element

    `$javascript->getCache()` | Gets the current JavaScript cache; also clears JavaScript
    caches

    `$javascript->includeScript()` | Includes a script inside a single `<script>`
    tag

    `$javascript->link()` | Links to JavaScript files for use in a web page

    `$javascript->object()` | Creates a JSON object from an array

    `$javascript->writeEvents()` | Writes cached JavaScript events


    ### The Number Helper


    This is a simple helper for dealing with number formats. From currency formatting
    to making memory file sizes readable, the Number helper condenses some common
    tasks into some handy helper functions. If your application must deal in multiple
    number formats or if it must display file sizes, then give some of the functions
    listed in Table 9-7 a try. To include this helper in the application, use this:


    ```php

    var $helpers = array(''Number'');

    ```


    ### Table 9-7. Number Helper Functions


    **Function** | **Description**

    --- | ---

    `$number->currency()` | Formats a floating-point integer into a currency format

    `$number->format()` | Formats a floating-point integer according to provided settings

    `$number->precision()` | Formats the number based on the specified precision value

    `$number->toPercentage()` | Makes a number a percentage

    `$number->toReadableSize()` | Returns a number of bytes into a readable size format
    (for example, KB or MB)


    ### The Paginator Helper


    This helper works together with the Pagination component to break up data into
    multiple pages or to sort data by specified parameters. The Paginator helper works
    in the view to manipulate the display of supplied data to fit the customized needs
    of the application. In other words, when the Pagination component is used in the
    controller (which is the case whenever you create standard actions for a controller
    in Bake), the data sent to the view is *paginated* data. To work through the pages
    of data, use the Paginator helper. Table 9-8 lists the functions that let you
    customize how to display paginated data in the view.


    To include this helper in the application, use the following:


    ```php

    var $helpers = array(''Paginator'');

    ```


    ### Table 9-8. Paginator Helper Functions


    **Function** | **Description**

    --- | ---

