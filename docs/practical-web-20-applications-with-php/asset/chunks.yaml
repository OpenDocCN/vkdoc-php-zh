    The first thing this function does is check whether or not the user has already
    been authenticated. If they have, they are redirected back to their account home
    page.


    Next we try to determine the page they were originally trying to access. If they
    have submitted the login form, this value will be in the redirect form value.
    If not, we simply use the $_SERVER[''REQUEST_URI''] value to determine where they
    came from. If we still can’t determine where they came from, we just use their
    account home page as the default destination. We haven’t yet created the action
    to display their account home page; we will do that in the


    “Implementing Account Management” section later in this chapter.


    ■**Note** Because the ACL manager forwarded the request to the login handler (as
    opposed to using an HTTP


    redirect), the server variable REQUEST_URI will contain the location originally
    requested. If a redirect was used to display the login form, you could use the
    HTTP_REFERER value instead.


    We then define an empty array to hold error messages. This is done here so it
    can be assigned to the template whether a login attempt has occurred or not.


    Next we check whether or not the login form has been submitted by checking the
    $request object’s isPost() method (we also did this earlier when processing user
    registrations). If it has been submitted, we retrieve the submitted username and
    password values from the request data. If either of these is empty, we set corresponding
    error messages and proceed to display the login template again.


