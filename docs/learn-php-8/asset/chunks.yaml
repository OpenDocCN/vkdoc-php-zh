  trans: "\nMVC 与基于组件的设计均可运用**依赖注入**。依赖注入允许程序（客户端）在使用某段代码（如一个类）时，无需了解该代码的具体实现。这使得各模块能够独立开发、更新、测试并实现可复用性。这类似于汽车点火装置与起动机的通信方式：点火装置几乎不了解起动机组件及其运作原理，甚至不知道起动机的品牌，它只需向起动机发送信号（电流）指令其工作。若更换了起动机，只要它在接收信号后仍能正常运转，点火装置就不会察觉也不受该变更的影响。\n\
    \n## 章节术语表\n\n| 容器 | 平台 |\n| --- | --- |\n| AJAX | HTTP GET |\n| `XMLHttpRequest`\
    \ | `document.getElementById` |\n| CSS | 条件语句 |\n| If 语句 | 三层架构 |\n| 界面层 | 业务逻辑层\
    \ |\n| 数据层 | 图形用户界面（GUI） |\n| 对象 | 验证码 |\n| 事件 | 数据库管理系统 |\n| 服务器 | 应用服务器 |\n\
    | Web 服务器 | 服务 |\n| 数据集 | JSON |\n| XML | SOAP |\n| WSDL | SQL |\n| Microsoft\
    \ Azure | PDLC |\n| 规划与信息收集 | 分析步骤 |\n| 设计步骤 | 实现步骤 |\n| 评估步骤 | MVC（模型-视图-控制器）\
    \ |\n| 依赖注入 | |\n\n## 章节问题与项目\n\n### 多项选择\n\n1.  界面层  \n    1.  是应用程序的主要存储位置，可能包含数据库的使用\
    \  \n    2.  提供文本框、按钮等通用对象，帮助用户快速适应新应用程序  \n    3.  应被用于所有与应用程序相关的会计、数学计算或数据处理\
    \  \n    4.  显示信息并允许用户与应用程序进行交互\n\n2.  一个`服务`是一个应用程序，它  \n    1.  可以在需要时手动启动和停止\
    \  \n    2.  没有界面  \n    3.  驻留在计算机内存中  \n    4.  以上全部\n\n3.  SOAP 代表  \n    1.\
    \  安全对象访问协议  \n    2.  简单对象访问过程  \n    3.  简单对象访问协议  \n    4.  以上均不对\n\n4.  PDLC\
    \ 的五个步骤是  \n    1.  规划与信息存储、分析、设计、实现、评估  \n    2.  规划与信息收集、分析、设计、实现、评估  \n   \
    \ 3.  规划与信息收集、分析、数据、实现、评估  \n    4.  规划与信息收集、分析、设计、观察、评估\n\n5.  网络服务描述语言用于  \n\
    \    1.  描述对 Web 服务器的调用以及 Web 服务发送和返回信息的格式  \n    2.  描述对 Web 服务的调用以及 Web 服务所接受信息的格式\
    \  \n    3.  描述 HTML 文档中使用的代码  \n    4.  描述对 Web 服务的调用并丢弃接收到的信息\n\n6.  CSS 代表\
    \  \n    1.  级联静态样式  \n    2.  层叠样式表  \n    3.  级联脚本表  \n    4.  缓存样式脚本\n\n7.\
    \  哪类代码应放置在 `<script>......</script>` 标签之间？  \n    1.  Java  \n    2.  HTML  \n\
    \    3.  Servlets  \n    4.  JavaScript\n\n8.  三层架构由哪些部分构成？  \n    1.  GUI/标签/验证\
    \  \n    2.  界面层/业务层/数据访问层  \n    3.  对象/变量/SQL  \n    4.  JSP/Servlet/套接字\n\n\
    9.  对模型-视图-控制器（MVC）的最佳描述是  \n    1.  一种将给定软件应用划分为三个相互连接部分的架构模式。  \n    2.  一种用于在任何浏览器中验证和保护信息的编程语言。\
    \  \n    3.  一种主要用于检查用户是否以正确格式输入信息的验证器。  \n    4.  一种用于转换有害代码使其无法被编译器执行的方法。\n\n\
    10. 在分析步骤中执行什么？\n"
- fmt: "1.  Determination of the feasibility of the project\n\n2.  Creation the code\
    \ and error correction\n\n3.  Determination of the logical data flow of the project\n\
    \n4.  Reevaluation of the implemented application for possible improvements\n\n\
    11.  Why must you validate your code?\n\n1.  To determine the capabilities of\
    \ the browser you are using\n2.  To make sure your information is correct and\
    \ secure\n3.  To make sure that you have only JavaScript and HTML5 code\n4.  To\
    \ check if your browser can run your code\n\n12.  What is the correct HTML syntax\
    \ for referring to an external cascading style sheet?\n\n1.  `<stylesheet>my_style_sheet.css</stylesheet>`\n\
    2.  `<link rel=\"stylesheet\" type=\"text/css\" href=\"my_style_sheet.css\">`\n\
    3.  `<style src=\"my_style_sheet.css\">`\n4.  None of these\n\n13.  Which tier\
    \ is used to store and retrieve data?\n\n1.  Presentation tier\n2.  Data tier\n\
    3.  Application tier\n4.  None of these\n\n14.  What does SQL stand for?\n\n1.\
    \  Structured Question Language\n2.  Structured Query Language\n3.  Strong Question\
    \ Language\n\n15.  A dataset is similar to\n\n1.  A paragraph of data\n2.  Sets\
    \ of two words together\n3.  A table or spreadsheet\n4.  None of these\n\n**True/False**\n\
    \n1.  WSDL stands for Web Service Definition Language.\n2.  AJAX is used to create\
    \ more interactive applications.\n3.  AJAX provides the ability to dynamically\
    \ change portions of a web page with reloading the complete page.\n4.  When using\
    \ the HTTP GET function, the URL must be in quotation marks.\n5.  A service is\
    \ a function provided by a web server.\n6.  The design step comes after the analysis\
    \ steps have been completed successfully.\n7.  MVC (Model-View-Controller) is\
    \ a design pattern used by software engineers (including PHP application designers)\
    \ to communicate between the view and model using a controller.\n8.  Planning\
    \ and information gathering is part of the PDLC.\n9.  Dependency injection allows\
    \ the program client to enter a block of code to know the implementation of the\
    \ block of code it will be using.\n10.  Objects are blocks of code that have already\
    \ been compiled for use within an application.\n11.  HTML stands for Hypertext\
    \ Markup Language.\n12.  Method signature includes the method name, and the number,\
    \ types, and order of its parameter.\n13.  Datasets are not one of the many formats\
    \ used when sending data between tiers in a three-tier architecture.\n\n**Short\
    \ Answer/Essay**\n\n1.  In your own words, briefly describe each of the steps\
    \ in the PDLC.\n2.  Why do you think development of PC applications using PHP\
    \ has decreased?\n3.  What are the advantages of creating web pages that use AJAX?\n\
    \n**Projects**\n\n1.  Using the steps of the PDLC demonstrated in this chapter,\
    \ design the logic for a smart phone and mobile device application that allows\
    \ your water meter reader to enter the full address and meter readings. The application\
    \ should validate the information and send valid information to a MySQL database.\
    \ If the information is not valid, a message should be displayed back to the user\
    \ indicating the problem.\n2.  Adjust the AJAX example in this chapter (the code\
    \ is available on the book’s web site) to display a mini version of your resume.\n\
    3.  Adjust the `Hello World` (Example `[2-6]`, `callmyself.php`) program to display\
    \ your college/university name, address, and main phone number.\n\n**Term Project**\n\
    \n1.  Using the information, you have determined from the Chapter `[1]` Term Project\
    \ assignment and the design techniques shown in this chapter, develop a logical\
    \ design of the ABC Computer Parts Inventory application. This design should include\
    \ all possible programs, interfaces, and data storage. The application design\
    \ must be three-tier (interface, business rules, and data). Your final design\
    \ should look similar to the examples shown in this chapter.\n\n## 3. The Basics:\
    \ PHP 8 Syntax\n\n*Yes, I am a terrible coder, but I am probably still better\
    \ than you :)*\n—Rasmus Lerdorf\n\n**Chapter Objectives/Student Learning Outcomes**\n\
    \nAfter completing this chapter, the student will be able to\n\n*   Create a simple,\
    \ error-free PHP program\n*   Understand the use and value of conditional statements\n\
    *   Understand the use and value of for, while, and foreach loops\n*   Understand\
    \ the use and value of functions\n*   Understand the use and value of arrays\n\
    \n**The Basic Syntax**\n\nIn the next chapter, we will begin exploring modular\
    \ programming. However, before we start that discussion, let us do a quick review\
    \ of some of the basic components of the PHP language. Our goal is not to teach\
    \ you every structure used in PHP. The goal is to give you enough knowledge to\
    \ begin PHP programming. We will add additional PHP abilities in the remaining\
    \ chapters. If you find difficulty with any of the following topics, you may want\
    \ to review many of the free tutorials on the web, including [`www.w3schools.com/php/default.asp`](http://www.w3schools.com/php/default.asp).\n\
    \n```\nAs stated earlier, all PHP code must be placed between the <?php and ?>\
    \ tags. The web server first looks at the file ending (.php) for an indication\
    \ of the existence of php code. Once it determines its existence, it uses the\
    \ tags to point the location of the code.\n```\n\n```\n I love Green Tomatoes\n\
    \nMy partner hates Green Tomatoes\n```\n\nOutside of the tags, a PHP file can\
    \ contain HTML, CSS, and/or JavaScript code. As shown earlier, php code can be\
    \ scattered into different areas of the file (web page) by simply using the opening\
    \ and closing tags. However, each time this occurs, it requires sending the code\
    \ to the PHP interpreter for processing. So, do not get too carried away with\
    \ the thrill of doing so.\n\n**Comments** can be created using `//` (as shown\
    \ previously). Comments are not executed. However, they are very important. Good\
    \ programming provides comments so others can understand any complicated code.\
    \ Gone are the days in which only one person maintains a program. Anyone that\
    \ supports code you created will really appreciate the effort you put forth in\
    \ providing comments.\n\n```\nMany organizations keep track of change management\
    \ within the program by providing details on who created the program, when it\
    \ was created, and any changes that have occurred. Comments can also provide a\
    \ list of the inputs and outputs of the program and a description of the program\
    \ itself. Additionally, similar descriptions are provided for functions (methods\
    \ or procedures) which have been created within the program.\n```\n\nAll executable\
    \ code must include a semicolon at the end of the statement. As a standard, adopt\
    \ the policy that any text strings (such as Hello World earlier) should be included\
    \ in double `(\"\")` quotes. PHP does allow some exceptions to the rule (such\
    \ as using single quotes in some instances), but you will seldom run into a problem\
    \ if you are consistent in providing them.\n\nPHP provides a large amount of functions\
    \ (blocks of code) available to the programmer. The functions contain well-tested\
    \ efficient code. Whenever possible, a smart programmer will use existing functions\
    \ to save time and to reduce programming errors. All PHP functions should begin\
    \ with a lowercase letter (as in the function `print`). In the following example,\
    \ the string `\"Hello World\"` is passed into a function named `\"myFunction\"\
    `. We will explore a lot of PHP functions throughout this book. Later in this\
    \ chapter, we will see additional examples on how a programmer can create their\
    \ own functions."
