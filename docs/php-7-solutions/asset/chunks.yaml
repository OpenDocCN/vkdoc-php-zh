  trans: "\n# 1. 文件上传与错误处理\n\n1.  点击“上传”按钮而不选择任何文件。此时 `$_FILES` 数组应如图 9-3 所示。\n\n\
    错误级别为 4 表示未上传文件；0 表示上传成功。本章稍后的表 9-2 列出了所有错误代码。\n\n1.  选择一个程序文件并点击“上传”按钮。在许多情况下，表单会尝试上传该程序，并将其类型显示为\
    \ `application/zip`、`application/octet-stream` 或类似内容。这应作为一个警告，说明检查正在上传的文件类型非常重要。\n\
    \n# 2. 建立上传目录\n\n出于安全考虑，通过在线表单上传的文件不应通过浏览器公开访问。换句话说，它们不应位于站点根目录（通常是 `htdocs`、`public_html`\
    \ 或 `www`）内。在你的远程服务器上，在站点根目录之外创建一个用于上传的目录，并将权限设置为 644（所有者可读写，其他人只读）。\n\n## 2.1.\
    \ 为 Windows 本地测试创建上传文件夹\n\n对于后续练习，建议你在 C 盘根目录下创建一个名为 `upload_test` 的文件夹。Windows\
    \ 上没有权限问题，因此你只需完成这一步即可。\n\n## 2.2. 为 macOS 本地测试创建上传文件夹\n\nMac 用户可能需要做更多准备工作，因为文件权限与\
    \ Linux 类似。在你的主目录中创建一个名为 `upload_test` 的文件夹，并按照 PHP 解决方案 9-1 中的说明进行操作。\n\n如果一切顺利，你无需进行额外操作。但如果你收到\
    \ PHP“无法打开流”（failed to open stream）的警告，请按以下方式更改 `upload_test` 文件夹的权限：\n\n1.  在\
    \ Mac 访达中选择 `upload_test`，然后选择“文件”➤“显示简介”（Cmd+I）以打开其信息面板。\n\n2.  在“共享与权限”中，点击右下角的挂锁图标以解锁设置，然后将“Everyone”的权限从“只读”更改为“读与写”，如下方截图所示。\n\
    \n![../images/332054_4_En_9_Chapter/332054_4_En_9_Figa_HTML.jpg](img/332054_4_En_9_Figa_HTML.jpg)\n\
    \n3.  再次点击挂锁图标以保存新设置，并关闭信息面板。现在你应该能够使用 `upload_test` 文件夹继续完成本章剩余内容。\n\n# 3. 上传文件\n\
    \n在构建文件上传类之前，最好先创建一个简单的文件上传脚本，以确保你的系统能正确处理上传。\n\n## 3.1. 将临时文件移动到上传文件夹\n\n已上传文件的临时版本仅短暂存在。如果你不对该文件进行任何操作，它将被立即丢弃。你需要告诉\
    \ PHP 将其移动到哪里以及如何命名。这通过 `move_uploaded_file()` 函数完成，该函数接受以下两个参数：\n\n*   临时文件的名称\n\
    *   文件新位置的完整路径，包括文件名本身\n\n获取临时文件本身的名字很简单：它作为 `tmp_name` 存储在 `$_FILES` 数组中。由于第二个参数需要完整路径，这给了你重命名文件的机会。目前，我们保持简单，使用原始文件名，它作为\
    \ `name` 存储在 `$_FILES` 数组中。\n\n# 4. PHP 解决方案 9-1：创建基本文件上传脚本\n\n继续使用与上一练习相同的文件。或者，使用\
    \ `ch09` 文件夹中的 `file_upload_03.php`。此 PHP 解决方案的最终脚本位于 `file_upload_04.php`。\n\n\
    *   如果你使用的是 Windows，并且在 C 盘根目录下创建了 `upload_test` 文件夹，它应如下所示：\n\n```\n$destination\
    \ = 'C:/upload_test/';\n```\n\n请注意，我使用了正斜杠，而不是 Windows 惯例的反斜杠。你可以使用其中任何一种，但如果使用反斜杠，最后一个反斜杠需要由另一个反斜杠转义，如下所示（否则反斜杠会转义引号）：\n\
    \n```\n$destination = 'C:\\upload_test\\\\';\n```\n\n*   在 Mac 上，如果你在主目录中创建了 `upload_test`\
    \ 文件夹，它应如下所示（将 *username* 替换为你的 Mac 用户名）：\n\n```\n$destination = '/Users/username/upload_test/';\n\
    ```\n\n*   在远程服务器上，你需要完整的文件路径作为第二个参数。在 Linux 上，它可能是这样的：\n\n```\n$destination =\
    \ '/home/user/private/upload_test/';\n```\n\n1.  如果你使用的是上一练习中的文件，请删除结束的 `</form>`\
    \ 和 `</body>` 标签之间以粗体突出显示的代码：\n\n2.  除了 PHP 配置中设置的自动限制（见表 9-1）之外，你还可以在 HTML 表单中指定上传文件的最大大小。在文件输入字段之前立即添加以下以粗体突出显示的行：\n\
    \n```\nUpload image: <input type=\"hidden\" name=\"MAX_FILE_SIZE\" value=\"<?=\
    \ $max ?>\">\n```\n\n这是一个隐藏的表单字段，因此不会在屏幕上显示。但是，必须将其放置在文件输入字段*之前*，否则它将无法工作。`name`\
    \ 属性 `MAX_FILE_SIZE` 是固定的，并且区分大小写。`value` 属性以字节为单位设置上传文件的最大大小。\n\n我没有指定数值，而是使用了一个名为\
    \ `$max` 的变量。该值也将在文件上传的服务器端验证中使用，因此定义一次是合理的，避免在一个地方更改却忘记在其他地方更改。\n\n使用 `MAX_FILE_SIZE`\
    \ 的优势在于，如果文件大于规定值，PHP 会放弃上传，从而避免因文件过大而造成不必要的延迟。不幸的是，用户可以通过伪造隐藏字段提交的值来绕过此限制，因此你将在本章后续开发的脚本也会在服务器端检查文件大小。\n\
    \n3.  在 DOCTYPE 声明之上的 PHP 代码块中定义 `$max` 的值，如下所示：\n\n这将最大上传大小设置为 50 KB（51200 字节）。\n\
    \n4.  将已上传文件从其临时位置移动到永久位置的代码需要在表单提交后运行。在页面顶部刚刚创建的 PHP 代码块中插入以下代码：\n\n```\n$max\
    \ = 51200;\nif (isset($_POST['upload'])) {\n    // 定义上传文件夹的路径\n    $destination\
    \ = '/path/to/upload_test/';\n    // 将文件移动到上传文件夹并重命名\n    move_uploaded_file($_FILES['image']['tmp_name'],\n\
    \    $destination . $_FILES['image']['name']);\n}\n?>\n```\n\n虽然代码相当简短，但其中涉及不少操作。条件语句通过检查\
    \ `$_POST` 数组中是否存在上传按钮的键，来确保仅在点击“上传”按钮后才执行代码。\n\n`$destination` 的值取决于你的操作系统和 `upload_test`\
    \ 文件夹的位置。\n\n`if` 语句内的最后一行使用 `move_uploaded_file()` 函数移动文件。该函数接受两个参数：临时文件的名称和文件将要保存到的完整路径。`$_FILES`\
    \ 是一个多维数组，其名称来源于文件输入字段。因此，`$_FILES['image']['tmp_name']` 是临时文件，而 `$_FILES['image']['name']`\
    \ 包含原始文件的名称。第二个参数 `$destination . $_FILES['image']['name']` 将上传的文件以其原始名称存储在 upload\
    \ 文件夹内。\n"
- fmt: '## Caution


    You may come across scripts that use `copy()` instead of `move_uploaded_file()`.
    Without other checks in place, `copy()` can expose your web site to serious security
    risks. For example, a malicious user could try to trick your script into copying
    files that it should not have access to, such as password files. Always use `move_uploaded_file()`;
    it’s much more secure.


    1. Save `file_upload.php`, and load it into your browser. Click the Browse or
    Choose File button and select a file from the `images` folder in the `phpsols-4e`
    site. If you choose one from elsewhere, make sure it’s less than 50 KB. Click
    Open (Choose on a Mac) to display the filename in the form. In browsers that display
    a file input field, you might not be able to see the full path. That’s a cosmetic
    matter that I’ll leave you to sort out yourself with CSS. Click the Upload button.
    If you’re testing locally, the form input field should clear almost instantly.

    2. Navigate to the `upload_test` folder and confirm that a copy of the image you
    selected is there. If it isn’t, check your code against `file_upload_04.php`.
    Also check that the correct permissions have been set on the upload folder, if
    necessary.


    ## Note


    The download files use `C:/upload_test/`. Adjust this to your own setup.


    If you get no error messages and cannot find the file, make sure that the image
    didn’t exceed `upload_max_filesize` (see Table [9-1](#332054_4_En_9_Chapter.xhtml#Tab1)).
    Also check that you didn’t leave the trailing slash off the end of `$destination`.
    Instead of `myfile.jpg` in the `upload_test` folder, you may find `upload_testmyfile.jpg`
    one level higher in your disk structure.


    3. Change the value of `$max` to `3000`, save `file_upload.php`, and test it again
    by selecting a file bigger than 2.9 KB to upload (any file in the images folder
    will do). Click the Upload button and check the `upload_test` folder. The file
    shouldn’t be there.

    4. If you’re in the mood for experimentation, move the `MAX_FILE_SIZE` hidden
    field below the file input field, and try it again. Make sure you choose a different
    file from the one you used in step 6, because `move_uploaded_file()` overwrites
    existing files of the same name. You’ll learn later how to give files unique names.


    This time the file should be copied to your upload folder. The hidden field must
    come before the file input element for `MAX_FILE_SIZE` to have any effect. Move
    the hidden field back to its original position before continuing.


    ## Creating a PHP File Upload Class


    As you have just seen, it takes just a few lines of code to upload a file, but
    this is not enough on its own to call the job complete. You need to make the process
    more secure by implementing the following steps:


    - Check the error level.

    - Verify on the server that the file doesn’t exceed the maximum permitted size.

    - Check that the file is of an acceptable type.

    - Remove spaces from the filename.

    - Rename files that have the same name as an existing one to prevent overwriting.

    - Handle multiple file uploads automatically.

    - Inform the user of the outcome.


    You need to implement these steps every time you want to upload files, so it makes
    sense to build a script that can be easily reused. That’s why I have chosen to
    use a custom class. Building PHP classes is generally regarded as an advanced
    subject, but don’t let that put you off. A **class** is a collection of functions
    and variables designed to work together. That’s an oversimplification, but it’s
    sufficiently accurate to give you the basic idea. Each function inside a class
    should normally focus on a single task, so you’ll build separate functions to
    implement the steps outlined in the previous list. The code should also be generic
    so it isn’t tied to a specific web page. Once you have built the class, you can
    reuse it in any form. Although the class definition is long, using the class involves
    writing only a few lines of code. Another advantage of classes is that you can
    add to or modify their functionality by creating **subclasses** (also known as
    **child classes**). You’ll see an example of this in Chapter [10](#332054_4_En_10_Chapter.xhtml),
    which builds on the class developed in this chapter.


    To use a class, you call its constructor method to create an instance of the class
    (an **object**). The object has access to all of the class’s features, in other
    words, its functions (known as **methods**) and variables (known as **properties**).
    It’s common to create multiple instances of a class to handle different situations.
    For example, you might want to create separate objects to upload images and text
    files to different locations. As you read through the rest of this chapter, these
    concepts should become clearer.


    If you’re in a hurry, the finished class is in the `ch09/PhpSolutions` folder.
    Even if you don’t build the script yourself, read through the descriptions so
    you have a clear understanding of how it works.


    ## Defining a PHP Class


    Defining a PHP class is very easy. You use the `class` keyword followed by the
    class name and then put all the code for the class between a pair of curly braces.
    By convention, class names begin with an uppercase letter and are stored in a
    separate file with the same name as the class.


    ### Using a namespace to Avoid Naming Conflicts


    If you’re writing your own scripts, you rarely need to worry about naming conflicts.
    We’re going to create a class to upload files, so `Upload` or `FileUpload` seems
    like a logical name. Once you start using scripts and classes created by others
    (including those in this book), there’s a danger of multiple classes having the
    same name. PHP solves this problem by using namespaces to group related classes,
    functions, and constants.


    A common strategy is to store class definitions in a folder structure that describes
    their functionality and to give the top-level folder a unique name based on a
    domain or company name. Namespaces can have sublevels, so the folder structure
    is replicated as sub-namespaces separated by backslashes. The namespace is also
    declared separately, allowing you to use simple class names. The class we’re going
    to build is called `Upload`, but to avoid naming conflicts, it will be created
    in a namespace called `PhpSolutions\File`.


    You declare a namespace at the top of a file using the `namespace` keyword followed
    by the namespace like this:


    ```

    namespace PhpSolutions\File;

    ```


    ## Caution


    PHP uses a backslash as the namespace separator on all operating systems. Don’t
    be tempted to change it to forward slashes on Linux or macOS.


    So, if we create a class called `Upload` in this namespace, its fully qualified
    name is `PhpSolutions\File\Upload`.


    ### Importing a Namespaced Class


    To avoid having to use the fully qualified name every time you refer to a namespaced
    class, you can import the class at the start of a script with the `use` keyword
    like this:


    ```

    use PhpSolutions\File\Upload;

    ```'
