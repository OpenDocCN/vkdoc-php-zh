- fmt: '# Backup and Restore


    In many hosting environments the web host will take care of backup for you; however,
    it is still useful to know how to make a backup anyway. This also allows you to
    copy real data from production to development so you have some real data to work
    with when developing new features.


    > **Caution**: In Chapter 11 we stored uploaded images on the filesystem when
    we developed the dynamic image gallery. I covered the advantages and disadvantages
    of doing so at the time. This section deals only with the backup and restore of
    the application database; however, be aware that you should be backing up these
    uploaded images also.


    ## Exporting a Database


    To export the application database, we use the `mysqldump` program. This will
    export the entire database (depending on the options specified) to a file that
    we can then save wherever required (such as on a backup server or on CD/DVD).


    We can specify many options when using `mysqldump` that control how the data is
    exported (such as for exporting only the schema and not the data, or vice versa),
    but for our purposes the default options will suffice.


    The command in Linux to export a database is as follows:


    ```

    # mysqldump dbname

    ```


    This will output the database schema and data to the terminal (stdout). Therefore,
    if you want to write this to a file, you must redirect the output to a file. In
    other words, we can use this:


    ```

    # mysqldump dbname > filename.sql

    ```


    And better yet, we can compress this output (since the database may be large)
    by first piping the data through `gzip`:


    ```

    # mysqldump dbname | gzip > filename.sql.gz

    ```


    Because we connect to our database using the `phpweb20` username as well as a
    password, we must specify the `-u` and `-p` parameters so we can use the required
    credentials. Additionally, we can substitute the database name (`phpweb20`) into
    the earlier example:


    ```

    # mysqldump -u phpweb20 -p phpweb20 | gzip > phpweb20.sql.gz

    ```


    Once you have executed this command, you will have a compressed backup of the
    database in your current directory.


    > **Tip**: The PostgreSQL equivalent of `mysqldump` is the `pg_dump` tool. The
    arguments that must be supplied to this program differ slightly from `mysqldump`;
    however, the programs basically work the same.


    ## Importing a Database


    Now that you have a backup of the database, it is useful to know how to re-create
    the database from scratch. First you must create the database, as well as the
    permissions (as per the instructions in Chapter 2), if it doesn''t already exist:


    ```

    mysql> create database phpweb20;

    ```


    Next you import the file from the command line. You can do this by decompressing
    the file and then piping the results to the `mysql` program. Note that we need
    to pass the `--stdout` argument to `gunzip` for this to work:


    ```

    # gunzip --stdout phpweb20.sql.gz | mysql -u phpweb20 -p phpweb20

    ```


    If the database dump is already decompressed, you can use the following command:


    ```

    # mysql -u phpweb20 -p phpweb20 < phpweb20.sql

    ```


    As you can see, exporting and importing database data are somewhat trivial. It
    can get slightly more complicated if you need to also manage a large set of permissions
    or if you have some other unique setup.


    Some people prefer to split their database dumps by exporting the schema to one
    file and the actual data to another file. This allows you to restore the data
    in two separate steps, which is especially useful if you''re just importing the
    data to a database that already has the necessary tables in place (such as if
    you were copying the data from production to the development database).


    ## Summary


    In this chapter, we looked at a number of topics relating to creating and managing
    web applications. These topics are quite important since they must all be considered
    when creating an application that will run smoothly with minimal maintenance.


    Specifically, the topics we covered in this chapter were the following:


    - Creating a useful logging system that can notify an administrator when a problem
    arises

    - Handling errors that may occur during runtime by logging the error and notifying
    the end user that a problem occurred

    - Handling 404 errors by telling the user the page they requested could not be
    found

    - Creating an administration section that allows privileged users to control application
    data as required

    - Creating multiple configurations for a web application to cater for each environment
    the application may be used (development, staging, and production)

    - Deploying an application to a production server (including how to deploy updates)

    - Backing up and restoring a MySQL database


    With the conclusion of this chapter, you should have a solid understanding of
    what it takes to develop a web application from start to finish. The topics covered
    in this chapter should help you manage the code developed in earlier chapters
    in a real-world environment.


    Although you may not require all of the functionality we have implemented in our
    Web 2.0 application, I hope it has put forward ideas and concepts that will help
    you to further develop this application or create your own from scratch.


    Remember that these ideas are not set in stone—they are simply the way I prefer
    to do things. If you disagree with something I''ve done in this book, you should
    challenge it by trying your own way and deciding for yourself what works the best.
    Better yet, I hope you will challenge me directly so I may learn something new
    also.


