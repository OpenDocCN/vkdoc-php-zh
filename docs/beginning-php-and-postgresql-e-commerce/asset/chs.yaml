  \n       value=\"{$admin_order_details->mOrderInfo.order_id}\" />\n<table class=\"\
  edit\">\n  <tr>\n    <td class=\"admin_page_text\">总金额: </td>\n    <td class=\"\
  price\">\n      ${$admin_order_details->mOrderInfo.total_amount}\n    </td>\n  </tr>\n\
  \  <tr>\n    <td class=\"admin_page_text\">创建日期: </td>\n    <td>\n      {$admin_order_details->mOrderInfo.created_on|date_format:\"\
  %Y-%m-%d %T\"}\n    </td>\n  </tr>\n  <tr>\n    <td class=\"admin_page_text\">发货日期:\
  \ </td>\n    <td>\n      {$admin_order_details->mOrderInfo.shipped_on|date_format:\"\
  %Y-%m-%d %T\"}\n    </td>\n  </tr>\n  <tr>\n    <td class=\"admin_page_text\">状态:\
  \ </td>\n    <td>\n      <select name=\"status\"\n              {if ! $admin_order_details->mEditEnabled}\n\
  \              disabled=\"disabled\"\n              {/if} >\n```\n\n\n\n`{html_options\
  \ options=$admin_order_details->mOrderStatusOptions selected=$admin_order_details->mOrderInfo.status}`\n\
  \n</select>\n\n</td>\n\n</tr>\n\n<tr>\n\n<td class=\"admin_page_text\">备注：</td>\n\
  \n<td>\n\n<input name=\"comments\" type=\"text\" size=\"50\"\n\nvalue=\"{$admin_order_details->mOrderInfo.comments}\"\
  \n\n{if ! $admin_order_details->mEditEnabled}\n\ndisabled=\"disabled\"\n\n{/if}\
  \ />\n\n</td>\n\n</tr>\n\n<tr>\n\n<td class=\"admin_page_text\">客户名称：</td>\n\n<td>\n\
  \n<input name=\"customerName\" type=\"text\" size=\"50\"\n\nvalue=\"{$admin_order_details->mOrderInfo.customer_name}\"\
  \n\n{if ! $admin_order_details->mEditEnabled}\n\ndisabled=\"disabled\"\n\n{/if}\
  \ />\n\n</td>\n\n</tr>\n\n<tr>\n\n<td class=\"admin_page_text\">收货地址：</td>\n\n<td>\n\
  \n<input name=\"shippingAddress\" type=\"text\" size=\"50\"\n\nvalue=\"{$admin_order_details->mOrderInfo.shipping_address}\"\
  \n\n{if ! $admin_order_details->mEditEnabled}\n\ndisabled=\"disabled\"\n\n{/if}\
  \ />\n\n</td>\n\n</tr>\n\n<tr>\n\n<td class=\"admin_page_text\">客户邮箱：</td>\n\n<td>\n\
  \n<input name=\"customerEmail\" type=\"text\" size=\"50\"\n\nvalue=\"{$admin_order_details->mOrderInfo.customer_email}\"\
  \n\n{if ! $admin_order_details->mEditEnabled}\n\ndisabled=\"disabled\"\n\n{/if}\
  \ />\n\n</td>\n\n</tr>\n\n</table>\n\n---\n\n**2.** 在 `presentation/smarty_plugins`\
  \ 文件夹中创建一个新文件，命名为 `function.load_admin_order_details.php`，并在其中编写以下代码：\n\n```php\n\
  <?php\n// 插件文件中的插件函数必须命名为：smarty_type_name\nfunction smarty_function_load_admin_order_details($params,\
  \ $smarty)\n{\n  // 创建 AdminOrderDetils 对象\n  $admin_order_details = new AdminOrderDetails();\n\
  \  $admin_order_details->init();\n\n  // 分配模板变量\n  $smarty->assign($params['assign'],\
  \ $admin_order_details);\n}\n\n// 处理订单详情管理的表示层类\nclass AdminOrderDetails\n{\n  //\
  \ 在 Smarty 模板中可用的公共变量\n  public $mOrderId;\n  public $mOrderInfo;\n  public $mOrderDetails;\n\
  \  public $mEditEnabled;\n  public $mOrderStatusOptions;\n  public $mAdminOrdersPageLink;\n\
  \n  // 类构造函数\n  public function __construct()\n  {\n    // 从会话中获取返回链接\n    $this->mAdminOrdersPageLink\
  \ = $_SESSION['admin_orders_page_link'];\n\n    // 从查询字符串中接收订单 ID\n    if (isset\
  \ ($_GET['OrderId']))\n      $this->mOrderId = (int) $_GET['OrderId'];\n    else\n\
  \      trigger_error('必须提供 OrderId 参数');\n\n    $this->mOrderStatusOptions = Orders::$mOrderStatusOptions;\n\
  \  }\n\n  // 初始化类成员\n  public function init()\n  {\n    if (isset ($_GET['submitUpdate']))\n\
  \    {\n      Orders::UpdateOrder($this->mOrderId, $_GET['status'], $_GET['comments'],\
  \ $_GET['customerName'], $_GET['shippingAddress'], $_GET['customerEmail']);\n  \
  \  }\n\n    $this->mOrderInfo = Orders::GetOrderInfo($this->mOrderId);\n    $this->mOrderDetails\
  \ = Orders::GetOrderDetails($this->mOrderId);\n\n    // 指定启用或禁用编辑模式的值\n    if (isset\
  \ ($_GET['submitEdit']))\n      $this->mEditEnabled = true;\n    else\n      $this->mEditEnabled\
  \ = false;\n  }\n}\n?>\n```\n\n**3.** 打开 `hatshop.css`，并添加以下样式：\n\n```css\n.edit\
  \ tr td\n{\n  background: #ffffff;\n  border: none;\n}\n```\n\n**4.** 向数据库中添加一些模拟订单，然后在浏览器中加载\
  \ `admin.php` 文件。点击“订单管理”菜单链接，点击某个“Go！”按钮显示订单，然后点击其中一个订单的“查看详情”按钮。订单详情管理页面将会显示，允许你编辑订单详情，正如本章前面所述。\n\
  \n## 工作原理：`admin_order_details` 组件化模板\n\n你刚刚编写的三个文件 `admin_order_details.tpl`、`function.load_admin_order_details.php`\
  \ 和 `admin_order_details.php` 允许你查看和更新特定订单的详细信息。\n\n函数插件通过常规机制从模板文件中加载。`AdminOrderDetails`\
  \ 类的构造函数（`__construct` 方法）确保查询字符串中存在 `OrderId` 参数，因为如果没有这个参数，该组件化模板就没有意义：\n\n```php\n\
  // 类构造函数\npublic function __construct()\n{\n  // 从会话中获取返回链接\n  $this->mAdminOrdersPageLink\
  \ = $_SESSION['admin_orders_page_link'];\n\n  // 从查询字符串中接收订单 ID\n  if (isset ($_GET['OrderId']))\n\
  \    $this->mOrderId = (int) $_GET['OrderId'];\n  else\n    trigger_error('必须提供\
  \ OrderId 参数');\n\n  $this->mOrderStatusOptions = Orders::$mOrderStatusOptions;\n\
  }\n```\n\n`init()` 方法响应用户操作，并调用各种业务层方法来完成用户请求。它通过调用业务层方法 `Orders::GetOrderInfo`\
  \ 和 `Orders::GetOrderDetails` 获取数据来填充表单。\n\n`mEditEnabled` 类成员根据查询字符串中 `submitEdit`\
  \ 参数是否设置来决定进入或退出编辑模式。当进入编辑模式时，所有文本框以及“更新”和“取消”按钮变为可用，但“编辑”按钮被禁用。当退出编辑模式时（点击“取消”或“更新”按钮时发生），情况则相反。\n\
  \n## 总结\n\n本章我们涉及了广泛的内容。通过两个独立的阶段，你实现了一个用于接收订单和手动管理订单的系统。你在购物车控件中添加了一个“下订单”按钮，以便访客能够下单购物车中的商品。你还实现了一个简单的订单管理页面，网站管理员可以在其中查看和处理待处理订单。\n\
  \n由于订单数据现在存储在数据库中，你可以根据已售商品进行各种统计和计算。在下一章中，你将学习如何实现“购买了此商品的顾客也购买了……”功能，如果没有数据库中存储的订单数据，这个功能是不可能实现的。\n\
  \n---\n\n## 第 10 章：商品推荐\n\n与实体店相比，互联网商店最重要的优势之一就是能够根据每位访客的偏好，或根据从具有相似偏好的其他访客那里收集的数据，来自定义网站。如果你的网站能够以巧妙的方式向访客推荐更多商品，那么他们最终可能会购买超出最初计划的商品。\n\
  \n\n\n"
- "# 产品推荐系统\n\n在本章中，你将在你的`HatShop`网店中实现一个简单但高效的产品推荐系统。根据你店铺的类型，有多种方式可以实现产品推荐系统。以下是几种常见的方法：\n\
  \n**向上销售**：向上销售被定义为一种策略，即向消费者提供基于其已请求购买商品的“升级”或额外附加品的机会。最著名的向上销售例子莫过于——在麦当劳点超值套餐时，顾客常会听到“您想将套餐升级为大份吗？”这句问询。这个看似无害的请求能大幅提高利润率。\n\
  \n**交叉销售**：交叉销售被定义为向顾客提供互补产品的做法。继续以麦当劳为例，当有人点汉堡时，你总会听到“您想加一份薯条吗？”这句话。由于人们普遍认为薯条与汉堡是绝配，而消费者正在点汉堡，那么这位消费者很可能会喜欢薯条——仅仅提及薯条就可能促成新的一单交易。\n\
  \n**首页推荐商品**：`HatShop`已允许网站管理员选择在主页面和部门页面上展示的推荐商品。\n\n在本章中，你将实现一个同时包含向上销售和交叉销售策略的动态推荐系统。该系统的优势在于无需手动维护。由于目前`HatShop`已记录了哪些产品被售出，你将在本章中实现“购买此产品的顾客也购买了……”功能。\n\
  \n## 通过动态推荐提升销量\n\n在`HatShop`中，你将在访客的购物车页面和产品详情页面中实现动态推荐系统。为你的商店添加新功能后，产品详情页面底部将显示产品推荐列表，如图\
  \ 10-1 所示。\n\n**335**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00137.png)\n\
  \n648XCH10.qxd 11/19/06 1:59 PM Page 336\n\n**336**\n\n第 10 章 ■ 产品推荐\n\n**图 10-1.**\
  \ *实现了动态推荐系统的产品详情页面*\n\n购物车页面也会增加类似的功能，如图 10-2 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00091.png)\n\n648XCH10.qxd 11/19/06 1:59 PM Page 337\n\n第 10 章 ■ 产品推荐\n\
  \n**337**\n\n**图 10-2.** *实现了动态推荐系统的购物车详情页面*\n\n## 实现数据层\n\n在编写任何代码之前，你首先需要理解实现产品推荐所遵循的逻辑。这里我们重点介绍如何推荐与某个特定产品一同被订购的其他产品。随后，购物车页面的推荐功能将以类似方式运作，但会考虑更多产品。\n\
  \n因此，你需要找出那些购买了当前待推荐产品的顾客同时还购买了哪些其他产品（换句话说，就是确定“购买此产品的顾客也购买了……”的信息）。让我们逐步推导出实现产品推荐列表的\
  \ SQL 逻辑。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH10.qxd 11/19/06\
  \ 1:59 PM Page 338\n\n**338**\n\n第 10 章 ■ 产品推荐\n\n**提示** 由于 SQL 非常强大，实际上你可以通过多种方式实现相同的功能。此处我们仅介绍其中一种方案，但在实现实际数据库函数时，你也会看到其他可选方案。\n\
  \n要确定哪些其他产品与某个特定产品一同被订购，你需要将`order_detail`表的两个实例基于它们的`order_id`字段进行连接。如需快速复习表连接的相关知识，请参阅第\
  \ 4 章中的“连接数据表”部分。\n\n\n```sql\n-- 连接单个表的多个实例，就像是连接包含相同数据的不同数据表一样。\n\n-- 你通过 `order_id`\
  \ 字段连接 `order_detail` 的两个实例（分别称为 `od1` 和 `od2`），同时在 `od1` 中过滤 `product_id` 值，以找到你正在查找的产品\
  \ ID。这样，在关系的 `od2` 一侧，你将获得与包含目标产品的订单中所有一同订购的产品。\n\n-- 检索与 `product_id` 为 4 的产品一同订购的所有产品的\
  \ SQL 代码如下：\n\nSELECT od2.product_id\nFROM order_detail od1\nJOIN order_detail od2\n\
  ON od1.order_id = od2.order_id\nWHERE od1.product_id = 4;\n\n-- 这段代码返回一个长长的产品列表，其中包含\
  \ `product_id` 为 4 的产品，如下所示：\nproduct_id\n\n-- 从这个结果列表入手，你需要找出与该产品最常一起购买的产品。该产品列表的第一个问题是它包含了\
  \ `product_id` 为 4 的产品。为了将其从列表中排除（因为显然你不能把它放进推荐列表里），你只需在 `WHERE` 子句中添加一个额外条件：\n\n\
  SELECT od2.product_id\nFROM order_detail od1\nJOIN order_detail od2\nON od1.order_id\
  \ = od2.order_id\nWHERE od1.product_id = 4 AND od2.product_id != 4;\n\n-- 毫不意外，你得到了一个与之前类似的产品列表，只是不再包含\
  \ `product_id` 为 4 的产品：\nproduct_id\n\n-- 现在返回的产品列表短了很多，但它包含了在包含产品标识符 4 的订单中被多次订购的产品的多个条目。\n\
  \n-- 要获得最相关的推荐，你需要查看哪些产品在此列表中出现的频率更高。你可以通过按 `product_id` 对前一个查询的结果进行分组，并按每个产品在列表中的出现次数（该次数由以下代码片段中的\
  \ `rank` 计算列给出）降序排列来实现这一点：\n\nSELECT od2.product_id, COUNT(od2.product_id) AS rank\n\
  FROM order_detail od1\nJOIN order_detail od2\nON od1.order_id = od2.order_id\nWHERE\
  \ od1.product_id = 4 AND od2.product_id != 4\nGROUP BY od2.product_id\nORDER BY\
  \ rank DESC;\n\n-- 该查询现在返回如下列表：\nproduct_id rank\n---------- ----\n10 3\n5 2\n43\
  \ 2\n23 1\n25 1\n28 1\n12 1\n14 1\n\n-- 如果你不需要返回 `rank`，可以通过直接在 `ORDER BY` 子句中使用\
  \ `COUNT` 聚合函数来重写此查询。你还可以使用 `LIMIT` 关键字来指定你感兴趣的记录数量。如果你想要列表中的前五个产品，以下查询可以实现：\n\n\
  SELECT od2.product_id\nFROM order_detail od1\nJOIN order_detail od2\nON od1.order_id\
  \ = od2.order_id\nWHERE od1.product_id = 4 AND od2.product_id != 4\nGROUP BY od2.product_id\n\
  ORDER BY COUNT(od2.product_id) DESC\nLIMIT 5;\n\n-- 该查询的结果如下：\nproduct_id\n\n--\
  \ 由于这串数字对人类来说意义不大，你可能还想了解推荐产品的名称和描述。以下查询通过从 `product` 表中查询上一个查询返回的 ID（由于篇幅原因，未要求查询描述）来实现这一点：\n\
  \nSELECT product_id, name\nFROM product\nWHERE product_id IN\n(\n  SELECT od2.product_id\n\
  \  FROM order_detail od1\n  JOIN order_detail od2 ON od1.order_id = od2.order_id\n\
  \  WHERE od1.product_id = 4 AND od2.product_id != 4\n  GROUP BY od2.product_id\n\
  \  ORDER BY COUNT(od2.product_id) DESC\n  LIMIT 5\n);\n```\n\n\n基于之前虚构结果中的数据，此查询返回如下内容：\n\
  \n```\nproduct_id name\n---------- -----------------------\n10        Vinyl Policeman\
  \ Cop Hat\n43        Hussar Military Hat\n5         Red Santa Cowboy Hat\n23   \
  \     Black Basque Beret\n28        Moleskin Driver\n```\n\n或者，您可能只想使用过去`n`天内的订单数据来计算产品推荐。为此，您需要与包含`date_created`字段的`orders`表进行一次额外的联接。以下查询基于过去\
  \ 30 天内下的订单计算产品推荐：\n\n```\nSELECT product_id, name\nFROM product\nWHERE product_id\
  \ IN\n(\n  SELECT od2.product_id\n  FROM order_detail od1\n  JOIN order_detail od2\n\
  \    ON od1.order_id = od2.order_id\n  JOIN orders o\n    ON od1.order_id = o.order_id\n\
  \  WHERE od1.product_id = 7\n    AND od2.product_id != 7\n    AND (NOW() - o.created_on)\
  \ < 30\n  GROUP BY od2.product_id\n  ORDER BY COUNT(od2.product_id) DESC\n  LIMIT\
  \ 5\n);\n```\n\n我们不会在`HatShop`中使用这个技巧，但值得将其作为一种可能性牢记于心。\n\n---\n\n"
- "# 产品推荐\n\n## 添加产品推荐\n\n请确保您理解前面解释的数据层逻辑，因为您将在`catalog_get_recommendations`数据库函数中实现它。与之前显示的查询唯一重要的区别是，您还需要获取产品描述，该描述将被截断为指定的字符数。\n\
  \n`catalog_get_recommendations`数据库函数在显示与所选产品一起订购了哪些产品时被调用。按照下一个练习中的步骤，将`catalog_get_recommendations`函数添加到`hatshop`数据库中。\n\
  \n### 练习：添加`catalog_get_recommendations`函数\n\n1. 加载`pgAdmin III`，并连接到`hatshop`数据库。\n\
  2. 点击工具 ➤ 查询工具（或点击工具栏上的`SQL`按钮）。将出现一个新的查询窗口。\n3. 使用查询工具执行以下代码，该代码将在您的`hatshop`数据库中创建`product_recommendation`类型和`catalog_get_recommendations`函数：\n\
  \n```sql\n-- Create product_recommendation type\nCREATE TYPE product_recommendation\
  \ AS\n(\n  product_id INTEGER,\n  name VARCHAR(50),\n  description VARCHAR(1000)\n\
  );\n\n-- Create catalog_get_recommendations function\nCREATE FUNCTION catalog_get_recommendations(INTEGER,\
  \ INTEGER) RETURNS SETOF product_recommendation LANGUAGE plpgsql AS $$\nDECLARE\n\
  \  inProductId ALIAS FOR $1;\n  inShortProductDescriptionLength ALIAS FOR $2;\n\
  \  outProductRecommendationRow product_recommendation;\nBEGIN\n  FOR outProductRecommendationRow\
  \ IN\n    SELECT product_id, name, description\n    FROM product\n    WHERE product_id\
  \ IN\n    (SELECT od2.product_id\n     FROM order_detail od1\n     JOIN order_detail\
  \ od2\n       ON od1.order_id = od2.order_id\n     WHERE od1.product_id = inProductId\n\
  \       AND od2.product_id != inProductId\n     GROUP BY od2.product_id\n     ORDER\
  \ BY COUNT(od2.product_id) DESC\n     LIMIT 5)\n  LOOP\n    IF char_length(outProductRecommendationRow.description)\
  \ > inShortProductDescriptionLength THEN\n      outProductRecommendationRow.description\
  \ :=\n        substring(outProductRecommendationRow.description, 1, inShortProductDescriptionLength)\
  \ || '...';\n    END IF;\n    RETURN NEXT outProductRecommendationRow;\n  END LOOP;\n\
  END;\n$$;\n```\n\n### 使用子查询的替代方案\n\n由于`SQL`非常灵活，`catalog_get_recommendations`可以用多种方式编写。在我们的案例中，一种流行的替代表联接的方法是使用子查询。以下是一个使用子查询代替联接的`catalog_get_recommendations`版本。带注释的代码不言自明：\n\
  \n```sql\n-- Create catalog_get_recommendations function\nCREATE OR REPLACE FUNCTION\
  \ catalog_get_recommendations(INTEGER, INTEGER) RETURNS SETOF product_recommendation\
  \ LANGUAGE plpgsql AS $$\nDECLARE\n  inProductId ALIAS FOR $1;\n  inShortProductDescriptionLength\
  \ ALIAS FOR $2;\n```\n\n\n\n```sql\noutProductRecommendationRow product_recommendation;\n\
  \nBEGIN\n\nFOR outProductRecommendationRow IN\n\n-- 返回产品推荐\n\nSELECT product_id,\
  \ name, description\n\nFROM product\n\nWHERE product_id IN\n\n(-- 返回与 inProductId\
  \ 一起被订购的产品\n\nSELECT product_id\n\nFROM order_detail\n\nWHERE order_id IN\n\n(--\
  \ 返回包含 inProductId 的订单\n\nSELECT DISTINCT order_id\n\nFROM order_detail\n\nWHERE\
  \ product_id = inProductId\n\nLIMIT 5)\n\n-- 不能包含访客购物车中已有的产品\n\nAND product_id !=\
  \ inProductId\n\n-- 对 product_id 进行分组，以便计算排序\n\nGROUP BY product_id\n\n-- 按排序降序排列\n\
  \nORDER BY COUNT(product_id) DESC\n\nLIMIT 5)\n\nLOOP\n\nIF char_length(outProductRecommendationRow.description)\
  \ > inShortProductDescriptionLength THEN\n\noutProductRecommendationRow.description\
  \ :=\n\nsubstring(outProductRecommendationRow.description, 1,\n\ninShortProductDescriptionLength)\
  \ || '...';\n\nEND IF;\n\nRETURN NEXT outProductRecommendationRow;\n\nEND LOOP;\n\
  \nEND;\n\n$$;\n```\n\n## 添加购物车推荐\n\n显示购物车推荐的逻辑与你之前所做的非常相似，只不过现在需要考虑购物车中的所有产品，而不是单个产品。按照下一个练习中的步骤，将\
  \ `shopping_cart_get_recommendations` 函数添加到 `hatshop` 数据库中。\n\n### 练习：添加 `shopping_cart_get_recommendations`\
  \ 函数\n\n1. 加载 pgAdmin III，并连接到 `hatshop` 数据库。\n2. 单击 **工具** ➤ **查询工具**（或单击工具栏上的\
  \ **SQL** 按钮）。此时会出现一个新的查询窗口。\n3. 使用查询工具执行以下代码，该代码将在你的 `hatshop` 数据库中创建 `shopping_cart_get_recommendations`\
  \ 函数：\n\n```sql\n-- 创建 shopping_cart_get_recommendations 函数\n\nCREATE FUNCTION shopping_cart_get_recommendations(CHAR(32),\
  \ INTEGER) RETURNS SETOF product_recommendation LANGUAGE plpgsql AS $$\n\nDECLARE\n\
  \ninCartId ALIAS FOR $1;\n\ninShortProductDescriptionLength ALIAS FOR $2;\n\noutProductRecommendationRow\
  \ product_recommendation;\n\nBEGIN\n\nFOR outProductRecommendationRow IN\n\n-- 返回产品推荐\n\
  \nSELECT product_id, name, description\n\nFROM product\n\nWHERE product_id IN\n\n\
  (-- 返回存在于某个订单列表中的产品\n\nSELECT od1.product_id\n\nFROM order_detail od1\n\nJOIN order_detail\
  \ od2\n\nON od1.order_id = od2.order_id\n\nJOIN shopping_cart\n\nON od2.product_id\
  \ = shopping_cart.product_id\n\nWHERE shopping_cart.cart_id = inCartId\n\n-- 不能包含访客购物车中已有的产品\n\
  \nAND od1.product_id NOT IN\n\n(-- 返回指定购物车中的产品\n\nSELECT product_id\n\nFROM shopping_cart\n\
  \nWHERE cart_id = inCartId)\n\n-- 对 product_id 进行分组，以便计算排序\n\nGROUP BY od1.product_id\n\
  \n-- 按排序降序排列\n\nORDER BY COUNT(od1.product_id) DESC\n\nLIMIT 5)\n\nLOOP\n\nIF char_length(outProductRecommendationRow.description)\
  \ > inShortProductDescriptionLength THEN\n\noutProductRecommendationRow.description\
  \ :=\n\nsubstring(outProductRecommendationRow.description, 1,\n\ninShortProductDescriptionLength)\
  \ || '...';\n\nEND IF;\n\nRETURN NEXT outProductRecommendationRow;\n\nEND LOOP;\n\
  \nEND;\n\n$$;\n```\n\n此函数的替代版本（使用子查询而不是表连接）如下所示：\n\n```sql\n-- 创建 shopping_cart_get_recommendations\
