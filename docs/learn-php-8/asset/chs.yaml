  \ `$value` 而不是文件名。\n\n在 `lab.html` 程序中，还有几处额外的更改。\n\n```\nAjaxRequest('dog_interface.php');\n\
  ```\n\n对 JavaScript 函数的调用现在传入了文件名，该文件名也已更改为 `dog_interface.php` 文件。\n\n最后，HTML 表单的\
  \ action 标签（在两个表单标签位置）已更改为调用 `dog_interface.php` 程序。请注意，现在，每当我们想要使用 `Dog` 应用程序时，我们首先调用界面。然后界面确定我们要完成什么（获取品种选择框或处理您正在创建的狗的属性）。我们必须通过界面与所有类进行通信。反过来，界面必须使用容器创建任何所需的对象（当然，容器本身除外）。这遵循了分层设计的概念。\n\
