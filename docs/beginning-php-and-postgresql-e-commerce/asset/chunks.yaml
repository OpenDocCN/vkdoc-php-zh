  trans: "\n现在你已经创建了一个新的信用卡交易类，接下来需要将其功能集成到之前章节构建的订单处理管道中。为了将 `DataCash` 与 `HatShop`\
    \ 完全集成，你需要更新现有的 `PsCheckFunds` 和 `PsTakePayments` 类。\n\n你需要修改处理信用卡交易的管道段类。我们已通过\
    \ `OrderProcessor.SetOrderAuthCodeAndReference` 方法加入了用于存储和检索认证码及参考信息的基础设施。\n\n\
    ## 练习：实现订单管道类\n\n**1.** 首先修改 `business/ps_check_funds.php` 以配合 `DataCash` 使用：\n\
    \n```php\n<?php\n\nclass PsCheckFunds implements IPipelineSection\n{\n  public\
    \ function Process($processor)\n  {\n    // 审计\n    $processor->CreateAudit('PsCheckFunds\
    \ 已启动。', 20100);\n\n    $order_total_cost = $processor->mOrderInfo['total_amount'];\n\
    \    $order_total_cost += $processor->mOrderInfo['shipping_cost'];\n    $order_total_cost\
    \ +=\n      round((float)$order_total_cost *\n        (float)$processor->mOrderInfo['tax_percentage'],\
    \ 2) / 100.00;\n\n    $request = new DataCashRequest(DATACASH_URL);\n    $request->MakeXmlPre(DATACASH_CLIENT,\
    \ DATACASH_PASSWORD,\n      $processor->mOrderInfo['order_id'] + 1000006,\n  \
    \    $order_total_cost, 'GBP', 'pre',\n      $processor->mCustomerInfo['credit_card']->CardNumber,\n\
    \      $processor->mCustomerInfo['credit_card']->ExpiryDate,\n      $processor->mCustomerInfo['credit_card']->IssueDate,\n\
    \      $processor->mCustomerInfo['credit_card']->IssueNumber);\n\n    $responseXml\
    \ = $request->GetResponse();\n    $xml = simplexml_load_string($responseXml);\n\
    \n    if ($xml->status == 1)\n    {\n      $processor->SetAuthCodeAndReference(\n\
    \        $xml->merchantreference, $xml->datacash_reference);\n\n      // 审计\n\
    \      $processor->CreateAudit('购买资金可用。', 20102);\n\n      // 更新订单状态\n      $processor->UpdateOrderStatus(2);\n\
    \n      // 继续处理\n      $processor->mContinueNow = true;\n    }\n    else\n   \
    \ {\n      // 审计\n      $processor->CreateAudit('购买资金不可用。', 20103);\n      throw\
    \ new Exception('订单 ' .\n        $processor->mOrderInfo['order_id'] . ' 信用卡资金检查失败。'\
    \ . \"\\n\\n\" .\n        '交换的数据：' . \"\\n\" .\n        $request->GetResponse()\
    \ . \"\\n\" . $responseXml);\n    }\n\n    // 审计\n    $processor->CreateAudit('PsCheckFunds\
    \ 已完成。', 20101);\n  }\n}\n?>\n```\n\n**2.** 按如下方式修改 `business/ps_take_payment.php`\
    \ 文件：\n\n```php\n<?php\n\nclass PsTakePayment implements IPipelineSection\n{\n\
    \  public function Process($processor)\n  {\n    // 审计\n    $processor->CreateAudit('PsTakePayment\
    \ 已启动。', 20400);\n\n    $request = new DataCashRequest(DATACASH_URL);\n    $request->MakeXmlFulFill(DATACASH_CLIENT,\
    \ DATACASH_PASSWORD,\n      'fulfill',\n      $processor->mOrderInfo['auth_code'],\n\
    \      $processor->mOrderInfo['reference']);\n\n    $responseXml = $request->GetResponse();\n\
    \    $xml = simplexml_load_string($responseXml);\n\n    if ($xml->status == 1)\n\
    \    {\n      // 审计\n      $processor->CreateAudit(\n        '已从客户信用卡账户中扣除资金。',\
    \ 20402);\n\n      // 更新订单状态\n      $processor->UpdateOrderStatus(5);\n\n    \
    \  // 继续处理\n      $processor->mContinueNow = true;\n    }\n    else\n    {\n \
    \     // 审计\n      $processor->CreateAudit('无法从信用卡中扣除资金。', 20403);\n      throw\
    \ new Exception('订单 ' .\n        $processor->mOrderInfo['order_id'] . ' 信用卡扣款失败。'\
    \ . \"\\n\\n\" .\n        '交换的数据：' . \"\\n\" .\n        $request->GetResponse()\
    \ . \"\\n\" . $responseXml);\n    }\n\n    // 审计\n    $processor->CreateAudit('PsTakePayment\
    \ 已完成。', 20401);\n  }\n}\n?>\n```\n\n**3.** 在 `include/app_top.php` 中添加对 `business/datacash_request.php`\
    \ 文件的引用，如下方高亮所示：\n\n```php\nrequire_once BUSINESS_DIR . 'ps_ship_ok.php';\nrequire_once\
    \ BUSINESS_DIR . 'ps_final_notification.php';\nrequire_once BUSINESS_DIR . 'datacash_request.php';\n\
    ```\n\n## 测试 DataCash 集成\n"
- fmt: "Now that you have all this in place, it’s important to test with a few orders.\
    \ You can do this easily by making sure you create a customer with “magic” credit\
    \ card details. As mentioned earlier in the chapter, `DataCash` supplies these\
    \ numbers for testing purposes and to obtain specific responses from `DataCash`.\
    \ A sample of these numbers is shown in Table 15-2; a full list is available on\
    \ the `DataCash` web site.\n\n**Table 15-2.** `DataCash` *Credit Card Test Numbers*\
    \ **Card Type** | **Card Number** | **Return Code** | **Description** | **Sample\
    \ Message**\n--- | --- | --- | --- | ---\n`Switch` | | Authorized with | `AUTH\
    \ CODE ??????` | random auth code.\n| | | Decline the | `DECLINED` | transaction.\n\
    | | | Authorized with | `AUTH CODE ??????` | random auth code.\n| | | Decline\
    \ the | `DECLINED` | transaction.\n| | | Authorized with | `AUTH CODE ??????`\
    \ | random auth code.\n`Visa` | | Decline the | `DECLINED` | transaction.\n| |\
    \ | Authorized with | `AUTH CODE ??????` | random auth code.\n| | | Authorized\
    \ with | `AUTH CODE ??????` | random auth code.\n\nAt this moment, you can experiment\
    \ with your new fully featured e-commerce web site by placing orders with the\
    \ test credit card numbers, checking the emails the web site sends, and finding\
    \ out how it reacts in certain situation, such as how it logs errors, how orders\
    \ are administered using the orders administration page, and so on.\n\n## Going\
    \ Live\n\nMoving from the test account to the live one is now simply a matter\
    \ of replacing the `DataCash` login info in `include/config.php`. After you set\
    \ up a merchant bank account, you can use the new details to set up a new `DataCash`\
    \ account, obtaining new client and password data along the way. You also need\
    \ to change the URL for the `DataCash` server that you send data to\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n`648XCH15.qxd 11/15/06 6:21 PM Page 524`\n\n**524**\n\nC H A P T E R 1 5 ■ C\
    \ R E D I T C A R D T R A N S A C T I O N S\n\nbecause it needs to be the production\
    \ server instead of the testing server. Other than removing the test user accounts\
    \ from the database and moving your web site to an Internet location (see Appendix\
    \ B for more details), this is all you need to do before exposing your newly completed\
    \ e-commerce application to customers.\n\n## Working with Authorize.net\n\nTo\
    \ use `Authorize.net`, you need to sign up for a developer test account via `http://developer.authorize.net/testaccount/`.\
    \ The main page where developers can get information on `Authorize.net` integration\
    \ is `http://developer.authorize.net/`.\n\nCommunicating with `Authorize.net`\
    \ is different from communicating with `DataCash`. Instead of sending and receiving\
    \ XML files, you send strings consisting of name-value pairs, separated by ampersands.\
    \ Effectively, you use a similar syntax to query strings appended to URLs.\n\n\
    `Authorize.net` returns the transaction results in the form of a string that contains\
    \ the return values (without their names) separated by a character that you specify\
    \ when making the initial request. In our examples, we’ll use the pipe (`|`) character.\
    \ The return values come in a predetermined order, and their significance is given\
    \ by their position in the returned string.\n\n> **Note** The complete documentation\
    \ for the `Authorize.net` API can be found in the Advanced Integration Method\
    \ (AIM) Implementation Guide Card-Not-Present Transactions at `http://www.authorize.net/support/AIM_guide.pdf`.\
    \ Even more documents are available in the document library at `http://www.authorize.net/resources/documentlibrary/`.\n\
    \nThe default transaction type is `AUTH_CAPTURE`, where you request and deduct\
    \ the funds from the credit card using a single request. For `HatShop`, we’ll\
    \ use two other transaction types: `AUTH_ONLY`, which checks if the necessary\
    \ funds are available (this happened in the `PsCheckFunds` pipeline stage), and\
    \ `PRIOR_AUTH_CAPTURE`, which deducts the amount of money that was previously\
    \ checked using `AUTH_ONLY` (this happens in the `PsTakePayment` pipeline stage).\n\
    \nTo perform an `AUTH_ONLY` transaction, you’ll first create an array such as\
    \ the following, which contains the necessary transaction data.\n\n```\n// Auth\n\
    $transaction = array ('x_invoice_num' => '99999', // Invoice number\n        \
    \             'x_amount' => '45.99',        // Amount\n```"
