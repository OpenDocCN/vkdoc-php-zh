    The only public method in our INI configuration parser class is a method called
    parse(). It first checks to see that the $path argument is not empty, throwing
    a ConfigurationExceptionArgument exception if it is. Next, it checks to see if
    the requested configuration file has not already been parsed, and if it has it
    jumps right to where it returns the configuration.


    If it has not parsed the required configuration file, it uses output buffering
    to capture the contents of a call to include() the configuration file’s contents.
    Using the include() method allows the configuration to be sitting anywhere relative
    to the paths in PHP’s include path, though we will usually be loading them from
    a standard configuration folder.


    It then parses the string contents of the configuration file using PHP’s parse_ini_string()
    method, which returns an associative array of keys and values, stored in the $pairs
    variable. If nothing was returned to $pairs, we assume the configuration file
    contained invalid syntax, and raise a ConfigurationExceptionSyntax exception.


    If it did return an associative array, we loop through the array, generating the
    correct hierarchy (using the _pair() method), finally converting the associative
    array to an object and caching/returning the configuration file data. You can
    see an example of using the _pair() method in Listing 4-10.


