  trans: '

    # 当控制器调用 `xmlFindAll()` 函数时，模型会返回一组值供控制器和视图使用。请注意，此模型函数并不包含稍后将在 `DataSource` 中出现的全部连接代码。这能使模型保持精简，专注于处理数据，而非管理所有与数据源的连接。


    ## 读取 XML 文件


    现在设置例程已完成，模型已准备好开始使用 `DataSource` 函数，你可以让 `DataSource` 开始工作了。目前，`findAll()` 函数尚未执行任何操作。在其能够读取数据之前，清单
    14-3 中第 16 行的 `connect()` 函数必须连接到 XML 文件并获取其内容以供 `DataSource` 使用。将 `connect()`
    替换为清单 14-6 的内容，以便为 `DataSource` 提供必要的连接方法。


    **清单 14-6.** *改进后的 XML DataSource 中的* `connect()` *函数* 16


    ```

    function connect() {

    17 App::import(''Core'',''File'');

    18 $this->FileUtil =& new File(WWW_ROOT.''files/''.$this->config[''file'']); 19
    $this->File = $file->read();


    if (!$this->File) {

    21 return false;

    22 } else {

    return true;

    }

    25 }

    ```


    在整个 `DataSource` 文件中，定义在 `app/config/database.php` 中的配置数组将通过对象变量 `$config` 可用。不要将此变量与清单
    14-3 中 `__construct()` 函数使用的 `$config` 变量混淆。实际上，构造方法的结果——或者说，`__construct()` 函数的返回值——会被赋值给
    `DataSource` 的标准对象变量 `$config`。这意味着在 `DataSource` 的其余任何地方（`__construct()` 函数除外），构造函数返回的配置值都可以通过
    `$this->config` 访问。恰好 `__construct()` 会执行必要的方法，从 `app/config/database.php` 获取
    `$xml` 数组，并将其作为 `$this->config` 返回供 `DataSource` 使用。清单 14-6 中的 `connect()` 函数使用
    `$this->config` 来检索数据源的文件名。请注意，第 18 行在 `File` 工具中调用此文件名。利用 `WWW_ROOT` 全局变量，第 18
    行还包含了相对于 Cake 的文件路径。在这种情况下，该文件需要以 `app/webroot/files/data.xml` 的形式存储在 Cake 文件系统中。当然，`$this->config[''file'']`
    对应于清单 14-4 第 3 行定义的 `$xml[''file'']`。


    得益于 `File` 工具类，读取 `app/webroot/files/data.xml` 的内容变得轻而易举。第 18 行获取文件本身，并将其作为 `File`
    工具类对象的一部分进行赋值。然后，在第 19 行，使用 `File` 工具类的 `read()` 函数来读取文件内容，并将其赋值给一个名为 `$File`
    的类变量。你可能已经注意到这个变量尚未定义；通过在清单 14-2 第 3 行（或当前 XML `DataSource` 文件的第 3 行）所示的 `$description`
    类变量下方插入以下字符串来定义：`var $File = null;`


    将文件内容赋值给对象变量而非标准变量，对于确保 `DataSource` 中的所有其他函数都能访问此文件至关重要。基于同样的原因，生成的 `File` 工具对象也应可供
    `DataSource` 的其余部分使用。这一点通过第 18 行将新的 `File` 对象赋值给实例变量 `$FileUtil` 来实现。同样，这个变量也需要在类中正确定义。请在
    `$File` 定义附近插入此定义：`var $FileUtil = null;`


    稍后，`__destruct()` 和 `close()` 函数会关闭 `data.xml` 文件，以尽量降低应用程序对服务器的负载。这些函数需要 `File`
    工具对象，由于我已将其赋值给 `$FileUtil` 实例变量，因此该对象在 `connect()` 函数外部是可访问的。


    `connect()` 函数通过向 `DataSource` 的其余部分提供 `data.xml` 的文件内容，基本上执行了连接方法。该函数剩下的工作就是向构造函数返回
    `true` 或 `false` 结果。第 20–24 行检查 `$File` 变量中是否有任何内容并返回结果。现在 `data.xml` 文件已打开，其内容可供
    `DataSource` 的其余部分使用，你可以着手处理模型调用的 `findAll()` 函数了。


    ## 断开与 XML 文件的连接


    为了确保万无一失，`DataSource` 应包含一个用于断开与数据源连接的方法。清单 14-3 中定义的 `__destruct()` 函数已经执行了此操作，只是它调用的
    `close()` 函数目前尚为空。将 `close()` 函数（现在应位于 `app/models/datasources/xml_source.php`
    文件的第 29 行）替换为清单 14-7 的内容。


    **清单 14-7.** *改进后的* `close()` *函数*


    ```

    function close() {

    if ($this->FileUtil->close()) {

    31 return false;

    32 } else {

    return true;

    }

    35 }

    ```


    此函数的结果可能看起来有些反常，仅仅是因为 `false` 结果通常意味着方法执行失败。在这种情况下，返回 `false` 会将 `$connected`
    类变量设置为适当的值；它告诉模型连接状态已断开，即零。


    清单 14-7 的第 30 行使用 `File` 工具类的 `close()` 函数来关闭 `data.xml` 文件。简而言之，如果关闭成功，那么 `close()`
    函数剩下的工作就是向析构函数报告 `false`，这在第 31 行完成。


    ## 解析 XML 文件


    在 `DataSource` 解析 XML 文件之前，我们先给它一些数据来操作。将类似清单 14-8 的内容粘贴到 `app/webroot/files/data.xml`
    文件中。请注意，清单 14-8 的格式为 XML 1.0 标准标签，这些标签以数据库中当前 posts 表中的字段命名。


    **清单 14-8.** *需添加到* `data.xml` *文件中的内容*


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <blog>

    <post>

    <id></id>

    <name>用 XML 编写文章轻而易举</name>

