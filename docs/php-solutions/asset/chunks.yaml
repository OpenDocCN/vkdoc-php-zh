  raw: 'The first line of new code concatenates the suffix to the filename stripped
    of its filename extension. So, if the original file is called `menu.jpg` and the
    default `_thb` suffix is used, `$newname` becomes `menu_thb`.


    The conditional statement checks the image’s MIME type and appends the appropriate
    filename extension. In the case of `menu.jpg`, `$newname` becomes `menu_thb.jpg`.
    The scaled-down image is then passed to the appropriate function to save it, using
    the destination folder and `$newname` as the path for where it is saved. For JPEG
    and PNG images, the optional quality argument is set to the highest level: 100
    for JPEG and 0 for PNG.


    The result of the save operation is stored in `$success`. Depending on the outcome,
    `$success` is either `true` or `false`, and an appropriate message is added to
    the `$messages` property. The message is created using the `basename()` function
    rather than the `$basename` property because the filename extension has been stripped
    from the property, whereas the function preserves it.


    Finally, `imagedestroy()` frees the server memory by destroying the resources
    used to create the thumbnail image.


    Update the definition of the `create()` method to call the `createThumbnail()`
    method:


    `public function create() {`


    `if ($this->canProcess && $this->originalwidth != 0) {`


    `$this->calculateSize($this->originalwidth, $this->originalheight);`


    `$this->createThumbnail();`


    `} elseif ($this->originalwidth == 0) {`


    `$this->messages[] = ''Cannot determine size of '' . $this->original;`


    `}`


    `}`


    You no longer need the `test()` method. You can either delete it from the class
    definition or comment it out. If you plan to experiment further or make enhancements
    to the class, commenting it out saves the effort of creating it again from scratch.
      Up to now, you have used the `test()` method to display error messages. Create
    a public method to get the messages:


    `public function getMessages() {`


    `return $this->messages;`


    `}`


    Save `Thumbnail.php`. In `create_thumb.php`, replace the call to the `test()`
    method with a call to `getMessages()` and assign the result to a variable, like
    this:


    `$thumb->create();`


    `$messages = $thumb->getMessages();`


    Add a PHP code block just after the opening `<body>` tag to display any messages:


    `<?php`


    `if (isset($messages) && !empty($messages)) {`


    `echo ''<ul>'';`


    `foreach ($messages as $message) {`


    `echo "<li>$message</li>";`


    `}`


    `echo ''</ul>'';`


    `}`


    `?>`


    You’ve seen this code in previous chapters, so it needs no explanation.


    If the thumbnail isn’t created, the error message generated by the `Thumbnail`
    class should help you detect the source of the problem. Also, check your code
    carefully against `Thumbnail_04.php` in the `ch08/PhpSolutions/Image` folder.
    If the tests in the previous PHP solutions worked, the error is likely in the
    `create()`, `createImageResource()`,or `createThumbnail()` method definitions.
    The other place to check is, of course, your PHP configuration. The class depends
    on the GD extension being enabled. Although GD is widely supported, it’s not always
    on by default.


    ![A978-1-4842-0635-5_8_Fig6_HTML.jpg](A978-1-4842-0635-5_8_Fig6_HTML.jpg)


    Figure 8-6.


    The thumbnail has been successfully created in the destination folder Save `create_thumb.php`,
    load it in a browser, and test it by selecting an image from the list and clicking
    Create Thumbnail. If all goes well, you should see a message reporting the creation
    of the thumbnail and you can confirm its existence in the `thumbs` subfolder of
    `upload_test`, as shown in Figure [8-6](#A978-1-4842-0635-5_8_Chapter.html#Fig6).


    ## Resizing an Image Automatically on Upload


    Now that you have a class that creates a thumbnail from a larger image, it’s relatively
    simple to adapt the `Upload` class from [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html)
    to generate a thumbnail from an uploaded image—in fact, not only from a single
    image but also from multiple images.


    Instead of changing the code in the `Upload` class, it’s more efficient to extend
    the class and create a subclass. You then have the choice of using the original
    class to perform uploads of any type of file, or the subclass to create thumbnail
    images on upload. The subclass also needs to provide the option to save or discard
    the larger image after the thumbnail has been created.


    Before diving into the code, let’s take a quick look at how you create a subclass.


    ### Extending a Class


    A major advantage of using classes is that they’re extensible. To extend a class,
    you simply include the original class definition and define the subclass using
    the `extends` keyword, like this:


    `require_once ''OriginalClass.php'';`


    `class MyNewClass` `extends` `OriginalClass {`


    `// subclass definition`


    `}`


    This creates a new subclass or child class called `MyNewClass` from the original
    or parent class, `OriginalClass`. The parent-child analogy is apposite, because
    the child inherits all the features of its parent but can adapt some of them and
    acquire new ones of its own. This means that `MyNewClass` shares the same properties
    and methods as `OriginalClass`, but you can add new properties and methods. You
    can also redefine (or override) some of the parent’s methods and properties. This
    simplifies the process of creating a class to perform a more specialized task.
    The `Upload` class you created in [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html)
    performs basic file uploads. In this chapter, you’ll extend it to create a child
    class called `ThumbnailUpload` that uses the basic upload features of its parent
    but adds specialized features that create thumbnail images. The subclass will
    be created in the `PhpSolutions/Image` folder, so it will use `PhpSolutions\Image`
    as its namespace.


    Like all children, a child class often needs to borrow from its parent. This frequently
    happens when you override a method in the child class but need to use the original
    version as well. To refer to the parent version, you prefix it with the `parent`
    keyword followed by two colons, like this:


    `parent::originalMethod();`


    You’ll see how this works in PHP Solution 8-5, because the child class defines
    its own constructor to add an extra argument but also needs to use the parent
    constructor.


    Note


    This description of inheritance covers only the bare minimum you need to understand
    PHP Solution 8-5\. For a more detailed insight into PHP classes, see my PHP Object-Oriented
    Solutions (friends of ED, 2008, ISBN: 978-1-4302-1011-5).


    Let’s create a class capable of uploading images and generating thumbnails at
    the same time.'
