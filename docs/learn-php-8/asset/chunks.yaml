    most part, users cannot enter any invalid information. The only field\nthey can\
    \ attempt to do so is in the `dog_name` field.\nHowever, even if they try to enter\
    \ program code, or other code, the\nserver-side program will strip out the special\
    \ characters, so the code\nbecomes harmless. If a packet sniffing program tries\
    \ to change the data\nbefore it is received by the server-side program, the validation\
    \ and/or\nfiltering methods will either cause the data to be rejected or will,\n\
    again, make the data harmless.\n\nThis program is\nefficient as it tries to validate\
    \ the information before it is sent to\nthe server. It reduces the amount of communication\
    \ back and forth\nbetween the server and the user. The completed program has two\
    \ tiers\n(interface, business rules) and can be expanded to include a third tier\n\
    (data) without major changes to the current code.\n\n*   *Programming recommendation—For\
    \ small web applications that\n    are used infrequently, it is not necessary\
    \ to break the program apart,\n    as is done in this example. However, if it\
    \ is an application that might\n    expand in the future, or might gain significant\
    \ users in the future, the\n    program should initially be created with this\
    \ in mind.*\n\nDo It\n\n1.  Go to the book’s web site and run the example program.\
    \ See if you can\n    “break” the security built into the program. Remember, you\
    \ can only\n    attempt to be as secure as possible; nothing is 100% secure. Were\
    \ you\n    able to send harmful information to the program that affected the\n\
    \    program? If so, what did you do? What might be missing from the program\n\
    \    that allowed this to happen? If not, what stopped your harmful data from\n\
    \    corrupting the\n    program? What changes might you make to this program\
    \ that would require\n    you to include a data tier? What inefficiencies still\
    \ exist in the\n    program? What can you do to fix them?\n\nDependency Injection\n\
    As you have seen, when programs are\ncreated, a developer goes through many iterations\
    \ before the final\napplication has been completed. Along the way, experience\
    \ programmers\nwill keep different versions of their programs. This allows the\n\
    programmers to back up to a previous version, quickly, if the version\nthey are\
    \ working on has too many significant problems. Otherwise, they\nwould have to\
    \ attempt to strip out the “bad” code without doing harm to\nthe good code. Applications\
    \ have many files (HTML, JavaScript, CSS, PHP\nclasses, and PHP libraries). Keeping\
    \ track of which version works with\nwhich, or easily changing one part of the\
    \ program to use a new version\nof another part, can become confusing, especially\
    \ when the file names\nand class names are coded in the code of the program itself.\n\
    Chapter [2](#394210_2_En_2_Chapter.xhtml) briefly discussed *dependency\ninjection*.\
    \ It allows the program (client) that will use a block of\ncode (such as a class)\
    \ while not knowing the actual implementation of\nthe block of code it will be\
    \ using. The client program does not know the\nactual class name."
