    `<?php if (` `(` `$_POST && $suspect` `) || ($_POST` `&&` `isset($errors[''mailfail'']))`
    `) { ?>`


    `<p class="warning">Sorry, your mail could not be sent. . . .`


    The original and new conditions have been wrapped in parentheses, so each pair
    is considered as a single entity. The warning about the message not being sent
    is displayed if the form has been submitted and suspect phrases have been found,
    or if the form has been submitted and `$errors[''mailfail'']` has been set.


    Delete the code block (including the `<pre>` tags) that displays the message body
    and headers at the bottom of `contact.php`.   Testing this locally is likely to
    result in the thank you page being shown, but the email never arriving. This is
    because most testing environments don’t have an MTA. Even if you set one up, most
