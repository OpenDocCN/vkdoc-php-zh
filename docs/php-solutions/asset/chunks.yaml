    prevented the settings from being accepted. If this happens, manually reset Nginx
    Port to 7888.


    Click OK and enter your Mac password when prompted. MAMP restarts both servers.
      Tip


    If any other program is using port 80, Apache won''t restart. If you can''t find
    what''s preventing Apache from using port 80, open the MAMP preferences panel
    and click “Set MAMP ports to default.”


    When both lights are green again, click “Open start page” in the MAMP Control
    Panel. This reloads the MAMP welcome page into your browser. This time, the URL
    shouldn’t have a colon followed by a number appearing after `localhost` because
    Apache is now listening on the default port.


    ## Where to Locate Your PHP Files (Windows & Mac)


    You need to create your files in a location where the web server can process them.
    Normally, this means that the files should be in the server’s document root or
    in a subfolder of the document root. The default location of the document root
    for the most common setups is as follows:


    *   XAMPP: `C:\xampp\htdocs`

    *   WampServer: `C:\wamp\www`

    *   EasyPHP: `C:\EasyPHP\www`

    *   IIS: `C:\inetpub\wwwroot`

    *   MAMP: `Macintosh HD:Applications:MAMP:htdocs`


    To view a PHP page, you need to load it in a browser using a URL. The URL for
    the web server’s document root in your local testing environment is `http://localhost/`.


    Caution


    If you needed to reset MAMP back to its default ports, you will need to use `http://localhost:8888`
    instead of `http://localhost`.


    If you store the files for this book in a subfolder of the document root called
    `phpsols`, the URL is `http://localhost/phpsols/` followed by the name of the
    folder (if any) and file.


    Tip


    Use [`http://127.0.0.1/`](http://127.0.0.1/) if you have problems with `http://localhost/`.
    `127.0.0.1` is the loopback IP address all computers use to refer to the local
    machine.


    ### Using Virtual Hosts


    The alternative to storing your PHP files in the web server’s document root is
    to use a virtual host. A virtual host creates a unique address for each site and
    is how hosting companies manage shared hosting. MAMP PRO simplifies setting up
    virtual hosts through its control panel. EasyPHP also has a plug-in module for
    administering virtual hosts.


    Manually setting up virtual hosts involves editing one of your computer’s system
    files to register the host name on your local machine. You also need to tell the
    web server in your local testing environment where the files are located. The
    process isn’t difficult, but it needs to be done each time you set up a new virtual
    host.


    The advantage of setting up each site in a virtual host is that it matches more
    accurately the structure of a live website. However, when learning PHP, it’s probably
    more convenient to use a subfolder of your testing server’s document root. Once
    you have gained experience with PHP, you can advance to using virtual hosts. Instructions
    for manually setting up virtual hosts in Apache are on my website at the following
    addresses:


    *   Windows: [`http://foundationphp.com/tutorials/apache_vhosts.php`](http://foundationphp.com/tutorials/apache_vhosts.php)

    *   MAMP: [`http://foundationphp.com/tutorials/vhosts_mamp.php`](http://foundationphp.com/tutorials/vhosts_mamp.php)


    Tip


    Remember to start the web server in your testing environment to view PHP pages.


    ## Checking Your PHP Settings


    After installing PHP, it’s a good idea to check its configuration settings. In
    addition to the core features, PHP has a large number of optional extensions.
    Both the all-in-one packages and the Microsoft Web PI install all the extensions
    that you need for this book. However, some of the basic configuration settings
    might be slightly different. To avoid unexpected problems, adjust your PHP configuration
    to match the settings recommended in the following pages.'
  trans: '

    ### 测试和配置 MAMP


    默认情况下，MAMP 为 Apache 和 MySQL 使用非标准端口。除非你在运行多个 Apache 和 MySQL 实例，否则应该修改端口设置。


    双击 `Applications/MAMP` 中的 MAMP 图标。你的默认浏览器应启动并显示 MAMP 欢迎页面。请注意，浏览器地址栏中的 URL 以 `localhost:8888`
    开头。`:8888` 表示 Apache 正在非标准端口 8888 上监听请求。


    最小化浏览器，找到 MAMP 控制面板（见图 2-1），它应正在你的桌面上运行。Apache Server 和 MySQL Server 右侧的绿色小灯表示两个服务器都在运行。


    点击“偏好设置”图标，然后在打开的窗口顶部选择“端口”。它显示 Apache 和 MySQL 分别在端口 8888 和 8889 上运行（见图 2-2）。


    ![A978-1-4842-0635-5_2_Fig1_HTML.jpg](img/A978-1-4842-0635-5_2_Fig1_HTML.jpg)


    图 2-1. MAMP 控制面板


    点击“将 Web 和 MySQL 端口设置为 80 和 3306”，如图 2-2 所示。端口号将更改为标准端口：Apache 为 80，MySQL 为 3306。


    ![A978-1-4842-0635-5_2_Fig2_HTML.jpg](img/A978-1-4842-0635-5_2_Fig2_HTML.jpg)


    图 2-2. 修改 Apache 和 MySQL 端口


    > **注意：** MAMP 现在支持将 Nginx 作为备选 Web 服务器。当我点击“将 Web 和 MySQL 端口设置为 80 和 3306”时，Apache
    Port 和 Nginx Port 都变成了 80，这会导致设置无法被接受。如果发生这种情况，请手动将 Nginx Port 重置为 7888。


    点击“确定”，并在系统提示时输入你的 Mac 密码。MAMP 会重新启动两个服务器。


    > **提示：** 如果任何其他程序正在使用端口 80，Apache 将无法重启。如果你找不到是什么阻止了 Apache 使用端口 80，请打开 MAMP
    偏好设置面板，然后点击“将 MAMP 端口设置为默认值”。


    当两个指示灯再次变为绿色时，点击 MAMP 控制面板中的“打开起始页”。这会重新在浏览器中加载 MAMP 欢迎页面。这次，URL 中 `localhost`
    后面不应再跟有冒号和数字，因为 Apache 正在默认端口上监听。


    ## 你的 PHP 文件应放在哪里（Windows 和 Mac）


    你需要将文件创建在 Web 服务器能够处理它们的位置。通常，这意味着文件应放在服务器的文档根目录或文档根目录的子文件夹中。最常见配置的文档根目录默认位置如下：


    *   XAMPP：`C:\xampp\htdocs`

    *   WampServer：`C:\wamp\www`

    *   EasyPHP：`C:\EasyPHP\www`

    *   IIS：`C:\inetpub\wwwroot`

    *   MAMP：`Macintosh HD:Applications:MAMP:htdocs`


    要查看 PHP 页面，你需要在浏览器中使用 URL 加载它。在本地测试环境中，Web 服务器文档根目录的 URL 是 `http://localhost/`。


    > **警告：** 如果你需要将 MAMP 重置为默认端口，则必须使用 `http://localhost:8888` 代替 `http://localhost`。


    如果你将本书的文件存储在文档根目录下名为 `phpsols` 的子文件夹中，那么 URL 将是 `http://localhost/phpsols/` 后跟文件夹名（如果有的话）和文件名。


    > **提示：** 如果你使用 `http://localhost/` 时遇到问题，请改用 `http://127.0.0.1/`。`127.0.0.1`
    是所有计算机用于引用本机的回环 IP 地址。


    ### 使用虚拟主机


    除了将你的 PHP 文件存储在 Web 服务器的文档根目录之外，另一种选择是使用虚拟主机。虚拟主机为每个站点创建一个唯一的地址，这也是托管公司管理共享主机的方式。MAMP
    PRO 通过其控制面板简化了虚拟主机的设置。EasyPHP 也有一个用于管理虚拟主机的插件模块。


    手动设置虚拟主机需要编辑计算机的一个系统文件，以在本地机器上注册主机名。你还需要告诉本地测试环境中的 Web 服务器文件的位置。这个过程并不困难，但每次设置新的虚拟主机时都需要执行一次。


    在虚拟主机中设置每个站点的好处在于，它能更准确地匹配真实网站的结构。然而，在学习 PHP 时，使用测试服务器文档根目录下的子文件夹可能更方便。一旦你获得了
    PHP 经验，就可以进阶使用虚拟主机。关于如何在 Apache 中手动设置虚拟主机的说明，请访问我网站上的以下地址：


    *   Windows：`http://foundationphp.com/tutorials/apache_vhosts.php`

    *   MAMP：`http://foundationphp.com/tutorials/vhosts_mamp.php`


    > **提示：** 请记得先启动测试环境中的 Web 服务器，然后再查看 PHP 页面。


    ## 检查你的 PHP 设置


    安装 PHP 后，最好检查一下它的配置设置。除了核心功能外，PHP 还有大量可选扩展。本书所用的一体化安装包和 Microsoft Web PI 都会安装所有需要的扩展。但有些基本配置设置可能略有不同。为避免意外问题，请调整你的
    PHP 配置，使其与下页建议的设置保持一致。

    '
- fmt: "### Displaying the Server Configuration with `phpinfo()`\n\nPHP has a built-in\
    \ command, `phpinfo()`, that displays details of how PHP is configured on the\
    \ server. The amount of detail produced by `phpinfo()` can feel like massive information\
    \ overload, but it’s invaluable for determining why something works perfectly\
    \ on your local computer yet not on your live website. The problem usually lies\
    \ in the remote server having disabled a feature or not having installed an optional\
    \ extension.\n\nThe all-in-one packages make it easy to run `phpinfo()`:\n\n*\
    \ XAMPP: Click the `phpinfo` link in the menu on the left of the XAMPP welcome\
    \ screen.\n* MAMP: Click `phpinfo` in the main menu at the top of the MAMP start\
    \ page.\n* WampServer: Open the WampServer menu and click Localhost. The link\
    \ for `phpinfo()` is under Tools.\n\nAlternatively, create a simple test file\
    \ and load it in your browser using the following instructions:\n\nMake sure that\
    \ Apache or IIS is running on your local computer. Type the following in a script\
    \ editor:\n\n```\n<?php phpinfo(); ?>\n```\n\nThere should be nothing else in\
    \ the file.\n\nSave the file as `phpinfo.php` in the server’s document root (see\
    \ “Where to Locate Your PHP Files (Windows and Mac)” earlier in this chapter).\n\
    \n**Caution**  \nMake sure your editor doesn’t add a `.txt` or `.rtf` extension\
    \ after `.php`.\n\nType `http://localhost/phpinfo.php` in your browser address\
    \ bar and press Enter. You should see a page similar to that in Figure [2-3](#A978-1-4842-0635-5_2_Chapter.html#Fig3)\
    \ displaying the version of PHP followed by extensive details of your PHP configuration.\
    \ Make a note of the value for the Loaded Configuration File item. This tells\
    \ you where to find `php.ini`, the text file that you need to edit in order to\
    \ change most settings in PHP. Scroll down to the section labeled Core and compare\
    \ the settings with those recommended in Table [2-1](#A978-1-4842-0635-5_2_Chapter.html#Tab1).\
    \ Make a note of any differences so you can change them as described later in\
    \ this chapter.\n\n![A978-1-4842-0635-5_2_Fig3_HTML.jpg](A978-1-4842-0635-5_2_Fig3_HTML.jpg)\n\
    \n**Figure 2-3.** Running the `phpinfo()` command displays full details of your\
    \ PHP configuration\n\nThe rest of the configuration page shows you which PHP\
    \ extensions are enabled. Although the page seems to go on forever, the extensions\
    \ are all listed in alphabetical order after Core. To work with this book, make\
    \ sure the following extensions are enabled:\n\n**Table 2-1.** Recommended PHP\
    \ configuration settings\n\n| Directive | Local value | Remarks |\n| --- | ---\
    \ | --- |\n| `display_errors` | On | Essential for debugging mistakes in your\
    \ scripts. If set to Off, errors result in a completely blank screen, leaving\
    \ you clueless as to the possible cause. |\n| `error_reporting` | 32767 | This\
    \ sets error reporting to the highest level. |\n| `file_uploads` | On | Allows\
    \ you to use PHP to upload files to a website. |\n| `log_errors` | Off | With\
    \ `display_errors` set on, you don’t need to fill your hard disk with an error\
    \ log. |\n\n* `gd`: Enables PHP to generate and modify images and fonts.\n* `mysqli`:\
    \ Connects to MySQL (note the “i,” which stands for “improved” and distinguishes\
    \ this extension from the older `mysql` one, which should no longer be used).\n\
    * `PDO`: Provides software-neutral support for databases (optional).\n* `pdo_mysql`:\
    \ Alternative method of connecting to MySQL (optional).\n* `session`: Sessions\
    \ maintain information associated with a user and are used, among other things,\
    \ for user authentication.\n\nYou should also run `phpinfo()` on your remote server\
    \ to check which features are enabled. If the listed extensions aren’t supported,\
    \ some of the code in this book won’t work when you upload your files to your\
    \ website. `PDO` and `pdo_mysql` aren’t always enabled on shared hosting, but\
    \ you can use `mysqli` instead. The advantage of `PDO` is that it’s software-neutral,\
    \ so you can adapt scripts to work with a database other than MySQL by changing\
    \ only one or two lines of code. Using `mysqli` ties you to MySQL.\n\nIf any of\
    \ the Core settings in your setup are different from the recommendations in Table\
    \ [2-1](#A978-1-4842-0635-5_2_Chapter.html#Tab1), you will need to edit the PHP\
    \ configuration file, `php.ini`, as described in the next section.\n\n### Editing\
    \ `php.ini`\n\nThe PHP configuration file, `php.ini`, is a very long file, which\
    \ tends to unnerve newcomers to programming, but there’s nothing to worry about.\
    \ It’s written in plain text, and one reason for its length is that it contains\
    \ copious comments explaining the various options. That said, it’s a good idea\
    \ to make a backup copy before editing `php.ini` in case you make a mistake.\n\
    \nHow you open `php.ini` depends on your operating system and how you installed\
    \ PHP:\n\n* If you used an all-in-one package, such as XAMPP, on Windows, double-click\
    \ `php.ini` in Windows Explorer. The file opens automatically in Notepad.\n* If\
    \ you installed PHP using the Microsoft Web PI, `php.ini` is normally located\
    \ in a subfolder of Program Files. Although you can open `php.ini` by double-clicking\
    \ it, you won’t be able to save any changes you make. Instead, right-click Notepad\
    \ and select Run as Administrator. (In Windows 7, you need to access Notepad from\
    \ the Start menu. It’s in the Accessories folder.) Inside Notepad, select File\
    \ ➤ Open and set the option to display All Files (*.*). Navigate to the folder\
    \ where `php.ini` is located, select the file, and click Open.\n* On Mac OS X,\
    \ `php.ini` is displayed in Finder as an executable file. Use a text editor, such\
    \ as BBEdit or TextWrangler (both available from [`www.barebones.com`](http://www.barebones.com/)\
    \ ), to open `php.ini`.\n\nLines that begin with a semicolon (`;`) are comments.\
    \ The lines you need to edit do not begin with a semicolon.\n\nUse your text editor’s\
    \ Find functionality to locate the directives you need in order to change your\
    \ settings to match the recommendations in Table [2-1](#A978-1-4842-0635-5_2_Chapter.html#Tab1).\
    \ Most directives are preceded by one or more examples of how they should be set.\
    \ Make sure you don’t edit one of the commented examples by mistake.\n\nFor directives\
    \ that use `On` or `Off`, just change the value to the recommended one. For example,\
    \ if you need to turn on the display of error messages, edit this line:\n\n```\n\
    display_errors = Off\n```\n\nby changing it to this:\n\n```\ndisplay_errors =\
    \ On\n```\n\nTo set the level of error reporting, you need to use PHP constants,\
    \ which are written in uppercase and are case-sensitive. The directive should\
    \ look like this:\n\n```\nerror_reporting = E_ALL\n```\n\nAfter editing `php.ini`,\
    \ save the file and then restart Apache or IIS so that the changes take effect.\
    \ If the web server won’t start, check the server’s error log file. It can be\
    \ found in the following locations:\n\n* XAMPP: In the XAMPP Control Panel, click\
    \ the Logs button alongside Apache and then select Apache (error.log).\n* MAMP:\
    \ In Applications:MAMP:logs, double-click `apache_error.log` to open it in Console.\n\
    * WampServer: In the WampServer menu, select Apache ➤ Apache error log.\n* EasyPHP:\
    \ Right-click the EasyPHP icon in the system tray and select Log Files ➤ Apache.\n\
    * IIS: The default location of log files is `C:\\inetpub\\logs`.\n\nThe most recent\
    \ entry in the error log should give you an indication of what prevented the server\
    \ from restarting. Use that information to correct the changes you made to `php.ini`.\
    \ If that doesn’t work, be thankful you made a backup of `php.ini` before editing\
    \ it. Start again with a fresh copy and check your edits carefully.\n\n## What’s\
    \ Next?\n\nNow that you’ve got a working test bed for PHP, you’re no doubt raring\
    \ to go. The last thing I want to do is dampen any enthusiasm, but before using\
    \ PHP in a live website, you should have a basic understanding of the rules of\
    \ the language. So, before jumping into the cool stuff, read the next chapter,\
    \ which explains how to write PHP scripts. Don’t skip it—it’s really important."
  raw: '### Displaying the Server Configuration with phpinfo()


    PHP has a built-in command, `phpinfo()`, that displays details of how PHP is configured
    on the server. The amount of detail produced by `phpinfo()` can feel like massive
    information overload, but it’s invaluable for determining why something works
    perfectly on your local computer yet not on your live website. The problem usually
    lies in the remote server having disabled a feature or not having installed an
    optional extension.


    The all-in-one packages make it easy to run `phpinfo()`:


    *   XAMPP: Click the phpinfo link in the menu on the left of the XAMPP welcome
    screen.

    *   MAMP: Click phpinfo in the main menu at the top of the MAMP start page.

    *   WampServer: Open the WampServer menu and click Localhost. The link for `phpinfo()`
    is under Tools.


    Alternatively, create a simple test file and load it in your browser using the
    following instructions:


    Make sure that Apache or IIS is running on your local computer.   Type the following
    in a script editor:


    `<?php phpinfo(); ?>`


    There should be nothing else in the file.


    Save the file as `phpinfo.php` in the server’s document root (see “Where to Locate
    Your PHP Files (Windows and Mac)” earlier in this chapter).   Caution


    Make sure your editor doesn’t add a `.txt` or `.rtf` extension after `.php`.


    Type `http://localhost/phpinfo.php` in your browser address bar and press Enter.
      You should see a page similar to that in Figure [2-3](#A978-1-4842-0635-5_2_Chapter.html#Fig3)
    displaying the version of PHP followed by extensive details of your PHP configuration.
     Make a note of the value for the Loaded Configuration File item. This tells you
    where to find `php.ini`, the text file that you need to edit in order to change
    most settings in PHP.   Scroll down to the section labeled Core and compare the
    settings with those recommended in Table [2-1](#A978-1-4842-0635-5_2_Chapter.html#Tab1).
    Make a note of any differences so you can change them as described later in this
    chapter.


    ![A978-1-4842-0635-5_2_Fig3_HTML.jpg](A978-1-4842-0635-5_2_Fig3_HTML.jpg)


    Figure 2-3.


    Running the `phpinfo()` command displays full details of your PHP configurationThe
    rest of the configuration page shows you which PHP extensions are enabled. Although
    the page seems to go on forever, the extensions are all listed in alphabetical
    order after Core. To work with this book, make sure the following extensions are
    enabled:


    Table 2-1.


    Recommended PHP configuration settings


    | Directive | Local value | Remarks |

    | --- | --- | --- |

    | `display_errors` | On | Essential for debugging mistakes in your scripts. If
    set to Off, errors result in a completely blank screen, leaving you clueless as
    to the possible cause. |

    | `error_reporting` | 32767 | This sets error reporting to the highest level.
    |

    | `file_uploads` | On | Allows you to use PHP to upload files to a website. |

    | `log_errors` | Off | With `display_errors` set on, you don’t need to fill your
    hard disk with an error log. |


    *   `gd`: Enables PHP to generate and modify images and fonts.

    *   `mysqli`: Connects to MySQL (note the “i,” which stands for “improved” and
    distinguishes this extension from the older `mysql` one, which should no longer
    be used).

    *   `PDO`: Provides software-neutral support for databases (optional).

    *   `pdo_mysql`: Alternative method of connecting to MySQL (optional).

    *   `session`: Sessions maintain information associated with a user and are used,
    among other things, for user authentication.


    You should also run `phpinfo()` on your remote server to check which features
    are enabled. If the listed extensions aren’t supported, some of the code in this
    book won’t work when you upload your files to your website. `PDO` and `pdo_mysql`
    aren’t always enabled on shared hosting, but you can use `mysqli` instead. The
    advantage of `PDO` is that it’s software-neutral, so you can adapt scripts to
    work with a database other than MySQL by changing only one or two lines of code.
    Using `mysqli` ties you to MySQL.


    If any of the Core settings in your setup are different from the recommendations
    in Table [2-1](#A978-1-4842-0635-5_2_Chapter.html#Tab1), you will need to edit
    the PHP configuration file, `php.ini`, as described in the next section.


    ### Editing php.ini


    The PHP configuration file, `php.ini`, is a very long file, which tends to unnerve
    newcomers to programming, but there’s nothing to worry about. It’s written in
    plain text, and one reason for its length is that it contains copious comments
    explaining the various options. That said, it’s a good idea to make a backup copy
    before editing `php.ini` in case you make a mistake.


    How you open `php.ini` depends on your operating system and how you installed
    PHP:


    *   If you used an all-in-one package, such as XAMPP, on Windows, double-click
    `php.ini` in Windows Explorer. The file opens automatically in Notepad.

    *   If you installed PHP using the Microsoft Web PI, `php.ini` is normally located
    in a subfolder of Program Files. Although you can open `php.ini` by double-clicking
    it, you won’t be able to save any changes you make. Instead, right-click Notepad
    and select Run as Administrator. (In Windows 7, you need to access Notepad from
    the Start menu. It’s in the Accessories folder.) Inside Notepad, select File ➤
    Open and set the option to display All Files (*.*) . Navigate to the folder where
    `php.ini` is located, select the file, and click Open.

    *   On Mac OS X, `php.ini` is displayed in Finder as an executable file. Use a
    text editor, such as BBEdit or TextWrangler (both available from [`www.barebones.com`](http://www.barebones.com/)
    ), to open `php.ini`.


    Lines that begin with a semicolon (`;`) are comments. The lines you need to edit
    do not begin with a semicolon.


    Use your text editor’s Find functionality to locate the directives you need in
    order to change your settings to match the recommendations in Table [2-1](#A978-1-4842-0635-5_2_Chapter.html#Tab1).
    Most directives are preceded by one or more examples of how they should be set.
    Make sure you don’t edit one of the commented examples by mistake.


    For directives that use `On` or `Off`, just change the value to the recommended
    one. For example, if you need to turn on the display of error messages, edit this
    line:


    `display_errors = Off`


    by changing it to this:


    `display_errors =` `On`


    To set the level of error reporting, you need to use PHP constants, which are
    written in uppercase and are case-sensitive. The directive should look like this:


    `error_reporting = E_ALL`


    After editing `php.ini`, save the file and then restart Apache or IIS so that
    the changes take effect. If the web server won’t start, check the server’s error
    log file. It can be found in the following locations:


    *   XAMPP: In the XAMPP Control Panel, click the Logs button alongside Apache
    and then select Apache (error.log).

    *   MAMP: In Applications:MAMP:logs, double-click apache_error.log to open it
    in Console.

    *   WampServer: In the WampServer menu, select Apache ➤ Apache error log.

    *   EasyPHP: Right-click the EasyPHP icon in the system tray and select Log Files
    ➤ Apache.

    *   IIS: The default location of log files is C:\inetpub\logs.


    The most recent entry in the error log should give you an indication of what prevented
    the server from restarting. Use that information to correct the changes you made
    to `php.ini`. If that doesn’t work, be thankful you made a backup of `php.ini`
    before editing it. Start again with a fresh copy and check your edits carefully.


    ## What’s Next?


    Now that you’ve got a working test bed for PHP, you’re no doubt raring to go.
    The last thing I want to do is dampen any enthusiasm, but before using PHP in
    a live website, you should have a basic understanding of the rules of the language.
    So, before jumping into the cool stuff, read the next chapter, which explains
    how to write PHP scripts. Don’t skip it—it’s really important.'
  trans: '

    ### 使用 `phpinfo()` 显示服务器配置


    PHP 有一个内置命令 `phpinfo()`，用于显示 PHP 在服务器上的配置详情。`phpinfo()` 产生的信息量可能会让人感觉信息过载，但对于确定为何某些功能在本地计算机上运行完美，而在实际网站上却无法运行，它却是无价之宝。问题通常在于远程服务器禁用了某个功能，或者没有安装可选扩展。


    集成软件包使得运行 `phpinfo()` 变得很简单：


    *   XAMPP：点击 XAMPP 欢迎屏幕左侧菜单中的 `phpinfo` 链接。

    *   MAMP：点击 MAMP 启动页面顶部主菜单中的 `phpinfo`。

    *   WampServer：打开 WampServer 菜单，点击 Localhost。`phpinfo()` 的链接位于“工具”下方。


    或者，按照以下说明创建一个简单的测试文件，并在浏览器中加载它：


    确保 Apache 或 IIS 在本地计算机上正在运行。在脚本编辑器中输入以下内容：


    ```

    <?php phpinfo(); ?>

    ```


    文件中不应有其他任何内容。


    将文件命名为 `phpinfo.php`，并保存在服务器的文档根目录下（请参阅本章前面的“在哪里放置你的 PHP 文件（Windows 和 Mac）”）。


    **注意**

    确保你的编辑器不会在 `.php` 后面添加 `.txt` 或 `.rtf` 扩展名。


    在浏览器地址栏中输入 `http://localhost/phpinfo.php` 并按下回车键。你应该会看到一个类似于图 2-3 的页面，显示 PHP 版本，然后是
    PHP 配置的详细信息。记下“已加载配置文件”项的值。这会告诉你 `php.ini` 的位置，`php.ini` 是你需要编辑以更改 PHP 多数设置的文本文件。滚动到标记为“Core”的部分，并将设置与表
    2-1 中的推荐设置进行比较。记下任何不同之处，以便你可以按照本章后文所述进行更改。


    ![A978-1-4842-0635-5_2_Fig3_HTML.jpg](img/A978-1-4842-0635-5_2_Fig3_HTML.jpg)


    **图 2-3.** 运行 `phpinfo()` 命令会显示 PHP 配置的完整详细信息


    配置页面的其余部分显示哪些 PHP 扩展已被启用。尽管页面看起来没完没了，但所有扩展在 Core 之后都按字母顺序列出。要配合本书阅读，请确保已启用以下扩展：


    **表 2-1.** 推荐的 PHP 配置设置


    | 指令 | 本地值 | 备注 |

    | --- | --- | --- |

    | `display_errors` | On | 对于调试脚本中的错误至关重要。如果设置为 Off，错误会导致完全空白的屏幕，让你对可能的原因毫无头绪。
    |

    | `error_reporting` | 32767 | 这将错误报告设置为最高级别。 |

    | `file_uploads` | On | 允许你使用 PHP 将文件上传到网站。 |

    | `log_errors` | Off | 当 `display_errors` 设置为 On 时，你不需要用错误日志填满硬盘。 |


    *   `gd`：使 PHP 能够生成和修改图像及字体。

    *   `mysqli`：连接到 MySQL（注意其中的“i”，代表“improved”，用于将此扩展与旧的 `mysql` 扩展区分开来，后者不应再使用）。

    *   `PDO`：为数据库提供软件中立的支持（可选）。

    *   `pdo_mysql`：连接到 MySQL 的替代方法（可选）。

    *   `session`：会话维护与用户关联的信息，并用于用户身份验证等功能。


    你还应该在你的远程服务器上运行 `phpinfo()`，以检查哪些功能已启用。如果列出的扩展不受支持，当你将文件上传到网站时，本书中的某些代码将无法运行。在共享主机上，`PDO`
    和 `pdo_mysql` 并不总是启用，但你可以改用 `mysqli`。`PDO` 的优势在于它是软件中立的，因此你可以仅通过更改一两行代码，就能让脚本适配
    MySQL 以外的数据库。而使用 `mysqli` 则会让你绑定在 MySQL 上。


    如果你的设置中的任何 Core 设置与表 2-1 中的推荐设置不同，你将需要按照下一节所述编辑 PHP 配置文件 `php.ini`。


    ### 编辑 `php.ini`


    PHP 配置文件 `php.ini` 是一个非常长的文件，这常常会让编程新手感到紧张，但其实没什么可担心的。它是以纯文本编写的，文件长的其中一个原因是因为它包含了大量解释各种选项的注释。话虽如此，在编辑
    `php.ini` 之前最好做一个备份，以防出错。


    如何打开 `php.ini` 取决于你的操作系统以及你安装 PHP 的方式：


    *   如果你在 Windows 上使用了集成软件包（如 XAMPP），请在 Windows 资源管理器中双击 `php.ini`。该文件将自动在记事本中打开。

    *   如果你使用 Microsoft Web PI 安装了 PHP，`php.ini` 通常位于 Program Files 的一个子文件夹中。虽然你可以通过双击打开
    `php.ini`，但将无法保存所做的任何更改。相反，请右键单击记事本，然后选择“以管理员身份运行”。（在 Windows 7 中，你需要从“开始”菜单访问记事本，它位于“附件”文件夹中。）在记事本中，选择“文件”➤“打开”，并将选项设置为显示所有文件
    (*.*)。导航到 `php.ini` 所在的文件夹，选择该文件，然后单击“打开”。

    *   在 Mac OS X 上，`php.ini` 在 Finder 中显示为一个可执行文件。使用文本编辑器（如 BBEdit 或 TextWrangler，两者均可从
    [`www.barebones.com`](http://www.barebones.com/) 获得）打开 `php.ini`。


    以分号（`;`）开头的行是注释。你需要编辑的行不以分号开头。


    使用文本编辑器的“查找”功能来定位你需要更改的设置，使其与表 2-1 中的推荐设置匹配。大多数指令前面都有一个或多个如何设置它们的示例。确保不要错误地编辑了某个注释掉的示例。


    对于使用 `On` 或 `Off` 值的指令，只需将值更改为推荐值即可。例如，如果需要打开错误消息的显示，请编辑以下行：


    ```

    display_errors = Off

    ```


    将其更改为：


    ```

    display_errors = On

    ```


    要设置错误报告级别，你需要使用 PHP 常量，这些常量以大写字母书写，并且区分大小写。该指令应如下所示：


    ```

    error_reporting = E_ALL

    ```


    编辑完 `php.ini` 后，保存文件，然后重新启动 Apache 或 IIS，以使更改生效。如果 Web 服务器无法启动，请检查服务器的错误日志文件。它可以在以下位置找到：


    *   XAM 如果：在 XAMPP 控制面板中，点击 Apache 旁边的“日志”按钮，然后选择 Apache (error.log)。

    *   MAMP：在 Applications:MAMP:logs 中，双击 `apache_error.log` 以在控制台中打开。

    *   WampServer：在 WampServer 菜单中，选择 Apache ➤ Apache 错误日志。

    *   EasyPHP：右键单击系统托盘中的 EasyPHP 图标，然后选择“日志文件” ➤ Apache。

    *   IIS：日志文件的默认位置是 `C:\inetpub\logs`。


    错误日志中最新的条目应该能指示出导致服务器无法重启的原因。利用该信息纠正你对 `php.ini` 所做的更改。如果这不起作用，你应该庆幸自己在编辑 `php.ini`
    之前做了备份。重新使用一份干净的副本开始，并仔细检查你的编辑。


    ## 下一步是什么？


    既然你已经为 PHP 建立了一个可用的测试环境，你无疑已经跃跃欲试了。我最不想做的就是打击任何积极性，但是在将 PHP 用于实际网站之前，你应该对该语言的规则有一个基本的了解。所以，在跳入那些酷炫内容之前，请先阅读下一章，其中解释了如何编写
    PHP 脚本。不要跳过它——这真的非常重要。

    '
- fmt: '# 3\. How to Write PHP Scripts


    If you run screaming at the sight of code, this is the chapter you’ll enjoy the
    least, but it’s an important one that I’ve tried to make as user friendly as possible.
    The chapter is in two parts: the first section offers a quick overview of how
    PHP works and gives you the basic rules; the second section goes into more detail.


    You can read just the first section and come back to the more detailed parts later,
    or you can read the chapter straight through. However, don’t attempt to memorize
    everything at one sitting. The best way to learn is by doing. Coming back to the
    second part of the chapter for a little information at a time is likely to be
    more effective.


    If you’re already familiar with PHP, you may want to skim through the main headings
    to see what this chapter contains and brush up your knowledge on any aspects that
    you’re a bit hazy about.


    This chapter covers:


    *   Understanding how PHP is structured

    *   Embedding PHP in a webpage

    *   Storing data in variables and arrays

    *   Getting PHP to make decisions

    *   Looping through repetitive tasks

    *   Using functions for preset tasks

    *   Understanding PHP objects and classes

    *   Displaying PHP output

    *   Understanding PHP error messages


    ## PHP: The Big Picture


    At first glance, PHP code can look quite intimidating, but once you understand
    the basics, you’ll discover that the structure is remarkably simple. If you have
    worked with any other computer language, such as JavaScript or jQuery, you’ll
    find they have a lot in common.


    Every PHP page must have the following:


    *   The correct filename extension, usually `.php`

    *   Opening and closing PHP tags surrounding each block of PHP code (although
    the closing PHP tag can be omitted if the file contains only PHP code)


    A typical PHP page will use some or all of the following elements:


    *   Variables to act as placeholders for unknown or changing values

    *   Arrays to hold multiple values

    *   Conditional statements to make decisions

    *   Loops to perform repetitive tasks

    *   Functions or objects to perform preset tasks


    Let’s take a quick look at each of these in turn, starting with the filename and
    the opening and closing tags.


    ### Telling the Server to Process PHP


    PHP is a server-side language. This means that the web server processes your PHP
    code and sends only the results—usually as HTML—to the browser. Because all the
    action is on the server, you need to tell it that your pages contain PHP code.
    This involves two simple steps, namely:


    *   Give every page a PHP filename extension; the default is `.php`. Do not use
    anything other than `.php` unless you are specifically told to do so by your hosting
    company.

    *   Enclose all PHP code within PHP tags.


    The opening tag is `<?php` and the closing tag is `?>`. If you put the tags on
    the same line as surrounding code, there doesn’t need to be a space before the
    opening tag or after the closing one, but there must be a space after the `php`
    in the opening tag like this:


    `<p>This is HTML with embedded PHP<?php //some PHP code ?>.</p>`


    When inserting more than one line of PHP, it’s a good idea to put the opening
    and closing tags on separate lines for the sake of clarity.


    ```php

    <?php

    // some PHP code

    // more PHP code

    ?>

    ```


    You may come across `<?` as an alternative short version of the opening tag. However,
    `<?` doesn’t work on all servers. Stick with `<?php`, which is guaranteed to work.


    Note


    To save space, most examples in this book omit the PHP tags. You must always use
    them when writing your own scripts or embedding PHP into a webpage.


    ### Embedding PHP in a Webpage


    PHP is an embedded language. This means that you can insert blocks of PHP code
    inside ordinary webpages. When somebody visits your site and requests a PHP page,
    the server sends it to the PHP engine, which reads the page from top to bottom
    looking for PHP tags. HTML passes through untouched, but whenever the PHP engine
    encounters a `<?php` tag, it starts processing your code and continues until it
    reaches the closing `?>` tag. If the PHP code produces any output, it’s inserted
    at that point.


    Tip


    A page can have multiple PHP code blocks, but they cannot be nested inside each
    other.


    Figure [3-1](#A978-1-4842-0635-5_3_Chapter.html#Fig1) shows a block of PHP code
    embedded in an ordinary webpage and what it looks like in a browser and in a page-source
    view after it has been passed through the PHP engine. The code calculates the
    current year, checks whether it’s different from a fixed year (represented by
    `$startYear` in line 26 of the code on the left of the figure), and displays the
    appropriate year range in a copyright statement. As you can see from the page-source
    view at the bottom right of the figure, there’s no trace of PHP in what’s sent
    to the browser.


    ![A978-1-4842-0635-5_3_Fig1_HTML.jpg](A978-1-4842-0635-5_3_Fig1_HTML.jpg)


    Figure 3-1.


    The PHP code remains on the server; only the output is sent to the browser Tip


    PHP doesn’t always produce direct output for the browser. It may, for instance,
    check the contents of form input before sending an email message or inserting
    information into a database. Therefore, some code blocks are placed above or below
    the main HTML code, or in external files. Code that produces direct output, however,
    always goes where you want the output to be displayed.


    ### Storing PHP in an External File


    As well as embedding PHP in HTML, it’s common practice to store frequently used
    code in separate files. When a file contains only PHP code, the opening `<?php`
    tag is mandatory, but the closing `?>` tag is optional. In fact, the recommended
    practice is to leave out the closing PHP tag. However, you must use the closing
    `?>` tag if the external file contains HTML after the PHP code.'
  raw: '# 3. How to Write PHP Scripts


    If you run screaming at the sight of code, this is the chapter you’ll enjoy the
    least, but it’s an important one that I’ve tried to make as user friendly as possible.
    The chapter is in two parts: the first section offers a quick overview of how
    PHP works and gives you the basic rules; the second section goes into more detail.


    You can read just the first section and come back to the more detailed parts later,
    or you can read the chapter straight through. However, don’t attempt to memorize
    everything at one sitting. The best way to learn is by doing. Coming back to the
    second part of the chapter for a little information at a time is likely to be
    more effective.


    If you’re already familiar with PHP, you may want to skim through the main headings
    to see what this chapter contains and brush up your knowledge on any aspects that
    you’re a bit hazy about.


    This chapter covers:


    *   Understanding how PHP is structured

    *   Embedding PHP in a webpage

    *   Storing data in variables and arrays

    *   Getting PHP to make decisions

    *   Looping through repetitive tasks

    *   Using functions for preset tasks

    *   Understanding PHP objects and classes

    *   Displaying PHP output

    *   Understanding PHP error messages


    ## PHP: The Big Picture


    At first glance, PHP code can look quite intimidating, but once you understand
    the basics, you’ll discover that the structure is remarkably simple. If you have
    worked with any other computer language, such as JavaScript or jQuery, you’ll
    find they have a lot in common.


    Every PHP page must have the following:


    *   The correct filename extension, usually `.php`

    *   Opening and closing PHP tags surrounding each block of PHP code (although
    the closing PHP tag can be omitted if the file contains only PHP code)


    A typical PHP page will use some or all of the following elements:


    *   Variables to act as placeholders for unknown or changing values

    *   Arrays to hold multiple values

    *   Conditional statements to make decisions

    *   Loops to perform repetitive tasks

    *   Functions or objects to perform preset tasks


    Let’s take a quick look at each of these in turn, starting with the filename and
    the opening and closing tags.


    ### Telling the Server to Process PHP


    PHP is a server-side language. This means that the web server processes your PHP
    code and sends only the results—usually as HTML—to the browser. Because all the
    action is on the server, you need to tell it that your pages contain PHP code.
    This involves two simple steps, namely:


    *   Give every page a PHP filename extension; the default is `.php`. Do not use
    anything other than `.php` unless you are specifically told to do so by your hosting
    company.

    *   Enclose all PHP code within PHP tags.


    The opening tag is `<?php` and the closing tag is `?>`. If you put the tags on
    the same line as surrounding code, there doesn’t need to be a space before the
    opening tag or after the closing one, but there must be a space after the `php`
    in the opening tag like this:


    `<p>This is HTML with embedded PHP<?php //some PHP code ?>.</p>`


    When inserting more than one line of PHP, it’s a good idea to put the opening
    and closing tags on separate lines for the sake of clarity.


    `<?php`


    `// some PHP code`


    `// more PHP code`


    `?>`


    You may come across `<?` as an alternative short version of the opening tag. However,
    `<?` doesn’t work on all servers. Stick with `<?php`, which is guaranteed to work.


    Note


    To save space, most examples in this book omit the PHP tags. You must always use
    them when writing your own scripts or embedding PHP into a webpage.


    ### Embedding PHP in a Webpage


    PHP is an embedded language. This means that you can insert blocks of PHP code
    inside ordinary webpages. When somebody visits your site and requests a PHP page,
    the server sends it to the PHP engine, which reads the page from top to bottom
    looking for PHP tags. HTML passes through untouched, but whenever the PHP engine
    encounters a `<?php` tag, it starts processing your code and continues until it
    reaches the closing `?>` tag. If the PHP code produces any output, it’s inserted
    at that point.


    Tip


    A page can have multiple PHP code blocks, but they cannot be nested inside each
    other.


    Figure [3-1](#A978-1-4842-0635-5_3_Chapter.html#Fig1) shows a block of PHP code
    embedded in an ordinary webpage and what it looks like in a browser and in a page-source
    view after it has been passed through the PHP engine. The code calculates the
    current year, checks whether it’s different from a fixed year (represented by
    `$startYear` in line 26 of the code on the left of the figure), and displays the
    appropriate year range in a copyright statement. As you can see from the page-source
    view at the bottom right of the figure, there’s no trace of PHP in what’s sent
    to the browser.


    ![A978-1-4842-0635-5_3_Fig1_HTML.jpg](A978-1-4842-0635-5_3_Fig1_HTML.jpg)


    Figure 3-1.


    The PHP code remains on the server; only the output is sent to the browser Tip


    PHP doesn’t always produce direct output for the browser. It may, for instance,
    check the contents of form input before sending an email message or inserting
    information into a database. Therefore, some code blocks are placed above or below
    the main HTML code, or in external files. Code that produces direct output, however,
    always goes where you want the output to be displayed.


    ### Storing PHP in an External File


    As well as embedding PHP in HTML, it’s common practice to store frequently used
    code in separate files. When a file contains only PHP code, the opening `<?php`
    tag is mandatory, but the closing `?>` tag is optional. In fact, the recommended
    practice is to leave out the closing PHP tag. However, you must use the closing
    `?>` tag if the external file contains HTML after the PHP code.'
