    C H A P T E R 3 ■ U S E R A U T H E N T I C AT I O N, A U T H O R I Z AT I O N,
    A N D M A N A G E M E N T


    • preDelete(): Called prior to an existing record being deleted. If other tables
    depend on this data, you would delete the data from those tables here, before
    the data is deleted from this table.


    • postDelete(): Called after a record has been deleted. It could be used to delete
    a file on the filesystem that relates to this record.


    All callbacks (except for postLoad()) must return either true or false. If false
    is returned, the entire transaction is rolled back. For example, if you return
    false from postDelete(), the record is not deleted, and any queries you perform
    in preDelete() are also rolled back. It is important to remember to define the
    return value if you implement any of these functions.


    ■**Note** Because of the way DatabaseObject works, all tables that use it must
    follow a similar structure.


    That is, the table must have a single primary key field, with an auto-incrementing
    sequence. The users table we created earlier in this chapter follows this structure
    by defining the user_id field as a serial.


    This wasn’t the case for users_profile, and we will be managing data in this table
    slightly differently.


    **The DatabaseObject_User Class**


    Now that we’ve looked at how DatabaseObject works, we will create a child class
    to manage records in the users table. Once we have created this class, we will
    look at how to actually use it.


    To create this class, all we really need to do is define the name of the database
    table and the name of its primary key field, and then define the list of columns
    in the table. If required, you can also set the types of the columns, which makes
    DatabaseObject treat the data accordingly. At this stage, all we will be using
    is the DatabaseObject::TYPE_TIMESTAMP type.


    Listing 3-6 shows the contents of User.php, which should be stored in the DatabaseObject
    directory (so the full path is /var/www/phpweb20/include/DatabaseObject). Note
    that naming it in this manner means the Zend Framework autoloader will automatically
    include this code when required.


