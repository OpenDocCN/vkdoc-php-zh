    \ iPhone 4s 智能手机、Micromax Knight 2E471 智能手机和 Microsoft Lumia 笔记本电脑的图片。几秒钟后，当这些产品图片淡出时，Xperia\
    \ T3 白色智能手机、Dell Vostro1 和 HP Probook 6570 笔记本电脑的图片会出现。\n\n清单 3-15 中所示的代码实现了主页上显示的交叉淡入淡出效果。\n\
    \n**清单 3-15.** 实现交叉淡入淡出效果的代码\n\n```css\n#crossfade {\n    position:relative;\n\
    \    height:350px;\n    width:350px;\n    margin-right:250px;\n}\n#crossfade img\
    \ {\n    position:absolute;\n    left:0;\n    -webkit-transition: opacity 1s ease-in-out;\n\
    \    -moz-transition: opacity 1s ease-in-out;\n    -o-transition: opacity 1s ease-in-out;\n\
    \    transition: opacity 1s ease-in-out;\n}\n@keyframes crossfadeFadeInOut {\n\
    \    0% {\n        opacity:1;\n    }\n    45% {\n        opacity:1;\n    }\n \
    \   55% {\n        opacity:0;\n    }\n    100% {\n        opacity:0;\n    }\n\
    }\n#crossfade img.top {\n    animation-name: crossfadeFadeInOut;\n    animation-timing-function:\
    \ ease-in-out;\n    animation-iteration-count: infinite;\n    animation-duration:\
    \ 5s;\n    animation-direction: alternate;\n}\n```\n\n这段代码会在五秒钟后淡出当前图片，并使接下来的三张图片可见。此过程会持续循环。当您运行该网站时，您会得到如图\
    \ 3-13 所示的主页。\n\n![A978-1-4842-1672-9_3_Fig13_HTML.jpg](img/A978-1-4842-1672-9_3_Fig13_HTML.jpg)\n\
    \n**图 3-13.** 网站的主页，显示了网站页眉、下拉菜单和三张图片\n\n几秒钟后，当前产品图片会淡出，其他产品图片变得可见，如图 3-14 所示。\n\
