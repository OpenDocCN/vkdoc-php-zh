    ```\n\n### Continue\n\n`continue` 关键字可用于任何循环语句中，以跳过当前循环的剩余部分，并继续执行下一次迭代的开头。\n"
- fmt: "```\nwhile ($i++ < 10) { continue; } // start next iteration\n```\n\nThis\
    \ keyword can accept an argument for how many enclosing loops it should skip to\
    \ the end of.\n\n```\n$i = 0;\nwhile ($i++ < 10)\n{\n  for (;;) { continue 2;\
    \ } // start next while iteration\n}\n```\n\nIn contrast to many other languages,\
    \ the `continue` statement also applies to switches, where it behaves the same\
    \ as `break`. Therefore, to skip an iteration from inside a switch `continue 2`\
    \ needs to be used.\n\n```\n$i = 0;\nwhile ($i++ < 10)\n{\n  switch ($i)\n  {\n\
    \    case 1: continue 2; // start next while iteration\n  }\n}\n```\n\nGoto\n\n\
    A third jump statement introduced in PHP 5.3 is `goto`, which performs a jump\
    \ to a specified label. A label is a name followed by a colon (`:`).\n\n```\n\
    goto myLabel; // jump to label\nmyLabel:      // label declaration\n```\n\nThe\
    \ target label must be within the same script file and scope. Therefore, `goto`\
    \ cannot be used to jump into looping structures, only out of them.\n\n```\nloop:\n\
    while (!$finished)\n{\n  // ...\n  if ($try_again) goto loop; // restart loop\n\
    }\n```\n\nIn general, the `goto` statement is often best avoided since it tends\
    \ to make the flow of execution difficult to follow.\n\n# CHAPTER 8\n\n![image](images/frontdot.jpg)\n\
    \n# Functions\n\nA function is a reusable code block that will only execute when\
    \ called.\n\n## Defining functions\n\nTo create a function the `function` keyword\
    \ is used followed by a name, a set of parentheses and a code block. The naming\
    \ convention for functions is the same as for variables – to use a descriptive\
    \ name with each word initially capitalized, except for the first one.\n\n```\n\
    function myFunc()\n{\n  echo \"Hello World\";\n}\n```\n\nA function code block\
    \ can contain any valid PHP code, including other function definitions.\n\n##\
    \ Calling functions\n\nOnce defined a function can be called (invoked) from anywhere\
    \ on the page, by typing its name followed by a set of parenthesis. Function names\
    \ are case-insensitive, but it is good practice to use the same casing as they\
    \ have in their definition.\n\n```\nmyFunc(); // \"Hello World\"\n```\n\nA function\
    \ can be called even if the function definition appears further down in the script\
    \ file.\n\n```\nfoo(); // ok\nfunction foo() {}\n```\n\nAn exception to this is\
    \ where the function is only defined when a certain condition is met. That conditional\
    \ code must then be executed prior to calling the function.\n\n```\nbar(); //\
    \ error\nif (true) { function bar() {} }\nbar(); // ok\n```\n\n## Function parameters\n\
    \nThe parentheses that follow the function name are used to pass arguments to\
    \ the function. To do this the corresponding parameters must first be specified\
    \ in the function definition in the form of a comma separated list of variables.\
    \ The parameters can then be used in the function.\n\n```\nfunction myFunc($x,$y)\n\
