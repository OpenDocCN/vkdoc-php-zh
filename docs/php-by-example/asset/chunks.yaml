- fmt: '## The `while` Loop Statement


    The loop statements make it possible to execute instructions or commands repeatedly.
    There are several loop statements in PHP. Their action is the same (in the sense
    that they allow solving the same tasks and are equivalent in their functionality).


    The `while` loop statement has perhaps the simplest syntax of all loop statements.
    It begins with the `while` keyword, after which some condition is placed in parentheses,
    and then a block of commands in curly braces follows. In general, it looks as
    follows.


    ```

    while(condition){

    # commands

    }

    ```


    Let’s discuss how the `while` loop statement is executed. First, the condition
    is checked. If it is true, then the commands in the body of the loop statement
    are executed. Then, the condition is rechecked. If the condition is true, the
    commands are executed, and the condition is checked again? and so on. That continues
    until the next test of the condition is false. If so, then the loop statement
    terminates.


    > **Note:** If the body of the loop statement contains a single command, then
    curly braces can be omitted. But that is not a good practice.


    There is another form of the `while` loop statement, in which curly braces are
    not used, a colon is placed after the condition, and the operator ends with the
    `endwhile` instruction (and a semicolon).


    ```

    while(condition):

    # commands

    endwhile;

    ```


    Listing 3-4 uses the `while` loop statement to calculate the sum of numbers.


    ```

    Listing 3-4

    The Sum of Numbers

    ```


    The result of the program execution is as follows.


    ```

    The output of the program (from Listing 3-4)

    1+2+...+100=5050

    ```


    The program uses three variables: the upper limit of the sum (the count of terms)
    is saved to the `$n` variable, the value of the sum is saved to the `$s` variable
    (the initial value of the variable is `0`), and the value for the next term is
    saved to the `$k` variable (the initial value is `1`).


    The loop statement checks the `$k<=$n` condition, which is true if the value of
    the `$k` variable does not exceed the value of the `$n` variable. In the body
    of the loop statement, the `$s+=$k` command adds a term to the sum. The `$k++`
    command increments the value of `$k` by one. On the next iteration, that is the
    new term for the sum.


    After the loop statement is terminated, the `$s` variable contains the sum of
    numbers from `1` to the value stored in the `$n` variable. This result is displayed
    in the console.


    > **Note:** The sum of numbers from 1 to *n* can be calculated using the formula
    `n(n+1)/2`. You do not use this formula but calculate the sum directly by adding
    the terms.


    Another example that calculates the divisors of a certain number is shown in Listing
    3-5. In this case, you use an alternate form of the `while` statement.


    ```

    Listing 3-5

    The Divisors of a Number

    ```


    The following is the result of the program execution.


    ```

    The output of the program (from Listing 3-5)

    The number 315 can be divided by:

    1 3 5 7 9 15 21 35 45 63 105 315

    ```


    The number for which the program calculates divisors is stored in the `$number`
    variable (use the value `315`). It also uses the `$A` variable, whose initial
    value is `1`. You need that variable to store the value of the next divisor for
    the number saved to the `$number` variable. Finding divisors is simple: iterate
    over the numbers in a particular range and check if it is a divisor. To do that,
    you use the loop statement.


    The loop statement checks the `2*$A<$number` condition. Here, a divisor of a number
    (except for the number itself) cannot be more than half of the number. In the
    body of the loop statement, the `$A++` command increments the `$A` variable, and
    in the conditional statement (in the simplified form without the `else` block),
    the `$number%$A==0` condition is checked (the remainder of dividing `$number`
    by `$A` is zero). The `print(" ".$A)` command is executed if the condition is
    true. That is, the corresponding number is identified as a divisor. If the condition
    is false, then nothing happens.


    > **Note:** The value of the `" ".$A` expression is the text resulting from the
    concatenation of the space `" "` and the value of the `$A` variable. The latter
    is automatically converted to the text format.


    The last `print(" ".$number)` instruction adds the number to the list of its divisors.
    That is done without checks since any number can be divided by itself.'
