    *   MySQL Workbench 6.3.4

    *   PHPStorm 10

    *   xdebug 2.4.0


    ## Who This Book Is For


    This book is for novice and intermediate programmers. It assumes that you have
    a general understanding of PHP and object-oriented programming (OOP).


    It’s good if you are familiar with CakePHP, especially in later chapters. But
    even if you’re not, you will probably still be able to understand most of the
    principles and codes.


    Acknowledgments


    I would like to thank you for spending your time reading this book.


    I also should say thank you to the core CakePHP team and everybody else who’s
    contributed anything, small or big, to this wonderful framework.


    Finally, special thanks go to Italy for pizza and to Hungary for Túró Rudi—both
    are essential for web development.'
  trans: '

    # 我为何撰写本书


    我在 CakePHP 1.1 版本时开始使用它。这个框架非常出色，而且不断完善，拥有开放且乐于助人的团队和社区。它帮助我成为了一名更优秀的程序员。


    刚开始写代码时，我所有事情都从零开始。我对编程模式、实用工具或库一无所知。即便如此，我还是用这种方式构建了中等规模的系统。


    过了一段时间，我认定将应用逻辑和表现逻辑混合在一起弊大于利，于是开始使用 [Smarty](http://smarty.net/) 模板引擎。Smarty
    帮了大忙。随着时间的推移，它让我认识到，我自认为的最佳实践其实是最糟糕的实践。我知道我需要更强大的东西。


    我意识到，在大多数 Web 应用中，我需要一些共通的特性。我开始思考自己的编码方式，一段时间后，竟然在完全不知道框架存在的情况下，自己捣鼓出了一个极其简单且乏味的“框架”。


    就在那时，我听说了 MVC（模型-视图-控制器）模式。起初，这似乎给代码带来了不必要的复杂性，但我还是想尝试一下。在试图理解 MVC 时，我找到了一些关于框架的资料。我试用了
    [CodeIgniter](http://ellislab.com/codeigniter)，然后又试用了 [CakePHP](http://cakephp.org/)。


    第一次接触 CakePHP 感觉糟透了，尤其因为我过去（现在也）是 `bake` 自动代码生成功能的忠实粉丝。我深信整个框架能节省大量时间，并生成更清晰、更易于维护的代码。


    但后来，我打算用 CakePHP 编写一个在线会计系统。这涉及金钱，所以代码必须始终按预期工作。我花了大量时间测试——点击链接、填写表单、一遍又一遍输入测试数据——试图理解代码失败的原因。但这没问题。这就是让事情运转起来的方法。


    CakePHP 1.3 版本发布了，接着是 Cake 2。我想升级，但升级似乎非常麻烦。我很抗拒。我不知道升级要花多少时间，也不清楚代码中会隐藏多少 bug。当第三方代码的基础框架发生变化时，依赖错误信息来排查简直是场噩梦。


    我曾听说过单元测试，但实际并不在意。用代码来测试我的代码？听起来很傻。但我还是试着去理解，并找到了许多支持单元测试的文章。你可以在第 2 章的“论据”部分自行阅读。最后，我尝试了单元测试，它们确实管用。而且帮了大忙。


    我想很多读者都有过类似的经历。让我们试着缩短学习曲线。


    我希望这本书能帮到你，也希望我的建议能为你节省一些时间。


    # 我的开发环境


    我尽量使用与环境无关的代码示例，但众所周知，这不可能。鉴于此，我列出了我使用的系统和软件：


    -   Ubuntu 16.04

    -   PHP 7.0.4

    -   CakePHP 3.2.8

    -   PHPUnit 5.3.2

    -   MySQL 5.0.12

    -   MySQL Workbench 6.3.4

    -   PHPStorm 10

    -   xdebug 2.4.0


    # 本书读者对象


    本书面向新手和中级程序员。假定你已经对 PHP 和面向对象编程（OOP）有了基本了解。


    如果你熟悉 CakePHP，特别是阅读后续章节时，会很有帮助。但即使不熟悉，你可能也仍然能够理解大部分原则和代码。


    # 致谢


    感谢你花时间阅读本书。


    我还想感谢 CakePHP 的核心团队以及每一位为这个优秀框架做出或大或小贡献的人。


    最后，特别感谢意大利的披萨和匈牙利的 Túró Rudi——它们对 Web 开发来说都至关重要。

    '
