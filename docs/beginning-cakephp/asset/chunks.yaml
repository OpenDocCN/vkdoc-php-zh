  raw: 'Fortunately for Cake developers, Zend is less of an MVC framework than a set
    of libraries (or as they are often referred by Zend developers, *components*).
    Each of its components can be brought into a stand-alone PHP application through
    includes. As already noted, using these components as vendors allows you to integrate
    Zend with your Cake application. Each component will have its own specific installation
    procedures for which you will need to consult Zend’s support web site and documentation.
    But the general steps when installing a Zend component in Cake are explained in
    the following sections. First, let’s see whether you can use anything that Zend
    has to offer in your blog application.


    Blocking Spam in the Comments Add Action


    One of the competitive features of Zend is its web service library. As of version
    1.5, Zend comes with these web services components:


    • Akismet


    • Amazon


    • Audioscrobbler (Last.fm)


    • Del.icio.us


    • Flickr


    • Nirvanix


    • Simpy


    • SlideShare


    09775ch12final 7/1/08 9:52 PM Page 213


    C H A P T E R 1 2 ■ V E N D O R S


    **213**


    • StrikeIron


    • Technorati


    • Yahoo!


    You could take your blog in any number of directions, from doing automatic title
    checking in Amazon to fetching images from Flickr. However, the most immediate
    and probably the most important basic feature of the blog is spam checking. Since
    the blog provides an arena where users can enter their own comments, you have
    opened up the possibility of your blog being spammed, especially if the blog becomes
    well known. Thanks to Zend, the Akismet web service component is already available,
    and all the hard work has already been done for you.


    The trick is just getting it to work in your Cake application.


    After doing some homework on what Zend is offering with its Akismet component,
    you will find that you will need an API key (common for using any type of web
    service), which is provided by Akismet ([www.akismet.com](http://www.akismet.com)).
    Be sure to obtain this API key; otherwise, the Akismet component will not run
    properly. (More information on the Akismet component is available at


    [http://framework.zend.com/manual/en/zend.service.akismet.html](http://framework.zend.com/manual/en/zend.service.akismet.html).)
    Download the Zend Framework library, and extract its contents. You should find
    a folder named Zend that contains all the components for the framework. If you
    already are running Zend on your server, then take note of the path relative to
    the app/vendors folder. Otherwise, place the Zend folder in the app/vendors directory.
    As with the Textile installation, write the App::import() function in the Comments
    Add action to include the Zend Akismet component (Listing 12-5).


    **Listing 12-5.** *Importing the Akismet Component in the* app/controllers/


    comments_controller.php *File*


    function add() {


    App::import(''Vendor'',''akismet'',array(''file''=>''Zend/Service/Akismet.php''));
    At this point, you will need to deviate from the typical Cake protocol because
    you are now dealing with Zend. In line 6 of Listing 12-5, you brought in the Akismet
    component by referencing the Zend/Service/Akismet.php file. But there is one problem
    with this script when it is called in the Comments controller: it runs its own
    includes relative to the Zend directory. This will need to change to keep it from
    conflicting with Cake’s paths. Open the Zend/Service/


    Akismet.php file, and insert a new include_path definition before any include
    functions to fix this:


    ini_set(''include_path'', dirname(dirname(dirname(__FILE__))));


    Now you can begin using the Akismet component in the controller. Next, instantiate
    a new object by calling the Zend_Service_Akismet class in the Comments Add action:
    7


    [$akismet = new Zend_Service_Akismet(''************'',''http://localhost/blog'');](http://localhost/blog)


    Notice that to begin a new Akismet object, you must supply the API key in the
    first parameter and the URI to the blog in the second. The key, which you should
    have obtained from Akismet, is usually a 12-digit alphanumeric string.'
