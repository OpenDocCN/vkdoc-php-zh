    Next, we connect to the database table. Then execute an SQL command to retrieve
    just the first line of the table requested within the database. This will also
    retrieve other information about the table, including the column names.


    ```php

    $fields = array_keys($result->fetch(PDO::FETCH_ASSOC));

    ```


    The `PDO fetch()` function, with the `FETCH_ASSOC` parameter, will create an associative
    array containing table information including the column names. The PHP function
    `array_keys()` will create an array of only the keys (not the values). The keys
    are the actual column names. These column names are stored in the array `$fields`.


    ```php

    if($column_count == 0) {

    $column_count = 1;

    continue;

    }

    ```


    The first column contains the auto numbered id field, which we do not need for
    our data. Thus, it will increment the counter and skip the rest of the current
    iteration of the loop.


    ```php

    if($flag==true) {

    $meta = $result->getColumnMeta($column_count);

    if($meta["native_type"]=="VAR_STRING") {

    // assume string or number only

    $column_count++;

    continue;

    }}

    ```


    The user will select two columns, one that is numeric and one that can be any
    type. This function accepts a parameter (`$flag`) which will indicate if the call
    to the function will return only numeric columns (`$flag==true`) or all columns
    (`$flag==false`). If numeric only, the *metadata* for the current column is retrieved
    and placed into `$meta`. The associative array created includes a key `"native_type"`
    which provides the data type set for the column in the database table. If the
    value is `"VAR_STRING"`, we skip it, increment the counter, and go to the next
    column.


