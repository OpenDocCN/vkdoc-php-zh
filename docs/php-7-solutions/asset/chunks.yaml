    \nLocking a File before Writing\nThe purpose of using `fopen()` with `c` mode\
    \ is to give you\nthe opportunity to lock the file with `flock()` before\nmodifying\
    \ it.\n\nThe `flock()`\nfunction takes two arguments: the file reference and a\
    \ constant\nspecifying how the lock should operate. There are three types of operation:\n\
    \n*   `LOCK_SH`\n    acquires a shared lock for reading.\n\n*   `LOCK_EX`\n  \
    \  acquires an exclusive lock for writing.\n\n*   `LOCK_UN`\n    releases the\
    \ lock.\n\nTo lock a file before writing to it, open the file in `c` mode and\n\
    immediately call `flock()`, like this:\n\n```\n// open the file in c mode\n$file\
    \ = fopen('C:/private/lock.txt', 'c');\n// acquire an exclusive lock\nflock($file,\
    \ LOCK_EX);\n```\n\nThis opens the file, or creates it if it doesn’t already exist,\
    \ and\nplaces the internal pointer at the beginning of the file. This means you\n\
    need to move the pointer to the end of the file or delete the existing\ncontent\
    \ before you can start writing with `fwrite()`.\n\nTo move the pointer to the\
    \ end of the file, use the `fseek()` function,\nlike this:\n\n```\n// move to\
    \ end of file\nfseek($file, 0, SEEK_END);\n```\n\nAlternatively, delete the existing\
    \ contents by calling `ftruncate()`:\n\n```\n// delete the existing contents\n\
    ftruncate($file, 0);\n```\n\nAfter you have finished writing to the file, you\
    \ must unlock it manually\nbefore calling `fclose()`:\n\n```\n// unlock the file\
    \ before closing\nflock($file, LOCK_UN);\nfclose($file);\n```"
