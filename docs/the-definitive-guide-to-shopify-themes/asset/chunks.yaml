- fmt: "### Design for Different Contexts\n\nWhile we haven’t all been uploaded to\
    \ the cloud just yet, the level of Internet connectivity for the average Western\
    \ consumer has certainly increased in the last few years; so too the myriad of\
    \ means to connect, whether at home on a traditional desktop/laptop, on the move\
    \ from one of a bewildering array of mobile devices, or via emerging platforms\
    \ like integrated messaging apps or Internet-enabled fridges.\n\nAny of these\
    \ could be relevant to an Ecommerce store, depending on the merchant and its typical\
    \ customers. As a Shopify theme designer, you need to start considering the wide\
    \ variety of use cases customers might have when accessing a store and the situations\
    \ in which they are doing so.\n\nNote that I’m stressing design for different\
    \ contexts, not just different devices. This is because it’s important to not\
    \ only think about which devices your customers might be using, but when they’re\
    \ doing it and what they want to achieve.\n\nTake a visitor landing on an apparel\
    \ boutique’s home page as an example.\n\n*   Are they on their desktop at work\
    \ during their lunch break, browsing collections for fashion inspiration?\n* \
    \  Are they sitting on the couch with a glass of wine and their mobile that evening,\
    \ making an impulse buy of the shirt they saw earlier that day?\n*   Are they\
    \ using the same mobile, but in the middle of rush hour trying to find the store’s\
    \ nearest physical location before closing time?\n\nIt’s usually impossible to\
    \ spend the time and effort required to build a site that optimizes for all scenarios\
    \ simultaneously, but a good designer will take the time to identify these different\
    \ potential use cases and work with the client to prioritize them.\n\n## Principles\
    \ of Development\n\nOnce you move out of the design phase and start the development\
    \ of your theme, there are a couple of things you can bear in mind to make the\
    \ deliverables you produce robust and maintainable.\n\nIt’s not always easy to\
    \ prioritize these things, especially when we’re up against a deadline or trying\
    \ to justify some extra hours to a client. They do tend to take a little extra\
    \ time upfront, but in my experience, they more than pay for themselves in the\
    \ long run.\n\n### Keep It Simple\n\nThe simpler the concepts and code in your\
    \ theme are, the easier it is to write and maintain them. For your code, this\
    \ can mean:\n\n*   Keeping the number of included `Liquid` snippets to a minimum\
    \ to simplify your code’s mental model\n*   Breaking clever `Liquid` one-liners\
    \ down into smaller, easier-to-understand steps\n*   Preferring HTML and `Liquid`\
    \ over JavaScript to drive dynamic logic\n*   Identifying pages or components\
    \ that are defined in different places but serve the same purpose and considering\
    \ combining them into one\n\n**Note**\n\nDevelopment practices that allow breaking\
    \ your source code down into small, logical components can be a huge help here.\
    \ You saw some examples of this in Chapter [2](#A437216_1_En_2_Chapter.html) (\"\
    Tools and Workflow\") and will encounter more in Chapter [11](#A437216_1_En_11_Chapter.html)\
    \ (\"Collaborative Theme Development\").\n\nIt can also help to focus on leveraging\
    \ Shopify’s built-in features and concepts like collections, products, linked\
    \ lists, and tags, rather than trying to develop your own. Understanding the limitations\
    \ of `Liquid` and Shopify and working within those boundaries reduces headaches\
    \ versus clever hacks to work around them.\n\nOn a related note, I try to avoid\
    \ relying on Shopify apps for common Ecommerce functionality whenever I can. Not\
    \ only is there an ongoing financial cost for the use of apps, many of them demand\
    \ complex `Liquid` code changes and extra JavaScript, adding mental and performance\
    \ overhead as well. Many Shopify apps are well-written, robust pieces of software\
    \ that won’t interfere with a store’s theme or other apps—but many aren’t, and\
    \ that can lead to all sorts of issues down the track.\n\nTo give an example,\
    \ I’ll commonly see merchants and developers relying on an app for simple Upsell\
    \ functionality, such as “if a customer has product A in their cart, suggest they\
    \ add product B”. While several apps can handle this and more complex scenarios,\
    \ most rely on JavaScript to examine and adjust the cart (meaning an extra script\
    \ file to load and a delay for the user) and in some situations, force a full-page\
    \ refresh on the user. Compare that to the simplicity of the `Liquid` snippet\
    \ in Listing [3-1](#A437216_1_En_3_Chapter.html#Par39), which displays a configurable\
    \ upsell message based on the current contents of a customer’s cart.\n\n```\n\
    {%- unless settings.upsell_trigger_product == blank or settings.upsell_target_product\
    \ == blank -%}\n{%- assign has_trigger_product = false -%}\n{%- assign has_target_product\
    \ = false -%}\n{%- comment -%}\nIterate over items currently in the cart to see\
    \ if we have our trigger\nproduct but not the target product.\n{%- endcomment\
    \ -%}\n{%- for item in cart.items -%}\n{%- if item.product == settings.upsell_trigger_product\
    \ -%}\n{%- assign has_trigger_product = true -%}\n{%- endif -%}\n{%- if item.product\
    \ == settings.upsell_target_product -%}\n{%- assign has_target_product = true\
    \ -%}\n{%- endif -%}\n{%- endfor -%}\n{%- if has_trigger_product and !has_target_product\
    \ -%}\n\nWhy not \nadd a {{ settings.upsell_target_product.title }}?\n\n{%- endif\
    \ -%}\n{%- endunless -%}\n```\n**Listing 3-1**  \nA Simple `Liquid` Implementation\
    \ of a Configurable Upsell Message on the Cart Page\n\n### Utilize Progressive\
    \ Enhancement\n\nAs web designers, we often want to make use of the latest and\
    \ greatest features browsers have to offer. However, it’s important to make sure\
    \ that we don’t leave segments of visitors behind—especially in the context of\
    \ Shopify themes, where that exclusion translates directly to lost dollars.\n\n\
    Progressive enhancement is the practice of designing web sites with a “bottom-up”\
    \ approach—starting with something that works for devices with the most basic\
    \ capabilities (say, a monochrome Kindle browser with no JavaScript and limited\
    \ graphics support), then “progressively” leveraging more advanced features (JavaScript!\
    \ CSS3! Push notifications! Color!) when available.\n\nUsing this approach doesn’t\
    \ necessarily take more effort during the development phase, and it can help us\
    \ avoid situations where entire groups of potential customers are denied the opportunity\
    \ to buy something. (The list of high-profile failures in this regard is sobering—examples\
    \ include visitors to `Nike.com` being presented with a black screen unless their\
    \ browser supported a specific CSS feature; and perhaps more egregiously, for\
    \ a long time, Walmart's Add to Cart button didn't even display for users without\
    \ JavaScript!)[²](#A437216_1_En_3_Chapter.html#Fn2)\n\n**Note**\n\nWe’ll be using\
    \ a progressive enhancement approach to all the code we develop as part of the\
    \ practical part of this book, with a focus on accessibility support and ensuring\
    \ your themes provide a solid fallback experience for users without JavaScript—two\
    \ of the most important concerns for Ecommerce stores."
