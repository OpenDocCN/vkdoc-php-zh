  trans: '

    # 第五章


    第五章将为你介绍`Bake`脚本，这是一个便捷的控制台程序，其运行方式与`scaffold`非常相似，但会提供可编辑的代码，供你扩展应用程序。你将改进博客并调整视图，使其更符合生产级的`Cake`应用标准。和往常一样，我建议你多次练习在不同的场景下使用表关联，带入每种关联的参数，并通过自定义关联来熟悉模型和良好的数据库设计。你越快能将一个应用程序从零构建到能够运行具有高级表关联的`scaffold`，你就越能熟练掌握
    MVC 结构以及 Cake 应用程序遵循的基本流程。


    ## 表关联练习


    你可能已经注意到，我在这章的教程中省略了评论表。这是为了让你自己尝试为文章与评论表构建“一对多”关系。在此练习中，请使用适当的关系将评论与文章关联起来，并通过`scaffold`测试该关联。务必从关联的两端分别运行控制器来检查错误。


    ## 总结


    Cake 利用命名约定来简化应用的构建。通过遵循“约定优于配置”的范式，Cake 不仅为你提供了大量实用的函数和代码精简方法，还为你提供了一套组织应用程序所需资源的整体方法。如何命名模型、视图和控制器，以及如何命名帮助器、元素和组件等其他
    Cake 资源，是学习 Cake 的关键方面。你不仅需要按照 Cake 的约定来构建应用程序，数据库的设计方式对于充分利用该框架也同样重要。数据库规范化是设计出最符合
    Cake 约定的模式的关键，也是正确使用模型的基础。当你在数据库中使用各种关系（一对一、一对多、多对多）时，Cake 能够完成大部分繁琐的数据映射工作，并使其在应用程序中可用。


    # 第五章：在控制台中创建简单视图与烘焙


    到目前为止，你实际上只使用了脚手架功能。虽然脚手架可以帮助测试关联并让数据库与 Cake 良好配合，但它无法让你对设计进行太多控制，而且脚手架也无法超越简单的
    CRUD 操作。要想进入单个表单元素或更改列表视图显示结果的方式，你必须手动创建并编辑视图本身。


    幸运的是，Cake 附带了一些实用的控制台脚本，可以帮助你生成这些视图，并执行其他重要的开发任务。在本章中，我将介绍`Bake`脚本，它的运行方式本质上与脚手架相似，会分析数据库，但随后会提供可供编辑的代码。从那里开始，你可以加入自定义逻辑，并添加超越简单
    CRUD 操作的改进型操作。首先，让我们为你博客应用的视图做一些小的调整。


    **注意**：本书中我将使用的所有视图文件都将使用`echo()`函数的 PHP 简写语法。你的服务器设置可能支持也可能不支持这种方法。如果不支持，请务必使用较长的字符串`<?php
    echo();?>`来代替我使用的简写`<?= ;?>`。由于`echo`命令在视图文件中非常常见，Cake 确实提供了一个便捷的`echo`函数来减少字符输入。如果你更喜欢
    Cake 的便捷函数，可以使用`e()`进行输出，使用`pr()`代替`print_r()`函数。或者，你也可以与你的托管服务商沟通，使 PHP 简写标签可用，并继续按照示例代码进行编写。


    ## 布局介绍

