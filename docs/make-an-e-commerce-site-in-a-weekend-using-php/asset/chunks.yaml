- fmt: "所有现代浏览器——Chrome、IE7+、Firefox、Safari和Opera——都有一个内置的`XMLHttpRequest`对象。\n\n\
    向服务器发出异步请求时，您需要监视请求的状态以及请求的响应。为此，语句#6中使用了一个名为`xmlhttp.onreadystatechange`的函数，它会持续检查请求的状态。\n\
    \n语句#7中所示的`readyState`属性保存了服务器响应的状态。每次`readyState`发生变化时，都会执行`onreadystatechange`函数。以下是`readyState`属性的可能取值：\n\
    \n- 状态 0：请求未初始化\n- 状态 1：请求已建立\n- 状态 2：请求已发送\n- 状态 3：请求正在处理\n- 状态 4：请求已完成\n\n语句#7中的`status`属性表示HTTP请求的状态。如果`status`值为`500`，则表示服务器内部错误；`400`值表示错误请求；`401`表示未授权；`403`表示禁止访问；`404`表示未找到，依此类推。状态值`200`表示没有错误。`onreadystatechange`函数会检查请求的状态。如果`state`的值为`4`，则表示已收到完整的服务器响应。如果`status`的值为`200`，则表示响应没有错误，您可以继续处理它。\n\
    \n语句#8访问具有`cartcountinfo`ID的元素。`cartcountinfo`是添加到购物车图标后页眉中的`span`元素的ID。通过此元素，将显示由`countcart.php`文件返回的购物车数量。\n\
    \n语句#9显示欢迎消息以及用户的电子邮件地址（如果用户已登录且会话变量存在）。此外，如果用户已登录，语句#10会显示“注销”链接，点击该链接将调用`logout.php`文件。\n\
    \n为了显示购物车中的商品数量，清单[4-4](#A978-1-4842-1672-9_4_Chapter.html#FPar7)中所示的`countcart.php`脚本会访问`cart`表中与站点访问者的会话ID匹配的商品，并返回获取的行数。\n\
    \n**清单4-4。`countcart.php`文件计算并返回购物车中选择的商品数量**\n\n```php\n<?php\n$totalquantity=0;\n\
    if (session_status() == PHP_SESSION_NONE) {\n    session_start();\n}\n$connect\
    \ = mysqli_connect(\"localhost\", \"root\", \"gold\", \"shopping\") or die(\"\
    Please, check your server connection.\");\n$sess = session_id();\n$query=\"select\
    \ * from cart where cart_sess = '$sess'\";\n$results = mysqli_query($connect,\
    \ $query) or die(mysql_error());\nwhile ($row = mysqli_fetch_array($results, MYSQLI_ASSOC))\
    \ {\n    extract($row);\n    $totalquantity = $totalquantity + $cart_quantity;\n\
    }\necho $totalquantity;\n?>\n```\n\n您可以在这段代码中看到，建立了到MySQL服务器的连接，激活了`shopping`数据库，并且访问了`cart`表中与访问者会话ID匹配的所有行。购物车中商品的数量会被累加，并将总数量作为购物车计数返回。假设访问者在购物车中选择了两件商品，购物车计数`2`将出现在站点页眉的购物车图标旁边，如图[4-7](#A978-1-4842-1672-9_4_Chapter.html#Fig7)所示。\n\
    \n![A978-1-4842-1672-9_4_Fig7_HTML.jpg](A978-1-4842-1672-9_4_Fig7_HTML.jpg)\n\n\
    图4-7.\n\n显示购物车中选择商品数量的网站页眉\n\n点击“登录”链接后，将执行`signin.php`脚本，它会提示用户输入电子邮件地址和密码。如果用户输入了有效的电子邮件地址和密码，欢迎消息将显示在站点页眉以及页面正文中，如图[4-8](#A978-1-4842-1672-9_4_Chapter.html#Fig8)所示。\n\
    \n![A978-1-4842-1672-9_4_Fig8_HTML.jpg](A978-1-4842-1672-9_4_Fig8_HTML.jpg)\n\n\
    图4-8.\n\n已登录用户的欢迎消息显示在站点页眉中\n\n## 前往结账\n\n一旦访问者完成向购物车添加商品并希望购买它们，他们可以随时点击位于购物车底部的“结账”按钮（见图[4-7](#A978-1-4842-1672-9_4_Chapter.html#Fig7)）。点击“结账”按钮时，系统会检查访问者的状态，以确定他们是否已登录。为了保存商品交付的发货信息，访问者需要在站点注册并登录。如果访问者尚未登录，将显示两个链接——一个允许用户登录，另一个允许用户在尚未注册时创建账户。根据访问者的当前状态，他们可以创建新账户或登录站点。\n\
