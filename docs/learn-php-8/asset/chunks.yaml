- fmt: '在示例[6-7](#394210_2_En_6_Chapter.xhtml#PC24)代码的顶部，创建了常量`USER_ERROR_LOG`和`ERROR_LOG`，用于指定日志文件的名称和位置。将可能变化的常量（如税率）放在代码顶部，便于负责维护应用程序的程序员快速修改。如前所述，日志文件的位置必须位于允许应用程序写入访问的文件夹中。建议将日志文件集中存放在一个公共文件夹内，与其他日志文件一起，方便数据中心人员（或系统分析师）访问。


    其他代码更改位于`catch`块中。`setException catch`块将`setException`类生成的错误消息返回给用户。此消息告知用户哪些属性（`Name`、`Breed`、`Color`和`Weight`）未更新。导致此异常的错误可能来自用户，也可能是在信息从客户端机器传输到服务器时发生损坏。这些消息仅提供关于属性要求的信息，用户本应已知晓这些要求。`catch`块还向用户错误日志写入类似的消息。用户错误并非需要分析师立即处理的紧急错误。然而，跟踪用户问题的趋势可以提示可能需要进行哪些更改，以确保用户获得最佳应用体验。


    `Throwable`和`Error catch`块捕获所有非用户生成的异常。由这些异常引起的消息可能会泄露破坏应用程序安全性的信息。因此，应向用户显示一条通用消息（例如`"The
    system is currently unavailable. Please try again later."`）。有关异常的详细信息（如错误消息、文件位置、引发异常的代码行）应放入错误日志以供进一步分析。大多数由这些`catch`块捕获的异常会导致应用程序停止运行。因此，必须通知相关人员正在发生的问题。`catch`块是向支持人员发送电子邮件以提醒他们任何问题的好位置。


    既然我们已经在内建了异常处理和错误处理机制，我们可以编辑`php.ini`文件来关闭向用户显示错误报告的设置。但是，我们应该等到所有开发和测试完成后再进行此操作。在`php.ini`文件中找到`"display_errors
    = On"`这一行。如果我们将此设置更改为`"display_errors = Off"`，大多数错误消息将不会显示给用户。此更改不会影响程序通过`echo`或`print`方法（包括在任何`catch`块中）发送回用户的任何消息。此更改将使开发者在系统出现问题时，能更好地控制显示给用户的错误消息类型。


    ## 操作指南


    1.  下载本节的代码。创建一个或使用一个现有的HTML页面，该页面不检查用户输入错误。运行程序，输入可能导致用户错误的名称、品种、体重和颜色值。停止程序并打开用户错误日志文件的内容。错误是否出现在文件中？如果没有，请检查包含日志文件的文件夹的安全性，确保其允许对日志文件的写入访问。确认程序已捕获用户错误后，尝试引发其他系统错误。提示：在`dog`应用程序的XML文件中将文件名更改为不存在的名称。检查错误日志以确定错误是否已写入文件。您是否能够引发任何未被任一日志文件捕获的错误？如果是，是否有办法捕获这些错误？


    ## 读取日志文件和文本文件


    在上一节中，我们发现`error_log`方法仅用一行代码就能写入日志文件。如果日志文件不存在，它会创建该文件。它将以追加方式（添加到文件末尾）将传递给它的任何消息写入文件内容，然后关闭文件。如果您要创建自己的日志记录流程，则需要多行代码。


    ```php

    $logFile = fopen("error_log.log", "a");

    $eMessage = $e->getMessage();

    fwrite($logFile, $eMessage);

    fclose($logFile);

    ```


    `fopen`方法也会在文件不存在时创建它。参数`"a"`表示写入文件的内容应被追加。参数`"w"`表示文件中的任何内容都将丢失（被覆盖）。然后，`fwrite`方法会将第二个参数（`$eMessage`）中的字符串放入由第一个参数（`$logFile`）指定的文件中。`$logFile`是一个指向文本文件位置的指针。`fclose`方法关闭文本文件。

    *有关写入文本文件的更多信息，请访问w3schools：[www.w3schools.com/php/php_file_create.asp](http://www.w3schools.com/php/php_file_create.asp)*。


    由于日志文件是基于文本的文件，您可以使用类似的逻辑来创建自己的应用程序，以打开日志文件并读取其内容。


    ```php

    $logFile = fopen("error_log.log", "r");

    echo fgets($logFile);

    fclose($logFile);

    ```


    这段代码将打开日志文件，读取文件中的第一行（通过`fgets`方法），然后关闭文件。然而，文件中很可能有多行内容。我们必须能够循环遍历并显示文件中的每一行。我们可以使用这里显示的`while`循环来实现。


    ```php

    $logFile = fopen("error_log.log", "r");

    while(!feof($logFile))

    {

    echo fgets($logFile) . "";

    }

    fclose($logFile);

    ```


    `while`循环会在条件语句为`TRUE`时持续循环。一旦条件语句变为`FALSE`，代码将退出循环并跳转到循环结束后的下一条代码行。在此示例中，`error_log`文件以只读方式打开（`"r"`）。`while`循环检查日志文件的文件末尾指示器（`feof`），以确定是否已到达文件末尾。如果`feof`返回`TRUE`，则表示已到达文件末尾。当未到达文件末尾时，循环必须继续。要使条件语句在仍有待读取记录时产生`TRUE`，我们必须反转逻辑，使得在还有记录时`feof`产生`TRUE`，在没有记录时产生`FALSE`。我们可以通过使用`!`运算符来实现这一点。`!`运算符是一个`NOT`运算符，它可以反转结果。`NOT
    TRUE`是`FALSE`，而`NOT FALSE`是`TRUE`。因此，`!feof`运算符现在会在有更多记录时产生`TRUE`，在没有更多记录时产生`FALSE`。循环与`fgets`方法结合，将显示文件中的每条记录。显示完每条记录后，将使用`fclose`关闭文件。

    *有关读取文本文件的更多信息，请访问w3schools：[www.w3schools.com/php/php_file_open.asp](http://www.w3schools.com/php/php_file_open.asp)*。

    *有关`while`循环的更多信息，请访问w3schools：[www.w3schools.com/php/php_looping.asp](http://www.w3schools.com/php/php_looping.asp)*。


    前面示例产生的输出相当简单：


    ```

    06.06.2020 03:00:55 | User Error | This is the error

    ```


    这并不能比直接在文本编辑器中打开日志文件提供更好的查看体验。我们可以结合使用HTML表格、`explode`方法和数组来生成更好的输出。我们可以使用`explode`方法将日志文件中的每一行放入一个二维数组中。这个二维数组将拥有与HTML表格一样的行和列。


    ```php

    $dogs = array

    (

    array("Sammy","Lab",18,"Yellow"),

    array("Spot","Mixed",14,"Mixed"),

    array("Princess","Chihuahua",4,"White"),

    array("Max","Boxer",35,"Brown")

    );

    ```'
