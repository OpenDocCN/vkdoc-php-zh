    **229**


    action must search out any events for the given day and insert those into the
    cell. Not only the Index action but also the View action will generate a calendar.
    This sounds like a perfect situation for building a helper function because of
    all the calculations required *in the view*.


    **The Calendar Helper**


    In the app/plugins/calendar/views directory, create a new folder named helpers,
    and insert a new file named calendar.php there. This file will contain a couple
    of custom helper functions that primarily render a month’s view based on the parameters
    passed to it. In the Index and View actions, we’ll set these parameters and then
    pass them along to this helper rather than render a calendar in each view file.
    Because I intend to perform logic in the view, I had better organize the Calendar
    plugin by using a helper instead of an element. Remember that helpers serve to
    perform logic in the view, whereas elements make basic displays, or *view* *templates*,
    for use across multiple views.


    Rendering the month will be a two-step process. First, the helper function will
    cycle through the weeks of the month, and second, it will cycle through each week.
    Depending on the month and the year, the first day of the month will vary, so
    the helper must create some variables to figure out on what day of the week the
    first day of the month lands and then also figure out the weekends. In the Calendar
    helper, let’s begin by inserting the lines shown in Listing 13-12.


