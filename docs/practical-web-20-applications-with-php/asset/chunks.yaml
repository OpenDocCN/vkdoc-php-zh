    ■**Note** It is possible to write custom storage methods, but the most common
    storage method will arguably be in a PHP session. Zend_Auth provides the Zend_Auth_Storage_Session
    class for this. This class, in turn, uses the Zend_Session component, which is
    essentially a wrapper to PHP’s $_SESSION variable (although it does provide greater
    functionality). To create some other storage method, you simply implement the
    Zend_Auth_Storage_Interface interface. For example, if you wanted to “remember
    a user” in between sessions, you could create a storage class that writes identity
    data to a cookie. You would then create an adapter (discussed shortly) to authenticate
    against cookie data. Be careful with this though, as it could potentially be dangerous
    if done incorrectly, since cookie data can be forged. One safeguard against this
    could be to give them a restricted role until they provide their credentials again,
    as Amazon.com does: it will remember your identity but not allow you to make any
    changes to your account unless you re-enter your password. Another example of
    using custom session storage is in a load-balanced environment (where multiple
    web servers are used for a single site). Disk-based sessions will not typically
    be available across all servers, so a subsequent user request may be handled on
    a different server than the previous request.


    Storing session data in the database alleviates this problem.


    In order to authenticate a user, they must provide *credentials*. In the case
    of the application we are writing, we will use the password column from the users
    table as the user’s credentials.


    We use an *adapter* to check the given identity and credentials against our database.


    Adapters in Zend_Auth implement the Zend_Auth_Adapter_Interface interface. Thankfully,
    the Zend Framework comes with an adapter that we can use to check our MySQL database.
    If we wanted to authenticate users against a different storage method (such as
    LDAP or a password file generated by Apache’s htpasswd), we would need to write
    a new adapter.


    We will be using the Zend_Auth_Adapter_DbTable adapter, which is designed to work
    with the Zend_Db component. If you choose instead to write your own adapter, the
    only method you need to implement is the authenticate() method, which returns
    a Zend_Auth_Result object.


    This object contains information about whether authentication was successful,
    as well as diagnostic messages (such as whether the provided credentials were
    incorrect, or authentication failed because the identity wasn’t found or for some
    other reason).


    By default, Zend_Auth_Adapter_DbTable returns only the submitted username in the
    Zend_Auth_Result object. However, we need to store additional information about
    the user (such as their name and, more importantly, their user type). When we
    look at processing user logins with Zend_Auth, we will deal with this.


