    \n```php\n$conn->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);\ntry\
    \ {\n    $conn->beginTransaction();\n    // 准备更新查询\n    // 其他数据库查询已省略\n} catch\
    \ (Exception $e) {\n    $conn->rollBack();\n    $trans_error = $e->getMessage();\n\
    }\n```\n\n6. 在现有代码中，每次执行查询的返回值都设置为`$done`。由于我们使用了事务，这不再必要。我们将使用`$done`作为成功提交事务的返回值。找到以下行（大约在第\
    \ 53、57 和 69 行）：\n\n```php\n$done = $stmt->execute();\n$done = $stmt->execute([$_POST['article_id']]);\n\
    $done = $conn->exec($sql);\n```\n\n将其修改为：\n\n```php\n$stmt->execute();\n$stmt->execute([$_POST['article_id']]);\n\
    $conn->exec($sql);\n```\n\n7. 在`catch`块之前，立即添加以粗体显示的代码来提交事务：\n\n```php\n$done\
    \ = $conn->commit();\n} catch (Exception $e) {\n    $conn->rollBack();\n    $trans_error\
    \ = $e->getMessage();\n}\n```\n\n8. 需要修改重定向页面的条件语句以处理事务。添加以粗体高亮显示的新代码：\n\n```php\n\
    // 更新后或当$_GET['article_id']未定义时重定向页面\nif (($done || $trans_error) || (!$_POST\
    \ && !isset($_GET['article_id']))) {\n    $url = 'http://localhost/phpsols-4e/admin/blog_list_pdo.php';\n\
    \    if ($done) {\n        $url .= '?updated=true';\n    } elseif ($trans_error)\
    \ {\n        $url .= \"?trans_error=$trans_error\";\n    }\n    header(\"Location:\
    \ $url\");\n    exit;\n}\n```\n\n现在条件语句被分组在括号内，以确保正确解析。第一对检查`$done`或`$trans_error`是否等于`true`。最终条件通过检查`$_POST`数组是否为空变得更加具体。这是必要的，因为点击更新按钮后，`!isset($_GET['article_id'])`始终为`true`。\n"
- fmt: "# 处理后的文本\n\nIf `$trans_error` contains any error messages, it equates to `true`,\
    \ so a query string is appended to the redirect location.\n\n9.  The final change\
    \ is in the PHP block above the table in `blog_list_pdo.php`. Add the code in\
    \ bold to display any error messages if the update fails:\n\n```\nif (isset($_GET['updated']))\
    \ {\n    echo 'Record updated';\n} elseif (isset($_GET['trans_error'])) {\n  \
    \  echo \"Can't update record because of the following error: \";\n    echo safe($_GET['trans_error'])\
    \ . '';\n}\n```\n\nPDO throws an exception as soon as it encounters an error,\
    \ so there will be only one error message, even if there are multiple errors.\n\
    \n10.  Save `blog_update_pdo.php` and `blog_list_pdo.php`, and update an existing\
    \ record. The script should work the same as before.\n\n11.  Introduce a deliberate\
    \ error in one of the update queries in `blog_update_pdo.php`, and test it again.\
    \ This time, you’ll see the error message when you’re returned to `blog_list_pdo.php`.\n\
    \n12.  Click the `EDIT` link for the record you just tried to update and verify\
    \ that none of the values has changed. You can check your code against `blog_update_pdo_07.php`\
    \ and `blog_list_pdo_05.php` in the `ch18` folder.\n\n**Tip:** Transactions are\
    \ essential in situations where a series of queries should be processed only if\
    \ certain criteria are met. For example, in a financial database, a transfer of\
    \ money should go ahead only if sufficient funds are available.\n\n## Preserving\
    \ Referential Integrity on Deletion\n\nIn PHP Solution 18-5, there was no need\
    \ to worry about referential integrity when you deleted records in the cross-reference\
    \ table because the values stored in each record are foreign keys. Each record\
    \ simply refers to the primary keys stored in the `blog` and `categories` tables.\
    \ Referring to Figure [18-1](#332054_4_En_18_Chapter.xhtml#Fig1) at the beginning\
    \ of this chapter, deleting from the cross-reference table the record that combines\
    \ `article_id 2` with `cat_id 1` simply breaks the link between the article titled\
    \ “Trainee Geishas Go Shopping” and the `Kyoto` category. Neither the article\
    \ nor the category is affected. They both remain in their respective tables.\n\
    \nThe situation is very different if you decide to delete either the article or\
    \ the category. If you delete the “Trainee Geishas Go Shopping” article from the\
    \ `blog` table, all references to `article_id 2` must also be deleted from the\
    \ cross-reference table. Similarly, if you delete the `Kyoto` category, all references\
    \ to `cat_id 1` must be removed from the cross-reference table. Alternatively,\
    \ you must halt the deletion if an item's primary key is stored elsewhere as a\
    \ foreign key.\n\nThe best way to do this is through the establishment of foreign-key\
    \ restraints. To do so, related tables must use the InnoDB storage engine. If\
    \ you’re using MySQL or MariaDB 5.5 or later, InnoDB is the default. Also, all\
    \ the `.sql` files that accompany this book select the InnoDB engine. However,\
    \ if you have existing tables that were created using the MyISAM storage engine,\
    \ you need to convert them before you can establish foreign-key constraints (see\
    \ PHP Solution 18-6).\n\n## PHP Solution 18-9: Setting up Foreign-key constraints\n\
    \nThis PHP solution describes how to set up foreign-key constraints between the\
    \ `article2cat`, `blog`, and `categories` tables in phpMyAdmin. The foreign-key\
    \ constraints must always be defined in the child table. In this case, the child\
    \ table is `article2cat`, because it stores the `article_id` and `cat_id` primary\
    \ keys from the other tables as foreign keys.\n\n1.  Select the `article2cat`\
    \ table in phpMyAdmin and click the Structure tab.\n\n2.  Click Relation view\
    \ (circled in Figure [18-12](#332054_4_En_18_Chapter.xhtml#Fig12)) above the structure\
    \ table (in older versions of phpMyAdmin, it’s a link below the structure table).\n\
    \n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig12_HTML.jpg](images/332054_4_En_18_Chapter/332054_4_En_18_Fig12_HTML.jpg)\n\
    \n**Figure 18-12.** Foreign-key constraints are defined in phpMyAdmin's Relation\
    \ view\n\n3.  The screen that opens is where you define foreign-key constraints.\
    \ Leave the Constraint name field blank. phpMyAdmin will automatically generate\
    \ a name for the constraint.\n\n4.  Foreign-key constraints can be set up only\
    \ on columns that are indexed. The `article_id` and `cat_id` columns in `article2cat`\
    \ are the table’s composite primary key, so they’re both listed in the Column\
    \ drop-down menu. Select `article_id`. Then select the following settings under\
    \ Foreign key constraint (INNODB):\n\n    *   Database: `phpsols`\n    *   Table:\
    \ `blog`\n    *   Column: `article_id`\n\n    This establishes a constraint between\
    \ `article_id` in the parent table (`blog`) and `article_id` in the child table\
    \ (`article2cat`).\n\n5.  Next, you need to decide how the constraint should behave.\
    \ The ON DELETE drop-down menu has the following options:\n\n    *   `CASCADE`:\
    \ When you delete a record in the parent table, all dependent records are deleted\
    \ in the child table. For example, if you delete the record with the primary key\
    \ `article_id 2` in the `blog` table, all records with `article_id 2` in the `article2cat`\
    \ table are automatically deleted.\n    *   `SET NULL`: When you delete a record\
    \ in the parent table, all dependent records in the child table have the foreign\
    \ key set to NULL. The foreign-key column must accept NULL values.\n    *   `NO\
    \ ACTION`: On some database systems, this allows foreign-key constraint checks\
    \ to be delayed. MySQL performs checks immediately, so this has the same effect\
    \ as `RESTRICT`.\n    *   `RESTRICT`: This prevents the deletion of a record in\
    \ the parent table if dependent records still exist in the child table.\n\n  \
    \  **Note:** The same options are available for `ON UPDATE`. With the exception\
    \ of `RESTRICT`, they are of limited interest because you should change the primary\
    \ key of a record only in exceptional circumstances. `ON UPDATE RESTRICT` not\
    \ only stops changes from being made to the primary key in the parent table; it\
    \ also rejects any inserts or updates in the child table that would result in\
    \ foreign-key values that don’t have a match in the parent table.\n\n    In the\
    \ case of a cross-reference table, `CASCADE` is the logical choice. If you decide\
    \ to delete a record in the parent table, you want all cross-references to that\
    \ record to be removed at the same time. However, to demonstrate the default behavior\
    \ of foreign-key constraints, select `RESTRICT` for both `ON DELETE` and `ON UPDATE`.\n\
    \n6.  Click the Add constraint link to establish a foreign-key constraint for\
    \ `cat_id` using the following settings:\n\n    *   Column: `cat_id`\n    *  \
    \ Database: `phpsols`\n    *   Table: `categories`\n    *   Column: `cat_id`\n\
    \n7.  Set `ON DELETE` and `ON UPDATE` to `RESTRICT`. The settings should look\
    \ like Figure [18-13](#332054_4_En_18_Chapter.xhtml#Fig13). Then click the Save\
    \ button.\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig13_HTML.jpg](images/332054_4_En_18_Chapter/332054_4_En_18_Fig13_HTML.jpg)\n\
    \n**Figure 18-13.** Setting foreign-key constraints for the cross-reference table\n\
    \n**Note:** The layout of Relation view in older versions of phpMyAdmin is different,\
    \ combining the Database, Table, and Column drop-down menus in a single drop-down.\n\
    \n8.  If you have not already done so, update at least one blog entry to associate\
    \ it with a category.\n\n9.  In phpMyAdmin, select the `categories` table and\
    \ click `Delete` next to a category that you know to be associated with a blog\
    \ entry, as shown in Figure [18-14](#332054_4_En_18_Chapter.xhtml#Fig14).\n\n\
    ![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig14_HTML.jpg](images/332054_4_En_18_Chapter/332054_4_En_18_Fig14_HTML.jpg)\n\
    \n**Figure 18-14.** Try to delete a record in the `categories` table"
