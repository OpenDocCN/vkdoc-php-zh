    In the next section, we will analyze a complete example.


    ### Conclusion


    In this section, we’ve created the basic models we will need to start building
    operations. In the next section, we will learn how to create operations and how
    to create the necessary services to hold them.


    ## Section 2\. Building Operations


    This section outlines the key principles for creating well-defined API operations:


    *   **Interface Enforcement**: Every operation must implement a specific interface.
    This interface defines a standard method that all operations must use to encapsulate
    their execution logic. This promotes consistency and simplifies operation management.


    *   **Metadata for Clarity**: Each operation will be marked with a metadata attribute.
    This attribute serves as a central location to store essential information about
    the operation, such as its name and the class representing its input model. This
    metadata enhances code readability and simplifies operation discovery.


    In summary, these principles ensure well-structured and maintainable API operations
    with clear execution logic and readily accessible metadata.


    ### The Operation Interface


    The **OperationInterface** acts as a contract that all operations must implement.
    The **perform** method will be the one that the operations will use to encapsulate
    its logic.


    ```

    namespace App\Api\Operation;

    use App\Api\Output\ApiOutput;

    use Symfony\Component\DependencyInjection\Attribute\Autoconfigure;

    #[Autoconfigure(tags: [''api.operation''])]

    interface OperationInterface

    {

    public function perform(mixed $data): ApiOutput;

    }

    ```


    The [AutoConfigure](https://symfony.com/doc/current/service_container/tags.html%2523autoconfiguring-tags)
    attribute tells the Symfony kernel to tag as “api.operation” those services which
    implement this interface. This means that each operation will be tagged as such
    after implementing the **OperationInterface**.


    The **perform** method must return an instance of the ApiOutput class. If you
    remember from the last section, this class holds the operation request result.


    ### The Operation Metadata


    The operation metadata attribute holds two properties. The first one specifies
    the operation name, and the second one specifies the operation input model class.


    ```

    namespace App\Api\Attribute;

    #[\Attribute(\Attribute::TARGET_CLASS)]

    readonly class OperationMetadata

    {

    public function __construct(

    public string $name,

    public ?string $input = null

    ){ }

    }

    ```


    A request operation payload will be deserialized to the input class, specified
    with the “$input” parameter, before executing the operation. If the input class
    properties are annotated with Symfony validation constraints, the deserialized
    model will also be validated to ensure that the received data is valid.


    We will see this entire process during the rest of the chapter.


    ### An Operation Class


    So far, we know that an operation must implement the OperationInterface and has
    to be flagged with the OperationMetadata attribute. In this section, we are showing
    an example of an operation class.


    ```

    namespace App\Api\Operation;

    use App\Api\Attribute\OperationMetadata;

    use App\Api\Input\Operation\SendPaymentInput;

    use App\Api\Output\ApiOutput;

    #[OperationMetadata(

    name: ''SendPayment'',

    input: SendPaymentInput::class

    )]

    class SendPaymentOperation implements OperationInterface

    {

    /**

    * @param SendPaymentInput $data

    */

    public function perform(mixed $data): ApiOutput

    {

    // This method would hold the code in charge of sending the payment

    $id = ''......'';

    $status = ''ACCEPTED'';

    return new ApiOutput(new SendPaymentOutput($id, $status), 202);

    }

    }

    ```


    The operation metadata attribute specifies the operation name (**SendPayment**)
    and the input data class name (SendPaymentInput). The **perform** method would
    execute the operation and return the **ApiOutput** containing the result as an
    output model and the HTTP response code.


    To prevent hardcoding the operation name in the metadata name parameter, we can
    create a PHP enumeration where to centralize all the operation names:


    ```

    enum OperationNames

    {

    case SendPayment;

    }

    ```


    Now, we can change the OperationMetadata name parameter with this:


    ```

    #[OperationMetadata(

    name: OperationNames::SendPayment->name,

    input: SendPaymentInput::class

    )]

    ```'
