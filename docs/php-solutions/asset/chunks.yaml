- fmt: "### Getting form Data with PHP Superglobals\n\nThe `$_POST` superglobal array\
    \ contains data sent using the `post` method. It should come as no surprise that\
    \ data sent by the `get` method is in the `$_GET` array.\n\nTo access values submitted\
    \ by a form, just put the `name` attribute of the form element in quotes between\
    \ square brackets after `$_POST` or `$_GET`, depending on the form’s `method`\
    \ attribute. So `email` becomes `$_POST['email']` if sent by the `post` method,\
    \ and `$_GET['email']` if sent by the `get` method. That’s all there is to it.\n\
    \nYou may come across scripts that use `$_REQUEST`, which avoids the need to distinguish\
    \ between `$_POST` or `$_GET`. It’s less secure. Always use `$_POST` or `$_GET`.\n\
    \nOld scripts may use `$HTTP_POST_VARS` or `$HTTP_GET_VARS`, which have the same\
    \ meaning as `$_POST` and `$_GET`. The old versions don’t work on most servers.\
    \ Use `$_POST` and `$_GET` instead.\n\n**Caution**\n\nIgnore any “advice” you\
    \ see about making it easier to get form data by enabling `register_globals` in\
    \ the PHP configuration. The `register_globals` directive was permanently disabled\
    \ in PHP 5.4 to improve security. You cannot turn it back on.\n\n## Processing\
    \ and Validating User Input\n\nThe ultimate aim of this chapter is to send the\
    \ input from the form in `contact.php` by email to your inbox. Using the PHP `mail()`\
    \ function is relatively simple. It takes a minimum of three arguments: the address(es)\
    \ the email is being sent to, a string containing the subject line, and a string\
    \ containing the body of the message. You build the body of the message by concatenating\
    \ (joining) the contents of the input fields into a single string.\n\nSecurity\
    \ measures implemented by most Internet service providers (ISPs) make it difficult\
    \ if not impossible to test the `mail()` function in a local testing environment.\
    \ Instead of jumping straight into the use of `mail()`, PHP Solutions 5-1 through\
    \ 5-4 concentrate on validating user input to make sure required fields are filled\
    \ in and displaying error messages. Implementing these measures makes your online\
    \ forms more user friendly and secure.\n\nFor many years, web designers have used\
    \ JavaScript to check user input when the Submit button is clicked. That role\
    \ is being gradually taken over by browsers that support HTML5. This is called\
    \ client-side validation because it happens on the user’s computer (or client).\
    \ It’s useful because it’s almost instantaneous and can alert the user to a problem\
    \ without making an unnecessary round trip to the server. However, you should\
    \ never rely on client-side validation alone because it’s too easy to sidestep.\
    \ All a malicious user has to do is to submit data from a custom script and your\
    \ checks are rendered useless. It’s vital to check user input on the server side\
    \ with PHP, too.\n\n### Creating a Reusable Script\n\nThe ability to reuse the\
    \ same script — perhaps with only a few edits — for multiple websites is a great\
    \ timesaver. However, sending the input data to a separate file for processing\
    \ makes it difficult to alert users to errors without losing their input. To get\
    \ around this problem, the approach taken in this chapter is to use what’s known\
    \ as a self-processing form.\n\nWhen the form is submitted, the page reloads and\
    \ a conditional statement runs the processing script. If the server-side validation\
    \ detects errors, the form can be redisplayed with error messages while preserving\
    \ the user’s input.\n\nParts of the script that are specific to the form will\
    \ be embedded above the `DOCTYPE` declaration. The generic, reusable parts of\
    \ the script will be in a separate file that can be included in any page that\
    \ requires an email-processing script.\n\n#### PHP Solution 5-1: Making Sure Required\
    \ Fields aren’t Blank\n\nWhen required fields are left blank, you don’t get the\
    \ information you need and the user may never get a reply, particularly if contact\
    \ details have been omitted.\n\nContinue using the file from the previous exercise.\
    \ Alternatively, use `contact_02.php` from the `ch05` folder and remove `_02`\
    \ from the filename.\n\nThe processing script uses two arrays called `$errors`\
    \ and `$missing` to store details of errors and required fields that haven’t been\
    \ filled in. These arrays will be used to control the display of error messages\
    \ alongside the form labels. There won’t be any errors when the page first loads,\
    \ so initialize `$errors` and `$missing` as empty arrays in the PHP code block\
    \ at the top of `contact.php`, like this:\n\n```\n<?php\ninclude './includes/title.php';\n\
    $errors = [];\n$missing = [];\n?>\n```\n\nThe email-processing script should run\
    \ only if the form has been submitted. As Figure [5-2](#A978-1-4842-0635-5_5_Chapter.html#Fig2)\
    \ shows, the `$_POST` array contains a name/value pair for the Submit button,\
    \ which is called `send` in `contact.php`. The value of `$_POST['send']` will\
    \ be defined (set) only if the form has been submitted. So you can use a conditional\
    \ statement and the `isset()` function to control whether to run the processing\
    \ script. Add the code highlighted in bold to the PHP block at the top of the\
    \ page.\n\n```\n<?php\ninclude './includes/title.php';\n$errors = [];\n$missing\
    \ = [];\n\n// check if the form has been submitted\nif (isset($_POST['send']))\
    \ {\n    // email processing script\n}\n?>\n```\n\n**Note**\n\nThe `name` attribute\
    \ of the Submit button in this form is `send`. If you give your Submit button\
    \ a different name, you need to use that name.\n\nAlthough you won’t be sending\
    \ the email just yet, define two variables to store the destination address and\
    \ subject line of the email. The following code goes inside the conditional statement\
    \ that you created in the previous step:\n\n```\nif (isset($_POST['send'])) {\n\
    \    // email processing script\n    $to = 'david@example.com'; // use your own\
    \ email address\n    $subject = 'Feedback from Japan Journey';\n}\n```\n\nNext,\
    \ create two arrays: one listing the `name` attribute of each field in the form\
    \ and the other listing all required fields. For the sake of this demonstration,\
    \ make the `email` field optional, so that only the `name` and `comments` fields\
    \ are required. Add the following code inside the conditional block immediately\
    \ after the code that defines the subject line:\n\n```\n$subject = 'Feedback from\
    \ Japan Journey';\n\n// list expected fields\n$expected = ['name', 'email', 'comments'];\n\
    \n// set required fields\n$required = ['name', 'comments'];\n}\n```\n\n**Tip**\n\
    \nWhy is the `$expected` array necessary? It’s to prevent an attacker from injecting\
    \ other variables into the `$_POST` array in an attempt to overwrite your default\
    \ values. By processing only those variables that you expect, your form is much\
    \ more secure. Any spurious values are ignored.\n\nThe next section of code is\
    \ not specific to this form, so it should go in an external file that can be included\
    \ in any email-processing script. Create a new PHP file called `processmail.php`\
    \ in the `includes` folder. Then include it in `contact.php` immediately after\
    \ the code you entered in the previous step, like this:\n\n```\n$required = ['name',\
    \ 'comments'];\nrequire './includes/processmail.php';\n}\n```\n\nThe code in `processmail.php`\
    \ begins by checking the `$_POST` variables for required fields that have been\
    \ left blank. Strip any default code inserted by your editor and add the following\
    \ to `processmail.php`:\n\n```\n<?php\nforeach ($_POST as $key => $value) {\n\
    \    // assign to temporary variable and strip whitespace if not an array\n  \
    \  $temp = is_array($value) ? $value : trim($value);\n\n    // if empty and required,\
    \ add to $missing array\n    if (empty($temp) && in_array($key, $required)) {\n\
    \        $missing[] = $key;\n        ${$key} = '';\n    } elseif (in_array($key,\
    \ $expected)) {\n        // otherwise, assign to a variable of the same name as\
    \ $key\n        ${$key} = $temp;\n    }\n}\n```"
  raw: '### Getting form Data with PHP Superglobals


    The `$_POST` superglobal array contains data sent using the `post` method. It
    should come as no surprise that data sent by the `get` method is in the `$_GET`
    array.


    To access values submitted by a form, just put the `name` attribute of the form
    element in quotes between square brackets after `$_POST` or `$_GET`, depending
    on the form’s `method` attribute. So `email` becomes `$_POST[''email'']` if sent
    by the `post` method, and `$_GET[''email'']` if sent by the `get` method. That’s
    all there is to it.


    You may come across scripts that use `$_REQUEST`, which avoids the need to distinguish
    between `$_POST` or `$_GET`. It’s less secure. Always use `$_POST` or `$_GET`.


    Old scripts may use `$HTTP_POST_VARS` or `$HTTP_GET_VARS`, which have the same
    meaning as `$_POST` and `$_GET`. The old versions don’t work on most servers.
    Use `$_POST` and `$_GET` instead.


    Caution


    Ignore any “advice” you see about making it easier to get form data by enabling
    `register_globals` in the PHP configuration. The `register_globals` directive
    was permanently disabled in PHP 5.4 to improve security. You cannot turn it back
    on.


    ## Processing and Validating User Input


    The ultimate aim of this chapter is to send the input from the form in `contact.php`
    by email to your inbox. Using the PHP `mail()` function is relatively simple.
    It takes a minimum of three arguments: the address(es) the email is being sent
    to, a string containing the subject line, and a string containing the body of
    the message. You build the body of the message by concatenating (joining) the
    contents of the input fields into a single string.


    Security measures implemented by most Internet service providers (ISPs) make it
    difficult if not impossible to test the `mail()` function in a local testing environment.
    Instead of jumping straight into the use of `mail()`, PHP Solutions 5-1 through
    5-4 concentrate on validating user input to make sure required fields are filled
    in and displaying error messages. Implementing these measures makes your online
    forms more user friendly and secure.


    For many years, web designers have used JavaScript to check user input when the
    Submit button is clicked. That role is being gradually taken over by browsers
    that support HTML5\. This is called client-side validationbecause it happens on
    the user’s computer (or client). It’s useful because it’s almost instantaneous
    and can alert the user to a problem without making an unnecessary round trip to
    the server. However, you should never rely on client-side validation alone because
    it’s too easy to sidestep. All a malicious user has to do is to submit data from
    a custom script and your checks are rendered useless. It’s vital to check user
    input on the server side with PHP, too.


    ### Creating a Reusable Script


    The ability to reuse the same script—perhaps with only a few edits—for multiple
    websites is a great timesaver. However, sending the input data to a separate file
    for processing makes it difficult to alert users to errors without losing their
    input. To get around this problem, the approach taken in this chapter is to use
    what’s known as a self-processing form.


    When the form is submitted, the page reloads and a conditional statement runs
    the processing script. If the server-side validation detects errors, the form
    can be redisplayed with error messages while preserving the user’s input.


    Parts of the script that are specific to the form will be embedded above the `DOCTYPE`
    declaration. The generic, reusable parts of the script will be in a separate file
    that can be included in any page that requires an email-processing script.


    #### PHP Solution 5-1: Making Sure Required Fields aren’t Blank


    When required fields are left blank, you don’t get the information you need and
    the user may never get a reply, particularly if contact details have been omitted.


    Continue using the file from the previous exercise. Alternatively, use `contact_02.php`
    from the `ch05` folder and remove `_02` from the filename.


    The processing script uses two arrays called `$errors` and `$missing` to store
    details of errors and required fields that haven’t been filled in. These arrays
    will be used to control the display of error messages alongside the form labels.
    There won’t be any errors when the page first loads, so initialize `$errors` and
    `$missing` as empty arrays in the PHP code block at the top of `contact.php`,
    like this:


    `<?php`


    `include ''./includes/title.php'';`


    `$errors = [];`


    `$missing = [];`


    `?>`


    The email-processing script should run only if the form has been submitted. As
    Figure [5-2](#A978-1-4842-0635-5_5_Chapter.html#Fig2) shows, the `$_POST` array
    contains a name/value pair for the Submit button, which is called `send` in `contact.php`.
    The value of `$_POST[''send'']` will be defined (set) only if the form has been
    submitted. So you can use a conditional statement and the `isset()` function to
    control whether to run the processing script. Add the code highlighted in bold
    to the PHP block at the top of the page.


    `<?php`


    `include ''./includes/title.php'';`


    `$errors = [];`


    `$missing = [];`


    `// check if the form has been submitted`


    `if (isset($_POST[''send''])) {`


    `// email processing script`


    `}`


    `?>`


    Note


    The `name` attribute of the Submit button in this form is `send`. If you give
    your Submit button a different name, you need to use that name.


    Although you won’t be sending the email just yet, define two variables to store
    the destination address and subject line of the email. The following code goes
    inside the conditional statement that you created in the previous step:


    `if (isset($_POST[''send''])) {`


    `// email processing script`


    `$to = ''david@example.com''; // use your own email address`


    `$subject = ''Feedback from Japan Journey'';`


    `}`


    Next, create two arrays: one listing the `name` attribute of each field in the
    form and the other listing all required fields. For the sake of this demonstration,
    make the `email` field optional, so that only the `name` and `comments` fields
    are required. Add the following code inside the conditional block immediately
    after the code that defines the subject line:


    `$subject = ''Feedback from Japan Journey'';`


    `// list expected fields`


    `$expected = [''name'', ''email'', ''comments''];`


    `// set required fields`


    `$required = [''name'', ''comments''];`


    `}`


    Tip


    Why is the `$expected` array necessary? It’s to prevent an attacker from injecting
    other variables into the `$_POST` array in an attempt to overwrite your default
    values. By processing only those variables that you expect, your form is much
    more secure. Any spurious values are ignored.


    The next section of code is not specific to this form, so it should go in an external
    file that can be included in any email-processing script. Create a new PHP file
    called `processmail.php` in the `includes` folder. Then include it in `contact.php`
    immediately after the code you entered in the previous step, like this:


    `$required = [''name'', ''comments''];`


    `require ''./includes/processmail.php'';`


    `}`


    The code in `processmail.php` begins by checking the `$_POST` variables for required
    fields that have been left blank. Strip any default code inserted by your editor
    and add the following to `processmail.php`:


    `<?php`


    `foreach ($_POST as $key => $value) {`


    `// assign to temporary variable and strip whitespace if not an array`


    `$temp = is_array($value) ? $value : trim($value);`


    `// if empty and required, add to $missing array`


    `if (empty($temp) && in_array($key, $required)) {`


    `$missing[] = $key;`


    `${$key} = '''';`


    `} elseif (in_array($key, $expected)) {`


    `// otherwise, assign to a variable of the same name as $key`


    `${$key} = $temp;`


    `}`


    `}`'
  trans: "\n### 使用 PHP 超全局变量获取表单数据\n\n`$_POST` 超全局数组包含通过 `post` 方法发送的数据。不出所料，通过 `get`\
    \ 方法发送的数据则存储在 `$_GET` 数组中。\n\n要访问表单提交的值，只需将表单元素的 `name` 属性值用引号括起来，放在 `$_POST`\
    \ 或 `$_GET` 后面的方括号中，具体使用哪个取决于表单的 `method` 属性。因此，如果通过 `post` 方法发送，`email` 就变成 `$_POST['email']`；如果通过\
    \ `get` 方法发送，则变成 `$_GET['email']`。就是这么简单。\n\n你可能会遇到使用 `$_REQUEST` 的脚本，它无需区分 `$_POST`\
    \ 或 `$_GET`。但这种做法安全性较低。请始终使用 `$_POST` 或 `$_GET`。\n\n旧版脚本可能使用 `$HTTP_POST_VARS`\
    \ 或 `$HTTP_GET_VARS`，它们与 `$_POST` 和 `$_GET` 含义相同。不过旧版变量在大多数服务器上已无法使用，请改用 `$_POST`\
    \ 和 `$_GET`。\n\n**注意**\n\n忽略那些建议你通过启用 PHP 配置中的 `register_globals` 来简化表单数据获取的“建议”。`register_globals`\
    \ 指令已在 PHP 5.4 中永久禁用，以提高安全性。你无法再将其重新开启。\n\n## 处理并验证用户输入\n\n本章的最终目标是将 `contact.php`\
    \ 表单中的输入通过电子邮件发送到你的收件箱。使用 PHP 的 `mail()` 函数相对简单，它至少需要三个参数：邮件发送的目标地址、包含主题行的字符串，以及包含邮件正文的字符串。你可以通过将输入字段的内容拼接（连接）成一个字符串来构建邮件正文。\n\
    \n大多数互联网服务提供商（ISP）实施的安全措施使得在本地测试环境中测试 `mail()` 函数变得困难，甚至不可能。因此，在 PHP 解决方案 5-1\
    \ 至 5-4 中，我们不会直接使用 `mail()`，而是专注于验证用户输入，确保必填字段已填写并显示错误消息。实施这些措施能让你的在线表单更加用户友好和安全。\n\
    \n多年来，网页设计师一直使用 JavaScript 在点击提交按钮时检查用户输入。这一角色正逐渐被支持 HTML5 的浏览器所取代。这被称为客户端验证，因为它发生在用户的计算机（或客户端）上。这种验证很有用，因为它几乎是即时的，并且无需向服务器发送不必要的往返请求就能提醒用户出现问题。然而，你绝不能仅仅依赖客户端验证，因为它太容易被绕过。恶意用户只需通过自定义脚本提交数据，你的检查就形同虚设。使用\
    \ PHP 在服务器端检查用户输入同样至关重要。\n\n### 创建可重用脚本\n\n能够为多个网站重复使用同一个脚本（可能只需少量编辑）能大大节省时间。然而，将输入数据发送到单独的文件进行处理，会导致难以在保留用户输入的同时提醒用户错误。为了解决这个问题，本章采用的方法被称为自处理表单。\n\
    \n当表单提交时，页面会重新加载，并通过条件语句运行处理脚本。如果服务器端验证发现了错误，表单会重新显示，并附带错误消息，同时保留用户的输入。\n\n表单特有的脚本部分将嵌入在\
    \ `DOCTYPE` 声明之上。通用的、可重用的脚本部分将放在一个单独的文件中，该文件可以被任何需要邮件处理脚本的页面引用。\n\n#### PHP 解决方案\
    \ 5-1：确保必填字段不为空\n\n当必填字段留空时，你不仅无法获得所需信息，而且用户可能永远得不到回复，尤其是在联系方式被遗漏的情况下。\n\n继续使用上一个练习中的文件。或者，使用\
    \ `ch05` 文件夹中的 `contact_02.php`，并从文件名中移除 `_02`。\n\n处理脚本使用两个名为 `$errors` 和 `$missing`\
    \ 的数组来存储错误信息和未填写的必填字段。这些数组将用于控制表单标签旁边错误消息的显示。页面首次加载时不应有任何错误，因此在 `contact.php`\
    \ 顶部的 PHP 代码块中将 `$errors` 和 `$missing` 初始化为空数组，如下所示：\n\n```\n<?php\ninclude './includes/title.php';\n\
    $errors = [];\n$missing = [];\n?>\n```\n\n邮件处理脚本应仅在表单已提交时运行。如图 5-2 所示，`$_POST`\
    \ 数组包含提交按钮的名称/值对，在 `contact.php` 中该按钮名为 `send`。只有当表单被提交时，`$_POST['send']` 的值才会被定义（设置）。因此，你可以使用条件语句和\
    \ `isset()` 函数来控制是否运行处理脚本。将以下高亮显示的代码添加到页面顶部的 PHP 代码块中。\n\n```\n<?php\ninclude\
    \ './includes/title.php';\n$errors = [];\n$missing = [];\n\n// 检查表单是否已提交\nif (isset($_POST['send']))\
    \ {\n    // 邮件处理脚本\n}\n?>\n```\n\n**注意**\n\n此表单中提交按钮的 `name` 属性是 `send`。如果你为提交按钮指定了不同的名称，则需要使用该名称。\n\
    \n虽然你暂时还不会发送邮件，但可以先定义两个变量来存储邮件的目标地址和主题行。以下代码应放置在上一步创建的条件语句内部：\n\n```\nif (isset($_POST['send']))\
    \ {\n    // 邮件处理脚本\n    $to = 'david@example.com'; // 请使用你自己的电子邮件地址\n    $subject\
    \ = '来自 Japan Journey 的反馈';\n}\n```\n\n接下来，创建两个数组：一个列出表单中每个字段的 `name` 属性，另一个列出所有必填字段。为了演示，我们将\
    \ `email` 字段设为可选，因此只有 `name` 和 `comments` 字段是必填的。在条件块内部，紧接着定义主题行的代码之后添加以下代码：\n\
    \n```\n$subject = '来自 Japan Journey 的反馈';\n\n// 列出预期的字段\n$expected = ['name',\
    \ 'email', 'comments'];\n\n// 设置必填字段\n$required = ['name', 'comments'];\n}\n```\n\
    \n**提示**\n\n为什么需要 `$expected` 数组？这是为了防止攻击者向 `$_POST` 数组中注入其他变量，试图覆盖你的默认值。通过只处理你预期会出现的变量，你的表单会更加安全。任何无关的值都会被忽略。\n\
    \n下一段代码并非此表单所特有，因此应放在一个外部文件中，以便任何邮件处理脚本都能引用。在 `includes` 文件夹中创建一个名为 `processmail.php`\
    \ 的新 PHP 文件。然后，在 `contact.php` 中紧接上一步输入的代码之后包含它，如下所示：\n\n```\n$required = ['name',\
    \ 'comments'];\nrequire './includes/processmail.php';\n}\n```\n\n`processmail.php`\
    \ 中的代码首先检查 `$_POST` 变量中是否有未填写的必填字段。删除编辑器插入的任何默认代码，并将以下内容添加到 `processmail.php`\
    \ 中：\n\n```\n<?php\nforeach ($_POST as $key => $value) {\n    // 赋值给临时变量，如果不是数组则去除首尾空白\n\
    \    $temp = is_array($value) ? $value : trim($value);\n\n    // 如果为空且是必填字段，则添加到\
    \ $missing 数组\n    if (empty($temp) && in_array($key, $required)) {\n        $missing[]\
    \ = $key;\n        ${$key} = '';\n    } elseif (in_array($key, $expected)) {\n\
    \        // 否则，赋给一个与 $key 同名的变量\n        ${$key} = $temp;\n    }\n}\n```\n"
- fmt: "In simple terms, this `foreach` loop goes through the `$_POST` array, strips\
    \ out any whitespace from text fields, and assigns the field’s contents to a variable\
    \ with the same name (so `$_POST['email']` becomes `$email`, and so on). If a\
    \ required field is left blank, its `name` attribute is added to the `$missing`\
    \ array and the related variable is set to an empty string. Only elements in the\
    \ `$_POST` array with keys listed in the `$required` and `$expected` arrays are\
    \ processed.\n\nRemoving leading and trailing whitespace prevents anyone from\
    \ pressing the space bar several times in an attempt to avoid filling in a required\
    \ field. We also get a list of required fields that haven’t been filled in, and\
    \ all the values from the form are assigned to simplified variables. This makes\
    \ them easier to handle later.\n\nIf you don’t need to know the details of how\
    \ the code works, skip to step 7. But if you want to understand the code in depth,\
    \ read on.\n\nThe first line of code inside the loop uses the ternary operator\
    \ (see \"Using the ternary operator\" in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)).\
    \ This is a convenient shorthand way of assigning a value depending on whether\
    \ a condition is true or false. The same line of code could be rewritten like\
    \ this:\n\n```\nif (is_array($value) {\n  $temp = $value;\n} else {\n  $temp =\
    \ trim($value);\n}\n```\n\nThe `is_array()` function checks whether the current\
    \ value is an array. If it is, the value is assigned, unchanged, to a variable\
    \ called `$temp`. But if it’s not an array, the `trim()` function strips leading\
    \ and trailing whitespace from the value before assigning it to `$temp`.\n\nThe\
    \ rest of the loop uses a conditional statement to process both the key and value\
    \ of each element in the `$_POST` array. The first condition uses the `empty()`\
    \ function to check whether `$temp` still contains a value after any leading and\
    \ trailing whitespace was stripped off in the previous line. If `empty()` returns\
    \ `true`, the `in_array()` function checks if the current array key is in the\
    \ `$required` array. If that also returns `true`, it means that no value has been\
    \ set for a required field. So, the two lines of code in the `if` block add the\
    \ key to the `$missing` array and then dynamically create a variable based on\
    \ the key’s name and set its value to an empty string.\n\nThe `elseif` part of\
    \ the conditional statement checks if the key is in the `$expected` array. If\
    \ it is, a variable based on the key’s name is created dynamically, and the value\
    \ of `$temp` is assigned to it.\n\n> **Note**: For a detailed explanation of how\
    \ the array key is used to create a new variable with the same name, see \"Creating\
    \ new variables dynamically\" in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html).\n\
    \nSave `processmail.php`. You’ll add more code to it later, but let’s turn now\
    \ to the main body of `contact.php`. You need to display a warning if anything\
    \ is missing. Add a conditional statement at the top of the page content between\
    \ the `<h2>` heading and the first paragraph, like this:\n\n```\n<h2>Contact us</h2>\n\
    <?php if ($missing || $errors) { ?>\n  <p class=\"warning\">Please fix the item(s)\
    \ indicated.</p>\n<?php } ?>\n<p>Ut enim ad minim veniam . . . </p>\n```\n\nThis\
    \ checks `$missing` and `$errors`, which you initialized as empty arrays in step\
    \ 1. As explained in \"The truth according to PHP\" in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html),\
    \ an empty array is treated as `false`, so the paragraph inside the conditional\
    \ statement isn’t displayed when the page first loads. However, if a required\
    \ field hasn’t been filled in when the form is submitted, its name is added to\
    \ the `$missing` array. An array with at least one element is treated as `true`.\
    \ The `||` means \"or,\" so this warning paragraph will be displayed if a required\
    \ field is left blank or if an error is discovered. (The `$errors` array comes\
    \ into play in PHP Solution 5-3.)\n\nTo make sure it works so far, save `contact.php`\
    \ and load it normally in a browser (don't click the Refresh button). The warning\
    \ message is not displayed. Click Send message without filling in any of the fields.\
    \ You should now see the message about missing items, as shown in the following\
    \ screenshot.\n\n![A978-1-4842-0635-5_5_Figd_HTML.jpg](A978-1-4842-0635-5_5_Figd_HTML.jpg)\n\
    \nTo display a suitable message alongside each missing required field, use a PHP\
    \ conditional statement to insert a `<span>` inside the `<label>` tag, like this:\n\
    \n```\n<label for=\"name\">Name:\n<?php if ($missing && in_array('name', $missing))\
    \ { ?>\n  <span class=\"warning\">Please enter your name</span>\n<?php } ?>\n\
    </label>\n```\n\nThe first condition checks the `$missing` array. If it’s empty,\
    \ the conditional statement fails and the `<span>` is never displayed. But if\
    \ `$missing` contains any values, the `in_array()` function checks if the `$missing`\
    \ array contains the value `name`. If it does, the `<span>` is displayed.\n\n\
    Insert similar warnings for the `email` and `comments` fields like this:\n\n```\n\
    <label for=\"email\">Email:\n<?php if ($missing && in_array('email', $missing))\
    \ { ?>\n  <span class=\"warning\">Please enter your email address</span>\n<?php\
    \ } ?>\n</label>\n<input name=\"email\" id=\"email\" type=\"text\">\n</p>\n<p>\n\
    <label for=\"comments\">Comments:\n<?php if ($missing && in_array('comments',\
    \ $missing)) { ?>\n  <span class=\"warning\">Please enter your comments</span>\n\
    <?php } ?>\n</label>\n```\n\nThe PHP code is the same except for the value you\
    \ are looking for in the `$missing` array. It’s the same as the `name` attribute\
    \ for the form element.\n\nSave `contact.php` and test the page again, first by\
    \ entering nothing into any of the fields. The form labels should look like Figure\
    \ 5-3.\n\n![A978-1-4842-0635-5_5_Fig3_HTML.jpg](A978-1-4842-0635-5_5_Fig3_HTML.jpg)\n\
    \n**Figure 5-3.** By validating user input, you can display warnings about required\
    \ fields\n\nAlthough you added a warning to the `<label>` for the `email` field,\
    \ it’s not displayed because `email` hasn’t been added to the `$required` array.\
    \ As a result, it’s not added to the `$missing` array by the code in `processmail.php`.\n\
    \nAdd `email` to the `$required` array in the code block at the top of `comments.php`,\
    \ like this:\n\n```\n$required = ['name', 'comments', 'email'];\n```\n\nClick\
    \ Send message again without filling in any fields. This time, you’ll see a warning\
    \ message alongside each label. Type your name in the Name field. In the Email\
    \ and Comments fields, just press the spacebar several times, then click Send\
    \ message. The warning message alongside the Name field disappears, but the other\
    \ two warning messages remain. The code in `processmail.php` strips whitespace\
    \ from text fields, so it rejects attempts to bypass required fields by entering\
    \ a series of spaces.\n\nIf you have any problems, compare your code with `contact_02.php`\
    \ and `includes/processmail_01.php` in the `ch05` folder.\n\nAll that needs to\
    \ be done to change the required fields is to change the names in the `$required`\
    \ array and add a suitable alert inside the `<label>` tag of the appropriate input\
    \ element inside the form. It’s easy to do because you always use the `name` attribute\
    \ of the form input element.\n\n### Preserving User Input when a Form is Incomplete\n\
    \nImagine you have spent ten minutes filling in a form. You click the Submit button,\
    \ and back comes the response that a required field is missing. It’s infuriating\
    \ if you have to fill in every field all over again. Since the content of each\
    \ field is in the `$_POST` array, it’s easy to redisplay it when an error occurs."
