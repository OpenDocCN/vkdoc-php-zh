    }\n?>\n```\n\n由于每个用户在其唯一的会话中都拥有各自选择的商品，因此在读取会话变量之前会调用`session_start()`函数。之后，建立到MySQL服务器的连接并选择`shopping`数据库。检索`$_SESSION`数组中的电子邮件地址和密码，以防它们被任何网页先前设置过。\n\
    \n`$_SESSION`数组元素只有在用户注册并登录站点时才能被设置；否则，其元素不会被设置。如果`$_SESSION`数组中设置了电子邮件地址和密码（即用户已登录），则会向用户提供两个选项。如果他已经完成购物，必须提供发货信息（见图[4-9](#A978-1-4842-1672-9_4_Chapter.html#Fig9)），或者他可以通过从顶部菜单中选择商品类别来继续购物。但是，如果`$_SESSION`数组中未设置电子邮件地址和密码，则会要求用户登录或创建一个账户。\n\
