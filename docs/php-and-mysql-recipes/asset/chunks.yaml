- fmt: "# PHP字符串处理相关食谱\n\n## 食谱6-4. 使用Heredoc和Newdoc创建长字符串\n\n### 问题描述\n\n通过拼接字符串元素来构建字符串会需要大量额外的字符来处理换行符、转义字符和引号。\n\
    \n### 解决方案\n\n使用Heredoc和Newdoc可以在不使用引号的情况下创建长字符串，同时保留换行符。Heredoc的工作方式类似于双引号字符串，其中包含的任何PHP变量都会被解析为其值；而Newdoc则类似于单引号字符串，不会进行变量替换。\n\
    \nHeredoc和Newdoc字符串都以操作符`<<<`开头，后跟一个名称。对于Heredoc，名称只是一组字符序列；对于Newdoc，则使用单引号括起来的名称。两种类型都会在名称作为行中唯一内容（名称前无空格，名称后有分号终止命令）的位置结束字符串声明。\n\
    \n### 工作原理\n\n不一定要使用`HEREDOC`或`NEWDOC`作为标识符，只要块的开头和结尾使用相同的标识符即可。\n\n```php\n<?php\n\
    // 6_7.php\n// 定义一个Heredoc块\n$h = <<<HEREDOC\nSome string\nvalue\nHEREDOC;\n```\n\
    \n```php\n<?php\n// 6_8.php\n// 定义一个Newdoc块\n$n = <<<'NEWDOC'\nA different\nstring\
    \ value\nNEWDOC;\n```\n\n这些块既可以作为变量赋值使用，也可以作为数组或函数调用中的内联结构使用。在下面的示例中，我们生成了一个包含两个字符串元素的数组：\n\
    \n```php\n<?php\n// 6_9.php\n$a = [\n    <<<HEREDOC\nSome string\nvalue\nHEREDOC\n\
    \    ,\n    <<<HEREDOC\nSecond string\nHEREDOC\n    ,\n];\n```\n\n这将产生以下输出：\n\n\
    ```\nArray\n(\n    [0] => Some string\n    value\n    [1] => Second string\n)\n\
    ```\n\n注意字符串中换行符是如何被保留的。\n\n```php\n<?php\n// 6_10.php\nprintf(\"String = %s\\\
    n\", <<<HEREDOC\nThis is a very long string\nHEREDOC\n);\n```\n\n注意，字符串的结束部分必须是行中唯一的内容，除了用于终止语句的分号外。如果heredoc用作数组声明的一部分，则结束名称必须是行中唯一的内容。用于分隔参数或数组元素的逗号必须放在单独的行上。即使是结束名称后面的空白也会导致解析错误。\n\
    \n使用heredoc定义的文本块对于构建HTML文档的模板非常实用。在接下来的示例中，我们使用数据库查询从数据库中选择两列，遍历它们，并基于两个模板创建HTML片段：\n\
    \n```php\n<?php\n// 6_11.php\n$con = mysqli_connect(\"127.0.0.1\", \"root\", \"\
    secret\", \"book\"); \n$rs = mysqli_query($con, \"select * from person\");\n\n\
    if ($rs) {\n    $persons = array();\n    while($row = mysqli_fetch_assoc($rs))\
    \ {\n        $persons[] = $row;\n    }\n    mysqli_free_result($rs);\n}\nmysqli_close($con);\n\
    \n$person_tpl = <<<HEREDOC\n<div>\n    <span>%first_name%</span>\n    <span>%last_name%</span>\n\
    \    <span>%date_of_birth%</span>\n</div>\nHEREDOC;\n\n$section_tpl = <<<HEREDOC\n\
    <div>%persons%</div>\nHEREDOC;\n\n$html = \"\";\n$p = array();\nforeach ($persons\
    \ as $person) {\n    $r = str_replace('%first_name%', $person['first_name'], $person_tpl);\n\
    \    $r = str_replace('%last_name%', $person['last_name'], $r);\n    $r = str_replace('%date_of_birth%',\
    \ gmdate(\"M j Y\", $person['date_of_birth']), $r);\n    $p[] = $r;\n}\necho str_replace('%persons%',\
    \ implode('', $p), $section_tpl);\n```\n\n内部模板（`$person_tpl`）定义了每个人的布局，外部模板定义了注入所有记录的HTML部分。\n\
    \n---\n\n## 食谱6-5. 字符串转义\n\n### 问题描述\n\n当字符串用作数据库查询的输入时，单引号用于开始和结束字符串值，因此需要指示字符串值中的单引号并非字符串的结束。如果没有正确处理，黑客很容易将恶意代码注入数据库。转义字符串是防止这种情况的最低限度措施。通常，程序员永远不应该信任用户的输入，尤其不应该将任何用户输入（查询字符串、表单提交等）直接注入数据库查询。\n\
    \n### 解决方案\n\n大多数数据库使用反斜杠（`\\`）形式的转义字符串，或者在某些情况下在单引号前添加一个额外的单引号，以指示该引号应该是字符串的一部分。使用`str_replace()`函数将单引号替换为两个单引号是准备用于更新和插入语句的字符串的一种方法。PHP中的许多数据库扩展都支持转义字符串的函数。\n\
    \n使用数据库引擎提供的函数的好处是，它允许数据库根据选定的字符集来处理转义。\n\n有两个函数用于添加和删除字符串中的反斜杠，分别是`addslashes()`和`stripslashes()`。这些函数不应用于转义插入数据库的字符串，而是用于向将要被求值的代码添加反斜杠，或者当输出嵌入在JavaScript代码中的内容时。`addslashes()`函数会转义NULL字符、反斜杠、单引号和双引号。\n\
    \n### 工作原理\n\n在接下来的示例中，我们有一个包含带撇号名称的字符串变量。如果直接使用这个变量，SQL服务器会报错；但如果在插入数据库之前正确转义了字符串变量，则会成功。\n\
    \n```php\n<?php\n// 6_12.php\n$con = mysqli_connect(\"127.0.0.1\", \"root\", \"\
    secret\", \"book\");\n\n// create table strings (\n//   val varchar(250);\n//\
    \ );\n\n$name = \"Mark O'Brian\";\n\n// 这会失败\nmysqli_query($con, \"insert into\
    \ strings (val) values ('{$name}');\"); \n$name = mysqli_escape_string($con, $name);\n\
    \n// 这会成功\nmysqli_query($con, \"insert into strings (val) values ('{$name}');\"\
    );\n```\n\n请记住，你永远不应该信任任何输入。始终验证和转义所有输入到你代码中的内容。\n\n考虑以下代码，其中字符串`$name`可能是用户填写HTML表单中的名字值并提交到服务器的结果：\n\
    \n```php\n<?php\n// 6_13.php\n$con = mysqli_connect(\"127.0.0.1\", \"root\", \"\
    secret\", \"book\");\n\n// create table strings (\n//   val varchar(250);\n//\
    \ );\n\n$name = \"My Name\";\n\n// 这会失败\nmysqli_query($con, \"insert into strings\
    \ (val) values ('{$name}');\");\n```\n\n这段代码中没有任何内容阻止用户向`$name`变量中输入SQL语句。用户不是输入`My\
    \ Name`，而是可以输入`My Name'; delete from strings; --`。这将导致代码执行两条语句：第一条从`strings`表中获取所有匹配的行，第二条删除该表中的所有行。\n\
    \n---\n\n## 食谱6-6. 字符串格式化\n\n### 问题描述\n\n字符串有很多用途，通常需要处理字符串的部分内容。这可能涉及重新排序各部分、添加或删除字符串的部分内容，或者添加HTML标签来格式化字符串。\n\
    \n### 解决方案\n\n可以使用`explode()`函数将字符串转换为数组，该函数接受两个参数。第一个参数是要查找并执行分割的模式，可以是空格字符、换行符或任何其他字符串模式。第二个参数是要转换为数组的字符串。返回值将是一个字符串数组。"
