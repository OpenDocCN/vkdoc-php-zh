- '# 信用卡交易


  在启动电子商务网站之前，您需要做的最后一件事情是实现信用卡处理功能。在本章中，我们将研究如何将此功能构建到您在上一章创建的管道中。


  我们首先探讨信用卡交易背后的理论、帮助您实现信用卡处理的各类组织，以及可能实现的交易类型。接着，我们将以两个组织为例，讨论它们交易 API（应用程序编程接口，即您访问信用卡交易功能的手段）的具体细节。之后，您将构建一个新的类库，通过一些简单的测试代码来使用这些交易
  API 之一。


  最后，您将把该 API 与 HatShop 电子商务应用程序及订单处理管道集成。


  ## 信用卡交易基础


  银行和其他金融机构使用基于 X.25 协议的安全网络进行交易，而非 TCP/IP（传输控制协议/互联网协议，这是数据在互联网上传输的主要方式）。关于 X.25，您无需了解太多，只需知道它是一种与
  TCP/IP 不兼容的不同网络协议即可。因此，X.25 网络与互联网完全隔离。虽然有可能直接接入这些网络，但这不太可能是一个合理的选择。要做到这一点，您可能需要与您要使用的网络所有者进行严肃的谈判。该所有者会希望完全确定您是一位可靠的客户，有能力实施必要的安全措施来防止对其系统的攻击。因此，网络所有者不会轻易向任何人发放这些许可，因为大多数人负担不起所需的安全措施（包括将服务器锁在笼子里、每天通过安全滑道发送备份磁带、需要三个持有不同钥匙的人才能访问这些磁带，等等）。


  另一种选择是通过网关提供商来访问这些网络。这使您能够通过互联网（使用安全协议）执行信用卡交易协议中属于您的那部分操作，同时依赖您选择的网关与 X.25 网络进行通信。


  虽然这可能会产生一些费用，但网关提供商应与金融机构达成协议以保持低成本，并将节省的费用转嫁给您（在网关扣除其份额之后），因此这很可能比拥有自己的 X.25 连接要便宜得多。这种方法也可能比使用像
  PayPal 这样的第三方更便宜，因为当您自行处理订单管道时，只需要最基本的功能。例如，您无需使用像 PayPal 这样的公司提供的所有订单审计功能，因为您已经在上一章中构建了所有这些功能。


  ## 使用信用卡支付网关


  要与网关组织合作，您首先需要开设一个商户银行账户。在大多数银行都可以办理，您将获得一个商户 ID，用于向网关注册。下一步是找到一个合适的网关。不幸的是，这可能是一项艰巨的工作！


  虽然找到网关并不难，但挑战在于找到一个能力胜任且能以您可接受的价格和质量提供服务的网关。实际上，有数百家公司渴望从您的销售额中分一杯羹。在互联网上快速搜索“信用卡网关”会产生一长串结果。这些公司的网站大部分是纯粹的宣传手册——您会发现自己读了好几页文字，内容无非是宣扬他们如何最出色、最安全地从事其业务，但最终只会得到一个需要填写的表格，以便客户服务代表可以致电您“讨论您的需求”。从长远来看，您可以放心，至少您很可能只需要经历一次这个过程。



  '
- "# 信用卡交易\n\n你可能会发现，大多数提供此项服务的机构都提供类似的套餐。然而，需要关注的关键点包括：它们合作的银行（你的商户银行账户必须开设在其中一家）、它们处理的货币，当然还有成本。\n\
  \n在本章中，我们将研究两个易于打交道的机构——`DataCash` 和 `Authorize.net`。\n\n表 15-1 列出了一些可用的网关服务。\n\n\
  **表 15-1. 网关服务**\n\n| **美国** | **网址** | **英国** | **网址** |\n| --- | --- | --- | ---\
  \ |\n| `Authorize.net` | `http://www.authorize.net/` | `Arcot` | `http://www.arcot.com/`\
  \ |\n| `First Data` | `http://www.firstdata.com/` | `WorldPay` | `http://www.worldpay.com/`\
  \ |\n| `Cardservice` | `http://cardservice.com/` | `DataCash` | `http://www.datacash.com/`\
  \ |\n| `ICVerify` | `http://www.icverify.com/` | | |\n\n## DataCash 和 Authorize.net\n\
  \n在本章中，我们将演示如何通过两个在线服务来实现信用卡交易：`DataCash` 和 `Authorize.net`。\n\n`DataCash` 是一家总部位于英国的信用卡网关机构。如果你想在最终应用中使用它，需要拥有一个英国商户银行账户。不过，目前你无需为此担心：获取一个相当有用的测试账户非常容易——你甚至不需要商户银行账户。\n\
  \n正如其官方网站 `http://www.authorize.net` 上所述，`Authorize.net`“提供互联网协议（`IP`）支付网关服务，使商户能够随时随地授权、结算和管理信用卡或电子支票交易。”换句话说，当有人购买你的帽子时，`Authorize.net`\
  \ 也提供了你自行处理信用卡交易所需要的服务。\n\n需要记住的重点是，本章介绍的技巧适用于所有信用卡网关。如果你换用不同的机构，具体细节可能会稍有变化，但大部分繁重的工作已经完成了。\n\
  \n稍后你将看到，`Authorize.net` 和 `DataCash` 都允许你使用所谓的“魔法”信用卡号（分别由 `Authorize.net` 和 `DataCash`\
  \ 提供）执行测试交易，这些卡号会在不执行任何实际金融交易的情况下接受或拒绝交易。这对于开发来说非常棒，因为你不想用自己的信用卡进行测试！\n\n> **注意**\
  \ 本书作者与 `Authorize.net` 或 `DataCash` 没有任何关联。\n\n## 理解信用卡交易\n\n无论你使用哪个网关，信用卡交易的基本原则都是相同的。首先，你在电子商务网站上处理的交易类型被称为卡片不存在（`CNP`）交易，这意味着你面前没有实体信用卡，也无法验证客户签名。这不是问题；毕竟你很可能已经在线、通过电话、邮件等方式进行过一段时间`CNP`交易了。只是当你看到`CNP`这个缩写时需要注意一下。\n\
  \n各种网关还提供一些高级服务，包括持卡人地址验证、安全码检查、欺诈筛查等。这些都会为你的信用卡处理增加一层额外的复杂性，我们在此不详细讨论。相反，本章提供了一个起点，你可以根据需要在之上添加这些服务。是否选择这些可选附加服务，取决于你的系统处理的资金量，以及在实施这些服务的成本与如果发生本可被这些额外服务预防的问题时可能产生的潜在成本之间进行权衡。如果你对这些服务感兴趣，之前提到的“客户服务代表”会很乐意解释。\n\
  \n你可以执行几种类型的交易，包括：\n\n- **授权：** 检查卡内是否有足够资金并执行扣款。\n- **预授权：** 检查卡内资金，如果可用则进行分配，但不立即扣款。\n\
  - **完成：** 完成一项预授权交易，扣除已分配的资金。\n- **退款：** 对已完成交易进行退款，或简单地向信用卡内充值。\n\n同样，具体操作细节可能有所不同，但这些是基本类型。\n\
  \n在本章中，你将使用预授权/完成模式，这意味着你将在指示供应商发货之前才进行收款。这一点在你上一章创建的管道结构中已有所暗示。\n\n## 使用 DataCash\n\
  \n现在我们已经涵盖了基础知识，让我们考虑如何在`HatShop`应用中使用`DataCash`系统让一切运转起来。首先要做的事情是按照以下步骤向`DataCash`申请一个测试账户：\n\
  \n1.  访问 `http://www.datacash.com/`。\n2.  前往网站的 `Support – Integration Info`（支持\
  \ – 集成信息）部分。\n3.  填写你的详细信息并提交。\n4.  根据你收到的邮件，记下你的账户用户名和密码，以及访问`DataCash`报告系统所需的额外信息。\n\
  \n通常，下一步是下载`DataCash`的一个工具包以便于集成。然而，由于`DataCash`不提供`PHP`兼容的实现，你需要使用`XML` `API`来执行交易。基本上，这涉及使用\
  \ SSL 连接将`XML`请求发送到特定 URL，然后解析`XML`结果。如果你的计算机安装了`CURL`（客户端 URL 库函数）库并且`PHP`能识别它（参见附录\
  \ A），那么在`PHP`中这很容易实现。\n\n在与`DataCash`通信时，你会进行大量的`XML`操作，因为你需要创建要发送给`DataCash`的`XML`文档，并从`XML`响应中提取数据。在接下来的几页中，我们将快速浏览你将执行的操作所需的`XML`以及可以预期的响应。\n\
  \n### 预授权请求\n\n当你向`DataCash`发送预授权请求时，需要包含以下信息：\n\n- `DataCash` 用户名（称为 `DataCash\
  \ Client`）\n- `DataCash` 密码\n- 唯一的交易参考号（本节稍后解释）\n- 要借记的金额\n- 交易使用的货币（`USD`、`GBP`\
  \ 等）\n- 交易类型（预授权代码为 `pre`，完成代码为 `fulfil`）\n- 信用卡号\n- 信用卡有效期\n- 信用卡发行日期（如果适用于所使用的信用卡类型）\n\
  - 信用卡发行编号（如果适用于所使用的信用卡类型）\n\n唯一的交易参考号必须是一个 6 到 12 位数字之间的数字，你用它来唯一标识一笔交易与一个订单的关联。因为你不能使用短数字，所以不能直接使用到目前为止用来标识订单的订单\
  \ ID 值。但是，你可以将此订单 ID 作为创建参考号的起点，只需加上一个较大的数字，例如 `1,000,000`。你不能在未来的任何交易中重复使用这个参考号，因此可以确保一笔交易完成后不会再次执行，否则可能会导致向客户重复收费。不过，这也意味着如果信用卡被拒绝，你可能需要为客户创建一个全新的订单，但如果有必要，这应该不是问题。\n\
  \n\n\nXML 请求的格式如下，其中之前详述的值以粗体显示：\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"\
  ?>\n<Request>\n    <Authentication>\n        <password>**DataCash 密码**</password>\n\
  \        <client>**DataCash 客户端**</client>\n    </Authentication>\n    <Transaction>\n\
  \        <TxnDetails>\n            <merchantreference>**唯一参考号**</merchantreference>\n\
  \            <amount currency='货币类型'>**现金金额**</amount>\n        </TxnDetails>\n\
  \        <CardTxn>\n            <method>**pre**</method>\n            <Card>\n \
  \               <pan>信用卡号</pan>\n                <expirydate>信用卡到期日</expirydate>\n\
  \            </Card>\n        </CardTxn>\n    </Transaction>\n</Request>\n```\n\n\
  ## 预授权请求的响应\n\n预授权请求的响应包含以下信息：\n\n-   一个状态码，用于指示发生了什么；如果交易成功，状态码为 `1`；如果发生其他情况，则为若干其他代码之一。有关\
  \ DataCash 服务器返回码的完整列表，请参阅 https://testserver.datacash.com/software/returncodes.shtml。\n\
  -   状态的原因，基本上是一个用英文解释状态的字符串。对于状态 `1`，该字符串为 `ACCEPTED`。\n-   一个授权码和一个参考号，用于在履约请求阶段（接下来讨论）完成交易。\n\
  -   交易处理的时间。\n-   交易模式，使用测试账户时为 `TEST`。\n-   确认所使用的信用卡类型。\n-   确认信用卡的发行国家。\n-  \
  \ 银行使用的授权码（仅供参考）。\n\n其对应的 XML 格式如下：\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<Response>\n    <status>状态码</status>\n    <reason>原因</reason>\n    <merchantreference>授权码</merchantreference>\n\
  \    <datacash_reference>参考号</datacash_reference>\n    <time>时间</time>\n    <mode>TEST</mode>\n\
  \    <CardTxn>\n        <card_scheme>卡类型</card_scheme>\n        <country>国家</country>\n\
  \        <issuer>发卡行</issuer>\n        <authcode>银行授权码</authcode>\n    </CardTxn>\n\
  </Response>\n```\n\n## 履约请求\n\n对于履约请求，您需要发送以下信息：\n\n-   DataCash 用户名（DataCash 客户端）\n\
  -   DataCash 密码\n-   交易类型（对于履约，代码为 `fulfil`）\n-   之前收到的授权码\n-   之前收到的参考号\n\n可选地，您可以包含其他信息，例如确认要从信用卡中扣除的金额，尽管这并非必需。\n\
  \n其格式如下：\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<Request>\n    <Authentication>\n\
  \        <password>DataCash 密码</password>\n        <client>DataCash 客户端</client>\n\
  \    </Authentication>\n    <Transaction>\n        <HistoricTxn>\n            <reference>参考号</reference>\n\
  \            <authcode>授权码</authcode>\n            <method>fulfil</method>\n   \
  \     </HistoricTxn>\n    </Transaction>\n</Request>\n```\n\n## 履约响应\n\n履约请求的响应包含以下信息：\n\
  \n-   一个状态码，用于指示发生了什么；如果交易成功，状态码为 `1`；如果发生其他情况，则为若干其他代码之一。同样，有关代码的完整列表，请参阅 https://testserver.datacash.com/software/returncodes.shtml。\n\
  -   状态的原因，基本上是一个用英文解释状态的字符串。对于状态 `1`，该字符串为 `FULFILLED OK`。\n-   两份供 DataCash 使用的参考代码副本。\n\
  -   交易处理的时间。\n-   交易模式，使用测试账户时为 `TEST`。\n\n其对应的 XML 格式如下：\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<Response>\n    <status>状态码</status>\n    <reason>原因</reason>\n\
  \    <merchantreference>参考代码</merchantreference>\n</Response>\n```\n\n\n\n<datacash_reference>参考代码</datacash_reference>\n\
  \n<time>时间</time>\n\n<mode>测试模式</mode>\n\n</Response>\n\n## 与 DataCash 交换 XML 数据\n\
  \n由于需要发送给 DataCash 的 XML 数据结构简单且标准，我们将在字符串中手动构建它，而不使用 PHP 5 提供的 XML 支持。不过，我们将利用\
  \ PHP 5 的 `SimpleXML` 扩展，它让读取简单的 XML 数据变得轻而易举。\n\n尽管 `SimpleXML` 扩展不如 `DOMDocument`\
  \ 复杂和强大，但它通过将 XML 数据转换为可直接迭代的数据结构，使得解析 XML 数据变得简单。你首次接触 `SimpleXML` 扩展是在第 11 章。\n\
  \n> **注意** 在与 DataCash 通信的代码中，我们使用了 CURL 库（<http://curl.haxx.se/>）。请阅读附录 A 获取完整的安装说明。在\
  \ Linux 下，安装过程可能更复杂，但如果你在 Windows 下运行 PHP，只需将 PHP 包中的 `libeay32.dll` 和 `ssleay32.dll`\
  \ 复制到 Windows 安装目录的 `System32` 文件夹中，然后取消 `php.ini`（默认位于 Windows 安装文件夹）中以下行的注释（去掉前导分号），最后重启\
  \ Apache：`extension=php_curl.dll`。\n>\n> 有关 CURL 库的更多详情，请查看 <http://www.zend.com/pecl/tutorials/curl.php>\
  \ 上的优秀教程。PHP 对 CURL 支持的官方文档位于 <http://www.php.net/curl>。\n\n## 练习：与 DataCash 通信\n\
  \n1. 在 `business` 文件夹中创建一个名为 `datacash_request.php` 的新文件，并向其中添加以下代码：\n\n```php\n\
  <?php\n\nclass DataCashRequest\n{\n    // DataCash 服务器 URL\n    private $_mUrl;\n\
  \n    // 将保存当前要发送给 DataCash 的 XML 文档\n    private $_mXml;\n\n    // 构造函数，用 DataCash\
  \ 的 URL 初始化类\n    public function __construct($url)\n    {\n        // DataCash\
  \ URL\n        $this->_mUrl = $url;\n    }\n\n    /* 为向 DataCash 发送预授权请求编写 XML 结构\
  \ */\n    public function MakeXmlPre($dataCashClient, $dataCashPassword, $merchantReference,\
  \ $amount, $currency,\n                              $method, $cardNumber, $expiryDate,\n\
  \                              $startDate = '', $issueNumber = '')\n    {\n    \
