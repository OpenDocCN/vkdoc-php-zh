  trans: '

    # 访问密钥 ID 无法做到的事


    访问密钥 ID 无法做到的是，让你通过网站销售的亚马逊产品获得佣金。要获得收入，你需要申请一个`关联者 ID`。这个`关联者 ID`将用于你在亚马逊专区展示的“从亚马逊购买”链接，亚马逊通过它来识别你是该笔销售的来源。


    `关联者 ID`甚至可用于包含亚马逊产品链接的静态网页，并且无需你同时拥有用途不同的 ECS 访问密钥 ID。


    因此，在进一步操作之前，如果你想通过“亚马逊超级帽子”专区赚钱，请前往 `http://associates.amazon.com/gp/associates/apply/main.html`
    获取你的`关联者 ID`。否则，如果你目前只对学习 ECS 感兴趣，可以跳过这一步。


    ## 使用 REST 访问亚马逊电子商务服务


    访问 REST Web 服务需要请求一个格式正确的 URL。请在浏览器中尝试以下链接（别忘了将字符串 `[Your Access Key ID]` 替换为你之前获得的真实访问密钥
    ID）：


    ```

    http://webservices.amazon.com/onca/xml?Service=AWSECommerceService

    &AWSAccessKeyId=[Your Access Key ID]

    &Operation=ItemLookup

    &IdType=ASIN

    &ItemId=159059648X

    ```


    **提示：** 请确保将整个 URL 输入为单行；这里将其拆分为独立元素是为了便于阅读。


    你的浏览器将显示一个包含你正在阅读的书籍信息的 XML 结构。图 17-3 展示了 Firefox 中显示的 XML 结构，它清晰地呈现了 XML 文档树。


    ---


    **图 17-3.** *Web 服务请求的 XML 响应*


    很酷吧？你刚刚见证了 REST 的实际应用。亚马逊数据库中的每个产品都有一个唯一的标识符，称为 ASIN（亚马逊标准商品编号）。对于图书，ASIN 就是图书的
    ISBN（本书的 ASIN 为 `159059648X`）。


    你刚刚发出的 Web 服务请求向 ECS 传达了以下信息：我有一个访问密钥 ID（`AWSAccessKeyId=[Your Access Key ID]`），我想执行一项商品查询操作（`&Operation=ItemLookup`），以了解更多关于
    ASIN 为 `159059648X` 的产品信息（`&IdType=ASIN&ItemId=159059648X`）。


    在这个例子中，你并没有获得关于这本书的详细信息——没有价格或库存信息，也没有封面图片或客户评论的链接。ECS 4.0 引入了更精细的数据控制方式，即使用响应组（响应组是一组关于产品的信息集合）。


    **注意：** 在撰写本文时，ECS 提供了超过 35 个可能的响应组列表。在本书中，我们只会解释 HatShop 所用响应组的作用；完整的列表请查阅 ECS
    文档。


    ---


    那么，让我们通过使用响应组来请求更多数据。在你之前组合的链接末尾，添加以下字符串以获取关于本书的更具体信息：


    `&ResponseGroup=Request,SalesRank,Small,Images,OfferSummary`


    完整的链接应如下所示：


    ```

    http://webservices.amazon.com/onca/xml?Service=AWSECommerceService

    &AWSAccessKeyId=[Your Access Key ID]

    &Operation=ItemLookup

    &IdType=ASIN

    &ItemId=159059648X

    ```

