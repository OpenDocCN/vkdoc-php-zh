- fmt: "```sql\nUPDATE poll SET yes = yes + 1\nWHERE poll_id = 1\n```\n\nWe can execute\
    \ this statement in the same matter as previously discussed.\n\n![](images/323857_3_En_6_Chapter/323857_3_En_6_Fig8_HTML.jpg)\n\
    \nAn image of the PhpMyAdmin application showing SQL Query from the browse page\
    \ under Poll table.\n\n**Figure 6-8**  \nResult after update to poll table\n\n\
    We can see that the `yes` property of the first row of data in the poll is incremented\
    \ to `1`. If we run the same SQL statement again, `yes` will be incremented to\
    \ a value of `2`. Note how the `WHERE` clause limits which rows will be affected\
    \ by the update. Only the row with a `poll_id` of `1` will be affected. Any other\
    \ rows in the table will not be updated, because of the `WHERE` clause.\n\n##\
    \ Secure Programming\n\nAn `UPDATE` statement without a `WHERE` clause would update\
    \ the `yes` attribute of all rows in the poll table. In this case, there is just\
    \ one row, so the `WHERE` clause isn’t absolutely necessary. However, most tables\
    \ you will work with will have much more than just one row, so it’s vital that\
    \ the row(s) be explicitly declared. Otherwise, attributes might be updated that\
    \ should not have, which will corrupt the data in the database. Now that we have\
    \ gained some basic SQL knowledge, it is time to code for our database-driven\
    \ site poll.\n\n## Coding a Database-Driven Site Poll\n\nObviously, our program\
    \ will connect to a database from PHP, and additional PHP scripts will display\
    \ the content for the site. PHP is a very forgiving language, and we can approach\
    \ this task in many ways. But some ways are more scalable than others. Some that\
    \ seem easy at first can transform code into a completely disorganized, tangled,\
    \ spaghetti mess. Let’s use a tried-and-tested approach to code architecture that\
    \ can be scaled to accommodate complex projects. While this is overkill for our\
    \ simple site poll, it gives us an opportunity to introduce the *model-view-controller*\
    \ (MVC) design technique.\n\n## Separating Concerns with MVC\n\nThe model-view-controller\
    \ (MVC) design pattern is a common approach to organizing scripts consistently.\
    \ Using a consistent approach to organizing your scripts can help you develop\
    \ and debug faster and more efficiently. The MVC framework is built upon the basic\
    \ principles as defined by model-view-controller. Once you are familiar with the\
    \ basic concepts, there are many MVC frameworks available to logically organize\
    \ your PHP projects. Some of these include CodeIgniter, CakePHP, and Yii. These\
    \ frameworks will aid in designing and developing more complex web applications.\n\
    \nAt its most basic, MVC separates coding concerns into, you guessed it, three\
    \ categories: models, views, and controllers. A *model* is a piece of code that\
    \ represents data. Your models should also hold most logic involved in the system\
    \ you’re building. A *view* is a piece of code that shows information visually.\
    \ The information to be displayed by the view is received from a model. A *controller*\
    \ is a piece of code that retrieves input from users and sends commands to relevant\
    \ model(s). In short, MVC separates user interactions from visual representation\
    \ from system logic and data. This provides the ability to divide large projects\
    \ in which an HTML expert can create the views, a database expert can create the\
    \ models, and a PHP programmer can create the controllers. We can also include\
    \ multiple views which allow the code to be used both on the Web and in applications,\
    \ without any major changes.\n\n> **Note**  \n> You can read much more about MVC\
    \ at [`http://en.wikipedia.org/wiki/Model-view-controller`](http://en.wikipedia.org/wiki/Model-view-controller).\n\
    \nWe have already seen examples of separating code into model, view, and controller.\
    \ Remember how we made a template for HTML pages? We worked with a view that held\
    \ a bare-bones HTML page skeleton. You can find it in the gallery we started building\
    \ in Chapter [4](#323857_3_En_4_Chapter.xhtml). The view is located in `ch4/templates/page.php`.\
    \ In the same project, we created a model related to that view: the `ch4/classes/Page_Data.class.php`,\
    \ which declares a number of methods and properties related to the content of\
    \ the HTML pages. The model and view were hooked up through a controller. In `ch4/index.php`,\
    \ we assigned values to the model and made the model available to the view. It\
    \ displayed a well-formed HTML5 page. Thus, `index.php` was our controller.\n\n\
    In this book, the aim is to use a simple implementation of MVC. Most other MVC\
    \ implementations you will come across are likely to be much more elaborate. You\
    \ can easily find many MVC examples that are not meant for beginning programmers.\
    \ Once you understand the basic MVC principles and have gained some experience\
    \ working with those principles in a simple context, you will find it much easier\
    \ to understand the more elaborate implementations.\n\n**Exercise:** Now that\
    \ we have discovered that we have used MVC for our previous projects, return to\
    \ the last project in Chapter [4](#323857_3_En_4_Chapter.xhtml). Change the folder\
    \ names to indicate the model, view, and controller for the project. Make the\
    \ necessary coding changes (it should not be very much) to reference the proper\
    \ files within the new folders.\n\n## Planning the Logic\n\nLet’s keep the poll\
    \ simple. We will create an `index.php` to output a valid HTML5 page that will\
    \ show the poll. The index will be a *front controller*. A front controller is\
    \ a design pattern very often seen in MVC web applications. A front controller\
    \ is a single \"entrance door\" to a web application. We have already used a front\
    \ controller in previous projects. Remember how `index.php` has been the only\
    \ script loaded directly in your browser? It’s a front controller.\n\n> **Note**\
    \  \n> The front controller design pattern is well documented online. You could\
    \ start your own research at [`http://en.wikipedia.org/wiki/Front_Controller_pattern`](http://en.wikipedia.org/wiki/Front_Controller_pattern).\n\
    \nAs in the previous projects, `index.php` will output a valid HTML5 page, and\
    \ it will load the poll controller. The poll controller should return the poll\
    \ as HTML, so it can be displayed on `index.php`. Note how every view has its\
    \ own model and its own controller (Figure [6-7](#323857_3_En_6_Chapter.xhtml#Fig7)).\n\
    \n![](images/323857_3_En_6_Chapter/323857_3_En_6_Fig9_HTML.png)\n\nA flowchart\
    \ of the distribution of responsibilities starts from the front (page) controller\
    \ to Models-Views-Controllers.\n\n**Figure 6-9**  \nDistribution of responsibilities\n\
    \nNotice the poll model, the poll controller, and the poll view. These three work\
    \ together to display a functional poll. We can also see that the page has its\
    \ own model, view, and controller. The front controller is the page controller.\n\
    \n## Creating the Poll Project\n\nLet’s organize our project logically using the\
    \ basic MVC structure. We will create a new folder, `ch6`, in our executable folder\
    \ (in XAMPP it’s the `htdocs` folder) and another folder, `poll`, inside this\
    \ folder. We will also create three folders inside of the `poll` folder: `models`,\
    \ `views`, and `controllers`. We can now copy the `PrivatePage.php` program from\
    \ the `template` folder in `ch4` to the `views` folder under `poll` (rename it\
    \ `page.php`). We can also copy the `Private_Page_Data.class.php` program from\
    \ the `ch4 classes` folder into the `models` folder (rename it `Page_Data.class.php`).\
    \ Of course, we could also download the files for this chapter from the publisher’s\
    \ website.\n\nNow let’s create our first version of the `index.php` program to\
    \ test everything. It will be placed directly under the `poll` folder."
