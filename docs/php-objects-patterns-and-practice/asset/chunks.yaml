    print $p->calculateTax(100) . "\n";

    print $p->generateId() . "\n";

    ```


    By applying both `PriceUtilities` and `IdentityTrait` with the `use` keyword,
    I make the `calculateTax()` and the `generateId()` methods available to the `ShopProduct`
    class. This means the class offers both the `calculateTax()` and `generateId()`
    methods.


    Note


    The `IdentityTrait` trait provides the `generateId()` method . In fact, a database
    often generates identifiers for objects, but you might switch in a local implementation
    for testing purposes. You can find out more about objects, databases, and unique
    identifiers in Chapter [12](#A314621_5_En_12_Chapter.html), which covers the Identity
    Map pattern. You can learn more about testing and mocking in Chapter [18](#A314621_5_En_18_Chapter.html).


    ### Combining Traits and Interfaces


    Although traits are useful, they don’t change the type of the class to which they
    are applied. So when you apply the `IdentityTrait` trait to multiple classes,
    they won’t share a type that could be hinted for in a method signature.


    Luckily, traits play well with interfaces. I can define an interface that requires
    a `generateId()` method, and then declare that `ShopProduct` implements it:


    ```

    // listing 04.20

    interface IdentityObject

    {

    public function generateId(): string;

    }

