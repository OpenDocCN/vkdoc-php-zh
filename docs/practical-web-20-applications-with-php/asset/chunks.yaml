    **Other Element Extensions**


    In the previous section I stated that when using a function such as $() or $$()
    in Prototype, the returned elements are extended. That is, they are given extra
    functionality that is not normally available when programming in JavaScript. We
    looked at a couple of these added functions (namely show() and hide()), but there
    are many more functions provided. We will take a brief look at the some of the
    more useful of these and at how you can use them in your everyday JavaScript development.


    Note that which extensions are added depends on the type of element. That is,
    some new functions will be only available for arrays, and others only for strings.
    Some new functions are available to all elements.


