  \ |\n\n\n\n### 5.11 PHP-GTK\n\n`PHP-GTK`是一个官方的 PHP 扩展，它提供了从 PHP 到 GTK+控件工具包的直接绑定。第一个版本于\
  \ 2001 年发布，该项目取得了一定的成功。然而，近年来该项目的活动有所减少，在撰写本文时，官方网站（`gtk.php.net`）上的最新帖子大约是五年前的\
  \ 2010 年。尽管如此，代码成熟且相当完整/稳定，并且入门相对容易。\n\n优点：\n\n*   提供对 GTK+工具包的直接绑定\n*   对工具包元素进行快速且完整的控制\n\
  *   官方支持的 PHP 项目\n*   有诸如`Glade`之类的工具可用于帮助界面设计和布局，并且跨平台\n*   像`PriadoBlender`、`Roadsend\
  \ PHP`和`bcompiler`这样的 PHP 编译器对`php-gtk`提供了一些支持\n*   通过 PEAR 仓库可以获得各种额外的 GTK 组件\n\
  \n缺点：\n\n*   项目缺乏活动引发对其未来方向（如果有的话）的疑问\n*   `GTK+`在所有平台上看起来都不像原生工具，`GTK+`应用的外观和体验在\
  \ Linux 类操作系统上最为自然。\n*   `GTK+`本身不如以前流行，尽管作为一个项目它仍然非常活跃并且正在发展\n\n| ![](img/image00249.gif)\
