    `true` only if the password is correct.


    PHP Solutions 9-3 to 9-8 build a simple yet effective user authentication system
    that doesn’t require a database backend. However, it does have its limitations.
    Above all, it’s essential that the CSV file containing the usernames and passwords
    be located outside the server root. Also, once you get more than a few records,
    querying a database is usually much faster than looping through a CSV file line
    by line. [Chapter 17](#A978-1-4842-0635-5_17_Chapter.html) covers user authentication
    with a database.


