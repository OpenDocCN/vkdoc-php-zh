  \n> **注意：** 你可以在 [`php.net/manual/en/book.reflection.php`](http://www.php.net/manual/en/book.reflection.php)\
  \ 阅读更多关于 PHP 反射 API 的内容。\n\n### 问题\n\n1.  我们的自动加载器在类名和文件夹层级之间进行转换。相比于使用四个 `include`/`require`\
  \ 语句，这对我们有什么好处？\n2.  我们设置了一些包含处理特定数据类型实用方法的静态类。为什么这比我们在全局命名空间中创建相同的方法更好？\n3.  借助\
  \ `Inspector` 类，我们现在可以使用代码评估特殊的注释块以获取信息。这在后续章节中对我们有何益处？\n\n### 答案\n\n1.  类的自动加载远优于手动包含/引入类，尤其是在大型系统中。这是因为我们不再需要记住要手动包含/引入哪些依赖项。它也更加高效，因为只有在需要使用时才会加载。\n\
  2.  我们在全局命名空间中放置的内容越少越好。静态类是以面向对象方式处理这些方法的理想方法。\n3.  我们将能够定义和检查不同类型的标志和键/值对。这可以像判断方法/属性是否应该能从\
  \ `Router` 访问那样简单，也可以像指定在被检查的方法之前或之后是否应该调用其他方法那样复杂。\n\n### 练习\n\n1.  尝试添加一些代码，用于跟踪加载依赖项所花费的时间，以及加载了哪些依赖项。\n\
  2.  尝试创建一些包含特殊注释（带有元属性）的类，然后这些注释可以被检查。\n\n---\n\n## 第三章 — 基类\n\n使用面向对象范式构建 MVC 框架的优点之一，是我们能够以最小的努力重用代码。任何时候，我们可能都需要向大多数类添加核心功能，一个好的面向对象基础将帮助我们做到这一点。\n\
  \n想象一下，我们用新构建的框架开发一个应用程序，突然需要在整个应用程序中添加新的安全措施。我们可以修改每个控制器，调用重复的函数或引用共享函数，但最好的解决方案是在继承链的更高层级添加共享功能。\n\
  \n如果我们所有的框架类都继承自一个基类，我们只需修改这一个类，就能轻松添加这类功能。这就是继承对我们的框架有好处的例子。在接下来的章节中，我们还会探讨它的其他用途。\n\
  \n### 目标\n\n-   我们需要使用上一章创建的 `Inspector` 类来检查 `Base` 类及其任何子类的方法/属性。\n-   根据检索到的元数据，我们需要确定某些属性是否应该被视为拥有\
  \ getter/setter。\n\n### Getter 和 Setter\n\n在本章中，我们将探讨如何创建一个坚实的基类，使我们能够使用自己编写的检查器代码来创建\
  \ getter/setter。这些 getter/setter 将是公共访问点，用于访问受保护的类属性。在开始之前，让我们看一些例子，如列表 3-1 所示。\n\
  \n***列表 3-1.*** 可公开访问的属性\n\n```php\nclass Car\n{\n    public $color;\n    public\
  \ $model;\n}\n\n$car = new Car();\n$car->color = \"blue\";\n$car->model = \"b-class\"\
  ;\n```\n\n在这个例子中，`Car` 类的属性是公开可访问的。这就是 PHP 4（及更早版本）处理所有类属性和方法的方式。自 PHP 5 发布以来，PHP\
  \ 开发者已经开始能够使用属性/方法作用域——这是大多数其他面向对象语言早已允许的特性。\n\n使用实例/类属性的主要原因是影响实例/类方法逻辑的执行。因此，我们经常希望防止外部干扰，或者至少使用通常所说的\
  \ getter/setter 来拦截这种干扰。\n\n考虑列表 3-2 中给出的例子。\n\n***列表 3-2.*** 应该是私有的/受保护的变量\n\n\
  ```php\nclass Database\n{\n    public $instance;\n\n    public function __construct($host,\
  \ $username, $password, $schema)\n    {\n        $this->instance = new MySQLi($host,\
  \ $username, $password, $schema);\n    }\n\n    public function query($sql)\n  \
  \  {\n        return $this->instance->query($sql);\n    }\n}\n\n// 你应该指定与你的数据库匹配的用户名、密码和模式\n\
  $database = new Database(\"localhost\", \"username\", \"password\", \"schema\");\n\
  $database->instance = \"cheese\";\n\n$database->query(\"select * from pantry\");\n\
  ```\n\n在这个例子中，当我们创建一个新的 `Database` 实例时，我们的类会打开一个到 MySQL 数据库的连接。由于 `$instance` 属性是公开的，它可以随时在外部被修改。它不是一个有效的数据库连接器实例；调用\
  \ `query()` 方法将会引发异常。实际上，我们通过将 `$instance` 属性设置为 `\"cheese\"` 来做到这一点，这使得后续对 `query()`\
  \ 方法的调用会引发异常。\n\n让我们看看 getter/setter 如何帮助我们避免这个问题，如列表 3-3 所示。\n\n***列表 3-3.*** 保护敏感变量\n\
  \n```php\nclass Database\n{\n    protected $_instance;\n\n    public function getInstance()\n\
  \    {\n        throw new Exception(\"Instance is protected\");\n    }\n\n    public\
  \ function setInstance($instance)\n    {\n        if ($instance instanceof MySQLi)\n\
  \        {\n            $this->_instance = $instance;\n        }\n        throw\
  \ new Exception(\"Instance must be of type MySQLi\");\n    }\n\n    public function\
  \ __construct($host, $username, $password, $schema)\n    {\n        $this->_instance\
  \ = new MySQLi($host, $username, $password, $schema);\n    }\n\n    public function\
  \ query($sql)\n    {\n        return $this->_instance->query($sql);\n    }\n}\n\
  ```\n\n现在，我们的数据库连接实例受到了保护，免受外部干扰。我们的类还会提供一些有用的信息，说明如何处理与 `$instance` 属性的交互，这对其他开发者很有帮助。\n\
  \n顾名思义，getter/setter 是用于获取或设置某些内容的方法。它们通常是实例方法，在允许外部访问内部变量时被视为最佳实践。它们通常遵循 `getProperty()`/`setProperty()`\
  \ 的模式，其中 `Property` 可以是任何名词。让我们看看我们的 `Car` 类使用 getter/setter 后会是什么样子，如列表 3-4 所示。\n\
  \n***列表 3-4.*** 简单的 Getter/Setter\n\n```php\nclass Car\n{\n    protected $_color;\n\
  \    protected $_model;\n\n    public function getColor()\n    {\n        return\
  \ $this->_color;\n    }\n\n    public function setColor($color)\n    {\n       \
  \ $this->_color = $color;\n        return $this;\n    }\n\n    public function getModel()\n\
  \    {\n        return $this->_model;\n    }\n\n    public function setModel($model)\n\
  \    {\n        $this->_model = $model;\n        return $this;\n    }\n}\n\n$car\
  \ = new Car();\n$car->setColor(\"blue\");\n$car->setModel(\"b-class\");\n```\n\n\
  这里有几件重要的事情需要注意。首先，我们实际上需要自己创建 getter/setter 方法。其他一些语言会自动执行此操作，或者用更少的代码就能实现，但 PHP\
  \ 本身并不支持 getter/setter。\n\n\n\n"
- "# 不使用公有属性\n我们应将属性设为受保护/私有，而非公有属性。目的是仅允许通过 getter/setter 进行访问。`getColor()` 和 `getModel()`\
  \ 方法仅返回这些受保护属性的值。`setColor()` 和 `setModel()` 方法则为这些受保护属性设置值，并返回 `$this`。由于我们返回了\
  \ `$this`，因此可以链式调用 setter 方法。\n\n这些 getter/setter 确实非常简单，但我们完全可以为其添加额外逻辑，例如在 setter\
  \ 中进行验证，或在 getter 中执行转换。\n\n### 魔术方法\nPHP 在原生 getter/setter 支持方面的不足，通过魔术方法得到了弥补。顾名思义，魔术方法能执行普通函数/方法之外的功能。我们已经见过两个魔术方法：`__construct()`\
  \ 和 `__destruct()`。\n\n我们将重点关注的魔术方法是 `__call()`。`__call()` 是一个实例方法，当在类实例上调用未定义的方法时，它会被触发。换句话说，如果你调用了一个尚未定义的方法，类的\
  \ `__call()` 方法将会被调用。让我们看一下清单 3-5 中的示例。\n\n#### 清单 3-5. `__call()` 方法\n\n```php\n\
  class Car\n{\n    public function __call($name, $arguments)\n    {\n        echo\
  \ \"hello world!\";\n    }\n}\n\n$car = new Car();\n$car->hello();\n```\n\n我们并没有在\
  \ `Car` 类上定义 `hello()` 方法，但当执行这段代码时，可以看到 `__call()` 方法会被运行，并输出字符串 `\"hello world!\"\
  `。这是因为当在 `Car` 实例上调用未定义方法时，`__call()` 会自动被调用。\n\n我们可以利用这一点。如果我们期望 getter/setter\
  \ 遵循 `getProperty()`/`setProperty()` 的格式，就可以创建一个 `__call()` 方法，该方法能解释我们试图访问的具体属性，并执行相应的更改或返回正确的数据。具体该如何操作呢？请查看清单\
  \ 3-6 中的示例。\n\n#### 清单 3-6. 使用 `__call()` 实现 Getter/Setter\n\n```php\nclass Car\n\
  {\n    protected $_color;\n    protected $_model;\n    public function __call($name,\
  \ $arguments)\n    {\n        $first = isset($arguments[0]) ? $arguments[0] : null;\n\
  \        switch ($name)\n        {\n            case \"getColor\":\n           \
  \     return $this->_color;\n            case \"setColor\":\n                $this->_color\
  \ = $first;\n                return $this;\n            case \"getModel\":\n   \
  \             return $this->_model;\n            case \"setModel\":\n          \
  \      $this->_model = $first;\n                return $this;\n        }\n    }\n\
  }\n\n$car = new Car();\n$car->setColor(\"blue\")->setModel(\"b-class\");\necho $car->getModel();\n\
  ```\n\n在这个例子中，我们可以注意到几个重要事项。首先，`__call()` 方法总是接收两个参数：被调用方法的 `$name`，以及调用该方法时传入的\
  \ `$arguments` 数组。\n\n如果没有传入参数，这个数组将为空。\n\n然后，我们需要处理所有可能被调用的访问器方法，这里我们使用了 `switch`\
  \ 语句。我们也可以使用大量的 `if`/`else` 语句，但对于一组预设的方法列表，`switch` 是最佳选择。你可能注意到我们不需要使用 `break`\
  \ 语句，因为 `return` 语句会阻止后续 case 的执行。\n\n在这个例子中，不同属性的 getter/setter 逻辑差异很小。复用整个外围代码结构，只为处理每个单独属性而实现少量必要代码行，远比针对每个属性重复编写相同的主体代码更为合理。\n\
  \n### 添加内省功能\n这种方法对于数量有限的非公有属性来说效果不错，但如果我们能处理大量非公有属性，甚至无需重复任何代码，那岂不更好？我们可以通过结合运用所学的\
  \ `__call()` 方法知识，以及之前构建的 `Inspector` 类来实现这一点。\n\n想象一下，我们只需在受保护属性周围添加注释，就能让 `Base`\
  \ 类自动创建这些 getter/setter，如清单 3-7 所示。\n\n\n\n**清单 3-7.** 通过注释创建 Getter/Setter 方法\n\
  \n```php\nclass Car extends Framework\\Base\n{\n    /**\n     * @readwrite\n   \
  \  */\n    protected $_color;\n\n    /**\n     * @write\n     */\n    protected\
  \ $_model;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章\
  \ ■ 基类\n\n```php\n$car = new Car();\n$car->setColor(\"blue\")->setModel(\"b-class\"\
  );\necho $car->getColor();\n```\n\n为了实现这样的功能，我们需要确定要读取或修改的属性名称，并根据注释中的 `@read`/`@write`/`@readwrite`\
  \ 标记来确定是否允许读取或修改。让我们先来看看 `Base` 类的结构，如清单 3-8 所示。\n\n**清单 3-8.** Base 类的 `__construct()`\
  \ 方法\n\n```php\nnamespace Framework\n{\n    use Framework\\Inspector as Inspector;\n\
  \    use Framework\\ArrayMethods as ArrayMethods;\n    use Framework\\StringMethods\
  \ as StringMethods;\n    use Framework\\Core\\Exception as Exception;\n\n    class\
  \ Base\n    {\n        private $_inspector;\n\n        public function __construct($options\
  \ = array())\n        {\n            $this->_inspector = new Inspector($this);\n\
  \n            if (is_array($options) || is_object($options))\n            {\n  \
  \              foreach ($options as $key => $value)\n                {\n       \
  \             $key = ucfirst($key);\n                    $method = \"set{$key}\"\
  ;\n                    $this->$method($value);\n                }\n            }\n\
  \        }\n    }\n}\n```\n\n■ **注意** 在第 2 章中，我提到过我们将使用自定义的 Exception 子类。你在清单 3-8\
  \ 中看到的 `Framework\\Core\\Exception` 类正是这样一个类。你可以自己定义这些类，它们只需要继承 PHP 已提供的内置异常类即可。你甚至可以在后续的代码清单中省略命名空间，直接使用\
  \ `\\Exception(\"…\")`。\n\n私有属性和方法即使对于子类也无法共享，因此我尽可能将成员声明为 protected。对于 `$_inspector`\
  \ 属性，我们将其声明为 private，因为我们只会在 `Base` 类的 `__call()` 方法中使用它，并且不想将 `$_inspector` 添加到子类的类作用域中，因为框架中的其他所有类都将继承自它。`$_inspector`\
  \ 属性实际上只是保存了一个 `Inspector` 类的实例，我们将用它来识别哪些属性需要重载其 getter/setter 方法。与我们之前在 `Car`\
  \ 类中实现 getter/setter 的方式类似，我们将在 `Base` 类中使用 `__call()` 魔术方法来处理 getter/setter，如清单\
  \ 3-9 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 ■ 基类\n\n\
  **清单 3-9.** `__call()` 方法\n\n```php\nnamespace Framework\n{\n    use Framework\\\
  Inspector as Inspector;\n    use Framework\\ArrayMethods as ArrayMethods;\n    use\
  \ Framework\\StringMethods as StringMethods;\n    use Framework\\Core\\Exception\
  \ as Exception;\n\n    class Base\n    {\n        public function __call($name,\
  \ $arguments)\n        {\n            if (empty($this->_inspector))\n          \
  \  {\n                throw new Exception(\"Call parent::__construct!\");\n    \
  \        }\n\n            $getMatches = StringMethods::match($name, \"^get([a-zA-Z0-9]+)$\"\
  );\n\n            if (sizeof($getMatches) > 0)\n            {\n                $normalized\
  \ = lcfirst($getMatches[0]);\n                $property = \"_{$normalized}\";\n\n\
  \                if (property_exists($this, $property))\n                {\n   \
  \                 $meta = $this->_inspector->getPropertyMeta($property);\n\n   \
  \                 if (empty($meta[\"@readwrite\"]) && empty($meta[\"@read\"]))\n\
  \                    {\n                        throw $this->_getExceptionForWriteonly($normalized);\n\
  \                    }\n\n                    if (isset($this->$property))\n   \
  \                 {\n                        return $this->$property;\n        \
  \            }\n\n                    return null;\n                }\n        \
  \    }\n\n            $setMatches = StringMethods::match($name, \"^set([a-zA-Z0-9]+)$\"\
  );\n\n            if (sizeof($setMatches) > 0)\n            {\n                $normalized\
  \ = lcfirst($setMatches[0]);\n                $property = \"_{$normalized}\";\n\n\
  \                if (property_exists($this, $property))\n                {\n   \
  \                 $meta = $this->_inspector->getPropertyMeta($property);\n\n   \
  \                 if (empty($meta[\"@readwrite\"]) && empty($meta[\"@write\"]))\n\
  \                    {\n                        throw $this->_getExceptionForReadonly($normalized);\n\
  \                    }\n\n                    $this->$property = $arguments[0];\n\
  \                    return $this;\n                }\n            }\n\n       \
  \     throw $this->_getExceptionForImplementation($name);\n        }\n    }\n}\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 3 章 ■ 基类\n\n我们的 `__call()`\
  \ 方法包含三个基本部分：检查 inspector 是否已设置、处理 `getProperty()` 方法以及处理 `setProperty()` 方法。在这里，我们对将要继承\
  \ `Base` 类的类的通用结构做出了一些假设。\n\n\n\n"
- "# 我们不预设 inspector 属性已设置\n\n我们不预设 `inspector` 属性已被设置。这种情况通常发生在子类未调用其父类 `__construct()`\
  \ 方法时。为此会给出相应的错误描述。我们假设任何到达 `__call()` 方法的访问器方法调用，都指向子类中已定义的非公开属性。我们假设这些调用遵循 `setProperty()`/`getProperty()`\
  \ 的格式，因此会去除 `get/set` 部分，并在剩余字符串后附加一个下划线。\n\n这将有效地将对 `setColor()`/`getColor()` 的调用转换为\
  \ `_color`。如果子类中不存在该属性，则会抛出异常。如果调用的方法是 getter，我们会（通过元数据）判断读取该属性是否被允许。只有当属性包含 `@read`\
  \ 或 `@readwrite` 标记时，才允许读取。如果允许读取，则返回该属性的值。\n\n如果调用的方法是 setter，我们会判断写入该属性是否被允许。只有当属性包含\
  \ `@write` 或 `@readwrite` 标记时，才允许写入。如果允许写入，则将该属性的值设置为第一个参数的值。你可能会好奇这些异常是什么样的，因为我们只是抛出了更多方法的结果。\n\
  \n如果我们创建继承自这个 `Base` 类的子类，就可以直接开始使用 getter/setter，只需在子类的元数据中设置 `@read`/`@write`/`@readwrite`\
  \ 标记即可。当然，实际 `Base` 类中包含了大量代码，如果我们只打算使用一两次，则无需创建它。\n\n然而，在我们的框架中，几乎所有其他类都将继承自 `Base`\
  \ 类，因此这是一项值得的投资！现在，我们无需在每个需要访问器方法的类中自行编写这些方法，只需继承 `Base` 类，所有繁重的工作便会自动完成。\n\n###\
  \ 透明的 Getter/Setter\n\n在本章开头，我们对比了使用公开属性和使用 getter/setter 的差异。如果我们能像使用公开属性那样使用受保护属性，同时又保留\
  \ getter/setter 带来的额外数据安全性，那会怎样？答案是可行的，方法就是使用清单 3-10 中展示的两个魔术方法。\n\n***清单 3-10.***\
  \ `__get()`/`__set()` 魔术方法\n\n```\npublic function __get($name)\n{\n    $function\
  \ = \"get\".ucfirst($name);\n    return $this->$function();\n}\n\npublic function\
  \ __set($name, $value)\n{\n    $function = \"set\".ucfirst($name);\n    return $this->$function($value);\n\
  }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 3 章 ■ 基类\n\n\
  乍一看，这些方法似乎没做什么实质性的工作。`__get()` 方法接受一个参数，该参数代表被访问的属性名称。以 `$obj->property` 为例，该参数将是\
  \ `property`。\n\n然后，我们的 `__get()` 方法会将其转换为 `getProperty`，这与我们在 `__call()` 方法中定义的命名模式相匹配。这意味着\
  \ `$obj->property` 会首先尝试设置同名的公开属性，然后进入 `__get()`，接着尝试调用公开方法 `setProperty()`，再进入\
  \ `__call()`，最后设置受保护的 `$_property`。\n\n`__set()` 方法的工作原理类似，不同之处在于它接受第二个参数，用于定义要设置的值。如果查看图\
  \ 3-1 所示的示意图，可能会更容易理解发生了什么。\n\n**`$obj->property = \"foo\";`**\n\n| `public $property`\
  \ 是否存在？ | |\n| --- | --- |\n| **是** | 将 `$property` 设置为 `\"foo\"` |\n| **否** | 进入\
  \ `__set(\"property\", \"foo\")` → 进入 `setProperty(\"foo\")` |\n\n| `setProperty(...)`\
  \ 是否存在？ | |\n| --- | --- |\n| **是** | 执行 `setProperty(\"foo\")` |\n| **否** | 进入\
  \ `__call(\"setProperty\", array(\"foo\"))` |\n\n| `protected $_property` 是否存在？\
  \ | |\n| --- | --- |\n| **是** | `$_property` 是否包含 `@write/@readwrite`？ |\n| | **是**\
  \ → 将 `$_property` 设置为 `\"foo\"` |\n| | **否** → 抛出异常 |\n| **否** | 抛出异常 |\n\n***图\
  \ 3-1.** 魔术方法*\n\n完整的 `Base` 类如下方清单 3-11 所示。\n\n***清单 3-11.*** Base 类\n\n```\nnamespace\
  \ Framework\n{\n    use Framework\\Inspector as Inspector;\n```\n\n\n```php\nuse\
  \ Framework\\ArrayMethods as ArrayMethods;\nuse Framework\\StringMethods as StringMethods;\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 3 章 ■ 基类\n\n```php\n\
  use Framework\\Core\\Exception as Exception;\n\nclass Base\n{\n    private $_inspector;\n\
  \n    public function __construct($options = array())\n    {\n        $this->_inspector\
  \ = new Inspector($this);\n\n        if (is_array($options) || is_object($options))\n\
  \        {\n            foreach ($options as $key => $value)\n            {\n  \
  \              $key = ucfirst($key);\n                $method = \"set{$key}\";\n\
  \                $this->$method($value);\n            }\n        }\n    }\n\n  \
  \  public function __call($name, $arguments)\n    {\n        if (empty($this->_inspector))\n\
  \        {\n            throw new Exception(\"Call parent::__construct!\");\n  \
  \      }\n\n        $getMatches = StringMethods::match($name, \"^get([a-zA-Z0-9]+)$\"\
  );\n\n        if (sizeof($getMatches) > 0)\n        {\n            $normalized =\
  \ lcfirst($getMatches[0]);\n            $property = \"_{$normalized}\";\n\n    \
  \        if (property_exists($this, $property))\n            {\n               \
  \ $meta = $this->_inspector->getPropertyMeta($property);\n\n                if (empty($meta[\"\
  @readwrite\"]) && empty($meta[\"@read\"]))\n                {\n                \
  \    throw $this->_getExceptionForWriteonly($normalized);\n                }\n\n\
  \                if (isset($this->$property))\n                {\n             \
  \       return $this->$property;\n                }\n\n                return null;\n\
  \            }\n        }\n\n        $setMatches = StringMethods::match($name, \"\
  ^set([a-zA-Z0-9]+)$\");\n\n        if (sizeof($setMatches) > 0)\n        {\n   \
  \         $normalized = lcfirst($setMatches[0]);\n            $property = \"_{$normalized}\"\
  ;\n\n            if (property_exists($this, $property))\n            {\n       \
  \         $meta = $this->_inspector->getPropertyMeta($property);\n\n           \
  \     if (empty($meta[\"@readwrite\"]) && empty($meta[\"@write\"]))\n          \
  \      {\n                    throw $this->_getExceptionForReadonly($normalized);\n\
  \                }\n\n                $this->$property = $arguments[0];\n      \
  \          return $this;\n            }\n        }\n\n        throw $this->_getExceptionForImplementation($name);\n\
  \    }\n\n    public function __get($name)\n    {\n        $function = \"get\".ucfirst($name);\n\
  \        return $this->$function();\n    }\n\n    public function __set($name, $value)\n\
  \    {\n        $function = \"set\".ucfirst($name);\n        return $this->$function($value);\n\
  \    }\n\n    protected function _getExceptionForReadonly($property)\n    {\n  \
  \      return new Exception\\ReadOnly(\"{$property} is read-only\");\n    }\n\n\
  \    protected function _getExceptionForWriteonly($property)\n    {\n        return\
  \ new Exception\\WriteOnly(\"{$property} is write-only\");\n    }\n\n    protected\
  \ function _getExceptionForProperty()\n    {\n        return new Exception\\Property(\"\
  Invalid property\");\n    }\n\n    protected function _getExceptionForImplementation($method)\n\
  \    {\n        return new Exception\\Argument(\"{$method} method not implemented\"\
  );\n    }\n}\n```\n\n有了这两个魔术方法，我们现在可以将受保护的方法当作公共方法来使用，同时仍然可以调用预定义（或自动推断）的 getter/setter。请参考清单\
  \ 3-12 中的示例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 第 3 章 ■\
  \ 基类\n\n**清单 3-12.** 使用透明 Getter/Setter\n\n```php\nclass Hello extends Framework\\\
  Base\n{\n    /*\n     * @readwrite\n     */\n    protected $_world;\n\n    public\
  \ function setWorld($value)\n    {\n        echo \"你的 setter 正在被调用！\";\n       \
  \ $this->_world = $value;\n    }\n\n    public function getWorld()\n    {\n    \
  \    echo \"你的 getter 正在被调用！\";\n        return $this->_world;\n    }\n}\n\n$hello\
  \ = new Hello();\n$hello->world = \"foo!\";\necho $hello->world;\n```\n\n令人惊奇的是，这个示例不仅输出了预期的\
  \ `foo`，还输出了 getter/setter 重写中定义的额外字符串。我们不必像本例中那样显式定义 getter/setter，因为我们的 `__call()`\
  \ 方法会自动处理它们。这简直是两全其美！\n\n### 问题\n\n1.  当 PHP 本身并不支持这些特性时，在类中使用 getter 和 setter 有什么好处？\n\
  2.  当我们向 `Base` 类添加 `Inspector` 实例时，将其存储在一个私有变量中。为什么这一点很重要？\n3.  我们在 `Base` 类中定义了几个受保护的方法，其唯一目的是返回一个\
  \ Exception 子类的实例。为什么我们不能直接在 `__call()` 方法中处理 Exception 子类？\n\n### 答案\n\n1.  使用\
  \ getter/setter 的主要好处是，存储在 `Base` 子类中的受保护值不会被随意篡改。当然，开发者仍然可以调用 `getProperty()` 和\
  \ `setProperty()`，并且我们已定义的代码也不会阻止这种行为，但我们所做的是提供一个良好的构建基础。需要限制对其受保护属性访问的类可以实现这一点，而简单的\
  \ getter/setter 将继续像以前一样正常工作。\n2.  这个 `Inspector` 实例仅用于确定哪些属性应该拥有模拟的 getter/setter。如果它被随意放置且可供子类访问，实际上可能会带来更多麻烦，因此我们将其赋值给一个私有属性，从而对子类隐藏它。\n\
  3.  如果我们直接处理异常，而不引用这些受保护的方法，那么子类在不自行重写 `__call()` 方法的情况下，就无法定义自己的异常类型。这样做是为了让子类能够轻松定义自己的\
  \ Exception 子类。\n\n### 练习\n\n1.  我们的 `Base` 类仅为带有 `@read`/`@write`/`@readwrite`\
  \ 元标记的属性模拟 getter 和 setter。它不提供任何属性验证，这意味着开发者可以将属性设置为 `null` 而不会收到任何警告。尝试添加另一个元标记来防止（或警告）这种情况。\n\
  2.  尝试用另一种方式来指定 Exception 子类，而不是定义返回子类实例的方法。例如，你可以使用一个字符串数组，或者一个 `switch` 语句，这样也能实现同样的灵活性。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- "# 第 4 章\n\n### 配置\n\n我们的目标之一是创建一个易于配置的框架，同时假定一些基本设置，以便快速开发并灵活修改。因此，我们需要一种标准格式来存储配置变量，以及一种方法来检索它们。关于这个话题有多种不同的方法，在本章中，我们将探讨两种流行的方案。\n\
  \n### 目标\n\n-   我们需要审查不同的配置方法，并决定哪一种最适合我们的框架/应用程序。\n-   我们需要构建一组类，用于解析配置文件，并提供一套清晰的配置选项。\n\
  \n### 关联数组\n\n关联数组提供了最简单的配置方式。任何 PHP 开发者都能轻松理解，而且我们的框架解析起来也非常简单。清单 4-1 展示了一个数据库设置文件的示例，清单\
  \ 4-2 则演示了如何解析它。\n\n**清单 4-1.** 关联数组配置文件示例\n\n```php\n$settings[\"database_default_provider\"\
  ] = \"mysql\";\n$settings[\"database_default_host\"] = \"localhost\";\n$settings[\"\
  database_default_username\"] = \"username\";\n$settings[\"database_default_password\"\
  ] = \"password\";\n$settings[\"database_default_port\"] = \"3306\";\n$settings[\"\
  database_default_schema\"] = \"prophpmvc\";\n```\n\n**清单 4-2.** 加载我们的关联数组配置文件\n\n\
  ```php\nfunction parsePhp($path)\n{\n    $settings = array();\n    include(\"{$path}.php\"\
  );\n    return $settings;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n### 第 4 章 ■ 配置\n\n解析关联数组真的再简单不过了。我们只需要预先定义 `$settings = array()`，然后包含设置文件即可。如果需要，我们可以通过\
  \ `parsePhp()` 函数返回的数组使用 `sizeof()` 方法来检查是否加载了任何设置。输出结果正如你所料，如清单 4-3 所示。\n\n**清单\
  \ 4-3.** `parsePhp()` 的结果\n\n```\nArray\n(\n    [database_default_provider] => mysql\n\
  \    [database_default_host] => localhost\n    [database_default_username] => username\n\
  \    [database_default_password] => password\n    [database_default_port] => 3306\n\
  \    [database_default_schema] => prophpmvc\n)\n```\n\n正如我们所见，这种配置方法易于解析和更改。如果它听起来好得令人难以置信，那是因为确实如此。我们有几个理由应该寻找其他解决方案。\n\
  \n\n• 我们只能使用一维配置数组。这是因为我们的`parsePhp()`函数需要预定义`$settings`，以便配置文件有一个数组来存储数据。\n\n•\
  \ 它需要比严格必要的更多代码。我们真正关心的只是键和值，而不是围绕它们的 PHP 语法。\n\n■ **注意**：CakePHP 和 CodeIgniter\
  \ 使用关联数组进行大部分配置。\n\n### INI 文件\n\nINI（**ini**tialization）文件格式是 Windows 操作系统中配置文件的标准格式。\n\
  \n它易于修改，并且相对容易解析。幸运的是，PHP 还附带了一个方便的`parse_ini_file()`函数，这将大大简化我们的设置解析器的创建。我们应该尝试创建一个允许我们为键/值使用点符号的解析器。清单\
  \ 4-4 展示了一个 INI 文件示例。\n\n***清单 4-4.*** INI 配置文件示例\n\n```\ndatabase.default.type\
  \ = mysql\ndatabase.default.host = localhost\ndatabase.default.username = username\n\
  database.default.password = password\ndatabase.default.port = 3306\ndatabase.default.schema\
  \ = prophpmvc\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 4\
  \ 章 ■ 配置\n\n■ **注意**：INI 配置文件的处理方式与 PHP 文件不同，至少在 Apache 中是这样。如果用户试图访问一个 INI 文件，它可能不会被修改，用户可能会访问到敏感的配置设置，如用户名和密码。你应该始终采取措施拒绝访问这些文件，最好将其存储在\
  \ Web 可访问目录之外。\n\n我们的配置类将是我们创建的第一个工厂类。我们希望将来能够扩展它，以支持多种不同的配置可能性，但（牢记我们的目标）我们将只创建一个驱动。首先，让我们看看工厂类，如清单\
  \ 4-5 所示。\n\n***清单 4-5.*** 配置工厂类\n\n```\nnamespace Framework\n{\n    use Framework\\\
  Base as Base;\n    use Framework\\Configuration as Configuration;\n    use Framework\\\
  Configuration\\Exception as Exception;\n\n    class Configuration extends Base\n\
  \    {\n        /**\n         * @readwrite\n         */\n        protected $_type;\n\
  \n        /**\n         * @readwrite\n         */\n        protected $_options;\n\
  \n        protected function _getExceptionForImplementation($method)\n        {\n\
  \            return new Exception\\Implementation(\"{$method} method not implemented\"\
  );\n        }\n\n        public function initialize()\n        {\n            if\
  \ (!$this->type)\n            {\n                throw new Exception\\Argument(\"\
  Invalid type\");\n            }\n\n            switch ($this->type)\n          \
  \  {\n                case \"ini\":\n                {\n                    return\
  \ new Configuration\\Driver\\Ini($this->options);\n                    break;\n\
  \                }\n                default:\n                {\n              \
  \      throw new Exception\\Argument(\"Invalid type\");\n                    break;\n\
  \                }\n            }\n        }\n    }\n}\n```\n\n配置文件工厂类也是我们第一次使用通过`Base`类创建的\
  \ getter/setter。`$_type`和`$_options`都可以被读取和写入。如果你回顾一下`Base`类的`__construct()`方法，你会发现它接受第一个参数中给出的键/值，并设置它能找到的任何受保护的属性。如果你的初始化数组有一个`options`键，那么受保护的`$_options`属性将包含该值。\n\
  \n我们首先检查`$_type`属性值是否为空，因为如果我们不知道如何确定所需的类，就没有必要尝试创建类实例。接下来，我们使用`switch`语句和`$this->type`的返回值来选择并实例化正确的类类型。\n\
  \n因为我们（目前）只支持`\"ini\"`类型，所以如果所需的类型不是`\"ini\"`，则抛出`ConfigurationExceptionArgument`。如果所需的类型是`\"\
  ini\"`，我们将返回一个新实例，并将提供给`Configuration`的`__construct()`方法的选项传递给该实例。如清单 4-6 所示，`Configuration`类的使用非常简单。\n\
  \n***清单 4-6.*** 使用工厂创建配置对象\n\n```\n$configuration = new Framework\\Configuration(array(\n\
  \    \"type\" => \"ini\"\n));\n$configuration = $configuration->initialize();\n\
  ```\n\n\n\n### 理解配置驱动程序\n\n由于我们的工厂支持使用多种不同类型的配置驱动程序类，我们需要一种在所有驱动类之间共享代码的方法。我们通过让驱动类继承这个基驱动类来实现这一点，如代码清单\
  \ 4-7 所示。\n\n***代码清单 4-7.*** `Configuration\\Driver` 类\n\n```\nnamespace Framework\\\
  Configuration\n{\n    use Framework\\Base as Base;\n    use Framework\\Configuration\\\
  Exception as Exception;\n\n    class Driver extends Base\n    {\n        protected\
  \ $_parsed = array();\n\n        public function initialize()\n        {\n     \
  \       return $this;\n        }\n\n        protected function _getExceptionForImplementation($method)\n\
  \        {\n            return new Exception\\Implementation(\"{$method} method\
  \ not implemented\");\n        }\n    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 4 章 ■ 配置\n\n我们还可以使用接口定义来强制执行驱动行为，从而变得更加技术化，但目前对于未实现的方法调用，我们已经抛出了详细的实现异常，这已经足够了。解析配置文件有两种基本方法，如代码清单\
  \ 4-8 和 4-9 所示。\n\n***代码清单 4-8.*** `ArrayMethods::toObject()` 方法\n\n```\nnamespace\
  \ Framework\n{\n    class ArrayMethods\n    {\n        private function __construct()\n\
  \        {\n            // 不执行任何操作\n        }\n\n        private function __clone()\n\
  \        {\n            // 不执行任何操作\n        }\n\n        public static function\
  \ toObject($array)\n        {\n            $result = new \\stdClass();\n       \
  \     foreach ($array as $key => $value)\n            {\n                if (is_array($value))\n\
  \                {\n                    $result->{$key} = self::toObject($value);\n\
  \                }\n                else\n                {\n                  \
  \  $result->{$key} = $value;\n                }\n            }\n            return\
  \ $result;\n        }\n    }\n}\n```\n\n***代码清单 4-9.*** `Configuration\\Driver\\\
  Ini parse()` 方法\n\n```\nnamespace Framework\\Configuration\\Driver\n{\n    use Framework\\\
  ArrayMethods as ArrayMethods;\n    use Framework\\Configuration as Configuration;\n\
  \    use Framework\\Configuration\\Exception as Exception;\n\n    class Ini extends\
  \ Configuration\\Driver\n    {\n        public function parse($path)\n        {\n\
  \            if (empty($path))\n            {\n                throw new Exception\\\
  Argument(\"\\$path 参数无效\");\n            }\n\n            if (!isset($this->_parsed[$path]))\n\
  \            {\n                $config = array();\n                ob_start();\n\
  \                include(\"{$path}.ini\");\n                $string = ob_get_contents();\n\
  \                ob_end_clean();\n                $pairs = parse_ini_string($string);\n\
  \n                if ($pairs == false)\n                {\n                    throw\
  \ new Exception\\Syntax(\"无法解析配置文件\");\n                }\n\n                foreach\
  \ ($pairs as $key => $value)\n                {\n                    $config = $this->_pair($config,\
  \ $key, $value);\n                }\n\n                $this->_parsed[$path] = ArrayMethods::toObject($config);\n\
  \            }\n\n            return $this->_parsed[$path];\n        }\n    }\n\
  }\n```\n\n我们的 INI 配置解析器类中唯一的公有方法叫做 `parse()`。它首先检查 `$path` 参数是否为空，如果为空则抛出 `Configuration\\\
  Exception\\Argument` 异常。接着，它检查请求的配置文件是否尚未被解析，如果已经解析过，则直接跳转到返回配置的地方。\n\n如果尚未解析所需的配置文件，它会使用输出缓冲区来捕获对配置文件内容执行\
  \ `include()` 调用的结果。使用 `include()` 方法允许配置文件位于 PHP 包含路径中任意相对路径的位置，尽管我们通常会将它们从标准配置文件夹中加载。\n\
  \n然后，它使用 PHP 的 `parse_ini_string()` 方法来解析配置文件中的字符串内容，该方法返回一个键值对的关联数组，并存储在 `$pairs`\
  \ 变量中。如果 `$pairs` 未返回任何内容，我们就认为配置文件包含无效语法，并抛出 `Configuration\\Exception\\Syntax`\
  \ 异常。\n\n如果确实返回了一个关联数组，我们会遍历该数组，生成正确的层级结构（使用 `_pair()` 方法），最后将关联数组转换为对象并缓存/返回配置文件数据。你可以在代码清单\
  \ 4-10 中看到使用 `_pair()` 方法的示例。\n\n***代码清单 4-10.*** `_pair()` 方法\n\n```\nnamespace\
  \ Framework\\Configuration\\Driver\n{\n    use Framework\\ArrayMethods as ArrayMethods;\n\
  \    use Framework\\Configuration as Configuration;\n    use Framework\\Configuration\\\
  Exception as Exception;\n\n    class Ini extends Configuration\\Driver\n```\n\n\n\
  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 4 章 ■ 配置\n\n```\n{\n\
  \    protected function _pair($config, $key, $value)\n    {\n        if (strstr($key,\
  \ \".\"))\n        {\n            $parts = explode(\".\", $key, 2);\n          \
  \  if (empty($config[$parts[0]]))\n            {\n                $config[$parts[0]]\
  \ = array();\n            }\n            $config[$parts[0]] = $this->_pair($config[$parts[0]],\
  \ $parts[1], $value);\n        }\n        else\n        {\n            $config[$key]\
  \ = $value;\n        }\n        return $config;\n    }\n}\n```\n\n`_pair()` 方法将配置文件中键名使用的点号记法解构为关联数组的层级结构。如果\
  \ `$key` 变量包含点字符（`.`），则截取第一部分用于创建新数组，并将另一项 `_pair()` 调用的返回值赋给它。起初可能有些费解，但这种方法运行良好且合乎逻辑。\n\
  \n接下来让我们看看完整的驱动类，如清单 4-11 所示。\n\n**清单 4-11.** Configuration\\Driver\\Ini 类\n\n```\n\
  namespace Framework\\Configuration\\Driver\n{\n    use Framework\\ArrayMethods as\
  \ ArrayMethods;\n    use Framework\\Configuration as Configuration;\n    use Framework\\\
  Configuration\\Exception as Exception;\n\n    class Ini extends Configuration\\\
  Driver\n    {\n        protected function _pair($config, $key, $value)\n       \
  \ {\n            if (strstr($key, \".\"))\n            {\n                $parts\
  \ = explode(\".\", $key, 2);\n                if (empty($config[$parts[0]]))\n \
  \               {\n                    $config[$parts[0]] = array();\n         \
  \       }\n                $config[$parts[0]] = $this->_pair($config[$parts[0]],\
  \ $parts[1], $value);\n            }\n            else\n            {\n        \
  \        $config[$key] = $value;\n            }\n            return $config;\n \
  \       }\n\n        public function parse($path)\n        {\n            if (empty($path))\n\
  \            {\n                throw new Exception\\Argument(\"\\$path argument\
  \ is not valid\");\n            }\n            if (!isset($this->_parsed[$path]))\n\
  \            {\n                $config = array();\n                ob_start();\n\
  \                include(\"{$path}.ini\");\n                $string = ob_get_contents();\n\
  \                ob_end_clean();\n                $pairs = parse_ini_string($string);\n\
  \                if ($pairs == false)\n                {\n                    throw\
  \ new Exception\\Syntax(\"Could not parse configuration file\");\n             \
  \   }\n                foreach ($pairs as $key => $value)\n                {\n \
  \                   $config = $this->_pair($config, $key, $value);\n           \
  \     }\n                $this->_parsed[$path] = ArrayMethods::toObject($config);\n\
  \            }\n            return $this->_parsed[$path];\n        }\n    }\n}\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n配置数据与我们使用关联数组时略有不同，但这种新格式实际上更加规整且易于使用。我们无需将所有内容保存在一个大数组中，可以通过对象记法用更少的代码访问这些值。配置文件的创建和维护也更简单，如清单\
  \ 4-12 所示。\n\n**清单 4-12.** 使用之前 INI 配置文件的 `parse()` 方法结果\n\n```\nstdClass Object\n\
  (\n    [database] => stdClass Object\n        (\n            [default] => stdClass\
  \ Object\n                (\n                    [type] => mysql\n             \
  \       [host] => localhost\n                    [username] => username\n      \
  \              [password] => password\n                    [port] => 3306\n    \
  \                [schema] => prophpmvc\n                )\n        )\n)\n```\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n> **注意** Zend Framework 包含多种配置文件格式解析器，但我最偏爱的是其\
  \ INI 文件解析器。\n\n你构建的解析器应反映框架的需求。如果关联数组虽然存在缺陷，但最符合实际，那么你完全可以自由使用。本书后续内容会大量使用此处介绍的\
  \ INI 解析代码，因此如果你选择使用关联数组（或任何其他解析器），则需要相应调整代码。\n\n现在我们有了一个简单且可复用的配置系统，就可以开始向应用程序加载各种设置了，这将带来极大的灵活性。\n\
  \n### 问题\n\n1. 如果关联数组更易于创建和解析，为什么我们不应该用它来配置框架？\n2. 工厂类比普通类看起来需要更多工作量。既然在这种情况下我们可以直接使用普通类，为什么还要用工厂类？\n\
  \n### 答案\n\n1. 使用关联数组进行配置可能有其好处，但同样存在缺陷。关联数组对非 PHP 程序员并不友好，而且要求配置文件不能出现语法错误——而 INI\
  \ 配置文件则无此要求。\n\n\n2. 创建工厂类的好处在于，可以轻松添加和替换驱动程序。\n\n我们可以再添加五个其他配置解析器，它们都将以与我们`INI`配置解析器几乎相同的方式被调用。\n\
  \n### 练习\n\n1. 尝试创建一个用于解析关联数组的配置驱动程序。在发生语法错误时，它应能正确抛出异常。\n2. 尝试使用其他方法进行配置。例如，你可以尝试创建匹配的配置驱动程序，进一步扩展框架的配置库。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- '# 第 5 章


  ### 缓存


  在处理大量数据时，我们经常会遇到性能瓶颈。这些瓶颈可能由多种原因引起，而良好的缓存大多可以避免这些问题。如果你不清楚我所说的缓存是什么意思，我们稍后会通过一个例子来说明。


  ### 目标


  - 首先，我们应该认识到使用缓存的必要性。除非我们理解缓存所解决的问题，否则我们无法充分发挥其潜力。

  - 我们需要学习如何访问*Memcached*服务器，我们将用它来存储缓存数据。这需要我们编写与`Memcached`服务器交互的类。


  ### 性能瓶颈


  设想一个社交网络，其中任何用户都可以拥有许多好友。如果要在网页上显示这些好友的列表及其所有相关信息，该页面必须进行数据库调用，以从数据库中检索好友记录。现在想象一下，这个好友列表会显示在网站的每个页面上。


  这意味着网站的每个页面至少需要一次数据库查询。再加上成千上万的用户，每个用户的好友列表也在显示，最终你会得到海量的数据。


  在任何增长或需求超过资源限制的应用中，这种数据需求很容易使应用不堪重负。那么，我们该如何利用缓存来减轻数据库的压力呢？


  我们可以在首次从数据库检索好友列表时，轻松地将其缓存起来。这意味着网站无需频繁、重复地请求相同的数据。与其每次需要时都从数据库获取相同的数据，不如先检查数据是否已存储在缓存中。


  回顾我们在第 4 章中创建的配置类。如果我们经常需要使用配置设置，那么将其缓存起来也是合理的。否则，我们将不得不为网站上的每个页面、每个用户反复加载相同的配置文件。


  如果我们一次性加载配置数据，将其存储在缓存中，然后后续都从缓存中请求配置数据，我们将节省大量时间。


  > **注意** 缓存的用途不仅限于存储数据库和配置数据。这两个例子只是我用来说明缓存效能的示例。凡是需要从比缓存系统慢的任何地方重复获取相同数据的情况，缓存都是有用的。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- "# 第 5 章 ■ 缓存\n\n### 代码\n\n如果我们的目标是构建一个运行快速的框架，缓存是不可避免的。我们需要一种能够持久存储缓存数据的方案，我们选择的缓存提供者是`Memcached`。它将数据存储在内存的哈希查找表中，这样无需从磁盘读取即可快速访问数据。`Memcached`是一个开源\
  \ HTTP 缓存系统，能够为此类场景存储海量的键/值对数据。\n\n> **注意** `Memcached`并不是我们框架唯一可用的缓存方案，但它是本书中你将看到的唯一一种。如果你需要替代的缓存方式，可以将创建另一个缓存驱动程序作为一项练习。你可以在[www.memcached.org](http://www.memcached.org)上了解更多关于`Memcached`的信息。\n\
  \n让我们开始创建我们的`Cache`工厂类，如清单 5-1 所示。\n\n**清单 5-1.** 缓存工厂类\n\n```\nnamespace Framework\n\
  {\n```\n\n\n```php\nuse Framework\\Base as Base;\nuse Framework\\Cache as Cache;\n\
  use Framework\\Cache\\Exception as Exception;\n\nclass Cache extends Base\n{\n \
  \   /**\n     * @readwrite\n     */\n    protected $_type;\n\n    /**\n     * @readwrite\n\
  \     */\n    protected $_options;\n\n    protected function _getExceptionForImplementation($method)\n\
  \    {\n        return new Exception\\Implementation(\"{$method} method not implemented\"\
  );\n    }\n\n    public function initialize()\n    {\n        if (!$this->type)\
  \ {\n            throw new Exception\\Argument(\"Invalid type\");\n        }\n\n\
  \        switch ($this->type) {\n            case \"memcached\": {\n           \
  \     return new Cache\\Driver\\Memcached($this->options);\n                break;\n\
  \            }\n            default: {\n                throw new Exception\\Argument(\"\
  Invalid type\");\n                break;\n            }\n        }\n    }\n}\n```\n\
  \n我们的 `Cache` 工厂类与 `Configuration` 工厂类非常相似。它接受初始化选项的方式完全相同，并且同样根据内部的 `$_type` 属性来选择返回对象的类型。\n\
  \n对于无效/不支持的类型，它会抛出 `Cache\\Exception\\Argument` 异常，并且目前仅支持一种缓存驱动类型：`Cache\\Driver\\\
  Memcached`。正如我们在处理配置时所做的那样，我们将基于一个标准的驱动类来创建缓存驱动类，如清单 5-2 所示。\n\n**清单 5-2.** `Cache\\\
  Driver` 类\n\n```php\nnamespace Framework\\Cache\n{\n    use Framework\\Base as Base;\n\
  \    use Framework\\Cache\\Exception as Exception;\n\n    class Driver extends Base\n\
  \    {\n        public function initialize()\n        {\n            return $this;\n\
  \        }\n\n        protected function _getExceptionForImplementation($method)\n\
  \        {\n            return new Exception\\Implementation(\"{$method} method\
  \ not implemented\");\n        }\n    }\n}\n```\n\n`Cache\\Driver` 类甚至比 `Configuration\\\
  Driver` 类还要简单。它仅覆盖了 `Base` 中生成异常的方法，以便为发生在 `Cache\\Driver` 子类中的错误提供特定的 `Exception`\
  \ 子类。\n\n为了使我们的缓存驱动类能够成功地与 Memcached 服务器交互，它需要维护一些内部属性和方法。请查看清单 5-3 中的这些内容。\n\n\
  **清单 5-3.** `Cache\\Driver\\Memcached` 内部属性/方法\n\n```php\nnamespace Framework\\\
  Cache\\Driver\n{\n    use Framework\\Cache as Cache;\n    use Framework\\Cache\\\
  Exception as Exception;\n\n    class Memcached extends Cache\\Driver\n    {\n  \
  \      protected $_service;\n\n        /**\n         * @readwrite\n         */\n\
  \        protected $_host = \"127.0.0.1\";\n\n        /**\n         * @readwrite\n\
  \         */\n        protected $_port = \"11211\";\n\n        /**\n         * @readwrite\n\
  \         */\n        protected $_isConnected = false;\n\n        protected function\
  \ _isValidService()\n        {\n            $isEmpty = empty($this->_service);\n\
  \            $isInstance = $this->_service instanceof \\Memcache;\n\n          \
  \  if ($this->isConnected && $isInstance && !$isEmpty) {\n                return\
  \ true;\n            }\n\n            return false;\n        }\n    }\n}\n```\n\n\
  与 `Configuration\\Driver\\Ini` 类不同，`Cache\\Driver\\Memcached` 类实际使用了继承自父类的访问器支持。它将\
  \ `$_host` 和 `$_port` 属性默认设置为常用值，并调用 `parent::__construct($options)` 方法。通过 `__construct()`\
  \ 方法中的 `connect()` 公共方法来建立与 Memcached 服务器的连接。\n\n**注意** `$_host` 和 `$_port` 的默认值适用于大多数安装。你的环境可能不同，在这种情况下，你可能需要查阅安装\
  \ Memcached 时的文档。\n\n该驱动还有一个受保护的 `_isValidService()` 方法，用于确保 `$_service` 的值是一个有效的\
  \ Memcached 实例。让我们在清单 5-4 中更详细地看看 `connect()`/`disconnect()` 方法。\n\n**清单 5-4.**\
  \ `Cache\\Driver\\Memcached` 的 `connect()`/`disconnect()` 方法\n\n```php\nnamespace\
  \ Framework\\Cache\\Driver\n{\n    use Framework\\Cache as Cache;\n    use Framework\\\
  Cache\\Exception as Exception;\n\n    class Memcached extends Cache\\Driver\n  \
  \  {\n        public function connect()\n        {\n            try {\n        \
  \        $this->_service = new \\Memcache();\n                $this->_service->connect(\n\
  \                    $this->host,\n                    $this->port\n           \
  \     );\n                $this->isConnected = true;\n            } catch (\\Exception\
  \ $e) {\n                throw new Exception\\Service(\"Unable to connect to service\"\
  );\n            }\n\n            return $this;\n        }\n\n        public function\
  \ disconnect()\n        {\n            if ($this->_isValidService()) {\n       \
  \         $this->_service->close();\n                $this->isConnected = false;\n\
  \            }\n\n            return $this;\n        }\n    }\n}\n```\n\n\n  \n\
  `connect()`方法尝试连接到指定主机/端口的 Memcached 服务器。如果连接成功，`$_service`属性会被赋值为一个已连接到 Memcached\
  \ 服务的 PHP `Memcached`类实例。如果连接失败，则会引发`CacheExceptionService`异常。\n\n`disconnect()`方法尝试断开`$_service`实例与\
  \ Memcached 服务的连接。它仅在`_isValidService()`方法返回`true`时执行此操作。\n\n最后，我们需要查看通用方法，这些方法将用于大多数缓存需求。请参见清单\
