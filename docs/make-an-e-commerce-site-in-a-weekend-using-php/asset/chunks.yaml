    \n图 2-3. 提示输入姓名和电子邮件地址的表单\n\n要创建这样的表单，请创建一个名为 `userinfo.php` 的 PHP 脚本，其代码如代码清单\
    \ 2-5 所示。\n\n代码清单 2-5. 用于输入姓名和电子邮件地址的表单 (`userinfo.php`)\n\n```\n<html>\n    <head>\n\
