    \ `register_04.php` in\n    the `ch11`\n    folder.\n\nAssuming that your code\
    \ is working, you’re ready to create the\n    registration part of the script.\
    \ Let’s pause to consider what the main\n    script needs to do. First, you need\
    \ to hash the password. Then, before\n    writing the details to a CSV file, you\
    \ must check whether the username\n    is unique. This presents a problem regarding\
    \ which mode to use with\n    `fopen()`.\n\n**Note** The various `fopen()` modes\
    \  are described in\n    Chapter [7](#332054_4_En_7_Chapter.xhtml).\n\nIdeally,\
    \ you want the internal pointer at the beginning of the file\n    so that you\
    \ can loop through existing records. The `r+` mode does this,\n    but the operation\
    \ fails unless the file already exists. You can’t use\n    `w+`, because it\n\
    \    deletes existing content. You can’t use `x+` either, because it\n    fails\
    \ if a file of the same name already exists.\n\nThat leaves `a+` and `c+` as the\
    \ only\n    options with the flexibility you need: both create the file if necessary\n\
    \    and let you read and write. They differ in where the internal pointer is\n\
    \    placed when you open the file: `a+` puts it at the\n    end, whereas `c+`\n\
    \    puts it at the beginning. This makes `c+` more useful for\n    checking existing\
    \ records, but `a+` has the advantage\n    of always appending new content at\
    \ the end of the file. This avoids the\n    danger of accidentally overwriting\
