    Next, we will implement the process() method of this class, which will process
    any uploaded images. As we saw earlier in this chapter, we must specify the multipart/form-data
    encoding type to upload files using HTML forms.


    When we set this attribute, PHP will know to create the superglobal array called
    $_FILES, which stores information about uploaded files (even though the form is
    submitted using HTTP POST, the image-upload information is stored in $_FILES,
    not in $_POST). There is one entry in $_FILES for each file that is uploaded,
    with the array key being the value of the name attribute in the form input (in
    our case, we used image).


    Each element in $_FILES is an array consisting of the following elements:


    • name: The original filename of the uploaded file as it was stored on the client
    computer (typically not including the path). We will store this value in the database
    for each uploaded image.


    • type: The mime type of the uploaded file. For example, if the uploaded file
    was a PNG


    image, this would have a value of image/png. Since this is set by the browser,
    we should not trust this value. In the process() method we will not use this value
    and instead will verify the type of data manually.


    • size: The size of the uploaded file in bytes. If you want to impose a restriction
    on the size of uploaded files (in addition to the PHP configuration settings),
    you can use this value.


    • tmp_name: The full path on the server where the uploaded file is stored. This
    is a temporary location, so you must move or copy the file from this location
    in order to keep it (we will do this shortly using the move_uploaded_file() function).


    • error: The error code associated with the uploaded file. There are several different
    codes that can be set (which we will look at in the following code). We must check
    this value using the built-in PHP constants and generate an appropriate error
    message. If the file upload is successful, the value of error will be 0 (which
    we can check using the constant UPLOAD_ERR_OK).


