    ## Integer Type


    An integer is a whole number. They can be specified in decimal (base 10), hexadecimal
    (base 16), octal (base 8) or binary (base 2) notation. Hexadecimal numbers are
    preceded with a `0x`, octal with a `0`, and binary numbers with a `0b`.


    ```php

    $myInt = 1234; // decimal number

    $myInt = 0b10; // binary number (2 decimal)

    $myInt = 0123; // octal number (83 decimal)

    $myInt = 0x1A; // hexadecimal number (26 decimal)

    ```


    Integers in PHP are always signed and can therefore store both positive and negative
    values. The size of an integer depends on the system word size, so on a 32-bit
    system, the largest storable value is 2^(32-1). If PHP encounters a larger value,
    it is interpreted as a float instead.


    ## Floating-Point Type


    The float or floating-point type can store real numbers. These can be assigned
    using either decimal or exponential notation.


    ```php

    $myFloat = 1.234;

    $myFloat = 3e2; // 3*10^2 = 300

    ```


    The precision of a float is platform dependent. Commonly, the 64-bit IEEE format
    is used, which can hold approximately 14 decimal digits and a maximum decimal
    value of 1.8×10^(308).


    ## Bool Type


    The bool type can store a Boolean value, which is a value that can only be either
    `true` or `false`. These values are specified with the `true` and `false` keywords.


    ```php

    $myBool = true;

    ```


    ## Null Type


    The case-insensitive constant `null` is used to represent a variable with no value.
    Such a variable is considered to be of the special `null` data type.


    ```php

    $myNull = null; // variable is set to null

    ```


    Just as with other values, the `null` value evaluates differently, depending on
    the context in which the variable is used. If evaluated as a bool, it becomes
    `false`; as a number, it becomes zero (`0`); and as a string, it becomes an empty
    string (`""`).


    ```php

    $myInt = $myNull + 0;      // numeric context (0)

    $myBool = $myNull == true; // bool context    (false)

    echo $myNull;              // string context  ("")

    ```


    ## Default Values


    In PHP, it is possible to use variables that have not been assigned a value. Such
    undefined variables are then automatically created with the `null` value.


    ```php

    echo $myUndefined; // variable is set to null

    ```


    Although this behavior is allowed, it is a good coding practice to define variables
    before they are used, even if the variables are just set to `null`. As a reminder
    for this, PHP issues an error notice when undefined variables are used. Depending
    on the PHP error reporting settings, this message may or may not be displayed.


    ```

    Notice: Undefined variable: myUndefined in C:\xampp\htdocs\mypage.php on line
    10

    ```


    ## 3. Operators


    An operator is a symbol that makes the script perform a specific mathematical
    or logical manipulation. The operators in PHP can be grouped into five types:
    arithmetic, assignment, comparison, logical, and bitwise operators.


    ### Arithmetic Operators


    The arithmetic operators include the four basic arithmetic operations, as well
    as the modulus operator (`%`), which is used to obtain the division remainder.


    ```php

    $x = 4 + 2; // 6 // addition

    $x = 4 - 2; // 2 // subtraction

    $x = 4 * 2; // 8 // multiplication

    $x = 4 / 2; // 2 // division

    $x = 4 % 2; // 0 // modulus (division remainder)

    ```


    An exponentiation operator (`**`) was introduced in PHP 5.6. It raises the left-side
    operand to the power of the right-side operand.


    ```php

    $x = 4 ** 2; // 16 // exponentiation

    ```


    ### Assignment Operators


    The second group is the assignment operators. Most importantly, the assignment
    operator (`=`) itself, which assigns a value to a variable.


    ```php

    $x = 1; // assignment

    ```


    #### Combined Assignment Operators


    A common use of the assignment and arithmetic operators is to operate on a variable
    and then to save the result back into that same variable. These operations can
    be shortened with the combined assignment operators.


    ```php

    $x += 5; // $x = $x+5;

    $x -= 5; // $x = $x-5;

    $x *= 5; // $x = $x*5;

    $x /= 5; // $x = $x/5;

    $x %= 5; // $x = $x%5;

    ```


    The exponentiation operator added in PHP 5.6 also received a shorthand assignment
    operator.


    ```php

    $x **= 5; // $x = $x**5;

    ```


    #### Increment and Decrement Operators


    Another common operation is to increment or decrement a variable by one. This
    can be simplified with the increment (`++`) and decrement (`--`) operators.


    ```php

    $x++; // $x += 1;

    $x--; // $x -= 1;

    ```


    Both of these operators can be used either before or after a variable.


    ```php

    $x++; // post-increment

    $x--; // post-decrement

    ++$x; // pre-increment

    --$x; // pre-decrement

    ```


    The result on the variable is the same whichever is used. The difference is that
    the post-operator returns the original value before it changes the variable, whereas
    the pre-operator changes the variable first and then returns the value.


    ```php

    $x = 5; $y = $x++; // $x=6, $y=5

    $x = 5; $y = ++$x; // $x=6, $y=6

    ```


    ### Comparison Operators


    The comparison operators compare two values and return either `true` or `false`.
    They are mainly used to specify conditions, which are expressions that evaluate
    to either `true` or `false`.


    ```php

    $x = (2 == 3);  // false // equal to

    $x = (2 != 3);  // true  // not equal to

    $x = (2 <> 3);  // true  // not equal to (alternative)

    $x = (2 === 3); // false // identical

    $x = (2 !== 3); // true  // not identical

    $x = (2 > 3);   // false // greater than

    $x = (2 >= 3);  // false // greater than or equal to

    $x = (2 <= 3);  // true  // less than or equal to

    ```


    The strict equality operators, `===` and `!==`, are used for comparing both type
    and value. These are necessary because the regular "equal to" (`==`) and "not
    equal to" (`!=`) operators automatically perform a type conversion before they
    compare the operands. It is considered good practice to use strict comparison
    when the type conversion feature of the "equal to" operation is not needed.


    ```php

    $x = (1 ==  "1"); // true  (same value)

    $x = (1 === "1"); // false (different types)

    ```


    PHP 7 added a new comparison operator called the spaceship operator (`<=>`). It
    compares two values and returns 0 if both values are equal; 1 if the value on
    the left side is greater; and -1 if the value on the right side is greater.


    ```php

    $x = 1 <=> 1; // 0 (1 == 1)

    $x = 1 <=> 2; //-1 (1 < 2)

    $x = 3 <=> 2; // 1 (3 > 2)

    ```


    ### Logical Operators


    The logical operators are often used together with the comparison operators. Logical
    and (`&&`) evaluates to `true` if both the left and right side are true, and logical
    or (`||`) evaluates to `true` if either the left or right side is true. For inverting
    a Boolean result, there is the logical not (`!`) operator. Note that for both
    "logical and" and the "logical or", the right side of the operator is not evaluated
    if the result is already determined by the left side.


    ```php

    $x = (true && false); // false // logical and

    $x = (true || false); // true  // logical or

    $x = !(true);         // false // logical not

    ```


    ### Bitwise Operators


    The bitwise operators can manipulate binary digits of numbers. For example, the
    xor operator (`^`) turns on the bits that are set on one side of the operator,
    but not on both sides.


    ```php

    $x = 5 & 4;  // 101 & 100 = 100 (4) // and

    $x = 5 | 4;  // 101 | 100 = 101 (5) // or

    $x = 5 ^ 4;  // 101 ^ 100 = 001 (1) // xor (exclusive or)

    $x = 4 << 1; // 100 << 1  = 1000 (8) // left shift

    $x = 4 >> 1; // 100 >> 1  =  10 (2) // right shift

    $x = ~4;     // ~00000100 = 11111011 (-5) // invert

    ```


    These bitwise operators have shorthand assignment operators, just like the arithmetic
    operators.


    ```php

    $x=5; $x &= 4;  // 101 & 100 = 100 (4) // and

    $x=5; $x |= 4;  // 101 | 100 = 101 (5) // or

    $x=5; $x ^= 4;  // 101 ^ 100 = 001 (1) // xor

    $x=5; $x <<= 1; // 101 << 1  = 1010 (10) // left shift

    $x=5; $x >>= 1; // 101 >> 1  =  10 (2) // right shift

    ```'
