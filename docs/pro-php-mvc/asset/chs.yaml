  \ Chrome 的路径\n\n完成 WAMP 安装后，你将在系统托盘中看到一个新图标。左键单击此图标，你将看到一个弹出菜单。单击“localhost”。\n\n\
  > **注意** 你不必使用 Google Chrome。你可以以同样的方式选择任何其他浏览器。\n\n#### 讨厌的 Skype！\n\n每次在同时运行 Skype\
  \ 的 Windows 系统上安装 WAMP 时，我反复遇到的一个问题是 Apache 无法加载。这是由于浏览器和 Skype 的工作方式所致。\n\n长期以来，Web\
  \ 服务器默认在端口 80 上提供内容。同样，浏览器从域名的端口 80 请求网站。你可以轻松更改这些设置，但它们是标准。因此，端口 80 是一个常用端口。路由器和安全软件通常保持此端口开放以发送/接收数据，因为它们假设这里只会有\
  \ HTTP 流量。\n\n\n\n# 设置 Web 服务器\n\n看到这种情况，`Skype` 选择使用 `80` 端口作为默认通信端口，这样它就能绕过最严格的安全软件。问题是\
  \ `Apache` 或 `Skype`（但不能两者同时）可以使用 `80` 端口。\n\n我们可以让 `Apache` 运行在不同的端口上，并不断更改浏览器地址栏以匹配，或者更改\
