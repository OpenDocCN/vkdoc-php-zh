    ## Improving Security with Authentication


    One of the last things we need to do is to close a big security hole. Our administration
    module is wide open and available for all users. Let us create a procedure which
    requires all administrators to log in before using the system. Creating this requires
    that we perform the following tasks:


    *   Create an admin table in the `simple_blog` database

    *   Use one-way hashing of passwords

    *   Create an HTML form for creating new administrators

    *   Create a login form for administrators

    *   Hide administration module from unauthorized users

    *   Use sessions to persist a login state across multiple HTTP requests


    ## Creating an admin_table in the Database


    Enabling authorized administrators for our site requires that we create a table
    to store their data. We will create an `admin` table to store the following information
    about administrators:


    *   `admin_id`: A unique number identifying an administrator

    *   `email`: The administrator’s email address

    *   `userid`: The administrator’s userid

    *   `password`: The administrator’s password


    We will hash the password using BCRYPT (the default hash in PHP 8) which currently
    creates a string of 72 characters. However, future versions will expand this string.
    Consequently, we will create the `password` column using the `VARCHAR` data type
    and limit input to 255 characters for future expansion. We will also allow a `userid`
    with a `VARCHAR` data type and size of 255 characters. However, we will require
    a minimum size of eight characters, for both the `userid` and `password`, which
    will be verified using both HTML and PHP code.


    To create the `admin` table, we will navigate to `http://localhost/phpmyadmin`
    in a browser, select the `simple blog` database, and open the SQL tab. Then we
    will enter the following command to create the table.


    ```

    create table admin(

    admin_id INT NOT NULL AUTO_INCREMENT,

    email TEXT,

    userid VARCHAR(72),

    password VARCHAR(72),

    primary key (admin_id)

    )

    ```


    > **Note**: You can also select the database, then scroll down to the create table
    area and enter the table name (`admin`). Then click the `Go` button. The system
    will then provide a form for completing the fields in the table. Entering the
    same information as shown in the preceding script will produce the same results,
    after you click the `Save` button.


    ## Hashing the Password with BCRYPT


    Once we get around to inserting new users into the `admin` table, we will discover
    how to hash a string with BCRYPT. The BCRYPT algorithm provides one-way hashing.


    Hashing passwords is an absolute requirement for strong security because a hashed
    password is harder to steal. Let us imagine the password is `Test`. If we hash
    it using BCRYPT, then `Test` becomes:


    ```

    $2y$10$xJN9J3cSlTp25rqS5MNYFepRs5Mkcs0y.zya6MFshLPDllWBTav4S

    ```


    This certainly becomes a very difficult password to crack! Even if the database
    suffers a serious attack, and all usernames and passwords are exposed, attackers
    still will have a difficult time trying to misuse the usernames and passwords.


    ### One-Way Hashing


    Passwords should always be protected through one-way hashing. If a password is
    hashed with a one-way hashing algorithm, it will be nearly impossible to determine
    the real password. Any system that can recover a lost password is inherently unsafe.
    If the original password can be recovered, the system must have somehow remembered
    the password. If the password is remembered by the system, it is likely that system
    administrators can see the password. If the password can be seen, it is vulnerable.
    A secure system only stores hashed passwords. If someone forgets their password,
    a secure system will provide an opportunity to reset the password.


    In the context of the blogging system, it means that administrator passwords are
    protected from all blog administrators. If a user loses their password, it cannot
    be sent to them again. Instead, the system could offer them a chance to reset
    the password.


    ### Sufficient Security


    Always assume that even the most secure systems can be hacked. The question is
    how much time and effort are required from the attacker. Our task is to provide
    enough security to discourage attackers from trying to access the content of the
    database.


    > **Note**: For more information on hashing passwords with PHP, visit [`www.php.net/manual/en/function.password-hash.php`](http://www.php.net/manual/en/function.password-hash.php).


    ## Adding Administrators in the Database


    We now have a database table to save administrator credentials; we are ready to
    start creating blog administrators. Our first step is to create a form that allows
    us to enter an email address, a `userid`, and a corresponding password. Once we
    accomplish this, we will store the information in the database for later use.


    ### Building an HTML Form


    As we have already learned, it is best to create forms that provide feedback to
    users. We can prepare the form for user feedback right away. Let us look at the
    code.


    ```

    Create new admin user

    Userid


    Password


    e-mail


