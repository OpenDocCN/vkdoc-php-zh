- fmt: '# PHP Libraries, Extensions, Classes, and Objects


    One of the strengths of PHP is the ability to easily store modules of code in
    libraries. Once code has been installed in a library, it can easily be reused
    in other programs. The reuse of code that has already been well tested and used
    in "live" environments greatly reduces program errors and increases productivity
    because you do not have to reinvent the wheel. There is no need to re-create code
    that is already successfully working. It is a waste of time and energy and likely
    to cause unnecessary program errors. The programmer actually may not know what
    actual code exists in a module of code (`class`). However, the programmer knows
    what parameters (such as numbers) can be passed into the "black box" and what
    is returned (sum of the numbers) from the black box.


    It may concern you that the programmer blindly passes information into the black
    box and blindly receives information back. However, this is an advantage, not
    a disadvantage. This allows the creator of the module to update the code without
    affecting the way the module is used. As long as the module accepts the same input
    and returns the same output, the programmer who is using the module notices no
    changes. Updates can occur to the module for better efficiency, better security,
    or to correct any program code problems without causing the users to change how
    they handle the module in their code.


    ## PHP Extensions


    ```

    extension=bz2

    extension=curl

    ;extension=ffi

    ;extension=ftp

    extension=fileinfo

    extension=gd2

    extension=gettext

    ;extension=gmp

    ;extension=intl

    ;extension=imap

    ;extension=ldap

    extension=mbstring

    extension=exif

    extension=mysqli

    ;extension=oci8_12c

    ;extension=odbc

    ;extension=openssl

    ;extension=pdo_firebird

    extension=pdo_mysql

    ;extension=pdo_oci

    ;extension=pdo_odbc

    ;extension=pdo_pgsql

    extension=pdo_sqlite

    ;extension=pgsql

    ;extension=shmop

    ;extension=snmp

    ;extension=soap

    ;extension=sockets

    ;extension=sodium

    ;extension=sqlite3

    ;extension=tidy

    ;extension=xmlrpc

    ;extension=xsl

    Example 4-1

    Extensions in the php.ini file

    ```


    *For a complete list and explanation of PHP extensions and their functions, visit*
    [*www.php.net/manual/en/extensions.alphabetical.php*](http://www.php.net/manual/en/extensions.alphabetical.php)*.*


    PHP has a large number of libraries available with thousands of lines of well-tested
    code. Example 4-1 is a partial copy of the `php.ini` file showing several extensions
    *(libraries) that are available to be activated in PHP*. The code is already compiled.
    A library extension that exists in the PHP environment can be activated by removing
    the comment symbol (`;`) in front of the extension statement. Once the INI file
    has been saved, PHP and the web server (`Apache`) must be restarted (see Chapter
    1 for examples on the location of the `php.ini` file and restarting PHP and Apache).
    This ease of adding libraries is one of the reasons PHP has become so popular.
    Additional libraries can be "installed" into PHP using several methods. One of
    the more popular methods, *PEAR* (PHP Extension and Application Repository), handles
    code distribution and maintenance of third-party libraries.


    - *The use of PEAR and other third-party library installation methods is beyond
    the scope of this book. However, you can find additional information at the following
    link:*

    - [https://pear.php.net/manual/en/about-pear.php](https://pear.php.net/manual/en/about-pear.php)


    In addition, programmers can "install" their own libraries of code (that are not
    already compiled) directly into an application via the `require` or `require_once`
    statement. It is common practice in corporations to include code that may be reused
    many times (such as accessing a database). By providing this (well-tested) code
    in a local library, any changes (such as the movement of the database to another
    server) can be handled in one location (the local library file), instead of requiring
    multiple files to be changed. This also reduces code redundancy and increases
    its reliability.


    While local libraries can contain just methods (functions) of code, it is more
    common that modules (classes) exist in these libraries. This allows programmers
    to code with the "black box" concept previously mentioned. The three-tier architecture
    (explained in Chapter 2) is based on this premise. The code classes can be accessed
    from the library by referencing the library containing the code (via the `require`
    or `require_once` statement). Once a reference is made, an instance of the class
    (`object`) is then created. Once an instance has been created, the program code
    has access to all the functionality of the object.


    ## Classes and Objects


    A class is similar to a blueprint of a house. The blueprint contains a description
    (characteristics) of all the elements needed to construct the house. However,
    the blueprint is not the actual house itself. It describes what is possible if
    we hire a crew and construct the house. The blueprint is not considered to exist
    (as a house would exist). However, it describes the items needed to build the
    house (nails, drywall, and wood) and the process to build the house.


    A **class** describes the **characteristics** (properties) of the module of code
    and the **actions** (methods or functions) that can occur in that code. However,
    it does not physically exist (within memory) until an instance of the class (called
    an **object**) is created. Once an instance is created, the characteristics and
    actions can be accessed. Classes and objects (when created properly) protect the
    characteristics (properties) from direct access. This provides the object the
    opportunity to verify that any request to change a value in a property is valid
    before the change occurs. This is commonly called **encapsulation**. To protect
    properties from direct access to the outside world, they should be declared using
    the **private** access type. `Private` access will only allow methods within the
    class the ability to change the values in the properties. **Set methods** (discussed
    later in this chapter) are used to change properties. **Get methods** (also discussed
    later in this chapter) are normally used to retrieve property values.


    ## Creating a PHP Class


    Let us begin by creating a basic structure for a class. We will create a `dog`
    class which will allow us to set some characters of the dog (size, breed, color,
    and name), and it will provide the ability for the dog to speak and to display
    the values saved in each property. We will create the `dog` class in a separate
    file (library) that can be loaded into the program (or any other program) when
    needed.


    To create a PHP class, we use the `class` keyword and encapsulate all code within
    the class in `{}`.


    ```

    Example 4-2

    Basic class structure in the dog.php file

