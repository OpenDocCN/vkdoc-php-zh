    \ 后接评论的唯一 ID。\n\n## 在控制器和模型中创建投票动作\n\n清单 8-12 第 14-15 行引用的 `Vote` 动作尚不存在；让我们在\
    \ Comments 控制器中创建它。这个动作将相当简单：在 comments 表的 `votes` 字段中加 1 或减 1，并将总票数返回给视图。当然，这个动作将使用\
