  trans: '

    # 8.2 搭建一个简单的 CDN


    值得庆幸的是，大多数 CDN 都非常容易设置。本书中，我们将使用亚马逊的 CloudFront 作为 CDN，尽管还有许多其他选项（仅举几例，如 CloudFlare、StackPath、CDN77
    和 Fastly）。CDN 的好处在于，由于它们提供的服务相当透明，因此可以轻松地为 CDN 混合搭配不同的服务提供商。


    CloudFront 的工作方式非常简单：


    1.  你将所有静态内容托管在你的主站点上。这是你内容的“官方”存储库。

    2.  你在 CloudFront 上创建一个主机来提供你的内容（通常，该主机会有一个类似 `xyzabc.cloudfront.net` 的名称）。

    3.  你告诉 CloudFront 服务器你的主站点的 URL。

    4.  每次你从站点链接到静态内容时，你都使用 CloudFront URL 链接到它，而不是链接到你自己的服务器上的内容。例如，如果你的图片位于 `http://mysite.example.com/mydirectory/myimage.png`，那么当你链接到它时，你将使用
    URL `http://xyzabc.cloudfront.net/mydirectory/myimage.png`。CloudFront 会根据你的配置知道如何找到
    `myimage.png`，并将其缓存并提供给你的用户。


    CloudFront 第一次收到图片请求时，它会前往你的站点获取它。然后，后续的任何请求将直接由靠近请求用户的 CloudFront 服务器提供服务。


    让我们来看看如何使用 Amazon AWS 和 CloudFront 实际操作。你需要做的第一件事是在 `http://aws.amazon.com` 注册
    AWS。我假设你可以独立完成注册过程，无需我指导。


    AWS 提供了数量惊人的可用服务，因此其仪表板并非列出所有服务，而是让你进行搜索。在搜索栏中输入“CloudFront”，然后它就会允许你进入 CloudFront
    仪表板。


    由于你是第一次使用 CloudFront，它会显示一个写着“创建分配”的按钮。用 CloudFront 的术语来说，一个*分配*就是一个 CDN 复制器服务。


    点击“创建分配”后，CloudFront 会询问你的交付方式，并提供“Web”或“RTMP”选项。RTMP 是用于流式传输大量视频内容的协议。但由于我们只是分发像图片和样式表这样的基本资源，我们将选择从基本的
    Web 交付开始。


    接着，Amazon 会要求你提供关于分配的详细信息，如图 8-1 所示。在下方实际上还有大量其他选项，但唯一必填字段是“源域名”，即你想要 CloudFront
    从中获取资源的站点的 DNS 主机名。这*不能*是 IP 地址，必须是某种 DNS 主机名。如果你尚未为应用程序设置 DNS 主机名，你可以直接使用 Linode
    自动生成的主机名之一。如果你进入 Linode 的 Node Balancer 界面并点击你的负载均衡器，它会为你提供一个（非常长，可能会分开两行显示的）内部生成的负载均衡器主机名（类似
    `nb-BALANCER-PUBLIC-IP-ADDRESS.dallas.nodebalancer.linode.com`）。填写完“源域名”后，向下滚动到页面底部。


    ![../images/487291_1_En_8_Chapter/487291_1_En_8_Fig2_HTML.jpg](img/487291_1_En_8_Fig2_HTML.jpg)


    图 8-2：CloudFront 分配列表


    ![../images/487291_1_En_8_Chapter/487291_1_En_8_Fig1_HTML.jpg](img/487291_1_En_8_Fig1_HTML.jpg)


    图 8-1：创建 CloudFront 分配


    在页面底部，有一个“创建分配”按钮。点击此按钮后，你将进入一个分配列表，其中会显示你新创建的分配，类似于图 8-2。此屏幕最重要的部分是“域名”，它显示了你如何访问新创建的分配（你可能需要调整字段大小才能看到完整的名称）。它还会提供一个状态，该状态从“进行中”变为“已部署”可能需要
    5 分钟到 1 小时不等。一旦部署完成，你就拥有一个正在运行的 CDN 了！


    ## 8.3 使用你的 CDN


    一旦状态变为“已部署”，此域名将完整镜像你的原始站点。但是，它只是你站点的静态版本。如果你的站点发生了变化，除非你告知 CloudFront，否则它*不会*更新其资源。


    假设 CloudFront 给你的域名是 `xyzabc.cloudfront.net`。这意味着如果你访问 `http://xyzabc.cloudfront.net/list.php`，它会显示你的留言板列表。但是，如果你随后修改了留言板列表，这些更改将不会反映在你的
    CDN 上——它把所有内容都视为静态资源。这就是为什么在大多数情况下，CDN 只提供静态资源——图片、样式表、JavaScript 等。


    因此，我们不要通过 CDN 访问整个站点，而是修改应用程序，仅通过 CDN 提供我们的样式表。我们只需修改 `common.php` 中的一行代码。在 `getHeader()`
    函数中，我们只需将 `<link>` 标签改为：


    ```

    <link rel="stylesheet" type="text/css" href="http://xyzabc.cloudfront.net/style.css"
    />

    ```


    请务必将 `xyzabc.cloudfront.net` 替换为你自己分配的域名！一旦在所有服务器上部署，你的样式表就将由 CDN 提供。


    ![../images/487291_1_En_8_Chapter/487291_1_En_8_Fig3_HTML.jpg](img/487291_1_En_8_Fig3_HTML.jpg)


    图 8-3：从 CDN 移除内容


    这意味着你的服务器几乎再也不用提供样式表了。偶尔，CDN 可能会过期其某些缓存内容，但这由 CDN 自行决定。CDN 会自行优化存储多少数据、存储多长时间以及多久重新请求一次你的原始文件。对于更高级的应用程序，你可以配置
    Apache 提供 `Expires:` HTTP 头或 `Cache-Control:` HTTP 头，以指定 CDN 应保留数据的最长时间。


    然而，假设你部署了一个实际带有更新样式表的新版本应用程序。这意味着 CDN 正在为你提供的版本现在已经过时——它的缓存中可能仍然存有旧版本。这完全不是问题，这只意味着你需要手动告诉
    CDN “作废”你的内容，以便它重新请求。


    要在 CloudFront CDN 上作废内容，首先点击你的 CloudFront 分配的 ID。这将带你进入一个信息页面，描述分配上设置的所有选项。在靠右的位置，有一个名为“作废”的标签。点击此标签，然后点击“创建作废”。这将带你进入一个类似于图
    8-3 的界面。在“对象路径”字段中，清空其中的任何内容，然后只输入 `/*` 来作废所有内容。虽然 CloudFront 允许你进行细粒度访问，以作废和移除
    CDN 上的特定项目，但我发现，在大多数情况下，简单地作废所有内容更加简单和清晰。点击“作废”按钮即可生效。


    作废操作可能需要几分钟才能传播到所有 CloudFront 的服务器，但不久后所有服务器都将提供你的新内容。当作废的“状态”变为“已完成”时，你就知道操作完成了。

    '
- fmt: '# 8.4 Caching Your Whole Site with a CDN


    In addition to caching individual pieces of content like stylesheets, JavaScript,
    and images, modern CDNs can actually allow you to cache your entire web site,
    giving you instant scalability across the Internet. While this doesn’t work for
    web *applications* such as ours, if you had a basic web site, this could make
    your web site instantly scalable to an infinite number of users with almost no
    cost or extra configuration.


    Let’s look at how to do this with CloudFront. In order for the CDN to serve up
    your web site directly, you will need to point the DNS of your main site at the
    CDN’s server.


    You might think that you could just set the A record of your web site to the CDN.
    However, CDNs don’t typically give you IP addresses for their hosts. The reason
    for this is that CDNs have *multiple* IP addresses for the CDN (one for each PoP),
    and they often rely on the DNS lookup to decide which IP address to give to which
    client (i.e., it will give the client an IP address which is geographically near
    to them). This means that we can’t just specify the IP address of the CDN in our
    DNS to point the web site to it.


    Instead, CDNs usually handle this sort of thing through DNS CNAME records. A CNAME
    is a “canonical name”—it tells browsers to use a different name for DNS queries
    and use the results of that name for our own DNS lookups. If you set `www` to
    be a CNAME to your CloudFront host, then CloudFront can still use its own DNS
    mechanism to give out the right IP address to each client.


    However, this creates another problem. The CDN needs to know what hostname you
    may be accessing it through. That is, if you have `www.example.com` CNAMEd to
    `abcxyz.cloudfront.com`, CloudFront needs to know that when one of its machines
    receive a request for `www.example.com`, it should serve up the cache associated
    with `abcxyz.cloudfront.com`.


    This is done through the distribution settings in AWS. These settings are under
    the “General” tab of your distribution. Click “Edit” and look for a field called
    “Alternate Domain Names (CNAMEs).” Here you can put any hostname that you have
    CNAMEd to this distribution (one per line or comma separated).


    This, however, poses a problem, because the CDN needs a place to retrieve your
    data from, and you just pointed your DNS to the CDN instead of your own servers!
    To get around this, you simply set up an internal DNS name that the CDN pulls
    from (you can call this `www2.example.com` or `www-internal.example.com`), and
    then set the DNS for `www` to point to the CDN (note that we are not using “internal”
    to mean only visible by us, since it is just as much on the public Internet as
    the main site, but rather to indicate that it is not the destination we are directing
    end users to).


    Doing this, the CDN allows for limitless growth of visitors to your web site.


    ![../images/487291_1_En_8_Chapter/487291_1_En_8_Figa_HTML.jpg](images/487291_1_En_8_Chapter/487291_1_En_8_Figa_HTML.jpg)


    ## Dealing With Bare Domain Names


    On a technical note, you cannot create a CNAME for the root-level domain. You
    can do a CNAME for `www.example.com`, but not `example.com`. While your DNS server
    may allow it, it is against the specification and can cause a variety of strange
    problems for clients that are not expecting this. Therefore, you will need to
    make sure you have a mechanism redirecting your bare domain name (i.e., `example.com`)
    to your CNAMEd host (i.e., `www.example.com`).


    To get around this, many DNS providers provide a redirect service to automatically
    redirect all requests for the bare domain name to the `www` host. If your DNS
    provider doesn’t provide this service, the kind folks at `wwwizer.com` provide
    a free service that does this for you. Essentially, if you point the A record
    for your bare domain to `174.129.25.170`, it will be automatically redirected
    to the same domain with `www` in front of it.


    More information about this service is available at `http://wwwizer.com/naked-domain-redirect`.


    Also remember that, as with any overly cheap service, you should take appropriate
    cautions. Letting them redirect your traffic can simplify things, but letting
    a third party that you don’t have a contract with redirect your traffic for you
    can also be problematic.'
