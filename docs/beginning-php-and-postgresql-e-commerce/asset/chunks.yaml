    C H A P T E R 2 ■ L AY I N G O U T T H E F O U N D AT I O N S


    • Decide which technologies, programming languages, and tools to use


    • Consider naming and coding conventions


    • Create the basic structure of the web site and set up the database


    • Implement an error-handling routine and a reporting routine in the site skeleton
    **Designing for Growth**


    The word *design* in the context of a web application can mean many things. Its
    most popular usage probably refers to the visual and user interface design of
    a web site.


    This aspect is crucial because, let’s face it, the visitor is often more impressed
    with how a site looks and how easy it is to use than about which technologies
    and techniques are used behind the scenes or what operating system the web server
    is running. If the site is slow, hard to use, or easy to forget, it just doesn’t
    matter what rocket science was used to create it.


    Unfortunately, this truth makes many inexperienced programmers underestimate the
    importance of the way the invisible part of the site is implemented—the code,
    the database, and so on. The visual part of a site gets visitors interested to
    begin with, but its functionality makes them come back. A web site can sometimes
    be implemented very quickly based on certain initial requirements, but if not
    properly architected, it can become difficult, if not impossible, to change.


    For any project of any size, some preparation must be done before starting to
    code. Still, no matter how much preparation and design work is done, the unexpected
    does happen, and hidden catches, new requirements, and changing rules always seem
    to work against deadlines.


    Even without these unexpected factors, site designers are often asked to change
    or add new functionality many times after the project is finished and deployed.
    This will also be the case for HatShop, which will be implemented in three separate
    stages, as discussed in Chapter 1.


    You will learn how to create the web site so that the site (or you) will not fall
    apart when functionality is extended or updates are made. Because this is a programming
    book, instead of focusing on how to design the user interface or on marketing
    techniques, we’ll pay close attention to designing the code that makes them work.


    The phrase, **designing the code**, can have different meanings; for example,
    we’ll need to have a short talk about naming conventions. Still, the most important
    aspect that we need to take a look at is the application architecture. The architecture
    refers to the way you split the code for a simple piece of functionality (for
    example, the product search feature) into smaller components. Although it might
    be easier to implement that functionality as quickly and as simply as possible
    in a single component, you gain great long-term advantages by creating more components
    that work together to achieve the desired result.


    Before talking about the architecture itself, you must determine what you want
    from this architecture.


    **Meeting Long-Term Requirements with Minimal Effort**


    Apart from the fact that you want a fast web site, each of the phases of development
    we talked about in Chapter 1 brings new requirements that must be met.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH02.qxd 11/8/06 9:33 AM Page 15


    C H A P T E R 2 ■ L AY I N G O U T T H E F O U N D AT I O N S


    **15**


    Every time you proceed to a new stage, you want to be able to **reuse** most of
    the already existing solution. It would be very inefficient to redesign the whole
    site (not just the visual part but the code as well!) just because you need to
    add a new feature. You can make it easier to reuse the solution by planning ahead,
    so any new functionality that needs to be added can slot in with ease, rather
    than each change causing a new headache.


    When building the web site, implementing a **flexible architecture** composed
    of pluggable components allows you to add new features—such as the shopping cart,
    the departments list, or the product search feature—by coding them as separate
    components and plugging them into the existing application. Achieving a good level
    of flexibility is one of the goals regarding the application’s architecture, and
    this chapter shows how you can put this into practice.


    You’ll see that the flexibility level is proportional to the amount of time required
    to design and implement it, so we’ll try to find a compromise that will provide
    the best gains without complicating the code too much.


    Another major requirement that is common to all online applications is having
    a **scalable** **architecture**. Scalability is defined as the capability to increase
    resources to yield a linear increase in service capacity. In other words, ideally,
    in a scalable system, the ratio (proportion) between the number of client requests
    and the hardware resources required to handle those requests is constant, even
    when the number of clients increases. An unscalable system can’t deal with an
    increasing number of clients, no matter how many hardware resources are provided.
    Because we’re optimistic about the number of customers, we must be sure that the
    site will be capable of delivering its functionality to a large number of clients
    without throwing out errors or performing sluggishly.


    **Reliability** is also a critical aspect for an e-commerce application. With
    the help of a coherent error-handling strategy and a powerful relational database,
    you can ensure data integrity and ensure that noncritical errors are properly
    handled without bringing the site to its knees.


    **The Magic of the Three-Tier Architecture**


    Generally, the architecture refers to splitting each piece of the application’s
    functionality into separate components based on what they do and grouping each
    kind of component into a single logical tier.


    Almost every module that you’ll create for your site will have components in these
    three tiers from the application server:


    • The presentation tier


    • The business tier


    • The data tier


    The **presentation tier** contains the user interface elements of the site and
    includes all the logic that manages the interaction between the visitor and the
    client’s business. This tier makes the whole site feel alive, and the way you
    design it has a crucial importance for the site’s success. Because your application
    is a web site, its presentation tier is composed of dynamic web pages.


    The **business tier** (also called the *middle tier*) receives requests from the
    presentation tier and returns a result to the presentation tier depending on the
    business logic it contains.


    Almost any event that happens in the presentation tier usually results in the
    business tier


