  \ |\n\n### 7.7 APC 缓存变量\n\n你可能在 PHP 的 Web 开发中已经了解过 APC 缓存系统。它可用于在内存中缓存变量，然后由不同的脚本访问。不幸的是，这仅适用于\
  \ Web 环境，因为缓存在每个进程的基础上运行。当通过像 Apache 这样的服务器运行时，PHP 在 Apache 进程下运行，该进程是一组（一个或多个）长时间运行的进程。对于\
  \ PHP CLI SAPI，情况正好相反。每个脚本的每次运行都会创建自己的进程（`php.exe` 进程），该进程在脚本终止时终止。可以为 CLI 启用 APC，但在每次脚本运行结束时，缓存将被销毁，并且每个进程都有自己的缓存。这对于在长时间运行的单个进程程序（例如系统守护进程）中基于内存的缓存偶尔会很有用，但即便如此，你可能仍然认为专用的内存缓存系统（如\
  \ memcached）可能更好，因为它可以应对进程的意外重启。基于这些原因，本书将不介绍 APC 用户变量缓存。如果你使用基于 Apache 的解决方案，可以在\
  \ PHP 手册中找到更多信息。\n\n| ![信息](img/image00248.jpeg) | **延伸阅读** PHP 手册中的 APC [`www.php.net/manual/en/book.apc.php`](http://www.php.net/manual/en/book.apc.php)\
  \ |\n\n\n\n### 7.8 虚拟文件 - `tmpfs`\n\n`Tmpfs` 是一种文件系统，允许你创建和使用存储在内存中的文件。这种类型的系统常被称为“内存盘”。这些虚拟文件的行为和操作方式与磁盘上的普通文件相同，因此可以让你不同的进程通过读写文件中的数据来进行通信，就像使用普通的“磁盘上”文件一样。`tmpfs`\
  \ 带来的优势是双重的：首先它速度快，其次所有内容都是临时的。由于文件保存在内存中，无需等待机械硬盘，因此 I/O 非常迅速。并且，由于它们保存在内存中，因此仅是临时的，如果你尚未删除它们，它们将在系统重启后消失。另一个优势是，作为普通文件，它们并非\
  \ PHP 专属技术，因此可以根据需要被其他软件访问。\n\n我们不会详细讨论如何使用它们进行进程间通信，这里假设你已经熟悉如何从 PHP 访问基于磁盘的普通文件，以及如何创建和读取适当的文件格式。你可以像访问普通文件和流一样，以完全相同的方式访问\
  \ `tmpfs` 文件系统上的文件。它们位于内存中这一事实对你的 PHP 脚本来说是透明的。\n\n要在 Linux 上创建 `tmpfs` 文件系统，首先需要在磁盘上创建一个目录，用于将内存设备“挂载”到你的文件系统。然后，你将内存设备挂载到该位置并开始使用它。\n\
  \n```\n1 mkdir /home/rob/myMemoryDrive\n\n3 sudo mount -t tmpfs /mnt/tmpfs /home/rob/myMemoryDrive\n\
  \n5 php -r \"file_put_contents('/home/rob/myMemoryDrive/test.txt','Hello');\"\n\n\
  7 cat /home/rob/myMemoryDrive/test.txt\n\n9 sudo umount -a /mnt/tmpfs\n\n11 cat\
  \ /home/rob/myMemoryDrive/test.txt\n```\n\n在上述脚本中，我们在 `/home/rob/myMemoryDrive`\
  \ 处创建了一个目录来挂载内存设备，然后将其 `mount` 到那里。我们执行了一行 PHP 代码来演示创建一个内存文件，就像创建任何其他文件一样，然后使用 `cat`\
  \ 命令显示该文件，应该输出 `Hello`。最后，我们 `unmount` 该设备，并再次尝试 `cat` 该文件，但正如预期的那样，文件消失了，它从未被保存到物理磁盘。\n\
  \n你可以像上面所示那样，在每次启动系统或需要使用时，使用 `mount` 命令来挂载 `tmpfs` 设备，或者你也可以在 `fstab` 文件中添加一个条目，以便每次系统启动时自动创建它。无论你以何种方式挂载，当关闭或重启系统时，请始终记住它及其中的所有文件都将被销毁。\n\
  \n由于 `tmpfs` 的操作方式与普通文件系统相同，你需要确保设置相关的文件权限，以允许你的所有应用程序访问它（或者阻止那些不应该干涉的应用程序访问）。另请注意，如果你的系统内存不足，可能会发生内存交换到磁盘的情况，因此在这些情况下，你的数据可能会暂时触及硬盘，并且在某些条件下，之后可能可以从磁盘中恢复。始终要考虑你选择的任何消息传递系统的安全影响。\n\
  \n如果你出于性能原因考虑使用 `tmpfs` 而非物理硬盘进行通信，还应注意现代操作系统（包括现代 Linux）可以对磁盘访问使用激进的内存内缓存。这意味着操作系统会将经常读取的基于磁盘的文件透明地缓存到动态分配的空闲内存中（通常你甚至不会察觉），以提高物理磁盘的感知性能。在这些情况下，从\
  \ `tmpfs` 内存盘中读取某些文件和遍历目录树时，你可能看不到预期的性能提升。对磁盘的写入和较少访问的文件通常不会被缓存，因此在那些情况下，`tmpfs`\
  \ 仍然可能为你带来预期的性能提升。\n\n### 7.9 标准流\n\n我们在前面的章节中已经介绍了标准流（`STDIN`、`STDOUT`、`STDERR`）及其使用方法。现在应该很明显，你可以通过\
  \ shell 管道和 I/O 重定向来使用它们与其他进程通信。如果你在 PHP 内部使用 `proc_open()` 或 `popen()` 启动想要通信的进程，那么在读写文件句柄时，你会自动使用标准流。\n\
  \n### 7.10 Linux 信号\n\n可以使用 Linux 信号在进程间进行粗略的通信，尽管这通常用于父子进程控制。有关 Linux 信号的更多信息，请参见第\
  \ 8 章。\n\n### 7.11 任务分发与管理系统\n\n消息传递系统的一个常见用途是管理“工作”进程并分发任务。如果你想使用预先构建的解决方案，请查看第\
  \ 6 章中的任务分发和管理部分。\n\n## 8. 与系统对话\n\n到目前为止，我们已经研究了与用户通信的软件（通过文本或图形界面），以及完全不需要与用户通信的系统软件。这两类软件的共同点是需要处理其底层的系统。该系统是一个包含文件系统、操作系统、硬件接口和各种系统级服务的结构。\n\
  \n当进行 Web 编程时，你通常不会与硬件、系统的底层方面等进行交互。事实上，在许多情况下，你会特意采取措施来禁止你的用户这样做！相比之下，在构建多种类型的软件时，处理打印机、声卡和其他硬件是一个常见需求，并且与系统级服务交互通常是必要的。你会从网页中处理文件系统的部分内容，但在离线软件中，你通常拥有更多的自由和资源来处理更广泛的文件格式、更大的文件大小和更受权限约束的文件。\n\
  \n在本章中，我们将探讨一些不同的方法，以在 PHP 内部或借助辅助应用程序与这些资源进行交互，以及在此过程中需要考虑的一些问题。\n\n### 8.1 文件系统交互\n\
  \n软件通常需要交互的数据文件类型有很多，从图像到文本文件，从格式化文档到视频，从结构化数据到配置文件，等等。PHP 内置了用于读取、写入、解析和显示多种不同类型数据文件的函数，并且通过\
  \ `Pear`、`Pecl`、`Composer` 和第三方库，覆盖了更多的类型。在许多系统上，特别是 Unix 变体，还可以调用辅助应用程序来进一步扩展所支持的文件类型范围。事实上，在\
  \ PHP 中你几乎找不到难以处理的文件类型，那些难以处理的往往是规范被严格保密的专有格式。如果你坚持使用开放格式，尤其是基于标准的格式，你总能在 PHP 生态系统中找到所需的工具。\n\
  \n### 8.2 数据文件与格式\n\n附录 B 包含一个针对广泛常见格式可用的函数/库/辅助程序的参考列表。请记住，如果某个特定版本的格式未出现，通常可以使用基于其通用格式的函数来操作它（例如，许多基于\
  \ XML 的格式完全可以使用列出的 XML 工具进行操作）。\n\n始终要记住，数据文件是安全漏洞的一个主要媒介，即使软件是由受信任的用户在本地操作的，这些用户也可能无意中尝试打开来自恶意来源的文件。始终将外部数据视为可能被污染的，并像对待具有潜在安全漏洞一样对待未经审核的扩展/辅助程序。\n\
  \n\n### 8.3 处理大文件\n\n当你的脚本运行时间不受限制时，你会发现与在 Web 上使用 PHP 相比，你能处理更大的文件。通常，处理它们的方式与处理小文件相同。然而，你可能遇到的一个大问题就是内存使用。理解\
  \ PHP 在加载和处理文件时如何使用内存至关重要，这样你才能在代码中做出恰当的选择。附录 B 中列出的许多用于处理特定文件格式的库，会替你高效地处理大文件的打开和读取，因此本节内容在你自行处理文件，或使用需要你传递原始数据（而非文件名）的库时最为相关。\n\
  \n首先，我们来看看一次性读取文件的简单方法。PHP 有两个易于使用的函数来实现这一点：`file()` 和 `file_get_contents()`。前者将文件读入一个数组，后者读入一个字符串。\n\
  \n```\n 1 <?\n3 $filename = 'bigfile.csv';\n5 echo(\"文件大小: \".filesize($filename).\"\
  \ 字节\\n\");\n7 $memory1 = memory_get_usage();\n9 $file_array = file($filename);\n\
  11 $memory2 = memory_get_usage();\n13 $file_string = file_get_contents($filename);\n\
  15 $memory3  = memory_get_usage();\n17 echo(\"数组使用的内存: \".($memory2-$memory1).\"\
  \ 字节\\n\");\n19 echo(\"字符串使用的内存: \".($memory3-$memory2).\" 字节\\n\"); \n```\n\n在我手头的一个示例大文件上运行此代码，得到以下输出结果：\n\
  \n```\n1 文件大小: 186097433 字节\n2 数组使用的内存: 296969824 字节\n3 字符串使用的内存: 186097588 字节\n\
  ```\n\n可以看出，将文件（约 177Mb）读入字符串仅增加了 155 字节的开销，这完全可以接受。然而，将此文件读入数组却比原始文件大小额外增加了 105Mb\
  \ 的内存！在 PHP 中，数组是一种非常通用的数据结构，它们*“可以当作数组、列表（向量）、哈希表（映射的实现）、字典、集合、栈、队列等来使用”*（根据 PHP\
  \ 手册）。但这种通用性是有代价的，那就是用于存储结构信息的额外内存。因此，在加载文件之前，请考虑一下你将对数据进行的处理是否可以在字符串上完成，或者为了操作能力而承受数组的额外开销是否值得。如果你需要传统的数组或哈希表结构，但不需要\
  \ PHP 数组类型的这种通用性，可以研究一下 PHP SPL（标准 PHP 库），它包含一系列可能针对你的用例进行了优化的“传统”数据结构。\n\n| ![信息图标](img/image00248.jpeg)\
  \ | **延伸阅读**PHP 手册中的 SPL 书籍 [`www.php.net/manual/en/book.spl.php`](http://www.php.net/manual/en/book.spl.php)\
  \ |\n\n有时，无论你将文件读入何种数据结构，系统都没有足够的内存，要么是达到了为脚本设置的内存限制，要么是你通常就需要保持较低的内存使用量。通常，数据文件的处理可以逐行（或逐块）进行，PHP\
  \ 允许我们逐段读取文件，而不是一次性读取。假设你在读取更多数据之前丢弃了已读取的数据（例如，使用 `unset()` 释放、覆盖或将其写出到文件），那么你将只使用足以存储这一行或这一块的内存。\n\
  \n```\n 1 <?\n3 $filename = 'bigfile.csv';\n5 $memory1 = memory_get_usage();\n7\
  \ $file_string = file_get_contents($filename);\n9 $memory2  = memory_get_usage();\n\
  11 unset($file_string);\n13 $memoryBase = memory_get_usage();\n15 $file_handle =\
  \ fopen($filename, 'r');\n17 while ($line = fgets($file_handle)) {\n19 $memoryCurrent\
  \ = memory_get_usage();\n21 if ($memoryCurrent > $memoryBase) { $memoryHigh = $memoryCurrent;};\n\
  23 };\n25 echo(\"单个字符串使用的内存: \".($memory2-$memory1).\" 字节\\n\");\n26 echo(\"逐行读取时使用的最大内存:\
  \ \".\n27 \t\t($memoryHigh-$memoryBase).\" 字节\\n\");\n```\n\n在我的示例文件上，这段代码的输出是：\n\
  \n```\n1 单个字符串使用的内存: 186097768 字节\n2 逐行读取时使用的最大内存: 9000 字节\n```\n\n这应该能说明使用两种不同技术时内存使用的巨大差异。\n\
  \n如果你处理的是（或可能是）大于 2Gb 的文件，还应该注意，在许多平台上，某些文件系统函数对于大于此大小的文件可能不会返回正确（或任何）结果。这是因为这些平台使用\
  \ 32 位整数，PHP 的整数类型是有符号的，而 2Gb 是带符号 32 位整数能表示的最大尺寸。这会影响 `filesize()`、`stat()` 和 `fseek()`\
  \ 等函数。当然，你可以调用外部命令来替代其中一些函数，例如 Linux 上的 `wc -c` 会返回操作系统支持的所有文件的字节数。在安装了较新版本 `glibc`\
  \ 的 64 位 Linux 上，你可以使用 `D_LARGEFILE_SOURCE -D_FILE_OFFSET_BITS=64` 标志编译 PHP，以获得更好的大文件支持，但请注意，如果你编写的是用于分发的脚本，这显然并非对所有平台都可用。\n\
  \n在所有这些示例中，请记住你的脚本必须在 PHP 或你自己设定的任何内存限制内运行。默认情况下，PHP CLI SAPI 会关闭内存限制，你可以在命令行输入\
  \ `php -r \"echo(ini_get('memory_limit'));\"` 来查看默认的内存限制（`-1` 表示无限制）。在你的脚本内部，`ini_get('memory_limit')`\
  \ 会告诉你当前的最大值，而 `memory_get_usage()` 会告诉你当前正在使用的内存量。\n\n在处理大量数据时管理内存使用是经常让程序员措手不及的事情。正如我们所看到的，理解我们所使用的各种函数如何运作，可以帮助我们更高效地处理数据，并帮助我们最大限度地减少内存使用。\n\
  \n### 8.4 理解文件系统交互\n\nPHP 拥有许多与文件系统相关的扩展，其中许多是 PHP 核心的一部分，或者被编译到大多数 PHP 发行版中，并包含了数百个有用的函数。它们中的大多数以简单直接的方式运作，允许你像预期那样获取和设置文件及目录信息，并操作文件和文件系统。我们在此不会涵盖大部分函数，因为我相信你在\
  \ Web 项目中已经熟悉它们了，并且它们在 PHP 手册中也有很好的说明。\n\n| ![信息图标](img/image00248.jpeg) | **延伸阅读**PHP\
  \ 手册中与文件系统相关的函数 [`www.php.net/manual/en/refs.fileprocess.file.php`](http://www.php.net/manual/en/refs.fileprocess.file.php)\
  \ |\n\n这些函数中有许多模仿了你可能熟悉的命令行程序，比如 `chmod`、`mkdir`、`touch` 等等，并且其大致行为与你预期相符。然而，在长时间运行的脚本中，有一个差异会凸显出来，它围绕着\
  \ PHP 为提升性能而缓存文件系统信息这一点，我们接下来将对此进行探讨。\n\n\n\n### 8.5 PHP 文件状态缓存与真实路径缓存\n\n在互联网上，速度就是王道。PHP\
  \ 运行着两种信息缓存来加速文件系统访问。第一种是文件状态缓存，它会缓存指定文件的信息（如文件是否存在、是否可读、大小及类型等）。第二种是真实路径缓存，它会缓存指定文件或目录的实际真实路径（展开符号链接、相对路径、`.`\
  \ 和 `..` 路径、`include_path` 等）。每当 PHP 遇到新文件时，信息会自动添加到缓存中，随后在尝试访问同一文件时，这些信息会被任意数量的函数使用。对于网页这种转瞬即逝、文件系统变化不大的场景，这种处理方式通常能在性能提升上取得良好平衡。\n\
  \n然而，随着脚本执行时间的拉长，文件或路径详细信息在运行期间发生变化的可能性也会增加。因此，PHP 为我们提供了几种操作这两个缓存的选项。\n\n以下示例展示了文件状态缓存的实际效果，以及如何使用\
  \ `clearstatcache()` 清除它。\n\n```\n 1 <?\n\n 3 # 创建一个文件并添加一些文本\n\n 5 $filename =\
  \ 'test.txt';\n\n 7 $handle = fopen($filename, 'w+');\n\n 9 fwrite($handle, 'test');\n\
  \n11 # 以下代码应输出 4\n\n13 echo stat($filename)[\"size\"].\"\\n\";\n\n15 # 现在向文件写入更多数据，增加文件大小。\n\
  \n17 fwrite($handle, 'more test');\n\n19 # 直观上，以下命令应输出 13，因为文件现在比之前更大了。\n20 # 但它仍然输出\
  \ 4，因为该文件的 size 值已被缓存。\n\n23 echo stat($filename)[\"size\"].\"\\n\";\n\n25 # 如果我们清除缓存...\n\
  \n27 clearstatcache();\n\n29 # 那么下一行应按预期输出 13\n\n31 echo stat($filename)[\"size\"\
  ].\"\\n\";\n\n33 fclose($handle);\n```\n\n真实路径缓存的工作方式类似，可通过调用 `clearstatcache(true)`\
  \ 来清除，即将第一个参数设置为 `true`。你也可以通过调用 `clearstatcache(true, 'myfile.txt')` 来仅清除某个特定文件的缓存，其中第二个参数是文件名（且第一个参数必须设置为\
  \ `true`，即你必须同时清除真实路径缓存）。\n\n当然，在你的应用中可能无需清除这些缓存，而这样做也会影响性能。请根据具体情况逐一评估每次文件访问。\n\
  \n### 8.6 处理跨平台与远程文件系统\n\n虽然 PHP 中大多数文件系统相关函数是“平台无关”的，但你可能会发现自己需要编写自己的函数，或者至少要处理来自不同平台的文件名和路径。`pathogen`\
  \ 库就是一个有用的工具，它能减轻处理不同平台上不同文件名和路径表示形式时的痛苦。\n\n| ![](img/image00249.gif) | ***Pathogen***\
  \ |\n|---|---|\n| | 一个用于处理文件路径和模式的通用库。支持 Unix 和 Windows 路径格式、URI 等。 |\n| | ***主站***\
  \ : [`github.com/eloquent/pathogen`](https://github.com/eloquent/pathogen) |\n|\
  \ | ***主要文档与安装信息*** : [`github.com/eloquent/pathogen/#installation-and-documentation`](https://github.com/eloquent/pathogen/#installation-and-documentation)\
  \ |\n\n越来越多的远程、云及伪文件系统开始出现。许多用户现在使用 Dropbox 和 Amazon S3 等平台，并通过 WebDAV、SFTP 等常见格式与其他服务交互。这些服务大多提供了\
  \ PHP 扩展或 API 示例，但 `Flysytem` 抽象库旨在通过提供一个用于处理远程文件系统的通用 API，使许多此类扩展变得不再必要。\n\n| ![](img/image00249.gif)\
  \ | ***Flysystem*** |\n|---|---|\n| | 一个文件系统抽象库，允许你轻松地将本地文件系统替换为各种远程文件系统。 |\n| |\
  \ ***主站*** : [`github.com/FrenkyNet/Flysystem`](https://github.com/FrenkyNet/Flysystem)\
  \ |\n\n### 8.7 访问 Windows 注册表\n\nWindows 注册表是一个结构化的分层数据库，Windows 及其他应用程序用它来存储配置信息。虽然并非所有应用程序都普遍使用它，但大多数程序会在注册表中存储一些信息，而操作系统本身也大量使用它。我们也可以从\
  \ PHP 中访问注册表，从而检查并设置我们自己的应用程序的配置信息，如果拥有适当的权限，还可以访问其他应用程序乃至操作系统本身的配置信息。为此，我们需要在 PHP\
  \ 中使用 `win32std` 扩展。\n\n| ![](img/image00249.gif) | ***win32std*** |\n|---|---|\n\
  | | 一组标准 Windows API 函数。 |\n| | ***主站*** : [`pecl.php.net/package/win32std`](http://pecl.php.net/package/win32std)\
  \ |\n| | ***主要文档与安装信息*** : 请参见下载包内的 README 文件。 |\n| | ***备选文档*** : [`wildphp.free.fr/wiki/doku.php?id=win32std:index`](http://wildphp.free.fr/wiki/doku.php?id=win32std:index)\
  \ |\n\n| ![警告](img/image00251.jpeg) |\n\n\n\n### 警告\n\n错误地更改或修改注册表可能导致单个应用程序出现各种问题，甚至引发系统级别的故障。简而言之，操作不当可能会让你的机器崩溃。在开始动手之前，请先学习如何备份和还原注册表。或者，先在可丢弃的虚拟机中尝试，再在正式机器上使用（即便如此，备份正式机器仍然是明智之举！）。\n\
  \n在继续之前，你应该了解注册表的结构。注册表被划分为“项”和“子项”。每个子项以目录/树状结构存储配置值或进一步的子项。Windows 基于用户和项/子项运行权限系统。关于信息的具体存放位置以及权限系统的细节，已超出本书的讨论范围。\n\
  \n| ![信息](img/image00248.jpeg) | **延伸阅读** “傻瓜式”快速指南：注册表结构 [`www.dummies.com/how-to/content/understand-how-the-windows-registry-works.html`](http://www.dummies.com/how-to/content/understand-how-the-windows-registry-works.html)\
  \ 维基百科上更深入的文章 [`en.wikipedia.org/wiki/Windows_Registry`](http://en.wikipedia.org/wiki/Windows_Registry)\
  \ 较为全面的官方注册表文档 [`msdn.microsoft.com/en-us/library/ms724871.aspx`](http://msdn.microsoft.com/en-us/library/ms724871.aspx)\
  \ |\n\n让我们来看一个从注册表读取值的示例。我们将获取为 Firefox 崩溃报告器软件存储的电子邮件地址，该地址位于注册表的 `HKEY_CURRENT_USER\\\
  Software\\Mozilla\\Firefox\\Crash Reporter\\Email` 中。\n\n```\n 1 <?\n\n3 # 在对某个项进行操作之前，必须先“打开”它。\n\
  \n5 $keyHandle = reg_open_key('HKEY_CURRENT_USER',\n 6 \t 'Software\\Mozilla\\Firefox\\\
  Crash Reporter');\n\n8 if ($keyHandle) {\n\n10 \t$email = reg_get_value($keyHandle,\
  \ 'Email');\n\n12 \techo (\"崩溃报告器电子邮件  : $email\\n\");\n\n14 \treg_close_key($keyHandle);\n\
  \n16 } else { die (\"无法打开注册表项\"); };\n```\n\n除了直接访问子项，你还可以遍历（或称“枚举”）特定子项。例如，让我们检查一下你安装了哪些打印机。\n\
  \n```\n 1 <?\n\n3 $keyHandle = reg_open_key('HKEY_CURRENT_USER', \t\n 4 'Software\\\
  Microsoft\\Windows NT\\CurrentVersion\\PrinterPorts');\n\n6 if ($keyHandle) {\n\n\
  8 \t$subkeys = reg_enum_key($keyHandle);\n\n10 \tforeach ($subkeys as $index =>\
  \ $subkey) {\n\n12 \t\techo \"打印机 $index 是 $subkey \\n\";\n\n14 \t};\n\n16 \treg_close_key($keyHandle);\n\
  \n18 } else { die (\"无法打开注册表项\"); };\n```\n\n上面我们使用了 `reg_enum_key()` 来获取子项名称的列表。你也可以类似地使用\
  \ `reg_enum_value()` 来获取子项的值列表。\n\n要手动“浏览”注册表，你可以使用 Windows 应用程序 `regedit.exe`。这能让你直观感受到各个子项的位置。但要注意，许多子项看似为同一个应用重复出现，却位于不同区域（通常用于区分计算机级别与用户级别的设置），或者隐藏在完全不符合直觉的位置，比如许多操作系统项。后者通常是由于设计不佳或向后兼容性所致。无论如何，如果你需要特定信息，请查阅该应用或\
  \ Windows 本身的官方开发者文档，以确定信息的准确位置（及其确切含义）。\n\n从注册表读取数据是一项相对安全的操作，检查值很难搞乱你的系统（除非你根据错误信息采取了行动）。写入注册表则危险得多，而\
  \ win32std 扩展让这一操作变得非常简单！如上所述，我们用 `reg_open_key()` 打开子项，然后使用 `reg_set_value()` 写入数据。如果该值尚不存在，它会被创建；如果已存在，则会被更新。\n\
  \n```\n 1 <?\n\n3 $keyHandle = reg_open_key('HKEY_CURRENT_USER', \n 4 \t'Software\\\
  My Php Software Co\\My Software\\login');\n\n6 if ($keyHandle) {\n\n8 \treg_set_value($keyHandle,\
  \ 'username', REG_SZ, 'rob');\n\n10 \treg_close_key($keyHandle);\n\n12 } else {\
  \ die (\"无法打开注册表项\"); };\n```\n\n`reg_set_value()` 的第三个参数（此处为 `REG_SZ`）是第四个变量中传递的数值的数据类型。你可以在\
  \ [`en.wikipedia.org/wiki/Windows_Registry#Keys_and_values`](http://en.wikipedia.org/wiki/Windows_Registry#Keys_and_values)\
  \ 找到注册表支持的所有数据类型。\n\n总之，通过这种方式访问注册表提供了一种强大的方法来存储软件配置和凭据，并允许广泛访问 Windows 操作系统及应用特定信息。除了对注册表设计及结构本身的普遍批评外，其缺点在于它依赖于特定平台，并且如果你不小心，很容易损坏系统。在开始动手之前，记得立即进行备份。\n\
  \n\n\n### 8.8 Linux 信号\n\n在 Unix 和 Linux 系统上，“信号”是操作系统（可能由用户发起）用来向进程发送*信号*的一种方法。操作系统中断进程的正常执行流程以传递信号，允许进程立即响应信号（如果它愿意的话）。可传递的信号种类繁多，包括终止请求、错误条件信号和轮询通知。常见信号已在\
  \ POSIX 标准中规范化，完整列表可在维基百科上找到，而 PHP 支持的信号列表则在 PHP 手册中：\n\n| ![信息](img/image00248.jpeg)\
  \ | **延伸阅读** 维基百科上的 POSIX 信号 [`en.wikipedia.org/wiki/Unix_signal#POSIX_signals`](http://en.wikipedia.org/wiki/Unix_signal#POSIX_signals)\
  \ PHP 手册中的 PHP 支持信号 [`www.php.net/manual/en/pcntl.constants.php`](http://www.php.net/manual/en/pcntl.constants.php)\
  \ Cal Evans 所著的 *Signaling PHP*，一本专门讲解信号的书籍！ [`leanpub.com/signalingphp`](https://leanpub.com/signalingphp?a=0_YKAEBrn4BvyagDZlmBZy&subID=b)\
  \ |\n\n我们可以使用 PCNTL 扩展从 PHP 脚本监听并响应这些信号。以下脚本演示了如何实现。它使用了 PHP 的一个名为“tick”的特性，该特性允许在每个\
  \ N 条语句之后执行一个回调函数。我们无需对 tick 做任何操作，只需启用它（使用 `declare` 结构），以便 PCNTL 函数能够按需使用它。\n\n\
  ```php\n 1 <?\n\n3 # 启用每 1 个“可 tick”语句执行一次 tick\n\n5 declare(ticks = 1);\n\n7 #\
  \ 声明一个变量，用于控制我们的程序是否继续运行。\n\n9 $keepRunning = true;\n\n11 # 输出我们的 PID（进程 ID），以便我们可以在另一个终端中使用\
  \ kill 命令\n12 # 来终止正确的（当前这个）脚本 \n13 # （例如 ~$ kill 123456）\n\n15 echo(\"我的 PID 是\
  \ \".getmypid().\" 如果你想干掉我。尽管试试看！\\n\");\n\n17 # 现在，我们创建一个函数来处理传入的信号。\n\n19 function\
  \ signalHandler($signal)\n20 {\n\n22 \t# $signal 包含了接收到的信号\n23 \t# 始终记住，这个函数可以从脚本的任何位置被调用，\n\
  24 \t# 因此如果依赖程序状态，请务必小心。\n\n26 \tswitch ($signal) {\n\n28     \tcase SIGINT:\n\n\
  30         \t# SIGINT 在用户想要中断进程时发送。\n31         \t# 在终端中，这通常是通过按下 Ctrl-C 触发的\n\n\
  33             echo (\"不，你绝对不能打断我。真是厚颜无耻。\\n\");\n\n35             break;\n\n37\
  \     \tcase SIGTERM:\n\n39         \t# 类似于 SIGINT，SIGTERM 是在用户请求终止进程时发送的，\n40 \
  \        \t# 但这是一个稍“强烈”一些的请求。\n\n43         \techo(\"好吧，如果你真的坚持，那我们走吧。再见！\\n\");\n\
  \n45         \t# 将 $keepRunning 设为 false，以便我们在下一个循环开始时退出\n\n48         \tglobal\
  \ $keepRunning;\n49         \t$keepRunning = false;\n\n51         \tbreak;\n52 \
  \    };\n53 };\n\n55 # 在我们开始程序的主体部分之前，我们需要将刚刚创建的处理函数\n56 # 与我们希望它处理的信号绑定起来。\n\n\
  59 pcntl_signal(SIGINT, 'signalHandler');\n60 pcntl_signal(SIGTERM, 'signalHandler');\n\
  \n62 # 从现在开始接收到的任何信号都将由 signalHandler 函数处理。\n\n65 # 让我们现在进入一个循环并做一些工作\n\n67 while\
  \ ($keepRunning) {\n\n69 \techo(\"唉，什么事都没发生...\\n\");\n70 \tsleep(5);\n\n72 };\n\
  \n74 # 如果我们到达这里，那么说明我们一定退出了循环。\n75 # 这意味着我们一定接收到了 SIGTERM 信号，\n76 # 因为我们没有构建任何其他退出循环的方式！\n\
  \n78 echo(\"好了，你阻止了我。我希望你满意了。\\n\");\n```\n\n运行上述脚本并尝试按下 Ctrl-C。通常情况下，你的 PHP 脚本会因为\
  \ PHP 默认处理 `SIGINT` 的方式（即退出脚本）而退出。然而，我们处理了这个信号并拒绝关闭脚本，所以你会收到一条简短的消息，脚本会继续运行！这通常是一种不礼貌的行为，因为用户（或系统）已经请求中断进程。如果我们想做一个良好的公民，此时我们可以选择关闭或暂时暂停进程，或者提示用户（`我们仍在计算您的\
  \ Foobar 值，您确定要退出吗？`）。如果你还有一些关键处理要做，可能值得告诉用户你已收到他们的信号，并将很快关闭，以免他们尝试其他方法来杀死脚本。\n\n\
  再次运行脚本，记下显示的 PID（例如 123456），然后在另一个终端窗口中输入 `kill 123456`。`kill` 命令默认发送 `SIGTERM`\
  \ 信号以请求终止进程。在第一个终端窗口中，你应该会看到我们的 PHP 脚本“优雅地”退出，并在退出过程中打印出几条消息。\n\n如果你再次运行脚本，这次使用\
  \ `kill -9 123456` 来尝试停止脚本，你应该会看到它立即终止，没有输出任何消息。这是因为 `-9` 标志告诉 `kill` 发送 `SIGKILL`\
  \ 信号。我们没有处理这个信号，因为它是少数几个我们无法处理的信号之一，并且在 POSIX 系统上，它会导致进程立即终止。如果某个进程不响应任何其他信号而你急需结束它，这非常有用。然而，这也可能很危险，因为进程没有机会进行任何清理工作，例如关闭文件和释放资源，因此可能导致文件损坏和资源泄漏等错误。如果你的系统处理了\
  \ `SIGTERM` 事件，但可能需要一点时间进行自我清理，那么让用户知道关机正在进行是值得的，否则他们可能会认为你的进程挂起而求助于 `SIGKILL`。\n\
  \n#### 8.8.1 发送信号\n\n也可以从你的 PHP 脚本中发送信号。这可用于（粗略地）与其他脚本通信，如果脚本拥有足够的权限，也可用于控制进程。要发送信号，只需使用名称具有误导性的\
  \ `posix_kill()` 函数。实际上，这个函数允许你发送*任意* PHP 支持的信号，而不仅仅是那些用于杀死进程的信号。要使用它，你需要知道目标进程的\
  \ PID（进程 ID）（例如 123456），然后例如简单地调用 `posix_kill(123456, SIGINT)`。\n\n\n\n### 8.9 Linux\
  \ 定时事件信号\n\n有时我们希望脚本能定期执行某些操作，例如检查资源状态、进行清理、更新日志文件或类似任务。有几种方法可以实现这一点。最简单的方法是使用 `sleep()`\
  \ 或 `usleep()` 函数，在执行任务前等待若干秒/微秒。但这并非总是有用，因为当你调用 `sleep()` 时，脚本会完全停止并等待指定时间，而不是继续执行其他有用的工作。在上一节中，我们简要介绍了\
  \ PHP 的“滴答”（ticks）功能，它允许我们每执行 N 条（可能有用的）语句就运行一个回调函数。这让我们可以在调用回调函数的间隙执行有用工作，但无法保证这些语句的执行时间，因此不能等待特定的时长。事实上，PHP\
  \ 内部并没有以此方式跟踪时间的能力。不过，利用我们在上一节中介绍的 POSIX 信号，我们可以请求系统在未来若干秒后为我们设置一个“闹钟”。当“闹钟”响起时，系统会通过一个信号中断\
  \ PHP，我们可以处理该信号并运行回调函数。\n\n在上一节中，我们学习了如何监听和处理 Linux 信号。如果你还没有阅读那一节，建议你现在先阅读，以便充分理解下面的示例。\n\
  \n```\n 1  <?\n\n3 # 我们像之前一样启用 ticks 供 pcntl 使用。\n\n5 declare(ticks = 1);\n\n7 $keepRunning\
  \ = true;\n\n9 # 这是我们希望每 5 秒执行一次的函数。\n\n11 function takeABreak($signal) {\n\n13\
  \    echo(\"\\n\\n ======== 休息一下，马上回来 ========\");\n\n15    sleep(3);\n\n17    echo(\"\
  \\n\\n ======== 休息结束，继续工作！ ======== \\n\\n\");\n\n19    # 我们需要每次重新请求闹钟。\n\n21  \
  \  pcntl_alarm(5);\n\n23 };\n\n25 # 这是一个用于优雅退出程序的函数\n\n27 function timeToGo($signal)\
  \ {\n\n29 \tglobal $keepRunning;\n\n31 \t$keepRunning = false;\n\n33 };\n\n35 #\
  \ 稍后我们会请求系统设置一个闹钟，但在此之前，\n36 # 我们会注册一个回调函数，当闹钟触发时（即系统向我们发送 SIGALRM 信号时）将会执行该函数。\n\
  \n39 pcntl_signal(SIGALRM, \"takeABreak\", true);\n\n41 # 为了展示我们可以用多个回调函数处理任意信号，\n\
  42 # 我们还会为 SIGINT/SIGTERM 信号注册另一个不同的处理器。\n\n45 pcntl_signal(SIGINT, 'timeToGo');\n\
  46 pcntl_signal(SIGTERM, 'timeToGo');\n\n48 # 一旦我们注册了回调函数，就可以请求系统为我们设置闹钟。\n49 #\
  \ 闹钟只生效一次，所以你会注意到这个 pcntl_alarm 调用会在回调函数末尾重复出现，以再次设置闹钟。\n\n53 pcntl_alarm(5);\n\n\
  55 # 现在我们进入主工作循环\n\n57 while ( $keepRunning ) {\n\n59    echo('...正在工作...');\n\n\
  61    usleep(50000);\n\n63 };\n\n65 # 如果执行到这里，说明我们收到了 SIGINT 或 SIGTERM 信号\n\n67\
  \ echo(\"\\n 再见，明天见。\\n\");\n```\n\n如果你运行上述脚本，你会看到每半秒钟在屏幕上打印一次 '...正在工作...'。每过 5\
  \ 秒，我们的闹钟回调函数就会启动，暂停工作 3 秒，然后工作继续。\n\n在使用闹钟信号时，有几个重要概念需要理解：\n\n*   闹钟回调函数会中断正常脚本的执行。也就是说，当闹钟函数执行时，正常脚本不会在后台继续运行（它不是多线程的）。\n\
  *   闹钟函数可以在脚本的任何时刻触发。如果你修改了脚本的状态（例如设置全局变量、使用资源和连接），你的脚本应该能够在执行的任何时刻处理该新状态。\n*  \
  \ 你无法预先知道主脚本（或其中的任何部分）将运行多长时间。这受到系统负载、资源、用户交互等因素的影响。因此，你不应该设置对底层脚本进度有任何假设的闹钟。\n\
  *   一次只能设置一个闹钟。任何对 `pcntl_alarm()` 的后续调用都会取消第一个闹钟，不过它也会返回前一个闹钟剩余的秒数。\n*   你可以通过调用\
  \ `pcntl_alarm(0)` 来取消闹钟，该调用同样会返回该闹钟剩余的秒数。\n*   任何接收到的 `SIGALRM` 信号都会产生一个副作用：退出任何正在进行的系统调用，例如对\
  \ `sleep()` 的调用。因此，你需要确保脚本能够容忍此类中断（或者你的闹钟回调函数应该修复/重置对脚本状态可能造成的任何损害）。\n*   如果在任何时候你希望主脚本等待直到下一个闹钟发生，你可以调用\
  \ `pcntl_sigwaitinfo(array(SIGALRM))`，该函数会暂停执行直到闹钟触发。\n\n\n\n### 8.10 打印（到纸张）\n\n\
  尽管我们可能都希望实现无纸化办公，但迟早我们还是要巧妙地将一些碳粉泼洒到 A4 或法律用纸上。PHP 有一个打印扩展，但问题在于它仅适用于 Windows 系统，官方只支持到\
  \ Windows 2000（尽管通常能工作到 Windows 7），并且所需的 `dll` 文件已不再是 PHP 的标准组成部分。该扩展在 PHP 手册中也不再详细介绍。基于这些原因，本书将不涉及此内容。该扩展在\
  \ `pecl` 上仍然可用，旧版 PHP 手册中提供详细信息的地址如下，你或许能在互联网存档中找到。\n\n| ![信息](img/image00248.jpeg)\
  \ | **延伸阅读**Printer 扩展的 Pecl 网站 [`pecl.php.net/package/printer`](http://pecl.php.net/package/printer)PHP\
  \ 手册中的 Printer 扩展\n[`www.php.net/manual/en/book.printer.php`](http://www.php.net/manual/en/book.printer.php)\
  \ |\n\n相反，我们将探讨一种不同的 PHP 打印方式，这种方法经过一些调整后通常能在所有平台上工作。那就是通过 PHP 创建并打印 PDF 文件。\n\n\
  我们将使用一个用 PHP 编写的免费 PDF 库，称为 `FPDF`。无需安装，只需在你的脚本中 `require()` 引入 `fpdf.php` 文件，然后开始使用即可。当我们用它创建好\
  \ PDF 文件后，接下来需要将其打印出来。最简单的方式是用系统的默认 PDF 查看器打开它，该查看器将充当“打印预览”的角色，允许用户像打印普通文件一样进行打印。另一种方式是在后台直接打印，无需打开预览，实现方法类似。\n\
  \n让我们看一个 Linux 下的示例：\n\n```\n 1 <?php\n 2 \n 3 # 加载 fpdf.php 库\n 4 \n 5 require('fpdf.php');\n\
  \ 6 \n 7 # 创建一个新的 PDF 对象并开始新页面\n 8 \n 9 $pdf = new FPDF();\n10 \n11 $pdf->AddPage();\n\
  12 \n13 # 添加图片。这里我们可以使用 PHP 的 http 包装器包含一张网络图片\n14 \n15 $pdf->Image('http://static.php.net/www.php.net/images/php.gif',10);\n\
  16 \n17 # 现在设置字体并添加标题，以及一些其他文本\n18 \n19 $pdf->SetFont('Arial','B',24);\n20 \n21\
  \ $pdf->Cell(0,30,'一份重要报告','B',1,'C');\n22 \n23 $pdf->SetFont('Arial',null,10);\n\
  24 \n25 $pdf->Cell(0,12,'这里放置大量非常重要的文本。等等。', null, 1);\n26 \n27 # 生成一个唯一的临时文件名\n\
  28 \n29 $filename = tempnam(sys_get_temp_dir(), \"rep\").'.pdf';\n30 \n31 # 将 PDF\
  \ 保存到该临时文件\n32 \n33 $pdf->Output($filename, 'F');\n34 \n35 # 最后，在默认查看器中打开 PDF 进行“打印预览”\n\
  36 \n37 `xdg-open $filename`;\n```\n\n这将生成一份 PDF 报告，并在默认的 PDF 查看器中打开，供用户打印。`open`\
  \ 和 `gnome-open` 在许多 Linux 发行版上也执行与 `xdg-open` 相同的任务，即检查文件并打开相应的注册查看器。如果你更希望直接将报告发送到打印机，而不向用户显示，只需将最后一行替换为：\n\
  \n```\n1 `lp $filename;`\n```\n\n`lp`（即“行式打印机”）命令可以打印文本、PDF 或 Postscript 文件。除非另有指定，它会将其发送到系统的默认打印机。你可以更改使用的打印机及其他设置，在命令行输入\
  \ `man lp` 将提供所有选项。\n\n对于 Windows 系统，上述示例脚本需要更改最后一行才能运行。要使用默认查看器打开 PDF，请使用：\n\n\
  ```\n1 `start $filename;`\n```\n\n在后台打印则取决于已安装的 PDF 查看器，因为没有与 Linux 的 `lp` 命令对等的命令。对于\
  \ Adobe Acrobat，可以使用以下命令，并相应修改路径：\n\n```\n1 `\"C:\\Program Files (x86)\\Adobe\\\
  Reader 11.0\\Reader\\AcroRd32.exe\" /t \"$filenam\\\n2 e\"`\n```\n\n这将打开 Acrobat，加载文件，最小化窗口并打印。缺点是即使窗口最小化仍然可见，并且在打印后不会关闭。同时，无法控制使用哪个打印机，它只会使用默认打印机。\n\
  \n对于 Foxit Reader，类似地可以这样操作：\n\n```\n1 `\"C:\\Program Files (x86)\\Foxit Software\\\
  Foxit Reader\\Foxit Reader.exe\" /t \"$\\\n2 filename\" \"Oki C3800DN\"`\n```\n\n\
  这比 Adobe 版本有几个优点。Foxit 不会打开任何窗口，甚至不会最小化，并且你可以在第二个参数中指定要使用的打印机。\n\n打印非 PDF 文档通常也可以通过调用外部打印处理程序以类似的方式完成。\n\
  \n### 8.11 音频\n\nPHP 中有许多用于处理音频的有用库，从制作和录制声音，到播放、特效和音频流操作。下面列出了一些比较流行的库。\n\n| ![](img/image00249.gif)\
