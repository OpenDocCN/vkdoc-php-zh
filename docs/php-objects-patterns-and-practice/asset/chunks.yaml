- fmt: '## Late Static Bindings: The `static` Keyword


    Now that you’ve seen abstract classes, traits, and interfaces, it’s time to return
    briefly to static methods. You saw that a static method can be used as factory,
    a way of generating instances of the containing class. If you’re as lazy a coder
    as me, you might chafe at the duplication in an example like this:


    ```

    // listing 04.45

    abstract class DomainObject

    {

    }

    // listing 04.46

    class User extends DomainObject

    {

    public static function create(): User

    {

    return new User();

    }

    }

    // listing 04.47

    class Document extends DomainObject

    {

    public static function create(): Document

    {

    return new Document();

    }

    }

    ```


    I create a super class named `DomainObject`. In a real-world project, of course,
    this would contain functionality common to its extending classes. Then I create
    two child classes, `User` and `Document`. I would like my concrete classes to
    have static `create()` methods.


    Why would I use a static factory method when a constructor performs the work of
    creating an object already? In Chapter 12, I’ll describe a pattern called Identity
    Map. An Identity Map component generates and manages a new object only if an object
    with the same distinguishing characteristics is not already under management.
    If the target object already exists, it is returned. A factory method like `create()`
    would make a good client for a component of this sort.


    This code works fine, but it has an annoying amount of duplication. I don’t want
    to have to create boilerplate code like this for every `DomainObject` child class
    that I create. Instead, I’ll try pushing the `create()` method up to the superclass:


    ```

    // listing 04.48

    abstract class DomainObject

    {

    public static function create(): DomainObject

    {

    return new self();

    }

    }

    // listing 04.49

    class User extends DomainObject

    {

    }

    // listing 04.50

    class Document extends DomainObject

    {

    }

    // listing 04.51

    Document::create();

    ```


    Well, that looks neat. I now have common code in one place, and I’ve used `self`
    as a reference to the class. But I have made an assumption about the `self` keyword.
    In fact, it does not act for classes exactly the same way that `$this` does for
    objects. `self` does not refer to the calling context; it refers to the context
    of resolution. So if I run the previous example, I get this:


    ```

    Error: Cannot instantiate abstract class popp\ch04\batch06\DomainObject

    ```


    So `self` resolves to `DomainObject`, the place where `create()` is defined, and
    not to `Document`, the class on which it was called. Until PHP 5.3 this was a
    serious limitation, which spawned many rather clumsy workarounds. PHP 5.3 introduced
    a concept called late static bindings. The most obvious manifestation of this
    feature is the keyword: `static`. `static` is similar to `self`, except that it
    refers to the invoked rather than the containing class. In this case, it means
    that calling `Document::create()` results in a new `Document` object and not a
    doomed attempt to instantiate a `DomainObject` object.


    So now I can take advantage of my inheritance relationship in a static context:


    ```

    abstract class DomainObject

    {

    public static function create(): DomainObject

    {

    return new static();

    }

    }

    class User extends DomainObject

    {

    }

    class Document extends DomainObject

    {

    }

    print_r(Document::create());

    Document Object

    (

    )

    ```


    The `static` keyword can be used for more than just instantiation. Like `self`
    and `parent`, `static` can be used as an identifier for static method calls, even
    from a non-static context. Let’s say I want to include the concept of a group
    for my `DomainObject` classes. By default in my new classification, all classes
    fall into category “default,” but I’d like to be able override this for some branches
    of my inheritance hierarchy:


    ```

    // listing 04.52

    abstract class DomainObject

    {

    private $group;

    public function __construct()

    {

    $this->group = static::getGroup();

    }

    public static function create(): DomainObject

    {

    return new static();

    }

    public static function getGroup(): string

    {

    return "default";

    }

    }

    // listing 04.53

    class User extends DomainObject

    {

    }

    // listing 04.54

    class Document extends DomainObject

    {

    public static function getGroup(): string

    {

    return "document";

    }

    }

    // listing 04.55

    class SpreadSheet extends Document

    {

    }

    // listing 04.56

    print_r(User::create());

    print_r(SpreadSheet::create());

    ```


    I introduced a constructor to the `DomainObject` class. It uses the `static` keyword
    to invoke a static method: `getGroup()`. `DomainObject` provides the default implementation,
    but `Document` overrides it. I also created a new class, `SpreadSheet`, that extends
    `Document`. Here’s the output:


    ```

    popp\ch04\batch07\User Object

    (

    [group:popp\ch04\batch07\DomainObject:private] => default

    )

    popp\ch04\batch07\SpreadSheet Object

    (

    [group:popp\ch04\batch07\DomainObject:private] => document

    )

    ```


    For the `User` class, not much clever needs to happen. The `DomainObject` constructor
    calls `getGroup()` and finds it locally. In the case of `SpreadSheet`, though,
    the search begins at the invoked class, `SpreadSheet` itself. It provides no implementation,
    so the `getGroup()` method in the `Document` class is invoked. Before PHP 5.3
    and late static binding, I would have been stuck with the `self` keyword here,
    which would only look for `getGroup()` in the `DomainObject` class.'
