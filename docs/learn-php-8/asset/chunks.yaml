    \ . $num1 + $num2;\nResult: $myValue now contains \"Help 3\"\n```\n\n*(Example\
    \ 2 will produce an error message if attempted in any\nversion of the language\
    \ before PHP 7.5.)*\n\nIn PHP 7, data type hints were introduced. This allows\
    \ the developer the\nability to limit the type of data that can be passed into\
