    The first statement to mention imports the JavaScript file, `checkform.js`, into
    the current web page:


    `<script language="JavaScript" type="text/JavaScript" src="checkform.js"></script>`


    Javascript


    Because JavaScript is used in this chapter, you need a quick introduction to it.


    JavaScript is a programming language that is used for extending a web site’s functionality
    by allowing for dynamic pages and implementing validation checks. A few of JavaScript’s
    features are:


    *   It’s a lightweight, interpreted programming language.

    *   It usually executes on the client machine, hence it consumes less server resources
    and avoids excessive server traffic.

    *   It’s quite fast in delivering responses. Because it processes and executes
    on the client’s machine, it delivers the response faster than other server-side
    scripting languages.

    *   It is relatively easy to learn because its syntax is close to English.


    The JavaScript file, `checkform.js`, contains the code to validate different fields
    in the `validatesignup.php` file.


    There are two ways to include JavaScript in a web page:


    *   Place the JavaScript in the `<head>` element.

    *   Place the JavaScript in a separate file, save it with the extension `.js`,
    and then use the `<script>` element to include the code file. (By including the
    JavaScript file, its code will be merged in the HTML at that location.) This approach
    is preferred, as it keeps HTML code clean and all the JavaScript code in one place'
