    7 运行：phpize...\n```\n\n这两条命令会安装编译 `PECL` 扩展所需的先决条件。`PECL` 是一个类似于 `PEAR` 的仓库。如果你对两者都不熟悉，也无需担心。你只需知道\
    \ `SPL` 类型托管于此，因此要安装它们，我们需要能够编译 `PECL` 扩展。\n\n```\n1 $ sudo bash -c \"echo extension=spl_types.so\
