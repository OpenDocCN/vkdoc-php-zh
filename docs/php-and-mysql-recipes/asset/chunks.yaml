  raw: 'There are a number of predefined methods that can be implemented on a class.
    These are commonly known as magic methods. These methods add specific behaviors
    to a class. This includes getters, setters, constructors, destructors, etc.


    By using the magic method __toString() it’s possible to define how an object behaves
    when it is used in a string context, either as a parameter to print() or echo
    or embedded directly in a double quoted string.


    The __toString() method does not take any parameters.


    How it Works


    The method __toString() defines how the object will be handled when used in a
    string context. An object is handled in a string context if compared to a string,
    embedded in a string, or printed. The __toString() method must always return a
    string and if it’s not defined on an object that’s used as a string the result
    will be the word object. The __toString() method can be used to generate output
    from objects in a structured form.


    A simple html class that can be used to generate HTML elements of various types
    is shown in the next example.


    <?php


    // 2_16.php


    class html {


    private $type;


    private $c = '''';


    function __construct($type = ''div'') {


    $this->type = $type;


    }


    function content($c) {


    $this->c .= $c;


    }


    function __toString() {


    return "<{$this->type}>{$this->c}</{$this->type }>";


    }


    }


    $div = new html();


    $span = new html(''span'');


    $span->content(''place some text here'');


    $div->content($span);


    echo $div;


    In this example there are two instances of the html class () called $div and $span
    . The $span object gets a string added as the content and the $div object gets
    the $span object added. When the $div object is used in the echo statement the
    __toString() method is called. That will cause the __toSting() method to be called
    on the $span object when it’s used as a variable embedded in the string.


    CHAPTER 2 ■ CLASSES AND OBJECTS


    Recipe 2-11\. Variable Overloading


    Problem


    When class properties are declared as private they can only be accessed by the
    methods of the class.


    Creating a function to get and set each of these private member variables can
    end up creating a long list of methods on the class. Can this be done in an easier
    way?


    ■ **Note** Recipe 2-5 covers property visibility.


    Solution


    With the help of a special set of overloading functions it’s possible to create
    access to private variables as if they were public and at the same time provide
    validation on setting these variables. The magic methods to manage variable overloading
    are __get() , __set() , __isset(), and __unset() .


    How it Works


    The following example shows how to use these.


    <?php


    // 2_17.php


    class car {


    private $type;


    private $properties = array();


    function __construct($type) {


    $this->type = $type;


    }


    function __set($name, $value) {


    switch($name) {


    case ''type'' :


    $this->type = $value;


    break;


    case ''wheels'' :


    if (in_array($value, array(3,4,6))) {


    $this->properties[$name] = $value;


    }


    else {


    trigger_error(


    "Property wheels must be 3,4 or 6",


    E_USER_NOTICE


    );


    }


    break;


    case ''seats'' :


    CHAPTER 2 ■ CLASSES AND OBJECTS


    if (in_array($value, array(2,4,5,7,8))) {


    $this->properties[$name] = $value;


    }


    else {


    trigger_error(


    "Property seats must be 2,4,5,7 or 8",


    E_USER_NOTICE


    );


    }


    break;


    default :


    $this->properties[$name] = $value;


    break;


    }


    }


    function __get($name) {


    if (array_key_exists($name, $this->properties)) {


    return $this->properties[$name];


    }


    else if($name == ''type'') {


    return $this->type;


    }


    trigger_error(


    "Undefined property $name",


    E_USER_NOTICE


    );


    return null;


    }


    function __isset($name) {


    return array_key_exists($name, $this->properties);


    }


    function __undet($name) {


    unset($this->properties[$name]);


    }


    function __toString() {


    $prop = array();


    foreach ($this->properties as $k => $v) {


    $prop[] = "$v $k";


    }


    return "The {$this->type} has " . implode(", ", $prop) . "\n";


    }


    }


    $c1 = new car(''truck'');


    $c1->wheels = 4;


    $c1->seats = 2;


    $c1->color = ''white'';


    CHAPTER 2 ■ CLASSES AND OBJECTS


    $c2 = new car(''big truck'');


    $c2->wheels = 6;


    $c2->seats = 5;


    $c2->color = ''blue'';


    echo $c1;


    echo $c2;


    $c2->seats = 9; // This will trigger a notice.


    Running this script will generate the following output:'
