    \n![A978-1-4842-1672-9_3_Fig10_HTML.jpg](A978-1-4842-1672-9_3_Fig10_HTML.jpg)\n\
    \n**图 3-10.** 登录网页，包含页眉和下拉菜单\n\n用户输入电子邮件地址和密码后，下一步是确认输入的信息是否有效。清单[3-12](#A978-1-4842-1672-9_3_Chapter.html#FPar15)中显示的`validateuser.php`脚本执行以下任务：\n\
    \n- 它验证用户，即确定用户是否输入了有效的电子邮件地址和密码。\n- 如果用户通过身份验证，它将显示一条欢迎消息。\n- 如果输入了无效的电子邮件地址或密码，它会显示一条错误消息，后跟两个链接，允许用户重新输入凭据或创建新帐户。\n\
