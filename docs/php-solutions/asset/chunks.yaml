- fmt: "### How MySQL Handles Dates\n\nIn MySQL, dates and time are always expressed\
    \ in descending order from the largest unit to the smallest: year, month, date,\
    \ hour, minutes, seconds. Hours are always measured using the 24-hour clock, with\
    \ midnight expressed as `00:00:00`. Even if this seems unfamiliar to you, it’s\
    \ the recommendation laid down by the International Organization for Standardization\
    \ (ISO).\n\nMySQL allows considerable flexibility about the separator between\
    \ the units (any punctuation symbol is acceptable), but there is no argument about\
    \ the order—it’s fixed. If you attempt to store a date in any other format than\
    \ year, month, date, MySQL inserts `0000-00-00` in the database.\n\nI’ll come\
    \ back later to the way you insert dates into MySQL, because it’s best to validate\
    \ them and format them using PHP. First, let’s look at some of the things you\
    \ can do with dates once they’re stored in MySQL. MySQL has many date and time\
    \ functions, which are listed with examples at [`http://dev.mysql.com/doc/refman/5.6/en/date-and-time-functions.html`](http://dev.mysql.com/doc/refman/5.6/en/date-and-time-functions.html).\n\
    \nOne of the most useful functions is `DATE_FORMAT()`, which does exactly what\
    \ its name suggests.\n\n#### Formatting Dates in a SELECT Query with `DATE_FORMAT()`\n\
    \nThe syntax for `DATE_FORMAT()` is as follows:\n\n`DATE_FORMAT(date, format)`\n\
    \nNormally, `date` is the table column to be formatted, and `format` is a string\
    \ composed of formatting specifiers and any other text you want to include. Table\
    \ 14-1 lists the most common specifiers, all of which are case-sensitive.\n\n\
    **Table 14-1.** Frequently used MySQL date format specifiers\n\n| Period | Specifier\
    \ | Description | Example |\n| --- | --- | --- | --- |\n| Year | `%Y` | Four-digit\
    \ format | 2014 |\n|  | `%y` | Two-digit format | 14 |\n| Month | `%M` | Full\
    \ name | January, September |\n|  | `%b` | Abbreviated name, three letters | Jan,\
    \ Sep |\n|  | `%m` | Number with leading zero | 01, 09 |\n|  | `%c` | Number without\
    \ leading zero | 1, 9 |\n| Day of month | `%d` | With leading zero | 01, 25 |\n\
    |  | `%e` | Without leading zero | 1, 25 |\n|  | `%D` | With English text suffix\
    \ | 1st, 25th |\n| Weekday name | `%W` | Full text | Monday, Thursday |\n|  |\
    \ `%a` | Abbreviated name, three letters | Mon, Thu |\n| Hour | `%H` | 24-hour\
    \ clock with leading zero | 01, 23 |\n|  | `%k` | 24-hour clock without leading\
    \ zero | 1, 23 |\n|  | `%h` | 12-hour clock with leading zero | 01, 11 |\n|  |\
    \ `%l` (lowercase “L”) | 12-hour clock without leading zero | 1, 11 |\n| Minutes\
    \ | `%i` | With leading zero | 05, 25 |\n| Seconds | `%S` | With leading zero\
    \ | 08, 45 |\n| AM/PM | `%p` |  |  |\n\nAs explained earlier, when using a function\
    \ in an SQL query, assign the result to an alias using the `AS` keyword. Referring\
    \ to Table 14-1, you can format the date in the `created` column of the `blog`\
    \ table in a common U.S. style and assign it to an alias, like this:\n\n```\n\
    DATE_FORMAT(created, '%c/%e/%Y') AS date_created\n```\n\nTo format the same date\
    \ in the European style, reverse the first two specifiers, like this:\n\n```\n\
    DATE_FORMAT(created, '%e/%c/%Y') AS date_created\n```\n\n**Tip**  \nWhen using\
    \ `DATE_FORMAT()`, don’t use the original column name as the alias, because the\
    \ values are converted to strings, which plays havoc with the sort order. Choose\
    \ a different alias, and use the original column name to sort the results.\n\n\
    #### PHP Solution 14-2: Formatting a MySQL Date or Timestamp\n\nThis PHP solution\
    \ formats the dates in the blog entry management page from Chapter 13.\n\nOpen\
    \ `blog_list_mysqli.php` or `blog_list_pdo.php` in the `admin` folder and locate\
    \ the SQL query. It looks like this:\n\n```\n$sql = 'SELECT * FROM blog ORDER\
    \ BY created DESC';\n```\n\nChange it like this:\n\n```\n$sql = 'SELECT article_id,\
    \ title,\nDATE_FORMAT(created, \"%a, %b %D, %Y\") AS date_created\nFROM blog ORDER\
    \ BY created DESC';\n```\n\n- Updated versions of `blog_list_mysqli.php` and `blog_list_pdo.php`\
    \ are in the `ch14` folder.\n\n![A978-1-4842-0635-5_14_Fig4_HTML.jpg](A978-1-4842-0635-5_14_Fig4_HTML.jpg)\n\
    \n**Figure 14-4.** The MySQL timestamps are now nicely formatted\n\nIn the first\
    \ table cell in the body of the page, change `$row['created']` to `$row['date_created']`\
    \ to match the alias in the SQL query. Save the page and load it into a browser.\
    \ The dates should now be formatted as shown in Figure 14-4. Experiment with other\
    \ specifiers to suit your preferences.\n\n- I used single quotes around the whole\
    \ SQL query, so the format string inside `DATE_FORMAT()` needs to be in double\
    \ quotes.\n- Make sure there is no gap before the opening parenthesis of `DATE_FORMAT()`.\n\
    - The format string begins with `%a`, which displays the first three letters of\
    \ the weekday name. If you use the original column name as the alias, the `ORDER\
    \ BY` clause sorts the dates in reverse alphabetical order: Wed, Thu, Sun, and\
    \ so on. Using a different alias ensures that the dates are still ordered chronologically.\n\
    \n#### Adding to and Subtracting from Dates\n\nWhen working with dates, it’s often\
    \ useful to add or subtract a specific time period. For instance, you may want\
    \ to display items that have been added to the database within the past seven\
    \ days or stop displaying articles that haven’t been updated for three months.\
    \ MySQL makes this easy with `DATE_ADD()` and `DATE_SUB()`. Both functions have\
    \ synonyms called `ADDDATE()` and `SUBDATE()`, respectively.\n\nThe basic syntax\
    \ is the same for all of them and looks like this:\n\n```\nDATE_ADD(date, INTERVAL\
    \ value interval_type)\n```\n\nWhen using these functions, `date` can be the column\
    \ containing the date you want to alter, a string containing a particular date\
    \ (in `YYYY-MM-DD` format), or a MySQL function, such as `NOW()`. `INTERVAL` is\
    \ a keyword followed by a value and an interval type, the most common of which\
    \ are listed in Table 14-2.\n\n**Table 14-2.** Most frequently used interval types\
    \ with `DATE_ADD()` and `DATE_SUB()`\n\n| Interval type | Meaning | Value format\
    \ |\n| --- | --- | --- |\n| `DAY` | Days | Number |\n| `DAY_HOUR` | Days and hours\
    \ | String presented as `'DD hh'` |\n| `WEEK` | Weeks | Number |\n| `MONTH` |\
    \ Months | Number |\n| `QUARTER` | Quarters | Number |\n| `YEAR` | Years | Number\
    \ |\n| `YEAR_MONTH` | Years and months | String presented as `'YY-MM'` |\n\nThe\
    \ interval types are constants, so do not add “S” to the end of `DAY`, `WEEK`,\
    \ and so on to make them plural.\n\nOne of the most useful applications of these\
    \ functions is to display only the most recent items in a table.\n\n#### PHP Solution\
    \ 14-3: Displaying Items Updated within the Past Week\n\nThis PHP solution shows\
    \ how to limit the display of database results according to a specific time interval.\
    \ Use `blog.php` from PHP Solution 14-1.\n\nLocate the SQL query in `blog.php`.\
    \ It looks like this:\n\n```\n$sql = 'SELECT * FROM blog ORDER BY created DESC';\n\
    ```\n\nChange it like this:\n\n```\n$sql = 'SELECT * FROM blog\nWHERE updated\
    \ > DATE_SUB(NOW(), INTERVAL 1 WEEK)\nORDER BY created DESC';\n```\n\n- You can\
    \ compare your code with `blog_limit_mysqli.php` and `blog_limit_pdo.php` in the\
    \ `ch14` folder.\n\nSave and reload the page in your browser. Depending on when\
    \ you last updated an item in the `blog` table, you should see either nothing\
    \ or a limited range of items. If necessary, change the interval type to `DAY`\
    \ or `HOUR` to test that the time limit is working. Open `blog_list_mysqli.php`\
    \ or `blog_list_pdo.php`, select an item that isn’t displayed in `blog.php`, and\
    \ edit it. Reload `blog.php`. The item that you have just updated should now be\
    \ displayed.\n\n- This tells MySQL that you want only items that have been updated\
    \ in the past week."
  raw: '### How MySQL Handles Dates


    In MySQL, dates and time are always expressed in descending order from the largest
    unit to the smallest: year, month, date, hour, minutes, seconds. Hours are always
    measured using the 24-hour clock, with midnight expressed as 00:00:00\. Even if
    this seems unfamiliar to you, it’s the recommendation laid down by the International
    Organization for Standardization (ISO).


    MySQL allows considerable flexibility about the separator between the units (any
    punctuation symbol is acceptable), but there is no argument about the order—it’s
    fixed. If you attempt to store a date in any other format than year, month, date,
    MySQL inserts 0000-00-00 in the database.


    I’ll come back later to the way you insert dates into MySQL, because it’s best
    to validate them and format them using PHP. First, let’s look at some of the things
    you can do with dates once they’re stored in MySQL. MySQL has many date and time
    functions, which are listed with examples at [`http://dev.mysql.com/doc/refman/5.6/en/date-and-time-functions.html`](http://dev.mysql.com/doc/refman/5.6/en/date-and-time-functions.html)
    .


    One of the most useful functions is `DATE_FORMAT()`, which does exactly what its
    name suggests.


    #### Formatting Dates in a SELECT Query with DATE_FORMAT( )


    The syntax for `DATE_FORMAT()` is as follows:


    `DATE_FORMAT(` `date, format` `)`


    Normally, date is the table column to be formatted, and format is a string composed
    of formatting specifiers and any other text you want to include. Table [14-1](#A978-1-4842-0635-5_14_Chapter.html#Tab1)
    lists the most common specifiers, all of which are case-sensitive.


    Table 14-1.


    Frequently used MySQL date format specifiers


    | Period | Specifier | Description | Example |

    | --- | --- | --- | --- |

    | Year | `%Y` | Four-digit format | 2014 |

    | `%y` | Two-digit format | 14 |

    | Month | `%M` | Full name | January, September |

    | `%b` | Abbreviated name, three letters | Jan, Sep |

    | `%m` | Number with leading zero | 01, 09 |

    | `%c` | Number without leading zero | 1, 9 |

    | Day of month | `%d` | With leading zero | 01, 25 |

    | `%e` | Without leading zero | 1, 25 |

    | `%D` | With English text suffix | 1st, 25th |

    | Weekday name | `%W` | Full text | Monday, Thursday |

    | `%a` | Abbreviated name, three letters | Mon, Thu |

    | Hour | `%H` | 24-hour clock with leading zero | 01, 23 |

    | `%k` | 24-hour clock without leading zero | 1, 23 |

    | `%h` | 12-hour clock with leading zero | 01, 11 |

    | `%l` (lowercase “L”) | 12-hour clock without leading zero | 1, 11 |

    | Minutes | `%i` | With leading zero | 05, 25 |

    | Seconds | `%S` | With leading zero | 08, 45 |

    | AM/PM | `%p` |   |   |


    As explained earlier, when using a function in an SQL query, assign the result
    to an alias using the `AS` keyword. Referring to Table [14-1](#A978-1-4842-0635-5_14_Chapter.html#Tab1),
    you can format the date in the `created` column of the `blog` table in a common
    U.S. style and assign it to an alias, like this:


    `DATE_FORMAT(created, ''%c/%e/%Y'') AS date_created`


    To format the same date in the European style, reverse the first two specifiers,
    like this:


    `DATE_FORMAT(created, ''%e/%c/%Y'') AS date_created`


    Tip


    When using `DATE_FORMAT()`, don’t use the original column name as the alias, because
    the values are converted to strings, which plays havoc with the sort order. Choose
    a different alias, and use the original column name to sort the results.


    #### PHP Solution 14-2: Formatting a MySQL Date or Timestamp


    This PHP solution formats the dates in the blog entry management page from [Chapter
    13](#A978-1-4842-0635-5_13_Chapter.html).


    Open `blog_list_mysqli.php` or `blog_list_pdo.php` in the `admin` folder and locate
    the SQL query. It looks like this:  


    `$sql = ''SELECT * FROM blog ORDER BY created DESC'';`


    Change it like this:  


    `$sql = ''SELECT` `article_id, title,`


    `DATE_FORMAT(created, "%a, %b %D, %Y") AS date_created`


    `FROM blog ORDER BY created DESC'';`


    *   Updated versions of `blog_list_mysqli.php` and `blog_list_pdo.php` are in
    the `ch14` folder.


    ![A978-1-4842-0635-5_14_Fig4_HTML.jpg](A978-1-4842-0635-5_14_Fig4_HTML.jpg)


    Figure 14-4.


    The MySQL timestamps are now nicely formatted In the first table cell in the body
    of the page, change `$row[''created'']` to `$row[''` `date_` `created'']` to match
    the alias in the SQL query.   Save the page and load it into a browser. The dates
    should now be formatted as shown in Figure [14-4](#A978-1-4842-0635-5_14_Chapter.html#Fig4).
    Experiment with other specifiers to suit your preferences.  


    *   I used single quotes around the whole SQL query, so the format string inside
    `DATE_FORMAT()` needs to be in double quotes.

    *   Make sure there is no gap before the opening parenthesis of `DATE_FORMAT()`.

    *   The format string begins with `%a`, which displays the first three letters
    of the weekday name. If you use the original column name as the alias, the `ORDER
    BY` clause sorts the dates in reverse alphabetical order: Wed, Thu, Sun, and so
    on. Using a different alias ensures that the dates are still ordered chronologically.


    #### Adding to and Subtracting from Dates


    When working with dates, it’s often useful to add or subtract a specific time
    period. For instance, you may want to display items that have been added to the
    database within the past seven days or stop displaying articles that haven’t been
    updated for three months. MySQL makes this easy with `DATE_ADD()` and `DATE_SUB()`.
    Both functions have synonyms called `ADDDATE()` and `SUBDATE()`, respectively.


    The basic syntax is the same for all of them and looks like this:


    `DATE_ADD(` `date` `, INTERVAL` `value interval_type` `)`


    When using these functions, date can be the column containing the date you want
    to alter, a string containing a particular date (in `YYYY-MM-DD` format), or a
    MySQL function, such as `NOW()`. `INTERVAL` is a keyword followed by a value and
    an interval type, the most common of which are listed in Table [14-2](#A978-1-4842-0635-5_14_Chapter.html#Tab2).


    Table 14-2.


    Most frequently used interval types with `DATE_ADD()` and `DATE_SUB()`


    | Interval type | Meaning | Value format |

    | --- | --- | --- |

    | `DAY` | Days | Number |

    | `DAY_HOUR` | Days and hours | String presented as `''DD hh''` |

    | `WEEK` | Weeks | Number |

    | `MONTH` | Months | Number |

    | `QUARTER` | Quarters | Number |

    | `YEAR` | Years | Number |

    | `YEAR_MONTH` | Years and months | String presented as `''YY-MM''` |


    The interval types are constants, so do not add “S” to the end of `DAY`, `WEEK`,
    and so on to make them plural.


    One of the most useful applications of these functions is to display only the
    most recent items in a table.


    #### PHP Solution 14-3: Displaying Items Updated within the Past Week


    This PHP solution shows how to limit the display of database results according
    to a specific time interval. Use `blog.php` from PHP Solution 14-1.


    Locate the SQL query in `blog.php`. It looks like this:  


    `$sql = ''SELECT * FROM blog ORDER BY created DESC'';`


    Change it like this:  


    `$sql = ''SELECT * FROM blog`


    `WHERE updated > DATE_SUB(NOW(), INTERVAL 1 WEEK)`


    `ORDER BY created DESC'';`


    *   You can compare your code with `blog_limit_mysqli.php` and `blog_limit_pdo.php`
    in the `ch14` folder.


    Save and reload the page in your browser. Depending on when you last updated an
    item in the `blog` table, you should see either nothing or a limited range of
    items. If necessary, change the interval type to `DAY` or `HOUR` to test that
    the time limit is working.   Open `blog_list_mysqli.php` or `blog_list_pdo.php`,
    select an item that isn’t displayed in `blog.php`, and edit it. Reload `blog.php`.
    The item that you have just updated should now be displayed.  


    *   This tells MySQL that you want only items that have been updated in the past
    week.'
  trans: "\n### MySQL 如何处理日期\n\n在 MySQL 中，日期和时间始终按从最大单位到最小单位的降序表示：年、月、日、小时、分钟、秒。小时始终采用\
    \ 24 小时制，午夜表示为 `00:00:00`。即使这对你来说不太熟悉，这也是国际标准化组织（ISO）推荐的格式。\n\nMySQL 允许在单位之间的分隔符上有相当大的灵活性（任何标点符号都可以接受），但顺序是固定的，没有争议。如果你尝试以年、月、日以外的任何其他格式存储日期，MySQL\
    \ 会在数据库中插入 `0000-00-00`。\n\n稍后我会再讨论如何将日期插入 MySQL，因为最好使用 PHP 来验证和格式化它们。首先，我们来看看日期存储在\
    \ MySQL 后，可以用它来做些什么。MySQL 有许多日期和时间函数，这些函数及其示例列在 [`http://dev.mysql.com/doc/refman/5.6/en/date-and-time-functions.html`](http://dev.mysql.com/doc/refman/5.6/en/date-and-time-functions.html)\
    \ 上。\n\n最有用的函数之一是 `DATE_FORMAT()`，它的功能正如其名。\n\n#### 在 SELECT 查询中使用 `DATE_FORMAT()`\
    \ 格式化日期\n\n`DATE_FORMAT()` 的语法如下：\n\n`DATE_FORMAT(date, format)`\n\n通常，`date`\
    \ 是要格式化的表列，而 `format` 是一个由格式说明符和你想包含的任何其他文本组成的字符串。表 14-1 列出了最常见的说明符，它们都是区分大小写的。\n\
    \n**表 14-1.** 常用的 MySQL 日期格式说明符\n\n| 时间段 | 说明符 | 描述 | 示例 |\n| --- | --- | ---\
    \ | --- |\n| 年 | `%Y` | 四位数格式 | 2014 |\n|  | `%y` | 两位数格式 | 14 |\n| 月 | `%M` |\
    \ 完整的月份名称 | January, September |\n|  | `%b` | 缩写名称，三个字母 | Jan, Sep |\n|  | `%m`\
    \ | 带前导零的数字 | 01, 09 |\n|  | `%c` | 不带前导零的数字 | 1, 9 |\n| 月中日期 | `%d` | 带前导零 |\
    \ 01, 25 |\n|  | `%e` | 不带前导零 | 1, 25 |\n|  | `%D` | 带英文文本后缀 | 1st, 25th |\n|\
    \ 工作日名称 | `%W` | 完整文本 | Monday, Thursday |\n|  | `%a` | 缩写名称，三个字母 | Mon, Thu |\n\
    | 小时 | `%H` | 24 小时制，带前导零 | 01, 23 |\n|  | `%k` | 24 小时制，不带前导零 | 1, 23 |\n|  |\
    \ `%h` | 12 小时制，带前导零 | 01, 11 |\n|  | `%l` (小写“L”) | 12 小时制，不带前导零 | 1, 11 |\n\
    | 分钟 | `%i` | 带前导零 | 05, 25 |\n| 秒 | `%S` | 带前导零 | 08, 45 |\n| 上午/下午 | `%p` |\
    \  |  |\n\n如前所述，在 SQL 查询中使用函数时，请使用 `AS` 关键字将结果分配给一个别名。参考表 14-1，你可以按常见的美国风格格式化\
    \ `blog` 表中 `created` 列的日期，并将其分配给一个别名，如下所示：\n\n```\nDATE_FORMAT(created, '%c/%e/%Y')\
    \ AS date_created\n```\n\n要按欧洲风格格式化同一日期，可以调换前两个说明符，如下所示：\n\n```\nDATE_FORMAT(created,\
    \ '%e/%c/%Y') AS date_created\n```\n\n**提示**  \n使用 `DATE_FORMAT()` 时，不要将原始列名用作别名，因为值会被转换为字符串，这会严重扰乱排序顺序。选择一个不同的别名，并使用原始列名对结果进行排序。\n\
    \n#### PHP 解决方案 14-2：格式化 MySQL 日期或时间戳\n\n此 PHP 解决方案用于格式化第 13 章博客条目管理页面中的日期。\n\n\
    打开 `admin` 文件夹中的 `blog_list_mysqli.php` 或 `blog_list_pdo.php`，找到 SQL 查询。它看起来像这样：\n\
    \n```\n$sql = 'SELECT * FROM blog ORDER BY created DESC';\n```\n\n将其修改为：\n\n```\n\
    $sql = 'SELECT article_id, title,\nDATE_FORMAT(created, \"%a, %b %D, %Y\") AS\
    \ date_created\nFROM blog ORDER BY created DESC';\n```\n\n- `blog_list_mysqli.php`\
    \ 和 `blog_list_pdo.php` 的更新版本位于 `ch14` 文件夹中。\n\n![A978-1-4842-0635-5_14_Fig4_HTML.jpg](img/A978-1-4842-0635-5_14_Fig4_HTML.jpg)\n\
    \n**图 14-4.** MySQL 时间戳现在格式良好\n\n在页面正文的第一个表格单元格中，将 `$row['created']` 改为 `$row['date_created']`，以匹配\
    \ SQL 查询中的别名。保存页面并将其加载到浏览器中。现在，日期应格式化如图 14-4 所示。尝试使用其他说明符以满足你的偏好。\n\n- 我在整个 SQL\
    \ 查询周围使用了单引号，因此 `DATE_FORMAT()` 中的格式字符串需要使用双引号。\n- 确保 `DATE_FORMAT()` 的左括号前没有空格。\n\
    - 格式字符串以 `%a` 开头，它显示工作日名称的前三个字母。如果使用原始列名作为别名，`ORDER BY` 子句将按反向字母顺序对日期排序：Wed, Thu,\
    \ Sun 等。使用不同的别名可以确保日期仍按时间顺序排序。\n\n#### 日期的加减运算\n\n处理日期时，添加或减去特定的时间段通常很有用。例如，你可能想要显示过去七天内添加到数据库中的项目，或者停止显示三个月未更新的文章。MySQL\
    \ 通过 `DATE_ADD()` 和 `DATE_SUB()` 使这变得简单。这两个函数分别有名为 `ADDDATE()` 和 `SUBDATE()` 的同义词。\n\
    \n它们的基本语法都相同，如下所示：\n\n```\nDATE_ADD(date, INTERVAL value interval_type)\n```\n\
    \n使用这些函数时，`date` 可以是包含要更改日期的列、包含特定日期（采用 `YYYY-MM-DD` 格式）的字符串，或者是一个 MySQL 函数，例如\
    \ `NOW()`。`INTERVAL` 是一个关键字，后跟一个值和一个间隔类型，表 14-2 列出了最常用的间隔类型。\n\n**表 14-2.** `DATE_ADD()`\
    \ 和 `DATE_SUB()` 最常用的间隔类型\n\n| 间隔类型 | 含义 | 值格式 |\n| --- | --- | --- |\n| `DAY`\
    \ | 天 | 数字 |\n| `DAY_HOUR` | 天和小时 | 字符串，格式为 `'DD hh'` |\n| `WEEK` | 周 | 数字 |\n\
    | `MONTH` | 月 | 数字 |\n| `QUARTER` | 季度 | 数字 |\n| `YEAR` | 年 | 数字 |\n| `YEAR_MONTH`\
    \ | 年和月 | 字符串，格式为 `'YY-MM'` |\n\n间隔类型是常量，因此不要在 `DAY`、`WEEK` 等的末尾添加“S”使其成为复数形式。\n\
    \n这些函数最有用的应用之一是仅显示表中最近的项目。\n\n#### PHP 解决方案 14-3：显示过去一周内更新的项目\n\n此 PHP 解决方案演示了如何根据特定的时间间隔限制数据库结果的显示。使用\
    \ PHP 解决方案 14-1 中的 `blog.php`。\n\n在 `blog.php` 中找到 SQL 查询。它看起来像这样：\n\n```\n$sql\
    \ = 'SELECT * FROM blog ORDER BY created DESC';\n```\n\n将其修改为：\n\n```\n$sql =\
    \ 'SELECT * FROM blog\nWHERE updated > DATE_SUB(NOW(), INTERVAL 1 WEEK)\nORDER\
    \ BY created DESC';\n```\n\n- 你可以将你的代码与 `ch14` 文件夹中的 `blog_limit_mysqli.php` 和\
    \ `blog_limit_pdo.php` 进行比较。\n\n保存并在浏览器中重新加载页面。根据你上次更新 `blog` 表中的项目的时间，你应该会看到要么没有结果，要么只有有限范围内的项目。如有必要，将间隔类型更改为\
    \ `DAY` 或 `HOUR` 以测试时间限制是否有效。打开 `blog_list_mysqli.php` 或 `blog_list_pdo.php`，选择一个未在\
    \ `blog.php` 中显示的项目，然后进行编辑。重新加载 `blog.php`。你刚刚更新的项目现在应该会显示出来。\n\n- 这告诉 MySQL，你只需要在过去一周内更新过的项目。\n"
- fmt: "### Inserting Dates into MySQL\n\nMySQL’s requirement for dates to be formatted\
    \ as `YYYY-MM-DD` presents a headache for online forms that allow users to input\
    \ dates. As you saw in [Chapter 13](#A978-1-4842-0635-5_13_Chapter.html), the\
    \ current date and time can be inserted automatically by using a `TIMESTAMP` column.\
    \ You can also use the MySQL `NOW()` function to insert the current date in a\
    \ `DATE` or `DATETIME` column. It’s when you need any other date that problems\
    \ arise.\n\nUsing a text input field in a form relies on users being trusted to\
    \ follow a set pattern for inputting dates, such as `MM/DD/YYYY`. If everybody\
    \ complies, you can use the `explode()` function to rearrange the date parts,\
    \ like this:\n\n```\nif (isset($_POST['theDate'])) {\n    $date = explode('/',\
    \ $_POST['theDate']);\n    $mysqlFormat = \"$date[2]-$date[0]-$date[1]\";\n}\n\
    ```\n\nIf someone deviates from the format, you end up with invalid dates in your\
    \ database.\n\nThe situation will eventually be a lot simpler when all browsers\
    \ support the HTML5 date input field. There’s an example in `date_test.php` in\
    \ the `ch14` folder. The code in the body of the page looks like this:\n\n```\n\
    <form method=\"post\" action=\"\">\n    <p>\n        <label for=\"date\">Date:</label>\n\
    \        <input type=\"date\" name=\"date\" id=\"date\">\n    </p>\n    <p>\n\
    \        <input type=\"submit\" name=\"submit\" id=\"submit\" value=\"Submit\"\
    >\n    </p>\n</form>\n\n<?php\nif (isset($_POST['submit'])) {\n    echo 'The date\
    \ you selected is: ' . htmlentities($_POST['date']);\n}\n?>\n```\n\nThe real advantage\
    \ of using `date` as the input type is that browsers often display a date picker\
    \ as soon as the field gains focus, and the selected value is displayed according\
    \ to the device’s user settings. So, Americans and Europeans see the date displayed\
    \ in their preferred format. But when the form is submitted, the value is always\
    \ in the ISO `YYYY-MM-DD` format. Figure [14-5](#A978-1-4842-0635-5_14_Chapter.html#Fig5)\
    \ shows the output of `date_test.php` in Safari 7.1 on my iPhone 5. The date picker\
    \ and `date` field use the UK date format, but the value submitted through the\
    \ `$_POST` array is in the ISO format.\n\n![A978-1-4842-0635-5_14_Fig5_HTML.jpg](A978-1-4842-0635-5_14_Fig5_HTML.jpg)\n\
    \n**Figure 14-5.** HTML5 date input fields display dates in local format, but\
    \ submit them in the ISO format\n\nUnfortunately, only 50 percent of browsers\
    \ in use in September 2014 supported the date input type. At the time of this\
    \ writing, there was no indication of when popular browsers, such as Internet\
    \ Explorer and Firefox, planned to implement support.\n\nConsequently, the most\
    \ reliable method of gathering dates from an online form remains the use of separate\
    \ input fields for month, day, and year.\n\n### PHP Solution 14-4: Validating\
    \ and Formatting Dates for MySQL Input\n\nThis PHP solution concentrates on checking\
    \ the validity of a date and converting it to MySQL format. It’s designed to be\
    \ incorporated in an insert or update form of your own.\n\nCreate a page called\
    \ `date_converter.php` and insert a form containing the following code (or use\
    \ `date_converter_01.php` in the `ch14` folder):\n\n```\n<form method=\"post\"\
    \ action=\"\">\n    <p>\n        <label for=\"month\">Month:</label>\n       \
    \ <select name=\"month\" id=\"month\">\n            <option value=\"\"></option>\n\
    \        </select>\n        <label for=\"day\">Date:</label>\n        <input name=\"\
    day\" type=\"number\" required id=\"day\" max=\"31\" min=\"1\" maxlength=\"2\"\
    >\n        <label for=\"year\">Year:</label>\n        <input name=\"year\" type=\"\
    number\" required id=\"year\" maxlength=\"4\">\n    </p>\n    <p>\n        <input\
    \ type=\"submit\" name=\"convert\" id=\"convert\" value=\"Convert\">\n    </p>\n\
    </form>\n```\n\nThis code creates a drop-down menu called `month` and two input\
    \ fields called `day` and `year`. The drop-down menu doesn’t have any values at\
    \ the moment, but it will be populated by a PHP loop. The `day` and `year` fields\
    \ use the HTML5 `number` type and `required` attribute. The day field also has\
    \ the `max` and `min` attributes so as to restrict the range to between 1 and\
    \ 31. Browsers that support the new HTML5 form elements display number steppers\
    \ alongside the fields and restrict the type and range of input. Other browsers\
    \ render them as ordinary text input fields. For the benefit of older browsers,\
    \ both have `maxlength` attributes that limit the number of characters accepted.\n\
    \nAmend the section that builds the drop-down menu, like this:\n\n```\n<select\
    \ name=\"month\" id=\"month\">\n    <?php\n    $months = ['Jan','Feb','Mar','Apr','May','Jun',\n\
    \               'Jul','Aug', 'Sep', 'Oct', 'Nov','Dec'];\n    $thisMonth = date('n');\n\
    \    for ($i = 1; $i <= 12; $i++) { ?>\n        <option value=\"<?= $i; ?>\"\n\
    \        <?php\n        if ((!$_POST && $i == $thisMonth) ||\n            (isset($_POST['month'])\
    \ && $i == $_POST['month'])) {\n            echo ' selected';\n        } ?>>\n\
    \        <?= $months[$i - 1]; ?>\n        </option>\n    <?php } ?>\n</select>\n\
    ```\n\nAlso populate the fields for the day and year with the current date or\
    \ the value selected after the form has been submitted.\n\n- This creates an array\
    \ of month names and uses the `date()` function to find the number of the current\
    \ month (the meaning of the argument passed to `date()` is explained later in\
    \ this chapter).\n- A `for` loop then populates the menu’s `<option>` tags. I\
    \ have set the initial value of `$i` to `1`, because I want to use it for the\
    \ value of the month. Inside the loop, the conditional statement checks two sets\
    \ of conditions, both of which are enclosed in parentheses to ensure they’re evaluated\
    \ in the correct sequence. The first set checks that the `$_POST` array is empty\
    \ and the values of `$i` and `$thisMonth` are the same. But if the form has been\
    \ submitted, `$_POST['month']` will have been set, so the alternative set of conditions\
    \ checks whether `$i` is the same as `$_POST['month']`. As a result, when the\
    \ form is first loaded, `selected` is inserted into the `<option>` tag for the\
    \ current month. But if the form has already been submitted, the month selected\
    \ by the user is displayed again.\n- The name of the month is displayed between\
    \ the `<option>` tags by drawing it from the `$months` array. Because indexed\
    \ arrays begin at 0, you need to subtract 1 from the value of `$i` to get the\
    \ right month.\n\n```\n<label for=\"day\">Date:</label>\n<input name=\"day\" type=\"\
    number\" required id=\"day\" max=\"31\" min=\"1\"\n       maxlength=\"2\" value=\"\
    <?php if (!$_POST) {\n           echo date('j');\n       } elseif (isset($_POST['day']))\
    \ {\n           echo $_POST['day'];\n       } ?>\">\n\n<label for=\"year\">Year:</label>\n\
    <input name=\"year\" type=\"number\" required id=\"year\" maxlength=\"4\"\n  \
    \     value=\"<?php if (!$_POST) {\n           echo date('Y');\n       } elseif\
