- fmt: "`\"logout\"`\n\n`msgstr` `\"Log Out\"`\n\nAs long as the other locales contain\
    \ the same `msgid` values, the L10n utility can fetch the `msgstr` values depending\
    \ on the locale. The default locale is set in the core configuration under `Config.language`.\
    \ This value is set by default to English but may be changed to any locale. When\
    \ L10n looks up `msgid` keys, it will first visit the locale specified in the\
    \ `Config.language` setting.\n\nA corresponding Spanish locale would look something\
    \ like this:\n\n`msgid`\n\n`\"home\"`\n\n`msgstr` `\"Bienvenidos a Nuestro Sitio\"\
    `\n\n`msgid` `\"contact\"`\n\n`msgstr`\n\n`\"Contactarnos\"`\n\n`msgid`\n\n`\"\
    login\"`\n\n`msgstr` `\"Ingresar\"`\n\n`msgid`\n\n`\"logout\"`\n\n`msgstr`\n\n\
    `\"Salir\"`\n\n## Localizing Content\n\nOnce the locale files are in place, localizing\
    \ content is simple. First, instantiate the `L10n` utility class like other utilities:\n\
    \n```\nApp::import('Core','L10n');\n$l10n =& new L10n();\n```\n\nThen, run the\
    \ `L10n::get()` function to tell the controller which locale to use for localizing.\n\
    \nNow, everything contained in the convenience function, `__()`, will be looked\
    \ up in the locales.\n\n```\n$l10n->get('spa');\n__('home');\n```\n\nThe previous\
    \ lines will output the `msgstr` following the `msgid` with `home` as its value.\
    \ If you want returned localized strings to be passed along as raw data and not\
    \ echoed, set the `escape` parameter to `true`:\n\n```\n$form->error('Post.title',__('postTitleError',true));\n\
    ```\n\n## Sanitize\n\nThe `Sanitize` utility contains functions designed for cleaning\
    \ up data and text. Stripping whitespace, HTML tags, and references to scripts\
    \ and style sheets, as well as escaping text for SQL, can be accomplished with\
    \ the `Sanitize` utility.\n\nRemember to instantiate the `Sanitize` utility first\
    \ with `App::import()` and assign the utility as a class object for use in the\
    \ controller or model:\n\n```\nApp::import('Core','Sanitize');\n$sanitize =& new\
    \ Sanitize();\n```\n\n`Sanitize` can strip out HTML tags from a block of text\
    \ by using the `stripTags()` function: `$this->set('output',$sanitize->stripTags($output,array('<p>','<em>','<div>')));`\
    \ Other functions include `clean()`, `escape()`, `html()`, `stripImages()`, `stripScripts()`,\
    \ and `stripWhitespace()`. If you need to clean data, text, or SQL queries, consult\
    \ the `Sanitize` utility.\n\n## Third-Party Components\n\nCake’s built-in components\
    \ and utilities are extremely helpful in extending the functionality of the controller\
    \ and model. Even more components are available online through Cake’s open source\
    \ service CakeForge ([www.cakeforge.org](http://www.cakeforge.org)) and the Bakery\
    \ ([http://bakery.cakephp.org](http://bakery.cakephp.org)).\n\nThese third-party\
    \ components cover all sorts of functions that can reduce the amount of code you\
    \ need to write. When running components, remember to follow the instructions\
    \ supplied by the developer, which usually assume you know how to install a component\
    \ (which was covered in “Using Components” earlier). Third-party components available\
    \ at the Bakery include Twitter, Image Resizer, LastRSS, SMS Text, Authorize.net\
    \ AIM Integration, and Yahoo! Weather.\n\nSearching for components first before\
    \ trying to write a long controller process yourself can yield excellent results.\n\
    \n## Creating Custom Components\n\nCreating your own custom components is simple\
    \ and follows the pattern shown in earlier chapters. All components are stored\
    \ in the `app/controllers/components` directory and follow Cake’s naming scheme.\
    \ If you want to install your own utilities, you will need to install them as\
    \ vendor files, since utilities are stored in the Cake core.\n\nThe basic component\
    \ file has a file name that matches its class name. Like controller classes, these\
    \ are camel-cased and have the `.php` extension. See Listing 11-12.\n\n**Listing\
    \ 11-12.** *The Basic Component File, Named* `blog.php`, *Stored in the* `components`\
    \ *Directory*\n\n```\n<?\nclass BlogComponent extends Object {\n\n}\n?>\n```\n\
    \nThe component contains functions like the controller. Because these functions\
    \ are called by noncomponents, or in other words, a controller, they will run\
    \ the `return()` function to send back its output. These functions can also have\
    \ parameters.\n\n## Using the Initialize and Startup Functions\n\nTo run logic\
    \ before the controller’s functions are called (like the `beforeFilter()` function\
    \ in the controller), use the `initialize()` function. This function can contain\
    \ any logic to be run before the component’s functions are processed.\n\nSometimes\
    \ a component function will need access to its parent controller, meaning the\
    \ controller that is currently calling it. Properties like `$this->data` and `$this->params`,\
    \ as well as any other properties currently in use by the controller can be pulled,\
    \ into the component. By using the `startup()` function, you can provide the component\
    \ with the controller object and thus give any component function access to its\
    \ parent controller. See Listing 11-13.\n\n**Listing 11-13.** *The* `startup()`\
    \ *Function in the Component*\n\n```\nfunction startup(&$controller) {\n    $this->data\
    \ = $controller->data;\n}\n```\n\nAnything in the controller that appears under\
    \ the `$this` object is made available to the component as `$controller`, as shown\
    \ in Listing 11-13. You can set a component class variable to contain the controller\
    \ object:\n\n```\nvar $controller = null;\n```\n\nand then use the `startup()`\
    \ function to instantiate the controller object. Then all functions in the controller\
    \ can use `$this->controller` to access anything in the parent controller.\n\n\
    ```\nfunction startup(&$controller) {\n    $this->controller = $controller;\n\
    }\n```\n\nNow in a placeholder function, you can pull the parameters from the\
    \ parent controller and use them in the component:\n\n```\nfunction test() {\n\
    \    $params = $this->controller->params;\n    $data = $params['data'];\n    return\
    \ $data;\n}\n```\n\n### Writing Vendor Files Instead of Components\n\nRemember\
    \ that the idea behind components is to share code for cross-controller functions\
    \ that are portable. In theory, you should be able to distribute any component,\
    \ and it should work for any Cake application regardless of how the application\
    \ is designed. If the code does not fit in the CakePHP framework, or an MVC model,\
    \ then you ought to create vendor files and not components. By adhering to this\
    \ standard, you ensure that other Cake developers can benefit from your work,\
    \ and vice versa.\n\nLike helpers, components are designed to cut down on superfluous\
    \ code in the controller.\n\nWhen the controller begins to look more bloated than\
    \ the model, you will generally want to find ways to move more code to the model.\
    \ When code is shared across multiple controllers, you may want to consider placing\
    \ that logic in a component and scaling the code to be more portable than in one\
    \ specific controller or Cake application. In the long run, your site will be\
    \ better organized, cleaner, and lighter—always good reasons for taking the extra\
    \ step.\n\n## Summary"
