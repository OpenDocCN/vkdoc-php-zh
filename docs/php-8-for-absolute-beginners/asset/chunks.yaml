    \ 方法*提供读取权限。一个 *set 方法*提供写入权限。我们实际上可以创建只读的变量（仅提供 get 方法），也可以创建只写的变量（仅提供 set 方法）。大多数\
    \ get 方法都是简单的，如示例所示；它们只是将请求的值返回给调用程序。\n\n```\npublic function setTitle(string\
    \ $value) {\n    if (strpos($value, '^')) {\n        $this->title = $value;\n\
    \    }\n}\n```\n\nset 方法的目标是保护数据（封装）。在更改变量之前，set 方法应检查信息的有效性。在示例中，一个 `if` 语句使用\
    \ PHP 函数 `strpos` 来判断变量 `$value`（传入函数的信息）是否包含脱字符（`^`）符号。如果包含，它允许用传入的信息更新 `title`\
    \ 变量。这个示例实际上会失败，因为我们的 `title` 字符串不包含脱字符。如果你运行该程序，你会发现 `title` 使用的是默认值。\n\n## 安全编程\n\
    \n一个安全可靠的程序会拒绝用无效数据更新信息的尝试，而不会导致程序引发错误和/或崩溃。在这个例子中，一个无效字符串被提交以更新 `title` 变量。程序仅拒绝无效数据并保留默认值。程序的用户只会看到\
    \ `title` 被设置为默认值，这不会影响用户试图完成的操作。因此，该程序比使用公共变量更安全、更可靠。如果程序因无效数据而无法继续运行，则应向用户提供信息性消息，该消息不会引发错误或导致程序崩溃。\n\
    \n```\npublic function appendContent(string $value) {\n    if (strpos($value,\
    \ 'content' . $value)) {\n        $this->content .= $value;\n    }\n}\n```\n\n\
    在代码示例中，`content` 变量有一个额外的方法，用于追加信息，而不是替换（设置）信息。我们的 `index` 程序对 `content` 变量进行设置和追加操作。因此，这个额外的方法对于此操作是必需的。\n\
    \n*我们应该总是使用 setter 和 getter 吗？*\n答案是否定的。如果没有理由保护数据，那么数据可以保持公开。许多教科书演示了 setter\
    \ 和 getter 的使用，但没有强调一个不进行任何验证的 set 例程只是在浪费效率。如果不需要验证，只需将变量设置为公共访问即可。然而，考虑到编程环境中存在的大量黑客攻击，程序员应该深思熟虑，避免将任何变量保留为完全公开的公共变量。\n\
    \n## 注意\n\n`strpos` 方法在一个字符串中搜索以确定被检查的值是否存在于字符串中。如果存在，它返回该值在字符串中的位置。字符串位置从第一个位置的\
    \ 0 开始编号。如果该值不在字符串中，则函数返回 `-1`。任何大于或等于 `1` 的值被判定为 `TRUE`。任何小于或等于 `0` 的值被判定为 `FALSE`。因此，只要发现该值，`if`\
