    \ true。\n```\n\n**注意**：也可以使用符号 `||` 来代替 `or`。\n\n### L-2\n\n```\n输出：我们所有人都相等。\n\
    原因：当使用 *与运算符* 时，表达式的两侧必须都为 true，整个表达式才为 true。在这个例子中，两侧都为 true。\n```\n\n**注意**：也可以使用符号\
    \ `&&` 来代替 `and`。\n\n### L-3\n\n```\n输出：有人不相等。\n原因：使用 *异或*（`xor`）时，表达式中只能有一侧为\
