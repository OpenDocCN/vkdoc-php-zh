    `}`\n\n26 `$token = strtok(\"\\n\");`\n`}`\n\n`$data = $pdf->render();`\n30 `header(\"\
    Content-Disposition: inline; file name=blog_post.pdf\");`\n31 `header(\"Content-type:\
    \ application/x-pdf\");`\n`echo $data;`\n`exit();`\n34 `}`\n\nNotice how Listing\
    \ 12-7 uses the PDF component. On line 8, the component is imported as a vendor,\
    \ and then line 9 instantiates a new PDF class object. Line 10 reverts the include\
    \ path setting back to the default Cake path (since we will soon change the include\
    \ path to work in Zend). Lines 12–33 follow the generic pattern for creating PDF\
    \ files with the PDF component.\n\nFor more detailed help on using the PDF component,\
    \ consult the online documentation\n([http://framework.zend.com/manual/en/zend.pdf.html](http://framework.zend.com/manual/en/zend.pdf.html)).\
    \ In short, you create a new PDF file and write new pages to the file. Since lines\
