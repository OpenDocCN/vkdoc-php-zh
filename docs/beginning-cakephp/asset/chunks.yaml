    \ *Function*\n\n```php\n1 function voteUpLink($id=null,$options=array()) {\n2\
    \     if (isset($options['text'])) {\n3         $text = $options['text'];\n4 \
    \    } else {\n5         $text = 'up';\n6     }\n8     if (isset($options['update']))\
    \ {\n9         $update = $options['update'];\n10     } else {\n11         $update\
    \ = 'vote_'.$id;\n12     }\n14     $up = $options['upLink'].$id;\n15     return\
    \ $this->output($this->Ajax->link($text,$up,array('update'=>➥\n$update),null,false));\n\
    16 }\n```\n\n**Listing 9-6.** *The* `$blog->voteDownLink()` *Function*\n\n```php\n\
    1 function voteDownLink($id=null,$options=array()) {\n2     if (isset($options['text']))\
