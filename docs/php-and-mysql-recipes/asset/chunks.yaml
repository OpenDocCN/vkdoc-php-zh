    }


    // Call the function


    if (SelectRows("mytable", $mytable)) {


    // Do Something


    }


    mysqli_close($con);


    In this example the function SelectRows() takes two parameters. The first is a
    string that indicates the name of the table to use. The second parameter does
    not have any type declaration, as the function will overwrite any data already
    in it as the return value.


    This function will always return a value of 0 or higher, even if there is an error.


    Recipe 11-7\. Check if Function Exists


    Problem


    Calling a function that is undefined will cause a fatal error. Most of the time
    this happens due to spelling errors but there can be cases where the programmer
    wants to check if a function is defined and then act accordingly.


    Solution'
  trans: "\n# 排版后内容\n\n**严重错误：传递给 `DeleteRows()` 的参数 1 必须是字符串实例，但给定的是整型**\n\n## 方案\
    \ 11-6. 返回值\n\n### 问题\n\n到目前为止，我们讨论了如何调用函数和传递参数，但如何处理数据库计算或数据库查询的结果呢？\n\n### 解决方案\n\
    \n从函数调用中获取值有两种方法。第一种方法是定义返回值，这通过使用关键字 `return` 实现。`return` 关键字可以单独使用，此时函数将在该位置停止执行，且不返回任何值。\n\
    \n如果 `return` 关键字后跟一个值或表达式，函数将返回该值。这个值可以是标量，也可以是更复杂的值，如数组或对象。\n\n另一种从函数返回数据的方法是使用通过引用传递的参数。具体做法是在函数声明的参数名称前添加一个\
    \ `&`。早期版本的 PHP 允许在调用时使用此语法，但这种方式已被弃用。现在只能在声明时使用。\n\n一个函数可以通过 `return` 语句返回一个值，同时还可以通过引用传递的参数返回一个或多个值。通常的做法是将返回值用作易于检查的状态码，而将返回参数用作实际返回的数据。\n\
    \n### 工作原理\n\n本章示例中使用的 `DeleteRows()` 函数可以进行扩展，使其返回实际删除的行数。\n\n```php\n<?php\n\
    // 11_9.php\n\n$con = mysqli_connect('host', 'user', 'secret');\n\nif ($con) {\n\
    \    mysqli_select_db($con, 'mydb');\n}\n\n// 第 11 章 ■ 函数\n\nfunction DeleteRows(string\
    \ $table, array $ids = []) {\n    global $con;\n    if ($con) {\n        $where\
    \ = \"\";\n        if (is_array($ids) && sizeof($ids)) {\n            $strids\
    \ = implode(\", \", $ids);\n            $where = \" where id in ({$strids})\"\
    ;\n        }\n        mysqli_query($con, \"delete from {$table}{$where};\");\n\
    \        return mysqli_affected_rows($con);\n    } else {\n        echo \"No database\
    \ connection\";\n        return -1;\n    }\n}\n\n// 调用函数\nDeleteRows(\"mytable\"\
    );\nmysqli_close($con);\n```\n\n该函数包含两个 `return` 语句，每个语句都会在执行到该位置时终止函数执行。第二个 `return`\
    \ 语句用于处理未连接到数据库的错误情况。\n\n成功删除时可能的返回值是 0 或更高，因此为了表示错误，选择此范围之外的值作为返回值。\n\n良好的编程实践是尽可能减少函数中\
    \ `return` 语句的数量，这能使代码更易于理解。在上面的例子中，我们可以将受影响的行数赋值给一个变量，将 `-1` 值也做同样处理，然后在函数末尾只保留一个\
    \ `return` 语句。\n\n为了展示函数如何通过引用传递的参数返回数据，我们可以创建一个从表中选取行的函数。\n\n```php\n<?php\n\
    // 11_10.php\n\n$con = mysqli_connect('host', 'user', 'secret');\n\nif ($con)\
    \ {\n    mysqli_select_db($con, 'mydb');\n}\n\nfunction SelectRows(string $table,\
    \ &$data) {\n    global $con;\n    $data = [];\n    if ($con) {\n        $where\
    \ = \"\";\n        $rs = mysqli_query($con, \"select * from {$table};\");\n  \
    \      if ($rs) {\n            while($row = mysqli_fetch_assoc($rs)) {\n     \
    \           $data[] = $row;\n            }\n            mysqli_free_result($rs);\n\
    \        }\n        // 第 11 章 ■ 函数\n    } else {\n        echo \"No database connection\"\
    ;\n    }\n    return sizeof($data);\n}\n\n// 调用函数\nif (SelectRows(\"mytable\"\
    , $mytable)) {\n    // 执行某些操作\n}\nmysqli_close($con);\n```\n\n在这个例子中，函数 `SelectRows()`\
    \ 接受两个参数。第一个参数是一个字符串，用于指定要操作的表名。第二个参数没有类型声明，因为函数会清空该参数中已有的任何数据并将其作为返回值。\n\n该函数始终返回\
    \ 0 或更高的值，即使在发生错误时也是如此。\n\n## 方案 11-7. 检查函数是否存在\n\n### 问题\n\n调用未定义的函数会导致致命错误。大多数情况下这是由于拼写错误导致的，但也有程序员希望检查函数是否已定义，然后根据结果采取相应操作的情况。\n\
    \n### 解决方案\n"
- fmt: "有多个内置函数可以帮助程序员确定函数是否存在。第一个是`get_defined_functions()`。该函数不接受任何参数，返回一个包含两个键（`'internal'`和`'user'`）的多维数组。根据已安装扩展的数量，存在超过1500个内置函数。这使得该方法在检查单个函数时不太实用。\n\
    \n下一个函数是`function_exists()`。该函数接受一个参数，用于描述要查找的特定函数。参数可以是字符串值或包含字符串值的变量。该值不区分大小写，这与PHP中任何函数名称的处理方式一致。\n\
    \n最后，还有一个名为`is_callable()`的函数。该函数检查传入的变量内容是否是可调用的函数或类的方法。变量可以是指向函数的字符串值，也可以是一个包含两个值的数组：第一个值是对象，第二个值是该对象方法的名称字符串。\n\
    \n## 工作原理\n\n使用`function_exists()`函数的一个简单应用是判断特定的包含文件是否已加载。\n\n```php\n<?php\n\
    // 11_11.php\nif (!function_exists('MyFunction')) {\n    include \"myfunc.inc\"\
    ;\n}\n```\n\n## 第11章 ■ 函数\n\n### 方案11-8：计算出的函数名称\n\n#### 问题\n\n如果脚本包含许多功能相似的函数，并且你需要根据变量的值调用正确的函数，你可能会写出一系列嵌套的`if`语句或`switch/case`语句。对于少量函数，这可能不是大问题，但随着函数数量增加，会导致冗长复杂的逻辑。\n\
    \n#### 解决方案\n\n解决方案是利用PHP将变量用作函数的能力。就像可以有可变变量（名称前有多个`$`符号）一样，也可以用`$`开头来调用函数。在这种情况下，PHP会取变量内容并将其用作函数名。如果变量包含非字符串值，或者值是无法匹配到函数名的字符串，系统会抛出致命错误。\n\
    \n#### 工作原理\n\n首先，我们看一个使用传统`switch/case`语句调用所需函数的例子。\n\n```php\n<?php\n// 11_12.php\n\
    $v = 1.25;\n\nfunction FormatInteger($i) {\n}\n\nfunction FormatFloat($f) {\n\
    }\n\nfunction FormatBool($b) {\n}\n\nfunction FormatString($s) {\n}\n\nswitch\
    \ (gettype($v)) {\n    case 'integer' :\n        FormatInteger($v);\n        break;\n\
    \    case 'double' :\n        FormatFloat($v);\n        break;\n    case 'boolean'\
    \ :\n        FormatBool($v);\n        break;\n    case 'string' :\n        FormatString($v);\n\
    \        break;\n}\n```\n\n同样的功能可以通过计算函数名来实现。首先，我们需要确保函数命名正确，使其名称与有效类型名称匹配。\n\n\
    ```php\n<?php\n// 11_13.php\n$v = 1.25;\n\nfunction FormatInteger($i) {\n}\n\n\
    function FormatDouble($f) {\n}\n\nfunction FormatBoolean($b) {\n}\n\nfunction\
    \ FormatString($s) {\n}\n\n$f = \"Format\" . gettype($v);\nif (is_callable($f))\
    \ {\n    $f($v);\n}\n```\n\n然后，我们可以创建一个包含所有函数前缀（`Format`）的变量，接着加上变量类型名称。变量类型名称为全小写，但由于函数名不区分大小写，这仍能解析到正确的选项。我们使用`is_callable()`函数来检查`$f`是否指向一个函数。在这个小例子中，没有为数组、对象或资源定义函数，因此如果`$v`的值为这些类型之一，代码将会失败。\n\
    \n### 方案11-9：匿名函数\n\n#### 问题\n\n在上一节中，我们了解了如何计算函数名、将其赋值给变量并执行。是否也有可能将完整的函数“存储”在变量中？\n\
    \n#### 解决方案\n\n答案是肯定的，这些函数被称为匿名函数或闭包。自 PHP 5.3 起，它们就已可用，并在多个方面非常有用。"
  raw: 'There are a number of built-in functions that can help the programmer determine
    if a function exists. The first one is get_defined_functions() . This function
    does not take any parameters and it will return a multidimensional array with
    two keys, ‘internal’ and ‘user’. There are over 1500 internal functions, depending
    on the number of extensions installed. This makes this method less practical to
    check for a single function.


    The next function is called function_exists() . This function takes a single parameter
    describing a specific function to look for. This can either be a string value
    or a variable with a string value. The value is not case sensitive as it is the
    case with any function name in PHP.


    Finally there is a function called is_callable() . This function will check if
    the content of the variable passed in is a callable function or a method on a
    class. The variable can either be a string value that points to a function or
    an array with two values where the first is an object and the second is a string
    with the name of a method on that object.


    How it Works


    A simple use of the function function_exists() could be to determine if a specific
    include file is loaded.


    <?php


    // 11_11.php


    if (!function_exists(''MyFunction'')) {


    include "myfunc.inc";


    }


    CHAPTER 11 ■ FUNCTIONS


    Recipe 11-8\. Calculated Function Names


    Problem


    If your script contains a number of functions that do similar things, and you
    need to call the right function based on the value of a variable you might end
    up writing a set of nested if statements or a switch/case statement. If there
    are a few functions that might not be a big problem but if the number of functions
    is growing it can create long and complicated logic.


    Solution


    The solution is to use PHP’s ability to use a variable as a function. Just like
    it’s possible to have variable variables (multiple $ signs in front of the name)
    it’s also possible to start a function call with a $. In that case PHP will take
    the contents of the variable and use that as the function name. If the variable
    contains a non-string value or the value is a string that can’t be matched to
    a function name the system will throw a fatal error.


    How it Works


    Let’s first look at the example using a traditional switch/case statement to call
    the desired function.


    <?php


    // 11_12.php


    $v = 1.25;


    function FormatInteger($i) {


    }


    function FormatFloat($f) {


    }


    function FormatBool($b) {


    }


    function FormatString($s) {


    }


    switch (gettype($v)) {


    case ''integer'' :


    FormatInteger($v);


    break;


    case ''double'' :


    FormatFloat($v);


    break;


    case ''boolean'' :


    FormatBool($v);


    break;


    case ''string'' :


    FormatString($v);


    break;


    }


    CHAPTER 11 ■ FUNCTIONS


    The same functionality can be obtained by calculating the name of the function.
    First we need to make sure the functions are named correctly, so the name matches
    an actual name of a valid type.


    <?php


    // 11_13.php


    $v = 1.25;


    function FormatInteger($i) {


    }


    function FormatDouble($f) {


    }


    function FormatBoolean($b) {


    }


    function FormatString($s) {


    }


    $f = "Format" . gettype($v);


    if (is_callable($f)) {


    $f($v);


    }


    Then we can create a variable that contains the prefix of all the functions (Format)
    and then add the name of the variable type. The name of the variable type will
    be all lowercase, but because function names are case insensitive this will still
    resolve to the correct option. We use the function is_callable() to check if $f
    points to a function. In this little example there are no functions defined for
    arrays, objects, or resources so the code would fail if $v had a value of any
    of these types.


    Recipe 11-9\. Anonymous Functions


    Problem


    In the previous section we saw how function names can be calculated, assigned
    to a variable, and then executed. Is it also possible to “store” complete functions
    in variables?


    Solution


    The answer is yes and these are called anonymous functions or closures. These
    have been available since PHP 5.3 and are useful in a couple of ways.'
  trans: "\n有多个内置函数可以帮助程序员确定函数是否存在。第一个是`get_defined_functions()`。该函数不接受任何参数，返回一个包含两个键（`'internal'`和`'user'`）的多维数组。根据已安装扩展的数量，存在超过\
    \ 1500 个内置函数。这使得该方法在检查单个函数时不太实用。\n\n下一个函数是`function_exists()`。该函数接受一个参数，用于描述要查找的特定函数。参数可以是字符串值或包含字符串值的变量。该值不区分大小写，这与\
    \ PHP 中任何函数名称的处理方式一致。\n\n最后，还有一个名为`is_callable()`的函数。该函数检查传入的变量内容是否是可调用的函数或类的方法。变量可以是指向函数的字符串值，也可以是一个包含两个值的数组：第一个值是对象，第二个值是该对象方法的名称字符串。\n\
    \n## 工作原理\n\n使用`function_exists()`函数的一个简单应用是判断特定的包含文件是否已加载。\n\n```php\n<?php\n\
    // 11_11.php\nif (!function_exists('MyFunction')) {\n    include \"myfunc.inc\"\
    ;\n}\n```\n\n## 第 11 章 ■ 函数\n\n### 方案 11-8：计算出的函数名称\n\n#### 问题\n\n如果脚本包含许多功能相似的函数，并且你需要根据变量的值调用正确的函数，你可能会写出一系列嵌套的`if`语句或`switch/case`语句。对于少量函数，这可能不是大问题，但随着函数数量增加，会导致冗长复杂的逻辑。\n\
    \n#### 解决方案\n\n解决方案是利用 PHP 将变量用作函数的能力。就像可以有可变变量（名称前有多个`$`符号）一样，也可以用`$`开头来调用函数。在这种情况下，PHP\
    \ 会取变量内容并将其用作函数名。如果变量包含非字符串值，或者值是无法匹配到函数名的字符串，系统会抛出致命错误。\n\n#### 工作原理\n\n首先，我们看一个使用传统`switch/case`语句调用所需函数的例子。\n\
    \n```php\n<?php\n// 11_12.php\n$v = 1.25;\n\nfunction FormatInteger($i) {\n}\n\
    \nfunction FormatFloat($f) {\n}\n\nfunction FormatBool($b) {\n}\n\nfunction FormatString($s)\
    \ {\n}\n\nswitch (gettype($v)) {\n    case 'integer' :\n        FormatInteger($v);\n\
    \        break;\n    case 'double' :\n        FormatFloat($v);\n        break;\n\
    \    case 'boolean' :\n        FormatBool($v);\n        break;\n    case 'string'\
    \ :\n        FormatString($v);\n        break;\n}\n```\n\n同样的功能可以通过计算函数名来实现。首先，我们需要确保函数命名正确，使其名称与有效类型名称匹配。\n\
    \n```php\n<?php\n// 11_13.php\n$v = 1.25;\n\nfunction FormatInteger($i) {\n}\n\
    \nfunction FormatDouble($f) {\n}\n\nfunction FormatBoolean($b) {\n}\n\nfunction\
    \ FormatString($s) {\n}\n\n$f = \"Format\" . gettype($v);\nif (is_callable($f))\
    \ {\n    $f($v);\n}\n```\n\n然后，我们可以创建一个包含所有函数前缀（`Format`）的变量，接着加上变量类型名称。变量类型名称为全小写，但由于函数名不区分大小写，这仍能解析到正确的选项。我们使用`is_callable()`函数来检查`$f`是否指向一个函数。在这个小例子中，没有为数组、对象或资源定义函数，因此如果`$v`的值为这些类型之一，代码将会失败。\n\
    \n### 方案 11-9：匿名函数\n\n#### 问题\n\n在上一节中，我们了解了如何计算函数名、将其赋值给变量并执行。是否也有可能将完整的函数“存储”在变量中？\n\
    \n#### 解决方案\n\n答案是肯定的，这些函数被称为匿名函数或闭包。自 PHP 5.3 起，它们就已可用，并在多个方面非常有用。\n"
- fmt: "最基础的使用方式是作为回调函数。它被当作参数传递给另一个函数，该函数会执行这个回调一次或多次。通过使用匿名函数，该函数将仅在所调用函数的作用域内可用。\n\
    \n另一种用途是让函数在短时间内存在，并根据需要重新定义。这通过创建一个变量并为其赋值一个函数值来实现：`$a = function($b) {};`。\n\
    \n### 工作原理\n\n首先，我们来看作为回调函数的用法。PHP 有许多内置函数，它们接受回调作为参数。`usort()` 函数就是其中之一。这个函数设计用于接受用户自定义函数，并使用它来对数组进行排序。\n\
    \n### 第11章 ■ 函数\n\n在引入闭包之前，`usort` 函数的使用方式如下：\n\n```php\n<?php\n// 11_14.php\n\
    function compare($a, $b) {\n    if ($a == $b) {\n        return 0;\n    }\n  \
    \  return ($a < $b) ? -1 : 1;\n}\n\n$arr = [1, 9, 3, 1, 5, 7, 4];\nusort($arr,\
    \ 'compare');\nprint_r($arr);\n```\n\n随着 PHP 7.0 中“太空船操作符”（`<=>`）的引入以及闭包的使用，我们可以用更简洁的方式编写同样的代码：\n\
    \n```php\n<?php\n// 11_15.php\n$arr = [1, 9, 3, 1, 5, 7, 4];\nusort($arr, function($a,\
    \ $b) { return $a <=> $b; });\nprint_r($arr);\n```\n\n太空船操作符会比较两边的值：如果左边小于右边则返回\
    \ `-1`，两边相等则返回 `0`，右边小于左边则返回 `1`。\n\n匿名函数仅在 `usort()` 函数运行期间存在于内存中，当函数结束时，它便无法再被调用。\n\
    \n匿名函数和变量函数的组合可用于在执行过程中根据逻辑或其他标准修改函数。在下一个示例中，我们创建一个匿名函数来计算销售利润。我们决定给在周三购物的客户提供一个小折扣。\n\
    \n与其为所有交易检查星期几，我们可以只检查一次，然后定义计算函数。\n\n```php\n<?php\n// 11_16.php\nif (date('w')\
    \ == 3) {\n    $profit = function($p) {\n        return $p * 1.25;\n    };\n}\n\
    else {\n    $profit = function($p) {\n        return $p * 1.30;\n    };\n}\n\n\
    // 从数据库中读取所有交易\nforeach($transaction as $t) {\n    $p = $profit($t);\n}\n```\n\
    \n### 第11章 ■ 函数\n\n这个示例本可以使用常规函数定义来实现。根据逻辑，只会定义其中一个函数。但如果你需要在执行过程中重新定义一个函数，就必须使用闭包。\n\
    \n```php\n<?php\n// 11_17.php\n$profit = function($p) {\n    return $p * 1.30;\n\
    };\necho $p = $profit(100) . \"\\n\";\n\n// 执行一些操作\n$profit = function($p) {\n\
    \    return $p * 1.25;\n};\necho $p = $profit(100) . \"\\n\";\n```\n\n在这个例子中，第一个\
    \ `profit` 函数被使用一次后，当一个新的函数被赋值给变量 `$profit` 时，它并没有被丢弃。这个操作不会导致编译器或运行时错误。\n\n由于\
    \ PHP 解析器的工作方式，我们有可能定义嵌套函数。虽然这是可行的，但不推荐这样做。内部函数只有在外部函数执行时才会被定义，并且如果外部函数被多次调用，内部函数会被重新定义，从而导致致命错误，如下一个示例所示。\n\
    \n```php\n<?php\n// 11_18.php\nfunction A() {\n    function B($i) {\n        echo\
    \ \"B called with $i\\n\";\n    }\n    for ($i = 1; $i < 3; $i++) {\n        B($i);\n\
    \    }\n    echo \"A called\\n\";\n}\n\nA();\nB(0);\n```\n\n在这个例子中，首先调用了 `A()`，这导致函数\
    \ `B()` 被定义，因此在 `A()` 之后调用 `B()` 仍然有效。如果先调用 `B()`，或者 `A()` 被多次调用，则会引发致命错误。\n\n\
