- fmt: '# Questions


    1. The unit tests we created seem to repeat a lot of code. This is especially
    true of the unit tests of the `Database` and `Model` classes. Why is this necessary?


    2. Should these kinds of tests be written in parallel or after the classes they
    test have been written?


    # Answers


    1. The reason our testing occurs outside of the MVC structure our framework facilitates
    is the same reason we repeat code within the individual unit tests. The less our
    tests depend on external variables, the more accurate they will be at pointing
    out breaking changes to the classes we cover in the unit tests.


    2. The decision of when to write these tests isn’t nearly as important as having
    them in the first place. Forgetting or neglecting to unit test code is an easy
    trap to fall into. Writing tests in parallel, or after the classes they are meant
    to test, makes little difference.


    # Exercises


    1. We created tests for the biggest class libraries in our framework. Now try
    covering some smaller ones, like the `Registry`, `StringMethods`, or `ArrayMethods`
    classes.


    2. The `Test` class we created is a nice tool for running unit tests, but does
    not handle any output formatting. Try putting together a presentable overview
    of passed tests as well as tests that failed or raised exceptions.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Chapter 12


    ## Structure


    We now get to step out of the realm of theory, and into a practical application.
    We used the concept of a social network in some of the examples so far, and now
    we will build one.


    To better plan our application, we need to look at some of the things common to
    most social networks. First and foremost is the concept of user profiles. User
    profiles contain some information about the users they belong to, such as their
    hobbies or country of origin. Depending on the focus of the network, this information
    can be anything ranging from employment history and credentials, to previous vacation
    destinations and favorite bands.


    Social networks also serve as a platform for sharing—links to photos, music tracks,
    and videos are easily shared. If you have something to show off, or want to know
    what your friends are looking at, social networks are the place to be.


    The last area in which these networks can vary is how well they moderate their
    users and the information that is shared. Very exclusive social networks may moderate
    the kinds of things their users share, while others allow users to share (and
    see) anything!


    ## Goals


    - We need to build the pages/actions for users to register, log in, update their
    settings, and view their profiles.

    - Users should be able to view the profiles of others, and befriend them.

    - Users should be able to share status messages and photos, upload their own photos,
    and search for users through a number of different fields.

    - There should be an administration interface through which system administrators
    can review and/or modify information stored in the database.


    Our application will need to store a fair amount of user-related data, and it
    is ideal for testing our database / ORM code. It will also require quite a few
    views, which will allow us to test (and extend) our template parser. The photo-sharing
    functionality allows us to tie into third-party image editing libraries, while
    the link-sharing and friends functionalities allow us to connect to third-party
    web services.


    ## Database


    We can represent the database for our social network as depicted in Figure 12-1.
    Users can have multiple friends, which are essentially other users. They can own
    multiple photos, which can then be shared with their friends. Links and status
    messages can also be shared with their friends. Friends can be added/removed following
    user interaction, and users can also report photos, shared links, and other users
    as inappropriate.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 2](index-196_1.png)


    CHAPTER 12 ■ STRuCTuRE


    Users


    Friends


    Photos


    Status messages +


    shared links/photos


    **Figure 12-1.** Data structure'
