    ```


    To allow a function to modify an argument it must be passed by reference. This
    is done by adding an ampersand before the parameter’s name in the function definition.


    ```

    function myFunc(&$x) { $x .= '' World''; }


    $x = ''Hello'';

    myFunc($x); // reference to x is passed

    echo $x;    // "Hello World"

    ```


    Object variables are also by default passed by value. However, what is actually
    passed is a pointer to the object data, not the data itself. Therefore, changes
    to the object’s members will affect the original object, but replacing the object
    variable with the assignment operator will only create a local variable.


    ```

    class MyClass { public $x = 1; }


    function modifyVal($o)

    {

      $o->x = 5;

      $o = new MyClass(); // new local object

    }


    $o = new MyClass();

    modifyVal($o);        // pointer to object is passed

    echo $o->x;           // "5"

    ```


    In contrast, when an object variable is passed by reference it is not only possible
    to change its properties, but also to replace the entire object and have the change
    propagate back to the original object variable.


    ```

    class MyClass { public $x = 1; }


    function modifyRef(&$o)

    {

      $o->x = 5;

      $o = new MyClass(); // new object

    }


    $o = new MyClass();

    modifyRef($o);        // reference to object is passed

    echo $o->x;           // "1"

    ```


    Return by reference


    A variable can be assigned a reference from a function by having that function
    return by reference. The syntax for returning a reference is to place the ampersand
    before the function name. In contrast to pass by reference, the ampersand is also
    used when calling the function in order to bind the reference.


    ```

    class MyClass

    {

      public $val = 10;


    function &getVal()

      {

        return $this->val;

      }

    }


    $obj = new MyClass();

    $myVal = &$obj->getVal();

    ```


    Bear in mind that references should not be used merely for performance reasons,
    as the PHP engine will take care of such optimizations on its own. Only use references
    when you have a need for reference-type behavior.


