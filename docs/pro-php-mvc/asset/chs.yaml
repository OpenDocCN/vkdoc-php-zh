  \ ORM 库，但我们现在拥有的已经能满足所有需求，没有必要现在就陷入细节。\n\n### 问题\n\n1.  模型只用于处理数据库吗？\n2.  我们创建的\
  \ `Model` 类混合了实例方法和类方法来处理数据库行。为什么我们不统一使用实例方法或类方法来完成所有行的操作？\n\n### 答案\n\n1.  不！模型可以处理各种事情，例如连接到第三方\
  \ API 或修改文件系统信息。模型不等同于 ORM。\n2.  有时，同时处理多行数据在语法上很有吸引力，例如从数据库中获取多行或删除多行。其他操作则涉及单行数据，例如\
  \ `INSERT` 或 `UPDATE` 查询。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  # 第 10 章 模型\n\n### 练习\n\n1.  `Model` 类为我们提供了一些有用的方法，使得数据库开发更容易。还有一些可以添加的便捷方法，例如一个根据给定的\
