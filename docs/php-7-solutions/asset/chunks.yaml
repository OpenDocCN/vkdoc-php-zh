    \ using\n    `pathinfo()` with\n    the `PATHINFO_FILENAME`\n    constant in the\
    \ same way as in PHP Solution 9-5\\. This is stored in the\n    `$basename`\n\
    \    property and will be used to build the thumbnail’s name with the\n    suffix.\n\
    \n5.  The `checkType()`\n    method compares \n    the MIME type with an array\
    \ of acceptable image types. If it\n    finds a match, it stores the type in the\
    \ `$imageType` property\n    and returns `true`. Otherwise, it\n    returns false.\
    \ The method is used internally, so it needs to be declared\n    as protected.\
    \ Add the following code to the class definition:\n\n```\n    protected function\
    \ checkType($mime) {\n    $mimetypes = ['image/jpeg', 'image/png', 'image/gif',\
    \ 'image/webp'];\n    if (in_array($mime, $mimetypes)) {\n    // extract the characters\
    \ after '/'\n    $this->imageType = substr($mime, strpos($mime, '/')+1);\n   \
    \ return true;\n    }\n    return false;\n    }\n    ```\n\nJPEG, PNG, and GIF\
    \ are the only types of image universally supported\n    by browsers; but I have\
    \ included WebP because support is now widespread.\n    All image MIME types begin\
    \ with `image/`. To make the\n    value easier to use later, the `substr()` function\n\
    \    extracts the characters after the slash and stores them in the `$imageType`\
    \ property.\n    When used with two arguments, `substr()` starts at\n    the position\
    \ (counting from 0) specified in the second argument and\n    returns the rest\
    \ of the string. Rather than use a fixed number as the\n    second argument, I\
    \ have used the `strpos()` function to\n    find the position of the slash and\
    \ added 1\\. This makes the code more\n    generic because some proprietary image\
    \ formats begin with `application/` rather\n    than `image/`.\n    The first\
    \ argument to `strpos()` is the\n    entire string you’re searching in, and the\
    \ second is the string you’re\n    searching for.\n\n6.  It’s a good idea to test\
    \ your code as you build the class. Catching\n    errors early is much easier\
    \ than hunting for a problem in a long script.\n    To test the code, create a\
    \ new public method called `test()` inside the\n    class definition.\n\nIt doesn’t\
    \ matter in which order your methods appear inside the class\n    definition,\
    \ but it’s common practice to keep all public methods together\n    after the\
    \ constructor and to put protected methods at the bottom of the\n    file. This\
    \ makes the code easier to maintain.\n\nInsert the following definition between\
    \ the constructor and the `checkType()`\n    definition:\n\n```\n    public function\
    \ test() {\n    $details = \n    File: $this->original\n    Original width: $this->originalwidth\n\
    \    Original height: $this->originalheight\n    Base name: $this->basename\n\
    \    Image type: $this->imageType\n\nEND;\n    // Remove the indentation of the\
    \ preceding line in messages) {\n    print_r($this->messages);\n    }\n    }\n\
    \    ```\n\nThis uses `echo` with heredoc\n    syntax (see “Avoiding the need\
