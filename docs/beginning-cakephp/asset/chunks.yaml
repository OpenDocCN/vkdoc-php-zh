    `app/views/helpers` directory. The file name convention is just like components,
    and they carry the `.php` extension. When naming the helper class object, the
    following syntax is used: `class SpecialHelper extends Helper {`


    Like controllers and components, the name of the helper class is camel case and
    includes the word `Helper`, and the class is an extension of the object class
    `Helper`. For example, if you were to create a custom helper for e-mailing customers,
    you might create the `app/views/helpers/email.php` file and name its class:


    ```php

    class EmailHelper extends Helper {

    ```


    ## Elements


    An element contains presentation output that can be pulled into multiple view
    files. Anything contained in the element will be displayed in the view depending
    on where in the view’s markup the element is called. Variables can be passed to
    elements and displayed like how the controller sends variables to views.


    Elements are named like controller actions and view files and are stored in the
    `app/views/elements` directory. For instance, a menu bar could be maintained in
    an element named `menu.ctp` and called in any of the views. Then, should you need
    to change a menu item or a link in the menu, rather than change it for every view
    in the application, you would need to edit only the `menu.ctp` file.


    Helpers and elements differ in that helpers work with view logic, whereas elements
    are more like chunks of HTML that repeat throughout the views. A menu bar would
    likely require less logic (maybe a couple of variables) and would not contain
    a series of functions to be rendered. As an element, the menu bar would work well
    because multiple views would need to use it. Creating pie charts or graphs, however,
    would require several processes and more logic and therefore would be better suited
    as a helper than as an element.


    ## Layouts


    Many web sites maintain the same overall design from page to page with only specific
    areas changing content depending on the page. Rather than store in each view file
    this overall design, you can create a layout file to be used by the entire application
    or one controller action at a time.


    *Layouts* are stored in the `app/views/layouts` directory and contain presentation
    output like views and elements. They perform minimal logic and mainly serve to
    wrap HTML around changing views. A layout’s file name can be anything but must
    be lowercase and have the `.ctp` extension.


    ## Behaviors


    When interacting with the database, sometimes the model will need to perform more
    complex processes than simply adding, updating, or deleting records. In some applications,
    deleting a record will require performing other manipulations to other tables
    and records, and so on, with other database operations. Cake resolves this issue
    with *behaviors*, which are classes that may be called by models when performing
    model functions.


    Behaviors are stored in the `app/models/behaviors` directory and can be named
    anything following the same rules for naming helper files and components. They
    must have the `.php` extension. In the file, behavior class names are set with
    the following syntax: `class SpecialBehavior extends ModelBehavior {`


    By using behaviors to store complex or customized model operations, you give the
    application’s models more consistency.


    ## DataSource


    In this book I’ve stuck with MySQL as the main choice for database handling because
    it is often bundled with PHP. Many applications, however, need to store data in
    other sources. From PostgreSQL to a customized database engine, Cake is fully
    capable of handling other data sources. Even creating web services and talking
    with enterprise APIs such as Facebook or eBay can be handled in Cake. These types
    of operations are handled with *DataSources*, or, in other words, files that execute
    functions that talk with a source that stores or supplies data to the application.


    The DataSource abstracts the sending, retrieving, saving, and deleting data to
    the model so that the model really behaves the same regardless of what external
    source processes the data. Cake comes preinstalled with the following datasources,
    so you won’t have to write from scratch your own if you intend to use one of these
    to handle your application’s data:


    - MySQL

    - PostgreSQL

    - IBM DB2

    - Microsoft SQL Server 2000

    - Oracle 8

    - SQLite

    - ADOdb


    When creating custom DataSource, make sure the file name is lowercase and has
    `_source.php` appended. An XML DataSource could be named, for example, `xml_source.php`
    and would be placed in the `app/models/datasources` directory. Naming the class
    object in the DataSource file (in this case, for the XML DataSource) is done with
    the following syntax:


    ```php

    class XmlSource extends DataSource {

    ```


    When retrieving or saving data to a source outside your main database configuration
    source, DataSources can handle all the back-and-forth processing so that the model
    functions don’t have to handle connection or request parameters unique to the
    DataSource.


    ## Best Practices


    Naming conventions in Cake do have specific rules that make it possible for Cake
    to assemble the various pieces of the application without too much code. Remember
    the saying “Just because you can doesn’t mean you should” when naming files and
    database tables. The following are some suggestions for best practices when trying
    to decide upon names for elements of the application.


    ### Keep File Names from Conflicting with Cake Resources


    Avoid naming tables in the database that might conflict with a name of a Cake
    framework element. An example might be naming a table `views` or `controllers`.
    Other conflicting names include class objects in Cake’s libraries such as `pages`
    or `files`. Find a suitable name that can mean something similar such as `records`
    or `images`, or use underscores to add another word to the title such as `web_pages`
    or `plain_text_files`, and this will spare you the trouble of confusing Cake’s
    dispatcher or confusing other developers who might work with your application.
    Sometimes when looking for help in the Cake community, it will be useful to give
    specifics. If your names overlap with other Cake objects, you may be asked to
    clarify.


    ### Use Routes Rather Than Controllers


    Some developers create a controller to handle logic alone without connecting it
    to a database table. They might name a controller `cart` or `blog` to create a
    separate wing of the application. Or they manipulate the names of their controllers
    for the sake of friendly URLs. In Cake, controllers are best suited for linking
    up with specific database tables. For example, you may want to build a blog that
    has a URL structure that goes something like this:


    [http://localhost/blog/view/5/sep/2008](http://localhost/blog/view/5/sep/2008)


    So, how is this URL possible when there is no table named `view` in the database
    and the controller must match up with a database table?


