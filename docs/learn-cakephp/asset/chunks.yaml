    I love to code for the Web, but I don’t like hunting for bugs I’ve made myself.
    And I hate—I mean really hate—hunting for bugs made by other people.


    Most of the time, our code depends on other people. We use frameworks, utilities,
    and objects created and maintained by others. All thid-party code falls into this
    category. As web developers, all of us upgrade our code to implement new features,
    to fix bugs, or to make our creations compatible with new server versions. Any
    upgrades could introduce new behaviors, new interfaces, and certainly new bugs.
    Whether you work alone or as a member of a team, we all depend on one another’s
    code.


    Writing code is not like writing a letter to grandma. Actually, writing code is
    not writing at all. If we spend enough time planning, and if the requirements
    are clear and don’t change during development, writing code could be something
    like writing a letter. But in reality it’s something else. When we write code,
    we first write one small part, then check it, modify it, check it again, write
    something else connected to the first part, check that also, check the first part
    again, and, when it fails, modify it again, check it again, and on and on. Sound
    familiar?


    Do you repeatedly push the Refresh button of your favorite browser to check the
    output, just because you wrote two lines of code? Are you bored of filling the
    same form a hundred times with different inputs to check how it will be processed
    on the server side? Are `var_dump` and `debug()` your best friends? Does everything
    work fine in development but after installation nothing happens? Or worse, are
    there just a few things not working in the production environment, but you have
    no idea why not? Or maybe you just want to learn a new approach that will give
    you better, simpler, and more maintainable code. Maybe you’re looking for something
    that will help you identify bugs and save time. If so, keep reading.


    About the Book


    I wrote this book for the following audiences: people who have programming skills
    and want to improve the quality of their code, people who have heard about unit
    testing but are still not clear what it is or how it works, people who love CakePHP
    and want to take advantage of what it offers, and people who have spent a lot
    of time searching for bugs after a third-party upgrade.


    The examples in this book use CakePHP, but the first half of the book is not framework-
    or language-specific. I hope unit testing and the ideas presented in this book
    will help you as much as they’ve helped me.'
