- fmt: '### Design Goals for Collection Pages


    Good collection pages should achieve three key design goals:


    - Present users with a clear overview of the products contained in the current
    collection, or matched by any current filter.

    - Provide users with sufficient product information to let them decide whether
    they’re interested in a particular product.

    - Provide users with accessible navigation and filtering tools so that they can
    refine the list of products to more closely match what they’re interested in.


    Collection pages are often treated as “stepping stones” between a customer’s initial
    arrival on a site and their visit to the product page, where they add a product
    to the cart and continue through to purchase. However, their role in helping customers
    choose the products they’re interested in through visual and information comparison
    shouldn’t be understated.


    As collections in Shopify can be associated with their own images and text content,
    collection pages can also perform an important role in a store’s SEO by providing
    content targeting the types of keywords customers may be searching for (see Figure
    [6-7](#A437216_1_En_6_Chapter.html#Fig7)). For certain types of stores, collection
    pages can be even more important, as it’s expected that customers get enough information
    to add items to their cart directly without visiting the product page itself (see
    Figure [6-8](#A437216_1_En_6_Chapter.html#Fig8)).


    ![A437216_1_En_6_Fig8_HTML.jpg](A437216_1_En_6_Fig8_HTML.jpg)


    Figure 6-8


    Youfoodz expects customers to add individual products (meals) to their cart directly
    from the Lunch & Dinner collection page. Note that they’ve provided an affordance
    for that in the shape of a “plus” button under each meal and that customers can
    still drill down into individual meals for further information if required to
    make a purchase decision


    ![A437216_1_En_6_Fig7_HTML.jpg](A437216_1_En_6_Fig7_HTML.jpg)


    Figure 6-7


    The New York Times “Best Sellers” collection includes some collection-specific
    text content to provide customers with contextual information about the collection
    they are viewing and to help search engines direct searches like “New York Times
    Best Sellers” straight to this page


    I’ll spend a bit more time discussing these design goals later in this chapter
    as we walk through the implementation of each feature on the collection page.


    ### Shopify Collection Page Concepts


    Before we can jump in and start implementing a collection page to achieve these
    design goals, it’s important to get an overview of some key theme collection concepts
    and understand how Shopify expects products to be categorized and navigated.


    #### Categorization in Shopify


    It’s common for Ecommerce systems outside of Shopify to have a “nested category”
    structure, with products being assigned to one or more categories that could exist
    at multiple levels of hierarchy. Shopify’s hierarchy is much flatter—products
    can have membership in zero or more collections, with no inherent notion of sub-categorization.
    There are two types of collections—Manual collections (also known as Custom collections),
    where storeowners manually assign product membership, and Smart collections, where
    membership is determined by a set of rules (e.g., “Products with the type ‘Shirts’”).


    Further product categorization can be achieved through product tags (discussed
    shortly under “Filtering”). I’ve seen plenty of attempts at squeezing a more complex
    categorization structure into Shopify themes using nested Navigation lists or
    collections linked through handle and tag names, but in general I think it’s best
    to stick with the fundamental Shopify concepts. If a merchant has a product range
    that requires a more complex categorization approach, it’s probably worthwhile
    investigating a purpose-built search and filtering application, plenty of which
    exist on the Shopify app store.


    #### Filtering


    As hinted at, Shopify allows us to further refine products displayed in a collection
    via the use of product tags. A merchant can apply any number of tags to a product
    from the Shopify admin, and appending the tag name to the URL of a collections
    page will limit the displayed products to those that have the appropriate tag.


    For example, navigating to `/collections/shirts/blue` on a Shopify store would
    display all products in the “Shirts” collection that are tagged with “Blue”. Common
    uses for tags include colors, sizes, gender, product types, “on sale” or “limited
    stock” flags, and many more.


    While you can filter on multiple tags (e.g., `/collections/shirts/blue+large`),
    it’s important to note that filtering is applied in a conjunctive fashion (in
    the example, that means only products that are tagged with “Blue” and “Large”
    will be displayed). There’s no way to apply a range filter (e.g., “Price between
    $100 and $200”) or disjunctive logic (e.g., “Blue” or “Red”) using tags.


    #### Sorting


    Shopify provides several common attributes you can sort a displayed collection
    by (“A-Z”, “Z-A”, “Price: Low to High”, “Price: High to Low”, “Best selling”,
    etc.). The desired sort order can be passed in the URL via a `sort_by` query parameter—e.g.,
    `/collections/shirts?sort_by=price-ascending`.


    Merchants can set the default sort order of products in a collection from the
    Shopify Admin, but there’s currently no way to define a custom sort attribute
    without the use of a third-party application.


    #### Pagination


    Shopify also supports a `page` query parameter in the collection URL (`/collections/shirts?page=3`).
    To make use of pagination, you’ll need to wrap the Liquid code looping over products
    in your collection with the `{% paginate %}` tag, as you’ll see shortly.


    Shopify currently has an upper limit of 50 products per page when paginating collections.


    #### Views


    As with product templates, we can also create alternate product templates for
    our collection pages and swap between them with the use of a `view` query parameter
    (refer to “Creating Alternate Page Templates” in Chapter [5](#A437216_1_En_5_Chapter.html)
    for a refresher on how this works).


    In the context of collection pages, alternate templates can be useful in allowing
    customers to swap between different views of a collection (e.g., a list versus
    a grid view). I’ll cover when and why you may want to do this during the implementation
    phase, coming up shortly.


    #### Putting It All Together


    Figure [6-9](#A437216_1_En_6_Chapter.html#Fig9) combines all of these collection
    URL parameters into one and shows the role of each.


    ![A437216_1_En_6_Fig9_HTML.jpg](A437216_1_En_6_Fig9_HTML.jpg)


    Figure 6-9


    A breakdown of the options available when generating collection URLs


    The implementation of a collection page therefore becomes an exercise in (a) displaying
    a list of products in the most useful way possible to the user, and (b) providing
    a simple user interface for users to navigate through the product range via the
    generation and manipulation of the collection URL.


    ### Implementing a Collection Page


    Just as the product template lives at `templates/product.liquid`, the template
    Shopify uses to render collection pages sits at `templates/collection.liquid`,
    which is the focus of the rest of the chapter. As with the product and home pages,
    the starting point will be a “prototypical” collection page layout, as shown in
    Figure [6-10](#A437216_1_En_6_Chapter.html#Fig10).


    ![A437216_1_En_6_Fig10_HTML.jpg](A437216_1_En_6_Fig10_HTML.jpg)


    Figure 6-10


    A mockup showing the collection page layout we’ll aim for in this example theme


    As you can see, we’ll be aiming to implement all of the key pieces of collection
    page functionality discussed earlier—sorting, support for alternate view styles,
    category-level filtering, tag-level filtering, and pagination. Let’s get started!'
