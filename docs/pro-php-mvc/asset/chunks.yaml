    Step 3


    Next, we need to install the Memcached server that will run in OS X. Do this by
    downloading


    [http://topfunky.net/svn/shovel/memcached/install-memcached.sh](http://www.topfunky.net/svn/shovel/memcached/install-memcached)
    to a local directory (such as ~/Desktop) and executing it with the following commands:


    • chmod 744 install-memcached.sh


    • sudo ./install-memcached.sh


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 27](index-453_1.png)


    appendix a ■ Setting Up a Web Server


    ■ **Note** if the script did not execute correctly, you probably do not have xcode
    tools installed. download them from


    [http://developer.apple.com/technologies/tools/.](http://www.developer.apple.com/technologies/tools)


    You can tell Memcached to run as a daemon by typing memcached –d in terminal.


