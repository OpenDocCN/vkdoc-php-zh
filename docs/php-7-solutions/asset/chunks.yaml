  trans: "\n3.  要显示所有缩略图，你需要将表格单元格包裹在一个循环中。在关于重复行的 HTML 注释后插入一个新行，并创建一个`do... while`循环的前半部分，如下所示（有关不同类型循环的详细信息，请参见第\
    \ 4 章）：\n\n4.  结果集中第一条记录的详细信息已经获取，因此获取后续记录的代码需要放在结束的`</td>`标签之后。在结束的`</td>`和`</tr>`标签之间留出一些空间，并插入以下代码。对于不同的数据库连接方法，代码略有不同。\n\
    \n    对于 MySQLi，请使用以下代码：\n\n    ```\n    <?php $row = $result->fetch_assoc());\
    \ ?>\n    ```\n\n    对于 PDO，请使用以下代码：\n\n    ```\n    <?php $row = $result->fetch());\
    \ ?>\n    ```\n\n    这会获取结果集中的下一行，并将循环送回顶部。由于`$row['filename']`和`$row['caption']`的值不同，下一个缩略图及其关联的`alt`文本将被插入到一个新的表格单元格中。查询字符串也会用新的文件名进行更新。\n\
    \n5.  保存页面并在浏览器中测试。现在你应该能看到所有八个缩略图在画廊顶部排成一行，如下面的截图所示。\n\n    ![../images/332054_4_En_14_Chapter/332054_4_En_14_Figb_HTML.jpg](img/332054_4_En_14_Figb_HTML.jpg)\n\
    \n    将鼠标指针悬停在每个缩略图上，你应该能看到查询字符串显示文件名。你可以对照`gallery_mysqli_04.php`或`gallery_pdo_04.php`检查你的代码。\n\
    \n6.  点击缩略图仍然没有任何反应，因此你需要创建改变主图像及其关联说明文的逻辑。在`DOCTYPE`声明上方的代码块中找到以下代码段：\n\n   \
    \ ```\n    // 获取主图像的文件名和说明文\n    $mainImage = safe($row['filename']);\n    $caption\
    \ = safe($row['caption']);\n    ```\n\n    高亮定义`$caption`的那一行并将其剪切到剪贴板。将另一行包裹在如下条件语句中：\n\
    \n    ```\n    // 获取主图像的文件名\n    if (isset($_GET['image'])) {\n        $mainImage\
    \ = safe($_GET['image']);\n    } else {\n        $mainImage = safe($row['filename']);\n\
    \    }\n    ```\n\n    `$_GET`数组包含通过查询字符串传递的值，因此如果设置了（定义了）`$_GET['image']`，它会从查询字符串中获取文件名并将其存储为`$mainImage`。如果`$_GET['image']`不存在，则像之前一样从结果集中的第一条记录中获取值。\n\
    \n7.  最后，你需要获取主图像的说明文。它不再每次都相同，因此你需要将其移动到`thumbs`表中显示缩略图的循环中。它应紧跟在循环的左花括号之后（大约第\
    \ 48 行）。将光标定位在花括号之后并插入几行，然后粘贴你在上一步中剪切的说明文定义。你需要让说明文与主图像匹配，因此如果当前记录的文件名与`$mainImage`相同，那就是你要找的。将刚刚粘贴的代码包裹在如下条件语句中：\n\
    \n8.  保存页面并在浏览器中重新加载。这次，当你点击一个缩略图时，主图像和说明文将会改变。不用担心某些图像和说明文被页脚遮挡。当缩略图移动到主图像的左侧时，这种情况会自动修正。\n\
    \n    **注意** 像这样通过查询字符串传递信息是使用 PHP 和数据库结果的一个重要方面。虽然表单信息通常通过`$_POST`数组传递，但`$_GET`数组经常用于传递你想要显示、更新或删除的记录详情。它也常用于搜索，因为查询字符串可以轻松地添加书签。\n\
    \n9.  在这种情况下没有 SQL 注入的危险。但是，如果有人改变了通过查询字符串传递的文件名的值，并且`display_errors`处于开启状态，那么在找不到图像时你将会看到难看的错误消息。在调用`getimagesize()`之前，让我们先检查图像是否存在。将其包裹在如下条件语句中：\n\
    \n    ```\n    if (file_exists('images/'.$mainImage)) {\n        // 获取主图像的尺寸\n\
    \        $imageSize = getimagesize('images/'.$mainImage)[3];\n    } else {\n \
    \       $error = 'Image not found.';\n    }\n    ```\n\n10. 尝试将查询字符串中`image`的值改为除存在文件之外的任何值。当你加载页面时，应该会看到`Image\
    \ not found`。\n\n    如有必要，请对照`gallery_mysqli_05.php`或`gallery_pdo_05.php`检查你的代码。\n\
    \n## 创建多列表格\n\n只有八张图像时，画廊顶部单行缩略图的显示效果还不算太差。然而，能够通过使用一个循环动态构建表格是非常有用的，该循环在移动到下一行之前，会在当前行中插入指定数量的表格单元格。这是通过记录已经插入了多少个单元格来实现的。当一行达到限制时，代码需要为当前行插入一个结束标签，并且如果还有更多缩略图，还需要为下一行插入一个开始标签。使其易于实现的是取模运算符`%`，它返回除法的余数。\n\
    \n其工作原理如下。假设每行需要两个单元格。插入第一个单元格后，计数器设置为`1`。如果用取模运算符将`1`除以`2`（`1 % 2`），结果是`1`。当插入下一个单元格时，计数器增加到`2`。`2\
    \ % 2`的结果是`0`。下一个单元格产生这个计算：`3 % 2`，结果是`1`；但第四个单元格产生`4 % 2`，结果又是`0`。因此，每次计算结果为`0`时，你就知道——更准确地说，PHP\
    \ 知道——到达了一行的末尾。\n\n那么，如何知道是否还有剩余的行呢？通过将插入关闭和开启`<tr>`标签的代码放在循环的顶部，必须始终至少剩下一张图像。然而，循环第一次运行时，余数也是`0`，所以问题在于你需要等到至少显示了一张图像后才能插入这些标签。呼……让我们试一试。\n\
    \n## PHP 解法 14-3：水平和垂直循环\n\n这个 PHP 解法展示了如何控制循环，以便在表格中显示特定数量的列。列数通过设置一个常量来控制。继续使用上一节中的文件。或者，使用`gallery_mysqli_05.php`或`gallery_pdo_05.php`。\n\
    \n1.  你可能会在稍后阶段决定改变表格中的列数，因此在脚本顶部创建一个常量是个好主意，这样便于查找，而不是将数字深埋在代码中。在创建数据库连接之前插入以下代码：\n\
    \n    ```\n    // 定义表格中的列数\n    define('COLS', 2);\n    ```\n\n    **常量**与变量类似，不同之处在于其值不能被脚本的其他部分更改。你可以通过`define()`函数创建常量，该函数接受两个参数：常量的名称（例如`COLS`）和它的值。按照惯例，常量总是大写且区分大小写。与变量不同，它们不以美元符号开头。\n\
    \n2.  你需要在循环外部初始化单元格计数器。同时创建一个指示是否为第一行的变量。在你刚刚定义的常量之后立即添加以下代码：\n\n    ```\n  \
    \  define('COLS', 2);\n    // 初始化水平循环的变量\n    $pos = 0;\n    $firstRow = true;\n\
    \    ```\n"
- fmt: "### 3. The code that keeps count of the columns goes inside the PHP block\
    \ at the start of the loop that displays the thumbnails. Amend the code like this:\n\
    \n```\n    ';\n    }\n    // once loop begins, this is no longer true\n    $firstRow\
    \ = false;\n    ?>\n```\n\nBecause the increment operator (`++`) is placed after\
    \ `$pos`, its value is divided by the number of columns before being incremented\
    \ by `1`. The first time the loop runs, the remainder is `0`, but `$firstRow`\
    \ is `true`, so the conditional statement fails. However, `$firstRow` is reset\
    \ to `false` after the conditional statement. On future iterations of the loop,\
    \ the conditional statement closes the current table row and starts a new one\
    \ each time the remainder is `0`.\n\n### 4. If there are no more records, you\
    \ need to check if you have an incomplete row at the bottom of the table. Add\
    \ a `while` loop after the existing `do...while` loop. In the MySQLi version,\
    \ it looks like this:\n\n```\n    fetch_assoc());\n    while ($pos++ % COLS) {\n\
    \        echo '&nbsp;';\n    }\n    ?>\n```\n\nThe new code is identical in the\
    \ PDO version. The only difference is that the preceding line uses `$result->fetch()`\
    \ instead of `$result->fetch_assoc()`.\n\nThe second loop continues incrementing\
    \ `$pos` while `$pos++ % COLS` produces a remainder (which is interpreted as `true`)\
    \ and inserts an empty cell.\n\n**Caution** This second loop is not nested inside\
    \ the first. It runs only after the first loop has ended.\n\n### 5. Save the page\
    \ and reload it in a browser. The single row of thumbnails across the top of the\
    \ gallery should now be neatly lined up two by two, as shown in Figure [14-4](#332054_4_En_14_Chapter.xhtml#Fig4).\n\
    \n![../images/332054_4_En_14_Chapter/332054_4_En_14_Fig4_HTML.jpg](images/332054_4_En_14_Chapter/332054_4_En_14_Fig4_HTML.jpg)\n\
    \n**Figure 14-4.** The thumbnails are now in neat columns\n\nTry changing the\
    \ value of `COLS` and reloading the page. The main image will be displaced because\
    \ the page has been designed for only two columns, but you can see how easy it\
    \ is to control the number of cells in each row by changing just one number. You\
    \ can check your code against `gallery_mysqli_06.php` or `gallery_pdo_06.php`.\n\
    \n## Paging Through a Long Set of Records\n\nThe grid of eight thumbnails fits\
    \ quite comfortably in the gallery, but what if you have 28 or 48? The answer\
    \ is to limit the number of results displayed on each page and then build a navigation\
    \ system that lets you page back and forth through the results. You’ve seen this\
    \ technique countless times when using a search engine; now you’re going to learn\
    \ how to build it yourself. The task can be broken down into the following two\
    \ stages:\n\n1.  Selecting a subset of records to display\n2.  Creating the navigation\
    \ links to page through the subsets\n\nBoth stages are relatively easy to implement,\
    \ although they involve applying a little conditional logic. Keep a cool head,\
    \ and you’ll breeze through it.\n\n## Selecting a Subset of Records\n\nLimiting\
    \ the number of results on a page is simple—just add the `LIMIT` keyword to the\
    \ SQL query like this:\n\n```\nSELECT filename, caption FROM images LIMIT startPosition,\
    \ maximum\n```\n\nThe `LIMIT` keyword can be followed by one or two numbers. If\
    \ you use just one number, it sets the maximum number of records to be retrieved.\
    \ That’s useful, but it’s not suitable for a paging system. For that, you need\
    \ to use two numbers: the first indicates which record to start from, and the\
    \ second stipulates the maximum number of records to be retrieved. MySQL counts\
    \ records from 0, so to display the first six images, you need the following SQL:\n\
    \n```\nSELECT filename, caption FROM images LIMIT 0, 6\n```\n\nTo show the next\
    \ set, the SQL needs to change to this:\n\n```\nSELECT filename, caption FROM\
    \ images LIMIT 6, 6\n```\n\nThere are only eight records in the `images` table,\
    \ but the second number is only a maximum, so this retrieves records 7 and 8.\n\
    \nTo build the navigation system, you need a way of generating these numbers.\
    \ The second number never changes, so let’s define a constant called `SHOWMAX`.\
    \ Generating the first number (call it `$startRecord`) is pretty easy, too. Start\
    \ numbering the pages from 0, and multiply the second number by the current page\
    \ number. So, if you call the current page `$curPage`, the formula looks like\
    \ this:\n\n```\n$startRecord = $curPage * SHOWMAX;\n```\n\nAnd for the SQL, it\
    \ becomes this:\n\n```\nSELECT filename, caption FROM images LIMIT $startRecord,\
    \ SHOWMAX\n```\n\nIf `$curPage` is 0, `$startRecord` is also 0 (0 × 6), but when\
    \ `$curPage` increases to 1, `$startRecord` changes to 6 (1 × 6), and so on.\n\
    \nSince there are only eight records in the `images` table, you need a way of\
    \ finding out the total number of records so as to prevent the navigation system\
    \ from retrieving empty result sets. In the last chapter, you used the MySQLi\
    \ `num_rows` property, and `rowCount()` in PDO. However, that won’t work this\
    \ time, because you want to know the total number of records, not how many there\
    \ are in the *current* result set. The answer is to use the SQL `COUNT()` function\
    \ like this:\n\n```\nSELECT COUNT(*) FROM images\n```\n\nWhen used like this in\
    \ combination with an asterisk, `COUNT()` gets the total number of records in\
    \ the table. So, to build a navigation system, you need to run both SQL queries:\
    \ one to find the total number of records, and the other to retrieve the required\
    \ subset. These are simple queries, so the result is almost instantaneous.\n\n\
    I’ll deal with the navigation links later. Let’s begin by limiting the number\
    \ of thumbnails on the first page.\n\n## PHP Solution 14-4: Displaying a Subset\
    \ of Records\n\nThis PHP solution shows how to select a subset of records in preparation\
    \ for creating a navigation system that pages through a longer set. It also demonstrates\
    \ how to display the numbers of the current selection, as well as the total number\
    \ of records.\n\nContinue working with the same file as before. Alternatively,\
    \ use `gallery_mysqli_06.php` or `gallery_pdo_06.php`.\n\n### 1. Define `SHOWMAX`\
    \ and the SQL query to find the total number of records in the table. Amend the\
    \ code toward the top of the page like this (new code is shown in bold):\n\n```\n\
    \    // initialize variables for the horizontal looper\n    $pos = 0;\n    $firstRow\
    \ = true;\n    // set maximum number of records\n    define('SHOWMAX', 6);\n \
    \   $conn = dbConnect('read');\n    // prepare SQL to get total records\n    $getTotal\
    \ = 'SELECT COUNT(*) FROM images';\n```\n\n### 2. You now need to run the new\
    \ SQL query. The code goes immediately after the code in the preceding step but\
    \ differs according to the type of MySQL connection. For MySQLi, use this:\n\n\
    ```\n    // submit query and store result as $totalPix\n    $total = $conn->query($getTotal);\n\
    \    $totalPix = $total->fetch_row()[0];\n```\n\nThis submits the query and then\
    \ uses the `fetch_row()` method, which gets a single row from a `MySQLi_Result`\
    \ object as an indexed array. There’s only one column in the result, so we can\
    \ get the total count of records in the `images` table using array dereferencing\
    \ by adding `[0]` in square brackets after the call to `fetch_row()`.\n\nFor PDO,\
    \ use this:\n\n```\n    // submit query and store result as $totalPix\n    $total\
    \ = $conn->query($getTotal);\n    $totalPix = $total->fetchColumn();\n```\n\n\
    This submits the query and then uses `fetchColumn()` to get a single result, which\
    \ is stored in `$totalPix`.\n\n### 3. Next, set the value of `$curPage`. The navigation\
    \ links that you’ll create later will pass the value of the required page through\
    \ a query string, so you need to check whether `curPage` is in the `$_GET` array.\
    \ If it is, use that value, but make sure it’s an integer by preceding it with\
    \ the `(int)` casting operator. Otherwise, set the current page to 0. Insert the\
    \ following code immediately after the code in the previous step:"
