- fmt: '*Caution*：以零开头的整数被视为八进制数。例如，`08` 会因为不是有效的八进制数而产生解析错误。另一方面，在浮点数中使用前导零是没有问题的，比如
    `0.8`。


    - **String**：字符串是任意长度的文本。它可以短至零个字符（空字符串），并且在 64 位构建的 PHP 7 中没有上限。实际上，其他因素（例如可用内存或通过表单传递值）会施加限制。

    - **Boolean**：此类型只有两个值，`true` 或 `false`。然而，PHP 会将其他值隐式视为 true 或 false。请参阅本章后面的“PHP
    中的真值判定”。

    - **Array**：数组是一种能够存储多个值的变量，尽管它也可以不包含任何值（空数组）。数组可以保存任何数据类型，包括其他数组。数组的数组称为**多维数组**。

    - **Object**：对象是一种能够存储和操作值的复杂数据类型。您将在第 [7](#332054_4_En_7_Chapter.xhtml) 章中了解更多关于对象的内容。

    - **Resource**：当 PHP 连接到外部数据源（例如文件或数据库）时，它会将对它的引用存储为资源。

    - **Null**：这是一种特殊的数据类型，表示变量的值不存在。


    *注意*：PHP 在线文档列出了另外两种类型，它们描述的是结构的行为，而不是数据的类型。**iterable** 是一种可以在循环中使用的结构（例如数组），通常用于在每次循环运行时提取或生成序列中的下一个值。**callable**
    是一个由另一个函数调用的函数。


    PHP 弱类型的一个重要副作用是：如果您将整数或浮点数用引号括起来，PHP 会自动将其从字符串转换为数字，从而允许您执行计算而无需任何特殊处理。这可能会产生意想不到的后果。当
    PHP 看到加号（`+`）时，它会假定您想要进行加法运算，因此会尝试将字符串转换为整数或浮点数，如下例所示（代码位于 `ch04` 文件夹中的 `data_conversion_01.php`）：


    ```

    $fruit = ''2 apples '';

    $veg = ''2 carrots'';

    echo $fruit + $veg;  // 显示 4

    ```


    PHP 发现 `$fruit` 和 `$veg` 都以数字开头，因此它会提取数字并忽略其余部分。然而，如果字符串不是以数字开头，PHP 会将其转换为 0，如下例所示（代码位于
    `data_conversion_02.php`）：


    ```

    $fruit = ''2 apples '';

    $veg = ''and 2 carrots'';

    echo $fruit + $veg;  // 显示 2

    ```


    *注意*：自 PHP 7.1 起，前面两个例子会触发关于“非良好格式的数值”或“非数值”的错误消息。尽管自动转换仍然有效，但这些错误消息旨在阻止这类代码。单独用引号括起来的数字则没有问题。


    ## 检查变量的数据类型


    在测试脚本时，检查变量的数据类型通常很有用。这有助于解释脚本产生意外结果的原因。要检查变量的数据类型和内容，只需将其传递给 `var_dump()` 函数，如下所示：


    ```

    var_dump($variable_to_test);

    ```


    在本章的文件中使用 `data_tests.php` 可以查看 `var_dump()` 对不同类型数据生成的输出。只需更改最后一行括号内的变量名即可。


    ## 显式更改变量的数据类型


    大多数情况下，PHP 会自动将变量的数据类型转换为适合当前上下文的类型。这被称为**类型转换**。然而，有时需要使用**转换运算符**显式更改数据类型。表
    4-1 列出了 PHP 中最常用的转换运算符。


