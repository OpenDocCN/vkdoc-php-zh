  \n图 4-6. 购物车为空时看到的消息\n\n## 使用 AJAX 在站点页眉中显示购物车数量\n\n站点的页眉看起来很棒（见图 4-5），但电子商务网站所需的某些功能仍然缺失。首先，购物车中商品的数量，即如果访客在购物车中选择了一个产品，页眉中的购物车图标旁边应显示一个数值\
  \ `1`，以表示购物车中有一件商品。当用户向购物车中添加更多商品或从中移除商品时，该数值应持续更新。页眉中缺少的第二件事是已登录用户的电子邮件地址。也就是说，如果用户已登录站点，购物车图标上方的“登录”链接应显示一条欢迎消息，并附上访客的电子邮件地址。您现在将学习如何添加这两项功能。\n\
  \n为了在站点页眉中显示购物车中选中的商品数量以及访客信息，您将使用 AJAX。\n\nAJAX 代表异步 JavaScript 和 XML（Asynchronous\
  \ JavaScript and XML）。它是一个用于创建动态且高度响应式网页的总称。通常，在 Web 应用程序中，无法局部更新网页。例如，当用户从服务器上的数据库中请求某些信息时，整个网页都会被刷新以显示获取到的信息。也就是说，即使获取到的信息只需显示在网页的一个小区域中，整个页面也会被重新加载。借助\
  \ AJAX，只有负责显示获取信息的区域会被刷新，这使得其具有高度响应性。\n\n其次，使用 AJAX，数据可以在后台发送到服务器并从服务器访问。这使得显示响应速度更快。\n\
  \nAJAX 分别使用 `XMLHttpRequest` 对象和 JavaScript 与服务器通信以及在网页上显示数据。\n\n> **注意**\n> \n\
  > 由于往返过程，网页在显示用户期望的结果时通常有点慢。往返过程是指从客户端发出请求到服务器生成响应所花费的时间。所需信息的请求从客户端发送到 Web 服务器。Web\
  \ 服务器作为回应，从数据库访问所需信息或根据需要处理该信息，并将其发送回客户端。客户端重新加载整个网页以显示服务器的响应。即使服务器的响应应该显示在网页的一个小区域中，整个网页也会被刷新。而在\
  \ AJAX 中，可以刷新网页的一个小区域，从而使其在交付结果方面快得多。\n\n为了显示购物车中选中的商品数量以及访客的电子邮件地址，现有的 `topmenu.php`\
  \ 脚本被修改为如清单 4-3 所示。请注意，只有粗体显示的代码是新增的。\n\n**清单 4-3. `topmenu.php` 脚本显示站点页眉，指示购物车内容和用户的登录状态**\n\
