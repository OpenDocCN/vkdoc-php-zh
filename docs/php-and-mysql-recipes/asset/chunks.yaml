  raw: 'The most basic use is as a callback function. This is used as a parameter
    to another function that will execute the callback one or more times. By using
    an anonymous function this function will only be available within the scope of
    the function that is called.


    Another use are functions that can exist for a short amount of time and be redefined
    as needed. This is done by creating a variable and assigning it a function value
    $a = function($b) {}; How it Works


    Let’s first look at the use as a callback function. PHP has a number of building
    functions that takes a callback as a parameter. The function usort() is one of
    these. This function is designed to take a user-defined function and use it to
    sort an array.


    CHAPTER 11 ■ FUNCTIONS


    Before closures were introduced the usort function would be used like this:


    <?php


    // 11_14.php


    function compare($a, $b) {


    if ($a == $b) {


    return 0;


    }


    return ($a < $b) ? -1 : 1;


    }


    $arr = [1, 9, 3, 1, 5, 7, 4];


    usort($arr, ''compare'');


    print_r($arr);


    With the introduction of the ‘spaceship’ operator (<=>) in PHP 7.0 and the use
    of closures it’s possible to write this same code a bit simpler.


    <?php


    // 11_15.php


    $arr = [1, 9, 3, 1, 5, 7, 4];


    usort($arr, function($a, $b) { return $a <=> $b; });


    print_r($arr);


    The spaceship operator will compare the two values on each side and return -1
    if the left side is smaller than the right side, 0 if the two sides have the same
    value, and 1 if the right side is smaller than the left.


    The anonymous function will only exist in memory as long as the usort() function
    is running and it is not callable when the function ends.


    The combination of anonymous functions and variable functions can be used to modify
    functions based on logic or other criteria during execution. In the next example
    we create an anonymous function to calculate the profit on sales. It is decided
    to give the customers who shop on Wednesdays a small discount.


    Instead of checking the day of the week for all transactions we can make the check
    once and define the function to do the calculation.


    <?php


    // 11_16.php


    if (date(''w'') == 3) {


    $profit = function($p) {


    return $p * 1.25;


    };


    }


    else {


    $profit = function($p) {


    return $p * 1.30;


    };


    }


    // read all transactions from the database


    foreach($transaction as $t) {


    $p = $profit($t);


    }


    CHAPTER 11 ■ FUNCTIONS


    This example could have been implemented with regular function definitions. Only
    one of the functions would be defined, based on the logic. But if you want to
    redefine a function during execution you would have to use closures.


    <?php


    // 11_17.php


    $profit = function($p) {


    return $p * 1.30;


    };


    echo $p = $profit(100) . "\n";


    // Do some stuff


    $profit = function($p) {


    return $p * 1.25;


    };


    echo $p = $profit(100) . "\n";


    In this case the first profit function is used once and after that isn’t thrown
    away when a new function is assigned to the variable $profit . This is done without
    compiler or runtime errors.


    As a side effect of how the PHP parser works it’s possible to define nested functions.
    Although this is possible it is not recommended. The inner function will only
    be defined if the outer function is executed and if the outer function is called
    more than once the inner function will be redefined causing a fatal error as shown
    in the next example.


    <?php


    // 11_18.php


    function A() {


    function B($i) {


    echo "B called with $i\n";


    }


    for ($i = 1; $i < 3; $i++) {


    B($i);


    }


    echo "A called\n";


    }


    A();


    B(0);


    In this case A() is called first causing the function B() to be defined so when
    B() is called after A() it will still work. If B() was called first or A() was
    called more than once a fatal error would be raised.


    Closures can be used to get around this and create “private” functions within
    functions


    <?php


    // 11_19.php


    function A() {


    $f = function ($i) {


    echo "B called with $i\n";


    };


    CHAPTER 11 ■ FUNCTIONS


    for ($i = 1; $i < 3; $i++) {


    $f($i);


    }


    echo "A called\n";


    }


    A();


    A();


    Now we can call the A() function as often as needed and the function defined by
    the variable $f can only be called from within the function A() .


    Recipe 11-10\. Variable Parameter List


