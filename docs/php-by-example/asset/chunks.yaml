    存在数组 `$A=["0"=>123,1=>true,2=>""]`，它与数组 `$B=["123",10,0]`、`$C=[0=>123,"1"=>true,"2"=>""]`
    和 `$D=[0=>123,1=>true,3=>""]` 进行比较。结果表明 `$A==$B` 条件为真。原因如下：`$A` 数组的元素键为 `"0"`、`1`
    和 `2`，对应的值分别为 `123`、`true` 和 `""`。`$B` 数组的元素键为 `0`、`1` 和 `2`（自动计算得出），对应元素的值分别为
    `"123"`、`10` 和 `0`。键是匹配的，因为 `"0"` 被自动转换为 `0`。值 `"123"` 被转换为 `123`，非零数字 `10` 等价于
    `true`，空字符串 `""` 被转换为零值 `0`。


    ![](img/613529_1_En_4_Figg_HTML.gif)一个铃铛符号的插图。**PHP 8 标准**


    在 PHP 8 中，空字符串 `""` 不等于数字 `0`。因此，在 PHP 8 中，`$A==$B` 不为真。


    如果不涉及自动类型转换，那么数组 `$A` 和 `$B` 的元素值是不同的，因此表达式 `$A!==$B` 为真。


    在 `$C` 数组中，元素的值与 `$A` 数组相同。虽然 `$C` 数组中的元素键与 `$A` 数组不同，但由于自动类型转换，这些键被解释为相同。因此，条件
    `$A===$C` 为真。最后，将 `$D` 数组与 `$A` 数组进行比较，只有一个键不同，这足以使条件 `$A!=$D` 为真。


    ## 处理数组的函数


    许多有趣的数组操作可以通过特殊函数来完成。其中之一是 `list()` 函数（严格来说，它不是函数，而是一种特殊的语法结构）。该函数的使用格式如下：


    ```

    list(变量列表)=数组

    ```


    你将变量作为参数传递给函数（这些变量可以完全没有值），并将一个数组赋值给该表达式。结果如下：`list()` 函数的第一个参数指定的变量被赋值为数组的第一个元素，`list()`
    函数参数列表中的第二个变量被赋值为数组的第二个元素，依此类推。某些参数可以跳过，并且变量数量可能与数组元素数量不匹配。`list()` 函数的使用示例见列表
    4-11。


    ```

    列表 4-11

    从数组中提取值

    ```


    以下是程序输出：


    ```

    程序输出（来自列表 4-11）

    $x = 1

    $y = 3

    $z = 4

    ```


    数组 `$A=[1,2,3,4,5]` 被赋值给语句 `list($x,,$y,$z)=$A`。命令执行如下：`$A` 数组第一个元素的值 `1` 被存入变量
    `$x`；`list()` 的下一个参数被省略，因此值为 `2` 的元素未被写入任何地方；值 `3` 被写入变量 `$y`；值 `4` 被写入变量 `$z`；值
    `5` 未被写入任何地方，因为 `list()` 的参数列表中未指定对应的变量。


    还有一些其他函数和工具在处理数组时也很有用。例如，`array_keys()` 函数返回一个包含作为参数传入的数组的键的数组。`array_combine()`
    函数允许你基于两个数组创建一个新数组：一个数组定义键，另一个定义元素的值。另一个有用的函数是 `range()`，它创建一个包含指定范围内（函数参数）的元素值的数组。`array_pop()`
    函数移除数组的最后一个元素，而 `array_push()` 函数在数组末尾添加一个（或多个）元素。`array_slice()` 函数允许你获取数组的一个切片（即从数组中提取一个子数组）。该函数的第一个参数是要切片的数组，第二个参数是切片起始元素的索引。如果该参数为负数，则从数组的最后一个元素开始计数（`-1`
    表示最后一个元素，`-2` 表示倒数第二个元素，依此类推）。第三个参数指定切片中的元素数量。


    ![](img/613529_1_En_4_Figf_HTML.jpg)一个 i 符号。注意


    一般来说，用于操作数组的函数非常多。可能需要一本单独的书来介绍它们。


