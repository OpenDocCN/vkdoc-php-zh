    # PHP 三层架构


    本章大部分内容都在探讨能够"托管"PHP 应用程序的各种平台（或容器）。我们发现，PHP 几乎可以在任何容器（个人电脑、智能手机/移动设备或浏览器）中显示其输出内容。PHP
    能够轻松地与 JavaScript、HTML 和 CSS 交互，正是这种灵活性的体现。如今，几乎所有平台都能与互联网交互（而那些目前尚不能交互的平台，未来也将具备此能力）。任何能与互联网交互的平台，也都能与
    PHP 应用程序交互。


    这种界面上的独立性（或者说灵活性）表明了界面的平台或主机与应用程序的其他"层"（部分）之间存在逻辑上的分离。这引出了对三层架构和 PHP 应用程序逻辑设计的探讨。应用程序规模越大，就越可能需要将其拆分为模块。此外，这些模块很可能驻留在不同的服务器（或
    Web 服务器）上。大型应用程序通常需要多名程序员同时编写代码。这些程序员甚至可能使用不同的语言来创建程序模块。


    构建大型应用程序与组装汽车并没有太大区别。汽车的各个组件（车身、车轮、电子设备和发动机）都是先单独组装好的。每个组装完成的组件随后被放置到汽车底盘内。然后，组件之间通过软管、电线和皮带相互连接。组装完成后，汽车的所有组件协同工作。如果某个组件发生故障，可以将其更换，而无需更换或更改汽车上的任何其他组件。


    模块化（或组件化）编程的理念基于这样一种方法：将代码块单独创建，然后与其他模块组合，从而构建出一个可正常运行的应用程序。这些模块可以被修改或替换，而无需更改其他模块。这种方法已经存在了一段时间。即使在今天，许多程序也并非模块化的，因为小型程序即使不拆分为模块也能高效运行。然而，随着这些应用扩展为更大的应用程序，它们会变得难以更新或维护。一次更改需要更新整个应用程序，而不仅仅是某个模块。在某个节点上，一个未经模块化设计而在不断扩展的应用程序，必须为了更好的可维护性和可靠性而从头开始重新设计成模块化结构。


    如第 1 章所述，搜索引擎能够在用户 PC 的浏览器上显示网页界面。用户输入搜索请求后，信息会通过互联网传输到一台远程服务器（我们不知道它在哪里），该服务器执行一个搜索应用程序（我们不知道它是用什么编程语言创建的）。然后，该应用程序在数据库中（我们不知道它使用的是什么数据库管理系统，也不知道它位于何处）搜索所请求的信息。结果被发送回应用程序，应用程序再将信息（通过
    Web 服务器）发送回用户 PC 上的浏览器。


    ![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig5_HTML.jpg](img/394210_2_En_2_Fig5_HTML.jpg)


    **图 2-5** 三层模块化应用程序设计


    此过程中的信息流动使得这类 Web 应用程序的设计自然而然地划分为（至少）三层（模块）：**界面层、业务规则层和数据层**。将代码划分为不同层的一个优点是能够实现层在多个应用程序中的复用。例如，我们的搜索引擎可以在多个设备上使用相同的业务规则层和数据层，同时使用不同的界面（PC
    应用程序或智能手机应用程序）。不同的层也可以独立更新，而不会影响其他层。智能手机应用程序界面可以更新以利用最新操作系统的新功能，而无需更改业务规则层或数据层。也可以更新业务规则层内的代码以修复逻辑错误，而无需更改界面层或数据层。让我们来看看每一层的典型职责。


    - **模块化三层应用程序** – 设计、编程——三层设计提供了创建可分离为界面层、业务规则层和数据层的程序的能力。界面层包含所有与向用户显示信息相关的图形和程序代码。业务规则层不包含界面。但是，它处理从界面层提交的任何信息，然后可以将信息提交给数据层进行存储。数据层是应用程序的主要存储位置，可能涉及使用数据库。每个层都可以独立地更改和构建（编译），而不会影响其他层。


    ## 动手实践


    1.  模块化设计的三个层分别是什么名称？

    2.  模块化设计与设计建筑物有何相似之处？

    3.  模块化编程如何使编码更高效？


    ## 界面层


    ![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig6_HTML.jpg](img/394210_2_En_2_Fig6_HTML.jpg)


    **图 2-6** 界面层


    界面层（IT）负责显示信息，并允许用户与应用程序交互。大多数界面提供图形用户界面（GUI），它为用户提供了一种查看信息和与应用程序交互的友好方式。GUI 界面提供常见的对象，包括文本框和按钮，这有助于用户快速适应新的应用程序。此外，通常还会包含图片、图像、图标、视频和声音以保持用户的兴趣。菜单和其他导航对象也常被包含在内，以帮助用户成功地在应用程序中导航。


    - **对象** – 对象是已经编译好供应用程序使用的代码块。对象包含方法和属性。方法（或函数）是完成某项任务的代码块（例如，将项目放入列表框中）。属性（或变量）是可以更改的对象特征（例如，背景颜色）。对象通常经过充分测试且没有错误。通过重用现有对象，程序员可以更快地创建更可靠的程序。


    该层将使用对象（如标签和图片框）或脚本代码（如本章中的 `ajaxdemo.html` 示例）来显示信息。该层还通过交互式对象（如文本框和按钮）接收来自用户的信息。静态信息可以来自该层内部（通过菜单、徽标或页脚）。动态信息通常由业务规则层提供给该层（例如本章中
    `myfirstprogram.php` 的输出）。

