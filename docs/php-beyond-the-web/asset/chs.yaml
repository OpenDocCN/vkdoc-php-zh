  \ |\n\n### 4.6 静态代码分析\n\n静态代码分析是指在不执行代码的情况下测试或检查代码的过程。上述测试和调试的示例都涉及运行代码来查找错误和问题。然而，有时在执行代码之前检查潜在错误也是有益的。许多简单的错误，例如语法错误（函数名拼写错误、忘记闭合括号、使用了不存在的运算符等），都可以在运行代码之前被发现。对于需要长时间运行的代码，或者每次运行前都需要花时间设置测试环境和数据的代码，可以通过静态分析来在运行开始前捕获明显的错误，从而获益。在一个耗时一小时的数据分析脚本结尾处，因\
  \ `include()` 引用的脚本出现致命错误而功亏一篑，尤其令人沮丧——而这个错误本可以在开始之前就被捕获！当然，静态分析工具无法捕获所有类型的错误，它们不了解我们的脚本将遇到的数据，也不了解脚本的运行环境，甚至不知道我们对脚本预期达成的目标。\n\
  \n编程“lint”是一种简单的静态代码分析工具。“Lint”是多年前为 C 语言设计的首批分析工具之一，但就像“Hoover”一样，它已成为静态分析工具的通用术语。PHP\
  \ 有多个 lint 工具，包括一个内置于 PHP 本身的工具。要使用内置的 lint，只需调用 `php -l yourfile.php`，任何发现的语法错误都将打印到终端。\n\
  \n其他第三方 lint 及类似工具的功能超越了语法检查，它们还能根据你可能选择使用的特定编码标准来检查你的代码。遵守某个编码标准本身并不能防止错误，但有助于提高代码的可读性和可维护性，尤其是在有多个开发者参与的项目中。在众多可用的编码标准中，选择哪一个并不重要，但如果你选择使用一个，那么保持一致性并在所有代码中应用它就很重要，而像这样的工具可以帮助你做到这一点。某些工具，如\
  \ RIPS，可以查找指示特定故障（例如安全漏洞）的代码模式，但这些模式并不特定违反编码标准或语法错误。使用此类工具的输出需要进一步的考量，因为它们只是潜在问题的指标。在特定情况下，某段特定的代码是否构成实际的安全漏洞，取决于具体的用例及其周围的代码。话虽如此，即使像\
  \ RIPS 这样的代码扫描工具检测到某个当前（根据你脚本的现有结构）并非安全问题的内容，也可能值得修改该部分（或为其添加严格的单元测试），以确保将来对相关代码的任何更改都不会使其变得可利用。\n\
