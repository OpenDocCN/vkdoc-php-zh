  2.  尝试不同的缓存机制。这可能意味着编写新的缓存驱动类以实现新的缓存机制，从而扩展我们框架的缓存库。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 6 章\n\n## 注册表\n\n面向对象编程的一大优点是能够通过创建类的多个实例来重用代码。当我们对类进行更改时，所有实例都将继承这些更改，因此我们只需更改一次。\n\
  \n### 目标\n\n*   我们需要理解注册表设计模式以及它帮助我们克服的问题。\n*   然后，我们需要构建一个注册表类来存储对象实例。这是高效框架的重要组成部分，因此它将成为本章的唯一焦点。\n\
  \n### 单例\n\n然而，有时我们期望只使用一个给定类的实例。我们可以通过几种方式实现这一点。我们在第 1 章中学习了一种这样的方式，即单例模式。例如，假设我们有清单\
  \ 6-1 中所示的类。\n\n**清单 6-1.** 受限实例示例\n\n```\nclass Ford\n{\n    public $founder =\
  \ \"Henry Ford\";\n    public $headquarters = \"Detroit\";\n    public $employees\
  \ = 164000;\n    public function produces($car)\n    {\n        return $car->producer\
  \ == $this;\n    }\n}\n\nclass Car\n{\n    public $color;\n    public $producer;\n\
  }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 6 章 ■ 注册表\n\n\
  ```\n$ford = new Ford();\n$car = new Car();\n$car->color = \"Blue\";\n$car->producer\
  \ = $ford;\necho $ford->produces($car);\necho $ford->founder;\n```\n\n\n\n### 单例模式与注册表模式\n\
  \n这些类本身并不复杂，但它们有助于说明一个要点。有时，我们创建的类在同一时刻只需要一个实例。以 `Ford` 类为例。世界上只有一个福特公司，但它与其他汽车制造商截然不同。`Ford`\
  \ 类所需的逻辑可能与 `Toyota` 类有很大差异。由于这种差异，以及 `Ford` 类实例的唯一性，我们需要确保同一时刻只存在一个实例。\n\n那么，如果我们像清单\
  \ 6-2 那样，将 `Ford` 类设为单例模式呢？\n\n***清单 6-2.*** Ford 单例\n```\nclass Ford\n{\n    public\
  \ $founder = \"Henry Ford\";\n    public $headquarters = \"Detroit\";\n    public\
  \ $employees = 164000;\n\n    public function produces($car)\n    {\n        return\
  \ $car->producer == $this;\n    }\n\n    private static $_instance;\n\n    private\
  \ function __construct()\n    {\n        // 不做任何操作\n    }\n\n    private function\
  \ __clone()\n    {\n        // 不做任何操作\n    }\n\n    public function instance()\n\
  \    {\n        if (!isset(self::$_instance))\n        {\n            self::$_instance\
  \ = new self();\n        }\n        return self::$_instance;\n    }\n}\n```\n\n\
  要将 `Ford` 类设为单例，我们需要做几件事。首先，我们需要隐藏 `__construct()` 和 `__clone()` 这两个魔术方法。每当使用 `new`\
  \ 关键字时，PHP 都会自动调用 `__construct()` 方法。如果我们将其设为私有，那么任何使用 `new` 关键字的操作都会引发异常。\n\n`__clone()`\
  \ 方法在调用 `clone()`（全局）方法来复制一个类实例时被调用。通过私有的 `__clone()` 方法，调用 `clone($ford)` 将会引发异常。\n\
  \n既然现在已经无法通过外部方式创建 `Ford` 实例，我们只能通过调用 `instance()` 方法来访问实例的属性和方法。该方法会检查一个私有的、静态的（类）属性中是否存储了该类的实例。如果尚未设置，它会创建一个新实例，将其存储起来，并返回该实例。这意味着第一次调用时，`Ford`\
  \ 类会创建并返回一个实例，而后续每次调用都会返回那个实例。\n\n让我们看看清单 6-3 中，`$car` 实例是如何与 `Ford` 类交互的。\n\n***清单\
  \ 6-3.*** 使用单例\n```\n$ford = Ford::instance();\n$car = new Car();\n$car->color =\
  \ \"Blue\";\n$car->producer = $ford;\necho $ford->produces($car);\necho $ford->founder;\n\
  ```\n\n你可能已经注意到，我们并没有创建 `Ford` 类的新实例，而是仅通过 `instance()` 方法获取了一个实例。该方法的名称（在此例中为 `instance`）也并非至关重要。你可以将其命名为\
  \ `getInstance()` 或 `returnTheeAnInstanceAnew()`，但它背后的运行原理必须保持一致。\n\n你可能也注意到，创建单例很容易。对于你创建的大部分有限实例类来说，单例模式都够用了。然而，它也有其缺点。首先，创建一个恰当的单例需要一定数量的代码。在前面的例子中，这需要\
  \ 18 行代码，但可以精简到 8 行。如果你要创建大量单例，即便是 8 行代码也可能令人厌烦。\n\n单例模式的另一个缺点是，对单例类的引用必须通过名称来进行。你不能再仅仅引用变量，而必须通过类的完整名称（和命名空间）来引用它，才能获取该类的实例。\n\
  \n### 注册表模式\n\n如果我们能将普通类当作限制实例数量的类来对待，而又不必将它们设为单例呢？**注册表** 本身就是一个单例，用于存储其他“普通”类的实例。另一种理解方式是将其视为一个全局的**键/实例**存储仓库。非单例类的实例会被赋予一个键（标识符），并被“保管”在注册表的私有存储空间中。当有请求针对特定键时，注册表会检查该键下是否有实例，并返回它们。如果在某个键下未找到实例，注册表的方法将返回一个默认值。\n\
  \n你可能在想，这对我们的框架有什么实际用途呢？在很多情况下，我们需要限制类的实例数量，例如涉及到与第三方服务的共享连接或共享资源时。考虑一下我们的缓存系统。对于大多数应用来说，一个缓存提供者就足够了。比如，你会连接到一个\
  \ Memcached 服务器。当一个连接就足够时，我们当然不希望建立多个连接到同一个服务。\n\n我们可以将缓存系统构建为一组单例类，或者声明 `Cache`\
  \ 类的多个实例。使用注册表，我们可以找到一个简洁、高效的折中方案，既能严格控制类实例的数量，又不会限制我们只能使用单实例。\n\n考虑一个使用数据库的应用，或者一个连接\
  \ Facebook 的应用。这两种情况都能从严格控制和资源共享中受益。注册表能满足这些需求，而无需我们编写大量的单例。\n\n让我们看看清单 6-4 中的一些代码。\n\
  \n***清单 6-4.*** 注册表类\n```\nnamespace Framework\n{\n    class Registry\n    {\n \
  \       private static $_instances = array();\n\n        private function __construct()\n\
  \        {\n            // 不做任何操作\n        }\n\n        private function __clone()\n\
  \        {\n            // 不做任何操作\n        }\n\n        public static function get($key,\
  \ $default = null)\n        {\n            if (isset(self::$_instances[$key]))\n\
  \            {\n                return self::$_instances[$key];\n            }\n\
  \            return $default;\n        }\n\n        public static function set($key,\
  \ $instance = null)\n        {\n            self::$_instances[$key] = $instance;\n\
  \        }\n\n        public static function erase($key)\n        {\n          \
  \  unset(self::$_instances[$key]);\n        }\n    }\n}\n```\n\n我将注册表称为单例，但实际上它更像是一个**静态类**。静态类是没有实例属性/方法或实例访问器/修改器的单例。事实上，静态类和我们的注册表之间的唯一区别是，我们的注册表永远无法创建任何实例。这没问题，因为我们只会在单一上下文中需要我们的注册表类。\n\
  \n`set()` 方法用于将带有指定键的实例“存储”到注册表的私有存储中。`get()` 方法在私有存储中搜索具有匹配键的实例。如果找到，则返回该实例，否则返回通过\
  \ `$default` 参数提供的默认值。`erase()` 方法用于移除指定键下的实例。\n\n注册表类很容易与我们的 `Ford`/`Car` 类一起使用，如清单\
  \ 6-5 所示。\n\n***清单 6-5.*** 使用注册表\n```\nFramework\\Registry::set(\"ford\", new Ford());\n\
  \n$car = new Car();\n$car->setColor(\"Blue\")->setProducer(Framework\\Registry::get(\"\
  ford\"));\necho Framework\\Registry::get(\"ford\")->produces($car);\necho Framework\\\
  Registry::get(\"ford\")->founder;\n```\n\n> **注意** Zend Framework 和 CakePHP 都有专门用于组织对象实例的类——与注册表类似的类。Codeigniter\
  \ 没有这样的类，且完全依赖于使用单例模式。\n\n### 问题\n\n1. 注册表是存储类实例的理想场所，这有助于最大限度地减少常用类的重复初始化。它还有其他用途吗？\n\
  \n2. 在我们的框架中使用注册表模式是否意味着我们不能有效地使用单例？\n\n### 答案\n\n1. 除了存储类实例，注册表还可以用于存储其他需要全局访问的数据。在我们的注册表中存储共享的数据结构也完全没有问题。\n\
  \n2. 注册表模式并不禁止我们使用单例。实际上，它依赖于一个单例（或静态类）才能正常工作。它只是有助于管理资源，同时不会让我们在所有事情上都受限于单例类的限制。\n\
  \n\n\n1.  使用我们的 `Registry` 类，我们可以设置和获取类实例（或任何其他数据对象）。能够查看存储区域中已有内容将非常有用。尝试创建一个方法，用于返回存储对象的键/值对列表。\n\
  \n2.  如果类能够知道自己是否已被放入（或取出）注册中心，那将非常有用。尝试添加一些逻辑，用于检查类是否能够响应这些事件，并在事件发生时通知该类。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 7 章\n\n### 路由\n\n路由是指应用程序根据请求的\
  \ URL 确定执行哪个控制器和操作的过程。简而言之，它是框架如何从 `http://localhost/users/list.html` 到达 `Users`\
  \ 控制器和 `list()` 方法的过程。\n\n### 目标\n\n-   我们需要理解路由是什么以及它们如何工作。\n-   我们需要构建不同类型的路由。\n\
  -   我们需要构建用于管理这些路由的 `Router` 类。\n\n### 定义路由\n\n某些路由可以从应用程序的结构推断出来。如果 `Router` 类发现你有一个带\
  \ `search()` 方法的 `Articles` 控制器，它有时可以假设 URL `http://localhost/articles/search.html`\
  \ 需要执行 `Articles->search()`；然而，有时我们需要定义那些不那么容易推断的路由。构建完 `Router` 类后，我们应该能够按照清单 7-1\
  \ 所示的方式定义路由。\n\n**清单 7-1.** 定义路由\n\n```\n$router = new Framework\\Router();\n$router->addRoute(\n\
  \    new Framework\\Router\\Route\\Simple(array(\n        \"pattern\" => \":name/profile\"\
  ,\n        \"controller\" => \"index\",\n        \"action\" => \"home\"\n    ))\n\
  );\n$router->url = \"chris/profile\";\n$router->dispatch();\n```\n\n对于一个功能完备的 `Router`\
  \ 类，我们需要做几件事。我们需要为推断出的路由管理不同的路由对象。我们需要能够处理那些与我们已定义的路由不匹配的请求，将其路由到现有的控制器和操作（推断路由），或者给出相应的错误信息。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 路由类\n\n路由类代表了我们可以在框架配置中定义的不同类型的路由。我们将只介绍两种，但它们能够满足我们框架中的所有需求。由于可能存在多种类型，我们的路由类将继承自一个基础的\
  \ `Route` 类，如清单 7-2 所示。\n\n**清单 7-2.** `Router\\Route` 类\n\n```\nnamespace Framework\\\
  Router\n{\n    use Framework\\Base as Base;\n    use Framework\\Router\\Exception\
  \ as Exception;\n\n    class Route extends Base\n    {\n        /**\n         *\
  \ @readwrite\n         */\n        protected $_pattern;\n\n        /**\n       \
  \  * @readwrite\n         */\n        protected $_controller;\n\n        /**\n \
  \        * @readwrite\n         */\n        protected $_action;\n\n        /**\n\
  \         * @readwrite\n         */\n        protected $_parameters = array();\n\
  \n        public function _getExceptionForImplementation($method)\n        {\n \
  \           return new Exception\\Implementation(\"{$method} method not implemented\"\
  );\n        }\n    }\n}\n```\n\n我们的 `Router\\Route` 类继承自 `Base` 类，因此我们可以定义各种模拟的\
  \ getter/setter 方法。我们还为异常生成方法提供了方法覆盖。所有受保护的属性都与创建新的 `Router\\Route`（或其子类）实例时提供的变量相关，并包含有关所请求\
  \ URL 的信息。\n\n`Regex` 类扩展了 `Router\\Route` 类，如清单 7-3 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**清单 7-3.** `Router\\Route\\Regex` 类\n\n```\nnamespace Framework\\Router\\Route\n\
  {\n    use Framework\\Router as Router;\n\n    class Regex extends Router\\Route\n\
  \    {\n        /**\n         * @readwrite\n         */\n        protected $_keys;\n\
  \n        public function matches($url)\n        {\n            $pattern = $this->pattern;\n\
  \            // 检查值\n            preg_match_all(\"#^{$pattern}$#\", $url, $values);\n\
  \n            if (sizeof($values) && sizeof($values[0]) && sizeof($values[1]))\n\
  \            {\n                // 找到值，修改参数并返回\n            }\n        }\n    }\n\
  }\n```\n\n\n\n`$derived = array_combine($this->keys, $values[1]);`\n\n`$this->parameters\
  \ = array_merge($this->parameters, $derived);`\n\n`return true;`\n}\n\n`return false;`\n\
  }\n}\n}\n\n`Router\\Route\\Regex`类确实非常精简。它有一个`matches()`方法，`Router`类会在所有`Router\\\
  Route`子类上调用该方法。`matches()`方法会创建正确的正则表达式搜索字符串，并返回与提供的`URL`匹配的任何结果。\n\n`ArrayMethods::flatten()`方法，如列表\
  \ 7-4 所示，对于将多维数组转换为单维数组非常有用。\n\n**列表 7-4.** `ArrayMethods::flatten()`方法\n\n```\n\
  namespace Framework\n{\n    class ArrayMethods\n    {\n        public function flatten($array,\
  \ $return = array())\n        {\n            foreach ($array as $key => $value)\n\
  \            {\n                if (is_array($value) || is_object($value))\n   \
  \             {\n\n                    $return = self::flatten($value, $return);\n\
  \                }\n                else\n                {\n                  \
  \  $return[] = $value;\n                }\n            }\n            return $return;\n\
  \        }\n    }\n}\n```\n\n`Router\\Route\\Simple`类比`Router\\Route\\Regex`类稍微详细一些。它也有一个`matches()`方法，该方法会将匹配格式为`:property`的子字符串转换为正则表达式通配符。\n\
  \n匹配的属性存储在`$_parameters`数组中。`Router\\Route\\Simple`类如列表 7-5 所示。\n\n**列表 7-5.** `Router\\\
  Route\\Simple`类\n\n```\nnamespace Framework\\Router\\Route\n{\n    use Framework\\\
  Router as Router;\n    use Framework\\ArrayMethods as ArrayMethods;\n\n    class\
  \ Simple extends Router\\Route\n    {\n        public function matches($url)\n \
  \       {\n            $pattern = $this->pattern;\n\n            // get keys\n \
  \           preg_match_all(\"#:([a-zA-Z0-9]+)#\", $pattern, $keys);\n\n        \
  \    if (sizeof($keys) && sizeof($keys[0]) && sizeof($keys[1]))\n            {\n\
  \                $keys = $keys[1];\n            }\n            else\n          \
  \  {\n                // no keys in the pattern, return a simple match\n       \
  \         return preg_match(\"#^{$pattern}$#\", $url);\n            }\n\n      \
  \      // normalize route pattern\n            $pattern = preg_replace(\"#(:[a-zA-Z0-9]+)#\"\
  , \"([a-zA-Z0-9-_]+)\", $pattern);\n\n            // check values\n            preg_match_all(\"\
  #^{$pattern}$#\", $url, $values);\n\n            if (sizeof($values) && sizeof($values[0])\
  \ && sizeof($values[1]))\n            {\n\n                // unset the matched\
  \ url\n                unset($values[0]);\n\n                // values found, modify\
  \ parameters and return\n                $derived = array_combine($keys, ArrayMethods::flatten($values));\n\
  \                $this->parameters = array_merge($this->parameters, $derived);\n\
  \n                return true;\n            }\n\n            return false;\n   \
  \     }\n    }\n}\n```\n\n#### Router 类\n\n我们的`Router`类将使用请求的`URL`以及控制器/动作的元数据，来确定要执行哪个正确的控制器/动作。它需要处理多个已定义的路由，如果没有任何已定义的路由匹配，还要处理推断出的路由。这在列表\
  \ 7-6 中演示。\n\n**列表 7-6.** 路由管理方法\n\n```\nnamespace Framework\n{\n    use Framework\\\
  Base as Base;\n    use Framework\\Registry as Registry;\n    use Framework\\Inspector\
  \ as Inspector;\n    use Framework\\Router\\Exception as Exception;\n\n    class\
  \ Router extends Base\n    {\n        /**\n         * @readwrite\n         */\n\
  \        protected $_url;\n\n        /**\n         * @readwrite\n         */\n \
  \       protected $_extension;\n\n        /**\n         * @read\n         */\n \
  \       protected $_controller;\n\n        /**\n         * @read\n         */\n\
  \        protected $_action;\n\n        protected $_routes = array();\n\n      \
  \  public function _getExceptionForImplementation($method)\n        {\n        \
  \    return new Exception\\Implementation(\"{$method} method not implemented\");\n\
  \        }\n\n        public function addRoute($route)\n        {\n            $this->_routes[]\
  \ = $route;\n            return $this;\n        }\n\n        public function removeRoute($route)\n\
  \        {\n            foreach ($this->_routes as $i => $stored)\n            {\n\
  \                if ($stored == $route)\n                {\n                   \
  \ unset($this->_routes[$i]);\n                }\n            }\n            return\
  \ $this;\n        }\n\n        public function getRoutes()\n        {\n        \
  \    $list = array();\n            foreach ($this->_routes as $route)\n        \
  \    {\n                $list[$route->pattern] = get_class($route);\n          \
  \  }\n            return $list;\n        }\n    }\n}\n```\n\n我们将所有定义的路由存储在一个受保护的`$_routes`属性中，并通过`addRoute()`和`removeRoute()`方法来操作它们。`getRoutes()`方法返回我们存储的路由的简洁列表——其字面值作为键，类类型作为值——这使得调试变得更加容易。\n\
  \n接下来，我们需要处理`URL`的分发。这包括匹配任何已定义的路由，然后尝试查找推断出的路由。请参见列表 7-7 了解如何实现。\n\n\n\n### **清单\
  \ 7-7.** 处理已定义路由\n\n```php\nnamespace Framework\n{\n    use Framework\\Base as Base;\n\
  \    use Framework\\Events as Events;\n    use Framework\\Registry as Registry;\n\
  \    use Framework\\Inspector as Inspector;\n    use Framework\\Router\\Exception\
  \ as Exception;\n\n    class Router extends Base\n    {\n        public function\
  \ dispatch()\n        {\n            $url = $this->url;\n            $parameters\
  \ = array();\n            $controller = \"index\";\n            $action = \"index\"\
  ;\n\n            foreach ($this->_routes as $route)\n            {\n           \
  \     $matches = $route->matches($url);\n                if ($matches)\n       \
  \         {\n                    $controller = $route->controller;\n           \
  \         $action = $route->action;\n                    $parameters = $route->parameters;\n\
  \                    $this->_pass($controller, $action, $parameters);\n        \
  \            return;\n                }\n            }\n        }\n    }\n}\n```\n\
  \n这是我们路由器`dispatch()`函数的第一部分。我们首先遍历`Router`类中受保护的`$_routes`属性里定义的路由。如果路由与 URL 匹配，我们就获取该路由的`controller`和`action`（并将控制器名称的首字母大写）。最后，我们检查控制器是否具有我们所需的`action`，并在计算出需要传递给控制器的参数后，执行该控制器。这一点将在**清单\
  \ 7-8**中演示。\n\n### **清单 7-8.** 处理预先存在的路由\n\n```php\nnamespace Framework\n{\n   \
  \ use Framework\\Base as Base;\n    use Framework\\Events as Events;\n    use Framework\\\
  Registry as Registry;\n    use Framework\\Inspector as Inspector;\n    use Framework\\\
  Router\\Exception as Exception;\n\n    class Router extends Base\n    {\n      \
  \  public function dispatch()\n        {\n            $parts = explode(\"/\", trim($url,\
  \ \"/\"));\n\n            if (sizeof($parts) > 0)\n            {\n             \
  \   $controller = $parts[0];\n                if (sizeof($parts) >= 2)\n       \
  \         {\n                    $action = $parts[1];\n                    $parameters\
  \ = array_slice($parts, 2);\n                }\n            }\n\n            $this->_pass($controller,\
  \ $action, $parameters);\n        }\n    }\n}\n```\n\n因为我们只在`_pass()`方法中处理实际的路由对象，所以实际上不需要验证这些路由数据。如果已定义的路由都不匹配（且函数执行因`return`语句而终止），那么我们可以假定该路由要么可以推断出来，要么是无效的。这两种情况将接着在**清单\
  \ 7-9**中处理。\n\n### **清单 7-9.** 路由器 `_pass()` 方法\n\n```php\nnamespace Framework\n\
  {\n    use Framework\\Base as Base;\n    use Framework\\Events as Events;\n    use\
  \ Framework\\Registry as Registry;\n    use Framework\\Inspector as Inspector;\n\
  \    use Framework\\Router\\Exception as Exception;\n\n    class Router extends\
  \ Base\n    {\n        protected function _pass($controller, $action, $parameters\
  \ = array())\n        {\n            $name = ucfirst($controller);\n           \
  \ $this->_controller = $controller;\n            $this->_action = $action;\n\n \
  \           try\n            {\n                $instance = new $name(array(\n \
  \                   \"parameters\" => $parameters\n                ));\n       \
  \         Registry::set(\"controller\", $instance);\n            }\n           \
  \ catch (\\Exception $e)\n            {\n                throw new Exception\\Controller(\"\
  Controller {$name} not found\");\n            }\n\n            if (!method_exists($instance,\
  \ $action))\n            {\n                $instance->willRenderLayoutView = false;\n\
  \                $instance->willRenderActionView = false;\n                throw\
  \ new Exception\\Action(\"Action {$action} not found\");\n            }\n\n    \
  \        $inspector = new Inspector($instance);\n            $methodMeta = $inspector->getMethodMeta($action);\n\
  \n            if (!empty($methodMeta[\"@protected\"]) || !empty($methodMeta[\"@private\"\
  ]))\n            {\n                throw new Exception\\Action(\"Action {$action}\
  \ not found\");\n            }\n\n            $hooks = function($meta, $type) use\
  \ ($inspector, $instance)\n            {\n                if (isset($meta[$type]))\n\
  \                {\n                    $run = array();\n                    foreach\
  \ ($meta[$type] as $method)\n                    {\n                        $hookMeta\
  \ = $inspector->getMethodMeta($method);\n                        if (in_array($method,\
  \ $run) && !empty($hookMeta[\"@once\"]))\n                        {\n          \
  \                  continue;\n                        }\n                      \
  \  $instance->$method();\n                        $run[] = $method;\n          \
  \          }\n                }\n            };\n\n            $hooks($methodMeta,\
  \ \"@before\");\n            call_user_func_array(array(\n                $instance,\n\
  \                $action\n            ), is_array($parameters) ? $parameters : array());\n\
  \            $hooks($methodMeta, \"@after\");\n\n            // 注销控制器\n        \
  \    Registry::erase(\"controller\");\n        }\n    }\n}\n```\n\n\n\n```markdown\n\
  我们的`_pass()`方法首先修改请求的类（从`_dispatch()`方法传递而来），使其首字母大写。它立即将受保护的`$_controller`和`$_action`属性设置为正确的值，并尝试创建一个新的`Controller`类实例，传入自身引用以及提供的`$parameters`数组。由于我们的`autoload()`函数在找不到类时会抛出异常，我们可以假设控制器要么已加载，要么不存在，后者会引发`Router\\\
  Exception\\Controller`异常。然后，`_pass()`方法检查`Controller`类是否有一个与所需`$action`匹配的方法。如果没有，它将引发`Router\\\
  Exception\\Action`异常。\n\n接着，我们检查该操作是否可调用（检查元数据中的`@protected`或`@private`）。\n\n如果满足其中任一条件，我们将引发`Router\\\
  Exception\\Action`异常。我们还定义了一个匿名函数来处理钩子。\n\n> **注意**：钩子是指那些在运行系统中特定点接入的函数，以便它们可以在不修改系统本身的情况下运行。一个例子是在预期操作之前创建一个钩子函数来执行。我们可以在不修改操作本身的情况下随时更改这个钩子函数。\n\
  \n如果操作有`@before [method, [method...]]`标志，`Router`类将先执行该方法。\n\n同样，如果操作有`@after [method,\
  \ [method...]]`标志，`Router`类将在操作完成后执行它。\n\n在`@before`和`@after`中标识的、带有`@once`标志的方法将仅运行一次，无论它们在`@before`和`@after`中被引用多少次。如果操作有`@protected`或`@private`标志，`Router`类将抛出异常，就像找不到该操作一样。\n\
  \n`@before`和`@after`是在我们框架中实现钩子的示例。执行顺序是：先执行任何`@before`钩子，然后将参数分配给`Controller`实例并执行控制器。最后，`_pass()`方法将执行任何`@after`钩子。完整的类如清单\
  \ 7-10 所示。\n\n***清单 7-10.*** Router 类\n\n```php\nnamespace Framework\n{\n    use\
  \ Framework\\Base as Base;\n    use Framework\\Events as Events;\n    use Framework\\\
  Registry as Registry;\n    use Framework\\Inspector as Inspector;\n    use Framework\\\
  Router\\Exception as Exception;\n\n    class Router extends Base\n    {\n      \
  \  /**\n         * @readwrite\n         */\n        protected $_url;\n\n       \
  \ /**\n         * @readwrite\n         */\n        protected $_extension;\n\n  \
  \      /**\n         * @read\n         */\n        protected $_controller;\n\n \
  \       /**\n         * @read\n         */\n        protected $_action;\n\n    \
  \    protected $_routes = array();\n\n        public function _getExceptionForImplementation($method)\n\
  \        {\n            return new Exception\\Implementation(\"{$method} method\
  \ not implemented\");\n        }\n\n        public function addRoute($route)\n \
  \       {\n            $this->_routes[] = $route;\n            return $this;\n \
  \       }\n\n        public function removeRoute($route)\n        {\n          \
  \  foreach ($this->_routes as $i => $stored)\n            {\n                if\
  \ ($stored == $route)\n                {\n                    unset($this->_routes[$i]);\n\
  \                }\n            }\n            return $this;\n        }\n\n    \
  \    public function getRoutes()\n        {\n            $list = array();\n    \
  \        foreach ($this->_routes as $route)\n            {\n                $list[$route->pattern]\
  \ = get_class($route);\n            }\n            return $list;\n        }\n\n\
  \        protected function _pass($controller, $action, $parameters = array())\n\
  \        {\n            $name = ucfirst($controller);\n\n            $this->_controller\
  \ = $controller;\n            $this->_action = $action;\n\n            try\n   \
  \         {\n                $instance = new $name(array(\n                    \"\
  parameters\" => $parameters\n                ));\n                Registry::set(\"\
  controller\", $instance);\n            }\n            catch (\\Exception $e)\n \
  \           {\n                throw new Exception\\Controller(\"Controller {$name}\
  \ not found\");\n            }\n\n            if (!method_exists($instance, $action))\n\
  \            {\n                $instance->willRenderLayoutView = false;\n     \
  \           $instance->willRenderActionView = false;\n                throw new\
  \ Exception\\Action(\"Action {$action} not found\");\n            }\n\n        \
  \    $inspector = new Inspector($instance);\n            $methodMeta = $inspector->getMethodMeta($action);\n\
  \n            if (!empty($methodMeta[\"@protected\"]) || !empty($methodMeta[\"@private\"\
  ]))\n            {\n                throw new Exception\\Action(\"Action {$action}\
  \ not found\");\n            }\n        }\n    }\n}\n```\n\n\n```php\n$hooks = function($meta,\
  \ $type) use ($inspector, $instance)\n{\n    if (isset($meta[$type]))\n    {\n \
  \       $run = array();\n        foreach ($meta[$type] as $method)\n        {\n\
  \            $hookMeta = $inspector->getMethodMeta($method);\n            if (in_array($method,\
  \ $run) && !empty($hookMeta[\"@once\"]))\n            {\n                continue;\n\
  \            }\n            $instance->$method();\n            $run[] = $method;\n\
  \        }\n    }\n};\n\n$hooks($methodMeta, \"@before\");\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 7 章 ■ 路由\n\n```php\ncall_user_func_array(array(\n    $instance,\n    $action\n\
  ), is_array($parameters) ? $parameters : array());\n\n$hooks($methodMeta, \"@after\"\
  );\n\n// 注销控制器\nRegistry::erase(\"controller\");\n```\n\n```php\npublic function\
  \ dispatch()\n{\n    $url = $this->url;\n    $parameters = array();\n    $controller\
  \ = \"index\";\n    $action = \"index\";\n\n    foreach ($this->_routes as $route)\n\
  \    {\n        $matches = $route->matches($url);\n        if ($matches)\n     \
  \   {\n            $controller = $route->controller;\n            $action = $route->action;\n\
  \            $parameters = $route->parameters;\n            $this->_pass($controller,\
  \ $action, $parameters);\n            return;\n        }\n    }\n\n    $parts =\
  \ explode(\"/\", trim($url, \"/\"));\n    if (sizeof($parts) > 0)\n    {\n     \
  \   $controller = $parts[0];\n        if (sizeof($parts) >= 2)\n        {\n    \
  \        $action = $parts[1];\n            $parameters = array_slice($parts, 2);\n\
  \        }\n    }\n    $this->_pass($controller, $action, $parameters);\n}\n```\n\
  \n`Controller` 类的代码如下所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  ## 第 7 章 ■ 路由\n\n**清单 7-11.** Controller 类\n\n```php\nnamespace Framework\n{\n \
  \   use Framework\\Base as Base;\n\n    class Controller extends Base\n    {\n \
  \       /**\n         * @readwrite\n         */\n        protected $_parameters;\n\
  \    }\n}\n```\n\n> **注意：** 随着时间的推移，我们的 `Controller` 类将逐步演进，以处理各种任务，例如加载库和视图，或与模型中的业务逻辑集成。在此之前，以上代码已足够。\n\
  \n现在我们已经完成了所有 `Router\\Route` 代码，接下来看看如何使用它，以及我们创建的钩子的一些示例。请看清单 7-12。\n\n**清单 7-12.**\
  \ Router 类的使用示例\n\n```php\nclass Home extends Framework\\Controller\n{\n    public\
  \ function index()\n    {\n        echo \"here\";\n    }\n}\n\n$router = new Framework\\\
  Router();\n$router->addRoute(\n    new Framework\\Router\\Route\\Simple(array(\n\
  \        \"pattern\" => \":name/profile\",\n        \"controller\" => \"home\",\n\
  \        \"action\" => \"index\"\n    ))\n);\n$router->url = \"chris/profile\";\n\
  $router->dispatch();\n```\n\n首先需要注意的是，我们需要为定义的每个路由创建一个 `Router\\Route` 子类的实例。其次需要注意，我们通过类名来引用\
  \ `Router\\Route` 子类。我们可以创建一个 `Router\\Route` 子类工厂，但考虑到应用程序主要由推断路由构成，目前这样做有些过度设计。\n\
  \n下一个示例（如清单 7-13 所示）展示了如何利用元数据在 `Controller` 子类中方便地使用钩子。`init()`、`authenticate()`\
  \ 和 `notify()` 方法带有 `@protected` 标记，因此它们不会从 `Router` 类被路由到。`home()` 方法指明在 `home()`\
  \ 方法执行之前应执行 `init()`、`authenticate()` 和 `init()`（再次）方法。同时，它还指明在 `home()` 方法执行之后应执行\
  \ `notify()` 方法。最后，`init()` 方法的元数据指明它应每个 URL 只运行一次。我们的路由器满足了所有这些要求！\n\n**清单 7-13.**\
  \ 控制器元属性示例\n\n```php\nclass Index extends Framework\\Controller\n{\n    /**\n  \
  \   * @once\n     * @protected\n     */\n    public function init()\n    {\n   \
  \     echo \"init\";\n    }\n\n    /**\n     * @protected\n     */\n    public function\
  \ authenticate()\n    {\n        echo \"authenticate\";\n    }\n\n    /**\n    \
  \ * @before init, authenticate, init\n     * @after notify\n     */\n    public\
  \ function home()\n    {\n        echo \"hello world!\";\n    }\n\n    /**\n   \
  \  * @protected\n     */\n    public function notify()\n    {\n        echo \"notify\"\
  ;\n    }\n}\n\n$router = new Framework\\Router();\n$router->addRoute(\n    new Framework\\\
  Router\\Route\\Simple(array(\n        \"pattern\" => \":name/profile\",\n      \
  \  \"controller\" => \"home\",\n        \"action\" => \"index\"\n    ))\n);\n$router->url\
  \ = \"chris/profile\";\n$router->dispatch();\n```\n\n### 问题\n\n1. 既然我们的框架可以要么推断所有路由，要么定义所有必需的路由，为什么还要同时采用这两种路由定义方式？\n\
  2. 有没有更简单的方法来定义 `Route` 实例？\n\n### 答案\n\n3. 主要原因在于灵活性。在很多情况下，推断路由是不够的，而我们又不希望自己处理所有简单路由定义的繁琐工作。\n\
  4. 我们无法为此类事情使用配置文件，因为我们尚未定义一种能够支持用于定义路由的数据结构类型的配置文件标准。确实有更简单的方法来定义大批量路由，你将在第 17\
  \ 章中看到。\n\n### 练习\n\n5. 路由非常依赖于应用程序。有时你可能需要指定不同于本章所演示的路由类型。尝试创建一个 `Route` 子类，让你可以为路由命名，然后重定向到其他命名路由。\n\
  6. 同时定义大量路由可能会让代码变得混乱不堪。尝试简化创建十个 `Router\\Route\\Simple` 实例的过程。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 8 章\n\n### 模板\n\nMVC 的核心是关注点分离，而在我们框架中，这点在视图和控制器之间尤为重要。通常，当我们想到应用程序的前端（或客户端）时，会想到\
  \ HTML、CSS 和 JavaScript。再加上服务器端交互，就不可避免地会引入 PHP。\n\n更糟糕的是，我们通常需要在视图中直接使用 PHP 来处理由控制器提供的数据。许多人尝试通过模板语言（和解析器）来解决这个问题。用另一种中间方言替代\
  \ PHP 可能看似意义不大，但也有其优势。无论你选择在框架中使用模板解析与否，它仍然是构建自己框架所需分析思维的良好练习。\n\n### 目标\n\n- 我们需要定义一个模板解析器所基于的*方言*。方言只是定义模板的语法或命令的另一种说法。\n\
  - 我们需要将这种方言形式化为一个模板实现类。\n- 我们需要构建一个模板解析器类，利用该模板实现类将模板字符串转换为解析后的模板。\n\n### 理念\n\n\
  为了构建一个功能性的模板解析器，我们首先需要定义它的工作方式。它应该接受一种标准化的模板语言，同时又要易于扩展。它应该快速。它不应该要求使用者花费大量学习时间。请看清单\
  \ 8-1 中的基础模板方言。\n\n**清单 8-1.** 基础模板方言\n\n```smarty\n{if $name && $address}\nname:\
  \ {echo $name}\naddress: {echo $address}\n{/if}\n{elseif $name}\nname: {echo $name}\n\
  {/elseif}\n{else}\nno name or address\n{/else}\n```\n\n```smarty\n{foreach $value\
