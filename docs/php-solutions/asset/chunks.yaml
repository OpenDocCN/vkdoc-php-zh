    \n```\n/* This is a comment that stretches\nover several lines. It uses the same\n\
    beginning and end markers as in CSS. */\n```\n\n多行注释在测试或故障排除时特别有用，因为它们可以用来禁用大段脚本而无需删除它们。\n\
    \n> **提示**  \n> 良好的注释与精心选择的变量名相结合，使代码更易于理解和维护。\n\n## 使用数组存储多个值\n\n与其他编程语言一样，PHP\
    \ 允许你将多个值存储在一个称为数组的特殊类型变量中。思考数组的一种简单方式是，它们就像一张购物清单。尽管每个项目可能不同，但你可以用一个名字来统称它们。图\
    \ [3-3] 展示了这一概念：变量 `$shoppingList` 统指所有五个项目——葡萄酒、鱼、面包、葡萄和奶酪。\n\n![A978-1-4842-0635-5_3_Fig3_HTML.jpg](img/A978-1-4842-0635-5_3_Fig3_HTML.jpg)\n\
    \n**图 3-3.** 数组是存储多个项目的变量，就像一张购物清单\n\n单个项目（或数组元素）通过变量名后紧跟方括号中的数字来标识。PHP 会自动分配该数字，但需要注意的是，编号总是从\
    \ 0 开始。因此，在我们的示例中，数组中的第一个项目（葡萄酒）被引用为 `$shoppingList[0]`，而不是 `$shoppingList[1]`。尽管有五个项目，但最后一个（奶酪）是\
    \ `$shoppingList[4]`。该数字被称为数组键或索引，这种类型的数组称为索引数组。\n\nPHP 使用另一种类型的数组，其中键是一个单词（或任何字母和数字的组合）。例如，一个包含本书详细信息的数组可能如下所示：\n\
    \n```\n$book['title'] = 'PHP Solutions: Dynamic Web Design Made Easy, Third Edition';\n\
    $book['author'] = 'David Powers';\n$book['publisher'] = 'Apress';\n$book['ISBN']\
    \ = '978-1-4842-0636-2';\n```\n\n这种类型的数组称为关联数组。请注意，数组键需要用引号括起来（单引号或双引号都可以）。它不应包含任何空格或标点符号，下划线除外。\n\
    \n数组是 PHP 中重要且有用的部分。你将大量使用它们，从下一章开始，你将把图片的详细信息存储到数组中，以便在网页上显示随机图像。当你以一系列数组的形式获取搜索结果时，数组也广泛用于数据库操作。\n\
    \n> **注意**  \n> 你可以在本章后半部分学习创建数组的各种方法。\n\n## PHP 的内置超全局数组\n\nPHP 有几个内置数组，它们会自动填充有用的信息。它们被称为超全局数组，并且都以美元符号后跟下划线开头。你经常会看到的两个是\
    \ `$_POST` 和 `$_GET`。它们分别包含通过超文本传输协议 (HTTP) 的 `post` 和 `get` 方法从表单传递的信息。超全局变量都是关联数组，并且\
    \ `$_POST` 和 `$_GET` 的键会自动从 URL 末尾表单元素的名称或查询字符串中的变量派生而来。\n\n假设你在表单中有一个名为 `\"address\"\
    ` 的文本输入字段；当表单通过 `post` 方法提交时，PHP 会自动创建一个名为 `$_POST['address']` 的数组元素，或者如果使用 `get`\
    \ 方法，则创建 `$_GET['address']`。如图 [3-4] 所示，`$_POST['address']` 包含访问者在文本字段中输入的任何值，使你可以将其显示在屏幕上、插入数据库、发送到你的电子邮件收件箱，或执行任何你想做的操作。\n\
    \n![A978-1-4842-0635-5_3_Fig4_HTML.jpg](img/A978-1-4842-0635-5_3_Fig4_HTML.jpg)\n\
    \n**图 3-4.** 你可以通过 `$_POST` 数组检索用户输入的值，该数组在使用 `post` 方法提交表单时自动创建\n\n你将在第 5 章中使用\
    \ `$_POST` 数组，通过电子邮件将在线反馈表单的内容发送到你的收件箱。你在本书中将使用的其他超全局数组包括用于从网络服务器获取信息的 `$_SERVER`（第\
    \ 4、12 和 13 章）、用于将文件上传到网站的 `$_FILES`（第 7 章），以及用于创建简单登录系统的 `$_SESSION`（第 9 章和第\
    \ 17 章）。\n\n> **警告**  \n> 不要忘记 PHP 是区分大小写的。所有超全局数组名称都大写。例如，`$_Post` 或 `$_Get`\
    \ 将无法工作。\n"
- fmt: '### Understanding When to Use Quotes


    If you look closely at the PHP code block in Figure [3-1](#A978-1-4842-0635-5_3_Chapter.html#Fig1),
    you’ll notice that the value assigned to the first variable isn’t enclosed in
    quotes. It looks like this:


    `$startYear = 2006;`


    Yet all the examples in “Using arrays to store multiple values” did use quotes,
    like this:


    `$book[''title''] = ''PHP Solutions: Dynamic Web Design Made Easy, Third Edition'';`


    The simple rules are as follows:


    - Numbers: No quotes

    - Text: Requires quotes


    As a general principle, it doesn’t matter whether you use single or double quotes
    around text or a string, as text is called in PHP and other computer languages.
    The situation is actually a bit more complex than that, as explained in the second
    half of this chapter, because there’s a subtle difference in the way single and
    double quotes are treated by the PHP engine.


    **Note**


    The word “string” is borrowed from computer and mathematical science, where it
    means a sequence of simple objects—in this case, the characters in text.


    The important thing to remember for now is that quotes must always be in matching
    pairs. This means you need to be careful about including apostrophes in a single-quoted
    string or double quotes in a double-quoted string. Take a look at the following
    line of code:


    `$book[''description''] = ''This is David''s latest book on PHP.'';`


    At first glance, there seems to be nothing wrong with it. However, the PHP engine
    sees things differently than the human eye does, as Figure [3-5](#A978-1-4842-0635-5_3_Chapter.html#Fig5)
    demonstrates.


    ![A978-1-4842-0635-5_3_Fig5_HTML.jpg](A978-1-4842-0635-5_3_Fig5_HTML.jpg)


    *Figure 3-5. An apostrophe inside a single-quoted string confuses the PHP engine*


    There are two ways around this problem:


    - Use double quotes if the text includes any apostrophes.

    - Precede apostrophes with a backslash (this is known as escaping).


    So, either of the following is acceptable:


    `$book[''description''] = "This is David''s latest book on PHP.";`


    `$book[''description''] = ''This is David\''s latest book on PHP.'';`


    The same applies with double quotes in a double-quoted string (although with the
    rules reversed). The following code causes a problem:


    `$play = "Shakespeare''s "Macbeth"";`


    In this case, the apostrophe is fine, because it doesn’t conflict with the double
    quotes, but the opening quotes in front of Macbeth bring the string to a premature
    end. To solve the problem, either of the following is acceptable:


    `$play = ''Shakespeare\''s "Macbeth"'';`


    `$play = "Shakespeare''s \"Macbeth\"";`


    In the first example, the entire string has been enclosed in single quotes. This
    gets around the problem of the double quotes surrounding Macbeth but introduces
    the need to escape the apostrophe in Shakespeare’s. The apostrophe presents no
    problem in a double-quoted string, but the double quotes around Macbeth both need
    to be escaped. So, to summarize:


    - Single quotes and apostrophes are fine inside a double-quoted string.

    - Double quotes are fine inside a single-quoted string.

    - Anything else must be escaped with a backslash.


    **Tip**


    The key is to remember that the outermost quotes must match. My preference is
    to use single quotes and to reserve double quotes for situations where they have
    a special meaning, as described in the second half of this chapter.


    ### Special Cases: True, False, and Null


    Although text should be enclosed in quotes, three special cases—`true`, `false`,
    and `null`—should never be enclosed in quotes unless you want to treat them as
    genuine text (or strings). The first two mean what you would expect; the last
    one, `null`, means “nothing” or “no value.”


    **Note**


    Technically speaking, `true` and `false` are Boolean values. This name comes from
    nineteenth-century mathematician George Boole, who devised a system of logical
    operations that subsequently became the basis of much modern-day computing. It’s
    a complicated subject, but you can find out more at [`http://en.wikipedia.org/wiki/Boolean_algebra`](http://en.wikipedia.org/wiki/Boolean_algebra).
    For most people, it’s sufficient to know that Boolean means `true` or `false`.


    As the next section explains, PHP makes decisions on the basis of whether something
    equates to `true` or `false`. Putting quotes around `false` has surprising consequences.
    Take a look at the following code:


    `$OK = false;`


    It does exactly what you expect: it makes `$OK` false. Now, look at this:


    `$OK = ''false'';`


    This does exactly the opposite of what you might expect: it makes `$OK` true!
    Why? Because the quotes around `false` turn it into a string, and PHP treats strings
    as `true`. (There’s a more detailed explanation in “The truth according to PHP”
    in the second half of this chapter.)


    The other thing to note about `true`, `false`, and `null` is that they are case-insensitive.
    The following examples are all valid:


    `$OK = TRUE;`


    `$OK = tRuE;`


    `$OK = true;`


    So, to recap, PHP treats `true`, `false`, and `null` as special cases.


    - Don’t enclose them in quotes.

    - They are case-insensitive.'
