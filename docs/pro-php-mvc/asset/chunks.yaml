    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Chapter 32 CakePHP: Extending\n\
    \nExtensions to the core CakePHP functionality come in many forms. They can be\
    \ in the form of Components, Helpers, Behaviors, or Tasks (which are all referred\
    \ to as Collections).\n\nWhether you require libraries bundled with CakePHP or\
    \ intend to use your own (third-party) libraries, you will need to utilize the\
    \ unified API that all of the Collections share, in order to load, unload, enable,\
    \ disable, or invoke their functionality.\n\n### Goals\n\n- We need to learn how\
    \ to use built-in CakePHP functionality.\n- We need to learn how to include our\
    \ own (third-party) functionality in our CakePHP applications.\n\n### File Uploads\n\
    \nCakePHP has its own built-in library for dealing with files and folders. This\
    \ library deals with all the hassle of creating and moving files, so we don't\
    \ need to do any of that ourselves.\n\nBefore we can accept any file uploads,\
    \ we need to create the database table in which references to files can be stored.\
    \ This follows the predictable pattern set in the previous frameworks and applications,\
    \ as shown in **Listing 32-1**.\n\n***Listing 32-1.*** The `photos` Table\n\n\
    ```sql\nCREATE TABLE 'photos' (\n    'name' varchar(255) DEFAULT NULL,\n```"
