    `</html>`


    The program determines whether the session ID is already set. If not, a new session
    is started. As you read earlier, the session ID helps to identify the products
    selected by the specific visitor of the site. Thereafter, a connection to the
    MySQL server is established and the `shopping` database is selected. A SQL query
    is executed to check if there are any products in the cart with the given session
    ID. If there are, that means the visitor has added one or more products to the
    cart already. In that case, all the items stored in the cart, along with their
    respective quantities, are displayed on the screen.


    If no products are found in the `cart` table that match the given session ID,
    it means no products are in the cart. A message is displayed on the screen indicating
    that the visitor has "0 products selected in the cart".


    The script enables the visitor to perform the following tasks:


    *   Add more products to the cart by selecting any category of item from the top
    menu.

    *   Modify the quantity of any item already in the cart.

    *   Delete an item from the cart or empty the cart entirely.'
