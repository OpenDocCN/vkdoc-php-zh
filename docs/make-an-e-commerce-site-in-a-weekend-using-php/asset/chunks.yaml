- fmt: "# Understanding Different Payment Modes\n\nIn e-commerce sites, payments for\
    \ purchased products are processed electronically. The main electronic payment\
    \ modes are:\n\n- **Credit Cards**—A credit card is small plastic card issued\
    \ by a bank or some provider that enables its holder to purchase goods or services\
    \ on credit. The card issuer puts a credit limit and the card holder cannot spend\
    \ more than that. When a card holder purchases something, the card issuer pays\
    \ on behalf of the card holder. The card holder then pays the amount back to the\
    \ card issuer after a specific time period.\n- **Debit Cards**—A debit card, like\
    \ a credit card, is a small plastic card that enables the card holder to pay from\
    \ his bank account. The card holder first needs to put money into his bank account\
    \ and then can pay for the purchased goods or services via the debit card. The\
    \ major difference between debit and credit cards is that when you use a debit\
    \ card, the amount is deducted from your bank account immediately. There must\
    \ be sufficient funds in your bank account for the transaction to go through.\
    \ Where as, in the case of credit cards, even if there is insufficient funds in\
    \ the account, the transaction is completed and the bank pays on behalf of the\
    \ customer.\n- **Smart Cards**—Similar to credit and debit cards in appearance,\
    \ the smart card has a small microprocessor chip embedded in it. It stores the\
    \ customer’s information along with the monetary information. The monetary information\
    \ is updated when the customer makes purchases.\n- **E-Money**—In this mode of\
    \ payment, the amount is transferred from one financial body to another directly,\
    \ without involvement of any card company in the middle.\n- **Electronic Fund\
    \ Transfer**—This is an electronic payment method that transfers money from one\
    \ bank account to another. Fund transfer can be done using ATMs (Automated Teller\
    \ Machines) or using a computer. To transfer funds on a computer, the customer\
    \ needs to register on the bank website. After signing in, they can make a request\
    \ to transfer a certain amount to the seller’s account. The bank transfers the\
    \ amount to the specified account if it is in the same bank; otherwise, the request\
    \ is transferred to ACH (Automated Clearing House).\n- **Cash on Delivery Transactions\
    \ (COD)**—The payments in this mode are made directly from the customer to the\
    \ seller.\n- **Netbanking**—The customer using this method pays money to the e-commerce\
    \ site from their accounts by supplying a netbanking ID and PIN. No card is required\
    \ for this method of payment.\n\n> **Note:** E-commerce sites collect money from\
    \ consumers through a service provider known as a payment gateway provider. A\
    \ payment gateway is an e-commerce application service provider that processes\
    \ credit card and other card payments. It acts as a bridge between the consumer\
    \ who is making purchases and the bank that issued the credit card. Payment gateways\
    \ provide a safer platform for money exchanges to take place. In cash on delivery\
    \ (COD) transactions, payment gateway is not involved because the payments are\
    \ made directly from the customer to the seller.\n\n## Making Payments\n\nAfter\
    \ choosing products to purchase, the next step is to pay for them. The `purchase.php`\
    \ script prompts the visitor to supply payment information.\n\nTo accept payments\
    \ online through credit and debit cards, you can use several online payment processing\
    \ services. I am using the `2CheckOut.com` service in my `purchase.php` script,\
    \ as shown in Listing [4-7](#A978-1-4842-1672-9_4_Chapter.html#FPar12). Visit\
    \ [`https://www.2checkout.com/`](https://www.2checkout.com/) to learn more.\n\n\
    ### jQuery\n\nThe code shown in Listing [4-7](#A978-1-4842-1672-9_4_Chapter.html#FPar12)\
    \ makes use of jQuery, so let’s take a quick look at jQuery.\n\njQuery is a lightweight,\
    \ feature-rich JavaScript library. It makes it easier to apply JavaScript on your\
    \ site. In fact, many complex tasks like traversing HTML elements, implementing\
    \ animation, handling events, etc. can be easily applied to your site just by\
    \ using jQuery methods. Here are a few of jQuery’s features:\n\n- jQuery makes\
    \ it quite easy to select DOM elements and manipulate them as required.\n- jQuery\
    \ is capable of sensing different events on HTML elements and then taking actions\
    \ accordingly.\n- jQuery enables you to apply AJAX to your site, thus making it\
    \ highly responsive.\n- jQuery includes several built-in animation effects that\
    \ can be directly applied to your site.\n- jQuery is supported by most major browsers,\
    \ including IE 6.0+, FF 2.0+, Safari 3.0+, Chrome, and Opera 9.0+.\n\n#### Listing\
    \ 4-7. The `purchase.php` Script Enables You to Enter Payment Mode and Shipping\
    \ Information\n\n```html\n<HTML>\n<HEAD>\n<script type=\"text/javascript\" src=\"\
    https://www.2checkout.com/checkout/api/2co.min.js\"></script>\n<script src=\"\
    //ajax.googleapis.com/ajax/libs/jquery/1.11.0/jquery.min.js\"></script>\n<script>\n\
    var successCallback = function(data) {\n    var myForm = document.getElementById('payment-form');\n\
    \    // Set the token as the value for the token input\n    myForm.token.value\
    \ = data.response.token.token;\n    myForm.submit();\n};\n\n// Called when token\
    \ creation fails.\nvar errorCallback = function(data) {\n    // Retry the token\
    \ request if ajax call fails\n    if (data.errorCode === 200) {\n        call\
    \ tokenRequest();\n    } else {\n        alert(data.errorMsg);\n    }\n};\n\n\
    var tokenRequest = function() {\n    // Setup token request arguments\n    var\
    \ args = {\n        sellerId: \"102626791\",\n        publishableKey: \"E0F6517A-CFCF-11E3-8295-A7DD28100996\"\
    ,\n        ccNo: $(\"#card-number\").val(),\n        cvv: $(\"#card-cvc\").val(),\n\
    \        expMonth: $(\"#card-expiry-month\").val(),\n        expYear: $(\"#card-expiry-year\"\
    ).val()\n    };\n    // Make the token request\n    TCO.requestToken(successCallback,\
    \ errorCallback, args);\n};\n\n$(function() {\n    // Pull in the public encryption\
    \ key for our environment\n    TCO.loadPubKey('production');\n    $(\"#payment-form\"\
    ).submit(function(e) {\n        // Call our token request function\n        tokenRequest();\n\
    \        // Prevent form from submitting\n        return false;\n    });\n});\n\
    </script>\n</HEAD>\n<BODY>\n<?php\nif (session_status() == PHP_SESSION_NONE) {\n\
    \    session_start();\n}\n\nif (isset($_SESSION['cartamount'])) {\n    $cartamount=$_SESSION['cartamount'];\n\
    }\n\n$complete_name=$_POST['complete_name'];\n$address1 = $_POST['address1'];\n\
    $city = $_POST['city'];\n$state = $_POST['state'];\n$zipcode = $_POST['zipcode'];\n\
    $country = $_POST['country'];\n$shipping_address_line1 = $_POST['shipping_address_line1'];\n\
    $shipping_address_line2 = $_POST['shipping_address_line2'];\n$shipping_city =\
    \ $_POST['shipping_city'];\n$shipping_state = $_POST['shipping_state'];\n$shipping_country\
    \ = $_POST['shipping_country'];\n$shipping_zipcode = $_POST['shipping_zipcode'];\n\
    $phone_no= $_POST['phone_no'] ;\n\n$_SESSION['complete_name'] =$complete_name;\n\
    $_SESSION['address1'] =$address1;\n$_SESSION['city'] =$city;\n$_SESSION['state']\
    \ =$state;\n$_SESSION['zipcode'] =$zipcode;\n$_SESSION['country'] =$country;\n\
    $_SESSION['shipping_address_line1'] =$shipping_address_line1;\n$_SESSION['shipping_address_line2']\
    \ =$shipping_address_line2;\n$_SESSION['shipping_city'] =$shipping_city;\n$_SESSION['shipping_state']\
    \ =$shipping_state;\n?>\n</BODY>\n</HTML>\n```"
  raw: '## Understanding Different Payment Modes


    In e-commerce sites, payments for purchased products are processed electronically.
    The main electronic payment modes are:


    *   Credit Cards—A credit card is small plastic card issued by a bank or some
    provider that enables its holder to purchase goods or services on credit. The
    card issuer puts a credit limit and the card holder cannot spend more than that.
    When a card holder purchases something, the card issuer pays on behalf of the
    card holder. The card holder then pays the amount back to the card issuer after
    a specific time period.

    *   Debit Cards—A debit card, like a credit card, is a small plastic card that
    enables the card holder to pay from his bank account. The card holder first needs
    to put money into his bank account and then can pay for the purchased goods or
    services via the debit card. The major difference between debit and credit cards
    is that when you use a debit card, the amount is deducted from your bank account
    immediately. There must be sufficient funds in your bank account for the transaction
    to go through. Where as, in the case of credit cards, even if there is insufficient
    funds in the account, the transaction is completed and the bank pays on behalf
    of the customer.

    *   Smart Cards—Similar to credit and debit cards in appearance, the smart card
    has a small microprocessor chip embedded in it. It stores the customer’s information
    along with the monetary information. The monetary information is updated when
    the customer makes purchases.

    *   E-Money—In this mode of payment, the amount is transferred from one financial
    body to another directly, without involvement of any card company in the middle.

    *   Electronic Fund Transfer—This is an electronic payment method that transfers
    money from one bank account to another. Fund transfer can be done using ATMs (Automated
    Teller Machines) or using a computer. To transfer funds on a computer, the customer
    needs to register on the bank website. After signing in, they can make a request
    to transfer a certain amount to the seller’s account. The bank transfers the amount
    to the specified account if it is in the same bank; otherwise, the request is
    transferred to ACH (Automated Clearing House).

    *   Cash on Delivery Transactions (COD)—The payments in this mode are made directly
    from the customer to the seller.

    *   Netbanking—The customer using this method pays money to the e-commerce site
    from their accounts by supplying a netbanking ID and PIN. No card is required
    for this method of payment.


    Note


    E-commerce sites collect money from consumers through a service provider known
    as a payment gateway provider. A payment gateway is an e-commerce application
    service provider that processes credit card and other card payments. It acts as
    a bridge between the consumer who is making purchases and the bank that issued
    the credit card. Payment gateways provide a safer platform for money exchanges
    to take place. In cash on delivery (COD) transactions, payment gateway is not
    involved because the payments are made directly from the customer to the seller.


    ### Making Payments


    After choosing products to purchase, the next step is to pay for them. The `purchase.php`
    script prompts the visitor to supply payment information.


    To accept payments online through credit and debit cards, you can use several
    online payment processing services. I am using the `2CheckOut.com` service in
    my `purchase.php` script, as shown in Listing [4-7](#A978-1-4842-1672-9_4_Chapter.html#FPar12).
    Visit [`https://www.2checkout.com/`](https://www.2checkout.com/) to learn more.


    JQuery


    The code shown in Listing [4-7](#A978-1-4842-1672-9_4_Chapter.html#FPar12) makes
    use of jQuery, so let’s take a quick look at jQuery.


    jQuery is a lightweight, feature-rich JavaScript library. It makes it easier to
    apply JavaScript on your site. In fact, many complex tasks like traversing HTML
    elements, implementing animation, handling events, etc. can be easily applied
    to your site just by using jQuery methods. Here are a few of jQuery’s features:


    *   jQuery makes it quite easy to select DOM elements and manipulate them as required.

    *   jQuery is capable of sensing different events on HTML elements and then taking
    actions accordingly.

    *   jQuery enables you to apply AJAX to your site, thus making it highly responsive.

    *   jQuery includes several built-in animation effects that can be directly applied
    to your site.

    *   jQuery is supported by most major browsers, including IE 6.0+, FF 2.0+, Safari
    3.0+, Chrome, and Opera 9.0+.


