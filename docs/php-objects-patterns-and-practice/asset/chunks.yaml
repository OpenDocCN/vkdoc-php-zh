    \ name = ? WHERE id = ?\n    [1] => Array\n        (\n            [0] => The Happy\
    \ Hairband\n            [1] => 334\n        )\n)\n```\n\nYou can see a similar\
    \ structure for `SelectionFactory` classes. Here is the base class:"
