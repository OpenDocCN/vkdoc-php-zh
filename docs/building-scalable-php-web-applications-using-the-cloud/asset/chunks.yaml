  trans: '

    进行配置更改后，点击“应用”将使用指定的更改重新部署您的应用程序，这可能需要几分钟时间。如果您的运行中应用程序出现问题，可以前往“日志”部分，下载并查看最新的日志消息。


    # 11. 使用谷歌云平台


    既然您已经对多家云服务商有了一定的经验，我希望您能意识到，不同云服务商提供的基本组件并没有太大差异。每个服务商可能会用不同的名称、在设置过程中有细微差别，或者相比其他服务商拥有一些额外的功能或限制。然而，其核心，即
    IaaS 云托管的基本要素在不同服务商之间是相当相似的。这本身就是 IaaS 的一个优势。这意味着，如果你想从一个 IaaS 迁移到另一个，过程实际上相当直接。虽然需要规划和执行时间，但由于节点本身在你的控制之下，你可以使各个环境彼此非常相似。


    我们要看的下一家服务商是谷歌云平台（GCP）。GCP 是后起之秀，成立于 2008 年（Linode 始于 2003 年，AWS 于 2006 年上线）。GCP
    与 AWS 非常相似，尽管配置起来稍微复杂一些。你可以通过注册 [`https://cloud.google.com`](https://cloud.google.com)
    来开始使用 GCP。


    ![../images/487291_1_En_11_Chapter/487291_1_En_11_Fig1_HTML.jpg](img/487291_1_En_11_Fig1_HTML.jpg)


    图 11-1 GCP 欢迎界面


    ## 11.1 设置模板节点


    关于 GCP，首先要了解的是，所有内容都组织在“项目”中。每个项目有点像自己的账户，拥有各自的资源、服务等，但都可以在同一个登录账户下访问。当你登录谷歌云平台时，界面应该类似于图
    11-1。注意顶部栏中，“Google Cloud Platform”文字旁边列出了你当前项目的名称。你可以点击当前项目来切换项目或创建一个新项目。在本例中，我将创建一个名为
    `Book Examples Project` 的新项目。


    屏幕左侧列出了 GCP 的服务。要创建新机器，请前往服务的“计算”部分，点击“Compute Engine”，然后点击“VM 实例”。GCP 将其机器（或
    Linode 所称的节点）称为“VM 实例”。要创建新机器，请点击“创建实例”按钮。这将弹出一个类似于图 11-2 的屏幕。


    我们将这台机器命名为 `template-node`，并选择最小的机器类型（本例中为 `f1-micro`）。对于启动磁盘，我们选择 CentOS 7。向下滚动时，有一个“防火墙”部分。请确保“允许
    HTTP 流量”和“允许 HTTPS 流量”都已启用。其余默认设置可以保持不变。一切设置完成后，点击“创建”，GCP 将为您创建一台新机器，并返回到 VM
    列表屏幕。


    ![../images/487291_1_En_11_Chapter/487291_1_En_11_Fig2_HTML.jpg](img/487291_1_En_11_Fig2_HTML.jpg)


    图 11-2 创建 GCP VM 实例


    创建机器后，您可以使用“连接”选项登录。在“连接”列的下拉菜单中，选择“在浏览器窗口中打开”，它将在您的浏览器中为您提供一个 `ssh` 会话。


    此 CentOS 安装与 Linode 安装非常相似，不同之处在于：(a) 它不包含 `nano`（您可以通过简单的命令 `yum install -y nano`
    修复），以及 (b) 它会自动为您创建一个用户并以该用户身份登录。您可以通过运行以下命令轻松切换到 root：


    ```

    sudo su -

    ```


    从那时起，您可以安装 `nano` 并执行第 3 章和第 4 章中概述的所有配置步骤，这些步骤本质上是相同的。


    ![../images/487291_1_En_11_Chapter/487291_1_En_11_Figa_HTML.jpg](img/487291_1_En_11_Figa_HTML.jpg)


    ### 公网与私有 IP 地址


    GCP 和 Linode 之间的一个有趣区别是，在 Linode 上，节点的公网 IP 地址是物理连接到节点的。也就是说，当你执行 `ip addr show`
    时，它会显示公网 IP 地址。当你添加一个私有 IP 地址时，它会将该私有 IP 地址添加到你的节点。


    然而，在 GCP 中，您的节点*初始*就同时拥有私有地址和公有地址。但是，只有私有地址是物理映射到设备的。公网 IP 地址是在网络设备上配置的，用于将这些请求转发到您的机器。


    因此，在您机器上的所有配置中，您将使用机器上的私有 IP 地址。此外，您无需担心仅监听私有 IP 地址的问题，因为您实际拥有的也只有它。GCP 网络控制着哪些服务可以从外部访问您的机器（这就是为什么在设置
    VM 实例时勾选了 HTTP 和 HTTPS 复选框——以告知 GCP 将这些类型的请求路由到您的私有 IP 地址）。


    基本上，除非另有指定，GCP 中的所有内容都限制在本地网络中。


    ## 11.2 设置数据库服务器以实现远程访问


    为了将我们的 `template-node` 用作数据库服务器，我们需要准备该机器以实现数据库的远程访问。为此，我们需要执行以下操作：


    1.  修改 `/var/lib/pgsql/data/postgresql.conf` 并设置 `listen_addresses=''*''`。我们*不必*将其专门设置为私有
    IP 地址，因为这是我们仅有的 IP 地址，而且除非我们配置 GCP 允许，否则它无法从互联网访问。使用 `systemctl restart postgresql`
    重启 PostgreSQL 以使更改生效。


    2.  更改防火墙，以便允许连接到 PostgreSQL 服务器。这需要使用命令 `firewall-cmd --add-port 5432/tcp` ，以及带有
    `--permanent` 标志的相同命令。


    3.  修改 PHP 代码 `getReadOnlyConnection()` 和 `getReadWriteConnection()`，使其连接到正确的私有
    IP 地址。


    现在，该服务器已准备好供负载均衡集群使用。

    '
- fmt: '# 11.3 Creating a Replication Image


    Creating a replication image in GCP is a somewhat overly complicated three-step
    process. First you need to create a “snapshot” of your instance, then you need
    to create an “image” out of that snapshot, and finally you will need to create
    an “instance template.” The snapshot is essentially a backup of a machine. The
    image is essentially a snapshot that is intended to be used for creating new boot
    images for machines. Finally, the instance template combines an image together
    with machine settings (size, configuration, etc.) that can be used to very quickly
    deploy identical machines.


    Creating a snapshot is a fairly straightforward process. From the main menu (click
    the three bars next to where it says “Google Cloud Platform”), go to the “Compute”
    section, choose “Compute Engine,” and then choose “Snapshots.” Click the “Create
    Snapshot” button. It will ask for a name for your snapshot, a source disk, and
    location. Name it whatever you wish, choose your existing VM Instance as the source
    disk, and you can leave the location alone (“Multi-regional” is the most flexible
    choice). Click “Create” and GCP will create a new snapshot for you.


    Now, GCP does allow you to create instances out of snapshots. However, to make
    use of even more features of GCP, it is best to create what GCP calls an “image”
    out of your snapshot. In order to do this, go to the main menu, then the “Compute”
    section, choose “Compute Engine,” and then choose “Images.” It will load with
    a huge list of preconfigured images. You can ignore those. We want to make our
    own image. Click the “Create Image” button to get started.


    Give the image a name (e.g., `template-image`) and set the “Source” to be “Snapshot.”
    This will bring up a menu asking which snapshot you want to create the image from.
    Choose the snapshot that you just created. If you want, you can add in a “Family”
    name. This will enable you to create updated versions of this instance which carry
    the same “Family” name.


    Now click “Create.” From here you can create new machines from the image. When
    creating a new machine, under “Boot Disk,” your image will be available under
    the “Custom Images” tab.


    Finally, we need to package this image into an instance template. Instance templates
    are found under the main menu under “Compute Engine” and “Instance Templates.”
    The process for creating an instance template is the same as for creating a regular
    VM Instance. The difference is that it will not immediately create any instances,
    but instead can be used later to quickly deploy fully preconfigured machines.
    Be sure when creating your instance template that you set the Boot Image to be
    the image you just created in the previous step.


    ![../images/487291_1_En_11_Chapter/487291_1_En_11_Figb_HTML.jpg](images/487291_1_En_11_Chapter/487291_1_En_11_Figb_HTML.jpg)


    ## Being More Careful with our Template


    Just as a note, because we set up the database on the machine that became our
    template, each new web server in the cluster will actually have an unused copy
    of the database with PostgreSQL running on it. This isn’t a problem per se, but
    if you were going to make a production deployment, you would probably want to
    be sure that PostgreSQL was turned off on the template. Since GCP has a lot of
    steps anyway, the goal of this chapter was to reduce the number of steps you had
    to achieve in order to get a running configuration.


    # 11.4 Creating Load-Balanced Groups


    However, you can also create an automatically scaling, load-balanced group of
    machines called an “instance group.” This is similar to what we did in Chapter
    [5](#487291_1_En_5_Chapter.xhtml), but GCP will actually manage scaling your app
    for you. In other words, as the load on your machines increases, GCP will automatically
    boot new, identical machines and add them under the load balancer.


    ![../images/487291_1_En_11_Chapter/487291_1_En_11_Fig3_HTML.jpg](images/487291_1_En_11_Chapter/487291_1_En_11_Fig3_HTML.jpg)


    *Figure 11-3 Creating an Instance Group*


    You can find instance groups on the main menu under “Compute Engine.” Click “Create
    Instance Group” to start the process. Figure [11-3](#487291_1_En_11_Chapter.xhtml#Fig3)
    shows what the process looks like.


    Give your instance group a name. To ensure increased failure tolerance, select
    “Multiple Zones” under Location. Select the instance template that we created
    in Section 11.3. Be sure that “Autoscaling” is set to “On.” If you like, you can
    set the minimum number of instances to be higher than one, in order to make sure
    that GCP is load balancing your app across multiple servers. Click “Create” to
    build your instance group.


    By default, the instance group does very little. What we need is a way to bring
    traffic to the instance group. This is done with a load balancer.


    To create a load balancer, under the main menu, look for “Network Services,” and
    then “Load Balancing.” Click “Create Load Balancer” to get started. Next choose
    “HTTP(S) Load Balancing.” Next choose “From Internet to My VMs” since we want
    this load balancer to serve as the gateway between the Internet and your machines.


    The next screen gives you the main areas of configuration. First, give your balancer
    a name. Next, under “Backend Configuration,” select “Backend Services” and then
    “Create a Backend Service.” You will need to name your backend service (the name
    doesn’t really matter), then choose your instance group, and then create a health
    check (the health check just needs to be set to TCP port 80). Then click “Create”
    and it will create your backend service. You can leave “Host and path rules” and
    “Frontend configuration” to their default values. Click “Review and Finalize”
    to see all of your settings. Finally, click “Create” to build your load balancer.
    You can access the generated IP address, and it will balance the load across your
    machines.


    Keep in mind that GCP takes quite a while to actually finish creating your load
    balancer. Even after GCP “thinks” that it is all the way created, and tells you
    that all of the instances have been added to the load balancer, it still takes
    several minutes for this actually to be the case. So, for the first several minutes
    that your load balancer is active, GCP may report errors when accessing URLs.


    ![../images/487291_1_En_11_Chapter/487291_1_En_11_Figc_HTML.jpg](images/487291_1_En_11_Chapter/487291_1_En_11_Figc_HTML.jpg)


    ## Removing Load Balancers


    Removing a GCP load balancer is harder than it seems it should be. To remove a
    load balancer that we have created in this way, we need to do the following:


    1. Delete the load balancer itself from the list of load balancers.

    2. On the load balancer listing screen, there is a tab called “Backends.” Click
    that to view your backend services.

    3. Under the “Backends” tab, click the backend you created for your load balancer,
    and delete that.

    4. Now your balancer is removed, but you also need to get rid of your instance
    groups as well, or else you will continue to be charged for your machines (you
    won’t be able to remove your instances or instance groups before the other steps
    are done).

    5. If you want to not be charged for your image, you will also have to delete
    your instance template, and then delete your image, as well as your snapshot.


    # 11.5 Other GCP Services


    GCP, like AWS, has a number of other services that can be useful when creating
    cloud applications. Several similar services include:


    * Cloud SQL (similar to RDS)

    * Storage (similar to S3)

    * Memorystore (similar to ElastiCache)'
