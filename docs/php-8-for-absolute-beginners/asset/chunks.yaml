    ## Summary


    We covered a lot of ground in this chapter. We learned how to write HTML forms.
    HTML forms can encode URL variables when they are submitted. URL variables are
    passed from the browser to the web server with a GET HTTP request. We also learned
    that we could pass variables using the POST HTTP request which passes the variables
    to the server memory. Actually, the request creates an array that contains the
    information passed. We learned how to retrieve the information passed into our
    PHP programs by using `$_GET` or `$_POST`. We discovered how to organize our code
    and control the flow of our program with named functions. We dug deeper into object-oriented
    programming by securing our information stored in a class with the `private` access
    modifier, and the use of a constructor, and getter and setter methods. But most
    important, we learned how Curly’s law can be applied to enhance the logic and
    efficiency of our code.


    ## Exercises


    1. If you are familiar with CSS, create an external style sheet to control the
    look and design of the pages we have created. Link the style sheet to the index
    page (see Chapter 2 for hints). Make any additional adjustments needed. Don’t
    forget to test your pages in more than one browser. Sometimes, CSS can behave
    differently in different browsers.


    2. Redesign the dynamic quiz. Add additional questions and additional question
    formats. How would we create multiple-choice questions, True/False questions,
    or short answer questions? This will require some research to determine the use
    of other HTML form input objects. If you are unfamiliar with them, you can find
    additional information on `www.w3schools.com` or on YouTube.com. Adjust the output
    that is produced from the quiz results to be more meaningful.


    3. Create another HTML form that can calculate a person’s body mass index (BMI),
    based on the person’s height and weight. The formula for calculating BMI follows.
    The task is to create a form, on which users can input height and weight, and
    to write some PHP code to calculate BMI based on the input. There are examples
    on the Web to help guide you. But attempt to complete it yourself before looking
    for possible solutions.


    ```

    //metric

    bmi = kg/ (2 * m)

    //for UK and US readers

    bmi = ( lb/(2 * in) ) * 703

    ```


    4. Create a form that converts money from one currency to another. If you want
    it to be really advanced, you could have a `<select>` element with a list of possible
    currencies to convert. Again, there are example programs on the Web, but first,
    attempt it yourself before looking at these examples.


    ## 4. Building a Dynamic Image Gallery


    ### Objectives


    After completing this chapter, you will be able to


    * Set up a dynamic site

    * Create named functions

    * Use `$_GET` and `$_POST` superglobal arrays

    * Create and iterate with a `foreach` loop

    * Use PHP’s `glob` to limit access to specific file types

    * Write custom object methods

    * Upload files with PHP’s `$_FILES` superglobal array


    We now know how to make a simple dynamic website. We also know how to create a
    dynamic form. We learned how to access URL variables with `$_GET` or `$_POST`.
    It is time to put our new knowledge to good use. Let us build a dynamic image
    gallery with a form to allow users to upload new images to the gallery. Along
    the way, we will discover how to upload files, use loops, and improve our ability
    to create dynamic websites.


    ### Setting Up a Dynamic Site


    Let us make a new project folder called `ch4`. We can then copy the folders and
    the PHP files from the publisher’s website into these locations. Of course, you
    can also create the files as you move through the chapter. Practice makes perfect.
    If you choose to do so, you will need to create several folders: `classes`, `views`,
    `templates`, and `imgs`.


    ### Prerequisites: A Folder with Some Images


    Our image gallery needs some images. We will restrict this image gallery to use
    JPEG images only. Let us prepare a small handful of JPEG images for the gallery.
    These images will reside in the `img` folder.


    ### Copyright Laws


    As a developer, we must be aware of the *copyright laws* for any country in which
    our site might be used. We must respect and abide by these laws. In the United
    States, images very often are copyrighted, which means we must ask permission
    of the owner to use the image. There are some exceptions, including educational
    purposes. However, we should not get in the habit of just grabbing whatever image
    we like.


    How can we tell if an image is copyrighted?


    ![](images/323857_3_En_4_Chapter/323857_3_En_4_Fig1_HTML.jpg)


    The image reflects how google is represented when we are searching green pig in
    the search bar.


    **Figure 4-1** Google Search for green pig


    In Google, the `Tools` menu selection allows you to narrow down your image search
    related to the type of restrictions for their use. However, this is not a perfect
    method (even Google agrees). Once you have discovered an image that might not
    be copyrighted, visit the website that contains the image. Find the copyright
    information on the site. If you still are unsure, email the owner of the website
    to obtain permission to use the image. Once you get a response (if you do), save
    that email. It can keep you out of hot water later.


    The safest method to obtain noncopyright images is to search for noncopyright
    image sites on the Web. There are lots of sites out there. Some are free and some
    charge a small fee. The fee is well worth the money to avoid any future problems!


    **Exercise**: Search the Web for copyright laws in the country, region, and/or
    state in which you live. How are these different from other areas? Remember, you
    must follow all the copyright laws for countries that may use your website. Search
    the Web and find a handful of noncopyrighted images for use in the photo gallery
    we are about to create.


    By the way, we are sticking to a site architecture that was used in the previous
    chapters. This will make it easier to reuse code from previous projects. Reusing
    existing code will help develop reliable solutions faster. Let us get started!


