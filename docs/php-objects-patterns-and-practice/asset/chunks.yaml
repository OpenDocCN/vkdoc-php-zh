- fmt: '### Accessing Host Class Properties


    You might assume that static methods are really the only way to go as far as traits
    are concerned. Even trait methods that are not declared static are essentially
    static in nature, right? Well, wrong, in fact—you can access properties and methods
    in a host class:


    ```

    // listing 04.36

    trait PriceUtilities

    {

    function calculateTax(float $price): float

    {

    // is this good design?

    return (($this->taxrate / 100) * $price);

    }

    // other utilities

    }

    // listing 04.37

    class UtilityService extends Service

    {

    public $taxrate = 17;

    use PriceUtilities;

    }

    // listing 04.38

    $u = new UtilityService();

    print $u->calculateTax(100) . "\n";

    ```


    In the preceding code, I amend the `PriceUtilities` trait so that it accesses
    a property in its host class. If you think that this is bad design, you’re right.
    It’s spectacularly bad design. Although it’s useful for the trait to access data
    set by its host class, there is nothing to require the `UtilityService` class
    to actually provide a `$taxrate` property. Remember that traits should be usable
    across many different classes. What is the guarantee or even the likelihood that
    any host classes will declare a `$taxrate`?


    On the other hand, it would be great to be able to establish a contract that says,
    essentially, “If you use this trait, then you must provide it certain resources.”


    In fact, you can achieve exactly this effect. Traits support abstract methods.


    ### Defining Abstract Methods in Traits


    You can define abstract methods in a trait in just the same way you would in a
    class. When a trait is used by a class, it takes on the commitment to implement
    any abstract methods it declares.


    Armed with this knowledge, I can reimplement my previous example so that the trait
    forces the using class to provide tax rate information:


    ```

    // listing 04.39

    trait PriceUtilities

    {

    function calculateTax(float $price): float

    {

    // better design.. we know getTaxRate() is implemented

    return (($this->getTaxRate() / 100) * $price);

    }

    abstract function getTaxRate(): float;

    // other utilities

    }

    // listing 04.40

    class UtilityService extends Service

    {

    use PriceUtilities;

    public function getTaxRate(): float

    {

    return 17;

    }

    }

    // listing 04.41

    $u = new UtilityService();

    print $u->calculateTax(100) . "\n";

    ```


    By declaring an abstract `getTaxRate()` method in the `PriceUtilities` trait,
    I force the `UtilityService` class to provide an implementation. Of course, since
    PHP does not constrain return types, the `UtilityService::calculateTax()` method
    cannot be absolutely certain it’s going to get a sane value from `getTaxRate()`.
    You could overcome this to some extent by writing all sorts of checking routines,
    but this misses the point. It is probably adequate just to signal to a client
    coder that she should provide certain information by requiring the implementation
    of a method or two.


    ### Changing Access Rights to Trait Methods


    You can, of course, declare a trait method `public`, `private`, or `protected`.
    However, you can also change this access from within the class that uses the trait.
    You have already seen that the `as` operator can be used to alias a method name.
    If you use an access modifier on the right-hand side of this operator, it will
    change the method’s access level rather than its name.


    Imagine, for example, you would like to use `calculateTax()` from within `UtilityService`,
    but not make it available to implementing code. Here’s how you would change the
    `use` statement:


    ```

    // listing 04.42

    trait PriceUtilities

    {

    public function calculateTax(float $price): float

    {

    return (($this->getTaxRate() / 100) * $price);

    }

    public abstract function getTaxRate(): float;

    // other utilities

    }

    // listing 04.43

    class UtilityService extends Service

    {

    use PriceUtilities {

    PriceUtilities::calculateTax as private;

    }

    private $price;

    public function __construct(float $price)

    {

    $this->price = $price;

    }

    public function getTaxRate(): float

    {

    return 17;

    }

    public function getFinalPrice(): float

    {

    return ($this->price + $this->calculateTax($this->price));

    }

    }

    // listing 04.44

    $u = new UtilityService(100);

    print $u->getFinalPrice() . "\n";

    ```


    I deploy the `as` operator in conjunction with the `private` keyword in order
    to set private access to `calculateTax()`. This means I can access the method
    from `getFinalPrice()`. Here’s an external attempt to access `calculateTax()`:


    ```

    $u = new UtilityService(100);

    print $u->calculateTax()."\n";

    ```


    Unfortunately, this code will generate an error:


    ```

    Error: Call to private method popp\ch04\batch06_9\UtilityService::calculateTax()
    from context ...

    ```'
