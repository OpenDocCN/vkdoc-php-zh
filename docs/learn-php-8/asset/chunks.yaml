    - **安全性与性能**——程序过滤掉从应用程序外部接收到的任何可能有害的信息至关重要。在有害数据被使用或保存之前，先将其移除或拒绝，要容易得多。在当今发生重大安全漏洞的情况下，这是绝对必须做的。


