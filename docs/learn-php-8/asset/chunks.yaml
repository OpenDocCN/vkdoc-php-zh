    \ browsers that\nhave not implemented the HTML5 techniques (or all of HTML5) will\
    \ treat\nthe objects (such as text boxes) as if they were normal nonvalidation\n\
    objects. The information in the boxes will be accepted without any\nverification.\
    \ However, the PHP program on the server will also validate\ndata.\n\n*   *Security\
    \ and performance—Secure programming is just part of\n    the complete process\
    \ of protecting your information. The files,\n    directories, servers, networks,\
    \ and databases must also be properly\n    secured. In addition, any highly important\
