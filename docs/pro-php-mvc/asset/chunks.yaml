- fmt: "# Understanding Configuration Drivers\n\nBecause our factory allows many different\
    \ kinds of configuration driver classes to be used, we need a way to share code\
    \ across all driver classes. We achieve this by making our driver classes inherit\
    \ from this base driver class, as demonstrated in Listing 4-7.\n\n***Listing 4-7.***\
    \ The `Configuration\\Driver` Class\n\n```\nnamespace Framework\\Configuration\n\
    {\n    use Framework\\Base as Base;\n    use Framework\\Configuration\\Exception\
    \ as Exception;\n\n    class Driver extends Base\n    {\n        protected $_parsed\
    \ = array();\n\n        public function initialize()\n        {\n            return\
    \ $this;\n        }\n\n        protected function _getExceptionForImplementation($method)\n\
    \        {\n            return new Exception\\Implementation(\"{$method} method\
    \ not implemented\");\n        }\n    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 4 ■ CONFIGURATION\n\nWe could get even more technical by using Interface\
    \ definitions to enforce driver behavior, but we are already raising detailed\
    \ implementation exceptions for calls to methods that haven’t been implemented,\
    \ which is enough for now. There are two basic methods for parsing our configuration\
    \ files, which are demonstrated in Listings 4-8 and 4-9.\n\n***Listing 4-8.***\
    \ `ArrayMethods::toObject()` Method\n\n```\nnamespace Framework\n{\n    class\
    \ ArrayMethods\n    {\n        private function __construct()\n        {\n   \
    \         // do nothing\n        }\n\n        private function __clone()\n   \
    \     {\n            // do nothing\n        }\n\n        public static function\
    \ toObject($array)\n        {\n            $result = new \\stdClass();\n     \
    \       foreach ($array as $key => $value)\n            {\n                if\
    \ (is_array($value))\n                {\n                    $result->{$key} =\
    \ self::toObject($value);\n                }\n                else\n         \
    \       {\n                    $result->{$key} = $value;\n                }\n\
    \            }\n            return $result;\n        }\n    }\n}\n```\n\n***Listing\
    \ 4-9.*** `Configuration\\Driver\\Ini parse()` Method\n\n```\nnamespace Framework\\\
    Configuration\\Driver\n{\n    use Framework\\ArrayMethods as ArrayMethods;\n \
    \   use Framework\\Configuration as Configuration;\n    use Framework\\Configuration\\\
    Exception as Exception;\n\n    class Ini extends Configuration\\Driver\n    {\n\
    \        public function parse($path)\n        {\n            if (empty($path))\n\
    \            {\n                throw new Exception\\Argument(\"\\$path argument\
    \ is not valid\");\n            }\n\n            if (!isset($this->_parsed[$path]))\n\
    \            {\n                $config = array();\n                ob_start();\n\
    \                include(\"{$path}.ini\");\n                $string = ob_get_contents();\n\
    \                ob_end_clean();\n                $pairs = parse_ini_string($string);\n\
    \n                if ($pairs == false)\n                {\n                  \
    \  throw new Exception\\Syntax(\"Could not parse configuration file\");\n    \
    \            }\n\n                foreach ($pairs as $key => $value)\n       \
    \         {\n                    $config = $this->_pair($config, $key, $value);\n\
    \                }\n\n                $this->_parsed[$path] = ArrayMethods::toObject($config);\n\
    \            }\n\n            return $this->_parsed[$path];\n        }\n    }\n\
    }\n```\n\nThe only public method in our INI configuration parser class is a method\
    \ called `parse()`. It first checks to see that the `$path` argument is not empty,\
    \ throwing a `Configuration\\Exception\\Argument` exception if it is. Next, it\
    \ checks to see if the requested configuration file has not already been parsed,\
    \ and if it has it jumps right to where it returns the configuration.\n\nIf it\
    \ has not parsed the required configuration file, it uses output buffering to\
    \ capture the contents of a call to `include()` the configuration file’s contents.\
    \ Using the `include()` method allows the configuration to be sitting anywhere\
    \ relative to the paths in PHP’s include path, though we will usually be loading\
    \ them from a standard configuration folder.\n\nIt then parses the string contents\
    \ of the configuration file using PHP’s `parse_ini_string()` method, which returns\
    \ an associative array of keys and values, stored in the `$pairs` variable. If\
    \ nothing was returned to `$pairs`, we assume the configuration file contained\
    \ invalid syntax, and raise a `Configuration\\Exception\\Syntax` exception.\n\n\
    If it did return an associative array, we loop through the array, generating the\
    \ correct hierarchy (using the `_pair()` method), finally converting the associative\
    \ array to an object and caching/returning the configuration file data. You can\
    \ see an example of using the `_pair()` method in Listing 4-10.\n\n***Listing\
    \ 4-10.*** The `_pair()` Method\n\n```\nnamespace Framework\\Configuration\\Driver\n\
    {\n    use Framework\\ArrayMethods as ArrayMethods;\n    use Framework\\Configuration\
    \ as Configuration;\n    use Framework\\Configuration\\Exception as Exception;\n\
    \n    class Ini extends Configuration\\Driver\n```"
