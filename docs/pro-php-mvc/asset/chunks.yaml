    Questions


    1\. In previous chapters, we stored all of a user’s information in session variables,
    but in this chapter we slimed it down to just storing a user’s id property. Can
    you think of any advantages to this approach?


    2\. In this chapter, we also developed a means of automatically storing the user
    in the session by overriding/modifying some Shared\Controller methods. Can you
    think of any advantages of this approach?


    3\. Can you think of any other user-submitted data that we could build administration
    interfaces for?


    Answers


    1\. Apart from the stated security benefit of not keeping items such as e-mail
    address and password in the session variables, it also speeds up storage/retrieval
    at the cost of extra database queries. We could also use cache to cut down on
    these extra queries.


    2\. We saw that this automatic storage/retrieval helped us to work with the user
    session, without the hassle of getting/setting the session details each time we
    worked with it.


