    \ PHP 解决方案 5-9 中了解更多关于此错误的信息。\n\nPHP 解决方案 5-3 中使用的 `basename()` 函数接受一个可选的第二个参数：一个包含文件名扩展名（前面带句点）的字符串。添加第二个参数会从文件名中去除扩展名。因此，这段代码提取文件名，去除\
