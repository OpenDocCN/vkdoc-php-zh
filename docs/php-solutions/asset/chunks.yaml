- fmt: "### PHP Solution 6-2: Creating the basic file upload class\n\nIn this PHP\
    \ solution, you’ll create the basic definition for a class called `Upload` to\
    \ handle file uploads. You’ll also create an instance of the class (an `Upload`\
    \ object) and use it to upload an image. Give yourself plenty of time to go through\
    \ the following steps. They’re not difficult, but they introduce concepts that\
    \ might be unfamiliar if you have never worked with PHP classes.\n\nCreate a subfolder\
    \ called `PhpSolutions` in the `phpsols` site root folder. Use the same combination\
    \ of uppercase and lowercase letters in the folder name. Create a subfolder called\
    \ `File` (with an uppercase F) in the `PhpSolutions` folder. In the new `PhpSolutions/File`\
    \ folder, create a file called `Upload.php`. Again, use the same combination of\
    \ uppercase and lowercase letters in the filename. Then insert the following code:\n\
    \n```php\n<?php\n\nnamespace PhpSolutions\\File;\n\nclass Upload {\n\n}\n```\n\
    \nAll the remaining code goes between the curly braces. This file will contain\
    \ only PHP code, so you don’t need a closing PHP tag.\n\nPHP classes hide their\
    \ inner workings by declaring some variables and functions as `protected`. If\
    \ you prefix a variable or function with the keyword `protected`, it can be accessed\
    \ only inside the class or a subclass. This prevents values from being changed\
    \ accidentally.\n\nThe `Upload` class needs protected variables for the following\
    \ items:\n\n- Path to the upload folder\n- Maximum file size\n- Messages to report\
    \ the status of uploads\n- Permitted MIME types\n\nCreate the variables by adding\
    \ them inside the curly braces, like this:\n\n```php\nclass Upload {\n\n    protected\
    \ $destination;\n\n    protected $max = 51200;\n\n    protected $messages = [];\n\
    \n    protected $permitted = [\n        'image/gif',\n        'image/jpeg',\n\
    \        'image/pjpeg',\n        'image/png'\n    ];\n\n}\n```\n\nThese properties\
    \ can be accessed elsewhere in the class using `$this->`, which refers to the\
    \ current object. For example, inside the class definition, you access `$destination`\
    \ as `$this->destination`.\n\n**Note:** When you first declare a property inside\
    \ a class, it begins with a dollar sign like any other variable. However, you\
    \ omit the dollar sign from the property name after the `->` operator.\n\nWith\
    \ the exception of `$destination`, each protected property has been given a default\
    \ value:\n\n- `$max` sets the maximum file size to 50 KB (51200 bytes).\n- `$messages`\
    \ is an empty array.\n- `$permitted` contains an array of image MIME types.\n\n\
    The value of `$destination` will be set when an instance of the class is created.\
    \ The other values will be controlled internally by the class, but you’ll also\
    \ create functions (or methods, as they’re called in classes) to change the values\
    \ of `$max` and `$permitted`.\n\nWhen you create an instance of a class (an object),\
    \ the class definition file automatically calls the class’s constructor method,\
    \ which initializes the object. The constructor method for all classes is called\
    \ `__construct()` (with two underscores). Unlike the properties you defined in\
    \ the previous step, the constructor needs to be accessible outside the class,\
    \ so you precede its definition with the `public` keyword.\n\n**Note:** The `public`\
    \ and `protected` keywords control the visibility of properties and methods. Public\
    \ properties and methods can be accessed anywhere. Any attempt to access protected\
    \ properties or methods outside the class definition or a subclass triggers a\
    \ fatal error.\n\nThe constructor for the `Upload` class takes as an argument\
    \ the path to the folder where you want to upload the file and assigns it to `$destination`.\
    \ Add the following code after the list of protected properties, making sure it’s\
    \ before the closing curly brace of the class definition:\n\n```php\npublic function\
    \ __construct($path) {\n    if (!is_dir($path) || !is_writable($path)) {\n   \
    \     throw new \\Exception(\"$path must be a valid,writable directory.\");\n\
    \    }\n    $this->destination = $path;\n}\n```\n\nThe conditional statement inside\
    \ the constructor passes `$path` to the `is_dir()` and `is_writable()` functions,\
    \ which check that the value submitted is a valid directory (folder) that is writable.\
    \ If either condition fails, the constructor throws an exception with a message\
    \ indicating the problem.\n\n**Note:** The backslash in front of `Exception` indicates\
    \ that a core PHP command is to be used rather than one defined within the namespace.\
    \ You only need to prefix core commands with a backslash if there’s any ambiguity.\
    \ Classes can define their own exceptions, so it’s necessary here.\n\nIf `$path`\
    \ is okay, it’s assigned the `$destination` property of the current object.\n\n\
    Next, create a public method called `upload()`. This will initiate a series of\
    \ tests on the file before uploading it. Insert this code immediately after the\
    \ constructor method that you defined in the previous step:\n\n```php\npublic\
    \ function upload() {\n    $uploaded = current($_FILES);\n    if ($this->checkFile($uploaded))\
    \ {\n        $this->moveFile($uploaded);\n    }\n}\n```\n\nTo access the file\
    \ in the `$_FILES` array in PHP Solution 6-1, you needed to know the `name` attribute\
    \ of the file input field. The form in `file_upload.php` uses `image`, so you\
    \ accessed the filename as `$_FILES['image']['name']`. But if the field had a\
    \ different name, such as `upload`, you would need to use `$_FILES['upload']['name']`.\
    \ To make the script more flexible, the first line of the `upload()` method passes\
    \ the `$_FILES` array to the `current()` function, which returns the current element\
    \ of an array. As a result, `$uploaded` holds a reference to the first element\
    \ in the `$_FILES` array regardless of the name used in the form. This is the\
    \ first benefit of building generic code. It takes more effort initially, but\
    \ saves time in the end.\n\n**Tip:** `$_FILES` is one of PHP’s superglobal arrays,\
    \ so it’s available in all parts of a script. That’s why there’s no need to pass\
    \ it as an argument to the class constructor method.\n\nThe conditional statement\
    \ in the `upload()` method calls `checkFile()` using the `$this` keyword. The\
    \ `$this` keyword is also used to call functions (methods) defined within the\
    \ class. We need to define `checkFile()` next. For the time being, we’ll assume\
    \ that the file is okay, so `checkFile()` will simply return `true`. Add the following\
    \ code to the class definition:\n\n```php\nprotected function checkFile($file)\
    \ {\n    return true;\n}\n```\n\nPreceding the definition with the `protected`\
    \ keyword means this method can be accessed only inside the class. We’ll return\
    \ to `checkFile()` in PHP Solution 6-3 to add a series of tests before uploading\
    \ the file.\n\n**Tip:** The order of function (method) definitions inside a class\
    \ doesn’t matter, as long as they’re within the curly braces that enclose the\
    \ class. However, it’s common practice to keep all public methods together at\
    \ the top, with protected methods at the bottom.\n\nIf the file passes the series\
    \ of tests, the conditional statement in the `upload()` method passes the file\
    \ to another internal method called `moveFile()`, which is basically a wrapper\
    \ for the `move_uploaded_file()` function that we used in PHP Solution 6-1. The\
    \ code looks like this:\n\n```php\nprotected function moveFile($file) {\n    $success\
    \ = move_uploaded_file($file['tmp_name'],\n        $this->destination . $file['name']);\n\
    \    if ($success) {\n        $result = $file['name'] . ' was uploaded successfully';\n\
    \        $this->messages[] = $result;\n    } else {\n        $this->messages[]\
    \ = 'Could not upload ' . $file['name'];\n    }\n}\n```\n\nIf the upload succeeds,\
    \ `move_uploaded_file()` returns `true`. Otherwise, it returns `false`. By storing\
    \ the return value in `$success`, an appropriate message is stored in the `$messages`\
    \ array.\n\nSince `$messages` is a protected property, you need to create a public\
    \ method to retrieve the contents of the array.\n\n```php\npublic function getMessages()\
    \ {\n    return $this->messages;\n}\n```"
  raw: '#### PHP Solution 6-2: Creating the basic file upload class


    In this PHP solution, you’ll create the basic definition for a class called `Upload`
    to handle file uploads. You’ll also create an instance of the class (an `Upload`
    object) and use it to upload an image. Give yourself plenty of time to go through
    the following steps. They’re not difficult, but they introduce concepts that might
    be unfamiliar if you have never worked with PHP classes.


    Create a subfolder called `PhpSolutions` in the `phpsols` site root folder. Use
    the same combination of uppercase and lowercase letters in the folder name.  
    Create a subfolder called `File` (with an uppercase F) in the `PhpSolutions` folder.
      In the new `PhpSolutions/File` folder, create a file called `Upload.php`. Again,
    use the same combination of uppercase and lowercase letters in the filename. Then
    insert the following code:


    `<?php`


    `namespace PhpSolutions\File;`


    `class Upload {`


    `}`


    All the remaining code goes between the curly braces. This file will contain only
    PHP code, so you don’t need a closing PHP tag.


    PHP classes hide their inner workings by declaring some variables and functions
    as protected. If you prefix a variable or function with the keyword `protected`,
    it can be accessed only inside the class or a subclass. This prevents values from
    being changed accidentally.


    The `Upload` class needs protected variables for the following items:


    *   Path to the upload folder

    *   Maximum file size

    *   Messages to report the status of uploads

    *   Permitted MIME types


    Create the variables by adding them inside the curly braces, like this:


    `class Upload {`


    `protected $destination;`


    `protected $max = 51200;`


    `protected $messages = [];`


    `protected $permitted = [`


    `''image/gif'',`


    `''image/jpeg'',`


    `''image/pjpeg'',`


    `''image/png''`


    `];`


    `}`


    These properties can be accessed elsewhere in the class using `$this->`, which
    refers to the current object. For example, inside the class definition, you access
    `$destination` as `$this->destination`.


    Note


    When you first declare a property inside a class, it begins with a dollar sign
    like any other variable. However, you omit the dollar sign from the property name
    after the `->` operator.


    With the exception of `$destination`, each protected property has been given a
    default value:


    *   `$max` sets the maximum file size to 50 KB (51200 bytes).

    *   `$messages` is an empty array.

    *   `$permitted` contains an array of image MIME types.


    The value of `$destination` will be set when an instance of the class is created.
    The other values will be controlled internally by the class, but you’ll also create
    functions (or methods, as they’re called in classes) to change the values of `$max`
    and `$permitted`.


    When you create an instance of a class (an object), the class definition file
    automatically calls the class’s constructor method, which initializes the object.
    The constructor method for all classes is called `__construct()` (with two underscores).
    Unlike the properties you defined in the previous step, the constructor needs
    to be accessible outside the class, so you precede its definition with the `public`
    keyword.   Note


    The `public` and `protected` keywords control the visibility of properties and
    methods. Public properties and methods can be accessed anywhere. Any attempt to
    access protected properties or methods outside the class definition or a subclass
    triggers a fatal error.


    The constructor for the `Upload` class takes as an argument the path to the folder
    where you want to upload the file and assigns it to `$destination`. Add the following
    code after the list of protected properties, making sure it’s before the closing
    curly brace of the class definition:


    `public function __construct($path) {`


    `if (!is_dir($path) || !is_writable($path)) {`


    `throw new \Exception("$path must be a valid,writable directory.");`


    `}`


    `$this->destination = $path;`


    `}`


    The conditional statement inside the constructor passes `$path` to the `is_dir()`
    and `is_writable()` functions, which check that the value submitted is a valid
    directory (folder) that is writable. If either condition fails, the constructor
    throws an exception with a message indicating the problem.


    Note


    The backslash in front of `Exception` indicates that a core PHP command is to
    be used rather than one defined within the namespace. You only need to prefix
    core commands with a backslash if there’s any ambiguity. Classes can define their
    own exceptions, so it’s necessary here.


    If `$path` is okay, it’s assigned the `$destination` property of the current object.


    Next, create a public method called `upload()`. This will initiate a series of
    tests on the file before uploading it. Insert this code immediately after the
    constructor method that you defined in the previous step:


    `public function upload() {`


    `$uploaded = current($_FILES);`


    `if ($this->checkFile($uploaded)) {`


    `$this->moveFile($uploaded);`


    `}`


    `}`


    To access the file in the `$_FILES` array in PHP Solution 6-1, you needed to know
    the `name` attribute of the file input field. The form in `file_upload.php` uses
    `image`, so you accessed the filename as `$_FILES[''image''][''name'']`. But if
    the field had a different name, such as `upload`, you would need to use `$_FILES[''upload''][''name'']`.
    To make the script more flexible, the first line of the `upload()` method passes
    the `$_FILES` array to the `current()` function, which returns the current element
    of an array. As a result, `$uploaded` holds a reference to the first element in
    the `$_FILES` array regardless of the name used in the form. This is the first
    benefit of building generic code. It takes more effort initially, but saves time
    in the end.


    Tip


    `$_FILES` is one of PHP’s superglobal arrays, so it’s available in all parts of
    a script. That’s why there’s no need to pass it as an argument to the class constructor
    method.


    The conditional statement in the `upload()` method calls `checkFile()` using the
    `$this` keyword. The `$this` keyword is also used to call functions (methods)
    defined within the class. We need to define `checkFile()` next. For the time being,
    we’ll assume that the file is okay, so `checkFile()` will simply return `true`.
    Add the following code to the class definition:


    `protected function checkFile($file) {`


    `return true;`


    `}`


    Preceding the definition with the `protected` keyword means this method can be
    accessed only inside the class. We’ll return to `checkFile()` in PHP Solution
    6-3 to add a series of tests before uploading the file.


    Tip


    The order of function (method) definitions inside a class doesn’t matter, as long
    as they’re within the curly braces that enclose the class. However, it’s common
    practice to keep all public methods together at the top, with protected methods
    at the bottom.


    If the file passes the series of tests, the conditional statement in the `upload()`
    method passes the file to another internal method called `moveFile()`, which is
    basically a wrapper for the `move_uploaded_file()` function that we used in PHP
    Solution 6-1\. The code looks like this:


    `protected function moveFile($file) {`


    `$success = move_uploaded_file($file[''tmp_name''],`


    `$this->destination . $file[''name'']);`


    `if ($success) {`


    `$result = $file[''name''] . '' was uploaded successfully'';`


    `$this->messages[] = $result;`


    `} else {`


    `$this->messages[] = ''Could not upload '' . $file[''name''];`


    `}`


    `}`


    If the upload succeeds, `move_uploaded_file()` returns `true`. Otherwise, it returns
    `false`. By storing the return value in success, an appropriate message is stored
    in the `$messages` array.


    Since `$messages` is a protected property, you need to create a public method
    to retrieve the contents of the array.


    `public function getMessages() {`


    `return $this->messages;`


    `}`'
  trans: "\n### PHP 方案 6-2：创建基础文件上传类\n\n在本 PHP 方案中，你将创建一个名为 `Upload` 的类的基本定义来处理文件上传。你还会创建该类的一个实例（一个\
    \ `Upload` 对象），并使用它来上传一张图片。请留出充足的时间来完成以下步骤。这些步骤并不困难，但会介绍一些你可能不熟悉的概念（如果你之前从未接触过\
    \ PHP 类）。\n\n在 `phpsols` 站点根文件夹中创建一个名为 `PhpSolutions` 的子文件夹。文件夹名中的大小写字母组合请与此保持一致。然后在\
    \ `PhpSolutions` 文件夹中创建一个名为 `File`（大写 F）的子文件夹。在新的 `PhpSolutions/File` 文件夹中，创建一个名为\
    \ `Upload.php` 的文件。文件名中的大小写字母组合也请保持正确。然后插入以下代码：\n\n```php\n<?php\n\nnamespace\
    \ PhpSolutions\\File;\n\nclass Upload {\n\n}\n```\n\n所有剩余的代码都放在这对花括号之间。此文件仅包含\
    \ PHP 代码，因此你不需要添加 PHP 结束标签。\n\nPHP 类通过将一些变量和函数声明为 `protected` 来隐藏其内部工作机制。如果你在变量或函数前加上关键字\
    \ `protected`，那么它只能在类内部或子类中被访问。这可以防止值被意外更改。\n\n`Upload` 类需要为以下项目设置受保护的变量：\n\n\
    - 上传文件夹的路径\n- 最大文件大小\n- 报告上传状态的消息\n- 允许的 MIME 类型\n\n通过在花括号内添加它们来创建这些变量，如下所示：\n\
    \n```php\nclass Upload {\n\n    protected $destination;\n\n    protected $max\
    \ = 51200;\n\n    protected $messages = [];\n\n    protected $permitted = [\n\
    \        'image/gif',\n        'image/jpeg',\n        'image/pjpeg',\n       \
    \ 'image/png'\n    ];\n\n}\n```\n\n这些属性可以通过 `$this->` 在类的其他位置访问，`$this` 指向当前对象。例如，在类定义内部，你可以将\
    \ `$destination` 作为 `$this->destination` 来访问。\n\n**注意：** 首次在类内部声明属性时，它和任何其他变量一样以美元符号开头。但是，在\
    \ `->` 运算符之后，你需要省略属性名中的美元符号。\n\n除了 `$destination` 之外，每个受保护的属性都设置了默认值：\n\n- `$max`\
    \ 将最大文件大小设置为 50 KB（51200 字节）。\n- `$messages` 是一个空数组。\n- `$permitted` 包含一个图像 MIME\
    \ 类型数组。\n\n`$destination` 的值将在创建类的实例时被设置。其他值将由类内部控制，但你也会创建函数（或在类中称为方法）来更改 `$max`\
    \ 和 `$permitted` 的值。\n\n当创建类的实例（对象）时，类定义文件会自动调用类的构造函数方法，该方法用于初始化对象。所有类的构造函数方法都叫\
    \ `__construct()`（两个下划线）。与你在上一步中定义的属性不同，构造函数需要在类外部可访问，因此你需要在它的定义前加上 `public` 关键字。\n\
    \n**注意：** `public` 和 `protected` 关键字控制属性和方法的可见性。公有属性和方法可以在任何地方被访问。任何在类定义或子类外部访问受保护属性或方法的尝试都会触发致命错误。\n\
    \n`Upload` 类的构造函数接受一个参数，即你想要上传文件的目标文件夹的路径，并将其赋值给 `$destination`。在受保护属性列表之后，类定义结束花括号之前，添加以下代码：\n\
    \n```php\npublic function __construct($path) {\n    if (!is_dir($path) || !is_writable($path))\
    \ {\n        throw new \\Exception(\"$path 必须是有效且可写的文件夹。\");\n    }\n    $this->destination\
    \ = $path;\n}\n```\n\n构造函数内部的判断语句将 `$path` 传递给 `is_dir()` 和 `is_writable()` 函数，这两个函数检查提交的值是否为一个可写的有效文件夹。如果任一条件不满足，构造函数就会抛出一个异常，并附带一条说明问题的消息。\n\
    \n**注意：** `Exception` 前面的反斜杠表示要使用 PHP 核心命令，而不是在命名空间内定义的。只有在可能存在歧义时，才需要用反斜杠作为核心命令的前缀。类可以定义自己的异常，因此在这里这样做是必要的。\n\
    \n如果 `$path` 没问题，它就会被赋值给当前对象的 `$destination` 属性。\n\n接下来，创建一个名为 `upload()` 的公有方法。该方法将在文件上传之前启动一系列测试。紧接在你之前定义的构造函数方法之后，插入以下代码：\n\
    \n```php\npublic function upload() {\n    $uploaded = current($_FILES);\n    if\
    \ ($this->checkFile($uploaded)) {\n        $this->moveFile($uploaded);\n    }\n\
    }\n```\n\n要访问 PHP 方案 6-1 中 `$_FILES` 数组里的文件，你需要知道文件输入字段的 `name` 属性。`file_upload.php`\
    \ 中的表单使用了 `image`，所以你需要将文件名作为 `$_FILES['image']['name']` 来访问。但是，如果该字段使用了不同的名称，比如\
    \ `upload`，你就需要使用 `$_FILES['upload']['name']`。为了让脚本更灵活，`upload()` 方法的第一行将 `$_FILES`\
    \ 数组传递给 `current()` 函数，该函数返回数组的当前元素。因此，无论表单中使用的名称是什么，`$uploaded` 都持有对 `$_FILES`\
    \ 数组中第一个元素的引用。这是构建通用代码的第一个好处。最初需要付出更多努力，但最终能节省时间。\n\n**提示：** `$_FILES` 是 PHP 的超级全局数组之一，因此在脚本的所有部分都可以使用它。这就是为什么无需将其作为参数传递给类构造函数方法的原因。\n\
    \n`upload()` 方法中的条件语句使用了 `$this` 关键字来调用 `checkFile()`。`$this` 关键字也用于调用在类内部定义的函数（方法）。接下来我们需要定义\
    \ `checkFile()`。现阶段，我们假设文件没问题，因此 `checkFile()` 将简单地返回 `true`。在类定义中添加以下代码：\n\n\
    ```php\nprotected function checkFile($file) {\n    return true;\n}\n```\n\n在定义前加上\
    \ `protected` 关键字意味着此方法只能在类内部访问。我们将在 PHP 方案 6-3 中回到 `checkFile()`，在上传文件之前添加一系列测试。\n\
    \n**提示：** 类内部函数（方法）定义的顺序无关紧要，只要它们都位于包含该类的花括号之内即可。不过，通常的做法是将所有公有方法放在一起置于顶部，而受保护的方法放在底部。\n\
    \n如果文件通过了测试系列，`upload()` 方法中的条件语句会将该文件传递给另一个名为 `moveFile()` 的内部方法，该方法基本上是我们在 PHP\
    \ 方案 6-1 中使用的 `move_uploaded_file()` 函数的一个包装器。代码如下所示：\n\n```php\nprotected function\
    \ moveFile($file) {\n    $success = move_uploaded_file($file['tmp_name'],\n  \
    \      $this->destination . $file['name']);\n    if ($success) {\n        $result\
    \ = $file['name'] . ' 上传成功';\n        $this->messages[] = $result;\n    } else\
    \ {\n        $this->messages[] = '无法上传 ' . $file['name'];\n    }\n}\n```\n\n如果上传成功，`move_uploaded_file()`\
    \ 返回 `true`。否则，返回 `false`。通过将返回值存储在 `$success` 中，相应的消息会被存储到 `$messages` 数组中。\n\
    \n由于 `$messages` 是一个受保护的属性，你需要创建一个公有方法来获取数组的内容。\n\n```php\npublic function getMessages()\
    \ {\n    return $this->messages;\n}\n```\n"
- fmt: "# This simply returns the contents of the `$messages` array. Since that’s\
    \ all it does, why not make the array public in the first place? Public properties\
    \ can be accessed—and changed—outside the class definition. Protecting `$messages`\
    \ ensures that the contents of the array cannot be altered, so you know the message\
    \ has been generated by the class. This might not seem like such a big deal with\
    \ a message like this, but it becomes very important when you start working with\
    \ more complex scripts or in a team.\n\nSave `Upload.php` and switch to `file_upload.php`.\
    \ At the top of `file_upload.php`, import the `Upload` class by adding the following\
    \ line immediately after the opening PHP tag:\n\n```\nuse PhpSolutions\\File\\\
    Upload;\n```\n\n## Caution\n\nYou must import namespaced classes in the top level\
    \ of a script, even if the class definition is loaded later. Putting `use` inside\
    \ a conditional statement generates a parse error.\n\nInside the conditional statement,\
    \ delete the code that calls the `move_uploaded_file()` function, then use `require_once`\
    \ to include the `Upload` class definition:\n\n```\nif (isset($_POST['upload']))\
    \ {\n\n    // define the path to the upload folder\n    $destination = 'C:/upload_test/';\n\
    \n    require_once '../PhpSolutions/File/Upload.php';\n\n}\n```\n\nWe can now\
    \ create an instance of the `Upload` class, but because we’re using a class that\
    \ might throw an exception, it’s best to create a `try/catch` block (see “Handling\
    \ exceptions” in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)). Add the following\
    \ code immediately after the code you inserted in the previous step:\n\n```\n\
    try {\n    $loader = new Upload($destination);\n    $loader->upload();\n    $result\
    \ = $loader->getMessages();\n} catch (Exception $e) {\n    echo $e->getMessage();\n\
    }\n```\n\nThis creates an instance of the `Upload` class, called `$loader`, by\
    \ passing it the path to the `upload_test` folder. It then calls the `$loader`\
    \ object’s `upload()` and `getMessages()` methods, storing the result of `getMessages()`\
    \ in `$result`.\n\nThe `catch` block doesn’t need to prefix `Exception` with a\
    \ backslash because the script in `file_upload.php` is not in a namespace. Only\
    \ the class definition is in a namespace.\n\n## Caution\n\nThe `Upload` class\
    \ has a `getMessages()` method, while the exception uses `getMessage()`. That\
    \ extra “s” makes a difference.\n\nAdd the following PHP code block above the\
    \ form to display any messages returned by the `$loader` object:\n\n```\n<body>\n\
    <?php\nif (isset($result)) {\n    echo '<ul>';\n    foreach ($result as $message)\
    \ {\n        echo \"<li>$message</li>\";\n    }\n    echo '</ul>';\n}\n?>\n<form\
    \ action=\"\" method=\"post\" enctype=\"multipart/form-data\" id=\"uploadImage\"\
    >\n```\n\nThis is a simple `foreach` loop that displays the contents of `$result`\
    \ as an unordered list. When the page first loads, `$result` isn’t set, so this\
    \ code runs only after the form has been submitted.\n\nSave `file_upload.php`\
    \ and test it in a browser. As long as you choose an image that’s less than 50\
    \ KB, you should see confirmation that the file was uploaded successfully, as\
    \ shown in Figure [6-4](#A978-1-4842-0635-5_6_Chapter.html#Fig4).\n\nYou can compare\
    \ your code with `file_upload_05.php` and `PhpSolutions/File/Upload_01.php` in\
    \ the `ch06` folder.\n\n![A978-1-4842-0635-5_6_Fig4_HTML.jpg](A978-1-4842-0635-5_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4. The `Upload` class reports a successful upload\n\nThe class does\
    \ exactly the same as PHP Solution 6-1: it uploads a file, but it requires a lot\
    \ more code to do so. However, you have laid the foundation for a class that’s\
    \ going to perform a series of security checks on uploaded files. This is code\
    \ that you’ll write once. When you use the class, you won’t need to write this\
    \ code again.\n\nIf you haven’t worked with objects and classes before, some of\
    \ the concepts might seem strange. Think of the `$loader` object simply as a way\
    \ of accessing the functions (methods) you have defined in the `Upload` class.\
    \ You often create separate objects to store different values, for example, when\
    \ working with `DateTime` objects. In this case, a single object is sufficient\
    \ to handle the file upload.\n\n## Checking upload errors\n\nAs it stands, the\
    \ `Upload` class uploads any type of file indiscriminately. Even the 50 KB limit\
    \ can be circumvented, because the only check is made in the browser. Before handing\
    \ the file to the `moveFile()` method, the `checkFile()` method needs to run a\
    \ series of tests. One of the most important is to inspect the error level reported\
    \ by the `$_FILES` array.\n\nError level 8 is the least helpful, because PHP has\
    \ no way of detecting which PHP extension was responsible for stopping the upload.\
    \ Fortunately, it’s rarely encountered.\n\nTable [6-2](#A978-1-4842-0635-5_6_Chapter.html#Tab2)\
    \ shows a full list of error levels.\n\n**Table 6-2.** Meaning of the different\
    \ error levels in the `$_FILES` array\n\n| Error level | Meaning |\n| --- | ---\
    \ |\n| 0 | Upload successful |\n| 1 | File exceeds maximum upload size specified\
    \ in `php.ini` (default 2 MB) |\n| 2 | File exceeds size specified by `MAX_FILE_SIZE`\
    \ (see PHP Solution 6-1) |\n| 3 | File only partially uploaded |\n| 4 | Form submitted\
    \ with no file specified |\n| 6 | No temporary folder |\n| 7 | Cannot write file\
    \ to disk |\n| 8 | Upload stopped by an unspecified PHP extension |\n\nError level\
    \ 5 is currently not defined."
  raw: 'This simply returns the contents of the `$messages` array. Since that’s all
    it does, why not make the array public in the first place? Public properties can
    be accessed—and changed—outside the class definition. Protecting `$messages` ensures
    that the contents of the array cannot be altered, so you know the message has
    been generated by the class. This might not seem like such a big deal with a message
    like this, but it becomes very important when you start working with more complex
    scripts or in a team.


    Save `Upload.php` and switch to `file_upload.php`.   At the top of `file_upload.php`,
    import the `Upload` class by adding the following line immediately after the opening
    PHP tag:


    `use PhpSolutions\File\Upload;`


    Caution


    You must import namespaced classes in the top level of a script, even if the class
    definition is loaded later. Putting `use` inside a conditional statement generates
    a parse error.


    Inside the conditional statement, delete the code that calls the `move_uploaded_file()`
    function, then use `require_once` to include the `Upload` class definition:


    `if (isset($_POST[''upload''])) {`


    `// define the path to the upload folder`


    `$destination = ''C:/upload_test/'';`


    `require_once ''../PhpSolutions/File/Upload.php'';`


    `}`


    We can now create an instance of the `Upload` class, but because we’re using a
    class that might throw an exception, it’s best to create a `try/catch` block (see
    “Handling exceptions” in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)). Add
    the following code immediately after the code you inserted in the previous step:


    `try {`


    `$loader = new Upload($destination);`


    `$loader->upload();`


    `$result = $loader->getMessages();`


    `} catch (Exception $e) {`


    `echo $e->getMessage();`


    `}`


    This creates an instance of the `Upload` class, called `$loader,` by passing it
    the path to the `upload_test` folder. It then calls the `$loader` object’s `upload()`
    and `getMessages()` methods, storing the result of `getMessages()` in `$result`.


    The `catch` block doesn’t need to prefix `Exception` with a backslash because
    the script in `file_upload.php` is not in a namespace. Only the class definition
    is in a namespace


    Caution


    The `Upload` class has a `getMessages()` method, while the exception uses `getMessage()`.
    That extra “s” makes a difference.


    Add the following PHP code block above the form to display any messages returned
    by the `$loader` object:


    `<body>`


    `<?php`


    `if (isset($result)) {`


    `echo ''<ul>'';`


    `foreach ($result as $message) {`


    `echo "<li>$message</li>";`


    `}`


    `echo ''</ul>'';`


    `}`


    `?>`


    `<form action="" method="post" enctype="multipart/form-data" id="uploadImage">`


    This is a simple `foreach` loop that displays the contents of `$result` as an
    unordered list. When the page first loads, `$result` isn’t set, so this code runs
    only after the form has been submitted.


    Save `file_upload.php` and test it in a browser. As long as you choose an image
    that’s less than 50 KB, you should see confirmation that the file was uploaded
    successfully, as shown in Figure [6-4](#A978-1-4842-0635-5_6_Chapter.html#Fig4).


    You can compare your code with `file_upload_05.php` and `PhpSolutions/File/Upload_01.php`
    in the `ch06` folder.


    ![A978-1-4842-0635-5_6_Fig4_HTML.jpg](A978-1-4842-0635-5_6_Fig4_HTML.jpg)


    Figure 6-4.


    The `Upload` class reports a successful upload


    The class does exactly the same as PHP Solution 6-1: it uploads a file, but it
    requires a lot more code to do so. However, you have laid the foundation for a
    class that’s going to perform a series of security checks on uploaded files. This
    is code that you’ll write once. When you use the class, you won’t need to write
    this code again.


    If you haven’t worked with objects and classes before, some of the concepts might
    seem strange. Think of the `$loader` object simply as a way of accessing the functions
    (methods) you have defined in the `Upload` class. You often create separate objects
    to store different values, for example, when working with `DateTime` objects.
    In this case, a single object is sufficient to handle the file upload.


    ### Checking upload errors


    As it stands, the `Upload` class uploads any type of file indiscriminately. Even
    the 50 KB limit can be circumvented, because the only check is made in the browser.
    Before handing the file to the `moveFile()` method, the `checkFile()` method needs
    to run a series of tests. One of the most important is to inspect the error level
    reported by the `$_FILES` array.


    Error level 8 is the least helpful, because PHP has no way of detecting which
    PHP extension was responsible for stopping the upload. Fortunately, it’s rarely
    encountered.


    Table [6-2](#A978-1-4842-0635-5_6_Chapter.html#Tab2) shows a full list of error
    levels.


    Table 6-2.


    Meaning of the different error levels in the $_FILES array


    | Error level | Meaning |

    | --- | --- |

    | 0 | Upload successful |

    | 1 | File exceeds maximum upload size specified in `php.ini` (default 2 MB) |

    | 2 | File exceeds size specified by `MAX_FILE_SIZE` (see PHP Solution 6-1) |

    | 3 | File only partially uploaded |

    | 4 | Form submitted with no file specified |

    | 6 | No temporary folder |

    | 7 | Cannot write file to disk |

    | 8 | Upload stopped by an unspecified PHP extension |


    Error level 5 is currently not defined.'
  trans: "\n# 这仅返回 `$messages` 数组的内容。既然它仅此功能，为何不一开始就将数组设为公开属性？公开属性可在类定义之外被访问和修改。保护\
    \ `$messages` 可确保数组内容无法被更改，因此你能确定消息是由该类生成的。对于此类消息，这或许显得无关紧要，但当你开始处理更复杂的脚本或与团队协作时，这一点就变得至关重要。\n\
    \n保存 `Upload.php` 并切换到 `file_upload.php`。在 `file_upload.php` 的顶部，紧跟在 PHP 开始标记之后添加以下代码行，以导入\
    \ `Upload` 类：\n\n```\nuse PhpSolutions\\File\\Upload;\n```\n\n## 注意\n\n你必须在脚本的顶层导入带命名空间的类，即使类定义稍后才被加载。将\
    \ `use` 语句放在条件语句内部会导致解析错误。\n\n在条件语句内部，删除调用 `move_uploaded_file()` 函数的代码，然后使用 `require_once`\
    \ 包含 `Upload` 类定义：\n\n```\nif (isset($_POST['upload'])) {\n\n    // 定义上传文件夹的路径\n\
    \    $destination = 'C:/upload_test/';\n\n    require_once '../PhpSolutions/File/Upload.php';\n\
    \n}\n```\n\n现在我们可以创建 `Upload` 类的实例，但由于我们使用的类可能会抛出异常，因此最好创建一个 `try/catch` 块（请参阅第\
    \ 3 章中的“处理异常”）。在上一步插入的代码之后立即添加以下代码：\n\n```\ntry {\n    $loader = new Upload($destination);\n\
    \    $loader->upload();\n    $result = $loader->getMessages();\n} catch (Exception\
    \ $e) {\n    echo $e->getMessage();\n}\n```\n\n这会创建一个名为 `$loader` 的 `Upload` 类实例，并将\
    \ `upload_test` 文件夹的路径传递给它。然后调用 `$loader` 对象的 `upload()` 和 `getMessages()` 方法，并将\
    \ `getMessages()` 的结果存储在 `$result` 中。\n\n`catch` 块无需在 `Exception` 前加反斜杠，因为 `file_upload.php`\
    \ 中的脚本不在命名空间中。只有类定义位于命名空间中。\n\n## 注意\n\n`Upload` 类有一个 `getMessages()` 方法，而异常使用的是\
    \ `getMessage()`。多出的那个“s”至关重要。\n\n在表单上方添加以下 PHP 代码块，以显示 `$loader` 对象返回的任何消息：\n\
    \n```\n<body>\n<?php\nif (isset($result)) {\n    echo '<ul>';\n    foreach ($result\
