  2.  当确切知道循环次数时，应使用`for`循环。\n3.  `while`循环将持续循环，直到条件语句变为真。\n4.  可以使用`unset`释放数组中的一个位置。\n\
  5.  所有 PHP 数组在使用前必须声明。\n6.  指针指向对象在内存中所在的位置。\n7.  `!`运算符将`TRUE`结果反转成`FALSE`结果。\n\
  8.  可以使用`print_f`来显示数组的内容。\n9.  `Try/Catch`块应位于业务规则层和数据层，但不应位于界面层。\n10. 只有程序代码有意抛出的`Exceptions`才应该被捕获。\n\
  \n**Short Answer/Essay**\n\n1.  解释异常处理层次结构如何与三层应用程序协同工作。\n2.  错误和异常之间的区别是什么？\n3.\
  \  如果 PHP 提供了错误的时间戳，如何修正时区？\n4.  PHP 程序员如何尝试捕获错误，以便将它们视为异常来处理？\n5.  为什么应用程序生成多个日志文件很重要？\n\
  \n**Projects**\n\n1.  调整第 4 章项目 #1（或 #2）中的代码，以包含异常处理和日志记录。\n2.  创建一个应用程序，为你最喜欢的游戏节目注册参赛者。包括使用\
  \ HTML5 和 JavaScript 对输入数据进行验证。同时，在数据传递给应用程序时也要进行验证。该应用程序应包含一个接口 PHP 程序（界面层）和一个注册类（业务规则层）。注册类应包括异常处理（包括用户异常和程序异常）。接口程序应使用本章所示的`try/catch`块来处理异常。\n\
  \n**Term Project**\n\n1.  更新 ABC 电脑零件仓库库存应用程序以包含异常处理。该应用程序应尽可能尝试处理所有异常和错误。\n\n用户异常应记录到用户日志中。所有其他异常应记录到系统日志中。如果异常被认为是严重的（将导致程序崩溃），则应向系统管理员发送电子邮件。提示：`Try/Catch`块应仅存在于界面层。\n\
  \n"
- "# 7. 数据类\n\n*我是一个理想主义者。我不知道我要去哪里，但我已在路上。——*卡尔·桑德堡*，《偶发事件》(1904)*\n\n## 章节目标 / 学生学习成果\n\
  \n完成本章后，学生将能够：\n\n*   创建一个用于插入、更新和删除 XML 或 JSON 数据的数据类\n*   解释如何使用 SQL 脚本创建一个用于更新\
  \ MySQL 数据的数据类\n*   创建一个用于生成变更备份日志的 PHP 程序\n*   创建一个能够从先前备份中恢复数据的 PHP 程序\n*   应用更改以创建最新的有效信息\n\
  *   使用依赖注入将数据类附加到业务规则层的另一个类\n*   创建一个三层 PHP 应用程序\n\n### 数据类\n\n界面层和业务规则层不应存储应用程序信息。这些层甚至不应知道信息的存储方式（文本文件、XML\
  \ 或数据库）或存储位置。任何需要存储的信息都必须从业务规则层传递到数据层。数据层还负责响应来自业务规则层的信息请求。\n\n这使得界面层和业务规则层无需了解存储方法类型（文本文件、XML\
  \ 或数据库）或存储项目位置的任何更改。数据层接受的签名（参数）和返回的项目在应用程序的生命周期内应保持不变。只要这些不变，当数据层发生更改时，其他层也应无需更改。\n\
  \n*   *安全与性能——在使用数据库时，在业务规则层构建 SQL 字符串并将该字符串传递给数据层似乎是合理的。但这会在应用程序中造成一个主要的安全漏洞。黑客可以传递任何\
  \ SQL 字符串（包括* *delete* *字符串）。将 SQL 更新命令（DELETE、* *UPDATE 和* *INSERT）传递给数据层似乎也很合理。同样，这也提供了一个主要漏洞。为\
  \ SQL 的* *WHERE* *命令传递数据也是一个坏主意，因为它可能允许黑客删除或更改数据库中任意组合的数据。*\n\n数据类应提供操作信息的完整功能。这包括读取、插入、更新和删除信息的能力。即使当前应用程序不需要所有这些命令，从逻辑上讲，它们也应存在于数据类中以便将来使用。\n\
  \n在性能和存储信息的需求之间应取得平衡。虽然高度重要的信息可能需要立即存储，但其他信息可以保存在应用程序的数据结构（列表、数组、数据集）中，直到用户完成所有更新。在服务器的内存中保存和对信息进行更改，而不是在存储位置进行，效率要高得多。仅在所有更改完成后才存储信息，可以将对存储位置的多次调用减少到两次（初始检索信息和保存更新后的信息）。在内存中对信息进行更改总是比在存储设备（如硬盘驱动器）上进行更改更高效。\n\
  \n然而，当数据发生变化时，可能会发生冲突。应用程序正在对数据进行更改的同时，数据结构中驻留的实时数据可能也正在被更新。有多种方法可以减少或消除冲突的可能性。所需的方法取决于数据的使用频率和更改频率。可以设计锁定机制来限制对当前正在使用的数据的访问。这些技术通常是在数据结构本身内部处理的。对于频繁更改的数据，这些技术是保留有效数据所必需的。本书示例中使用的数据不经常更改。因此，冲突的可能性大大降低。\n\
  \n\n\n使用数据类可提供一种逻辑能力，用于填充数据结构并将信息自动保存到存储位置。假设仅在需要更新信息时才创建数据类的实例，则该类的构造函数可用于从存储中检索信息并将其置于服务器内存中。当不再需要数据对象时，从逻辑上讲，不再需要对信息进行更改。该类的析构函数可用于将信息从内存返回到存储。\n\
  \n```php\nclass dog_data\n{\nfunction __construct()\n{\n$xmlfile = file_get_contents(get_dog_application(\"\
  datastorage\"));\n$xmlstring = simplexml_load_string($xmlfile);\n$array = (array)$xmlstring;\n\
  print_r($array);\n}\n}\n```\n\n这个示例构造函数非常接近从 XML 文件中提取有用信息的目标。PHP 的 `file_get_contents`\
  \ 方法打开一个文本 XML 文件，将内容存入一个字符串，然后关闭文件。构造函数调用此方法以及 `get_dog_application` 方法（与示例 6-5\
  \ 中的 `dog_container` 中使用的方法相同）来确定 XML 数据文件的名称和位置。文件内容随后被放入 `$xmlfile` 中。接着，PHP 的\
  \ `simplexml:load_string` 方法对数据进行格式化，使 SimpleXML 数据模型能够遍历这些信息。此时，可以使用 SimpleXML\
  \ 方法来显示和操作数据。然而，下一行试图将 XML 数据转换为数组。`(array)` 语句尝试使用类型转换。`print_r` 语句则显示结果。\n\n```\n\
  Woof\n\nYellow\nLab\n\nSam\n\nBrown\nLab\n```\n\n假设 XML 文件的格式如上所示，输出结果将包含：\n\n```\n\
  Array ( [dog] => Array (\n[0] => SimpleXMLElement Object (\n[dog_name] => Woff [dog_weight]\
  \ => 12\n[dog_color] => Yellow [dog_breed] => Lab )\n[1] => SimpleXMLElement Object\
  \ (\n[dog_name] => Sam [dog_weight] => 10\n[dog_color] => Brown [dog_breed] => Lab\
  \ )\n) )\n```\n\n这里创建了多维数组和 SimpleXML 对象的组合。这并不能提供易于操作的实用数据。不过，你可以使用 JSON 方法“诱导”\
  \ PHP 创建一个多维的*关联数组*。\n\n```php\nclass dog_data\n{\nfunction __construct()\n{\n$xmlfile\
  \ = file_get_contents(get_dog_application(\"datastorage\"));\n$xmlstring = simplexml:load_string($xmlfile);\n\
  $json = json_encode($xmlstring);\nprint_r($json);\n}\n}\n{\"dog\":[{\"dog_name\"\
  :\"Woff\",\"dog_weight\":\"12\",\"dog_color\":\"Yellow\",\n\"dog_breed\":\"Lab\"\
  },{\"dog_name\":\"Sam\",\"dog_weight\":\"10\",\n\"dog_color\":\"Brown\",\"dog_breed\"\
  :\"Lab\"}]\n}\n```\n\n使用 PHP 的 `json_encode` 方法可以将数据转换为结构良好的 JSON 数据。你可以使用多种 PHP\
  \ 技术之一来操作 JSON 数据，或者通过额外的一个语句（`json_decode`）来创建一个结构良好的多维关联数组。\n\n```php\nclass dog_data\n\
  {\nfunction __construct()\n{\n$xmlfile = file_get_contents(get_dog_application(\"\
  datastorage\"));\n$xmlstring = simplexml:load_string($xmlfile);\n$json = json_encode($xmlstring);\n\
  $dogs_array = json_decode($json,TRUE);\nprint_r($dogs_array);\n}\n}\nArray ( [dog]\
  \ =>\nArray (\n[0] => Array ( [dog_name] => Woff [dog_weight] => 12\n[dog_color]\
  \ => Yellow [dog_breed] => Lab )\n[1] => Array ( [dog_name] => Sam [dog_weight]\
  \ => 10\n[dog_color] => Brown [dog_breed] => Lab )\n) )\n```\n\n如你所见，这里不再有数组和 SimpleXML\
  \ 对象的混合。我们创建了一个关联数组，它使用关键字而不是数字值作为下标（索引）。在前面的示例中，创建了一个名为 `\"dog\"` 的数组，其中包含两行（每行由一个数组表示）。在每一行中，列（单元格）通过列名（`dog_name`、`dog_weight`、`dog_color`\
  \ 和 `dog_breed`）而不是索引（0, 1, 2, 3）来引用。我们可以使用前几章中看到的一些技术来操作这些行和列。\n\n一旦我们完成了对数组的所有更改（根据业务逻辑层的要求），我们将在析构函数中将信息返回到存储位置。\n\
  \n```php\nprivate $dogs_array = array(); // 初始定义为一个空数组\nfunction __construct()\n\
  {\n$xmlfile = file_get_contents(get_dog_application(\"datastorage\"));\n$xmlstring\
  \ = simplexml:load_string($xmlfile);\n$json = json_encode($xmlstring);\n$this->dogs_array\
  \ = json_decode($json,TRUE);\n}\nfunction __destruct()\n{\n$xmlstring = '';\n$xmlstring\
  \ .= \"\\n\\n\";\nforeach ($this->dogs_array as $dogs=>$dogs_value) {\nforeach ($dogs_value\
  \ as $dog => $dog_value)\n{\n$xmlstring .=\"\\n\";\nforeach ($dog_value as $column\
  \ => $column_value)\n{\n$xmlstring .= \"\" . $dog_value[$column] . \"\\n\";\n}\n\
  $xmlstring .= \"\\n\";\n}\n}\n$xmlstring .= \"\\n\";  file_put_contents(get_dog_application(\"\
  datastorage\"),$xmlstring);\n}\n```\n\n在 PHP 中有很多创建 XML 数据的方法。前面的示例采用了一种简单的方法，即从数组中提供\
  \ XML 标签。从结构中可以看到，这个多维数组中有三组数组。第一个 `foreach` 循环用于遍历第一个数组（dogs）。第二个 `foreach` 循环处理狗数组（行）。进入此循环后，第三个\
  \ `foreach` 循环控制每个狗数组（每一行）中的列。第三个循环获取列名（来自 `$column`）并将它们放入 XML 标签中。`$column` 也用于提取列中的值（`$dog_value[$column]`）。`$xmlstring`\
  \ 提供与原始 XML 文件相同的标签和结构。请注意，每行都包含一个换行符（`\\n`），以便在文件中显示不同的行。即使没有这个换行符，结构也能正常工作。但是，它使得文件在文本编辑器中更具可读性。一旦\
  \ `$xmlstring` 创建完成，代码会结合使用 PHP 的 `file_put_contents` 方法和 `get_dog_application`\
  \ 方法（来自第 4 章）来打开 XML 文件，用 `$xmlstring` 中包含的字符串替换其内容，并关闭文件。\n\n我们需要对构造函数进行最后的调整，以便使其能够处理\
  \ XML 解析错误。当 XML 结构出现问题时，就会发生解析错误。之前的 `dog_breed` 和 `dog_application` XML 文件不会由应用程序更新，并且相当稳定。然而，存储狗信息的\
  \ XML 文件将会频繁更新。我们需要处理可能发生的任何问题。我们将引发一个通用错误，`dog_interface` 会将其视为重要错误，进行记录并通过电子邮件发送给支持人员。它还会向用户显示一条消息：`\"\
  System currently not available please try again later\"`。\n\n```php\n$dogs_array\
  \ = array(); // 初始定义为一个空数组\nLibxml_use_internal_errors(true);\nfunction __construct()\
  \ {\n$xmlfile = file_get_contents(get_dog_application(\"datastorage\"));\n$xmlstring\
  \ = simplexml_load_string($xmlfile);\nif ($xmlstring === false) {\n$errorString\
  \ = \"Failed loading XML: \";\nforeach(libxml_get_errors() as $error) {\n$errorString\
  \ .= $error->message . \" \";  }\nthrow new Exception($errorString); }\n$json =\
  \ json_encode($xmlstring);\n$this->dogs_array = json_decode($json,TRUE);\n}\n```\n\
  \n\n```markdown\n\n默认情况下，XML 解析错误会导致系统向用户显示错误并关闭程序。`libxml_user_internal_errors(true)`方法会抑制这些错误。通过`simplexml_load_string`方法将字符串转换为\
  \ XML 格式时，系统会解析 XML 以判断其是否有效。如果无效，该方法将返回`FALSE`而非 XML 信息。所示的`if`语句会创建一个`$errorString`，并使用`foreach`语句循环遍历`libxml_get_errors`方法返回的每个错误（该方法返回一个包含错误的数组）。收集完所有错误后，它会引发一个异常并传递`$errorString`。`dog_interface`程序将捕获此错误并进行处理，如第\
  \ 6 章所示。这个示例做了一个不好的假设（这简化了示例）：它假定`$errorString`不会超过日志文件 120 个字符的最大容量。格式非常糟糕的文件可能会迅速使`$errorString`超出此大小。在\
  \ PHP 配置文件中可以调整此限制。\n\n由于数据对象从内存中移除时会自动保存数据，因此插入、更新和删除方法只需调整多维关联数组的内容即可。让我们先看看如何创建`delete`方法，因为你在第\
  \ 6 章中已经见过一个示例。\n\n在`readerrorlog`程序（示例 6-8）中，我们创建了一个`deleterecord`方法。该方法用于常规的多维数组。我们可以对这个例程稍作调整，为`dog_data`类创建`deleteRecord`方法。\n\
  \n```php\nfunction deleteRecord($recordNumber) {\n    foreach ($this->dogs_array\
  \ as $dogs=>&$dogs_value) {\n        for($J=$recordNumber; $J < count($dogs_value)\
  \ - 1; $J++) {\n            foreach ($dogs_value[$J] as $column => $column_value)\
  \ {\n                $dogs_value[$J][$column] = $dogs_value[$J + 1][$column];\n\
  \            }\n        }\n        unset ($dogs_value[count($dogs_value) -1]);\n\
  \    }\n}\n```\n\n在之前的`deleterecord`方法中，数组的行数和数组本身被传入该方法。`dog_data`类中的数组由包含狗狗信息的\
  \ XML 文件填充。并没有设置记录数的属性。这不是问题。PHP 的`count`方法会返回数组的大小。我们可以使用`$this`指针访问和更新`dogs_array`（这是一个受保护的私有属性）。类中的方法可以使用`this`指针访问和更新受保护的属性；无需将它们传入方法。我们需要传递给`deleteRecord`方法的唯一属性是要删除的记录编号（`$recordNumber`）。\n\
  \n该关联数组有三个维度。外层维度与 XML 结构中的`dogs`标签相关。虽然`dogs`只有一行，但仍然需要循环进入下一个数组（`dog`）。`foreach`循环穿透`dogs`数组，并提供对`dog`数组的访问（该数组是从\
  \ XML 文件中的`dog`标签创建的）。`$dogs`将包含当前使用的狗狗行的编号。`$dogs_value`将包含该行的内容（一个包含`dog_name`、`dog_weight`、`dog_color`和`dog_breed`值的数组）。为了遍历`dog`数组中的每一行（数组），该方法使用了`for`循环。条件语句（`$J\
  \ < count($dogs_value) - 1`）使用`count`方法确定`dog`数组的大小。`count`方法返回的是数组的大小，而不是最后一个位置。因此，循环次数必须小于（`<`）`count`返回的大小。从这个值中减去\
  \ 1。如第 6 章所述，删除行之后的任何行都必须从其当前位置向上移动一位。数组的最后一个位置将不再需要，这会使所需的循环次数减少一次。\n\n在第 5 章的示例中，使用了`for`循环将行中的每一列提取出来并放置到上一行中。对于关联数组，我们使用`foreach`循环。`$column`参数包含列名（`$J`包含行号），以便将值放入列中的正确位置。移动完行中的值后，使用\
  \ PHP 的`unset`方法移除数组的最后一个位置。类似的逻辑几乎可以用在任何编程语言中。然而，PHP 的关联数组允许跳过索引编号。与其他语言会在缺失索引处放置`NULL`值不同，PHP\
  \ 的关联数组会直接跳过实际的索引。因此，任何数组都可能包含 0、1、2、4 和 5 这样的索引，而`foreach`循环仍然可以正确遍历该数组。考虑到这一点，我们可以大大简化之前的删除示例，使其仅包含一行代码，即仅展示`unset`命令。`unset`命令会从`dog_array`中移除传入该方法的索引。任何使用`dog_array`的`for`循环仍然可以正确遍历该数组。\n\
  \n我们还可以对第 5 章中的`displayRecords`方法稍作调整，以返回调用程序（如`Dog`类）请求的任何记录。\n\n```php\nfunction\
  \ readRecords($recordNumber) {\n    if($recordNumber === \"ALL\") {\n        return\
  \ $this->dogs_array[\"dog\"];\n    }\n    else {\n        return $this->dogs_array[\"\
  dog\"][$recordNumber];\n    }\n}\n```\n\n```\n\n\n如您所见，`readRecords()` 方法比 `displayRecords()`\
  \ 方法更简单。该方法结果的所有格式化工作都留给调用程序（如果需要）。请记住，输出的显示和格式化发生在界面层，而不是数据层（或业务规则层）。此方法允许调用程序请求所有记录或特定记录。无论哪种情况，它都会返回一个数组，其中包含一行（请求的特定记录）或所有行。当返回所有行时，会移除顶层数组（代表行的\
  \ XML 标签），以保持两种选择下的维度（二维）相同。\n\n`insertRecords()` 方法接受一个关联数组，其下标名称如前所述。然而，为了实现对\
  \ XML 文件标签名称的依赖注入和灵活性，调用程序直到创建了 `dog_data` 类的实例后才需要知道标签名称。这可以通过使用 `readRecords()`\
  \ 方法拉取第一条记录，然后让调用程序检查从该记录返回的下标名称来实现。\n\n```\nfunction insertRecords($records_array)\n\
  {\n$dogs_array_size = count($this->dogs_array[\"dog\"]);\nfor($I=0;$I<count($records_array);$I++)\n\
  {\n$this->dogs_array[\"dog\"][$dogs_array_size + $I] = $records_array[$I];\n}\n\
  }\n```\n\n**注意**\n\n使用前面展示的 JSON 函数创建 `dog_array` 的过程会在创建 `dog_array` 时产生一个不一致之处。如果\
  \ `dog_data.xml` 文件只包含一条记录，JSON 函数将不会创建数字索引（例如 `'0'`）。当 XML 文件中包含多条记录时，则会创建数字索引（例如\
  \ `'0'`、`'1'`）。\n\n在 `insertRecords()` 方法中，所有记录都被添加到数组的末尾（调用程序可以在需要时对其进行排序）。`dogs_array`\
  \ 的当前大小由 `count` 方法确定并存储在 `$dogs_array_size` 中。`for` 结构内部也使用了 `count` 方法来确定 `$records_array`\
  \ 的大小以及循环次数。由于 `count` 方法的结果给出了数组的大小，该值比最后一个下标位置大 1，因此 `count` 的结果也提供了可插入记录的下一个可用位置。在第一次循环中，`$I`\
  \ 为 0。`$records_array` 的第一条记录被放置在 `$dogs_array_size` 加 0 的位置，即 `$dogs_array_size`（第一个用于放置记录的空行）。下一次循环时，`$records_array`\
  \ 的第二条记录（`$I` 已由循环递增）被放置在位置 `$dogs_array_size` 加 1 处。这是插入第一条记录后的下一个可用位置。循环将持续进行，直到\
  \ `$records_array` 中没有更多记录。顺便说一句，此方法也适用于仅插入一条记录的情况（只要它作为关联数组传递）。循环将仅执行一次。\n\n我们需要考察的最后一个方法是\
  \ `update` 方法。此方法是析构方法的一种非常简单的形式。\n\n```\nfunction updateRecords($records_array)\n\
  {\nforeach ($records_array as $records=>$records_value) {\nforeach ($records_value\
  \ as $record => $record_value) {\n$this->dogs_array[\"dog\"][$records] = $records_array[$records];\n\
  }\n}\n}\n```\n\n这个非常小巧的方法将接受任何大小的关联数组并更新 `dogs` 数组。它基于 PHP 动态构建数组的能力。\n\n```\n$records_array\
  \ = Array (\n0 => Array ( \"dog_name\" => \"Jeffrey\", \"dog_weight\" => \"19\"\
  ,\n\"dog_color\" => \"Green\", \"dog_breed\" => \"Lab\" ),\n2 => Array ( \"dog_name\"\
  \ => \"James\", \"dog_weight\" => \"21\",\n\"dog_color\" => \"Black\", \"dog_breed\"\
  \ => \"Mixed\" ));\n```\n\n动态构建的数组不需要为数组中的每个位置都包含值。如果前面展示的动态数组被传递给 `updateRecords()`\
  \ 方法，那么记录 0 和记录 2 的将被新信息更新。`dogs` 数组中位置 1 的值将保持不变。花点时间看看这些方法。在这些方法中，只有两个 XML 标签被硬编码（`dogs`\
  \ 和 `dog`）。即便这两个标签也可以从 XML 文件中获取。但是，假设这些标签始终存在于一个有效的狗类 XML 文件中，这在逻辑上是合理的。通过从 XML\
  \ 文件动态提取所有其他标签（`dog_name`、`dog_weight`、`dog_color` 和 `dog_breed`），可以在不引起任何代码更改的情况下对文件进行修改。可以添加、删除和/或更改额外的标签。\n\
  \n最后，让我们将所有内容整合在一起。\n\n```\nload( 'e5dog_applications.xml' );\n$searchNode = $xmlDoc->getElementsByTagName(\
  \ \"type\" );\nforeach( $searchNode as $searchNode )\n{\n$valueID = $searchNode->getAttribute('ID');\n\
  if($valueID == \"datastorage\")\n{\n$xmlLocation = $searchNode->getElementsByTagName(\
  \ \"location\" );\n$this->dog_data_xml = $xmlLocation->item(0)->nodeValue;\nbreak;\n\
  }\n}  }\nelse { throw new Exception(\"Dog applications xml file missing or corrupt\"\
  ); }\n$xmlfile = file_get_contents($this->dog_data_xml);\n$xmlstring = simplexml_load_string($xmlfile);\n\
  if ($xmlstring === false) {\n$errorString = \"Failed loading XML: \";\nforeach(libxml_get_errors()\
  \ as $error) {\n$errorString .= $error->message . \" \" ;  }\nthrow new Exception($errorString);\
  \ }\n$json = json_encode($xmlstring);\n$this->dogs_array = json_decode($json,TRUE);\n\
  }\nfunction __destruct()\n{\n$xmlstring = '';\n$xmlstring .= \"\\n\\n\";\nforeach\
  \ ($this->dogs_array as $dogs=>$dogs_value) {\nforeach ($dogs_value as $dog => $dog_value)\n\
  {\n$xmlstring .=\"\\n\";\nforeach ($dog_value as $column => $column_value)\n{\n\
  $xmlstring .= \"\" .\n$dog_value[$column] . \"\\n\";\n}\n$xmlstring .= \"\\n\";\n\
