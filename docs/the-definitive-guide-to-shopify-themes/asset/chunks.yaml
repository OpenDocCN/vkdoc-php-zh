- fmt: '# Working with Shopify Themes


    While Shopify themes introduce a few new concepts, they don’t stray too far from
    the concepts of “standard” web development. At the end of the day, we’re using
    marked-up templates, blended with a little Liquid, to generate HTML that gets
    pushed to the user’s browser and loads in assets like images, stylesheets, and
    scripts. This makes Shopify theme development quite accessible to newer developers
    and allows you to get up and running quickly.


    There are a couple of “gotchas” that can arise when coming to Shopify development
    for the first time though, so I thought I’d share them here.


    - Shopify will aggressively cache the HTML output of your Liquid templates, meaning
    you can’t rely on time-sensitive logic from within your Liquid templates (e.g.,
    looking at the current time to determine whether to show or hide a product). For
    anything time-sensitive like this, I recommend using JavaScript.

    - While Shopify supports the compilation of Sass files into CSS stylesheets, for
    security reasons it doesn’t support the `@import` syntax, meaning all of your
    styles need to be written in the one file. The version of Sass used by Shopify
    is also a little older, so some newer Sass features aren’t supported. For these
    reasons, I generally avoid using Shopify’s Sass functionality and use a more advanced
    development workflow (discussed in the next chapter) to precompile my assets.
    For further detail on Shopify, Sass, and theme development, refer to Tiffany Tse’s
    excellent three-part series A Beginner’s Guide to Sass with Shopify.[¹](#A437216_1_En_1_Chapter.html#Fn1)

    - As a Shopify theme developer, you need to be aware that it won’t always be only
    your code running on a merchant’s store. In additional to some lightweight scripts
    added by Shopify for admin and tracking, any Shopify apps added by a merchant
    may manipulate your theme’s template or asset files, load additional scripts and
    stylesheets, or dynamically adjust your markup. While this can be frustrating,
    you can alleviate many issues by programming your themes defensively, making them
    easy to edit and maintain, and following robust development workflow practices.


    ## Setting Up Development Stores


    To actually get started developing Shopify themes, we’re going to need to create
    a “development store” on Shopify. This is because, unlike when we’re developing
    with regular web sites, there’s no real way to preview or test our Shopify themes
    locally.


    Development stores function the same way as regular Shopify stores (apart from
    not being able to accept real payments), so they’re a good testing ground. You
    can convert development stores to fully fledged Shopify stores with the click
    of a button, so it’s quite common to build a store for a client as a dev store
    before handing it off.


    Being able to create development stores just requires registering as a Shopify
    Partner (which you can do at `https://www.shopify.com/partners`). Registration
    is free and only takes a couple of minutes—once you’re done, you’ll be taken to
    the Partner Dashboard (as seen in Figure 1-3), where you can view all your existing
    development stores or create new ones.


    ![A437216_1_En_1_Fig3_HTML.jpg](A437216_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    The Development Stores tab in the Partner Dashboard


    If you haven’t created a development store before or poked around in the guts
    of a Shopify theme, this would be a great time to start! Just click Create Store
    from the Development Stores tab, enter some login information, and you’re away.


    After the store’s been created, you’ll be taken to the store’s administration
    dashboard. You’ll see a tab called Online Store - Themes in the left sidebar.
    Click it and you’ll see that your store has been set up with a simple default
    theme named `Debut`.


    You’ll see how to sync theme files to your computer and edit them locally in Chapter
    2, but for now you can get a look at how your default theme is put together by
    using the Shopify Admin’s built-in theme editor. You can open the editor by clicking
    the Actions button on the default theme, then clicking Edit HTML/CSS (See Figure
    1-4).


    ![A437216_1_En_1_Fig4_HTML.jpg](A437216_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Opening the theme editor for the default Debut theme


    Spend a couple of minutes now walking through the structure of your default theme
    and referring to the “Anatomy of a Shopify Theme” section to make sure you’re
    familiar with the role of each part of the theme structure. Once you’ve done that,
    you can move on to the next chapter, where you’ll see how to best set yourself
    up for painless theme development.


    ## Summary


    In this chapter, you’ve been introduced to how a Shopify theme is structured,
    and learned about the responsibilities of each part of that structure. You’ve
    seen that Shopify theme development shares a lot of similarities with a regular
    web development workflow, and this chapter highlighted the key places where they
    differ, including an introduction to the templating language Liquid.


    Finally, you’ve seen how you can get started on your theme development journey
    by setting up a Shopify Partner account and creating a development store.


    Footnotes [1](#A437216_1_En_1_Chapter.html#Fn1_source)


    `https://www.shopify.com/partners/blog/a-beginners-guide-to-building-shopify-themes-with-sass-part-1-getting-started-with-sass`


    # 2. Tools and Workflow


    We’ve had an introduction to how Shopify themes are put together, and ended the
    last chapter looking at the contents of the default Debut theme via the Shopify
    Admin’s online theme editor. If you were a bit of a masochist, you could do all
    your theme development through this editor. If you tried that, though, you’d most
    likely come across these difficulties:


    - The online editor is nice—one of the best of its kind—but it doesn’t quite compare
    to desktop IDEs or text editors in terms of useful development features.

    - If you’re familiar and productive as a web developer with a certain development
    environment, you lose that productivity.

    - You need be online and in your browser to make any kind of change to the theme.

    - Collaborating with others on the development of your theme is difficult and
    can easily lead to people overwriting their work.

    - Your theme is stored in only one place, without any backup.

    - While there is a limited form of version control (you’re able to revert individual
    files to previous versions), there’s nothing that compares to “serious” version
    control systems like `Git` or `Mercurial`.

    - You need edit files “as is,” meaning you can’t easily use techniques like concatenating
    assets together or minifying them for production use.


    This chapter looks at how to address each of these limitations by setting up a
    local development environment that synchronizes your code changes to Shopify.
    It also looks at how to use a popular revision control system (`Git`) to properly
    version and manage changes to a theme, and finally looks at advanced build tools
    (Shopify’s `Slate` and others) that allow us to utilize more advanced web development
    techniques when dealing with themes.


    You don’t need to implement these practices before starting work on a theme, but
    it’s good to get into some of these habits sooner rather than later—I can guarantee
    it’ll make your Shopify development experience much smoother. I do recommend that
    before moving on to Chapter 4, where you’ll start developing your own example
    theme, you at least familiarize yourself with the process of editing theme files
    locally and having the changes automatically pushed to a Shopify store.'
