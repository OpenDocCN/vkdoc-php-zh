    C H A P T E R 5 ■ I N T R O D U C T I O N TO P R OTOT Y P E A N D S C R I P TA
    C U L O U S


    The controls available in Scriptaculous are as follows:


    • Autocompleter: A text field that automatically provides suggestions based on
    user-input (somewhat similar to Google S[uggest—http://www.google.com/webhp?complete=1&hl=en](http://www.google.com/webhp?complete=1&hl=en)).


    ■**Note** In Chapter 12 we will implement a JavaScript class that behaves similarly
    to Google Suggest rather than using the one provided by Scriptaculous. This allows
    us to look at some of the nitty-gritty code involved in developing such a class.


    • InPlaceEditor: A class that allows a user to edit content on a web page directly.
    For example, if you had a list of files, you could use InPlaceEditor to allow
    users to rename a file by clicking on it. The filename would be replaced by a
    text input field, allowing the new filename to be entered inline.


    • Slider: A slider that a user can click and drag to change a value. Sliders are
    very customizable, including their styles, available values, and orientation (horizontal
    or vertical).


    **Drag and Drop**


    With Scriptaculous, it is easy to define *draggable* areas (using the Draggables
    class) and *droppable* areas (using the Droppables class) on your HTML pages.
    This allows you to achieve effects such as the following very easily:


    • Sort a list of items using the Sortables class, meaning that list items can
    be clicked on and dragged to their new location (and the new order can be saved
    in real time transparently using Ajax).


    • Drag an item from one list to another. For example, if you were managing product
    images for an online store, you might have a gallery of all the unused images.
    You could drag an image from this list onto a list of product images. Once again,
    you could save this state change transparently using Ajax.


    **Visual Effects**


    There are five core effects in Scriptaculous:


    • Effect.Opacity: Changes the opacity (transparency) of an element. This is done
    gradually over a specified period of time. For instance, you could fade something
    from 100


    percent opacity to 50 percent opacity over a period of 2 seconds.


    • Effect.Scale: Changes the size of an element to the specified dimensions. This
    allows you to easily grow or shrink an element.


    • Effect.MoveBy: Moves an element by a specified number of pixels (in both the
    X and Y


    directions).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063CH05CMP2 10/29/07 8:39 PM Page 153


    C H A P T E R 5 ■ I N T R O D U C T I O N TO P R OTOT Y P E A N D S C R I P TA
    C U L O U S


    **153**


    • Effect.Highlight: Highlights an element with a given color. Both a starting
    color and finishing color are specified, and the element changes color from the
    starting color to the finish color. This effect would typically be used to draw
    attention to a particular area of the page, such as to notify the user that an
    Ajax request has completed.


    • Effect.Parallel: Combines one or more effects into a single effect.


    In addition to these core effects, there are a large number of combination effects,
    built using the core effects. They include the following:


    • Effect.Appear: Makes a hidden element appear, going from complete transparency
    to 100 percent opacity.


    • Effect.Fade: Makes an element completely transparent (the opposite of


    Effect.Appear). At the completion of the effect, it will also hide the element
    from the document (that is, it will set the element’s CSS display property to
    none).


    • Effect.Grow: Grows an element from a size of 0x0 to its normal size. At the
    start of the effect, the element is shrunk to 0x0 and then grown gradually to
    normal size. Typically the element will be hidden prior to calling this effect.


    • Effect.Shrink: Scales an element gradually down to a size of 0x0 (the opposite
    of Effect.Grow).


    There are many more effects available, and you can write your own. The Scriptaculous
    web site ([http://script.aculo.us) has mor](http://script.aculo.us)e examples
    of the effects you can use.


