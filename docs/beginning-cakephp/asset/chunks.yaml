- fmt: 'Later, we’ll deal with more advanced Ajax methods, which will require extensive
    editing in the views. For now, be aware that the asynchronous sequence is an option
    in Cake and is handled almost identically to the other two responses.


    ## Writing Individual View Files


    With the controller logic in hand, next the individual view files must handle
    user interaction sequences properly. Open the `app/views/posts/view.ctp` file.
    Scroll to lines 1–30; they should appear like the code in Listing 6-6.


    **Listing 6-6.** *The View Action View File, Lines 1–30*


    ```php

    <div class="posts view">

    <h2><?php __(''Post'');?></h2>

    <dl><?php $i = 0; $class = '' class="altrow"'';?>

    <dt<?php if ($i % 2 == 0) echo $class;?>><?php __(''Id''); ?></dt>

    <dd<?php if ($i++ % 2 == 0) echo $class;?>>

    <?php echo $post[''Post''][''id'']; ?>

    &nbsp;

    </dd>

    <dt<?php if ($i % 2 == 0) echo $class;?>><?php __(''Name''); ?></dt>

    <dd<?php if ($i++ % 2 == 0) echo $class;?>>

    <?php echo $post[''Post''][''name'']; ?>

    &nbsp;

    </dd>

    <dt<?php if ($i % 2 == 0) echo $class;?>><?php __(''Date''); ?></dt>

    <dd<?php if ($i++ % 2 == 0) echo $class;?>>

    <?php echo $post[''Post''][''date'']; ?>

    &nbsp;

    </dd>

    <dt<?php if ($i % 2 == 0) echo $class;?>><?php __(''Content''); ?></dt>

    <dd<?php if ($i++ % 2 == 0) echo $class;?>>

    <?php echo $post[''Post''][''content'']; ?>

    &nbsp;

    </dd>

    <dt<?php if ($i % 2 == 0) echo $class;?>><?php __(''User''); ?></dt>

    <dd<?php if ($i++ % 2 == 0) echo $class;?>>

    <?php echo $html->link($post[''User''][''name''],

    array(''controller''=>''users'', ''action''=>''view'', $post[''User''][''id'']));
    ?>

    &nbsp;

    </dd>

    </dl>

    </div>

    ```


    The View action, in short, is a simple page request. The user will have asked
    for a specific record to be displayed, and this view file is meant to do that
    in an organized fashion. Most of what is being rendered in these lines is HTML.
    Line 1 creates a new `<div>` element, and line 30 closes it. Some important Cake
    operations are at work here, however, that correspond with the data provided in
    the controller. Recall that in Listing 6-1’s line 6, the View action performs
    a `read()` model function and assigns the result to a variable named `post` with
    the `set()` function. This variable is now available in the View view as `$post`
    and can be displayed throughout the view however you please.


    Bake provided you with a series of HTML tags surrounding instances of the `$post`
    variable that serve to display the contents of the returned record nicely. Notice
    that `$post` is formatted like `$this->data`. It contains an array of model names
    with nested arrays that match the fields in their respective tables. Notice how
    line 26 displays data from an associated model. In this case, posts have been
    associated with users, and when the controller performed the `read()` function,
    it noticed the association and supplied the related records as well. All of these
    data are available in the `$post` array.


    ### Using the Debug Function


    Often you will want to view the contents of these data arrays. Cake’s `debug()`
    function provides a detailed and nicely formatted view of a specified array. In
    this view file, insert the following line, which uses the `debug()` function:


    ```php

    <? debug($post);?>

    ```


    When you refresh the View action, you ought to see a bright yellow box containing
    a print-out of the contents of the `$post` variable (see Figure 6-1).


    **Figure 6-1.** *The* `debug()` *function displaying the contents of the* `$post`
    *variable*


    Each model is keyed in the array by its name and has related records attached.
    Not only has Cake provided you with the contents of the post record the user requested
    but also with the records from associated models. Say you wanted to display the
    name of the assigned user of this blog post by the title of the post. You could
    do this by performing an `echo()` function of the correct array, key, and value:


    ```php

    <h2><?=$post[''User''][''firstname''].'' ''.$post[''User''][''lastname''];?></h2>

    ```


    The `debug()` function helps you figure out during the development process what
    exactly is being tossed around in the view. It can be used with any array. Of
    course, other array display functions can be used, such as the `print_r()` function
    native to PHP or Cake’s convenience function `pr()`.


    ### Customizing the View File from Scratch


    Bake has provided you with a fabulous start to this simple page request. Let’s
    go from scratch and simplify the view so as to make it more readable for a site
    visitor. In your blog application, this view will be a simple story display like
    other blogs or newspaper sites. You won’t need to display fields such as the ID
    or the author’s ID, even though those may be useful for constructing links that
    point to other actions or controllers.


    Edit the `app/views/posts/view.ctp` file by deleting the baked code and inserting
    the code in Listing 6-7.


    **Listing 6-7.** *A Simplified View*


    ```php

    <h1><?=$post[''Post''][''name''];?></h1>

    <p>Author: <?=$post[''User''][''firstname''];?> <?=$post[''User''][''lastname''];?></p>

    <p>Date Published: <?=$post[''Post''][''date''];?></p>

    <hr/>

    <p><?=$post[''Post''][''content''];?></p>

    ```


    Listing 6-7 is very simplified code, but starting small helps you include other
    useful features as you go along. Line 1 displays the post’s title as an `<h1>`
    element. Lines 2–3 display the associated user’s first name and last name as well
    as the post’s date in separate `<p>` tags. Finally, line 5 displays the textual
    content of the post. The `$post` variable still contains the other array data
    you could use, but only a couple of fields in the view have been called out.


    ### The HTML Helper


    Suppose you wanted the title of the post to be a link to itself, just for consistency
    throughout the application. In this case, the built-in HTML helper could be used
    to generate the appropriate links for you. Change line 1 in the View view file
    to Listing 6-8.


    **Listing 6-8.** *The HTML Helper and Its* `link()` *Function*


    ```php

    <?=$html->link(''<h1>''.$post[''Post''][''name''].''</h1>'',''/posts/view/''.$post[''Post''][''id''],null,null,false);?>

    ```


    Each parameter in the `link()` function is separated like other PHP function parameters.
    Between commas, and when necessary, with arrays, you pass along your own variables
    and settings to the helper function, and it returns some HTML to be displayed.
    You won’t need to use every parameter, so in these cases you can enter a `null`
    value. In Listing 6-8, you’ve called out the `link()` function in the HTML helper
    by first calling the `$html` object. With this particular helper, most of its
    functions will require you to perform an `echo()` function, which you’ve done
    with the shorthand operator `<?=` rather than spelling out the function. The final
    parameter in the function corresponds to the `link()` function’s escaping feature.
    In this case, you’ve set it to `false` so that the function ignores escaping the
    greater-than and less-than symbols as HTML entities.


    The first parameter in the HTML helper’s `link()` function is the text to be displayed.
    The second parameter is the URL, following the application’s routes, that will
    be placed in the link. Notice that you’ve used the `$post` variable to supply
    the title and the current ID to make this link operable and correspond to the
    user’s request.'
