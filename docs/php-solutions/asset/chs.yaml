  \    session_destroy();\n    header('Location: http://localhost/phpsols/sessions/login.php\
  \ ');\n    exit;\n}\n?>\n```\n\n保存 `menu.php` 并通过点击 `Log out` 进行测试。你应该会被重定向到 `login.php`。任何尝试返回\
  \ `menu.php` 或 `secretpage.php` 的操作都会将你带回 `login.php`。你可以将相同的代码放在每个受限页面中，但 PHP 的精髓在于节省工作，而不是增加工作量。因此将其转换为包含文件是合理的。在\
  \ `includes` 文件夹中创建一个名为 `logout.php` 的新文件。将步骤 1 和 2 中的新代码剪切并粘贴到新文件中，如下所示（位于 `ch09`\
