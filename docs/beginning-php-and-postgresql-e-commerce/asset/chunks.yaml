- fmt: "# Chapter 4: Creating the Product Catalog: Part II\n\nThe componentized template\
    \ chooses which products to display after analyzing the query string. If both\
    \ `DepartmentID` and `CategoryID` parameters are present in the query string,\
    \ this means the products of that category should be listed. If only `DepartmentID`\
    \ is present, the visitor is visiting a department, so its featured products should\
    \ appear. If `DepartmentID` is not present, the visitor is on the main page, so\
    \ the catalog featured products should appear.\n\nTo integrate the `products_list`\
    \ componentized template with the first page, you’ll need to create an additional\
    \ template file (`first_page_contents.tpl`), which you’ll implement later.\n\n\
