    need this), and the


    “A” relevance factor is added to the words from the product’s name. Also note
    that various forms of the same word are recognized (see “fit” for example) and
    that the stop-words aren’t taken into consideration.


    **Table 5-1.** *The Search Vector for a Product*


    **Field**


    **Value**


    product_id


    name


    Santa Jester Hat


    description


    This three-prong velvet jester is one size fits all and has an adjustable touch
    fastener back for perfect fitting.


    search_string


    ''fit'':13,24 ''hat'':3A ''one'':11 ''back'':21 ''size'':12 ''prong'':7


    ''santa'':1A ''three'':6 ''touch'':19 ''adjust'':18 ''fasten'':20


    ''jester'':2A,9 ''velvet'':8 ''perfect'':23 ''three-prong'':5


    ■**Note** When adding new products to the table or updating existing products,
    you’ll need to be sure to also (re)create their search vectors. The index that
    parses these vectors does its job automatically, but the vector itself must be
    manually created. You’ll take care of this in Chapter 7, where you’ll add catalog
    administration features. Until then, if you change your products manually, just
    execute the previous SQL command to update the search vectors.


    Searching the Database


    Now that you’ve built the search vector for each product, let’s see how to use
    it for searching.


    For performing the search, once again, there are three steps that you need to
    take: **1.** Build a *search string* that expresses what exactly you are looking
    for. This can contain Boolean operators; we’ll use & (AND) when doing all-words
    searches, and | (OR) when doing any-words searches.


    **2.** Apply the to_tsquery function on the query string. This prepares the query
    string into a form that can be used for searching.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH05.qxd 10/31/06 10:04 PM Page 174


    **174**


    C H A P T E R 5 ■ S E A R C H I N G T H E C ATA L O G


    **3.** When performing the search, use the condition search_vector @@


    prepared_search_string, which returns TRUE if there’s a match and FALSE otherwise.


    Here, search_vector is the one calculated earlier (step 3 of the previous section),
    and prepared_search_string is the result of step 2.


    Let’s see how this would be applied in practice. The following query performs
    an all-words search on the “yankee war” search string:


    SELECT product_id, name


    FROM product


    WHERE search_vector @@ to_tsquery(''yankee & war'') ORDER BY product_id;


    With the sample products database, this query should have the results shown in
    Table 5-2.


    **Table 5-2.** *Hats That Match “yankee & war”*


    product_id


    name


    Civil War Union Slouch Hat


    Union Civil War Kepi Cap


    To perform an any-words search, you should use | instead of & in the search string:
    SELECT product_id, name


    FROM product


    WHERE search_vector @@ to_tsquery(''yankee | war'')


    ORDER BY product_id;


    As expected, this time you’ll have more matching products as shown in Table 5-3
    (because the list is unsorted, you may get these results in different order).


    **Table 5-3.** *Hats That Match “yankee | war”*


    product_id


    name


    Military Beret


    Confederate Civil War Kepi


    Uncle Sam Top Hat


    Confederate Slouch Hat


    Civil War Union Slouch Hat


    Civil War Leather Kepi Cap


    Union Civil War Kepi Cap


    Sorting Results by Relevance


    The previous queries show matching products without ordering them in any particular
    order.


    The database engine will simply return the results in whatever order it finds
    easier. For


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH05.qxd 10/31/06 10:04 PM Page 175


    C H A P T E R 5 ■ S E A R C H I N G T H E C ATA L O G


    **175**


    searches, we’re interested in showing the more relevant matches first. Remember
    that we gave higher priority to matches from the product titles, so everything
    is set.


    The tsearch2 engine offers the rank function that can be used for ordering the
    results. The default order is to show the lower ranking matches first, so you’ll
    also need to use the DESC


    option of ORDER BY to put the better matches at the top.'
