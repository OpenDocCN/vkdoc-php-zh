    \nThe SQL query is displayed twice. The first time shows the query as\n    it\
    \ appears in the PHP code—in this case, including the named parameter\n    :search.\
    \ The second time, it displays the actual value that was sent to\n    the database\
    \ server.\n\nIn this case, the search for “fount” returned a caption that begins\n\
    \    with “Fountains.” That’s fine if that’s what you expect. But let’s say,\n\
    \    you wanted only an exact match, seeing the `%` wildcard characters\n    would\
    \ explain the rogue result, making it easier to debug problems with\n    prepared\
    \ statements that don’t produce the results you anticipate.\n\nYou can compare\
    \ your code with `pdo_prepared_03.php`\n    in the `ch13`\n    folder.\n\nCaution\n\
    It’s important to call the `execute()` method\nbefore invoking `debugDumpParams()`.\n\
    Versions of PHP prior to 7.2 show only the prepared statement with\nanonymous\
    \ or named parameters.\n\nPHP Solution 13-10: Changing Column Options through\n\
    User Input\n\nThis PHP solution shows how to change the name of SQL keywords in\
    \ a\n`SELECT` query\nthrough user input. SQL keywords cannot be wrapped in quotes,\
    \ so using\nprepared statements won’t work. Instead, you need to ensure that the\n\
    user input matches an array of expected values. If no match is found,\nuse a default\
    \ value instead. The technique is identical for MySQLi and\nPDO.\n\n1.  Copy either\
    \ `mysqli_order_01.php`\n    or `pdo_order_01.php` from\n    the `ch13` folder\n\
    \    and save it in the `mysqli` or `pdo` folder. Both\n    versions select all\
    \ records from the `images` table and\n    display the results in a table. The\
    \ pages also contain a form that\n    allows the user to select the name of a\
    \ column by which to sort the\n    results in either ascending or descending order.\
    \ In its initial state,\n    the form is inactive. The pages display the details\
    \ sorted by `image_id` in ascending\n    order, like this:\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figq_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figq_HTML.jpg)\n\
    \n1.  Amend the code in the PHP block above the `DOCTYPE` declaration\n    like\
    \ this (the following listing shows the PDO version, but the changes\n    highlighted\
    \ in bold type are the same for MySQLi):\n\n```\n    require_once '../includes/connection.php';\n\
    \    require_once '../includes/utility_funcs.php';\n    // connect to database\n\
    \    $conn = dbConnect('read', 'pdo');\n    // set default values\n    $col =\
    \ 'image_id';\n    $dir = 'ASC';\n    // create arrays of permitted values\n \
    \   $columns = ['image_id', 'filename', 'caption'];\n    $direction = ['ASC',\
    \ 'DESC'];\n    // if the form has been submitted, use only expected values\n\
    \    if (isset($_GET['column']) && in_array($_GET['column'], $columns)) {\n  \
    \  $col = $_GET['column'];\n    }\n    if (isset($_GET['direction']) && in_array($_GET['direction'],\
    \ $direction)) {\n    $dir = $_GET['direction'];\n    }\n    // prepare the SQL\
    \ query using sanitized variables\n    $sql = \"SELECT * FROM images\n    ORDER\
    \ BY $col $dir\";\n    // submit the query and capture the result\n    $result\
    \ = $conn->query($sql);\n    $error = $conn->errorInfo()[2];\n    ```\n\nThe new\
    \ code defines two variables, `$col` and `$dir`, that are\n    embedded directly\
    \ in the `SELECT` query. Because\n    they have been assigned default values,\
    \ the query displays the results\n    sorted by the `image_id` column in\n   \
    \ ascending order when the page first loads.\n\nTwo arrays, `$columns` and `$direction`,\
    \ then\n    define permitted values: the column names and the `ASC` and `DESC`\
    \ keywords. These\n    arrays are used by the conditional statements that check\
    \ the `$_GET` array for `column` and `direction`. The\n    submitted values are\
    \ reassigned to `$col` and `$dir` only if they\n    match a value in the `$columns`\
    \ and `$direction` arrays,\n    respectively. This prevents any attempt to inject\
    \ illegal values into\n    the SQL query.\n\n2.  Edit the `<option>` tags\n  \
    \  in the drop-down menus so they display the selected values for `$col` and `$dir`,\
    \ like this:\n\n```\n\n>image_id\n\n>filename\n\n>caption\n\n>Ascending\n\n>Descending\n\
    \n```\n\n3.  Save the page and test it in a browser. You can change the sort order\n\
    \    of the display by selecting the values in the drop-down menus and\n    clicking\
    \ `Change`. However, if\n    you try to inject an illegal value through the query\
    \ string, the page\n    uses the default values of `$col` and `$dir` to display\
    \ the\n    results sorted by `image_id` in ascending\n    order.\n\nYou can check\
    \ your code against `mysqli_order_02.php`\nand `pdo_order_02.php` in\nthe `ch13`\n\
    folder.\n\nChapter Review\n\nPHP 7 provides two methods of communicating with\
    \ MySQL:\n\n*   **The MySQL Improved (MySQLi) extension**: This is\n    recommended\
    \ for all new MySQL projects. It’s more efficient than the\n    original MySQL\
    \ extension that was removed from PHP 7\\. It has the added\n    safety of prepared\
    \ statements and is fully compatible with\n    MariaDB.\n\n*   **The PHP Data\
    \ Objects (PDO) abstraction layer, which is\n    database-neutral**: This is my\
    \ preferred method of communicating\n    with a database. Not only is it database-neutral,\
    \ it has the advantage\n    of using named parameters for prepared statements,\
    \ making the code\n    easier to read and understand. Moreover, debugging prepared\
    \ statements\n    is trivially easy in PHP 7.2 and later. Although the code is\n\
    \    database-neutral, PDO requires the correct driver to be installed for\n \
    \   your chosen database. The driver for MySQL is fully compatible with\n    MariaDB\
    \ and is commonly installed. Other drivers are less common.\n    However, if the\
    \ correct driver is installed, only the data source name\n    (DSN) in the connection\
    \ string needs to be changed to switch from one\n    database to another."
