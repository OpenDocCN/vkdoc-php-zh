    ```


    Most of the logic for this program should now look familiar, as the program retrieves
    the data from the Excel spreadsheet using the same logic as before. It then opens
    the database and inserts the information into the database table.


    **Note**


    In order to use a different set of data, the code in this program would need to
    be modified for the new format. To populate your database table for testing, you
    can use this program in combination with the spreadsheet data provided with the
    chapter files. However, first, you would need to create the database and table
    using *phpMyAdmin*. The following fields should be created in the `student_data`
    table (which is located in the `studentresults` database): `studentindex (auto
    increment) lastname (varchar), firstname (varchar), gender (varchar), assignmentaverage
    (float), discussionaverage (float), researchaverage (float), semesteraverage (float),
    semestergrade (varchar)`.


    Now we have four types of test data available that we can use to populate our
    charts! We are ready to move onto the next steps!


    But before we look at more code, we need to decide on the logic of our program.
    Let us think about the steps required for the user to provide us the necessary
    information along with the process of creating the dashboard and the charts.


    - *Choose a file format*: Database, Excel spreadsheet, JSON, or CSV.

    - *If database is chosen*: Determine the database to use and determine the table
    within the database.

    - *If Excel spreadsheet is chosen*: Select the spreadsheet to use.

    - *If JSON is chosen*: Select the JSON file to use.

    - *If CSV is chosen*: Select the comma separated file to use.

    - *For any choice*: Determine which numeric column to use and one additional column.
    One column must be numeric for the population of a slider control to display a
    chosen subset of data.

    - *For any choice*: Retrieve the columns selected (array) and format them into
    a Google Data Table, which can be accessed by the dashboard and charts.

    - *Display the charts*: Create the chart wrappers, bind the data, and draw the
    dashboard and charts (the steps we previously mentioned).


    We will also use our basic MVC logic that we have developed from the previous
    chapters. This includes the use of the `Page_data.class.php` model from Chapter
    9 to organize our program flow. We will make only slight modifications to the
    class to only accept information related to the dashboard program. To see the
    modifications, copy the files for this chapter from the publisher’s website. Then
    open the file in a browser. We will create another model next to retrieve our
    data. We will also create any necessary controllers and views to complete the
    design of our application.


    ## Creating the Model Data Class


    From the list of tasks needed for the program, many of these require the ability
    to access the data selected. These tasks all belong in a model class which will
    include functions to return the requested data from the requested data source
    (database, spreadsheet, JSON file, CSV file). Let us look at the functions required
    for each task. All the functions will reside in the `accessData.class.php` file.


    Let us look at the functions required when selecting database data first.


    ```

    function returnDatabases() {

    $user = ''root'';

    $password = '''';

    $dbInfo = "mysql:host=localhost";

    $pdo = new PDO($dbInfo, $user, $password);

    $stmt = $pdo->query(''SHOW DATABASES'');

    $databases = $stmt->fetchAll(PDO::FETCH_COLUMN);

    $data = "";

    foreach($databases as $database){

    if(($database=="information_schema" or $database=="mysql" or

    $database=="performance_schema" or $database=="phpmyadmin"))

    { continue; }

    $data .= "$database";

    }

    $data .= "";

    return $data;

    }

    Listing 10-4

    Function returnDatabases from accessData.class.php

    ```


    The function `returnDatabases()` creates a drop-down list of databases.


    ```

    $pdo = new PDO($dbInfo, $user, $password);

    $stmt = $pdo->query(''SHOW DATABASES'');

    $databases = $stmt->fetchAll(PDO::FETCH_COLUMN);

    ```


    The MySQL/MariaDB database management system is opened using the provided location
    (`localhost`), userid (`root`), and password (`""`). The SQL command `SHOW DATABASES`
    is then executed to return the databases and related information. Since we want
    only the database names, we use the `PDO` function `fetchAll()` with the `FETCH_COLUMN`
    parameter to create an array (`$databases`).


    ```

    foreach($databases as $database){

    if(($database=="information_schema" or $database=="mysql" or

    $database=="performance_schema" or $database=="phpmyadmin"))

    { continue; }

    $data .= "$database";

    ```


    We will skip any standard databases which are populated by MySQL/MariaDB by using
    the command `continue`, which skips an iteration of the loop.


    Once we have selected the database, we need to select a table within the selected
    database for our chart information.


    ```

    function returnDatabaseTables($database){

    $user = ''root'';

    $password = '''';

    $dbInfo = "mysql:host=localhost;dbname=$database";

    $pdo = new PDO( $dbInfo, $user, $password );

    $stmt = $pdo->query(''SHOW TABLES'');

    $tables = $stmt->fetchAll(PDO::FETCH_COLUMN);

    $data = "";

    $data .= "";

    foreach($tables as $table){

    $data .= "$table";

    }

    $data .= "";

    return $data;

    }

    Listing 10-5

    Function returnDatabaseTables from accessData.class.php

    ```


    ```

    $pdo = new PDO( $dbInfo, $user, $password );

    $stmt = $pdo->query(''SHOW TABLES'');

    $tables = $stmt->fetchAll(PDO::FETCH_COLUMN);

    $data = "";

    ```


    First, we open access to the database by creating a new PDO Object (`$pdo`). Then
    we submit the SQL query `SHOW TABLES` to retrieve all table information from the
    database. We use the `fetchAll()` function with the `FETCH_COLUMN` parameter to
    create an array of table names (`$tables`). We save the database name in a hidden
    variable so we can use it in the next function called.


    ```

    foreach($tables as $table){

    $data .= "$table";

    }

    ```


    We create a drop-down list of all table names using a `foreach` loop. Next, we
    need to retrieve the column names in the table selected.'
