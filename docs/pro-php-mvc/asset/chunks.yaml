    {/else}


    The logic is simple: if the template has a $user variable, then the user is logged
    in and we should present alternate links. You might be wondering where this variable
    is set, so let’s recap how the login system works.


    A user enters their e-mail address and password. These fields are then submitted
    to the login() action, which requests a user row from the database. If a row is
    returned, the row will be serialized and stored in the session.'
