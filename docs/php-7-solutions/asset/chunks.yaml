    \n除了生成缩略图外，该类会自动在文件名扩展名之前插入 `_thb`，但构造函数方法的一个可选参数允许你更改这个值。另一个可选参数设置缩略图的最大尺寸。为了简化计算，最大尺寸仅控制缩略图两个尺寸中较大的那个。\n\
