- fmt: "将`action`属性留空或完全省略时，提交表单数据会重新加载页面。然而，空的`action`属性在HTML5中无效。PHP有一个非常便捷的超全局变量（`$_SERVER['PHP_SELF']`），它包含当前文件的站点根目录相对路径。将其设置为`action`属性的值会自动为自处理表单插入正确的值——但单独使用它会使您的站点暴露于一种名为**跨站脚本攻击**（XSS）的恶意攻击中。本PHP解决方案说明了该风险，并展示了如何安全地使用`$_SERVER['PHP_SELF']`。\n\
    \n1.  在浏览器中加载`ch06`文件夹中的`bad_link.php`。它包含一个指向同一文件夹中`form.php`的链接；但底层HTML中的链接被故意篡改以模拟XSS攻击。\n\
    \n2.  点击该链接。根据您使用的浏览器，您可能会看到目标页面已被阻止（如图6-3所示），或显示图6-4中的JavaScript警告对话框。\n\n![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig4_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Fig4_HTML.jpg)\n\
    \n图6-4. 并非所有浏览器都能阻止XSS攻击\n\n![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig3_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Fig3_HTML.jpg)\n\
    \n图6-3. Google Chrome会自动阻止可疑的XSS攻击\n\n注意：本PHP解决方案练习文件中的链接假设它们位于本地主机服务器根目录下的`phpsols-4e/ch06`文件夹中。如有必要，请根据您的测试环境进行调整。\n\
    \n1.  如有必要，关闭JavaScript警告对话框，然后右键查看页面源代码。第10行应该类似于这样：\n\n![../images/332054_4_En_6_Chapter/332054_4_En_6_Figd_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Figd_HTML.jpg)\n\
    \n`bad_link.php`中的恶意链接在开头的`<form>`标签之后立即注入了一段JavaScript代码到页面中。在这个例子中，它是一个无害的JavaScript警告；但在真实的XSS攻击中，它可能试图窃取cookie或其他个人信息。这种攻击将是静默的，用户除非在浏览器地址栏中注意到脚本，否则不会意识到发生了什么。\n\
    \n这种情况发生是因为`form.php`使用`$_SERVER['PHP_SELF']`来生成`action`属性的值。恶意链接将页面位置插入到`action`属性中，关闭了开头的表单标签，然后注入了`<script>`标签，该标签在页面加载时立即执行。\n\
    \n2.  一种简单但有效的防御此类XSS攻击的方法是将`$_SERVER['PHP_SELF']`传递给`htmlentities()`函数，如下所示：\n\
    \n```\n<form action=\"<?= htmlentities($_SERVER['PHP_SELF']); ?>\" method=\"post\"\
    >\n```\n\n这会将`<script>`标签的尖括号转换为其HTML实体等价物，从而阻止脚本执行。虽然这种方法有效，但它会在浏览器地址栏中留下恶意URL，可能导致用户质疑您网站的安全性。我认为更好的方法是在检测到XSS时将用户重定向到错误页面。\n\
    \n3.  在`form.php`中，在DOCTYPE声明之上创建一个PHP代码块，并使用当前文件的站点根目录相对路径定义一个变量，如下所示：\n\n4.\
    \  现在将`$currentPage`的值与`$_SERVER['PHP_SELF']`进行比较。如果它们不相同，则使用`header()`函数将用户重定向到错误页面并立即退出脚本，如下所示：\n\
    \n```\nif ($currentPage !== $_SERVER['PHP_SELF']) {\n    header('Location: http://localhost/phpsols-4e/ch06/missing.php');\n\
    \    exit;\n}\n```\n\n注意：传递给`header()`函数的位置必须是完整的URL。如果使用文档相对链接，目标地址会附加到恶意链接之后，导致页面无法成功重定向。\n\
    \n1.  使用`$currentPage`作为开头表单标签中`action`属性的值：\n\n```\n<form action=\"<?= $currentPage;\
    \ ?>\" method=\"post\">\n```\n\n2.  保存`form.php`，返回到`bad_link.php`，然后再次点击链接。这次您应该会直接被带到`missing.php`。\n\
    \n3.  直接在浏览器中加载`form.php`。它应该能正常加载并按预期工作。\n\n完成的版本位于`ch06`文件夹中的`form_end.php`。名为`bad_link_end.php`的文件链接到完成的版本，如果您只想测试脚本的话。\n\
    \n此技术涉及的代码比简单地将`$_SERVER['PHP_SELF']`传递给`htmlentities()`函数更多；但它的优势在于，如果用户点击了指向您表单的恶意链接，它能无缝地将用户引导至错误页面。显然，错误页面应该链接回您的主菜单。\n\
    \nPHP解决方案6-2：确保必填字段不为空\n\n当必填字段留空时，您不仅无法获得所需信息，而且用户可能永远收不到回复，尤其是在联系方式被省略的情况下。\n\
    \n继续使用本章前面“理解post和get之间的区别”中的文件。或者，使用`ch06`文件夹中的`contact_02.php`，并从文件名中移除`_02`。\n\
    \n1.  处理脚本使用两个数组：`$errors`和`$missing`，用于存储错误详情以及未填写的必填字段。这些数组将用于控制表单标签旁边错误消息的显示。页面首次加载时不应有任何错误，因此请在`contact.php`顶部的PHP代码块中将`$errors`和`$missing`初始化为空数组，如下所示：\n\
    \n2.  仅当表单已提交时，电子邮件处理脚本才应运行。使用条件语句检查超全局变量`$_SERVER['REQUEST_METHOD']`的值。如果它是`POST`（全部大写），则表示表单已使用`post`方法提交。将以下以粗体显示的代码添加到页面顶部的PHP代码块中。\n\
    \n提示：检查`$_SERVER['REQUEST_METHOD']`的值是否为`POST`是一个通用条件，可以用于任何表单，无论提交按钮的名称是什么。\n\
    \n1.  虽然您还不会实际发送电子邮件，但请定义两个变量来存储电子邮件的目标地址和主题行。以下代码放在上一步创建的条件语句内部：\n\n```\nif (\
    \ $_SERVER['REQUEST_METHOD'] == 'POST') {\n    // email processing script\n  \
    \  $to = 'david@example.com'; // use your own email address\n    $subject = 'Feedback\
    \ from Japan Journey';\n}\n```\n\n2.  接下来，创建两个数组：一个列出表单中每个字段的`name`属性，另一个列出所有*必填*字段。为了演示，将`email`字段设为可选，因此只有`name`和`comments`字段是必填的。在条件语句块内部，紧跟在定义主题行的代码之后添加以下代码：\n\
    \n```\n$subject = 'Feedback from Japan Journey';\n// list expected fields\n$expected\
    \ = ['name', 'email', 'comments'];\n// set required fields\n$required = ['name',\
    \ 'comments'];\n}\n```\n\n提示：为什么`$expected`数组是必需的？这是为了防止攻击者将其他变量注入到`$_POST`数组中，试图覆盖您的默认值。通过只处理您期望的变量，您的表单会安全得多。任何无关的值都会被忽略。"
  raw: "Leaving the `action` attribute of\nan opening form tag empty or omitting it\
    \ altogether reloads the form\nwhen the data is submitted. However, an empty `action`\
    \ attribute is\ninvalid in HTML5\\. PHP has a very convenient superglobal variable\
    \ (`$_SERVER['PHP_SELF']`)\nthat contains the site-root-relative path of the current\
    \ file. Setting\nit as the value of the `action` attribute\nautomatically inserts\
    \ the correct value for a self-processing form—but\nusing it on its own exposes\
    \ your site to a malicious attack known as\n**cross-site scripting** (XSS). This\
    \ PHP solution\nexplains the risk and shows how to use `$_SERVER['PHP_SELF']`\n\
    securely.\n\n1.  Load `bad_link.php` in the\n    `ch06` folder\n    into a browser.\
    \ It contains a single link to `form.php` in the same\n    folder; but the link\
    \ in the underlying HTML has been deliberately\n    malformed to simulate an XSS\
    \ attack.\n\n2.  Click the link. Depending on which browser you’re using, you\
    \ should\n    either see that the target page has been blocked (as shown in Figure\n\
    \    [6-3](#332054_4_En_6_Chapter.xhtml#Fig3)) or the\n    JavaScript alert dialog\
    \ shown in Figure [6-4](#332054_4_En_6_Chapter.xhtml#Fig4).\n\n![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig4_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Fig4_HTML.jpg)\n\
    \nFigure 6-4.\n\nNot all browsers are capable of blocking XSS attacks\n\n![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig3_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Fig3_HTML.jpg)\n\
    \nFigure 6-3.\n\nGoogle Chrome automatically blocks suspected XSS attacks\n\n\
    Note\nThe links in the exercise files for this PHP solution assume that\nthey\
    \ are in a folder called `phpsols-4e/ch06` in\nyour localhost server root. Adjust\
    \ them if necessary to match your\ntesting setup.\n\n1.  Dismiss the JavaScript\
    \ alert, if necessary, and right-click to view\n    the page source. Line 10 should\
    \ look similar to this:\n\n![../images/332054_4_En_6_Chapter/332054_4_En_6_Figd_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Figd_HTML.jpg)\n\
    \nThe malformed link in `bad_link.php` has\n    injected a snippet of JavaScript\
    \ into the page immediately after the\n    opening `<form>` tag. In\n    this\
    \ instance, it’s a harmless JavaScript alert; but in a real XSS\n    attack, it\
    \ could try to steal cookies or other personal information.\n    Such an attack\
    \ would be silent, leaving the user unaware of what has\n    happened unless they\
    \ notice the script in the browser address bar.\n\nThis has happened because `form.php`\
    \ uses `$_SERVER['PHP_SELF']`\n    to generate the value of the `action` attribute.\
    \ The\n    malformed link inserts the page location in the `action` attribute,\n\
    \    closes the opening form tag, and then injects the `<script>` tag,\n    which\
    \ is executed immediately as the page loads.\n\n2.  A simple, but effective, way\
    \ to neutralize this type of XSS attack is\n    to pass `$_SERVER['PHP_SELF']`\n\
    \    to the `htmlentities()`\n    function  like\n    this:\n\n```\n    \">\n\
    \    ```\n\nThis converts the angle brackets of the `<script>` tags\n    to their\
    \ HTML entity equivalents, preventing the script from being\n    executed. Although\
    \ it works, it leaves the malformed URL in the browser\n    address bar, which\
    \ could lead users to question the security of your\n    site. I think a better\
    \ solution is to redirect users to an error page\n    when XSS is detected.\n\n\
    3.  In `form.php`,\n    create a PHP block above the DOCTYPE declaration, and\
    \ define a variable\n    with the site-root-relative path to the current file\
    \ like this:\n\n4.  Now compare the value of `$currentPage` with\n    `$_SERVER['PHP_SELF']`.\n\
    \    If they’re not identical, use the `header()` function to\n    redirect the\
    \ user to an error page and immediately exit the script like\n    this:\n\n```\n\
    \    if ($currentPage !== $_SERVER['PHP_SELF']) {\n    header('Location: http://localhost/phpsols-4e/ch06/missing.php');\n\
    \    exit;\n    }\n    ```\n\nCaution\nThe location passed to the `header()` function\n\
    must be a fully qualified URL. If you use a document-relative link, the\ndestination\
    \ is appended to the malformed link, preventing the page from\nbeing redirected\
    \ successfully.\n\n1.  Use `$currentPage` as the\n    value of the `action` attribute\
    \ in\n    the opening form tag:\n\n```\n    \">\n    ```\n\n2.  Save `form.php`,\
    \ return to\n    `bad_link.php`,\n    and click the link again. This time you\
    \ should be taken directly to\n    `missing.php`.\n\n3.  Load `form.php` directly\
    \ in\n    the browser. It should load and work as expected.\n\nThe finished version\
    \ is in `form_end.php` in the\n    `ch06` folder.\n    The file called `bad_link_end.php`\n\
    \    links to the finished version if you just want to test the script.\n\nThis\
    \ technique involves more code than simply passing `$_SERVER['PHP_SELF']`\nto\
    \ the `htmlentities()`\nfunction; but it has the advantage of guiding users seamlessly\
    \ to an\nerror page if they have followed a malicious link to your form.\nObviously,\
    \ the error page should link back to your main menu.\n\nPHP Solution 6-2: Making\
    \ Sure Required Fields aren’t\nblank\nWhen required fields are left blank, you\
    \ don’t get the information\nyou need and the user may never get a reply, particularly\
    \ if contact\ndetails have been omitted.\n\nContinue using the file from “Understanding\
    \ the difference between post\nand get” earlier in this chapter. Alternatively,\
    \ use `contact_02.php` from\nthe `ch06` folder\nand remove `_02`\nfrom the filename.\n\
    \n1.  The processing script uses two arrays called `$errors` and `$missing` to\
    \ store\n    details of errors and required fields that haven’t been filled in.\
    \ These\n    arrays will be used to control the display of error messages alongside\n\
    \    the form labels. There won’t be any errors when the page first loads, so\n\
    \    initialize `$errors` and `$missing` as empty\n    arrays in the PHP code\
    \ block at the top of `contact.php`, like\n    this:\n\n2.  The email-processing\
    \ script should run only if the form has been\n    submitted. Use a conditional\
    \ statement to check the value of the\n    superglobal variable `$_SERVER['REQUEST_METHOD']`.\n\
    \    If it’s POST (all in uppercase), you know the form has been submitted\n \
    \   using the `post`\n    method. Add the code highlighted in bold to the PHP\
    \ block at the top of\n    the page.\n\nTip\nChecking that the value of `$_SERVER['REQUEST_METHOD']`\n\
    is POST is a generic condition that can be used with any form regardless\nof the\
    \ name of the Submit button.\n\n1.  Although you won’t be sending the email just\
    \ yet, define two variables\n    to store the destination address and subject\
    \ line of the email. The\n    following code goes inside the conditional statement\
    \ that you created in\n    the previous step:\n\n```\n    if ( $_SERVER['REQUEST_METHOD']\
    \ == 'POST') {\n    // email processing script\n    $to = 'david@example.com';\
    \ // use your own email address\n    $subject = 'Feedback from Japan Journey';\n\
    \    }\n    ```\n\n2.  Next, create two arrays: one listing the `name` attribute\
    \  of each field in the\n    form and the other listing all *required* fields.\
    \ For the sake of\n    this demonstration, make the `email` field optional,\n\
    \    so that only the `name` and `comments` fields are\n    required. Add the\
    \ following code inside the conditional block\n    immediately after the code\
    \ that defines the subject line:\n\n```\n    $subject = 'Feedback from Japan Journey';\n\
    \    // list expected fields\n    $expected = ['name', 'email', 'comments'];\n\
    \    // set required fields\n    $required = ['name', 'comments'];\n    }\n  \
    \  ```\n\nTip\nWhy is the `$expected` array\nnecessary? It’s to prevent an attacker\
    \ from injecting other variables\ninto the `$_POST`\narray in an attempt to overwrite\
    \ your default values. By processing only\nthose variables that you expect, your\
    \ form is much more secure. Any\nspurious values are ignored."
