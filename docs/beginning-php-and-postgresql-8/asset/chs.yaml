  \ `Windows`，并且你想从源代码编译，请注意有一个为 `Win32` 平台准备的单独源代码包可供下载。但是，请注意，本章不讨论 `Win32` 的源代码安装过程，而是重点介绍更常见（且推荐）的二进制安装程序。\n\
