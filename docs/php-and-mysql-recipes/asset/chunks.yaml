    Recipe 4-9\. Debugging Arrays


    Problem


    Arrays are printed directly as output so knowing the exact value of a super global
    or an array variable that is generated from a database query or an API call requires
    the use of other outputting methods.


    Solution


    PHP has three functions that make debugging of array variables easy. These are
    print_r() , var_dump(), and var_export() . The print_r() function walks through
    the array recursively and prints the keys and values in a nice readable way. The
    var_dump() and var_export() functions will also print information the data type
    and size of the elements


    CHAPTER 4 ■ WORKING WITH ARRAYS


    How it Works


    In this example we use an array with mixed numerical and string keys to show how
    the debug information looks when the three output methods are used.


    <?php


    // 4_28.php


    $a = array(


    ''apple'',


    ''orange'',


    ''banana'',


    ''animal'' => ''horse'',


    ''vechicle'' => ''truck''


    );


    print_r($a);


    var_dump($a);


    var_export($a);


    The output from this code looks like this:


    Array


    (


    [0] => apple


    [1] => orange


    [2] => banana


    [animal] => horse


    [vechicle] => truck


    )


    array(5) {


    [0]=>


    string(5) "apple"


    [1]=>


    string(6) "orange"


    [2]=>


    string(6) "banana"


    ["animal"]=>


    string(5) "horse"


    ["vechicle"]=>


    string(5) "truck"


    }


    array (


    0 => ''apple'',


    1 => ''orange'',


    CHAPTER 4 ■ WORKING WITH ARRAYS


    2 => ''banana'',


    ''animal'' => ''horse'',


    ''vechicle'' => ''truck'',


    )


    The first and the third example are the easiest to read but they do not contain
    any type info. Only the var_export() function produces output that can be used
    in an eval statement or written directly to a php script file to be included or
    executed at a later time. This can be useful for writing config files.


    Note that these outputs should be included in a <pre>..</pre> tag when they are
    used in a browser context in order for the formatting to be as shown above.


    Recipe 4-10\. Storing Arrays


    Problem


    Arrays are defined differently in different languages and are often not supported
    natively by file systems or databases, so how can the values of arrays be stored?


    Solution


    With the use of serialize() and unserialize() or json_encode() and json_decode()
    it’s possible to stringify any array (and other types of PHP variables) so they
    can be written to a file or saved as a value in a varchar column in a database.
    The json_* functions are also useful to convert arrays to a structure that can
    be interpreted by the JavaScript engine in a browser.'
  trans: "\n如果省略了 `length` 参数，则会移除从 `offset` 到数组末尾的所有元素。如果该参数为正数，函数将从 `offset` 位置开始移除指定数量的元素。如果\
    \ `length` 为负数，则通过从数组末尾倒数相应数量的元素来确定移除元素的结束位置。这些计算方式与 `substr()` 函数类似，该函数的 `offset`\
    \ 和 `length` 参数均可取正值和负值。\n\n以下示例中，有两个数组正在进行拼接操作。由于 `array_splice()` 函数直接作用于源数组，因此在调用该函数之前需要创建数组的副本（仅因为所有三个示例中使用了同一个数组）。\n\
    \n```php\n// 4_27.php\n\n$a = array(\n    'apple',\n    'orange',\n    'banana',\n\
    \    'animal' => 'horse',\n    'vechicle' => 'truck'\n);\n\n$b = array(\n    'kiwi',\n\
    \    'grape'\n);\n\n// 从数组中移除除两个元素外的所有元素\n$a1 = $a;\n$r = array_splice($a1, 2,\
    \ 2);\nprint_r($r);\nprint_r($a1);\n\n// 将 $b 插入到 $a 中\n$a1 = $a;\n$r = array_splice($a1,\
    \ 2, 0, $b);\nprint_r($r);\nprint_r($a1);\n\n// 移除一个元素并插入 $b\n$a1 = $a;\n$r =\
    \ array_splice($a1, 2, 1, $b);\nprint_r($r);\nprint_r($a1);\n```\n\n此示例的输出将得到以下六个数组：\n\
    \n```\nArray\n(\n    [0] => banana\n    [animal] => horse\n)\nArray\n(\n    [0]\
    \ => apple\n    [1] => orange\n    [vechicle] => truck\n)\nArray\n(\n)\nArray\n\
    (\n    [0] => apple\n    [1] => orange\n    [2] => kiwi\n    [3] => grape\n  \
    \  [4] => banana\n    [animal] => horse\n    [vechicle] => truck\n)\nArray\n(\n\
    \    [0] => banana\n)\nArray\n(\n    [0] => apple\n    [1] => orange\n    [2]\
    \ => kiwi\n    [3] => grape\n    [animal] => horse\n    [vechicle] => truck\n\
    )\n```\n\n## 食谱 4-9\\. 调试数组\n\n### 问题\n\n数组会直接作为输出打印，因此要了解超全局变量或由数据库查询或 API 调用生成的数组变量的确切值，就需要使用其他输出方法。\n\
    \n### 解决方案\n\nPHP 提供了三个使数组变量调试变得简单的函数：`print_r()`、`var_dump()` 和 `var_export()`。`print_r()`\
    \ 函数会递归遍历数组，并以清晰可读的方式打印出键和值。`var_dump()` 和 `var_export()` 函数还会打印元素的数据类型和大小信息。\n\
    \n### 工作原理\n\n在本例中，我们使用一个包含混合整数键和字符串键的数组，来演示使用三种输出方法时调试信息的呈现方式。\n\n```php\n//\
    \ 4_28.php\n\n$a = array(\n    'apple',\n    'orange',\n    'banana',\n    'animal'\
    \ => 'horse',\n    'vechicle' => 'truck'\n);\n\nprint_r($a);\nvar_dump($a);\n\
    var_export($a);\n```\n\n此代码的输出如下：\n\n```\nArray\n(\n    [0] => apple\n    [1]\
    \ => orange\n    [2] => banana\n    [animal] => horse\n    [vechicle] => truck\n\
    )\narray(5) {\n  [0]=>\n  string(5) \"apple\"\n  [1]=>\n  string(6) \"orange\"\
    \n  [2]=>\n  string(6) \"banana\"\n  [\"animal\"]=>\n  string(5) \"horse\"\n \
    \ [\"vechicle\"]=>\n  string(5) \"truck\"\n}\narray (\n  0 => 'apple',\n  1 =>\
    \ 'orange',\n  2 => 'banana',\n  'animal' => 'horse',\n  'vechicle' => 'truck',\n\
    )\n```\n\n第一个和第三个示例最易读，但它们不包含任何类型信息。只有 `var_export()` 函数生成的输出可以用于 `eval` 语句，或直接写入\
    \ PHP 脚本文件以供稍后包含或执行。这在编写配置文件时非常有用。\n\n请注意，在浏览器环境中使用这些输出时，应将其包含在 `<pre>..</pre>`\
    \ 标签中，以确保格式如上所示。\n\n## 食谱 4-10\\. 存储数组\n\n### 问题\n\n数组在不同语言中的定义方式不同，并且通常不被文件系统或数据库原生支持，那么如何存储数组的值呢？\n\
    \n### 解决方案\n\n通过使用 `serialize()` 和 `unserialize()` 或 `json_encode()` 和 `json_decode()`，可以将任何数组（以及其他类型的\
    \ PHP 变量）字符串化，以便写入文件或作为值保存在数据库的 `varchar` 列中。`json_*` 函数对于将数组转换为可由浏览器中 JavaScript\
    \ 引擎解释的结构也很有用。\n"
- fmt: "JSON 是 JavaScript Object Notation（JavaScript 对象表示法）的缩写，常用于在 JavaScript 代码中编写和交换数据，或在\
    \ PHP 和 JavaScript 等其他系统之间交换数据。它也可以作为 PHP 中的一种序列化格式使用。\n\n## 工作原理\n\n首先，考虑一个序列化数组的格式，以及同一个数组经过\
    \ JSON 编码后的字符串。两者都是字符串值，包含足够的信息来描述每个元素，以便其可以被重新生成。\n\n```php\n<?php\n\n// 4_29.php\n\
    \n$a = array(\n\n'apple',\n\n'orange',\n\n'banana',\n\n'animal' => 'horse',\n\n\
    'vechicle' => 'truck'\n\n);\n\necho serialize($a) . \"\\n\";\n\necho json_encode($a)\
    \ . \"\\n\";\n\n```\n两个输出如下所示：\n\n```\na:5:{i:0;s:5:\"apple\";i:1;s:6:\"orange\"\
    ;i:2;s:6:\"banana\";s:6:\"animal\";s:5:\"horse\";s:8:\"vechi cle\";s:5:\"truck\"\
    ;}\n{\"0\":\"apple\",\"1\":\"orange\",\"2\":\"banana\",\"animal\":\"horse\",\"\
    vechicle\":\"truck\"}\n```\n\n在序列化版本中，我们看到关于类型和长度的信息。`a:5:`表示一个包含五个元素的数组，`i:`表示整数，`s:6:`表示一个包含六个字符的字符串。在\
    \ 64 位和 32 位版本的 PHP 之间使用序列化数据可能导致溢出，因为整数在 64 位版本中可以存储更大的值。\n\n序列化数据可以写入数据库或文件，并在之后检索出来。\n\
    \n```php\n<?php\n\n// 4_30.php\n\n$a = array(\n\n'apple',\n\n'orange',\n\n'banana',\n\
    \n'animal' => 'horse',\n\n'vechicle' => 'truck'\n\n);\n\nfile_put_contents('serialize.dat',\
    \ serialize($a));\n```\n\n在这个例子中，我们将序列化数组写入一个名为`serialize.dat`的文件。在接下来的例子中，读取该文件，进行反序列化，并使用`print_r()`函数打印结果。\n\
    \n```php\n<?php\n\n// 4_31.php\n\n$a = unserialize(file_get_contents('serialize.dat'));\n\
    \nprint_r($a);\n```\n\n输出如下所示：\n\n```\nArray\n(\n    [0] => apple\n    [1] =>\
    \ orange\n    [2] => banana\n    [animal] => horse\n    [vechicle] => truck\n\
    )\n```\n\n## 第五章 日期和时间\n\nPHP 没有专门用于存储日期或时间值的变量类型。相反，使用整数来表示自 1970 年 1 月 1 日（也称为纪元）之前或之后的秒数。当日期和时间被视为单个值时，它们被称为时间戳。使用整数可以轻松计算两个时间戳之间的差异，因为可以应用普通数学运算。\n\
    \n### 配方 5-1：处理时区\n\n#### 问题\n\nPHP 中所有的日期和时间函数都假设时间戳是协调世界时（UTC）。\n\n有必要配置 PHP\
    \ 使用特定的时区，以转换所有日期值的输入和输出，使它们按正确顺序显示。\n\n#### 解决方案\n\nPHP 可以通过`php.ini`文件中的设置进行配置。该设置名为`date.timezone`，允许的值包括诸如`CET`（中欧时间）和`PST`（太平洋标准时间）等名称。此外，您还可以按区域和城市进行配置，例如`America/Los_Angeles`或`Europe/Amsterdam`。有关支持时区的完整列表，请参阅\
    \ http://php.net/manual/en/timezones.php。\n\n当网站用户都是本地用户且共享同一时区时，为 Web 服务器配置单个时区效果很好。如果用户来自不同的时区，则有必要能够为每个用户定义时区。这可以通过定义一个偏好设置来实现，用户可以在其中选择时区，并在使用任何日期函数之前使用`date_default_timezone_set()`函数设置当前时区。匿名用户没有定义的偏好，他们将看到的所有日期/时间值都假定为服务器定义的时区。\n\
    \n如果在调用日期/时间函数时未定义时区，系统将打印警告并回退到 UTC 时区。\n\n```\nWarning: date(): It is not safe\
    \ to rely on the system's time zone settings. You are\n*required* to use the date.timezone\
    \ setting or the date_default_timezone_set() function.\n```"
  raw: 'JSON is short for JavaScript Object Notation and it is commonly used to write
    and exchange data in JavaScript code or between other systems like PHP and JavaScript.
    It can also be used as a serialization format within PHP.


    How it Works


    Let''s first consider the format of an array that is serialized and the same array
    as a JSON encoded string. Both of them are string values that have enough information
    to describe each element in a form where it can be regenerated.


    <?php


    // 4_29.php


    $a = array(


    ''apple'',


    ''orange'',


    ''banana'',


    ''animal'' => ''horse'',


    ''vechicle'' => ''truck''


    );


    echo serialize($a) . "\n";


    echo json_encode($a) . "\n";


    CHAPTER 4 ■ WORKING WITH ARRAYS


    The two outputs will look like this:


    a:5:{i:0;s:5:"apple";i:1;s:6:"orange";i:2;s:6:"banana";s:6:"animal";s:5:"horse";s:8:"vechi
    cle";s:5:"truck";}


    {"0":"apple","1":"orange","2":"banana","animal":"horse","vechicle":"truck"}


    In the serialized version we see information about the type and length. The a:5:
    indicates an array with five elements, i: means integer and s:6: indicates a string
    with six characters. Using serialized data between 64-bit and 32-bit versions
    of PHP can lead to overflows as integers can hold much larger values in 64-bit
    versions.


    The serialized data can be written to a database or a file and retrieved again
    later.


    <?php


    // 4_30.php


    $a = array(


    ''apple'',


    ''orange'',


    ''banana'',


    ''animal'' => ''horse'',


    ''vechicle'' => ''truck''


    );


    file_put_contents(''serialize.dat'', serialize($a));


    In this example we write the serialized array to a file called serialize.data
    and in the follow example the file is read, unserialized, and the result is printed
    with the print_r() function


    <?php


    // 4_31.php


    $a = unserialize(file_get_contents(''serialize.dat''));


    print_r($a);


    And the output will look like this:


    Array


    (


    [0] => apple


    [1] => orange


    [2] => banana


    [animal] => horse


    [vechicle] => truck


    )


    **CHAPTER 5**


    **Dates and Times**


    PHP does not have a variable type dedicated to storing date or time values. Instead,
    integers are used to indicate the number of seconds before or since January 1st,
    1970, also called Epoc. When dates and times are treated as a single value they
    are called a timestamp. The use of integers makes it easy to calculate differences
    between two timestamps as ordinary math applies.


    Recipe 5-1\. Working with Time Zones


    Problem


    All the date and time functions in PHP assume the timestamps to be in Coordinated
    Universal Time (UTC) .


    It is necessary to configure PHP to use a specific time zone to convert all input
    and output of date values so they show up in the right order.


    Solution


    PHP can be configured with a setting in the php.ini file. The setting is called
    date.timezone and the allowable values include names such as CET for Central European
    Time and PST for Pacific Standard Time. In addition you can also configure it
    by region and city such as America/Los_Angeles or Europe/Amsterdam . For a full
    list of suppor[ted time zones please see http://php.net/manual/en/timezones.php](http://php.net/manual/en/timezones.php)
    .


    Having a single time zone configured for the web server works fine when the users
    of the web site are local and all share the same time zone. In cases where users
    come from different time zones it is necessary to be able to define the time zone
    for each user. This can be done by defining a preference where the user can select
    the time zone and use the function date_default_timezone_set() to set the current
    time zone before any date functions are used. Anonymous users will not have a
    preference defined, and they will get all date/


    time values presented as if they were in the time zone defined by the server.


    If the time zone is undefined when one of the date/time functions are called the
    system will print a warning and fall back to the UTC time zone .


    Warning: date(): It is not safe to rely on the system''s time zone settings. You
    are


    *required* to use the date.timezone setting or the date_default_timezone_set()
    function.'
