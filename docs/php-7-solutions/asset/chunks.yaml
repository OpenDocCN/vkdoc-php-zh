  trans: "\nPHP 中的计算遵循与标准算术相同的优先级规则。表 4-3 按优先级顺序列出了算术运算符，优先级最高的位于顶部。\n\n| 分组 | 运算符\
    \ | 规则 |\n| --- | --- | --- |\n| 括号 | `()` | 括号内的运算优先执行。如果这些表达式是嵌套的，则最内层的先求值。\
    \ |\n| 乘方 | `**` |  |\n| 递增/递减 | `++ --` |  |\n| 乘法与除法 | `* / %` | 如果表达式包含两个或更多此类运算符，则按从左到右的顺序求值。\
    \ |\n| 加法与减法 | `+ -` | 如果表达式包含两个或更多此类运算符，则按从左到右的顺序求值。 |\n\n表 4-3. 算术运算符的优先级\n\n\
    ## 结合计算与赋值\n\nPHP 提供了一种对变量执行计算并将结果重新赋值给变量的快捷方式，即使用**组合赋值运算符**。主要的运算符列于表 4-4 中。\n\
    \n| 运算符 | 示例 | 等效于 |\n| --- | --- | --- |\n| `+=` | `$a += $b` | `$a = $a + $b`\
    \ |\n| `-=` | `$a -= $b` | `$a = $a - $b` |\n| `*=` | `$a *= $b` | `$a = $a *\
    \ $b` |\n| `/=` | `$a /= $b` | `$a = $a / $b` |\n| `%=` | `$a %= $b` | `$a = $a\
    \ % $b` |\n| `**=` | `$a **= $b` | `$a = $a ** $b` |\n\n表 4-4. PHP 中使用的组合算术赋值运算符\n\
    \n## 向已有字符串追加内容\n\n同样便捷的简写形式允许你通过在现有字符串末尾添加新的内容，方法是组合使用一个点号和等号，如下所示：\n\n```\n\
    $hamlet = 'To be';\n$hamlet .= ' or not to be';\n```\n\n请注意，你需要在附加文本的开头创建一个空格，除非你希望两个字符串连接在一起时中间没有间隔。这种简写形式被称为**组合连接运算符**，在组合多个字符串时非常有用，例如在构建电子邮件内容或循环遍历数据库查询结果时。\n\
    \n> **提示**  \n> 在复制代码时，等号前面的点号很容易被忽略。当你在一系列语句的开头看到同一个变量重复出现时，这往往是一个明确的信号，表明你需要使用\
    \ `.=` 而不是单独的 `=`。\n\n## 关于引号你所需了解的一切——以及更多内容\n\n在任何计算机语言（不仅仅是 PHP）中处理引号都可能困难重重，因为计算机始终会将第一个匹配的引号视为字符串的结束标记。由于你的字符串可能包含撇号，仅靠单引号和双引号的组合是不够的。此外，PHP\
    \ 对双引号内的变量和转义序列（某些前面带有反斜杠的字符）会进行特殊处理。在接下来的几页中，我将为你解开这个纠缠，并让你彻底理解这一切。\n\n### PHP\
    \ 如何处理字符串中的变量\n\n选择使用双引号还是单引号可能看起来只是个人偏好问题，但 PHP 处理它们的方式有一个重要区别：\n\n- 单引号之间的任何内容都被视为纯文本。\n\
    - 双引号则作为处理变量和特殊字符（即**转义序列**）的信号。\n\n在以下示例中，`$name` 被赋予一个值，然后在单引号字符串中使用。因此 `$name`\
    \ 会被当作普通文本（代码位于 `quotes_01.php` 中）：\n\n```\n$name = 'Dolly';\necho 'Hello, $name';\
    \  // Hello, $name\n```\n\n如果你将第二行中的单引号替换为双引号（参见 `quotes_02.php`），`$name` 会被处理，其值会显示在屏幕上：\n\
    \n```\n$name = 'Dolly';\necho \"Hello, $name\";  // Hello, Dolly\n```\n\n> **注意**\
    \  \n> 在两个示例中，第一行的字符串都是单引号。导致变量被处理的原因是它位于双引号字符串中，而不是它最初是如何获得其值的。\n\n### 在双引号内使用转义序列\n"
- fmt: '双引号还有另一个重要作用：它们以特殊方式处理转义序列。所有转义序列都是通过在字符前放置反斜杠形成的。表[4-5](#332054_4_En_4_Chapter.xhtml#Tab5)列出了PHP支持的主要转义序列。


    表4-5. PHP主要转义序列


    | 转义序列 | 双引号字符串中表示的字符 |

    | --- | --- |

    | `\"` | 双引号 |

    | `\n` | 换行 |

    | `\r` | 回车 |

    | `\t` | 制表符 |

    | `\\` | 反斜杠 |

    | `\$` | 美元符号 |


    **注意**：除`\\`外，表[4-4](#332054_4_En_4_Chapter.xhtml#Tab4)中列出的转义序列仅在双引号字符串中有效。在单引号字符串中，它们被视为字面反斜杠后跟第二个字符。字符串末尾的反斜杠始终需要转义，否则它将被解释为转义后面的引号。


    ## 在字符串中嵌入关联数组元素


    在双引号字符串中使用关联数组元素存在一个棘手的“陷阱”。下面这行代码尝试从名为`$book`的关联数组中嵌入几个元素：


    ```

    echo "$book[''title''] was written by $book[''author''].";

    ```


    这段代码看起来没问题。数组元素的键使用了单引号，因此没有引号不匹配的问题。然而，如果将`quotes_03.php`加载到浏览器中，会收到一条令人费解的错误消息。

    ![../images/332054_4_En_4_Chapter/332054_4_En_4_Figa_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figa_HTML.jpg)


    解决方案很简单。需要将关联数组变量用花括号括起来，如下所示（参见`quotes_04.php`）：


    ```

    echo "{$book[''title'']} was written by {$book[''author'']}.";

    ```


    现在，值可以正确显示了，如以下截图所示。

    ![../images/332054_4_En_4_Chapter/332054_4_En_4_Figb_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figb_HTML.jpg)


    索引数组元素（例如`$shoppingList[2]`）不需要这种特殊处理，因为数组索引是数字，并且没有用引号括起来。


    ## 使用 heredoc 语法避免转义引号


    使用反斜杠转义一两个引号并不麻烦，但我经常看到反斜杠似乎失控的代码示例。PHP **heredoc 语法**提供了一种相对简单的方法，可以在不特殊处理引号的情况下将文本赋值给变量。


    **注意**：名称“heredoc”源自 here-document，这是在Unix和Perl编程中用于向命令传递大量文本的一种技术。


    使用 heredoc 将字符串赋值给变量涉及以下步骤：


    1.  输入赋值运算符，后跟`<<<`和一个标识符。标识符可以是字母、数字和下划线的任意组合，但不能以数字开头。稍后将使用相同的组合来标识 heredoc
    的结束。

    2.  在新的一行开始字符串。它可以包含单引号和双引号。任何变量都将以与双引号字符串相同的方式处理。

    3.  在字符串末尾之后的新行放置标识符。为了确保 heredoc 在所有版本的 PHP 中都能工作，标识符*必须*位于行首；它*不能*缩进。此外，同一行上不能有除最后的分号之外的任何其他内容。


    实际看到时，会更容易理解。以下简单示例位于本章文件的`heredoc.php`中：


    ```

    $fish = ''whiting'';

    $book[''title''] = ''Alice in Wonderland'';

    $mockTurtle = <<< Gryphon

    "Will you walk a little faster?" said a $fish to a snail.

    "There''s a porpoise close behind us, and he''s treading on my tail."

    (from {$book[''title'']})

    Gryphon;

    echo $mockTurtle;

    ```


    在此示例中，`Gryphon`是标识符。字符串从下一行开始，并且*双引号被视为字符串的一部分*。所有内容都包含在内，直到在新行开头遇到标识符。


    **注意**：尽管 heredoc 语法避免了转义引号的需要，但关联数组元素`$book[''title'']`仍然需要用花括号括起来，如前一节所述。或者，在双引号字符串或
    heredoc 中使用它之前，先将其赋值给一个更简单的变量。


    从以下截图可以看出，heredoc 显示了双引号，并处理`$fish`和`$book[''title'']`变量。

    ![../images/332054_4_En_4_Chapter/332054_4_En_4_Figc_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figc_HTML.jpg)


    为了在不使用 heredoc 语法的情况下达到相同效果，需要添加双引号并像这样转义它们：


    ```

    $mockTurtle = "\"Will you walk a little faster?\" said a $fish to a snail.

    \"There''s a porpoise close behind us, and he''s treading on my tail.\" (from

    {$book[''title'']})";

    ```


    当字符串很长或包含大量引号时，heredoc 语法特别有价值。如果希望将 XML 文档或大段 HTML 赋值给变量，它也非常有用。


    **注意**：PHP 7.3 放宽了关于结束标识符的一些限制。它可以缩进到与 heredoc 文本正文相同的级别（但不能更远）。还可以省略最后的分号，并在结束标识符后添加更多代码。


    ## 创建数组


    数组有两种类型：使用数字标识每个元素的索引数组和使用字符串的关联数组。可以通过直接为每个元素赋值来构建这两种类型。例如，`$book`关联数组可以这样定义：


    ```

    $book[''title''] = ''PHP 7 Solutions: Dynamic Web Design Made Easy, Fourth Edition'';

    $book[''author''] = ''David Powers'';

    $book[''publisher''] = ''Apress'';

    ```


    要直接构建索引数组，请使用数字而不是字符串作为数组键。索引数组从0开始编号，因此要构建上一章图[3-3](https://doi.org/10.1007/978-1-4842-4338-1_3Fig#3)中描绘的`$shoppingList`数组，可以像这样声明它：


    ```

    $shoppingList[0] = ''wine'';

    $shoppingList[1] = ''fish'';

    $shoppingList[2] = ''bread'';

    $shoppingList[3] = ''grapes'';

    $shoppingList[4] = ''cheese'';

    ```


    虽然这两种都是创建数组的有效方法，但还有更简短的方法。


    ### 构建索引数组


    快速的方法是使用简写语法，这与 JavaScript 中的数组字面量相同。通过将逗号分隔的值列表括在一对方括号中来创建数组，如下所示：


    ```

    $shoppingList = [''wine'', ''fish'', ''bread'', ''grapes'', ''cheese''];

    ```


    **注意**：逗号必须放在引号外面，这与美式排版惯例不同。为了便于阅读，我在每个逗号后面插入了一个空格，但这不是必需的。


    另一种方法是将逗号分隔的列表传递给`array()`，如下所示：


    ```

    $shoppingList = array(''wine'', ''fish'', ''bread'', ''grapes'', ''cheese'');

    ```


    PHP 会自动从0开始为每个数组元素编号，因此两种方法都创建了与单独编号相同的数组。


    要向数组末尾添加新元素，请使用一对空的方括号，如下所示：


    ```

    $shoppingList[] = ''coffee'';

    ```


    PHP 使用下一个可用的数字，因此这将成为`$shoppingList[5]`。


    ### 构建关联数组


    关联数组使用`=>`运算符（等号后跟大于号）为每个数组键赋值。使用简写方括号语法，结构如下所示：


    ```

    $arrayName = [''key1'' => ''element1'', ''key2'' => ''element2''];

    ```


    使用`array()`可以达到相同的结果：


    ```

    $arrayName = array(''key1'' => ''element1'', ''key2'' => ''element2'');

    ```


    因此，这是构建`$book`数组的简写方式：


    ```

    $book = [

    ''title''     => ''PHP 7 Solutions: Dynamic Web Design Made Easy, Fourth Edition'',

    ''author''    => ''David Powers'',

    ''publisher'' => ''Apress''

    ];

    ```'
  raw: "Double quotes have another important effect: they treat escape sequences\n\
    in a special way. All escape sequences are\nformed by placing a backslash in front\
    \ of a character. Table [4-5](#332054_4_En_4_Chapter.xhtml#Tab5) lists the main\n\
    escape sequences supported by PHP.\n\nTable 4-5.\nThe main PHP escape\nsequences\n\
    \nEscape sequence |\n Character represented in double-quoted string |\n\n| ---\
    \ | --- | --- | --- | --- |\n\n`\\\"` |\n Double quote |\n\n`\\n` |\n New line\
    \ |\n\n`\\r` |\n Carriage return |\n\n`\\t` |\n Tab |\n\n`\\\\` |\n Backslash\
    \ |\n\n`\\$` |\n Dollar sign |\n\nCaution\nWith the exception of `\\\\`, the escape\n\
    sequences listed in Table [4-4](#332054_4_En_4_Chapter.xhtml#Tab4) work only in\n\
    double-quoted strings. In a single-quoted string, they are treated as a\nliteral\
    \ backslash followed by the second character. A backslash at the\nend of the string\
    \ always needs to be escaped. Otherwise, it’s\ninterpreted as escaping the following\
    \ quotation mark.\n\nEmbedding Associative Array Elements in\na string\n\nThere’s\
    \ a nasty “gotcha” with associative array\nelements in a double-quoted string.\
    \ The following line of code\nattempts to embed a couple of elements from an associative\
    \ array called\n`$book`:\n\n```\necho \"$book['title'] was written by $book['author'].\"\
    ;\n```\n\nIt looks OK. The keys of the array elements use single quotes, so\n\
    there’s no mismatch of quotes. Yet, if you load `quotes_03.php` into a\nbrowser,\
    \ you get this enigmatic error message.\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figa_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figa_HTML.jpg)\n\
    \nThe solution is simple. You need to enclose the associative array variables\
    \ in curly\nbraces like this (see `quotes_04.php`):\n\n```\necho \"{$book['title']}\
    \ was written by {$book['author']}.\";\n```\n\nThe values are now displayed correctly,\
    \ as shown in the following\nscreenshot.\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figb_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figb_HTML.jpg)\n\
    Indexed array elements, such as `$shoppingList[2]`,\ndon’t need this special treatment\
    \ because the array index is a number\nand is not enclosed in quotes.\n\nAvoiding\
    \ the need to escape quotes with heredoc\nsyntax\nUsing a backslash to escape\
    \ one or two quotation marks isn’t a great\nburden, but I frequently see examples\
    \ of code where backslashes seem to\nhave run riot. The PHP \n**heredoc syntax**\
    \  offers a relatively simple\nmethod of assigning text to a variable without\
    \ any special handling of\nquotes.\n\nNote\nThe name “heredoc” is derived from\
    \ here-document, a technique used in\nUnix and Perl programming to pass large\
    \ amounts of text to a\ncommand.\n\nAssigning a string to a variable using heredoc\
    \ involves the following\nsteps:\n\n1.  Type the assignment operator, followed\
    \ by `<<<` and an\n    identifier. The identifier can be any combination of letters,\
    \ numbers,\n    and the underscore, but it can’t begin with a number. The same\n\
    \    combination is used later to identify the end of the heredoc.\n\n2.  Begin\
    \ the string on a new line. It can include both single and double\n    quotes.\
    \ Any variables will be processed in the same way as in a\n    double-quoted string.\n\
    \n3.  Place the identifier on a new line after the end of the string. To\n   \
    \ ensure the heredoc works in all versions of PHP, the identifier\n    *must*\
    \ be at the beginning of the line; it *cannot* be\n    indented. Moreover, nothing\
    \ else can be on the same line except the\n    final semicolon.\n\nIt’s a lot\
    \ easier when you see it in practice. The following simple\nexample can be found\
    \ in `heredoc.php` in the\nfiles for this chapter:\n\n```\n$fish = 'whiting';\n\
    $book['title'] = 'Alice in Wonderland';\n$mockTurtle = <<< Gryphon\n\"Will you\
    \ walk a little faster?\" said a $fish to a snail.\n\"There's a porpoise close\
    \ behind us, and he's treading on my tail.\"\n(from {$book['title']})\nGryphon;\n\
    echo $mockTurtle;\n```\n\nIn this example, `Gryphon` is the\nidentifier. The string\
    \ begins on the next line, and *the double\nquotes are treated as part of the\
    \ string*. Everything is included\nuntil you reach the identifier at the beginning\
    \ of a new line.\n\nCaution\nAlthough heredoc syntax avoids the need to escape\
    \ quotes, the\nassociative array element `$book['title']` still\nneeds to be enclosed\
    \ in braces, as described in the previous section.\nAlternatively, assign it to\
    \ a simpler variable before using it in a\ndouble-quoted string or heredoc.\n\n\
    As you can see from the following screenshot, the heredoc displays\nthe double\
    \ quotes and processes the `$fish` and `$book['title']`\nvariables.\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figc_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figc_HTML.jpg)\n\
    \nTo achieve the same effect without using the heredoc syntax, you need\nto add\
    \ the double quotes and escape them like this:\n\n```\n$mockTurtle = \"\\\"Will\
    \ you walk a little faster?\\\" said a $fish to a snail.\n\\\"There's a porpoise\
    \ close behind us, and he's treading on my tail.\\\" (from\n{$book['title']})\"\
    ;\n```\n\nThe heredoc syntax is mainly of value when you have a long string\n\
    and/or lots of quotes. It’s also useful if you want to assign an XML\ndocument\
    \ or a lengthy section of HTML to a variable.\n\nNote\nPHP 7.3 relaxes some of\
    \ the restrictions on the closing identifier.\nIt can be indented to the same\
    \ level as the body of the heredoc text\n(but no further). It’s also possible\
    \ to omit the final semicolon and add\nmore code after the closing identifier.\n\
    \nCreating arrays\n\nThere are two types of arrays: indexed arrays, which use\
    \ numbers to\nidentify each element, and associative arrays, which use strings.\
    \ You\ncan build both types by assigning a value directly to each element. For\n\
    example, the `$book` associative\narray can be defined like this:\n\n```\n$book['title']\
    \ = 'PHP 7 Solutions: Dynamic Web Design Made Easy, Fourth Edition';\n$book['author']\
    \ = 'David Powers';\n$book['publisher'] = 'Apress';\n```\n\nTo build an indexed\
    \ array the direct way, use numbers instead of strings\nas the array keys. Indexed\
    \ arrays are numbered from 0, so to build the\n`$shoppingList`\narray depicted\
    \ in Figure [3-3](https://doi.org/10.1007/978-1-4842-4338-1_3Fig#3) in the previous\
    \ chapter, you\nwould declare it like this:\n\n```\n$shoppingList[0] = 'wine';\n\
    $shoppingList[1] = 'fish';\n$shoppingList[2] = 'bread';\n$shoppingList[3] = 'grapes';\n\
    $shoppingList[4] = 'cheese';\n```\n\nAlthough both are perfectly valid ways of\
    \ creating arrays, there are\nshorter ways of doing it.\n\nBuilding an Indexed\
    \ Array\n\nThe quick way is to use the shorthand syntax, which is the same as\
    \ an\narray literal in JavaScript. You create the array by enclosing a\ncomma-separated\
    \ list of values between a pair of square brackets, like\nthis:\n\n```\n$shoppingList\
    \ = ['wine', 'fish', 'bread', 'grapes', 'cheese'];\n```\n\nCaution\nThe comma\
    \ must go outside the quotes, unlike in American typographic\npractice. For ease\
    \ of reading, I have inserted a space following each\ncomma, but it’s not necessary\
    \ to do so.\n\nThe alternative is to pass a comma-separated list to `array()`,\
    \ like this:\n\n```\n$shoppingList = array('wine', 'fish', 'bread', 'grapes',\
    \ 'cheese');\n```\n\nPHP numbers each array element automatically, beginning from\
    \ 0, so\nboth methods create the same array as if you had numbered them\nindividually.\n\
    \nTo add a new element to the end of the array, use a pair of empty square\nbrackets,\
    \ like this:\n\n```\n$shoppingList[] = 'coffee';\n```\n\nPHP uses the next number\
    \ available, so this becomes `$shoppingList[5]`.\n\nBuilding an associative array\n\
    \nAssociative arrays use the `=>` operator (an\nequal sign followed by a greater\
    \ than sign) to assign a value to each\narray key. Using shorthand square bracket\
    \ syntax, the structure looks\nlike this:\n\n```\n$arrayName = ['key1' => 'element1',\
    \ 'key2' => 'element2'];\n```\n\nUsing `array()`\nachieves the same outcome:\n\
    \n```\n$arrayName = array('key1' => 'element1', 'key2' => 'element2');\n```\n\n\
    So, this is the shorthand way to build the `$book` array:\n\n```\n$book = [\n\
    'title'     => 'PHP 7 Solutions: Dynamic Web Design Made Easy, Fourth Edition',\n\
    'author'    => 'David Powers',\n'publisher' => 'Apress'\n];\n```"
