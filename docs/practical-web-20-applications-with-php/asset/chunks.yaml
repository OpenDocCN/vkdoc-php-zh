    ## 第 14 章 ■ 部署与维护


    **535**


    **提示** 许多网站利用 404 错误，尝试用请求的 URI 做一些有用的事情，例如执行搜索。例如，如果你尝试访问位于 [`php.net`](http://php.net)
    的 PHP 网站，但指定了一个无效的 URL，该网站会自动根据请求中的关键词执行搜索。如果找到单个精确匹配，它会直接将你重定向到该页面；如果找到多个结果，它会通知你发生错误，然后提供搜索到的每个页面的链接。


    这对于快速查询 PHP 函数特别有用。例如，如果你访问 [`php.net/mysql_query`](http://php.net/mysql_query)，该网站的
    404 处理器会触发对 *mysql_query* 的搜索，结果会显示 `mysql_query()` 函数的手册页面。


    ## 网站管理


    如第 1 章所述，管理区域是任何网站的重要组成部分。网站的这一特殊部分允许运营网站的人员控制应用程序数据或修改网站的运作方式。


    由于开发此区域可能涉及的工作，以及它并未提出本书中尚未涵盖的任何新概念，我们实际上不会在此处开发管理区域。相反，我将列出一些你可能想要实现的功能想法，并为管理区域提供一个起点。此外，我在可下载的应用程序源代码中包含了各种管理员功能。


    ### 管理员区域功能


    接下来列出你可能希望在应用程序管理区域中包含的功能。这些功能基于我们在本书中实现的功能，不过很明显，如果你决定为应用程序添加新功能，你可能需要在此处添加额外的功能来管理属于新功能的数据。


    #### 用户管理


    这个区域可以说是最重要的可实现部分，因为它允许你轻松查看谁正在访问应用程序。通常，在用户管理区域中，你会使用以下功能：


    - 搜索现有用户或浏览用户列表。

    - 更新用户详细信息（例如用户名或密码）。此外，你应该有一个选项来选择用户的类型。这允许你将用户指定为管理员，然后他们可以访问管理区域。

    - 联系用户。这可以通过向所有用户发送定期新闻简报的方式实现。


    **注意** 务必让用户选择是否接收发送的批量电子邮件。你可以通过在其用户账户中添加一个新设置来实现这一点（有关如何实现新用户设置的示例，请参阅第 9 章的“控制用户设置”部分）。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch14CMP2 11/13/07 8:20 PM 第 536 页


    **536**


    #### 第 14 章 ■ 部署与维护


    - 删除用户。通常你不会想从数据库中删除用户，但偶尔可能需要这样做。


    **注意** 在实现删除功能之前，你需要确切决定如何处理已删除的数据。例如，如果用户 A 在用户 B 的博客上留下评论（假设你已实现评论系统），那么即使你想删除用户
    A，通常也不希望删除那条评论。数据库外键约束会阻止你在删除所有关联评论之前删除用户记录。因此，你必须要么不删除用户记录（可能改为禁用该账户），要么更新评论使其不再关联到该用户账户。


    #### 博客文章管理


    除了能够管理用户账户外，能够管理用户文章也可能是有用的。通常你不需要创建新的博客文章，但你可能需要编辑或删除包含攻击性内容的文章。


    具体来说，你需要与普通用户的博客管理功能几乎相同的功能，其中可能包括以下内容：


    - 编辑或删除博客文章及与文章相关的评论

    - 浏览上传的图片，并在需要时删除攻击性图片

    - 如果用户的任何内容被更改，通知用户（包括告知更改原因）


    #### 审计应用程序日志


    在本章的前面部分，我们探讨了一些使用应用程序日志的方法。除了在命令行上搜索日志外，你可能还想添加一个 Web 界面来搜索和浏览应用程序日志。


    日志查看的一些功能可能包括以下内容：


    - 查看两个日期之间的日志条目（或按预定义时间段查看，例如“本周”或“上个月”）。

    - 按日志条目的优先级进行过滤（即，是严重消息、信息或其他）。有关优先级级别的讨论，请参阅第 2 章。

    - 搜索特定条目（例如无效登录）。


    请注意，我们是将日志条目写入文件系统的文件中。使用 `Zend_Log`，也可以将日志条目记录到数据库中。你可能会发现，在数据库中过滤条目比在文件中过滤更容易。


    ### 实现管理功能


    现在我已经介绍了一些你可能希望用于管理区域的功能，我将列出一些实现说明，以帮助你入门。


