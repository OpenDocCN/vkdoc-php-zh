    Product Reviews


    **A**t this point, you havea complete and functional e-commerce web site. However,
    this doesn’t stop you from adding even more features to it, making it more useful
    and pleasant for visitors.


    By adding a product review system to your web site, you increase the chances that
    visitors will get back to your site, either to write a review for a product they
    bought, or to see what other people think about that product.


    A review system can also help you learn your customers’ tastes, which enables
    you to improve the product recommendations, and even make changes in the web site
    or the structure of the product catalog based on customer feedback.


    To make things easy for both you and the customer, you’ll add the list of product
    reviews and the form to add a new product review to the products’ details pages.
    The form to add a new product shows up only for registered users because we decided
    not to allow anonymous reviews (however, you can easily change this if you like).
    You’ll create the code for this new feature in the usual way, starting from the
    database and finishing with the user interface (UI). The final result of your
    work in this chapter will look like Figure 16-1.


    **537**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


