    Next, execute the file. At this stage, you need an interpreter, the `php.exe`
    file located in the folder where PHP was installed. Let’s assume that PHP is installed
    in the `C:\PHP` folder. The recipe for launching the program is simple: in the
    terminal’s command line, you must execute `php.exe`, passing the `hello.php` file
    to it (the file with the program) as a parameter. You can make that simple. You
    need to specify the full path to the `php.exe` file in the command line and, separated
    by a space, the full path to the file with the `hello.php` program. The corresponding
    command would look as follows.


    ```

    C:\PHP\php.exe D:\Books\php\codes\hello.php

    ```


    Nevertheless, specifying the full path to the files is not very convenient. In
    principle, you can move to the directory with the `php.exe` file installed and
    save the files with the PHP code in the same place. So, if PHP is installed in
    the `C:\PHP` folder, then to move to it, run the following command in the command
    line.


    | Details |

    | --- |

    | If you need to change a directory and a disk, use the `/d` option. For example,
    if you need to move from the `D:\` drive to the `C:\` drive, the command looks
    like `cd /d C:\`. |


    ```

    cd C:\PHP

    ```


    If the `hello.php` file is located in the same folder as the `php.exe` file, then
    you use the following command to run the program for execution.


    ```

    php hello.php

    ```


    The same command can be used under the Windows operating system if you add the
    path to the PHP folder to the `Path` environment variable and then move to the
    folder with the program file.


    | Details |

    | --- |

    | Select the **Advanced** system settings item in the computer properties to get
    the `Path` environment variable. In the **System Properties** window, select the
    **Environment Variables** icon. In the **Environment Variables** window, select
    the **Path** position and change the contents of the corresponding variable. |


    The use of development environments simplifies testing and executing codes. Let’s
    look at the Visual Studio Code environment as an example. Figure [1-1](#613529_1_En_1_Chapter.xhtml#Fig1)
    shows the environment’s window with the `hello.php` file open.


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig1_HTML.jpg)


    A screenshot of the Visual Studio Code development environment window with the
    hello dot p h p program file open. The eight menus at the top are File, Edit,
    Selection, View, Go, Run, Terminal, and Help. The print function is used. The
    output reads Hello, P H P!


    Figure 1-1


    The Visual Studio Code development environment window with the `hello.php` program
    file open


    In the environment window, open the folder with the program file. (You can use
    the **Open Folder** command from the **File** menu.) The files from this folder
    should appear in the **Explorer** section on the left side of the development
    environment window. In this case, select the file with the program. The file’s
    contents are displayed in the central part of the window. You can run the program
    in the terminal, which is opened using the **New Terminal** command from the **Terminal**
    menu. In the example, you enter the following command in the terminal command
    line.


    ```

    php hello.php

    ```


    If you use the Windows operating system, the `Path` environment variable must
    contain the path to the `php.exe` file. If not, you must specify the full path
    to that file, and the command looks as follows.


    ```

    C:\PHP\php.exe hello.php

    ```


    If everything goes well, then the message displayed by the program should appear
    in the terminal.


    However, the most comfortable and free way to develop is to use the NetBeans development
    environment (the site with the installation files is at [`http://netbeans.apache.org`](http://netbeans.apache.org)).
    The NetBeans environment window is shown in Figure [1-2](#613529_1_En_1_Chapter.xhtml#Fig2).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig2_HTML.jpg)


    A screenshot of the NetBeans environment window, Apache NetBeans I D E 19\. The
    thirteen menus at the top are File, Edit, View, Navigate, Source, Refactor, Run,
    Debug, Profile, Team, Tools, Window, and Help. The left panel has 3 tabs, including
    Projects, Files, and Services.


    Figure 1-2


    The NetBeans window


    To create a new project in this environment, select the **New Project** command
    from the **File** menu, as shown in Figure [1-3](#613529_1_En_1_Chapter.xhtml#Fig3).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig3_HTML.jpg)


    A cropped screenshot of the NetBeans environment window, Apache NetBeans I D E
    19\. The thirteen menus at the top are File, Edit, View, Navigate, Source, Refactor,
    Run, Debug, Profile, Team, Tools, Window, and Help. The New Project option under
    the File menu is selected.


    Figure 1-3


    Creating a new project


    The **New Project** window opens, as shown in Figure [1-4](#613529_1_En_1_Chapter.xhtml#Fig4).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig4_HTML.jpg)


    A screenshot of the New Project window from the NetBeans environment. Under the
    Choose Project option, P H P is selected from categories and P H P Application
    is selected from projects. Description reads creates a new P H P application in
    a standard I D E project. Such project can be easily run and debugged. The Next
    button is selected.


    Figure 1-4


    The window **New Project** for creating a new project


    In the window, you select the type of application (a PHP project must be created).
    The following **New PHP Project** window appears, as shown in Figure [1-5](#613529_1_En_1_Chapter.xhtml#Fig5).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig5_HTML.jpg)


    A screenshot of the New P H P Project window from the NetBeans environment. Under
    the five steps, the Name and Location option is selected. It includes Project
    Name, Sources Folder, P H P Version, and Default Encoding. The Next button is
    selected.


    Figure 1-5


    The **New PHP Project** window to set up the project parameters


    You use the window to perform the project settings, such as the project name (the
    **Project Name** field), project location (the **Sources Folder** field), and
    some others (it makes sense to leave them as they are by default).


    In the next window, a runtime environment is selected. You are interested in running
    from the command line. To do that, select the **Script (run in command line)**
    option in the **Run As** drop-down list, as shown in Figure [1-6](#613529_1_En_1_Chapter.xhtml#Fig6).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig6_HTML.jpg)


    A screenshot of the New P H P Project window from the NetBeans environment. Under
    the five steps, the Run Configuration option is selected. It includes configuration
    settings to run as script and P H P interpreter. The Next button is selected.


    Figure 1-6


    Selecting a runtime environment


    The **PHP Interpreter** field specifies the location of the PHP interpreter (in
    this case, `C:\PHP\php.exe`). The settings in other windows should be left unchanged.
    Figure [1-7](#613529_1_En_1_Chapter.xhtml#Fig7) shows the window of the newly
    created project.


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig7_HTML.jpg)'
  trans: '

    ## 解释器模式


    让我们探讨几种方案，您可以选择最喜欢的一种。


    > **注意**

    >

    > PHP 程序的执行有两种模式。第一种是在客户端计算机上使用解释器执行程序。第二种模式是将 PHP 代码封装在带有 HTML 标记的文档中。在这种情况下，您必须使用外部或本地服务器。实现这种方式比使用解释器执行代码稍复杂一些，但它更“自然”，也更贴近
    PHP 的实际应用。


    因此，首先要做的是创建一个包含程序的文件，如清单 1-1 所示，并将该文件保存为`.php`扩展名。例如，将文件命名为`hello.php`，放置在`D:\Books\php\codes`文件夹中。接下来，执行该文件。在此阶段，您需要一个解释器，即位于
    PHP 安装目录下的`php.exe`文件。假设 PHP 安装在`C:\PHP`文件夹中。启动程序的简单方法是：在终端命令行中，必须执行`php.exe`，并将`hello.php`文件（包含程序的文件）作为参数传递给它。您可以简化操作。您需要在命令行中指定`php.exe`文件的完整路径，并用空格隔开，指定`hello.php`程序的完整路径。相应的命令如下所示。


    ```

    C:\PHP\php.exe D:\Books\php\codes\hello.php

    ```


    不过，指定文件的完整路径并不十分方便。原则上，您可以切换到`php.exe`文件所在的目录，并将包含 PHP 代码的文件保存在同一位置。因此，如果 PHP
    安装在`C:\PHP`文件夹中，要切换到该目录，请在命令行中运行以下命令。


    > **详情**

    >

    > 如果需要更改目录和磁盘，请使用`/d`选项。例如，如果需要从`D:\`盘切换到`C:\`盘，命令格式为`cd /d C:\`。


    ```

    cd C:\PHP

    ```


    如果`hello.php`文件与`php.exe`文件位于同一文件夹中，则使用以下命令运行程序。


    ```

    php hello.php

    ```


    在 Windows 操作系统下，如果将 PHP 文件夹的路径添加到`Path`环境变量中，然后切换到程序文件所在的文件夹，也可以使用相同的命令。


    > **详情**

    >

    > 在计算机属性中选择**高级**系统设置项，以获取`Path`环境变量。在**系统属性**窗口中，选择**环境变量**图标。在**环境变量**窗口中，选择**Path**项并修改相应变量的内容。


    使用开发环境可以简化代码的测试和执行。我们以 Visual Studio Code 环境为例。图 1-1 显示了打开`hello.php`文件的环境窗口。


    ![Visual Studio Code 开发环境窗口的截图，其中打开了 hello.php 程序文件。顶部的八个菜单分别是文件、编辑、选择、查看、转到、运行、终端和帮助。使用了
    print 函数。输出显示为“Hello, PHP!”](img/613529_1_En_1_Fig1_HTML.jpg)


    **图 1-1** – 打开了`hello.php`程序文件的 Visual Studio Code 开发环境窗口


    在环境窗口中，打开包含程序文件的文件夹。（您可以使用**文件**菜单中的**打开文件夹**命令。）此文件夹中的文件应显示在开发环境窗口左侧的**资源管理器**部分。在这种情况下，选择程序文件。文件内容将显示在窗口的中央部分。您可以在终端中运行程序，终端通过**终端**菜单中的**新建终端**命令打开。在示例中，您在终端命令行中输入以下命令。


    ```

    php hello.php

    ```


    如果您使用 Windows 操作系统，`Path`环境变量必须包含`php.exe`文件的路径。如果没有，您必须指定该文件的完整路径，命令如下所示。


    ```

    C:\PHP\php.exe hello.php

    ```


    如果一切顺利，程序显示的消息应该会出现在终端中。


    然而，最舒适且免费的开发方式是使用 NetBeans 开发环境（安装文件的网站位于 [`netbeans.apache.org`](http://netbeans.apache.org)）。NetBeans
    环境窗口如图 1-2 所示。


    ![NetBeans 环境窗口的截图，Apache NetBeans IDE 19。顶部的十三个菜单分别是文件、编辑、查看、导航、源代码、重构、运行、调试、性能分析、团队、工具、窗口和帮助。左侧面板有
    3 个选项卡，包括项目、文件和服务。](img/613529_1_En_1_Fig2_HTML.jpg)


    **图 1-2** – NetBeans 窗口


    要在此环境中创建新项目，请选择**文件**菜单中的**新建项目**命令，如图 1-3 所示。


    ![NetBeans 环境窗口的裁剪截图，Apache NetBeans IDE 19。顶部的十三个菜单分别是文件、编辑、查看、导航、源代码、重构、运行、调试、性能分析、团队、工具、窗口和帮助。文件菜单下的新建项目选项被选中。](img/613529_1_En_1_Fig3_HTML.jpg)


    **图 1-3** – 创建新项目


    **新建项目**窗口打开，如图 1-4 所示。


    ![NetBeans 环境中新建项目窗口的截图。在选择项目选项下，类别中选择了 PHP，项目中选择 PHP 应用程序。描述显示“在标准 IDE 项目中创建一个新的
    PHP 应用程序。此类项目可以轻松运行和调试。”下一步按钮被选中。](img/613529_1_En_1_Fig4_HTML.jpg)


    **图 1-4** – 用于创建新项目的**新建项目**窗口


    在窗口中，您选择应用程序的类型（必须创建一个 PHP 项目）。随后会出现**新建 PHP 项目**窗口，如图 1-5 所示。


    ![NetBeans 环境中新建 PHP 项目窗口的截图。在五个步骤下，选择了名称和位置选项。它包括项目名称、源文件夹、PHP 版本和默认编码。下一步按钮被选中。](img/613529_1_En_1_Fig5_HTML.jpg)


    **图 1-5** – 用于设置项目参数的**新建 PHP 项目**窗口


    您使用该窗口执行项目设置，例如项目名称（**项目名称**字段）、项目位置（**源文件夹**字段）以及其他一些设置（保持默认值即可）。


    在下一个窗口中，选择运行时环境。您关注的是从命令行运行。为此，请在**运行方式**下拉列表中选择**脚本（在命令行中运行）**选项，如图 1-6 所示。


    ![NetBeans 环境中新建 PHP 项目窗口的截图。在五个步骤下，选择了运行配置选项。它包括以脚本和 PHP 解释器方式运行的配置设置。下一步按钮被选中。](img/613529_1_En_1_Fig6_HTML.jpg)


    **图 1-6** – 选择运行时环境


    **PHP 解释器**字段指定 PHP 解释器的位置（本例中为`C:\PHP\php.exe`）。其他窗口中的设置应保持不变。图 1-7 显示了新创建项目的窗口。


    ![NetBeans 中新创建项目窗口的截图](img/613529_1_En_1_Fig7_HTML.jpg)

