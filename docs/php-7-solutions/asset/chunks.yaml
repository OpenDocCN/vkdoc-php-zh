  trans: "\n### 使用虚拟主机\n\n将 PHP 文件存储在 Web 服务器文档根目录以外的另一种选择是使用虚拟主机。虚拟主机为每个站点创建唯一的地址，这也是托管公司管理共享主机的方式。MAMP\
    \ PRO 通过其控制面板简化了虚拟主机的设置。EasyPHP 也提供了一个用于管理虚拟主机的插件模块。\n\n手动设置虚拟主机需要编辑计算机的一个系统文件，在本地机器上注册主机名。你还需要告知本地测试环境中的\
    \ Web 服务器文件所在的位置。这个过程并不困难，但每次设置新的虚拟主机时都需要操作一次。\n\n在虚拟主机中设置每个站点的优势在于，它能更精确地匹配实际网站的结构。不过，在学习\
    \ PHP 时，使用测试服务器文档根目录的子文件夹可能更方便。当你积累了 PHP 经验后，就可以进阶使用虚拟主机。在 Apache 中手动设置虚拟主机的说明请参考我网站上的以下地址：\n\
    \n- **Windows**: [`http://foundationphp.com/tutorials/apache_vhosts.php`](http://foundationphp.com/tutorials/apache_vhosts.php)\n\
    - **MAMP**: [`http://foundationphp.com/tutorials/vhosts_mamp.php`](http://foundationphp.com/tutorials/vhosts_mamp.php)\n\
    \n### 提示\n\n请记得启动测试环境中的 Web 服务器来查看 PHP 页面。\n\n## 检查你的 PHP 设置\n\n安装 PHP 后，最好检查一下它的配置设置。除了核心功能外，PHP\
    \ 还有大量可选扩展。本书所需的所有扩展，集成安装包和 Microsoft Web PI 都已安装。然而，一些基本的配置设置可能略有不同。为避免意外问题，请调整你的\
    \ PHP 配置，使其与以下页面推荐的设置保持一致。\n\n### 使用 phpinfo()显示服务器配置\n\nPHP 有一个内置命令`phpinfo()`，可以显示\
    \ PHP 在服务器上的配置详情。`phpinfo()`产生的详细信息量可能会让人感觉信息过载，但对于确定为什么某些东西在本地计算机上工作完美，而在实际网站上却不行，它极其有价值。问题通常在于远程服务器禁用了某个功能或未安装某个可选扩展。\n\
    \n集成安装包使运行`phpinfo()`变得简单：\n\n- **XAMPP**: 点击 XAMPP 欢迎屏幕顶部菜单中的`phpinfo`链接。\n-\
    \ **MAMP**: 点击 MAMP 欢迎页面顶部主菜单中的`phpinfo`。\n- **WampServer**: 打开 WampServer 菜单并点击\
    \ Localhost。`phpinfo()`的链接位于“工具”下。\n\n或者，创建一个简单的测试文件，并按照以下说明在浏览器中加载它：\n\n1. 确保\
    \ Apache 或 IIS 在你的本地计算机上运行。\n2. 在脚本编辑器中输入以下内容：\n\n   ```\n   <?php phpinfo();\n\
    \   ```\n\n   文件中不应有其他任何内容。\n3. 将文件保存为`phpinfo.php`，放置在服务器的文档根目录中（参见本章前面的“在哪里放置你的\
    \ PHP 文件（Windows 和 Mac）”）。\n4. 在浏览器地址栏中输入`http://localhost/phpinfo.php`并按回车键。\n\
    5. 你应该会看到一个类似于图 2-3 的页面，显示 PHP 版本以及你的 PHP 配置的详细信息。\n\n   ![../images/332054_4_En_2_Chapter/332054_4_En_2_Fig3_HTML.jpg](img/332054_4_En_2_Fig3_HTML.jpg)\n\
    \n   图 2-3. 运行`phpinfo()`命令会显示 PHP 配置的完整详情\n6. 记下“已加载的配置文件”项的值。这将告诉你`php.ini`的位置，`php.ini`是需要编辑以更改大多数\
    \ PHP 设置的文本文件。\n7. 向下滚动到标记为“核心”的部分，并将设置与表 2-1 中推荐的设置进行比较。记下任何差异，以便你可以按照本章后续所述的方法进行更改。\n\
    \n**表 2-1. 推荐的 PHP 配置设置**\n\n| 指令 | 本地值 | 备注 |\n| --- | --- | --- |\n| `display_errors`\
    \ | 开启 | 对调试脚本中的错误至关重要。如果设置为关闭，错误会导致完全空白的屏幕，让你对可能的原因毫无头绪。 |\n| `error_reporting`\
    \ | 32767 | 将错误报告级别设置为最高。 |\n| `file_uploads` | 开启 | 允许你使用 PHP 将文件上传到网站。 |\n|\
    \ `log_errors` | 关闭 | 当`display_errors`开启时，你不需要用错误日志填满硬盘。 |\n\n8. 配置页面的其余部分显示哪些\
    \ PHP 扩展已启用。虽然页面似乎会一直往下延伸，但所有扩展都按字母顺序列出。要学习本书，请确保已启用以下扩展：\n\n   - **gd**: 使 PHP\
    \ 能够生成和修改图像及字体。\n   - **mysqli**: 连接 MySQL/MariaDB（注意“i”代表“improved”（改进版））。PHP\
    \ 7 不支持旧的`mysql`扩展，该扩展不应再使用）。\n   - **PDO**: 提供与数据库无关的支持（可选）。\n   - **pdo_mysql**:\
    \ 连接 MySQL/MariaDB 的替代方法（可选）。\n   - **session**: 会话维护与用户关联的信息，用于用户认证等功能。\n\n你还应该在远程服务器上运行`phpinfo()`来检查哪些功能已启用。如果列出的扩展不受支持，那么当你将文件上传到网站时，本书中的部分代码将无法正常工作。`PDO`和`pdo_mysql`在共享主机上并不总是启用，但你可以改用`mysqli`。`PDO`的优势在于它与软件无关，因此你只需更改一、两行代码，就能使脚本适用于\
    \ MySQL 以外的数据库。而使用`mysqli`则让你必须使用 MySQL/MariaDB。\n\n如果你设置中的任何核心设置与表 2-1 中的推荐值不同，你将需要按照下一节所述，编辑\
    \ PHP 配置文件`php.ini`。\n\n### 警告\n\n`phpinfo()`显示的输出会泄露大量信息，这些信息可能被恶意黑客用来攻击你的网站。检查完配置后，务必从远程服务器上删除该文件。不要为了日后方便而将其留在那里。对你来说方便的东西，对坏人来说甚至更方便。\n"
- fmt: '### Editing `php.ini`


    The PHP configuration file, `php.ini`, is a very long file, which tends to unnerve
    newcomers to programming, but there’s nothing to worry about. It’s written in
    plain text, and one reason for its length is that it contains copious comments
    explaining the various options. That said, it’s a good idea to make a backup copy
    before editing `php.ini` in case you make a mistake.


    How you open `php.ini` depends on your operating system and how you installed
    PHP:


    - If you used an all-in-one package, such as XAMPP, on Windows, double-click `php.ini`
    in Windows Explorer. The file opens automatically in Notepad.

    - If you installed PHP using the Microsoft Web PI, `php.ini` is normally located
    in a subfolder of Program Files. Although you can open `php.ini` by double-clicking
    it, you won’t be able to save any changes you make. Instead, right-click Notepad
    and select Run as Administrator. Inside Notepad, select File ➤ Open and set the
    option to display All Files (`*.*`). Navigate to the folder where `php.ini` is
    located, select the file, and click Open.

    - On macOS, use a plain text editor to open `php.ini`. If you use TextEdit, make
    sure it saves the file as plain text, not Rich Text Format.


    Lines that begin with a semicolon (`;`) are comments. The lines you need to edit
    do not begin with a semicolon.


    Use your text editor’s Find functionality to locate the directives you need to
    change to match the recommendations in Table [2-1](#332054_4_En_2_Chapter.xhtml#Tab1).
    Most directives are preceded by one or more examples of how they should be set.
    Make sure you don’t edit one of the commented examples by mistake.


    For directives that use `On` or `Off`, just change the value to the recommended
    one. For example, if you need to turn on the display of error messages, edit this
    line:


    ```

    display_errors = Off

    ```


    by changing it to this:


    ```

    display_errors = On

    ```


    To set the level of error reporting, you need to use PHP constants, which are
    written in uppercase and are case-sensitive. The directive should look like this:


    ```

    error_reporting = E_ALL

    ```


    After editing `php.ini`, save the file and then restart Apache or IIS so that
    the changes take effect. If the web server won’t start, check the server’s error
    log file. It can be found in the following locations:


    - **XAMPP**: In the XAMPP Control Panel, click the Logs button alongside Apache
    and then select Apache (error.log).

    - **MAMP**: In `/Applications/MAMP/logs`, double-click `apache_error.log` to open
    it in Console.

    - **WampServer**: In the WampServer menu, select Apache ➤ Apache error log.

    - **EasyPHP**: Right-click the EasyPHP icon in the system tray and select Log
    Files ➤ Apache.

    - **IIS**: The default location of log files is `C:\inetpub\logs`.


    The most recent entry in the error log should give you an indication of what prevented
    the server from restarting. Use that information to correct the changes you made
    to `php.ini`. If that doesn’t work, be thankful you made a backup of `php.ini`
    before editing it. Start again with a fresh copy and check your edits carefully.


    ## What’s Next?


    Now that you’ve got a working test bed for PHP, you’re no doubt raring to go.
    The last thing I want to do is dampen any enthusiasm, but before using PHP in
    a live web site, you should have a basic understanding of the rules of the language.
    So, before jumping into the cool stuff, read the next chapter, which explains
    how to write PHP scripts. Don’t skip it, even if you’ve already dabbled with PHP—it’s
    really important.


    # 3. How to Write PHP Scripts


    This chapter offers a quick overview of how PHP works and gives you the basic
    rules. It’s aimed primarily at readers who have no previous experience of PHP
    or coding. Even if you’ve worked with PHP before, check the main headings to see
    what this chapter contains and brush up your knowledge on any aspects that you’re
    a bit hazy about.


    This chapter covers:

    - Understanding how PHP is structured

    - Embedding PHP in a web page

    - Storing data in variables and arrays

    - Getting PHP to make decisions

    - Looping through repetitive tasks

    - Using functions for preset tasks

    - Displaying PHP output

    - Understanding PHP error messages


    ## PHP: The Big Picture


    At first glance, PHP code can look quite intimidating, but once you understand
    the basics, you’ll discover that the structure is remarkably simple. If you have
    worked with any other computer language, such as JavaScript or jQuery, you’ll
    find they have a lot in common.


    Every PHP page *must* have the following:

    - The correct filename extension, usually `.php`

    - PHP tags surrounding each block of PHP code (the closing PHP tag is optional
    if the file contains only PHP code)


    A typical PHP page will use some or all of the following elements:

    - Variables to act as placeholders for unknown or changing values

    - Arrays to hold multiple values

    - Conditional statements to make decisions

    - Loops to perform repetitive tasks

    - Functions or objects to perform preset tasks


    Let’s take a quick look at each of these in turn, starting with the filename and
    the opening and closing tags.'
