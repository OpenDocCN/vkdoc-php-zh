- fmt: '### Preparing the `tmp` Folder for Cake to Read and Write Temp Files


    The `tmp` folder is located in the app folder. By default, its permissions are
    set to `0777`, but it is possible for it to change to a server permissions default.
    The Cake welcome screen tells you whether the `tmp` folder is writable. If this
    bar lights up green, then the `tmp` folder doesn’t need to be adjusted. If not,
    run the following at the command line to change the `tmp` permissions and its
    enclosures:


    ```

    chmod -R 0777 tmp

    ```


    Then refresh the startup screen. It should change to “Your `tmp` directory is
    writable” (see Figure 2-3).


    **Figure 2-3.** *Cake tells you whether your `tmp` folder is writable.*


    ### Changing the `Security.salt` Value


    When a session is initialized, the server groups a set of requests together using
    a session ID, a database, or a cookie. Whatever the method, the idea behind the
    session is that the server can maintain a pseudoconnection with the user, even
    though the communication could get interrupted along the way. You’ve run into
    this when you’ve logged into your web-based e-mail account or some similar web
    service. The site application knows that you’re logged in and maintains that status
    until you log out or a certain length of inactivity transpires.


    Luckily, Cake makes session handling easy. But you need to make sure that its
    session string is secure. You wouldn’t want any users to toy with the session
    handling in an effort to break into your applications.


    To add some security to the session variables, open the `app/config/core.php`
    file, and locate line 153, or thereabouts. You’ll find a line that looks like
    this: `Configure::write(''Security.salt'', ''DYhG93b0qyJfIxfs2guVoUubWwvniR2G0FgaC9mi'');`
    This line is how Cake writes definitions. Rather than use the PHP `define()` function,
    Cake’s core configuration uses the `Configure::write()` function to better manage
    global variables. Here, the Cake core uses the `Security.salt` definition for
    creating hashes and other session variables.


    Because that funky line of characters comes with Cake, everyone who uses Cake
    has the same session string. Let’s change the second portion, the character string,
    to something unique. Go ahead and fill in any alphanumeric string, about 40 characters
    in length, and paste it here. I ended up with this:


    ```

    Configure::write(''Security.salt'', ''mEayuDrXBhZkdiEJgFzPXvbcBrmKo9CdVGtKyPBr'');

    ```


    Now Cake has a salt value for when it needs to run any security configurations
    and hashing that aren’t the default value.


    ### Entering MySQL Connection Settings


    Cake needs to know where your databases are located to save and retrieve data.
    You do this by editing the `app/config/database.php.default` file. You’ll need
    to rename the file to `database.php` (remove the `.default` from the end) and
    edit it in the plain-text editor of your choice. However your `localhost` is set
    up, you will need to know the MySQL login and password for Cake to connect to
    the database. This is generally set to a default value unless you configure the
    administrator’s account (for example, the login and password have default values
    of `root` and so forth). In the database configuration, there will be a place
    for you to enter the login and password values. Listing 2-1 shows the default
    `DATABASE_CONFIG` class in the database configuration file.


    **Listing 2-1.** *The Database Configuration File*


    ```

    1 class DATABASE_CONFIG {

    3   var $default = array(

    4    ''driver'' => ''mysql'',

    5    ''persistent'' => false,

    6    ''host'' => ''localhost'',

    7    ''port''=>'''',

    8    ''login'' => ''user'',

    9    ''password'' => ''password'',

    10   ''database'' => ''project_name'',

    11   ''schema''=>'''',

    12   ''prefix'' => '''',

    13   ''encoding''=>''''

    14   );

    16   var $test = array(

    17    ''driver'' => ''mysql'',

    18    ''persistent'' => false,

    19    ''host'' => ''localhost'',

    20    ''port''=>'''',

    21    ''login'' => ''user'',

    22    ''password'' => ''password'',

    23    ''database'' => ''project_name-test'',

    24    ''schema''=>'''',

    25    ''prefix'' => ''''

    26    ''encoding''=>''''

    27   );

    28 }

    ```


    In this class `DATABASE_CONFIG`, there are two databases it will connect with:
    `default` and `test`. If you have no intention of creating a separate test database,
    you can delete lines 13–21.


    Plop your database settings into the necessary lines, as shown in Listing 2-2.


    **Listing 2-2.** *Adding the Localhost Settings to Your Database Configuration*


    ```

    3   var $default = array(

    4    ''driver'' => ''mysql'',

    5    ''persistent'' => false,

    6    ''host'' => ''localhost'',

    7    ''port''=>'''',

    8    ''login'' => ''root'',

    9    ''password'' => ''root'',

    10   ''database'' => ''cake'',

    11   ''schema''=>'''',

    12   ''prefix'' => '''',

    13   ''encoding''=>''''

    14   );

    ```


    In this tutorial, you’re creating a generic Cake application. Later in the book,
    you’ll name the database based on the application you’re building, but for now,
    you’ll just create a database called `cake`. The settings shown in Listing 2-2
    will tell Cake how to connect with this database, but you aren’t done yet...you
    need to create the database!


    ### Designing Your Database Schema


    It’s best to know how the database design will work from the outset. So, take
    some time to get at least a moderate idea of the program you’re building first,
    and then build some tables and fields to fit that design. Chapter 4 will walk
    you through a detailed tutorial on how to design the schema to fit Cake applications.
    For now, just remember that building the structure of the database naturally occurs
    here when installing a new Cake application.


    This application is very simple with nothing really in the database. You just
    want to connect Cake to the database. Fire up the MySQL application of your choice
    (I’m using CocoaMySQL), and connect to MySQL. Create a database called `cake`.


    Now that a database actually exists for Cake to connect with, you can go to `http://localhost/first_app`
    in your browser, and it will display a new screen, as shown in Figure 2-4.


    ![Image 16](index-38_1.jpg)


    **Figure 2-4.** *The welcome screen when everything is ready to go* Cake is now
    installed and working correctly. It’s time to dive in and start building web apps!


    ### Summary


    Installing a new Cake application is simple and requires very little configuration
    to get up and running fast. Just remember to unpack the main Cake install file
    and rename the resulting folder to whatever you want your application to be titled.
    By checking the welcome screen, you can determine whether Cake is running correctly
    or whether a `localhost` error is present.


    Correcting errors is not too difficult. Just set the permissions correctly or
    adjust your Apache server configuration to handle Cake, and those errors should,
    in most cases, disappear. Your Cake application will require a few setup routines
    such as preparing the `tmp` folder, changing the `Security.salt` value in the
    core configuration, and connecting Cake to a working database. After these routines
    are complete, your application will be ready to be extended by creating models,
    views, and controllers. The next chapter explains how to add to your new application
    via a simple to-do list application using Cake’s built-in scaffolding feature.


    ## Chapter 3


    # Creating a To-Do List Application


    **N**ow that you’ve set up Cake on your own computer, it’s time to begin building
    applications.


    In this chapter, you’ll create a to-do list application in Cake using the built-in
    scaffold feature.


    This is the simplest approach to application building in Cake. It will only require
    creating a couple of plain-text files as well as a database with a couple of tables.
    You won’t deal too much with the design but rather let Cake generate all of your
    HTML output.


