    \ extension. But a `.php` file can contain elements that aren’t part of our PHP\
    \ script, and searching the entire file for potential scripts can be confusing\
    \ and resource intensive. To solve this issue, all PHP scripts are provided between\
    \ *PHP delimiters*. To begin a PHP script, we start with the opening delimiter\
    \ `<?php`. To complete a PHP script, we add the closing delimiter `?>`. Anything\
    \ outside of these delimiters will be treated as HTML, CSS, JavaScript, or plain\
    \ text by the web server.\n\nLet’s look at some examples. First, we want to continue\
    \ to keep our programs organized, so let’s create a new folder, `ch2`, in `/xampp/htdocs/`.\
    \ Using our favorite editor, we will create a new file, `test.php`. Let’s enter\
    \ the following code within the file.\n\n```\nStatic Text\nThis text was generated\
    \ by PHP!\";\n?>\nThis text was not.\nListing 2-1\ntest.php\n```\n\nSave the file\
    \ and then test it by navigating to `http://localhost/ch2/test.php` in a browser.\n\
    \nHint\n\nMost PHP code lines require a semicolon at the end to indicate where\
