  FROM orders\n\nWHERE order_id = inOrderId;\n\nRETURN outOrdersRow;\n\nEND;\n\n$$;\n\
  ```\n\n**7.** 创建 `orders_get_orders_by_customer_id` 函数：\n\n```sql\n-- 创建 orders_get_by_customer_id\
  \ 函数\n\nCREATE FUNCTION orders_get_by_customer_id(INTEGER)\n\nRETURNS SETOF order_short_details\
  \ LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninCustomerId ALIAS FOR $1;\n\noutOrderShortDetailsRow\
  \ order_short_details;\n\nBEGIN\n```\n\n\n\n## 第 12 章：存储客户订单\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**648XCH12.qxd 11/17/06 3:44 PM 第 432 页**\n\n```\nFOR outOrderShortDetailsRow\
  \ IN\nSELECT o.order_id, o.total_amount, o.created_on,\n       o.shipped_on, o.status,\
  \ c.name\nFROM orders o\nINNER JOIN customer c\n  ON o.customer_id = c.customer_id\n\
  WHERE o.customer_id = inCustomerId\nORDER BY o.created_on DESC\nLOOP\n  RETURN NEXT\
  \ outOrderShortDetailsRow;\nEND LOOP;\nEND;\n$$;\n```\n\n**8.** 创建 `orders_get_order_short_details`\
  \ 函数：\n\n```\n-- 创建 orders_get_order_short_details 函数\nCREATE FUNCTION orders_get_order_short_details(INTEGER)\
  \ RETURNS order_short_details LANGUAGE plpgsql AS $$\nDECLARE\n  inOrderId ALIAS\
  \ FOR $1;\n  outOrderShortDetailsRow order_short_details;\nBEGIN\n  SELECT INTO\
  \ outOrderShortDetailsRow\n    o.order_id, o.total_amount, o.created_on,\n    o.shipped_on,\
  \ o.status, c.name\n  FROM orders o\n  INNER JOIN customer c\n    ON o.customer_id\
  \ = c.customer_id\n  WHERE o.order_id = inOrderId;\n  RETURN outOrderShortDetailsRow;\n\
  END;\n$$;\n```\n\n**9.** 创建 `customer_list` 类型和 `customer_get_customers_list` 函数：\n\
