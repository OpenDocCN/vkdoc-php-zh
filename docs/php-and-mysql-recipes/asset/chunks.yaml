- fmt: "`Email`\n\n`Month`\n\n`Number`\n\n`Range`\n\n`Search`\n\n`Tel`\n\n`Time`\n\
    \n`url`\n\n`Week`\n\n用于输入电子邮件地址的控件（`Email`），支持简单验证。\n\n用于输入月份和年份的控件（`Month`）。\n\
    \n用于输入整数值的控件（`Number`）。\n\n一个用滑块表示的整数控件（`Range`）。\n\n用于输入搜索内容的文本字段（`Search`）。\n\
    \n用于输入电话号码的控件（`Tel`）。\n\n用于输入时间的控件（`Time`）。\n\n用于输入URL的文本字段（`url`）。\n\n用于输入周编号和年份的控件（`Week`）。\n\
    \n每个浏览器自行决定这些新控件的外观和行为，并且浏览器可能并未全部实现对这些控件的支持。\n\n网上有大量HTML文档资源。我最喜欢的一个是W3Schools网站：\n\
    \n[http://www.w3schools.com](http://www.w3schools.com/)\n\n该网站是HTML、CSS、JavaScript和数据库的参考资料，也包含一些PHP文档。我倾向于使用PHP手册，因为它更完整且包含用户贡献的代码片段。\n\
    \n# 第十三章 创建和使用表单\n\n## 工作原理\n\n表单的基本功能包含两个步骤。第一步是请求一个包含表单定义的HTML文档。第二步是将所有数据提交到服务器。数据可以提交到同一台服务器，也可以提交到完全不同的服务器。常见的实现方式是用一个PHP脚本检查是否收到了POST请求。如果未收到数据，则显示一个允许用户输入数据的表单。\n\
    \n如果收到了POST数据，则处理该数据，脚本将显示某种形式的感谢信息。\n\n下面的示例实现了一个简单的“联系我们”表单，包含多个输入字段，并使用了jQuery库和Bootstrap框架。\n\
    \n```php\n<?php\n\n// 13_1.php\n\nif (empty($_POST)) {\n\n   // nothing posted\
    \ show the form\n\n   echo <<<HEREDOC\n\n<!DOCTYPE html>\n\n<html>\n\n<head>\n\
    \n<title>Contact Us</title>\n\n<!-- Latest compiled and minified CSS -->\n\n<link\
    \ rel=\"stylesheet\" href=\"https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/\n\
    \nbootstrap.min.css\" integrity=\"sha384-1q8mTJOASx8j1Au+a5WDVnPi2lkFfwwEAa8hDDdjZlpLegxhjVME1\n\
    \nfgjWPGmkzs7\" crossorigin=\"anonymous\">\n\n<!-- Optional theme -->\n\n<link\
    \ rel=\"stylesheet\" href=\"https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/\n\
    \nbootstrap-theme.min.css\" integrity=\"sha384-fLW2N01lMqjakBkx3l/M9EahuwpSfeNvV63J5ezn3uZzap\
    \ T0u7EYsXMjQV+0En5r\" crossorigin=\"anonymous\">\n\n<!-- jQuery (necessary for\
    \ Bootstrap's JavaScript plugins) -->\n\n<script src=\"https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js\"\
    ></script>\n\n<!-- Latest compiled and minified JavaScript -->\n\n<script src=\"\
    https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js\"\n\nintegrity=\"\
    sha384-0mSbJDEHialfmuBBQP6A4Qrprq5OVfW37PRR3j5ELqxss1yVqOtnepnHVP9aJ7xS\"\n\n\
    crossorigin=\"anonymous\"></script>\n\n</head>\n\n<body>\n\n<form name=\"contact\"\
    \ method=\"POST\" action=\"{$_SERVER['PHP_SELF']}\">\n\n<div>\n\n<label for=\"\
    name\">Name</label>\n\n<input class=\"form-control\" name=\"name\" type=\"text\"\
    \ />\n\n</div>\n\n<div>\n\n<label for=\"email\">Email</label>\n\n<input class=\"\
    form-control\" name=\"email\" type=\"text\" />\n\n</div>\n\n<div>\n\n<label for=\"\
    phone\">Phone</label>\n\n<input class=\"form-control\" name=\"phone\" type=\"\
    text\" />\n\n</div>\n\n<div>\n\n<label>Best way to contact you</label>\n\n<div\
    \ class=\"radio\">\n\nCHAPTER 13 ■ CREATING AND USING FORMS\n\n<label><input name=\"\
    cnt\" type=\"radio\" value=\"0\"/>Don't contact</label>\n\n</div>\n\n<div class=\"\
    radio\">\n\n<label><input name=\"cnt\" type=\"radio\" value=\"1\"/>Email</label>\n\
    \n</div>\n\n<div class=\"radio\">\n\n<label><input name=\"cnt\" type=\"radio\"\
    \ value=\"2\"/>Phone</label>\n\n</div>\n\n</div>\n\n<button class=\"btn btn-default\"\
    \ onclick=\"document.contact.submit()\">Submit</button>\n\n</form>\n\n</body>\n\
    \n</html>\n\nHEREDOC;\n\n}\n\nelse {\n\n   switch ($_POST['cnt']) {\n\n      \
    \ case 0:\n\n       default:\n\n           $contact = \"We will not contact you!\"\
    ;\n\n           break;\n\n       case 1:\n\n           $contact = \"We will contact\
    \ you via email!\";\n\n           break;\n\n       case 2:\n\n           $contact\
    \ = \"We will contact you via phone!\";\n\n           break;\n\n   }\n\n   echo\
    \ <<<HEREDOC\n\n<!DOCTYPE html>\n\n<html>\n\n<head>\n\n<title>Thank You</title>\n\
    \n</head>\n\n</body>\n\n<div>Thank you for your input. We have received the following\
    \ input from you:<div>\n\n<div>Name: {$_POST['name']}</div>\n\n<div>Email: {$_POST['email']}</div>\n\
    \n<div>Phone: {$_POST['phone']}</div>\n\n<div>{$contact}</div>\n\n</body>\n\n\
    </html>\n\nHEREDOC;\n\n?>\n```"
  raw: 'Email


    Control with simple e-mail validation


    Month


    Allows entering a month and a year


    Number


    Used for integer values


    Range


    An integer represented with a slider


    Search


    Defines a text field for entering a search


    Tel


    Allows input of a telephone number


    Time


    A control for entering time


    url


    A text field for entering a url


    Week


    A control to enter a week number and a year


    It is up to each browser to define the look and feel of these new controls, and
    the browsers might not implement support for all of them.


    There are plenty of resources online for HTML documentation. One of my favorites
    is W3Schools at


    [http://www.w3schools.com](http://www.w3schools.com/) . It’s a reference for HTML,
    CSS, JavaScript, and Databases. It also contains some PHP documentation I prefer
    to use the PHP manual as it’s more complete and it contains user-contributed code
    segments.


    CHAPTER 13 ■ CREATING AND USING FORMS


    How it Works


    The basic functionality of a form includes two steps. The first is to request
    a HTML document that contains the form definition. The second step is to submit
    the form with all the data to the server. This can be to the same server or a
    completely different one. A common implementation is to have a single PHP script
    that checks if a post was received. If no data was received it will show a form
    that will allow the user to enter data.


    If data was posted the data will be processed and the script will show some form
    of a thank you message.


    The next example implements a simple Contact Us form with a number of input fields
    and the use of the jQuery library and Bootstrap framework .


    <?php


    // 13_1.php


    if (empty($_POST)) {


    // nothing posted show the form


    echo <<<HEREDOC


    <!DOCTYPE html>


    <html>


    <head>


    <title>Contact Us</title>


    <!-- Latest compiled and minified CSS -->


    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/


    bootstrap.min.css" integrity="sha384-1q8mTJOASx8j1Au+a5WDVnPi2lkFfwwEAa8hDDdjZlpLegxhjVME1


    fgjWPGmkzs7" crossorigin="anonymous">


    <!-- Optional theme -->


    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/css/


    bootstrap-theme.min.css" integrity="sha384-fLW2N01lMqjakBkx3l/M9EahuwpSfeNvV63J5ezn3uZzap
    T0u7EYsXMjQV+0En5r" crossorigin="anonymous">


    <!-- jQuery (necessary for Bootstrap''s JavaScript plugins) -->


    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.11.3/jquery.min.js"></script>


    <!-- Latest compiled and minified JavaScript -->


    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.6/js/bootstrap.min.js"


    integrity="sha384-0mSbJDEHialfmuBBQP6A4Qrprq5OVfW37PRR3j5ELqxss1yVqOtnepnHVP9aJ7xS"


    crossorigin="anonymous"></script>


    </head>


    <body>


    <form name="contact" method="POST" action="{$_SERVER[''PHP_SELF'']}">


    <div>


    <label for="name">Name</label>


    <input class="form-control" name="name" type="text" />


    </div>


    <div>


    <label for="email">Email</label>


    <input class="form-control" name="email" type="text" />


    </div>


    <div>


    <label for="phone">Phone</label>


    <input class="form-control" name="phone" type="text" />


    </div>


    <div>


    <label>Best way to contact you</label>


    <div class="radio">


    CHAPTER 13 ■ CREATING AND USING FORMS


    <label><input name="cnt" type="radio" value="0"/>Don''t contact</label>


    </div>


    <div class="radio">


    <label><input name="cnt" type="radio" value="1"/>Email</label>


