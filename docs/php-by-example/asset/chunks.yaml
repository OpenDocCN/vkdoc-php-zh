- fmt: "# The Server Regime\n\nAnother regime of testing how PHP programs operate\
    \ is using a server that executes the programs. An external and local computer\
    \ can be used as a server. Let’s start with the second case.\n\nYou are going\
    \ to encapsulate PHP code into an HTML document.\n\n## HTML Basics\n\nTo create\
    \ web pages, a special document markup is used. That markup defines the document’s\
    \ structure and how its separate blocks are formatted—namely, the declarative\
    \ language HTML (short for Hypertext Markup Language). The corresponding document\
    \ contains plain text and special instructions called tags or descriptors. The\
    \ instructions are for the browser that displays the document according to those\
    \ instructions.\n\nLet’s use the HTML code shown in Listing [1-2](#613529_1_En_1_Chapter.xhtml#PC8).\n\
    \n```\nThe First Program\nListing 1-2\nThe HTML Code of the First Project\n```\n\
    \nThis code must be saved in a `.php` file. It is the `hi.php` file located in\
    \ the `D:\\Books\\php\\codes` directory.\n\n## HTML Basics\n\nAn HTML document\
    \ begins with the `<!DOCTYPE html>` statement that defines the specification of\
    \ the document. The document’s contents are placed between the `<html>` and `</html>`\
    \ tags. Metadata for the document is placed in the block defined by the `<head>`\
    \ and `</head>` tags. In this case, there is only one element, separated by the\
    \ `<title>` and `</title>` tags (the title element). The text `The First Program`\
    \ contained in that element serves as the title for the web page (displayed on\
    \ the document tab in the browser).\n\nThe document’s contents rendered by a browser\
    \ are placed in a block marked with the `<body>` and `</body>` tags. There is\
    \ only one snippet of PHP code similar to that from Listing [1-1](#613529_1_En_1_Chapter.xhtml#PC1).\
    \ When the server executes that code, the text is added to the web document at\
    \ the appropriate place. The `print(\"Hello, PHP!\")` command prints the text.\
    \ In other words, the text `\"Hello, PHP!\"` is added to the web page, and all\
    \ that can be seen when you open the document with a browser. But how to open\
    \ the web page is another question.\n\nIf you try to open the `hi.php` file with\
    \ a browser, the result is not quite what you might expect. Namely, the file code\
    \ is displayed in the browser window, as shown in Figure [1-19](#613529_1_En_1_Chapter.xhtml#Fig19).\n\
    \n![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig19_HTML.jpg)\n\nA screenshot\
    \ of a browser page with `hi.php` program from the path `D:\\Books\\php\\codes`.\
    \ Under the head tag, the title is given as `The First Program`. Under the body\
    \ tag, the `print` function is given for `Hello, PHP!`\n\nFigure 1-19  \nTrying\
    \ to open the `hi.php` file in a browser\n\nTo get a different result, you need\
    \ to run a local server. To do that, run `php.exe` with the `-S` option, followed\
    \ by the `localhost` keyword, and, separated by a colon, a port number for the\
    \ local server. In principle, the port number is arbitrary, but making it greater\
    \ than 5000 is reasonable.\n\n| Details |\n| --- |\n| In general, a port number\
    \ is a number between `1` and `65535`. The system processes use primary numbers\
    \ for the ports. |\n\nAfter that, in the command line, specify the `-t` option\
    \ and a link to the folder you want to identify with the root directory of the\
    \ local server. More specifically, let’s say the command looks as follows.\n\n\
    ```\nphp -S localhost:6789 -t D:\\Books\\php\\codes\n```\n\nThe instruction runs\
    \ the local server using port `6789`. The server’s root directory is identified\
    \ with the `D:\\Books\\php\\codes` folder. Such a command is correct if the `Path`\
    \ environment variable contains the path to the `php.exe` file or if it is executed\
    \ from the folder where the `php.exe` file is located. In general, the command\
    \ might look as follows.\n\n```\nC:\\PHP\\php.exe -S localhost:6789 -t D:\\Books\\\
    php\\codes\n```\n\nHere, the full path to the `php.exe` file is specified.\n\n\
    If everything is done correctly, the local server is started. Now, open the browser\
    \ and enter the following instructions in the address bar.\n\n```\nlocalhost:6789/hi.php\n\
    ```\n\nAs a result, when opening the `hi.php` file, your computer emulates a server\
    \ job. The result should look like what’s shown in Figure [1-20](#613529_1_En_1_Chapter.xhtml#Fig20).\n\
    \n![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig20_HTML.jpg)\n\nA screenshot\
    \ of a browser page with the output of `hi.php` program from the path `D:\\Books\\\
    php\\codes`. The title is `The First Program`. The output reads `Hello, PHP!`\n\
    \nFigure 1-20  \nDisplaying the `hi.php` file in the local server regime\n\n>\
    \ **Note**  \n> The path to the displayed file begins from the folder specified\
    \ when starting the local server. In this case, it is the `D:\\Books\\php\\codes`\
    \ folder.\n\nYou can use the mentioned NetBeans development environment to debug\
    \ an HTML code with a PHP script encapsulated in it. Creating a new project is\
    \ similar to the one discussed. However, when choosing a runtime environment (see\
    \ Figure [1-6](#613529_1_En_1_Chapter.xhtml#Fig6)), select **PHP Built-in Web\
    \ Server (running on built-in web server)** in the **Run As** drop-down list,\
    \ as shown in Figure [1-21](#613529_1_En_1_Chapter.xhtml#Fig21).\n\n![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig21_HTML.jpg)\n\
    \nA screenshot of the New PHP Project window from the NetBeans environment. Under\
    \ the five steps, the Run Configuration option is selected. It includes configuration\
    \ settings to run as PHP Built-in Web Server, hostname is `localhost`, and port\
    \ is `8000`. A note reads PHP 5.4.0 or newer is required. The Next button is selected.\n\
    \nFigure 1-21  \nSetting up the runtime environment for an HTML document\n\nThe\
    \ **Hostname** field contains the local host’s name, and the **Port** field contains\
    \ the port number. You can leave the default values there.\n\nAs a result, you\
    \ should create a new project with the `index.php` file. Enter the HTML code (with\
    \ the PHP script) in that file, as shown in Figure [1-22](#613529_1_En_1_Chapter.xhtml#Fig22).\n\
    \n![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig22_HTML.jpg)\n\nA screenshot\
    \ of the NetBeans environment window, Apache NetBeans IDE 19. The thirteen menus\
    \ at the top are File, Edit, View, Navigate, Source, Refactor, Run, Debug, Profile,\
    \ Team, Tools, Window, and Help. The left panel has 3 tabs, including Projects,\
    \ Files, and Services. `index.php` program is opened. The title is `The NetBeans\
    \ Project`.\n\nFigure 1-22  \nThe project window with the HTML code and the PHP\
    \ script\n\n> **Note**  \n> Except for the page name, the code is the same as\
    \ in Listing [1-2](#613529_1_En_1_Chapter.xhtml#PC8).\n\nWhen you run the project,\
    \ the browser opened on the local host is automatically launched. The result is\
    \ shown in Figure [1-23](#613529_1_En_1_Chapter.xhtml#Fig23).\n\n| Details |\n\
    | --- |\n| You have to account for the following circumstances. Suppose a certain\
    \ address is entered in the browser’s address bar without specifying a file. In\
    \ that case, the `index.html` file, or, as in this case, the `index.php` file,\
    \ is automatically opened in the corresponding directory. Running a project means\
    \ starting a local server; the server’s root directory is identified with the\
    \ project folder. Since the `index.php` file is located there, it is the file\
    \ that is opened and processed by the local server. |\n\n![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig23_HTML.jpg)\n\
    \nA screenshot of a browser page with the output of `hi.php` program from the\
    \ local host. The title is `The NetBeans Project`. The output reads `Hello, PHP!`\n\
    \nFigure 1-23  \nThe browser is opened on the local host"
  raw: '## The Server Regime


    Another regime of testing how PHP programs operate is using a server that executes
    the programs. An external and local computer can be used as a server. Let’s start
    with the second case.


    You are going to encapsulate PHP code into an HTML document.


    HTML BASICS


    To create web pages, a special document markup is used. That markup defines the
    document’s structure and how its separate blocks are formatted—namely, the declarative
    language HTML (short for Hypertext Markup Language). The corresponding document
    contains plain text and special instructions called tags or descriptors. The instructions
    are for the browser that displays the document according to those instructions.


    Let’s use the HTML code shown in Listing [1-2](#613529_1_En_1_Chapter.xhtml#PC8).


    ```


    The First Program


    Listing 1-2

    The HTML Code of the First Project

    ```


    This code must be saved in a `.php` file. It is the `hi.php` file located in the
    `D:\Books\php\codes` directory.


    HTML BASICS


    An HTML document begins with the `<!DOCTYPE html>` statement that defines the
    specification of the document. The document’s contents are placed between the
    `<html>` and `</html>` tags. Metadata for the document is placed in the block
    defined by the `<head>` and `</head>` tags. In this case, there is only one element,
    separated by the `<title>` and `</title>` tags (the title element). The text `The
    First Program` contained in that element serves as the title for the web page
    (displayed on the document tab in the browser).


    The document’s contents rendered by a browser are placed in a block marked with
    the `<body>` and `</body>` tags. There is only one snippet of PHP code similar
    to that from Listing [1-1](#613529_1_En_1_Chapter.xhtml#PC1). When the server
    executes that code, the text is added to the web document at the appropriate place.
    The `print("Hello, PHP!")` command prints the text. In other words, the text `"Hello,
    PHP!"` is added to the web page, and all that can be seen when you open the document
    with a browser. But how to open the web page is another question.


    If you try to open the `hi.php` file with a browser, the result is not quite what
    you might expect. Namely, the file code is displayed in the browser window, as
    shown in Figure [1-19](#613529_1_En_1_Chapter.xhtml#Fig19).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig19_HTML.jpg)


    A screenshot of a browser page with hi dot p h p program from the path D, Books,
    p h p, codes. Under the head tag, the title is given as The First Program. Under
    the body tag, the print function is given for Hello, P H P!


    Figure 1-19


    Trying to open the `hi.php` file in a browser


    To get a different result, you need to run a local server. To do that, run `php.exe`
    with the `-S` option, followed by the `localhost` keyword, and, separated by a
    colon, a port number for the local server. In principle, the port number is arbitrary,
    but making it greater than 5000 is reasonable.


    | Details |

    | --- |

    | In general, a port number is a number between `1` and `65535`. The system processes
    use primary numbers for the ports. |


    After that, in the command line, specify the `-t` option and a link to the folder
    you want to identify with the root directory of the local server. More specifically,
    let’s say the command looks as follows.


    ```

    php -S localhost:6789 -t D:\Books\php\codes

    ```


    The instruction runs the local server using port `6789`. The server’s root directory
    is identified with the `D:\Books\php\codes` folder. Such a command is correct
    if the `Path` environment variable contains the path to the `php.exe` file or
    if it is executed from the folder where the `php.exe` file is located. In general,
    the command might look as follows.


    ```

    C:\PHP\php.exe -S localhost:6789 -t D:\Books\php\codes

    ```


    Here, the full path to the `php.exe` file is specified.


    If everything is done correctly, the local server is started. Now, open the browser
    and enter the following instructions in the address bar.


    ```

    localhost:6789/hi.php

    ```


    As a result, when opening the `hi.php` file, your computer emulates a server job.
    The result should look like what’s shown in Figure [1-20](#613529_1_En_1_Chapter.xhtml#Fig20).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig20_HTML.jpg)


    A screenshot of a browser page with the output of hi dot p h p program from the
    path D, Books, p h p, codes. The title is The First Program. The output reads
    Hello, P H P!


    Figure 1-20


    Displaying the `hi.php` file in the local server regime


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Figf_HTML.jpg)An information icon.Note


    The path to the displayed file begins from the folder specified when starting
    the local server. In this case, it is the `D:\Books\php\codes` folder.


    You can use the mentioned NetBeans development environment to debug an HTML code
    with a PHP script encapsulated in it. Creating a new project is similar to the
    one discussed. However, when choosing a runtime environment (see Figure [1-6](#613529_1_En_1_Chapter.xhtml#Fig6)),
    select **PHP Built-in Web Server (running on built-in web server)** in the **Run
    As** drop-down list, as shown in Figure [1-21](#613529_1_En_1_Chapter.xhtml#Fig21).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig21_HTML.jpg)


    A screenshot of the New P H P Project window from the NetBeans environment. Under
    the five steps, the Run Configuration option is selected. It includes configuration
    settings to run as P H P Built-in Web Server, hostname is localhost, and port
    is 8000\. A note reads P H P 5 dot 4 dot 0 or newer is required. The Next button
    is selected.


    Figure 1-21


    Setting up the runtime environment for an HTML document


    The **Hostname** field contains the local host’s name, and the **Port** field
    contains the port number. You can leave the default values there.


    As a result, you should create a new project with the `index.php` file. Enter
    the HTML code (with the PHP script) in that file, as shown in Figure [1-22](#613529_1_En_1_Chapter.xhtml#Fig22).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig22_HTML.jpg)


    A screenshot of the NetBeans environment window, Apache NetBeans I D E 19\. The
    thirteen menus at the top are File, Edit, View, Navigate, Source, Refactor, Run,
    Debug, Profile, Team, Tools, Window, and Help. The left panel has 3 tabs, including
    Projects, Files, and Services. index dot p h p program is opened. The title is
    The NetBeans Project.


    Figure 1-22


    The project window with the HTML code and the PHP script


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Figg_HTML.jpg)An information icon.Note


    Except for the page name, the code is the same as in Listing [1-2](#613529_1_En_1_Chapter.xhtml#PC8).


    When you run the project, the browser opened on the local host is automatically
    launched. The result is shown in Figure [1-23](#613529_1_En_1_Chapter.xhtml#Fig23).


    | Details |

    | --- |

    | You have to account for the following circumstances. Suppose a certain address
    is entered in the browser’s address bar without specifying a file. In that case,
    the `index.html` file, or, as in this case, the `index.php` file, is automatically
    opened in the corresponding directory. Running a project means starting a local
    server; the server’s root directory is identified with the project folder. Since
    the `index.php` file is located there, it is the file that is opened and processed
    by the local server. |


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig23_HTML.jpg)


    A screenshot of a browser page with the output of hi dot p h p program from the
    local host. The title is The NetBeans Project. The output reads Hello, P H P!


    Figure 1-23


    The browser is opened on the local host'
  trans: "\n# 服务器模式\n\n另一种测试 PHP 程序运行的模式是使用服务器来执行程序。我们可以使用外部或本地计算机作为服务器。我们先从第二种情况开始。\n\
    \n你将把 PHP 代码封装到 HTML 文档中。\n\n## HTML 基础\n\n要创建网页，需要使用一种特殊的文档标记语言。这种标记语言定义了文档的结构以及其各个区块的格式——也就是声明式语言\
    \ HTML（超文本标记语言的简称）。相应的文档包含纯文本和称为标签或描述符的特殊指令。这些指令是为浏览器准备的，浏览器会根据这些指令来显示文档。\n\n\
    让我们使用清单 1-2 中所示的 HTML 代码。\n\n```\nThe First Program\n清单 1-2\n第一个项目的 HTML 代码\n\
    ```\n\n此代码必须保存在一个 `.php` 文件中。它是位于 `D:\\Books\\php\\codes` 目录下的 `hi.php` 文件。\n\n\
    ## HTML 基础\n\n一个 HTML 文档以 `<!DOCTYPE html>` 声明开头，该声明定义了文档的规范。文档的内容放置在 `<html>`\
    \ 和 `</html>` 标签之间。文档的元数据放置在由 `<head>` 和 `</head>` 标签定义的区块中。在这种情况下，只有一个元素，由 `<title>`\
    \ 和 `</title>` 标签（标题元素）分隔。该元素中包含的文本 `The First Program` 用作网页的标题（显示在浏览器的文档标签页上）。\n\
    \n由浏览器渲染的文档内容放置在由 `<body>` 和 `</body>` 标签标记的区块中。其中只有一段与清单 1-1 类似的 PHP 代码。当服务器执行该代码时，文本会被添加到网页文档的相应位置。`print(\"\
    Hello, PHP!\")` 命令用于打印文本。换句话说，文本 `\"Hello, PHP!\"` 被添加到网页中，这些内容在你用浏览器打开文档时都能看到。但如何打开网页则是另一个问题。\n\
    \n如果你尝试用浏览器打开 `hi.php` 文件，结果可能并不完全是你所期望的。具体来说，文件的代码会显示在浏览器窗口中，如图 1-19 所示。\n\n\
    ![](img/613529_1_En_1_Fig19_HTML.jpg)\n\n浏览器页面的截图，显示来自路径 `D:\\Books\\php\\codes`\
    \ 的 `hi.php` 程序。在 head 标签下，标题显示为 `The First Program`。在 body 标签下，显示了针对 `Hello,\
    \ PHP!` 的 `print` 函数。\n\n图 1-19  \n尝试在浏览器中打开 `hi.php` 文件\n\n要获得不同的结果，你需要运行一个本地服务器。为此，使用\
    \ `-S` 选项运行 `php.exe`，后跟 `localhost` 关键字，并用冒号分隔，指定本地服务器的端口号。原则上，端口号可以是任意的，但建议大于\
    \ 5000。\n\n| 详细信息 |\n| --- |\n| 通常，端口号是 `1` 到 `65535` 之间的一个数字。系统进程会使用主要的端口号。 |\n\
    \n之后，在命令行中指定 `-t` 选项以及你想要标识为本地服务器根目录的文件夹链接。更具体地说，命令如下所示。\n\n```\nphp -S localhost:6789\
    \ -t D:\\Books\\php\\codes\n```\n\n该指令使用端口 `6789` 运行本地服务器。服务器的根目录被标识为 `D:\\Books\\\
    php\\codes` 文件夹。如果 `Path` 环境变量包含 `php.exe` 文件的路径，或者命令是从 `php.exe` 文件所在的文件夹执行的，那么这样的命令是正确的。通常，命令可能如下所示。\n\
    \n```\nC:\\PHP\\php.exe -S localhost:6789 -t D:\\Books\\php\\codes\n```\n\n这里指定了\
    \ `php.exe` 文件的完整路径。\n\n如果一切操作正确，本地服务器就会启动。现在，打开浏览器并在地址栏中输入以下指令。\n\n```\nlocalhost:6789/hi.php\n\
    ```\n\n结果，在打开 `hi.php` 文件时，你的计算机会模拟服务器的工作。结果应如图 1-20 所示。\n\n![](img/613529_1_En_1_Fig20_HTML.jpg)\n\
    \n浏览器页面的截图，显示来自路径 `D:\\Books\\php\\codes` 的 `hi.php` 程序的输出。标题是 `The First Program`。输出显示为\
    \ `Hello, PHP!`。\n\n图 1-20  \n在服务器模式下显示 `hi.php` 文件\n\n> **注意**  \n> 所显示文件的路径从启动本地服务器时指定的文件夹开始。在本例中，它是\
    \ `D:\\Books\\php\\codes` 文件夹。\n\n你可以使用前面提到的 NetBeans 开发环境来调试嵌入了 PHP 脚本的 HTML\
    \ 代码。创建新项目的方法与前面讨论的类似。但是，在选择运行时环境（见图 1-6）时，需要在 **Run As** 下拉列表中选择 **PHP Built-in\
    \ Web Server (running on built-in web server)**，如图 1-21 所示。\n\n![](img/613529_1_En_1_Fig21_HTML.jpg)\n\
    \nNetBeans 环境中新建 PHP 项目窗口的截图。在五个步骤中，选择了运行配置选项。它包括配置设置为以 PHP 内置 Web 服务器运行，主机名为\
    \ `localhost`，端口为 `8000`。提示信息为需要 PHP 5.4.0 或更高版本。选择了“下一步”按钮。\n\n图 1-21  \n为 HTML\
    \ 文档设置运行时环境\n\n**Hostname** 字段包含本地主机的名称，**Port** 字段包含端口号。你可以保留那里的默认值。\n\n结果，你应该创建一个包含\
    \ `index.php` 文件的新项目。在该文件中输入 HTML 代码（包含 PHP 脚本），如图 1-22 所示。\n\n![](img/613529_1_En_1_Fig22_HTML.jpg)\n\
    \nNetBeans 环境窗口的截图，Apache NetBeans IDE 19。顶部有十三个菜单：文件、编辑、视图、导航、源代码、重构、运行、调试、性能、团队、工具、窗口和帮助。左侧面板有\
    \ 3 个标签，包括项目、文件和服务。`index.php` 程序已打开。标题是 `The NetBeans Project`。\n\n图 1-22  \n\
    包含 HTML 代码和 PHP 脚本的项目窗口\n\n> **注意**  \n> 除了页面名称外，代码与清单 1-2 中的相同。\n\n当你运行该项目时，会自动打开本地主机上的浏览器。结果如图\
    \ 1-23 所示。\n\n| 详细信息 |\n| --- |\n| 你必须考虑以下情况。假设在浏览器的地址栏中输入了某个地址但没有指定文件。在这种情况下，`index.html`\
    \ 文件，或者像本例中的 `index.php` 文件，会自动在相应目录中打开。运行项目意味着启动一个本地服务器；服务器的根目录被标识为项目文件夹。由于 `index.php`\
    \ 文件位于那里，它便是被本地服务器打开并处理的文件。 |\n\n![](img/613529_1_En_1_Fig23_HTML.jpg)\n\n浏览器页面的截图，显示来自本地主机的\
    \ `hi.php` 程序的输出。标题是 `The NetBeans Project`。输出显示为 `Hello, PHP!`。\n\n图 1-23  \n\
    在本地主机上打开的浏览器\n"
- fmt: "Finally, another way to test the PHP code is to host the corresponding file\
    \ on an external server. That is the most reliable way of testing, but it has\
    \ a significant drawback since not everyone has such an opportunity. But in general,\
    \ the idea is simple. The file is uploaded to the server and then opened using\
    \ a browser. Figure [1-24](#613529_1_En_1_Chapter.xhtml#Fig24) shows a browser\
    \ window where the document with the address [`www.vasilev.com.ua/php/hi.php`](http://www.vasilev.com.ua/php/hi.php)\
    \ is opened.\n\n![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig24_HTML.jpg)\n\
    \nA screenshot of a browser page with the output of `hi.php` program from the\
    \ address `www.vasilev.com.ua/php/hi.php`. The title is The First Program. The\
    \ output reads `Hello, PHP!`\n\nFigure 1-24\n\nThe page [`www.vasilev.com.ua/php/hi.php`](https://www.vasilev.com.ua/php/hi.php)\
    \ is opened in the browser window\n\nAnother inconvenience of using the external\
    \ server is that you need to change a file not located on the local computer.\n\
    \n![](images/613529_1_En_1_Chapter/613529_1_En_1_Figh_HTML.jpg) An information\
    \ icon. **Note**\n\nOf the many options offered, it is necessary to choose one.\
    \ In principle, running program codes from the command line using the PHP interpreter\
    \ is more than an acceptable option. It is suitable for testing examples from\
    \ all chapters except the last one. You have to use the local server regime to\
    \ see the result of the PHP scripts.\n\n## Summary\n\n- The upcoming chapters\
    \ discuss the features of the PHP language. The functionality of the code covered\
    \ in them can be tested in the interpreter regime. To do that, save the program\
    \ in a file with the `.php` extension and execute the corresponding instruction\
    \ in the command line.\n\n- A good choice for developing PHP projects is the NetBeans\
    \ development environment. It allows you to create projects for testing both in\
    \ the interpreter regime and using a local server.\n\n- To test the correctness\
    \ of the program execution in the server regime, you can use the following template\
    \ (the PHP code is placed in the block between the `<?php` and `?>` instructions).\n\
    \n  ```\n  // The title of the page\n  ```\n\n# 2. Variables and Data Types\n\n\
    > *We can’t throw these things away. These are a part of who we are.*\n> \n> —*ALF*\
    \ (TV series)\n\nAs usual, programs operate with data. And the data needs to be\
    \ stored somewhere. If you deal with small blocks of information, variables are\
    \ a good place to store it, which is the focus of this chapter. The chapter also\
    \ discusses the main data types used in programs and the basic operations performed\
    \ with variables.\n\n## Introduction to Variables\n\nIn its “classical” sense,\
    \ a variable is a named block of memory that can be accessed through the name\
    \ to read a value from memory or write a new value there. In PHP, creating variables\
    \ is quite simple: you just need to assign a value to the variable. In other words,\
    \ the variable appears in a program when a value is assigned to it.\n\nThere is\
    \ a rule in PHP: the name of a variable begins with the `$` symbol (this symbol\
    \ is part of the variable name). To assign a value to a variable, you specify\
    \ the variable’s name, then put the assignment operator (equal sign `=`) and the\
    \ value to be assigned to it. For example, the `$number = 123` command assigns\
    \ the integer `123` to the `$number` variable, and the `$text = \"Hello, PHP\"\
    ` command assigns the text value `\"Hello, PHP\"` to the `$text` variable.\n\n\
    ![](images/613529_1_En_2_Chapter/613529_1_En_2_Figa_HTML.jpg) An information icon.\
    \ **Note**\n\nIn PHP, there is no such thing as a variable type. Variables do\
    \ not have a type. But the value that the variable refers to has a type. At different\
    \ stages of program execution, the same variable can refer to values of different\
    \ types.\n\nFirst, let’s look at Listing [2-1](#613529_1_En_2_Chapter.xhtml#PC1),\
    \ a small example that uses a variable.\n\n```\nListing 2-1\nCreating a Variable\n\
    ```\n\nThe result of the program execution is as follows.\n\n```\nThe output of\
    \ the program (from Listing 2-1)\nThe variable $number: the value is 123\n```\n\
    \nIn the program, you also meet three types of comments allowed in PHP.\n\n![](images/613529_1_En_2_Chapter/613529_1_En_2_Figb_HTML.jpg)\
    \ An information icon. **Note**\n\nA comment is a text in a program destined for\
    \ the programmer and ignored when the program is executed. In other words, comments\
    \ explain the purpose of commands but do not affect the program execution.\n\n\
    There are single-line comments. A single-line comment begins with the double slash\
    \ `//` or the `#` character. Anything to the right of the `//` or `#` characters\
    \ is a comment. In addition to single-line comments, there are multi-line comments.\
    \ Such comments can span multiple lines. A multi-line comment begins with `/*`\
    \ and ends with `*/`. Everything between these characters is a comment. The program\
    \ used all three types of comments, although there was no need for that.\n\nIn\
    \ addition to comments, the program contains several noteworthy commands. The\
    \ first is the `$number = 123` instruction, which creates the `$number` variable\
    \ with the value `123`. In addition to that, there are two more commands for displaying\
    \ messages in the terminal. Although both commands use the `print()` function,\
    \ they are different.\n\n![](images/613529_1_En_2_Chapter/613529_1_En_2_Figc_HTML.jpg)\
    \ An information icon. **Note**\n\nThis time, you pass an argument to the `print()`\
    \ function without parentheses.\n\nThe difference between the commands is as follows.\
    \ In the first case, the text to be displayed is enclosed in single quotes. In\
    \ the second case, the text is in double quotes. In principle, in both cases,\
    \ you get text. That means single and double quotes are two different ways to\
    \ create a text. They are almost equal. But some differences also exist. In this\
    \ case, both text values (`'The variable $number: '` and `\"the value $number\"\
    `) contain the name of the `$number` variable. So, if the variable’s name occurs\
    \ in the text enclosed in single quotes, then when the text is displayed in the\
    \ terminal, the variable’s name is displayed. If the variable’s name is placed\
    \ in the text enclosed in double quotes, then when displayed in the output window,\
    \ its value is substituted instead of the variable’s name. Therefore, when executing\
    \ the `print 'The variable $number: '` command, exactly the text in single quotes\
    \ is displayed. But when executing the `print \"the value $number\"` command,\
    \ then, instead of the name of the `$number` variable, its value `123` is substituted\
    \ in the text.\n\n![](images/613529_1_En_2_Chapter/613529_1_En_2_Figd_HTML.jpg)\
    \ An information icon. **Note**\n\nAs a result of calling the `print()` function,\
    \ the value of the argument passed to the function is displayed in the output\
    \ window. But there is no line break in the output area. Therefore, two messages\
    \ are displayed sequentially in the program discussed, one after the other in\
    \ the same line.\n\nNotably, many common tasks in PHP can be performed in different\
    \ ways. The examples are several types of comments, several ways to create text\
    \ literals, several instructions for displaying messages, and the list is not\
    \ complete. The situation is typical for PHP. In this sense, the language is very\
    \ convenient and “comfortable” if such a definition is suitable for a programming\
    \ language.\n\n| Details |\n| --- |\n| Along with variables, you can also use\
    \ constants. A constant differs from a variable in a way that the value of the\
    \ constant cannot be changed. To create a constant, use the `define()` function,\
    \ the first argument of which is the name of the constant, and the second argument\
    \ is the value of the constant. The dollar symbol `$` is not used in the constant\
    \ name. Constant names usually consist of capital letters. For example, the `define(\"\
    NUMBER\", 123)` command defines the `NUMBER` constant with the value `123`. You\
    \ can check the existence of a constant with a specific name using the `defined()`\
    \ function. The function argument is the name of the constant (in quotes). |"
  raw: "Finally, another way to test the PHP code is to host the corresponding file\
    \ on an external server. That is the most reliable way of testing, but it has\
    \ a significant drawback since not everyone has such an opportunity. But in general,\
