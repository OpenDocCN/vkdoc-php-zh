    **Automagic**


    For the field entered, the $form->input() function will interpret the field and
    automatically render a form element based on the kind of data it finds. Most of
    the time, especially with simple forms, only the field name is needed:


    <?=$form->input(''content'');?>


    In this example, the function would recognize that the matching field in the database
    table is a text field and would consequently render a <textarea> element with
    its necessary parameters to work with the model. Table 9-2 shows how the $form->input()
    function inspects the database field types and what it will return to the browser.


    **Table 9-2.** *The* $form->input() *Function’s Automagic Responses to Database
    Field Structures* **Field Type**


    **Returns**


    Boolean


    Check box input element


    Date


    Day, month, and year select menus


    Datetime


    Day, month, year, hour, minute, and meridian select menus


    String (for example, varchar)


    Text box input element


    Text


    Text area element


    Time


    Hour, minute, and meridian select menus


    Timestamp


    Day, month, year, hour, minute, and meridian select menus


    Tinyint(1)


    Check box


    String or text fields named


    Password


    password, passwd, or psword


    By following Table 9-2, you can build the database structure to be automatically
    recogniz-able by the Form helper. Making a field the type tinyint and giving it
    a length of 1 will save you from having to tell the $form->input() function that
    the field is a Boolean value and that it should be rendered as a check box. Of
    course, if the special needs of the application demand otherwise, you can specify
    particulars as well. For instance, suppose you wanted to force the user to submit
    a string rather than paragraphs of text without changing the database structure.
    You would need to add some options to override the $form->input() function’s auto-magic
    behavior.


    **The Type Option**


    The type option allows you to explicitly choose the type of form element. For
    example, you could show a text box instead of a <textarea>:


    <?=$form->input(''content'',array(''type''=>''text''));?>


    To go back to the <textarea> element, you can enter that in the type option (or
    let the default behavior do it for you):


    <?=$form->input(''content'',array(''type''=>''textarea''));?>


