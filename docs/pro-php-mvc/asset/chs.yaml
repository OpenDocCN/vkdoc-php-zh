  \n## 第 14 章：注册与登录\n\n### 问题\n\n1. 为什么我们要对`Controller`类进行子类化，以添加数据库功能？\n2. PHP 内置了会话管理函数，其中一些甚至用在了我们创建的`Session`类中。那为什么我们还需要创建这些`Session`类？\n\
  3. `Session`驱动类的`$_prefix`属性有什么作用？\n\n### 答案\n\n1. 首先，我们选择`Controller`类作为数据库代码的理想位置，是因为我们所有的应用程序控制器都需要访问数据库。其次，我们对`Controller`进行子类化而非修改原类，是因为这明显属于应用程序需求的范畴。并非所有应用程序都需要数据库连接；因此，应该根据具体应用程序来决定。\n\
  2. 事实上，我们确实使用了部分 PHP 内置的会话管理代码，但仍有理由创建这些类。第一个原因是，在 PHP 中使用会话时，需要在更改会话数据之前打开会话，并在更改之后关闭会话。我们不必每次操作会话时都重复这些代码。第二个原因是，我们可以自由创建任意数量的会话驱动，它们可能不使用默认的会话管理代码。\n\
  3. 我们为所有会话键添加前缀，原因与我们所有框架代码按命名空间组织相同。也就是说，我们不知道其他服务器代码会与我们的框架同时运行。同样，我们也不知道其他系统会使用相同的会话空间。最好的做法就是通过为所有会话键添加前缀来避免冲突。\n\
  \n### 练习\n\n1. 我们的`Controller`子类打开了与数据库的连接，但没有关闭它。这通常不是问题（对于资源丰富的系统来说），但理想情况下，连接在不再使用时应被关闭。现在添加额外的代码来关闭数据库连接。注意不要过早关闭连接。\n\
  2. 我们的`Session`类仅使用了原生的 PHP 会话。现在添加另一个驱动，使用其他形式的存储来管理会话。你可以使用文件、缓存或任何你喜欢的方式。只需确保每个用户的会话数据保持私密即可！\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 15 章：搜索\n\n在上一章中，我们初步了解了如何使用基本视图以及执行基本验证。在本章中，我们将探讨几种扩展视图的方法，并构建一个用户搜索页面。\n\
  \n### 目标\n\n* 我们需要改进模板渲染器，使其能够包含子模板、加载第三方 HTML，以及存储和检索数据。\n* 我们需要创建必要的动作和视图，以方便用户搜索。\n\
  \n为了理解我们将添加到模板实现中的新模板语言结构，我们需要查看清单 15-1 中所示的示例。\n\n***清单 15-1.*** 附加模板语法\n\n```\n\
  {include tracking.html}\n{partial messages/feed.html}\n{set scripts}\n<script src\
  \ = \"/scripts/shared.js\" > </script>\n{/set}\n{prepend meta.title}\n社交网络\n{/prepend}\n\
  {append styles}\n<link rel = \"stylesheet\" type = \"text/css\" href = \"/styles/widget.css\"\
  \ />\n{/append}\n{yield meta.title}\n{yield scripts}\n{yield styles}\n```\n\n\n\n\
  `include` 构造应指示模板解析器获取 `tracking.html` 文件（位于默认的应用视图文件夹内）的内容，并将其直接放入模板中（与主模板一起处理）。\n\
  \n`partial` 构造应指示模板解析器向指定的 URL 发起 `GET` 请求，并将结果放入主模板。`include` 构造会向主模板返回可执行的（子模板）代码，而\
  \ `partial` 构造仅应返回 `GET` 请求的字符串结果。\n\n`set` 构造应指示模板解析器获取开始/结束标签内的数据并进行存储。该存储应在所有已解析的模板之间共享，并且任何模板都应能检索到存储的数据。`append`/`prepend`\
  \ 构造与 `set` 构造类似，但它们不会替换已存储在某个键中的数据。`prepend` 构造会将提供的数据插入到同一键中已有数据之前，而 `append`\
  \ 构造则会将提供的数据放在同一键中已有数据之后。\n\n最后，`yield` 构造将返回共享存储区域中该键存储的任何数据。\n\n### 扩展实现\n\n我们通过向实现子类添加几个新的受保护属性来开始扩展模板的实现。我们还需要调整语言映射，该映射定义了模板语言的语法。查看清单\
  \ 15-2，了解如何实现这一点。\n\n**清单 15-2.** `Template\\Implementation\\Extended` 类\n\n```php\n\
  namespace Framework\\Template\\Implementation\n{\n    use Framework\\Request as\
  \ Request;\n    use Framework\\Registry as Registry;\n    use Framework\\Template\
  \ as Template;\n    use Framework\\StringMethods as StringMethods;\n    use Framework\\\
  RequestMethods as RequestMethods;\n\n    class Extended extends Standard\n    {\n\
  \        /**\n         * @readwrite\n         */\n        protected $_defaultPath\
  \ = \"application/views\";\n\n        /**\n         * @readwrite\n         */\n\
  \        protected $_defaultKey = \"_data\";\n\n        /**\n         * @readwrite\n\
  \         */\n        protected $_index = 0;\n\n        public function __construct($options\
  \ = array())\n        {\n            parent::__construct($options);\n\n        \
  \    $this->_map = array(\n                \"partial\" => array(\n             \
  \       \"opener\" => \"{partial\",\n                    \"closer\" => \"}\",\n\
  \                    \"handler\" => \"_partial\"\n                ),\n         \
  \       \"include\" => array(\n                    \"opener\" => \"{include\",\n\
  \                    \"closer\" => \"}\",\n                    \"handler\" => \"\
  _include\"\n                ),\n                \"yield\" => array(\n          \
  \          \"opener\" => \"{yield\",\n                    \"closer\" => \"}\",\n\
  \                    \"handler\" => \"yield\"\n                )\n            )\
  \ + $this->_map;\n\n            $this->_map[\"statement\"][\"tags\"] = array(\n\
  \                \"set\" => array(\n                    \"isolated\" => false,\n\
  \                    \"arguments\" => \"{key}\",\n                    \"handler\"\
  \ => \"set\"\n                ),\n                \"append\" => array(\n       \
  \             \"isolated\" => false,\n                    \"arguments\" => \"{key}\"\
  ,\n                    \"handler\" => \"append\"\n                ),\n         \
  \       \"prepend\" => array(\n                    \"isolated\" => false,\n    \
  \                \"arguments\" => \"{key}\",\n                    \"handler\" =>\
  \ \"prepend\"\n                )\n            ) + $this->_map[\"statement\"][\"\
  tags\"];\n        }\n    }\n}\n```\n\n我们想要添加的前三个模板构造是单标签构造，因此将它们添加到主 `$_map` 数组中。这意味着我们的模板解析器不会去寻找闭合标签，也不会从子数据中创建层次结构。\n\
  \n而最后三个模板构造是语句（带有开始/闭合标签和子数据）。我们将它们添加到 `statement` 子数组中，它们将按照与 `if/else` 循环构造相同的方式进行解析。\n\
  \n接下来，我们需要为每个新构造创建处理器。我们将首先处理的是 `_include()` 处理器，如清单 15-3 所示。\n\n**清单 15-3.** `_include()`\
  \ 处理器\n\n```php\nprotected function _include($tree, $content)\n{\n    $template\
  \ = new Template(array(\n        \"implementation\" => new self()\n    ));\n\n \
  \   $file = trim($tree[\"raw\"]);\n    $path = $this->getDefaultPath();\n    $content\
  \ = file_get_contents(APP_PATH.\"/{$path}/{$file}\");\n\n    $template->parse($content);\n\
  \n    $index = $this->_index++;\n\n    return \"function anon_{$index}(\\$_data){\n\
  \        \".$template->getCode().\"\n    };\\$_text[] = anon_{$index}(\\$_data);\"\
  ;\n}\n```\n\n\n\n"
- "# 此构件的目标\n\n此构件的目标是获取一个子模板并将其放置在主模板中。子模板应与主模板同时处理，以便任何逻辑能够同步执行。这是模板之间相互通信以共享数据的一种方式。\n\
  \n我们首先使用此实现创建一个新的`Template`实例。这意味着子模板可以拥有它们自己的子模板，并且也能访问其他新的模板构件。\n\n我们获取文件的内容（文件名由`include`标签提供）。然后，我们解析模板实例，并传入模板文件内容。关键在于为每个被包含的模板创建一个新方法，以便所有处理能同时进行。每个`Template`实例生成的函数都返回一个字符串，因此我们只需将此功能封装到一个新函数中并立即调用（将其返回值添加到`$_text`数组中）。这意味着当主模板被处理时，它将调用子模板的结果。这或许是我们正在添加的所有新模板构件中最棘手的一个。\n\
  \n### URL 请求\n\n下一个构件需要一套新的类，这些类将允许我们向远程 URL 发起 HTTP 请求。你可以在代码清单 15-4 中看到这些`Request`类中的第一个。\n\
  \n**代码清单 15-4.** Request 类\n\n```\nnamespace Framework\n{\n\nuse Framework\\Base\
  \ as Base;\nuse Framework\\StringMethods as StringMethods;\nuse Framework\\RequestMethods\
  \ as RequestMethods;\nuse Framework\\Request\\Exception as Exception;\n\nclass Request\
  \ extends Base\n{\n\n    protected $_request;\n\n    /**\n     * @readwrite\n  \
  \   */\n    public $_willFollow = true;\n\n    /**\n     * @readwrite\n     */\n\
  \    protected $_headers = array();\n\n    /**\n     * @readwrite\n     */\n   \
  \ protected $_options = array();\n\n    /**\n     * @readwrite\n     */\n    protected\
  \ $_referer;\n\n    /**\n     * @readwrite\n     */\n    protected $_agent;\n\n\
  \    protected function _getExceptionForImplementation($method)\n    {\n       \
  \ return new Exception\\Implementation(\"{$method} not implemented\");\n    }\n\n\
  \    protected function _getExceptionForArgument()\n    {\n        return new Exception\\\
  Argument(\"Invalid argument\");\n    }\n\n    public function __construct($options\
  \ = array())\n    {\n        parent::__construct($options);\n        $this->setAgent(RequestMethods::server(\"\
  HTTP_USER_AGENT\",\n        \"Curl/PHP \".PHP_VERSION));\n    }\n\n    public function\
  \ delete($url, $parameters = array())\n    {\n        return $this->request(\"DELETE\"\
  , $url, $parameters);\n    }\n\n    function get($url, $parameters = array())\n\
  \    {\n        if (!empty($parameters))\n        {\n            $url .= StringMethods::indexOf($url,\
  \ \"?\") ? \"&\" : \"?\";\n            $url .= is_string($parameters) ? $parameters\
  \ :\n            http_build_query($parameters, \"\", \"&\");\n        }\n      \
  \  return $this->request(\"GET\", $url);\n    }\n\n    function head($url, $parameters\
  \ = array())\n    {\n        return $this->request(\"HEAD\", $url, $parameters);\n\
  \    }\n\n    function post($url, $parameters = array())\n    {\n        return\
  \ $this->request(\"POST\", $url, $parameters);\n    }\n\n    function put($url,\
  \ $parameters = array())\n    {\n        return $this->request(\"PUT\", $url, $parameters);\n\
  \    }\n\n}\n}\n```\n\n`Request`类拥有所有常规`Base`子类的特性，以及一些请求方法（`get`、`post`、`put`、`delete`和`head`）。这些方法代表了不同类型的请求方法，但最终它们都会调用同一个`request()`方法。其他需要注意的事项包括：构造函数设置了用户代理，并且`get`方法将传入的参数数组转换为有效的查询字符串。\n\
  \n`request()`方法，如代码清单 15-5 所示，负责执行（或委派）实际工作。\n\n**代码清单 15-5.** `request()`方法\n\n\
  ```\nfunction request($method, $url, $parameters = array())\n{\n    $request = $this->_request\
  \ = curl_init();\n\n    if (is_array($parameters))\n    {\n        $parameters =\
  \ http_build_query($parameters, \"\", \"&\");\n    }\n\n    $this\n    ->_setRequestMethod($method)\n\
  \    ->_setRequestOptions($url, $parameters)\n    ->_setRequestHeaders();\n\n  \
  \  $response = curl_exec($request);\n\n    if ($response)\n    {\n        $response\
  \ = new Request\\Response(array(\n            \"response\" => $response\n      \
  \  ));\n    }\n    else\n    {\n        throw new Exception\\Response(curl_errno($request).'\
  \ - '.curl_error($request));\n    }\n}\n```\n\n\n\n"
