  trans: "\n### 使用 `fopen()` 与文件读取\n\n使用 `fopen()` 并每次只读取文件的一部分，有助于降低内存使用量。`fopen()`\
    \ 的第一个参数是文件名和路径，第二个参数用于标识文件打开时的模式。该参数由一个或多个字符组成。选项包括：`r` 表示读取，`w` 表示写入，`a` 表示追加。这些选项可与\
    \ `+` 组合，以添加相反的模式。此外，还可以使用 `x` 来打开文件进行写入，但如果文件已存在，操作将失败。模式 `c` 表示以写入方式打开文件，文件指针位于文件开头，但与\
    \ `w` 模式不同，文件不会被截断。\n\n如果你在文件中查找特定模式，可以丢弃每个片段，直到找到目标内容。或者，如果你知道要从哪个特定偏移量开始读取，可以在读取或写入之前使用\
    \ `fseek()` 函数将文件指针移动到该位置。这比逐块读取文件要快。\n\n在上面的例子中，我们最终将整个文件读取并存储到一个变量中，因此需要足够的内存来容纳整个文件。以下是通过使用\
    \ `file_get_contents()` 函数获得相同结果的更简单方法。\n\n![图 13](img/index-179_1.jpg)\n\n##\
    \ 第 7 章 ■ 文件与目录\n\n```php\n<?php\n// 7_4.php\n$f = file_get_contents('myfile.html');\n\
    echo $f;\n```\n\n此示例读取文件内容并将其发送回客户端。如果文件包含以下内容：\n\n```html\n<!DOCTYPE html>\n\
    <html>\n<head>\n<title>PHP 与 MySQL 配方</title>\n</head>\n<body>\n<h1>第 7 章</h1>\n\
    <p>本章是关于文件和目录的内容</p>\n</body>\n</html>\n```\n\n浏览器中的输出将如下所示：\n\n无需打开和关闭文件，也无需指定读取操作。这些全部在内部处理。一个命令即可完成打开文件、读取内容、将其存储为变量并关闭文件的操作。\n\
    \n### 配方 7-3：写入文件\n\n#### 问题\n\n并非所有 PHP 输出都旨在发送到浏览器或控制台（标准输出）。在调试代码问题时有帮助的日志函数、写入缓存内容以便\
    \ Web 服务器无需调用 PHP 即可读取，或仅仅是与其他系统交换数据，这些都需要以某种形式写入本地文件系统上的文件。\n\n#### 解决方案\n\n\
    写入文件遵循与上一配方中描述的文件读取相同的语义。基本函数（`fopen()`、`fclose()` 和 `fwrite()`）是底层函数的封装，而像 `file_put_contents()`\
    \ 和 `fputcsv()` 这样的函数则允许你通过单个命令执行更高级的操作。\n\n## 第 7 章 ■ 文件与目录\n\n#### 工作原理\n\n\
    在以下示例中，一个字符串被写入文件。\n\n```php\n<?php\n// 7_5.php\n$f = '';\n$fp = fopen('myfile.txt',\
    \ 'at');\nif ($fp) {\n    fwrite($fp, \"要写入此文件的文本\\n 以及第二行的一些内容\");\n    fclose($fp);\n\
    }\n```\n\n文件以选项 `'at'` 打开。这表示如果文件已存在，文本将追加到文件末尾。使用 `'wt'` 则会覆盖文件的任何现有内容。选项中的 `t`\
    \ 表示内容为文本。使用 `b` 则表示二进制内容。\n\n类似地，也可以通过单个函数调用写入文件。`file_put_contents()` 函数接受两个参数，其中第一个是文件路径，第二个是要写入的内容。如果文件已存在，它将被新内容覆盖。可以向函数调用传递第三个参数，以强制将内容追加到现有内容后面。第三个参数是一个位掩码标志，其中\
    \ `FILE_APPEND` 是使函数追加内容的值。在第三个参数中添加标志 `LOCK_EX` 将确保对文件进行独占锁定，这样其他进程就无法同时写入该文件。\n\
    \n编写一个简单的日志记录系统可能如下所示：\n\n```php\n<?php\n// 7_6.php\n```\n"
- fmt: "`$msg = date(\"Ymd H:i:s \") . \"Script started\\n\";`\n\n`file_put_contents('myfile.log',\
    \ $msg, FILE_APPEND);`\n\nIn the example the message to log is the date with a\
    \ predefined format and then the actual message.\n\nNote the `date()` function\
    \ is called with a single formatting parameter. This causes the function to use\
    \ the current date/time when generating the string. The formatting string also\
    \ contains a trailing space to create some separation to the actual message. The\
    \ message ends with the `\\n` character to force the next message to be logged\
    \ on a new line. After running this script a few times the file will look something\
    \ like this: `20160201 20:33:49 Script started`\n\n`20160201 20:36:48 Script started`\n\
    \n`20160201 20:36:49 Script started()`\n\n## Recipe 7-4. Copy, Rename, and Remove\
    \ Files\n\n### Problem\n\nCreating files and reading from then is handled by opening\
    \ a file in a specified location, but what if you need to get rid of a file, copy\
    \ it, or move it to a different location on the file system?\n\n### Solution\n\
    \nThe functions `copy()` and `rename()` work on a source and destination file\
    \ name. The first parameter is the source and the second is the destination. Each\
    \ file name is a relative or an absolute path to the two files.\n\nThe `copy()`\
    \ function can only be used to copy files. If you want to copy a directory with\
    \ all the files and subdirectories you will have to write a function that reads\
    \ all of the directory and file names and makes a copy of each of them.\n\nMoving\
    \ files to a different location is the same as renaming the file. Using the same\
    \ file name but a different path will move the file to the new location. The `rename()`\
    \ function can be used on regular files, links, and directories.\n\nFiles can\
    \ be removed or deleted with the `unlink()` function. This function works on both\
    \ regular files and links but not on directories. To remove a directory you must\
    \ first make sure all files and directories in it are deleted and then use the\
    \ `rmdir()` function to remove the directory.\n\n### How it Works\n\nTo create\
    \ a copy of a file to a new file in the same directory you can do something like\
    \ this:\n\n```php\n// 7_7.php\ncopy('myfile.log', 'myfile.log.1');\n```\n\nThis\
    \ example uses the same log file we created in example 7_6. Both file names are\
    \ relative to where the script is executed and in this case both files will be\
    \ in the same directory.\n\nIf you want to copy a file from a different directory\
    \ to the current directory you will simply change the source path to give an absolute\
    \ or relative path to where the source file is located. This could be a file that\
    \ comes from a set of distribution files in a config directory located next to\
    \ the current directory.\n\n```php\n// 7_8.php\ncopy('../config/config.php.tmpl',\
    \ 'config.php');\n```\n\nRunning this script will copy the file `config.php.tmpl`\
    \ located in `../config` to the same directory as the script and it will rename\
    \ the file to `config.php`. If you make changes to `config.php` and run the script\
    \ again it will overwrite the file without warning so you are back to a copy of\
    \ the original file.\n\nIf you didn’t want to copy the file but simply move it\
    \ from the config directory to the current directory simply replace the `copy()`\
    \ function with the `rename()` function as shown in example 7_9.php.\n\n```php\n\
    // 7_9.php\nrename('../config/config.php.tmpl', 'config.php');\n```\n\nBoth `copy()`\
    \ and `rename()` will print out warnings if the source file is missing or if the\
    \ target file/directory is missing the permission to write to the file for the\
    \ user executing the script.\n\nIf you are creating a caching system and want\
    \ to remove the cached file you can do that with the `unlink()` function. In example\
    \ 7_10.php we show how to create function that checks if a file exists before\
    \ attempting to remove the file. This will prevent warnings in the case that the\
    \ file didn't exist.\n\n```php\n// 7_10.php\nfunction DeleteCache($name) {\n \
    \  if (file_exists($name)) {\n       unlink($file);\n   }\n}\nDeleteCache('cache.html');\n\
    ```"
