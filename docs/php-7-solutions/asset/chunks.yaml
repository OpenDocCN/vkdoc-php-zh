    CheckPassword;\n```\n\n**注意**：你必须在脚本的顶层导入带命名空间的类。尝试在条件语句中导入该类会产生解析错误。\n\n1. 在表单提交后执行代码的条件语句内部，创建一个\
    \ `CheckPassword` 对象，将 `$password` 作为参数传递。然后调用 `check()` 方法并按如下方式处理结果：\n\n```\n\
    require_once '../PhpSolutions/Authenticate/CheckPassword.php';\n$checkPwd = new\
    \ CheckPassword($password);\nif ($checkPwd->check()) {\n    $result = ['Password\
    \ OK'];\n} else {\n    $result = $checkPwd->getErrors();\n}\n```\n\n`CheckPassword`\
    \ 构造函数的第二个参数是可选的，因此省略它会将最小字符数设置为默认值 8。`check()` 方法的结果被用作条件语句的条件。如果返回 `true`，则将报告密码正确的单元素数组赋值给\
    \ `$result`。否则，使用 `getErrors()` 方法从 `$checkPwd` 对象检索错误数组。\n\n**注意**：测试完成后，单元素数组将被注册用户的脚本替换。你需要使用数组，因为下一步使用\
    \ `foreach` 循环来显示结果。\n\n1. 在页面正文中表单正上方添加以下 PHP 代码块：\n\n```\n<?php if (isset($result))\
    \ { ?>\n    <ul>\n    <?php foreach ($result as $item) { ?>\n        <li><?= $item\
    \ ?></li>\n    <?php } ?>\n    </ul>\n<?php } ?>\n```\n\n这会在表单提交后以无序列表的形式显示密码测试结果。\n\
    \n2. 保存 `register.php` 并在浏览器中加载它。单击“注册”按钮而不填写任何字段来测试 `CheckPassword` 类。你应该会看到一条消息，告知密码至少需要\
    \ 8 个字符。\n\n3. 尝试使用包含 8 个字符的密码。你应该会看到 `Password OK`。\n\n4. 尝试使用至少 8 个字符但中间插入空格的密码。你应该会看到\
