  \ in the mailbox</strong><br />\";\n\n// 遍历邮件并显示每封邮件的主题和日期\nfor($x=1;$x<=count($headers);$x++)\n\
  {\n    $header = imap_header($ms,$x);\n    echo $header->Subject.\" (\".$header->Date.\"\
  )<br />\";\n}\n\n// 关闭连接\nimap_close($ms);\n?>\n```\n\n这将返回如图 16-2 所示的输出。\n\n**图\
  \ 16-2.** *获取邮件头信息*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**382**\n\
  \n"
- "# 第 16 章 ■ 网络通信\n\n再考虑另一个示例。如果希望将未读邮件以粗体显示，该如何操作？为节省篇幅，此示例是前一个示例的修改版，但仅包含相关部分：\n\
  \n```php\n<?php\n...\nfor($x=1;$x<=count($headers);$x++)\n{\n    $header = imap_header($ms,$x);\n\
  \    $unseen = $header->unseen;\n    $recent = $header->recent;\n    if ($unseen\
  \ == \"U\" || $recent == \"N\") {\n        $flagStart = \"<strong>\";\n        $flagStop\
  \ = \"</strong>\";\n    }\n    echo \"<tr>\";\n    echo \"<td>\".$header->fromaddress.\"\
  </td>\";\n    echo \"<td>\".$flagStart.$header->Subject.$flagStop.\"</td>\";\n \
  \   echo \"<td>\".$header->date.\"</td>\";\n    echo \"</tr>\";\n}\necho \"</table>\"\
  ;\n...\n?>\n```\n\n请注意，您需要对两个属性进行布尔判断：`recent` 和 `unseen`。因为如果邮件未读且非最新，`unseen`\
  \ 会被设置为 `U`；如果邮件是最近的且未被查看，`recent` 会被设置为 `N`。因此，通过检查两者中任意一个是否为真，我们便能覆盖所有情况。如果为真，则表示找到了一封未读邮件。\n\
  \n##### `imap_fetchstructure()`\n\n`object imap_fetchstructure(resource msg_stream,\
  \ int msg_number [, int options])`\n\n`imap_fetchstructure()` 函数返回一个对象，该对象包含与 `msg_number`\
  \ 标识的邮件相关的多种项目。如果可选的 `options` 标志被设置为 `FT_UID`，则假设 `msg_number` 是一个 UID。共有 17 个不同的对象属性，但此处仅描述您可能会特别关注的几个：\n\
  \n• `bytes`：邮件大小，以字节为单位。\n\n• `encoding`：分配给 `Content-Transfer-Encoding` 标头的值。这是一个从\
  \ 0 到 5 的整数，分别对应 7bit、8bit、base64、quoted-printable 和其他编码。\n\n• `ifid`：如果存在 `Message-ID`\
  \ 标头，则设置为 `TRUE`。\n\n• `id`：`Message-ID` 标头（如果存在）。\n\n• `lines`：邮件正文中的行数。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- "# 第 16 章 ■ 网络通信\n\n**383**\n\n• `type`：分配给 `Content-Type` 标头的值。这是一个从 0 到 7 的整数，分别对应\
  \ Text、Multipart、Message、Application、Audio、Image、Video 和其他类型。\n\n\n\n请看一个示例。以下代码将获取一封邮件的行数和大小（以字节为单位）：\n\
  \n```php\n<?php\n\n// 打开 IMAP 连接\n\n$user = \"jason\";\n\n$pswd = \"mypswd\";\n\n\
  $ms = imap_open(\"{imap.example.com:143}INBOX\", $user, $pswd);\n\n// 获取第 5 封邮件的信息。\n\
  \n$message = imap_fetchstructure($ms,5);\n\necho \"邮件行数: \".$message->lines.\"<br\
  \ />\"; echo \"邮件大小: \".$message->bytes.\" 字节<br />\";\n\n?>\n```\n\n示例输出如下：\n\n\
  ```\nMessage lines: 15\nMessage size: 854 bytes\n```\n\n##### `imap_fetchoverview()`\n\
  \n`array imap_fetchoverview(resource msg_stream, string sequence [, int options])`\n\
  \n`imap_fetchoverview()` 函数获取指定邮件序列的邮件头信息，并返回一个对象数组。如果将可选的 `options` 标志设置为 `FT_UID`，则假定\
  \ `msg_number` 是一个 UID。数组中的每个对象包含 14 个属性：\n\n- `answered`：确定邮件是否被标记为已回复\n- `date`：邮件发送的日期\n\
  - `deleted`：确定邮件是否被标记为删除\n- `draft`：确定邮件是否被标记为草稿\n- `flagged`：确定邮件是否被标记\n- `from`：发件人\n\
  - `message-id`：Message-ID 头信息\n- `msgno`：邮件的序列号\n- `recent`：确定邮件是否被标记为新邮件\n- `references`：此邮件引用的\
  \ Message-ID\n- `seen`：确定邮件是否被标记为已读\n- `size`：邮件大小（以字节为单位）\n- `subject`：邮件主题\n-\
  \ `uid`：邮件的 UID\n\n除此之外，你可以使用此函数生成尚未阅读的邮件列表：\n\n```php\n<?php\n\n// 打开 IMAP 连接\n\
  \n$user = \"jason\";\n\n$pswd = \"mypswd\";\n\n$ms = imap_open(\"{imap.example.com:143}INBOX\"\
  ,$user, $pswd);\n\n// 获取邮件总数\n\n$nummsgs = imap_num_msg($ms);\n\n$messages = imap_fetch_overview($ms,\"\
  1:$nummsgs\");\n\n// 如果邮件未标记为已读，则输出其信息\n\nwhile(list($key,$value) = each($messages))\
  \ {\n\nif ($value->seen == 0) {\n\necho \"<p>主题: \".$value->subject.\"<br />\";\
  \ echo \"日期: \".$value->date.\"<br />\"; echo \"发件人: \".$value->from.\"</p>\";\n\
  \n}\n\n}\n\n?>\n```\n\n示例输出如下：\n\n```\nSubject: Audio Visual Web site\nDate: Mon,\
  \ 26 Aug 2006 18:04:37 -0500\nFrom: Andrew Fieldpen\n\nSubject: The Internet is\
  \ broken\nDate: Mon, 27 Aug 2006 20:04:37 -0500\nFrom: \"Roy J. Dugger\"\n\nSubject:\
  \ Re: Standards article for Web browsers\nDate: Mon, 28 Aug 2006 21:04:37 -0500\n\
  From: Nicholas Kringle\n```\n\n注意，起始和结束邮件编号之间使用冒号分隔。另外，请记住，即使你将结束邮件编号放在前面，此函数也始终按升序对数组进行排序。最后，你可以通过用逗号分隔每个编号来选择性地指定邮件。例如，如果你想获取第\
  \ 1 到 3 封以及第 5 封邮件的信息，可以像这样设置 `sequence`：`1:3,5`。\n\n##### `imap_fetchbody()`\n\n\
  `string imap_fetchbody(resource msg_stream, int msg_number, string part_number [,\
  \ flags options])`\n\n`imap_fetchbody()` 函数获取 `msg_number` 所标识邮件正文的特定部分（`part_number`），并将该部分作为字符串返回。可选的\
  \ `options` 标志是一个位掩码，可以包含以下一个或多个项：\n\n- `FT_UID`：将 `msg_number` 值视为 UID。\n- `FT_PEEK`：如果邮件尚未设置\
  \ `seen` 标志，则不设置该标志。\n- `FT_INTERNAL`：不转换任何换行符。而是完全按照邮件在邮件服务器内部的样子返回。\n\n如果通过将 `part_number`\
  \ 赋值为空字符串而将其留空，则此函数将返回整个邮件文本。你可以通过将 `part_number` 赋值为一个表示邮件部分位置的整数值来选择性地获取邮件部分。以下示例获取整封邮件：\n\
  \n```php\n<?php\n\n// 打开 IMAP 连接\n\n$user = \"jason\";\n\n$pswd = \"mypswd\";\n\
  ```\n\n\n\n`$ms = imap_open(\"{imap.example.com:143}INBOX\", $user, $pswd); $message\
  \ = imap_fetchbody($ms,1,\"\",\"FT_PEEK\"); echo $message;`\n\n`?>`\n\n示例输出如下：\n\
  \nJason，\n\n能否为我的新学生创建一个 Web 管理员账户？\n\n谢谢\n\nBill Niceguy\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 386 页** ■ 第 16 章 网络编程\n\n发件人：\"Josh Crabgrass\" <crabgrass@example.com>\n\
  收件人：\"Bill Niceguy\" <niceguy@example.com>\n主题：回复：网站访问权限\n日期：2004 年 8 月 5 日，星期一，10:26:01\
  \ –0400\n邮件客户端：Microsoft Outlook，版本 10.0.4510\n重要性：普通\n\nBill，\n\n我需要一个管理员账户来维护新网站。\n\
  \n谢谢，\n\nJosh\n\n#### 撰写邮件\n\n创建和发送邮件可能是最耗费时间的两个电子邮件任务。接下来的两个函数演示了如何使用 PHP 的 IMAP\
  \ 扩展来完成这两项任务。\n\n##### `imap_mail_compose()`\n\n`string imap_mail_compose(array\
  \ *envelope*, array *body*)`\n\n此函数根据提供的信封和正文创建一个 MIME 消息。信封包含与邮件寻址相关的所有头部信息，包括诸如\
  \ From、Reply-To、CC、BCC、Subject 等常见项。正文包含实际消息及其格式相关的各种属性。创建后，您可以使用该消息执行多种操作，包括发送邮件、将其附加到现有邮件存储库，或任何其他适用于\
  \ MIME 消息的操作。\n\n以下是一个基本的编写示例：\n\n```php\n<?php\n$envelope[\"from\"] = \"gilmore@example.com\"\
  ;\n$envelope[\"to\"] = \"admin@example.com\";\n$msgpart[\"type\"] = TYPETEXT;\n\
  $msgpart[\"subtype\"] = \"plain\";\n$msgpart[\"contents.data\"] = \"This is the\
  \ message text.\";\n$msgbody[1] = $msgpart;\necho nl2br(imap_mail_compose($envelope,\
  \ $msbody));\n?>\n```\n\n以下示例返回：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 16 章 ■ 网络编程\n\n**387**\n\n发件人：gilmore@example.com\n收件人：admin@example.com\nMIME\
  \ 版本：1.0\n内容类型：TEXT/plain; CHARSET=US-ASCII\n\n这是消息文本。\n\n#### 发送邮件\n\n编写完邮件后，您可以使用接下来介绍的\
  \ `imap_mail()` 函数来发送邮件。\n\n##### `imap_mail()`\n\n`boolean imap_mail(string *rcpt*,\
  \ string *subject*, string *msg* [, string *addl_headers* [, string *cc* [, string\
  \ *bcc* [, string *rpath*]]]])`\n\n`imap_mail()` 函数与之前介绍的 `mail()` 函数工作方式类似，将消息发送到由\
  \ `rcpt` 指定的地址，主题为 `subject`，消息内容由 `msg` 指定。您可以通过参数 `addl_headers` 包含额外的头部信息。此外，您还可以分别使用参数\
  \ `cc` 和 `bcc` 来抄送和密送其他收件人。最后，`rpath` 参数用于设置 Return-path 头部。\n\n让我们修改前面的示例，以便在编写邮件的同时也发送它：\n\
  \n```php\n<?php\n$envelope[\"from\"] = \"gilmore@example.com\";\n$msgpart[\"type\"\
  ] = TYPETEXT;\n$msgpart[\"subtype\"] = \"plain\";\n$msgpart[\"contents.data\"] =\
  \ \"This is the message text.\";\n$msgbody[1] = $msgpart;\n$message = imap_mail_compose($envelope,\
  \ $msbody);\n\n// 分开消息头部和正文。有些\n// 邮件客户端似乎无法做到这一点。\nlist($msgheader, $msgbody) =\
  \ split(\"\\r\\n\\r\\n\", $message, 2);\n$subject = \"Test IMAP message\";\n$to\
  \ = \"jason@example.com\";\n$result = imap_mail($to, $subject, $msgbody, $msgheader);\n\
  ?>\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 388 页** ■ 第 16\
  \ 章 网络编程\n\n#### 邮箱管理\n\nIMAP 提供了通过将邮件分类放入通常称为*文件夹*或*邮箱*的容器中来组织邮件的功能。本节将向您展示如何创建、重命名和删除这些邮箱。\n\
  \n##### `imap_createmailbox()`\n\n`boolean imap_createmailbox(resource *msg_stream*,\
  \ string *mbox*)`\n\n`imap_createmailbox()` 函数创建一个名为 `mbox` 的邮箱，成功时返回 TRUE，失败时返回\
  \ FALSE。以下示例使用此函数在用户的顶级目录（收件箱）中创建一个邮箱：\n\n```php\n<?php\n$mailserver = \"{imap.example.com:143/imap/notls}INBOX\"\
  ;\n$mbox = \"events\";\n```\n\n\n\n`$ms = imap_open($mailserver,\"jason\",\"mypswd\"\
  ); imap_createmailbox($ms,$mailserver.\"/\".$mbox);`\n\n`imap_close($ms);`\n\n?>`\n\
  \n请注意用于指定邮箱路径的语法：\n\n`{imap.example.com:143/imap/notls}INBOX/events`\n\n与许多 PHP\
  \ 的 IMAP 函数一样，整个服务器字符串必须被视为邮箱名称本身的一部分。\n\n`imap_deletemailbox()`\n\n`boolean imap_deletemailbox(resource\
  \ *msg_stream*, string *mbox*)`\n\n`imap_deletemailbox()` 函数删除名为 `mbox` 的现有邮箱，成功时返回\
  \ `TRUE`，失败时返回 `FALSE`。例如：\n\n```php\n<?php\n\n$mbox = \"{imap.example.com:143/imap/notls}INBOX\"\
  ;\n\nif (imap_deletemailbox($ms, \"$mbox/staff\"))\n    echo \"邮箱已成功删除。\";\nelse\n\
  \    echo \"删除邮箱时出现问题。\";\n\n?>\n```\n\n请记住，删除邮箱也会删除该邮箱中的所有邮件。\n\n`imap_renamemailbox()`\n\
  \n`boolean imap_renamemailbox(resource *msg_stream*, string *old_mbox*, string *new_mbox*)`\n\
  \n`imap_renamemailbox()` 函数将名为 `old_mbox` 的现有邮箱重命名为 `new_mbox`，成功时返回 `TRUE`，失败时返回\
  \ `FALSE`。示例如下：\n\n```php\n<?php\n\n$mbox = \"{imap.example.com:143/imap/notls}INBOX\"\
  ;\n\nif (imap_renamemailbox($ms, \"$mbox/staff\", \"$mbox/teammates\"))\n    echo\
  \ \"邮箱已成功重命名。\";\nelse\n    echo \"重命名邮箱时出现问题。\";\n\n?>\n```\n\n**消息管理**\n\nIMAP\
  \ 的一个优点在于您可以从任何地方管理邮件。本节将介绍如何使用 PHP 的函数实现这一点。\n\n`imap_expunge()`\n\n`boolean imap_expunge(resource\
  \ *msg_stream*)`\n\n`imap_expunge()` 函数销毁所有标记为删除的邮件，成功时返回 `TRUE`，失败时返回 `FALSE`。请注意，您可以通过在流创建或关闭时包含\
  \ `CL_EXPUNGE` 标志来自动化此过程。\n\n`imap_mail_copy()`\n\n`boolean imap_mail_copy(resource\
  \ *msg_stream*, string *msglist*, string *mbox* [, int *options*])`\n\n`imap_mail_copy()`\
  \ 函数将 `msglist` 中的邮件复制到由 `mbox` 指定的邮箱中。可选的 `options` 参数是一个位掩码，包含以下一个或多个标志：\n\n-\
  \ `CP_UID`：`msglist` 包含 UID 而非消息索引标识符。\n- `CP_MOVE`：包含此标志会在复制完成后从原始邮箱中删除邮件。\n\n\
  `imap_mail_move()`\n\n`boolean imap_mail_move(resource *msg_stream*, string *msglist*,\
  \ string *mbox* [, int *options*])`\n\n`imap_mail_move()` 函数将 `msglist` 中的邮件移动到由\
  \ `mbox` 指定的邮箱中。可选的 `options` 参数是一个位掩码，接受以下标志：`CP_UID`：`msglist` 包含 UID 而非消息索引标识符。\n\
  \n**流**\n\n如今，即使是简单的 Web 应用程序也通常由多种编程语言和数据源精心编排而成。在许多此类情况下，语言与数据源之间的交互涉及读取或写入线性数据流，即所谓的*流*。例如，调用\
  \ `fopen()` 命令会将文件名绑定到一个流。此时，可以根据调用的模式设置和权限对该流进行读取和写入。\n\n虽然您可能首先想到在本地文件上调用 `fopen()`，但您可能会发现有趣的是，您还可以使用多种方法创建流绑定，例如通过\
  \ HTTP、HTTPS、FTP、FTPS，甚至使用 zlib 和 bzip2 库压缩流。\n\n这是通过使用适当的*包装器*实现的，PHP 支持多种包装器。本节将介绍一些关于流的内容，重点关注流包装器和另一个有趣的概念——*流过滤器*。\n\
  \n\n\n"
- "# 说明\n\nPHP 5 引入了用于创建和注册自定义流包装器及过滤器的 API。虽然这个话题足以写成一本书，但对大多数读者而言并不具有吸引力。\n\n因此，本书不涉及这方面的内容。如果你有兴趣深入了解，请查阅\
  \ PHP 手册。\n\n### 流包装器与上下文\n\n*流包装器*是一段包裹在流周围的代码，它根据特定协议（无论是 HTTP、FTP 还是其他协议）来管理流。由于\
  \ PHP 默认支持多种包装器，你可以透明地通过这些协议绑定流，如下所示：\n\n```php\n<?php\n\necho file_get_contents(\"\
  http://www.example.com/\");\n\n?>\n```\n\n执行这段代码将返回 `www.example.com` 域名的首页内容：你在浏览器中输入\
  \ \"example.com\"、\"example.net\" 或 \"example.org\" 即会访问到此页面。\n\n这些域名保留用于文档说明，不可注册。详情参见\
  \ RFC 2606 第 3 节。\n\n如你所见，处理 HTTP 流绑定时无需额外编写代码。PHP 透明地支持以下类型的流绑定：HTTP、HTTPS、FTP、FTPS、文件系统、PHP\
  \ 输入/输出以及压缩。\n\n你可能还记得第 10 章中，`fopen()` 函数接受一个名为 `zcontext` 的参数。既然你现在对流和包装器有了更多了解，这正是介绍上下文的合适时机。简而言之，*上下文*是一组包装器特定的选项，用于调整流的行为。每个受支持的流包装器都提供自己的选项集。你可以自行查阅\
  \ PHP 手册了解这些选项；不过，为了让你有个概念，本节将演示其中一个选项如何修改流的行为。要使用任何此类上下文，首先需要使用下面介绍的 `stream_context_create()`\
  \ 函数来创建它。\n\n#### `stream_context_create()`\n\n`resource stream_context_create(array\
  \ options)`\n\n`stream_context_create()` 函数根据传递给它的选项数组创建一个资源上下文。其用途最好通过示例来说明。默认情况下，FTP\
  \ 流不允许覆盖远程服务器上的现有文件。但有时你可能希望启用此行为。为此，你首先需要创建一个上下文资源，传入 `overwrite` 参数，然后将该资源传递给\
  \ `fopen()` 的 `zcontext` 参数。以下代码清晰展示了这一过程：\n\n```php\n<?php\n\n$params = array(\"\
  ftp\" => array(\"overwrite\" => \"1\")); \n$context = stream_context_create($params);\n\
  $fh = fopen(\"ftp://localhost/\", \"w\", 0, $context);\n\n?>\n```\n\n### 流过滤器\n\n\
  有时，你需要在从数据源读取流或向数据源写入流时对流数据进行操作。例如，你可能想从流中去除所有 HTML 标签。使用*流过滤器*，这轻而易举。在撰写本文时，共有三种类型的流过滤器可用：字符串、转换和压缩。自\
  \ PHP 5.0 RC1 起，默认提供了字符串和转换类型。你可以通过安装 `zlib_filter` 包来启用压缩过滤器，该包可通过 PECL（`http://pecl.php.net/`）获取。表\
  \ 16-1 列出了默认过滤器及其对应描述。\n\n**表 16-1.** *PHP 默认流过滤器*\n\n| 过滤器 | 描述 |\n|---|---|\n\
  | `string.rot13` | 参见标准 PHP 函数 `rot13()`。 |\n| `string.toupper` | 参见标准 PHP 函数 `toupper()`。\
  \ |\n| `string.tolower` | 参见标准 PHP 函数 `tolower()`。 |\n| `string.strip_tags` | 参见标准\
  \ PHP 函数 `strip_tags()`。 |\n| `convert.base64-encode` | 参见标准 PHP 函数 `base64_encode()`。\
  \ |\n| `convert.base64-decode` | 参见标准 PHP 函数 `base64_decode()`。 |\n| `convert.quoted-printable-decode`\
  \ | 参见标准 PHP 函数 `quoted_printable_decode()`。 |\n| `convert.quoted-printable-encode`\
  \ | 无对应功能。除了 `base64_encode()` 支持的参数外，它还按顺序支持布尔参数 `binary` 和 `force-encode-first`。这些参数分别指定流是否应以二进制格式处理，以及是否应首先使用\
  \ `base64_encode()` 进行编码。 |\n\n要查看你的 PHP 发行版可用的过滤器，请使用下面介绍的 `stream_get_filters()`\
  \ 函数。\n\n#### `stream_get_filters()`\n\n`array stream_get_filters()`\n\n`stream_get_filters()`\
  \ 函数返回一个数组，包含所有已注册的流过滤器。考虑一个示例：\n\n```php\nprint_r(stream_get_filters());\n```\n\
  \n该示例返回：\n\n```\nArray (\n    [0] => convert.iconv.*\n    [1] => string.rot13\n\
  \    [2] => string.toupper\n    [3] => string.tolower\n    [4] => string.strip_tags\n\
  \    [5] => convert.*\n)\n```\n\n不清楚为什么这个函数列出了所有可用的字符串型过滤器，却通过星号合并来掩盖两个转换过滤器的名称。自\
  \ PHP 5.0 RC1 起，共有四个转换过滤器，分别是 `base64-encode`、`base64-decode`、`quoted-printable-encode`\
  \ 和 `quoted-printable-decode`。\n\n要使用过滤器，你需要通过 `stream_filter_append()` 或 `stream_filter_prepend()`\
  \ 这两个函数之一来传入它。选择哪个函数取决于你希望相对于其他已分配的过滤器，以何种顺序执行该过滤器。下面将介绍这两个函数。\n\n#### `stream_filter_append()`\n\
  \n`boolean stream_filter_append(resource stream, string filtername [, int read_write\
  \ [, mixed params]])`\n\n`stream_filter_append()` 函数将过滤器 `filtername` 附加到当前针对 `stream`\
  \ 执行的任何过滤器列表的末尾。可选的 `read_write` 参数指定应将过滤器应用于哪个过滤器链（读取或写入）。通常你不需要此参数，因为 PHP 默认会为你处理。最后一个可选参数\
  \ `params` 指定要传递给过滤器函数的任何参数。\n\n让我们考虑一个示例。假设你正在将表单输入的博客文章写入一个 HTML 文件。唯一允许的 HTML\
  \ 标签是 `<br />`，因此你希望在写入 HTML 文件时从流中移除所有其他字符：\n\n```php\n<?php\n\n$blog = <<< blog\n\
  One of my <b>favorite</b> blog tools is Movable Type.<br /> You can learn more about\
  \ Movable Type at\n<a href=\"http://www.movabletype.org/\">http://www.movabletype.org/</a>.\n\
  blog;\n\n$fh = fopen(\"042006.html\", \"w\");\nstream_filter_append($fh, \"string.strip_tags\"\
  , STREAM_FILTER_WRITE, \"<br>\");\nfwrite($fh, $blog);\nfclose($fh);\n?>\n```\n\n\
  如果你打开 `042006.html`，会发现以下内容：\n\n```\nOne of my favorite blog tools is Movable Type.<br\
  \ />\nYou can learn more about Movable Type at http://www.movabletype.org/.\n```\n\
  \n#### `stream_filter_prepend()`\n\n`boolean stream_filter_prepend(resource stream,\
  \ string filtername [, int read_write [, mixed params]])`\n\n`stream_filter_prepend()`\
  \ 函数将过滤器 `filtername` 前置到当前针对 `stream` 执行的任何过滤器列表的开头。可选的 `read_write` 和 `params`\
  \ 参数在用途上与 `stream_filter_append()` 中描述的对应参数一致。\n\n### 常见网络任务\n\n\n\n"
