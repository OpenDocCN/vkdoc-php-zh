  \ Tardia |\n|   | [`phpmaster.com/deploy-and-release-your-applications-with-phing/`](http://phpmaster.com/deploy-and-release-your-applications-with-phing/)\
  \ |\n|   |   |\n|   | “自动化软件开发与部署”，作者：Grzegorz Godlewski |\n|   | [`blog.twelvecode.com/2012/06/20/automating-software-development-and-deployment/`](http://blog.twelvecode.com/2012/06/20/automating-software-development-and-deployment/)\
  \ |\n\n\n\n### 4.3 持续集成\n\n在构建系统之上更进一步的是持续集成（CI）系统。CI 系统在大型团队开发项目中尤其有用，它允许多个开发者持续（或定期）将各自的开发工作集成到最终的完整软件系统中。CI\
  \ 系统通常从版本控制系统获取用户的个别提交，并将其与其他开发者的工作一起构建（“集成”）成最终“产品”，并在构建过程中通常进行测试和部署。采用 CI 系统时，通常鼓励开发者每天至少提交一次，如果可能的话更频繁。在没有\
  \ CI 的项目中，团队通常各自独立开发，并在流程结束时才互相集成工作。在一个拥有众多开发者的大型项目中，集成阶段往往耗时漫长，并且由于需要发现和修复不兼容问题，常常导致时间（和资金）超支。CI\
  \ 系统有效消除了这一集成步骤，因为集成从项目第一天就开始了。问题能尽早暴露并持续得到修复，不兼容代码的重写工作被降至最低。当项目完成时，不同开发者或团队的工作几乎可以保证互操作并完全集成到项目中。\n\
  \n| ![信息](img/image00248.jpeg) | **延伸阅读** 软件工程师马丁·福勒（Martin Fowler）撰写的 CI 深度入门文章\
