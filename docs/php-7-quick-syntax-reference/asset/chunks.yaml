    $b = new MyClass();\n$a->setPrivate($b, 10);\n```\n\n## 访问级别指南\n\n作为一项指南，在选择访问级别时，通常最好使用限制最严格的级别。这是因为成员可被访问的位置越多，其被错误访问的位置就越多，从而使代码更难调试。使用严格的访问级别也使得修改类时更不易破坏使用该类的其他开发者的代码。\n\
    \n## 静态（Static）\n\n`static` 关键字可用于声明无需创建类实例即可访问的属性和方法。静态（类）成员只存在一份副本，归属于类本身；而实例（非静态）成员则为每个新对象创建新的副本。\n\
    \n```php\nclass MyCircle\n{\n    // 实例成员（每个对象一份）\n    public $r = 10;\n    function\
    \ getArea() {}\n\n    // 静态/类成员（仅一份副本）\n    static $pi = 3.14;\n    static function\
    \ newArea($a) {}\n}\n```\n\n静态方法不能使用实例成员，因为这些方法不属于某个实例。但它们可以使用其他静态成员。\n\n### 引用静态成员\n\
    \n与实例成员不同，静态成员不使用单箭头运算符（`->`）进行访问。相反，要在类内部引用静态成员，必须在成员前加上 `self` 关键字，后跟范围解析运算符（`::`）。`self`\
    \ 关键字是类名的别名，因此也可以直接使用类的实际名称。\n\n```php\nstatic function newArea($a)\n{\n    return\
    \ self::$pi * $a * $a;     // 正确\n    return MyCircle::$pi * $a * $a; // 替代写法\n\
    }\n```\n\n从实例方法访问静态成员时也使用相同的语法。请注意，与静态方法不同，实例方法可以同时使用静态成员和实例成员。\n\n```php\nfunction\
    \ getArea()\n{\n    return self::newArea($this->$r);\n}\n```\n\n要从类外部访问静态成员，需要使用类名，后跟范围解析运算符（`::`）。\n\
    \n```php\nclass MyCircle\n{\n    static $pi = 3.14;\n    static function newArea($a)\n\
    \    {\n        return self::$pi * $a * $a;\n    }\n}\n\necho MyCircle::$pi; \
    \        // 输出 \"3.14\"\necho MyCircle::newArea(10); // 输出 \"314\"\n```\n\n这里可以体现静态成员的优势：无需创建类的实例即可使用它们。因此，如果方法独立于实例变量执行通用功能，则应声明为静态。同样，如果变量只需要一个实例，则属性应声明为静态。\n\
    \n### 静态变量\n\n局部变量可以声明为静态，以使函数记住其值。这种静态变量仅存在于局部函数的作用域内，但在函数结束时不会丢失其值。例如，这可用于统计函数被调用的次数。\n\
    \n```php\nfunction add()\n{\n    static $val = 0;\n    echo $val++;\n}\n\nadd();\
    \ // 输出 \"0\"\nadd(); // 输出 \"1\"\nadd(); // 输出 \"2\"\n```\n\n静态变量的初始值仅设置一次。请记住，静态属性和静态变量只能使用常量进行初始化，而不能使用表达式（例如另一个变量或函数返回值）。\n\
    \n### 后期静态绑定\n\n如前所述，`self` 关键字是所在类名的别名。这意味着，即使从子类的上下文中调用，该关键字也指向其所在的类。\n\n```php\n\
    class MyParent\n{\n    protected static $val = 'parent';\n    public static function\
    \ getVal()\n    {\n        return self::$val;\n    }\n}\n\nclass MyChild extends\
    \ MyParent\n{\n    protected static $val = 'child';\n}\n\necho MyChild::getVal();\
    \ // 输出 \"parent\"\n```\n\n要获得对实际调用类的引用，需要使用 `static` 关键字代替 `self` 关键字。此特性称为**后期静态绑定**，自\
    \ PHP 5.3 起引入。\n\n```php\nclass MyParent\n{\n    protected static $val = 'parent';\n\
    \    public static function getLateBindingVal()\n    {\n        return static::$val;\n\
    \    }\n}\n\nclass MyChild extends MyParent\n{\n    protected static $val = 'child';\n\
    }\n\necho MyChild::getLateBindingVal(); // 输出 \"child\"\n```\n\n## 常量\n\n常量是一种其值不能被脚本改变的变量。因此，此类值必须在创建常量时同时赋值。PHP\
    \ 提供了两种创建常量的方法：`const` 修饰符和 `define` 函数。\n\n### Const\n\n`const` 修饰符用于创建类常量。与常规属性不同，类常量不需要指定访问级别，因为它们始终是公开可见的。它们也不使用美元符号解析器标记（`$`）。常量的命名约定是全大写，单词之间用下划线分隔。\n\
    \n```php\nclass MyCircle\n{\n    const PI = 3.14;\n}\n```\n\n常量在创建时必须赋值。与静态属性一样，常量只能使用常量值进行初始化，而不能使用表达式。类常量的引用方式与静态属性相同，只是它们不使用美元符号。\n\
    \n```php\necho MyCircle::PI; // 输出 \"3.14\"\n```\n\n`const` 修饰符不能应用于局部变量或参数。但是，自\
    \ PHP 5.3 起，`const` 可用于创建全局常量。此类常量在全局作用域中定义，可以在脚本的任何位置访问。\n\n```php\nconst PI\
    \ = 3.14;\necho PI; // 输出 \"3.14\"\n```\n\n### Define\n\n`define` 函数可以创建全局常量和局部常量，但不能创建类常量。该函数的第一个参数是常量名，第二个参数是其值。\n\
    \n```php\ndefine('DEBUG', 1);\n```\n\n就像使用 `const` 创建的常量一样，`define` 常量使用时也不带美元符号，且其值不能修改。\n\
    \n```php\necho DEBUG; // 输出 \"1\"\n```\n\n与 `const` 创建的常量一样，`define` 的值可以是任何标量数据类型：整数、浮点数、字符串或布尔值。但是，与\
    \ `const` 不同，`define` 函数允许在赋值中使用表达式，例如变量或数学表达式的结果。\n\n```php\ndefine('ONE', 1);\
    \      // 1\ndefine('TWO', ONE+1);  // 2\n```\n\n常量默认区分大小写。然而，`define` 函数接受第三个可选参数，可将其设置为\
    \ `true` 以创建不区分大小写的常量。\n\n```php\ndefine('DEBUG', 1, true);\necho debug; // 输出\
    \ \"1\"\n```\n\n要检查常量是否已存在，可使用 `defined` 函数。此函数适用于使用 `const` 或 `define` 创建的常量。\n\
    \n```php\nif (!defined('PI'))\n    define('PI', 3.14);\n```\n\nPHP 7 支持使用 `define`\
    \ 函数创建常量数组。自 PHP 5.6 起，就已支持使用 `const` 创建常量数组。\n\n```php\nconst CA = [1, 2, 3];\
    \    // PHP 5.6 或更高版本\ndefine('DA', [1, 2, 3]); // PHP 7 或更高版本\n```\n\n### Const\
    \ 与 define 的比较\n\n`const` 修饰符创建的是编译时常量，因此编译器会将对常量的所有引用替换为其值。相反，`define` 创建的是运行时常量，直到运行时才被设置。这就是为什么\
    \ `define` 常量可以用表达式的值赋值，而 `const` 要求使用在编译时已知的常量值。\n\n```php\nconst PI = 3.14;\
    \   // 编译时常量\ndefine('E', 2.72); // 运行时常量\n```"
