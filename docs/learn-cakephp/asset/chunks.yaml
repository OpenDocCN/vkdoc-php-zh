    ```


    We should do the same for posts. Right now, one `record` would be enough. This
    code should be in the `/tests/Fixture/PostsFixture.php` file.


    We have a `belongsToMany` association between posts and tags, meaning a post can
    have many tags, and a tag can be assigned to many posts. For storing this data,
    we have created a `posts_tags` database table in our default data source. As we
    want to use it now in tests, we need fixtures for our join tables also.


    ```

    1   ''PostsTags''];


    10      public $records = [

    11          [

    12              ''post_id'' => 1,

