    of Zend_Auth). The single argument passed to authenticate() is the adapter ($adapter).
    An instance of Zend_Auth_Result is then returned. We can call isValid() on this
    object to see whether the user successfully authenticated. If they didn’t, we
    can either call getMessages() on the result to determine why, or we can generate
    our own error message based on the result from getCode().


