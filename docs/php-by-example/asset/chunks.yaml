    parent::__construct($number);

    $this->symbol=$symbol;

    echo "字符: ",$this->symbol,"\n";

    }

    // 析构函数：

    function __destruct(){

    echo "~~~~~~~~~~~~~~~~~~\n";

    parent::__destruct();

    echo "已删除：字符 ",$this->symbol,"\n";

    }

    }

    // 创建子类对象：

    $obj=new Bravo(200,''B'');

