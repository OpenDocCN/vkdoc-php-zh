    \ {\n    case 'jpeg':\n    return imagecreatefromjpeg($this->original);\n    case\
    \ 'png':\n    return imagecreatefrompng($this->original);\n    case 'gif':\n \
    \   return imagecreatefromgif($this->original);\n    case 'webp':\n    return\
    \ imagecreatefromwebp($this->original);\n    }\n    }\n    ```\n\nThe `checkType()`\
    \ method\n     that you created\n    in PHP Solution 10-1 stores the MIME type\
