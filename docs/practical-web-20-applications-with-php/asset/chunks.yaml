    • **Controller:** The *controller* joins the *view* to the *model*. That is, it
    responds to events (such as when a user submits a web form), potentially updating
    the state of the application by interacting with the *model*.


    Figure 2-1 shows how the three parts of MVC fit together in a typical web application.


    **Figure 2-1.** *How the Model-View-Controller design pattern fits together in
    our application* We will be using the Zend_Controller class to handle the controller
    aspect of MVC. All user requests will be handled by this class, which will then
    result either in a new web page being displayed to the user (using Smarty), or
    in some update to the application (such as a new blog post being written to the
    database).


