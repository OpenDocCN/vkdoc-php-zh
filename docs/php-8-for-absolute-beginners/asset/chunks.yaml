    }\nreturn $results;\n}\n}\nListing 10-13\nFunction returnJSONData from accessData.class.php\n\
    ```\n\nThis code is similar to the last example.\n\n```\n// Read the JSON file\n\
    $json = file_get_contents($file);\n// Decode the JSON file\n$json_data = json_decode($json,true);\n\
