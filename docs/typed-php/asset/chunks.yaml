    \ out. What do I mean by that last statement?\n\n```\n1 $helloBox = new StringBox(\"\
    Hello\");\n2 $worldBox = new StringBox(\"World\");\n\n4 $helloWorldBox = new StringBox(\n\
    5   $helloBox->toString() . \" \" . $worldBox->toString()\n6 );\n```\n\nThis quickly\
    \ becomes unwieldy. It’s also more memory intensive, and slower than just using\
    \ the native functions and types.\n\nPHP allows the use of a method called `__toString`.\
    \ When a class defines this method (to return a string), and an instance of the\
    \ class is used in an operation that expects a string; the `__toString` method\
    \ is automatically called.\n\nThis isn’t enough for us to simulate an extensible\
    \ type system, or this would be a short book.\n\n### Resolving Types\n\nPHP is\
    \ a weakly typed language. That is, variables can be declared without specifying\
    \ a type. Their type can be changed at any point. They can be coerced into different\
    \ types on demand.\n\nIf we want to implement stronger type-handling, we need\
    \ to be able to identify the type of a variable. PHP provides a number of functions\
    \ which help with this, but they have a fe issues to overcome…"
  trans: "\n### 原生函数的不一致性\n\nPHP 常因其原生函数的不一致性而受到批评。PHP 也常因其文档质量而受到赞扬。这两者是相关的！文档之所以能发展得如此出色，正是因为\
    \ PHP 原生函数本身是不一致的。\n\n这一节可能会让我听起来像个 PHP 反对者。但事实远非如此！我热爱 PHP，并致力于使用它并帮助他人使用它。要了解我们在构建什么，我们必须知道我们试图避免构建什么。这就是接下来要讲述的重点。\n\
    \n#### 零星的下划线\n\n-   `parse_str`\n-   `printf`\n-   `str_pad`\n-   `strcmp`\n\
    -   `strip_tags`\n-   `stripslashes`\n\n这些函数在 [`php.net/manual/en/ref.strings.php`](http://php.net/manual/en/ref.strings.php)\
    \ 中有描述。\n\n完整列表包含 98 个函数，其中 30 个使用了一个或多个下划线。有时，明显由多个完整单词组成的函数（如 `setlocale`）却没有下划线。有时，功能几乎完全相同的函数（如\
    \ `strlen` 与 `str_word_count`）处理方式却不一致。\n\n#### 零星的缩写\n\n-   `addslashes`\n- \
    \  `chr`\n-   `htmlentities`\n-   `lcfirst`\n-   `number_format`\n-   `stroll`\n\
    \n大多数字符串函数都使用了某种缩写。如果应用一致，这不成问题。然而，一些非缩写函数的存在使得字符串 API 难以记忆，这通常意味着需要反复查阅文档。\n\n\
    #### 不一致的参数顺序\n\n-   `array_key_exists($needle, $haystack)`\n-   `stripos($haystack\
    \ , $needle)`\n\n参数的排列顺序取决于你是在处理数组函数还是字符串函数。Rasmus 解释说，这是为了尽可能接近底层 C 库的作法。这个解释的问题在于，对于那些从未使用过\
    \ C 语言、只想使用 PHP 的开发人员来说，毫无意义。\n\n记住这一点很有帮助：数组方法是**针/草垛**（needle/haystack），而字符串方法是**草垛/针**（haystack/needle）。\n\
    \n#### 正则表达式 / 字符串\n\n-   `preg_filter`\n-   `str_replace`\n-   `preg_match`\n\
    -   `strstr`\n-   `preg_split`\n-   `explode`\n\n在 PHP 中，正则表达式被表示为字符串，但却用一套完全不同的函数来处理。这很奇怪。虽然我可以接受正则表达式与字符串有相似的表示形式，并且它们被传递给（C\
    \ 库中的）函数期望处理的是字符串，但开发人员不应该需要考虑这一点。\n\n如果字符串以可识别的分隔符开头和结尾，PHP 就会将其视为正则表达式。你可以在\
    \ [`www.php.net/manual/en/regexp.reference.delimiters.php`](http://www.php.net/manual/en/regexp.reference.delimiters.php)\
    \ 了解更多信息。\n\n或者，正则表达式应该有自己的表示形式，以明确地与字符串区分开来。一个已经具备此特性的语言例子是 **JavaScript**：\n\
    \n```\n1 \"abc\".replace(\"b\", \"123\"); // \"abc\" 变为 \"a123c\"\n2 \"def\".replace(/[e]/,\
    \ \"456\"); // \"def\" 变为 \"d456f\"\n```\n\n这些语言明确区分了字符串和正则表达式。\n\n#### 名词 / 动词\n\
    \n-   `echo`\n-   `htmlentities`\n-   `lcfirst`\n-   `md5`\n-   `parse_str`\n\
    -   `soundedex`\n\n一些原生函数是动词（如 `echo` 和 `parse_str`），而另一些则是名词（如 `htmlentities`\
    \ 和 `soundex`）。这使得推断方法的作用变得棘手。\n\n#### 奇怪的返回值\n\n许多原生函数返回多种类型。对于 `strstr` 函数，如果匹配到则返回字符串，否则返回\
    \ `false`。\n\n与此相反，`preg_match` 函数在找到模式时返回 `1`，未找到时返回 `0`，如果发生错误则返回 `false`。这使得在将任何返回值用于预期目的之前，需要进行大量的类型检查。\n\
    \n### 结论\n\nPHP 是一门伟大的语言。\n\n但是，如果你经常使用 PHP，你要么已经逐渐忽略了 PHP 在标量类型处理方面的糟糕状况，要么因为缺乏良好的替代方案而感到沮丧。\n\
    \n对于大多数中小型项目来说，增加一个修订后的类型系统是没必要的。然而，如果你学会了如何构建（甚至只是使用）一个构建良好的类型系统，将其用于大型项目不是很有意义吗？或者用于你足够关心的任何项目？\n\
    \nPHP 的这个领域常常会把开发者驱赶到更漂亮的语言中去。不要成为那些开发者之一！通过学习使用清晰的抽象来编写更整洁的代码。\n\n## 结构\n\n###\
    \ 装箱\n\n**装箱（Boxing）** 是一个术语，指的是将数据包裹（封装）在一个类中的实践，以便可以为包裹的数据添加行为。让我们看一个例子：\n\n\
    ```\n 1 <?php\n\n 3 class StringBox\n 4 {\n 5   /**\n 6    * @var string\n 7 \
    \   */\n 8   protected $data;\n\n10   /**\n11    * @param string $data\n12   \
    \ */\n13   public function __construct($data)\n14   {\n15     $this->data = $data;\n\
    16   }\n\n18   /**\n19    * @return string\n20    */\n21   public function toString()\n\
    22   {\n23     return (string) $this->data;\n24   }\n\n26   /**\n27    * @return\
    \ string\n28    */\n29   public function toUpperCase()\n30   {\n31     return\
    \ strtoupper($this->data);\n32   }\n\n34   /**\n35    * @return string\n36   \
    \ */\n37   public function toLowerCase()\n38   {\n39     return strtolower($this->data);\n\
    40   }\n\n42   /**\n43    * @param string $needle\n44    * @param mixed  $offset\n\
    45    *\n46    * @return int\n47    */\n48   public function getIndexOf($needle,\
    \ $offset = null)\n49   {\n50     $index = strpos($this->data, $needle, $offset);\n\
    \n52     if ($index === false) {\n53       return -1;\n54     }\n\n56     return\
    \ $index;\n57   }\n58 }\n\n60 $box = new StringBox(\"Hello World\");\n\n62 print\
    \ $box->toString();          // \"hello world\"\n63 print $box->toUpperCase();\
    \       // \"HELLO WORLD\"\n64 print $box->toLowerCase();       // \"hello world\"\
    \n65 print $box->getIndexOf(\"foo\");   // -1\n66 print $box->getIndexOf(\"World\"\
    ); // 6\n```\n\n这种方法完全受 PHP 支持，无需任何额外的扩展或依赖。如果你仔细想想，这是一个简单的概念。你正在使用受保护的属性，并公开一个公共\
    \ API 来设置、获取和操作它们。\n\n它的难点在于，相比直接使用原生函数，这会导致更多的代码。你需要定义包装器。你需要定义设置器和获取器。每次你想要将*原生*类型传入并获取*原生*类型时，都必须使用它们。我最后那句是什么意思？\n\
    \n```\n1 $helloBox = new StringBox(\"Hello\");\n2 $worldBox = new StringBox(\"\
    World\");\n\n4 $helloWorldBox = new StringBox(\n5   $helloBox->toString() . \"\
    \ \" . $worldBox->toString()\n6 );\n```\n\n这很快就变得笨重了。它也更耗内存，并且比直接使用原生函数和类型要慢。\n\
    \nPHP 允许使用一个名为 `__toString` 的方法。当一个类定义了此方法（来返回一个字符串），并且该类的实例被用于期望字符串的操作中时；`__toString`\
    \ 方法会被自动调用。\n\n这还不足以让我们模拟一个可扩展的类型系统，否则这本书就不会这么短了。\n\n### 解析类型\n\nPHP 是一种弱类型语言。也就是说，变量可以在不指定类型的情况下声明。它们的类型可以在任何时刻改变。它们可以根据需要被强制转换为不同的类型。\n\
    \n如果我们想要实现更强的类型处理，我们需要能够识别变量的类型。PHP 提供了一些有助于此的函数，但它们有一些需要克服的问题……\n"
- fmt: "#### Scalar Types\n\nThe `gettype()` function returns the data type of a variable.\
    \ It can identify the following types:\n\n- `\"boolean\"`\n- `\"integer\"`\n-\
    \ `\"double\"`\n- `\"string\"`\n- `\"array\"`\n- `\"object\"`\n- `\"resource\"\
    `\n- `\"NULL\"`\n\nIf none of these types correctly describes the variable, `gettype()`\
    \ will return `\"unknown type\"`. Again we see some strange inconsistencies. Firstly,\
    \ floats are identified as `\"double\"` and null values are returned as `\"NULL\"\
    ` (uppercase, in contrast to every other type identifier).\n\nWe can abstract\
    \ around this function, with something resembling the following:\n\n```php\n<?php\n\
    \nfunction type($variable) {\n  $type = gettype($variable);\n\n  switch ($type)\
    \ {\n\n    case \"integer\":\n    case \"double\":\n      return \"number\";\n\
    \n    case \"NULL\":\n      return \"null\";\n\n  }\n\n  return $type;\n}\n\n\
    print type(0);    // \"number\"\nprint type(.0);   // \"number\"\nprint type(null);\
    \ // \"null\"\n```\n\nWhat about when the variable contains a callback? In that\
    \ case, we can use…\n\n#### Functions\n\nThe `is_callable()` function checks to\
    \ see if something is a callable function, whether it is a string or an anonymous\
    \ function.\n\n```php\n<?php\n\nprint is_callable(\"is_callable\"); // true\n\
    print is_callable(function(){});  // true\nprint is_callable(null);          //\
    \ false\n\nclass Foo\n{\n  public function bar()\n  {\n\n  }\n\n  public function\
    \ identify()\n  {\n    return is_callable([$this, \"bar\"]);\n  }\n}\n\n$foo =\
    \ new Foo();\n\nprint $foo->identify(); // true\n```\n\nTechnically, `is_callable()`\
    \ identifies a valid argument to any callback-accepting function in PHP. The following\
    \ are all valid for these kinds of functions:\n\n- An actual function (`function(){}`)\n\
    - An array of context and method name (`[$this, \"bar\"]`)\n- The name of a function,\
    \ as a string (`\"is_callable\"`)\n\nDue to how loose this method is, you need\
    \ to be careful when trying to identify strings and functions in the same resolver\
    \ function. If you’re using `is_string()` and `is_callable()` at the same time,\
    \ your results may differ depending on the order in which these are called.\n\n\
    For example:\n\n```php\n$variable = \"is_callable\";\n\nif (is_string($variable))\
    \ {\n  die(\"variable is a string\");\n}\n\nif (is_callable($variable)) {\n  die(\"\
    variable is callable\");\n}\n```\n\nThe script will terminate with the string\
    \ `\"variable is a string\"`, because it is a string. But it’s also the name of\
    \ a callable function, so swapping the conditional statements will make the script\
    \ terminate in `\"variable is callable\"`.\n\nIf you want to get more specific,\
    \ then it’s helpful to know that `gettype(function(){})` will return `\"object\"\
    `. In that case, we can do this:\n\n```php\n<?php\n\nfunction is_function($variable)\
    \ {\n  return is_callable($variable) and gettype($variable) === \"object\";\n\
    }\n\nprint is_function(function(){});  //true\nprint is_function(\"is_function\"\
    ); //false\nprint is_function(new stdClass);  //false\n```\n\n#### Classes\n\n\
    Sometimes what we want to do is identify the type of object we’re working with.\
    \ `gettype()` won’t tell us much more than that the variable is an object. We’ll\
    \ have to combine that with the `get_class()` function:\n\n```php\n<?php\n\nfunction\
    \ type($variable) {\n  $type = gettype($variable);\n\n  switch ($type) {\n\n \
    \   case \"integer\":\n    case \"double\":\n      return \"number\";\n\n    case\
    \ \"NULL\":\n      return \"null\";\n\n    case \"object\":\n      return get_class($variable);\n\
    \n  }\n\n  return $type;\n}\n\nprint type(\"foo\"); // \"string\"\n\nclass Foo\n\
    {\n\n}\n\n$foo = new Foo();\n\nprint type($foo);         // \"Foo\"\nprint type(function(){});\
    \ // \"Closure\"\n```\n\nWe could further normalise `\"Closure\"` to something\
    \ like `\"function\"`; if we wanted to treat it with the same gravity as the other\
    \ types.\n\n#### Regular Expressions\n\nSince PHP has multiple sets of string\
    \ functions (one for plain strings and a few for regular expressions), it would\
    \ be great if we had a way to differentiate between things that look like regular\
    \ expressions and things that don’t.\n\nIt’s important to differentiate between\
    \ definitively identifying regular expressions and identifying things that *look\
    \ like*. Just because something looks like a regular expression doesn’t mean that\
    \ it is. Nor does it mean that the intention of the author was for it to be a\
    \ regular expression.\n\nThe PHP documentation (at [http://www.php.net/manual/en/intro.pcre.php](http://www.php.net/manual/en/intro.pcre.php))\
    \ describes expressions as [a string] enclosed in delimiters. These delimiters\
    \ can be any non-alphanumeric that aren’t also a backslash or null byte.\n\nWe\
    \ can cover a large majority of cases, using the following:\n\n```php\n<?php\n\
    \nfunction is_regex($variable) {\n  return @preg_match($regex, \"\") !== false\n\
    \    && preg_last_error() == PREG_NO_ERROR;\n}\n\nprint is_regex(\"/^.*$/\");\
    \ // true\nprint is_regex(\"/hello world/\"); // true\nprint is_regex(\"/hello\
    \ world/i\"); // true\nprint is_regex(\"hello world\"); // false\nprint is_regex(\"\
    \\\\hello world\\\\\"); // false\nprint is_regex(\"\\\\x00foo\\\\x00\"); // false\n\
    print is_regex(\"1foo1\"); // false\nprint is_regex(\"afooa\"); // false\n```\n\
    \nThe `preg_match()` function returns a `1` for a match, `0` for no match and\
    \ `false` if an error occurred. Assuming `preg_match()` returns `false`, the error\
    \ could be for any number of reasons (like `PREG_INTERNAL_ERROR` or `PREG_BAD_UTF8_ERROR`).\
    \ So then we use the `preg_last_error()` function to rule out all other errors.\n\
    \nUsing error suppression (`@`) is generally a bad idea. There are very few instances\
    \ when using it is considered ok. This is one of them!\n\n### Namespace Functions\n\
    \nI’ve spoke a bit about how all these global functions are bad, and there’s a\
    \ really simple alternative: namespace functions. You’ve probably used namespaces,\
    \ for classes, but the same constructs work well to isolate functions:\n\n```php\n\
    <?php\n\nnamespace Type\\String {\n  function length($string) {\n    return strlen($string);\n\
    \  }\n}\n\nnamespace {\n  print Type\\String\\length(\"Hello World\");\n}\n```\n\
    \n#### Composer Autoload\n\nThis kind of function definition doesn’t follow normal\
    \ autoload patterns. In order to have Composer autoload these kinds of files is\
    \ to explicitly define which files should be loaded:\n\n```json\n{\n  \"autoload\"\
    \ : {\n    \"files\" : [\n      \"namespace-functions.php\"\n    ]\n  }\n}\n```\n\
    \nFollowing this, we’ll have to dump the old autoloader, with:\n\n```\n$ composer\
    \ dump-autoload\n\nGenerating autoload files\n```\n\nThe files (containing namespace\
    \ functions) will now be automatically loaded, wherever the Composer autoloader\
    \ is used.\n\n#### Future Goodies\n\nPHP 5.6 supports the `use function` construct,\
    \ to import functions from other namespaces. It’s currently in beta (at the time\
    \ of writing), but this feature is right up our proverbial alley.\n\nIn the meantime,\
    \ it’s possible to partially import functions:\n\n```php\nuse Type\\String;\n\n\
    print String\\length(\"Hello World\");\n```\n\nThis is especially useful for deeply-nested\
    \ namespace designs. Still; it’s great to be able to omit even a little of the\
    \ full namespace. The result is clean(er), non-colliding procedural code.\n\n\
    ### Conclusion\n\nEven today, it’s possible to create a cleaner scalar type system/abstraction.\
    \ We don’t need special extensions, or compilation steps. Just a little bit of\
    \ work will clean the code right up.\n\nHaving said that, extensions can go a\
    \ long way towards making our lives easier, while still allowing the level of\
    \ customisation and unity that we are hoping to achieve. We’ll look at a few of\
    \ these in the following chapter…\n\n## Extensions"
