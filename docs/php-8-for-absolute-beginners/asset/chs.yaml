  \ 类似于 `<fieldset>` 元素的标题。\n\n条目标题的 `<input>` 元素有一个设置为 150 的 `maxlength` 属性。你可能猜到了，显示的文本字段只接受\
  \ 150 个字符。这很完美，因为我们数据库中的 `entries` 表对于新的 `title` 属性最多接受 150 个字符。我们应该始终确保 HTML 表单中设置的所有限制与存储此信息的数据库表中的限制相匹配。\n\
  \n`maxlength` 属性增强了表单的可用性，因为用户更难通过表单创建无效的标题。`maxlength` 属性执行客户端验证，并且只允许提交有效的标题。需要牢记的一点是，客户端验证非常适合增强可用性。它会在信息发送到服务器之前进行首次验证尝试。这提高了效率，因为信息在有效之前不会被发送到服务器。然而，它并不能提高安全性，因为恶意用户可以覆盖客户端验证。我们还需要在\
  \ PHP 内部对提交到服务器的信息进行验证，以确保我们收到了期望的信息。\n\n创建了新的编辑器视图后，我们必须更新控制器，以便它显示新的视图。现在，你可以通过将以下控制器放入浏览器来测试我们当前的进度。\n\
