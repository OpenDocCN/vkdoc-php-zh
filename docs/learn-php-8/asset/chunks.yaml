    的浏览器，此过程是必要的。提示：PHP 代码的工作方式与 JavaScript 代码非常相似。需要对 `dog_interface.php`、`dog.php`
    和 `dog_data.php` 程序进行哪些更改才能完成此任务？


    2.  从本书网站下载本节代码。调整代码以处理包含以下附加字段的狗的信息：`dog_ID`（每只狗唯一）和 `dog_gender`。假设 `dog_interface.php`、`dog.php`
    和 `dog_data.php` 文件将返回这些字段。在您阅读完这些程序的更改之前，您将无法完全测试此作业。


    # 在界面层中更新、删除和插入


    现在来看一下界面层和业务规则层程序的更改。数据层所需的更改非常少，因为之前已经创建了 `dog_data` 程序来处理狗信息的显示、更新、插入和删除。提前完成这项工作使得其他层所需的更改总量变得容易得多。


    正如本书中反复提到的，界面层负责格式化信息以供显示，以及从业务规则层请求或处理信息。`dog_interface` 程序应接受来自数据层的狗数组信息，并在需要时对其进行格式化，以供
    `lab.php` 程序使用。它还应接受用于狗列表框的狗信息，对其进行格式化，并将其发送到 `lab.php` 以进行显示。此外，`dog_interface`
    必须接受来自 `lab.php` 的插入、更新和删除狗信息的请求，并将这些请求传递到数据层进行处理。这听起来可能很多，但正如我们将看到的，这些程序中的大部分代码已经存在。


    首先，让我们看一下将 `insert` 或 `update` 请求传递到数据层的过程。


    ```

    string $dog_color = filter_var( $_POST[''dog_color''],

    FILTER_SANITIZE_STRING);

    string $dog_weight = filter_var( $_POST[''dog_weight''],

    FILTER_SANITIZE_STRING);

    string $dog_index = filter_var($_POST[''index''],

    FILTER_SANITIZE_STRING);

    ```


    `lab.php` 文件将向 `dog_interface` 发送一个属性（`''index''`）。此属性将以与传递的其他属性相同的方式被接收和清理。

