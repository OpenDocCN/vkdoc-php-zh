    \ of nothing to a class of an expected type. In this case, I will create a `NullUnit`\
    \ class.\n\n```\n// listing 11.58\nclass NullUnit extends Unit\n{\npublic function\
    \ bombardStrength(): int\n{\nreturn 0;\n}\npublic function getHealth(): int\n\
    {\nreturn 0;\n}\npublic function getDepth(): int {\nreturn 0;\n}\n}\n```\n\nThis\
    \ implementation of `Unit` respects the interface, but does precisely nothing.\
    \ Now, I can amend `UnitAcquisition` to create a `NullUnit` rather than use a\
    \ `null`:\n\n```\n// listing 11.59\npublic function getUnits(int $x, int $y):\
    \ array\n{\n$army = new Army();\n$army->addUnit(new Archer());\n$found = [\nnew\
    \ Cavalry(),\nnew NullUnit(),\nnew LaserCanonUnit(),\n$army\n];\nreturn $found;\n\
    }\n```\n\nThe client code in `TileForces` can call any methods it likes on a `NullUnit`\
    \ object without problem or error:\n\n```\n// listing 11.60\n// TileForces\npublic\
    \ function firepower(): int {\n$power = 0;\nforeach($this->units as $unit) {\n\
    $power += $unit->bombardStrength();\n}\nreturn $power;\n}\n```\n\nTake a look\
    \ at any substantial project and count up the number of inelegant checks that\
    \ have been forced on its coders by methods that return null values. How many\
    \ of those checks could be dispensed with if more of us used Null Object?\n\n\
    Of course, sometimes you will need to know that you are dealing with a null object.\
    \ The most obvious way of doing this would be to test an object with the `instanceof`\
    \ operator. That is even less elegant than the original `is_null()` call, however.\n\
