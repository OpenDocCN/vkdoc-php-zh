    C H A P T E R 2 ■ L AY I N G O U T T H E F O U N D AT I O N S


    **29**


    **Getting a Code Editor**


    Before writing the first line of code, you’ll need to install a code editor, if
    you don’t already have a favorite. Many free editors are available, and there
    is an ever longer list of commercial editors. It’s a matter of taste and money.
    You can find a list of PHP editors at http://www.php-editors.com. Here are a few
    of the more popular:


    • Zend Studio (http://www.zend.com/products/zend_studio) is perhaps the most powerful
    IDE (Integrated Development Environment) available for developing PHP web applications.


    • phpEclipse (http://www.phpeclipse.net) is an increasingly popular environment
    for developing PHP web applications. Zend is a member of the Eclipse foundation.


    • Emacs (http://www.gnu.org/software/emacs/) is, as defined on its web site, an
    “extensible, customizable, self-documenting real-time display editor.” Emacs is
    a very powerful, free, and cross-platform editor.


    • SciTe (http://scintilla.sourceforge.net/SciTEDownload.html) is a free and cross-platform
    editor.


    • PSPad (http://www.pspad.com/) is a freeware editor popular among Windows developers.
    The editor knows how to highlight the syntax for many existing file formats.


    Additional plugins can add integrated CSS editing functionality and spell checking.


    • PHP Designer 2006 (http://www.mpsoftware.dk) is a Windows editor that contains
    an integrated debugger.


    **Preparing the hatshop Virtual Folder**


    One of the advantages of working with open source, platform-independent technologies
    is that you can choose the operating system to use for development. You should
    be able to develop and run HatShop on Windows, Unix, Linux, Mac, and others. However,
    this also means that you may struggle a little bit to set up your initial environment,
    especially if you’re a beginner.


    When setting up the project’s virtual folder, a few details differ depending on
    the operating system (mostly because of the different file paths), so we’ll cover
    them separately for Windows and for Unix systems in the following pages. However,
    the main steps are the same: **1.** Create a folder in the file system named hatshop
    (we use lowercase for folder names), which will contain the HatShop project’s
    files (such as PHP code, image files, and so on).


    **2.** Edit Apache’s configuration file (httpd.conf) to create a virtual folder
    named hatshop that points to the hatshop physical folder created earlier. This
    way, when pointing a web browser to http://localhost/hatshop, the project in the
    hatshop physical folder will be loaded. This functionality is implemented in Apache
    using aliases, which are configured through the httpd.conf configuration file.
    The syntax of an alias entry is as follows:


    Alias virtual_folder_name real_folder_name


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH02.qxd 11/8/06 9:33 AM Page 30


    **30**


    C H A P T E R 2 ■ L AY I N G O U T T H E F O U N D AT I O N S


    ■**Tip** The httpd.conf configuration file is well documented, but you can also
    check the Apache 2 documentation available at http://httpd.apache.org/docs-2.0/.


    If you’re working on Windows, follow the steps in the following exercise. The
