    perform connection methods that ought to be managed by the `DataSource`)?


    • Does the task involve more than a basic save, read, update, or delete method
    (in other words, are multiple updates required when dealing with one record of
    data, and so on)?


    If you answer “yes” to all of these questions and you can’t find a built-in or
    third-party behavior that matches the task, then you ought to write a custom behavior.
    Unlike `DataSources`, behaviors don’t require a specific skeleton to work. They
    only need to be named conventionally, stored in the right directory, and called
    appropriately in the model. The model can use behavior functions in much the same
    way as the controller uses component functions. However, by writing certain callback
    functions in the behavior, you can run specific processes whenever the parent
    model does any of its own saves, updates, or deletions.


    ## Setting Up the Behavior File


    Like other resources in Cake (which you are probably used to creating by now),
    behaviors follow a specific convention. First, the file name follows the same
    naming convention as models: it has a lowercase name, with multiple words separated
    by underscores, and the `.php` extension. Second, the file must be stored in the
    `app/models/behaviors` directory.


    Lastly, the behavior must have the correct class name written; see Listing 14-17
    for an example of a basic behavior.


    **Listing 14-17.** *An Example of a Basic Behavior File*


    ```

    <?

    class UpdateBehavior extends ModelBehavior {


    function setup(&$model, $config=array()) {


    }


    }

    ?>

    ```


    Notice that the behavior class extends `ModelBehavior` and includes the `setup()`
    function. This function is called as a startup function when the behavior is instantiated.
    The parent model as an object is accessible in this function through the use of
    the `&$model` parameter, meaning that throughout `setup()`, everything in the
    parent model including its properties and functions can be called with `$model`.
    For example, `$model->data` in the `setup()` function would contain the current
    model’s `$this->data` array. Performing data methods such as saving to the database
    or running a query can be done in the behavior by using the standard model functions,
    like so:


    ```

    $rows = $model->find(''all'',array(''conditions''=>array(''id''=>$config[''id''])));

    ```


    ## Using DataSources in Behaviors with ConnectionManager


    If your custom behavior must use a `DataSource` other than one available in the
    `$model` class object, then you must use the `ConnectionManager` utility to create
    an object of the `DataSource`. Listing 14-18 demonstrates the easiest way to do
    this.


    **Listing 14-18.** *Using the ConnectionManager Utility to Instantiate a DataSource
    in a Behavior*


    ```

    $db =& ConnectionManager::getDataSource($model->useDbConfig);

    ```


    Notice that Listing 14-18 used the parent model object; this can be done only
    if the behavior function using `ConnectionManager` has the `&$model` setting as
    its first parameter.


    With Listing 14-18, `$db` becomes the `DataSource` object to be used in the behavior.
    Just as the model uses a `DataSource`, the behavior can now work directly with
    the `DataSource`. For example, the behavior can invoke the XML `DataSource` you
    built earlier in the chapter with the following:


    ```

    $xml =& ConnectionManager::getDataSource($model->useDbConfig[''xml'']);

    ```


    and then run a find-all operation with the `$xml->findAll()` function.


    ## Performing Callbacks in the Behavior


    The `Tree` behavior, as you probably noticed, performed some functions when the
    model saved tags. By simply providing the model with a `parent_id` value when
    saving a tag, the `Tree` behavior automatically assigned the record a parent value
    and ordered the tree. These kinds of automatic methods are performed when using
    certain callback functions in the behavior. In other words, for all saves that
    the parent model will perform, the behavior will execute the'
