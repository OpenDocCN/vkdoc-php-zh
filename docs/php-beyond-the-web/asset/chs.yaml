  \ `STDIN` 读取。\n2.  将文本（以及图形）输出到屏幕。您可以输出到 `STDOUT`（或使用 `echo`/`print`），通过转义字符控制外观和光标，并使用块状绘制字符制作“半图形”。\n\
  3.  程序流程控制。`while(1)` 循环可用于保持程序运行，使用 `break` 使流程跳出循环。使用 `usleep` 或 `sleep` 来防止进程独占处理器非常重要。\n\
  \n\n\n### 5.2 高级命令行输入\n\n在上一节中，我们使用 `fread()` 来读取键盘输入。这种方法适用于简单的程序，但如果你希望创建一个更复杂的界面来允许用户发出命令，那么你可能需要考虑\
  \ `readline` 扩展，它可用于实现一个类似 Shell 的可编辑命令行程序。\n\n下面的示例脚本展示了如何使用 `readline` 库实现一个简单的、定制的命令行类型界面。\n\
  \n```php\n<?\n\n# 创建数组来保存我们的命令历史记录和有效命令列表。\n\n$history = array();\n$validCommands\
  \ = array();\n\n# 定义一些有效命令。\n\n$validCommands[] = 'kill';\n$validCommands[] = 'destroy';\n\
  $validCommands[] = 'obliterate';\n$validCommands[] = 'history';\n$validCommands[]\
  \ = 'byebye';\n\n# 我们希望启用命令的 Tab 补全功能，允许用户开始输入一个命令，然后按 Tab 键完成它，\n# 就像在 Bash Shell\
  \ 中那样。我们需要提供一个函数（通过 readline_completion_function），\n# 该函数将提供一个可能的函数名称数组。这可以基于用户已输入的\
  \ $partial 字符、\n# 程序当前所处的阶段，或我们想要的任何其他因素。在我们的例子中，我们只需提供\n# 所有有效命令的数组。\n\nfunction\
  \ tab_complete ($partial) {\n\tglobal $validCommands;\n\treturn $validCommands;\n\
  };\n\nreadline_completion_function('tab_complete');\n\n# 我们现在进入主程序循环。注意我们没有包含 usleep，\n\
  # 因为 readline 在等待用户输入时会暂停程序执行。\n\nwhile (1) {\n\n\t# 我们调用 readline，并传入一个构成命令提示符的字符串。在我们的例子中，\n\
  \t# 我们将在其中放入日期和时间，以表明我们每次调用时都可以更改它。\n\t# 用户输入的任何内容都会被返回。这一行简单的代码实现了 readline 的大部分魔力。\n\
  \t# 在此阶段，用户可以享受 Tab 补全、历史记录（使用上/下光标键）等功能。\n\n\t$line = readline(date('H:i:s').\"\
  \ 输入命令 > \");\n\n\t# 我们需要手动将命令添加到历史记录中。这用于用户通过上/下光标键访问的命令历史。\n\t# 如果我们愿意，可以选择忽略某些命令（例如，输错的命令或中间输入）。\n\
  \n\treadline_add_history($line);\n\n\t# 如果我们想以编程方式检索历史记录，可以使用一个名为 readline_list_history()\n\
  \t# 的函数。但是，这仅在 PHP 使用 libreadline 编译时才可用。在大多数情况下，\n\t# 由于许可和其他原因，现代发行版会使用兼容的 libedit\
  \ 库来编译它。\n\t# 因此，我们将在数组中保留一份历史记录的并行副本，以便进行编程访问。\n\n\t$history[] = $line;\n\n\t#\
  \ 现在我们决定如何处理用户的输入。在实际应用中，我们可能希望先使用\n\t# trim()、strtolower() 或其他方式过滤输入。\n\n\tswitch\
  \ ($line) {\n\n\t    case \"kill\":\n\t        echo \"你不会想那么做的。\\n\";\n\t      \
  \  break;\n\n\t    case \"destroy\":\n\t        echo \"那真不是个好主意。\\n\";\n\t     \
  \   break;\n\n\t    case \"obliterate\":\n\t        echo \"好吧，如果我们真的必须这么做的话。\\n\"\
  ;\n\t        break;\n\n\t\tcase \"history\":\n\n\t\t\t# 我们将使用之前创建的命令历史并行副本来显示命令历史。\n\
  \n        \t$counter = 0;\n\n\t\t\tforeach($history as $command) {\n\t\t\t\t$counter++;\n\
  \t\t\t\techo(\"$counter: $command\\n\");\n\t\t\t};\n\n\t        break;\n\n\t   \
  \ case \"byebye\":\n\n\t    \t# 如果是时候退出了，我们希望同时跳出 switch 语句和 while 循环，\n\t    \t\
  # 因此我们使用 break 并指定层级为 2。\n\n    \t    break 2;\n\n\t    default :\n\n    \t\t# 始终记得在用户出错时给出反馈。\n\
  \n    \t\techo(\"抱歉，命令 \".$line.\" 无法识别。\\n\");\n\t}\n\n};\n\n# 如果我们到达这里，说明用户输入了\
  \ byebye。\n\necho(\"再见，欢迎下次再来！\\n\");\n```\n\n您可能已经注意到，我选择使用 `byebye` 作为退出程序的命令。这并非我一时兴起的随意选择，而是为了说明需要考虑**可发现性**。如果您面对这个程序，但没看到上面的源代码，并要求您关闭它，您很可能会先尝试\
  \ `quit`、`exit`、`end` 等命令，最后才求助于老办法 `Ctrl-C`。在 GUI 界面中，面对一个写着“再见！”的按钮，您就不会有这种问题。对于基于文本的输入，最好坚持使用常见且易于记忆的命令格式，在可能的情况下提供视觉提示和线索，并通过良好的文档、`help`\
  \ 命令和用户培训来辅助**可发现性**。\n\n| ![信息](img/image00248.jpeg) | **扩展阅读** PHP 手册中的 Readline\
  \ 扩展 [`www.php.net/manual/en/intro.readline.php`](http://www.php.net/manual/en/intro.readline.php)\
  \ |\n\n### 5.3 使用 STDIN、STDOUT 和 STDERR\n\n当您的脚本启动时，PHP CLI SAPI 会自动为您打开标准流，因此无需发出像\
  \ `fopen('php://stdin', 'r')` 这样的命令。您可以像处理任何其他 PHP 流一样处理这些流，并立即开始使用它们。我们在上面已经包含了一些示例，但这里再提供一些，以说明可用的选项。\n\
  \n```php\n<?\n\n# 从 STDIN 获取一行输入\n\necho ('请输入一些内容：>');\n\n$line1 = fgets(STDIN);\n\
  \necho ('**** 第 1 行 : '.$line1.\" ****\\n\\n\");\n\n# 获取一行输入，不包含换行符\n\necho ('请再输入一些其他内容：>');\n\
  \n$line2 = trim(fgets(STDIN));\n\necho ('**** 第 2 行 : '.$line2.\" ****\\n\\n\");\n\
  \n# 以 CSV 格式将一个数组写入 STDOUT。\n# 首先，创建一个数组的数组...\n\n$records[] = array('用户', '全名',\
  \ '性别');\n$records[] = array('Rob', '罗伯特·阿利', 'M');\n$records[] = array('Ada', '奥古斯塔·阿达·金，拉夫拉斯伯爵夫人',\
  \ 'F');\n$records[] = array('Grete', '格蕾特·赫尔曼', 'F');\n\necho (\"以下是以 CSV 格式呈现的数据：\\\
  n\\n\");\n\n# ...然后在写入时动态将每个数组转换为 CSV\n\nforeach ($records as $record) {\n\tfputcsv(STDOUT,\
  \ $record);\n};\n\necho (\"\\n\\nCSV 数据结束\\n\");\n\n# 暂停直到用户输入以数字开头的内容\n\necho ('请输入一个或多个数字：>');\n\
  \nwhile (! fscanf(STDIN, \"%d\\n\", $your_number) ) { \n\n\techo (\"未找到数字：>\");\
  \ \n\n};\n\necho (\"您的数字是 $your_number\\n\\n\");\n\n# 将网页的文本发送到 STDOUT\n\necho (\"\
  按回车键获取一些网络内容：\\n\\n\");\n\nfread(STDIN, 1); # fread 会阻塞，直到按下回车键\n\nfwrite(STDOUT,\
  \ strip_tags( file_get_contents('http://www.cam.ac.uk') ) );\n\n# 将错误消息发送到 STDERR。如果您愿意，可以直接\
  \ fwrite(STDERR,...\n# 或者使用 error_log 函数，该函数使用已定义的错误处理例程。\n# 对于 CLI SAPI，默认情况下，错误处理例程是将错误打印到\
  \ STDERR。\n\nerror_log('系统没啤酒了。中止。中止。',4);\n```\n\n最后一行的错误日志通常会与其它输出一起出现在您的 Shell\
  \ 中，因为大多数 Shell 默认将 `STDERR` 放在那里。如果您想确认它确实是通过 `STDERR` 而不是 `STDOUT` 输出的，下面的 bash\
  \ 命令会将所有 `STDERR` 输出（由 `2>` 表示）以红色高亮显示。它使用转义码来着色错误（31 设置颜色为红色，07 反色显示，然后 0 清除）：\n\
  \n```bash\nphp script.php 2> >(while read errors; do echo -e \"\\e[07;31m$errors\\\
  e[0m\" \n\t>&2;  done)\n```\n\n简而言之，我们可以以多种方式使用标准流，通常将它们视为标准的文件指针或流。\n\n\n\n###\
  \ 5.4 部分图形界面元素 - 对话框\n\n在本章后续内容中，我们将探讨生成完整图形界面的系统。但对于那些仅需偶尔与用户交互或通知用户的简单程序而言，存在一个中间阶段，例如弹出警告或图形化的输入请求。使用\
  \ PHP，有多种方法可以调用或创建可视化显示元素，如下所述。\n\n### 5.5 从 Shell 调用的对话框\n\n有多种 Shell 命令可以在屏幕上调用图形元素。你可以通过多种方式从\
  \ PHP 调用 Shell 命令，包括使用 `shell_exec` 或下文将使用的反引号。更多详细信息和可能性，请参阅第 7 章的“从 PHP 启动外部进程”部分。这些命令包括：\n\
  \n- **`notify-send`**\n\n在基于 Debian 的系统中，`notify-send` 会在用户屏幕上弹出一个通知“气泡”。其具体外观取决于发行版，但通常是系统标准的通知，类似于收到新邮件或发生系统事件时显示的通知。它使用\
  \ Gnome 项目的 `lib-notify`，可能需要安装（`sudo apt-get install libnotify-bin`）。在 PHP 中调用方式如下：\n\
  \n```\n<? \nshell_exec('notify-send -i error \"法兰错误\" '.\n\t'\"法兰垫圈发生错误。未找到法兰 2.0。\"\
  ');\n\n# 或者\n\n$command = 'notify-send -i info \"法兰完成\" '.\n\t'\"法兰已完成垫圈处理。请参阅手册了解去垫圈操作信息。\"\
  ';\n\n`$command`;\n```\n\n`-i` 标志允许你指定一个图标。你可以提供图像的完整路径，或者引用一个标准图标（通常位于诸如 `/usr/share/icons/gnome/32x32/`\
  \ 的位置），如上文所示。\n\n使用 `man notify-send` 查看可用于自定义通知的各种选项。\n\nUbuntu Unity 用户请注意：`-t`\
  \ 标志允许你指定通知消失的超时时间。然而，在 Ubuntu Unity 中此标志被忽略，通知的持续时间取决于其文本长度。在 Unity 中将 `-t=0` 设置会将该通知“气泡”变成一个需要用户显式关闭的警告框。\n\
  \n- **`zenity`**\n\n`zenity` 允许你显示许多常见的对话框，从日历到颜色选择器。它基于 GTK+，提供各种格式和内容选项，并将任何输入返回以供使用。`Zenity`\
  \ 安装在大多数基于 Gnome 的系统上。\n\n```\n<?\n# 使用反引号执行 zenity。Zenity 将用户输入作为文本返回，\n# 我们将其收集到一个字符串变量中。让我们用它弹出一个\n\
  # 日历，然后告诉用户这是星期几。\n\n$day = `zenity --calendar --text=\"选择一天\" --date-format=\"\
  %d %b %Y\"`;\n\nif ($day) { \n\techo('选择的日期是 '.date('l', strtotime($day)).\"。\\\
  n\"); \n};\n\n# 现在我们将显示一个文件选择器，然后显示一个“信息”对话框，告诉\n# 用户所选文件的大小。\n\n$filename = trim(`zenity\
  \ --file-selection`);\n\nif (file_exists($filename)) { \n\n\t$command = 'zenity\
  \ --info --text \"所选文件的大小为 '.\n\t\tfilesize($filename).' 字节。\"';\n\n\t`$command`;\
  \ \n\n};\n```\n\n可用的全系列对话框包括颜色选择器、各种通知对话框、文本输入框、进度条等。\n\n| ![信息](img/image00248.jpeg)\
