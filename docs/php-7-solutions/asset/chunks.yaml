- fmt: "# Updating Records in a Cross-Reference Table\n\nEach record in a cross-reference\
    \ table contains only a composite primary key. Normally, primary keys should never\
    \ be altered. Moreover, they must be unique. This poses a problem for updating\
    \ the `article2cat` table. If you make no changes to the selected categories when\
    \ updating a blog entry, the cross-reference table doesn’t need to be updated.\
    \ However, if the categories are changed, you need to work out which cross-references\
    \ to delete and which new ones to insert.\n\nRather than getting tied up in knots\
    \ working out whether any changes have been made, a simple solution is to delete\
    \ all existing cross-references and insert the selected categories again. If no\
    \ changes have been made, you simply insert the same ones again.\n\n## PHP Solution\
    \ 18-5: Adding Categories to the Update Form\n\nThis PHP solution amends `blog_update_mysqli.php`\
    \ from PHP Solution 17-2 in the previous chapter to allow you to update the categories\
    \ associated with a blog entry. To keep the structure simple, the only change\
    \ that can be made to the image associated with the entry is to select a different\
    \ existing image or no image at all.\n\n1. Continue working with `blog_update_mysqli.php`\
    \ from PHP Solution 17-2. Alternatively, copy `blog_update_mysqli_04.php` from\
    \ the `ch18` folder and save it in the `admin` folder as `blog_update_mysqli.php`.\n\
    \n2. When the page first loads, you need to run a second query to get the categories\
    \ associated with the blog entry. Add the following highlighted code to the conditional\
    \ statement that gets details of the selected record:\n\n```\n$stmt->free_result();\n\
    // get categories associated with the article\n$sql = 'SELECT cat_id FROM article2cat\n\
    WHERE article_id = ?';\nif ($stmt->prepare($sql)) {\n    $stmt->bind_param('i',\
    \ $_GET['article_id']);\n    $OK = $stmt->execute();\n    $stmt->bind_result($cat_id);\n\
    \    // loop through the results to store them in an array\n    $selected_categories\
    \ = [];\n    while ($stmt->fetch()) {\n        $selected_categories[] = $cat_id;\n\
    \    }\n}\n```\n\nThe query selects `cat_id` from all records in the cross-reference\
    \ table that match the primary key of the selected blog entry. The results are\
    \ bound to `$cat_id`, and a `while` loop extracts the values into an array called\
    \ `$selected_categories`.\n\n3. In the body of the HTML page, add a multiple-choice\
    \ `<select>` list between the text area and the `<select>` drop-down menu that\
    \ displays the list of images. Use another SQL query to populate it, like this:\n\
    \n```\n<label for=\"category\">Categories:</label>\n<select name=\"category[]\"\
    \ size=\"5\" multiple id=\"category\">\n<?php\n$getCats = 'SELECT cat_id, category\
    \ FROM category ORDER BY category';\n$categories = $conn->query($getCats);\nwhile\
    \ ($row = $categories->fetch_assoc()) {\n    ?>\n    <option value=\"<?php echo\
    \ $row['cat_id']; ?>\"\n    <?php\n    if (in_array($row['cat_id'], $selected_categories))\
    \ {\n        echo ' selected';\n    }\n    ?>><?php echo $row['category']; ?></option>\n\
    <?php } ?>\n</select>\n```\n\nThe `while` loop builds each `<option>` tag by inserting\
    \ `cat_id` in the `value` attribute and displaying the category between the opening\
    \ and closing tags. If `cat_id` is in the `$selected_categories` array, `selected`\
    \ is inserted in the `<option>` tag. This selects the categories already associated\
    \ with the blog entry.\n\n4. Save `blog_update_mysqli.php` and select one of the\
    \ `EDIT` links in `blog_list_mysqli.php` to make sure the multiple-choice list\
    \ is populated with the categories. If you inserted a new entry in PHP Solution\
    \ 18-4, the categories you associated with the item should be selected, as shown\
    \ in the following screenshot.\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Figa_HTML.jpg](images/332054_4_En_18_Chapter/332054_4_En_18_Figa_HTML.jpg)\n\
    \nYou can check your code, if necessary, against `blog_update_mysqli_05.php` in\
    \ the `ch18` folder. The PDO version is found in `blog_update_pdo_05.php`.\n\n\
    5. Next, you need to edit the section of code that updates the record when the\
    \ form is submitted. The new code begins by removing all entries in the cross-reference\
    \ table that match `article_id` and then inserts the values selected in the update\
    \ form. Inline comments indicate where existing code has been omitted to save\
    \ space.\n\n```\n// if form has been submitted, update record\nif (isset($_POST\
    \ ['update'])) {\n    // prepare update query\n    if (!empty($_POST['image_id']))\
    \ {\n        // existing code omitted\n    } else {\n        // existing code\
    \ omitted\n        $done = $stmt->execute();\n    }\n}\n// delete existing values\
    \ in the cross-reference table\n$sql = 'DELETE FROM article2cat WHERE article_id\
    \ = ?';\nif ($stmt->prepare($sql)) {\n    $stmt->bind_param('i', $_POST['article_id']);\n\
    \    $done = $stmt->execute();\n}\n// insert the new values in articles2cat\n\
    if (isset($_POST['category']) && is_numeric($_POST['article_id'])) {\n    $article_id\
    \ = (int) $_POST['article_id'];\n    foreach ($_POST['category'] as $cat_id) {\n\
    \        $values[] = \"($article_id, \" . (int) $cat_id . ')';\n    }\n    if\
    \ ($values) {\n        $sql = 'INSERT INTO article2cat (article_id, cat_id)\n\
    \                VALUES ' . implode(',', $values);\n        $done = $conn->query($sql);\n\
    \    }\n}\n```\n\nThe code that inserts the values selected in the update form\
    \ is identical to the code in step 4 of PHP Solution 18-4. The key point to note\
    \ is that it uses an `INSERT` query, not `UPDATE`. The original values have been\
    \ deleted, so you’re adding them anew.\n\n6. Save `blog_update_mysqli.php` and\
    \ test it by updating existing records in the `blog` table. You can check your\
    \ code, if necessary, against `blog_update_mysqli_06.php` in the `ch18` folder.\
    \ The PDO version is found in `blog_update_pdo_06.php`.\n\n## Treating Multiple\
    \ Queries as a Block in a Transaction\n\nThe preceding PHP Solution takes a lot\
    \ on trust. The update sequence involves three separate queries: updating the\
    \ `blog` table, deleting references in the `article2cat` table, and inserting\
    \ new ones. If any of them fails, `$done` will be set to `false`; but if a subsequent\
    \ one is successful, it will be reset to `true`. You could easily end up with\
    \ only a partial update, but be none the wiser unless it was the last part of\
    \ the series of queries that fails.\n\nOne solution might be to run a series of\
    \ conditional statements preventing any further execution if the preceding query\
    \ fails. The problem is that you still end up with a partial update. When updating\
    \ connected records in multiple tables, the whole sequence needs to be treated\
    \ as a block. If one part fails, the whole sequence fails. The update sequence\
    \ is processed only if all parts of it succeed. Treating multiple queries as a\
    \ unified block is known in SQL as a transaction.\n\nImplementing a transaction\
    \ is simple in both MySQLi and PDO.\n\n> **Note**  \n> To use transactions in\
    \ MySQL and MariaDB, you must use the InnoDB storage engine.\n\n### Using a Transaction\
    \ in MySQLi\n\nBy default, MySQL and MariaDB work in autocommit mode. In other\
    \ words, SQL queries are executed immediately. To use a transaction, you need\
    \ to turn off autocommit mode and then invoke the `begin_transaction()` method\
    \ on the database connection object like this (assuming `$conn` is the database\
    \ connection):\n\n```\n$conn->autocommit(false);\n$conn->begin_transaction();\n\
    ```\n\nYou then run the sequence of SQL queries as normal, setting a variable\
    \ to `true` or `false` depending on whether the query was executed successfully.\
    \ If any errors are detected, you can roll back all tables to their original state\
    \ at the end of the sequence. Otherwise, you commit the transaction processing\
    \ the sequence as a single block like this:\n\n```\nif ($trans_error) {\n    $conn->rollback();\n\
    } else {\n    $conn->commit();\n}\n```\n\n### Using a Transaction in PDO\n\nPDO\
    \ also works in autocommit mode. Invoking the `beginTransaction()` method on the\
    \ database connection object turns off autocommit mode. Instead of using a variable\
    \ to track the success of individual queries, it’s easier to get PDO to throw\
    \ an exception as soon as it encounters a problem. You can then use a `catch`\
    \ block to roll back the tables to their original state. The basic structure looks\
    \ like this:"
