  trans: "\n### HTTPS\n\n![](img/609480_1_En_6_Fig2_HTML.jpg)\n\n**图 6-2** HTTPS 连接工作流程生命周期\n\
    \n建立 HTTPS（超文本传输安全协议）连接相较于 HTTP 涉及额外的安全措施。在 PHP 应用的语境中，该过程通过加密技术保护客户端与服务器之间的通信安全。以下概述在\
    \ PHP 应用中建立 HTTPS 连接的流程，并重点说明其与 HTTP 的区别：\n\n1. **客户端请求**：当用户通过 HTTPS 访问 PHP 应用时，客户端（网页浏览器）会使用\
    \ HTTPS 协议向服务器发送请求，以此发起安全连接。\n\n2. **服务器证书**：托管 PHP 应用的服务器需要具备一份 SSL/TLS 证书。这份数字文档用于向客户端验证服务器的真实性，并促进双方数据的加密。该证书通常从受信任的证书颁发机构（CA）获取。\n\
    \n3. **SSL/TLS 握手**：SSL/TLS 握手是在 HTTPS 连接建立之初发生的一个过程。在握手期间：\n   * 服务器将其 SSL/TLS\
    \ 证书发送给客户端。\n   * 客户端使用 CA 的公钥验证证书的真实性。\n   * 客户端与服务器协商加密算法，并生成共享会话密钥。\n\n4. **数据加密**：SSL/TLS\
    \ 握手完成后，客户端和服务器之间实际传输的数据会被加密。这确保了即使数据在传输过程中被截获，没有相应的解密密钥，数据也仍然不可读。\n\n5. **安全数据传输**：PHP\
    \ 应用处理客户端请求并生成响应。该响应通过加密的 HTTPS 连接回传至客户端，从而保障了数据传输过程中的机密性与完整性。\n\n现在，我们来回顾 HTTP\
    \ 与 HTTPS 之间的关键区别。最显著的区别在于加密方式：HTTP 中客户端与服务器之间交换的数据以明文形式传输，这意味着一旦被截获就极易被读取。相比之下，HTTPS\
    \ 对数据进行加密，提供了一层安全防护，可保护登录凭证或个人详细信息等敏感信息免遭截获和滥用。\n\n此外，HTTP 和 HTTPS 使用不同的 URL 方案和端口号。HTTP\
    \ 连接的 URL 以 `http://` 开头，而 HTTPS 连接的 URL 以 `https://` 开头，表明该连接已使用 SSL/TLS 加密确保安全。HTTP\
    \ 通常使用端口 `80` 进行通信，而 HTTPS 则使用端口 `443` 进行安全通信。理解这些差异对于确保 Web 应用及其所处理数据的安全性至关重要。\n\
    \nHTTPS 通过对客户端和服务器之间交换的数据进行加密，增加了一层安全保障。这种加密对于保护敏感信息、确保通信的隐私性和完整性至关重要。SSL/TLS\
    \ 证书的使用、SSL/TLS 握手过程以及加密数据传输，是在 PHP 应用中建立安全 HTTPS 连接的关键组成部分。\n\nSSL（安全套接层）和 TLS（传输层安全协议）是旨在保护计算机网络（尤其是互联网）上通信安全的加密协议。它们通常用于在网页浏览器和网页服务器之间建立安全连接，确保两者之间交换的数据经过加密，并免受窃听、篡改或伪造。\n\
    \n### SSL（安全套接层）与 TLS（传输层安全协议）\n\n#### SSL（安全套接层）\n\nSSL 由网景公司于 20 世纪 90 年代中期开发，旨在为初兴的万维网提供安全通信。尽管前景光明，但因安全漏洞，SSL\
    \ 经历了多次迭代。由于这些缺陷，SSL 1.0 从未公开发布。SSL 2.0 作为首个公开发布的版本，也存在重大安全问题。1996 年发布的 SSL 3.0\
    \ 解决了许多此类漏洞，并得到了广泛采用。\n\nSSL 提供了多项革新 Web 安全的关键特性。它提供加密功能以保护数据传输过程中的机密性，确保被截获的数据不易被读取。SSL\
    \ 还支持服务器身份验证，有助于向客户端验证服务器的身份，从而防止中间人攻击。此外，SSL 能确保数据的完整性，防止数据在传输过程中被篡改。尽管 SSL 曾被广泛使用，但它在很大程度上已被更安全的继任者\
    \ TLS 所取代。\n\n#### TLS（传输层安全协议）\n\nTLS 是作为 SSL 的改进版和更安全的继任者被引入的，它建立在 SSL 奠定的基础之上。首个版本\
    \ TLS 1.0 于 1999 年发布，与 SSL 3.0 相似但包含多项增强功能。后续版本 TLS 1.1（2006 年）和 TLS 1.2（2008\
    \ 年）引入了更多的安全特性和改进。最新版本 TLS 1.3 于 2018 年发布，提供了更高的安全性和性能。\n\nTLS 融合了多项增强安全性的先进特性。TLS\
    \ 1.2 和 1.3 支持前向保密，确保即使服务器的私钥遭到泄露，过去的通信内容仍然安全。TLS 还解决了早期 SSL 版本中存在的已知漏洞，降低了安全漏洞的风险。此外，TLS\
    \ 1.3 引入了更高效、更安全的握手过程，同时提升了安全性和性能。理解 SSL 和 TLS 的演进历程及其特性，对于确保当今 Web 应用中的安全通信至关重要。\n"
- fmt: '# SSL/TLS Handshake Process


    ![Figure 6-3](images/609480_1_En_6_Chapter/609480_1_En_6_Fig3_HTML.jpg)


    *Figure 6-3 SSL/TLS handshake process workflow*


    The SSL/TLS handshake process is a critical sequence that establishes a secure
    connection between a client and a server, ensuring both parties can communicate
    securely by agreeing on encryption methods and exchanging cryptographic keys.
    The process begins with the client initiating the handshake by sending a `ClientHello`
    message to the server. This message contains information about the cryptographic
    algorithms and other parameters that the client supports.


    In response, the server sends back a `ServerHello` message, selecting the most
    secure parameters from the client''s list. The server also provides its SSL/TLS
    certificate, which includes the server''s public key and serves as a means of
    authentication. Following this, the client and server negotiate the key exchange
    method. This step is essential for establishing shared secret keys that will be
    used to encrypt the data transmitted between them, with various methods like Diffie-Hellman
    or RSA being commonly used.


    Once the key exchange is successfully negotiated, both parties exchange `Finished`
    messages. These messages confirm that the handshake process is complete and that
    both the client and server have verified each other''s cryptographic parameters.
    The `Finished` messages are encrypted, adding an additional layer of security
    to the handshake process.


    With the handshake completed, the client and server can now securely exchange
    encrypted data. The shared secret keys established during the handshake are used
    to encrypt and decrypt the information, ensuring the confidentiality and integrity
    of the data during transmission. Understanding the SSL/TLS handshake process is
    crucial for implementing secure communications in web applications, as it ensures
    that the data exchanged remains private and protected from tampering.


    In modern web applications, TLS is the standard protocol for securing communications.
    The terms `SSL` and `TLS` are often used interchangeably, but it''s important
    to note that SSL is considered deprecated, and the use of TLS is recommended for
    better security.


    SSL (Secure Sockets Layer) and its successor TLS (Transport Layer Security) are
    cryptographic protocols designed to provide secure communication over a computer
    network, especially the Internet. In a security context, these protocols play
    a crucial role in ensuring the confidentiality, integrity, and authenticity of
    data exchanged between clients (such as web browsers) and servers. When used in
    the context of web browsing, HTTPS (Hypertext Transfer Protocol Secure) is the
    application of these protocols, indicating a secure communication channel.


    In the realm of Internet security, SSL/TLS and HTTPS play critical roles in safeguarding
    communication and data exchange. One of the primary functions of SSL/TLS protocols
    is the encryption of data. These protocols ensure that the information exchanged
    between a client and server is encrypted, rendering it unreadable to anyone who
    might intercept the communication. This encryption is vital for maintaining the
    confidentiality of sensitive information such as login credentials, personal details,
    and financial transactions.


    Data integrity is another crucial role fulfilled by SSL/TLS. Through cryptographic
    mechanisms, these protocols ensure that the data received by the recipient is
    identical to the data sent by the sender, preventing tampering or unauthorized
    modifications during transmission. This guarantees the accuracy and reliability
    of the data exchanged.


    Authentication is a key feature supported by SSL/TLS, where the server''s identity
    is verified to the client. This process helps users trust that they are connecting
    to the legitimate and intended website, thereby reducing the risk of man-in-the-middle
    attacks. Secure key exchange is also facilitated during the SSL/TLS handshake
    process. This ensures that even if communication is intercepted, the data cannot
    be deciphered without the proper encryption keys.


    SSL/TLS also provide robust protection against eavesdropping. The encryption offered
    by these protocols prevents unauthorized parties from listening in on the communication
    between the client and server. Without the appropriate encryption keys, any intercepted
    data remains secure and unreadable.


    The implementation of HTTPS, the secure version of the HTTP protocol, applies
    SSL/TLS to secure communications between a client''s web browser and a web server.
    HTTPS is particularly important for websites handling sensitive information, such
    as login credentials, payment details, and personal data. The presence of HTTPS
    and the padlock icon in a browser''s address bar signals to users that their connection
    is secure, building trust and confidence that their data is being transmitted
    securely.


    Also, SSL/TLS help prevent man-in-the-middle attacks through their handshake process
    and the use of certificates. By authenticating each other, the client and server
    ensure that they are communicating directly, without intermediaries tampering
    with the data. This comprehensive security framework provided by SSL/TLS and HTTPS
    is essential for protecting users and their data in an increasingly digital world.


    SSL/TLS and HTTPS are fundamental in creating a secure communication channel on
    the Internet. They provide a robust framework for encrypting data, ensuring its
    integrity, and authenticating the parties involved. The adoption of HTTPS is particularly
    critical for websites handling sensitive information, as it enhances the overall
    security posture and user trust.


    ## Usage of SSL/TLS/HTTPS in the Context of PHP Application


    To implement SSL/TLS and HTTPS in a Laravel application, we''ll focus on configuring
    the web server (such as Apache or Nginx) to manage secure connections. Laravel
    itself offers features to handle secure communication but relies on the web server
    for SSL/TLS configuration. Let''s walk through the steps and code samples to set
    up SSL/TLS and HTTPS in our Laravel application.'
