  trans: "\n### 4. 点击其中一个链接。根据浏览器的设置，文件会下载到默认的下载文件夹，或者会弹出一个对话框询问您如何处理该文件。\n\n我以图片文件为例演示了\
    \ `download.php`，但它可以用于任何类型的文件，因为标头会将文件作为二进制流发送。\n\n> **注意**  \n> 此脚本依赖 `header()`\
    \ 向浏览器发送适当的 HTTP 标头。**务必确保**在 PHP 开始标签之前没有任何换行或空白。如果已删除所有空白但仍收到“标头已发送”的错误消息，您的编辑器可能在文件开头插入了不可见的控制字符。某些编辑程序会插入字节顺序标记（BOM），已知这会导致\
    \ `header()` 函数出现问题。请检查您的程序偏好设置，确保已取消选中插入 BOM 的选项。\n\n### 章节回顾\n\n文件系统函数并不难使用，但有许多细微之处可能将一个看似简单的任务变成复杂的问题。检查您是否拥有正确的权限非常重要。即使是在自己的网站中处理文件，PHP\
    \ 也需要对您要读取或写入文件的任何文件夹具有访问权限。\n\nSPL 的 `FilesystemIterator` 和 `RecursiveDirectoryIterator`\
    \ 类使检查文件夹内容变得非常容易。与 `SplFileInfo` 方法和 `RegexIterator` 结合使用时，您可以快速找到文件夹或文件夹层次结构中特定类型的文件。\n\
    \n处理远程数据源时，需要检查 `allow_url_fopen` 是否未被禁用。远程数据源最常见的用途之一是从 RSS 新闻源或 XML 文档中提取信息，得益于\
    \ SimpleXML，这项任务只需几行代码即可完成。\n\n在本书的后续章节中，我们将把本章中的一些 PHP 解决方案应用于实际操作，例如处理图像和构建简单的用户身份验证系统。\n\
    \n## 8. 处理数组\n\n数组是 PHP 中最通用的数据类型之一。其重要性体现在有超过 80 个核心函数专门用于处理存储在数组中的数据。这些函数大致可分为：修改、排序、比较和提取数组信息。本章不试图涵盖所有函数，而是聚焦于一些更有趣、更实用的数组操作应用。\n\
    \n本章涵盖以下内容：\n\n- 理解修改数组内容的多种方法\n- 合并数组\n- 将数组转换为语法字符串\n- 查找数组的所有排列组合\n- 排序数组\n\
    - 从多维数组自动生成嵌套的 HTML 列表\n- 从 JSON 提取数据\n- 将数组元素赋值给变量\n- 使用展开运算符解包数组\n\n### 修改数组元素\n\
    \n刚接触 PHP 的新手在尝试修改数组中的每个元素时，常常会感到困惑。例如，假设您想对数字数组中的每个元素执行计算。简单的方法看起来是使用循环，在循环内执行计算，并将结果重新赋值给当前元素，如下所示：\n\
    \n```php\n$numbers = [2, 4, 7];\nforeach ($numbers as $number) {\n    $number\
    \ *= 2;\n}\n```\n\n这看起来应该能行，但实际上不能。`$numbers` 数组中的值保持不变。这是因为 PHP 在循环内部操作的是数组的一个*副本*。循环结束时副本被丢弃，计算结果也随之消失。要修改原始数组，需要将每个元素的值通过引用传递到循环中。\n\
    \n#### PHP 解决方案 8-1：使用循环修改数组元素\n\n此 PHP 解决方案展示了如何使用 `foreach` 循环修改数组中的每个元素。该技术对于索引数组和关联数组均适用。\n"
- fmt: "1.  打开`ch08`文件夹中的`modify_01.php`，其中包含上一节的代码，并在`<pre>`标签对之间添加`print_r($numbers);`。\n\
    \n2.  在浏览器中加载该页面，验证`$numbers`数组中的值是否未改变，如下截图所示：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figa_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figa_HTML.jpg)\n\
    \n3.  通过在循环声明中的临时变量前添加`&`符号，将数组的每个元素按引用传递给循环：\n\n```\nforeach ($numbers as &$number)\
    \ {\n```\n\n4.  循环结束时，临时变量仍然会包含最后一个数组元素的更新值。为避免后续意外修改该值，建议循环后使用`unset()`销毁临时变量：\n\
    \n```\nforeach ($numbers as &$number) {\n    $number *= 2;\n}\nunset($number);\n\
    ```\n\n5.  保存文件并在浏览器中加载以测试修改后的代码（位于`modify_02.php`）。数组中的每个数字都应加倍，如下截图所示：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figb_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figb_HTML.jpg)\n\
    \n6.  要修改关联数组的值，需要为键和值都声明临时变量；但只有值应按引用传递。以下代码位于`modify_03.php`：\n\n```\n$book\
    \ = [\n    'author' => 'David Powers',\n    'title' => 'PHP 7 Solutions'\n];\n\
    foreach ($book as $key => &$value) {\n    $book[$key] = strtoupper($value);\n\
    }\nunset($value);\n```\n\n输出结果如下：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figc_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figc_HTML.jpg)\n\
    \n7.  但假设你想修改数组的键。逻辑上的做法是在键前面加上`&`符号以按引用传递：\n\n```\nforeach ($book as &$key =>\
    \ $value) {\n```\n\n然而，如果尝试这样做，会触发致命错误。数组键不能按引用传递，只有数组值可以。\n\n8.  要修改关联数组的每个键，只需像在循环外一样在循环内直接修改即可。以下代码位于`modify_04.php`：\n\
    \n```\nforeach ($book as $key => $value) {\n    $book[ucfirst($key)] = $value;\n\
    }\n```\n\n输出结果如下：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figd_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figd_HTML.jpg)\n\
    \n9.  如上截图所示，原始键与修改后的键会同时保留。如果只想保留修改后的键，需要在循环内使用`unset()`销毁原始键（代码位于`modify_05.php`）：\n\
    \n```\nforeach ($book as $key => $value) {\n    $book[ucfirst($key)] = $value;\n\
    \    unset($book[$key]);\n}\n```\n\n这样只保留每个键的修改版本。\n\n> **提示**  \n> 如果想将数组键转换为大写或小写，简单的方法是使用`array_change_key_case()`函数，如下一个\
    \ PHP 解决方案所述。\n\n## PHP 解决方案 8-2：使用`array_walk()`修改数组元素\n\n修改数组元素的另一种方法是使用`array_walk()`函数，该函数将回调函数应用于数组的每个元素。回调可以是匿名函数，也可以是已定义函数的名称。默认情况下，`array_walk()`向回调传递两个参数：元素的值和键——**按此顺序**。还可以使用可选的第三个参数。本\
    \ PHP 解决方案将探讨`array_walk()`的各种使用方法。\n\n1.  位于`ch08`文件夹中的`array_walk_01.php`的主要代码如下：\n\
    \n```\n$numbers = [2, 4, 7];\narray_walk($numbers, function (&$val) {\n    return\
    \ $val *= 2;\n});\n```\n\n`array_walk()`的第一个参数是要应用回调函数的数组。第二个参数是回调，此处为匿名函数。与`foreach`循环一样，值需要按引用传递，因此回调函数的第一个参数前需加上`&`符号。\n\
    \n此示例修改索引数组，因此无需将数组键作为第二个参数传递给回调函数。\n\n像这样使用`array_walk()`会产生与前一个 PHP 解决方案中`modify_02.php`相同的结果：`$numbers`数组中的每个值都会加倍。\n\
    \n2.  当对关联数组使用`array_walk()`时，如果只想修改值，则无需将数组键作为参数传递给回调函数。`array_walk_02.php`中的代码使用匿名函数将每个数组元素的值转换为大写字符串：\n\
    \n```\n$book = [\n    'author' => 'David Powers',\n    'title' => 'PHP 7 Solutions'\n\
    ];\narray_walk($book, function (&$val) {\n    return $val = strtoupper($val);\n\
    });\n```\n\n这会产生与前一个 PHP 解决方案中`modify_03.php`相同的输出。\n\n3.  也可以将已定义函数的名称作为字符串传递给`array_walk()`（代码位于`array_walk_03.php`）：\n\
    \n```\narray_walk($book, 'output');\nfunction output (&$val) {\n    return $val\
    \ = strtoupper($val);\n}\n```\n\n这会产生与上例相同的输出。如果函数定义位于同一文件中，那么它在调用`array_walk()`之前或之后定义都没有关系。但如果定义在外部文件中，则必须在调用`array_walk()`之前包含该文件。\n\
    \n4.  传递给`array_walk()`的回调函数最多可以接受三个参数。第二个参数必须是数组键，最后一个参数可以是任何你想要使用的其他值。使用第三个参数时，它也会作为第三个参数传递给`array_walk()`。以下`array_walk_04.php`中的示例演示了其用法：\n\
    \n```\narray_walk($book, 'output', 'is');\nfunction output (&$val, $key, $verb)\
    \ {\n    return $val = \"The $key of this book $verb $val.\";\n}\n```\n\n输出结果如下：\n\
    \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fige_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fige_HTML.jpg)\n\
    \n5.  使用`array_walk()`无法修改数组键。如果只想将所有键改为大写或小写，请使用`array_change_key_case()`。默认情况下，它将键转换为小写。与`array_walk()`不同，它不会修改原始数组，而是返回一个包含修改后键的新数组，因此你需要将结果赋值给一个变量。在`array_change_key_case_01.php`中，数组键被赋予了首字母大写，以下代码将键转换为小写并将结果重新赋值给`$book`：\n\
    \n```\n$book = [\n    'Author' => 'David Powers',\n    'Title' => 'PHP 7 Solutions'\n\
    ];\n$book = array_change_key_case($book);\n```\n\n6.  要将键转换为大写，将 PHP 常量`CASE_UPPER`作为第二个参数传递给`array_change_key_case()`（代码位于`array_change_key_case_02.php`）：\n\
    \n```\n$book = array_change_key_case($book, CASE_UPPER);\n```"
  raw: "1.  Open `modify_01.php` in the\n    `ch08` folder. It\n    contains the code\
    \ in the previous section followed by `print_r($numbers);`\n    between a pair\
    \ of `<pre>` tags.\n\n2.  Load the page into a browser to verify that the values\
    \ in the\n    $numbers array are unchanged, as shown in the following screenshot:\n\
    \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figa_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figa_HTML.jpg)\n\
    \n3.  Pass the value of each array element to the loop by reference by\n    prefixing\
    \ the temporary variable in the loop declaration with an\n    ampersand like this:\n\
    \n```\n    foreach ($numbers as &$number) {\n    ```\n\n4.  When the loop ends,\
    \ the temporary variable will still contain the\n    recalculated value of the\
    \ final array element. To avoid accidentally\n    changing the value later, it’s\
    \ recommended to unset the temporary\n    variable after the loop like this:\n\
    \n```\n    foreach ($numbers as &$number) {\n    $number *= 2;\n    }\n    unset($number);\n\
    \    ```\n\n5.  Save the file and load it in a browser to test the amended code\
    \ (it’s\n    in `modify_02.php`). Each\n    number in the array should have been\
    \ doubled, as the following\n    screenshot shows:\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figb_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figb_HTML.jpg)\n\
    \n6.  To modify the values of an associative array, you need to declare temporary\
    \ variables for\n    both the key and the value; but only the value should be\
    \ passed by\n    reference. The following code is in `modify_03.php`:\n\n```\n\
    \    $book = [\n    'author' => 'David Powers',\n    'title' => 'PHP 7 Solutions'\n\
    \    ];\n    foreach ($book as $key => &$value) {\n    $book[$key] = strtoupper($value);\n\
    \    }\n    unset($value);\n    ```\n\nThis produces the following output:\n\n\
    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Figc_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figc_HTML.jpg)\n\
    \n7.  Let’s say, however, that you want to modify the array keys. The\n    logical\
    \ approach would be to precede the key with an ampersand to pass\n    it by reference\
    \ like this:\n\n```\n    foreach ($book as &$key => $value) {\n    ```\n\nHowever,\
    \ if you attempt to do this, it triggers a fatal error. Array\n    keys cannot\
    \ be passed by reference. Only array values can.\n\n8.  To modify each key of\
    \ an associative array, just modify it inside the\n    loop in exactly the same\
    \ way as outside a loop. The following code is in\n    `modify_04.php`:\n\n```\n\
    \    foreach ($book as $key => $value) {\n    $book[ucfirst($key)] = $value;\n\
    \    }\n    ```\n\nIt produces the following output:\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figd_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figd_HTML.jpg)\n\
    \n9.  As the preceding screenshot shows, the original keys are preserved\n   \
    \ alongside the modified ones. If you\n    want only the modified keys, you need\
    \ to unset the original ones inside\n    the loop like this (the code is in `modify_05.php`):\n\
    \n```\n    foreach ($book as $key => $value) {\n    $book[ucfirst($key)] = $value;\n\
    \    unset($book[$key]);\n    }\n    ```\n\nThis preserves only the modified version\
    \ of each key.\n\nTip\nIf you want to convert array keys to uppercase or lowercase,\
    \ the\nsimple way to do so is to use the `array_change_key_case()`\nfunction as\
    \ described in the following PHP solution.\n\nPHP Solution 8-2: Modify array elements\
    \ with\narray_walk()\n\nAn alternative to using a loop to modify array elements\
    \ is to use the\n`array_walk()`\nfunction , which\napplies a callback function\
    \ to each element of an array. The callback\ncan be either an anonymous function\
    \ or the name of a defined function.\nBy default, `array_walk()` passes\ntwo arguments\
    \ to the callback: the element’s value and key—*in that\norder*. An optional third\
    \ argument can also be used. This PHP\nsolution explores the various ways that\
    \ `array_walk()` can be\nused.\n\n1.  The main code in `array_walk_01.php` in\n\
    \    the `ch08` folder\n    looks like this:\n\n```\n    $numbers = [2, 4, 7];\n\
    \    array_walk($numbers, function (&$val) {\n    return $val *= 2;\n    });\n\
    \    ```\n\nThe first argument to `array_walk()` is the\n    array that the callback\
    \ function will be applied to. The second argument\n    is the callback, in this\
    \ case, an anonymous function. As with a `foreach` loop, the\n    value needs\
    \ to be passed by reference, so the first argument to the\n    callback function\
    \ is preceded by an ampersand.\n\nThis example modifies an indexed array, so there\
    \ is no need to pass\n    the array key as the second argument to the callback\
    \ function.\n\nApplying `array_walk()` like\n    this produces the same result\
    \ as `modify_02.php` in the\n    previous PHP solution: each value in the `$numbers`\
    \ array is\n    doubled.\n\n2.  When using array_walk() with an\n    associative\
    \ array, there’s no need to pass the array key as an argument\n    to the callback\
    \ function if you only want to modify the value. The code\n    in array_walk_02.php\
    \ uses an anonymous function to convert the value of\n    each array element to\
    \ an uppercase string like this:\n\n```\n    $book = [\n    'author' => 'David\
    \ Powers',\n    'title' => 'PHP 7 Solutions'\n    ];\n    array_walk($book, function\
    \ (&$val) {\n    return $val = strtoupper($val);\n    });\n    ```\n\nThis produces\
    \ the same output as modify_03.php in the preceding PHP\n    solution.\n\n3. \
    \ Instead of passing an anonymous function as the second argument to `array_walk()`,\
    \ you can\n    pass the name of a defined function as a string like this (the\
    \ code is\n    in `array_walk_03.php`):\n\n```\n    array_walk($book, 'output');\n\
    \    function output (&$val) {\n    return $val = strtoupper($val);\n    }\n \
    \   ```\n\nThis produces the same output as the preceding example. If the\n  \
    \  function definition is in the same file, it doesn’t matter whether it\n   \
    \ comes before or after the call to `array_walk()`.\n    However, if the definition\
    \ is in an external file, the file must be\n    included before invoking `array_walk()`.\n\
    \n4.  The callback function passed to  `array_walk()` \n    can take up to three\
    \ arguments. The second argument must be the array\n    key, whereas the final\
    \ argument can be any other value that you want to\n    use. When the third argument\
    \ is used, it is also passed as the third\n    argument to `array_walk()`. The\n\
    \    following example in `array_walk_04.php`\n    demonstrates its use:\n\n```\n\
    \    array_walk($book, 'output', 'is');\n    function output (&$val, $key, $verb)\
    \ {\n    return $val = \"The $key of this book $verb $val.\";\n    }\n    ```\n\
    \nThis produces the following output:\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fige_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fige_HTML.jpg)\n\
    \n5.  With `array_walk()`, you\n    can’t modify the array keys. If you simply\
    \ want to change all keys to\n    uppercase or lowercase, use `array_change_key_case()`.\n\
    \    By default, it converts keys to lowercase. Unlike `array_walk()`, it\n  \
    \  doesn’t modify the original array. It returns a new array with the\n    modified\
    \ keys, so you need to assign the result to a variable. In `array_change_key_case_01.php`,\n\
    \    the array keys have been given an initial cap. The following code\n    converts\
    \ the keys to lowercase and reassigns the result to `$book`:\n\n```\n    $book\
    \ = [\n    'Author' => 'David Powers',\n    'Title' => 'PHP 7 Solutions'\n   \
    \ ];\n    $book = array_change_key_case($book);\n    ```\n\n6.  To convert the\
    \ keys to uppercase, pass the PHP constant `CASE_UPPER` as the\n    second argument\
    \ to `array_change_key_case()`\n    like this (the code is in `array_change_key_case_02.php`):\n\
    \n```\n    $book = array_change_key_case($book, CASE_UPPER);\n    ```"
  trans: "\n1.  打开`ch08`文件夹中的`modify_01.php`，其中包含上一节的代码，并在`<pre>`标签对之间添加`print_r($numbers);`。\n\
    \n2.  在浏览器中加载该页面，验证`$numbers`数组中的值是否未改变，如下截图所示：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figa_HTML.jpg](img/332054_4_En_8_Figa_HTML.jpg)\n\
    \n3.  通过在循环声明中的临时变量前添加`&`符号，将数组的每个元素按引用传递给循环：\n\n```\nforeach ($numbers as &$number)\
    \ {\n```\n\n4.  循环结束时，临时变量仍然会包含最后一个数组元素的更新值。为避免后续意外修改该值，建议循环后使用`unset()`销毁临时变量：\n\
    \n```\nforeach ($numbers as &$number) {\n    $number *= 2;\n}\nunset($number);\n\
    ```\n\n5.  保存文件并在浏览器中加载以测试修改后的代码（位于`modify_02.php`）。数组中的每个数字都应加倍，如下截图所示：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figb_HTML.jpg](img/332054_4_En_8_Figb_HTML.jpg)\n\
    \n6.  要修改关联数组的值，需要为键和值都声明临时变量；但只有值应按引用传递。以下代码位于`modify_03.php`：\n\n```\n$book\
    \ = [\n    'author' => 'David Powers',\n    'title' => 'PHP 7 Solutions'\n];\n\
    foreach ($book as $key => &$value) {\n    $book[$key] = strtoupper($value);\n\
    }\nunset($value);\n```\n\n输出结果如下：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figc_HTML.jpg](img/332054_4_En_8_Figc_HTML.jpg)\n\
    \n7.  但假设你想修改数组的键。逻辑上的做法是在键前面加上`&`符号以按引用传递：\n\n```\nforeach ($book as &$key =>\
    \ $value) {\n```\n\n然而，如果尝试这样做，会触发致命错误。数组键不能按引用传递，只有数组值可以。\n\n8.  要修改关联数组的每个键，只需像在循环外一样在循环内直接修改即可。以下代码位于`modify_04.php`：\n\
    \n```\nforeach ($book as $key => $value) {\n    $book[ucfirst($key)] = $value;\n\
    }\n```\n\n输出结果如下：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figd_HTML.jpg](img/332054_4_En_8_Figd_HTML.jpg)\n\
    \n9.  如上截图所示，原始键与修改后的键会同时保留。如果只想保留修改后的键，需要在循环内使用`unset()`销毁原始键（代码位于`modify_05.php`）：\n\
    \n```\nforeach ($book as $key => $value) {\n    $book[ucfirst($key)] = $value;\n\
    \    unset($book[$key]);\n}\n```\n\n这样只保留每个键的修改版本。\n\n> **提示**  \n> 如果想将数组键转换为大写或小写，简单的方法是使用`array_change_key_case()`函数，如下一个\
    \ PHP 解决方案所述。\n\n## PHP 解决方案 8-2：使用`array_walk()`修改数组元素\n\n修改数组元素的另一种方法是使用`array_walk()`函数，该函数将回调函数应用于数组的每个元素。回调可以是匿名函数，也可以是已定义函数的名称。默认情况下，`array_walk()`向回调传递两个参数：元素的值和键——**按此顺序**。还可以使用可选的第三个参数。本\
    \ PHP 解决方案将探讨`array_walk()`的各种使用方法。\n\n1.  位于`ch08`文件夹中的`array_walk_01.php`的主要代码如下：\n\
    \n```\n$numbers = [2, 4, 7];\narray_walk($numbers, function (&$val) {\n    return\
    \ $val *= 2;\n});\n```\n\n`array_walk()`的第一个参数是要应用回调函数的数组。第二个参数是回调，此处为匿名函数。与`foreach`循环一样，值需要按引用传递，因此回调函数的第一个参数前需加上`&`符号。\n\
    \n此示例修改索引数组，因此无需将数组键作为第二个参数传递给回调函数。\n\n像这样使用`array_walk()`会产生与前一个 PHP 解决方案中`modify_02.php`相同的结果：`$numbers`数组中的每个值都会加倍。\n\
    \n2.  当对关联数组使用`array_walk()`时，如果只想修改值，则无需将数组键作为参数传递给回调函数。`array_walk_02.php`中的代码使用匿名函数将每个数组元素的值转换为大写字符串：\n\
    \n```\n$book = [\n    'author' => 'David Powers',\n    'title' => 'PHP 7 Solutions'\n\
    ];\narray_walk($book, function (&$val) {\n    return $val = strtoupper($val);\n\
    });\n```\n\n这会产生与前一个 PHP 解决方案中`modify_03.php`相同的输出。\n\n3.  也可以将已定义函数的名称作为字符串传递给`array_walk()`（代码位于`array_walk_03.php`）：\n\
    \n```\narray_walk($book, 'output');\nfunction output (&$val) {\n    return $val\
    \ = strtoupper($val);\n}\n```\n\n这会产生与上例相同的输出。如果函数定义位于同一文件中，那么它在调用`array_walk()`之前或之后定义都没有关系。但如果定义在外部文件中，则必须在调用`array_walk()`之前包含该文件。\n\
    \n4.  传递给`array_walk()`的回调函数最多可以接受三个参数。第二个参数必须是数组键，最后一个参数可以是任何你想要使用的其他值。使用第三个参数时，它也会作为第三个参数传递给`array_walk()`。以下`array_walk_04.php`中的示例演示了其用法：\n\
    \n```\narray_walk($book, 'output', 'is');\nfunction output (&$val, $key, $verb)\
    \ {\n    return $val = \"The $key of this book $verb $val.\";\n}\n```\n\n输出结果如下：\n\
    \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fige_HTML.jpg](img/332054_4_En_8_Fige_HTML.jpg)\n\
    \n5.  使用`array_walk()`无法修改数组键。如果只想将所有键改为大写或小写，请使用`array_change_key_case()`。默认情况下，它将键转换为小写。与`array_walk()`不同，它不会修改原始数组，而是返回一个包含修改后键的新数组，因此你需要将结果赋值给一个变量。在`array_change_key_case_01.php`中，数组键被赋予了首字母大写，以下代码将键转换为小写并将结果重新赋值给`$book`：\n\
    \n```\n$book = [\n    'Author' => 'David Powers',\n    'Title' => 'PHP 7 Solutions'\n\
    ];\n$book = array_change_key_case($book);\n```\n\n6.  要将键转换为大写，将 PHP 常量`CASE_UPPER`作为第二个参数传递给`array_change_key_case()`（代码位于`array_change_key_case_02.php`）：\n\
    \n```\n$book = array_change_key_case($book, CASE_UPPER);\n```\n"
- fmt: "# PHP Solution 8-3: Modify array elements with `array_map()`\n\nPassing array\
    \ values by reference to a `foreach` loop or `array_walk()` modifies the original\
    \ array. Often, this is what you want. However, if you want to preserve the original\
    \ array, consider using `array_map()`. This applies a callback function to each\
    \ array element and returns a new array with the modified elements. The first\
    \ argument to `array_map()` is the callback, either as an anonymous function or\
    \ the name of a defined function. The second argument is the array whose elements\
    \ you want to modify.\n\nIf the callback takes more than one argument, the values\
    \ for each one must be passed to `array_map()` as arrays in the same order as\
    \ required by the callback. Even if you want to use the same value each time for\
    \ a subsequent argument, it must be passed to `array_map()` as an array with the\
    \ same number of elements as the array being modified.\n\nWith an associative\
    \ array, `array_map()` preserves the keys only when the callback takes a single\
    \ argument. If multiple arguments are passed to the callback, `array_map()` returns\
    \ an indexed array.\n\n1. The code in `array_map_01.php` shows a simple example\
    \ of using `array_map()` to double numbers in an array using an anonymous callback\
    \ function. The code looks like this:\n\n```php\n$numbers = [2, 4, 7];\n$doubled\
    \ = array_map(function ($num) {\n    return $num * 2;\n}, $numbers);\necho '';\n\
    print_r($numbers);\nprint_r($doubled);\necho '';\n```\n\nAs the following screenshot\
    \ shows, the values in the original `$numbers` array are unchanged. The `$doubled`\
    \ array contains the results returned by the callback.\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figf_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figf_HTML.jpg)\n\
    \n2. The next example in `array_map_02.php` uses a defined function to modify\
    \ an associative array:\n\n```php\n$book = [\n    'author' => 'David Powers',\n\
    \    'title' => 'PHP 7 Solutions'\n];\n$modified = array_map('modify', $book);\n\
    function modify($val) {\n    return strtoupper($val);\n}\necho '';\nprint_r($book);\n\
    print_r($modified);\necho '';\n```\n\nAs the following screenshot shows, the array\
    \ keys are preserved in the modified array:\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figg_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figg_HTML.jpg)\n\
    \n3. The code in `array_map_03.php` has been modified to demonstrate how to pass\
    \ multiple arguments to the callback function:\n\n```php\n$descriptions = ['British',\
    \ 'the fourth edition'];\n$modified = array_map('modify', $book, $descriptions);\n\
    function modify($val, $description) {\n    return \"$val is $description.\";\n\
    }\n```\n\nA second parameter, `$description`, has been added to the `modify()`\
    \ function. The values to be passed as arguments to the callback are stored in\
    \ an array called `$descriptions`, which is passed as the third argument to `array_map()`.\
    \ This produces the following result:\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figh_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figh_HTML.jpg)\n\
    \nNotice that the array keys have not been preserved in the modified array. Passing\
    \ multiple arguments to the callback results in an indexed array.\n\n4. The third\
    \ and subsequent arguments passed to `array_map()` must contain the same number\
    \ of elements as the array being modified. The code in `array_map_04.php` shows\
    \ what happens if an argument contains too few elements. It looks like this:\n\
    \n```php\n$descriptions = ['British', 'the fourth edition'];\n$label = ['Description'];\n\
    $modified = array_map('modify', $book, $descriptions, $label);\nfunction modify($val,\
    \ $description, $label) {\n    return \"$label: $val is $description.\";\n}\n\
    ```\n\nThere’s only one element in the `$label` array; but as the following screenshot\
    \ shows, this doesn’t result in the same value being reused.\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figi_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figi_HTML.jpg)\n\
    \nWhen an array passed as an argument to `array_map()` has fewer elements than\
    \ the first array (the one being modified), the shorter array is filled with empty\
    \ elements. Consequently, the label is omitted from the second element in the\
    \ modified array; but PHP doesn’t trigger an error.\n\n# Merging Arrays\n\nPHP\
    \ offers several different ways of combining the elements of two or more arrays;\
    \ but they don’t always produce the same result. Understanding how each method\
    \ works will avoid mistakes and confusion.\n\n## Using the Array Union Operator\n\
    \nThe simplest way to merge arrays is with the array union operator, a plus sign\
    \ (`+`). However, the results aren’t what you might expect. The code in `merge_01.php`\
    \ in the `ch08` folder demonstrates what happens when you use the array union\
    \ operator on two indexed arrays:\n\n```php\n$first = ['PHP', 'JavaScript'];\n\
    $second = ['Java', 'R', 'Python'];\n$languages = $first + $second;\necho '';\n\
    print_r($languages);\necho '';\n```\n\nRunning this script produces the following\
    \ output:\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figj_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figj_HTML.jpg)\n\
    \nInstead of five elements, the resulting array contains just three. This is because\
    \ the array union operator doesn’t concatenate the second array onto the end of\
    \ the first one. With an indexed array, it ignores elements in the second array\
    \ that have the same index as elements in the first. In this example, Java and\
    \ R in the second array have the same indices (0 and 1) as PHP and JavaScript,\
    \ so they’re ignored. Only Python has an index (2) that doesn’t exist in the first\
    \ array, so it’s added to the merged array.\n\nThe array union operator treats\
    \ associative arrays similarly. The code in `merge_02.php` contains two associative\
    \ arrays like this:\n\n```php\n$first = ['PHP' => 'Rasmus Lerdorf', 'JavaScript'\
    \ => 'Brendan Eich'];\n$second = ['Java' => 'James Gosling', 'R' => 'Ross Ihaka',\
    \ 'Python' => 'Guido van Rossum'];\n$lead_developers = $first + $second;\n```\n\
    \nBoth arrays contain a unique set of keys, so the resulting array contains every\
    \ element with its associated key, as the following screenshot shows:\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figk_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figk_HTML.jpg)\n\
    \nHowever, when there’s a duplicate key, the array union operator ignores the\
    \ element in the second array, as demonstrated by the code in `merge_03.php`:\n\
    \n```php\n$first = ['PHP' => 'Rasmus Lerdorf', 'JavaScript' => 'Brendan Eich',\
    \ 'R' => 'Robert Gentleman'];\n$second = ['Java' => 'James Gosling', 'R' => 'Ross\
    \ Ihaka', 'Python' => 'Guido van Rossum'];\n$lead_developers = $first + $second;\n\
    ```\n\nAs the following screenshot shows, only Robert Gentleman is credited as\
    \ lead developer of R. Ross Ihaka in the second array is ignored because he shares\
    \ a duplicate key.\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figl_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figl_HTML.jpg)\n\
    \nIgnoring duplicate indices or keys isn’t always what you want, so PHP offers\
    \ a couple of functions designed to produce a fully merged array of all elements.\n\
    \n## Using `array_merge()` and `array_merge_recursive()`\n\nThe functions `array_merge()`\
    \ and `array_merge_recursive()` concatenate two or more arrays to create a new\
    \ array. The difference between them lies in the way they treat duplicate values\
    \ in associative arrays.\n\nWith indexed arrays, `array_merge()` automatically\
    \ renumbers each element’s index and includes every value, including duplicates.\
    \ This is demonstrated by the following code in `merge_04.php`:\n\n```php\n$first\
    \ = ['PHP', 'JavaScript', 'R'];\n$second = ['Java', 'R', 'Python', 'PHP'];\n$languages\
    \ = array_merge($first, $second);\n```"
