  \ `pad_string` 指定的字符模式进行填充。默认情况下，字符串将在右侧填充；然而，可选参数 `pad_type` 可以被赋值为 `STR_PAD_RIGHT`、`STR_PAD_LEFT`\
  \ 或 `STR_PAD_BOTH`，从而相应地填充字符串。以下示例展示了如何使用 `str_pad()` 填充字符串：\n\n```php\n<?php\n\
  echo str_pad(\"Salad\", 10).\" is good.\";\n?>\n```\n\n这将返回以下内容：\n\n```\nSalad \
  \    is good.\n```\n\n以下示例使用了 `str_pad()` 的可选参数：\n\n```php\n<?php\n$header = \"\
