- fmt: '# 3. Principles and Process


    Now that we have a solid understanding of the building blocks of a Shopify theme
    (Chapter [1](#A437216_1_En_1_Chapter.html)) and an understanding of how to put
    one together (Chapter [2](#A437216_1_En_2_Chapter.html)), it’s time to dive in
    and start coding, right? Almost!


    The final step before we get into some practical exercises is to take a step back
    and think about the theme development process from a high level. What are your
    goals, and how can you maximize the chances of delivering a theme that successfully
    reaches them? What can you do to ensure your deliverables are easy to maintain,
    now and in six months’ time?


    In this chapter, I’ll be discussing a few principles I like to keep in mind while
    working on Shopify themes, as well as looking at the sorts of processes that theme
    developers use to help deliver successful projects. To avoid too much fortune-cookie
    wisdom, I’ll ground my advice in some real-world examples.


    Along the way, you may feel that this chapter speaks only to freelancers and agencies
    building bespoke themes for clients. Don’t be put off if you feel that doesn’t
    apply to you—I believe the advice provided is equally applicable if you’re building
    a store on your own behalf, as part of an in-house team, or with plans to make
    a theme available for sale in the Shopify Theme Store. In these situations, just
    consider yourself, your company, or Shopify merchants at large to be “the client.”


    ## Principles of Design


    The hallmark of good design is that it solves problems.


    Because Shopify is an online Ecommerce platform, the problems we’re tackling as
    theme designers most often revolve around the customer. How do we convey the “feel”
    of a brand in the first second of a visit? How can we make certain products more
    discoverable? What can we do to smooth a customer’s journey through the checkout?
    What can we do to upsell customers and increase the average value of their cart?


    ### Understanding Design Goals


    In a sense, the overarching design goal is to help maximize the revenue a store
    generates. (If you feel this is a little too bluntly capitalist, consider that
    this overall goal does encompass things like brand design, creating unique and
    lovable web sites, and delivering fantastic customer experiences.)


    Keeping this in mind can be useful when engaging in discussions with a client
    (or yourself) about the goal of a feature or change. If the brief is “add a carousel
    to the home page” or “what if we change the color of this button,” bringing the
    conversation back to the potential impact on the bottom line can help prioritize
    meaningful work and discover simpler solutions to underlying problems.


    Designers in the audience will recognize the “five whys” technique in action here:
    given any proposed feature or change, asking “why?” five times helps uncover the
    root problem and relate it back to the primary goal.


    Asking “why” in this manner can also uncover broader underlying goals that even
    clients themselves aren’t consciously aware of, or at least haven’t explicitly
    stated. This happened recently during the discovery phase for a recent client
    of ours. A skin care company, they were planning on launching several new brands
    in the Australian and New Zealand markets, with a bespoke Shopify theme being
    designed for each brand.


    During our initial conversations and while reading through the background material,
    we noticed that much more emphasis was being placed on “product showcase” functionality
    (carousels, hero images, and long-form product detail pages) than what we would
    consider “traditional” Ecommerce features like product forms and checkout flows.
    Digging in to this, we discovered the client’s expectation that a large portion
    of their sales would be driven by offline arrangements with retailers.


    This helped us understand that one of the most important goals of the Shopify
    site wasn’t traditional Ecommerce at all, but for it to be able to function as
    a marketing vehicle for sales representatives pitching potential retail partners
    in the field. Knowing this, we could adjust our proposal to place more emphasis
    on this use case and align our solution to meet the client’s actual goals.


    ### Design for Humans


    Once we’ve established what the design goals of a Shopify site should be, our
    efforts turn to building a theme to reach them. Usually, this means that your
    theme should be designed to help human beings (customers) achieve their goal (find
    something they want on the site and buy it).


    Style and ornamentation should take a back seat to usability and accessibility.
    Adding a full-page parallax sliding carousel might look great in mockups, but
    its value should be balanced against increases in page load time, added navigation
    complexity for users, and a potential decrease in accessibility.


    User interfaces and messaging should strive for clarity and helpfulness, rather
    than being thrown in as an afterthought. If a product can’t be added to the cart
    because it’s out of stock, return a detailed message to that effect instead of
    a bland alert saying “error” or “no stock”. Think about ways to give users an
    actionable next step (“We have the blue variant in stock, would you like to purchase
    that instead?”) instead of leaving them frustrated in a dead end.


    The needs of the user (clear navigation and page structure and fast page loads
    and response times) should be prioritized over the wants of the merchant (on-page
    advertising, reams of third-party tracking codes, and intrusive upsells).


    Try to avoid excluding users - make your themes accessible and in compliance with
    standards like WAI-ARIA ( `https://www.w3.org/TR/wai-aria` ). Not only is this
    considerate and maximizes the number of people able to buy things from your store,
    but a failure to do so can in some cases have legal ramifications.¹


    There are a couple of nice things about championing the experience of the user
    like this when putting together a theme. First, it can help you focus your use
    cases and discussions around real people instead of platonic ideals. Second, caring
    deeply about your customers’ experiences pays dividends in other areas: fast,
    painless purchases encourage repeat business, motivate word-of-mouth referrals,
    and (as you’ll see in Chapter [9](#A437216_1_En_9_Chapter.html)) have a positive
    impact on search engine rankings.'
