- fmt: "在清单8-7中，你使用`$ajax->form()`函数创建了一个Ajax表单。使用Ajax提交表单的另一种方式是采用`$ajax->submit()`函数。此方法的工作方式与`form()`函数几乎完全相同，唯一的区别在于视图中由提交按钮（而非观察表单的change事件）触发Ajax过程。\n\
    \n清单8-7中有两行需要修改：表单标签本身以及提交按钮。\n\n清单8-10展示了如何将这些标签从清单8-7中的形式修改为使用`$ajax->submit()`函数。\n\
    \n**清单8-10.**  使用`$ajax->submit()`函数在后台提交表单\n\n```\n15 <?=$form->create('Comment',array('action'=>'add','onSubmit'=>'return\
    \ false;'));?>\n16 <?=$form->input('Comment.name');?>\n    <?=$form->input('Comment.content');?>\n\
    18 <?=$form->input('Comment.post_id',array('type'=>'hidden','value'=>$post['Post']['id']));?>\n\
    19 <?=$ajax->submit('Add Comment',array('url'=>'/comments/add','update'=>'comments'));?>\n\
    </form>\n```\n\n请注意，清单8-10的第15行已从`$ajax->form()`函数改为`$form->create()`函数。你在选项数组中添加了`onSubmit`键，并将值`return\
    \ false;`传递给该属性。这可以防止表单在发生表单事件时发送同步HTTP请求。\n\n除第19–20行外，其余内容与之前相同。`$ajax->submit()`函数与`$ajax->form()`函数类似，它也使用选项数组来传递一些重要参数。这些参数指定了表单的提交目标（`url`参数）以及接收Ajax响应的HTML元素（`update`参数）。第20行仅用于关闭表单标签。\n\
