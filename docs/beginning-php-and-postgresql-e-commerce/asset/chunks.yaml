    CREATE FUNCTION shopping_cart_get_total_amount(CHAR(32)) RETURNS NUMERIC(10, 2)
    LANGUAGE plpgsql AS $$


    DECLARE


    inCartId ALIAS FOR $1;


    outTotalAmount NUMERIC(10, 2);


    BEGIN


    SELECT INTO outTotalAmount


    SUM(COALESCE(NULLIF(p.discounted_price, 0), p.price)


    * sc.quantity)


    FROM shopping_cart sc


    INNER JOIN product p


    ON sc.product_id = p.product_id


    WHERE sc.cart_id = inCartId AND sc.buy_now;


    RETURN outTotalAmount;


    END;


    $$;


    The shopping_cart_get_total_amount function returns the total value of the products
    in the shopping cart. This is called when displaying the total amount for the
    shopping cart. If the cart is empty, total_amount will be 0.


