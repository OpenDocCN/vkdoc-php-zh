  trans: '

    # 5.1 一种简单的双层架构


    在本章中，我们将探讨一种简单的双层架构。这种架构由以下部分组成：


    - 一个数据库服务器

    - 一组 Web 服务器

    - 一个在 Web 服务器之间管理流量的负载均衡器


    ![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig1_HTML.jpg](img/487291_1_En_5_Fig1_HTML.jpg)


    图 5-1：简单双层架构示意图


    该架构的基本结构如图 5-1 所示。所有连接都汇聚至单个负载均衡器，其职责是将连接转发到若干 Web 服务器中的某一个。负载均衡器不仅负责转发连接，还会监控各个
    Web 服务器的健康状态，一旦某台 Web 服务器停止响应，便会停止向其转发连接。随后，每台 Web 服务器共享同一个数据库服务器。


    在开发云应用时，程序员不仅需要知道如何搭建集群，还需要懂得如何分析它。观察图 5-1 的示意图，你会看到所有 Web 服务器都依赖于单个数据库服务器。这使得数据库服务器成为集群的*限制因素*。几乎每个集群，无论设计得多好，都存在某些限制因素。目标是尽量减少这些因素对架构的影响。


    由于这种应用架构受限于单个数据库节点，因此它最适合中小型部署，其中大部分处理工作是在 Web 服务器上完成，而非数据库上。示例应用因其简单性，在 Web 服务器上进行的处理其实非常少。尽管如此，本章仍将展示如何搭建服务器，以便在这种配置下部署该应用。


    # 5.2 复制节点


    图 5-1 描述的基本双层应用表明，我们需要若干个服务器节点。我们可以通过启动带有空白 CentOS 系统的新机器，并逐一配置每台机器来实现这一点。然而，既然我们已经花费时间将当前服务器配置成我们想要的工作方式，就应该充分利用这个配置好的成果。


    Linode 提供了几种可完成此任务的服务，每种服务各有其优缺点。Linode 能够创建保存的镜像，这些镜像可直接用于创建新节点（你可以选择已保存的镜像，而不是选择操作系统）。Linode
    还提供克隆服务，允许你在源机器和目标机器都处于关机状态时克隆现有机器（这不是一条硬性规定，但如果你尝试克隆正在运行的机器，可能会遇到一致性问题）。最后，你还可以从机器的备份中创建克隆。


    我倾向于从备份中创建克隆，因为：(a) 你无论如何都应该定期备份服务器；(b) 你无需在创建新服务器期间关闭一台机器并使其闲置；(c) 这迫使你在学习克隆服务器的同时，熟悉备份系统（总有一天你需要从备份中恢复，所以在需要之前熟悉这个过程是件好事）。Linode
    镜像服务*可以*用于此目的，但它在实际生产环境中存在过多限制。为了防止用户将镜像服务当作备份服务来使用，他们限制了镜像的大小和数量，而我的大多数机器通常都超过了
    Linode 镜像所允许的最小尺寸。请注意，其他云服务（例如 DigitalOcean）也提供类似的服务，但附带不同的限制条件。


    如果我们想启动一台与现有服务器完全相同的新服务器，那么我们需要做的就是备份当前服务器。我们首先要做的是在我们的服务器节点上启用备份功能。为此，只需登录到 Linode，在列表中点击你的节点，然后从节点控制面板中点击“备份”标签页。页面上会显示一个“为此
    Linode 启用备份”按钮。这会增加少量的月度费用，但绝对是值得的。点击该按钮，你的机器将自动提供每周、每日以及临时的快照。此时屏幕应类似于图 5-2 所示。


    ![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig2_HTML.jpg](img/487291_1_En_5_Fig2_HTML.jpg)


    图 5-2：Linode 备份管理界面


    我们现在要做的是为我们的机器拍摄一个快照。为你的备份命名（我将其命名为 `snapshot-for-replication`），然后点击“拍摄快照”按钮。由于
    Linode 服务器都采用固态硬盘，快照速度非常快，通常只需 5–10 分钟。


    ## 其他备份设置


    ![../images/487291_1_En_5_Chapter/487291_1_En_5_Figa_HTML.jpg](img/487291_1_En_5_Figa_HTML.jpg)


    因为备份确实会在一定程度上拖慢磁盘速度，所以 Linode 允许你指定备份窗口。你可以选择希望执行备份的一天中的具体时间，以及将被视为“每周备份”的周几。备份时间点应选在系统使用量最低的时候，而备份日期应选在任何主要批处理之前。例如，如果你在星期五进行批处理，将备份日期设置为星期四可以确保在主要处理发生之前有一个“之前”状态的快照。如果你不进行大规模批处理，那么选择哪一天作为每周备份日就无关紧要了。


    备份开始后，我们可以进行下一步任务：创建一台新服务器。这台新服务器将成为我们的数据库服务器。


    要创建机器，请像我们在第 3 章中那样，进入“创建”然后选择“Linode”。不过，这次在选择发行版时，需要在“镜像”标题下选择“我的镜像”，然后选择“备份”。这将显示所有拥有可用备份的节点列表。点击你的节点，然后它会显示可用的备份，其中就包括我们刚刚创建的备份。参见图
    5-3 了解具体样式。


    你可以创建任意大小的机器，但仅为了练习，你也可以使用它们的最小机型。这个节点需要与你的另一个节点位于同一数据中心（否则它们将无法进行私有、低成本和快速的相互通信），但
    Linode 会自动将从备份创建的新节点放入同一数据中心。


    至于 Linode 标签，我们将其命名为 `dbmaster`，以便知道此节点将用作主数据库。拥有大量没有名称（或名称不佳）的节点很快就会变得难以管理，因此请务必*始终*为你的节点起描述性的名称。


    ![../images/487291_1_En_5_Chapter/487291_1_En_5_Fig3_HTML.jpg](img/487291_1_En_5_Fig3_HTML.jpg)


    图 5-3：从备份启动新的 Linode 节点


    现在点击“创建”来构建你的新节点。从备份创建时，你需要在该节点完全创建完成后自行启动它。在屏幕右上角，应该显示“离线”。点击它，然后选择“开机”来启动你的新机器。现在你可以使用为初始机器设置的用户名和密码
    `ssh` 登录到这台新机器。实际上，它应该也运行着你之前创建好的应用程序。它是另一台机器的精确副本，仅网络设置已被修改。

    '
- fmt: '### ![../images/487291_1_En_5_Chapter/487291_1_En_5_Figb_HTML.jpg](images/487291_1_En_5_Chapter/487291_1_En_5_Figb_HTML.jpg)
    RESTORING TO A LARGER MACHINE


    If you restore a backup to a larger machine, it may not utilize all of your purchased
    disk space. Since the partition was directly copied, the old partition will be
    the same size it was on the server it was copied from, which may be smaller than
    the space that you have available.


    To solve this, first power down your server. Next, on your node’s dashboard, click
    the “Advanced” tab. You can either add another disk to use the remaining space
    (this is harder to manage, so I don’t recommend it) or resize your main disk to
    utilize all of your space. To resize the disk, find the main disk under “Disks.”
    It should be named something like “CentOS 7 Disk” (not the disk labeled “Swap
    Image”). Click the ellipses (i.e., `...`) next to your main disk and choose “Resize.”
    You can then set the size to the maximum value it tells you, and then click the
    “Resize” button.


    When it is done resizing, you can power your machine back on, and you are now
    all set.


    ## 5.3 Setting Up Your Private Network


    Since we have two machines, we need them to communicate. They *could* communicate
    via their public IP address, but this leads to several problems. First of all,
    if you have services that you don’t want to be available publicly (like your database),
    it is more difficult to prevent the public from getting access to them if you
    only have a public IP address. Additionally, Linode charges money for traffic
    on your public IP address, so, if you communicated via that IP address, Linode
    would charge you for *internal* traffic. Having a private IP address is important,
    therefore, because it lets the computers communicate with each other over a fast,
    free, more secure, internal network.


    To get around these problems, Linode allows you to set up an internal network
    for your servers. All of the servers within an account share an internal network
    if they are set up for it. To add a server to your internal network, you just
    need to go into your node’s “Networking” tab and click “Add Private IPv4.” It
    will give you some additional information about private addresses, and you can
    just click “Allocate” to continue. This will assign a private IP address to the
    computer. Because all of the web servers will be communicating with this server,
    you will want to write down the private IP address that is generated. From here
    on out, we will refer to this address as `DB.MASTER.PRIVATE.IP`, so always replace
    this with the private IP address of the server that you just wrote down.


    Note that on some cloud platforms (including Linode), the private IP addresses
    are not completely private. That is, other cloud customers in the same datacenter
    may be on that network. Therefore, while it is certainly safer on the private
    network than on the public network, private networks on clouds don’t guarantee
    that only our own computers will be connecting. Therefore, on a production system,
    you will still need to take precautions to prevent unwanted access even on the
    internal network. However, Linode does filter traffic to each node, so you shouldn’t
    have to worry about anyone snooping on data traffic on the internal network.


    You will need to reboot the node to complete the process.


    Once it is done booting, you can still see the application at `http://NEW.NODE.PUBLIC.IP/list.php`,
    but you will not be able to see it on the private IP address, because, as noted,
    it is private.


    To see the list of addresses on the server, log in as root and issue the command:


    ```

    ip addr show

    ```


    This should print out all of the IP addresses assigned to this node.


    ### ![../images/487291_1_En_5_Chapter/487291_1_En_5_Figc_HTML.jpg](images/487291_1_En_5_Chapter/487291_1_En_5_Figc_HTML.jpg)
    PRIVATE IP ADDRESSES


    If you aren’t familiar with IP addressing, some IPv4 addresses have been reserved
    for use in internal networks. These addresses include


    *   `192.168.X.X`


    *   `172.16–31.X.X`


    *   `10.X.X.X`


    None of these IP addresses are allowed for public communication on the Internet.


    Therefore, when setting up your internal network, Linode will choose IP addresses
    from these pools to configure your machine.


    One other infamous IP address is `127.0.0.1`, which is known as the *loopback*
    address, which is an IP address that a machine can use to refer to itself (in
    fact, the whole range `127.X.X.X` is reserved for this purpose, but only `127.0.0.1`
    is normally used).


    ## 5.4 Handling Database Connections from Other Servers


    This machine now has a full copy of the application and the database on it. However,
    it is still configured to be a single-server system. We need to configure it to
    be the master database for a cluster of machines. This section, which should be
    performed as the root user, will show what you need to do to make that happen.


    Since this machine is a clone of `template_node`, that means that all of the users,
    programs, and configurations were copied over to this node. Therefore, you can
    `ssh` into the machine as root using the password you set previously.


    To use this as the database server for the other nodes, you will need to enable
    the database to listen for connections from those nodes. By default, PostgreSQL
    only listens for connections on the localhost interface. What we *don’t* want
    is for PostgreSQL to listen for connections on the public Internet. Therefore,
    we want to configure PostgreSQL so that it listens for connections on both localhost
    and its *private* IP address.


    To do that, as the root user, open up the file `/var/lib/pgsql/data/postgresql.conf`
    with `nano`, and change the line that says `listen_addresses`. Change that line
    to read:


    ```

    listen_addresses = ''localhost,DB.MASTER.PRIVATE.IP''

    ```


    Be sure to replace `DB.MASTER.PRIVATE.IP` with the *actual* private IP address
    of your node. If there is a comment mark (`#`) at the beginning of the line, be
    sure to remove it; otherwise the command won’t be active. Save the file with control-o
    (just hit the return key to verify the filename if it asks). Then, to exit, use
    control-x. Now restart PostgreSQL with the command:


    ```

    systemctl restart postgresql

    ```


    Additionally, you will want to open up the firewall so that it can accept remote
    connections for PostgreSQL. You can do this with:


    ```

    firewall-cmd --add-service postgresql

    firewall-cmd --add-service postgresql --permanent

    ```


    Normally, I keep the web server running on the database server just so I can check
    it. However, if you wanted to, you can turn off the web server with the commands:


    ```

    systemctl stop httpd

    systemctl disable httpd

    ```'
