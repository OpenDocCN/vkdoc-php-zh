    \ of `contact.php`, add the\n    following conditional statement immediately after\
    \ the command that\n    includes `processmail.php`:\n\n```\n    require './includes/processmail.php';\n\
    \    if ($mailSent) {\n    header('Location: http://www.example.com/thank_you.php');\n\
    \    exit;\n    }\n    }\n    ?>\n    ```\n\nYou need to test this on your remote\
    \ server, so replace `www.example.com` with\n    your own domain name. This checks\
    \ if `$mailSent` is `true`. If it is, the\n    `header()`\n    function redirects\
    \ to \n    `thank_you.php`, a page\n    acknowledging the message has been sent.\
    \ The `exit` command on the\n    following line ensures the script is terminated\
    \ after the page has been\n    redirected.\n\nThere’s a copy of `thank_you.php`\
    \ in the\n    `ch06`\n    folder.\n\n5.  If `$mailSent` is\n    `false`, `contact.php`\
    \ is\n    redisplayed; you need to warn the user that the message couldn’t be\n\
    \    sent. Edit the conditional statement just after the `<h2>` heading,\n   \
    \ like this:\n\n```\n    Contact Us\n\nSorry, your mail could not be sent. . .\
    \ .\n    ```\n\nThe original and new conditions have been wrapped in parentheses,\
    \ so\n    each pair is considered separately. The warning about the message not\n\
    \    being sent is displayed if the form has been submitted and suspect\n    phrases\
    \ have been found, *or* if the form has been submitted and\n    `$errors['mailfail']`\n\
    \    has been set.\n\n6.  Delete the code block (including the `<pre>` tags)\n\
    \    that displays the message body and headers at the bottom of `contact.php`.\n\
    \n7.  Testing this locally is likely to result in the thank you page being\n \
    \   shown, but the email never arriving. This is because most testing\n    environments\
    \ don’t have an MTA. Even if you set one up, most mail\n    servers reject mail\
    \ from unrecognized sources. Upload `contact.php` and all\n    related files,\
    \ including `processmail.php` and\n    `thank_you.php`,\n    to your remote server\
    \ and test the contact form there. Don’t forget that\n    `processmail.php`\n\
    \    needs to be in a subfolder called `includes`.\n\nYou can check your code\
    \ with `contact_08.php` and\n    `includes/processmail_05.php`\n    in the `ch06`\n\
    \    folder.\n\nTroubleshooting mail()\nIt’s important to understand that `mail()`\
    \ isn’t an email\nprogram. PHP’s responsibility ends as soon as it passes the\
    \ address,\nsubject, message, and headers to the MTA. It has no way of knowing\
    \ if\nthe email is delivered to its intended destination. Normally, email\narrives\
    \ instantaneously, but network logjams can delay it by hours or\neven a couple\
    \ of days.\n\nIf you’re redirected to the thank you page after sending a message\
    \ from\n`contact.php`,\nbut nothing arrives in your inbox, check the following:\n\
    \n*   Has the message been caught by a spam filter?\n\n*   Have you checked the\
    \ destination address stored in `$to`? Try an\n    alternative email address to\
    \ see if it makes a difference.\n\n*   Have you used a genuine address in the\
    \ `From` header? Using a\n    fake or invalid address is likely to cause the mail\
    \ to be rejected. Use\n    a valid address that belongs to the same domain as\
    \ your web\n    server.\n\n*   Check with your hosting company to see if the fifth\
    \ argument to\n    `mail()` is\n    required. If so, it should normally be a string\
    \ composed of `-f` followed by your\n    email address. For example, `david@example.com`\n\
    \    becomes `'-`fdavid@example.com`'`.\n\nIf you still don’t receive messages\
    \ from `contact.php`, create a\nfile with this script:\n\n```\n<?php\nini_set('display_errors',\
    \ '1');\n$mailSent = mail('you@example.com', 'PHP mail test', 'This is a test\
    \ email');\nif ($mailSent) {\necho 'Mail sent';\n} else {\necho 'Failed';\n}\n\
    ```\n\nReplace `you@example.com` with\nyour own email address. Upload the file\
    \ to your web site and load the\npage into a browser.\n\nIf you see an error message\
    \ about there being no `From` header, add one\nas a fourth argument to the `mail()`\
    \ function, like\nthis:\n\n```\n$mailSent = mail('you@example.com', 'PHP mail\
    \ test', 'This is a test email',\n'From: me@example.com');\n```\n\nIt’s usually\
    \ a good idea to use a different address from the\ndestination address in the\
    \ first argument.\n\nIf your hosting company requires the fifth argument, adjust\
    \ the code\nlike this:\n\n```\n$mailSent = mail('you@example.com', 'PHP mail test',\
    \ 'This is a test email', null,\n'-fme@example.com');\n```"
  trans: "\n如果某个字段未标记为必填且留空，其值将被设为“未选择”。该代码还会处理来自多选元素（例如复选框组和`<select>`列表）的值，这些值会以`$_POST`数组的子数组形式进行传输。`implode()`函数会将这些子数组转换为逗号分隔的字符串。每个标签均源自`$expected`数组当前元素中输入字段的`name`属性。`str_replace()`的第一个参数是下划线。如果在`name`属性中找到下划线，则将其替换为第二个参数——一个由单个空格组成的字符串。随后，`ucfirst()`会将首字母转换为大写。请注意，`str_replace()`的第三个参数是`$item`（带单个美元符号），因此这次它是一个普通变量，而非可变变量。它包含来自`$expected`数组的当前值。将邮件正文合并为单个字符串后，`wordwrap()`函数会将行长度限制为\
    \ 70 个字符。邮件头通过`implode()`函数格式化为单个字符串，各邮件头之间以回车符和换行符分隔。\n\n发送邮件的代码仍有待添加，但出于测试目的，`$mailSent`已被设置为`true`。\n\
    \n1. 保存`processmail.php`。在`contact.php`底部找到以下代码块：\n\n   将其更改为：\n\n   这会检查表单是否已提交且邮件是否准备就绪。然后显示`$message`和`$headers`中的值。这两个值都传递给`htmlentities()`，以确保它们在浏览器中正确显示。\n\
    \n2. 保存`contact.php`，并通过输入姓名、电子邮件地址和简短评论来测试表单。点击“发送消息”后，你应在页面底部看到邮件正文和邮件头的显示内容，如图\
    \ 6-8 所示。\n\n   ![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig8_HTML.jpg](img/332054_4_En_6_Fig8_HTML.jpg)\n\
    \n   图 6-8. 验证邮件正文和邮件头格式是否正确\n\n   假设邮件正文和邮件头在页面底部正确显示，你就可以添加发送邮件的代码了。如有必要，请对照`ch06`文件夹中的`contact_07.php`和`includes/processmail_04.php`检查代码。\n\
    \n3. 在`processmail.php`中，添加发送邮件的代码。找到以下行：\n\n   ```\n   $mailSent = true;\n  \
    \ ```\n\n   将其更改为：\n\n   ```\n   $mailSent = mail($to, $subject, $message, $headers);\n\
    \   if (!$mailSent) {\n       $errors['mailfail'] = true;\n   }\n   ```\n\n  \
    \ 这将目标地址、主题行、邮件正文和邮件头传递给`mail()`函数。如果成功将电子邮件交给 Web 服务器的邮件传输代理（MTA），该函数返回`true`。如果失败，`$mailSent`会被设为`false`，条件语句会向`$errors`数组添加一个元素，以便在重新显示表单时保留用户的输入。\n\
    \n4. 在`contact.php`顶部的 PHP 代码块中，紧跟在包含`processmail.php`的命令之后，添加以下条件语句：\n\n   ```\n\
    \   require './includes/processmail.php';\n   if ($mailSent) {\n       header('Location:\
    \ http://www.example.com/thank_you.php');\n       exit;\n   }\n   }\n   ?>\n \
    \  ```\n\n   你需要在远程服务器上测试此操作，因此请将`www.example.com`替换为你自己的域名。这会检查`$mailSent`是否为`true`。如果是，`header()`函数会重定向到`thank_you.php`，这是一个确认消息已发送的页面。下一行的`exit`命令确保页面重定向后脚本终止。\n\
    \n   `ch06`文件夹中有一个`thank_you.php`副本。\n\n5. 如果`$mailSent`为`false`，则会重新显示`contact.php`；你需要警告用户消息无法发送。编辑`<h2>`标题后的条件语句，如下所示：\n\
    \n   ```\n   Contact Us\n   Sorry, your mail could not be sent. . . .\n   ```\n\
    \n   原始条件和新增条件已用括号括起来，因此每对条件会被分别考虑。如果表单已提交并且发现了可疑短语，*或者*表单已提交且`$errors['mailfail']`已被设置，则会显示消息无法发送的警告。\n\
    \n6. 删除`contact.php`底部显示邮件正文和邮件头的代码块（包括`<pre>`标签）。\n\n7. 在本地进行测试很可能会显示感谢页面，但邮件永远不会到达。这是因为大多数测试环境没有\
    \ MTA。即使你设置了一个，大多数邮件服务器也会拒绝来自无法识别来源的邮件。请将`contact.php`及所有相关文件（包括`processmail.php`和`thank_you.php`）上传到你的远程服务器，并在那里测试联系表单。不要忘记`processmail.php`需要放在名为`includes`的子文件夹中。\n\
    \n   你可以对照`ch06`文件夹中的`contact_08.php`和`includes/processmail_05.php`检查代码。\n\n###\
    \ 对 `mail()` 进行故障排除\n\n需要理解的是，`mail()`并非一个电子邮件程序。PHP 的职责在将地址、主题、消息和邮件头传递给 MTA\
    \ 后即告结束。它无法知晓电子邮件是否送达预期目的地。通常情况下，邮件会即时到达，但网络堵塞可能导致延迟数小时甚至一两天。\n\n如果你从`contact.php`发送消息后被重定向到感谢页面，但收件箱中并未收到任何内容，请检查以下事项：\n\
    \n-   消息是否被垃圾邮件过滤器拦截？\n-   是否检查了存储在`$to`中的目标地址？尝试使用一个备用电子邮件地址，看看是否有所区别。\n-   是否在`From`邮件头中使用了真实地址？使用虚假或无效地址很可能会导致邮件被拒绝。请使用与你的\
    \ Web 服务器属于同一域的有效地址。\n-   向你的托管服务商咨询，确认`mail()`的第五个参数是否为必需。如果是，它通常应为由`-f`后跟你的电子邮件地址组成的字符串。例如，`david@example.com`变为`'-fdavid@example.com'`。\n\
    \n如果仍然无法从`contact.php`收到消息，请创建一个包含以下脚本的文件：\n\n```\n<?php\nini_set('display_errors',\
    \ '1');\n$mailSent = mail('you@example.com', 'PHP mail test', 'This is a test\
    \ email');\nif ($mailSent) {\n    echo 'Mail sent';\n} else {\n    echo 'Failed';\n\
    }\n```\n\n将`you@example.com`替换为你自己的电子邮件地址。将该文件上传到你的网站，并在浏览器中加载页面。\n\n如果你看到关于缺少`From`邮件头的错误消息，请向`mail()`函数添加一个作为第四个参数，如下所示：\n\
    \n```\n$mailSent = mail('you@example.com', 'PHP mail test', 'This is a test email',\n\
    'From: me@example.com');\n```\n\n通常，最好使用与第一个参数中的目标地址不同的地址。\n\n如果你的托管服务商要求提供第五个参数，请按如下方式调整代码：\n\
    \n```\n$mailSent = mail('you@example.com', 'PHP mail test', 'This is a test email',\
    \ null,\n'-fme@example.com');\n```\n"
- fmt: "### Using the Fifth Argument\nUsing the fifth argument normally replaces the\
    \ need to supply a `From` header, so using `null` (without quotes) as the fourth\
    \ argument indicates that it has no value. If you see “Mail sent” and no mail\
    \ arrives, or you see “Failed” after trying all five arguments, consult your hosting\
    \ company for advice. If you receive the test email from this script but not from\
    \ `contact.php`, it means you have made a mistake in the code or that you have\
    \ forgotten to upload `processmail.php`. Turn on the display of errors temporarily,\
    \ as described in “Why is my page blank?” in Chapter [3](#332054_4_En_3_Chapter.xhtml),\
    \ to check `contact.php` is able to find `processmail.php`.\n\n> **Tip**: I was\
    \ teaching at a university in England and couldn’t work out why students’ mails\
    \ weren’t being delivered, even though their code was perfect. It turned out the\
    \ IT department had disabled Sendmail (the MTA) to prevent the server being used\
    \ to deliver spam!\n\n### Handling Multiple-Choice Form Elements\nThe form in\
    \ `contact.php` uses only text input fields and a text area. To work successfully\
    \ with forms, you also need to know how to handle multiple-choice elements, namely:\n\
    - Radio buttons\n- Check boxes\n- Drop-down option menus\n- Multiple-choice lists\n\
    \nThe principle behind them is the same as the text input fields you have been\
    \ working with: the `name` attribute of the form element is used as the key in\
    \ the `$_POST` array. However, there are some important differences:\n\n- Check-box\
    \ groups and multiple-choice lists store selected values as an array, so you need\
    \ to add an empty pair of square brackets at the end of the `name` attribute for\
    \ these types of input. For example, for a check-box group called `interests`,\
    \ the `name` attribute in each `<input>` tag should be `name=\"interests[]\"`.\
    \ If you omit the square brackets, only the last item selected is transmitted\
    \ through the `$_POST` array.\n- The values of selected items in a check-box group\
    \ or multiple-choice list are transmitted as a subarray of the `$_POST` array.\
    \ The code in PHP Solution 6-6 automatically converts these subarrays to comma-separated\
    \ strings. However, when using a form for other purposes, you need to extract\
    \ the values from the subarrays. You’ll see how to do so in later chapters.\n\
    - Radio buttons, check boxes, and multiple-choice lists are *not* included in\
    \ the `$_POST` array if no value is selected. Consequently, it’s vital to use\
    \ `isset()` to check for their existence before attempting to access their values\
    \ when processing the form.\n\nThe remaining PHP solutions in this chapter show\
    \ how to handle multiple-choice form elements. Rather than go through each step\
    \ in detail, I’ll just highlight the important points. Bear the following points\
    \ in mind when working through the rest of this chapter:\n- Processing these elements\
    \ relies on the code in `processmail.php`.\n- You must add the `name` attribute\
    \ of each element to the `$expected` array for it to be added to the message body.\n\
    - To make a field required, add its `name` attribute to the `$required` array.\n\
    - If a field that’s not required is left blank, the code in `processmail.php`\
    \ sets its value to “Not selected.”\n\nFigure [6-9](#332054_4_En_6_Chapter.xhtml#Fig9)\
    \ shows `contact.php` with each type of input added to the original design.\n\n\
    ![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig9_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Fig9_HTML.jpg)\n\
    \n*Figure 6-9. The feedback form with examples of multiple-choice form elements*\n\
    \n> **Tip**: HTML5 form input elements all use the `name` attribute and send values\
    \ as text or as a subarray of the `$_POST` array, so you should be able to adapt\
    \ the code accordingly.\n\n### PHP Solution 6-7: Handling Radio Button Groups\n\
    Radio button groups let you pick only one value. Although it’s common to set a\
    \ default value in the HTML markup, it’s not obligatory. This PHP solution shows\
    \ how to handle both scenarios.\n\n1. The simple way to deal with radio buttons\
    \ is to make one of them the default. The radio group is always included in the\
    \ `$_POST` array because a value is always selected.\n\nThe code for a radio group\
    \ with a default value looks like this (the `name` attributes and PHP code are\
    \ highlighted in bold):\n\n```\n    Subscribe to newsletter?\n\n>\n    Yes\n \
    \   >\n    No\n```\n\nAll members of the radio group share the same `name` attribute.\
    \ Because only one value can be selected, the `name` attribute does *not* end\
    \ with a pair of empty brackets.\n\nThe conditional statement related to the Yes\
    \ button checks `$_POST` to see if the form has been submitted. If it has and\
    \ the value of `$_POST['subscribe']` is “Yes,” the `checked` attribute is added\
    \ to the `<input>` tag.\n\nIn the No button, the conditional statement uses `||`\
    \ (or). The first condition is `!$_POST`, which is `true` when the form hasn’t\
    \ been submitted. If `true`, the `checked` attribute is added as the default value\
    \ when the page first loads. If `false`, it means the form has been submitted,\
    \ so the value of `$_POST['subscribe']` is checked.\n\n2. When a radio button\
    \ doesn’t have a default value, it’s not included in the `$_POST` array, so it\
    \ isn’t detected by the loop in `processmail.php` that builds the `$missing` array.\
    \ To ensure that the radio button element is included in the `$_POST` array, you\
    \ need to test for its existence after the form has been submitted. If it isn’t\
    \ included, you need to set its value to an empty string, like this:\n\n```\n\
    \    $required = ['name', 'comments', 'email', 'subscribe'];\n    // set default\
    \ values for variables that might not exist\n    if (!isset($_POST['subscribe']))\
    \ {\n    $_POST['subscribe'] = \";\n    }\n```\n\n3. If the radio button group\
    \ is required but not selected, you need to display an error message when the\
    \ form reloads. You also need to change the conditional statements in the `<input>`\
    \ tags to reflect the different behavior.\n\nThe following listing shows the `subscribe`\
    \ radio button group from `contact_09.php`, with all the PHP code highlighted\
    \ in bold:\n\n```\n    Subscribe to newsletter?\n\nPlease make a selection\n\n\
    >\n    Yes\n    >\n    No\n```\n\nThe conditional statement that controls the\
    \ warning message in the `<h2>` tag uses the same technique as for the text input\
    \ fields. The message is displayed if the radio group is a required item and it’s\
    \ in the `$missing` array.\n\nThe conditional statement surrounding the `checked`\
    \ attribute is the same in both radio buttons. It checks if the form has been\
    \ submitted and displays the checked attribute only if the value in `$_POST['subscribe']`\
    \ matches.\n\n### PHP Solution 6-8: Handling Check-box Groups\nCheck boxes can\
    \ be used individually or in groups. The method of handling them is slightly different.\
    \ This PHP solution shows how to deal with a check-box group called `interests`.\
    \ PHP Solution 6-11 explains how to handle a single check box.  \nWhen used as\
    \ a group, all check boxes in the group share the same `name` attribute, which\
    \ needs to end with an empty pair of square brackets in order for PHP to transmit\
    \ the selected values as an array. To identify which check boxes have been selected,\
    \ each one needs a unique `value` attribute.\n\nIf no items are selected, the\
    \ check-box group is not included in the `$_POST` array. After the form has been\
    \ submitted, you need to check the `$_POST` array to see if it contains a subarray\
    \ for the check-box group. If it doesn’t, you need to create an empty subarray\
    \ as the default value for the script in `processmail.php`.\n\n1. To save space,\
    \ just the first two check boxes of the group are shown. The `name` attribute\
    \ and PHP sections of code are highlighted in bold.\n\n```\n    Interests in Japan\n\
    \n>\n    Anime/manga\n\n>\n    Arts & crafts\n\n. . .\n```"
