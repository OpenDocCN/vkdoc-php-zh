- fmt: 'First, I set up constants for the tokens that interest me. I am going to match
    characters, words, whitespace, and quote characters. I test for these types in
    methods dedicated to each token: `isWordChar()`, `isSpaceChar()`, and so on. The
    heart of the class is the `nextToken()` method. This attempts to match the next
    token in a given string. The `Scanner` stores a `Context` object. `Parser` objects
    use this to share results as they work through the target text.


    Note that there is a second class: `ScannerState`. The `Scanner` is designed so
    that `Parser` objects can save state, try stuff out, and restore if they’ve gone
    down a blind alley. The `getState()` method populates and returns a `ScannerState`
    object. `setState()` uses a `ScannerState` object to revert state if required.


    Here is the `Context` class:


    ```

    // listing 24.03

    class Context

    {

    public $resultstack = [];

    public function pushResult($mixed)

    {

    array_push($this->resultstack, $mixed);

    }

    public function popResult()

    {

    return array_pop($this->resultstack);

    }

    public function resultCount(): int

    {

    return count($this->resultstack);

    }

    public function peekResult()

    {

    if (empty($this->resultstack)) {

    throw new Exception("empty resultstack");

    }

    return $this->resultstack[count($this->resultstack) -1];

    }

    }

    ```


    As you can see, this is just a simple stack, a convenient noticeboard for parsers
    to work with. It performs a similar job to that of the context class used in the
    Interpreter pattern, but it is not the same class.


    Notice that the `Scanner` does not itself work with a file or string. Instead,
    it requires a `Reader` object. This would allow me to easily swap in different
    sources of data. Here is the `Reader` interface and an implementation, `StringReader`:


    ```

    // listing 24.04

    interface Reader

    {

    public function getChar();

    public function getPos(): int;

    public function pushBackChar();

    }

    // listing 24.05

    class StringReader implements Reader

    {

    private $in;

    private $pos;

    public function __construct($in)

    {

    $this->in = $in;

    $this->pos = 0;

    }

    public function getChar()

    {

    if ($this->pos >= strlen($this->in)) {

    return false;

    }

    $char = substr($this->in, $this->pos, 1);

    $this->pos++;

    return $char;

    }

    public function getPos(): int

    {

    return $this->pos;

    }

    public function pushBackChar()

    {

    $this->pos--;

    }

    public function string()

    {

    return $this->in;

    }

    }

    ```


    This simply reads from a string one character at a time. I could easily provide
    a file-based version, of course.


    Perhaps the best way to see how the `Scanner` might be used is to use it. Here
    is some code to break up the example statement into tokens:


    ```

    // listing 24.06

    $context = new Context();

    $user_in = "\$input equals ''4'' or \$input equals ''four''";

    $reader = new StringReader($user_in);

    $scanner = new Scanner($reader, $context);

    while ($scanner->nextToken() != Scanner::EOF) {

    print $scanner->token();

    print "   {$scanner->charNo()}";

    print "   {$scanner->getTypeString()}\n";

    }

    ```


    I initialize a `Scanner` object and then loop through the tokens in the given
    string by repeatedly calling `nextToken()`. The `token()` method returns the current
    portion of the input matched. `char_no()` tells me where I am in the string, and
    `getTypeString()` returns a string version of the constant flag representing the
    current token. This is what the output should look like:


    ```

    $       1       CHAR

    input   6       WORD

    7       WHITESPACE

    equals  13      WORD

    14      WHITESPACE

    ''       15      APOS

    4       16      WORD

    ''       17      APOS

    18      WHITESPACE

    or      20      WORD

    21      WHITESPACE

    $       22      CHAR

    input   27      WORD

    28      WHITESPACE

    equals  34      WORD

    35      WHITESPACE

    ''       36      APOS

    four    40      WORD

    ''       41      APOS

    ```


    I could, of course, match finer-grained tokens than this, but this is good enough
    for my purposes. Breaking up the string is the easy part. How do I build up a
    grammar in code?


    The Parser


    One approach is to build a tree of `Parser` objects. Here is the abstract `Parser`
    class that I will be using:


    ```

    // listing 24.07

    abstract class Parser

    {

    const GIP_RESPECTSPACE = 1;

    protected $respectSpace = false;

    protected static $debug = false;

    protected $discard = false;

    protected $name;

    private static $count=0;

    public function __construct(string $name = null, $options = [])

    {

    if (is_null($name)) {

    self::$count++;

    $this->name = get_class($this) . " (" . self::$count . ")";

    } else {

    $this->name = $name;

    }

    if (isset($options[self::GIP_RESPECTSPACE])) {

    $this->respectSpace=true;

    }

    }

    protected function next(Scanner $scanner)

    {

    $scanner->nextToken();

    if (! $this->respectSpace) {

    $scanner->eatWhiteSpace();

    }

    }

    public function spaceSignificant(bool $bool)

    {

    $this->respectSpace = $bool;

    }

    public static function setDebug(bool $bool)

    {

    self::$debug = $bool;

    }

    public function setHandler(Handler $handler)

    {

    $this->handler = $handler;

    }

    final public function scan(Scanner $scanner): bool

    {

    if ($scanner->tokenType() == Scanner::SOF) {

    $scanner->nextToken();

    }

    $ret = $this->doScan($scanner);

    if ($ret && ! $this->discard && $this->term()) {

    $this->push($scanner);

    }

    if ($ret) {

    $this->invokeHandler($scanner);

    }

    if ($this->term() && $ret) {

    $this->next($scanner);

    }

    $this->report("::scan returning $ret");

    return $ret;

    }

    public function discard()

    {

    $this->discard = true;

    }

    abstract public function trigger(Scanner $scanner): bool;

    public function term(): bool

    {

    return true;

    }

    protected function invokeHandler(Scanner $scanner)

    {

    if (! empty($this->handler)) {

    $this->report("calling handler: " . get_class($this->handler));

    $this->handler->handleMatch($this, $scanner);

    }

    }

    protected function report($msg)

    {

    if (self::$debug) {

    print "name}> " . get_class($this) . ": $msg\n";

    }

    }

    protected function push(Scanner $scanner)

    {

    $context = $scanner->getContext();

    $context->pushResult($scanner->token());

    }

    abstract protected function doScan(Scanner $scan): bool;

    }

    ```


    The place to start with this class is the `scan()` method. It is here that most
    of the logic resides. `scan()` is given a `Scanner` object to work with. The first
    thing that the `Parser` does is defer to a concrete child class, calling the abstract
    `doScan()` method. `doScan()` returns `true` or `false`; you will see a concrete
    example later in this section.


    If `doScan()` reports success, and a couple of other conditions are fulfilled,
    then the results of the parse are pushed to the `Context` object’s result stack.
    The `Scanner` object holds the `Context` that is used by `Parser` objects to communicate
    results. The actual pushing of the successful parse takes place in the `Parser::push()`
    method:


    ```

    protected function push(Scanner $scanner)

    {

    $context = $scanner->getContext();

    $context->pushResult($scanner->token());

    }

    ```


    In addition to a parse failure, there are two conditions that might prevent the
    result from being pushed to the scanner’s stack. First, client code can ask a
    parser to discard a successful match by calling the `discard()` method. This toggles
    a property called `$discard` to `true`. Second, only terminal parsers (that is,
    parsers that are not composed of other parsers) should push their result to the
    stack. Composite parsers (instances of `CollectionParser`, often referred to in
    the following text as collection parsers) will instead let their successful children
    push their results. I test whether or not a parser is terminal using the `term()`
    method, which is overridden to return `false` by collection parsers.


    If the concrete parser has been successful in its matching, then I call another
    method: `invokeHandler()`. This is passed the `Scanner` object. If a `Handler`
    (that is, an object that implements the `Handler` interface) has been attached
    to `Parser` (using the `setHandler()` method), then its `handleMatch()` method
    is invoked here. I use handlers to make a successful grammar actually do something,
    as you will see shortly.'
  raw: 'First, I set up constants for the tokens that interest me. I am going to

    match characters, words, whitespace, and quote characters. I test for

    these types in methods dedicated to each token: `isWordChar()`, `isSpaceChar()`,
    and so

    on. The heart of the class is the `nextToken()` method.

    This attempts to match the next token in a given string. The `Scanner` stores
    a

    `Context` object.

    `Parser` objects

    use this to share results as they work through the target text.


    Note that there is a second class: `ScannerState`. The

    `Scanner` is

    designed so that `Parser` objects can

    save state, try stuff out, and restore if they’ve gone down a blind

    alley. The `getState()` method

    populates and returns a `ScannerState` object.

    `setState()` uses

    a `ScannerState`

    object to revert state if required.


    Here is the `Context` class:


    ```

    // listing 24.03

    class Context

    {

    public $resultstack = [];

    public function pushResult($mixed)

    {

    array_push($this->resultstack, $mixed);

    }

    public function popResult()

    {

    return array_pop($this->resultstack);

    }

    public function resultCount(): int

    {

    return count($this->resultstack);

    }

    public function peekResult()

    {

    if (empty($this->resultstack)) {

    throw new Exception("empty resultstack");

    }

    return $this->resultstack[count($this->resultstack) -1];

    }

    }

    ```


    As you can see, this is just a simple stack, a convenient noticeboard

    for parsers to work with. It performs a similar job to that of the

    context class used in the Interpreter pattern, but it is not the same

    class.


    Notice that the `Scanner` does not

    itself work with a file or string. Instead, it requires a `Reader` object. This

    would allow me to easily swap in different sources of data. Here is the

    `Reader`

    interface and an implementation, `StringReader`:


    ```

    // listing 24.04

    interface Reader

    {

    public function getChar();

    public function getPos(): int;

    public function pushBackChar();

    }

    // listing 24.05

    class StringReader implements Reader

    {

    private $in;

    private $pos;

    public function __construct($in)

    {

    $this->in = $in;

    $this->pos = 0;

    }

    public function getChar()

    {

    if ($this->pos >= strlen($this->in)) {

    return false;

    }

    $char = substr($this->in, $this->pos, 1);

    $this->pos++;

    return $char;

    }

    public function getPos(): int

    {

    return $this->pos;

    }

    public function pushBackChar()

    {

    $this->pos--;

    }

    public function string()

    {

    return $this->in;

    }

    }

    ```


    This simply reads from a string one character at a time. I could easily

    provide a file-based version, of course.


    Perhaps the best way to see how the `Scanner` might be used

    is to use it. Here is some code to break up the example statement into

    tokens:


    ```

    // listing 24.06

    $context = new Context();

    $user_in = "\$input equals ''4'' or \$input equals ''four''";

    $reader = new StringReader($user_in);

    $scanner = new Scanner($reader, $context);

    while ($scanner->nextToken() != Scanner::EOF) {

    print $scanner->token();

    print "   {$scanner->charNo()}";

    print "   {$scanner->getTypeString()}\n";

    }

    ```


    I initialize a `Scanner` object and

    then loop through the tokens in the given string by repeatedly calling

    `nextToken()`.

    The `token()`

    method returns the current portion of the input matched. `char_no()` tells me

    where I am in the string, and `getTypeString()`

    returns a string version of the constant flag representing the current

    token. This is what the output should look like:


    ```

    $       1       CHAR

    input   6       WORD

    7       WHITESPACE

    equals  13      WORD

    14      WHITESPACE

    ''       15      APOS

    4       16      WORD

    ''       17      APOS

    18      WHITESPACE

    or      20      WORD

    21      WHITESPACE

    $       22      CHAR

    input   27      WORD

    28      WHITESPACE

    equals  34      WORD

    35      WHITESPACE

    ''       36      APOS

    four    40      WORD

    ''       41      APOS

    ```


    I could, of course, match finer-grained tokens than this, but this is

    good enough for my purposes. Breaking up the string is the easy part.

    How do I build up a grammar in code?


    The Parser


    One approach is to build a tree of `Parser` objects. Here

    is the abstract `Parser` class that I

    will be using:


    ```

    // listing 24.07

    abstract class Parser

    {

    const GIP_RESPECTSPACE = 1;

    protected $respectSpace = false;

    protected static $debug = false;

    protected $discard = false;

    protected $name;

    private static $count=0;

    public function __construct(string $name = null, $options = [])

    {

    if (is_null($name)) {

    self::$count++;

    $this->name = get_class($this) . " (" . self::$count . ")";

    } else {

    $this->name = $name;

    }

    if (isset($options[self::GIP_RESPECTSPACE])) {

    $this->respectSpace=true;

    }

    }

    protected function next(Scanner $scanner)

    {

    $scanner->nextToken();

    if (! $this->respectSpace) {

    $scanner->eatWhiteSpace();

    }

    }

    public function spaceSignificant(bool $bool)

    {

    $this->respectSpace = $bool;

    }

    public static function setDebug(bool $bool)

    {

    self::$debug = $bool;

    }

    public function setHandler(Handler $handler)

    {

    $this->handler = $handler;

    }

    final public function scan(Scanner $scanner): bool

    {

    if ($scanner->tokenType() == Scanner::SOF) {

    $scanner->nextToken();

    }

    $ret = $this->doScan($scanner);

    if ($ret && ! $this->discard && $this->term()) {

    $this->push($scanner);

    }

    if ($ret) {

    $this->invokeHandler($scanner);

    }

    if ($this->term() && $ret) {

    $this->next($scanner);

    }

    $this->report("::scan returning $ret");

    return $ret;

    }

    public function discard()

    {

    $this->discard = true;

    }

    abstract public function trigger(Scanner $scanner): bool;

    public function term(): bool

    {

    return true;

    }

    protected function invokeHandler(Scanner $scanner)

    {

    if (! empty($this->handler)) {

    $this->report("calling handler: " . get_class($this->handler));

    $this->handler->handleMatch($this, $scanner);

    }

    }

    protected function report($msg)

    {

    if (self::$debug) {

    print "name}> " . get_class($this) . ": $msg\n";

    }

    }

    protected function push(Scanner $scanner)

    {

    $context = $scanner->getContext();

    $context->pushResult($scanner->token());

    }

    abstract protected function doScan(Scanner $scan): bool;

    }

    ```


    The place to start with this class is the `scan()` method. It is

    here that most of the logic resides. `scan()` is given a

    `Scanner` object

    to work with. The first thing that the `Parser` does is defer

