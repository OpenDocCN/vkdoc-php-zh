    between the closing PHP tag and `&amp;`. This code creates the URL and query string,
    which must have no spaces in it.


    ![A978-1-4842-0635-5_12_Fig6_HTML.jpg](A978-1-4842-0635-5_12_Fig6_HTML.jpg)


    Figure 12-6.


    The page navigation system is now complete Save the page and test it. Click the
    Next link, and you should see the remaining subset of thumbnails, as shown in
    Figure [12-6](#A978-1-4842-0635-5_12_Chapter.html#Fig6). There are no more images
    to be displayed, so the Next link disappears, but there’s a Prev link at the bottom
    left of the thumbnail grid. The record counter at the top of the gallery now reflects
    the range of thumbnails being displayed, and if you click the right thumbnail,
    the same subset remains onscreen while displaying the appropriate large image.
    You’re done!  


    You can check your code against `gallery_mysqli_08.php` or `gallery_pdo_08.php`.


    ## Chapter Review


    In just a few pages, you have turned a boring list of filenames into a dynamic
    online gallery, complete with a page navigation system. All that’s necessary is
    to create a thumbnail for each major image, upload both images to the appropriate
    folders, and add the filename and a caption to the `images` table in the database.
    As long as the database is kept up to date with the contents of the `images` and
    `thumbs` folders, you have a dynamic gallery. Not only that, you’ve learned how
    to select subsets of records, link to related information through a query string,
    and build a page navigation system.


    The more you use PHP, the more you realize that the skill doesn’t lie so much
    in remembering how to use lots of obscure functions but in working out the logic
    needed to get PHP to do what you want. It’s a question of if this, do that; if
    something else, do something different. Once you can anticipate the likely eventualities
    of a situation, you can normally build the code to handle it.


    So far, you’ve concentrated on extracting records from a simple database table.
    In the next chapter, I’ll show you how to insert, update, and delete material.


    # 13. Managing Content


    Although you can use phpMyAdmin for a lot of database administration, you might
    want to set up areas where clients can log in to update some data without giving
    them full rein of your database. To do so, you need to build your own forms and
    create customized content management systems.


    At the heart of every content management system lies what is sometimes called
    the CRUD cycle—Create, Read, Update, and Delete—which utilizes just four SQL commands:
    `INSERT`, `SELECT`, `UPDATE`, and `DELETE`. To demonstrate the basic SQL commands,
    this chapter shows you how to build a simple content management system for a table
    called `blog`.


    Even if you don’t want to build your own content management system, the four commands
    covered in this chapter are essential for just about any database-driven page,
    such as user login, user registration, search form, search results, and so on.


    In this chapter, you’ll learn about the following:


    *   Inserting new records in a database table

    *   Displaying a list of existing records

    *   Updating existing records

    *   Asking for confirmation before a record is deleted


    ## Setting Up a Content Management System


    Managing the content in a database table involves four stages, which I normally
    assign to four separate but interlinked pages: one each for inserting, updating,
    and deleting records, plus a list of existing records. The list of records serves
    two purposes: first, to identify what’s stored in the database and, more important,
    to link to the update and delete scripts by passing the record’s primary key through
    a query string.


    The `blog` table contains a series of titles and text articles to be displayed
    in the Japan Journey site, as shown in Figure [13-1](#A978-1-4842-0635-5_13_Chapter.html#Fig1).
    In the interests of keeping things simple, the table contains just five columns:
    `article_id` (primary key), `title`, `article`, `created`, and `updated`.


    ![A978-1-4842-0635-5_13_Fig1_HTML.jpg](A978-1-4842-0635-5_13_Fig1_HTML.jpg)


    Figure 13-1.


    The contents of the `blog` table displayed in the Japan Journey website'
