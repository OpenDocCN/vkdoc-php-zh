    **CHAPTER 6**


    **Strings**


    Strings are one of the basic variable types in PHP. They are typically used to
    build the output of a PHP script that is returned as a response to a HTTP request.


    A string is a series of characters where each character is defined as a single
    byte with ordinal values form 0 to 255\. The single byte limitation makes it impossible
    to have native Unicode support for strings.


    The mb_string extension makes it possible to work with Unicode (Multi Byte strings)
    in PHP, but these are not handled with the native variable type and native string
    manipulation functions.


    Strings in PHP can be up to 2Gb long on a 32-bit system. This requires PHP to
    be configured with enough memory to handle variables of this size. From PHP version
    7 all integers provides true 64-bit support allowing the size of strings (and
    files) to be much larger than the previous 2Gb limit.


    Strings are stored as a memory block and a length, which allows for binary safe
    strings. A binary safe string can contain one or more null bytes without causing
    any problems of losing a portion of the string.


    Recipe 6-1\. Creating Strings


    Problem


    Strings can be created in a number of different ways: assigning a value defined
    with single or double quotes or the return value from one of the many functions
    that return a string.


    Solution


    The str_repeat() and str_pad() are two of the functions that can be used to generate
    a string. The first one generates a string with a pattern of one or more characters
    repeated a number of times. The second adds a specific string to another string
    as padding either before or after in order to create a string of a specific length.


    For a given string it''s possible to change the order of the characters to generate
    a new string with the same characters but in random order. The function str_shuffle()
    acts like array_shuffle() ; it takes all the elements and puts them in a random
    order.


    How it Works


    In the first example we have strings that contain times. Because the number of
    digits in the two times are different the overall length of the two strings are
    not the same. In order to print the two strings so the numbers align we would
    have to pad the two strings with spaces or zeros.


