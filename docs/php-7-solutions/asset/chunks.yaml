  trans: "\n# 嵌套包含文件\n\n当一个文件被包含到另一个文件中时，相对路径是基于父文件计算的，而不是基于被包含的文件。这给需要包含另一个外部文件的外部函数或类定义带来了问题。\n\
    \n如果两个外部文件位于同一文件夹中，你可以仅使用文件名来包含嵌套文件，如下所示：\n\n```php\nrequire_once 'Thumbnail.php';\n\
    ```\n\n在这种情况下，相对路径*不应*以 `./` 开头，因为 `./` 表示“从当前文件夹开始”。对于包含文件而言，“当前文件夹”指的是父文件的文件夹，而非包含文件本身的文件夹，这会导致嵌套文件的路径错误。\n\
    \n当包含文件位于不同文件夹时，你可以使用 PHP 常量 `__DIR__` 为目标文件构建绝对路径。该常量返回包含文件所在目录（文件夹）的绝对路径，且不带尾部斜杠。将\
    \ `__DIR__`、一个正斜杠和文档相对路径拼接起来，即可将相对路径转换为绝对路径。例如，假设这是从一个包含文件到另一个包含文件的相对路径：\n\n```php\n\
    '../File/Upload.php'\n```\n\n你可以像这样将其转换为绝对路径：\n\n```php\n__DIR__ . '/../File/Upload.php'\n\
    ```\n\n在文档相对路径开头添加正斜杠的效果是：先找到包含文件的父文件夹，然后向上跳一级以找到正确的路径。在第 10 章中你将看到一个这样的实际示例，其中某个包含文件需要包含另一个位于不同文件夹的文件。\n\
    \n# 章节回顾\n\n本章将你直接带入 PHP 的世界，涵盖了 include、数组和多维数组的使用。本章向你展示了如何提取当前页面名称、显示随机图像以及获取图像尺寸。你还学习了如何抛出和捕获异常，以及如何重定向到另一个页面。内容很多，所以如果第一次没有完全理解也不要担心。你使用\
    \ PHP 越多，就会对基本技术越熟悉。在下一章中，你将学习 PHP 如何处理来自在线表单的输入，并利用该知识将网站反馈发送到你的电子邮箱。\n\n# 让表单活起来\n\
    \n表单是使用 PHP 的核心所在。你使用表单登录受限页面、注册新用户、在线商店下单、在数据库中输入和更新信息、发送反馈……用途不胜枚举。所有这些用途背后遵循相同的原理，因此本章所学知识在大多数\
    \ PHP 应用程序中都具有实用价值。为了演示如何处理表单信息，我将向你展示如何收集网站访问者的反馈并将其发送到你的邮箱。\n\n遗憾的是，用户输入可能会使你的网站遭受恶意攻击。在接受表单提交的数据之前，检查数据非常重要。尽管\
    \ HTML5 表单元素在现代浏览器中会验证用户输入，但你仍然需要在服务器端检查数据。HTML5 验证有助于合法用户避免提交包含错误的表单，但恶意用户可以轻易绕过浏览器执行的检查。服务器端验证不是可选项，而是必不可少的。本章中的\
    \ PHP 解决方案将向你展示如何过滤或阻止任何可疑或危险的内容。没有任何在线应用程序能够完全免疫黑客攻击，但付出少量努力即可抵御除最顽固攻击者之外的所有威胁。同时，在表单不完整或发现错误时，保留用户输入并重新显示也是一个好做法。\n\
    \n这些解决方案构建了一个完整的邮件处理脚本，可用于不同的表单，因此务必按顺序阅读。\n\n在本章中，你将了解以下内容：\n\n- 理解用户输入如何从在线表单传输\n\
    - 在不丢失用户输入的情况下显示错误\n- 验证用户输入\n- 通过电子邮件发送用户输入\n\n## PHP 如何从表单收集信息\n\n虽然 HTML 包含了构建表单所需的所有标签，但它不提供提交表单时的任何处理方法。为此，你需要一个服务器端解决方案，例如\
    \ PHP。\n\nJapan Journey 网站包含一个简单的反馈表单（见图 6-1）。其他元素——如单选按钮、复选框和下拉菜单——将在后续添加。\n\n\
    ![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig1_HTML.jpg](img/332054_4_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1. 处理反馈表单是 PHP 最流行的用途之一\n\n首先，让我们看一下表单的 HTML 代码（位于 `ch06` 文件夹的 `contact_01.php`\
    \ 文件中）：\n\n```html\n<form method=\"post\" action=\"\">\n    <p>\n        <label\
    \ for=\"name\">名称：</label>\n        <input type=\"text\" name=\"name\" id=\"name\"\
    >\n    </p>\n    <p>\n        <label for=\"email\">电子邮箱：</label>\n        <input\
    \ type=\"text\" name=\"email\" id=\"email\">\n    </p>\n    <p>\n        <label\
    \ for=\"comments\">留言：</label>\n        <textarea name=\"comments\" id=\"comments\"\
    \ cols=\"30\" rows=\"10\"></textarea>\n    </p>\n    <p>\n        <input type=\"\
    submit\" name=\"send\" id=\"send\" value=\"发送消息\">\n    </p>\n</form>\n```\n\n\
    前两个 `<input>` 标签和 `<textarea>` 标签的 `name` 和 `id` 属性都设置为相同的值。重复设置的原因是为了可访问性。HTML\
    \ 使用 `id` 属性将 `<label>` 元素与正确的 `<input>` 元素关联起来。然而，表单处理脚本依赖于 `name` 属性。因此，虽然 `id`\
    \ 属性在提交按钮中是可选的，但对于你想要处理的每个表单元素，你*必须*使用 `name` 属性。\n\n**注意：** 表单输入元素的 `name` 属性通常不应包含空格。如果要组合多个单词，请使用下划线连接（如果留空格，PHP\
    \ 会自动处理）。由于本章后续开发的脚本会将 `name` 属性转换为 PHP 变量，因此不要使用连字符或任何在 PHP 变量名中无效的字符。\n\n另外需要注意的两点是开始\
    \ `<form>` 标签中的 `method` 和 `action` 属性。`method` 属性决定表单如何发送数据。它可以设置为 `post` 或 `get`。`action`\
    \ 属性告诉浏览器在点击提交按钮时将数据发送到哪里进行处理。如果该值为空（如此处所示），页面将尝试自行处理表单。然而，在 HTML5 中，空的 `action`\
    \ 属性是无效的，因此需要修复。\n\n**注意：** 我刻意避免使用任何新的 HTML5 表单特性，如 `type=\"email\"` 和 `required`\
    \ 属性。这样可以更容易地测试 PHP 服务器端验证脚本。测试完成后，你可以更新表单以使用 HTML5 验证功能。浏览器端的验证主要是为了方便用户，防止提交不完整的信息，因此它是可选的。服务器端验证则绝不可跳过。\n\
    \n### 理解 `post` 和 `get` 之间的区别\n\n演示 `post` 和 `get` 方法之间区别的最佳方式是使用一个真实的表单。如果你完成了上一章，可以继续使用相同的文件。\n\
