    = 1`的条目有两个评论。这种关系在关系数据库术语中称为*一对多关系*。


    ### 使用外键


    在建立两个表之间的关系时，使用*外键*非常常见。您可以在前面的SQL语句中看到如何声明外键。但它究竟有什么用呢？外键也是对*外部*表中*主键*列的*引用*。在前面的例子中，评论表的`entry_id`是对`blog_entry`表的`entry_id`列的引用。外键有助于维护数据完整性，因为评论表只接受那些能在`blog_entry`表中找到相应`entry_id`的评论。换句话说，评论表只接受与已存在的博客条目相关的评论。


    ### 构建Comment_Table类


    现在让我们为评论创建模型，该模型将用于访问数据库中的新评论表。我们继续使用表数据网关设计，它提供了从PHP代码到单个数据库表的单一访问点。`Blog_Entry_Table`类包含几个我们也会在评论表中使用的项目。这包括接受PDO对象的构造函数，以及将执行我们新SQL语句的`executeSQL()`方法。我们可以简单地将重用的代码复制到新类中。然而，这不是代码效率。这种情况为我们提供了另一个学习新东西的机会：使用*继承*来在不同类之间共享公共代码。


    ### 继承


