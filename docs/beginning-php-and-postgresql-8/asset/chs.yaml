  \ PHP 根安装目录下的 PEAR 目录结构中的适当位置是合理的。如果您被迫采用此方式以规避 ISP 限制，那么在您的主目录中创建一个 PEAR 目录即可。无论如何，请确保该目录位于\
  \ `include_path` 中。\n\n现在软件包应该已经可以使用了，请继续阅读下一节了解如何使用。\n\n### 使用软件包\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循注意事项，将您提供的英文文本翻译成中文。\n\
