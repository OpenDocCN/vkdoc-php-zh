- fmt: '### Consequences


    If you’re anything like me, you would have heard alarm bells ringing when you
    saw the code extract for the `Archer` class. Why do we put up with these redundant
    `addUnit()` and `removeUnit()` methods in leaf classes that do not need to support
    them? An answer of sorts lies in the transparency of the `Unit` type.


    If a client is passed a `Unit` object, it knows that the `addUnit()` method will
    be present. The Composite pattern principle that primitive (leaf) classes have
    the same interface as composites is upheld. This does not actually help you much
    because you still do not know how safe you might be calling `addUnit()` on any
    `Unit` object you might come across.


    If I move these add/remove methods down so that they are available only to composite
    classes, then passing a `Unit` object to a method leaves me with the problem that
    I do not know by default whether or not it supports `addUnit()`. Nevertheless,
    leaving booby-trapped methods lying around in leaf classes makes me uncomfortable.
    It adds no value and confuses a system’s design because the interface effectively
    lies about its own functionality.


    You can split composite classes off into their own `CompositeUnit` subtype quite
    easily. First of all, I excise the add/remove behavior from `Unit`:


    ```

    // listing 10.13

    abstract class Unit

    {

    public function getComposite()

    {

    return null;

    }

    abstract public function bombardStrength(): int;

    }

    ```


    Notice the new `getComposite()` method. I will return to this in a little while.
    Now, I need a new abstract class to hold `addUnit()` and `removeUnit()`. I can
    even provide default implementations:


    ```

    // listing 10.14

    abstract class CompositeUnit extends Unit

    {

    private $units = [];

    public function getComposite(): CompositeUnit

    {

    return $this;

    }

    public function addUnit(Unit $unit)

    {

    if (in_array($unit, $this->units, true)) {

    return;

    }

    $this->units[] = $unit;

    }

    public function removeUnit(Unit $unit)

    {

    $idx = array_search($unit, $this->units, true);

    if (is_int($idx)) {

    array_splice($this->units, $idx, 1, []);

    }

    }

    public function getUnits(): array

    {

    return $this->units;

    }

    }

    ```


    The `CompositeUnit` class is declared abstract, even though it does not itself
    declare an abstract method. It does, however, extend `Unit`, and it does not implement
    the abstract `bombardStrength()` method. `Army` (and any other composite classes)
    can now extend `CompositeUnit`. The classes in my example are now organized as
    in Figure [10-2](#A314621_5_En_10_Chapter.html#Fig2).


    ![A314621_5_En_10_Fig2_HTML.gif](A314621_5_En_10_Fig2_HTML.gif)


    Figure 10-2. Moving add/remove methods out of the base class


    The annoying, useless implementations of add/remove methods in the leaf classes
    are gone, but the client must still check to see whether it has a `CompositeUnit`
    before it can use `addUnit()`.


    This is where the `getComposite()` method comes into its own. By default, this
    method returns a null value. Only in a `CompositeUnit` class does it return `CompositeUnit`.
    So if a call to this method returns an object, we should be able to call `addUnit()`
    on it. Here’s a client that uses this technique:


    ```

    // listing 10.15

    class UnitScript

    {

    public static function joinExisting(

    Unit $newUnit,

    Unit $occupyingUnit

    ): CompositeUnit {

    $comp = $occupyingUnit->getComposite();

    if (! is_null($comp)) {

    $comp->addUnit($newUnit);

    } else {

    $comp = new Army();

    $comp->addUnit($occupyingUnit);

    $comp->addUnit($newUnit);

    }

    return $comp;

    }

    }

    ```


    The `joinExisting()` method accepts two `Unit` objects. The first is a newcomer
    to a tile, and the second is a prior occupier. If the second `Unit` is a `CompositeUnit`,
    then the first will attempt to join it. If not, then a new `Army` will be created
    to cover both units. I have no way of knowing at first whether the `$occupyingUnit`
    argument contains a `CompositeUnit`. A call to `getComposite()` settles the matter,
    though. If `getComposite()` returns an object, I can add the new `Unit` object
    to it directly. If not, I create the new `Army` object and add both.


    I could simplify this model further by having the `Unit::getComposite()` method
    return an `Army` object prepopulated with the current `Unit`. Or I could return
    to the previous model (which did not distinguish structurally between composite
    and leaf objects) and have `Unit::addUnit()` do the same thing: create an `Army`
    object and add both `Unit` objects to it. This is neat, but it presupposes that
    you know in advance the type of composite you would like to use to aggregate your
    units. Your business logic will determine the kinds of assumptions you can make
    when you design methods like `getComposite()` and `addUnit()`.


    These contortions are symptomatic of a drawback to the Composite pattern. Simplicity
    is achieved by ensuring that all classes are derived from a common base. The benefit
    of simplicity is sometimes bought at a cost to type safety. The more complex your
    model becomes, the more manual type checking you are likely to have to do. Let’s
    say that I have a `Cavalry` object. If the rules of the game state that you cannot
    put a horse on a troop carrier, I have no automatic way of enforcing this with
    the Composite pattern:


    ```

    // listing 10.16

    class TroopCarrier extends CompositeUnit

    {

    public function addUnit(Unit $unit)

    {

    if ($unit instanceof Cavalry) {

    throw new UnitException("Can''t get a horse on the vehicle");

    }

    parent::addUnit($unit);

    }

    public function bombardStrength(): int

    {

    return 0;

    }

    }

    ```


    I am forced to use the `instanceof` operator to test the type of the object passed
    to `addUnit()`. If you have too many special cases of this kind, the drawbacks
    of the pattern begin to outweigh its benefits. Composite works best when most
    of the components are interchangeable.


    Another issue to bear in mind is the cost of some Composite operations. The `Army::bombardStrength()`
    method is typical in that it sets off a cascade of calls to the same method down
    the tree. For a large tree with lots of subarmies, a single call can cause an
    avalanche behind the scenes. `bombardStrength()` is not itself very expensive,
    but what would happen if some leaves performed a complex calculation to arrive
    at their return values? One way around this problem is to cache the result of
    a method call of this sort in the parent object, so that subsequent invocations
    are less expensive. You need to be careful, though, to ensure that the cached
    value does not grow stale. You should devise strategies to wipe any caches whenever
    any operations take place on the tree. This may require that you give child objects
    references to their parents.


    Finally, a note about persistence. The Composite pattern is elegant, but it doesn’t
    lend itself neatly to storage in a relational database. This is because, by default,
    you access the entire structure only through a cascade of references. To construct
    a Composite structure from a database in the natural way, you would have to make
    multiple expensive queries. You can get around this problem by assigning an ID
    to the whole tree, so that all components can be drawn from the database in one
    go. Having acquired all the objects, however, you would still have the task of
    recreating the parent/child references, which themselves would have to be stored
    in the database. This is not difficult, but it is somewhat messy.


    Although Composites sit uneasily with relational databases, they lend themselves
    very well indeed to storage in XML. This is because XML elements are often themselves
    composed of trees of subelements.'
  raw: '### Consequences


    If you’re anything like me, you would have heard alarm bells ringing when you
    saw the code extract for the `Archer` class. Why do we put up with these redundant
    `addUnit()` and `removeUnit()` methods in leaf classes that do not need to support
    them? An answer of sorts lies in the transparency of the `Unit` type.


    If a client is passed a `Unit` object, it knows that the `addUnit()` method will
    be present. The Composite pattern principle that primitive (leaf) classes have
    the same interface as composites is upheld. This does not actually help you much
    because you still do not know how safe you might be calling `addUnit()` on any
    `Unit` object you might come across.


    If I move these add/remove methods down so that they are available only to composite
    classes, then passing a `Unit` object to a method leaves me with the problem that
    I do not know by default whether or not it supports `addUnit()`. Nevertheless,
    leaving booby-trapped methods lying around in leaf classes makes me uncomfortable.
    It adds no value and confuses a system’s design because the interface effectively
    lies about its own functionality.


    You can split composite classes off into their own `CompositeUnit` subtype quite
    easily. First of all, I excise the add/remove behavior from `Unit`:


    ```

    // listing 10.13

    abstract class Unit

    {

    public function getComposite()

    {

    return null;

    }

    abstract public function bombardStrength(): int;

    }

    ```


    Notice the new `getComposite()` method . I will return to this in a little while.
    Now, I need a new abstract class to hold `addUnit()` and `removeUnit()`. I can
    even provide default implementations:


    ```

    // listing 10.14

    abstract class CompositeUnit extends Unit

    {

    private $units = [];

    public function getComposite(): CompositeUnit

    {

    return $this;

    }

    public function addUnit(Unit $unit)

    {

    if (in_array($unit, $this->units, true)) {

    return;

    }

    $this->units[] = $unit;

    }

    public function removeUnit(Unit $unit)

    {

    $idx = array_search($unit, $this->units, true);

    if (is_int($idx)) {

    array_splice($this->units, $idx, 1, []);

    }

    }

    public function getUnits(): array

    {

    return $this->units;

    }

    }

    ```


    The `CompositeUnit` class is declared abstract, even though it does not itself
    declare an abstract method. It does, however, extend `Unit`, and it does not implement
    the abstract `bombardStrength()` method. `Army` (and any other composite classes)
    can now extend `CompositeUnit`. The classes in my example are now organized as
    in Figure [10-2](#A314621_5_En_10_Chapter.html#Fig2).


