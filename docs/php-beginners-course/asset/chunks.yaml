    \ are stored in variables. Of course, it would also be possible to use the `$_GET`\
    \ array directly in the `if` function, but that would make the code more complicated.\n\
    \nIf a visitor in the URL has transmitted the correct login information, we welcome\
    \ him as an administrator, otherwise, we will check if he has, at least, entered\
    \ the user name correctly. If the username and password are incorrect, we will\
    \ give an error message.\n\n**Output when calling** `script.php?username=admin&password=mystrongandsecretpassword`\
    \  \nWelcome Administrator!\n\n**Output when calling** `script.php?username=admin&password=xxx`\
    \  \nHello administrator, unfortunately, you have entered the password incorrectly!\n\
    \n**Output when calling** `script.php?username=abc&password=xxx`  \nError: The\
    \ login data entered were incorrect!\n\nIf the contents of a variable do not matter,\
    \ and we just want to check if a variable has any content, then we can accomplish\
    \ this as follows:\n\n```php\n<?php\n$myTrueValue = \"myTest\";\nif ($myTrueValue)\
    \ {\n    echo 1;\n}\nelse {\n    echo 0;\n}\n\necho \"<br />\";\n\n$myTrueValue\
    \ = \"\";\nif ($myTrueValue) {\n    echo 1;\n}\nelse {\n    echo 0;\n}\n?>\n```\n\
    \n**Output:**  \nIn the first query, if the variable has a content, then the `if`\
    \ block and not the `else` block is executed. In the second review, the variable\
    \ is empty. When you do not test any condition like `==` or `!=`, ..., it is checked\
    \ whether the variable is empty or contains a Boolean value. A Boolean value consists\
    \ in programming as a variable or a value of `true` or `false`, it can also be\
    \ written as `1` or `0`.\n\nHere, the previous example is slightly extended:\n\
    \n```php\n<?php\n$myTrueValue = \"myTest\";\nif ($myTrueValue) {\n    echo 1;\n\
    }\nelse {\n    echo 0;\n}\n\necho \"<br />\";\n\n$myTrueValue = false;\nif ($myTrueValue)\
    \ {\n    echo 1;\n}\nelse {\n    echo 0;\n}\n\necho \"<br />\";\n\n$myTrueValue\
    \ = 0;\nif ($myTrueValue) {\n    echo 1;\n}\nelse {\n    echo 0;\n}\n?>\n```\n\
    \n**Output:**  \n...\n\nFurthermore, it is often important to know whether a variable\
    \ exists at all and is, therefore, initialised in the program already:\n\n```php\n\
    <?php\n$myVar = \"123\";\nif (isset($myVar)) {\n    echo \"myVar exists\";\n}\n\
    else {\n    echo \"myVar does not exist\";\n}\n?>\n```\n\n**Output:**  \n`myVar`\
    \ exists\n\n```php\n<?php\n$myVar = \"123\";\nif (isset($otherVar)) {\n    echo\
    \ \"myVar exists\";\n}\nelse {\n    echo \"myVar does not exists\";\n}\n?>\n```\n\
    \n**Output:**  \n`otherVar` does not exists\n\n## Case analysis (`switch` / `case`)\n\
    \nLet us suppose we have a variable and want to check for many different contents.\
    \ We already know the function of `if`, `elseif` and `else`. However, it may quickly\
    \ become confusing; moreover, it is easier to write a redundant code to check\
    \ only a single variable. There is the practical function `switch` `case` which\
    \ is programmed as follows:\n\n```php\n<?php\n$username = $_GET[\"username\"];\n\
    switch ($username) {\n    case \"Klaus\":\n        echo \"Hello administrator!\"\
    ;\n        break;\n    case \"Dagmar\":\n        echo \"Hello sister!\";\n   \
    \     break;\n    case \"Bill Gates\":\n        echo \"Hello richest man in the\
    \ world!\";\n        break;\n    default:\n        echo \"Hello visitor!\";\n\
    \        break;\n}\n?>\n```\n\nAs we see, the head of the `switch` function is\
    \ pretty similar to the `if` function; it just has no parameters defined. Thereafter,\
    \ each multiple `case` block must be completed with a `break;` that breaks the\
    \ review on to other cases.\n\nIf, in neither case, the condition is met, the\
    \ `default` block is executed. If you do not use breaks, you could run the same\
    \ for two or more case code blocks:\n\n```php\n<?php\n$username = $_GET[\"username\"\
    ];\nswitch ($username) {\n    case \"Klaus\":\n    case \"Dagmar\":\n        echo\
    \ \"Hello administrator!\";\n        break;\n    case \"Bill Gates\":\n      \
    \  echo \"Hello richest man in the world!\";\n        break;\n    default:\n \
    \       echo \"Hello visitor!\";\n        break;\n}\n?>\n```\n\n## Loops for repetitive\
    \ tasks (`While` / `For` / `Foreach`)\n\n### `While()` Loop\n\nOften, there are\
    \ tasks for our script to be repeated many times. This could be, for example,\
    \ a kind of numbering in a particular order:\n\n```php\n<?php\n$number = 1;\n\
    while ($number < 100) {\n    echo $number . \"<br />\";\n    $number++;\n}\n?>\n\
    ```"
