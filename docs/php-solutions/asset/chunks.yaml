  trans: "  \n### PHP 解决方案 17-1：创建用户注册表单\n\n本 PHP 解决方案展示了如何改编第 9 章中的注册脚本，使其能与 MySQL\
    \ 或 MariaDB 协同工作。它使用了 PHP 解决方案 9-6 中的 `CheckPassword` 类和 PHP 解决方案 9-7 中的 `register_user_csv.php`。\n\
    \n如有必要，将 `ch17/PhpSolutions/Authenticate` 文件夹中的 `CheckPassword.php` 复制到 `phpsols`\
    \ 站点根目录下的 `PhpSolutions/Authenticate` 文件夹中，并将 `ch17` 文件夹中的 `register_user_csv.php`\
    \ 复制到 `includes` 文件夹中。你还应阅读 PHP 解决方案 9-6 和 9-7 中的说明，以了解原始脚本的工作原理。\n\n![A978-1-4842-0635-5_17_Figa_HTML.jpg](img/A978-1-4842-0635-5_17_Figa_HTML.jpg)\n\
    \n将 `ch17` 文件夹中的 `register_db.php` 复制到 `phpsols` 站点根目录下名为 `authenticate` 的新文件夹中。该页面包含与第\
    \ 9 章相同的基本用户注册表单，含用户名文本输入字段、密码字段、确认密码字段以及提交数据的按钮，如下方截图所示：\n\n在 `DOCTYPE` 声明上方的\
    \ PHP 代码块中添加以下代码：\n\n```\nif (isset($_POST['register'])) {\n$username = trim($_POST['username']);\n\
    $password = trim($_POST['pwd']);\n$retyped = trim($_POST['conf_pwd']);\nrequire_once\
    \ '../includes/register_user_mysqli.php';\n}\n```\n\n这与 PHP 解决方案 9-7 中的代码非常相似。如果表单已提交，用户输入将去除首尾空白字符并赋值给简单变量。然后包含一个名为\
    \ `register_user_mysqli.php` 的外部文件。如果计划使用 PDO，请将包含文件命名为 `register_user_pdo.php`。\n\
    \n处理用户输入的文件基于你在第 9 章中创建的 `register_user_csv.php`。复制你的原始文件，并将其保存到 `includes` 文件夹中，命名为\
    \ `register_user_mysqli.php` 或 `register_user_pdo.php`。\n\n在你刚刚复制并重命名的文件中，找到如下开头的条件语句（大约在第\
    \ 24 行）：\n\n```\nif (!$errors) {\n// 使用默认加密方式加密密码\n$password = password_hash($password,\
    \ PASSWORD_DEFAULT);\n```\n\n删除条件语句中剩余的部分。现在条件语句应如下所示：\n\n```\nif (!$errors) {\n\
    // 使用默认加密方式加密密码\n$password = password_hash($password, PASSWORD_DEFAULT);\n}\n\
    ```\n\n将用户详细信息插入数据库的代码写在条件语句内部。首先包含数据库连接文件，并建立具有读写权限的连接。\n\n```\nif (!$errors)\
    \ {\n// 使用默认加密方式加密密码\n$password = password_hash($password, PASSWORD_DEFAULT);\n\
    // 包含连接文件\nrequire_once 'connection.php';\n$conn = dbConnect('write');\n}\n```\n\
    \n连接文件同样位于 `includes` 文件夹中，因此只需文件名即可。对于 PDO，向 `dbConnect()` 添加 `'pdo'` 作为第二个参数。\n\
    \n代码的最后部分准备并执行预处理语句，以将用户详细信息插入数据库。由于 `username` 列具有 `UNIQUE` 索引，如果用户名已存在，查询将失败。如果发生这种情况，代码需要生成错误消息。MySQLi\
    \ 和 PDO 的代码有所不同。\n\n对于 MySQLi，添加以下加粗显示的代码：\n\n```\nif (!$errors) {\n// 使用默认加密方式加密密码\n\
    $password = password_hash($password, PASSWORD_DEFAULT);\n// 包含连接文件\nrequire_once\
    \ 'connection.php';\n$conn = dbConnect('write');\n// 准备 SQL 语句\n$sql = 'INSERT\
