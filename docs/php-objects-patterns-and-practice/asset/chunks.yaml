  trans: '

    # 文档、构建、测试与版本控制


    尽管文档、构建、测试和版本控制这类议题比设计模式更为实际，但它们的重要性丝毫不减。在现实世界中，如果多个开发者无法方便地贡献代码或理解源码，一个绝妙的设计也无法存活。没有自动化测试，系统将变得难以维护和扩展。没有构建工具，没人会费心部署你的工作成果。随着
    PHP 用户群体的扩大，我们作为开发者确保质量和易部署性的责任也随之增加。


    一个项目存在于两种模式之中。它既是代码与功能的结构，也是一组文件和目录、一个合作基础、一系列源和目标、以及一个需要转换的对象。从这个意义上说，项目的外部系统与它的内部代码同样重要。构建、测试、文档和版本控制的机制所需的细节关注，与这些机制所支持的代码本身相同。请以对待系统本身同样的热忱来关注这个元系统。


    ## 测试


    虽然测试是从外部应用于项目的框架组成部分，但它与代码本身紧密集成。因为完全解耦既不可能也不可取，测试框架是监控变更影响的有力手段。更改某个方法的返回类型可能会影响其他地方的客户端代码，导致在变更数周或数月后出现错误。测试框架让你有几分机会捕捉到这类错误（测试越好，几率越高）。


    测试同样是改进面向对象设计的工具。先测试（或至少同时测试）有助于你专注于类的接口，并仔细思考每个方法的职责和行为。我在第 18 章中介绍了用于测试的 `PHPUnit`。


    ## 标准


    我天性爱唱反调。我讨厌被命令去做什么。像*合规*这样的词会立刻在我心中激起战或逃的反应。但矛盾的是，标准实际上推动了创新。这是因为它们促进了互操作性。互联网的兴起部分得益于其核心内建了开放标准。网站可以互相链接，Web
    服务器可以在任何领域复用，因为协议是众所周知且被遵循的。一个孤岛中的解决方案可能优于广泛接受和应用的标准，但如果孤岛被烧毁了呢？如果它被收购，新所有者决定收费访问呢？当一些人认为隔壁的孤岛更好时会发生什么？我在第
    16 章中讨论了 PSR（PHP 标准建议）。我特别关注了自动加载的标准，这些标准极大地改善了 PHP 开发者包含类的方式。我还介绍了 `PSR-2`（编码风格标准）。程序员对于大括号的位置和参数列表的排列有强烈的感受，但同意遵守一套共同规则能带来可读且一致的代码，并允许我们使用工具检查和重新格式化源文件。本着这种精神，我重新格式化了本版中的所有代码示例以符合
    `PSR-2`。


    ## 版本控制


    协作是困难的。让我们面对现实：人本身就很难搞。程序员则更糟。一旦你理清了团队中的角色和任务，你最不想处理的就是源代码本身的冲突。正如你在第 17 章中看到的，`Git`（以及类似的工具如
    `CVS` 和 `Subversion`）使你能够将多个程序员的工作合并到一个仓库中。当冲突不可避免时，`Git` 会标记出问题并引导你到源码位置进行修复。


    即使你是单兵作战的程序员，版本控制也是必需的。`Git` 支持分支，这样你可以同时维护一个软件版本并开发下一个版本，将稳定版本的缺陷修复合并到开发分支中。


    `Git` 还提供了项目中每项提交的记录。这意味着你可以按日期或标签回滚到任意时刻。相信我，这总有一天会拯救你的项目。


    ## 自动化构建


    没有自动化构建的版本控制作用有限。任何具有一定复杂度的项目都需要花费精力来部署。各种文件需要被移动到系统上的不同位置，配置文件需要被转换以匹配当前平台和数据库的正确值，数据库表需要被设置或转换。我介绍了两种用于安装的工具。第一个是
    `Composer`（见第 15 章），它非常适合独立的包和小型应用。我介绍的第二个构建工具是 `Phing`（见第 19 章），这是一个功能强大且灵活的工具，足以自动化部署最庞大、最错综复杂的项目。


    自动化构建将部署从一项杂务转变为在命令行敲入一两行命令的事情。你只需付出很少的努力，就可以从构建工具中调用测试框架并生成文档输出。如果开发者自身的需求还不足以打动你，那就想想当用户发现每次你发布新版本时，他们不再需要花费整个下午来复制文件和修改配置字段时，他们那令人无比感激的欢呼声吧。


    ## 持续集成


    仅仅能测试和构建一个项目是不够的；你必须一直这么做。随着项目复杂度的增长以及你管理多个分支，这一点变得越来越重要。你应该构建和测试你用于发布小缺陷修复的稳定分支、一两个实验性的开发分支以及你的主树干。如果你试图手动完成所有这些，即使有构建和测试工具的帮助，你永远也腾不出手来进行编码。当然，所有程序员都讨厌那样，因此构建和测试不可避免地会被偷工减料。


    在第 20 章中，我探讨了持续集成——这是一种实践和一套工具，旨在尽可能自动化构建和测试流程。


    ## 我遗漏的内容


    由于时间和篇幅限制，我不得不从本书中省略一些工具类别，尽管如此，它们对于任何项目都极其有用。在大多数情况下，手头的任务有不止一个好工具可用，因此，尽管我会建议一两个，但你在做出选择之前，可能希望花些时间与其他开发者交流，并用你喜爱的搜索引擎深入挖掘。


    如果你的项目有不止一个开发者，或者哪怕只有一个活跃的客户，那么你将需要一个工具来跟踪缺陷和任务。与版本控制一样，缺陷跟踪器是那种一旦你在项目上尝试过就无法想象不用的生产力工具。跟踪器允许用户报告项目问题，但同样常被用作描述所需功能并将实现任务分配给团队成员的手段。


    你可以随时获取开放任务的概览，并根据产品、任务负责人、版本号和优先级缩小搜索范围。每个任务都有自己的页面，你可以在其中讨论任何正在处理的问题。讨论记录和任务状态变更可以通过邮件抄送给团队成员，因此无需一直访问跟踪器的
    URL 也能轻松掌握进展。


    '
- fmt: 'There are many tools out there. Even after all this time, though, I usually
    return to the venerable Bugzilla (`http://www.bugzilla.org`). Bugzilla is free
    and open source, and has all the features most developers could need. It is a
    downloadable product, so you will have to run it on your own server. It still
    looks a little Web 1.0, but it’s none the worse for that. If you do not want to
    host your own tracker, and you have or prefer your interfaces a little prettier
    (and have deeper pockets), you might look at the Atlassian’s SAAS solution, Jira
    (`https://www.atlassian.com/software/jira`).


    For high level task tracking and project planning (especially if you’re interested
    in using a Kanban system), you might also look at Trello (`http://www.trello.com`).


    A tracker is generally just one of a suite of collaboration tools you will want
    to use to share information around a project. At a price, you can use an integrated
    solution such as Basecamp (`https://basecamp.com/`) or Atlassian tools (`https://www.atlassian.com/`).
    Or you may choose to stitch together a tools ecosystem using a variety of tools.
    To facilitate communication within your team, for example, you will probably need
    a mechanism for chat or messaging. Perhaps the most popular tool for this at the
    time of this writing is Slack (`https://www.slack.com`). Slack is a multi-roomed
    web-based chat environment. If you’re old school like me, you might instantly
    think of IRC (Internet Relay Chat)—and you’d be right: there’s little you can
    do with Slack that you couldn’t do with IRC. Except that Slack is browser-based,
    easy-to-use, and has integration with other services already built-in. Slack is
    free unless you need premium features.


    Speaking of old school, you might also consider using a mailing list for your
    project. My favorite mailing list software is Mailman (`http://www.gnu.org/software/mailman/`),
    which is free, relatively easy to install, and highly configurable.


    For co-operatively editable text documents and spreadsheets, Google Docs (`https://docs.google.com/`)
    is probably the easiest solution.


    Your code is not as clear as you think it is. A stranger visiting a codebase for
    the first time can be faced with a daunting task. Even you, as author of the code,
    will eventually forget how it all hangs together. For inline documentation, you
    should look at phpDocumentor (`https://www.phpdoc.org/`) which allows you to document
    as you go, and automatically generates hyperlinked output. The output from phpDocumentor
    is particularly useful in an object-oriented context, as it allows the user to
    click around from class to class. As classes are often contained in their own
    files, reading the source directly can involve following complex trails from source
    file to source file.


    Although inline documentation is important, projects also generate a broiling
    heap of written material. This includes usage instructions, consultation on future
    directions, client assets, meeting minutes, and party announcements. During the
    lifetime of a project, such materials are very fluid, and a mechanism is often
    needed to allow people to collaborate in their evolution.


    A wiki (wiki is apparently Hawaiian for “very fast”) is the perfect tool for creating
    collaborative webs of hyperlinked documents. Pages can be created or edited at
    the click of a button, and hyperlinks are automatically generated for words that
    match page names. A wiki is another one of those tools that seems so simple, essential,
    and obvious that you are sure you probably had the idea first, but just didn’t
    get around to doing anything about it. There are a number of wikis to choose from.
    I have had good experience with PhpWiki, which can be downloaded from `http://phpwiki.sourceforge.net`,
    and DokuWiki, which you can find at `http://wiki.splitbrain.org/wiki:dokuwiki`.


    ## Summary


    In this chapter I wrapped things up, revisiting the core topics that make up the
    book. Although I haven’t tackled any concrete issues such as individual patterns
    or object functions here, this chapter should serve as a reasonable summary of
    this book’s concerns.


    There is never enough room or time to cover all the material that one would like.
    Nevertheless, I hope that this book has served to make one argument: PHP is growing
    up. It is now one of the most popular programming languages in the world. I hope
    that PHP remains the hobbyist’s favorite language, and that many new PHP programmers
    are delighted to discover how far they can get with just a little code. At the
    same time, though, more and more professional teams are building large systems
    with PHP. Such projects deserve more than a just-do-it approach. Through its extension
    layer, PHP has always been a versatile language, providing a gateway to hundreds
    of applications and libraries. Its object-oriented support, on the other hand,
    gains you access to a different set of tools. Once you begin to think in objects,
    you can chart the hard-won experience of other programmers. You can navigate and
    deploy pattern languages developed with reference, not just to PHP, but to Smalltalk,
    C++, C#, or Java, too. It is our responsibility to meet this challenge with careful
    design and good practice. The future is reusable.


