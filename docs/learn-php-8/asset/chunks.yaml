    The dog_container.php file

    ```


    First, at the top of the class (`dog_container`), we declare two private properties
    — `$app` and `$dog_location`. These properties are declared as private, instead
    of public, to keep their values only known within this class.


    In the constructor, `$value` accepts a name of an application type that we want
    to find in the XML file (such as `selectbox`). Later in the code, we will compare
    `$value` to the type ID in the XML file to see if we can find the application
    type and a file associated with it. The constructor places `$value` into the `$app`
    property. However, the method also includes an `if` statement that uses the method
    `function_exists` to determine if the `get_properties` function exists.


    Why? In this example, we look at a technique to restrict which programs can use
    this class. The `if` statement demands that any program that makes an instance
    of this class must also have a `get_properties` method. If someone tries to make
    an instance of the program using another program that does not already contain
    a `get_properties` method, the `else` part of the statement will execute, which
    will cause the object not to be created and will close the program.


    > **Security and performance** — Any time a program is accepting information from
    the Internet, or across a network, it is a good idea to determine the source of
    the information. In addition to determining application and function names, PHP
    programs can also look at the source IP addresses.


    ```

    public function get_dog_application()

    {

    $xmlDoc = new DOMDocument();

    if ( file_exists("dog_applications.xml") )

    {

    $xmlDoc->load( ''dog_applications.xml'' );

    $searchNode = $xmlDoc->getElementsByTagName( "type" );

    ```


    The first part of the `get_dog_application` method should look familiar. This
    code opens the `dog_applications.xml` file (after making sure it exists). Then
    it loads the contents into `$xmlDoc`. The last line calls the PHP method `getElementsByTagName`.
    This method searches for all occurrences of "type" in `$xmlDoc` and places each
    occurrence in `$searchNode`.


    ```

    foreach( $searchNode as $searchNode )

    {

    $valueID = $searchNode->getAttribute(''ID'');

    if($valueID == $this->app)

    {

    $xmlLocation = $searchNode->getElementsByTagName( "location" );

    return $xmlLocation->item(0)->nodeValue;

    break;

    }

    }

    ```


    The `foreach` loop looks at each line contained in `$searchNode`. It uses the
    PHP method `getAttribute` to place the next line with an `ID` XML attribute into
    the property `$valueID`. Once it is placed in `$valueID`, the value in this property
    (`dog`, `selectbox`, or `breeds`) is compared to `$this->app`. (The property `app`
    was loaded with a value in the constructor.) If the `ID` is found in the XML file,
    `getElementsByTagName` will search for the next line that contains a `location`
    XML tag. The `return` line then takes the value in the location tag (the file
    name and its location) and returns it to the program that called this method.
    The `break` statement is used to break out of the loop early because you have
    already returned the value needed in the previous line of code. The `else` part
    of the method (shown in Example 5-10) will return `FALSE` if the XML file does
    not exist.


