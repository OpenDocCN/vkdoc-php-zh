  ## 地狱般的加长周末


  `Drupal 4.6` 于 2005 年 4 月 15 日发布。无论以何种标准衡量，Drupal 社区都在继续其快速扩张的趋势：到 2005 年 7 月，有
  26,772 名用户和 455 个服务提供商在 `drupal.org` 上注册。实际上，这意味着大量人员受到了 2005 年 7 月 7 日至 11 日事件的影响——史蒂文·维滕斯称之为“地狱般的加长周末”。^(8)
  7 月 10 日，试图登录 `drupal.org` 的用户看到以下消息：“`http://drupal.org` 暂时离线。如果没有托管公司的帮助，我们无法让服务器重新上线，但
  48 小时后，他们仍未回应我们的支持请求。”^(9)


  史蒂文在他的 7 月 12 日 `drupal.org` 新闻与公告帖子中，对事件进行了（不那么简洁/紧张/绝望的）详细描述：“周四晚上，这台服务器被入侵了。我们服务器上的另一个站点为黑客提供了入侵的漏洞；似乎有人想把我们变成一个盗版
  FTP，但却完全搞砸了。我们很快发现了入侵，并迅速重新控制了服务器。然而，整个事件发生在我们当前 ISP 计划停电前的几个小时；远程管理的问题以及缺少安装介质意味着我们无法远程修复服务器。周末我们一直打电话试图解决这个问题，但由于与我们的
  ISP 沟通不畅，我们不得不等到周一早上才能重新安装操作系统，让服务器重新顺畅运行。”^(10)


  尽管服务器崩溃对 Drupal 用户来说可能像是一记耳光，但社区并非没有意识到基础设施问题可能成为一个隐患，如图 Figure 35-2 所示。


  ![images](img/3502.jpg)


  ***图 35-2.** Drupal 社区意识到基础设施问题可能成为一个隐患。*


  在服务器崩溃之前，Dries 已经准备好发布一篇由查理·洛于 7 月 10 日发表于 `drupal.org` 主页的消息，阐述了需要一台新服务器的问题。在崩溃发生时，`drupal.org`
  运行在一台与大约 20 个其他站点共享的 Pentium Xeon 3Ghz 服务器上，内存为 1GB；Drupal 资深人士 Kjartan Mannes ([`http://drupal.org/user/2`](http://drupal.org/user/2))
  既负责维护这台服务器，也承担了费用。


