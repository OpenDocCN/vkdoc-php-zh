    # 22. 魔术方法


    PHP 引擎内部会调用类中实现的若干方法，这些方法被称为**魔术方法**，识别它们很容易，因为其名称均以两个下划线开头。表 22-1 列出了目前已讨论过的魔术方法。


    表 22-1. 魔术方法


    | 名称 | 描述 |

    | --- | --- |

    | `__construct(...)` | 创建新实例时调用。 |

    | `__destruct()` | 对象不再被引用时调用。 |

    | `__call($name, $array)` | 在对象上下文中调用不可访问的方法时调用。 |

    | `__callStatic($name, $array)` | 在静态上下文中调用不可访问的方法时调用。 |

    | `__get($name)` | 读取不可访问属性数据时调用。 |

    | `__set($name, $value)` | 写入不可访问属性数据时调用。 |

    | `__isset($string)` | 对不可访问属性使用 `isset` 或 `empty` 时调用。 |

    | `__unset($string)` | 对不可访问属性使用 `unset` 时调用。 |


    除此之外还有六个魔术方法，与其他方法一样，它们可以在类中实现以提供特定功能。


    表 22-2. 更多魔术方法


    | 名称 | 描述 |

    | --- | --- |

    | `__toString()` | 对象转换为字符串时调用。 |

    | `__invoke(...)` | 对象转换为函数时调用。 |

    | `__sleep()` | 由 `serialize` 调用。执行清理任务并返回一个待序列化的变量数组。 |

    | `__wakeup()` | 由 `unserialize` 调用，用于重建对象。 |

    | `__set_state($array)` | 由 `var_export` 调用。该方法必须为静态方法，其参数包含导出的属性。 |

    | `__clone()` | 对象被克隆后调用。 |


    ## `__toString`


    当对象在需要字符串的上下文中使用时，PHP 引擎会查找名为 `__toString` 的方法，以获取对象的字符串表示形式。


    ```

    class MyClass

    {

    public function __toString()

    {

    return ''Instance of '' . __CLASS__;

    }

    }

    $obj = new MyClass();

    echo $obj; // 输出 "Instance of MyClass"

    ```


    除字符串类型外，无法定义对象在评估为其他类型时的行为。


    ## `__invoke`


    `__invoke` 方法允许将对象当作函数来使用。调用对象时提供的参数会作为 `__invoke` 函数的参数。


    ```

    class MyClass

    {

    public function __invoke($arg)

    {

    echo $arg;

    }

    }

    $obj = new MyClass();

    $obj(''Test''); // 输出 "Test"

    ```


    ## 对象序列化


    序列化是将数据转换为字符串格式的过程。这对于在数据库或文件中存储对象非常有用。在 PHP 中，内置的 `serialize` 函数执行此对象到字符串的转换，而
    `unserialize` 则将字符串还原为原始对象。`serialize` 函数可处理所有类型，但不包括资源类型（用于保存数据库连接和文件句柄等）。请考虑以下简单的数据库类。


    ```

    class MyConnection

    {

    public $link, $server, $user, $pass;

    public function connect()

    {

    $this->link = mysql_connect($this->server,

    $this->user,

    $this->pass);

    }

    }

    ```


    当此类被序列化时，数据库连接会丢失，并且保存连接的 `$link` 资源类型变量会存储为 null。


    ```

    $obj = new MyConnection();

    // ...

    $bin = serialize($obj);   // 序列化对象

    $obj = unserialize($bin); // 还原对象

    ```


    为了更精细地控制对象数据的序列化和反序列化方式，该类可以实现 `__sleep` 和 `__wakeup` 方法。


    ### `__sleep`


    `__sleep` 方法由 `serialize` 调用，需要返回一个包含将被序列化的属性的数组。此数组不得包含私有或受保护的属性，因为 `serialize`
    无法访问它们。该方法还可以在序列化发生前执行清理任务，例如将待处理数据提交到存储介质。

    '
- fmt: "```php\npublic function __sleep()\n{\n    return array('server', 'user', 'pass');\n\
    }\n```\n\n请注意，这些属性以字符串形式返回给`serialize`。其中`$link`资源类型的指针未包含在数组中，因为它无法被序列化。为了重新建立数据库连接，可以使用`__wakeup`方法。\n\
    \n### Wakeup\n\n对序列化后的对象调用`unserialize`会调用`__wakeup`方法来恢复该对象。该方法不接受参数，也无需返回值。它用于重新建立资源类型的变量，以及执行对象反序列化后可能需要的其他初始化任务。在本例中，它重新建立了\
    \ MySQL 数据库连接。\n\n```php\npublic function __wakeup()\n{\n    if(isset($this->server,\
    \ $this->user, $this->$pass))\n        $this->connect();\n}\n```\n\n请注意，这里用多个参数调用了`isset`结构，在这种情况下，只有当所有参数都已设置时，它才会返回`true`。\n\
    \n### Set State\n\n`var_export`函数会检索可用作有效 PHP 代码的变量信息。下面这个例子对该函数用于一个对象。\n\n```php\n\
    class Fruit\n{\n    public $name = 'Lemon';\n}\n$export = var_export(new Fruit(),\
    \ true);\n```\n\n由于对象是一种复杂类型，没有通用的语法来构造它及其成员。相反，`var_export`会生成以下字符串。\n\n```php\n\
    Fruit::__set_state(array( 'name' => 'Lemon', ))\n```\n\n为了构造对象，该字符串依赖于为该对象定义的静态`__set_state`方法。如所示，`__set_state`方法接受一个关联数组，其中包含对象每个属性的键值对，包括私有和受保护的成员。\n\
    \n```php\nstatic function __set_state(array $array)\n{\n    $tmp = new Fruit();\n\
    \    $tmp->name = $array['name'];\n    return $tmp;\n}\n```\n\n在`Fruit`类中定义此方法后，现在可以使用`eval`结构解析导出的字符串，以创建一个相同的对象。\n\
    \n```php\neval('$MyFruit = ' . $export . ';');\n```\n\n### Object Cloning\n\n\
    将对象赋值给变量只会创建对该对象的新引用。要复制对象，可以使用`clone`运算符。\n\n```php\nclass Fruit {}\n$f1 = new\
    \ Fruit();\n$f2 = $f1;       // 复制对象引用\n$f3 = clone $f1; // 复制对象\n```\n\n克隆对象时，其属性会被复制到新对象。然而，它可能包含的任何子对象不会被克隆，因此它们在副本之间是共享的。这就是`__clone`方法的用途。该方法在克隆完成后，于克隆出的副本上被调用。它可用于克隆任何子对象。\n\
    \n```php\nclass Apple {}\nclass FruitBasket\n{\n    public $apple;\n    function\
    \ __construct() { $apple = new Apple(); }\n    function __clone()\n    {\n   \
    \     $this->apple = clone $this->apple;\n    }\n}\n```\n\n## 23. 用户输入\n\n当 HTML\
    \ 表单提交到 PHP 页面时，数据对该脚本变得可用。\n\n### HTML 表单\n\nHTML 表单有两个必需的属性：`action`和`method`。`action`属性指定表单数据提交到的脚本。例如，以下表单将名为`myString`的输入属性提交到`mypage.php`脚本文件。\n\
    \n表单元素的另一个必需属性指定发送方法，可以是 GET 或 POST。\n\n### 使用 POST 发送\n\n如果使用 POST 方法发送表单，数据可以通过`$_POST`数组获取。属性的名称是该关联数组中的键。通过\
    \ POST 方法发送的数据在页面的 URL 上不可见，但这也意味着页面状态无法通过例如收藏页面来保存。\n\n```php\necho $_POST['myString'];\n\
    ```\n\n### 使用 GET 发送\n\nPOST 的替代方法是使用 GET 方法发送表单数据，并通过`$_GET`数组检索。变量随后会显示在地址栏中，这实际上会在页面被收藏并重新访问时保持页面状态。\n\
    \n```php\necho $_GET['myString'];\n```\n\n由于数据包含在地址栏中，变量不仅可以通过 HTML 表单传递，还可以通过\
    \ HTML 链接传递。然后可以使用`$_GET`数组相应地更改页面状态。这提供了一种将变量从一个页面传递到另一个页面的方法。\n\n```\n<a href=\"\
    mypage.php?myString=Foo+Bar\">link</a>\n```\n\n### 请求数组\n\n如果不在乎数据是使用 POST 还是\
    \ GET 方法发送的，可以使用`$_REQUEST`数组。该数组通常包含`$_GET`和`$_POST`数组，但也可能包含`$_COOKIE`数组。\n\n\
    ```php\necho $_REQUEST['myString']; // \"Foo Bar\"\n```\n\n`$_REQUEST`数组的内容可以在\
    \ PHP 配置文件中设置[¹](#A317139_2_En_23_Chapter.html#Fn1)，并且因 PHP 发行版而异。出于安全考虑，通常不包含`$_COOKIE`数组。\n\
    \n### 安全问题\n\n任何用户提供的数据都可能被篡改；因此，在使用前应对其进行验证和清理。验证意味着要确保数据在数据类型、范围和内容方面符合预期形式。例如，以下代码验证电子邮件地址。\n\
    \n```php\nif(!filter_var($_POST['email'], FILTER_VALIDATE_EMAIL))\n    echo \"\
    Invalid email address\";\n```\n\n清理是指禁用用户输入中潜在的恶意代码。这是通过根据将要使用输入的语言规则对代码进行转义来完成的。例如，如果数据要发送到数据库，则需要使用`mysql_real_escape_string`函数进行清理，以禁用任何嵌入的\
    \ SQL 代码。\n\n```php\n// 为数据库使用进行清理\n$name = mysql_real_escape_string($_POST['name']);\n\
    // 执行 SQL 命令\n$sql = \"SELECT * FROM users WHERE user='\" . $name . \"'\";\n$result\
    \ = mysql_query($sql);\n```\n\n当用户提供的数据作为文本输出到网页时，应使用`htmlspecialchars`函数。它会禁用任何\
    \ HTML 标记，以便用户输入得以显示但不会被解释执行。\n\n```php\n// 为网页使用进行清理\necho htmlspecialchars($_POST['comment']);\n\
    ```\n\n### 提交数组\n\n通过在表单中的变量名后添加数组方括号，可以将表单数据分组到数组中。这适用于所有表单输入元素，包括`<input>`、`<select>`和`<textarea>`。\n\
    \n这些元素也可以被赋予它们自己的数组键。\n\n```html\n<input type=\"text\" name=\"myArr[0]\" />\n\
    <input type=\"text\" name=\"myArr[1]\" />\n<input type=\"text\" name=\"myArr[name]\"\
    \ />\n```\n\n提交后，该数组即可在脚本中使用。\n\n```php\n$val1 = $_POST['myArr'][0];\n$val2 =\
    \ $_POST['myArr'][1];\n$name = $_POST['myArr']['name'];\n```\n\n表单的`<select>`元素具有一个属性，允许从列表中选择多个项目。\n\
    \n```html\n<select name=\"myArr[]\" multiple>\n    <option value=\"apple\">Apple</option>\n\
    \    <option value=\"orange\">Orange</option>\n    <option value=\"pear\">Pear</option>\n\
    </select>\n```\n\n当在表单中包含此多选元素时，数组方括号对于在脚本中检索所选值变得必要。\n\n```php\nforeach ($_POST['myArr']\
    \ as $item)\n    echo $item . ' '; // 例如 \"apple orange pear\"\n```\n\n### 文件上传\n\
    \nHTML 表单提供了一种文件输入类型，允许将文件上传到服务器。要使文件上传起作用，表单的可选`enctype`属性必须设置为`\"multipart/form-data\"\
    `，如下例所示。\n\n关于上传文件的信息存储在`$_FILES`数组中。该关联数组的键见表 23-1。\n\n**表 23-1. `$_FILES`数组的键**\n\
    \n| 名称      | 描述               |\n|-----------|-------------------|\n| `name`\
    \    | 上传文件的原始名称。 |\n| `tmp_name`| 服务器临时副本的路径。 |\n| `type`    | 文件的 MIME 类型。 \
    \  |\n| `size`    | 文件大小（字节）。   |\n| `error`   | 错误代码。         |\n\n接收到的文件仅临时存储在服务器上。如果脚本未保存，它将被删除。以下展示了如何保存文件的简单示例。该示例检查错误代码以确保文件成功接收，如果是，则将文件移出临时文件夹进行保存。在实践中，你可能还需要检查文件大小和类型以确定是否保留该文件。"
  raw: "```\npublic function __sleep()\n{\nreturn array('server', 'user', 'pass');\n\
    }\n```\n\nNote that the properties are returned to `serialize` in string\nform.\
    \ The `$link`\nresource type pointer is not included in the array because it cannot\
    \ be\nserialized. To reestablish the database connection, the `__wakeup` method\
    \ can\nbe used.\n\n_Wakeup\n\nCalling `unserialize` on the\nserialized object\
    \ invokes the `__wakeup` method in\norder to restore the object. It accepts no\
    \ arguments and does not need\nto return any value. It is used for reestablishing\
    \ resource-type\nvariables and for performing other initializing tasks that may\
    \ need to\nbe done after the object has been unserialized. In this example, it\n\
    reestablishes the MySQL database connection.\n\n```\npublic function __wakeup()\n\
    {\nif(isset($this->server, $this->user, $this->$pass))\n$this->connect();\n}\n\
    ```\n\nNote that the `isset` construct is\ncalled here with multiple arguments,\
    \ in which case it only returns `true` if all\nparameters are set.\n\nSet State\n\
    \nThe `var_export`\nfunction retrieves variable information that is usable as\
    \ valid PHP\ncode. In the following example, this function is used on an object.\n\
    \n```\nclass Fruit\n{\npublic $name = 'Lemon';\n}\n$export = var_export(new Fruit(),\
    \ true);\n```\n\nSince an object is a complex type, there is no generic syntax\
    \ for\nconstructing it along with its members. Instead, `var_export` creates\n\
    the following string.\n\n```\nFruit::__set_state(array( 'name' => 'Lemon', ))\n\
    ```\n\nIn order to construct it, this string relies on a static `__set_state`\
    \ method\nbeing defined for the object. As shown, the `__set_state` method\ntakes\
    \ an associative array containing key-value pairs of each of the\nobject’s properties,\
    \ including private and protected members.\n\n```\nstatic function __set_state(array\
    \ $array)\n{\n$tmp = new Fruit();\n$tmp->name = $array['name'];\nreturn $tmp;\n\
    }\n```\n\nWith this method defined in the `Fruit` class, the\nexported string\
    \ can now be parsed with the `eval` construct to\ncreate an identical object.\n\
    \n```\neval('$MyFruit = ' . $export . ';');\n```\n\nObject Cloning\n\nAssigning\
    \ an object to a variable only creates a new reference to the\nsame object. To\
    \ copy an object, the `clone` operator can be\nused.\n\n```\nclass Fruit {}\n\
    $f1 = new Fruit();\n$f2 = $f1;       // copy object reference\n$f3 = clone $f1;\
    \ // copy object\n```\n\nWhen an object is cloned, its properties are copied over\
    \ to the new\nobject. However, any child objects it may contain are not cloned,\
    \ so\nthey are shared between the copies. This is where the `__clone` method comes\n\
    in. It is called on the cloned copy after the cloning is done. It can be\nused\
    \ to clone any child objects.\n\n```\nclass Apple {}\nclass FruitBasket\n{\npublic\
    \ $apple;\nfunction __construct() { $apple = new Apple(); }\nfunction __clone()\n\
    {\n$this->apple = clone $this->apple;\n}\n}\n```\n\n23. User Input\n\nWhen an\
    \ HTML form is submitted to a PHP page, the data becomes available\nto that script.\n\
    \nHTML Form\n\nAn HTML form has two required attributes : `action` and `method`\
    \ . The action\nattribute specifies the script to which the form data is passed.\
    \ For\nexample, the following form submits one input property called `myString`\
    \ to the `mypage.php` script\nfile.\n\nThe other required attribute of the form\
    \ element specifies the sending\nmethod, which may be either GET or POST.\n\n\
    Sending with POST\n\nIf the form is sent using the POST method , the data is available\n\
    through the `$_POST` array. The\nnames of the properties are the keys in that\
    \ associative array. Data\nsent with the POST method is not visible on the URL\
    \ of the page, but\nthis also means that the state of the page cannot be saved\
    \ by, for\nexample, bookmarking the page.\n\n```\necho $_POST['myString'];\n```\n\
    \nSending with GET\n\nThe alternative to POST is to send the form data with the\
    \ GET method and\nto retrieve it using the `$_GET` array. The\nvariables are then\
    \ displayed in the address bar, which effectively\nmaintains the state of the\
    \ page if it is bookmarked and revisited.\n\n```\necho $_GET['myString'];\n```\n\
    \nBecause the data is contained in the address bar, variables cannot only\nbe\
    \ passed through HTML forms but also through HTML links. The `$_GET` array can\
    \ then\nbe used to change the state of the page accordingly. This provides one\n\
    way of passing variables from one page to another.\n\n```\nlink\n```\n\nRequest\
    \ Array\n\nIf it does not matter whether the POST or GET method was used to send\n\
    the data, the `$_REQUEST` array can\nbe used. This array typically contains the\
    \ `$_GET` and `$_POST` arrays, but\nmay also contain the `$_COOKIE` array.\n\n\
    ```\necho $_REQUEST['myString']; // \"Foo Bar\"\n```\n\nThe content of the `$_REQUEST`\
    \ array can\nbe set in the PHP configuration file[¹](#A317139_2_En_23_Chapter.html#Fn1)\
    \ and varies\nbetween PHP distributions. Due to security concerns, the `$_COOKIE`\
    \ array is\nusually not included.\n\nSecurity Concerns\n\nAny user-provided data\
    \ can be manipulated; therefore, it should be\nvalidated and sanitized before\
    \ being used. Validation means that you make sure\nthat the data is in the form\
    \ you expect, in terms of data type, range,\nand content. For example, the following\
    \ code validates an email address.\n\n```\nif(!filter_var($_POST['email'], FILTER_VALIDATE_EMAIL))\n\
    echo \"Invalid email address\";\n```\n\nSanitizing is when you disable\npotentially\
