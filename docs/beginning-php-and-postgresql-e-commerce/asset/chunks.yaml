- fmt: "# 使用SSL保障敏感页面安全\n\n显然，并非站点所有区域都需要SSL连接，也不应在所有地方强制使用SSL，因为这会降低性能。但必须确保敏感页面仅能通过SSL访问。现在，你应该为管理员登录页面和管理员页面强制启用SSL。（在后续章节中，当我们自行处理支付时，还需要为结账、客户登录、客户注册和客户信息修改页面强制启用SSL。）\n\
    \n如果要确保对管理脚本`admin.php`的所有请求都通过HTTPS完成，只需在`admin.php`的开头添加以下代码：\n\n```php\n<?php\n\
    \n// Load Smarty library and config files\n\nrequire_once 'include/app_top.php';\n\
    \n// Enforce page to be accessed through HTTPS\nif (USE_SSL != 'no' and getenv('HTTPS')\
    \ != 'on')\n{\n    header ('Location: https://' . getenv('SERVER_NAME') .\n  \
    \  getenv('REQUEST_URI'));\n    exit();\n}\n```\n\n注意，如果`config.php`中定义的`USE_SSL`常量设置为`no`，则不会强制使用安全连接。在开发网站时，若无法访问支持SSL的服务器，将常量设置为`no`可能很有用。\n\
    \n# 管理员身份验证\n\n由于只希望特定用户访问目录管理页面，需要实施某种安全机制来控制对站点敏感页面的访问。\n\n实现安全性需要处理两个重要概念：**认证**和**授权**。**认证**是唯一标识用户的过程（通常通过提供用户名和密码），而**授权**则指已认证用户可以访问哪些资源。\n\
    \n想要访问目录管理页面的用户应首先进行身份认证。在确认用户身份后，再决定该用户是否有权访问管理页面。\n\n在HatShop中，将使用一种称为**HTTP认证**的身份验证方法，它允许通过HTML表单控制登录过程。客户端认证后，PHP会自动在客户端生成一个cookie，用于验证所有后续请求。如果找不到该cookie，客户端将显示登录HTML表单。\n\
    \n> **注意**：我们假设管理员从启用了cookie的客户端访问管理页面。\n\n用户名和密码的组合可以以多种方式物理存储。例如，在第11章中，你将看到如何在数据库中存储经过哈希处理（加密）的客户密码。\n\
    \n> **提示**：**哈希**是存储密码的常用方法。密码的哈希值是通过对其应用数学函数（哈希算法）计算得出的。当用户尝试认证时，输入的密码会被哈希，生成的哈希值会与原始（正确）密码的哈希值进行比较。如果两个值相同，则输入的密码正确。哈希算法的一个基本特性是，理论上无法从哈希值中获取原始密码（该算法是单向的）。实际上，科学家最近发现了流行的`MD5`、`SHA-0`和`SHA-1`哈希算法的漏洞。\n\
    \n更简单的方法是将用户名和密码组合存储在PHP文件中。这种方法不如使用数据库灵活，但快速且易于实现。\n\n将用户名/密码组合存储在脚本文件中时，可以选择以明文或使用哈希算法（如`MD5`或`SHA-1`）对密码进行哈希后存储。\n\
    \n在以下练习中，你将简单地将密码以明文形式存储，但了解还有其他选择也是好的。第11章将详细介绍哈希相关知识。"
  raw: 'Obviously, you don’t need SSL connections for all areas of the site and shouldn’t
    enforce it in all places because that reduces performance. However, you do want
    to make sure that the sensitive pages are accessible only via SSL. Now you should
    enforce SSL for the administrator login page and for the admin pages of your site.
    (In later chapters, when we’ll handle payments ourselves, we’ll also want to enforce
    SSL for the checkout, customer login, customer registration, and customer detail
    modification pages.)


    If you want to ensure that all requests to the admin script (admin.php) are done
    through HTTPS, you’ll simply need to add this code at the beginning of admin.php:


    <?php


    // Load Smarty library and config files


    require_once ''include/app_top.php'';


    **// Enforce page to be accessed through HTTPS**


    **if (USE_SSL != ''no'' and getenv(''HTTPS'') != ''on'')**


    **{**


    **header (''Location: https://'' . getenv(''SERVER_NAME'') .**


    **getenv(''REQUEST_URI''));**


    **exit();**


    }


    Note that the secure connection isn’t enforced if the USE_SSL constant defined
    in config.php is set to no. Setting the constant to no may be useful when developing
    the web site if you don’t have access to an SSL-enabled server.


