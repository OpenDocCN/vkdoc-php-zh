    **Downloading the Code**


    You can find the latest code downloads and a link to an online version of HatShop
    at the authors’ web sites, at `http://www.emilianbalanescu.ro` or `http://www.cristiandarie.ro`,
    or in the Source Code/Download section of the Apress web site at `http://www.apress.com`.
    It should be easy to read through this book and build your solution as you go;
    however, if you want to check something from our working version, you can. Instructions
    on loading the chapters are available in the `welcome.html` document in the download.


    **Summary**


    Hey, we covered a lot of ground in this chapter, didn’t we? We talked about the
    three-tier architecture and how it helps you create great flexible and scalable
    applications. We also saw how each of the technologies used in this book fits
    into the three-tier architecture.


    So far, we have a very flexible and scalable application because it doesn’t have
    much functionality, but you’ll feel the real advantages of using a disciplined
    way of coding in the next chapters. In this chapter, you have only coded the basic,
    static part of the presentation tier, implemented a bit of error-handling code,
    and created the hatshop database, which is the support for the data tier. In the
    next chapter, you’ll start implementing the product catalog and learn a lot about
    how to dynamically generate visual content using data stored in the database with
    the help of the middle tier and with smart and fast controls and components in
    the presentation tier.


