  \n**124**\n\n**第 8 章 ■ 实现 AJAX 特性**\n\n### `submit()`函数\n\n\n\n在清单 8-7 中，你使用`$ajax->form()`函数创建了一个\
  \ Ajax 表单。使用 Ajax 提交表单的另一种方式是采用`$ajax->submit()`函数。此方法的工作方式与`form()`函数几乎完全相同，唯一的区别在于视图中由提交按钮（而非观察表单的\
  \ change 事件）触发 Ajax 过程。\n\n清单 8-7 中有两行需要修改：表单标签本身以及提交按钮。\n\n清单 8-10 展示了如何将这些标签从清单\
  \ 8-7 中的形式修改为使用`$ajax->submit()`函数。\n\n**清单 8-10.** 使用`$ajax->submit()`函数在后台提交表单\n\
  \n```\n15 <?=$form->create('Comment',array('action'=>'add','onSubmit'=>'return false;'));?>\n\
  16 <?=$form->input('Comment.name');?>\n    <?=$form->input('Comment.content');?>\n\
  18 <?=$form->input('Comment.post_id',array('type'=>'hidden','value'=>$post['Post']['id']));?>\n\
  19 <?=$ajax->submit('Add Comment',array('url'=>'/comments/add','update'=>'comments'));?>\n\
  </form>\n```\n\n请注意，清单 8-10 的第 15 行已从`$ajax->form()`函数改为`$form->create()`函数。你在选项数组中添加了`onSubmit`键，并将值`return\
  \ false;`传递给该属性。这可以防止表单在发生表单事件时发送同步 HTTP 请求。\n\n除第 19–20 行外，其余内容与之前相同。`$ajax->submit()`函数与`$ajax->form()`函数类似，它也使用选项数组来传递一些重要参数。这些参数指定了表单的提交目标（`url`参数）以及接收\
  \ Ajax 响应的 HTML 元素（`update`参数）。第 20 行仅用于关闭表单标签。\n\n当以这种方式使用时，可以实现相同的 Ajax 过程，但使用的是`$ajax->submit()`函数。某些自定义的\
  \ JavaScript 函数可能会中断表单的观察事件，在这些情况下，使用`$ajax->submit()`函数可以避免这些冲突。\n\n使用`$ajax->submit()`函数而非`$ajax->form()`函数的其他优势包括：可以在一个表单内使用多个\
  \ Ajax 事件。例如，使用`$ajax->form()`函数时，某些 Ajax 调用（如自动填充）可能会触发 JavaScript 事件观察。当在一个表单中使用多个\
  \ Ajax 调用时，`$ajax->submit()`函数通常能绕过`$ajax->form()`可能产生的冲突。\n\n**`link()`函数**\n\n\
  许多 Ajax 方法不需要任何表单数据。最简单的 Ajax 调用是仅向脚本发送一个参数并在后台返回响应。这类 Ajax 过程可以通过`$ajax->link()`函数来管理。你可以通过为每条评论创建社区投票机制，将此函数集成到博客中。\n\
