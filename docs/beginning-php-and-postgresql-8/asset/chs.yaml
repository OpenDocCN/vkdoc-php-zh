  \n##### 获取发行版\n\n在开始安装之前，你需要下载源代码。本节提供有关如何操作的说明。\n\n##### 下载 Apache\n\n`Apache`\
  \ 的普及性和开源许可证促使几乎所有 `Unix` 开发者都将该软件打包到各自的分发版中。然而，由于 `Apache` 快速的发布周期，你应该查阅 `Apache`\
  \ 网站并下载最新版本。\n\n在撰写本文时，以下页面提供了位于 53 个不同国家的 260 个镜像站点列表：\n\n```\nhttp://www.apache.org/mirrors/\n\
  ```\n\n导航到此页面，并通过单击相应的链接选择一个合适的镜像。生成的页面将包含 `Apache 软件基金会` 旗下的所有项目。\n\n选择 `httpd`\
  \ 链接。这将带你进入一个页面，其中包含指向最新 `Apache` 版本以及各种相关项目和实用工具的链接。该发行版有两种格式：\n\n-   **源代码：**\
