  trans: '

    # 为何不在数据库中存储图片？


    `images` 表包含文件名和标题，但并不存储图片本身。尽管你可以在数据库中存储二进制对象（如图片），但我并不打算这样做，原因很简单：这通常得不偿失。主要问题如下：


    -   若不单独存储文本信息，图片无法被索引或搜索。

    -   图片通常体积较大，会导致表体积膨胀。如果数据库存储空间有限，你可能会面临空间耗尽的风险。

    -   若频繁删除图片，表碎片化会影响性能。

    -   从数据库检索图片需要将图片传递给一个单独的脚本，这会拖慢网页显示速度。


    更高效的做法是将图片存储在你网站的一个普通文件夹中，并利用数据库来存储图片的相关信息。你只需要两类信息——文件名和可作为`alt`文本使用的标题。一些开发者会在数据库中存储图片的完整路径，但我认为只存储文件名能为你提供更大的灵活性。指向`images`文件夹的路径将被嵌入到
    HTML 中。无需存储图片的高度和宽度。正如你在第 4 章和第 8 章中所见，你可以使用 PHP 的`getimagesize()`函数动态生成这些信息。


    ## 规划画廊


    我发现设计数据库驱动网站的最佳方法是，首先创建一个包含占位文本和图片的静态页面。然后，我创建 CSS 样式规则，使页面达到我想要的视觉效果，最后用 PHP
    代码替换每个占位元素。每次替换后，我都会在浏览器中检查页面，确保一切正常运作。


    图 12-2 展示了我为画廊制作的静态模型，并指出了需要转换为动态代码的元素。这些图片与第 4 章中随机图片生成器使用的图片相同，并且尺寸各异。我尝试过缩放图片以创建缩略图，但认为结果看起来过于杂乱，因此我将缩略图设为标准尺寸（80×54
    像素）。此外，为了方便起见，我将每个缩略图命名为与大图相同的名称，并将它们存储在`images`文件夹下一个名为`thumbs`的子文件夹中。


    ![A978-1-4842-0635-5_12_Fig2_HTML.jpg](img/A978-1-4842-0635-5_12_Fig2_HTML.jpg)


    图 12-2. 明确将静态画廊转换为动态画廊所需完成的工作


    在前一章中，显示`images`表的内容很简单。你创建了一个单行表格，每个字段的内容放在单独的表格单元格中。通过遍历结果集，每条记录都显示在单独的一行上，模拟了数据库表的列结构。而这次，缩略图网格的两列结构不再匹配数据库结构。你需要在创建下一行之前，统计一行中已经插入了多少个缩略图。


    在弄清楚需要做什么之后，我删除了缩略图 2 到 6 的代码以及导航链接的代码。下面的列表显示了`gallery.php`的`<main>`元素中剩余的内容，其中需要转换为
    PHP 代码的元素已加粗标出（你可以在`ch12`文件夹的`gallery_01.php`中找到这段代码）：


    ```html

    <main>

    <h2>Images of Japan</h2>

    <p id="picCount">Displaying 1 to 6 of 8</p>

    <div id="gallery">

    <table id="thumbs">

    <tr>

    <!-- This row needs to be repeated -->

    <td><a href="gallery.php"><img src="images/thumbs/basin.jpg" alt=""

    width="80" height="54"></a></td>

    </tr>

    <!-- Navigation link needs to go here -->

    </table>

    <figure id="main_image">

    <img src="images/basin.jpg" alt="" width="350" height="237">

    <figcaption>Water basin at Ryoanji temple, Kyoto</figcaption>

    </figure>

    </div>

    </main>

    ```


    ## 将画廊元素转换为 PHP


    在显示画廊内容之前，你需要连接到`phpsols`数据库，并检索`images`表中存储的所有记录。其步骤与前一章相同，使用以下简单的 SQL 查询：


    ```sql

    SELECT filename, caption FROM images

    ```


    然后，你可以使用第一条记录来显示第一张图片及其关联的标题和缩略图。你不需要用到`image_id`。

    '
- fmt: "### PHP Solution 12-1: Displaying the First Image\n\nIf you set up the Japan\
    \ Journey website in [Chapter 4](#A978-1-4842-0635-5_4_Chapter.html), you can\
    \ work directly with the original `gallery.php`. Alternatively, copy `gallery_01.php`\
    \ from the `ch12` folder and save it in the `phpsols` site root as `gallery.php`.\
    \ You also need to copy `title.php`, `menu.php`, and `footer.php` to the `includes`\
    \ folder of the `phpsols` site. If your editing program asks if you want to update\
    \ the links in the files, choose the option not to update.\n\nThe gallery depends\
    \ on a connection to the database, so include `connection.php`, create a read-only\
    \ connection to the `phpsols` database, and define the SQL query. Add the following\
    \ code just before the closing PHP tag above the `DOCTYPE` declaration in `gallery.php`\
    \ (new code is highlighted in bold):\n\n![A978-1-4842-0635-5_12_Fig3_HTML.jpg](A978-1-4842-0635-5_12_Fig3_HTML.jpg)\n\
    \nFigure 12-3. The stripped-down version of the static gallery ready for conversion\n\
    \nLoad `gallery.php` into a browser to make sure that it displays correctly. The\
    \ main part of the page should look like Figure [12-3](#A978-1-4842-0635-5_12_Chapter.html#Fig3),\
    \ with one thumbnail image and a larger version of the same image.\n\n```\ninclude\
    \ './includes/title.php';\nrequire_once './includes/connection.php';\n$conn =\
    \ dbConnect('read');\n$sql = 'SELECT filename, caption FROM images';\n```\n\n\
    If you are using PDO, add `'pdo'` as the second argument to `dbConnect()`.\n\n\
    The code for submitting the query and extracting the first record from the results\
    \ depends on which method of connection you are using. For MySQLi, use this:\n\
    \n```\n// submit the query\n$result = $conn->query($sql);\nif (!$result) {\n \
    \   $error = $conn->error;\n} else {\n    // extract the first record as an array\n\
    \    $row = $result->fetch_assoc();\n}\n```\n\nFor PDO, use this:\n\n```\n// submit\
    \ the query\n$result = $conn->query($sql);\n// get any error messages\n$errorInfo\
    \ = $conn->errorInfo();\nif (isset($errorInfo[2])) {\n    $error = $errorInfo[2];\n\
    } else {\n    // extract the first record as an array\n    $row = $result->fetch();\n\
    }\n```\n\nTo display the first image when the page loads, you need to retrieve\
    \ the first result before creating a loop that will eventually display the grid\
    \ of thumbnails. The code for both MySQLi and PDO submits the query, extracts\
    \ the first record, and stores it in `$row`.\n\nYou now have the details of the\
    \ first record image stored as `$row['filename']` and `$row['caption']`. In addition\
    \ to the filename and caption, you need the dimensions of the large version so\
    \ that you can display it in the main body of the page. Add the following code\
    \ inside the `else` block immediately after the code that fetches the first result:\n\
    \n```\n// get the name and caption for the main image\n$mainImage = $row['filename'];\n\
    $caption = $row['caption'];\n// get the dimensions of the main image\n$imageSize\
    \ = getimagesize('images/'.$mainImage)[3];\n```\n\nAs explained in [Chapter 8](#A978-1-4842-0635-5_8_Chapter.html),\
    \ `getimagesize()` returns an array, the fourth element of which contains a string\
    \ with the width and height of an image ready for insertion into an `<img>` tag.\
    \ We’re interested only in the fourth element, so we can use the array-dereferencing\
    \ technique introduced in [Chapter 7](#A978-1-4842-0635-5_7_Chapter.html). Adding\
    \ `[3]` after the closing parenthesis of `getimagesize()` returns only the fourth\
    \ element of the array, which is assigned to `$imageSize`.\n\n**Note:** Array\
    \ dereferencing requires PHP 5.4 or later. If your server is running an earlier\
    \ version of PHP, you need to omit the `[3]` after the call to `getimagesize()`\
    \ and assign the complete array to `$imageSize`. You can then access the fourth\
    \ element in the normal way as `$imageSize[3]`.\n\nYou can now use this information\
    \ to dynamically display the thumbnail, main image, and caption. The main image\
    \ and thumbnail have the same name, but you eventually want to display all thumbnails\
    \ by looping through the full result set. Consequently, the dynamic code that\
    \ goes in the table cell needs to refer to the current record—in other words,\
    \ to `$row['filename']` and `$row['caption']`, rather than to `$mainImage` and\
    \ `$caption`. You’ll see later why I’ve assigned the values from the first record\
    \ to separate variables. Amend the code in the table like this:\n\n```\n<td><a\
    \ href=\"gallery.php\">\n    <img src=\"images/thumbs/<?= $row['filename']; ?>\"\
    \n         alt=\"<?= $row['caption']; ?>\" width=\"80\" height=\"54\"></a></td>\n\
    ```\n\nIn case there’s a problem with the query, you need to check if `$error`\
    \ has been set, and prevent the gallery from being displayed. Add a PHP block\
    \ containing the following conditional statement immediately after the `<h2>`\
    \ Images of Japan heading:\n\n```\n<?php if (isset($error)) {\n    echo \"<p>$error</p>\"\
    ;\n} else {\n?>\n```\n\nInsert a new line immediately before the closing `</main>`\
    \ tag (around line 54) and add a PHP block with the `else` block’s closing curly\
    \ brace:\n\n```\n<?php } ?>\n```\n\nSave `gallery.php` and view it in a browser.\
    \ It should look the same as Figure [12-3](#A978-1-4842-0635-5_12_Chapter.html#Fig3).\
    \ The only difference is that the thumbnail and its `alt` text are dynamically\
    \ generated. You can verify this by looking at the source code. The original static\
    \ version had an empty `alt` attribute, but as the following screenshot shows,\
    \ it now contains the caption from the first record:\n\n![A978-1-4842-0635-5_12_Figa_HTML.jpg](A978-1-4842-0635-5_12_Figa_HTML.jpg)\n\
    \nIf things go wrong, make sure there’s no gap between the static and dynamically\
    \ generated text in the image’s `src` attribute. Also check that you’re using\
    \ the right code for the type of connection you have created with the database.\
    \ You can check your code against `gallery_mysqli_02.php` or `gallery_pdo_02.php`\
    \ in the `ch12` folder.\n\nOnce you have confirmed that you’re picking up the\
    \ details from the database, you can convert the code for the main image. Amend\
    \ it like this (new code is in bold):\n\n```\n<figure id=\"main_image\">\n   \
    \ <img src=\"images/<?= $mainImage; ?>\" alt=\"<?= $caption; ?>\"\n         <?=\
    \ $imageSize; ?>>\n    <figcaption><?= $caption; ?></figcaption>\n</figure>\n\
    ```\n\n`$imageSize` inserts a string containing the correct `width` and `height`\
    \ attributes for the main image.\n\nTest the page again. It should look the same\
    \ as in Figure [12-3](#A978-1-4842-0635-5_12_Chapter.html#Fig3), but the images\
    \ and caption are being drawn dynamically from the database, and `getimagesize()`\
    \ is calculating the correct dimensions for the main image. You can check your\
    \ code against `gallery_mysqli_03.php` or `gallery_pdo_03.php` in the `ch12` folder.\n\
    \n## Building the Dynamic Elements\n\nThe first task after converting the static\
    \ page is to display all the thumbnails and then build dynamic links that will\
    \ enable you to display the large version of any thumbnail that has been clicked.\
    \ Displaying all the thumbnails is easy—just loop through them (we’ll work out\
    \ how to display them in rows of two later). Activating the link for each thumbnail\
    \ requires a little more thought. You need a way of telling the page which large\
    \ image to display.\n\n### Passing Information Through a Query String\n\nIn the\
    \ last section you used `$mainImage` to identify the large image, so you need\
    \ a way of changing its value whenever a thumbnail is clicked. The solution is\
    \ to add the image’s filename to a query string at the end of the URL in the link,\
    \ like this:\n\n```\n<a href=\"gallery.php?image=filename\">\n```\n\nYou can then\
    \ check whether the `$_GET` array contains an element called `image`. If it does,\
    \ change the value of `$mainImage`. If it doesn’t, leave `$mainImage` as the filename\
    \ from the first record in the result set."
  raw: '### PHP Solution 12-1: Displaying the First Image


    If you set up the Japan Journey website in [Chapter 4](#A978-1-4842-0635-5_4_Chapter.html),
    you can work directly with the original `gallery.php`. Alternatively, copy `gallery_01.php`
    from the `ch12` folder and save it in the `phpsols` site root as `gallery.php`.
    You also need to copy `title.php`, `menu.php`, and `footer.php` to the `includes`
    folder of the `phpsols` site. If your editing program asks if you want to update
    the links in the files, choose the option not to update.


    The gallery depends on a connection to the database, so include `connection.php`,
    create a read-only connection to the `phpsols` database, and define the SQL query.
    Add the following code just before the closing PHP tag above the `DOCTYPE` declaration
    in `gallery.php` (new code is highlighted in bold):


    ![A978-1-4842-0635-5_12_Fig3_HTML.jpg](A978-1-4842-0635-5_12_Fig3_HTML.jpg)


    Figure 12-3.


    The stripped-down version of the static gallery ready for conversion Load `gallery.php`
    into a browser to make sure that it displays correctly. The main part of the page
    should look like Figure [12-3](#A978-1-4842-0635-5_12_Chapter.html#Fig3), with
    one thumbnail image and a larger version of the same image.


    `include ''./includes/title.php'';`


    `require_once ''./includes/connection.php'';`


    `$conn = dbConnect(''read'');`


    `$sql = ''SELECT filename, caption FROM images'';`


    If you are using PDO, add `''pdo''` as the second argument to `dbConnect()`.


    The code for submitting the query and extracting the first record from the results
    depends on which method of connection you are using. For MySQLi, use this:


    `// submit the query`


    `$result = $conn->query($sql);`


    `if (!$result) {`


    `$error = $conn->error;`


    `} else {`


    `// extract the first record as an array`


    `$row = $result->fetch_assoc();`


    `}`


    For PDO, use this:


    `// submit the query`


    `$result = $conn->query($sql);`


    `// get any error messages`


    `$errorInfo = $conn->errorInfo();`


    `if (isset($errorInfo[2])) {`


    `$error = $errorInfo[2];`


    `} else {`


    `// extract the first record as an array`


    `$row = $result->fetch();`


    `}`


    To display the first image when the page loads, you need to retrieve the first
    result before creating a loop that will eventually display the grid of thumbnails.
    The code for both MySQLi and PDO submits the query, extracts the first record,
    and stores it in `$row`.


    You now have the details of the first record image stored as `$row[''filename'']`
    and `$row[''caption'']`. In addition to the filename and caption, you need the
    dimensions of the large version so that you can display it in the main body of
    the page. Add the following code inside the `else` block immediately after the
    code that fetches the first result:


    `// get the name and caption for the main image`


    `$mainImage = $row[''filename''];`


    `$caption = $row[''caption''];`


    `// get the dimensions of the main image`


    `$imageSize = getimagesize(''images/''.$mainImage)[3];`


    As explained in [Chapter 8](#A978-1-4842-0635-5_8_Chapter.html), `getimagesize()`
    returns an array, the fourth element of which contains a string with the width
    and height of an image ready for insertion into an `<img>` tag. We’re interested
    only in the fourth element, so we can use the array-dereferencing technique introduced
    in [Chapter 7](#A978-1-4842-0635-5_7_Chapter.html). Adding `[3]` after the closing
    parenthesis of `getimagesize()`returns only the fourth element of the array, which
    is assigned to `$imageSize`.


    Note


    Array dereferencing requires PHP 5.4 or later. If your server is running an earlier
    version of PHP, you need to omit the `[3]` after the call to `getimagesize()`
    and assign the complete array to `$imageSize`. You can then access the fourth
    element in the normal way as `$imageSize[3]`.


    You can now use this information to dynamically display the thumbnail, main image,
    and caption. The main image and thumbnail have the same name, but you eventually
    want to display all thumbnails by looping through the full result set. Consequently,
    the dynamic code that goes in the table cell needs to refer to the current record—in
    other words, to `$row[''filename'']` and `$row[''caption'']`, rather than to `$mainImage`
    and `$caption`. You’ll see later why I’ve assigned the values from the first record
    to separate variables. Amend the code in the table like this:


    `<td><a href="gallery.php">`


    `<img src="images/thumbs/` `<?= $row[''filename'']; ?>` `"`


    `alt="` `<?= $row[''caption'']; ?>` `" width="80" height="54"></a></td>`


    In case there’s a problem with the query, you need to check if `$error` has been
    set, and prevent the gallery from being displayed. Add a PHP block containing
    the following conditional statement immediately after the `<h2>` Images of Japan
    heading:


    `<?php if (isset($error)) {`


    `echo "<p>$error</p>";`


    `} else {`


    `?>`


    Insert a new line immediately before the closing `</main>` tag (around line 54)
    and add a PHP block with the `else` block’s closing curly brace:


    `<?php } ?>`


    Save `gallery.php` and view it in a browser. It should look the same as Figure
    [12-3](#A978-1-4842-0635-5_12_Chapter.html#Fig3). The only difference is that
    the thumbnail and its `alt` text are dynamically generated. You can verify this
    by looking at the source code. The original static version had an empty `alt`
    attribute, but as the following screenshot shows, it now contains the caption
    from the first record:


    ![A978-1-4842-0635-5_12_Figa_HTML.jpg](A978-1-4842-0635-5_12_Figa_HTML.jpg)


    If things go wrong, make sure there’s no gap between the static and dynamically
    generated text in the image’s `src` attribute. Also check that you’re using the
    right code for the type of connection you have created with the database. You
    can check your code against `gallery_mysqli_02.php` or `gallery_pdo_02.php` in
    the `ch12` folder.


    Once you have confirmed that you’re picking up the details from the database,
    you can convert the code for the main image. Amend it like this (new code is in
    bold):


    `<figure id="main_image">`


    `<img src="images/` `<?= $mainImage; ?>` `" alt="` `<?= $caption; ?>` `"`


    `<?= $imageSize; ?>` `></p>`


    `<figcaption>` `<?= $caption; ?>` `</figcaption>`


    `</figure>`


    `$imageSize` inserts a string containing the correct `width` and `height` attributes
    for the main image.


    Test the page again. It should look the same as in Figure [12-3](#A978-1-4842-0635-5_12_Chapter.html#Fig3),
    but the images and caption are being drawn dynamically from the database, and
    `getimagesize()` is calculating the correct dimensions for the main image. You
    can check your code against `gallery_mysqli_03.php` or `gallery_pdo_03.php` in
    the `ch12` folder.


    ## Building the Dynamic Elements


    The first task after converting the static page is to display all the thumbnails
    and then build dynamic links that will enable you to display the large version
    of any thumbnail that has been clicked. Displaying all the thumbnails is easy—just
    loop through them (we’ll work out how to display them in rows of two later). Activating
    the link for each thumbnail requires a little more thought. You need a way of
    telling the page which large image to display.


    ### Passing Information Through a Query String


    In the last section you used `$mainImage` to identify the large image, so you
    need a way of changing its value whenever a thumbnail is clicked. The solution
    is to add the image’s filename to a query string at the end of the URL in the
    link, like this:


    `<a href="gallery.php?image=` `filename` `">`


    You can then check whether the `$_GET` array contains an element called `image`.
    If it does, change the value of `$mainImage`. If it doesn’t, leave `$mainImage`
    as the filename from the first record in the result set.'
  trans: "\n### PHP 解决方案 12-1：显示首张图片\n\n如果你已在第 4 章设置了\"日本之旅\"网站，可直接使用原始的 `gallery.php`\
    \ 文件。或者，将 `ch12` 文件夹中的 `gallery_01.php` 复制到 `phpsols` 站点根目录并重命名为 `gallery.php`。同时需要将\
    \ `title.php`、`menu.php` 和 `footer.php` 复制到 `phpsols` 站点的 `includes` 文件夹中。如果编辑器询问是否要更新文件中的链接，请选择不更新。\n\
    \n该画廊需要数据库连接，因此需引入 `connection.php`，创建对 `phpsols` 数据库的只读连接，并定义 SQL 查询。请在 `gallery.php`\
    \ 文件中 `DOCTYPE` 声明上方、PHP 结束标记之前添加以下代码（新增代码以粗体显示）：\n\n![A978-1-4842-0635-5_12_Fig3_HTML.jpg](img/A978-1-4842-0635-5_12_Fig3_HTML.jpg)\n\
    \n**图 12-3.** 精简版静态画廊，已准备好进行转换\n\n在浏览器中加载 `gallery.php` 确认显示正常。页面主体部分应如图 12-3\
    \ 所示，包含一个缩略图及其同版本大图。\n\n```\ninclude './includes/title.php';\nrequire_once './includes/connection.php';\n\
    $conn = dbConnect('read');\n$sql = 'SELECT filename, caption FROM images';\n```\n\
    \n如果使用 PDO，请在 `dbConnect()` 中添加第二个参数 `'pdo'`。\n\n提交查询并从结果中提取首条记录的代码取决于所使用的连接方式。对于\
    \ MySQLi，请使用以下代码：\n\n```\n// 提交查询\n$result = $conn->query($sql);\nif (!$result)\
    \ {\n    $error = $conn->error;\n} else {\n    // 将首条记录提取为数组\n    $row = $result->fetch_assoc();\n\
    }\n```\n\n对于 PDO，请使用以下代码：\n\n```\n// 提交查询\n$result = $conn->query($sql);\n// 获取错误信息\n\
    $errorInfo = $conn->errorInfo();\nif (isset($errorInfo[2])) {\n    $error = $errorInfo[2];\n\
    } else {\n    // 将首条记录提取为数组\n    $row = $result->fetch();\n}\n```\n\n为了在页面加载时显示首张图片，需要在创建缩略图网格循环之前获取首条结果。上述\
    \ MySQLi 和 PDO 版本的代码均提交了查询、提取了首条记录并存储至 `$row`。\n\n现在首张图片的详细信息已存储为 `$row['filename']`\
    \ 和 `$row['caption']`。除了文件名和标题，我们还需要大图的尺寸，以便在页面主体中显示。请在获取首条结果的代码之后，立即在 `else`\
    \ 代码块中添加以下代码：\n\n```\n// 获取主图的名称和标题\n$mainImage = $row['filename'];\n$caption\
    \ = $row['caption'];\n// 获取主图尺寸\n$imageSize = getimagesize('images/'.$mainImage)[3];\n\
    ```\n\n如第 8 章所述，`getimagesize()` 返回一个数组，其第四个元素包含可直接插入 `<img>` 标签的图片宽高字符串。我们只需要第四个元素，因此可使用第\
    \ 7 章介绍的数组解引用技术。在 `getimagesize()` 的右括号后添加 `[3]` 只返回数组的第四个元素，并赋值给 `$imageSize`。\n\
    \n**注意：** 数组解引用需要 PHP 5.4 或更高版本。如果服务器运行旧版 PHP，需在调用 `getimagesize()` 后省略 `[3]`，将完整数组赋值给\
    \ `$imageSize`，然后按常规方式通过 `$imageSize[3]` 访问第四个元素。\n\n现在可以利用这些信息动态显示缩略图、主图和标题。主图和缩略图名称相同，但最终需要通过循环遍历整个结果集来显示所有缩略图。因此，表格单元格中的动态代码应引用当前记录——即\
    \ `$row['filename']` 和 `$row['caption']`，而非 `$mainImage` 和 `$caption`。稍后您将明白为何我将首条记录的值赋给了独立变量。请按如下方式修改表格中的代码：\n\
    \n```\n<td><a href=\"gallery.php\">\n    <img src=\"images/thumbs/<?= $row['filename'];\
    \ ?>\"\n         alt=\"<?= $row['caption']; ?>\" width=\"80\" height=\"54\"></a></td>\n\
    ```\n\n为防止查询出错，需要检查 `$error` 是否已设置，并阻止画廊显示。请在 `<h2>Images of Japan</h2>` 标题后立即添加包含以下条件语句的\
    \ PHP 代码块：\n\n```\n<?php if (isset($error)) {\n    echo \"<p>$error</p>\";\n}\
    \ else {\n?>\n```\n\n在结束标签 `</main>`（大约第 54 行）前插入新行，并添加包含 `else` 代码块闭合花括号的 PHP\
    \ 代码块：\n\n```\n<?php } ?>\n```\n\n保存 `gallery.php` 并在浏览器中查看。它应显示与图 12-3 相同的效果。唯一区别在于缩略图及其\
    \ `alt` 文本是动态生成的。您可以通过查看源代码来验证这一点。原始静态版本包含空 `alt` 属性，但如下图所示，现在它包含了首条记录的标题：\n\n\
    ![A978-1-4842-0635-5_12_Figa_HTML.jpg](img/A978-1-4842-0635-5_12_Figa_HTML.jpg)\n\
    \n如果出现问题，请确保图片 `src` 属性中静态文本和动态生成的文本之间没有间隙。同时检查您使用的代码是否与数据库连接类型匹配。您可以对照 `ch12`\
    \ 文件夹中的 `gallery_mysqli_02.php` 或 `gallery_pdo_02.php` 检查代码。\n\n确认能从数据库中获取详细信息后，即可转换主图代码。请按如下方式修改（新增代码以粗体显示）：\n\
    \n```\n<figure id=\"main_image\">\n    <img src=\"images/<?= $mainImage; ?>\"\
    \ alt=\"<?= $caption; ?>\"\n         <?= $imageSize; ?>>\n    <figcaption><?=\
    \ $caption; ?></figcaption>\n</figure>\n```\n\n`$imageSize` 会插入包含主图正确 `width`\
    \ 和 `height` 属性的字符串。\n\n再次测试页面。效果应仍与图 12-3 相同，但图片和标题已从数据库动态获取，并且 `getimagesize()`\
    \ 正在为主图计算正确尺寸。您可以对照 `ch12` 文件夹中的 `gallery_mysqli_03.php` 或 `gallery_pdo_03.php`\
    \ 检查代码。\n\n## 构建动态元素\n\n静态页面转换后的首要任务是显示所有缩略图，然后构建动态链接，以便在点击任意缩略图时显示其大图版本。显示所有缩略图很简单——只需循环遍历即可（稍后将讨论如何以每行两个的方式显示）。激活每个缩略图的链接则需要多花些心思。您需要一种方法来告知页面应显示哪张大图。\n\
    \n### 通过查询字符串传递信息\n\n在上一节中，您使用 `$mainImage` 标识大图，因此需要在点击缩略图时更改其值。解决方案是将图片文件名添加到链接\
    \ URL 末尾的查询字符串中，如下所示：\n\n```\n<a href=\"gallery.php?image=filename\">\n```\n\n\
    然后您可以检查 `$_GET` 数组中是否包含名为 `image` 的元素。如果包含，则更改 `$mainImage` 的值；如果不包含，则保留 `$mainImage`\
    \ 为结果集中首条记录的文件名。\n"
- fmt: "# PHP Solution 12-2: Activating the Thumbnails\n\nContinue working with the\
    \ same file as in the previous section. Alternatively, copy `gallery_mysqli_03.php`\
    \ or `gallery_pdo_03.php` to the `phpsols` site root, and save it as `gallery.php`\n\
    \nLocate the opening `<a>` tag of the link surrounding the thumbnail. It looks\
    \ like this:\n\n```\n<a href=\"gallery.php\">\n```\n\nChange it to this:\n\n```\n\
    <a href=\"<?= $_SERVER['PHP_SELF']; ?>?image=<?=$row['filename']; ?>\">\n```\n\
    \nBe careful when typing the code. It’s easy to mix up the question marks in the\
    \ PHP tags with the question mark at the beginning of the query string. It’s also\
    \ important that there are no spaces surrounding `?image=`.\n\n`$_SERVER['PHP_SELF']`\
    \ is a handy predefined variable that refers to the name of the current page.\
    \ You could just leave `gallery.php` hard-coded in the URL, but using `$_SERVER['PHP_SELF']`\
    \ ensures that the URL is pointing to the correct page. The rest of the code builds\
    \ the query string with the current filename.\n\nSave the page and load it into\
    \ a browser. Hover your mouse pointer over the thumbnail and check the URL displayed\
    \ in the status bar. It should look like this:\n\n```\nhttp://localhost/phpsols/gallery.php?image=basin.jpg\n\
    ```\n\nIf nothing is shown in the status bar, click the thumbnail. The page shouldn’t\
    \ change, but the URL in the address bar should now include the query string.\
    \ Check that there are no gaps in the URL or query string.\n\nTo show all the\
    \ thumbnails, you need to wrap the table cell in a loop. Insert a new line after\
    \ the HTML comment about repeating the row and create the first half of a `do...\
    \ while` loop like this (see Chapter 3 for details of the different types of loops):\n\
    \n```\n<!-- This row needs to be repeated -->\n\n<?php do { ?>\n```\n\nYou already\
    \ have the details of the first record in the result set, so the code to get subsequent\
    \ records needs to go after the closing `</td>` tag. Create some space between\
    \ the closing `</td>` and `</tr>` tags, and insert the following code. It’s slightly\
    \ different for each method of database connection.\n\nFor MySQLi, use this:\n\
    \n```\n</td>\n\n<?php } while ($row = $result->fetch_assoc()); ?>\n\n</tr>\n```\n\
    \nFor PDO, use this:\n\n```\n</td>\n\n<?php } while ($row = $result->fetch());\
    \ ?>\n\n</tr>\n```\n\nThis fetches the next row in the result set and sends the\
    \ loop back to the top. Because `$row['filename']` and `$row['caption']` have\
    \ different values, the next thumbnail and its associated `alt` text are inserted\
    \ into a new table cell. The query string is also updated with the new filename.\n\
    \nSave the page and test it in a browser. You should now see all eight thumbnails\
    \ in a single row across the top of the gallery, as shown in the following screenshot.\n\
    \n![A978-1-4842-0635-5_12_Figb_HTML.jpg](A978-1-4842-0635-5_12_Figb_HTML.jpg)\n\
    \nHover your mouse pointer over each thumbnail, and you should see the query string\
    \ displaying the name of the file. You can check your code against `gallery_mysqli_04.php`\
    \ or `gallery_pdo_04.php`.\n\nClicking the thumbnails still doesn’t do anything,\
    \ so you need to create the logic that changes the main image and its associated\
    \ caption. Locate this section of code in the block above the `DOCTYPE` declaration:\n\
    \n```\n// get the name and caption for the main image\n$mainImage = $row['filename'];\n\
    $caption = $row['caption'];\n```\n\nHighlight the line that defines `$caption`\
    \ and cut it to your clipboard. Wrap the other line in a conditional statement\
    \ like this:\n\n```\n// get the name for the main image\nif (isset($_GET['image']))\
    \ {\n    $mainImage = $_GET['image'];\n} else {\n    $mainImage = $row['filename'];\n\
    }\n```\n\nThe `$_GET` array contains values passed through a query string, so\
    \ if `$_GET['image']` has been set (defined), it takes the filename from the query\
    \ string and stores it as `$mainImage`. If `$_GET['image']` doesn’t exist, the\
    \ value is taken from the first record in the result set, as before.\n\nFinally,\
    \ you need to get the caption for the main image. It’s no longer going to be the\
    \ same every time, so you need to move it to the loop that displays the thumbnails\
    \ in the `thumbs` table. It goes right after the opening curly brace of the loop\
    \ (around line 48). Position your cursor after the brace and insert a couple of\
    \ lines, then paste the caption definition that you cut in the previous step.\
    \ You want the caption to match the main image, so if the current record’s filename\
    \ is the same as `$mainImage`, that’s the one you’re after. Wrap the code that\
    \ you have just pasted in a conditional statement, like this:\n\n```\n<?php\n\
    do {\n    // set caption if thumbnail is same as main image\n    if ($row['filename']\
    \ == $mainImage) {\n        $caption = $row['caption']; // this is the line you\
    \ pasted\n    }\n?>\n```\n\nSave the page and reload it in your browser. This\
    \ time, when you click a thumbnail the main image and caption will change. Don’t\
    \ worry about some images and captions being hidden by the footer. That will correct\
    \ itself when the thumbnails move to the left of the main image.\n\n> **Note:**\
    \ Passing information through a query string like this is an important aspect\
    \ of working with PHP and database results. Although form information is normally\
    \ passed through the `$_POST` array, the `$_GET` array is frequently used to pass\
    \ details of a record that you want to display, update, or delete. It’s also commonly\
    \ used for searches because the query string can easily be bookmarked.\n\nThere’s\
    \ no danger of SQL injection in this case. But if someone changes the value of\
    \ the filename passed through the query string, you’ll get ugly error messages\
    \ if the image can’t be found and `display_errors` is on. Before calling `getimagesize()`,\
    \ let’s find out if the image exists. Wrap it in a conditional statement like\
    \ this:\n\n```\nif (file_exists('images/'.$mainImage)) {\n    // get the dimensions\
    \ of the main image\n    $imageSize = getimagesize('images/'.$mainImage)[3];\n\
    } else {\n    $error = 'Image not found.';\n}\n```\n\nTry changing the value of\
    \ `image` in the query string to any value except that of an existent file. When\
    \ you load the page, you should see *Image not found*.\n\nCheck your code, if\
    \ necessary, against `gallery_mysqli_05.php` or `gallery_pdo_05.php`.\n\n## Creating\
    \ a Multicolumn Table\n\nWith only eight images, the single row of thumbnails\
    \ across the top of the gallery doesn’t look too bad. However, it’s useful to\
    \ be able to build a table dynamically by using a loop that inserts a specific\
    \ number of table cells in a row before moving to the next row. This is achieved\
    \ by keeping count of how many cells have been inserted. When the limit is reached\
    \ for the row, the code needs to insert a closing tag for the current row and,\
    \ if more thumbnails remain, also insert an opening tag for the next row. What\
    \ makes it easy to implement is the modulus operator, `%`, which returns the remainder\
    \ of a division.\n\nThis is how it works. Let’s say you want two cells in each\
    \ row. After the first cell is inserted, the counter is set to `1`. If you divide\
    \ `1` by `2` with the modulus operator (`1 % 2`), the result is `1`. When the\
    \ next cell is inserted, the counter is increased to `2`. The result of `2 % 2`\
    \ is `0`. The next cell produces this calculation: `3 % 2`, which results in `1`;\
    \ but the fourth cell produces `4 % 2`, which is again `0`. So, every time that\
    \ the calculation results in `0`, you know—or to be more exact, PHP knows—you’re\
    \ at the end of a row.\n\nSo how do you know if there are any more rows left?\
    \ By putting the code that inserts the closing and opening `<tr>` tags at the\
    \ top of the loop, there must always be at least one image left. However, the\
    \ first time the loop runs, the remainder is also `0`, so the issue is that you\
    \ need to prevent the tags from being inserted until at least one image has been\
    \ displayed. Phew... let’s try it."
  raw: '#### PHP Solution 12-2: Activating the Thumbnails


    Continue working with the same file as in the previous section. Alternatively,
    copy `gallery_mysqli_03.php` or `gallery_pdo_03.php` to the `phpsols` site root,
    and save it as `gallery.php`


    Locate the opening `<a>` tag of the link surrounding the thumbnail. It looks like
    this:


    `<a href="gallery.php">`


    Change it to this:


    `<a href="` `<?= $_SERVER[''PHP_SELF'']; ?>?image=<?=$row[''filename'']; ?>` `">`


    Be careful when typing the code. It’s easy to mix up the question marks in the
    PHP tags with the question mark at the beginning of the query string. It’s also
    important that there are no spaces surrounding `?image=`.


    `$_SERVER[''PHP_SELF'']` is a handy predefined variable that refers to the name
    of the current page. You could just leave `gallery.php` hard-coded in the URL,
    but using `$_SERVER[''PHP_SELF'']` ensures that the URL is pointing to the correct
    page. The rest of the code builds the query string with the current filename.


    Save the page and load it into a browser. Hover your mouse pointer over the thumbnail
    and check the URL displayed in the status bar. It should look like this:


    `http://localhost/phpsols/gallery.php?image=basin.jpg`


    If nothing is shown in the status bar, click the thumbnail. The page shouldn’t
    change, but the URL in the address bar should now include the query string. Check
    that there are no gaps in the URL or query string.


    To show all the thumbnails, you need to wrap the table cell in a loop. Insert
    a new line after the HTML comment about repeating the row and create the first
    half of a `do... while` loop like this (see [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)
    for details of the different types of loops):


    `<!-- This row needs to be repeated -->`


    `<?php do { ?>`


    You already have the details of the first record in the result set, so the code
    to get subsequent records needs to go after the closing `</td>` tag. Create some
    space between the closing `</td>` and `</tr>` tags, and insert the following code.
    It’s slightly different for each method of database connection.


    For MySQLi, use this:


    `</td>`


    `<?php } while ($row = $result->fetch_assoc()); ?>`


    `</tr>`


    For PDO, use this:


    `</td>`


    `<?php } while ($row = $result->fetch()); ?>`


    `</tr>`


    This fetches the next row in the result set and sends the loop back to the top.
    Because `$row[''filename'']` and `$row[''caption'']` have different values, the
    next thumbnail and its associated `alt` text are inserted into a new table cell.
    The query string is also updated with the new filename.


    Save the page and test it in a browser. You should now see all eight thumbnails
    in a single row across the top of the gallery, as shown in the following screenshot.


    ![A978-1-4842-0635-5_12_Figb_HTML.jpg](A978-1-4842-0635-5_12_Figb_HTML.jpg)


    Hover your mouse pointer over each thumbnail, and you should see the query string
    displaying the name of the file. You can check your code against `gallery_mysqli_04.php`
    or `gallery_pdo_04.php`.


    Clicking the thumbnails still doesn’t do anything, so you need to create the logic
    that changes the main image and its associated caption. Locate this section of
    code in the block above the `DOCTYPE` declaration:


    `// get the name and caption for the main image`


    `$mainImage = $row[''filename''];`


    `$caption = $row[''caption''];`


    Highlight the line that defines `$caption` and cut it to your clipboard. Wrap
    the other line in a conditional statement like this:


    `// get the name for the main image`


    `if (isset($_GET[''image''])) {`


    `$mainImage = $_GET[''image''];`


    `} else {`


    `$mainImage = $row[''filename''];`


    `}`


    The `$_GET` array contains values passed through a query string, so if `$_GET[''image'']`
    has been set (defined), it takes the filename from the query string and stores
    it as `$mainImage`. If `$_GET[''image'']` doesn’t exist, the value is taken from
    the first record in the result set, as before.


    Finally, you need to get the caption for the main image. It’s no longer going
    to be the same every time, so you need to move it to the loop that displays the
    thumbnails in the `thumbs` table. It goes right after the opening curly brace
    of the loop (around line 48). Position your cursor after the brace and insert
    a couple of lines, then paste the caption definition that you cut in the previous
    step. You want the caption to match the main image, so if the current record’s
    filename is the same as `$mainImage`, that’s the one you’re after. Wrap the code
    that you have just pasted in a conditional statement, like this:


    `<?php`


    `do {`


    `// set caption if thumbnail is same as main image`


    `if ($row[''filename''] == $mainImage) {`


    `$caption = $row[''caption'']; // this is the line you pasted`


    `}`


    `?>`


    Save the page and reload it in your browser. This time, when you click a thumbnail
    the main image and caption will change. Don’t worry about some images and captions
    being hidden by the footer. That will correct itself when the thumbnails move
    to the left of the main image.   Note


    Passing information through a query string like this is an important aspect of
    working with PHP and database results. Although form information is normally passed
    through the `$_POST` array, the `$_GET` array is frequently used to pass details
    of a record that you want to display, update, or delete. It’s also commonly used
    for searches because the query string can easily be bookmarked.


    There’s no danger of SQL injection in this case. But if someone changes the value
    of the filename passed through the query string, you’ll get ugly error messages
    if the image can’t be found and `display_errors` is on. Before calling `getimagesize()`,
    let’s find out if the image exists. Wrap it in a conditional statement like this:


    `if (file_exists(''images/''.$mainImage)) {`


    `// get the dimensions of the main image`


    `$imageSize = getimagesize(''images/''.$mainImage)[3];`


    `} else {`


    `$error = ''Image not found.'';`


    `}`


    Try changing the value of `image` in the query string to any value except that
    of an existent file. When you load the page, you should see Image not found.


    Check your code, if necessary, against `gallery_mysqli_05.php` or `gallery_pdo_05.php`.


    ### Creating a Multicolumn table


    With only eight images, the single row of thumbnails across the top of the gallery
    doesn’t look too bad. However, it’s useful to be able to build a table dynamically
    by using a loop that inserts a specific number of table cells in a row before
    moving to the next row. This is achieved by keeping count of how many cells have
    been inserted. When the limit is reached for the row, the code needs to insert
    a closing tag for the current row and, if more thumbnails remain, also insert
    an opening tag for the next row. What makes it easy to implement is the modulus
    operator, `%`, which returns the remainder of a division.


    This is how it works. Let’s say you want two cells in each row. After the first
    cell is inserted, the counter is set to `1`. If you divide `1` by `2` with the
    modulus operator (`1 % 2`), the result is `1`. When the next cell is inserted,
    the counter is increased to `2`. The result of `2 % 2` is `0`. The next cell produces
    this calculation: `3 % 2`, which results in `1`; but the fourth cell produces
    `4 % 2`, which is again `0`. So, every time that the calculation results in `0`,
    you know—or to be more exact, PHP knows—you’re at the end of a row.


    So how do you know if there are any more rows left? By putting the code that inserts
    the closing and opening `<tr>` tags at the top of the loop, there must always
    be at least one image left. However, the first time the loop runs, the remainder
    is also `0`, so the issue is that you need to prevent the tags from being inserted
    until at least one image has been displayed. Phew . . . let’s try it.'
  trans: "\n# PHP 方案 12-2：激活缩略图\n\n继续使用上一节中的同一文件。或者，将 `gallery_mysqli_03.php` 或 `gallery_pdo_03.php`\
    \ 复制到 `phpsols` 站点根目录，并将其保存为 `gallery.php`\n\n找到包裹缩略图的链接起始 `<a>` 标签，内容如下：\n\n\
    ```\n<a href=\"gallery.php\">\n```\n\n将其修改为：\n\n```\n<a href=\"<?= $_SERVER['PHP_SELF'];\
    \ ?>?image=<?=$row['filename']; ?>\">\n```\n\n键入代码时需小心。PHP 标签中的问号很容易与查询字符串开头的问号混淆。同样重要的是，`?image=`\
    \ 周围不应有空格。\n\n`$_SERVER['PHP_SELF']` 是一个便捷的预定义变量，指向当前页面的名称。你可以直接在 URL 中硬编码 `gallery.php`，但使用\
    \ `$_SERVER['PHP_SELF']` 可确保 URL 指向正确的页面。其余代码则使用当前文件名构建查询字符串。\n\n保存页面并在浏览器中加载。将鼠标指针悬停在缩略图上，查看状态栏中显示的\
    \ URL。它应显示如下：\n\n```\nhttp://localhost/phpsols/gallery.php?image=basin.jpg\n```\n\
    \n如果状态栏中未显示任何内容，请单击缩略图。页面应保持不变，但地址栏中的 URL 现在应包含查询字符串。检查 URL 或查询字符串中是否有间隙。\n\n\
    要显示所有缩略图，您需要将表格单元格包裹在一个循环中。在关于重复行的 HTML 注释后插入新行，并创建一个 `do... while` 循环的前半部分，如下所示（关于不同类型循环的详细信息，请参阅第\
    \ 3 章）：\n\n```\n<!-- 此行需重复 -->\n\n<?php do { ?>\n```\n\n结果集中已有第一条记录的详细信息，因此获取后续记录的代码需要放在结束的\
    \ `</td>` 标签之后。在结束的 `</td>` 和 `</tr>` 标签之间创建一些空间，并插入以下代码。根据不同数据库连接方法，代码略有不同。\n\
    \n对于 MySQLi，请使用：\n\n```\n</td>\n\n<?php } while ($row = $result->fetch_assoc());\
    \ ?>\n\n</tr>\n```\n\n对于 PDO，请使用：\n\n```\n</td>\n\n<?php } while ($row = $result->fetch());\
    \ ?>\n\n</tr>\n```\n\n这会获取结果集中的下一条记录，并将循环返回至顶部。由于 `$row['filename']` 和 `$row['caption']`\
    \ 的值不同，因此下一个缩略图及其关联的 `alt` 文本会被插入到新的表格单元格中。查询字符串也会随新文件名更新。\n\n保存页面并在浏览器中测试。您现在应该看到所有八个缩略图排列在画廊顶部的一行中，如下面的截图所示。\n\
    \n![A978-1-4842-0635-5_12_Figb_HTML.jpg](img/A978-1-4842-0635-5_12_Figb_HTML.jpg)\n\
    \n将鼠标指针悬停在每个缩略图上，您应该会看到查询字符串显示文件名。您可以对照 `gallery_mysqli_04.php` 或 `gallery_pdo_04.php`\
    \ 检查您的代码。\n\n单击缩略图仍然没有反应，因此您需要创建改变主图像及其关联说明的逻辑。在 `DOCTYPE` 声明上方的代码块中找到此部分：\n\n\
    ```\n// 获取主图像的名称和说明\n$mainImage = $row['filename'];\n$caption = $row['caption'];\n\
    ```\n\n选中定义 `$caption` 的那一行，并将其剪切到剪贴板。将另一行包裹在条件语句中，如下所示：\n\n```\n// 获取主图像的名称\n\
    if (isset($_GET['image'])) {\n    $mainImage = $_GET['image'];\n} else {\n   \
    \ $mainImage = $row['filename'];\n}\n```\n\n`$_GET` 数组包含通过查询字符串传递的值，因此如果设置了（定义了）`$_GET['image']`，它将从查询字符串中获取文件名并存储为\
    \ `$mainImage`。如果 `$_GET['image']` 不存在，则像之前一样从结果集中的第一条记录获取值。\n\n最后，您需要获取主图像的说明。它不再每次都相同，因此您需要将其移动到在\
    \ `thumbs` 表中显示缩略图的循环中。将它放在循环的起始花括号之后（大约在第 48 行）。将光标置于花括号后，插入几行，然后粘贴您在上一步中剪切的说明定义。您希望说明与主图像匹配，因此如果当前记录的文件名与\
    \ `$mainImage` 相同，那就是您要找的。将刚刚粘贴的代码包裹在条件语句中，如下所示：\n\n```\n<?php\ndo {\n    // 如果缩略图与主图像相同，则设置说明\n\
    \    if ($row['filename'] == $mainImage) {\n        $caption = $row['caption'];\
    \ // 这是您粘贴的行\n    }\n?>\n```\n\n保存页面并在浏览器中重新加载。这次，当您单击缩略图时，主图像和说明将会改变。不用担心某些图像和说明被页脚遮挡。当缩略图移动到主图像左侧时，这将自行修正。\n\
    \n> **注意：** 像这样通过查询字符串传递信息是使用 PHP 和数据库结果的一个重要方面。虽然表单信息通常通过 `$_POST` 数组传递，但 `$_GET`\
    \ 数组经常用于传递要显示、更新或删除的记录的详细信息。它也常用于搜索，因为查询字符串很容易被添加书签。\n\n在这种情况下没有 SQL 注入的风险。但如果有其他人更改了通过查询字符串传递的文件名的值，并且开启了\
    \ `display_errors`，那么在找不到图像时，您将看到丑陋的错误消息。在调用 `getimagesize()` 之前，让我们先检查图像是否存在。将其包裹在条件语句中，如下所示：\n\
    \n```\nif (file_exists('images/'.$mainImage)) {\n    // 获取主图像的尺寸\n    $imageSize\
    \ = getimagesize('images/'.$mainImage)[3];\n} else {\n    $error = '图像未找到。';\n\
    }\n```\n\n尝试将查询字符串中 `image` 的值更改为除现有文件之外的任何值。加载页面时，您应该会看到*图像未找到*。\n\n如有必要，请对照\
    \ `gallery_mysqli_05.php` 或 `gallery_pdo_05.php` 检查您的代码。\n\n## 创建多列表格\n\n仅有八张图片时，画廊顶部的一行缩略图看起来还不错。然而，能够通过使用循环动态构建表格非常有用，该循环在一行中插入特定数量的表格单元格，然后移入下一行。这是通过记录已插入的单元格数量来实现的。当达到该行的限制时，代码需要为当前行插入结束标签，并且如果还有更多缩略图，还需为下一行插入开始标签。使其易于实现的是取模运算符\
    \ `%`，它返回除法的余数。\n\n这是它的工作原理。假设您希望每行有两个单元格。插入第一个单元格后，计数器设置为 `1`。如果用取模运算符计算 `1`\
    \ 除以 `2`（`1 % 2`），结果是 `1`。当插入下一个单元格时，计数器增加到 `2`。`2 % 2` 的结果是 `0`。下一个单元格产生这样的计算：`3\
    \ % 2`，结果为 `1`；但第四个单元格产生 `4 % 2`，结果又是 `0`。因此，每次计算结果为 `0` 时，您就知道——或者更确切地说，PHP 知道——您已经到达了一行的末尾。\n\
    \n那么如何知道是否还有更多行呢？通过将插入结束和开始 `<tr>` 标签的代码放在循环顶部，必须至少还剩一张图片。然而，循环第一次运行时，余数也是 `0`，问题在于您需要阻止插入这些标签，直到至少显示了一张图片。呼……让我们试试看。\n"
- fmt: "# PHP Solution 12-3: Looping Horizontally and Vertically\n\nThis PHP solution\
    \ shows how to control a loop so as to display a specific number of columns in\
    \ a table. The number of columns is controlled by setting a constant. Continue\
    \ working with the files from the preceding section. Alternatively, use `gallery_mysqli_05.php`\
    \ or `gallery_pdo_05.php`.\n\nYou may decide at a later stage that you want to\
    \ change the number of columns in the table, so it’s a good idea to create a constant\
    \ at the top of the script where it’s easy to find, rather than burying the figures\
    \ deep in your code. Insert the following code just before creating the database\
    \ connection:\n\n```\n// define number of columns in table\ndefine('COLS', 2);\n\
    ```\n\nA constant is similar to a variable, except that its value cannot be changed\
    \ by another part of the script. You create a constant with the `define()` function,\
    \ which takes two arguments: the name of the constant and its value. By convention,\
    \ constants are always in uppercase. Unlike variables, they do not begin with\
    \ a dollar sign.\n\nYou need to initialize the cell counter outside the loop.\
    \ Also create a variable that indicates whether it’s the first row. Add the following\
    \ code immediately after the constant you have just defined:\n\n```\ndefine('COLS',\
    \ 2);\n\n// initialize variables for the horizontal looper\n$pos = 0;\n$firstRow\
    \ = true;\n```\n\nThe code that keeps count of the columns goes inside the PHP\
    \ block at the start of the loop that displays the thumbnails. Amend the code\
    \ like this:\n\n```\n<?php do {\n  // set caption if thumbnail is same as main\
    \ image\n  if ($row['filename'] == $mainImage) {\n    $caption = $row['caption'];\n\
    \  }\n\n  // if remainder is 0 and not first row, close row and start new one\n\
    \  if ($pos++ % COLS === 0 && !$firstRow) {\n    echo '</tr><tr>';\n  }\n\n  //\
    \ once loop begins, this is no longer true\n  $firstRow = false;\n?>\n```\n\n\
    Because the increment operator (`++`) is placed after `$pos`, its value is divided\
    \ by the number of columns before being incremented by `1`. The first time the\
    \ loop runs, the remainder is `0`, but `$firstRow` is `true`, so the conditional\
    \ statement fails. However, `$firstRow` is reset to `false` after the conditional\
    \ statement. On future iterations of the loop, the conditional statement closes\
    \ the current table row and starts a new one each time the remainder is `0`.\n\
    \nIf there are no more records, you need to check if you have an incomplete row\
    \ at the bottom of the table. Add a `while` loop after the existing `do...while`\
    \ loop. In the MySQLi version, it looks like this:\n\n```\n<?php } while ($row\
    \ = $result->fetch_assoc());\n\nwhile ($pos++ % COLS) {\n  echo '<td>&nbsp;</td>';\n\
    }\n?>\n```\n\nThe new code is identical in the PDO version. The only difference\
    \ is that the preceding line uses `$result->fetch()` instead of `$result->fetch_assoc()`.\n\
    \nThe second loop continues incrementing `$pos` while `$pos++ % COLS` produces\
    \ a remainder (which is interpreted as `true`) and inserts an empty cell.\n\n\
    **Caution:** This second loop is not nested inside the first. It runs only after\
    \ the first loop has ended.\n\n![A978-1-4842-0635-5_12_Fig4_HTML.jpg](A978-1-4842-0635-5_12_Fig4_HTML.jpg)\n\
    \nFigure 12-4. The thumbnails are now in neat columns\n\nSave the page and reload\
    \ it in a browser. The single row of thumbnails across the top of the gallery\
    \ should now be neatly lined up two by two, as shown in Figure [12-4](#A978-1-4842-0635-5_12_Chapter.html#Fig4).\n\
    \nTry changing the value of `COLS` and reloading the page. The main image will\
    \ be displaced because the page has been designed for only two columns, but you\
    \ can see how easy it is to control the number of cells in each row by changing\
    \ just one number. You can check your code against `gallery_mysqli_06.php` or\
    \ `gallery_pdo_06.php`.\n\n## Paging Through a Long set of Records\n\nThe grid\
    \ of eight thumbnails fits quite comfortably in the gallery, but what if you have\
    \ 28 or 48? The answer is to limit the number of results displayed on each page\
    \ and then build a navigation system that lets you page back and forth through\
    \ the results. You’ve seen this technique countless times when using a search\
    \ engine; now you’re going to learn how to build it yourself.\n\nThe task can\
    \ be broken down into the following two stages:\n\n- Selecting a subset of records\
    \ to display\n- Creating the navigation links to page through the subsets\n\n\
    Both stages are relatively easy to implement, although they involve applying a\
    \ little conditional logic. Keep a cool head, and you’ll breeze through it.\n\n\
    ### Selecting a Subset of Records\n\nLimiting the number of results on a page\
    \ is simple—just add the `LIMIT` keyword to the SQL query like this:\n\n```\n\
    SELECT filename, caption FROM images LIMIT startPosition, maximum\n```\n\nThe\
    \ `LIMIT` keyword can be followed by one or two numbers. If you use just one number,\
    \ it sets the maximum number of records to be retrieved. That’s useful, but it’s\
    \ not suitable for a paging system. For that, you need to use two numbers: the\
    \ first indicates which record to start from, and the second stipulates the maximum\
    \ number of records to be retrieved. MySQL counts records from 0, so to display\
    \ the first six images, you need the following SQL:\n\n```\nSELECT filename, caption\
    \ FROM images LIMIT 0, 6\n```\n\nTo show the next set, the SQL needs to change\
    \ to this:\n\n```\nSELECT filename, caption FROM images LIMIT 6, 6\n```\n\nThere\
    \ are only eight records in the `images` table, but the second number is only\
    \ a maximum, so this retrieves records 7 and 8.\n\nTo build the navigation system,\
    \ you need a way of generating these numbers. The second number never changes,\
    \ so let’s define a constant called `SHOWMAX`. Generating the first number (call\
    \ it `$startRecord`) is pretty easy, too. Start numbering the pages from 0, and\
    \ multiply the second number by the current page number. So, if you call the current\
    \ page `$curPage`, the formula looks like this:\n\n```\n$startRecord = $curPage\
    \ * SHOWMAX;\n```\n\nAnd for the SQL, it becomes this:\n\n```\nSELECT filename,\
    \ caption FROM images LIMIT $startRecord, SHOWMAX\n```\n\nIf `$curPage` is 0,\
    \ `$startRecord` is also 0 (0 × 6), but when `$curPage` increases to 1, `$startRecord`\
    \ changes to 6 (1 × 6), and so on.\n\nSince there are only eight records in the\
    \ `images` table, you need a way of finding out the total number of records so\
    \ as to prevent the navigation system from retrieving empty result sets. In the\
    \ last chapter, you used the MySQLi `num_rows` property, and `rowCount()` in PDO.\
    \ However, that won’t work this time, because you want to know the total number\
    \ of records, not how many there are in the current result set. The answer is\
    \ to use the SQL `COUNT()` function like this:\n\n```\nSELECT COUNT(*) FROM images\n\
    ```\n\nWhen used like this in combination with an asterisk, `COUNT()` gets the\
    \ total number of records in the table. So, to build a navigation system, you\
    \ need to run both SQL queries: one to find the total number of records, and the\
    \ other to retrieve the required subset. These are simple queries, so the result\
    \ is almost instantaneous.\n\nI’ll deal with the navigation links later. Let’s\
    \ begin by limiting the number of thumbnails on the first page."
  raw: '#### PHP Solution 12-3: Looping Horizontally and Vertically


    This PHP solution shows how to control a loop so as to display a specific number
    of columns in a table. The number of columns is controlled by setting a constant.
    Continue working with the files from the preceding section. Alternatively, use
    `gallery_mysqli_05.php` or `gallery_pdo_05.php`.


    You may decide at a later stage that you want to change the number of columns
    in the table, so it’s a good idea to create a constant at the top of the script
    where it’s easy to find, rather than burying the figures deep in your code. Insert
    the following code just before creating the database connection:  


    `// define number of columns in table`


    `define(''COLS'', 2);`


    A constantis similar to a variable, except that its value cannot be changed by
    another part of the script. You create a constant with the `define()` function,
    which takes two arguments: the name of the constant and its value. By convention,
    constants are always in uppercase. Unlike variables, they do not begin with a
    dollar sign.


    You need to initialize the cell counter outside the loop. Also create a variable
    that indicates whether it’s the first row. Add the following code immediately
    after the constant you have just defined:  


    `define(''COLS'', 2);`


    `// initialize variables for the horizontal looper`


    `$pos = 0;`


    `$firstRow = true;`


    The code that keeps count of the columns goes inside the PHP block at the start
    of the loop that displays the thumbnails. Amend the code like this:  


    `<?php do {`


    `// set caption if thumbnail is same as main image`


    `if ($row[''filename''] == $mainImage) {`


    `$caption = $row[''caption''];`


    `}`


    `// if remainder is 0 and not first row, close row and start new one`


    `if ($pos++ % COLS === 0` `&&` `!$firstRow) {`


    `echo ''</tr><tr>'';`


    `}`


    `// once loop begins, this is no longer true`


    `$firstRow = false;`


    `?>`


    Because the increment operator (`++`) is placed after `$pos`, its value is divided
    by the number of columns before being incremented by `1`. The first time the loop
    runs, the remainder is `0`, but `$firstRow` is `true`, so the conditional statement
    fails. However, `$firstRow` is reset to `false` after the conditional statement.
    On future iterations of the loop, the conditional statement closes the current
    table row and starts a new one each time the remainder is `0`.


    If there are no more records, you need to check if you have an incomplete row
    at the bottom of the table. Add a `while` loop after the existing `do. . . while`
    loop. In the MySQLi version, it looks like this:  


    `<?php } while ($row = $result->fetch_assoc());`


    `while ($pos++ % COLS) {`


    `echo ''<td>` `&` `nbsp;</td>'';`


    `}`


    `?>`


    The new code is identical in the PDO version. The only difference is that the
    preceding line uses `$result->fetch()` instead of `$result->fetch_assoc()`.


    The second loop continues incrementing `$pos` while `$pos++ % COLS` produces a
    remainder (which is interpreted as `true`) and inserts an empty cell.


    Caution


    This second loop is not nested inside the first. It runs only after the first
    loop has ended.


    ![A978-1-4842-0635-5_12_Fig4_HTML.jpg](A978-1-4842-0635-5_12_Fig4_HTML.jpg)


    Figure 12-4.


    The thumbnails are now in neat columns Save the page and reload it in a browser.
    The single row of thumbnails across the top of the gallery should now be neatly
    lined up two by two, as shown in Figure [12-4](#A978-1-4842-0635-5_12_Chapter.html#Fig4).
     


    Try changing the value of `COLS` and reloading the page. The main image will be
    displaced because the page has been designed for only two columns, but you can
    see how easy it is to control the number of cells in each row by changing just
    one number. You can check your code against `gallery_mysqli_06.php` or `gallery_pdo_06.php`.


    ### Paging Through a Long set of Records


    The grid of eight thumbnails fits quite comfortably in the gallery, but what if
    you have 28 or 48? The answer is to limit the number of results displayed on each
    page and then build a navigation system that lets you page back and forth through
    the results. You’ve seen this technique countless times when using a search engine;
    now you’re going to learn how to build it yourself.The task can be broken down
    into the following two stages:


    Selecting a subset of records to display   Creating the navigation links to page
    through the subsets  


    Both stages are relatively easy to implement, although they involve applying a
    little conditional logic. Keep a cool head, and you’ll breeze through it.


    #### Selecting a Subset of Records


    Limiting the number of results on a page is simple—just add the `LIMIT` keyword
    to the SQL query like this:


    `SELECT filename, caption FROM images LIMIT` `startPosition` `,` `maximum`


    The `LIMIT` keyword can be followed by one or two numbers. If you use just one
    number, it sets the maximum number of records to be retrieved. That’s useful,
    but it’s not suitable for a paging system. For that, you need to use two numbers:
    the first indicates which record to start from, and the second stipulates the
    maximum number of records to be retrieved. MySQL counts records from 0, so to
    display the first six images, you need the following SQL:


    `SELECT filename, caption FROM images LIMIT 0, 6`


    To show the next set, the SQL needs to change to this:


    `SELECT filename, caption FROM images LIMIT 6, 6`


    There are only eight records in the `images` table, but the second number is only
    a maximum, so this retrieves records 7 and 8.


    To build the navigation system, you need a way of generating these numbers. The
    second number never changes, so let’s define a constant called `SHOWMAX`. Generating
    the first number (call it `$startRecord`) is pretty easy, too. Start numbering
    the pages from 0, and multiply the second number by the current page number. So,
    if you call the current page `$curPage`, the formula looks like this:


    `$startRecord = $curPage * SHOWMAX;`


    And for the SQL, it becomes this:


    `SELECT filename, caption FROM images LIMIT $startRecord, SHOWMAX`


    If `$curPage` is 0, `$startRecord` is also 0 (0 × 6), but when `$curPage` increases
    to 1, `$startRecord` changes to 6 (1 × 6), and so on.


    Since there are only eight records in the `images` table, you need a way of finding
    out the total number of records so as to prevent the navigation system from retrieving
    empty result sets. In the last chapter, you used the MySQLi `num_rows` property,
    and `rowCount()` in PDO. However, that won’t work this time, because you want
    to know the total number of records, not how many there are in the current result
    set. The answer is to use the SQL `COUNT()` function like this:


    `SELECT COUNT(*) FROM images`


    When used like this in combination with an asterisk, `COUNT()` gets the total
    number of records in the table. So, to build a navigation system, you need to
    run both SQL queries: one to find the total number of records, and the other to
    retrieve the required subset. These are simple queries, so the result is almost
    instantaneous.


    I’ll deal with the navigation links later. Let’s begin by limiting the number
    of thumbnails on the first page.'
  trans: "\n# PHP 解决方案 12-3：水平与垂直循环\n\n本 PHP 解决方案展示了如何控制循环，以在表格中显示特定数量的列。列数通过设置一个常量来控制。继续使用上一节中的文件，或者使用\
    \ `gallery_mysqli_05.php` 或 `gallery_pdo_05.php`。\n\n你可能会在后续阶段想要更改表格中的列数，因此最好在脚本顶部创建一个易于查找的常量，而不是将数值深埋在代码中。在创建数据库连接之前插入以下代码：\n\
    \n```\n// 定义表格中的列数\ndefine('COLS', 2);\n```\n\n常量与变量类似，区别在于其值不能被脚本的其他部分更改。你可以使用\
    \ `define()` 函数创建常量，该函数接受两个参数：常量的名称和它的值。按照惯例，常量总是使用大写字母。与变量不同，它们不以美元符号开头。\n\n\
    你需要在循环外部初始化单元格计数器。同时创建一个变量来指示是否为第一行。在你刚刚定义的常量之后立即添加以下代码：\n\n```\ndefine('COLS',\
    \ 2);\n\n// 初始化水平循环的变量\n$pos = 0;\n$firstRow = true;\n```\n\n用于计数的代码放在显示缩略图的循环起始处的\
    \ PHP 块内。像这样修改代码：\n\n```\n<?php do {\n  // 如果缩略图与主图像相同，则设置标题\n  if ($row['filename']\
    \ == $mainImage) {\n    $caption = $row['caption'];\n  }\n\n  // 如果余数为 0 且不是第一行，则关闭当前行并开始新行\n\
    \  if ($pos++ % COLS === 0 && !$firstRow) {\n    echo '</tr><tr>';\n  }\n\n  //\
    \ 循环开始后，此条件不再成立\n  $firstRow = false;\n?>\n```\n\n由于递增运算符（`++`）放在 `$pos` 之后，其值在递增\
    \ `1` 之前被列数除。循环第一次运行时，余数为 `0`，但 `$firstRow` 为 `true`，因此条件语句失败。然而，在条件语句之后，`$firstRow`\
    \ 被重置为 `false`。在循环的后续迭代中，每次余数为 `0` 时，条件语句会关闭当前表格行并开始新的一行。\n\n如果没有更多记录，你需要检查表格底部是否有未完成的行。在现有的\
    \ `do...while` 循环之后添加一个 `while` 循环。在 MySQLi 版本中，它看起来像这样：\n\n```\n<?php } while\
    \ ($row = $result->fetch_assoc());\n\nwhile ($pos++ % COLS) {\n  echo '<td>&nbsp;</td>';\n\
    }\n?>\n```\n\n在 PDO 版本中，新代码是相同的。唯一的区别是前一行使用 `$result->fetch()` 而不是 `$result->fetch_assoc()`。\n\
    \n第二个循环在 `$pos++ % COLS` 产生余数（被解释为 `true`）时，继续递增 `$pos`，并插入一个空单元格。\n\n**注意：**\
    \ 这个第二个循环并未嵌套在第一个循环内部。它仅在第一个循环结束后运行。\n\n![A978-1-4842-0635-5_12_Fig4_HTML.jpg](img/A978-1-4842-0635-5_12_Fig4_HTML.jpg)\n\
    \n图 12-4。缩略图现在整齐排列成列\n\n保存页面并在浏览器中重新加载。原本在画廊顶部单行排列的缩略图现在应整齐地两两对齐，如图 12-4 所示。\n\
    \n尝试更改 `COLS` 的值并重新加载页面。主图像可能会被移位，因为页面仅设计为两列，但你可以看到通过更改一个数字就能轻松控制每行的单元格数量。你可以将代码与\
    \ `gallery_mysqli_06.php` 或 `gallery_pdo_06.php` 进行对照检查。\n\n## 分页浏览长记录集\n\n八个缩略图的网格在画廊中显示得很合适，但如果你有\
    \ 28 个或 48 个呢？答案是限制每页显示的结果数量，然后构建一个导航系统，让你能够在结果中前后翻页。你在使用搜索引擎时已经无数次见过这种技术；现在你将学习如何自己构建它。\n\
    \n这项任务可以分解为以下两个阶段：\n\n- 选择要显示的子集记录\n- 创建用于翻页浏览子集的导航链接\n\n这两个阶段都相对容易实现，尽管它们需要应用一些条件逻辑。保持冷静，你就能轻松完成。\n\
    \n### 选择子集记录\n\n限制每页的结果数量很简单——只需在 SQL 查询中添加 `LIMIT` 关键字，如下所示：\n\n```\nSELECT filename,\
    \ caption FROM images LIMIT 起始位置, 最大数量\n```\n\n`LIMIT` 关键字后面可以跟一个或两个数字。如果只使用一个数字，它会设置要检索的最大记录数。这很有用，但不适合分页系统。为此，你需要使用两个数字：第一个数字指示从哪条记录开始，第二个数字规定要检索的最大记录数。MySQL\
    \ 从 0 开始计数记录，因此要显示前六张图片，你需要以下 SQL：\n\n```\nSELECT filename, caption FROM images\
    \ LIMIT 0, 6\n```\n\n要显示下一组，SQL 需要改为这样：\n\n```\nSELECT filename, caption FROM\
    \ images LIMIT 6, 6\n```\n\n`images` 表中只有八条记录，但第二个数字只是一个最大值，因此这会检索记录 7 和 8。\n\n\
    要构建导航系统，你需要一种生成这些数字的方法。第二个数字永远不会改变，所以我们定义一个名为 `SHOWMAX` 的常量。生成第一个数字（称之为 `$startRecord`）也非常容易。从\
    \ 0 开始对页面编号，然后将第二个数字乘以当前页码。因此，如果你将当前页称为 `$curPage`，公式如下：\n\n```\n$startRecord\
    \ = $curPage * SHOWMAX;\n```\n\n对于 SQL，它变为：\n\n```\nSELECT filename, caption FROM\
    \ images LIMIT $startRecord, SHOWMAX\n```\n\n如果 `$curPage` 是 0，`$startRecord`\
    \ 也是 0（0 × 6），但当 `$curPage` 增加到 1 时，`$startRecord` 变为 6（1 × 6），依此类推。\n\n由于 `images`\
    \ 表中只有八条记录，你需要一种方法来找出记录总数，以防止导航系统检索空结果集。在上一章中，你使用了 MySQLi 的 `num_rows` 属性和 PDO\
    \ 的 `rowCount()`。但这次它们不起作用，因为你想知道的是记录总数，而不是当前结果集中的记录数。答案是使用 SQL 的 `COUNT()` 函数，如下所示：\n\
    \n```\nSELECT COUNT(*) FROM images\n```\n\n当与星号结合使用时，`COUNT()` 会获取表中的记录总数。因此，要构建导航系统，你需要运行两个\
    \ SQL 查询：一个用于查找记录总数，另一个用于检索所需的子集。这些是简单的查询，因此结果几乎是即时的。\n\n我稍后会处理导航链接。我们先从限制第一页上的缩略图数量开始。\n"
- fmt: "### PHP Solution 12-4: Displaying a Subset of Records\n\nThis PHP solution\
    \ shows how to select a subset of records in preparation for creating a navigation\
    \ system that pages through a longer set. It also demonstrates how to display\
    \ the numbers of the current selection, as well as the total number of records.\n\
    \nContinue working with the same file as before. Alternatively, use `gallery_mysqli_06.php`\
    \ or `gallery_pdo_06.php`.\n\nDefine `SHOWMAX` and the SQL query to find the total\
    \ number of records in the table. Amend the code toward the top of the page like\
    \ this (new code is shown in bold):\n\n```\n// initialize variables for the horizontal\
    \ looper\n$pos = 0;\n$firstRow = true;\n\n// set maximum number of records\ndefine('SHOWMAX',\
    \ 6);\n\n$conn = dbConnect('read');\n\n// prepare SQL to get total records\n$getTotal\
    \ = 'SELECT COUNT(*) FROM images';\n```\n\nYou now need to run the new SQL query.\
    \ The code goes immediately after the code in the preceding step but differs according\
    \ to the type of MySQL connection. For MySQLi, use this:\n\n```\n// submit query\
    \ and store result as $totalPix\n$total = $conn->query($getTotal);\n$row = $total->fetch_row();\n\
    $totalPix = $row[0];\n```\n\nThis submits the query and then uses the `fetch_row()`\
    \ method, which gets a single row from a `MySQLi_Result` object as an indexed\
    \ array. There’s only one column in the result, so `$row[0]` contains the total\
    \ count of records in the `images` table.\n\nFor PDO, use this:\n\n```\n// submit\
    \ query and store result as $totalPix\n$total = $conn->query($getTotal);\n$totalPix\
    \ = $total->fetchColumn();\n```\n\nThis submits the query and then uses `fetchColumn()`\
    \ to get a single result, which is stored in `$totalPix`.\n\nNext, set the value\
    \ of `$curPage`. The navigation links that you’ll create later will pass the value\
    \ of the required page through a query string, so you need to check whether `curPage`\
    \ is in the `$_GET` array. If it is, use that value. Otherwise, set the current\
    \ page to 0. Insert the following code immediately after the code in the previous\
    \ step:\n\n```\n// set the current page\nif (isset($_GET['curPage'])) {\n    $curPage\
    \ = $_GET['curPage'];\n} else {\n    $curPage = 0;\n}\n```\n\nYou now have all\
    \ the information that you need to calculate the start row and to build the SQL\
    \ query to retrieve a subset of records. Add the following code immediately after\
    \ the code in the preceding step:\n\n```\n// calculate the start row of the subset\n\
    $startRow = $curPage * SHOWMAX;\n```\n\nBut there’s a problem. The value of `$curPage`\
    \ comes from the query string. If someone changes the number manually in the browser\
    \ address bar, `$startRow` might be greater than the number of records in the\
    \ database. If the value of `$startRow` exceeds `$totalPix`, you need to reset\
    \ both `$startRow` and `$curPage` to `0`. Add this conditional statement after\
    \ the code in the preceding step:\n\n```\nif ($startRow > $totalPix) {\n    $startRow\
    \ = 0;\n    $curPage = 0;\n}\n```\n\nNote: If `curPage` is manually changed to\
    \ anything other than a number, PHP automatically converts it to `0` when it’s\
    \ multiplied by `SHOWMAX`.\n\nThe original SQL query should now be on the next\
    \ line. Amend it like this:\n\n```\n// prepare SQL to retrieve subset of image\
    \ details\n$sql = \"SELECT filename, caption FROM images LIMIT $startRow,\" .\
    \ SHOWMAX;\n```\n\nI’ve used double quotes this time, because I want PHP to process\
    \ `$startRow`. Unlike variables, constants aren’t processed inside double-quoted\
    \ strings. So `SHOWMAX` is added to the end of the SQL query with the concatenation\
    \ operator (a period). The comma inside the closing quotes is part of the SQL,\
    \ separating the two arguments of the `LIMIT` clause.\n\n![A978-1-4842-0635-5_12_Fig5_HTML.jpg](A978-1-4842-0635-5_12_Fig5_HTML.jpg)\n\
    \n**Figure 12-5.** The number of thumbnails is limited by the `SHOWMAX` constant\n\
    \nSave the page and reload it into a browser. Instead of eight thumbnails, you\
    \ should see just six, as shown in Figure 12-5. Change the value of `SHOWMAX`\
    \ to see a different number of thumbnails.\n\nThe text above the thumbnail grid\
    \ doesn’t update because it’s still hard-coded, so let’s fix that. Locate the\
    \ following line of code in the main body of the page:\n\n`<p id=\"picCount\"\
    >Displaying 1 to 6 of 8</p>`\n\nReplace it with this:\n\n```\n<p id=\"picCount\"\
    >Displaying <?php echo $startRow+1;\n    if ($startRow+1 < $totalPix) {\n    \
    \    echo ' to ';\n        if ($startRow+SHOWMAX < $totalPix) {\n            echo\
    \ $startRow+SHOWMAX;\n        } else {\n            echo $totalPix;\n        }\n\
    \    }\n    echo \" of $totalPix\";\n?></p>\n```\n\nLet’s take this line by line.\
    \ The value of `$startRow` is zero-based, so you need to add 1 to get a more user-friendly\
    \ number. So, `$startRow+1` displays 1 on the first page and 7 on the second page.\
    \ In the second line, `$startRow+1` is compared with the total number of records.\
    \ If it’s less, that means the current page is displaying a range of records,\
    \ so the third line displays the text “to” with a space on either side. You then\
    \ need to work out the top number of the range, so a nested `if ... else` conditional\
    \ statement adds the value of the start row to the maximum number of records to\
    \ be shown on a page. If the result is less than the total number of records,\
    \ `$startRow+SHOWMAX` gives you the number of the last record on the page. However,\
    \ if it’s equal to or greater than the total, you display `$totalPix` instead.\
    \ Finally, you exit both conditional statements and display “of” followed by the\
    \ total number of records.\n\nSave the page and reload it in a browser. You still\
    \ get only the first subset of thumbnails, but you should see the second number\
    \ change dynamically whenever you alter the value of `SHOWMAX`. Check your code,\
    \ if necessary, against `gallery_mysqli_07.php` or `gallery_pdo_07.php`.\n\n###\
    \ Navigating Through Subsets of Records\n\nAs I mentioned in step 3 of the preceding\
    \ section, the value of the required page is passed to the PHP script through\
    \ a query string. When the page first loads, there is no query string, so the\
    \ value of `$curPage` is set to `0`. Although a query string is generated when\
    \ you click a thumbnail to display a different image, it includes only the filename\
    \ of the main image, so the original subset of thumbnails remains unchanged. To\
    \ display the next subset, you need to create a link that increases the value\
    \ of `$curPage` by `1`. It follows, therefore, that to return to the previous\
    \ subset, you need another link that reduces the value of `$curPage` by `1`.\n\
    \nThat’s simple enough, but you also need to make sure that these links are displayed\
    \ only when there is a valid subset to navigate to. For instance, there’s no point\
    \ in displaying a back link on the first page, because there isn’t a previous\
    \ subset. Similarly, you shouldn’t display a forward link on the page that displays\
    \ the last subset, because there’s nothing to navigate to.\n\nBoth issues are\
    \ easily solved by using conditional statements. There’s one final thing that\
    \ you need to take care of. You must also include the value of the current page\
    \ in the query string generated when you click a thumbnail. If you fail to do\
    \ so, `$curPage` is automatically set back to `0`, and the first set of thumbnails\
    \ is displayed instead of the current subset."
  raw: '#### PHP Solution 12-4: Displaying a Subset of Records


    This PHP solution shows how to select a subset of records in preparation for creating
    a navigation system that pages through a longer set. It also demonstrates how
    to display the numbers of the current selection, as well as the total number of
    records.


    Continue working with the same file as before. Alternatively, use `gallery_mysqli_06.php`
    or `gallery_pdo_06.php`.


    Define `SHOWMAX` and the SQL query to find the total number of records in the
    table. Amend the code toward the top of the page like this (new code is shown
    in bold):


    `// initialize variables for the horizontal looper`


    `$pos = 0;`


    `$firstRow = true;`


    `// set maximum number of records`


    `define(''SHOWMAX'', 6);`


    `$conn = dbConnect(''read'');`


    `// prepare SQL to get total records`


    `$getTotal = ''SELECT COUNT(*) FROM images'';`


    You now need to run the new SQL query. The code goes immediately after the code
    in the preceding step but differs according to the type of MySQL connection. For
    MySQLi, use this:


    `// submit query and store result as $totalPix`


    `$total = $conn->query($getTotal);`


    `$row = $total->fetch_row();`


    `$totalPix = $row[0];`


    This submits the query and then uses the `fetch_row()` method, which gets a single
    row from a `MySQLi_Result` object as an indexed array. There’s only one column
    in the result, so `$row[0]` contains the total count of records in the `images`
    table.


    For PDO, use this:


    `// submit query and store result as $totalPix`


    `$total = $conn->query($getTotal);`


    `$totalPix = $total->fetchColumn();`


    This submits the query and then uses `fetchColumn()` to get a single result, which
    is stored in `$totalPix`.


    Next, set the value of `$curPage`. The navigation links that you’ll create later
    will pass the value of the required page through a query string, so you need to
    check whether `curPage` is in the `$_GET` array. If it is, use that value. Otherwise,
    set the current page to 0\. Insert the following code immediately after the code
    in the previous step:


    `// set the current page`


    `if (isset($_GET[''curPage''])) {`


    `$curPage = $_GET[''curPage''];`


    `} else {`


    `$curPage = 0;`


    `}`


    You now have all the information that you need to calculate the start row and
    to build the SQL query to retrieve a subset of records. Add the following code
    immediately after the code in the preceding step:


    `// calculate the start row of the subset`


    `$startRow = $curPage * SHOWMAX;`


    But there’s a problem. The value of `$curPage` comes from the query string. If
    someone changes the number manually in the browser address bar, `$startRow` might
    be greater than the number of records in the database. If the value of `$startRow`
    exceeds `$totalPix`, you need to reset both `$startRow` and `$curPage` to `0`.
    Add this conditional statement after the code in the preceding step:


    `if ($startRow > $totalPix) {`


    `$startRow = 0;`


    `$curPage = 0;`


    `}`


    Note


    If `curPage` is manually changed to anything other than a number, PHP automatically
    converts it to `0` when it’s multiplied by `SHOWMAX`.


    The original SQL query should now be on the next line. Amend it like this:


    `// prepare SQL to retrieve` `subset of` `image details`


    `$sql =` `"` `SELECT filename, caption FROM images` `LIMIT $startRow," . SHOWMAX;`


    I’ve used double quotes this time, because I want PHP to process `$startRow`.
    Unlike variables, constants aren’t processed inside double-quoted strings. So
    `SHOWMAX` is added to the end of the SQL query with the concatenation operator
    (a period). The comma inside the closing quotes is part of the SQL, separating
    the two arguments of the `LIMIT` clause.


    ![A978-1-4842-0635-5_12_Fig5_HTML.jpg](A978-1-4842-0635-5_12_Fig5_HTML.jpg)


    Figure 12-5.


    The number of thumbnails is limited by the `SHOWMAX` constant Save the page and
    reload it into a browser. Instead of eight thumbnails, you should see just six,
    as shown in Figure [12-5](#A978-1-4842-0635-5_12_Chapter.html#Fig5).


    Change the value of `SHOWMAX` to see a different number of thumbnails.


    The text above the thumbnail grid doesn’t update because it’s still hard-coded,
    so let’s fix that. Locate the following line of code in the main body of the page:


    `<p id="picCount">Displaying 1 to 6 of 8</p>`


    Replace it with this:


    `<p id="picCount">Displaying` `<?php echo $startRow+1;`


    `if ($startRow+1 < $totalPix) {`


    `echo '' to '';`


    `if ($startRow+SHOWMAX < $totalPix) {`


    `echo $startRow+SHOWMAX;`


    `} else {`


    `echo $totalPix;`


    `}`


    `}`


    `echo " of $totalPix";`


    `?>` `</p>`


    Let’s take this line by line. The value of `$startRow` is zero-based, so you need
    to add 1 to get a more user-friendly number. So, `$startRow+1` displays 1 on the
    first page and 7 on the second page.


    In the second line, `$startRow+1` is compared with the total number of records.
    If it’s less, that means the current page is displaying a range of records, so
    the third line displays the text “to” with a space on either side.


    You then need to work out the top number of the range, so a nested `if ... else`
    conditional statement adds the value of the start row to the maximum number of
    records to be shown on a page. If the result is less than the total number of
    records, `$startRow+SHOWMAX` gives you the number of the last record on the page.
    However, if it’s equal to or greater than the total, you display `$totalPix` instead.


    Finally, you exit both conditional statements and display “of” followed by the
    total number of records.


    Save the page and reload it in a browser. You still get only the first subset
    of thumbnails, but you should see the second number change dynamically whenever
    you alter the value of `SHOWMAX`. Check your code, if necessary, against `gallery_mysqli_07.php`or
    `gallery_pdo_07.php`.


    #### Navigating Through Subsets of Records


    As I mentioned in step 3 of the preceding section, the value of the required page
    is passed to the PHP script through a query string. When the page first loads,
    there is no query string, so the value of `$curPage` is set to `0`. Although a
    query string is generated when you click a thumbnail to display a different image,
    it includes only the filename of the main image, so the original subset of thumbnails
    remains unchanged. To display the next subset, you need to create a link that
    increases the value of `$curPage` by `1`. It follows, therefore, that to return
    to the previous subset, you need another link that reduces the value of `$curPage`
    by `1`.


    That’s simple enough, but you also need to make sure that these links are displayed
    only when there is a valid subset to navigate to. For instance, there’s no point
    in displaying a back link on the first page, because there isn’t a previous subset.
    Similarly, you shouldn’t display a forward link on the page that displays the
    last subset, because there’s nothing to navigate to.


    Both issues are easily solved by using conditional statements. There’s one final
    thing that you need to take care of. You must also include the value of the current
    page in the query string generated when you click a thumbnail. If you fail to
    do so, `$curPage` is automatically set back to `0`, and the first set of thumbnails
    is displayed instead of the current subset.'
  trans: "\n### PHP 方案 12-4：显示记录子集\n\n本 PHP 方案展示了如何筛选出记录子集，为创建长列表分页导航系统做准备。同时，它还演示了如何显示当前选中的记录编号以及记录总数。\n\
    \n继续使用之前的同一个文件。或者，使用 `gallery_mysqli_06.php` 或 `gallery_pdo_06.php`。\n\n定义 `SHOWMAX`\
    \ 以及用于查找表中记录总数的 SQL 查询。将页面顶部的代码修改如下（新代码以**粗体**显示）：\n\n```\n// 初始化水平循环器变量\n$pos\
    \ = 0;\n$firstRow = true;\n\n// 设置最大记录数\ndefine('SHOWMAX', 6);\n\n$conn = dbConnect('read');\n\
    \n// 准备获取总记录数的 SQL\n$getTotal = 'SELECT COUNT(*) FROM images';\n```\n\n现在你需要运行这条新的\
    \ SQL 查询。这段代码紧接在上一步代码之后，但根据 MySQL 连接类型的不同而有所区别。对于 MySQLi，请使用以下代码：\n\n```\n// 提交查询并将结果存储为\
    \ $totalPix\n$total = $conn->query($getTotal);\n$row = $total->fetch_row();\n\
    $totalPix = $row[0];\n```\n\n这段代码提交了查询，然后使用 `fetch_row()` 方法，该方法从 `MySQLi_Result`\
    \ 对象中获取单行数据作为索引数组。结果中只有一列，因此 `$row[0]` 包含 `images` 表中记录的总数。\n\n对于 PDO，请使用以下代码：\n\
    \n```\n// 提交查询并将结果存储为 $totalPix\n$total = $conn->query($getTotal);\n$totalPix\
    \ = $total->fetchColumn();\n```\n\n这段代码提交了查询，然后使用 `fetchColumn()` 获取单个结果，并将其存储在\
    \ `$totalPix` 中。\n\n接下来，设置 `$curPage` 的值。你稍后创建的导航链接将通过查询字符串传递所需页面的值，因此需要检查 `$_GET`\
    \ 数组中是否存在 `curPage`。如果存在，则使用该值；否则，将当前页面设置为 0。将以下代码插入到上一步代码之后：\n\n```\n// 设置当前页面\n\
    if (isset($_GET['curPage'])) {\n    $curPage = $_GET['curPage'];\n} else {\n \
    \   $curPage = 0;\n}\n```\n\n现在你拥有了计算起始行和构建 SQL 查询以检索记录子集所需的全部信息。将以下代码添加到上一步代码之后：\n\
    \n```\n// 计算子集的起始行\n$startRow = $curPage * SHOWMAX;\n```\n\n但这里有一个问题。`$curPage`\
    \ 的值来自查询字符串。如果有人在浏览器地址栏中手动更改了该数字，`$startRow` 可能会大于数据库中的记录数。如果 `$startRow` 的值超过了\
    \ `$totalPix`，你需要将 `$startRow` 和 `$curPage` 都重置为 `0`。将以下条件语句添加到上一步代码之后：\n\n```\n\
    if ($startRow > $totalPix) {\n    $startRow = 0;\n    $curPage = 0;\n}\n```\n\n\
    注意：如果手动将 `curPage` 改为非数字值，当它与 `SHOWMAX` 相乘时，PHP 会自动将其转换为 `0`。\n\n原始的 SQL 查询现在应该在下一行。按如下方式修改它：\n\
    \n```\n// 准备 SQL 以检索图像详情子集\n$sql = \"SELECT filename, caption FROM images LIMIT\
    \ $startRow,\" . SHOWMAX;\n```\n\n这次我使用了双引号，因为我希望 PHP 处理 `$startRow`。与变量不同，常量在双引号字符串内部不会被处理。因此，`SHOWMAX`\
    \ 通过连接运算符（句点）被添加到 SQL 查询的末尾。结束引号内的逗号是 SQL 的一部分，用于分隔 `LIMIT` 子句的两个参数。\n\n![A978-1-4842-0635-5_12_Fig5_HTML.jpg](img/A978-1-4842-0635-5_12_Fig5_HTML.jpg)\n\
    \n**图 12-5.** 缩略图的数量受 `SHOWMAX` 常量的限制\n\n保存页面并在浏览器中重新加载。您应该只能看到六个缩略图，而不是八个，如图\
    \ 12-5 所示。更改 `SHOWMAX` 的值以查看不同数量的缩略图。\n\n缩略图网格上方的文本不会更新，因为它仍然是硬编码的，所以让我们来修复它。在页面的主体部分找到以下代码行：\n\
    \n`<p id=\"picCount\">Displaying 1 to 6 of 8</p>`\n\n将其替换为以下代码：\n\n```\n<p id=\"\
    picCount\">Displaying <?php echo $startRow+1;\n    if ($startRow+1 < $totalPix)\
    \ {\n        echo ' to ';\n        if ($startRow+SHOWMAX < $totalPix) {\n    \
    \        echo $startRow+SHOWMAX;\n        } else {\n            echo $totalPix;\n\
    \        }\n    }\n    echo \" of $totalPix\";\n?></p>\n```\n\n让我们逐行分析。`$startRow`\
    \ 的值是从零开始的，因此你需要加 1 才能得到一个对用户更友好的数字。因此，`$startRow+1` 在第一页显示 1，在第二页显示 7。在第二行，`$startRow+1`\
    \ 与总记录数进行比较。如果它小于总记录数，则表示当前页面显示的是一个记录范围，因此第三行显示文本“ to ”（两边带空格）。然后，你需要计算出该范围的最大值，因此一个嵌套的\
    \ `if ... else` 条件语句将起始行的值加上页面要显示的最大记录数。如果结果小于总记录数，`$startRow+SHOWMAX` 会给出页面上的最后一条记录编号。但如果结果等于或大于总数，则改为显示\
    \ `$totalPix`。最后，退出两个条件语句并显示“ of ”以及总记录数。\n\n保存页面并在浏览器中重新加载。您仍然只能看到第一个缩略图子集，但每当您更改\
    \ `SHOWMAX` 的值时，您应该会看到第二个数字动态变化。如有必要，请对照 `gallery_mysqli_07.php` 或 `gallery_pdo_07.php`\
    \ 检查您的代码。\n\n### 在记录子集之间导航\n\n正如我在上一节第 3 步中提到的，所需页面的值通过查询字符串传递给 PHP 脚本。页面首次加载时，没有查询字符串，因此\
    \ `$curPage` 的值被设置为 `0`。虽然单击缩略图显示不同图像时会生成查询字符串，但它只包含主图像的文件名，因此原始的缩略图子集保持不变。要显示下一个子集，您需要创建一个将\
    \ `$curPage` 的值增加 `1` 的链接。同理，要返回上一个子集，您需要另一个将 `$curPage` 的值减少 `1` 的链接。\n\n这很简单，但您还需要确保只有当存在有效的导航子集时才显示这些链接。例如，在第一页上显示后退链接没有意义，因为不存在前一个子集。类似地，在显示最后一个子集的页面上不应显示前进链接，因为已无内容可导航。\n\
    \n这两个问题都可以通过使用条件语句轻松解决。还有最后一件事需要您处理。在单击缩略图时生成的查询字符串中，也必须包含当前页面的值。如果不这样做，`$curPage`\
    \ 会自动重置为 `0`，并且会显示第一组缩略图，而不是当前的子集。\n"
- fmt: '### PHP Solution 12-5: Creating the Navigation Links


    This PHP solution shows how to create the navigation links to page back and forth
    through each subset of records. Continue working with the same file as before.
    Alternatively, use `gallery_mysqli_07.php` or `gallery_pdo_07.php`.


    I have placed the navigation links in an extra row at the bottom of the thumbnail
    table. Insert this code between the placeholder comment and the closing `</table>`
    tag:


    `<!-- Navigation link needs to go here -->`


    `<tr><td>`


    `<?php`


    `// create a back link if current page greater than 0`


    `if ($curPage > 0) {`


    `echo ''<a href="'' . $_SERVER[''PHP_SELF''] . ''?curPage='' . ($curPage-1) .`


    `''">` `&` `lt; Prev</a>'';`


    `} else {`


    `// otherwise leave the cell empty`


    `echo ''` `&` `nbsp;'';`


    `}`


    `?>`


    `</td>`


    `<?php`


    `// pad the final row with empty cells if more than 2 columns`


    `if (COLS-2 > 0) {`


    `for ($i = 0; $i < COLS-2; $i++) {`


    `echo ''<td>` `&` `nbsp;</td>'';`


    `}`


    `}`


    `?>`


    `<td>`


    `<?php`


    `// create a forward link if more records exist`


    `if ($startRow+SHOWMAX < $totalPix) {`


    `echo ''<a href="'' . $_SERVER[''PHP_SELF''] . ''?curPage='' . ($curPage+1) .`


    `''"> Next` `&` `gt;</a>'';`


    `} else {`


    `// otherwise leave the cell empty`


    `echo ''` `&` `nbsp;'';`


    `}`


    `?>`


    `</td></tr>`


    `</table>`


    It looks like a lot, but the code breaks down into three sections: the first creates
    a back link if `$curPage` is greater than `0`; the second pads the final table
    row with empty cells if there are more than two columns; and the third uses the
    same formula as before (`$startRow+SHOWMAX < $totalPix`) to determine whether
    to display a forward link.


    Make sure you get the combination of quotes right in the links. The other point
    to note is that the `$curPage-1` and `$curPage+1` calculations are enclosed in
    parentheses to avoid the period after the number being misinterpreted as a decimal
    point. It’s used here as the concatenation operator to join the various parts
    of the query string.


    You now need to add the value of the current page to the query string in the link
    surrounding the thumbnail. Locate this section of code (around line 95):


    `<a href="<?= $_SERVER[''PHP_SELF'']; ?>?image=<?= $row[''filename'']; ?>">`


    Change it like this:


    `<a href="<?= $_SERVER[''PHP_SELF'']; ?>?image=<?= $row[''filename''];?>`


    `&` `amp;curPage=<?= $curPage; ?>` `">`


    You want the same subset to be displayed when clicking a thumbnail, so you just
    pass the current value of `$curPage` through the query string.


    **Caution**


    Because of the limitations of the printed page, I’ve had to break the code over
    two lines. In your PHP script, all the code must be on the same line with no space
    between the closing PHP tag and `&amp;`. This code creates the URL and query string,
    which must have no spaces in it.


    ![A978-1-4842-0635-5_12_Fig6_HTML.jpg](A978-1-4842-0635-5_12_Fig6_HTML.jpg)

    Figure 12-6.


    The page navigation system is now complete. Save the page and test it. Click the
    Next link, and you should see the remaining subset of thumbnails, as shown in
    Figure [12-6](#A978-1-4842-0635-5_12_Chapter.html#Fig6). There are no more images
    to be displayed, so the Next link disappears, but there’s a Prev link at the bottom
    left of the thumbnail grid. The record counter at the top of the gallery now reflects
    the range of thumbnails being displayed, and if you click the right thumbnail,
    the same subset remains onscreen while displaying the appropriate large image.
    You’re done!


    You can check your code against `gallery_mysqli_08.php` or `gallery_pdo_08.php`.


    ### Chapter Review


    In just a few pages, you have turned a boring list of filenames into a dynamic
    online gallery, complete with a page navigation system. All that’s necessary is
    to create a thumbnail for each major image, upload both images to the appropriate
    folders, and add the filename and a caption to the `images` table in the database.
    As long as the database is kept up to date with the contents of the `images` and
    `thumbs` folders, you have a dynamic gallery. Not only that, you’ve learned how
    to select subsets of records, link to related information through a query string,
    and build a page navigation system.


    The more you use PHP, the more you realize that the skill doesn’t lie so much
    in remembering how to use lots of obscure functions but in working out the logic
    needed to get PHP to do what you want. It’s a question of if this, do that; if
    something else, do something different. Once you can anticipate the likely eventualities
    of a situation, you can normally build the code to handle it.


    So far, you’ve concentrated on extracting records from a simple database table.
    In the next chapter, I’ll show you how to insert, update, and delete material.


    ## 13. Managing Content


    Although you can use phpMyAdmin for a lot of database administration, you might
    want to set up areas where clients can log in to update some data without giving
    them full rein of your database. To do so, you need to build your own forms and
    create customized content management systems.


    At the heart of every content management system lies what is sometimes called
    the CRUD cycle — Create, Read, Update, and Delete — which utilizes just four SQL
    commands: `INSERT`, `SELECT`, `UPDATE`, and `DELETE`. To demonstrate the basic
    SQL commands, this chapter shows you how to build a simple content management
    system for a table called `blog`.


    Even if you don’t want to build your own content management system, the four commands
    covered in this chapter are essential for just about any database-driven page,
    such as user login, user registration, search form, search results, and so on.


    In this chapter, you’ll learn about the following:


    *   Inserting new records in a database table

    *   Displaying a list of existing records

    *   Updating existing records

    *   Asking for confirmation before a record is deleted


    ### Setting Up a Content Management System


    Managing the content in a database table involves four stages, which I normally
    assign to four separate but interlinked pages: one each for inserting, updating,
    and deleting records, plus a list of existing records. The list of records serves
    two purposes: first, to identify what’s stored in the database and, more important,
    to link to the update and delete scripts by passing the record’s primary key through
    a query string.


    The `blog` table contains a series of titles and text articles to be displayed
    in the Japan Journey site, as shown in Figure [13-1](#A978-1-4842-0635-5_13_Chapter.html#Fig1).
    In the interests of keeping things simple, the table contains just five columns:
    `article_id` (primary key), `title`, `article`, `created`, and `updated`.


    ![A978-1-4842-0635-5_13_Fig1_HTML.jpg](A978-1-4842-0635-5_13_Fig1_HTML.jpg)

    Figure 13-1. The contents of the `blog` table displayed in the Japan Journey website'
