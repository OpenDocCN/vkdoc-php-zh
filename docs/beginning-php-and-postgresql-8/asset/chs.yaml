  $frequency = array_count_values($words);\nprint_r($frequency);\n?>\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info)\n\
  \n这将返回以下内容：\n\n```\nArray ( [In] => 1 [the] => 3 [latest] => 1 [installment] =>\
  \ 1 [of] => 1 [ongoing] => 1 [Developer] => 1 [com] => 1 [PHP] => 2 [series] =>\
  \ 1 [I] => 1 [discuss] => 1 [many] => 1 [improvements] => 1 [and] => 1 [additions]\
  \ => 1 [to] => 1 [s] => 1 [object-oriented] => 1 [architecture] => 1 )\n```\n\n\
  ### 利用 PEAR：Validate_US\n\n\n\n无论您的 Web 应用是用于银行、医疗、IT、零售还是其他行业，某些数据元素很可能是通用的。例如，无论您面对的是客户、患者、员工还是顾客，您都可能需要输入并验证电话号码或州缩写。这种重复性无疑为创建能够处理此类事务的库提供了机会，无论应用类型如何。实际上，由于我们经常面对这类重复性任务，其他程序员也同样如此。因此，始终明智的做法是调查是否有人已经为我们完成了这项艰巨工作，并通过\
  \ PEAR 提供了一个可用的包。\n\n> **注：** 如果您不熟悉 PEAR，请先花些时间回顾一下第 11 章再继续阅读。\n\n果然，我们的猜测是正确的，因为快速搜索\
  \ PEAR 就能找到 `Validate_US`，这是一个能够验证美国各种特定信息项（此前处于测试阶段）。虽然发布时仍处于测试阶段，但 `Validate_US`\
  \ 已能对电话号码、社会安全号码、州缩写和邮政编码进行语法验证。\n\n本节将介绍 `Validate_US`，演示如何安装和使用这个极其有用的包。\n\n##\
  \ 安装 Validate_US\n\n要使用 `Validate_US`，您需要先安装它。安装过程如下：\n\n```\n%>pear install -f\
  \ Validate_US\n\nWarning: Validate_US is state 'beta' which is less stable than\
  \ state 'stable'\n\ndownloading Validate_US-0.5.0.tgz ...\n\nStarting to download\
  \ Validate_US-0.5.0.tgz (5,611 bytes)\n\n.....done: 5,611 bytes\n\ninstall ok: Validate_US\
  \ 0.5.0\n```\n\n请注意，由于 `Validate_US` 仍为测试版，您需要向 `install` 命令传递 `-f` 选项来强制安装。安装完成后，即可继续下一节内容。\n\
  \n## 使用 Validate_US\n\n`Validate_US` 包非常易于使用；只需实例化 `Validate_US()` 类并调用相应的验证方法即可。总共有七个方法，其中三个与本讨论相关，包括：\n\
  \n- `phoneNumber()`：验证电话号码，成功返回 `TRUE`，否则返回 `FALSE`。它接受多种格式的电话号码，包括 `xxx xxx-xxxx`、`(xxx)\
  \ xxx-xxxx` 以及不带短横线、括号或空格的类似组合。例如，`(614)999-9999`、`6149999999` 和 `(614)9999999`\
  \ 均有效，而 `(6149999999`、`614-999-9999` 和 `614999` 则无效。\n- `postalCode()`：验证邮政编码，成功返回\
  \ `TRUE`，否则返回 `FALSE`。它接受多种格式的邮政编码，包括 `xxxxx`、`xxxxxxxxx`、`xxxxx-xxxx` 以及不带短横线的类似组合。例如，`43210`\
  \ 和 `43210-0362` 均有效，而 `4321` 和 `4321009999` 则无效。\n- `region()`：验证州缩写，成功返回 `TRUE`，否则返回\
  \ `FALSE`。它接受美国邮政服务（http://www.usps.com/ncsc/lookups/usps_abbreviations.html）支持的两个字母州缩写。例如，`OH`、`CA`\
  \ 和 `NY` 均有效，而 `CC`、`DUI` 和 `BASF` 则无效。\n- `ssn()`：验证社会安全号码，不仅检查 SSN 语法，还会审查社会安全管理局网站（http://www.ssa.gov/）提供的验证信息，成功返回\
  \ `TRUE`，否则返回 `FALSE`。它接受多种格式的 SSN，包括 `xxx-xx-xxxx`、`xxx xx xxx`、`xxx/xx/xxxx`、`xxx\\\
  txx\\txxxx`（`\\t` = 制表符）、`xxx\\nxx\\nxxxx`（`\\n` = 换行符），或任何涉及短横线、正斜杠、制表符或换行符的九位组合。例如，`479-35-6432`\
  \ 和 `591467543` 有效，而 `999999999`、`777665555` 和 `45678` 则无效。\n\n一旦理解了方法定义，实现就很简单了。例如，假设您想验证一个电话号码。只需引入\
  \ `Validate_US` 类并像这样调用 `phoneNumber()`：\n\n```php\n<?php\n\ninclude \"Validate/US.php\"\
  ;\n\n$validate = new Validate_US();\n\necho $validate->phoneNumber(\"614-999-9999\"\
  );\n\n?>\n```\n\n因为 `phoneNumber()` 返回布尔值，所以本例中将返回 `1`。相比之下，为 `phoneNumber()` 提供\
  \ `614-876530932` 将返回 `FALSE`。\n\n### 总结\n\n本章介绍的许多函数将是您的 PHP 应用中最常用的函数之一，因为它们构成了该语言字符串处理能力的核心。\n\
  \n在下一章中，我们将把注意力转向另一组常用的函数：那些专门用于处理文件和操作系统的函数。\n\n---\n\n## 处理文件与操作系统\n\n编写一个完全自给自足的应用程序——即不依赖于与外部资源（如底层文件系统、操作系统，甚至其他编程语言）进行任何交互的程序——是相当罕见的。原因很简单：随着语言、文件系统和操作系统的成熟，由于开发者能够将每个组件久经考验的特性集成到单一产品中，创建更高效、可扩展且及时的应用程序的机会大大增加。当然，关键在于选择一种提供便捷高效方式来实现此目的的语言。幸运的是，PHP\
  \ 很好地满足了这两个条件，为程序员提供了丰富的工具，不仅用于处理文件系统的输入和输出，还用于在 shell 级别执行程序。本章将介绍所有这些功能，描述如何处理以下内容：\n\
  \n- **文件和目录：** 您将学习如何执行文件系统取证，揭示文件及目录的大小、位置、修改和访问时间、文件指针（包括硬链接和符号链接）等详细信息。\n- **文件所有权和权限：**\
  \ 所有主流操作系统都通过基于用户和组所有权及权限的权限系统来提供保护系统数据的方法。您将学习如何识别和操作这些控制。\n- **文件 I/O：** 您将学习如何与数据文件交互，从而执行各种实际任务，包括创建、删除、读取和写入文件。\n\
  - **目录内容：** 您将学习如何轻松检索目录内容。\n- **Shell 命令：** 通过一系列内置函数和机制，您可以在 PHP 应用程序中利用操作系统和其他语言级别的功能。您将全面了解它们。本章还将演示\
  \ PHP 的输入清理功能，向您展示如何防止用户传递可能对数据和操作系统造成危害的数据。\n\n> **注：** PHP 特别擅长处理底层文件系统，以至于它作为命令行解释器越来越受欢迎，这一功能在\
  \ 4.2.0 版本中引入。虽然此主题超出了本书的范围，但您可以在 PHP 手册中找到更多信息。\n\n## 了解文件和目录\n\n\n\n将相关数据组织到通常称为文件和目录的实体中，长期以来一直是计算环境中的核心概念。因此，程序员需要一种方法来获取关于文件和目录的重要详细信息，例如位置、大小、最后修改时间、最后访问时间以及其他定义信息。本节介绍许多用于获取这些重要详细信息的\
  \ PHP 内置函数。\n\n**解析目录路径**\n\n解析目录路径以获取各种属性（例如尾部扩展名、目录组件和基本名称）通常非常有用。有几个函数可用于执行此类任务，本节将全部介绍这些函数。\n\
  \n`basename()`\n\n`string basename (string $path [, string $suffix ])`\n\n`basename()`函数返回`$path`的文件名组件。如果提供了可选的`suffix`参数，并且返回的文件名包含该扩展名，则会省略该后缀。\n\
  \n示例如下：\n\n```php\n<?php\n$path = \"/home/www/data/users.txt\";\n$filename = basename($path);\
  \ // $filename contains \"users.txt\"\n$filename2 = basename($path, \".txt\"); //\
  \ $filename2 contains \"users\"\n?>\n```\n\n`dirname()`\n\n`string dirname (string\
  \ $path)`\n\n`dirname()`函数本质上是`basename()`的对应函数，提供`$path`的目录组件。重新考虑前面的示例：\n\n```php\n\
  <?php\n$path = \"/home/www/data/users.txt\";\n$dirname = dirname($path); // $dirname\
  \ contains \"/home/www/data\"\n?>\n```\n\n`pathinfo()`\n\n`array pathinfo (string\
  \ $path)`\n\n`pathinfo()`函数创建一个关联数组，包含由`$path`指定的路径的三个组件：目录名、基本名和扩展名，分别通过数组键`dirname`、`basename`和`extension`引用。考虑以下路径：\n\
  \n`/home/www/htdocs/book/chapter10/index.html`\n\n就`pathinfo()`而言，该路径包含三个组件：\n\n\
  - `dirname`：`/home/www/htdocs/book/chapter10`\n- `basename`：`index.html`\n- `extension`：`html`\n\
  \n因此，你可以像这样使用`pathinfo()`来检索此信息：\n\n```php\n<?php\n$pathinfo = pathinfo(\"/home/www/htdocs/book/chapter10/index.html\"\
  );\necho \"目录名: $pathinfo[dirname]<br />\\n\";\necho \"基本名: $pathinfo[basename]\
  \ <br />\\n\";\necho \"扩展名: $pathinfo[extension] <br />\\n\";\n?>\n```\n\n这将返回：\n\
  \n`目录名: /home/www/htdocs/book/chapter10`\n`基本名: index.html`\n`扩展名: html`\n\n`realpath()`\n\
  \n`string realpath (string $path)`\n\n有用的`realpath()`函数将`$path`中的所有符号链接和相对路径引用转换为它们的绝对路径。例如，假设你的目录结构采用以下路径：\n\
  \n`/home/www/htdocs/book/images/`\n\n你可以使用`realpath()`解析任何本地路径引用：\n\n```php\n<?php\n\
  $imgPath = \"../../images/cover.gif\";\n$absolutePath = realpath($imgPath);\n//\
  \ 返回 /www/htdocs/book/images/cover.gif\n?>\n```\n\n**文件类型和链接**\n\n有许多函数可用于了解文件系统上文件和链接（或文件指针）的各种详细信息。本节将介绍这些函数。\n\
  \n`filetype()`\n\n`string filetype (string $filename)`\n\n`filetype()`函数确定并返回`$filename`的文件类型。可能存在八种值：\n\
  \n- `block`：块设备，例如软盘驱动器或 CD-ROM。\n- `char`：字符设备，负责操作系统与终端或打印机等设备之间的非缓冲数据交换。\n- `dir`：目录。\n\
  - `fifo`：命名管道，通常用于促进信息从一个进程传递到另一个进程。\n- `file`：硬链接，作为指向文件 inode 的指针。对于你认为的任何文件（例如文本文档或可执行文件）都会生成此类型。\n\
  - `link`：符号链接，是指向文件指针的指针。\n- `socket`：套接字资源。在编写本文时，此值未记录。\n- `unknown`：类型未知。\n\n\
  让我们考虑三个示例。在第一个示例中，你确定 CD-ROM 驱动器的类型：\n\n```php\necho filetype(\"/mnt/cdrom\"); //\
  \ char\n```\n\n接下来，你确定 Linux 分区的类型：\n\n```php\necho filetype(\"/dev/sda6\"); //\
  \ block\n```\n\n最后，你确定一个普通 HTML 文件的类型：\n\n```php\necho filetype(\"/home/www/htdocs/index.html\"\
  ); // file\n```\n\n`link()`\n\n`int link (string $target, string $link)`\n\n`link()`函数创建一个硬链接`$link`指向`$target`，成功时返回`TRUE`，否则返回`FALSE`。请注意，由于\
  \ PHP 脚本通常在服务器守护进程所有者的身份下执行，除非该用户具有`$link`所在目录的写入权限，否则此函数将失败。\n\n`linkinfo()`\n\n\
  `int linkinfo (string $path)`\n\n`lstat()`函数用于返回关于符号链接的有用信息，包括大小、最后修改时间和所有者的用户 ID\
  \ 等项目。`linkinfo()`函数返回`lstat()`函数提供的一个特定项目，用于确定`$path`指定的符号链接是否确实存在。此函数不适用于 Windows\
  \ 平台。\n\n`lstat()`\n\n`array lstat (string $symlink)`\n\n`lstat()`函数返回关于由`$symlink`引用的符号链接的许多有用信息项。请参阅下一节关于`fstat()`的内容，以获取返回数组的完整说明。\n\
  \n`fstat()`\n\n`array fstat (resource $filepointer)`\n\n`fstat()`函数检索与由文件指针`$filepointer`引用的文件相关的有用信息数组。此数组可以通过数字索引或关联索引访问，下面列出了每个索引及其数字索引位置：\n\
  \n- `dev (0)`：文件所在的设备编号。\n- `ino (1)`：文件的 inode 编号。inode 编号是与每个文件名关联的唯一数字标识符，用于引用\
  \ inode 表中的相应条目，该表包含有关文件大小、类型、位置和其他关键特征的信息。\n- `mode (2)`：文件的 inode 保护模式。此值确定分配给文件的访问和修改权限。\n\
  - `nlink (3)`：与文件关联的硬链接数量。\n- `uid (4)`：文件所有者的用户 ID (UID)。\n- `gid (5)`：文件组的组 ID\
  \ (GID)。\n- `rdev (6)`：设备类型，如果 inode 设备可用。请注意，此元素不适用于 Windows 平台。\n- `size (7)`：文件大小，以字节为单位。\n\
  - `atime (8)`：文件最后访问时间，采用 Unix 时间戳格式。\n- `mtime (9)`：文件最后修改时间，采用 Unix 时间戳格式。\n-\
  \ `ctime (10)`：文件最后更改时间，采用 Unix 时间戳格式。\n- `blksize (11)`：文件系统的块大小。请注意，此元素不适用于 Windows\
  \ 平台。\n- `blocks (12)`：分配给文件的块数。\n\n考虑清单 10-1 中所示的示例。\n\n**清单 10-1.** *检索关键文件信息*\n\
  \n```php\n<?php\n/* 将时间戳转换为所需格式。 */\nfunction tstamp_to_date($tstamp) {\n    return\
  \ date(\"m-d-y g:i:sa\", $tstamp);\n}\n\n$file = \"/usr/local/apache2/htdocs/book/chapter10/stat.php\"\
  ;\n/* 打开文件 */\n$fh = fopen($file, \"r\");\n/* 检索文件信息 */\n$fileinfo = fstat($fh);\n\
  /* 输出关于文件的一些关键信息。 */\n?>```\n\n\n\n```php\necho \"Filename: \".basename($file).\"\
  <br />\"; echo \"Filesize: \".round(($fileinfo[\"size\"]/1024), 2).\" kb <br />\"\
  ; echo \"Last accessed: \".tstamp_to_date($fileinfo[\"atime\"]).\"<br />\"; echo\
  \ \"Last modified: \".tstamp_to_date($fileinfo[\"mtime\"]).\"<br />\";\n?>\n```\n\
  \n该代码返回：\n\n```\nFilename: stat.php\nFilesize: 2.16 kb\nLast accessed: 06-09-05\
  \ 12:03:00pm\nLast modified: 06-09-05 12:02:59pm\n```\n\n## `stat()`\n\n`array stat\
  \ (string *filename*)`\n\n`stat()` 函数返回由 `filename` 指定的文件的相关有用信息数组，如果失败则返回 `FALSE`。该函数的操作方式与\
  \ `fstat()` 完全相同，返回所有相同的数组元素；唯一的区别是 `stat()` 需要实际的文件名和路径，而不是资源句柄。\n\n如果 `filename`\
  \ 是一个符号链接，那么返回的信息将指向该符号链接所指向的文件，而非符号链接本身。要检索符号链接本身的信息，请使用本章稍早介绍的 `lstat()`。\n\n\
  ## `readlink()`\n\n`string readlink (string *path*)`\n\n`readlink()` 函数返回由 `path`\
  \ 指定的符号链接的目标，如果发生错误则返回 `FALSE`。因此，如果链接 `test-link.txt` 是指向 `test.txt` 的符号链接，以下代码将返回该文件的绝对路径：\n\
  \n```php\necho readlink(\"/home/jason/test-link.txt\");\n// 返回 /home/jason/myfiles/test.txt\n\
  ```\n\n## `symlink()`\n\n`int symlink (string *target*, string *link*)`\n\n`symlink()`\
  \ 函数创建一个指向现有 `target` 的名称为 `link` 的符号链接，成功时返回 `TRUE`，否则返回 `FALSE`。请注意，由于 PHP 脚本通常以服务器守护进程所有者的身份执行，除非该守护进程所有者对\
  \ `link` 所在目录具有写入权限，否则此函数将失败。考虑以下示例，其中符号链接 \"03\" 指向目录 \"2003\"：\n\n```php\n<?php\n\
  $link = symlink(\"/www/htdocs/stats/2003\", \"/www/htdocs/stats/03\");\n?>\n```\n\
  \n## 计算文件、目录和磁盘大小\n\n在各种应用程序中，计算文件、目录和磁盘大小是一项常见任务。本节介绍许多适用于此任务的 PHP 标准函数。\n\n#####\
  \ `filesize()`\n\n`int filesize (string *filename*)`\n\n`filesize()` 函数返回 `filename`\
  \ 的大小，以字节为单位。示例如下：\n\n```php\n<?php\n$file = \"/www/htdocs/book/chapter1.pdf\";\n\
  $bytes = filesize(\"$file\"); // 返回 91815\necho \"File \".basename($file).\" is\
  \ $bytes bytes, or\n\".round($bytes / 1024, 2).\" kilobytes.\";\n?>\n```\n\n这将返回以下内容：\n\
  \n```\nFile 852Chapter16R.rtf is 91815 bytes, or 89.66 kilobytes\n```\n\n##### `disk_free_space()`\n\
  \n`float disk_free_space (string *directory*)`\n\n`disk_free_space()` 函数返回分配给包含\
  \ `directory` 指定目录的磁盘分区的可用空间，以字节为单位。示例如下：\n\n```php\n<?php\n$drive = \"/usr\";\n\
  echo round((disk_free_space($drive) / 1048576), 2);\n?>\n```\n\n这将返回：\n\n```\n2141.29\n\
  ```\n\n请注意，返回的数字以兆字节（MB）为单位，因为 `disk_free_space()` 返回的值被除以 1,048,576，这相当于 1MB。\n\
  \n##### `disk_total_space()`\n\n`float disk_total_space (string *directory*)`\n\n\
  `disk_total_space()` 函数返回包含 `directory` 指定目录的磁盘分区所占用的总大小，以字节为单位。如果将此函数与 `disk_free_space()`\
  \ 结合使用，则可以轻松提供有用的空间分配统计信息：\n\n```php\n<?php\n$systempartitions = array(\"/\", \"\
  /home\",\"/usr\", \"/www\"); foreach ($systempartitions as $partition) {\n$totalSpace\
  \ = disk_total_space($partition) / 1048576;\n$usedSpace = $totalSpace - disk_free_space($partition)\
  \ / 1048576; echo \"Partition: $partition (Allocated: $totalSpace MB. Used: $usedSpace\
  \ MB.)\";\n}\n?>\n```\n\n这将返回：\n\n```\nPartition: / (Allocated: 3099.292 MB. Used:\
  \ 343.652 MB.)\n```\n\n\n\n分区：`/home`（已分配：5510.664 MB。已使用：344.448 MB。）\n\n分区：`/usr`（已分配：4127.108\
  \ MB。已使用：1985.716 MB。）\n\n分区：`/usr/local/apache2/htdocs`（已分配：4127.108 MB。已使用：1985.716\
  \ MB。）\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 第 10 章 ■ 文件与操作系统操作\n\
  \n**237**\n\n##### 获取目录大小\n\n当前 PHP 并未提供用于获取目录总大小的标准函数，而这一任务比获取总磁盘空间（参见 `disk_total_space()`）更为常用。尽管你可以使用\
  \ `exec()` 或 `system()`（两者均在本章后文介绍）进行系统级调用 `du`，但这些函数通常出于安全原因被禁用。替代方案是编写一个自定义 PHP\
  \ 函数来完成该任务。递归函数似乎特别适合此项工作。清单 10-2 提供了一种可行的变体实现。\n\n> **注意** `du` 命令用于汇总文件或目录的磁盘使用情况。请参阅相应的\
  \ man 页面了解使用信息。\n\n**清单 10-2.** *确定目录内容的大小*\n\n```\n<?php\n\nfunction directory_size($directory)\
  \ {\n\n$directorySize=0;\n\n/* 打开目录并读取其内容。 */\n\nif ($dh = @opendir($directory))\
  \ {\n\n/* 遍历每个目录条目。 */\n\nwhile (($filename = readdir ($dh))) {\n\n/* 过滤掉一些不需要的目录条目。\
  \ */\n\nif ($filename != \".\" && $filename != \"..\")\n\n{\n\n// 文件，则确定大小并累加至总数。\n\
  \nif (is_file($directory.\"/\".$filename))\n\n$directorySize += filesize($directory.\"\
  /\".$filename);\n\n// 新目录，则启动递归。\n\nif (is_dir($directory.\"/\".$filename))\n\n\
  $directorySize += directory_size($directory.\"/\".$filename);\n\n}\n\n} #结束 WHILE\n\
  \n} #结束 IF\n\n@closedir($dh);\n\nreturn $directorySize;\n\n} #结束 directory_size()\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**238**\n\n第 10 章 ■ 文件与操作系统操作\n\
  \n```\n$directory = \"/usr/local/apache2/htdocs/book/chapter10/\"; $totalSize =\
  \ round((directory_size($directory) / 1024), 2);\n\necho \"目录 $directory: \".$totalSize.\
  \ \"kb.\";\n```\n\n#### 访问与修改时间\n\n确定文件的最后访问和修改时间的能力在许多管理任务中发挥着重要作用，尤其是在涉及网络或 CPU\
  \ 密集型更新操作的 Web 应用中。PHP 提供了三个函数用于确定文件的访问时间、创建时间和最后修改时间，本节将逐一介绍。\n\n##### `fileatime()`\n\
  \n```\nint fileatime (string *filename*)\n```\n\n`fileatime()` 函数以 Unix 时间戳格式返回文件的最后访问时间，出错时返回\
  \ `FALSE`。示例如下：\n\n```\n<?php\n\n$file = \"/usr/local/apache2/htdocs/book/chapter10/stat.php\"\
  ; echo \"文件最后访问时间：\".date(\"m-d-y g:i:sa\", fileatime($file));\n\n?>\n```\n\n这将返回：\n\
  \n`文件最后访问时间：06-09-03 1:26:14pm`\n\n##### `filectime()`\n\n```\nint filectime (string\
  \ *filename*)\n```\n\n`filectime()` 函数以 Unix 时间戳格式返回文件的最后更改时间，出错时返回 `FALSE`。示例如下：\n\
  \n```\n<?php\n\n$file = \"/usr/local/apache2/htdocs/book/chapter10/stat.php\"; echo\
  \ \"文件 inode 最后更改时间：\".date(\"m-d-y g:i:sa\", fileatime($file));\n\n?>\n```\n\n\
  这将返回：\n\n`文件 inode 最后更改时间：06-09-03 1:26:14pm`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 10 章 ■ 文件与操作系统操作\n\n**239**\n\n> **注意** “最后更改时间”与“最后修改时间”的区别在于：最后更改时间指的是文件 inode\
  \ 数据的任何变化，包括权限、所有者、组或其他 inode 特定信息的更改；而最后修改时间指的是文件内容（具体而言，是字节大小）的变化。\n\n##### `filemtime()`\n\
  \n```\nint filemtime (string *filename*)\n```\n\n`filemtime()` 函数以 Unix 时间戳格式返回文件的最后修改时间，否则返回\
  \ `FALSE`。以下代码演示了如何在网页上放置一个“最后修改”时间戳：\n\n```\n<?php\n```\n\n\n\n`$file = \"/usr/local/apache2/htdocs/book/chapter10/stat.php\"\
  ; echo \"File last updated: \".date(\"m-d-y g:i:sa\", filemtime($file));`\n\n`?>`\n\
  \n这会返回：\n\n```\nFile last updated: 06-09-03 1:26:14pm\n```\n\n### 文件所有权与权限\n\n如今，安全性对于任何服务器安装（无论大小）都至关重要。大多数现代操作系统都采用了通过用户/组所有权范式来分离文件权限的概念，只要配置得当，这便是一种极其方便且强大的数据保护手段。在本节中，你将学习如何使用\
  \ PHP 的内置功能来查看和管理这些权限。\n\n请注意，由于 PHP 脚本通常伪装成服务器守护进程的所有者来执行，除非采取极度不安全的措施以特权用户身份运行服务器，否则其中部分函数将执行失败。因此，请记住，本章介绍的部分功能在将\
  \ PHP 作为命令行接口（CLI）运行时更为适用，因为通过 CLI 执行的脚本理论上可以以任何系统用户的身份运行。\n\n#### `chown()`\n\n\
  `int chown (string *filename*, mixed *user*)`\n\n`chown()` 函数尝试将 `filename` 的所有者更改为\
  \ `user`（通过用户名或 UID 指定），成功时返回 `TRUE`，否则返回 `FALSE`。\n\n#### `chgrp()`\n\n`int chgrp\
  \ (string *filename*, mixed *group*)`\n\n`chgrp()` 函数尝试将 `filename` 的所属组更改为 `group`，成功时返回\
  \ `TRUE`，否则返回 `FALSE`。\n\n#### `fileperms()`\n\n`int fileperms (string *filename*)`\n\
  \n`fileperms()` 函数以十进制格式返回 `filename` 的权限，出错时返回 `FALSE`。由于十进制的权限表示几乎肯定不是我们想要的格式，因此你需要转换\
  \ `fileperms()` 的返回值。这可以轻松地通过 `base_convert()` 函数结合 `substr()` 函数来实现。`base_convert()`\
  \ 函数可以将一个值从一种进制转换为另一种进制；因此，你可以用它把 `fileperms()` 返回的十进制值从 10 进制转换为所需的 8 进制。然后使用 `substr()`\
  \ 函数仅获取 `base_convert()` 返回值的最后三位数字，这三位数字正是讨论 Unix 文件权限时所涉及的。请看以下示例：\n\n```php\n\
  <?php\necho substr(base_convert(fileperms(\"/etc/passwd\"), 10, 8), 3);\n?>\n```\n\
  \n这会返回：\n\n```\n```\n\n#### `filegroup()`\n\n`int filegroup (string *filename*)`\n\
  \n`filegroup()` 函数返回 `filename` 所有者的组 ID（GID），如果无法确定 GID 则返回 `FALSE`：\n\n```php\n\
  <?php\n$gid = filegroup(\"/etc/passwd\");\n// 在 Unix 上返回 \"0\"，因为 root 用户的 GID 通常是\
  \ 0。\n?>\n```\n\n请注意，`filegroup()` 返回的是 GID，而不是组名。\n\n#### `fileowner()`\n\n`int\
  \ fileowner (string *filename*)`\n\n`fileowner()` 函数返回 `filename` 所有者的用户 ID（UID），如果无法确定\
  \ UID 则返回 `FALSE`。请看此示例：\n\n```php\n<?php\n$uid = fileowner(\"/etc/passwd\");\n\
  // 在 Linux 上返回 \"0\"，因为 root 用户的 UID 通常是 0。\n?>\n```\n\n请注意，`fileowner()` 返回的是 UID，而不是用户名。\n\
  \n#### `isexecutable()`\n\n`boolean isexecutable (string *filename*)`\n\n如果 `filename`\
  \ 存在且可执行，`isexecutable()` 函数返回 `TRUE`，否则返回 `FALSE`。请注意，此函数在 Windows 平台上不可用。\n\n\
  #### `isreadable()`\n\n`boolean isreadable (string *filename*)`\n\n如果 `filename`\
  \ 存在且可读，`isreadable()` 函数返回 `TRUE`，否则返回 `FALSE`。如果传入的 `filename` 是目录名，`isreadable()`\
  \ 将判断该目录是否可读。\n\n#### `iswriteable()`\n\n`boolean iswriteable (string *filename*)`\n\
  \n如果 `filename` 存在且可写，`iswriteable()` 函数返回 `TRUE`，否则返回 `FALSE`。如果传入的 `filename`\
  \ 是目录名，`iswriteable()` 将判断该目录是否可写。\n\n> **注意：** 函数 `iswritable()` 是 `iswriteable()`\
  \ 的别名。\n\n#### `umask()`\n\n`int umask ([int *mask*])`\n\n`umask()` 函数决定了新建文件所分配的权限级别。`umask()`\
  \ 函数将 PHP 的 umask 计算为 `mask` 与 `0777` 按位与的结果，并返回旧的掩码。请记住，`mask` 是一个代表权限级别的三或四位数字代码。之后，在整个脚本创建文件和目录时，PHP\
  \ 都会使用这个 umask。省略可选参数 `mask` 将导致返回 PHP 当前配置的 umask 值。\n\n## 文件 I/O\n\n编写激动人心且实用的程序几乎总是需要程序与某种外部数据源交互。文件和数据库就是这类数据源的两个主要例子。在本节中，我们将深入探讨如何处理文件。然而，在介绍\
  \ PHP 众多标准的文件相关函数之前，有必要介绍几个与此主题相关的基本概念。\n\n#### 资源的概念\n\n术语“资源”通常指代任何可以从中发起输入或输出流的实体。标准输入或输出、文件以及网络套接字都是资源的例子。\n\
  \n#### 换行符\n\n换行符，由字符序列 `\\n` 表示，代表文件内一行的结束。当你需要逐行输入或输出信息时，请记住这一点。本章余下部分介绍的几个函数提供了专门处理换行符的功能。其中一些函数包括\
  \ `file()`、`fgetcsv()` 和 `fgets()`。\n\n#### 文件结束符\n\n程序需要一种标准化的方法来判定何时到达文件末尾。这个标准通常被称为文件结束符（EOF）字符。这是一个非常重要的概念，几乎所有主流编程语言都提供了内置函数来验证解析器是否已到达\
  \ EOF。在 PHP 中，这个函数是 `feof()`，接下来将对其进行介绍。\n\n##### `feof()`\n\n`int feof (string\
  \ *resource*)`\n\n`feof()` 函数判断 `resource` 的 EOF 是否已到达。它在文件 I/O 操作中非常常用。示例如下：\n\n\
  ```php\n<?php\n$fh = fopen(\"/home/www/data/users.txt\", \"rt\");\nwhile (!feof($fh))\
  \ echo fgets($fh);\nfclose($fh);\n?>\n```\n\n### 打开和关闭文件\n\n在对文件内容进行操作之前，你通常需要建立到文件资源的连接。同样，使用完该资源后，你应该关闭该连接。有两个标准函数可用于此类任务，本节将介绍它们。\n\
  \n##### `fopen()`\n\n`resource fopen (string *resource*, string *mode* [, int *use_include_path*\
  \ [, resource *zcontext*]])`\n\n`fopen()` 函数将一个资源绑定到一个流（或句柄）上。绑定后，脚本可以通过该句柄与资源进行交互。最常用于打开文件进行读取和操作。然而，`fopen()`\
  \ 也能够通过多种协议打开资源，包括 HTTP、HTTPS 和 FTP，这一概念将在第 16 章讨论。\n\n在打开资源时指定的 `mode` 决定了该资源的访问级别。各种模式在表\
  \ 10-1 中定义。\n\n**表 10-1.** *文件模式*\n\n| 模式 | 描述                                 \
  \                    |\n|------|---------------------------------------------------------|\n\
  | `r`  | 只读。文件指针置于文件开头。                         |\n| `r+` | 读写。文件指针置于文件开头。     \
  \                    |\n| `w`  | ...                                           \
  \          |\n\n\n\n##### PHP 文件处理模式\n\n`w`  \n只写。在写入前，会删除文件内容并将文件指针返回至文件开头。若文件不存在，则尝试创建该文件。\n\
  \n`w+`  \n读写。在读取或写入前，会删除文件内容并将文件指针返回至文件开头。若文件不存在，则尝试创建该文件。\n\n`a`  \n只写。文件指针被置于文件末尾。若文件不存在，则尝试创建该文件。此模式更常被称为追加模式。\n\
  \n`a+`  \n读写。文件指针被置于文件末尾。若文件不存在，则尝试创建该文件。此过程称为向文件中追加内容。\n\n`b`  \n以二进制模式打开文件。\n\n\
  `t`  \n以文本模式打开文件。\n\n如果资源位于本地文件系统中，PHP 期望通过在其前面加上本地路径或相对路径来访问该资源。或者，你可以将 `fopen()`\
  \ 的 `use_include_path` 参数设置为 `1`，这将使 PHP 考虑 `include_path` 配置指令中指定的路径。\n\n最后一个参数\
  \ `zcontext` 用于设置特定于文件或流的配置参数，以及在多个 `fopen()` 请求之间共享文件或流特有的信息。有关此主题的更多细节将在第 16 章中讨论。\n\
  \n让我们来看几个例子。第一个例子以只读流方式打开一个位于本地服务器上的文本文件：\n\n```\n$fh = fopen(\"/usr/local/apache/data/users.txt\"\
  ,\"rt\");\n```\n\n下一个示例演示了如何打开一个指向 Microsoft Word 文档的写入流。由于 Word 文档是二进制的，你应该指定二进制的\
  \ `b` 模式变体。\n\n```\n$fh = fopen(\"/usr/local/apache/data/docs/summary.doc\",\"wb\"\
  );\n```\n\n下一个示例引用了同一个 Word 文档，但这次 PHP 将在 `include_path` 指令指定的路径中搜索该文件：\n\n```\n\
  $fh = fopen(\"summary.doc\",\"wb\", 1);\n```\n\n最后一个示例以只读流方式打开一个远程的 `index.html`\
  \ 文件：\n\n```\n$fh = fopen(\"http://www.example.com/\", \"rt\");\n```\n\n在本章及下一章的众多示例中，你都会看到这个函数的身影。\n\
  \n##### `fclose()`\n\n```\nboolean fclose (resource filehandle)\n```\n\n良好的编程习惯要求你在用完资源后销毁指向这些资源的指针。`fclose()`\
  \ 函数会为你处理此事，关闭之前由 `filehandle` 指定的已打开文件指针，成功时返回 `TRUE`，否则返回 `FALSE`。\n\n`filehandle`\
  \ 必须是一个通过 `fopen()` 或 `fsockopen()` 打开的现用文件指针。\n\n#### 从文件中读取数据\n\nPHP 提供了多种从文件中读取数据的方法，从一次只读取一个字符到单次操作读取整个文件。本节将介绍许多最常用的函数。\n\
  \n##### `file()`\n\n```\narray file (string filename [int use_include_path [, resource\
  \ context]])\n```\n\n功能极为强大的 `file()` 函数能够将文件读入一个数组，并以换行符分隔每个元素，换行符仍会保留在每个元素的末尾。\n\
  \n虽然该函数使用起来很简单，但其重要性不可低估，因此值得进行一个简单的演示。考虑以下名为 `users.txt` 的示例文本文件：\n\n```\nAle ale@example.com\n\
  Nicole nicole@example.com\nLaura laura@example.com\n```\n\n以下脚本读取 `users.txt`，并将数据解析并转换为方便的\
  \ Web 格式：\n\n```php\n<?php\n$users = file(\"users.txt\");\nforeach ($users as $user)\
  \ {\n    list($name, $email) = explode(\" \", $user);\n    // 移除 $email 中的换行符\n\
  \    $email = trim($email);\n    echo \"<a href=\\\"mailto:$email\\\">$name</a>\
  \ <br />\\n\";\n}\n?>\n```\n\n该脚本生成以下 HTML 输出：\n\n```\n<a href=\"ale@example.com\"\
  >Ale</a><br />\n<a href=\"nicole@example.com\">Nicole</a><br />\n```\n\n\n\n<a href=\"\
  laura@example.com\">Laura</a><br /> 与 `fopen()` 类似，你可以通过将 `use_include_path` 设置为\
  \ `1`，让 `file()` 函数在 `include_path` 配置参数指定的路径中搜索文件。`context` 参数指的是一个流上下文。你将在第 16\
  \ 章中了解更多关于此主题的内容。\n\n`file_get_contents()`\n\n`string file_get_contents (string\
  \ filename [, int use_include_path [resource context]])`\n\n`file_get_contents()`\
  \ 函数将 `filename` 的内容读取到一个字符串中。通过修改上一节的脚本，使用此函数代替 `file()`，得到以下代码：\n\n```php\n<?php\n\
  $userfile= file_get_contents(\"users.txt\");\n// Place each line of $userfile into\
  \ array\n$users = explode(\"\\n\",$userfile);\nforeach ($users as $user) {\n   \
  \ list($name, $email) = explode(\" \", $user);\n    echo \"<a href=\\\"mailto:$email\\\
  \">$name</a> <br />\";\n}\n?>\n```\n\n`context` 参数指的是一个流上下文。你将在第 16 章中了解更多关于此主题的内容。\n\
  \n`fgetc()`\n\n`string fgetc (resource handle)`\n\n`fgetc()` 函数从由 `handle` 指定的打开资源流中读取一个字符。如果遇到文件结束符（EOF），则返回\
  \ FALSE。\n\n`fgetcsv()`\n\n`array fgetcsv (resource handle, int length [, string\
  \ delimiter [, string enclosure]])`\n\n便捷的 `fgetcsv()` 函数解析由 `handle` 指定、以 `delimiter`\
  \ 分隔的文件中的每一行，并将每个字段放入一个数组中。读取不会在换行符处停止；而是在读取了 `length` 个字符或找到闭合的封装字符时停止。因此，选择一个肯定会超过文件中最长行长度的数字总是一个好主意。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**246**  \n**第 10 章 ■ 使用文件和操作系统**\n\
  \n考虑一个场景：每周通讯订阅者数据被缓存到一个文件中，供公司营销人员查阅。营销人员总是急于用可疑请求轰炸 IT 部门，他们要求这些信息也能在网页上查看。幸运的是，使用\
  \ `fgetcsv()` 可以轻松实现这一点。以下示例解析了已缓存的文件：\n\n```php\n<?php\n$fh = fopen(\"/home/www/data/subscribers.csv\"\
  , \"r\");\nwhile (list($name, $email, $phone) = fgetcsv($fh, 1024, \",\")) {\n \
  \   echo \"<p>$name ($email) Tel. $phone</p>\";\n}\n?>\n```\n\n注意，你不必非得使用 `fgetcsv()`\
  \ 来解析此类文件；`file()` 和 `list()` 函数也可以很好地完成这项工作。重新考虑上面的示例：\n\n```php\n<?php\n$users\
  \ = file(\"users.txt\");\nforeach ($users as $user) {\n    list($name, $email, $phone)\
  \ = explode(\",\", $user);\n    echo \"<p>$name ($email) Tel. $phone</p>\";\n}\n\
  ?>\n```\n\n> **注意：** 逗号分隔值（CSV）文件常用于应用程序之间的文件导入。Microsoft Excel 和 Access、MySQL、Oracle\
  \ 和 PostgreSQL 只是能够导入和导出 CSV 数据的应用程序和数据库中的一部分。此外，诸如 Perl、Python 和 PHP 等语言在解析分隔数据方面特别高效。\n\
  \n`fgets()`\n\n`fgets (resource handle [, int length])`\n\n`fgets()` 函数返回从 `handle`\
  \ 引用的打开资源中读取的 `length - 1` 字节，或返回直到遇到换行符或 EOF 时读取的所有内容。如果省略可选的 `length` 参数，则假定为\
  \ 1024 个字符。在大多数情况下，这意味着 `fgets()` 会在读取 1024 个字符之前遇到换行符，从而每次调用返回下一行。示例如下：\n\n```php\n\
  <?php\n$fh = fopen(\"/home/www/data/users.txt\", \"rt\");\nwhile (!feof($fh)) echo\
  \ fgets($fh);\nfclose($fh);\n?>\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 10 章 ■ 使用文件和操作系统**  \n**247**\n\n`fgetss()`\n\n`string fgetss (resource handle,\
  \ int length [, string allowable_tags])`\n\n`fgetss()` 函数的操作与 `fgets()` 类似，不同之处在于它会去除任何\
  \ HTML 和 PHP\n\n\n\n\n来自 handle 的标签。如果你希望忽略某些标签，请将它们包含在 `allowable_tags` 参数中。\n\n\
  举例来说，考虑这样一种场景：作者需要使用指定的 HTML 标签子集，以 HTML 格式提交他们的作品。当然，作者并不总是遵守规则，因此在发布前必须扫描文件以检查标签是否被误用。使用\
  \ `fgetss()`，这一过程变得非常简单：\n\n```php\n<?php\n\n/* 构建可接受标签列表 */\n\n$tags = \"<h2><h3><p><b><a><img>\"\
  ;\n\n/* 打开文章，并读取其内容。 */\n\n$fh = fopen(\"article.html\", \"rt\");\n\nwhile (!feof($fh))\
  \ {\n\n$article .= fgetss($fh, 1024, $tags);\n\n}\n\nfclose($fh);\n\n/* 以写入模式打开文件\n\
  \n并写入 $article 的内容。 */\n\n$fh = fopen(\"article.html\", \"wt\");\n\nfwrite($fh,\
  \ $article);\n\nfclose($fh);\n\n?>\n```\n\n**提示** 如果你想从通过表单提交的用户输入中移除 HTML 标签，可以查看第\
  \ 9 章中介绍的 `strip_tags()` 函数。\n\n---\n\n##### `fread()`\n\n`string fread (resource\
  \ *handle*, int *length*)`\n\n`fread()` 函数从 `handle` 指定的资源中读取 `length` 个字符。当到达文件末尾（EOF）或已读取\
  \ `length` 个字符时，读取停止。请注意，与其他读取函数不同，在使用 `fread()` 时，换行符无关紧要；因此，通常使用 `filesize()`\
  \ 来确定应读取的字符数，一次性读取整个文件会很方便：\n\n```php\n<?php\n\n$file = \"/home/www/data/users.txt\"\
  ;\n\n$fh = fopen($file, \"rt\");\n\n$userdata = fread($fh, filesize($file));\n\n\
  fclose($fh);\n\n?>\n```\n\n变量 `$userdata` 现在包含了 `users.txt` 文件的内容。\n\n---\n\n#####\
  \ `readfile()`\n\n`int readfile (string *filename* [, int *use_include_path*])`\n\
  \n`readfile()` 函数读取由 `filename` 指定的整个文件，并立即将其输出到输出缓冲区，返回读取的字节数。启用可选的 `use_include_path`\
  \ 参数会告诉 PHP 搜索由 `include_path` 配置参数指定的路径。\n\n在对 `fgetss()` 部分讨论的文章进行清理后，使用 `readfile()`\
  \ 可以很容易地将其输出到浏览器。此修订后的示例如下：\n\n```php\n<?php\n\n$file = \"/home/www/articles/gilmore.html\"\
  ;\n\n/* 构建可接受标签列表 */\n\n$tags = \"<h2><h3><p><b><a><img>\";\n\n/* 打开文章，并读取其内容。 */\n\
  \n$fh = fopen($file, \"rt\");\n\nwhile (!feof($fh))\n\n$article .= fgetss($fh, 1024,\
  \ $tags);\n\nfclose($fh);\n\n/* 打开文章，用清理后的内容覆盖它 */\n\n$fh = fopen($file, \"wt\"\
  );\n\nfwrite($fh, $article);\n\nfclose($fh);\n\n/* 将文章输出到浏览器。 */\n\n$bytes = readfile($file);\n\
  \n?>\n```\n\n与 PHP 的许多其他文件 I/O 函数一样，如果配置参数 `fopen_wrappers` 已启用，则可以通过 URL 打开远程文件。\n\
  \n---\n\n##### `fscanf()`\n\n`mixed fscanf (resource *handle*, string *format* [,\
  \ string *var1*])`\n\n`fscanf()` 函数提供了一种便捷的方法，用于按照 `format` 指定的格式解析 `handle` 指定的资源。假设你想解析包含社会保险号（SSN）的以下文件（`socsecurity.txt`）：\n\
  \n```\n123-45-6789\n234-56-7890\n345-67-8901\n```\n\n以下示例解析了 `socsecurity.txt` 文件：\n\
  \n```php\n<?php\n\n$fh = fopen(\"socsecurity.txt\", \"r\");\n\n/* 按照 整数-整数-整数 格式解析每个\
  \ SSN。 */\n\nwhile ($user = fscanf($fh, \"%d-%d-%d\")) {\n\nlist ($part1,$part2,$part3)\
  \ = $user;\n\n...\n\n}\n\nfclose($fh);\n\n?>\n```\n\n每次迭代中，变量 `$part1`、`$part2`\
  \ 和 `$part3` 分别被赋值为每个 SSN 的三个组成部分。\n\n---\n\n#### 移动文件指针\n\n在文件内跳转，从不同位置读取和写入通常很有用。PHP\
  \ 提供了多个函数来实现此功能。\n\n##### `fseek()`\n\n`int fseek (resource *handle*, int *offset*\
  \ [, int *whence*])`\n\n`fseek()` 函数将 `handle` 的指针移动到由 `offset` 指定的位置。如果省略可选参数 `whence`，则位置设置从文件开头算起\
  \ `offset` 字节处。否则，`whence` 可以设置为三个可能值之一，这将影响指针的位置：\n\n- `SEEK_CUR`：将指针位置设置为当前位置加上\
  \ `offset` 字节。\n- `SEEK_END`：将指针位置设置为文件末尾（EOF）加上 `offset` 字节。在这种情况下，`offset` 必须设置为负值。\n\
  - `SEEK_SET`：将指针位置设置为 `offset` 字节处。这与省略 `whence` 的效果相同。\n\n##### `ftell()`\n\n`int\
  \ ftell (resource *handle*)`\n\n`ftell()` 函数检索由 `handle` 指定的资源中文件指针偏移量的当前位置。\n\n\
  ##### `rewind()`\n\n`int rewind (resource *handle*)`\n\n`rewind()` 函数将文件指针移回到由 `handle`\
  \ 指定的资源的开头。\n\n---\n\n## 写入文件\n\n本节重点介绍用于将数据输出到文件的几个函数。\n\n##### `fwrite()`\n\n\
  `int fwrite (resource *handle*, string *string* [, int *length*])`\n\n`fwrite()`\
  \ 函数将 `string` 的内容输出到由 `handle` 指向的资源。如果提供了可选的 `length` 参数，则 `fwrite()` 将在写入 `length`\
  \ 个字符后停止写入。否则，将在找到字符串末尾时停止写入。请考虑此示例：\n\n```php\n<?php\n\n$subscriberInfo = \"Jason\
  \ Gilmore|wj@example.com\";\n\n$fh = fopen(\"/home/www/data/subscribers.txt\", \"\
  at\"); fwrite($fh, $subscriberInfo);\n\nfclose($fh);\n\n?>\n```\n\n**提示** 如果未向 `fwrite()`\
  \ 提供可选的 `length` 参数，则将忽略 `magic_quotes_runtime` 配置参数。有关此参数的更多信息，请参见第 2 章和第 9 章。\n\
  \n##### `fputs()`\n\n`int fputs (resource *handle*, string *string* [, int *length*])`\n\
  \n`fputs()` 函数的操作与 `fwrite()` 完全相同。推测它是为了满足 C/C++ 程序员的术语偏好而被整合到该语言中的。\n\n---\n\n\
  #### 读取目录内容\n\n读取目录内容所需的过程与读取文件非常相似。本节介绍可用于此任务的函数，并介绍一个 PHP 5 新增的函数，该函数可将目录内容读入数组。\n\
  \n##### `opendir()`\n\n`resource opendir (string *path*)`\n\n就像 `fopen()` 为给定文件打开一个文件指针一样，`opendir()`\
  \ 打开由 `path` 指定的目录流。\n\n##### `closedir()`\n\n`void closedir (resource *directory_handle*)`\n\
  \n`closedir()` 函数关闭由 `directory_handle` 指向的目录流。\n\n##### `readdir()`\n\n`string\
  \ readdir (int *directory_handle*)`\n\n`readdir()` 函数返回由 `directory_handle` 指定的目录中的每个元素。你可以使用此函数列出给定目录中的所有文件和子目录：\n\
  \n```php\n<?php\n\n$dh = opendir('/usr/local/apache2/htdocs/');\n\nwhile ($file\
  \ = readdir($dh))\n\necho \"$file <br>\";\n\nclosedir($dh);\n\n?>\n```\n\n示例输出如下：\n\
  \n```\n.\n..\narticles\nimages\nnews\ntest.php\n```\n\n请注意，`readdir()` 也会返回典型的 Unix\
  \ 目录列表中常见的 `.` 和 `..` 条目。你可以使用 `if` 语句轻松过滤掉它们：\n\n```php\nif($file != \".\" AND\
  \ $file != \"..\")...\n```\n\n##### `scandir()`\n\n\n\n\n`array scandir (string\
  \ *directory* [,int *sorting_order* [, resource *context*]])`  \n`scandir()` 函数是\
  \ PHP 5 新增的函数，返回一个由 `directory` 中的文件和目录组成的数组，出错时返回 FALSE。将可选的 `sorting_order` 参数设置为\
  \ 1 时，内容按降序排序，覆盖默认的升序排序。回顾上一节的示例：\n\n```\n<?php\nprint_r(scandir(\"/usr/local/apache2/htdocs\"\
  ));\n?>\n```\n\n这将返回：\n\n```\nArray ( [0] => . [1] => .. [2] => articles [3] =>\
  \ images\n[4] => news [5] => test.php )\n```\n\n`context` 参数涉及流上下文。你将在第 16 章中详细了解此主题。\n\
  \n### 执行 Shell 命令\n\n与底层操作系统交互的能力是任何编程语言的关键特性。本节将介绍 PHP 在这方面的功能。\n\n### PHP 的内置系统命令\n\
  \n虽然你可以使用 `exec()` 或 `system()` 等函数执行任何系统级命令，但有些函数非常常用，以至于开发者认为将它们直接内置到语言中是个好主意。本节将介绍几个此类函数。\n\
  \n##### `rmdir()`\n\n`int rmdir (string *dirname*)`\n\n`rmdir()` 函数删除 `dirname`\
  \ 指定的目录，成功时返回 TRUE，否则返回 FALSE。与许多 PHP 文件系统函数一样，必须正确设置权限，`rmdir()` 才能成功删除目录。由于 PHP\
  \ 脚本通常以服务器守护进程所有者的身份执行，除非该用户对该目录具有写入权限，否则 `rmdir()` 将失败。此外，该目录必须为空。\n\n要删除非空目录，你可以使用能够执行系统级命令的函数，如\
  \ `system()` 或 `exec()`，或者编写一个递归函数，在尝试删除目录之前删除所有文件内容。请注意，无论哪种情况，执行用户（服务器守护进程所有者）都需要对目标目录的父目录具有写入权限。\n\
  \n以下是后一种方法的示例：\n\n```\n<?php\nfunction delete_directory($dir)\n{\n    if ($dh =\
  \ @opendir($dir))\n    {\n        /* 遍历目录内容。 */\n        while (($file = readdir\
  \ ($dh)) != false)\n        {\n            if (($file == \".\") || ($file == \"\
  ..\")) continue;\n            if (is_dir($dir . '/' . $file))\n                delete_directory($dir\
  \ . '/' . $file);\n            else\n                unlink($dir . '/' . $file);\n\
  \        } #endWHILE\n        @closedir($dh);\n        rmdir($dir);\n    } #endIF\n\
  } #end delete_directory()\n\n$dir = \"/usr/local/apache2/htdocs/book/chapter10/test/\"\
  ;\ndelete_directory($dir);\n?>\n```\n\n##### `rename()`\n\n`boolean rename (string\
  \ *oldname*, string *newname*)`\n\n`rename()` 函数将 `oldname` 指定的文件重命名为新名称 `newname`，成功时返回\
  \ TRUE，否则返回 FALSE。由于 PHP 脚本通常以服务器守护进程所有者的身份执行，除非该用户对该文件具有写入权限，否则 `rename()` 将失败。\n\
  \n##### `touch()`\n\n`int touch (string *filename* [, int *time* [, int *atime*]])`\n\
  \n`touch()` 函数设置文件 `filename` 的最后修改时间和最后访问时间，成功时返回 TRUE，出错时返回 FALSE。如果未提供 `time`，则使用当前时间（由服务器指定）。如果提供了可选的\
  \ `atime` 参数，访问时间将设置为此值；否则，与修改时间一样，将设置为 `time` 或当前服务器时间。\n\n请注意，如果 `filename` 不存在，并且脚本所有者拥有足够的权限，则会创建该文件。\n\
  \n### 系统级程序执行\n\n真正懒惰的程序员知道如何在开发应用程序时充分利用整个服务器环境，其中包括在必要时利用操作系统、文件系统、已安装程序库和编程语言的功能。在本节中，你将学习\
  \ PHP 如何与操作系统交互，以调用操作系统级程序和第三方安装的应用程序。如果操作得当，这将为你的 PHP 编程技能增添一个全新的功能层次。如果操作不当，不仅可能对你的应用程序造成灾难性影响，还可能危及服务器数据的完整性。也就是说，在深入探讨这个强大功能之前，请先花点时间考虑一下在将用户输入传递给\
  \ shell 层之前对其进行清理的问题。\n\n### 清理输入\n\n如果未能清理后续可能传递给系统级函数的用户输入，攻击者可能会对你的信息存储和操作系统造成大规模内部破坏，篡改或删除\
  \ Web 文件，以及获得对你服务器的无限制访问权限。而这仅仅是个开始。\n\n> **注** 关于安全 PHP 编程的讨论，请参见第 21 章。\n\n为了说明清理输入为何如此重要，考虑一个真实场景。假设你提供一项在线服务，可以根据输入的\
  \ URL 生成 PDF。实现这一目标的绝佳工具是 HTMLDOC，这是一个将 HTML 文档转换为索引 HTML、Adobe PostScript 和 PDF\
  \ 文件的程序。HTMLDOC (http://www.htmldoc.org/) 在 GNU 通用公共许可证下发布。HTMLDOC 可以从命令行调用，如下所示：\n\
  \n`%>htmldoc --webpage –f webpage.pdf http://www.wjgilmore.com/`\n\n这将创建一个名为 `webpage.pdf`\
  \ 的 PDF 文件，其中包含网站索引页面的快照。当然，大多数用户无法访问你服务器的命令行；因此，你需要创建一个控制更加严格的接口来访问该服务，最明显的方式可能是通过网页。使用\
  \ PHP 的 `passthru()` 函数（本章稍后介绍），你可以调用 HTMLDOC 并返回所需的 PDF，如下所示：\n\n`$document = $_POST['userurl'];`\n\
  `passthru(\"htmldoc --webpage -f webpage.pdf $document);`\n\n如果有进取心的攻击者擅自传入与所需 HTML\
  \ 页面无关的额外输入，输入如下内容会怎样：\n\n`http://www.wjgilmore.com/ ; cd /usr/local/apache/htdocs/;\
  \ rm –rf *`\n\n大多数 Unix shell 会将 `passthru()` 请求解释为三个独立的命令。第一个是：\n\n`htmldoc --webpage\
  \ -f webpage.pdf http://www.wjgilmore.com/`\n\n第二个命令是：\n\n`cd /usr/local/apache/htdocs/`\n\
  \n最后一个命令是：\n\n`rm -rf *`\n\n最后这两个命令肯定是意料之外的，可能导致你的整个 Web 文档树被删除。防止此类尝试的一种方法是在将用户输入传递给\
  \ PHP 的任何程序执行函数之前对其进行清理。有两个标准函数可以方便地用于此目的：`escapeshellarg()` 和 `escapeshellcmd()`。本节将分别介绍它们。\n\
  \n##### `escapeshellarg()`\n\n`string escapeshellarg (string *arguments*)`\n\n`escapeshellarg()`\
  \ 函数用单引号分隔参数，并为参数内的引号添加前缀（转义）。其效果是，当 `arguments` 被传递给 shell 命令时，它将被视为单个参数。这一点很重要，因为它降低了攻击者将其他命令伪装成\
  \ shell 命令参数的可能性。因此，在上述噩梦般的场景中，整个用户输入将被包含在单引号内，如下所示：\n\n`'http://www.wjgilmore.com/\
  \ ; cd /usr/local/apache/htdoc/; rm –rf *'`\n\n结果将是 HTMLDOC 仅会返回一个错误，因为它无法解析具有此语法的\
  \ URL，而不会删除整个目录树。\n\n##### `escapeshellcmd()`\n\n\n\n"
- "# PHP 程序执行函数\n\n`string escapeshellcmd (string $command)`\n\n`escapeshellcmd()`函数与`escapeshellarg()`函数基于相同的原理，通过转义\
  \ shell 元字符来净化潜在危险的输入。这些字符包括：`# & ; ` , | * ? , ~ < > ^ ( ) [ ] { } $ \\`。\n\n####\
  \ PHP 的程序执行函数\n\n本节介绍几个用于通过 PHP 脚本执行系统级程序的函数（除了反引号执行运算符之外）。虽然乍看之下它们操作上完全相同，但每个函数都有其自身的语法细微差别。\n\
  \n##### exec()\n\n`string exec (string $command [, array &$output [, int &$return_var]])`\n\
  \n`exec()`函数最适合执行一个操作系统级别的应用程序（由`command`指定），该程序旨在服务器后台继续执行。虽然最后一行输出会被返回，但你很可能希望查看所有输出；你可以通过包含可选参数`$output`来实现这一点，该数组在`exec()`指定的命令完成后会被填充每一行输出。此外，你可以通过包含可选参数`$return_var`来发现已执行命令的返回状态。\n\
  \n虽然我们可以简单演示如何使用`exec()`执行`ls`命令（对于 Windows 用户是`dir`）来返回目录列表，但提供一个更实用的示例会更有意义：如何从\
  \ PHP 调用 Perl 脚本。\n\n考虑以下 Perl 脚本（`languages.pl`）：\n\n```perl\n#! /usr/bin/perl\n\
  \nmy @languages = qw[perl php python java c];\n\nforeach $language (@languages)\
  \ {\n    print $language.\"<br />\";\n}\n```\n\n这个 Perl 脚本非常简单；不需要第三方模块，因此你只需少量时间投入即可测试此示例。如果你运行的是\
  \ Linux，立即运行此示例的可能性非常大，因为每个像样的发行版都安装了 Perl。如果你运行的是 Windows，请查看 ActiveState（`http://www.activestate.com/`）的\
  \ ActivePerl 发行版。\n\n与`languages.pl`类似，这里展示的 PHP 脚本也不算复杂；它只是调用 Perl 脚本，指定将结果放入一个名为`$results`的数组中。然后`$results`的内容被输出到浏览器。\n\
  \n```php\n<?php\n$outcome = exec(\"languages.pl\", $results);\nforeach ($results\
  \ as $result) echo $result;\n?>\n```\n\n结果如下：\n\n```\nperl\nphp\npython\njava\n\
  c\n```\n\n##### system()\n\n`string system (string $command [, int &$return_var])`\n\
  \n`system()`函数在你想要输出已执行命令的结果时非常有用。与`exec()`通过可选参数返回输出不同，`system()`的输出直接返回给调用者。但是，如果你想查看被调用程序的执行状态，需要使用可选参数`$return_var`指定一个变量。\n\
  \n例如，假设你想列出特定目录中的所有文件：`$mymp3s = system(\"ls -1 /home/jason/mp3s/\");`\n\n或者，修改之前的\
  \ PHP 脚本，再次使用`system()`调用`languages.pl`：\n\n```php\n<?php\n$outcome = system(\"\
  languages.pl\", $results);\necho $outcome;\n?>\n```\n\n##### passthru()\n\n`void\
  \ passthru (string $command [, int &$return_var])`\n\n`passthru()`函数在功能上与`exec()`类似，但区别在于它应该在你想要将二进制输出返回给调用者时使用。例如，假设你想在将\
  \ GIF 图像显示给浏览器之前将其转换为 PNG。你可以使用 Netpbm 图形包（可从`http://netpbm.sourceforge.net/`获取，基于\
  \ GPL 许可证）：\n\n```php\n<?php\nheader(\"Content-Type: image/png\");\npassthru(\"\
  giftopnm cover.gif | pnmtopng > cover.png\");\n?>\n```\n\n##### 反引号\n\n用反引号定界字符串会告诉\
  \ PHP 该字符串应该作为 shell 命令执行，并返回任何输出。注意，反引号不是单引号，而是一个倾斜的变体，在大多数美式键盘上通常与波浪号（`~`）共用一个键。示例如下：\n\
  \n```php\n<?php\n$result = `date`;\necho \"<p>The server timestamp is: $result</p>\"\
  ;\n?>\n```\n\n这会返回类似以下内容：\n\n```\nThe server timestamp is: Sun Jun 15 15:32:14 EDT\
  \ 2003\n```\n\n反引号运算符在操作上与接下来介绍的`shell_exec()`函数相同。\n\n##### shell_exec()\n\n`string\
  \ shell_exec (string $command)`\n\n`shell_exec()`函数提供了反引号的语法替代方案，执行 shell 命令并返回输出。重新考虑前面的示例：\n\
  \n```php\n<?php\n$result = shell_exec(\"date\");\necho \"<p>The server timestamp\
  \ is: $result</p>\";\n?>\n```\n\n### 总结\n\n虽然你可以完全使用 PHP 构建有趣且强大的 Web 应用程序，但当功能与底层平台和其他技术集成时，这种能力会大大扩展。就本章而言，这些技术包括底层操作系统和文件系统。在本书的其余部分你会反复看到这个主题，因为\
  \ PHP 与 LDAP、SOAP 和 Web 服务等各种技术交互的能力将被介绍。\n\n在下一章中，你将研究任何 Web 应用程序的两个关键方面：Web 表单和导航线索。\n\
  \n---\n\n"
- '# PEAR


  好的程序员编写可靠的代码，而伟大的程序员重用优秀程序员的代码。对于 PHP 程序员来说，*PEAR*（`http://pear.php.net`），即 *PHP
  Extension and Application Repository*（PHP 扩展与应用库）的缩写，是查找和重用优秀 PHP 代码最有效的手段之一。受 Perl
  广受欢迎的 CPAN（`http://www.cpan.org`）启发，该项目于 1999 年由著名 PHP 开发者 Stig Bakken 发起，第一个稳定版本随
  PHP 4.3.0 一起发布。正式定义上，PEAR 是一个用于可重用 PHP 组件的框架和分发系统，目前提供 442 个*包*，分为 41 个不同主题（并且还在不断增加）。由于
  PEAR 的贡献在被接受之前都经过社区的仔细审查，因此代码质量和遵守 PEAR 标准开发指南是有保证的。此外，由于许多 PEAR 包逻辑地实现了无论何种应用程序类型都会反复出现的常见任务，利用这个社区驱动的服务将为你节省大量的编程时间。


  本章致力于对 PEAR 的全面讨论，提供以下主题：


  - 几个流行 PEAR 包的概述，旨在让你了解这个仓库到底有多有用。

  - 通过 PEAR 控制台安装和管理 PEAR 包的说明。

  - 关于 PEAR 编码和文档指南的讨论，这不仅对构建通用应用程序有用，对审查和提交 PEAR 包也很有用。

  - PEAR 提交流程的概述，以防你有兴趣向仓库做出自己的贡献。


  ### 流行的 PEAR 包


  为了让你了解 PEAR 包到底有多受欢迎，在撰写本文时，托管的包迄今已被下载了近 1400 万次！事实上，有几个包非常受欢迎，以至于开发者从 4.0 版本开始就将它们默认包含在内。下面列出目前包含的包：




  • `Archive_Tar`：`Archive_Tar` 包简化了 tar 文件的管理，提供了创建、列出、提取和向 tar 文件中添加内容的方法。此外，它还支持
  Gzip 和 Bzip2 压缩算法，前提是安装了相应的 PHP 扩展。PEAR 的正常运行需要此包。


  • `Console_Getopt`：通过在命令行执行时提供选项来修改脚本的行为通常很有用。例如，你可以通过向 `pear` 命令传递 `-V` 来验证已安装的
  PEAR 版本：


  ```

  %>pear -V

  ```


  `Console_Getopt` 包提供了一种标准方法来读取这些选项，并在提供的语法不符合某些预定义规范（例如特定参数是否需要参数）时向用户提供错误消息。PEAR
  的正常运行需要此包。


  • `DB`：`DB` 包提供了一个面向对象的查询 API，用于抽象与数据库层的通信。这让你能够方便地将应用程序从一个数据库透明地迁移到另一个数据库，甚至可能像修改一行代码一样简单。目前支持
  12 种数据库，包括：dBase、FrontBase、Informix、InterBase、Mini SQL、Microsoft SQL Server、MySQL、Oracle、ODBC、PostgreSQL、SQLite
  和 Sybase。


  • `Mail`：编写一个能够发送电子邮件的可移植 PHP 应用程序可能比你想象的要棘手，因为并非所有操作系统都提供相同的设施来支持此功能。例如，默认情况下，PHP
  的 `mail()` 函数依赖于 `sendmail` 程序（或 `sendmail` 包装器），但 `sendmail` 在 Windows 上不可用。为了解决这种不兼容性，可以指定
  SMTP 服务器的地址并通过它发送邮件。然而，你的应用程序如何确定哪种方法可用呢？`Mail` 包通过提供一个用于发送邮件的统一接口解决了这个难题，而无需修改
  PHP 的配置。它支持从 PHP 应用程序发送电子邮件的三种不同后端（PHP 的 `mail()` 函数、`sendmail` 和 SMTP 服务器），并包含一个用于验证电子邮件地址语法的方法。通过使用简单的应用程序配置文件或基于
  Web 的偏好表单，用户可以指定最适合其需求的方法。


  • `Net_Socket`：`Net_Socket` 包用于通过提供一个用于执行连接以及在这些套接字之间读取和写入信息的通用 API 来简化 TCP 套接字的管理。


  • `Net_SMTP`：`Net_SMTP` 包提供了 SMTP 协议的实现，使你可以轻松执行诸如连接和断开与 SMTP 服务器的连接、执行 SMTP 身份验证、识别发件人以及发送邮件等任务。


  • `PEAR`：PEAR 的正常运行需要此包。


  • `PHPUnit`：单元测试是一种特定的测试方法，用于确保代码块（或单元）的正确运行，通常针对类或函数库。`PHPUnit` 包通过指定一组通用的结构指南和一种自动化测试的方法，促进了单元测试的创建、维护和执行。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- '# 第 11 章 ■ PEAR


  • `XML_Parser`：`XML_Parser` 包提供了一种简单、面向对象的解决方案来解析 XML 文件。


  • `XML_RPC`：`XML_RPC` 包是基于 PHP 实现的 XML-RPC 协议（http://www.xmlrpc.com/），这是一种通过互联网远程调用过程的方法。使用此包，你可以创建基于
  XML-RPC 的客户端和服务器。PEAR 的正常运行需要此包。


  虽然上述包是最受欢迎的，但请记住，它们只是通过 PEAR 可用的包中的一小部分。其他一些重要的包如下：


  • `Auth`：`Auth` 包支持通过各种机制进行用户身份验证，包括 LDAP、POP3、IMAP、RADIUS、SOAP 等。


  • `HTML_QuickForm`：`HTML_QuickForm` 包促进了 HTML 表单的创建、渲染和验证。


  • `Log`：`Log` 包提供了一个抽象的日志记录工具，支持日志记录到控制台、文件、SQL、SQLite、syslog、邮件和 mcal 目的地。


  前述包如此受欢迎可能并不令人惊讶。毕竟，如果你还没有开始利用 PEAR，那么很可能你已经花费了大量的精力和时间来重复实现其中的一些功能。


  ### 转换数字格式


  为了展示 PEAR 的强大功能，有必要提一个包，它很好地说明为什么在尝试解决任何重要的编程任务之前，你都应该定期查看代码库。虽然有些人可能认为选择这个特定的包有点奇怪，但它的目的是表明，即使对于你认为不太常见以至于不会有人开发出对应包的特别棘手的问题，也可能存在可用的包，因此不妨在代码库中搜索一下现有的解决方案。这个包是
  `Numbers_Roman`，它使阿拉伯数字和罗马数字之间的转换变得轻而易举。


  回到问题，假设你最近被雇来为一位电影制片人创建一个新网站。众所周知，任何严肃的制片人都使用罗马数字来表示年份，产品经理告诉你，网站上出现的任何日期都必须以此格式显示。花点时间思考一下这个需求，因为它并不像听起来那么容易实现。当然，你可以上网查找转换表并硬编码这些值，但你如何确保页面页脚中的网站版权年份始终是最新的呢？


  当你正准备花一整个晚上编写代码时，你停下来思考一下是否有人遇到过类似的问题。“不可能，”你喃喃自语道，但花点时间搜索 PEAR 肯定是值得的。你导航过去，果然，遇到了
  `Numbers_Roman`。


  出于本练习的目的，假设 `Numbers_Roman` 包已经安装在服务器上。现在不必太担心这个，因为你将在下一节中学习如何安装包。那么，你如何确保当前年份显示在页脚中呢？通过使用以下脚本：


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ```php

  <?php


  // 使 Numbers_Roman 包可用


  require_once("Numbers/Roman.php");


  // 获取当前年份


  $year = date("Y");


  // 将年份转换为罗马数字


  $romanyear = Numbers_Roman::toNumeral($year);


  // 输出版权声明


  echo "Copyright &copy; $romanyear";


  ?>

  ```


  对于 2005 年，此脚本将产生：


  ```

  Copyright © MMV

  ```


  这个故事说明了什么道理？即使你认为某个特定问题很冷门，其他程序员很可能也遇到过类似问题，如果你足够幸运，可能已经有一个现成的解决方案可供你使用。


  ### 安装和更新 PEAR


  管理 PEAR 包最简单的方法是通过 PEAR 包管理器。这是一个命令行程序，提供了一个简单高效的界面来执行诸如检查、添加、更新和删除包以及浏览代码库中的包等任务。在本节中，你将学习如何在
  Unix 和 Windows 平台上安装和更新 PEAR 包管理器。由于许多读者在共享托管服务提供商上运行网站，本节还将解释如何在不运行包管理器的情况下利用 PEAR。


  #### 安装 PEAR




  ##### PEAR 安装指南


  ##### 概述


  `PEAR`已成为高效 PHP 编程中如此重要的一个方面，以至于自 PHP 4.3.0 版本起，其稳定发行版已包含在 PHP 发行包中。因此，如果你运行的是该版本或更高版本，请直接跳转到“更新
  PEAR”章节。如果你在 Unix 上运行 PHP 4.2.X 或更早版本，或者使用 Windows 平台，安装过程非常简单，你很快就能学会。


  ##### Unix


  在 Unix 上安装`PEAR`是一个相当简单的过程：从`http://go-pear.org/`网站获取一个脚本，并用 PHP 二进制文件执行它。打开终端并执行以下命令：


  ```

  %>lynx -source http://go-pear.org/ | php

  ```


  请注意，你需要安装`lynx`网页浏览器，这是 Unix 平台上一个相当标准的程序。如果你没有安装它，请搜索特定操作系统发行版对应的程序仓库，它肯定在那里。或者，你也可以直接使用标准
  Web 浏览器（如 Firefox）访问上述 URL，保存获取到的页面，然后用 PHP 二进制文件执行它。


  安装过程开始后，系统会提示你确认一些配置设置，例如 PHP 根目录和可执行文件的位置。你通常可以接受默认答案（方括号内提供的）而无需修改。在这一系列问题中，系统还会询问是否安装六个可选默认包。目前这是一个全选或全不选的方案。因此，如果你希望立即开始使用其中任何一个包，直接同意请求即可。


  ##### Windows


  `PEAR`在 Windows 发行版中默认不安装。要安装它，你需要运行位于 PHP 发行版根目录下的`go-pear.bat`文件。该文件会安装`PEAR`命令、必要的支持文件以及前面提到的六个`PEAR`包。通过切换到
  PHP 根目录并执行`go-pear.bat`来启动安装过程，命令如下：


  ```

  %>go-pear.bat

  ```


  系统会提示你确认一些配置设置，例如 PHP 根目录和可执行文件的位置。你通常可以接受默认答案（方括号内提供的）而无需修改。在这一系列问题中，系统还会询问是否安装六个可选默认包。目前这是一个全选或全不选的方案。因此，如果你希望立即开始使用其中任何一个包，直接同意请求即可。


  安装过程结束后，会创建一个名为`PEAR_ENV.reg`的注册表文件。执行该文件将为许多`PEAR`特定的变量创建环境变量。虽然这不是必须的，但将这些变量添加到系统路径中，可以让你在
  Windows 命令提示符下从任何位置方便地执行`PEAR`包管理器。


  > **注意：** 执行`PEAR_ENV.reg`文件会修改你的系统注册表。尽管这种修改是无害的，但你仍应考虑在执行该脚本之前备份注册表。操作方法是：转到“开始”➤“运行”，执行`regedit`，然后通过“文件”➤“导出”导出注册表。


  ##### PEAR 与托管公司


  如果你的托管公司不允许用户在其服务器上安装新软件，请不要担心，因为它很可能已经为最常用的包提供了至少基本的支持。如果`PEAR`支持不明显，请联系客户支持，询问他们是否考虑让某个特定包在服务器上可用。如果他们同意，那就万事大吉。如果他们拒绝你的请求，也不用担心，因为你仍然可以使用这些包，只需通过其他方式将它们包含在项目中即可。




  '
- "# 安装 PEAR 包\n\n尽管其安装过程需要借助某种稍显手动化的机制，但这将在后续章节“安装 PEAR 包”中加以概述。\n\n#### 更新 PEAR\n\
  \n虽然 PEAR 包管理器已存在多年，但它始终是持续改进的焦点。因此，你需要偶尔检查并更新该系统。\n\n在 Unix 和 Windows 平台上，这一过程都非常简单，只需执行位于`PHP_INSTALLATION_DIR\\\
  PEAR`目录下的`go-pear.php`脚本即可：\n\n```\n%>php go-pear.php\n```\n\n执行此命令本质上会重新启动安装过程，覆盖先前安装的包管理器版本。\n\
  \n### 使用 PEAR 包管理器\n\nPEAR 包管理器允许你浏览和搜索贡献的包、查看最新版本以及下载包。它通过命令行执行，使用以下语法：\n\n```\n\
  %>pear [options] command [command-options] <parameters>\n```\n\n为了更好地熟悉包管理器，请打开命令提示符并执行以下命令：\n\
  \n```\n%>pear\n```\n\n你将看到一系列命令及其使用信息。此输出内容相当长，因此我们在此略过，仅介绍其中最常用的几个命令。请注意，由于本章旨在让你熟悉最常见的\
  \ PEAR 功能，因此本介绍并不详尽。如果你有兴趣了解本章未涉及的其他命令的更多信息，请在包管理器中执行该命令，并像这样提供`help`参数：\n\n```\n\
  %>pear help <command>\n```\n\n> **提示：** 如果 PEAR 因未找到命令而无法执行，则需要将 PEAR 目录添加到系统路径中。\n\
  \n#### 查看已安装的包\n\n查看你机器上已安装的包非常简单；只需执行以下命令：\n\n```\n%>pear list\n```\n\n以下是示例输出：\n\
  \n```\n已安装的包：\n===================\n包名              版本      状态\nArchive_Tar    \
  \   1.3.1    stable\nConsole_Getopt    1.2      stable\nDB                1.7.6\
  \    stable\nHTTP              1.2.2    stable\nMail              1.1.3    stable\n\
  Net_SMTP          1.2.6    stable\nNet_Socket        1.0.1    stable\nPEAR     \
  \         1.3.5    stable\nPhpDocumentor     1.3.0RC3 beta\nXML_Parser        1.0.1\
  \    stable\nXML_RPC           1.2.2    stable\n```\n\n#### 深入了解已安装的包\n\n上述输出表明该服务器上安装了\
  \ 11 个包。然而，这些信息相当基础，实际上只提供了包名和版本。要了解更多关于某个包的信息，请执行`info`命令，并传入包名。例如，要了解`Console_Getopt`包的更多信息，可以执行以下命令：\n\
  \n```\n%>pear info Console_Getopt\n```\n\n以下是该命令的输出示例：\n\n```\n关于 CONSOLE_GETOPT-1.2\n\
  ========================\n提供的类： Console_Getopt\n包名           Console_Getopt\n摘要\
  \           命令行选项解析器\n描述           这是“getopt”的 PHP 实现\n               支持短选项和长选项。\n\
  维护者         Andrei Zmievski <andrei@php.net> (lead)\n               Stig Bakken\
  \ <stig@php.net> (developer)\n版本           1.2\n发布日期       2003-12-11\n发布许可证   \
  \  PHP 许可证\n发布状态       stable\n发布说明       修复以保持与 1.0 的向后兼容性，并确保新用户行为正确\n最后修改日期 \
  \  2005-01-23\n```\n\n如你所见，此输出提供了关于该包的一些非常有用的信息。\n\n#### 安装包\n\n安装 PEAR 包是一个出乎意料地自动化的过程，只需执行`install`命令即可完成。一般语法如下：\n\
  \n```\n%>pear install [options] package\n```\n\n例如，假设你想安装本章前面首次介绍的`Auth`包。命令及其对应输出如下：\n\
  \n```\n%>pear install Auth\npear install auth\n正在下载 Auth-1.2.3.tgz ...\n开始下载 Auth-1.2.3.tgz\
  \ (24,040 字节)\n........完成: 24,040 字节\n可选依赖：\n```\n\n\n\n建议安装 `package 'File_Passwd'\
  \ version >= 0.9.5` 以使用部分功能。\n\n建议安装 `package 'Net_POP3' version >= 1.3` 以使用部分功能。\n\
  \n建议安装 `package 'MDB'` 以使用部分功能。\n\n建议安装 `package 'Auth_RADIUS'` 以使用部分功能。\n\n建议安装\
  \ `package 'File_SMBPasswd'` 以使用部分功能。\n\n`install ok: Auth 1.2.3`\n\n除了提供安装状态信息外，许多软件包还会列出可选依赖项，安装这些依赖项后可以扩展可用功能。例如，安装\
  \ `File_SMBPasswd` 软件包可以增强 `Auth` 的功能，使其能够针对 Samba 服务器进行身份验证。\n\n如果安装成功，您就可以开始使用该软件包了。请继续阅读“使用软件包”一节，了解如何让软件包在您的脚本中可用。如果遇到安装问题，几乎可以肯定是由依赖项失败导致的。\n\
  \n请继续阅读以了解如何解决此问题。\n\n#### 依赖项失败？\n\n在前面的示例中，`File_SMBPasswd` 是一个可选依赖项，意味着使用 `Auth`\
  \ 并不需要安装它，但在安装 `File_SMBPasswd` 之前，`Auth` 的某些功能子集将不可用。然而，安装软件包时也可能涉及必需依赖项，如果开发人员可以通过将现有软件包整合到项目中节省开发时间，就会这样做。例如，由于\
  \ `Auth_HTTP` 需要 `Auth` 软件包才能运行，任何在未先安装此必需依赖项的情况下尝试安装 `Auth_HTTP` 的行为都会失败，并产生以下错误：`downloading\
  \ Auth_HTTP-2.1.4.tgz ...`\n\n`Starting to download Auth_HTTP-2.1.4.tgz (7,835 bytes)`\n\
  \n`.....done: 7,835 bytes`\n\n`requires package 'Auth' >= 1.2.0`\n\n`Auth_HTTP:\
  \ Dependencies failed`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n##\
  \ 第 11 章 ■ P E A R\n\n**267**\n\n#### 自动安装依赖项\n\n当然，如果您需要某个特定的软件包，那么安装所有依赖项几乎是必然的选择。要安装必需依赖项，请向\
  \ `install` 命令传递 `-o`（或 `--onlyreqdeps`）选项：\n\n```\n%>pear install -o Auth_HTTP\n\
  ```\n\n要同时安装可选依赖项和必需依赖项，请传递 `-a`（或 `--alldeps`）选项：\n\n```\n%>pear install -a Auth_HTTP\n\
  ```\n\n#### 从 PEAR 网站安装软件包\n\nPEAR 包管理器默认安装最新的稳定版软件包。但如果您想安装某个先前发布的软件包，或者由于共享服务器上的管理限制而无法使用包管理器，该怎么办？请访问\
  \ PEAR 网站 [`pear.php.net`](http://pear.php.net) 并找到所需的软件包。如果您知道软件包名称，可以在 URL `http://pear.php.net/package/`\
  \ 末尾输入软件包名称以快速访问。\n\n接下来，点击软件包主页顶部的 `Download` 选项卡。这将会生成当前软件包及所有先前发布软件包的链接列表。选择并下载合适的软件包到您的服务器。这些软件包以\
