    \ method does the generic work involved in building the update query, with the\
    \ work specific to individual domain objects handled by child classes. `buildStatement()`\
    \ accepts a table name, an associative array of fields and their values, and a\
    \ similar associative array of conditions. The method combines these to create\
    \ the query. Here’s a concrete `UpdateFactory` class:\n\n```\n// listing 13.42\n\
