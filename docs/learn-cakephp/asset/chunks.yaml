  trans: "\n### 每日站会\n\n在每个冲刺周期中，团队都会召开每日站会。这是阶段 5。会议不超过 15 分钟，内容涉及昨天完成了什么、今天要做什么，以及任何潜在的障碍。\n\
    \n### 冲刺评审\n\n在每个冲刺周期结束时，会展示冲刺过程中创建的可运行产品。这是阶段 6。\n\n### 冲刺回顾\n\n在每个冲刺回顾（即阶段 7）结束时，会召开一次会议，团队在会上讨论冲刺的进展以及下个冲刺的改进想法。\n\
    \n## 总结\n\n在本章中，我介绍了敏捷软件开发的原则和阶段。你了解了 CakePHP 如何支持敏捷开发。即使你遵循其他开发方法，CakePHP 也为你提供了有用的工具。\n\
    \n# 6. 准备测试\n\n![A337704_2_En_6_Figa_HTML.jpg](img/A337704_2_En_6_Figa_HTML.jpg)\n\
    \n比尔觉得自己的训练还不够完整。\n\n## 安装\n\n为了让一切都能正常运行，你需要安装 Web 服务器、MySQL 服务器、PHP、CakePHP（`http://book.cakephp.org`）和\
    \ PHPUnit（`http://phpunit.de`）。我将以 Ubuntu 16.04 为例，逐一讲解这些步骤。其他系统，如 MacOS 或 Windows，甚至其他\
    \ Linux 系统，都有不同的安装方法。\n\n我们将通过终端安装所有软件，为此你需要系统的 root 密码。\n\n### 安装 Web 服务器\n\n\
    Web 服务器，或 HTTP 服务器，是一种处理浏览器请求的软件。它的主要功能是存储、交付和处理网页。最广泛使用的是 Apache（`https://httpd.apache.org/`）。\n\
    \n打开终端并执行以下命令。如果系统尚未安装，该命令将安装最新的 Apache Web 服务器。\n\n```\n$ sudo apt-get install\
    \ apache2\n```\n\n结果会很长，但开头和结尾应该类似如下内容：\n\n```\nReading package lists... Done\n\
    Building dependency tree\nReading state information... Done\nThe following package\
    \ was automatically installed and is no longer required:\n...\nProcessing triggers\
    \ for libc-bin (2.23-0ubuntu3) ...\nProcessing triggers for systemd (229-4ubuntu6)\
    \ ...\nProcessing triggers for ureadahead (0.100.0-19) ...\nProcessing triggers\
    \ for ufw (0.35-0ubuntu2) ...\n```\n\n### 安装 MySQL\n\nMySQL 是 Web 应用程序中最流行的开源关系型数据库系统。如果你需要一个数据库来存储应用程序数据，MySQL\
    \ 是最简单的选择。\n\n打开终端并执行以下命令来安装 MySQL 服务器：\n\n```\n$ sudo apt-get install mysql-server\n\
    ```\n\n结果也很长，所以我省略了中间部分。\n\n```\nReading package lists...\nBuilding dependency\
    \ tree...\nReading state information...\nThe following package was automatically\
    \ installed and is no longer required:\nlibnghttp2-14\n...\nPreparing to unpack\
    \ .../mysql-server_5.7.12-0ubuntu1_all.deb ...\nUnpacking mysql-server (5.7.12-0ubuntu1)\
    \ ...\nSetting up mysql-server (5.7.12-0ubuntu1) ...\n```\n\n### 安装 PHP\n\nPHP\
    \ 是一种主要针对 Web 开发而设计的服务器端脚本语言。它非常流行：超过 80% 的 Web 服务器都安装了 PHP。它易于学习、灵活且健壮，并且可能是\
    \ CakePHP 所使用的底层语言。\n\n最新版本是 PHP 7，它代表了 PHP 5 之后的一次重大飞跃。PHP 7 引入了标量类型声明、返回类型声明、null\
    \ 合并运算符、太空船运算符、匿名类以及许多其他特性。\n\n为了确保一切正常工作，PHP 应与一些模块一起安装。我们将 PHP 作为 Apache 模块运行，并安装\
    \ MySQL、mbstring、intl 和 xml 模块。\n\n```\n$ sudo apt-get install php7.0 libapache2-mod-php7.0\
    \ php7.0-mysql php7.0-mbstring php7.0-intl php7.0-xml\n```\n\n输出结果同样做了删减。\n\n\
    ```\nReading package lists...\nBuilding dependency tree...\nReading state information...\n\
    The following packages were automatically installed and are no longer required:\n\
    libjs-excanvas mercurial mercurial-common php-cli-prompt php-composer-semver\n\
    ...\nCreating config file /etc/php/7.0/mods-available/xsl.ini with new version\n\
    Processing triggers for libapache2-mod-php7.0 (7.0.4-7ubuntu2.1) ...\n```\n\n\
    ### 安装后配置\n\n为了充分利用 CakePHP 的路由功能，我们应该启用 `mod_rewrite`。由于是在开发服务器上，我们将 CakePHP\
    \ 安装到用户目录，因此我们也需要启用并配置它。\n\n首先，让我们启用 `userdir`。\n\n```\n$ sudo a2enmod userdir\n\
    ```\n\n编辑 `/etc/apache2/mods-enabled/userdir.conf` 并粘贴以下代码：\n\n```\n2     UserDir\
    \ public_html\n3     UserDir disabled root\n\n6       AllowOverride FileInfo AuthConfig\
    \ Limit Indexes\n7       Options MultiViews Indexes SymLinksIfOwnerMatch IncludesNoExec\n\
    \n9         Require all granted\n\n12       Require all denied\n```\n\n下一个要编辑的文件是\
    \ `/etc/apache2/mods-available/php7.0.conf`。在 Ubuntu 上，默认禁用了在用户目录中运行 PHP 脚本，因此我们应该启用它。注释掉该文件的最后五行。\n\
    \n```\n21  #\n22  #    \n23  #        php_admin_flag engine Off\n24  #    \n25\
    \  #\n```\n\n让我们启用并配置 `mod_rewrite`。\n\n```\n$ sudo a2enmod rewrite\n```\n\n为了让所有功能加载并正常工作，我们应该重启\
    \ Apache。\n\n```\n$ sudo service apache2 restart\n```\n\n### 安装 Composer\n\nComposer\
    \ 是 PHP 的应用程序级包管理器，它提供了管理 PHP 软件及其所需库依赖关系的标准格式。它是任何 PHP 开发必不可少的工具。由于 Composer\
    \ 是安装 CakePHP 的推荐方式，我们将首先安装它。\n\n打开终端并执行以下命令，通过 `curl` 下载 Composer 并安装到当前目录。\n\
    \n```\n$ curl -s https://getcomposer.org/installer | php\n```\n\n### 安装 CakePHP\n\
    \n作为示例，我们将使用一个博客来熟悉 CakePHP 单元测试。首先，使用 Composer 创建一个新的 CakePHP 项目。\n\n```\n$ cd\
    \ ~/public_html\n$ php composer.phar create-project --prefer-dist cakephp/app\
    \ cakeBlog\n```\n\n这将在当前工作目录下创建一个 `cakeBlog` 文件夹，并下载最新版本的 `cakephp`（撰写本文时为 3.2.8）以及所有必需的包。\n\
    \n安装完成后，你应该为 Web 服务器用户设置 `/tmp` 和 `/logs` 文件夹的写入权限。\n\nComposer 会在项目目录中创建 `composer.json`\
    \ 和 `composer.lock` 文件。这些文件描述了项目的标识数据、依赖关系以及其他与依赖相关的设置。\n\n由于我们通过 Apache 和 PHP\
    \ 启用了用户目录，我将它放在了我的主目录（`/home/rrd`）下的 `public_html` 文件夹中，因此我将通过 `http://localhost/~rrd/cakeBlog/`\
    \ 访问我的应用程序，并在示例中使用此 URL。\n\n如果一切正常，你应该能够通过浏览器导航到你的安装路径。你将看到类似图 6-1 的内容。\n\n![A337704_2_En_6_Fig1_HTML.jpg](img/A337704_2_En_6_Fig1_HTML.jpg)\n\
    \n**图 6-1.** 安装后的博客\n\n暂时不必担心有关数据库连接的错误消息。我很快就会回到这个问题。\n\n### 安装 PHPUnit\n\nPHPUnit\
    \ 是 PHP 单元测试的事实标准。PHPUnit 已集成到 CakePHP 中用于单元测试。得益于 Composer，安装它及其所有必需的包非常简单。我们不需要在生产服务器上安装\
    \ PHPUnit，因此我们将使用 `--dev` 选项。\n\n```\n$ cd ~/public_html/cakeBlog\n$ php composer.phar\
    \ require --dev phpunit/phpunit\n```\n\n如果你使用 `--dev` 选项，Composer 会将此依赖项放入 `composer.json`\
    \ 的 `require-dev` 部分。然后，在生产服务器上，你可以通过使用以下命令跳过这些仅在开发时需要的依赖项的安装：\n\n```\n$ php composer.phar\
    \ --no-dev install\n```\n"
- fmt: '### Install phpMyAdmin


    `phpMyAdmin` is a free and open source tool written in PHP for the administration
    of MySQL with the use of a web browser. It can perform various tasks, such as
    creating, modifying, or deleting databases, tables, fields, or rows; executing
    SQL statements; or managing users and permissions.


    Open your terminal and issue the following command:


    ```

    $ sudo apt-get install phpmyadmin

    ```


    It will start the installation wizard, which will guide you throughout the installation
    process. Choose Apache when you are prompted to choose between Apache and Lighttpd.


    After a successful install, you should be able to access `phpMyAdmin` with your
    browser at `http://localhost/phpmyadmin`.


    ### Check Your Test Setup


    To check if all went well in your app root directory (in my case, `public_html/cakeBlog`),
    run the following command:


    ```

    $ vendor/bin/phpunit

    ```


    You should see something similar to Figure [6-2](#A337704_2_En_6_Chapter.html#Fig2).


    ![A337704_2_En_6_Fig2_HTML.jpg](A337704_2_En_6_Fig2_HTML.jpg)


    Figure 6-2.


    PHPUnit first test


    ![A337704_2_En_6_Figb_HTML.jpg](A337704_2_En_6_Figb_HTML.jpg) You may receive
    error messages such as the following:


    `Warning Error: SplFileInfo::openFile(/home/rrd/public_html/cakeBlog/tmp/cache/persistent/myapp_cake_core_translations_cake_en__u_s):
    failed to open stream: Permission denied in [/home/rrd/public_html/cakeBlog/vendor/cakephp/cakephp/src/Cache/Engine/FileEngine.php,
    line 395]`


    This means that you do not have write access to different files in your cake `tmp`
    directory, located at `cakeBlog/tmp`. For example, on Ubuntu, these files are
    owned by the `www-data` user and its group. You should add yourself to this group,
    or set yourself as the owner of `tmp` recursively. If at any time you get permission
    errors, check the `tmp` folder first, as many new files will have been created
    here.


    Figure [6-2](#A337704_2_En_6_Chapter.html#Fig2) shows that the three tests ran
    successfully with eighteen assertions. These three tests are automatically generated
    for `PagesController`. The corresponding test file is located at `/tests/TestCase/Controller/PagesControllerTest.php`.
    You can take a look if you want. Soon, I will describe what is in that file. For
    now, it is enough to know that green is good. We got a green bar at the end of
    the tests, so we are good.


    ## Preparing


    We should set up a few things, so that we can begin unit testing.


    ### Set Debug Level


    In `/config/app.php`, your debug level is set to `true` by default.


    ```

    ''debug'' => filter_var(env(''DEBUG'', true), FILTER_VALIDATE_BOOLEAN),

    ```


    Leave it like this for now. It is not mandatory for unit testing, but error and
    debug messages can help as much in testing as in coding.


    ### Set Up Test Database


    If your application interacts with a database (and most of the apps will), you''ll
    need a default and a test database. All your database-related tests will use the
    test database.


    ![A337704_2_En_6_Figc_HTML.jpg](A337704_2_En_6_Figc_HTML.jpg) CakePHP will remove
    tables from your database at the end of test runs. So DO NOT use the same database
    for `default` and `test`; otherwise, you will lose data without any warning.


    Find the `Datasources` definition in your `/config/app.php` file and change at
    least the username, password, and database values for your default and test data
    sources. Let''s say my default database is `cake_blog`, its username is `rrd`,
    and the password is Gouranga. My test database is `cake_blog_test`, with the same
    username and password.


    ```

    app.php

    1  ''Datasources'' => [

    2      ''default'' => [

    3          ''className'' => ''Cake\Database\Connection'',

    4          ''driver'' => ''Cake\Database\Driver\Mysql'',

    5          ''persistent'' => false,

    6          ''host'' => ''localhost'',

    7          //''port'' => ''non_standard_port_number'',

    8          ''username'' => ''rrd'',

    9          ''password'' => ''Gouranga'',

    10          ''database'' => ''cake_blog'',

    11          ''encoding'' => ''utf8'',

    12          ''timezone'' => ''UTC'',

    13          ''flags'' => [],

    14          ''cacheMetadata'' => true,

    15          ''log'' => false,

    16          ''quoteIdentifiers'' => false,


    18          //''init'' => [''SET GLOBAL innodb_stats_on_metadata = 0''],


    20          ''url'' => env(''DATABASE_URL'', null),

    21      ],


    23      /**

    24       * The test connection is used during the test suite.

    25       */

    26      ''test'' => [

    27          ''className'' => ''Cake\Database\Connection'',

    28          ''driver'' => ''Cake\Database\Driver\Mysql'',

    29          ''persistent'' => false,

    30          ''host'' => ''localhost'',

    31          //''port'' => ''non_standard_port_number'',

    32          ''username'' => ''rrd'',

    33          ''password'' => ''Gouranga'',

    34          ''database'' => ''cake_blog_test'',

    35          ''encoding'' => ''utf8'',

    36          ''timezone'' => ''UTC'',

    37          ''cacheMetadata'' => true,

    38          ''quoteIdentifiers'' => false,

    39          ''log'' => false,

    40          //''init'' => [''SET GLOBAL innodb_stats_on_metadata = 0''],

    41          ''url'' => env(''DATABASE_TEST_URL'', null),

    42      ],

    43  ],

    ```


    For our blog, we want to handle users, who can write posts and comment on their
    own and other''s posts. Posts can be tagged and categorized. After some planning,
    we end up with the database schema shown on Figure [6-3](#A337704_2_En_6_Chapter.html#Fig3).


    ![A337704_2_En_6_Fig3_HTML.jpg](A337704_2_En_6_Fig3_HTML.jpg)


    Figure 6-3.


    Database schema


    The [default data](http://book.cakephp.org/) source will be used by your application
    and the test data source by the tests. The keys are self-descriptive. They define
    which class and driver is used to access the database, the connection type, host
    and port, the database name, the MySQL user and password, the character encoding,
    and so on.


    Open your browser, navigate to `localhost/phpmyadmin` ([http://phpmyadmin.net](http://phpmyadmin.net)),
    and create both default and test databases. You can do this by selecting database
    from the top tabs and then using the create database form. Alternatively, select
    SQL from the top tabs and copy and paste.


    Use the following SQL statement to create the two databases and their tables:


    ```

    1   SET @OLD_UNIQUE_CHECKS=@@UNIQUE_CHECKS, UNIQUE_CHECKS=0;

    2   SET @OLD_FOREIGN_KEY_CHECKS=@@FOREIGN_KEY_CHECKS,

    3     FOREIGN_KEY_CHECKS=0;

    4   SET @OLD_SQL_MODE=@@SQL_MODE, SQL_MODE=''TRADITIONAL'';


    6   CREATE SCHEMA IF NOT EXISTS `cake_blog`

    7     DEFAULT CHARACTER SET latin1;

    ```


    First, we create the default database, which is `cake_blog`.


    ```

    8   USE `cake_blog`;

    ```'
