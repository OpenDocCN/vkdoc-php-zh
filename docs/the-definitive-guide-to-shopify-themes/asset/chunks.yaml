  trans: '

    # 总结


    在本章中，我们为构建一个新的 Shopify 主题做好了充分准备。本章涵盖了开发人员在开始新主题时可以使用的选项和框架，并解释了如何利用已有的示例产品 CSV
    文件，基于真实数据开始构建。


    你学习了一些关键的 Shopify 概念，如布局、区块和块，并了解了在为商店主题设计导航布局时应遵循的设计原则。


    脚注 1


    关于导入产品数据的说明，请参见[`https://www.shopify.com/partners/blog/93467590-design-your-store-faster-with-product-csvs-and-images`](https://www.shopify.com/partners/blog/93467590-design-your-store-faster-with-product-csvs-and-images)。


    # 5\. 设计产品页面


    一旦我们有了可用的基础主题结构，就可以开始构建商店中的各个页面。本章将从最重要的页面——产品页面——开始讲解。


    ## 产品页面


    对于电子商务商店来说，产品页面通常是最重要的页面。顾客在这里评估商品并做出购买的关键决定。它需要向访客传达大量信息——核心信息包括你的产品是什么、有什么功能、外观如何、价格多少、有哪些配置选项；以及补充信息，如尺码指南、配送详情、产品指南和顾客评价。


    除了清晰地呈现所有这些信息，它还需要提供交互元素，帮助顾客根据喜好配置产品（例如，选择合适的尺码和颜色）、将其加入购物车，并进入结账流程。


    根据我的经验，设计师和店主往往花费过多时间来思考和完善网站的主页，却牺牲了产品页面。这完全可以理解——毕竟，当店主想查看自己的网站时，他们输入域名后看到的就是主页——但人们很容易忽视这样一个事实：许多商店访客并非从主页进入，然后依次线性地浏览到集合页和产品页。图
    5-1 展示了设计师和店主常常如何构想顾客在网站中的浏览路径（左侧），以及现实情况（右侧）。如果你正在为一个现有商店设计主题，可以申请查看已有的分析数据，以便了解商家实际顾客最常见的访问路径。


    ![A437216_1_En_5_Fig1_HTML.jpg](img/A437216_1_En_5_Fig1_HTML.jpg)


    图 5-1：设计师和店主如何构想顾客在网站中的浏览路径（左侧）与现实情况（右侧）


    通过谷歌搜索、付费广告或社交网络到达网站的顾客，更有可能直接进入与其兴趣相符的特定产品页面，而非主页。因此，确保该页面的体验尽可能流畅至关重要。


    出于这个原因，我建议你优先开始产品页面的设计和开发工作，这正是我们在本章示例主题中的做法。


    ## 产品页面信息层级


    要设计一个高效的产品页面，我们首先需要建立信息层级——哪些产品信息对访客最重要？我们应该优先展示什么？哪些可以被视为不需要那么突出的“补充”信息？


    答案会因商店而异，尽管通常有些信息比其他信息更重要。一种“标准”的信息层级，将产品信息按优先级分类，可能如图 5-2 所示。


    ![A437216_1_En_5_Fig2_HTML.jpg](img/A437216_1_En_5_Fig2_HTML.jpg)


    图 5-2：一种“标准”的产品信息层级


    偏离这个标准层级的原因可能包括：我们销售的产品类型、我们对访问商店顾客的了解，甚至是我们预期访客使用的设备。举个例子，比较图 5-3 中 Colonna Coffee
    的烘焙咖啡豆产品页面与 Bespoke Verse 的礼品马克杯产品页面。Colonna 的咖啡豆包装外观相似，无论烘焙程度或风味如何，因此产品图片相对较小，重点放在了咖啡口味的文字描述和可用选项（浓缩咖啡与过滤咖啡，长杯与短杯）上。相反，Bespoke
    Verse 的礼品马克杯根本不需要任何文字描述，因为产品图片本身就说明了一切，并且被非常突出地展示。


    ![A437216_1_En_5_Fig3_HTML.jpg](img/A437216_1_En_5_Fig3_HTML.jpg)


    图 5-3：Colonna Coffee（colonnacoffee.com，左侧）的整颗咖啡豆产品页面与 Bespoke Verse（www.bespokeverse.co.uk，右侧）的礼品马克杯产品页面


    对于这个示例主题，我们将采用图 5-2 中的“标准”信息层级。第一版将使用基于图 5-4 中粗略设计稿的布局来实现这一点。如你所见，我分别为移动端和桌面端环境独立应用了该层级，以确保信息优先级的一致性，同时也要考虑用户在不同设备上浏览页面的体验。


    ![A437216_1_En_5_Fig4_HTML.jpg](img/A437216_1_En_5_Fig4_HTML.jpg)


    图 5-4：基于标准产品信息层级并插入第 4 章开发的布局格式中，为示例主题产品页面制作的粗略设计稿

