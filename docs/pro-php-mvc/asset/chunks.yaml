  trans: "\n对于这类模板解析器，我们需要执行三个步骤才能从文本得到模板。第一步是对源模板进行分词。我们可以通过多种方式实现这一目标，通常使用复杂的正则表达式来完成。我们将逐段读取源模板，并将每个片段添加到一个数组中。\n\
    \n解析器必须执行的第二步是将分词后的片段组织成层级结构，这样我们就可以将模板表示为控制结构和函数的形式。这一步会检查每个片段的内容，并判断它是模板方言中的重要元素，还是仅仅是另一段数据。\n\
    \n最后一步是将层级结构转换为函数的字符串表示形式，该函数可以被转换为实际函数，并传入任意数据调用。这个函数会被存储起来，这样处理多个数据集时就不必多次解析模板了。由于我们将大量处理字符串，因此需要为\
    \ `StringMethods` 类扩展三个新方法，用于清理字符串、删除重复字符以及在大字符串中确定子字符串的位置。\n\n**清单 8-2.** 额外的\
    \ `StringMethods` 方法\n\n```php\nnamespace Framework\n{\n    class StringMethods\n\
    \    {\n        public static function sanitize($string, $mask)\n        {\n \
    \           if (is_array($mask))\n            {\n                $parts = $mask;\n\
    \            }\n            else if (is_string($mask))\n            {\n      \
    \          $parts = str_split($mask);\n            }\n            else\n     \
    \       {\n                return $string;\n            }\n \n            foreach\
    \ ($parts as $part)\n            {\n                $normalized = self::_normalize(\"\
    \\\\{$part}\");\n                $string = preg_replace(\n                   \
    \ \"{$normalized}m\",\n                    \"\\\\{$part}\",\n                \
    \    $string\n                );\n            }\n            return $string;\n\
    \        }\n \n        public static function unique($string)\n        {\n   \
    \         $unique = \"\";\n            $parts = str_split($string);\n        \
    \    foreach ($parts as $part)\n            {\n                if (!strstr($unique,\
    \ $part))\n                {\n                    $unique .= $part;\n        \
    \        }\n            }\n            return $unique;\n        }\n \n       \
    \ public function indexOf($string, $substring, $offset = null)\n        {\n  \
    \          $position = strpos($string, $substring, $offset);\n            if (!is_int($position))\n\
    \            {\n                return -1;\n            }\n            return\
    \ $position;\n        }\n    }\n}\n```\n\n`sanitize()` 方法会遍历字符串中的字符，将其替换为正则表达式友好的字符表示形式。`unique()`\
    \ 方法消除了字符串中所有重复的字符。最后，`indexOf()` 方法返回子字符串在更大字符串中的位置，如果未找到子字符串则返回 `-1`。\n\n我们采用最后一个方法而不是直接使用\
    \ PHP 的原生 `strpos()` 方法，原因是 `strpos()` 可能返回多种值来表示未找到子字符串的情况。而新的 `indexOf()` 方法将始终返回一个整数结果。\n\
    \n**注意**\n\n■ 你可以在 `www.php.net/manual/en/function.strpos.php` 阅读更多关于 `strpos`\
    \ 的信息。注意文档说明：`strpos` 可能返回布尔值 `FALSE`，但也可能返回一个非布尔值（例如 `0` 或 `\"\"`），这些值在计算中会被当作\
    \ `FALSE`。\n\n为了保持模板解析器的灵活性，模板方言的结构需要与解析器分开放在单独的类中。这样我们就可以为同一个解析器更换不同的实现类。我们所有的实现类还应继承自一个基础实现类。现在我们来看清单\
    \ 8-3 中的这个类。\n\n**清单 8-3.** `Template\\Implementation` 类\n\n```php\nnamespace\
