    $platform = "other";

    }

    return array(

    "browser" = > (strtolower($browsers[1]) == "version") ? 

    strtolower($browsers[3]) : strtolower($browsers[1]),

    "version" = > (float) (strtolower($browsers[1]) == "opera") ? 

    strtolower($browsers[4]) : strtolower($browsers[2]),

    "platform" = > strtolower($platform)

