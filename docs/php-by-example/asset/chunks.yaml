  raw: 'You test the created function using the `echo power(3,4)`, `echo power(1.5,2.7)`,
    and `echo power("2","10.1")` commands. It may seem strange, but all three commands
    run without errors, although the type of the arguments passed to the `power()`
    function does not match the declared one. The reason is that the automatic type
    casting comes into play by default. For example, the second argument must be of
    the integer type. If a real number is passed as the second argument, then the
    fractional part is automatically discarded in that real number. If you pass a
    string with a number “hidden” in it as an argument, then such a string is converted
    to the number format, and so on.


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Figq_HTML.gif)A bell icon. **The
    PHP 8 Standard**


    In versions higher than PHP 8, on the `echo power(1.5,2.7)` and `echo power("2","10.1")`
    commands, you get a warning that the implicit conversion from float (float-string)
    to integer is deprecated since it leads to losing precision.


    If unsatisfied with such code execution, you can switch to the hard typing mode.
    To do that, the `declare(strict_types=1)` statement should be added to the program.


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Figh_HTML.jpg)An information icon
    with the letter ''i'' in it.Note


    In the preceding program, the instruction is a comment (the line begins with the
    `#` symbol). If you want to switch to the hard typing mode, remove the `#` symbol
    at the beginning of the corresponding line.


    If so, only the first of the three instructions to test the `power()` function
    operates correctly. Attempting to execute the other two cause an error.


    | Details |

    | --- |

    | In the `power(3,4)` statement, the first argument is an integer despite the
    corresponding argument being declared a real number. In such a case, the integer
    value is automatically extended to the real type. Notably, from the mathematical
    point of view, the set of integers is a subset of the set of real numbers. |


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Figr_HTML.gif)A bell icon. **The
    PHP 8 Standard**


    In PHP 8, the ability to define type unions is introduced. In that case, the types
    are listed with the vertical bar `|` as a separator. For example, the `int|string|double`
    expression means that the corresponding variable (function argument or result)
    can be `int`, `string`, or `double`.


    Also, PHP 8 introduces the `mixed` type, the broadest possible union of types.


    ## The Argument Passing Mechanism


    Take a look at the program in Listing [5-4](#613529_1_En_5_Chapter.xhtml#PC9).


    ```

    Listing 5-4

    Passing Arguments by Value

    ```


    The following is the result of the program execution.


    ```

    The output of the program (from Listing 5-4)

    $A = 100 and $B = 200

    Input: the arguments 100 and 200

    Output: the arguments 200 and 100

    $A = 100 and $B = 200

    ```


    You create the `swap()` function in the program with two arguments. When the function
    is called, it displays the arguments passed to the function. Then, you try to
    change the values of the arguments (the first argument is assigned the value of
    the second argument, and the second argument is assigned the value of the first
    argument) and check their values again.


    Two variables are used, `$A` and `$B`, with the values `100` and `200` respectively.
    First, check the values of these variables. Then, you pass the variables to the
    `swap()` function as arguments (the `swap($A,$B)` command). Next, check the values
    of the variables again.


    What is the program’s output? As you can see, the `$A` and `$B` variables do not
    change their values. Nevertheless, the second check of the arguments in the body
    of the `swap()` function shows that the values of the arguments are switched.
    What does all that mean, and how do you understand the situation? Indeed, everything
    is quite simple. You should consider that when passing arguments to a function,
    the function gets copies of the variable passed to the function as the arguments.
    In other words, when executing the `swap($A,$B)` command, it is not the `$A` and
    `$B` variables that are passed to the `swap()` function but their copies. So,
    the copies of the variables swap values when executing the code of the `swap()`
    function. When the function execution is over, the copies of the arguments are
    removed from memory, and the `$A` and `$B` variables remain with their previous
    values. Such a mechanism of passing arguments to functions is the default one
    called passing arguments *by value*. Besides passing arguments by value, arguments
    can be passed *by reference*. In that case, not copies of the arguments but “originals”
    are passed to the function. If you want to pass arguments by reference, you should
    put the `&` instruction before the argument name in the function declaration.
    A modification of the previous program, but this time with passing the arguments
    to the `swap()` function by reference, is shown in Listing [5-5](#613529_1_En_5_Chapter.xhtml#PC11).


    ```

    Listing 5-5

    Passing Arguments by Reference

    ```


    Now, the result of the program execution is as follows.


    ```

    The output of the program (from Listing 5-5)

    $A = 100 and $B = 200

    Input: the arguments 100 and 200

    Output: the arguments 200 and 100

    $A = 200 and $B = 100

    ```


    You see that the values of the `$A` and `$B` variables have changed after these
    variables were passed to the `swap()` function.


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Figi_HTML.jpg)An information icon
    with the letter ''i''.Note


    The mechanism of the argument’s passing is essential if you change the values
    of the function arguments during the function’s execution. If the argument values
    are not going to be changed, then the default mechanism of passing the arguments
    by value is perfectly acceptable.'
