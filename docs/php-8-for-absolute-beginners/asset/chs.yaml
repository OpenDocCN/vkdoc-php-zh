  \  $images = glob(\"*.jpg\");\n  foreach($images as $image) {\n    $out .= '<img\
  \ src=\"'.$image.'\" alt=\"image\" />';\n  }\n  $out .= \"</div>\";\n  return $out;\n\
  }\n$info = showImages();\n?>\n```\n\n**列表 4-8** `listgallery.php`\n\n函数的前几行将 HTML\
