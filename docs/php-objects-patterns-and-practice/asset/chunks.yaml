    client code can ask a parser to discard a successful match by calling

    the `discard()`

    method. This toggles a property called `$discard` to `true`. Second, only

    terminal parsers (that is, parsers that are not composed of other

    parsers) should push their result to the stack. Composite parsers

    (instances of `CollectionParser`,

    often referred to in the following text as collection parsers) will instead let

    their successful children push their results. I test whether or not a

    parser is terminal using the `term()` method, which

    is overridden to return `false` by collection

    parsers.


    If the concrete parser has been successful in its matching, then I call

    another method: `invokeHandler()`. This

    is passed the `Scanner` object. If a

    `Handler` (that

    is, an object that implements the `Handler` interface)

    has been attached to `Parser` (using the

    `setHandler()`

    method), then its `handleMatch()` method

    is invoked here. I use handlers to make a successful grammar actually do

    something, as you will see shortly.'
