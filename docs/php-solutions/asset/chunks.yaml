    \ Web 开发者的角度来看，文件系统函数的其他实际用途包括：构建显示文件夹内容的下拉菜单，以及创建提示用户下载文件（如图片或 PDF 文档）的脚本。\n\n\
    ### 使用 `scandir()` 检查文件夹\n\n让我们更仔细地看一下你在 PHP 解决方案 6-6 中用过的 `scandir()` 函数。它返回一个包含指定文件夹内文件和子文件夹的数组。只需将文件夹（目录）的路径名作为字符串传递给\
    \ `scandir()`，并将结果存储在一个变量中，如下所示：\n\n```\n$files = scandir('../images');\n```\n\
    \n你可以使用 `print_r()` 显示数组内容来检查结果，如下方截图所示（代码在 `ch07` 文件夹的 `scandir.php` 中）：\n\n\
    ![A978-1-4842-0635-5_7_Figg_HTML.jpg](img/A978-1-4842-0635-5_7_Figg_HTML.jpg)\n\
    \n`scandir()` 返回的数组不仅仅包含文件。前两项是代表当前文件夹和父文件夹的点文件。最后一项是一个名为 `thumbs` 的文件夹。该数组仅包含每个项目的名称。如果你想获取有关文件夹内容的更多信息，最好使用\
    \ `FilesystemIterator` 类。\n"
- fmt: "### Inspecting the Contents of a Folder with `FilesystemIterator`\n\nThe `FilesystemIterator`\
    \ class is part of the Standard PHP Library (SPL). In spite of its name, SPL is\
    \ not an external library or framework; it’s a core part of PHP. Among its features\
    \ is a collection of specialized iterators that create sophisticated loops with\
    \ very little code.\n\nThe `FilesystemIterator` class was added in PHP 5.3. It\
    \ adds new features to the original `DirectoryIterator` class, which lets you\
    \ loop through the contents of a directory or folder.\n\nBecause it’s a class,\
    \ you instantiate a `FilesystemIterator` object with the `new` keyword and pass\
    \ the path of the folder you want to inspect to the constructor, like this:\n\n\
    `$files = new FilesystemIterator('../images');`\n\nUnlike `scandir()`, this doesn’t\
    \ return an array of filenames, so you can’t use `print_r()` to display its contents.\
    \ Instead, it creates an object that gives you access to everything inside the\
    \ folder. To display the filenames, use a `foreach` loop like this (the code is\
    \ in `iterator_01.php` in the `ch07` folder):\n\n```\n$files = new FilesystemIterator('../images');\n\
    foreach ($files as $file) {\n    echo $file . '<br>';\n}\n```\n\nThis produces\
    \ the following result:\n\n![A978-1-4842-0635-5_7_Figh_HTML.jpg](A978-1-4842-0635-5_7_Figh_HTML.jpg)\n\
    \nThe following observations can be made about this output:\n\n- The dot files\
    \ representing the current and parent folders are omitted.\n- The value displayed\
    \ represents the relative path to the file rather than just the filename.\n- Because\
    \ the screenshot was taken on Windows, a backslash is used in the relative path.\n\
    \nIn most circumstances, the backslash is unimportant, because PHP accepts either\
    \ forward- or backslashes in Windows paths. However, if you want to generate URLs\
    \ from the output of `FilesystemIterator`, there’s an option to use Unix-style\
    \ paths. One way to set the option is to pass a constant as the second argument\
    \ to `FilesystemIterator()`, like this (see `iterator_02.php`):\n\n```\n$files\
    \ = new FilesystemIterator('../images', FilesystemIterator::UNIX_PATHS);\n```\n\
    \nAlternatively, you can invoke the `setFlags()` method on the `FilesystemIterator`\
    \ object like this (see `iterator_03.php`):\n\n```\n$files = new FilesystemIterator('../images');\n\
    $files->setFlags(FilesystemIterator::UNIX_PATHS);\n```\n\nBoth produce the output\
    \ shown in the following screenshot.\n\n![A978-1-4842-0635-5_7_Figi_HTML.jpg](A978-1-4842-0635-5_7_Figi_HTML.jpg)\n\
    \nOf course, this won’t make any difference on Mac OS X or Linux, but setting\
    \ this option makes your code more portable.\n\n> **Tip**\n> The constants used\
    \ by SPL classes are all class constants. They’re always prefixed by the class\
    \ name and the scope resolution operator (two colons). Lengthy names like this\
    \ make it really worthwhile to use an editing program with PHP code hints and\
    \ code completion.\n\nAlthough it’s useful to be able to display the relative\
    \ paths of the folder’s contents, the real value of using the `FilesystemIterator`\
    \ class is that each time the loop runs, it gives you access to an `SplFileInfo`\
    \ object. The `SplFileInfo` class has nearly 30 methods that can be used to extract\
    \ useful information about files and folders. Table [7-3](#A978-1-4842-0635-5_7_Chapter.html#Tab3)\
    \ lists a selection of the most useful `SplFileInfo` methods.\n\n**Table 7-3.**\
    \ File information accessible through `SplFileInfo` methods\n\n| Method | Returns\
    \ |\n| --- | --- |\n| `getFilename()` | The name of the file |\n| `getPath()`\
    \ | The current object’s relative path minus the filename, or minus the folder\
    \ name if the current object is a folder |\n| `getPathName()` | The current object’s\
    \ relative path, including the filename or folder name, depending on the current\
    \ type |\n| `getRealPath()` | The current object’s full path, including filename\
    \ if appropriate |\n| `getSize()` | The size of the file or folder in bytes |\n\
    | `isDir()` | True, if the current object is a folder (directory) |\n| `isFile()`\
    \ | True, if the current object is a file |\n| `isReadable()` | True, if the current\
    \ object is readable |\n| `isWritable()` | True, if the current object is writable\
    \ |\n\nTo access the contents of subfolders, use the `RecursiveDirectoryIterator`\
    \ class. This burrows down through each level of the folder structure, but you\
    \ need to use it in combination with the curiously named `RecursiveIteratorIterator`,\
    \ like this (the code is in `iterator_04.php`):\n\n```\n$files = new RecursiveDirectoryIterator('../images');\n\
    $files->setFlags(RecursiveDirectoryIterator::SKIP_DOTS);\n$files = new RecursiveIteratorIterator($files);\n\
    foreach ($files as $file) {\n    echo $file->getRealPath() . '<br>';\n}\n```\n\
    \n> **Note**\n> By default, the `RecursiveDirectoryIterator` includes the dot\
    \ files that represent the current and parent folders. To exclude them, you need\
    \ to pass the class’s `SKIP_DOTS` constant as the second argument to the constructor\
    \ method or use the `setFlags()` method.\n\nAs the following screenshot shows,\
    \ the `RecursiveDirectoryIterator` inspects the contents of all subfolders, revealing\
    \ the contents of the `thumbs` folder, in a single operation:\n\n![A978-1-4842-0635-5_7_Figj_HTML.jpg](A978-1-4842-0635-5_7_Figj_HTML.jpg)\n\
    \nWhat if you want to find only certain types of files? Cue another iterator…\n\
    \n### Restricting File Types with the `RegexIterator`\n\nThe `RegexIterator` acts\
    \ as a wrapper to another iterator, filtering its contents using a regular expression\
    \ (regex) as a search pattern. Let’s say you want to find the text and CSV files\
    \ in the `ch07` folder. The regex used to search for `.txt` and `.csv` filename\
    \ extensions looks like this:\n\n```\n'/\\.(?:txt|csv)$/i'\n```\n\nThis regex\
    \ matches those two filename extensions in a case-insensitive manner. The code\
    \ in `iterator_05.php` looks like this:\n\n```\n$files = new FilesystemIterator('.');\n\
    $files = new RegexIterator($files, '/\\.(?:txt|csv)$/i');\nforeach ($files as\
    \ $file) {\n    echo $file->getFilename() . '<br>';\n}\n```\n\nThe first line\
    \ passes a dot to the `FilesystemIterator` constructor, which tells it to inspect\
    \ the current folder.\n\nThe original `$files` object is then passed as the first\
    \ argument to the `RegexIterator` constructor, with the regex as the second argument,\
    \ and the filtered set is reassigned to `$files`. Inside the `foreach` loop, the\
    \ `getFilename()` method retrieves the file’s name. The result is this:\n\n![A978-1-4842-0635-5_7_Figk_HTML.jpg](A978-1-4842-0635-5_7_Figk_HTML.jpg)\n\
    \nOnly the text and CSV files are now listed. All the PHP files have been ignored.\n\
    \n> **Tip**\n> As you progress through this book, you’ll see I make frequent use\
    \ of regexes. They’re a useful tool to add to your skill set.\n\nI expect that\
    \ by this stage, you might be wondering if this can be put to any practical use.\
    \ Let’s build a drop-down menu of images in a folder."
  raw: '### Inspecting the Contents of a Folder with FilesystemIterator


    The `FilesystemIterator` class is part of the Standard PHP Library (SPL). In spite
    of its name, SPL is not an external library or framework; it’s a core part of
    PHP. Among its features is a collection of specialized iterators that create sophisticated
    loops with very little code.


    The `FilesystemIterator` class was added in PHP 5.3\. It adds new features to
    the original `DirectoryIterator` class, which lets you loop through the contents
    of a directory or folder.


    Because it’s a class, you instantiate a `FilesystemIterator` object with the `new`
    keyword and pass the path of the folder you want to inspect to the constructor,
    like this:


    `$files = new FilesystemIterator(''../images'');`


    Unlike `scandir()`, this doesn’t return an array of filenames, so you can’t use
    `print_r()` to display its contents. Instead, it creates an object that gives
    you access to everything inside the folder. To display the filenames, use a `foreach`
    loop like this (the code is in `iterator_01.php` in the `ch07` folder):


    `$files = new FilesystemIterator(''../images'');`


    `foreach ($files as $file) {`


    `echo $file . ''<br>'';`


    `}`


    This produces the following result:


    ![A978-1-4842-0635-5_7_Figh_HTML.jpg](A978-1-4842-0635-5_7_Figh_HTML.jpg)


    The following observations can be made about this output:


    *   The dot files representing the current and parent folders are omitted.

    *   The value displayed represents the relative path to the file rather than just
    the filename.

    *   Because the screenshot was taken on Windows, a backslash is used in the relative
    path.


    In most circumstances, the backslash is unimportant, because PHP accepts either
    forward- or backslashes in Windows paths. However, if you want to generate URLs
    from the output of `FilesystemIterator`, there’s an option to use Unix-style paths.
    One way to set the option is to pass a constant as the second argument to `FilesystemIterator()`,
    like this (see `iterator_02.php`):


    `$files = new FilesystemIterator(''../images'',` `FilesystemIterator::UNIX_PATHS`
    `);`


    Alternatively, you can invoke the `setFlags()` method on the `FilesystemIterator`
    object like this (`see iterator_03.php`):


    `$files = new FilesystemIterator(''../images'');`


    `$files->setFlags(FilesystemIterator::UNIX_PATHS);`


    Both produce the output shown in the following screenshot.


    ![A978-1-4842-0635-5_7_Figi_HTML.jpg](A978-1-4842-0635-5_7_Figi_HTML.jpg)


    Of course, this won’t make any difference on Mac OS X or Linux, but setting this
    option makes your code more portable.


    Tip


    The constants used by SPL classes are all class constants. They’re always prefixed
    by the class name and the scope resolution operator (two colons). Lengthy names
    like this make it really worthwhile to use an editing program with PHP code hints
    and code completion.


    Although it’s useful to be able to display the relative paths of the folder’s
    contents, the real value of using the `FilesystemIterator` class is that each
    time the loop runs, it gives you access to an `SplFileInfo` object. The `SplFileInfo`
    class has nearly 30 methods that can be used to extract useful information about
    files and folders. Table [7-3](#A978-1-4842-0635-5_7_Chapter.html#Tab3) lists
    a selection of the most useful `SplFileInfo` methods.


    Table 7-3.


    File information accessible through SplFileInfo methods


    | Method | Returns |

    | --- | --- |

    | `getFilename()` | The name of the file |

    | `getPath()` | The current object’s relative path minus the filename, or minus
    the folder name if the current object is a folder |

    | `getPathName()` | The current object’s relative path, including the filename
    or folder name, depending on the current type |

    | `getRealPath()` | The current object’s full path, including filename if appropriate
    |

    | `getSize()` | The size of the file or folder in bytes |

    | `isDir()` | True, if the current object is a folder (directory) |

    | `isFile()` | True, if the current object is a file |

    | `isReadable()` | True, if the current object is readable |

    | `isWritable()` | True, if the current object is writable |


    To access the contents of subfolders, use the `RecursiveDirectoryIterator` class.
    This burrows down through each level of the folder structure, but you need to
    use it in combination with the curiously named `RecursiveIteratorIterator`, like
    this (the code is in `iterator_04.php`):


    `$files = new RecursiveDirectoryIterator(''../images'');`


    `$files->setFlags(RecursiveDirectoryIterator::SKIP_DOTS);`


    `$files = new RecursiveIteratorIterator($files);`


    `foreach ($files as $file) {`


    `echo $file->getRealPath() . ''<br>'';`


    `}`


    Note


    By default, the `RecursiveDirectoryIterator` includes the dot files that represent
    the current and parent folders. To exclude them, you need to pass the class’s
    `SKIP_DOTS` constant as the second argument to the constructor method or use the
    `setFlags()` method


    As the following screenshot shows, the `RecursiveDirectoryIterator` inspects the
    contents of all subfolders, revealing the contents of the `thumbs` folder, in
    a single operation:


    ![A978-1-4842-0635-5_7_Figj_HTML.jpg](A978-1-4842-0635-5_7_Figj_HTML.jpg)


    What if you want to find only certain types of files? Cue another iterator. .
    .


    ### Restricting File Types with the RegexIterator


    The `RegexIterator` acts as a wrapper to another iterator, filtering its contents
    using a regular expression (regex) as a search pattern. Let’s say you want to
    find the text and CSV files in the `ch07` folder. The regex used to search for
    `.txt` and `.csv` filename extensions looks like this:


    `''/\.(?:txt|csv)$/i''`


    This regex matches those two filename extensions in a case-insensitive manner.
    The code in `iterator_05.php` looks like this:


    `$files = new FilesystemIterator(''.'');`


    `$files = new RegexIterator($files, ''/\.(?:txt|csv)$/i'');`


    `foreach ($files as $file) {`


    `echo $file->getFilename() . ''<br>'';`


    `}`


    The first line passes a dot to the `FilesystemIterator` constructor, which tells
    it to inspect the current folder.


    The original `$files` object is then passed as the first argument to the `RegexIterator`
    constructor, with the regex as the second argument, and the filtered set is reassigned
    to `$files`. Inside the `foreach` loop, the `getFilename()` method retrieves the
    file’s name. The result is this:


    ![A978-1-4842-0635-5_7_Figk_HTML.jpg](A978-1-4842-0635-5_7_Figk_HTML.jpg)


    Only the text and CSV files are now listed. All the PHP files have been ignored.


    Tip


    As you progress through this book, you’ll see I make frequent use of regexes.
    They’re a useful tool to add to your skill set.


    I expect that by this stage, you might be wondering if this can be put to any
    practical use. Let’s build a drop-down menu of images in a folder.'
  trans: "\n### 使用 `FilesystemIterator` 检查文件夹内容\n\n`FilesystemIterator` 类是标准 PHP 库（SPL）的组成部分。尽管名称如此，SPL\
    \ 并非外部库或框架，而是 PHP 核心的一部分。其功能之一就是提供一系列专门的迭代器，让你用极少的代码实现复杂的循环。\n\n`FilesystemIterator`\
    \ 类是在 PHP 5.3 中新增的。它为原始的 `DirectoryIterator` 类添加了新功能，该类允许你遍历目录或文件夹的内容。\n\n因为它是一个类，你可以使用\
    \ `new` 关键字实例化一个 `FilesystemIterator` 对象，并将要检查的文件夹路径传递给构造函数，像这样：\n\n`$files =\
    \ new FilesystemIterator('../images');`\n\n与 `scandir()` 不同，这不会返回一个文件名数组，因此你不能使用\
    \ `print_r()` 来显示其内容。相反，它会创建一个对象，让你可以访问文件夹内部的所有内容。要显示文件名，请使用 `foreach` 循环，如下所示（代码位于\
    \ `ch07` 文件夹中的 `iterator_01.php`）：\n\n```\n$files = new FilesystemIterator('../images');\n\
    foreach ($files as $file) {\n    echo $file . '<br>';\n}\n```\n\n这将产生以下结果：\n\n\
    ![A978-1-4842-0635-5_7_Figh_HTML.jpg](img/A978-1-4842-0635-5_7_Figh_HTML.jpg)\n\
    \n关于此输出，可以得出以下观察结果：\n\n-   代表当前文件夹和父文件夹的点文件被省略了。\n-   显示的值代表文件的相对路径，而不仅仅是文件名。\n\
    -   由于截图是在 Windows 上进行的，因此相对路径中使用了反斜杠。\n\n在大多数情况下，反斜杠并不重要，因为 PHP 在 Windows 路径中接受正斜杠或反斜杠。然而，如果你想根据\
    \ `FilesystemIterator` 的输出生成 URL，有一个选项可以使用 Unix 风格的路径。设置该选项的一种方法是将一个常量作为第二个参数传递给\
    \ `FilesystemIterator()`，如下所示（参见 `iterator_02.php`）：\n\n```\n$files = new FilesystemIterator('../images',\
    \ FilesystemIterator::UNIX_PATHS);\n```\n\n或者，你也可以像这样在 `FilesystemIterator` 对象上调用\
    \ `setFlags()` 方法（参见 `iterator_03.php`）：\n\n```\n$files = new FilesystemIterator('../images');\n\
