    **Fetching Blog Posts from the Database**


    Before we can do anything else, we must allow multiple records to be accessed
    at one time in the DatabaseObject_BlogPost class. So far, we have only ever loaded
    one record at a time; however, now we want to load multiple records.


    To do this, we’ll write four separate static methods that we can use in this chapter,
    as well as in other parts of the application (when displaying blog posts in other
    areas of the site):


    • GetPosts(): This method will retrieve an array of posts based on the options
    passed in.


    This includes the ability to set the offset and limit of the returned results
    for multipaged data. It will return an array of DatabaseObject_BlogPost objects.


    • GetPostsCount(): This method will return the total number of posts that match
    the passed-in criteria. Since GetPosts() will be able to return multipaged data
    (in that we can specify the offset and limit), we will need to know the total
    number of posts so the number of pages can be determined.


    • GetMonthlySummary(): Similar to GetPostsCount(), this method is used to return
    the number of posts found for each month in the specified date range. If no date
    range is specified, then all months with posts will be included.


    • _GetBaseQuery(): This private method will be used by each of the previous functions
    to build a query for the specified options. This is purely used to prevent code
    duplication.


    For instance, if you wanted to add a new option to how posts are retrieved in
    GetPosts(), you would want this same functionality in GetPostsCount() so an accurate
    count is returned.


    Creating the _GetBaseQuery() Method


    Since GetPosts(), GetPostsCount(), and GetMonthlySummary() will all rely on _GetBaseQuery(),
    I’ll cover the _GetBaseQuery() method first. We’ll use the Zend_Db_Select class
    that comes with the Zend_Db component of the Zend Framework. This class is used
    to build SQL select queries.


    It provides methods to easily add the various parts that make up such a query.
    For example, the where() method is called to add a where clause. For more information
    on this class, you can read the Zend Framework manual entr[y at http://framework.zend.com/manual/en/](http://framework.zend.com/manual/en)


    zend.db.select.html.


    To instantiate Zend_Db_Select, you can use new Zend_Db_Select($db) (where $db
    is the database connection), or you can call $db->select() to retrieve a new instance.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch08CMP2 11/11/07 12:35 PM Page 267


    C H A P T E R 8 ■ E X T E N D I N G T H E B L O G M A N A G E R


    **267**


    Listing 8-1 shows the complete _GetBaseQuery() function as it fits into the DatabaseObject_


    BlogPost class.


    **Listing 8-1.** *The _GetBaseQuery() Function, Used to Build a SQL Select Statement
    (BlogPost.php)*


    <?php


    class DatabaseObject_BlogPost extends DatabaseObject


    {


    // ... other code


    **private static function _GetBaseQuery($db, $options)**


    **{**


    **// initialize the options**


    **$defaults = array(**


    **''user_id'' => array(),**


    **''from'' => '''',**


    **''to'' => ''''**


    **);**


    **foreach ($defaults as $k => $v) {**


    **$options[$k] = array_key_exists($k, $options) ? $options[$k] : $v;**


    **}**


    **// create a query that selects from the blog_posts table**


    **$select = $db->select();**


    **$select->from(array(''p'' => ''blog_posts''), array());**


    **// filter the records based on the start and finish dates**


    **if (strlen($options[''from'']) > 0) {**


    **$ts = strtotime($options[''from'']);**


    **$select->where(''p.ts_created >= ?'', date(''Y-m-d H:i:s'', $ts));**


    **}**


    **if (strlen($options[''to'']) > 0) {**


    **$ts = strtotime($options[''to'']);**


    **$select->where(''p.ts_created <= ?'', date(''Y-m-d H:i:s'', $ts));**


    **}**


    **// filter results on specified user ids (if any)**


    **if (count($options[''user_id'']) > 0)**


    **$select->where(''p.user_id in (?)'', $options[''user_id'']);**


    **return $select;**


    **}**


    }


    ?>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch08CMP2 11/11/07 12:35 PM Page 268


    **268**


    C H A P T E R 8 ■ E X T E N D I N G T H E B L O G M A N A G E R


    The first thing this method does is define an array of default options. At this
    stage, the only options are the user_id parameter (to specify which user to filter
    returned data on) and the from and to parameters, which define the date range
    of returned posts.


    Next we loop over these defaults to initialize all of these values in the $options
    array, so we know they will exist when we try to access them in the remainder
    of the method.


    The next step is to instantiate Zend_Db_Select by calling $db->select(). Typically
    the first thing you should do with your new instance of Zend_Db_Select is to define
    the tables to select from and to define which fields to select from those tables.
    Each table to select from can be specified using the from() method (you must call
    it once for each table).


    The first argument to from() is the name of the table. You can use either a string
    or an array for this argument. Using an array allows you to give an alias to the
    table name for later use in the query. This array consists of one element: the
    value is the name of the table, while its key is the table alias.


    We will be using the blog_posts table, which we will give an alias of p. Hence,
    the first argument to from() is array(''p'' => ''blog_posts'').


    The second argument to from() is the fields you want to select. You can select
    one field by specifying a single string, or you can select multiple fields by
    using an array (where each element corresponds to a column from the table). In
    our case, we use an empty array since _GetBaseQuery() is used only to build the
    base options for the query. In the other methods that call _GetBaseQuery(), we
    will specify which fields to select.


    Next we check for the presence of the from and to parameters, which are used to
    filter the posts by the date and time stored in the ts_created column of the blog_posts
    table. If the options are empty, we ignore them, but if they have been specified,
    we add where clauses to restrict the dates based on these timestamps.


    The next thing we to do is add where clauses to filter the results on the user_id
    column.


    The Zend_Db class takes care of quoting the values. This is extremely important
    since this helps to prevent malicious users who try to attack your applications
    using SQL injection.


    When calling the where() method, the first argument is the where clause, which
    can include a question mark to indicate a placeholder for a value that should
    be substituted into the clause. The second (optional) argument is the value that
    should be substituted in for the question mark.


    When Zend_Db quotes values, it checks their types so values are included correctly.
    For example, if an array is specified (as in our case), each value is quoted accordingly
    (and then joined by a comma). This allows us to pass in multiple values in the
    $options[''user_id'']


    value, meaning we can filter on multiple users at once if we want to do so.


    ■**Note** Using an array as the value is designed for using in rather than an
    equals sign. So if $options[''user_id''] were defined as array(1, 2, 3, 4), the
    generated SQL would read user_id in (1, 2, 3, 4).


    Finally, we return the Zend_Db_Select object. This allows GetPosts() and GetPostsCount()
    to make further additions to the query if required (which they will, as you will
    now see). Note that the query generated thus far is unusable since we haven’t
    specified any fields to select (as noted earlier in the discussion of the from()
    method).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


