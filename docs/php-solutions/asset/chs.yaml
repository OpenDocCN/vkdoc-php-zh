  \n假设代码正常工作，就可以开始创建脚本的注册部分了。我们先暂停一下，思考主脚本需要做什么。首先，你需要加密密码。然后，在将详细信息写入 CSV 文件之前，必须检查用户名是否唯一。这就带来了一个问题：应该使用`fopen()`的哪种模式。\n\
  \n> **注意**：各种`fopen()`模式在第 7 章中有描述。\n\n理想情况下，你希望内部指针位于文件开头，以便可以遍历现有记录。`r+`模式可以实现这一点，但操作失败，除非文件已经存在。不能使用`w+`，因为它会删除现有内容。也不能使用`x+`，因为如果同名文件已存在，它也会失败。\n\
  \n这样，`a+`和`c+`就成了满足灵活性需求的唯二选项：两者都能在必要时创建文件，并允许你读取和写入。它们的区别在于打开文件时内部指针的位置：`a+`将其置于文件末尾，而`c+`将其置于文件开头。这使得`c+`更便于检查现有记录，但`a+`的优势在于它总是将新内容追加到文件末尾。这避免了意外覆盖现有值的风险。我们将以`a+`模式打开\
  \ CSV 文件。\n\n第一次运行脚本时文件是空的（你可以通过`filesize()`函数返回`0`来判断），因此你可以直接使用`fputcsv()`写入详细信息。这是`fgetcsv()`的对应函数，后者已在第\
  \ 7 章中描述。`fgetcsv()`一次从 CSV 文件中提取一行数据，而`fputcsv()`则创建一条 CSV 记录。它有两个必需参数：文件引用和一组要作为\
  \ CSV 记录插入的值。它还接受可选参数来设置分隔符和封闭字符（参见[`http://php.net/manual/en/function.fputcsv.php`](http://php.net/manual/en/function.fputcsv.php)的在线文档）。\n\
  \n如果`filesize()`返回的不是`0`，你需要重置内部指针并循环遍历记录，以查看用户名是否已注册。如果找到匹配项，则跳出循环并准备错误信息。如果循环结束都没有找到匹配项，则说明这是一个需要添加到文件中的新用户名。既然你已了解了脚本的流程，就可以将其插入到`register_user_csv.php`中。\n\
  \n删除`register_user_text.inc.php`底部的以下代码：\n\n```\nif ($errors) {\n    $result = $errors;\n\
  } else {\n    $result = ['All OK'];\n}\n```\n\n将其替换为以下代码：\n\n```\nif (!$errors)\
  \ {\n    // encrypt password using default encryption\n    $password = password_hash($password,\
  \ PASSWORD_DEFAULT);\n\n    // open the file in append mode\n    $file = fopen($userfile,\
  \ 'a+');\n\n    // if filesize is zero, no names yet registered\n    // so just\
  \ write the username and password to file as CSV\n    if (filesize($userfile) ===\
  \ 0) {\n        fputcsv($file, [$username, $password]);\n        $result = \"$username\
  \ registered.\";\n    } else {\n        // if filesize is greater than zero, check\
  \ username first\n        // move internal pointer to beginning of file\n      \
  \  rewind($file);\n\n        // loop through file one line at a time\n        while\
  \ (($data = fgetcsv($file)) !== false) {\n            if ($data[0] == $username)\
  \ {\n                $result = \"$username taken - choose a different username.\"\
  ;\n                break;\n            }\n        }\n\n        // if $result not\
  \ set, username is OK\n        if (!isset($result)) {\n            // insert new\
  \ CSV record\n            fputcsv($file, [$username, $password]);\n            $result\
  \ = \"$username registered.\";\n        }\n\n        // close the file\n       \
  \ fclose($file);\n    }\n}\n```\n\n注册脚本将结果存储在`$result`或`$errors`数组中。修改`register.php`主体中的代码，以显示结果或错误信息，如下所示：\n\
