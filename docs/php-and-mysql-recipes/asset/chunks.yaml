    Recipe 7-4\. Copy, Rename, and Remove Files


    Problem


    Creating files and reading from then is handled by opening a file in a specified
    location, but what if you need to get rid of a file, copy it, or move it to a
    different location on the file system?


    CHAPTER 7 ■ FILES AND DIRECTORIES


    Solution


    The functions copy() and rename() work on a source and destination file name.
    The first parameter is the source and the second is the destination. Each file
    name is a relative or an absolute path to the two files.


    The copy() function can only be used to copy files. If you want to copy a directory
    with all the files and subdirectories you will have to write a function that reads
    all of the directory and file names and makes a copy of each of them.


    Moving files to a different location is the same as renaming the file. Using the
    same file name but a different path will move the file to the new location. The
    rename() function can be used on regular files, links, and directories.


    Files can be removed or deleted with the unlink() function. This function works
    on both regular files and links but not on directories. To remove a directory
    you must first make sure all files and directories in it are deleted and then
    use the rmdir() function to remove the directory.


    How it Works


    To create a copy of a file to a new file in the same directory you can do something
    like this:


    <?php


    // 7_7.php


    copy(''myfile.log'', ''myfile.log.1'');


    This example uses the same log file we created in example 7_6\. Both file names
    are relative to where the script is executed and in this case both files will
    be in the same directory.


    If you want to copy a file from a different directory to the current directory
    you will simply change the source path to give an absolute or relative path to
    where the source file is located. This could be a file that comes from a set of
    distribution files in a config directory located next to the current directory.


    <?php


    // 7_8.php


    copy(''../config/config.php.tmpl'', ''config.php'');


    Running this script will copy the file config.php.tmpl located in ../config to
    the same directory as the script and it will rename the file to config.php. If
    you make changes to config.php and run the script again it will overwrite the
    file without warning so you are back to a copy of the original file.


    If you didn’t want to copy the file but simply move it from the config directory
    to the current directory simply replace the copy() function with the rename()
    function as shown in example 7_9.php.


    <?php


    // 7_9.php


    rename(''../config/config.php.tmpl'', ''config.php'');


    Both copy() and rename() will print out warnings if the source file is missing
    or if the target file/


    directory is missing the permission to write to the file for the user executing
    the script.


    If you are creating a caching system and want to remove the cached file you can
    do that with the unlink() function . In example 7_10.php we show how to create
    function that checks if a file exists before attempting to remove the file. This
    will prevent warnings in the case that the file didn''t exist.


    CHAPTER 7 ■ FILES AND DIRECTORIES


    <?php


    // 7_10.php


    function DeleteCache($name) {


    if (file_exists($name)) {


    unlink($file);


    }


    }


