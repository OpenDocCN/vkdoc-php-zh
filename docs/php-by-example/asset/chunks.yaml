- fmt: "## The Interpreter Regime\n\nLet’s explore several options, and you can choose\
    \ the one you like the best.\n\n> **Note**\n> \n> There are two regimes of the\
    \ PHP program execution. The first one is the execution of a program using an\
    \ interpreter on a client computer. The second regime means encapsulating PHP\
    \ code in a document with HTML markup. In that case, you must use an external\
    \ or local server. Implementing this is a little more complicated than executing\
    \ the code with an interpreter, but it is more “natural” and related to practical\
    \ PHP usage.\n\nSo, the first thing to do is to create a file with the program,\
    \ as in Listing 1-1, and save that file with the `.php` extension. For example,\
    \ name the file `hello.php`, located in the `D:\\Books\\php\\codes` folder. Next,\
    \ execute the file. At this stage, you need an interpreter, the `php.exe` file\
    \ located in the folder where PHP was installed. Let’s assume that PHP is installed\
    \ in the `C:\\PHP` folder. The recipe for launching the program is simple: in\
    \ the terminal’s command line, you must execute `php.exe`, passing the `hello.php`\
    \ file to it (the file with the program) as a parameter. You can make that simple.\
    \ You need to specify the full path to the `php.exe` file in the command line\
    \ and, separated by a space, the full path to the file with the `hello.php` program.\
    \ The corresponding command would look as follows.\n\n```\nC:\\PHP\\php.exe D:\\\
    Books\\php\\codes\\hello.php\n```\n\nNevertheless, specifying the full path to\
    \ the files is not very convenient. In principle, you can move to the directory\
    \ with the `php.exe` file installed and save the files with the PHP code in the\
    \ same place. So, if PHP is installed in the `C:\\PHP` folder, then to move to\
    \ it, run the following command in the command line.\n\n> **Details**\n> \n> If\
    \ you need to change a directory and a disk, use the `/d` option. For example,\
    \ if you need to move from the `D:\\` drive to the `C:\\` drive, the command looks\
    \ like `cd /d C:\\`.\n\n```\ncd C:\\PHP\n```\n\nIf the `hello.php` file is located\
    \ in the same folder as the `php.exe` file, then you use the following command\
    \ to run the program for execution.\n\n```\nphp hello.php\n```\n\nThe same command\
    \ can be used under the Windows operating system if you add the path to the PHP\
    \ folder to the `Path` environment variable and then move to the folder with the\
    \ program file.\n\n> **Details**\n> \n> Select the **Advanced** system settings\
    \ item in the computer properties to get the `Path` environment variable. In the\
    \ **System Properties** window, select the **Environment Variables** icon. In\
    \ the **Environment Variables** window, select the **Path** position and change\
    \ the contents of the corresponding variable.\n\nThe use of development environments\
    \ simplifies testing and executing codes. Let’s look at the Visual Studio Code\
    \ environment as an example. Figure 1-1 shows the environment’s window with the\
    \ `hello.php` file open.\n\n![A screenshot of the Visual Studio Code development\
    \ environment window with the hello.php program file open. The eight menus at\
    \ the top are File, Edit, Selection, View, Go, Run, Terminal, and Help. The print\
    \ function is used. The output reads \"Hello, PHP!\"](images/613529_1_En_1_Chapter/613529_1_En_1_Fig1_HTML.jpg)\n\
    \n**Figure 1-1** – The Visual Studio Code development environment window with\
    \ the `hello.php` program file open\n\nIn the environment window, open the folder\
    \ with the program file. (You can use the **Open Folder** command from the **File**\
    \ menu.) The files from this folder should appear in the **Explorer** section\
    \ on the left side of the development environment window. In this case, select\
    \ the file with the program. The file’s contents are displayed in the central\
    \ part of the window. You can run the program in the terminal, which is opened\
    \ using the **New Terminal** command from the **Terminal** menu. In the example,\
    \ you enter the following command in the terminal command line.\n\n```\nphp hello.php\n\
    ```\n\nIf you use the Windows operating system, the `Path` environment variable\
    \ must contain the path to the `php.exe` file. If not, you must specify the full\
    \ path to that file, and the command looks as follows.\n\n```\nC:\\PHP\\php.exe\
    \ hello.php\n```\n\nIf everything goes well, then the message displayed by the\
    \ program should appear in the terminal.\n\nHowever, the most comfortable and\
    \ free way to develop is to use the NetBeans development environment (the site\
    \ with the installation files is at [http://netbeans.apache.org](http://netbeans.apache.org)).\
    \ The NetBeans environment window is shown in Figure 1-2.\n\n![A screenshot of\
    \ the NetBeans environment window, Apache NetBeans IDE 19. The thirteen menus\
    \ at the top are File, Edit, View, Navigate, Source, Refactor, Run, Debug, Profile,\
    \ Team, Tools, Window, and Help. The left panel has 3 tabs, including Projects,\
    \ Files, and Services.](images/613529_1_En_1_Chapter/613529_1_En_1_Fig2_HTML.jpg)\n\
    \n**Figure 1-2** – The NetBeans window\n\nTo create a new project in this environment,\
    \ select the **New Project** command from the **File** menu, as shown in Figure\
    \ 1-3.\n\n![A cropped screenshot of the NetBeans environment window, Apache NetBeans\
    \ IDE 19. The thirteen menus at the top are File, Edit, View, Navigate, Source,\
    \ Refactor, Run, Debug, Profile, Team, Tools, Window, and Help. The New Project\
    \ option under the File menu is selected.](images/613529_1_En_1_Chapter/613529_1_En_1_Fig3_HTML.jpg)\n\
    \n**Figure 1-3** – Creating a new project\n\nThe **New Project** window opens,\
    \ as shown in Figure 1-4.\n\n![A screenshot of the New Project window from the\
    \ NetBeans environment. Under the Choose Project option, PHP is selected from\
    \ categories and PHP Application is selected from projects. Description reads\
    \ \"creates a new PHP application in a standard IDE project. Such project can\
    \ be easily run and debugged.\" The Next button is selected.](images/613529_1_En_1_Chapter/613529_1_En_1_Fig4_HTML.jpg)\n\
    \n**Figure 1-4** – The window **New Project** for creating a new project\n\nIn\
    \ the window, you select the type of application (a PHP project must be created).\
    \ The following **New PHP Project** window appears, as shown in Figure 1-5.\n\n\
    ![A screenshot of the New PHP Project window from the NetBeans environment. Under\
    \ the five steps, the Name and Location option is selected. It includes Project\
    \ Name, Sources Folder, PHP Version, and Default Encoding. The Next button is\
    \ selected.](images/613529_1_En_1_Chapter/613529_1_En_1_Fig5_HTML.jpg)\n\n**Figure\
    \ 1-5** – The **New PHP Project** window to set up the project parameters\n\n\
    You use the window to perform the project settings, such as the project name (the\
    \ **Project Name** field), project location (the **Sources Folder** field), and\
    \ some others (it makes sense to leave them as they are by default).\n\nIn the\
    \ next window, a runtime environment is selected. You are interested in running\
    \ from the command line. To do that, select the **Script (run in command line)**\
    \ option in the **Run As** drop-down list, as shown in Figure 1-6.\n\n![A screenshot\
    \ of the New PHP Project window from the NetBeans environment. Under the five\
    \ steps, the Run Configuration option is selected. It includes configuration settings\
    \ to run as script and PHP interpreter. The Next button is selected.](images/613529_1_En_1_Chapter/613529_1_En_1_Fig6_HTML.jpg)\n\
    \n**Figure 1-6** – Selecting a runtime environment\n\nThe **PHP Interpreter**\
    \ field specifies the location of the PHP interpreter (in this case, `C:\\PHP\\\
    php.exe`). The settings in other windows should be left unchanged. Figure 1-7\
    \ shows the window of the newly created project.\n\n![A screenshot of the newly\
    \ created project window in NetBeans](images/613529_1_En_1_Chapter/613529_1_En_1_Fig7_HTML.jpg)"
