- "# 理解 PHP 类与对象\n\n类是**面向对象编程** (OOP）的基础构建模块，这种编程方法旨在提高代码的可复用性和可维护性。PHP 对 OOP 提供了广泛支持，并且新特性也经常以面向对象的方式实现。\n\
  \n**对象**是一种复杂的数据类型，能够存储和操作值。**类**则是定义对象特征的代码，可视为创建对象的蓝图。在 PHP 众多内置类中，特别值得一提的是 `DateTime`\
  \ 和 `DateTimeZone` 类，它们用于处理日期和时区。\n\n创建对象需使用 `new` 关键字和类名，示例如下：\n\n```\n$now = new\
  \ DateTime();\n```\n\n这段代码创建了 `DateTime` 类的一个**实例**，并将其存储在名为 `$now` 的 `DateTime`\
  \ 对象中。该对象不仅知道创建时的日期和时间，还了解 Web 服务器使用的时区。大多数类都拥有属性和方法，它们类似于变量和函数，但专属于某个特定的类实例。例如，可以使用\
  \ `DateTime` 类的方法更改某些值，如月份、年份或时区。`DateTime` 对象还能执行日期计算，而此类计算若用普通函数实现会复杂得多。\n\n访问对象的属性和方法需要使用\
  \ `->` 运算符（一个连字符后跟一个大于号）。要重置 `DateTime` 对象的时区，需将 `DateTimeZone` 对象作为参数传递给 `setTimezone()`\
  \ 方法，示例如下：\n\n```\n$westcoast = new DateTimeZone('America/Los_Angeles');\n$now->setTimezone($westcoast);\n\
  ```\n\n无论 Web 服务器位于何处，上述代码都会将 `$now` 重置为洛杉矶的当前日期和时间，并自动调整夏令时。\n\n访问对象的属性同样使用 `->`\
  \ 运算符：\n\n```\n$someObject->propertyName\n```\n\n> **提示**  \n> 对象、属性和方法的概念可能难以理解。你只需要掌握如何使用\
  \ `new` 关键字实例化对象，以及如何使用 `->` 运算符访问属性和方法即可。\n\n"
- "# 为类与函数可选指定数据类型\n\n随着 PHP 的成熟，许多开发者希望对类与函数使用和返回的数据类型拥有更多控制权。这在社区内引发了激烈争论，因为 PHP\
  \ 的弱类型特性是其成功的主要原因之一——无需担心数据类型使得该语言对初学者更容易学习。最终的折衷方案是引入可选的**类型声明**（在 PHP 5 中称为类型提示）。\n\
  \n要指定某个参数必须为特定类型，请在函数签名中该参数前加上表 [4-8] 中列出的类型之一。\n\n**表 4-8. 类型声明**\n\n| 类型 | 描述\
  \ | 最低 PHP 版本 |\n| --- | --- | --- |\n| 类/接口名称 | 必须是给定类或接口的实例 | 5.0 |\n| `self`\
  \ | 必须是当前类的实例 | 5.0 |\n| `array` | 必须是数组 | 5.1 |\n| `callable` | 必须是有效的可调用函数 | 5.4\
  \ |\n| `bool` | 必须是布尔值 | 7.0 |\n| `float` | 必须是浮点数 | 7.0 |\n| `int` | 必须是整数 | 7.0\
  \ |\n| `string` | 必须是字符串 | 7.0 |\n| `iterable` | 必须是数组或实现 `Traversable` 接口 | 7.1\
  \ |\n| `object` | 必须是对象 | 7.2 |\n\n> **注意**  \n> **接口**定义了类必须实现哪些方法。\n\n对于类、接口、数组、可调用函数和对象的类型声明，如果传入不同的类型会抛出错误，从而强制使用正确的数据类型。然而，`bool`、`float`、`int`\
  \ 和 `string` 类型声明的行为有所不同。它们不会抛出错误，而是自动将参数转换为指定的数据类型。`functions_09.php` 中的代码通过添加类型声明，改编了本章前面的“从函数返回值”中的\
  \ `doubleIt()` 函数，如下所示：\n\n```\nfunction doubleIt(int $number) {\nreturn $number\
  \ *= 2;\n}\n```\n\n以下截屏展示了向函数传递 4.9 时会发生什么：  \n![../images/332054_4_En_4_Chapter/332054_4_En_4_Fign_HTML.jpg](img/332054_4_En_4_Fign_HTML.jpg)\n\
  \n数字在处理前被转换为整数，甚至不会四舍五入到最接近的整数，小数部分直接被截断。\n\n> **提示**  \n> 你可以通过在脚本中启用严格模式来改变 `bool`、`float`、`int`\
  \ 和 `string` 类型声明的行为。然而，严格模式的实现可能会令人困惑。我个人建议仅对类、接口和数组使用类型声明。你可以在 PHP 文档 [`www.php.net/manual/en/functions.arguments.php`](http://www.php.net/manual/en/functions.arguments.php)\
  \ 中了解如何启用严格模式。\n\nPHP 7 还引入了返回类型声明，用于指定函数返回的数据类型。可用类型与表 [4-8] 中列出的相同，并在 PHP 7.1\
  \ 中增加了 `void`。返回类型声明由冒号和类型组成，位于函数签名的右括号和左花括号之间。`functions_10.php` 中的示例改编了 `doubleIt()`\
  \ 函数，如下所示：\n\n```\nfunction doubleIt(int $number) : float {\nreturn $number *= 2;\n\
  }\n```\n\n我特意选择这个不合逻辑的例子来演示：将 `float` 设为返回类型会静默地将函数返回的值转换为浮点数。但该声明不会覆盖参数的类型声明。向函数传递\
  \ 4.9 作为参数仍会返回 8；但 `var_dump()` 显示 PHP 将其视为浮点数，如下截屏所示：  \n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figo_HTML.jpg](img/332054_4_En_4_Figo_HTML.jpg)\n\
  \n将 `bool`、`int` 和 `string` 用作返回类型声明也会执行静默数据类型转换，除非启用严格模式。其他返回类型声明在函数返回错误的数据类型时会抛出错误。\n\
  \n> **注意**  \n> 为保持代码的清晰性，本书中的代码仅在确实有益的情况下使用类型声明，例如检查传递给函数的数据类型是否正确。\n\n"
- "# 处理错误与异常\n\nPHP 7 改变了报告大多数错误的方式，现在通过**抛出异常**（即生成一个包含错误详情和发生位置的特殊类型对象）。如果你使用过 PHP\
  \ 5，可能唯一注意到的区别是错误消息的措辞或错误类型有所不同。然而，由内部错误（如解析错误或缺少包含文件）抛出的异常与由脚本抛出的异常之间存在细微差别。\n\n\
  \n  \n当 PHP 由于内部错误而抛出异常时，它会立即停止脚本运行。如果你已开启错误信息显示（建议在测试环境中这样做），PHP 会显示一条消息说明发生了什么。有时这些消息难以解读，因此**捕获异常**通常是个好主意。你可以通过将主脚本包装在\
  \ `try` 块中，并将错误处理代码放在 `catch` 块中来实现，如下所示：  \n\n```\ntry {\n    // main script goes\
  \ here\n} catch (Throwable $t) {\n    echo $t->getMessage();\n}\n```\n\n提示  \n`catch`\
  \ 块中的 `Throwable` 类型声明是 PHP 7 新增的。它涵盖了内部错误和脚本抛出的异常（用户异常）。你可能从 PHP 5 中了解的 `Exception`\
  \ 类型声明仅涵盖用户异常。  \n\n这产生了一条错误消息，通常比某些错误生成的长篇消息更容易理解。  \n\n你可以使用 `throw` 关键字抛出自定义异常，如下所示：\
  \  \n\n```\nif (error occurs) {\n    throw new Exception('Houston, we have a problem.');\n\
  }\n```\n\n括号内的字符串用作错误消息，可以在 `catch` 块中被捕获。  \n\n警告  \n错误消息在开发过程中至关重要。它们帮助你解决问题。但是，当你将脚本部署到实时网站时，它们不仅看起来丑陋；还可能泄露对恶意攻击者有用的信息。在上线时，将\
  \ `catch` 块中的错误消息显示替换为中性消息。或者，使用 `catch` 块将访问者重定向到错误页面。  \n\n### 动态创建新变量  \n\nPHP\
  \ 支持创建所谓的**变量变量**。虽然这看起来像是打字错误，但并非如此。简单来说，变量变量创建一个新变量，该变量从现有变量派生其名称。以下示例展示了其工作原理（参见\
  \ `variable_variables.php`）。  \n\n```\n$location = 'city';\n```\n\n上述语句将字符串“city”赋给一个名为\
  \ `$location` 的变量。你可以通过使用*两个*美元符号来创建一个变量变量，如下所示：  \n\n```\n$$location = 'London';\n\
  ```\n\n变量变量将原始变量的值作为其名称。换句话说，`$$location` 等同于 `$city`。  \n\n```\necho $city; //\
  \ London\n```\n\n你将在第 6 章的邮件处理脚本中看到此技术的实际应用示例。  \n\n提示  \n为了表明双 `$` 是有意为之，请将用于创建变量变量的变量用花括号括起来，如下所示：`${$location}`。花括号是可选的，但能使代码更易读。\
  \  \n\n### 现在进入解决方案部分  \n\n前四章专注于理论——这很重要，但不太有趣。本书的其余部分将进入实际问题：让 PHP 解决现实世界的问题。那么，闲话少叙，让我们开始\
  \ PHP 7 解决方案。  \n\n## 5. 使用包含文件减轻工作量  \n\n将一个文件的内容包含到另一个文件中的能力是 PHP 最强大的特性之一。它也是最容易实现的特性之一。这意味着代码可以被合并到多个页面中——例如，常见元素，如页眉、页脚或导航菜单。PHP\
  \ 在服务器端将内容合并到每个页面中，允许你通过编辑和上传单个文件来更新菜单或其他常见元素——这是一个巨大的省时工具。当你完成本章的学习时，你将了解 PHP 包含的工作方式、PHP\
  \ 在哪里查找包含文件，以及如何在找不到包含文件时防止错误消息。你还将学习用 PHP 做一些很酷的技巧，例如创建随机图像生成器。  \n\n本章涵盖以下主题：\
  \  \n\n- 理解不同的包含命令  \n- 告诉 PHP 在哪里找到你的包含文件  \n- 对常见页面元素使用 PHP 包含  \n- 在包含文件中保护敏感信息\
  \  \n- 自动生成“你在这里”菜单链接  \n- 根据文件名生成页面标题  \n- 自动更新版权声明  \n- 显示带标题的随机图像  \n- 处理包含文件的错误\
  \  \n- 更改 Web 服务器的 `include_path`  \n\n### 从外部文件包含代码  \n\n从其他文件包含代码的能力是 PHP 的核心部分。只需要使用\
  \ PHP 的包含命令之一，并告诉服务器在哪里找到该文件。  \n\n#### 介绍 PHP 包含命令  \n\nPHP 有四个命令可用于从外部文件包含代码，分别是：\
  \  \n\n- `include`  \n- `include_once`  \n- `require`  \n- `require_once`  \n\n\
  它们都执行基本相同的事情，那为什么要有四个呢？根本区别在于，即使找不到外部文件，`include` 也会尝试继续处理你的脚本，而 `require` 则具有强制性的含义：如果文件缺失，PHP\
  \ 引擎会停止处理并抛出致命错误。实际上，这意味着如果你即使没有外部文件的内容，页面仍能保持可用，则应使用 `include`。如果页面依赖于外部文件，则应使用\
  \ `require`。  \n\n另外两个命令 `include_once` 和 `require_once` 阻止同一文件在一个页面中被多次包含。尝试在脚本中多次定义一个函数或类会触发致命错误。因此，`include_once`\
  \ 或 `require_once` 确保函数和类只定义一次，即使脚本尝试多次包含外部文件（例如当这些命令位于条件语句中时）也是如此。  \n\n提示  \n\
  如果有疑问，始终使用 `require`，但对于定义函数和类的文件，应使用 `require_once`。依赖即使找不到外部文件脚本仍能正常工作，可能会使你面临安全风险。\
  \  \n\n### PHP 查找包含文件的位置  \n\n要包含一个外部文件，请使用四个包含命令之一，后跟引号（单引号或双引号均可）中的文件路径。文件路径可以是绝对路径，也可以是相对于当前文档的路径。例如，以下任何一项都可以工作（只要目标文件存在）：\
  \  \n\n```\nrequire 'includes/menu.php';\nrequire 'C:/xampp/htdocs/phpsols-4e/includes/menu.php';\n\
  require '/Applications/MAMP/htdocs/phpsols-4e/includes/menu.php';\n```\n\n注意  \n\
  PHP 接受包含命令中 Windows 文件路径的正斜杠。  \n\n你也可以选择性地在包含命令中使用括号，因此以下方式也可以工作：  \n\n```\nrequire('includes/menu.php');\n\
  require('C:/xampp/htdocs/phpsols-4e/includes/menu.php');\nrequire('/Applications/MAMP/htdocs/phpsols-4e/includes/menu.php');\n\
  ```\n\n使用相对文件路径时，建议使用 `./` 来表示路径从当前文件夹开始。因此，将第一个示例重写如下会更高效：  \n\n```\nrequire './includes/menu.php';\
  \ // path begins in current folder\n```\n\n*不*起作用的是使用相对于站点根目录的文件路径，如下所示：  \n\n```\n\
  require '/includes/menu.php'; // THIS WILL NOT WORK\n```\n\n这不起作用，因为 PHP 包含命令将前导斜杠解释为硬盘的根目录。换句话说，PHP\
  \ 将其视为绝对路径，而不是相对于站点根目录的路径。PHP 还会在 PHP 配置中定义的 `include_path` 中查找。我将在本章后面回到这个主题。在此之前，让我们将\
  \ PHP 包含投入实际使用。  \n\n#### PHP 解决方案 5-1：将菜单和页脚移至包含文件  \n\n图 5-1 展示了页面的四个元素如何通过包含文件中的一点\
  \ PHP 魔法而受益。  \n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig1_HTML.jpg](img/332054_4_En_5_Fig1_HTML.jpg)\
  \  \n\n图 5-1. 识别静态网页中可以使用 PHP 改进的元素  \n\n\n\n"
