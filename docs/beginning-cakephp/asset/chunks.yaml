    When you refresh the Posts controller screen, you’ll notice that Cake’s styles
    have been implemented without the scaffolding’s default titles and such. With
    these style changes, the scaffolding is still generating the individual CRUD operation
    views but now without Cake’s built-in layouts.


    **Creating Individual Views**


    What do you do if you want to manipulate the views directly? For example, say
    you wanted to get rid of the title at the top that reads “Posts” and replace it
    with “Blog Posts.” This is where individual views come in.


    Yes, the scaffolding is a nice feature that makes testing code quick and painless,
    especially if all you want to do is play around with the database to make sure
    it’s working right. But it can’t possibly read your mind, and it can create only
    some generic views. Adding or subtract-ing from the application output will require
    you to manually build such output. No worries—


    this, too, is made much easier through the use of the framework.


    **Adding Actions to the Controller**


    To break out of the scaffold, you can delete the $scaffold attribute in the controller,
    or you can intercept the scaffold by adding your own actions instead. Scaffolded
    actions are specifically named index(), add(), edit(), view(), and delete(). Inserting
    an action into the controller bearing any of these names will replace the scaffold
    for that one action. So, leave the $scaffold attribute for all CRUD operations
    you don’t want to code, and generate actions for those you do.


    The first, and simplest, action to add is the Index action. All this operation
    will need to do is fetch all the posts in the database and make them available
    in the view. The view will then display all the posts as a list. Insert Listing
    5-3 into the Posts controller after the $scaffold attribute.


    **Listing 5-3.** *The Index Action in the Posts Controller*


    function index() {


    $this->set(''posts'',$this->Post->find(''all''));


    }


    Entering the action into the controller is only half the process. Should you launch
    the Posts controller, it would display an error message because the controller
    would send for the view file and there is no Index action view available yet.
    The next step is to create the corresponding action view by following Cake’s conventions.
    The file will need to be placed in the app/views/posts directory and be named
    after the action. Create the necessary posts folder, and place the index.ctp file
    in it. Then paste the view code from Listing 5-4 into this file.


