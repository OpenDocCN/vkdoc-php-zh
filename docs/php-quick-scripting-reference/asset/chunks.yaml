    \n```\n$x = 1;\n$y = 2;\n\n$callback = function($z) use ($x, $y)\n{\n  return\
    \ $x + $y + $z;\n};\n\necho $callback(3); // \"6\"\n```\n\n## 函数重载\n\n与许多其他语言不同，PHP\
