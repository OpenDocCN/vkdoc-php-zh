    \n`interpret()` 方法会检查 `$val` 属性是否具有非空值。如果 `$val` 属性有值，则将其设置到 `InterpreterContext`\
    \ 中。然后我将 `$val` 属性设置为 `null`。这是为了防止在另一个同名的 `VariableExpression` 实例更改了 `InterpreterContext`\
    \ 对象中的值后，`interpret()` 被再次调用。这是一个相当有限的变量，只接受字符串值。如果你打算扩展你的语言，你应该考虑让它与其他 `Expression`\
    \ 对象一起工作，以便能够包含测试和操作的结果。不过，就目前而言，`VariableExpression` 可以完成我需要的工作。请注意，我重写了 `getKey()`\
    \ 方法，以便变量值链接到变量名，而不是一个任意的静态 ID。\n\n语言中的运算符表达式都与另外两个 `Expression` 对象一起工作以完成其任务。因此，让它们扩展一个公共的超类是合理的。下面是\
    \ `OperatorExpression` 类：\n\n```php\n// 列表 11.07\nabstract class OperatorExpression\
    \ extends Expression\n{\nprotected $l_op;\nprotected $r_op;\npublic function __construct(Expression\
    \ $l_op, Expression $r_op)\n{\n$this->l_op = $l_op;\n$this->r_op = $r_op;\n}\n\
    public function interpret(InterpreterContext $context)\n{\n$this->l_op->interpret($context);\n\
    $this->r_op->interpret($context);\n$result_l = $context->lookup($this->l_op);\n\
    $result_r = $context->lookup($this->r_op);\n$this->doInterpret($context, $result_l,\
    \ $result_r);\n}\nabstract protected function doInterpret(\nInterpreterContext\
    \ $context,\n$result_l,\n$result_r\n);\n}\n```\n\n`OperatorExpression` 是一个抽象类。它实现了\
    \ `interpret()`，但也定义了抽象的 `doInterpret()` 方法。构造函数需要两个 `Expression` 对象 `$l_op` 和\
    \ `$r_op`，并将它们存储在属性中。\n\n`interpret()` 方法首先在其两个操作数属性上调用 `interpret()`（如果你读过前一章，可能会注意到我在这里创建了一个组合模式的实例）。操作数执行完毕后，`interpret()`\
    \ 仍需要获取由此产生的值。它通过对每个属性调用 `InterpreterContext::lookup()` 来实现这一点。然后它调用 `doInterpret()`，将如何处理这些操作结果的决定权交给子类。\n\
    \n> **注**  \n> `doInterpret()` 是模板方法模式的一个实例。在这种模式中，父类既定义又调用一个抽象方法，将具体实现留给子类去提供。这可以简化具体类的开发，因为共享功能由超类处理，而子类则可以专注于清晰、明确的目标。\n\
    \n下面是 `EqualsExpression` 类，它测试两个 `Expression` 对象的相等性：\n\n```php\n// 列表 11.08\n\
    class EqualsExpression extends OperatorExpression\n{\nprotected function doInterpret(\n\
    InterpreterContext $context,\n$result_l,\n$result_r\n) {\n$context->replace($this,\
    \ $result_l == $result_r);\n}\n}\n```\n\n`EqualsExpression` 只实现了 `doInterpret()`\
    \ 方法，它测试由 `interpret()` 方法传递给它的操作数结果的相等性，并将结果放入 `InterpreterContext` 对象中。\n\n\
    为了结束 `Expression` 类的介绍，这里给出 `BooleanOrExpression` 和 `BooleanAndExpression`：\n\n\
    ```php\n// 列表 11.09\nclass BooleanOrExpression extends OperatorExpression\n{\n\
    protected function doInterpret(\nInterpreterContext $context,\n$result_l,\n$result_r\n\
    ) {\n$context->replace($this, $result_l || $result_r);\n}\n}\n// 列表 11.10\nclass\
    \ BooleanAndExpression extends OperatorExpression\n{\nprotected function doInterpret(\n\
    InterpreterContext $context,\n$result_l,\n$result_r\n) {\n$context->replace($this,\
    \ $result_l && $result_r);\n}\n}\n```\n"
- fmt: "`BooleanOrExpression`类并不是测试相等性，而是应用逻辑`or`运算，并通过`InterpreterContext::replace()`方法存储结果。`BooleanAndExpression`类则应用逻辑`and`运算。\n\
    \n现在我已有足够的代码来执行之前引用的迷你语言片段。再次展示如下：\n\n```\n$input equals \"4\" or $input equals\
    \ \"four\"\n```\n\n以下是我使用`Expression`类构建此语句的方式：\n\n```\n// listing 11.11\n$context\
    \ = new InterpreterContext();\n$input = new VariableExpression('input');\n$statement\
    \ = new BooleanOrExpression(\nnew EqualsExpression($input, new LiteralExpression('four')),\n\
    new EqualsExpression($input, new LiteralExpression('4'))\n);\n```\n\n我实例化了一个名为`\"\
    input\"`的变量，但暂未为其提供值。随后创建了一个`BooleanOrExpression`对象，它将比较两个`EqualsExpression`对象的结果。第一个`EqualsExpression`对象将存储在`$input`中的`VariableExpression`对象与包含字符串`\"\
    four\"`的`LiteralExpression`进行比较；第二个`EqualsExpression`将`$input`与包含字符串`\"4\"`的`LiteralExpression`对象进行比较。\n\
    \n现在语句已准备就绪，我可以为输入变量提供一个值并运行代码：\n\n```\n// listing 11.12\nforeach ([\"four\",\
    \ \"4\", \"52\"] as $val) {\n    $input->setValue($val);\n    print \"$val:\\\
    n\";\n    $statement->interpret($context);\n    if ($context->lookup($statement))\
    \ {\n        print \"top marks\\n\\n\";\n    } else {\n        print \"dunce hat\
    \ on\\n\\n\";\n    }\n}\n```\n\n实际上，我使用三个不同的值运行了三次代码。第一次循环，我将临时变量`$val`设置为`\"\
    four\"`，并通过其`setValue()`方法将其赋值给输入的`VariableExpression`对象。然后我在最顶层的`Expression`对象（即包含语句中所有其他表达式引用的`BooleanOrExpression`对象）上调用`interpret()`方法。以下是此调用的内部步骤分解：\n\
    \n*   `$statement`在其`$l_op`属性（第一个`EqualsExpression`对象）上调用`interpret()`。\n*   第一个`EqualsExpression`对象在其`$l_op`属性（当前设置为`\"\
    four\"`的输入`VariableExpression`对象的引用）上调用`interpret()`。\n*   输入`VariableExpression`对象通过调用`InterpreterContext::replace()`将其当前值写入提供的`InterpreterContext`对象。\n\
    *   第一个`EqualsExpression`对象在其`$r_op`属性（一个负责值为`\"four\"`的`LiteralExpression`对象）上调用`interpret()`。\n\
    *   `LiteralExpression`对象向`InterpreterContext`注册其键和值。\n*   第一个`EqualsExpression`对象从`InterpreterContext`对象中检索`$l_op`（`\"\
    four\"`）和`$r_op`（`\"four\"`）的值。\n*   第一个`EqualsExpression`对象比较这两个值是否相等，然后将结果（`true`）及其键注册到`InterpreterContext`对象。\n\
    *   返回树顶，`$statement`对象（`BooleanOrExpression`）在其`$r_op`属性上调用`interpret()`。此属性以与`$l_op`属性相同的方式解析为一个值（本例中为`false`）。\n\
    *   `$statement`对象从`InterpreterContext`对象检索其每个操作数的值，并使用`||`进行比较。由于它比较的是`true`和`false`，因此结果为`true`。此最终结果存储在`InterpreterContext`对象中。\n\
    \n这仅仅是循环第一次迭代的全部过程。最终输出如下：\n\n```\nfour:\ntop marks\n4:\ntop marks\n52:\ndunce\
    \ hat on\n```\n\n您可能需要反复阅读本节内容几次，直到理解其过程。对象树与类树之间的经典问题可能会让您感到困惑。`Expression`类按继承层次结构排列，而`Expression`对象则在运行时组合成一个树。在回读代码时，请牢记这一区别。\n\
    \n图[11-2](#A314621_5_En_11_Chapter.html#Fig2)展示了该示例的完整类图。\n\n![A314621_5_En_11_Fig2_HTML.gif](A314621_5_En_11_Fig2_HTML.gif)\n\
    \n图 11-2.\n\n部署的解释器模式\n\n### 解释器模式问题\n\n一旦你为解释器模式实现设置了核心类，扩展就变得容易了。代价是最终可能会创建大量的类。因此，解释器模式最适合应用于规模相对较小的语言。如果你需要一个完整的编程语言，最好寻找第三方工具来使用。\n\
    \n由于解释器类经常执行非常相似的任务，值得密切关注你创建的类，以便提取重复的部分。\n\n许多初次接触解释器模式的人，在最初的兴奋之后，会失望地发现它并不处理解析问题。这意味着你无法立即为用户提供一个友好易用的语言。第[24](#A314621_5_En_24_Chapter.html)章包含一些粗略的代码，用于说明解析迷你语言的一种策略。\n\
    \n## 策略模式\n\n类经常试图做太多事情。这可以理解：你创建一个执行几个相关操作的类；在编码过程中，其中一些操作需要根据情况而变化。同时，你的类需要被拆分成子类。在你意识到之前，你的设计就被竞争力量拉扯得四分五裂了。\n\
    \n### 问题\n\n由于我最近构建了一个标记语言，我继续使用测验示例。测验需要问题，所以你构建了一个`Question`类，并给它一个`mark()`方法。一切顺利，直到你需要支持不同的评分机制。\n\
    \n假设您被要求支持简单的 MarkLogic 语言，通过直接匹配和正则`Expression`进行评分。你的第一反应可能是为这些差异创建子类，如图[11-3](#A314621_5_En_11_Chapter.html#Fig3)所示。\n\
    \n![A314621_5_En_11_Fig3_HTML.gif](A314621_5_En_11_Fig3_HTML.gif)\n\n图 11-3.\n\
    \n根据评分策略定义子类\n\n只要评分是类中唯一变化的方面，这种方法就会很有效。但想象一下，你被要求支持不同类型的问题：基于文本的问题和支持富媒体的问题。当涉及到在一个继承树中整合这些力量时，这就给你带来了问题，如图[11-4](#A314621_5_En_11_Chapter.html#Fig4)所示。\n\
    \n![A314621_5_En_11_Fig4_HTML.gif](A314621_5_En_11_Fig4_HTML.gif)\n\n图 11-4.\n\
    \n根据两种力量定义子类\n\n不仅继承层次结构中的类数量激增，还必然引入了重复。你的评分逻辑在继承层次结构的每个分支上都被重复了。\n\n每当你发现自己在继承树（无论是通过子类化还是重复的条件语句）的兄弟节点之间重复一个算法时，考虑将这些行为抽象成它们自己的类型。"
  raw: 'Instead of testing for equality, the `BooleanOrExpression` class applies a
    logical `or` operation and stores the result of that via the `InterpreterContext::replace()`
    method. `BooleanAndExpression`, of course, applies a logical `and` operation.


    I now have enough code to execute the mini-language fragment I quoted earlier.
    Here it is again:


    ```

    $input equals "4" or $input equals "four"

    ```


    Here’s how I can build this statement up with my `Expression` classes:


    ```

    // listing 11.11

    $context = new InterpreterContext();

    $input = new VariableExpression(''input'');

    $statement = new BooleanOrExpression(

    new EqualsExpression($input, new LiteralExpression(''four'')),

    new EqualsExpression($input, new LiteralExpression(''4''))

    );

    ```


    I instantiate a variable called `"input"` but hold off on providing a value for
    it. I then create a `BooleanOrExpression` object that will compare the results
    from two `EqualsExpression` objects . The first of these objects compares the
    `VariableExpression` object stored in `$input` with a `LiteralExpression` containing
    the string `"four"`; the second compares `$input` with a `LiteralExpression` object
    containing the string `"4"`.


    Now, with my statement prepared, I am ready to provide a value for the input variable
    and run the code:


    ```

    // listing 11.12

    foreach (["four", "4", "52"] as $val) {

    $input->setValue($val);

    print "$val:\n";

    $statement->interpret($context);

    if ($context->lookup($statement)) {

    print "top marks\n\n";

    } else {

    print "dunce hat on\n\n";

    }

    }

    ```


    In fact, I run the code three times, with three different values. The first time
    through, I set the temporary variable `$val` to `"four"`, assigning it to the
    input `VariableExpression` object using its `setValue()` method . I then call
    `interpret()` on the topmost `Expression` object (the `BooleanOrExpression` object
    that contains references to all other expressions in the statement). Here are
    the internals of this invocation , step-by-step:


    *   `$statement` calls `interpret()` on its `$l_op` property (the first `EqualsExpression`
    object).

    *   The first `EqualsExpression` object calls `interpret()` on its `$l_op` property
    (a reference to the input `VariableExpression` object, which is currently set
    to `"four"`).

    *   The input `VariableExpression` object writes its current value to the provided
    `InterpreterContext` object by calling `InterpreterContext::replace()`.

    *   The first `EqualsExpression` object calls `interpret()` on its `$r_op` property
    (a `LiteralExpression` object charged with the value `"four"`).

    *   The `LiteralExpression` object registers its key and its value with `InterpreterContext`.

    *   The first `EqualsExpression` object retrieves the values for `$l_op` (`"four"`)
    and `$r_op` (`"four"`) from the `InterpreterContext` object.

    *   The first `EqualsExpression` object compares these two values for equality,
    and then registers the result (`true`) and its key with the `InterpreterContext`
    object.

    *   Back at the top of the tree, the `$statement` object (`BooleanOrExpression`)
    calls `interpret()` on its `$r_op` property. This resolves to a value (`false`,
    in this case) in the same way the `$l_op` property did.

    *   The `$statement` object retrieves values for each of its operands from the
    `InterpreterContext` object and compares them using `||`. It is comparing `true`
    and `false`, so the result is `true`. This final result is stored in the `InterpreterContext`
    object.


    And all that is only for the first iteration through the loop. Here is the final
    output:


    ```

    four:

    top marks

    4:

    top marks

    52:

    dunce hat on

    ```


    You may need to read through this section a few times before the process clicks.
    The old issue of object versus class trees might confuse you, here. `Expression`
    classes are arranged in an inheritance hierarchy, just as `Expression` objects
    are composed into a tree at runtime. As you read back through the code, keep this
    distinction in mind.


    Figure [11-2](#A314621_5_En_11_Chapter.html#Fig2) shows the complete class diagram
    for the example.


    ![A314621_5_En_11_Fig2_HTML.gif](A314621_5_En_11_Fig2_HTML.gif)


    Figure 11-2.


    The Interpreter pattern deployed


    ### Interpreter Issues


    Once you set up the core classes for an Interpreter pattern implementation, it
    becomes easy to extend. The price you pay is in the sheer number of classes you
    could end up creating. For this reason, Interpreter is best applied to relatively
    small languages. If you have a need for a full programming language, you would
    do better to look for a third-party tool to use.


    Because Interpreter classes often perform very similar tasks, it is worth keeping
    an eye on the classes you create with a view to factoring out duplication.


    Many people approaching the Interpreter pattern for the first time are disappointed,
    after some initial excitement, to discover that it does not address parsing. This
    means that you are not yet in a position to offer your users a nice, friendly
    language. Chapter [24](#A314621_5_En_24_Chapter.html) contains some rough code
    to illustrate one strategy for parsing a mini-language.


    ## The Strategy Pattern


    Classes often try to do too much. It’s understandable: you create a class that
    performs a few related actions; and, as you code, some of these actions need to
    be varied according to the circumstances. At the same time, your class needs to
    be split into subclasses. Before you know it, your design is being pulled apart
    by competing forces.


    ### The Problem


    Since I have recently built a marking language, I’m sticking with the quiz example.
    Quizzes need questions, so you build a `Question` class , giving it a `mark()`
    method . All is well until you need to support different marking mechanisms.


    Imagine that you are asked to support the simple MarkLogic language, marking by
    straight match and regular `Expression`. Your first thought might be to subclass
    for these differences, as in Figure [11-3](#A314621_5_En_11_Chapter.html#Fig3).


    ![A314621_5_En_11_Fig3_HTML.gif](A314621_5_En_11_Fig3_HTML.gif)


    Figure 11-3.


    Defining subclasses according to marking strategies


    This would serve you well, as long as marking remains the only aspect of the class
    that varies. Imagine, though, that you are called on to support different kinds
    of questions: those that are text-based and those that support rich media. This
    presents you with a problem when it comes to incorporating these forces in one
    inheritance tree, as you can see in Figure [11-4](#A314621_5_En_11_Chapter.html#Fig4).


    ![A314621_5_En_11_Fig4_HTML.gif](A314621_5_En_11_Fig4_HTML.gif)


    Figure 11-4.


    Defining subclasses according to two forces


    Not only have the number of classes in the hierarchy ballooned, but you also necessarily
    introduce repetition. Your marking logic is reproduced across each branch of the
    inheritance hierarchy .


    Whenever you find yourself repeating an algorithm across siblings in an inheritance
    tree (whether through subclassing or repeated conditional statements), consider
    abstracting these behaviors into their own type.'
