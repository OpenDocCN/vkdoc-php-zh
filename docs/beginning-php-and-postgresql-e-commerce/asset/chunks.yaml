    \n- `Request` 响应组是每种操作中的默认响应组，它会返回你用于发起请求的名称-值对列表。\n- `SalesRank` 响应组返回有关商品当前在亚马逊网站（Amazon.com）上销售排名的数据。\n\
    - `Small` 响应组返回响应中包含的商品的一般数据（如 ASIN、商品名称、URL 等）。这是 `ItemLookup` 操作（如本示例所示）的默认响应组。\n\
