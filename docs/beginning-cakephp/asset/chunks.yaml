  trans: '

    # 辅助函数


    在前面的章节中，你利用 Cake 内置的一些辅助函数显著提升并加速了典型 Web 应用某些流程的开发。借助 Ajax 辅助函数，你为博客评论的提交和投票流程增添了一些视觉效果。Form
    辅助函数简化了数据处理和表单提交，而 HTML 辅助函数则减少了你在视图中手写的标记量，并管理整个网站的链接以防止断裂。在本章中，你将深入探索内置辅助函数，甚至亲手构建几个自己的辅助函数。首先，我会简要讨论如何安装辅助函数。


    ## 安装辅助函数


    你之前已经使用过一些内置辅助函数，并通过在控制器或 App 控制器的 `var $helpers` 数组中输入它们的名称使其对应用可用。当安装第三方辅助函数或创建自己的辅助函数时，必须按照以下步骤确保其正常工作：


    1.  每个辅助函数文件都应放在 `app/views/helpers` 目录下。

    2.  在 App 控制器或可能调用该辅助函数的特定控制器的 `var $helpers` 数组中包含该辅助函数的类名。

    3.  在视图中使用辅助函数时，请确保正确调用辅助函数的类对象（即使用 `$ajax` 变量调用 Ajax 辅助函数对象）。不要在视图中创建可能与可用辅助函数对象冲突的局部变量。


    在第 8 章中，你创建了 App 控制器文件，使一些辅助函数对整个应用可用。当应用中大部分控制器都使用一组辅助函数时，这通常是一种良好实践，因为这样可以在一处使用一行代码，而不必在不同位置逐一列出辅助函数的包含语句。你可能会问，为什么默认不在
    App 控制器中包含所有内置辅助函数，从而省去这个额外步骤呢？答案是，这样做会损害应用的加载性能。更好的做法是使用 App 控制器来指定所有或大多数控制器最常用的辅助函数，而不是从一开始就包含所有函数，拖慢应用速度。


    例如，如果应用中只有一个控制器使用 Time 辅助函数，那么最好仅在该控制器中包含此辅助函数。像 HTML、Form 和 Ajax 这样的辅助函数最好在 App
    控制器中调用，因为它们在整个应用中通用。当在 App 控制器中调用一个辅助函数时，该辅助函数对象会被创建并加载到服务器内存中，供应用执行的每个动作使用。如果为整个站点调用过多的辅助函数，内存消耗会迅速增加。


    由于 PHP 代码在每次被访问时都需要解析和编译，因此任何能减少代码量的措施都有助于提升网站性能。只在需要的地方使用代码，也有助于问题排查。在 App 控制器中包含过多的辅助函数会加剧服务器负载，并可能需要调整
    PHP 设置或使用 PHP 运行时加速器。


    ## 使用 Cake 的内置辅助函数


    Cake 最具吸引力的特性之一就是其丰富的辅助函数集合。诸如渲染 RSS 源、管理表单提交、截断和高亮文本以及执行 Ajax 方法等任务，都因辅助函数而得以简化。Cake
    提供了大量针对 Web 的函数，可以为你节省大量时间，避免头疼；了解 Cake 内置辅助函数提供了哪些功能，是构建高级 Cake 应用的关键。


    > **注意** 为了避免用冗长的解释性表格充斥本章，我选择采用更接近“词典”的方式来解释辅助函数及其功能。每个函数都有一组自己的参数，通过在视图中填充这些参数来调用。每个参数之间用逗号分隔，并在方括号内注明参数指定的数据类型。在每个描述下方，我列出了每个参数的默认值。将参数留空，或在其位置输入
    `null`，意味着函数执行时将使用该参数的默认值。


    ### 是否要解释每个辅助函数？


    本章很快就会变得非常乏味。列出所有可能的辅助函数会形成一个非常长的列表，而且或多或少会将本章变成 API 文档。（如果你想要 API 文档，那么完全可以查看
    Cake 的在线 API [在 `http://api.cakephp.org`](http://api.cakephp.org)。它保持更新，并包含每个函数对应源码的资源链接。）我将详细解释这些函数，而不是重印
    API 文档。事实是，某些辅助函数使用频率如此之高，以至于对大多数开发者来说，忽略对 Cake 内置辅助函数的详细考察会阻碍你真正利用 Cake 所提供功能的进步。因此，我将仅详细讲解
    HTML 和 Form 辅助函数，因为即使是最基本的 Cake 应用，它们对于任何操作都是必不可少的。


    不要害怕自己尝试这些函数；大多数时候，它们非常直接，而且由于它们不操作你的数据库，你无法对应用造成永久性损害。通常你使用的辅助函数越多，节省的时间就越多，所以值得练习。Cake
    新手开发人员常犯的一个错误是，不了解辅助函数，因此他们转而构建自己的过程或自定义辅助函数来执行那些已经在辅助函数中标准化的任务。（我当然也犯过这个错误——我曾写过一整个控制台脚本来自动化构建视图，后来才意识到
    Cake 自带了 Bake！）


    接下来让我们进入 HTML 和 Form 辅助函数。由于你之前已经使用过它们，所以应该已经熟悉了；但它们提供的功能远不止到目前为止提到的那些。


    ### 使用 HTML 辅助函数

    '
- fmt: 'You have already used the HTML helper, and this is perhaps the easiest one
    to master. Using the HTML helper provides some advantages:


    - Often the amount of HTML markup you must enter in the view is reduced by sticking
    to the helper.

    - HTML output can be managed dynamically rather than manually by passing along
    variables to the helper. You won’t have to write your own methods for common tasks
    that are already available through the HTML helper.

    - Have I overstated the advantage of managing links? I’ll say it again: this helper
    saves you the migraine headache of sifting through and testing all the possible
    broken links should you change a domain name, change a URL scheme, or move to
    a different hosting provider. This cannot be overstated—especially since one of
    the biggest challenges for new web developers is making their applications portable.

    - For some users, reading through PHP is easier than reading HTML. At the very
    least, those who favor PHP’s syntax to HTML markup will find the HTML helper a
    better method for coding the views.


    The HTML helper is called in the view by using the `$html` object. This helper
    is one of two that is automatically included in the whole Cake application without
    having to use the `var $helpers` array in the controller. However, once you add
    more helpers to the application, it’s not a bad idea to spell out the HTML helper
    in the `var $helpers` array; this way, no matter what future version of Cake the
    application may run on, the helper will be called appropriately. A more verbose
    `$helpers` property also ensures that other developers involved on the project
    know precisely which helpers are at work in the view.


    > **Caution**: The HTML helper is specified in title case like all other helpers
    in the `var $helpers` array. This means that using `var $helpers = array(''HTML'');`
    with all capitals will not work properly; it must be done with `Html` like so:
    `var $helpers = array(''Html'');`.


    In the following sections I’ve included descriptions of most of the HTML helper
    functions and how to use them. As you come across opportunities to use them in
    your applications, be sure to maintain consistency; you could always write HTML
    by hand, which could bypass some of the advantages of using the HTML helper.


    ---


    ## `charset`


    This function outputs the HTML `<meta>` tag, specifying the character set for
    the page. Using this function generally occurs in a layout file.


    **`charset( charset[string] )`**


    - `charset` = null: The character set to be used in the `<meta>` tag


    For example, the following:


    ```

    <?=$html->charset(''UTF-16'');?>

    ```


    will output this:


    ```

    <meta http-equiv="Content-Type" content="text/html; charset=UTF-16"/>

    ```


    The default character set can be specified in the `app/config/core.php` file.
    Change the `App.encoding` setting on or near line 47 following the standard HTML
    character set specifications. (For your information, a list of registered character
    set values is available from the World Wide Web Consortium at [www.w3.org/International/O-charset-lang.html](http://www.w3.org/International/O-charset-lang.html).)
    The `App.encoding` value is originally set to `UTF-8`.


    ---


    ## `css`


    This function outputs a tag for including a style sheet. Generally, CSS files
    are stored in the `app/webroot/css` directory and are made available by using
    the `css` function as described in this section. A `<link>` or `<style>` tag is
    returned depending on the values specified in the parameters.


    **`css( path[mixed], rel[string], attributes[array], inline[bool] )`**


    - `path`: The name of the style sheet (excluding the `.css` extension) or an array
    of multiple style sheets in the `app/webroot/css` directory.

    - `rel` = `''stylesheet''`: The `rel` attribute; if set to `import`, then the
    function will return the `@import` link in the `<style>` tags rather than the
    `<link rel=''stylesheet''>` tag.

    - `attributes`: Contains any HTML attributes to be included in the `<link>` or
    `<style>` tag; arranged as keys named for the attribute and values to be assigned
    to the attribute.'
