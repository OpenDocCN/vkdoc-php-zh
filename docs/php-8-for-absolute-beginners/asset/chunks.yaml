    \ `$result` 中，然后返回该数组。\n\n**练习**：创建一个测试程序，测试 `accessData.class.php` 程序中提供的每个函数。你发现了任何问题吗？如果有，在继续之前请纠正这些问题。\n\
    \n## 创建下拉列表和文件类型视图\n\n让我们创建一些视图来处理我们向用户请求的信息。首先，我们需要请求将要使用的数据类型。我们可以使用简单的单选按钮集合来收集此信息。\n\
