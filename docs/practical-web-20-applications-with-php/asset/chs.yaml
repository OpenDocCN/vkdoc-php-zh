  处理您的请求时发生错误，请稍后再试。\n系统管理员已收到此问题的通知。\n</p>\n</body>\n</html>\n```\n\n接下来，我们编写用于 404\
  \ 错误时的模板。请注意，与处理应用程序错误不同，404 错误可能频繁发生，并且通常不代表应用程序存在底层问题。因此，我们可以使用正常的页头和页脚来显示此错误。\n\
  \n清单 14-17 展示了 `error404.tpl` 模板，我们将其写入 `./templates/error` 目录。请注意，我们使用了在控制器动作中分配的\
