    \ text box. It includes just one\nline (`AjaxRequest();`) to\nexecute the AJAX\
    \ JavaScript code (from the `get_breeds.js` file).\n`<div id=\"AjaxResponse\"\
    ></div>` is placed below the closing\nscript tag. This line should look familiar.\
    \ It is the same line that was\nincluded in the Chapter [2](#394210_2_En_2_Chapter.xhtml)\
    \ AJAX example. The output of the\n`AjaxRequest()`\nmethod places the response\
    \ that is returned from the web server between\nthe `div` tags\nwith the ID of\
    \ `AjaxResponse`. In this\nexample, the dynamically created select box is placed\
    \ in that location.\n\n![../images/394210_2_En_5_Chapter/394210_2_En_5_Fig2_HTML.jpg](images/394210_2_En_5_Chapter/394210_2_En_5_Fig2_HTML.jpg)\n\
    \nFigure 5-2\nThe lab.html file with dynamic select box and radio buttons\n\n\
    We have also replaced the color text box with a static selection of\nradio buttons.\n\
    There are just a few possible color combinations for dogs (OK, pretend I\nam right),\
    \ and these color combinations are not likely to change, so we\ndo not need a\
    \ dynamic list. It makes sense to just hard-code the\nselections in the HTML file.\n\
    The interface of the program (`lab.html`) now greatly\nreduces the possibility\
    \ of invalid data being entered by reducing the\nnumber of text boxes used. The\
    \ users have no choice but to pick a breed\nfrom the select box and to pick a\
    \ color from the radio buttons.\nWe can also now use the same XML file to validate\
    \ that the PHP\nprogram received a valid breed name from the users on the server\n\
    side.\n\nDo It\n\n1.  Adjust the `lab.html` file from\n    Example [5-6](#394210_2_En_5_Chapter.xhtml#PC13)\
    \ to include radio\n    buttons (instead of a text box) to accept the gender from\
    \ the dog. Make\n    sure the new `lab.html` file works\n    with your `lab.php`\
    \ file from the\n    previous “Do It.”\n\nValidating Input with an XML File\n\n\
    We can add just a few lines of code in the\n`dog.php` file to\nvalidate that the\
    \ user has not only sent a correctly formatted string\nbut has also sent a breed\
    \ listed by the AKC."
  trans: "\n# 排版后的内容\n\n我们可以从原始 HTML 文件中更改的一项内容是犬种条目。美国养犬俱乐部（American Kennel Club）目前在其网站上列出了超过\
    \ 150 个犬种。我们可以在 HTML 文件中为每个犬种编写一个 `option` 值行，但这将非常耗时。此外，如果一个犬种发生变化，我们必须返回并调整列表。更好的方法是将犬种放入一个文件中，然后使用该文件来填充一个\
    \ `select` 列表。如果某个犬种发生变化或新增，我们只需在一个地方更新该文件，所有使用它的程序将自动访问新列表。如果此文件托管在 Web 服务器上，我们还可以在\
    \ `dog.php` 代码中使用同一个文件来验证用户是否正确地将一个犬种传递给了 Web 服务器。\n\n```\nAffenpinscher\nAfghan\
    \ Hound\nAiredale Terrier\nAkita\nAlaskan Malamute\nAmerican English Coonhound\n\
    American Eskimo Dog\nAmerican Foxhound\nAmerican Staffordshire Terrier\n...\n\n\
    示例 5-4\nbreeds.xml 文件\n```\n\n`breeds.xml` 文件包含简单的 XML 代码（两个标签——`breeds` 和 `breed`），列出了所有犬种。如果我们要创建一个真正的犬种网站，我们可能希望在该文件中包含更多信息。我们可以在以后添加更多信息，而不会影响此程序。\n\
    \n我们现在希望使用 XML 文件（来自示例 5-4）来填充一个选择列表框。由于此文件将驻留在服务器上，我们需要在服务器上创建一个程序来调用并检索信息。我们假设此文件已在服务器上被保护为只读访问。我们不会尝试更新或删除文件本身的任何信息。\n\
    \n我们可以创建一个 PHP 程序，只需几行代码即可检索我们所需的信息。\n\n*   *安全与性能——请记住，安全是团队的努力。不仅需要保护程序的安全，Web\
    \ 服务器及其文件结构也必须得到妥善保护。*\n\n```\nasXML();\nprint \"\";\nprint \"Select a dog breed\"\
    ;\nforeach ($breed_file->children() as $name => $value)\n{\nprint \"$value\";\n\
    }\nprint \"\";\n?>\n示例 5-5\ngetbreeds.php 文件\n```\n\nPHP 只需几行代码就可以完成许多强大的任务。示例\
    \ 5-5 的第一行打开了 `breeds.xml` 文件，将内容放入一个属性（`$breed_file`）中，然后关闭了 `breeds.xml` 文件。\n\
    \n跳到 `foreach` 语句：\n\n```\nforeach ($breed_file->children() as $name => $value)\n\
    ```\n\nXML 数据以父子关系处理。父级可以包含子级（子级又可以包含子级）。在 XML 文件中，初始父级是 `breeds`。`breeds` 下的子级都具有\
    \ `breed` 标签。\n\n```\nAffenpinscher\n```\n\n在此示例中，每个犬种（子级）的值是存在于 `breed` 标签之间的文本（例如，`Affenpinscher`）。\n\
    \n`$breed_file->children()` 指示 `foreach` 语句循环遍历每个子级（在此文件中是 `breed`）。`$name =>\
    \ $value` 部分告诉系统将每个子级标签名称（在此示例中始终是 `breed`，但您可以有不同子级）放入 `$name` 中。它还指示系统将子级中包含的值（`Affenpinscher`）放入\
    \ `$value` 中。\n\n```\nprint \"$value\";\n```\n\n在 `foreach` 循环内部，`print` 语句将 `$value`\
    \ 的内容放置在两个地方——`option` 标签的 `value` 参数和 `option` 标签之间。对于第一个子级，它将产生：\n\n*   *在 HTML\
    \ 中，当在 `select` 对象中选择一个选项时，会创建一个参数（变量），其 ID 为在 `select` 标签中声明的 `dog_breed`（在此示例中）。然后，此参数将被设置为通过\
    \ `option` 标签选择的 `value`（“Affenpinscher”）。*\n\n```\nOption value=\"Affenpinscher\"\
    >Affenpinscher\n```\n\n`foreach` 循环自动遍历文件，直到文件中没有更多记录。将为文件中的每个犬种创建类似的行。这些行与文件中的其他\
    \ `print` 行一起，根据 XML 文件的内容动态生成一个 HTML `select` 框。\n\n*   有关 `foreach` 循环的更多信息，请访问\
    \ [www.php.net/manual/en/control-structures.foreach.php](http://www.php.net/manual/en/control-structures.foreach.php)。\n\
    *   有关读取 XML 文件的更多信息，请访问 [www.php.net/manual/en/book.xml.php](http://www.php.net/manual/en/book.xml.php)。\n\
    \n我们现在需要从 HTML 文件中调用此程序。我们可以使用第 2 章中的 AJAX JavaScript 示例来执行此操作。这将允许我们仅更新页面中用于显示该框的部分来检索选择框。唯一需要从第\
    \ 2 章示例更改的行是调用 PHP 程序的那一行。\n\n```\nxmlHttp.open(\"GET\", \"get_breeds.php\", true);\n\
    ```\n\n我们只需将现有文件名替换为检索选择框的程序（`get_breeds.php`）。然后，我们可以将文件重命名（为 `get_breeds.js`）。\n\
    \n我们现在需要对 HTML 文件做一些更改，以使用 `get_breeds.js` 并创建一个用于容纳选择框的 `div` 标签。\n\n```\n\n\
    Dog Object\n\nDog Object Creator\n\nPlease complete ALL fields. Please note the\
    \ required format of information.\nEnter Your Dog's Name (max 20 characters, alphabetic)\
    \ \nSelect Your Dog's Color:\nBrown\nBlack\nYellow\nWhite\nMixed\nEnter Your Dog's\
    \ Weight (numeric only)\n\nAjaxRequest();\n\n示例 5-6\n包含动态选择框的 lab.html 文件\n```\n\
    \n`<script src=\"get_breeds.js\"></script>` 标签添加到代码顶部附近，以引入包含 AJAX 的 JavaScript\
    \ 文件，该文件用于调用将显示选择框的 PHP 程序（`get_breeds.php`）。\n\n```\nAjaxRequest();\n\n```\n\n\
    一个脚本区域已替换了犬种文本框。它只包含一行（`AjaxRequest();`），用于执行 AJAX JavaScript 代码（来自 `get_breeds.js`\
    \ 文件）。`<div id=\"AjaxResponse\"></div>` 放置在结束脚本标签下方。此行应该看起来很熟悉。它与第 2 章 AJAX 示例中包含的行相同。`AjaxRequest()`\
    \ 方法的输出将 Web 服务器返回的响应放置在 ID 为 `AjaxResponse` 的 `div` 标签之间。在此示例中，动态创建的选择框被放置在该位置。\n\
    \n![../images/394210_2_En_5_Chapter/394210_2_En_5_Fig2_HTML.jpg](img/394210_2_En_5_Fig2_HTML.jpg)\n\
    \n图 5-2\n包含动态选择框和单选按钮的 lab.html 文件\n\n我们还将颜色文本框替换为静态的单选按钮选择。狗只有几种可能的颜色组合（好吧，假装我是对的），并且这些颜色组合不太可能发生变化，因此我们不需要动态列表。在\
    \ HTML 文件中直接硬编码这些选择是合理的。\n\n该程序（`lab.html`）的界面现在通过减少使用的文本框数量，极大地降低了输入无效数据的可能性。用户别无选择，只能从选择框中选择一个犬种，并从单选按钮中选择一种颜色。\n\
    \n我们现在还可以使用相同的 XML 文件来验证 PHP 程序是否在服务器端从用户那里接收到了有效的犬种名称。\n\n## 动手实践\n\n1.  调整示例\
    \ 5-6 中的 `lab.html` 文件，使其包含单选按钮（而非文本框）来接受狗的性别。确保新的 `lab.html` 文件能够与您之前“动手实践”中的\
    \ `lab.php` 文件配合使用。\n\n## 使用 XML 文件验证输入\n\n我们可以在 `dog.php` 文件中添加几行代码，以验证用户不仅发送了格式正确的字符串，而且还发送了\
    \ AKC 列出的犬种。\n"
- fmt: "```php\nprivate function validator_breed(string $value) : bool\n{\n$breed_file\
    \ = simplexml_load_file(\"breeds.xml\");\n$xmlText = $breed_file->asXML();\nif(stristr($xmlText,\
    \ $value) === FALSE)\n{\nreturn FALSE;\n}\nelse\n{\nreturn TRUE;\n}\n}\n```\n\n\
    **Example 5-7**  \nThe `validator_breed` function (in `dog.php`)\n\nWe can create\
    \ a `private` function (only to be used inside the class) to check on the proper\
    \ breed. This function will accept a string value passed into the `$value` property.\
    \ The function will then use `$breed_file = simplexml_load_file(\"breeds.xml\"\
    );` to dump the contents of the XML file into `$breed_file`. The next line (`$xmlText\
    \ = $breed_file->asXML();`) converts the contents of `$breed_file` into a well-formatted\
    \ string.\n\n```php\nif(stristr($xmlText, $value) === FALSE)\n```\n\nThe `stristr`\
    \ method compares the contents of its second parameter (in this case `$value`)\
    \ to see if it exists in the string in the first parameter (`$xmlText`). If it\
    \ does not exist, it returns `FALSE`. If it does exist, it returns the location\
    \ of the string. For our needs we just need to know if it exists. If it does not,\
    \ we return `FALSE`. If it does, we return `TRUE`.\n\n*For more information on\
    \ the `stristr` method, visit* [www.php.net/manual/en/function.stristr.php](http://www.php.net/manual/en/function.stristr.php)*.*\n\
    \n```php\nset_dog_name($value1) ==\nTRUE ? 'TRUE,' : 'FALSE,';\nstring $breed_error\
    \ = $this->set_dog_breed($value2) ==\nTRUE ? 'TRUE,' : 'FALSE,';\nstring $color_error\
    \ = $this->set_dog_color($value3) ==\nTRUE ? 'TRUE,' : 'FALSE,';\nstring $weight_error=\
    \ $this->set_dog_weight($value4) ==\nTRUE ? 'TRUE' : 'FALSE';\n$this->error_message\
    \ = $name_error . $breed_error .$color_error .\n$weight_error;\n}\nelse\n{\nexit;\n\
    }\n}\n//--------------------------------toString---------------------------------\n\
    public function __toString()\n{\nreturn $this->error_message;\n}\n// -----------------------------\
    \ Set Methods ------------------------------\nfunction set_dog_name(string $value)\
    \ : bool\n{\nbool $error_message = TRUE;\n(ctype_alpha($value) && strlen($value)\
    \ dog_name = $value : $error_message = FALSE;\nreturn $error_message;\n}\nfunction\
    \ set_dog_weight(string $value) : bool\n{\nbool $error_message = TRUE;\n(ctype_digit($value)\
    \ && ($value > 0 && $value dog_weight = $value : $error_message = FALSE;\nreturn\
    \ $error_message;\n}\nfunction set_dog_breed(string $value) : bool\n{\nbool $error_message\
    \ = TRUE;\n((preg_match(\"/[a-zA-Z ]+$/\", $value)) &&\n($this->validator_breed($value)\
    \ === TRUE) && strlen($value) dog_breed = $value : $error_message = FALSE;\nreturn\
    \ $error_message;\n}\nfunction set_dog_color(string $value) : bool\n{\nbool $error_message\
    \ = TRUE;\n(ctype_alpha($value) && strlen($value) dog_color = $value : $error_message\
    \ = FALSE;\nreturn $error_message;\n}\n// ----------------------------- Get Methods\
    \ ------------------------------\nfunction get_dog_name() : string\n{\nreturn\
    \ $this->dog_name;\n}\nfunction get_dog_weight() : int\n{\nreturn $this->dog_weight;\n\
    }\nfunction get_dog_breed() : string\n{\nreturn $this->dog_breed;\n}\nfunction\
    \ get_dog_color() : string\n{\nreturn $this->dog_color;\n}\nfunction get_properties()\
    \ : string\n{\nreturn \"$this->dog_weight,$this->dog_breed,$this->dog_color.\"\
    ;\n}\n// -----------------------------General Method-----------------------------\n\
    private function validator_breed(string $value) : bool\n{\n$breed_file = simplexml:load_file(\"\
    breeds.xml\");\n$xmlText = $breed_file->asXML();\nif(stristr($xmlText, $value)\
    \ === FALSE)\n{\nreturn FALSE;\n}\nelse\n{\nreturn TRUE;\n}\n}\n}\n?>\n```\n\n\
    **Example 5-8**  \nThe complete dog class with validation\n\nWe made a slight\
    \ change to the code line that checks the validity of the `dog_breed` value.\n\
    \n```php\n((ctype_alpha($value)) && ($this->validator_breed($value) === TRUE)\
    \ &&\nstrlen($value) dog_breed = $value : $error_message = FALSE;\n```\n\nThe\
    \ statement passes `$value` into `validator_breed ($this->validator_breed($value)`).\
    \ If a `TRUE` is returned, then that part of the `if` statement would be true.\
    \ Otherwise, it would be false. If the complete `if` statement is `TRUE`, then\
    \ the `dog_breed` property is set to the breed found in the XML file (`$this->dog_breed\
    \ = $value`). If it is false, then `FALSE` is passed into the `$error_message`\
    \ property (`$error_message = FALSE`).\n\n*Programming note—When you call a function\
    \ in the same object, you must use the `$this` pointer (`$this->validator_breed($value)\
    \ === TRUE))).*\n\nWe have now completed a program that is much more secure. For\
    \ the most part, users cannot enter any invalid information. The only field they\
    \ can attempt to do so is in the `dog_name` field. However, even if they try to\
    \ enter program code, or other code, the server-side program will strip out the\
    \ special characters, so the code becomes harmless. If a packet sniffing program\
    \ tries to change the data before it is received by the server-side program, the\
    \ validation and/or filtering methods will either cause the data to be rejected\
    \ or will, again, make the data harmless.\n\nThis program is efficient as it tries\
    \ to validate the information before it is sent to the server. It reduces the\
    \ amount of communication back and forth between the server and the user. The\
    \ completed program has two tiers (interface, business rules) and can be expanded\
    \ to include a third tier (data) without major changes to the current code.\n\n\
    *Programming recommendation—For small web applications that are used infrequently,\
    \ it is not necessary to break the program apart, as is done in this example.\
    \ However, if it is an application that might expand in the future, or might gain\
    \ significant users in the future, the program should initially be created with\
    \ this in mind.*\n\n**Do It**\n\n1. Go to the book’s web site and run the example\
    \ program. See if you can “break” the security built into the program. Remember,\
    \ you can only attempt to be as secure as possible; nothing is 100% secure. Were\
    \ you able to send harmful information to the program that affected the program?\
    \ If so, what did you do? What might be missing from the program that allowed\
    \ this to happen? If not, what stopped your harmful data from corrupting the program?\
    \ What changes might you make to this program that would require you to include\
    \ a data tier? What inefficiencies still exist in the program? What can you do\
    \ to fix them?\n\n## Dependency Injection\n\nAs you have seen, when programs are\
    \ created, a developer goes through many iterations before the final application\
    \ has been completed. Along the way, experience programmers will keep different\
    \ versions of their programs. This allows the programmers to back up to a previous\
    \ version, quickly, if the version they are working on has too many significant\
    \ problems. Otherwise, they would have to attempt to strip out the “bad” code\
    \ without doing harm to the good code. Applications have many files (HTML, JavaScript,\
    \ CSS, PHP classes, and PHP libraries). Keeping track of which version works with\
    \ which, or easily changing one part of the program to use a new version of another\
    \ part, can become confusing, especially when the file names and class names are\
    \ coded in the code of the program itself.\n\nChapter [2](#394210_2_En_2_Chapter.xhtml)\
    \ briefly discussed *dependency injection*. It allows the program (client) that\
    \ will use a block of code (such as a class) while not knowing the actual implementation\
    \ of the block of code it will be using. The client program does not know the\
    \ actual class name."
