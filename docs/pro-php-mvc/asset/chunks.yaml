    **CakePHP: Bootstrapping**


    CakePHP was created and is maintained by a community of open source developers,
    and is geared toward rapid application development that favors convention over
    configuration.


    It is feature rich and includes, among other things, an impressive ORM and a command-line
    interface for quickly creating models, views, and controllers.


    ■ **Note** You can download CakePHP from [http://cakephp.org/](http://cakephp.org/).


    Goals


    • We need to understand the philosophy and benefits of CakePHP.


    • We need to learn how to create the architectural requirements for our sample
    application.


    Why CakePHP?


    CakePHP is extremely popular, and as a result has developed a knowledgeable community
    and good documentation. The focus of CakePHP is on doing things by convention
    rather than forcing developers to configure everything. That is not to say that
    it cannot be configured, but rather that most of this will have been done before
    you even start to use CakePHP.


    The documentation of CakePHP is quite comprehensive, ranging from simple API documentation
    to a cookbook of frequent programming tasks. There are also many popular screencast,
    book resources, and events designed to educate new and experienced CakePHP developers
    alike.


    ■ **Note** You can find the CakePHP documentation a[t http://api20.cakephp.org/.](http://api20.cakephp.org/)


    Why Not CakePHP?


    CakePHP is not for the faint-hearted. There is actually a huge amount of things
    going on behind the scenes and it’s easy to get lost when needing to make simple
    configuration or behavioral changes to a CakePHP application.


    The heavy focus on convention also means that CakePHP makes many assumptions about
    directory structure, file names, and actual code. This is not dissimilar to other
    frameworks (ours included), but where the 419


