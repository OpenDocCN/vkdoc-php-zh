    can always click on the Checkout button found at the bottom of the cart (see Figure
    [4-7](#A978-1-4842-1672-9_4_Chapter.html#Fig7)). When they click the Checkout
    button, the visitor’s status is checked to determine whether they are signed in
    or not. To keep the shipment information for a product’s delivery, the visitor
    needs to register with the site and must be signed in. If the visitor is not yet
    signed in, two links will be displayed—one that enables the user to sign in and
    another to create an account if the user has not yet registered. Depending on
    the current status of the visitors, they can either create a new account or sign
    in to the site.


    The `checklogin.php` script shown in Listing [4-5](#A978-1-4842-1672-9_4_Chapter.html#FPar8)
    checks the login/sign in status of the visitor.


