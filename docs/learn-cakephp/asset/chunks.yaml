- fmt: '# Testing with Authentication


    There is a good chance that you will use authentication in your controllers. Authentication
    will not be introduced now, so I will not explain the related code in detail.
    In our blog, anyone can edit and delete anything, even without being logged in.
    Authentication is the way to let the user log in and to distinguish between logged-in
    and not-logged-in users. Authorization is the way to handle permissions, such
    that admins can edit all posts, but a user can only edit his or her own posts.


    CakePHP provides nice support for handling both authentication and authorization.


    At your `/src/Controller/CommentsController.php` file you should have the following
    code. In short, this code ensures that non-authenticated users cannot access any
    comments-related URLs, except `index` and `add`, which are accessible without
    authentication.


    ```

    1  public function initialize()

    2  {

    3      parent::initialize();

    4      $this->loadComponent(

    5          ''Auth'',

    6          [

    7              ''loginRedirect'' => [

    8                  ''controller'' => ''Users'',

    9                  ''action'' => ''login''

    10              ]

    11          ]

    12      );

    13  }


    15  public function beforeFilter(Event $event)

    16  {

    17      parent::beforeFilter($event);

    18      $this->Auth->allow([''index'', ''add'']);

    19  }

    ```


    Do not forget to add `use Cake\Event\Event;` at the beginning of this file, as
    we use the `Event` class in the `beforeFilter()` method.


    Your browser at `http://localhost/∼rrd/cakeBlog/comments` should show your comments,
    if there are any, but `http://localhost/∼rrd/cakeBlog/comments/view/1` should
    redirect you to `http://localhost/∼rrd/cakeBlog/users/login`, as we are not logged
    in. We did not create login functionality yet.


    Let’s create a test at the `/tests/TestCase/Controller/CommentsControllerTest.php`
    file. The following test should run successfully:


    ```

    1  public function testIndex()

    2  {

    3      $this->get(''/comments'');

    4      $this->assertResponseOk();

    5  }

    ```


    Let’s explore a test for a method that requires authentication. As we are not
    authenticated, we should be redirected to the login page. We check this by calling
    the `assertRedirect()` method.


    ```

    1  public function testViewUnauthenticated()

    2  {

    3      $this->get(''/comments/view/1'');

    4      $this->assertRedirect(

    5          [

    6              ''controller'' => ''Users'',

    7              ''action'' => ''login''

    8          ]

    9      );

    10  }

    ```


    You already saw how to mock the `session` variable, and we precisely need that
    here, as login data is stored in `session`.


    ```

    1  public function testViewAuthenticated()

    2  {

    3      $this->session([

    4          ''Auth'' => [

    5              ''User'' => [

    6                  ''id'' => 1,

    7                  ''username'' => ''rrd'',

    8                  ''role'' => 10

    9              ]

    10          ]

    11      ]);

    12      $this->get(''/comments/view/1'');

    13      $this->assertResponseOk();

    14  }

    ```


    If we are logged in, we should get an OK response and not a redirect.


    ## Testing JSON Response


    JSON (JavaScript Object Notation) is a standard format that uses human-readable
    text to transmit data objects consisting of attribute-value pairs. JSON is a language-independent
    data format. Originally, it was created for JavaScript, but to generate and parse
    `JSON-format` data, is available in many programming languages. The JSON file
    name extension is `.json`.


    Here is a sample JSON string:


    ```

    {

    "name": "rrd",

    "isAlive": true,

    "age": 40,

    "phoneNumbers": [

    {

    "type": "home",

    "number": "987 654 3210"

    },

    {

    "type": "mobile",

    "number": "123 456 7890"

    }

    ],

    "children": [],

    "spouse": "syj"

    }

    ```


    A real sample JSON file can be found in your root directory, as `composer` puts
    its `composer.json` there.


    Webservices’ Ajax call responses are in JSON or in XML. To test these responses,
    we should first add the `RequestHandler` component to our controller’s `initialize()`
    method, as follows.


    ```

    1  $this->loadComponent(''RequestHandler'');

    ```


    We should add the following line to the `/config/routes.php` file around line
    45, to let it handle the `json` extension.


    ```

    1  Router::extensions([''json'']);

    ```


    Let’s create our test method in the `CommentsControllerTest.php` file.


    ```

    1  public function testAdd()

    2  {

    3      $this->configRequest(

    4          [

    5              ''headers'' => [''Accept'' => ''application/json'']

    6          ]

    7      );

    8      $data = [

    9          ''comment'' => ''Call out Gouranga and be happy'',

    10          ''user_id'' => 1,

    11          ''post_id'' => 1,

    12          ''category_id'' => 2

    13      ];

    14      $this->post(''/comments/add.json'', $data);

    15      $this->assertResponseSuccess();


    17      $expected = [

    18          ''comment'' => [

    19              ''comment'' => ''Call out Gouranga and be happy'',

    20              ''user_id'' => 1,

    21              ''post_id'' => 1,

    22              ''category_id'' => 2,

    23              ''id'' => 2

    24          ],

    25      ];

    26      $expected = json_encode($expected, JSON_PRETTY_PRINT);

    27      $this->assertEquals($expected, $this->_response->body());

    28  }

    ```


    First, we mock the headers, then the post data, and then check the response HTTP
    header code and its content.


    In your `CommentsController.php` file’s `add()` method, remove (or comment out)
    the following line:


    ```

    1  return $this->redirect([''action'' => ''index'']);

    ```


    You should have something like the following:


    ```

    1  public function add()

    2  {

    3      $comment = $this->Comments->newEntity();

    4      if ($this->request->is(''post'')) {

    5          $comment = $this->Comments->patchEntity(

    6              $comment,

    7              $this->request->data

    8          );

    9          if ($this->Comments->save($comment)) {

    10              $this->Flash->success(__(''The comment has been saved.''));

    11              //return $this->redirect([''action'' => ''index'']);

    12          } else {

    13              $this->Flash->error(

    14                  __(''The comment not saved. Please, try again.'')

    15              );

    16          }

    17      }

    18      $users = $this->Comments->Users->find(''list'', [''limit'' => 200]);

    19      $posts = $this->Comments->Posts->find(''list'', [''limit'' => 200]);

    20      $this->set(compact(''comment'', ''users'', ''posts''));

    21      $this->set(''_serialize'', [''comment'']);

    22  }

    ```


    Now our test should run successfully.


    ## Summary


    In this chapter, you learned how to test the functionality behind authentication
    by mocking. Then you saw an example of testing controllers that respond to JSON
    data in spite of HTML.


    # 12. Test Suites


    ![A337704_2_En_12_Figa_HTML.jpg](A337704_2_En_12_Figa_HTML.jpg)


    This suit really suits me


    While developing a particular feature, we’ll run certain tests. Before deploying,
    we should run all our tests, to make sure we haven’t broken something. This is
    the point at which test suites come into the picture.


    ## Using TestSuite


    `TestSuite` offers a few methods for easily creating test suites, based on the
    file system.


    To create a test suite for all model table tests, we should create a file named
    `AllModelTableTest.php` in `/tests/TestCase/`.


    ```

    1  <?php

    2  use Cake\TestSuite\TestSuite;

    3

    4  class AllModelTableTest extends TestSuite

    5  {

    6      public static function suite()

    7      {

    8          $suite = new TestSuite(''All model table tests'');

    9          $suite->addTestDirectory(TESTS . ''TestCase/Model/Table'');

    10         return $suite;

    11     }

    12 }

    ```


    The preceding code groups all test cases found in the `/tests/TestCase/Model/Table`
    folder.


    Now you can run all your model table tests at once.


    ```

    $ cd ∼/public_html/cakeBlog

    $ vendor/bin/phpunit tests/TestCase/AllModelTableTest.php

    ```


    You can create a test suite for all controllers, etc., in the same way.


    If you want to add only a few files, you can use `$suite->addTestFile($filename)`.


    You can add directories recursively under `/tests/TestCase` by `$suite->addTestDirectoryRecursive(TESTS
    . ''TestCase'');`, so you can run all your tests at once. Do not forget that simply
    using `vendor/bin/phpunit` does the same.'
