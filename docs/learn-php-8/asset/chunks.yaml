  trans: '

    # 第 1 章：PHP 8 简介


    完成本章学习后，学生将能够：


    - 理解 `LAMP`、`WAMP` 和 `MAMP` 之间的区别

    - 成功安装某个版本的 `LAMP`、`WAMP` 或 `MAMP`

    - 通过互联网搜索排查问题

    - 解释编程语言与脚本语言的区别

    - 创建一个无错误的简单 PHP 程序


    # 第 2 章：接口、平台与三层架构编程


    完成本章学习后，学生将能够：


    - 列举可以托管 PHP 程序的平台或容器的示例

    - 使用 PHP 创建一个简单的动态 Web 应用程序

    - 解释三层架构设计，并确定每一层包含的内容

    - 设计一个三层架构应用程序

    - 解释程序开发生命周期（`PDLC`）的每个步骤

    - 定义并解释 `MVC` 与依赖注入


    # 第 3 章：基础：PHP 8 语法


    完成本章学习后，学生将能够：


    - 创建一个简单的无错误 PHP 程序

    - 理解条件语句的用途与价值

    - 理解 `for`、`while` 和 `foreach` 循环的用途与价值

    - 理解函数的用途与价值

    - 理解数组的用途与价值


    # 第 4 章：模块化编程


    完成本章学习后，学生将能够：


    - 创建一个无错误的简单面向对象（`OO`）模块化 PHP 程序

    - 创建一个 PHP 类，并实例化该类（对象）

    - 创建一个 `OO` PHP 封装程序，包括 `get` 和 `set` 方法

    - 创建接受参数并返回信息的 PHP 方法（函数）

    - 创建 PHP 公有和私有属性（变量）

    - 将来自其他文件或库的现有 PHP 代码导入到程序中

    - 使用三元（条件）运算符验证接收到的信息


    # 第 5 章：安全用户界面


    完成本章学习后，学生将能够：


    - 解释为什么必须在接口层和业务规则层验证用户输入

    - 解释为什么必须在业务规则层过滤用户输入

    - 使用 HTML5 代码验证用户输入

    - 使用 JavaScript 代码验证用户输入

    - 使用 PHP `if` 语句（条件语句）验证和过滤输入

    - 使用 `foreach` 循环从 XML 文件动态创建 HTML 选择框

    - 使用简单数组进行过滤和验证

    - 将简单数组传递给方法（函数）

    - 理解如何使用依赖注入来控制代码版本变更


    # 第 6 章：异常处理与日志记录


    完成本章学习后，学生将能够：


    - 解释错误与异常之间的区别

    - 创建一个能够处理一般异常的 PHP 程序

    - 创建一个能够创建、引发和处理用户自定义异常的 PHP 程序

    - 解释并使用 `switch` 和/或嵌入式 `if/else` 语句

    - 创建一个使用 `while` 循环和/或 `for` 循环的 PHP 程序

    - 创建一个使用二维数组读取/更新文本文件的程序

    - 创建一个能够记录异常并通过电子邮件通知支持人员的 PHP 程序


    # 第 7 章：数据对象


    完成本章学习后，学生将能够：


    - 创建一个能够插入、更新和删除 XML 或 JSON 数据的数据类

    - 解释如何创建一个使用 SQL 脚本更新 MySQL 数据的数据类

    - 创建一个能够生成变更备份日志的 PHP 程序

    - 创建一个能够从先前备份中恢复数据的 PHP 程序

    - 应用变更以创建最新的有效信息

    - 使用依赖注入将数据类附加到业务规则（`BR`）层的另一个类

    - 创建一个三层架构的 PHP 应用程序


    # 第 8 章：身份验证


    完成本章学习后，学生将能够：


    - 定义会话并解释如何将其用于身份验证

    - 创建一个能够验证用户登录的 PHP 程序

    - 创建一个能够注册用户的 PHP 程序

    - 创建一个允许用户更改密码的 PHP 程序

    - 创建一个能够记录无效登录尝试的 PHP 程序


    # 第 9 章：多功能接口


    完成本章学习后，学生将能够：


    - 创建一个完整的、能够实现删除、更新和插入数据的 PHP 应用程序

    - 使用 CSS 为完成的应用程序打造专业外观

    - 使用 JavaScript 接收和操作来自其他程序的数据

    - 保护应用程序内所有需要用户 ID/密码的程序

    - 使用来自 JSON 对象的值填充 HTML 对象


    ## 致谢


    感谢所有帮助完成本书的人。特别感谢 PHP 入门课程的同学们，他们是这段旅程中真正的测试者和调试者。


    特别感谢所有开源开发者以及为每一位希望学习更多编程知识的互联网用户提供免费教程和培训的贡献者。


    ## 关于作者


    ## 关于技术审校


    # 1. PHP 8 简介


    > *PHP 是一种流行的通用脚本语言，特别适用于 Web 开发。PHP 快速、灵活且务实，从你的博客到世界上最流行的网站，一切皆可驱动。*

    >

    > — [`www.php.net`](http://www.php.net)


    ## 章节目标/学生学习成果


    完成本章学习后，学生将能够：


    - 理解 `LAMP`、`WAMP` 和 `MAMP` 之间的区别

    - 成功安装某个版本的 `LAMP`、`WAMP` 或 `MAMP`

    - 通过互联网搜索排查问题

    - 解释编程语言与脚本语言的区别

    - 创建一个无错误的简单 PHP 程序

    '
- fmt: '# PHP 7, PHP 7.4+, PHP 8, and PHP.NET


    Today, `PHP` (Hypertext Preprocessor) is one of the most popular languages used
    for web application development. The language has evolved to allow the programmer
    to quickly develop well-formed error-free programs using both `procedural` and
    `objected-oriented` programming techniques. It provides the ability to use many
    preexisting libraries of code that either come with the basic installation or
    can be installed within the PHP environment. This gives you multiple ways to complete
    a particular task. It provides more flexibility than many other languages. The
    ease with which additional libraries of code can be added to the environment is
    one of the many driving forces in its popularity.


    - `Procedural language` — A procedural programming language includes functions/methods
    that can be called from the main flow of the program. The flow of the program
    jumps to the function/method, executes the code within the module, and then returns
    to the next statement in the main flow of the program. Some procedural languages
    include a main function/method that automatically is called when the program is
    executed.


    - `Object-oriented language` — An object-oriented language uses classes and objects.
    Classes are similar to blueprints. A class describes what an object can contain,
    including properties/variables and functions/methods. An object is an instance
    of a class (like a building that has been created from a blueprint). Object-oriented
    languages provide polymorphism, encapsulation, and inheritance. Objects are naturally
    encapsulated by containing all related functions/methods and properties/variables
    within the object itself. Polymorphism allows duplicate method/function names
    within object-oriented objects. However, the “signature” must be different. The
    “signature” is the combination of the types of variables (numbers and characters)
    passed into the method/function and the type of information passed out of a method/function.
    For example, several `add` methods could be created—one that only accepts integers
    (whole numbers), one that only accepts floating-point numbers (numbers with decimals),
    and one that accepts a combination. The program will determine which method/function
    to call by what has been passed into the method/function. Inheritance in object-oriented
    programming allows an object to inherit properties/variables and functions/methods
    from another object. The object can also override those items inherited. This
    is similar to a child inheriting characteristics from the parents. Object-oriented
    languages can also be event driven. An event-driven program will “sleep” until
    an event occurs. This is similar to an ATM machine program waiting for a user
    to input an ATM card or walk in front of the machine.


    PHP is an `open source` language. As such, each version of the language is created
    using input from the individuals who use it—the programmers themselves. This allows
    the language, over time, to evolve and float into the direction that is driven
    by the users. From its first release in 1995 as a Personal Home Page Tool (PHP)
    by Rasmus Lerdorf, the versions have been released on the Internet with forums
    to provide users the ability to make suggestions and even provide code changes
    and additions. Today, [`www.php.net`](http://www.php.net) is the official PHP
    web site.


    - `Open source language` — An open source programming language is developed by
    a community of interested parties. The community accepts input from fellow programmers
    for suggested upgrades and corrections. Several members of the community work
    together to present proposals and to make changes to the language. Open source
    languages are “free.” A non-open source language (such as Microsoft C#) is created
    and updated by a company or major organization. Non-open source languages are
    not usually “free.”


    ![../images/394210_2_En_1_Chapter/394210_2_En_1_Fig1_HTML.jpg](images/394210_2_En_1_Chapter/394210_2_En_1_Fig1_HTML.jpg)


    Figure 1-1


    PHP.NET (03/28/2020)


    The [`www.php.net`](http://www.php.net) home page provides information on each
    of the latest releases of the language. It also provides information on future
    releases, the features planned for those releases, and the planned release dates.
    In addition, other related PHP information can be found, including links and information
    to major PHP conferences.


    ![../images/394210_2_En_1_Chapter/394210_2_En_1_Fig2_HTML.jpg](images/394210_2_En_1_Chapter/394210_2_En_1_Fig2_HTML.jpg)


    Figure 1-2


    Get involved (03/28/2020)


    As mentioned, this site provides the ability for users to help with the future
    development of the language. Users can get involved with testing beta versions
    and reporting errors or program bugs. Visitors can also view documentation related
    to the development of possible future versions. This is a good way of discovering
    future enhancements or security fixes before major announcements have been made
    to the public.


    ![../images/394210_2_En_1_Chapter/394210_2_En_1_Fig3_HTML.jpg](images/394210_2_En_1_Chapter/394210_2_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Download page (03/28/2020)


    The download page, as you might have guessed, provides the ability to gain easy
    access to the latest versions of the language. However, as you will note, only
    the language itself is provided. It is more common, and recommended, that the
    beginning user use a `WAMP` (Windows, Apache, MySQL/MariaDB, PHP), `LAMP` (Linux,
    Apache, MySQL/MariaDB, PHP), or `MAMP` (Mac, Apache, MySQL/MariaDB, PHP) stack
    package for initial installation. These packages (which we will look at later)
    allow for easy installation of multiple products at the same time. Otherwise,
    you have to run many separate installations.


    ![../images/394210_2_En_1_Chapter/394210_2_En_1_Fig4_HTML.jpg](images/394210_2_En_1_Chapter/394210_2_En_1_Fig4_HTML.jpg)


    Figure 1-4


    Documentation pages (03/28/2020)


    - `WAMP/LAMP/MAMP` — Open source (free) combinations, including Apache web server,
    MySQL/MariaDB, and PHP for a specific operating system (Windows, Linux, and Mac).
    These packages are open source. The combination of software is used for creating
    dynamic web sites and web applications.


    One of the more important pages of the PHP web site is the documentation page.
    This page allows users to search for descriptions and functionality of the language
    itself. You can also download the complete documentation. However, since this
    is a “live” site, with possible changes occurring, the most current information
    is best obtained by directly accessing it from the web site.


    ![../images/394210_2_En_1_Chapter/394210_2_En_1_Fig5_HTML.jpg](images/394210_2_En_1_Chapter/394210_2_En_1_Fig5_HTML.jpg)


    Figure 1-5


    The Manual (03/28/2020)


    You can use the manual as if it were a textbook by clicking through each link
    from the beginning. The limited amount of explanation provided with each section
    of the manual might cause a beginner to want to give up on programming and change
    interests to something ghastly like networking! The manual does provide a great
    guide for experienced programmers, as the syntax of the language is similar to
    other languages such as Python, JavaScript, Perl, and Java.


    On any page of the web site, the user can enter a term, an expression, or even
    a function name to find more information. As the information is entered in search
    box, the web page will provide the user with one or more options below the box
    for the user to select.


    Once the user has selected an option (such as `echo` shown in Figure [1-7](#394210_2_En_1_Chapter.xhtml#Fig7)),
    the results of the search provide the user with a general description of the item
    requested, any inputs or outputs for a function (parameters), and example code.'
