  trans: "\n这是一个包含 PHP 代码描述的 HTML 文档文本。以下是排版后的 Markdown 格式内容：\n\n这段话虽然通常包含超文本标记的描述符，但它是执行这段代码后得到的结果。\n\
    \n```\n任何使用 `echo` 语句显示的内容都会包含在文档中。代码本身很简单。它计算了前 `20` 个斐波那契数（`$n` 变量定义了要计算的数字个数）。具体来说，序列中的最后一个和倒数第二个数字（两个\
    \ 1）被存储在 `$a` 和 `$b` 变量中。每个循环都会计算一个新的数字。结果会显示在文档中。\n\n一个圆形图标，中心是一个字母 i。\n\n注意\n\
    \n你可以想象成程序直接打印到文档中。\n\n在浏览器窗口中查看文档，会显示如图 12-1 所示的结果。\n\n![](img/613529_1_En_12_Fig1_HTML.jpg)\n\
    \n一张斐波那契数列网页的截图。页面标题是一篇名为“斐波那契数列”的文章。它列出了斐波那契数。\n\n图 12-1  \n在浏览器窗口中显示包含 PHP 代码的文档\n\
    ```\n\n也就是说，一切基本上都比较简单。剩下的唯一问题就是弄清楚如何获得这里展示的结果。\n\n## HTML 基础\n\n要创建带有 HTML 标记的文档，你至少需要对\
    \ HTML 有基本的了解。不过，本书并不打算涵盖创建 HTML 文档的所有原则，因为这并非本书的主要目的。另一方面，如果不懂 HTML，就很难理解如何有效使用\
    \ PHP 脚本。因此，为了那些不熟悉 HTML 基础的读者，书中提供了一些注释来解释代码中使用的超文本标记。\n\nHTML 文档中的所有描述符都放在尖括号\
    \ `<` 和 `>` 中。在尖括号之间，你放入描述符的名称。大多数描述符都是成对出现的：有起始描述符，也有结束描述符。结束描述符在描述符名称前包含一个正斜杠\
    \ `/`。起始和结束描述符之间的所有内容就是该描述符的内容。例如，整个 HTML 文档被包含在由 `<html>` 和 `</html>` 标签界定的块中。开头的指令\
    \ `<!DOCTYPE html>` 是文档类型声明。\n\n`<html>` 块包含 `<head>` 块和 `<body>` 块。`<head>` 块又包含\
    \ `<title>` 块，其内容（放在 `<title>` 和 `</title>` 标签之间的文本）会显示在浏览器窗口的标签页中。`<h1>` 和 `</h1>`\
    \ 标签定义了第一级标题。段落使用 `<p>` 和 `</p>` 标签定义。你还可以在起始描述符中使用 `attribute=\"value\"` 格式的属性。例如，`<html>`\
    \ 标签通常包含一个指定文档语言的属性。在这种情况下，起始标签看起来像 `<html lang=\"en\">`。\n\n让我们考虑一下这个问题的技术层面。处理文档时，你假设客户端计算机上的浏览器发起请求，而\
    \ PHP 代码在服务器计算机上执行。此外，即使可以将文档放在服务器上，在这种情况下，调试过程也不是最令人愉快的。因此，在开发过程中使用同一台计算机作为客户端和服务器是很自然的。有几种方法可以做到这一点。下面描述的方法似乎是最简单、方便且易于理解的。那就是运行一个本地服务器。\n\
    \n一个圆形图标，中心是一个字母 i。\n\n注意\n\n关于软件以及如何创建 PHP 程序的一些信息，请参阅*引言*和*第* *1* *章*。你可以从中学习如何启动本地服务器以及如何使用\
    \ NetBeans 环境。在此，我们对之前获得的知识稍作回顾。\n\n要启动本地服务器，可以使用以下命令。\n\n```\nphp -S localhost:some_port\
    \ -t some_folder\n```\n"
- fmt: "首先执行`php`（或`php.exe`）指令，然后加上`-S`选项和`localhost:some_port`结构。在`localhost`关键字之后，指定与服务器通信的端口。\n\
    \n详细信息：\n\n| 说明 |\n| --- |\n| 不同的程序和服务的交互涉及客户端与服务器发送和接收请求。一个唯一的数字标识符将程序与该程序发送的消息匹配，该标识符称为*端口*。许多服务会自动选择端口，但本例中需要显式指定端口。这可以是几乎任意数字，但为了可靠性（避免指定已被占用的端口），建议选择`5000`之后的端口。例如，端口`6789`完全可以接受。\
    \ |\n\n端口之后是`-t`选项以及硬盘上作为服务器根目录的文件夹。例如，可以使用以下命令：\n\n```\nphp -S localhost:6789\
    \ -t D:\\Books\\php\\codes\n```\n\n在这种情况下，`D:\\Books\\php\\codes`文件夹中的文件被视为位于服务器根目录。与本地服务器的交互通过端口`6789`进行。但如果你先通过命令行切换到`D:\\\
    Books\\php\\codes`文件夹，则使用更简单的命令即可。\n\n详细信息：\n\n| 说明 |\n| --- |\n| 在Windows中，你可以使用资源管理器导航到要作为本地服务器根目录的文件夹，并在地址栏中输入`cmd`命令。在控制台窗口中执行`php\
    \ -S localhost:6789`命令。你可能还需要指定`php.exe`文件的完整路径。例如，如果`php.exe`文件位于`C:\\PHP`文件夹中，命令如下所示：`C:\\\
    PHP\\php -S localhost:6789`。 |\n\n```\nphp -S localhost:6789\n```\n\n启动本地服务器后，你可以在浏览器窗口中查看文档。如果文件名为`listing12_01.php`，且位于作为本地服务器根目录的`D:\\\
    Books\\php\\codes`文件夹中，则需要在浏览器地址栏中输入以下请求：\n\n```\nlocalhost:6789/listing12_01.php\n\
    ```\n\n如果`listing12_01.php`文件包含如清单[12-1](#613529_1_En_12_Chapter.xhtml#PC1)所示的代码，结果应如图[12-1](#613529_1_En_12_Chapter.xhtml#Fig1)所示。\n\
    \n> 一个圆形图标，中心有一个字母 i。\n>\n> **注意**\n>\n> 上述方案可用于测试后续讨论的所有示例。\n\n## 处理请求参数\n\n\
    在浏览器地址栏输入页面地址时，可以指定额外的参数及其值。操作非常简单。在地址之后，放置问号（`?`），后跟参数及其值，格式为`parameter=value`。如果有多个参数，使用`&`符号作为分隔符。\n\
    \n清单[12-2](#613529_1_En_12_Chapter.xhtml#PC9)是一个示例。\n\n```\nGreetings\n\nWelcome\
    \ Page\n We are happy to greet you,\n\n! It is a great honor for us.\n\nListing\
    \ 12-2\nHandling the Request Parameters\n```\n\n首先，我们来看看代码执行的结果，然后进行分析。\n\n因此，启动本地服务器；例如，使用端口`6789`（从包含`listing12_02.php`程序文件的文件夹中执行`php\
    \ -S localhost:6789`命令），并在浏览器地址栏中输入以下请求：\n\n```\nlocalhost:6789/listing12_02.php\n\
    ```\n\n结果，浏览器窗口如图[12-2](#613529_1_En_12_Chapter.xhtml#Fig2)所示。\n\n![图片](images/613529_1_En_12_Chapter/613529_1_En_12_Fig2_HTML.jpg)\n\
    \n> 问候网页的截图。显示欢迎页面。内容为：“我们很高兴欢迎您，Mister X！这对我们来说是莫大的荣幸。”\n\n图 12-2 请求中未传递`name`参数时的浏览器窗口\n\
    \n在这种情况下，浏览器会渲染包含以下HTML标记的文档：\n\n```\nGreetings\n\nWelcome Page\n We are happy\
    \ to greet you, \nMister X! It is a great honor for us.\n```\n\n该文档包含一个问候语，其中姓名`Mister\
    \ X`以粗体显示。\n\n## HTML 基础"
