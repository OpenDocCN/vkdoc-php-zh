    \ 服务，请在 `hatshop` 目录中创建一个名为 `test_rest.php` 的新文件，并在其中写入以下代码：\n\n```php\n<?php\n\
    // 告知浏览器即将接收一个 XML 文档。\nheader('Content-type: text/xml');\n\n/* 请务必在下面这行代码中，将字符串\
    \ '[Your Access Key ID]' 替换为你的访问密钥 ID */\n$url = 'http://webservices.amazon.com/onca/xml?Service=AWSECommerceService'\
    \ .\n    '&AWSAccessKeyId=[Your Access Key ID]' .\n    '&Operation=ItemSearch'\
    \ .\n    '&Keywords=super+hats' .\n    '&SearchIndex=Apparel' .\n    '&ResponseGroup=Request,Medium';\n\
    \necho file_get_contents($url);\n?>\n```\n\n**注意：** 某些 PHP 安装环境和网站托管提供商可能默认不允许运行此代码。在这种情况下，你可以在\
    \ `php.ini` 中更改此设置：\n\n```\nallow_url_fopen = On\n```\n\n或者，你可以将以下行添加到 `include/config.php`\
    \ 中。第二种方案是首选，因为它只影响你的应用程序，并且在需要将应用程序迁移到其他服务器时，该设置仍然有效。\n\n```\nini_set('allow_url_fopen',\
    \ 'On');\n```\n\n加载 `http://localhost/hatshop/test_rest.php` 将会显示关于亚马逊超级帽子（Super\
    \ Hats）的 XML 数据（见图 17-5）。\n\n**图 17-5.** *来自亚马逊的超级帽子*\n\n为了练习并构建更多 XML 链接，只需研究“API\
    \ 参考”（API Reference）中的示例即可。\n"
- fmt: "# Section of the ECS 4.0 Documentation\n\nThe material will show you how to\
    \ do a variety of Amazon operations using REST.\n\n## Accessing Amazon E-Commerce\
    \ Service Using SOAP\n\nUsing SOAP, you use a complex API to access the needed\
    \ Amazon.com functionality. The following code, which performs the same search\
    \ operation for hats that you did earlier with REST, is using the `AWSECommerceService`,\
    \ `ItemSearch`, and `ItemSearchRequest` objects from the Amazon API to perform\
    \ the operation.\n\n**Tip:** To access the Amazon server using SOAP, we use the\
    \ PHP SOAP extension. The documentation of the PHP SOAP functionality can be found\
    \ at <http://www.php.net/soap/>. Consult Appendix A to ensure you have SOAP support\
    \ enabled in your PHP installation.\n\nTo test accessing Web Services using SOAP,\
    \ create a new file named `test_soap.php` in your `hatshop` directory, and write\
    \ the following code in it:\n\n```php\n<?php\n\ntry\n{\n\n    // Initialize SOAP\
    \ client object\n\n    $client = new SoapClient(\n\n        'http://webservices.amazon.com/AWSECommerceService/AWSECommerceService.wsdl');\n\
    \n    /* DON'T FORGET to replace the string '[Your Access Key ID]' with your subscription\
    \ ID in the following line */\n\n    $request = array ('Service' => 'AWSECommerceService',\n\
    \n                     'AWSAccessKeyId' => '[Your Access Key ID]',\n\n       \
    \              'Request' => array ('Operation' => 'ItemSearchRequest',\n\n   \
    \                                     'Keywords' => 'super+hats',\n\n        \
    \                                'SearchIndex' => 'Apparel',\n\n             \
    \                           'ResponseGroup' => array ('Request',\n\n         \
    \                                                         'Medium')));\n\n   \
    \ $result = $client->ItemSearch($request);\n\n    echo '<pre>';\n\n    print_r($result);\n\
    \n    echo '</pre>';\n\n}\n\ncatch (SoapFault $fault)\n\n{\n\n    trigger_error('SOAP\
    \ Fault: (faultcode: ' . $fault->faultcode . ', ' .\n\n                  'faultstring:\
    \ ' . $fault->faultstring . ')', E_USER_ERROR);\n\n}\n\n?>\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nThe whole SOAP request code is enclosed in a `try` block. If the SOAP request\
    \ fails, it throws an exception of the `SoapFault` type, which we transform into\
    \ an error using the `trigger_error()` function. Read more on the SOAP exception\
    \ at <http://www.php.net/manual/en/function.is-soap-fault.php>.\n\nThe result\
    \ of the SOAP request is an object containing the requested data. If you load\
    \ `test_soap.php` in your browser (don’t forget to put your Access Key ID in it),\
    \ it should display the data in a text format that’s not easy to read by the human\
    \ eye.\n\nThe code starts by creating a SOAP client object to the Amazon SOAP\
    \ Web Service:\n\n```php\n// Initialize SOAP client object\n$client = new SoapClient(\n\
    \    'http://webservices.amazon.com/AWSECommerceService/AWSECommerceService.wsdl');\n\
    ```\n\nThe referenced WSDL (Web Services Definition Language) file describes all\
    \ the functions and their parameters’ types that Amazon SOAP server understands.\
    \ The earlier created Amazon SOAP client object knows about all these functions,\
    \ and you can call them now using something like this:\n\n```php\n$result = $client->ItemSearch($request);\n\
    ```\n\nAlternatively, you can make the exact same call, and implicitly obtain\
    \ the same results, by using the `__soapCall` function (<http://www.php.net/manual/en/function.soap-soapclient-soapcall.php>),\
    \ like this:\n\n```php\n$result->__soapCall('ItemSearch', array ($request));\n\
    ```\n\nThe Web Service request does an `ItemSearch` operation on the `\"super+hats\"\
    ` keywords in the `\"Apparel\"` store. The whole request is placed in a `try-catch`\
    \ block that catches any potential exceptions and generates an error. Read more\
    \ on the `SoapFault` exception class, which contains the details of the SOAP error,\
    \ at <http://www.php.net/manual/en/function.is-soap-fault.php>. Loading `test_soap.php`\
    \ would generate the result shown in Figure 17-6.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00015.png)\n\n![](images/00083.png)\n\n![](images/00076.png)\n\n\
    ![](images/00127.png)\n\n![](images/00056.png)\n\n![](images/00154.png)\n\n![](images/00105.png)\n\
    \n![](images/00126.png)\n\n![](images/00166.png)\n\n![](images/00035.png)\n\n\
    ![](images/00148.png)"
