- fmt: "# Note\n\n**Note** The default database engine is set to `InnoDB`, instead\
    \ of `MyISAM`. There are a few differences between these two database storage\
    \ engines, which you need to consider when planning your application. You can\
    \ learn more about the differences between `InnoDB` and `MyISAM` here: [http://en.wikipedia.org/wiki/Comparison_of_MySQL_database_engines](http://www.en.wikipedia.org/wiki/Comparison_of_MySQL_database_engines).\
    \ I find that `InnoDB` is usually the one I want to go with, which is why it makes\
    \ a sane default value.\n\nYou will notice, therefore, that our MySQL connector\
    \ class, while allowing us to execute SQL strings, and giving us various bits\
    \ of useful information about recently executed SQL queries, does not actually\
    \ write any SQL!\n\nThat is the job of the `Query` class, which we will discuss\
    \ next.\n\n# Queries\n\nOne more important thing to notice, in the previous listing,\
    \ is that the `query()` method returns an instance of the `Database\\Query\\Mysql`\
