  \ e7login.php\");\n```\n\n#### 登录\n\n除了为用户提供创建自己用户 ID 和密码的功能外，应用程序还应提供修改密码的功能。设置密码有效期以限制密码使用时间，对于提升安全性非常有益。每次用户登录时，都可以对该值进行比较。如果当前日期比保存的日期早超过\
  \ `xx` 天，则要求用户更改密码。\n\n由于密码嗅探程序会尝试猜测密码，因此限制使用正确用户 ID 和密码组合的登录尝试次数也是一个好主意。这将降低密码嗅探程序生成正确组合的可能性。重要的是，在达到最大尝试次数后，在一定时间内不允许成功登录。尽管这会让用户感到沮丧，但它降低了密码嗅探程序发现正确组合的机会。如果程序不知道尝试已超时，即使它在\
