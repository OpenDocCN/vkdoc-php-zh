    `}`


    If the original image has been uploaded successfully, the new code adds a conditional
    statement to generate the message only if `$deleteOriginal` is `false`. It then
    calls the `createThumbnail()` method, passing it the uploaded image as the argument.
    Finally, if `$deleteOriginal` has been set to `true`, it uses `unlink(`) to delete
    the uploaded image, leaving only the thumbnail.


    Save `ThumbnailUpload.php`. To test it, copy `create_thumb_upload_01.php` from
    the `ch08` folder to the `gd` folder and save it as `create_thumb_upload.php`.
    The file contains a simple form with a file field and a PHP block that displays
    messages. Add the following PHP code block above the `DOCTYPE` declaration:


    `<?php`


    `use PhpSolutions\Image\ThumbnailUpload;`


    `if (isset($_POST[''upload''])) {`


    `require_once(''../PhpSolutions/Image/ThumbnailUpload.php'');`


    `try {`


    `$loader = new ThumbnailUpload(''C:/upload_test/'');`


    `$loader->setThumbDestination(''C:/upload_test/thumbs/'');`


    `$loader->upload();`


    `$messages = $loader->getMessages();`


    `} catch (Exception $e) {`


    `echo $e->getMessage();`


    `}`


    `}`


    `?>`


    Adjust the paths in the constructor and `setThumbDestination()` method, if necessary.


    Test the `ThumbnailUpload` class by uploading the same images again. This time,
    the original images and thumbnails should be renamed in the same way as in [Chapter
    6](#A978-1-4842-0635-5_6_Chapter.html) through the addition of a number before
    the filename extension.   Try different tests, changing the suffix inserted into
    the thumbnail names or deleting the original image after the thumbnail has been
    created. If you run into problems, check your code against `ThumbnailUpload.php`
    in the `ch08/PhpSolutions/Image` folder.


    ![A978-1-4842-0635-5_8_Fig7_HTML.jpg](A978-1-4842-0635-5_8_Fig7_HTML.jpg)


    Figure 8-7.


    The thumbnails are created at the same time as the images are uploaded Save `create_thumb_upload.php`
    and load it in a browser. Click the Browse or Choose Files button and select multiple
    images. When you click the Upload button, you should see messages informing you
    of the successful upload and creation of the thumbnails. Check the destination
    folders, as shown in Figure [8-7](#A978-1-4842-0635-5_8_Chapter.html#Fig7).  
    Tip


    In older browsers that don’t support the `multiple` attribute on form fields,
    the class uploads a single image and creates a thumbnail from it. To support multiple
    uploads from older browsers, create multiple file fields in the form and give
    them all the same `name` attribute followed by an empty pair of square brackets,
    like this: `name="image[]"`.


    ### Using the ThumbnailUpload Class


    The `ThumbnailUpload` class is easy to use. Because it uses a namespace, import
    the class at the top level of your file like this:


    `use PhpSolutions\Image\ThumbnailUpload;`


    Then include the class definition and pass the path for the upload folder to the
    class constructor method:


    `$loader = new ThumbnailUpload(''C:/upload_test/'');`


    If you want to delete the original image after the thumbnail has been created,
    pass `true` as the second argument to the constructor, as follows:


    `$loader = new ThumbnailUpload(''C:/upload_test/'',` `true` `);`


    The class has the following public methods:


    *   `setThumbDestination()`: This sets the path to the folder where the thumbnail
    images are to be saved. If you don’t call this method, the thumbnails are stored
    in the same folder as the original images.

    *   `setThumbSuffix()`: Use this to change the suffix inserted into the thumbnail
    names. The default is `_thb`.

    *   `upload()`: This uploads the original image(s) and generates the thumbnail(s).
    By default, images that have the same name as an existing one are renamed. To
    overwrite existing images, pass `false` as an argument to this method.

    *   The class also inherits the following methods from the parent `Upload` class:

    *   `getMessages()`: Retrieves messages generated by the upload and the thumbnail.

    *   `getMaxSize()`: Gets the maximum upload size for an individual image. The
    default is 50 KB.

    *   `setMaxSize()`: Changes the maximum upload size. The argument should be expressed
    as the number of bytes permitted.


    Because the `ThumbnailUpload` class is dependent on the `Upload` and `Thumbnail`
    classes, you need to upload all three class definition files to your remote web
    server when using this class on a live website.


    ## Chapter Review


    This has been another intense chapter, showing not only how to generate thumbnails
    from larger images, but also introducing you to extending an existing class and
    overriding inherited methods. Designing and extending classes can be confusing
    at first, but it becomes less intimidating if you concentrate on what each method
    is doing. A key principle of class design is to break large tasks down into small,
    manageable units. Ideally, a method should perform a single task, such as creating
    the image resource for the original image.


    The real advantage of using classes is the time and effort they save once you
    have defined them. Instead of typing dozens of lines of code each time you want
    to add file or thumbnail upload functionality to a website, calling the class
    involves just a few simple lines. Also, don’t think of the code in this chapter
    as being exclusively for creating and uploading thumbnail images. Many of the
    subroutines in the class files could be adapted for use in other situations.


    In the next chapter, you’ll learn all about PHP sessions, which preserve information
    related to a specific user and play a vital role in password-protecting webpages.'
  trans: "\n# 使用 `ThumbnailUpload` 类\n\n在父类中，`moveFile()` 方法会将上传的文件保存到目标位置。缩略图需要从原始图像生成，因此你需要重写父类的\
