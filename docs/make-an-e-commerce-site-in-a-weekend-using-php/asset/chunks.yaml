    \n-   设置图片的高度和宽度\n-   隐藏有序列表和无序列表的列表项标记（圆形、方形等）\n-   设置下拉菜单的高度和底部边框\n-   设置下拉菜单的宽度和边距\n\
    -   移除菜单和子菜单中显示的链接的默认下划线\n-   设置列表项（即子菜单选项）在下拉菜单中向左浮动，并保留右侧的外边距\n-   设置文本的高度、内边距（相对于下拉框边界）、前景色和背景色，并移除链接的默认下划线\n\
    -   设置当鼠标悬停在菜单和子菜单选项上时文本的背景色和前景色\n\n使用`style.css`中应用了 CSS 样式的`menu.php`脚本运行时，你将得到图\
    \ 3-2 所示的下拉菜单。\n\n![A978-1-4842-1672-9_3_Fig2_HTML.jpg](img/A978-1-4842-1672-9_3_Fig2_HTML.jpg)\n\
    \n图 3-2. 显示不同产品类别的下拉菜单\n\n清单 3-1 中所示的`allitemslist.php`脚本会显示`products`表中定义的所有产品。该脚本运行良好，但用户会花费大量时间在列表中搜索他们想要的产品。那么，只显示用户从下拉菜单中选择的类别的产品如何？\n\
    \n清单 3-4 中所示的`itemlist.php`脚本正实现了此功能。它只显示用户从下拉菜单中选择其类别的产品。\n\n**清单 3-4.** 用于显示从下拉菜单中选择类别的产品的`itemlist.php`脚本\n\
    \n```php\n<?php\n\ninclude('menu.php');\n\n$connect = mysqli_connect(\"localhost\"\
    , \"root\", \"gold\", \"shopping\") or die(\"请检查您的服务器连接。\");\n\n$category=$_REQUEST['category'];\n\
    \n$query = \"SELECT item_code, item_name, description, imagename, price FROM products\
    \ \" .\n         \"where category like '$category' order by item_code\";\n\n$results\
    \ = mysqli_query($connect, $query) or die(mysql_error());\n\necho \"<table border=\\\
    \"0\\\">\";\n\n$x=1;\n\necho \"<tr>\";\n\nwhile ($row = mysqli_fetch_array($results,\
    \ MYSQLI_ASSOC))  {\n  if ($x <= 3) {  // #1\n    $x = $x + 1;\n    extract($row);\n\
    \    echo \"<td style=\\\"padding-right:15px;\\\">\";\n    echo \"<a href=itemdetails.php?itemcode=$item_code>\"\
    ;  // #2\n    echo '<img src=' . $imagename . ' style=\"max-width:220px;max-height:240px;width:auto;height:auto;\"\
    ></img><br/>';\n    echo $item_name .'<br/>';\n    echo \"</a>\";\n    echo '$'.$price\
    \ .'<br/>';\n    echo \"</td>\";\n  } else {\n    $x=1;\n    echo \"</tr><tr>\"\
    ;\n  }\n}\n\necho \"</table>\";\n\n?>\n\n</body>\n\n</html>\n```\n\n在脚本顶部，包含了另一个名为`menu.php`的脚本，以使下拉菜单出现在网站中。回顾一下，`menu.php`显示不同的产品类别。当用户选择一个类别时，导航会跳转到`itemlist.php`文件，同时所选的产品类别也会被传递。\n\
    \n所选的产品类别通过`$_REQUEST`数组访问，并赋值给类别变量。\n\n不出所料，建立到 MySQL 服务器的连接，以用户`root`身份登录，并选择`shopping`数据库来执行操作。执行一个\
    \ SQL 查询，从`products`表中获取与用户选择的类别相匹配的所有产品。获取到的行被赋值给`results`记录集。从`results`记录集中，产品被逐个赋值并显示在屏幕上。\n\
    \n此脚本设置为每行只显示三个产品；因此，使用变量`x`（参见语句#1）使得每行仅显示三个产品。您始终可以更改变量`x`的值，以显示您希望在一行中展示的产品数量。\n\
    \n所显示的信息是产品图片、名称和价格。为了让用户能够查看详细的产品信息，通过语句#2 在产品图片和名称上创建了超链接。这意味着，如果用户点击任何产品的图片或名称，导航将跳转到`itemdetails.php`脚本，该脚本将显示该产品的更多详细信息。在导航到`itemdetails.php`脚本时，所选产品的代码也会被传递。而`itemdetails.php`脚本将使用该产品代码从`products`表中获取更多产品信息，例如其描述和特性。产品以图\
    \ 3-3 所示的格式显示。您可以看到每行只显示三个产品，并且产品图片和名称上已创建超链接。\n\n![A978-1-4842-1672-9_3_Fig3_HTML.jpg](img/A978-1-4842-1672-9_3_Fig3_HTML.jpg)\n\
    \n图 3-3. 显示网站上所有在售智能手机的网页\n\n查看图 3-3 所示的输出时，您会发现缺少了一些重要的东西，那就是网站页眉。页眉不仅显示网站名称和搜索框，还展示了常用的图标和链接。\n"
- fmt: "# Adding a Web Site Header\n\nTo display the web site header, you'll modify\
    \ the `menu.php` script shown in Listing 3-2 to appear as the `topmenu.php` script\
    \ shown in Listing 3-5. Only the code in bold is new; the rest of the code is\
    \ same as you saw in Listing 3-2.\n\nListing 3-5. The `topmenu.php` script for\
    \ displaying headers for the e-commerce site, including the drop-down menu\n\n\
    ```html\n<!DOCTYPE html>\n<head>\n<meta charset=\"utf-8\">\n<title>Bintu Online\
