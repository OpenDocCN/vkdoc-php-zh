    #### PHP Solution 5-5: Building the message Body and Sending the Mail


    Many PHP tutorials show how to build the message body manually like this:


    `$message = "Name: $name\r\n\r\n";`


    `$message .= "Email: $email\r\n\r\n";`


    `$message .= "Comments: $comments";`


    This adds labels to identify which field the input comes from and inserts two
    carriage returns and newline characters between each one. This is fine for a small
    number of fields, but it soon becomes tedious with more fields. As long as you
    give your form fields meaningful `name` attributes, you can build the message
    body automatically with a `foreach` loop, which is the approach taken in this
    PHP solution.


    Caution


    The `name` attribute must not contain spaces. To use multiple words to name form
    fields, join them with an underscore or hyphen; for example, `first_name` or `first-name`.


    Continue working with the same files as before. Alternatively, use `contact_05.php`
    and `includes/processmail_03.php` from the `ch05` folder.


    Add the following code at the bottom of the script in `processmail.php`:


    `$mailSent = false;`


    This initializes a variable that will be used to redirect the user to a thank
    you page after the mail has been sent. It needs to be set to `false` until you
    know the `mail()` function has succeeded.


    Now add the code that builds the message. It goes immediately after the variable
    you just initialized:


    `// go ahead only if not suspect, all required fields OK, and no errors`


    `if (!$suspect && !$missing && !$errors) {`


    `// initialize the $message variable`


    `$message = '''';`


    `// loop through the $expected array`


    `foreach($expected as $item) {`


    `// assign the value of the current item to $val`


    `if (isset(${$item}) && !empty(${$item})) {`


    `$val = ${$item};`


    `} else {`


    `// if it has no value, assign ''Not selected''`


    `$val = ''Not selected'';`


    `}`


    `// if an array, expand as comma-separated string`


    `if (is_array($val)) {`


    `$val = implode('', '', $val);`


    `}`


    `// replace underscores and hyphens in the label with spaces`


    `$item = str_replace([''_'', ''-''], '' '', $item);`


    `// add label and value to the message body`


    `$message .= ucfirst($item).": $val\r\n\r\n";`


    `}`


    `// limit line length to 70 characters`


    `$message = wordwrap($message, 70);`


    `$mailSent = true;`


    `}`


    This is another complex block of code that you might prefer to just copy and paste.
    Still, you need to know what it does. In brief, the code checks that `$suspect`,
    `$missing`, and `$errors` are all `false`. If they are, it builds the message
    body by looping through the `$expected` array, storing the result in `$message`
    as a series of label/value pairs.


    The key to understanding how this code works lies in the following conditional
    statement:


    `if (isset(${$item}) && !empty(${$item})) {`


    `$val = ${$item};`


    `}`


