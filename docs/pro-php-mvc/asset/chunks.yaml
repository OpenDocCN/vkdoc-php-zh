    MAC OS X


    In this section, we will cover the installation process in OS X. The installation
    of these software packages is commonly known as MAMP (**M**ac **A**pache **M**ySQL
    **P**HP).


    Step 1


    Installing our OS X web server is really simple. Begin by going t[o http://www.mamp.info/en/downloads/](http://www.mamp.info/en/downloads/%0aindex.html)


