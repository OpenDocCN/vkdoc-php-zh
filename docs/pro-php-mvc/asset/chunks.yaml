    CHAPTER 12 ■ STRuCTuRE


    The public folder will hold all the publicly accessible files, which are not directly
    loading in the course of the application’s execution. This includes images, JavaScript
    files, and cascading style sheets.


    One interesting thing to notice is that our application tests are kept in the
    public folder. We do this to keep our tests completely separate from both our
    framework and application code bases. Our tests will ultimately use framework
    code and test both framework/application code, but it is important to try and
    keep all these aspects (tests, framework, and application) separate.


    Questions


    1\. We have defined a rough structure for the database tables/data objects in
    our social network. What is the significance in planning data structures before
    we begin coding?


    2\. The folder structure we use depends largely on the kind of application we’re
    building.


    Why do we need to decide this when it is likely to change, in varying degrees,
    for each application we begin to develop?


    Answers


    1\. The more time spent planning any application, the smoother the development
    will progress. This is even more apparent in an MVC application. When our application
    uses a database, we’re not merely using PHP to query the database; we’re building
    models and interacting with the database as if it were any other class. We need
    to know, beforehand, what those classes should look like.


    2\. The folder structure is important in two areas. The first is that it keeps
