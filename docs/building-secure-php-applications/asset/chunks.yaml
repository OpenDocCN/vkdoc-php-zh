  trans: '

    ### 供应商与应用程序支持


    我们来探讨一下保持 PHP 版本更新的重要性，尤其是在供应商和应用程序支持的背景下。许多应用程序和内容管理系统（CMS）都有特定的 PHP 版本要求，以确保其正常运行和安全。保持
    PHP 版本更新对于确保兼容性、利用最新功能和安全改进至关重要。


    应用程序和 CMS 平台通常会为其软件指定最低和推荐的 PHP 版本。设定这些要求是为了确保软件能够高效、安全地运行。通过遵循这些版本要求，我们可以避免因使用不受支持的
    PHP 版本而可能产生的问题。这可以确保应用程序或 CMS 的功能按预期工作，提供流畅的用户体验。


    紧跟 PHP 版本更新也意味着我们可以利用新版本中引入的最新功能。这些功能可能包括性能、安全性和开发效率方面的改进。例如，新的 PHP 版本可能提供增强的语法、更好的错误处理或更高效的函数，所有这些都有助于编写更简洁、更易于维护的代码。


    新 PHP 版本中的安全改进是另一个关键方面。供应商和应用程序开发者通常会发布依赖于最新 PHP 版本所提供安全增强功能的更新和补丁。通过保持 PHP 版本最新，我们可以确保应用程序受益于这些安全改进，从而降低漏洞和被利用的风险。


    运行受支持的 PHP 版本可以确保我们能够及时获得所使用的应用程序和 CMS 平台供应商的支持与更新。如果我们遇到问题或需要帮助，只要我们的环境满足他们的版本要求，供应商就更有可能提供支持。使用过时的
    PHP 版本可能会导致难以获得支持，因为供应商可能不会解决与不受支持版本相关的问题。


    在 CMS 的背景下，使用最新的 PHP 版本可以增强我们网站的整体安全性和性能。像 WordPress、Joomla 和 Drupal 这样的内容管理系统会定期更新其平台，以利用最新的
    PHP 特性和安全补丁。通过保持 PHP 更新，我们可以确保 CMS 以最佳状态、安全地运行，保护我们的网站及其数据。


    保持 PHP 版本更新对于确保与我们使用的软件和应用程序的兼容性至关重要。它使我们能够利用最新的功能和安全改进，同时确保我们能从供应商那里获得及时支持。定期更新
    PHP 应成为我们维护安全、高效且得到良好支持的应用环境策略中的关键部分。


    ## 安全的 PHP 配置


    PHP 配置指的是控制 Web 服务器上 PHP 脚本语言行为和功能的设置与参数。作为一种常用于 Web 开发的服务器端脚本语言，PHP 可以根据 Web
    应用程序的具体需求进行配置。这些配置设置通常定义在配置文件中，并且可以在服务器级别和应用程序级别进行调整。


    理解和实施安全的 PHP 配置对于维护 Web 应用程序的安全性和性能至关重要。通过正确配置 PHP，我们可以减轻潜在的漏洞，并确保服务器高效运行。PHP
    配置的一个重要方面是设置适当的错误报告级别。在生产服务器上显示错误可能会向攻击者泄露敏感信息。与其显示错误，不如将它们记录到日志中，这有助于在不危及安全的情况下进行故障排查。


    例如，假设您有一个处理用户数据的 Web 应用程序。如果发生错误并且应用程序显示了错误信息，它可能会泄露您的数据库结构或其他敏感细节。通过将错误记录到日志，您可以将这些信息保密，同时仍然能够诊断和修复问题。


    图 2-2 描述了围绕 PHP 配置的关键方面。


    ![图 2-2：与安全性相关的 PHP 配置关键方面](img/609480_1_En_2_Fig2_HTML.jpg)


    **图 2-2**：与安全性相关的 PHP 配置关键方面


    ### php.ini


    我们来深入探讨安全的 PHP 配置，这是确保我们的 Web 应用程序平稳安全运行的一个关键方面。将 PHP 配置想象成我们给 PHP 服务器的指令，告诉它应该如何运作。PHP
    的主要配置文件叫做 `php.ini`。这个文件包含了一系列影响 PHP 运行方式的设置，包括错误报告、资源限制、安全特性和扩展（模块）。您可以在 Web
    服务器上找到 `php.ini` 文件，通常在 Linux 系统的 `/etc/php/` 目录下或 Windows 系统的 `C:\php\` 目录中。


    ### 指令


    PHP 的配置设置被称为指令。这些指令控制着 PHP 的各个方面，例如内存限制、文件上传限制、错误显示、数据库连接等等。每个指令都有一个名称、一个值和一个作用域（例如，全局、按目录或按脚本）。您可以在
    `php.ini` 文件中更改这些指令的值，或者在应用程序代码中使用 `ini_set()` 函数进行更改。


    想象一下您正在经营一家柠檬水小摊，需要决定每加仑水用多少糖。指令就像是食谱中的一条说明：“每加仑水使用两杯糖。”如果您只想为某一批柠檬水做得更甜，您可以单独为那一批调整这个说明，就像为特定脚本使用
    `ini_set()` 一样。


    ### 按目录配置


    除了全局的 `php.ini` 文件，您还可以在 Apache Web 服务器的 `.htaccess` 文件中，或在某些环境下的 `.user.ini`
    文件中，设置按目录的 PHP 配置。这些按目录的设置可以覆盖特定目录或应用程序的全局设置。


    这就像为我们房子的不同房间制定不同的规则。厨房可能有“保持冰箱门关闭”的规则，而客厅则有“始终保持窗帘打开”的规则。类似地，按目录配置允许我们为应用程序的不同部分定制
    PHP 设置。


    ### 运行时配置


    我们还可以在运行时使用 `ini_set()` 等函数或通过修改配置数组 `$_SERVER[''PHP_INI_USER'']` 来动态调整 PHP 配置。想象一下您在玩一个电子游戏，您可以在游戏中途更改难度级别。使用
    `ini_set()` 就像在游戏过程中即时更改设置，让游戏变得更简单或更困难。


    ### 扩展


    PHP 可以通过各种模块和扩展进行扩展，以启用特定的功能。有些扩展是默认包含的，而另一些则需要显式启用或安装。这些扩展可能有它们自己的配置设置。


    把扩展想象成给我们的厨房添加新工具。我们可能从一套基本的锅碗瓢盆（默认扩展）开始，但如果想要做意大利面，我们可能需要添加一台制面机（额外的扩展）。每个新工具都可能附带一套自己的使用说明。


    ### 安全


    PHP 配置对于维护 Web 应用程序的安全性至关重要。我们可以控制 `register_globals`、`open_basedir` 等功能，并禁用危险函数来增强安全性。


    例如，想象一下我们的柠檬水小摊有一个安全系统。我们制定了一些规则，比如“不要让陌生人进入柜台后面”（禁用危险函数）和“只在厨房里混合配料”（设置 `open_basedir`）。这些规则有助于保护我们的柠檬水小摊（以及我们的
    PHP 应用程序）的安全。

    '
- fmt: '### Common Settings


    Some common PHP configuration settings include `display_errors` (to control error
    reporting), `max_execution_time` (to limit script execution time), `memory_limit`
    (to restrict memory usage), and many others. Picture our lemonade stand again.
    `display_errors` is like deciding whether to put up a sign saying "Oops, we''re
    out of lemons!" in front of customers. `max_execution_time` is like setting a
    timer for how long we let the lemonade mix. `memory_limit` is like limiting the
    number of lemons we can use in one go.


    Understanding PHP configuration helps us optimize the performance and security
    of our web applications, ensuring they work as expected. However, we should be
    cautious when modifying configuration settings, as misconfigurations can lead
    to security vulnerabilities or unexpected behavior in our applications. Now that
    we have a basic understanding of what configurations are in PHP and how they work,
    let''s focus on how some of these configurations help us enhance security. For
    a more extensive look at all available configurations, we can always refer to
    the PHP manual.


    [The PHP manual](https://www.php.net/manual/en/ini.core.php) can be referred for
    an extensive look at all available configurations.


    PHP configurations play a significant role in enhancing the security of web applications.
    Properly configuring PHP settings can help protect your application against various
    security threats and vulnerabilities. Let''s discuss some specific examples of
    how PHP configurations can improve security.


    ### Error Reporting (`display_errors`, `error_reporting`)


    Properly configuring error reporting settings can help prevent sensitive information
    from being exposed to potential attackers. By setting `display_errors` to "Off"
    and configuring `error_reporting` to report only essential errors, you can ensure
    that error messages do not leak critical information about your application, such
    as database credentials or server paths.


    For example: Imagine your website is a shop with a back office where staff work.
    If the office door (error reporting) is left wide open and anyone can see inside,
    customers might accidentally see sensitive information like employee schedules
    or stock levels. By closing the door (setting `display_errors` to "Off") and only
    allowing essential staff inside (using `error_reporting` wisely), you keep this
    information secure.


    ![](images/609480_1_En_2_Chapter/609480_1_En_2_Figa_HTML.jpg)


    Example:


    ```php

    display_errors = Off

    error_reporting = E_ALL & ~E_NOTICE & ~E_WARNING

    ```


    Let''s go through each of the PHP configuration settings in Figure [2-3](#609480_1_En_2_Chapter.xhtml#Fig3)
    in the context of their security implications.


    ### `expose_php = Off`


    Setting `expose_php` to "Off" is a security best practice. When exposed, PHP information,
    such as the PHP version and server information, can be visible in HTTP response
    headers. This information can be exploited by attackers to identify potential
    vulnerabilities or outdated software. By turning off the exposure of PHP, you
    make it more challenging for attackers to gather information about your server''s
    configuration.


    For example: Imagine your house number (PHP version) is prominently displayed
    on your front door. If a thief knows which houses have outdated security systems
    based on house numbers, they can target those houses. By hiding your house number
    (setting `expose_php` to "Off"), you make it harder for thieves to figure out
    your security setup.


    ![](images/609480_1_En_2_Chapter/609480_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    Request-response sequence displaying PHP version info exposure


    ### `error_reporting = E_ALL`


    This setting configures the level of error reporting. Setting it to `E_ALL` is
    quite permissive and will report all types of errors, including notices and warnings.
    While it''s valuable for development and debugging, in a production environment,
    you might want to reduce error reporting to a more minimal level (e.g., `error_reporting
    = E_ERROR`) to avoid revealing potentially sensitive information. Reducing error
    reporting can help prevent the disclosure of detailed error messages that could
    be used by attackers to gain insight into your application''s structure.


    For example: Imagine you''re running a restaurant and during training sessions
    (development), you allow your staff to discuss all mistakes openly to improve
    service (error reporting set to `E_ALL`). However, during dinner service with
    customers present (production), you only want to address critical issues that
    need immediate attention (error reporting set to `E_ERROR`) to maintain a professional
    and secure environment, preventing customers from overhearing any internal problems.


    ### `display_errors = Off`


    This setting controls whether PHP should display error messages in the browser.
    Setting `display_errors` to "Off" in a production environment is crucial for security.
    When errors are displayed in the browser, it can potentially reveal sensitive
    information about your code, such as file paths and variable values. Turning off
    the error display ensures that such details are not exposed to users or attackers.


    For example: Imagine your website is a restaurant kitchen. During staff training
    (development), you might discuss mistakes openly to learn from them. But during
    a busy dinner service (production), you wouldn''t want customers (users) to see
    or hear these discussions, as it could reveal sensitive information about your
    operations. By turning off error display (`display_errors = Off`), you keep such
    details hidden from view, maintaining a professional and secure environment.


    ### `display_startup_errors = Off`


    Similar to `display_errors`, `display_startup_errors` controls whether PHP should
    display errors that occur during the startup of PHP scripts (e.g., in the PHP
    configuration files). Keeping this setting as "Off" is recommended for security
    to prevent exposure of errors that could contain sensitive information related
    to server configuration.


    For example: Imagine your website is a restaurant and the kitchen setup (PHP startup)
    is crucial for the day''s operation. During the setup phase, mistakes might happen,
    but you wouldn''t want the customers (users) to see the kitchen staff (server
    configuration errors) sorting out these issues. By keeping `display_startup_errors`
    set to "Off", you ensure that any initial setup problems are not exposed to the
    public, maintaining a secure and professional appearance.


    ### `log_errors = On`


    Enabling `log_errors` is a security best practice. When set to "On," PHP will
    log errors to a file specified by `error_log` (which is the next setting). Logging
    errors is essential for security and troubleshooting, as it allows you to track
    and review errors without exposing them to end users. It provides a record of
    issues that can be used for analysis and debugging while keeping the information
    secure from prying eyes.


    Imagine your website is a school, and when something goes wrong, the teacher writes
    it down in a private notebook (error log). This way, the teacher can review the
    problems later and find solutions without the students (users) knowing about the
    issues. By keeping `log_errors` set to "On," you ensure that problems are documented
    securely for later analysis and fixing, without exposing sensitive information
    to the users.'
