- "# 5\\. 面向用户的软件\n\n在艰难地掌握了在非网页环境下开发 PHP 所需的预备知识后，我们现在要开始探讨如何在不借助网页浏览器渲染引擎的情况下与用户进行沟通。\n\
  \n有些软件可以在无人交互的情况下安静地运行，我们称之为“系统软件”，这将在第 6 章中讨论。然而，大部分软件都需要与用户进行交互，而 PHP 提供了多种实现交互的方式。从交互式命令行到功能完善的图形用户界面软件，PHP\
  \ 都能胜任。\n\n在选择软件与用户交互的方式时，你需要关注用户的需求，并尽可能地将个人偏好放在一边。命令行交互（通常）编码非常简单，文本嘛，就是文本而已，而这正是\
  \ PHP 的强项。然而，许多用户，尤其是非技术用户，往往会回避基于文本的命令行软件。除非你对软件结构和界面流程非常精心设计，否则基于文本的输入可能会：\n\n\
  *   容易出错\n*   难以导航\n*   需要用户具备一定的思维能力\n*   可发现性低\n*   并且初始使用速度比图形界面慢\n\n如果你选择基于文本的界面，请确保你的目标用户能够接受它（你可能觉得没问题，但你的用户通常和你不一样！）。由于编码简单，文本界面通常是概念验证和原型软件的不错选择（尤其是在应用程序的主要优势在于其功能，而非用户交互方式的情况下），但要注意，临时界面常常会“被保留下来”。此外，一些非技术的委托用户（这里不禁让人联想到“尖头发老板”）可能会只看到界面的表面，而无法关注底层的应用程序，即使你解释界面只是临时的，他们也可能对你的项目提案不满意。这在某种程度上是可以理解的，因为对于大多数用户来说，应用程序就是界面。这是他们日复一日看到和使用的一切。对文件和其他功能的更改当然“神奇地”发生了。良好的用户界面设计（无论是针对文本界面还是功能完善的图形界面）本身就是一个需要努力的领域，所以尽可能向专业人士寻求帮助，阅读一些关于该主题的众多书籍，或者参加相关课程。如果你曾经看着某个软件，纳闷它怎么如此流行，而你偏爱的、功能上优越得多的软件却默默无闻，那么答案往往至少有一部分要归功于良好的用户界面设计。\n\
  \n### 5.1 命令行界面基础\n\n如上所述，基于文本的界面仍有其用途，尤其是在用户具备技术能力的场景中。在创建基于文本的命令行程序时，除了你已熟悉的 PHP\
  \ 知识外，还有三个主要的考量因素。它们是：\n\n1.  获取键盘输入\n2.  向屏幕输出文本（和图形）\n3.  程序流程控制\n\n我们不单独描述每一个，而是通过一个包含这些要素的简单程序来逐一了解。请阅读下面的代码和注释。该程序是一个屏幕保护类的程序，通过一条类似蛇形蠕动的光标来用颜色填充终端。\n\
  \n```php\n 1 <?\n\n3 # 首先，我们会定义一些命名常量。\n  4 # 这些是 shell 转义码，用于格式控制。\n  5 # 将它们定义为命名常量有助于让代码更易读。\n\
  \n7 define(\"ESC\", \"\\033\");\n  8 define(\"CLEAR\", ESC.\"[2J\");\n  9 define(\"\
  HOME\", ESC.\"[0;0f\");\n\n11 # 我们会向用户输出一些指令。请注意，我们使用了\n 12 # fwrite 而非 echo。目的是将输出内容写回到\n\
  \ 13 # 用户可以看到的终端中。fwrite(STDOUT...) 写入的是\n 14 # php://stdout 流。而 echo（和 print）写入的是\
