    \ the function is called. After the\n    function is terminated, the static variable\
    \ is not removed from memory,\n    and the next time the function is called, that\
    \ variable is used\n    again.\n\n*   In some cases, a multiline string is used.\
    \ If so, a variable is\n    assigned an expression that begins with the `<<<`\n\
    \    instruction followed by some label. The text is entered without quotes\n\
    \    in multiple lines. The expression ends with the same label and a\n    semicolon.\
    \ That is the equivalent of a string in double quotes. If the\n    first occurrence\
    \ of the label is enclosed in single quotes, you get an\n    analog of a string\
    \ enclosed in single quotes.\n\n*   A set of functions is designed for working\
    \ with files. The `fopen()` function is used to open\n    a file. The first argument\
    \ specifies the full path to the file, and the\n    second argument specifies\
    \ the access mode. When the file has been\n    handled, it is closed using the\
    \ `fclose()` function.\n\n*   To import the contents of a file, the `require_once`\n\
    \    instruction is added to the program, after which you put the string with\n\
    \    the name of the imported file.\n\n7. Classes and Objects\n\n*—As you may\
    \ have gathered, I’m in big trouble.*\n\n*—You’re always in trouble.*\n\n—*ALF*\
    \ (TV series)\n\nThis chapter discusses how the principles of object-oriented\n\
    programming (OOP\nfor short) are implemented in PHP. Let’s start by introducing\
    \ the\nconcept of *classes* and *objects*. That is the\ncornerstone of the OOP\
    \ paradigm, and how the main conceptual points are\nlearned will largely determine\
    \ the success of using the broad features\nof PHP to create OOP projects.\n\n\
    The OOP Principles\nThe study of the OOP\nprinciples often begins with their enumeration:\n\
    *encapsulation*, *polymorphism*, and *inheritance*.\nThat may sound a little bit\
    \ scary. However, not everything is as scary\nas it seems at first glance. To\
    \ understand the concept of OOP, it makes\nsense to clarify what it is and why\
    \ you need it to create programs.\nThe OOP paradigm must imply a certain way of\
    \ organizing a program. In\nother words, OOP is about how to organize a program.\
    \ And here, an\nanalogy would help us.\nLet’s say there is a small café with a\
    \ kitchen, and you need to\norganize the work in the kitchen. The kitchen receives\
    \ orders from\nvisitors and prepares dishes following those orders. If the cafe\
    \ is not\nvery large and there are not many visitors, you need a chef to manage\n\
    the process for the successful operation of the kitchen. You also need\nto have\
    \ several assistant chefs. Each assistant chef is responsible for\npreparing a\
    \ specific dish or dishes. For example, one chef specializes\nin meat dishes,\
    \ another in fish dishes, the next one prepares salads, someone\nspecializes in\
    \ desserts, and so on. One or more refrigerators can be\nused to store food, and\
    \ all chefs store products there and use those\nproducts to prepare meals. All\
    \ chefs have access to all refrigerators.\nThe distribution of tasks to the assistant\
    \ chefs is the responsibility\nof the main chef. The main chef also controls the\
    \ contents of the\nrefrigerators: are there all the products, and are their quantities\n\
    sufficient?\n\nA circular icon\nwith a letter i at the center.Note\n\nEven if,\
    \ in reality, the work of a kitchen is organized differently,\nit does not matter.\
    \ The example is illustrative; you just need to\nexplain the difference in approaches,\
    \ but not to organize the work of a\nreal kitchen.\n\nLet’s compare how a kitchen\
    \ works to how a program works. Assistant\nchefs are analogous to functions, and\
    \ food\nstored in the refrigerator is analogous to data. The overall goal is to\n\
    “connect” the data and the “functionality” associated with processing\nthat data.\
    \ In “culinary” language, that means you need to define for\neach assistant chef\
    \ the functional responsibilities and the products\nthey can use in their work.\n\
    Let’s say you make everything right, and the kitchen operates like a\nclock. What\
    \ can break the situation? One of the main reasons is the\nexpansion of the “enterprise.”\
    \ In a programming language, an increase in\nthe amount of code. Imagine that\
    \ there are a lot of visitors, and the\nkitchen is huge—lots of assistant chefs,\
    \ lots of refrigerators.\nUnavoidably, problems will arise due to someone incorrectly\
    \ taking an\norder, collecting another chef’s products, or dropping out of the\n\
    process. That is a pure scaling problem. It can be solved by changing\nthe structure\
    \ of production. Namely, let’s divide the kitchen into\ndepartments. Each department\
    \ has its own specialization. Products in\neach department are stored in separate\
    \ refrigerators. Each department\nhas its own main chef. That may increase staff\
    \ and overall costs, but it\nmakes the kitchen more reliable since some problems\
    \ are automatically\nremoved due to how the production is organized. For example,\
    \ if the\nrefrigerator is located in the fish department, no one from the meat\n\
    department can access it.\nWhat is important in this new model? The important\
    \ thing is that you\nuse a system of departments that interact with each other.\
    \ Previously,\nin the original scheme, individual assistant chefs interacted with\
    \ each\nother. As part of the new approach, the chefs also interact with each\n\
    other within the department. At the next level, there is an interaction\nbetween\
    \ departments. You can do the same with the program. Namely, you\ncan organize\
    \ it as an interaction of some blocks which contain the data\nand which can process\
    \ that data. Such blocks are called\n*objects*. The scheme itself describes the\
    \ paradigm of\nobject-oriented programming (OOP).\n\nA circular icon\nwith a letter\
    \ i at the center.Note"
