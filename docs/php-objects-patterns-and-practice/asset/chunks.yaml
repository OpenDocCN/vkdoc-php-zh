    您提出一种支持变量、名为 `equals` 的操作符以及布尔逻辑（`or` 和 `and`）的语言。程序员喜欢给东西命名，所以我们可以称它为 MarkLogic。它应该易于扩展，因为您预见到会有大量关于更丰富功能的请求。让我们暂时将解析输入的细节放在一边，专注于一种在运行时将这些元素组合在一起以产生答案的机制。正如您所料，这就是**解释器模式**发挥作用的地方。


    ### 实现


    语言由表达式（即，能解析为一个值的对象）组成。如表 11-1 所示，即使是像 MarkLogic 这样的小型语言也需要跟踪大量元素。


    **表 11-1。MarkLogic 语法的元素**


    | 描述 | EBNF 名称 | 类名 | 示例 |

    | --- | --- | --- | --- |

    | 变量 | `variable` | `VariableExpression` | `$input` |

    | 字符串字面量 | `<stringLiteral>` | `LiteralExpression` | `"four"` |

    | 布尔与 | `andExpr` | `BooleanAndExpression` | `$input equals ''4'' and $other equals
    ''6''` |

    | 布尔或 | `orExpr` | `BooleanOrExpression` | `$input equals ''4'' or $other equals
    ''6''` |

    | 相等性测试 | `eqExpr` | `EqualsExpression` | `$input equals ''4''` |


    表 11-1 列出了 EBNF 名称。那么 EBNF 到底是关于什么的？它是一种可以用来描述语言语法的记法。EBNF 代表**扩展巴科斯-瑙尔范式**。它由一系列行（称为产生式）组成，每一行包含一个名称和一个描述，该描述采用引用其他产生式和终止符（即，不由其他产生式引用构成元素）的形式。以下是一种使用
    EBNF 描述我语法的方法：


    ```

    expr     = operand { orExpr | andExpr }

    operand  = ( ''('' expr '')'' | ? string literal ? | variable ) { eqExpr }

    orExpr   = ''or'' operand

    andExpr  = ''and'' operand

    eqExpr   = ''equals'' operand

    variable = ''$'' , ? word ?

    ```


    某些符号具有特殊含义（这应该与正则 `Expression` 记法类似）：例如，`|` 表示或。您可以使用括号对元素进行分组。因此，在示例中，一个表达式（`expr`）由一个操作数（`operand`）后跟零个或多个
    `orExpr` 或 `andExpr` 组成。一个操作数可以是括号内的表达式、带引号的字符串（我省略了它的产生式）、或者一个变量后跟零个或多个 `eqExpr`
    实例。一旦您掌握了从一个产生式引用到另一个产生式的窍门，EBNF 就变得相当容易阅读。


