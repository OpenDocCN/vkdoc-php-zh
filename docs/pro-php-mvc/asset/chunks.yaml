- fmt: "# This new autoloader function is not particularly tricky, but it does need\
    \ to be placed above the call to `Core::initialize()`. The reason for this is\
    \ that we have told `Core::_autoload()` to raise an exception when it can’t find\
    \ a class file. If `Core::_autoload()` is run before this new autoloader method,\
    \ an exception will be raised.\n\nAt this point, we can start using the `Imagine`\
    \ classes (as demonstrated in their documentation). Because we already have a\
    \ `Files` controller, we will add a new `thumbnails()` action to it, and make\
    \ it navigable by adding the custom route shown in Listing 19-10.\n\n**Listing\
    \ 19-10.** Custom Thumbnails Route\n\n```php\narray(\n    \"pattern\" => \"thumbnails/:id\"\
    ,\n    \"controller\" => \"files\",\n    \"action\" => \"thumbnails\"\n)\n```\n\
    \nWith this route in place, we can now create (and use) the `thumbnails()` action,\
    \ as demonstrated in Listing 19-11.\n\n**Listing 19-11.** The `thumbnails()` Action\n\
    \n```php\nuse Shared\\Controller as Controller;\nuse Fonts\\Proxy as Proxy;\n\
    use Fonts\\Types as Types;\n\nclass Files extends Controller\n{\n    public function\
    \ thumbnails($id)\n    {\n        $path = APP_PATH.\"/public/uploads\";\n    \
    \    $file = File::first(array(\n            \"id = ?\" => $id\n        ));\n\
    \        if ($file)\n        {\n            $width = 64;\n            $height\
    \ = 64;\n            $name = $file->name;\n            $filename = pathinfo($name,\
    \ PATHINFO_FILENAME);\n            $extension = pathinfo($name, PATHINFO_EXTENSION);\n\
    \            if ($filename && $extension)\n            {\n                $thumbnail\
    \ = \"{$filename}-{$width}x{$height}.{$extension}\";\n                if (!file_exists(\"\
    {$path}/{$thumbnail}\"))\n                {\n                    $imagine = new\
    \ Imagine\\Gd\\Imagine();\n                    $size = new Imagine\\Image\\Box($width,\
    \ $height);\n                    $mode = Imagine\\Image\\ImageInterface::THUMBNAIL_OUTBOUND;\n\
    \                    $imagine\n                        ->open(\"{$path}/{$name}\"\
    )\n                        ->thumbnail($size, $mode)\n                       \
    \ ->save(\"{$path}/{$thumbnail}\");\n                }\n                header(\"\
    Location: /uploads/{$thumbnail}\");\n                exit();\n            }\n\
    \            header(\"Location: /uploads/{$name}\");\n            exit();\n  \
    \      }\n    }\n}\n```\n\nThe `thumbnails()` action begins with an attempt to\
    \ find the `File` database row matching the provided `$id`. If no row is found,\
    \ no thumbnail is returned. It then proceeds to split the `$file->name` into `$filename`\
    \ and `$extension`. This is so that a thumbnail file name can be constructed.\n\
    \nIf the thumbnail already exists, the browser is simply redirected to it, avoiding\
    \ any further execution of code.\n\nIf it does not exist, we create a new `Imagine\\\
    Gd\\Imagine` instance and use it to a) open the uploaded photo, b) resize the\
    \ photo into a thumbnail of `$width` and `$height`, and c) save the thumbnail\
    \ file.\n\n**Note:** You can get more details about how to use these methods/properties\
    \ at:\n[http://imagine.readthedocs.org/en/latest/index.html](http://imagine.readthedocs.org/en/latest/index.html)\n\
    \nThe only thing left to do is modify the `search.html` and `profile.html` templates\
    \ to use the new thumbnail files. Listing 19-12 shows how we accomplish this.\n\
    \n**Listing 19-12.** `application/views/users/profile.html` (Extract)\n\n```html\n\
    {script $file = $user->file}\n{if $file} <img src=\"/thumbnails/{echo $file->id}\"\
    \ />{/if}\n```\n\nWe now know how to build our own reusable application libraries,\
    \ as well as how to integrate third-party libraries into our applications.\n\n\
    ## Observer\n\nIn Chapter 1, we learned about some of the design patterns we are\
    \ using in our framework. In this chapter we will see another of those in action,\
    \ specifically the Observer pattern. A brief summary of the Observer pattern is\
    \ that receivers wait for the state of something to change (an event), and senders\
    \ notify receivers (emit an event) of changes in state.\n\n## Synchronicity\n\n\
    There are many things that separate modern programming languages (and platforms).\
    \ One difference that has recently picked up a lot of attention is the distinction\
    \ modern platforms make between synchronous (sometimes threaded) and asynchronous\
    \ (sometimes multithreaded or nonthreaded) execution of code.\n\nSynchronous languages/platforms\
    \ are those in which code is executed in a linear manner, each statement concluding\
    \ before execution of the next statement can begin. Consider the example shown\
    \ in Listing 19-13."
