    • We need to learn how to create the architectural requirements for our sample
    application.


    Why Zend Framework?


    Zend Framework is extremely well structured and includes many interfaces to popular
    third-party services. The philosophy behind the framework is that it should include
    80 percent of the functionality everyone needs, while letting developers customize
    the other 20 percent to meet their specific business requirements.


    The documentation for Zend Framework is extensive and also covers the intricacies
    of all the API classes provided alongside the core classes. It also includes numerous
    examples for the general-purpose use of the bundled classes.


