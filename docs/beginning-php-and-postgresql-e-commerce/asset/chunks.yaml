  trans: "\n# 安装支持 SSL 的 Apache\n\n以下步骤将在 80 端口安装 Apache，因此必须确保没有其他 Web 服务器（如 IIS）在该端口运行。\n\
    \n1. 从 `http://www.apachelounge.com/download/` 下载 `httpd-2.2.3-win32-x86-ssl.zip`\
    \ 或更新版本。\n2. 解压存档，按照 `Read Me First.txt` 中的步骤操作。Apache 将安装在 `C:\\Apache2` 目录下，但此时\
    \ `https://localhost` 尚无法响应——还需执行以下步骤。\n3. 将 `C:\\Apache2\\bin` 中的 `ssleay32.dll`\
    \ 和 `libeay32.dll` 复制到 Windows 安装目录的 `System32` 文件夹中（通常完整路径为 `C:\\Windows\\System32`）。\n\
    4. 打开命令提示符窗口，通过类似 `cd C:\\Apache2\\bin` 的命令导航至 Apache 安装目录的 `C:\\Apache2\\bin`\
    \ 文件夹。\n5. 执行以下命令，可根据需要将 `hatshop.csr` 替换为其他名称（但请务必保留 `.csr` 扩展名）：\n   ```\n \
    \  openssl req -config C:\\Apache2\\conf\\openssl.cnf -new -out hatshop.csr\n\
    \   ```\n6. 当提示输入\"通用名称（即您的网站域名）\"时，请提供 Web 服务器的准确域名（例如 `www.example.com`）。如果证书中的名称与\
    \ URL 不严格匹配，浏览器会向用户显示警告信息。\n7. 执行以下命令：\n   ```\n   openssl rsa -in privkey.pem\
    \ -out hatshop.key\n   ```\n8. 执行以下命令：\n   ```\n   openssl x509 -in hatshop.csr\
    \ -out hatshop.crt -req -signkey hatshop.key -days 365\n   ```\n9. 在 Apache 文件夹中创建名为\
    \ `C:\\Apache2\\conf\\ssl` 的目录，并将 `hatshop.key` 和 `hatshop.crt` 移动至该目录。\n10. 打开\
    \ `C:\\Apache2\\conf\\httpd.conf`，取消以下两行的注释：\n    ```\n    LoadModule ssl_module\
    \ modules/mod_ssl.so\n    Include conf/extra/httpd-ssl.conf\n    ```\n11. 打开 `C:\\\
    Apache2\\conf\\extra\\httpd-ssl.conf`，找到 `SSLCertificateFile c:/Apache2/conf/server.crt`\
    \ 并将其更改为 `SSLCertificateFile c:/Apache2/conf/ssl/hatshop.crt`。\n12. 同样在 `httpd-ssl.conf`\
    \ 中，找到 `SSLCertificateKeyFile c:/Apache2/conf/server.key` 并将其更改为 `SSLCertificateKeyFile\
    \ c:/Apache2/conf/ssl/hatshop.key`。\n13. 重启 Apache，并访问 `https://localhost`。您将看到一个简单的\"\
    It Works\"页面。\n\n## 安装 Apache（无 SSL）\n\n如果您已安装支持 SSL 的 Apache，则无需执行以上步骤，可直接跳至下一节安装\
    \ PHP。\n\n从 `http://httpd.apache.org/download.cgi` 下载 Apache HTTP Server 的最新 Win32\
    \ 二进制版本（MSI 安装程序）。文件名称类似 `apache_2.x.y-win32-x86-no_ssl.msi`。运行该文件。\n\n安装过程中，您可以选择\
    \ Apache Web 服务器的安装位置。默认位置为 `C:\\Program Files\\Apache Software Foundation\\Apache2.2\\\
    `，但您可以选择更方便的路径（例如 `C:\\Apache2`），这能让您在后续使用 Apache 时更轻松。\n\n接受许可协议并阅读简介后，系统会要求您输入服务器信息（见图\
    \ A-1）。\n\n**图 A-1.** *安装 Apache*\n\n如果不确定如何填写表单，只需在前两个字段中使用 `localhost`，并在最后一个字段中输入电子邮件地址。您之后可以通过编辑\
    \ `httpd.conf` 文件（默认位于 `C:\\Program Files\\Apache Software Foundation\\ApacheX.Y\\\
    conf\\httpd.conf`）来修改这些信息。\n"
- fmt: "If you already have a web server (such as IIS) working on port 80, you’ll\
    \ need to install Apache on a different port. During installation, you have an\
    \ option that specifies Apache should work “only for Current User, on Port 8080,\
    \ when started manually.” If you choose that option, you will need to start the\
    \ Apache service manually by going to the folder you installed Apache to (by default,\
    \ `C:\\Program Files\\Apache Software Foundation\\Apache2.2\\bin`), and typing\
    \ the following:\n\n```\napache -k install\n```\n\nYou can use the default options\
    \ in the other screens.\n\nAfter installing the Apache service, you’ll be able\
    \ to see it in the Apache Service Monitor program (accessible from the taskbar),\
    \ which also allows you to start, stop, or restart the Apache service. You’ll\
    \ need to restart (or stop and then start) the service after making changes to\
    \ the `httpd.conf` configuration file.\n\nAfter making sure the Apache2 service\
    \ is started and running, test to make sure it works okay. If you installed it\
    \ on port 80, browse to `http://localhost/`. If you installed it on 8080, go to\
    \ `http://localhost:8080/`. You should see a welcome message that, for Apache\
    \ 2.2, reads “It works!”\n\n## Installing PHP 5\n\nStart by downloading the Windows\
    \ binaries of the latest version of PHP from `http://www.php.net/downloads.php`.\
    \ Don’t use a PHP installer because it won’t include the external extensions needed\
    \ for HatShop.\n\n> **Caution**: The code doesn’t work with PHP 4 or older versions!\n\
    \nAfter you download the Windows binaries, follow these steps to install PHP:\n\
    \n1.  Unzip the file (which should be named something like `php-5.x.y-win32.zip`)\
    \ into a folder named `C:\\PHP`. You can choose another name or location for this\
    \ folder if you want.\n\n2.  Copy `php5ts.dll` from `C:\\PHP` to `C:\\Windows\\\
    System32` (or to your `System32` folder, if it has a different location).\n\n\
    3.  Copy `php.ini-recommended` from `C:\\PHP` to your Windows folder, renaming\
    \ it as `php.ini`.\n\n4.  Uncomment the following lines from `php.ini` to enable\
    \ the `mhash`, `mcrypt`, `curl`, `pdo`, and `soap` extensions. If any of these\
    \ lines isn’t present in the file, simply add it.\n\n    ```\n    extension=php_mhash.dll\n\
    \    extension=php_mcrypt.dll\n    extension=php_curl.dll\n    extension=php_pdo.dll\n\
    \    extension=php_pdo_pgsql.dll\n    extension=php_soap.dll\n    ```\n\n5.  Also\
    \ in `php.ini`, find this line:\n\n    ```\n    extension_dir = \"./\"\n    ```\n\
    \n    and change it to\n\n    ```\n    extension_dir = \"C:\\PHP\\ext\"\n    ```\n\
    \n6.  Copy `libmhash.dll`, `libeay32.dll`, `ssleay32.dll`, and `libmcrypt.dll`\
    \ from your PHP folder to the Windows `System32` folder.\n\n7.  Open for editing,\
    \ with any text editor (even Notepad), the Apache configuration file. The default\
    \ location of this file is `conf\\httpd.conf` under the Apache installation folder.\n\
    \n8.  In `httpd.conf`, find the portion with many `LoadModule` entries, and add\
    \ the following lines (the names may vary depending on your specific Apache and\
    \ PHP versions):\n    ```\n    LoadModule php5_module c:/php/php5apache2_2.dll\n\
    \    AddType application/x-httpd-php .php\n    ```\n\n    > **Note**: If you don’t\
    \ have the `php5apach2_2.dll` file in your PHP folder, you can get it in the packages\
    \ you can download from `http://snaps.php.net/`.\n\n9.  Also in `httpd.conf`,\
    \ find the `DirectoryIndex` entry, and add `index.php` at the end of the line,\
    \ like this:\n    ```\n    DirectoryIndex index.html index.php\n    ```\n\n10.\
    \ Save your changes in `httpd.conf`, then restart Apache 2. If you get any errors\
    \ at this stage, you should check that you correctly implemented the previous\
    \ steps.\n\n11. To test that your PHP installation works, create a file named\
    \ `test.php` in the `htdocs` folder of your Apache installation with a call to\
    \ PHP’s `phpinfo()` function:\n\n    ```\n    <?php\n    phpinfo();\n    ?>\n\
    \    ```\n\n12. Point your web browser to `http://localhost/test.php` (or `http://localhost:8080/test.php`\
    \ if you installed Apache to work on port 8080) to test whether everything went\
    \ okay with the installation. You should get a PHP information page similar to\
    \ Figure 2-7 from Chapter 2."
