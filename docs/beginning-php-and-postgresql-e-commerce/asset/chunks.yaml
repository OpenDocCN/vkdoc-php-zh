    **图 17-1.** *将 Amazon Super Hats 部门集成到 HatShop 中*


    本章的其余部分分为两部分。第一部分，你将学习如何访问 Amazon 电子商务服务（`ECS`）；第二部分，你将把 `ECS` 集成到 HatShop 网站中。


    **提示** 本章中的代码独立于网站的其他部分，因此，开始集成 Amazon 功能所需的只是前四章的代码（这样你就拥有了一个可正常工作的产品目录）。


    当然，稍作调整，你也可以将这些代码适配到你自己的个人解决方案中。


