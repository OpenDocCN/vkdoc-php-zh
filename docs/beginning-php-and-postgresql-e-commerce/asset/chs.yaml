  \n## 实现数据层\n\n你将在数据层添加四个方法，这些方法对应于你之前编写的四个业务层方法。让我们看看具体内容。\n\n## 练习：向数据库添加数据层函数\n\
  \n1. 加载`pgAdmin III`，并连接到`hatshop`数据库。\n2. 点击**工具** ➤ **查询工具**（或点击工具栏上的**SQL**按钮）。将出现一个新的查询窗口。\n\
  3. 使用查询工具执行以下代码，该代码在你的`hatshop`数据库中创建`catalog_get_departments`函数：\n\n```sql\n--\
  \ Create catalog_get_departments function\nCREATE FUNCTION catalog_get_departments()\n\
  RETURNS SETOF department LANGUAGE plpgsql AS $$\nDECLARE\n  outDepartmentRow department;\n\
  BEGIN\n  FOR outDepartmentRow IN\n    SELECT department_id, name, description\n\
  \    FROM department\n    ORDER BY department_id\n  LOOP\n```\n\n## 225\n\n```sql\n\
  \    RETURN NEXT outDepartmentRow;\n  END LOOP;\nEND;\n$$;\n```\n\n`catalog_get_departments`是这里要实现的最简单的函数。它返回部门的完整列表，包含其\
  \ ID、名称和描述。这与从店面填充部门列表时调用的`catalog_get_departments_list`函数几乎相似，但这个函数也返回描述，并且不需要为返回的数据创建类型，因为我们在创建`department`表时已经拥有了该类型。\n\
  \n\n\n#### 4. 使用查询工具执行此代码，将在你的 `hatshop` 数据库中创建 `catalog_update_department` 函数：\n\
  \n```sql\n-- 创建 catalog_update_department 函数\n\nCREATE FUNCTION catalog_update_department(\n\
  \  INTEGER, VARCHAR(50), VARCHAR(1000))\nRETURNS VOID LANGUAGE plpgsql AS $$\n \
  \ DECLARE\n    inDepartmentId ALIAS FOR $1;\n    inName ALIAS FOR $2;\n    inDescription\
  \ ALIAS FOR $3;\n  BEGIN\n    UPDATE department\n    SET name = inName, description\
  \ = inDescription\n    WHERE department_id = inDepartmentId;\n  END;\n$$;\n```\n\
  \n`catalog_update_department` 函数使用 `UPDATE SQL` 语句更新现有部门的名称和描述。\n\n#### 5. 使用查询工具执行此代码，将在你的\
  \ `hatshop` 数据库中创建 `catalog_delete_department` 函数：\n\n```sql\n-- 创建 catalog_delete_department\
  \ 函数\n\nCREATE FUNCTION catalog_delete_department(INTEGER)\nRETURNS SMALLINT LANGUAGE\
  \ plpgsql AS $$\n  DECLARE\n    inDepartmentId ALIAS FOR $1;\n    categoryRowsCount\
  \ INTEGER;\n  BEGIN\n    SELECT INTO categoryRowsCount\n      count(*)\n    FROM\
  \ category\n    WHERE department_id = inDepartmentId;\n    IF categoryRowsCount\
  \ = 0 THEN\n      DELETE FROM department WHERE department_id = inDepartmentId;\n\
  \      RETURN 1;\n    END IF;\n    RETURN -1;\n  END;\n$$;\n```\n\n`catalog_delete_department`\
  \ 从数据库中删除一个现有部门，但仅当没有关联任何类别时才会执行删除操作。\n\n#### 6. 使用查询工具执行此代码，将在你的 `hatshop` 数据库中创建\
  \ `catalog_add_department` 函数：\n\n```sql\n-- 创建 catalog_add_department 函数\n\nCREATE\
  \ FUNCTION catalog_add_department(VARCHAR(50), VARCHAR(1000))\nRETURNS VOID LANGUAGE\
  \ plpgsql AS $$\n  DECLARE\n    inName ALIAS FOR $1;\n    inDescription ALIAS FOR\
  \ $2;\n  BEGIN\n    INSERT INTO department (name, description)\n    VALUES (inName,\
  \ inDescription);\n  END;\n$$;\n```\n\n`catalog_add_department` 向数据库中插入一个新部门。\n\n\
