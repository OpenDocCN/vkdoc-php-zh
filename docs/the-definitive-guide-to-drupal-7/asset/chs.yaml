  捐款呼吁于 2005 年 7 月 10 日发布在 `drupal.org` 的临时主页上（当时唯一可以访问的页面）。此后不久，一篇解释 Drupal 困境的文章被发布到
  `slashdot.org/`^(15)。在 `drupal.org` 首次发帖十六小时后，3,000 美元的筹款目标已经达成并超出。到 7 月 12 日，Drupal
  社区已捐赠超过 10,000 美元，Drupal 组织者手中的资金已远超其需求，名副其实。由于没有基金会或任何其他正式的非营利身份，Drupal 的这笔善款可能需要纳税——而且它还躺在个人
  PayPal 账户中。这种情况突显了社区另一个长期被认识到但久被搁置的需求，成立一个协会成为了公认的优先事项。


  在“地狱般的超长周末”期间，自由及开源软件社区对 Drupal 展现出的慷慨并不仅仅限于 OSL 和个人捐助者的贡献。Tim Bray——被 Dries 描述为“Sun
  Microsystems 员工、W3C 成员、XML 共同发明人以及 Drupal 粉丝”^(16)——偶然看到了 `slashdot.org/` 上那篇描述
  Drupal 困境的文章（该文章于 7 月 10 日星期日下午 3:39 发布）。出于同情，Tim 将此事上报给了 Sun 的指挥链，并附上了希望提供帮助的请求。^(17)
  还是在星期天，Dries 收到了 Sun 公司软件首席技术官 Hal Stern 的电子邮件，告知他 Drupal 荣幸地成为了一台免费 Sun Fire V20z
  服务器的新主人。周一签署了相关文件，到了周二，这台服务器就抵达了其位于 OSL 的新家。^(18)


  > 一个有趣的旁注：Drupal 的 Dries Buytaert 写信询问“我们从 Sun 获得这样的机器需要什么条件”，Hal 回信说在网站上提一下就好，“无意冒犯，但任何超出上述‘条件’的法律成本都比我们这台硬件的成本还高。”

  >

  > ——Tim Bray^(19)


  到 7 月 19 日，所有捐款都已转入 OSL（从 Dries 的 PayPal 账户转出），由 OSL 和 FireBright（首席执行官 Jonathan
  Lambert）的团队制定的基础设施方案开始实施，采购了三台 Dell PowerEdge 1850 1U 服务器。到 8 月 25 日，包括 Kjartan
  Mannes、Corey Shields（OSL 基础设施经理，又名 cshields）、Mike Marineau（OSL 系统管理员）、Matt Rae（社区系统管理员及俄勒冈州立大学
  `drupal.org` 基础设施经理，又名 raema）在内的团队，已成功将 `drupal.org` 的数据库迁移至新服务器^(20)，这让许多人非常高兴。


