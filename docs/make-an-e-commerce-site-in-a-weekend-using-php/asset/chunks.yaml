    `?>`


    In the previous code, the connection to the MySQL server is established and the
    `shopping` database is selected. Upon successful connection, you get the message
    shown in Figure [2-8](#A978-1-4842-1672-9_2_Chapter.html#Fig8).


    ![A978-1-4842-1672-9_2_Fig8_HTML.jpg](A978-1-4842-1672-9_2_Fig8_HTML.jpg)


    Figure 2-8.


    Message confirms successful connection with the MySQL server and opens the shopping
    database


    #### Storing Information in the Database Table


    The PHP script for storing a new user’s information in the underlying database
    table is shown in Listing [2-13](#A978-1-4842-1672-9_2_Chapter.html#FPar16).


    Listing 2-13\. The addcustomer.php Script Saves the Customer’s Information in
    the Database Table


    `<?php`


    `$connect = mysqli_connect("localhost", "root", "gold", "shopping") or die ("Please,
    check the server connection.");`


    `$email_address = $_POST[''emailaddress''];`


    `$password = $_POST[''password''];`


    `$repassword = $_POST[''repassword''];`


    `$completename = $_POST[''complete_name''];`


    `$address1 = $_POST[''address1''];`


    `$address2 = $_POST[''address2''];`


    `$city = $_POST[''city''];`


    `$state = $_POST[''state''];`


    `$country = $_POST[''country''];`


    `$zipcode = $_POST[''zipcode''];`


    `$phone_no = $_POST[''phone_no''];`


    `$sql = "INSERT INTO customers (email_address, password, complete_name, address_line1,
    address_line2, city, state, zipcode, country, cellphone_no) VALUES (''$email_address'',(PASSWORD(''$password'')),
    ''$completename'', ''$address1'',''$address2'',''$city'', ''$state'', ''$zipcode'',
    ''$country'', ''$phone_no'')";`


    `$result = mysqli_query($connect, $sql) or die(mysql_error());`


    `if ($result)`


    `{`


    `?>`


        `<p>`


        `Dear, <?php echo $completename; ?> your account is successfully created`


    `<?php`


    `}`


    `else`


    `{`


        `echo "Some error occurred. Please use different email address";`


    `}`


    `?>`


    This PHP script saves the information entered by the user in the web form that
    was displayed through the `validatesignup.php` script (refer to Listing [2-10](#A978-1-4842-1672-9_2_Chapter.html#FPar11))
    into the `customers` table of the shopping database. Recall in [Chapter 1](#A978-1-4842-1672-9_1_Chapter.html)
    that you created the `shopping` database and the different tables that will be
    required for this e-commerce site


    You can see that first of all, the connection to MySQL server is established and
    the `shopping` database is selected. The information of the user-entered `invalidatesignup.php`
    script is assigned to the `$_POST` array. The information in the `$_POST` array
    is retrieved and stored in different variables. Thereafter, a SQL statement to
    insert a record in the `customers` table is executed and the users are informed
    about their successful account creation, as shown in Figure [2-9](#A978-1-4842-1672-9_2_Chapter.html#Fig9).


    ![A978-1-4842-1672-9_2_Fig9_HTML.jpg](A978-1-4842-1672-9_2_Fig9_HTML.jpg)


    Figure 2-9.


    Message confirming successful user account creation


    #### Accessing Information from the Database


    Information that is stored in the database is meant for future use. It means you
    can access information from the database whenever required. To access information
    from the database, the following four methods are used:


    *   `mysqli_num_rows()`—Returns the count of rows in a given recordset.

    *   `mysqli_affected_rows()`—Returns the count of rows affected by the specified
    SQL command.

    *   `mysqli_fetch_array()`—Returns one row at a time from the given recordset.

    *   `extract()`—Extracts the columns or fields in the specified row.


    Let’s discuss these methods in detail.


    ##### mysqli_num_rows()


    The `mysqli_num_rows()` method returns the count of rows that exists in the specified
    recordset. The syntax for using this method is as follows:


    `int mysqli_num_rows(recordset)`


    Where `recordset` represents the records or rows that are retrieved upon execution
    of the SQL `SELECT` statement through the `mysqli_query()` method.


    ##### mysqli_affected_rows()


    The `mysql_affected_rows()` method returns the count of the rows that are affected
    by a `DELETE`, `INSERT`, `REPLACE`, or `UPDATE` statement executed in the specified
    SQL query. This method is used immediately after an SQL statement is executed
    through the `mysqli_query()` method. The syntax for using this method is as follows:


    `int mysqli_affected_rows()`


    ##### mysqli_fetch_array()


    The `mysqli_fetch_array()` function fetches one row at a time from the specified
    recordset or array of rows. It gets one row from the given recordset and returns
    `true`. Each row is returned either as an associative array or a numeric array.
    The function returns `false` when there are no more rows left in the recordset.
    The syntax for using this method is:


    `row=mysqli_fetch_array(recordset,array_type)`


    Where the `recordset` represents the rows that are returned upon executing the
    `mysqli_query()` function.


    The `array_type` parameter is optional and it represents the array format in which
    the fetched row needs to be returned. Available options for this parameter are:


    *   `MYSQL_ASSOC`—Returns a row in associative array format.

    *   `MYSQL_NUM`—Returns a row in numeric array format.

    *   `MYSQL_BOTH`—The default. Returns a row that can be used as both an associative
    as well as a numeric array. That is, the array returned has both associative and
    number indices.


    After a row is retrieved, the `mysqli_fetch_array()` function automatically moves
    to the next row in the recordset. Each subsequent call to this function returns
    the next row in the specified recordset. For example, the following statement
    fetches one row from the specified `$result` i.e. recordset and returns the row
    in associative array format:


    `$row = mysqli_fetch_array($result, MYSQLI_ASSOC)`


    ##### extract()


    The `extract()` function extracts all the variables or columns stored in the specified
    array or row. The syntax for using this method is as follows:


    `extract(array/row)`


    For example, this extracts all the columns in the specified row:


    `extract($row);`


    Let’s now look at how to apply these methods to authenticate a user.'
  trans: "\n### 通过 PHP 执行 SQL 命令\n\n建立与数据库的连接后，下一步任务就是在该数据库上执行所需的 SQL 语句。要在数据库上执行所需的\
    \ SQL 语句，需使用 `mysqli_query()` 方法，其语法如下：\n\n```\n$result = mysqli_query($connect,\
    \ $sql) or die(mysql_error());\n```\n\n`$connect` 变量表示与 MySQL 服务器的连接，`$sql` 表示要在已连接的数据库上执行的\
    \ SQL 语句。`$result` 变量将存储 SQL 语句的执行结果。\n\n清单 2-12 中的 PHP 脚本用于检查是否已建立与 MySQL 服务器的连接。\n\
    \n**清单 2-12.** `checkconnection.php` 脚本确认与 MySQL 服务器的连接是否已建立\n\n```\n<?php\n \
    \   // 连接到数据库服务器\n    $MySQLi = new MySQLi(\"localhost\", \"root\", \"gold\",\
    \ \"shopping\");\n    if ($MySQLi->errno) {\n        printf(\"无法连接到数据库：<br />\
    \ %s\",$MySQLi->error);\n        exit();\n    }\nelse\n    printf(\"已成功连接到 MySQL\
    \ 服务器并打开了 shopping 数据库\");\n?>\n```\n\n在上述代码中，建立了与 MySQL 服务器的连接并选择了 `shopping`\
    \ 数据库。连接成功后，您将看到如图 2-8 所示的消息。\n\n![A978-1-4842-1672-9_2_Fig8_HTML.jpg](img/A978-1-4842-1672-9_2_Fig8_HTML.jpg)\n\
    \n**图 2-8.** 消息确认已成功连接到 MySQL 服务器并打开了 `shopping` 数据库\n\n#### 在数据库表中存储信息\n\n用于在底层数据库表中存储新用户信息的\
    \ PHP 脚本如清单 2-13 所示。\n\n**清单 2-13.** `addcustomer.php` 脚本将客户信息保存到数据库表中\n\n```\n\
    <?php\n$connect = mysqli_connect(\"localhost\", \"root\", \"gold\", \"shopping\"\
    ) or die (\"请检查服务器连接。\");\n$email_address = $_POST['emailaddress'];\n$password\
    \ = $_POST['password'];\n$repassword = $_POST['repassword'];\n$completename =\
    \ $_POST['complete_name'];\n$address1 = $_POST['address1'];\n$address2 = $_POST['address2'];\n\
    $city = $_POST['city'];\n$state = $_POST['state'];\n$country = $_POST['country'];\n\
    $zipcode = $_POST['zipcode'];\n$phone_no = $_POST['phone_no'];\n$sql = \"INSERT\
    \ INTO customers (email_address, password, complete_name, address_line1, address_line2,\
    \ city, state, zipcode, country, cellphone_no) VALUES ('$email_address',(PASSWORD('$password')),\
    \ '$completename', '$address1','$address2','$city', '$state', '$zipcode', '$country',\
    \ '$phone_no')\";\n$result = mysqli_query($connect, $sql) or die(mysql_error());\n\
    if ($result)\n{\n?>\n    <p>\n    尊敬的，<?php echo $completename; ?> 您的账户已成功创建\n\
    <?php\n}\nelse\n{\n    echo \"发生了一些错误。请使用不同的邮箱地址\";\n}\n?>\n```\n\n此 PHP 脚本将用户通过\
    \ `validatesignup.php` 脚本（参见清单 2-10）显示的网络表单中输入的信息保存到 `shopping` 数据库的 `customers`\
    \ 表中。回顾一下，在第 1 章中，您创建了 `shopping` 数据库以及该电子商务网站所需的不同表。\n\n您可以看到，首先建立了与 MySQL 服务器的连接并选择了\
    \ `shopping` 数据库。用户输入的 `validatesignup.php` 脚本中的信息被赋值给 `$_POST` 数组。然后检索 `$_POST`\
    \ 数组中的信息并存储到不同的变量中。之后，执行一条在 `customers` 表中插入记录的 SQL 语句，并通知用户账户创建成功，如图 2-9 所示。\n\
    \n![A978-1-4842-1672-9_2_Fig9_HTML.jpg](img/A978-1-4842-1672-9_2_Fig9_HTML.jpg)\n\
    \n**图 2-9.** 消息确认用户账户创建成功\n\n#### 从数据库访问信息\n\n存储在数据库中的信息是为了将来使用。这意味着您可以在需要时从数据库访问信息。要从数据库访问信息，可使用以下四种方法：\n\
    \n*   `mysqli_num_rows()` — 返回给定记录集中的行数。\n*   `mysqli_affected_rows()` — 返回受指定\
    \ SQL 命令影响的行数。\n*   `mysqli_fetch_array()` — 一次从给定记录集中返回一行。\n*   `extract()` —\
    \ 提取指定行中的列或字段。\n\n让我们详细讨论这些方法。\n\n##### `mysqli_num_rows()`\n\n`mysqli_num_rows()`\
    \ 方法返回指定记录集中存在的行数。使用此方法的语法如下：\n\n```\nint mysqli_num_rows(recordset)\n```\n\n\
    其中 `recordset` 表示通过 `mysqli_query()` 方法执行 SQL `SELECT` 语句后检索到的记录或行。\n\n##### `mysqli_affected_rows()`\n\
    \n`mysqli_affected_rows()` 方法返回指定 SQL 查询中执行的 `DELETE`、`INSERT`、`REPLACE` 或 `UPDATE`\
    \ 语句影响的行数。此方法应在通过 `mysqli_query()` 方法执行 SQL 语句后立即使用。使用此方法的语法如下：\n\n```\nint mysqli_affected_rows()\n\
    ```\n\n##### `mysqli_fetch_array()`\n\n`mysqli_fetch_array()` 函数一次从指定的记录集或行数组中取出一行。它从给定记录集中获取一行并返回\
    \ `true`。每行以关联数组或数字数组的形式返回。当记录集中没有更多行时，该函数返回 `false`。使用此方法的语法是：\n\n```\nrow =\
    \ mysqli_fetch_array(recordset, array_type)\n```\n\n其中 `recordset` 表示执行 `mysqli_query()`\
    \ 函数后返回的行。\n\n`array_type` 参数是可选的，它表示取出的行需要返回的数组格式。该参数的可用选项有：\n\n*   `MYSQL_ASSOC`\
    \ — 以关联数组格式返回一行。\n*   `MYSQL_NUM` — 以数字数组格式返回一行。\n*   `MYSQL_BOTH` — 默认值。返回一个既可以作为关联数组又可以作为数字数组使用的行。也就是说，返回的数组同时具有关联和数字索引。\n\
    \n取出一行后，`mysqli_fetch_array()` 函数会自动移动到记录集中的下一行。每次后续调用此函数都会返回指定记录集中的下一行。例如，以下语句从指定的\
    \ `$result`（即记录集）中取出一行，并以关联数组格式返回该行：\n\n```\n$row = mysqli_fetch_array($result,\
    \ MYSQLI_ASSOC)\n```\n\n##### `extract()`\n\n`extract()` 函数提取指定数组或行中存储的所有变量或列。使用此方法的语法如下：\n\
    \n```\nextract(array/row)\n```\n\n例如，这会提取指定行中的所有列：\n\n```\nextract($row);\n```\n\
    \n现在让我们看看如何应用这些方法来验证用户身份。\n"
- fmt: '# Implementing Authentication


    Authenticating a user means determining whether the visitor is already registered
    on the e-commerce site or not. Applying authentication is a two-step process:


    You have already learned to display and execute a script that enables visitors
    to sign up and create an account on your site. To verify that that the visitor
    is already registered, they will be provided with a sign-in form that will prompt
    them to enter a valid e-mail address and password. After entering an e-mail address
    and password, when the user clicks the Submit button in the sign-in form, they
    are taken to another script that accesses the `customers` table and confirms if
    any customer (row) exists with the supplied e-mail address and password. If a
    customer exists with the specified e-mail address and password, it means the visitor
    is already registered to your site and a welcome message will be displayed on
    the screen. If no row exists in the `customers` table with the supplied e-mail
    address and password, it means either the visitor is not registered to your site
    or has entered the wrong information. Hence, the visitor is provided two links
    to choose from—one will navigate them to create a new account and the other will
    allow them to try to sign in again.


    The PHP script called `signin.php` is shown in Listing [2-14](#A978-1-4842-1672-9_2_Chapter.html#FPar17).
    It performs the first step of implementing authentication—displaying the sign-in
    form.


    **Listing 2-14.** The `signin.php` Script for Displaying the Sign-In Form


    ```

    <html>

    <head>

    </head>

    <body>

    <form action="validateuser.php" method="post">

    <table border="0" cellspacing="1" cellpadding="3">

    <tr><td>Email Aaddress:</td><td><input type="text" name="emailaddress"></td></tr>

    <tr><td>Password:</td><td><input type="password" name="password"></td></tr>

    <tr><td colspan=2 align="center"><input type="submit" name="submit" value="Login"></td></tr>

    </table>

    </form>

    </body>

    </html>

    ```


    The script displays two text boxes to the visitor, one for entering an e-mail
    address and other for entering a password (see Figure [2-10](#A978-1-4842-1672-9_2_Chapter.html#Fig10)).
    After the user enters an e-mail address and password and clicks Submit, the information
    entered in the form will be assigned to the `$_POST` array and sent to the `validateuser.php`
    script to check if any user exists in the `customers` table with the supplied
    e-mail address and password.


    ![A978-1-4842-1672-9_2_Fig10_HTML.jpg](A978-1-4842-1672-9_2_Fig10_HTML.jpg)


    **Figure 2-10.** Sign-in form prompting the user to enter a valid e-mail address
    and password


    The PHP script called `validateuser.php` is shown in Listing [2-15](#A978-1-4842-1672-9_2_Chapter.html#FPar18).
    It performs the second step of authentication—it verifies whether the information
    entered by the visitor is valid.


    **Listing 2-15.** The `validateuser.php` Script for Authenticating the User


    ```

    <html>

    <head>

    </head>

    <body>

    <?php

    $connect = mysqli_connect("localhost", "root", "gold", "shopping") or die("Please,
    check your server connection.");

    $query = "SELECT email_address, password, complete_name FROM customers WHERE email_address
    like ''" . $_POST[''emailaddress''] . "'' " .

    "AND password like (PASSWORD(''" . $_POST[''password''] . "''))";

    $result = mysqli_query($connect, $query) or die(mysql_error());

    if (mysqli_num_rows($result) == 1) {

    while ($row = mysqli_fetch_array($result, MYSQLI_ASSOC)) {

    extract($row);

    echo "Welcome " . $complete_name . " to our Shopping Mall <br>";

    }

    }

    else {

    ?>

    Invalid Email address and/or Password<br>

    Not registered?

    <a href="validatesignup.php">Click here</a> to register.<br><br><br>

    Want to Try again<br>

    <a href="signin.php">Click here</a> to try login again.<br>

    <?php

    }

    ?>

    </body>

    </html>

    ```


    As expected, a connection to MySQL server is established and the `shopping` database
    is selected. A SQL statement is written to search in the `customers` table. The
    SQL statement checks if there is any row in the `customers` table whose e-mail
    address and password matches the e-mail address and passwords in the `$_POST`
    array. Recall that the e-mail address and password entered in the form displayed
    through the `signin.php` script are assigned to the `$_POST` array and navigation
    to the `validateuser.php`.


    If a customer exists in the `customers` table that matches the supplied e-mail
    address and password, a welcome message is displayed to the user (see Figure [2-11](#A978-1-4842-1672-9_2_Chapter.html#Fig11)—bottom).


    ![A978-1-4842-1672-9_2_Fig11_HTML.jpg](A978-1-4842-1672-9_2_Fig11_HTML.jpg)


    **Figure 2-11.** Message that appears upon entering an incorrect e-mail address
    or password (top) and the welcome message displayed upon entering a correct e-mail
    address and password (bottom)


    If no row exists in the `customers` table (that matches the visitor’s e-mail address
    and password), it is assumed that either the visitor is not yet registered or
    they entered an invalid e-mail address or password. Consequently, two links are
    displayed to the visitor to choose from—one to create a new account (`validatesignup.php`)
    and another to try to sign in again (`signin.php`) (see Figure [2-11](#A978-1-4842-1672-9_2_Chapter.html#Fig11)—top).


    ## Summary


    In this chapter, you learned how to write and run your first PHP script. You also
    saw how information is passed from one script to another. You learned to get information
    from the user by creating a sign-up form. To store information about the new customer,
    you learned about the methods that are required in establishing connections between
    PHP and a MySQL server.


    You learned about creating and executing scripts for storing user information
    in the `customers` table. Finally, you learned about the methods required to access
    information from the database and used that knowledge to authenticate a user (by
    creating a sign-in script).


    In the next chapter, you will learn how to access the `products` table and display
    a list of products in it. Also, you will learn to display images of the products.
    You will learn to implement a search box in the e-commerce site to enable visitors
    to search the desired products quickly, to remember what visitors like, and finally,
    you will learn about session handling too.


    # 3. Accessing the Database Using PHP


    Electronic supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-1672-9_3](http://dx.doi.org/10.1007/978-1-4842-1672-9_3))
    contains supplementary material, which is available to authorized users.


    On an e-commerce site, it is essential to display product information next to
    its image in as much detail as possible. Because there can be a huge number of
    products, the information is stored in a database. Recall that you already created
    a `products` table that contains several products categorized into different areas.
    This chapter begins by explaining how product information is accessed from the
    `products` table and displayed on the screen.


    In this chapter, you are going to learn about the following:


    * Accessing products and displaying them on screen

    * Creating a drop-down menu

    * Displaying products in specific categories

    * Adding a web site header

    * Implementing a search feature

    * Showing product details

    * Session handling

    * Signing in and out

    * Defining a home page for the site'
