    \ regular expression doesn’t mean that it is. Nor does it mean that the intention\
    \ of the author was for it to be a regular expression.\n\nThe PHP documentation\
    \ (at [http://www.php.net/manual/en/intro.pcre.php](http://www.php.net/manual/en/intro.pcre.php))\
    \ describes expressions as [a string] enclosed in delimiters. These delimiters\
    \ can be any non-alphanumeric that aren’t also a backslash or null byte.\n\nWe\
    \ can cover a large majority of cases, using the following:\n\n```\n 1 <?php\n\
    \n 3 function is_regex($variable) {\n 4   return @preg_match($regex, \"\") !==\
    \ false\n 5     && preg_last_error() == PREG_NO_ERROR;\n 6 }\n\n 8 print is_regex(\"\
    /^.*$/\"); // true\n 9 print is_regex(\"/hello world/\"); // true\n10 print is_regex(\"\
    /hello world/i\"); // true\n11 print is_regex(\"hello world\"); // false\n12 print\
    \ is_regex(\"\\\\hello world\\\\\"); // false\n13 print is_regex(\"\\\\x00foo\\\
    \\x00\"); // false\n14 print is_regex(\"1foo1\"); // false\n15 print is_regex(\"\
    afooa\"); // false\n```\n\nThe `preg_match` function returns a `1` for a match,\
    \ `0` for no match and `false` if an error occurred. Assuming `preg_match` returns\
    \ false, the error could be for any number of reasons (like `PREG_INTERNAL_ERROR`\
    \ or `PREG_BAD_UTF8_ERROR`). So then we use the `preg_last_error` function to\
    \ rule out all other errors.\n\nUsing error suppression (`@`) is generally a bad\
    \ idea. There are very few instances when using it is considered ok. This is one\
    \ of them!\n\n### Namespace Functions\n\nI’ve spoke a bit about how all these\
    \ global functions are bad, and there’s a really simple alternative: namespace\
    \ functions. You’ve probably used namespaces, for classes, but the same constructs\
    \ work well to isolate functions:\n\n```\n 1 <?php\n\n 3 namespace Type\\String\
    \ {\n 4   function length($string) {\n 5     return strlen($string);\n 6   }\n\
    \ 7 }\n\n 9 namespace {\n10   print Type\\String\\length(\"Hello World\");\n11\
    \ }\n```\n\n#### Composer Autoload\n\nThis kind of function definition doesn’t\
    \ follow normal autoload patterns. In order to have Composer autoload these kinds\
    \ of files is to explicitly define which files should be loaded:\n\n```\n1 {\n\
    2   \"autoload\" : {\n3     \"files\" : [\n4       \"namespace-functions.php\"\
    \n5     ]\n6   }\n7 }\n```\n\nFollowing this, we’ll have to dump the old autoloader,\
    \ with:\n\n```\n1 $ composer dump-autoload\n\n3 Generating autoload files\n```\n\
    \nThe files (containing namespace functions) will now be automatically loaded,\
    \ wherever the Composer autoloader is used.\n\n#### Future Goodies\n\nPHP 5.6\
    \ supports the `use function` construct, to import functions from other namespaces.\
    \ It’s currently in beta (at the time of writing), but this feature is right up\
    \ our proverbial alley.\n\nIn the meantime, it’s possible to partially import\
    \ functions:\n\n```\n1 use Type\\String;\n\n3 print String\\length(\"Hello World\"\
    );\n```\n\nThis is especially useful for deeply-nested namespace designs. Still;\
    \ it’s great to be able to omit even a little of the full namespace. The result\
    \ is clean(er), non-colliding procedural code.\n\n### Conclusion\n\nEven today,\
    \ it’s possible to create a cleaner scalar type system/abstraction. We don’t need\
    \ special extensions, or compilation steps. Just a little bit of work will clean\
    \ the code right up.\n\nHaving said that, extensions can go a long way towards\
    \ making our lives easier, while still allowing the level of customisation and\
    \ unity that we are hoping to achieve. We’ll look at a few of these in the following\
    \ chapter…\n\n## Extensions"
  trans: "\n#### 标量类型\n\n`gettype()` 函数用于返回变量的数据类型。它可以识别以下类型：\n\n- `\"boolean\"`\n\
    - `\"integer\"`\n- `\"double\"`\n- `\"string\"`\n- `\"array\"`\n- `\"object\"\
    `\n- `\"resource\"`\n- `\"NULL\"`\n\n如果这些类型都不能正确描述该变量，`gettype()` 将返回 `\"unknown\
    \ type\"`。我们再次看到一些奇怪的不一致之处。首先，浮点数被识别为 `\"double\"`，而空值则返回为 `\"NULL\"`（大写形式，与其他所有类型标识符形成对比）。\n\
    \n我们可以通过类似下面的代码来对这个函数进行抽象：\n\n```php\n<?php\n\nfunction type($variable) {\n  $type\
    \ = gettype($variable);\n\n  switch ($type) {\n\n    case \"integer\":\n    case\
    \ \"double\":\n      return \"number\";\n\n    case \"NULL\":\n      return \"\
    null\";\n\n  }\n\n  return $type;\n}\n\nprint type(0);    // \"number\"\nprint\
    \ type(.0);   // \"number\"\nprint type(null); // \"null\"\n```\n\n当变量包含一个回调时该怎么办？这种情况下，我们可以使用……\n\
    \n#### 函数\n\n`is_callable()` 函数用于检查某个东西是否是一个可调用的函数，无论它是字符串还是匿名函数。\n\n```php\n\
    <?php\n\nprint is_callable(\"is_callable\"); // true\nprint is_callable(function(){});\
    \  // true\nprint is_callable(null);          // false\n\nclass Foo\n{\n  public\
    \ function bar()\n  {\n\n  }\n\n  public function identify()\n  {\n    return\
    \ is_callable([$this, \"bar\"]);\n  }\n}\n\n$foo = new Foo();\n\nprint $foo->identify();\
    \ // true\n```\n\n从技术上讲，`is_callable()` 识别的是 PHP 中任何接受回调的函数的有效参数。对于这类函数来说，以下形式都是有效的：\n\
    \n- 一个实际的函数（`function(){}`）\n- 一个包含上下文和方法名的数组（`[$this, \"bar\"]`）\n- 一个函数名，以字符串形式提供（`\"\
    is_callable\"`）\n\n由于这个方法比较宽松，在同一个解析器函数中尝试识别字符串和函数时需要格外小心。如果你同时使用 `is_string()`\
    \ 和 `is_callable()`，最终的结果可能会因为这两者的调用顺序不同而不同。\n\n例如：\n\n```php\n$variable = \"\
    is_callable\";\n\nif (is_string($variable)) {\n  die(\"variable is a string\"\
    );\n}\n\nif (is_callable($variable)) {\n  die(\"variable is callable\");\n}\n\
    ```\n\n该脚本会以字符串 `\"variable is a string\"` 终止，因为它是一个字符串。但它同时也是一个可调用函数的名称，所以如果交换这两个条件语句的顺序，脚本将以\
    \ `\"variable is callable\"` 终止。\n\n如果你想更具体地判断一下，那么了解一下 `gettype(function(){})`\
    \ 会返回 `\"object\"` 会很有帮助。在这种情况下，我们可以这样做：\n\n```php\n<?php\n\nfunction is_function($variable)\
    \ {\n  return is_callable($variable) and gettype($variable) === \"object\";\n\
    }\n\nprint is_function(function(){});  //true\nprint is_function(\"is_function\"\
    ); //false\nprint is_function(new stdClass);  //false\n```\n\n#### 类\n\n有时我们想要做的是识别出我们正在处理的对象类型。`gettype()`\
    \ 只会告诉我们变量是一个对象，而无法提供更多信息。我们需要将其与 `get_class()` 函数结合使用：\n\n```php\n<?php\n\nfunction\
    \ type($variable) {\n  $type = gettype($variable);\n\n  switch ($type) {\n\n \
    \   case \"integer\":\n    case \"double\":\n      return \"number\";\n\n    case\
    \ \"NULL\":\n      return \"null\";\n\n    case \"object\":\n      return get_class($variable);\n\
    \n  }\n\n  return $type;\n}\n\nprint type(\"foo\"); // \"string\"\n\nclass Foo\n\
    {\n\n}\n\n$foo = new Foo();\n\nprint type($foo);         // \"Foo\"\nprint type(function(){});\
    \ // \"Closure\"\n```\n\n我们可以进一步将 `\"Closure\"` 规范化为类似 `\"function\"` 的形式；前提是我们希望像对待其他类型一样，以同样的重视程度来处理它。\n\
    \n#### 正则表达式\n\n由于 PHP 有多套字符串函数（一套用于普通字符串，几套用于正则表达式），如果我们能有一种方法来区分看起来像正则表达式的东西和看起来不像的东西，那就太好了。\n\
    \n明确区分“确定是正则表达式”和“看起来像”非常重要。仅仅因为某个东西看起来像正则表达式，并不意味着它就是一个正则表达式，也不代表作者的意图就是让它成为正则表达式。\n\
    \nPHP 文档（位于 [`www.php.net/manual/en/intro.pcre.php`](http://www.php.net/manual/en/intro.pcre.php)）将表达式描述为[一个字符串]被包含在定界符中。这些定界符可以是任何非字母数字字符，只要不是反斜杠或空字节即可。\n\
    \n我们可以使用以下代码覆盖绝大多数情况：\n\n```php\n<?php\n\nfunction is_regex($variable) {\n  return\
    \ @preg_match($regex, \"\") !== false\n    && preg_last_error() == PREG_NO_ERROR;\n\
    }\n\nprint is_regex(\"/^.*$/\"); // true\nprint is_regex(\"/hello world/\"); //\
    \ true\nprint is_regex(\"/hello world/i\"); // true\nprint is_regex(\"hello world\"\
    ); // false\nprint is_regex(\"\\\\hello world\\\\\"); // false\nprint is_regex(\"\
    \\\\x00foo\\\\x00\"); // false\nprint is_regex(\"1foo1\"); // false\nprint is_regex(\"\
    afooa\"); // false\n```\n\n`preg_match()` 函数在匹配成功时返回 `1`，没有匹配时返回 `0`，如果发生错误则返回\
    \ `false`。假设 `preg_match()` 返回 `false`，错误可能有多种原因（例如 `PREG_INTERNAL_ERROR` 或 `PREG_BAD_UTF8_ERROR`）。因此，我们使用\
    \ `preg_last_error()` 函数来排除所有其他错误。\n\n使用错误抑制符（`@`）通常是个坏主意。只有极少数情况下认为使用它是可以接受的。这就是其中之一！\n\
    \n### 命名空间函数\n\n我之前谈到过所有这种全局函数都不好，其实有一个非常简单替代方案：命名空间函数。你可能已经将命名空间用于类，同样的结构也可以很好地用于隔离函数：\n\
    \n```php\n<?php\n\nnamespace Type\\String {\n  function length($string) {\n  \
    \  return strlen($string);\n  }\n}\n\nnamespace {\n  print Type\\String\\length(\"\
    Hello World\");\n}\n```\n\n#### Composer 自动加载\n\n这种函数定义方式不遵循常规的自动加载模式。要让 Composer\
    \ 自动加载这类文件，需要明确指定哪些文件需要被加载：\n\n```json\n{\n  \"autoload\" : {\n    \"files\" :\
    \ [\n      \"namespace-functions.php\"\n    ]\n  }\n}\n```\n\n接下来，我们需要转储旧的自动加载器，命令如下：\n\
    \n```\n$ composer dump-autoload\n\nGenerating autoload files\n```\n\n现在，只要使用了\
    \ Composer 自动加载器，这些包含命名空间函数的文件就会被自动加载。\n\n#### 未来的便利功能\n\nPHP 5.6 支持 `use function`\
    \ 结构，用于从其他命名空间导入函数。在撰写本文时，该功能仍处于测试阶段，但这一特性正好符合我们一直以来的期望。\n\n在此期间，也可以部分导入函数：\n\n\
    ```php\nuse Type\\String;\n\nprint String\\length(\"Hello World\");\n```\n\n这对于深度嵌套的命名空间设计尤其有用。即使只是能省略完整命名空间的一小部分，也仍然很棒。结果就是更清晰、无冲突的面向过程代码。\n\
    \n### 结论\n\n即使在今天，创建更清晰的标量类型系统/抽象也是可能的。我们不需要特殊的扩展或编译步骤。只需要一点点工作就可以让代码变得清晰。\n\n\
    话虽如此，扩展仍然能在很大程度上让我们的工作更轻松，同时仍然允许我们实现所期望的自定义程度和统一性。我们将在下一章中探讨其中的几个……\n\n## 扩展\n"
- fmt: '### Vagrant + Phansible


    Many of the libraries we will be working with require a bit of special installation.
    Instead of labouring away at a guide for each operating system, we’re going to
    look at using `Vagrant` for our development environment.


    `Vagrant` (in case you haven’t heard of it yet) is a programatic interface for
    managing virtual machines. If you’ve ever set up a virtual machine, installed
    the operating system, installed the development tools, you will know how much
    time it takes to do well. This process can be automated with `Vagrant`.


    `Vagrant` depends on underlying virtualisation providers and provisioners. We’ll
    look at using `VirtualBox` as the virtualisation provider and `Ansible` as the
    provisioner.


    #### Installing


    To get `VirtualBox` installed, go to [https://www.virtualbox.org/wiki/Downloads](https://www.virtualbox.org/wiki/Downloads)
    and download the installer for your operating system.


    ![](images/virtualbox-download.png) ![](images/virtualbox-install.png)


    Once you have downloaded and installed `VirtualBox`, you should be able to install
    `Vagrant`. Go to [http://www.vagrantup.com/downloads.html](http://www.vagrantup.com/downloads.html)
    and download the installer for your operating system.


    ![](images/vagrant-download.png) ![](images/vagrant-install.png)


    We’ll also need to install `Ansible` so we can use play books to provision the
    virtual machine. Go to [http://docs.ansible.com/intro_installation.html](http://docs.ansible.com/intro_installation.html)
    and download the installer for your operating system.


    ![](images/ansible-download.png)


    #### Provisioning


    Provisioning is just another word for a set of instructions that tell `Vagrant`
    which dependencies to install for you. There are many kinds of `Vagrant` provisioners,
    but the only one we will use is called `Ansible`.


    We’ll use [http://phansible.com](http://phansible.com) to do most of the heavy-lifting.


    ![](images/phansible.png)


    Set the following options:


    1.  Operating System: `Ubuntu Precise Pangolin 64`

    2.  Webserver: `Nginx + PHP5-FPM`

    3.  PHP: `5.5`

    4.  Composer: `Enabled`

    5.  PHP Modules: `php-pear php5-cli php5-common`


    When you click “Generate”, you’ll start downloading an archive of files. Extract
    these into a working directory and start up Terminal.


    These files are instruction files (Ansible-specific YAML syntax) which describe
    which dependencies `Vagrant` must automatically install. You shouldn’t need to
    change them to get the `PHP` stack working, but feel free to familiarise yourself
    with what they are doing.


    To start the virtual machine, run the following command:


    ```

    $ vagrant up

    ```


    You may be asked to provide an administrator password, as part of setting up the
    virtual machine. This will allow the `NFS` shared folders to be set up.


    Once the virtual machine is initialised, you can log into it with:


    ```

    $ vagrant ssh

    ```


    You can also check the installed version of `PHP` (and that the `CLI` was installed
    correctly) with:


    ```

    $ php -v

    ```


    #### Vagrant Commands


    There are a few `Vagrant` commands you’re likely to use often:


    ```

    $ vagrant up

    ```


    This command will start the `Vagrant` virtual machine, and run any outstanding
    provisioning. That means the first time you run this command, it will take longer
    to boot (depending on the complexity of your provisioning scripts).


    ```

    $ vagrant halt

    ```


    This command will shut the virtual machine down. It will try to gracefully shut
    the machine down.


    ```

    $ vagrant destroy

    ```


    This command will remove the virtual machine and clean up settings applied when
    it was created. If you break something inside the virtual machine, and you want
    to reset it to the default state, you’ll want to run this command followed by
    `vagrant up`.


    ```

    $ vagrant ssh

    ```


    This command will take you inside the virtual machine, just as if you were connecting
    to a remote server. Inside the virtual machine, you can run any of the commands
    usually supported by the guest operating system, including executing `PHP` scripts
    against the packages installed on the virtual machine.


    [http://phansible.com](http://phansible.com) is the brain-child of [Erika Heidi](https://twitter.com/erikaheidi).
    She is also the author of [Vagrant Cookbook](https://leanpub.com/vagrantcookbook).
    I highly recommend reading this book, if you have any questions or simply want
    to know more about `Vagrant`!'
