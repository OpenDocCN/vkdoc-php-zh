    in the `ch05` folder.


    #### Troubleshooting mail()


    It’s important to understand that `mail()` isn’t an email program. PHP’s responsibility
    ends as soon as it passes the address, subject, message, and headers to the MTA.
    It has no way of knowing if the email is delivered to its intended destination.
    Normally, email arrives instantaneously, but network logjams can delay it by hours
    or even a couple of days.


    If you’re redirected to the thank you page after sending a message from `contact.php`,
    but nothing arrives in your inbox, check the following:


