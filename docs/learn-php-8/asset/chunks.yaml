    create the signature of the `GetBreeds` constructor to accept an array. However,
    as you can see from this code, we actually will ignore anything that is passed
    into the array. This allows us to use the same method in `dog_container` to create
    an object of either class (or actually of any class that accepts an array). All
    we need to find is the name of the class (`dog` or `GetBreeds`) so we can make
    an instance of it.


    ```

    function create_object($properties_array)

    {

    $dog_loc = $this->get_dog_application();

    if(($dog_loc == FALSE) || (!file_exists($dog_loc)))

    {

    return FALSE;

    }

    ```


    The `create_object` method then calls the `get_dog_application` method and places
    the value returned (the location of the file and file name) into `$dog_loc`. If
    the value in `$dog_loc` is FALSE or is not an existing file, the method returns
    `FALSE` to the program that called it.


    ```

    else

    {

    require_once($dog_loc);

    $class_array = get_declared_classes();

    $last_position = count($class_array) - 1;

    $class_name = $class_array[$last_position];

    $dog_object = new $class_name($properties_array);

    return $dog_object;

    } } }

    ?>

    ```


    If the path and file name are valid, the `else` portion of the code will execute.
    The value in `$dog_loc` is used in the `require_once` statement (which pulls the
    contents of the file into this method). We must now determine the name of the
    class that exists in the file (dependence injection requires us to not only discover
    the file names and file path, but also the class names).


    The PHP method `get_declared_classes` returns an array of all the classes that
    currently exist in the program. The classes are in order from first to last. Thus,
    since we just included the file with a class (either the `dog` or `get_breeds`
    class), we can hunt for the last entry in the array created. We have placed the
    array created by `get_declared_classes` in `$class_array`. We can now determine
    the size of the array. The PHP method `count` will return the size of an array.
    Remember the size of an array is the number of items in the array not the last
    position. If an array has a size of 10, the actual subscripts are 0 through 9,
    not 1 through 10.


    ```

    $last_position = count($class_array) - 1;

    ```


    *For more information on `get_declared_classes`, visit*

    [*www.php.net/manual/en/function.get-declared-classes.php*](http://www.php.net/manual/en/function.get-declared-classes.php)*.*


    With this in mind, this statement determines the size of `$class_array` and then
    subtracts 1 from the size and places that value in `$last_position`. Thus, if
    the array had a size of 10, the number 9 would be stored in `$last_position` (since
    the array subscripts would be 0 through 9, not 10).


    ```

    $class_name = $class_array[$last_position];

    ```


    We can then use the value in `$last_position` to pull the last class created from
    the array and place it into `$class_name`. As you can see, we can actually pass
    the property `$last_position` between the `[]` subscript brackets to indicate
    to the program we want the value of whatever is in the position located in `$last_position`.
    This allows us to be able to pull the information from the last position in any
    size array (since we have no idea of the size of the `$class_array`).


    We can now create an instance of the class because we have the class name in `$class_name`.


    ```

    $dog_object = new $class_name($properties_array);

    ```


    This line of code will now create an instance of any class (that accepts an array
    into the constructor) that has just been included (`require_once`) in the program.
    The method will create an instance of either the `dog` class or `getBreeds` class.


    ```

    return $dog_object;

    ```


    Finally, the object (which is either a `dog` object or a `getBreeds` object) is
    returned to the program that called the method. By returning the object, the calling
    program has complete access to the object and its properties and methods, even
    though it did not actually create the object (`dog_interface` can use the object
    even though `dog_container` created it).


    The object’s location in memory is returned in a similar way as the array’s location
    was passed into the constructor in the previous example. We can think of it as
    the new object is temporarily “contained” within the `dog_container` object. However,
    the object is returned (to `dog_interface`).


    *   *Programming note—What? What really happens is that the address in memory
    of the `$dog_object` is passed to the calling program (`dog_interface`). This
    allows the calling program to have access to the object, along with the `dog_container`
    object. Thus, there is only one copy of the `$dog_object` in memory but two different
    program blocks can use it. If one of the blocks (`dog_container` or `dog_interface`)
    closes, the other object still has access to it, until it also closes. Then the
    garbage collector will remove the `$dog_object` from memory.*


