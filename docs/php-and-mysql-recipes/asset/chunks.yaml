    \    }\n\n    function Output($file_name = \"opensearch.xml\") {\n        $this->rss->appendChild($this->channel);\n\
    \        $this->appendChild($this->rss);\n        header(\"Content-Type: text/xml;\
    \ name=\\\"{$file_name}\\\"\");\n        header(\"Content-Disposition: inline;\
    \ filename=\\\"{$file_name}\\\"\");\n        echo $this->saveXML();\n    }\n}\n\
    \n$rss = new RSSWriter();\n$rss->SetChannel(\"PHP & MySQL Recipes\", \"一本关于 PHP\
    \ 和 MySQL 的书\", \"http://example.com\", time());\n$rss->AddItem(\"PHP 7\", \"\
    http://php.net\", \"更快更新的 PHP 版本\");\n$rss->AddItem(\"MariaDB\", \"http://mariadb.org\"\
    , \"开源数据库\");\n$rss->Output();\n```\n\n在脚本末尾，`$rss`变量被赋值为`RSSWriter()`类的一个实例，然后定义了频道并添加了几个条目。\n"
- fmt: "# Best Practices for RSS Feed Consumption\n\nTo follow best practices, the\
    \ list of items should be limited to the latest 5 or 10 items of data. Each of\
    \ the clients that subscribe to the feed can save copies of the elements for as\
    \ long as the user wants. The client should not query the same feed again until\
    \ the `ttl` value is exceeded. In this case it is set to 1800 seconds or a half\
    \ hour. Requesting updates from the feed too often will create high load on the\
    \ server.\n\nPlacing the `RSSWriter()` class in a separate file makes it possible\
    \ to use the same class to generate multiple RSS feeds with different content.\n\
    \n## Recipe 14-4. Consuming RSS Feeds\n\n### Problem\n\nDepending on the definition\
    \ used, the last S in RSS stands for Syndication. Syndication is a way to share\
    \ or distribute information. How can this be used to create a list of posts from\
    \ a couple of space-related web sites?\n\n### Solution\n\nWe can use the `SimpleXML`\
    \ extension to create a class that can read a feed, and perform extraction and\
    \ formatting of the data.\n\n### How it Works\n\nThe constructor of the class\
    \ takes a single parameter. This is the URL of the RSS feed. When the class is\
    \ instantiated, it will read the content of the feed and store it in a private\
    \ variable called `$xml`.\n\nThe method `channel()` also takes a single parameter.\
    \ The parameter is used to identify and return the value. The can be used to fetch\
    \ `title` and `description` value from the channel section of the feed.\n\nFinally\
    \ the method `items()` is used to extract some of the values for each of the items\
    \ in the feed.\n\n```php\n<?php\n\n// 14_8.php\n\ndate_default_timezone_set('America/Los_Angeles');\n\
    \n$feeds = [\n\n    'https://www.nasa.gov/rss/dyn/breaking_news.rss',\n\n    'http://www.nasaspaceflight.com/feed/'\n\
    \n];\n\nclass RSSReader {\n\n    private $xml;\n\n    function __construct($url)\
    \ {\n\n        $this->xml = simplexml:load_file($url);\n\n    }\n\n    function\
    \ channel($name) {\n\n        return $this->xml->channel->$name;\n\n    }\n\n\
    \    function items() {\n\n        $i = [];\n\n        foreach($this->xml->channel->item\
    \ as $item) {\n\n            $i[] = [\n\n                (string)$item->title,\n\
    \n                (string)$item->description,\n\n                (string)$item->link,\n\
    \n                strtotime((string)$item->pubDate)\n\n            ];\n\n    \
    \    }\n\n        return $i;\n\n    }\n\n}\n\nforeach($feeds as $f) {\n\n    $rss\
    \ = new RSSReader($f);\n\n    echo \"<div>Channel: {$rss->channel('title')}</div>\"\
    ; echo \"<div>{$rss->channel('description')}</div>\"; foreach($rss->items() as\
    \ $item) {\n\n        echo <<<HEREDOC\n\n<div>\n\n<a href=\"{$item[2]}\">{$item[0]}</a>\n\
    \n<div>{$item[1]}</div>\n\n</div>\n\nHEREDOC;\n\n    }\n\n}\n```\n\nThe example\
    \ shows uses two feeds and it turns the content into a list of links that points\
    \ to the full story on each site. Because the function `strtodate()` is used to\
    \ convert the `pubDate` value into a Unix timestamp, it is necessary to call the\
    \ `date_default_timezone_set()` function or define the default time zone value\
    \ in `php.ini`.\n\nBest practice would be to save the values for each response\
    \ in a database and only query for new data once an hour.\n\n## Recipe 14-5. Standard\
    \ Data Exchange\n\n### Problem\n\nExchanging or syndicating data with RSS is simple\
    \ and efficient, but it's also limited to the values that are defined in the definition.\
    \ Adding new fields will most likely not work in all cases. Is there a way to\
    \ exchange structured data (numbers, strings, and Booleans, etc.) in a format\
    \ that can be described by the server allowing the client to consume the data?\n\
    \n### Solution\n\nIn the early days of the web the Web Distributed Data eXchange\
    \ (WDDX) platform was developed. It is built on XML where an element is defined\
    \ with a couple of tags that defines the name of the value, the type, and the\
    \ actual value. A simple example of the XML structure to exchange two values is\
    \ shown below.\n\n```xml\n<wddxPacket version='1.0'>\n\n<data>\n\n<var name=\"\
    language\">\n\n<string>PHP</string>\n\n</var>\n\n<var name=\"version\">\n\n<number>7</number>\n\
    \n</var>\n\n</data>\n\n</wddxPacket>\n```\n\nThe WDDX format is very simple and\
    \ easy to use but it has mostly been replaced by SOAP and XML-RPC, which offers\
    \ more functionality.\n\n### How it Works\n\nThe WDDX extension is not enabled\
    \ by default but it can be enabled if you have `libxml` and the `expat` library\
    \ (bundled with Apache from version 1.3.7)."
  raw: 'To follow best practices the list of items should be limited to the latest
    5 or 10 items of data. Each of the clients that subscribe to the feed can save
    copies of the elements for as long as the user wants. The client should not query
    the same feed again until the ttl value is exceeded. In this case it is set to
    1800 seconds or a half hour. Requesting updates from the feed too often will create
    high load on the server.


    Placing the RSSWriter() class in a separate file makes it possible to use the
    same class to generate multiple RSS feeds with different content.


    Recipe 14-4\. Consuming RSS Feeds


    Problem


    Depending on the definition used the last S in RSS stands for Syndication. Syndication
    is a way to share or distribute information. How can this be used to create a
    list of posts from a couple of space-related web sites?


    CHAPTER 14 ■ XML, RSS, WDDX, AND SOAP


    Solution


    We can use the SimpleXML extension to create a class that can read a feed, and
    perform extraction and formatting of the data.


    How it Works


    The constructor of the class takes a single parameter. This is the URL of the
    RSS feed. When the class is instantiated, it will read the content of the feed
    and store it in a private variable called $xml.


    The method channel() also takes a single parameter. The parameter is used to identify
    and return the value. The can be used to fetch title and description value from
    the channel section of the feed.


    Finally the method items() is used to extract some of the values for each of the
    items in the feed.


    <?php


    // 14_8.php


    date_default_timezone_set(''America/Los_Angeles'');


    $feeds = [


    ''https://www.nasa.gov/rss/dyn/breaking_news.rss'',


    ''http://www.nasaspaceflight.com/feed/''


    ];


    class RSSReader {


    private $xml;


    function __construct($url) {


    $this->xml = simplexml:load_file($url);


    }


    function channel($name) {


    return $this->xml->channel->$name;


    }


    function items() {


    $i = [];


    foreach($this->xml->channel->item as $item) {


    $i[] = [


    (string)$item->title,


    (string)$item->description,


    (string)$item->link,


    strtotime((string)$item->pubDate)


    ];


    }


    return $i;


    }


    }


    CHAPTER 14 ■ XML, RSS, WDDX, AND SOAP


    foreach($feeds as $f) {


    $rss = new RSSReader($f);


    echo "<div>Channel: {$rss->channel(''title'')}</div>"; echo "<div>{$rss->channel(''description'')}</div>";
    foreach($rss->items() as $item) {


    echo <<<HEREDOC


    <div>


    <a href="{$item[2]}">{$item[0]}</a>


    <div>{$item[1]}</div>


    </div>


    HEREDOC;


    }


    }


    The example shows uses two feeds and it turns the content into a list of links
    that points to the full story on each site. Because the function strtodate() is
    used to convert the pubDate value into a Unix timestamp it is necessary to call
    the date_default_timezone_set() function or define the default time zone value
    in php.ini.


    Best practice would be to save the values for each response in a database and
    only query for new data once an hour.


    Recipe 14-5\. Standard Data Exchange


    Problem


    Exchanging or syndicating data with RSS is simple and efficient, but it’s also
    limited to the values that are defined in the definition. Adding new fields will
    most likely not work in all cases. Is there a way to exchange structured data
    (numbers, strings, and Booleans, etc.) in a format that can be described by the
    server allowing the client to consume the data?


    Solution


    In the early days of the web the Web Distributed Data eXchange (WDDX) platform
    was developed. It is built on XML where an element is defined with a couple of
    tags that defines the name of the value, the type, and the actual value. A simple
    example of the XML structure to exchange two values is shown below.


    <wddxPacket version=''1.0''>


    <data>


    <var name="language">


    <string>PHP</string>


    </var>


    <var name="version">


    <number>7</number>


    </var>


    </data>


    </wddxPacket>


    The WDDX format is very simple and easy to use but it has mostly been replaced
    by SOAP and XML-RPC, which offers more functionality.


    CHAPTER 14 ■ XML, RSS, WDDX, AND SOAP


    How it Works


    The WDDX extension is not enabled by default but it can be enabled if you have
    libxml and the expat library (bundled with Apache from version 1.3.7).'
  trans: "\n# RSS 订阅源消费最佳实践\n\n遵循最佳实践时，推送列表应限制为最近 5 或 10 条数据。订阅该源的所有客户端均可按用户意愿保存元素副本。在未超过\
    \ `ttl` 值之前，客户端不应重复请求同一源。此例中 `ttl` 值设为 1800 秒（即半小时）。过于频繁地向源请求更新会给服务器带来高负载。\n\n\
    将 `RSSWriter()` 类放在单独文件中，便于使用同一个类生成包含不同内容的多个 RSS 推送源。\n\n## 秘诀 14-4：消费 RSS 推送源\n\
    \n### 问题\n\n根据不同的定义解释，RSS 末尾的 S 代表\"聚合\"。聚合是一种分享或分发信息的方式。如何利用这一点，从几个太空相关网站创建一篇帖子列表？\n\
    \n### 解决方案\n\n我们可以使用 `SimpleXML` 扩展创建一个类，用于读取推送源、提取数据并进行格式转换。\n\n### 工作原理\n\n\
    该类的构造函数接收一个参数，即 RSS 推送源的 URL。当类被实例化时，会读取推送源内容并存储在名为 `$xml` 的私有变量中。\n\n`channel()`\
    \ 方法同样接收一个参数，用于标识并返回对应值。该方法可用于从推送源的频道部分获取 `title` 和 `description` 的值。\n\n最后，`items()`\
    \ 方法用于提取推送源中每个条目的部分值。\n\n```php\n<?php\n\n// 14_8.php\n\ndate_default_timezone_set('America/Los_Angeles');\n\
    \n$feeds = [\n\n    'https://www.nasa.gov/rss/dyn/breaking_news.rss',\n\n    'http://www.nasaspaceflight.com/feed/'\n\
    \n];\n\nclass RSSReader {\n\n    private $xml;\n\n    function __construct($url)\
    \ {\n\n        $this->xml = simplexml:load_file($url);\n\n    }\n\n    function\
    \ channel($name) {\n\n        return $this->xml->channel->$name;\n\n    }\n\n\
    \    function items() {\n\n        $i = [];\n\n        foreach($this->xml->channel->item\
    \ as $item) {\n\n            $i[] = [\n\n                (string)$item->title,\n\
    \n                (string)$item->description,\n\n                (string)$item->link,\n\
    \n                strtotime((string)$item->pubDate)\n\n            ];\n\n    \
    \    }\n\n        return $i;\n\n    }\n\n}\n\nforeach($feeds as $f) {\n\n    $rss\
    \ = new RSSReader($f);\n\n    echo \"<div>频道: {$rss->channel('title')}</div>\"\
    ; echo \"<div>{$rss->channel('description')}</div>\"; foreach($rss->items() as\
    \ $item) {\n\n        echo <<<HEREDOC\n\n<div>\n\n<a href=\"{$item[2]}\">{$item[0]}</a>\n\
    \n<div>{$item[1]}</div>\n\n</div>\n\nHEREDOC;\n\n    }\n\n}\n```\n\n此示例使用两个推送源，并将内容转换为指向各网站完整故事的链接列表。由于使用了\
    \ `strtodate()` 函数将 `pubDate` 值转换为 Unix 时间戳，因此必须调用 `date_default_timezone_set()`\
    \ 函数或在 `php.ini` 中定义默认时区值。\n\n最佳做法是将每次响应的值保存到数据库中，并且每小时仅查询一次新数据。\n\n## 秘诀 14-5：标准数据交换\n\
    \n### 问题\n\n使用 RSS 交换或同步数据虽然简单高效，但仅限于标准中定义的值。添加新字段在大多数情况下可能无法正常工作。是否有一种方法，能以服务器可描述、客户端可消费的格式交换结构化数据（如数字、字符串和布尔值等）？\n\
    \n### 解决方案\n\n在互联网早期，人们开发了 Web 分布式数据交换（WDDX）平台。该平台基于 XML，通过一组标签定义值的名称、类型和实际值。以下是一个交换两个值的\
    \ XML 结构简单示例。\n\n```xml\n<wddxPacket version='1.0'>\n\n<data>\n\n<var name=\"\
    语言\">\n\n<string>PHP</string>\n\n</var>\n\n<var name=\"版本\">\n\n<number>7</number>\n\
    \n</var>\n\n</data>\n\n</wddxPacket>\n```\n\nWDDX 格式非常简单易用，但大多已被功能更丰富的 SOAP 和\
    \ XML-RPC 所取代。\n\n### 工作原理\n\nWDDX 扩展默认未启用，但如果你安装了 `libxml` 和 `expat` 库（Apache\
    \ 1.3.7 版本起已捆绑包含），则可以启用它。\n"
- fmt: "该扩展提供了一些函数，用于在 WDDX 数据包格式和变量之间进行序列化和反序列化。\n\n要创建一个包含单个值的 WDDX 数据包，可以使用`wddx_serialize_value()`函数。该函数接受两个参数。第一个参数是值：\n\
    \n```\n<?php\n// 14_9.php\n\necho wddx_serialize_value(\"PHP & MySQL Recipes\"\
    , \"Packet\");\n```\n\n此脚本将生成以下 XML：\n\n```\n<wddxPacket version='1.0'>\n<header><comment>Packet</comment></header>\n\
    <data><string>PHP &amp; MySQL Recipes</string></data>\n</wddxPacket>\n```\n\n\
    要将 WDDX 数据包转换回 PHP 变量，可以像这样使用`wddx_deserialize()`函数：\n\n```\n<?php\n// 14_10.php\n\
    \n$wddx = <<<HEREDOC\n<wddxPacket version='1.0'>\n<header><comment>Packet</comment></header>\n\
    <data><string>PHP &amp; MySQL Recipes</string></data>\n</wddxPacket>\nHEREDOC;\n\
    \nvar_dump(wddx_deserialize($wddx));\n```\n\n此脚本将生成以下 XML：\n\n```\n<wddxPacket\
    \ version='1.0'>\n<header><comment>Packet</comment></header>\n<data><string>PHP\
    \ &amp; MySQL Recipes</string></data>\n</wddxPacket>\n```\n\n这可用于交换任何类型的单个变量，但通过使用更多函数，可以交换多个变量。\n\
    \n```\n<?php\n// 14_11.php\n\n$int = 1234;\n$str = \"PHP & MySQL Recipes\";\n\
    $arr = [\n    12,\n    \"abc\",\n    [\n        3.15,\n        7.25\n    ]\n];\n\
    \n$packet_id = wddx_packet_start(\"Packet\");\nwddx_add_vars($packet_id, \"int\"\
    );\nwddx_add_vars($packet_id, \"str\");\nwddx_add_vars($packet_id, \"arr\");\n\
    echo wddx_packet_end($packet_id);\n```\n\n经过换行和缩进格式化后，输出如下所示：\n\n```\n<wddxPacket\
    \ version='1.0'>\n<header>\n<comment>Packet</comment>\n</header>\n<data>\n<struct>\n\
    <var name='int'>\n<number>1234</number>\n</var>\n<var name='str'>\n<string>PHP\
    \ &amp; MySQL Recipes</string>\n</var>\n<var name='arr'>\n<array length='3'>\n\
    <number>12</number>\n<string>abc</string>\n<array length='2'>\n<number>3.15</number>\n\
    <number>7.25</number>\n</array>\n</array>\n</var>\n</struct>\n</data>\n</wddxPacket>\n\
    ```\n\n## 方案 14-6：SOAP 服务器与客户端\n\n### 问题\n\n尽管上一节中的 WDDX 扩展可用于在不同系统和不同编程语言之间交换数据，但它仅支持有限的数据类型，并且直接对编程语言中的变量进行操作。拥有一种包含所交换数据的定义以及数据如何被验证的描述的数据交换格式，将大大提升交换的质量和灵活性。\n\
    \n### 解决方案\n\nSOAP（最初称为“简单对象访问协议”）就是解决方案。从该标准的 1.2 版本开始，这个缩写被弃用，现在简称为 SOAP。SOAP\
    \ 是一种基于 XML 的格式，其消息定义在 WSDL 文件（同样为 XML 格式）中提供。通过使用 WSDL 文件，客户端可以自动使用 SOAP API，而无需事先了解\
    \ API 的结构。\n\nSOAP 可工作于任何类型的传输协议，但通常与 HTTP/HTTPS 一起使用。\n\nPHP 实现了用于创建 SOAP 服务器和\
    \ SOAP 客户端功能的类。其基本功能是接受一个 PHP 类，并使用它来生成一个 SOAP 服务器。该类中的每个公共方法都将作为端点暴露出来，供客户端访问。\n\
    \n### 工作原理\n\nSOAP 格式支持向端点传递参数。这些参数可以作为查询的输入，就像方法是在本地调用一样。\n\n在第一个示例中，我们将创建一个能够执行一些简单数学运算的\
    \ SOAP 服务器。名为`Math`的类包含三个方法：`Add`、`Subtract`和`Multiply`，用于对两个数字进行加、减、乘运算。\n\n\
    ```\n<?php\n// 14_12.php\n\nclass Math {\n    function Add($i, $j) {\n       \
    \ return $i + $j;\n    }\n\n    function Subtract($i, $j) {\n        return $i\
    \ - $j;\n    }\n\n    function Multiply($i, $j) {\n        return $i * $j;\n \
    \   }\n}\n```"
  raw: 'The extension provides a few functions to serialize and deserialize variables
    to and from the WDDX


    packet format.


    To create a WDDX packet with a single value you can use the function wddx_serialize_value()
    . This function takes two parameters. The first is the value


    <?php


    // 14_9.php


    echo wddx_serialize_value("PHP & MySQL Recipes", "Packet"); This script will generate
    the following XML:


    <wddxPacket version=''1.0''>


    <header><comment>Packet</comment></header>


    <data><string>PHP &amp; MySQL Recipes</string></data>


    </wddxPacket>


    To convert a wddx packet back to PHP variables we can use the wddx_deserialize()
    function like this:


    <?php


    // 14_10.php


    $wddx = <<<HEREDOC


    <wddxPacket version=''1.0''>


    <header><comment>Packet</comment></header>


    <data><string>PHP &amp; MySQL Recipes</string></data>


    </wddxPacket>


    HEREDOC;


    var_dump(wddx_deserialize($wddx));


    This script will generate the following XML:


    <wddxPacket version=''1.0''>


    <header><comment>Packet</comment></header>


    <data><string>PHP &amp; MySQL Recipes</string></data>


    </wddxPacket>


    CHAPTER 14 ■ XML, RSS, WDDX, AND SOAP


    This can be used to exchange a single variable of any type, but with a bit more
    functions it’s possible to exchange multiple variables.


    <?php


    // 14_11.php


    $int = 1234;


    $str = "PHP & MySQL Recipes";


    $arr = [


    12,


    "abc",


    [


    3.15,


    7.25


    ]


    ];


    $packet_id = wddx_packet_start("Packet");


    wddx_add_vars($packet_id, "int");


    wddx_add_vars($packet_id, "str");


    wddx_add_vars($packet_id, "arr");


    echo wddx_packet_end($packet_id);


    The output will look like this when formatted with line breaks and indentation:


    <wddxPacket version=''1.0''>


    <header>


    <comment>Packet</comment>


    </header>


    <data>


    <struct>


    <var name=''int''>


    <number>1234</number>


    </var>


    <var name=''str''>


    <string>PHP &amp; MySQL Recipes</string>


    </var>


    <var name=''arr''>


    <array length=''3''>


    <number>12</number>


    <string>abc</string>


    <array length=''2''>


    <number>3.15</number>


    <number>7.25</number>


    </array>


    </array>


    </var>


    </struct>


    </data>


    </wddxPacket>


    CHAPTER 14 ■ XML, RSS, WDDX, AND SOAP


    Recipe 14-6\. SOAP Server and Client


    Problem


    Although the WDDX extension from the previous section can be used to exchange
    data between different systems and different programming languages it only has
    support for limited data types and it works directly on variables in the programming
    language. Having a data exchange format that includes definitions of the data
    that is being exchanged and a description of how the data can be validated would
    greatly improve on the quality and flexibility of the exchange.


    Solution


    SOAP or as it was called in the beginning ‘Simple Object Access Protocol’ is the
    solution. As of version 1.2 of the standard, the acronym was dropped and it’s
    now just called SOAP. SOAP is a XML-based format where the message definition
    is provided in a wdsl file (also XML format). With the use of the wdsl file it’s
    possible for clients to consume SOAP API’s in an automated fashion without prior
    knowledge of the API structure .


    SOAP works over any type of transport protocol but is often used with HTTP/HTTPS.


    PHP implements classes for creation of both SOAP Server and SOAP Client functionality
    . The basic functionality takes a PHP class and uses that to generate a SOAP Server.
    Each of the public methods in the class will be exposed as endpoints that can
    be accessed by the clients.


    How it Works


    The SOAP format supports passing parameters to the endpoints. These parameters
    can be used as input to the query as if the method was called locally.


    In this first example we will create a SOAP server that can perform some simple
    math operations. The class called Math has three methods that can Add, Subtract,
    or Multiply two numbers.


    <?php


    // 14_12.php


    class Math {


    function Add($i, $j) {


