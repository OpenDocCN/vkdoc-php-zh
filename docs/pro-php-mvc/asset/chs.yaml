  \n## 第 31 章：CakePHP：MVC\n\nCakePHP 是一个功能强大、半自动化的框架，旨在实现快速应用开发，并遵循“约定优于配置”的原则。这意味着\
  \ CakePHP 的许多部分会预先做出一些假设，然后继续推进。这涵盖了诸如 ORM 和视图生成等领域——在你打开代码编辑器之前，框架就已为你决定了如何处理数据以及如何渲染界面的诸多细节。\n\
  \n### 目标\n\n-   我们需要理解 CakePHP 的 ORM 系统是如何工作的，以便能够创建和使用示例应用程序所需的模型。\n-   我们需要创建与这些模型进行交互的视图和控制器。\n\
  \n### 模型里有什么？\n\n对于 CakePHP 来说，模型包含的内容比我们之前所见或构建的要多得多。它内置了大量功能，可以帮助我们开发数据实体之间的复杂关系并快速提取数据；然而，这种复杂性也可能阻碍开发。\n\
  \n请参考列表 31-1 中所示的数据库表。\n\n***列表 31-1.*** `users` 表\n\n```mysql\nCREATE TABLE 'users'\
  \ (\n  'id' int(11) NOT NULL AUTO_INCREMENT,\n  'live' tinyint(4) DEFAULT NULL,\n\
  \  'deleted' tinyint(4) DEFAULT NULL,\n  'created' datetime DEFAULT NULL,\n  'modified'\
  \ datetime DEFAULT NULL,\n  'first' varchar(32) DEFAULT NULL,\n  'last' varchar(32)\
  \ DEFAULT NULL,\n```\n\n\n\n```sql\n'email' varchar(100) DEFAULT NULL,\n'password'\
  \ varchar(32) DEFAULT NULL,\nPRIMARY KEY ('id')\n) ENGINE=InnoDB DEFAULT CHARSET=utf8\
  \ ;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 31 章 ■ Cakephp：MVC\
