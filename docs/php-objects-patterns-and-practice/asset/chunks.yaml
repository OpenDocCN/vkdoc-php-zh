    the method runs. `__clone()` is run on the copied object and not the original.
    Here I add `__clone()` to yet another version of the `Person` class:


    ```

    // listing 04.81

    class Person

    {

    private $name;

    private $age;

    private $id;

    public function __construct(string $name, int $age)

    {

    $this->name = $name;

    $this->age = $age;

    }

    public function setId(int $id)

    {

    $this->id = $id;

    }

    public function __clone()

    {

    $this->id = 0;

    }

    }

    ```


    When `clone` is invoked on a `Person` object, a new shallow copy is made, and
    its `__clone()` method is invoked. This means that anything I do in `__clone()`
    overwrites the default copy I already made. In this case, I ensure that the copied
    object’s `$id` property is set to zero:


    ```

    // listing 04.82

    $person = new Person("bob", 44);

    $person->setId(343);

    $person2 = clone $person;

    // $person2 :

    //     name: bob

    //     age: 44

    //     id: 0.

    ```


    A shallow copy ensures that primitive properties are copied from the old object
    to the new. Object properties, though, are copied by reference, which may not
    be what you want or expect when cloning an object. Say that I give the `Person`
    object an `Account` object property. This object holds a balance that I want copied
    to the cloned object. What I don’t want, though, is for both `Person` objects
    to hold references to the same account:


    ```

