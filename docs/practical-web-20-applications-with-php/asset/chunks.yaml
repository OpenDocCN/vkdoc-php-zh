    **Specifying the File Input Type**


    The other element in Listing 11-3 that we have not yet discussed is the file input.
    This is a special type of form element that allows the user to select a file from
    their computer for upload. It is typically made up of a text input on the left
    and a button on the right (used to open the file-selection dialog box).


    Browsers typically give developers less control over the look and feel of file
    inputs than for other inputs, as there would be security implications if they
    did not do this. Here are some of the things you can and can’t do with file inputs
    (although different browsers will behave slightly differently):


    • You can observe the onchange event, so you can detect when the user has chosen
    a file (or removed their selection).


    • You can retrieve the value of the form element. This does not mean you can read
    the contents of the selected file—you can simply read the path and/or filename
    of the file as it is stored on the user’s computer.


    • You can change the font size and color of the file input element, but you cannot
    change the text (most browsers will use “Browse…”).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch11CMP2 11/15/07 8:13 AM Page 378


    **378**


    C H A P T E R 1 1 ■ A DY N A M I C I M A G E G A L L E RY


    • You cannot use a custom image as the browse button, nor can you hide the text
    input that shows the file path. However, you can manipulate the input by changing
    its position in CSS or making it fully transparent (allowing you to add styled
    buttons behind it).


    Some web developers have been quite creative in how they style this input in an
    effort to customize their own site layout fully. We will be using the plain-vanilla
    version of the file input control, as shown in Listing 11-3.


    **Setting the Maximum File Size**


    The next step is to look at how maximum file upload sizes are specified. You will
    want to impose some kind of restriction on the maximum size of uploaded files
    to prevent abuse from users. There are several ways to achieve this, both within
    the HTML form as well as on the server:


    • MAX_FILE_SIZE: By including a hidden form element called MAX_FILE_SIZE, you
    can set the maximum number of bytes in an uploaded file by specifying that value
    as the form element value. Using this feature is somewhat pointless, since it
    can easily be fooled by somebody manually manipulating the form data.


    • post_max_size: This is a php.ini setting that specifies the maximum size POST
    request data can be. Note that if there are several files being uploaded within
    a single form, this value applies to the total amount of data being included.
    In a default PHP installation, this value is set to 8MB (using the value 8M).


    • upload_max_filesize: This php.ini setting specifies the maximum size for a single
    file that is uploaded. By default, this value is set to 2MB. In combination with
    the post_max_size value (of 8M), you could upload three 1.5MB files (since each
    is below 2MB and the total is approximately 4.5MB), but uploading 10 1MB files
    would fail since the total would be about 10MB.


    You should use the post_max_size and upload_max_filesize settings to specify upload
    limits and ignore the MAX_FILE_SIZE form directive. In addition to these limits,
    you may also want to impose other artificial limits on users, such as the maximum
    number of photos per blog post or a total quota for their account.


    Realistically, you won’t need to make any changes to your configuration to deal
    with maximum file sizes. However, if you wanted to allow users to upload other
    types of files (such as PDF or MP3 files), you would want to increase these configuration
    settings.


    ■**Note** We won’t be implementing any such restrictions in this chapter; however,
    as an exercise, you may want to add this functionality. Note that if you choose
    to restrict the number of photos per blog post, the user can get around this limit
    by simply creating more posts. As such, using an absolute number as a restriction
    may be a better solution (such as 20MB per user).


