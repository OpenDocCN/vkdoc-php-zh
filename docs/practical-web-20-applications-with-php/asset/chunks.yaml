    We will next take a quick look at handling client requests, and then we will return
    to our MySQL database and look at the PHP code for accessing the database.


    ## Using the Model-View-Controller Pattern


    The Model-View-Controller (MVC) design pattern is a commonly used method of designing
    web applications. In simple terms, it separates the presentation of the application
    from the underlying application logic.


    The three parts of the pattern work as follows:


    - **Model:** This represents the application logic. It performs the "hard work"
    of the application, such as interacting with the database, processing credit card
    transactions, or sending e-mails to users.

    - **View:** The *view* represents the user interface. In the case of our application,
    this will typically be HTML code. We will be using the Smarty Template Engine
    to manage the view aspect of our application.

    - **Controller:** The *controller* joins the *view* to the *model*. That is, it
    responds to events (such as when a user submits a web form), potentially updating
    the state of the application by interacting with the *model*.


    Figure 2-1 shows how the three parts of MVC fit together in a typical web application.


    **Figure 2-1.** *How the Model-View-Controller design pattern fits together in
    our application*


    We will be using the `Zend_Controller` class to handle the controller aspect of
    MVC. All user requests will be handled by this class, which will then result either
    in a new web page being displayed to the user (using Smarty), or in some update
    to the application (such as a new blog post being written to the database).


    ## Separating Application Logic from Presentation Logic


    To better demonstrate how MVC works, let''s use the example of a simple news-article
    publishing system both using MVC and not using it.


    The most basic way to retrieve a series of news articles from a database and display
    them would be to create a PHP script that connects to a database, queries the
    database, then loops over the results and outputs some HTML for each article.
    The following code shows what such a script might look like.


    ```

    <?php

    mysql_connect(...);

    $result = mysql_query(''select * from news order by article_date desc'');

    ?>

    <html>

    <body>

    <h1>News Articles</h1>

    <?php while ($row = mysql_fetch_object($result)) { ?>

    <h2><?php echo $row->headline ?></h2>

    <p>

    <?php echo $row->body ?>

    </p>

    <?php } ?>

    </body>

    </html>

    ```


    In the preceding script, the application logic is the code that connects to the
    database server and retrieves the rows from the news table. The presentation logic
    is the HTML code that outputs the articles.


    The problem with a script like this is that it can be hard to maintain, especially
    if you change the way the news system works (for instance, if you wanted to rename
    the table to news_articles). While it appears that you only need to change the
    code in place, consider what would happen if you wanted to display your news articles
    on other pages also. You would need to duplicate this code and then maintain it
    accordingly.


    Now consider using the MVC pattern to implement this code. There are essentially
    two key changes that would be made. The first would be to move the code that retrieves
    articles from the database into a reusable component (either a PHP class or function).
    We would then call this new function to retrieve the articles so they could be
    output using HTML. In MVC terms, this new class or function is the *model*.


    The second change would be to separate the call to retrieve the articles from
    the actual HTML. While this change isn''t quite as important as the first change,
    it is still important as it allows you to change your HTML code without having
    to worry about how the data used in the HTML is generated. In MVC terms, this
    is separating the *controller* from the *view*.


    Figure 2-2 shows how the previous code would be structured to use MVC.


    **Figure 2-2.** *The news article example represented in MVC*


    In the MVC version, you would effectively have three files. The model:


    ```

    <?php

    function get_articles()

    {

    mysql_connect(...);

    $result = mysql_query(''select * from news order by article_date desc'');

    $articles = array();

    while ($row = mysql_fetch_objects($result)) {

    $articles[] = $row;

    }

    return $articles;

    }

    ?>

    ```


    The controller:


    ```

    <?php

    $articles = get_articles();

    display_template(''articles.tpl'');

    ?>

    ```


    > **Note:** `display_template()` is a fictional function that represents some
    mechanism used to render templates.


    And the view:


    ```

    <html>

    <body>

    <h1>News Articles</h1>

    <?php foreach ($articles as $row) { ?>

    <h2><?php echo $row->headline ?></h2>

    <p>

    <?php echo $row->body ?>

    </p>

    <?php } ?>

    </body>

    </html>

    ```


    While this example is fairly trivial, considering how the news articles are maintained
    (that is, inserted, edited, or deleted) will highlight the advantages of MVC.
    It is a nightmare to maintain code that mixes SQL insert statements directly within
    the HTML output for the corresponding page.


    ## Directing All Requests to `index.php`


    To implement our application using MVC, we will use the `Zend_Controller` class.
    First, though, we must alter our web server configuration to direct all page requests
    to `Zend_Controller`, even if the requested location is not a real file on the
    filesystem. All requests to files that do exist on the filesystem (such as our
    images and CSS files) will be handled normally by Apache; however, all other requests
    will be handled by the application bootstrap file (which will be located in `/var/www/phpweb20/htdocs/index.php`).


    The directives in Listing 2-3 should be placed in a file called `.htaccess` inside
    `./htdocs`. Note that these could be placed in the `httpd.conf` file we created
    earlier, but doing it here allows us to make changes without restarting the web
    server. The `RewriteRule` directive in Listing 2-3 routes any request that doesn''t
    correspond to an actual file or directory through `index.php`.


    > **Note:** The `AllowOverride` directive in the Apache configuration we created
    earlier allows us to change the configuration within a `.htaccess` file.


    **Listing 2-3.** *Routing All Web Site Requests Through the index.php File (.htaccess)*


    ```

    RewriteEngine on

    RewriteCond %{SCRIPT_FILENAME} !-f

    RewriteCond %{SCRIPT_FILENAME} !-d

    RewriteRule ^(.*)$ index.php/$1

    ```


    The first line in Listing 2-3 enables `mod_rewrite` for the directory in which
    `.htaccess` is located (including subdirectories).


    The second and third lines set up conditions for rewriting the request to `index.php`.
    The second line says "if the requested file doesn''t correspond to a file relative
    to the web root then use the rewrite rule," while the third line says the same
    thing but for nonexistent directories.


    The final line is then executed if either of the conditions is satisfied. The
    requested filename is made available to `index.php` by adding it to the request
    string.


    ## Introduction to the `Zend_Controller` Class


    Let''s now begin with the `Zend_Controller` class. Since we have already installed
    the Zend Framework, we can access this class easily. You will learn how to use
    this class in this section.


    First, we will create the `index.php` file in the `./htdocs` directory (to which
    requests are routed using `mod_rewrite`). This file will drive our entire web
    site. Every single user request will be handled by this file (aside from requests
    for files such as images or CSS). This file is the *bootstrap* file.


    > **Note:** From here onwards in the book, when I use the filesystem path `./`
    I am referring to `/var/www/phpweb20`. For example, the path `/var/www/phpweb20/htdocs/index.php`
    will now be referred to as `./htdocs/index.php`.


    All this bootstrap file needs to do is load and initialize the `Zend_Controller_Front`
    class, then call the `dispatch()` method, which will call the necessary code to
    handle the request.


    Note that `Zend_Controller_Front` is a singleton class, meaning that only one
    instance of the class may exist. This is why the `getInstance()` method is used
    to instantiate it. Listing 2-4 shows the contents of the `index.php` file.


    **Listing 2-4.** *Handling Client Requests Using Zend_Controller (index.php)*


    ```

    <?php

    require_once(''Zend/Loader.php'');

    Zend_Loader::registerAutoload();


    $controller = Zend_Controller_Front::getInstance();

    $controller->setControllerDirectory(''../include/Controllers'');

    $controller->dispatch();

    ?>

    ```


    We will use the `registerAutoload()` method from `Zend_Loader` to automatically
    load Zend Framework classes. Doing this means you don''t have to use `require_once`
    for any of the Zend Framework classes you use (apart from `Zend_Loader`).


    > **Note:** If you decide to use Zend Framework in any other apps that already
    use PHP''s class autoloading, you will either have to modify your autoloader or
    manually include the Zend Framework library files. The filenames correspond to
    classes simply by replacing underscores in the class name with a slash and appending
    `.php`. For instance, `Zend_Controller_Front` can be included using `require_once(''Zend/Controller/Front.php'')`.


    ### How Requests Work with `Zend_Controller`


    If you were to run the code in Listing 2-4 (by visiting `http://phpweb20`), nothing
    useful would happen—an error would be shown. At this point, we need to look at
    how requests work with `Zend_Controller`.


    > **Note:** Depending on your PHP configuration, errors may in fact be logged
    to the filesystem rather than displayed on screen, so be sure to look for a log
    file if you encounter unexpected behavior but no error messages. We will deal
    with error handling (such as "404 File Not Found") in Chapter 14.


    In Listing 2-4 we called the `setControllerDirectory()` method. This is used to
    specify the directory that holds our web application''s *controllers*—that is,
    classes that are used to handle requests to the application.


    For example, you might have a controller called `news`, used for displaying both
    a summary of all news articles on your site, and for displaying individual articles.
    To create this controller, you would create a class called `NewsController` and
    save it in the `Controllers` directory (`./include/Controllers/NewsController.php`).


    When `Zend_Controller` routes a user request, it automatically looks in the controller
    directory for a file called *Name*`Controller.php`, where *Name* corresponds to
    the controller name specified. The name is automatically capitalized, meaning
    a controller named `news` corresponds to a file called `NewsController.php`.


    > **Note:** The typical naming convention in PHP (including in the Zend Framework)
    is to capitalize each word in a class name (regardless of whether each word is
    separated by an underscore). Conversely, class methods use camel caps, meaning
    all words in the method name begin with an uppercase letter except for the first
    word. As an extra caveat, I prefer to capitalize all words for static class methods.
    This lets me know instantly that the method is static without needing to understand
    the function.

    >

    > Other conventions include using two underscores for PHP''s magic method (these
    names are built into PHP, such as `__get()`, `__set()`, `__unset()`, and `__isset()`),
    while method names beginning with one underscore indicate private or protected
    methods (which can only be called with the class or package respectively).


    To then access this controller in your application, you would visit `http://phpweb20/news.`


    To view a specific news article, you might create an action called `display`,
    which would be accessed at `http://phpweb20/news/display.` To create this action,
    you would define a method called `displayAction()` inside of `NewsController`.
    Figure 2-3 shows how the URL is broken down to correspond to a controller class
    name and an action handler function within that class.


    **Figure 2-3.** *Breaking down a URL into the controller and action*


    The following code demonstrates this. We won''t be using this particular class
    in our application, but we will be creating similar classes.


    ```

    <?php

    class NewsController extends Zend_Controller_Action

    {

    public function indexAction()

    {

    echo ''News article index'';

    }


    public function displayAction()

    {

    echo ''News article details'';

    }

    }

    ?>

    ```


    > **Note:** In addition to displaying the string echoed in the preceding function,
    an error message would also be displayed due to the way `Zend_Controller` automatically
    displays templates. We will look at this more closely later in the "Automatic
    View Rendering with Zend_Controller" section of this chapter.


    If we were to include this controller in our application (by saving it to `./include/Controllers/NewsController.php`),
    we would visit `http://phpweb20/news/display` to display the "New article details"
    text. In this URL, `news` is the controller, and `display` is the action.


    The default controller and action are both `index`. Here are some examples:


    - `http://phpweb20` is equivalent to `http://phpweb20/index`, as is `http://phpweb20/index/index`

    - `http://phpweb20/news` is equivalent to `http://phpweb20/news/index`


    ### Creating the `IndexController`


    At this point in our application development, we must create a controller for
    the root of the site. That is, a controller called `index` that defines an action
    called `index`. Listing 2-5 shows the contents of `IndexController.php`, which
    we will save to the `./include/Controllers` directory.


    > **Note:** As mentioned previously, `Zend_Controller` looks for the controller
    file by capitalizing the first letter of the controller name and appending `Controller.php`
    to it. So in this case, the `index` controller code belongs inside a file called
    `IndexController.php`.


    **Listing 2-5.** *The Index Controller, Which Is Used for the Web Application
    Home Page (IndexController.php)*


    ```

    <?php

    class IndexController extends Zend_Controller_Action

    {

    public function indexAction()

    {

    echo ''Web site home'';

    }

    }

    ?>

    ```


    While this particular controller doesn''t yet do anything useful, we will be adding
    to it, as well as creating new controllers as we move on in this book. In fact,
    not only will we extend this controller, but we will add functionality that will
    extend to all controllers. To allow for this, we will extend the `Zend_Controller_Action`
    class in a new class called `CustomControllerAction`.


    Listing 2-6 shows the contents of `CustomControllerAction.php`, which should be
    stored in the `./include` directory.


    **Listing 2-6.** *The Controller Action That All of Our Application Controllers
    Will Extend from (CustomControllerAction.php)*


    ```

    <?php

    class CustomControllerAction extends Zend_Controller_Action

    {

    public $db;


    public function init()

    {

    $this->db = Zend_Registry::get(''db'');

    }

    }

    ?>

    ```


    At this stage, we have only defined the `init()` function, which is automatically
    called by `Zend_Controller_Front` when a controller is loaded. Currently it simply
    fetches the database handle from the application registry and stores it in the
    `db` property. This allows us to refer to `$this->db` from any of our controllers.
    If we want an `init()` function in any of the child classes, we must also call
    `parent::init()` from that class so that the `init()` function in Listing 2-6
    is also called.


    > **Note:** Listing 2-6 relies on the application database connection being in
    the variable registry that we will use `Zend_Registry` to manage. We create the
    database connection and look at the `Zend_Registry` component in the "Connecting
    to the Database" section.


    We now need to modify our `IndexController` class to extend `CustomControllerAction`
    instead of `Zend_Controller_Action`. Listing 2-7 shows the updated code for `IndexController.php`.


    **Listing 2-7.** *Modifying the Index Controller to Use the New Controller Action
    (IndexController.php)*


    ```

    <?php

    class IndexController extends CustomControllerAction

    {

    public function indexAction()

    {

    echo ''Web site home'';

    }

    }

    ?>

    ```


    ## Defining Application Settings


    Before we go any further in developing our application code, we''re going to define
    some application settings. We will store these settings in a file called `settings.ini`,
    and we will use the `Zend_Config_Ini` class to access them.


    > **Note:** `Zend_Config` also allows storage of settings in an XML file instead
    of an Ini file. The `Zend_Config_XML` class would be used instead of `Zend_Config_Ini`.
    If you prefer, you can use the XML solution instead, since it makes no real difference
    to the functionality of the application.


    The initial settings we will be storing are the database connection details and
    application path settings. We will not be implementing any mechanism to update
    these settings—if you want to change application settings, you will need to edit
    the values in this file. We will add further settings to this file as required.


    Listing 2-8 shows the initial application settings we will be using (`/var/www/phpweb20/settings.ini`).
    Update any of these values as you require.


    **Listing 2-8.** *The Initial Application Settings (settings.ini)*


    ```

    [development]

    database.type = pdo_mysql

    database.hostname = localhost

    database.username = phpweb20

    database.password = myPassword

    database.database = phpweb20


    paths.base = /var/www/phpweb20

    paths.data = /var/www/phpweb20/data

    paths.templates = /var/www/phpweb20/templates


    logging.file = /var/www/phpweb20/data/logs/debug.log

    ```


    The first line of this file defines a section in the file. It is possible to have
    multiple configurations in the same file, and I have specified a section called
    `development`. You might also define sections called `staging` and `production`
    in the same file, allowing you to use different database details or a different
    path without having to edit the file when you deploy the application.


    Initially the logging file will not exist, but assuming the write permissions
    are correctly set on the logs directory, `debug.log` will automatically be created
    when required.


    > **Note:** You must define at least one section in a configuration file when
    using `Zend_Config`, as the section to load must be specified when the file is
    loaded.


    Once `settings.ini` is set up, we need to load it in the `index.php` file using
    the `Zend_Config_Ini` class. Listing 2-9 shows an updated version of `index.php`,
    now including both the request handling code, as well as the code to load the
    configuration.


    **Listing 2-9.** *Using the Zend_Config_Ini Class to Load the Application Settings
    (index.php)*


    ```

    <?php

    require_once(''Zend/Loader.php'');

    Zend_Loader::registerAutoload();


    $config = new Zend_Config_Ini(''../settings.ini'', ''development'');

    Zend_Registry::set(''config'', $config);


    $controller = Zend_Controller_Front::getInstance();

    $controller->setControllerDirectory($config->paths->base . ''/include/Controllers'');

    $controller->dispatch();

    ?>

    ```


    > **Tip:** In Chapter 14 we will implement error handling in this code to deal
    with fatal errors (such as being unable to connect to the database server). In
    the meantime, `Zend_Controller` will suppress these errors, making potential debugging
    difficult. You may wish to add `$controller->throwExceptions(true)` to `index.php`
    after `$controller` has been created (and before the request is dispatched) to
    make identifying any potential errors easier.


    As you can see, the `Zend_Config_Ini` class is instantiated, passing the settings
    filename as the first argument and the settings section as the second argument.


    Following this, we use the `Zend_Registry` class. This allows us to store the
    `$config` object in a global registry so we can easily access this object again
    throughout the script''s execution without needing to reinstantiate `Zend_Config_Ini`.
    This is a technique we will also use with the database connection.


    Now, to access any of our configuration variables, we can simply use `$config->*key*`.
    For instance, to access the `database.password` setting, we would use `$config->database->password`
    in our code. Note that we have also updated the `setControllerDirectory()` call
    to use the path we set in the config to find the controller classes for `Zend_Controller`.


    ## Connecting to the Database


    Now that we have all of our database settings stored in the `$config` variable,
    we can easily create our database connection. For this, we use the `Zend_Db` class.
    We must first build an array with the database connection settings, and then call
    `Zend_Db::factory()` to find the appropriate database handler.


    What does this mean, exactly? In our configuration, we specified the database
    type as `pdo_mysql`, and the `factory()` method will find the appropriate handler
    for this database type. If you wanted to use PostgreSQL instead, you could simply
    update the `database.type` value in `settings.ini` to `pdo_pgsql`, and if you
    had this driver installed with your PHP installation, it would use that one instead.


    The following example code will connect to a database using the `pdo_mysql` driver:


    ```

    <?php

    require_once(''Zend/Loader.php'');

    Zend_Loader::registerAutoload();


    $params = array(''host'' => ''localhost'',

    ''username'' => ''phpweb20'',

    ''password'' => ''myPassword'',

    ''dbname'' => ''phpweb20'');


    $db = Zend_Db::factory(''pdo_mysql'', $params);

    ?>

    ```


    Note that I have hard-coded the connection settings in this example; the code
    in our application will call the appropriate settings we defined previously.


    > **Note:** `Zend_Db` doesn''t initiate a connection to the database until a query
    is actually executed, so, technically speaking, in this example no connection
    is actually made.


    Our next step is to include the database connection code in our `index.php` file—there
    are two key additions we must make. The first is to fetch the connection values
    from `$config` instead of hard-coding them. The second is to write the `$db` object
    to the `Zend_Registry` so we can use it throughout our application.


    Listing 2-10 shows the updated `index.php` file, this time connecting to the database
    and writing the `$db` object to the registry.


    **Listing 2-10.** *The index.php File, Now Connecting to the Application Database
    (index.php)*


    ```

    <?php

    require_once(''Zend/Loader.php'');

    Zend_Loader::registerAutoload();


    // load the application configuration

    $config = new Zend_Config_Ini(''../settings.ini'', ''development'');

    Zend_Registry::set(''config'', $config);


    // connect to the database

    $params = array(''host'' => $config->database->hostname,

    ''username'' => $config->database->username,

    ''password'' => $config->database->password,

    ''dbname'' => $config->database->database);

    $db = Zend_Db::factory($config->database->type, $params);

    Zend_Registry::set(''db'', $db);


    // handle the user request

    $controller = Zend_Controller_Front::getInstance();

    $controller->setControllerDirectory($config->paths->base .

    ''/include/Controllers'');

    $controller->dispatch();

    ?>

    ```


    ### Testing the Database Connection


    Now that we have written the database connection code, it is best to ensure that
    the connection actually works. As mentioned previously, a connection is not actually
    made to the database server until a query is executed, so to test the connection
    we need to execute a basic SQL query.


    Add an extra line of code after creating the `$db` object in `index.php` as follows:
    `$db->query(''select 1'');`


    If you visit `http://phpweb20` now, an error will be shown if the connection to
    the database could not be made (such as `Zend_Db_Adapter_Exception: SQLSTATE…`).
    Remember to remove this test query from your code afterwards.


    > **Note:** In Chapter 14 we will add code to handle application errors such as
    invalid database connections.


    ## The Smarty Template Engine


    Smarty is a template engine written for PHP that allows you to easily separate
    your application output and presentation logic from your application logic. We
    looked at what this means earlier in this chapter when covering the Model-View-Controller
    design pattern, but what does it actually mean in terms of using Smarty?


    Basically, anything we want to show to the user (that is, the HTML output) will
    be stored in a template file (which we will denote with a file extension of `.tpl`).
    After a user request has been processed, whether that means processing a form
    or fetching a list of news articles to display, we will use Smarty to output that
    template file.


    A template file contains a series of placeholders used to dynamically output content.
    So in the case of displaying a list of news articles, the template file would
    loop over the articles and provide HTML code for each one. In addition, prior
    to displaying the template, we must tell the template about any data we want to
    be able to show in it. So in the case of news articles, we must *assign* the articles
    to the template prior to displaying the template.


    To demonstrate this, I will return to the `NewsController` example we looked at
    above in the "How Requests Work with Zend_Controller" section. The following example
    shows the basic algorithm used to assign data to a template and then display that
    template. For this code to work, we must set `template_dir` and `compile_dir`
    accordingly. These settings indicate the filesystem paths where templates are
    stored and where compiled templates should be written, respectively. This is covered
    in more detail in the "Downloading and Installing Smarty" section later in the
    chapter.


    ```

    <?php

    class NewsController extends Zend_Controller_Action

    {

    public function indexAction()

    {

    require_once(''Smarty/Smarty.class.php'');


    $articles = array(''News Article 1'',

    ''Another News Article'',

    ''Even More News'');


    $smarty = new Smarty();

    $smarty->template_dir = ''/var/www/phpweb20/templates'';

    $smarty->compile_dir = ''/var/www/phpweb20/data/tmp/templates_c'';


    $smarty->assign(''news'', $articles);

    $smarty->display(''news/index.tpl'');

    }

    }

    ?>

    ```


    The first thing to do is define some data to assign to the template. In this case,
    I''ve created a simple array called `$articles`, which contains some fake news
    headlines. After instantiating and configuring the `$smarty` object, I assign
    the `$articles` array to `$smarty`, and finally output the `news/index.tpl` file.
    Based on the specified `template_dir`, the full path of this template would be
    `./templates/news/index.tpl`.


    Now let''s see what the `news/index.tpl` template might look like. There''s a
    lot going on in this template.


    ```

    <h1>News</h1>

    {if $news|@count == 0}

    <p>

    No news found!

    </p>

    {else}

    <ul>

    {foreach from=$news item=article}

    <li>{$article|escape}</li>

    {/foreach}

    </ul>

    {/if}

    ```


    The first thing to note is that I haven''t included all of the normal HTML tags
    (such as the document type and `<html>` and `<body>` tags). Typically we would
    include these tags, but I have tried to keep the clutter out of this template.


    Next is an `if/else` statement. Note that it is wrapped in curly braces. These
    are the default delimiters for Smarty template code. Note also that `if` expressions
    in Smarty are not wrapped in parentheses as they would be in PHP.


    Note also that in this template, I use `$news` to refer to the article data. In
    the previous news example, I assigned the `$articles` variables to the template
    using the name `news`.


    When processing the data, I first check whether the `$news` array is empty by
    using the PHP `count()` function. In fact, what I am doing is using a Smarty *modifier*.
    Modifiers are applied using a vertical pipe. Essentially, the variable is passed
    to the modifier as its first argument.


    Smarty comes with several built-in modifiers, but you can also use any PHP function
    as a modifier. Because PHP''s `count()` accepts an array as an argument, I put
    the `@` character before `count`. If I didn''t, Smarty would loop over the array
    and pass each array element to `count()`, rather than the array as a whole.


    It is also possible to pass arguments to modifiers. For instance, if you wanted
    to retrieve the first three characters of a string using `substr()`, you could
    do so using `$myStr|substr:0:3`, which is equivalent to calling `substr($myStr,
    0, 3)` in PHP. To output a variable, simply wrap the variable in curly braces.
    So to output the first three characters of a string in the template, you would
    use `{$myStr|substr:0:3}` in the template.


    > **Note:** You can also chain several modifiers together. In the preceding example,
    you could change the output to display the first three characters of a string
    in uppercase by also applying `strtoupper()` as a modifier. To do this, you would
    use `{$myStr|substr:0:3|strtoupper}`. Modifiers are applied in order from left
    to right.


    In the template, I next use the `{foreach}` tag to loop over the `$news` array.
    This behaves almost identically to `foreach()` in PHP. The array is passed in
    using the `from` argument, and the current element of the array is assigned to
    variable specified in the `item` argument. So in the preceding example, the PHP
    equivalent of `{foreach from=$news item=article}` is `foreach ($news as $article)`.
    If I also wanted the array key, I would specify the `key` argument: `{foreach
    from=$news item=article key=k}` would be equivalent to `foreach ($news as $k =>
    $article)` in PHP.


    Now I output each element of the array inside of the `foreach` loop. I could simply
    use `{$article}`, but I have improved this slightly by using the `escape` modifier
    (this is a Smarty modifier, not a PHP function). This modifier should be frequently
    used when outputting data inside of HTML documents, as it will escape HTML entities
    to make the document valid. In other words, it will turn `>` into `&gt;`, `<`
    into `&lt;`, and `&` into `&amp;`, among others.


    Finally, I close the `foreach` loop using `{/foreach}`. Note how this is similar
    to how HTML tags work. Similarly, the `{if}` clause is closed using `{/if}`.


    ### Why Not Use a Different Template Engine?


    Smarty is certainly not the only choice as far as template engines go. Most PHP
    developers will have a different opinion as to which template engine to use. The
    concerns with Smarty generally consist of the following:


    - The Smarty code is large (approximately 150KB of code for `Smarty.class.php`
    and `Smarty_Compiler.class.php` combined) and expensive (in terms of processing
    power) to use for every request on your web site.

    - Why use a metalanguage to output content when PHP is designed to do exactly
    this?


    Certainly, these are both valid concerns. We''ll take a quick look at each of
    these and practical ways to deal with them.


    #### Improving Smarty Performance


    First, let me say that in real terms, unless you have a high-traffic web site,
    and/or a slow web server, the overhead caused by using Smarty will typically not
    be noticeable. Regardless, it is always good to look at ways of improving the
    performance of your web applications.


    Smarty compiles templates into native PHP code whenever they are changed. When
    a web site is in production, templates will generally not be modified and therefore
    not be recompiled. This means that the `Smarty_Compiler.class.php` class is not
    loaded, effectively reducing the amount of code to be parsed by about 90KB.


    Next, you can always use code accelerators (such APC or PHP Accelerator) to decrease
    the overhead of loading the Smarty library. Additionally, you can cache the output
    from any or all of your web pages (using Smarty''s caching functionality, or using
    something like `Zend_Cache`).


    > **Note:** The Alternative PHP Cache (APC) is free to download and can easily
    be installed using the PECL installer. It is used for caching and optimizing PHP
    code on the web server, thereby improving server performance. If you''re using
    Linux, you can simply type `pecl install apc` from the command line, add `extension="apc.so"`
    to your `php.ini`, and then restart your web server. Check the output from `phpinfo()`
    to confirm that it is correctly installed.


    #### Using a Metalanguage for Templates


    While using PHP code directly for templates is a perfectly viable solution, it
    can be very useful to use a metalanguage for templates instead. Here are some
    of the advantages of using Smarty templates over native PHP code:


    - The code is shorter and more easily readable. For example, using `{$foo}` to
    output the `$foo` variable provides less clutter than `<?php echo $foo ?>` or
    `<?= $foo ?>`.

    - Smarty provides built-in security features, which when activated will control
    what can be done in a template. That is, it heavily restricts access to normal
    PHP functions. Technically speaking, using native PHP for templates could result
    in unrelated operations taking place in a template (such as writing to a file
    or sending an e-mail). Take, for example, a content management system (CMS). In
    addition to being able to update web site content, a CMS will typically allow
    users to modify the web site templates. Enforcing control over what can and can''t
    be contained in a template has huge benefits in this type of situation, where
    user-submitted data is used.

    - It can be less daunting for non-programmers to create templates. For example,
    if you employ somebody to convert a web design into HTML and CSS, it will be simpler
    for them to use Smarty than PHP.

    - Smarty can be extended in so many ways that some really powerful effects can
    be achieved. The most obvious example is in the use of modifiers. Another powerful
    (but often overlooked) feature is creating custom *blocks*. For example, you could
    make a custom Smarty block called `roundedbox`, which you could use to output
    content inside a box with rounded corners. Although Firefox can provide this in
    CSS (using the `-moz-border-radius` selector), it is not available in Internet
    Explorer (`border-radius` is included in CSS3, not yet implemented in major browsers).
    You could then use template code as follows in your template: `{roundedbox} some
    content {/roundedbox}`. Since drawing rounded boxes without a native CSS solution
    requires the use of HTML tables or nested divs, you can hide the implementation
    details away in the `roundedbox` block handler.


    Of course, it would be unfair to ignore the disadvantages of using a metalanguage
    for templates. Here are some of the disadvantages of using Smarty templates over
    native PHP code:


    - There is extra overhead in parsing and compiling the templates in PHP code.
    Note, however, that this is only ever done when a template is changed, and therefore
    the overhead is almost zero in the long term.

    - Users must learn an extra language, and while Smarty is really good at some
    things, there are some drawbacks. For example, if you want to output an array
    into a three-column table, you will generally end up with a clutter of `{assign}`,
    `{math}`, and `{section}` tags. However, you can also extend to create built-in
    functions or include a separate template to hide this clutter.


    The Zend Framework does, in fact, provide a templating solution that uses native
    PHP files. While we looked at the `Zend_Controller` component earlier in this
    chapter (the *controller* part of MVC), there is also the `Zend_View` component
    (the *view* part of MVC). This component works similarly to Smarty, except that
    the templates it uses are written in native PHP code. If you prefer to use this
    instead of Smarty, you will need to adapt the templates we create accordingly.


