  #### 处理多值表单组件


  多值表单组件（如复选框和多选下拉框）极大地增强了基于 Web 的数据收集能力，因为它们允许用户为同一个表单项目同时选择多个值。例如，考虑一个用于评估用户计算机相关兴趣的表单。具体来说，你希望用户指出她感兴趣的编程语言。使用复选框或多选下拉框，这个表单项目可能类似于图
  13-1 所示。


  用于呈现复选框的 HTML 代码如下：


  ```html

  <input type="checkbox" name="languages" value="csharp" />C#<br />

  <input type="checkbox" name="languages" value="jscript" />JavaScript<br />

  <input type="checkbox" name="languages" value="perl" />Perl<br />

  <input type="checkbox" name="languages" value="php" />PHP<br />

  ```


  **图 13-1.** *使用两种不同表单项目表示相同数据*


  多选下拉框的 HTML 可能如下所示：


  ```html

  <select name="languages" multiple="multiple">

  <option value="csharp">C#</option>

  <option value="jscript">JavaScript</option>

  <option value="perl">Perl</option>

  <option value="php">PHP</option>

  </select>

  ```


  由于这些组件是多值的，表单处理器必须能够识别单个表单变量可能被赋予多个值。在前面的示例中，请注意两者都使用名称 `languages` 来引用多个语言条目。PHP
  如何处理这个问题？也许并不令人意外，它将其视为一个数组。为了让 PHP 能够识别单个表单变量可能被赋予多个值（即将其视为数组），你需要对表单项目名称进行一个小修改，在其后附加一对方括号。因此，名称将从
  `languages` 变为 `languages[]`。重命名后，PHP 将像处理任何其他数组一样处理提交的变量。考虑一个完整的示例，位于文件 `multiplevaluesexample.php`
  中：


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  **308**


