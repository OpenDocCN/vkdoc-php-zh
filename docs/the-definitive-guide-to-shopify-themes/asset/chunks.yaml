  trans: '

    # 总结


    在本章中，我们退后一步，从整体角度思考 Shopify 设计以及构建主题时力求实现的目标。本章讨论了与用户共情的重要性，以及为各种情境下的访客进行设计的重要性。


    本章还讨论了在开发主题过程中应牢记的一些最佳实践，并介绍了一些在测试阶段帮助发现可用性问题的技巧。


    脚注 1


    这方面最常被引用的例子是塔吉特百货，他们因未能让视障顾客正常访问其在线商店而遭到起诉，最终以 600 万美元达成和解。详见 [`https://www.w3.org/WAI/bcase/target-case-study`](https://www.w3.org/WAI/bcase/target-case-study)。


    2


    这些例子取自 Filament Group 的著作《渐进增强设计》，作者是 Todd Parker、Patty Toland、Scott Jehl 和 Maggie
    Costello Wachs。


    # 4. 设计主题基础


    在接下来的四章中，我们将一步步地设计并构建一个示例 Shopify 主题——逐页、逐功能地推进。在本章中，我们将探讨新主题的起步方式，然后设计并实现整个商店共有的关键元素——布局和导航。


    重点将放在构建 Shopify 主题的基础知识上，而非网页或视觉设计的基础知识。这意味着你不会看到太多关于样式、视觉调整或前端框架选择的讨论，除非这些内容与
    Shopify 特有的问题直接相关。


    在构建电商网站时，不同场景下可以且应该做出多种设计选择——使用何种导航风格、产品页面的最佳布局是什么等等。正确答案（如果存在的话）当然会因商店和目标受众的不同而有所差异。


    我们不可能在一本书的范围内详细探讨每一种可能的选择。因此，面对这些选择时，我会先讨论不同的可行方案，然后选定一种常见方案用于演示。


    此外，为了避免将所有用于构建示例主题的代码直接堆砌在书中，我已将其放在一个 GitHub 仓库中（`https://github.com/gavinballard/defguide-theme`）。该仓库的提交历史记录着本章开始后示例主题的进展，方便你逐节跟踪所做的具体修改。


    当代码有助于阐明某个观点或演示某项技术时，我会在文中使用它。为了使这些示例尽可能清晰且实用，我会剔除无关信息（如 HTML 类名或可访问性属性）。你随时可以查阅示例主题仓库中对应的完整代码片段。


    准备好了吗？我们开始吧！


    ## 起点


    在开始设计和构建主题之前，我们先确定工作流程并做好准备工作。我在第 2 章中讨论了多种工具和工作流技术，包括 Shopify 的 Slate 以及其他构建工具，这些工具能将你的主题从不同的源文件结构组装成
    Shopify 期望的目录结构。


    了解并使用这些工具很重要，但首先，你需要在简单性和易用性之间找到平衡。这里我们假定直接使用 Shopify 主题目录结构（因此不使用 Grunt 或 Slate
    等构建和编译工具），但在本地使用文本编辑器处理文件，并利用 Theme Kit 或 Theme gem 保持变更与开发商店同步（如需复习这两种工具的使用，请回顾第
    2 章）。


    ### 主题脚手架


    在日常处理 Shopify 主题的工作中，大部分时间你会在已有的 Shopify 源文件上工作——也许你会被请来定制一个从主题商店购买或由他人开发的主题。当你从头开始一个“绿地”项目时，拥有一个起点——一块可以工作的空白画布——会很有帮助。以下是几个免费可用的主题脚手架：


    *   **Slate**：Shopify 官方主题开发工具，包含其自身的默认主题设置，当你运行 `slate theme new-theme-name`
    时会自动生成。它相当精简，为你提供模板文件以及一些初始样式和 JavaScript 辅助函数。Slate 使用一系列构建工具从源目录“编译”你的主题。

    *   **Timber**：在 Slate 出现之前，这是 Shopify 的官方主题框架，提供了许多样式辅助函数和 Ajax 购物车等 JavaScript
    功能。随着 Slate 的推出，Timber 已不再维护，因此最好将 Timber 视为实现特定 Shopify 功能的灵感来源，而非起点。

    *   **Shopify Theme Scaffold**：这是一个非官方项目，基于我们在 Disco 的主题工作。它包含一个简单的基于 Grunt 的主题编译工作流。与其他工具不同，它是一块真正的空白画布，因为其中只包含空的模板文件，没有任何样式或
    JavaScript。


    随着时间的推移，你可能会逐渐形成自己处理 Shopify 主题的偏好，并开始构建自己的起点脚手架。


    不过，就本书而言，我们将回归最基础的方式。我们会从将 `blank.zip`（可从本书的 GitHub 资源中获取）上传到你开发商店的主题编辑器开始。顾名思义，`blank.zip`
    是一个完全空白的主题，只包含 Shopify 认为有效上传所必需的最小内容。从图 4-1 中可以看到，一旦上传成功，它确实名副其实。


    ![A437216_1_En_4_Fig1_HTML.jpg](img/A437216_1_En_4_Fig1_HTML.jpg)


    图 4-1


    你可以直接将 `blank.zip` 文件上传到 Shopify 后台的“主题”页面（左图）。完成后，预览该主题会呈现一个令人兴奋的画面（右图）

    '
- fmt: '### Sample Product Data


    A common design mistake is to build around unrealistic “dummy” data (lorem ipsum,
    anyone?), rather than the actual content that will be used on your site in production.
    One habit I encourage all theme developers to foster is ensuring that clients
    provide them with actual product data and copy before starting out on a theme
    build.


    This isn’t always possible, but fortunately Shopify provides a series of dummy
    store inventories that you can import to a development store to help you work
    with realistic data. The dummy products contain a variety of images with different
    dimensions, number of variants, and descriptions of various lengths so that your
    theme can be properly tested across a range of content.


    You can download one of the four sets of sample product data from [`https://github.com/shopifypartners/shopify-product-csvs-and-images`](https://github.com/shopifypartners/shopify-product-csvs-and-images).


    **Exercise: A Starting Point**


    1. Set up a Shopify Development store to start following along with the practical
    exercises. Refer to Chapter 1 for the steps involved.

    2. Download `blank.zip` from the book’s resources page and upload it to your store
    from the Themes page in the Shopify Admin.

    3. Download one of the sets of sample product data from Shopify and import it
    into your store.

    4. Following the steps outlined in Chapter 2 under “Moving to Local Development,”
    download a copy of the blank theme to your local machine and use Theme Kit to
    ensure that any changes you make locally are synchronized to your Shopify store.

    5. An optional (but highly recommended) step is to place your theme under revision
    control, so that you can save your progress along the way and compare it to the
    commit history of the example theme on GitHub. Follow the steps in Chapter 2 under
    “Putting Your Theme Under Revision Control” for the steps involved here.


    ### Your Theme’s Layout


    Unless they specify otherwise, all of the page templates in your theme will be
    rendered inside the default layout, `theme.liquid`. The layout file that comes
    with the blank starting theme looks like Listing 4-1.


    ```

    {{ content_for_header }}

    {{ ''styles.css'' | asset_url | stylesheet_tag }}


    {{ content_for_layout }}

    {{ ''theme.js'' | asset_url | script_tag }}

    ```


    Listing 4-1 – The Contents of a default `theme.liquid`


    The overall structure should look familiar to anyone who’s worked with HTML before.
    The Shopify-specific elements are:


    - `{{ content_for_header }}`: Shopify requires placing this output tag inside
    your layout’s `<head>` section. It’ll use this location to add Shopify-side JavaScript,
    styles, and tracking code on every page rendered on your storefront.

    - `{{ content_for_layout }}`: Shopify requires placing this output tag inside
    your layout’s `<body>` section. This will be where the content for each of your
    individual page templates (`page.liquid`, `article.liquid`, etc.) will be rendered.

    - `{{ ''styles.css'' | asset_url | stylesheet_tag }}` and `{{ ''theme.js'' | asset_url
    | script_tag }}`: These tags aren’t strictly required, but I’ve included them
    in the default layout as you’ll always want your site-wide stylesheet and scripts
    added on every page. `asset_url` and `stylesheet_tag` / `script_tag` are Liquid
    filters that convert the name of a particular asset (`''theme.js''`) first into
    a reference to that asset on Shopify’s CDN, and then to a HTML tag that will load
    that asset, e.g., `<script src="//cdn.shopify.com/s/files/1/1744/7651/t/2/assets/theme.js?2331723957652526606"
    type="text/javascript"></script>`.


    As time goes on, we’ll be adding more and more content to `theme.liquid`. Much
    of this will be content or elements we want to appear on every page, while some
    will be loaded conditionally dependent on the current page template. To start
    with, we’re going to look at the design considerations and implementation of the
    overall site layout and navigation elements—things that generally affect all pages
    of a site.


    ## Designing Layout and Navigation


    Designing the layout and navigation of a Shopify site is about a lot more than
    just setting up a nice-looking navigation bar at the top of your site and making
    sure the dropdowns work. It’s a matter of thinking about the users of your site,
    and how you can best help them find what they’re looking for in the minimum number
    of steps.


    When it comes to site layout, one of the tensions theme designers face is “convention
    versus creativity.” Customers’ expectations on how particular Ecommerce sites
    should look and operate have been shaped over time, meaning we tend to see a convergence
    in the appearance of Ecommerce sites. A look at the layout of the “prototypical
    Ecommerce site” in Figure 4-2 and you’d probably agree that 90% of Ecommerce sites
    fall into this basic structure.


    ![A437216_1_En_4_Fig2_HTML.jpg](A437216_1_En_4_Fig2_HTML.jpg)


    Figure 4-2 – The prototypical Ecommerce site layout


    I don’t think this convergence is necessarily a bad thing. If our site follows
    a customer’s expectations, they’ll be able to find what they’re looking for more
    efficiently, which is one of your jobs as a designer. We still have plenty of
    scope for finding a brand’s “voice” within these conventions.


    For this example theme, we’re going to implement something very like the “prototypical”
    layout from Figure 4-2: a layout with a header section consisting of a logo and
    text links on the left, with a search bar, account information, and cart link
    on the right. Underneath that, we’ll leave space for the individual page content
    before adding a footer at the bottom with links to the various parts of the site.


    Because we anticipate lots of mobile visitors (more than half of all visits to
    Shopify sites are on mobile), we’ll need to make sure that the layout works responsively
    and is easily usable on mobile by collapsing navigation items, creating large
    touch areas, and adjusting font sizes.'
  raw: '### Sample Product Data


    A common design mistake is to build around unrealistic “dummy” data (lorem ipsum,
    anyone?), rather than the actual content that will be used on your site in production.
    One habit I encourage all theme developers to foster is ensuring that clients
    provide them with actual product data and copy before starting out on a theme
    build.


    This isn’t always possible, but fortunately Shopify provides a series of dummy
    store inventories that you can import to a development store to help you work
    with realistic data. The dummy products contain a variety of images with different
    dimensions, number of variants, and descriptions of various lengths so that your
    theme can be properly tested across a range of content.


    You can download one of the four sets of sample product data from [`https://github.com/shopifypartners/shopify-product-csvs-and-images`](https://github.com/shopifypartners/shopify-product-csvs-and-images)
    .[¹](#A437216_1_En_4_Chapter.html#Fn1)


    Exercise: A Starting Point


    1.  Set up a Shopify Development store to start following along with the practical
    exercises. Refer to Chapter [1](#A437216_1_En_1_Chapter.html) for the steps involved.
     

    2.  Download `blank.zip` from the book’s resources page and upload it to your
    store from the Themes page in the Shopify Admin.  

    3.  Download one of the sets of sample product data from Shopify and import it
    into your store.  

    4.  Following the steps outlined in Chapter [2](#A437216_1_En_2_Chapter.html)
    under “Moving to Local Development,” download a copy of the blank theme to your
    local machine and use Theme Kit to ensure that any changes you make locally are
    synchronized to your Shopify store.  

    5.  An optional (but highly recommended) step is to place your theme under revision
    control, so that you can save your progress along the way and compare it to the
    commit history of the example theme on GitHub. Follow the steps in Chapter [2](#A437216_1_En_2_Chapter.html)
    under “Putting Your Theme Under Revision Control” for the steps involved here.


    ### Your Theme’s Layout


    Unless they specify otherwise, all of the page templates in your theme will be
    rendered inside the default layout, `theme.liquid`. The layout file that comes
    with the blank starting theme looks like Listing [4-1](#A437216_1_En_4_Chapter.html#Par27).


    ```


    {{ content_for_header }}

    {{ ''styles.css'' | asset_url | stylesheet_tag }}


    {{ content_for_layout }}

    {{ ''theme.js'' | asset_url | script_tag }}


    Listing 4-1

    The Contents of a default theme.liquid

    ```


    The overall structure should look familiar to anyone who’s worked with HTML before.
    The Shopify-specific elements are:


    *   `{{ content_for_header }}`: Shopify requires placing this output tag inside
    your layout’s `<head>` section. It’ll use this location to add Shopify-side JavaScript,
    styles, and tracking code on every page rendered on your storefront.

    *   `{{ content_for_layout }}`: Shopify requires placing this output tag inside
    your layout’s `<body>` section. This will be where the content for each of your
    individual page templates (`page.liquid`, `article.liquid`, etc.) will be rendered.

    *   `{{ ''styles.css'' | asset_url | stylesheet_tag }}` and `{{ ''theme.js'' |
    asset_url | script_tag }}`: These tags aren’t strictly required, but I’ve included
    them in the default layout as you’ll always want your site-wide stylesheet and
    scripts added on every page. `asset_url` and `stylesheet_tag` / `script_tag` are
    Liquid filters that convert the name of a particular asset `(''theme.js''`) first
    into a reference to that asset on Shopify’s CDN, and then to a HTML tag that will
    load that asset, e.g., `<script src="//cdn.shopify.com/s/files/1/1744/7651/t/2/assets/theme.js?2331723957652526606"
    type="text/javascript"></script>`.


    As time goes on, we’ll be adding more and more content to `theme.liquid`. Much
    of this will be content or elements we want to appear on every page, while some
    will be loaded conditionally dependent on the current page template. To start
    with, we’re going to look at the design considerations and implementation of the
    overall site layout and navigation elements—things that generally affect all pages
    of a site.


    ## Designing Layout and Navigation


    Designing the layout and navigation of a Shopify site is about a lot more than
    just setting up a nice-looking navigation bar at the top of your site and making
    sure the dropdowns work. It’s a matter of thinking about the users of your site,
    and how you can best help them find what they’re looking for in the minimum number
    of steps.


    When it comes to site layout, one of the tensions theme designers face is “convention
    versus creativity.” Customers’ expectations on how particular Ecommerce sites
    should look and operate have been shaped over time, meaning we tend to see a convergence
    in the appearance of Ecommerce sites. A look at the layout of the “prototypical
    Ecommerce site” in Figure [4-2](#A437216_1_En_4_Chapter.html#Fig2) and you’d probably
    agree that 90% of Ecommerce sites fall into this basic structure.


    ![A437216_1_En_4_Fig2_HTML.jpg](A437216_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    The prototypical Ecommerce site layout


    I don’t think this convergence is necessarily a bad thing. If our site follows
    a customer’s expectations, they’ll be able to find what they’re looking for more
    efficiently, which is one of your jobs as a designer. We still have plenty of
    scope for finding a brand’s “voice” within these conventions.


    For this example theme, we’re going to implement something very like the “prototypical”
    layout from Figure [4-2](#A437216_1_En_4_Chapter.html#Fig2): a layout with a header
    section consisting of a logo and text links on the left, with a search bar, account
    information, and cart link on the right. Underneath that, we’ll leave space for
    the individual page content before adding a footer at the bottom with links to
    the various parts of the site.


    Because we anticipate lots of mobile visitors (more than half of all visits to
    Shopify sites are on mobile), we’ll need to make sure that the layout works responsively
    and is easily usable on mobile by collapsing navigation items, creating large
    touch areas, and adjusting font sizes.'
  trans: '

    ### 示例产品数据


    常见的设计错误是围绕不切实际的“虚拟”数据（比如 Lorem Ipsum）进行构建，而非使用网站上线后实际会用到的真实内容。我鼓励所有主题开发者养成一个习惯：在开始构建主题之前，务必确保客户提供了实际的产品数据和文案。


    这并非总是可行，但幸运的是，Shopify 提供了一系列可供导入到开发商店的虚拟库存数据，帮助你处理真实的数据。这些虚拟产品包含各种尺寸的图片、不同数量的变体以及长度各异的描述，从而让你的主题能够在一系列内容中得到充分测试。


    你可以从 [`https://github.com/shopifypartners/shopify-product-csvs-and-images`](https://github.com/shopifypartners/shopify-product-csvs-and-images)
    下载四组示例产品数据中的任意一组。


    **练习：起点**


    1.  搭建一个 Shopify 开发商店，以便开始跟随实践练习。具体步骤请参考第 1 章。

    2.  从本书的资源页面下载 `blank.zip`，然后通过 Shopify 后台的“主题”页面上传到你的商店。

    3.  从 Shopify 下载一组示例产品数据，并将其导入你的商店。

    4.  按照第 2 章“迁移到本地开发”中概述的步骤，将空白主题的副本下载到本地机器，并使用 Theme Kit 确保你在本地所做的任何更改都能同步到你的
    Shopify 商店。

    5.  一个可选（但强烈推荐）的步骤是将你的主题纳入版本控制，这样你就能保存整个过程中的进度，并将其与 GitHub 上示例主题的提交历史进行比较。请按照第
    2 章“将你的主题置于版本控制下”中概述的步骤进行操作。


    ### 主题的布局


    除非另有指定，否则主题中的所有页面模板都将在默认布局 `theme.liquid` 内呈现。空白起始主题附带的布局文件如清单 4-1 所示。


    ```

    {{ content_for_header }}

    {{ ''styles.css'' | asset_url | stylesheet_tag }}


    {{ content_for_layout }}

    {{ ''theme.js'' | asset_url | script_tag }}

    ```


    清单 4-1 – 默认 `theme.liquid` 的内容


    整体结构对于任何使用过 HTML 的人来说应该都很熟悉。特定于 Shopify 的元素包括：


    -   `{{ content_for_header }}`：Shopify 要求将此输出标签放置在布局的 `<head>` 部分。它将利用此位置在商店前端渲染的每个页面上添加
    Shopify 端的 JavaScript、样式和跟踪代码。

    -   `{{ content_for_layout }}`：Shopify 要求将此输出标签放置在布局的 `<body>` 部分。这是每个独立页面模板（`page.liquid`、`article.liquid`
    等）内容将被渲染的位置。

    -   `{{ ''styles.css'' | asset_url | stylesheet_tag }}` 和 `{{ ''theme.js'' | asset_url
    | script_tag }}`：这些标签并非严格必需，但我将它们包含在默认布局中，因为你通常希望在每个页面都添加全站样式表和脚本。`asset_url`
    和 `stylesheet_tag` / `script_tag` 是 Liquid 过滤器，它们将特定资源的名称（如 `''theme.js''`）首先转换为该资源在
    Shopify CDN 上的引用，然后转换为加载该资源的 HTML 标签，例如：`<script src="//cdn.shopify.com/s/files/1/1744/7651/t/2/assets/theme.js?2331723957652526606"
    type="text/javascript"></script>`。


    随着时间的推移，我们将向 `theme.liquid` 添加越来越多的内容。其中大部分是我们希望在每个页面上显示的内容或元素，而另一些则会根据当前页面模板有条件地加载。首先，我们将研究整体站点布局和导航元素的设计考虑与实现——这些内容通常会影响到网站的所有页面。


    ## 设计布局与导航


    设计 Shopify 网站的布局和导航远不止是在网站顶部设置一个漂亮的导航栏并确保下拉菜单正常工作。这需要思考网站的用户，以及如何以最少的步骤，最好地帮助他们找到所需内容。


    在网站布局方面，主题设计师面临的一个矛盾是“惯例与创意”。长期以来，客户对特定电商网站外观和运作方式的期望已经形成，这意味着我们往往会看到电商网站的外观趋于一致。看一下图
    4-2 中“原型电商网站”的布局，你可能会同意 90% 的电商网站都属于这种基本结构。


    ![A437216_1_En_4_Fig2_HTML.jpg](img/A437216_1_En_4_Fig2_HTML.jpg)


    图 4-2 – 原型电商网站布局


    我不认为这种趋同一定是坏事。如果我们的网站遵循客户的期望，他们将能够更有效地找到所需内容，这本身就是设计师的职责之一。在这些惯例之内，我们仍然有足够的空间来寻找品牌的“声音”。


    对于这个示例主题，我们将实现一个与图 4-2 中“原型”布局非常相似的结构：一个包含标题区域的布局，左侧是 Logo 和文本链接，右侧是搜索栏、账户信息和购物车链接。在标题下方，我们为各个页面内容留出空间，最后在底部添加一个包含网站各版块链接的页脚。


    由于我们预计会有大量移动端访客（访问 Shopify 网站的流量中，超过一半来自移动设备），我们需要确保布局具有响应式设计，并且通过折叠导航项、创建大触控区域以及调整字体大小，使其在移动设备上易于使用。

