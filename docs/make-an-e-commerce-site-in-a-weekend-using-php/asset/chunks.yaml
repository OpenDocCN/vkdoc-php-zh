    \ [1-17](#A978-1-4842-1672-9_1_Chapter.html#Fig17)). Accept the license agreement\
    \ and click `Next`.\n\n![A978-1-4842-1672-9_1_Fig17_HTML.jpg](A978-1-4842-1672-9_1_Fig17_HTML.jpg)\n\
    \nFigure 1-17.\n\nScreen showing the license agreement\n\nSelect the folder to\
    \ install WampServer (see Figure [1-18](#A978-1-4842-1672-9_1_Chapter.html#Fig18)).\
    \ It’s best to keep the default folder location. Click the `Next` button.\n\n\
    ![A978-1-4842-1672-9_1_Fig18_HTML.jpg](A978-1-4842-1672-9_1_Fig18_HTML.jpg)\n\n\
    Figure 1-18.\n\nScreen prompting for the installation folder\n\nCheck boxes will\
    \ be displayed (see Figure [1-19](#A978-1-4842-1672-9_1_Chapter.html#Fig19)) prompting\
    \ whether you want to have WampServer icons added to your desktop and to Quick\
    \ Launch. Check the check boxes. Click `Next` to move further.\n\n![A978-1-4842-1672-9_1_Fig19_HTML.jpg](A978-1-4842-1672-9_1_Fig19_HTML.jpg)\n\
    \nFigure 1-19.\n\nScreen prompting whether to show quick launch and desktop icons\n\
    \nThe next window shows the items for review that you have chosen up until now.\
    \ You can click the `Back` button to make any changes. Let’s click the `Install`\
