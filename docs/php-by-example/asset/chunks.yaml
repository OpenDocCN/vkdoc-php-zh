    | 详情 |

    | --- |

    | 有时，确保开发环境编辑器的编码、文件写入时的编码以及输出区域的编码保持一致至关重要。你可以更改 NetBeans 环境编辑器的默认编码。为此，请打开 `netbeans.conf`
    文件（位于 NetBeans 环境安装文件夹的 `etc` 子文件夹中）。然后，找到 `netbeans_default_options` 参数，并在其值后面用空格追加
    `-J-Dfile.encoding=UTF-8`（使用的是 UTF-8 编码）。如果遇到任何问题，建议查阅 NetBeans IDE 帮助。 |


