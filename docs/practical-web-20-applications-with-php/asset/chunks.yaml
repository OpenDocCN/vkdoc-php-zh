    **Retrieving Search Suggestions**


    Our next step is to write a JavaScript class that will retrieve suggestions from
    the suggestionAction() function we just wrote when the user types a search query.
    The way this will work is to monitor the search query input box. When the user
    types a query, an Ajax request will be performed to retrieve those results and
    then display them to the user.


    One important thing to be aware of is that you don’t want to retrieve the suggestions
    every time the user enters a single character, since this will not only slow down
    the user’s experience but will also consume excessive server resources. Thus,
    the way it will work is to display search suggestions only after the user has
    stopped typing. To achieve this, every time the user types a key, we begin a timer.
    Once the timer expires, we initiate the Ajax request. If the user presses another
    key before the timer expires, the existing timer is cancelled, and a new one is
    created.


