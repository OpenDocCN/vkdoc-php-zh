    • 完成表示层，向访客展示目录中类别、商品等详细信息。


    ## 存储新数据


    鉴于本章新增的功能，你需要在数据库中添加更多数据表并不令人意外。然而，这不仅仅是添加新数据表那么简单。


    你还需了解关系数据以及数据表之间可实现的关系，这样才能从数据库中获取更有意义的信息。


    ## 何为关系型数据库


    数据库能存储数据这并非什么秘密。然而，现代**关系型数据库管理系统**，如 PostgreSQL、MySQL、SQL Server、Oracle、DB2 等，通过增加存储和管理**关系数据**的能力，扩展了这一基本功能。这是一个值得关注的概念。


    那么，*关系数据* 是什么意思呢？不难发现，现实世界数据库中存储的每条数据，都与某些已有信息存在关联。商品与类别和部门相关，订单与商品和客户相关，以此类推。关系型数据库将信息存储在数据表中，并且知晓这些表之间的关联。


    这些相互关联的表构成了*关系型数据库*，它本身成为了一个有独立意义的对象，而不仅仅是一组无关的数据表。可以说，*数据* 只有当我们赋予其意义时才成为*信息*，而建立数据之间的关联正是实现这一目标的理想方式。


    不妨观察一下商品目录，看看它需要哪些数据，以及如何将这些数据转化为信息。对于商品目录，你至少需要三个数据表：一个用于部门，一个用于类别，一个用于商品。需要注意的是，即使从逻辑上说每个数据表是更大实体的一部分——换句话说，即使我们说一个类别*包含*商品，存放商品的表也并不在存放类别的表内部——但在物理上，每个数据表都是独立的数据库对象。这并不与数据库的关系特性相矛盾。图
    4-1 简单展示了三个数据表，并包含一些示例数据。


    包含部门数据的表


    名称


    **节日**


    包含商品数据的表


    **帽子与贝雷帽**


    **?**


    名称


    **戏装帽**


    **黑色清教徒帽**


    **军帽贝雷帽**


    **?**


    **金属维京头盔**


    包含类别数据的表


    **山姆大叔高顶礼帽**


    名称


    **天鹅绒宽边帽**


    **?**


    **圣诞帽**


    **司机帽**


    **万圣节帽**


    **...**


    **圣帕特里克节帽**


    **贝雷帽**


    **司机帽**


    **戏装帽**


    **军帽**


    **图 4-1.** *无关联的部门、类别与商品*


    当两个表被称为“关联”时，更具体地是指这些表中的*记录*是关联的。因此，如果商品表与类别表相关联，这就意味着每条商品记录都与类别表中的某条记录存在关联。


    图 4-1 并未展示数据库的物理表示，因此我们没有列出表名。此类图表用于决定数据库中需要存储*什么*。在知道要存储*什么*之后，下一步是确定所列数据之间*如何*关联，这将引导出数据库的物理结构。虽然图
    4-1 展示了三种需要存储的数据类型，但你稍后会了解到，要在数据库中实现这一结构，实际上会使用四个表。

