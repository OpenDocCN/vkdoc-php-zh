    With these points in mind, let’s take a look at the main functions of the Form
    helper. Most of them will work properly only when contained inside a <form> element,
    usually created with the $form->create() function listed next.


    create


    Rendering <form> tags is simplified by the $form->create() function. This function
    also manages the action HTML attribute and points the form to the correct model.


    **create( model[string], options[array] )**


    model = null: The model to which the form data should be sent.


    options: Aside from HTML attributes, this array can contain some specific options—type,
    action, url, and default.


    When creating a new form for the controller and model to process, this function
    makes sure that the <form> tag points to the correct URL and sends the data appropriately.
    For instance, you can choose either post or get methods for handling the user
    data by specifying the type option in the options array. Or, for creating forms
    that handle file uploading, the necessary enctype attribute is automatically formatted
    correctly by specifying the type option as file. The model parameter ensures that
    the form data is sent to the appropriate model without worrying about URLs or
    other application paths. Possible form types include delete, file, get, post,
    and put.


    When you need to specify the action to be called when the form is submitted, simply
    set the action option to the Cake-relative path of the action. This action must
    be in the current controller to work properly.


