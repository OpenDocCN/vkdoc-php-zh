    \ 4 中被清洗过了。\n\n`$imageSize` 会插入一个包含主图正确 `width` 和 `height` 属性的字符串。\n\n2.  再次测试页面。它看起来应该与图\
    \ 14-3 相同，但图片和说明是从数据库动态提取的，并且 `getimagesize()` 正在计算主图的正确尺寸。你可以将代码与 `ch14` 文件夹中的\
    \ `gallery_mysqli_03.php` 或 `gallery_pdo_03.php` 进行对照。\n\n## 构建动态元素\n\n转换静态页面后的第一个任务是显示所有缩略图，然后构建动态链接，以便能够显示任何被点击的缩略图的大图版本。显示所有缩略图很容易——只需遍历它们即可（我们稍后会研究如何将它们以两行一组的格式显示）。激活每个缩略图的链接则需要多考虑一些。你需要一种方法来告诉页面要显示哪张大图。\n\
    \n### 通过查询字符串传递信息\n\n在上一节中，你使用 `$mainImage` 来标识大图，因此你需要一种在每次点击缩略图时改变其值的方法。解决方案是将图片的文件名添加到链接\
    \ URL 末尾的查询字符串中，如下所示：\n\n```html\n<a href='gallery.php?image=filename.jpg'>\n\
    ```\n\n然后，你可以检查 `$_GET` 数组是否包含一个名为 `image` 的元素。如果包含，则更改 `$mainImage` 的值。如果不包含，则保持\
    \ `$mainImage` 为结果集中第一条记录的文件名。\n\n### PHP 解决方案 14-2：激活缩略图\n\n继续使用上一节中的同一个文件。或者，将\
    \ `gallery_mysqli_03.php` 或 `gallery_pdo_03.php` 复制到 `phpsols-4e` 站点根目录，并将其保存为\
    \ `gallery.php`。\n\n1.  找到包裹缩略图的链接的起始 `<a>` 标签。它看起来像这样：\n\n```php\n<?php\n```\n\
    \n将其更改为：\n\n```php\n<?php\necho \"<a href='gallery.php?image={$row['filename']}'>\"\
    ;\n```\n\n这会在 `href` 属性的末尾添加一个查询字符串，将当前文件名赋给一个名为 `image` 的变量。确保 `?image=` 周围没有空格至关重要。\n\
    \n2.  保存页面并在浏览器中加载。将鼠标指针悬停在缩略图上，并检查状态栏中显示的 URL。它应该如下所示：\n\n```\nhttp://localhost/phpsols-4e/gallery.php?image=basin.jpg\n\
    ```\n\n如果状态栏中没有显示任何内容，请点击缩略图。页面不应改变，但地址栏中的 URL 现在应该包含查询字符串。检查 URL 或查询字符串中是否有间隙。\n"
- fmt: "3.  To show all the thumbnails, you need to wrap the table cell in a loop.\
    \ Insert a new line after the HTML comment about repeating the row and create\
    \ the first half of a `do... while` loop like this (see Chapter [4](#332054_4_En_4_Chapter.xhtml)\
    \ for details of the different types of loops):\n\n4.  You already have the details\
    \ of the first record in the result set, so the code to get subsequent records\
    \ needs to go after the closing `</td>` tag. Create some space between the closing\
    \ `</td>` and `</tr>` tags, and insert the following code. It’s slightly different\
    \ for each method of database connection.\n\n    For MySQLi, use this:\n\n   \
    \ ```\n    <?php $row = $result->fetch_assoc()); ?>\n    ```\n\n    For PDO, use\
    \ this:\n\n    ```\n    <?php $row = $result->fetch()); ?>\n    ```\n\n    This\
    \ fetches the next row in the result set and sends the loop back to the top. Because\
    \ `$row['filename']` and `$row['caption']` have different values, the next thumbnail\
    \ and its associated `alt` text are inserted into a new table cell. The query\
    \ string is also updated with the new filename.\n\n5.  Save the page and test\
    \ it in a browser. You should now see all eight thumbnails in a single row across\
    \ the top of the gallery, as shown in the following screenshot.\n\n    ![../images/332054_4_En_14_Chapter/332054_4_En_14_Figb_HTML.jpg](images/332054_4_En_14_Chapter/332054_4_En_14_Figb_HTML.jpg)\n\
    \n    Hover your mouse pointer over each thumbnail, and you should see the query\
    \ string displaying the name of the file. You can check your code against `gallery_mysqli_04.php`\
    \ or `gallery_pdo_04.php`.\n\n6.  Clicking the thumbnails still doesn’t do anything,\
    \ so you need to create the logic that changes the main image and its associated\
    \ caption. Locate this section of code in the block above the `DOCTYPE` declaration:\n\
    \n    ```\n    // get the name and caption for the main image\n    $mainImage\
    \ = safe($row['filename']);\n    $caption = safe($row['caption']);\n    ```\n\n\
    \    Highlight the line that defines `$caption` and cut it to your clipboard.\
    \ Wrap the other line in a conditional statement like this:\n\n    ```\n    //\
    \ get the name for the main image\n    if (isset($_GET['image'])) {\n        $mainImage\
    \ = safe($_GET['image']);\n    } else {\n        $mainImage = safe($row['filename']);\n\
    \    }\n    ```\n\n    The `$_GET` array contains values passed through a query\
    \ string, so if `$_GET['image']` has been set (defined), it takes the filename\
    \ from the query string and stores it as `$mainImage`. If `$_GET['image']` doesn’t\
    \ exist, the value is taken from the first record in the result set, as before.\n\
    \n7.  Finally, you need to get the caption for the main image. It’s no longer\
    \ going to be the same every time, so you need to move it to the loop that displays\
    \ the thumbnails in the `thumbs` table. It goes right after the opening curly\
    \ brace of the loop (around line 48). Position your cursor after the brace and\
    \ insert a couple of lines, then paste the caption definition that you cut in\
    \ the previous step. You want the caption to match the main image, so if the current\
    \ record’s filename is the same as `$mainImage`, that’s the one you’re after.\
    \ Wrap the code that you have just pasted in a conditional statement, like this:\n\
    \n8.  Save the page and reload it in your browser. This time, when you click a\
    \ thumbnail, the main image and caption will change. Don’t worry about some images\
    \ and captions being hidden by the footer. That will correct itself when the thumbnails\
    \ move to the left of the main image.\n\n    **Note** Passing information through\
    \ a query string like this is an important aspect of working with PHP and database\
    \ results. Although form information is normally passed through the `$_POST` array,\
    \ the `$_GET` array is frequently used to pass details of a record that you want\
    \ to display, update, or delete. It’s also commonly used for searches because\
    \ the query string can easily be bookmarked.\n\n9.  There’s no danger of SQL injection\
    \ in this case. But if someone changes the value of the filename passed through\
    \ the query string, you’ll get ugly error messages if the image can’t be found\
    \ and `display_errors` is on. Before calling `getimagesize()`, let’s find out\
    \ if the image exists. Wrap it in a conditional statement like this:\n\n    ```\n\
    \    if (file_exists('images/'.$mainImage)) {\n        // get the dimensions of\
    \ the main image\n        $imageSize = getimagesize('images/'.$mainImage)[3];\n\
    \    } else {\n        $error = 'Image not found.';\n    }\n    ```\n\n10. Try\
    \ changing the value of `image` in the query string to any value except that of\
    \ an existent file. When you load the page, you should see `Image not found`.\n\
    \n    Check your code, if necessary, against `gallery_mysqli_05.php` or `gallery_pdo_05.php`.\n\
    \n## Creating a Multicolumn Table\n\nWith only eight images, the single row of\
    \ thumbnails across the top of the gallery doesn’t look too bad. However, it’s\
    \ useful to be able to build a table dynamically by using a loop that inserts\
    \ a specific number of table cells in a row before moving to the next row. This\
    \ is achieved by keeping count of how many cells have been inserted. When the\
    \ limit is reached for the row, the code needs to insert a closing tag for the\
    \ current row and, if more thumbnails remain, also insert an opening tag for the\
    \ next row. What makes it easy to implement is the modulus operator, `%`, which\
    \ returns the remainder of a division.\n\nThis is how it works. Let’s say you\
    \ want two cells in each row. After the first cell is inserted, the counter is\
    \ set to `1`. If you divide `1` by `2` with the modulus operator (`1 % 2`), the\
    \ result is `1`. When the next cell is inserted, the counter is increased to `2`.\
    \ The result of `2 % 2` is `0`. The next cell produces this calculation: `3 %\
    \ 2`, which results in `1`; but the fourth cell produces `4 % 2`, which is again\
    \ `0`. So, every time that the calculation results in `0`, you know—or to be more\
    \ exact, PHP knows—you’re at the end of a row.\n\nSo how do you know if there\
    \ are any more rows left? By putting the code that inserts the closing and opening\
    \ `<tr>` tags at the top of the loop, there must always be at least one image\
    \ left. However, the first time the loop runs, the remainder is also `0`, so the\
    \ issue is that you need to prevent the tags from being inserted until at least\
    \ one image has been displayed. Phew … let’s try it.\n\n## PHP Solution 14-3:\
    \ Looping Horizontally and Vertically\n\nThis PHP solution shows how to control\
    \ a loop so as to display a specific number of columns in a table. The number\
    \ of columns is controlled by setting a constant. Continue working with the files\
    \ from the preceding section. Alternatively, use `gallery_mysqli_05.php` or `gallery_pdo_05.php`.\n\
    \n1.  You may decide at a later stage that you want to change the number of columns\
    \ in the table, so it’s a good idea to create a constant at the top of the script\
    \ where it’s easy to find, rather than burying the figures deep in your code.\
    \ Insert the following code just before creating the database connection:\n\n\
    \    ```\n    // define number of columns in table\n    define('COLS', 2);\n \
    \   ```\n\n    A **constant** is similar to a variable, except that its value\
    \ cannot be changed by another part of the script. You create a constant with\
    \ the `define()` function, which takes two arguments: the name of the constant\
    \ (e.g., `COLS`) and its value. By convention, constants are always in uppercase\
    \ and are case-sensitive. Unlike variables, they do not begin with a dollar sign.\n\
    \n2.  You need to initialize the cell counter outside the loop. Also create a\
    \ variable that indicates whether it’s the first row. Add the following code immediately\
    \ after the constant you have just defined:\n\n    ```\n    define('COLS', 2);\n\
    \    // initialize variables for the horizontal looper\n    $pos = 0;\n    $firstRow\
    \ = true;\n    ```"
