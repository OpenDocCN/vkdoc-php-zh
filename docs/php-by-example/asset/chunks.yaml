    ## Private Fields and Methods


    The previous examples used public fields and methods. Their “publicity” allowed
    access to them outside the class code. However, making fields or methods private
    is often reasonable and convenient. Such class members are described with the
    `private` keyword and are available only inside the class code. What does it give
    to us? The point is that private members of a class are more difficult to use
    in an “unsupposed” manner. In other words, if a field or method is used to solve
    additional routine tasks and is not proposed for the “end user,” it is better
    to “hide” such a field or method. The situation is illustrated in Listing [7-7](#613529_1_En_7_Chapter.xhtml#PC17).


    ```

    code;

    }

    // The method for assigning a value to the field:

    function set($code){

    $this->code=$code;

    }

    // The private constructor:

    private function __construct($code){

    $this->set($code);

    }

    // The static method for creating objects:

    static function create($code){

    return new self($code);

    }

    }

    // Creates an object:

    $obj=MyClass::create(100);

    // Checks the field:

    echo "The field: ",$obj->get(),"\n";

    // Assigns a value to the field:

    $obj->set(200);

    // Checks the field:

    echo "The field: ",$obj->get(),"\n";

    ?>

    Listing 7-7

    Private Members of a Class

    ```


    The following is the program’s output.


    ```

    The output of the program (from Listing 7-7)

    The field: 100

    The field: 200

    ```


    You describe the `MyClass` class with a private `$code` field and two public non-static
    methods. The `get()` method returns the value of the `$code` field of the object
    from which the method is called (the `return $this->code` statement in the method
    body). The `set()` method has one argument (denoted as `$code`) and is designed
    to assign a value to the `$code` field of the object from which the method is
    called. The `$this->code=$code` instruction in the method’s body solves the task.


    The class has a constructor with one argument to pass when creating an object,
    and the argument determines the value of the object’s `$code` field. And you do
    that by calling the `set()` method. But the tricky moment is that the constructor
    is described with the `private` keyword. That is, it is private. So, you cannot
    create an object outside the class code using the `new` instruction. Then how
    can you create objects? For that purpose, you create the public static `create()`
    method. The method has one argument (denoted as `$code`). The argument defines
    the value of the object’s field of the same name, the reference to which is returned
    by the method as a result. The object itself is created by the `new self($code)`
    statement in the method body. The result of the expression is a reference to the
    created object. It is the reference that is returned by the method. The `self`
    keyword is used to identify the class from which the method is called.


    Since you cannot create an object in the usual way, you use the `$obj=MyClass::create(100)`
    command to create an object of the `MyClass` class. The `$code` field of the created
    object gets the value `100`. However, since the `$code` field is private, you
    cannot access it directly. If you want to get the value of the field, use the
    `$obj->get()` instruction, which calls the public `get()` method from the `$obj`
    object. To assign a value to the field of the object, call the `set()` method,
    as is done with the `$obj->set(200)` command.


