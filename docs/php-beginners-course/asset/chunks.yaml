- fmt: "即使是大型全球公司也不得不通过惨痛的经验教训认识到，始终在数据库中以加密方式存储密码的必要性。有些加密方法仅单向加密，并从任意长度的字符串生成所谓的哈希值。这些哈希值是预先已知长度的字符串。自\
    \ PHP 5.5 起，PHP 提供了经过良好测试的哈希库。例如，你可以使用`password_hash($password, ALGORITHM)`函数。\n\
    \n```\n<?php\n\n$password = \"password123\";\n\n$hash = password_hash($password,\
    \ PASSWORD_BCRYPT); echo $password;\n\necho \"<br />\";\n\necho $hash;\n\n?>\n\
    ```\n\n输出（哈希值可能因服务器而异，且每次生成都不同）：`password123`\n\n`$2y$10$K6JP7Lfu2.wjuEGLzCact.8GZaok5oSWhH49.TzTZm5/PPfDzXYMW`\n\
    \n哈希值无法再以明文形式破译。现在你可以将这些密码哈希值保存到数据库中。每当用户想要登录时，你都可以使用`password_hash()`函数为用户输入的数据生成哈希值。如果哈希值相同，则说明用户输入了正确的密码。如果黑客试图窃取你的数据库，他将需要大量时间来尝试他的所有字典词表，因为`password_hash()`函数需要一些时间来生成哈希值。你可以添加一个可选的`$options`参数，并定义使用更复杂的哈希方法，从而使哈希生成变得更慢，更难被破解。\n\
    \n## 为密码加盐\n\n另一个安全方面是防范密码不安全的用户。来自大型用户数据库的统计数据显示，相当大比例的用户总是使用相同的密码，例如`asdf123`、`password`、`1234567890`。如果破解者获得了我们的用户名和哈希值，他们很容易将哈希值与互联网上最常用的\
    \ 1000 个密码进行匹配。为了防止这种情况，我建议为每个项目添加一个长的随机字符串，例如`afdsoin23oidvnio3iosdvn09832jknlsd`。\n\
    \n如果用户再次登录并使用密码`password`，我们则存储`passwordafdsoin23oidvnio3iosdvn09832jknlsd`的哈希值。每次登录时，我们都会在脚本中将这个字符串附加到输入的密码后面，并计算哈希值。如果有人收集了我们的用户数据库，而他又不知道我们的字符串，那么他就无法检查这些哈希值。\n\
    \n`password_hash()`函数已经自动添加了一个随机盐。\n\n## 网站推荐\n\n### PHP\n\n- `www.php.net/manual/en/`：PHP官方指南，提供了所有\
    \ PHP 函数的详尽文档和大量示例，并在新 PHP 版本发布时保持更新。\n- `www.w3schools.com/php/`：一个非常好的教程网站，解释了所有可用的函数。\n\
    \n### SQL\n\n- `dev.mysql.com/doc/`：官方站点，提供了庞大的功能参考手册，但示例相对复杂。\n- `www.php.net/manual/en/book.mysqli.php`：属于官方\
    \ PHP 指南/文档的一部分，提供了所有与 MySQL 相关的 PHP 函数。\n- `forums.mysql.com`：官方 MySQL 论坛，拥有非常活跃的社区。\n\
    \n## 书籍推荐\n\n以下所有书籍也提供电子书版本。\n\n### 《PHP and MySQL for Dynamic Web Sites, Fourth\
    \ Edition: Visual QuickPro Guide》\n作者：Larry Ullman  \n出版社：Peachpit Press  \nISBN：0321784073\
    \  \n一本好书，涵盖了大多数 PHP 和 MySQL 函数。尽量获取最新版本，因为最新的 PHP 版本中有很多变化。\n\n### 《Head First\
    \ PHP & MySQL: A Brain-Friendly Guide Kindle Edition》\n作者：Lynn Beighley 和 Michael\
    \ Morrison  \n出版社：O'Reilly Media  \nISBN-10: 0596006306  \nISBN-13: 978-0596006303\
    \  \n一本关于 PHP 和 MySQL 的易于理解的书籍。希望很快能推出新版本以涵盖 PHP 7 的新特性。\n\n### 《PHP Objects,\
    \ Patterns, and Practice》\n作者：Matt Zandstra  \nISBN-13: 978-1430260318  \nISBN-10:\
    \ 1430260319  \n一本关于编程模式的好书，重点介绍 PHP。你将学习如何使用标准化的编程模式编写干净的代码。在编程中，面向对象项目的开发是一个非常重要的主题。无论如何，当你熟悉了\
    \ PHP 的基础知识后，都推荐阅读。\n\n### 《Wikibook PHP Programming》\n`https://en.wikibooks.org/wiki/PHP_Programming`\
    \  \nWikibooks 是一个基于维基百科的平台，与维基百科百科全书类似，由一个庞大的社区编写非虚构文本，并以书籍形式进行编辑。其中一些书籍甚至出版了印刷版本。得益于活跃的社区，在线\
    \ Wikibooks 的优势在于它们几乎是“实时”的，并能保持更新。\n\n## 结语\n\n我希望你喜欢这个关于 PHP 和 MySQL 网页开发世界的介绍，并且现在已经准备好实现你自己的第一个小项目了。\n\
    \n如果你需要关于下一步尝试什么的思路：你可以运用本课程提供的知识，例如，为网站创建一个留言板，或者编写一个根据星期几和时间显示不同问候语的小脚本。\n\n\
    或者，建立一个收集签名或投票的页面怎么样？该页面可以将数据写入数据库，但在写入之前应检查电子邮件地址和/或特定的姓名组合是否已存在。\n\n你对这本书有什么反馈吗？我将非常高兴。\n\
    \n你可以通过电子邮件地址 `books@theklaus.at` 联系到我。"
  raw: 'Something even large global companies have had to learn through bitter experience
    the need to always store passwords always encrypted in the database. There are
    encryption methods that encrypt only in one direction and generate so-called hashes
    from arbitrarily long strings. These are strings of a previously known length.
    PHP delivers its own well tested hashing library since PHP 5.5\. You can use it
    e.g. with the function password_hash($password, ALGORITHM).


    <?php


    $password = "password123";


    $hash = password_hash($password, PASSWORD_BCRYPT); echo $password;


    echo "<br />";


    echo $hash;


    ?>


    Output (the hash may differ from server to server and generated every time): password123


    $2y$10$K6JP7Lfu2.wjuEGLzCact.8GZaok5oSWhH49.TzTZm5/PPfDzXYMW


    The hash can no longer be deciphered in plaintext. Now you can save these password
    hashes in your database. Every time a user wants to log in, you use the password_hash()
    function to generate the hash for the data the user put in. If the hashes are
    the same, the user entered the correct password. If a hacker wants to steal your
    database, he would need a lot of


    time to try all his word lists, because the password_hash() function needs some
    time to generate the hashes. You can add an optional $options parameter and define
    that a more complex method of hashing should be used so that the hashing gets
    even slower and is harder to crack.


    **Add salt to your passwords**


    Another security aspect is to protect oneself against users with unsafe passwords.
    Statistics from large user databases show that a considerable percentage of the
    users always use the same passwords, as, for example, asdf123, password, 1234567890\.
    If a cracker gets our username with the hashes, it would be easy for him to match
    the hashes against the 1000 most commonly used passwords on the Internet. To prevent
    this, I recommend adding a long random string for each project, such as ‘afdsoin23oidvnio3iosdvn09832jknlsd’.


    If a user logs in again and uses the password ‘password’, we store the hash for


    ‘passwordafdsoin23oidvnio3iosdvn09832jknlsd’. With each login, we attach this
    string to the entered password in our script and calculate the hash. If someone
    is collecting our user database, it is impossible for him to check the hashes
    if he does not know our string.


    The password_hash() function already adds a random salt automatically.


    **Website tips**


    **PHP**


    www.php.net/manual/en/


    Official guide to PHP with a good documentation on all functions existing in PHP,
    including numerous examples, is always updated when a new PHP version is released.


    www.w3schools.com/php/


    A very good tutorial site, explaining all available functions and **SQL**


    dev.mysql.com/doc/


    Official site with large functional reference, but with somewhat complex examples
    www.php.net/manual/en/book.mysqli.php


    Part of the official PHP guide/documentation with all PHP functions available
    around MySQL


    forums.mysql.com


    Official MySQL forum with a very active community


    **Book tips**


    All of the following books are also available as e-books.


    **PHP and MySQL for Dynamic Web Sites, Fourth Edition: Visual QuickPro Guide**
    by Larry Ullman


    Peachpit Press


    ISBN 0321784073


    A good book covering most of the PHP and MySQL functions. Try to get the newest
    version, as there are a lot of changes in the latest PHP releases.


    ***Head First PHP & MySQL: A Brain-Friendly Guide Kindle Edition***


    *by Lynn Beighley and Michael Morrison*


    O''Reilly Media


    ISBN-10: 0596006306


    ISBN-13: 978-0596006303


    An easy to understand book on PHP and MySQL. I hope there is a new version released
    soon to cover the PHP 7 extras.


    **PHP Objects, Patterns, and Practice**


    by Matt Zandstra


    ISBN-13: 978-1430260318


    ISBN-10: 1430260319


    A good book on programming patterns with focus on PHP. You will learn how to write
    clean code with standardized programming patterns. A very important topic in programming
    is the development of object-oriented projects. In any case, it is recommended
    as soon as you are familiar with the basics of PHP.


    **Wikibook PHP Programming**


    *https://en.wikibooks.org/wiki/PHP_Programming* Wikibooks is a Wikipedia-based
    platform where, similar to the Wikipedia encyclopaedia, a large community writes
    non-fiction texts that are edited in book form. Some of the books have even appeared
    in print versions. The online Wikibooks have the advantage, thanks to the active
    community, that they are almost ‘live’ and kept up-to-date.


    **Epilogue**


    I hope you enjoyed the introduction to the world of web development with PHP and
    MySQL and you are now ready to implement your first own small projects.


    If you need ideas about to try next: you could use the knowledge this course provides,
    for example, to create a guest book for a website, or a small script that displays
    a different greeting, depending on the day of the week and the time.


    Or, how about having a page for collecting signatures or votes? The page could
    write the data to a database, but it should check beforehand whether an e-mail
    address and/or a certain combination of first and last names already exists.


    Do you have any feedback on this book? I would be very pleased.


    I am available at the e-mail address books@theklaus.at.


