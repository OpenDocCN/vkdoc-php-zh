    **Introduction to Zend_Acl**


    Zend_Acl is a component of the Zend Framework that provides access control list
    (ACL) functionality. While it doesn’t fundamentally require the use of Zend_Auth,
    we will combine these two components to control what users can and cannot do in
    our web application.


    Essentially what Zend_Acl does is determine whether a *role* has sufficient privileges
    to access a *resource*.


    • **Resource:** Some object (not an object in the OOP sense, just some “thing”)
    in a web application to which access can be controlled. An example of a resource
    is an action in a web application, such as approving the content of an article
    before it is published, or deleting a user from the system. Additionally, you
    can provide finer-grained control over privileges to resources. So, in the example
    of approving an article, the resource would be the article-management system (or
    a particular article, depending on how you look at it), while the privilege would
    be the approve action.


    • **Role:** Some object that requests access to resources. In our web application,
    a role refers to a user of certain privileges.


    Although this language might be somewhat confusing, each user in our application
    (that is, each record in the users table) has a particular user type. We refer
    to this as a user’s role.


    ■**Note** It is possible to make a role or a resource inherit from another role
    or resource, respectively. For example, let’s say you assign certain privileges
    to Role A. If you make Role B inherit from Role A, it will get all of the privileges
    that Role A has, in addition to any extra privileges you add to Role B. This can
    make your permissions system confusing (especially when inheriting from more than
    one other role or resource), so we will try to keep it as simple as possible in
    our application.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch03CMP4 11/13/07 9:37 PM Page 55


    C H A P T E R 3 ■ U S E R A U T H E N T I C AT I O N, A U T H O R I Z AT I O N,
    A N D M A N A G E M E N T


    **55**


    We will control access to particular resources (such as publishing a blog post
    or resetting a password) based on a user’s role. As mentioned when creating the
    users table, the three types of users (the three user roles) will be guest, member,
    and administrator.


    The typical flow for using Zend_Acl in a web application is as follows:


    **1.** Instantiate the Zend_Acl class (let’s call this object $acl).


    **2.** Add one or more roles to $acl using the addRole() method.


    **3.** Add resources to $acl using the add() method.


    **4.** Add the full list of privileges for each role (that is, use allow() or
    deny() to indicate which resources roles have access to).


    **5.** Use the isAllowed() method on $acl to determine whether a particular role
    has access to a particular resource/privilege combination.


    **6.** Repeat step 5 as often as necessary while the script executes.


    **A Zend_Acl Example**


    Let’s take a look at actually using the Zend_Acl class. In this example, I will
    use the role names we will be using in our application. The privileges I set up
    here should give you an idea of exactly what we will be doing when we integrate
    Zend_Acl into our application.


    The first thing I need to do to manage and check permissions is to instantiate
    the Zend_


    Acl class. The constructor takes no arguments:


    $acl = new Zend_Acl();


    Next, I create each of the roles that I’m checking permissions for. As mentioned
    previously, we will be using three different roles: guest, member, and administrator.


    $acl->addRole(new Zend_Acl_Role(''guest''));


    $acl->addRole(new Zend_Acl_Role(''member''));


    $acl->addRole(new Zend_Acl_Role(''administrator''));


    After creating the roles, I can create the resources. In fact, I could swap the
    order; the key thing is that both roles and resources must be added before defining
    or checking permissions.


    For this example, I will only add account and admin as the resources that will
    be granted permissions. There will be other resources in our application, but
    only items that will be granted permissions need to be added here, because when
    checking permissions, we check for the existence of the requested resource. It’s
    up to you as the developer how you handle a permissions check for a nonexistent
    resource. In this case, I will simply allow access to a requested resource if
    it hasn’t been added to $acl.


    $acl->add(new Zend_Acl_Resource(''account''));


    $acl->add(new Zend_Acl_Resource(''admin''));


    The next step is to define the different permissions required in the application.
    This is achieved by making a series of calls to allow() and deny() on the Zend_Acl
    instance. The first argument to this function is the role, and the second is the
    resource. You can add finer-grained control by specifying the third parameter
    (the permission name).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch03CMP4 11/13/07 9:37 PM Page 56


    **56**


    C H A P T E R 3 ■ U S E R A U T H E N T I C AT I O N, A U T H O R I Z AT I O N,
    A N D M A N A G E M E N T


    In the permissions system for our application, the name of the controller (in
    the context of Zend_Controller) is the resource, while the controller action is
    the permission name. As in the following example, we can allow or deny access
    to an entire controller (as we will do for guest in the admin controller), or
    we can open up one or two specific actions within a controller (as we will do
    for the login and fetchpassword actions for guest).


    $acl->allow(''guest''); // allow guests everywhere ...


    $acl->deny(''guest'', ''admin''); // ... except in the admin section ...


    $acl->deny(''guest'', ''account''); // ... and the account management section
    $acl->allow(''guest'', ''account'', // ... although let them log in


    array(''login'', ''fetchpassword''));


    In addition to defining what guests can do, I also want to define what members
    are allowed to do. Members are privileged users, so I allow them more access than
    guests: $acl->allow(''member''); // members can go everywhere ...


    $acl->deny(''member'', ''admin''); // ... except for the site admin section Next
    I define the permissions for administrators, who are even more privileged than
    members:


    $acl->allow(''administrator''); // administrators can go everywhere!


    Once all the permissions have been defined, they can be queried to determine what
    can and can’t be accessed. Here are some examples:


    // check permissions


    $acl->isAllowed(''guest'', ''account''); // returns false


    $acl->isAllowed(''guest'', ''account'', ''login''); // true


    $acl->isAllowed(''member'', ''account''); // true


    $acl->isAllowed(''member'', ''account'', ''login''); // true


    $acl->isAllowed(''member'', ''admin''); // false


    $acl->isAllowed(''administrator'', ''admin''); // true


    Note that in our application the role names will be dynamically determined based
    on the user that is logged in, and the resource and permission names will be determined
    by the requested controller and action.


    Realistically, the call to isAllowed() will be in an if statement, such as this:


    <?php


    if ($acl->isAllowed(''member'', ''account'')) {


    // display member account area


    }


    ?>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


