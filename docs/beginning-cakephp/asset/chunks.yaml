    # Chapter 1: Introduction


    Programmers have used frameworks for years, though for web development the use
    of frameworks has been more recent. Probably the main advantage of using a framework
    in any project, be it web-related or not, is explained by the concept of "inversion
    of control." Many programs operate in such a way that the code is in control.
    In other words, the code decides when one operation should appear, how it should
    handle the user’s response, and so forth.


    Imagine if this order of control were inverted. Rather than have a script or library
    that contains a series of operations, the program has a series of objects that
    can do nothing until you extend them (even though they may contain tons of tools
    you could put to use). In this way, the framework calls on you, not the other
    way around.


    For example, let’s say you are looking for a way to install a voting program into
    your web site. You browse the Internet and find a handful of useful PHP scripts
    that all promise to do that for you. After plugging in some unique settings, you
    place one of these scripts onto your server and launch the program. The program
    runs just fine, but if you wanted to change anything, you would have to go into
    the script, locate where the operation occurs that you want to change, and work
    the adjustment by hand. The script manages the flow of control in the sense that
    all of its operations are executed when the program runs, and if you want to control
    the program, you have to alter the script.


    A framework, on the other hand, has an inverted flow of control. To produce a
    voting application in a framework, you would have to add to the framework those
    objects that would handle the voting. The framework would automatically pull together
    several resources to make the voting process happen, and you would have to intercept
    those resources or extend them to add your own functionality. A library will behave
    on its own, like the script example, and any changes must be made directly in
    the code. A framework is different in that it will wait for you to extend or add
    to it before it can really do anything for you. You will not need to go directly
    to the framework’s code to make changes; instead, the framework will take your
    extensions and use those instead of its own libraries.'
