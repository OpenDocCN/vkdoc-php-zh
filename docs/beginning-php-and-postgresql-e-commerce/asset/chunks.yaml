  trans: "\n# 第 12 章：存储客户订单\n\n## 更新 `UpdateOrder` 方法\n\n按如下方式修改 `Orders` 类的 `UpdateOrder`\
    \ 方法：\n\n```php\n// 更新订单详情\npublic static function UpdateOrder($orderId, $status,\
    \ $comments, $authCode, $reference)\n{\n    // 构建 SQL 查询\n    $sql = 'SELECT orders_update_order(:order_id,\
    \ :status, :comments,\n            :auth_code, :reference);';\n\n    // 构建参数数组\n\
    \    $params = array (':order_id' => $orderId,\n                     ':status'\
    \ => $status,\n                     ':comments' => $comments,\n              \
    \       ':auth_code' => $authCode,\n                     ':reference' => $reference);\n\
    \n    // 使用 PDO 特定功能准备语句\n    $result = DatabaseHandler::Prepare($sql);\n\n  \
    \  // 执行查询\n    return DatabaseHandler::Execute($result, $params);\n}\n```\n\n\
    ## 添加 `GetCustomersList` 方法\n\n在 `business/customer.php` 的 `Customer` 类中添加一个名为\
    \ `GetCustomersList` 的新方法：\n\n```php\n// 获取所有客户名称及其关联 ID\npublic static function\
    \ GetCustomersList()\n{\n    // 构建 SQL 查询\n    $sql = 'SELECT * FROM customer_get_customers_list();';\n\
    \n    // 使用 PDO 特定功能准备语句\n    $result = DatabaseHandler::Prepare($sql);\n\n  \
