  \n}\n\n## 第 13 章 ■ 创建和使用表单\n\n使用 jQuery 库或 Bootstrap 框架并非必需，但它们能让表单看起来比纯 HTML 表单更美观一些。\n\
  \njQuery 库是与 JavaScript 中 DOM 进行交互的事实标准。它通过使用接近 CSS 的选择器语法，使开发者能够轻松访问元素。\n\nBootstrap\
  \ 框架是响应式的，能让内容在移动设备和笔记本电脑/桌面设备上呈现相似的观感和体验。由于来自移动设备的网络请求占比越来越高，强烈建议创建响应式内容，以便其能适应不同设备。事实上，许多搜索引擎会在搜索结果中对不友好的移动端内容进行降权处理。\n\
  \n将收集到的数据显示给用户后，脚本会使用 `mysqli` 扩展将这些值插入到数据库中。本例中采用了面向对象的风格。在用于数据库查询之前，字符串值会被转义，并且\
  \ `cnt` 值会被强制转换为整数，以避免值缺失或包含字符串时出现错误。\n\n### 配方 13-2. 默认值\n\n### 问题\n\n前面示例中使用的表单在首次加载时都是空的。有时需要为表单添加默认内容，这有几种用例。一种是用常见值填充表单，或选中下拉列表中最常见的值等；另一种是允许用户编辑之前已提交并保存在服务器上的记录。\n\
  \n### 解决方案\n\n为 `input` 标签设置默认值取决于输入类型。对于文本输入，使用 `value` 属性设置值。\n\n```\n<input type=\"\
  text\" name=\"name\" value=\"某个默认值\" />\n```\n\n对于复选框和单选按钮，使用 `checked` 属性来指示是否选中。对于只能选中一个值的单选按钮，只有最后一个带有\
  \ `checked` 属性的元素会被选中。在之前“否/是”示例的第一个值上添加 `checked` 属性，会改变表单的行为。在原始示例中，表单首次加载时没有选中任何值，但在“否”值上设置\
  \ `checked` 后，表单加载时该单选按钮就会被选中。\n\n```\n<input type=\"radio\" name=\"agree\" value=\"\
  0\" checked />否\n<input type=\"radio\" name=\"agree\" value=\"1\" />是\n```\n\n对于可以同时选中多个值的复选框，可以使用同样的机制。\n\
  \n```\n<input type=\"checkbox\" name=\"skill[]\" value=\"1\" checked />PHP\n<input\
  \ type=\"checkbox\" name=\"skill[]\" value=\"2\" checked />JavaScript\n<input type=\"\
  checkbox\" name=\"skill[]\" value=\"4\" />C/C++\n<input type=\"checkbox\" name=\"\
  skill[]\" value=\"8\" />Java\n```\n\n在此示例中，表单加载时前两个值将处于预选状态。\n\n最后，对于下拉列表，应在作为默认值的\
  \ `option` 上使用 `selected` 属性，这将使该值在下拉列表中预选。对于单值 `select`，可以在多个值上设置 `selected` 属性，但只有最后一个带有该属性的值会成为选中选项。如果是多选列表，则所有带有\
  \ `selected` 属性的选项都将显示为已选中。\n\n在下一个示例中，加利福尼亚州将作为下拉列表的默认值。\n\n```\n<select name=\"\
  state\">\n<option value=\"AL\">阿拉巴马州</option>\n<option value=\"AK\">阿拉斯加州</option>\n\
  <option value=\"AZ\">亚利桑那州</option>\n<option value=\"AR\">阿肯色州</option>\n<option\
  \ value=\"CA\" selected>加利福尼亚州</option>\n...\n<option value=\"WY\">怀俄明州</option>\n\
  </state>\n```\n\n\n\n与多选复选框类似，我们可以使用`selected`属性在多选列表中同时选中 PHP 和 JavaScript。\n\n\
  ```\n<select multiple name=\"skill[]\">\n<option value=\"1\" selected>PHP</option>\n\
  <option value=\"2\" selected>JavaScript</option>\n<option value=\"4\">C/C++</option>\n\
  <option value=\"8\">Java</option>\n</select>\n```\n\n`checked`和`selected`属性使用时无需赋值。你也可以给这些属性添加一个值，例如`checked=\"\
  true\"`或`selected=\"true\"`。但请留意，`checked=\"false\"`或`selected=\"false\"`仍然会将它们设置为默认值。属性的值是什么并不重要，只要该属性存在，元素就会被勾选或选中。\n\
  \n### 工作原理\n\n扩展食谱 13-1，可以在将数据插入数据库之前，在服务器端进行一些检查。如果姓名或电子邮件列为空，则重新生成表单，其中包含用户已提交的值，并添加一条消息提示用户缺少数据。\n\
