  ## 将固件加载到测试中


  让我们来看看`tests/TestCase/Model/Table/UsersTableTest.php`文件，该文件也是由`bake`生成的，正如上一章所述。


  ```

  1  <?php

  2  namespace App\Test\TestCase\Model\Table;

  ```


  命名空间是在 PHP 5.3 中引入的，也是 PHP 7 应用程序中推荐使用的语言特性。命名空间最简单的定义是它是一种封装项目的方式。


  ```

