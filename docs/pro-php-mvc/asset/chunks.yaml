    **Chapter 13**


    **Bootstrapping**


    Bootstrapping is a metaphor for self-sustaining processes that proceed without
    external help. In terms of our framework, bootstrapping is a collective term for
    the processes our framework will perform in order to get from a web address to
    a specific set of controllers, models, and views.


    These processes are required by virtue of the fact that our framework is heavily
    focused on OOP practices, in which we attempt to isolate as much functionality
    as we can within individual classes. If we were to attempt a functional approach
    to MVC framework construction, it would imply that our code is executed in a top-down
    fashion, and requires no initial code to stitch the individual classes together
    in a meaningful application.


    So far, we have built many individual classes, which are foundational to a solid
    framework. The moment we start to build applications on top of our framework,
    we need to start thinking of how each part interacts with all the others it needs
    to. This begins with bootstrapping.


    Goals


    • We need to intercept requests to our application (with .htaccess) and reroute
    these to the bootstrap file.


    • The bootstrap file needs to instantiate the classes required to get the application
    running.


    These include configuration, cache, and router, to name a few.


    • The router will then decide which controller and action to load. The controller
    will first allow the action to execute and then render the action’s view (if a
    matching view is found).


    When a File Is Not a File…


    Developers venturing into the realms of framework development might be surprised
    to find that unique web addresses do not necessarily point to unique files on
    a web server. It is commonplace for multiple domain names to point to the same
    web site. Likewise, it is commonplace for addresses with varying querystring parameters
    to point to the same file. The kind of address-to-file relationship I am talking
    about is the ability of a web server to redirect addresses (of any kind) to any
    files they choose, based on pattern matching. This is a process known as *URL
    rewriting*.


    URL rewriting is something the server can do, if sufficient instructions are given
    to it, telling it what addresses to match, and where to send the corresponding
    requests to. Requests can be rerouted to files/scripts within the local file system,
    or even remote files and/or addresses. These instructions are usually given within
    the configuration files of the specific web server.


    Some web servers, such as Apache2, allow these configuration files to be loaded
    at the same time as the server is started. These servers may also allow configuration
    files to be stored within each directory, as is the case with Apache2.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 13 ■ BooTsTRAPPing


    URL Rewriting


    The reason URL rewriting is important to us is that we will be using it to funnel
    all requests into a single index.php file. This is because we want to handle all
    requests through the same bootstrapping code (contained in this index.php file),
    so that we can select the best response with no repeated code.


    I mentioned the directory-based configuration files we could use to initialize
    the URL rewriting, and we will be creating one now. This should be in the public
    directory, and your web server’s root directory should point to within the public
    directory. This will ensure that our application code can read all the framework
    files, while only the files contained within the public directory will be publicly
    accessible to the outside world. Let’s see what that file looks like in Listing
    13-1.


    ***Listing 13-1.*** URL Rewriting in Apache2


    RewriteEngine On


    RewriteCond %{REQUEST_FILENAME} !-d


    RewriteCond %{REQUEST_FILENAME} !-f


    RewriteCond %{REQUEST_URI} !=/favicon.ico


    RewriteRule ^([a-zA-Z0-9\/\-_]+)\.?([a-zA-Z]+)?$ index.php?url = $1&extension
    = $2 [QSA,L]


    These five lines might look complicated, but their meaning is simple. The first
    instructs Apache2 to enable URL rewriting for this directory. It assumes that
    the module is installed and enabled at the time the server starts.


    The second instruction tells Apache2 to ignore all requests made to actual directories
    within this directory.


    For example, if there is a scripts directory within the public directory, and
    a request is made to


    [http://localhost/scripts](http://localhost/scripts), Apache2 will ignore the
    rewriting and let the request execute as normal. The third instruction is similar,
    but refers to files. If a request is made to [http://localhost/scripts/shared.js](http://localhost/scripts/shared.js,),
    the request will be executed as normal.


    The fourth instruction tells Apache2 to ignore all requests to [http://localhost/favicon.ico.
    Br](http://localhost/favicon.ico)owsers frequently request standard files such
    as this, and we don’t want this additional traffic triggering 404 error pages
    because our framework doesn’t cater to the address.'
