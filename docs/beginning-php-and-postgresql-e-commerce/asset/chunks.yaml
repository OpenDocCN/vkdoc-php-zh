    Press F5 to execute the command. The output should once again say that the command
    executed successfully with no result.


    **6.** To test that the new function returns what it’s supposed to, clear again
    the contents of the window, and type the following query. The list of departments
    should be retrieved (see Figure 3-13).


    SELECT * FROM catalog_get_departments_list();


