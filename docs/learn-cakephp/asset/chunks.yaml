- fmt: '# 1. What Is CakePHP?


    Electronic supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-1212-7_1](http://dx.doi.org/10.1007/978-1-4842-1212-7_1))
    contains supplementary material, which is available to authorized users.


    ![A337704_2_En_1_Figa_HTML.jpg](A337704_2_En_1_Figa_HTML.jpg)


    Secrets of the cake industry


    PHP''s market share for web sites is more than 80%.[¹](#A337704_2_En_1_Chapter.html#Fn1)
    Why is it so popular? It''s easy and fast to learn, available on nearly every
    web server, and used for popular applications. It has a lot of wonderful frameworks,
    such as `Zend`,[²](#A337704_2_En_1_Chapter.html#Fn2) `Symfony`,[³](#A337704_2_En_1_Chapter.html#Fn3)
    and, perhaps our favorite, `CakePHP`.


    The frameworks are different in their approach, complexity, and style. I think
    `CakePHP` stands out, with its short learning curve, concentrating on rapid development.


    Frameworks help you to speed up your development, give you well-organized, maintainable,
    and reusable code, and assets for handling security, localization, and more.


    The `CakePHP` manual[⁴](#A337704_2_En_1_Chapter.html#Fn4) (or "cookbook") states:
    "`CakePHP` is a free[⁵](#A337704_2_En_1_Chapter.html#Fn5), open-source[⁶](#A337704_2_En_1_Chapter.html#Fn6),
    rapid-development[⁷](#A337704_2_En_1_Chapter.html#Fn7) framework[⁸](#A337704_2_En_1_Chapter.html#Fn8)
    for PHP[⁹](#A337704_2_En_1_Chapter.html#Fn9)."


    I think `CakePHP` is most famous for its ten-minute blog tutorial. And, yes, it''s
    true: with `CakePHP`, you can build a working blog in ten minutes! And you can
    build bigger web applications just as fast, without sacrificing flexibility.


    ## Main Features


    Most popular PHP frameworks try to offer solutions to the same problems. So, choosing
    one is not easy. Most developers work with one framework and know a bit about
    a few others. And certainly, everybody thinks the best is what they use. So, in
    the following sections, let''s see why I choose `CakePHP`.


    ### Short Learning Curve


    `CakePHP`''s learning curve is short. You can become familiar with the main API
    methods in a week and gain deep insight in a month. `CakePHP 3` represents a significant
    change, and I think it makes the learning curve even shorter.


    ### Convention over Configuration


    If you follow `CakePHP`''s conventions practically, you do not have to configure
    anything at all, thanks to the framework''s idea of "convention over configuration."
    Cake''s conventions are simple to follow and learn.


    Controller class names are plural, CamelCased, and end in "Controller." So the
    Post''s controller will be `PostsController`. It will be in the `/src/PostsController.php`
    file. It''s corresponding model file will be at `/src/Model/Table/PostsTable.php`,
    which will be linked to the `posts` table in our database. Its view files will
    be in the `/src/Template/Posts` folder.


    Table class names are plural and CamelCased; table names corresponding to `CakePHP`
    models are plural and underscored in English.


    View template files are named after the controller functions they display, in
    an underscored form, and they are automatically mapped from URLs.


    If you cannot (or, in some rare case, you do not want) to follow conventions,
    you can easily configure everything.


    ### Easy Installation


    You will see how to install `CakePHP` in Chapter [6](#A337704_2_En_6_Chapter.html).
    Actually, with one line of code, you can download and install `CakePHP`. So, installation
    takes about two seconds or less.


    ### MIT Licensing[^(10)](#A337704_2_En_1_Chapter.html#Fn10)


    The MIT ([Massachusetts Institute of Technology](https://en.wikipedia.org/wiki/Massachusetts_Institute_of_Technology))
    License is a [free software license](https://en.wikipedia.org/wiki/Free_software_license).
    It permits reuse of the code within [proprietary and free software](https://en.wikipedia.org/wiki/Proprietary_software)
    also. The MIT License is also [compatible](https://en.wikipedia.org/wiki/License_compatibility)
    with many [copyleft](https://en.wikipedia.org/wiki/Copyleft) licenses, such as
    [GPL](https://en.wikipedia.org/wiki/GNU_General_Public_License).


    [Ruby on Rails](https://en.wikipedia.org/wiki/Ruby_on_Rails), [Node.js](https://en.wikipedia.org/wiki/Node.js),
    [jQuery](https://en.wikipedia.org/wiki/JQuery), and many other frameworks are
    permissible under the MIT License.


    ### Automatic Code Generation


    `CakePHP` has a built-in console shell called `bake`, by which we can generate
    a basic model, controller, and view files. I think it is one of the best tools
    in rapid development. By using `bake`, you can start to have a working skeleton
    in a very early phase of your development. If you follow Cake''s conventions,
    `bake` will detect your database tables and fields and, based on this, will generate
    code for you—always a good start. You will see automatic code generation in action
    in Chapter [6](#A337704_2_En_6_Chapter.html).


    ### Built-in [Validation](http://en.wikipedia.org/wiki/Data_validation)[^(11)](#A337704_2_En_1_Chapter.html#Fn11)


    Validating input data is very important. Validation ensures that an application
    operates on clean, correct, and useful data. It means that validation can check
    data from the security viewpoint—check if it is acceptable, such as if it is within
    a certain range, in the right format, and more.


    Models generated by `bake` have validation rules, and they are a good starting
    point from which to become familiar with validation.


    ### MVC[^(12)](#A337704_2_En_1_Chapter.html#Fn12) Architecture


    Perhaps MVC (Model-View-Controller) architecture is not an extraordinary feature
    of `CakePHP`, as almost all PHP frameworks follow the same pattern. But as a paradigm,
    a way of thinking, it still will help you to create better code.


    ### Clean URLs and Routes


    Cake helps you to create simple, clean URLs and practically gives you 100% freedom
    in manipulating your web application''s URLs. By default, URLs are built up like
    this: `/controller/method/parameter`, so `posts/edit/1` will be mapped to `PostsController`''s
    `edit` method, and it will get `1` as its only parameter.


    ### Flexible Caching[^(13)](#A337704_2_En_1_Chapter.html#Fn13)


    `CakePHP` has six different caching engines built in, such as `FileCache`, `Memcached`,
    `Redis`, and others. You can change caching engines any time smoothly, as they
    have the same interface. If you want something really special, you can add your
    own caching system.


    ### Built-in Localization


    Localization and internationalization can be either a nightmare or something really
    simple. Cake provides a really good way to have both without much effort. You
    just have to create your translation files in `gettext` format and use the `__()`
    method when you want to print out something to the screen.


    ### Integrated Unit Testing


    Perhaps for us, the most important aspect of `CakePHP` is that it has an integrated
    unit testing system. It uses `PHPUnit` and gives us a few really useful classes
    and methods for testing.


    ### And More


    `CakePHP` also has an active, friendly, and helpful [developer](http://cakephp.lighthouseapp.com/contributors)
    [team](http://cakephp.lighthouseapp.com/contributors)[^(14)](#A337704_2_En_1_Chapter.html#Fn14)
    and community. Community is very important when you get stuck. The `CakePHP` community
    fields tens of thousands of questions on stack overflow related to `CakePHP`,
    has an active Google mailing group and Google + group, and an online forum.[^(15)](#A337704_2_En_1_Chapter.html#Fn15)


    `CakePHP` is one of most famous PHP frameworks used by thousands of web sites
    and applications and beloved and frequently used by many developers around the
    world.


    `CakePHP` makes building web applications simpler, faster, and easier.'
  raw: '# 1. What Is CakePHP?


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1212-7_​1](http://dx.doi.org/10.1007/978-1-4842-1212-7_1))
    contains supplementary material, which is available to authorized users.


    ![A337704_2_En_1_Figa_HTML.jpg](A337704_2_En_1_Figa_HTML.jpg)


    Secrets of the cake industry


    PHPs market share for web sites is more than 80%.[¹](#A337704_2_En_1_Chapter.html#Fn1)
    Why is it so popular? It’s easy and fast to learn, available on nearly every web
    server, and used for popular applications. It has a lot of wonderful frameworks,
    such as Zend,[²](#A337704_2_En_1_Chapter.html#Fn2) Symfony,[³](#A337704_2_En_1_Chapter.html#Fn3)
    and, perhaps our favorite, CakePHP.


    The frameworks are different in their approach, complexity, and style. I think
    CakePHP stands out, with its short learning curve, concentrating on rapid development.


    Frameworks help you to speed up your development, give you well-organized, maintainable,
    and reusable code, and assets for handling security, localization, and more.


    The CakePHP manual[⁴](#A337704_2_En_1_Chapter.html#Fn4) (or “cookbook”) states:
    “CakePHP is a free[⁵](#A337704_2_En_1_Chapter.html#Fn5), open-source[⁶](#A337704_2_En_1_Chapter.html#Fn6),
    rapid-development[⁷](#A337704_2_En_1_Chapter.html#Fn7) framework[⁸](#A337704_2_En_1_Chapter.html#Fn8)
    for PHP[⁹](#A337704_2_En_1_Chapter.html#Fn9).”


    I think CakePHP is most famous for its ten-minute blog tutorial. And, yes, it’s
    true: with CakePHP, you can build a working blog in ten minutes! And you can build
    bigger web applications just as fast, without sacrificing flexibility.


    ## Main Features


    Most popular PHP frameworks try to offer solutions to the same problems. So, choosing
    one is not easy. Most developers work with one framework and know a bit about
    a few others. And certainly, everybody thinks the best is what they use. So, in
    the following sections, let’s see why I choose CakePHP.


    ### Short Learning Curve


    CakePHP’s learning curve is short. You can become familiar with the main API methods
    in a week and gain deep insight in a month. CakePHP 3 represents a significant
    change, and I think it makes the learning curve even shorter.


    ### Convention over Configuration


    If you follow CakePHP’s conventions practically, you do not have to configure
    anything at all, thanks to the framework’s idea of “convention over configuration.”
    Cake’s conventions are simple to follow and learn.


    Controller class names are plural, CamelCased, and end in “Controller.” So the
    Post’s controller will be `PostsController`. It will be in the `/src/PostsController.php
    file`. It’s corresponding model file will be at `/src/Model/Table/PostsTable.php`,
    which will be linked to the posts table in our database. Its view files will be
    in the `/src/Template/Posts` folder.


    Table class names are plural and CamelCased; table names corresponding to CakePHP
    models are plural and underscored in English.


    View template files are named after the controller functions they display, in
    an underscored form, and they are automatically mapped from URLs.


    If you cannot (or, in some rare case, you do not want) to follow conventions,
    you can easily configure everything.


    ### Easy Installation


    You will see how to install CakePHP in Chapter [6](#A337704_2_En_6_Chapter.html).
    Actually, with one line of code, you can download and install CakePHP. So, installation
    takes about two seconds or less.


    ### MIT Licensing[^(10)](#A337704_2_En_1_Chapter.html#Fn10)


    The MIT ([Massachusetts Institute of Technology](https://en.wikipedia.org/wiki/Massachusetts_Institute_of_Technology))
    License is a [free software license](https://en.wikipedia.org/wiki/Free_software_license).
    It permits reuse of the code within [proprietary and free software](https://en.wikipedia.org/wiki/Proprietary_software)
    also. The MIT License is also [compatible](https://en.wikipedia.org/wiki/License_compatibility)
    with many [copyleft](https://en.wikipedia.org/wiki/Copyleft) licenses, such as
    [GPL](https://en.wikipedia.org/wiki/GNU_General_Public_License).


    [Ruby on Rails](https://en.wikipedia.org/wiki/Ruby_on_Rails), [Node.​js](https://en.wikipedia.org/wiki/Node.js),
    [jQuery](https://en.wikipedia.org/wiki/JQuery), and many other frameworks are
    permissible under the MIT License.


    ### Automatic Code Generation


    CakePHP has a built-in console shell called `bake`, by which we can generate a
    basic model, controller, and view files. I think it is one of the best tools in
    rapid development. By using `bake`, you can start to have a working skeleton in
    a very early phase of your development. If you follow Cake’s conventions, `bake`
    will detect your database tables and fields and, based on this, will generate
    code for you—always a good start. You will see automatic code generation in action
    in Chapter [6](#A337704_2_En_6_Chapter.html).


    ### Built-in [Validation](http://en.wikipedia.org/wiki/Data_validation) [^(11)](#A337704_2_En_1_Chapter.html#Fn11)


    Validating input data is very important. Validation ensures that an application
    operates on clean, correct, and useful data. It means that validation can check
    data from the security viewpoint—check if it is acceptable, such as if it is within
    a certain range, in the right format, and more.


    Models generated by `bake` have validation rules, and they are a good starting
    point from which to become familiar with validation.


    ### MVC[^(12)](#A337704_2_En_1_Chapter.html#Fn12) Architecture


    Perhaps MVC (Model-View-Controller) architecture is not an extraordinary feature
    of CakePHP, as almost all PHP frameworks follow the same pattern. But as a paradigm,
    a way of thinking, it still will help you to create better code.


    ### Clean URLs and Routes


    Cake helps you to create simple, clean URLs and practically gives you 100% freedom
    in manipulating your web application’s URLs. By default, URLs are built up like
    this: /controller/method/parameter, so `posts/edit/1` will be mapped to `PostsController`’s
    edit method, and it will get 1 as its only parameter.


    ### Flexible Caching[^(13)](#A337704_2_En_1_Chapter.html#Fn13)


    CakePHP has six different caching engines built in, such as FileCache, Memcached,
    Redis, and others. You can change caching engines any time smoothly, as they have
    the same interface. If you want something really special, you can add your own
    caching system.


    ### Built-in Localization


    Localization and internationalization can be either a nightmare or something really
    simple. Cake provides a really good way to have both without much effort. You
    just have to create your translation files in `gettext` format and use the `__()`
    method when you want to print out something to the screen.


    ### Integrated Unit Testing


    Perhaps for us, the most important aspect of CakePHP is that it has an integrated
    unit testing system. It uses PHPUnit and gives us a few really useful classes
    and methods for testing.


    ### And More


    CakePHP also has an active, friendly, and helpful [developer](http://cakephp.lighthouseapp.com/contributors)
    [team](http://cakephp.lighthouseapp.com/contributors) [^(14)](#A337704_2_En_1_Chapter.html#Fn14)
    and community. Community is very important when you get stuck. The CakePHP community
    fields tens of thousands of questions on stack overflow related to CakePHP, has
    an active Google mailing group and Google + group, and an online forum.[^(15)](#A337704_2_En_1_Chapter.html#Fn15)


    CakePHP is one of most famous PHP frameworks used by thousands of web sites and
    applications and beloved and frequently used by many developers around the world.


    CakePHP makes building web applications simpler, faster, and easier.'
