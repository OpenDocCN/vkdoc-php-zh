    \ variables—for instance, when you’re logging someone\nout—set the `$_SESSION`\
    \ superglobal\narray to an empty array, like this:\n\n```\n$_SESSION = [];\n```\n\
    \nCaution\nDo not be tempted to try `unset($_SESSION)`. It\nworks all right—but\
    \ it’s a little too effective. It not only clears the\ncurrent session but also\
    \ prevents any further session variables from\nbeing stored.\n\nDestroying a session\n\
    \nBy itself, unsetting all the session variables effectively prevents any\nof\
    \ the information from being reused, but you should also invalidate the\nsession\
    \ cookie like this:\n\n```\nif (isset($_COOKIE[session_name()])) {\nsetcookie(session_name(),\
    \ \", time()-86400, '/');\n}\n```\n\nThis uses the function  `session_name()`\n\
    \ to get the name of the session dynamically and resets the\nsession cookie to\
    \ an empty string and to expire 24 hours ago (86,400 is\nthe number of seconds\
    \ in a day). The final argument (`'/'`) applies the\ncookie to the whole domain.\n\
    \nFinally, close the session with the following command:\n\n```\nsession_destroy();\n\
    ```\n\nThis function is rather poorly named. It simply closes the session.\nIt\
    \ doesn’t destroy any of the session variables or unset the session\ncookie. It’s\
    \ important to invalidate the session cookie and close a session to\navoid the\
    \ risk of an unauthorized person gaining access either to a\nrestricted part of\
    \ the site or to any information exchanged during the\nsession. However, a visitor\
    \ may forget to log out, so it’s not always\npossible to guarantee that the session\
    \ will be properly closed, which is\nwhy it’s so important not to store sensitive\
    \ information in a session\nvariable.\n\nNote\nPHP 7 doesn’t support `session_register()`\
    \ or\n`session_unregister()`\noften found in old scripts.\n\nRegenerating the\
    \ session ID\nWhen a user changes status, such as after logging in, it’s\nrecommended\
    \ as a security measure to regenerate the session ID. This\nchanges the random\
    \ string of letters and numbers that identify the\nsession but preserves all the\
    \ information stored in session variables.\nIn *Pro PHP Security, 2nd Edition*\
    \ (Apress, 2010, ISBN\n978-1-4302-3318-3), Chris Snyder and Michael Southwell\
    \ explain that “the\ngoal of generating a fresh session ID is to remove the possibility,\n\
    however slight, that an attacker with knowledge of the low-level\nsecurity session\
    \ might be able to perform high-security tasks.”\nTo regenerate\nthe session ID,\
    \ simply call `session_regenerate_id()`\nand redirect the user to another page\
    \ or reload the same one.\n\nThe “Headers already sent” error"
  trans: "\n### 图 11-1  \nPHP 会话在浏览器中存储一个包含唯一标识符的 Cookie  \n\n在 Web 服务器上会创建一个匹配的文件，其文件名包含相同的一串字母和数字，如图\
    \ 11-2 所示。  \n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fig2_HTML.jpg](img/332054_4_En_11_Fig2_HTML.jpg)\
    \  \n\n### 图 11-2  \nCookie 中的内容用于标识存储在 Web 服务器上的会话数据  \n\n当会话启动时，服务器会将信息存储在会话变量中，只要会话保持活动状态（通常直到浏览器关闭），其他页面就可以访问这些变量。由于会话\
    \ ID 对每个访问者都是唯一的，因此存储在会话变量中的信息不会被其他人看到。这意味着会话非常适合用于用户身份验证，尽管它也可以用于任何需要在页面间传递时为同一用户保存信息的场景，例如多页表单或购物车。\
    \  \n\n存储在用户计算机上的唯一信息是包含会话 ID 的 Cookie，而该 ID 本身毫无意义。这意味着仅通过检查此 Cookie 的内容无法泄露隐私信息。\
    \  \n\n会话变量及其值存储在 Web 服务器上。图 11-3 显示了一个简单会话文件的内容。可以看出，它是纯文本格式，内容并不难解读。图中显示的会话包含一个变量：`name`。变量名后面紧跟着一个竖线，然后是字母“s”、冒号、数字、另一个冒号，以及用引号括起来的变量值。其中“s”代表字符串，数字表示该字符串包含的字符数。因此，这个会话变量包含我的名字，作为一个长度为\
    \ 5 个字符的字符串。  \n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fig3_HTML.jpg](img/332054_4_En_11_Fig3_HTML.jpg)\
    \  \n\n### 图 11-3  \n会话的详细信息以纯文本形式存储在服务器上  \n\n这种设置具有若干含义。包含会话 ID 的 Cookie 通常会保持活动状态，直到浏览器关闭。因此，如果多人共用同一台计算机，除非他们在交给下一个人使用前总是关闭浏览器（这是你无法控制的），否则他们都可以访问彼此的会话。因此，提供一个注销机制来删除\
    \ Cookie 和会话变量以保持网站安全非常重要。你还可以创建一个超时机制，在用户一段时间不活动后自动防止任何人重新获得访问权限。  \n\n将会话变量以纯文本形式存储在\
    \ Web 服务器上本身并不值得担忧。只要服务器配置正确，会话文件就无法通过浏览器访问。PHP 也会定期删除不活动的文件（理论上，生命周期为 1440 秒——即\
    \ 24 分钟——但这并不可靠）。然而，显而易见的是，如果攻击者成功入侵服务器或劫持会话，信息就可能被泄露。因此，尽管会话通常足够安全，可用于保护网站部分的密码访问或处理多页表单，但绝不应将会话变量用于存储敏感信息，例如密码或信用卡详细信息。正如你将在本章后面的“使用会话限制访问”中看到的，虽然密码被用于访问受保护的站点，但密码本身是存储在单独位置（最好经过哈希处理）的，而不是作为会话变量存储。\
    \  \n\n**注意**  \n哈希是一种单向过程，它将纯文本打乱以生成唯一的消息摘要。它经常与加密混淆，加密允许对加密文本进行解密。当哈希正确执行时，无法逆转该过程来揭示原始密码。\
    \  \n\n会话默认受支持，因此你不需要任何特殊配置。但是，如果用户浏览器中禁用了 Cookie，则会话将无法工作。可以将 PHP 配置为通过查询字符串发送会话\
    \ ID，但这被认为存在安全风险。  \n\n## 创建 PHP 会话  \n\n只需在要在会话中使用的每个 PHP 页面中放入以下命令：  \n\n```\
    \  \nsession_start();  \n```  \n\n每个页面应仅调用此命令一次，并且必须在 PHP 脚本生成任何输出之前调用，因此最理想的位置是在\
    \ PHP 开始标签之后立即调用。如果在调用 `session_start()` 之前生成了任何输出，则该命令会失败，并且该页面的会话将不会被激活。（稍后会详细解释“Headers\
    \ already sent”错误。）  \n\n## 创建和销毁会话变量  \n\n通过向 `$_SESSION` 超全局数组添加变量来创建会话变量，方式与分配普通变量相同。假设你想存储访问者的姓名并显示问候语。如果姓名通过登录表单以\
    \ `$_POST['name']` 的形式提交，你可以这样赋值：  \n\n```  \n$_SESSION['name'] = $_POST['name'];\
    \  \n```  \n\n现在可以在任何以 `session_start()` 开头的页面中使用 `$_SESSION['name']`。由于会话变量存储在服务器上，一旦脚本或应用程序不再需要它们，就应立即将其清除。像这样取消设置会话变量：\
    \  \n\n```  \nunset($_SESSION['name']);  \n```  \n\n要取消设置*所有*会话变量——例如，当你要注销某个用户时——可以将\
    \ `$_SESSION` 超全局数组设置为空数组，如下所示：  \n\n```  \n$_SESSION = [];  \n```  \n\n**警告**\
    \  \n不要尝试使用 `unset($_SESSION)`。虽然它确实有效，但效果有点过于强大。它不仅会清除当前会话，还会阻止将来存储任何会话变量。  \n\
    \n## 销毁会话  \n\n单独取消设置所有会话变量可以有效防止任何信息被重用，但你还应像这样使会话 Cookie 失效：  \n\n```  \nif\
    \ (isset($_COOKIE[session_name()])) {  \n    setcookie(session_name(), \", time()-86400,\
    \ '/');  \n}  \n```  \n\n这使用了 `session_name()` 函数动态获取会话名称，并将会话 Cookie 重置为空字符串，并设置为在\
    \ 24 小时前过期（86400 是一天中的秒数）。最后一个参数（`'/'`）将 Cookie 应用于整个域名。  \n\n最后，使用以下命令关闭会话： \
    \ \n\n```  \nsession_destroy();  \n```  \n\n这个函数命名得并不恰当。它只是关闭会话。它不会销毁任何会话变量，也不会取消设置会话\
    \ Cookie。使会话 Cookie 失效并关闭会话以避免未经授权的人员访问网站的受限部分或会话期间交换的任何信息，这一点非常重要。然而，访问者可能会忘记注销，因此并非总能保证会话会正确关闭，这就是为什么不在会话变量中存储敏感信息如此重要的原因。\
    \  \n\n**注意**  \nPHP 7 不支持旧脚本中常见的 `session_register()` 或 `session_unregister()`。\
    \  \n\n## 重新生成会话 ID  \n\n当用户状态发生变化时（例如登录后），作为安全措施，建议重新生成会话 ID。这会更改标识会话的随机字母和数字字符串，但保留存储在会话变量中的所有信息。在\
    \ *Pro PHP Security, 2nd Edition* (Apress, 2010, ISBN 978-1-4302-3318-3) 一书中，Chris\
    \ Snyder 和 Michael Southwell 解释说：“生成新会话 ID 的目标是消除这样一种可能性（无论多么微小）：了解低级安全会话的攻击者可能能够执行高级安全任务。”\
    \  \n\n要重新生成会话 ID，只需调用 `session_regenerate_id()` 并将用户重定向到另一个页面或重新加载同一页面。  \n\n\
    ## “Headers already sent”错误\n"
- fmt: "# Using Sessions to Restrict Access\n\nAlthough using PHP sessions is very\
    \ easy, there’s one problem that causes beginners a great deal of head banging.\
    \ Instead of everything working the way you expect, you see the following message:\n\
    \n```\nWarning: Cannot add header information - headers already sent\n```\n\n\
    I’ve mentioned this problem several times before in conjunction with the `header()`\
    \ function. It affects `session_start()` and `setcookie()` as well. In the case\
    \ of `session_start()`, the solution is simple: make sure that you put it immediately\
    \ after the opening PHP tag (or very soon thereafter), and check that there’s\
    \ no whitespace before the opening tag.\n\nSometimes the problem occurs even if\
    \ there is no whitespace ahead of the PHP tag. This is usually caused by editing\
    \ software inserting the byte order mark (BOM) at the beginning of the script.\
    \ If this happens, open your script editor’s preferences and disable the use of\
    \ the BOM in PHP pages.\n\nWhen using `setcookie()` to destroy the session cookie,\
    \ however, it’s quite likely that you may need to send output to the browser before\
    \ calling the function. In this case, PHP lets you save the output in a buffer\
    \ using `ob_start()`. You then flush the buffer with `ob_end_flush()` after `setcookie()`\
    \ has done its job. You’ll see how to do this in PHP Solution 11-2.\n\n## Using\
    \ Sessions to Restrict Access\n\nThe first words that probably come to mind when\
    \ thinking about restricting access to a web site are “username” and “password.”\
    \ Although these generally unlock entry to a site, neither is essential to a session.\
    \ You can store any value as a session variable and use it to determine whether\
    \ to grant access to a page. For instance, you could create a variable called\
    \ `$_SESSION['status']` and give visitors access to different parts of the site\
    \ depending on its value, or no access at all if it hasn’t been set.\n\nA little\
    \ demonstration should make everything clear and will show you how sessions work\
    \ in practice.\n\n## PHP Solution 11-1: A Simple Session Example\n\nThis should\
    \ take only a few minutes to build, but you can also find the complete code in\
    \ `session_01.php`, `session_02.php`, and `session_03.php`, in the `ch11` folder.\n\
    \n1.  Create a page called `session_01.php` in a new folder called `sessions`\
    \ in the `phpsols-4e` site root. Insert a form with a text field called `name`\
    \ and a `Submit` button. Set the `method` to `post` and `action` to `session_02.php`.\
    \ The form should look like this:\n\n```\n<form method=\"post\" action=\"session_02.php\"\
    >\n  Enter your name: <input type=\"text\" name=\"name\" />\n  <input type=\"\
    submit\" name=\"submit\" value=\"Submit\" />\n</form>\n```\n\n2.  In another page\
    \ called `session_02.php`, insert this above the `DOCTYPE` declaration:\n\n```\n\
    <?php\nsession_start();\nif (isset($_POST['name'])) {\n  $_SESSION['name'] = $_POST['name'];\n\
    }\n?>\n```\n\nThe inline comments explain what’s going on. The session is started,\
    \ and as long as `$_POST['name']` isn’t empty, its value is assigned to `$_SESSION['name']`.\n\
    \n3.  Insert the following code between the `<body>` tags in `session_02.php`:\n\
    \n```\n<?php\nif (isset($_SESSION['name'])) {\n  echo 'Hi there, ' . htmlentities($_SESSION['name'])\
    \ . '. <a href=\"session_03.php\">Next</a>';\n} else {\n  // if not set, send\
    \ back to login\n  echo 'Who are you? Please <a href=\"session_01.php\">log in</a>';\n\
    }\n?>\n```\n\nIf `$_SESSION['name']` has been set, a welcome message is displayed\
    \ along with a link to `session_03.php`. Otherwise, the page tells the visitor\
    \ that it doesn’t recognize who’s trying to gain access and provides a link back\
    \ to the first page.\n\n### Caution\n\nTake care when typing the following line:\n\
    ```\necho 'Hi there, ' . htmlentities($_SESSION['name']) . '. <a href=\"session03.php\"\
    >Next</a>';\n```\nThe first two periods (surrounding `htmlentities($_SESSION['name'])`)\
    \ are the PHP concatenation operator. The third period (immediately after a single\
    \ quote) is an ordinary period that will be displayed as part of the string.\n\
    \n1.  Create `session_03.php`. Type the following above the `DOCTYPE` to initiate\
    \ the session:\n\n```\n<?php\nsession_start();\n?>\n```\n\n2.  Insert the following\
    \ code between the `<body>` tags of `session_03.php`:\n\n```\n<?php\nif (isset($_SESSION['name']))\
    \ {\n  echo 'Hi ' . htmlentities($_SESSION['name']) . '. See you next time.';\n\
    \  // unset session variable\n  unset($_SESSION['name']);\n  // invalidate the\
    \ session cookie\n  if (isset($_COOKIE[session_name()])) {\n    setcookie(session_name(),\
    \ '', time()-86400, '/');\n  }\n  // end session\n  session_destroy();\n  echo\
    \ '<a href=\"session_02.php\">Back to page 2</a>';\n} else {\n  // display if\
    \ not recognized\n  echo \"Sorry, I don't know you.\";\n  echo '<a href=\"session_01.php\"\
    >Please log in</a>';\n}\n?>\n```\n\nIf `$_SESSION['name']` has been set, the page\
    \ displays it, then unsets it and invalidates the current session cookie. By placing\
    \ `session_destroy()` at the end of the first code block, the session and its\
    \ associated variables cease to be available.\n\n3.  Load `session_01.php` into\
    \ a browser, type your name in the text field, and click Submit.\n\n4.  You should\
    \ see something like the following screenshot. At this stage, there is no apparent\
    \ difference between what happens here and in an ordinary form.\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figa_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Figa_HTML.jpg)\n\
    \n5.  When you click Next, the power of sessions begins to show. The page remembers\
    \ your name, even though the `$_POST` array is no longer available to it. In most\
    \ cases, you’ll probably see something similar to the following screenshot.\n\n\
    ![../images/332054_4_En_11_Chapter/332054_4_En_11_Figb_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Figb_HTML.jpg)\n\
    \nHowever, on some servers, you might get the following warning message that header\
    \ information cannot be modified because headers have already been sent.\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figc_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Figc_HTML.jpg)\n\
    \n### Note\n\nAs explained in Chapter 5, servers don’t produce the warning about\
    \ headers if they’re configured to buffer the first 4 KB of output. However, not\
    \ all servers buffer output, so it’s important to fix this problem.\n\n1.  Click\
    \ the link to page 2 (if you got an error message, it’s just below the message).\
    \ The session has been destroyed, so this time `session_02.php` has no idea who\
    \ you are.\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figd_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Figd_HTML.jpg)\n\
    \n2.  Type the address of `session_03.php` in the browser address bar and load\
    \ it. It, too, has no recollection of the session and displays an appropriate\
    \ message.\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fige_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Fige_HTML.jpg)\n\
    \nEven if you didn’t get the warning message in step 8, you need to prevent it\
    \ from happening when you deploy pages that rely on sessions to other servers.\
    \ The error message not only looks bad, but it also means `setcookie()` can’t\
    \ invalidate the session cookie. Even though `session_start()` comes immediately\
    \ after the opening PHP tag in `session_03.php`, the warning message is triggered\
    \ by the `DOCTYPE` declaration, the `<head>`, and other HTML being output before\
    \ `setcookie()`.\n\n## PHP Solution 11-2: Buffering the Output with `ob_start()`\n\
    \nAlthough you could put `setcookie()` in the PHP block above the `DOCTYPE` declaration,\
    \ you would also need to assign the value of `$_SESSION['name']` to an ordinary\
    \ variable, because it ceases to exist after the session is destroyed. Rather\
    \ than pull the whole script apart, the answer is to buffer the output with `ob_start()`.\n\
    \nContinue working with `session_03.php` from the previous section.\n\n1.  Amend\
    \ the PHP block above the `DOCTYPE` declaration like this:\n\n```\n<?php\nsession_start();\n\
    ob_start();\n?>\n```\n\nThis turns on output buffering and prevents output from\
    \ being sent to the browser until the end of the script or until you specifically\
    \ flush the output with `ob_end_flush()`.\n\n2.  Flush the output immediately\
    \ after invalidating the session cookie, like this:\n\n```\n<?php\nif (isset($_SESSION['name']))\
    \ {\n  echo 'Hi ' . htmlentities($_SESSION['name']) . '. See you next time.';\n\
    \  unset($_SESSION['name']);\n  if (isset($_COOKIE[session_name()])) {\n    setcookie(session_name(),\
    \ '', time()-86400, '/');\n  }\n  ob_end_flush();\n  session_destroy();\n  echo\
    \ '<a href=\"session_02.php\">Back to page 2</a>';\n} else {\n  echo \"Sorry,\
    \ I don't know you.\";\n  echo '<a href=\"session_01.php\">Please log in</a>';\n\
    }\n?>\n```"
