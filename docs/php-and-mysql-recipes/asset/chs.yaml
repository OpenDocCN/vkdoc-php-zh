  \ Were Here\n        )\n)\n```\n\n## 配方 16-5：更新数据\n\n### 问题\n\n向表中添加新记录或行并不是用户可能想要的唯一操作。我们如何创建一个能够更新表中一个或多个列的方法？\n\
  \n### 解决方案\n\n在 SQL 中，可以使用 `update` 语句来更新表中一行或多行的一个或多个列。\n\n与 `insert` 语句一样，`update`\
  \ 语句只针对单个表进行操作。如果需要更新多个表中的记录，则需要执行多个 `update` 语句。\n\n`update` 语句的结构以标识要更新的表开始，后跟一个逗号分隔的列名和值列表，最后是一个\
  \ `where` 子句，用于标识要更新的行。如果省略 `where` 子句，`update` 语句将更新表中的所有行。\n\n在 `where` 子句中指定主键是更新单条记录最简单的方法，但也可以使用其他值来标识要更新的行。\n\
  \n## 第 16 章 使用 MySQL 数据库\n\n### 实现原理\n\n以下代码部分是 `music` 类中一个名为 `updateAlbum()` 的方法示例。该方法接受两个参数。第一个参数是\
  \ `id` 列，用于标识要更新的行；第二个参数是一个值数组，类似于 `getAlbum()` 方法返回的值。\n\n```php\nfunction updateAlbum($id,\
  \ $data = []) {\n    $schema = [\n        \"id\" => \"int\",\n        \"title\"\
  \ => \"char\",\n        \"artist_id\" => \"int\",\n        \"description\" => \"\
  char\",\n    ];\n    $columns = [];\n    foreach($data as $k => $v) {\n        if\
  \ (array_key_exists($k, $schema)) {\n            if (is_null($v)) {\n          \
  \      $column[] = \"$k = NULL\";\n            }\n            else {\n         \
  \       switch($schema[$k]) {\n                    \"int\" :\n                 \
  \       $column[] = \"$k = \" . (int)$v;\n                        break;\n     \
  \               \"char\" :\n                        $column[] = \"$k = '\" . $this->real_escape_string($v)\
  \ .\"'\"; break;\n                }\n            }\n        }\n    }\n    if (sizeof($columns))\
  \ {\n        $sql = \"update album set \" . implode(\", \", $columns) .\n      \
  \      \" where id = $id;\";\n        $this->Query($sql);\n    }\n}\n```\n\n该函数包含一个模式定义，用于验证\
  \ `$data` 变量的内容。\n\n任何在 `$schema` 定义中找不到的值都将被忽略。这将消除用户尝试更新不存在的列时可能产生的 SQL 错误。模式还定义了列的类型，使代码能够执行正确的类型转换。\n\
  \n模式定义不包含列长度或其他可用于额外验证的限制。可以轻松地将这些作为模式定义中的附加参数添加。\n\n通过添加一个包含表名和模式定义参数的私有方法，可以使此函数更具通用性。然后可以使用此方法为\
  \ `album` 和 `artist` 表添加更新方法。\n\n## 第 16 章 使用 MySQL 数据库\n\n这两个表都使用相同类型的主键。在这两种情况下，主键都是一个自动递增的整数值。使用不包含任何实际信息的私有键始终是一个好主意，特别是当主键被用作外键引用时。更改此类键的值将需要更改所有引用它的表中的值。如果键不包含任何实际信息，则永远没有理由更改它。\n\
  \n```php\nprivate function updateRow($table, $schema, $id, $data) {\n    $columns\
  \ = [];\n    foreach($data as $k => $v) {\n        if (array_key_exists($k, $schema))\
  \ {\n            if (is_null($v)) {\n                $column[] = \"$k = NULL\";\n\
  \            }\n            else {\n                switch($schema[$k]) {\n    \
  \                \"int\" :\n                        $column[] = \"$k = \" . (int)$v;\n\
  \                        break;\n                    \"char\" :\n              \
  \          $column[] = \"$k = '\" . $this->real_escape_string($v) .\"'\"; break;\n\
  \                }\n            }\n        }\n    }\n    if (sizeof($columns)) {\n\
  \        $sql = \"update $table set \" . implode(\", \", $columns) .\n         \
  \   \" where id = $id;\";\n        $this->Query($sql);\n    }\n}\n\nfunction updateAlbum($id,\
  \ $data = []) {\n    $schema = [\n        \"id\" => \"int\",\n        \"title\"\
  \ => \"char\",\n        \"artist_id\" => \"int\",\n        \"description\" => \"\
  char\",\n    ];\n    $this->update(\"album\", $schema, $id, $data);\n}\n\nfunction\
  \ updateArtist($id, $data = []) {\n    $schema = [\n        \"id\" => \"int\",\n\
  \        \"artist_name\" => \"char\",\n        \"description\" => \"char\",\n  \
  \  ];\n    $this->update(\"artist\", $schema, $id, $data);\n}\n```\n\n## 第 16 章\
  \ 使用 MySQL 数据库\n\n## 配方 16-6：删除数据\n\n### 问题\n\n下一个问题是如何清除表中/数据库中不再需要的数据？\n\n###\
  \ 解决方案\n\n解决方案是使用 SQL 的 `delete` 语句。该语句以 `delete from table` 开头，并带有一个可选的 `where`\
  \ 子句，用于指定要删除的确切行。如果不包含 `where` 子句，指定表中的所有行都将被删除。\n\n\n\n如果其他表的外键关联到正在被删除的任意行，该查询将会失败，因为外键关系将不再指向有效的行。这可以通过更新其他表中与被删除行相关的所有行来解决，使它们不再指向这些行——如果这些行需要保留在数据库中的话。如果这些行也应该被删除，则可以告诉数据库删除被选中的行，以及其他表中指向这些被删除行的所有行。在`delete`查询末尾添加关键字`cascade`即可实现此操作。\n\
  \n用于删除`album`表中所有行的 SQL 语句如下：`delete from album;`\n\n用于删除属于特定艺人的所有行的语句如下：`delete\
  \ from album where artist_id = 2;`\n\n如果艺人的`Id`未知，可以通过编写子查询来查找：`delete from album\
  \ where artist_id in (select id from artist where artist_name='Pink Floyd');`这里的`where`子句使用了关键字`in`而不是`=`。如果子查询返回多行，这将非常有用。这将确保删除与子查询返回的任何`id`匹配的所有行。如果子查询返回多行并且主查询使用了`=`字符，SQL\
  \ 查询将失败并抛出基数异常（cardinal exception）。这表明`artist_id`不能等于多个值，但它可以存在于多个值的列表中。\n\n###\
  \ 工作原理\n\n与上一节中的`update`示例类似，我们现在可以编写`delete`函数。第一个函数将是一个私有成员函数，能够根据提供的表名和`id`从任何表中删除数据。另外两个函数将是公共成员函数，用于删除特定的`id`。\n\
  \n```\nprivate function deleteRow($table, $id) {\n  $sql = \"delete from $table\
  \ where id = \" . (int)$id . \";\";\n  $this->Query($sql);\n}\n```\n\n```\nfunction\
  \ deleteArtist($id) {\n  $sql = \"update album set artist_id=NULL where id = \"\
  \ . (int)$id . \";\";\n  $this->Query($sql);\n  $this->deleteRow(\"artist\", $id);\n\
  }\n```\n\n```\nfunction deleteAlbum($id) {\n  $this->deleteRow(\"album\", $id);\n\
  }\n```\n\n在`deleteArtist()`函数中，有一个额外的语句用来删除所有指向被删除行的约束。\n\n现在可以将包含插入、更新和删除函数的整个类合并为一个。\n\
  \n```\n<?php\n// 16_9.php\nclass music extends mysqli {\n  private $schema = [\n\
  \    'artist' => [\n      'id' => 'int',\n      'artist_name' => 'char',\n     \
  \ 'description' => 'char',\n    ],\n    'album' => [\n      'id' => 'int',\n   \
  \   'title' => 'char',\n      'artist_id' => 'int',\n      'description' => 'char',\n\
  \    ]\n  ];\n\n  function __construct() {\n    parent::__construct('127.0.0.1',\
  \ 'php', 'secret', 'music');\n    if ($this->connect_error) {\n      die(\"Unable\
  \ to connect to music\\n\");\n    }\n  }\n\n  function insertRow($table, $schema,\
  \ $data = []) {\n    $columns = [];\n    $values = [];\n    foreach($data as $k\
  \ => $v) {\n      if (array_key_exists($k, $schema)) {\n        $columns[] = $k;\n\
  \        if (is_null($v)) {\n          $values[] = \"NULL\";\n        }\n      \
  \  else {\n          switch($schema[$k]) {\n            case 'int' :\n         \
  \     $values[] = (int)$v;\n              break;\n            case 'char' :\n  \
  \            $values[] = \"'\" . $this->real_escape_string($v) . \"'\";\n      \
  \        break;\n          }\n        }\n      }\n    }\n    if (sizeof($columns))\
  \ {\n      $sql = \"insert into $table (\" . implode(\", \", $columns) . \") values\
  \ (\" .\n        implode(\", \", $values) . \");\";\n      $this->Query($sql);\n\
  \      return $this->insert_id;\n    }\n    else {\n      return false;\n    }\n\
  \  }\n\n  function addArtist($name, $description = null) {\n    return $this->insertRow(\n\
  \      'artist', $this->schema['artist'], [\n        'artist_name' => $name,\n \
  \       'description' => $description\n      ]\n    );\n  }\n\n  function addAlbum($title,\
  \ $artist_id, $description = null) {\n    return $this->insertRow(\n      'album',\
  \ $this->schema['album'], [\n        'title' => $title,\n        'artist_id' =>\
  \ $artist_id,\n        'description' => $description\n      ]\n    );\n  }\n\n \
  \ private function updateRow($table, $schema, $id, $data) {\n    $columns = [];\n\
  \    foreach($data as $k => $v) {\n      if (array_key_exists($k, $schema)) {\n\
