  \ 'ListPrice'))\n            $new_result[$k]['price'] =\n                (string)\
  \ $temp->ItemAttributes->ListPrice->FormattedPrice;\n        else\n            $new_result[$k]['price']\
  \ = '';\n\n        $k++;\n    }\n\n    return $new_result;\n}\n```\n\n## 工作原理：与\
  \ ECS 通信\n\nAmazon 业务层中唯一公开的方法是 `GetProducts()`，它负责检索数据。其功能非常清晰，通过调用多个辅助方法来完成任务。首先，它根据您在\
  \ `include/config.php` 中添加的配置设置，决定使用 SOAP 还是 REST。\n\n您在 `include/config.php` 中定义的\
  \ `AMAZON_METHOD` 常量指示了将通过 REST 还是 SOAP 与 ECS 通信。该常量的值（应为 `REST` 或 `SOAP`）决定了将使用\
  \ `GetDataWithRest()` 还是 `GetDataWithSoap()` 来联系 Amazon。无论您选择哪种方法，结果应该相同：\n\n```\n\
  // 检索 Amazon 商品，发送到表示层\npublic function GetProducts()\n{\n    // 使用 SOAP 获取数据\n\
  \    if (AMAZON_METHOD == 'SOAP')\n        $result = $this->GetDataWithSoap();\n\
  \    // 使用 REST 获取数据\n    else\n        $result = $this->GetDataWithRest();\n\n\
  \    // 初始化数组对象\n    $results = array ();\n    // 格式化结果\n    $results = $this->DataFormat($result);\n\
  \    // 返回结果\n    return $results;\n}\n```\n\n`GetDataWithSoap()` 和 `GetDataWithRest()`\
  \ 将商品列表以对象形式返回。然后，我们使用 `DataFormat()` 方法解析该对象中的数据，并以关联数组的形式返回数据。\n\n`DataFormat()`\
  \ 方法还会为没有商品图片的 Amazon 商品设置\"无图片可用\"占位图。\n\n现在让我们来看看 `GetAmazonDataWithRest()` 和\
  \ `GetAmazonDataWithSoap()` 这两个方法，它们负责与 ECS 进行实际通信。`GetAmazonDataWithRest()` 使用\
  \ REST 检索 Web 服务数据。它首先通过拼接要发送给 Amazon 的各个参数来构建所需的查询字符串：\n\n```\n// 使用 REST 调用 ECS\n\
  ```\n\n\n### 排版后内容\n\n`private function GetDataWithRest()`\n\n`{`\n\n`$params =\
  \ array ('Operation' => 'ItemSearch',`\n\n`'SubscriptionId' => AMAZON_ACCESS_KEY_ID,`\n\
  \n`'Keywords' => AMAZON_SEARCH_KEYWORDS,`\n\n`'SearchIndex' => AMAZON_SEARCH_NODE,`\n\
  \n`'ResponseGroup' => AMAZON_RESPONSE_GROUPS,`\n\n`'Sort' => 'salesrank');`\n\n\
  `$query_string = '&';`\n\n`foreach ($params as $key => $ value)`\n\n`$query_string\
  \ .= $key . '=' . urlencode($value) . '&';` \n\n完整的 Amazon URL 由基础 URL（你已保存为 `include/config.php`\
  \ 中的常量）和刚刚构建的查询字符串组成：`$amazon_url = AMAZON_REST_BASE_URL . $query_string;`\n\n使用\
  \ `file_get_contents()` 函数，你可以向 Amazon 发起一个简单的 HTTP GET 请求，就像在浏览器中输入地址一样：\n\n```\n\
  // 使用 REST 获取 XML 响应\n$amazon_xml = file_get_contents($amazon_url);\n```\n\n`$amazon_xml`\
  \ 变量将包含一个字符串，其中是返回的 XML 数据。为了进一步处理，我们使用 `simplexml_load_string()` 函数来解析 XML 文本并返回一个代表\
  \ XML 文档的 `SimpleXMLElement` 对象。更多详情请参见 `http://www.php.net/manual/en/function.simplexml-load-string.php`。\n\
  \n```\n// 反序列化 XML 并返回\nreturn simplexml_load_string($amazon_xml);\n}\n```\n\n`GetAmazonDataWithSoap()`\
  \ 方法与 `GetAmazonDataWithRest()` 功能相似，但它是使用 SOAP 进行 `ItemSearch` 操作。该方法与 ECS 通信的逻辑与本章前面编写的页面相同。\n\
