    confirm that it has been sent live. The setstatusAction() method will also allow
    the user to send a live post back to draft or to delete blog posts. A confirmation
    message will be shown after a post is deleted, except the user will be redirected
    to indexAction() (since the post will no longer exist, and they cannot be redirected
