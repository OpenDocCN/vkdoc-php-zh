    \ {\n// 代码写在这里\n}\n函数名(参数, 参数, …);\n// 函数执行完成后的下一条语句\n```\n\n上面展示了函数的一般格式。`function`\
    \ 关键字是小写的。你为函数提供的名称使用与变量几乎相同的格式，只是不包含 `$`。变量或值可以作为参数在括号中传递给函数。所有代码都放在花括号 `{}`\
    \ 之间。使用函数名并传递任何必需的属性来调用函数。当函数被调用时，程序的执行会跳转到该函数。在所有代码执行完毕后，程序流程会跳转到调用函数之后的那条指令。\n\
    \n让我们看一些例子。\n\n### F-1\n\n```\n输出：Hello\n原因：没有值传入函数。但是，print 语句被执行了。\n该函数也可以放置在代码的底部。但是，要保持一致性。要么将你的函数放在代码的顶部，要么放在代码的底部。函数也可以包含在一个单独的文件中，然后将其导入到主\
    \ PHP 程序中。我们很快就会看到这个例子。\n```\n\n### F-2\n\n```\n输出：Hello\n原因：这个示例完成了相同的任务。但是，它允许用户传入要显示的值，从而提供了一些灵活性。请注意，在调用函数时，字符串是在括号内传递的。该字符串会落入变量\
