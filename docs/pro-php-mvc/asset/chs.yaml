  , \"未提供名\");\n                $error = true;\n            }\n\n            if (empty($last))\n\
  \            {\n                $view->set(\"last_error\", \"未提供姓\");\n        \
  \        $error = true;\n            }\n\n            if (empty($email))\n     \
  \       {\n                $view->set(\"email_error\", \"未提供邮箱\");\n           \
  \     $error = true;\n            }\n\n            if (empty($password))\n     \
  \       {\n                $view->set(\"password_error\", \"未提供密码\");\n        \
  \        $error = true;\n            }\n\n            if (!$error)\n           \
  \ {\n                $user = new User(array(\n                    \"first\" => $first,\n\
  \                    \"last\" => $last,\n                    \"email\" => $email,\n\
  \                    \"password\" => $password\n                ));\n          \
