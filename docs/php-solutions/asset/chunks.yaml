- fmt: "### Registering new users\n\nThe `AES_ENCRYPT()` function takes two arguments:\
    \ the value to be encrypted and an encryption key. The encryption key can be any\
    \ string of characters you choose. For the purposes of this example, I have chosen\
    \ `takeThisWith@PinchOfSalt`, but a random series of alphanumeric characters and\
    \ symbols would be more secure.\n\nThe basic registration scripts for one-way\
    \ and two-way encryption are the same. The only difference lies in the section\
    \ that inserts the user’s data into the database.\n\n> **Tip**  \n> The following\
    \ scripts embed the encryption key directly in the page. If you have a private\
    \ folder outside the server root, it’s a good idea to define the key in an include\
    \ file and store it in your private folder.\n\nThe code for MySQLi looks like\
    \ this (the full listing is in `register_2way_mysqli.php` in the `ch17` folder):\n\
    \n```\nif (!$errors) {\n\n// include the connection file\nrequire_once 'connection.php';\n\
    $conn = dbConnect('write');\n\n// create a key\n$key = 'takeThisWith@PinchOfSalt';\n\
    \n// prepare SQL statement\n$sql = 'INSERT INTO users_2way (username, pwd)\nVALUES\
    \ (?, AES_ENCRYPT(?, ?))';\n$stmt = $conn->stmt_init();\nif ($stmt = $conn->prepare($sql))\
    \ {\n\n// bind parameters and insert the details into the database\n$stmt->bind_param('sss',\
    \ $username, $password, $key);\n$stmt->execute();\n}\n\nif ($stmt->affected_rows\
    \ == 1) {\n$success = \"$username has been registered. You may now log in.\";\n\
    } elseif ($stmt->errno == 1062) {\n$errors[] = \"$username is already in use.\
    \ Please choose another username.\";\n} else {\n$errors[] = $stmt->error;\n}\n\
    \n}\n```\n\nFor PDO, it looks like this (see `register_2way_pdo.php` in the `ch17`\
    \ folder for the full listing):\n\n```\nif (!$errors) {\n\n// include the connection\
    \ file\nrequire_once 'connection.php';\n$conn = dbConnect('write', 'pdo');\n\n\
    // create a key\n$key = 'takeThisWith@PinchOfSalt';\n\n// prepare SQL statement\n\
    $sql = 'INSERT INTO users_2way (username, pwd)\nVALUES (:username, AES_ENCRYPT(:pwd,\
    \ :key))';\n$stmt = $conn->prepare($sql);\n\n// bind parameters and insert the\
    \ details into the database\n$stmt->bindParam(':username', $username, PDO::PARAM_STR);\n\
    $stmt->bindParam(':pwd', $password, PDO::PARAM_STR);\n$stmt->bindParam(':key',\
    \ $key, PDO::PARAM_STR);\n$stmt->execute();\n\nif ($stmt->rowCount() == 1) {\n\
    $success = \"$username has been registered. You may now log in.\";\n} elseif ($stmt->errorCode()\
    \ == 23000) {\n$errors[] = \"$username is already in use. Please choose another\
    \ username.\";\n} else {\n$errors[] = 'Sorry, there was a problem with the database.';\n\
    }\n\n}\n```\n\nStrictly speaking, it’s not necessary to use a bound parameter\
    \ for `$key` because it doesn’t come from user input. If you embed it directly\
    \ in the query, however, the whole query needs to be wrapped in double quotes,\
    \ and `$key` needs to be in single quotes.\n\nTo test the preceding scripts, just\
    \ include them in `register_db.php` instead of `register_db_mysqli.php` or `register_db_pdo.php`.\n\
    \n### User authentication with two-way encryption\n\nCreating a login page with\
    \ two-way encryption is very simple. After connecting to the database, you incorporate\
    \ the username, secret key, and unencrypted password in the `WHERE` clause of\
    \ a `SELECT` query. If the query finds a match, the user is allowed into the restricted\
    \ part of the site. If there’s no match, the login is rejected. The code is the\
    \ same as in PHP Solution 17-2, except for the following section.\n\nFor MySQLi,\
    \ it looks like this (see `authenticate_2way_mysqli.php`):\n\n```\n<?php\nrequire_once\
    \ 'connection.php';\n$conn = dbConnect('read');\n\n// create key\n$key = 'takeThisWith@PinchOfSalt';\n\
    \n$sql = 'SELECT username FROM users_2way\nWHERE username = ? AND pwd = AES_ENCRYPT(?,\
    \ ?)';\n\n// initialize and prepare statement\n$stmt = $conn->stmt_init();\n$stmt->prepare($sql);\n\
    \n// bind the input parameters\n$stmt->bind_param('sss', $username, $password,\
    \ $key);\n$stmt->execute();\n\n// to get the number of matches, you must store\
    \ the result\n$stmt->store_result();\n\n// if a match is found, num_rows is 1,\
    \ which is treated as true\nif ($stmt->num_rows) {\n$_SESSION['authenticated']\
    \ = 'Jethro Tull';\n// get the time the session started\n$_SESSION['start'] =\
    \ time();\nsession_regenerate_id();\nheader(\"Location: $redirect\"); exit;\n\
    } else {\n// if not verified, prepare error message\n$error = 'Invalid username\
    \ or password';\n}\n```\n\nNote that you need to store the result of the prepared\
    \ statement before you can access the `num_rows` property. If you fail to do this,\
    \ `num_rows` will always be `0`, and the login will fail even if the username\
    \ and password are correct.\n\nThe revised code for PDO looks like this (see `authenticate_2way_pdo.inc.php`):\n\
    \n```\n<?php\nrequire_once 'connection.php';\n$conn = dbConnect('read', 'pdo');\n\
    \n// create key\n$key = 'takeThisWith@PinchOfSalt';\n\n$sql = 'SELECT username\
    \ FROM users_2way\nWHERE username = ? AND pwd = AES_ENCRYPT(?, ?)';\n\n// prepare\
    \ statement\n$stmt = $conn->prepare($sql);\n\n// bind variables by passing them\
    \ as an array when executing statement\n$stmt->execute([$username, $password,\
    \ $key]);\n\n// if a match is found, rowCount() produces 1, which is treated as\
    \ true\nif ($stmt->rowCount()) {\n$_SESSION['authenticated'] = 'Jethro Tull';\n\
    // get the time the session started\n$_SESSION['start'] = time();\nsession_regenerate_id();\n\
    header(\"Location: $redirect\"); exit;\n} else {\n// if not verified, prepare\
    \ error message\n$error = 'Invalid username or password';\n}\n```\n\nTo test these\
    \ scripts, use them in place of `authenticate_mysqli.php` and `authenticate_pdo.php`.\n\
    \n### Decrypting a password\n\nDecrypting a password that uses two-way encryption\
    \ simply involves passing the secret key as the second argument to `AES_DECRYPT()`\
    \ in a prepared statement, like this:\n\n```\n$key = 'takeThisWith@PinchOfSalt';\n\
    $sql = \"SELECT AES_DECRYPT(pwd, '$key') AS pwd FROM users_2way\nWHERE username\
    \ = ?\";\n```\n\nThe key must be exactly the same as the one originally used to\
    \ encrypt the password. If you lose the key, the passwords remain as inaccessible\
    \ as those stored using one-way encryption.\n\nNormally, the only time you need\
    \ to decrypt a password is when a user requests a password reminder. Creating\
    \ the appropriate security policy for sending out such reminders depends a great\
    \ deal on the type of site that you're operating. However, it goes without saying\
    \ that you shouldn’t display the decrypted password onscreen. You need to set\
    \ up a series of security checks, such as asking for the user’s date of birth\
    \ or mother’s maiden name, or posing a question whose answer only the user is\
    \ likely to know. Even if the user gets the answer right, you should send the\
    \ password by email to the user’s registered address.\n\nAll the necessary knowledge\
    \ should be at your fingertips if you have succeeded in getting this far in this\
    \ book.\n\n## Updating User Details\n\nI haven’t included any update forms for\
    \ the user registration pages. It’s a task that you should be able to accomplish\
    \ by yourself at this stage. The most important point about updating user registration\
    \ details is that you should not display the user’s existing password in the update\
    \ form. If you’re using one-way encryption, you can’t, anyway."
