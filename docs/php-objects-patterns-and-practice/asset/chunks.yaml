- fmt: '### Method Invocation


    You have already encountered an example in which I used a string to invoke a method
    dynamically:


    ```

    $product = getProduct();   // acquire an object

    $method = "getTitle";      // define a method name

    print $product->$method(); // invoke the method

    ```


    PHP also provides the `call_user_func()` method to achieve the same end. `call_user_func()`
    can invoke either methods or functions. To invoke a function, it requires a single
    string as its first argument:


    ```

    $returnVal = call_user_func("myFunction");

    ```


    To invoke a method, it requires an array. The first element of this should be
    an object, and the second should be the name of the method to invoke:


    ```

    $returnVal = call_user_func([$myObj, "methodName"]);

    ```


    You can pass any arguments that the target method or function requires in additional
    arguments to `call_user_func()`, like this:


    ```

    // listing 05.31

    $product = self::getBookProduct(); // Acquire a BookProduct object

    call_user_func([$product, ''setDiscount''], 20);

    ```


    This dynamic call is, of course, equivalent to this:


    ```

    $product->setDiscount(20);

    ```


    The `call_user_func()` method won''t change your life greatly because you can
    equally use a string directly in place of the method name, like this:


    ```

    $method = "setDiscount";

    $product->$method(20);

    ```


    Much more impressive, though, is the related `call_user_func_array()` function.
    This operates in the same way as `call_user_func()`, as far as selecting the target
    method or function is concerned. Crucially, though, it accepts any arguments required
    by the target method as an array.


    Note


    Beware—arguments passed to a function or method using `call_user_func()` are not
    passed by reference.


    So why is this useful? Occasionally you are given arguments in array form. Unless
    you know in advance the number of arguments you are dealing with, it can be difficult
    to pass them on. In Chapter [4](#A314621_5_En_4_Chapter.html), I looked at the
    interceptor methods that can be used to create delegator classes. Here''s a simple
    example of a `__call()` method:


    ```

    // listing 05.32

    public function __call($method, $args)

    {

    if (method_exists($this->thirdpartyShop, $method)) {

    return $this->thirdpartyShop->$method();

    }

    }

    ```


    As you have seen, the `__call()` method is invoked when an undefined method is
    called by client code. In this example, I maintain an object in a property called
    `$thirdpartyShop`. If I find a method in the stored object that matches the `$method`
    argument, I invoke it. I blithely assume that the target method does not require
    any arguments, which is where my problems begin. When I write the `__call()` method,
    I have no way of telling how large the `$args` array may be from invocation to
    invocation. If I pass `$args` directly to the delegate method, I will pass a single
    array argument, and not the separate arguments it may be expecting. `call_user_func_array()`
    solves the problem perfectly:


    ```

    // listing 05.33

    public function __call($method, $args)

    {

    if (method_exists($this->thirdpartyShop, $method)) {

    return call_user_func_array(

    [

    $this->thirdpartyShop,

    $method

    ],

    $args

    );

    }

    }

    ```


    ## The Reflection API


    PHP''s Reflection API is to PHP what the `java.lang.reflect` package is to Java.
    It consists of built-in classes for analyzing properties, methods, and classes.
    It''s similar in some respects to existing object functions, such as `get_class_vars()`,
    but is more flexible and provides much greater detail. It''s also designed to
    work with PHP''s object-oriented features, such as access control, interfaces,
    and abstract classes, in a way that the older, more limited class functions are
    not.


    ### Getting Started


    The Reflection API can be used to examine more than just classes. For example,
    the `ReflectionFunction` class provides information about a given function, and
    `ReflectionExtension` yields insight about an extension compiled into the language.
    Table [5-1](#A314621_5_En_5_Chapter.html#Tab1) lists some of the classes in the
    API.


    Table 5-1. Some of the Classes in the Reflection API


    | Class | Description |

    | --- | --- |

    | `Reflection` | Provides a static `export()` method for summarizing class information
    |

    | `ReflectionClass` | Class information and tools |

    | `ReflectionMethod` | Class method information and tools |

    | `ReflectionParameter` | Method argument information |

    | `ReflectionProperty` | Class property information |

    | `ReflectionFunction` | Function information and tools |

    | `ReflectionExtension` | PHP extension information |

    | `ReflectionException` | An error class |

    | `ReflectionZendExtension` | PHP Zend extension information |


    Between them, the classes in the Reflection API provide unprecedented runtime
    access to information about the objects, functions, and extensions in your scripts.


    The Reflection API''s power and reach mean you should usually use it in preference
    to the class and object functions. You will soon find it indispensable as a tool
    for testing classes. You might want to generate class diagrams or documentation,
    for example, or you might want to save object information to a database, examining
    an object''s accessor (getter and setter) methods to extract field names. Building
    a framework that invokes methods in module classes according to a naming scheme
    is another use of Reflection.'
