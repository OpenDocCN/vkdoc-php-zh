    Because it relies on the functionality you’ve already included in the DatabaseHandler
    class and in the database functions in place, the code in Catalog is very simple
    and straightforward. The GetDepartments method will be called from the presentation
    tier, which will display the returned data to the visitor. It starts by preparing
    the SQL query (you learned earlier about the advantages of preparing SQL statements),
    and then calling the appropriate DatabaseHandler method to execute the query.
    In this case, we’re calling GetAll to retrieve the list of departments.


    Right now, the database connection is opened when index.php starts processing
    and is closed at the end. All database operations that happen in one iteration
    of this file will be done through this connection.


    **Displaying the List of Departments**


    Now that everything is in place in the other tiers, all you have to do is create
    the presentation tier part—this is the final goal that we’ve been aiming toward
    from the beginning. As shown at the beginning of this chapter, the departments
