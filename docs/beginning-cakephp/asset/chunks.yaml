    **198**


    C H A P T E R 1 1 ■ C O M P O N E N T S A N D U T I L I T I E S


    HTML templates can behave just like other views in Cake and may draw upon images
    stored on the web site; remember to use absolute URLs for any graphics because
    the user’s e-mail client won’t be able to pull relative paths when opening the
    e-mail.


    **Other Components**


    Cake’s built-in components certainly cut down on the amount of code needed to
    run common web application methods. Not only does it include the components discussed
    earlier, but it also includes others that are more advanced: the ACL (which stands
    for “access control list”), RequestHandler, and Security components.


    ACL


    One of the most complicated methods for building web applications is access control
    for multiple users. The Auth component takes care of simple authentication, but
    what if you wanted to have multiple layers for users and their access levels?
    Or, better yet, what about dynamically altering a user’s privileges across the
    site? This more complex system for assigning areas for the user requires access
    control lists that outline a tree or matrix of who gets access to what areas in
    the site. The ACL component simplifies this type of user management with an assortment
    of functions and methods.


    RequestHandler


    This component helps with managing HTTP requests and obtaining more client-side
    information. Features such as SSL detection, reading the type of HTTP request,
    and responding with a unique MIME type give the RequestHandler a lot of power
    for making your web application accessible to more than one type of user. For
    instance, web services can be managed with the RequestHandler, which allows for
    other web sites to access information and talk to your application. The RequestHandler
    can also output information as a MIME type other than text/html, which allows
    your application to even work in nonbrowser client applications.


