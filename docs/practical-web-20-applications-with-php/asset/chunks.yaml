    The zoomAndCenterMap() Function


    As explained earlier, to initialize the map, we need to set its center; however,
    since each blog post can have multiple points, we want to make all points visible.
    Rather than showing a map of the entire world, we want to zoom the map as far
    in as possible (while still showing all points), since that will make it easier
    to see each point.


    To do this, we implement the zoomAndCenterMap() function, which determines the
    centermost point of the map based on the locations that have been added. Additionally,
    it determines the highest possible zoom level that can be used while still showing
    all of the added locations.


    This function works by first calculating a rectangle that surrounds all points
    (also called a *bounding box*). The Google Maps API provides a class called google.maps.LatLngBounds,
    which does exactly this. When instantiated, the bounding box is essentially empty
    since we haven’t added any coordinates to it. To do so, we call the extend() function
    on the bounding box, which automatically extends it based on the point passed
    to extend() (an instance of google.maps.LatLng).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch13CMP3 11/15/07 8:20 AM Page 498


    **498**


    C H A P T E R 1 3 ■ I N T E G R AT I N G G O O G L E M A P S


    Next we check whether the bounding box is empty (like it will be if no locations
    have been added to the blog post yet). In this instance, we simply hard-code coordinates
    and set a zoom level of 1\. This effectively displays a map of the whole earth.
    The specific coordinates don’t really matter at this zoom level, so we just use
    0,0.


    In the case where the bounding box is not empty (that is, where there is at least
    one point on the map), we call the getBoundsZoomLevel() function on the map object,
    passing the bounding box as its only argument. This function returns the highest
    possible zoom level that includes the entire box. Because we run the risk of points
    hiding behind map controls (since they are in the corners), we decrease the zoom
    level by 1 as a small buffer.


    Finally, we call setCenter() on the map object to reposition it at the center
    of the bounding box (retrieved by calling getCenter()) and the zoom level we just
    calculated. Listing 13-31


    shows the code for zoomAndCenterMap(). We make several calls to this function,
    because it is a handy reset function to give the user a complete overview of the
    current state of the map locations.


    **Listing 13-31.** *Automatically Recentering the Map Based on Added Locations*
    *(BlogLocationManager.class.js)*


    zoomAndCenterMap : function()


    {


    var bounds = new google.maps.LatLngBounds();


    this.markers.each(function(pair) {


    bounds.extend(pair.value.getPoint());


    });


    if (bounds.isEmpty()) {


    this.map.setCenter(new google.maps.LatLng(0, 0),


    1,


    G_HYBRID_MAP);


    }


    else {


    var zoom = Math.max(1, this.map.getBoundsZoomLevel(bounds) - 1);


    this.map.setCenter(bounds.getCenter(), zoom);


    }


    },


