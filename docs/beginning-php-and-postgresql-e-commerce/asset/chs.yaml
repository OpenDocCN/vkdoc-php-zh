  \n648XCH14.qxd 11/17/06 3:47 PM Page 504\n\n## 本章小结\n\n在本章中，您在完成 HatShop 电子商务应用程序的道路上取得了巨大进展。现在，您已经为应用程序构建了一个经过全面审计、安全的骨架。\n\
