    Notice on line 6 of Listing 14-15 how the Tree behavior function children() is
    being used like any other model function. If the $actsAs property were not set
    to Tree in the Tag model, then this line would break; or, at least, the model
    would search for a custom function in app/


    models/tag.php named children(). But because the Tree behavior has been applied
    to the current Tag model, all of its functions are accessible in the controller
    by referencing the model, as in line 6 of Listing 14-15.


    Let me explain the children() function. This function is how the Tree behavior
    performs the find request described earlier to return child nodes for a given
    record.


    **children( &$model, id[mixed], direct[bool], fields[mixed], order[string],**
    ➥


    **limit[int], page[int], recursive[int] )**


    id: The ID of the parent node record.


    direct = false: Whether to return only the direct, or all, children. When set
    to true, returns only the direct child nodes, not child nodes of children also;
    when set to false, will return any and all child nodes of current parent.


    fields = null: Either a single string of a field name or an array of field names;
    used to limit the returned fields from the find query.


    order = null: SQL order conditions, for example, name DESC; defaults to the order
    in the tree.


    limit = null: Used for calculating the number of items per page of data; entered
    as an SQL LIMIT clause.


    page = 1: The page number; used for accessing paged data.


    recursive = -1: When fetching associated records, used to specify the number of
    levels deep to be returned; corresponds to the recursive parameter used in model
    functions like find() and read().


    On line 6 of Listing 14-15, the children() function is invoked using the id and
    recursive parameters. By entering null values for the other parameters in between,
    I’ve told the Tree behavior to stick with its defaults otherwise. Without changing
    the recursive parameter, the function would have provided the controller only
    with an array of child tags, not an array of those tags *and* their associated
    posts. So, you can see that line 6 sets the recursive value to 1


    rather than the default value of -1.


