- fmt: "So, now that you know the data you want to store, let’s think about how the\
    \ three parts relate to each other. Apart from knowing that the records of two\
    \ tables are related *somehow*, you also need to know *the kind of relationship*\
    \ between them. Let’s now take a closer look at the different ways in which two\
    \ tables can be related.\n\n## Relational Data and Table Relationships\n\nTo continue\
    \ exploring the world of relational databases, let’s further analyze the three\
    \ logical tables we’ve been looking at so far. To make life easier, let’s give\
    \ them names now: the table containing products is `product`, the table containing\
    \ categories is `category`, and the last one is our old friend, `department`.\
    \ No surprises here! Luckily, these tables implement the most common kinds of\
    \ relationships that exist between tables, the **One-to-Many** and **Many-to-Many**\
    \ relationships, so you have the chance to learn about them.\n\n> **Note:** Some\
    \ variations of these two relationship types exist, as well as the less popular\
    \ One-to-One relationship. In the One-to-One relationship, each row in one table\
    \ matches exactly one row in the other.\n>\n> For example, in a database that\
    \ allowed patients to be assigned to beds, you would hope that there would be\
    \ a One-to-One relationship between patients and beds! Database systems don’t\
    \ support enforcing this kind of relationship because you would have to add matching\
    \ records in both tables at the same time.\n>\n> Moreover, two tables with a One-to-One\
    \ relationship can be joined to form a single table.\n\n## One-to-Many Relationships\n\
    \nThe One-to-Many relationship happens when one record in a table can be associated\
    \ with multiple records in the related table but not vice versa. In our case,\
    \ this happens for the `department` – `category` relation. A specific department\
    \ can contain any number of categories, but each category belongs to *exactly\
    \ one* department. Figure 4-2 better represents the One-to-Many relationship between\
    \ departments and categories.\n\nAnother common scenario in which you see the\
    \ One-to-Many relationship is with the `order` – `order_details` tables, where\
    \ `order` contains general details about the order (such as date, total amount,\
    \ and so on), and `order_details` contains the products related to the order.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH04.qxd 10/31/06 10:01\
    \ PM Page 110\n\n**110**\n\nC H A P T E R 4 ■ C R E AT I N G T H E P R O D U C\
    \ T C ATA L O G : PA RT I I\n\n**department table**\n\n**category table**\n\n\
    Berets  \nDriving Caps  \nCaps and Berets  \nChristmas Hats  \nHoliday  \nHalloween\
    \ Hats  \nCostume Hats  \nSt. Patrick’s Day Hats  \nTheatrical Hats  \nMilitary\
    \ Hats\n\n**Figure 4-2.** *A One-to-Many relationship between departments and\
    \ categories*\n\nThe One-to-Many relationship is implemented in the database by\
    \ adding an extra column in the table at the *many* side of the relationship,\
    \ which references the ID column of the table in the *one* side of the relationship.\
    \ Simply said, in the `category` table, you’ll have an extra column (called `department_id`)\
    \ that will hold the ID of the department the category belongs to.\n\nYou’ll implement\
    \ this in your database a bit later, after you learn about the Many-to-Many relationships\
    \ and the `FOREIGN KEY` constraint.\n\n## Many-to-Many Relationships\n\nThe other\
    \ common type of relationship is the Many-to-Many relationship. This kind of relationship\
    \ is implemented when records in both tables of the relationship can have multiple\
    \ matching records in the other. In our scenario, this happens for the `product`\
    \ and `category` tables because we know that a product can exist in more than\
    \ one category ( *one* product – *many* categories), and also a category can have\
    \ more than one product ( *one* category – *many* products).\n\nThis happens because\
    \ we decided earlier that a product could be in more than one category. If a product\
    \ could only belong to a single category, you would have another One-to-Many relationship,\
    \ just like the one that exists between departments and categories (where a category\
    \ can’t belong to more than one department).\n\nIf you represent this relationship\
    \ with a picture, as shown previously in Figure 4-2, but with generic names this\
    \ time, you get something like what is shown in Figure 4-3.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH04.qxd 10/31/06 10:01 PM Page 111\n\nC H A P T E R 4 ■ C R E AT I N G\
    \ T H E P R O D U C T C ATA L O G : PA RT I I **111**\n\n**category** table\n\n\
    **product** table\n\nproduct 1  \ncategory 1  \nproduct 2  \ncategory 2  \nproduct\
    \ 3  \ncategory 3  \nproduct 4  \nproduct 5\n\n**Figure 4-3.** *The Many-to-Many\
    \ relationship between categories and products*\n\nAlthough logically the Many-to-Many\
    \ relationship happens between two tables, databases (including PostgreSQL databases)\
    \ don’t have the means to physically implement this kind of relationship by using\
    \ just two tables, so we cheat by adding a third table to the mix. This third\
    \ table, called a **junction table** (also known as a *linking table* or an *associate\
    \ table*) and two One-to-Many relationships will help achieve the Many-to-Many\
    \ relationship. The junction table is used to associate products and categories,\
    \ with no restriction on how many products can exist for a category, or how many\
    \ categories a product can be added to. Figure 4-4 shows the role of the junction\
    \ table.\n\n**category** table\n\n**Junction** table\n\n**product** table\n\n\
    category 1  \nproduct 1  \ncategory 1  \nproduct 1  \ncategory 1  \nproduct 2\
    \  \ncategory 2  \nproduct 2  \ncategory 1  \nproduct 3  \nproduct 3  \ncategory\
    \ 2  \nproduct 3\n\n**Figure 4-4.** *The Many-to-Many relationship between categories\
    \ and products*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH04.qxd\
    \ 10/31/06 10:01 PM Page 112\n\n**112**\n\nC H A P T E R 4 ■ C R E AT I N G T\
    \ H E P R O D U C T C ATA L O G : PA RT I I\n\nNote that each record in the junction\
    \ table links one category with one product. You can have as many records as you\
    \ like in the junction table, linking any category to any product.\n\nThe linking\
    \ table contains two fields, each one referencing the primary key of one of the\
    \ two linked tables. In our case, the junction table will contain two fields:\
    \ a `category_id` field and a `product_id` field.\n\nEach record in the junction\
    \ table will consist of a `(product_id, category_id)` pair, which will be used\
    \ to associate a particular product with a particular category. By adding more\
    \ records to the `product_category` table, you can associate a product with more\
    \ categories or a category with more products, effectively implementing the Many-to-Many\
    \ relationship.\n\nBecause the Many-to-Many relationship is implemented using\
    \ a third table that makes the connection between the linked tables, there is\
    \ no need to add additional fields to the related tables in the way that we added\
    \ the `department_id` to the `category` table for implementing the One-to-Many\
    \ relationship.\n\nThere’s no definitive naming convention to use for the junction\
    \ table. Most of the time it’s okay to just join the names of the two linked tables—in\
    \ this case, the junction table is named `product_category`.\n\n## Enforcing Table\
    \ Relationships with the FOREIGN KEY Constraint\n\nRelationships between tables\
    \ can be physically enforced in the database using `FOREIGN KEY` constraints,\
    \ or simply *foreign keys*.\n\nYou learned in the previous chapter about the `PRIMARY\
    \ KEY` and `UNIQUE` constraints. We covered them there because they apply to the\
    \ table as an individual entity. Foreign keys, on the other hand, occur between\
    \ two tables: the table in which the foreign key is defined (the *referencing\
    \ table*) and the table the foreign key references (the *referenced table*).\n\
    \n> **Tip:** Actually, the referencing table and the referenced table can be one\
    \ and the same. This isn’t seen too often in practice, but it’s not unusual either.\
    \ For example, you can have a table with employees, where each employee references\
    \ the employee that is his or her boss (in this scenario the big boss would probably\
    \ reference itself)."
