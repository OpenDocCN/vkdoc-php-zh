    cover some examples.


    When we indexed blog posts, we added five fields to each indexed document (post_id,
    title, content, published, and tags). When a search is performed normally, all
    of these fields are searched for the given terms. Zend_Search_Lucene allows a
    user to search in one or more of these fields if they choose simply by prepending
    the field name to the search term. For instance, if a user wanted to search for
    blog posts based on their tags, they would include tags: in front of the term
    (since that is the name of the field we used when indexing the blog posts).


    Specifically, if you wanted to find blog posts with the tag PHP, you would use
    this: tags:PHP


