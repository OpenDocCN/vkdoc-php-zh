    are notoriously hard to test. In an insufficiently tiered system, automated tests
    must negotiate the HTML interface at one end and risk triggering random queries
    to a database at the other, even when their focus is aimed at neither of these
    areas. Although any testing is better than none, such tests are necessarily haphazard.
    In a tiered system, on the other hand, the classes that face other tiers are often
    written so that they extend an abstract superclass or implement an interface.
    This supertype can then support polymorphism. In a test context, an entire tier
    can be replaced by a set of dummy objects (often called “stubs” or “mock” objects).
    In this way, you can test business logic using a fake data layer, for example.
    You can read more about testing in Chapter [18](#A314621_5_En_18_Chapter.html).


    Layers are useful even if you think that testing is for wimps and your system
    will only ever have a single interface. By creating tiers with distinct responsibilities,
    you build a system whose constituent parts are easier to extend and debug. You
    limit duplication by keeping code with the same kinds of responsibility in one
    place (rather than lacing a system with database calls, for example, or with display
    strategies). Adding to such a system is relatively easy because your changes tend
