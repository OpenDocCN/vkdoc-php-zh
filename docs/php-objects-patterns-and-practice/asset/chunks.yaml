- fmt: "# Why Standards?\n\nDesign patterns interoperate. That is built in at their\
    \ core. A problem described in a design pattern suggests a particular solution,\
    \ which in turn generates architectural consequences. These are then well addressed\
    \ by new patterns. Patterns also help developers to interoperate because they\
    \ provide a shared vocabulary. Object-oriented systems tend to privilege the principle\
    \ of playing nice.\n\nAs we increasingly share each other’s components though,\
    \ this informal tendency towards interoperability is not always enough. As we\
    \ have seen, `Composer` (or our package management system of choice) allows us\
    \ to mix and match tools in our projects. These components may be designed as\
    \ standalone libraries, or they may be pieces from a wider framework. Either way,\
    \ once deployed in our system, they must be capable of working beside and in collaboration\
    \ with any number of other components. By adhering to core standards, we make\
    \ it less likely that our work will run into compatibility issues.\n\nIn some\
    \ senses, the nature of a standard is less important than the fact that it is\
    \ adhered to. Personally, for example, I don’t love every aspect of the `PSR-2`\
    \ style guidelines. In most circumstances, including this book, I have adopted\
    \ the standard. Other developers on my teams will hopefully find my code easier\
    \ to work with because they will find it in a format that is familiar. For other\
    \ standards, such as autoloading, failure to observe a common standard will result\
    \ in components that may not work together at all without additional middleware.\n\
    \nStandards are probably not the most exciting aspect of programming. However\
    \ there is an interesting contradiction at their core. It may seem that a standard\
    \ closes down creativity. After all, standards tell you want you can and can’t\
    \ do. You must comply. You might think that this is hardly the stuff of innovation.\
    \ And yet we owe the great flowering of creativity that the internet has ushered\
    \ into our lives to the fact that every node on this network of networks conforms\
    \ to open standards. Proprietary systems stuck within walled gardens are necessarily\
    \ limited in scope and often in longevity—no matter how clever their code or slick\
    \ their interfaces. The internet, with its shared protocols, ensures that any\
    \ site can link to any other site. Most browsers support standard `HTML`, `CSS`,\
    \ and `JavaScript`. The interfaces we can build within these standards are not\
    \ always the most impressive we might imagine (though the limitations are much\
    \ less than they were); still, abiding by them enables us to maximize the reach\
    \ of our work.\n\nUsed well, standards promote openness, cooperation, and, ultimately,\
    \ creativity. This is true, even if a standard itself enforces some limitations.\n\
    \n# What Are PHP Standards Recommendations?\n\nAt the 2009 PHP Tek conference,\
    \ a group of framework developers formed an organization they called the PHP Framework\
    \ Interop Group (`PHP-Fig`). Since then, developers have come on board from other\
    \ key components. Their purpose was to build standards, so that their systems\
    \ could better co-exist.\n\nThe group vote on standards proposals which progress\
    \ from Draft, through Review, and finally, to Accepted status.\n\nTable [15-1](#A314621_5_En_15_Chapter.html#Tab1)\
    \ lists the current standards at the time of this writing.\n\n**Table 15-1.**\
    \ Accepted PHP Standards Recommendations\n\n| PSR Number | Name | Description\
    \ |\n| --- | --- | --- |\n| 1 | Basic Coding Standard | Fundamentals such as PHP\
    \ tags and basic naming conventions |\n| 2 | Coding Style Guide | Code formatting,\
    \ including rules for placement of braces, argument lists, etc. |\n| 3 | Logger\
    \ Interface | Rules for log levels and logger behaviors |\n| 4 | Autoloading Standard\
    \ | Conventions for naming classes and namespaces, as well as their mapping to\
    \ the filesystem |\n| 6 | Caching Interface | Rules for cache management, including\
    \ data types, cache item lifetime, error handling, etc. |\n| 7 | HTTP Message\
    \ Interfaces | Conventions for HTTP requests and responses |\n\nBut that’s not\
    \ all. There are also draft proposals in the works, including one for inline documentation\
    \ (`PSR-5`), another style guide (`PSR-12`), and a standard for hypermedia links\
    \ (`PSR-13`).\n\n## Why PSR in Particular?\n\nSo, why choose one standard and\
    \ not another? It happens that the PHP Framework Interop Group—the originators\
    \ of `PSR`s—has a pretty great pedigree, and the standards themselves therefore\
    \ make sense. But also, these are the standards that the major frameworks and\
    \ components are adopting. If you are using `Composer` to add functionality to\
    \ your projects, you are already consuming code that complies with `PSR`s. By\
    \ using its conventions for autoloading and its style guides, you are likely building\
    \ code that is ready for collaboration with other people and components.\n\n**Note**\
    \  \nOne set of standards is not inherently superior to another. When you choose\
    \ whether to adopt a standard, your choice may be driven by your judgment of the\
    \ recommendation’s merits. Alternatively, you might make a pragmatic choice based\
    \ on the context within which you are working. If you’re working in the WordPress\
    \ community, for example, you might want to adopt the style defined in the Core\
    \ Contributor Handbook at [`https://make.wordpress.org/core/handbook/best-practices/coding-standards/php/`](https://make.wordpress.org/core/handbook/best-practices/coding-standards/php/).\
    \ Such a choice is part of the point of standards, which are all about the cooperation\
    \ of people and software.\n\n`PSR`s are a good bet because they are supported\
    \ by key framework and component projects, including `Phing`, `Composer`, `PEAR`,\
    \ `Symfony`, and `Zend 2`. Like patterns, standards are infectious—you’re probably\
    \ already benefiting from them.\n\n## Who Are PSRs for?\n\nOstensibly `PSR`s are\
    \ designed for the creators of frameworks. The fact that the membership of the\
    \ `PHP-Fig` group rapidly widened to include the creators of tools as well as\
    \ frameworks, however, shows that standards have wide relevance. That said, unless\
    \ you are creating a logger, you may not need to worry too much about the details\
    \ of `PSR-3` (beyond ensuring any logging tool you use is itself compliant). On\
    \ the other hand, if you’ve read the rest of this book, chances are you are as\
    \ likely to be creating tools as you are to be consuming them. So, it’s also likely\
    \ that you’ll find something relevant to you either in the present standards or\
    \ the standards to come.\n\nAnd then there are the standards that matter to all\
    \ of us. Unglamorous as style guides are, for example, they are relevant to every\
    \ programmer. And while the rules that govern autoloading really apply to those\
    \ who create autoloaders (and the main game in town is probably `Composer`’s),\
    \ they also fundamentally affect how we organize our classes, our packages, and\
    \ our files.\n\nFor these reasons, I will focus on coding style and autoloading\
    \ for the rest of this chapter."
  raw: '## Why Standards?


    Design patterns interoperate. That is built in at their core. A problem described
    in a design pattern suggests a particular solution, which in turn generates architectural
    consequences. These are then well addressed by new patterns. Patterns also help
    developers to interoperate because they provide a shared vocabulary. Object-oriented
    systems tend to privilege the principle of playing nice.


    As we increasingly share each other’s components though, this informal tendency
    towards interoperability is not always enough. As we have seen, Composer (or our
    package management system of choice) allows us to mix and match tools in our projects.
    These components may be designed as standalone libraries, or they may be pieces
    from a wider framework. Either way, once deployed in our system, they must be
    capable of working beside and in collaboration with any number of other components.
    By adhering to core standards, we make it less likely that our work will run into
    compatibility issues.


    In some senses, the nature of a standard is less important than the fact that
    it is adhered to. Personally, for example, I don’t love every aspect of the PSR-2
    style guidelines. In most circumstances, including this book, I have adopted the
    standard. Other developers on my teams will hopefully find my code easier to work
    with because they will find it in a format that is familiar. For other standards,
    such as autoloading, failure to observe a common standard will result in components
    that may not work together at all without additional middleware.


    Standards are probably not the most exciting aspect of programming. However there
    is an interesting contradiction at their core. It may seem that a standard closes
    down creativity. After all, standards tell you want you can and can’t do. You
    must comply. You might think that this is hardly the stuff of innovation. And
    yet we owe the great flowering of creativity that the internet has ushered into
    our lives to the fact that every node on this network of networks conforms to
    open standards. Proprietary systems stuck within walled gardens are necessarily
    limited in scope and often in longevity—no matter how clever their code or slick
    their interfaces. The internet, with its shared protocols, ensures that any site
    can link to any other site. Most browsers support standard HTML, CSS, and JavaScript.
    The interfaces we can build within these standards are not always the most impressive
    we might imagine (though the limitations are much less than they were); still,
    abiding by them enables us to maximize the reach of our work.


    Used well, standards promote openness, cooperation, and, ultimately, creativity.
    This is true, even if a standard itself enforces some limitations.


    ## What Are PHP Standards Recommendations?


    At the 2009 PHP Tek conference, a group of framework developers formed an organization
    they called the PHP Framework Interop Group (PHP-Fig) . Since then, developers
    have come on board from other key components. Their purpose was to build standards,
    so that their systems could better co-exist.


    The group vote on standards proposals which progress from Draft, through Review,
    and finally, to Accepted status.


    Table [15-1](#A314621_5_En_15_Chapter.html#Tab1) lists the current standards at
    the time of this writing.


    Table 15-1.


    Accepted PHP Standards Recommendations


    | PSR Number | Name | Description |

    | --- | --- | --- |

    | 1 | Basic Coding Standard | Fundamentals such as PHP tags and basic naming conventions
    |

    | 2 | Coding Style Guide | Code formatting, including rules for placement of braces,
    argument lists, etc. |

    | 3 | Logger Interface | Rules for log levels and logger behaviors |

    | 4 | Autoloading Standard | Conventions for naming classes and namespaces, as
    well as their mapping to the filesystem |

    | 6 | Caching Interface | Rules for cache management, including data types, cache
    item lifetime, error handling, etc. |

    | 7 | HTTP Message Interfaces | Conventions for HTTP requests and responses |


    But that’s not all. There are also draft proposals in the works, including one
    for inline documentation (PSR-5), another style guide (PSR-12), and a standard
    for hypermedia links (PSR-13).


    ### Why PSR in Particular?


    So, why choose one standard and not another? It happens that the PHP Framework
    Interop Group—the originators of PSRs—has a pretty great pedigree, and the standards
    themselves therefore make sense. But also, these are the standards that the major
    frameworks and components are adopting. If you are using Composer to add functionality
    to your projects, you are already consuming code that complies with PSRs . By
    using its conventions for autoloading and its style guides, you are likely building
    code that is ready for collaboration with other people and components.


    Note


    One set of standards is not inherently superior to another. When you choose whether
    to adopt a standard, your choice may be driven by your judgment of the recommendation’s
    merits. Alternatively, you might make a pragmatic choice based on the context
    within which you are working. If you’re working in the WordPress community, for
    example, you might want to adopt the style defined in the Core Contributor Handbook
    at [`https://make.wordpress.org/core/handbook/best-practices/coding-standards/php/`](https://make.wordpress.org/core/handbook/best-practices/coding-standards/php/)
    . Such a choice is part of the point of standards, which are all about the cooperation
    of people and software.


    PSRs are a good bet because they are supported by key framework and component
    projects, including Phing, Composer, PEAR, Symfony, and Zend 2\. Like patterns,
    standards are infectious—you’re probably already benefiting from them.


    ### Who Are PSRs for?


    Ostensibly PSRs are designed for the creators of frameworks. The fact that the
    membership of the PHP-Fig group rapidly widened to include the creators of tools
    as well as frameworks, however, shows that standards have wide relevance. That
    said, unless you are creating a logger, you may not need to worry too much about
    the details of PSR-3 (beyond ensuring any logging tool you use is itself compliant).
    On the other hand, if you’ve read the rest of this book, chances are you are as
    likely to be creating tools as you are to be consuming them. So, it’s also likely
    that you’ll find something relevant to you either in the present standards or
    the standards to come.


    And then there are the standards that matter to all of us. Unglamorous as style
    guides are, for example, they are relevant to every programmer. And while the
    rules that govern autoloading really apply to those who create autoloaders (and
    the main game in town is probably Composer’s), they also fundamentally affect
    how we organize our classes, our packages, and our files.


    For these reasons, I will focus on coding style and autoloading for the rest of
    this chapter.'
  trans: "\n# 为什么需要标准？\n\n设计模式天生具备互操作性。其核心思想在于：用设计模式描述的问题会提出特定解决方案，进而产生架构层面的影响，这些影响又可以被新模式妥善处理。模式还能通过提供共享词汇表，帮助开发者实现协作。面向对象系统往往推崇\"\
    友好共处\"的原则。\n\n不过，随着我们越来越多地共享彼此的组件，这种非正式的互操作性倾向有时并不够用。正如我们所看到的，`Composer`（或我们选择的包管理工具）允许我们在项目中混用各种工具。这些组件可能是独立的库，也可能是更大框架中的一部分。无论如何，一旦部署到系统中，它们必须能够与任意数量的其他组件协同工作。通过遵循核心标准，我们能降低代码出现兼容性问题的可能性。\n\
    \n从某种意义来说，标准本身的性质不如\"被遵守\"这个事实重要。例如我个人并不喜欢`PSR-2`风格指南的每个方面——但在包括本书在内的大多数情况下，我依然采用了该标准。我希望团队的其他开发者能更容易地处理我的代码，因为他们会看到熟悉的格式。而对于自动加载等其他标准，如果未能遵守通用标准，组件之间可能完全无法协同工作，除非借助额外的中间件。\n\
    \n标准或许不是编程中最令人兴奋的部分，但其核心存在一个有趣的矛盾点。表面上看，标准似乎限制了创造力——毕竟标准告诉你什么能做、什么不能做，你必须遵守。你可能认为这根本不是创新的土壤。然而，互联网之所以能给我们的生活带来如此蓬勃的创造力，恰恰是因为这个网络之网中的每个节点都遵循开放标准。困在围墙花园里的专有系统，无论其代码多么精妙或界面多么流畅，其范围和寿命必然受限。而拥有共享协议的互联网，确保了任何网站都能链接到其他网站。大多数浏览器支持标准的`HTML`、`CSS`和`JavaScript`。虽然我们在这些标准下构建的界面并非总是最令人惊艳的（尽管限制已比过去少得多），但遵守标准能最大化我们工作的覆盖范围。\n\
    \n善用标准能促进开放、协作，最终激发创造力。即便标准本身就施加了某些限制，这一点依然成立。\n\n# 什么是 PHP 标准建议？\n\n在 2009 年\
    \ PHP Tek 大会上，一群框架开发者组建了名为\"PHP 框架互操作组\"（`PHP-Fig`）的组织。此后，其他关键组件的开发者纷纷加入。他们的目标是制定标准，使各自系统能更好地共存。\n\
    \n该组织对标准提案进行投票，提案从草案（Draft）阶段，经由审核（Review）阶段，最终进入已接受（Accepted）状态。\n\n表 15-1 列出了撰写本书时已接受的标准。\n\
    \n**表 15-1.** 已接受的 PHP 标准建议\n\n| PSR 编号 | 名称 | 描述 |\n| --- | --- | --- |\n| 1\
    \ | 基础编码标准 | PHP 标签和基本命名约定等基础规范 |\n| 2 | 编码风格指南 | 代码格式化，包括花括号位置、参数列表等规则 |\n| 3\
    \ | 日志接口 | 日志级别与日志记录器行为的规则 |\n| 4 | 自动加载标准 | 类与命名空间的命名约定，及其到文件系统的映射 |\n| 6 | 缓存接口\
    \ | 缓存管理规则，包括数据类型、缓存项生命周期、错误处理等 |\n| 7 | HTTP 消息接口 | HTTP 请求与响应的约定 |\n\n但这并非全部。还有一些草案提案正在制定中，包括内联文档标准（`PSR-5`）、另一个风格指南（`PSR-12`），以及超媒体链接标准（`PSR-13`）。\n\
    \n## 为什么特别选择 PSR？\n\n那么，为什么选这个标准而非另一个？恰巧`PSR`的创建者——PHP 框架互操作组——拥有非常优秀的血统，因此这些标准本身也合情合理。但更关键的是，这些标准正是主流框架和组件正在采纳的。如果你正在使用`Composer`为项目添加功能，你已经在使用符合`PSR`标准的代码。通过采用其自动加载约定和风格指南，你很可能正在构建能与其他人和组件协作的代码。\n\
    \n**注意**  \n没有任何一套标准天生优于其他。当你决定是否采纳某个标准时，可能基于对该建议价值的判断。或者，你会根据工作环境做出务实的选择。例如，如果你在\
    \ WordPress 社区工作，可能需要采用核心贡献者手册中定义的标准（[`https://make.wordpress.org/core/handbook/best-practices/coding-standards/php/`](https://make.wordpress.org/core/handbook/best-practices/coding-standards/php/)）。这种选择恰恰体现了标准的意义——促进人与软件的协作。\n\
    \n`PSR`是可靠的选择，因为它们得到了关键框架和组件项目的支持（包括`Phing`、`Composer`、`PEAR`、`Symfony`和`Zend\
    \ 2`）。和模式一样，标准也具有传染性——你可能已经在受益于它们。\n\n## PSR 为谁而设计？\n\n表面上看，`PSR`是为框架创建者设计的。但`PHP-Fig`组织的成员迅速扩展，涵盖了工具和框架的创建者，这表明标准具有广泛的相关性。话虽如此，如果你不创建日志记录器，可能无需过多关注`PSR-3`的细节（只需确保使用的日志工具本身符合标准即可）。另一方面，如果你读过本书其他章节，那么你很可能既在创建工具，也在使用工具。因此，无论是在当前标准还是未来标准中，你都很可能找到与自己相关的内容。\n\
    \n此外，还有一些与我们所有人都相关的标准。例如风格指南虽然并不耀眼，但对每个程序员都很重要。而指导自动加载的规则虽然主要适用于创建自动加载器的人（目前最主流的大概是`Composer`的自动加载器），但它们也从根本上影响我们如何组织类、包和文件。\n\
    \n基于这些原因，本章剩余部分将重点讨论编码风格和自动加载。\n"
- fmt: '# Coding with Style


    I tend to find pull request comments like “your braces are in the wrong place”
    disproportionately irritating. Such input often seems nitpicky and perilously
    close to bike-shedding.


    **Note**：In case you have not come across it, the verb “to bike-shed” refers to
    the tendency in some reviewers to criticize unimportant elements of a project
    under scrutiny. The implication is that such elements are chosen because they
    fit within the scope of the commenter’s competence. So, given a skyscraper to
    assess, a particular manager might focus, not on the vast and complex tower of
    glass and steel, but on the much easier to comprehend bike shed around the back.
    Wikipedia has a good history of the term: [`https://en.wikipedia.org/wiki/Law_of_triviality`](https://en.wikipedia.org/wiki/Law_of_triviality)


    And yet I have come to see that conforming to a common style can help improve
    the quality of code. This is mainly a matter of readability (regardless of the
    reasoning behind a particular rule). If a team abides by the same rules for indentations,
    brace placement, argument lists, and so on, then a developer can quickly assess
    and contribute to a colleague’s code.


    So, for this edition of the book, I committed to edit all code examples so that
    they conform to PSR-1 and PSR-2. I have asked my colleague and technical editor
    Paul Tregoing to hold me to that, too. This was a promise that was so easy to
    make at the planning stage—and much more effort than I expected. This brings me
    to the first style guide lesson I learned. If possible, adopt a standard early
    for your project. Refactoring to a code style will likely tie up resources and
    make it hard to examine code differences that span The Time of the Great Reformat.


    So what changes have I had to apply? Let’s start with the basics.


    ## PSR-1 Basic Coding Standard


    These are the fundamentals for PHP code. You can find them in detail at [`http://www.php-fig.org/psr/psr-1/`](http://www.php-fig.org/psr/psr-1/).
    Let’s break them down.


    ### Opening and Closing Tags


    First of all, a PHP section should open either with `<?php` or `<?=`. In other
    words, the short opening tag, `<?`, should not be used, nor should any other variation.
    A section should close with `?>` only (or, as we shall see in the next section,
    no tag at all).


    ### Side Effects


    A PHP file should declare classes, interfaces, functions, and the like, or it
    should perform an action (such as reading or writing to a file or sending output
    to the browser); however, it should not do both. If you are accustomed to using
    `require_once()` to include other class files, this will trip you up straight
    away because the act of including another file is a side effect. Just as patterns
    beget patterns, so standards tend to require other standards. The correct way
    to handle class dependencies is through a PSR-4 compliant autoloader.


    So, is it legal for a class you declare to write to a file in one of its methods?
    That is perfectly acceptable because the effect is not kicked off by the file’s
    inclusion. In other words, it’s an execution effect not a side effect.


    So what kind of file might perform actions rather than declare classes? Think
    of the script that kicks off an application.


    Here is a listing that performs actions as a direct result of inclusion:


    ```

    // listing 15.01

    // index.php

    namespace popp\ch15\batch01;

    require_once(__DIR__ . "/../../../vendor/autoload.php");

    $tree = new Tree();

    print "loaded " . get_class($tree) . "\n";

    ```


    Here is a PHP file that declares a class with no side effects:


    ```

    // listing 15.02

    // Tree.php

    namespace popp\ch15\batch01;

    class Tree

    {

    }

    ```


    **Note**：In other chapters, I largely omit `namespace` declarations and `use`
    directives in order to focus on the code. Since this chapter is about the mechanics
    of formatting class files, I will include `namespace` and `use` statements where
    appropriate.


    ### Naming


    Classes must be declared in upper camel case, also known as studly caps. In other
    words, a class name should begin with a capital letter. The rest of the name should
    be lowercase unless it consists of multiple words. In this instance, each word
    should begin with an uppercase letter, like this:


    ```

    class MyClassName

    ```


    Properties can be named in any way, although consistency is called for. I tend
    to use camel case, an approach similar to studly caps, but without the leading
    capital letter:


    ```

    private $myPropertyName

    ```


    Methods must be declared in camel case:


    ```

    public function myMethodName()

    ```


    Class constants must be upper case, with words separated by underscores:


    ```

    const MY_NAME_IS = ''matt'';

    ```'
