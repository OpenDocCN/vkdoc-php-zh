- fmt: "In addition there is a flag to make the sorting case insensitive. This flag\
    \ can be combined with any of the other flags.\n\nIt is of course more efficient\
    \ to use the sorting functionality of the database and return the records in the\
    \ order they should be used, but there can be times where a different order is\
    \ needed. Changing the query to change the order of the columns could have an\
    \ impact on presentation so that route might not be optimal either.\n\nThis is\
    \ where the `usort()` function becomes handy. The `usort()` function takes two\
    \ parameters, the first being the array to sort and the second the name of a user-defined\
    \ callback function that will be used to compare two elements of the array. If\
    \ we want to expand on example `3_9.php` and define functions to sort the array\
    \ of persons by first name, last name, or date of birth it could look something\
    \ like this.\n\n```php\n<?php\n\n// 4_23.php\n\nfunction SortFirstName($a, $b)\
    \ {\n\nif ($a['first_name'] == $b['first_name']) {\n\nreturn 0;\n\n}\n\nelseif\
    \ ($a['first_name'] > $b['first_name']) {\n\nreturn 1;\n\n}\n\nelse {\n\nreturn\
    \ -1;\n\n}\n\n}\n\nfunction SortLastName($a, $b) {\n\nif ($a['last_name'] == $b['last_name'])\
    \ {\n\nreturn 0;\n\n}\n\nelseif ($a['last_name'] > $b['last_name']) {\n\nreturn\
    \ 1;\n\n}\n\nelse {\n\nreturn -1;\n\n}\n\n}\n\nfunction SortDOB($a, $b) {\n\n\
    if ($a['date_of_birth'] == $b['date_of_birth']) {\n\nreturn 0;\n\n}\n\nelseif\
    \ ($a['date_of_birth'] > $b['date_of_birth']) {\n\nreturn 1;\n\n}\n\nelse {\n\n\
    return -1;\n\n}\n\n}\n\n$con = mysqli_connect(\"127.0.0.1\", \"root\", \"Wbp2Theworld\"\
    , \"book\"); $rs = mysqli_query($con, \"select * from person\");\n\nif ($rs) {\n\
    \n$persons = array();\n\nwhile($row = mysqli_fetch_assoc($rs)) {\n\n$persons[]\
    \ = $row;\n\n}\n\nmysqli_free_result($rs);\n\n}\n\nmysqli_close($con);\n\nusort($persons,\
    \ 'SortFirstName');\n\nprint_r($persons);\n\nusort($persons, 'SortLastName');\n\
    \nprint_r($persons);\n\nusort($persons, 'SortDOB');\n\nprint_r($persons);\n```\n\
    \nIn this case we have defined three callback functions, each one to sort on a\
    \ specific column. The code calls each of the sorting functions and the output\
    \ is shown below.\n\n```\nArray\n(\n    [0] => Array\n        (\n            [first_name]\
    \ => George\n            [last_name] => Harrison\n            [date_of_birth]\
    \ => -847324800\n        )\n    [1] => Array\n        (\n            [first_name]\
    \ => John\n            [last_name] => Lenon\n            [date_of_birth] => -922406400\n\
    \        )\n    [2] => Array\n        (\n            [first_name] => Paul\n  \
    \          [last_name] => McCartney\n            [date_of_birth] => -869097600\n\
    \        )\n    [3] => Array\n        (\n            [first_name] => Ringo\n \
    \           [last_name] => Star\n            [date_of_birth] => -930528000\n \
    \       )\n)\nArray\n(\n    [0] => Array\n        (\n            [first_name]\
    \ => George\n            [last_name] => Harrison\n            [date_of_birth]\
    \ => -847324800\n        )\n    [1] => Array\n        (\n            [first_name]\
    \ => John\n            [last_name] => Lenon\n            [date_of_birth] => -922406400\n\
    \        )\n    [2] => Array\n        (\n            [first_name] => Paul\n  \
    \          [last_name] => McCartney\n            [date_of_birth] => -869097600\n\
    \        )\n    [3] => Array\n        (\n            [first_name] => Ringo\n \
    \           [last_name] => Star\n            [date_of_birth] => -930528000\n \
    \       )\n)\nArray\n(\n    [0] => Array\n        (\n            [first_name]\
    \ => Ringo\n            [last_name] => Star\n            [date_of_birth] => -930528000\n\
    \        )\n    [1] => Array\n        (\n            [first_name] => John\n  \
    \          [last_name] => Lenon\n            [date_of_birth] => -922406400\n \
    \       )\n    [2] => Array\n        (\n            [first_name] => Paul\n   \
    \         [last_name] => McCartney\n            [date_of_birth] => -869097600\n\
    \        )\n    [3] => Array\n        (\n            [first_name] => George\n\
    \            [last_name] => Harrison\n            [date_of_birth] => -847324800\n\
    \        )\n)\n```\n\nSorting by first or last name does not make any difference\
    \ in the case of the four members of The Beatles but sorting by date of birth\
    \ shows the records in a different order.\n\n## Recipe 4-7. Using Arrays as Stacks\n\
    \n### Problem\nA stack is a commonly used structure where elements can be added\
    \ and removed from the open end of the stack. Stacks are considered as last-in\
    \ first-out structures.\n\n### Solution\nWith the use of the functions `array_pop()`,\
    \ `array_push()`, `array_shift()`, and `array_unshift()` it is possible to use\
    \ arrays as a stack. `Shift` and `unshift` works on the beginning of the array\
    \ where `push` and `pop` works on the end of the array. These functions will return\
    \ the first or last element of the array. If the array is empty or the variable\
    \ is not an array these functions will return `NULL`.\n\n### How it Works"
