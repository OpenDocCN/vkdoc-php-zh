    # Markdown 文档排版结果


    需要注意的关键点是，缩进列表是嵌套在顶层列表项内部的。标签 1 的闭合 `</li>` 标签位于嵌套列表的闭合 `</ul>` 标签之后。手工编写 HTML
    嵌套列表容易出错，因为很难追踪列表项的起始和结束位置。在使用 PHP 自动化处理嵌套列表时，我们必须牢记这种结构。


    1. 在 `ch08` 文件夹中创建一个名为 `ListBuilder.php` 的文件。如果你只想研究完成的代码，它位于 `ListBuilder_end.php`
    中，并附有注释。


    2. 定义一个名为 `ListBuilder` 的类，使其继承 `RecursiveIteratorIterator`，并为待处理的数组和输出的 HTML
    创建两个受保护的属性：


    ```

    class ListBuilder extends RecursiveIteratorIterator

    {

    protected $array;

    protected $output = '''';

    }

    ```


    `$output` 属性被初始化为一个空字符串。


    3. 大多数类都有一个构造方法，用于初始化类并接受任意参数。`ListBuilder` 类需要一个数组作为参数，并对其进行预处理。将以下代码添加到类定义中（所有
    `ListBuilder` 的代码需放在步骤 2 中代码的闭合花括号之前）：


    ```

    public function __construct(array $array) {

    $this->array = new RecursiveArrayIterator($array);

    // 调用 RecursiveIteratorIterator 的父构造方法

    parent::__construct($this->array, parent::SELF_FIRST);

    }

    ```


    所有类的构造方法名称相同，并且以双下划线开头。该构造方法接受一个参数：将被转换为嵌套无序列表的数组。


    要使用 SPL 迭代器处理数组，必须先将数组转换为迭代器，因此构造方法中的第一行创建了一个新的 `RecursiveArrayIterator` 实例，并将其赋值给
    `ListBuilder` 的 `$array` 属性。


    由于我们重写了 `RecursiveIteratorIterator` 的构造方法，需要调用父构造方法并将 `$array` 属性作为第一个参数传递给它。将
    `parent::SELF_FIRST` 作为第二个参数调用，可以访问正在处理的数组的键和值。如果没有第二个参数，我们将无法访问这些键。


    > **提示：** 你将在第 [9](https://example.org/9) 章和第 [10](https://example.org/10) 章中了解更多关于类和类扩展的内容。


    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig7_HTML.jpg](img/332054_4_En_8_Fig7_HTML.jpg)


    **图 8-7.** `ListBuilder` 继承自 `RecursiveIteratorIterator`，用于自动化地从多维关联数组构建嵌套列表


    1. HTML 无序列表以开闭 `<ul>` 标签开始和结束。`RecursiveIteratorIterator` 提供了在循环开始和结束时自动调用的公共方法，因此我们可以重写这些方法，使用组合连接运算符将必要的标签添加到
    `$output` 属性中，如下所示：


    ```

    public function beginIteration() {

    $this->output .= '''';

    }

    public function endIteration() {

    $this->output .= '''';

    }

    ```


    2. 在每个子数组的开始和结束时，也会自动调用两个公共方法。我们可以利用这两个方法插入嵌套列表的起始 `<ul>` 标签，以及关闭嵌套列表及其父列表项：


    ```

    public function beginChildren() {

    $this->output .= '''';

    }

    public function endChildren() {

    $this->output .= '''';

    }

    ```


    3. 要处理每个数组元素，我们可以重写自动调用的 `nextElement()` 公共方法……是的，你猜对了。这部分稍微复杂一些，因为我们需要检查当前元素是否包含子数组。如果包含，需要添加一个起始
    `<li>` 标签和子数组的键。否则，需要在 `<li>` 标签之间添加当前值，如下所示：


    ```

    public function nextElement() {

    // 检查是否存在子数组

    if (parent::callHasChildren()) {

    // 显示子数组的键

    $this->output .= '''' . self::key();

    } else {

    // 显示当前数组元素

    $this->output .= '''' . self::current() . '''';

    }

    }

    ```


    这段代码大部分不言自明。条件语句调用了父类的——换句话说，就是 `RecursiveIteratorIterator` 的——`callHasChildren()`
    方法。如果当前元素包含子元素（即子数组），则返回 `true`。如果包含，则将起始 `<li>` 标签连接到 `$output` 属性，后面跟上 `self::key()`。这会调用
    `ListBuilder` 的 `key()` 方法（该方法继承自 `RecursiveIteratorIterator`），以获取当前键的值。这里没有闭合的
    `</li>` 标签，因为要等到子数组处理完成后才会添加。


    `else` 子句在当前元素没有子元素时执行。它调用了 `current()` 方法获取当前元素的值，该值被包裹在一对 `<li>` 标签之间。


    4. 要显示嵌套列表，我们需要遍历数组并返回 `$output` 属性。我们可以使用魔术方法 `__toString()`。像这样定义它：


    ```

    public function __toString() {

    // 生成列表

    $this->run();

    return $this->output;

    }

    ```


    5. 要完成 `ListBuilder` 类的定义，像这样定义 `run()` 方法：


    ```

    protected function run() {

    self::beginIteration();

    while (self::valid()) {

    self::next();

    }

    self::endIteration();

    }

    ```


    这段代码简单地调用了从 `RecursiveIteratorIterator` 继承的四个方法。它们首先调用 `beginIteration`，然后通过 `while`
    循环遍历数组，最后结束迭代。


    6. 要测试 `ListBuilder`，打开 `ch08` 文件夹中的 `multidimensional_01.php` 文件。其中包含一个名为 `$wines`
    的多维关联数组。引入 `ListBuilder` 的定义，然后通过添加以下代码生成输出并显示（完成的代码位于 `multidimensional_02.php`
    中）：


    ```

    require ''./ListBuilder.php'';

    echo new ListBuilder($wines);

    ```


    图 8-7 显示了结果。


    ## PHP 解决方案 8-9：从 JSON 提取数据


    在上一章中，我们使用 `SimpleXML` 解析了 RSS 新闻源。RSS 和其他形式的 XML 在分发数据时的缺点是，包裹数据的标签使数据变得冗长。JavaScript
    对象表示法（JSON）因其简洁性而越来越多地用于在线数据分发。简洁的格式使 JSON 下载速度更快，且占用更少的带宽，但其缺点是不易阅读。


    本 PHP 解决方案从旧金山开放数据（[`https://datasf.org/opendata/`](https://datasf.org/opendata/)）访问一个
    JSON 源，将其转换为数组，构建一个数据的多维关联数组，然后进行过滤以提取所需信息。听起来工作量很大，但实际上涉及的代码相对较少。


    1. 本 PHP 解决方案的 JSON 数据源位于 `ch08/data` 文件夹中的 `film_locations.json` 文件中。或者，你也可以从
    [`https://data.sfgov.org/api/views/yitu-d5am/rows.json?accessType=DOWNLOAD`](https://data.sfgov.org/api/views/yitu-d5am/rows.json%3FaccessType%3DDOWNLOAD)
    获取最新版本。如果你访问的是在线版本，请将其保存为本地硬盘上的 `.json` 文件，以避免反复访问远程源。

    '
- fmt: "## 2.  The feed consists of data compiled by the San Francisco Film Commission\
    \ of locations around the city where movies have been shot. One of the challenges\
    \ of working with JSON is locating the information you want because there’s no\
    \ common naming convention. Although this feed is formatted on separate lines\
    \ and indented, JSON is frequently devoid of whitespace to make it more compact.\
    \ Converting it to a multidimensional associative array simplifies the identification\
    \ process. Create a PHP file called `json.php` in the `ch08` folder, and add the\
    \ following code (it’s in `json_01.php`):\n\n```\n$json = file_get_contents('./data/film_locations.json');\n\
    $data = json_decode($json, true);\necho '';\nprint_r($data);\necho '';\n```\n\n\
    This grabs the raw JSON from the data file using `file_get_contents()`, converts\
    \ it to a multidimensional associative array, and then displays it. Passing `true`\
    \ as the second argument to `json_decode()` converts JSON objects into PHP associative\
    \ arrays.\n\n## 3.  Save the file and run the script in a browser. The `$data`\
    \ array is huge. It contains details of more than 1,600 movies. Wrapping `<pre>`\
    \ tags around `print_r()` makes it easy to inspect the structure to identify where\
    \ the interesting data is located. As Figure 8-8 shows, the top-level array is\
    \ called `meta`. Nested inside is a subarray called `view`, which in turn contains\
    \ a subarray called `columns`.\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig8_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fig8_HTML.jpg)\n\
    \nFigure 8-8. Converting the JSON feed to an associative array simplifies identifying\
    \ the location of data\n\nThe `columns` subarray contains an indexed array; and\
    \ inside the first element is yet another array with a key called `name`. The\
    \ significance of this becomes clear when you scroll further down to find an array\
    \ called `data` (see Figure 8-9).\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig9_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fig9_HTML.jpg)\n\
    \nFigure 8-9. The movie data is stored in indexed arrays for compactness\n\nThis\
    \ is where all the interesting information is stored. It contains an indexed subarray\
    \ with more than 1,600 elements, each of which contains another indexed array\
    \ with 19 elements. Instead of repeating the column names thousands of times,\
    \ the data is mapped to the array of names identified in Figure 8-8. To extract\
    \ the information we want, it’s necessary to build an associative array for each\
    \ movie in this `data` array.\n\n## 1.  We can obtain the column names using the\
    \ `array_column()` function that we encountered in PHP Solution 8-6 “Sorting a\
    \ multidimensional array with `array_multisort()`.” However, the `name` element\
    \ is buried deep within the top-level array that was stored as `$data` in step\
    \ 2. The indentation in Figure 8-8 helps find the correct subarray to pass as\
    \ the first argument. Add the following code to the script (it’s in `json_02.php`):\n\
    \n```\n$col_names = array_column($data['meta']['view']['columns'], 'name');\n\
    ```\n\n## 2.  Use `print_r()` to check that you have extracted the correct values,\
    \ as shown in Figure 8-10.\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig10_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fig10_HTML.jpg)\n\
    \nFigure 8-10. The column names identify the information stored for each movie\
    \ location\n\n## 3.  Now that we have the column names, we can loop through the\
    \ data subarray to convert each element into an associative array using `array_combine()`.\
    \ Add the following code to the script:\n\n```\n$locations = [];\nforeach ($data['data']\
    \ as $datum) {\n    $locations[] = array_combine($col_names, $datum);\n}\n```\n\
    \nThis initializes `$locations` as an empty array and then loops through the data\
    \ subarray, passing the `$col_names` and the current array of values to `array_combine()`.\
    \ This results in the relevant column name being assigned as the key of each value.\
    \ The level of indentation of data (see Figure 8-9) indicates that the data subarray\
    \ is at the same depth as `meta` (see Figure 8-8).\n\n## 4.  `$locations` now\
    \ contains an array of associative arrays, each containing details of the more\
    \ than 1,600 movie locations listed in the JSON feed. To locate specific information,\
    \ we can use the `array_filter()` function, which takes an array and a callback\
    \ function as arguments and returns a new array of filtered results.\n\nThe callback\
    \ function takes a single argument, the current element being examined by the\
    \ filter. That means the filter criteria need to be hard-coded in the callback.\
    \ To make the callback more adaptable, I’m going to use an anonymous function\
    \ capable of inheriting a variable from the global scope. Define the search term\
    \ and the callback function like this:\n\n```\n$search = 'Alcatraz';\n$getLocation\
    \ = function ($location) use ($search) {\n    return (stripos($location['Locations'],\
    \ $search) !== false);\n};\n```\n\nThe anonymous function is assigned to a variable.\
    \ It takes a single argument but gains access to the `$search` variable through\
    \ the `use` keyword. Inside the function, the `stripos()` function performs a\
    \ case-insensitive search for the search term in the `Locations` element of the\
    \ current array. Because `stripos()` returns the position where the search term\
    \ was found, the result will be a false negative if the search term is at the\
    \ beginning (position `0`), so we need to make sure the return value isn’t a Boolean\
    \ `false`.\n\n## 5.  We can now filter the `$locations` array and display the\
    \ results like this (the finished code is in `json_03.php`):\n\n```\n$filtered\
    \ = array_filter($locations, $getLocation);\necho '';\nforeach ($filtered as $item)\
    \ {\n    echo \"{$item['Title']} ({$item['Release Year']}) filmed at {$item['Locations']}\"\
    ;\n}\necho '';\n```\n\n## 6.  Save the script and test it in a browser. You should\
    \ see the results displayed as in Figure 8-11.\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig11_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fig11_HTML.jpg)\n\
    \nFigure 8-11. The information has been filtered from more than 1,600 entries\
    \ in the JSON feed\n\n## 7.  Change the value of `$search` to the names of other\
    \ locations in San Francisco, such as Presidio or Embarcadero, to see the names\
    \ of movies shot there.\n\n# Automatically Assigning Array Elements to Variables\n\
    \nThere’s no doubt that associative arrays are extremely useful, but they have\
    \ the disadvantage of being laborious to type and embed in double-quoted strings.\
    \ Consequently, it’s common to assign associative array elements to simple variables\
    \ like this:\n\n```\n$name = $_POST['name'];\n$email = $_POST['email'];\n$message\
    \ = $_POST['message'];\n```\n\nHowever, there are ways to simplify this process,\
    \ as described in the following sections.\n\n## Using the `extract()` function\n\
    \nIn its most basic form, the `extract()` function automatically assigns the values\
    \ of an associative array to variables based on the names of their associated\
    \ keys. In other words, you *could* achieve the same result as the preceding three\
    \ lines of code by simply doing this:\n\n```\nextract($_POST);\n```\n\n### Caution\n\
    Using `extract()` to process unfiltered data from user input, such as the `$_POST`\
    \ or `$_GET` arrays, is considered a major security risk. A malicious attacker\
    \ could try to inject variables that overwrite values that you have already defined."
