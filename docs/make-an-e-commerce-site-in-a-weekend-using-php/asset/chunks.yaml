    你可以在这段代码中看到，下拉菜单是使用无序列表元素制作的。该菜单包含四个主要部分：首页、电子产品、家居 & 家具和图书。电子产品菜单有四个子菜单选项——智能手机、笔记本电脑、相机和电视。类似地，家居
    & 家具菜单显示了不同的子菜单选项。当用户通过任何子菜单选项选择了产品类别后，页面将导航到名为 `itemlist.php` 的 PHP 脚本。他们所选的产品类别也会被发送到
