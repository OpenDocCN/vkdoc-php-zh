- fmt: '# View Files Match Actions in the Controller


    View files match actions in the controller, so they must be named accordingly.
    When a controller action is called, Cake will automatically search for a corresponding
    view following a specific naming scheme. Using the Orders example, let’s say you
    wanted the user to be able to see the order before placing it. So, you create
    an action in the `orders_controller.php` file called `review`. In this action
    (which is literally a PHP function in the controller script), you pull some variables
    together and send them to the view following the MVC structure. Cake will automatically
    search for a view called `app/views/orders/review.ctp` (`.ctp` is the common extension
    for all Cake views, not `.html` or `.php`).


    Table 4-1 contains a breakdown of the naming conventions for model, controller,
    and view files. Notice that the view files are named after a matching action in
    the controller and that the folder name containing the views matches the name
    of the controller.


    **Note**: The earliest versions of Cake used the file extension `.thtml` for view
    files, but this was changed to `.ctp` for CakePHP 1.2. If you do come across older
    Cake applications, be sure to change these view files’ extensions to the now standardized
    `.ctp` extension.


    ## Table 4-1. MVC Elements and Their Naming Conventions for the `records` Database
    Table


    | Type       | File Name           | Extension | Class Name         | Directory
    Where Stored |

    |------------|---------------------|-----------|--------------------|------------------------|

    | Model      | `record`            | `.php`    | `Record`           | `app/models`           |

    | Controller | `records_controller`| `.php`    | `RecordsController`| `app/controllers`      |

    | View       | `{matches action`   | `.ctp`    |                    | `app/views/records`    |

    |            | `name in controller}`|           |                    |                        |


    ## More Than One Word in the Name


    Perhaps you need to name a database table that uses more than one word. In short,
    you can use more than one word by separating each word with an underscore. A table,
    then, containing special orders would be named something like `special_orders`,
    not `specialorders` or `specialOrders`. But, for Cake to link up to this table,
    the controllers, models, and views also need to follow suit. Camel-cased titles
    for the words tell what Cake will seek out when running the controllers, models,
    and views. See Table 4-2 for an example of what the various names would be for
    MVC elements matching up with the `list` action for a database table named `special_orders`.


    ## Table 4-2. MVC Elements’ Names for the `special_orders` Database Table


    | Type       | File Name                      | Class Name                | Directory
    Where Stored |

    |------------|-------------------------------|---------------------------|------------------------|

    | Model      | `special_order.php`           | `SpecialOrder`            | `app/models`           |

    | Controller | `special_orders_controller.php` | `SpecialOrdersController` | `app/controllers`      |

    | View       | `list.ctp`                    |                           | `app/views/special_orders`
    |


    ## Naming Other Cake Resources


    As another matter of convention over configuration, Cake divides up other important
    resources in much the same way that it does with models, views, and controllers.
    For instance, if more than one controller needed to use the same actions, then
    you could create a *component*. The controllers could essentially run an include
    of the component and run the actions as if they were individually contained in
    the controller. Other resources act in the same way.


    A view to be used by multiple views is stored in what’s called an *element*, and
    so on. Each of these resources has its own naming conventions.


    Later, you’ll make full use of each of these resources. While I’m discussing naming
    conventions in Cake, it’s worth familiarizing yourself with the conventions for
    other Cake resources.


    ### Components


    Component files contain actions or functions that can be used across all the controllers.
    A component typically aims to provide tools to accomplish a main objective. For
    example, you may want to organize a set of functions that manage all the e-mail
    your application must send. Various controllers may need to run an e-mail function
    here and there, so rather than write the e-mail process into the individual controllers,
    it’s best to house all the e-mailing in a component file. By doing so, you effectively
    keep all your e-mailing functions in one place in the same manner that by using
    models you separate out all your database functions.


    Components can be fully customized to meet your needs. In fact, a growing repository
    of third-party components are available on the Web from other Cake developers,
    which proves helpful in borrowing tasks from other projects and reducing the amount
    of code you assemble yourself.


    The file name of a component can be anything, but like models, views, and controllers,
    more than one word in the name must be separated by underscores and camel case
    when naming the class object.


    Cake comes with a built-in e-mail component, but for the sake of the previous
    example, if you were to create an e-mail component of your own, you could name
    the file `email.php` and place it in the `app/controllers/components` directory.


    In the file, you would need to create a new component class using the following
    syntax:

    ```

    class EmailComponent extends Object {

    ```

    Notice that the name of the class object is camel cased just as in the controller,
    and it extends the class `Object`. Later, you’ll assemble some customized components
    to be used in more complex applications.


    ### Helpers


    Helpers provide functionality that is used across multiple views. Imagine creating
    functions in a script that pertain only to final output. You could extend these
    functions to include various settings that would make the process repeatable throughout
    the entire application.


    Take an HTML link, for example. You could write the link in the view file manually:

    ```html

    <a href="/blog/posts/view/55">Read Post 55</a>

    ```

    However, you may want the application to manage the links and dynamically generate
    the paths. In this case, writing static HTML links would not work. Here’s where
    writing helpers or using one of Cake’s built-in helpers can dramatically save
    you time and effort. A specific link function inside a helper contains a set of
    parameters that can change depending on the specific attributes of the view (like
    the text to be linked and the destination of the link). The process of writing
    the `<a>` tag around a path, configuring a path to work with Cake’s system, and
    outputting the text to be clicked does not change, so this can be repeated whenever
    a link needs to be written. Using the HTML helper (which is a default helper in
    Cake) can accomplish this:

    ```php

    <?php echo $html->link(''Read Post 55'',''/posts/view/55'');?>

    ```

    Now, no matter where the Cake application is stored, links created by the `$html->link()`
    function will not break because their paths are checked and routed by Cake. If
    you wanted to alter the display of all links, you could go into the helper and
    rewrite the function once rather than search for each instance of a link.


    Helpers simplify HTML output in significant ways. Imagine reducing to one string
    of code a complete set of radio buttons or check boxes for an HTML form or truncating
    news articles with one line. For example, Cake’s Form helper can take an array
    of values (say, `$data`) and turn out radio buttons ready to be used and submitted
    back to the controller with one line:

    ```php

    <?php echo $form->radio(''data'');?>

    ```'
