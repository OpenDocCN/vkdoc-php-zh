  ## 数字的含义是什么？


  有趣的是，每个层对同一信息片段的解读方式不同。对于数据层来说，其存储的数字和信息毫无意义，因为它只是一个保存、管理和检索数字、字符串或其他数据类型的引擎——而不是产品数量或产品名称。在前一个例子的上下文中，产品数量
  `0` 对数据层来说只是一个简单的纯数字，没有任何意义（它仅仅是 `0`，一个 32 位整数）。


  当业务层读取这些数据时，数据才具有意义。当业务层向数据层询问产品数量并得到 `0` 的结果时，业务层将其解读为“嘿，没有库存了！”。最后，这些数据由表示层封装成漂亮的视觉形式，例如显示一个标签，上面写着：“抱歉，目前该产品无法订购。”


  即使你不太可能想禁止顾客将缺货产品加入购物车，但这个例子（如图 2-3 所示）也足以从另一个角度说明三个层各自具有不同的用途。


