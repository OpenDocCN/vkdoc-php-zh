    \ PM Page 505\n\n# 信用卡交易\n\n在启动电子商务网站之前，您需要做的最后一件事情是实现信用卡处理功能。在本章中，我们将研究如何将此功能构建到您在上一章创建的管道中。\n\
    \n我们首先探讨信用卡交易背后的理论、帮助您实现信用卡处理的各类组织，以及可能实现的交易类型。接着，我们将以两个组织为例，讨论它们交易 API（应用程序编程接口，即您访问信用卡交易功能的手段）的具体细节。之后，您将构建一个新的类库，通过一些简单的测试代码来使用这些交易\
    \ API 之一。\n\n最后，您将把该 API 与 HatShop 电子商务应用程序及订单处理管道集成。\n\n## 信用卡交易基础\n\n银行和其他金融机构使用基于\
    \ X.25 协议的安全网络进行交易，而非 TCP/IP（传输控制协议/互联网协议，这是数据在互联网上传输的主要方式）。关于 X.25，您无需了解太多，只需知道它是一种与\
    \ TCP/IP 不兼容的不同网络协议即可。因此，X.25 网络与互联网完全隔离。虽然有可能直接接入这些网络，但这不太可能是一个合理的选择。要做到这一点，您可能需要与您要使用的网络所有者进行严肃的谈判。该所有者会希望完全确定您是一位可靠的客户，有能力实施必要的安全措施来防止对其系统的攻击。因此，网络所有者不会轻易向任何人发放这些许可，因为大多数人负担不起所需的安全措施（包括将服务器锁在笼子里、每天通过安全滑道发送备份磁带、需要三个持有不同钥匙的人才能访问这些磁带，等等）。\n\
    \n另一种选择是通过网关提供商来访问这些网络。这使您能够通过互联网（使用安全协议）执行信用卡交易协议中属于您的那部分操作，同时依赖您选择的网关与 X.25\
    \ 网络进行通信。\n\n虽然这可能会产生一些费用，但网关提供商应与金融机构达成协议以保持低成本，并将节省的费用转嫁给您（在网关扣除其份额之后），因此这很可能比拥有自己的\
    \ X.25 连接要便宜得多。这种方法也可能比使用像 PayPal 这样的第三方更便宜，因为当您自行处理订单管道时，只需要最基本的功能。例如，您无需使用像\
    \ PayPal 这样的公司提供的所有订单审计功能，因为您已经在上一章中构建了所有这些功能。\n\n## 使用信用卡支付网关\n\n要与网关组织合作，您首先需要开设一个商户银行账户。在大多数银行都可以办理，您将获得一个商户\
    \ ID，用于向网关注册。下一步是找到一个合适的网关。不幸的是，这可能是一项艰巨的工作！\n\n虽然找到网关并不难，但挑战在于找到一个能力胜任且能以您可接受的价格和质量提供服务的网关。实际上，有数百家公司渴望从您的销售额中分一杯羹。在互联网上快速搜索“信用卡网关”会产生一长串结果。这些公司的网站大部分是纯粹的宣传手册——您会发现自己读了好几页文字，内容无非是宣扬他们如何最出色、最安全地从事其业务，但最终只会得到一个需要填写的表格，以便客户服务代表可以致电您“讨论您的需求”。从长远来看，您可以放心，至少您很可能只需要经历一次这个过程。"
- fmt: '# Credit Card Transactions


    You’ll probably find that most of the organizations offering this service offer
    similar packages. However, key points to look for include the banks they do business
    with (your merchant bank account will have to be at one of these), the currencies
    they deal in, and, of course, the costs.


    In this chapter, we’ll look at two of the few organizations that are easy to deal
    with — `DataCash` and `Authorize.net`.


    Table 15-1 shows some of the gateway services available.


    **Table 15-1.** Gateway Services


    | **United States** | **URL** | **United Kingdom** | **URL** |

    | --- | --- | --- | --- |

    | `Authorize.net` | `http://www.authorize.net/` | `Arcot` | `http://www.arcot.com/`
    |

    | `First Data` | `http://www.firstdata.com/` | `WorldPay` | `http://www.worldpay.com/`
    |

    | `Cardservice` | `http://cardservice.com/` | `DataCash` | `http://www.datacash.com/`
    |

    | `ICVerify` | `http://www.icverify.com/` | | |


    ## DataCash and Authorize.net


    In this chapter, we’ll demonstrate implementing credit card transactions with
    two online services: `DataCash` and `Authorize.net`.


    `DataCash` is a UK-based credit card gateway organization. You’ll need a UK merchant
    bank account if you want to use it in your final application. However, you don’t
    have to worry about this for now: it’s very easy to get access to a rather useful
    test account — you don’t even need a merchant bank account.


    `Authorize.net`, as mentioned on its official web site at `http://www.authorize.net`,
    “provides Internet Protocol (`IP`) payment gateway services that enable merchants
    to authorize, settle and manage credit card or electronic check transactions anytime,
    anywhere.” In other words, `Authorize.net` also offers the services that you need
    to process the credit cards yourself when someone buys one of your hats.


    The important point to remember is that the techniques covered in this chapter
    apply to every credit card gateway. The specifics might change slightly if you
    switch to a different organization, but you’ll have done most of the hard work
    already.


    As you’ll see later in this chapter, both `Authorize.net` and `DataCash` let you
    perform test transactions using so-called “magic” credit card numbers (supplied
    separately by `Authorize.net` and `DataCash`), which will accept or decline transactions
    without performing any actual financial transactions. This is fantastic for development
    purposes because you don’t want to use your own credit cards for testing!


    > **Note** The authors of this book are in no way affiliated with `Authorize.net`
    or `DataCash`.


    ## Understanding Credit Card Transactions


    Whichever gateway you use, the basic principles of credit card transactions are
    the same. First, the sort of transactions you’ll be dealing with in an e-commerce
    web site are known as Card Not Present (`CNP`) transactions, which means you don’t
    have the credit card in front of you, and you can’t verify the customer signature.
    This isn’t a problem; after all you’ve probably been performing `CNP` transactions
    for some time now online, over the phone, by mail, and so on. It’s just something
    to be aware of should you see the `CNP` acronym.


    Several advanced services are offered by various gateways, including cardholder
    address verification, security code checking, fraud screening, and so on. Each
    of these adds an additional layer of complexity to your credit card processing,
    and we’re not covering those details here. Rather, this chapter provides a starting
    point from which you can add these services if required. Whether to choose these
    optional extra services depends on how much money is passing through your system
    and the trade-off between the costs of implementing the services and the potential
    costs if something goes wrong that could have been prevented by these extra services.
    If you are interested in these services, the “customer service representative”
    mentioned previously will be happy to explain things.


    You can perform several types of transactions, including:


    - **Authorization:** Checks card for adequate funds and performs deduction.

    - **Pre-authorization:** Checks cards for funds and allocates them if available,
    but doesn’t deduct them immediately.

    - **Fulfillment:** Completes a pre-authorization transaction, deducting the funds
    already allocated.

    - **Refund:** Refunds a completed transaction or simply puts money on a credit
    card.


    Again, the specifics vary, but these are the basic types.


    In this chapter, you’ll use the pre/fulfill model, which means you don’t take
    payment until just before you instruct your supplier to ship goods. This has been
    hinted at previously by the structure of the pipeline you created in the previous
    chapter.


    ## Working with DataCash


    Now that we’ve covered the basics, let’s consider how you’ll get things working
    in the `HatShop` application using the `DataCash` system. The first thing to do
    is to get a test account with `DataCash` by following these steps:


    1. Go to `http://www.datacash.com/`.

    2. Head to the `Support – Integration Info` section of the web site.

    3. Enter your details and submit.

    4. From the email you receive, make a note of your account username and password,
    as well as the additional information required for accessing the `DataCash` reporting
    system.


    Normally, the next step would be to download one of `DataCash`’s toolkits for
    easy integration. However, because `DataCash` doesn’t provide a `PHP`-compatible
    implementation, you need to use the `XML` API for performing transactions. Basically,
    this involves sending `XML` requests to a certain URL using an SSL connection
    and then deciphering the `XML` result. This is easy to do in `PHP` if you have
    the `CURL` (Client URL Library Functions) library installed on your computer,
    and `PHP` is aware of it (see Appendix A).


    You’ll be doing a lot of `XML` manipulation when communicating with `DataCash`
    because you’ll need to create `XML` documents to send to `DataCash` and to extract
    data from `XML` responses. In the following few pages, we’ll take a quick look
    at the `XML` required for the operations you’ll be performing and the responses
    you can expect.


    ### Pre-Authentication Request


    When you send a pre-authentication request to `DataCash`, you need to include
    the following information:


    - `DataCash` username (known as the `DataCash Client`)

    - `DataCash` password

    - A unique transaction reference number (explained later in this section)

    - The amount of money to be debited

    - The currency used for the transaction (`USD`, `GBP`, and so on)

    - The type of transaction (the code `pre` for pre-authentication, and the code
    `fulfil` for fulfillment)

    - The credit card number

    - The credit card expiry date

    - The credit card issue date (if applicable to the type of credit card being used)

    - The credit card issue number (if applicable to the type of credit card being
    used)


    The unique transaction reference number must be a number between 6 and 12 digits
    long, which you choose to uniquely identify the transaction with an order. Because
    you can’t use a short number, you can’t just use the order ID values you’ve been
    using until now for orders. However, you can use this order ID as the starting
    point for creating a reference number simply by adding a high number, such as
    `1,000,000`. You can’t duplicate the reference number in any future transactions,
    so you can be sure that after a transaction is completed, it won’t execute again,
    which might otherwise result in charging the customer twice. This does mean, however,
    that if a credit card is rejected, you might need to create a whole new order
    for the customer, but that shouldn’t be a problem if required.'
