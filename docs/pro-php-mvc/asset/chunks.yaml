    \ form values. Where it differs is in what it saves. The `registerAction()` method\
    \ saves a new user to the database, while the `settingsAction()` method updates\
    \ the user row indicated by the session ID value (which is used in the `_getUser()`\
    \ method).\n\n# The `searchAction()` Method\n\nThe `searchAction()` method accepts\
    \ a few query parameters and returns an array of matched user rows, which are\
    \ presented in the `search.phtml` template.\n\nThese are all the methods and templates\
    \ needed to build our sample application in Zend Framework. By comparison, the\
    \ code we needed in this chapter was more succinct than the CodeIgniter equivalent,\
    \ and this is indicative of the ease with which classes are autoloaded, as opposed\
    \ to having to manually load models, libraries, and views.\n\n# Questions\n\n\
    1. Zend Framework’s ORM model is different from CodeIgniter’s and even our framework.\
    \ Where we have a connector and query, CodeIgniter has a simple query interface\
    \ and Zend Framework has both table adapters and model classes. What are the benefits\
    \ and drawbacks of this approach?\n\n2. Zend Framework loads views automatically\
    \ (based on controller and action names) as does our own framework, where CodeIgniter\
    \ requires explicit view loading. What are the benefits and drawbacks of this\
