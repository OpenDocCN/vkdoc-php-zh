    data blocks are usually encrypted in sequence, and calculating the encrypted values
    for one sequence of bits involves using some data from the preceding sequence
    of bits. Because there are no such values at the start of encryption, an IV is
    used instead. For AES encryption (Rijndael_128), the IV and the key must be 32
    bytes long.


    ■**Note** At http://en.wikipedia.org/wiki/Block_cipher_modes_of_operation, you
    can learn more about the various modes of encryption.


    The general steps required for encrypting a string are as follows: **1.** Create
    a 32-byte random IV.


    **2.** Convert the IV (which you keep as a hexadecimal string) into a byte array.


    **3.** Encrypt the string using AES encryption by supplying the IV in byte array
    format.


    **4.** Convert the resulting encrypted data from a byte array into a hexadecimal
    string.


    Decryption follows a similar scheme:


    **1.** Convert the IV (which you keep as a hexadecimal string) into a byte array
    (the same with the encryption first step).


    **2.** Convert the string to decrypt into a byte array.


    **3.** Decrypt the binary string from the previous step by supplying the IV in
    a byte array.


    In your code, you’ll use AES, but the code in the SymmetricCrypt class can be
    modified to use any of the supported encryption algorithms.


    **Exercise: Implementing the SymmetricCrypt Class**


