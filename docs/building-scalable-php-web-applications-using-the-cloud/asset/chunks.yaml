  trans: '

    # 7.6 数据分片


    数据库可扩展性的另一个选择是数据*分片*。数据库分片的概念相对简单——它意味着你以某种方式对数据进行分区，使得并非所有数据都依赖于同一个数据库系统。


    例如，你可以这样分片：所有姓名以“A”和“B”开头的客户放在一个数据库中，所有姓名以“C”和“D”开头的客户放在另一个数据库中，以此类推。你可以根据自己偏好的任何方法对数据进行分区，只要系统能够轻松判断需要查询哪个数据库即可。其核心在于，数据本身被拆分到不同的数据库系统中，而不是由同一个数据库系统管理所有内容。


    在这种系统中，通常要么由应用程序负责分片，要么存在一个中间层来处理将连接引导至相应数据库的工作。一些较新的工具已经开发出来，例如`pg_shard`，它旨在作为一个数据库插件无缝运行。


    无论如何，分片会带来一整套数据管理和数据完整性问题。数据库的要点之一便是确保数据的一致性。而分片本质上为了达到扩展性，移除了数据库所提供的许多保护机制。因此，务必清楚自己为何要分片以及如何分片，以**将风险降至最低**。


    例如，如果你将客户数据分片到不同的数据库，你也应该将相关的记录一起分片，这样客户及其记录都由同一个数据库服务和管理。想象一下，如果你需要从备份中恢复记录，但某些相关记录却存在于另一个不同的数据库系统中！


    分片工作量很大，需要大量规划，并且高度依赖于你的使用和工作负载的具体情况，因此很难泛泛而谈。尽管如此，如果你在寻找更多扩展数据库的方法，分片绝对是一个选项。分片还可以与其他方法协同工作，例如主-从复制或多主复制，但同样，这需要大量的额外关注、维护和管理才能使其良好运行。


    如果你的登录组不共享任何数据，分片会更容易。例如，假设你构建了一个电子邮件营销系统。在此类系统中，不同客户很少共享数据。因此，将他们的记录完全分开存储毫无问题。


    你甚至可以运行几个完全独立的云，每个云服务于一组不同的客户。来自客户 A、B、C、D 的登录请求会被分发到云 1，来自客户 E、F、G、H 的登录请求会被分发到云
    2，以此类推。如果这些云都是完全独立管理的，这种设置还能在一定程度上缓解灾难，因为不太可能所有数据中心同时完全瘫痪。


    # 8. 使用内容分发网络


    到目前为止，我们为云应用所做的扩展努力主要集中在动态内容的服务上（即从数据库查询中获取的内容）。然而，对于许多网站来说，动态内容实际上只是其系统中很小的一部分。事实上，在任何网站上，绝大多数的请求甚至都不是针对你的动态内容的，而是针对你的静态内容——你的图片、样式表和
    JavaScript。因此，在寻找扩展云应用的方法时，切记不要忘了同时扩展你的静态资源。


    你可以通过创建更多的前端 Web 服务器来扩展静态资源，因为通常这些服务器也负责提供静态资源。然而，这样做成本会更高（你需要保持更多服务器在线），也更难管理（节点更多意味着管理更复杂）。


    扩展静态资源实际上比扩展动态资源要容易得多，因为你无需过多担心资源变更时会发生什么。因此，有专门为扩展静态资源而构建的服务。这种扩展静态资源交付的服务被称为“内容分发网络”（CDN）。


    ## 8.1 CDN 如何工作？


    大多数 CDN 的工作方式是它们拥有一个*全球*分布的内容服务器网络。假设你有一个 10MB 的图片想要通过 CDN 来提供。通常，如果用户直接向你的服务器请求这张图片，那么你的服务器会将处理时间和带宽耗费在发送这
    10MB 图片上。如果用户位于大洋彼岸，那还会带来额外的问题，因为你的服务器将浪费大量资源来管理一条缓慢且嘈杂的连接。


    CDN 允许你将用户重定向到 CDN 上该图片的 URL。CDN 在第一次看到该 URL 时，通常对图片一无所知，但它有规则告诉它如何在你自己的服务上找到原始图片。从那时起，在
    CDN 第一次抓取到图片之后，每次有其他用户请求该图片，CDN 都会负责将图片传递给用户，而完全不必经过你的服务器。


    此外，大多数 CDN 的服务器分布在许多不同的物理位置。这些位置被称为“存在点”（Points of Presence，PoPs），那里的服务器通常被称为“边缘服务器”（因此
    CDN 也常被称为“边缘缓存”）。通过在多个 PoP 使用边缘服务器，CDN 不仅可以通过大量服务器提供扩展能力，边缘服务器还能让 CDN 提供*在地理位置上更靠近*用户的服务器。如果用户可以从附近的服务器获取大量数据，而无需跨越大洋去检索，这将大大提升用户体验。


    对于任何知名的 CDN 来说，它们实际上可以为提供静态资源提供无限的扩展能力——你无需担心会超出其网络负载。只要资源不发生变化，CDN 就能完美处理对该资源的任意数量的请求。


    通常，CDN 的主要成本在于带宽。然而，许多 CDN 的带宽成本比云服务器要低。现在，使用 Linode，你得拥有一个流量极大的网站才能用尽你套餐内包含的带宽。不过，如果真的超出了，通过
    CDN 提供的带宽费用会稍低一些。无论如何，即使你的服务器套餐包含了足够的带宽，CDN 带来的扩展性提升所带来的好处通常也值得付出那点微小的代价，因为你无需持续运行服务器来应对可能到来也可能不来的流量。你只需为实际使用的带宽付费。'
- fmt: '# 8.2 Setting Up a Simple CDN


    Thankfully, most CDNs are extremely easy to set up. In this book, we will use
    Amazon’s CloudFront as the CDN, though many other options exist (CloudFlare, StackPath,
    CDN77, and Fastly, just to name a few). The nice thing about CDNs is that, since
    the service they provide is fairly transparent, it is easy to mix and match service
    providers for CDNs.


    The way that CloudFront works is very simple:


    1. You host all of the static content on your main site. This is the “official”
    repository of your content.

    2. You create a host on CloudFront to serve your content from (usually this will
    have a name such as `xyzabc.cloudfront.net`).

    3. You tell the CloudFront server the URL of your main site.

    4. Every time you link to static content from your site, you link to it using
    the CloudFront URL, rather than linking to the content on your own server. For
    instance, if your image was at `http://mysite.example.com/mydirectory/myimage.png`,
    when you linked to it, you would use the URL `http://xyzabc.cloudfront.net/mydirectory/myimage.png`.
    CloudFront will know from your configuration how to find `myimage.png` and will
    cache it and serve it to your users.


    The first time that CloudFront receives the request for the image, it will go
    to your site to grab it. Then, going forward, any future requests will be served
    directly by CloudFront using a server near to the user requesting the image.


    Let’s look at how to actually do this using Amazon AWS and CloudFront. The first
    thing you will need to do is sign up for AWS at `http://aws.amazon.com`. I am
    going to assume that you can do the signup process without me.


    AWS has an overwhelming number of available services, such that the dashboard,
    rather than listing them all, has you search for one. Type “CloudFront” into the
    search bar, and it will then allow you to proceed to the CloudFront Dashboard.


    Since this is your first time to use CloudFront, it will simply give you a button
    which says, “Create Distribution.” In CloudFront terms, a *distribution* is simply
    a CDN replicator service.


    After you click “Create Distribution,” CloudFront will ask you for your delivery
    method and give you a choice of “Web” or “RTMP.” RTMP is the protocol used for
    streaming large amounts of video content. However, since we are just distributing
    basic assets like images and stylesheets, we will choose to get started with basic
    Web delivery.


    Amazon then asks for details about your distribution, as shown in Figure 8-1.
    There are actually a host of additional options below these, but the only required
    field is the “Origin Domain Name,” which is the DNS hostname of the site you want
    CloudFront to get its assets from. This *cannot* be an IP address, but must be
    a DNS hostname of some sort. If you have not set up a DNS hostname for your application,
    you can just use one of the automatically generated ones from Linode. If you go
    to the Node Balancer screen in Linode and click your balancer, it will give you
    an (very long, possibly split across two lines) internally generated hostname
    for your balancer (something like `nb-BALANCER-PUBLIC-IP-ADDRESS.dallas.nodebalancer.linode.com`).
    After filling out the “Origin Domain Name,” scroll way down to the bottom of the
    page.


    ![../images/487291_1_En_8_Chapter/487291_1_En_8_Fig2_HTML.jpg](images/487291_1_En_8_Chapter/487291_1_En_8_Fig2_HTML.jpg)


    Figure 8-2: List of CloudFront Distributions


    ![../images/487291_1_En_8_Chapter/487291_1_En_8_Fig1_HTML.jpg](images/487291_1_En_8_Chapter/487291_1_En_8_Fig1_HTML.jpg)


    Figure 8-1: Creating a CloudFront Distribution


    At the bottom of the page, there is a “Create Distribution” button. After you
    click this button, you will land in a list of distributions showing your new distribution,
    similar to Figure 8-2. The most important part of this screen is the “Domain Name,”
    which shows you how to access your newly created distribution (you may need to
    adjust the size of the field in order to see the whole name). It will also give
    you a status, which takes anywhere from 5 minutes to an hour to move from “In
    Progress” to “Deployed.” Once it is deployed, you have a CDN up and running!


    ## 8.3 Using Your CDN


    Once the status has changed to “Deployed,” this domain name will now fully mirror
    your original site. However, it will only be a static version of your site. If
    your site changes, CloudFront *will not* update its assets unless you tell it
    to.


    Let’s say that the domain name that CloudFront gave you was `xyzabc.cloudfront.net`.
    This means that if you go to `http://xyzabc.cloudfront.net/list.php`, it will
    show you your guestbook list. However, if you then go and modify your guestbook
    list, those changes will not be reflected on your CDN—it treats everything as
    a static asset. That’s why, for the most part, CDNs serve up only static assets—images,
    stylesheets, JavaScript, and the like.


    Therefore, instead of accessing the whole site through the CDN, let’s modify the
    application to serve up just our stylesheet through the CDN. All we have to do
    is modify one line of `common.php`. In the `getHeader()` function, we simply need
    to change the `<link>` tag to read:


    ```

    <link rel="stylesheet" type="text/css" href="http://xyzabc.cloudfront.net/style.css"
    />

    ```


    Be sure to replace `xyzabc.cloudfront.net` with the domain name of your distribution!
    Once this is deployed on all of the servers, then your stylesheet will now be
    served from the CDN.


    ![../images/487291_1_En_8_Chapter/487291_1_En_8_Fig3_HTML.jpg](images/487291_1_En_8_Chapter/487291_1_En_8_Fig3_HTML.jpg)


    Figure 8-3: Removing Content from the CDN


    This means that your server will almost never again serve up the stylesheet. Occasionally,
    the CDN may expire some of its cached content, but that is up to the CDN. The
    CDN will optimize for itself how much data it stores for how long, and how often
    it re-requests your original files. For more advanced applications, you can configure
    Apache to supply either an `Expires:` HTTP header or a `Cache-Control:` HTTP header
    to specify a maximum amount of time that the CDN should hold your data.


    However, let’s say that you deployed a new version of your application which actually
    did have an updated stylesheet. This means that the version the CDN is serving
    up for you is now out of date—it probably still has the old version in its cache.
    This is not a problem at all, it just means that you need to manually tell the
    CDN to “invalidate” your content so that it will request it again.


    To invalidate content on the CloudFront CDN, start by clicking the ID of your
    CloudFront distribution. This will bring you to an information page describing
    all of the options that are set on your distribution. Toward the far right, there
    is a tab titled “Invalidations.” Click this tab, and then click “Create Invalidation.”
    This will bring you to a screen similar to Figure 8-3. In the “Object Paths” field,
    just clear out anything that is there, and type only `/*` to invalidate everything.
    While CloudFront allows you fine-grained access to invalidate and remove specific
    items from the CDN, I find that, for most situations, simply invalidating the
    whole thing is easier and cleaner. Click the “Invalidate” button to make it so.


    It may take several minutes for the invalidation to spread across all of CloudFront’s
    servers, but in short order all of the servers will be serving your new content.
    You will know when it is done when the “Status” of the invalidation changes to
    “Completed.”'
