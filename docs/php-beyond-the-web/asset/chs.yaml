  \n## 附录 C：帮助来源\n\n即使市面上有像本书这样优秀的书籍，当你在 PHP 中遇到棘手问题时，有时仍需要一些额外的帮助。以下是一些可能的帮助来源。\n\
  \n\n\n### PHP 手册\n\n官方 PHP 手册可以在线查看，地址为 [`php.net/docs.php`](http://php.net/docs.php)。该手册主要提供了关于\
  \ PHP 安装、语法、函数及许多扩展的相当全面的文档。特别值得注意的是每页底部的用户评论。这些评论通常很有帮助，并提供了与页面函数或主题相关的实际应用建议。不过，评论中偶尔也会出现一些无用的建议，但这通常会由后续的评论进行纠正或提及，因此，值得通读特定页面上的所有评论。\n\
  \n在线手册有一个便捷功能：您可以通过将函数或主题作为 URL 的第一部分输入，来快速查找它。例如，如果您不记得 `strripos()` 函数的参数，只需在浏览器中输入\
  \ [`php.net/strripos`](http://php.net/strripos)，即可直接跳转到相关页面。同样，如果您想快速回顾 PHP 如何处理数组，请访问\
  \ [`php.net/array`](http://php.net/array)，您将直接转到手册语言/类型部分中的数组页面。\n\n如果您并非时刻都能联网，也可以从\
  \ [`www.php.net/download-docs.php`](http://www.php.net/download-docs.php) 下载手册的副本。手册提供\
  \ HTML 格式、Unix 风格的手册页 (man pages) 以及 Microsoft 编译的 HTML 帮助手册 (CHM) 格式。\n\n### 官方邮件列表\n\
  \n在 [`php.net/mailing-lists.php`](http://php.net/mailing-lists.php) 上有许多官方邮件列表，涵盖了各种主题。其中，用于获取帮助的值得注意的是\
  \ **“一般用户列表”**（用于一般性查询）和 **“Windows PHP 用户列表”**（用于 Windows 特定问题）。请注意，如果您订阅了某些列表，它们的邮件量会相当大，您每天会收到大量邮件。如果您只是想浏览一下，或者想了解每个列表的邮件量有多大，可以查阅其在线存档。\n\
  \n### Stack Overflow\n\n如果您不熟悉 Stack Overflow ([`stackoverflow.com`](http://stackoverflow.com))，它是一个面向程序员、内容丰富的\
  \ **“问答”** 网站。与某些问答网站不同，您无需注册或付费即可查看问题答案，广告也有限，并且该网站上已有数百万个已解答的问题。这其中包括大量 PHP 相关的问题。\n\
  \n所有问题和答案都带有主题 **“标签”**，方便您找到与自己相关的内容。要浏览标记为 PHP 的问题，请访问 [`stackoverflow.com/questions/tagged/php`](http://stackoverflow.com/questions/tagged/php)。您也可以使用该网站的搜索功能，并在搜索词中添加\
  \ `[tag]` 来将搜索范围缩小到仅限 PHP 相关的答案。例如，如果您想搜索关于 `date` 函数的问题（`date` 是一个常见的英语单词，也是许多编程语言中常见的函数名），请搜索\
  \ `[php] date`，以便仅获取 PHP 特定的信息。\n\n在撰写本文时，标记为 “php” 的问题有 724,633 个，同时标记为 “php” 和\
  \ “command-line” 的有 588 个，同时标记为 “php” 和 “cli” 的有 601 个。版主通常能很快关闭重复的问题，因此从这些数字您可以看出，这里有大量可用的相关信息。\n\
  \n### 其他书籍\n\n虽然您可能认为这本书是您唯一需要的 PHP 书籍，但据我所知，市面上可能还有其他 PHP 书籍。虽然我无法具体推荐哪一本（除了我在相关章节中已经提到的那些），但如果您浏览任何大型书商，都会发现大量\
  \ PHP 相关的书籍。如果您确实想购买另一本书，并希望支持 PHP.net 项目，请通过 [`php.net/support.php`](http://php.net/support.php)\
  \ 的图书板块中的链接前往一家知名书店，在您通过该链接购买任何商品后，PHP.net 将会获得一笔佣金。\n\n### 新闻组\n\nPHP 在 [`news.php.net/`](http://news.php.net/)\
  \ 上有一组官方的新闻组，已列出并归档，涵盖了广泛的 PHP 主题领域。这些新闻组值得一逛，有时也能对查询的问题获得回应（尽管某些内部列表绝对不适合胆小者）。\n\
  \n### PHP Subreddit\n\nReddit.com 上的 PHP “Subreddit” 分区 ([`www.reddit.com/r/PHP/`](http://www.reddit.com/r/PHP/))\
  \ 是 PHP 新闻、观点、有用链接和求助请求的混合体。虽然这里通常有真正有趣的内容和对问题有用的回复，但偶尔也会遇到一些网络喷子和不帮忙/粗鲁的人。\n\n\
  ### PHP 在 Github 上\n\n有时，解决问题的最佳方法是查看其他人编写的类似代码。流行的源代码仓库网站 Github 上有海量的代码可供研读。您可以在\
  \ [`github.com/search`](https://github.com/search) 搜索所有代码仓库，并使用搜索词中的修饰符 `language:php`\
  \ 将结果缩小到使用我们喜爱语言的项目。如果您只是想关注当前哪些 PHP 项目比较流行，可以查看 [`github.com/trending?l=php`](https://github.com/trending?l=php)\
  \ 上的 PHP 趋势榜。\n\n### PHP 新闻网站\n\n虽然通常不能直接提供帮助，但 PHP 新闻网站和邮件列表可以让您及时了解必要的动态，例如安全警报、有用且有趣的文章，以及关于新项目、库和教程的公告——这些可能是您未曾意识到的需求！以下列出了一些比较受欢迎的网站。\n\
