    # 实现身份验证


    对用户进行身份验证意味着判断访问者是否已在电子商务网站上注册。实现身份验证包含两个步骤：


    您已经学习了如何显示并执行一个脚本，让访问者能够在您的网站上注册并创建账户。为了验证访问者是否已注册，系统会提供一个登录表单，提示他们输入有效的电子邮件地址和密码。当用户输入电子邮件地址和密码后，点击登录表单中的“提交”按钮，就会被引导至另一个脚本，该脚本访问
    `customers` 表，并确认是否存在与所提供电子邮件地址和密码匹配的客户（行）。如果存在与指定电子邮件地址和密码匹配的客户，则表明该访问者已在您的网站注册，屏幕上将显示一条欢迎消息。如果
    `customers` 表中没有与所提供电子邮件地址和密码匹配的行，则表明该访问者尚未在您的网站注册，或输入了错误的信息。因此，系统会向访问者提供两个链接供其选择——一个引导他们创建新账户，另一个允许他们重新尝试登录。


    名为 `signin.php` 的 PHP 脚本如代码清单 2-14 所示。它执行实现身份验证的第一步——显示登录表单。


    **代码清单 2-14.** 用于显示登录表单的 `signin.php` 脚本


    ```

    <html>

    <head>

    </head>

    <body>

    <form action="validateuser.php" method="post">

    <table border="0" cellspacing="1" cellpadding="3">

    <tr><td>电子邮件地址：</td><td><input type="text" name="emailaddress"></td></tr>

    <tr><td>密码：</td><td><input type="password" name="password"></td></tr>

    <tr><td colspan=2 align="center"><input type="submit" name="submit" value="登录"></td></tr>

    </table>

    </form>

    </body>

    </html>

    ```


    该脚本向访问者显示两个文本框，一个用于输入电子邮件地址，另一个用于输入密码（见图 2-10）。用户输入电子邮件地址和密码并点击“提交”后，表单中输入的信息将被赋值给
    `$_POST` 数组，并发送至 `validateuser.php` 脚本，以检查 `customers` 表中是否存在与所提供电子邮件地址和密码匹配的用户。


    ![A978-1-4842-1672-9_2_Fig10_HTML.jpg](img/A978-1-4842-1672-9_2_Fig10_HTML.jpg)


    **图 2-10.** 提示用户输入有效电子邮件地址和密码的登录表单


    名为 `validateuser.php` 的 PHP 脚本如代码清单 2-15 所示。它执行身份验证的第二步——验证访问者输入的信息是否有效。


    **代码清单 2-15.** 用于对用户进行身份验证的 `validateuser.php` 脚本


    ```

    <html>

    <head>

    </head>

    <body>

    <?php

    $connect = mysqli_connect("localhost", "root", "gold", "shopping") or die("请检查您的服务器连接。");

    $query = "SELECT email_address, password, complete_name FROM customers WHERE email_address
    like ''" . $_POST[''emailaddress''] . "'' " .

    "AND password like (PASSWORD(''" . $_POST[''password''] . "''))";

    $result = mysqli_query($connect, $query) or die(mysql_error());

    if (mysqli_num_rows($result) == 1) {

    while ($row = mysqli_fetch_array($result, MYSQLI_ASSOC)) {

    extract($row);

    echo "欢迎 " . $complete_name . " 来到我们的购物中心<br>";

    }

    }

    else {

    ?>

    无效的电子邮件地址和/或密码<br>

    尚未注册？

    <a href="validatesignup.php">点击此处</a> 进行注册。<br><br><br>

    想要重试？<br>

    <a href="signin.php">点击此处</a> 重新登录。<br>

    <?php

    }

    ?>

    </body>

    </html>

    ```


    如预期那样，建立了与 MySQL 服务器的连接，并选择了 `shopping` 数据库。编写了一条 SQL 语句用于在 `customers` 表中搜索。该
    SQL 语句检查 `customers` 表中是否存在任何一行的电子邮件地址和密码与 `$_POST` 数组中的电子邮件地址和密码匹配。回想一下，通过 `signin.php`
    脚本显示的表单中输入的电子邮件地址和密码会被赋值给 `$_POST` 数组，并导航至 `validateuser.php`。


    如果 `customers` 表中存在与所提供电子邮件地址和密码匹配的客户，则会向用户显示一条欢迎消息（见图 2-11 — 底部）。


    ![A978-1-4842-1672-9_2_Fig11_HTML.jpg](img/A978-1-4842-1672-9_2_Fig11_HTML.jpg)


    **图 2-11.** 输入错误的电子邮件地址或密码时出现的消息（顶部）以及输入正确的电子邮件地址和密码时显示的欢迎消息（底部）


    如果 `customers` 表中不存在（与访问者的电子邮件地址和密码匹配的）行，则假定访问者尚未注册，或输入了无效的电子邮件地址或密码。因此，会向访问者显示两个链接供其选择——一个用于创建新账户（`validatesignup.php`），另一个用于重新尝试登录（`signin.php`）（见图
    2-11 — 顶部）。


    ## 本章小结


