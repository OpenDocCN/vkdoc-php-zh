    # Recipe 14-3. Sharing Data with RSS


    ## Problem


    The previous example used data that are reasonable static. It is not expected
    that new planets will be discovered in our solar system anytime soon and although
    the distance from the sun and the surface temperature is varying the values are
    not changing as often as the headlines on a news blog. In addition the example
    used valid XML for the list of planets and data, but without additional information
    about the content a consumer will not be able to use the data. How is it possible
    to share data that is easy to consume by multiple clients?


    ## Solution


    The use of XML is a good step in the right direction. Adding a predefined schema
    for the XML makes it possible for various clients to consume the data. There are
    many standards for how to use XML, either for specific purposes like a news summary
    or more generic uses. One of these is called Rich Site Summary or Really Simple
    Syndication : in short, RSS. There are a number of variants of the schemas used
    but the two most popular are called RSS 2.0 and Atom 1.0.


    The two schemas provide almost the same values but use different tag names. Many
    browsers and e-mail clients have support for the RSS formats and there are a number
    of dedicated reader applications available too. Some of these have been discontinued
    due to the declining popularity of the RSS format.


    ## How it Works


    The top-level element of a RSS feed is called `<rss></rss>` and it is typically
    written with a `version` attribute.'
