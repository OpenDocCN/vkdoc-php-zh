    \n然后，在助手文件中，根据需要，使用 `$this->Helper` 来调用外部助手函数：  \n\n```php\n$this->Html->link('使用外部函数','/');\n\
    ```\n\n### 为您的博客创建一个助手  \n\n让我们为您的博客构建一些自定义函数。第一个函数将简化带有 Ajax 投票链接的评论的显示。为此，您首先需要创建助手本身。创建一个名为\
    \ `app/views/helpers/blog.php` 的新文件。在其中，按如下方式创建新的 `BlogHelper` 类：  \n\n```php\n\
    <?\nclass BlogHelper extends AppHelper {\n\n}\n?>\n```\n\n#### 包含 Ajax 助手  \n\n\
    回想一下，您已经在 `app/views/`\n"
- fmt: '# `posts/view.ctp` File


    To reduce this comments section into one line in the view, you can bring them
    into the `$blog->comments()` function. Notice, though, that the Ajax helper is
    already being used for the voting links. To make this helper’s functions available
    in the Blog helper, you’ll need to include the Ajax helper before creating the
    `$blog->comments()` function. On line 3 of the `app/views/helpers/blog.php` file,
    insert the following line:


    ```

    var $helpers = array(''Ajax'');

    ```


    ## Writing the Comments Function


    Now that the Blog helper file is sufficiently prepared, let’s create the `$blog->comments()`
    function (see Listing 9-3). Copy and paste lines 9–23 of the `app/views/posts/view.ctp`
    file (the comments loop) into this function with a little bit of processing around
    it as a starting point; then, you’ll add some parameters and functionality into
    this function to make it portable to other areas of the site, if need be.


    **Listing 9-3.** *The* `$blog->comments()` *Function in the Blog Helper*


    ```

    1 function comments($comments=null) {

    2   if (!empty($comments)) {

    3     $out = null;

    4     foreach($comments as $comment) {

    5       $out .= ''<div class="comment">

    6         <div id="vote_''.$comment[''Comment''][''id''].''">

    7           <div class="cast_vote">

    8             <ul>'';

    9       $out .= $this->Ajax->link(''<li>up</li>'',''/comments/vote/up/''.➥

    $comment[''Comment''][''id''],array(''update''=>''vote_''.$comment[''Comment''][''id'']),➥

    null,false);

    10      $out .= $this->Ajax->link(''<li>down</li>'',''/comments/vote/➥

    down/''.$comment[''Comment''][''id''],array(''update''=>''vote_''.$comment➥

    [''Comment''][''id'']),null,false);

    11      $out .= ''</ul>

    12        </div>

    13        <div class="vote">''.$comment[''Comment''][''votes''].''</div>

    14      </div>

    15      <p><b>''.$comment[''Comment''][''name''].''</b></p>

    16      <p>''.$comment[''Comment''][''content''].''</p>

    17    </div>'';

    18    }

    19    return $this->output($out);

    20  } else {

    21    trigger_error(sprintf(''No comments found'', get_class($this)),➥

    E_USER_NOTICE);

    22  }

    23 }

    ```


    In Listing 9-3, I’ve essentially translated the loop from the Posts view to be
    returned by the helper function. Using the `$out` variable, I’m able to loop through
    the `$comments` variable and catch all the iterations into this one array. Then
    on line 19, the final output of `$out` gets returned to the view. Notice that
    on line 19 I’ve used the `output()` function. This is a basic return function
    for handling the final output; it can be overridden in other subclasses for post-processing.
    When unaffected by post-processing methods, it will return the passed variable
    as is.


    Line 21 uses the `trigger_error()` function to pass an error if no comments are
    passed to the helper function. This line passes the class itself (as `$this`)
    to be used in a debugging message.


    Now that you’ve made the `$blog->comments()` function, let’s use it in the view.
    In the App controller load the Blog helper in the `$helpers` array:


    ```

    var $helpers = array(''Html'',''Form'',''Ajax'',''Javascript'',''Blog'');

    ```


    Next, in the `app/views/posts/view.ctp` file, replace the comments loop on lines
    9–23 with one line:


    ```

    <?=$blog->comments($comments);?>

    ```


    Refresh the Posts view, and you should see nothing change; this is good since
    it means that the helper is working properly.


    ## Comparing Helpers and Elements


    The current `$blog->comments()` function is not much different than an element;
    it essentially takes a variable and creates some view markup around it, which
    can be used in multiple views if necessary. A fundamental difference between helpers
    and elements should be noted, however. As it is, the `$blog->comments()` function
    really should be placed in an element rather than a helper for a couple reasons:


    - Elements provide display markup to be used across multiple views without much
    logic; helpers generally include more logic tests and methods.

    - Helpers are usually adaptable for any type of application, whereas elements
    are more specific to its application.'
