    **Search-Engine Optimization**


    While we are not looking to achieve high search-engine rankings with this particular
    web application (after all, it’s not a real-world web site we are developing),
    we will still aim to develop our code in a way that is optimal for search engines.
    This means that if you choose to extend the application developed in this book,
    a strong basis for search-engine ranking will have been formed.


    Specifically, this means the following:


    • Using friendly URLs. A friendly URL is basically a URL that doesn’t contain
    a lot of extraneous characters. For example, if you had a document called “About
    Us,” a URL


    such as [http://www.example.com/about-us would be user fr](http://www.example.com/about-us)iendly,
    while a URL such as


    [http://www.example.com/documents.php?id=1234 would not be so fr](http://www.example.com/documents.php?id=1234)iendly.


    • Correctly using HTML markup (such as headings, paragraphs, and tables).


    • Correctly using HTTP status codes and content types (where relevant).


    **PHPDoc-Style Commenting**


    All classes we develop will be commented using PHPDoc-style comments, allowing
    us to easily build API documentation for all our classes. PHPDoc is based on Sun’s
    Javadoc system, which is a simple method of commenting all functions, arguments,
    variables, and packages so developers can easily reuse them.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch01CMP2 10/20/07 1:47 PM Page 6


    **6**


    C H A P T E R 1 ■ A P P L I C AT I O N P L A N N I N G A N D D E S I G N


    While this is not essential for the development of our web application, it is
    a good habit to get into when developing. Additionally, you may find it useful
    when following code examples in this book to have a PHPDoc comment block before
    each function.


    ■**Note** The code displayed in this book typically won’t include any PHPDoc comments
    since listings will be described in the text; however, they will be included in
    the downloadable code for this web application where possible.


    PHPDoc works by placing a block of comments before each function, class, or variable
    definition. It is not mandatory in all situations—only where you feel it is necessary.


    Each comment block begins with a description, and then is followed by a series
    of one or more optional parameters. For example, when adding PHPDoc comments to
    a function, you specify the input parameters and return value data. Obviously,
    the PHPDoc comments you would write for a variable definition would contain different
    information.


    The following code shows an example of a PHPDoc comment for a simple user-defined
    function:


    <?php


    /**


    * mySimpleFunction


    *


    * A simple function to return a friendly message


    * to the user based on their name and age


    *


    * @param string $name The name of the user


    * @param int $age The age of the user


    * @return string The generated welcome message


    */


    function mySimpleFunction($name, $age)


    {


    $str = sprintf(''Hello %s, your age is %d'', $name, $age);


    return $str;


    }


    ?>


    The first thing to note is how the block of comments begins. The /** token indicates
    to the PHPDoc parser that a PHPDoc comment block is beginning.


    The first line of the block is a short description. My own personal preference
    here is to simply use the name of the function, class, or variable.


    The next section in the comment block is a longer description. Here I try to describe
    what the function, class, or variable does from a black-box perspective. That
    is, what it does, not how it works. Any specific functionality considerations
    or funky logic that takes place is dealt with in standard comments within the
    code.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch01CMP2 10/20/07 1:47 PM Page 7


    C H A P T E R 1 ■ A P P L I C AT I O N P L A N N I N G A N D D E S I G N


    **7**


    ■**Note** Although it is not required, the usual convention is to include an asterisk
    at the beginning of each line of the /** … */ block. This is primarily to improve
    readability and to easily identify entire PHPDoc blocks.


    The final section of the comment block contains the various PHPDoc parameters
    used by the parser to link the API documentation together better and to provide
    you with useful documentation. Each parameter begins with @, directly followed
    by the name of the parameter.


    Following that is the information required for that particular parameter.


    In this example, you can see the @param and @return parameters. @param is used
    to specify aspects of the function arguments: first, the type of argument (in
    this case, our first argument is a string); next, its name (which in this case
    is $name); and finally, a brief description of what the input data should contain.
    The @return parameter is used to give information about the data returned from
    the function: the type of data is specified, followed by a brief description of
    what the return data contains.


    For more information about phpDocumentor, read the “phpDocumentor Guide to Creating
    Fantastic Documentation” at [http://www.phpdoc.org/tutorial.php.](http://www.phpdoc.org/tutorial.php)


    **Security**


    We will be looking closely at the security of our web site, as this very important
    aspect of web development is often overlooked or implemented incorrectly.


    For instance, we will focus on making sure attacks such as SQL injection, cross-site
    scripting (XSS), and cross-site request forgeries (CSRF) do not occur. This is
    especially important in sites that not only make use of JavaScript and Ajax, but
    also make heavy use of user-submitted data.


    We achieve this by correctly filtering submitted data while correctly “escaping”
    user-submitted data when it is returned to users’ browsers.


    **Application Logging**


    An aspect of development that ties in closely to both the security and performance
    considerations is that of logging. We will maintain a log file within our application
    to record significant events. For example, we will record a log entry whenever
    somebody tries to log in but provides incorrect information.


    **Maintainability and Extensibility**


    In addition to using some well-known third-party classes and libraries, we will
    also be developing our own custom classes in such a way that they can easily be
    expanded upon in the future.


    In the next section, we will consider the use of unit testing. Note that unit
    testing aids greatly in developing applications that can easily be extended (as
    well as aiding in extending the application); however, this exceeds the scope
    of the book. You should keep unit testing in mind for your own future application
    development if you don’t already use it.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


