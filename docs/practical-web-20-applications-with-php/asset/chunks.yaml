    ■**Note** My own personal preference is to use JSON data as the response to Ajax
    requests, since it’s much easier to manipulate the data. However, since we’re
    covering Ajax, it’s good to know how the X in Ajax works. As such, I will use
    XML for the main example in this chapter, but in following chapters, when we add
    Ajax functionality to our application, we will use JSON and not XML.


    JSON is used as an alternative to XML for data exchange in Ajax requests because
    it results in a much smaller payload (since there are no opening/closing tags),
    and it is typically simpler to access within JavaScript code. For example, the
    JavaScript code you might use to represent data for a book may look like this:


    var book = {


    title : ''Practical PHP Web 2.0 Applications'',


    author : ''Quentin Zervaas''


    };


