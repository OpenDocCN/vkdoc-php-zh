    \ admin.php');\n    exit;\n}\n\n// Choose what admin page to load ...\nif ($admin_page\
    \ == 'Departments')\n    $pageContentsCell = 'admin_departments.tpl';\n}\n```\n\
    \n## How It Works: The `admin_departments` Componentized Template\n\nYou wrote\
    \ a lot of code in this exercise, and you still can’t test anything. This is the\
    \ tough part about creating the UI first. Still, the code is not that complicated\
    \ if you look at it. Let’s see how the `admin_departments.tpl` template is done.\n\
    \nHere’s a scheme of the `{section}` construct used to build the rows of the table:\n\
    \n```\n{section name=cDepartments loop=$admin_departments->mDepartments}\n   \
    \ {if $admin_departments->mEditItem ==\n         $admin_departments->mDepartments[cDepartments].department_id}\n\
    \        ...\n    {else}\n        ...\n    {/if}\n{/section}\n```\n\nBy default,\
    \ the department name and description are not editable, but when you click the\
    \ Edit button of one department, `$admin_departments->mEditItem` is set to the\
    \ `department_id` value of the clicked department, and the Smarty presentation\
    \ logic generates editable text boxes instead of labels. This will allow the administrator\
    \ to edit the selected department’s details (in edit mode, Update/Cancel buttons\
    \ appear instead of the Edit button, as you saw in the earlier figures).\n\nThe\
    \ Smarty plugin function loaded from the `admin_departments` template (in `load_admin_departments.php`)\
    \ is executed whenever the user clicks any of these buttons and reacts to the\
    \ visitor’s action. The function recognizes what button was clicked and knows\
    \ what to do after parsing the list of posted variables and reading the clicked\
    \ button’s name. In the departments admin page (see the `admin_departments.tpl`\
    \ template file), buttons have names such as `submit_edit_dep_1`.\n\nAll button\
    \ names start with `submit` and end with the ID of the department. In the middle\
    \ of the name is the code for the button type, which specifies what operation\
    \ to do with the mentioned department. A button named `submit_edit_dep_1` tells\
    \ the plugin function to enter edit mode for the department with a `department_id`\
    \ value of 1.\n\nNote that with the Add department button, the department’s ID\
    \ specified in the button name becomes irrelevant, because its value is automatically\
    \ generated by the database (`department_id` is a `SERIAL` column).\n\nIn our\
    \ case, the button type can be:\n- `add_dep` for the Add department buttons\n\
    - `edit_dep` for the Edit department buttons\n- `update_dep` for the Update buttons\n\
    - `delete_dep` for the Delete buttons\n- `edit_categ` for the Edit Categories\
    \ buttons\n\nDepending on the type of the clicked button, one of the corresponding\
    \ business tier methods is called. Let’s consider these methods next.\n\n## Implementing\
    \ the Business Tier\n\nYou called four middle-tier methods from the `AdminDepartments`\
    \ class. Now it’s time to add their business tier counterparts:\n\n- `GetDepartmentsWithDescriptions`\
    \ returns the list of departments to be displayed in the department’s admin page.\n\
    - `UpdateDepartment` changes a department’s details. Its parameters are the department’s\
    \ `department_id` value, its new name, and its new description.\n- `DeleteDepartment`\
    \ deletes the department specified by the `department_id` parameter."
