    C H A P T E R 1 3


    Plugins


    **I**nsome situations, developers may want to use a Cake application in several
    other applications. Sometimes another Cake application may be useful in your project
    but may be difficult to fit in because of its independent structure; controllers,
    models, and such may conflict with the current project’s namespaces. Plugins are
    elements that function as mini-applications inside the main Cake application.
    They include their own models, views, and controllers, and they make it possible
    to reuse an entire application within other applications.


    Cake comes with no built-in plugins. Thus, only third-party applications can be
    used inside an existing Cake application. Of course, you may build your own plugins
    to fit your needs, but be aware that plugins are available online at various locations.
    The Bakery ([http://](http://bakery.cakephp.org)


    [bakery.cakephp.org)](http://bakery.cakephp.org) and CakeFor[ge (www.cakeforge.org)](http://www.cakeforge.org)
    host plugins along with other Cake applications, components, helpers, and more.
    The Bakery also hosts articles explaining how developers wrote their plugins—which
    can be useful in learning advanced CakePHP methods.


    Third-party plugins save time. Because they follow the MVC structure, they can
    do much more than a component or helper alone. A plugin may contain its own models
    and therefore work with the database in ways that a component or helper doesn’t.
    Often, running a complex method for an application is as simple as dropping a
    plugin in the app/plugins directory and tweaking some settings in the application
    to get it running.


    **Installing a Third-Party Plugin**


    Plugins are fairly simple to install because of their design. Simply put, they
    are self-contained folders that can be dropped in the app/plugins directory and
    referenced in the model, view, or controller. They should be written so that they
    require little configuration.


    Sometimes a plugin may require a database table to be set up to work correctly,
    or it may need you to specify some global variables or settings in the core configuration.
    Whatever the case, the plugin will generally come with its own installation notes
    that should be fairly simple to follow. I’ll show how to install an Ajax chat
    room plugin by Pseudocoder in your blog application to show how it’s done.


    First, you must obtain the plugin code. Pseudocoder’s Ajax Chat plugin is available
    at


    [http://sandbox2.pseudocoder.com/demo/chat.](http://sandbox2.pseudocoder.com/demo/chat)
    You should end up with a compressed file that contains a folder with some model,
    view, and controller files inside.


    You should notice that this plugin calls for the Prototype JavaScript library
    to be running in the application. I have already gone through installing Prototype
    in the default layout, so you shouldn’t have to change anything in the layout
    for this plugin to work. However, you may **219**


    09775ch13final 7/1/08 9:58 PM Page 220


    **220**


    CHAPTER 13 ■ PLUGINS


    still want to double-check that Prototype is running correctly in the application.
    Open the app/views/layouts/default.ctp file, and look for the Prototype include
    line:


    <?=$javascript->link(''prototype.js'');?>


    Also make sure the prototype.js file is located in the app/webroot/js folder.
    With these two settings in place, the Ajax Chat plugin is ready to be installed.


    Place the contents of the downloaded file in the app/plugins folder. The Ajax
    Chat plugin also uses its own database table, so you will need to run the SQL
    query to generate the appropriate table and fields. Pseudocoder makes this SQL
    available on its web page, which you already may have noticed when downloading
    the plugin. To save you time, Listing 13-1 contains the necessary SQL to build
    the table. Be sure to create the chats table in MySQL before running the plugin
    in the application; otherwise, errors will occur.


    **Listing 13-1.** *The* chats *Table to Be Used by the Ajax Chat Plugin* CREATE
    TABLÈchats` (


    ìdìnt(10) unsigned NOT NULL auto_increment,


    `key` varchar(45) NOT NULL default '''',


    `handlè varchar(20) NOT NULL default '''',


