    类常量只能使用 `const`，局部常量只能使用 `define`。然而，在创建全局常量时，`const` 和 `define` 均被允许。在这种情况下，通常优先使用
    `const`，因为编译时常量比运行时常量略快。主要的例外情况是当常量需要条件定义，或者需要表达式值时，此时必须使用 `define`。


    ## 常量使用指南


    通常，如果变量的值无需更改，创建常量比创建变量更佳。这能确保变量不会在脚本中的任何位置被意外修改，从而有助于防止错误。


    ## 魔术常量


    PHP 提供了八个预定义常量，如表 13-1 所示。这些常量被称为魔术常量，因为它们的值会随使用位置的不同而变化。


    **表 13-1. 魔术常量**


    | 名称 | 描述 |

    | --- | --- |

    | `__LINE__` | 文件中的当前行号。 |

    | `__FILE__` | 文件的完整路径和文件名。 |

    | `__DIR__` | 文件所在的目录。 |

    | `__FUNCTION__` | 函数名称。 |

    | `__CLASS__` | 包含命名空间的类名。 |

    | `__TRAIT__` | 包含命名空间的 trait 名称。 |

    | `__METHOD__` | 类方法名。 |

    | `__NAMESPACE__` | 当前命名空间。 |


    魔术常量对于调试特别有用。例如，`__LINE__` 的值取决于它在脚本中出现的位置。


    ```

    if(!isset($var))

    {

    echo ''$var not set on line '' . __LINE__;

    }

    ```


    # 14. 接口


    接口规定了使用该接口的类必须实现的方法。它们使用 `interface` 关键字定义，后跟名称和代码块。其命名约定是以小写 `i` 开头，然后每个单词首字母大写。


    ```

    interface iMyInterface {}

    ```


    ## 接口签名


    接口的代码块可以包含实例方法的签名。这些方法不能有任何实现。相反，它们的方法体被分号替代。接口方法必须始终是公开的。


    ```

    interface iMyInterface

    {

    public function myMethod();

    }

    ```


    此外，接口可以定义常量。这些接口常量的行为与类常量相同，只是它们不能被覆盖。


    ```

    interface iMyInterface

    {

    const PI = 3.14;

    }

    ```


    接口不能继承自类，但它可以继承自另一个接口，这实际上是将多个接口合并为一个。


    ```

    interface i1 {}

    interface i2 extends i1 {}

    ```


    ## 接口示例


    以下示例展示了一个名为 `iComparable` 的接口，它只有一个名为 `Compare` 的方法。请注意，此方法使用了类型提示来确保以正确的类型调用该方法。此功能将在后续章节中介绍。


    ```

    interface iComparable

    {

    public function compare(iComparable $o);

    }

    ```


    `Circle` 类通过在类名后使用 `implements` 关键字并跟上接口名称来实现此接口。如果该类还有 `extends` 子句，则 `implements`
    子句需要放在其后。请记住，尽管一个类只能继承自一个父类，但它可以通过指定逗号分隔的列表来实现任意数量的接口。


    ```

    class Circle implements iComparable

    {

    public $r;

    }

    ```


    由于 `Circle` 实现了 `iComparable`，它必须定义 `compare()` 方法。对于此类，该方法返回圆半径之间的差值。实现的方法必须是公开的，并且与接口中定义的方法具有相同的签名。它也可以有更多参数，只要它们是可选的即可。


    ```

    class Circle implements iComparable

    {

    public $r;

    public function compare(iComparable $o)

    {

    return $this->r - $o->r;

    }

    }

    ```


    ## 接口的使用


    接口允许类设计的多重继承，而不会出现功能多重继承所带来的复杂性。要求特定类设计的主要好处可以从 `iComparable` 接口看出，它定义了一个类可以共享的特定功能。它允许开发者在不了解类的实际类型的情况下使用接口成员。为了说明这一点，以下示例展示了一个简单的方法，它接受两个
    `iComparable` 对象并返回较大的那个。


    ```

    function largest(iComparable $a, iComparable $b)

    {

    return ($a->compare($b) > 0) ? $a : $b;

    }

    ```


    此方法适用于任何实现了 `iComparable` 接口的相同类型的两个对象。无论对象是什么类型，该方法都能工作，因为它只使用了通过该接口暴露的功能。


    ## 接口指南


    接口为类提供了设计规范，而不包含任何实现。它是一个契约，实现它的类同意提供特定的功能。这有两个好处。首先，它提供了一种确保开发者实现特定方法的方式。其次，由于这些类保证拥有特定方法，因此即使在不知道类实际类型的情况下也能使用它们，这使得代码更加灵活。


    # 15. 抽象


    抽象类提供了一个部分实现，其他类可以在此基础上构建。当一个类被声明为抽象时，意味着该类除包含正常的类成员外，还可能包含必须在子类中实现的不完整方法。


    ## 抽象方法


    在抽象类中，任何方法都可以被声明为抽象。这些方法随后保持未实现状态，仅指定它们的签名，而它们的代码块被分号替代。


    ```

    abstract class Shape

    {

    abstract public function myAbstract();

    }

    ```


    ## 抽象示例


    举例来说，以下类有两个属性和一个抽象方法。


    ```

    abstract class Shape

    {

    private $x = 100, $y = 100;

    abstract public function getArea();

    }

    ```


    如果一个类继承自此抽象类，则它必须重写该抽象方法。方法签名必须匹配，但访问级别可以放宽限制。


    ```

    class Rectangle extends Shape

    {

    public function getArea()

    {

    return $this->x * $this->y;

    }

    }

    ```


    不能实例化抽象类。它们仅作为其他类的父类，部分地规定了它们的实现。


    ```

    $s = new Shape(); // 编译时错误

    ```


    然而，抽象类可以继承自非抽象（具体）类。


    ```

    class NonAbstract {}

    abstract class MyAbstract extends NonAbstract {}

    ```


    ## 抽象类与接口


    抽象类在许多方面与接口相似。它们都可以定义派生类必须实现的成员签名，并且两者都不能被实例化。主要区别在于：首先，抽象类可以包含非抽象成员，而接口不能。其次，一个类可以实现任意数量的接口，但只能继承自一个类（无论是否抽象）。


    ```

    // 定义默认功能和定义

    abstract class Shape

    {

    public $x = 100, $y = 100;

    abstract public function getArea();

    }

    // 类是一个形状

    class Rectangle extends Shape { /*...*/ }

    // 定义特定功能

    interface iComparable

    {

    function compare();

    }

    // 类可以进行比较

    class MyClass implements iComparable { /*...*/ }

    ```


    ## 抽象指南


    抽象类提供了一个部分实现的基类，它规定了子类必须如何行为。当子类共享一些相似性，但在其他实现上存在差异并且需要子类自行定义时，抽象类最为有用。与接口类似，抽象类是面向对象编程中非常有用的结构，有助于开发者遵循良好的编码标准。


    # 16. Traits


