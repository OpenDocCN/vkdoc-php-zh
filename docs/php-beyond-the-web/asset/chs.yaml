  \ |\n\n\n\n### 4.7 虚拟开发与测试环境\n\n在进行 Web 开发时，你通常可以控制或至少指定 PHP 脚本的部署环境（即你的 Web 服务器）。但在编写通用软件时，情况往往并非如此，尤其是当你将软件出售或以其他方式分发给他人时。你可以指定操作系统和其他软硬件先决条件，以使软件与你自己的开发环境相匹配，但更理想的做法通常是让软件能在尽可能广泛的平台上运行。这会在开发和测试时带来问题，因为你需要访问用户会使用的所有平台。过去，你需要许多台不同的物理机器来运行不同的操作系统和配置。然而，现代的解决方案通常是虚拟化，即在同一台硬件上通过“虚拟机”运行不同的平台。市面上有多种不同的虚拟化解决方案，但其中最简单（也是最便宜）的之一是\
  \ Oracle 的 `VirtualBox`。只需安装 `VirtualBox`，创建并运行一个新的虚拟机，然后像从头搭建物理机器一样安装操作系统即可。你可以安装包括\
  \ Linux 和 Windows 变体在内的大多数常见操作系统，分配不同级别的内存、处理器和磁盘空间，并同时运行多个不同的虚拟机。你还可以在特定时间点对虚拟机创建“快照”，并在需要时回滚到某个快照。如果你的测试环境需要在每次运行前重置到初始状态（数据、机器状态、软件状态等），这个功能会非常有用。`VirtualBox`\
  \ 并不具备某些虚拟化环境的所有高级功能，有时性能特性也低于那些运行在更低级别的解决方案，但对于许多场景来说，它的性能和通用性已经足够。\n\n| ![](img/image00249.gif)\
  \ | ***VirtualBox*** |\n|   |   |\n|   | 一个易于使用的虚拟化系统。 |\n|   |   |\n|   | ***主站***：[`www.virtualbox.org/`](https://www.virtualbox.org/)\
  \ |\n|   |   |\n|   | ***安装信息***：[`www.virtualbox.org/manual/ch01.html#intro-installing`](https://www.virtualbox.org/manual/ch01.html#intro-installing)\
  \ |\n|   |   |\n|   | ***主要文档***：[`www.virtualbox.org/wiki/Documentation`](https://www.virtualbox.org/wiki/Documentation)\
  \ |\n\n一点提醒：在使用商业操作系统（如 Microsoft Windows）进行虚拟化时，你始终需要注意许可问题。许多商业操作系统要求虚拟机拥有单独或额外的许可证，即使你使用的是已获得完全授权的“宿主”操作系统也是如此。特别是，服务器版本的许可要求和成本不仅取决于安装的虚拟机数量，还取决于每个虚拟机使用的处理器核心数量（如果你为了测试目的而经常改变给特定虚拟机分配的虚拟核心数量，这会特别令人头疼）。\n\
  \n虚拟化对于开发环境也可能非常有用。在新机器上设置所有你偏好的工具，或者配置一台机器以匹配团队或公司指定的开发环境，可能是一件令人头疼的事。将你的开发环境做成一个可移植的虚拟机，或者使用像\
  \ `Vagrant` 这样的工具按预定义的方案部署一个新虚拟机，可以大大简化工作。你还可以使用像 `Ansible` 这样能与 `Vagrant` 良好集成的工具来自动化部署流程，例如将其作为构建步骤的一部分。\n\
