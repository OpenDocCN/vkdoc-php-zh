  trans: "  \n最基础的使用方式是作为回调函数。它被当作参数传递给另一个函数，该函数会执行这个回调一次或多次。通过使用匿名函数，该函数将仅在所调用函数的作用域内可用。\
    \  \n\n另一种用途是让函数在短时间内存在，并根据需要重新定义。这通过创建一个变量并为其赋值一个函数值来实现：`$a = function($b) {};`。\
    \  \n\n### 工作原理  \n\n首先，我们来看作为回调函数的用法。PHP 有许多内置函数，它们接受回调作为参数。`usort()` 函数就是其中之一。这个函数设计用于接受用户自定义函数，并使用它来对数组进行排序。\
    \  \n\n### 第 11 章 ■ 函数  \n\n在引入闭包之前，`usort` 函数的使用方式如下：  \n\n```php\n<?php\n//\
    \ 11_14.php\nfunction compare($a, $b) {\n    if ($a == $b) {\n        return 0;\n\
    \    }\n    return ($a < $b) ? -1 : 1;\n}\n\n$arr = [1, 9, 3, 1, 5, 7, 4];\nusort($arr,\
    \ 'compare');\nprint_r($arr);\n```\n\n随着 PHP 7.0 中“太空船操作符”（`<=>`）的引入以及闭包的使用，我们可以用更简洁的方式编写同样的代码：\
    \  \n\n```php\n<?php\n// 11_15.php\n$arr = [1, 9, 3, 1, 5, 7, 4];\nusort($arr,\
    \ function($a, $b) { return $a <=> $b; });\nprint_r($arr);\n```\n\n太空船操作符会比较两边的值：如果左边小于右边则返回\
    \ `-1`，两边相等则返回 `0`，右边小于左边则返回 `1`。  \n\n匿名函数仅在 `usort()` 函数运行期间存在于内存中，当函数结束时，它便无法再被调用。\
    \  \n\n匿名函数和变量函数的组合可用于在执行过程中根据逻辑或其他标准修改函数。在下一个示例中，我们创建一个匿名函数来计算销售利润。我们决定给在周三购物的客户提供一个小折扣。\
    \  \n\n与其为所有交易检查星期几，我们可以只检查一次，然后定义计算函数。  \n\n```php\n<?php\n// 11_16.php\nif (date('w')\
    \ == 3) {\n    $profit = function($p) {\n        return $p * 1.25;\n    };\n}\n\
    else {\n    $profit = function($p) {\n        return $p * 1.30;\n    };\n}\n\n\
    // 从数据库中读取所有交易\nforeach($transaction as $t) {\n    $p = $profit($t);\n}\n```\n\
    \n### 第 11 章 ■ 函数  \n\n这个示例本可以使用常规函数定义来实现。根据逻辑，只会定义其中一个函数。但如果你需要在执行过程中重新定义一个函数，就必须使用闭包。\
    \  \n\n```php\n<?php\n// 11_17.php\n$profit = function($p) {\n    return $p *\
    \ 1.30;\n};\necho $p = $profit(100) . \"\\n\";\n\n// 执行一些操作\n$profit = function($p)\
    \ {\n    return $p * 1.25;\n};\necho $p = $profit(100) . \"\\n\";\n```\n\n在这个例子中，第一个\
    \ `profit` 函数被使用一次后，当一个新的函数被赋值给变量 `$profit` 时，它并没有被丢弃。这个操作不会导致编译器或运行时错误。  \n\n\
    由于 PHP 解析器的工作方式，我们有可能定义嵌套函数。虽然这是可行的，但不推荐这样做。内部函数只有在外部函数执行时才会被定义，并且如果外部函数被多次调用，内部函数会被重新定义，从而导致致命错误，如下一个示例所示。\
    \  \n\n```php\n<?php\n// 11_18.php\nfunction A() {\n    function B($i) {\n   \
    \     echo \"B called with $i\\n\";\n    }\n    for ($i = 1; $i < 3; $i++) {\n\
    \        B($i);\n    }\n    echo \"A called\\n\";\n}\n\nA();\nB(0);\n```\n\n在这个例子中，首先调用了\
    \ `A()`，这导致函数 `B()` 被定义，因此在 `A()` 之后调用 `B()` 仍然有效。如果先调用 `B()`，或者 `A()` 被多次调用，则会引发致命错误。\
    \  \n\n闭包可以解决这个问题，并创建函数内部的“私有”函数。  \n\n```php\n<?php\n// 11_19.php\nfunction A()\
    \ {\n    $f = function ($i) {\n        echo \"B called with $i\\n\";\n    };\n\
    ```\n\n### 第 11 章 ■ 函数  \n\n```php\n    for ($i = 1; $i < 3; $i++) {\n       \
    \ $f($i);\n    }\n    echo \"A called\\n\";\n}\n\nA();\nA();\n```\n\n现在，我们可以根据需要多次调用\
    \ `A()` 函数，而由变量 `$f` 定义的函数只能在 `A()` 函数内部被调用。  \n\n### 配方 11-10. 可变参数列表  \n\n####\
    \ 问题  \n"
- fmt: "# Is it possible to define a function that takes a variable number of arguments?\n\
    \n## Solution\n\nA function can be called with more parameters than it was declared\
    \ to have. In that case there are a couple of special functions that can be used\
    \ to get information about the parameters. The function `func_num_args()` returns\
    \ the number of arguments passed to the function. The functions `func_get_arg()`\
    \ and `func_get_args()` can be used to fetch a single argument (by ordinal number)\
    \ or all the arguments passed to the function.\n\nA warning will be issued if\
    \ any of these functions are called from the global scope. They should only be\
    \ called from within a function or method.\n\n## How it Works\n\nIn the next example\
    \ a function is declared with no required parameters and then it's called with\
    \ a string, an integer, and an array as the parameters. The function will show\
    \ that three parameters were passed to the function.\n\n```php\n<?php\n// 11_20.php\n\
    function MyFunc() {\n    echo func_num_args() . \"\\n\";\n}\n\nMyFunc(\"A\", 1,\
    \ [1,2,3]);\n```\n\nIf the function has some required and optional parameters\
    \ it's still possible to pass and process additional parameters.\n\n```php\n<?php\n\
    // 11_21.php\nfunction MyFunc(string $s, int $i = 0) {\n    echo func_num_args()\
    \ . \"\\n\";\n    print_r(func_get_args());\n}\n\nMyFunc(\"Abc\", 1, [1,2,3]);\n\
    ```\n\nAlthough the parameters `$s` and `$i` are defined, they will be assigned\
    \ the first two parameters that are passed in the function; `func_num_args()`\
    \ and `func_get_args()` will count and return the total number of parameters passed.\
    \ The output will look like this when executed with PHP 7:\n\n```\n3\nArray\n\
    (\n    [0] => Abc\n    [1] => 1\n    [2] => Array\n        (\n            [0]\
    \ => 1\n            [1] => 2\n            [2] => 3\n        )\n)\n```\n\n# Web\
    \ Fundamentals\n\nThe primary purpose of PHP is to process web or HTTP requests\
    \ from a browser through a web server and to generate valid responses to such\
    \ requests. The nature of a web request is that it's usually short lived and it\
    \ does not have any knowledge about previous or future requests. The principle\
    \ makes it possible for even a modest hardware configuration to serve a large\
    \ number of requests in a short amount of time. This is often measured in the\
    \ average response time or the number of requests per second or per hour.\n\n\
    In the beginning PHP was a way to inject values or sections of content into existing\
    \ HTML documents but from PHP version 3 it has been possible to dynamically create\
    \ complete HTML documents from the scripting language and any resource available\
    \ to PHP at runtime. The structure of the PHP file can include static HTML sections\
    \ with sections of PHP code that will resolve to dynamic content or it can contain\
    \ no static blocks and just be a single script where the output of the script\
    \ is returned to the requesting client.\n\n## Recipe 12-1. Headers\n\n### Problem\n\
    \nThe Hyper Text Transport Protocol (HTTP) is very simple. When a TCP/IP socket\
    \ connection is created between a browser and a web server the browser will send\
    \ a request that has two basic sections. The first are the headers and the second\
    \ is the body of the message. When the server returns the response it will also\
    \ consist of headers and a body. The separation between headers and body is `\\\
    r\\n\\r\\n` (two sets of carriage return and line feed).\n\nFor most simple requests\
    \ the developer can ignore the header values in both the request and the response.\
    \ The default configuration of PHP will automatically set the valid headers, assuming\
    \ the response is a HTML document, but in other cases it might be necessary to\
    \ overwrite these headers or add additional information. For the request it might\
    \ be necessary to validate a header in order to proceed.\n\n### Solution\n\nThe\
    \ default header (for `Content-Type`) that is sent with a PHP response is configured\
    \ in `php.ini`, with the setting called `default_mimetype`, and is set to `text/html`.\
    \ In addition there is also a setting called `default_charset` and it defaults\
    \ to `UTF-8`. Older versions of PHP used `ISO-8859-1` as the default character\
    \ set. If you want to add or overwrite any of the headers you use the `header()`\
    \ function. Each header is a key value pair with a name of the header followed\
    \ by a colon (`:`) and then the value. Setting the `Content-Type` header looks\
    \ like this:\n\n```php\nheader(\"Content-Type: text/html\");\n```\n\nThere are\
    \ a couple of ways to get the request headers. With a standard configuration the\
    \ headers end up in the super global called `$_SERVER` and the keys are prefixed\
    \ with `HTTP_`. In addition to the request headers the `$_SERVER` variable also\
    \ contains environment variables and other data.\n\nA commonly used request header\
    \ is the user agent (`$_SERVER['HTTP_USER_AGENT']`) variable. This can be used\
    \ to detect the type of client requesting the content and, based on that, format\
    \ the response specifically to the client.\n\nAll header values can easily be\
    \ spoofed and any header value should be handled as any other user input.\n\n\
    ### How it Works\n\nIn this next example we use the `header()` function to set\
    \ the `Content-Type` to `text/plain` and then send some plain content to the client.\
    \ All calls to the `header()` function should be done before any other output\
    \ is sent to the client.\n\n```php\n<?php\n// 12_1.php\nheader(\"Content-Type:\
    \ text/plain\");\n?>\nThis software is licensed under the MIT license\nPlease\
    \ see https://opensource.org/licenses/MIT for details\n```\n\nIf you want to redirect\
    \ users of mobile devices to a special version of a website you can do that by\
    \ checking the user agent string and a regular expression that checks for certain\
    \ keywords and if one of them is found use the header function to redirect the\
    \ request.\n\n```php\n<?php\n// 12_2.php\n$mobile = '/(ios|ipod|mobile|pad|phone|tablet|'\
    \ .\n    'symbian|android|blackberry|webos)/i';\n\nif (isset($_SERVER['HTTP_USER_AGENT'])\
    \ &&\n    preg_match($mobile, $_SERVER['HTTP_USER_AGENT'])) {\n    header(\"Location:\
    \ http://m.mysite.com\");\n}\n```\n\nThe first part of the `if` statement where\
    \ we check if the variable is set is to avoid warnings when the script is requested\
    \ from a client that doesn't set a value for the user agent. This could be a PHP\
    \ script that's using the open wrappers to request content from a remote server.\
    \ This could be a simple call to `file_get_contents()`. This is the preferred\
    \ way to read the content of a file or stream into a variable. Unless a stream\
    \ context is provided no headers will be set.\n\nPlease note that all header values\
    \ must be set before any other output is generated. If headers are set after output\
    \ is generated, PHP will generate a warning.\n\n## Recipe 12-2. $_GET and $_POST\n\
    \n### Problem\n\nGET and POST are two HTTP request methods supported by browsers.\
    \ The GET method is used when a user clicks a link in a document or types a URL\
    \ in the address bar. The POST method is associated with submitting the HTML form\
    \ from a web page.\n\nHow can the data from a GET or POST request be accessed\
    \ in a PHP script?\n\n### Solution\n\nThe solution is again the super globals.\
    \ Depending on the configuration value `variables_order` in `php.ini` the super\
    \ globals will be populated with values from the request. The valid configuration\
    \ options are zero or more of the letters `G`, `P`, `C`, `E`, and `S`. Each of\
    \ these represents Get, Post, Cookie, Environment, and Server.\n\nEnvironment\
    \ variables are not commonly used by PHP scripts so a common configuration is\
    \ `variables_order = \"GPCS\"`. In addition to `variables_order` you can also\
    \ configure `request_order` to define which of the request data is populated into\
    \ the `$_REQUEST` array.\n\nThe `$_REQUEST` super global is a combination of data\
    \ from other requests and there can be overlap, so the order of whose data is\
    \ populated matters. If you are posting a form with a field named `phone` and\
    \ the post URL is `http://mydomain.com?phone=123` you will end up with an index\
    \ called `phone` in both the `$_GET` and `$_POST` arrays."
