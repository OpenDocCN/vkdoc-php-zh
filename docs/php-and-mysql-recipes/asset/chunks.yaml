    # 图像旋转


    使用 `ImageRotate()` 函数可将 `图像` 旋转任意度数。旋转以逆时针方向为计。若要将图像顺时针旋转 90 度，可使用 `-90` 或 `270`
    度作为旋转角度。与多数图像函数类似，该函数同样将图像资源作为第一个参数。其后，依次指定旋转角度、用于填充图像未覆盖区域的颜色，最后是一个可选的忽略透明值的参数。


    旋转中心为原始图像的中心。旋转后的图像尺寸可能与原始图像不同。若将正方形图像旋转 45 度，最终图像在两个方向上的尺寸都会增大 1.41 倍。若将图像旋转
    180 度，最终图像尺寸则与原图完全相同。


    ## 工作原理


    以下示例展示如何将图像旋转 30 度，并将图像新区域的背景色设为黑色。


    ```php

    <?php


    // 8_6.php


    $orig = GetImageSize(''IMG_0099.JPG'');


    $img = ImageCreateFromJpeg(''IMG_0099.JPG'');


    $thumb = ImageRotate($img, 30, 0);


    header(''Content-Type: '' . $orig[''mime'']);


    switch ($orig[2]) {


    case IMG_JPG :


    case IMG_JPEG :


    ImageJPEG($thumb);


    break;


    case IMG_PNG :


    ImagePNG($thumb);


    break;


    case IMG_GIF :


    ImageGIF($thumb);


    break;


    }


    ImageDestroy($thumb);


    ImageDestroy($img);

    ```


    ---


    # 方法 8-5. 图像翻转


    ## 问题


    在前一个方法中，我们讨论了如何旋转图像以修正不同相机方向。如果需要创建一幅水平或垂直镜像的图像副本，该怎么办？


    ## 解决方案


    可通过 `ImageFlip()` 函数实现此功能。


    > **注意：** 此函数仅在 GD 扩展使用捆绑版本的 `libgd` 编译时可用。


    `ImageFlip()` 函数可以水平、垂直或同时两个方向翻转图像，不过同时翻转两个方向等效于旋转 180 度。


    ### 工作原理


    `ImageFlip()` 接受两个参数：第一个是图像资源，第二个是翻转方向。翻转方向可以是以下预定义常量之一：`IMG_FLIP_HORIZONTAL`、`IMG_FLIP_VERTICAL`
    或 `IMG_FLIP_BOTH`。


    ```php

    <?php


    // 8_7.php


    $orig = GetImageSize(''IMG_0099.JPG'');


    $img = ImageCreateFromJpeg(''IMG_0099.JPG'');


    ImageFlip($img, IMG_FLIP_HORIZONTAL);


    header(''Content-Type: '' . $orig[''mime'']);


    switch ($orig[2]) {


    case IMG_JPG :


    case IMG_JPEG :


    ImageJPEG($img);


    break;


    case IMG_PNG :


    ImagePNG($img);


    break;


    case IMG_GIF :


    ImageGIF($img);


    break;


    }


    ImageDestroy($img);

    ```


    `ImageFlip()` 函数的工作方式与复制和旋转函数略有不同。该函数不会创建图像的副本，它只是在原地（内存中）翻转图像（文件不会被更改）。无需在脚本末尾销毁额外的副本。


    ---


    # 方法 8-6. 添加水印


    ## 问题


    如果你是一位摄影师，希望在自己的网站上展示高分辨率图像，可能需要通过添加水印来保护图像。如果你出售用于其他网站的图像，并希望防止购买者不付费就使用你目录页中的图像，也可以使用同样的技术。无论哪种情况，最佳实践始终是保留原始图像，在上传文件时创建新的副本，并将水印添加到该副本中。


    ## 解决方案


    水印可以简单到在图像顶部某处添加一行文本字符串，也可以是覆盖在图像上方的另一张图像。添加文本将在方法 8-10 中介绍。本方法将介绍如何将两张图像合并为一张。


    在方法 8-3 中，我们讨论了图像裁剪以及使用 `ImageCopyResampled()` 函数将图像的一部分复制并调整大小到另一张图像上。我们可以使用同样的函数将小图像复制到大图像上。


    ### 工作原理

    '
- fmt: 'If all your images are the same size it''s relatively straightforward to add
    a watermark to them, but if they are different sizes you might have to resize
    the watermark to fit on the image. I suggest creating a watermark file that is
    the same width as the widest image you are working with and then scale it down
    so it will fit on top of smaller images. If the size difference between the smallest
    and largest image are too big you can also create multiple watermarks and choose
    the one that fits best.


    ```php

    // 8_8.php


    $orig = GetImageSize(''IMG_0099.JPG'');


    $wm = GetImageSize(''watermark.png'');


    $img = ImageCreateFromJpeg(''IMG_0099.JPG'');


    $watermark = ImageCreateFromPng(''watermark.png'');


    if ($orig[0] > $wm[0]) {


    $width = $wm[0];


    $height = $wm[1];


    $x = ($orig[0] - $wm[0]) / 2;


    $y = ($orig[1] - $wm[1]) / 2;


    }


    else {


    $d = $orig[0] / $wm[0];


    $width = $orig[0];


    $height = $wm[1] * $d;


    $x = 0;


    $y = ($orig[1] - $height) / 2;


    }


    ImageCopyResampled($img, $watermark, $x, $y, 0, 0, $width, $height, $wm[0], $wm[1]);
    header(''Content-Type: '' . $orig[''mime'']);


    switch ($orig[2]) {


    case IMG_JPG :


    case IMG_JPEG :


    ImageJPEG($img);


    break;


    case IMG_PNG :


    ImagePNG($img);


    break;


    case IMG_GIF :


    ImageGIF($img);


    break;


    }


    ImageDestroy($watermark);


    ImageDestroy($img);

    ```


    ## CHAPTER 8 ■ DYNAMIC IMAGING


    The calculation in the beginning compares the width of the original image to the
    width of the watermark. If the original image is wider than the watermark the
    watermark will be centered on the original image. If the watermark is wider the
    watermark will be scaled down to fit in the width. It will still be centered vertically.


    If the original image is taller than it is wide or if you want a watermark that
    is narrow and tall you will need to modify the calculations of `x`, `y`, `width`,
    and `height`, but the same logic for adding the watermark can be used.


    ### Recipe 8-7\. Changing Colors


    #### Problem


    When working with images, creating them from scratch or adding to existing images,
    there is a need to define the colors used for the objects that are added to the
    image.


    #### Solution


    Bitmapped images are generally represented by pixels where each pixel is provided
    a color and perhaps some transparency/opacity. Depending on the image format and
    image compression the way these are handled varies. The `gd` extension uses an
    internal GD/GD2 format to represent the image and when the final image is generated
    for output the format is converted to the target format.


    In the GD format each color is placed in a palette where an index points to a
    specific color. When you add color to a pixel in the image you simply tell the
    system to use a specific index. If you later want to change all the pixels of
    a given color you can just change the color for that index and all pixels with
    that index will change color.


    This concept then requires the allocation of colors in the palette before the
    color can be used. If you are using an existing image the palette will be initialized
    with all the different colors already used in the image, but if you are starting
    from scratch the palette will be empty. There are three functions used to allocate
    and deallocate colors in the image; these are called `ImageColorAllocate()`, `ImageColorAlocateAlpha()`,
    and `ImageColorDeallocate()`. The first color allocated will define the background
    color of the image. As shown in recipe 8-1, when a blank image is created using
    `ImageCreate()`, the background color will be black, unless you define it with
    a call to one of the allocate functions. The allocation functions use three integer
    values between 0 and 255 for each of the color components (red, green, and blue).
    If you are allocating a color with alpha transparency you need a fourth value
    to indicate the amount of transparency. This is a value between 0 and 127 where
    0 indicates opaque and 127 is total transparency.


    #### How it Works


    If we take the code from example `8_1.php`, change the `ImageCreateTrueColor()`
    to `ImageCreate()` and add a line to allocate a yellow color, the image generated
    will no longer be black.


    ```php

    // 8_9.php

    ```'
