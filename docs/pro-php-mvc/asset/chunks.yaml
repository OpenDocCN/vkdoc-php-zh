    **CodeIgniter: Bootstrapping**


    CodeIgniter is the first of three frameworks we will review in this book. It is
    arguably the least popular of the three, the smallest, the fastest (in comparative
    tests), and the least complex. It was created and is maintained by EllisLa[b (http://ellislab.com).](http://ellislab.com)


    Our aim for the remaining chapters of this book will be to duplicate the majority
    of the functionality we created in our social network, to try and gain an understanding
    of some of the differences between the frameworks and our own. It will also serve
    as an opportunity to assess the strengths of each framework so you can better
    decide which framework suits the PHP MVC projects you undertake.


    Goals


    • We need to understand the philosophy and benefits of CodeIgniter.


    • We need to review the requirements for URL rewriting within CodeIgniter applications.


    • We need to create a few CodeIgniter routes that will allow us to access the
    controllers, actions, and views we create in future chapters.


    Why CodeIgniter?


    As I mentioned, CodeIgniter has a relatively small and simple codebase. This is
    due to one of their goals, which is to keep the framework lean. This is achieved
    through minimal automation, as well as a limited set of libraries that come bundled
    with the framework.


    With good code conventions and a small codebase, it follows that the average execution
    time of an action is fairly low. This might not always be the case, especially
    when performing intensive operations.


    CodeIgniter’s documentation is exceptional. It’s not merely API documentation,
    but provides the developer with an understanding of the practical implementation
    of MVC within the framework, as well as numerous code examples for the most common
    problems a developer will encounter when diving into CodeIgniter.


    ■ **Note** You can find the CodeIgniter documentation at [http://codeigniter.com/user_guide.](http://codeigniter.com/user_guide)


    When deciding whether to use CodeIgniter for your next project, it helps to consider
    the types of applications for which CodeIgniter is a good choice. CodeIgniter
    is ideally suited for small- to medium-sized applications that require minimal
    functionality without the use of third-party libraries. This is not because it
    is 345


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 22 ■ CodEIgnITER: BooTsTRAPPIng


    difficult to add additional third-party libraries but because CodeIgniter comes
    bundled with a small selection of libraries for only the most common of requirements.


    Why Not CodeIgniter?


    CodeIgniter does not include any automated build tools. These are scripts that
    can be used to create all the usual components that accompany MVC frameworks,
    leaving only the tricky bits for developers to concern themselves with. If you
    are new to MVC, then this is not something you will miss.


    CodeIgniter has always been open source, but the framework hasn’t been open for
