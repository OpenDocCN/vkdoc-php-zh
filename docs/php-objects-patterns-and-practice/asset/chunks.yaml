    ```markdown

    ### PHP 7：缩小差距


    程序员是一个要求苛刻的群体。对于许多设计模式的爱好者来说，PHP 仍然缺少两个关键特性：标量类型声明和强制返回类型。在 PHP 5 中，可以强制指定传递给函数或方法的参数类型，但仅限于要求传入对象、数组或可调用代码（后来才支持）。标量值（如整型、字符串和浮点数）完全无法被强制指定。此外，如果你想声明方法或函数的返回类型，那也完全是异想天开。


    你将看到，面向对象设计通常使用方法声明作为一种契约。方法要求特定的输入，并相应承诺返回特定类型的数据。在许多情况下，PHP 5 程序员不得不依赖注释、约定和手动类型检查来维护此类契约。开发者与评论者经常对此颇有微词。以下是本书前一版中的一段引文：


    > ……仍然没有承诺支持提示返回类型。这将允许你在方法或函数的声明中指定其返回的对象类型，并由 PHP 引擎强制执行。提示返回类型将进一步改善 PHP 对模式原则（例如“针对接口编程，而非针对实现”）的支持。我希望有一天能修订本书来涵盖这个特性！


    我很高兴地写道，这一天终于来临了！PHP 7 引入了标量类型声明（以前称为类型提示）和返回类型声明，你将在本版中看到它们被广泛使用。


    PHP 7 还提供了其他锦上添花的功能，包括匿名类和一些命名空间增强。


    ## 倡导与不可知论：对象的争论


    对象和面向对象设计似乎总能激起热情两极分化的争论。许多优秀的程序员多年来不使用对象也写出了优秀的代码，PHP 仍然是过程化 Web 编程的绝佳平台。


    本书自然通篇展现出面向对象的倾向，这种倾向反映了我被对象“感染”的观点。因为本书是对对象的颂扬，也是对面向对象设计的介绍，所以重点毫不掩饰地放在面向对象上，这也是不可避免的。然而，本书的任何内容都无意暗示对象是使用
    PHP 成功编码的唯一正确途径。


    开发者是否选择将 PHP 作为面向对象语言来使用，曾经纯粹是个人偏好问题。这种说法在一定程度上仍然成立：人们可以使用函数和全局代码创建完全可接受的工作系统。一些出色的工具（例如
    WordPress）在其底层架构中仍然是过程化的（尽管如今它们也可能大量使用对象）。然而，作为一名 PHP 程序员，如果不使用和理解 PHP 对对象的支持，工作将变得越来越困难，尤其是因为你在项目中可能依赖的第三方库本身很可能就是面向对象的。


    尽管如此，在阅读时，还是值得记住著名的 Perl 格言：“条条大路通罗马。” 这对于较小的脚本尤其如此，在这种情况下，快速得到可运行的示例比构建一个能够良好扩展至更大系统的结构更为重要（这类临时项目通常被称为“尖峰”）。


    代码是一种灵活的媒介。关键在于，要知道你的快速概念验证何时正成为更大项目的根基，并在代码的庞大重量替你做出持久的设计决策之前及时叫停。现在你已经决定为你不断增长的项目采用面向设计的方法，我希望本书能为你开始构建面向对象架构提供所需的帮助。


    ## 小结


    这一简短的章节将对象置于它们在 PHP 语言中的上下文环境中。PHP 的未来在很大程度上与面向对象设计紧密相连。在接下来的几章中，我将介绍 PHP 当前对对象特性的支持情况，并引入一些设计问题。


    # 3. 对象基础


    对象和类是本书的核心，并且自十多年前 PHP 5 引入以来，它们也一直是 PHP 的核心。在本章中，我通过探讨 PHP 的核心面向对象特性，为更深入地介绍对象和设计奠定基础。如果你不熟悉面向对象编程，请仔细阅读本章。


    本章将涵盖以下主题：


    - 类和对象：声明类与实例化对象

    - 构造方法：自动化对象的设置

    - 基本类型与类类型：为什么类型很重要

    - 继承：为什么需要继承以及如何使用它

    - 可见性：精简你的对象接口，保护你的方法和属性免受干扰


    ## 类和对象


    理解面向对象编程的第一个障碍是类与对象之间奇妙而特殊的关系。对许多人来说，正是这种关系代表了第一次启示，第一次面向对象的兴奋感。所以，让我们不要在基础上吝啬笔墨。


    ### 第一个类


    类通常用对象来描述。这很有趣，因为对象又通常用类来描述。这种循环性可能会让面向对象编程的第一步变得艰难。因为是类塑造了对象，所以我们应该从定义类开始。


    简而言之，类是用来生成一个或多个对象的代码模板。你可以使用 `class` 关键字和任意的类名来声明类。类名可以是数字和字母的任意组合，但不得以数字开头。与类关联的代码必须用大括号括起来。这里我将这些元素组合起来构建一个类：


    ```

    // 代码清单 03.01

    class ShopProduct

    {

    // 类主体

    }

    ```


    示例中的 `ShopProduct` 类已经是一个合法的类，尽管它目前还不太有用。然而，我已经做了一件相当重要的事情：我定义了一个类型；也就是说，我创建了一个可以在脚本中使用的数据类别。随着你阅读本章，这种能力的重要性将变得更加清晰。

    ```'
- fmt: '### A First Object (or Two)


    If a class is a template for generating objects, it follows that an object is
    data that has been structured according to the template defined in a class. An
    object is said to be an instance of its class. It is of the type defined by the
    class.


    I use the `ShopProduct` class as a mold for generating `ShopProduct` objects.
    To do this, I need the `new` operator. The `new` operator is used in conjunction
    with the name of a class, like this:


    ```

    // listing 03.02

    $product1 = new ShopProduct();

    $product2 = new ShopProduct();

    ```


    The `new` operator is invoked with a class name as its only operand and returns
    an instance of that class; in our example, it generates a `ShopProduct` object.


    I have used the `ShopProduct` class as a template to generate two `ShopProduct`
    objects. Although they are functionally identical (that is, empty), `$product1`
    and `$product2` are different objects of the same type generated from a single
    class.


    If you are still confused, try this analogy. Think of a class as a cast in a machine
    that makes plastic ducks. Our objects are the ducks that this machine generates.
    The type of thing generated is determined by the mold from which it is pressed.
    The ducks look identical in every way, but they are distinct entities. In other
    words, they are different instances of the same type. The ducks may even have
    their own serial numbers to prove their identities. Every object that is created
    in a PHP script is also given its own unique identifier. (Note that the identifier
    is unique for the life of the object; that is, PHP reuses identifiers, even within
    a process). I can demonstrate this by printing out the `$product1` and `$product2`
    objects:


    ```

    // listing 03.03

    var_dump($product1);

    var_dump($product2);

    ```


    Executing these functions produces the following output:


    ```

    object(popp\ch03\batch01\ShopProduct)#235 (0) {

    }

    object(popp\ch03\batch01\ShopProduct)#234 (0) {

    }

    ```


    **Note:** In ancient versions of PHP (up to version 5.1), you could print an object
    directly. This casted the object to a string containing the object’s ID. From
    PHP 5.2 onward, the language no longer supports this magic, and any attempt to
    treat an object as a string now causes an error unless a method named `__toString()`
    is defined in the object’s class. I look at methods later in this chapter, and
    I cover `__toString()` in Chapter [4](#A314621_5_En_4_Chapter.html), “Advanced
    Features.”


    By passing the objects to `var_dump()`, I extract useful information including,
    after the hash sign, each object’s internal identifier.


    In order to make these objects more interesting, I can amend the `ShopProduct`
    class to support special data fields called properties.


    ## Setting Properties in a Class


    Classes can define special variables called properties. A property, also known
    as a member variable, holds data that can vary from object to object. So in the
    case of `ShopProduct` objects, you may wish to manipulate title and price fields,
    for example.


    A property in a class looks similar to a standard variable except that, in declaring
    a property, you must precede the property variable with a visibility keyword.
    This can be `public`, `protected`, or `private`, and it determines the scope from
    which the property can be accessed.


    **Note:** Scope refers to the function or class context in which a variable has
    meaning (it refers in the same way to methods, which I will cover later in this
    chapter). So a variable defined in a function exists in local scope, and a variable
    defined outside of the function exists in global scope. As a rule of thumb, it
    is not possible to access data defined in a scope that is more local than the
    current one. So if you define a variable inside a function, you cannot later access
    it from outside that function. Objects are more permeable than this, in that some
    object variables can sometimes be accessed from other contexts. Which variables
    can be accessed and from what context is determined by the `public`, `protected`,
    and `private` keywords, as you shall see.


    I will return to these keywords and the issue of visibility later in this chapter.
    For now, I will declare some properties using the `public` keyword:


    ```

    // listing 03.04

    class ShopProduct

    {

    public $title = "default product";

    public $producerMainName = "main name";

    public $producerFirstName = "first name";

    public $price  = 0;

    }

    ```


    As you can see, I set up four properties, assigning a default value to each of
    them. Any objects I instantiate from the `ShopProduct` class will now be prepopulated
    with default data. The `public` keyword in each property declaration ensures that
    I can access the property from outside of the object context.


    You can access property variables on an object-by-object basis using the characters
    `''->''` (the object operator) in conjunction with an object variable and property
    name, like this:


    ```

    // listing 03.05

    $product1 = new ShopProduct();

    print $product1->title;

    default product

    ```


    Because the properties are defined as `public`, you can assign values to them
    just as you can read them, replacing any default value set in the class:


    ```

    // listing 03.06

    $product1 = new ShopProduct();

    $product2 = new ShopProduct();

    $product1->title="My Antonia";

    $product2->title="Catch 22";

    ```


    By declaring and setting the `$title` property in the `ShopProduct` class, I ensure
    that all `ShopProduct` objects have this property when first created. This means
    code that uses this class can work with `ShopProduct` objects based on that assumption.
    Because I can reset it, though, the value of `$title` may vary from object to
    object.


    **Note:** Code that uses a class, function, or method is often described as the
    class’s, function’s, or method’s client or as client code. You will see this term
    frequently in the coming chapters.


    In fact, PHP does not force us to declare all our properties in the class. You
    could add properties dynamically to an object, like this:


    ```

    // listing 03.07

    $product1->arbitraryAddition = "treehouse";

    ```


    However, this method of assigning properties to objects is not considered good
    practice in object-oriented programming.


    Why is it bad practice to set properties dynamically? When you create a class
    you define a type. You inform the world that your class (and any object instantiated
    from it) consists of a particular set of fields and functions. If your `ShopProduct`
    class defines a `$title` property, then any code that works with `ShopProduct`
    objects can proceed on the assumption that a `$title` property will be available.
    There can be no guarantees about properties that have been dynamically set, though.'
  raw: '### A First Object (or Two)


    If a class is a template for generating objects , it follows that an object is
    data that has been structured according to the template defined in a class. An
    object is said to be an instance of its class. It is of the type defined by the
    class.


    I use the `ShopProduct` class as a mold for generating `ShopProduct` objects.
    To do this, I need the `new` operator. The `new` operator is used in conjunction
    with the name of a class, like this:


    ```

    // listing 03.02

    $product1 = new ShopProduct();

    $product2 = new ShopProduct();

    ```


    The `new` operator is invoked with a class name as its only operand and returns
    an instance of that class; in our example, it generates a `ShopProduct` object.


    I have used the `ShopProduct` class as a template to generate two `ShopProduct`
    objects. Although they are functionally identical (that is, empty), `$product1`
    and `$product2` are different objects of the same type generated from a single
    class.


    If you are still confused, try this analogy. Think of a class as a cast in a machine
    that makes plastic ducks. Our objects are the ducks that this machine generates.
    The type of thing generated is determined by the mold from which it is pressed.
    The ducks look identical in every way, but they are distinct entities. In other
    words, they are different instances of the same type. The ducks may even have
    their own serial numbers to prove their identities. Every object that is created
    in a PHP script is also given its own unique identifier. (Note that the identifier
    is unique for the life of the object; that is, PHP reuses identifiers, even within
    a process). I can demonstrate this by printing out the `$product1` and `$product2`
    objects:


    ```

    // listing 03.03

    var_dump($product1);

    var_dump($product2);

    ```


    Executing these functions produces the following output:


    ```

    object(popp\ch03\batch01\ShopProduct)#235 (0) {

    }

    object(popp\ch03\batch01\ShopProduct)#234 (0) {

    }

    ```


    Note


    In ancient versions of PHP (up to version 5.1), you could print an object directly.
    This casted the object to a string containing the object’s ID. From PHP 5.2 onward,
    the language no longer supports this magic, and any attempt to treat an object
    as a string now causes an error unless a method named `__toString()` is defined
    in the object’s class. I look at methods later in this chapter, and I cover `__toString()`
    in Chapter [4](#A314621_5_En_4_Chapter.html), “Advanced Features.”


    By passing the objects to `var_dump()`, I extract useful information including,
    after the hash sign, each object’s internal identifier.


    In order to make these objects more interesting, I can amend the `ShopProduct`
    class to support special data fields called properties.


    ## Setting Properties in a Class


    Classes can define special variables called properties. A property, also known
    as a member variable, holds data that can vary from object to object. So in the
    case of `ShopProduct` objects, you may wish to manipulate title and price fields,
    for example.


    A property in a class looks similar to a standard variable except that, in declaring
    a property, you must precede the property variable with a visibility keyword.
    This can be `public`, `protected`, or `private`, and it determines the scope from
    which the property can be accessed.


    Note


    Scope refers to the function or class context in which a variable has meaning
    (it refers in the same way to methods, which I will cover later in this chapter).
    So a variable defined in a function exists in local scope, and a variable defined
    outside of the function exists in global scope. As a rule of thumb, it is not
    possible to access data defined in a scope that is more local than the current
    one. So if you define a variable inside a function, you cannot later access it
    from outside that function. Objects are more permeable than this, in that some
    object variables can sometimes be accessed from other contexts. Which variables
    can be accessed and from what context is determined by the `public`, `protected`,
    and `private` keywords, as you shall see.


    I will return to these keywords and the issue of visibility later in this chapter.
    For now, I will declare some properties using the `public` keyword:


    ```

    // listing 03.04

    class ShopProduct

    {

    public $title = "default product";

    public $producerMainName = "main name";

    public $producerFirstName = "first name";

    public $price  = 0;

    }

    ```


    As you can see, I set up four properties, assigning a default value to each of
    them. Any objects I instantiate from the `ShopProduct` class will now be prepopulated
    with default data. The `public` keyword in each property declaration ensures that
    I can access the property from outside of the object context.


    You can access property variables on an object-by-object basis using the characters
    `''->''` (the object operator) in conjunction with an object variable and property
    name, like this:


    ```

    // listing 03.05

    $product1 = new ShopProduct();

    print $product1->title;

    default product

    ```


    Because the properties are defined as `public`, you can assign values to them
    just as you can read them, replacing any default value set in the class:


    ```

    // listing 03.06

    $product1 = new ShopProduct();

    $product2 = new ShopProduct();

    $product1->title="My Antonia";

    $product2->title="Catch 22";

    ```


    By declaring and setting the `$title` property in the `ShopProduct` class, I ensure
    that all `ShopProduct` objects have this property when first created. This means
    code that uses this class can work with `ShopProduct` objects based on that assumption.
    Because I can reset it, though, the value of `$title` may vary from object to
    object.


    Note


    Code that uses a class, function, or method is often described as the class’s,
    function’s, or method’s client or as client code. You will see this term frequently
    in the coming chapters.


    In fact, PHP does not force us to declare all our properties in the class. You
    could add properties dynamically to an object, like this:


    ```

    // listing 03.07

    $product1->arbitraryAddition = "treehouse";

    ```


    However, this method of assigning properties to objects is not considered good
    practice in object-oriented programming.


    Why is it bad practice to set properties dynamically? When you create a class
    you define a type. You inform the world that your class (and any object instantiated
