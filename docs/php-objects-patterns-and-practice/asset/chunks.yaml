- fmt: '# Encapsulation


    Encapsulation simply means the hiding of data and functionality from a client.
    And once again, it is a key object-oriented concept.


    On the simplest level, you encapsulate data by declaring properties `private`
    or `protected`. By hiding a property from client code, you enforce an interface
    and prevent the accidental corruption of an object’s data.


    Polymorphism illustrates another kind of encapsulation. By placing different implementations
    behind a common interface, you hide these underlying strategies from the client.
    This means that any changes that are made behind this interface are transparent
    to the wider system. You can add new classes or change the code in a class without
    causing errors. The interface is what matters, not the mechanisms working beneath
    it. The more independent these mechanisms are kept, the less chance that changes
    or repairs will have a knock-on effect in your projects.


    Encapsulation is, in some ways, the key to object-oriented programming. Your objective
    should be to make each part as independent as possible from its peers. Classes
    and methods should receive as much information as is necessary to perform their
    allotted tasks, which should be limited in scope and clearly identified.


    The introduction of the `private`, `protected`, and `public` keywords have made
    encapsulation easier. Encapsulation is also a state of mind, though. PHP 4 provided
    no formal support for hiding data. Privacy had to be signaled using documentation
    and naming conventions. An underscore, for example, is a common way of signaling
    a private property:


    ```

    var $_touchezpas;

    ```


    Code had to be checked closely, of course, because privacy was not strictly enforced.
    Interestingly, though, errors were rare because the structure and style of the
    code made it pretty clear which properties wanted to be left alone.


    By the same token, even after PHP 5 arrived, we could break the rules and discover
    the exact subtype of an object that we were using in a class-switching context
    simply by using the `instanceof` operator:


    ```

    function workWithProducts(ShopProduct $prod)

    {

    if ($prod instanceof CdProduct) {

    // do cd thing

    } else if ($prod instanceof BookProduct) {

    // do book thing

    }

    }

    ```


    You may have a very good reason to do this, but, in general, it carries a slightly
    uncertain odor. By querying the specific subtype in the example, I am setting
    up a dependency. Although the specifics of the subtype were hidden by polymorphism,
    it would have been possible to have changed the `ShopProduct` inheritance hierarchy
    entirely with no ill effects. This code ends that. Now, if I need to rationalize
    the `CdProduct` and `BookProduct` classes, I may create unexpected side effects
    in the `workWithProducts()` method.


    There are two lessons to take away from this example. First, encapsulation helps
    you to create orthogonal code. Second, the extent to which encapsulation is enforceable
    is beside the point. Encapsulation is a technique that should be observed equally
    by classes and their clients.


    ## Forget How to Do It


    If you are like me, the mention of a problem will set your mind racing, looking
    for mechanisms that might provide a solution. You might select functions that
    will address an issue, revisit clever regular expressions, track down Composer
    packages. You probably have some pasteable code in an old project that does something
    somewhat similar. At the design stage, you can profit by setting all that aside
    for a while. Empty your head of procedures and mechanisms.


    Think only about the key participants of your system: the types it will need and
    their interfaces. Of course, your knowledge of process will inform your thinking.
    A class that opens a file will need a path, database code will need to manage
    table names and passwords, and so on. Let the structures and relationships in
    your code lead you, though. You will find that the implementation falls into place
    easily behind a well-defined interface. You then have the flexibility to switch
    out, improve, or extend an implementation should you need to, without affecting
    the wider system.


    In order to emphasize interface, think in terms of abstract base classes rather
    than concrete children. In my parameter-fetching code, for example, the interface
    is the most important aspect of the design. I want a type that reads and writes
    name/value pairs. It is this responsibility that is important about the type,
    not the actual persistence medium or the means of storing and retrieving data.
    I design the system around the abstract `ParamHandler` class, and only add in
    the concrete strategies for actually reading and writing parameters later on.
    In this way, I build both polymorphism and encapsulation into my system from the
    start. The structure lends itself to class switching.


    Having said that, of course, I knew from the start that there would be text and
    XML implementations of `ParamHandler`, and there is no question that this influenced
    my interface. There is always a certain amount of mental juggling to do when designing
    interfaces.


    In **Design Patterns: Elements of Reusable Object-Oriented Software** (Addison-Wesley
    Professional, 1995), the Gang of Four summed up this principle with the phrase,
    “Program to an interface, not an implementation.” It is a good one to add to your
    coder’s handbook.


    ## Four Signposts


    Very few people get it absolutely right at the design stage. Most of us amend
    our code as requirements change or as we gain a deeper understanding of the nature
    of the problem we are addressing.


    As you amend your code, it can easily drift beyond your control. A method is added
    here and a new class there, and gradually your system begins to decay. As you
    have seen already, your code can point the way to its own improvement. These pointers
    in code are sometimes referred to as code smells—that is, features in code that
    may suggest particular fixes or at least call you to look again at your design.
    In this section, I distill some of the points already made into four signs that
    you should watch out for as you code.


    ### Code Duplication


    Duplication is one of the great evils in code. If you get a strange sense of déjà
    vu as you write a routine, chances are you have a problem.


    Take a look at the instances of repetition in your system. Perhaps they belong
    together. Duplication generally means tight coupling. If you change something
    fundamental about one routine, will the similar routines need amendment? If this
    is the case, they probably belong in the same class.


    ### The Class Who Knew Too Much


    It can be a pain passing parameters around from method to method. Why not simply
    reduce the pain by using a global variable? With a global, everyone can get at
    the data.


    Global variables have their place, but they do need to be viewed with some level
    of suspicion. That’s quite a high level of suspicion, by the way. By using a global
    variable, or by giving a class any kind of knowledge about its wider domain, you
    anchor it into its context, making it less reusable and dependent on code beyond
    its control. Remember, you want to decouple your classes and routines and not
    create interdependence. Try to limit a class’s knowledge of its context. I will
    look at some strategies for doing this later in the book.


    ### The Jack of All Trades


    Is your class trying to do too many things at once? If so, see if you can list
    the responsibilities of the class. You may find that one of them will form the
    basis of a good class itself.


    Leaving an overzealous class unchanged can cause particular problems if you create
    subclasses. Which responsibility are you extending with the subclass? What would
    you do if you needed a subclass for more than one responsibility? You are likely
    to end up with too many subclasses or an over-reliance on conditional code.'
