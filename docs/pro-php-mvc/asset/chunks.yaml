    \ = $this->_handler($node);\n                return call_user_func_array(array($this,\
    \ $handler), array($node, $content));\n            }\n            catch (\\Exception\
    \ $e)\n            {\n                throw new Exception\\Implementation();\n\
    \            }\n        }\n \n        public function match($source)\n       \
    \ {\n            $type = null;\n            $delimiter = null;\n        }\n  \
    \  }\n}\n```\n"
