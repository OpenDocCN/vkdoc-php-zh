    \ `Set::extract()` 在你的 Cake 应用或插件中是可用的，并且可以帮助清理嵌套数组。或者，在许多情况下，你将需要编写自己的循环来筛选嵌套数组。\n\
    \n第 2 行还使用了一些 SQL 语法来搜索 `date` 字段。请注意，此查询搜索与当前月份和年份匹配的事件。通过在字段名周围包裹 `MONTH()`，Cake\
    \ 知道要为日期时间字段运行正确的 SQL 查询。换句话说，通过提供一个代表当前月份的整数，模型将搜索数据库中与 `date` 字段中月份匹配的数据，而无需提供完整的日期时间字符串。同样，包裹\
    \ `YEAR()` 也能找到 `date` 字段中正确的年份。结果集将仅限于那些在本月本月发生的事件。\n\n第 3 行将结果作为 `$events` 数组发送到视图中。在\
    \ `app/plugins/calendar/views/events/index.ctp` 文件中，你现在可以使用 `$calendar->render()`\
    \ 函数，通过一行代码获取此数组并将其内容放入日历中。首先，通过在控制器顶部附近的 `$helpers` 类数组中包含 Calendar 插件，确保 Events\
    \ 控制器可以访问它：\n\n```\nvar $helpers = array('Calendar');\n```\n\n接下来，创建 `app/plugins/calendar/views/events/index.ctp`\
    \ 文件，并粘贴清单 13-21。\n\n**清单 13-21.** *索引视图的内容*\n\n```\n<h2><?=date('M').' '.date('Y');?></h2>\n\
    <?=$calendar->render($events,date('m'),date('Y'));?>\n```\n\n在浏览器中启动事件的 Index\
    \ 操作，你应该会看到一个渲染好的日历，其中包含你可能为该月保存的任何测试事件（参见图 13-2）。请记住，此日历显示在*外部应用*的布局中，而不是它自己的布局中。因此，如果你想更改日历的样式，你将需要编辑应用程序的样式，而不是插件的样式。当然，你可以构建一个带有自己样式的插件布局，但这可能会在你分发插件时妨碍其他应用程序的视图。最好坚持使用外部应用程序的布局和样式表，而不是强制插件必须看起来像某种样子，而不管其父应用程序如何。\n\
    \n![图片 43](img/index-260_1.jpg)\n\n**图 13-2.** *结合 Index 操作视图工作的* `$calendar->render()`\
    \ *函数*\n\n### 构建 View 操作\n\n构建 View 操作的大部分工作已在构建 Index 操作时完成。此操作与 Index 操作的不同之处在于，它基于传递的月份和年份值来构建其日历。围绕\
    \ Calendar Events 数据库的结果集格式化日历的相同过程也会在 View 操作中发生，因此 `$calendar->render()` 函数被同样地引用。清单\
    \ 13-22 包含要添加到 `app/plugins/calendar/controllers/events_controller.php` 文件中的 View\
    \ 操作。\n\n**清单 13-22.** *Events 控制器的 View 操作*\n\n```\nfunction view($month=null,$year=null)\
    \ {\n    if (!$month || !$year || !is_numeric($month) || !is_numeric($year)) {\n\
    \        $month = date('m');\n        $year = date('Y');\n    }\n    if ($month\
    \ > 12 || $month < 1) {\n        $month = date('m');\n    }\n    $events = Set::extract($this->CalendarEvent->find('all',array(\n\
    \        'conditions'=>array('MONTH(CalendarEvent.date)'=>$month,'YEAR(CalendarEvent.\n\
    \        date)'=>$year))),'{n}.CalendarEvent');\n    $this->set(compact('events','month','year'));\n\
    }\n```\n\n请注意，第 1 行包含了来自 URL 的传递参数，这些参数代表月份和年份。第 2-5 行检查这些值是否存在；如果不存在，则默认为当前月份和年份。第\
    \ 6 行确保提供的月份值在 1 到 12 之间；如果不是，则将 `$month` 设置为当前月份。第 9 行与清单 13-20 的第 2 行相同，只是它使用了\
    \ `$month` 和 `$year` 而不是当前的月份和年份。第 7 行也与清单 13-20 的第 3 行不同，因为它将 `$month` 和 `$year`\
    \ 传递给了视图。\n\n相应的视图也将与 Index 视图类似。创建 `app/plugins/calendar/views/events/view.ctp`\
    \ 文件，并粘贴清单 13-23。这将完成插件，并允许父应用程序通过请求插件操作或将链接指向插件来提供日历视图。\n\n**清单 13-23.** *View\
    \ 操作的视图*\n\n```\n<h2><?=date('M',mktime(0,0,0,$month,1,$year)).' '.$year;?></h2>\n\
    <?=$calendar->render($events,$month,$year);?>\n```\n\n通过提供月份和年份作为参数来启动 View 操作，并检查测试事件是否出现在正确的日期。你应该能够为月份和年份输入任何整数，插件将根据这些值渲染一个日历（参见图\
    \ 13-3）。\n\n![图片 44](img/index-262_1.jpg)\n\n**图 13-3.** *Calendar 插件使用 View 操作为\
    \ 2025 年 1 月渲染的日历*\n\n### 总结\n\n插件就像是微型的 Cake 应用程序，你可以将其引入任何其他 Cake 应用程序中。它们作为第三方资源（如\
    \ Pseudocoder 的 Ajax Chat 插件）非常有用，但也适用于可能需要在多个 Cake 项目中使用相同流程的内部应用程序。我解释了如何通过编写\
    \ Calendar 插件来构建自定义插件，该插件基于事件数据库表为任何 Cake 应用程序渲染日历。此插件使用控制器、模型、视图和辅助函数来创建一个简单的日历视图，并且可以扩展其他\
    \ Cake 应用程序以处理日历流程。下一章将讨论如何扩展 Web 应用程序开发中最具挑战性但也最高效的方面之一：数据处理。通过使用行为和 DataSource，你将能够将你的\
    \ Cake 应用程序连接到新的数据源，并更高效地处理数据。\n\n## 第 14 章\n\n# DataSource 与行为\n"
- fmt: '# CakePHP 的 MVC 扩展资源


    **Cake** 的核心资源严格遵循 MVC 范式，这意味着所有输出由视图（view）配置，所有数据处理由模型（model）管理，所有业务逻辑由控制器（controller）处理。然而，你已经了解到模型、视图和控制器是如何相互协作来作为一个应用程序运行的。视图不能在没有控制器提供所需变量的情况下单独运行，控制器也不能在没有模型帮助的情况下处理其逻辑，依此类推。这些资源相互协作的程度取决于应用程序所采用的独特流程。由于
    MVC 元素几乎同时协同工作，你可能操纵某个元素去执行另一个元素的工作。例如，模型可以创建输出字符串（如 HTML 标签和表单字段）并传递给视图。这在短期内可能有效，但如果你后来分发这个应用程序，其他
    Cake 开发者将很难与之协作。要保持 Cake 应用程序的可移植性，需要尽可能严格遵循 MVC 结构。


    但是，仅有模型、视图和控制器文件会带来一个潜在问题：这些文件可能会变得臃肿，这意味着应用程序越复杂，这些资源的组织就可能越混乱。诚然，所有数据处理都限制在模型中，但如果你想处理多个数据源（例如一个
    XML 文件和两个不同的数据库系统）呢？在这种情况下，模型需要包含大量的连接函数，更不用说查找、读取、删除以及其他必要的数据处理方法了。不久之后，MVC 结构就会开始失去其关键优势之一：轻量级组织，尤其是在应用程序较为复杂的情况下。


    为了解决模型、视图和控制器文件过于庞大的问题，Cake 开发者们在框架中内置了*扩展* MVC 结构的资源。我在之前的章节中已经讨论过其中一些扩展，例如助手（helper）和组件（component）。通过扩展
    MVC 结构，模型操作被保留在模型中，视图和控制器操作也各归其位——但模型、视图和控制器文件不会因重复出现在整个程序中的函数和数据而变得过重。


    正如基本应用程序流程（如处理数据和向用户提供输出）通过使用模型、视图和控制器进行分离一样，更复杂的流程（如生成动态视图）也与其各自的资源进行了分离。换句话说，助手和组件分别为处理视图和控制器提供了*第二层*支持。表
    14-1 展示了 Cake 中扩展 MVC 布局的资源。


    **Table 14-1.** *Cake 扩展 MVC 布局的资源*


    | **主层资源** | **后台层资源** |

    | --- | --- |

    | 模型（`Model`） | 行为（`Behavior`）；数据源（`DataSource`） |

    | 视图（`View`） | 助手（`Helper`） |

    | 控制器（`Controller`） | 组件（`Component`） |


    通过使用助手，你可以避免单个视图变得过于臃肿，并使详细的输出流程可供应用程序中的其他视图使用。助手函数在后台层处理，或者在视图渲染时处理。组件通过分离出执行详细操作的一系列函数，为控制器提供类似的服务。图
    14-1 展示了助手如何扩展视图。


    **Figure 14-1.** *助手通过容纳更复杂的函数来扩展视图，这些函数否则会使视图变得混乱。*


    这是具体流程：


    1.  视图调用`$html->link()`函数来渲染一个链接，并为助手提供变量参数。

    2.  `link()`函数处理传递的参数并组合成最终输出，供视图使用。

    3.  HTML 助手将最终的`<a>`元素及其所有文本和属性发送回视图。


    图 14-1 中的示例展示了如何通过将生成链接的重复性任务放入助手中来精简视图。换句话说，Cake 不是将`$html->link()`函数的流程放入视图，而是将其保存在一个位置，从而使其可被整个应用程序访问，同时最小化视图文件中的代码量。本章将解释如何使用两种资源来扩展后台层的模型，就像助手和组件扩展视图和控制器一样。


    ## 使用数据源和行为扩展模型


    第一种资源是*数据源（`DataSource`）*。1 这些资源在后台连接额外的数据源并向模型提供数据。通过使用数据源，你可以让模型正常工作，而不必用连接、查找、读取和其他数据处理操作来填充它。模型可以引用数据源函数，而不是自己执行额外的连接。


    第二种扩展模型的资源是*行为（`Behavior`）*。这些是允许模型使用的数据以不同方式“表现”的类。简而言之，一些数据处理方法超越了表关联和简单回调；例如，它们可能在数据保存时对数据执行多个任务。当需要在数据库中同时执行多次更新时，就会调用行为。稍后，我将描述如何使用一些
    Cake 内建的行为为博客应用程序的标签应用树结构。


    由于扩展模型通常是资源中最复杂的部分，本章可能会包含一些学习 Cake 时最难掌握的概念。


    只需记住该资源的总体目标以及它最初出现在 Cake 中的原因。你的应用程序可能不需要为模型添加自定义行为，或者使用除典型 MySQL 设置之外的其他数据源，但了解这些资源能做什么以及它们在
    Cake 中如何工作，几乎肯定会在某些时候派上用场。


    ## 使用数据源


    到目前为止，本书只使用了 MySQL 来处理数据，但肯定还有其他方式为应用程序存储数据。例如 PostgreSQL、Sybase、Oracle 和 Microsoft
    SQL Server 都是一些最流行的数据库系统，如果项目需要，让 Cake 与它们协作可能很重要。幸运的是，Cake 提供了一些内建的数据源，允许应用程序连接到这些其他系统。


    数据源不仅有助于处理其他数据库引擎，还可以进行自定义以处理其他数据格式。可以通过数据源实现读取 XML、CSV 或其他格式。应用程序也可以通过数据源使用其他服务器系统，如
    LDAP 或 IMAP。许多 Web 应用程序使用某种 Web 服务 API 来与不使用 HTML 的客户端程序协作。结合 Cake 应用程序和客户端软件的能力也可以通过数据源实现。


    数据源的主要目标是处理模型的所有连接方法，并为模型提供便捷函数，以尽可能减少模型中的代码量。不过，这些便捷函数与数据源的通信有关，而不仅仅是任何模型类型的流程。换句话说，你希望模型能够坚持使用数据源进行通信，而不是自行处理所有连接细节。


    1. 在 Cake 中定义数据源可能比较棘手。通常，*datasource*（小写）是任何提供或保存数据的来源。因此，MySQL 是一个数据源，XML 文件或从
    LDAP 获取数据也是数据源。'
  raw: '**C**ake’s core set of resources strictly adhere to the MVC paradigm, meaning
    that all output is configured by the view, all data handling is managed by the
    model, and all business logic is handled by the controller. At this point, however,
    you’re aware of how much the model, view, and controller work together to run
    as an application. The view doesn’t act alone without the controller providing
    needed variables, the controller doesn’t process its logic without the help of
    the model, and so on. The degree to which these resources work together depends
    on the unique processes employed by the application. Because the MVC elements
    work together (more or less simultaneously), you could possibly manipulate one
    element to perform the work of another. For instance, the model could create output
    strings to be passed to the view, like HTML tags and form fields. This might work
    in the short run, but if you were to distribute this application later, it would
    prove difficult for other Cake developers to work with. Keeping Cake applications
    portable requires sticking to the MVC structure as much as possible.


    But having only model, view, and controller files presents one potential problem:
    these files could get overdone, meaning that the more complex the application
    becomes, the more disorganized these resources could appear. True, all data handling
    is restricted to the model, but what if you want to work with multiple sources
    of data, such as an XML file here and two different database systems there? In
    this situation, the model would need to include a large number of connection functions,
    not to mention find, read, delete, and other necessary data-handling methods.
    Before long, the MVC structure would begin to lose one of its key advantages:
    lightweight organization, especially in cases where the application is more elaborate.


    Rather than accept the need for very large model, view, and controller files,
    the Cake developers built into the framework resources that *extend* the MVC structure.
    I’ve already discussed a couple of these extensions, such as helpers and components,
    in previous chapters. By extending the MVC structure, model operations are kept
    to the model, and view and controller operations are kept to their respective
    places—but the model, view, and controller files don’t get overloaded with functions
    and data that are repeated throughout the program.


    Just as basic application procedures (such as working with data and supplying
    output to the user) get separated by using models, views, and controllers, more
    complicated procedures (such as producing dynamic views) get separated from their
    respective resources. In other words, helpers and components provide a *second
    layer* to working with views and controllers, respectively. Table 14-1 illustrates
    resources in Cake that extend the MVC layout.


    **241**


    ![Image 45](index-264_1.jpg)


    ![Image 46](index-264_2.jpg)


    09775ch14final 7/1/08 9:57 PM Page 242


    **242**


    C H A P T E R 1 4 ■ D ATA S O U R C E S A N D B E H AV I O R S


    **Table 14-1.** *Cake Resources That Extend the MVC Layout*


    **Main Layer Resource**


    **Background Layer Resource(s)**


    Model


    Behavior; DataSource


    View


    Helper


    Controller


    Component


    By using helpers, you keep the individual views from getting too bloated, and
    you make detailed output procedures available to other views across the application.
    Helper functions are processed in the background layer, or while the view is being
    rendered. Components provide a similar service to the controller by separating
    out a suite of functions that perform detailed operations. Figure 14-1 shows how
    the helper extends the view.


    **Figure 14-1.** *The helper extends the view by housing more elaborate functions
    that would* *otherwise clutter the view.*


    This is the process:


    **1.** The view calls the $html->link() function to render a link and provides
    variable parameters for the helper.


    **2.** The link() function processes the passed parameters and pieces together
    the final output to be used in the view.


    **3.** The HTML helper sends the final <a> element with all the text and attributes
    back to the view.


    The example in Figure 14-1 shows how the view is trimmed down by placing the repetitive
    task of generating links into the helper. In other words, rather than place the
    $html->link() function’s procedure into the view, Cake keeps it in one place,
    thus making it accessible to the whole application and at the same time minimizing
    the amount of code in the view file. This chapter explains how to use two resources
    that extend the model in the background layer just as helpers and components extend
    the view and controller.


    09775ch14final 7/1/08 9:57 PM Page 243


    C H A P T E R 1 4 ■ D ATA S O U R C E S A N D B E H AV I O R S


    **243**


    **Extending the Model with DataSources**


    **and Behaviors**


    The first of these resources are *DataSources*.1 These are resources that connect
    to extra datasources in the background and provide data to the model. By using
    DataSources, you allow the model to work normally, without filling it up with
    connection, find, read, and other data-handling operations. The model can reference
    DataSource functions rather than perform the extra connecting itself.


    The second resources that extend the model are *behaviors*. These are classes
    that allow the data used by the model to “behave” differently. In short, some
    data-processing methods go beyond table associations and simple callbacks; they
    may perform multiple tasks *with the* *data* as the data is saved, for instance.
    Behaviors are invoked when several updates need to be performed simultaneously
    across the database. Later, I’ll describe how to use some of Cake’s built-in behaviors
    to apply a tree structure to the blog application’s tags.


    Because extending the model is generally the most complicated of resources, this
    chapter will probably include some of the most difficult concepts to master when
    learning Cake.


    Just remember what the overall goal of the resource is and why it’s available
    in Cake in the first place. Your application may not call for an added behavior
    for your model or a datasource beyond the typical MySQL setup, but knowing what
    these resources can do and how they work in Cake will almost certainly come in
    handy at some point.


    **Working with DataSources**


    So far in this book we’ve used only MySQL to work with data, but there certainly
    are other ways to store data for the application. PostgreSQL, Sybase, Oracle,
    and Microsoft SQL Server, to name a few, are some of the most popular database
    systems, and getting Cake to work with them may be important if the project requires
    it. Fortunately, Cake comes with some built-in DataSources that allow the application
    to connect to these other systems.


    DataSources not only help with other database engines, but they also can be customized
    to work with other data formats. Reading XML, CSV, or other formats may be accomplished
    with DataSources. The application can also use other server systems such as LDAP
    or IMAP


    through DataSources. Many web applications use some kind of web service API to
    work with client-side programs that do not use HTML. Combining the power of a
    Cake application and client-side software can be done with DataSources as well.


    The main goal of DataSources is to handle all the connection methods for the model
    and to provide the model with convenience functions to keep the amount of code
    in the model as low as possible. These convenience functions, though, do relate
    to talking with the datasource and not just any model-type procedure. In other
    words, you want the model to be able to stick 1\. Defining DataSources can be
    tricky in Cake. In general, a *datasource* (lowercase) is any source for supplying
    or saving data. So, MySQL is a datasource, as is an XML file or pulling data from
    an LDAP'
