    \ `1:1` 关系，必要时可以通过交叉引用（或链接）表来实现。下一章将继续探索多表操作，展示在插入、更新和删除记录时如何处理外键关系。\n\n# 16.\
    \ 管理多个数据库表\n\n上一章向你展示了如何使用 `INNER JOIN` 和 `LEFT JOIN` 检索存储在多个表中的信息。你还学习了如何通过向子表添加额外的列并单独更新每条记录以插入外键来链接现有表。然而，大多数时候你会希望同时在两个表中插入数据。这带来了一个挑战，因为\
    \ `INSERT` 命令一次只能操作一个表。你需要按照正确的顺序处理插入操作，从父表开始，这样你就可以获取新记录的主键，并与其他详细信息同时插入到子表中。在更新和删除记录时，也需要考虑类似的问题。涉及的代码并不难，但在构建脚本时，你需要清晰地将事件顺序牢记在心。\n\
    \n本章将指导你完成在 `blog` 表中插入新文章的过程，可选地选择关联图片或上传新图片，并将文章分配到一个或多个类别，所有这些都在一次操作中完成。然后，你将构建脚本以更新和删除文章，同时不破坏相关表的参照完整性。\n\
    \n你还将学习外键约束，它控制当你尝试删除在另一个表中仍存在外键关系的记录时会发生什么。并非所有数据库都支持外键约束，因此检查你的远程服务器是否支持非常重要。本章还解释了如果你的服务器不支持外键约束，你可以采取哪些措施来保护数据完整性。\n\
    \n具体来说，你将学习以下内容：\n\n- 在相关表中插入、更新和删除记录\n- 在记录创建后立即找到其主键\n- 转换表的存储引擎\n- 在 InnoDB\
    \ 表之间建立外键约束\n"
- fmt: "# Maintaining Referential Integrity\n\nWith single tables, it doesn’t matter\
    \ how often you update a record or how many records you delete, the impact on\
    \ other records is zero. Once you store the primary key of a record as a foreign\
    \ key in a different table, you create a dependency that needs to be managed.\
    \ For example, Figure [16-1](#A978-1-4842-0635-5_16_Chapter.html#Fig1) shows the\
    \ second article from the `blog` table (“Trainee Geishas Go Shopping”) linked\
    \ to the `Kyoto` and `People` categories through the `article2cat` cross-reference\
    \ table.\n\n![A978-1-4842-0635-5_16_Fig1_HTML.jpg](A978-1-4842-0635-5_16_Fig1_HTML.jpg)\n\
    \nFigure 16-1.\n\nYou need to manage foreign-key relations to avoid orphaned records\n\
    \nIf you delete the article, but fail to delete the entries for `article_id 2`\
    \ in the cross-reference table, a query that looks for all articles in the `Kyoto`\
    \ or `People` categories tries to match a nonexistent record in the `blog` table.\
    \ Similarly, if you decide to delete one of the categories without also deleting\
    \ matching records in the cross-reference table, a query that looks for the categories\
    \ associated with an article tries to match a nonexistent category.\n\nBefore\
    \ long, your database is littered with orphaned records. Fortunately, maintaining\
    \ referential integrity is not difficult. SQL does it through the establishment\
    \ of rules known as foreign-key constraints that tell the database what to do\
    \ when you update or delete a record that has dependent records in another table.\n\
    \n## Support for foreign-key constraints\n\nForeign-key constraints are supported\
    \ by `InnoDB`, the default storage engine in MySQL 5.5 and later. The equivalent\
    \ storage engine in MariaDB is Percona XtraDB, but it identifies itself as `InnoDB`\
    \ and has the same features. Even if your remote server is running the latest\
    \ version of MySQL or MariaDB, there’s no guarantee that `InnoDB` is supported,\
    \ because your hosting company may have disabled it.\n\nIf your server is running\
    \ an older version of MySQL, the default storage engine is `MyISAM`, which doesn’t\
    \ support foreign-key constraints. However, you might still have access to `InnoDB`,\
    \ because it has been an integral part of MySQL since version 4.0. Converting\
    \ `MyISAM` tables to `InnoDB` is very simple and takes only a few seconds.\n\n\
    If you don’t have access to `InnoDB`, you need to maintain referential integrity\
    \ by building the necessary rules into your PHP scripts. This chapter shows both\
    \ approaches.\n\n> **Note**  \n> `MyISAM` tables have the advantage of being very\
    \ fast. They require less disk space and are ideal for storing large amounts of\
    \ data that isn’t changed very often. They also support full text indexing and\
    \ searching, a feature that wasn’t available in `InnoDB` until MySQL 5.6 and MariaDB\
    \ 10.0.5.\n\n### PHP Solution 16-1: Checking whether InnoDB is supported\n\nThis\
    \ PHP solution explains how to check whether your remote server supports the `InnoDB`\
    \ storage engine.\n\nIf your hosting company provides phpMyAdmin to administer\
    \ your database(s), launch phpMyAdmin on your remote server and click the `Engines`\
    \ tab at the top of the screen, if it’s available. This displays a list of storage\
    \ engines similar to Figure [16-2](#A978-1-4842-0635-5_16_Chapter.html#Fig2).\n\
    \n![A978-1-4842-0635-5_16_Fig2_HTML.jpg](A978-1-4842-0635-5_16_Fig2_HTML.jpg)\n\
    \nFigure 16-2.\n\nChecking storage engine support through phpMyAdmin\n\nThe list\
    \ displays all storage engines, including those that are not supported. Unsupported\
    \ or disabled storage engines are grayed out. If you’re not sure of the status\
    \ of `InnoDB`, click its name in the list. If `InnoDB` is not supported, you’ll\
    \ see a message telling you so. If, on the other hand, you see a list of variables\
    \ similar to Figure [16-3](#A978-1-4842-0635-5_16_Chapter.html#Fig3), you’re in\
    \ luck—`InnoDB` is supported.\n\n![A978-1-4842-0635-5_16_Fig3_HTML.jpg](A978-1-4842-0635-5_16_Fig3_HTML.jpg)\n\
    \nFigure 16-3.\n\nConfirmation that InnoDB is supported\n\nIf there’s no `Engines`\
    \ tab in phpMyAdmin, select any table in your database and click the `Operations`\
    \ tab at the top right of the screen. In the `Table options` section, click the\
    \ down arrow to the right of the `Storage Engine` field to display the available\
    \ options (see Figure [16-4](#A978-1-4842-0635-5_16_Chapter.html#Fig4)). If `InnoDB`\
    \ is listed, it’s supported.\n\n![A978-1-4842-0635-5_16_Fig4_HTML.jpg](A978-1-4842-0635-5_16_Fig4_HTML.jpg)\n\
    \nFigure 16-4.\n\nThe available storage engines are listed in the Table options\n\
    \nIf neither of the preceding methods gives you the answer, open `storage_engines.php`\
    \ in the `ch16` folder. Edit the first three lines to insert the hostname, username,\
    \ and password for the database on your remote server. Upload `storage_engines.php`\
    \ to your website and load the page into a browser. You should see a list of storage\
    \ engines and level of support, as shown in Figure [16-5](#A978-1-4842-0635-5_16_Chapter.html#Fig5).\
    \ In some cases, `NO` will be replaced by `DISABLED`.\n\n![A978-1-4842-0635-5_16_Fig5_HTML.jpg](A978-1-4842-0635-5_16_Fig5_HTML.jpg)\n\
    \nFigure 16-5.\n\nThe SQL query in storage_engines.php reports which ones are\
    \ supported\n\nAs Figure [16-5](#A978-1-4842-0635-5_16_Chapter.html#Fig5) shows,\
    \ a typical installation of MySQL supports several storage engines. What may come\
    \ as a surprise is that you can use different storage engines within the same\
    \ database. In fact, it’s recommended that you do. Even if your remote server\
    \ supports `InnoDB`, it’s usually more efficient to use `MyISAM` for tables that\
    \ don’t have a foreign-key relationship. Use `InnoDB` for tables that have foreign-key\
    \ relationships. You should also use `InnoDB` if you need support for transactions.\n\
    \n> **Note**  \n> A transaction is a series of related SQL queries. If one part\
    \ of the series fails, the transaction is terminated and the database rolls back\
    \ to its original state from before the transaction. Financial databases make\
    \ extensive use of transactions, which are beyond the scope of this book.\n\n\
    I’ll explain how to convert tables to `InnoDB` and set up foreign-key constraints\
    \ later in this chapter. Before that, let’s look at how to establish and use foreign-key\
    \ relationships regardless of the storage engine being used."
  raw: '## Maintaining Referential Integrity


    With single tables, it doesn’t matter how often you update a record or how many
    records you delete, the impact on other records is zero. Once you store the primary
    key of a record as a foreign key in a different table, you create a dependency
    that needs to be managed. For example, Figure [16-1](#A978-1-4842-0635-5_16_Chapter.html#Fig1)
    shows the second article from the `blog` table (“Trainee Geishas Go Shopping”)
    linked to the `Kyoto` and `People` categories through the `article2cat` cross-reference
    table.


    ![A978-1-4842-0635-5_16_Fig1_HTML.jpg](A978-1-4842-0635-5_16_Fig1_HTML.jpg)


    Figure 16-1.


    You need to manage foreign-key relations to avoid orphaned records


    If you delete the article, but fail to delete the entries for `article_id 2` in
    the cross-reference table, a query that looks for all articles in the `Kyoto`
    or `People` categories tries to match a nonexistent record in the `blog` table.
    Similarly, if you decide to delete one of the categories without also deleting
    matching records in the cross-reference table, a query that looks for the categories
    associated with an article tries to match a nonexistent category.


    Before long, your database is littered with orphaned records. Fortunately, maintaining
    referential integrity is not difficult. SQL does it through the establishment
    of rules known as foreign-key constraints that tell the database what to do when
    you update or delete a record that has dependent records in another table.


    ### Support for foreign-key constraints


    Foreign-key constraints are supported by InnoDB, the default storage engine in
    MySQL 5.5 and later. The equivalent storage engine in MariaDB is Percona XtraDB,
    but it identifies itself as InnoDB and has the same features. Even if your remote
    server is running the latest version of MySQL or MariaDB, there’s no guarantee
    that InnoDB is supported, because your hosting company may have disabled it.


    If your server is running an older version of MySQL, the default storage engine
    is MyISAM, which doesn’t support foreign-key constraints. However, you might still
    have access to InnoDB, because it has been an integral part of MySQL since version
    4.0\. Converting MyISAM tables to InnoDB is very simple and takes only a few seconds.


    If you don’t have access to InnoDB, you need to maintain referential integrity
    by building the necessary rules into your PHP scripts. This chapter shows both
    approaches.


    Note


    MyISAM tables have the advantage of being very fast. They require less disk space
    and anre ideal for storing large amounts of data that isn’t changed very often.
    They also support full text indexing and searching, a feature that wasn’t available
    in InnoDB until MySQL 5.6 and MariaDB 10.0.5.


    #### PHP Solution 16-1: Checking whether InnoDB is supported


    This PHP solution explains how to check whether your remote server supports the
    InnoDB storage engine.


    If your hosting company provides phpMyAdmin to administer your database(s), launch
    phpMyAdmin on your remote server and click the `Engines` tab at the top of the
    screen, if it’s available. This displays a list of storage engines similar to
    Figure [16-2](#A978-1-4842-0635-5_16_Chapter.html#Fig2).  


    ![A978-1-4842-0635-5_16_Fig2_HTML.jpg](A978-1-4842-0635-5_16_Fig2_HTML.jpg)


    Figure 16-2.


    Checking storage engine support through phpMyAdminThe list displays all storage
    engines, including those that are not supported. Unsupported or disabled storage
    engines are grayed out. If you’re not sure of the status of InnoDB, click its
    name in the list.   If InnoDB is not supported, you’ll see a message telling you
    so. If, on the other hand, you see a list of variables similar to Figure [16-3](#A978-1-4842-0635-5_16_Chapter.html#Fig3),
    you’re in luck—InnoDB is supported.  


    ![A978-1-4842-0635-5_16_Fig3_HTML.jpg](A978-1-4842-0635-5_16_Fig3_HTML.jpg)


    Figure 16-3.


    Confirmation that InnoDB is supportedIf there’s no `Engines` tab in phpMyAdmin,
    select any table in your database and click the `Operations` tab at the top right
    of the screen. In the `Table options` section, click the down arrow to the right
    of the `Storage Engine` field to display the available options (see Figure [16-4](#A978-1-4842-0635-5_16_Chapter.html#Fig4)).
    If InnoDB is listed, it’s supported.  


    ![A978-1-4842-0635-5_16_Fig4_HTML.jpg](A978-1-4842-0635-5_16_Fig4_HTML.jpg)


    Figure 16-4.


    The available storage engines are listed in the Table optionsIf neither of the
    preceding methods gives you the answer, open `storage_engines.php` in the `ch16`
    folder. Edit the first three lines to insert the hostname, username, and password
    for the database on your remote server.   Upload `storage_engines.php`to your
    website and load the page into a browser. You should see a list of storage engines
    and level of support, as shown in Figure [16-5](#A978-1-4842-0635-5_16_Chapter.html#Fig5).
    In some cases, `NO` will be replaced by `DISABLED`.  


    ![A978-1-4842-0635-5_16_Fig5_HTML.jpg](A978-1-4842-0635-5_16_Fig5_HTML.jpg)


    Figure 16-5.


    The SQL query in storage_engines.php reports which ones are supported


    As Figure [16-5](#A978-1-4842-0635-5_16_Chapter.html#Fig5) shows, a typical installation
    of MySQL supports several storage engines. What may come as a surprise is that
    you can use different storage engines within the same database. In fact, it’s
    recommended that you do. Even if your remote server supports InnoDB, it’s usually
    more efficient to use MyISAM for tables that don’t have a foreign-key relationship.
    Use InnoDB for tables that have foreign-key relationships. You should also use
    InnoDB if you need support for transactions.


    Note


    A transaction is a series of related SQL queries. If one part of the series fails,
    the transaction is terminated and the database rolls back to its original state
    from before the transaction. Financial databases make extensive use of transactions,
    which are beyond the scope of this book.


    I’ll explain how to convert tables to InnoDB and set up foreign-key constraints
    later in this chapter. Before that, let’s look at how to establish and use foreign-key
    relationships regardless of the storage engine being used.'
  trans: "\n# 维护参照完整性\n\n对于单表来说，无论你更新一条记录多少次，或删除多少条记录，对其他记录的影响都为零。但一旦你将一条记录的主键作为外键存储在另一个表中，就创建了一个需要管理的依赖关系。例如，图\
    \ 16-1 展示了`blog`表中的第二篇文章（“见习艺伎去购物”）通过`article2cat`交叉引用表链接到了`Kyoto`和`People`这两个分类。\n\
    \n![A978-1-4842-0635-5_16_Fig1_HTML.jpg](img/A978-1-4842-0635-5_16_Fig1_HTML.jpg)\n\
    \n图 16-1.\n\n你需要管理外键关系以避免孤儿记录\n\n如果你删除了这篇文章，但没有删除交叉引用表中`article_id 2`对应的条目，那么查找`Kyoto`或`People`分类下所有文章的查询将尝试匹配`blog`表中一条不存在的记录。类似地，如果你决定删除某个分类，却没有同时删除交叉引用表中与之匹配的记录，那么查找与某篇文章关联分类的查询将尝试匹配一个不存在的分类。\n\
    \n不久之后，你的数据库就会充斥着孤儿记录。幸运的是，维护参照完整性并不困难。SQL 通过建立被称为外键约束的规则来实现这一点，这些规则告诉数据库当你更新或删除一条在另一个表中有从属记录的数据时该怎么做。\n\
    \n## 对外键约束的支持\n\n外键约束由`InnoDB`支持，这是 MySQL 5.5 及更高版本中的默认存储引擎。MariaDB 中对应的存储引擎是\
    \ Percona XtraDB，但它自识别为`InnoDB`并具有相同功能。即使你的远程服务器运行的是最新版本的 MySQL 或 MariaDB，也不能保证一定支持`InnoDB`，因为你的托管公司可能禁用了它。\n\
    \n如果你的服务器运行的是旧版本的 MySQL，默认存储引擎是`MyISAM`，它不支持外键约束。不过，你可能仍能访问`InnoDB`，因为自 MySQL\
    \ 4.0 版本起，它已成为 MySQL 不可分割的一部分。将`MyISAM`表转换为`InnoDB`非常简单，只需几秒钟。\n\n如果你无法访问`InnoDB`，则需要通过在\
    \ PHP 脚本中构建必要的规则来维护参照完整性。本章将介绍这两种方法。\n\n> **注意**  \n> `MyISAM`表的优点是速度非常快。它们需要的磁盘空间更少，非常适合存储不经常更改的大量数据。它们还支持全文索引和搜索，这一功能在\
    \ MySQL 5.6 和 MariaDB 10.0.5 之前的`InnoDB`中不可用。\n\n### PHP 解决方案 16-1：检查是否支持 InnoDB\n\
    \n此 PHP 解决方案说明了如何检查你的远程服务器是否支持`InnoDB`存储引擎。\n\n如果你的托管公司提供 phpMyAdmin 来管理数据库，请在远程服务器上启动\
    \ phpMyAdmin，如果可用，点击屏幕顶部的`Engines`选项卡。这将显示一个类似于图 16-2 的存储引擎列表。\n\n![A978-1-4842-0635-5_16_Fig2_HTML.jpg](img/A978-1-4842-0635-5_16_Fig2_HTML.jpg)\n\
    \n图 16-2.\n\n通过 phpMyAdmin 检查存储引擎支持情况\n\n该列表显示所有存储引擎，包括那些不支持的。不支持的或已禁用的存储引擎会变灰显示。如果你不确定`InnoDB`的状态，请在列表中点击它的名称。如果不支持`InnoDB`，你会看到一条相关提示信息。反之，如果你看到类似图\
    \ 16-3 的变量列表，那么你很幸运——`InnoDB`是受支持的。\n\n![A978-1-4842-0635-5_16_Fig3_HTML.jpg](img/A978-1-4842-0635-5_16_Fig3_HTML.jpg)\n\
    \n图 16-3.\n\n确认 InnoDB 受支持\n\n如果 phpMyAdmin 中没有`Engines`选项卡，请选择数据库中的任意表，然后点击屏幕右上角的`Operations`选项卡。在`表选项`部分，点击`存储引擎`字段右侧的下拉箭头以显示可用选项（见图\
    \ 16-4）。如果列出了`InnoDB`，则表示它受支持。\n\n![A978-1-4842-0635-5_16_Fig4_HTML.jpg](img/A978-1-4842-0635-5_16_Fig4_HTML.jpg)\n\
    \n图 16-4.\n\n表选项中列出了可用的存储引擎\n\n如果以上两种方法均未给出答案，请打开`ch16`文件夹中的`storage_engines.php`。编辑前三行，插入远程服务器上数据库的主机名、用户名和密码。将`storage_engines.php`上传到你的网站，并在浏览器中加载该页面。你应该会看到存储引擎列表及其支持级别，如图\
    \ 16-5 所示。在某些情况下，`NO`会被`DISABLED`替代。\n\n![A978-1-4842-0635-5_16_Fig5_HTML.jpg](img/A978-1-4842-0635-5_16_Fig5_HTML.jpg)\n\
    \n图 16-5.\n\nstorage_engines.php 中的 SQL 查询会报告哪些引擎受支持\n\n如图 16-5 所示，MySQL 的典型安装支持多种存储引擎。令人惊讶的是，你可以在同一个数据库中使用不同的存储引擎。事实上，建议你这样做。即使你的远程服务器支持`InnoDB`，对于没有外键关系的表，使用`MyISAM`通常效率更高。对于有外键关系的表，则使用`InnoDB`。如果你需要支持事务，也应该使用`InnoDB`。\n\
    \n> **注意**  \n> 事务是一系列相关的 SQL 查询。如果系列中的某一部分失败，事务将被终止，数据库会回滚到事务开始前的原始状态。财务数据库广泛使用事务，但这超出了本书的范围。\n\
    \n我将在本章后面部分解释如何将表转换为`InnoDB`以及如何设置外键约束。在此之前，让我们先看看如何建立和使用外键关系，无论使用的是哪种存储引擎。\n"
- fmt: "### Inserting records into multiple tables\n\nAn `INSERT` query can insert\
    \ data into only one table. Consequently, when working with multiple tables, you\
    \ need to plan your insert scripts carefully to ensure that all the information\
    \ is stored and that the correct foreign-key relationships are established.\n\n\
    `PHP Solutions 15-2 (MySQLi)` and `15-3 (PDO)` in the previous chapter showed\
    \ how to add the correct foreign key for an image that is already registered in\
    \ the database. However, when inserting a new blog entry, you need to be able\
    \ to select an existing image, upload a new image, or choose to have no image\
    \ at all. This means that your processing script needs to check whether an image\
    \ has been selected or uploaded and execute the relevant commands accordingly.\
    \ In addition, tagging a blog entry with zero or more categories increases the\
    \ number of decisions the script needs to make. Figure [16-6](#A978-1-4842-0635-5_16_Chapter.html#Fig6)\
    \ shows the decision chain.\n\n![A978-1-4842-0635-5_16_Fig6_HTML.jpg](A978-1-4842-0635-5_16_Fig6_HTML.jpg)\n\
    \nFigure 16-6. The decision chain for inserting a new blog article with an image\
    \ and categories\n\nWhen the page first loads, the form hasn’t been submitted,\
    \ so the page simply displays the insert form. Both the existing images and categories\
    \ are listed in the insert form by querying the database in the same way as was\
    \ done for the images in the update form in `PHP Solutions 15-2` and `15-3`.\n\
    \nAfter the form has been submitted, the processing script goes through the following\
    \ steps:\n\n- If an image has been uploaded, the upload is processed, the details\
    \ of the image are stored in the `images` table, and the script gets the primary\
    \ key of the new record.\n- If no image has been uploaded, but an existing image\
    \ has been selected, the script gets its foreign key from the value submitted\
    \ through the `$_POST` array.\n- In either case, the new blog article is inserted\
    \ in the `blog` table along with the image’s primary key as a foreign key. However,\
    \ if an image has neither been uploaded nor selected from the existing ones, the\
    \ article is inserted in the `blog` table without a foreign key.\n- Finally, the\
    \ script checks whether any categories have been selected. If they have, the script\
    \ gets the new article’s primary key and combines it with the primary keys of\
    \ the selected categories in the `article2cat` table.\n\nIf there’s a problem\
    \ at any stage, the script needs to abandon the rest of the process and redisplay\
    \ the user’s input. The script is quite long, so I’ll break it up into several\
    \ sections. The first stage is to create the `article2cat` cross-reference table.\n\
    \n### Creating a cross-reference table\n\nWhen dealing with many-to-many relationships\
    \ in a database, you need to build a cross-reference table like the one in Figure\
    \ [16-1](#A978-1-4842-0635-5_16_Chapter.html#Fig1). A cross-reference table consists\
    \ of just two columns, which are jointly declared as the table’s primary key (known\
    \ as a composite primary key). If you look at Figure [16-7](#A978-1-4842-0635-5_16_Chapter.html#Fig7),\
    \ you’ll see that the `article_id` and `cat_id` columns both contain the same\
    \ number several times—something that’s unacceptable in a primary key, which must\
    \ be unique. However, in a composite primary key, it’s the combination of both\
    \ values that is unique. The first two combinations, `1,3` and `2,1`, are not\
    \ repeated anywhere else in the table, nor are any of the others.\n\n![A978-1-4842-0635-5_16_Fig7_HTML.jpg](A978-1-4842-0635-5_16_Fig7_HTML.jpg)\n\
    \nFigure 16-7. In a cross-reference table, both columns together form a composite\
    \ primary key\n\n#### Setting up the categories and cross-reference tables\n\n\
    In the `ch16` folder, you’ll find `categories.sql`, which contains the SQL to\
    \ create the `categories` table and the cross-reference table, `article2cat`,\
    \ together with some sample data. The settings used to create the tables are listed\
    \ in Tables [16-1](#A978-1-4842-0635-5_16_Chapter.html#Tab1) and [16-2](#A978-1-4842-0635-5_16_Chapter.html#Tab2).\
    \ Both database tables have just two columns.\n\nTable 16-1. Settings for the\
    \ `categories` table\n\n| Name | Type | Length/Values | Attributes | Null | Index\
    \ | A_I |\n| --- | --- | --- | --- | --- | --- | --- |\n| `cat_id` | `INT` |  \
    \ | `UNSIGNED` | Deselected | `PRIMARY` | Selected |\n| `category` | `VARCHAR`\
    \ | 20 |   | Deselected |   |   |\n\nTable 16-2. Settings for the `article2cat`\
    \ cross-reference table\n\n| Name | Type | Length/Values | Attributes | Null |\
    \ Index | A_I |\n| --- | --- | --- | --- | --- | --- | --- |\n| `article_id` |\
    \ `INT` |   | `UNSIGNED` | Deselected | `PRIMARY` |   |\n| `cat_id` | `INT` |\
    \   | `UNSIGNED` | Deselected | `PRIMARY` |   |\n\nThe important thing about the\
    \ definition for a cross-reference table is that both columns are set as primary\
    \ key, and that the `A_I` (`AUTO_INCREMENT`) check box is not selected for either\
    \ column.\n\n> **Caution**: To create a composite primary key, you must declare\
    \ both columns to be primary keys at the same time. If, by mistake, you declare\
    \ only one as the primary key, the database prevents you from adding the second\
    \ one later. You must delete the primary-key index from the single column and\
    \ then reapply it to both. It’s the combination of the two columns that is treated\
    \ as the primary key.\n\n### Getting the filename of an uploaded image\n\nThe\
    \ script makes use of the `Upload` class from [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html),\
    \ but the class needs slight tweaking because the filenames of uploaded files\
    \ are incorporated into the `$messages` property.\n\n#### PHP Solution 16-2: Improving\
    \ the Upload class\n\nThis PHP solution adapts the `Upload` class from [Chapter\
    \ 6](#A978-1-4842-0635-5_6_Chapter.html) by creating a new protected property\
    \ in which to store the names of successfully uploaded files, together with a\
    \ public method to retrieve the array of names.\n\n1. Open `Upload.php` in the\
    \ `PhpSolutions/File` folder. Alternatively, copy `Upload.php` from the `ch16/PhpSolutions/File`\
    \ folder and save it in `PhpSolutions/File` in the `phpsols` site root.\n2. Add\
    \ the following line to the list of properties at the top of the file:\n\n   `protected\
    \ $filenames = [];`\n\n   This initializes a protected property called `$filenames`\
    \ as an empty array.\n\n3. Amend the `moveFile()` method to add the amended filename\
    \ to the `$filenames` property if the file is successfully uploaded. The new code\
    \ is highlighted in bold.\n\n   ```\n   protected function moveFile($file) {\n\
    \       $filename = isset($this->newName) ? $this->newName : $file['name'];\n\
    \       $success = move_uploaded_file($file['tmp_name'], $this->destination .\
    \ $filename);\n       if ($success) {\n           // add the amended filename\
    \ to the array of uploaded files\n           $this->filenames[] = $filename;\n\
    \           $result = $file['name'] . ' was uploaded successfully';\n        \
    \   if (!is_null($this->newName)) {\n               $result .= ', and was renamed\
    \ ' . $this->newName;\n           }\n           $this->messages[] = $result;\n\
    \       } else {\n           $this->messages[] = 'Could not upload ' . $file['name'];\n\
    \       }\n   }\n   ```\n\n   The name is added to the `$filenames` array only\
    \ if the file is successfully moved to the destination folder.\n\n4. Add a public\
    \ method to return the values stored in the `$filenames` property. The code looks\
    \ like this:\n\n   ```\n   public function getFilenames() {\n       return $this->filenames;\n\
    \   }\n   ```\n\n   It doesn’t matter where you put this code in the class definition,\
    \ but it’s common practice to keep all public methods together.\n\n5. Save `Upload.php`.\
    \ If you need to check your code, compare it with `Upload_01.php` in the `ch16/PhpSolutions/File`\
    \ folder."
  raw: '### Inserting records into multiple tables


    An `INSERT` query can insert data into only one table. Consequently, when working
    with multiple tables, you need to plan your insert scripts carefully to ensure
    that all the information is stored and that the correct foreign-key relationships
    are established.


    PHP Solutions 15-2 (MySQLi) and 15-3 (PDO) in the previous chapter showed how
    to add the correct foreign key for an image that is already registered in the
    database. However, when inserting a new blog entry, you need to be able to select
    an existing image, upload a new image, or choose to have no image at all. This
    means that your processing script needs to check whether an image has been selected
    or uploaded and execute the relevant commands accordingly. In addition, tagging
    a blog entry with zero or more categories increases the number of decisions the
    script needs to make. Figure [16-6](#A978-1-4842-0635-5_16_Chapter.html#Fig6)
    shows the decision chain.


    ![A978-1-4842-0635-5_16_Fig6_HTML.jpg](A978-1-4842-0635-5_16_Fig6_HTML.jpg)


    Figure 16-6.


    The decision chain for inserting a new blog article with an image and categories


    When the page first loads, the form hasn’t been submitted, so the page simply
    displays the insert form. Both the existing images and categories are listed in
    the insert form by querying the database in the same way as was done for the images
    in the update form in PHP Solutions 15-2 and 15-3.


    After the form has been submitted, the processing script goes through the following
    steps:


    If an image has been uploaded, the upload is processed, the details of the image
    are stored in the `images` table, and the script gets the primary key of the new
    record.   If no image has been uploaded, but an existing image has been selected,
    the script gets its foreign key from the value submitted through the `$_POST`
    array.   In either case, the new blog article is inserted in the `blog` table
    along with the image’s primary key as a foreign key. However, if an image has
    neither been uploaded nor selected from the existing ones, the article is inserted
    in the `blog` table without a foreign key.   Finally, the script checks whether
    any categories have been selected. If they have, the script gets the new article’s
    primary key and combines it with the primary keys of the selected categories in
    the `article2cat` table.  


    If there’s a problem at any stage, the script needs to abandon the rest of the
    process and redisplay the user’s input. The script is quite long, so I’ll break
    it up into several sections. The first stage is to create the `article2cat` cross-reference
    table.


    ### Creating a cross-reference table


    When dealing with many-to-many relationships in a database, you need to build
    a cross-reference table like the one in Figure [16-1](#A978-1-4842-0635-5_16_Chapter.html#Fig1).
    A cross-reference table consists of just two columns, which are jointly declared
    as the table’s primary key (known as a composite primary key). If you look at
    Figure [16-7](#A978-1-4842-0635-5_16_Chapter.html#Fig7), you’ll see that the `article_id`
    and `cat_id` columns both contain the same number several times—something that’s
    unacceptable in a primary key, which must be unique. However, in a composite primary
    key, it’s the combination of both values that is unique. The first two combinations,
    `1,3` and `2,1`, are not repeated anywhere else in the table, nor are any of the
    others.


    ![A978-1-4842-0635-5_16_Fig7_HTML.jpg](A978-1-4842-0635-5_16_Fig7_HTML.jpg)


    Figure 16-7.


    In a cross-reference table, both columns together form a composite primary key


    #### Setting up the categories and cross-reference tables


    In the `ch16` folder, you’ll find `categories.sql`, which contains the SQL to
    create the `categories` table and the cross-reference table, `article2cat`, together
    with some sample data. The settings used to create the tables are listed in Tables
    [16-1](#A978-1-4842-0635-5_16_Chapter.html#Tab1) and [16-2](#A978-1-4842-0635-5_16_Chapter.html#Tab2).
    Both database tables have just two columns.


    Table 16-2.


    Settings for the `article2cat` cross-reference table


    | Name | Type | Length/Values | Attributes | Null | Index | A_I |

    | --- | --- | --- | --- | --- | --- | --- |

    | article_id | `INT` |   | `UNSIGNED` | Deselected | `PRIMARY` |   |

    | cat_id | `INT` |   | `UNSIGNED` | Deselected | `PRIMARY` |   |


    Table 16-1.


    Settings for the `categories` table


    | Name | Type | Length/Values | Attributes | Null | Index | A_I |

    | --- | --- | --- | --- | --- | --- | --- |

    | `cat_id` | `INT` |   | `UNSIGNED` | Deselected | `PRIMARY` | Selected |

    | `category` | `VARCHAR` | 20 |   | Deselected |   |   |


    The important thing about the definition for a cross-reference table is that both
    columns are set as primary key, and that the `A_I` (`AUTO_INCREMENT`) check box
    is not selected for either column.


    Caution


    To create a composite primary key, you must declare both columns to be primary
    keys at the same time. If, by mistake, you declare only one as the primary key,
    the database prevents you from adding the second one later. You must delete the
    primary-key index from the single column and then reapply it to both. It’s the
    combination of the two columns that is treated as the primary key.


    ### Getting the filename of an uploaded image


    The script makes use of the `Upload` class from [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html),
    but the class needs slight tweaking because the filenames of uploaded files are
    incorporated into the `$messages` property.


    #### PHP Solution 16-2: Improving the Upload class


    This PHP solution adapts the `Upload` class from [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html)
    by creating a new protected property in which to store the names of successfully
    uploaded files, together with a public method to retrieve the array of names.


    Open `Upload.php` in the `PhpSolutions/File` folder. Alternatively, copy `Upload.php`
    from the `ch16/PhpSolutions/File` folder and save it in `PhpSolutions/File` in
    the `phpsols` site root.   Add the following line to the list of properties at
    the top of the file:  


    `protected $filenames = [];`


    This initializes a protected property called `$filenames` as an empty array.


    Amend the `moveFile()` method to add the amended filename to the `$filenames`
    property if the file is successfully uploaded. The new code is highlighted in
    bold.  


    `protected function moveFile($file) {`


    `$filename = isset($this->newName) ? $this->newName : $file[''name''];`


    `$success = move_uploaded_file($file[''tmp_name''], $this->destination . $filename);`


    `if ($success) {`


    `// add the amended filename to the array of uploaded files`


    `$this->filenames[] = $filename;`


    `$result = $file[''name''] . '' was uploaded successfully'';`


    `if (!is_null($this->newName)) {`


    `$result .= '', and was renamed '' . $this->newName;`


    `}`


    `$this->messages[] = $result;`


    `} else {`


    `$this->messages[] = ''Could not upload '' . $file[''name''];`


    `}`


    `}`


    The name is added to the `$filenames` array only if the file is successfully moved
    to the destination folder.


    Add a public method to return the values stored in the `$filenames` property.
    The code looks like this:  


    `public function getFilenames() {`


    `return $this->filenames;`


    `}`


    It doesn’t matter where you put this code in the class definition, but it’s common
    practice to keep all public methods together.


    Save `Upload.php`. If you need to check your code, compare it with `Upload_01.php`
    in the `ch16/PhpSolutions/File` folder.'
  trans: "\n### 向多个表中插入记录\n\n一条 `INSERT` 查询只能向一个表中插入数据。因此，在处理多个表时，你需要仔细规划插入脚本，以确保所有信息都被存储，并且建立了正确的外键关系。\n\
    \n前一章中的 `PHP Solutions 15-2 (MySQLi)` 和 `15-3 (PDO)` 演示了如何为数据库中已注册的图像添加正确的外键。但是，在插入一条新的博客文章时，你需要能够选择一张现有图像、上传一张新图像，或者选择不带任何图像。这意味着你的处理脚本需要检查是否已选择或上传了图像，并相应地执行相关命令。此外，为零个或多个分类标记一篇博客文章，会增加脚本需要做出的决策数量。图\
    \ 16-6 展示了决策链。\n\n![A978-1-4842-0635-5_16_Fig6_HTML.jpg](img/A978-1-4842-0635-5_16_Fig6_HTML.jpg)\n\
    \n**图 16-6.** 插入一篇带有图像和分类的新博客文章的决策链\n\n当页面首次加载时，表单尚未提交，因此页面仅显示插入表单。现有的图像和分类都通过查询数据库列在插入表单中，其方式与\
    \ `PHP Solutions 15-2` 和 `15-3` 中的更新表单处理图像的方式相同。\n\n表单提交后，处理脚本会经历以下步骤：\n\n-  \
    \ 如果上传了图像，则处理上传，将图像的详细信息存储在 `images` 表中，然后脚本获取新记录的主键。\n-   如果没有上传图像，但选择了一张已有图像，脚本则通过\
    \ `$_POST` 数组提交的值获取其外键。\n-   无论哪种情况，新的博客文章都会被插入到 `blog` 表中，同时将图像的主键作为外键。但是，如果既未上传图像也未从现有图像中选择，则在插入文章到\
    \ `blog` 表时不带外键。\n-   最后，脚本检查是否选择了任何分类。如果选择了，脚本会获取新文章的主键，并将其与所选分类的主键组合，插入到 `article2cat`\
    \ 表中。\n\n如果在任何阶段出现问题，脚本都需要放弃其余流程并重新显示用户的输入。这个脚本相当长，因此我会将其分成几个部分。第一步是创建 `article2cat`\
    \ 交叉引用表。\n\n### 创建交叉引用表\n\n在处理数据库中的多对多关系时，你需要构建一个类似图 16-1 中所示的交叉引用表。交叉引用表仅由两列组成，这两列被共同声明为表的主键（称为复合主键）。如果你查看图\
    \ 16-7，会发现 `article_id` 和 `cat_id` 两列都多次出现相同的数字——这在主键中是不可接受的，主键必须是唯一的。然而，在复合主键中，是这两个值的组合保持唯一。前两个组合\
    \ `1,3` 和 `2,1` 在表中的其他任何地方都没有重复，其他组合也是如此。\n\n![A978-1-4842-0635-5_16_Fig7_HTML.jpg](img/A978-1-4842-0635-5_16_Fig7_HTML.jpg)\n\
    \n**图 16-7.** 在交叉引用表中，两列共同构成一个复合主键\n\n#### 设置分类表和交叉引用表\n\n在 `ch16` 文件夹中，你可以找到\
    \ `categories.sql`，其中包含了用于创建 `categories` 表和交叉引用表 `article2cat` 的 SQL 语句，以及一些示例数据。用于创建这些表的设置列在表\
    \ 16-1 和 16-2 中。两个数据库表都只有两列。\n\n**表 16-1.** `categories` 表的设置\n\n| 名称 | 类型 | 长度/值\
    \ | 属性 | 空值 | 索引 | A_I |\n| --- | --- | --- | --- | --- | --- | --- |\n| `cat_id`\
    \ | `INT` |  | `UNSIGNED` | 未选择 | `PRIMARY` | 已选择 |\n| `category` | `VARCHAR`\
    \ | 20 |  | 未选择 |  |  |\n\n**表 16-2.** `article2cat` 交叉引用表的设置\n\n| 名称 | 类型 | 长度/值\
    \ | 属性 | 空值 | 索引 | A_I |\n| --- | --- | --- | --- | --- | --- | --- |\n| `article_id`\
    \ | `INT` |  | `UNSIGNED` | 未选择 | `PRIMARY` |  |\n| `cat_id` | `INT` |  | `UNSIGNED`\
    \ | 未选择 | `PRIMARY` |  |\n\n关于交叉引用表定义的重要一点是，两列都被设为主键，并且两列的 `A_I`（`AUTO_INCREMENT`）复选框都未被选中。\n\
    \n> **注意**：要创建复合主键，必须同时将两列声明为主键。如果错误地只将其中一列声明为主键，数据库会阻止你稍后添加第二列。你必须先删除单列上的主键索引，然后将其重新应用于两列。是这两列的组合被视为一个主键。\n\
    \n### 获取上传图像的文件名\n\n该脚本使用了第 6 章中的 `Upload` 类，但需要对该类稍作调整，因为上传文件的文件名被合并到了 `$messages`\
    \ 属性中。\n\n#### PHP Solution 16-2: 改进 Upload 类\n\n这个 PHP 方案通过创建一个新的受保护属性来存储成功上传文件的名称，并提供一个公共方法来检索这个名称数组，从而改编了第\
    \ 6 章中的 `Upload` 类。\n\n1. 打开 `PhpSolutions/File` 文件夹中的 `Upload.php`。或者，从 `ch16/PhpSolutions/File`\
    \ 文件夹复制 `Upload.php`，并将其保存到 `phpsols` 站点根目录下的 `PhpSolutions/File` 文件夹中。\n2. 在文件顶部的属性列表中添加以下代码行：\n\
    \n   `protected $filenames = [];`\n\n   这将初始化一个名为 `$filenames` 的受保护属性，初始值为一个空数组。\n\
    \n3. 修改 `moveFile()` 方法，以便在文件成功上传时，将修改后的文件名添加到 `$filenames` 属性中。新代码以粗体高亮显示。\n\n\
    \   ```\n   protected function moveFile($file) {\n       $filename = isset($this->newName)\
    \ ? $this->newName : $file['name'];\n       $success = move_uploaded_file($file['tmp_name'],\
    \ $this->destination . $filename);\n       if ($success) {\n           // 将修改后的文件名添加到已上传文件数组中\n\
    \           $this->filenames[] = $filename;\n           $result = $file['name']\
    \ . ' was uploaded successfully';\n           if (!is_null($this->newName)) {\n\
    \               $result .= ', and was renamed ' . $this->newName;\n          \
    \ }\n           $this->messages[] = $result;\n       } else {\n           $this->messages[]\
    \ = 'Could not upload ' . $file['name'];\n       }\n   }\n   ```\n\n   只有在文件被成功移动到目标文件夹后，该名称才会被添加到\
    \ `$filenames` 数组中。\n\n4. 添加一个公共方法来返回存储在 `$filenames` 属性中的值。代码如下所示：\n\n   ```\n\
    \   public function getFilenames() {\n       return $this->filenames;\n   }\n\
    \   ```\n\n   将此代码放在类定义中的任何位置都可以，但通常的做法是将所有公共方法放在一起。\n\n5. 保存 `Upload.php`。如果需要检查你的代码，请将其与\
    \ `ch16/PhpSolutions/File` 文件夹中的 `Upload_01.php` 进行对比。\n"
- fmt: '### Adapting the Insert Form to Deal with Multiple Tables


    The insert form for blog articles that you created in [Chapter 13](#A978-1-4842-0635-5_13_Chapter.html)
    already contains the code needed to insert most of the details in the `blog` table.
    Rather than start again from scratch, it makes sense to adapt the existing page.
    As it stands, the page contains only a text input field for the title and a text
    area for the article.


    You need to add a multiple-choice `<select>` list for categories and a drop-down
    `<select>` menu for existing images.


    To prevent a user from selecting an existing image at the same time as uploading
    a new one, a check box and JavaScript control the display of the relevant input
    fields. Selecting the check box disables the drop-down menu for existing images
    and displays the input fields for a new image and caption. Deselecting the check
    box hides and disables the file and caption fields and re-enables the drop-down
    menu. If JavaScript is disabled, the options for uploading a new image and captions
    are hidden.


    **Note:** To save space, the remaining PHP solutions in this chapter give detailed
    instructions only for MySQLi. The structure and PHP logic for the PDO version
    are the same. The only differences lie in the commands used to submit the SQL
    queries to the database and to display the results. Fully commented PDO files
    are in the `ch16` folder.


    #### PHP Solution 16-3: Adding the Category and Image Input Fields


    This PHP solution begins the process of adapting the blog entry insert form from
    [Chapter 13](#A978-1-4842-0635-5_13_Chapter.html) by adding the input fields for
    categories and images.


    In the `admin` folder, find and open the version of `blog_insert_mysqli.php` that
    you created in [Chapter 13](#A978-1-4842-0635-5_13_Chapter.html). Alternatively,
    copy `blog_insert_mysqli_01.php` from the `ch16` folder to the `admin` folder
    and remove `_01` from the filename.


    The `<select>` elements for the categories and existing images need to query the
    database when the page first loads, so you need to move the connection script
    and database connection outside the conditional statement that checks if the form
    has been submitted. Locate the lines highlighted in bold:


    ```

    if (isset($_POST[''insert''])) {

    require_once ''../includes/connection.php'';

    // initialize flag

    $OK = false;

    // create database connection

    $conn = dbConnect(''write'');

    ```


    Move them outside the conditional statement, like this:


    ```

    require_once ''../includes/connection.php'';

    // create database connection

    $conn = dbConnect(''write'');

    if (isset($_POST[''insert''])) {

    // initialize flag

    $OK = false;

    ```


    The form in the body of the page needs to be capable of uploading a file, so you
    need to add the `enctype` attribute to the opening `<form>` tag, like this:


    ```

    <form method="post" action="" enctype="multipart/form-data">

    ```


    If an error occurs when trying to upload a file—for example, if it’s too big or
    is not an image file—the insert operation will be halted. Amend the existing text
    input field and text area to redisplay the values, using the same technique as
    shown in [Chapter 5](#A978-1-4842-0635-5_5_Chapter.html). The text input field
    looks like this:


    ```

    <input name="title" type="text" id="title" value="<?php if (isset($error)) {

    echo htmlentities($_POST[''title'']);

    } ?>">

    ```


    The text area looks like this:


    ```

    <textarea name="article" id="article"><?php if (isset($error)) {

    echo htmlentities($_POST[''article'']);

    } ?></textarea>

    ```


    Make sure there’s no gap between the opening and closing PHP tags and the HTML.
    Otherwise, you’ll add unwanted whitespace inside the text input field and text
    area.


    The new form elements go between the text area and the Submit button. First, add
    the code for the multiple-choice `<select>` list for categories. The code looks
    like this:


    ```

    <p>

