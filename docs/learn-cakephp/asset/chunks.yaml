    42              ''default'' => null, ''comment'' => '''', ''precision'' => null

    43              ],

    44          ''modified'' => [

    45              ''type'' => ''datetime'', ''length'' => null, ''null'' => true,

    46              ''default'' => null, ''comment'' => '''', ''precision'' => null

    47              ],

    48          ''_constraints'' => [

    49              ''primary'' => [

    50                ''type'' => ''primary'', ''columns'' => [''id''], ''length''
    => []

    51                  ],

    52          ],

    53          ''_options'' => [

    54              ''engine'' => ''InnoDB'',

    55              ''collation'' => ''latin1_swedish_ci''

    56          ],

    57      ];

    58      // @codingStandardsIgnoreEnd


    60      /**

    61       * Records

    62       *

    63       * @var array

    64       */

    65      public $records = [

    66          [

    67              ''id'' => 1,

    68              ''username'' => ''Lorem ipsum dolor sit amet'',

    69              ''password'' => ''Lorem ipsum dolor sit amet'',

    70              ''role'' => ''Lorem ipsum dolor '',

    71              ''created'' => ''2016-04-24 18:39:32'',

    72              ''modified'' => ''2016-04-24 18:39:32''

    73          ],

    74      ];

    75  }

    ```


    The `$fields` array describes the table schema for the model `Users`. It describes
    all the fields, their data types and length, default value, and some other values.
    It also adds used indexes.


    The `$records` array contains one sample record, but you can add as many as you
    want. Using this approach, you can start writing unit tests before you have anything
    in your application’s database—even before you have a database at all. It’s really
    useful in the early stages of development to test database structure changes.


    At later development phases, when the database structure is finalized, it is also
    essential for testing to have records that will not change.


    When you run a test in which this fixture is imported, Cake will create a `Users`
    table in the test database, with the fields described here, and insert records
    from the `$records` array. The model tests will use this data during testing.


    You can also use dynamic data in your fixtures. For this, just use the `init()`
    function.


    ```

