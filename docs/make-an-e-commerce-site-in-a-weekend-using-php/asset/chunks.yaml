- fmt: "# Writing Your First PHP Script\n\nA PHP file normally contains HTML tags\
    \ and some PHP scripting code embedded in it. The simplest PHP script that displays\
    \ PHP’s configuration is shown in Listing [2-1](#A978-1-4842-1672-9_2_Chapter.html#FPar1).\
    \ Before you learn the procedure to run this script, you should have a quick idea\
    \ about the `phpinfo()` function that is used in this script.\n\nThe `phpinfo()`\
    \ function displays information about PHP’s configuration. It displays information\
    \ that includes the following:\n\n* PHP compilation options\n* PHP version\n*\
    \ Server information and environment\n* PHP environment\n* Different values of\
    \ configuration options\n* PHP license\n\nListing 2-1. PHP Script (phpdetails.php)\
    \ to Display the PHP Configuration Information\n\n```\n<?php\n        phpinfo();\n\
    ?>\n```\n\nTo run this PHP script, follow these steps:\n\nType this script using\
    \ any editor and save it using the `phpdetails.php` name in the `www` subfolder\
    \ of the `wamp` directory. For example, if WampServer is installed on the `C:`\
    \ drive, save this script in the `C:\\wamp\\www` folder. Make sure that WampServer\
    \ is running, i.e., its icon in the task bar is green. If it’s not, click on its\
    \ icon and select Start All Services from the menu that pops up.\n\nOnce WampServer\
    \ starts running, open the browser and point at the following address: `http://localhost/phpdetails.php`.\
    \ You will get the output as shown in Figure [2-1](#A978-1-4842-1672-9_2_Chapter.html#Fig1).\n\
    \n![A978-1-4842-1672-9_2_Fig1_HTML.jpg](A978-1-4842-1672-9_2_Fig1_HTML.jpg)\n\n\
    Figure 2-1. PHP script displaying PHP configuration information\n\nNext, a very\
    \ basic example that displays two lines of text in the output is shown in Listing\
    \ [2-2](#A978-1-4842-1672-9_2_Chapter.html#FPar2).\n\nListing 2-2. Simple PHP\
    \ Script (phpscript1.php)\n\n```\n<html>\n    <head>\n    </head>\n    <body>\n\
    \        <h1>Bintu Online Bazar</h1>\n        <?php\n            echo '<b>Welcome\
    \ to our store</b>';\n        ?>\n    </body>\n</html>\n```\n\nAgain, save this\
    \ script as `phpscript1.php` in the `www` subfolder of the `wamp` directory. Make\
    \ sure that WampServer is running, and then open the browser and point at the\
    \ following address: `http://localhost/phpscript1.php`. You will get the output\
    \ shown in Figure [2-2](#A978-1-4842-1672-9_2_Chapter.html#Fig2).\n\n![A978-1-4842-1672-9_2_Fig2_HTML.jpg](A978-1-4842-1672-9_2_Fig2_HTML.jpg)\n\
    \nFigure 2-2. PHP script displaying the welcome message\n\nIn the code shown in\
    \ Listing [2-1](#A978-1-4842-1672-9_2_Chapter.html#FPar1), you can see that a\
    \ PHP script can be easily embedded with HTML using the opening PHP tag, `<?php`\
    \ and the closing PHP tag, `?>`.\n\nOn finding a PHP script, the web server invokes\
    \ the PHP engine and passes the script to it. The PHP engine interprets the statements\
    \ enclosed between the `<?php` and `?>` tags, generates the corresponding HTML\
    \ code, and passes it back to the web server. The web server sends the HTML document\
    \ to the client’s browser for display.\n\nA PHP scripting block can be placed\
    \ anywhere in the document and each statement must end with a semicolon. The semicolon\
    \ is a separator and is used to distinguish one statement from another.\n\nFor\
    \ storing values and text, you need variables. So, next we’ll discuss variables.\n\
    \n## Using Variables in PHP\n\nVariables may be used to store the data entered\
    \ by the user or to store constant numerical values or text. The variable’s value\
    \ is assigned with the help of the assignment operator (`=`). All variables in\
    \ PHP start with a dollar (`$`) sign symbol. The script shown in Listing [2-3](#A978-1-4842-1672-9_2_Chapter.html#FPar3),\
    \ `phpscript2.php`, demonstrates how variables are defined and used in PHP.\n\n\
    Listing 2-3. PHP Script Demonstrating Using Variables (phpscript2.php)\n\n```\n\
    <html>\n    <body>\n        <?php\n            $name=\"John\";\n            echo\
    \ \"Welcome $name <br/>\";\n            $a=10;\n            $b=20;\n         \
    \   echo \"Sum of $a and $b is \";\n            echo $a+$b;\n        ?>\n    </body>\n\
    </html>\n```\n\nOutput\n\n```\nWelcome John\nSum of 10 and 20 is 30\n```\n\nThe\
    \ most commonly used statement in PHP scripts is `echo`. It’s covered next.\n\n\
    ## The echo Statement\n\nThe `echo` statement is used for displaying the output\
    \ on the client’s browser at the current location in the HTML code. The output\
    \ can be displayed with single quotes, double quotes, or no quotes:\n\n* Single\
    \ quotes—To display message without any variable or arrays. Example: `echo 'Welcome\
    \ to our store';`\n* No quotes—To display value/text assigned to a variable, you\
    \ don’t need to use quotes. For example, the following lines display text assigned\
    \ to the variable `msg`:\n  ```\n  $msg = 'Welcome to our store';\n  echo $msg;\n\
    \  ```\n* Double quotes—To display value/text assigned to a variable within a\
    \ string. Example: `$msg = 'Welcome to our store';` `echo \"Hello! $msg\";`\n\n\
    ## Concatenating Strings\n\nTo concatenate two or more string variables together,\
    \ use the dot (`.`) operator. The script in Listing [2-4](#A978-1-4842-1672-9_2_Chapter.html#FPar4),\
    \ `phpscript3.php`, shows how two strings are concatenated.\n\nListing 2-4. PHP\
    \ Script Demonstrating String Concatenation (phpscript3.php)\n\n```\n<html>\n\
    \    <body>\n        <?php\n            $a=\"John\";\n            echo \"Hello\
    \ $a!\" . \" Welcome to our store\";\n        ?>\n    </body>\n</html>\n```\n\n\
    Output:\n\n```\nHello John! Welcome to our store\n```\n\nIn this script, you can\
    \ see that the first string, `\"Hello John!\"`, is concatenated to another string,\
    \ `\"Welcome to our store\"` by making use of the dot operator (`.`) in between.\n\
    \n> **Note**: In PHP, you use `//` to make a single-line comment. For comments\
    \ extending more than a line, enclose them between a pair of `/*` and `*/` symbols.\n\
    \n# HTTP Methods for Transferring Data\n\nWhile developing applications, you might\
    \ come across a situation where you want the data entered by the users on one\
    \ web form to be supplied to another for further processing or action. The information\
    \ from one web form to another is usually passed by two HTTP request methods called\
    \ GET and POST.\n\n## The GET Method\n\nThis is the default method of passing\
    \ data and is considered to be less secure, as it is displayed in the browser’s\
    \ address bar. When you see something like this in the browser’s address bar:\n\
    \n`display.php?name=john&email_add=john@yahoo.com`\n\nIt means the data is being\
    \ passed using the GET method to the `display.php` script. The data that is being\
    \ passed has two variables—`name` and `email_add`. Data passed through the GET\
    \ method is visible to everyone and is also stored in the browser’s history/logs,\
    \ making it less secure. So, the GET method is typically used to pass unimportant\
    \ data.\n\nThe GET method supports only ASCII characters, hence you cannot pass\
    \ binary information using this method. Moreover, there is a limit on the amount\
    \ of information passed through this method. It can be a maximum of 2KB. Some\
    \ servers handle up to 64KB.\n\nWhen the HTTP GET method is used, data of the\
    \ previous form is stored in an array called `$_GET` array. The data is passed\
    \ in the form of pairs, variable name(s), and values.\n\n## The POST Method\n\n\
    In this method, the information passed is more secure as it is not displayed in\
    \ the browser’s address bar. Here are a few of the POST method’s features:\n\n\
    * Data is passed directly over the socket connection using secure HTTP protocol,\
    \ hence data is secure.\n* POST method variables are not displayed in the URL.\
    \ Also, the POST requests do not remain in the browser history.\n* No restriction\
    \ on sending data size.\n* Even binary data or ASCII information can be sent.\n\
    * When the POST method is used, the data of the current form is collected in the\
    \ `$_POST` array."
  raw: '## Writing Your First PHP Script


    A PHP file normally contains HTML tags and some PHP scripting code embedded in
    it. The simplest PHP script that displays PHP’s configuration is shown in Listing
    [2-1](#A978-1-4842-1672-9_2_Chapter.html#FPar1). Before you learn the procedure
    to run this script, you should have a quick idea about the `phpinfo()` function
    that is used in this script.


    The `phpinfo()` function displays information about PHP’s configuration. It displays
    information that includes the following:


    *   PHP compilation options

    *   PHP version

    *   Server information and environment

    *   PHP environment

    *   Different values of configuration options

    *   PHP license


    Listing 2-1\. PHP Script (phpdetails.php) to Display the PHP Configuration Information


    `<?php`


            `phpinfo();`


    `?>`


    To run this PHP script, follow these steps:


    Type this script using any editor and save it using the `phpdetails.php name`
    in the `www` subfolder of the `wamp` directory. For example, if WampServer is
    installed on the `C:` drive, save this script in the `C:\wamp\www` folder.   Make
    sure that WampServer is running, i.e., its icon in the task bar is green. If it’s
    not, click on its icon and select Start All Services from the menu that pops up.
     


    Once WampServer starts running, open the browser and point at the following address:
    `http://localhost/phpdetails.php`. You will get the output as shown in Figure
    [2-1](#A978-1-4842-1672-9_2_Chapter.html#Fig1).


    ![A978-1-4842-1672-9_2_Fig1_HTML.jpg](A978-1-4842-1672-9_2_Fig1_HTML.jpg)


    Figure 2-1.


    PHP script displaying PHP configuration information


    Next, a very basic example that displays two lines of text in the output is shown
    in Listing [2-2](#A978-1-4842-1672-9_2_Chapter.html#FPar2).


    Listing 2-2\. Simple PHP Script (phpscript1.php)


    `<html>`


        `<head>`


        `</head>`


        `<body>`


            `<h1>Bintu Online Bazar</h1>`


            `<?php`


                `echo ''<b>Welcome to our store</b>'';`


            `?>`


        `</body>`


    `</html>`


    Again, save this script as `phpscript1.php` in the `www` subfolder of the `wamp`
    directory. Make sure that WampServer is running, and then open the browser and
    point at the following address: `http://localhost/phpscript1.php`. You will get
    the output shown in Figure [2-2](#A978-1-4842-1672-9_2_Chapter.html#Fig2).


    ![A978-1-4842-1672-9_2_Fig2_HTML.jpg](A978-1-4842-1672-9_2_Fig2_HTML.jpg)


    Figure 2-2.


    PHP script displaying the welcome message


    In the code shown in Listing [2-1](#A978-1-4842-1672-9_2_Chapter.html#FPar1),
    you can see that a PHP script can be easily embedded with HTML using the opening
    PHP tag, `<?php` and the closing PHP tag, `?>`.


    On finding a PHP script, the web server invokes the PHP engine and passes the
    script to it. The PHP engine interprets the statements enclosed between the `<?php`
    and `?>` tags, generates the corresponding HTML code, and passes it back to the
    web server. The web server sends the HTML document to the client’s browser for
    display.


    A PHP scripting block can be placed anywhere in the document and each statement
    must end with a semicolon. The semicolon is a separator and is used to distinguish
    one statement from another.


    For storing values and text, you need variables. So, next we’ll discuss variables.


    ### Using Variables in PHP


    Variables may be used to store the data entered by the user or to store constant
    numerical values or text. The variable’s value is assigned with the help of the
    assignment operator (`=`). All variables in PHP start with a dollar (`$)` sign
    symbol. The script shown in Listing [2-3](#A978-1-4842-1672-9_2_Chapter.html#FPar3),
    `phpscript2.php,` demonstrates how variables are defined and used in PHP.


    Listing 2-3\. PHP Script Demonstrating Using Variables (phpscript2.php)


    `<html>`


        `<body>`


            `<?php`


                `$name="John";`


                `echo "Welcome $name <br/>";`


                `$a=10;`


                `$b=20;`


                `echo "Sum of $a and $b is ";`


                `echo $a+$b;`


            `?>`


        `</body>`


    `</html>`


    Output


    `Welcome John`


    `Sum of 10 and 20 is 30`


    The most commonly used statement in PHP scripts is `echo`. It’s covered next.


    ### The echo Statement


    The `echo` statement is used for displaying the output on the client’s browser
    at the current location in the HTML code. The output can be displayed with single
    quotes, double quotes, or no quotes:


    *   Single quotes—To display message without any variable or arrays. Example:
    `echo ''Welcome to our store'';`

    *   No quotes—To display value/text assigned to a variable, you don’t need to
    use quotes. For example, the following lines display text assigned to the variable
    `msg`. `$msg = ''Welcome to our store'';` `echo $msg;`

    *   Double quotes—To display value/text assigned to a variable within a string.
    Example: `$msg = ''Welcome to our store'';` `echo "Hello!  $msg";`


    ### Concatenating Strings


    To concatenate two or more string variables together, use the dot (`.`) operator.
    The script in Listing [2-4](#A978-1-4842-1672-9_2_Chapter.html#FPar4), `phpscript3.php`,
    shows how two strings are concatenated.


    Listing 2-4\. PHP Script Demonstrating String Concatenation (phpscript3.php)


    `<html>`


        `<body>`


            `<?php`


                `$a="John";`


                `echo "Hello $a!" . " Welcome to our store";`


            `?>`


        `</body>`


    `</html>`


    Output:


    `Hello John! Welcome to our store`


    In this script, you can see that the first string, `"Hello John!"`, is concatenated
    to another string, `"Welcome to our store"` by making use of the dot operator
    (`.`) in between.


    Note


    In PHP, you use `//` to make a single-line comment. For comments extending more
    than a line, enclose them between a pair of `/*` and `*/` symbols.


    ## HTTP Methods for Transferring Data


    While developing applications, you might come across a situation where you want
    the data entered by the users on one web form to be supplied to another for further
    processing or action. The information from one web form to another is usually
    passed by two HTTP request methods called GET and POST.


    ### The GET Method


    This is the default method of passing data and is considered to be less secure,
    as it is displayed in the browser’s address bar. When you see something like this
    in the browser’s address bar:


    `display.php?name=john&email_add=john@yahoo.com`


    It means the data is being passed using the GET method to the `display.php` script.
    The data that is being passed has two variables—`name` and `email_add`. Data passed
    through the GET method is visible to everyone and is also stored in the browser’s
    history/logs, making it less secure. So, the GET method is typically used to pass
    unimportant data.


    The GET method supports only ASCII characters, hence you cannot pass binary information
    using this method. Moreover, there is a limit on the amount of information passed
    through this method. It can be a maximum of 2KB. Some servers handle up to 64KB.


    When the HTTP GET method is used, data of the previous form is stored in an array
    called `$_GET` array. The data is passed in the form of pairs, variable name(s),
    and values.


    ### The POST Method


    In this method, the information passed is more secure as it is not displayed in
    the browser’s address bar. Here are a few of the POST method’s features:


    *   Data is passed directly over the socket connection using secure HTTP protocol,
    hence data is secure.

    *   POST method variables are not displayed in the URL. Also, the POST requests
    do not remain in the browser history.

    *   No restriction on sending data size.

    *   Even binary data or ASCII information can be sent.

    *   When the POST method is used, the data of the current form is collected in
    the `$_POST` array.'
  trans: "\n# 编写你的第一个 PHP 脚本\n\n一个 PHP 文件通常包含 HTML 标签以及内嵌其中的一些 PHP 脚本代码。清单 2-1 展示了一个显示\
    \ PHP 配置信息的最简 PHP 脚本。在学习如何运行此脚本之前，你应当先快速了解该脚本中使用的 `phpinfo()` 函数。\n\n`phpinfo()`\
    \ 函数用于显示 PHP 的配置信息，其显示的信息包括以下几个方面：\n\n* PHP 编译选项\n* PHP 版本\n* 服务器信息和环境\n* PHP\
    \ 环境\n* 不同配置选项的值\n* PHP 许可证\n\n**清单 2-1. 用于显示 PHP 配置信息的 PHP 脚本 (phpdetails.php)**\n\
    \n```\n<?php\n        phpinfo();\n?>\n```\n\n要运行此 PHP 脚本，请按以下步骤操作：\n\n使用任意编辑器输入此脚本，并将其以\
    \ `phpdetails.php` 为文件名，保存在 `wamp` 目录下的 `www` 子文件夹中。例如，如果 WampServer 安装在 `C:`\
    \ 盘，则将此脚本保存在 `C:\\wamp\\www` 文件夹中。请确保 WampServer 正在运行，即其任务栏图标为绿色。如果没有运行，请单击其图标，并从弹出的菜单中选择“**启动所有服务**”。\n\
    \nWampServer 启动后，打开浏览器并访问以下地址：`http://localhost/phpdetails.php`。你将看到如图 2-1 所示的输出。\n\
    \n![A978-1-4842-1672-9_2_Fig1_HTML.jpg](img/A978-1-4842-1672-9_2_Fig1_HTML.jpg)\n\
    \n**图 2-1. 显示 PHP 配置信息的 PHP 脚本**\n\n接下来，清单 2-2 展示了一个在输出中显示两行文本的非常基础的示例。\n\n**清单\
    \ 2-2. 简单的 PHP 脚本 (phpscript1.php)**\n\n```\n<html>\n    <head>\n    </head>\n\
    \    <body>\n        <h1>宾图在线集市</h1>\n        <?php\n            echo '<b>欢迎光临我们的商店</b>';\n\
    \        ?>\n    </body>\n</html>\n```\n\n同样，将此脚本以 `phpscript1.php` 为文件名，保存在 `wamp`\
    \ 目录下的 `www` 子文件夹中。确保 WampServer 正在运行，然后打开浏览器并访问以下地址：`http://localhost/phpscript1.php`。你将得到如图\
    \ 2-2 所示的输出。\n\n![A978-1-4842-1672-9_2_Fig2_HTML.jpg](img/A978-1-4842-1672-9_2_Fig2_HTML.jpg)\n\
    \n**图 2-2. 显示欢迎信息的 PHP 脚本**\n\n在清单 2-1 所示的代码中，你可以看到 PHP 脚本可以简单地通过起始 PHP 标签 `<?php`\
    \ 和结束 PHP 标签 `?>` 嵌入到 HTML 中。\n\n当 Web 服务器发现 PHP 脚本时，它会调用 PHP 引擎并将脚本传递给它。PHP 引擎会解释\
    \ `<?php` 和 `?>` 标签之间的语句，生成相应的 HTML 代码，并将其传递回 Web 服务器。然后，Web 服务器将 HTML 文档发送到客户端浏览器进行显示。\n\
    \nPHP 脚本块可以放置在文档中的任意位置，并且每条语句都必须以分号结束。分号作为分隔符，用于区分不同的语句。\n\n为了存储值和文本，你需要使用变量。因此，接下来我们将讨论变量。\n\
    \n## 在 PHP 中使用变量\n\n变量可用于存储用户输入的数据，或存储常量数值或文本。变量的值通过赋值操作符 (`=`) 进行赋值。PHP 中的所有变量都以美元符号\
    \ (`$`) 开头。清单 2-3 中的脚本 `phpscript2.php` 演示了如何在 PHP 中定义和使用变量。\n\n**清单 2-3. 演示变量使用的\
    \ PHP 脚本 (phpscript2.php)**\n\n```\n<html>\n    <body>\n        <?php\n      \
    \      $name=\"John\";\n            echo \"欢迎 $name <br/>\";\n            $a=10;\n\
    \            $b=20;\n            echo \"$a 加上 $b 的和为 \";\n            echo $a+$b;\n\
    \        ?>\n    </body>\n</html>\n```\n\n**输出**\n\n```\n欢迎 John\n10 加上 20 的和为\
    \ 30\n```\n\nPHP 脚本中最常用的语句是 `echo`。接下来将介绍它。\n\n## echo 语句\n\n`echo` 语句用于在 HTML\
    \ 代码中的当前位置，将输出显示在客户端的浏览器上。输出可以使用单引号、双引号或不加引号来显示：\n\n* **单引号**——用于显示不包含任何变量或数组的消息。示例：`echo\
    \ '欢迎光临我们的商店';`\n* **不加引号**——要显示分配给变量的值/文本，无需使用引号。例如，以下代码行显示分配给变量 `msg` 的文本：\n\
    \  ```\n  $msg = '欢迎光临我们的商店';\n  echo $msg;\n  ```\n* **双引号**——用于在字符串内显示分配给变量的值/文本。示例：`$msg\
    \ = '欢迎光临我们的商店';` `echo \"您好！$msg\";`\n\n## 字符串拼接\n\n要拼接两个或多个字符串变量，请使用点 (`.`)\
    \ 操作符。清单 2-4 中的脚本 `phpscript3.php` 展示了如何拼接两个字符串。\n\n**清单 2-4. 演示字符串拼接的 PHP 脚本\
    \ (phpscript3.php)**\n\n```\n<html>\n    <body>\n        <?php\n            $a=\"\
    John\";\n            echo \"您好 $a!\" . \" 欢迎光临我们的商店\";\n        ?>\n    </body>\n\
    </html>\n```\n\n**输出：**\n\n```\n您好 John! 欢迎光临我们的商店\n```\n\n在此脚本中，你可以看到第一个字符串 `\"\
    您好 John!\"` 通过在其间使用点操作符 (`.`)，与另一个字符串 `\"欢迎光临我们的商店\"` 拼接在一起。\n\n> **注意**：在 PHP\
    \ 中，使用 `//` 进行单行注释。对于跨越多行的注释，请将其包含在一对 `/*` 和 `*/` 符号之间。\n\n# 用于数据传输的 HTTP 方法\n\
    \n在开发应用程序时，你可能会遇到这样的情况：希望用户在一个 Web 表单中输入的数据被提交到另一个表单以进行进一步处理或操作。从一个 Web 表单传递到另一个表单的信息通常通过两种\
    \ HTTP 请求方法进行，即 GET 和 POST。\n\n## GET 方法\n\n这是传递数据的默认方法，被认为安全性较低，因为它会显示在浏览器的地址栏中。当你在浏览器的地址栏中看到类似这样的内容：\n\
    \n`display.php?name=john&email_add=john@yahoo.com`\n\n意味着数据正在使用 GET 方法传递给 `display.php`\
    \ 脚本。所传递的数据包含两个变量——`name` 和 `email_add`。通过 GET 方法传递的数据对所有人可见，并且会存储在浏览器的历史记录/日志中，因此安全性较低。所以，GET\
    \ 方法通常用于传递非重要的数据。\n\nGET 方法仅支持 ASCII 字符，因此你无法使用此方法传递二进制信息。此外，通过此方法传递的信息量有限，最大为\
    \ 2KB。某些服务器能处理高达 64KB。\n\n当使用 HTTP GET 方法时，前一个表单的数据被存储在一个名为 `$_GET` 的数组中。数据以键值对（变量名和值）的形式传递。\n\
    \n## POST 方法\n\n在这种方法中，传递的信息更为安全，因为它不会显示在浏览器的地址栏中。以下是 POST 方法的一些特点：\n\n* 数据通过安全的\
    \ HTTP 协议直接在套接字连接上传递，因此数据是安全的。\n* POST 方法变量不会显示在 URL 中。同时，POST 请求不会保留在浏览器历史记录中。\n\
    * 对发送数据的大小没有限制。\n* 可以发送二进制数据或 ASCII 信息。\n* 当使用 POST 方法时，当前表单的数据被收集在 `$_POST` 数组中。\n"
- fmt: "# Passing Information from One Script to Another\n\nTo understand the concept\
    \ of passing of data through the GET and POST methods, you’ll make a form that\
    \ asks the user to enter their name and e-mail address, as shown in Figure [2-3](#A978-1-4842-1672-9_2_Chapter.html#Fig3).\n\
    \n![A978-1-4842-1672-9_2_Fig3_HTML.jpg](A978-1-4842-1672-9_2_Fig3_HTML.jpg)\n\n\
    Figure 2-3. Form prompting for name and e-mail address\n\nTo create such a form,\
    \ create a PHP script called `userinfo.php` with the code shown in Listing [2-5](#A978-1-4842-1672-9_2_Chapter.html#FPar6).\n\
    \nListing 2-5. Form for Entering the Name and E-Mail Address (`userinfo.php`)\n\
    \n```\n<html>\n    <head>\n    </head>\n    <body>\n        <form action=\"display.php\"\
    \ method=\"Get\">\n            Name: <input type=\"text\" name=\"name\" /><br/><br/>\n\
    \            Email address: <input type=\"text\" name=\"email_add\" /><br/><br/>\n\
    \            <input type=\"submit\" value=\"Submit\" />\n        </form>\n   \
    \ </body>\n</html>\n```\n\nThis form has two input boxes named `name` and `email_add`.\
    \ The form `action` points to a PHP file, `display.php`. The HTTP method used\
    \ for passing data (`name` and `email_add`) is GET.\n\nTo pass information between\
    \ the scripts, three arrays that act as a carrier of data are `$_GET`, `$_POST`,\
    \ and `$_REQUEST`. You’ll learn how these arrays are used to transmit data one\
    \ by one.\n\n## Using `$_GET` Array\n\nThe `$_GET` array is where data from the\
    \ previous form sent using the HTTP GET method is stored. The data from the previous\
    \ form is sent in the form of pairs: variable name(s) and value(s).\n\nRefer to\
    \ the form shown in Listing [2-2](#A978-1-4842-1672-9_2_Chapter.html#FPar2). When\
    \ the user clicks the Submit button in it, the URL in the browser’s address bar\
    \ will appear as shown:\n\n`http://localhost/display.php?name=john&email_add=john@yahoo.com`\n\
    \nYou can see that the URL displays all the information that is being passed.\
    \ The destination PHP script, `display.php`, can now extract the data from the\
    \ `$_GET` array through the code, as shown in Listing [2-6](#A978-1-4842-1672-9_2_Chapter.html#FPar7).\n\
    \nListing 2-6. Form for Accessing Information from the `$_GET` Array (`display.php`)\n\
    \n```\n<html>\n    <head>\n    </head>\n    <body>\n        Welcome <?php echo\
    \ $_GET[\"name\"]; ?>.<br>\n        Your email address is <?php echo $_GET[\"\
    email_add\"]; ?>\n    </body>\n</html>\n```\n\nThis code accesses the name and\
    \ e-mail address passed by `userinfo.php` through the `$_GET` array and displays\
    \ them on the screen, as shown in Figure [2-4](#A978-1-4842-1672-9_2_Chapter.html#Fig4).\n\
    \n![A978-1-4842-1672-9_2_Fig4_HTML.jpg](A978-1-4842-1672-9_2_Fig4_HTML.jpg)\n\n\
    Figure 2-4. Name and e-mail address of the user displayed on another form\n\n\
    ## Using `$_POST` Array\n\nThe `$_POST` array collects the values sent from a\
    \ form using the HTTP POST method. To pass data using the POST method, you only\
    \ need to replace GET in the form’s method attribute with POST in the `userinfo.php`\
    \ script shown in Listing [2-2](#A978-1-4842-1672-9_2_Chapter.html#FPar2).\n\n\
    As discussed, in the POST method, the `$_POST` array collects the values from\
    \ the form. It also means that when the users click the Submit button, the `$_POST[\"\
    name\"]` and `$_POST[\"email_add\"]` variables will be automatically filled with\
    \ the data they entered in the two boxes.\n\nTo display the name and e-mail address\
    \ in the destination PHP script, `display.php`, you need to replace the `$_GET`\
    \ array with the `$_POST` array, as shown in Listing [2-7](#A978-1-4842-1672-9_2_Chapter.html#FPar8).\n\
    \nListing 2-7. Form for Accessing Information from the `$_POST` Array (`display.php`)\n\
    \n```\n<html>\n    <head>\n    </head>\n    <body>\n        Welcome <?php echo\
    \ $_POST[\"name\"]; ?>.<br>\n        Your email address is <?php echo $_POST[\"\
    email_add\"]; ?>\n    </body>\n</html>\n```\n\nBesides `$_GET` and `$_POST`, there\
    \ is one more array that is used for storing information about the current form;\
    \ it’s called `$_REQUEST`.\n\n## Using the `$_REQUEST` Array\n\nThe `$_REQUEST`\
    \ array contains the content of `$_GET` and `$_POST`. That is, it is used to collect\
    \ the information from a form that’s sending data by the GET or POST method.\n\
    \nSo, in case you don’t know which HTTP method was used by the source PHP script,\
    \ it is wise to access the information using the `$_REQUEST` array. To display\
    \ the name and e-mail address via the `$_REQUEST` array in the `display.php` script,\
    \ you replace `$_POST` (in Listing [2-7](#A978-1-4842-1672-9_2_Chapter.html#FPar8))\
    \ with `$_REQUEST`, as shown in Listing [2-8](#A978-1-4842-1672-9_2_Chapter.html#FPar9).\n\
    \nListing 2-8. Form for Accessing Information from the `$_REQUEST` Array (`display.php`)\n\
    \n```\n<html>\n    <head>\n    </head>\n    <body>\n        Welcome <?php echo\
    \ $_REQUEST[\"name\"]; ?>.<br />\n        Your email address is <?php echo $_REQUEST[\"\
    email_add\"]; ?>\n    </body>\n</html>\n```\n\nNow you know how forms are created\
    \ and through which HTTP methods. Information from one form can also be transferred\
    \ to another. Next, you’ll use the knowledge you’ve gained so far to create a\
    \ sign-up form that enables users to register on your site."
