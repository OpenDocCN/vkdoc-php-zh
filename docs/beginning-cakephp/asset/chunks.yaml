- fmt: "### Many-to-Many Relationships in Cake\n\nThe more you experiment with “has\
    \ and belongs to many” associations, the easier it will be to use them in your\
    \ applications.\n\nIn short, I’ve already discussed a one-to-one relationship\
    \ with the `hasOne` association, and the `hasMany` association shows you how a\
    \ one-to-many relationship is managed in Cake. What about a many-to-many relationship?\n\
    \nMany web sites use tags to order their content. Many blogs, rather than assigning\
    \ one category to a post, will have a list of tags that can be assigned multiple\
    \ times to multiple stories, and vice versa. This is a many-to-many relationship\
    \ between posts and tags. One post can have many tags, and each tag can belong\
    \ to many posts.\n\nStructurally, the database can handle many-to-many relationships\
    \ only if there is a third table that saves these associations. In the post-to-tag\
    \ example, a third table named something like `posts_tags` would be created. In\
    \ it would be just two fields: `post_id` and `tag_id`. By having a third table,\
    \ you maintain the flexibility needed to list as many relationships as the application\
    \ would need to save; there is no limit to the number of associations in either\
    \ direction because the third table can continually save more records.\n\nAs you\
    \ can imagine, Cake saves a great deal of time in managing this association. Just\
    \ like the `$hasOne` and `$hasMany` attributes, you create a “has and belongs\
    \ to many” association by entering the `$hasAndBelongsToMany` attribute in the\
    \ model.\n\nYou can also test “has and belongs to many” associations in the scaffold.\
    \ Rather than view a select menu for a one-to-many relationship, Cake’s scaffolding\
    \ will render a multiple-select menu. In this way, you can test the association\
    \ in the same manner that you tested the “has many” relationship earlier.\n\n\
    ### Applying and Testing This Relationship with the Blog\n\nLet’s add a “has and\
    \ belongs to many” relationship to the blog application. To do this, you will\
    \ need to create a new table in the database. See Listing 4-10 for the SQL syntax\
    \ to create the `tags` table.\n\n**Listing 4-10.** *The* `tags` *Table*\n\n```sql\n\
    CREATE TABLE `tags` (\n  `id` int(11) unsigned NOT NULL auto_increment,\n  `name`\
    \ varchar(100) default NULL,\n  `longname` varchar(255) default NULL,\n  PRIMARY\
    \ KEY (`id`)\n);\n```\n\nThis `tags` table will hold category tags to better organize\
    \ your blog posts. The `name` field will be an alphanumeric field to be used in\
    \ accessing the tag through the URL. The `longname` field will store the category’s\
    \ display title for use in links and page headings.\n\nBecause the `tags` table\
    \ will be linked with posts in a “has and belongs to many” relationship, you must\
    \ create another table to hold those associations. This table name will follow\
    \ Cake’s naming conventions. For “has and belongs to many” tables, the name must\
    \ be arranged in alphabetical order with each associated table’s name separated\
    \ by an underscore. Inside the table, you provide the foreign key and associated\
    \ foreign key as fields with names following the same convention for one-to-many\
    \ relationships. In this case, the field names will be ordered alphabetically,\
    \ with `post_id` first and `tag_id` second. Use Listing 4-11 to create the new\
    \ `posts_tags` table.\n\n**Listing 4-11.** *The* `posts_tags` *Table*\n\n```sql\n\
    CREATE TABLE `posts_tags` (\n  `id` int(11) unsigned NOT NULL auto_increment,\n\
    \  `post_id` int(11) unsigned default NULL,\n  `tag_id` int(11) unsigned default\
    \ NULL,\n  PRIMARY KEY (`id`)\n);\n```\n\nThe `Tag` model is absent, so create\
    \ that next as the `app/models/tag.php` file. Paste Listing 4-12 into the new\
    \ `Tag` model file.\n\n**Listing 4-12.** *The* `Tag` *Model*\n\n```php\n<?php\n\
    class Tag extends AppModel {\n  var $name = 'Tag';\n  var $hasAndBelongsToMany\
    \ = array('Post');\n}\n?>\n```\n\nNext, you will have to establish the association\
    \ in the `Post` model as well. Adjust this model to reflect the “has and belongs\
    \ to many” relationship, as shown in Listing 4-13.\n\n**Listing 4-13.** *The*\
    \ `Post` *Model with the* `$hasAndBelongsToMany` *Attribute Set*\n\n```php\n<?php\n\
    ```"
  raw: 'The more you experiment with “has and belongs to many” associations, the easier
    it will be to use them in your applications.


    In short, I’ve already discussed a one-to-one relationship with the hasOne association,
    and the hasMany association shows you how a one-to-many relationship is managed
    in Cake. What about a many-to-many relationship?


    Many-to-Many Relationships in Cake


    Many web sites use tags to order their content. Many blogs, rather than assigning
    one category to a post, will have a list of tags that can be assigned multiple
    times to multiple stories, and vice versa. This is a many-to-many relationship
    between posts and tags. One post can have many tags, and each tag can belong to
    many posts.


    Structurally, the database can handle many-to-many relationships only if there
    is a third table that saves these associations. In the post-to-tag example, a
    third table named something like posts_tags would be created. In it would be just
    two fields: post_id and tag_id. By having a third table, you maintain the flexibility
    needed to list as many relationships as the application would need to save; there
    is no limit to the number of associations in either direction because the third
    table can continually save more records.


    As you can imagine, Cake saves a great deal of time in managing this association.
    Just like the $hasOne and $hasMany attributes, you create a “has and belongs to
    many” association by entering the $hasAndBelongsToMany attribute in the model.


    You can also test “has and belongs to many” associations in the scaffold. Rather
    than view a select menu for a one-to-many relationship, Cake’s scaffolding will
    render a multiple-select menu. In this way, you can test the association in the
    same manner that you tested the “has many” relationship earlier.


    Applying and Testing This Relationship with the Blog


    Let’s add a “has and belongs to many” relationship to the blog application. To
    do this, you will need to create a new table in the database. See Listing 4-10
    for the SQL syntax to create the tags table.


