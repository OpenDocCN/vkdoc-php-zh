    Extending the Blog Manager


    **I**n Chapter7 we began implementing theblogging functionality in our webapplication,
    which included giving users the ability to add, edit, and delete posts, as well
    as allowing them to preview posts prior to sending them live.


    In this chapter, we will continue to implement these blog management tools, building
    on what we started in the previous chapter. The features we will implement include
    the following:


    • **Retrieving multiple posts.** So far in the blog manager we load only one blog
    post database record at a time. We will look at how to effectively retrieve large
    amounts of data from the database in a single operation.


    • **Displaying existing blog posts.** Using the functions we create to retrieve
    multiple blog posts, we will create an index page used to list a user’s posts
    so they can preview or edit them as required. We will make this post index Ajax-powered
    to help users quickly access their previous posts.


    • **Integrating a WYSIWYG editor.** We will implement FCKeditor, an open source
    What You See Is What You Get (WYSIWYG) editor. This will allow users to easily
    format their blog posts with HTML using the provided toolbar.


    Once you have completed this chapter, the blog management tools will be in a sufficient
    state to allow users to quickly and easily post new entries to their blogs. This
    will allow users to move on (in Chapter 9) to publishing their blog so other users
    can view it.


