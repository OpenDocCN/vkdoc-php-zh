- "# 在表单未完成时保留用户输入\n\n假设你花了 10 分钟填写一个表单，点击提交按钮后，却收到提示说某个必填字段缺失。如果不得不重新填写所有字段，那会让人非常恼火。由于每个字段的内容都保存在\
  \ `$_POST` 数组中，因此在发生错误时重新显示这些内容就变得容易了。\n\n## PHP 方案 6-3：创建粘性表单字段\n\n该 PHP 方案展示了如何使用条件语句从\
  \ `$_POST` 数组中提取用户输入，并在文本输入字段和文本区域中重新显示这些内容。\n\n继续使用之前相同的文件进行操作。或者，你也可以使用 `ch06`\
  \ 文件夹中的 `contact_03.php` 和 `includes/processmail_01.php`。\n\n1. 页面首次加载时，你不希望输入字段中显示任何内容，但如果必填字段缺失或出现错误，你*确实*希望重新显示这些内容。关键在于：如果\
  \ `$missing` 或 `$errors` 数组包含任何值，则应重新显示每个字段的内容。你通过 `<input>` 标签的 `value` 属性为文本输入字段设置默认文本，因此需像这样修改\
  \ `name` 字段的 `<input>` 标签：\n\n```\n>\n```\n\n花括号内的这行代码包含引号和句点的组合，可能会让你感到困惑。首先要明白，整行只有一个分号——在末尾——因此\
  \ `echo` 命令应用于整行。正如第 3 章所解释的，句点被称为连接运算符，用于连接字符串和变量。你可以将这一行其余部分分解为三个部分，如下所示：\n\n\
  - `'value=\"' .`\n- `htmlentities($name)`\n- `. '\"'`\n\n第一部分输出 `value=\"` 作为文本，并使用连接运算符将其与下一部分连接，后者将\
  \ `$name` 传递给一个名为 `htmlentities()` 的函数。我稍后会解释为什么这样做是必要的。第三部分再次使用连接运算符连接最终输出，该输出仅包含一个双引号。因此，如果\
  \ `$missing` 或 `$errors` 包含任何值，并且 `$_POST['name']` 包含 `Joe`，那么 `<input>` 标签内最终会变成：\n\
  \n```\n<input type=\"text\" name=\"name\" value=\"Joe\" />\n```\n\n`$name` 变量包含原始用户输入，该输入通过\
  \ `$_POST` 数组传递。你在 PHP 方案 6-2 的 `processmail.php` 中创建的 `foreach` 循环处理 `$_POST` 数组，并将每个元素赋值给一个同名的变量。这使你能够简单地将\
  \ `$_POST['name']` 作为 `$name` 来访问。\n\n那么，为什么我们需要 `htmlentities()` 函数呢？顾名思义，该函数将某些字符转换为其等效的\
  \ HTML 字符实体。这里我们关心的是双引号。假设埃里克·“慢手”·克莱普顿决定通过表单发送反馈。如果你单独使用 `$name`，图 6-6 显示了当必填字段被省略且你不使用\
  \ `htmlentities()` 时会发生的情况。\n\n![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig6_HTML.jpg](img/332054_4_En_6_Fig6_HTML.jpg)\n\
  \n**图 6-6** 在重新显示表单字段之前，引号需要特殊处理\n\n然而，将 `$_POST` 数组元素的内容传递给 `htmlentities()` 后，字符串中间的双引号会被转换为\
  \ `&quot;`。如图 6-7 所示，内容不再被截断。\n\n![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig7_HTML.jpg](img/332054_4_En_6_Fig7_HTML.jpg)\n\
  \n**图 6-7** 在显示前将值传递给 `htmlentities()` 解决了问题\n\n这样做的妙处在于，当表单重新提交时，字符实体 `&quot;`\
  \ 会被转换回双引号。因此，在发送电子邮件之前无需进一步转换。\n\n> **注意**  \n> 如果 `htmlentities()` 导致文本乱码，你可以通过向该函数传递第二个和第三个可选参数，直接在脚本中设置编码。例如，要将编码设置为简体中文，请使用\
  \ `htmlentities($name, ENT_COMPAT, 'GB2312')`。有关详细信息，请参见 [`www.php.net/manual/en/function.htmlentities.php`](http://www.php.net/manual/en/function.htmlentities.php)\
  \ 上的文档。\n\n2. 以相同方式编辑 `email` 字段，使用 `$email` 代替 `$name`。\n\n3. `comments` 文本区域需要稍微不同的处理方式，因为\
  \ `<textarea>` 标签没有 `value` 属性。你必须将 PHP 代码块放在文本区域的开闭标签之间，如下所示（新代码以粗体显示）：\n\n```\n\
  <textarea name=\"comments\" id=\"comments\"><?php echo htmlentities($comments);\
  \ ?></textarea>\n```\n\n将 PHP 开闭标签紧贴 `<textarea>` 标签放置非常重要。如果不这样做，文本区域内会出现多余的空白。\n\
  \n4. 保存 `contact.php` 并在浏览器中测试页面。如果省略了任何必填字段，表单将显示原始内容以及任何错误消息。\n\n你可以使用 `ch06`\
  \ 文件夹中的 `contact_04.php` 检查代码。\n\n> **警告**  \n> 使用此技术会阻止表单的“重置”按钮重置已被 PHP 脚本修改的任何字段，因为它显式地设置了每个字段的\
  \ `value` 属性。\n\n## 过滤潜在攻击\n\n一种称为**电子邮件头部注入**的特别恶意的攻击试图将在线表单转变为垃圾邮件中继。攻击者试图诱使你的脚本发送带有多个副本的\
  \ HTML 电子邮件。如果你在可传递给 `mail()` 函数的第四个参数的附加头部中包含了未过滤的用户输入，这种情况就有可能发生。通常的做法是将用户的电子邮件地址添加为\
  \ `Reply-to` 头部。如果你在提交的值中检测到空格、换行符、回车符或任何字符串 “Content-type:”、“Cc:” 或 “Bcc:”，则说明你正成为攻击目标，因此应阻止该消息。\n\
  \n### PHP 方案 6-4：阻止包含可疑内容的电子邮件地址\n\n该 PHP 方案检查用户输入的电子邮件地址中是否存在可疑内容。如果检测到，则将一个布尔变量设置为\
  \ `true`。稍后这将用于阻止邮件发送。\n\n继续使用之前相同的页面进行操作。或者，你也可以使用 `ch06` 文件夹中的 `contact_04.php`\
  \ 和 `includes/processmail_01.php`。\n\n1. 为了检测可疑短语，我们将使用搜索模式或**正则表达式**。在现有 `foreach`\
  \ 循环之前，向 `processmail.php` 顶部添加以下代码：\n\n```\n// pattern to locate suspect phrases\n\
  $pattern = '/[\\s\\r\\n]|Content-Type:|Bcc:|Cc:/i';\nforeach ($_POST as $key =>\
  \ $value) {\n```\n\n分配给 `$pattern` 的字符串将用于执行不区分大小写的搜索，搜索目标为以下任意一项：空格、回车符、换行符、“Content-Type:”、“Bcc:”\
  \ 或 “Cc:”。该字符串的编写格式称为 Perl 兼容正则表达式（PCRE）。搜索模式包含在一对正斜杠中，最后一个斜杠后的 `i` 使模式不区分大小写。\n\
  \n> **提示**  \n> 正则表达式是用于匹配文本模式的极其强大的工具。诚然，它们并不容易学习；但如果你认真对待使用 PHP 和 JavaScript 等编程语言，这是一项基本技能。请参阅\
  \ Jörg Krause 所著的《正则表达式入门》（Apress，2017 年，ISBN 978-1-4842-2508-0）。该书主要面向 JavaScript\
  \ 开发者，但 JavaScript 和 PHP 之间在实现上只有细微差别。基本语法是相同的。\n\n2. 现在，你可以使用存储在 `$pattern` 中的\
  \ PCRE 来检测提交的电子邮件地址中是否存在任何可疑的用户输入。在第 1 步的 `$pattern` 变量之后立即添加以下代码：\n\n\n\n```php\n\
  // 检查提交的电子邮件地址\n$suspect = preg_match($pattern, $_POST['email']);\n```\n\n`preg_match()`函数将第一个参数传递的正则表达式与第二个参数中的值（本例中为电子邮件字段的值）进行比较。如果找到匹配项，则返回`true`。因此，如果发现任何可疑内容，`$suspect`将为`true`。但如果没有匹配项，则为`false`。\n\
  \n2. 如果在电子邮件地址中检测到可疑内容，则无需进一步处理`$_POST`数组。将处理`$_POST`变量的代码包装在如下条件语句中：\n\n```php\n\
  if (!$suspect) {\n    foreach ($_POST as $key => $value) {\n        // 如果 $value\
  \ 不是数组，则去除空格\n        if (!is_array($value)) {\n            $value = trim($value);\n\
  \        }\n        if (!in_array($key, $expected)) {\n            // 忽略该值，它不在 $expected\
  \ 中\n            continue;\n        }\n        if (in_array($key, $required) &&\
  \ empty($value)) {\n            // 缺少必需的值\n            $missing[] = $key;\n    \
  \        $$key = \"\";\n            continue;\n        }\n        $$key = $value;\n\
  \    }\n}\n```\n\n仅在`$suspect`不为`true`时处理`$_POST`数组中的变量。\n\n不要忘记额外的花括号来关闭条件语句。\n\
  \n3. 编辑`contact.php`中`<h2>`标题后的 PHP 块，在表单上方添加一条新的警告消息，如下所示：\n\n```html\n<h2>联系我们</h2>\n\
  <p>抱歉，您的邮件无法发送。请稍后重试。</p>\n<p>请修正标出的项目。</p>\n```\n\n这将设置一个新条件，该条件因被首先考虑而优先于原始警告消息。它检查`$_POST`数组是否包含任何元素（即表单已提交），以及`$suspect`是否为`true`。该警告故意采用中性语气。挑衅攻击者是毫无意义的。\n\
  \n4. 保存`contact.php`，并通过在电子邮件字段中键入任何可疑内容来测试表单。您应该会看到新的警告消息，但您的输入将不会被保留。\n\n您可以将您的代码与`ch06`文件夹中的`contact_05.php`和`includes/processmail_02.php`进行核对。\n\
  \n## 发送电子邮件\n\n在进一步操作之前，有必要解释一下 PHP`mail()`函数的工作原理，因为它将帮助您理解处理脚本的其余部分。\n\nPHP`mail()`函数最多接受五个参数，所有参数均为字符串，如下所示：\n\
  \n* 收件人地址\n* 主题行\n* 消息正文\n* 其他电子邮件头列表（可选）\n* 附加参数（可选）\n\n第一个参数中的电子邮件地址可以采用以下任一格式：\n\
  \n```text\n'user@example.com'\n'Some Guy <user@example.com>'\n```\n\n要发送到多个地址，请使用如下逗号分隔的字符串：\n\
  \n```text\n'user@example.com, another@example.com, Some Guy <another@example.com>'\n\
  ```\n\n消息正文必须作为单个字符串呈现。这意味着您需要从`$_POST`数组中提取输入数据并格式化消息，添加标签以标识每个字段。默认情况下，`mail()`函数仅支持纯文本。换行必须同时使用回车符和换行符。还建议将行长度限制为不超过\
  \ 78 个字符。尽管听起来很复杂，但您可以使用大约 20 行 PHP 代码自动构建消息正文，您将在 PHP 解决方案 6-6 中看到这一点。添加其他电子邮件头将在下一节中详细介绍。\n\
  \n许多托管公司现在要求提供第五个参数。它确保电子邮件由受信任的用户发送，并且通常由您自己的电子邮件地址前面加上`-f`（中间没有空格）组成，全部用引号括起来。请查看您托管公司的说明，以了解是否需要此参数以及它应采用的确切格式。\n\
  \n> **警告**\n> 切勿将用户输入合并到`mail()`函数的第五个参数中，因为它可用于在 Web 服务器上执行任意脚本。\n\n## 安全地使用额外的电子邮件头\n\
  \n您可以在[`www.faqs.org/rfcs/rfc2076`](http://www.faqs.org/rfcs/rfc2076)找到电子邮件头的完整列表，但一些最著名和最有用的头使您能够将电子邮件副本发送到其他地址（抄送和密送）或更改编码。除最后一个头外，每个新头都必须位于由回车符和换行符终止的单独行上。这意味着在双引号字符串中使用`\\\
  r`和`\\n`转义序列。\n\n> **提示**\n> 格式化额外头的一种便捷方法是将每个头定义为单独的数组元素，然后使用`implode()`函数将它们与双引号中的`\"\
  \\r\\n\"`连接在一起。\n\n默认情况下，`mail()`使用 Latin1 (ISO-8859-1)编码，该编码不支持重音字符。如今的网页编辑器经常使用\
  \ Unicode (UTF-8)，它支持大多数书面语言，包括欧洲语言中常用的重音符号，以及非字母文字，如中文和日语。为确保电子邮件消息不会乱码，请使用`Content-Type`头将编码设置为\
  \ UTF-8，如下所示：\n\n```php\n$headers[] = \"Content-Type: text/plain; charset=utf-8\"\
  ;\n```\n\n您还需要在网页`<head>`部分的`<meta>`标签中添加 UTF-8 作为`charset`属性，如下所示：\n\n```html\n\
  <meta charset=\"utf-8\">\n```\n\n假设您想要向其他部门发送副本，以及一份不希望其他人看到的副本。通过`mail()`发送的电子邮件通常被标识为来自`nobody@yourdomain`（或任何分配给\
  \ Web 服务器的用户名），因此添加一个更友好的“发件人”地址是个好主意。以下是构建这些额外头的方法，最后使用`implode()`连接它们：\n\n```php\n\
  $headers[] = 'From: Japan Journey <nobody@example.com>';\n$headers[] = 'Cc: sales@example.com,\
  \ finance@example.com';\n$headers[] = 'Bcc: secretplanning@example.com';\n$headers\
  \ = implode(\"\\r\\n\", $headers);\n```\n\n`implode()`函数通过用作为第一个参数提供的字符串连接每个数组元素，将数组转换为字符串。因此，这将返回`$headers`数组作为一个字符串，每个数组元素之间带有回车符和换行符。\n\
  \n在构建了您想要使用的头集之后，将包含它们的变量作为第四个参数传递给`mail()`，如下所示（假设目标地址、主题和消息正文已经存储在变量中）：\n\n```php\n\
  $mailSent = mail($to, $subject, $message, $headers);\n```\n\n像这样硬编码的额外头没有安全风险，但任何来自用户输入的内容在使用前都必须进行过滤。最大的危险来自要求用户提供电子邮件地址的文本字段。一种广泛使用的技术是将用户的电子邮件地址合并到`From`或`Reply-To`头中，这使得您可以通过单击电子邮件程序中的“回复”按钮直接回复传入的邮件。这非常方便，但攻击者经常试图在电子邮件输入字段中塞入大量虚假头。之前的\
  \ PHP 解决方案消除了攻击者最常使用的头，但在将电子邮件地址合并到额外头之前，我们需要进一步检查该电子邮件地址。\n\n> **警告**\n> 尽管电子邮件字段是攻击者的主要目标，但如果允许用户更改目标地址和主题行的值，它们都很容易受到攻击。用户输入应始终视为可疑。始终硬编码目标地址和主题行。或者，提供一个可接受值的下拉菜单，并将提交的值与相同值的数组进行核对。\n\
  \n\n\n"
- "# PHP 方案 6-5：添加邮件头并自动设置回复地址\n\n本 PHP 方案为邮件添加了三个邮件头：`From`（发件人）、`Content-Type`（将编码设置为\
  \ UTF-8）和 `Reply-To`（回复地址）。在将用户邮箱地址添加到最终的邮件头之前，它使用了一个 PHP 内置过滤器来验证提交的值是否符合有效邮箱地址的格式。\n\
  \n继续使用之前相同的页面进行处理。或者，你也可以使用 `ch06` 文件夹中的 `contact_05.php` 和 `includes/processmail_02.php`\
  \ 文件。\n\n1. 邮件头通常针对特定的网站或页面，因此 `From` 和 `Content-Type` 邮件头将被添加到 `contact.php` 的脚本中。在页面顶部的\
  \ PHP 代码块中，就在引入 `processmail.php` 之前，添加以下代码：\n\n```\n    $required = ['name', 'comments',\
  \ 'email'];\n    // 创建额外的邮件头\n    $headers[] = 'From: Japan Journey';\n    $headers[]\
  \ = 'Content-Type: text/plain; charset=utf-8';\n    require './includes/processmail.php';\n\
  ```\n\n2. 验证邮箱地址的目的是确保其格式有效，但该字段可能为空，因为你可以决定不将其设为必填项，或者用户直接忽略了它。如果该字段为必填但为空，它将被添加到\
  \ `$missing` 数组中，并且你在 PHP 方案 6-2 中添加的警告信息将会显示。如果该字段不为空，但输入无效，则需要显示不同的提示信息。\n\n切换到\
  \ `processmail.php`，并在脚本底部添加以下代码：\n\n```\n    // 验证用户的邮箱\n    if (!$suspect && !empty($email))\
  \ {\n    $validemail = filter_input(INPUT_POST, 'email', FILTER_VALIDATE_EMAIL);\n\
  \    if ($validemail) {\n    $headers[] = \"Reply-To: $validemail\";\n    } else\
  \ {\n    $errors['email'] = true;\n    }\n    }\n```\n\n这段代码首先检查是否没有发现可疑内容（`$suspect`\
  \ 为假），并且 `email` 字段不为空。这两个条件前面都使用了逻辑非运算符，因此当 `$suspect` 和 `empty($email)` 都为 `false`\
  \ 时，它们返回 `true`。你在 PHP 方案 6-2 中添加的 `foreach` 循环会将 `$_POST` 数组中的所有预期元素赋值给更简单的变量，因此\
  \ `$email` 的值与 `$_POST['email']` 相同。\n\n下一行使用 `filter_input()` 来验证邮箱地址。第一个参数是一个\
  \ PHP 常量 `INPUT_POST`，指定该值必须来自 `$_POST` 数组。第二个参数是你要测试的元素名称。最后一个参数是另一个 PHP 常量，指定你要检查该元素是否符合有效的邮箱格式。\n\
  \n如果被测试的值有效，`filter_input()` 函数会返回该值；否则返回 `false`。因此，如果用户提交的值看起来像是一个有效的邮箱地址，`$validemail`\
  \ 会包含该地址；如果格式无效，`$validemail` 则为 `false`。`FILTER_VALIDATE_EMAIL` 常量只接受单个邮箱地址，因此任何尝试插入多个邮箱地址的行为都会被拒绝。\n\
  \n> **注意**\n> `FILTER_VALIDATE_EMAIL` 仅检查格式，并不验证该地址是否真实存在。\n\n如果 `$validemail` 不为\
  \ `false`，则可以安全地将其加入到 `Reply-To` 邮件头中。但如果 `$validemail` 为 `false`，则将 `$errors['email']`\
  \ 添加到 `$errors` 数组中。\n\n1. 现在，你需要修改 `contact.php` 中 `email` 字段的 `<label>` 标签，代码如下：\n\
  \n```\n    Email:\n\nPlease enter your email address\n\nInvalid email address\n\n\
  ```\n\n这为第一个条件语句添加了一个 `elseif` 子句，并在邮箱地址验证失败时显示不同的警告信息。\n\n2. 保存 `contact.php`，通过留空所有字段并点击“发送消息”来测试表单。你会看到原来的错误信息。再次测试，在“Email”字段中输入一个不是邮箱地址的值，或者输入两个邮箱地址。你应该会看到无效邮箱的提示信息。\n\
  \n你可以使用 `ch06` 文件夹中的 `contact_06.php` 和 `includes/processmail_03.php` 来检查你的代码。\n\
  \n"
- "# PHP 方案 6-6：构建邮件正文并发送邮件\n\n许多 PHP 教程展示了如何像这样手动构建邮件正文：\n\n```\n$message = \"Name:\
  \ $name\\r\\n\\r\\n\";\n$message .= \"Email: $email\\r\\n\\r\\n\";\n$message .=\
  \ \"Comments: $comments\";\n```\n\n这为每个字段的输入添加了标签来标识来源，并在每项之间插入了两个回车换行符。对于字段数量较少的情况，这没问题，但随着字段增多，很快就会变得繁琐。只要你为表单字段赋予了有意义的\
  \ `name` 属性，就可以使用 `foreach` 循环自动构建邮件正文，这也是本 PHP 方案采用的方法。\n\n继续使用之前相同的文件进行处理。或者，使用\
  \ `ch06` 文件夹中的 `contact_06.php` 和 `includes/processmail_03.php` 文件。\n\n1. 在 `processmail.php`\
  \ 脚本的底部添加以下代码：\n\n```\n    $mailSent = false;\n```\n\n这会初始化一个变量，用于在邮件发送成功后重定向到感谢页面。在你知道\
  \ `mail()` 函数成功执行之前，需要将其设置为 `false`。\n\n2. 现在，立即在其后添加构建邮件正文的代码：\n\n```\n    // 仅当无可疑内容、无缺失必填字段且无错误时继续执行\n\
  \    if (!$suspect && !$missing && !$errors) {\n    // 初始化 $message 变量\n    $message\
  \ = \";\n    // 遍历 $expected 数组\n    foreach($expected as $item) {\n    // 将当前项的值赋给\
  \ $val\n    if (isset($$item) && !empty($$item)) {\n    $val = $$item;\n    } else\
  \ {\n    // 如果没有值，则赋值为 'Not selected'\n    $val = 'Not selected';\n    }\n    //\
  \ 如果是数组，则展开为逗号分隔的字符串\n    if (is_array($val)) {\n    $val = implode(', ', $val);\n\
  \    }\n    // 将标签中的下划线替换为空格\n    $item = str_replace('_', ' ', $item);\n    //\
  \ 将标签和值添加到邮件正文\n    $message .= ucfirst($item).\": $val\\r\\n\\r\\n\";\n    }\n\
  \    // 限制每行长度为 70 个字符\n    $message = wordwrap($message, 70);\n    // 将邮件头格式化为单个字符串\n\
  \    $headers = implode(\"\\r\\n\", $headers);\n    $mailSent = true;\n    }\n```\n\
  \n这段代码首先检查 `$suspect`、`$missing` 和 `$errors` 是否都为 `false`。如果是，则通过遍历 `$expected`\
  \ 数组来构建邮件正文，并将结果以一系列标签/值对的形式存储在 `$message` 中。\n\n其工作原理的关键在于以下条件语句：\n\n```\n    if\
  \ (isset($$item) && !empty($$item)) {\n    $val = $$item;\n    }\n```\n\n这是使用可变变量的另一个例子（参见第\
  \ 4 章的“动态创建新变量”）。每次循环运行时，`$item` 都包含 `$expected` 数组中当前元素的值。第一个元素是 `name`，因此 `$$item`\
  \ 动态创建了一个名为 `$name` 的变量。实际上，这个条件语句等同于：\n\n```\n    if (isset($name) && !empty($name))\
  \ {\n    $val = $name;\n    }\n```\n\n在下一轮循环中，`$$item` 创建了一个名为 `$email` 的变量，以此类推。\n\
  \n> **警告**\n> 此脚本仅从 `$expected` 数组中的元素构建邮件正文。为了使其正常工作，你必须将所有表单字段的名称都列在 `$expected`\
  \ 数组中。\n\n\n\n如果某个字段未标记为必填且留空，其值将被设为“未选择”。该代码还会处理来自多选元素（例如复选框组和`<select>`列表）的值，这些值会以`$_POST`数组的子数组形式进行传输。`implode()`函数会将这些子数组转换为逗号分隔的字符串。每个标签均源自`$expected`数组当前元素中输入字段的`name`属性。`str_replace()`的第一个参数是下划线。如果在`name`属性中找到下划线，则将其替换为第二个参数——一个由单个空格组成的字符串。随后，`ucfirst()`会将首字母转换为大写。请注意，`str_replace()`的第三个参数是`$item`（带单个美元符号），因此这次它是一个普通变量，而非可变变量。它包含来自`$expected`数组的当前值。将邮件正文合并为单个字符串后，`wordwrap()`函数会将行长度限制为\
  \ 70 个字符。邮件头通过`implode()`函数格式化为单个字符串，各邮件头之间以回车符和换行符分隔。\n\n发送邮件的代码仍有待添加，但出于测试目的，`$mailSent`已被设置为`true`。\n\
  \n1. 保存`processmail.php`。在`contact.php`底部找到以下代码块：\n\n   将其更改为：\n\n   这会检查表单是否已提交且邮件是否准备就绪。然后显示`$message`和`$headers`中的值。这两个值都传递给`htmlentities()`，以确保它们在浏览器中正确显示。\n\
  \n2. 保存`contact.php`，并通过输入姓名、电子邮件地址和简短评论来测试表单。点击“发送消息”后，你应在页面底部看到邮件正文和邮件头的显示内容，如图\
  \ 6-8 所示。\n\n   ![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig8_HTML.jpg](img/332054_4_En_6_Fig8_HTML.jpg)\n\
  \n   图 6-8. 验证邮件正文和邮件头格式是否正确\n\n   假设邮件正文和邮件头在页面底部正确显示，你就可以添加发送邮件的代码了。如有必要，请对照`ch06`文件夹中的`contact_07.php`和`includes/processmail_04.php`检查代码。\n\
  \n3. 在`processmail.php`中，添加发送邮件的代码。找到以下行：\n\n   ```\n   $mailSent = true;\n   ```\n\
  \n   将其更改为：\n\n   ```\n   $mailSent = mail($to, $subject, $message, $headers);\n\
  \   if (!$mailSent) {\n       $errors['mailfail'] = true;\n   }\n   ```\n\n   这将目标地址、主题行、邮件正文和邮件头传递给`mail()`函数。如果成功将电子邮件交给\
  \ Web 服务器的邮件传输代理（MTA），该函数返回`true`。如果失败，`$mailSent`会被设为`false`，条件语句会向`$errors`数组添加一个元素，以便在重新显示表单时保留用户的输入。\n\
  \n4. 在`contact.php`顶部的 PHP 代码块中，紧跟在包含`processmail.php`的命令之后，添加以下条件语句：\n\n   ```\n\
  \   require './includes/processmail.php';\n   if ($mailSent) {\n       header('Location:\
  \ http://www.example.com/thank_you.php');\n       exit;\n   }\n   }\n   ?>\n   ```\n\
  \n   你需要在远程服务器上测试此操作，因此请将`www.example.com`替换为你自己的域名。这会检查`$mailSent`是否为`true`。如果是，`header()`函数会重定向到`thank_you.php`，这是一个确认消息已发送的页面。下一行的`exit`命令确保页面重定向后脚本终止。\n\
  \n   `ch06`文件夹中有一个`thank_you.php`副本。\n\n5. 如果`$mailSent`为`false`，则会重新显示`contact.php`；你需要警告用户消息无法发送。编辑`<h2>`标题后的条件语句，如下所示：\n\
  \n   ```\n   Contact Us\n   Sorry, your mail could not be sent. . . .\n   ```\n\n\
  \   原始条件和新增条件已用括号括起来，因此每对条件会被分别考虑。如果表单已提交并且发现了可疑短语，*或者*表单已提交且`$errors['mailfail']`已被设置，则会显示消息无法发送的警告。\n\
  \n6. 删除`contact.php`底部显示邮件正文和邮件头的代码块（包括`<pre>`标签）。\n\n7. 在本地进行测试很可能会显示感谢页面，但邮件永远不会到达。这是因为大多数测试环境没有\
  \ MTA。即使你设置了一个，大多数邮件服务器也会拒绝来自无法识别来源的邮件。请将`contact.php`及所有相关文件（包括`processmail.php`和`thank_you.php`）上传到你的远程服务器，并在那里测试联系表单。不要忘记`processmail.php`需要放在名为`includes`的子文件夹中。\n\
  \n   你可以对照`ch06`文件夹中的`contact_08.php`和`includes/processmail_05.php`检查代码。\n\n###\
  \ 对 `mail()` 进行故障排除\n\n需要理解的是，`mail()`并非一个电子邮件程序。PHP 的职责在将地址、主题、消息和邮件头传递给 MTA 后即告结束。它无法知晓电子邮件是否送达预期目的地。通常情况下，邮件会即时到达，但网络堵塞可能导致延迟数小时甚至一两天。\n\
  \n如果你从`contact.php`发送消息后被重定向到感谢页面，但收件箱中并未收到任何内容，请检查以下事项：\n\n-   消息是否被垃圾邮件过滤器拦截？\n\
  -   是否检查了存储在`$to`中的目标地址？尝试使用一个备用电子邮件地址，看看是否有所区别。\n-   是否在`From`邮件头中使用了真实地址？使用虚假或无效地址很可能会导致邮件被拒绝。请使用与你的\
  \ Web 服务器属于同一域的有效地址。\n-   向你的托管服务商咨询，确认`mail()`的第五个参数是否为必需。如果是，它通常应为由`-f`后跟你的电子邮件地址组成的字符串。例如，`david@example.com`变为`'-fdavid@example.com'`。\n\
  \n如果仍然无法从`contact.php`收到消息，请创建一个包含以下脚本的文件：\n\n```\n<?php\nini_set('display_errors',\
  \ '1');\n$mailSent = mail('you@example.com', 'PHP mail test', 'This is a test email');\n\
  if ($mailSent) {\n    echo 'Mail sent';\n} else {\n    echo 'Failed';\n}\n```\n\n\
  将`you@example.com`替换为你自己的电子邮件地址。将该文件上传到你的网站，并在浏览器中加载页面。\n\n如果你看到关于缺少`From`邮件头的错误消息，请向`mail()`函数添加一个作为第四个参数，如下所示：\n\
  \n```\n$mailSent = mail('you@example.com', 'PHP mail test', 'This is a test email',\n\
  'From: me@example.com');\n```\n\n通常，最好使用与第一个参数中的目标地址不同的地址。\n\n如果你的托管服务商要求提供第五个参数，请按如下方式调整代码：\n\
  \n```\n$mailSent = mail('you@example.com', 'PHP mail test', 'This is a test email',\
  \ null,\n'-fme@example.com');\n```\n\n\n\n### 使用第五个参数\n通常情况下，使用第五个参数可以替代提供 `From`\
  \ 标头的需求，因此使用 `null`（不加引号）作为第四个参数表示它没有值。如果你看到“邮件已发送”但没有收到邮件，或者尝试所有五个参数后看到“失败”，请咨询你的托管公司寻求建议。如果你从该脚本收到了测试邮件，但未从\
  \ `contact.php` 收到，则说明代码中存在错误，或者你忘记上传 `processmail.php`。临时开启错误显示（如第 3 章“为什么我的页面是空白的？”中所述），以检查\
  \ `contact.php` 是否能找到 `processmail.php`。\n\n> **提示**：我曾在一所英国大学任教，当时无法弄清为什么学生们的邮件无法送达，尽管他们的代码完美无缺。结果发现是\
  \ IT 部门禁用了 Sendmail（MTA）以防止服务器被用于发送垃圾邮件！\n\n### 处理多项选择表单元素\n`contact.php` 中的表单仅使用了文本输入字段和文本区域。要成功地处理表单，你还需要了解如何处理多项选择元素，即：\n\
  - 单选按钮\n- 复选框\n- 下拉选项菜单\n- 多项选择列表\n\n它们背后的原理与你一直在使用的文本输入字段相同：表单元素的 `name` 属性被用作\
  \ `$_POST` 数组中的键。然而，存在一些重要的区别：\n\n- 复选框组和多项选择列表将选中的值存储为数组，因此对于这些类型的输入，你需要在 `name`\
  \ 属性的末尾添加一对空的方括号。例如，对于一个名为 `interests` 的复选框组，每个 `<input>` 标签中的 `name` 属性应为 `name=\"\
  interests[]\"`。如果省略方括号，则只有最后选中的项会通过 `$_POST` 数组传输。\n- 复选框组或多项选择列表中选中项的值会作为 `$_POST`\
  \ 数组的子数组进行传输。PHP 解决方案 6-6 中的代码会自动将这些子数组转换为逗号分隔的字符串。然而，当将表单用于其他目的时，你需要从子数组中提取值。你将在后续章节中了解如何操作。\n\
  - 如果未选中任何值，单选按钮、复选框和多项选择列表*不会*包含在 `$_POST` 数组中。因此，在处理表单时，在尝试访问它们的值之前，务必使用 `isset()`\
  \ 检查它们是否存在。\n\n本章其余 PHP 解决方案展示了如何处理多项选择表单元素。我不会详细讲解每一步，而是只强调重点。在研读本章剩余内容时，请牢记以下几点：\n\
  - 处理这些元素依赖于 `processmail.php` 中的代码。\n- 你必须将每个元素的 `name` 属性添加到 `$expected` 数组中，以便将其包含在邮件正文中。\n\
  - 若要使某个字段为必填项，请将其 `name` 属性添加到 `$required` 数组中。\n- 如果非必填字段留空，`processmail.php` 中的代码会将其值设置为“未选择”。\n\
  \n图 6-9 显示了 `contact.php` 在原始设计基础上添加了每种输入类型后的效果。\n\n![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig9_HTML.jpg](img/332054_4_En_6_Fig9_HTML.jpg)\n\
  \n*图 6-9. 包含多项选择表单元素示例的反馈表单*\n\n> **提示**：HTML5 表单输入元素都使用 `name` 属性，并将值作为文本或 `$_POST`\
  \ 数组的子数组发送，因此你应该能够相应地调整代码。\n\n### PHP 解决方案 6-7：处理单选按钮组\n单选按钮组允许你只选择一个值。虽然在 HTML\
  \ 标记中设置默认值很常见，但并非必须。此 PHP 解决方案展示了如何处理这两种情况。\n\n1. 处理单选按钮的简单方法是将其中的一个设置为默认值。由于始终有值被选中，单选按钮组总是会包含在\
  \ `$_POST` 数组中。\n\n带有默认值的单选按钮组代码类似如下（`name` 属性和 PHP 代码以粗体突出显示）：\n\n```\n    订阅新闻通讯？\n\
  \n>\n    是\n    >\n    否\n```\n\n单选按钮组的所有成员共享同一个 `name` 属性。由于只能选择一个值，因此 `name` 属性*不*以一对空方括号结尾。\n\
  \n与“是”按钮相关的条件语句检查 `$_POST` 以查看表单是否已提交。如果已提交且 `$_POST['subscribe']` 的值为“是”，则将 `checked`\
  \ 属性添加到 `<input>` 标签中。\n\n在“否”按钮中，条件语句使用了 `||`（或）。第一个条件是 `!$_POST`，当表单未提交时为 `true`。如果为\
  \ `true`，则在页面首次加载时将 `checked` 属性添加为默认值。如果为 `false`，则表示表单已提交，因此会检查 `$_POST['subscribe']`\
  \ 的值。\n\n2. 当单选按钮没有默认值时，它不会包含在 `$_POST` 数组中，因此不会被 `processmail.php` 中构建 `$missing`\
  \ 数组的循环检测到。为了确保单选按钮元素包含在 `$_POST` 数组中，你需要在表单提交后测试其是否存在。如果未包含，则需要将其值设置为空字符串，如下所示：\n\
  \n```\n    $required = ['name', 'comments', 'email', 'subscribe'];\n    // 为可能不存在的变量设置默认值\n\
  \    if (!isset($_POST['subscribe'])) {\n    $_POST['subscribe'] = \"\";\n    }\n\
  ```\n\n3. 如果单选按钮组是必填项但未选中，则在表单重新加载时需要显示错误消息。你还需要更改 `<input>` 标签中的条件语句以反映不同的行为。\n\
  \n以下列表显示了 `contact_09.php` 中的 `subscribe` 单选按钮组，所有 PHP 代码均以粗体突出显示：\n\n```\n    订阅新闻通讯？\n\
  \n请做出选择\n\n>\n    是\n    >\n    否\n```\n\n控制 `<h2>` 标签中警告消息的条件语句使用了与文本输入字段相同的技术。如果单选按钮组是必填项且位于\
  \ `$missing` 数组中，则会显示该消息。\n\n在两个单选按钮中，包围 `checked` 属性的条件语句是相同的。它会检查表单是否已提交，并且仅当\
  \ `$_POST['subscribe']` 中的值匹配时才显示 `checked` 属性。\n\n### PHP 解决方案 6-8：处理复选框组\n复选框可以单独使用，也可以成组使用。处理它们的方法略有不同。此\
  \ PHP 解决方案展示了如何处理名为 `interests` 的复选框组。PHP 解决方案 6-11 解释了如何处理单个复选框。  \n当作为一组使用时，组中的所有复选框共享相同的\
  \ `name` 属性，该属性需要以一对空的方括号结尾，以便 PHP 将选中的值作为数组传输。为了标识哪些复选框已被选中，每个复选框都需要一个唯一的 `value`\
  \ 属性。\n\n如果未选中任何项，则复选框组不会包含在 `$_POST` 数组中。表单提交后，你需要检查 `$_POST` 数组以查看它是否包含该复选框组的子数组。如果不包含，你需要为\
  \ `processmail.php` 中的脚本创建一个空子数组作为默认值。\n\n1. 为节省空间，仅显示该组的前两个复选框。`name` 属性和 PHP 代码部分以粗体突出显示。\n\
  \n```\n    在日本的兴趣\n\n>\n    动漫/漫画\n\n>\n    艺术与手工艺\n\n. . .\n```\n\n\n\n每个复选框共享相同的`name`属性，该属性以空方括号结尾，因此数据被视为数组。如果省略方括号，`$_POST['interests']`仅包含所选第一个复选框的值。此外，如果未选中任何复选框，`$_POST['interests']`将不存在。你将在下一步中修复此问题。\n\
  \n**注意**：虽然多选时必须为`name`属性添加方括号，但所选值的子数组存储在`$_POST['interests']`中，而不是`$_POST['interests[]']`。\n\
  \n每个复选框元素内的 PHP 代码与单选按钮组中的作用相同，将`checked`属性包裹在条件语句中。第一个条件检查表单是否已提交。第二个条件使用`in_array()`函数检查与该复选框关联的`value`是否存在于`$_POST['interests']`子数组中。如果存在，则表示该复选框已被选中。\n\
  \n1. 表单提交后，需要检查`$_POST['interests']`是否存在。如果未设置，必须创建一个空数组作为脚本其余部分处理的默认值。代码遵循与单选组相同的模式：\n\
  \n```\n$required = ['name', 'comments', 'email', 'subscribe', 'interests'];\n//\
  \ 为可能不存在的变量设置默认值\nif (!isset($_POST['subscribe'])) {\n    $_POST['subscribe'] =\
  \ \"\";\n}\nif (!isset($_POST['interests'])) {\n    $_POST['interests'] = [];\n\
  }\n```\n\n2. 要设置所需复选框的最小数量，使用`count()`函数确认从表单传输的值数量。如果少于所需的最小数量，将该组添加到`$errors`数组中，如下所示：\n\
  \n```\nif (!isset($_POST['interests'])) {\n    $_POST['interests'] = [];\n}\n//\
  \ 所需复选框的最小数量\n$minCheckboxes = 2;\nif (count($_POST['interests']) < $minCheckboxes)\
  \ {\n    $errors['interests'] = true;\n}\n```\n\n`count()`函数返回数组中的元素数量，因此如果选中的复选框少于两个，则会创建`$errors['interests']`。你可能会疑惑为什么我使用变量而不是像这样直接使用数字：\n\
  \n```\nif (count($_POST['interests']) < 2) {\n```\n\n这当然可行且输入更少，但`$minCheckboxes`可以在错误消息中重用。将数字存储在变量中意味着此条件和错误消息始终保持同步。\n\
  \n3. 表单主体中的错误消息如下所示：\n\n```\n对日本感兴趣\n请至少选择\n```\n\n## PHP Solution 6-9: 使用下拉选项菜单\n\
  \n使用`<select>`标签创建的下拉选项菜单类似于单选按钮组，通常只允许用户从多个选项中选择一个。不同之处在于，下拉菜单中始终会选中一个项目（即使只是第一个邀请用户选择其他项目的项）。因此，`$_POST`数组始终包含引用`<select>`菜单的元素，而单选按钮组除非预设了默认值，否则会被忽略。\n\
  \n1. 以下代码显示了`contact_09.php`中下拉菜单的前两个项目，PHP 代码以粗体突出显示。与所有多项选择元素一样，PHP 代码包裹了指示已选项的属性。虽然此属性在单选按钮和复选框中称为`checked`，但在`<select>`菜单和列表中称为`selected`。如果表单在缺少必填项的情况下提交，使用正确的属性来重新显示选择非常重要。当页面首次加载时，`$_POST`数组不包含任何元素，因此可以通过测试`!$_POST`来选择第一个`<option>`。一旦表单提交，`$_POST`数组始终包含来自下拉菜单的元素，因此无需测试其是否存在。\n\
  \n```\n您是如何了解到日本之旅的？\n>选择一个\n>Apress\n...\n```\n\n2. 尽管下拉菜单中始终会选中一个选项，但你可能希望强制用户选择一个默认选项以外的选项。为此，将`<select>`菜单的`name`属性添加到`$required`数组中，然后将默认选项的`value`属性和`$_POST`数组元素设置为空字符串，如下所示：\n\
  \n```\n>选择一个\n```\n\n`<option>`标签中不需要`value`属性，但如果省略它，表单将使用开始和结束标签之间的文本作为选中值。因此，必须将`value`属性显式设置为空字符串。否则，“Select\
  \ one”将作为选中值传输。\n\n3. 如果未做选择时显示警告消息的代码遵循熟悉的模式：\n\n```\n您是如何了解到日本之旅的？\n请做出选择\n```\n\
  \n## PHP Solution 6-10: 处理多项选择列表\n\n多项选择列表类似于复选框组：它们允许用户选择零个或多个项目，因此结果存储在数组中。如果未选择任何项目，则多项选择列表不会包含在`$_POST`数组中，因此你需要像复选框组一样添加一个空子数组。\n\
  \n1. 以下代码显示了`contact_09.php`中多项选择列表的前两个项目，`name`属性和 PHP 代码以粗体突出显示。附加到`name`属性的方括号确保结果以数组形式存储。代码的工作方式与\
  \ PHP Solution 6-8 中的复选框组完全相同。\n\n```\n您认为日本具有哪些特征？\n>充满活力\n>诚实守信\n...\n```\n\n\
  2. 在处理消息的代码中，以与复选框数组相同的方式为多项选择列表设置默认值：\n\n```\nif (!isset($_POST['interests']))\
  \ {\n    $_POST['interests'] = [];\n}\nif (!isset($_POST['characteristics'])) {\n\
  \    $_POST['characteristics'] = [];\n}\n```\n\n3. 要使多项选择列表成为必填项并设置最小选择数量，使用与 PHP\
  \ Solution 6-8 中复选框组相同的技术。\n\n## PHP Solution 6-11: 处理单个复选框\n\n处理单个复选框的方式与复选框组略有不同。对于单个复选框，不要附加方括号到`name`属性，因为它不需要作为数组处理。此外，`value`属性是可选的。如果未设置`value`属性，当复选框被选中时，它默认为\"\
  On\"。然而，如果复选框未被选中，则其名称不会包含在`$_POST`数组中，因此你需要测试其是否存在。\n\n此 PHP 解决方案展示了如何添加一个用于确认接受网站条款的单个复选框。假设选中该复选框是必填项。\n\
  \n1. 以下代码显示了单个复选框，`name`属性和 PHP 代码以粗体突出显示。\n\n```\n>\n我接受使用本网站的条款\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n请勾选复选框\n\n```\n仅当 `$_POST` 数组包含值且 `$errors['terms']` 尚未设置时，`<input>` 元素\n  \
  \  内的 PHP 代码块才会插入 `checked` 属性。这确保了页面首次加载时复选框\n    未被选中。如果用户未确认接受条款就提交了表单，该复选框也将保持未选中\n\
  \    状态。\n\n如果 `$errors['terms']` 已被设置，第二个 PHP 代码块会在标签旁显示一\n    条错误信息。\n```\n\n\
  除了向 `$expected` 和 `$required` 数组添加条款外，你还需要为 `$_POST['terms']` 设置一个默认值；然后在表单提交时处理数据的代码中设置\
  \ `$errors['terms']`：\n\n```\nif (!isset($_POST['characteristics'])) {\n    $_POST['characteristics']\
  \ = [];\n}\nif (!isset($_POST['terms'])) {\n    $_POST['terms'] = \"\";\n    $errors['terms']\
  \ = true;\n}\n```\n\n仅当复选框为必填项时，你才需要创建 `$errors['terms']`。对于可选的复选框，如果它未包含在 `$_POST`\
  \ 数组中，只需将其值设置为空字符串即可。\n\n## 章节回顾\n\n构建 `processmail.php` 花费了大量工作，但此脚本的美妙之处在于它适用于任何表单。唯一需要更改的部分是\
  \ `$expected` 和 `$required` 数组，以及表单特有的细节，例如目标地址、邮件头，以及如果未选择任何值则不会包含在 `$_POST` 数组中的多选元素的默认值。\n\
  \n我避免讨论 HTML 邮件，因为 `mail()` 函数处理它的能力不足。位于 [`www.php.net/manual/en/book.mail.php`](http://www.php.net/manual/en/book.mail.php)\
  \ 的 PHP 在线手册展示了一种通过添加额外邮件头来发送 HTML 邮件的方法。然而，普遍认为 HTML 邮件应始终包含一个纯文本版本，以供不接受 HTML\
  \ 的邮件程序使用。如果你想发送 HTML 邮件或附件，可以尝试使用 PHPMailer（[`https://github.com/PHPMailer/PHPMailer/`](https://github.com/PHPMailer/PHPMailer/)）。\n\
  \n正如你将在后续章节中看到的，在线表单几乎是你用 PHP 所做一切的核心。它们是浏览器和 Web 服务器之间的网关。你将反复用到在本章中学到的技术。\n\n\
  ## 使用 PHP 管理文件\n\nPHP 提供了大量用于操作服务器文件系统的函数，但要为特定任务找到合适的函数并不总是那么容易。本章将拨开迷雾，向你展示这些函数的一些实际用途，例如读取和写入文本文件以在没有数据库的情况下存储少量信息。循环在检查文件系统内容方面发挥着重要作用，因此你还将探索一些旨在提高循环效率的标准\
  \ PHP 库（SPL）迭代器。\n\n除了打开本地文件，PHP 还可以读取其他服务器上的公共文件，例如新闻源。新闻源通常格式化为 XML（可扩展标记语言）。过去，从\
  \ XML 文件中提取信息是一个繁琐的过程，但恰如其名的 SimpleXML 让这一切在 PHP 中变得简单。在本章中，你将学习如何创建一个列出文件夹中所有图像的下拉菜单，如何创建一个从文件夹中选择特定类型文件的函数，如何从另一台服务器拉取实时新闻源，以及如何提示访问者下载图像或\
  \ PDF 文件而不是在浏览器中打开它。额外福利是，你将学习如何更改从另一个网站检索到的日期的时区。\n\n本章涵盖以下主题：\n\n*   读取和写入文件\n\
  *   列出文件夹的内容\n*   使用 `SplFileInfo` 类检查文件\n*   使用 SPL 迭代器控制循环\n*   使用 SimpleXML 从\
  \ XML 文件中提取信息\n*   消费一个 RSS 源\n*   创建下载链接\n\n### 检查 PHP 能否打开文件\n\n本章中的许多 PHP 解决方案都涉及打开文件进行读写，因此确保在本地测试环境和远程服务器上设置了正确的权限非常重要。只要拥有正确的权限并知道文件位置，PHP\
  \ 就可以在任何地方读写文件。因此，出于安全考虑，你应该将要读写的文件存储在 Web 服务器根目录（通常称为 `htdocs`、`public_html` 或\
  \ `www`）之外。这可以防止未经授权的人读取你的文件，或者更糟的是，更改其内容。\n\n大多数托管公司使用 Linux 或 Unix 服务器，这些服务器对文件和目录的所有权有严格的规定。请检查\
  \ Web 服务器根目录之外存储文件的目录权限是否已设置为 644（这允许所有者读写该目录，其他所有用户只能读取）。如果你仍然收到权限拒绝的警告，请咨询你的托管公司。如果有人告诉你将任何设置提升到\
  \ 7，请注意这将允许执行脚本，可能会被恶意攻击者利用。\n\n"
- "# 提示\n\n如果您无法访问站点根目录之外的目录，我建议您更换一家托管公司。除了站点维护者之外，上传到站点的文件在包含到网页之前应始终进行检查。将它们存放在公众视野之外可以降低安全风险。\n\
  \n### 在 Windows 上为本地测试创建服务器根目录外的文件夹\n\n对于以下练习，我建议您在 C 盘的根目录下创建一个名为 `private` 的文件夹。Windows\
  \ 上没有权限问题，所以你只需要这样做。\n\n### 在 MacOS 上为本地测试创建服务器根目录外的文件夹\n\nMac 用户可能需要多做一点准备工作，因为文件权限与\
  \ Linux 类似。在你的主文件夹中创建一个名为 `private` 的文件夹，并按照 PHP 解决方案 7-1 中的说明进行操作。\n\n如果一切顺利，你不需要做任何额外的事情。但是，如果你收到\
  \ PHP “无法打开流”的警告，请像这样更改 `private` 文件夹的权限：\n\n1.  在 Mac Finder 中选择 `private`，然后选择文件\
  \ ➤ 显示简介（Cmd+I）以打开其信息面板。\n2.  在“共享与权限”中，点击右下角的挂锁图标以解锁设置，然后将“所有人”的设置从“只读”更改为“读与写”，如下面的屏幕截图所示。\n\
  \    ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figa_HTML.jpg](img/332054_4_En_7_Figa_HTML.jpg)\n\
  3.  再次点击挂锁图标以保存新设置并关闭信息面板。你现在应该能够使用 `private` 文件夹继续本章其余部分的内容了。\n\n### 影响文件访问的配置设置\n\
  \n托管公司可以通过 `php.ini` 对文件访问施加进一步的限制。要了解已施加了哪些限制，请在您的网站上运行 `phpinfo()` 并检查 Core 部分中的设置。表\
  \ 7-1 列出了您需要检查的设置。除非您运行自己的服务器，否则通常无法控制这些设置。\n\n**表 7-1.** 影响文件访问的 PHP 配置设置\n\n|\
  \ 指令 | 默认值 | 描述 |\n| --- | --- | --- |\n| `allow_url_fopen` | On | 允许 PHP 脚本打开互联网上的公共文件\
  \ |\n| `allow_url_include` | Off | 控制包含远程文件的能力 |\n\n\n\n"
- "# 表 7-1 中的两个设置均控制通过 URL（相对于本地文件系统）对文件的访问。第一个设置 `allow_url_fopen` 允许你读取远程文件，但不能将其包含在脚本中。这通常是安全的，因此默认情况下它是启用的。另一方面，`allow_url_include`\
  \ 允许你直接将远程文件包含在脚本中。这是一个重大的安全风险，因此 `allow_url_include` 的默认状态是禁用的。\n\n> **提示**  \n\
  > 如果你的托管公司已禁用 `allow_url_fopen`，请请求启用它。否则，你将无法使用 PHP 解决方案 7-5。但不要搞混这两个名称：`allow_url_include`\
  \ 在托管环境中应始终关闭。即使 `allow_url_fopen` 在你的网站上被禁用，你仍然可能能够使用客户端 URL 库（cURL）访问有用的外部数据源，例如新闻源和公共\
  \ XML 文档。更多信息请参见 [`www.php.net/manual/en/book.curl.php`](http://www.php.net/manual/en/book.curl.php)。\n\
  \n## 读写文件\n\n读写文件的能力有着广泛的应用。例如，你可以打开另一个网站上的文件，将内容读入服务器内存，使用字符串和 XML 处理函数提取信息，然后将结果写入本地文件。你还可以查询自己服务器上的数据库，并将数据输出为文本或\
  \ CSV（逗号分隔值）文件。你甚至可以生成 Open Document Format 或 Microsoft Excel 电子表格格式的文件。但首先，让我们来看一下基本操作。\n\
  \n> **提示**  \n> 如果你订阅了 LinkedIn Learning 或 [Lynda.​com](http://lynda.com)，你可以通过我的\
  \ *PHP: Exporting Data to Files* 课程学习如何将数据从数据库导出为各种格式，例如 Microsoft Excel 和 Word。\n\
  \n## 单次操作读取文件\n\nPHP 有三个函数可以单次操作读取文本文件的内容：\n\n* `readfile()` 打开一个文件并直接输出其内容。\n*\
  \ `file_get_contents()` 将文件的全部内容读入一个字符串，但不会直接生成输出。\n* `file()` 将每一行读入一个数组。\n\n###\
  \ PHP 解决方案 7-1：获取文本文件的内容\n\n此 PHP 解决方案演示了使用 `readfile()`、`file_get_contents()` 和\
  \ `file()` 访问文件内容的区别。\n\n1. 将 `sonnet.txt` 复制到你的 `private` 文件夹。该文本文件包含莎士比亚的第 116\
  \ 首十四行诗。\n\n2. 在你的 phpsols `-4e` 站点根目录中创建一个名为 `filesystem` 的新文件夹，然后在新文件夹中创建一个名为\
  \ `get_contents.php` 的 PHP 文件。在 PHP 代码块中插入以下代码（`ch07` 文件夹中的 `get_contents_01.php`\
  \ 显示了嵌入在网页中的代码，但你仅可使用 PHP 代码进行测试）：\n\n   ```\n   readfile('C:/private/sonnet.txt');\n\
  \   ```\n\n   如果你使用的是 Mac，请像这样修改路径名，替换为你自己的 Mac 用户名：\n\n   ```\n   readfile('/Users/username/private/sonnet.txt');\n\
  \   ```\n\n   如果你在 Linux 或远程服务器上测试，请相应修改路径名。\n\n> **注意**  \n> 为简洁起见，本章剩余示例仅显示 Windows\
  \ 路径名。\n\n3. 保存 `get_contents.php` 并在浏览器中查看。你应该会看到类似以下截图的内容。浏览器会忽略原始文本中的换行符，并将莎士比亚的十四行诗显示为一个实心文本块。\n\
  \n   ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figb_HTML.jpg](img/332054_4_En_7_Figb_HTML.jpg)\n\
  \n> **提示**  \n> 如果你看到错误消息，请检查代码输入是否正确，以及在 Mac 或 Linux 上是否已设置正确的文件和文件夹权限。\n\n4. PHP\
  \ 有一个名为 `nl2br()` 的函数，它可以将换行符转换为 `<br/>` 标签（末尾的斜杠是为了与 XHTML 兼容，并且在 HTML5 中有效）。像这样更改\
  \ `get_contents.php` 中的代码（代码在 `get_contents_02.php` 中）：\n\n   ```\n   nl2br(readfile('C:/private/sonnet.txt'));\n\
  \   ```\n\n5. 保存 `get_contents.php` 并在浏览器中重新加载。输出仍然是一个实心文本块。当你像这样将一个函数作为参数传递给另一个函数时，内部函数的结果通常会传递给外部函数，从而在单个表达式中执行两个操作。因此，你可能会期望文件内容在显示到浏览器之前被传递给\
  \ `nl2br()`。然而，`readfile()` 会立即输出文件内容。当它执行完毕时，已经没有内容可供 `nl2br()` 插入 `<br/>` 标签了。文本已经输出到了浏览器中。\n\
  \n> **注意**  \n> 当两个函数像这样嵌套时，内部函数先执行，外部函数处理其结果。但内部函数的返回值需要作为参数对外部函数有意义。`readfile()`\
  \ 的返回值是从文件中读取的字节数。即使你在行首添加 `echo`，也只能在文本末尾看到 594 这个数字。在这种情况下，函数嵌套不起作用，但这通常是一个非常实用的技术，可以避免在将内部函数的结果传递给另一个函数处理之前将其存储在变量中。\n\
  \n6. 你需要使用 `file_get_contents()` 来将换行符转换为 `<br/>` 标签，而不是 `readfile()`。`readfile()`\
  \ 只是输出文件内容，而 `file_get_contents()` 则将文件内容作为一个字符串返回。由你来决定如何处理它。像这样修改代码（或使用 `get_contents_03.php`）：\n\
  \n   ```\n   echo nl2br(file_get_contents('C:/private/sonnet.txt'));\n   ```\n\n\
  7. 在浏览器中重新加载页面。现在，十四行诗的每一行都单独成行。\n\n   ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figc_HTML.jpg](img/332054_4_En_7_Figc_HTML.jpg)\n\
  \n8. `file_get_contents()` 的优点在于，你可以将文件内容赋值给一个变量，并以某种方式处理它，然后再决定如何处理。像这样更改 `get_contents.php`\
  \ 中的代码（或使用 `get_contents_04.php`）并将页面加载到浏览器中：\n\n   ```\n   $sonnet = file_get_contents('C:/private/sonnet.txt');\n\
  \   // 将换行符替换为空格\n   $words = str_replace(\"\\r\\n\", ' ', $sonnet);\n   // 拆分为单词数组\n\
  \   $words = explode(' ', $words);\n   // 提取前九个数组元素\n   $first_line = array_slice($words,\
  \ 0, 9);\n   // 连接前九个元素并显示\n   echo implode(' ', $first_line);\n   ```\n\n   这将\
  \ `sonnet.txt` 的内容存储在一个名为 `$sonnet` 的变量中，该变量被传递给 `str_replace()`，后者随后将回车符和换行符替换为一个空格，并将结果存储为\
  \ `$words`。\n\n> **注意**  \n> 有关 `\"\\r\\n\"` 的说明，请参见第 4 章的“在双引号内使用转义序列”。该文本文件是在\
  \ Windows 中创建的，因此换行符由回车符和换行符表示。在 macOS 和 Linux 上创建的文件仅使用换行符（`\"\\n\"`）。\n\n\n\n\
  `$words`被传递给`explode()`函数。这个听起来很吓人的名称实际上是把一个字符串“炸开”并转换成数组，使用第一个参数来确定在哪里分割字符串。这里使用空格，因此文本文件的内容被分割成一个单词数组。\n\
  \n单词数组随后被传递给`array_slice()`函数，它从数组中提取从第二个参数指定位置开始的切片。第三个参数指定切片的长度。PHP 从 0 开始计数数组，因此这提取了前九个单词。\n\
  \n最后，`implode()`执行与`explode()`相反的操作，将数组元素连接起来，并在每个元素之间插入第一个参数。结果由`echo`显示，产生如下输出：\n\
  \n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figd_HTML.jpg](img/332054_4_En_7_Figd_HTML.jpg)\n\
  \n脚本现在不显示文件的全部内容，而只显示第一行。完整的字符串仍然存储在`$sonnet`中。\n\n1.  然而，如果你想逐行处理每一行，使用`file()`会更简单，它会将文件的每一行读入一个数组。要显示`sonnet.txt`的第一行，前面的代码可以简化为这样（参见`get_contents_05.php`）：\n\
  \n    ```\n    $sonnet = file('C:/private/sonnet.txt');\n    echo $sonnet[0];\n\
  \    ```\n\n2.  实际上，如果你不需要完整的数组，可以通过一种称为数组解引用的技术直接访问单行，即在函数调用后的方括号中添加其索引号。以下代码显示该十四行诗的第\
  \ 11 行（参见`get_contents_06.php`）：\n\n    ```\n    echo file('C:/private/sonnet.txt')[10];\n\
  \    ```\n\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Fige_HTML.jpg](img/332054_4_En_7_Fige_HTML.jpg)\n\
  \n在我们刚刚探索的三个函数中，`readfile()`可能是最没用的。它只是读取文件的内容并直接将其转储到输出中。你无法操作文件内容或从中提取信息。然而，`readfile()`的一个实际用途是强制下载文件，正如你将在本章后面看到的那样。\n\
  \n另外两个函数`file_get_contents()`和`file()`更有用，因为你可以将内容捕获到一个变量中，以便进行重新格式化或提取信息。唯一的区别在于`file_get_contents()`将内容读入单个字符串，而`file()`生成一个数组，其中每个元素对应文件中的一行。\n\
  \n提示\n`file()`函数会在每个数组元素的末尾保留换行符。如果要去除换行符，请将常量`FILE_IGNORE_NEW_LINES`作为第二个参数传递给该函数。你也可以使用`FILE_SKIP_EMPTY_LINES`作为第二个参数来跳过空行。要同时去除换行符并跳过空行，请用竖线分隔这两个常量，像这样：`FILE_IGNORE_NEW_LINES\
  \ | FILE_SKIP_EMPTY_LINES`。\n\n尽管我们只使用本地文本文件测试了`file_get_contents()`和`file()`，但它们也可以从其他域名的公共文件中检索内容。这使得它们在访问其他网页上的信息时非常有用，尽管提取信息通常需要对字符串函数以及文档对象模型（DOM）所描述的文档逻辑结构有扎实的理解（参见[`www.w3.org/TR/WD-DOM/introduction.html`](http://www.w3.org/TR/WD-DOM/introduction.html)）。`file_get_contents()`和`file()`的缺点是它们会将整个文件读入内存。对于非常大的文件，最好使用一次只处理文件一部分的函数。我们接下来将探讨这些函数。\n\
  \n## 打开和关闭文件以进行读/写操作\n\n我们到目前为止研究的函数都是在一次调用中完成所有操作。然而，PHP 也有一组允许你打开文件、读取和/或写入文件，然后关闭文件的函数。该文件可以是本地文件系统中的文件，也可以是不同域名上的公共文件。\n\
  \n以下是用于此类操作的最重要的函数：\n\n*   `fopen()`：打开一个文件\n*   `fgets()`：读取文件内容，通常一次一行\n*   `fgetcsv()`：从\
  \ CSV 文件中获取当前行并将其转换为数组\n*   `fread()`：读取指定数量的文件内容\n*   `fwrite()`：写入文件\n*   `feof()`：确定是否已到达文件末尾\n\
  *   `rewind()`：将内部指针移回文件开头\n*   `fseek()`：将内部指针移动到文件中的特定位置\n*   `fclose()`：关闭一个文件\n\
  \n这些函数中的第一个`fopen()`提供了令人眼花缭乱的选择选项，用于指定文件打开后如何使用：`fopen()`有一种只读模式，四种只写模式，和五种读/写模式。之所以有这么多选项，是因为它们让你能够控制是覆盖现有内容还是追加新内容。其他时候，你可能希望\
  \ PHP 在文件不存在时创建它。每种模式都决定了在打开文件时内部指针的放置位置。它就像文字处理器中的光标：当调用`fread()`或`fwrite()`时，PHP\
  \ 从指针当前所在的位置开始读取或写入。\n\n表 7-2 引导你了解所有选项。\n\n### 表 7-2. 与`fopen()`一起使用的读/写模式\n\n\
  | 类型 | 模式 | 描述 |\n| :--- | :--- | :--- |\n| **只读** | `r` | 内部指针初始放置在文件开头。 |\n| **只写**\
  \ | `w` | 写入前删除现有数据。如果文件不存在则创建。 |\n| | `a` | 追加模式。新数据添加到末尾。如果文件不存在则创建。 |\n| | `c`\
  \ | 保留现有内容，但内部指针放置在文件开头。如果文件不存在则创建。 |\n| | `x` | 仅在文件不存在时创建。如果已存在同名文件则失败。 |\n| **读/写**\
  \ | `r+` | 读/写操作可以按任意顺序进行，并从内部指针当时所在的位置开始。指针初始放置在文件开头。文件必须已存在才能使操作成功。 |\n| | `w+`\
  \ | 删除现有数据。写入后可以读回数据。如果文件不存在则创建。 |\n| | `a+` | 打开文件准备在文件末尾添加新数据。移动内部指针后也允许读回数据。如果文件不存在则创建。\
  \ |\n| | `c+` | 保留现有内容，内部指针放置在文件开头。如果文件不存在则创建。 |\n| | `x+` | 创建一个新文件，但如果同名文件已存在则失败。写入后可以读回数据。\
  \ |\n\n选择了错误的模式，你可能会删除有价值的数据。你还需要注意内部指针的位置。如果指针位于文件末尾，而你又尝试读取内容，最终将一无所获。另一方面，如果指针位于文件开头，并且你开始写入，你将覆盖等量的现有数据。本章后面的“移动内部指针”会更详细地解释这一点。\n\
  \n使用`fopen()`时，需要向其传递以下两个参数：\n\n*   要打开文件的路径，如果文件在不同域名上则为 URL\n*   包含表 7-2 中列出的一个模式的字符串\n\
  \n\n\n`fopen()` 函数返回一个指向已打开文件的引用，之后可以将其用于其他读取/写入函数。以下是如何以读取模式打开文本文件：\n\n```\n$file\
  \ = fopen('C:/private/sonnet.txt', 'r');\n```\n\n此后，你可以将 `$file` 作为参数传递给其他函数，例如\
  \ `fgets()` 和 `fclose()`。通过一些实际演示，情况会变得更清晰。与其自己构建文件，使用 `ch07` 文件夹中的文件可能更容易。我将快速介绍每种模式。\n\
  \n注意：Mac 和 Linux 用户需要调整示例文件中 `private` 文件夹的路径，以匹配其设置。\n\n## 使用 `fopen()` 读取文件\n\n\
  文件 `fopen_read.php` 包含以下代码：\n\n```\n// store the pathname of the file\n$filename\
  \ = 'C:/private/sonnet.txt';\n// open the file in read-only mode\n$file = fopen($filename,\
  \ 'r');\n// read the file and store its contents\n$contents = fread($file, filesize($filename));\n\
  // close the file\nfclose($file);\n// display the contents with <br> tags\necho\
  \ nl2br($contents);\n```\n\n如果将其加载到浏览器中，你应该会看到以下输出：\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figf_HTML.jpg](img/332054_4_En_7_Figf_HTML.jpg)\n\
  \n结果与在 `get_contents_03.php` 中使用 `file_get_contents()` 相同。与 `file_get_contents()`\
  \ 不同，`fread()` 函数需要知道要读取文件的多少内容。你需要提供第二个参数，指定字节数。如果你只想要一个非常大的文件的前 100 个左右字符，这会很有用。但是，如果你想要整个文件，则需要将文件的路径名传递给\
  \ `filesize()` 以获取正确的数值。\n\n使用 `fopen()` 读取文件内容的另一种方法是使用 `fgets()`，它一次检索一行。这意味着你需要结合\
  \ `feof()` 使用 `while` 循环来一直读到文件末尾。`fopen_readloop.php` 中的代码如下：\n\n```\n$filename\
  \ = 'C:/private/sonnet.txt';\n// open the file in read-only mode\n$file = fopen($filename,\
  \ 'r');\n// create variable to store the contents\n$contents = \"\";\n// loop through\
  \ each line until end of file\nwhile (!feof($file)) {\n// retrieve next line, and\
  \ add to $contents\n$contents .= fgets($file);\n}\n// close the file\nfclose($file);\n\
  // display the contents\necho nl2br($contents);\n```\n\n`while` 循环使用 `fgets()` 逐一检索文件内容——`!feof($file)`\
  \ 等同于说“直到 `$file` 的末尾”——并将其存储在 `$contents` 中。使用 `fgets()` 与使用 `file()` 函数非常相似，因为它也是一次处理一行。不同之处在于，一旦找到所需信息，你可以使用\
  \ `fgets()` 跳出循环。如果你处理一个非常大的文件，这是一个显著的优势。`file()` 函数会将整个文件加载到一个数组中，这会消耗内存。\n\n##\
  \ PHP 解决方案 7-2：从 CSV 文件中提取数据\n\n文本文件可以用作平面文件数据库，其中每条记录存储在一行中，字段之间用逗号、制表符或其他分隔符分隔。这种类型的文件称为\
  \ **CSV 文件**。通常，CSV 代表逗号分隔值，但当使用制表符或其他分隔符时，它也可以表示字符分隔值。此 PHP 解决方案演示了如何使用 `fopen()`\
  \ 和 `fgetcsv()` 将 CSV 文件中的值提取到多维关联数组中。\n\n1.  将 `weather.csv` 从 `ch07` 文件夹复制到你的\
  \ `private` 文件夹。该文件包含以下逗号分隔值数据：\n\n```\n    city,temp\n    London,11\n    Paris,10\n\
  \    Rome,12\n    Berlin,8\n    Athens,19\n```\n\n第一行由文件其余数据的标题组成。有五行为数据，每行包含一个城市名称和温度。\n\
  \n注意：当数据存储为逗号分隔值时，逗号后不应有空格。如果添加空格，则它被视为数据字段的第一个字符。CSV 文件中的每一行必须具有相同数量的项目。\n\n2.\
  \  在 `filesystem` 文件夹中创建一个名为 `getcsv.php` 的文件，并使用 `fopen()` 以读取模式打开 `users.csv`：\n\
  \n```\n    $file = fopen('C:/private/weather.csv', 'r');\n```\n\n3.  使用 `fgetcsv()`\
  \ 将文件的第一行提取为数组，然后将其分配给一个名为 `$titles` 的变量：\n\n```\n    $titles = fgetcsv($file);\n\
  ```\n\n这将创建 `$titles` 作为一个包含第一行值（city 和 temp）的数组。\n\n`fgetcsv()` 函数需要一个参数，即你已打开文件的引用。它还可以接受最多四个可选参数：\n\
  -   行的最大长度：默认值为 0，表示无限制。\n-   字段之间的分隔符：默认为逗号。\n-   包围字符：如果字段包含作为数据一部分的分隔符，则必须用引号括起来。双引号是默认值。\n\
  -   转义字符：默认为反斜杠。\n\n我们使用的 CSV 文件不需要设置任何可选参数。\n\n4.  在下一行，初始化一个空数组，用于存放将从 CSV 数据中提取的值：\n\
  \n```\n    $cities = [];\n```\n\n5.  从一行提取值之后，`fgetcsv()` 会移动到下一行。要获取文件中的剩余数据，你需要创建一个循环。添加以下代码：\n\
  \n```\n    while (!feof($file)) {\n    $data = fgetcsv($file);\n    if (empty($data))\
  \ {\n        continue;\n    }\n    $cities[] = array_combine($titles, $data);\n\
  \    }\n```\n\n循环内的代码将 CSV 文件的当前行作为数组分配给 `$data`，然后使用 `array_combine()` 函数生成一个关联数组，并将其添加到\
  \ `$cities` 数组中。此函数需要两个参数，这两个参数必须是具有相同数量元素的数组。这两个数组被合并，结果关联数组的键来自第一个参数，值来自第二个参数。\n\
  \n6.  关闭 CSV 文件：\n\n```\n    fclose($file);\n```\n\n7.  要检查结果，请使用 `print_r()`。用\
  \ `<pre>` 标签将其包围，以使输出更易于阅读：\n\n```\n    echo '<pre>';\n    print_r($cities);\n \
  \   echo '</pre>';\n```\n\n8.  保存 `getcsv.php` 并在浏览器中加载。你应该会看到如图 7-1 所示的结果。\n\n\
  ![../images/332054_4_En_7_Chapter/332054_4_En_7_Fig1_HTML.jpg](img/332054_4_En_7_Fig1_HTML.jpg)\n\
  \n**图 7-1.** CSV 数据已被转换为多维关联数组\n\n9.  这对于 `weather.csv` 来说效果很好，但脚本可以更健壮。如果 `fgetcsv()`\
  \ 遇到空行，它会返回一个包含单个 `null` 元素的数组，当将其作为参数传递给 `array_combine()` 时，这会产生错误。通过添加以粗体突出显示的条件语句来修改\
  \ `while` 循环：\n\n```\n    while (!feof($file)) {\n    $data = fgetcsv($file);\n\
  \    if (empty($data)) {\n        continue;\n    }\n    $cities[] = array_combine($titles,\
  \ $data);\n    }\n```\n\n条件语句使用 `empty()` 函数，如果变量不存在或等于 `false`，则返回 true。如果存在空行，`continue`\
  \ 关键字会返回到循环顶部，而不执行下一行。\n\n你可以对照 `ch07` 文件夹中的 `getcsv.php` 检查你的代码。\n\n## 在 macOS\
  \ 上创建的 CSV 文件\n\nPHP 通常难以检测在 Mac 操作系统上创建的 CSV 文件中的行尾。如果 `fgetcsv()` 无法从 CSV 文件中正确提取数据，请在脚本顶部添加以下代码行：\n\
  \n```\nini_set('auto_detect_line_endings', true);\n```\n\n\n\n这对性能影响微乎其微，因此仅当 Mac\
  \ 换行符导致 CSV 文件出现问题时才应使用。\n\n## 使用 `fopen()` 替换内容\n\n第一种只写模式 (`w`) 会删除文件中的任何现有内容，因此适用于需要频繁更新的文件。你可以通过\
  \ `fopen_write.php` 测试 `w` 模式，该文件在 `DOCTYPE` 声明上方包含以下 PHP 代码：\n\n```\n当页面中的表单提交时，此代码会将\
  \ `$_POST['contents']` 的值写入一个名为 `write.txt` 的文件中。`fwrite()` 函数接受两个参数：文件引用以及你想写入文件的内容。\n\
  \n注意\n你可能会遇到 `fputs()` 而不是 `fwrite()`。这两个函数是相同的：`fputs()` 是 `fwrite()` 的同义词。\n\n\
  如果你在浏览器中加载 `fopen_write.php`，在文本区域中输入一些内容，然后点击“写入文件”，PHP 会创建 `write.txt` 并将你在文本区域中输入的内容插入其中。由于这只是一个演示，我省略了任何确保文件成功写入的检查。打开\
  \ `write.txt` 验证你的文本是否已插入。现在，在文本区域中输入不同的内容并再次提交表单。原始内容会从 `write.txt` 中被删除，并替换为新文本。被删除的文本将永久丢失。\n\
  ```\n\n## 使用 `fopen()` 追加内容\n\n追加模式不仅会在文件末尾添加新内容，同时保留现有内容，还可以在文件不存在时创建一个新文件。`fopen_append.php`\
  \ 中的代码如下所示：\n\n```\n// 以追加模式打开文件\n$file = fopen('C:/private/append.txt', 'a');\n\
  // 写入内容后跟一个新行\nfwrite($file, $_POST['contents'] . PHP_EOL);\n// 关闭文件\nfclose($file);\n\
  ```\n\n请注意，我在 `$_POST['contents']` 之后连接了 `PHP_EOL`。这是一个 PHP 常量，它使用适合操作系统的正确字符来表示新行。在\
  \ Windows 上，它会插入一个回车符和换行符，但在 Mac 和 Linux 上只插入一个换行符。如果你在浏览器中加载 `fopen_append.php`，输入一些文本并提交表单，它会在\
  \ private 文件夹中创建一个名为 `append.txt` 的文件并插入你的文本。输入其他内容并再次提交表单；新文本应添加到先前文本的末尾，如下面的截图所示。\n\
  ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figg_HTML.jpg](img/332054_4_En_7_Figg_HTML.jpg)\n\
  我们将在第 11 章中回到追加模式。\n\n## 写入前锁定文件\n\n将 `fopen()` 与 `c` 模式一起使用的目的是让你有机会在修改文件之前使用 `flock()`\
  \ 锁定它。\n\n`flock()` 函数接受两个参数：文件引用和一个指定锁定操作方式的常量。有三种操作类型：\n\n*   `LOCK_SH` 获取用于读取的共享锁。\n\
  *   `LOCK_EX` 获取用于写入的独占锁。\n*   `LOCK_UN` 释放锁。\n\n要在写入之前锁定文件，请以 `c` 模式打开文件并立即调用 `flock()`，如下所示：\n\
  \n```\n// 以 c 模式打开文件\n$file = fopen('C:/private/lock.txt', 'c');\n// 获取独占锁\nflock($file,\
  \ LOCK_EX);\n```\n\n这会打开文件（如果文件不存在则创建它），并将内部指针置于文件开头。这意味着你需要将指针移动到文件末尾或删除现有内容，然后才能开始使用\
  \ `fwrite()` 写入。\n\n要移动指针到文件末尾，请使用 `fseek()` 函数，如下所示：\n\n```\n// 移动到文件末尾\nfseek($file,\
  \ 0, SEEK_END);\n```\n\n或者，通过调用 `ftruncate()` 删除现有内容：\n\n```\n// 删除现有内容\nftruncate($file,\
  \ 0);\n```\n\n完成文件写入后，你必须在调用 `fclose()` 之前手动解锁文件：\n\n```\n// 关闭前解锁文件\nflock($file,\
  \ LOCK_UN);\nfclose($file);\n```\n\n\n\n#### 注意\n\n如果在关闭文件前忘记解锁，即使你自己能再次打开，该文件对其他用户和进程仍将保持锁定状态。\n\
  \n## 防止覆盖现有文件\n\n与其他写入模式不同，`x` 模式不会打开现有文件，只会创建可供写入的新文件。如果同名文件已存在，`fopen()` 将返回 `false`，从而防止文件被覆盖。`fopen_exclusive.php`\
  \ 中的处理代码如下：\n\n```\n// 仅当文件不存在时才创建可供写入的文件\n// 错误控制运算符用于防止显示错误信息\nif ($file = @ fopen('C:/private/once_only.txt',\
  \ 'x')) {\n    // 写入内容\n    fwrite($file, $_POST['contents']);\n    // 关闭文件\n  \
  \  fclose($file);\n} else {\n    $error = '文件已存在，无法被覆盖。';\n}\n```\n\n尝试以 `x` 模式写入已有文件会生成一系列\
  \ PHP 错误信息。将写入和关闭操作包裹在条件语句中可以处理大部分错误，但 `fopen()` 仍会触发警告。在 `fopen()` 前添加错误控制运算符（`@`）可抑制该警告。\n\
  \n在浏览器中加载 `fopen_exclusive.php`，输入一些文本，然后点击“写入文件”。内容将被写入目标文件夹中的 `once_only.txt`。如果再次尝试，表单上方会显示存储在\
  \ `$error` 中的提示信息。\n\n## 使用 `fopen()` 进行组合读写操作\n\n在上述任一模式后添加加号（`+`），即可同时打开文件进行读取和写入。在文件关闭前，你可以按任意顺序执行任意数量的读取或写入操作。组合模式的区别如下：\n\
  \n- `r+`：文件必须已存在，不会自动创建新文件。内部指针置于开头，准备读取现有内容。\n- `w+`：删除现有内容，因此首次打开文件时无内容可读。\n-\
  \ `a+`：文件打开时内部指针位于末尾，准备追加新内容，因此读取前需将指针移回。\n- `c+`：文件打开时内部指针位于开头。\n- `x+`：始终创建新文件，因此首次打开时无内容可读。\n\
  \n读取操作使用 `fread()` 或 `fgets()`，写入操作使用 `fwrite()`，用法与之前完全相同。关键在于理解内部指针的位置。\n\n##\
  \ 移动内部指针\n\n读写操作始终从内部指针当前位置开始，因此通常期望读操作时指针位于文件开头，写操作时位于文件末尾。\n\n要将指针移至开头，可按如下方式将文件引用传递给\
  \ `rewind()`：\n\n```\nrewind($file);\n```\n\n要将指针移至文件末尾，可使用 `fseek()`，示例如下：\n\n\
  ```\nfseek($file, 0, SEEK_END);\n```\n\n你还可以使用 `fseek()` 将内部指针移至指定位置，或相对于当前位置进行移动。详情请参阅\
  \ [`https://secure.php.net/manual/en/function.fseek.php`](https://secure.php.net/manual/en/function.fseek.php)。\n\
  \n## 小贴士\n\n在追加模式（`a` 或 `a+`）下，无论指针当前位置如何，内容始终写入文件末尾。\n\n## 探索文件系统\n\nPHP 的文件系统函数还可以打开目录（文件夹）并检查其内容。从\
  \ Web 开发者的角度来看，文件系统函数的实际用途包括构建显示文件夹内容的下拉菜单，以及创建提示用户下载文件（如图像或 PDF 文档）的脚本。\n\n## 使用\
  \ `scandir()` 检查文件夹\n\n`scandir()` 函数返回一个数组，包含指定文件夹中的文件和子文件夹。只需将文件夹（目录）的路径作为字符串传递给\
  \ `scandir()`，并将结果存储到变量中，示例如下：\n\n```\n$files = scandir('../images');\n```\n\n\n\
  \n你可以通过 `print_r()` 显示数组的内容来检查结果，如下面的截图所示（代码位于 `ch07` 文件夹的 `scandir.php` 文件中）：\n\
  ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figh_HTML.jpg](img/332054_4_En_7_Figh_HTML.jpg)\n\
  \n`scandir()` 返回的数组中并非只包含文件。前两个条目被称为点文件，分别代表当前文件夹和父文件夹。最后一个条目是一个名为 `thumbs` 的文件夹。该数组只包含每个条目的名称。如果你想要获取文件夹内容的更多信息，最好使用\
  \ `FilesystemIterator` 类。\n\n## 使用 `FilesystemIterator` 检查文件夹内容\n\n`FilesystemIterator`\
  \ 类允许你遍历目录或文件夹的内容。它是标准 PHP 库（SPL）的一部分，而 SPL 是 PHP 的核心组成部分。SPL 的主要特性之一是一系列专门的迭代器，可以用极少的代码创建复杂的循环。\n\
  \n由于它是一个类，你可以使用 `new` 关键字实例化一个 `FilesystemIterator` 对象，并将你想要检查的文件夹路径传递给构造函数，如下所示：\n\
  \n```\n$files = new FilesystemIterator('../images');\n```\n\n与 `scandir()` 不同，它不会返回一个文件名数组，因此你不能使用\
  \ `print_r()` 来显示其内容。相反，它会创建一个对象，让你可以访问文件夹内的所有内容。要显示文件名，可以使用 `foreach` 循环，如下所示（代码位于\
  \ `ch07` 文件夹的 `iterator_01.php` 文件中）：\n\n```\n$files = new FilesystemIterator('../images');\n\
  foreach ($files as $file) {\necho $file . '';\n}\n```\n\n这将产生以下结果：\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figi_HTML.jpg](img/332054_4_En_7_Figi_HTML.jpg)\n\
  \n关于这个输出，可以观察到以下几点：\n\n*   代表当前文件夹和父文件夹的点文件被省略了。\n*   显示的值是文件的相对路径，而不仅仅是文件名。\n*\
  \   由于截图是在 Windows 系统上进行的，相对路径中使用了反斜杠。\n\n在大多数情况下，反斜杠并不重要，因为 PHP 在 Windows 路径中既接受正斜杠也接受反斜杠。但是，如果你希望从\
  \ `FilesystemIterator` 的输出中生成 URL，可以选择使用 Unix 风格的路径。设置该选项的一种方法是将一个常量作为第二个参数传递给 `FilesystemIterator()`，如下所示（参见\
  \ `iterator_02.php`）：\n\n```\n$files = new FilesystemIterator('../images', FilesystemIterator::UNIX_PATHS);\n\
  ```\n\n或者，你也可以在 `FilesystemIterator` 对象上调用 `setFlags()` 方法，如下所示（参见 `iterator_03.php`）：\n\
  \n```\n$files = new FilesystemIterator('../images');\n$files->setFlags(FilesystemIterator::UNIX_PATHS);\n\
  ```\n\n两种方法都会产生如下截图所示的输出。\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figj_HTML.jpg](img/332054_4_En_7_Figj_HTML.jpg)\n\
  当然，这在 macOS 或 Linux 上不会有任何区别，但设置此选项能让你的代码更具可移植性。\n\n**提示**\nSPL 类使用的常量都是类常量。它们总是以类名和作用域解析操作符（两个冒号）作为前缀。像这样冗长的名称使得使用带有\
  \ PHP 代码提示和代码补全功能的编辑程序非常值得。\n\n尽管能够显示文件夹内容的相对路径很有用，但使用 `FilesystemIterator` 类的真正价值在于，每次循环运行时，它都会为你提供一个\
  \ `SplFileInfo` 对象。`SplFileInfo` 类有近 30 个方法，可以用来提取关于文件和文件夹的有用信息。表 7-3 列出了一些最实用的\
  \ `SplFileInfo` 方法。\n\n**表 7-3.** 通过 `SplFileInfo` 方法可访问的文件信息\n\n| 方法 | 返回值 |\n\
  | --- | --- |\n| `getFilename()` | 文件的名称 |\n| `getPath()` | 当前对象的相对路径（不含文件名），如果当前对象是文件夹，则不含文件夹名\
  \ |\n| `getPathName()` | 当前对象的相对路径，根据当前类型包含文件名或文件夹名 |\n| `getRealPath()` | 当前对象的完整路径，如果适用则包含文件名\
  \ |\n| `getSize()` | 文件或文件夹的大小（以字节为单位） |\n| `isDir()` | 如果当前对象是文件夹（目录），则返回 True\
  \ |\n| `isFile()` | 如果当前对象是文件，则返回 True |\n| `isReadable()` | 如果当前对象可读，则返回 True |\n\
  | `isWritable()` | 如果当前对象可写，则返回 True |\n\n要访问子文件夹的内容，请使用 `RecursiveDirectoryIterator`\
  \ 类。它会向下深入文件夹结构的每一层，但你需要将其与名字奇特的 `RecursiveIteratorIterator` 结合使用，如下所示（代码位于 `iterator_04.php`）：\n\
  \n```\n$files = new RecursiveDirectoryIterator('../images');\n$files->setFlags(RecursiveDirectoryIterator::SKIP_DOTS);\n\
  $files = new RecursiveIteratorIterator($files);\nforeach ($files as $file) {\necho\
  \ $file->getRealPath() . '';\n}\n```\n\n**注意**\n默认情况下，`RecursiveDirectoryIterator`\
  \ 会包含代表当前文件夹和父文件夹的点文件。要排除它们，你需要将类的 `SKIP_DOTS` 常量作为第二个参数传递给构造函数，或者使用 `setFlags()`\
  \ 方法。\n\n如下面的截图所示，`RecursiveDirectoryIterator` 会检查所有子文件夹的内容，在一次操作中就揭示了 `thumbs`\
  \ 文件夹的内容：\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figk_HTML.jpg](img/332054_4_En_7_Figk_HTML.jpg)\n\
  \n如果你只想查找特定类型的文件呢？接下来看另一个迭代器……\n\n## 使用 `RegexIterator` 限制文件类型\n\n`RegexIterator`\
  \ 作为另一个迭代器的包装器，使用正则表达式作为搜索模式来过滤其内容。假设你想在 `ch07` 文件夹中查找文本文件和 CSV 文件。用于搜索 `.txt` 和\
  \ `.csv` 文件扩展名的正则表达式如下所示：\n\n```\n'/\\.(?:txt|csv)$/i'\n```\n\n这个正则表达式以不区分大小写的方式匹配这两种文件扩展名。`iterator_05.php`\
  \ 中的代码如下所示：\n\n```\n$files = new FilesystemIterator('.');\n$files = new RegexIterator($files,\
  \ '/\\.(?:txt|csv)$/i');\nforeach ($files as $file) {\necho $file->getFilename()\
  \ . '';\n}\n```\n\n传递给 `FilesystemIterator` 构造函数的点号表示检查当前文件夹。原始的 `$files` 对象作为第一个参数传递给\
  \ `RegexIterator` 构造函数，正则表达式作为第二个参数，过滤后的结果集重新赋值给 `$files`。在 `foreach` 循环内部，`getFilename()`\
  \ 方法检索文件名。结果如下：\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figl_HTML.jpg](img/332054_4_En_7_Figl_HTML.jpg)\n\
  现在只列出了文本文件和 CSV 文件。所有的 PHP 文件都被忽略了。\n\n我猜想，到了这个阶段，你可能在想这能否用于实际用途。让我们来构建一个文件夹中图片的下拉菜单。\n\
  \n## PHP 解决方案 7-3：构建文件下拉菜单\n\n当处理数据库时，你经常需要某个特定文件夹中的图片或其他文件列表。例如，你可能想将一张照片与一个产品详情页面关联。虽然你可以将图片名称手动输入到文本字段中，但你需要确保图片确实存在，并且拼写正确。让\
  \ PHP 自动构建一个下拉菜单来完成这项繁重的工作。它始终保持最新，并且没有拼错名称的风险。\n\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Fig2_HTML.jpg](img/332054_4_En_7_Fig2_HTML.jpg)\n\
  \n**图 7-2.** PHP 让在特定文件夹中创建图片下拉菜单变得轻而易举\n\n\n\n1.  在 `filesystem` 文件夹中创建一个名为 `imagelist.php`\
  \ 的 PHP 页面。或者，使用 `ch07` 文件夹中的 `imagelist_01.php`。\n\n2.  在 `imagelist.php` 内创建一个表单，并插入一个仅包含一个\
  \ `<option>` 元素的 `<select>` 元素，如下所示（代码已在 `imagelist_01.php` 中）：\n\n```\n<select\
  \ name=\"pix\">\n    <option value=\"\">选择一个图片</option>\n</select>\n```\n\n这个 `<option>`\
  \ 是下拉菜单中唯一的静态元素。\n\n3.  像这样修改表单中的 `<select>` 元素：\n\n```\n<select name=\"pix\">\n\
  \    <option value=\"\">选择一个图片</option>\n    <?php\n    foreach ($files as $file)\
  \ {\n        ?>\n        <option value=\"<?php echo $file->getFilename(); ?>\"><?php\
  \ echo $file->getFilename(); ?></option>\n        <?php\n    }\n    ?>\n</select>\n\
  ```\n\n确保 `images` 文件夹的路径与您网站的文件夹结构相符。作为 `RegexIterator` 构造函数的第二个参数的正则表达式，不区分大小写地匹配具有\
  \ `.jpg`、`.png`、`.gif` 和 `.webp` 扩展名的文件。\n\n`foreach` 循环简单地获取当前图片的文件名，并将其插入到 `<option>`\
  \ 元素中。\n\n保存 `imagelist.php` 并在浏览器中加载它。您应该会看到一个下拉菜单，列出了 `images` 文件夹中的所有图片，如图 7-2\
  \ 所示。\n\n当集成到在线表单中时，所选图片的文件名会出现在 `$_POST` 数组中，并由 `<select>` 元素的 `name` 属性标识——在本例中是\
  \ `$_POST['pix']`。仅此而已！您可以将您的代码与 `ch07` 文件夹中的 `imagelist_02.php` 进行比较。\n\n## PHP\
  \ 解决方案 7-4：创建通用文件选择器\n\n前面的 PHP 解决方案依赖于对正则表达式的理解。使其适用于其他文件扩展名并不困难，但您需要小心，不要意外删除一个关键字符。除非正则表达式是您的专长，否则更简单的方法可能是将代码封装到一个函数中，该函数可用于检查特定文件夹并创建特定类型文件名的数组。例如，您可能想要创建一个\
  \ PDF 文档文件名的数组，或者一个包含 PDF 和 Word 文档的数组。以下是操作方法。\n\n1.  在 `filesystem` 文件夹中创建一个名为\
  \ `buildlist.php` 的新文件。该文件将仅包含 PHP 代码，因此请删除编辑程序插入的任何 HTML。\n\n2.  将以下代码添加到该文件中：\n\
  \n```\nfunction buildFileList($dir, $extensions) {\n    if (!is_dir($dir) && !is_readable($dir))\
  \ {\n        return false;\n    } else {\n        if (is_array($extensions)) {\n\
  \            $extensions = implode('|', $extensions);\n        }\n    }\n}\n```\n\
  \n这定义了一个名为 `buildFileList()` 的函数，它接受两个参数：\n\n*   `$dir`：要获取文件名列表的文件夹路径。\n*   `$extensions`：可以是包含单个文件扩展名的字符串，也可以是文件扩展名的数组。为保持代码简洁，文件扩展名不应包含前导句点。\n\
  \n函数首先检查 `$dir` 是否是一个文件夹并且可读。如果不是，函数返回 `false`，并且不再执行任何代码。\n\n如果 `$dir` 没问题，则执行\
  \ `else` 块。它也从一条条件语句开始，检查 `$extensions` 是否是一个数组。如果是，则将其传递给 `implode()`，它将数组元素连接起来，每个元素之间用竖线（`|`）分隔。竖线在正则表达式中用于表示可选值。假设将以下数组作为第二个参数传递给函数：\n\
  \n```\n['jpg', 'png', 'gif']\n```\n\n条件语句将其转换为 `jpg|png|gif`。因此，这会查找 `jpg`、`png`\
  \ 或 `gif`。但是，如果参数是一个字符串，则保持不变。\n\n3.  您现在可以构建正则表达式搜索模式，并将两个参数传递给 `FilesystemIterator`\
  \ 和 `RegexIterator`，如下所示：\n\n```\nfunction buildFileList($dir, $extensions) {\n\
  \    if (!is_dir($dir) && !is_readable($dir)) {\n        return false;\n    } else\
  \ {\n        if (is_array($extensions)) {\n            $extensions = implode('|',\
  \ $extensions);\n        }\n        $pattern = \"/\\.(?:{$extensions})$/i\";\n \
  \       $folder = new FilesystemIterator($dir);\n        $files = new RegexIterator($folder,\
  \ $pattern);\n    }\n}\n```\n\n正则表达式模式使用双引号字符串构建，并将 `$extensions` 包裹在花括号中，以确保 PHP\
  \ 引擎能够正确解释它。复制代码时要小心。它不太容易阅读。\n\n4.  代码的最后一部分提取文件名以构建一个数组，该数组经过排序后被返回。完整的函数定义如下所示：\n\
  \n```\nfunction buildFileList($dir, $extensions) {\n    if (!is_dir($dir) && !is_readable($dir))\
  \ {\n        return false;\n    } else {\n        if (is_array($extensions)) {\n\
  \            $extensions = implode('|', $extensions);\n        }\n        $pattern\
  \ = \"/\\.(?:{$extensions})$/i\";\n        $folder = new FilesystemIterator($dir);\n\
  \        $files = new RegexIterator($folder, $pattern);\n        $filenames = [];\n\
  \        foreach ($files as $file) {\n            $filenames[] = $file->getFilename();\n\
  \        }\n        natcasesort($filenames);\n        return $filenames;\n    }\n\
  }\n```\n\n这初始化了一个数组，并使用 `foreach` 循环通过 `getFilename()` 方法将文件名赋值给它。最后，该数组被传递给 `natcasesort()`，它以自然且不区分大小写的顺序进行排序。所谓“自然”是指，包含数字的字符串会以人类通常理解的方式进行排序。例如，计算机通常会将\
  \ `img12.jpg` 排在 `img2.jpg` 之前，因为 12 中的 1 被认为小于 2。使用 `natcasesort()` 会使 `img2.jpg`\
  \ 排在 `img12.jpg` 之前。\n\n5.  要使用此函数，请将文件夹路径和要查找的文件的扩展名作为参数。例如，您可以从一个文件夹中获取所有 Word\
  \ 和 PDF 文档，如下所示：\n\n```\n$docs = buildFileList('folder_name', ['doc', 'docx', 'pdf']);\n\
  ```\n\n`buildFileList()` 函数的代码位于 `ch07` 文件夹的 `buildlist.php` 文件中。\n\n## 访问远程文件\n\
  \n在本地计算机或自己的网站上读取、写入和检查文件是很有用的。但是 `allow_url_fopen` 也允许您访问互联网上任何地方公开可用的文档。您可以读取内容，将其保存到变量中，并使用\
  \ PHP 函数进行操作，然后将其整合到自己的页面中或将信息保存到数据库。\n\n需要提醒一点：从远程来源提取材料以包含在自己的页面中时，存在安全风险。例如，远程页面可能包含嵌入在\
  \ `<script>` 标签或超链接中的恶意脚本。\n\n即使远程页面从受信任的源（例如 [Amazon.​com](http://amazon.com) 数据库的产品详细信息、政府气象局的气象信息或报纸或广播公司的新闻推送）以已知格式提供数据，您也应该始终通过将其传递给\
  \ `htmlentities()`（请参阅 PHP 解决方案 6-3）来清理内容。除了将双引号转换为 `&quot;` 之外，`htmlentities()`\
  \ 还将 `<` 转换为 `&lt;`，将 `>` 转换为 `&gt;`。这会以纯文本形式显示标签，而不是将它们视为 HTML。\n\n如果您希望允许某些 HTML\
  \ 标签，请改用 `strip_tags()` 函数。如果将字符串传递给 `strip_tags()`，它会返回一个去除了所有 HTML 标签和注释的字符串。它也会移除\
  \ PHP 标签。第二个可选参数是您希望保留的标签列表。例如，以下代码会去除除段落、一级标题和二级标题之外的所有标签：\n\n```\n$stripped =\
  \ strip_tags($original, '<p><h1><h2>');\n```\n\n\n\n"
- "# 消费新闻与其他 RSS 源\n\n你可能希望整合到网站中的一些最有用的远程信息源来自 RSS 源。`RSS`代表简易信息聚合（Really Simple\
  \ Syndication），它是`XML`的一种方言。`XML`与`HTML`类似，都使用标签来标记内容。但`XML`标签并非用于定义段落、标题和图片，而是用于以可预测的层级结构组织数据。`XML`以纯文本形式编写，因此常被用于在可能运行不同操作系统的计算机之间共享信息。\n\
  \n图 7-3 展示了一个 RSS 2.0 源的典型结构。整个文档被包裹在一对`<rss>`标签内。这是根元素，类似于网页的`<html>`标签。文档的其余部分被包裹在一对`<channel>`标签内，其中始终包含以下三个描述\
  \ RSS 源的元素：`<title>`、`<description>`和`<link>`。\n\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Fig3_HTML.png](img/332054_4_En_7_Fig3_HTML.png)\n\
  \n**图 7-3.** RSS 源的主要内容位于 item 元素中\n\n除了这三个必需的元素外，`<channel>`还可以包含许多其他元素，但真正有趣的内容位于`<item>`元素中。对于新闻源而言，这里可以找到各个新闻条目。如果你查看博客的\
  \ RSS 源，`<item>`元素通常包含博客文章的摘要。\n\n每个`<item>`元素可以包含多个子元素，但图 7-3 中展示的是最常见且通常最有趣的几个：\n\
  \n*   `<title>`：条目的标题\n*   `<link>`：条目的 URL\n*   `<pubDate>`：发布日期\n*   `<description>`：条目的摘要\n\
  \n这种可预测的格式使得使用`SimpleXML`提取信息变得非常容易。\n\n**注意：** 你可以在 [`www.rssboard.org/rss-specification`](http://www.rssboard.org/rss-specification)\
  \ 找到完整的 RSS 规范。与大多数技术规范不同，它使用通俗语言编写，易于阅读。\n\n## 使用 SimpleXML\n\n只要你了解 XML 文档的结构，`SimpleXML`就会如其名所示：它让从\
  \ XML 中提取信息变得简单。第一步是将 XML 文档的 URL 传递给`simplexml_load_file()`。你也可以通过传递路径作为参数来加载本地\
  \ XML 文件。例如，以下代码从 BBC 获取世界新闻源：\n\n```php\n$feed = simplexml_load_file('http://feeds.bbci.co.uk/news/world/rss.xml');\n\
  ```\n\n这会创建一个`SimpleXMLElement`类的实例。现在，可以通过使用元素名称，将源中的所有元素作为`$feed`对象的属性进行访问。对于\
  \ RSS 源，`<item>`元素可以通过`$feed->channel->item`来访问。\n\n要显示每个`<item>`的`<title>`，可以像这样创建一个`foreach`循环：\n\
  \n```php\nforeach ($feed->channel->item as $item) {\necho $item->title . '';\n}\n\
  ```\n\n如果你将此代码与图 7-3 进行比较，可以看到你通过使用`->`运算符链接元素名称来访问元素，直到达到目标。由于有多个`<item>`元素，你需要使用循环来进一步深入。或者，使用数组表示法，如下所示：\n\
  \n```php\n$feed->channel->item[2]->title\n```\n\n这将获取第三个`<item>`元素的`<title>`。除非你只需要特定值，否则使用循环更简单。了解了这些背景知识后，让我们使用`SimpleXML`来显示新闻源的内容。\n\
  \n## PHP 解决方案 7-5：消费 RSS 新闻源\n\n本 PHP 解决方案展示了如何使用`SimpleXML`从实时新闻源中提取信息，然后在网页中显示。它还展示了如何将`<pubDate>`元素格式化为更友好的格式，以及如何使用`LimitIterator`类限制显示的项目数量。\n\
  \n1. 在`filesystem`文件夹中创建一个名为`newsfeed.php`的新页面。此页面将包含 PHP 和 HTML 的混合内容。\n\n2. 本\
  \ PHP 解决方案选择的新闻源是 BBC 世界新闻。使用大多数新闻源的条件是你需要注明来源。因此，在页面顶部添加格式为`<h1>`标题的“来自 BBC 新闻的最新消息”。\n\
  \n**注意：** 关于在你自己的网站上使用 BBC 新闻源的条款和条件，请参见 [`www.bbc.co.uk/news/10628494#mysite`](http://www.bbc.co.uk/news/10628494%2523mysite)\
  \ 和 [`www.bbc.co.uk/usingthebbc/terms/can-i-share-things-from-the-bbc/`](http://www.bbc.co.uk/usingthebbc/terms/can-i-share-things-from-the-bbc/)。\n\
  \n3. 在标题下方创建一个 PHP 代码块，并添加以下代码来加载源：\n\n```php\n$url = 'http://feeds.bbci.co.uk/news/world/rss.xml';\n\
  $feed = simplexml_load_file($url);\n```\n\n4. 使用`foreach`循环访问`<item>`元素并显示每个元素的`<title>`：\n\
  \n```php\nforeach ($feed->channel->item as $item) {\necho htmlentities($item->title)\
  \ . '';\n}\n```\n\n5. 保存`newsfeed.php`并在浏览器中加载该页面。你应该会看到一个类似图 7-4 的长列表新闻条目。\n\n\
  ![../images/332054_4_En_7_Chapter/332054_4_En_7_Fig4_HTML.jpg](img/332054_4_En_7_Fig4_HTML.jpg)\n\
  \n**图 7-4.** 新闻源包含大量条目\n\n6. 普通的源通常包含 30 个或更多条目。对于新闻网站来说这没问题，但在你自己的网站上，你可能希望选择更短的内容。使用另一个\
  \ SPL 迭代器来选择一个特定的条目范围。像这样修改代码：\n\n```php\n$url = 'http://feeds.bbci.co.uk/news/world/rss.xml';\n\
  $feed = simplexml_load_file($url, 'SimpleXMLIterator');\n$filtered = new LimitIterator($feed->channel->item,\
  \ 0 , 4);\nforeach ($filtered as $item) {\necho htmlentities($item->title) . '';\n\
  }\n```\n\n要将`SimpleXML`与 SPL 迭代器一起使用，你需要将`SimpleXMLIterator`类的名称作为第二个参数传递给`simplexml_load_file()`。然后，你可以将要影响的\
  \ SimpleXML 元素传递给迭代器构造函数。\n\n在此例中，`$feed->channel->item`被传递给`LimitIterator`构造函数。`LimitIterator`接受三个参数：要限制的对象、起始点（从\
  \ 0 开始计数）以及循环应运行的次数。此代码从第一个条目开始，并将条目数量限制为四个。\n\n现在，`foreach`循环遍历`$filtered`结果。如果你再次测试页面，你将只看到四个标题，如图\
  \ 7-5 所示。如果标题的选择与之前不同，请不要惊讶。BBC 新闻网站每分钟都在更新。\n\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Fig5_HTML.jpg](img/332054_4_En_7_Fig5_HTML.jpg)\n\
  \n**图 7-5.** `LimitIterator`限制了显示的条目数量\n\n7. 既然你已经限制了条目数量，修改`foreach`循环，将`<title>`元素包装成指向原始文章的链接，然后显示`<pubDate>`和`<description>`条目。循环代码如下：\n\
  \n```php\nforeach ($filtered as $item) { ?>\nlink) ?>\">\ntitle)?>\npubDate) ?>\n\
  description) ?>\n}\n```\n\n8. 保存页面并再次测试。链接会直接将你带到 BBC 网站上的相关新闻报道。新闻源现在可以工作了，但`<pubDate>`的格式遵循\
  \ RSS 规范中规定的格式，如以下截图所示：\n\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figm_HTML.jpg](img/332054_4_En_7_Figm_HTML.jpg)\n\
  \n\n\n7. 为了以更友好的方式格式化日期和时间，将`$item->pubDate`传递给`DateTime`类构造函数，然后使用`DateTime format()`方法进行显示。修改`foreach`循环中的代码如下：\n\
  \n```php\n    pubDate);\n    echo $date->format('M j, Y, g:ia'); ?>\n```\n\n这将日期重新格式化为：\n\
  \n![../images/332054_4_En_7_Chapter/332054_4_En_7_Fign_HTML.jpg](img/332054_4_En_7_Fign_HTML.jpg)\n\
  \n有关神秘的 PHP 日期格式化字符串，请参阅第 16 章。\n\n8. 看起来好多了，但时间仍然以 GMT（伦敦时间）显示。如果网站的大多数访客居住在美国东海岸，你可能希望显示当地时间。使用`DateTime`对象可以轻松实现。使用`setTimezone()`方法切换到纽约时间。你甚至可以根据夏令时是否生效，自动显示\
  \ EDT（东部夏令时）或 EST（东部标准时间）。修改代码如下：\n\n```php\n    pubDate);\n    $date->setTimezone(new\
  \ DateTimeZone('America/New_York'));\n    $offset = $date->getOffset();\n    $timezone\
  \ = ($offset == -14400) ? ' EDT' : ' EST';\n    echo $date->format('M j, Y, g:ia')\
  \ . $timezone; ?>\n```\n\n要创建`DateTimeZone`对象，请将[`www.php.net/manual/en/timezones.php`](http://www.php.net/manual/en/timezones.php)列出的一个时区作为参数传递给它。这是唯一需要`DateTimeZone`对象的地方，因此它被直接创建为`setTimezone()`方法的参数。\n\
  \n虽然没有专门的方法来判断夏令时是否生效，但`getOffset()`方法会返回时间与协调世界时（UTC）相差的秒数。以下代码决定显示 EDT 还是 EST：\n\
  \n```php\n    $timezone = ($offset == -14400) ? ' EDT' : ' EST';\n```\n\n这里使用`$offset`的值结合三元运算符。在夏季，纽约比\
  \ UTC 晚 4 小时（`-14400`秒）。因此，如果`$offset`等于`-14400`，条件为`true`，则将 EDT 赋值给`$timezone`。否则，使用\
  \ EST。\n\n最后，将`$timezone`的值拼接到格式化时间之后。`$timezone`使用的字符串前面有一个空格，用于分隔时区和时间。加载页面时，时间会调整为美国东海岸时间，如下所示：\n\
  \n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figo_HTML.jpg](img/332054_4_En_7_Figo_HTML.jpg)\n\
  \n9. 现在页面只需要用 CSS 进行美化。图 7-6 展示了使用`styles`文件夹中`newsfeed.css`样式化后的完整新闻订阅。\n\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Fig6_HTML.jpg](img/332054_4_En_7_Fig6_HTML.jpg)\n\
  \n**图 7-6.** 实时新闻订阅只需要十几行 PHP 代码\n\n> **提示**\n> 如果你订阅了 LinkedIn Learning 或 [Lynda.​com](http://lynda.com)，可以在我的课程《学习标准\
  \ PHP 库》和《学习 PHP SimpleXML》中了解更多关于 SPL 和 SimpleXML 的知识。\n\n虽然我为这个 PHP 解决方案使用了 BBC\
  \ 新闻订阅，但它应该适用于任何 RSS 2.0 订阅。例如，你可以在本地使用[`http://rss.cnn.com/rss/edition.rss`](http://rss.cnn.com/rss/edition.rss)进行测试。在公共网站中使用\
  \ CNN 新闻订阅需要获得 CNN 的许可。在将订阅集成到网站之前，请务必与版权所有者核实条款和条件。\n\n---\n\n**创建下载链接**\n\n一个经常在在线论坛出现的问题是：“如何创建一个指向图像（或\
  \ PDF 文件）的链接，以提示用户下载它？”快速解决方案是将文件转换为压缩格式，例如 ZIP。这通常会导致更小的下载量，但缺点是没有经验的用户可能不知道如何解压文件，或者他们可能使用的是不包含解压工具的旧操作系统。使用\
  \ PHP 文件系统函数，可以轻松创建一个自动提示用户下载原始格式文件的链接。\n\n**PHP 解决方案 7-6：提示用户下载图像**\n\n这个 PHP 解决方案发送必要的\
  \ HTTP 头，并使用`readfile()`以二进制流的形式输出文件内容，强制浏览器下载它。\n\n1. 在`filesystem`文件夹中创建一个名为`download.php`的\
  \ PHP 文件。完整列表在下一步中给出。你也可以在`ch07`文件夹的`download.php`中找到它。\n\n2. 删除脚本编辑器创建的任何默认代码，并插入以下代码：\n\
  \n```php\n    <?php\n    // define error page\n    $error = 'http://localhost/phpsols-4e/error.php';\n\
  \    // define the path to the download folder\n    $filepath = 'C:/xampp/htdocs/phpsols-4e/images/';\n\
  \    $getfile = NULL;\n    // block any attempt to explore the filesystem\n    if\
  \ (isset($_GET['file']) && basename($_GET['file']) == $_GET['file']) {\n    $getfile\
  \ = $_GET['file'];\n    } else {\n    header(\"Location: $error\");\n    exit;\n\
  \    }\n    if ($getfile) {\n    $path = $filepath . $getfile;\n    // check that\
  \ it exists and is readable\n    if (file_exists($path) && is_readable($path)) {\n\
  \    // send the appropriate headers\n    header('Content-Type: application/octet-stream');\n\
  \    header('Content-Length: '. filesize($path));\n    header('Content-Disposition:\
  \ attachment; filename=' . $getfile);\n    header('Content-Transfer-Encoding: binary');\n\
  \    // output the file content\n    readfile($path);\n    } else {\n    header(\"\
  Location: $error\");\n    }\n    }\n    ```\n\n此脚本中唯一需要更改的两行已用粗体标出。第一行定义了`$error`，这是一个包含错误页面\
  \ URL 的变量。需要更改的第二行定义了存储下载文件的文件夹路径。\n\n脚本的工作原理是从附加到 URL 的查询字符串中获取要下载的文件名，并将其保存为`$getfile`。由于查询字符串很容易被篡改，因此`$getfile`最初设置为`NULL`。如果不这样做，可能会让恶意用户访问服务器上的任何文件。\n\
  \n开头的条件语句使用`basename()`来确保攻击者无法从文件结构的其他部分请求文件（例如存储密码的文件）。如第 5 章所述，`basename()`提取路径中的文件名部分，因此如果`basename($_GET['file'])`与`$_GET['file']`不同，你就知道有人试图探测你的服务器。然后，你可以使用`header()`函数将用户重定向到错误页面，从而阻止脚本继续执行。\n\
  \n在检查请求的文件存在且可读之后，脚本发送适当的 HTTP 头，并使用`readfile()`将文件发送到输出缓冲区。如果找不到文件，则用户会被重定向到错误页面。\n\
  \n3. 通过创建另一个页面来测试脚本；添加几个指向`download.php`的链接。在每个链接的末尾添加一个查询字符串，格式为`file=`后跟要下载的文件名。你可以在`ch07`文件夹中找到名为`getdownloads.php`的页面，其中包含以下两个链接：\n\
  \n```php\n    Download fountains image\n    Download monk image\n```\n\n\n\n###\
  \ 4. 点击其中一个链接。根据浏览器的设置，文件会下载到默认的下载文件夹，或者会弹出一个对话框询问您如何处理该文件。\n\n我以图片文件为例演示了 `download.php`，但它可以用于任何类型的文件，因为标头会将文件作为二进制流发送。\n\
  \n> **注意**  \n> 此脚本依赖 `header()` 向浏览器发送适当的 HTTP 标头。**务必确保**在 PHP 开始标签之前没有任何换行或空白。如果已删除所有空白但仍收到“标头已发送”的错误消息，您的编辑器可能在文件开头插入了不可见的控制字符。某些编辑程序会插入字节顺序标记（BOM），已知这会导致\
  \ `header()` 函数出现问题。请检查您的程序偏好设置，确保已取消选中插入 BOM 的选项。\n\n## 章节回顾\n\n文件系统函数并不难使用，但有许多细微之处可能将一个看似简单的任务变成复杂的问题。检查您是否拥有正确的权限非常重要。即使是在自己的网站中处理文件，PHP\
  \ 也需要对您要读取或写入文件的任何文件夹具有访问权限。\n\nSPL 的 `FilesystemIterator` 和 `RecursiveDirectoryIterator`\
  \ 类使检查文件夹内容变得非常容易。与 `SplFileInfo` 方法和 `RegexIterator` 结合使用时，您可以快速找到文件夹或文件夹层次结构中特定类型的文件。\n\
  \n处理远程数据源时，需要检查 `allow_url_fopen` 是否未被禁用。远程数据源最常见的用途之一是从 RSS 新闻源或 XML 文档中提取信息，得益于\
  \ SimpleXML，这项任务只需几行代码即可完成。\n\n在本书的后续章节中，我们将把本章中的一些 PHP 解决方案应用于实际操作，例如处理图像和构建简单的用户身份验证系统。\n\
  \n## 8. 处理数组\n\n数组是 PHP 中最通用的数据类型之一。其重要性体现在有超过 80 个核心函数专门用于处理存储在数组中的数据。这些函数大致可分为：修改、排序、比较和提取数组信息。本章不试图涵盖所有函数，而是聚焦于一些更有趣、更实用的数组操作应用。\n\
  \n本章涵盖以下内容：\n\n- 理解修改数组内容的多种方法\n- 合并数组\n- 将数组转换为语法字符串\n- 查找数组的所有排列组合\n- 排序数组\n-\
  \ 从多维数组自动生成嵌套的 HTML 列表\n- 从 JSON 提取数据\n- 将数组元素赋值给变量\n- 使用展开运算符解包数组\n\n### 修改数组元素\n\
  \n刚接触 PHP 的新手在尝试修改数组中的每个元素时，常常会感到困惑。例如，假设您想对数字数组中的每个元素执行计算。简单的方法看起来是使用循环，在循环内执行计算，并将结果重新赋值给当前元素，如下所示：\n\
  \n```php\n$numbers = [2, 4, 7];\nforeach ($numbers as $number) {\n    $number *=\
  \ 2;\n}\n```\n\n这看起来应该能行，但实际上不能。`$numbers` 数组中的值保持不变。这是因为 PHP 在循环内部操作的是数组的一个*副本*。循环结束时副本被丢弃，计算结果也随之消失。要修改原始数组，需要将每个元素的值通过引用传递到循环中。\n\
  \n#### PHP 解决方案 8-1：使用循环修改数组元素\n\n此 PHP 解决方案展示了如何使用 `foreach` 循环修改数组中的每个元素。该技术对于索引数组和关联数组均适用。\n\
  \n\n\n1.  打开`ch08`文件夹中的`modify_01.php`，其中包含上一节的代码，并在`<pre>`标签对之间添加`print_r($numbers);`。\n\
  \n2.  在浏览器中加载该页面，验证`$numbers`数组中的值是否未改变，如下截图所示：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figa_HTML.jpg](img/332054_4_En_8_Figa_HTML.jpg)\n\
  \n3.  通过在循环声明中的临时变量前添加`&`符号，将数组的每个元素按引用传递给循环：\n\n```\nforeach ($numbers as &$number)\
  \ {\n```\n\n4.  循环结束时，临时变量仍然会包含最后一个数组元素的更新值。为避免后续意外修改该值，建议循环后使用`unset()`销毁临时变量：\n\
  \n```\nforeach ($numbers as &$number) {\n    $number *= 2;\n}\nunset($number);\n\
  ```\n\n5.  保存文件并在浏览器中加载以测试修改后的代码（位于`modify_02.php`）。数组中的每个数字都应加倍，如下截图所示：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figb_HTML.jpg](img/332054_4_En_8_Figb_HTML.jpg)\n\
  \n6.  要修改关联数组的值，需要为键和值都声明临时变量；但只有值应按引用传递。以下代码位于`modify_03.php`：\n\n```\n$book =\
  \ [\n    'author' => 'David Powers',\n    'title' => 'PHP 7 Solutions'\n];\nforeach\
  \ ($book as $key => &$value) {\n    $book[$key] = strtoupper($value);\n}\nunset($value);\n\
  ```\n\n输出结果如下：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figc_HTML.jpg](img/332054_4_En_8_Figc_HTML.jpg)\n\
  \n7.  但假设你想修改数组的键。逻辑上的做法是在键前面加上`&`符号以按引用传递：\n\n```\nforeach ($book as &$key => $value)\
  \ {\n```\n\n然而，如果尝试这样做，会触发致命错误。数组键不能按引用传递，只有数组值可以。\n\n8.  要修改关联数组的每个键，只需像在循环外一样在循环内直接修改即可。以下代码位于`modify_04.php`：\n\
  \n```\nforeach ($book as $key => $value) {\n    $book[ucfirst($key)] = $value;\n\
  }\n```\n\n输出结果如下：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figd_HTML.jpg](img/332054_4_En_8_Figd_HTML.jpg)\n\
  \n9.  如上截图所示，原始键与修改后的键会同时保留。如果只想保留修改后的键，需要在循环内使用`unset()`销毁原始键（代码位于`modify_05.php`）：\n\
  \n```\nforeach ($book as $key => $value) {\n    $book[ucfirst($key)] = $value;\n\
  \    unset($book[$key]);\n}\n```\n\n这样只保留每个键的修改版本。\n\n> **提示**  \n> 如果想将数组键转换为大写或小写，简单的方法是使用`array_change_key_case()`函数，如下一个\
  \ PHP 解决方案所述。\n\n## PHP 解决方案 8-2：使用`array_walk()`修改数组元素\n\n修改数组元素的另一种方法是使用`array_walk()`函数，该函数将回调函数应用于数组的每个元素。回调可以是匿名函数，也可以是已定义函数的名称。默认情况下，`array_walk()`向回调传递两个参数：元素的值和键——**按此顺序**。还可以使用可选的第三个参数。本\
  \ PHP 解决方案将探讨`array_walk()`的各种使用方法。\n\n1.  位于`ch08`文件夹中的`array_walk_01.php`的主要代码如下：\n\
  \n```\n$numbers = [2, 4, 7];\narray_walk($numbers, function (&$val) {\n    return\
  \ $val *= 2;\n});\n```\n\n`array_walk()`的第一个参数是要应用回调函数的数组。第二个参数是回调，此处为匿名函数。与`foreach`循环一样，值需要按引用传递，因此回调函数的第一个参数前需加上`&`符号。\n\
  \n此示例修改索引数组，因此无需将数组键作为第二个参数传递给回调函数。\n\n像这样使用`array_walk()`会产生与前一个 PHP 解决方案中`modify_02.php`相同的结果：`$numbers`数组中的每个值都会加倍。\n\
  \n2.  当对关联数组使用`array_walk()`时，如果只想修改值，则无需将数组键作为参数传递给回调函数。`array_walk_02.php`中的代码使用匿名函数将每个数组元素的值转换为大写字符串：\n\
  \n```\n$book = [\n    'author' => 'David Powers',\n    'title' => 'PHP 7 Solutions'\n\
  ];\narray_walk($book, function (&$val) {\n    return $val = strtoupper($val);\n\
  });\n```\n\n这会产生与前一个 PHP 解决方案中`modify_03.php`相同的输出。\n\n3.  也可以将已定义函数的名称作为字符串传递给`array_walk()`（代码位于`array_walk_03.php`）：\n\
  \n```\narray_walk($book, 'output');\nfunction output (&$val) {\n    return $val\
  \ = strtoupper($val);\n}\n```\n\n这会产生与上例相同的输出。如果函数定义位于同一文件中，那么它在调用`array_walk()`之前或之后定义都没有关系。但如果定义在外部文件中，则必须在调用`array_walk()`之前包含该文件。\n\
  \n4.  传递给`array_walk()`的回调函数最多可以接受三个参数。第二个参数必须是数组键，最后一个参数可以是任何你想要使用的其他值。使用第三个参数时，它也会作为第三个参数传递给`array_walk()`。以下`array_walk_04.php`中的示例演示了其用法：\n\
  \n```\narray_walk($book, 'output', 'is');\nfunction output (&$val, $key, $verb)\
  \ {\n    return $val = \"The $key of this book $verb $val.\";\n}\n```\n\n输出结果如下：\n\
  \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fige_HTML.jpg](img/332054_4_En_8_Fige_HTML.jpg)\n\
  \n5.  使用`array_walk()`无法修改数组键。如果只想将所有键改为大写或小写，请使用`array_change_key_case()`。默认情况下，它将键转换为小写。与`array_walk()`不同，它不会修改原始数组，而是返回一个包含修改后键的新数组，因此你需要将结果赋值给一个变量。在`array_change_key_case_01.php`中，数组键被赋予了首字母大写，以下代码将键转换为小写并将结果重新赋值给`$book`：\n\
  \n```\n$book = [\n    'Author' => 'David Powers',\n    'Title' => 'PHP 7 Solutions'\n\
  ];\n$book = array_change_key_case($book);\n```\n\n6.  要将键转换为大写，将 PHP 常量`CASE_UPPER`作为第二个参数传递给`array_change_key_case()`（代码位于`array_change_key_case_02.php`）：\n\
  \n```\n$book = array_change_key_case($book, CASE_UPPER);\n```\n\n\n\n"
- "# PHP 解决方案 8-3：使用 `array_map()` 修改数组元素\n\n通过引用将数组值传递给 `foreach` 循环或 `array_walk()`\
  \ 会修改原始数组。这通常正是你想要的。然而，如果你想保留原始数组，可以考虑使用 `array_map()`。它会将回调函数应用于每个数组元素，并返回一个包含已修改元素的新数组。`array_map()`\
  \ 的第一个参数是回调函数，可以是匿名函数或已定义函数的名称。第二个参数是要修改其元素的数组。\n\n如果回调函数接受多个参数，则每个参数的值必须按照回调函数要求的相同顺序以数组形式传递给\
  \ `array_map()`。即使你想为后续参数每次都使用相同的值，也必须将其作为一个与正在修改的数组具有相同元素数量的数组传递给 `array_map()`。\n\
  \n对于关联数组，只有当回调函数接受单个参数时，`array_map()` 才会保留键名。如果向回调函数传递多个参数，`array_map()` 会返回一个索引数组。\n\
  \n1. `array_map_01.php` 中的代码展示了一个使用 `array_map()` 的简单示例，该示例通过匿名回调函数将数组中的数字翻倍。代码如下所示：\n\
  \n```php\n$numbers = [2, 4, 7];\n$doubled = array_map(function ($num) {\n    return\
  \ $num * 2;\n}, $numbers);\necho '';\nprint_r($numbers);\nprint_r($doubled);\necho\
  \ '';\n```\n\n如下面的截图所示，原始 `$numbers` 数组中的值保持不变。`$doubled` 数组包含回调函数返回的结果。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figf_HTML.jpg](img/332054_4_En_8_Figf_HTML.jpg)\n\
  \n2. `array_map_02.php` 中的下一个示例使用一个已定义的函数来修改关联数组：\n\n```php\n$book = [\n    'author'\
  \ => 'David Powers',\n    'title' => 'PHP 7 Solutions'\n];\n$modified = array_map('modify',\
  \ $book);\nfunction modify($val) {\n    return strtoupper($val);\n}\necho '';\n\
  print_r($book);\nprint_r($modified);\necho '';\n```\n\n如下面的截图所示，修改后的数组保留了数组的键名：\n\
  \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figg_HTML.jpg](img/332054_4_En_8_Figg_HTML.jpg)\n\
  \n3. `array_map_03.php` 中的代码已被修改，以演示如何向回调函数传递多个参数：\n\n```php\n$descriptions = ['British',\
  \ 'the fourth edition'];\n$modified = array_map('modify', $book, $descriptions);\n\
  function modify($val, $description) {\n    return \"$val is $description.\";\n}\n\
  ```\n\n`modify()` 函数中添加了第二个参数 `$description`。作为参数传递给回调函数的值存储在一个名为 `$descriptions`\
  \ 的数组中，该数组作为第三个参数传递给 `array_map()`。这将产生以下结果：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figh_HTML.jpg](img/332054_4_En_8_Figh_HTML.jpg)\n\
  \n注意，修改后的数组中没有保留数组键名。向回调函数传递多个参数会生成一个索引数组。\n\n4. 传递给 `array_map()` 的第三个及后续参数必须包含与正在修改的数组相同数量的元素。`array_map_04.php`\
  \ 中的代码展示了如果某个参数包含的元素过少会发生什么。代码如下所示：\n\n```php\n$descriptions = ['British', 'the\
  \ fourth edition'];\n$label = ['Description'];\n$modified = array_map('modify',\
  \ $book, $descriptions, $label);\nfunction modify($val, $description, $label) {\n\
  \    return \"$label: $val is $description.\";\n}\n```\n\n`$label` 数组中只有一个元素；但如下面的截图所示，这并不会导致相同的值被重复使用。\n\
  \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figi_HTML.jpg](img/332054_4_En_8_Figi_HTML.jpg)\n\
  \n当作为参数传递给 `array_map()` 的数组元素数量少于第一个数组（即正在修改的那个数组）时，较短的数组会用空元素填充。因此，修改后数组中的第二个元素缺少了标签；但\
  \ PHP 不会触发错误。\n\n"
- "# 合并数组\n\nPHP 提供了几种不同的方式来组合两个或多个数组的元素；但它们并不总是产生相同的结果。理解每种方法的工作原理可以避免错误和混淆。\n\n\
  ## 使用数组联合运算符\n\n合并数组最简单的方法是使用数组联合运算符，即加号（`+`）。然而，结果可能并非你所预期。`ch08` 文件夹中 `merge_01.php`\
  \ 的代码演示了在索引数组上使用数组联合运算符时会发生什么：\n\n```php\n$first = ['PHP', 'JavaScript'];\n$second\
  \ = ['Java', 'R', 'Python'];\n$languages = $first + $second;\necho '';\nprint_r($languages);\n\
  echo '';\n```\n\n运行此脚本会产生以下输出：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figj_HTML.jpg](img/332054_4_En_8_Figj_HTML.jpg)\n\
  \n结果数组不是包含五个元素，而是仅包含三个。这是因为数组联合运算符不会将第二个数组连接到第一个数组的末尾。对于索引数组，它会忽略第二个数组中与第一个数组元素具有相同索引的元素。在此示例中，第二个数组中的\
  \ Java 和 R 与 PHP 和 JavaScript 具有相同的索引（0 和 1），因此它们被忽略。只有 Python 有一个在第一个数组中不存在的索引（2），所以它被添加到合并后的数组中。\n\
  \n数组联合运算符对关联数组的处理方式类似。`merge_02.php` 中的代码包含两个关联数组，如下所示：\n\n```php\n$first = ['PHP'\
  \ => 'Rasmus Lerdorf', 'JavaScript' => 'Brendan Eich'];\n$second = ['Java' => 'James\
  \ Gosling', 'R' => 'Ross Ihaka', 'Python' => 'Guido van Rossum'];\n$lead_developers\
  \ = $first + $second;\n```\n\n两个数组都包含一组唯一的键名，因此结果数组包含每个元素及其关联的键名，如下面的截图所示：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figk_HTML.jpg](img/332054_4_En_8_Figk_HTML.jpg)\n\
  \n然而，当存在重复键名时，数组联合运算符会忽略第二个数组中的元素，如 `merge_03.php` 中的代码所示：\n\n```php\n$first = ['PHP'\
  \ => 'Rasmus Lerdorf', 'JavaScript' => 'Brendan Eich', 'R' => 'Robert Gentleman'];\n\
  $second = ['Java' => 'James Gosling', 'R' => 'Ross Ihaka', 'Python' => 'Guido van\
  \ Rossum'];\n$lead_developers = $first + $second;\n```\n\n如下面的截图所示，只有 Robert Gentleman\
  \ 被记为 R 语言的首席开发者。第二个数组中的 Ross Ihaka 因为共享了一个重复键名而被忽略。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figl_HTML.jpg](img/332054_4_En_8_Figl_HTML.jpg)\n\
  \n忽略重复索引或键名并不总是你想要的，因此 PHP 提供了一些旨在生成所有元素完全合并数组的函数。\n\n## 使用 `array_merge()` 和 `array_merge_recursive()`\n\
  \n函数 `array_merge()` 和 `array_merge_recursive()` 连接两个或多个数组以创建一个新数组。它们之间的区别在于处理关联数组中重复值的方式。\n\
  \n对于索引数组，`array_merge()` 会自动重新编号每个元素的索引，并包含所有值，包括重复值。`merge_04.php` 中的以下代码演示了这一点：\n\
  \n```php\n$first = ['PHP', 'JavaScript', 'R'];\n$second = ['Java', 'R', 'Python',\
  \ 'PHP'];\n$languages = array_merge($first, $second);\n```\n\n\n\n如下所示，输入文本需要像这样：\n\
  \n如下所示，索引是连续编号的，重复的值（PHP 和 R）会保留在结果数组中：\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figm_HTML.jpg](img/332054_4_En_8_Figm_HTML.jpg)\n\
  \n对于关联数组，`array_merge()`的行为取决于是否存在重复的数组键。当没有重复时，`array_merge()`拼接关联数组的方式与使用数组联合运算符完全相同。您可以通过运行`merge_05.php`中的代码来验证这一点。\n\
  \n然而，存在重复键时，只会保留最后一个重复值。这在`merge_06.php`的以下代码中得到了演示：\n\n```\n$first = ['PHP' =>\
  \ 'Rasmus Lerdorf', 'JavaScript' => 'Brendan Eich', 'R' => 'Robert Gentleman'];\n\
  $second = ['Java' => 'James Gosling', 'R' => 'Ross Ihaka', 'Python' => 'Guido van\
  \ Rossum'];\n$lead_developers = array_merge($first, $second);\n```\n\n如下所示，第二个数组中\
  \ R 的值（Ross Ihaka）会覆盖第一个数组中的值（Robert Gentleman）：\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fign_HTML.jpg](img/332054_4_En_8_Fign_HTML.jpg)\n\
  \n**注意**  \n数组的合并顺序与数组联合运算符不同。数组联合运算符保留第一个重复值，而`array_merge()`保留最后一个重复值。\n\n要保留重复键的值，需要使用`array_merge_recursive()`。`merge_07.php`中的代码合并了相同的数组，如下所示：\n\
  \n```\n$lead_developers = array_merge_recursive($first, $second);\n```\n\n如下所示，重复键的值被合并到一个索引子数组中：\n\
  ![../images/332054_4_En_8_Chapter/332054_4_En_8_Figo_HTML.jpg](img/332054_4_En_8_Figo_HTML.jpg)\n\
  Robert Gentleman 的名字被存储在新数组中，即`$lead_developers['R'][0]`。\n\n**注意**  \n数组联合运算符、`array_merge()`和`array_merge_recursive()`可应用于两个以上的数组。关于重复键和值的规则相同。对于`array_merge()`，始终保留最后一个重复值。\n\
  \n## 将两个索引数组合并为关联数组\n\n`array_combine()`函数将两个索引数组合并成一个关联数组，它使用第一个数组作为键，第二个数组作为值。两个数组必须具有相同数量的值，否则函数返回`false`并触发警告。\n\
  \n以下`array_combine.php`中的简单示例展示了其工作原理：\n\n```\n$colors = ['red', 'amber', 'green'];\n\
  $actions = ['stop', 'caution', 'go'];\n$signals = array_combine($colors, $actions);\n\
  // $signals 为 ['red' => 'stop', 'amber' => 'caution', 'green' => 'go']\n```\n\n\
  **提示**  \n请参见 PHP 解决方案 7-2 “从 CSV 文件中提取数据”，了解`array_combine()`的实际应用。\n\n## 比较数组\n\
  \n表 8-1 列出了可用于查找数组差异或交集的 PHP 核心函数。表中的所有函数都接受两个或更多数组作为参数。如果使用回调函数进行比较，则回调函数应作为传递给函数的最后一个参数。\n\
  \n**表 8-1.** 用于比较数组的 PHP 函数\n\n| 函数 | 描述 |\n| --- | --- |\n| `array_diff()` | 将第一个数组与一个或多个其他数组进行比较。返回第一个数组中存在而其他数组中不存在的值数组。\
  \ |\n| `array_diff_assoc()` | 类似于`array_diff()`，但在比较中同时使用数组键和值。 |\n| `array_diff_key()`\
  \ | 类似于`array_diff()`，但基于键而非值进行比较。 |\n| `array_diff_uassoc()` | 与`array_diff_assoc()`相同，但使用用户提供的回调函数来比较键。\
  \ |\n| `array_diff_ukey()` | 与`array_diff_key()`相同，但使用用户提供的回调函数来比较键。 |\n| `array_intersect()`\
  \ | 比较两个或多个数组。返回一个包含第一个数组中所有在其他数组中也存在的值的数组。键会被保留。 |\n| `array_intersect_assoc()`\
  \ | 类似于`array_intersect()`，但在比较中同时使用数组键和值。 |\n| `array_intersect_key()` | 返回一个包含第一个数组中所有键在其他数组中也存在的条目。\
  \ |\n| `array_intersect_uassoc()` | 与`array_intersect_assoc()`相同，但使用用户提供的回调函数来比较键。\
  \ |\n| `array_intersect_ukey()` | 与`array_intersect_key()`相同，但使用用户提供的回调函数来比较键。 |\n\
  \n我不会详细介绍每个函数，但让我们通过比较以下两个数组，看看`array_diff_assoc()`和`array_diff_key()`返回的不同结果：\n\
  \n```\n$first = [\n'PHP' => 'Rasmus Lerdorf',\n'JavaScript' => 'Brendan Eich',\n\
  'R' => 'Robert Gentleman'];\n$second = [\n'Java' => 'James Gosling',\n'R' => 'Ross\
  \ Ihaka',\n'Python' => 'Guido van Rossum'];\n$diff = array_diff_assoc($first, $second);\
  \ // $diff 等同于 $first\n```\n\n`array_diff_assoc()`会同时检查键和值，返回存在于第一个数组但不存在于其他数组中的元素。在此示例中，尽管两个数组都包含键\
  \ R，但第一个数组中的所有三个元素都被返回，这是因为分配给 R 的值不同。\n\n```\n$diff = array_diff_key($first, $second);\n\
  // $diff 为 ['PHP' => 'Rasmus Lerdorf','JavaScript' => 'Brendan Eich']\n```\n\n然而，`array_diff_key()`只检查键，忽略值。结果，它返回第一个数组的前两个元素，但不返回第三个，因为\
  \ R 作为键存在于第二个数组中。分配给 R 的值不同这一事实无关紧要。\n\n`ch08`文件夹包含了表 8-1 中其他函数的简单示例，并附有简要的说明注释。`*_uassoc()`和`*_ukey()`版本需要一个回调函数作为最后一个参数来比较每个元素的键。回调函数必须接受两个参数，如果第一个参数分别小于、等于或大于第二个参数，则返回一个小于、等于或大于零的整数。`ch08`文件夹中的示例使用了内置的\
  \ PHP `strcasecmp()`函数来执行不区分大小写的比较，如果两个字符串被认为相等，则返回`0`。\n\n**提示**  \n比较两个值最有效的方式是使用飞船运算符，这是\
  \ PHP 7 的新特性。您将在本章后面的 PHP 解决方案 8-5 “使用飞船运算符进行自定义排序”中看到一个示例。\n\n## PHP 解决方案 8-4：用逗号连接数组\n\
  \n内置的 PHP `implode()`函数使用用户提供的字符串连接数组的所有元素。此 PHP 解决方案通过在最后一个元素前插入 “and” 来增强输出，并提供限制元素数量的选项，将多余的值替换为\
  \ “and one other” 或 “and others”。\n\n1. 打开`ch08`文件夹中的`commas_01.php`。它包含一系列索引数组，每个数组包含\
  \ 0 到 5 个来自 1960 年代和 1970 年代的录音艺术家的名字。最后一行使用`implode()`以逗号连接最后一个数组：\n\n```\n   \
  \ $too_many = ['Dave Dee', 'Dozy', 'Beaky', 'Mick', 'Tich'];\n    echo implode(',\
  \ ', $too_many);\n```\n\n2. 在浏览器中加载该脚本。如下面的截图所示，输出看起来不自然，因为在最后一个名字前缺少 “and”：\n\n\
  ![../images/332054_4_En_8_Chapter/332054_4_En_8_Figp_HTML.jpg](img/332054_4_En_8_Figp_HTML.jpg)\n\
  \n3. 删除最后一行，并像这样开始定义一个函数：\n\n```\n    function with_commas(array $array, $max =\
  \ 4) { }\n```\n\n\n\n函数签名包含两个参数：`$array` 和 `$max`。`$array` 前有数组类型声明，因此如果向该函数传递其他类型的数据，将触发错误。`$max`\
  \ 设置了要连接的最大元素数量，默认值为 `4`，因此它是一个可选参数。\n\n在函数内部，我们可以使用 `switch` 语句，根据数组中元素的数量来决定如何处理输出：\n\
  \n```\nswitch (count($array)) {\ncase 0:\nreturn '';\ncase 1:\nreturn array_pop($array);\n\
  case 2:\nreturn implode(' and ', $array);\ndefault:\n$last = array_pop($array);\n\
  return implode(', ', $array) . \" and $last\";\n}\n```\n\n传递给 `switch` 语句的参数是 `count($array)`，也就是数组中元素的数量。\n\
  \n如果数组不包含任何元素，则返回空字符串。如果只有一个元素，则在返回结果前将该数组传递给 `array_pop()` 函数。之所以需要这样做，是因为函数应该返回一个可直接显示的字符串。如果直接返回\
  \ `$array`，它仍然是一个数组，无法使用 `echo` 或 `print` 来显示。`array_pop()` 函数移除数组中的最后一个元素并将其返回。\n\
  \n如果数组中有两个元素，`switch` 语句会将数组传递给 `implode()` 函数，并附带两侧各有一个空格的字符串 \"and\"，然后返回结果。\n\
  \n默认操作使用 `array_pop()` 函数移除数组中的最后一个元素。然后，将数组传递给 `implode()` 函数，第一个参数为一个逗号加一个空格。并且，在返回结果之前，将最后一个元素的值与用逗号分隔的字符串拼接，前面加上\
  \ \"and\"。\n\n**提示**  \n每个 `case` 后面不需要使用 `break` 语句，因为 `return` 关键字会立即停止任何进一步执行。\n\
  \n1. 保存脚本，并依次使用每个测试数组进行测试。例如：\n\n```\necho with_commas($threesome);\n```\n\n2. 此操作将以符合语法规范的方式，用逗号连接数组元素：\n\
  \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figq_HTML.jpg](img/332054_4_En_8_Figq_HTML.jpg)\n\
  \n3. 让我们修复数组元素数量超过 `$max` 的情况，首先处理超过一个的情况。在 `default` 之前立即插入以下代码：\n\n```\ncase $max\
  \ + 1:\nreturn implode(', ', array_slice($array, 0, $max)) . ' and one other';\n\
  ```\n\n此操作将 `array_slice($array, 0, $max)` 作为第二个参数传递给 `implode()`。`array_slice()`\
  \ 函数接受三个参数：要从中提取元素的数组、要开始提取的元素的索引，以及要提取的元素数量。数组从零开始计数，因此这会从数组开头开始，提取 `$max` 个元素。然后，在返回结果之前，将字符串\
  \ \"and one other\" 拼接到结果后面。\n\n4. 保存脚本并再次测试。如果使用 `$threesome` 进行测试，你将得到与上一屏幕截图相同的结果。`$fab_four`\
  \ 的结果也和之前一样。现在使用 `$too_many` 进行测试，会产生以下结果：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figr_HTML.jpg](img/332054_4_En_8_Figr_HTML.jpg)\n\
  \n5. 超出 `$max` 的多个元素也以类似方式处理。但是，`case` 语句不能以比较运算符开头。它必须是一个完整的表达式。在第 7 步的代码之后立即插入以下代码：\n\
  \n```\ncase count($array) > $max + 1:\nreturn implode(', ', array_slice($array,\
  \ 0, $max)) . ' and others';\n```\n\n这里的重要之处在于，你需要再次将 `$array` 传递给 `count()` 函数以获取数组中的元素数量。你不能使用以下代码：\n\
  \n```\n// 这会触发解析错误\ncase > $max + 1:\n```\n\n6. 保存脚本并再次运行。对于 `$too_many`，结果保持不变。但是，将\
  \ `with_commas()` 的第二个参数更改为一个较小的数字，如下所示：\n\n```\necho with_commas($too_many, 3);\n\
  ```\n\n这将按如下方式更改输出：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figs_HTML.jpg](img/332054_4_En_8_Figs_HTML.jpg)\n\
  \n7. 你可以在 `ch08` 文件夹中的 `commas_02.php` 查看完成的代码。\n\n## 排序数组\n\n表 8-2 列出了许多用于排序数组的内置\
  \ PHP 函数。\n\n**表 8-2. 数组排序函数**\n\n| 函数 | 描述 |\n| --- | --- |\n| `sort()` | 按升序排序（从低到高）\
  \ |\n| `rsort()` | 按降序排序（从高到低） |\n| `asort()` | 按值升序排序，保持键值对应关系 |\n| `arsort()`\
  \ | 按值降序排序，保持键值对应关系 |\n| `ksort()` | 按键升序排序，保持键值对应关系 |\n| `krsort()` | 按键降序排序，保持键值对应关系\
  \ |\n| `natsort()` | 按“自然顺序”排序值，保持键值对应关系 |\n| `natcasesort()` | 按不区分大小写的“自然顺序”排序值，保持键值对应关系\
  \ |\n| `usort()` | 使用回调比较函数按值排序 |\n| `uasort()` | 使用回调比较函数按值排序，保持键值对应关系 |\n| `uksort()`\
  \ | 使用回调比较函数按键排序，保持键值对应关系 |\n| `array_multisort()` | 对多个或多维数组进行排序 |\n\n表 8-2 中的所有函数都会影响原始数组，并且仅根据操作是否成功返回\
  \ `true` 或 `false`。前六个函数（一直到 `krsort()`）可以将表 8-3 中列出的 PHP 常量作为可选的第二个参数来修改排序顺序。\n\
  \n**表 8-3. 修改排序顺序的常量**\n\n| 常量 | 描述 |\n| --- | --- |\n| `SORT_REGULAR` | 比较项时不更改其类型（默认）\
  \ |\n| `SORT_NUMERIC` | 将项作为数字进行比较 |\n| `SORT_STRING` | 将项作为字符串进行比较 |\n| `SORT_LOCALE_STRING`\
  \ | 基于当前区域设置比较项 |\n| `SORT_NATURAL` | 按“自然顺序”比较项 |\n| `SORT_FLAG_CASE` | 可与 `SORT_STRING`\
  \ 或 `SORT_NATURAL` 结合使用，使用竖线（`|`）进行不区分大小写的字符串排序 |\n\n这两个按“自然顺序”排序值的函数和常量，会以人类的方式对包含数字的字符串进行排序。在\
  \ `ch08` 文件夹中的 `natsort.php` 里有一个示例，它使用 `sort()` 和 `natsort()` 对以下数组进行排序：\n\n```\n\
  $images = ['image10.jpg', 'image9.jpg', 'image2.jpg'];\n```\n\n以下屏幕截图显示了不同的结果： \
  \ \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figt_HTML.jpg](img/332054_4_En_8_Figt_HTML.jpg)\
  \  \n使用 `sort()` 时，顺序不仅违反直觉，而且索引也被重新编号了。使用 `natsort()` 时，顺序对人类更友好，并且原始索引得以保留。\n\n\
  **提示**  \n`natsort()` 和 `natcasesort()` 函数没有对应的逆序排序函数，但你可以将结果传递给内置的 `array_reverse()`\
  \ 函数。这将返回一个元素顺序相反的新数组，而不进行排序。与表 8-2 中的函数不同，原始数组不会改变。关联数组键得以保留，但索引数组会被重新编号。为了防止索引数组被重新编号，请将布尔值\
  \ `true` 作为第二个（可选）参数传递。\n\n\n\n在`usort()`、`uasort()` 和 `uksort()` 中使用的回调比较函数必须接受两个参数，并返回一个小于、等于或大于零的整数，具体取决于第一个参数是小于、等于还是大于第二个参数。PHP\
  \ Solution 8-5 展示了如何使用 PHP 7 太空船操作符实现这一点。\n\n## PHP Solution 8-5：使用太空船操作符进行自定义排序\n\
  \n表 8-2 中的前八个排序函数在处理大部分排序操作时表现出色。然而，它们无法涵盖所有场景。这时，自定义排序函数就派上了用场。本 PHP 解决方案展示了 PHP\
  \ 7 太空船操作符如何简化自定义排序。\n\n1.  打开 `ch08` 文件夹中的 `spaceship_01.php`。其中包含一个音乐播放列表的多维数组以及一个将其显示为无序列表的循环：\n\
  \n    ```php\n    $playlist = [\n        ['artist' => 'Jethro Tull', 'track' =>\
  \ 'Locomotive Breath'],\n        ['artist' => 'Dire Straits', 'track' => 'Telegraph\
  \ Road'],\n        ['artist' => 'Mumford and Sons', 'track' => 'Broad-Shouldered\
  \ Beasts'],\n        ['artist' => 'Ed Sheeran', 'track' => 'Nancy Mulligan'],\n\
  \        ['artist' => 'Dire Straits', 'track' => 'Sultans of Swing'],\n        ['artist'\
  \ => 'Jethro Tull', 'track' => 'Aqualung'],\n        ['artist' => 'Mumford and Sons',\
  \ 'track' => 'Thistles and Weeds'],\n        ['artist' => 'Ed Sheeran', 'track'\
  \ => 'Eraser']\n    ];\n    echo '';\n    foreach ($playlist as $item) {\n     \
  \   echo \"{$item['artist']}: {$item['track']}\";\n    }\n    echo '';\n    ```\n\
  \n2.  在循环之前插入一行，使用 `asort()` 对数组进行排序：\n\n    ```php\n    asort($playlist);\n   \
  \ ```\n\n3.  保存文件，并将其加载到浏览器中。如图 8-1 所示，`asort()` 不仅按字母顺序对艺术家进行了排序；与每位艺术家关联的曲目也按字母顺序排列了。\n\
  \n    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig1_HTML.jpg](img/332054_4_En_8_Fig1_HTML.jpg)\n\
  \n    **图 8-1.** `asort()` 函数轻松完成了多维关联数组值的排序工作。\n\n4.  然而，假设你想按曲目名称的字母顺序对播放列表进行排序。为此，你需要一个自定义排序。将你在步骤\
  \ 2 中插入的代码行替换为以下内容：\n\n    ```php\n    usort($playlist, function ($a, $b) {\n  \
  \      return $a['track'] <=> $b['track'];\n    });\n    ```\n\n    这使用了 `usort()`\
  \ 函数以及一个匿名回调函数。回调函数的两个参数（`$a` 和 `$b`）代表你想要比较的两个数组元素。在函数体内，当前曲目元素的值使用 PHP 7 太空船操作符进行比较，该操作符返回一个小于、等于或大于零的整数，具体取决于左操作数是小于、等于还是大于右操作数。回调函数返回比较结果。\n\
  \n5.  为了使自定义排序的结果更清晰，调换每个列表项中显示的艺术家和曲目的顺序：\n\n    ```php\n    echo \"{$item['track']}:\
  \ {$item['artist']}\";\n    ```\n\n6.  保存文件并在浏览器中重新加载。曲目现在按字母顺序列出（见图 8-2）。\n\n \
  \   ![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig2_HTML.jpg](img/332054_4_En_8_Fig2_HTML.jpg)\n\
  \n    **图 8-2.** 播放列表现已按曲目名称的字母顺序排序。\n\n7.  要反转自定义排序的顺序，交换太空船操作符两侧操作数的顺序：\n\n  \
  \  ```php\n    usort($playlist, function ($a, $b) {\n        return $b['track']\
  \ <=> $a['track'];\n    });\n    ```\n\n8.  你可以将代码与 `ch08` 文件夹中的 `spaceship_02.php`\
  \ 进行核对。\n\n## 使用 `array_multisort()` 进行复杂排序\n\n`array_multisort()` 函数有两个用途，即：\n\n\
  *   排序多个需要保持同步的数组\n*   按一个或多个维度对多维数组进行排序\n\n`multisort_01.php` 中的代码包含一个在重新排序时需要保持同步的数组示例。`$states`\
  \ 数组按字母顺序列出各州，而 `$population` 数组包含以相同顺序列出的每个州的人口数据：\n\n```php\n$states = ['Arizona',\
  \ 'California', 'Colorado', 'Florida', 'Maryland', 'New York', 'Vermont'];\n$population\
  \ = [7171646, 39557045, 5695564, 21299325, 6042718, 19542209, 626299];\n```\n\n\
  然后，一个循环显示每个州的名称及其人口：\n\n```php\necho '';\nfor ($i = 0, $len = count($states); $i\
  \ < $len; $i++) {\n    echo \"<li>$states[$i]: $population[$i]</li>\";\n}\necho\
  \ '';\n```\n\n图 8-3 显示了输出结果。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig3_HTML.jpg](img/332054_4_En_8_Fig3_HTML.jpg)\n\
  \n**图 8-3.** 尽管州和人口数据在不同的数组中，但它们的顺序是正确的。\n\n然而，如果你想要按升序或降序对人口数据重新排序，则两个数组需要保持同步。\n\
  \n`multisort_02.php` 中的代码展示了如何使用 `array_multisort()` 实现这一点：\n\n```php\narray_multisort($population,\
  \ SORT_ASC, $states);\n```\n\n`array_multisort()` 的第一个参数是你要首先排序的数组。其后可以跟两个可选参数：使用常量\
  \ `SORT_ASC` 或 `SORT_DESC` 分别指定升序和降序的排序方向，以及使用表 8-3 中列出的常量之一指定排序类型。其余参数是你要与第一个数组同步排序的其他数组。每个后续数组后面也可以跟上用于排序方向和类型的可选参数。\n\
  \n在此示例中，`$population` 数组按升序排序，`$states` 数组与之同步重新排序。如图 8-4 所示，人口数据与州名称之间的正确关系得以保持。\n\
  \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig4_HTML.jpg](img/332054_4_En_8_Fig4_HTML.jpg)\n\
  \n**图 8-4.** 人口数字现在按升序排列，并与之保持了正确的州名称。\n\n下一个 PHP 解决方案展示了一个使用 `array_multisort()`\
  \ 按多个维度对多维数组进行重新排序的示例。\n\n## PHP Solution 8-6：使用 `array_multisort()` 排序多维数组\n\n\
  在前一个 PHP 解决方案中，我们使用了太空船操作符通过比较分配给单个键的值来自定义排序多维数组。在本解决方案中，我们将使用 `array_multisort()`\
  \ 来执行更复杂的排序操作。\n\n1.  `multisort_03.php` 中的代码包含了来自 PHP Solution 8-5 的 `$playlist`\
  \ 多维数组的更新版本。每个子数组中都添加了一个评级（rating）键，如下所示：\n\n    ```php\n    $playlist = [\n   \
  \     ['artist' => 'Jethro Tull', 'track' => 'Locomotive Breath', 'rating' => 8],\n\
  \        ['artist' => 'Dire Straits', 'track' => 'Telegraph Road', 'rating' => 7],\n\
  \        ['artist' => 'Mumford and Sons', 'track' => 'Broad-Shouldered Beasts',\
  \ 'rating' => 9],\n        ['artist' => 'Ed Sheeran', 'track' => 'Nancy Mulligan',\
  \ 'rating' => 10],\n        ['artist' => 'Dire Straits', 'track' => 'Sultans of\
  \ Swing', 'rating' => 9],\n        ['artist' => 'Jethro Tull', 'track' => 'Aqualung',\
  \ 'rating' => 10],\n        ['artist' => 'Mumford and Sons', 'track' => 'Thistles\
  \ and Weeds', 'rating' => 6],\n        ['artist' => 'Ed Sheeran', 'track' => 'Eraser',\
  \ 'rating' => 8]\n    ];\n    ```\n\n2.  正如之前的解决方案所展示的，使用 `usort()` 和太空船操作符按曲目名称的字母顺序对数组排序很容易。我们也可以按评级对数组排序；但同时按评级和曲目排序则需要不同的方法。\n\
  \n\n\n"
- "# 按多条件排序多维数组\n\n按多条件排序多维数组的第一步是将待排序的值提取到独立的数组中。使用`array_column()`函数可以轻松实现，该函数接受两个参数：顶层数组和要从每个子数组中提取的键。在`$playlist`数组（位于`multisort_04.php`中）之后添加以下代码：\n\
  \n```\n$tracks = array_column($playlist, 'track');\n$ratings = array_column($playlist,\
  \ 'rating');\nprint_r($tracks);\nprint_r($ratings);\n```\n\n3. 保存文件并在浏览器中测试。如图 8-5\
  \ 所示，多维数组中的值已被提取到两个索引数组中。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig5_HTML.jpg](img/332054_4_En_8_Fig5_HTML.jpg)\n\
  \n**图 8-5.** 排序所需的值已被提取到独立的索引数组中\n\n4. 我们不再需要检查`$tracks`和`$ratings`数组的内容，因此注释掉或删除两处`print_r()`调用。\n\
  \n5. 现在，我们可以使用`array_multisort()`对多维数组进行排序。传递给该函数的参数顺序决定了最终排序的优先级。我希望播放列表先按评分降序排列，然后按曲目名称字母顺序排列。因此，第一个参数需要是`$ratings`数组，后跟排序方向；然后是`$tracks`数组，后跟排序方向；最后是`$playlist`，即多维数组。\n\
  \n在脚本底部添加以下代码：\n\n```\narray_multisort($ratings, SORT_DESC, $tracks, SORT_ASC, $playlist);\n\
  ```\n\n6. 多维数组现在已从最高评分到最低评分重新排序，评分相同的曲目按字母顺序排列。我们可以通过如下方式遍历`$playlist`数组来验证（代码位于`multisort_05.php`中）：\n\
  \n```\necho '<ul>';\nforeach ($playlist as $item) {\n    echo \"<li>{$item['rating']}\
  \ {$item['track']} by {$item['artist']}</li>\";\n}\necho '</ul>';\n```\n\n图 8-6\
  \ 证明了它已生效。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig6_HTML.jpg](img/332054_4_En_8_Fig6_HTML.jpg)\n\
  \n**图 8-6.** 多维数组已按多条件排序\n\n> **注意：** 在上述 PHP 解决方案中，`array_column()`与关联子数组一起使用，因此第二个参数是一个包含要提取值的键的字符串。该函数也能够从索引子数组中提取值。只需将要提取值的索引作为第二个参数传递即可。你将在下一章的\
  \ PHP 解决方案 9-6“调整类以处理多文件上传”中看到一个实际示例。\n\n"
- "# PHP 解决方案 8-7：查找数组的所有排列\n\n此 PHP 解决方案改编自 Python。它在递归生成器（参见第 4 章的“生成器——一种特殊的持续产出函数”）内部使用`array_slice()`和`array_merge()`函数，将数组拆开并以不同顺序重新合并元素。它是递归的，因为生成器重复调用自身，直到处理完所有元素。\n\
  \n1. 生成器的定义如下所示（代码位于`ch08`文件夹的`permutations.php`中）：\n\n```\nfunction permutations(array\
  \ $elements) {\n    $len = count($elements);\n    if ($len <= 1) {\n        yield\
  \ $elements;\n    } else {\n        foreach(permutations(array_slice($elements,\
  \ 1)) as $permutation) {\n            foreach(range(0, $len - 1) as $i) {\n    \
  \            yield array_merge(\n                    array_slice($permutation, 0,\
  \ $i),\n                    [$elements[0]],\n                    array_slice($permutation,\
  \ $i)\n                );\n            }\n        }\n    }\n}\n```\n\n第 7 行开始的`foreach`循环使用`array_slice()`函数递归调用生成器，提取除第一个元素之外的所有元素。在\
  \ PHP 解决方案 8-4“以逗号连接数组”中使用`array_slice()`时，我们传递了三个参数：数组、起始元素的索引以及要提取的元素数量。在这里，仅使用了前两个参数。当省略`array_slice()`的最后一个参数时，它会返回从起始点到数组末尾的所有元素。因此，如果字母`ABC`作为数组传递给它，`array_slice($elements,\
  \ 1)`将返回`BC`，这在循环内部被称为`$permutation`。\n\n嵌套的`foreach`循环使用`range()`函数创建一个从 0 到`$elements`数组长度减\
  \ 1 的数字数组。每次循环运行时，生成器都会使用`array_merge()`和`array_slice()`的组合产生一个重新排序的数组。第一次循环运行时，计数器`$i`为`0`，因此`array_slice($permutation,\
  \ 0, 0)`从`BC`中提取不到任何内容。`$elements[0]`为`A`，而`array_slice($permutation, 0)`为`BC`。结果，原始数组`ABC`被产出。\n\
  \n下次循环运行时，`$i`为`1`，因此从`$permutation`中提取`B`，`$elements[0]`仍然是`A`，而`array_slice($permutation,\
  \ 1)`为`C`，产出的结果为`BAC`，以此类推。\n\n2. 要使用`permutations()`生成器，将一个索引数组作为参数传递，并将生成器赋值给一个变量，如下所示：\n\
  \n```\n$perms = permutations(['A', 'B', 'C']);\n```\n\n3. 然后，你可以使用`foreach`循环与生成器一起获取数组的所有排列（代码位于`permutations.php`中）：\n\
  \n```\nforeach ($perms as $perm) {\n    echo implode(' ', $perm) . '<br>';\n}\n\
  ```\n\n这将显示 ABC 的所有排列，如下面的截图所示：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figu_HTML.jpg](img/332054_4_En_8_Figu_HTML.jpg)\n\
  \n"
- "# 处理数组数据\n\n在本节中，我们将研究两个用于处理存储在数组中的数据的 PHP 解决方案：从多维关联数组自动构建 HTML 嵌套列表，以及从 JSON\
  \ 源中提取数据。\n\n## PHP 解决方案 8-8：自动构建嵌套列表\n\n此 PHP 解决方案重新探讨了标准 PHP 库（SPL）中的`RecursiveIteratorIterator`，我们在第\
  \ 7 章的“使用 FilesystemIterator 检查文件夹内容”中使用了它来深入文件系统。像`RecursiveIteratorIterator`这样的类的一个有用特性是，你可以通过扩展它们来根据自己的需求进行调整。当你扩展一个类时，**子类**——通常被称为**子类**——会继承其父类的所有公共和受保护的方法和属性。你可以添加新的方法和属性，或通过覆盖来改变父类方法的工作方式。`RecursiveIteratorIterator`暴露了几个公共方法，这些方法可以被覆盖，以便在遍历多维关联数组时在数组键和值之间注入\
  \ HTML 标签。\n\n> **注意：** 类可以将方法和属性声明为公共、受保护或私有。公共意味着可以在类定义外部访问它们。受保护意味着只能在该类或其子类内部访问。私有意味着只能在该类定义内部访问，而不能在子类中访问。\n\
  \n在构建 PHP 脚本之前，让我们检查一下 HTML 中嵌套列表的结构。下图展示了一个简单的嵌套列表：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figv_HTML.jpg](img/332054_4_En_8_Figv_HTML.jpg)\n\
  \nHTML 代码如下所示：\n\n```\n<ul>\n  <li>标签 1\n    <ul>\n      <li>项目 1</li>\n      <li>项目\
  \ 2</li>\n    </ul>\n  </li>\n</ul>\n```\n\n\n\n"
- "# Markdown 文档排版结果\n\n需要注意的关键点是，缩进列表是嵌套在顶层列表项内部的。标签 1 的闭合 `</li>` 标签位于嵌套列表的闭合 `</ul>`\
  \ 标签之后。手工编写 HTML 嵌套列表容易出错，因为很难追踪列表项的起始和结束位置。在使用 PHP 自动化处理嵌套列表时，我们必须牢记这种结构。\n\n1.\
  \ 在 `ch08` 文件夹中创建一个名为 `ListBuilder.php` 的文件。如果你只想研究完成的代码，它位于 `ListBuilder_end.php`\
  \ 中，并附有注释。\n\n2. 定义一个名为 `ListBuilder` 的类，使其继承 `RecursiveIteratorIterator`，并为待处理的数组和输出的\
  \ HTML 创建两个受保护的属性：\n\n```\nclass ListBuilder extends RecursiveIteratorIterator\n\
  {\nprotected $array;\nprotected $output = '';\n}\n```\n\n`$output` 属性被初始化为一个空字符串。\n\
  \n3. 大多数类都有一个构造方法，用于初始化类并接受任意参数。`ListBuilder` 类需要一个数组作为参数，并对其进行预处理。将以下代码添加到类定义中（所有\
  \ `ListBuilder` 的代码需放在步骤 2 中代码的闭合花括号之前）：\n\n```\npublic function __construct(array\
  \ $array) {\n$this->array = new RecursiveArrayIterator($array);\n// 调用 RecursiveIteratorIterator\
  \ 的父构造方法\nparent::__construct($this->array, parent::SELF_FIRST);\n}\n```\n\n所有类的构造方法名称相同，并且以双下划线开头。该构造方法接受一个参数：将被转换为嵌套无序列表的数组。\n\
  \n要使用 SPL 迭代器处理数组，必须先将数组转换为迭代器，因此构造方法中的第一行创建了一个新的 `RecursiveArrayIterator` 实例，并将其赋值给\
  \ `ListBuilder` 的 `$array` 属性。\n\n由于我们重写了 `RecursiveIteratorIterator` 的构造方法，需要调用父构造方法并将\
  \ `$array` 属性作为第一个参数传递给它。将 `parent::SELF_FIRST` 作为第二个参数调用，可以访问正在处理的数组的键和值。如果没有第二个参数，我们将无法访问这些键。\n\
  \n> **提示：** 你将在第 [9](https://example.org/9) 章和第 [10](https://example.org/10) 章中了解更多关于类和类扩展的内容。\n\
  \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig7_HTML.jpg](img/332054_4_En_8_Fig7_HTML.jpg)\n\
  \n**图 8-7.** `ListBuilder` 继承自 `RecursiveIteratorIterator`，用于自动化地从多维关联数组构建嵌套列表\n\
  \n1. HTML 无序列表以开闭 `<ul>` 标签开始和结束。`RecursiveIteratorIterator` 提供了在循环开始和结束时自动调用的公共方法，因此我们可以重写这些方法，使用组合连接运算符将必要的标签添加到\
  \ `$output` 属性中，如下所示：\n\n```\npublic function beginIteration() {\n$this->output\
  \ .= '';\n}\npublic function endIteration() {\n$this->output .= '';\n}\n```\n\n\
  2. 在每个子数组的开始和结束时，也会自动调用两个公共方法。我们可以利用这两个方法插入嵌套列表的起始 `<ul>` 标签，以及关闭嵌套列表及其父列表项：\n\n\
  ```\npublic function beginChildren() {\n$this->output .= '';\n}\npublic function\
  \ endChildren() {\n$this->output .= '';\n}\n```\n\n3. 要处理每个数组元素，我们可以重写自动调用的 `nextElement()`\
  \ 公共方法……是的，你猜对了。这部分稍微复杂一些，因为我们需要检查当前元素是否包含子数组。如果包含，需要添加一个起始 `<li>` 标签和子数组的键。否则，需要在\
  \ `<li>` 标签之间添加当前值，如下所示：\n\n```\npublic function nextElement() {\n// 检查是否存在子数组\n\
  if (parent::callHasChildren()) {\n// 显示子数组的键\n$this->output .= '' . self::key();\n\
  } else {\n// 显示当前数组元素\n$this->output .= '' . self::current() . '';\n}\n}\n```\n\n\
  这段代码大部分不言自明。条件语句调用了父类的——换句话说，就是 `RecursiveIteratorIterator` 的——`callHasChildren()`\
  \ 方法。如果当前元素包含子元素（即子数组），则返回 `true`。如果包含，则将起始 `<li>` 标签连接到 `$output` 属性，后面跟上 `self::key()`。这会调用\
  \ `ListBuilder` 的 `key()` 方法（该方法继承自 `RecursiveIteratorIterator`），以获取当前键的值。这里没有闭合的\
  \ `</li>` 标签，因为要等到子数组处理完成后才会添加。\n\n`else` 子句在当前元素没有子元素时执行。它调用了 `current()` 方法获取当前元素的值，该值被包裹在一对\
  \ `<li>` 标签之间。\n\n4. 要显示嵌套列表，我们需要遍历数组并返回 `$output` 属性。我们可以使用魔术方法 `__toString()`。像这样定义它：\n\
  \n```\npublic function __toString() {\n// 生成列表\n$this->run();\nreturn $this->output;\n\
  }\n```\n\n5. 要完成 `ListBuilder` 类的定义，像这样定义 `run()` 方法：\n\n```\nprotected function\
  \ run() {\nself::beginIteration();\nwhile (self::valid()) {\nself::next();\n}\n\
  self::endIteration();\n}\n```\n\n这段代码简单地调用了从 `RecursiveIteratorIterator` 继承的四个方法。它们首先调用\
  \ `beginIteration`，然后通过 `while` 循环遍历数组，最后结束迭代。\n\n6. 要测试 `ListBuilder`，打开 `ch08`\
  \ 文件夹中的 `multidimensional_01.php` 文件。其中包含一个名为 `$wines` 的多维关联数组。引入 `ListBuilder`\
  \ 的定义，然后通过添加以下代码生成输出并显示（完成的代码位于 `multidimensional_02.php` 中）：\n\n```\nrequire './ListBuilder.php';\n\
  echo new ListBuilder($wines);\n```\n\n图 8-7 显示了结果。\n\n## PHP 解决方案 8-9：从 JSON 提取数据\n\
  \n在上一章中，我们使用 `SimpleXML` 解析了 RSS 新闻源。RSS 和其他形式的 XML 在分发数据时的缺点是，包裹数据的标签使数据变得冗长。JavaScript\
  \ 对象表示法（JSON）因其简洁性而越来越多地用于在线数据分发。简洁的格式使 JSON 下载速度更快，且占用更少的带宽，但其缺点是不易阅读。\n\n本 PHP\
  \ 解决方案从旧金山开放数据（[`https://datasf.org/opendata/`](https://datasf.org/opendata/)）访问一个\
  \ JSON 源，将其转换为数组，构建一个数据的多维关联数组，然后进行过滤以提取所需信息。听起来工作量很大，但实际上涉及的代码相对较少。\n\n1. 本 PHP\
  \ 解决方案的 JSON 数据源位于 `ch08/data` 文件夹中的 `film_locations.json` 文件中。或者，你也可以从 [`https://data.sfgov.org/api/views/yitu-d5am/rows.json?accessType=DOWNLOAD`](https://data.sfgov.org/api/views/yitu-d5am/rows.json%3FaccessType%3DDOWNLOAD)\
  \ 获取最新版本。如果你访问的是在线版本，请将其保存为本地硬盘上的 `.json` 文件，以避免反复访问远程源。\n\n\n\n## 2.  此数据源包含由旧金山电影委员会编制的市内电影取景地信息。处理\
  \ JSON 的挑战之一在于定位所需信息，因为缺乏通用的命名规范。尽管此数据源已按行缩进格式化，但 JSON 通常为保持紧凑而省略空白。将其转换为多维关联数组可简化识别过程。请在\
  \ `ch08` 文件夹中创建一个名为 `json.php` 的 PHP 文件，并添加以下代码（该代码位于 `json_01.php` 中）：\n\n```\n\
  $json = file_get_contents('./data/film_locations.json');\n$data = json_decode($json,\
  \ true);\necho '';\nprint_r($data);\necho '';\n```\n\n此代码使用 `file_get_contents()`\
  \ 从数据文件中获取原始 JSON，将其转换为多维关联数组，然后显示出来。向 `json_decode()` 传入 `true` 作为第二个参数，会将 JSON\
  \ 对象转换为 PHP 关联数组。\n\n## 3.  保存文件并在浏览器中运行该脚本。`$data` 数组非常庞大，包含超过 1,600 部电影的详细信息。用\
  \ `<pre>` 标签包裹 `print_r()` 可以轻松检查其结构，从而定位重要数据所在位置。如图 8-8 所示，顶层数组名为 `meta`，其内嵌套了一个名为\
  \ `view` 的子数组，而 `view` 中又包含了一个名为 `columns` 的子数组。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig8_HTML.jpg](img/332054_4_En_8_Fig8_HTML.jpg)\n\
  \n图 8-8. 将 JSON 数据源转换为关联数组可简化数据定位过程\n\n`columns` 子数组包含一个索引数组；其第一个元素内部又是一个包含名为 `name`\
  \ 键的数组。当您继续向下滚动，找到名为 `data` 的数组时（见图 8-9），其意义便会清晰明了。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig9_HTML.jpg](img/332054_4_En_8_Fig9_HTML.jpg)\n\
  \n图 8-9. 电影数据为了紧凑而存储在索引数组中\n\n这里存储了所有关键信息。它包含一个拥有超过 1,600 个元素的索引子数组，其中每个元素又包含另一个具有\
  \ 19 个元素的索引数组。数据并非重复列名数千次，而是映射到图 8-8 中标识的名称数组。要提取所需信息，需要为 `data` 数组中的每部电影构建一个关联数组。\n\
  \n## 1.  我们可以使用 PHP 解决方案 8-6“使用 `array_multisort()` 对多维数组排序”中遇到的 `array_column()`\
  \ 函数来获取列名。然而，`name` 元素深藏在步骤 2 中存储为 `$data` 的顶层数组中。图 8-8 中的缩进有助于找到正确的子数组作为第一个参数传入。请向脚本中添加以下代码（该代码位于\
  \ `json_02.php` 中）：\n\n```\n$col_names = array_column($data['meta']['view']['columns'],\
  \ 'name');\n```\n\n## 2.  使用 `print_r()` 检查是否已提取正确的值，如图 8-10 所示。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig10_HTML.jpg](img/332054_4_En_8_Fig10_HTML.jpg)\n\
  \n图 8-10. 列名标识了每个电影取景地存储的信息\n\n## 3.  现在已获得列名，我们可以遍历 data 子数组，使用 `array_combine()`\
  \ 将每个元素转换为关联数组。请向脚本中添加以下代码：\n\n```\n$locations = [];\nforeach ($data['data'] as\
  \ $datum) {\n    $locations[] = array_combine($col_names, $datum);\n}\n```\n\n这段代码将\
  \ `$locations` 初始化为空数组，然后遍历 data 子数组，将 `$col_names` 和当前值数组传递给 `array_combine()`。这使得相应的列名被分配为每个值的键。data\
  \ 的缩进级别（见图 8-9）表明 data 子数组与 `meta` 处于同一层级（见图 8-8）。\n\n## 4.  `$locations` 现在包含一个关联数组的数组，每个关联数组都包含\
  \ JSON 数据源中列出的超过 1,600 个电影取景地的详细信息。要定位特定信息，我们可以使用 `array_filter()` 函数，该函数接受一个数组和一个回调函数作为参数，并返回过滤后的新数组。\n\
  \n回调函数接受一个参数，即当前被过滤器检查的元素。这意味着过滤条件需要在回调函数中硬编码。为了使回调函数更具适应性，我将使用一个能够从全局作用域继承变量的匿名函数。按如下方式定义搜索词和回调函数：\n\
  \n```\n$search = 'Alcatraz';\n$getLocation = function ($location) use ($search)\
  \ {\n    return (stripos($location['Locations'], $search) !== false);\n};\n```\n\
  \n匿名函数被赋值给一个变量。它接受一个参数，但通过 `use` 关键字访问 `$search` 变量。在函数内部，`stripos()` 函数对当前数组的 `Locations`\
  \ 元素执行不区分大小写的搜索。由于 `stripos()` 返回搜索词被发现的位置，如果搜索词位于开头（位置 `0`），结果会是假阴性，因此我们需要确保返回值不是布尔值\
  \ `false`。\n\n## 5.  现在我们可以过滤 `$locations` 数组并显示结果，如下所示（完整代码位于 `json_03.php` 中）：\n\
  \n```\n$filtered = array_filter($locations, $getLocation);\necho '';\nforeach ($filtered\
  \ as $item) {\n    echo \"{$item['Title']} ({$item['Release Year']}) filmed at {$item['Locations']}\"\
  ;\n}\necho '';\n```\n\n## 6.  保存脚本并在浏览器中测试。您应该会看到如图 8-11 所示的结果。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig11_HTML.jpg](img/332054_4_En_8_Fig11_HTML.jpg)\n\
  \n图 8-11. 信息已从 JSON 数据源中超过 1,600 条记录中筛选出来\n\n## 7.  将 `$search` 的值更改为旧金山的其他地点名称，例如\
  \ Presidio 或 Embarcadero，以查看在那里拍摄的电影名称。\n\n"
- "# 自动将数组元素赋值给变量\n\n毫无疑问，关联数组非常有用，但它们的缺点是在输入和嵌入双引号字符串时比较繁琐。因此，通常会将关联数组元素赋值给简单变量，如下所示：\n\
  \n```\n$name = $_POST['name'];\n$email = $_POST['email'];\n$message = $_POST['message'];\n\
  ```\n\n然而，有一些方法可以简化此过程，如下所述。\n\n## 使用 `extract()` 函数\n\n`extract()` 函数最基本的形式是根据关联数组的键名，自动将数组的值赋给变量。换句话说，您*可以*通过简单地执行以下操作，达到与上述三行代码相同的结果：\n\
  \n```\nextract($_POST);\n```\n\n#### 注意\n使用 `extract()` 处理来自用户输入（例如 `$_POST` 或 `$_GET`\
  \ 数组）的未过滤数据，被认为是一项重大的安全风险。恶意攻击者可能会尝试注入变量，覆盖您已经定义的值。\n\n\n\n在最简单的使用形式下，`extract()`\
  \ 函数是一种粗放的工具。除非你确切知道关联数组中的键，否则会有覆盖现有变量的风险。为克服这一问题，该函数可以接受两个可选参数：一个是八个 PHP 常量之一，用于决定在命名冲突时如何处理；另一个是可用于为变量名添加前缀的字符串。你可以在在线文档\
  \ [`www.php.net/manual/en/function.extract.php`](http://www.php.net/manual/en/function.extract.php)\
  \ 中找到这些选项的详细信息。\n\n尽管可选参数优化了 `extract()` 的行为，但使用它们却降低了函数本身提供的便利性。`extract()` 还有另一个缺点：它无法处理包含变量名中非法字符的键。例如，以下是一个完全有效的关联数组：\n\
  \n```\n$author = ['first name' => 'David', 'last name' => 'Powers'];\n```\n\n尽管键包含空格，`$author['first\
  \ name']` 和 `$author['last name']` 仍然是有效的。然而，将 `$author` 数组传递给 `extract()` 将导致不会创建任何变量。这些局限性大大降低了\
  \ `extract()` 的价值。\n\n## 使用 `list()`\n\n虽然括号让 `list()` 看起来像一个函数，但从技术上讲，它并不是；它是一个\
  \ PHP 语言结构，用于在单次操作中将一个变量列表赋值给一个值的数组。它自 PHP 4 起就已存在，但在 PHP 7.1 及更高版本中得到了显著增强。\n\n\
  在 PHP 7.1 之前，`list()` 仅适用于索引数组。你按值在数组中出现的顺序列出要赋值的变量名。以下 `list_01.php` 中的示例展示了其工作原理：\n\
  \n```\n$person = ['David', 'Powers', 'London'];\nlist($first_name, $last_name, $city)\
  \ = $person;\n// 输出 \"David Powers lives in London.\"\necho \"$first_name $last_name\
  \ lives in $city.\";\n```\n\n在 PHP 7.1 及更高版本中，`list()` 也可以用于关联数组。其语法与创建字面关联数组的语法类似。使用双箭头运算符将关联数组键赋值给一个变量。由于每个数组键标识其关联的值，它们不必按数组中的顺序列出，也不必使用所有键，如下面\
  \ `list_02.php` 中的示例所示：\n\n```\n$person = [\n'first name' => 'David',\n'last name'\
  \ => 'Powers',\n'city' => 'London',\n'country' => 'the UK'];\nlist('country' =>\
  \ $country,\n'last name' => $surname,\n'first name' => $name) = $person;\n// 输出\
  \ \"David Powers lives in the UK.\"\necho \"$name $surname lives in $country.\"\
  ;\n```\n\n### 对 `list()` 使用数组简写语法\n\nPHP 7.1 的另一个增强是可以在 `list()` 中使用数组简写语法。前两个示例中的变量赋值可以简化为如下形式（完整代码在\
  \ `list_03.php` 和 `list_04.php` 中）：\n\n```\n[$first_name, $last_name, $city] = $person;\n\
  ['country' => $country, 'last name' => $surname, 'first name' => $name] = $person;\n\
  ```\n\n## PHP 解决方案 8-10：使用生成器处理 CSV 文件\n\n本 PHP 解决方案改编了 PHP 解决方案 7-2“从 CSV 文件中提取数据”中的脚本，以使用生成器处理\
  \ CSV 文件，并使用 `list()` 数组简写将每行生成的数组中的值赋值给变量。\n\n1.  打开 `ch08` 文件夹中的 `csv_processor.php`。它包含一个名为\
  \ `csv_processor()` 的生成器的定义如下：\n\n```\n    // 将 CSV 文件的每一行作为数组生成的生成器\n    function\
  \ csv_processor($csv_file) {\n    if (@!$file = fopen($csv_file, 'r')) {\n    echo\
  \ \"无法打开 $csv_file。\";\n    return;\n    }\n    while (($data = fgetcsv($file))\
  \ !== false) {\n    yield $data;\n    }\n    fclose($file);\n    }\n    ```\n\n\
  \    该生成器接受一个参数，即 CSV 文件的名称。它使用第 7 章中描述的文件操作函数以读取模式打开文件。如果文件无法打开，错误控制运算符（`@`）会抑制任何\
  \ PHP 错误消息，显示自定义消息并返回，从而阻止进一步处理文件的尝试。\n\n    假设文件成功打开，`while` 循环将每次向 `fgetcsv()`\
  \ 函数传递一行，该函数将数据作为数组返回，并由生成器生成。当循环结束时，文件被关闭。\n\n    这是一个方便的工具函数，可用于处理任何 CSV 文件。\n\
  \n2.  在 `ch08` 文件夹中创建一个名为 `csv_list.php` 的文件，并包含 `csv_processor.php`：\n\n```\n \
  \   require_once './csv_processor.php';\n    ```\n\n3.  在 `ch08/data` 文件夹中，`scores.csv`\
  \ 包含以下以逗号分隔值存储的数据：\n\n```\n    Home team,Home score,Away team,Away score\n    Arsenal,2,Newcastle\
  \ United,0\n    Tottenham Hotspur,2,Crystal Palace,0\n    Watford,4,Fulham,1\n \
  \   Manchester City,2,Cardiff City,0\n    Southampton,1,Liverpool,3\n    Wolverhampton\
  \ Wanderers,2,Manchester United,1\n    ```\n\n4.  通过创建 `csv_processor()` 生成器的实例来加载\
  \ CSV 文件中的数据，如下所示：\n\n```\n    $scores = csv_processor('./data/scores.csv');\n \
  \   ```\n\n5.  使用生成器最简单的方式是使用 `foreach` 循环。每次循环运行时，生成器将 CSV 文件的当前行作为索引数组生成。使用 `list()`\
  \ 数组简写将数组值赋值给变量，然后使用 `echo` 显示它们，如下所示：\n\n```\n    foreach ($scores as $score) {\n\
  \    [$home, $hscore, $away, $ascore] = $score;\n    echo \"$home $hscore:$ascore\
  \ $away\";\n    }\n    ```\n\n6.  保存文件并通过在浏览器中加载来运行脚本。或者，使用 `ch08` 文件夹中的 `csv_list_01.php`。如图\
  \ 8-12 所示，输出包含 CSV 文件中的列标题行。\n\n    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig12_HTML.jpg](img/332054_4_En_8_Fig12_HTML.jpg)\n\
  \n    **图 8-12.** 生成器处理 CSV 文件的每一行，包括列标题。\n\n7.  使用 `foreach` 循环的问题在于它会处理 CSV 文件中的每一行。我们可以在每次循环运行时递增一个计数器，并使用\
  \ `continue` 关键字跳过第一行。然而，生成器有内置方法，允许我们在要生成的值之间移动并检索当前值。按如下方式编辑步骤 5 中的代码（更改以粗体突出显示）：\n\
  \n```\n    $scores->next();\n    while ($scores->valid()) {\n    [$home, $hscore,\
  \ $away, $ascore] = $scores->current();\n    echo \"$home $hscore:$ascore $away\"\
  ;\n    $scores->next();\n    }\n    ```\n\n    修改后的代码使用 `while` 循环代替了 `foreach`\
  \ 循环，该循环调用生成器的 `valid()` 方法。只要生成器至少还有一个值要生成，该方法就返回 `true`。因此，这具有遍历正在处理的 CSV 文件中每一行的效果。\n\
  \n    要跳过第一行，在循环开始前调用 `next()` 方法。顾名思义，这会将生成器移动到下一个可用的值。在循环内部，`current()` 方法返回当前值，而\
  \ `next()` 方法移动到下一个值，为循环的下一次运行做准备。\n\n8.  保存文件并再次运行脚本（代码在 `csv_list_02.php` 中）。这次只显示比分，如图\
  \ 8-13 所示。\n\n    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig13_HTML.jpg](img/332054_4_En_8_Fig13_HTML.jpg)\n\
  \n    **图 8-13.** 在遍历其余值之前，第一行已被跳过。\n\n\n\n"
- "# 使用展开运算符从数组中解包参数\n\n第 4 章简要介绍的展开运算符（`...`）有两个作用，即：\n\n- 在函数定义中使用时，它将多个参数转换为可在函数内部使用的数组。\n\
  - 在调用函数时，它会解包参数数组，并将其应用于函数的参数。\n\n第 4 章的示例演示了展开运算符的第一种用法。以下函数定义允许向函数传递任意数量的参数，并在函数内部将其作为数组处理：\n\
  \n```\nfunction addEm(...$nums) {\n    return array_sum($nums);\n}\n```\n\n展开运算符的第二种用法则相反。它不是将任意数量的参数转换为数组，而是将数组的元素视为单独传递给函数。以下\
  \ PHP 解决方案展示了一个简单示例，说明这如何具有实际价值。\n\n## PHP 解决方案 8-11：使用展开运算符处理 CSV 文件\n\n`fgetcsv()`\
  \ 函数将 CSV 文件中的数据作为索引数组返回。此 PHP 解决方案展示了如何使用展开运算符将数组直接传递给需要多个参数的函数，而无需分离各个元素。它还使用了上一\
  \ PHP 解决方案中描述的 `csv_processor()` 生成器。\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig14_HTML.jpg](img/332054_4_En_8_Fig14_HTML.jpg)\n\
  \n**图 8-14.** 每个数据数组都通过展开运算符直接传递给函数进行处理\n\n1.  在 `ch08` 文件夹中创建一个名为 `csv_splat.php`\
  \ 的文件，并包含 `csv_processor.php`：\n\n    ```\n    require_once './csv_processor.php';\n\
  \    ```\n\n2.  在 `ch08/data` 文件夹中，`weather.csv` 包含以下数据：\n\n    ```\n    City,temp\n\
  \    London,11\n    Paris,10\n    Rome,12\n    Berlin,8\n    Athens,19\n    ```\n\
  \n    温度以摄氏度为单位。为了那些认为水在 32° 而非 0° 结冰的人着想，我们需要以用户友好的方式处理这些数据。\n\n3.  在 `csv_splat.php`\
  \ 中，添加以下函数定义（代码位于 `csv_splat_01.php`）：\n\n    ```\n    function display_temp($city,\
  \ $temp) {\n        $tempF = round($temp/5*9+32);\n        return \"$city: $temp&deg;C\
  \ ($tempF&deg;F)\";\n    }\n    ```\n\n    该函数接受两个参数：城市名称和温度。温度使用标准公式（除以 5，乘以 9，再加\
  \ 32）转换为华氏度，并四舍五入到最接近的整数。\n\n    然后，函数返回一个字符串，包含城市名称和以摄氏度表示的温度，后跟括号中的华氏等效温度。\n\n\
  4.  包含数据的 CSV 文件以一行列标题开头，因此我们需要使用与上一个解决方案相同的技术跳过第一行。将数据加载到 `csv_processor()` 生成器中，并按如下方式跳过第一行：\n\
  \n    ```\n    $cities = csv_processor('./data/weather.csv');\n    $cities->next();\n\
  \    ```\n\n5.  使用 `while` 循环和 `display_temp()` 函数以及展开运算符处理剩余的数据行，如下所示：\n\n    ```\n\
  \    while ($cities->valid()) {\n        echo display_temp(...$cities->current())\
  \ . '';\n        $cities->next();\n    }\n    ```\n\n    与上一个解决方案一样，生成器的 `current()`\
  \ 方法将当前数据行作为数组返回。但这次，不是将每个数组元素赋给变量，而是展开运算符解包数组，并按数组中的相同顺序将值作为参数进行赋值。\n\n    如果你觉得这段代码难以理解，可以先将\
  \ `current()` 方法的返回值赋给一个变量，如下所示：\n\n    ```\n    $data = $cities->current();\n \
  \   echo display_temp(...$data) . '';\n    ```\n\n    在传递给函数的数组参数前加上展开运算符效果与以下代码完全相同（代码位于\
  \ `csv_splat_02.php`）：\n\n    ```\n    [$city, $temp] = $cities->current();\n  \
  \  echo display_temp($city, $temp) . '';\n    ```\n\n    图 8-14 显示了使用这两种技术的结果。\n\
  \n使用展开运算符解包参数数组具有简洁的优点，但较短的代码并不总是可读性最好的，当结果不符合预期时可能会增加调试难度。就个人而言，我认为将数组元素赋给变量，然后显式地将它们作为参数传递是一种更安全的方法。但即使你不使用某种特定技术，理解其工作原理仍然很有用，以防你需要处理他人的代码。\n\
  \n## 章节回顾\n\n处理数组是 PHP 中最常见的任务之一，尤其是在处理数据库时。几乎所有数据库查询的结果都以关联数组的形式返回，因此理解如何处理它们非常重要。在本章中，我们研究了修改数组、合并数组、排序和提取数据。在循环中使用数组时需记住的要点是，PHP\
  \ 始终处理数组的副本，除非你通过引用将值传递到循环中。相比之下，排序函数则作用于原始数组。\n\n你可以在 PHP 在线文档 [`www.php.net/manual/en/ref.array.php`](http://www.php.net/manual/en/ref.array.php)\
  \ 中找到所有数组相关函数的完整详细信息。本章展示了大约一半函数的实际示例，帮助你稳扎稳打，成为 PHP 数组处理方面的专家。\n\n"
- '# 9. 上传文件


  PHP 处理表单的能力不仅限于文本。它还可用于将文件上传到服务器。例如，你可以构建一个房地产网站，让客户上传其房产图片，或者为所有亲朋好友搭建一个上传假日照片的网站。然而，能做某事并不意味着你应该去做。允许他人向你的网站上传内容可能会让你面临各种问题。你需要确保图片尺寸合适、质量过关，并且不包含任何非法内容。你还必须确保上传的文件不包含恶意脚本。换句话说，你需要像保护自己的计算机一样小心地保护你的网站。


  PHP 使得限制接受文件的类型和大小相对简单。但它无法检查内容的适用性。请仔细考虑安全措施，例如通过将上传表单放在受密码保护的区域中，将上传限制为已注册和受信任的用户。


  在学会如何通过第 11 章和第 19 章的 PHP 限制页面访问之前，如果在公共网站上部署，请仅在受密码保护的目录中使用本章的 PHP 解决方案。大多数托管公司通过网站的控制面板提供简单的密码保护。


  本章第一部分致力于理解文件上传的机制，这将有助于理解后面的代码。这是一个相当深入的章节，而不是快速解决方案的集合。但是到本章结束时，你将构建一个能够处理单文件和多文件上传的
  PHP 类。然后，你只需编写几行代码，就可以在任何表单中使用该类。


  你将学习以下内容：


  - 理解 `$_FILES` 数组

  - 限制上传文件的大小和类型

  - 防止文件被覆盖

  - 处理多文件上传




  '
- "# PHP 如何处理文件上传\n\n“上传”一词指将文件从一台计算机移动到另一台计算机，但对于 PHP 而言，实际上只是将文件从一个位置移动到另一个位置。这意味着你可以在本地计算机上测试本章的所有脚本，无需将文件上传到远程服务器。\n\
  \nPHP 默认支持文件上传，但托管公司可能会限制上传大小或完全禁用上传功能。在开始之前，最好先检查远程服务器的设置。\n\n## 检查服务器是否支持上传\n\n\
  你所需的所有信息都显示在主 PHP 配置页面上，你可以按照第 2 章所述，在远程服务器上运行 `phpinfo()` 来查看此页面。向下滚动，直到在 Core\
  \ 部分找到 `file_uploads`。\n\n如果 Local Value 为 `On`，一切就绪，但你还应该检查表 9-1 中列出的其他配置设置。\n\n\
  **表 9-1.** 影响文件上传的 PHP 配置设置\n\n| 指令 | 默认值 | 描述 |\n| --- | --- | --- |\n| `max_execution_time`\
  \ | 30 | PHP 脚本可以运行的最大秒数。如果脚本运行时间更长，PHP 会生成致命错误。 |\n| `max_file_uploads` | 20 |\
  \ 可以同时上传的最大文件数。多余的文件会被静默忽略。 |\n| `max_input_time` | 60 | PHP 脚本解析 `$_POST` 和 `$_GET`\
  \ 数组以及文件上传所允许的最大秒数。非常大的上传可能会超时。 |\n| `post_max_size` | 8M | 所有 `$_POST` 数据的最大允许大小，*包括*文件上传。虽然默认是\
  \ 8M（8 兆字节），但托管公司可能施加更小的限制。 |\n| `upload_tmp_dir` |  | PHP 存储上传文件的位置，直到你的脚本将其移动到永久位置。如果\
  \ `php.ini` 中没有定义值，PHP 会使用系统默认的临时目录（`C:\\Windows\\Temp` 或 Mac/Linux 上的 `/tmp`）。\
  \ |\n| `upload_max_filesize` | 2M | 单个上传文件的最大允许大小。默认是 2M（兆字节），但托管公司可能施加更小的限制。整数值表示字节数。K\
  \ 表示千字节，M 表示兆字节，G 表示千兆字节。 |\n\nPHP 7 可以处理大于 2 GB 的单个文件上传，但实际限制由表 9-1 中的设置决定。`post_max_size`\
  \ 的默认值 8 MB 包含 `$_POST` 数组的内容，因此在典型服务器上可以同时上传的文件总大小小于 8 MB，且单个文件不能大于 2 MB。服务器管理员可以更改这些默认值，因此检查托管公司设置的限值很重要。如果超出这些限值，原本完美的脚本也会失败。\n\
  \n如果 `file_uploads` 的 Local Value 为 `Off`，则表示上传功能已被禁用。除了询问托管公司是否提供已启用文件上传的套餐外，你对此无能为力。唯一的替代方案是更换主机或使用其他解决方案，例如通过\
  \ FTP 上传文件。\n\n**提示**  \n使用 `phpinfo()` 检查远程服务器设置后，请删除该脚本或将其放入受密码保护的目录中。\n\n## 在表单中添加文件上传字段\n\
  \n向 HTML 表单添加文件上传字段很容易。只需在开头的 `<form>` 标签中添加 `enctype=\"multipart/form-data\"`，并将\
  \ `<input>` 元素的 `type` 属性设置为 `file`。以下代码是上传表单的简单示例（位于 `ch09` 文件夹中的 `file_upload_01.php`）：\n\
  \n```\n<form action=\"\" method=\"post\" enctype=\"multipart/form-data\">\n  <p>\n\
  \    <input type=\"file\" name=\"image\">\n  </p>\n  <p>\n    <input type=\"submit\"\
  \ name=\"upload\" value=\"Upload\">\n  </p>\n</form>\n```\n\n虽然这是标准的 HTML，但它在网页中的呈现方式取决于浏览器（参见图\
  \ 9-1）。许多浏览器会显示“选择文件”或“浏览”按钮，右侧带有一条状态消息或所选文件的名称。Microsoft Edge 会显示一个只读文本输入字段，右侧有一个“浏览”按钮。Edge\
  \ 在点击字段内部时会立即启动文件选择面板。这些差异不会影响上传表单的操作，但在设计布局时需要考虑到。\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig1_HTML.jpg](img/332054_4_En_9_Fig1_HTML.jpg)\n\
  \n**图 9-1.** 文件输入字段的外观取决于浏览器\n\n## 理解 $_FILES 数组\n\n让许多人困惑的是，他们的文件在上传后似乎消失了。这是因为你不能像对待文本输入那样，在\
  \ `$_POST` 数组中引用上传的文件。PHP 在一个名为 `$_FILES`（这个命名很合理）的独立超全局数组中传输上传文件的详细信息。此外，文件会上传到临时文件夹，除非你明确将其移动到所需位置，否则会被删除。这使你在接受上传之前可以对文件进行安全检查。\n\
  \n### 检查 $_FILES 数组\n\n理解 `$_FILES` 数组工作原理的最佳方式是实际查看它的运作。你可以在计算机上的本地测试环境中测试所有内容，其工作方式与将文件上传到远程服务器相同。\n\
  \n1. 在 `phpsols-4e` 站点根目录中创建一个名为 `uploads` 的文件夹。在 `uploads` 文件夹中创建一个名为 `file_upload.php`\
  \ 的文件，并插入上一节的代码。或者，复制 `ch09` 文件夹中的 `file_upload_01.php` 并将文件重命名为 `file_upload.php`。\n\
  \n2. 在结束的 `</form>` 标签后立即插入以下代码（该代码也存在于 `file_upload_02.php` 中）：\n\n    ```\n  \
  \  <?php\n    if (isset($_POST['upload'])) {\n        echo '<pre>';\n        print_r($_FILES);\n\
  \        echo '</pre>';\n    }\n    ?>\n    ```\n\n    这段代码使用 `isset()` 检查 `$_POST`\
  \ 数组中是否包含 `upload`（提交按钮的 `name` 属性）。如果包含，则表示表单已提交，因此你可以使用 `print_r()` 检查 `$_FILES`\
  \ 数组。`<pre>` 标签使输出更易于阅读。\n\n3. 保存 `file_upload.php` 并在浏览器中加载。\n\n4. 单击“浏览”（或“选择文件”）按钮并选择一个本地文件。单击“打开”（在\
  \ Mac 上为“选择”）关闭选择对话框，然后单击“上传”。你应该会看到类似图 9-2 的内容。\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig2_HTML.jpg](img/332054_4_En_9_Fig2_HTML.jpg)\n\
  \n**图 9-2.** $_FILES 数组包含上传文件的详细信息\n\n`$_FILES` 是一个多维数组——一个由数组组成的数组。顶层包含一个单一元素，其键（或索引）来自文件输入字段的\
  \ `name` 属性，在本例中为 `image`。\n\n顶层 `image` 数组包含一个由五个元素组成的子数组，分别是：\n\n* `name`：上传文件的原始名称\n\
  * `type`：上传文件的 MIME 类型\n* `tmp_name`：上传文件的位置\n* `error`：表示上传状态的整数\n* `size`：上传文件的大小（以字节为单位）\n\
  \n不要浪费时间查找 `tmp_name` 指示的临时文件：它不会在那里。如果不立即保存，PHP 会将其丢弃。\n\n**注意**  \nMIME 类型是浏览器用来确定文件格式及其处理方式的标准。更多信息，请参见\
  \ [`https://developer.mozilla.org/en-US/docs/Web/HTTP/Basics_of_HTTP/MIME_types`](https://developer.mozilla.org/en-US/docs/Web/HTTP/Basics_of_HTTP/MIME_types)。\n\
  \n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig3_HTML.jpg](img/332054_4_En_9_Fig3_HTML.jpg)\n\
  \n**图 9-3.** 未上传文件时，$_FILES 数组仍然存在\n\n\n\n"
- '# 1. 文件上传与错误处理


  1.  点击“上传”按钮而不选择任何文件。此时 `$_FILES` 数组应如图 9-3 所示。


  错误级别为 4 表示未上传文件；0 表示上传成功。本章稍后的表 9-2 列出了所有错误代码。


  1.  选择一个程序文件并点击“上传”按钮。在许多情况下，表单会尝试上传该程序，并将其类型显示为 `application/zip`、`application/octet-stream`
  或类似内容。这应作为一个警告，说明检查正在上传的文件类型非常重要。


  '
- '# 2. 建立上传目录


  出于安全考虑，通过在线表单上传的文件不应通过浏览器公开访问。换句话说，它们不应位于站点根目录（通常是 `htdocs`、`public_html` 或 `www`）内。在你的远程服务器上，在站点根目录之外创建一个用于上传的目录，并将权限设置为
  644（所有者可读写，其他人只读）。


  ## 2.1. 为 Windows 本地测试创建上传文件夹


  对于后续练习，建议你在 C 盘根目录下创建一个名为 `upload_test` 的文件夹。Windows 上没有权限问题，因此你只需完成这一步即可。


  ## 2.2. 为 macOS 本地测试创建上传文件夹


  Mac 用户可能需要做更多准备工作，因为文件权限与 Linux 类似。在你的主目录中创建一个名为 `upload_test` 的文件夹，并按照 PHP 解决方案
  9-1 中的说明进行操作。


  如果一切顺利，你无需进行额外操作。但如果你收到 PHP“无法打开流”（failed to open stream）的警告，请按以下方式更改 `upload_test`
  文件夹的权限：


  1.  在 Mac 访达中选择 `upload_test`，然后选择“文件”➤“显示简介”（Cmd+I）以打开其信息面板。


  2.  在“共享与权限”中，点击右下角的挂锁图标以解锁设置，然后将“Everyone”的权限从“只读”更改为“读与写”，如下方截图所示。


  ![../images/332054_4_En_9_Chapter/332054_4_En_9_Figa_HTML.jpg](img/332054_4_En_9_Figa_HTML.jpg)


  3.  再次点击挂锁图标以保存新设置，并关闭信息面板。现在你应该能够使用 `upload_test` 文件夹继续完成本章剩余内容。


  '
- '# 3. 上传文件


  在构建文件上传类之前，最好先创建一个简单的文件上传脚本，以确保你的系统能正确处理上传。


  ## 3.1. 将临时文件移动到上传文件夹


  已上传文件的临时版本仅短暂存在。如果你不对该文件进行任何操作，它将被立即丢弃。你需要告诉 PHP 将其移动到哪里以及如何命名。这通过 `move_uploaded_file()`
  函数完成，该函数接受以下两个参数：


  *   临时文件的名称

  *   文件新位置的完整路径，包括文件名本身


  获取临时文件本身的名字很简单：它作为 `tmp_name` 存储在 `$_FILES` 数组中。由于第二个参数需要完整路径，这给了你重命名文件的机会。目前，我们保持简单，使用原始文件名，它作为
  `name` 存储在 `$_FILES` 数组中。


  '
- "# 4. PHP 解决方案 9-1：创建基本文件上传脚本\n\n继续使用与上一练习相同的文件。或者，使用 `ch09` 文件夹中的 `file_upload_03.php`。此\
  \ PHP 解决方案的最终脚本位于 `file_upload_04.php`。\n\n*   如果你使用的是 Windows，并且在 C 盘根目录下创建了 `upload_test`\
  \ 文件夹，它应如下所示：\n\n```\n$destination = 'C:/upload_test/';\n```\n\n请注意，我使用了正斜杠，而不是\
  \ Windows 惯例的反斜杠。你可以使用其中任何一种，但如果使用反斜杠，最后一个反斜杠需要由另一个反斜杠转义，如下所示（否则反斜杠会转义引号）：\n\n```\n\
  $destination = 'C:\\upload_test\\\\';\n```\n\n*   在 Mac 上，如果你在主目录中创建了 `upload_test`\
  \ 文件夹，它应如下所示（将 *username* 替换为你的 Mac 用户名）：\n\n```\n$destination = '/Users/username/upload_test/';\n\
  ```\n\n*   在远程服务器上，你需要完整的文件路径作为第二个参数。在 Linux 上，它可能是这样的：\n\n```\n$destination = '/home/user/private/upload_test/';\n\
  ```\n\n1.  如果你使用的是上一练习中的文件，请删除结束的 `</form>` 和 `</body>` 标签之间以粗体突出显示的代码：\n\n2.  除了\
  \ PHP 配置中设置的自动限制（见表 9-1）之外，你还可以在 HTML 表单中指定上传文件的最大大小。在文件输入字段之前立即添加以下以粗体突出显示的行：\n\
  \n```\nUpload image: <input type=\"hidden\" name=\"MAX_FILE_SIZE\" value=\"<?= $max\
  \ ?>\">\n```\n\n这是一个隐藏的表单字段，因此不会在屏幕上显示。但是，必须将其放置在文件输入字段*之前*，否则它将无法工作。`name` 属性 `MAX_FILE_SIZE`\
  \ 是固定的，并且区分大小写。`value` 属性以字节为单位设置上传文件的最大大小。\n\n我没有指定数值，而是使用了一个名为 `$max` 的变量。该值也将在文件上传的服务器端验证中使用，因此定义一次是合理的，避免在一个地方更改却忘记在其他地方更改。\n\
  \n使用 `MAX_FILE_SIZE` 的优势在于，如果文件大于规定值，PHP 会放弃上传，从而避免因文件过大而造成不必要的延迟。不幸的是，用户可以通过伪造隐藏字段提交的值来绕过此限制，因此你将在本章后续开发的脚本也会在服务器端检查文件大小。\n\
  \n3.  在 DOCTYPE 声明之上的 PHP 代码块中定义 `$max` 的值，如下所示：\n\n这将最大上传大小设置为 50 KB（51200 字节）。\n\
  \n4.  将已上传文件从其临时位置移动到永久位置的代码需要在表单提交后运行。在页面顶部刚刚创建的 PHP 代码块中插入以下代码：\n\n```\n$max =\
  \ 51200;\nif (isset($_POST['upload'])) {\n    // 定义上传文件夹的路径\n    $destination =\
  \ '/path/to/upload_test/';\n    // 将文件移动到上传文件夹并重命名\n    move_uploaded_file($_FILES['image']['tmp_name'],\n\
  \    $destination . $_FILES['image']['name']);\n}\n?>\n```\n\n虽然代码相当简短，但其中涉及不少操作。条件语句通过检查\
  \ `$_POST` 数组中是否存在上传按钮的键，来确保仅在点击“上传”按钮后才执行代码。\n\n`$destination` 的值取决于你的操作系统和 `upload_test`\
  \ 文件夹的位置。\n\n`if` 语句内的最后一行使用 `move_uploaded_file()` 函数移动文件。该函数接受两个参数：临时文件的名称和文件将要保存到的完整路径。`$_FILES`\
  \ 是一个多维数组，其名称来源于文件输入字段。因此，`$_FILES['image']['tmp_name']` 是临时文件，而 `$_FILES['image']['name']`\
  \ 包含原始文件的名称。第二个参数 `$destination . $_FILES['image']['name']` 将上传的文件以其原始名称存储在 upload\
  \ 文件夹内。\n\n\n\n#### 注意\n\n你可能会遇到使用 `copy()` 而非 `move_uploaded_file()` 的脚本。如果缺少其他检查措施，`copy()`\
  \ 会让你的网站面临严重的安全风险。例如，恶意用户可能试图欺骗你的脚本，去复制其本不应有权访问的文件，比如密码文件。请始终使用 `move_uploaded_file()`，它要安全得多。\n\
  \n1.  保存 `file_upload.php`，并在浏览器中加载它。点击“浏览”或“选择文件”按钮，从 `phpsols-4e` 站点的 `images`\
  \ 文件夹中选择一个文件。如果你从其他地方选择文件，请确保其大小小于 50 KB。点击“打开”（在 Mac 上为“选择”）以在表单中显示文件名。在显示文件输入字段的浏览器中，你可能无法看到完整路径。这是一个外观问题，留给你自己通过\
  \ CSS 解决。点击“上传”按钮。如果你在本地测试，表单输入字段几乎会立即清空。\n2.  导航到 `upload_test` 文件夹，确认你选择的图片的副本已存在于其中。如果没有，请对照\
  \ `file_upload_04.php` 检查你的代码。同时，如有必要，请检查上传文件夹是否已设置正确的权限。\n\n## 说明\n\n下载文件使用的是 `C:/upload_test/`。请根据你自己的配置进行调整。\n\
  \n如果没有收到任何错误消息但找不到文件，请确保图片没有超过 `upload_max_filesize`（参见表 9-1）。另外，检查你是否漏掉了 `$destination`\
  \ 末尾的尾部斜杠。在 `upload_test` 文件夹中，你找到的可能不是 `myfile.jpg`，而是在磁盘结构中高一级的目录里找到 `upload_testmyfile.jpg`。\n\
  \n3.  将 `$max` 的值改为 `3000`，保存 `file_upload.php`，然后选择一个大于 2.9 KB 的文件进行上传（`images`\
  \ 文件夹中的任何文件都可以），再次测试。点击“上传”按钮并检查 `upload_test` 文件夹。该文件不应该在那里。\n4.  如果你有兴趣进行实验，将\
  \ `MAX_FILE_SIZE` 隐藏字段移到文件输入字段下方，然后再次尝试。请确保你选择的文件与第 6 步中使用的文件不同，因为 `move_uploaded_file()`\
  \ 会覆盖同名的现有文件。稍后你将学习如何为文件赋予唯一的名称。\n\n这次，文件应该会被复制到你的上传文件夹中。隐藏字段必须位于文件输入元素之前，`MAX_FILE_SIZE`\
  \ 才能生效。继续之前，请将隐藏字段移回其原始位置。\n\n## 创建 PHP 文件上传类\n\n正如你刚才所见，上传文件仅需几行代码，但这本身还不足以宣告任务完成。你需要通过实施以下步骤来使过程更加安全：\n\
  \n-   检查错误级别。\n-   在服务器上验证文件未超过允许的最大大小。\n-   检查文件类型是否可接受。\n-   从文件名中移除空格。\n-   重命名与现有文件同名的文件，以防止覆盖。\n\
  -   自动处理多个文件上传。\n-   告知用户结果。\n\n每次你想要上传文件时，都需要实施这些步骤，因此构建一个易于重用的脚本是合理的。这就是我选择使用自定义类的原因。构建\
  \ PHP 类通常被视为一个高级主题，但别因此而却步。**类** 是一个旨在协同工作的函数和变量的集合。这虽然过于简化，但足以让你理解基本概念。类中的每个函数通常应专注于单一任务，因此你将构建独立的函数来实现前述列表中的步骤。代码还应该是通用的，不局限于特定的网页。一旦构建好类，你可以在任何表单中重用它。尽管类定义很长，但使用该类只需编写几行代码。类的另一个优势在于，你可以通过创建**子类**（也称为**子类**）来添加或修改其功能。你将在第\
  \ 10 章中看到一个例子，该章基于本章开发的类进行构建。\n\n要使用一个类，你需要调用其构造方法来创建该类的一个实例（即一个**对象**）。该对象可以访问该类的所有特性，即其函数（称为**方法**）和变量（称为**属性**）。通常会创建类的多个实例来处理不同的情况。例如，你可能希望创建单独的对象来将图片和文本文件上传到不同的位置。当你通读本章的其余部分时，这些概念会变得更加清晰。\n\
  \n如果你时间紧迫，完成的类位于 `ch09/PhpSolutions` 文件夹中。即使你自己不构建脚本，也请通读相关描述，以便清楚了解其工作原理。\n\n##\
  \ 定义 PHP 类\n\n定义 PHP 类非常简单。你使用 `class` 关键字，后跟类名，然后将该类的所有代码放在一对花括号之间。按照惯例，类名以大写字母开头，并存储在与类同名的单独文件中。\n\
  \n### 使用命名空间避免命名冲突\n\n如果你编写自己的脚本，很少需要担心命名冲突。我们将创建一个用于上传文件的类，因此 `Upload` 或 `FileUpload`\
  \ 看起来是合乎逻辑的名称。一旦你开始使用他人编写的脚本和类（包括本书中的），就存在多个类同名带来的风险。PHP 通过使用命名空间将相关的类、函数和常量分组来解决这个问题。\n\
  \n一种常见的策略是将类定义存储在一个描述其功能的文件夹结构中，并为顶层文件夹赋予一个基于域名或公司名称的唯一名称。命名空间可以有子级别，因此文件夹结构会复制为用反斜杠分隔的子命名空间。命名空间也会单独声明，允许你使用简单的类名。我们将要构建的类名为\
  \ `Upload`，但为了避免命名冲突，它将被创建在名为 `PhpSolutions\\File` 的命名空间中。\n\n你可以在文件顶部使用 `namespace`\
  \ 关键字，后跟命名空间，像这样声明命名空间：\n\n```\nnamespace PhpSolutions\\File;\n```\n\n#### 注意\n\n\
  在所有操作系统上，PHP 都使用反斜杠作为命名空间分隔符。不要试图在 Linux 或 macOS 上将其更改为正斜杠。\n\n因此，如果我们在此命名空间中创建一个名为\
  \ `Upload` 的类，其完全限定名就是 `PhpSolutions\\File\\Upload`。\n\n### 导入命名空间类\n\n为了避免每次引用命名空间类时都使用完全限定名，你可以在脚本开头使用\
  \ `use` 关键字导入该类，如下所示：\n\n```\nuse PhpSolutions\\File\\Upload;\n```\n\n\n\n```markdown\n\
  # 排版后的 Markdown 文档\n\n导入类之后，你可以将其引用为`Upload`，而无需使用完全限定名称。导入命名空间的类与包含它不同。它只是声明你想使用该类的较短名称。实际上，你还可以使用`as`关键字为导入的类指定别名，如下所示：\n\
  \n```\nuse PhpSolutions\\File\\Upload as FileUploader;\n```\n\n然后该类可以被引用为`FileUploader`。使用别名主要适用于大型应用程序，其中来自不同框架的两个类具有相同的名称。\n\
  \n**注意**\n你仍然需要单独包含类定义。`use`关键字必须在脚本的顶层声明。它不能嵌套在条件语句中。\n\n## PHP 解决方案 9-2：创建基本的文件上传类\n\
  \n在本 PHP 解决方案中，你将创建一个名为`Upload`的类的定义来处理文件上传。你还将创建该类的一个实例（一个`Upload`对象）并使用它来上传图像。请花足够的时间完成以下步骤。它们并不难，但会引入一些概念，如果你之前没有使用过\
  \ PHP 类，这些概念可能不熟悉。\n\n1.  在`phpsols-4e`站点根文件夹中创建一个名为`PhpSolutions`的子文件夹。文件夹名称中使用相同的大小写字母组合。\n\
  \n2.  在`PhpSolutions`文件夹中创建一个名为`File`（大写 F）的子文件夹。\n\n3.  在新的`PhpSolutions/File`文件夹中，创建一个名为`Upload.php`的文件。同样，文件名中使用相同的大小写字母组合。然后插入以下代码：\n\
  \n    ```\n    <?php\n    namespace PhpSolutions\\File;\n    class Upload {\n  \
  \  }\n    ```\n\n    所有剩余代码都放在花括号之间。该文件将只包含 PHP 代码，因此你不需要关闭 PHP 标签。\n\n4.  PHP 类通过将一些变量和函数声明为`protected`来隐藏其内部工作原理。如果你在变量或函数前面加上关键字`protected`，它只能在该类或子类内部访问。这可以防止值被意外更改。\n\
  \n`Upload`类需要以下项目的受保护变量：\n\n*   上传文件夹的路径\n*   最大文件大小\n*   报告上传状态的消息\n*   允许的 MIME\
  \ 类型\n\n通过将它们添加到花括号内来创建变量，如下所示：\n\n```\n    class Upload {\n    protected $destination;\n\
  \    protected $max = 51200;\n    protected $messages = [];\n    protected $permitted\
  \ = [\n    'image/gif',\n    'image/jpeg',\n    'image/pjpeg',\n    'image/png',\n\
  \    'image/webp'\n    ];\n    }\n    ```\n\n这些属性可以在类中使用`$this->`访问，它指的是当前对象。例如，在类定义内部，你访问`$destination`为`$this->destination`。\n\
  \n**注意**\n当你首次在类内部声明属性时，它像任何其他变量一样以美元符号开头。但是，你需要省略`->`运算符之后的属性名称中的美元符号。\n\n除`$destination`外，每个受保护属性都赋予了默认值：\n\
  \n*   `$max`将最大文件大小设置为 50 KB（51200 字节）。\n*   `$messages`是一个空数组。\n*   `$permitted`包含一个图像\
  \ MIME 类型数组。\n\n`$destination`的值将在创建类的实例时设置。其他值将由类内部控制，但你也会创建函数（或在类中称为**方法**）来更改`$max`和`$permitted`的值。\n\
  \n1.  当你创建对象时，类定义文件会自动调用类的构造函数方法，该方法初始化对象。所有类的构造函数方法都称为`__construct()`（双下划线）。与你在上一步中定义的属性不同，构造函数需要在类外部可访问，因此你在其定义前加上`public`关键字。\n\
  \n**注意**\n`public`和`protected`关键字控制属性和方法的**可见性**。公共属性和方法可以在任何地方访问。尝试直接在类定义或子类外部访问受保护的属性或方法会触发致命错误。\n\
  \n`Upload`类的构造函数接受一个参数：你想要上传文件的文件夹路径，并将其赋值给`$destination`。在受保护属性列表之后，添加以下代码，确保它位于类定义的闭合花括号之前：\n\
  \n```\npublic function __construct($path) {\nif (is_dir($path) && is_writable($path))\
  \ {\n$this->destination = rtrim($path, '/\\\\') . DIRECTORY_SEPARATOR;\n} else {\n\
  throw new \\Exception(\"$path must be a valid,writable directory.\");\n}\n}\n```\n\
  \n构造函数内部的`if`语句将`$path`传递给`is_dir()`和`is_writable()`函数，这些函数检查提交的值是一个有效的、可写的目录（文件夹）。如果是，`rtrim()`函数会删除`$path`末尾的任何空格和斜杠，然后连接适用于操作系统的目录分隔符。这确保了路径以斜杠结尾，无论用户在创建`Upload`对象时是否添加了斜杠。当只向`rtrim()`传递一个参数时，它只删除空格。第二个可选参数是一个字符串，包含所有其他要删除的字符。需要两个反斜杠来转义闭合引号。如果传递给构造函数的值不是有效的、可写的目录，构造函数会抛出异常。\n\
  \n**注意**\n类可以定义自己的异常，并且由于`Upload`类是在命名空间内定义的，因此构造函数应该使用自定义异常还是 PHP 核心部分的`Exception`类是不明确的。要访问命名空间内的核心命令，你需要在它们前面加上反斜杠。这就是`Exception`前面有反斜杠的原因。我们使用的是核心的`Exception`类，而不是自定义的。\n\
  \n1.  接下来，创建一个名为`upload()`的公共方法。这将在上传文件之前启动一系列对文件的测试。在你上一步定义的构造函数方法之后立即插入此代码：\n\n\
  \    ```\n    public function upload($fieldname) {\n    $uploaded = $_FILES[$fieldname];\n\
  \    if ($this->checkFile($uploaded)) {\n    $this->moveFile($uploaded);\n    }\n\
  \    }\n    ```\n\n`upload()`方法接受单个参数：文件输入字段的名称，并使用它来为`$uploaded`分配`$_FILES`的适当子数组，然后将其传递给我们将接下来定义的两个方法。\n\
  \n**提示**\n`$_FILES`是 PHP 的超级全局数组之一，因此它在脚本的所有部分都可用。这就是为什么无需将其作为参数传递给类构造函数方法。\n\n\
  1.  `upload()`方法中的`if`语句使用`$this`关键字调用`checkFile()`。`$this`关键字也用于调用类内定义的函数（方法）。目前，我们假设文件没有问题，因此`checkFile()`只会返回`true`。将以下代码添加到类定义中：\n\
  \n    ```\n    protected function checkFile($file) {\n    return true;\n    }\n\
  \    ```\n\n    在定义前加上`protected`关键字意味着此方法只能在类内部访问。我们将在 PHP 解决方案 9-3 中返回到`checkFile()`，以在上传文件之前添加一系列测试。\n\
  ```\n\n\n\n"
- "# 提示\n\n类内部函数（方法）定义的顺序无关紧要，只要它们位于包裹该类的花括号内即可。不过，我个人倾向于将所有 `public` 方法放在顶部，而 `protected`\
  \ 方法放在底部。\n\n1.  如果文件通过了一系列测试，`upload()` 方法中的条件语句会将文件传递给另一个名为 `moveFile()` 的内部方法，该方法本质上是\
  \ PHP 方案 9-1 中使用的 `move_uploaded_file()` 函数的包装器。代码如下：\n\n```\nprotected function\
  \ moveFile($file) {\n    $success = move_uploaded_file($file['tmp_name'],\n    $this->destination\
  \ . $file['name']);\n    if ($success) {\n        $result = $file['name'] . ' was\
  \ uploaded successfully';\n        $this->messages[] = $result;\n    } else {\n\
  \        $this->messages[] = 'Could not upload ' . $file['name'];\n    }\n}\n```\n\
  \n如果上传成功，`move_uploaded_file()` 返回 `true`。否则，返回 `false`。通过将返回值存储在 `$success` 中，相应的消息会被存入\
  \ `$messages` 数组。如果 `$success` 为 `true`，消息首先赋值给 `$result`；而失败时，则直接赋值给 `$messages`\
  \ 数组。这是因为，如果文件需要重命名，后续会向成功消息中添加更多信息。\n\n2.  由于 `$messages` 是一个受保护的属性，你需要创建一个公共方法来获取数组的内容。\n\
  \n```\npublic function getMessages() {\n    return $this->messages;\n}\n```\n\n\
  这简单返回了 `$messages` 数组的内容。既然它只是做这个，为什么不一开始就将该数组设为公共呢？公共属性可以在类定义之外被访问和修改。保护 `$messages`\
  \ 确保了数组内容不会被更改，因此你知道消息是由该类生成的。对于这样的消息，这似乎不算什么大事，但当你开始处理更复杂的脚本或在团队中工作时，这一点就变得非常重要。\n\
  \n3.  保存 `Upload.php` 并切换到 `file_upload.php`。\n\n4.  在 `file_upload.php` 的顶部，在 PHP\
  \ 开始标签后立即添加以下代码行来导入 `Upload` 类：\n\n```\nuse PhpSolutions\\File\\Upload;\n```\n\n\
  #### 注意\n\n你必须在脚本的顶层导入命名空间类，即使类定义在之后加载。将 `use` 放在条件语句中会产生解析错误。\n\n1.  在条件语句内部，删除调用\
  \ `move_uploaded_file()` 函数的代码，然后使用 `require_once` 包含 `Upload` 类定义：\n\n```\nif (isset($_POST['upload']))\
  \ {\n    // define the path to the upload folder\n    $destination = 'C:/upload_test/';\n\
  \    require_once '../PhpSolutions/File/Upload.php';\n}\n```\n\n2.  现在，我们可以创建一个\
  \ `Upload` 类的实例，但因为它可能抛出异常，最好创建一个 `try/catch` 块（参见第 4 章的“处理错误和异常”）。在上一步插入的代码之后立即添加以下代码：\n\
  \n```\ntry {\n    $loader = new Upload($destination);\n    $loader->upload('image');\n\
  \    $result = $loader->getMessages();\n} catch (Throwable $t) {\n    echo $t->getMessage();\n\
  }\n```\n\n这通过将 `upload_test` 文件夹的路径传递给它，创建了一个名为 `$loader` 的 `Upload` 类实例。然后它调用 `$loader`\
  \ 对象的 `upload()` 方法，并将文件输入字段的名称传递给它。接着，它调用 `getMessages()` 方法，并将结果存储在 `$result`\
  \ 中。\n\n`catch` 块将捕获内部错误和异常，因此类型声明是 `Throwable` 而不是 `Exception`。无需在 `Throwable`\
  \ 前加反斜杠，因为 `file_upload.php` 中的脚本不在命名空间中。只有类定义在命名空间中。\n\n#### 注意\n\n`Upload` 类有一个\
  \ `getMessages()` 方法，而异常使用 `getMessage()`。多出来的那个“s”很重要。\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig4_HTML.jpg](img/332054_4_En_9_Fig4_HTML.jpg)\n\
  \n**图 9-4.** `Upload` 类报告上传成功\n\n1.  在表单上方添加以下 PHP 代码块，以显示 `$loader` 对象返回的任何消息：\n\
  \n```\n<?php\nif (isset($result)) {\n    echo '<ul>';\n    foreach ($result as $message)\
  \ {\n        echo \"<li>$message</li>\";\n    }\n    echo '</ul>';\n}\n?>\n```\n\
  \n这是一个简单的 `foreach` 循环，将 `$result` 的内容显示为无序列表。页面首次加载时，`$result` 未设置，因此这段代码仅在表单提交后运行。\n\
  \n2.  保存 `file_upload.php` 并在浏览器中测试它。只要你选择一个小于 50 KB 的图像，你应该会看到文件上传成功的确认信息，如图 9-4\
  \ 所示。\n\n你可以将代码与 `ch09` 文件夹中的 `file_upload_05.php` 和 `PhpSolutions/File/Upload_01.php`\
  \ 进行比较。该类的功能与 PHP 方案 9-1 完全相同：它上传一个文件，但需要更多的代码来实现。然而，你已经为即将对上传文件执行一系列安全检查的类奠定了基础。这段代码你只需编写一次。当你使用该类时，无需再编写此代码。\n\
  \n如果你以前没有接触过对象和类，有些概念可能看起来有些奇怪。可以把 `$loader` 对象简单地看作是访问你在 `Upload` 类中定义的函数（方法）的一种方式。你经常创建不同的对象来存储不同的值，例如在使用\
  \ `DateTime` 对象时。在这种情况下，单个对象就足以处理文件上传了。\n\n## 检查上传错误\n\n目前，`Upload` 类不加区分地上传任何类型的文件。即使是\
  \ 50 KB 的限制也可以绕过，因为唯一的检查是在浏览器中进行的。在将文件交给 `moveFile()` 方法之前，`checkFile()` 方法需要运行一系列测试。其中最重要的一项就是检查\
  \ `$_FILES` 数组报告的错误级别。表 9-2 显示了完整的错误级别列表。\n\n**表 9-2.** `$_FILES` 数组中不同错误级别的含义\n\
  \n| 错误级别 | 含义 |\n|---|---|\n| 0 | 上传成功 |\n| 1 | 文件超过 `php.ini` 中指定的最大上传大小（默认 2 MB）\
  \ |\n| 2 | 文件超过 `MAX_FILE_SIZE` 指定的大小（参见 PHP 方案 9-1） |\n| 3 | 文件仅部分上传 |\n| 4 | 表单已提交但未指定文件\
  \ |\n| 6 | 没有临时文件夹 |\n| 7 | 无法将文件写入磁盘 |\n| 8 | 上传被未指定的 PHP 扩展停止 |\n\n*错误级别 5 目前未定义。*\n\
  \n## PHP 方案 9-3：测试错误级别、文件大小和 MIME 类型\n\n此 PHP 方案更新了 `checkFile()` 方法，以调用一系列内部（受保护）方法来验证文件是否可以接受。如果文件因任何原因失败，则会显示一条错误消息说明原因。继续使用\
  \ `Upload.php`。或者，使用 `ch09/PhpSolutions/File` 文件夹中的 `Upload_01.php`，将其移动到 `phpsols-4e`\
  \ 站点顶层目录的 `PhpSolutions/File` 中，并将其重命名为 `Upload.php`。（始终从部分完成的文件中删除下划线和数字。）\n\n\
  1.  `checkFile()` 方法需要运行三个测试：测试错误级别、文件大小以及文件的 MIME 类型。如下所示更新方法定义：\n\n\n```php\n\
  protected function checkFile($file) {\n    $accept = $this->getErrorLevel($file);\n\
  \    $accept = $this->checkSize($file);\n    $accept = $this->checkType($file);\n\
  \    return $accept;\n}\n```\n\n传递给 `checkFile()` 方法的参数是 `$_FILES` 数组中的顶级元素。我们正在使用的表单中的上传字段名为\
  \ `image`，因此 `$file` 相当于 `$_FILES['image']`。\n\n最初，`checkFile()` 只是简单地返回 `true`。现在，它运行一系列内部方法（稍后你将定义这些方法），并将返回值赋给一个名为\
  \ `$accept` 的变量。每个方法都会返回 `true` 或 `false`，然后由 `checkFile()` 返回这个值。这使得生成包含文件所有问题的详细错误信息成为可能，从而避免了那种令人烦恼的情况：文件因一个原因被拒绝，而第一个问题解决后又因另一个不同原因被拒绝。\n\
  \n`getErrorLevel()` 方法使用 `switch` 语句来检查表 9-2 中列出的错误级别。如果错误级别为 0，表示文件上传成功，因此它会立即返回\
  \ `true`。否则，它会向 `$messages` 数组添加一条合适的消息并返回 `false`。代码如下：\n\n```php\nprotected function\
  \ getErrorLevel($file) {\n    switch($file['error']) {\n        case 0:\n      \
  \      return true;\n        case 1:\n        case 2:\n            $this->messages[]\
  \ = $file['name'] . ' 文件过大：（最大：' .\n                $this->getMaxSize() . '）。';\n\
  \            break;\n        case 3:\n            $this->messages[] = $file['name']\
  \ . ' 仅部分上传。';\n            break;\n        case 4:\n            $this->messages[]\
  \ = '未提交文件。';\n            break;\n        default:\n            $this->messages[]\
  \ = '抱歉，上传 ' .\n                $file['name'] . ' 时出现问题。';\n    }\n    return false;\n\
  }\n```\n\n对于错误级别 1 和 2 的消息部分，由一个名为 `getMaxSize()` 的方法生成，该方法将 `$max` 的值从字节转换为千字节。稍后你将定义\
  \ `getMaxSize()`。\n\n只有前四个错误级别有描述性消息。`default` 关键字捕获其他错误级别（包括未来可能添加的任何级别），并添加一个通用原因。\n\
  \n`checkSize()` 方法如下所示：\n\n```php\nprotected function checkSize($file) {\n    if\
  \ ($file['error'] == 1 || $file['error'] == 2 ) {\n        return false;\n    }\
  \ elseif ($file['size'] == 0) {\n        $this->messages[] = $file['name'] . ' 是一个空文件。';\n\
  \        return false;\n    } elseif ($file['size'] > $this->max) {\n        $this->messages[]\
  \ = $file['name'] . ' 超过了文件的最大大小（' .\n            $this->getMaxSize() . '）。';\n\
  \        return false;\n    }\n    return true;\n}\n```\n\n条件语句首先检查错误级别。如果错误级别为\
  \ 1 或 2，则表示文件过大，因此该方法直接返回 `false`。相应的错误消息已由 `getErrorLevel()` 方法设置。\n\n下一个条件检查报告的大小是否为零。虽然这种情况发生在文件过大或未选择文件时，但这些情况已被\
  \ `getErrorLevel()` 方法覆盖。因此，这里假设文件是空的。\n\n接下来，将报告的大小与存储在 `$max` 属性中的值进行比较。尽管过大的文件应该触发错误级别\
  \ 2，但你还是需要进行比较，以防用户设法绕过了 `MAX_FILE_SIZE`。错误消息同样使用 `getMaxSize()` 来显示最大大小。\n\n如果大小符合要求，该方法返回\
  \ `true`。\n\n第三个测试检查 MIME 类型。将以下代码添加到类定义中：\n\n```php\nprotected function checkType($file)\
  \ {\n    if (!in_array($file['type'], $this->permitted)) {\n        $this->messages[]\
  \ = $file['name'] . ' 不是允许的文件类型。';\n        return false;\n    }\n    return true;\n\
  }\n```\n\n条件语句使用 `in_array()` 函数与逻辑非运算符，将 `$_FILES` 数组报告的类型与存储在 `$permitted` 属性中的数组进行比较。如果该类型不在数组中，则将拒绝原因添加到\
  \ `$messages` 数组中，并且该方法返回 `false`。否则，返回 `true`。\n\n`getErrorLevel()` 和 `checkSize()`\
  \ 方法所使用的 `getMaxSize()` 方法，将存储在 `$max` 中的原始字节数转换为更友好的格式。将以下定义添加到类文件中：\n\n```php\n\
  public function getMaxSize() {\n    return number_format($this->max/1024, 1) . '\
  \ KB';\n}\n```\n\n这使用了 `number_format()` 函数，该函数通常接受两个参数：要格式化的值和希望数字保留的小数位数。第一个参数是\
  \ `$this->max/1024`，它将 `$max` 除以 1024（一 KB 的字节数）。第二个参数是 1，因此数字被格式化为保留一位小数。末尾的 `.\
  \ ' KB'` 将“KB”连接到格式化后的数字。\n\n`getMaxSize()` 方法被声明为 public，以便你可以在使用 `Upload` 类的脚本的其他部分显示该值。\n\
  \n保存 `Upload.php`，并用 `file_upload.php` 再次测试。对于小于 50 KB 的图片，其行为与之前相同。但如果你尝试上传一个既过大又具有错误\
  \ MIME 类型的文件，你将得到类似于图 9-5 的结果。\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig5_HTML.jpg](img/332054_4_En_9_Fig5_HTML.jpg)\n\
  \n**图 9-5.** 该类现在会报告无效大小和 MIME 类型的错误\n\n你可以对照 `ch09/PhpSolutions/File` 文件夹中的 `Upload_02.php`\
  \ 检查你的代码。\n\n## 更改受保护的属性\n\n`$permitted` 属性只允许上传图片，而 `$max` 属性将文件限制为不超过 50 KB，但这些限制可能过于严格。无需每次有不同需求时都深入类定义文件进行修改，你可以向\
  \ `upload()` 方法添加可选参数，以便动态更改受保护的属性。\n\n### PHP 解决方案 9-4：允许上传不同类型和大小\n\n本 PHP 解决方案向你展示如何允许上传其他类型的文件，并更改允许的最大大小。\n\
  \n继续使用上一个 PHP 解决方案中的 `Upload.php`。或者，使用 `ch09/PhpSolutions/File` 文件夹中的 `Upload_02.php`。\n\
  \n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig6_HTML.jpg](img/332054_4_En_9_Fig6_HTML.jpg)\n\
  \n**图 9-6.** 大小限制生效，但检查 MIME 类型时出现错误\n\n为了使 `Upload` 类更加灵活，向 `upload()` 方法签名中添加两个可选参数，如下所示：\n\
  \n```php\npublic function upload($fieldname, $size = null, array $mime = null) {\n\
  ```\n\n这两个参数默认都设置为 `null`，因此只有当调用 `upload()` 方法时为它们赋值时，才会改变可接受的文件大小和 MIME 类型。我决定按此顺序放置它们，因为我认为更改可接受大小的需求可能比添加额外\
  \ MIME 类型更常见。\n\n`$mime` 参数之前有一个 `array` 类型声明，因此即使只添加一种 MIME 类型，它也需要是一个单元素数组，而不是字符串。\n\
  \n\n2. 编辑 `upload()` 方法，添加两个条件语句，以便在用到第二和第三参数时更新 `$max` 和 `$permitted` 属性。新代码需要放在\
  \ `checkFile()` 方法调用之前，因为需要在执行之前 PHP 解决方案中定义的检查之前，更新 `$max` 和 `$permitted` 的值。更新后的方法定义如下：\n\
  \n```\npublic function upload($fieldname, $size = null, array $mime = null) {\n\
  $uploaded = $_FILES[$fieldname];\nif (!is_null($size) && $size > 0) {\n$this->max\
  \ = (int) $size;\n}\nif (!is_null($mime)) {\n$this->permitted = array_merge($this->permitted,\
  \ $mime);\n}\nif ($this->checkFile($uploaded)) {\n$this->moveFile($uploaded);\n\
  }\n}\n```\n\n第一个条件语句检查 `$size` 是否为 `null` 并且大于 0。如果条件为 `true`，则 `(int)` 类型转换运算符（参见第\
  \ 4 章表 4-1）将 `$size` 转换为整数并赋值给 `$max` 属性。\n\n第二个条件语句检查 `$mime` 是否为 `null`。如果不是，则\
  \ `array_merge()` 函数会将新的 MIME 类型追加到 `$permitted` 属性中已有的值后面。我假设应保留默认的图像类型。但是，如果你想阻止上传图像，可以像这样直接将\
  \ `$mime` 赋值给 `$permitted` 属性：\n\n```\nif (!is_null($mime)) {\n$this->permitted\
  \ = $mime;\n}\n```\n\n3. 保存 `Upload.php` 并再次测试 `file_upload.php`。它应该会像之前一样继续上传小于\
  \ 50 KB 的图像。\n\n4. 修改 `file_upload.php`，将最大允许大小更改为 3000 字节，如下所示（代码位于处理上传的条件语句之前）：\n\
  \n```\n$max = 3000;\n```\n\n5. 你还需要在 `try` 块中将 `$max` 作为第二个参数传递给 `upload()` 方法，如下所示：\n\
  \n```\n$loader = new Upload($destination);\n$loader->upload('image', $max);\n$result\
  \ = $loader->getMessages();\n```\n\n6. 通过更改 `$max` 的值并将其作为第二个参数传递给 `upload()`，你会影响到表单隐藏字段中的\
  \ `MAX_FILE_SIZE` 以及类内部存储的最大值。\n\n7. 保存 `file_upload.php` 并再次测试。选择一个之前未用过的图像，或删除\
  \ `upload_test` 文件夹的内容。第一次尝试时，你可能只看到文件太大的消息。检查 `upload_test` 文件夹以确认文件未被传输。\n\n再试一次。这次，你应该会看到类似于图\
  \ 9-6 的结果。\n\n这是怎么回事？第一次可能没有看到关于允许文件类型的消息，原因是隐藏字段中 `MAX_FILE_SIZE` 的值在浏览器中重新加载表单之前不会被刷新。第二次出现错误消息是因为更新后的\
  \ `MAX_FILE_SIZE` 阻止了文件上传。结果，`$_FILES` 数组的 `type` 元素为空。你需要调整 `checkFile()` 方法来解决这个问题。\n\
  \n1. 在 `Upload.php` 中，修改 `checkFile()` 定义如下：\n\n```\nprotected function checkFile($file)\
  \ {\n$accept = $this->getErrorLevel($file);\n$accept = $this->checkSize($file);\n\
  if (!empty($file['type']) {\n$accept = $this->checkType($file);\n}\nreturn $accept;\n\
  }\n```\n\n如果文件大于表单隐藏字段中 `MAX_FILE_SIZE` 指定的限制，则不会上传任何内容，因此 `$_FILES` 数组的 `type`\
  \ 元素为空。高亮显示的代码添加了一个新条件，仅当 `$file['type']` 不为空时才调用 `checkType()` 方法。\n\n2. 保存类定义并再次测试\
  \ `file_upload.php`。这次你应该只会看到文件太大的消息。\n\n正如经常发生的那样，解决一个问题会引出另一个问题。用一个不在允许 MIME 类型数组中的大文件再次测试。该类不再警告文件类型错误。虽然我们可以检查文件扩展名，但无法保证扩展名与\
  \ MIME 类型匹配，因此我们只能接受类型未被检查的事实。\n\n3. 将 `file_upload.php` 顶部的 `$max` 值重置为 `51200`。现在你应该能够上传最大\
  \ 50 KB 大小的图像。如果第一次失败，那是因为 `MAX_FILE_SIZE` 在表单中尚未刷新。\n\n4. 使用第三个参数测试 `upload()`\
  \ 方法，指定不同的 MIME 类型，例如 PDF 文件，如下所示：\n\n```\n$loader = new Upload($destination);\n\
  $loader->upload('image', $max, ['application/pdf']);\n$result = $loader->getMessages();\n\
  ```\n\n目前，Upload 类一次只能处理单个文件，因此将新的 MIME 类型指定为数组可能看起来没有必要。然而，到本章结束时，该类将能够处理多个文件上传。\n\
  \n5. 尝试上传一个 PDF 文件。只要它小于 50 KB，就应该能被上传。如有必要，将 `$max` 的值更改为一个适当大的数字。\n\n**提示**\n\
  使用计算来设置 `$max` 的值。例如，`$max = 600 * 1024; // 600 KB`。\n\n你可以对照 `ch09/PhpSolutions/File`\
  \ 文件夹中的 `Upload_03.php` 来检查你的类定义。`ch09` 文件夹中的 `file_upload_06.php` 提供了一个更新版本的上传表单。\n\
  \n到现在，我希望你已经理解了从专用于完成单一任务的函数（方法）构建 PHP 类的思路。修复关于图像不是允许类型的错误消息之所以变得更容易，是因为该消息只能来自\
  \ `checkType()` 方法。方法定义中使用的大部分代码都依赖于 PHP 内置函数。一旦你学会哪些函数最适合当前任务，构建一个类——或任何其他 PHP\
  \ 脚本——就会变得容易得多。\n\n**PHP 解决方案 9-5：重命名重复文件**\n\n默认情况下，如果上传的文件与上传文件夹中已有的文件名相同，PHP\
  \ 会覆盖现有文件。此 PHP 解决方案通过添加选项，在文件名冲突时，在文件扩展名前插入一个数字来改进 Upload 类。它还会将文件名中的空格替换为下划线，因为空格有时会导致问题。\n\
  \n继续使用之前 PHP 解决方案中的 `Upload.php` 进行操作。或者，使用 `ch09/PhpSolutions/File` 文件夹中的 `Upload_03.php`。\n\
  \n1. 在 `Upload.php` 类定义顶部已有的属性中添加一个新的受保护属性：\n\n```\nprotected $newName;\n```\n\n\
  这将用于在文件名被更改时存储文件的新名称。\n\n2. 在 `upload()` 方法签名中添加第四个可选参数，以控制重复文件是否被覆盖，如下所示：\n\n```\n\
  public function upload($fieldname, $size = null, array $mime = null,\n$renameDuplicates\
  \ = true) {\n```\n\n这将重命名重复文件设置为默认行为。\n\n3. 我们需要在文件名通过 `checkFile()` 方法运行的其他测试之后检查它。将以下高亮显示的行添加到\
  \ `upload()` 方法中：\n\n```\npublic function upload($fieldname, $size = null, array\
  \ $mime = null,\n$renameDuplicates = true) {\n$uploaded = $_FILES[$fieldname];\n\
  if (!is_null($size) && $size > 0) {\n$this->max = (int) $size;\n}\nif (!is_null($mime))\
  \ {\n$this->permitted = array_merge($this->permitted, $mime);\n}\nif ($this->checkFile($uploaded))\
  \ {\n$this->checkName($uploaded, $renameDuplicates);\n$this->moveFile($uploaded);\n\
  }\n}\n```\n\n\n\n如果文件未通过前述任何测试，则无需检查文件名。因此，加粗显示的代码仅在 `checkFile()` 返回 `true` 时，才调用新方法\
  \ `checkName()`。\n\n4. 将 `checkName()` 定义为受保护的方法。代码的第一部分如下所示：\n\n```\nprotected\
  \ function checkName($file, $renameDuplicates) {\n    $this->newName = null;\n \
  \   $nospaces = str_replace(' ', '_', $file['name']);\n    if ($nospaces != $file['name'])\
  \ {\n        $this->newName = $nospaces;\n    }\n}\n```\n\n该方法首先将 `$newName` 属性设置为\
  \ `null`（换句话说，即没有值）。该类最终将能够处理多个文件上传。因此，每次都需要重置该属性。\n\n然后，`str_replace()` 函数将文件名中的空格替换为下划线，并将结果赋给\
  \ `$nospaces`。`str_replace()` 函数在《PHP 解决方案 5-4》中已有描述。\n\n将 `$nospaces` 的值与 `$file['name']`\
  \ 进行比较。如果两者不相同，则将 `$nospaces` 赋值为 `$newName` 属性的值。\n\n这样就处理了文件名中的空格。在处理重复文件名之前，我们先修复将上传文件移动到目标位置的代码。\n\
  \n5. 如果文件名已更改，`moveFile()` 方法在保存文件时需要使用修改后的名称。像这样更新 `moveFile()` 方法的开头部分：\n\n```\n\
  protected function moveFile($file) {\n    $filename = $this->newName ?? $file['name'];\n\
  \    $success = move_uploaded_file($file['tmp_name'],\n        $this->destination\
  \ . $filename);\n    if ($success) {\n```\n\n新的第一行使用空合并运算符（参见第 4 章“使用空合并运算符设置默认值”）为\
  \ `$filename` 赋值。如果 `$newName` 属性已由 `checkName()` 方法设置，则使用新名称。否则，将包含 `$_FILES` 数组中原始值的\
  \ `$file['name']` 赋给 `$filename`。\n\n在第二行中，`$filename` 替换了连接到 `$destination` 属性的值。因此，如果名称已更改，则使用新名称存储文件。但如果没有进行任何更改，则使用原始名称。\n\
  \n6. 让用户知道文件名是否已更改是个好主意。对 `moveFile()` 中在文件成功上传时创建消息的条件语句进行如下更改：\n\n```\nif ($success)\
  \ {\n    $result = $file['name'] . ' was uploaded successfully';\n    if (!is_null($this->newName))\
  \ {\n        $result .= ', and was renamed ' . $this->newName;\n    }\n    $this->messages[]\
  \ = $result;\n}\n```\n\n如果 `$newName` 属性不为 `null`，则说明文件已被重命名，并且会使用组合连接运算符（`.=`）将该信息添加到存储在\
  \ `$result` 中的消息里。\n\n7. 保存 `Upload.php` 并测试上传文件名中带有空格的文件。空格应被替换为下划线，如图 9-7 所示。\n\
  \n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig7_HTML.jpg](img/332054_4_En_9_Fig7_HTML.jpg)\n\
  \n**图 9-7.** 空格已被替换为下划线\n\n8. 接下来，将重命名重复文件的代码添加到 `checkName()` 方法中。在方法结束的花括号之前插入以下代码：\n\
  \n```\nif ($renameDuplicates) {\n    $name = $this->newName ?? $file['name'];\n\
  \    if (file_exists($this->destination . $name)) {\n        // 重命名文件\n        $basename\
  \ = pathinfo($name, PATHINFO_FILENAME);\n        $extension = pathinfo($name, PATHINFO_EXTENSION);\n\
  \        $this->newName = $basename . '_' . time() . \".$extension\";\n    }\n}\n\
  ```\n\n条件语句检查 `$renameDuplicates` 是 `true` 还是 `false`。花括号内的代码仅在它为 `true` 时执行。\n\n\
  条件块内的第一行代码使用空合并运算符设置 `$name` 的值。这与 `moveFile()` 方法中使用的技术相同。如果 `$newName` 属性有值，则将该值赋给\
  \ `$name`。否则，使用原始名称。\n\n然后，我们可以通过将 `$name` 连接到 `$destination` 属性上以获取完整路径，并将其传递给\
  \ `file_exists()` 函数，来检查是否已存在同名文件。如果上传目录中已存在同名的文件，此函数返回 `true`。\n\n如果已存在同名文件，接下来的两行使用\
  \ `pathinfo()` 将该文件名分别拆分为基本名称和扩展名，所用常量分别为 `PATHINFO_FILENAME` 和 `PATHINFO_EXTENSION`。现在，我们已经将基本名称和扩展名分别存储在单独的变量中，通过在基本名称和扩展名之间插入一个数字来构建新名称就变得很容易了。理想情况下，这些数字应从\
  \ 1 开始递增。然而，在一个繁忙的网站上，这样做会消耗大量资源，并且无法保证避免两个用户同时上传同名文件时出现的竞争条件。我选择了一种更简单的解决方案，即在基本名称和扩展名之间插入一个下划线，后跟当前的\
  \ Unix 时间戳。`time()` 函数返回以自 1970 年 1 月 1 日午夜 UTC（协调世界时）以来经过的秒数表示的当前时间。\n\n9. 保存 `Upload.php`\
  \ 并在 `file_upload.php` 中测试修订后的类。首先，将 `false` 作为第四个参数传递给 `upload()` 方法，如下所示：\n\n\
  ```\n$loader->upload('image', $max, ['application/pdf'], false);\n```\n\n10. 多次上传同一文件。您应该会收到上传成功的消息，但当您检查\
  \ `upload_test` 文件夹的内容时，应该只有一份该文件的副本。每次上传都会覆盖之前的文件。\n\n11. 从对 `upload()` 的调用中移除最后一个参数：\n\
  \n```\n$loader->upload('image', $max, ['application/pdf']);\n```\n\n12. 保存 `file_upload.php`\
  \ 并重复测试，多次上传同一文件。每次上传该文件时，您应该都会看到一条消息，提示该文件已被重命名。\n\n13. 通过检查 `upload_test` 文件夹的内容来查看结果。您应该会看到类似于图\
  \ 9-8 的内容。\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig8_HTML.jpg](img/332054_4_En_9_Fig8_HTML.jpg)\n\
  \n**图 9-8.** 该类可去除文件名中的空格并防止文件被覆盖\n\n如有必要，您可以对照 `ch09/PhpSolutions/File` 文件夹中的 `Upload_04.php`\
  \ 检查您的代码。\n\n**提示**  \n虽然 `upload()` 方法的最后三个参数是可选的，但如果您只想更改第四个参数，则不能省略第二个和第三个参数。在这种情况下，第二个和第三个参数的默认值为\
  \ `null`，因此在设置第四个参数之前，您需要向它们中的每一个传递 `null` 或一个明确的值。选择可选参数的顺序是一种设计决策。将最不可能更改的参数放在最后。\n\
  \n\n\n"
- "# 上传多个文件\n\n现在你已经有了一个灵活的文件上传类，但它一次只能处理一个文件。在文件字段的`<input>`标签中添加`multiple`属性，即可在符合\
  \ HTML5 标准的浏览器中选择多个文件。如果为表单添加额外的文件字段，旧版浏览器也支持多文件上传。构建`Upload`类的最后阶段，就是对其进行调整以处理多文件上传。要理解代码的工作原理，你需要了解当表单支持多文件上传时，`$_FILES`数组会发生什么变化。\n\
  \n## `$_FILES`数组如何处理多文件上传\n\n由于`$_FILES`是一个多维数组，它能够处理多文件上传。除了在`<input>`标签中添加`multiple`属性外，还需要在`name`属性后添加一对空方括号，如下所示：\n\
  \n```\n<input type=\"file\" name=\"image[]\" multiple>\n```\n\n正如你在第 6 章所学到的，在`name`属性中添加方括号会将多个值以数组形式提交。你可以通过使用`ch09`文件夹中的`multi_upload_01.php`或`multi_upload_02.php`来检查这对`$_FILES`数组的影响。图\
  \ 9-9 显示了在支持`multiple`属性的现代桌面浏览器中选择三个文件的结果。\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig9_HTML.jpg](img/332054_4_En_9_Fig9_HTML.jpg)\n\
  \n**图 9-9.** `$_FILES`数组可以在单次操作中上传多个文件\n\n虽然这种结构不如将每个文件的详细信息存储在独立的子数组中那么方便，但数字键可以跟踪每个文件的详细信息。例如，`$_FILES['image']['name'][2]`直接对应于`$_FILES['image']['tmp_name'][2]`，依此类推。\n\
  \n所有现代桌面浏览器都支持`multiple`属性，iOS 上的 Safari（自 6.1 版本起）也支持。Internet Explorer 9 或更早版本不支持此属性，Android\
  \ 和其他一些移动浏览器也不支持。不支持`multiple`属性的浏览器会使用相同的结构上传单个文件，因此文件名存储为`$_FILES['image']['name'][0]`。\n\
  \n> **提示**  \n> 如果你需要在旧版浏览器上支持多文件上传，请省略`multiple`属性，并根据要同时上传的文件数量创建独立的文件输入字段。为每个`<input>`标签赋予相同的`name`属性，并在其后加上方括号。`$_FILES`数组的最终结构与图\
  \ 9-9 相同。\n\n## PHP 解决方案 9-6：调整类以处理多文件上传\n\n这个 PHP 解决方案展示了如何调整`Upload`类的`upload()`方法，以处理多文件上传。当`$_FILES`数组的结构如图\
  \ 9-9 所示时，类会自动检测，并使用循环来处理上传的任意数量的文件。\n\n当你从仅处理单次上传的表单上传文件时，`$_FILES`数组将文件名作为字符串存储在`$_FILES['image']['name']`中。但是，当你从支持多文件上传的表单上传时，`$_FILES['image']['name']`是一个数组。即使只上传了一个文件，其名称也会存储为`$_FILES['image']['name'][0]`。因此，通过检测`name`元素是否为数组，你可以决定如何处理`$_FILES`数组。如果`name`元素是一个数组，你需要将每个文件的详细信息提取到单独的数组中，然后使用循环处理每个文件。\n\
  \n考虑到这一点，请继续使用你现有的类文件。或者，使用`ch09/PhpSolutions/File`文件夹中的`Upload_04.php`。\n\n1. \
  \ 修改`upload()`方法，添加一个条件语句来检查`$uploaded`的`name`元素是否为数组：\n\n    ```\n    public function\
  \ upload($fieldname, $size = null, array $mime = null,\n    $renameDuplicates =\
  \ true) {\n    $uploaded = $_FILES[$fieldname];\n    if (!is_null($size) && $size\
  \ > 0) {\n    $this->max = (int) $size;\n    }\n    if (!is_null($mime)) {\n   \
  \ $this->permitted = array_merge($this->permitted, $mime);\n    }\n    if (is_array($uploaded['name']))\
  \ {\n    // 处理多文件上传\n    } else {\n    if ($this->checkFile($uploaded)) {\n    $this->checkName($uploaded,\
  \ $renameDuplicates);\n    $this->moveFile($uploaded);\n    }\n    }\n    }\n  \
  \  ```\n\n    如果`$uploaded['name']`是一个数组，则需要特殊处理。原有的`checkFile()`调用现在放在`else`块内。\n\
  \n2.  为了处理多文件上传，关键挑战在于将单个文件相关的五个值（`name`、`type`等）收集起来，然后再将它们传递给`checkFile()`、`checkName()`和`moveFile()`方法。\n\
  \n    如果你参考图 9-9，`$uploaded`数组中的每个元素都是一个索引数组。因此，第一个文件的名称位于 name 子数组的索引 0 处，其类型位于\
  \ type 子数组的索引 0 处，以此类推。我们可以使用循环来提取索引 0 处的每个值，并将这些值与相关的键组合起来。\n\n    首先，我们需要找出上传了多少个文件。这很容易通过将\
  \ name 子数组传递给`count()`函数来实现。在多文件上传注释后添加以下代码，如下所示：\n\n    ```\n    // 处理多文件上传\n \
  \   $numFiles = count($uploaded['name']);\n    ```\n\n3.  接下来，通过添加以下代码提取子数组的键：\n\
  \n    ```\n    $keys = array_keys($uploaded);\n    ```\n\n    这将创建一个由`name`、`type`、`tmp_file`等组成的数组。\n\
  \n4.  现在我们可以创建一个循环来构建每个文件详细信息的数组。在你刚插入的代码之后添加以下代码：\n\n    ```\n    for ($i = 0;\
  \ $i < $numFiles; $i++) {\n    $values = array_column($uploaded, $i);\n    $currentfile\
  \ = array_combine($keys, $values);\n    print_r($currentfile);\n    }\n    ```\n\
  \n    该循环重新组织`$_FILES`数组的内容，使得每个文件的详细信息如同单独上传时一样可用。换句话说，与其将所有的 name、type 和其他元素分组在一起，`$currentfile`包含单个文件详细信息的关联数组，可以使用我们在`Upload`类中已经定义的方法进行处理。\n\
  \n    只需两行代码即可实现这一点。那么，让我们检查一下发生了什么。`array_column()`函数从多维数组中提取所有具有相同键或索引（作为第二个参数传递）的子数组中的元素。在这种情况下，第二个参数是计数器`$i`。当循环首次运行时，`$i`为\
  \ 0。因此，它会提取`$uploaded`（即`$_FILES['image']`）每个子数组中索引 0 处的值。每个子数组有不同的键（`name`、`type`等）这一事实无关紧要；`array_column()`仅搜索每个子数组内部匹配的键或索引。实际上，它获取的是已上传的第一个文件的详细信息。\n\
  \n    然后，`array_combine()`函数构建一个数组，将每个值分配给其相关的键。因此，name 子数组中索引 0 处的值变为`$currentfile['name']`，type\
  \ 子数组中索引 0 处的值变为`$currentfile['type']`，以此类推。\n\n    下次循环运行时，`$i`递增，从而构建第二个文件详细信息的数组。循环持续运行，直到所有文件的详细信息都被处理完毕。由于这在概念上可能难以理解，我添加了`print_r()`来检查结果。\n\
  \n5.  保存`Upload.php`。要测试它，请更新`file_upload.php`，在文件字段的`name`属性末尾添加一对方括号，并插入`multiple`属性，如下所示：\n\
  \n    ```\n    <input type=\"file\" name=\"image[]\" multiple>\n    ```\n\n\n\n\
  - 你不需要在`DOCTYPE`声明之上的 PHP 代码做任何修改。\n- 无论单文件还是多文件上传，代码都是相同的。\n\n> **注意**：IE 10 之前的\
  \ Internet Explorer 只会上传选择的最后一个文件。\n\n1. 保存`file_upload.php`并在浏览器中重新加载。通过选择多个文件进行测试。点击上传时，每个文件的详细信息应显示在单独的数组中。右键查看浏览器的源代码，你应看到类似图\
  \ 9-10 的内容。\n\n![../images/332054_4_En_9_Chapter/332054_4_En_9_Fig10_HTML.jpg](img/332054_4_En_9_Fig10_HTML.jpg)\n\
  \n**图 9-10.** 每个上传文件的详细信息现在都位于单独的数组中\n\n2. 既然我们有了每个文件的详细信息数组，就可以像之前一样处理它们。简单的方法是将以下代码块从`else`块中复制，粘贴到`for`循环中替换对`print_r()`的调用（将所有`$uploaded`实例改为`$currentfile`）：\n\
  \n```\nif ($this->checkFile($uploaded)) {\n    $this->checkName($uploaded, $renameDuplicates);\n\
  \    $this->moveFile($uploaded);\n}\n```\n\n这只有四行代码，重复似乎不是什么大问题。然而，将来你可能需要编辑代码，也许是为了增加更多检查。那时你就需要对两个代码块做同样的修改——这正是代码错误开始蔓延的地方。现在这是一个独立的例程，应该放在专用的内部方法中。\n\
  \n不要复制这段代码，而是将其剪切到剪贴板。\n\n3. 在`Upload`类定义内部创建一个新的`protected`方法，并粘贴你刚刚剪切的代码。新方法如下所示：\n\
  \n```\nprotected function processUpload($uploaded, $renameDuplicates) {\n    if\
  \ ($this->checkFile($uploaded)) {\n        $this->checkName($uploaded, $renameDuplicates);\n\
  \        $this->moveFile($uploaded);\n    }\n}\n```\n\n4. 在`for`循环和`else`块中调用这个新方法。更新后的完整`upload()`方法现在如下所示：\n\
  \n```\npublic function upload($fieldname, $size = null, array $mime = null,\n$renameDuplicates\
  \ = true) {\n    $uploaded = $_FILES[$fieldname];\n    if (!is_null($size) && $size\
  \ > 0) {\n        $this->max = (int)$size;\n    }\n    if (!is_null($mime)) {\n\
  \        $this->permitted = array_merge($this->permitted, $mime);\n    }\n    if\
  \ (is_array($uploaded['name'])) {\n        // 处理多文件上传\n        $numFiles = count($uploaded['name']);\n\
  \        $keys = array_keys($uploaded);\n        for ($i = 0; $i < $numFiles; $i++)\
  \ {\n            $currentfile = [];\n            foreach ($keys as $key) {\n   \
  \             $currentfile[$key] = $uploaded[$key][$i];\n            }\n       \
  \     $this->processUpload($currentfile, $renameDuplicates);\n        }\n    } else\
  \ {\n        $this->processUpload($uploaded, $renameDuplicates);\n    }\n}\n```\n\
  \n5. 保存`Upload.php`并尝试上传多个文件。你应该能看到与每个文件相关的消息。符合你标准的文件会被上传，过大或类型错误的文件会被拒绝。该类同样适用于单文件上传。\n\
  \n你可以将代码与`ch09/PhpSolutions/File`文件夹中的`Upload_05.php`进行对照。\n\n## 使用 Upload 类\n\n\
  `Upload`类使用起来很简单——只需按照本章前面“导入命名空间类”中的描述导入命名空间。在脚本中包含类定义，并通过将文件路径作为参数传递给`upload_test`文件夹来创建`Upload`对象，如下所示：\n\
  \n```\n$destination = 'C:/upload_test/';\n$loader = new Upload($destination);\n\
  ```\n\n> **提示**：上传文件夹路径末尾的斜杠是可选的。\n\n默认情况下，该类只允许上传图片，但这可以覆盖。该类有以下公共方法：\n\n- `upload($fieldname,\
  \ $size = null, array $mime = null, $renameDuplicates = true)`：将文件保存到目标文件夹。文件名中的空格会被下划线替换。默认情况下，与现有文件同名的文件会通过在文件扩展名前插入数字来重命名。该方法接受以下参数：\n\
  \    - `$fieldname`（必需）：上传表单中文件输入字段的名称。\n    - `$size`（可选）：一个整数，用于更改默认的最大文件大小（单位：字节，默认值\
  \ 51200，相当于 50 KB）。\n    - `$permitted`（可选）：一个 MIME 类型数组，用于允许上传图像以外的文件。\n    - `$renameDuplicates`（可选）：将其设置为`false`会覆盖上传文件夹中同名的文件。\n\
  \n- `getMessages()`：返回一个报告上传状态的数组。\n\n## 文件上传的注意事项\n\nPHP 解决方案 9-1 中的基本脚本表明，通过 Web\
  \ 表单上传文件对于 PHP 来说相当简单。失败的主要原因是没有为上传目录或文件夹设置正确的权限，以及忘记在脚本结束前将上传的文件移动到目标位置。基本脚本的问题在于它允许上传几乎任何内容。这就是本章投入大量精力构建更健壮解决方案的原因。即使`Upload`类执行了额外的检查，你也应该仔细考虑安全性。\n\
  \n允许他人将文件上传到你的服务器会给你带来风险。实际上，你在允许访问者自由地向服务器的硬盘写入数据。你不会允许陌生人在你自己的电脑上这样做，因此你应该以同样的警惕性来保护上传目录的访问权限。\n\
  \n理想情况下，上传应限于已注册的受信任用户，因此上传表单应位于网站中密码保护的部分。注册可以让你阻止滥用信任的人。此外，上传文件夹不需要位于网站根目录内，因此尽可能将其放在私有目录中。上传的图像可能包含隐藏脚本，因此不应将它们放在具有执行权限的文件夹中。请记住，PHP\
  \ 无法检查内容是否合法或得体，因此立即公开显示会带来超出单纯技术层面的风险。你还应该牢记以下安全要点：\n\n- 在 Web 表单和服务器端都设置上传文件的最大大小。\n\
  - 通过检查`$_FILES`数组中的 MIME 类型来限制上传文件的类型。\n- 将文件名中的空格替换为下划线或连字符。\n- 定期检查你的上传文件夹。确保其中没有不应存在的内容，并定期进行清理。即使你限制了文件上传大小，也可能在不知不觉中耗尽分配的磁盘空间。\n\
  \n## 章节回顾\n\n本章向你介绍了如何创建一个 PHP 类。如果你是 PHP 或编程新手，可能会觉得有些难度。不要灰心。`Upload`类包含超过 150\
  \ 行代码，其中一些代码很复杂，尽管我希望描述已经解释了代码在每个阶段的作用。即使你不理解所有代码，`Upload`类也能为你节省大量时间。它实现了文件上传所必需的主要安全措施，而使用它只需要十行左右的代码：\n\
  \n```\nuse PhpSolutions\\File\\Upload;\nif (isset($_POST['upload'])) {\n    require_once\
  \ 'PhpSolutions/File/Upload.php'; // 使用正确的路径\n    try {\n        $loader = new Upload('C:/upload_test/');\
  \  // 将目标文件夹作为参数\n        $loader->upload('image');\n        $result = $loader->getMessages();\n\
  \    } catch (Throwable $t) {\n        echo $t->getMessage();\n    }\n}\n```\n\n\
  \n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n---\n\n\n如果觉得这一章很难理解，可以先跳过，等积累了更多经验再回过头来看，到时候你会发现代码更容易理解。\n\
  \n下一章将学习如何使用 PHP 的图像处理函数，从较大的图片生成缩略图。还会扩展本章的 `Upload` 类，将上传和调整图片大小合并为一步操作。\n\n##\
  \ 10. 生成缩略图\n\nPHP 拥有一系列功能强大的图像处理函数。你在第 5 章已经见过其中之一——`getimagesize()`。除了提供图片尺寸的有用信息外，PHP\
  \ 还可以调整图片大小或旋转图片。它还能在不影响原图的情况下动态添加文字，甚至能即时创建图片。\n\n为了让你领略 PHP 图像处理的能力，我将展示如何生成上传图片的较小副本。大多数情况下，你会使用专用图形处理程序（如\
  \ Adobe Photoshop）来生成缩略图，因为这样可以更好地控制质量。但是，如果你希望允许注册用户上传图片，同时确保它们不超过最大尺寸，那么使用 PHP\
  \ 自动生成缩略图就非常有用了。你可以只保存调整大小后的副本，也可以同时保存原图和副本。\n\n在上一章中，你构建了一个处理文件上传的 PHP 类。本章将创建两个类：一个用于生成缩略图，另一个用于将上传和调整图片大小合并为一步操作。第二个类并非从零开始构建，而是基于第\
  \ 9 章的 `Upload` 类。使用类的一大优势在于它们是**可扩展的**——基于另一个类的类可以继承其父类的功能。构建用于上传图片和生成缩略图的类需要大量代码。但是，一旦定义了这些类，使用它们只需要几行脚本。如果你赶时间，或者编写大量代码让你冷汗直冒，可以直接使用现成的类。稍后再回来学习代码的工作原理。它使用了大量在其它场景下也很有用的基础\
  \ PHP 函数。\n\n本章将学习以下内容：\n\n*   缩放图片\n*   保存缩放后的图片\n*   自动调整大小并重命名上传的图片\n*   通过扩展现有类来创建子类\n\
  \n### 检查服务器能力\n\n在 PHP 中处理图像依赖于 GD 扩展。第 2 章推荐的集成 PHP 包默认支持 GD，但你需要确保远程 Web 服务器上也已启用\
  \ GD 扩展。与之前章节一样，在你的网站上运行 `phpinfo()` 来检查服务器配置。向下滚动，直到找到如下截图中所示的区域（它应该位于页面大约一半的位置）：\n\
  \n![../images/332054_4_En_10_Chapter/332054_4_En_10_Figa_HTML.jpg](img/332054_4_En_10_Figa_HTML.jpg)\n\
  \n如果找不到这个区域，说明 GD 扩展未启用，你将无法在你的网站上使用本章的任何脚本。请请求启用它，或者更换一个主机。\n\n别忘了删除运行 `phpinfo()`\
  \ 的文件，除非它位于受密码保护的目录中。\n\n### 动态处理图像\n\nGD 扩展允许你完全从零开始生成图像，或者处理现有图像。无论哪种方式，底层过程始终遵循四个基本步骤：\n\
  \n1.  在服务器内存中为正在处理的图像创建一个资源。\n2.  处理图像。\n3.  显示和/或保存图像。\n4.  从服务器内存中移除图像资源。\n\n\
  这个过程意味着你始终只操作内存中的图像，而不是原始图像。除非在脚本终止前将图像保存到磁盘，否则任何更改都将被丢弃。处理图像通常需要大量内存，因此一旦不再需要图像资源，就必须立即销毁它。如果脚本运行缓慢或崩溃，很可能表明原始图像过大。\n\
  \n### 制作较小的图片副本\n\n本章的目标是向你展示如何在上传时自动调整图片大小。这涉及扩展第 9 章的 `Upload` 类。但是，为了更容易理解如何使用\
  \ PHP 的图像处理函数，我建议先从处理服务器上已有的图片开始，然后创建一个单独的类来生成缩略图。\n\n#### 准备工作\n\n起点是以下简单的表单，它使用\
  \ PHP 解决方案 7-3 创建了 `images` 文件夹中照片的下拉菜单。你可以在 `ch10` 文件夹的 `create_thumb_01.php` 中找到代码。将其复制到\
  \ `phpsols-4e` 站点根目录下名为 `gd` 的新文件夹中，并重命名为 `create_thumb.php`。\n\n页面的主体部分中的表单如下所示：\n\
  \n```\n<form action=\"<?= $_SERVER['PHP_SELF'] ?>\" method=\"get\">\n    <select\
  \ name=\"img\" id=\"img\">\n        <?php\n        $files = new FilesystemIterator('../images');\n\
  \        foreach ($files as $file) {\n            $filename = $file->getFilename();\n\
  \            ?>\n            <option value=\"<?= $file->getRealPath() ?>\"><?= $filename\
  \ ?></option>\n        <?php } ?>\n    </select>\n    <input type=\"submit\" value=\"\
  Select\">\n</form>\n```\n\n加载到浏览器后，下拉菜单应显示 `images` 文件夹中照片的名称。这使得测试时可以快速选择图片。每个图片的完整路径通过调用\
  \ `SplFileInfo::getRealPath()` 方法插入到 `<option>` 标签的 `value` 属性中。\n\n在你于第 9 章创建的\
  \ `upload_test` 文件夹内，创建一个名为 `thumbs` 的新文件夹，确保它具有 PHP 写入所需的权限。如果需要，请回顾上一章的“建立上传目录”部分。\n\
  \n#### 构建 Thumbnail 类\n\n为了生成缩略图，该类需要执行以下步骤：\n\n1.  获取原始图片的尺寸。\n2.  获取图片的 MIME 类型。\n\
  3.  计算缩放比例。\n4.  为原始图片创建正确 MIME 类型的图像资源。\n5.  为缩略图创建一个图像资源。\n6.  创建调整大小后的副本。\n7.\
  \  使用正确的 MIME 类型将调整大小后的副本保存到目标文件夹。\n8.  销毁图像资源以释放内存。\n\n除了生成缩略图外，该类会自动在文件名扩展名之前插入\
  \ `_thb`，但构造函数方法的一个可选参数允许你更改这个值。另一个可选参数设置缩略图的最大尺寸。为了简化计算，最大尺寸仅控制缩略图两个尺寸中较大的那个。\n\
  \n为了避免命名冲突，`Thumbnail` 类将使用命名空间。由于它是专门用于图像的，我们将在 `PhpSolutions` 文件夹中创建一个名为 `Image`\
  \ 的新文件夹，并使用 `PhpSolutions\\Image` 作为命名空间。\n\n有很多事情要做，所以我会把代码分成几个部分。它们都是同一个类定义的一部分，但以这种方式呈现脚本应该更容易理解，特别是如果你想在其它上下文中使用部分代码的话。\n\
  \n#### PHP 解决方案 10-1：获取图片详情\n\n这个 PHP 解决方案描述了如何获取原始图片的尺寸和 MIME 类型。\n\n1.  在 `PhpSolutions`\
  \ 文件夹中创建一个名为 `Image` 的新文件夹。然后在该文件夹内创建一个名为 `Thumbnail.php` 的页面。该文件将只包含 PHP 代码，因此请去除编辑程序插入的任何\
  \ HTML 代码。\n\n2.  在新文件顶部声明命名空间：\n\n```\nnamespace PhpSolutions\\Image;\n```\n\n\
  3.  该类需要跟踪相当多的属性。像这样列出它们来开始类的定义：\n\n\n\n```php\nclass Thumbnail {\n    protected\
  \ $original;\n    protected $originalwidth;\n    protected $originalheight;\n  \
  \  protected $basename;\n    protected $maxSize = 120;\n    protected $imageType;\n\
  \    protected $destination;\n    protected $suffix = '_thb';\n    protected $messages\
  \ = [];\n}\n```\n\n与 `Upload` 类一样，所有属性都被声明为 protected，这意味着它们不会在类定义之外被意外更改。这些属性名称都具有描述性，因此不需过多解释。`$maxSize`\
  \ 属性的默认值为 120（像素），用于确定缩略图较长边的最大尺寸。\n\n4.  构造方法接受一个参数，即图像的路径。请在其他 protected 属性列表之后、闭右花括号之内添加构造方法的定义：\n\
  \n```php\npublic function __construct($image) {\n    if (is_file($image) && is_readable($image))\
  \ {\n        $details = getimagesize($image);\n    } else {\n        throw new \\\
  Exception(\"Cannot open $image.\");\n    }\n    if (!is_array($details)) {\n   \
  \     throw new \\Exception(\"$image doesn't appear to be an image.\");\n    } else\
  \ {\n        if ($details[0] == 0) {\n            throw new \\Exception(\"Cannot\
  \ determine size of $image.\");\n        }\n        // 检查 MIME 类型\n        if (!$this->checkType($details['mime']))\
  \ {\n            throw new \\Exception('Cannot process that type of file.');\n \
  \       }\n        $this->original = $image;\n        $this->originalwidth = $details[0];\n\
  \        $this->originalheight = $details[1];\n        $this->basename = pathinfo($image,\
  \ PATHINFO_FILENAME);\n    }\n}\n```\n\n构造方法首先执行一个条件语句，检查 `$image` 是否为文件且可读。如果是，则将文件传入\
  \ `getimagesize()`，并将结果存入 `$details`；否则抛出异常。与上一章类似，`Exception` 前加反斜杠表示我们要使用核心 `Exception`\
  \ 类，而非针对此命名空间自定义的异常类。\n\n当你将图像传入 `getimagesize()` 时，它会返回一个包含以下元素的数组：\n\n*   `0`：宽度（以像素为单位）\n\
  *   `1`：高度\n*   `2`：表示图像类型的整数值\n*   `3`：包含正确的宽度和高度属性的字符串，可直接用于 `<img>` 标签\n*   `mime`：图像的\
  \ MIME 类型\n*   `channels`：`3` 表示 RGB 图像，`4` 表示 CMYK 图像\n*   `bits`：每种颜色占用的位数\n\n\
  如果传入 `getimagesize()` 的参数不是图像，则返回 `false`。因此，若 `$details` 不是数组，则抛出异常，报告该文件似乎不是图像。但如果\
  \ `$details` 是数组，则意味着我们处理的很可能是一张图像。然而 `else` 块在继续处理之前还会进行两项额外检查。\n\n如果 `$details`\
  \ 数组中第一个元素的值为 0，说明图像有问题，因此抛出异常，报告无法确定图像尺寸。下一个检查会将报告的 MIME 类型传递给一个名为 `checkType()`\
  \ 的内部方法（该方法将在下一步中定义）。如果 `checkType()` 返回 `false`，则抛出另一个异常。\n\n这一系列异常处理机制确保，如果图像存在问题，不会进行任何后续处理。假设脚本顺利通过所有检查，则图像的路径会被存储在\
  \ `$original` 属性中，而其宽度和高度分别存储在 `$originalWidth` 和 `$originalHeight` 属性中。\n\n通过 `pathinfo()`\
  \ 函数并传入 `PATHINFO_FILENAME` 常量来提取不含扩展名的文件名，这与 PHP 解决方案 9-5 中的做法相同。提取到的文件名存储在 `$basename`\
  \ 属性中，后续将用于结合后缀名构建缩略图的名称。\n\n5.  `checkType()` 方法将 MIME 类型与一个可接受的图像类型数组进行比对。如果找到匹配项，则将类型存储在\
  \ `$imageType` 属性中并返回 `true`；否则返回 `false`。该方法在内部使用，因此需要声明为 protected。请将以下代码添加到类的定义中：\n\
  \n```php\nprotected function checkType($mime) {\n    $mimetypes = ['image/jpeg',\
  \ 'image/png', 'image/gif', 'image/webp'];\n    if (in_array($mime, $mimetypes))\
  \ {\n        // 提取 '/' 之后的字符\n        $this->imageType = substr($mime, strpos($mime,\
  \ '/')+1);\n        return true;\n    }\n    return false;\n}\n```\n\n浏览器普遍支持的图像类型只有\
  \ JPEG、PNG 和 GIF；但我将 WebP 也包含在内，因为目前它已被广泛支持。所有图像 MIME 类型都以 `image/` 开头。为了方便后续使用，`substr()`\
  \ 函数会提取斜杠之后的字符，并将其存储在 `$imageType` 属性中。当 `substr()` 使用两个参数时，它会从第二个参数指定的位置（从 0 开始计数）开始，并返回字符串的剩余部分。我没有使用固定数字作为第二个参数，而是使用\
  \ `strpos()` 函数来查找斜杠的位置并加 1。这样做使代码更具通用性，因为某些专有图像格式以 `application/` 而非 `image/` 开头。`strpos()`\
  \ 的第一个参数是要搜索的整个字符串，第二个参数是要搜索的子字符串。\n\n6.  在构建类时进行代码测试是个好习惯。尽早发现错误比在长脚本中排查问题容易得多。为了测试代码，请在类定义中创建一个名为\
  \ `test()` 的新公共方法。\n\n方法在类定义中的出现顺序无关紧要，但常见的做法是将所有公共方法集中在构造方法之后，并将 protected 方法放在文件底部。这有助于代码维护。\n\
  \n请在构造方法和 `checkType()` 定义之间插入以下定义：\n\n```php\npublic function test() {\n    $details\
  \ = <<<END\n文件: $this->original\n原始宽度: $this->originalwidth\n原始高度: $this->originalheight\n\
  基本名称: $this->basename\n图像类型: $this->imageType\nEND;\n    // 移除以消息形式输出前面一行时的缩进） {\n\
  \    print_r($this->messages);\n}\n```\n\n该方法使用 `echo` 配合 heredoc 语法（参见第 4 章“使用\
  \ heredoc 语法避免引号转义”）以及 `print_r()` 来显示属性的值。虽然输出中没有引号，但结合 `<pre>` 标签使用 heredoc 语法能让代码和输出更易读。\n\
  \n> **注意**  \n如果您使用的 PHP 版本低于 7.3，则结束分隔符（`END`）不得缩进。在 PHP 7.3 及更高版本中，可以缩进，但缩进量不能超过代码其余部分。\n\
  \n![图 10-1. 显示所选图像的详细信息，确认代码正常工作](img/332054_4_En_10_Fig1_HTML.jpg)\n\n1.  要测试当前的类定义，请保存\
  \ `Thumbnail.php`，并将以下代码添加到 `create_thumb.php` 中 `DOCTYPE` 声明之前的 PHP 代码块中（该代码可在\
  \ `ch10` 文件夹的 `create_thumb_02.php` 中找到）：\n\n```php\nuse PhpSolutions\\Image\\Thumbnail;\n\
  if (isset($_POST['create'])) {\n    require_once('../PhpSolutions/Image/Thumbnail.php');\n\
  \    try {\n        $thumb = new Thumbnail($_POST['pix']);\n        $thumb->test();\n\
  \    } catch (Throwable $t) {\n        echo $t->getMessage();\n    }\n}\n```\n\n\
  这段代码从 `PhpSolutions\\Image` 命名空间导入 `Thumbnail` 类，然后添加了表单提交时要执行的代码。\n\n\n\n`name`属性在`create_thumb.php`的提交按钮中是`create`，因此这段代码仅在表单提交后执行。它包含`Thumbnail`类定义，创建该类的一个实例（将表单中选择的值作为参数传递），并调用`test()`方法。\n\
  \n`catch`块使用`Throwable`作为类型声明，因此它将处理内部 PHP 错误以及`Thumbnail`类抛出的异常。\n\n2. 保存`create_thumb.php`并在浏览器中加载。选择一张图片并单击\"\
  创建缩略图\"。输出结果类似于图 10-1。\n\n如有必要，请将代码与`ch10/PhpSolutions/Images`文件夹中的`Thumbnail_01.php`进行核对。\n\
  \n**注意**  \n`$_POST['pix']`的值被直接传递给`test()`方法，因为它直接来自我们自己的表单。在生产环境中，您应始终检查从表单接收的值。例如，使用`basename()`提取纯文件名并指定允许的目录。\n\
  \n虽然某些属性具有默认值，但您需要提供选项来更改缩略图的最大大小以及应用于文件名基础的尾缀。您还需要告知类在哪里创建缩略图。\n\n**PHP 解决方案 10-2：更改默认值**\n\
  \n当更改类设置的默认值时，您有多种方法可以选择。一种方法是创建需要在对象实例化后调用的公共方法。另一种方法是将值作为参数传递给构造方法。无论采用哪种方法，检查提交的值是否有效都很重要。继续使用同一个类定义。或者，使用`ch10/PhpSolutions/Image`文件夹中的`Thumbnail_01.php`。\n\
  \n1. 首先，更新构造方法，为缩略图的目标文件夹、缩略图的最大大小以及要添加到文件名的尾缀添加参数。构造方法将这些值的设置委托给也需要定义的受保护方法。更新后的代码如下所示：\n\
  \n```php\npublic function __construct($image, $destination, $maxSize = 120, $suffix\
  \ = '_thb') {\n    if (is_file($image) && is_readable($image)) {\n        $details\
  \ = getimagesize($image);\n    } else {\n        throw new \\Exception(\"Cannot\
  \ open $image.\");\n    }\n    // if getimagesize() returns an array, it looks like\
  \ an image\n    if (!is_array($details)) {\n        throw new \\Exception(\"$image\
  \ doesn't appear to be an image.\");\n    } else {\n        if ($details[0] == 0)\
  \ {\n            throw new \\Exception(\"Cannot determine size of $image.\");\n\
  \        }\n        // check the MIME type\n        if (!$this->checkType($details['mime']))\
  \ {\n            throw new \\Exception('Cannot process that type of file.');\n \
  \       }\n        $this->original = $image;\n        $this->originalwidth = $details[0];\n\
  \        $this->originalheight = $details[1];\n        $this->basename = pathinfo($image,\
  \ PATHINFO_FILENAME);\n        $this->setDestination($destination);\n        $this->setMaxSize($maxSize);\n\
  \        $this->setSuffix($suffix);\n    }\n}\n```\n\n2. 接下来，创建用于设置缩略图目标文件夹的方法。在`checkType()`方法定义之后，将以下代码添加到`Thumbnail.php`中：\n\
  \n```php\nprotected function setDestination($destination) {\n    if (is_dir($destination)\
  \ && is_writable($destination)) {\n        $this->destination = rtrim($destination,\
  \ '/\\\\') . DIRECTORY_SEPARATOR;\n    } else {\n        throw new \\Exception(\"\
  Cannot write to $destination.\");\n    }\n}\n```\n\n该方法首先检查`$destination`是否为文件夹（目录）且可写。如果不是，则抛出异常。否则，执行其余代码。\n\
  \n在将提交的值赋值给`$destination`属性之前，我们需要确保它以单个尾部斜杠结尾。这是通过将提交的值传递给`rtrim()`函数来实现的，该函数通常用于去除字符串末尾的空白字符。但是，如果传递一个字符串作为第二个参数，它也会去除这些字符。因此，这会从字符串末尾去除正斜杠和反斜杠——需要使用两个反斜杠，因为\
  \ PHP 使用反斜杠来转义单引号和双引号（参见第[4]章中的“在双引号内使用转义序列”）。然后将 PHP 常量`DIRECTORY_SEPARATOR`连接到`$destination`的末尾。`DIRECTORY_SEPARATOR`常量会根据操作系统自动选择正确的斜杠类型。\n\
  \n**提示**  \nPHP 在路径中同等对待正斜杠或反斜杠。即使这导致添加了相反类型的斜杠，对 PHP 而言路径仍然有效。但是，在为 PHP 脚本之外的使用构建路径时（例如创建\
  \ URL 或将路径交给外部程序执行），您不能依赖此行为。\n\n1. 更改缩略图最大大小的方法只需检查该值是否为数字。将以下代码添加到类定义中：\n\n```php\n\
  protected function setMaxSize($size) {\n    if (is_numeric($size)) {\n        $this->maxSize\
  \ = abs($size);\n    }\n}\n```\n\n`is_numeric()`函数检查提交的值是否为数字或数字字符串。如果是，则将其赋值给`$maxSize`属性。作为预防措施，将该值传递给`abs()`函数，该函数将数字转换为其绝对值。换句话说，负数会被转换为正数。\n\
  \n如果提交的值不是数字，则不执行任何操作。默认值保持不变。\n\n2. 更改文件名尾缀的函数需要确保该值不包含任何特殊字符。代码如下所示：\n\n```php\n\
  protected function setSuffix($suffix) {\n    if (preg_match('/^\\w+$/', $suffix))\
  \ {\n        if (strpos($suffix, '_') !== 0) {\n            $this->suffix = '_'\
  \ . $suffix;\n        } else {\n            $this->suffix = $suffix;\n        }\n\
  \    }\n}\n```\n\n这里使用了`preg_match()`，它以正则表达式作为第一个参数，并在作为第二个参数传递的值中搜索匹配项。正则表达式需要包裹在一对匹配的分隔符中——此处使用的是通常的正斜杠。去掉分隔符后，正则表达式如下：\n\
  \n```\n^\\w+$\n```\n\n在此上下文中，脱字符（`^`）告诉正则表达式从字符串开头开始匹配。`\\w`是一个正则表达式标记，匹配任何字母数字字符或下划线。`+`表示匹配前面的标记或字符一次或多次，`$`表示匹配字符串结尾。换句话说，该正则表达式匹配仅包含字母数字字符和下划线的字符串。如果字符串包含空格或特殊字符，则不会匹配。\n\
  \n如果匹配失败，默认的`$suffix`属性保持不变。否则，执行以下条件语句：\n\n```php\nif (strpos($suffix, '_') !==\
  \ 0) {\n```\n\n\n\n"
- "# 如果 `$suffix` 的第一个字符*不是*下划线，则条件为 `true`。这里使用 `strpos()` 函数查找第一个下划线的位置。如果第一个字符是下划线，`strpos()`\
  \ 返回的值是 0。然而，如果 `$suffix` 不包含下划线，`strpos()` 会返回 `false`。如第 4 章所述，PHP 将 `0` 视为 `false`，因此条件需要使用“不全等”运算符（两个等号）。所以，如果后缀不是以下划线开头，就添加一个下划线。否则，保留原始值。\n\
  \n**注意事项**  \n不要混淆 `strpos()` 和 `strrpos()`。前者查找第一个匹配字符的位置。后者则是反向搜索字符串。\n\n1. 更新\
  \ `test()` 方法，显示你刚为其创建了 setter 方法的属性值。修改后的代码如下：\n\n```\npublic function test() {\n\
  \    $details = <<<END\n    文件：$this->original\n    原始宽度：$this->originalwidth\n\
  \    原始高度：$this->originalheight\n    基本名称：$this->basename\n    图片类型：$this->imageType\n\
  \    目标路径：$this->destination\n    最大尺寸：$this->maxSize\n    后缀：$this->suffix\nEND;\n\
  \    // 移除消息中上一行的缩进) {\n    print_r($this->messages);\n    }\n}\n```\n\n2. 通过在 `create_thumb.php`\
  \ 中设置新参数来测试更新后的类，如下所示：\n\n```\n$thumb = new Thumbnail($_POST['pix'], 'C:/upload_test/thumbs',\
  \ 100, 'small');\n$thumb->test();\n```\n\n将 `upload_test/thumbs` 的路径调整为与你自己的设置匹配。\n\
  \n3. 保存两个页面，并从 `create_thumb.php` 的列表中选择一张图片。你应该会看到与图 10-2 相似的结果。\n\n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig2_HTML.jpg](img/332054_4_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2. 验证默认值已更改\n\n4. 进行多次测试，包括从传递给 `setDestination()` 的值中省略尾部斜杠，或选择一个不存在的文件夹。同时为最大尺寸和后缀传递无效值。无效的目标文件夹会抛出异常，但其他情况会静默失败，对于最大尺寸使用默认值，对于后缀使用\
  \ `_thb`。\n\n如有必要，将你的代码与 `ch10/PhpSolutions/Image` 中的 `Thumbnail_02.php` 以及 `ch10`\
  \ 文件夹中的 `create_thumb_03.php` 进行对比。\n\n你可能不同意我对传递无效参数时静默失败的决策。不过，到现在为止，你应该已经具备了足够的条件语句经验，可以根据自己的需求调整代码。例如，如果你希望\
  \ `setMaxSize()` 方法抛出异常而不是静默失败，可以检查该值是否大于零并添加一个 `else` 块来处理错误。下面是修改 `setMaxSize()`\
  \ 方法的方式：\n\n```\nprotected function setMaxSize($size) {\n    if (is_numeric($size)\
  \ && $size > 0) {\n        $this->maxSize = $size;\n    } else {\n        throw\
  \ new \\Exception('传递给 setMaxSize() 的值必须为正数。');\n    }\n}\n```\n\n## PHP 解决方案 10-3：计算缩略图的尺寸\n\
  \n这个 PHP 解决方案向 `Thumbnail` 类添加了一个受保护的方法，用于计算缩略图的尺寸。`$maxSize` 属性中设置的值决定了宽度或高度，具体取决于哪一边更大。为了避免缩略图失真，你需要计算较短边的缩放比例。该比例通过将最大缩略图尺寸除以原始图片的较大边来计算。\n\
  \n例如，金阁寺的原始图片（`kinkakuji.jpg`）尺寸为 270 × 346 像素。如果最大尺寸设置为 120，将 120 除以 346 会得到 0.3468\
  \ 的缩放比例。将原始图片的宽度乘以这个比例，可将缩略图的宽度固定为 94 像素（向上取整到最接近的整数），从而保持正确的比例。图 10-3 展示了缩放比例的工作原理。\n\
  \n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig3_HTML.jpg](img/332054_4_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3. 计算缩略图的缩放比例\n\n继续使用你现有的类定义。或者使用 `ch10/PhpSolutions/Image` 文件夹中的 `Thumbnail_02.php`。\n\
  \n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig4_HTML.jpg](img/332054_4_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4. 该类现在生成了创建缩略图所需的所有值\n\n1. 计算缩略图尺寸不需要任何额外的用户输入，因此可以由一个受保护的方法来处理。向类定义中添加以下代码。\n\
  \n```\nprotected function calculateRatio($width, $height, $maxSize) {\n    if ($width\
  \ <= $maxSize && $height <= $maxSize) {\n        return 1;\n    } elseif ($width\
  \ > $height) {\n        return $maxSize/$width;\n    } else {\n        return $maxSize/$height;\n\
  \    }\n}\n```\n\n原始图片的尺寸和最大尺寸作为 `Thumbnail` 对象的属性存储，因此，你可以在方法内部通过 `$this->originalwidth`、`$this->originalheight`\
  \ 和 `$this->maxSize` 来引用它们，而无需将它们作为参数传递。然而，像这样使用参数（一种称为依赖注入的技术）会使代码更具通用性，以便在其他地方使用。\n\
  \n条件语句首先检查原始图片的宽度和高度是否都小于或等于最大尺寸。如果是，则图片无需调整大小，因此该方法返回缩放比例 1。\n\n`elseif` 块检查宽度是否大于高度。如果是，则使用宽度来计算缩放比例。如果高度更大或两边相等，则调用\
  \ `else` 块。在这两种情况下，都使用高度来计算缩放比例。\n\n2. 要测试新方法，按如下方式修改 `test()` 方法：\n\n```\npublic\
  \ function test() {\n    $ratio = $this->calculateRatio($this->originalwidth, $this->originalheight,\
  \ $this->maxSize);\n    $thumbwidth = round($this->originalwidth * $ratio);\n  \
  \  $thumbheight = round($this->originalheight * $ratio);\n    $details = <<<END\n\
  \    文件：$this->original\n    原始宽度：$this->originalwidth\n    原始高度：$this->originalheight\n\
  \    基本名称：$this->basename\n    图片类型：$this->imageType\n    目标路径：$this->destination\n\
  \    最大尺寸：$this->maxSize\n    后缀：$this->suffix\n    缩略图宽度：$thumbwidth\n    缩略图高度：$thumbheight\n\
  END;\n    // 移除消息中上一行的缩进) {\n    print_r($this->messages);\n    }\n}\n```\n\n这会调用新方法，并将\
  \ `$originalwidth`、`$originalheight` 和 `$maxSize` 属性作为参数传递。然后使用计算出的缩放比例来计算缩略图的宽度和高度。计算结果会传递给\
  \ `round()` 函数，以转换为最接近的整数。这些计算将来需要移出 `test()` 方法，但首先检查我们是否得到了预期的结果很重要。\n\n3. 通过在\
  \ `create_thumb.php` 中选择一张图片并点击 `创建缩略图` 来测试更新后的类。你应该会看到屏幕上显示的值，如图 10-4 所示。\n\n如有必要，将你的代码与\
  \ `ch10` 文件夹中的 `Thumbnail_03.php` 进行对比。\n\n## 使用 GD 函数创建图片的缩放副本\n\n\n\n当你收集完所有必要信息后，就可以从一张较大的图片生成缩略图了。这涉及到为原始图片和缩略图分别创建图像资源。对于原始图片，你需要使用一个与图片\
  \ MIME 类型相匹配的函数。以下每个函数都接受一个参数——文件的路径：\n\n- `imagecreatefromjpeg()`\n- `imagecreatefrompng()`\n\
  - `imagecreatefromgif()`\n- `imagecreatefromwebp()`\n\n因为缩略图还不存在，你需要使用另一个不同的函数 `imagecreatetruecolor()`，它接受两个参数——宽度和高度（以像素为单位）。\n\
  \n还有另一个函数用于创建图片的调整大小后的副本：`imagecopyresampled()`。该函数至少需要十个参数——而且全部是必需的。这些参数分为五对，如下所示：\n\
  \n- 两个图像资源的引用——先复制对象，后原始对象\n- 复制图像左上角位置的 `x` 和 `y` 坐标\n- 原始图像左上角的 `x` 和 `y` 坐标\n\
  - 复制图像的宽度和高度\n- 要从原始图像中复制的区域的宽度和高度\n\n图 10-5 展示了如何使用最后四对参数来提取特定区域，该图使用了以下传递给 `imagecopyresampled()`\
  \ 的参数：\n\n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig5_HTML.jpg](img/332054_4_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5. `imagecopyresampled()` 函数允许你复制图片的一部分\n\n```\nimagecopyresampled($thumb,\
  \ $source, 0, 0, 170, 20, $thbwidth,$thbheight, 170, 102);\n```\n\n要复制的区域的 `x` 和\
  \ `y` 坐标是从图片左上角开始以像素为单位测量的。`x` 和 `y` 轴从左上角 0 开始，向右和向下递增。通过将要复制的区域的宽度和高度分别设置为 170\
  \ 和 102，PHP 会提取出白色边框所包围的区域。现在你明白网站是如何实现裁剪上传图片的功能了吧。它们使用 JavaScript 或其他技术动态计算坐标。对于\
  \ `Thumbnail` 类，你将使用整张原始图片来生成缩略图。\n\n使用 `imagecopyresampled()` 创建副本后，你需要保存它，再次使用一个特定于\
  \ MIME 类型的函数，即：\n\n- `imagejpeg()`\n- `imagepng()`\n- `imagegif()`\n- `imagewebp()`\n\
  \n每个函数的前两个参数是图像资源和你想保存的路径。`imagejpeg()`、`imagepng()` 和 `imagewebp()` 函数接受一个可选的第三个参数来设置图像质量。对于\
  \ `imagejpeg()` 和 `imagewebp()`，你通过指定一个 0（最差）到 100（最佳）范围内的数字来设置质量。如果省略该参数，`imagejpeg()`\
  \ 的默认值是 75，`imagewebp()` 的默认值是 80。对于 `imagepng()`，范围是 0 到 9。令人困惑的是，0 产生最佳质量（无压缩）。\n\
  \n最后，保存好缩略图后，你需要通过将它们传递给 `imagedestroy()` 来销毁图像资源。尽管其名称具有破坏性，但该函数对原始图片或缩略图没有任何影响。它只是通过销毁处理过程中所需的图像资源来释放服务器内存。\n\
  \n## PHP 解决方案 10-4：生成缩略图\n\n本 PHP 解决方案通过创建图像资源、复制缩略图并将其保存在目标文件夹中，完善了 `Thumbnail`\
  \ 类。\n\n继续使用你现有的类定义。或者，使用 `ch10/PhpSolutions/Image` 文件夹中的 `Thumbnail_03.php`。\n\n\
  1.  既然我们已经验证了该类正在计算正确的值来生成缩略图，我们就可以重命名 `test()` 方法并删除显示结果的代码。将方法名更改为 `create()`，并删除除了前三行之外的所有内容。你应该得到以下内容：\n\
  \n    ```\n    public function create() {\n    $ratio = $this->calculateRatio($this->originalwidth,\
  \ $this->originalheight,\n    $this->maxSize);\n    $thumbwidth = round($this->originalwidth\
  \ * $ratio);\n    $thumbheight = round($this->originalheight * $ratio);\n    }\n\
  \    ```\n\n2.  原始图片的图像资源必须特定于其 MIME 类型，因此创建一个内部方法来选择正确的类型。将以下代码添加到类定义中：\n\n   \
  \ ```\n    protected function createImageResource() {\n    switch ($this->imageType)\
  \ {\n    case 'jpeg':\n    return imagecreatefromjpeg($this->original);\n    case\
  \ 'png':\n    return imagecreatefrompng($this->original);\n    case 'gif':\n   \
  \ return imagecreatefromgif($this->original);\n    case 'webp':\n    return imagecreatefromwebp($this->original);\n\
  \    }\n    }\n    ```\n\n    你在 PHP 解决方案 10-1 中创建的 `checkType()` 方法将 MIME 类型存储为\
  \ `jpeg`、`png`、`gif` 或 `webp`。因此，`switch` 语句会检查 MIME 类型，将其匹配到相应的函数，并将原始图片作为参数传递。然后该方法返回生成的图像资源。\n\
  \n3.  `create()` 方法需要两个图像资源：一个用于原始图片，另一个用于缩略图。像这样更新 `create()` 方法：\n\n    ```\n\
  \    public function create() {\n    $ratio = $this->calculateRatio($this->originalwidth,\
  \ $this->originalheight,\n    $this->maxSize);\n    $thumbwidth = round($this->originalwidth\
  \ * $ratio);\n    $thumbheight = round($this->originalheight * $ratio);\n    $resource\
  \ = $this->createImageResource();\n    $thumb = imagecreatetruecolor($thumbwidth,\
  \ $thumbheight);\n    }\n    ```\n\n    这会调用你在第 2 步中创建的 `createImageResource()`\
  \ 方法，然后为缩略图创建一个图像资源，将缩略图的宽度和高度传递给 `imagecreatetruecolor()`。\n\n4.  创建缩略图的下一步涉及将两个图像资源传递给\
  \ `imagecopyresampled()`，并设置坐标和尺寸。将以下代码行添加到 `create()` 方法中：\n\n    ```\n    imagecopyresampled($thumb,\
  \ $resource, 0, 0, 0, 0, $thumbwidth, $thumbheight,\n    $this->originalwidth, $this->originalheight);\n\
  \    ```\n\n    前两个参数是你刚刚为缩略图和原始图片创建的图像资源。接下来的四个参数将副本和原始图像的 `x` 和 `y` 坐标都设置为左上角。然后是计算出的缩略图的宽度和高度，最后是原始图像的宽度和高度。将参数\
  \ 3-6 设置为左上角，并将两组尺寸都设置为完整值，这样会将整张原始图片复制到整个缩略图中。换句话说，它创建了原始图片的一个更小的副本。\n\n    你不需要将\
  \ `imagecopyresampled()` 的结果赋值给一个变量。缩放后的图像现在存储在 `$thumb` 中，但你仍然需要保存它。\n\n5.  像这样完成\
  \ `createThumbnail()` 的定义：\n\n\n\n```php\npublic function create() {\n    $ratio\
  \ = $this->calculateRatio($this->originalwidth, $this->originalheight,\n    $this->maxSize);\n\
  \    $thumbwidth = round($this->originalwidth * $ratio);\n    $thumbheight = round($this->originalheight\
  \ * $ratio);\n    $resource = $this->createImageResource();\n    $thumb = imagecreatetruecolor($thumbwidth,\
  \ $thumbheight);\n    imagecopyresampled($thumb, $resource, 0, 0, 0, 0, $thumbwidth,\
  \ $thumbheight,\n    $this->originalwidth, $this->originalheight);\n    $newname\
  \ = $this->basename . $this->suffix;\n    switch ($this->imageType) {\n    case\
  \ 'jpeg':\n    $newname .= '.jpg';\n    $success = imagejpeg($thumb, $this->destination\
  \ . $newname);\n    break;\n    case 'png':\n    $newname .= '.png';\n    $success\
  \ = imagepng($thumb, $this->destination . $newname);\n    break;\n    case 'gif':\n\
  \    $newname .= '.gif';\n    $success = imagegif($thumb, $this->destination . $newname);\n\
  \    break;\n    case 'webp':\n    $newname .= '.webp';\n    $success = imagewebp($thumb,\
  \ $this->destination . $newname);\n    break;\n    }\n    if ($success) {\n    $this->messages[]\
  \ = \"$newname 创建成功。\";\n    } else {\n    $this->messages[] = \"无法为 \" .\n    basename($this->original)\
  \ . \" 创建缩略图\";\n    }\n    imagedestroy($resource);\n    imagedestroy($thumb);\n\
  }\n```\n\n新代码的第一行将后缀拼接到已去除文件扩展名的文件名上。因此，如果原始文件名为 `menu.jpg` 且使用了默认的 `_thb` 后缀，`$newname`\
  \ 将变为 `menu_thb`。\n\n`switch` 语句检查图像的 MIME 类型并追加相应的文件扩展名。以 `menu.jpg` 为例，`$newname`\
  \ 最终变为 `menu_thb.jpg`。随后，缩放后的图像被传递给相应的保存函数，并使用目标文件夹和 `$newname` 作为保存路径。此处省略了 JPEG、PNG\
  \ 和 WebP 图像的可选质量参数，默认质量对于缩略图而言已足够。\n\n保存操作的结果存储在 `$success` 中。根据结果，`$success` 的值为\
  \ `true` 或 `false`，并会向 `$messages` 属性添加相应的消息。该消息使用 `basename()` 函数而非 `$basename`\
  \ 属性创建，因为该属性中的文件扩展名已被去除，而 `basename()` 函数会保留扩展名。\n\n最后，`imagedestroy()` 通过销毁用于创建缩略图的资源来释放服务器内存。\n\
  \n6. 到目前为止，你一直使用 `test()` 方法来显示错误信息。现在创建一个公共方法来获取这些消息：\n\n```php\npublic function\
  \ getMessages() {\n    return $this->messages;\n}\n```\n\n7. 保存 `Thumbnail.php`。在\
  \ `create_thumb.php` 中，将对 `test()` 方法的调用替换为对 `create()` 的调用。同时调用 `getMessages()`\
  \ 并将结果赋值给一个变量，如下所示：\n\n```php\n$thumb->create();\n$messages = $thumb->getMessages();\n\
  ```\n\n8. 在 `<body>` 开始标签之后添加一个 PHP 代码块，用于显示所有消息：\n\n```php\n';\n    foreach ($messages\
  \ as $message) {\n        echo \"$message\";\n    }\n    echo '';\n}\n?>\n```\n\n\
  你在之前的章节中已经见过这段代码，因此无需额外解释。\n\n9. 保存 `create_thumb.php`，在浏览器中加载，并通过从列表中选择图像并点击“创建缩略图”进行测试。如果一切顺利，你应该会看到一条报告缩略图已创建的消息，并且可以在\
  \ `upload_test` 的 `thumbs` 子文件夹中确认其存在，如图 10-6 所示。\n\n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig6_HTML.jpg](img/332054_4_En_10_Fig6_HTML.jpg)\n\
  \n**图 10-6.** 缩略图已成功创建于目标文件夹中\n\n10. 如果缩略图未能创建，`Thumbnail` 类生成的错误消息应能帮助你定位问题根源。此外，请仔细对照\
  \ `ch10/PhpSolutions/Image` 文件夹中的 `Thumbnail_04.php` 检查你的代码。如果之前的 PHP 解决方案中的测试均能通过，那么错误很可能出现在\
  \ `create()`、`createImageResource()` 或 `createThumbnail()` 方法的定义中。另一个需要检查的地方自然是你的\
  \ PHP 配置。该类依赖于 GD 扩展的启用。虽然 GD 被广泛支持，但并非默认总是开启。\n\n## 上传时自动调整图像大小\n\n既然你已经拥有了一个能从大图创建缩略图的类，那么将第\
  \ 9 章的 `Upload` 类改编为能从上传的图像生成缩略图就相对简单了——事实上，不仅能处理单张图像，还能处理多张图像。\n\n与其修改 `Upload`\
  \ 类中的代码，更高效的做法是扩展该类并创建一个子类。这样，你既可以选择使用原始类来执行任意类型文件的上传，也可以选择使用子类在上传时创建缩略图。子类还需要提供在创建缩略图后保存或丢弃原始大图的选项。\n\
  \n在深入代码之前，我们先快速了解一下如何创建一个子类。\n\n### 扩展类\n\n在 PHP 解决方案 8-8“自动构建嵌套列表”中，我们已经看到了一个扩展内置类\
  \ `RecursiveIteratorIterator` 的例子。扩展类的优点在于，新的**子类**（或**子类**）会继承其父类的所有特性，包括属性和方法，但可以修改（或**覆盖**）其中一些特性，并增加自己的新特性。这简化了创建执行更专门化任务的类的过程。\n\
  \n你在第 9 章创建的 `Upload` 类执行基本的文件上传。在本章中，你将扩展它，创建一个名为 `ThumbnailUpload` 的子类，该类使用父类的基本上传功能，但增加了创建缩略图的专门特性。该子类将创建在\
  \ `PhpSolutions/Image` 文件夹中，因此将使用 `PhpSolutions\\Image` 作为其命名空间。\n\n像所有子类一样，子类经常需要借用父类的功能。这在你在子类中覆盖某个方法但又需要同时使用原始版本时经常发生。要引用父类版本，可以在其前面加上\
  \ `parent` 关键字后跟两个冒号，如下所示：\n\n```\nparent::originalMethod();\n```\n\n你将在 PHP 解决方案\
  \ 10-5 中看到它的工作原理，因为子类定义了自己的构造函数以添加额外参数，但也需要使用父类的构造函数。\n\n让我们创建一个能够同时上传图像并生成缩略图的类。\n\
  \n### PHP 解决方案 10-5：创建 ThumbnailUpload 类\n\n本 PHP 解决方案扩展了第 9 章的 `Upload` 类，并配合本章的\
  \ `Thumbnail` 类使用，以实现上传和调整图像大小。它演示了如何创建子类并覆盖父类方法。要创建该子类，你需要第 9 章的 `Upload.php` 和本章的\
  \ `Thumbnail.php`。这些文件的副本分别位于 `ch09/PhpSolutions/File` 和 `ch10/PhpSolutions/Image`\
  \ 文件夹中。\n\n1. 在 `PhpSolutions/Image` 文件夹中创建一个名为 `ThumbnailUpload.php` 的新文件。该文件仅包含\
  \ PHP 代码，因此请删除脚本编辑器插入的任何 HTML，并添加以下代码：\n\n```php\n<?php\nnamespace PhpSolutions\\\
  Image;\nuse PhpSolutions\\File\\Upload;\nrequire_once __DIR__ . '/../File/Upload.php';\n\
  require_once 'Thumbnail.php';\nclass ThumbnailUpload extends Upload {\n}\n```\n\n\
  \n\n此代码声明了 `PhpSolutions\\Image` 命名空间，并在导入 `Upload` 和 `Thumbnail` 类的定义之前，先从 `PhpSolutions\\\
  File` 命名空间导入了 `Upload` 类。\n\n**注意**  \n在包含文件中使用时，`__DIR__` 返回的是被包含文件所在的目录（不带尾部斜杠）。通过在与\
  \ `Upload.php` 的相对路径开头添加斜杠，PHP 就能构建出完整路径，从而回退一级并在 `PhpSolutions/File` 文件夹中找到该文件。`Thumbnail.php`\
  \ 与 `ThumbnailUpload.php` 位于同一文件夹，因此仅通过文件名即可包含。详见第 5 章“嵌套包含文件”。\n\n随后，`ThumbnailUpload`\
  \ 类声明其继承 `Upload`。尽管 `Upload` 位于不同命名空间，但由于已将其导入，因此可直接使用 `Upload` 来引用。后续所有代码均需插入到类定义的一对花括号之间。\n\
  \n1.  子类需要四个属性：缩略图的目标保存文件夹、一个决定是否删除原始图片的布尔值、缩略图的最大尺寸，以及要添加到缩略图名称的后缀。最后两个属性在你不想使用\
  \ `Thumbnail` 中定义的默认值时是必需的。请在花括号内添加以下属性定义：\n\n    ```\n    protected $thumbDestination;\n\
  \    protected $deleteOriginal;\n    protected $maxSize = 120;\n    protected $suffix\
  \ = '_thb';\n    ```\n\n2.  当继承一个类时，只有在需要修改构造函数工作方式的情况下，才需要定义构造函数方法。`ThumbnailUpload`\
  \ 类接受一个额外参数，用于决定是否删除原始图片，这让你可以选择仅保留缩略图，或同时保留两个版本的图片。在本地测试时，`Thumbnail` 对象可以直接访问自己硬盘上的原始图片。然而，生成缩略图是服务器端操作，因此如果不先将原始图片上传到服务器，该操作在网站上无法工作。\n\
  \n    构造函数还需要调用父类构造函数来定义上传文件夹的路径。请在类中添加以下定义：\n\n    ```\n    public function __construct($path,\
  \ $deleteOriginal = false) {\n    parent::__construct($path);\n    $this->thumbDestination\
  \ = $path;\n    $this->deleteOriginal = $deleteOriginal;\n    }\n    ```\n\n   \
  \ 构造函数接受两个参数：上传文件夹的路径，以及一个决定是否删除原始图片的布尔变量。第二个参数在构造函数签名中被设置为 `false`，使其成为可选参数。\n\n\
  \    **注意**  \n    在定义函数或类方法时，传递给函数（方法）的参数（严格来说称为形参）被称为其**签名**。\n\n    构造函数内部的第一行代码将\
  \ `$path` 传递给父类构造函数，以设置文件上传的目标文件夹。第二行代码将 `$path` 也赋值给 `$thumbDestination` 属性，使两个图片共享同一个默认文件夹。\n\
  \n    最后一行将第二个参数的值赋给 `$deleteOriginal` 属性。由于第二个参数是可选的，它会被自动设置为 `false`，因此除非你显式将其设置为\
  \ `true`，否则两个图片均会被保留。\n\n3.  创建设置缩略图选项的方法，如下所示：\n\n    ```\n    public function\
  \ setThumbOptions($path, $maxSize = null, $suffix = null) {\n    if (is_dir($path)\
  \ && is_writable($path)) {\n    $this->thumbDestination = rtrim($path, '/\\\\')\
  \ . DIRECTORY_SEPARATOR;\n    } else {\n    throw new \\Exception(\"$path 必须是一个有效且可写的目录。\"\
  );\n    }\n    if (!is_null($maxSize)) {\n    $this->maxSize = $maxSize;\n    }\n\
  \    if (!is_null($suffix)) {\n    $this->suffix = $suffix;\n    }\n    }\n    ```\n\
  \n    此方法仅将路径作为必需参数。另外两个参数 `$maxSize` 和 `$suffix` 被设置为 `null`，因此它们是可选的。该方法会检查作为第一个参数传入的值是否是一个文件夹（目录）并且可写，然后将该值赋给\
  \ `$thumbDestination` 属性。如果作为参数传入的值无效，该类会抛出一个异常。`Exception` 前面加了一个反斜杠，表示你正在使用核心的\
  \ `Exception` 类，而不是此命名空间特有的类。\n\n    其余两个值若不为 `null`，则会被分别赋给 `$maxSize` 和 `$suffix`\
  \ 属性。\n\n    **提示**  \n    我原本可以为构造函数增加额外的参数，而不是创建一个专门设置缩略图选项的方法。然而，我选择这样做是为了简化构造函数，特别是在你想将缩略图和原始图片保存在同一文件夹时。如果你想使用缩略图的默认设置，则无需调用\
  \ `setThumbOptions()` 方法。另外，如果缩略图目标目录存在问题，我也本可以静默地使用原始上传文件夹，而不是抛出异常。但我认为目标目录的问题过于严重，不容忽视。诸如此类的决策是编写任何脚本（不仅仅是设计类时）不可或缺的一部分。\n\
  \n4.  接下来，使用以下代码创建一个受保护的方法来生成缩略图：\n\n    ```\n    protected function createThumbnail($image)\
  \ {\n    $thumb = new Thumbnail($image, $this->thumbDestination, $this->maxSize,\n\
  \    $this->suffix);\n    $thumb->create();\n    $messages = $thumb->getMessages();\n\
  \    $this->messages = array_merge($this->messages, $messages);\n    }\n    ```\n\
  \n    此方法接受一个参数（图片路径），并创建一个 `Thumbnail` 对象。代码与 `create_thumb.php` 类似，因此无需解释。传递给\
  \ `Thumbnail` 构造函数的最后三个参数作为 `ThumbnailUpload` 类的属性存储，因此即使未调用 `setThumbOptions()`\
  \ 方法，这些属性也是可用的。\n\n    最后一行使用 `array_merge()` 将 `Thumbnail` 对象生成的任何消息与 `ThumbnailUpload`\
  \ 类的 `$messages` 属性合并。尽管你在步骤 2 中定义的属性不包含 `$messages` 属性，但子类会自动从其父类继承该属性。\n\n5. \
  \ 在父类中，`moveFile()` 方法将上传的文件保存到目标位置。缩略图需要从原始图片生成，因此你需要重写父类的 `moveFile()` 方法，并使用它来调用你刚刚定义的\
  \ `createThumbnail()` 方法。从 `Upload.php` 复制 `moveFile()` 方法，并通过添加粗体高亮显示的代码来修改它。\n\
  \n    ```\n    protected function moveFile($file) {\n    $filename = $this->newName\
  \ ?? $file['name'];\n    $success = move_uploaded_file($file['tmp_name'],\n    $this->destination\
  \ . $filename);\n    if ($success) {\n    // 仅当原始图片未被删除时才添加消息\n    if (!$this->deleteOriginal)\
  \ {\n    $result = $file['name'] . ' 上传成功';\n    if (!is_null($this->newName)) {\n\
  \    $result .= '，并已重命名为 ' . $this->newName;\n    }\n    $this->messages[] = $result;\n\
  \    }\n    // 根据上传的图片创建缩略图\n    $this->createThumbnail($this->destination . $filename);\n\
  \    // 如果需要，删除上传的原始图片\n    if ($this->deleteOriginal) {\n    unlink($this->destination\
  \ . $filename);\n    }\n    } else {\n    $this->messages[] = '无法上传 ' . $file['name'];\n\
  \    }\n    }\n    ```\n\n\n\n若原始图片已成功上传，新增代码会添加一个条件语句，仅当`$deleteOriginal`为`false`时才生成消息。随后，代码调用`createThumbnail()`方法，并将上传的图片作为参数传递给它。最后，若`$deleteOriginal`已设为`true`，代码便使用`unlink()`删除上传的原始图片，仅保留缩略图。\n\
  \n3.  保存`ThumbnailUpload.php`。要进行测试，请将`ch10`文件夹中的`create_thumb_upload_01.php`复制到`gd`文件夹，并将其另存为`create_thumb_upload.php`。该文件包含一个简单的表单，内含一个文件字段和一个用于显示消息的\
  \ PHP 代码块。请在`DOCTYPE`声明上方添加以下 PHP 代码块：\n\n```\nsetThumbOptions('C:/upload_test/thumbs/');\n\
  $loader->upload('image');\n$messages = $loader->getMessages();\n} catch (Exception\
  \ $e) {\necho $e->getMessage();\n}\n}\n?>\n```\n\n如有必要，请调整构造函数和`setThumbDestination()`方法中的路径。\n\
  \n4.  保存`create_thumb_upload.php`并在浏览器中加载它。点击浏览或选择文件按钮，并选择多张图片。当您点击上传按钮时，应该会看到提示上传成功及缩略图创建成功的消息。检查目标文件夹，如图\
  \ 10-7 所示。\n\n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig7_HTML.jpg](img/332054_4_En_10_Fig7_HTML.jpg)\n\
  \n**图 10-7.** 缩略图与原始图片同时生成。\n\n5.  通过再次上传相同的图片来测试`ThumbnailUpload`类。这次，原始图片和缩略图应按第\
  \ 9 章的方式，通过在文件扩展名前添加一个数字来重命名。\n\n6.  尝试不同的测试，例如更改插入到缩略图名称中的后缀，或者在创建缩略图后删除原始图片。如果遇到问题，请对照`ch10/PhpSolutions/Image`文件夹中的`ThumbnailUpload.php`检查您的代码。\n\
  \n**提示** 在不支持表单字段`multiple`属性的旧版浏览器中，该类会上传单张图片并从中创建缩略图。为了支持旧版浏览器进行多文件上传，请在表单中创建多个文件字段，并为它们赋予相同的`name`属性，后跟一对空方括号，如下所示：`name=\"\
  image[]\"`。\n\n## 使用 ThumbnailUpload 类\n\n`ThumbnailUpload`类易于使用。由于它使用了命名空间，请像这样在文件的顶层导入该类：\n\
  \n```\nuse PhpSolutions\\Image\\ThumbnailUpload;\n```\n\n然后包含类定义，并将上传文件夹的路径传递给类构造函数：\n\
  \n```\n$loader = new ThumbnailUpload('C:/upload_test/');\n```\n\n如果希望在创建缩略图后删除原始图片，请将`true`作为第二个参数传递给构造函数，如下所示：\n\
  \n```\n$loader = new ThumbnailUpload('C:/upload_test/', true);\n```\n\n该类具有以下公共方法：\n\
  \n*   `setThumbOptions()`：此方法用于设置保存缩略图片的文件夹路径。如果您不调用此方法，缩略图将存储在与原始图片相同的文件夹中。它还需要两个可选参数来设置缩略图的最大尺寸（以像素为单位，默认值为\
  \ 120）以及更改插入到缩略图名称中的后缀（默认为`_thb`）。\n*   `upload()`：此方法上传原始图片并生成缩略图。它需要一个必需参数：文件上传元素的名称。默认情况下，与现有文件同名的图片会被重命名。要覆盖现有图片，请将`false`作为可选的第二个参数传递给此方法。\n\
  \n该类还继承了父类`Upload`的以下方法：\n\n*   `getMessages()`：获取由上传和缩略图生成过程产生的消息。\n*   `getMaxSize()`：获取单张图片的最大上传大小。默认值为\
  \ 50 KB。\n\n由于`ThumbnailUpload`类依赖于`Upload`和`Thumbnail`类，当您在线上网站使用此类时，需要将这三个类定义文件全部上传到远程\
  \ Web 服务器。\n\n## 本章回顾\n\n这又是一个紧张密集的章节，它不仅仅展示了如何从大图中生成缩略图，还向您介绍了如何扩展现有类以及覆写继承的方法。设计和扩展类起初可能会让人感到困惑，但如果您专注于每个方法的功能，就会觉得它不那么令人生畏。类设计的一个关键原则是将大型任务分解成小的、可管理的单元。理想情况下，一个方法应执行单一任务，例如为原始图片创建图像资源。\n\
  \n使用类的真正优势在于，一旦定义好它们，就能节省大量时间和精力。与其每次想要为网站添加文件或缩略图上传功能时都输入数十行代码，调用类只需几行简单的代码。此外，不要认为本章的代码只能用于创建和上传缩略图片。类文件中的许多子程序都可以经过调整，用于其他场景。\n\
  \n在下一章中，您将全面学习 PHP 会话（session），它能够保存与特定用户相关的信息，并在保护网页密码方面发挥重要作用。\n\n## 11. 具有记忆功能的页面：简单的登录和多页表单\n\
  \n万维网是一个绝妙的幻象。当您访问一个设计良好的网站时，您会感受到强烈的连续性，就像翻阅一本书籍或杂志的书页。所有元素都天衣无缝地融合成一个连贯的整体。但现实情况却大相径庭。一个网页的每个部分都由\
  \ Web 服务器独立存储和处理。除了需要知道将相关文件发送到哪里之外，服务器对您是谁毫无兴趣。每次 PHP 脚本运行时，变量仅存在于服务器的内存中，并且通常在脚本执行完毕后就被丢弃。即使是`$_POST`和`$_GET`数组中的变量，其生命周期也十分短暂。它们的值仅会被传递给下一个脚本一次，然后就从内存中移除，除非您对其进行处理，例如将信息存储在隐藏的表单字段中。即便如此，它也仅在表单被提交时才能持久存在。\n\
  \n为了解决这些问题，PHP 使用了**会话**。在简要描述会话的工作原理后，我将向您展示如何使用会话变量创建一个简单的、基于文件的登录系统，并在页面之间传递信息，而无需使用隐藏的表单字段。\n\
  \n在本章中，您将学习以下内容：\n\n*   理解什么是会话以及如何创建它们\n*   创建一个基于文件的登录系统\n*   使用自定义类检查密码强度\n*\
  \   为会话设置时间限制\n*   使用会话在多页之间跟踪信息\n\n### 什么是会话以及它们如何工作\n\n会话通过在 Web 服务器上以及作为 Cookie\
  \ 存储在访问者的计算机上存储一个随机标识符（即会话 ID）来确保连续性。Web 服务器使用这个 Cookie 来识别它正在与同一个人（或者更准确地说，与同一台计算机）进行通信。图\
  \ 11-1 到 11-3 显示了我在本地测试环境中创建的一个简单会话的详细信息。\n\n如图 11-1 所示，存储在浏览器中的 Cookie 名为`PHPSESSID`，其内容是一串杂乱的字母和数字。这个随机字符串就是会话的\
  \ ID。\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fig1_HTML.jpg](img/332054_4_En_11_Fig1_HTML.jpg)\n\
  \n\n\n### 图 11-1  \nPHP 会话在浏览器中存储一个包含唯一标识符的 Cookie  \n\n在 Web 服务器上会创建一个匹配的文件，其文件名包含相同的一串字母和数字，如图\
  \ 11-2 所示。  \n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fig2_HTML.jpg](img/332054_4_En_11_Fig2_HTML.jpg)\
  \  \n\n### 图 11-2  \nCookie 中的内容用于标识存储在 Web 服务器上的会话数据  \n\n当会话启动时，服务器会将信息存储在会话变量中，只要会话保持活动状态（通常直到浏览器关闭），其他页面就可以访问这些变量。由于会话\
  \ ID 对每个访问者都是唯一的，因此存储在会话变量中的信息不会被其他人看到。这意味着会话非常适合用于用户身份验证，尽管它也可以用于任何需要在页面间传递时为同一用户保存信息的场景，例如多页表单或购物车。\
  \  \n\n存储在用户计算机上的唯一信息是包含会话 ID 的 Cookie，而该 ID 本身毫无意义。这意味着仅通过检查此 Cookie 的内容无法泄露隐私信息。\
  \  \n\n会话变量及其值存储在 Web 服务器上。图 11-3 显示了一个简单会话文件的内容。可以看出，它是纯文本格式，内容并不难解读。图中显示的会话包含一个变量：`name`。变量名后面紧跟着一个竖线，然后是字母“s”、冒号、数字、另一个冒号，以及用引号括起来的变量值。其中“s”代表字符串，数字表示该字符串包含的字符数。因此，这个会话变量包含我的名字，作为一个长度为\
  \ 5 个字符的字符串。  \n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fig3_HTML.jpg](img/332054_4_En_11_Fig3_HTML.jpg)\
  \  \n\n### 图 11-3  \n会话的详细信息以纯文本形式存储在服务器上  \n\n这种设置具有若干含义。包含会话 ID 的 Cookie 通常会保持活动状态，直到浏览器关闭。因此，如果多人共用同一台计算机，除非他们在交给下一个人使用前总是关闭浏览器（这是你无法控制的），否则他们都可以访问彼此的会话。因此，提供一个注销机制来删除\
  \ Cookie 和会话变量以保持网站安全非常重要。你还可以创建一个超时机制，在用户一段时间不活动后自动防止任何人重新获得访问权限。  \n\n将会话变量以纯文本形式存储在\
  \ Web 服务器上本身并不值得担忧。只要服务器配置正确，会话文件就无法通过浏览器访问。PHP 也会定期删除不活动的文件（理论上，生命周期为 1440 秒——即\
  \ 24 分钟——但这并不可靠）。然而，显而易见的是，如果攻击者成功入侵服务器或劫持会话，信息就可能被泄露。因此，尽管会话通常足够安全，可用于保护网站部分的密码访问或处理多页表单，但绝不应将会话变量用于存储敏感信息，例如密码或信用卡详细信息。正如你将在本章后面的“使用会话限制访问”中看到的，虽然密码被用于访问受保护的站点，但密码本身是存储在单独位置（最好经过哈希处理）的，而不是作为会话变量存储。\
  \  \n\n**注意**  \n哈希是一种单向过程，它将纯文本打乱以生成唯一的消息摘要。它经常与加密混淆，加密允许对加密文本进行解密。当哈希正确执行时，无法逆转该过程来揭示原始密码。\
  \  \n\n会话默认受支持，因此你不需要任何特殊配置。但是，如果用户浏览器中禁用了 Cookie，则会话将无法工作。可以将 PHP 配置为通过查询字符串发送会话\
  \ ID，但这被认为存在安全风险。  \n\n## 创建 PHP 会话  \n\n只需在要在会话中使用的每个 PHP 页面中放入以下命令：  \n\n``` \
  \ \nsession_start();  \n```  \n\n每个页面应仅调用此命令一次，并且必须在 PHP 脚本生成任何输出之前调用，因此最理想的位置是在\
  \ PHP 开始标签之后立即调用。如果在调用 `session_start()` 之前生成了任何输出，则该命令会失败，并且该页面的会话将不会被激活。（稍后会详细解释“Headers\
  \ already sent”错误。）  \n\n## 创建和销毁会话变量  \n\n通过向 `$_SESSION` 超全局数组添加变量来创建会话变量，方式与分配普通变量相同。假设你想存储访问者的姓名并显示问候语。如果姓名通过登录表单以\
  \ `$_POST['name']` 的形式提交，你可以这样赋值：  \n\n```  \n$_SESSION['name'] = $_POST['name'];\
  \  \n```  \n\n现在可以在任何以 `session_start()` 开头的页面中使用 `$_SESSION['name']`。由于会话变量存储在服务器上，一旦脚本或应用程序不再需要它们，就应立即将其清除。像这样取消设置会话变量：\
  \  \n\n```  \nunset($_SESSION['name']);  \n```  \n\n要取消设置*所有*会话变量——例如，当你要注销某个用户时——可以将\
  \ `$_SESSION` 超全局数组设置为空数组，如下所示：  \n\n```  \n$_SESSION = [];  \n```  \n\n**警告** \
  \ \n不要尝试使用 `unset($_SESSION)`。虽然它确实有效，但效果有点过于强大。它不仅会清除当前会话，还会阻止将来存储任何会话变量。  \n\n\
  ## 销毁会话  \n\n单独取消设置所有会话变量可以有效防止任何信息被重用，但你还应像这样使会话 Cookie 失效：  \n\n```  \nif (isset($_COOKIE[session_name()]))\
  \ {  \n    setcookie(session_name(), \", time()-86400, '/');  \n}  \n```  \n\n这使用了\
  \ `session_name()` 函数动态获取会话名称，并将会话 Cookie 重置为空字符串，并设置为在 24 小时前过期（86400 是一天中的秒数）。最后一个参数（`'/'`）将\
  \ Cookie 应用于整个域名。  \n\n最后，使用以下命令关闭会话：  \n\n```  \nsession_destroy();  \n```  \n\n\
  这个函数命名得并不恰当。它只是关闭会话。它不会销毁任何会话变量，也不会取消设置会话 Cookie。使会话 Cookie 失效并关闭会话以避免未经授权的人员访问网站的受限部分或会话期间交换的任何信息，这一点非常重要。然而，访问者可能会忘记注销，因此并非总能保证会话会正确关闭，这就是为什么不在会话变量中存储敏感信息如此重要的原因。\
  \  \n\n**注意**  \nPHP 7 不支持旧脚本中常见的 `session_register()` 或 `session_unregister()`。\
  \  \n\n## 重新生成会话 ID  \n\n当用户状态发生变化时（例如登录后），作为安全措施，建议重新生成会话 ID。这会更改标识会话的随机字母和数字字符串，但保留存储在会话变量中的所有信息。在\
  \ *Pro PHP Security, 2nd Edition* (Apress, 2010, ISBN 978-1-4302-3318-3) 一书中，Chris\
  \ Snyder 和 Michael Southwell 解释说：“生成新会话 ID 的目标是消除这样一种可能性（无论多么微小）：了解低级安全会话的攻击者可能能够执行高级安全任务。”\
  \  \n\n要重新生成会话 ID，只需调用 `session_regenerate_id()` 并将用户重定向到另一个页面或重新加载同一页面。  \n\n##\
  \ “Headers already sent”错误\n\n\n\n## 使用会话限制访问\n\n虽然使用 PHP 会话非常容易，但有一个问题会让初学者抓耳挠腮。你可能看不到代码按预期工作，而是看到以下信息：\n\
  \n```\nWarning: Cannot add header information - headers already sent\n```\n\n我之前在介绍\
  \ `header()` 函数时多次提到过这个问题。它同样会影响 `session_start()` 和 `setcookie()`。对于 `session_start()`，解决方案很简单：确保将其紧跟在\
  \ PHP 起始标签之后（或紧随其后），并检查起始标签前没有空格。\n\n有时即使 PHP 标签前没有空格，问题也会出现。这通常是由编辑软件在脚本开头插入字节顺序标记（BOM）引起的。如果发生这种情况，请打开脚本编辑器的偏好设置，并禁用\
  \ PHP 页面中的 BOM 使用。\n\n然而，在使用 `setcookie()` 销毁会话 cookie 时，很可能需要在调用该函数之前向浏览器发送输出。在这种情况下，PHP\
  \ 允许你使用 `ob_start()` 将输出保存在缓冲区中。然后，在 `setcookie()` 完成其工作后，使用 `ob_end_flush()` 刷新缓冲区。你将在\
  \ PHP 解决方案 11-2 中看到如何执行此操作。\n\n## 使用会话限制访问\n\n在考虑限制网站访问时，脑海中可能首先浮现的词是“用户名”和“密码”。尽管这两者通常是进入网站的钥匙，但它们都不是会话的必要条件。你可以将任何值存储为会话变量，并使用它来决定是否授予对页面的访问权限。例如，你可以创建一个名为\
  \ `$_SESSION['status']` 的变量，并根据其值允许访问者访问网站的不同部分，或者如果该变量未设置，则完全拒绝访问。\n\n一个小小的演示应该能让一切清晰明了，并让你了解会话在实际中是如何工作的。\n\
  \n## PHP 解决方案 11-1：一个简单的会话示例\n\n这应该只需要几分钟就能构建完成，但你也可以在 `ch11` 文件夹中的 `session_01.php`、`session_02.php`\
  \ 和 `session_03.php` 中找到完整的代码。\n\n1.  在 `phpsols-4e` 站点根目录中创建一个名为 `sessions` 的新文件夹，并在其中创建一个名为\
  \ `session_01.php` 的页面。插入一个包含名为 `name` 的文本字段和一个 `提交` 按钮的表单。将 `method` 设置为 `post`，`action`\
  \ 设置为 `session_02.php`。表单应如下所示：\n\n```\n<form method=\"post\" action=\"session_02.php\"\
  >\n  输入您的姓名：<input type=\"text\" name=\"name\" />\n  <input type=\"submit\" name=\"\
  submit\" value=\"提交\" />\n</form>\n```\n\n2.  在另一个名为 `session_02.php` 的页面中，在 `DOCTYPE`\
  \ 声明上方插入以下代码：\n\n```\n<?php\nsession_start();\nif (isset($_POST['name'])) {\n  $_SESSION['name']\
  \ = $_POST['name'];\n}\n?>\n```\n\n内联注释解释了正在发生的事情。会话启动，只要 `$_POST['name']` 不为空，其值就会被赋给\
  \ `$_SESSION['name']`。\n\n3.  在 `session_02.php` 的 `<body>` 标签之间插入以下代码：\n\n```\n\
  <?php\nif (isset($_SESSION['name'])) {\n  echo '您好，' . htmlentities($_SESSION['name'])\
  \ . '。<a href=\"session_03.php\">下一页</a>';\n} else {\n  // 如果未设置，则返回登录页面\n  echo\
  \ '您是谁？请<a href=\"session_01.php\">登录</a>';\n}\n?>\n```\n\n如果设置了 `$_SESSION['name']`，则会显示一条欢迎消息以及一个指向\
  \ `session_03.php` 的链接。否则，页面会告诉访问者无法识别试图访问的用户，并提供一个返回第一页的链接。\n\n#### 注意\n\n输入以下代码行时要小心：\n\
  ```\necho '您好，' . htmlentities($_SESSION['name']) . '。<a href=\"session_03.php\"\
  >下一页</a>';\n```\n前两个句点（围绕 `htmlentities($_SESSION['name'])`）是 PHP 的字符串连接运算符。第三个句点（紧跟在单引号之后）是一个普通的句点，将作为字符串的一部分显示。\n\
  \n1.  创建 `session_03.php`。在 `DOCTYPE` 上方输入以下代码以启动会话：\n\n```\n<?php\nsession_start();\n\
  ?>\n```\n\n2.  在 `session_03.php` 的 `<body>` 标签之间插入以下代码：\n\n```\n<?php\nif (isset($_SESSION['name']))\
  \ {\n  echo '您好 ' . htmlentities($_SESSION['name']) . '。下次再见。';\n  // 取消设置会话变量\n\
  \  unset($_SESSION['name']);\n  // 使会话 cookie 失效\n  if (isset($_COOKIE[session_name()]))\
  \ {\n    setcookie(session_name(), '', time()-86400, '/');\n  }\n  // 结束会话\n  session_destroy();\n\
  \  echo '<a href=\"session_02.php\">返回页面 2</a>';\n} else {\n  // 如果无法识别则显示\n  echo\
  \ \"抱歉，我不认识您。\";\n  echo '<a href=\"session_01.php\">请登录</a>';\n}\n?>\n```\n\n如果设置了\
  \ `$_SESSION['name']`，页面会显示它，然后取消设置它并使当前会话 cookie 失效。通过将 `session_destroy()` 放在第一个代码块的末尾，该会话及其相关变量将不再可用。\n\
  \n3.  在浏览器中加载 `session_01.php`，在文本字段中键入您的姓名，然后单击“提交”。\n\n4.  您应该会看到类似以下截图的内容。在此阶段，这里发生的情况与普通表单没有明显区别。\n\
  \n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figa_HTML.jpg](img/332054_4_En_11_Figa_HTML.jpg)\n\
  \n5.  当您单击“下一页”时，会话的威力开始显现。即使 `$_POST` 数组不再可用，页面也会记住您的姓名。在大多数情况下，您可能会看到类似于以下截图的内容。\n\
  \n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figb_HTML.jpg](img/332054_4_En_11_Figb_HTML.jpg)\n\
  \n然而，在某些服务器上，您可能会收到以下警告消息，提示无法修改头信息，因为头信息已发送。\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figc_HTML.jpg](img/332054_4_En_11_Figc_HTML.jpg)\n\
  \n#### 注意\n\n如第 5 章所述，如果服务器配置为缓冲前 4 KB 的输出，则不会产生关于头信息的警告。但是，并非所有服务器都会缓冲输出，因此解决此问题很重要。\n\
  \n1.  单击指向页面 2 的链接（如果您收到错误消息，它就在消息下方）。会话已被销毁，所以这次 `session_02.php` 不知道您是谁。\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figd_HTML.jpg](img/332054_4_En_11_Figd_HTML.jpg)\n\
  \n2.  在浏览器地址栏中键入 `session_03.php` 的地址并加载它。它同样不记得会话，并显示相应的消息。\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fige_HTML.jpg](img/332054_4_En_11_Fige_HTML.jpg)\n\
  \n即使您在步骤 8 中没有收到警告消息，当您将依赖会话的页面部署到其他服务器时，也需要防止这种情况发生。错误消息不仅看起来糟糕，而且意味着 `setcookie()`\
  \ 无法使会话 cookie 失效。尽管 `session_start()` 紧跟在 `session_03.php` 中 PHP 起始标签之后，但警告消息是由\
  \ `DOCTYPE` 声明、`<head>` 以及 `setcookie()` 之前输出的其他 HTML 触发的。\n\n## PHP 解决方案 11-2：使用\
  \ `ob_start()` 缓冲输出\n\n虽然你可以将 `setcookie()` 放在 `DOCTYPE` 声明上方的 PHP 代码块中，但你还需要将 `$_SESSION['name']`\
  \ 的值赋给一个普通变量，因为在会话销毁后它就不再存在了。与其将整个脚本拆开，不如使用 `ob_start()` 来缓冲输出。\n\n继续使用上一节中的 `session_03.php`。\n\
  \n1.  像这样修改 `DOCTYPE` 声明上方的 PHP 代码块：\n\n```\n<?php\nsession_start();\nob_start();\n\
  ?>\n```\n\n这会开启输出缓冲，并防止输出被发送到浏览器，直到脚本结束或你使用 `ob_end_flush()` 专门刷新输出。\n\n2.  在使会话\
  \ cookie 失效后立即刷新输出，如下所示：\n\n```\n<?php\nif (isset($_SESSION['name'])) {\n  echo\
  \ '您好 ' . htmlentities($_SESSION['name']) . '。下次再见。';\n  unset($_SESSION['name']);\n\
  \  if (isset($_COOKIE[session_name()])) {\n    setcookie(session_name(), '', time()-86400,\
  \ '/');\n  }\n  ob_end_flush();\n  session_destroy();\n  echo '<a href=\"session_02.php\"\
  >返回页面 2</a>';\n} else {\n  echo \"抱歉，我不认识您。\";\n  echo '<a href=\"session_01.php\"\
  >请登录</a>';\n}\n?>\n```\n\n\n\n```\n    // 使会话 cookie 失效\n    if (isset($_COOKIE[session_name()]))\
  \ {\n        setcookie(session_name(), \"\", time()-86400, '/');\n    }\n    ob_end_flush();\n\
  \    ```\n\n3.  保存`session_03.php`并再次测试该序列。这次应该不会出现警告。更重要的是，会话 cookie 不再有效。（更新后的代码位于`session_04.php`中。）\n\
  \n## 使用基于文件的身份验证\n\n正如您刚才所见，会话变量和条件语句的组合让您能够根据是否设置了某个会话变量，向访问者呈现完全不同的页面。您只需要添加一个密码检查系统，就拥有了一个基本的用户身份验证系统。\n\
  \n在深入探讨代码之前，让我们先考虑一下安全密码这个重要问题。\n\n### 使密码安全\n\n密码绝不应存储在可公开访问的位置。换句话说，如果您使用基于文件的身份验证系统，该文件必须位于\
  \ Web 服务器的文档根目录之外。此外，密码不应以纯文本形式保存。为了更高的安全性，建议对密码进行哈希处理。多年来，建议使用`MD5`或`SHA-1`算法将密码哈希为\
  \ 32 位或 40 位的十六进制数字。它们最初的优势之一——速度，却变成了一个主要弱点。自动脚本可以在暴力攻击中每秒处理大量计算，以确定原始值——这与其说是猜测，不如说是尝试每一种可能的组合。\n\
  \n目前的建议是使用两个函数：`password_hash()`和`password_verify()`，它们提供了更强大的密码哈希和验证系统。要哈希一个密码，只需将其传递给`password_hash()`函数，如下所示：\n\
  \n```\n$hashed = password_hash($password, PASSWORD_DEFAULT);\n```\n\n`password_hash()`的第二个参数是一个常量，它将加密方法交给\
  \ PHP 处理，让您能够随时跟上被认为是最安全的加密方法。\n\n> **注意**：`password_hash()`函数为高级用户提供了其他选项。详情请参见[`www.php.net/manual/en/function.password-hash.php`](http://www.php.net/manual/en/function.password-hash.php)。还有一个关于安全密码哈希的常见问题解答页面，位于[`www.php.net/manual/en/faq.passwords.php`](http://www.php.net/manual/en/faq.passwords.php)。\n\
  \n使用`password_hash()`会以一种无法逆转的方式打乱纯文本密码。这意味着即使您的密码文件泄露，也没人能找出密码是什么。这也意味着您无法将密码转换回其原始值。从某方面来说，这并不重要：当用户登录时，`password_verify()`会根据哈希版本检查提交的值。缺点在于，如果用户忘记密码，您无法发送密码提醒；必须创建一个新密码。尽管如此，良好的安全性要求对密码进行哈希处理。\n\
  \n哈希处理无法防范密码最常见的问题：那些容易猜测或使用常见单词的密码。许多注册系统现在通过要求混合使用字母数字字符和符号来强制使用更强的密码。\n\n因此，首要任务是创建一个用户注册表单，用于检查以下内容：\n\
  \n*   密码和用户名包含最少字符数\n*   密码符合最低强度标准，例如包含数字、大写和小写字符以及符号的混合\n*   密码与确认字段中的第二次输入匹配\n\
  *   用户名未被使用\n\n### PHP 解决方案 11-3：创建密码强度检查器\n\n本 PHP 解决方案展示如何创建一个类，用于检查密码是否满足特定要求，例如空格的使用、最少字符数以及不同类型字符的组合。默认情况下，该类仅检查密码是否只包含单个空格、开头或结尾没有空格，以及包含最少字符数。可选方法允许您设置更严格的条件，例如使用大小写字符、数字和非字母数字符号的组合。\n\
  \n本 PHP 解决方案从构建用户注册表单开始，该表单也将在 PHP 解决方案 11-4 中使用。\n\n1.  在`sessions`文件夹中创建一个名为`register.php`的页面，并插入一个包含三个文本输入字段和一个提交按钮的表单。按下图所示布局表单并命名输入元素。如果想节省时间，请使用`ch11`文件夹中的`register_01.php`。\n\
  \n    ![../images/332054_4_En_11_Chapter/332054_4_En_11_Figf_HTML.jpg](img/332054_4_En_11_Figf_HTML.jpg)\n\
  \n2.  一如既往，您希望仅在表单已提交时才运行处理脚本，因此所有内容都需要包含在一个条件语句中，该语句检查提交按钮的`name`属性是否在`$_POST`数组中。然后，您需要检查输入是否满足您的最低要求。在`DOCTYPE`声明上方的\
  \ PHP 代码块中插入以下代码：\n\n    ```\n    if (isset($_POST['register'])) {\n        $username\
  \ = trim($_POST['username']);\n        $password = trim($_POST['pwd']);\n      \
  \  $retyped = trim($_POST['conf_pwd']);\n        require_once '../PhpSolutions/Authenticate/CheckPassword.php';\n\
  \    }\n    ```\n\n    条件语句内部的代码将三个文本字段的输入传递给`trim()`以去除开头和结尾的空白，并将结果赋值给简单变量。接下来，它包含将包含密码检查类的文件，您将在下一步中定义该类。\n\
  \n3.  在`PhpSolutions`文件夹中创建一个名为`Authenticate`的新文件夹。然后在新文件夹中创建一个名为`CheckPassword.php`的文件。该文件将只包含\
  \ PHP 脚本，因此请删除所有 HTML 并添加以下代码：\n\n    ```\n    <?php\n    namespace PhpSolutions\\\
  Authenticate;\n\n    class CheckPassword {\n        protected $password;\n     \
  \   protected $minChars;\n        protected $mixedCase = false;\n        protected\
  \ $minNums = 0;\n        protected $minSymbols = 0;\n        protected $errors =\
  \ [];\n\n        public function __construct($password, $minChars = 8) {\n     \
  \       $this->password = $password;\n            $this->minChars = $minChars;\n\
  \        }\n\n        public function check() {\n            if (preg_match('/\\\
  s{2,}/', $this->password)) {\n                $this->errors[] = '密码只能包含单个空格。';\n\
  \            }\n            if (preg_match('/^\\s+|\\s+$/', $this->password)) {\n\
  \                $this->errors[] = '密码不能以空格开头或结尾。';\n            }\n           \
  \ if (strlen($this->password) < $this->minChars) {\n                $this->errors[]\
  \ = \"密码长度至少需要 $this->minChars 个字符。\";\n            }\n            return $this->errors\
  \ ? false : true;\n        }\n\n        public function getErrors() {\n        \
  \    return $this->errors;\n        }\n    }\n    ```\n\n    这定义了基本的`CheckPassword`类，该类最初仅检查密码是否包含多个空格、是否以空格开头或结尾，以及是否满足所需的最少字符数。您稍后将添加其他特性。\n\
  \n    文件首先声明`PhpSolutions\\Authenticate`作为其命名空间，然后定义具有六个受保护属性的`CheckPassword`类。前两个用于密码和最少字符数。`$mixedCase`、`$minNums`和`$minSymbols`属性将用于增加密码强度，但初始设置为`false`或\
  \ 0。`$errors`属性将用于在密码未通过任何检查时存储错误消息数组。\n\n    构造函数方法接受两个参数：密码和最少字符数，并将它们分配给相关属性。默认情况下，最少字符数设置为\
  \ 8，使其成为可选参数。\n\n\n\n`check()` 方法包含三个条件语句。第一个使用 `preg_match()` 和正则表达式，搜索密码中两个或更多连续空白字符。第二个条件语句使用另一个正则表达式检查密码开头或结尾的空格，而第三个条件语句使用\
