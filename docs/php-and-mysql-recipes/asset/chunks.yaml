    CHAPTER 2 ■ CLASSES AND OBJECTS


    Recipe 2-4\. Writing an Interface


    Problem


    Although PHP supports extending classes, each class can only extend a single class.
    PHP does not support multiple inheritance. Sometimes it is necessary to define
    a set of functions that must be implemented in addition to the functionality provided
    by the base class or abstract class. This is useful when classes need a predefined
    set of behaviors to solve specific functionality like sorting of member data.


    Solution


    The solution is to use interface classes to define additional functionality with
    a predefined set of functions.


    Interface classes act more as a definition of a contract and PHP allows any class
    to implement as many interfaces as needed. If a class implements one or more interfaces
    it must implement all of the methods required by each interface. Interface classes
    only contain the definition of methods but no actual code. They can be compared
    to a collection of abstract methods from an abstract class.


    How it Works


    Each interface class is usually a collection of methods that defines behavior
    as in the next example where the class records implement the interface sort with
    the methods ascending() , descending() , and shuffle() .


