    the Constraints tab, make sure Primary Key is selected in the combo box, and click
    Add.


    **8.** Type **pk_department** for the key’s name, then switch to the Columns tab,
    and add **department_id** to the list. Click OK to close the dialog box.


    **9.** Click OK again to create the table. Your new table should now appear in
    the Tables list of your database (see Figure 3-12). As you can see, apart from
    your new table, there are a few tables created by default by PostgreSQL—it’s safe
    to ignore them. If you select the department table from the list, pgAdmin III
    shows you the SQL code that creates the structure you’ve just built using the
    visual interface. You can check that you see the same code on your computer to
    ensure you’ve followed the steps of the exercise correctly.


    ■**Note** You’ll learn more about SQL in the following chapters, but for now it’s
    enough to know that SQL is a language that can be used to interact with the database,
    to create data tables, to read data from these tables, and so on.


