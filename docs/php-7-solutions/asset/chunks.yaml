  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将以下英文文本翻译成专业、准确的中文。\n\n\n```php\nif\
    \ (!$errors) {\n// include the connection file\nrequire_once 'connection.php';\n\
    $conn = dbConnect('write', 'pdo');\n// create a key\n$key = 'takeThisWith@PinchOfSalt';\n\
    // prepare SQL statement\n$sql = 'INSERT INTO users_2way (username, pwd)\nVALUES\
    \ (:username, AES_ENCRYPT(:pwd, :key))';\n$stmt = $conn->prepare($sql);\n// bind\
    \ parameters and insert the details into the database\n$stmt->bindParam(':username',\
    \ $username, PDO::PARAM_STR);\n$stmt->bindParam(':pwd', $password, PDO::PARAM_STR);\n\
    $stmt->bindParam(':key', $key, PDO::PARAM_STR);\n$stmt->execute();\nif ($stmt->rowCount()\
    \ == 1) {\n$success = htmlentities($username) . ' has been registered. You may\
    \ now log in.';\n} elseif ($stmt->errorCode() == 23000) {\n$errors[] = htmlentities($username)\
    \ . ' is already in use. Please choose another username.';\n} else {\n$errors[]\
    \ = 'Sorry, there was a problem with the database.';\n}\n}\n```\n\n严格来说，不需要为`$key`使用绑定参数，因为它并非来自用户输入。但是，如果直接将其嵌入查询中，整个查询需要用双引号括起来，并且`$key`需要用单引号括起来。\n\
    \n要测试前面的脚本，请将它们复制到 `includes` 文件夹中，并在 `register_db.php` 中引用它们，以替代 `register_db_mysqli.php`\
    \ 或 `register_db_pdo.php`。\n\n## 使用双向加密进行用户身份验证\n\n使用双向加密创建登录页面非常简单。连接到数据库后，将用户名、密钥和未加密的密码合并到\
    \ `SELECT` 查询的 `WHERE` 子句中。如果查询找到匹配项，则允许用户访问网站的受限部分。如果没有匹配项，则拒绝登录。除了以下部分，代码与 PHP\
    \ 方案 19-2 相同。\n\n对于 MySQLi，代码如下所示（参见 `authenticate_2way_mysqli.php`）：\n\n```php\n\
    $stmt = $conn->stmt_init();\n$stmt->prepare($sql);\n// bind the input parameters\n\
    $stmt->bind_param('sss', $username, $password, $key);\n$stmt->execute();\n// to\
    \ get the number of matches, you must store the result\n$stmt->store_result();\n\
    // if a match is found, num_rows is 1, which is treated as true\nif ($stmt->num_rows)\
    \ {\n$_SESSION['authenticated'] = 'Jethro Tull';\n// get the time the session\
    \ started\n$_SESSION['start'] = time();\nsession_regenerate_id();\nheader(\"Location:\
    \ $redirect\"); exit;\n} else {\n// if not verified, prepare error message\n$error\
    \ = 'Invalid username or password';\n}\n```\n\n请注意，在访问 `num_rows` 属性之前，需要先存储预处理语句的结果。如果不这样做，`num_rows`\
    \ 将始终为 `0`，即使用户名和密码正确，登录也会失败。\n\nPDO 的修订代码如下所示（参见 `authenticate_2way_pdo.php`）：\n\
    \n```php\n$stmt = $conn->prepare($sql);\n// bind variables by passing them as\
    \ an array when executing statement\n$stmt->execute([$username, $password, $key]);\n\
    // if a match is found, rowCount() produces 1, which is treated as true\nif ($stmt->rowCount())\
    \ {\n$_SESSION['authenticated'] = 'Jethro Tull';\n// get the time the session\
    \ started\n$_SESSION['start'] = time();\nsession_regenerate_id();\nheader(\"Location:\
    \ $redirect\"); exit;\n} else {\n// if not verified, prepare error message\n$error\
    \ = 'Invalid username or password';\n}\n```\n\n要测试这些脚本，请将它们复制到 `includes` 文件夹中，并用它们替换\
    \ `authenticate_mysqli.php` 和 `authenticate_pdo.php`。\n\n### 解密密码\n\n解密使用双向加密的密码，只需在预处理语句中将密钥作为第二个参数传递给\
    \ `AES_DECRYPT()` 即可，如下所示：\n\n```php\n$key = 'takeThisWith@PinchOfSalt';\n$sql\
    \ = \"SELECT AES_DECRYPT(pwd, '$key') AS pwd FROM users_2way\nWHERE username =\
    \ ?\";\n```\n\n该密钥必须与最初用于加密密码的密钥完全相同。如果丢失密钥，密码将像使用单向哈希存储的密码一样无法访问。通常，唯一需要解密密码的情况是用户请求密码提醒时。为此类提醒制定适当的安全策略在很大程度上取决于您运营的网站类型。然而，不言而喻，您不应在屏幕上显示解密后的密码。您需要设置一系列安全检查，例如询问用户的出生日期或提出一个只有用户可能知道答案的问题。即使用户答对了，也应将密码通过电子邮件发送到用户的注册地址。如果您能成功读完本书至此，那么所有必要的知识应该已经尽在掌握。\n\
    \n### 更新用户详细信息\n\n我没有为用户注册页面包含任何更新表单。这是一个您在这个阶段应该能够自行完成的任务。更新用户注册详细信息最重要的点是，您不应在更新表单中显示用户的现有密码。如果您使用的是密码哈希，无论如何也无法显示。\n\
    \n### 下一步做什么？\n\n本书涵盖了大量的内容。如果您已经掌握了这里介绍的所有技术，那么您已经走在成为中级 PHP 开发人员的道路上，再稍加努力，就能进入高级水平。如果感觉有些吃力，请不要担心。重新阅读前面的章节。练习得越多，就会越容易。\n\
    \n您可能会想，“我到底怎样才能记住所有这些？”您不需要全部记住。查阅资料并不丢人。请收藏 PHP 在线手册 (`www.php.net/manual/en/`)\
    \ 并经常使用它。它不断更新，并且包含许多有用的示例。在页面右上角的搜索框中输入函数名称，即可直接查看该函数的完整描述。即使您记不住准确的函数名，手册也会将您带到一个列出最可能候选项的页面。大多数页面都提供了实际示例，说明函数或类的使用方法。\n\
    \n使动态网页设计变得容易的，不是对 PHP 函数和类的百科全书式了解，而是对条件语句、循环和其他结构如何控制脚本流程的扎实掌握。一旦您能根据“如果发生这种情况，接下来应该发生什么？”来想象您的项目，您就成为自己游戏的主宰者。我经常查阅\
    \ PHP 在线手册。对我来说，它就像一本字典。大多数时候，我只是想检查参数顺序是否正确，但我经常发现某些东西会吸引我的眼球，并打开新的视野。我也许不会立即使用这些知识，但会将其存储在我的脑海深处以备将来使用，并在需要检查细节时再回去查阅。\n\
    \nMySQL 在线手册 (`https://dev.mysql.com/doc/refman/8.0/en/`) 同样有用。MariaDB 的文档在 `https://mariadb.com/kb/en/library/documentation/`。将\
    \ PHP 和数据库在线手册都当作您的朋友，您的知识将会突飞猛进。\n\n## 索引\n\n### A\n\n- `action` 属性\n- `AES_DECRYPT()`\
    \ 函数\n- `AES_ENCRYPT()` 函数\n- Apache Web 服务器\n- `array_diff_assoc()`\n- `array_diff_key()`\n\
    - 数组元素\n- `array_filter()` 函数\n- `array_merge()` 函数\n- `array_merge_recursive()`\n\
    - `array_multisort()` 函数\n- 数组\n  - 将元素赋值给变量\n  - CSV 文件\n  - `extract()`\n  -\
    \ `list()`\n  - 构建嵌套列表\n  - `csv_processor()`\n  - JSON\n  - 合并\n    - `array_diff_assoc()`\n\
    \    - `array_diff_key()`\n    - `array_merge()`\n    - `array_merge_recursive()`\n\
    \    - `array_pop()`\n    - 比较\n    - `implode()`\n    - `strcasecmp()`\n    -\
    \ 使用联合运算符\n  - 修改元素\n    - `array_walk()`, 182–184\n    - 使用循环\n  - 排序函数\n  -\
    \ 排序\n    - `array_multisort()`\n    - 排列\n    - 宇宙飞船运算符\n    - Splat 运算符\n  -\
    \ `array_slice()` 函数\n- 数组排序函数\n"
