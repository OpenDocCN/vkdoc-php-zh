  trans: "\n这会创建一个名为`month`的下拉菜单，以及两个名为`day`和`year`的输入字段。该下拉菜单目前没有任何值，但稍后会用 PHP 循环来填充。`day`和`year`字段使用了\
    \ HTML5 的`number`类型和`required`属性。`day`字段还包含`max`和`min`属性，以便将范围限制在 1 到 31 之间。支持新\
    \ HTML5 表单元素的浏览器会在字段旁边显示数字步进器，并限制输入的类型和范围。其他浏览器则会将其渲染为普通的文本输入字段。为了兼容旧版浏览器，这两个字段都设置了`maxlength`属性，以限制可接受的字符数。\n\
    \n2. 修改构建下拉菜单的部分，如下所示：\n\n```\n\"\n    >\n```\n\n这会创建一个月份名称数组，并使用`date()`函数来查找当前月份的编号（传递给`date()`的参数含义将在本章后面解释）。\n\
    \n随后，一个`for`循环来填充菜单的`<option>`标签。我将`$i`的初始值设为`1`，因为我打算用它来表示月份的值。在循环内部，条件语句检查两组条件，这两组条件都用括号括起来，以确保它们以正确的顺序被求值。第一组检查`$_POST`数组是否为空，并且`$i`和`$thisMonth`的值是否相同。但如果表单已提交，`$_POST['month']`的值就会被设置，因此另一组条件检查`$i`是否与`$_POST['month']`相同。结果就是，首次加载表单时，`selected`会被插入到当前月份的`<option>`标签中。但如果表单已经提交，则会再次显示用户选择的月份。\n\
    \n月份名称通过从`$months`数组中提取，并显示在`<option>`标签之间。由于索引数组从 0 开始，你需要从`$i`的值中减 1 才能得到正确的月份。\n\
    \n3. 同样地，用当前日期或表单提交后选中的值来填充日和年的字段：\n\n```\n    Date:\n    \">\n    Year:\n   \
    \ \">\n    ```\n\n4. 保存页面并在浏览器中测试。它应该会显示当前日期，并且看起来类似于图 16-6。\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig6_HTML.jpg](img/332054_4_En_16_Fig6_HTML.jpg)\n\
    \n图 16-6.\n为日期部分使用独立的输入字段有助于消除错误\n\n如果你测试这些输入字段，在大多数浏览器中，Date 字段应最多接受两个字符，Year\
    \ 字段最多接受四个字符。尽管这降低了出错的概率，但你仍然需要验证输入并正确格式化日期。\n\n如果你输入了无效的日期，你应该会看到一条相应的错误消息（见图\
    \ 16-8）。\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig8_HTML.jpg](img/332054_4_En_16_Fig8_HTML.jpg)\n\
    \n图 16-8.\n`convertDateToISO()`函数会拒绝无效日期\n\n你可以将自己的代码与 `ch16` 文件夹中的 `date_converter_02.php`\
    \ 进行比较。\n\n当为需要用户输入日期的表创建表单时，请按照与 `date_converter.php` 中相同的方式，添加月份、日期和年份三个字段。在将表单输入插入数据库之前，引入\
    \ `utility_funcs.php`（或你决定存储该函数的任何位置）文件，并使用 `convertDateToISO()` 函数验证日期并格式化，以便插入数据库：\n\
    \n```\nrequire_once 'utility_funcs.php';\n$converted = convertDateToMySQL($_POST['month'],\
    \ $_POST['day'], $_POST['year']);\nif ($converted[0]) {\n$date = $converted[1];\n\
    } else {\n$errors[] = $converted[1];\n}\n```\n\n如果你的`$errors`数组包含任何元素，请中止插入或更新过程并显示错误。否则，`$date`即可安全地用于\
    \ SQL 查询。\n\n**注意**\n本章的其余部分专门讲述如何在 PHP 中处理日期。这是一个重要但复杂的话题。我建议你快速浏览每一节，以便熟悉 PHP\
    \ 的日期处理功能，当你需要实现某个特定功能时再回到本节进行查阅。\n\n## 在 PHP 中处理日期\n\n与其他计算机语言一样，PHP 通过从 Unix\
    \ 纪元（1970 年 1 月 1 日午夜 UTC，协调世界时）开始以秒为单位进行计算，来处理日期和时间的复杂性。在过去，当尝试设置过去或未来的日期（例如会员过期时），或者处理不同时区时，这涉及到繁琐的秒数和日期的相互转换计算。然而，由于\
    \ PHP 5 中引入了`DateTime`、`DateTimeZone`、`DateInterval`和`DatePeriod`类，这已不再是必需的操作。\n\
    \n可用的日期范围取决于 PHP 的编译方式。`DateTime`及相关类在内部以 64 位数字存储日期和时间信息，这使得能够表示大约从过去 2920 亿年到未来同样年份的日期。但是，如果\
    \ PHP 是在 32 位处理器上编译的，则表 16-3 后半部分中函数的范围将被限制在大约 1901 年至 2038 年 1 月之间。\n\n表 16-3\
    \ 总结了 PHP 中主要的日期和时间相关的类及函数。\n\n**表 16-3.** PHP 日期和时间相关的类与函数\n\n| 名称 | 参数 | 描述\
    \ |\n| :--- | :--- | :--- |\n| **类** | | |\n| `DateTime` | 日期字符串，`DateTimeZone`对象\
    \ | 创建一个对时区敏感的对象，包含可用于日期和时间计算的日期和/或时间信息。 |\n| `DateTimeImmutable` | 同 `DateTime`\
    \ | 与`DateTime`相同，但更改任何值都会返回一个新对象，原始对象保持不变。 |\n| `DateTimeZone` | 时区字符串 | 存储时区信息，供`DateTime`对象使用。\
    \ |\n| `DateInterval` | 间隔说明 | 表示一个固定的时间段（年、月、小时等）。 |\n| `DatePeriod` | 开始时间，间隔，结束时间/重复次数，选项\
    \ | 计算一段时间内或一定重复次数内的循环日期。 |\n| **函数** | | |\n| `time()` | 无 | 生成当前日期和时间的 Unix\
    \ 时间戳。 |\n| `mktime()` | 小时，分钟，秒，月，日，年 | 为指定的日期/时间生成 Unix 时间戳。 |\n| `strtotime()`\
    \ | 日期字符串，时间戳 | 尝试从英文文本描述（例如“next Tuesday”）生成 Unix 时间戳。返回的值相对于第二个参数（如果提供）。 |\n\
    | `date()` | 格式字符串，时间戳 | 使用表 16-4 中列出的说明符格式化英文日期。如果省略第二个参数，则使用当前日期和时间。 |\n| `strftime()`\
    \ | 格式字符串，时间戳 | 与`date()`相同，但使用系统区域设置指定的语言。 |\n\n### 设置默认时区\n\nPHP 中的所有日期和时间信息都根据服务器的默认时区设置进行存储。Web\
    \ 服务器与目标受众位于不同时区是很常见的，因此了解如何更改默认设置非常有用。\n\n服务器的默认时区通常应该在 `php.ini` 的 `date.timezone`\
    \ 指令中设置，但如果你的托管服务提供商忘记设置，或者你想使用不同的时区，则需要自行设置。\n\n如果你的托管服务提供商允许你控制自己的 `php.ini`\
    \ 版本，请在其中更改 `date.timezone` 的值。这样，该设置就会自动应用于你所有的脚本。\n"
- fmt: '如果你的服务器支持`.htaccess`或`.user.ini`文件，你可以通过在站点根目录添加相应的命令来更改时区。对于`.htaccess`，请使用以下内容：


    ```

    php_value date.timezone ''timezone''

    ```


    对于`.user.ini`，命令如下所示：


    ```

    date.timezone=timezone

    ```


    将`timezone`替换为适合你所在位置的正确设置。你可以在[`www.php.net/manual/en/timezones.php`](http://www.php.net/manual/en/timezones.php)找到有效的时区完整列表。


    如果以上选项均不可用，请在任何使用日期或时间函数的脚本开头添加以下内容（将`timezone`替换为适当的值）：


    ```

    ini_set(''date.timezone'', ''timezone'');

    ```


    ## 创建DateTime对象


    要创建一个`DateTime`对象，只需使用`new`关键字后跟`DateTime()`，如下所示：


    ```

    $now = new DateTime();

    ```


    这会创建一个对象，表示根据Web服务器时钟和默认时区设置的当前日期和时间。


    `DateTime()`构造函数还接受两个可选参数：一个包含日期和/或时间的字符串，以及一个`DateTimeZone`对象。第一个参数的日期/时间字符串可以是[`www.php.net/manual/en/datetime.formats.php`](http://www.php.net/manual/en/datetime.formats.php)列出的任何格式。与仅接受一种格式的MySQL不同，PHP走向了另一个极端。例如，要为2019年圣诞节创建一个`DateTime`对象，以下所有格式都是有效的：


    ```

    ''12/25/2019''

    ''25-12-2019''

    ''25 Dec 2019''

    ''Dec 25 2019''

    ''25-XII-2019''

    ''25.12.2019''

    ''2019/12/25''

    ''2019-12-25''

    ''December 25th, 2019''

    ```


    这不是一个详尽的列表，仅是一些有效格式的示例。潜在的混淆点在于分隔符的使用。例如，正斜杠允许用于美式日期（`12/25/2019`）和ISO日期（`2019/12/25`），但在欧洲顺序表示日期或月份使用罗马数字时则不允许。要以欧洲顺序表示日期，分隔符必须是点、制表符或破折号。日期也可以使用相对表达式指定，例如“下周三”、“明天”或“上周一”。然而，这也存在混淆的可能性。有些人用“下周三”表示“下周的星期三”，而PHP按字面意思解释：如果今天是星期二，“下周三”指的是第二天。


    你不能单独使用`echo`来显示`DateTime`对象中存储的值。除了`echo`，你还需要使用`format()`方法告诉PHP如何格式化输出。


    ## 在PHP中格式化日期


    `DateTime`类的`format()`方法使用与`date()`函数相同的格式字符。虽然这保证了连续性，但格式字符通常难以记忆，并且背后似乎没有明显的逻辑依据。表16-4列出了最有用的日期和时间格式字符。


    `DateTime`类和`date()`函数仅以英文显示星期和月份的名称，但`strftime()`函数使用服务器区域设置指定的语言。因此，如果服务器的区域设置为西班牙语，`DateTime`对象和`date()`显示为Saturday，而`strftime()`显示为sábado。除了`DateTime`类和`date()`函数都使用的格式字符外，表16-4还列出了`strftime()`使用的等效字符。并非所有格式在`strftime()`中都有等效项。


    **表16-4. 主要的日期和时间格式字符**


    | 单位 | DateTime/date() | strftime() | 描述 | 示例 |

    | --- | --- | --- | --- | --- |

    | 日 | `d` | `%d` | 带前导零的月份中的日数 | 01到31 |

    |     | `j` | `%e`* | 不带前导零的月份中的日数 | 1到31 |

    |     | `S` |            | 月份的英文序数后缀 | st, nd, rd 或 th |

    |     | `D` | `%a` | 星期名称的前三个字母 | Sun, Tue |'
  raw: "If your server supports `.htaccess` or `.user.ini` files , you can change\
    \ the\ntime zone by adding the appropriate command in the site root. For `.htaccess`,\
    \ use this:\n\n```\nphp_value date.timezone 'timezone'\n```\n\nFor `.user.ini`,\n\
    the command looks like this:\n\n```\ndate.timezone=timezone\n```\n\nReplace *timezone*\
    \ with the correct setting for your location.\nYou can find a full list of valid\
    \ time zones at [`www.php.net/manual/en/timezones.php`](http://www.php.net/manual/en/timezones.php)\
    \ .\n\nIf none of those options is available to you, add the following at the\n\
    beginning of any script that uses date or time functions (replacing\n*timezone*\
    \ with the appropriate value):\n\n```\nini_set('date.timezone', 'timezone');\n\
    ```\n\nCreating a DateTime Object\n\nTo create a `DateTime` object , just use\
    \ the `new` keyword followed\nby `DateTime()`,\nlike this:\n\n```\n$now = new\
    \ DateTime();\n```\n\nThis creates an object that represents the current date\
    \ and time\naccording to the web server’s clock and default time zone setting.\n\
    \nThe `DateTime()`\nconstructor also takes two optional arguments: a string containing\
    \ a\ndate and/or time and a `DateTimeZone` object.\nThe date/time string for the\
    \ first argument can be in any of the formats\nlisted at [`www.php.net/manual/en/datetime.formats.php`](http://www.php.net/manual/en/datetime.formats.php)\
    \ . Unlike MySQL, which accepts only one format, PHP\ngoes to the opposite extreme.\
    \ For example, to create a `DateTime` object for\nChristmas Day 2019, all the\
    \ following formats are valid:\n\n```\n'12/25/2019'\n'25-12-2019'\n'25 Dec 2019'\n\
    'Dec 25 2019'\n'25-XII-2019'\n'25.12.2019'\n'2019/12/25'\n'2019-12-25'\n'December\
    \ 25th, 2019'\n```\n\nThis is not an exhaustive list. It’s just a selection of\
    \ valid\nformats. Where the potential confusion arises is in the use of\nseparators.\
    \ For example, the forward slash is permitted in\nAmerican-style (12/25/2019)\
    \ and ISO (2019/12/25) dates, but not when the\ndate is presented in European\
    \ order or when the month is represented by\nRoman numerals. To present the date\
    \ in European order, the separator\nmust be a dot, tab, or dash.\nDates can also\
    \ be specified using relative expressions, such as “next\nWednesday,” “tomorrow,”\
    \ or “last Monday.” However, there’s potential for\nconfusion here, too. Some\
    \ people use “next Wednesday” to mean “Wednesday\nnext week.” PHP interprets the\
    \ expression literally. If today is\nTuesday, “next Wednesday” means the following\
    \ day.\nYou can’t use `echo` on its own to\ndisplay the value stored in a `DateTime`\
    \ object. In\naddition to `echo`, you need to\ntell PHP how to format the output\
    \ using the `format()` method.\n\nFormatting Dates in PHP\nThe `DateTime`\nclass’s\
    \ `format()` method  uses the same format\ncharacters as the `date()` function.\n\
    Although this makes for continuity, the format characters are often\ndifficult\
    \ to remember and seem to have no obvious reasoning behind them.\nTable [16-4](#332054_4_En_16_Chapter.xhtml#Tab4)\
    \ lists the most\nuseful date and time format characters\n\nThe `DateTime`\nclass\
    \ and `date()` function  display the names of\nweekdays and months in English\
    \ only, but the `strftime()` function\nuses the language specified by the server’s\
    \ locale. So, if the server’s\nlocale is set to Spanish, a `DateTime` object and\n\
    `date()` display\nSaturday, but `strftime()` displays\nsábado. In addition to\
    \ the format characters used by both the `DateTime` class and\nthe `date()`\n\
    function, Table [16-4](#332054_4_En_16_Chapter.xhtml#Tab4) lists the\nequivalent\
    \ characters used by `strftime()`. Not all\nformats have an equivalent in `strftime()`\
    \ ..\n\nTable 16-4.\nThe main date and time format characters\n\nUnit |\n DateTime/date()\
    \ |\n strftime() |\n Description |\n Example |\n\n| --- | --- | --- | --- | ---\
    \ | --- | --- | --- | --- | --- | --- |\n\nDay |\n `d` |\n `%d` |\n Day of the\
    \ month with leading zero |\n 01 through 31 |\n\n|\n `j` |\n `%e`* |\n Day of\
    \ the month without leading zero |\n 1 through 31 |\n\n`S` |\n   |\n English ordinal\
    \ suffix for day of the month |\n st, nd, rd, or th |\n\n`D` |\n `%a` |\n First\
    \ three letters of day name |\n Sun, Tue |"
