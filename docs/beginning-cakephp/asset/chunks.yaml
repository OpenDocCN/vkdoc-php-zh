    正如基本应用程序流程（如处理数据和向用户提供输出）通过使用模型、视图和控制器进行分离一样，更复杂的流程（如生成动态视图）也与其各自的资源进行了分离。换句话说，助手和组件分别为处理视图和控制器提供了*第二层*支持。表
    14-1 展示了 Cake 中扩展 MVC 布局的资源。


    **表 14-1.** *Cake 扩展 MVC 布局的资源*


    | **主层资源** | **后台层资源** |

    | --- | --- |

    | 模型（`Model`） | 行为（`Behavior`）；数据源（`DataSource`） |

    | 视图（`View`） | 助手（`Helper`） |

    | 控制器（`Controller`） | 组件（`Component`） |


    通过使用助手，你可以避免单个视图变得过于臃肿，并使详细的输出流程可供应用程序中的其他视图使用。助手函数在后台层处理，或者在视图渲染时处理。组件通过分离出执行详细操作的一系列函数，为控制器提供类似的服务。图
    14-1 展示了助手如何扩展视图。


    **图 14-1.** *助手通过容纳更复杂的函数来扩展视图，这些函数否则会使视图变得混乱。*


    这是具体流程：


    1.  视图调用`$html->link()`函数来渲染一个链接，并为助手提供变量参数。

    2.  `link()`函数处理传递的参数并组合成最终输出，供视图使用。

    3.  HTML 助手将最终的`<a>`元素及其所有文本和属性发送回视图。


    图 14-1 中的示例展示了如何通过将生成链接的重复性任务放入助手中来精简视图。换句话说，Cake 不是将`$html->link()`函数的流程放入视图，而是将其保存在一个位置，从而使其可被整个应用程序访问，同时最小化视图文件中的代码量。本章将解释如何使用两种资源来扩展后台层的模型，就像助手和组件扩展视图和控制器一样。


    ## 使用数据源和行为扩展模型


    第一种资源是*数据源（`DataSource`）*。¹ 这些资源在后台连接额外的数据源并向模型提供数据。通过使用数据源，你可以让模型正常工作，而不必用连接、查找、读取和其他数据处理操作来填充它。模型可以引用数据源函数，而不是自己执行额外的连接。


    第二种扩展模型的资源是*行为（`Behavior`）*。这些是允许模型使用的数据以不同方式“表现”的类。简而言之，一些数据处理方法超越了表关联和简单回调；例如，它们可能在数据保存时对数据执行多个任务。当需要在数据库中同时执行多次更新时，就会调用行为。稍后，我将描述如何使用一些
    Cake 内建的行为为博客应用程序的标签应用树结构。


    由于扩展模型通常是资源中最复杂的部分，本章可能会包含一些学习 Cake 时最难掌握的概念。


    只需记住该资源的总体目标以及它最初出现在 Cake 中的原因。你的应用程序可能不需要为模型添加自定义行为，或者使用除典型 MySQL 设置之外的其他数据源，但了解这些资源能做什么以及它们在
    Cake 中如何工作，几乎肯定会在某些时候派上用场。


    ## 使用数据源


    到目前为止，本书只使用了 MySQL 来处理数据，但肯定还有其他方式为应用程序存储数据。例如 PostgreSQL、Sybase、Oracle 和 Microsoft
    SQL Server 都是一些最流行的数据库系统，如果项目需要，让 Cake 与它们协作可能很重要。幸运的是，Cake 提供了一些内建的数据源，允许应用程序连接到这些其他系统。


    数据源不仅有助于处理其他数据库引擎，还可以进行自定义以处理其他数据格式。可以通过数据源实现读取 XML、CSV 或其他格式。应用程序也可以通过数据源使用其他服务器系统，如
    LDAP 或 IMAP。许多 Web 应用程序使用某种 Web 服务 API 来与不使用 HTML 的客户端程序协作。结合 Cake 应用程序和客户端软件的能力也可以通过数据源实现。


    数据源的主要目标是处理模型的所有连接方法，并为模型提供便捷函数，以尽可能减少模型中的代码量。不过，这些便捷函数与数据源的通信有关，而不仅仅是任何模型类型的流程。换句话说，你希望模型能够坚持使用数据源进行通信，而不是自行处理所有连接细节。


    ¹ 在 Cake 中定义数据源可能比较棘手。通常，*datasource*（小写）是任何提供或保存数据的来源。因此，MySQL 是一个数据源，XML 文件或从
    LDAP 获取数据也是数据源。

