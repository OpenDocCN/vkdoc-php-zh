    ### Set Up Session Handling


    Just as we would in real-world middle-size applications, we’ll use CakePHP''s
    database session handling for this project.


    CakePHP gives us four different ready-to-use session-handling mechanisms.


    The default is `php`, where session handling is done by PHP in a way `php.ini`
    defines. I normally do not choose this option.


    The second option is `cake`, whereby session data will be stored in files in the
    `/tmp/sessions` folder. I use this option when the application is really simple
    and does not use any database.


    The third option is `database`, when session data is stored in a database at a
    table named `sessions`. I use this in most cases.


    The last option is `cache`, whereby sessions are stored in a cache such as APC,
    Memcached, or XCache. This option is recommended if you are planning to have an
    application with high usage.


    Cake makes it super easy to change session handling at any time. So, as your application
    popularity grows, you can switch from `database` to `cache`.


    Open your `/config/app.php` file and change the default value to `database` for
    session handling.


    ```

    1  ''Session'' => [

    2       ''defaults'' => ''database'',

    3   ],

    ```


    The SQL script for database tables for sessions is located at `app/config/schema/sessions.sql`.
    You should add this table to the `default` database.


    You don’t have to add any database table to your test database. CakePHP''s Test
    Suite will do this automatically.


    ### Create the Default Layout


    Change the `default.ctp` file at `/src/Template/Layout`, if you want. This is
    not required, but at some point, we’ll want to change CakePHP''s default layout.
    Why not now?'
