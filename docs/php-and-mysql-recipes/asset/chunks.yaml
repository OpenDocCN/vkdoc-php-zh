    echo str_ireplace("h1>", "h2>", $s) . "\n"; Now it''s only the content of the
    tags that is replaced and even with the opening tag being H1 instead of h1 it
    still works.


    For more advanced replacements that can account for attributes within the HTML
    tags we will have to use regular expressions. These are discussed in depth in
    ch[apter 9](http://dx.doi.org/10.1007/978-1-4842-0605-8_9) .


    Recipe 6-4\. Creating Long Strings with Heredoc and Newdoc


    Problem


    Building strings by concatenating string elements can take a lot of extra characters
    for line breaks, escaping characters, and quotation marks.


    Solution


    With the use of Heredoc and Newdoc it’s possible to create long strings without
    the use of quotation marks in a way that will preserve line breaks. Heredoc works
    as a double quoted string where any PHP


    variable included will be resolved to its value where Newdoc acts as a single
    quoted string with no variable substitution. Both Heredoc and Newdoc strings are
    started with the operator <<< followed by a name. For Heredoc the name is simply
    a sequence of characters where Newdoc uses a name in single quotes. Both types
    will end the string declaration at the point where the name is repeated as the
    only thing on the line with no spaces before the name and a semicolon after the
    name to terminate the command.


    How it Works


    It is not necessary to use the identifiers HEREDOC or NEWDOC as long as the start
    and end of the block uses the same identifier.


    <?php


    // 6_7.php


    // defining a Heredoc block


    $h = <<<HEREDOC


    Some string


    value


    HEREDOC;


    <?php


    // 6_8.php


    // defining a Newedoc block


    $n = <<<''NEWDOC''


    A different


    string value


    NEWDOC;


    CHAPTER 6 ■ STRINGS


    These blocks can be used both as variable assignments and as inline structures
    in an array or function calls. In the example below we generate an array with
    two string elements.


    <?php


    // 6_9.php


    $a = [


    <<<HEREDOC


    Some string


    value


    HEREDOC


    ,


    <<<HEREDOC


    Second string


    HEREDOC


    ,


    ];


    This will produce the following output:


    Array


    (


    [0] => Some string


    value


    [1] => Second string


    )


    Note how the line break is preserved in the string.


    <?php


    // 6_10.php


    printf("String = %s\n", <<<HEREDOC


    This is a very long string


    HEREDOC


    );


    Note that the final part of the string must be the only thing on the line, with
    the exception of a semicolon to terminate the statement. If the heredoc is used
    as part of an array declaration the closing name must be the only thing on the
    line. Commas to separate parameters or elements in the array must be on a separate
    line. Even whitespace after the closing name will cause parse errors.


    Blocks of text defined as a heredoc block is very practical to define templates
    used to build sections of an HTML document. In the next example we use a database
    query to select two columns from a database, loop over them, and create a HTML
    fragment based on two templates.


    CHAPTER 6 ■ STRINGS


    <?php


    // 6_11.php


    $con = mysqli_connect("127.0.0.1", "root", "secret", "book"); $rs = mysqli_query($con,
    "select * from person");


    if ($rs) {


    $persons = array();


    while($row = mysqli_fetch_assoc($rs)) {


    $persons[] = $row;


    }


    mysqli_free_result($rs);


    }


    mysqli_close($con);


    $person_tpl = <<<HEREDOC


    <div>


    <span>%first_name%</span>


    <span>%last_name%</span>


    <span>%date_of_birth%</span>


    </div>


    HEREDOC;


    $section_tpl = <<<HEREDOC


    <div>%persons%</div>


    HEREDOC;


    $html = "";


    $p = array();


    foreach ($persons as $person) {


    $r = str_replace(''%first_name%'', $person[''first_name''], $person_tpl);


    $r = str_replace(''%last_name%'', $person[''last_name''], $r);


    $r = str_replace(''%date_of_birth%'',


    gmdate("M j Y", $person[''date_of_birth'']), $r);


    $p[] = $r;


    }


    echo str_replace(''%persons%'', implode('''', $p), $section_tpl);


    The inner template ( $person_tpl ) defines the layout used for each person and
    the outer template defines the section of HTML where all the records are injected.


    Recipe 6-5\. Escaping Strings


    Problem


    When strings are used as input to database queries where the single quote is used
    to start and end string values, it is necessary to indicate that single quotes
    in the string value are not the end of the string.


    Without proper handling it would be very easy for a hacker to inject malicious
    code into the database.


    Escaping strings is the absolute minimum measure to prevent this. In general the
    programmer should never trust input from the user, and especially not use any
    input from the user (query string, form post, etc.) as direct injection into a
    database query.


    CHAPTER 6 ■ STRINGS


    Solution


    Most databases use an escape string in the form of a backslash ( \ ) or in some
    cases an extra single quote before the single quote in order to indicate that
    the quote should be part of the string. Using the function str_replace() to replace
    a single quote with two single quotes is one way to prepare strings to be used
    in update and insert statements. Many of the database extensions in PHP support
    a function to escape strings.


    The benefit of using a function provided by the database engine allows the database
    to handle the escape according to the selected character set.


    There are two functions do add and remove slashes from a string. These are called
    addslashes() and removeslashes() . These functions are not to be used to escape
    strings for insertion into databases but rather to add slashes to code that is
    going to be evaluated or when outputting contents that is embedded in javascript
    code. The adslashes() function escapes the NULL character, a backslash, a single
    quote, and a double quote.


    How it Works


    In the next example we have a string variable that contains a name with an apostrophe.
    If we try to use this variable as is we will get an error from the SQL server,
    but if the string variable is properly escaped before inserting into the database
    it will succeed.


    <?php


    // 6_12.php


    $con = mysqli_connect("127.0.0.1", "root", "secret", "book");


    // create table strings (


    // val varchar(250);


    // );


    $name = "Mark O''Brian";


    // This will fail


    mysqli_query($con, "insert into strings (val) values (''{$name}'');"); $name =
    mysqli_escape_string($con, $name);


    // This will succeed


    mysqli_query($con, "insert into strings (val) values (''{$name}'');"); Remember
    that you should never trust the input of any kind. Always validate and escape
    any and all input to your code.


    Consider the following code where the string $name could be the result of a user
    filling out a name value in an HTML form and submitting the form to the server.


    <?php


    // 6_13.php


    $con = mysqli_connect("127.0.0.1", "root", "secret", "book");


    // create table strings (


    // val varchar(250);


    // );


    $name = "My Name";


    // This will fail


    mysqli_query($con, "insert into strings (val) values (''{$name}'');"); 131


    CHAPTER 6 ■ STRINGS


    There is nothing in this code that prevents the user from entering SQL statements
    into the $name variable. Instead of entering My Name the user could enter My Name'';
    delete from strings; --.


    This will cause the code to execute two statements. The first will fetch all matching
    rows from the strings table and the second will delete all rows from the same
    table.


    Recipe 6-6\. Reformatting Strings


    Problem


    Strings have many uses and often there is a need to work on parts of the string.
    This can be to reorder the parts, add or remove portions of the string, or add
    HTML tags to format the string.


    Solution


    Strings can be converted into arrays with the explode() function that takes two
    arguments. The first argument is the pattern to look for and perform the split
    on. This can be a space character, a newline, or any other string patterns. The
    second parameter is the string to convert into an array. The return value will
    be an array of strings.'
