  trans: "\n```php\nclass Thumbnail {\n    protected $original;\n    protected $originalwidth;\n\
    \    protected $originalheight;\n    protected $basename;\n    protected $maxSize\
    \ = 120;\n    protected $imageType;\n    protected $destination;\n    protected\
    \ $suffix = '_thb';\n    protected $messages = [];\n}\n```\n\n与 `Upload` 类一样，所有属性都被声明为\
    \ protected，这意味着它们不会在类定义之外被意外更改。这些属性名称都具有描述性，因此不需过多解释。`$maxSize` 属性的默认值为 120（像素），用于确定缩略图较长边的最大尺寸。\n\
    \n4.  构造方法接受一个参数，即图像的路径。请在其他 protected 属性列表之后、闭右花括号之内添加构造方法的定义：\n\n```php\npublic\
    \ function __construct($image) {\n    if (is_file($image) && is_readable($image))\
    \ {\n        $details = getimagesize($image);\n    } else {\n        throw new\
    \ \\Exception(\"Cannot open $image.\");\n    }\n    if (!is_array($details)) {\n\
    \        throw new \\Exception(\"$image doesn't appear to be an image.\");\n \
    \   } else {\n        if ($details[0] == 0) {\n            throw new \\Exception(\"\
    Cannot determine size of $image.\");\n        }\n        // 检查 MIME 类型\n     \
    \   if (!$this->checkType($details['mime'])) {\n            throw new \\Exception('Cannot\
    \ process that type of file.');\n        }\n        $this->original = $image;\n\
    \        $this->originalwidth = $details[0];\n        $this->originalheight =\
    \ $details[1];\n        $this->basename = pathinfo($image, PATHINFO_FILENAME);\n\
    \    }\n}\n```\n\n构造方法首先执行一个条件语句，检查 `$image` 是否为文件且可读。如果是，则将文件传入 `getimagesize()`，并将结果存入\
    \ `$details`；否则抛出异常。与上一章类似，`Exception` 前加反斜杠表示我们要使用核心 `Exception` 类，而非针对此命名空间自定义的异常类。\n\
    \n当你将图像传入 `getimagesize()` 时，它会返回一个包含以下元素的数组：\n\n*   `0`：宽度（以像素为单位）\n*   `1`：高度\n\
    *   `2`：表示图像类型的整数值\n*   `3`：包含正确的宽度和高度属性的字符串，可直接用于 `<img>` 标签\n*   `mime`：图像的\
    \ MIME 类型\n*   `channels`：`3` 表示 RGB 图像，`4` 表示 CMYK 图像\n*   `bits`：每种颜色占用的位数\n\
    \n如果传入 `getimagesize()` 的参数不是图像，则返回 `false`。因此，若 `$details` 不是数组，则抛出异常，报告该文件似乎不是图像。但如果\
    \ `$details` 是数组，则意味着我们处理的很可能是一张图像。然而 `else` 块在继续处理之前还会进行两项额外检查。\n\n如果 `$details`\
    \ 数组中第一个元素的值为 0，说明图像有问题，因此抛出异常，报告无法确定图像尺寸。下一个检查会将报告的 MIME 类型传递给一个名为 `checkType()`\
    \ 的内部方法（该方法将在下一步中定义）。如果 `checkType()` 返回 `false`，则抛出另一个异常。\n\n这一系列异常处理机制确保，如果图像存在问题，不会进行任何后续处理。假设脚本顺利通过所有检查，则图像的路径会被存储在\
    \ `$original` 属性中，而其宽度和高度分别存储在 `$originalWidth` 和 `$originalHeight` 属性中。\n\n通过\
    \ `pathinfo()` 函数并传入 `PATHINFO_FILENAME` 常量来提取不含扩展名的文件名，这与 PHP 解决方案 9-5 中的做法相同。提取到的文件名存储在\
    \ `$basename` 属性中，后续将用于结合后缀名构建缩略图的名称。\n\n5.  `checkType()` 方法将 MIME 类型与一个可接受的图像类型数组进行比对。如果找到匹配项，则将类型存储在\
    \ `$imageType` 属性中并返回 `true`；否则返回 `false`。该方法在内部使用，因此需要声明为 protected。请将以下代码添加到类的定义中：\n\
    \n```php\nprotected function checkType($mime) {\n    $mimetypes = ['image/jpeg',\
    \ 'image/png', 'image/gif', 'image/webp'];\n    if (in_array($mime, $mimetypes))\
    \ {\n        // 提取 '/' 之后的字符\n        $this->imageType = substr($mime, strpos($mime,\
    \ '/')+1);\n        return true;\n    }\n    return false;\n}\n```\n\n浏览器普遍支持的图像类型只有\
    \ JPEG、PNG 和 GIF；但我将 WebP 也包含在内，因为目前它已被广泛支持。所有图像 MIME 类型都以 `image/` 开头。为了方便后续使用，`substr()`\
    \ 函数会提取斜杠之后的字符，并将其存储在 `$imageType` 属性中。当 `substr()` 使用两个参数时，它会从第二个参数指定的位置（从 0\
    \ 开始计数）开始，并返回字符串的剩余部分。我没有使用固定数字作为第二个参数，而是使用 `strpos()` 函数来查找斜杠的位置并加 1。这样做使代码更具通用性，因为某些专有图像格式以\
    \ `application/` 而非 `image/` 开头。`strpos()` 的第一个参数是要搜索的整个字符串，第二个参数是要搜索的子字符串。\n\n\
    6.  在构建类时进行代码测试是个好习惯。尽早发现错误比在长脚本中排查问题容易得多。为了测试代码，请在类定义中创建一个名为 `test()` 的新公共方法。\n\
    \n方法在类定义中的出现顺序无关紧要，但常见的做法是将所有公共方法集中在构造方法之后，并将 protected 方法放在文件底部。这有助于代码维护。\n\n\
    请在构造方法和 `checkType()` 定义之间插入以下定义：\n\n```php\npublic function test() {\n    $details\
    \ = <<<END\n文件: $this->original\n原始宽度: $this->originalwidth\n原始高度: $this->originalheight\n\
    基本名称: $this->basename\n图像类型: $this->imageType\nEND;\n    // 移除以消息形式输出前面一行时的缩进）\
    \ {\n    print_r($this->messages);\n}\n```\n\n该方法使用 `echo` 配合 heredoc 语法（参见第 4\
    \ 章“使用 heredoc 语法避免引号转义”）以及 `print_r()` 来显示属性的值。虽然输出中没有引号，但结合 `<pre>` 标签使用 heredoc\
    \ 语法能让代码和输出更易读。\n\n> **注意**  \n如果您使用的 PHP 版本低于 7.3，则结束分隔符（`END`）不得缩进。在 PHP 7.3\
    \ 及更高版本中，可以缩进，但缩进量不能超过代码其余部分。\n\n![图 10-1. 显示所选图像的详细信息，确认代码正常工作](img/332054_4_En_10_Fig1_HTML.jpg)\n\
    \n1.  要测试当前的类定义，请保存 `Thumbnail.php`，并将以下代码添加到 `create_thumb.php` 中 `DOCTYPE` 声明之前的\
    \ PHP 代码块中（该代码可在 `ch10` 文件夹的 `create_thumb_02.php` 中找到）：\n\n```php\nuse PhpSolutions\\\
    Image\\Thumbnail;\nif (isset($_POST['create'])) {\n    require_once('../PhpSolutions/Image/Thumbnail.php');\n\
    \    try {\n        $thumb = new Thumbnail($_POST['pix']);\n        $thumb->test();\n\
    \    } catch (Throwable $t) {\n        echo $t->getMessage();\n    }\n}\n```\n\
    \n这段代码从 `PhpSolutions\\Image` 命名空间导入 `Thumbnail` 类，然后添加了表单提交时要执行的代码。\n"
- fmt: "`name`属性在`create_thumb.php`的提交按钮中是`create`，因此这段代码仅在表单提交后执行。它包含`Thumbnail`类定义，创建该类的一个实例（将表单中选择的值作为参数传递），并调用`test()`方法。\n\
    \n`catch`块使用`Throwable`作为类型声明，因此它将处理内部PHP错误以及`Thumbnail`类抛出的异常。\n\n2. 保存`create_thumb.php`并在浏览器中加载。选择一张图片并单击\"\
    Create Thumbnail\"。输出结果类似于图[10-1](#332054_4_En_10_Chapter.xhtml#Fig1)。\n\n如有必要，请将代码与`ch10/PhpSolutions/Images`文件夹中的`Thumbnail_01.php`进行核对。\n\
    \n**注意**  \n`$_POST['pix']`的值被直接传递给`test()`方法，因为它直接来自我们自己的表单。在生产环境中，您应始终检查从表单接收的值。例如，使用`basename()`提取纯文件名并指定允许的目录。\n\
    \n虽然某些属性具有默认值，但您需要提供选项来更改缩略图的最大大小以及应用于文件名基础的尾缀。您还需要告知类在哪里创建缩略图。\n\n**PHP 解决方案\
    \ 10-2：更改默认值**\n\n当更改类设置的默认值时，您有多种方法可以选择。一种方法是创建需要在对象实例化后调用的公共方法。另一种方法是将值作为参数传递给构造方法。无论采用哪种方法，检查提交的值是否有效都很重要。继续使用同一个类定义。或者，使用`ch10/PhpSolutions/Image`文件夹中的`Thumbnail_01.php`。\n\
    \n1. 首先，更新构造方法，为缩略图的目标文件夹、缩略图的最大大小以及要添加到文件名的尾缀添加参数。构造方法将这些值的设置委托给也需要定义的受保护方法。更新后的代码如下所示：\n\
    \n```php\npublic function __construct($image, $destination, $maxSize = 120, $suffix\
    \ = '_thb') {\n    if (is_file($image) && is_readable($image)) {\n        $details\
    \ = getimagesize($image);\n    } else {\n        throw new \\Exception(\"Cannot\
    \ open $image.\");\n    }\n    // if getimagesize() returns an array, it looks\
