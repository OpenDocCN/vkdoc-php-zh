    \ class from\nChapter [9](#332054_4_En_9_Chapter.xhtml) to generate a thumbnail\
    \ from an\nuploaded image—in fact, not only from a single image but also from\n\
    multiple images.\nInstead of changing the code in the `Upload` class, it’s\nmore\
    \ efficient to extend the class and create a subclass. You then have\nthe choice\
    \ of using the original class to perform uploads of any type of\nfile or the subclass\
    \ to create thumbnail images on upload. The subclass\nalso needs to provide the\
    \ option to save or discard the larger image\nafter the thumbnail has been created.\n\
    Before diving into the code, let’s take a quick look at how you\ncreate a subclass.\n\
    \nExtending a class\nWe saw an example of extending a built-in class, `RecursiveIteratorIterator`,\n\
    in PHP Solution 8-8 “Building nested lists automatically.” The advantage\nof extending\
    \ a class is that the new **subclass** or\n**child class** inherits all the features\
    \ of its parent,\nincluding both properties and methods, but can adapt (or\n**override**)\
    \ some of them and acquire new ones of its own.\nThis simplifies the process of\
    \ creating a class to perform a more\nspecialized task. The `Upload` class you\n\
    created in Chapter [9](#332054_4_En_9_Chapter.xhtml) performs basic file uploads.\
    \ In\nthis chapter, you’ll extend it to create a child class called `ThumbnailUpload`\
    \ that\nuses the basic upload features of its parent but adds specialized\nfeatures\
    \ that create thumbnail images. The subclass will be created in\nthe `PhpSolutions/Image`\n\
    folder, so it will use `PhpSolutions\\Image` as\nits namespace.\n\nLike all children,\
    \ a child class often needs to borrow from its parent.\nThis frequently happens\
    \ when you override a method in the child class\nbut need to use the original\
    \ version as well. To refer to the parent\nversion, you prefix it with the `parent`\
    \ keyword\nfollowed by two colons, like this:\n\n```\nparent::originalMethod();\n\
    ```\n\nYou’ll see how this works in PHP Solution 10-5, because the child\nclass\
    \ defines its own constructor to add an extra argument but also\nneeds to use\
    \ the parent constructor.\nLet’s create a class capable of uploading images and\
    \ generating\nthumbnails at the same time.\n\nPHP Solution 10-5: Creating the\
    \ ThumbnailUpload\nclass\n\nThis PHP solution extends the `Upload` class from\n\
    Chapter [9](#332054_4_En_9_Chapter.xhtml) and uses it in conjunction with\nthe\
    \ `Thumbnail`\nclass to upload and resize images. It demonstrates how to create\
    \ a child\nclass and override parent methods. To create the child class, you need\n\
    `Upload.php` from\nChapter [9](#332054_4_En_9_Chapter.xhtml) and `Thumbnail.php`\
    \ from\nthis chapter. There’s a copy of these files in the `ch09/PhpSolutions/File`\n\
    and `ch10/PhpSolutions/Image`\nfolders, respectively.\n\n1.  Create a new file\
    \ called `ThumbnailUpload.php`\n    in the `PhpSolutions/Image`\n    folder. It\
    \ will contain only PHP code, so strip out any HTML inserted by\n    your script\
    \ editor and add the following code:\n\n```\n    <?php\n    namespace PhpSolutions\\\
    Image;\n    use PhpSolutions\\File\\Upload;\n    require_once __DIR__ . '/../File/Upload.php';\n\
    \    require_once 'Thumbnail.php';\n    class ThumbnailUpload extends Upload {\n\
    \    }\n    ```"
  trans: "\n```php\npublic function create() {\n    $ratio = $this->calculateRatio($this->originalwidth,\
    \ $this->originalheight,\n    $this->maxSize);\n    $thumbwidth = round($this->originalwidth\
    \ * $ratio);\n    $thumbheight = round($this->originalheight * $ratio);\n    $resource\
    \ = $this->createImageResource();\n    $thumb = imagecreatetruecolor($thumbwidth,\
    \ $thumbheight);\n    imagecopyresampled($thumb, $resource, 0, 0, 0, 0, $thumbwidth,\
    \ $thumbheight,\n    $this->originalwidth, $this->originalheight);\n    $newname\
    \ = $this->basename . $this->suffix;\n    switch ($this->imageType) {\n    case\
    \ 'jpeg':\n    $newname .= '.jpg';\n    $success = imagejpeg($thumb, $this->destination\
    \ . $newname);\n    break;\n    case 'png':\n    $newname .= '.png';\n    $success\
    \ = imagepng($thumb, $this->destination . $newname);\n    break;\n    case 'gif':\n\
    \    $newname .= '.gif';\n    $success = imagegif($thumb, $this->destination .\
    \ $newname);\n    break;\n    case 'webp':\n    $newname .= '.webp';\n    $success\
    \ = imagewebp($thumb, $this->destination . $newname);\n    break;\n    }\n   \
    \ if ($success) {\n    $this->messages[] = \"$newname 创建成功。\";\n    } else {\n\
    \    $this->messages[] = \"无法为 \" .\n    basename($this->original) . \" 创建缩略图\"\
    ;\n    }\n    imagedestroy($resource);\n    imagedestroy($thumb);\n}\n```\n\n\
    新代码的第一行将后缀拼接到已去除文件扩展名的文件名上。因此，如果原始文件名为 `menu.jpg` 且使用了默认的 `_thb` 后缀，`$newname`\
    \ 将变为 `menu_thb`。\n\n`switch` 语句检查图像的 MIME 类型并追加相应的文件扩展名。以 `menu.jpg` 为例，`$newname`\
    \ 最终变为 `menu_thb.jpg`。随后，缩放后的图像被传递给相应的保存函数，并使用目标文件夹和 `$newname` 作为保存路径。此处省略了 JPEG、PNG\
    \ 和 WebP 图像的可选质量参数，默认质量对于缩略图而言已足够。\n\n保存操作的结果存储在 `$success` 中。根据结果，`$success`\
    \ 的值为 `true` 或 `false`，并会向 `$messages` 属性添加相应的消息。该消息使用 `basename()` 函数而非 `$basename`\
    \ 属性创建，因为该属性中的文件扩展名已被去除，而 `basename()` 函数会保留扩展名。\n\n最后，`imagedestroy()` 通过销毁用于创建缩略图的资源来释放服务器内存。\n\
    \n6. 到目前为止，你一直使用 `test()` 方法来显示错误信息。现在创建一个公共方法来获取这些消息：\n\n```php\npublic function\
    \ getMessages() {\n    return $this->messages;\n}\n```\n\n7. 保存 `Thumbnail.php`。在\
    \ `create_thumb.php` 中，将对 `test()` 方法的调用替换为对 `create()` 的调用。同时调用 `getMessages()`\
    \ 并将结果赋值给一个变量，如下所示：\n\n```php\n$thumb->create();\n$messages = $thumb->getMessages();\n\
    ```\n\n8. 在 `<body>` 开始标签之后添加一个 PHP 代码块，用于显示所有消息：\n\n```php\n';\n    foreach ($messages\
    \ as $message) {\n        echo \"$message\";\n    }\n    echo '';\n}\n?>\n```\n\
    \n你在之前的章节中已经见过这段代码，因此无需额外解释。\n\n9. 保存 `create_thumb.php`，在浏览器中加载，并通过从列表中选择图像并点击“创建缩略图”进行测试。如果一切顺利，你应该会看到一条报告缩略图已创建的消息，并且可以在\
    \ `upload_test` 的 `thumbs` 子文件夹中确认其存在，如图 10-6 所示。\n\n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig6_HTML.jpg](img/332054_4_En_10_Fig6_HTML.jpg)\n\
    \n**图 10-6.** 缩略图已成功创建于目标文件夹中\n\n10. 如果缩略图未能创建，`Thumbnail` 类生成的错误消息应能帮助你定位问题根源。此外，请仔细对照\
    \ `ch10/PhpSolutions/Image` 文件夹中的 `Thumbnail_04.php` 检查你的代码。如果之前的 PHP 解决方案中的测试均能通过，那么错误很可能出现在\
    \ `create()`、`createImageResource()` 或 `createThumbnail()` 方法的定义中。另一个需要检查的地方自然是你的\
    \ PHP 配置。该类依赖于 GD 扩展的启用。虽然 GD 被广泛支持，但并非默认总是开启。\n\n## 上传时自动调整图像大小\n\n既然你已经拥有了一个能从大图创建缩略图的类，那么将第\
    \ 9 章的 `Upload` 类改编为能从上传的图像生成缩略图就相对简单了——事实上，不仅能处理单张图像，还能处理多张图像。\n\n与其修改 `Upload`\
    \ 类中的代码，更高效的做法是扩展该类并创建一个子类。这样，你既可以选择使用原始类来执行任意类型文件的上传，也可以选择使用子类在上传时创建缩略图。子类还需要提供在创建缩略图后保存或丢弃原始大图的选项。\n\
    \n在深入代码之前，我们先快速了解一下如何创建一个子类。\n\n### 扩展类\n\n在 PHP 解决方案 8-8“自动构建嵌套列表”中，我们已经看到了一个扩展内置类\
    \ `RecursiveIteratorIterator` 的例子。扩展类的优点在于，新的**子类**（或**子类**）会继承其父类的所有特性，包括属性和方法，但可以修改（或**覆盖**）其中一些特性，并增加自己的新特性。这简化了创建执行更专门化任务的类的过程。\n\
    \n你在第 9 章创建的 `Upload` 类执行基本的文件上传。在本章中，你将扩展它，创建一个名为 `ThumbnailUpload` 的子类，该类使用父类的基本上传功能，但增加了创建缩略图的专门特性。该子类将创建在\
    \ `PhpSolutions/Image` 文件夹中，因此将使用 `PhpSolutions\\Image` 作为其命名空间。\n\n像所有子类一样，子类经常需要借用父类的功能。这在你在子类中覆盖某个方法但又需要同时使用原始版本时经常发生。要引用父类版本，可以在其前面加上\
    \ `parent` 关键字后跟两个冒号，如下所示：\n\n```\nparent::originalMethod();\n```\n\n你将在 PHP 解决方案\
    \ 10-5 中看到它的工作原理，因为子类定义了自己的构造函数以添加额外参数，但也需要使用父类的构造函数。\n\n让我们创建一个能够同时上传图像并生成缩略图的类。\n\
    \n### PHP 解决方案 10-5：创建 ThumbnailUpload 类\n\n本 PHP 解决方案扩展了第 9 章的 `Upload` 类，并配合本章的\
    \ `Thumbnail` 类使用，以实现上传和调整图像大小。它演示了如何创建子类并覆盖父类方法。要创建该子类，你需要第 9 章的 `Upload.php`\
    \ 和本章的 `Thumbnail.php`。这些文件的副本分别位于 `ch09/PhpSolutions/File` 和 `ch10/PhpSolutions/Image`\
    \ 文件夹中。\n\n1. 在 `PhpSolutions/Image` 文件夹中创建一个名为 `ThumbnailUpload.php` 的新文件。该文件仅包含\
    \ PHP 代码，因此请删除脚本编辑器插入的任何 HTML，并添加以下代码：\n\n```php\n<?php\nnamespace PhpSolutions\\\
    Image;\nuse PhpSolutions\\File\\Upload;\nrequire_once __DIR__ . '/../File/Upload.php';\n\
    require_once 'Thumbnail.php';\nclass ThumbnailUpload extends Upload {\n}\n```\n"
- fmt: "This declares the `PhpSolutions\\Image` namespace and imports the `Upload`\
    \ class from the `PhpSolutions\\File` namespace before including the definitions\
    \ of the `Upload` and `Thumbnail` classes.\n\n**Note**  \nWhen used in an include\
    \ file, `__DIR__` returns the directory of the included file without a trailing\
    \ slash. Adding the slash at the beginning of the relative path to `Upload.php`\
    \ allows PHP to build a complete path, moving back up one level to find it in\
    \ the `PhpSolutions/File` folder. `Thumbnail.php` is in the same folder as `ThumbnailUpload.php`,\
    \ so it’s included using only the filename. See “Nesting include files” in Chapter\
    \ [5](#332054_4_En_5_Chapter.xhtml).\n\nThe `ThumbnailUpload` class then declares\
    \ that it extends `Upload`. Although `Upload` is in a different namespace, you\
    \ can refer to it simply as `Upload` because it has been imported. All subsequent\
    \ code needs to be inserted between the curly braces of the class definition.\n\
    \n1.  The child class needs four properties: the folder where the thumbnail is\
    \ to be saved, a Boolean that determines whether to delete the original image,\
    \ the maximum size of the thumbnail, and the suffix to be added to the thumbnail.\
    \ The last two are required in case you don’t want to use the defaults defined\
    \ in `Thumbnail`. Add the following property definitions inside the curly braces:\n\
    \n    ```\n    protected $thumbDestination;\n    protected $deleteOriginal;\n\
    \    protected $maxSize = 120;\n    protected $suffix = '_thb';\n    ```\n\n2.\
    \  When you extend a class, the only time you need to define a constructor method\
    \ is when you want to change how the constructor works. The `ThumbnailUpload`\
    \ class takes an extra argument that determines whether to delete the original\
    \ image, giving you the option to retain only the thumbnail or to keep both versions\
    \ of the image. When testing locally, a `Thumbnail` object can access the original\
    \ image on your own hard drive. However, generating the thumbnail is a server-side\
    \ operation, so it won’t work on a web site without first uploading the original\
    \ image to the server.\n\n    The constructor also needs to call the parent constructor\
    \ to define the path to the upload folder. Add the following definition to the\
    \ class:\n\n    ```\n    public function __construct($path, $deleteOriginal =\
    \ false) {\n    parent::__construct($path);\n    $this->thumbDestination = $path;\n\
    \    $this->deleteOriginal = $deleteOriginal;\n    }\n    ```\n\n    The constructor\
    \ takes two arguments: the path to the upload folder and a Boolean variable that\
    \ determines whether to delete the original image. The second argument is set\
    \ to `false` in the constructor signature, making it optional.\n\n    **Note**\
    \  \n    When defining a function or a class method, the arguments (strictly speaking,\
    \ parameters) passed to the function (method) are known as its **signature**.\n\
    \n    The first line of code inside the constructor passes `$path` to the parent\
    \ constructor in order to set the destination folder for the file uploads. The\
    \ second line also assigns `$path` to the `$thumbDestination` property, making\
    \ the same folder the default for both images.\n\n    The final line assigns the\
    \ value of the second argument to the `$deleteOriginal` property. Because the\
    \ second argument is optional, it’s automatically set to `false`, and both images\
    \ are retained unless you set it explicitly to `true`.\n\n3.  Create the method\
    \ to set the options for the thumbnail like this:\n\n    ```\n    public function\
    \ setThumbOptions($path, $maxSize = null, $suffix = null) {\n    if (is_dir($path)\
    \ && is_writable($path)) {\n    $this->thumbDestination = rtrim($path, '/\\\\\
    ') . DIRECTORY_SEPARATOR;\n    } else {\n    throw new \\Exception(\"$path must\
    \ be a valid, writable directory.\");\n    }\n    if (!is_null($maxSize)) {\n\
    \    $this->maxSize = $maxSize;\n    }\n    if (!is_null($suffix)) {\n    $this->suffix\
    \ = $suffix;\n    }\n    }\n    ```\n\n    This takes a path as its only required\
    \ argument. The other two arguments, `$maxSize` and `$suffix`, are set to `null`,\
    \ so they’re optional. The method checks that the value passed as the first argument\
    \ is a folder (directory) and is writable, and assigns the value to the `$thumbDestination`\
    \ property. If the value passed as an argument is invalid, the class throws an\
    \ exception. `Exception` is preceded by a backslash to indicate you’re using the\
    \ core `Exception` class, not one specific to this namespace.\n\n    The other\
    \ two values are assigned to the `$maxSize` and `$suffix` properties if they’re\
    \ not `null`.\n\n    **Tip**  \n    Instead of creating a method to set the thumbnail\
    \ options, I could have added extra arguments to the constructor. However, my\
    \ choice simplifies the constructor for occasions when you want to save the thumbnail\
    \ and original image in the same folder. If you want to use the default settings\
    \ for a thumbnail, there’s no need to call the `setThumbOptions()` method. Also,\
    \ I could have silently used the original upload folder instead of throwing an\
    \ exception if there’s a problem with the thumbnail destination. I decided that\
    \ a problem with the destination folder is too serious to ignore. Decisions like\
    \ this are an integral part of writing any script, not just of designing a class.\n\
    \n4.  Next, create a protected method to generate the thumbnail using the following\
    \ code:\n\n    ```\n    protected function createThumbnail($image) {\n    $thumb\
    \ = new Thumbnail($image, $this->thumbDestination, $this->maxSize,\n    $this->suffix);\n\
    \    $thumb->create();\n    $messages = $thumb->getMessages();\n    $this->messages\
    \ = array_merge($this->messages, $messages);\n    }\n    ```\n\n    This takes\
    \ a single argument, the path to an image, and creates a `Thumbnail` object. The\
    \ code is similar to `create_thumb.php` so it shouldn’t need explanation. The\
    \ last three arguments passed to the `Thumbnail` constructor are stored as properties\
    \ of the `ThumbnailUpload` class, so they’re available even if `setThumbOptions()`\
    \ isn’t invoked.\n\n    The final line uses `array_merge()` to merge any messages\
    \ generated by the `Thumbnail` object with the `$messages` property of the `ThumbnailUpload`\
    \ class. Although the properties you defined in step 2 don’t include a `$messages`\
    \ property, the child class automatically inherits it from its parent.\n\n5. \
    \ In the parent class, the `moveFile()` method saves an uploaded file to its target\
    \ destination. The thumbnail needs to be generated from the original image, so\
    \ you need to override the parent’s `moveFile()` method and use it to call the\
    \ `createThumbnail()` method that you have just defined. Copy the `moveFile()`\
    \ method from `Upload.php` and amend it by adding the code highlighted in bold.\n\
    \n    ```\n    protected function moveFile($file) {\n    $filename = $this->newName\
    \ ?? $file['name'];\n    $success = move_uploaded_file($file['tmp_name'],\n  \
    \  $this->destination . $filename);\n    if ($success) {\n    // add a message\
    \ only if the original image is not deleted\n    if (!$this->deleteOriginal) {\n\
    \    $result = $file['name'] . ' was uploaded successfully';\n    if (!is_null($this->newName))\
    \ {\n    $result .= ', and was renamed ' . $this->newName;\n    }\n    $this->messages[]\
    \ = $result;\n    }\n    // create a thumbnail from the uploaded image\n    $this->createThumbnail($this->destination\
    \ . $filename);\n    // delete the uploaded image if required\n    if ($this->deleteOriginal)\
    \ {\n    unlink($this->destination . $filename);\n    }\n    } else {\n    $this->messages[]\
    \ = 'Could not upload ' . $file['name'];\n    }\n    }\n    ```"
