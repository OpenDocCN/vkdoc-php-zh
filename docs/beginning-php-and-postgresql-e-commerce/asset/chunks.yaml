    ## Exercise: Creating the Database Functions


    1. Load `pgAdmin III`, and connect to the `hatshop` database.


    2. Click `Tools` ➤ `Query tool` (or click the `SQL` button on the toolbar). A
    new query window should appear.


    3. Use the query tool to execute this code, which creates the `customer_login`
    type and `customer_get_login_info` function in your `hatshop` database:


    ```sql

    -- Create customer_login_info type


    CREATE TYPE customer_login_info AS

    (

    customer_id INTEGER,

    password VARCHAR(50)

    );


    -- Create customer_get_login_info function


    CREATE FUNCTION customer_get_login_info(VARCHAR(100))

    RETURNS customer_login_info LANGUAGE plpgsql AS $$

    DECLARE

    inEmail ALIAS FOR $1;

    outCustomerLoginInfoRow customer_login_info;

    BEGIN

    SELECT INTO outCustomerLoginInfoRow

    customer_id, password

    FROM customer

    WHERE email = inEmail;

    RETURN outCustomerLoginInfoRow;

    END;

    $$;

    ```


    When a user logs in to the site, you must check his or her password. The `customer_get_login_info`
    function returns the customer ID and the hashed password for a user with a specific
    email.


    4. Use the query tool to execute this code, which creates the `customer_add` function
    in your `hatshop` database:


    ```sql

    -- Create customer_add function


    CREATE FUNCTION customer_add(

    VARCHAR(50), VARCHAR(100), VARCHAR(50))

    RETURNS INTEGER LANGUAGE plpgsql AS $$

    DECLARE

    inName ALIAS FOR $1;

    inEmail ALIAS FOR $2;

    inPassword ALIAS FOR $3;

    outCustomerId INTEGER;

    BEGIN

    INSERT INTO customer (name, email, password)

    VALUES (inName, inEmail, inPassword);

    SELECT INTO outCustomerId

    currval(''customer_customer_id_seq'');

    ```


