    This function gets called when the customer decides to buy the products in the
    shopping cart and clicks the Place Order button.


    The role of shopping_cart_create_order is to create a new order based on the products
    in the customer’s shopping cart. This implies adding a new record to the orders
    table and a number of records (one record for each product) in the order_detail
    table.


    **How It Works: Implementing Functions**


    The first step in shopping_cart_create_order involves creating the new record
    in the orders table. You need to do this at the beginning to find out what order_id
    was generated for the new order. Remember that the order_id field is an INTEGER
    column that has a sequence associated (orders_order_id_seq) and is automatically
    generated by the database, so you need to retrieve its value after inserting a
    record into orders:


    -- Insert a new record into orders


    INSERT INTO orders (created_on) VALUES (NOW());


    -- Obtain the new Order ID


    SELECT INTO outOrderId


    currval(''orders_order_id_seq'');


    This is the basic mechanism of extracting the newly generated ID. After the INSERT
    statement, you save the value returned by currval to a variable. You must do this
    immediately after inserting the new row because the value returned by currval
    is incremented after the next successful insert operation. currval returns the
    current value of the sequence that is equivalent with the last inserted order_id.


