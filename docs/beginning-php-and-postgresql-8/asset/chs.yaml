  \ ldap_connect($ldapHost, $ldapPort)\n\n    or die(\"Can't establish LDAP connection\"\
  );\n\nldap_bind($ldapconn, $ldapUser, $ldapPswd)\n\n    or die(\"Can't bind to the\
  \ server.\");\n\n?>\n```\n\n请注意，提供给`ldap_bind()`的凭据是在 LDAP 服务器中创建和管理的，与您连接时所使用的服务器或工作站上的任何帐户无关。因此，如果您无法匿名连接到\
  \ LDAP 服务器，则需要与系统管理员沟通，以安排一个合适的帐户。\n\n#### 关闭 LDAP 服务器连接\n\n完成与 LDAP 服务器的所有交互后，应进行清理并正确关闭连接。有一个函数`ldap_unbind()`可用于此目的。\n\
