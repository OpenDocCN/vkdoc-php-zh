    \ with a `DomainObject`. In systems where one might operate on many objects at\
    \ once in an update, I could use an identity object to define the set on which\
    \ I would like to act. This would form the basis of the `$cond` array, which here\
    \ only holds `id` data.\n\n`newUpdate()` distills the data required to generate\
    \ a query. This is the process by which object data is transformed to database\
    \ information.\n\nNotice that the `newUpdate()` method will accept any `DomainObject`.\
    \ This is so that all `UpdateFactory` classes can share an interface. It would\
    \ be a good idea to add some further type checking to ensure the wrong object\
    \ is not passed in.\n\nHere’s some quick code to try out the `VenueUpdateFactory`\
    \ class:\n\n```\n// listing 13.43\n$vuf = new VenueUpdateFactory();\nprint_r($vuf->newUpdate(new\
