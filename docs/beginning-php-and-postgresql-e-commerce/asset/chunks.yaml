    C H A P T E R 6 ■ R E C E I V I N G PAY M E N T S U S I N G PAY PA L


    **197**


    **How It Works: PayPal Integration**


    Yes, it was just that simple. Now, all visitors are potential customers! They
    can click the Checkout button of the PayPal shopping cart and then buy the products!


    For building the PayPal call, we use Smarty’s escaping functionality to ensure
    the product’s name is correctly formed in case it contains nonportable characters
    (such as &, spaces, and so on). See more details about the escape method at http://smarty.php.net/manual/en/language.modifier.escape.php.


    After a customer makes a payment on the web site, an email notification is sent
    to the email address registered on PayPal and also to the customer. Your PayPal
    account will reflect the payment, and you can view the transaction information
    in your account history or as a part of the history transaction log.


    After PayPal confirms the payment, you can ship the products to your customer.


    If you decide to use PayPal for your own web site, make sure you learn about all
    of its features. For example, you can teach PayPal to automatically calculate
    shipping costs and tax for each order.


    **Using the PayPal Single Item Purchases Feature**


    Single Item Purchases is a PayPal feature that allows you to send the visitor
    directly to a payment page instead of the PayPal shopping cart. The PayPal shopping
    cart will become useless in Chapter 8, where you’ll create your own shopping cart.


    In Chapter 9, you’ll implement the Place Order button in the shopping cart, which
    saves the order into the database and forwards to a PayPal payment page. To call
    the PayPal payment page (bypassing the PayPal shopping cart), you redirect to
    a link like the following: https://www.paypal.com/xclick/business=youremail@example.com&item_name=Order
    123


    &item_number=123&amount=123&currency=USD&return=www.example.com


    &cancel_return=www.example.com


    Review the PayPal Website Payments Standard Integration Guide for more details
    about the service.'
