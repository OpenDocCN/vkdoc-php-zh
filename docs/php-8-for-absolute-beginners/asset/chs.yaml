  \n### POST 方法\n\n第一个表单使用了 `GET` 方法，但这并非唯一的 HTTP 方法。还有另一种称为 `POST` 的方法。`POST` 方法没有定义最大字符数——实际上，`POST`\
  \ 方法甚至不限于文本。当使用 HTTP `POST` 方法时，甚至可以通过表单上传文件。HTTP `POST` 变量在 URL 中不可见。它们被隐藏发送。这使得\
  \ HTTP `POST` 成为处理大量内容以及包含敏感信息的表单的理想选择。\n\n### 安全编程\n\n不要将隐藏敏感信息与数据是安全的概念混淆。`POST`\
  \ 确实隐藏了信息。但是，它并不对信息进行加密。黑客仍然可以获取传递的信息。然而，`POST` 确实消除了用户为包含 URL 变量的页面添加书签的能力。使用 `POST`\
  \ 方法时，变量不再包含在 URL 字符串中。\n\n#### 使用 `$_POST` 超全局变量\n\n让我们使用名为 `$_POST` 的超全局变量在表单提交时处理它。让我们更新测验程序以显示我们的响应。\n\
  \n```\nYou clicked $answer\";\n$response .= \"\nTry quiz again?\n\";\nreturn $response;\n\
  }\n?>\n```\n\n**代码清单 3-14** newquiz.php\n\n```\n$quizIsSubmitted = isset( $_POST['quiz-submitted']\
