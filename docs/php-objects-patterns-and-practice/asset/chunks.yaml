- fmt: '## Managing the Component Data


    You have seen that the compiled `ComponentDescriptor` objects are stored in a
    `Conf` object—essentially a getter and setter for an associative array. The keys
    here are the paths the system recognizes: `/`, for example, or `/addvenue`.


    So let’s take a look at `ComponentDescriptor`, which manages command, view, and
    forward information:


    ```

    // listing 12.22

    class ComponentDescriptor

    {

    private $path;

    private static $refcmd;

    private $cmdstr;

    public function __construct(string $path, string $cmdstr)

    {

    self::$refcmd = new \ReflectionClass(Command::class);

    $this->path = $path;

    $this->cmdstr = $cmdstr;

    }

    public function getCommand(): Command

    {

    return $this->resolveCommand($this->cmdstr);

    }

    public function setView(int $status, ViewComponent $view)

    {

    $this->views[$status] = $view;

    }

    public function getView(Request $request): ViewComponent

    {

    $status = $request->getCmdStatus();

    $status = (is_null($status)) ? 0 : $status;

    if (isset($this->views[$status])) {

    return $this->views[$status];

    }

    if (isset($this->views[0])) {

    return $this->views[0];

    }

    throw new AppException("no view found");

    }

    public function resolveCommand(string $class): Command

    {

    if (is_null($class)) {

    throw new AppException("unknown class ''$class''");

    }

    if (! class_exists($class)) {

    throw new AppException("class ''$class'' not found");

    }

    $refclass = new \ReflectionClass($class);

    if (! $refclass->isSubClassOf(self::$refcmd)) {

    throw new AppException("command ''$class'' is not a Command");

    }

    return $refclass->newInstance();

    }

    }

    ```


    So you can see the storage and retrieval here, but there’s a little more work
    going on, too. Command information (the full class name for the `Command`) is
    added via the constructor, and only lazily converted into a `Command` object when
    `getCommand()` is called. This instantiation and checking takes place in a private
    method: `resolveCommand()`. The code here should look familiar—it’s actually stolen
    from (ahem … inspired by) the equivalent functionality in `CommandResolver` from
    earlier in the chapter.


    Acquiring views is easier. Remember, each view component will have been stored
    via the `setView()` method. Behind the scenes, we now see that the `ViewComponent`
    objects are managed in an array property, `$views,` and indexed by an integer,
    a `Command` status value. When the `getView()` method is called by client code,
    we are passed a `Request` object in which the `Command` status may have been cached.
    We get at this value via a new convenience method, `Request::getCmdStatus()`.
    Armed with this, it’s simply a matter of checking the `$views` array for a corresponding
    `ViewComponent` element. If there is no match, we return the default, which is
    indexed by zero.


    In this way, this little class provides all of the logic implied by a `command`
    element in the XML file.


    Because most of the real work is done by helper classes, the application controller
    itself is relatively thin. Let’s take a look:


    ```

    // listing 12.23

    class AppController

    {

    private static $defaultcmd = DefaultCommand::class;

    private static $defaultview = "fallback";

    public function getCommand(Request $request): Command

    {

    try {

    $descriptor = $this->getDescriptor($request);

    $cmd = $descriptor->getCommand();

    } catch (AppException $e) {

    $request->addFeedback($e->getMessage());

    return new self::$defaultcmd();

    }

    return $cmd;

    }

    public function getView(Request $request): ViewComponent

    {

    try {

    $descriptor = $this->getDescriptor($request);

    $view = $descriptor->getView($request);

    } catch (AppException $e) {

    return new TemplateViewComponent(self::$defaultview);

    }

    return $view;

    }

    private function getDescriptor(Request $request): ComponentDescriptor

    {

    $reg = Registry::instance();

    $commands = $reg->getCommands();

    $path = $request->getPath();

    $descriptor = $commands->get($path);

    if (is_null($descriptor)) {

    throw new AppException("no descriptor for {$path}", 404);

    }

    return $descriptor;

    }

    }

    ```


    There is little actual logic in this class since most of the complexity has been
    pushed down to various helper classes. Both `getCommand()` and `getView()` call
    a private method, `getDescriptor()`, to acquire a `ComponentDescriptor` for the
    current request. The `getDescriptor()` method gets the current path from the `Request`
    object and uses it to extract a `ComponentDescriptor` object from a `Conf` object
    which is also stored by the registry and returned by `getCommands()`. Remember
    that this array of `ComponentDescriptor` objects was previously populated by the
    `ViewComponentCompiler` object with potential paths as keys.


    Once `getCommand()` and `getView()` have a `ComponentDescriptor` object, each
    can call its corresponding method. In `getCommand()`, we call `ComponentDescriptor::getCommand()`;
    in `getView()`, we call `ComponentDescriptor::getView()`.


    Before we move on, there are a few details to wrap up. Now that `Command` objects
    no longer invoke views, we need a mechanism for rendering templates. This is handled
    by `TemplateViewComponent` objects. These implement an interface, `ViewComponent`:


    ```

    // listing 12.24

    interface ViewComponent

    {

    public function render(Request $request);

    }

    ```


    Why the interface? We treat both forwarding and template display as view processes.
    Here is `TemplateViewDisplay`:


    ```

    // listing 12.25

    class TemplateViewComponent implements ViewComponent

    {

    private $name = null;

    public function __construct(string $name)

    {

    $this->name = $name;

    }

    public function render(Request $request)

    {

    $reg = Registry::instance();

    $conf = $reg->getConf();

    $path = $conf->get("templatepath");

    if (is_null($path)) {

    throw new AppException("no template directory");

    }

    $fullpath = "{$path}/{$this->name}.php";

    if (! file_exists($fullpath)) {

    throw new AppException("no template at {$fullpath}");

    }

    include($fullpath);

    }

    }

    ```


    This class is instantiated with a name—which it then uses at `render()` time,
    combined with a path-configuration value, to include a template.


    Here is `ForwardViewComponent`:


    ```

    // listing 12.26

    class ForwardViewComponent implements ViewComponent

    {

    private $path = null;

    public function __construct($path)

    {

    $this->path = $path;

    }

    public function render(Request $request)

    {

    $request->forward($this->path);

    }

    }

    ```


    This class simply calls `forward()` on the provided `Request` object. The implementation
    of `forward()` varies depending upon the `Request` subtype. For `HttpRequest`,
    it is a matter of setting the Location header:


    ```

    // listing 12.27

    // HttpRequest

    public function forward(string $path)

    {

    header("Location: {$path}");

    exit;

    }

    ```


    For `CliRequest` we can’t rely on the server to handle forwarding, so we have
    to take a different approach:


    ```

    // listing 12.28

    // CliRequest

    public function forward(string $path)

    {

    // tack the new path onto the end the argument list

    // last argument wins

    $_SERVER[''argv''][] = "path:{$path}";

    Registry::reset();

    Controller::run();

    }

    ```


    We take advantage of the fact that, when the argument array is parsed for a path,
    the final match found is ultimately set on the `Request`. All we need do is add
    a path argument, clear the Registry, and run the controller from the top.


    And that leads us full circle, an excellent moment for an overview!


    The strategies an application controller might use to acquire views and commands
    can vary considerably; the key is that these are hidden away from the wider system.
    Figure 12-7 shows the high-level process by which a Front Controller class uses
    an application controller to acquire first a `Command` object and then a view.


    ![A314621_5_En_12_Fig7_HTML.gif](A314621_5_En_12_Fig7_HTML.gif)


    **Figure 12-7.** Using an application controller to acquire commands and views


    Note that the view that is rendered in Figure 12-7 could be one of `ForwardViewComponent`
    (which will start the process over again with a new path) or `TemplateViewComponent`
    (which will include a template file).'
