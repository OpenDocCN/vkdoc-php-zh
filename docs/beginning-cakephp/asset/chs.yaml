  \ 其他 Zend 组件\n\nZend 框架中还包含许多其他强大的组件。除了某些使 Zend 能在 MVC 环境中工作的组件之外，你应该能够将各种组件引入 Cake\
  \ 应用程序。在本练习中，请尝试使用一些 Cake 中尚未提供的独特组件（如 Lucene、Translate 或 Validate），将它们作为供应商引入 Cake\
  \ 应用程序。请记得修复 Zend 的包含路径以使其正常工作，并彻底测试这些组件，因为它们属于第三方元素。\n\n### 总结\n\n当必须在 Cake 应用程序中使用第三方脚本时，最好使用\
  \ `App::import()` 方法将它们作为供应商引入。一旦脚本可用，就可以在应用程序中直接调用其函数和对象。当然，由于供应商在 Cake 中以单向方式工作，如何进一步实现供应商将取决于供应商自身的方法。在本章中，我们讨论了使用\
  \ Zend 框架中的组件来执行 Akismet 垃圾邮件检查以及 PDF 文件渲染。其他 Web 服务组件也可使用类似方法在 Cake 中使用。在第 13 章中，我们将探讨插件——这些资源允许你创建一种可以在多个\
  \ Cake 应用程序中分发的小型应用程序。\n\n# 插件\n\n在某些情况下，开发人员可能希望在多个其他应用程序中使用同一个 Cake 应用程序。有时，另一个\
  \ Cake 应用程序可能对你的项目很有用，但由于其独立的结构（控制器、模型等可能与当前项目的命名空间冲突），可能难以集成。插件是作为主 Cake 应用程序内部的小型应用程序运行的元素。它们包含自己的模型、视图和控制器，并且使得在其他应用程序中重用整个应用程序成为可能。\n\
  \nCake 没有内置的插件。因此，只有第三方应用程序可以在现有的 Cake 应用程序中使用。当然，你可以构建自己的插件以满足需求，但请注意，插件可以在多个在线位置找到。The\
  \ Bakery ([`bakery.cakephp.org`](http://bakery.cakephp.org)) 和 CakeForge ([www.cakeforge.org](http://www.cakeforge.org))\
  \ 托管着插件以及其他的 Cake 应用程序、组件、助手等。The Bakery 还托管着解释开发人员如何编写其插件的文章——这对于学习高级 CakePHP 方法会很有帮助。\n\
  \n第三方插件可以节省时间。因为它们遵循 MVC 结构，所以它们能比单独的组件或助手完成更多工作。一个插件可能包含自己的模型，因此能以组件或助手无法做到的方式与数据库交互。通常情况下，在应用程序中运行一个复杂方法就像将插件放入\
  \ `app/plugins` 目录并在应用程序中调整一些设置使其运行一样简单。\n\n### 安装第三方插件\n\n由于插件设计上的特点，安装起来相当简单。简而言之，它们是自包含的文件夹，可以放入\
  \ `app/plugins` 目录，并在模型、视图或控制器中引用。它们的编写应使其几乎不需要配置。\n\n有时，插件可能需要设置一个数据库表才能正常工作，或者可能需要你在核心配置中指定一些全局变量或设置。无论哪种情况，插件通常都会附带其自己的安装说明，这些说明应该相当容易遵循。我将展示如何在你的博客应用程序中安装一个由\
  \ Pseudocoder 编写的 Ajax 聊天室插件，以演示具体操作。\n\n首先，你必须获取插件代码。Pseudocoder 的 Ajax Chat 插件可在以下网址获取：\n\
  [`sandbox2.pseudocoder.com/demo/chat`](http://sandbox2.pseudocoder.com/demo/chat)。你最终会得到一个压缩文件，其中包含一个文件夹，内部有一些模型、视图和控制器文件。\n\
  \n你应该注意到，此插件要求应用程序中运行 Prototype JavaScript 库。我已经完成了在默认布局中安装 Prototype，因此你无需为了此插件运行而更改布局中的任何内容。不过，你仍可能需要仔细检查\
  \ Prototype 是否在应用程序中正确运行。打开 `app/views/layouts/default.ctp` 文件，查找 Prototype 的引入行：\n\
  \n```\n<?=$javascript->link('prototype.js');?>\n```\n\n同时确保 `prototype.js` 文件位于\
  \ `app/webroot/js` 文件夹中。有了这两个设置，Ajax Chat 插件就准备就绪，可以安装了。\n\n将下载文件的内容放入 `app/plugins`\
  \ 文件夹。Ajax Chat 插件还使用其自己的数据库表，因此你将需要运行 SQL 查询来生成相应的表和字段。Pseudocoder 在其网页上提供了此 SQL，你在下载插件时可能已经注意到了。为了节省你的时间，清单\
  \ 13-1 包含了构建该表所需的 SQL。在应用程序中运行插件之前，请确保在 MySQL 中创建了 `chats` 表；否则，将会出现错误。\n\n**清单\
  \ 13-1.** Ajax Chat 插件将使用的 `chats` 表\n```sql\nCREATE TABLE `chats` (\n  `id` int(10)\
  \ unsigned NOT NULL auto_increment,\n  `key` varchar(45) NOT NULL default '',\n\
  \  `handle` varchar(20) NOT NULL default '',\n  `text` text NOT NULL,\n  `ip_address`\
  \ varchar(12) NOT NULL default '',\n  `created` datetime NOT NULL default '0000-00-00\
  \ 00:00:00',\n  PRIMARY KEY (`id`),\n  KEY `KEY_IDX` (`key`)\n);\n```\n\n该插件现已安装完毕，可供你的\
  \ Cake 应用程序使用。要使用它，根据插件的方法，你将需要在控制器或模型中调用其操作等。\n\n\n\n这个特定的插件通过在视图中调用其辅助函数来运行。由于插件不仅需要辅助函数才能工作，还包含了必要的控制器和模型，但由于插件设计方式，你甚至不会注意到这些。\n\
  \n让我们在你的应用程序中构建一个聊天动作。在 `Posts` 控制器中，创建 `chat()` 动作，并使其视图正常工作（`app/views/posts/chat.ctp`）。访问此动作时，视图应显示一个空白页面，可能顶部带有一个标题，因此动作本身无需更多内容。\n\
  \n`Ajax Chat` 插件需要自己的辅助函数，该辅助函数必须像其他任何辅助函数一样对控制器可用，因此请将其与 `Ajax` 辅助函数一起包含在 `helpers`\
  \ 数组中：`var $helpers = array('Ajax','chat/AjaxChat');`\n\n最后一步是在视图中用一个简单的命令调用 `Ajax\
  \ Chat` 辅助函数：`$ajaxChat->generate('chatroom');`\n\n现在，当你在 `Posts` 控制器中启动 `Chat`\
  \ 动作时，`Ajax Chat` 插件应自动在页面上启动一个 Ajax 聊天室。毫不夸张地说，仅凭几行代码和一个 SQL 查询，你就能在自己的博客中启动一个迷你应用。\n\
  \n### 创建自定义插件\n\n无论你是将 Cake 插件作为项目的附加组件使用，还是希望通过分发自己的迷你应用为 Cake 社区做贡献，你都需要在此基础上对插件进行自定义。要开始编写自定义插件，请创建一个以插件全小写名称命名的文件夹。所有控制器、模型和视图都将存储在此文件夹内。所有插件都需要两个额外的文件：`{plugin}_app_controller.php`\
  \ 和 `{plugin}_app_model.php` 文件，其中 `{plugin}` 是插件的全小写名称。这些文件将包含允许 Cake 使用插件其余资源的类名和扩展名，因此正确命名这些文件对于插件正常运行至关重要。\n\
  \n基础插件将包含一个 `App` 控制器；一个 `App` 模型；以及用于控制器、模型和视图的文件夹。其组织结构模仿了 Cake 应用程序的整体结构，因此任何插件辅助函数都将存储在插件的\
  \ `views/helpers` 目录中，依此类推（请参见代码清单 13-2）。务必将 `{plugin}` 替换为插件名称。\n\n**代码清单 13-2.**\
  \ *基础插件文件结构*\n\n```\n{plugin root}/\n{plugin}_app_controller.php\n{plugin}_app_model.php\n\
  controllers/\n{controller name}_controller.php\nmodels/\nviews/\n```\n\n#### 插件元素的命名约定\n\
  \n代码清单 13-2 展示了插件根目录内的基础文件结构。插件元素的命名约定与其他 Cake 资源的标准命名约定略有不同。表 13-1 说明了如何命名插件元素。\n\
  \n**表 13-1.** *插件元素的命名约定*\n\n| **类型** | **文件名** | **类** | **继承自** | **示例** |\n|\
  \ --- | --- | --- | --- | --- |\n| App 控制器 | `{plugin}_app_controller.php` | `PluginAppController`\
  \ | `AppController` | `CalendarAppController` 继承自 `AppController` |\n| App 模型 |\
  \ `{plugin}_app_model.php` | `PluginAppModel` | `AppModel` | `CalendarAppModel`\
  \ 继承自 `AppModel` |\n| 控制器 | 同应用程序标准 | 同应用程序标准 | `PluginAppController` | `EventsController`\
  \ 继承自 `CalendarAppController` |\n| 模型 | 同应用程序标准 | 同应用程序标准 | `PluginAppModel` | `Event`\
  \ 继承自 `CalendarAppModel` |\n| 辅助函数 | 同应用程序标准 | 同应用程序标准 | `Helper` | `CalendarHelper`\
  \ 继承自 `Helper` |\n| 组件 | 同应用程序标准 | 同应用程序标准 | `Object` | `CalendarComponent` 继承自\
  \ `Object` |\n| 行为 | 同应用程序标准 | 同应用程序标准 | `ModelBehavior` | `MonthBehavior` 继承自 `ModelBehavior`\
  \ |\n| 数据源 | 同应用程序标准 | 同应用程序标准 | `DataSource` | `CalSource` 继承自 `DataSource` |\n\
  \n\n\n### 插件命名约定与用法\n\n插件中的独立视图文件无需更改命名约定。换言之，它们的命名方式与标准 Cake 视图文件相同。例如，Events 视图将存储在\
  \ `app/plugins/calendar/views/events` 文件夹中。插件中的独立视图随后根据操作命名：如 `index.ctp` 等。\n\n\
  插件中不仅部分文件名需要进行调整才能正常工作，文件中的类名也需要调整。为避免插件与周围的 Cake 应用文件名和类名冲突，必须对命名约定和语法进行适当调整。\n\
  \n例如，类名不再命名为 `AppController`，而是需要在前面加上插件名称。名为 Calendar 的插件，其类名应按照插件名称命名。举例来说，App\
  \ 控制器将命名为 `CalendarAppController`，App 模型将命名为 `CalendarAppModel`。插件使用的其他元素，其类名应根据元素类型进行相应调整。\n\
  \n控制器和模型分别继承插件的 App 控制器和 App 模型（参见清单 13-3）。因此，在实例化插件类时，类名必须体现这种继承关系。\n\n**清单 13-3.**\
  \ *插件控制器继承 App 控制器示例*\n\n```\n<?\nclass EventsController extends CalendarAppController\
  \ {\n    var $name = 'Events';\n    var $uses = array('Event');\n}\n?>\n```\n\n\
  请注意，清单 13-3 的第 4 行显示插件控制器使用 `$uses` 类属性来指定对应的模型。虽然 Cake 应该能自动选择相应的模型和视图，但持续设置 `$uses`\
  \ 数组将使插件更具可移植性，并降低插件控制器与周围应用命名空间冲突的风险。\n\n与插件控制器类似，插件模型继承 App 模型，并且其命名语法已调整以适配插件（参见清单\
  \ 13-4）。\n\n**清单 13-4.** *插件模型继承 App 模型示例*\n\n```\n<?\nclass EventModel extends\
  \ CalendarAppModel {\n    var $name = 'Event';\n}\n?>\n```\n\n辅助器、组件、行为和数据源也可以作为插件的一部分使用。它们的命名约定通常保持不变，与作为\
  \ Cake 应用元素而非插件元素时相同。有关如何命名其他插件类以及它们继承哪些对象的信息，请参考表 13-1。\n\n### 运行插件操作\n\n插件安装到\
  \ Cake 应用后，可以通过在 URL 中添加插件名称以及操作和参数来访问其操作。清单 13-3 中使用的 Events 控制器可通过以下 URL 在博客应用中调用：\n\
  \n`http://localhost/blog/calendar/events`\n\n当然，操作和参数也可以跟随其后：\n\n`http://localhost/blog/calendar/events/view/01/2009`\n\
  \n周围的 Cake 应用中的控制器可以使用 `requestAction()` 函数来运行插件的控制器操作：\n\n```php\n$events = $this->requestAction(array('controller'=>'CalendarEvents','action'=>'getEvents'));\n\
  ```\n\n### 使用插件布局\n\n默认情况下，插件将使用周围应用中 `app/views/layouts` 目录下的默认布局。指定存储在插件中的布局很简单：只需在操作或控制器中使用\
  \ `$layout` 类变量即可。确保在布局设置中添加插件名称。清单 13-5 给出了如何执行此操作的示例。\n\n**清单 13-5.** *在插件控制器中使用插件布局*\n\
  \n```\n<?\nclass EventsController extends CalendarAppController {\n    var $name\
  \ = 'Events';\n    var $layout = 'Calendar.default';\n}\n?>\n```\n\n\n\n现在我已经介绍了插件及其创建方法，让我们为博客应用程序构建一个插件。这个日历插件将非常简单：博客作者会在数据库中存储不同的事件，用户则能够访问一个显示月份并包含每个事件链接的页面。为了使这个插件具有可移植性，我将从通用角度来编写它。换句话说，我在编写插件时不会特意考虑博客应用，尽管最终该插件会被部署在博客中。\n\
  \n### 设置文件和文件夹\n\n请记住，日历插件需要`controllers`、`models`和`views`文件夹，以及`App`控制器和`App`模型才能正常运行。在这些文件中，需要调整语法，使其作为插件而非\
  \ Cake 应用程序元素来工作。\n\n创建插件根文件夹，并根据插件名称将其命名为`calendar`。在此文件夹中，创建所有基本文件和文件夹：\n\n```\n\
  calendar/\ncalendar_app_controller.php\ncalendar_app_model.php\ncontrollers/\nevents_controller.php\n\
  models/\ncalendar_event.php\nviews/\nevents/\n```\n\n在`calendar_app_controller.php`文件中，务必包含正确的类名：\n\
  \n```php\n<?\nclass CalendarAppController extends AppController {\n\n}\n?>\n```\n\
  \nApp 模型也需要正确命名：\n\n```php\n<?\nclass CalendarAppModel extends AppModel {\n\n}\n\
  ?>\n```\n\n如果没有 App 控制器和 App 模型，Cake 将无法连接到插件的控制器、模型和视图。通过在插件的 App 控制器和 App 模型文件中命名类，我确保了\
  \ Cake 知道如何使用该插件，以及插件各个元素将被如何调用。\n\n插件的其余部分将像编写基本 Cake 应用程序一样进行。当然，您必须记住根据插件语法来命名自定义的控制器、模型和视图。\n\
  \n09775ch13final 7/1/08 9:58 PM Page 225\n\n第 13 章 ■ 插件\n\n**225**\n\n### 创建事件表\n\
  \n日历插件需要存储数据，因此让我们在数据库中构建一个`events`表。\n\n清单 13-6 包含创建该表所需的 SQL 语句。\n\n**清单 13-6.**\
  \ *日历插件的* `events` *表*\n\n```sql\nCREATE TABLE `calendar_events` (\n`id` int(11)\
  \ unsigned NOT NULL auto_increment,\n`name` varchar(255) NULL,\n`date` datetime\
  \ NULL,\n`details` text NULL,\nPRIMARY KEY (`id`)\n);\n```\n\n请注意，该表仅存储事件的日期时间以及一些详细信息。`name`字段将包含用户点击以查看事件更多详细信息的文本。为了防止记录重复，该表包含一个设置为`auto_increment`的\
  \ ID 字段。\n\n接下来，通过创建插件模型将该表与插件连接起来。\n\n### 创建事件模型\n\n`calendar_events`表需要一个模型来进行连接。由于表名包含下划线，模型名需要使用驼峰式命名。创建一个名为`calendar_event.php`的文件，并将其保存在`app/plugins/calendar/models`目录中。然后将清单\
  \ 13-7 的内容粘贴到该文件中。\n\n**清单 13-7.** *`CalendarEvent`* *模型*\n\n```php\n<?\nclass CalendarEvent\
  \ extends CalendarAppModel {\nvar $name = 'CalendarEvent';\nvar $uses = array('CalendarEvents');\n\
  }\n?>\n```\n\n请注意，第 2 行中此模型扩展了插件的 App 模型，*而非*外部应用程序的 App 模型。第 3 行为模型分配了名称，第 4 行将`$uses`数组设置为`CalendarEvents`，这确保了模型能够正确连接到`calendar_events`表。最后，创建将运行该插件的控制器。\n\
  \n### 创建事件控制器\n\n`Events`控制器将包含日历插件的所有操作，因为插件本身相当基础。要使此控制器在插件内部工作，您必须扩展日历 App 控制器，并提供执行插件逻辑的操作。清单\
  \ 13-8 包含了`Events`控制器的初始内容。请将这些代码写入一个名为`app/plugins/calendar/controllers/events_controller.php`的新文件中。\n\
  \n\n\n# 第 13 章 插件\n\n**226**\n\n### 清单 13-8. 日历事件控制器的初始内容\n\n```\n<?\nclass EventsController\
  \ extends CalendarAppController {\n\n    var $name = 'Events';\n\n    var $uses\
  \ = array('CalendarEvent');\n\n}\n?>\n```\n\n要启动这个新插件控制器，请输入以下 URL：\n\n[`localhost/blog/calendar/events`](http://localhost/blog/calendar/events)\n\
  \n你应该会看到一个错误页面，要求你在控制器中创建一些操作。此时，你应该考虑一下插件应该如何工作。默认操作`Index`将向用户显示当前月份的事件日历。`Add`操作将允许网站管理员将事件写入数据库，而`Edit`操作将提供对之前保存的事件的访问。`View`操作将包含月份和年份，而不是\
  \ ID 号，因此此操作需要通过模型运行一些更复杂的查找查询。每个操作都需要用于显示结果的视图。\n\n### 构建添加和编辑操作\n\n首先从`Events`控制器开始，让我们构建允许向数据库添加和编辑事件的操作。这些操作将遵循`Bake`脚本使用的标准方法。清单\
  \ 13-9 展示了为使这些操作正常工作，需要在`Events`控制器中添加的内容。\n\n**清单 13-9.** *Events 控制器中的添加和编辑操作*\n\
  \n```\nfunction add() {\n    if (!empty($this->data)) {\n        $this->CalendarEvent->create();\n\
  \        if ($this->CalendarEvent->save($this->data)) {\n            $this->Session->setFlash(__('The\
  \ Calendar Event has been saved'\n                , true));\n            $this->redirect(array('action'=>'index'));\n\
  \        } else {\n            $this->Session->setFlash(__('The Calendar Event could\
  \ not be '\n                'saved. Please, try again.', true));\n        }\n  \
  \  }\n}\n\nfunction edit($id=null) {\n    if (!$id && empty($this->data)) {\n  \
  \      $this->Session->setFlash(__('Invalid Calendar Event', true));\n        $this->redirect(array('action'=>'index'));\n\
  \    }\n\n    if (!empty($this->data)) {\n        if ($this->CalendarEvent->save($this->data))\
  \ {\n            $this->Session->setFlash(__('The Calendar Event has been saved'\n\
  \                , true));\n            $this->redirect(array('action'=>'index'));\n\
  \        } else {\n            $this->Session->setFlash(__('The Calendar Event could\
  \ not be'\n                'saved. Please, try again.', true));\n        }\n   \
  \ }\n\n    if (empty($this->data)) {\n        $this->data = $this->CalendarEvent->read(null,\
  \ $id);\n    }\n}\n```\n\n当然，这些操作需要相应的视图才能正常运行。这些视图也将遵循`Bake`使用的标准方法。清单 13-10 展示了`Add`操作的代码，清单\
  \ 13-11 提供了`Edit`操作的代码。将这些视图保存到`app/plugins/calendar/views/events`目录中，分别命名为`add.ctp`和`edit.ctp`。\n\
  \n**清单 13-10.** *app/plugins/calendar/views/events/add.ctp 的内容*\n\n```\n<div class=\"\
  calendar_events form\">\n    <?=$form->create('CalendarEvent',array('url'=>'/calendar/events/add'));?>\n\
  \    <fieldset>\n        <legend>添加日历事件</legend>\n        <?=$form->input('name');?>\n\
  \        <?=$form->input('date');?>\n        <?=$form->input('details');?>\n   \
  \ </fieldset>\n    <?=$form->end('提交');?>\n</div>\n```\n\n**清单 13-11.** *app/plugins/calendar/views/events/edit.ctp\
  \ 的内容*\n\n```\n<div class=\"calendar_events form\">\n    <?=$form->create('CalendarEvent',array('url'=>'/calendar/events/edit'));?>\n\
  \    <fieldset>\n        <legend>编辑日历事件</legend>\n        <?=$form->input('id',array('type'=>'hidden'));?>\n\
  \        <?=$form->input('name');?>\n        <?=$form->input('date');?>\n      \
  \  <?=$form->input('details');?>\n    </fieldset>\n    <?=$form->end('提交');?>\n\
  </div>\n```\n\n**227**\n\n注意，在清单 13-9 和 13-10 中，`Form`帮助器的`URL`选项被设置为`Calendar`插件的`Events`控制器的路径。这不仅使插件能够正常工作，还使插件更具可移植性。通过在创建表单时指定路径，插件将指向自身，而不会意外搜索周围`Cake`应用程序中的控制器或模型来保存表单数据。\n\
  \n启动`Add`和`Edit`操作以确保它们运行正常。此外，向数据库中添加一些测试事件，以便在构建`Index`和`View`操作时使用。你应该会看到类似于图\
  \ 13-1 的屏幕。\n\n**图 13-1.** *编辑已保存的事件。注意，这里应用的是博客应用程序中的默认布局，而不是 Calendar 插件中的布局。*\n\
  \n**228**\n\n### 构建索引操作\n\n通常，`Index`操作是最容易构建的，因为它通常显示数据库中的记录列表。然而，这个插件需要显示某种形式的日历。由于日历年份的不一致性，生成日历比简单地遍历记录列表要复杂得多。`Index`操作必须创建一个表，表中的行对应月份中的每周，并显示每周的每一天；同时，该操作必须查找给定日期的所有事件，并将其插入到单元格中。不仅是`Index`操作，`View`操作也会生成日历。由于视图中涉及大量计算，这听起来是构建帮助器函数的绝佳时机。\n\
  \n#### 日历帮助器\n\n在`app/plugins/calendar/views`目录中，创建一个名为`helpers`的新文件夹，并在其中创建一个名为`calendar.php`的新文件。该文件将包含几个自定义的帮助器函数，这些函数主要根据传递给它的参数渲染月份视图。在`Index`和`View`操作中，我们将设置这些参数，然后将它们传递给这个帮助器，而不是在每个视图文件中渲染日历。因为我打算在视图中执行逻辑，所以最好通过使用帮助器而不是元素来组织`Calendar`插件。请记住，帮助器用于在视图中执行逻辑，而元素用于制作基本显示或**视图模板**，供多个视图使用。\n\
  \n渲染月份将分为两步。首先，帮助器函数将遍历月份中的每周，其次，遍历每周。根据月份和年份的不同，月份的第一天会有所变化，因此帮助器必须创建一些变量来确定月份的第一天是星期几，然后还要确定周末。在`Calendar`帮助器中，我们首先插入清单\
  \ 13-12 中所示的代码。\n\n**清单 13-12.** *初始化一些变量，供* `app/plugins/calendar/views/helpers/calendar.php`\
  \ *帮助器使用*\n\n```\n<?\nclass CalendarHelper extends Helper {\n\n    var $helpers\
  \ = array('Html');\n\n    function render($events=array(), $month=null, $year=null)\
  \ {\n        //初始化此函数的变量\n        $firstdate = mktime(0, 0, 0, $month, 1, $year);\n\
  \        $lastdate = mktime(0, 0, 0, $month+1, 0, $year);\n        $firstday = strftime(\"\
  %a\", $firstdate);\n        $day = 1;\n        $days_array = array(\n          \
  \  1=>'周日', 2=>'周一', 3=>'周二', 4=>'周三', 5=>'周四', 6=>'周五', 7=>'周六',\n            8=>'周日',\
  \ 9=>'周一', 10=>'周二', 11=>'周三', 12=>'周四', 13=>'周五', 14=>'周六',\n            15=>'周日',\
  \ 16=>'周一', 17=>'周二', 18=>'周三', 19=>'周四', 20=>'周五', 21=>'周六',\n            22=>'周日',\
  \ 23=>'周一', 24=>'周二', 25=>'周三', 26=>'周四', 27=>'周五', 28=>'周六',\n            29=>'周日',\
  \ 30=>'周一', 31=>'周二', 32=>'周三', 33=>'周四', 34=>'周五', 35=>'周六',\n            36=>'周日',\
  \ 37=>'周一', 38=>'周二', 39=>'周三', 40=>'周四', 41=>'周五', 42=>'周六'\n        );\n```\n\n\
  **229-230**\n\n\n\n### 排版后的文本\n\n`Listing 13-12` 中的第 7 行使用 `mktime()` 函数将一个 Unix\
  \ 时间戳赋值给变量 `$firstdate`。注意，变量 `$month` 和 `$year` 用于将时间戳作为月份和年份值传递。这里也使用了该月的第一天。该月的最后一天也设置为一个时间戳，并赋值给\
  \ `$lastdate`。这一步稍微复杂一些：本质上，`mktime()` 被告知提供下个月第零天的时间戳，这相当于当前月份的最后一天。由于每个月的天数不同，这比尝试指定每个月要方便得多（例如，二月的最后一天是\
  \ 28 号，闰年除外；三月的最后一天是 30 号；但四月的最后一天是 31 号，以此类推）。现在，有了指定月份的第一天和最后一天的时间戳，辅助函数可以遍历天数的差异，并为每一天创建一个表格单元格。\n\
  \n一周中各天的布局不会改变；换句话说，对应星期日的单元格将始终是其所在行的第一个单元格，每一行代表一周。关键在于让月份中的日期（这些日期会随月份和年份变化）出现在正确的星期几上。第\
  \ 11–18 行是 `$days_array` 数组，它是一个静态的星期几集合，将按在日历中出现的顺序排列。该数组用于确保辅助函数在遍历月份中的天数时，能在与表格单元格相同的时间点在周末处中断。\n\
  \n第 10 行包含变量 `$day`，此处将其设置为 `1`。该值代表迭代中的当前日期。每次为月份中的某一天渲染一个表格单元格时，都会调用 `$day` 变量来显示该日期；然后该值将递增\
  \ `1` 以表示下一天，以此类推。\n\n第 9 行是让迭代从正确的星期几开始的关键。它使用 `strftime()` 函数获取时间戳 `$firstdate`\
  \ 所在星期几的三字母表示。稍后，该值将与 `$days_array` 的值进行比较，以确保第一个日期被放置在正确的单元格中。\n\n##### 渲染月份的第一周\n\
  \n让我们将 `Listing 13-13` 放入 `Calendar` 辅助函数中，开始迭代。\n\n**Listing 13-13.** *开始月份表格并遍历月份的第一周*\n\
  ```\n19 $out = '<table class=\"calendar\" cellspacing=\"0\">';\n20 $out .= $this->Html->tableHeaders(array('Sun','Mon','Tue','Wed','Thu',\n\
  'Fri','Sat'));\n21 /*** WEEK ONE ***/\n$out .= '<tr>';\nfor ($i=1; $i<=7; $i++)\
  \ {\n    if ($day<=1 && $firstday != $days_array[$i]) {\n        $out .= '<td>&nbsp;</td>';\n\
  \    } else {\n        $out .= '<td>'.$day.'<br/>';\n        $out .= $this->events($month,$day,$year,$events);\n\
  \        $out .= '</td>';\n        $day++;\n    }\n}\n$out .= '</tr>';\n```\n\n\
  在整个函数的其余部分中，变量 `$out` 将被分配所有要在视图中渲染的输出数据。注意，`Listing 13-13` 中的第 19 行实例化了这个变量，并且之后每次使用\
  \ `$out` 时，新值都会追加到其现有内容之后。第 19 行开始一个新的表格，第 20 行使用 `HTML` 辅助函数来编写表格的标题单元格。注意，这些标题单元格包含文本，用于告知用户哪一列代表一周中的哪一天。\n\
  \n第 22–33 行是遍历第一周的第一次迭代。注意，这次迭代以一个表格行元素（`<tr>`）开始，并以结束该行的闭合标签结束。第 23 行开始一个循环，用于处理该行中的每个单元格，`1`\
  \ 代表第一个单元格（即星期日），`7` 代表最后一个单元格（即星期六）。第 24 行检查月份第一天落在哪里。如果 `$day` 小于或等于 `1`（换句话说，如果在迭代的这个点上，`$day`\
  \ 被设置为该月的第一个日期），并且 `$firstday` 时间戳不等于当前日期（由 `$days_array` 指定），那么该元素将显示一个空白单元格。否则，它将创建一个表格单元格，其中显示值\
  \ `$day` 以及存储在数据库中当天的事件。这样的单元格由第 27–30 行创建。当显示一天时，下一天将成为 `$day` 的新值，因此第 30 行将 `$day`\
  \ 增加 `1`。\n\n注意，第 28 行使用了一个辅助函数 `$calendar->events()`，该函数尚未创建。这个函数将遍历 `$events`\
