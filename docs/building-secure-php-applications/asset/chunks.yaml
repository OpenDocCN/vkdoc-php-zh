  trans: '

    ### 用户教育


    用户教育是 Web 应用程序安全的关键要素，也是构建安全网络环境不可或缺的组成部分。对用户进行安全最佳实践教育，能帮助他们做出更安全的选择，并有助于保护他们的个人信息以及您组织的数据。


    *教育用户了解安全最佳实践：* 用户往往是抵御安全威胁的第一道防线。通过教育他们了解安全最佳实践，我们可以显著降低因人为失误或无知而导致的安全事件风险。


    **需要重点关注的关键领域**


    1.  **密码安全：** 鼓励用户为每个账户创建强大且唯一的密码。一个强密码通常包含字母、数字和特殊字符的组合。


    2.  **识别网络钓鱼企图：** 教导用户如何识别钓鱼邮件和网站。这包括检查发件人的电子邮件地址、留意紧迫性或威胁性语言，以及避免点击可疑链接。


    3.  **安全浏览习惯：** 倡导安全浏览习惯，例如仅在安全的（`HTTPS`）网站上输入个人信息，以及避免从不受信任的来源下载文件。


    4.  **定期更新：** 鼓励用户保持其软件和设备更新至最新的安全补丁，以防已知漏洞。


    *指导用户创建强密码和识别网络钓鱼企图：* 创建强密码对于维护 Web 应用程序的安全性至关重要。我们应该建议用户创建长度至少为 12 个字符的密码，并包含大小写字母、数字和特殊字符的混合。这种组合能显著增加密码的复杂性和安全性，使其更难以被攻击者破解。此外，用户应避免使用诸如`"password123"`或`"admin"`这类容易被猜到的单词或短语，这些常被黑客利用。相反，应鼓励使用更复杂和独特的组合。


    为了管理密码的复杂性并确保其唯一性，建议使用密码管理器。这些工具可以为每个账户生成并安全存储强大且唯一的密码，减轻用户记忆多个密码的负担。例如，一个强密码可能看起来像这样：`5!bR5^%5@2f9Q#xP`。通过使用密码管理器，用户无需费心记忆复杂密码即可增强安全性。


    识别网络钓鱼企图对于保护用户信息同样重要。鼓励用户始终检查发件人的电子邮件地址，以确保其真实性。这个简单的步骤有助于识别那些看似来自可信来源的欺诈邮件。教导用户留意危险信号，例如紧迫性语言、索要个人信息以及可疑链接，这些都是网络钓鱼企图的常见标志。此外，建议用户在点击链接前，将鼠标悬停在链接上以查看实际的
    URL。这种做法有助于用户验证链接的目标地址，并对缩短的或不熟悉的 URL 保持警惕。


    ### 供应商安全


    供应商安全是组织整体安全策略的关键方面，尤其是在当今互联互通的数字化商业环境中。供应商安全侧重于评估和管理与能够访问组织数据或基础设施的第三方供应商、供货商和服务提供商相关的安全风险。


    *评估并信任您供应商的安全措施：* 在与第三方供应商合作时，评估其安全实践以确保其符合您组织的标准至关重要。这包括对其安全协议、行业标准合规性以及整体安全态势进行彻底评估。


    **关键步骤**


    1.  **执行安全审计：** 对您的供应商定期执行安全审计，以评估其安全措施。这可以包括审查其安全策略、事件响应计划以及是否符合`ISO 27001`或`SOC
    2`等行业标准。


    2.  **要求安全认证：** 向供应商索要能够证明其安全承诺的安全认证和审计报告。例如`ISO 27001`、`SOC 2`和`GDPR`合规性等认证，都是稳健安全实践的指标。


    3.  **安全问卷：** 使用详细的安全问卷来收集有关供应商安全实践的信息。这有助于识别潜在的安全漏洞和值得关注的领域。


    *确保第三方库和服务遵循安全最佳实践：* 在将第三方库和服务集成到您的应用程序中时，确保它们遵循安全最佳实践至关重要。这有助于降低通过外部代码引入漏洞的风险。


    **关键步骤**


    1.  **使用信誉良好的来源：** 仅使用来自拥有良好安全记录的信誉良好来源的库和服务。检查其是否得到积极维护、有更新和社区支持。


    2.  **定期更新库：** 保持第三方库和服务的更新。定期检查并应用更新和补丁，以解决已知漏洞。


    3.  **审查和测试代码：** 在将第三方库集成到应用程序之前，对其执行代码审查和安全测试。这有助于识别并缓解潜在的安全问题。


    4.  **监控漏洞：** 使用能够监控第三方库漏洞并在发现安全风险时通知您的工具和服务。实施一个快速处理这些漏洞的流程。


    在 Web 应用程序安全上下文中，各种攻击向量可能会针对基于 PHP 的应用程序的漏洞和弱点。如果处理不当，这些攻击向量可能会产生重大的安全影响。在接下来的几个章节中，我们将探讨
    PHP Web 应用程序中一些常见的攻击向量：


    1.  **SQL 注入（SQL Injection）：** 攻击者将恶意的 SQL 代码注入到用户输入字段中，以操纵数据库。这可能导致未授权的数据访问、数据修改甚至数据删除。


    2.  **跨站脚本攻击（XSS）：** 攻击者将恶意脚本（通常是 JavaScript）注入到其他用户浏览的网页中。这些脚本可以窃取敏感信息、劫持用户会话或执行其他恶意操作。


    3.  **跨站请求伪造（CSRF）：** 攻击者诱骗用户在不知情或未经同意的情况下在网站上执行操作。这可能导致诸如更改账户设置或进行未经授权的交易等行为。


    4.  **远程文件包含（RFI）和本地文件包含（LFI）：** 攻击者试图通过操纵输入数据来包含外部或本地文件。RFI 可能导致从远程服务器执行任意代码，而
    LFI 则可以访问并显示服务器上的敏感文件。


    5.  **命令注入（Command Injection）：** 攻击者利用漏洞在服务器上执行系统命令。这可能导致远程代码执行和服务器被攻破。

    '
- fmt: "### 6. Session Hijacking  \nAttackers steal session identifiers to impersonate\
    \ legitimate users. This can result in unauthorized access to user accounts and\
    \ sensitive data.\n\n### 7. Directory Traversal  \nAttackers manipulate input\
    \ to navigate to directories they should not access, potentially exposing sensitive\
    \ files.\n\n### 8. Brute-Force Attacks  \nAttackers repeatedly attempt to log\
    \ in to a user’s account by trying various username/password combinations, aiming\
    \ to gain unauthorized access.\n\n### 9. Insecure Deserialization  \nAttackers\
    \ manipulate serialized data to execute code on the server. This can lead to remote\
    \ code execution and other vulnerabilities.\n\n### 10. Security Misconfigurations\
    \  \nPoorly configured servers, databases, and application settings can expose\
    \ sensitive information or create security holes.\n\n### 11. Insecure File Uploads\
    \  \nIf an application allows file uploads without proper validation, attackers\
    \ can upload malicious files that can compromise the server.\n\n### 12. XML External\
    \ Entity (XXE) Attacks  \nAttackers exploit XML parser vulnerabilities to read\
    \ files on the server, gain information about the system, or launch attacks like\
    \ denial of service.\n\n### 13. Insecure Session Management  \nWeaknesses in session\
    \ handling can lead to session fixation, session hijacking, or session data leakage.\n\
    \n### 14. Clickjacking  \nAttackers trick users into clicking on something different\
    \ from what they perceive, often through hidden or transparent iframes.\n\n###\
    \ 15. Business Logic Flaws  \nAttackers can exploit flaws in an application’s\
    \ logic to perform actions they are not authorized to perform.\n\n### 16. Data\
    \ Exposure  \nData leaks can expose sensitive information, such as user data or\
    \ proprietary company information.\n\nTo mitigate these attack vectors in PHP\
    \ web applications, it’s crucial to follow best practices in coding, validate\
    \ and sanitize user input, implement security mechanisms like input validation,\
    \ use prepared statements for database queries, maintain proper access controls,\
    \ and regularly update and patch software to address vulnerabilities. Additionally,\
    \ consider employing web application firewalls (WAFs) and security testing to\
    \ identify and fix potential vulnerabilities.\n\n## Protecting Against Cross-Site\
    \ Scripting (XSS) Attacks\n\nCross-site scripting (XSS) is a common and critical\
    \ web security vulnerability that occurs when a web application includes untrusted\
    \ data in a web page, which is then executed by the user’s web browser. This vulnerability\
    \ allows an attacker to inject malicious scripts into web pages viewed by other\
    \ users. XSS has significant security implications, including the following:\n\
    \n1. **Data Theft**: Attackers can steal sensitive data, such as cookies, session\
    \ tokens, and personal information, from unsuspecting users by injecting malicious\
    \ scripts that capture this information and send it to the attacker.\n\n2. **Session\
    \ Hijacking**: XSS can be used to hijack user sessions. By stealing session cookies\
    \ or tokens, an attacker can impersonate a legitimate user and perform actions\
    \ on their behalf, potentially compromising the user’s account.\n\n3. **Malware\
    \ Distribution**: Attackers can use XSS to distribute malware to unsuspecting\
    \ users. Malicious scripts can initiate downloads or execute code that infects\
    \ a user’s system with malware.\n\n4. **Defacement**: XSS can be used to deface\
    \ websites, replacing legitimate content with malicious or offensive content,\
    \ causing reputational damage to the site owner.\n\n5. **Phishing**: Attackers\
    \ often use XSS to create convincing phishing pages that steal login credentials\
    \ and other sensitive information from users who believe they are interacting\
    \ with a legitimate website.\n\n6. **Intranet Attacks**: In a corporate setting,\
    \ attackers can use XSS to target internal applications and gain unauthorized\
    \ access to corporate resources and sensitive data.\n\n7. **Reputation Damage**:\
    \ Security incidents involving XSS can damage an organization’s reputation and\
    \ erode user trust, especially if sensitive information is compromised.\n\n8.\
    \ **Regulatory Violations**: Data breaches resulting from XSS can lead to legal\
    \ and regulatory consequences, including financial penalties and compliance violations.\n\
    \n![](images/609480_1_En_3_Chapter/609480_1_En_3_Fig6_HTML.jpg)\n\nFigure 3-6\
    \ — Role of XSS in request-response lifecycle\n\nIn Figure [3-6](#609480_1_En_3_Chapter.xhtml#Fig6):\n\
    \n1. The user interacts with the PHP web application.\n2. The user is tricked\
    \ into visiting a malicious site (controlled by the attacker) or clicking on a\
    \ link that leads to the malicious site.\n3. The malicious site sends a request\
    \ to the PHP web application with a payload that contains an XSS script.\n4. The\
    \ PHP application reflects the payload in its response, rendering the malicious\
    \ content (XSS) on the user’s browser.\n5. The user’s browser executes the malicious\
    \ script, which can steal sensitive data, such as cookies, and sends it to the\
    \ attacker’s server.\n\nThis sequence illustrates how an XSS attack can lead to\
    \ data theft in the context of a PHP web application. Preventing XSS attacks requires\
    \ implementing security measures, such as input validation, output encoding, and\
    \ content security policies, to protect users and their data from such vulnerabilities.\n\
    \nProtecting against cross-site scripting (XSS) attacks in PHP involves implementing\
    \ a range of security techniques. Below we will discuss a few practical techniques.\n\
    \n![](images/609480_1_En_3_Chapter/609480_1_En_3_Fig7_HTML.jpg)\n\nFigure 3-7\
    \ — Role of XSS in request-response lifecycle\n\n### Output Encoding\n\nOutput\
    \ encoding involves sanitizing and escaping user-generated content before displaying\
    \ it in web pages. This prevents the browser from interpreting the content as\
    \ executable scripts. PHP provides functions for this purpose, such as `htmlspecialchars()`\
    \ and `htmlentities()`.\n\n```php\n$userInput = '<script>alert(\"XSS attack\"\
    );</script>';\n$safeOutput = htmlspecialchars($userInput, ENT_QUOTES, 'UTF-8');\n\
    echo $safeOutput;\n```\n\n### Content Security Policy (CSP)\n\nCSP is a security\
    \ feature that allows you to specify which sources of content are allowed to be\
    \ loaded and executed on your web page. You can set CSP directives in your PHP\
    \ application’s HTTP headers to prevent inline scripts and unauthorized script\
    \ sources.\n\nExample of setting a CSP header in PHP:\n\n```php\nheader(\"Content-Security-Policy:\
    \ script-src 'self' 'unsafe-inline'\");\n```\n\n### Input Validation\n\nValidate\
    \ and sanitize user inputs to ensure that they adhere to expected formats. Use\
    \ PHP’s built-in functions, regular expressions, or custom validation functions\
    \ to check input against predefined rules.\n\nExample of input validation with\
    \ PHP’s `filter_var()`:\n\n```php\n$email = $_POST['email'];\nif (filter_var($email,\
    \ FILTER_VALIDATE_EMAIL)) {\n    // Valid email\n} else {\n    // Invalid email\n\
    }\n```\n\n### Use Prepared Statements (Database Queries)\n\nWhen interacting with\
    \ databases, use prepared statements or parameterized queries to prevent SQL injection,\
    \ which is a form of XSS. This ensures that user input is treated as data and\
    \ not executable code.\n\nExample using PDO for prepared statements:\n\n```php\n\
    $pdo = new PDO(\"mysql:host=localhost;dbname=mydb\", $username, $password);\n\
    $stmt = $pdo->prepare(\"SELECT * FROM users WHERE username = :username\");\n$stmt->execute(['username'\
    \ => $userInput]);\n```\n\n### Avoid Dynamic JavaScript Generation\n\nAvoid generating\
    \ JavaScript dynamically by concatenating user input with script code. Instead,\
    \ use JSON for data interchange and avoid rendering user-generated data as JavaScript.\n\
    \nExample using JSON for data exchange:\n\n```php\n$userData = ['name' => 'John',\
    \ 'age' => 30];\necho json_encode($userData);\n```"
