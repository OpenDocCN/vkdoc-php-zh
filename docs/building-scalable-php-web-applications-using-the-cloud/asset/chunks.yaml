    \ more in-depth, server-specific configuration details than is appropriate for\
    \ this book.  \n\n## 9.5 Connecting Your Application to S3  \n\nNow that we know\
    \ how to talk to S3 from our server, we will now connect our guestbook application\
    \ to S3 so that users can upload an image with their message. This is actually\
    \ fairly straightforward. All we have to do is"
