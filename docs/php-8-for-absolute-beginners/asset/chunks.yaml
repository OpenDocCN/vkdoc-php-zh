    ## 数组


    数组在内存中保存多个相关的信息。将信息保存在数组中的能力大大减少了创建多个变量来存储信息所需的编码量。数组还提供了在需要时轻松增加存储位置数量的能力。在 PHP
    中，数组可以在需要时动态创建，也可以在实际使用前预先格式化。PHP 数组中每个单独项的数据类型是在存储值时确定的。


    让我们看一个示例；一个数组可能包含课程信息，例如课程编号、课程名称、描述、教室、讲师和容量（学生人数）。


    ```

    $class_array[0] = "CS122"; // 课程编号

    $class_array[1] = "编程概念 1"; // 课程名称

    $class_array[2] = "PHP 语言的基本概念。"; // 描述

    $class_array[3] = "B123"; // 教室

    $class_array[4] = "亚伯拉罕·埃克塞尔博士"; // 讲师

    $class_array[5] = 50; // 学生人数

    ```


    这个数组是动态创建的。PHP 中所有数字数组的*下标*（索引）都从零开始。然而，在动态创建数组时，你可以从任何下标开始，甚至可以跳过某些位置。数组名的语法与变量相同，但需额外添加包含在方括号（`[]`）中的数组下标。


    我们也可以让 PHP 为我们创建下标编号，使用以下格式。


    ```

    $class_array[ ] = "CS122"; // 课程编号

    $class_array[ ] = "编程概念 1"; // 课程名称

    $class_array[ ] = "PHP 语言的基本概念。"; // 描述

    $class_array[ ] = "B123"; // 教室

    $class_array[ ] = "亚伯拉罕·埃克塞尔博士"; // 讲师

    $class_array[ ] = 50; // 学生人数

    ```


    我们也可以通过其他编程语言中更常见的格式来实现同样的任务。


    ```

    $class_array = array (  "CS122",

    "编程概念 1",

    "PHP 语言的基本概念。",

    "B123", "亚伯拉罕·埃克塞尔博士", 50);

    ```

