    \ = null;\n\n  $sql = \"select * from files where hash = '{$hash}'\";\n  $rs =\
    \ mysqli_query($con, $sql);\n  if ($rs) {\n    $file = mysqli_fetch_row($rs);\n\
    \    mysqli_free_result($rs);\n  }\n  return $file;\n}\n\nfunction SaveFile($filename)\
    \ {\n  global $con;\n  $hash = hash_file('sha256', $filename);\n  if (!GetFile($hash))\
    \ {\n    mysqli_query($con, \"insert into files (hash, filename) values ('{$hash}',\
    \ '{$filename}')\");\n  }\n}\n\nSaveFile('6_1.php');\nSaveFile('6_12.php');\n\
    SaveFile('6_1.php');\n\n$rs = mysqli_query($con, \"select * from files\");\nif\
    \ ($rs) {\n  while ($row = mysqli_fetch_row($rs)) {\n    print_r($row);\n  }\n\
    \  mysqli_free_result($rs);\n}\n\nmysqli_close($con);\n```\n\n函数 `GetFile()` 会在数据库中已存在该哈希值时返回存储的值，若数据库中不存在则返回\
    \ `null`。函数 `SaveFile()` 会在创建新记录前调用 `GetFile()` 函数以防止重复记录。这在示例末尾插入三个文件时得到体现。\n\
    \n第一个和最后一个文件是同一个文件，因此只会创建两条记录，输出结果如下：\n\n```\nArray\n(\n    [0] => 1\n    [1]\
    \ => 866b1551930506766708fbb73cfdfc6fd5038cf812cb64983f43d771b8e0ff71\n    [2]\
    \ => 6_1.php\n)\nArray\n(\n    [0] => 2\n    [1] => 125a71508e064ee34662498fcb040585fd1bf539cf4f09b203a79adffba8fc99\n\
    \    [2] => 6_12.php\n)\n```\n\n## 配方 6-12. 存储密码\n\n### 问题\n\n许多网站允许用户注册并创建账户，以便访问额外功能或查看购物订单状态。其中许多网站使用电子邮件地址作为用户\
    \ ID 并采用某种形式的密码。在数据库中以明文形式存储密码并不安全。如果网站被入侵或硬盘落入不法分子手中，所有密码都可能被泄露。\n\n### 解决方案\n\
    \n我们可以存储密码的哈希值，而不是存储明文密码。可以使用上一配方中的 `md5()`、`sha1()` 或 `hash()` 函数，如果是 PHP 5.5\
    \ 或更高版本，还可以使用 `password_hash()` 函数。建议数据库模式为密码列至少允许 60 个字符（255 个字符更佳），因为哈希算法可能会随时间变化以提升安全性并生成更强的哈希值。\n\
    \n### 实现原理\n\n如果您有一个名为 `users` 的表，包含 `login` 和 `password` 两列，那么应在存储用户密码前以及验证登录时提供的登录名和密码是否有效之前使用\
    \ `password_hash()` 函数。\n\n```php\n<?php\n\n// 6_25.php\n\n//create table myusers\
    \ (\n//  id int auto_increment,\n//  login varchar(255),\n//  password varchar(255),\n\
    //  primary key(id)\n//);\n\n$con = mysqli_connect('127.0.0.1', 'root', 'secret',\
    \ 'book');\n\nfunction CreateUser($login, $password) {\n  global $con;\n  $login\
    \ = mysqli_escape_string($con, $login);\n  $password = mysqli_escape_string($con,\
    \ password_hash($password, PASSWORD_BCRYPT));\n  mysqli_query($con, \"insert into\
    \ myusers (login, password) values ('{$login}', '{$password}')\");\n}\n\nfunction\
    \ CheckUser($login, $password) {\n  global $con;\n  $user = null;\n  $login =\
    \ mysqli_escape_string($con, $login);\n  $rs = mysqli_query($con, \"select * from\
    \ myusers where login='{$login}'\");\n  if ($rs) {\n    $user = mysqli_fetch_assoc($rs);\n\
    \    if ($user && !password_verify($password, $user['password'])) {\n      $user\
    \ = null;\n    }\n    mysqli_free_result($rs);\n  }\n  return $user;\n}\n\nCreateUser('john@example.com',\
    \ 'A secret Password');\n\nif (CheckUser('john@example.com', 'A secret Password'))\
    \ {\n  echo \"用户存在且密码正确\\n\";\n}\nelse {\n  echo \"用户不存在或密码错误\\n\";\n}\n```\n\n\
    使用 MySQL 命令行工具显示表中的行，结果类似如下：\n\n```\nMariaDB [book]> select password from myusers;\n\
    +--------------------------------------------------------------+\n| password \
    \                                                    |\n+--------------------------------------------------------------+\n\
    | $2y$10$V4KWuQIzssFRmlQeZNLPeegsyQ0MFp0vjUNl3FP9.7k5E4EiB5INi |\n+--------------------------------------------------------------+\n\
    1 row in set (0.00 sec)\n```\n\n# 第 7 章：文件和目录\n\n在本章中，我们将讨论 PHP 中使用文件的两种基本方式。第一种是包含\
    \ PHP 代码的脚本，形式为主脚本文件以及脚本可能使用的任何包含文件。\n\n第二种形式是从本地或远程文件系统读取更多内容或数据，并由脚本进行处理。\n\n\
    ## 配方 7-1. Include 和 Require\n\n### 问题\n\n当 PHP 用于执行或解释脚本时，它总是从一个文件开始。该文件可以是 PHP\
    \ 命令行版本（`php-cli`）的输入参数，也可以是从 Web 服务器请求间接传递给 PHP 的文件。\n\n让单个文件包含每个请求所需的所有代码会导致脚本文件庞大且代码重复。此外，将代码拆分成服务于特定目的的小单元也更有意义。\n\
    \n这通常通过在每个文件中定义单个类来实现。\n\n### 解决方案\n\n这正是 `include` 和 `require` 发挥作用的地方。每当多个脚本共享代码时，您可以将其放入单独的文件中，并在需要的地方包含该代码。`include`\
    \ 和 `require` 的基本区别在于，当请求的文件在文件系统中不存在时，这些语句的反应不同。`Include` 会生成一个警告，而 `require`\
    \ 会生成一个致命错误并停止脚本执行。\n\n关于如何组织包含文件，有两种不同的思路。第一种是将它们放在与主脚本相同的目录结构中。这通常迫使开发人员使用与主脚本相同的扩展名，以避免用户直接请求这些文件时暴露其内容。如果\
    \ Web 服务器配置为将带有 `.php` 扩展名的文件传递给 PHP 解释器，那么带有 `.inc` 等其他扩展名的文件可能会被直接传递，如果文件包含数据库凭据和其他秘密信息，最终用户可能能够访问这些信息。简单的解决方法是确保\
    \ Web 服务器配置为将所有 PHP 文件交给解释器处理。用于配置数据库凭据的包含文件很可能不会生成任何输出，因此用户看到的内容将是一个空白文档。\n\n\
    另一种思路是将所有包含文件放在用于定义网站文档根的目录结构之外。在这种情况下，文件可以使用任何扩展名，并且无法直接暴露给用户，因为 Web 服务器不知道如何访问这些文件。在我看来，这是更可取的方法。\n\
    \n© Frank M. Kromann 2016\n\nF.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_7\n"
- fmt: "```markdown\n# PHP 文件包含与读取指南\n\nPHP 使用一个名为`include_path`的配置选项来定位包含文件。其工作方式类似于操作系统的环境变量`PATH`。在\
    \ Mac 和 Linux 系统上，`include_path`是由冒号（`:`）分隔的一组目录；在 Windows 系统上，分隔符是分号（`;`）。当包含或引入（`require`）一个文件时，解释器会按照`include_path`中指定的目录顺序查找该文件。如果该文件存在于多个目录中，将使用最先找到的那个。\n\
    \n`include_path`配置中的每个目录都可以指定为绝对路径或相对路径。如果指定了相对路径，它将从 PHP 脚本执行的当前工作目录开始查找。在大多数情况下，这将是文档根目录或其下的一个子目录。如果你将所有\
    \ PHP 文件放在文档根目录，并将`include_path`配置为`../inc`，那么你可以将所有包含文件放在一个名为`inc`的目录中，该目录位于文档根目录的旁边。\n\
    \n`include`和`require`都可以将文件指定为绝对路径或相对路径。绝对路径以`/`开头，系统将只在该位置查找包含文件。如果使用相对路径，系统会在路径前依次拼接`include_path`配置中的每个部分，直到找到该文件。\n\
    \n根据包含文件的内容，可能无法多次包含它。\n\n对于定义函数或类的包含文件，情况就是如此。多次尝试声明相同的函数或类会导致编译错误。\n\n包含变量定义的其他文件可以多次包含。在大多数情况下，每个文件应该只被包含一次，但也有一些用例，从不同目录包含同名文件是有意义的。\n\
    \n`include`和`require`有特殊的版本，称为`include_once`和`require_once`。这些函数会确保，如果用户尝试多次包含同一个文件，系统只会加载该文件一次，从而防止因多次定义相同的函数或类而引发错误。\n\
    \n`include`和`require`可用于加载非 PHP 文件。如果你有一段 HTML 代码需要从文件系统中读取并按原样提供给请求的浏览器，这会很有用。在这种情况下，被包含的文件不会包含开头的`<?php`标签，其内容将作为输出传递。它会被精确地注入到文件被包含的位置，并且脚本可以在包含文件的前后向浏览器发送其他输出。\n\
    \n注意：尽管 Windows 使用反斜杠（`\\`）作为目录分隔符，但 PHP 可以同时使用斜杠（`/`）和反斜杠（`\\`）。这使得可以使用 PHP 编写能够在\
    \ Linux 和 Windows 平台上无需特别处理即可运行的代码。建议始终使用`/`作为目录分隔符。\n\n## 工作原理\n\n如果你有一个类定义在一个文件中，并且你想从其他文件中访问它，则必须包含定义该类的文件。\n\
    \n```php\n<?php\n// 7_1.php\n\nclass Test {\n\n    protected $a = null;\n\n  \
    \  function __construct($a) {\n\n        $this->a = $a;\n\n    }\n\n}\n```\n\n\
    ```php\n<?php\n// 7_2.php\n\nrequire \"7_1.php\";\n\nclass Test2 extends Test\
    \ {\n\n    function SetValue($a) {\n\n        $this->a = $a;\n\n    }\n\n    function\
    \ GetValue() {\n\n        return $this->a;\n\n    }\n\n}\n\n$t = new Test2(15);\n\
    \necho $t->GetValue() . \"\\n\";\n\n$t->SetValue(30);\n\necho $t->GetValue() .\
    \ \"\\n\";\n```\n\n在上面的例子中，我们在一个文件中定义了一个类，并在下一个脚本中包含该文件，在该脚本中，类`Test()`被扩展为`Test2()`。根据`php.ini`中如何定义`include_path`，或者是否使用`ini_set()`函数重新定义它，如果文件与主脚本位于同一目录，你可能需要在文件名前面加上`./`。\n\
    \n如果在`include_path`定义指定的任何位置存在多个同名文件，系统将只包含根据`include_path`指令中列出的目录顺序找到的第一个文件。如果你想绕过在`include_path`包含的所有目录中搜索文件，可以指定一个绝对路径。如果你打算与可能将应用安装在不同位置的用户共享该应用，这样做可能会引起问题。\n\
    \n---\n\n# 配方 7-2：读取文件\n\n## 问题\n\n在之前的配方中，我们研究了包含代码片段或其他文件，这些文件要么被执行，要么作为输出传递给客户端。但是，如果文件包含的数据在发送到客户端之前必须经过处理，该怎么办？\n\
    \n## 解决方案\n\nPHP 附带了许多用于读取文件的函数。最基础的函数（如`fopen()`，`fclose()`，`fread()`等）模拟了操作系统的底层文件处理功能；而更高级的函数（如`file_get_contents()`，`file()`，`fgetcsv()`）允许你通过单个命令读取文件、读取文件并将其转换为数组，或者读取文件并将其内容解析为逗号分隔值（CSV）文件。\n\
    \n其他函数如`readfile()`和`fpassthru()`，会简单地将文件内容或文件指针的内容读取出来，并直接发送到输出。\n\n## 工作原理\n\
    \n使用`fopen()`创建一个可用于对文件进行读和/或写操作的文件句柄，其工作方式与 C/C++ 中相同函数的类似。\n\n```php\n<?php\n\
    // 7_3.php\n\n$f = '';\n\n$fp = fopen('myfile.txt', 'r');\n\nif ($fp) {\n\n  \
    \  while ($s = fread($fp, 100)) {\n\n        $f .= $s;\n\n    }\n\n    fclose($fp);\n\
    \n}\n\nvar_dump($f);\n```\n\n在这个例子中，文件`myfile.txt`被以只读模式打开，这由`fopen()`函数的第二个参数`r`指示。该文件可以指定为相对路径或绝对路径。在此例中，文件预期与\
    \ PHP 脚本位于同一目录。\n\n如果文件成功打开，`fopen()`函数将返回一个文件句柄。良好的编程实践是在读取任何内容之前检查错误。如果文件缺失或被另一个进程锁定以进行写入，导致系统无法打开该文件，它将返回`0`而不是一个文件句柄。这使得错误检查非常容易。只需在进入读取步骤之前检查文件句柄是否有值即可。\n\
    \n通过循环读取文件，每次读取最多 100 字节。内部文件指针会移动 100 字节，然后为下一次迭代做准备。此过程持续进行，直到`fread()`函数无法读取更多数据。`fread()`函数将返回实际读取的字节数。如果文件长度为\
    \ 233 字节，循环将进行 3 次迭代：前两次将读取 100 字节，最后一次将读取剩余的 33 字节。`fread()`函数被第 4 次调用，但由于没有更多数据可读，返回值将为`0`，循环将退出。之后，使用`fclose()`函数关闭文件，并使用`var_dump()`函数将文件内容写入标准输出。\n\
    \n解释器会在脚本终止时自动关闭任何脚本未关闭的文件。这对于在 Web 环境中使用的脚本来说很方便，但如果脚本用于长时间运行的进程，建议在所有文件不再使用时关闭它们。"
  raw: 'PHP uses a configuration option called include_path to locate include files.
    This works similarly to the operating systems environment variable PATH. On Mac
    and Linux the include path is a set of directories separated by a colon (:) and
    on Windows system the separator is a semicolon (;). When a file is included or
    required the interpreter will look for the file in any of the directories specified
    by the include_path. If the file exists in multiple directories, the first one
    found, when looking at the directories in the order they are defined, will be
    used.


    Each directory in the include_path configuration can be specified as an absolute
    or relative path. If a relative path is specified it will start from the current
    working directory where the PHP except is executed from. This will in most cases
    be the document root or a directory under that. If you place all your php files
    in the document root and have configured include_path="../inc" you can place all
    your include files in a directory called inc that is located next to the document
    root.


    Both include and require can have the files specified as absolute or relative
    paths. An absolute path starts with a / and the system will look for the include
    file in that location only. If a relative path is used the system will prepend
    the path with each section of the include_path configuration until it finds the
    file.


    Depending on the content of the include file it might not be possible to include
    it more than one time.


    This is the case for include files that define functions or classes. Trying to
    declare the same function or class multiple times will lead to a compiler error.


    Other files that contain variable definitions can be included multiple times.
    In most cases each file should only be included once but there are a couple of
    use cases where including files with the same name but from different directories
    makes sense.


    There are special version of include and require called include_once and require_once
    . These will ensure that if the user tries to include the same file multiple times
    the system will not only load the files once and prevent errors coming from defining
    the same functions or classes multiple times.


    Include and require can be used to load non-PHP files. This can be useful if you
    have a snippet of HTML code that should be read off the file system and served
    to the requesting browser as is. In that case the included file will not have
    the opening <?php tag and the content will be passed on as output. It will be
    injected to the output exactly where the file is included and the script can send
    other output to the browser before and after the included file.


    Note: although Windows uses the backslash (\) as a directory separator PHP can
    use both slash (/) and backslash (\). This makes it possible to use PHP to write
    code that can work on Linux and Windows platforms without special considerations.
    It is recommended to always use the / as directory separator.


    How it Works


    If you have a class that’s defined in one file and you want to access it from
    other files, you will have to include the file that defines the class.


    <?php


    // 7_1.php


    class Test {


    protected $a = null;


    function __construct($a) {


    $this->a = $a;


    }


    }


    CHAPTER 7 ■ FILES AND DIRECTORIES


    <?php


    // 7_2.php


    require "7_1.php";


    class Test2 extends Test {


    function SetValue($a) {


    $this->a = $a;


    }


    function GetValue() {


    return $this->a;


    }


    }


    $t = new Test2(15);


    echo $t->GetValue() . "\n";


    $t->SetValue(30);


    echo $t->GetValue() . "\n";


    In the example above we define a class in one file and include the file in the
    next script where the calss Test() is extended to Test2() . Depending on how the
    include_path is defined in php.ini or if it’s redefined with the ini_set() function
    you might have to add ./ in front of the name of the file if the file is located
    in the same directory as the main script.


    If multiple files with the same name exists in any of the locations specified
    by the include_path definition the system will only include the first file based
    on the order of the directories listed in the include_path directive. You can
    specify an absolute path if you want to bypass the search for the file in all
    the directories included in the include_path . Doing so can cause problems if
    you intend to share the application with users who might install it in a different
    location.


    Recipe 7-2\. Reading Files


    Problem


    In the previous recipe we looked at including sections of code or other files
    that would either be executed or passed onto the client as output, but what if
    the file contains data that must be processed before it’s sent to the client?


    Solution


    PHP comes with a bunch of functions to read from files. The most basic ones (
    fopen() , fclose() , fread(), etc.) mimics the low-level file handling functions
    of the operating system, and the more advanced ones ( file_get_contents() , file()
    fgetcsv() ) lets you read a file with a single command, read a file and turn it
    into an array, or read a file and parse its contents as comma separated values
    (CSV) file.


    Other functions like readfile() and fpassthru() will simply read the contents
    of the file or file pointer and send it directly to the output.


    CHAPTER 7 ■ FILES AND DIRECTORIES


    How it Works


    Using fopen() to create a file handle that can be used for read and/or write operations
    on the file works similar to how the same functions work in C/C++.


    <?php


    // 7_3.php


    $f = '''';


    $fp = fopen(''myfile.txt'', ''r'');


    if ($fp) {


    while ($s = fread($fp, 100)) {


    $f .= $s;


    }


    fclose($fp);


    }


    var_dump($f);


    In this example the file ''myfile.txt'' is opened for read operations as indicated
    by the second parameter to the fopen() function. The file can be specified as
    a relative or absolute path. In this case the file is expected to be in the same
    directory as the php script.


    The fopen() function will return a file handle if the file was opened. It is good
    coding practice to check for errors before reading any content. If the file was
    missing or locked for writing by another process and the system was unable to
    open the file, it will return zero instead of a file handle. This makes the checks
    for errors very easy. Simply checking of the file handle has a value before continuing
    to the read step.


    Reading from the file is done in a loop where a section of up to 100 bytes of
    the file is read. The internal file pointer is moved 100 bytes and the function
    is ready for the next iteration. This continues until the fread() function fails
    to read more data. The fread() function will return the actual number of bytes
    read. If the file is 233 bytes long the loop will get 3 iterations where the first
    two chunks will contain 100 bytes and the last one will contain the last 33 bytes.
    The fread() function is called a 4th time but as there is no more data to read
    the return value will be 0 and the loop will be exited. After that the file is
    closed with the fclose() function and the contents of the file are written to
    the standard output with the var_dump() function. The interpreter will automatically
    close any files not closed by the script, when the script terminates. This is
    convenient for scripts used in a web environment but if the script is used for
    a long running process it''s always a good idea to close all files when they are
    no longer used.'
