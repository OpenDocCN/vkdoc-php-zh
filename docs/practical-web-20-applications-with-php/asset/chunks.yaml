    **Canceling an Event**


    A common technique we will use in this book when writing Ajax code is to trigger
    an Ajax request when a form submit button is clicked. The problem with this is
    that the web browser will perform a normal postback when the button is clicked,
    meaning a new page will be loaded in the browser. To prevent this from occurring,
    the Event.stop() method must be called. This is a very useful method, since it
    is difficult to write code to achieve this across all browsers.


    As an example, let’s say I have the following form code:


    <form method="post" action="/someUrl" id="my-form">


    <input type="submit" value="Submit Form" />


    </form>


    Rather than submitting the form data back to the server, I want to run a function
    called handleFormSubmission() when the Submit Form button is clicked. First, I
    must observe the onsubmit event, and then call Event.stop() when handling the
    event:


    <script type="text/javascript">


    $(''my-form'').observe(''submit'', handleFormSubmission);


    function handleFormSubmission(e)


    {


    Event.stop(e);


    // now do something here such as an Ajax request


    }


    </script>


    The best part about using code such as this is that it allows you to prevent normal
    postback when the user is running a browser capable of running JavaScript, yet
    it still submits the form as normal when a non-JavaScript browser is used. This
    helps you provide a rich user experience when the browser is capable of it, but
    it is also an accessible non-JavaScript solution.


    **Creating JavaScript Classes in Prototype**


    Yet another great thing about Prototype is its ability to easily create JavaScript
    classes. While this has always been possible with JavaScript, Prototype makes
    the process much simpler and helps you generate cleaner and more manageable code.


    **Creating a Class**


    The typical process for creating a class with Prototype is as follows:


    **1.** Create the new class by calling Class.create(). Internally, this causes
    the class’s constructor function to be automatically run when the class is instantiated.


    **2.** Define the class’s prototype object (not to be confused with the name of
    the library you are using). This defines the properties and methods of the class.


