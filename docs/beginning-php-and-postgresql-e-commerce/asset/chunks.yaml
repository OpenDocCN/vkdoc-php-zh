    \n    $response_xml = $request->GetResponse();\n    $_SESSION['pre_response']\
    \ = $response_xml;\n\n    $xml = simplexml_load_string($response_xml);\n    $request->MakeXmlFulfill(DATACASH_CLIENT,\
    \ DATACASH_PASSWORD,\n                             'fulfill', $xml->merchantreference,\n\
    \                             $xml->datacash_reference);\n    $response_xml =\
    \ $request->GetResponse();\n    $_SESSION['fulfill_response'] = $response_xml;\n\
    }\n```\n\nThe `test_datacash.php` page will be loaded three more times because\
    \ you have three frames that you want to fill with data:\n\n```\n<frameset cols=\"\
