    现在，如果你尝试访问`http://phpweb20/admin`，除非你的用户类型是管理员，否则访问将被拒绝。


    ## 应用程序部署


    现在我们来研究将 Web 应用程序部署到生产服务器上的过程。到目前为止，我们假设所有开发都在专用的开发服务器上进行，并且应用程序的用户无法访问此服务器。


    管理 Web 应用程序版本的典型设置涉及三种类型的服务器：


    *   **开发服务器**：这里创建并测试新代码。应用程序有时可能正常工作，有时可能完全崩溃。通常只有开发人员和测试人员才能访问。

    *   **预发布服务器**：一旦 Web 应用程序的新版本完成，它会被部署到预发布服务器。此服务器的配置与生产服务器完全相同（相同的操作系统以及`Apache`、`PHP`等软件的版本）。此应用程序将完全功能化，但其数据可能是静态的且过时的（它通常不是备份服务器或镜像服务器）。它通常由开发人员和测试人员访问（或许还有委托您开发应用程序以批准更改的客户）。在预发布服务器上部署提供了一个很好的机会来确定在部署到生产服务器时可能出现的任何“陷阱”。

    *   **生产服务器**：一旦一切在预发布服务器上看起来运行正常，新的应用程序版本就可以部署到生产服务器。这是现实世界看到的服务器，它包含实时数据库和最新数据。


    实际上，普通 Web 开发者的流程可能不包含预发布服务器，因为开发服务器通常可以兼任预发布服务器。在以下章节中，为简化问题，我们将假设只处理开发服务器和生产服务器。


    ## 不同服务器的不同配置


    在将 Web 应用程序文件部署到生产服务器之前，我们必须处理不同服务器需要不同配置的问题。这样做的原因是，我们应该能够将所有文件部署到生产服务器，并使它们立即可用，而无需随后修改生产配置文件。


    例如，在你的开发环境中，数据库服务器很可能与 Web 服务器是同一台物理机器（这意味着你的`PHP`将连接到“`localhost`”上的服务器）。在生产环境中，情况可能并非如此。许多
    Web 主机将数据库服务器与 Web 服务器分离。因此，你可能需要不同的数据库连接设置。为了处理这个问题，我们在应用程序的`settings.ini`文件中添加一个新段落。


    当我们在第 2 章创建设置文件时，所有配置字符串都位于一个名为`development`的段落中，该段落用方括号表示如下：


    ```

    [development]

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


