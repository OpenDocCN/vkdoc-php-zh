- "# 访问密钥 ID 无法做到的事\n\n访问密钥 ID 无法做到的是，让你通过网站销售的亚马逊产品获得佣金。要获得收入，你需要申请一个`关联者 ID`。这个`关联者\
  \ ID`将用于你在亚马逊专区展示的“从亚马逊购买”链接，亚马逊通过它来识别你是该笔销售的来源。\n\n`关联者 ID`甚至可用于包含亚马逊产品链接的静态网页，并且无需你同时拥有用途不同的\
  \ ECS 访问密钥 ID。\n\n因此，在进一步操作之前，如果你想通过“亚马逊超级帽子”专区赚钱，请前往 `http://associates.amazon.com/gp/associates/apply/main.html`\
  \ 获取你的`关联者 ID`。否则，如果你目前只对学习 ECS 感兴趣，可以跳过这一步。\n\n## 使用 REST 访问亚马逊电子商务服务\n\n访问 REST\
  \ Web 服务需要请求一个格式正确的 URL。请在浏览器中尝试以下链接（别忘了将字符串 `[Your Access Key ID]` 替换为你之前获得的真实访问密钥\
  \ ID）：\n\n```\nhttp://webservices.amazon.com/onca/xml?Service=AWSECommerceService\n\
  &AWSAccessKeyId=[Your Access Key ID]\n&Operation=ItemLookup\n&IdType=ASIN\n&ItemId=159059648X\n\
  ```\n\n**提示：** 请确保将整个 URL 输入为单行；这里将其拆分为独立元素是为了便于阅读。\n\n你的浏览器将显示一个包含你正在阅读的书籍信息的 XML\
  \ 结构。图 17-3 展示了 Firefox 中显示的 XML 结构，它清晰地呈现了 XML 文档树。\n\n---\n\n**图 17-3.** *Web\
  \ 服务请求的 XML 响应*\n\n很酷吧？你刚刚见证了 REST 的实际应用。亚马逊数据库中的每个产品都有一个唯一的标识符，称为 ASIN（亚马逊标准商品编号）。对于图书，ASIN\
  \ 就是图书的 ISBN（本书的 ASIN 为 `159059648X`）。\n\n你刚刚发出的 Web 服务请求向 ECS 传达了以下信息：我有一个访问密钥\
  \ ID（`AWSAccessKeyId=[Your Access Key ID]`），我想执行一项商品查询操作（`&Operation=ItemLookup`），以了解更多关于\
  \ ASIN 为 `159059648X` 的产品信息（`&IdType=ASIN&ItemId=159059648X`）。\n\n在这个例子中，你并没有获得关于这本书的详细信息——没有价格或库存信息，也没有封面图片或客户评论的链接。ECS\
  \ 4.0 引入了更精细的数据控制方式，即使用响应组（响应组是一组关于产品的信息集合）。\n\n**注意：** 在撰写本文时，ECS 提供了超过 35 个可能的响应组列表。在本书中，我们只会解释\
  \ HatShop 所用响应组的作用；完整的列表请查阅 ECS 文档。\n\n---\n\n那么，让我们通过使用响应组来请求更多数据。在你之前组合的链接末尾，添加以下字符串以获取关于本书的更具体信息：\n\
  \n`&ResponseGroup=Request,SalesRank,Small,Images,OfferSummary`\n\n完整的链接应如下所示：\n\n\
  ```\nhttp://webservices.amazon.com/onca/xml?Service=AWSECommerceService\n&AWSAccessKeyId=[Your\
  \ Access Key ID]\n&Operation=ItemLookup\n&IdType=ASIN\n&ItemId=159059648X\n```\n\
  \n\n\n`&ResponseGroup=Request,SalesRank,Small,Images,OfferSummary` 来自亚马逊网站（Amazon.com）的新\
  \ XML 响应包含了关于该商品更详细的信息，如图 17-4 所示。\n\n**图 17-4.** *Web 服务请求的 XML 响应*  \n我们刚刚混合使用了五个响应组：`Request`、`SalesRank`、`Small`、`Images`\
  \ 和 `OfferSummary`。要了解更多关于响应组的信息，请访问 `http://developer.amazonwebservices.com/connect/kbcategory.jspa?categoryID=5`，并点击“最新技术文档”（Latest\
  \ Tech Docs）按钮。或者，你也可以点击“技术文档”（Technical Documentation）链接，然后点击最新版本文档的链接。你可以下载 PDF\
  \ 格式的文档，也可以在线阅读：`http://docs.amazonwebservices.com/AWSEcommerceService/2006-09-13/`。\n\
  \n在 ECS 文档中，可以在“API 参考”（API Reference）的“响应组”（Response Groups）部分找到响应组的详细信息。以下是前一个示例中使用的五个响应组的描述：\n\
  \n- `Request` 响应组是每种操作中的默认响应组，它会返回你用于发起请求的名称-值对列表。\n- `SalesRank` 响应组返回有关商品当前在亚马逊网站（Amazon.com）上销售排名的数据。\n\
  - `Small` 响应组返回响应中包含的商品的一般数据（如 ASIN、商品名称、URL 等）。这是 `ItemLookup` 操作（如本示例所示）的默认响应组。\n\
  - `Images` 响应组提供响应中每个商品的三张图片（小图、中图和大图）的地址。\n- `OfferSummary` 响应组返回响应中每个商品的价格信息。\n\
  \n接下来，我们继续学习如何从 PHP 发起 REST 请求。为了充实未来的 Amazon Super Hats 部门，你将在亚马逊网站（Amazon.com）的服装（Apparel）部门中搜索关键词“super\
  \ hats”。一种简单的方法是使用 PHP 的 `file_get_contents` 函数，如下面的脚本所示。\n\n要测试使用 REST 访问 Web 服务，请在\
  \ `hatshop` 目录中创建一个名为 `test_rest.php` 的新文件，并在其中写入以下代码：\n\n```php\n<?php\n// 告知浏览器即将接收一个\
  \ XML 文档。\nheader('Content-type: text/xml');\n\n/* 请务必在下面这行代码中，将字符串 '[Your Access\
  \ Key ID]' 替换为你的访问密钥 ID */\n$url = 'http://webservices.amazon.com/onca/xml?Service=AWSECommerceService'\
  \ .\n    '&AWSAccessKeyId=[Your Access Key ID]' .\n    '&Operation=ItemSearch' .\n\
  \    '&Keywords=super+hats' .\n    '&SearchIndex=Apparel' .\n    '&ResponseGroup=Request,Medium';\n\
  \necho file_get_contents($url);\n?>\n```\n\n**注意：** 某些 PHP 安装环境和网站托管提供商可能默认不允许运行此代码。在这种情况下，你可以在\
  \ `php.ini` 中更改此设置：\n\n```\nallow_url_fopen = On\n```\n\n或者，你可以将以下行添加到 `include/config.php`\
  \ 中。第二种方案是首选，因为它只影响你的应用程序，并且在需要将应用程序迁移到其他服务器时，该设置仍然有效。\n\n```\nini_set('allow_url_fopen',\
  \ 'On');\n```\n\n加载 `http://localhost/hatshop/test_rest.php` 将会显示关于亚马逊超级帽子（Super\
  \ Hats）的 XML 数据（见图 17-5）。\n\n**图 17-5.** *来自亚马逊的超级帽子*\n\n为了练习并构建更多 XML 链接，只需研究“API\
  \ 参考”（API Reference）中的示例即可。\n\n\n\n"
- "# ECS 4.0 文档章节\n\n本材料将向您展示如何使用 REST 执行多种亚马逊操作。\n\n## 使用 SOAP 访问亚马逊电子商务服务\n\n通过\
  \ SOAP，您可以使用一个复杂的 API 来访问所需的 Amazon.com 功能。以下代码使用了亚马逊 API 中的 `AWSECommerceService`、`ItemSearch`\
  \ 和 `ItemSearchRequest` 对象来执行搜索帽子的操作，这与您之前使用 REST 进行的搜索操作相同。\n\n**提示：** 要使用 SOAP\
  \ 访问亚马逊服务器，我们使用了 PHP SOAP 扩展。关于 PHP SOAP 功能的文档可以在 <http://www.php.net/soap/> 找到。请查阅附录\
  \ A，以确保您在 PHP 安装中启用了 SOAP 支持。\n\n要测试使用 SOAP 访问 Web 服务，请在您的 `hatshop` 目录中创建一个名为 `test_soap.php`\
  \ 的新文件，并在其中编写以下代码：\n\n```php\n<?php\n\ntry\n{\n\n    // 初始化 SOAP 客户端对象\n\n    $client\
  \ = new SoapClient(\n\n        'http://webservices.amazon.com/AWSECommerceService/AWSECommerceService.wsdl');\n\
  \n    /* 别忘了在下一行中将字符串 '[Your Access Key ID]' 替换为您的订阅 ID */\n\n    $request = array\
  \ ('Service' => 'AWSECommerceService',\n\n                     'AWSAccessKeyId'\
  \ => '[Your Access Key ID]',\n\n                     'Request' => array ('Operation'\
  \ => 'ItemSearchRequest',\n\n                                        'Keywords'\
  \ => 'super+hats',\n\n                                        'SearchIndex' => 'Apparel',\n\
  \n                                        'ResponseGroup' => array ('Request',\n\
  \n                                                                  'Medium')));\n\
  \n    $result = $client->ItemSearch($request);\n\n    echo '<pre>';\n\n    print_r($result);\n\
  \n    echo '</pre>';\n\n}\n\ncatch (SoapFault $fault)\n\n{\n\n    trigger_error('SOAP\
  \ Fault: (faultcode: ' . $fault->faultcode . ', ' .\n\n                  'faultstring:\
  \ ' . $fault->faultstring . ')', E_USER_ERROR);\n\n}\n\n?>\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n整个 SOAP 请求代码被包含在一个 `try` 块中。如果 SOAP 请求失败，它会抛出一个 `SoapFault` 类型的异常，我们通过 `trigger_error()`\
  \ 函数将其转换为一个错误。关于 SOAP 异常的更多信息，请阅读 <http://www.php.net/manual/en/function.is-soap-fault.php>。\n\
  \nSOAP 请求的结果是一个包含请求数据的对象。如果您在浏览器中加载 `test_soap.php`（别忘了在其中放入您的 Access Key ID），它应该会以一种不易于人类阅读的文本格式显示数据。\n\
  \n代码首先创建了一个指向亚马逊 SOAP Web 服务的 SOAP 客户端对象：\n\n```php\n// 初始化 SOAP 客户端对象\n$client\
  \ = new SoapClient(\n    'http://webservices.amazon.com/AWSECommerceService/AWSECommerceService.wsdl');\n\
  ```\n\n所引用的 WSDL（Web 服务定义语言）文件描述了亚马逊 SOAP 服务器能够理解的所有函数及其参数类型。之前创建的亚马逊 SOAP 客户端对象知道所有这些函数，您现在可以像这样调用它们：\n\
  \n```php\n$result = $client->ItemSearch($request);\n```\n\n或者，您也可以使用 `__soapCall`\
  \ 函数（<http://www.php.net/manual/en/function.soap-soapclient-soapcall.php>）来进行完全相同的调用并隐式地获得相同的结果，如下所示：\n\
  \n```php\n$result->__soapCall('ItemSearch', array ($request));\n```\n\n这个 Web 服务请求对\
  \ `\"Apparel\"` 商店中的 `\"super+hats\"` 关键词执行了一个 `ItemSearch` 操作。整个请求被放置在一个 `try-catch`\
  \ 块中，该块会捕获任何潜在的异常并生成一个错误。关于包含 SOAP 错误细节的 `SoapFault` 异常类，请阅读 <http://www.php.net/manual/en/function.is-soap-fault.php>。加载\
  \ `test_soap.php` 将生成如图 17-6 所示的结果。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
