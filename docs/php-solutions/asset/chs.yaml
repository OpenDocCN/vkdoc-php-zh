  \    - `$loader` 对象\n    - `$messages`\n    - `moveFile()` 方法\n    - `move_uploaded_file()`\
  \ 函数\n    - `namespace` 关键字\n    - `$permitted` 属性\n        - `allowAllTypes()`\
  \ 方法\n        - `checkFile()` 方法\n        - `checkType()` 方法\n        - `is_numeric()`\
  \ 函数\n    - `$max` 属性\n    - `setMaxSize()` 方法\n    - `upload_test` 文件夹\n    - `PhpSolutions/File`\
  \ 文件夹\n    - 属性\n        - `protected` 关键字\n        - `public` 关键字\n    - 公有方法\n\
  \    - 重命名重复文件\n    - 创建 setter 方法\n    - `$thumbDestination` 属性\n    - 创建 `ThumbnailUpload.php`\n\
  \    - `try/catch` 代码块\n    - 上传错误\n        - `checkFile()` 方法\n        - `$_FILES`\
  \ 数组\n        - `getErrorMessage()` 方法\n        - `getMaxSize()` 方法\n        - `MIME`\
