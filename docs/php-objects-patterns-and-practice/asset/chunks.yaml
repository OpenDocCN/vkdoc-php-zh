- fmt: '# Summary


    In this chapter, we came to grips with PHP’s advanced object-oriented features.
    Some of these will become familiar as you work through the book. In particular,
    I will return frequently to abstract classes, exceptions, and static methods.


    In the next chapter, I take a step back from built-in object features and look
    at classes and functions designed to help you work with objects.


    # 5. Object Tools


    As we have seen, PHP supports object-oriented programming through language constructs
    such as classes and methods. The language also provides wider support through
    functions and classes designed to help you work with objects.


    In this chapter, we will look at some tools and techniques that you can use to
    organize, test, and manipulate objects and classes.


    This chapter will cover the following tools and techniques:


    - **Namespaces**: Organize your code into discrete package-like compartments

    - **Include paths**: Setting central accessible locations for your library code

    - **Class and object functions**: Functions for testing objects, classes, properties,
    and methods

    - **The Reflection API**: A powerful suite of built-in classes that provide unprecedented
    access to class information at runtime


    ## PHP and Packages


    A package is a set of related classes, usually grouped together in some way. Packages
    can be used to separate parts of a system from one another. Some programming languages
    formally recognize packages and provide them with distinct namespaces. PHP has
    no native concept of a package, but as of PHP 5.3, it introduced namespaces. I’ll
    look at this feature in the next section. I’ll also take a look at the old way
    of organizing classes into package-like structures.


    ### PHP Packages and Namespaces


    Although PHP does not intrinsically support the concept of a package, developers
    have traditionally used both naming schemes and the filesystem to organize their
    code into package-like structures.


    Until PHP 5.3, developers were forced to name their files in a global context.
    In other words, if you named a class `ShoppingBasket`, it would become instantly
    available across your system. This caused two major problems. First, and most
    damaging, was the possibility of naming collisions. You might think that this
    is unlikely. After all, all you have to do is remember to give all your classes
    unique names, right? The trouble is, we all rely increasingly on library code.
    This is a good thing, of course, because it promotes code reuse. But assume your
    project does this:


    ```

    // listing 05.01

    require_once __DIR__ . "/../useful/Outputter.php";

    class Outputter

    {

    // output data

    }

    ```


    Now assume you incorporate the included file at `useful/Outputter.php`:


    ```

    // listing 05.02

    class Outputter

    {

    //

    }

    ```


    Well, you can guess what will happen, right? This happens:


    ```

    PHP Fatal error:  Cannot declare class Outputter because the name is already in
    use in /var/popp/src/ch05/batch01/useful/Outputter.php on line 4

    ```


    Back before the introduction of namespaces, there was a conventional workaround
    to this problem. The answer was to prepend package names to class names, so that
    class names were guaranteed to be unique:


    ```

    // listing 05.03

    // my/Outputer.php

    require_once __DIR__ . "/../useful/Outputter.php";

    class my_Outputter

    {

    // output data

    }

    // listing 05.04

    // useful/Outputter.php

    class useful_Outputter

    {

    //

    }

    ```


    The problem here was that, as projects got more involved, class names grew longer
    and longer. It was not an enormous problem, but it resulted in issues with code
    readability, and made it harder to hold classnames in your head while you worked.
    Many cumulative coding hours were lost to typos.


    If you’re maintaining legacy code, you may well still see code that follows this
    convention. For that reason, I’ll return briefly to the old way of handling packages
    later in this chapter.


    #### Namespaces to the Rescue


    PHP 5.3 introduced namespaces. In essence, a namespace is a bucket in which you
    can place your classes, functions, and variables. Within a namespace you can access
    these items without qualification. From outside, you must either import the namespace,
    or reference it, in order to access the items it contains.


    Confused? An example should help. Here I rewrite the previous example using namespaces:


    ```

    // listing 05.05

    namespace my;

    require_once __DIR__ . "/../useful/Outputter.php";

    class Outputter

    {

    // output data

    }

    // listing 05.06

    namespace useful;

    class Outputter

    {

    //

    }

    ```


    Notice the `namespace` keyword. As you might expect, this keyword establishes
    a namespace. If you are using this feature, then the namespace declaration must
    be the first statement in its file. I have created two namespaces: `my` and `useful`.
    Typically, though, you’ll want to have deeper namespaces. You’ll start with an
    organization or project identifier. Then you’ll want to further qualify this by
    package. PHP lets you declare nested namespaces. To do this, you simply use a
    backslash character to divide each level:


    ```

    // listing 05.07

    namespace popp\ch05\batch04\util;

    class Debug

    {

    public static function helloWorld()

    {

    print "hello from Debug\n";

    }

    }

    ```


    You will typically use a name related to a product or organisation to define a
    repository. I might use one of my domains: `getinstance.com`, for example. Because
    a domain name is unique to its owner, this is a trick that Java developers typically
    use for their package names. They invert domain names so that they run from the
    most generic to the most specific. Alternatively, I might use the namespace I
    have chosen for code examples in this book: `popp`, for the book name. Once I’ve
    identified my repository, I might go on to define packages. In this case, I use
    the chapter and then a numbered batch. This allows me to organise groups of examples
    into discrete buckets. So at this point in the chapter, I am at `popp\ch05\batch04`.
    Finally, I can further organise code by category. I’ve gone with `util`.


    So how would I call the method? In fact, it depends where you’re doing the calling
    from. If you are calling the method from within the namespace, you can go ahead
    and call the method directly:


    ```

    Debug::helloWorld() ;

    ```


    This is known as an unqualified name. Because I’m already in the `popp\ch05\batch04\util`
    namespace, I don’t have to prepend any kind of path to the class name. If I were
    accessing the class from outside of a namespaced context, I could do this:


    ```

    \popp\ch05\batch04\Debug::helloworld();

    ```


    What output would I get from the following code:


    ```

    namespace main;

    popp\ch05\batch04\Debug::helloworld();

    ```


    That’s a trick question. In fact, this is my output:


    ```

    PHP Fatal error:  Class ''popp\ch05\batch04\Debug'' not found in...

    ```


    That’s because I’m using a relative namespace here. PHP is looking below the namespace
    `main` for `popp\ch05\batch04\util` and not finding it. Just as you can make absolute
    URLs and filepaths by starting off with a separator, so you can with namespaces.
    This version of the example fixes the previous error:


    ```

    namespace main;

    \popp\ch05\batch04\Debug::helloworld();

    ```


    That leading backslash tells PHP to begin its search at the root, and not from
    the current namespace.


    But aren’t namespaces supposed to help you cut down on typing? The `Debug` class
    declaration is shorter, certainly, but those calls are just as wordy as they would
    have been with the old naming convention. You can get around this with the `use`
    keyword. This allows you to alias other namespaces within the current namespace.
    Here’s an example:


    ```

    namespace main;

    use popp\ch05\batch04\util;

    util\Debug::helloWorld();

    ```'
