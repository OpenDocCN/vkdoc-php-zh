- fmt: '### 3\. We spoke much about files, but what we really meant was photos.


    The idea is that users can upload multiple photos, and that these are referenced
    in the database. `Width` and `height` are useful photo characteristics for determining
    how the photo should be rendered and/or modified. We didn’t use them here, but
    they can be used in a number of practical ways, such as for creating thumbnails
    or rendering in a slideshow.


    ### 4\. We would begin by checking whether a file has been uploaded.


    After performing any required file validation, we would then post the file to
    the cloud server, instead of moving it to permanent storage (on our own server).
    The steps of determining metadata and saving references to the database would
    still apply, but might be subtly different in terms of how they get the information.


    ## Exercises


    1.  Our code is quite minimal, in terms of file validation. Try adding some checks
    for things such as file size, mime type, and file name, to ensure that the files
    being uploaded are indeed valid images.


    2.  Using the stored `width` and `height` properties, try creating thumbnails
    for the uploaded photos, so that the search and profile pages don’t break when
    large photos are uploaded. One PHP function that might help you is `imagecopyresized()`.


    3.  We spoke a little about using cloud-based storage servers. If you are feeling
    particularly adventurous, try connecting to, and utilizing one of these services
    to store the uploaded files.


    > **Note** You can read more about the `imagecopyresized()` method at [www.php.net/manual/en/function.imagecopyresized.php](http://www.php.net/manual/en/function.imagecopyresized.php).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## Chapter 19: Extending


    One of the biggest differentiators of popular frameworks is how easily they can
    be extended with third-party libraries. Up until now, all the classes we have
    developed have belonged either to the framework or to the application.


    ### Goals


    - We need to understand how we can create our own libraries.

    - We need to understand how we can use libraries from other developers.

    - We need to understand what the Observer design pattern is and why it’s relevant
    to our application.

    - We need to build a means of listening for and emitting events within our applications.


    ### Foxy


    The first kind of library we will look at is the kind we create ourselves. While
    these libraries are not strictly third party, the potential exists for us to reuse
    them in many projects. They aren’t “application” enough that we would want to
    bundle them with the rest of the application code, but they aren’t “framework”
    enough that we would want to add them to the framework code either.


    A few years ago, I created a library for the express purpose of determining a
    user’s browser, and serving a targeted style sheet that would allow for custom
    fonts to be used in CSS. This is similar to Google’s Web Fonts ([www.google.com/webfonts](http://www.google.com/webfonts));
    in fact, I think that’s what inspired me to write the library in the first place.


    I decided to call this library `Foxy` (a portmanteau of the words *font* and *proxy*).
    This library will inspire our own font proxy library, which will be slightly simpler,
    but essentially the same.


    ### Custom CSS Fonts


    CSS, while not the focus of this book, is an inescapable part of the modern web.
    If you are unfamiliar, think of it as the dress code for elements in an HTML page.
    Style declarations (which are instructions for the appearance of certain aspects
    of an element) are targeted to specific elements, by way of CSS selectors. CSS
    selectors are string representations of structured element markup.


    Modern browsers have fairly good support for custom fonts, and the concept is
    by no means new. There are also some good alternatives to this library, which
    are very good at what they do. We’re not building this library because we think
    we can do better, but rather to gain a basic understanding of how we can extend
    our framework.


    [www.it-ebooks.info](http://www.it-ebooks.info/)'
