  trans: "\n# 检查您的网站是否支持 PHP\n\n判断网站是否支持 PHP 最简单的方法是咨询您的托管公司。另一种方法是将一个 PHP 页面上传到您的网站，看看它是否能正常运行。即使您知道网站支持\
    \ PHP，也请执行以下测试来确认正在运行的版本：\n\n1.  打开脚本编辑器，在空白页面中输入以下代码：\n\n    `<?php echo phpversion();`\n\
    \n2.  将文件保存为 `phpversion.php`。务必确保您的操作系统不会在 `.php` 后添加 `.txt` 文件扩展名。如果您在 Mac 上使用\
    \ TextEdit，请确保它不会以多信息文本格式 (RTF) 保存文件。如果您有任何疑问，请使用本书附赠文件 `ch02` 文件夹中的 `phpversion.php`。\n\
    \n3.  将 `phpversion.php` 像上传 HTML 页面一样上传到您的网站，然后在浏览器中输入该 URL。假设您将文件上传到网站的顶级目录，URL\
    \ 将类似于 [`www.example.com/phpversion.php`](http://www.example.com/phpversion.php)。\n\
    \n    如果您在屏幕上看到像 7.2.0 这样的三位数字，那么恭喜：PHP 已启用。该数字告诉您服务器上运行的 PHP 版本。*本书假定您运行的是 PHP\
    \ 7.2.0 或更高版本。*\n\n4.  如果您收到类似“Parse error”的消息，这意味着支持 PHP，但您在文件中输入代码时出现了错误。请改用\
    \ `ch02` 文件夹中的版本。\n\n5.  如果您只看到原始代码，则表示不支持 PHP。\n\n如果您的服务器运行的 PHP 版本低于 7.2.0，请联系您的托管商并告知他们您需要最新的稳定版\
    \ PHP。如果托管商拒绝，是时候更换托管公司了。\n\n## 为什么不应再使用 PHP 5\n\nPHP 版本由三个用点分隔的数字组成。第一个数字是主版本号；第二个是分支版本号；最后一个是修订版本号。主版本会引入可能破坏现有网站的显著更改，包括移除过时的特性。分支版本会引入新功能；但分支版本极不可能破坏与同一主版本的兼容性。修订版本包含针对错误和安全问题的修复。\n\
    \n当 PHP 5 于 2004 年发布时，开发团队仍在为 PHP 4 持续发布安全更新。这不仅延迟了对 PHP 5 的采用，也减缓了对这个新主版本的重要改进。政策的改变促使\
    \ PHP 每年发布一个新的分支版本。每个分支版本会获得两年的主动支持，用于修复错误和安全问题，随后再获得一年的关键安全修复支持。此后便不再提供支持。\n\n\
    PHP 5 的最终版本（5.6）获得了近两年半的额外支持；但其生命周期已于 2018 年 12 月 31 日结束。使用 PHP 5 会使您的网站和宝贵数据面临风险，因为安全漏洞将无法得到修复。此外，您也无法获得\
    \ PHP 7 新功能的优势，更不用说它的速度是 PHP 5 的两倍。对 PHP 7.0 的所有支持以及 PHP 7.1 的主动支持在本书出版前已经结束。这就是本书要求最低使用\
    \ PHP 7.2 的原因。尽管本书中的大部分代码可以在旧版 PHP 上运行，但有些则不能。\n\n## 决定在何处测试页面\n\n与普通网页不同，您不能直接在\
    \ Windows 文件资源管理器或 Mac 的 Finder 中双击 PHP 页面并在浏览器中查看。它们需要通过支持 PHP 的 Web 服务器进行解析或处理。如果您的托管公司支持\
    \ PHP，您可以上传文件到您的网站并在那里进行测试。但是，每次进行更改时都需要上传文件。在早期阶段，您可能会发现由于代码中的一些小错误，需要经常这样做。随着经验的增长，您仍然需要频繁上传文件，因为您会想尝试不同的想法。\n\
    \n如果您想立即开始使用 PHP，完全可以将您自己的网站用作测试平台。然而，您很快就会发现需要一个本地的 PHP 测试环境。本章的其余部分将向您展示如何做到这一点，并提供适用于\
    \ Windows 和 macOS 的说明。\n\n## 本地测试环境所需的组件\n\n要在本地计算机上测试 PHP 页面，您需要安装以下组件：\n\n-\
    \   Web 服务器，这是一种用于显示网页的软件，而非独立的计算机\n-   PHP\n-   MySQL 或 MariaDB 数据库，以及 phpMyAdmin，一个用于管理数据库的基于\
    \ Web 的前端界面\n\n### 提示\nMariaDB ([`https://mariadb.org/`](https://mariadb.org/))\
    \ 是社区开发的 MySQL 即用替代品。本书中的代码与 MySQL 和 MariaDB 完全兼容。\n\n您所需的所有软件都是免费的。您唯一需要付出的成本是下载必要文件所需的时间，当然，还有确保一切设置正确所需的时间。在大多数情况下，您应该能在不到一个小时内完成设置并运行，很可能时间更短。只要您的计算机至少有\
    \ 1GB 的可用磁盘空间，您就应该能够安装所有软件——即使是配置一般的计算机也可以。\n\n### 提示\n如果您的本地计算机上已经有一个 PHP 7 测试环境，则无需重新安装。只需查看本章末尾标题为“检查您的\
    \ PHP 设置”的章节即可。\n\n### 单个程序还是集成包？\n\n多年来，我一直主张分别安装 PHP 测试环境的每个组件，而不是使用一次性安装 Apache、PHP、MySQL\
    \ 和 phpMyAdmin 的软件包。我的建议是基于早期一些集成包的不可靠质量，它们安装容易但几乎无法卸载或升级。然而，目前可用的集成包非常出色，我现在毫不犹豫地推荐它们。\n\
    \n在我的计算机上，我使用 XAMPP 用于 Windows ([`www.apachefriends.org/index.html`](http://www.apachefriends.org/index.html))\
    \ 和 MAMP 用于 macOS ([`www.mamp.info/en/`](http://www.mamp.info/en/))。还有其他可用的软件包；选择哪个并不重要。\n\
    \n## Windows 系统上的设置\n\n在继续之前，请确保您以管理员身份登录。\n\n### 让 Windows 显示文件扩展名\n\n默认情况下，大多数\
    \ Windows 计算机会隐藏常见的三或四个字符的文件扩展名，例如 `.doc` 或 `.html`，因此在对话框和 Windows 文件资源管理器中，您只会看到\
    \ `thisfile` 而不是 `thisfile.doc` 或 `thisfile.html`。\n\n请按照以下说明在 Windows 10 和 8\
    \ 中启用文件扩展名的显示：\n\n1.  打开文件资源管理器。\n2.  选择“视图”以展开文件资源管理器窗口顶部的功能区。\n3.  选中“文件扩展名”复选框。\n\
    \n显示文件扩展名更安全——您可以识别出病毒编写者是否将 `.exe` 或 `.scr` 可执行文件附加到了一个看似无害的文档上。\n\n### 选择 Web\
    \ 服务器\n\n大多数 PHP 安装都运行在 Apache Web 服务器上。两者都是开源的，并且能很好地协同工作。然而，Windows 有自己的 Web\
    \ 服务器：Internet 信息服务 (IIS)，它也支持 PHP。微软已与 PHP 开发团队密切合作，将 PHP 在 IIS 上的性能提升到与 Apache\
    \ 大致相同的水平。那么，您应该选择哪一个呢？\n\n除非您需要 IIS 用于 ASP 或 ASP.NET，否则我建议您按照下一节所述，使用 XAMPP 或其他集成包安装\
    \ Apache。如果您需要使用 IIS，安装 PHP 最便捷的方法是使用 Microsoft Web 平台安装程序 (Web PI)，您可以从 [`www.microsoft.com/web/downloads/platform.aspx`](http://www.microsoft.com/web/downloads/platform.aspx)\
    \ 下载。\n"
- fmt: "### Installing an All-in-one Package on Windows\n\nThere are three popular\
    \ packages for Windows that install Apache, PHP, MySQL or MariaDB, phpMyAdmin,\
    \ and several other tools on your computer in a single operation: XAMPP ([`www.apachefriends.org/index.html`](http://www.apachefriends.org/index.html)),\
    \ WampServer ([`www.wampserver.com/en/`](http://www.wampserver.com/en/)), and\
    \ EasyPHP ([`www.easyphp.org`](http://www.easyphp.org)). The installation process\
    \ normally takes only a few minutes. Once the package has been installed, you\
    \ might need to change a few settings, as explained later in this chapter.\n\n\
    Versions are liable to change over the lifetime of a printed book, so I won’t\
    \ describe the installation process. Each package has instructions on its web\
    \ site.\n\n## Setting Up on macOS\n\nThe Apache web server and PHP are preinstalled\
    \ on macOS, but they’re not enabled by default. Rather than using the preinstalled\
    \ versions, I recommend that you use MAMP, which installs Apache, PHP, MySQL,\
    \ phpMyAdmin, and several other tools in a single operation.\n\nTo avoid conflicts\
    \ with the preinstalled versions of Apache and PHP, MAMP locates all the applications\
    \ in a dedicated folder on your hard disk. This makes it easier to uninstall everything\
    \ by simply dragging the MAMP folder to the Trash if you decide you no longer\
    \ want MAMP on your computer.\n\n### Installing MAMP\n\nBefore you begin, make\
    \ sure you’re logged in to your computer with administrative privileges.\n\n1.\
    \  Go to [`www.mamp.info/en/downloads/`](http://www.mamp.info/en/downloads/) and\
    \ select the link for MAMP & MAMP PRO. This downloads a disk image that contains\
    \ both the free and paid-for versions of MAMP.\n2.  When the download completes,\
    \ launch the disk image. You’ll be presented with a license agreement. You must\
    \ click Agree to continue with mounting the disk image.\n3.  Follow the onscreen\
    \ instructions.\n4.  Verify that MAMP has been installed in your `Applications`\
    \ folder.\n\n### Note\n\nMAMP automatically installs both the free and paid-for\
    \ versions in separate folders called `MAMP` and `MAMP PRO`. The paid-for version\
    \ makes it easier to configure PHP and to work with virtual hosts, but the free\
    \ version is perfectly adequate, especially for beginners. If you want to remove\
    \ the `MAMP PRO` folder, don’t drag it to the Trash. Open the folder and double-click\
    \ the `MAMP PRO` uninstall icon. The paid-for version requires both folders.\n\
    \n### Testing and Configuring MAMP\n\nBy default, MAMP uses nonstandard ports\
    \ for Apache and MySQL. Unless you’re using multiple installations of Apache and\
    \ MySQL, change the port settings as described in the following steps:\n\n1. \
    \ Double-click the MAMP icon in `Applications/MAMP`. If you’re presented with\
    \ a panel inviting you to access your data from multiple Macs with MAMP Cloud\
    \ Functions, click the Close button at the top left to dismiss the panel. The\
    \ MAMP Cloud Functions are a paid-for service that’s not required for this book.\
    \ You can get details by clicking the Learn More button. There’s also a check\
    \ box to prevent the panel from being displayed each time you start MAMP.\n2.\
    \  Click Start Servers in the MAMP control panel (see Figure [2-1](#332054_4_En_2_Chapter.xhtml#Fig1)).\
    \ Tiny green lights should come on alongside Apache Server and MySQL Server to\
    \ indicate that they’re running. Your default browser should also launch and present\
    \ you with the MAMP welcome page.\n    \n    ![../images/332054_4_En_2_Chapter/332054_4_En_2_Fig1_HTML.jpg](images/332054_4_En_2_Chapter/332054_4_En_2_Fig1_HTML.jpg)\n\
    \    \n    Figure 2-1. Starting the servers in the MAMP control panel\n    \n\
    3.  If your browser doesn’t launch automatically, click Open WebStart page in\
    \ the MAMP control panel.\n4.  Check the URL in the browser address bar. It begins\
    \ with `localhost:8888`. The `:8888` indicates that Apache is listening for requests\
    \ on the nonstandard port 8888.\n5.  Minimize the browser and click anywhere in\
    \ the MAMP control panel to make it the active application.\n6.  Go to the main\
    \ MAMP menu at the top of the screen and select Preferences (or use the keyboard\
    \ shortcut Cmd+,).\n7.  Select Ports at the top of the panel that opens. It shows\
    \ that Apache and MySQL are running on ports 8888 and 8889 (see Figure [2-2](#332054_4_En_2_Chapter.xhtml#Fig2)).\n\
    \    \n    ![../images/332054_4_En_2_Chapter/332054_4_En_2_Fig2_HTML.jpg](images/332054_4_En_2_Chapter/332054_4_En_2_Fig2_HTML.jpg)\n\
    \    \n    Figure 2-2. Changing the Apache and MySQL ports\n    \n8.  Click \"\
    Set Web & MySQL ports to 80 & 3306\" as shown in Figure [2-2](#332054_4_En_2_Chapter.xhtml#Fig2).\
    \ The numbers change to the standard ports: 80 for Apache and 3306 for MySQL.\n\
    \n### Note\n\nMAMP now supports Nginx as an alternative web server. When I clicked\
    \ \"Set Web & MySQL ports to 80 & 3306,\" both Apache Port and Nginx Port changed\
    \ to 80, which prevented the settings from being accepted. If this happens, manually\
    \ reset Nginx Port to 7888.\n\n1.  Click OK and enter your Mac password when prompted.\
    \ MAMP restarts both servers.\n\n### Tip\n\nIf any other program is using port\
    \ 80, Apache won’t restart. If you can’t find what’s preventing Apache from using\
    \ port 80, open the MAMP preferences panel and click \"Set MAMP ports to default.\"\
    \n\n1.  When both lights are green again, the MAMP welcome page reloads into your\
    \ browser. This time, the URL shouldn’t have a colon followed by a number appearing\
    \ after `localhost` because Apache is now listening on the default port.\n\n##\
    \ Where to Locate Your PHP Files (Windows and Mac)\n\nYou need to create your\
    \ files in a location where the web server can process them. Normally, this means\
    \ that the files should be in the server’s document root or in a subfolder of\
    \ the document root. The default location of the document root for the most common\
    \ setups is as follows:\n\n- **XAMPP**: `C:\\xampp\\htdocs`\n- **WampServer**:\
    \ `C:\\wamp\\www`\n- **EasyPHP**: `C:\\EasyPHP\\www`\n- **IIS**: `C:\\inetpub\\\
    wwwroot`\n- **MAMP**: `/Applications/MAMP/htdocs`\n\nTo view a PHP page, you need\
    \ to load it in a browser using a URL. The URL for the web server’s document root\
    \ in your local testing environment is `http://localhost/`.\n\n### Caution\n\n\
    If you needed to reset MAMP back to its default ports, you will need to use `http://localhost:8888`\
    \ instead of `http://localhost`.\n\nIf you store the files for this book in a\
    \ subfolder of the document root called `phpsols-4e`, the URL is `http://localhost/phpsols-4e/`\
    \ followed by the name of the folder (if any) and file.\n\n### Tip\n\nUse `http://127.0.0.1/`\
    \ if you have problems with `http://localhost/`. `127.0.0.1` is the loopback IP\
    \ address all computers use to refer to the local machine."
