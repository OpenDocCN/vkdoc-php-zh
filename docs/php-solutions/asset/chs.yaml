  \n\n\n### 查找没有匹配外键的记录\n\n取 PHP 方案 15-4 中的 `SELECT` 查询，并移除搜索特定文章的条件，结果如下所示：\n\n```\n\
  SELECT title, article, DATE_FORMAT(updated, '%W, %M %D, %Y') AS updated, filename,\
  \ caption\nFROM blog INNER JOIN images USING (image_id)\n```\n\n如果你在 phpMyAdmin\
  \ 的 SQL 选项卡中运行此查询，将产生如图 15-9 所示的结果。\n\n![A978-1-4842-0635-5_15_Fig9_HTML.jpg](img/A978-1-4842-0635-5_15_Fig9_HTML.jpg)\n\
  \n**图 15-9.** `INNER JOIN` 仅查找两张表中都存在匹配的记录\n\n使用 `INNER JOIN` 时，`SELECT` 查询仅成功找到完全匹配的记录。其中一篇文章没有关联图片，因此\
  \ `articles` 表中的 `image_id` 值为 `NULL`，这与 `images` 表中的任何内容都不匹配。\n\n在这种情况下，你需要使用 `LEFT\
  \ JOIN` 代替 `INNER JOIN`。使用 `LEFT JOIN` 时，结果将包含在左表中有匹配但在右表中没有匹配的记录。左和右指的是执行连接时的顺序。将\
  \ `SELECT` 查询重写如下：\n\n```\nSELECT title, article, DATE_FORMAT(updated, '%W, %M %D,\
  \ %Y') AS updated, filename, caption\nFROM blog LEFT JOIN images USING (image_id)\n\
  ```\n\n当你在 phpMyAdmin 中运行它时，你将获得所有四篇文章，如图 15-10 所示。\n\n![A978-1-4842-0635-5_15_Fig10_HTML.jpg](img/A978-1-4842-0635-5_15_Fig10_HTML.jpg)\n\
  \n**图 15-10.** `LEFT JOIN` 包含在右表中没有匹配的记录\n\n如你所见，来自右表（`images`）的空字段显示为 `NULL`。\n\
  \n如果两表中的列名不同，请使用 `ON`，如下所示：\n\n```\nFROM table_1 LEFT JOIN table_2 ON table_1.col_name\
  \ = table_2.col_name\n```\n\n现在，你可以在 `details.php` 中重写 SQL 查询，如下所示：\n\n```\n$sql\
  \ = \"SELECT title, article, DATE_FORMAT(updated, '%W, %M %D, %Y') AS updated,\n\
  filename, caption\nFROM blog LEFT JOIN images USING (image_id)\nWHERE blog.article_id\
  \ = $article_id\";\n```\n\n如果你点击 `更多` 链接查看没有关联图片的文章，你现在应该能看到文章正确显示，如图 15-11 所示。其他文章也应该仍然能正确显示。完成的代码可以在\
  \ `details_mysqli_02.php` 和 `details_pdo_02.php` 中找到。\n\n![A978-1-4842-0635-5_15_Fig11_HTML.jpg](img/A978-1-4842-0635-5_15_Fig11_HTML.jpg)\n\
  \n**图 15-11.** `LEFT JOIN` 也检索出没有匹配外键的文章\n\n### 创建智能链接\n\n`details.php` 底部的链接直接返回到\
  \ `blog.php`。当 `blog` 表中只有四项记录时这没问题，但一旦数据库中有了更多记录，你就需要建立一个导航系统，正如我在第 12 章中展示的那样。导航系统的问题在于，你需要一种方法让访客返回到他们离开时结果集中的同一位置。\n\
  \n#### PHP 方案 15-5：返回导航系统中的同一位置\n\n此 PHP 方案检查访客是从内部链接还是外部链接到达的。如果来源页面位于同一站点内，该链接会将访客返回到同一位置。如果来源页面是外部站点，或者服务器不支持必要的超全局变量，脚本将替换为标准链接。此处以\
  \ `details.php` 为例展示，但它可用于任何页面。\n\n该代码不依赖于数据库，因此对于 MySQLi 和 PDO 是相同的。\n\n找到 `details.php`\
  \ 主体中的返回链接。它看起来像这样：\n\n```\n<p><a href=\"blog.php\">返回博客</a></p>\n```\n\n将光标放在第一个引号的右侧，并插入以下以粗体突出显示的代码：\n\
  \n```\n<p><a href=\"\n<?php\n// 检查浏览器是否支持 $_SERVER 变量\nif (isset($_SERVER['HTTP_REFERER'])\
  \ && isset($_SERVER['HTTP_HOST'])) {\n    $url = parse_url($_SERVER['HTTP_REFERER']);\n\
  \    // 查找访客是否来自不同的域名\n    if ($url['host'] == $_SERVER['HTTP_HOST']) {\n      \
  \  // 如果域名相同，则使用来源 URL\n        echo $_SERVER['HTTP_REFERER'];\n    }\n} else {\n\
  \    // 否则，发送到主页\n    echo 'blog.php';\n} ?>\">返回博客</a></p>\n```\n\n`$_SERVER['HTTP_REFERER']`\
  \ 和 `$_SERVER['HTTP_HOST']` 是包含来源页面 URL 和当前主机名的超全局变量。你需要使用 `isset()` 检查它们是否存在，因为并非所有服务器都支持它们。此外，浏览器可能会屏蔽来源页面的\
  \ URL。\n\n`parse_url()` 函数创建一个包含 URL 每个部分的数组，因此 `$url['host']` 包含主机名。如果它与 `$_SERVER['HTTP_HOST']`\
  \ 匹配，你就知道访客是通过内部链接到达的，因此内部链接的完整 URL 将被插入到 `href` 属性中。这包括任何查询字符串，因此该链接会将访客送回导航系统中的同一位置。否则，将创建指向目标页面的普通链接。\n\
  \n完成的代码位于 `ch15` 文件夹中的 `details_mysqli_03.php` 和 `details_pdo_3.php`。\n\n## 章节回顾\n\
  \n使用 `INNER JOIN` 和 `LEFT JOIN` 检索存储在多个表中的信息相对简单。成功处理多表的关键在于构建它们之间的关系，使得复杂关系始终可以分解为\
  \ `1:1` 关系，必要时可以通过交叉引用（或链接）表来实现。下一章将继续探索多表操作，展示在插入、更新和删除记录时如何处理外键关系。\n\n"
- '# 16. 管理多个数据库表


  上一章向你展示了如何使用 `INNER JOIN` 和 `LEFT JOIN` 检索存储在多个表中的信息。你还学习了如何通过向子表添加额外的列并单独更新每条记录以插入外键来链接现有表。然而，大多数时候你会希望同时在两个表中插入数据。这带来了一个挑战，因为
  `INSERT` 命令一次只能操作一个表。你需要按照正确的顺序处理插入操作，从父表开始，这样你就可以获取新记录的主键，并与其他详细信息同时插入到子表中。在更新和删除记录时，也需要考虑类似的问题。涉及的代码并不难，但在构建脚本时，你需要清晰地将事件顺序牢记在心。


  本章将指导你完成在 `blog` 表中插入新文章的过程，可选地选择关联图片或上传新图片，并将文章分配到一个或多个类别，所有这些都在一次操作中完成。然后，你将构建脚本以更新和删除文章，同时不破坏相关表的参照完整性。


  你还将学习外键约束，它控制当你尝试删除在另一个表中仍存在外键关系的记录时会发生什么。并非所有数据库都支持外键约束，因此检查你的远程服务器是否支持非常重要。本章还解释了如果你的服务器不支持外键约束，你可以采取哪些措施来保护数据完整性。


  具体来说，你将学习以下内容：


  - 在相关表中插入、更新和删除记录

  - 在记录创建后立即找到其主键

  - 转换表的存储引擎

  - 在 InnoDB 表之间建立外键约束




  '
- "# 维护参照完整性\n\n对于单表来说，无论你更新一条记录多少次，或删除多少条记录，对其他记录的影响都为零。但一旦你将一条记录的主键作为外键存储在另一个表中，就创建了一个需要管理的依赖关系。例如，图\
  \ 16-1 展示了`blog`表中的第二篇文章（“见习艺伎去购物”）通过`article2cat`交叉引用表链接到了`Kyoto`和`People`这两个分类。\n\
  \n![A978-1-4842-0635-5_16_Fig1_HTML.jpg](img/A978-1-4842-0635-5_16_Fig1_HTML.jpg)\n\
  \n图 16-1.\n\n你需要管理外键关系以避免孤儿记录\n\n如果你删除了这篇文章，但没有删除交叉引用表中`article_id 2`对应的条目，那么查找`Kyoto`或`People`分类下所有文章的查询将尝试匹配`blog`表中一条不存在的记录。类似地，如果你决定删除某个分类，却没有同时删除交叉引用表中与之匹配的记录，那么查找与某篇文章关联分类的查询将尝试匹配一个不存在的分类。\n\
  \n不久之后，你的数据库就会充斥着孤儿记录。幸运的是，维护参照完整性并不困难。SQL 通过建立被称为外键约束的规则来实现这一点，这些规则告诉数据库当你更新或删除一条在另一个表中有从属记录的数据时该怎么做。\n\
  \n## 对外键约束的支持\n\n外键约束由`InnoDB`支持，这是 MySQL 5.5 及更高版本中的默认存储引擎。MariaDB 中对应的存储引擎是 Percona\
  \ XtraDB，但它自识别为`InnoDB`并具有相同功能。即使你的远程服务器运行的是最新版本的 MySQL 或 MariaDB，也不能保证一定支持`InnoDB`，因为你的托管公司可能禁用了它。\n\
  \n如果你的服务器运行的是旧版本的 MySQL，默认存储引擎是`MyISAM`，它不支持外键约束。不过，你可能仍能访问`InnoDB`，因为自 MySQL 4.0\
  \ 版本起，它已成为 MySQL 不可分割的一部分。将`MyISAM`表转换为`InnoDB`非常简单，只需几秒钟。\n\n如果你无法访问`InnoDB`，则需要通过在\
  \ PHP 脚本中构建必要的规则来维护参照完整性。本章将介绍这两种方法。\n\n> **注意**  \n> `MyISAM`表的优点是速度非常快。它们需要的磁盘空间更少，非常适合存储不经常更改的大量数据。它们还支持全文索引和搜索，这一功能在\
  \ MySQL 5.6 和 MariaDB 10.0.5 之前的`InnoDB`中不可用。\n\n### PHP 解决方案 16-1：检查是否支持 InnoDB\n\
  \n此 PHP 解决方案说明了如何检查你的远程服务器是否支持`InnoDB`存储引擎。\n\n如果你的托管公司提供 phpMyAdmin 来管理数据库，请在远程服务器上启动\
  \ phpMyAdmin，如果可用，点击屏幕顶部的`Engines`选项卡。这将显示一个类似于图 16-2 的存储引擎列表。\n\n![A978-1-4842-0635-5_16_Fig2_HTML.jpg](img/A978-1-4842-0635-5_16_Fig2_HTML.jpg)\n\
  \n图 16-2.\n\n通过 phpMyAdmin 检查存储引擎支持情况\n\n该列表显示所有存储引擎，包括那些不支持的。不支持的或已禁用的存储引擎会变灰显示。如果你不确定`InnoDB`的状态，请在列表中点击它的名称。如果不支持`InnoDB`，你会看到一条相关提示信息。反之，如果你看到类似图\
  \ 16-3 的变量列表，那么你很幸运——`InnoDB`是受支持的。\n\n![A978-1-4842-0635-5_16_Fig3_HTML.jpg](img/A978-1-4842-0635-5_16_Fig3_HTML.jpg)\n\
  \n图 16-3.\n\n确认 InnoDB 受支持\n\n如果 phpMyAdmin 中没有`Engines`选项卡，请选择数据库中的任意表，然后点击屏幕右上角的`Operations`选项卡。在`表选项`部分，点击`存储引擎`字段右侧的下拉箭头以显示可用选项（见图\
  \ 16-4）。如果列出了`InnoDB`，则表示它受支持。\n\n![A978-1-4842-0635-5_16_Fig4_HTML.jpg](img/A978-1-4842-0635-5_16_Fig4_HTML.jpg)\n\
  \n图 16-4.\n\n表选项中列出了可用的存储引擎\n\n如果以上两种方法均未给出答案，请打开`ch16`文件夹中的`storage_engines.php`。编辑前三行，插入远程服务器上数据库的主机名、用户名和密码。将`storage_engines.php`上传到你的网站，并在浏览器中加载该页面。你应该会看到存储引擎列表及其支持级别，如图\
  \ 16-5 所示。在某些情况下，`NO`会被`DISABLED`替代。\n\n![A978-1-4842-0635-5_16_Fig5_HTML.jpg](img/A978-1-4842-0635-5_16_Fig5_HTML.jpg)\n\
  \n图 16-5.\n\nstorage_engines.php 中的 SQL 查询会报告哪些引擎受支持\n\n如图 16-5 所示，MySQL 的典型安装支持多种存储引擎。令人惊讶的是，你可以在同一个数据库中使用不同的存储引擎。事实上，建议你这样做。即使你的远程服务器支持`InnoDB`，对于没有外键关系的表，使用`MyISAM`通常效率更高。对于有外键关系的表，则使用`InnoDB`。如果你需要支持事务，也应该使用`InnoDB`。\n\
  \n> **注意**  \n> 事务是一系列相关的 SQL 查询。如果系列中的某一部分失败，事务将被终止，数据库会回滚到事务开始前的原始状态。财务数据库广泛使用事务，但这超出了本书的范围。\n\
  \n我将在本章后面部分解释如何将表转换为`InnoDB`以及如何设置外键约束。在此之前，让我们先看看如何建立和使用外键关系，无论使用的是哪种存储引擎。\n\n\n\
  \n### 向多个表中插入记录\n\n一条 `INSERT` 查询只能向一个表中插入数据。因此，在处理多个表时，你需要仔细规划插入脚本，以确保所有信息都被存储，并且建立了正确的外键关系。\n\
  \n前一章中的 `PHP Solutions 15-2 (MySQLi)` 和 `15-3 (PDO)` 演示了如何为数据库中已注册的图像添加正确的外键。但是，在插入一条新的博客文章时，你需要能够选择一张现有图像、上传一张新图像，或者选择不带任何图像。这意味着你的处理脚本需要检查是否已选择或上传了图像，并相应地执行相关命令。此外，为零个或多个分类标记一篇博客文章，会增加脚本需要做出的决策数量。图\
  \ 16-6 展示了决策链。\n\n![A978-1-4842-0635-5_16_Fig6_HTML.jpg](img/A978-1-4842-0635-5_16_Fig6_HTML.jpg)\n\
  \n**图 16-6.** 插入一篇带有图像和分类的新博客文章的决策链\n\n当页面首次加载时，表单尚未提交，因此页面仅显示插入表单。现有的图像和分类都通过查询数据库列在插入表单中，其方式与\
  \ `PHP Solutions 15-2` 和 `15-3` 中的更新表单处理图像的方式相同。\n\n表单提交后，处理脚本会经历以下步骤：\n\n-   如果上传了图像，则处理上传，将图像的详细信息存储在\
  \ `images` 表中，然后脚本获取新记录的主键。\n-   如果没有上传图像，但选择了一张已有图像，脚本则通过 `$_POST` 数组提交的值获取其外键。\n\
  -   无论哪种情况，新的博客文章都会被插入到 `blog` 表中，同时将图像的主键作为外键。但是，如果既未上传图像也未从现有图像中选择，则在插入文章到 `blog`\
  \ 表时不带外键。\n-   最后，脚本检查是否选择了任何分类。如果选择了，脚本会获取新文章的主键，并将其与所选分类的主键组合，插入到 `article2cat`\
  \ 表中。\n\n如果在任何阶段出现问题，脚本都需要放弃其余流程并重新显示用户的输入。这个脚本相当长，因此我会将其分成几个部分。第一步是创建 `article2cat`\
  \ 交叉引用表。\n\n### 创建交叉引用表\n\n在处理数据库中的多对多关系时，你需要构建一个类似图 16-1 中所示的交叉引用表。交叉引用表仅由两列组成，这两列被共同声明为表的主键（称为复合主键）。如果你查看图\
  \ 16-7，会发现 `article_id` 和 `cat_id` 两列都多次出现相同的数字——这在主键中是不可接受的，主键必须是唯一的。然而，在复合主键中，是这两个值的组合保持唯一。前两个组合\
  \ `1,3` 和 `2,1` 在表中的其他任何地方都没有重复，其他组合也是如此。\n\n![A978-1-4842-0635-5_16_Fig7_HTML.jpg](img/A978-1-4842-0635-5_16_Fig7_HTML.jpg)\n\
  \n**图 16-7.** 在交叉引用表中，两列共同构成一个复合主键\n\n#### 设置分类表和交叉引用表\n\n在 `ch16` 文件夹中，你可以找到 `categories.sql`，其中包含了用于创建\
  \ `categories` 表和交叉引用表 `article2cat` 的 SQL 语句，以及一些示例数据。用于创建这些表的设置列在表 16-1 和 16-2\
  \ 中。两个数据库表都只有两列。\n\n**表 16-1.** `categories` 表的设置\n\n| 名称 | 类型 | 长度/值 | 属性 | 空值\
  \ | 索引 | A_I |\n| --- | --- | --- | --- | --- | --- | --- |\n| `cat_id` | `INT`\
  \ |  | `UNSIGNED` | 未选择 | `PRIMARY` | 已选择 |\n| `category` | `VARCHAR` | 20 |  |\
  \ 未选择 |  |  |\n\n**表 16-2.** `article2cat` 交叉引用表的设置\n\n| 名称 | 类型 | 长度/值 | 属性 | 空值\
  \ | 索引 | A_I |\n| --- | --- | --- | --- | --- | --- | --- |\n| `article_id` | `INT`\
  \ |  | `UNSIGNED` | 未选择 | `PRIMARY` |  |\n| `cat_id` | `INT` |  | `UNSIGNED` | 未选择\
  \ | `PRIMARY` |  |\n\n关于交叉引用表定义的重要一点是，两列都被设为主键，并且两列的 `A_I`（`AUTO_INCREMENT`）复选框都未被选中。\n\
  \n> **注意**：要创建复合主键，必须同时将两列声明为主键。如果错误地只将其中一列声明为主键，数据库会阻止你稍后添加第二列。你必须先删除单列上的主键索引，然后将其重新应用于两列。是这两列的组合被视为一个主键。\n\
  \n### 获取上传图像的文件名\n\n该脚本使用了第 6 章中的 `Upload` 类，但需要对该类稍作调整，因为上传文件的文件名被合并到了 `$messages`\
  \ 属性中。\n\n#### PHP Solution 16-2: 改进 Upload 类\n\n这个 PHP 方案通过创建一个新的受保护属性来存储成功上传文件的名称，并提供一个公共方法来检索这个名称数组，从而改编了第\
  \ 6 章中的 `Upload` 类。\n\n1. 打开 `PhpSolutions/File` 文件夹中的 `Upload.php`。或者，从 `ch16/PhpSolutions/File`\
  \ 文件夹复制 `Upload.php`，并将其保存到 `phpsols` 站点根目录下的 `PhpSolutions/File` 文件夹中。\n2. 在文件顶部的属性列表中添加以下代码行：\n\
  \n   `protected $filenames = [];`\n\n   这将初始化一个名为 `$filenames` 的受保护属性，初始值为一个空数组。\n\
  \n3. 修改 `moveFile()` 方法，以便在文件成功上传时，将修改后的文件名添加到 `$filenames` 属性中。新代码以粗体高亮显示。\n\n\
  \   ```\n   protected function moveFile($file) {\n       $filename = isset($this->newName)\
  \ ? $this->newName : $file['name'];\n       $success = move_uploaded_file($file['tmp_name'],\
  \ $this->destination . $filename);\n       if ($success) {\n           // 将修改后的文件名添加到已上传文件数组中\n\
  \           $this->filenames[] = $filename;\n           $result = $file['name']\
  \ . ' was uploaded successfully';\n           if (!is_null($this->newName)) {\n\
  \               $result .= ', and was renamed ' . $this->newName;\n           }\n\
  \           $this->messages[] = $result;\n       } else {\n           $this->messages[]\
  \ = 'Could not upload ' . $file['name'];\n       }\n   }\n   ```\n\n   只有在文件被成功移动到目标文件夹后，该名称才会被添加到\
  \ `$filenames` 数组中。\n\n4. 添加一个公共方法来返回存储在 `$filenames` 属性中的值。代码如下所示：\n\n   ```\n\
  \   public function getFilenames() {\n       return $this->filenames;\n   }\n  \
  \ ```\n\n   将此代码放在类定义中的任何位置都可以，但通常的做法是将所有公共方法放在一起。\n\n5. 保存 `Upload.php`。如果需要检查你的代码，请将其与\
  \ `ch16/PhpSolutions/File` 文件夹中的 `Upload_01.php` 进行对比。\n\n\n\n### 调整插入表单以处理多表数据\n\
  \n你在第 13 章中创建的博客文章插入表单，已经包含了将大部分详细信息插入`blog`表所需的代码。与其从头开始，不如调整现有页面。目前，该页面只包含一个用于输入标题的文本字段和一个用于撰写文章的文本区域。\n\
  \n你需要为分类添加一个多选的`<select>`列表，并为现有图像添加一个下拉`<select>`菜单。\n\n为了防止用户在上传新图像的同时选择现有图像，我们通过一个复选框和\
  \ JavaScript 来控制相关输入字段的显示。选中复选框会禁用现有图像的下拉菜单，并显示新图像及其说明的输入字段。取消选中复选框则会隐藏并禁用文件和说明字段，同时重新启用下拉菜单。如果\
  \ JavaScript 被禁用，上传新图像和说明的选项将被隐藏。\n\n**注意：** 为节省篇幅，本章后续的 PHP 解决方案仅提供 MySQLi 的详细说明。PDO\
  \ 版本的结构和 PHP 逻辑完全相同。唯一的区别在于向数据库提交 SQL 查询和显示结果的命令。完整注释的 PDO 文件位于`ch16`文件夹中。\n\n####\
  \ PHP 解决方案 16-3：添加分类和图像输入字段\n\n本 PHP 解决方案通过为分类和图像添加输入字段，开始调整第 13 章中的博客条目插入表单。\n\n\
  在`admin`文件夹中，找到并打开你在第 13 章中创建的`blog_insert_mysqli.php`版本。或者，将`ch16`文件夹中的`blog_insert_mysqli_01.php`复制到`admin`文件夹，并从文件名中移除`_01`。\n\
  \n分类和现有图像的`<select>`元素需要在页面首次加载时查询数据库，因此你需要将连接脚本和数据库连接移到检查表单是否已提交的条件语句之外。找到以粗体高亮显示的行：\n\
  \n```\nif (isset($_POST['insert'])) {\nrequire_once '../includes/connection.php';\n\
  // 初始化标志\n$OK = false;\n// 创建数据库连接\n$conn = dbConnect('write');\n```\n\n将它们移到条件语句之外，如下所示：\n\
  \n```\nrequire_once '../includes/connection.php';\n// 创建数据库连接\n$conn = dbConnect('write');\n\
  if (isset($_POST['insert'])) {\n// 初始化标志\n$OK = false;\n```\n\n页面主体中的表单需要能够上传文件，因此你需要在开始的`<form>`标签中添加`enctype`属性，如下所示：\n\
  \n```\n<form method=\"post\" action=\"\" enctype=\"multipart/form-data\">\n```\n\
  \n如果尝试上传文件时发生错误（例如，文件太大或不是图像文件），插入操作将会中止。修改现有的文本输入字段和文本区域，使用与第 5 章相同的技术重新显示值。文本输入字段如下所示：\n\
  \n```\n<input name=\"title\" type=\"text\" id=\"title\" value=\"<?php if (isset($error))\
  \ {\necho htmlentities($_POST['title']);\n} ?>\">\n```\n\n文本区域如下所示：\n\n```\n<textarea\
  \ name=\"article\" id=\"article\"><?php if (isset($error)) {\necho htmlentities($_POST['article']);\n\
  } ?></textarea>\n```\n\n确保开始和结束的 PHP 标签与 HTML 之间没有间隙。否则，你会在文本输入字段和文本区域内添加不必要的空白字符。\n\
  \n新的表单元素位于文本区域和提交按钮之间。首先，添加分类的多选`<select>`列表代码。代码如下所示：\n\n```\n<p>\n<label for=\"\
  category\">分类：</label>\n<select name=\"category[]\" size=\"5\" multiple id=\"category\"\
  >\n<?php\n// 获取分类\n$getCats = 'SELECT cat_id, category FROM categories ORDER BY\
  \ category';\n$categories = $conn->query($getCats);\nwhile ($row = $categories->fetch_assoc())\
  \ {\n?>\n<option value=\"<?= $row['cat_id']; ?>\" <?php\nif (isset($_POST['category'])\
  \ && in_array($row['cat_id'],\n$_POST['category'])) { echo 'selected';\n} ?>><?php\
  \ echo $row['category']; ?></option>\n<?php } ?>\n</select>\n</p>\n```\n\n为了允许选择多个值，`multiple`属性已被添加到`<select>`标签中，并且`size`属性被设置为`5`。这些值需要以数组形式提交，因此在`name`属性后添加了一对方括号。\n\
  \nSQL 查询`categories`表，并通过`while`循环用主键和分类名称填充`<option>`标签。如果`insert`操作失败，`while`循环中的条件语句会为`<option>`标签添加`selected`，以重新显示已选中的值。\n\
  \n保存`blog_insert_mysqli.php`并将页面加载到浏览器中。此时表单应如图 16-8 所示。\n\n![A978-1-4842-0635-5_16_Fig8_HTML.jpg](img/A978-1-4842-0635-5_16_Fig8_HTML.jpg)\n\
  \n**图 16-8。**\n\n\n\n```markdown\n多选`<select>`列表从`categories`表中提取值。导航至`ch16`文件夹中的`blog_insert_mysqli_02.php`，验证每个类别的主键是否已正确嵌入到每个`<option>`标签的`value`属性中。\n\
  \n接下来，创建`<select>`下拉菜单，用于显示数据库中已注册的图像。将此代码紧跟在你在步骤 5 中插入的代码之后：\n\n```\n<p>\n<label\
  \ for=\"image_id\">已上传图像：</label>\n<select name=\"image_id\" id=\"image_id\">\n\
