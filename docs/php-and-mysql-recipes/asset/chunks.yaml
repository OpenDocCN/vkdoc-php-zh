  trans: '好的，作为高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，将以下英文文本翻译成中文。



    # 问题


    由于 Web 服务器和浏览器交互的本质是每个请求都是浏览器和服务器之间的一个新连接，因此服务器很难得知请求来自同一个浏览器。服务器可以使用请求的 IP 地址和/或用户代理字符串。但在多个用户可以共享同一个公共
    IP 地址（NAT）的环境中，这并不能保证请求来自同一个用户。那么，是否有可能识别出这些请求来自同一个客户端呢？


    # 解决方案


    客户端和服务器之间可以交换的标头之一是 cookie 标头。此值源自服务器，作为响应的一部分。如果服务器设置了 cookie，浏览器将在后续对该服务器的请求中自动包含该
    cookie。可以使用 `header()` 函数设置 cookie，但 cookie 的格式并不简单，因此 PHP 提供了一个 `SetCookie()`
    函数，该函数接受多个参数，使得设置和清除 cookie 相对容易。


    浏览器可以将 cookie 存储在几个不同的位置。 cookie 可以存储在磁盘上。这使得 cookie 可以在客户端上持久存在很长时间，即使关闭并重新启动浏览器应用程序，它们也仍然可访问。所有
    cookie 都必须有一个过期时间。当设置非零值时，cookie 将自动写入磁盘，浏览器将在过期日期/时间后将其清除。


    另一种选择是使用内存 cookie，其过期时间设置为 0。这不会被写入磁盘，并且在浏览器关闭时会被删除。此外，`SetCookie()` 函数有几个选项可以将
    cookie 设置为安全，这意味着它仅在通过 HTTPS 连接时使用，并且 cookie 可以定义为仅限 HTTP。这将阻止客户端脚本代码（JavaScript）访问
    cookie。


    浏览器的用户可以随时清除 cookie，并且由于 cookie 只是磁盘上的文件，它们可以被伪造。服务器端的代码应采取适当措施来处理 cookie。此外，许多国家/地区要求网站声明其使用
    cookie 的目的。


    ## 工作原理


    以下示例展示了如何使用 cookie 来跟踪用户之前是否访问过该网站，并相应地打印一条特殊消息。


    ```php

    //12_3.php


    if ($_COOKIE[''visited'']) {


    echo "欢迎回来！";


    }


    else {


    echo "欢迎访问 mydomain.com";


    }


    SetCookie(''visited'', time(), time() + 30 * 86400);

    ```


    除了第一个参数（`name`）之外，`SetCookie()` 函数的所有参数都是可选的。


    首先，我们在超全局变量 `$_COOKIE` 中检查一个名为 `visited` 的键。这是检查是否设置了 cookie 的方式。基于此检查，脚本将打印两条消息之一，然后设置一个在未来
    30 天过期的 cookie。cookie 的值被设置为当前时间。这可以用来显示关于用户上次访问网站时间的附加信息。


    用户第一次请求该脚本时，他们会收到通用的欢迎消息，如果页面刷新或用户在 30 天内再次访问，他们将收到欢迎回来的消息。


    仅存在于内存中的 cookie 通常用于存储用户信息，这样网站就可以运行，而无需用户反复登录。这可以用作一个计时器，检查自上次请求服务器以来经过的时间，如果自上次请求以来时间过长，则强制用户再次提供凭据。


    ```php

    //12_4.php


    if (empty($_COOKIE[''access'']) || $_COOKIE[''access''] < time() - 15 * 60) {


    SetCookie(''access'');


    登录();


    }


    else {


    SetCookie(''access'', time(), 0);


    // 执行操作;


    }

    ```


    在这个例子中，我们检查一个名为 `access` 的 cookie，如果它未定义或其值早于 15 分钟，则强制用户执行登录，否则，`access` cookie
    的值被设置为当前时间，允许用户在下一次操作之前再有 15 分钟的锁定时间。


    `SetCookie()` 函数也可以只用一个参数调用，即 cookie 的名称。这将导致 cookie 被设置，但值为空。删除 cookie 是通过设置一个过期时间在过去的方式完成的。删除
    cookie 对内存 cookie 和写入磁盘的 cookie 都有效。


    在第 12-5 节中，我们将讨论会话数据的使用。当使用会话数据时，PHP 会自动生成一个名为 `PHPSESSID` 的 cookie。这是一个仅用于内存的
    cookie，用于标识存储在服务器端、特定于该浏览器的数据。


    ## 方案 12-4. 服务器变量


    ### 问题


    我们已经了解了如何根据用户与网站的交互来改变程序流程，但如果我们无法根据用户的地理位置或他们使用的是 HTTP 还是 HTTPS 版本的网站来做出响应，该怎么办？


    ### 解决方案


    `$_SERVER` 超全局变量中存储了许多与请求相关的值。这些值可用于提供特定内容或将用户重定向到不同的网站。请求方案可以通过 `$_SERVER[''REQUEST_SCHEME'']`
    检查。其值可以是 `http` 或 `https`。


    您还可以通过 `$_SERVER[''REMOTE_ADDR'']` 获取客户端机器的公网 IP 地址。这可用于检测用户的来源国家/地区。此信息并非总是准确的，因为用户在访问互联网之前可能经过多个代理，因此
    `$_SERVER` 变量中填充的将是请求来源的最后一个代理的 IP 地址。


    如果您决定“信任”该 IP 地址，您可以使用像 GeoIP 这样的服务将 IP 地址转换为地理位置。根据您使用的 GeoIP 订阅类型，这可以是一个国家/地区，也许还可以是一个州/省和一个城市名称。


    ### 工作原理


    如果您想确保用户在访问某些 URL 时使用的是您网站的安全版本，您可以将其添加到脚本中：


    ```php

    // 12_5.php


    if ($_SERVER[''REQUEST_SCHEME''] == ''http'') {


    $Location = $_SERVER[''SERVER_NAME''] . $_SERVER[''REQUEST_URI''];


    header("Location: https://" . $Location);


    exit;


    }

    ```


    作为替代方案，您可以使用浏览器的地理位置 API 来获取用户的位置。这在大多数支持 HTML 5 标准的浏览器中都可用。尽管大多数浏览器都支持该 API，但需要注意的是，用户必须同意披露这些信息。地理位置
    API 提供经度和纬度数据，可用于定位浏览器或提供与用户当前位置相关的内容。


    地理位置 API 是用 JavaScript 实现的，您需要一个表单或一个 AJAX 请求来将数据提交到服务器端。下一个示例展示了一个 HTML 5 文档，它将检测地理位置是否可用，如果用户接受请求，它将获取并打印纬度和经度。


    ```html

    <!DOCTYPE html>

    <!-- Position.html -->

    <html>

    <head>

    <script>

    function showPosition(position) {

    document.write("纬度: " + position.coords.latitude +

    "<br>经度: " + position.coords.longitude);

    }


    if (navigator.geolocation) {

    navigator.geolocation.getCurrentPosition(showPosition);

    }

    else {

    document.write("此浏览器不支持地理位置功能。");

    }

    </script>

    </head>

    <body>

    </body>

    </html>

    ```


    如果运行浏览器的设备配备了 GPS 接收器，其定位精度将高于连接到互联网的笔记本电脑或台式电脑。

