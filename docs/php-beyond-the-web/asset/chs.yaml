  \ |\n\n### 4.2 构建系统\n\n构建系统用于构建和部署软件到开发环境和/或生产环境。它们自动化了在部署软件新版本时出现的许多重复性任务。构建脚本和构建系统起源于像\
  \ C 这样的语言，这些语言在软件能够运行之前需要编译，并涵盖了诸如编译和链接各种软件模块以及管理源代码依赖关系等步骤。尽管 PHP 不是一种编译型语言，但构建系统仍然可以成为节省时间的利器，用于执行以下任务：\n\
  \n*   收集和管理资源（如图片、数据文件等）\n*   打包或移动脚本和资源\n*   归档旧版本或提交到版本控制系统\n*   运行自动化测试、静态分析和其他质量控制流程\n\
  *   运行代码压缩或混淆流程\n*   启动和停止相关服务\n*   刷新和重置你的测试环境\n*   清理或初始化数据库\n*   生成文档\n*   通知团队\n\
  \n或者任何其他需要确保你的脚本最新版本成功部署的事项。除了节省时间，它还有助于确保一致性并防止错误。你无疑会明白，试图修复一个因为你忘记复制最新版的小数据文件而导致的晦涩\
  \ bug 并不有趣。\n\n当然，你可以使用 shell 脚本（甚至更好的是 PHP CLI 脚本！）来构建你自己的构建系统，这对于小型或简单的项目来说可能就足够了。对于更大或更复杂的系统，现成的构建系统可能更节省时间。许多这样的系统可以处理\
  \ PHP，但最适合 PHP 工作的系统之一是 `Phing`。`Phing` 是为 PHP 构建的，可以很容易地用 PHP 类进行扩展，并且已经内置了广泛与\
  \ PHP 相关的任务。告诉 `Phing` 做什么只需创建简单的 XML 文件，如果需要，你甚至可以使用 PHP 的 `XMLwriter` 扩展以编程方式创建这些文件。\n\
