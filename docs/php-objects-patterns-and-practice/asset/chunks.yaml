  trans: '

    # PHP 与其他语言


    PHP 的惊人流行意味着其边界很早就受到了严峻的考验。正如你将在下一章中看到的，PHP 最初是一组用于管理个人主页的宏。随着 PHP 3 以及更大程度上 PHP
    4 的出现，该语言迅速成为大型企业网站背后的成功驱动力。然而，在许多方面，PHP 诞生之初遗留的影响仍然延续到了脚本设计和项目管理中。在某些领域，PHP 仍然有着不公正的名声，被视作一种业余爱好者的语言，最适合用于展示任务。


    大约在同一时期（世纪之交），其他编程社区中新的理念开始流行。对面向对象设计的兴趣激发了 Java 社区。既然 Java 是一种面向对象语言，你可能会认为这有些多余。当然，Java
    提供了一种更易于顺应而非抗拒的编程粒度，但使用类和对象本身并不能决定特定的设计方法。


    设计模式作为一种描述问题及其解决方案本质的方式，其概念最早在 20 世纪 70 年代被讨论。也许恰如其分的是，这个想法起源于建筑领域，而非计算机科学。到了
    20 世纪 90 年代初，面向对象程序员开始使用相同的技术来命名和描述软件设计问题。由埃里希·伽玛、理查德·赫尔姆、拉尔夫·约翰逊和约翰·弗利西德斯（此后在本书中将以其亲切的昵称“四人组”指代）合著的关于设计模式的开创性著作《设计模式：可复用面向对象软件的基础》（Addison-Wesley
    Professional，1995 年）至今仍是不可或缺的。它所包含的模式是任何初入该领域者的必经第一步，这也是本书中大部分模式都源于此书的原因。


    Java 语言本身在其 API 中部署了许多核心模式，但直到 20 世纪 90 年代末，设计模式才渗透到整个编程社区的认知中。模式迅速充斥了商业街书店的计算机区域，电子邮件列表和论坛上也爆发了第一场论战。


    无论你认为模式是一种传递工艺知识的强大方式，还是很大程度上是空谈（考虑到本书的标题，你应该能猜到我对这个问题的立场），都很难否认它们所鼓励的对软件设计的重视本身是有益的。


    相关主题也日益突出。其中之一是由肯特·贝克倡导的极限编程（XP）。XP 是一种项目方法，鼓励灵活、面向设计、高度专注的规划与执行。


    XP 原则中突出的一点是坚持认为测试对项目的成功至关重要。测试应自动化、频繁运行，并且最好在目标代码编写之前设计好。


    XP 还规定项目应分解为小（非常小）的迭代。代码和需求都应时刻接受审查。架构和设计应是一个共享且持续关注的问题，从而促成代码的频繁修订。


    如果说 XP 是设计运动中的激进派，那么温和派则由我读过的最好的编程书籍之一很好地代表：《程序员修炼之道：从小工到专家》，作者安德鲁·亨特和大卫·托马斯（Addison-Wesley
    Professional，1999 年）。


    XP 曾被一些人认为有点狂热崇拜的意味，但它源于最高水平的二十多年面向对象实践，其原则被广泛借鉴。特别是代码修订，即所谓的重构，被作为模式的有力辅助手段而采用。重构自
    20 世纪 80 年代以来一直在演变，但在马丁·福勒于 1999 年出版的《重构：改善既有代码的设计》（Addison-Wesley Professional）一书中被系统化地编目，并定义了该领域。


    随着 XP 和模式的崛起，测试也成为一个热门话题。强大的`JUnit`测试平台的发布进一步强调了自动化测试的重要性，它成为了 Java 程序员武器库中的关键武器。由肯特·贝克和埃里希·伽玛撰写的一篇里程碑式的文章《被测试感染：程序员热爱编写测试》（[`http://junit.sourceforge.net/doc/testinfected/testing.htm`](http://junit.sourceforge.net/doc/testinfected/testing.htm)）精彩地介绍了这一主题，并且至今仍具有巨大影响力。


    大约在这个时候，PHP 4 发布了，它带来了效率的提升，并且至关重要的是，增强了对对象的支持。这些增强使得完全面向对象的项目成为可能。程序员们欣然接受了这一特性，这多少有些出乎
    Zend 创始人 Zeev Suraski 和 Andi Gutmans 的意料，他们当时已加入 Rasmus Lerdorf 共同管理 PHP 开发。正如你将在下一章看到的，PHP
    的对象支持远非完美。但通过严格自律和谨慎使用语法，人们确实可以开始同时用对象和 PHP 进行思考。


    尽管如此，正如本章开头所描述的那样的设计灾难仍然很常见。设计文化还有一段距离，在关于 PHP 的书籍中几乎不存在。然而，在线上，兴趣是显而易见的。Leon
    Atkinson 在 2001 年为 Zend 撰写了一篇关于 PHP 和模式的文章，Harry Fuecks 于 2002 年在[`www.phppatterns.com`](http://www.phppatterns.com)（现已关闭）创办了他的日志。基于模式的框架项目如`BinaryCloud`开始出现，同时自动测试和文档工具也相继涌现。


    2003 年，第一个 PHP 5 测试版的发布确保了 PHP 作为一种面向对象编程语言的未来。Zend 2 引擎提供了大幅改进的对象支持。同样重要的是，它发出了一个信号：对象和面向对象设计现在是
    PHP 项目的核心。


    多年来，PHP 5 不断发展改进，集成了诸如命名空间和闭包等重要新特性。在此期间，它巩固了作为服务器端 Web 编程最佳选择的声誉。


    2015 年 12 月发布的 PHP 7 代表了这一趋势的延续。它特别提供了对标量类型声明和返回类型声明的支持——这是许多开发者（以及本书的先前版本）多年来一直呼吁的两种特性。如果你不明白这意味着什么或为何重要，请继续阅读！


    ## 关于本书


    本书并不试图在面向对象设计领域开创新局面；在这一点上，它是岌岌可危地站在巨人的肩膀上。相反，我将在 PHP 的背景下审视一些成熟的设计原则和一些关键模式（特别是《设计模式》——经典四人组书中记载的那些）。最后，我将超越代码的严格限制，着眼于有助于确保项目成功的工具和技术。除了本篇引言和一个简短的结论之外，本书分为三个主要部分：对象、模式和实践。

    '
- fmt: '### Objects


    I begin Part 2 with a quick look at the history of PHP and objects, charting their
    shift from afterthought in PHP 3 to core feature in PHP 5.


    You can still be an experienced and successful PHP programmer with little or no
    knowledge of objects. For this reason, I start from first principles to explain
    objects, classes, and inheritance. Even at this early stage, I look at some of
    the object enhancements that PHP 5 and PHP 7 introduced.


    The basics established, I delve deeper into our topic, examining PHP’s more advanced
    object-oriented features. I also devote a chapter to the tools that PHP provides
    to help you work with objects and classes.


    It is not enough, however, to know how to declare a class, and to use it to instantiate
    an object. You must first choose the right participants for your system and decide
    the best ways for them to interact. These choices are much harder to describe
    and to learn than the bald facts about object tools and syntax. I finish Part
    2 with an introduction to object-oriented design with PHP.


    ### Patterns


    A pattern describes a problem in software design and provides the kernel of a
    solution. “Solution” here does not mean the kind of cut-and-paste code that you
    might find in a cookbook (excellent though cookbooks are as resources for the
    programmer). Instead, a design pattern describes an approach that can be taken
    to solve a problem. A sample implementation may be given, but it is less important
    than the concept that it serves to illustrate.


    Part 3 begins by defining design patterns and describing their structure. I also
    look at some of the reasons behind their popularity.


    Patterns tend to promote and follow certain core design principles. An understanding
    of these can help in analyzing a pattern’s motivation, and can usefully be applied
    to all programming. I discuss some of these principles. I also examine the Unified
    Modeling Language (UML), a platform-independent way of describing classes and
    their interactions.


    Although this book is not a pattern catalog, I examine some of the most famous
    and useful patterns. I describe the problem that each pattern addresses, analyze
    the solution, and present an implementation example in PHP.


    ### Practice


    Even a beautifully balanced architecture will fail if it is not managed correctly.
    In Part 4, I look at the tools available to help you create a framework that ensures
    the success of your project. If the rest of the book is about the practice of
    design and programming, Part 4 is about the practice of managing your code. The
    tools that I examine can form a support structure for a project, helping to track
    bugs as they occur, promoting collaboration among programmers, and providing ease
    of installation and clarity of code.


    I have already discussed the power of the automated test. I kick off Part 4 with
    an introductory chapter that gives an overview of problems and solutions in this
    area.


    Many programmers are guilty of giving in to the impulse to do everything themselves.
    `Composer`, together with `Packagist`, its main repository, offers access to thousands
    of dependency managed packages that can be stitched into projects with ease. I
    look at the tradeoffs between implementing a feature yourself and deploying a
    `Composer` package.


    While I’m on the topic of `Composer`, I look at the installation mechanism that
    makes the deployment of a package as simple as a single command.


    Code is about collaboration. This fact can be rewarding. It can also be a complete
    nightmare. `Git` is a version control system that enables many programmers to
    work together on the same codebase without overwriting one another’s work. It
    lets you grab snapshots of your project at any stage in development, see who has
    made which changes, and split the project into mergeable branches. `Git` will
    save your project one day.


    When people and libraries collaborate, they often bring different conventions
    and styles to the party. While this is healthy, it can also undermine interoperability.
    Words like conform and comply give me the shivers, but it is undeniable that the
    creativity of the Internet is underpinned by standards. By obeying certain conventions,
    we are freed to play in an unimaginably vast sandbox. So, in a new chapter, I
    explore PHP standards, how they can help us, and how and why we should, yes, comply.


    Two facts seem inevitable. First, bugs often recur in the same region of code,
    making some work days an exercise in déjà vu. Second, often improvements break
    as much as, or more than, they fix. Automated testing can address both of these
    issues, providing an early warning system for problems in your code. I introduce
    `PHPUnit`, a powerful implementation of the so-called xUnit test platform designed
    first for Smalltalk but ported now to many languages, notably Java. I look in
    particular at `PHPUnit`’s features and more generally at the benefits, and some
    of the costs, of testing.


    Applications are messy. They may need files to be installed in nonstandard locations,
    or want to set up databases, or need to patch server configuration. In short,
    applications need stuff to be done during installation. `Phing` is a faithful
    port of a Java tool called `Ant`. `Phing` and `Ant` interpret a build file and
    process your source files in any way you tell them to. This usually means copying
    them from a source directory to various target locations around your system, but,
    as your needs get more complex, `Phing` scales effortlessly to meet them.


    Some companies enforce development platforms—but in many cases teams end up running
    an array of different operating systems. Contractors arrive wielding PC laptops
    (hello Paul Tregoing, fifth edition tech editor), some team members evangelize
    endlessly for their favorite Linux distro (that’s me and my Fedora), and many
    hold out for yet another sexy-looking PowerBook (the coffee bar and meeting room
    use of which doesn’t at all make you look like just another node in a hipster
    Borg army). All of these will run a LAMP stack with varying degrees of ease. Ideally,
    though, developers should run their code in environments that closely resemble
    the ultimate production system. I examine `Vagrant`, an application which uses
    virtualization so that team members can keep their idiosyncratic development platforms
    but run project code on a production-like system.


    Testing and build are all very well, but you have to install and run your tests,
    and keep on doing so in order to reap the benefits. It’s easy to become complacent
    and let things slide if you don’t automate your builds and tests. I look at some
    tools and techniques that are lumped together in the category “continuous integration”
    that will help you do just that.'
