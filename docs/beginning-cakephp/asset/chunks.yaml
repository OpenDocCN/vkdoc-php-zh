    09775ch11final 7/1/08 9:51 PM Page 188


    **188**


    C H A P T E R 1 1 ■ C O M P O N E N T S A N D U T I L I T I E S


    **Using Components**


    All components are stored in the app/controllers/components directory and are
    pulled into the controller like helpers, with the $components array. Like other
    parameters, components must be camel-cased and separated in the array by commas.
    Built-in components as well as custom ones must be included in the $components
    array to work in the controller, and like helpers, the App controller can include
    components for use in any or all controllers. See Listing 11-1.


    **Listing 11-1.** *Including Components in the Controller with the $components
    Array* var $components = array(''Session'',''RequestHandler'');


    Once a component is included in the controller, the controller references its
    functions by using the $this identifier. Remember to specify the component like
    you do with models: $this followed by the camel-cased name of the component and
    the function in use. Listing 11-2.


    **Listing 11-2.** *Running a Component Function in the Controller* $user = $this->Session->read(''User'');


    Components are not intended to work directly with the database, so the component
    does not do much more than return a variable, a string, or an array for the controller
    to use. If database calls are necessary, the controller using the component ought
    to run these calls through the model and provide the component with the necessary
    data. This does not mean that the components are limited to logic tests or reformatting
    forwarded data; like the Session and Cookie components, functions here can write
    to outside files or process images, and so forth.


    Besides allowing for custom components, Cake comes with several built-in components
    and utilities. Before building your own components, let’s first examine what Cake
    has to offer and explore how these component functions might improve an application.'
