    \ is: 1 New York Plaza, New York, NY 10004, U.S.A.\n\n*In memory of my dad. Thank\
    \ you for all you gave, and sorry for all I didn’t return.*\n\n## Introduction\n\
    \n> *There are many things in this universe you are not meant to understand. Now,\
    \ that does not mean they are not real.*\n> \n> —*ALF* (TV series)\n\nThis book\
    \ discusses the PHP programming language. PHP is a simple, beautiful, and elegant\
    \ language. Moreover, it is special in some sense. PHP is designed to execute\
    \ code on the server side. In other words, it is not enough to know PHP. It is\
    \ also necessary to understand how and for what it is used. That is important\
    \ since understanding the possibilities of a language is the key to using it effectively.\n\
    \n> **Note:** PHP is a language designed for programming and web programming.\n\
    \n### About PHP\n\nThe PHP language is used for creating sites and web applications.\
    \ It has a long story, is popular among developers, and is supported by most host\
    \ servers.\n\n| Details |\n| --- |\n| Hosting is a service for providing resources\
    \ and space on a server to host data and information (for example, web pages).\
    \ The host server is a server that hosts the information. For the sake of simplicity,\
    \ this means the host server is a computer (server) that hosts the user’s web\
    \ page (that is, the page where PHP is supposed to be used). |\n\nThe author of\
    \ PHP is Rasmus Lerdorf. The project started as writing scripts to support a personal\
    \ web page and was initially titled Personal Homepages Tools or PHP Tools. Then,\
    \ it was transformed into an independent and influential software product. Today,\
    \ the name PHP is usually associated with the phrase *Hypertext Preprocessor*,\
    \ which is not far from the truth.\n\n> **Note:** When writing this book, the\
    \ current version is PHP 8. On the other hand, in practice, the latest version\
    \ of the language does not immediately start to be used. There is some inertia\
    \ here due to both objective and subjective factors. Therefore, universal approaches\
    \ relevant to the last few language versions are considered. Notably, there is\
    \ no sixth version: the seventh version follows after the fifth. The reason is\
    \ that the attempt to release the sixth version was highly unsuccessful.\n\nPHP\
    \ is a scripted and interpreted language. Interpretability means that a program\
    \ is executed under the control of a particular program called an *interpreter*.\
    \ The interpreter reads the code line by line and executes the corresponding instructions.\n\
    \n![](images/613529_1_En_BookFrontmatter_Figd_HTML.gif)  \nA bell icon. The PHP\
    \ 8 Standard\n\nPHP 8 introduced a JIT compiler (short for *Just in Time*) for\
    \ compiling PHP code to speed up program execution. When compiled, the program\
    \ instructions are translated into processor-level instructions.\n\nScripting\
    \ languages are usually high-level ones. Unlike conventional programs, scripts\
    \ usually contain instructions for controlling ready-made software components.\
    \ In other words, a scripting language is a straightforward language. Although,\
    \ of course, not everything is always so rosy.\n\n| Details |\n| --- |\n| The\
    \ C language has influenced the syntax of the PHP language. Therefore, if you\
    \ know languages such as C, C++, C#, or Java, you will find many familiar syntax\
    \ constructions. |\n\nOf course, PHP is a programming language, among many others.\
    \ But it has an essential feature in how PHP codes are used.\n\nIf you are dealing\
    \ with any conventional programming language, the process of writing and using\
    \ programs looks like follows. First, you create the program code—in other words,\
    \ you write a program. Then, that program must be executed. How to do that depends\
    \ on the language, but the most crucial question is whether the program is *compiled*\
    \ or *interpreted*. If the program is compiled, a particular compiler program\
    \ translates your program into machine instructions (or something similar to them),\
    \ and then those instructions are executed. If the program is interpreted, a special\
    \ interpreter program reads your program and executes statements from the code.\
    \ But whatever happens, the important thing here is that you do all the operations\
    \ on the same computer. You run the program on the computer and get a result.\
    \ You can do anything you want with the result of the program execution, but the\
    \ critical point is that it is enough to have only one computer.\n\nWith the PHP\
    \ language, things are somewhat different. To understand the problem, let’s consider\
    \ what happens when you access a web page and how PHP is involved in that case."
