  trans: '

    #### 为主题示例添加视图切换选项


    基于我们希望为主题示例用户提供视图选择的前提，接下来我们探讨如何为商品集合页面添加列表视图，以补充现有的网格视图。为此，我们将使用前一章讨论过的 Shopify
    备选模板功能。


    首先，我们将 `templates/collection.liquid` 中的所有现有代码移至一个代码片段 (`snippets/collection-view.liquid`)。之所以这样做，是因为我们希望在网格视图和列表视图之间共享大量代码——排序、筛选、分页以及页面的整体布局对两种视图而言都是相同的，我们希望尽可能避免重复代码。完成此步骤后，我们就可以从新版本的
    `templates/collection.liquid` 中包含此代码片段（请参见列表 6-7）。每当集合 URL 包含 `?view=grid` 参数，或者未指定视图参数时，都将使用此模板。默认的集合模板
    (`templates/collection.liquid`) 包含了集合代码片段，并指定应使用网格视图。


    ```

    {%- include ''collection-view'' with ''grid'' -%}

    列表 6-7

    网格视图

    ```


    下面的备选集合模板 (`templates/collections.list.liquid`) 将在集合 URL 包含 `?view=list` 参数时被渲染（请参见列表
    6-8）。


    ```

    {%- include ''collection-view'' with ''list'' -%}

    列表 6-8

    ?view=list 参数

    ```


    如果你之前没遇到过，`{% include %}` 标签中的 `with` 关键字允许我们向包含的代码片段传递一个参数。在该代码片段内部，将创建一个名为 `collection-view`
    的 Liquid 变量，其值就是我们要渲染的视图类型。


    在 `collection-view.liquid` 代码片段内部，代码与原始集合模板基本保持一致，有两个关键改动。在集合排序的 `<select>` 元素下方，我们添加了第二个
    `<select>` 来处理视图切换（请参见列表 6-9）。它被插入到 `snippets/collection-view.liquid` 中，位于原有的排序选择下拉菜单和“更新”表单提交按钮之间。然后，围绕产品循环输出的代码（请参见列表
    6-10）会检查 `collection-view` 的值，以渲染相应的产品代码片段——要么是之前用于网格视图的 `product.liquid` 代码片段，要么是用于在单行水平排列中渲染产品的新
    `product-list.liquid` 代码片段（请参见列表 6-11）。


    ```

    视图切换为...


    网格

    列表


    列表 6-9

    新视图选择下拉菜单的代码

    ```


    ```

    ...

    {%- paginate collection.products by 12 -%}


    {%- if collection-view == ''grid'' -%}

    {%- for product in collection.products -%}

    {%- include ''product'' -%}

    {%- endfor -%}

    {%- else  -%}

    {%- for product in collection.products -%}

    {%- include ''product-list'' -%}

    {%- endfor -%}

    {%- endif -%}

    ...

    列表 6-10

    产品循环的更新代码

    ```


    ```

    {{ product.title | escape }}

    {{ product.vendor | escape }}


    {{ product.price | money }}


    列表 6-11

    新的 snippets/product-list.liquid 代码片段

    ```


    图 6-16 展示了结果，左侧栏出现了一个新的视图选择下拉菜单，右侧则用新的列表样式渲染了产品。


    ![A437216_1_En_6_Fig16_HTML.jpg](img/A437216_1_En_6_Fig16_HTML.jpg)


    图 6-16


    商品集合页面现在可以以简单的列表视图显示


    #### 添加类别级筛选


    目前我们已经在商品集合页面上实现了分页、排序和视图管理。最后要添加的功能是筛选——一种让客户能够将产品范围缩小到他们感兴趣商品的方式。


    与我们之前在集合页面所做的其他工作相比，产品筛选是最依赖于具体用例的。根据所涉及的产品范围不同，需要采用不同的筛选策略以及不同的分组方法来组合不同筛选条件。一家卖酒的商店可能有成千上万种产品，需要让客户根据年份、原产国或葡萄品种的各种组合进行筛选。另一方面，一家销售有限范围预包装餐食的网站，可能每次只需提供单一维度的筛选（早餐、午餐或晚餐）。


    大多数商店都需要某种“类别级”筛选的概念，这是一种将产品范围初步缩小到客户感兴趣商品的高级方法。如前所述，Shopify 中通过集合来实现这个层次的筛选。在商品集合页面上添加类别级筛选，可以简单到在商店中为每个集合添加一个链接列表，这就是我在列表
    6-12 中为主题示例实现的方式。此代码已添加到 `snippets/collection-view.liquid` 中，位于排序和视图控件之下。


    ![A437216_1_En_6_Fig17_HTML.jpg](img/A437216_1_En_6_Fig17_HTML.jpg)


    图 6-17


    类别筛选在左侧栏显示为一个简单的链接列表。一次只能选择一个类别


    ```

    ...

    更新


    类别


    {%- for collection_option in collections -%}


    {%- if collection.handle == collection_option.handle -%}

    {{ collection_option.title | escape }}

    {%- else -%}


    {{ collection_option.title | escape }}


    {%- endif -%}


    {%- endfor -%}


    ...

    列表 6-12

    添加一个直接的类别（集合）级筛选

    ```


    这种简单的方法允许客户通过遍历所有集合，并为每个集合渲染一个指向其集合页面的链接，轻松地在商店的各个集合之间导航。请注意，在生成指向每个集合的 URL 时，我们包含了当前视图和排序参数，以便在集合之间切换时保持一致的体验。相反，我们没有包含当前分页信息，因为从用户体验的角度来看，当我们完全改变可见类别时，跳回到第一页似乎是最优的。


    这种直接方法的一个潜在问题是，店主无法控制显示的集合列表或它们的排列顺序。我们将在本章末尾解决这个问题，但现在，让我们继续探讨下一级别的筛选功能。

    '
- fmt: "### Adding Tag-Based Filtering\n\nFor some stores with a limited number of\
    \ products, category-level filtering will be sufficient. However, in many cases\
    \ an additional level of refinement is required. This is where tag-based filtering\
    \ comes in.\n\nAs you saw earlier when examining the URL structure of collection\
    \ pages, adding a tag name to the end of a collection URL will filter visible\
    \ products to just those in the collection with that tag. Shopify provides several\
    \ Liquid helpers to make it easy to generate collection URLs for the addition\
    \ and removal of those tags from the current collection view. You can see the\
    \ use of these Liquid helpers (`current_tags`, `link_to_remove_tag`, and `link_to_add_tag`)\
    \ in Listing [6-13](#A437216_1_En_6_Chapter.html#Par112), where I’ve added a list\
    \ of tags to filter by underneath the category-level filter. Note also that I’ve\
    \ updated the `action` attribute of the form to ensure tag filtering information\
    \ is retained when changing the sort order or view. The use of the `&#9745;` and\
    \ `&#9744;` HTML entities display a checked or un-checked checkbox, depending\
    \ on whether the tag is currently active or not.\n\n```\n...\nFilter by...\n\n\
    {% for tag in collection.tags %}\n\n{% if current_tags contains tag %}\n{{ '&#9745;'\
    \ | append: tag | link_to_remove_tag: tag }}\n{% else %}\n{{ '&#9744;' | append:\
    \ tag | link_to_add_tag: tag }}\n{% endif %}\n\n{% endfor %}\n\nListing 6-13\n\
    Addition of Tag-Based Filters Underneath Category-Level Filters\n```\n\nAs you\
    \ can see in Figure [6-18](#A437216_1_En_6_Chapter.html#Fig18), this code snippet\
    \ renders a list of tags directly underneath the category-level filters.\n\n![A437216_1_En_6_Fig18_HTML.jpg](A437216_1_En_6_Fig18_HTML.jpg)\n\
    \n**Figure 6-18**  \nHow the collection page looks with the addition of a tag\
    \ filter and zero (left), one (center), and two (right) tags selected for filtering\n\
    \nTwo important things to note with this approach:\n\n- The tag filters here are\
    \ being used in an additive manner. That is, as shown by Figure [6-18](#A437216_1_En_6_Chapter.html#Fig18),\
    \ we’re able to filter down to just Mens products first, before adding a second\
    \ Shirts filter. This is one option; it would also be possible to only allow a\
    \ single level of tag filtering in a similar way to how we only permit a single\
    \ level of category filtering.\n- As you may have noticed from the screenshots,\
    \ as we add filters, the list of available tag filters under the “Filter by…”\
    \ heading reduces in size. This is because the tag loop `{% for tag in collection.tags\
    \ %}` will only return a list of tags that are present on any of the currently\
    \ visible products. This is usually the desired behavior as it avoids presenting\
    \ tag filtering options that will have no effect on the resulting list of products,\
    \ but if you want to maintain a consistent list of tag filters, you can use `{%\
    \ for tag in collection.all_tags %}` instead.\n\n### Progressively Enhancing the\
    \ Collection Page\n\nThe collection page is now quite functional, and it allows\
    \ customers to perform all the key tasks outlined at the start of the section.\
    \ To wrap this section up, we’re going to walk through a couple of things you\
    \ could do to improve the user experience of the page.\n\nThe first of these is\
    \ to add some functionality when JavaScript is available to users (progressive\
    \ enhancement). When we added the sort and view selection dropdown boxes, I noted\
    \ that requiring users to click **Update** after changing one of the dropdowns\
    \ was an unnecessary extra step. Thanks to the robust way we’ve built our collection\
    \ page to date, with the addition of a few bits of JavaScript and CSS, we can\
    \ add some logic that auto-submits the collection form when a select dropdown\
    \ changes. You’ll also see how to hide the **Update** button when JavaScript is\
    \ available, as it’ll no longer be needed.\n\nBecause the code required for these\
    \ changes touches quite a few different files, I won’t replicate it in full here\
    \ in the book (as always, these code changes are available in the example theme\
    \ repository online). Instead, here’s the outline of the approach:\n\n1. Add some\
    \ `no-js` and `js-hide` CSS classes, applied to the `<body>` and **Update** button\
    \ respectively, to hide the **Update** button when JavaScript is available.\n\
    2. Add a line of JavaScript to remove the `no-js` CSS class from the `<body>`\
    \ on initialization.\n3. Use JavaScript to capture the `change` event for the\
    \ sorting and view selection dropdown elements.\n4. In the handler for that event,\
    \ auto-submit the collection form to apply the changes.\n\nAfter implementing\
    \ these changes, you should be able to load the collection page with and without\
    \ JavaScript and see the same result as in Figure [6-19](#A437216_1_En_6_Chapter.html#Fig19).\
    \ Any changes to the sort order or view selection should be applied instantly.\n\
    \n![A437216_1_En_6_Fig19_HTML.jpg](A437216_1_En_6_Fig19_HTML.jpg)\n\n**Figure\
    \ 6-19**  \nProgressive enhancement in action!\n\nWhen JavaScript is available,\
    \ parsed, and initialized, the **Update** button is hidden and changing a select\
    \ instantly updates the view. Otherwise, the button remains visible and provides\
    \ an accessible fallback.\n\nA further enhancement we can apply is to avoid a\
    \ full page refresh every time we make a change to our sorting, view, or filtering\
    \ using an Ajax call instead. While I think the speed benefits of Ajax-driven\
    \ dynamic interfaces are often overstated (especially if you’ve gone to the effort\
    \ to properly optimize your theme), if added progressively on a solid foundation,\
    \ you can avoid some overhead (the re-parsing of stylesheets and JavaScript involved\
    \ with a page load) with relatively little work.\n\nAgain, I’ll skip the full\
    \ code for the sake of brevity and provide only an outline of this approach:\n\
    \n1. Use JavaScript to intercept the `submit` event on the collection form, which\
    \ will trigger when the sort or view dropdowns change.\n2. Prevent the default\
    \ form submission, but make an Ajax request to what would have been the target\
    \ URL to get the page content, then replace the current page content with the\
    \ new.\n3. Use JavaScript to intercept the `click` event on the category and tag\
    \ filter links.\n4. Using a similar approach as form submission, make an Ajax\
    \ request to fetch the link’s target URL and replace the current page with the\
    \ new.\n\n## Summary\n\nIn this chapter, you saw how to implement two of the key\
    \ pages on any Shopify store—the home and collection pages. For the home page,\
    \ you identified the key goals of the page (conveying brand identity and the product\
    \ range) and saw how to build a highly configurable layout using dynamic sections.\n\
    \nYou also learned about the design goals and implementation techniques for collection\
    \ pages and the four key customer actions on those pages—view selection, sorting,\
    \ filtering, and pagination.\n\n# Carts, Checkouts, and Content\n\nThe previous\
    \ three chapters covered the design and implementation of the components needed\
    \ for a visitor to a Shopify store to discover a product (or products) they want\
    \ to buy and add them to their cart. In this chapter, we’ll be looking at how\
    \ we can encourage customers to complete their journey from that point and make\
    \ it through the checkout so that your merchant gets paid. As part of this, we’ll\
    \ be looking at how to minimize cart abandonment and strategies for maximizing\
    \ average order value.\n\nThe final section of this chapter also discusses the\
    \ “other” pages involved in a Shopify store theme—the content, blog, and article\
    \ pages, which play a supporting role in driving product sales."
  raw: '#### Adding Tag-Based Filtering


    For some stores with a limited number of products, category-level filtering will
    be sufficient. However, in many cases an additional level of refinement is required.
    This is where tag-based filtering comes in.


    As you saw earlier when examining the URL structure of collection pages, adding
    a tag name to the end of a collection URL will filter visible products to just
    those in the collection with that tag. Shopify provides several Liquid helpers
    to make it easy to generate collection URLs for the addition and removal of those
    tags from the current collection view. You can see the use of these Liquid helpers
    (`current_tags`, `link_to_remove_tag`, and `link_to_add_tag`) in Listing [6-13](#A437216_1_En_6_Chapter.html#Par112),
    where I’ve added a list of tags to filter by underneath the category-level filter.
    Note also that I’ve updated the `action` attribute of the form to ensure tag filtering
    information is retained when changing the sort order or view. The use of the `&#9745;`
    and `&#9744;` HTML entities display a checked or un-checked checkbox, depending
    on whether the tag is currently active or not.


    ```

    ...

    Filter by...


    {% for tag in collection.tags %}


    {% if current_tags contains tag %}

    {{ ''&#9745;'' | append: tag | link_to_remove_tag: tag }}

    {% else %}

    {{ ''&#9744;'' | append: tag | link_to_add_tag: tag }}

    {% endif %}


    {% endfor %}


    Listing 6-13

    Addition of Tag-Based Filters Underneath Category-Level Filters

    ```


    As you can see in Figure [6-18](#A437216_1_En_6_Chapter.html#Fig18), this code
    snippet renders a list of tags directly underneath the category-level filters.


    ![A437216_1_En_6_Fig18_HTML.jpg](A437216_1_En_6_Fig18_HTML.jpg)


    Figure 6-18


    How the collection page looks with the addition of a tag filter and zero (left),
    one (center), and two (right) tags selected for filtering


    Two important things to note with this approach:


    *   The tag filters here are being used in an additive manner. That is, as shown
    by Figure [6-18](#A437216_1_En_6_Chapter.html#Fig18), we’re able to filter down
    to just Mens products first, before adding a second Shirts filter. This is one
    option; it would also be possible to only allow a single level of tag filtering
    in a similar way to how we only permit a single level of category filtering.

    *   As you may have noticed from the screenshots, as we add filters, the list
    of available tag filters under the “Filter by…” heading reduces in size. This
    is because the tag loop `{% for tag in collection.tags %}` will only return a
    list of tags that are present on any of the currently visible products. This is
    usually the desired behavior as it avoids presenting tag filtering options that
    will have no effect on the resulting list of products, but if you want to maintain
    a consistent list of tag filters, you can use `{% for tag in collection.all_tags
    %}` instead.


    #### Progressively Enhancing the Collection Page


    The collection page is now quite functional, and it allows customers to perform
    all the key tasks outlined at the start of the section. To wrap this section up,
    we’re going to walk through a couple of things you could do to improve the user
    experience of the page.


    The first of these is to add some functionality when JavaScript is available to
    users ( progressive enhancement ). When we added the sort and view selection dropdown
    boxes, I noted that requiring users to click Update after changing one of the
    dropdowns was an unnecessary extra step. Thanks to the robust way we’ve built
    our collection page to date, with the addition of a few bits of JavaScript and
    CSS, we can add some logic that auto-submits the collection form when a select
    dropdown changes. You’ll also see how to hide the Update button when JavaScript
    is available, as it’ll no longer be needed.


    Because the code required for these changes touches quite a few different files,
    I won’t replicate it in full here in the book (as always, these code changes are
    available in the example theme repository online). Instead, here’s the outline
    of the approach:


    1.  Add some `no-js` and `js-hide` CSS classes, applied to the `<body>` and Update
    button respectively, to hide the Update button when JavaScript is available.  

    2.  Add a line of JavaScript to remove the `no-js` CSS class from the `<body>`
    on initialization.  

    3.  Use JavaScript to capture the `change` event for the sorting and view selection
    dropdown elements.  

    4.  In the handler for that event, auto-submit the collection form to apply the
    changes .  


    After implementing these changes, you should be able to load the collection page
    with and without JavaScript and see the same result as in Figure [6-19](#A437216_1_En_6_Chapter.html#Fig19).
    Any changes to the sort order or view selection should be applied instantly.


    ![A437216_1_En_6_Fig19_HTML.jpg](A437216_1_En_6_Fig19_HTML.jpg)


    Figure 6-19


    Progressive enhancement in action!


    When JavaScript is available, parsed, and initialized, the Update button is hidden
    and changing a select instantly updates the view. Otherwise, the button remains
    visible and provides an accessible fallback.


    A further enhancement we can apply is to avoid a full page refresh every time
    we make a change to our sorting, view, or filtering using an Ajax call instead.
    While I think the speed benefits of Ajax-driven dynamic interfaces are often overstated
    (especially if you’ve gone to the effort to properly optimize your theme), if
    added progressively on a solid foundation, you can avoid some overhead (the re-parsing
    of stylesheets and JavaScript involved with a page load) with relatively little
    work.


    Again, I’ll skip the full code for the sake of brevity and provide only an outline
    of this approach:


    1.  Use JavaScript to intercept the `submit` event on the collection form, which
    will trigger when the sort or view dropdowns change.  

    2.  Prevent the default form submission, but make an Ajax request to what would
    have been the target URL to get the page content, then replace the current page
    content with the new.  

    3.  Use JavaScript to intercept the `click` event on the category and tag filter
    links.  

    4.  Using a similar approach as form submission, make an Ajax request to fetch
    the link’s target URL and replace the current page with the new.


    ## Summary


    In this chapter, you saw how to implement two of the key pages on any Shopify
    store—the home and collection pages. For the home page, you identified the key
    goals of the page (conveying brand identity and the product range) and saw how
    to build a highly configurable layout using dynamic sections.


    You also learned about the design goals and implementation techniques for collection
    pages and the four key customer actions on those pages—view selection, sorting,
    filtering, and pagination.


    # 7. Carts, Checkouts, and Content


    The previous three chapters covered the design and implementation of the components
    needed for a visitor to a Shopify store to discover a product (or products) they
    want to buy and add them to their cart. In this chapter, we’ll be looking at how
    we can encourage customers to complete their journey from that point and make
    it through the checkout so that your merchant gets paid. As part of this, we’ll
    be looking at how to minimize cart abandonment and strategies for maximizing average
    order value.


    The final section of this chapter also discusses the “other” pages involved in
    a Shopify store theme—the content, blog, and article pages, which play a supporting
    role in driving product sales.'
  trans: "\n### 添加基于标签的筛选功能\n\n对于产品数量有限的商店，按类别筛选就足够了。然而，在许多情况下，还需要额外的细化筛选层级。这时就要用到基于标签的筛选功能。\n\
    \n正如你之前查看集合页面 URL 结构时所看到的，在集合 URL 末尾添加一个标签名称，会将可见产品筛选为仅显示该集合中带有该标签的产品。Shopify\
    \ 提供了几个 Liquid 辅助工具，可以轻松生成用于在当前集合视图中添加或移除这些标签的集合 URL。你可以在代码清单 6-13 中看到这些 Liquid\
    \ 辅助工具（`current_tags`、`link_to_remove_tag` 和 `link_to_add_tag`）的用法，我在类别级筛选器下方添加了一个可筛选的标签列表。另请注意，我还更新了表单的\
    \ `action` 属性，以确保在更改排序顺序或视图时能够保留标签筛选信息。使用 `&#9745;` 和 `&#9744;` HTML 实体来显示选中或未选中的复选框，具体取决于当前标签是否处于激活状态。\n\
    \n```\n...\n筛选方式...\n\n{% for tag in collection.tags %}\n\n{% if current_tags\
    \ contains tag %}\n{{ '&#9745;' | append: tag | link_to_remove_tag: tag }}\n{%\
    \ else %}\n{{ '&#9744;' | append: tag | link_to_add_tag: tag }}\n{% endif %}\n\
    \n{% endfor %}\n\n代码清单 6-13\n在类别级筛选器下方添加基于标签的筛选器\n```\n\n如图 6-18 所示，这段代码片段会在类别级筛选器正下方渲染出一个标签列表。\n\
    \n![A437216_1_En_6_Fig18_HTML.jpg](img/A437216_1_En_6_Fig18_HTML.jpg)\n\n**图 6-18**\
    \  \n添加标签筛选器后集合页面的效果：分别选择零个（左）、一个（中）和两个（右）标签进行筛选\n\n关于这种方法，需要注意两个重要事项：\n\n- 这里的标签筛选器是以累加方式使用的。也就是说，如图\
    \ 6-18 所示，我们可以先筛选出男士产品，然后再添加第二个“衬衫”筛选器。这是一种选择；另一种可能是只允许单层标签筛选，类似于我们只允许单层类别筛选的方式。\n\
    - 你可能已经从截图中注意到，随着我们添加筛选条件，“筛选方式...”标题下的可用标签筛选器列表会缩小。这是因为标签循环 `{% for tag in collection.tags\
    \ %}` 只会返回当前可见产品中存在的标签列表。这通常是期望的行为，因为它能避免显示对最终产品列表没有影响的标签筛选选项。但如果你希望保持标签筛选器列表的一致性，可以使用\
    \ `{% for tag in collection.all_tags %}` 来代替。\n\n### 渐进增强集合页面\n\n现在的集合页面功能已经相当完善，能够让客户执行本节开头所述的所有关键任务。为了总结本节，我们将介绍一些可用于改进页面用户体验的方法。\n\
    \n首先是当用户可使用 JavaScript 时，添加一些功能（渐进增强）。之前添加排序和视图选择下拉框时，我提到要求用户在更改下拉框后点击**更新**是一个不必要的额外步骤。得益于我们迄今为止构建集合页面的稳健方式，只需添加少量\
    \ JavaScript 和 CSS，我们就可以增加一些逻辑：当下拉选择框发生变化时自动提交集合表单。你还将看到当 JavaScript 可用时如何隐藏**更新**按钮，因为届时它已不再需要。\n\
    \n由于这些更改所需的代码涉及多个不同的文件，我不会在书中完整复制（和往常一样，这些代码更改可在示例主题在线仓库中找到）。以下是该方法的大纲：\n\n1.\
    \ 添加一些 `no-js` 和 `js-hide` CSS 类，分别应用于 `<body>` 和**更新**按钮，以便在 JavaScript 可用时隐藏**更新**按钮。\n\
    2. 添加一行 JavaScript，在初始化时从 `<body>` 中移除 `no-js` CSS 类。\n3. 使用 JavaScript 捕获排序和视图选择下拉元素的\
    \ `change` 事件。\n4. 在该事件的处理程序中，自动提交集合表单以应用更改。\n\n实施这些更改后，你应该能够在启用和不启用 JavaScript\
    \ 的情况下加载集合页面，并看到与图 6-19 中相同的结果。对排序顺序或视图选择的任何更改都应立即生效。\n\n![A437216_1_En_6_Fig19_HTML.jpg](img/A437216_1_En_6_Fig19_HTML.jpg)\n\
    \n**图 6-19**  \n渐进增强的实际效果！\n\n当 JavaScript 可用、已被解析并初始化后，**更新**按钮被隐藏，更改选择框会立即更新视图。否则，按钮保持可见，并提供一个可访问的后备方案。\n\
    \n我们可以进行的另一项增强是，使用 Ajax 调用避免在每次更改排序、视图或筛选条件时都刷新整个页面。虽然我认为基于 Ajax 的动态界面带来的速度优势常常被夸大（特别是如果你已经花精力对主题进行了适当优化），但如果在稳固的基础上渐进式地添加，你可以用相对较少的工作来避免一些开销（例如重新解析页面加载时涉及的样式表和\
    \ JavaScript）。\n\n同样，为了简洁起见，我将跳过完整代码，仅提供该方法的大纲：\n\n1. 使用 JavaScript 拦截集合表单的 `submit`\
    \ 事件，该事件将在排序或视图下拉框更改时触发。\n2. 阻止默认的表单提交，而是向原本的目标 URL 发起一个 Ajax 请求以获取页面内容，然后用新内容替换当前页面内容。\n\
    3. 使用 JavaScript 拦截类别和标签筛选链接的 `click` 事件。\n4. 采用类似于表单提交的方法，发起 Ajax 请求获取链接的目标 URL，并用新内容替换当前页面。\n\
    \n## 本章小结\n\n在本章中，你了解了如何实现任何 Shopify 商店中两个关键页面——主页和集合页面。对于主页，你明确了页面的关键目标（传达品牌形象和产品范围），并了解了如何使用动态板块构建一个高度可配置的布局。\n\
    \n你还学习了集合页面的设计目标与实现技术，以及客户在这些页面上的四个关键操作——视图选择、排序、筛选和分页。\n\n# 购物车、结账与内容\n\n前三章涵盖了\
    \ Shopify 商店访客发现想要购买的产品（或产品）并将其加入购物车所需组件的设计与实现。在本章中，我们将讨论如何鼓励客户从这一点开始完成他们的旅程，并顺利完成结账，以便商家收到付款。作为其中的一部分，我们将研究如何最大限度地减少购物车放弃率，以及最大化平均订单金额的策略。\n\
    \n本章的最后部分还将讨论 Shopify 商店主题中涉及的“其他”页面——内容页面、博客页面和文章页面，这些页面在推动产品销售方面起到辅助作用。\n"
- fmt: '# The Cart Page


    After a customer adds a product to their cart, Shopify’s default behavior is to
    redirect them to `/cart` as a final step before moving into the checkout. Exceptions
    to this default behavior may occur if the theme you’re working on uses Ajax-powered
    add to cart functionality from the product or collection pages, which typically
    keeps the customer on the current page.


    In either case, the cart page gives a customer the chance to review their order
    and ensure they’re happy with it before providing shipping and payment details.
    To ensure that as many customers as possible do in fact move on to the checkout
    process, there are a few design considerations we should bear in mind as we look
    at the cart page.


    ## Design Goals for Cart Pages


    Studies show that on average, 69% of all online shopping carts are abandoned at
    some point during the checkout flow.[¹](#A437216_1_En_7_Chapter.html#Fn1) While
    no amount of design can rescue all lost sales, there are some key things we can
    do to encourage users to complete their orders. The breakdown of reasons for cart
    abandonment in the report cited previously indicate that the two biggest conversion
    killers for online stores are:


    - The addition of unreasonable or unexpected extra costs (such as shipping, taxes,
    or fees)

    - Checkout processes that are too complex or demand too much time and effort to
    complete


    While the actual shipping costs and taxes charged by a merchant are out of the
    hands of the theme designer, we can certainly take steps on the cart page to ensure
    that customers aren’t hit with unexpected or “surprise” fees during checkout.
    We can also make a concerted effort to simplify the cart page and ensure it’s
    displaying only information that’s useful to our customers and encourages them
    to take the next logical step (checking out).


    The next section walks through the addition of a cart page that aims to meet these
    design goals in the example theme. At each step, we’ll consider the specific design
    decisions in a little more detail.


    ## Implementing a Cart Page


    Continuing the tradition of working to a “standard” design for the example theme,
    the cart page we’ll be putting together will follow the layout pictured in Figure
    [7-1](#A437216_1_En_7_Chapter.html#Fig1).


    ![A437216_1_En_7_Fig1_HTML.jpg](A437216_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    A mockup showing the layout of the cart page we’ll be implementing in this chapter


    You’ll notice a few key design features of this cart layout:


    - It allows customers to edit their cart, both by adjusting the quantity of line
    items or removing them entirely. This is important for both increasing average
    order value (if a customer would like or is incentivized to order larger quantities)
    and for reducing abandonment (if a customer perceives that adjusting quantities
    or removing an item from the cart is too difficult, they may leave the site altogether).

    - It includes a note about shipping rates, designed to reduce the risk of hitting
    customers with surprise costs during checkout.

    - It includes an in-cart upsell offer, which is designed to increase average order
    value through a spur-of-the-moment purchase decision. Care always needs to be
    taken with such offers to ensure that they don’t detract from the primary goal
    of having the customer proceed to checkout, so the overall effect on conversions
    and revenue should be considered when implementing them.


    ### Adding an Editable List of Cart Contents


    We’ll start work on the cart page by adding a simple table displaying the current
    contents of the cart, as per Listing [7-1](#A437216_1_En_7_Chapter.html#Par17).


    ```

    Your cart

    {%- if cart.items.size > 0 -%}


    Item

    Quantity

    Price


    {%- for item in cart.items -%}


    {{ item.title | escape }}

    {{ item.sku | escape }}

    Remove


    {{ item.line_price | money }}


    {%- endfor -%}


    {{ cart.total_price | money }}


    {%- else -%}


    Your cart is empty.


    {%- endif -%}


    Listing 7-1

    An Initial Liquid Template for templates/cart.liquid

    ```


    The contents of the table are wrapped in a `<form>`, and at the bottom of the
    page, we include an Update button. This allows customers to update the quantity
    of products in their cart by changing the quantity inputs and submitting the form.
    We’ll also include a Remove link for each line item and a Proceed to Checkout
    button that serves as the primary call to action on the page.


    Once it’s implemented, a cart with a couple of line items in it should look like
    Figure [7-2](#A437216_1_En_7_Chapter.html#Fig2).


    ![A437216_1_En_7_Fig2_HTML.jpg](A437216_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    The initial implementation of the cart page as it appears in the browser


    As we did with the view controls on your collection pages in Chapter [6](#A437216_1_En_6_Chapter.html),
    we can use progressive enhancement to drive the update of line item quantities
    when JavaScript is available and avoid the clunkiness of having to click Update
    on the cart page. The full code required to implement this is available in the
    example theme GitHub repository, but the general approach is:


    - Intercept the `change` event on the quantity inputs in the cart table.

    - When a change occurs, use Shopify’s Ajax API[²](#A437216_1_En_7_Chapter.html#Fn2)
    to make an Ajax request to update the quantity of the given line item.

    - Use the CSS classes we implemented for the collection page to hide the Update
    button when JavaScript is available.'
  raw: '## The Cart Page


    After a customer adds a product to their cart, Shopify’s default behavior is to
    redirect them to `/cart` as a final step before moving into the checkout. Exceptions
    to this default behavior may occur if the theme you’re working on uses Ajax-powered
    add to cart functionality from the product or collection pages, which typically
    keeps the customer on the current page.


    In either case, the cart page gives a customer the chance to review their order
    and ensure they’re happy with it before providing shipping and payment details.
    To ensure that as many customers as possible do in fact move on to the checkout
    process, there are a few design considerations we should bear in mind as we look
    at the cart page.


    ### Design Goals for Cart Pages


    Studies show that on average, 69% of all online shopping carts are abandoned at
    some point during the checkout flow.[¹](#A437216_1_En_7_Chapter.html#Fn1) While
    no amount of design can rescue all lost sales, there are some key things we can
    do to encourage users to complete their orders. The breakdown of reasons for cart
    abandonment in the report cited previously indicate that the two biggest conversion
    killers for online stores are:


    *   The addition of unreasonable or unexpected extra costs (such as shipping,
    taxes, or fees)

    *   Checkout processes that are too complex or demand too much time and effort
    to complete


    While the actual shipping costs and taxes charged by a merchant are out of the
    hands of the theme designer, we can certainly take steps on the cart page to ensure
    that customers aren’t hit with unexpected or “surprise” fees during checkout.
    We can also make a concerted effort to simplify the cart page and ensure it’s
    displaying only information that’s useful to our customers and encourages them
    to take the next logical step (checking out).


    The next section walks through the addition of a cart page that aims to meet these
    design goals in the example theme. At each step, we’ll consider the specific design
    decisions in a little more detail .


    ### Implementing a Cart Page


    Continuing the tradition of working to a “standard” design for the example theme,
    the cart page we’ll be putting together will follow the layout pictured in Figure
    [7-1](#A437216_1_En_7_Chapter.html#Fig1).


    ![A437216_1_En_7_Fig1_HTML.jpg](A437216_1_En_7_Fig1_HTML.jpg)


    Figure 7-1


    A mockup showing the layout of the cart page we’ll be implementing in this chapter


    You’ll notice a few key design features of this cart layout:


    *   It allows customers to edit their cart, both by adjusting the quantity of
    line items or removing them entirely. This is important for both increasing average
    order value (if a customer would like or is incentivized to order larger quantities)
    and for reducing abandonment (if a customer perceives that adjusting quantities
    or removing an item from the cart is too difficult, they may leave the site altogether).

    *   It includes a note about shipping rates, designed to reduce the risk of hitting
    customers with surprise costs during checkout.

    *   It includes an in-cart upsell offer, which is designed to increase average
    order value through a spur-of-the-moment purchase decision. Care always needs
    to be taken with such offers to ensure that they don’t detract from the primary
    goal of having the customer proceed to checkout, so the overall effect on conversions
    and revenue should be considered when implementing them.


    #### Adding an Editable List of Cart Contents


    We’ll start work on the cart page by adding a simple table displaying the current
    contents of the cart, as per Listing [7-1](#A437216_1_En_7_Chapter.html#Par17).


    ```

    Your cart

    {%- if cart.items.size > 0 -%}


    Item

    Quantity

    Price


    {%- for item in cart.items -%}


    {{ item.title | escape }}

    {{ item.sku | escape }}

    Remove


    {{ item.line_price | money }}


    {%- endfor -%}


    {{ cart.total_price | money }}


    {%- else -%}


    Your cart is empty.


    {%- endif -%}


    Listing 7-1

    An Initial Liquid Template for templates/cart.liquid

    ```


    The contents of the table are wrapped in a `<form>`, and at the bottom of the
    page, we include an Update button. This allows customers to update the quantity
    of products in their cart by changing the quantity inputs and submitting the form.
    We’ll also include a Remove link for each line item and a Proceed to Checkout
    button that serves as the primary call to action on the page.


    Once it’s implemented, a cart with a couple of line items in it should look like
    Figure [7-2](#A437216_1_En_7_Chapter.html#Fig2).


    ![A437216_1_En_7_Fig2_HTML.jpg](A437216_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    The initial implementation of the cart page as it appears in the browser


    As we did with the view controls on your collection pages in Chapter [6](#A437216_1_En_6_Chapter.html),
    we can use progressive enhancement to drive the update of line item quantities
    when JavaScript is available and avoid the clunkiness of having to click Update
    on the cart page. The full code required to implement this is available in the
    example theme GitHub repository, but the general approach is:


    *   Intercept the `change` event on the quantity inputs in the cart table.

    *   When a change occurs, use Shopify’s Ajax API[²](#A437216_1_En_7_Chapter.html#Fn2)
    to make an Ajax request to update the quantity of the given line item.

    *   Use the CSS classes we implemented for the collection page to hide the Update
    button when JavaScript is available .'
  trans: '

    # 购物车页面


    当客户将商品添加到购物车后，Shopify 的默认行为是将他们重定向到 `/cart` 页面，作为进入结账流程前的最后一步。如果你正在开发的主题使用了基于
    Ajax 的“加入购物车”功能（通常来自商品页或商品系列页），客户可能会停留在当前页面，此时默认行为将不适用。


    无论哪种情况，购物车页面都让客户有机会在提供收货和付款信息前，复核订单并确保满意。为了尽可能让更多客户顺利完成结账流程，在设计购物车页面时，我们需要牢记一些设计要点。


    ## 购物车页面的设计目标


    研究表明，平均有 69% 的在线购物车会在结账流程的某个阶段被放弃。¹ 虽然再精妙的设计也无法挽回所有流失的销售，但我们可以采取一些关键措施来鼓励用户完成订单。上述报告中对购物车放弃原因的分析表明，导致在线商店转化率下降的两大主因是：


    - 添加了不合理或意外的附加成本（如运费、税费或手续费）

    - 结账流程过于复杂，或需要花费太多时间和精力才能完成


    虽然商家收取的实际运费和税费不在主题设计师的掌控范围内，但我们完全可以在购物车页面上采取措施，确保客户在结账过程中不会遭遇意外或“隐藏”费用。我们还可以集中精力简化购物车页面，确保只显示对客户有用的信息，并鼓励他们采取下一步合乎逻辑的操作（结账）。


    下一节将介绍如何在示例主题中添加一个符合这些设计目标的购物车页面。在每一步中，我们都会更详细地探讨具体的设计决策。


    ## 实现购物车页面


    延续示例主题采用“标准”设计的传统，我们将要构建的购物车页面将遵循图 7-1 所示的布局。


    ![A437216_1_En_7_Fig1_HTML.jpg](img/A437216_1_En_7_Fig1_HTML.jpg)


    图 7-1


    本章将实现的购物车页面布局示意图


    你会注意到该购物车布局的几个关键设计特点：


    - 它允许客户编辑购物车，既可以调整商品数量，也可以完全移除商品。这对于提高平均订单价值（当客户希望或被鼓励订购更多数量时）和降低放弃率（如果客户认为调整数量或从购物车中移除商品过于困难，他们可能会直接离开网站）都至关重要。

    - 它包含一条关于运费率的提示，旨在降低客户在结账过程中遇到意外费用的风险。

    - 它包含一个购物车内的追加销售（upsell）推荐，旨在通过冲动消费决策提高平均订单价值。实施这类推荐时务必谨慎，确保它们不会干扰客户完成结账这一首要目标，因此在实施时应考虑其对转化率和整体营收的影响。


    ### 添加可编辑的购物车内容列表


    我们将从添加一个显示当前购物车内容的简单表格开始购物车页面的工作，如代码清单 7-1 所示。


    ```

    您的购物车

    {%- if cart.items.size > 0 -%}


    商品

    数量

    价格


    {%- for item in cart.items -%}


    {{ item.title | escape }}

    {{ item.sku | escape }}

    移除


    {{ item.line_price | money }}


    {%- endfor -%}


    {{ cart.total_price | money }}


    {%- else -%}


    您的购物车是空的。


    {%- endif -%}


    代码清单 7-1

    templates/cart.liquid 的初始 Liquid 模板

    ```


    表格内容被包裹在 `<form>` 中，页面底部包含一个“更新”按钮。客户可以通过更改数量输入框的值并提交表单来更新购物车中商品的数量。我们还会为每个商品行添加一个“移除”链接，以及一个“前往结账”按钮作为页面上的主要行动号召。


    实现后，包含几件商品的购物车应如图 7-2 所示。


    ![A437216_1_En_7_Fig2_HTML.jpg](img/A437216_1_En_7_Fig2_HTML.jpg)


    图 7-2


    购物车页面的初始浏览器显示效果


    正如我们在第 6 章中对商品系列页面的视图控制所做的处理一样，我们可以使用渐进增强技术，在 JavaScript 可用时驱动商品数量的更新，避免用户在购物车页面上必须点击“更新”按钮的笨拙体验。实现该功能所需的完整代码可在示例主题的
    GitHub 仓库中找到，但总体思路是：


    - 拦截购物车表格中数量输入框的 `change` 事件。

    - 当变化发生时，使用 Shopify 的 Ajax API² 发起一个 Ajax 请求，以更新指定商品行的数量。

    - 利用我们为商品系列页面实现的 CSS 类，在 JavaScript 可用时隐藏“更新”按钮。

    '
- fmt: '#### Adding a Shipping Cost Calculator


    With the basic functionality of the cart page together, we can move to adding
    a note above the Proceed to Checkout button that aims to reduce the risk of surprises
    for the customers when they move through to the checkout. Because loading shipping
    costs requires some dynamic JavaScript, we can start by implementing a default,
    plan-HTML fallback option—displaying a static note as in Listing [7-2](#A437216_1_En_7_Chapter.html#Par26)
    and Figure [7-3](#A437216_1_En_7_Chapter.html#Fig3). In Listing [7-2](#A437216_1_En_7_Chapter.html#Par26),
    the table footer from Listing [7-1](#A437216_1_En_7_Chapter.html#Par17) has been
    updated with a static shipping costs message. The element containing the message
    is given an `id` attribute so we can refer to it and dynamically update it later.


    ![A437216_1_En_7_Fig3_HTML.jpg](A437216_1_En_7_Fig3_HTML.jpg)


    **Figure 7-3** The fallback shipping message as it appears in the cart table


    ```

    ...

    {{ cart.total_price | money }}

    Shipping and taxes calculated during checkout

    ...

    Listing 7-2

    Table Footer from Listing 7-1 Updated with a Static Shipping Costs Message

    ```


    With this fallback in place, we’ll now implement some JavaScript that uses Shopify’s
    Ajax API to fetch an estimate of shipping rates and display that to the customer.
    To properly estimate shipping rates, we need to have some idea of where you’re
    shipping to (a country, state, and postcode)—information that we don’t usually
    have at the cart step.


    For the purposes of the example theme, we’re going to keep things simple and only
    fetch and display a more accurate shipping estimate for logged-in customers with
    a known delivery address. In other situations, we won’t perform any dynamic updates
    and the fallback message will be displayed. In a real-world situation, you could
    look to extend the code you’re about to implement to fetch an unfamiliar customer’s
    location via the JavaScript Geolocation API, an approximation based on their IP
    address, or simply a form requesting their address details.


    The implementation of this functionality requires changes to three theme files:


    1.  First, we need to add a new `fetchShippingRateEstimate` JavaScript method
    in `assets/theme.js.liquid`. It expects to be passed the logged-in customer’s
    address and the selector of a target element where the shipping estimate message
    will be rendered. It then does the work of making an Ajax call to Shopify’s shipping
    rate’s API and renders the result. This method is shown in Listing [7-3](#A437216_1_En_7_Chapter.html#Par36).

    2.  Because the details of any logged-in customer are only available to the core
    Liquid templates, and not the asset files, we need to pass the customer details
    to the newly-written `fetchShippingRateEstimate` method from `templates/cart.liquid`.
    This is shown in Listing [7-4](#A437216_1_En_7_Chapter.html#Par38), using a technique
    I call the “Captured JS” pattern, explained in the Tip that follows.

    3.  Finally, for the “Captured JS” pattern to work, we need to add a single line
    of code to the bottom of `layout/theme.liquid`, underneath all the other JavaScript.
    This is shown in Listing [7-5](#A437216_1_En_7_Chapter.html#Par39).


    **Tip**


    Good practice dictates that JavaScript is loaded and initialized at the bottom
    of all pages in `theme.liquid`, as top-loading JavaScript is one of the biggest
    sources of page slowdown and poor load times. However, there’s often JavaScript
    that you may wish to load or execute only on specific pages—the initialization
    call to `fetchShippingRateEstimates` here being a good example.


    In these cases, I use the Captured JS technique—using a Liquid `{% capture %}`
    tag within my Liquid template to store any page-specific JavaScript to a variable
    called `captured_js`. This can be used multiple times on a page as long as you’re
    sure to output the previous contents of `captured_js` along with the newly-captured
    contents (see Listing [7-4](#A437216_1_En_7_Chapter.html#Par38)). Your `theme.liquid`
    template can then output the captured contents at the very bottom of the page,
    ensuring any JavaScript libraries have been loaded before execution.


    Note that Listing [7-3](#A437216_1_En_7_Chapter.html#Par36) exposes the method
    globally on the window object—in a production theme you might want to namespace
    this (e.g., `window.ExampleTheme.fetchShippingRateEstimate`).


    ```

    ...

    window.fetchShippingRateEstimate = function(target, shipping_address) {

    if(!shipping_address) return;

    $.ajax({

    url: ''/cart/shipping_rates.json'',

    data: $.serialize({ shipping_address: shipping_address }),

    success: function(shipping_rates) {

    if(shipping_rates.length === 0) return;

    var shipping_rate = shipping_rates[0];

    $(target).html(

    '''' +

    shipping_rate.name + '' ($'' + shipping_rate.price + '') to '' +

    shipping_address.city + '', '' + shipping_address.province +

    ''''

    );

    }

    });

    };

    ...

    Listing 7-3

    The fetchShippingRateEstimate Added to theme.js.liquid .

    ```


    Note that Listing [7-4](#A437216_1_En_7_Chapter.html#Par38) uses the handy Liquid
    `| json` filter, which will take a Liquid variable such as a customer’s default
    address and convert it into a JSON object for use in the JavaScript.


    ```

    ...

    {%- capture captured_js -%}

    {{- captured_js -}}


    fetchShippingRateEstimate(''#cart-shipping'', {{ customer.default_address | json
    }});


    {%- endcapture -%}

    Listing 7-4

    The “Captured JS” Pattern in Operation at the Bottom of cart.liquid

    ```


    ```

    ...

    {{- ''theme.js'' | asset_url | script_tag -}}

    {{- captured_js -}}


    Listing 7-5

    The Bottom of the theme.liquid Has a New Addition—the Output of the captured_js
    Liquid Variable

    ```


    Figure [7-4](#A437216_1_En_7_Chapter.html#Fig4) shows the result on the cart page
    once shipping rates have been fetched.


    ![A437216_1_En_7_Fig4_HTML.jpg](A437216_1_En_7_Fig4_HTML.jpg)


    **Figure 7-4** If a customer with a known address is logged in, the cart page
    now fetches a shipping estimate for their location and provides a more specific
    shipping costs message'
