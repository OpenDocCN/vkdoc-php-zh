    \ {\n    header(\"Location: $error\");\n    }\n    }\n    ```\n\n此脚本中唯一需要更改的两行已用粗体标出。第一行定义了`$error`，这是一个包含错误页面\
    \ URL 的变量。需要更改的第二行定义了存储下载文件的文件夹路径。\n\n脚本的工作原理是从附加到 URL 的查询字符串中获取要下载的文件名，并将其保存为`$getfile`。由于查询字符串很容易被篡改，因此`$getfile`最初设置为`NULL`。如果不这样做，可能会让恶意用户访问服务器上的任何文件。\n\
    \n开头的条件语句使用`basename()`来确保攻击者无法从文件结构的其他部分请求文件（例如存储密码的文件）。如第 5 章所述，`basename()`提取路径中的文件名部分，因此如果`basename($_GET['file'])`与`$_GET['file']`不同，你就知道有人试图探测你的服务器。然后，你可以使用`header()`函数将用户重定向到错误页面，从而阻止脚本继续执行。\n\
    \n在检查请求的文件存在且可读之后，脚本发送适当的 HTTP 头，并使用`readfile()`将文件发送到输出缓冲区。如果找不到文件，则用户会被重定向到错误页面。\n\
    \n3. 通过创建另一个页面来测试脚本；添加几个指向`download.php`的链接。在每个链接的末尾添加一个查询字符串，格式为`file=`后跟要下载的文件名。你可以在`ch07`文件夹中找到名为`getdownloads.php`的页面，其中包含以下两个链接：\n\
    \n```php\n    Download fountains image\n    Download monk image\n```\n"
- fmt: "### 4. Click one of the links. Depending on your browser settings, the file\
    \ will either be downloaded to your default downloads folder or you will be presented\
    \ with a dialog box asking you what to do with the file.\n\nI’ve demonstrated\
    \ `download.php` with image files, but it can be used for any type of file, as\
    \ the headers send the file as a binary stream.\n\n> **Caution**  \n> This script\
    \ relies on `header()` to send the appropriate HTTP headers to the browser. It\
    \ is vital to ensure that there are no new lines or whitespace ahead of the opening\
    \ PHP tag. If you have removed all whitespace and still get an error message saying\
    \ “headers already sent,” your editor may have inserted invisible control characters\
    \ at the beginning of the file. Some editing programs insert the byte order mark\
    \ (BOM), which is known to cause problems with the `header()` function. Check\
    \ your program preferences to make sure the option to insert the BOM is deselected.\n\
    \n### Chapter Review\n\nThe file system functions aren’t particularly difficult\
    \ to use, but there are many subtleties that can turn a seemingly simple task\
    \ into a complicated one. It’s important to check that you have the right permissions.\
    \ Even when handling files in your own web site, PHP needs permission to access\
    \ any folder where you want to read files or write to them.\n\nThe SPL `FilesystemIterator`\
    \ and `RecursiveDirectoryIterator` classes make it easy to examine the contents\
    \ of folders. Used in combination with the `SplFileInfo` methods and the `RegexIterator`,\
    \ you can quickly find files of a specific type within a folder or folder hierarchy.\n\
    \nWhen dealing with remote data sources, you need to check that `allow_url_fopen`\
    \ hasn’t been disabled. One of the most common uses of remote data sources is\
    \ to extract information from RSS news feeds or XML documents, a task that takes\
    \ only a few lines of code thanks to SimpleXML.\n\nLater in this book, we’ll put\
    \ some of the PHP solutions from this chapter to further practical use when working\
    \ with images and building a simple user authentication system.\n\n## 8. Working\
    \ with Arrays\n\nArrays are one of the most versatile data types in PHP. Their\
    \ importance is reflected by the fact that there are more than 80 core functions\
    \ dedicated to handling data stored in arrays. They can be generally categorized\
    \ as for modifying, sorting, comparing, and extracting information from arrays.\
    \ This chapter doesn’t attempt to cover all of them. It focuses on some of the\
    \ more interesting and useful applications of manipulating arrays.\n\nThis chapter\
    \ covers:\n\n- Understanding various approaches to modifying the contents of an\
    \ array\n- Merging arrays\n- Converting an array to a grammatical string\n- Finding\
    \ all permutations of an array\n- Sorting arrays\n- Automatically generating nested\
    \ HTML lists from a multidimensional array\n- Extracting data from JSON\n- Assigning\
    \ array elements to variables\n- Unpacking arrays with the splat operator\n\n\
    ### Modifying Array Elements\n\nNewcomers to PHP are frequently left scratching\
    \ their head when they try to modify each element in an array. Say, for example,\
    \ you want to perform a calculation with each element in an array of numbers.\
    \ The simple way to do so appears to be to use a loop, perform the calculation\
    \ inside the loop, and reassign the result to the current element, like this:\n\
    \n```php\n$numbers = [2, 4, 7];\nforeach ($numbers as $number) {\n    $number\
    \ *= 2;\n}\n```\n\nIt looks as though it should work; but it doesn’t. The values\
    \ in the `$numbers` array remain unchanged. This happens because PHP works on\
    \ a *copy* of the array inside a loop. The copy is discarded when the loop ends,\
    \ and with it the results of the calculations. To change the original array, the\
    \ value of each element needs to be passed by reference into the loop.\n\n####\
    \ PHP Solution 8-1: Modify Array Elements with a Loop\n\nThis PHP solution shows\
    \ how to modify each element in an array using a `foreach` loop. The technique\
    \ is similar for both indexed and associative arrays."
