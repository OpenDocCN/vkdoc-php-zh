    \n![A978-1-4842-0635-5_8_Fig2_HTML.jpg](img/A978-1-4842-0635-5_8_Fig2_HTML.jpg)\n\
    \n图 8-2. 验证设置器方法是否有效\n\n保存两个页面，并从`create_thumb.php`的列表中选择一张图片。您应该会看到类似于图 8-2 中的结果。\n\
    \n如有必要，请将您的代码与`ch08/PhpSolutions/Image`中的`Thumbnail_02.php`以及`ch08`文件夹中的`create_thumb_03.php`进行比较。\n"
- fmt: "# 排版后的内容\n\n你可能不同意我的决定：当作为参数传递的值无效时，静默失败。不过，现在你对条件语句应该有足够的经验，可以根据自己的需求调整代码。例如，如果你希望缩略图最大尺寸的设置方法返回错误消息而不是静默失败，请检查该值是否大于零，并添加一个`else`块来生成错误消息。`else`块还应该将`$canProcess`属性设置为`false`，以防止该类尝试创建缩略图图像。以下是调整`setMaxSize()`方法的方式：\n\
    \n```\npublic function setMaxSize($size) {\n    if (is_numeric($size) && $size\
    \ > 0) {\n        $this->maxSize = $size;\n    } else {\n        $this->messages[]\
    \ = 'The value for setMaxSize() must be a positive number.';\n        $this->canProcess\
    \ = false;\n    }\n}\n```\n\n## PHP 解决方法 8-3：计算缩略图的尺寸\n\n这个 PHP 解决方法向`Thumbnail`类添加了一个受保护方法，用于计算缩略图的尺寸。`$maxSize`属性中设置的值决定了宽度或高度，具体取决于哪个更大。为了避免扭曲缩略图，你需要计算较短尺寸的缩放比例。该比例通过将最大缩略图尺寸除以原始图像的较大尺寸来计算。\n\
    \n例如，金阁寺（`kinkakuji.jpg`）的原始图像为 270 × 346 像素。如果最大尺寸设置为 120，将 120 除以 346 得到缩放比例\
    \ 0.3468。将原始图像的宽度乘以这个比例，可将缩略图的宽度固定为 94 像素（向上取整到最接近的整数），从而保持正确的比例。下图 8-3 展示了缩放比例的工作方式。\n\
    \n![A978-1-4842-0635-5_8_Fig3_HTML.jpg](A978-1-4842-0635-5_8_Fig3_HTML.jpg)\n\n\
    **图 8-3.** 计算缩略图图像的缩放比例\n\n继续使用你现有的类定义。或者，使用`ch08/PhpSolutions/Image`文件夹中的`Thumbnail_02.php`。\n\
    \n计算缩略图尺寸不需要任何额外的用户输入，因此可以通过一个受保护方法来处理。将以下代码添加到类定义中。将其放在文件末尾，就在闭合花括号内部。\n\n```\n\
    protected function calculateSize($width, $height) {\n    if ($width <= $this->maxSize\
    \ && $height <= $this->maxSize) {\n        $ratio = 1;\n    } elseif ($width >\
    \ $height) {\n        $ratio = $this->maxSize/$width;\n    } else {\n        $ratio\
    \ = $this->maxSize/$height;\n    }\n    $this->thumbwidth = round($width * $ratio);\n\
    \    $this->thumbheight = round($height * $ratio);\n}\n```\n\n原始图像的尺寸作为`Thumbnail`对象的属性存储，因此你可以直接引用它们为`$this->originalWidth`和`$this->originalHeight`。然而，该方法需要经常引用这些值，所以我决定将它们作为参数传递，以使代码更易于阅读和输入。\n\
    \n条件语句首先检查原始图像的宽度和高度是否小于或等于最大尺寸。如果是，则图像无需调整大小，因此缩放比例设置为 1。\n\n`elseif`块检查宽度是否大于高度。如果是，则使用宽度来计算缩放比例。如果高度更大或两边相等，则调用`else`块。在这两种情况下，都使用高度来计算缩放比例。\n\
    \n最后两行将原始宽度和高度乘以缩放比例，并将结果赋值给`$thumbwidth`和`$thumbheight`属性。计算过程被包裹在`round()`函数中，该函数将结果四舍五入到最接近的整数。\n\
    \n此方法需要由创建缩略图图像的方法调用。将以下公共方法添加到受保护方法上方的类定义中：\n\n```\npublic function create()\
    \ {\n    if ($this->canProcess && $this->originalwidth != 0) {\n        $this->calculateSize($this->originalwidth,\
    \ $this->originalheight);\n    } elseif ($this->originalwidth == 0) {\n      \
    \  $this->messages[] = 'Cannot determine size of ' . $this->original;\n    }\n\
    }\n```\n\n这会检查`$canProcess`是否为`true`，并且原始图像的宽度是否为 0。第二个测试是必要的，因为如果`getimagesize()`无法确定尺寸，它会将宽度和高度设置为\
    \ 0。这通常发生在图像格式包含多个图像时。如果`$originalwidth`属性为 0，会向`$messages`数组中添加一条错误消息。\n\n要测试新方法，请像这样修改`test()`方法：\n\
    \n```\npublic function test() {\n    echo 'File: ' . $this->original . '<br>';\n\
    \    echo 'Original width: ' . $this->originalwidth . '<br>';\n    echo 'Original\
    \ height: ' . $this->originalheight . '<br>';\n    echo 'Base name: ' . $this->basename\
    \ . '<br>';\n    echo 'Image type: ' . $this->imageType . '<br>';\n    echo 'Destination:\
    \ ' . $this->destination . '<br>';\n    echo 'Max size: ' . $this->maxSize . \
    \ '<br>';\n    echo 'Suffix: ' . $this->suffix .  '<br>';\n    echo 'Thumb width:\
    \ ' . $this->thumbwidth . '<br>';\n    echo 'Thumb height: ' . $this->thumbheight\
    \ . '<br>';\n    if ($this->messages) {\n        print_r($this->messages);\n \
    \   }\n}\n```\n\n更新`create_thumb.php`中的代码以调用`create()`方法。它必须在`test()`方法之前调用。否则，缩略图的宽度和高度将不会被计算。修改后的代码如下所示：\n\
    \n```\n$thumb = new Thumbnail($_POST['pix']);\n$thumb->setDestination('C:/upload_test/thumbs/');\n\
    $thumb->setMaxSize(100);\n$thumb->setSuffix('small');\n$thumb->create();\n$thumb->test();\n\
    ```\n\n![A978-1-4842-0635-5_8_Fig4_HTML.jpg](A978-1-4842-0635-5_8_Fig4_HTML.jpg)\n\
    \n**图 8-4.** 该类现在正在生成创建缩略图图像所需的所有值\n\n通过在`create_thumb.php`中选择一张图像并点击“Create Thumbnail”来测试更新后的类。你应该会看到屏幕上显示这些值，如图\
    \ 8-4 所示。\n\n如有必要，请将你的代码与`ch08`文件夹中的`Thumbnail_03.php`进行对照检查。"
  raw: 'You might not agree with my decision to fail silently when the values passed
    as arguments are invalid. By now, though, you should have sufficient experience
    of conditional statements to adapt the code to your own requirements. For example,
    if you want the setter method for the thumbnail’s maximum size to return an error
    message instead of failing silently, check that the value is greater than zero
    and add an `else` block to generate the error message. The `else` block should
    also set the `$canProcess` property to `false` to prevent the class from attempting
    to create a thumbnail image. This is how you would adapt the `setMaxSize()` method:


    `public function setMaxSize($size) {`


    `if (is_numeric($size) &&` `$size > 0` `) {`


    `$this->maxSize = $size;`


    `}` `else {`


    `$this->messages[] = ''The value for setMaxSize() must be a positive number.'';`


    `$this->canProcess = false;`


    `}`


    `}`


    #### PHP Solution 8-3: Calculating the thumbnail’s dimensions


    This PHP solution adds a protected method to the `Thumbnail` class that will calculate
    the thumbnail’s dimensions. The value set in the `$maxSize` property determines
    the width or height, depending on which is larger. To avoid distorting the thumbnail,
    you need to calculate the scaling ratio for the shorter dimension. The ratio is
    calculated by dividing the maximum thumbnail size by the larger dimension of the
    original image.


    For example, the original image of the Golden Pavilion (`kinkakuji.jpg`) is 270
    × 346 pixels. If the maximum size is set at 120, dividing 120 by 346 produces
    a scaling ratio of 0.3468\. Multiplying the width of the original image by this
    ratio fixes the thumbnail’s width at 94 pixels (rounded up to the nearest whole
    number), maintaining the correct proportions. Figure [8-3](#A978-1-4842-0635-5_8_Chapter.html#Fig3)
    shows how the scaling ratio works.


    ![A978-1-4842-0635-5_8_Fig3_HTML.jpg](A978-1-4842-0635-5_8_Fig3_HTML.jpg)


    Figure 8-3.


    Working out the scaling ratio for a thumbnail image


    Continue working with your existing class definition. Alternatively, use `Thumbnail_02.php`
    in the `ch08/PhpSolutions/Image` folder.


    Calculating the thumbnail dimensions doesn’t require any further user input, so
    it can be handled by a protected method. Add the following code to the class definition.
    Put it at the end of the file, just inside the closing curly brace.


    `protected function calculateSize($width, $height) {`


    `if ($width <= $this->maxSize && $height <= $this->maxSize) {`


    `$ratio = 1;`


    `} elseif ($width > $height) {`


    `$ratio = $this->maxSize/$width;`


    `} else {`


    `$ratio = $this->maxSize/$height;`


    `}`


    `$this->thumbwidth = round($width * $ratio);`


    `$this->thumbheight = round($height * $ratio);`


    `}`


    The dimensions of the original image are stored as properties of the `Thumbnail`
    object, so you could refer to them directly as `$this->originalWidth` and `$this->originalHeight`.
    However, the method needs to refer to these values often, so I decided to pass
    them as arguments to make the code easier to read and type.


    The conditional statement begins by checking if the width and height of the original
    image are less than or equal to the maximum size. If they are, the image doesn’t
    need to be resized, so the scaling ratio is set to 1.


    The `elseif` block checks if the width is greater than the height. If it is, the
    width is used to calculate the scaling ratio. The `else` block is invoked if the
    height is greater or both sides are equal. In either case, the height is used
    to calculate the scaling ratio.


    The last two lines multiply the original width and height by the scaling ratio
    and assign the results to the `$thumbwidth` and `$thumbheight` properties. The
    calculation is wrapped in the `round()` function, which rounds the result to the
    nearest whole number.


    This method needs to be called by the method that creates the thumbnail image.
    Add the following public method to the class definition above the protected methods:


    `public function create() {`


    `if ($this->canProcess && $this->originalwidth != 0) {`


    `$this->calculateSize($this->originalwidth, $this->originalheight);`


    `} elseif ($this->originalwidth == 0) {`


    `$this->messages[] = ''Cannot determine size of '' . $this->original;`


    `}`


    `}`


    This checks that `$canProcess` is `true` and that the width of the original image
    is not 0\. The second test is necessary because `getimagesize()` sets the width
    and height to 0 if it can’t determine the size. This usually happens if the image
    format contains multiple images. If the `$originalwidth` property is 0, an error
    message is added to the `$messages` array.


    To test the new method, amend the `test()` method like this:


    `public function test() {`


    `echo ''File: '' . $this->original . ''<br>'';`


    `echo ''Original width: '' . $this->originalwidth . ''<br>'';`


    `echo ''Original height: '' . $this->originalheight . ''<br>'';`


    `echo ''Base name: '' . $this->basename . ''<br>'';`


    `echo ''Image type: '' . $this->imageType . ''<br>'';`


    `echo ''Destination: '' . $this->destination . ''<br>'';`


    `echo ''Max size: '' . $this->maxSize .  ''<br>'';`


    `echo ''Suffix: '' . $this->suffix .  ''<br>'';`


    `echo ''Thumb width: '' . $this->thumbwidth . ''<br>'';`


    `echo ''Thumb height: '' . $this->thumbheight . ''<br>'';`


    `if ($this->messages) {`


    `print_r($this->messages);`


    `}`


    `}`


    Update the code in `create_thumb.php` to call the `create()` method. It must come
    before the `test()` method. Otherwise, the width and height of the thumbnail won’t
    be calculated. The revised code looks like this:


    `$thumb = new Thumbnail($_POST[''pix'']);`


    `$thumb->setDestination(''C:/upload_test/thumbs/'');`


    `$thumb->setMaxSize(100);`


    `$thumb->setSuffix(''small'');`


    `$thumb->create();`


    `$thumb->test();`


    ![A978-1-4842-0635-5_8_Fig4_HTML.jpg](A978-1-4842-0635-5_8_Fig4_HTML.jpg)


    Figure 8-4.


    The class is now generating all the values needed to create the thumbnail image
    Test the updated class by selecting an image in `create_thumb.php` and clicking
    Create Thumbnail. You should see the values displayed onscreen, as shown in Figure
    [8-4](#A978-1-4842-0635-5_8_Chapter.html#Fig4).


    If necessary, check your code against `Thumbnail_03.php` in the `ch08` folder.'
