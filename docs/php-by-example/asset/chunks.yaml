    \n翻译自俄语版本：“Программирование на PHP в примерах и задачах”（阿列克斯·瓦西里耶夫 著），© Alex\
    \ Vasilev 2021。由 Eksmo Publishing 出版。保留所有权利。\n\n© Alex Vasilev 2024 本作品受版权保护。无论整体还是部分材料，其所有权利均由出版者独家授权，具体包括重印、插图再利用、朗诵、广播、微缩胶片复制或以任何其他物理方式复制的权利，以及以目前已知或今后开发的任何相似或不同方法进行传输、信息存储与检索、电子改编、计算机软件等权利。本出版物中通用描述性名称、注册商标名称、商标、服务标记等的使用，即使未作明确声明，也不意味着这些名称免于相关保护法律和法规的约束，因此可自由使用。出版者、作者与编辑谨慎假定，本书中的建议和信息在出版之日是真实准确的。出版者、作者或编辑对本文所含内容或可能存在的任何错误或遗漏不作任何明示或暗示的担保。出版者对于出版地图中的管辖权主张和机构所属关系保持中立态度。\n\
    \n本 Apress 印记由隶属于施普林格自然的注册公司 APress Media, LLC 出版。\n\n注册公司地址为：1 New York Plaza,\
    \ New York, NY 10004, U.S.A.\n\n*谨以此书纪念我的父亲。感谢您给予的一切，并为我未能回报的一切致歉。*\n\n## 引言\n\
    \n> *宇宙中有许多事情是你本不该理解的。但这并不意味着它们不真实。*\n> \n> ——《ALF》（电视剧）\n\n本书讨论的是 PHP 编程语言。PHP\
    \ 是一门简单、优美且优雅的语言。此外，它在某种意义上也是独特的。PHP 旨在服务器端执行代码。换句话说，仅仅了解 PHP 是不够的，还必须理解它是如何被使用以及用于什么目的。这一点很重要，因为理解语言的功能是有效使用它的关键。\n\
    \n> **注意：** PHP 是一门用于编程和 Web 编程的语言。\n\n### 关于 PHP\n\nPHP 语言用于创建网站和 Web 应用程序。它历史悠久，深受开发者欢迎，并得到大多数托管服务器的支持。\n\
    \n| 详情 |\n| --- |\n| 托管（Hosting）是一种提供服务、在服务器上提供资源与空间来存储数据和信息（例如网页）的服务。托管服务器（Host\
    \ Server）是指托管这些信息的服务器。简单而言，托管服务器就是一台计算机（服务器），它托管用户的网页（即预期使用 PHP 的页面）。 |\n\nPHP\
    \ 的作者是拉斯马斯·勒德尔夫。该项目最初是为了支持个人网页而编写脚本，并命名为 Personal Homepages Tools 或 PHP Tools。后来，它转变为独立且有影响力的软件产品。如今，PHP\
    \ 这个名称通常与短语 *Hypertext Preprocessor*（超文本预处理器）相关联，这与事实相差不远。\n\n> **注意：** 编写本书时，当前版本为\
    \ PHP 8。另一方面，在实践中，语言的最新版本并不会立即投入使用。由于客观和主观因素，这里存在一定的惯性。因此，本书考虑了与最近几个语言版本相关的通用方法。值得注意的是，没有第六版：第五版之后是第七版。原因是尝试发布第六版的尝试非常不成功。\n\
    \nPHP 是一种脚本化和解释型语言。可解释性意味着程序在特定程序（称为*解释器*）的控制下执行。解释器逐行读取代码并执行相应的指令。\n\n![](img/613529_1_En_BookFrontmatter_Figd_HTML.gif)\
    \  \n一个铃铛图标。PHP 8 标准版\n\nPHP 8 引入了 JIT 编译器（*Just in Time* 的缩写）用于编译 PHP 代码，以加速程序执行。编译时，程序指令会被翻译成处理器级别的指令。\n\
    \n脚本语言通常是高级语言。与常规程序不同，脚本通常包含用于控制现成软件组件的指令。换句话说，脚本语言是一种直观的语言。当然，并非所有情况都如此美好。\n\n\
    | 详情 |\n| --- |\n| C 语言影响了 PHP 语言的语法。因此，如果你熟悉 C、C++、C# 或 Java 等语言，你会发现许多熟悉的语法结构。\
    \ |\n\n当然，PHP 只是众多编程语言中的一种。但它有一个重要的特点，体现在 PHP 代码的使用方式上。\n\n如果你使用任何传统的编程语言，编写和使用程序的过程通常如下：首先，创建程序代码——换句话说，编写一个程序。然后，必须执行该程序。如何执行取决于语言，但最关键的问题是程序是*编译型*还是*解释型*。如果程序是编译型的，特定的编译器程序会将你的程序翻译成机器指令（或类似指令），然后执行这些指令。如果程序是解释型的，特定的解释器程序会读取你的程序并执行代码中的语句。但无论哪种情况，关键在于你所有的操作都在同一台计算机上完成。你在计算机上运行程序并获得结果。你可以对程序执行的结果做任何你想做的事情，但重要的是，只需一台计算机就够了。\n\
    \n对于 PHP 语言，情况则有所不同。要理解这个问题，让我们来看看当你访问一个网页时会发生什么，以及 PHP 在其中的作用。\n"
- fmt: '## A Client and a Server


    In general terms, here is the scheme according to which the site is viewed on
    the network. In this case, the main acting “characters” are the computer on which
    you want to view the web page and the computer on which that page is located.
    The first computer (on which you are trying to view the web page) is called a
    *client*, and the computer on which the web page is located is called a *server*.


    There is a connection between these computers through the global network; therefore,
    the computers can send information to each other. You work on a client computer
    and want to view a web page. To do that, you run a special program designed to
    view web pages. The program is called a *browser*. You open a browser (for example,
    Chrome, Opera, or Edge), and in the address bar, you enter the site address you
    want to view. The browser initiates a request to the server. The server receives
    the request, processes it, and returns a response to the client. The response
    contains the document’s code; the browser should display it on the client screen.
    The general scheme of the “interaction” is illustrated in Figure [I-1](#613529_1_En_BookFrontmatter_OnlinePDF.xhtml#Fig1).


    | Details |

    | --- |

    | **You can use the** `php -v` **command-line instructions to check the PHP version.
    To get PHP help, use the** `php -h` **command. Additional information about PHP
    can be obtained with the** `php -i` **command.**<br>**If you use the Windows operating
    system, you can enter the** `cmd` **instruction into the address bar of Windows
    Explorer to switch to the terminal mode. Then, you must change to the PHP directory
    in the terminal window. For example, if PHP is in the** `C:\PHP` **folder, the
    appropriate command would be** `cd C:\PHP`**. An alternative is to navigate to
    the PHP directory first and then enter the** `cmd` **instruction in the Explorer
    address bar.**<br>**Many operating systems of the Linux family have PHP pre-installed.
    But if this is not the case, you can use the** `sudo apt install php` **command
    to install PHP.** |


    ![](images/613529_1_En_BookFrontmatter_Fig1_HTML.jpg)


    A schematic presents the computer devices with the flow indicating the connection
    between a client and a server.


    **Figure I-1** The scheme of the interaction between a client and a server


    The browser processes the document in HTML format (the abbreviation comes from
    Hypertext Markup Language). The text contains a special markup. The browser “understands”
    that markup and renders the document following the instructions embedded in the
    document. In addition to the actual HTML markup, the document displayed by the
    browser can contain additional instructions. For example, CSS (Cascading Style
    Sheets) formatting can be used in the document. The document may also contain
    JavaScript scripts. In the latter case, the browser executes these scripts. So,
    the server sends a set of commands, and the browser executes them. The important
    thing is that the commands are executed on the same computer that made the request.


    > **Note:** The server tells what to do, and the client’s browser performs the
    necessary operations. Convenient but not always safe.


    So, where is the place for PHP in this scheme? The answer is at the stage of processing
    the request by the server. When the server receives a request from a client, it
    processes the request, and while processing it, scripts can be executed—in this
    case, PHP scripts.


    | Details |

    | --- |

    | Often, the script’s output is a generated HTML code passed to the client. |


    But that is not all. Many programs try to exchange information over the network.
    Processes on a client send signals to processes on a server and back, and you
    need to know which signal is for which process. For that purpose, you use ports.
    Ports are unique integer identifiers the processes use to identify the signals
    sent to them. Therefore, requests from the client’s browser and server responses
    must be synchronized by ports. That is, to work effectively with PHP, you need
    to solve quite a few technical problems. All that is considered step by step,
    as necessary.


    ## How to Execute the PHP Code


    Let’s take the next step in studying PHP. Namely, focusing on how to execute a
    program written in PHP. If you are talking about the “natural” way of using PHP
    code, you would need a server and a client. That is two computers. The script
    (the program) is hosted on the server, and you can view the result of the program
    execution by accessing the web page on the server through the client browser.
    But even if all these resources are available, the described strategy is not very
    convenient since you need to edit the program on one computer (the server) and
    check the result on another computer (the client). So, it is clear that you would
    like to have a more reliable strategy.


    An alternative way is to “trick” the browser. Namely, you can create an illusion
    that the server is a client itself. It’s about using a *local server*. It is easy
    to switch to that mode. The advantage of the approach is that the program and
    its result are localized within the same computer.


    On the other hand, PHP code can be executed using an interpreter— that is, approximately
    the same as in the case of other interpreted languages. That is probably the easiest
    way to see what the result of running a program is. Nevertheless, you should not
    forget that PHP programs are not written to be executed by the interpreter on
    the client’s computer. So, there will be some tricks, too.'
