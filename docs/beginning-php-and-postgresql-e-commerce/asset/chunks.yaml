    \ = DatabaseHandler::Prepare($sql);\n\n// Execute the query and return the results\n\
    return DatabaseHandler::GetAll($result, $params);\n```\n\n## GetCategoryDetails\n\
    \n`GetCategoryDetails` is called from the presentation tier when a category is\
    \ clicked to display its name and description. The presentation tier passes the\
    \ ID of the selected category, and you need to send back the name and the description\
    \ of the selected category.\n\n```php\n// Retrieves complete details for the specified\
    \ category\npublic static function GetCategoryDetails($categoryId)\n{\n    //\
    \ Build SQL query\n    $sql = 'SELECT *\n            FROM catalog_get_category_details(:category_id);';\n\
    \n    // Build the parameters array\n    $params = array (':category_id' => $categoryId);\n\
    \n    // Prepare the statement with PDO-specific functionality\n    $result =\
    \ DatabaseHandler::Prepare($sql);\n\n    // Execute the query and return the results\n\
    \    return DatabaseHandler::GetRow($result, $params);\n}\n```\n\n## HowManyPages\n\
    \nAs you know, our product catalog will display a fixed number of products in\
    \ every page. When a catalog page contains more than an established number of\
    \ products, we display navigation controls that allow the visitor to browse back\
    \ and forth through the subpages of products. You can see the navigation controls\
    \ in Figure 3-2 in Chapter 3 or later in this chapter in Figure 4-11.\n\nWhen\
    \ displaying the navigation controls, you need to calculate the number of subpages\
    \ of products you have for a given catalog page; for this, we’re creating the\
    \ `HowManyPages` helper method.\n\nThis method receives as argument a SELECT query\
    \ that counts the total number of products of the catalog page (`$countSql`) and\
    \ returns the number of subpages. This will be done by simply dividing the total\
    \ number of products by the number of products to be displayed in a subpage of\
    \ products; this latter number is configurable through the `PRODUCTS_PER_PAGE`\
    \ constant in `include/config.php`.\n\nTo improve the performance when the visitor\
    \ browses back and forth through the subpages, after we calculate the number of\
    \ subpages for the first time, we’re saving it to the visitor’s session. This\
    \ way, the SQL query received as parameter won’t need to be executed more than\
    \ once on a single visit to a catalog page.\n\nThis method is called from the\
    \ other data tier methods (`GetProductsInCategory`, `GetProductsOnDepartment`,\
    \ `GetProductsOnCatalog`), which we’ll cover next.\n\nAdd `HowManyPages` to the\
    \ `Catalog` class.\n\n```php\n/* Calculates how many pages of products could be\
    \ filled by the number of products\n   returned by the $countSql query */\nprivate\
    \ static function HowManyPages($countSql, $countSqlParams)\n{\n    // Create a\
    \ hash for the sql query\n    $queryHashCode = md5($countSql . var_export($countSqlParams,\
    \ true));\n\n    // Verify if we have the query results in cache\n    if (isset\
    \ ($_SESSION['last_count_hash']) &&\n        isset ($_SESSION['how_many_pages'])\
    \ &&\n        $_SESSION['last_count_hash'] === $queryHashCode)\n    {\n      \
    \  // Retrieve the the cached value\n        $how_many_pages = $_SESSION['how_many_pages'];\n\
    \    }\n    else\n    {\n        // Execute the query\n        $prepared = DatabaseHandler::Prepare($countSql);\n\
    \        $items_count = DatabaseHandler::GetOne($prepared, $countSqlParams);\n\
    \n        // Calculate the number of pages\n        $how_many_pages = ceil($items_count\
    \ / PRODUCTS_PER_PAGE);\n\n        // Save the query and its count result in the\
    \ session\n        $_SESSION['last_count_hash'] = $queryHashCode;\n        $_SESSION['how_many_pages']\
    \ = $how_many_pages;\n    }\n\n    // Return the number of pages\n    return $how_many_pages;\n\
    }\n```\n\nLet’s analyze the function to see how it does its job.\n\nThe method\
    \ is private because you won’t access it from within other classes—it’s a helper\
    \ class for other methods of `Catalog`.\n\nThe method verifies whether the previous\
    \ call to it was for the same SELECT query. If it was, the result cached from\
    \ the previous call is returned. This small trick improves performance when the\
    \ visitor is browsing subpages of the same list of products because the actual\
    \ counting in the database is performed only once.\n\n```php\n// Create a hash\
    \ for the sql query\n$queryHashCode = md5($countSql . var_export($countSqlParams,\
    \ true));\n\n// Verify if we have the query results in cache\nif (isset ($_SESSION['last_count_hash'])\
    \ &&\n    isset ($_SESSION['how_many_pages']) &&\n    $_SESSION['last_count_hash']\
    \ === $queryHashCode)\n{\n    // Retrieve the the cached value\n    $how_many_pages\
    \ = $_SESSION['how_many_pages'];\n}\n```\n\nThe number of pages associated with\
    \ the received query and parameters is saved in the current visitor’s session\
    \ in a variable named `how_many_pages`. If the conditions aren’t met, which means\
    \ the results of the query aren’t cached, we calculate them and save them to the\
    \ session:\n\n```php\nelse\n{\n    // Execute the query\n    $prepared = DatabaseHandler::Prepare($countSql);\n\
    \    $items_count = DatabaseHandler::GetOne($prepared, $countSqlParams);\n\n \
    \   // Calculate the number of pages\n    $how_many_pages = ceil($items_count\
    \ / PRODUCTS_PER_PAGE);\n\n    // Save the query and its count result in the session\n\
    \    $_SESSION['last_count_hash'] = $queryHashCode;\n    $_SESSION['how_many_pages']\
    \ = $how_many_pages;\n}\n```\n\nIn the end, no matter if the number of pages was\
    \ fetched from the session or calculated by the database, it is returned to the\
    \ calling function:\n\n```php\n// Return the number of pages\nreturn $how_many_pages;\n\
    ```\n\n## GetProductsInCategory\n\n`GetProductsInCategory` returns the list of\
    \ products that belong to a particular category. Add the following method to the\
    \ `Catalog` class in `business/catalog.php`:\n\n```php\n// Retrieves list of products\
    \ that belong to a category\npublic static function GetProductsInCategory(\n \
    \   $categoryId, $pageNo, &$rHowManyPages)\n{\n    // Query that returns the number\
    \ of products in the category\n    $sql = 'SELECT catalog_count_products_in_category(:category_id);';\n\
    \    $params = array (':category_id' => $categoryId);\n\n    // Calculate the\
