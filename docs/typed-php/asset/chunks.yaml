    virtual machines. If you’ve ever set up a virtual machine, installed the operating
    system, installed the development tools, you will know how much time it takes
    to do well. This process can be automated with Vagrant.


    Vagrant depends on underlying virtualisation providers and provisioners. We’ll
    look at using VirtualBox as the virtualisation provider and Ansible as the provisioner.


    #### Installing


