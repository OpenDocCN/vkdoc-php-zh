- fmt: "## 使用 phpMyAdmin 创建表\n\n| Field | Type | Length/Values | Attributes | Null\
    \ | Index | A_I |\n| --- | --- | --- | --- | --- | --- | --- |\n| `image_id` |\
    \ `INT` | | `UNSIGNED` | Deselected | `PRIMARY` | Selected |\n| `filename` | `VARCHAR`\
    \ | `25` | | Deselected | | |\n| `caption` | `VARCHAR` | `120` | | Deselected\
    \ | | |\n\n1.  Launch phpMyAdmin, if it’s not already open, and select `phpsols`\
    \ from the list of databases on the left of the screen. This opens the `Structure`\
    \ tab, which reports that no tables have been found in the database.\n2.  In the\
    \ `Create table` section, type the name of the new table (`images`) in the `Name`\
    \ field and enter `3` in the `Number of columns` field. Then click the `Go` button.\n\
    3.  The next screen is where you define the table. There are a lot of options,\
    \ but not all of them need to be filled in. Table [12-1](#332054_4_En_12_Chapter.xhtml#Tab1)\
    \ lists the settings for the `images` table.\n\nThe first column, `image_id`,\
    \ is defined as type `INT`, which stands for integer. Its attribute is set to\
    \ `UNSIGNED`, which means that only positive numbers are allowed. When you select\
    \ `PRIMARY` from the Index drop-down, phpMyAdmin opens a modal panel where you\
    \ can specify advanced options. Accept the default setting, and click Go to dismiss\
    \ the panel. Then, select the `A_I` (`AUTO_INCREMENT`) check box. This tells MySQL\
    \ to insert the next available number (starting at 1) in this column whenever\
    \ a new record is inserted.\nThe next column, `filename`, is defined as type `VARCHAR`\
    \ with a length of `25`. This means it accepts up to 25 characters of text.\n\
    The final column, `caption`, is also `VARCHAR` with a length of `120`, so it accepts\
    \ up to 120 characters of text.\nThe `Null` check box for all columns is deselected,\
    \ so they must always contain something. However, that “something” can be as little\
    \ as an empty string. I’ll describe the column types in more detail in the “Choosing\
    \ the right data type in MySQL” section later in this chapter.\nThe following\
    \ screenshot shows the options after they have been set in phpMyAdmin (the columns\
    \ to the right of `A_I` have been left out because they don’t need to be filled\
    \ in):\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figg_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figg_HTML.jpg)\n\
    Toward the bottom of the screen is an option for `Storage Engine`. This determines\
    \ the format used internally to store the database files. InnoDB has been the\
    \ default since MySQL 5.5. Prior to that MyISAM was the default. I’ll explain\
    \ the differences between these storage engines in Chapter [17](#332054_4_En_17_Chapter.xhtml).\
    \ In the meantime, use InnoDB. Converting from one storage engine to another is\
    \ very simple.\nWhen you have finished, click the `Save` button at the bottom\
    \ of the screen.\n\n**Tip**  \nIf you click `Go` instead of `Save`, phpMyAdmin\
    \ adds an extra column for you to define. If this happens, just click `Save`.\
    \ As long as you don’t enter values into the fields, phpMyAdmin ignores the extra\
    \ column.\n\n1.  The next screen lists the `images` table with a series of actions\
    \ you can perform on the table. Under `Action`, click `Structure`, or click the\
    \ `Structure` tab at the top of the screen. This displays the details of the table\
    \ you have just created.\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figh_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figh_HTML.jpg)\n\
    The gold key to the right of `image_id` indicates that it’s the table’s primary\
    \ key. To edit any settings, click `Change` in the appropriate row. This opens\
    \ the previous screen and allows you to change the values.\n\n**Tip**  \nIf you\
    \ made a complete mess and want to start again, click the `Operations` tab at\
    \ the top of the screen. Then, in the `Delete data or table` section, click `Delete\
    \ the table (DROP)` and confirm that you want to drop the table. (In SQL, *delete*\
    \ refers only to records. You *drop* a column, table, or database.)\n\n## Inserting\
    \ records into a table\n\nNow that you have a table, you need to put some data\
    \ into it. Eventually, you’ll need to build your own content management system\
    \ using HTML forms, PHP, and SQL, but the quick and easy way to do it is with\
    \ phpMyAdmin.\n\n### Using phpMyAdmin to Insert Records Manually\n\nThese instructions\
    \ show how to add records to the `images` table through the phpMyAdmin interface.\n\
    \n1.  If phpMyAdmin is still displaying the structure of the `images` table as\
    \ at the end of the previous section, skip to step 2. Otherwise, launch phpMyAdmin\
    \ and select the `phpsols` database from the list on the left. Then click `Structure`\
    \ to the right of `images`, as shown in the following screenshot:\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figi_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figi_HTML.jpg)\n\
    \n**Tip**  \nThe breadcrumb trail at the top of the main frame provides the context\
    \ for the tabs across the head of the page. The `Structure` tab at the top left\
    \ of the preceding screenshot refers to the structure of the `phpsols` database.\
    \ To access the structure of an individual table, click the `Structure` link alongside\
    \ the table’s name.\n\n1.  Click the `Insert` tab in the center top of the page.\
    \ This displays the following screen, ready for you to insert up to two records:\n\
    \n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figj_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figj_HTML.jpg)\n\
    \n1.  The forms display the names and details of each column. You can ignore the\
    \ `Function` fields. MySQL has a large number of functions that you can apply\
    \ to the values being stored in your table. You’ll learn more about them in the\
    \ following chapters. The `Value` field is where you enter the data you want to\
    \ insert in the table.\n\n    Because you have defined `image_id` as `AUTO_INCREMENT`,\
    \ MySQL inserts the next available number automatically. So you *must* leave the\
    \ `image_id Value` field blank. Fill in the next two `Value` fields as follows:\n\
    \n    *   `filename`: `basin.jpg`\n    *   `caption`: `Water basin at Ryoanji\
    \ temple, Kyoto`\n\n2.  In the second form, leave the `Value` field for `image_id`\
    \ blank and fill in the next two fields like this:\n\n    *   `filename`: `fountains.jpg`\n\
    \    *   `caption`: `Fountains in central Tokyo`\n\n    Normally, the `Ignore`\
    \ check box is automatically deselected when you add values to the second form,\
    \ but deselect it if necessary.\n\n1.  Click the `Go` button at the bottom of\
    \ the second form. The SQL used to insert the records is displayed at the top\
    \ of the page. I’ll explain the basic SQL commands in the remaining chapters,\
    \ but studying the SQL that phpMyAdmin displays is a good way to learn how to\
    \ build your own queries. SQL is closely based on human language, so it isn’t\
    \ all that difficult to learn.\n\n2.  Click the `Browse` tab at the top left of\
    \ the page. You should now see the first two entries in the `images` table, as\
    \ shown here:\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figk_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figk_HTML.jpg)\n\
    \nAs you can see, MySQL has inserted `1` and `2` in the `image_id` fields. You\
    \ could continue typing out the details of the remaining six images, but let’s\
    \ speed things up a bit by using an SQL file that contains all the necessary data.\n\
    \n### Loading the Images Records from an SQL file\n\nBecause the primary key of\
    \ the `images` table has been set to `AUTO_INCREMENT`, it’s necessary to drop\
    \ the table and all its data. The SQL file does this automatically and builds\
    \ the table from scratch. These instructions assume that phpMyAdmin is open to\
    \ the page in step 6 of the previous section."
