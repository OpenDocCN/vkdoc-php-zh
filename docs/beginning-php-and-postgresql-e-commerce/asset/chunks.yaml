    \ method.\n\nYou then have the `GetRequest` method that returns the last XML document\
    \ built by either `MakeXmlPre` or `MakeXmlFulfill`:\n\n```\n// Get the current\
    \ XML\npublic function GetRequest()\n{\n    return $this->_mXml;\n}\n```\n\nFinally,\
    \ the `GetResponse` method actually sends the latest XML request file, built by\
    \ a call to either `MakeXmlPre` or `MakeXmlFulfill`, and returns the response\
    \ XML. Let’s take a closer look at this method.\n\n`GetResponse` starts by initializing\
    \ a CURL session and setting the POST method to send your data:\n\n```\n// Send\
    \ an HTTP POST request to DataCash using CURL\npublic function GetResponse()\n\
    {\n    // Initialize a CURL session\n    $ch = curl_init();\n\n    // Prepare\
    \ for an HTTP POST request\n    curl_setopt($ch, CURLOPT_POST, 1);\n\n    // Prepare\
    \ the XML document to be POSTed\n    curl_setopt($ch, CURLOPT_POSTFIELDS, $this->_mXml);\n\
    \n    // Set the URL where we want to POST our XML structure\n    curl_setopt($ch,\
    \ CURLOPT_URL, $this->_mUrl);\n\n    /* Do not verify the Common name of the peer\
    \ certificate in the SSL handshake */\n    curl_setopt($ch, CURLOPT_SSL_VERIFYHOST,\
    \ 0);\n\n    // Prevent CURL from verifying the peer's certificate\n    curl_setopt($ch,\
    \ CURLOPT_SSL_VERIFYPEER, 0);\n```\n\nTo return the transfer into a PHP variable,\
    \ we set the `CURLOPT_RETURNTRANSFER` parameter to 1, send the request, and close\
    \ the CURL session:\n\n```\n    /* We want CURL to directly return the transfer\
    \ instead of printing it */\n    curl_setopt($ch, CURLOPT_RETURNTRANSFER, 1);\n\
    \n    // Perform a CURL session\n    $result = curl_exec($ch);\n\n    // Close\
    \ a CURL session\n    curl_close($ch);\n\n    // Return the response\n    return\
    \ $result;\n}\n```\n\nThe `test_datacash.php` file acts like this. When you load\
    \ it in the browser, the script makes a pre-authentication request and a fulfill\
