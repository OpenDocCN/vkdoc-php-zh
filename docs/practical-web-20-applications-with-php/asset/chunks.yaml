    the ID of the blog post. Each document in the index will have its own internal
    ID; however, we are not able to set this ourselves, so we must still store the
    relevant blog post ID from our database.


    In the previous section, we looked at the five different types of fields we can
    add to an indexable document. There is a static method in the Zend_Search_Lucene_Field
    class for each of these types. This creates an object compatible with the addField()
    method. The name of the field is the first argument, while its value is the second
    argument.


    In the post_id field we use the Keyword type. These are the reasons we use this
    type:


    • We want to retrieve the document from the index later using this ID (that is,
