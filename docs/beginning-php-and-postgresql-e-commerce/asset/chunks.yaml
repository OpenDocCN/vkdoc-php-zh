    link back to the original product info (if the product still exists), product_id
    is used to create the primary key of order_detail.


    product_id comes in very handy here because having it in the composite primary
    key in order_detail saves you from needing to add another primary key field, and
    also ensures that you won’t have the same product more than once in a single order.


    **Implementing the Data Tier**


