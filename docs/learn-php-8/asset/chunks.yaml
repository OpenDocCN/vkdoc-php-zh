    \ now contains 579\n```\n\n4\\. Two **floating-point\nnumbers**  added together\
    \ produce a floating-point number\nstored in the variable.\n\n```\n$myValue =\
    \ 123.123 + 123.456;\nResult: $myValue now contains 246.579\n```\n\n5\\. A floating-point\
    \ number added to an integer will produce a\nfloating-point number.\n\n```\n$myValue\
    \ = 123.233 + 12;\nResult: $myValue now contains 135.233\n```\n\n6\\. A attempt\
    \ to add a number to a string number will be successful, if\nthe string can be\
    \ converted to a number. Adding the values together will\nproduce results similar\
    \ to the preceding examples.\n\n```\n$myValue = 123 + \"456\";\nResult: $myValue\
    \ now contains 579\n```\n\nThe **string concatenation character** (.)  can be\
    \ used to merge\nthe two strings together. The result then can be placed in the\
