  :\"' . $user['lastattempt'] . '\",\"validattempt\":\"' . $user['validattempt'] .'\"\
  ';\n$newupstring .= '\"}\\n]}';\n```\n\n#### MySQL 数据\n\nMySQL 登录代码需要使用 `UPDATE`\
  \ 语句（而不是注册代码中的 `INSERT` 语句）来更新已更改的字段。此外，应使用第 5 章中的 `filter_var` 方法，从 `userid` 字段中移除任何有害的\
  \ PHP 和 SQL 语句。这将有助于降低发生 *SQL 注入* 的几率，因为 SQL 注入可能导致 SQL 语句更改超出所需字段和记录的范围。例如，如果 `$user['userid']`\
  \ 字段包含 `'*'`，则所有记录都将被更新，而不仅仅是具有有效用户 ID 的单条记录。在执行 `UPDATE` 语句之前，还可以验证用户 ID 是否存在于数据库中。这样做（假设数据库中的所有数据均有效）也能减少发生有害更改的可能性。\n\
  \n在以下示例中，所有可能的文件会一次性更新。或者，也可以在需要时仅更新已更改的字段。但这样做需要更多代码，且不一定更高效。此外，如果未事先验证用户 ID 是否存在于数据库中，而\
  \ `userid` 又不在数据库里，那么 SQL 语句将自动不更新任何字段。\n\n\n\n```\n$userid = filter_var($user['userid'],\
  \ FILTER_SANITIZE_STRING);\n$sql =\"UPDATE Users SET(datestamp='\" . $user['datestamp']\
  \ . \"',attempts='\";\n$sql .=$user['attempts'] . \"',lastattempt='\" . $user['lastattempt']\
  \ . \"',\";\n$sql .=\"validattempt='\" . $user['validattempt'] . \"') WHERE userid='\"\
  \ . $userid . \"';\";\n```\n\n注意，上述`UPDATE`代码的`WHERE`语句中**没有**包含密码字段。在此示例中，当密码无效时会更新部分字段，当密码有效时会更新另一部分字段。如果将\
  \ SQL 语句拆分为多个语句（至少一个用于有效用户 ID/密码，一个用于无效用户/密码），则有效信息的`WHERE`语句可以同时包含用户 ID 和密码，而无效信息的语句可以仅包含密码。包含使用\
