    For some very strange reason, we have decided to look up “green cats” on the Internet.
    As we enter the string into our favorite search engine (Google in this example)
    and then click the Search button, the information is passed to a Google server
    farm somewhere. Where? Who knows; it could be anywhere on the planet. But the
    power of the Internet is that we do not care as long as we get our results back
    quickly. Okay, I must say I am amazed that there are 883 million possible links
    to green cats. Wow, that number was 100+ million in 2014. Maybe we should have
    filtered that down some. The point, however, is that Google returns a web page
    with a listing of links and descriptions of those links (plus ads). Did Google
    return a *static* page that already existed? No. The servers created a *dynamic*
    page from the request of the user. The Google algorithms (software) searched the
    massive Google database farms. The request was first sent to a Google web server
    from the user’s browser. The web server then sent a request to the Google databases
    (actually using a Google Query Language similar to SQL) to return information
    about “green cats”. The software on the web server then compiled the results,
    added HTML and JavaScript (also some Google Script Language code) for formatting
    the results web page, and returned the information to the user.


    - **Static vs. dynamic web pages** — A static web page does not change in relation
    to user requests or input. The page is created by a web developer and resides
    on the web server. When the user requests the page via a browser, a copy of the
    page is sent to the browser for display. A dynamic page does not exist within
    a web server. The page is created using input from the user. A program residing
    on the web server will create and format the page. The page that is created by
    the program is then downloaded to the user’s browser. A copy of the page is not
    (usually) maintained on the web server. For more information on static web pages,
    visit [http://en.wikipedia.org/wiki/Static_web_page](http://en.wikipedia.org/wiki/Static_web_page).
    For more information on dynamic web pages, visit [http://en.wikipedia.org/wiki/Dynamic_web_page](http://en.wikipedia.org/wiki/Dynamic_web_page).


    Did every page get downloaded to the user’s web browser? No, just the first page.
    The page links at the bottom of the first results page return information to the
    web server requesting the next set of information (to dynamically create the second
    page, or another requested page). As you might now be starting to figure out,
    the same process we have just discussed related to processing PHP files on the
    Internet is a very common process for creating dynamic pages. You might have noticed
    something interesting about the results page URL address that was displayed. The
    address is now `www.google.com/search?source=hp&ei=KQ2KXtaJOOW3ggeY9IWQBw&q=green+cats&oq=green+cats&gs_lcp=CgZwc3ktYWIQAzICCAAyAggAMgIIADICCAAyAggAMgIIADICCAAyAggAMgIIADICCAA6BQgAEIMBSioIFxImMGcxMTRnMTAyZzk2ZzEwMGcxMjFnMTA3Zzk3ZzExNmcxMDNnOTBKGQgYEhUwZzFnMWcxZzFnMWcxZzFnMWcxZzFQr01Y93Bgv-AHaAJwAHgAgAFliAG3BpIBAzkuMZgBAKABAaoBB2d3cy13aXo&sclient=psy-ab&ved=0ahUKEwiWwvP639HoAhXlm-AKHRh6AXIQ4dUDCAg&uact=5`,
    not `www.google.com`. Google algorithms use the *GET HTTP Request* when sending
    search requests to their servers.


    - **HTTP — Hypertext Transfer Protocol** is the protocol (standard) for transferring
    messages (text and web pages) between nodes (computers and servers) on the Internet.
    It is a request-response protocol. For example, a user “requests” a web page through
    a browser. The web server “responds” to the request and returns the page to the
    browser. The browser changes the request into an HTTP Get Request (such as `GET
    /pages/mypage.html HTTP/3`) that is sent to the web server. The web server responds
    with the information requested and a status code (such as `HTTP/3 200 OK`). For
    more information on HTTP, visit [http://en.wikipedia.org/wiki/Hypertext_Transfer_Protocol#Request_methods](http://en.wikipedia.org/wiki/Hypertext_Transfer_Protocol%2523Request_methods).


    ```

