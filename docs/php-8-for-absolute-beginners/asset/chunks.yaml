    \ is greater than $b\";\n} else {\necho \"$b is greater than $a\";\n}\n?>\n```\n\
    \nOutput: `Both are equal.`\n\nWhy: The *rocket ship operator* returns `-1` if\
    \ `$a` is less than `b`, returns `0` if `$a` equals `$b`, or returns `1` if `$a`\
    \ is greater than `$b`. The `if` statement shown determines the status returned\
    \ by the rocket ship operator and displays the appropriate result. The use of\
    \ the `if/else/elseif` structure is shown here to determine a range of possible\
    \ values.\n\n## Logical Operators\n\n*Logical operators* allow you to ask more\
    \ than one question in a conditional statement. Let us look at some examples.\n\
    \n### L-1\n\n```\nOutput: Some or all of us are equal.\nWhy: Both sides of the\
    \ or statement evaluate to true. If either or\nboth sides of an *or operator*\
    \ are true, then the complete\nexpression is true.\n```\n\n**Note**: The symbols\
    \ `||` can also be used instead of `or`.\n\n### L-2\n\n```\nOutput: All of us\
    \ are equal.\nWhy: Both sides of the expression must be true for the complete\n\
    expression to be true when using an *and operator*. In this example,\nboth sides\
    \ are true.\n```\n\n**Note**: The symbols `&&` can also be used instead of `and`.\n\
    \n### L-3\n\n```\nOutput: Someone is not equal.\nWhy: With *exclusive or* (`xor`),\
    \ only one side of the expression can\nbe true. In this example, both sides were\
    \ true, so it evaluates to\nfalse. If this were an `or` statement, it would have\
    \ been evaluated to\nbe true.\n```\n\n### L-4\n\n```\nOutput: Everyone is equal.\n\
    Why: The *not expression* (`!`) reverses the result. This exclusive or\n(`xor`)\
    \ returned false because both sides are true. However, the `not`\nreversed it.\n\
    ```\n\nThe `?` operator is a short coding version of a conditional `if-then-else`\
    \ statement.\n\n```\nOutput: They are equal.\nWhy: The statement placed between\
    \ the `?` and `:` is executed if the\ncomparison is true. The statement between\
    \ the `:` and `;` is executed if\nthe statement is false. Since a `print` command\
    \ is to the left of the\ncomparison, the result of the comparison will be printed.\
    \ `$a` and `$b`\nare the same value; thus, the first string is displayed.\n```\n\
    \n```\n $b ? \"They are equal\" : \"$a is greater than $b\" : \"$b is greater\
    \ than $a\";\n?>\n```\n\nOutput: `36` is greater than `24`.\n\nWhy: You can also\
    \ evaluate for equal (`0`), greater than (`-1`), and less than (`1`) using the\
    \ spaceship operator. This comparison becomes very short and efficient to determine\
    \ whether the values are equal or who is greater. Since `$a` is greater than `$b`,\
    \ the statement between the two colons (`:`) is displayed. If `$a` were less than\
    \ `$b`, the statement between the last colon and the semicolon would be displayed.\
    \ Otherwise, when the values are equal, the statement between the question mark\
    \ (`?`) and first colon would be displayed.\n\n## Let us take a look at some invalid\
    \ comparisons and the resulting error messages.\n\n### E-1\n\n```\n\"ten\" > \"\
    eleven\";\n```\n\nResult: Error: \"Unsupported type string for comparison\"\n\n\
