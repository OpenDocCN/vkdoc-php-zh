  \ && HTTP_SERVER_PORT != '80')\n  {\n    // 追加服务器端口\n    $redirect_link .= ':' .\
  \ HTTP_SERVER_PORT;\n  }\n\n  $redirect_link .= VIRTUAL_LOCATION . 'index.php';\n\
  \n  header('Location:' . $redirect_link);\n  exit;\n}\n```\n\n然后需要设置一些供模板使用的变量：\n\
  \n```\n// 设置成员变量，用于 Smarty 模板\n$this->mCartItems = ShoppingCart::GetCartProducts(GET_CART_PRODUCTS);\n\
  $this->mTotalAmountLabel = ShoppingCart::GetTotalAmount();\n$this->mContinueShopping\
  \ = $_SESSION['page_link'];\n$this->mCustomerData = Customer::Get();\n```\n\n如果客户尚未输入信用卡信息或收货地址，则会显示一条提示，并且“下订单”按钮将被禁用。如果客户已存在信用卡信息，则将其解密，并准备显示信用卡类型和卡号后四位：\n\
  \n```\n// 仅在拥有完整的客户详细信息时才允许下订单\nif (empty ($this->mCustomerData['credit_card']))\n\
  {\n  $this->mOrderButtonVisible = 'disabled=\"disabled\"';\n  $this->mNoCreditCard\
  \ = 'yes';\n}\nelse\n{\n  $this->mPlainCreditCard = Customer::DecryptCreditCard(\n\
  \    $this->mCustomerData['credit_card']);\n  $this->mCreditCardNote = '要使用的信用卡：'\
  \ .\n    $this->mPlainCreditCard['card_type'] .\n    '<br />卡号：' .\n    $this->mPlainCreditCard['card_number_x'];\n\
  }\n\nif (empty ($this->mCustomerData['address_1']))\n{\n  $this->mOrderButtonVisible\
  \ = 'disabled=\"disabled\"';\n  $this->mNoShippingAddress = 'yes';\n}\n```\n\n其余代码则比较直接。\n\
  \n## 强制使用 SSL 连接\n\n在构建管理后台页面时，你也了解到使用 SSL 来保护服务器与客户端浏览器之间传输的数据是很好的做法。当时 SSL 是半可选的，因为管理页面可以限制为仅限本地访问。\n\
  \n然而，既然现在有客户向你发送极其敏感的数据，SSL 就不再是可选项了！根据你在第 7 章实现的配置，客户详情页面应该已经得到了保护。请记住，你可以使用 `config.php`\
  \ 文件来设置站点关于 SSL 的行为。\n\n你仍然需要*强制*敏感页面通过 SSL 访问。例如，如果有人试图访问 `http://localhost/hatshop/index.php?UpdateCreditCardDetails`，访问者应被自动重定向到\
  \ `https://localhost/hatshop/index.php?UpdateCreditCardDetails`。\n\n显然，你并不需要站点的所有区域都使用\
  \ SSL 连接，也不应该在所有地方强制执行，因为这会降低性能。但是，你*确实*需要确保结算、客户登录、客户注册以及客户详情修改页面仅能通过 SSL 访问。\n\
  \n假设你的站点已正确配置了 SSL，你应该进行一些更新以确保这些页面无法通过 HTTP 访问。在 `index.php` 的开头添加以下代码：\n\n```\n\
  // 加载 Smarty 库和配置文件\nrequire_once 'include/app_top.php';\n\n// 页面是否通过 HTTPS 连接访问？\n\
  if (getenv('HTTPS') != 'on')\n  $is_https = false;\nelse\n  $is_https = true;\n\n\
  // 是否正在访问敏感页面？\nif (isset($_GET['RegisterCustomer']) ||\n    isset($_GET['UpdateAccountDetails'])\
  \ ||\n    isset($_GET['UpdateAddressDetails']) ||\n    isset($_GET['UpdateCreditCardDetails'])\
  \ ||\n    isset($_GET['Checkout']) ||\n    isset($_POST['Login']))\n  $is_sensitive_page\
  \ = true;\nelse\n  $is_sensitive_page = false;\n\n// 访问敏感页面时使用 HTTPS\nif ($is_sensitive_page\
  \ && $is_https == false && USE_SSL != 'no')\n{\n  header ('Location: https://' .\
  \ getenv('SERVER_NAME') .\n    getenv('REQUEST_URI'));\n  exit;\n}\n\n// 非敏感页面不使用\
  \ HTTPS\nif (!$is_sensitive_page && $is_https == true)\n{\n  $link = 'http://' .\
  \ getenv('SERVER_NAME');\n\n  // 如果定义了 HTTP_SERVER_PORT 且不是默认端口\n  if (defined('HTTP_SERVER_PORT')\
  \ && HTTP_SERVER_PORT != '80')\n  {\n    // 追加服务器端口\n    $link .= ':' . HTTP_SERVER_PORT;\n\
  \  }\n\n  $link .= getenv('REQUEST_URI');\n\n  header ('Location: ' . $link);\n\
  \  exit;\n}\n\n/* 如果当前不在访问商品页面，则将当前页面的链接保存到 page_link 会话变量中；\n   该变量将用于在商品详情页面创建“继续购物”链接以及指向商品详情页面的链接\
  \ */\nif (!isset ($_GET['ProductID']) && !isset ($_GET['CartAction']))\n```\n\n\
  现在，如果你已登录，尝试加载 `http://localhost/hatshop/index.php?UpdateCreditCardDetails` 将会被重定向到\
  \ `https://localhost/hatshop/index.php?UpdateCreditCardDetails`。\n\n## 总结\n\n在本章中，你实现了一个客户账户系统，客户可以使用该系统存储其详细信息以供订单处理时使用。你了解了客户账户系统的多个方面，包括加密敏感数据以及为获取这些数据而保护网络连接。\n\
  \n首先，你了解了数据库中的新表 `customer`，该表包含用于存储客户信息的字段。\n\n接着，你创建了业务层的安全类，用于处理字符串的哈希和加密，以及一个安全的信用卡表示形式，使其能够轻松地在加密和解密格式之间交换信用卡详细信息。\n\
  \n之后，你利用这些类创建了登录、注册和客户详情编辑的网页。这需要更多的代码，但结果却简单易懂。\n\n在下一章中，我们将研究如何创建订单处理管道的框架，从而能够进一步自动化供应流程。\n\
  \n---\n\n## 第 12 章：存储客户订单\n\nHatShop 电子商务应用正在逐步完善。你已经添加了客户账户管理功能，并且正在跟踪客户的地址和信用卡信息，这些信息都以安全的方式存储。然而，你目前并未使用这些信息——而是将责任委托给了\
  \ PayPal。\n\n在本章中，你将进行必要的修改，以便客户能够下达与其用户配置文件关联的订单。这里的主要修改是，与订单关联的客户将通过 `orders`\
  \ 表中的一条新信息来标识，其余大部分修改都将围绕使用这条信息进行。\n\n\n\n# 本章内容\n\n在本章中，你还将学习处理电子商务网站的另一个常见功能：税费和运费。实现这一功能有许多可选方案，但我们将只探讨一种简单的方法，为你后续的自主开发打下基础。\n\
  \n本章分为以下三个部分：\n\n- 允许客户通过账户下单。\n- 修改订单管理部分以集成新功能。\n- 添加税费和运费。\n\n在下一章中，你将开始实现一个更复杂的订单系统，而本章编写的代码将为这一系统提供支持。因此，你将进行一些在当前阶段看似不必要的修改，但这些修改将使你后续的工作更加轻松。\n\
  \n## 向客户账户添加订单\n\n为了实现客户下单功能，你需要进行多项修改。你需要修改数据库和业务层以便处理客户订单，并在表示层提供新代码以开放该功能。\n\n\
  首先，我们将修改数据库，使其能够存储客户订单信息。你需要先修改 `orders` 表，然后修改 `shopping_cart_create_order` 函数。\n\
  \n当前 `orders` 表包含的信息不足以支持客户订单功能的实现。此外，你还需要在后续章节中进行一些修改，因此需要在 `orders` 表中添加新列。\n\n\
  **注意** 新的 `orders` 表与表中此前存储的数据不完全兼容，你需要删除所有现有数据。在进行这些更改之前，请务必备份数据库并保存当前数据。\n\n具体而言，你将要对\
  \ `orders` 表进行以下更改：\n\n- 清空所有现有数据。\n- 删除 `customer_name`、`shipping_address` 和 `customer_email`\
  \ 字段。\n- 添加 `customer_id`、`auth_code` 和 `reference` 字段。其中 `customer_id` 字段引用 `customer`\
  \ 表，用于指定下单的客户。另外两个字段与处理信用卡数据有关，将在第 14 章中讨论。\n\n你还将修改 `shopping_cart_create_order`\
  \ 函数，以反映 `orders` 表的更改。\n\n请按照以下练习中的步骤修改你的 `orders` 表和 `shopping_cart_create_order`\
  \ 函数。\n\n### 练习：向客户账户添加订单\n\n1. 加载 pgAdmin III，并连接到 `hatshop` 数据库。\n\n2. 点击“工具”\
  \ ➤ “查询工具”（或点击工具栏上的 SQL 按钮）。将出现一个新的查询窗口。\n\n3. 请务必备份数据。然后使用查询工具执行以下代码，该代码将从 `hatshop`\
  \ 数据库中删除 `order_details` 和 `orders` 表中存储的数据。\n\n```sql\n-- 从 order_detail 表中删除所有记录\n\
  DELETE FROM order_detail;\n\n-- 从 orders 表中删除所有记录\nDELETE FROM orders;\n```\n\n\
  4. 从 `orders` 表中删除不再需要的 `customer_name`、`shipping_address` 和 `customer_email` 字段。这些数据现存储于\
  \ `customer` 表中。\n\n```sql\n-- 从 orders 表中删除 customer_name 字段\nALTER TABLE orders\
  \ DROP COLUMN customer_name;\n\n-- 从 orders 表中删除 shipping_address 字段\nALTER TABLE\
  \ orders DROP COLUMN shipping_address;\n\n-- 从 orders 表中删除 customer_email 字段\nALTER\
  \ TABLE orders DROP COLUMN customer_email;\n```\n\n5. 添加新字段（`customer_id`、`auth_code`\
  \ 和 `reference`），并添加一个约束条件，用于检查 `customer_id` 字段中的值是否引用了现有的客户。\n\n```sql\n-- 向 orders\
  \ 表添加名为 customer_id 的新字段\nALTER TABLE orders ADD COLUMN customer_id INTEGER;\n\n\
  -- 向 orders 表添加名为 auth_code 的新字段\n```\n\n\n```sql\nALTER TABLE orders ADD COLUMN\
  \ auth_code VARCHAR(50);\n```\n\n```sql\n-- 向 orders 表添加名为 reference 的新字段\nALTER\
  \ TABLE orders ADD COLUMN reference VARCHAR(50);\n```\n\n```sql\n-- 向 orders 表添加新的外键约束\n\
  ALTER TABLE orders\nADD CONSTRAINT fk_customer_id FOREIGN KEY (customer_id) REFERENCES\
  \ customer (customer_id)\nON UPDATE RESTRICT ON DELETE RESTRICT;\n```\n\n**6.**\
  \ 删除旧的 `shopping_cart_create_order` 函数，并通过执行以下代码创建一个新的函数：\n\n```sql\n-- 删除 shopping_cart_create_order\
  \ 函数\nDROP FUNCTION shopping_cart_create_order(CHAR(32));\n\n-- 创建 shopping_cart_create_order\
  \ 函数\nCREATE FUNCTION shopping_cart_create_order(CHAR(32), INTEGER) RETURNS INTEGER\
  \ LANGUAGE plpgsql AS $$\nDECLARE\n  inCartId ALIAS FOR $1;\n  inCustomerId ALIAS\
  \ FOR $2;\n  outOrderId INTEGER;\n  cartItem cart_product;\n  orderTotalAmount NUMERIC(10,\
  \ 2);\nBEGIN\n  -- 向 orders 表插入新记录\n  INSERT INTO orders (created_on, customer_id)\n\
  \  VALUES (NOW(), inCustomerId);\n\n  -- 获取新的订单 ID\n  SELECT INTO outOrderId\n \
  \ currval('orders_order_id_seq');\n\n  orderTotalAmount := 0;\n\n  -- 在 order_detail\
  \ 表中插入订单详情\n  FOR cartItem IN\n    SELECT p.product_id, p.name,\n           COALESCE(NULLIF(p.discounted_price,\
  \ 0), p.price) AS price, sc.quantity,\n           COALESCE(NULLIF(p.discounted_price,\
  \ 0), p.price) * sc.quantity AS subtotal\n    FROM shopping_cart sc\n    INNER JOIN\
  \ product p\n    ON sc.product_id = p.product_id\n    WHERE sc.cart_id = inCartId\
  \ AND sc.buy_now\n  LOOP\n    INSERT INTO order_detail (order_id, product_id, product_name,\
  \ quantity, unit_cost)\n    VALUES (outOrderId, cartItem.product_id, cartItem.name,\
  \ cartItem.quantity, cartItem.price);\n    orderTotalAmount := orderTotalAmount\
  \ + cartItem.subtotal;\n  END LOOP;\n\n  -- 保存订单总金额\n  UPDATE orders\n  SET total_amount\
  \ = orderTotalAmount\n  WHERE order_id = outOrderId;\n\n  -- 清空购物车\n  PERFORM shopping_cart_empty(inCartId);\n\
  \n  -- 返回订单 ID\n  RETURN outOrderId;\nEND;\n$$;\n```\n\n**7.** 按如下方式修改 `business/shopping_cart.php`\
  \ 中 `ShoppingCart` 类的 `CreateOrder` 方法：\n\n```php\n// 创建新订单\npublic static function\
  \ CreateOrder($customerId)\n{\n  // 构建 SQL 查询\n  $sql = 'SELECT shopping_cart_create_order(:cart_id,\
  \ :customer_id);';\n\n  // 构建参数数组\n  $params = array (':cart_id' => self::GetCartId(),\n\
  \                   ':customer_id' => $customerId);\n\n  // 使用 PDO 特定功能准备语句\n  $result\
  \ = DatabaseHandler::Prepare($sql);\n\n  // 执行查询并返回结果\n  return DatabaseHandler::GetOne($result,\
  \ $params);\n}\n```\n\n**8.** 按高亮部分修改 `presentation/smarty_plugins/function.load_checkout_info.php`\
  \ 中的 `init()` 方法：\n\n```php\npublic function init()\n{\n  // 如果“下订单”按钮被点击，则将订单保存到数据库\n\
  \  if ($this->_mPlaceOrder == 1)\n  {\n    $order_id = ShoppingCart::CreateOrder(Customer::GetCurrentCustomerId());\n\
  \n    // 重定向到 index.php\n    $redirect_link = 'http://' . getenv('SERVER_NAME');\n\
  \  }\n}\n```\n\n**9.** 使用新系统下一个或两个订单，以检查代码是否正常运行。为此，您需要登录，并提供足够的详细信息以通过结算页面的验证。\n\
  \n> **注意：** 在此阶段，订单管理页面已不再可用。我们还需要对其进行更新。\n\n**工作原理：向 HatShop 添加客户订单**\n\n本练习中添加的代码非常简单，几乎不需过多讨论。数据层和业务层中的订单处理函数现在将客户\
  \ ID 作为参数，该 ID 将被分配给订单。\n\n在实现更多新订单代码后，您将能够向客户提供更多信息，例如向他们发送确认邮件。不过，就目前而言，我们只能做到这一步。\n\
  \n**管理客户订单**\n\n\n\n下单后，您需要能够访问这些订单。这涉及对我们在第 9 章开发的管理订单功能中的数据库层和业务层进行各种修改，以提供新的数据结构和访问代码。虽然这些修改在下一章及以后至关重要，但现在，您将实现一个简单的（仅限管理员）测试表单来访问客户订单数据。\n\
  \n由于改动量较大，我们将分别针对数据层、业务层和表示层进行处理。\n\n## 数据库修改\n\n这里只需要进行几处修改。您将更新以下数据库函数：\n\n- `orders_get_most_recent_orders`\n\
  - `orders_get_orders_between_dates`\n- `orders_get_orders_by_status`\n- `orders_get_order_info`\n\
  \n您将创建三个新函数：\n\n- `orders_get_by_customer_id`\n- `orders_get_order_short_details`\n\
  - `customer_get_customers_list`\n\n此外，您还需要删除 `orders_update_order` 函数，该函数已不再需要。\n\
  \n## 练习：修改数据层\n\n**1.** 加载 `pgAdmin III`，并连接到 `hatshop` 数据库。\n\n**2.** 点击 **工具**\
  \ ➤ **查询工具**（或点击工具栏上的 **SQL** 按钮）。此时应会弹出一个新的查询窗口。\n\n**3.** 更新 `orders_get_most_recent_orders`\
  \ 函数：\n\n```sql\n-- 更新 orders_get_most_recent_orders 函数\n\nCREATE OR REPLACE FUNCTION\
  \ orders_get_most_recent_orders(INTEGER) RETURNS SETOF order_short_details LANGUAGE\
  \ plpgsql AS $$\n\nDECLARE\n\ninHowMany ALIAS FOR $1;\n\noutOrderShortDetailsRow\
  \ order_short_details;\n\nBEGIN\n\nFOR outOrderShortDetailsRow IN\n\nSELECT o.order_id,\
  \ o.total_amount, o.created_on,\n\no.shipped_on, o.status, c.name\n\nFROM orders\
  \ o\n\nINNER JOIN customer c\n\nON o.customer_id = c.customer_id\n\nORDER BY o.created_on\
  \ DESC\n\nLIMIT inHowMany\n\nLOOP\n\nRETURN NEXT outOrderShortDetailsRow;\n\nEND\
  \ LOOP;\n\nEND;\n\n$$;\n```\n\n**4.** 更新 `orders_get_orders_between_dates` 函数：\n\
  \n```sql\n-- 更新 orders_get_orders_between_dates 函数\n\nCREATE OR REPLACE FUNCTION\
  \ orders_get_orders_between_dates(TIMESTAMP, TIMESTAMP) RETURNS SETOF order_short_details\
  \ LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninStartDate ALIAS FOR $1;\n\ninEndDate ALIAS\
  \ FOR $2;\n\noutOrderShortDetailsRow order_short_details;\n\nBEGIN\n\nFOR outOrderShortDetailsRow\
  \ IN\n\nSELECT o.order_id, o.total_amount, o.created_on,\n\no.shipped_on, o.status,\
  \ c.name\n\nFROM orders o\n\nINNER JOIN customer c\n\nON o.customer_id = c.customer_id\n\
  \nWHERE o.created_on >= inStartDate AND o.created_on <= inEndDate ORDER BY o.created_on\
  \ DESC\n\nLOOP\n\nRETURN NEXT outOrderShortDetailsRow;\n\nEND LOOP;\n\nEND;\n\n\
  $$;\n```\n\n**5.** 更新 `orders_get_orders_by_status` 函数：\n\n```sql\n-- 更新 orders_get_orders_by_status\
  \ 函数\n\nCREATE OR REPLACE FUNCTION orders_get_orders_by_status(INTEGER) RETURNS\
  \ SETOF order_short_details LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninStatus ALIAS\
  \ FOR $1;\n\noutOrderShortDetailsRow order_short_details;\n\nBEGIN\n\nFOR outOrderShortDetailsRow\
  \ IN\n\nSELECT o.order_id, o.total_amount, o.created_on,\n\no.shipped_on, o.status,\
  \ c.name\n\nFROM orders o\n\nINNER JOIN customer c\n\nON o.customer_id = c.customer_id\n\
  \nWHERE o.status = inStatus\n\nORDER BY o.created_on DESC\n\nLOOP\n\nRETURN NEXT\
  \ outOrderShortDetailsRow;\n\nEND LOOP;\n\nEND;\n\n$$;\n```\n\n**6.** 更新 `orders_get_order_info`\
  \ 函数：\n\n```sql\n-- 更新 orders_get_order_info 函数\n\nCREATE OR REPLACE FUNCTION orders_get_order_info(INTEGER)\
  \ RETURNS orders LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninOrderId ALIAS FOR $1;\n\n\
