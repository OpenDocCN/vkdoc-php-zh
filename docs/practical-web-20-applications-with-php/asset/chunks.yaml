    **37**


    To implement this class, we must implement several key methods so that ViewRenderer
    can interact with Smarty. The most important of these methods are as follows:


    • getEngine(): This must return an instance of Smarty. Since this may be called
    multiple times, we should cache the Smarty instance so it is only created once.
    We do this by creating the Smarty object in the constructor.


    • __set(): This assigns a variable to the template. Essentially this means we
    can replace $smarty->assign(''foo'', ''bar'') with $this->view->foo = ''bar''
    in any controller action.


    • __get(): This returns a variable that has previously been assigned to a template.


    • render(): This method renders a template. This is effectively the same as calling
    $smarty->display(), except that this method should return the output (not display
    it directly), so we must use fetch() instead of display() on the Smarty object.


    Listing 2-11 shows the code for Templater.php, which in keeping with Zend Framework’s
    class naming structure means we must store this class in the ./include directory.


    **Listing 2-11.** *Extending Smarty for Use with Our Web Application (Templater.php)*


    <?php


    class Templater extends Zend_View_Abstract


    {


    protected $_path;


    protected $_engine;


    public function __construct()


    {


    $config = Zend_Registry::get(''config'');


    require_once(''Smarty/Smarty.class.php'');


    $this->_engine = new Smarty();


    $this->_engine->template_dir = $config->paths->templates;


    $this->_engine->compile_dir = sprintf(''%s/tmp/templates_c'',


    $config->paths->data);


    $this->_engine->plugins_dir = array($config->paths->base .


    ''/include/Templater/plugins'',


    ''plugins'');


    }


    public function getEngine()


    {


    return $this->_engine;


    }


