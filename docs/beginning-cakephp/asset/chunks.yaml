    …


    This distinction between typical action parameters and passed arguments can make
    a difference when constructing methods in the controller. The action can still
    execute without any passed arguments, which can be an important option depending
    on the specific needs of the action.


    **Reverse Routing**


    Web applications have begun to prefer friendly URLs to convoluted URL strings.
    URLs like


    [www.site.com/cart/item/race_car wor](http://www.site.com/cart/item/race_car)k
    better, for example[, than www.site.com/index.](http://www.site.com/index)


    php?page=cart&item=race_car. This is happening not just for search engine optimization
    purposes or to make the application more accessible for users but to facilitate
    simple changes to the overall routing of the application. Consider the difficulty,
    if a web application were built on GET variables, in revamping its entire routing
    structure. New problems would present themselves in maintaining legacy URLs and
    at the same time in implementing new ones.


    Much would depend on the application itself, but in general, it would take some
    added functions to reverse URLs.


    **Lookups**


    By default, URL lookups run through the router in one direction, meaning that
    when a link is clicked, the router performs a lookup and maps the appropriate
    controller, action, and parameters. Entering /posts/view/17 will cause the router
    to look up where the Posts controller’s View action is in the application and
    pass the parameter to it. But what about lookups going the other way? Suppose
    you wanted to write a link and have the router look up how to construct the link.
    This would be a *reverse lookup*, or a lookup in the reverse direction.


    **Rewriting URLs in the Router**


    In the blog application, suppose that at some future date you needed to stop using
    the Posts controller name in the URL. This would mean going through the entire
    application changing every instance of a link to the Posts controller to the new
    route. That would obviously slow down development and make it harder to change
    the structure of the site. Or, you could use Cake’s reverse routing mechanism
    to rewrite all URLs pointing to the Posts controller.


