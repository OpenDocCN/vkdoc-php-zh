    \ 方法产生的。尽管初始值（`Fred`、`Lab`、`Yellow` 和 `100`）成功传递给了构造函数，但每个属性中的值可以使用 `set` 方法（传递\
    \ `Sally`、`Labrador`、`Brown` 和 `5`）进行更改。\n\n![../images/394210_2_En_4_Chapter/394210_2_En_4_Fig5_HTML.jpg](img/394210_2_En_4_Fig5_HTML.jpg)\n\
    \n**图 4-5**  \n来自 `dog.php` 和 `lab.php` 的输出，使用了 `constructor`、`set` 和 `get` 方法\n\
    \n*   *安全性与性能* — 有些人可能会认为，每次更新都检查错误有些过度。然而，在当前数据不断被篡改的环境下，执行更新时尽可能谨慎是必要的。没有程序能\
    \ 100% 防止数据损坏。希望你已经注意到，一旦养成了检查数据的习惯，你的数据检查代码行每次都会变得非常相似。因此，通过复制和粘贴（稍作修改）那些成功验证数据的代码行，你可以在不增加过多额外编码时间的情况下大大增强安全性。\n\
    \n**动手实践**\n\n1.  本章涉及了许多 PHP 示例和术语。为了帮助你澄清当前在理解 PHP 语言时可能遇到的任何困难，请访问以下网站获取更多教程：\n\
    \n[`www.w3schools.com/php/default.asp`](https://www.w3schools.com/php/default.asp)\n"
- fmt: "1.  Update the constructor in the `Dog` class to also allow the passing of\
