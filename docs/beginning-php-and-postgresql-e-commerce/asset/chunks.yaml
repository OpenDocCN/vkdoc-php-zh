    \n648XCH05.qxd 10/31/06 10:04 PM Page 187\n\nCHAPTER 5 ■ SEARCHING THE CATALOG\n\
    \n**187**\n\n**Figure 5-3.** *Sample HatShop search results page*\n\n### How It\
    \ Works: The Searchable Product Catalog\n\nCongratulations, you have a searchable\
    \ product catalog! There was quite a bit to write, but the code wasn't very complicated,\
    \ was it?\n\nBecause you've used much of the already existing code and added bits\
    \ to the already working architecture, there weren't any surprises. The list of\
    \ products is still displayed by the `products_list` template you built earlier,\
    \ which is now updated to recognize the Search element in the query string, in\
    \ which case it uses the `Search` method of the business tier to get the list\
    \ of products for the visitor.\n\nThe `Search` method of the business tier returns\
    \ a `SearchResults` object that contains, apart from the list of returned products,\
    \ the list of words that were used for searching and the list of words that were\
    \ ignored (words shorter than a predefined number of characters). These details\
    \ are shown to the visitor.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH05.qxd 10/31/06 10:04 PM Page 188\n\n**188**\n\nCHAPTER 5 ■ SEARCHING\
    \ THE CATALOG\n\n### Summary\n\nIn this chapter, you implemented the search functionality\
    \ of HatShop by using the full-text searching functionality of PostgreSQL. The\
    \ search mechanism integrated very well with the current web site structure and\
    \ the paging functionality built in Chapter 4. The most interesting new detail\
    \ you learned in this chapter was about performing full-text searches with PostgreSQL.\
    \ This was also the first instance where the business tier had some functionality\
    \ of its own instead of simply passing data back and forth between the data tier\
    \ and the presentation tier.\n\nIn Chapter 6, you'll learn how to sell your products\
    \ using PayPal.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH06.qxd\
    \ 10/31/06 10:06 PM Page 189\n\nCHAPTER 6\n\n## Receiving Payments Using PayPal\n\
    \nLet's make some money! Your e-commerce web site needs a way to receive payments\
    \ from customers. The preferred solution for established companies is to open\
    \ a merchant account, but many small businesses choose to start with a solution\
    \ that's simpler to implement, where they don't have to process credit card or\
    \ payment information themselves.\n\nA number of companies and web sites can help\
    \ individuals or small businesses that don't have the resources to process credit\
    \ cards and wire transactions. These companies can be used to intermedia the payment\
    \ between online businesses and their customers. Many of these payment-processing\
    \ companies are relatively new, and the handling of any individual's financial\
    \ details is very sensitive. Additionally, a quick search on the Internet will\
    \ produce reports from both satisfied and unsatisfied customers for almost all\
    \ of these companies. For these reasons, we are not recommending any specific\
    \ third-party company.\n\nInstead, this chapter lists some of the companies currently\
    \ providing these services, and then demonstrates some of the functionality they\
    \ provide with PayPal. You'll learn how to integrate PayPal with HatShop in the\
    \ first two stages of development. In this chapter, you will:\n\n- Learn how to\
    \ create a new PayPal Website Payments Standard account.\n- Learn how to integrate\
    \ PayPal in stage 1 of development, where you'll need a shopping cart and custom\
    \ checkout mechanism.\n- Learn how to integrate PayPal in stage 2 of development,\
    \ where you'll have your own shopping cart, so you'll need to guide the visitor\
    \ directly to a payment page."
