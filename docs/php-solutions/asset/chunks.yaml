    \ `fwrite()` 写入。要将指针移动到文件末尾，请使用 `fseek()` 函数，如下所示：\n\n```\n// 移动到文件末尾\nfseek($file,\
    \ 0, SEEK_END);\n```\n\n或者，通过调用 `ftruncate()` 删除现有内容：\n\n```\n// 删除现有内容\nftruncate($file,\
    \ 0);\n```\n\n完成文件写入后，你必须在调用 `fclose()` 之前手动解锁文件：\n\n```\n// 在关闭前解锁文件\nflock($file,\
    \ LOCK_UN);\nfclose($file);\n```\n\n**注意**  \n根据 `flock()` 的文档，关闭文件时不再自动解锁（参见\
    \ [`http://php.net/manual/en/function.flock.php`](http://php.net/manual/en/function.flock.php)）。即使你可以重新打开该文件，它对于其他用户和进程仍然处于锁定状态。\n\
    \n### 防止覆盖已有文件\n\n与其他写入模式不同，`x` 模式不会打开已有文件。它只会创建一个准备写入的新文件。如果同名文件已存在，`fopen()`\
    \ 返回 `false`，从而防止你覆盖它。`fopen_exclusive.php` 中的处理代码如下所示：\n\n```\n// 只在文件不存在时创建并准备写入\n\
