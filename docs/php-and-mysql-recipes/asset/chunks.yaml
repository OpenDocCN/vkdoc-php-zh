    Recipe 6-12\. Storing Passwords


    Problem


    Many web sites allow the users to register and create an account to get access
    to additional features or to view statuses on shopping orders. Many of these sites
    use an e-mail address as the user id and some form of password. Storing passwords
    as plain text values in a database is not very secure. If the site is hacked or
    the hard drive gets into the wrong hands, all the passwords might be exposed.


    Solution


    Instead of storing the plain text password we can store a hash value of the password.
    We can use the md5() , sha1(), or hash() function from the previous recipe or
    if you are using PHP 5.5 or newer, you can use the password_hash() function. It
    is recommended that the database schema allows for at least 60 characters (255
    is better) for the password column as the hashing algorithm might change over
    time to improve security and create stronger hash values.


    How it Works


    If you have a table called users with the columns login and password you should
    use the password_hash() function before storing a password for a user and before
    checking if the login and password provided during the login is valid.


    <?php


    // 6_25.php


    //create table myusers (


    // id int auto_increment,


    // login varchar(255),


    // password varchar(255),


    // primary key(id)


    //);


    $con = mysqli_connect(''127.0.0.1'', ''root'', ''secret'', ''book'');


    function CreateUser($login, $password) {


    global $con;


    $login = mysqli_escape_string($con, $login);


    $password = mysqli_escape_string($con, password_hash($password, PASSWORD_BCRYPT));
    mysqli_query($con, "insert into myusers (login, password) values (''{$login}'',


    ''{$password}'')");


    }


    function CheckUser($login, $password) {


    global $con;


    $user = null;


    $login = mysqli_escape_string($con, $login);


    $rs = mysqli_query($con, "select * from myusers where login=''{$login}''"); if
    ($rs) {


    $user = mysqli_fetch_assoc($rs);


    if ($user && !password_verify($password, $user[''password''])) {


    CHAPTER 6 ■ STRINGS


    $user = null;


    }


    mysqli_free_result($rs);


    }


    return $user;


    }


    CreateUser(''john@example.com'', ''A secret Password'');


    if (CheckUser(''john@example.com'', ''A secret Password'')) {


    echo "User exists and password is corect\n";


    }


    else {


    echo "User does not exist or password is incorrect\n";


    }


    Using the MySQL command-line tool to show the rows in the table will look something
    like this: MariaDB [book]> select password from myusers;


    +--------------------------------------------------------------+


    | password |


    +--------------------------------------------------------------+


    | $2y$10$V4KWuQIzssFRmlQeZNLPeegsyQ0MFp0vjUNl3FP9.7k5E4EiB5INi |


    +--------------------------------------------------------------+


    1 row in set (0.00 sec)


    **CHAPTER 7**


    **Files and Directories**


    In this chapter we are going to discuss two basic ways that files are used with
    PHP. The first one is the script with the PHP code in the form of the main script
    file and includes any files that the script might use.


    The second one is in the form of more content or data that is read off the local
    or remote file system and processed by the script.


    Recipe 7-1\. Include and Require


    Problem


    When PHP is used to execute or interpret a script it always starts with a single
    file. This can be as an input parameter to the command-line version of PHP (php-cli)
    or indirectly from a web server request that is passed onto PHP.


    Having a single file contain all the code needed for each request could lead to
    large script files and code duplication. In addition it makes sense to break the
    code into small units each serving a specific purpose.


    This is often done with a single class definition in each file.


    Solution


    This is where include and require come into play. Any time you have code that’s
    shared between multiple scripts you can place it in a separate file and include
    the code everywhere it’s needed. The basic differences between include and require
    is how these statements react if the requested file doesn’t exist on the file
    system. Include will generate a warning and require will generate a fatal error
    and stop the script execution.


    There are two different schools of thought on how to structure include files.
    The first is to place them in the same directory structure as the main script(s).
    Normally this forces the developer to use the same extension as the main scripts
    in order to avoid exposure of the content to the end user if they were to request
    the files directly. If the web server is configured to take files that have the
    .php extension and pass them through the PHP interpreter, files with other extensions
    like .inc might just be passed on as is and if the file includes database credentials
    and other secrets the end user might be able to access these. The simple fix to
    this is to make sure the web server is configured to hand all PHP files off to
    the interpreter. An include file that is used to configure database credentials
    will most likely not generate any output so the content the user will see will
    be an empty document.


    The other school of thought is to place all include files outside the directory
    structure that is used to define the document root for the web site. In this case
    the files can have any extension, and they can’t be exposed directly to the user
    because the web server does not know how to access these. This is the preferred
    method in my opinion.


    © Frank M. Kromann 2016


    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_7


