    Next we must create the _write() method, shown in Listing 14-2\. This is an abstract
    method that is called internally when a new log message is recorded. In this method
    we simply need to write the message to the $_events array. As noted earlier, this
    array is used to hold the messages that are to be e-mailed until the e-mail is
    actually sent.


    Before the message is written to the array, we must format the message using the
    formatter. If you prefer, you can write the raw message to the array here and
    format it when generating the e-mail body in shutdown().


