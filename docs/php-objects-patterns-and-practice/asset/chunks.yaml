- fmt: '# The Class and Object Functions


    PHP provides a powerful set of functions for testing classes and objects. Why
    is this useful? After all, you probably wrote most of the classes you are using
    in your script.


    In fact, you don’t always know at runtime about the classes that you are using.
    You may have designed a system to work transparently with third-party bolt-on
    classes, for example. In this case, you will typically instantiate an object given
    only a class name. PHP allows you to use strings to refer to classes dynamically,
    like this:


    ```

    // listing 05.20

    namespace tasks;

    class Task

    {

    public function doSpeak()

    {

    print "hello\n";

    }

    }

    // listing 05.21

    $classname = "Task";

    require_once("tasks/{$classname}.php");

    $classname = "tasks\\$classname";

    $myObj = new $classname();

    $myObj->doSpeak();

    ```


    This script might acquire the string I assign to `$classname` from a configuration
    file or by comparing a web request with the contents of a directory. You can then
    use the string to load a class file and instantiate an object. Notice that I’ve
    constructed a namespace qualification in this fragment.


    Typically, you would do something like this when you want your system to be able
    to run user-created plug-ins. Before you do anything as risky as that in a real
    project, you would have to check that the class exists, that it has the methods
    you are expecting, and so on.


    **Note**


    Even with safeguards in place, you should be extremely wary of dynamically installing
    third-party plug-in code. You should never automatically run code uploaded by
    users. Any plug-in so installed would typically execute with the same privileges
    as your core code, so a malicious plug-in author could wreak havoc on your system.


    This isn’t to say that plug-ins aren’t a fine idea. Allowing third-party developers
    to enhance a core system can offer great flexibility. To ensure greater security,
    you might support a directory for plug-ins, but require that the code files be
    installed by a system’s administrator, either directly or from within a password-protected
    management environment. The administrator would either personally check the plug-in
    code before installation or would source plug-ins from a reputable repository.
    This is the way that the popular blogging platform, WordPress, handles plug-ins.


    Some class functions have been superseded by the more powerful Reflection API,
    which I will examine later in the chapter. Their simplicity and ease of use make
    them a first port of call in some instances, however.


    ## Looking for Classes


    The `class_exists()` function accepts a string representing the class to check
    for and returns a Boolean `true` value if the class exists and `false` otherwise.


    Using this function, I can make the previous fragment a little safer:


    ```

    // listing 05.22

    $base = __DIR__;

    $classname = "Task";

    $path = "{$base}/tasks/{$classname}.php";

    if (! file_exists($path)) {

    throw new \Exception("No such file as {$path}");

    }

    require_once($path);

    $qclassname = "tasks\\$classname";

    if (! class_exists($qclassname)) {

    throw new Exception("No such class as $qclassname");

    }

    $myObj = new $qclassname();

    $myObj->doSpeak();

    ```


    Of course, you can’t be sure that the class in question does not require constructor
    arguments. For that level of safety, you would have to turn to the Reflection
    API, covered later in the chapter. Nevertheless, `class_exists()` does allow you
    to check that the class exists before you work with it.


    **Note**


    Remember, as stated previously, you should always be wary of any data provided
    by outside sources. Test it and treat it before using it in any way. In the case
    of a file path, you should escape or remove dots and directory separators to prevent
    an unscrupulous user from changing directories and including unexpected files.
    However, when I describe ways of building systems that are easily extensible,
    these techniques generally cover a deployment’s owner (with the write privileges
    that implies), and not her external users.


    You can also get an array of all classes defined in your script process using
    the `get_declared_classes()` function:


    ```

    print_r(get_declared_classes());

    ```


    This will list user-defined and built-in classes. Remember that it only returns
    the classes declared at the time of the function call. You may run `require()`
    or `require_once()` later on, and thereby add to the number of classes in your
    script.


    ## Learning About an Object or Class


    As you know, you can constrain the object types of method arguments using class
    type hinting. Even with this tool, you can’t always be certain of an object’s
    type.


    There are a number of basic tools available to check the type of an object. First
    of all, you can check the class of an object with the `get_class()` function.
    This accepts any object as an argument and returns its class name as a string:


    ```

    // listing 05.23

    $product = self::getProduct();

    if (get_class($product) === ''popp\ch05\batch05\CdProduct'') {

    print "\$product is a CdProduct object\n";

    }

    ```


    In the fragment, I acquire something from the `getProduct()` function. To be absolutely
    certain that it is a `CdProduct` object, I use the `get_class()` method.


    **Note**


    I covered the `CdProduct` and `BookProduct` classes in Chapter [3](#A314621_5_En_3_Chapter.html).


    Here’s the `getProduct()` function:


    ```

    // listing 05.24

    public static function getProduct()

    {

    return new CdProduct(

    "Exile on Coldharbour Lane",

    "The",

    "Alabama 3",

    10.99,

    60.33

    );

    }

    ```


    `getProduct()` simply instantiates and returns a `CdProduct` object. I will make
    good use of this function in this section.


    The `get_class()` function is a very specific tool. You often want a more general
    confirmation of a class’s type. You may want to know that an object belongs to
    the `ShopProduct` family, but you don’t care whether its actual class is `BookProduct`
    or `CdProduct`. To this end, PHP provides the `instanceof` operator.


    **Note**


    PHP 4 did not support `instanceof`. Instead, it provided the `is_a()` function,
    which was deprecated in PHP 5.0 but restored to the fold with PHP 5.3.


    The `instanceof` operator works with two operands, the object to test on the left
    of the keyword and the class or interface name on the right. It resolves to `true`
    if the object is an instance of the given type:


    ```

    // listing 05.25

    $product = self::getProduct();

    if ($product instanceof \popp\ch05\batch05\CdProduct) {

