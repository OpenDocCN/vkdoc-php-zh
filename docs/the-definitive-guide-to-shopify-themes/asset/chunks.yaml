- fmt: '# Summary


    In this chapter, we’ve set ourselves up nicely for building a new Shopify theme.
    The chapter covered the options and frameworks that developers have access to
    when starting a new theme, and explained how we can use preexisting sample product
    CSVs to start building around realistic data.


    You learned about some key Shopify concepts like layouts, sections, and blocks,
    and read about the design principles to apply when laying out the navigation for
    a store’s theme.


    Footnotes [1](#A437216_1_En_4_Chapter.html#Fn1_source)


    Instructions on importing the product data can be found at [`https://www.shopify.com/partners/blog/93467590-design-your-store-faster-with-product-csvs-and-images`](https://www.shopify.com/partners/blog/93467590-design-your-store-faster-with-product-csvs-and-images).


    # 5\. Designing Product Pages


    Once we have a basic theme structure to work with, we can start to build out the
    individual pages on the store. This chapter starts with the most important one—the
    product page.


    ## The Product Page


    The product page is usually the most important page for an Ecommerce store. It’s
    where a customer evaluates an offering and makes the crucial decision to purchase.
    It needs to convey a lot of information to visitors—core information like what
    your product is, does, and looks like; how much it costs; what configuration options
    are available; and supplementary information like size guides, shipping details,
    product guides, and customer reviews.


    In addition to presenting all this information clearly, it needs to provide interactive
    elements to help customers configure the product to their liking (e.g., selecting
    the appropriate size and color), add it to the cart, and progress to the checkout.


    In my experience, both designers and storeowners spend too much time thinking
    about and refining the home page of a site, at the expense of the product page.
    It’s totally understandable—the home page is what the storeowner types in when
    they want to look at their site, after all—but it’s easy to overlook the fact
    that many visitors to a store don’t land on the home page and progress linearly
    from there to the collection page and product page. Figure [5-1](#A437216_1_En_5_Chapter.html#Fig1)
    shows how designers and storeowners often conceptualize the customer journeys
    through their site (left) versus the reality (right). If you’re designing a theme
    for an existing store, you can ask for access to any existing analytics data in
    order to understand the most common paths for the merchant’s actual customers.


    ![A437216_1_En_5_Fig1_HTML.jpg](A437216_1_En_5_Fig1_HTML.jpg)


    Figure 5-1: How designers and storeowners visualize the customer journey through
    their sites (left) versus the reality (right)


    Customers arriving on a site from a Google search, paid advertisement, or social
    network are more likely to be landing directly on a specific product page that
    matches their interest instead of the home page, so it’s crucial to make sure
    that the experience on that page is as smooth as possible.


    For this reason, I encourage you to start design and development work on the product
    page first, which is what we’re going to do with the example theme in this chapter.


    ## Product Page Information Hierarchy


    To design an effective product page, we first need to establish the information
    hierarchy—which bits of product information are most important to our visitors?
    What should we prioritize, and what can be considered as “supplemental” information
    that doesn’t need to be as prominent?


    The answers will differ from store to store, although there tends to be some information
    that’s usually more important than others. A “standard” information hierarchy,
    placing product information into prioritized buckets, might look like Figure [5-2](#A437216_1_En_5_Chapter.html#Fig2).


    ![A437216_1_En_5_Fig2_HTML.jpg](A437216_1_En_5_Fig2_HTML.jpg)


    Figure 5-2: A “standard” product information hierarchy


    Deviations from this standard hierarchy might occur because of the types of products
    we’re selling, what we know about the customers visiting the stores, or even what
    devices we anticipate visitors using. As an example, compare the product page
    for Colonna Coffee’s roasted coffee beans with the product page for Bespoke Verse’s
    gift mug in Figure [5-3](#A437216_1_En_5_Chapter.html#Fig3). Colonna’s coffee
    bean packaging looks similar regardless of the roast or flavor profile, so the
    product image is relatively small, with emphasis placed on the textual description
    of the coffee’s taste and its available options (espresso versus filter, long
    versus short). Conversely, Bespoke Verse’s gift mug doesn’t need any description
    at all, as the product image does all the talking and is placed very prominently.


    ![A437216_1_En_5_Fig3_HTML.jpg](A437216_1_En_5_Fig3_HTML.jpg)


    Figure 5-3: The product pages for whole coffee beans on Colonna Coffee (colonnacoffee.com,
    left) and a gift mug on Bespoke Verse (www.bespokeverse.co.uk, right)


    For this example theme, we’ll be working with the “standard” information hierarchy
    from Figure [5-2](#A437216_1_En_5_Chapter.html#Fig2). The first pass will use
    a layout based on the rough mockups in Figure [5-4](#A437216_1_En_5_Chapter.html#Fig4)
    to achieve this. As you can see, I’ve applied the hierarchy independently for
    both mobile and desktop contexts, to make sure that I am prioritizing information
    consistently but also considering how users will experience the page on different
    devices.


    ![A437216_1_En_5_Fig4_HTML.jpg](A437216_1_En_5_Fig4_HTML.jpg)


    Figure 5-4: Rough mockups for the example theme’s product page, based on the standard
    product information hierarchy and inserted into the layout format developed in
    Chapter [4](#A437216_1_En_4_Chapter.html)'
