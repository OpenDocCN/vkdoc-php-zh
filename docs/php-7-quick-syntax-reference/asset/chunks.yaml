    ```


    ## Mixed Arrays


    PHP makes no distinction between associative and numerical arrays, and so elements
    of each can be combined in the same array.


    ```

    $d = array(0 => 1, ''foo'' => ''bar'');

    ```


    Just be sure to access the elements with the same keys.


    ```

    echo $d[0] . $d[''foo'']; // "1bar"

    ```


    ## Multi-Dimensional Arrays


    A multi-dimensional array is an array that contains other arrays. For example,
    a two-dimensional array can be constructed in the following way.


    ```

    $a = array(array(''00'', ''01''), array(''10'', ''11''));

    ```


    Once created, the elements can be modified using two sets of square brackets.


    ```

    $a[0][0] = ''00'';

    $a[0][1] = ''01'';

    $a[1][0] = ''10'';

    $a[1][1] = ''11'';

    ```


    They are also accessed in the same way.


    ```

    echo $a[0][0] . $a[0][1] . $a[1][0] . $a[1][1];

    ```


    The key can be given a string name to make it into a multi-dimensional associative
    array, also called a hash table.


    ```

    $b = array(''one'' => array(''00'', ''01''));

    echo $b[''one''][0] . $b[''one''][1]; // "0001"

    ```


    Multi-dimensional arrays can have more than two dimensions by adding additional
    sets of square brackets.


    ```

    $c[][][][] = "0000"; // four dimensions

    ```


    ## 6. Conditionals


    Conditional statements are used to execute different code blocks based on different
    conditions.


    ### If Statement


    The `if` statement only executes if the condition inside the parentheses is evaluated
    to `true`. The condition can include any of the comparison and logical operators.
    In PHP, the condition does not have to be a Boolean expression.


    ```

    if ($x == 1) {

    echo "x is 1";

    }

    ```


    To test for other conditions, the `if` statement can be extended with any number
    of `elseif` clauses. Each additional condition is only tested if all previous
    conditions are false.


    ```

    elseif ($x == 2) {

    echo "x is 2";

    }

    ```


    For handling all other cases, there can be one `else` clause at the end, which
    executes if all previous conditions are false.


    ```

    else {

    echo "x is something else";

    }

    ```


    The curly brackets can be left out if only a single statement needs to be executed
    conditionally. However, it is considered good practice to always include them
    since they improve code readability.


    ```

    if ($x == 1)

    echo "x is 1";

    elseif ($x == 2)

    echo "x is 2";

    else

    echo "x is something else";

    ```


    ### Switch Statement


    The `switch` statement checks for equality between an integer, float, or string
    and a series of case labels. It then passes execution to the matching case. The
    statement can contain any number of case clauses and may end with a `default`
    label for handling all other cases.


    ```

    switch ($x)

    {

    case 1: echo "x is 1"; break;

    case 2: echo "x is 2"; break;

    default: echo "x is something else";

    }

    ```


    Note that the statements after each case label are not surrounded by curly brackets.
    Instead, the statements end with the `break` keyword to break out of the switch.
    Without the `break`, the execution falls through to the next case. This is useful
    if several cases need to be evaluated in the same way.


    ### Alternative Syntax


    PHP has an alternative syntax for the conditional statements. In this syntax,
    the `if` statement’s opening bracket is replaced with a colon, the closing bracket
    is removed, and the last closing bracket is replaced with the `endif` keyword.


    ```

    if ($x == 1):     echo "x is 1";

    elseif ($x == 2): echo "x is 2";

    else:             echo "x is something else";

    endif;

    ```


    Similarly, the `switch` statement also has an alternative syntax, which instead
    uses the `endswitch` keyword to terminate the statement.


    ```

    switch ($x):

    case 1:  echo "x is 1"; break;

    case 2:  echo "x is 2"; break;

    default: echo "x is something else";

    endswitch;

    ```


    The alternative syntax is often preferable for longer conditional statements since
    it then becomes easier to see where those statements end.


    ### Mixed Modes


    It is possible to switch back to HTML mode in the middle of a code block. This
    provides another way of writing conditional statements that output text to the
    web page.


    ```

    This will show if $x is 1.


    Otherwise this will show.


    ```


    The alternative syntax may also be used in this way to make the code clearer.


    ```

    This will show if $x is 1.


    Otherwise this will show.


    ```


    When outputting HTML and text, particularly larger blocks, this coding style is
    generally preferred because it makes it easier to distinguish between PHP code
    and the HTML content that appears on the web page.


    ### Ternary Operator


    In addition to the `if` and `switch` statements, there is the ternary operator
    (`?:`). This operator can replace a single `if/else` clause. The operator takes
    three expressions. If the first one is evaluated to `true`, then the second expression
    is returned, and if it is `false`, the third one is returned.


    ```

    // Ternary operator expression

    $y = ($x == 1) ? 1 : 2;

    ```


    In PHP, this operator can be used as an expression and as a statement.


    ```

    // Ternary operator statement

    ($x == 1) ? $y = 1 : $y = 2;

    ```


    The programming term *expression* refers to code that evaluates to a value, whereas
    a *statement* is a code segment that ends with a semicolon or a closing curly
    bracket.


    ## 7. Loops


    There are four looping structures in PHP. These are used to execute a specific
    code block multiple times. Just as with the conditional `if` statement, the curly
    brackets for the loops can be left out if there is only one statement in the code
    block.


    ### While Loop


    The `while` loop runs through the code block only if its condition is true. It
    continues looping for as long as the condition remains true. Note that the condition
    is only checked at the beginning of each iteration (loop).


    ```

    $i = 0;

    while ($i < 10) { echo $i++; } // 0-9

    ```


    ### Do-while Loop


    The `do-while` loop works in the same way as the `while` loop, except that it
    checks the condition after the code block. Therefore, it always runs through the
    code block at least once. Bear in mind that this loop ends with a semicolon.


    ```

    $i = 0;

    do { echo $i++; } while ($i < 10); // 0-9

    ```


    ### For Loop


    The `for` loop is used to go through a code block a specific number of times.
    It uses three parameters. The first parameter initializes a counter and is always
    executed once, before the loop. The second parameter holds the condition for the
    loop and is checked before each iteration. The third parameter contains the increment
    of the counter and is executed at the end of each iteration.


    ```

    for ($i = 0; $i < 10; $i++) { echo $i; } // 0-9

    ```


    The `for` loop has several variations since either one of the parameters can be
    left out. For example, if the first and third parameters are left out, it behaves
    in the same way as the `while` loop.


    ```

    for (;$i < 10;) { echo $i++; }

    ```


    The first and third parameters can also be split into several statements using
    the comma operator (`,`).


    ```

    for ($i = 0, $x = 9; $i < 10; $i++, $x--) {

    echo $x; // 9-0

    }

    ```


    The `sizeof` function retrieves the number of elements in an array. Together with
    the `for` loop, it can be used to iterate through a numeric array.


    ```

    $a = array(1,2,3);

    for($i = 0; $i < sizeof($a); $i++) {

    echo $a[$i]; // "123"

    }

    ```


    If there is no need to keep track of iterations, the `foreach` loop provides a
    cleaner syntax. This loop is also necessary for traversing associative arrays.


    ### Foreach Loop


    The `foreach` loop provides an easy way to iterate through arrays. At each iteration,
    the next element in the array is assigned to the specified variable (the iterator)
    and the loop continues to execute until it has gone through the entire array.


    ```

    $a = array(1,2,3);

    foreach ($a as $v) {

    echo $v; // "123"

    }

    ```


    There is an extension of the `foreach` loop to also obtain the key’s name or index
    by adding a key variable followed by the double arrow operator (`=>`) before the
    iterator.


    ```

    $a = array(''one'' => 1, ''two'' => 2, ''three'' => 3);

    foreach ($a as $k => $v) {

    echo "$k => $v ";

    }

    ```


