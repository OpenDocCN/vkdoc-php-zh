    ## Error-Handling Environment


    PHP provides a few configuration directives for setting up the error-handling
    environment. The `error_reporting` function sets which errors PHP reports through
    the internal error handler. The error level constants have bitmask values. This
    allows them to be combined and subtracted using bitwise operators, as shown here.


    ```php

    error_reporting(E_ALL | ∼E_NOTICE); // all but E_NOTICE

    ```


    The error reporting level can also be changed permanently in `php.ini`. The default
    value found in `php.ini` varies between servers, but for an XAMPP server, it is
    set to display all error messages. This is a good setting to have during development
    and it can be set programmatically by placing the following line of code at the
    start of the script. Note that `E_STRICT` is added, because this error level was
    not included in `E_ALL` until PHP 5.4.


    ```php

    // During development

    error_reporting(E_ALL | E_STRICT);

    ```


    When the web app goes live, raw error messages should be hidden away from users.
    This is done with the `display_errors` directive. It determines whether errors
    are printed to the web page by the internal error handler. The default value is
    to print them, but when the web site is live, it is a good idea to hide any potential
    raw error messages.


    ```php

    // During production

    ini_set(''display_errors'',''0'');

    ```


    Another directive related to the error-handling environment is the `log_errors`
    directive. It sets whether error messages are recorded in the server’s error log.
    This directive is disabled by default, but it is a good idea to enable it during
    development to keep track of errors.


    ```php

    // During development

    ini_set(''log_errors'',''1'');

    ```


    The `ini_set` function sets the value of a configuration option. Alternatively,
    these options can all be permanently set in the `php.ini` configuration file instead
    of in the script files.


    ## Custom Error Handlers


    The internal error handler can be overridden with a custom error handler. This
    is the preferred method for handling errors because it allows you to abstract
    the raw errors with friendly, custom error messages to the end users.


    A custom error handler is defined using the `set_error_handler` function. This
    function accepts two arguments: a callback function that is called when the error
    is raised, and optionally, the error levels that the function handles.


    ```php

    set_error_handler(''myError'', E_ALL | E_STRICT);

    ```


    If no error levels are specified, the error handler is set to handle all errors,
    including `E_STRICT`. However, a user-defined error handler is only actually able
    to handle run-time errors, and only run-time errors other than `E_ERROR`. Keep
    in mind that changes to the `error_reporting` setting do not affect the custom
    error handler, only the internal one.


    The callback function requires two parameters: the error level and error description.
    Optional parameters include the file name, line number, and error context, which
    is an array containing every variable in the scope that the error was triggered
    in.


    ```php

    function myError($errlvl, $errdesc, $errfile, $errline)

    {

    switch($errlvl)

    {

    case E_USER_ERROR:

    error_log("Error: $errdesc", 1, ''me@example.com'');

    require_once(''my_error_page.php'');

    return true;

    }

    return false;

    }

    ```


    This example function handles errors of level `E_USER_ERROR`. When such an error
    occurs, an email is sent to the specified address and a custom error page is displayed.
    By returning `false` from the function for other errors, they are handled by the
    internal error handler instead.


    ## Raising Errors


    PHP provides the `trigger_error` function for raising errors. It has one required
    argument, the error message, and a second optional argument specifying the error
    level. The error level must be one of the three `E_USER` levels, with `E_USER_NOTICE`
    being the default level.'
