    Problem


    In many cases there is a need for a very specific string formatting. When creating
    e-mail messages it’s convenient to have a formatting string, to generate date
    values for the headers, which follow the standard without having to remember the
    exact formatting.


    Solution


    The date() function provides a few specific formatting characters that will convert
    a timestamp into the string representation according to the specific ISO formatting.
    Using "c" will generate a string formatted according to the ISO 8601 standard
    and "r" will generate an RFC 2822-formatted string .


    The ISO 8601 standard is intended to make it possible to exchange date and time
    values between different parts of the world where different formatting is used.
    The RFC 2822 standard covers exchange of e-mails. There is a commonly used string
    that looks similar to this and it’s used to see the Last-Modified and Expire headers
    on an HTTP response. The main difference is that the e-mail data includes a time
    zone offset and the response header is always given in GMT value.


    How it Works


    If you create your own e-mail client you will have to set headers for to, from,
    subject, and other parameters in each e-mail message. In addition you would also
    have to create a header entry for the date and time the e-mail was created. This
    could look something like this:


    <?php


    // 5_10.php


    $msg = "From: mail@example.com\r\n" .


    "To: mail@somedomain.com\r\n" .


    "Subject: ISO date format\r\n";


    $msg .= date("c") . "\r\n\r\n";


    $msg .= "This is the body of the email message\r\n";


    echo $msg;


    CHAPTER 5 ■ DATES AND TIMES


    This is just a very simple e-mail message and it is recommended to use one of
    the many e-mail client classes to handle sending and receiving of e-mail messages.
    This example will echo the content of the $msg variable.


    From: mail@example.com


    To: mail@somedomain.com


    Subject: ISO date format


    2015-04-01T12:25:38-07:00


    This is the body of the email message


    Setting the Expires and Last-Modified headers for a HTTP response could look something
    like this:


    <?php


    // 5_11.php


    $gmt_mtime = gmdate(''D, d M Y H:i:s'', $last_modified) . '' GMT'';


    $gmt_etime = gmdate(''D, d M Y H:i:s'', time() + $ttl) . '' GMT'';


    header("Pragma: Cache");


    header("Cache-Control: max-age=0, must-revalidate");


    header("Last-Modified: " . $gmt_mtime);


    header("Expires: " . $gmt_etime);


    if (!empty($_SERVER[''HTTP_IF_MODIFIED_SINCE'']) &&


    $_SERVER[''HTTP_IF_MODIFIED_SINCE''] == $gmt_mtime) {


    http_response_code(304);


    exit();


    }


    // Output the rest of the response


    This will allow the browser to use a cached version of the response if and only
    if a revalidation sends back the HTTP status 304.


    Recipe 5-6\. Working with Week Numbers


    Problem


    In some industries around the world the use of week numbers are quite common.
    Unfortunately there are multiple different standards for how week numbers are
    calculated. The week that includes the first Thursday of the year, the week that
    includes January 4th, the first week with four or more days, or the week that
    starts with the Monday that falls between December 29th and January 4th.


    Solution


    The date functions in PHP support the ISO-8601 standard for week numbers, which
    define the first week to be the week that includes the first Thursday of the year.
    It is also worth mentioning that week numbering changes between Sunday and Monday
    and not between Saturday and Sunday as weeks are defined in some parts of the
    world.


    CHAPTER 5 ■ DATES AND TIMES


    How it Works


    In order to get the week number of a given timestamp we use the ‘W’ formatting
    character to get week number according to the ISO-8601 standard. Week numbers
    are often given with the year so the formatting string would be ‘Y-W’ or ‘W-Y’.


