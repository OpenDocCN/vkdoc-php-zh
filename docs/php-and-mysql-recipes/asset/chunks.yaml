    \ Mac 和 Linux 系统上，`include_path`是由冒号（`:`）分隔的一组目录；在 Windows 系统上，分隔符是分号（`;`）。当包含或引入（`require`）一个文件时，解释器会按照`include_path`中指定的目录顺序查找该文件。如果该文件存在于多个目录中，将使用最先找到的那个。\n\
    \n`include_path`配置中的每个目录都可以指定为绝对路径或相对路径。如果指定了相对路径，它将从 PHP 脚本执行的当前工作目录开始查找。在大多数情况下，这将是文档根目录或其下的一个子目录。如果你将所有\
    \ PHP 文件放在文档根目录，并将`include_path`配置为`../inc`，那么你可以将所有包含文件放在一个名为`inc`的目录中，该目录位于文档根目录的旁边。\n\
    \n`include`和`require`都可以将文件指定为绝对路径或相对路径。绝对路径以`/`开头，系统将只在该位置查找包含文件。如果使用相对路径，系统会在路径前依次拼接`include_path`配置中的每个部分，直到找到该文件。\n\
    \n根据包含文件的内容，可能无法多次包含它。\n\n对于定义函数或类的包含文件，情况就是如此。多次尝试声明相同的函数或类会导致编译错误。\n\n包含变量定义的其他文件可以多次包含。在大多数情况下，每个文件应该只被包含一次，但也有一些用例，从不同目录包含同名文件是有意义的。\n\
    \n`include`和`require`有特殊的版本，称为`include_once`和`require_once`。这些函数会确保，如果用户尝试多次包含同一个文件，系统只会加载该文件一次，从而防止因多次定义相同的函数或类而引发错误。\n\
    \n`include`和`require`可用于加载非 PHP 文件。如果你有一段 HTML 代码需要从文件系统中读取并按原样提供给请求的浏览器，这会很有用。在这种情况下，被包含的文件不会包含开头的`<?php`标签，其内容将作为输出传递。它会被精确地注入到文件被包含的位置，并且脚本可以在包含文件的前后向浏览器发送其他输出。\n\
    \n注意：尽管 Windows 使用反斜杠（`\\`）作为目录分隔符，但 PHP 可以同时使用斜杠（`/`）和反斜杠（`\\`）。这使得可以使用 PHP 编写能够在\
    \ Linux 和 Windows 平台上无需特别处理即可运行的代码。建议始终使用`/`作为目录分隔符。\n\n## 工作原理\n\n如果你有一个类定义在一个文件中，并且你想从其他文件中访问它，则必须包含定义该类的文件。\n\
    \n```php\n<?php\n// 7_1.php\n\nclass Test {\n\n    protected $a = null;\n\n  \
    \  function __construct($a) {\n\n        $this->a = $a;\n\n    }\n\n}\n```\n\n\
    ```php\n<?php\n// 7_2.php\n\nrequire \"7_1.php\";\n\nclass Test2 extends Test\
    \ {\n\n    function SetValue($a) {\n\n        $this->a = $a;\n\n    }\n\n    function\
    \ GetValue() {\n\n        return $this->a;\n\n    }\n\n}\n\n$t = new Test2(15);\n\
    \necho $t->GetValue() . \"\\n\";\n\n$t->SetValue(30);\n\necho $t->GetValue() .\
    \ \"\\n\";\n```\n\n在上面的例子中，我们在一个文件中定义了一个类，并在下一个脚本中包含该文件，在该脚本中，类`Test()`被扩展为`Test2()`。根据`php.ini`中如何定义`include_path`，或者是否使用`ini_set()`函数重新定义它，如果文件与主脚本位于同一目录，你可能需要在文件名前面加上`./`。\n\
    \n如果在`include_path`定义指定的任何位置存在多个同名文件，系统将只包含根据`include_path`指令中列出的目录顺序找到的第一个文件。如果你想绕过在`include_path`包含的所有目录中搜索文件，可以指定一个绝对路径。如果你打算与可能将应用安装在不同位置的用户共享该应用，这样做可能会引起问题。\n\
    \n---\n\n# 配方 7-2：读取文件\n\n## 问题\n\n在之前的配方中，我们研究了包含代码片段或其他文件，这些文件要么被执行，要么作为输出传递给客户端。但是，如果文件包含的数据在发送到客户端之前必须经过处理，该怎么办？\n\
    \n## 解决方案\n\nPHP 附带了许多用于读取文件的函数。最基础的函数（如`fopen()`，`fclose()`，`fread()`等）模拟了操作系统的底层文件处理功能；而更高级的函数（如`file_get_contents()`，`file()`，`fgetcsv()`）允许你通过单个命令读取文件、读取文件并将其转换为数组，或者读取文件并将其内容解析为逗号分隔值（CSV）文件。\n\
    \n其他函数如`readfile()`和`fpassthru()`，会简单地将文件内容或文件指针的内容读取出来，并直接发送到输出。\n\n## 工作原理\n\
    \n使用`fopen()`创建一个可用于对文件进行读和/或写操作的文件句柄，其工作方式与 C/C++ 中相同函数的类似。\n\n```php\n<?php\n\
    // 7_3.php\n\n$f = '';\n\n$fp = fopen('myfile.txt', 'r');\n\nif ($fp) {\n\n  \
    \  while ($s = fread($fp, 100)) {\n\n        $f .= $s;\n\n    }\n\n    fclose($fp);\n\
    \n}\n\nvar_dump($f);\n```\n\n在这个例子中，文件`myfile.txt`被以只读模式打开，这由`fopen()`函数的第二个参数`r`指示。该文件可以指定为相对路径或绝对路径。在此例中，文件预期与\
    \ PHP 脚本位于同一目录。\n\n如果文件成功打开，`fopen()`函数将返回一个文件句柄。良好的编程实践是在读取任何内容之前检查错误。如果文件缺失或被另一个进程锁定以进行写入，导致系统无法打开该文件，它将返回`0`而不是一个文件句柄。这使得错误检查非常容易。只需在进入读取步骤之前检查文件句柄是否有值即可。\n\
    \n通过循环读取文件，每次读取最多 100 字节。内部文件指针会移动 100 字节，然后为下一次迭代做准备。此过程持续进行，直到`fread()`函数无法读取更多数据。`fread()`函数将返回实际读取的字节数。如果文件长度为\
    \ 233 字节，循环将进行 3 次迭代：前两次将读取 100 字节，最后一次将读取剩余的 33 字节。`fread()`函数被第 4 次调用，但由于没有更多数据可读，返回值将为`0`，循环将退出。之后，使用`fclose()`函数关闭文件，并使用`var_dump()`函数将文件内容写入标准输出。\n\
    \n解释器会在脚本终止时自动关闭任何脚本未关闭的文件。这对于在 Web 环境中使用的脚本来说很方便，但如果脚本用于长时间运行的进程，建议在所有文件不再使用时关闭它们。\n\
    ```"
- fmt: "### Using `fopen()` and File Reading\n\nUsing `fopen()` and reading only a\
    \ section of the file at any given time will help reduce the memory usage. The\
    \ first argument to `fopen()` is the filename and path and the second is used\
    \ to identify the mode used when the file is opened. This is done with one or\
    \ more characters. The options are `r` for read, `w` for write, and `a` for append.\
    \ These can be combined with `+` to add the opposite mode. In addition the use\
    \ of `x` is allowed to open a file for writing. If the file exists the operation\
    \ will fail. The mode `c` indicates that the file is opened for writing with the\
    \ file pointer set at the beginning of the file but the file is not truncated\
    \ as it is with the `w` mode.\n\nIf you are looking for a specific pattern in\
    \ the file you can throw away each of the segments until you find the one you\
    \ are looking for. Alternatively if you know a specific offset where you want\
    \ to start the read from you can use the `fseek()` function to move the file pointer\
    \ to that specific location before reading or writing. This will be faster than\
    \ reading through the file one chunk at the time.\n\nIn the example above we end\
    \ up reading and storing the entire file in a variable so we need to have enough\
    \ memory to hold the entire file. Following is a simpler way to get the same result\
    \ by using the `file_get_contents()` function.\n\n![Image 13](index-179_1.jpg)\n\
    \n## CHAPTER 7 ■ FILES AND DIRECTORIES\n\n```php\n<?php\n// 7_4.php\n$f = file_get_contents('myfile.html');\n\
    echo $f;\n```\n\nThis example reads the content of the file and sends the content\
    \ back to the client. If the file contains the following content:\n\n```html\n\
    <!DOCTYPE html>\n<html>\n<head>\n<title>PHP and MySQL Recipes</title>\n</head>\n\
    <body>\n<h1>Chapter 7</h1>\n<p>This chapter is about files and directpries</p>\n\
    </body>\n</html>\n```\n\nThe output in the browser will look like this:\n\nThere\
    \ is no need to open and close the file and no need to specify the read operation.\
    \ That is all handled internally. A single command is used to open the file, read\
    \ the contents, store it as a variable, and close the file.\n\n### Recipe 7-3\\\
    . Writing Files\n\n#### Problem\n\nNot all output of PHP is intended to go to\
    \ the browser or console (stdout). Logging functions that can be helpful when\
    \ debugging problems in the code, writing cached content so it can be read by\
    \ the web server without invoking PHP, or simply exchanging data with other systems\
    \ all require some form of writing to files on the local file system.\n\n####\
    \ Solution\n\nWriting files follows the same semantics as described in the previous\
    \ recipe for reading files. The basic functions (`fopen()`, `fclose()`, and `fwrite()`)\
    \ are wrappers around the low-level functions, and functions like `file_put_contents()`\
    \ and `fputcsv()` let you perform more advanced operations in a single command.\n\
    \n## CHAPTER 7 ■ FILES AND DIRECTORIES\n\n#### How it Works\n\nIn the following\
    \ example a string is written to a file.\n\n```php\n<?php\n// 7_5.php\n$f = '';\n\
    $fp = fopen('myfile.txt', 'at');\nif ($fp) {\n    fwrite($fp, \"The text that\
    \ goes into this file\\nAnd some on line 2\");\n    fclose($fp);\n}\n```\n\nThe\
    \ file is opened with the options `'at'`. That indicates that the text will be\
    \ appended to the end of the file if it exists already. Using `'wt'` will overwrite\
    \ any existing content of the file. The `t` in the option indicates that the content\
    \ will be text. Using a `b` will indicate binary content.\n\nSimilarly it is possible\
    \ to write to a file with a single function call. The function `file_put_contents()`\
    \ takes two parameters where the first is the path to the file and the second\
    \ is the content to write. If the file exists already it will be overwritten with\
    \ the new content. It is possible to pass a third argument to the function call\
    \ to force the content to be appended to the existing content. The third argument\
    \ is a bitmapped flag where `FILE_APPEND` is the value that will make the function\
    \ append the content. Adding the flag `LOCK_EX` to the third argument will ensure\
    \ an exclusive lock on the file. No other process will be able to write to the\
    \ file at the same time.\n\nWriting a simple logging system could look something\
    \ like this:\n\n```php\n<?php\n// 7_6.php\n```"
