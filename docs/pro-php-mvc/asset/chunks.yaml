    ## Questions


    1. Why do we create a new template implementation for the new template tags we
    used in this chapter?

    2. What is the difference between the partial/include template tags?

    3. What is the difference between shared storage (`prepend`, `set`, `append`,
    `yield`) and template data values?


    ## Answers


    1. Our previous template implementation was actually sufficient for basic template
    rendering. It might not have been built with layouts or partial views in mind,
    but it is still a valid implementation. The extra tags take template rendering
    a step further, so it is better to have a good distinction between the standard
    template tags and the enhanced (extended) template tags.

    2. The `include` tag makes an HTTP request to a URL, and injects the resulting
    text/html into the current template. The `partial` tag fetches the contents of
    another template and places it within the current template, so that both templates
    will be evaluated when the main template is rendered.

    3. Assigning data to the shared storage (`prepend`, `set`, `append`, `yield`)
    allows the data to be accessed from any template scope, be it within the layout,
    action, or partials. It is best used for single-dimensional data, like strings
    or integers, since our tags do not allow the retrieval of subitems within a stored
    object. Template data values are assigned to an individual template, and are not
    accessible outside of that template’s scope.


    ## Exercises


    1. We have discussed the difference between shared data storage (`prepend`, `set`,
    `append`, `yield`) and template data values. Now try creating additional (extended)
    template tags that allow for subitem access (e.g., `{yield scripts.shared}`) to
    objects in the shared storage.

    2. Our `search()` action only searches by first names that sound the same (using
    `SOUNDEX`). Now add the last name field to the query.

    3. Our `Request` class does not manage cookies. Try adding support for them now!


    ---


    ## **Chapter 16**


    ## Settings


    In this chapter, we will be looking at how to better validate posted form data,
    by extending the `Model` class.'
