  trans: '

    ### 包含文件中的链接


    这一点往往会让人困惑。尽管 PHP 的包含命令不理解站点根目录相对链接，但包含文件中的链接通常应该相对于站点根目录。这是因为包含文件可能被放入站点层级中的任何位置，因此当文件被包含在不同层级时，文档相对链接就会失效。


    **注意：** `menu.php` 中的导航菜单使用的是文档相对链接，而非相对于站点根目录的链接。之所以特意保留这种写法，是因为除非你创建了虚拟主机，否则站点根目录是
    `localhost`，而不是 `phpsols`。这是在 Web 服务器文档根目录的子文件夹中测试站点的一个缺点。本书全程使用的日本之旅网站只有一个层级，因此文档相对链接可以正常工作。当开发多级文件夹的站点时，请在包含文件中使用站点根目录相对链接，并考虑设置虚拟主机用于测试（详见第
    2 章）。


    ### 嵌套包含文件


    一旦一个文件被包含到另一个文件中，相对路径的计算将基于父文件，而不是被包含的文件。这给需要包含另一个外部文件的外部文件中的函数或类定义带来了问题。


    如果两个外部文件位于同一文件夹中，你可以仅通过文件名来包含嵌套文件，像这样：


    `require_once ''Thumbnail.php'';`


    在这种情况下，相对路径不应以 `./` 开头，因为 `./` 表示“从此文件夹开始”。对于包含文件来说，“此文件夹”指的是父文件的文件夹，而不是包含文件本身的文件夹，这会导致嵌套文件的路径错误。


    当包含文件位于不同文件夹时，你可以使用 PHP 常量 `__DIR__` 构建目标文件的绝对路径。该常量返回包含文件所在目录（文件夹）的绝对路径，且不带尾部斜杠。将
    `__DIR__`、一个正斜杠和文档相对路径拼接起来，就能将相对路径转换为绝对路径。例如，假设从一个包含文件到另一个包含文件的相对路径如下：


    `''../File/Upload.php''`


    你可以这样将其转换为绝对路径：


    `__DIR__ . ''/../File/Upload.php''`


    为了方便，在文档相对路径的开头添加了正斜杠。这样做的效果是，先找到包含文件的父文件夹，然后向上返回一级，以找到正确的路径。


    你将在第 8 章中看到一个使用示例，其中一个包含文件需要包含另一个位于不同文件夹中的文件。


    ## 包含文件的安全注意事项


    包含文件是 PHP 的一个非常强大的特性。这种强大也带来了安全风险。只要外部文件可访问，PHP 就会包含它，并将其中的任何代码整合到主脚本中。但正如本章前面提到的，包含文件可以位于任何位置。从技术上讲，它们甚至可以在不同的服务器上。然而，这被认为是一种安全风险，以至于在
    PHP 5.2 中引入了一个新的配置指令 `allow_url_include`。默认设置为 `Off`，因此除非你能完全控制服务器的配置，否则现在无法包含来自不同服务器的文件。与
    `include_path` 不同，`allow_url_include` 指令除了服务器管理员之外，其他任何人都无法覆盖。


    即使你同时控制着两个服务器，也绝不应该包含来自其他服务器的文件。攻击者有可能伪造地址，并尝试在你的站点上执行恶意脚本。


    ## 本章回顾


    本章已经将你带入 PHP 的世界，使用了包含文件、数组和多维数组。它向你展示了如何提取当前页面的名称、显示随机图像以及获取图像的尺寸。你还学习了如何抛出和捕获异常，以及如何重定向到不同的页面。内容很多，如果一次不能完全消化，也不必担心。使用
    PHP 越多，你就越熟悉这些基本技术。在下一章中，你将学习 PHP 如何处理来自在线表单的输入，并运用这些知识将来自网站的用户反馈发送到你的电子邮箱。


    # 5. 让表单生动起来


    表单是 PHP 工作的核心。你可以使用表单登录受限页面、注册新用户、向在线商店下单、在数据库中输入和更新信息、发送反馈……这样的例子不胜枚举。所有这些用途背后的原理都是相同的，因此你在本章获得的知识将在大多数
    PHP 应用中具有实用价值。为了演示如何处理表单信息，我将向你展示如何收集网站访问者的反馈，并将其发送到你的邮箱。


    不幸的是，用户的输入可能会让你的网站暴露于恶意攻击之下。在接受数据之前，检查表单提交的数据非常重要。虽然 HTML5 表单元素在最新的浏览器中会验证用户输入，但你仍然需要在服务器端检查数据。HTML5
    验证有助于合法用户避免提交带有错误的表单，但恶意用户可以轻松绕过在浏览器中执行的检查。服务器端验证并非可有可无，而是至关重要的。本章中的 PHP 解决方案将向你展示如何过滤或阻止任何可疑或危险的内容。防止恶意攻击并不需要耗费太多精力。同时，如果表单不完整或发现错误，保留用户输入并重新显示也是一个好主意。


    这些解决方案将构建一个完整的邮件处理脚本，该脚本可以在不同的表单中重复使用，因此按顺序阅读它们很重要。


    在本章中，你将了解以下内容：


    - 理解用户输入如何从在线表单传输

    - 在不丢失用户输入的情况下显示错误

    - 验证用户输入

    - 通过电子邮件发送用户输入

    '
- fmt: '# How PHP Gathers Information from a Form


    Although HTML contains all the necessary tags to construct a form, it doesn’t
    provide any means to process the form when submitted. For that, you need a server-side
    solution, such as PHP.


    The Japan Journey website contains a simple feedback form (see Figure [5-1](#A978-1-4842-0635-5_5_Chapter.html#Fig1)).
    Other elements—such as radio buttons, check boxes, and drop-down menus—will be
    added later.


    ![A978-1-4842-0635-5_5_Fig1_HTML.jpg](A978-1-4842-0635-5_5_Fig1_HTML.jpg)


    Figure 5-1. Processing a feedback form is one of the most popular uses of PHP


    First, let’s take a look at the HTML code for the form (it’s in `contact_01.php`
    in the `ch05` folder):


    ```

    <form method="post" action="">

    <p>

    <label for="name">Name:</label>

    <input name="name" id="name" type="text">

    </p>

    <p>

    <label for="email">Email:</label>

    <input name="email" id="email" type="text">

    </p>

    <p>

    <label for="comments">Comments:</label>

    <textarea name="comments" id="comments"></textarea>

    </p>

    <p>

    <input name="send" type="submit" value="Send message">

    </p>

    </form>

    ```


    The first two `<input>` tags and the `<textarea>` tag contain both `name` and
    `id` attributes set to the same value. The reason for this duplication is that
    HTML, CSS, and JavaScript all refer to the `id` attribute. Form-processing scripts,
    however, rely on the `name` attribute. So, although the `id` attribute is optional,
    you must use the `name` attribute for each element that you want to be processed.


    Two other things to notice are the `method` and `action` attributes inside the
    opening `<form>` tag. The `method` attribute determines how the form sends data.
    It can be set to either `post` or `get`. The `action` attribute tells the browser
    where to send the data for processing when the Submit button is clicked. If the
    value is left empty, as here, the page attempts to process the form itself.


    **Note**


    I have deliberately avoided using any of the new HTML5 form features, such as
    `type="email"` and the `required` attribute. This makes it easier to test the
    PHP server-side validation scripts. After testing, you can update your forms to
    use the HTML5 validation features. Validation in the browser is mainly a courtesy
    to the user to prevent incomplete information from being submitted, so it’s optional.
    Server-side validation should never be skipped.


    ## Understanding the Difference Between `post` and `get`


    The best way to demonstrate the difference between the `post` and `get` methods
    is with a real form. If you completed the previous chapter, you can continue working
    with the same files.


    Otherwise, the `ch05` folder contains a complete set of files for the Japan Journey
    site with all the code from [Chapter 4](#A978-1-4842-0635-5_4_Chapter.html) incorporated
    in them. Copy `contact_01.php` to the site root and rename it `contact.php`. Also
    copy the contents of the `ch05/includes` folder to the `includes` folder in the
    site root.


    Locate the opening `<form>` tag in `contact.php` and change the value of the `method`
    attribute from `post` to `get`, like this:


    ```

    <form method="get" action="">

    ```


    Save `contact.php` and load the page in a browser. Type your name, email address,
    and a short message into the form, then click Send message.


    ![A978-1-4842-0635-5_5_Figa_HTML.jpg](A978-1-4842-0635-5_5_Figa_HTML.jpg)


    Look in the browser address bar. You should see the contents of the form attached
    to the end of the URL, like this:


    ![A978-1-4842-0635-5_5_Figb_HTML.jpg](A978-1-4842-0635-5_5_Figb_HTML.jpg)


    If you break up the URL, it looks like this:


    ```

    http://localhost/phpsols/contact.php

    ?name=David+Powers

    &email=david%40example.com

    &comments=I+hope+you+get+this.+%3B-%29

    &send=Send+message

    ```


    Each line after the basic URL begins with the `name` attribute of one of the form
    elements, followed by an equal sign and the contents of the input fields. URLs
    cannot contain spaces or certain characters (such as my smiley), so the browser
    encodes them as hexadecimal values, a process known as URL encoding (for a full
    list of values, see [`www.w3schools.com/tags/ref_urlencode.asp`](http://www.w3schools.com/tags/ref_urlencode.asp)).


    The first `name` attribute is preceded by a question mark (`?`) and the others
    by an ampersand (`&`). You’ll see this type of URL when using search engines,
    which helps explain why everything after the question mark is known as a query
    string.


    Go back into the code of `contact.php` and change `method` back to `post`, like
    this:


    ```

    <form method="post" action="">

    ```


    Save `contact.php` and reload the page in your browser. Type another message and
    click Send message. Your message should disappear, but nothing else happens. It
    hasn’t been lost, but you haven’t done anything to process it yet.


    In `contact.php`, add the following code immediately below the closing `</form>`
    tag:


    ```

    <pre>

    <?php if ($_POST) { print_r($_POST); } ?>

    </pre>

    ```


    This displays the contents of the `$_POST` superglobal array if any `post` data
    has been sent. As explained in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html),
    the `print_r()` function allows you to inspect the contents of arrays; the `<pre>`
    tags simply make the output easier to read.


    Save the page and click the Refresh button in your browser. You’ll probably see
    a warning similar to the following. This tells you that the data will be resent,
    which is exactly what you want. Confirm that you want to send the information
    again.


    ![A978-1-4842-0635-5_5_Figc_HTML.jpg](A978-1-4842-0635-5_5_Figc_HTML.jpg)


    The code from step 6 should now display the contents of your message below the
    form, as shown in Figure [5-2](#A978-1-4842-0635-5_5_Chapter.html#Fig2). Everything
    has been stored in one of PHP’s superglobal arrays, `$_POST`, which contains data
    sent using the `post` method. The `name` attribute of each form element is used
    as the array key, making it easy to retrieve the content.


    ![A978-1-4842-0635-5_5_Fig2_HTML.jpg](A978-1-4842-0635-5_5_Fig2_HTML.jpg)


    Figure 5-2. The `$_POST` array uses the form’s `name` attributes to identify each
    element of data


    As you have just seen, the `get` method sends your data in a very exposed way,
    making it vulnerable to alteration. Also, some browsers limit the maximum length
    of a URL to about 2,000 characters, so the `get` method can be used only for small
    amounts of data. The `post` method is more secure and can be used for much larger
    amounts of data. By default, PHP permits up to 8 MB of `post` data, although hosting
    companies may set a different limit.


    Consequently, you should normally use the `post` method with forms. The `get`
    method is used mainly in conjunction with database searches; bookmarking your
    search result is useful because all the search criteria are in the URL. We’ll
    return to the `get` method later in the book. This chapter concentrates on the
    `post` method and its associated superglobal array, `$_POST`.


    **Caution**


    Although the `post` method is more secure than `get`, you shouldn’t assume that
    it’s 100% safe. For secure transmission, you need to use encryption or the Secure
    Sockets Layer (SSL) with a URL that begins with `https://`.'
