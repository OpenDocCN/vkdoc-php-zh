    ''Sort'' => ''salesrank'');


    $query_string = ''&'';


    foreach ($params as $key => $value)


    $query_string .= $key . ''='' . urlencode($value) . ''&''; The complete Amazon
    URL that you need to call is composed of the base URL (which you saved as a constant
    in include/config.php) to which you append the query string you just built: $amazon_url
    = AMAZON_REST_BASE_URL . $query_string;


    Using the file_get_contents() function, you make a simple HTTP GET request to
    Amazon. It''s just like typing the address in your browser:


    // Get the XML response using REST


    $amazon_xml = file_get_contents($amazon_url);


    The $amazon_xml variable will contain a string with the returned XML data. To
    further process it, we use the simplexml_load_string() function that parses the
    XML text and returns a SimpleXMLElement object representing the XML document.
    Read more details at http://www.php.net/manual/en/


    function.simplexml-load-string.php.


    // Unserialize the XML and return


    return simplexml_load_string($amazon_xml);


    }


