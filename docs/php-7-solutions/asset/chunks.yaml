    \ {\n    if (is_numeric($size)) {\n        $this->maxSize = abs($size);\n    }\n\
    }\n```\n\n`is_numeric()`函数检查提交的值是否为数字或数字字符串。如果是，则将其赋值给`$maxSize`属性。作为预防措施，将该值传递给`abs()`函数，该函数将数字转换为其绝对值。换句话说，负数会被转换为正数。\n\
    \n如果提交的值不是数字，则不执行任何操作。默认值保持不变。\n\n2. 更改文件名尾缀的函数需要确保该值不包含任何特殊字符。代码如下所示：\n\n```php\n\
    protected function setSuffix($suffix) {\n    if (preg_match('/^\\w+$/', $suffix))\
    \ {\n        if (strpos($suffix, '_') !== 0) {\n            $this->suffix = '_'\
    \ . $suffix;\n        } else {\n            $this->suffix = $suffix;\n       \
    \ }\n    }\n}\n```\n\n这里使用了`preg_match()`，它以正则表达式作为第一个参数，并在作为第二个参数传递的值中搜索匹配项。正则表达式需要包裹在一对匹配的分隔符中——此处使用的是通常的正斜杠。去掉分隔符后，正则表达式如下：\n\
    \n```\n^\\w+$\n```\n\n在此上下文中，脱字符（`^`）告诉正则表达式从字符串开头开始匹配。`\\w`是一个正则表达式标记，匹配任何字母数字字符或下划线。`+`表示匹配前面的标记或字符一次或多次，`$`表示匹配字符串结尾。换句话说，该正则表达式匹配仅包含字母数字字符和下划线的字符串。如果字符串包含空格或特殊字符，则不会匹配。\n\
    \n如果匹配失败，默认的`$suffix`属性保持不变。否则，执行以下条件语句：\n\n```php\nif (strpos($suffix, '_') !==\
    \ 0) {\n```"
  raw: "The `name`\n    attribute of the submit button in `create_thumb.php` is\n\
    \    `create`, so this\n    code runs only when the form has been submitted. It\
    \ includes the `Thumbnail` class\n    definition, creates an instance of the class,\
    \ passing the selected value\n    from the form as an argument, and calls the\
    \ `test()` method.\n\nThe `catch`\n    block uses `Throwable` as the type\n  \
    \  declaration, so it will handle both internal PHP errors and exceptions\n  \
    \  thrown by the `Thumbnail` class.\n\n2.  Save `create_thumb.php` and\n    load\
    \ it into a browser. Select an image and click Create Thumbnail. This\n    produces\
    \ output similar to Figure [10-1](#332054_4_En_10_Chapter.xhtml#Fig1).\n\nIf necessary,\
    \ check your code against `Thumbnail_01.php` in\nthe `ch10/PhpSolutions/Images`\n\
    folder.\n\nCaution\nThe value of `$_POST['pix']` is\nbeing passed directly to\
    \ the `test()` method because\nit’s coming directly from our own form. In a production\
    \ environment, you\nshould always check values received from a form. For example,\
    \ use `basename()` to extract\njust the filename and specify allowable directories.\n\
    \nAlthough some properties have default values, you need to provide\noptions to\
    \ change the maximum size of the thumbnail image and the suffix\napplied to the\
    \ base of the filename. You also need to tell the class\nwhere to create the thumbnail.\n\
    \nPHP Solution 10-2: Changing Default Values\n\nWhen changing the default values\
    \ set by a class, you have a choice of\napproaches. One is to create public methods\
    \ that need to be called after\nan object is instantiated. The other is to pass\
    \ the values as arguments\nto the constructor method. Whichever approach you take,\
    \ it’s important\nto check the submitted value is valid. Continue working with\
    \ the same\nclass definition. Alternatively, use `Thumbnail_01.php` in\nthe `ch10/PhpSolutions/Image`\n\
    folder.\n\n1.  Begin by updating the constructor method to add parameters for\
    \ the\n    destination folder where the thumbnail is to be created, the maximum\n\
    \    size of the thumbnail, and the suffix to be added to the filename. The\n\
    \    constructor delegates the setting of these values\n    to protected methods\
    \ that will also need to be defined. The updated code\n    looks like this:\n\n\
    ```\n    public function __construct($image, $destination, $maxSize = 120, $suffix\
    \ = '_thb') {\n    if (is_file($image) && is_readable($image)) {\n    $details\
    \ = getimagesize($image);\n    } else {\n    throw new \\Exception(\"Cannot open\
    \ $image.\");\n    }\n    // if getimagesize() returns an array, it looks like\
    \ an image\n    if (!is_array($details)) {\n    throw new \\Exception(\"$image\
    \ doesn't appear to be an image.\");\n    } else {\n    if ($details[0] == 0)\
    \ {\n    throw new \\Exception(\"Cannot determine size of $image.\");\n    }\n\
    \    // check the MIME type\n    if (!$this->checkType($details['mime'])) {\n\
    \    throw new \\Exception('Cannot process that type of file.');\n    }\n    $this->original\
    \ = $image;\n    $this->originalwidth = $details[0];\n    $this->originalheight\
    \ = $details[1];\n    $this->basename = pathinfo($image, PATHINFO_FILENAME);\n\
    \    $this->setDestination($destination);\n    $this->setMaxSize($maxSize);\n\
    \    $this->setSuffix($suffix);\n    }\n    }\n    ```\n\n2.  Next, create the\
    \ method to set the folder where the thumbnail is to be\n    created. Add the\
    \ following code to `Thumbnail.php` after\n    the `checkType()`\n    method definition:\n\
    \n```\n    protected function setDestination($destination) {\n    if (is_dir($destination)\
    \ && is_writable($destination)) {\n    $this->destination = rtrim($destination,\
    \ '/\\\\') . DIRECTORY_SEPARATOR;\n    }\n    } else {\n    throw new \\Exception(\"\
    Cannot write to $destination.\");\n    }\n    }\n    ```\n\nThis begins by checking\
    \ that `$destination` is a\n    folder (directory) and that it’s writable. If\
    \ it isn’t, an exception is\n    thrown. Otherwise, the rest of the code is executed.\n\
    \nBefore the submitted value is assigned to the `$destination`\n    property,\
    \ we need to make sure it ends with a single trailing slash.\n    This is done\
    \ by passing the submitted value to the rtrim() function,\n    which normally\
    \ strips whitespace from the end of a string. However, if\n    you pass a string\
    \ as the second argument, it also strips those\n    characters. So, this strips\
    \ both forward- and backslashes from the end\n    of the string—two\n    backslashes\
    \ are needed because PHP uses a backslash to escape both\n    single and double\
    \ quotes (see “Using escape sequences inside double\n    quotes” in Chapter [4](#332054_4_En_4_Chapter.xhtml)).\
    \ The PHP constant `DIRECTORY_SEPARATOR`\n    is then concatenated to the end\
    \ of `$destination`. The\n    `DIRECTORY_SEPARATOR`\n    constant automatically\
    \ \n    chooses the right type of slash depending on the operating\n    system.\n\
    \nTip\nPHP treats forward slashes or backslashes equally in a path. Even if\n\
    this results in adding the opposite type of slash, the path remains\nvalid as\
    \ far as PHP is concerned. However, you cannot rely on this\nbehavior when building\
    \ a path for use outside of a PHP script, such as\nwhen creating a URL or handing\
    \ the path to an external program to\nexecute.\n\n1.  The method for changing\
    \ the maximum size of the thumbnail simply needs\n    to check that the value\
    \ is a number. Add the following code to the class\n    definition:\n\n```\n \
    \   protected function setMaxSize($size) {\n    if (is_numeric($size)) {\n   \
    \ $this->maxSize = abs($size);\n    }\n    }\n    ```\n\nThe `is_numeric()` function\n\
    \     checks that the\n    submitted value is a number or a numeric string. If\
    \ it is, it’s assigned\n    to the `$maxSize`\n    property. As a precaution,\
    \ the value is passed to the `abs()` function, which\n    converts a number to\
    \ its absolute value. In other words, a negative\n    number is converted to a\
    \ positive one.\n\nIf the submitted value isn’t a number, nothing happens. The\
    \ default\n    value remains unchanged.\n\n2.  The function to change the suffix\
    \ inserted in the filename needs to make\n    sure the value doesn’t contain any\
    \ special characters. The code looks\n    like this:\n\n```\n    protected function\
    \ setSuffix($suffix) {\n    if (preg_match('/^\\w+$/', $suffix)) {\n    if (strpos($suffix,\
    \ '_') !== 0) {\n    $this->suffix = '_' . $suffix;\n    } else {\n    $this->suffix\
    \ = $suffix;\n    }\n    }\n    }\n    ```\n\nThis uses `preg_match()`,  which\
    \ takes a regular\n    expression as its first argument and searches for a match\
    \ in the value\n    passed as the second argument. Regular expressions need to\
    \ be wrapped in\n    a pair of matching delimiter characters—normally forward\
    \ slashes, as\n    used here. Stripped of the delimiters, the regex looks like\
    \ this:\n\n```\n    ^\\w+$\n    ```\n\nIn this context, the caret (`^`) tells\
    \ the regex\n     to start at the\n    beginning of the string. The `\\w` is a\
    \ regex token\n    that matches any alphanumeric character or an underscore. The\
    \ `+` means match the\n    preceding token or character one or more times, and\
    \ the `$` means match the end\n    of the string. In other words, the regex matches\
    \ a string that contains\n    only alphanumeric characters and underscores. If\
    \ the string contains\n    spaces or special characters, it won’t match.\n\nIf\
    \ the match fails, the default $suffix property remains unchanged.\n    Otherwise,\
    \ this conditional statement is executed:\n\n```\n    if (strpos($suffix, '_')\
    \ !== 0) {\n    ```"
  trans: "\n`name`属性在`create_thumb.php`的提交按钮中是`create`，因此这段代码仅在表单提交后执行。它包含`Thumbnail`类定义，创建该类的一个实例（将表单中选择的值作为参数传递），并调用`test()`方法。\n\
    \n`catch`块使用`Throwable`作为类型声明，因此它将处理内部 PHP 错误以及`Thumbnail`类抛出的异常。\n\n2. 保存`create_thumb.php`并在浏览器中加载。选择一张图片并单击\"\
    创建缩略图\"。输出结果类似于图 10-1。\n\n如有必要，请将代码与`ch10/PhpSolutions/Images`文件夹中的`Thumbnail_01.php`进行核对。\n\
    \n**注意**  \n`$_POST['pix']`的值被直接传递给`test()`方法，因为它直接来自我们自己的表单。在生产环境中，您应始终检查从表单接收的值。例如，使用`basename()`提取纯文件名并指定允许的目录。\n\
    \n虽然某些属性具有默认值，但您需要提供选项来更改缩略图的最大大小以及应用于文件名基础的尾缀。您还需要告知类在哪里创建缩略图。\n\n**PHP 解决方案\
    \ 10-2：更改默认值**\n\n当更改类设置的默认值时，您有多种方法可以选择。一种方法是创建需要在对象实例化后调用的公共方法。另一种方法是将值作为参数传递给构造方法。无论采用哪种方法，检查提交的值是否有效都很重要。继续使用同一个类定义。或者，使用`ch10/PhpSolutions/Image`文件夹中的`Thumbnail_01.php`。\n\
    \n1. 首先，更新构造方法，为缩略图的目标文件夹、缩略图的最大大小以及要添加到文件名的尾缀添加参数。构造方法将这些值的设置委托给也需要定义的受保护方法。更新后的代码如下所示：\n\
    \n```php\npublic function __construct($image, $destination, $maxSize = 120, $suffix\
    \ = '_thb') {\n    if (is_file($image) && is_readable($image)) {\n        $details\
    \ = getimagesize($image);\n    } else {\n        throw new \\Exception(\"Cannot\
    \ open $image.\");\n    }\n    // if getimagesize() returns an array, it looks\
    \ like an image\n    if (!is_array($details)) {\n        throw new \\Exception(\"\
    $image doesn't appear to be an image.\");\n    } else {\n        if ($details[0]\
    \ == 0) {\n            throw new \\Exception(\"Cannot determine size of $image.\"\
    );\n        }\n        // check the MIME type\n        if (!$this->checkType($details['mime']))\
    \ {\n            throw new \\Exception('Cannot process that type of file.');\n\
    \        }\n        $this->original = $image;\n        $this->originalwidth =\
    \ $details[0];\n        $this->originalheight = $details[1];\n        $this->basename\
    \ = pathinfo($image, PATHINFO_FILENAME);\n        $this->setDestination($destination);\n\
    \        $this->setMaxSize($maxSize);\n        $this->setSuffix($suffix);\n  \
    \  }\n}\n```\n\n2. 接下来，创建用于设置缩略图目标文件夹的方法。在`checkType()`方法定义之后，将以下代码添加到`Thumbnail.php`中：\n\
    \n```php\nprotected function setDestination($destination) {\n    if (is_dir($destination)\
    \ && is_writable($destination)) {\n        $this->destination = rtrim($destination,\
    \ '/\\\\') . DIRECTORY_SEPARATOR;\n    } else {\n        throw new \\Exception(\"\
    Cannot write to $destination.\");\n    }\n}\n```\n\n该方法首先检查`$destination`是否为文件夹（目录）且可写。如果不是，则抛出异常。否则，执行其余代码。\n\
    \n在将提交的值赋值给`$destination`属性之前，我们需要确保它以单个尾部斜杠结尾。这是通过将提交的值传递给`rtrim()`函数来实现的，该函数通常用于去除字符串末尾的空白字符。但是，如果传递一个字符串作为第二个参数，它也会去除这些字符。因此，这会从字符串末尾去除正斜杠和反斜杠——需要使用两个反斜杠，因为\
    \ PHP 使用反斜杠来转义单引号和双引号（参见第[4]章中的“在双引号内使用转义序列”）。然后将 PHP 常量`DIRECTORY_SEPARATOR`连接到`$destination`的末尾。`DIRECTORY_SEPARATOR`常量会根据操作系统自动选择正确的斜杠类型。\n\
    \n**提示**  \nPHP 在路径中同等对待正斜杠或反斜杠。即使这导致添加了相反类型的斜杠，对 PHP 而言路径仍然有效。但是，在为 PHP 脚本之外的使用构建路径时（例如创建\
    \ URL 或将路径交给外部程序执行），您不能依赖此行为。\n\n1. 更改缩略图最大大小的方法只需检查该值是否为数字。将以下代码添加到类定义中：\n\n\
    ```php\nprotected function setMaxSize($size) {\n    if (is_numeric($size)) {\n\
    \        $this->maxSize = abs($size);\n    }\n}\n```\n\n`is_numeric()`函数检查提交的值是否为数字或数字字符串。如果是，则将其赋值给`$maxSize`属性。作为预防措施，将该值传递给`abs()`函数，该函数将数字转换为其绝对值。换句话说，负数会被转换为正数。\n\
    \n如果提交的值不是数字，则不执行任何操作。默认值保持不变。\n\n2. 更改文件名尾缀的函数需要确保该值不包含任何特殊字符。代码如下所示：\n\n```php\n\
    protected function setSuffix($suffix) {\n    if (preg_match('/^\\w+$/', $suffix))\
    \ {\n        if (strpos($suffix, '_') !== 0) {\n            $this->suffix = '_'\
    \ . $suffix;\n        } else {\n            $this->suffix = $suffix;\n       \
    \ }\n    }\n}\n```\n\n这里使用了`preg_match()`，它以正则表达式作为第一个参数，并在作为第二个参数传递的值中搜索匹配项。正则表达式需要包裹在一对匹配的分隔符中——此处使用的是通常的正斜杠。去掉分隔符后，正则表达式如下：\n\
    \n```\n^\\w+$\n```\n\n在此上下文中，脱字符（`^`）告诉正则表达式从字符串开头开始匹配。`\\w`是一个正则表达式标记，匹配任何字母数字字符或下划线。`+`表示匹配前面的标记或字符一次或多次，`$`表示匹配字符串结尾。换句话说，该正则表达式匹配仅包含字母数字字符和下划线的字符串。如果字符串包含空格或特殊字符，则不会匹配。\n\
    \n如果匹配失败，默认的`$suffix`属性保持不变。否则，执行以下条件语句：\n\n```php\nif (strpos($suffix, '_') !==\
    \ 0) {\n```\n"
- fmt: "# The condition equates to `true` if the first character of `$suffix` is *not*\
    \ an underscore. It uses the `strpos()` function to find the position of the first\
    \ underscore. If the first character is an underscore, the value returned by `strpos()`\
    \ is 0. However, if `$suffix` doesn’t contain an underscore, `strpos()` returns\
    \ `false`. As explained in Chapter [4](#332054_4_En_4_Chapter.xhtml), `0` is treated\
    \ by PHP as `false`, so the condition needs to use the “not identical” operator\
    \ (with two equal signs). So, if the suffix doesn’t begin with an underscore,\
    \ one is added. Otherwise, the original value is preserved.\n\n**Caution**  \n\
    Don’t confuse `strpos()` and `strrpos()`. The former finds the position of the\
    \ first matching character. The latter searches the string in reverse.\n\n1. Update\
    \ the `test()` method to display the values of the properties for which you have\
    \ just created setter methods. The revised code looks like this:\n\n```\npublic\
    \ function test() {\n    $details = \n    File: $this->original\n    Original\
    \ width: $this->originalwidth\n    Original height: $this->originalheight\n  \
    \  Base name: $this->basename\n    Image type: $this->imageType\n    Destination:\
    \ $this->destination\n    Max size: $this->maxSize\n    Suffix: $this->suffix\n\
    \nEND;\n    // Remove the indentation of the preceding line in messages) {\n \
    \   print_r($this->messages);\n    }\n}\n```\n\n2. Test the updated class by setting\
    \ the new arguments in `create_thumb.php`, like this:\n\n```\n$thumb = new Thumbnail($_POST['pix'],\
    \ 'C:/upload_test/thumbs', 100, 'small');\n$thumb->test();\n```\n\nAdjust the\
    \ path to `upload_test/thumbs` to match your setup.\n\n3. Save both pages and\
    \ select an image from the list in `create_thumb.php`. You should see results\
    \ similar to those in Figure [10-2](#332054_4_En_10_Chapter.xhtml#Fig2).\n\n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig2_HTML.jpg](images/332054_4_En_10_Chapter/332054_4_En_10_Fig2_HTML.jpg)\n\
    \nFigure 10-2. Verifying that the default values have changed\n\n4. Try a number\
    \ of tests, omitting the trailing slash from the value passed to `setDestination()`\
    \ or selecting a nonexistent folder. Also pass invalid values for the maximum\
    \ size and suffix. An invalid destination folder throws an exception, but the\
    \ others fail silently, using the default value for the maximum size or `_thb`\
    \ for the suffix.\n\nIf necessary, compare your code with `Thumbnail_02.php` in\
    \ `ch10/PhpSolutions/Image` and `create_thumb_03.php` in the `ch10` folder.\n\n\
    You might not agree with my decision to fail silently when the values passed as\
    \ arguments are invalid. By now, though, you should have sufficient experience\
    \ of conditional statements to adapt the code to your own requirements. For example,\
    \ if you want the `setMaxSize()` method to throw an exception instead of failing\
    \ silently, check that the value is greater than zero and add an `else` block\
    \ to handle the error. This is how you would adapt the `setMaxSize()` method:\n\
    \n```\nprotected function setMaxSize($size) {\n    if (is_numeric($size) && $size\
    \ > 0) {\n        $this->maxSize = $size;\n    } else {\n        throw new \\\
    Exception('The value for setMaxSize() must be a positive number.');\n    }\n}\n\
    ```\n\n## PHP Solution 10-3: Calculating the Thumbnail’s Dimensions\n\nThis PHP\
    \ solution adds a protected method to the `Thumbnail` class that will calculate\
    \ the thumbnail’s dimensions. The value set in the `$maxSize` property determines\
    \ the width or height, depending on which is larger. To avoid distorting the thumbnail,\
    \ you need to calculate the scaling ratio for the shorter dimension. The ratio\
    \ is calculated by dividing the maximum thumbnail size by the larger dimension\
    \ of the original image.\n\nFor example, the original image of the Golden Pavilion\
    \ (`kinkakuji.jpg`) is 270 × 346 pixels. If the maximum size is set at 120, dividing\
    \ 120 by 346 produces a scaling ratio of 0.3468. Multiplying the width of the\
    \ original image by this ratio fixes the thumbnail’s width at 94 pixels (rounded\
    \ up to the nearest whole number), maintaining the correct proportions. Figure\
    \ [10-3](#332054_4_En_10_Chapter.xhtml#Fig3) shows how the scaling ratio works.\n\
    \n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig3_HTML.jpg](images/332054_4_En_10_Chapter/332054_4_En_10_Fig3_HTML.jpg)\n\
    \nFigure 10-3. Working out the scaling ratio for a thumbnail image\n\nContinue\
    \ working with your existing class definition. Alternatively, use `Thumbnail_02.php`\
    \ in the `ch10/PhpSolutions/Image` folder.\n\n![../images/332054_4_En_10_Chapter/332054_4_En_10_Fig4_HTML.jpg](images/332054_4_En_10_Chapter/332054_4_En_10_Fig4_HTML.jpg)\n\
    \nFigure 10-4. The class is now generating all the values needed to create the\
    \ thumbnail image\n\n1. Calculating the thumbnail dimensions doesn’t require any\
    \ further user input, so it can be handled by a protected method. Add the following\
    \ code to the class definition.\n\n```\nprotected function calculateRatio($width,\
    \ $height, $maxSize) {\n    if ($width <= $maxSize && $height <= $maxSize) {\n\
    \        return 1;\n    } elseif ($width > $height) {\n        return $maxSize/$width;\n\
    \    } else {\n        return $maxSize/$height;\n    }\n}\n```\n\nThe dimensions\
    \ of the original image and the maximum size are stored as properties of the `Thumbnail`\
    \ object, so, instead of passing them as arguments, you could refer to them inside\
    \ the method as `$this->originalwidth`, `$this->originalheight`, and `$this->maxSize`.\
    \ However, using parameters like this (a technique known as dependency injection)\
    \ makes the code more generic, so it could be used elsewhere.\n\nThe conditional\
    \ statement begins by checking if the width and height of the original image are\
    \ less than or equal to the maximum size. If they are, the image doesn’t need\
    \ to be resized, so the method returns a scaling ratio of 1.\n\nThe `elseif` block\
    \ checks if the width is greater than the height. If it is, the width is used\
    \ to calculate the scaling ratio. The `else` block is invoked if the height is\
    \ greater or both sides are equal. In either case, the height is used to calculate\
    \ the scaling ratio.\n\n2. To test the new method, amend the `test()` method like\
    \ this:\n\n```\npublic function test() {\n    $ratio = $this->calculateRatio($this->originalwidth,\
    \ $this->originalheight, $this->maxSize);\n    $thumbwidth = round($this->originalwidth\
    \ * $ratio);\n    $thumbheight = round($this->originalheight * $ratio);\n    $details\
    \ = \n    File: $this->original\n    Original width: $this->originalwidth\n  \
    \  Original height: $this->originalheight\n    Base name: $this->basename\n  \
    \  Image type: $this->imageType\n    Destination: $this->destination\n    Max\
    \ size: $this->maxSize\n    Suffix: $this->suffix\n    Thumb width: $thumbwidth\n\
    \    Thumb height: $thumbheight\n\nEND;\n    // Remove the indentation of the\
    \ preceding line in messages) {\n    print_r($this->messages);\n    }\n}\n```\n\
    \nThis calls the new method, passing the `$originalwidth`, `$originalheight`,\
    \ and `$maxSize` properties as arguments. The resulting scaling ratio is then\
    \ used to calculate the width and height of the thumbnail. The calculation is\
    \ passed to the `round()` function to convert the result to the nearest integer.\
    \ The calculations will need to be moved out of the `test()` method, but it’s\
    \ important to check first that we’re getting the expected results.\n\n3. Test\
    \ the updated class by selecting an image in `create_thumb.php` and clicking `Create\
    \ Thumbnail`. You should see the values displayed onscreen, as shown in Figure\
    \ [10-4](#332054_4_En_10_Chapter.xhtml#Fig4).\n\nIf necessary, check your code\
    \ against `Thumbnail_03.php` in the `ch10` folder.\n\n## Using GD functions to\
    \ create a Scaled Copy of an image"
