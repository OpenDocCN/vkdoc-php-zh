  raw: 'To ensure this project’s success, you need to come up with a smart way to
    implement what you have signed the contract for. You want to develop the project
    smoothly and quickly, but the ultimate goal is to make sure the client is satisfied
    with your work. Consequently, you should aim to provide your site’s increasing
    number of visitors with a positive web experience by creating a pleasant, functional,
    and responsive web site.


    The requirements are high, but this is normal for an e-commerce site today. To
    maximize the chances of success, we’ll analyze and anticipate as many of the technical
    requirements as possible, and implement solutions in a way that supports changes
    and additions with minimal effort.


    This chapter lays down the foundations for the future HatShop web site. We will
    talk about the technologies and tools you’ll use, and even more importantly, how
    you’ll use them.


    Your goals for this chapter are to


    • Analyze the project from a technical point of view


    • Analyze and choose an architecture for your application **13**


