    **Functions for Resetting Passwords**


    There are two functions we need to add to DatabaseObject_User to implement the
    password resetting. The first is called fetchPassword(), which does the following:
    **1.** Generates a new password using Text_Password.


    **2.** Writes the new password to the user profile.


    **3.** Writes the current date and time to the user profile, so we can ensure
    the new password can only be confirmed within one day.


    **4.** Generates a key that must be supplied by the user to confirm their new
    password. We also write this to the user profile.


    **5.** Saves the profile.


    **6.** Sends an e-mail to the user using the fetch-password.tpl e-mail template
    (separate from the fetchpassword.tpl page template created previously).


    The second function we will add is called confirmNewPassword(), which confirms
    the user’s new password after they click the link in the e-mail sent to them.
    This function works as follows:


    **1.** Checks that the new password, timestamp, and confirmation key exist in
    the profile.


    **2.** Checks that the confirmation is taking place within a day of the stored
    timestamp.


    **3.** Checks that the supplied key matches the key stored in the user profile.


    **4.** Updates the user record to use the new password.


    **5.** Removes the values from the profile.


    **6.** Saves the user (which will also save the profile).


