    This error indicates that the system is missing some functionality required to
    compile PHP. In this case it''s the bison library. This can be installed with
    the following command: $ yum install bison


    After that we can run the configure script again and look for more errors. This
    will be the missing libxml2 library. By default PHP includes support for SimpleXML
    and other XML extensions. Installing the library alone is not quite enough. The
    system require both the library and the header and other files needed to link
    against so the command to install looks like this:


    $ yum install libxml2-devel


    In this example the configure script was used without any options. If options
