    also has the added task of dealing with WHERE clauses, since most updates are
    done on specific sets of database rows. Failure to specify a valid WHERE clause,
    on an UPDATE


    query, will lead to all rows in the table being updated with the same data.


    It also takes into account the LIMIT clause, so that updates can be limited to
    a finite amount of records that match the WHERE clause. It is always good to set
    a limit of table updates, in case your WHERE clause is missing, or targets more
    than the amount of rows you were intending for it to target.


    The _buildDelete() method does everything the _buildUpdate() method does, and
    nothing that the _buildInsert() method does. This is because there is no row data
    to take into account except for whatever the WHERE clauses target. It is also
    recommended that you always use the LIMIT clause on row deletions, as you might
    be deleting more rows than you intend to target.


    These four methods perform the bulk of the required work, but we can simplify
    their use with the methods shown in Listing 9-11.


