- "# 在模块中使用 Drupal 的 API\n\n**作者：Benjamin Melançon**\n\n为 Drupal 制作模块的本质在于使用 Drupal\
  \ 为你提供的工具。API 是应用程序编程接口的缩写，通俗地说，它意味着代码之间拥有明确定义的通信方式。本章将围绕构建第 18 章中介绍的 X-ray 模块，专门介绍\
  \ Drupal 提供的 API（即钩子和函数）。当模块的每个功能都需要使用 Drupal API 工具箱中的另一个工具时，我将介绍并应用它。\n\n截至本文撰写时，Drupal\
  \ 核心提供了 **251** 个钩子。本章涵盖了一些最常用的钩子。尽管钩子是这场大戏的主角，但它只是你可用工具集的一部分。Drupal 优秀的实用函数构成了绝佳的辅助阵容。这些函数也属于\
  \ Drupal API 的组成部分。\n\n本章构建的模块大致基于 Zoë Neill-St. Clair 在贡献模块创意小组（`groups.drupal.org/contributed-module-ideas`）上发布的建议。她提议开发一个模块，用于提供\
  \ Drupal 站点的技术摘要，展示内容类型之间的关系以及 Drupal 中生成每个页面的来源。你目前还不知如何实现，但你知道这是可以做到的；剩下的工作就是填充细节。\n\
  \n在本章中，你将看到使用 Drupal 提供的钩子和函数的说明与示例。这些内容将在构建一个完整模块的过程中逐一涵盖，具体包括：\n\n- 修改表单。\n- 本地化（提供可翻译的用户界面）。\n\
  - 使模块可主题化并设置模块样式。\n- 使用 `hook_menu()` 创建页面。\n- 使用和定义权限。\n- 利用数据库抽象层检索和存储数据。\n\n\n\
  \n### 修改表单\n\n改变表单的任何内容都需要用到我最钟爱的钩子：`hook_form_alter()`。无论你是想修改表单元素、调整表单元素的顺序、完全移除某些内容，还是添加新内容，这个钩子都能满足你的需求。它有两种变体：原始的通用\
  \ `hook_form_alter()`，它会作用于 Drupal 输出的每一个表单；以及遵循 `hook_form_FORM_ID_alter()` 模式的任意数量钩子，这些钩子专门针对特定表单。\n\
  \n一如既往，你可以在 `api.drupal.org` 上找到任何函数或钩子的文档，因此对于这个钩子，只需输入 `api.drupal.org/hook_form_alter`。`hook_form_alter()`\
  \ 实现接收的第一个参数是代表表单的嵌套数组。这个钩子之所以如此强大，是因为 Drupal 在渲染和处理表单时，会将所有关于表单的信息都存储在这个数组中，因此你做出的任何更改都能干净地影响表单，而不仅仅是表面上的改动。\n\
  \n表单元素的详细文档可在 `api.drupal.org/api/drupal/developer--topics--forms_api_reference.html/7`\
  \ 查阅。（为方便起见，我会从 `dgd7.org/forms` 链接到本文档和相关文档。）幸运的是，要开始修改表单，你无需了解所有可能的表单元素——只需查看你选择要修改的表单中已有的元素即可。\n\
  \n这是 `hook_form_alter()` 的另一个优点：你在处理其他表单时学到的一切，在构建自己的表单时也同样适用。无论是创建新表单还是向现有表单添加内容，表单元素的定义方式完全相同。\n\
  \n提醒一下，你在第 18 章 中开始的 X-ray 模块会打印站点上每个表单的表单标识符。这次我不再仅仅展示代码，而是会解释要编写哪些代码。将代码清单 19-1\
  \ 中的代码添加到 `xray.module` 文件中（如果你已经定义了 `xray_form_alter()`，则只需在其中添加调试行——PHP 中不能有两个同名函数）。\n\
  \n**代码清单 19-1.** X-ray 模块对 `hook_form_alter()` 的实现，仅包含调试语句\n\n```\n/**\n * 实现 hook_form_alter()。\n\
  \ */\nfunction xray_form_alter(&$form, &$form_state, $form_id) {\n  debug($form,\
  \ $form_id, TRUE);\n}\n```\n\n![images](img/square.jpg) **提示** 首次创建任何 `modulename_form_alter()`\
  \ 或 `modulename_form_FORM_ID_alter()` 函数后，*请清除缓存*。例如，你可以使用 Drupal shell 命令 `drush\
  \ cc all` 来完成此操作。（有关功能强大且便捷的 Drush 的更多信息，请参见第 26 章。）\n\n`debug()` 函数可以接受任何变量，包括对象或数组（例如你的表单），并将其打印到屏幕上。如果你没有看到任何调试输出，可能是某些东西干扰导致（例如\
  \ Devel 模块的回溯日志记录选项被选中时可能发生这种情况），而不是因为你的代码未运行（例如由于模块未启用、钩子名称格式错误或缓存尚未清除）。你可以在代码中添加一行\
  \ `exit('Show me a sign');`（并附带你选择的状态文本），作为一种快速检查代码是否被运行的方法。\n\n![images](img/square.jpg)\
  \ **提示** Drupal 7 引入了 `debug()` 函数，这在开发（或调试）时非常方便。要使用它，你可以将任何变量或输出生成函数作为第一个参数，然后可选地添加一个标签，以帮助你跟踪\
  \ `debug()` 的多次使用。例如，`debug($user, 'User object');` 会打印 `$user` 变量的内容，在 Drupal 的大部分地方，该变量是一个代表当前登录用户的对象。\n\
  \n访问任何包含表单的页面（如果启用了搜索模块和搜索块，则每个公开页面都包含表单），都会为每个表单打印一条消息，其中包含所有表单元素（它们本身也是数组）的数组，这些元素既包括可见的也包括隐藏的。然而，表单中看起来始终可能令人感兴趣的部分只有表单\
  \ ID，它在代码清单 19-1 中作为表单数组的标签被打印出来。\n\n对于你要添加到表单的说明性内容，不应使用可被提交的表单元素类型。通常仅用于显示的 `#type`\
  \ 是 `'markup'`（并且由于如果未定义 `#type`，`'markup'` 是回退类型，因此不必显式声明）。\n\n![images](img/square.jpg)\
  \ **提示** Drupal 7 中的新增功能，默认 `#type` 为 `'markup'` 的表单元素的输出必须通过 `#markup` 属性提供，如下所示：`$form['just_for_show']\
  \ = array('#markup' => t('Form, not function.'));`。\n\n然而，Drupal 提供了另一种表单元素类型 `'item'`，它也用于静态标记，但包含了真实表单元素的特性，例如\
  \ `#title` 和 `#description` 属性。你将使用这个仅包含信息的表单项来在每个表单顶部打印表单 ID（参见代码清单 19-2）。\n\n\
  **代码清单 19-2.** 实现 `hook_form_alter()` 以向每个表单添加仅包含标记的项目\n\n```\n/**\n * 实现 hook_form_alter()。\n\
  \ */\nfunction xray_form_alter(&$form, &$form_state, $form_id) {\n  $form['xray_display_form_id']\
  \ = array(\n    '#type' => 'item',\n    '#title' => t('表单 ID'),\n    '#markup' =>\
  \ $form_id,\n    '#theme_wrappers' => array('container__xray__form'),\n    '#attributes'\
  \ => array('class' => array('xray')),\n    '#weight' => -100,\n  );\n}\n```\n\n\
  ![images](img/square.jpg) **注意** 在开发过程中，使用 `#prefix` 和 `#suffix` 进行标记是一种快捷方式；事实上，此表单元素最初并不是用\
  \ `#theme_wrappers` 和 `#attributes` 构建的，而是简单地使用了 `'#prefix' => '<div class=\"xray\"\
  >'` 和 `'#suffix' => '</div>'`，但在一个完成的模块中不应使用这种方式。（你可以在 X-ray 模块的仓库中看到修正：`drupalcode.org/project/xray.git/commit/839927e`）。有关发现过程，请参见第\
  \ 33 章，但本例中使用的替代属性是 `'#theme_wrappers' => array('container__xray__form')` 和 `'#attributes'\
  \ => array('class' => array('xray'))`。它们与手动添加的前缀和后缀具有相同的 HTML 输出，但消除了标记不匹配的风险（例如缺少闭合的\
  \ `</div>`）。更重要的是，它们允许主题制作者更改标记，而无需尝试重新修改表单。在主题包装器 `container__xray__form` 中，“xray”和“form”前面的双下划线意味着对于覆盖容器标记的主题函数来说，它们是可选的。如果存在名为\
  \ `THEME_container__xray__form()` 或 `THEME_container__xray()` 的主题函数（其中 `THEME` 是主题的名称），则会使用它；否则，将使用\
  \ `THEME_container()`。如果没有主题函数覆盖它，请参阅 `api.drupal.org/theme_container` 了解将包装器主题化到此表单元素的函数。如何使你的模块支持主题化将在本章后面介绍。\n\
  \n`#markup` 属性会将其值直接打印到 HTML 中，因此你需要确保传递给函数的参数在 HTML 中是安全的。大多数情况下，`$form_id` 是一个\
  \ PHP 标识符，只能包含数字、字母和下划线，因此它在任何 HTML 上下文中都被认为是安全的；在极少数其他情况下，模块作者有责任不允许未经过滤的用户输入成为\
  \ `$form_id`。Drupal 核心本身会将 `$form_id` 作为隐藏变量打印在表单 HTML 中。\n\n较大的负权重值（-100）确保了在几乎所有可预见的表单中，这个新增的表单元素都会被打印在顶部。\n\
  \n\n\n#### **注意** 表单 API 是 Drupal 中一个非常重要的 API。当人们可能期望有一个特殊的 API 让模块出于特定原因相互通信时，Drupal\
  \ 有时会依赖其强大的表单 API 来引入新功能。Node 模块通过实现一个表单修改钩子，基于内容类型增强了 Block 模块的区块可见性。在 `node.module`\
  \ 中，函数 `node_form_block_admin_configure_alter()` 是 `hook_form_FORM_ID_alter()` 的一个实现，其中\
  \ `block_admin_configure` 是所修改表单的 ID，符合那种表单模式。类似地，Open ID 模块使用 `openid_form_user_login_alter()`\
  \ 或 `openid_form_user_login_block_alter()`（分别针对主 `user_login` 表单或 `user_login_block`\
  \ 表单）来修改登录表单。\n\n### 使用 `t()` 和 `format_plural()` 进行本地化\n\n在 `form_alter()` 的实现中，有一个函数很容易被忽略，因为它只有一个字符长：`t()`。*t*\
  \ 代表 *translate*（翻译），而 `t()` 函数是 Drupal 中使用最频繁的函数。它是本地化系统的一部分，该系统使得翻译 Drupal 用户界面成为可能——即\
  \ Drupal 由代码生成的部分，而非用户编写的内容。这个可翻译的用户界面应包括你在任何一个模块中放置的所有文本。在大多数情况下，这意味着所有这些文本都应该包裹在\
  \ `t()` 函数中。\n\n#### **注意** 用于翻译内容（网站用户所写的文字）的工具通常被称为*国际化（internationalization）*，并且不属于\
  \ Drupal 核心。Drupal 中由管理员定义的文字的灰色地带（例如站点名称和标语；欢迎消息；以及菜单、某些分类法和内容类型名称等结构）也属于国际化的范畴，并且这也是翻译最难（呃，最有趣）的地方。在编写模块时，这些形式的翻译通常不是你需要关心的，你只需要关心本地化。在\
  \ Drupal 的讨论甚至模块名称中，本地化常被缩写为 *l10n*，而国际化则被缩写为 *i18n*。（这些缩写来自每个单词的第一个字母和最后一个字母，以及中间字母的数量。）目前针对这两项任务的资源列表可以在\
  \ `dgd7.org/translate` 找到。\n\n这一点可能显而易见，但只有你编写的文本才能提前被翻译，以便下载你模块的人可以使用（如果你或其他人花时间进行翻译的话）。而由用户或管理员修改并由你的模块输出的文本——任何无法提前预知的内容——则不应包裹在翻译函数中。此外，不要尝试翻译变量。以\
  \ X-ray 模块为例，报告页面上的副标题 `t('Content summary')` 就是一个经典例子。用于翻译的字符串总是用英文编写；如果你能立即为你的模块提供另一种语言的翻译，那当然很棒！但是，你代码中的文本必须是英文的，这样所有本地化工作才能从同一个基础开始。\n\
  \n这很直截了当。当你可以为字符串中不应翻译的部分使用占位符时，情况就变得更有趣了。当你使用占位符数组时，`t()` 函数内置了安全性，用于显示这些（潜在的）用户提交的数据。你会看到这一用法贯穿本章的示例——以\
  \ `@` 开头的占位符用于对变量进行净化处理，`%` 用于净化并强调，而 `!` 用于在不进行任何安全检查或修改的情况下插入（顺便提一下，只有当你确定来源安全时（绝不来自用户）或已经转义之后，才可以使用\
  \ `!` 占位符）。关于这些占位符的详细文档在 `api.drupal.org/t`。以下代码展示了 `%` 强调占位符的使用：`%func` 被替换为数组中\
  \ `%func` 键对应的已净化值（即 `$page_callback` 变量与一对括号拼接的结果），并包裹在 `<em>` 标签中：\n\n```\n$output\
  \ = t('the function %func', array('%func' => $page_callback . '()'));\n```\n\n当你需要根据所讨论项目的数量（单数或复数）来改变文本时，Drupal\
  \ 也提供了一个函数给你，那就是 `format_plural()`。请注意，`t()` 函数在它内部被使用（参见 列表 19–3）。\n\n**列表 19–3.**\
  \ 使用 `format_plural()` 函数\n\n```\n  $output .= format_plural(\n    xray_stats_content_type_total(),\n\
  \    'The site has one content type.',\n    'The site has @count content types.'\n\
  \  );\n```\n\n`format_plural()` 函数的第一个参数是一个数字。这个数字应该始终是一个整数（当然是一个会变化的整数，因为如果你已经知道它是单数还是复数，你完全可以相应地直接编写文本字符串）。在这个例子中，这个数字由你的函数\
  \ `xray_stats_content_type_total()` 提供。第二个参数是当第一个参数给出的数字恰好为 1 时要使用的字符串；第三个参数是当数字为\
  \ 2 或更多（或为 0）时要使用的字符串。`@count` 占位符（即第一个参数提供的数字）在两个字符串中始终可用，但你也可以在第四个参数中通过数组提供更多的占位符和值（就像为\
  \ `t()` 函数提供参数一样）。\n\n\n\n### 寻找实现所需功能的 Drupal 函数\n\n寻找实现所需功能的函数通常分三步：先找到与你想实现功能相似或展示了你感兴趣信息的页面，再查找生成该页面的函数，最后深入该函数查看其调用的其他函数。\n\
  \n以下示例并非最简洁（本书采用真实案例而非虚构场景，正是为了展示这类方法在实际应用中的效果），但请不要因为追踪函数需要花费篇幅而却步。基本步骤确实简单到只需三步！\n\
  \n1.  确定一个能生成类似你所需输出的页面。\n2.  查找该页面菜单项对应的 `page callback` 函数。\n3.  查看 `page callback`\
  \ 函数中使用了哪些函数（或执行了哪些数据库查询）。\n\n![images](img/square.jpg) **提示** 可按照类似流程查看 Drupal\
  \ 如何生成指定区块；参见 `dgd7.org/233`。\n\n你希望展示主题信息的摘要。如同之前一样，你可以直接查询数据库获取信息（主题和模块都在 `system`\
  \ 表中）。但无论何时，只要能使用 Drupal 已提供的函数，即使只是拉取数据，也应当避免重复造轮子。在编写自己的数据库查询之前，应尽力寻找能实现所需功能的函数。\n\
  \n通过查找操作你关注的数据表的代码，是发现这类函数的好方法。即使已知主题位于 `system` 表中，直接搜索代码中的 `system` 一词也帮不上太大忙。仅\
  \ `system.module` 文件就有近 4000 行代码。需要更精确的方法来定位与主题信息列表相关的函数。\n\n这就是为什么要在 Drupal 中寻找一个与你目标功能相似的页面。尤其在\
  \ Drupal 核心中，这通常是一个管理页面。浏览 Drupal 的管理区寻找主题列表，很快就能找到：管理 ![images](img/U001.jpg) 外观（`admin/appearance`）页面似乎列出了所有主题！\n\
  \n借助调试器（参见 `dgd7.org/ide`），你可以监控该页面加载时调用的所有函数。即使不使用调试器，有时也能更快完成，通常只需两步：首先找到加载页面的菜单项，其次查看菜单项调用的函数。你可以通过搜索\
  \ Drupal 代码中该页面的路径来定位菜单项。\n\n访问外观管理页面（`admin/appearance`）时，你会看到已启用和可用的主题。路径由 `hook_menu()`\
  \ 的实现提供，钩子实现通常位于 `.module` 文件中。由于该页面由 Drupal 核心提供，你可以将搜索范围限制在顶层模块文件夹，例如：\n\n`grep\
  \ -nHR --include=*.module 'admin/appearance' modules`\n\n使用强大的命令行文本搜索工具 `grep` 进行搜索会返回多个匹配行，但以下这行正是你需要的：\n\
  \n***\n\n`modules/system/system.module:590:  $items['admin/appearance'] = array(`\n\
  \n***\n\n现在进入第二步：顺着代码找到这个函数。你知道了函数所在的文件（`modules/system/system.module`）和行号（590）。`$items`\
  \ 表示这是菜单定义的一部分（`hook_menu()` 的实现应返回一个菜单项数组）。搜索输出已告知了位置，于是你打开 `system.module` 亲自查看（参见\
  \ 列表 19–4）。\n\n***列表 19–4.** `system.module` 中第 590 行的 `admin/appearance` 路径定义*\n\
  \n```\n  // 外观。\n  $items['admin/appearance'] = array(\n    'title' => '外观',\n \
  \   'description' => '选择并配置你的主题',\n    'page callback' => 'system_themes_page',\n\
  \    'access arguments' => array('administer themes'),\n    'position' => 'left',\n\
  \    'weight' => -6,\n    'file' => 'system.admin.inc',\n  );\n```\n\n菜单项非常有用，因为它们明确告诉你页面由什么构成以及在哪里实现。`page\
  \ callback` 是生成页面的函数，而 `file`（如果指定）则表示该函数所在的文件。本例中，文件为 `system.admin.inc`。如果未指定文件，则\
  \ `page callback` 函数与 `hook_menu()` 的实现位于同一个 `.module` 文件中。\n\n因此，转到 `system.admin.inc`，查找\
  \ `system_themes_page()` 函数。果然，在该函数开头，它调用了 `system_rebuild_theme_data()` 来获取主题列表。\n\
  \n但且慢，这应该能行……不过仅从函数名来看，似乎有些大材小用了。重建主题数据？你只是想知道有哪些主题！可以再深入查看该函数，评估它是否适合使用。\n\n在函数\
  \ `system_rebuild_theme_data()` 内部，它调用了内部函数 `_system_rebuild_theme_data()`（注意前导下划线表示这不是供任何模块使用的公开函数）。你可以在代码中查找此函数，也可以查阅\
  \ Drupal API 网站 `api.drupal.org/api/function/_system_rebuild_theme_data/7`。查阅后者后你会发现，它恰好被两个函数调用。其中之一正是\
  \ `system_rebuild_theme_data()`（你正是通过它找到的）。另一个是 `list_themes()`，功能上与 `system_rebuild_theme_data()`\
  \ 等效，但名字更直观。（已在 `drupal.org/node/941980` 提交了一个问题，以减少 Drupal 8 中的代码重复。）\n\n![images](img/square.jpg)\
  \ **注意** `list_themes()` 函数还具有静态缓存功能；如果在一次页面加载中被调用两次，第二次调用几乎不消耗资源。大多数具有静态缓存的函数，都可以通过函数顶部类似\
  \ `list_themes()` 中的一行代码轻松识别：\n\n```\n$list = &drupal_static(__FUNCTION__, array());\n\
  ```\n\n\n\n### 探究函数返回的内容\n\n现在你已经有了一个函数 `list_themes()`，它……用于列出主题。X-ray 需要提供一个摘要，说明网站上存在多少主题、哪些主题已启用，以及任何对站点管理员可能有用的其他信息。\n\
  \n在调试器中观察“外观”管理页面的加载过程，可以让你查看 `_system_rebuild_theme_data()` 返回的变量，如前所述，该变量是 `list_themes()`\
  \ 所输出一切数据的来源。或者，你也可以创建一个测试 PHP 文件，引导 Drupal 启动并打印 `list_themes()` 的输出。又或者，既然你已经在开发一个模块，可以在代码中插入一个\
  \ `debug()` 调用。我们就采用最后一种方法；请参见清单 19-5。\n\n**清单 19-5.** 在 X-ray 模块存根函数中使用 `debug()`\
  \ 打印 `list_themes()` 的数据\n\n```\n/**\n * 实现 hook_help()。\n */\nfunction xray_help($path,\
  \ $arg) {\n  switch ($path) {\n// ...\n    case 'admin/appearance':\n      return\
  \ _xray_help_admin_appearance();\n// ...\n  }\n}\n\n/**\n * admin/appearance 页面的帮助文本。\n\
  \ */\nfunction _xray_help_admin_appearance() {\n  debug(list_themes());\n}\n```\n\
  \n重要的新增内容已用粗体标出——`debug(list_themes());`。其余部分是我们的老朋友 `hook_help()` 的摘录，它在有人访问“外观”管理页面（路径为\
  \ `admin/appearance`）时调用一个函数。这个函数 `_xray_help_admin_appearance()` 目前只是一个存根，里面除了你的调试代码之外什么都没有。\n\
  \n关于主题的信息非常冗长，因此请查看你自己的输出，或参考 `dgd7.org/145` 以获取完整结果。在使用 Drupal 进行开发时，你必须习惯处理巨大的嵌套数组（参见清单\
  \ 19-6）。\n\n**清单 19-6.** 从函数 `list_themes()` 的输出中摘录的 Bartik 主题信息\n\n```\nDebug:\n\
  \narray (\n  'bartik' =>\n  stdClass:__set_state(array(\n     'filename' => 'themes/bartik/bartik.info',\n\
  \     'name' => 'bartik',\n     'type' => 'theme',\n     'owner' => 'themes/engines/phptemplate/phptemplate.engine',\n\
