    \ out how many records were retrieved\n$numRows = $result->fetchColumn();\n//\
    \ free the database resource\n$result->closeCursor();\n}\n```\n\nThis uses the\
    \ SQL `COUNT()` function  with an asterisk to\ncount all items in the table. There’s\
    \ only one result, so it can be\nretrieved with the `fetchColumn()` method,\n\
    which gets the first column from a database result. After storing the\nresult\
    \ in `$numRows`, you must\ncall the `closeCursor()` method\nto free the database\
    \ resource for any further queries.\n\nPHP Solution 13-5: Displaying the Images\
    \ Table Using\nPDO\nTo display the results of a `SELECT` query with\nPDO, you\
    \ can use the `query()` method in a\n`foreach` loop to\nextract the current row\
    \ as an associative array. Each element in the\narray is named after the corresponding\
    \ column in the table.\n\nContinue working with the same file as in the previous\
    \ PHP solution.\n\n1.  Copy utility_funcs.php from the ch13 folder to the includes\n\
    \    folder, and include it at the top of the script:\n\n```\n    require_once\
    \ '../includes/connection.php';\n    require_once '../includes/utility_funcs.php';\n\
    \    ```"
  trans: "\n# PHP 解决方案 13-3：使用 MySQLi 显示 `images` 表\n\n显示 `SELECT` 查询结果最常用的方法是使用循环每次从结果集中提取一行。`MySQLi_Result`\
    \ 有一个名为 `fetch_assoc()` 的方法，它可以将当前行作为关联数组提取出来，以便在网页中显示。数组中的每个元素都以表中相应的列名命名。\n\n\
    本 PHP 解决方案演示了如何遍历 `MySQLi_Result` 对象来显示 `SELECT` 查询的结果。继续使用 PHP 解决方案 13-2 中的文件。\n\
    \n1.  将 `utility_funcs.php` 从 `ch13` 文件夹复制到 `includes` 文件夹，并将其包含在脚本顶部：\n\n   \
    \ ```php\n    require_once '../includes/connection.php';\n    require_once '../includes/utility_funcs.php';\n\
    \    ```\n\n2.  删除页面主体中 `else` 块末尾的右花括号（它应该在第 24 行左右）。虽然显示 `images` 表的大部分代码是 HTML，但它需要位于\
    \ `else` 块内部。\n\n3.  在 PHP 结束标记后插入一个空行，并在下一行的一个单独的 PHP 代码块中添加右花括号。修改后的代码应如下所示：\n\
    \n    ```php\n    } else {\n    echo \"共找到 $numRows 条记录。\";\n    ?>\n    ```\n\
    \n4.  在 `mysqli.php` 主体中的两个 PHP 块之间添加下表，使其受 `else` 块控制。这样做是为了防止 SQL 查询失败时出现错误。显示结果集的\
    \ PHP 代码以粗体显示。\n\n    ```php\n    image_id\n    filename\n    caption\n\n    fetch_assoc())\
    \ { ?>\n    ```\n\n**提示** `while` 循环遍历数据库结果，使用 `fetch_assoc()` 方法将每条记录提取到 `$row`\
    \ 中。`$row` 的每个元素都显示在表格单元格中。循环会一直持续，直到 `fetch_assoc()` 到达结果集的末尾。\n\n由于 `image_id`\
    \ 存储在仅包含整数的列中，因此无需对其进行清理。\n\n5.  保存 `mysqli.php` 并在浏览器中查看。您应该会看到 `images` 表的内容显示如下截图所示：\n\
    \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figf_HTML.jpg](img/332054_4_En_13_Figf_HTML.jpg)\n\
    \n如有必要，您可以将代码与 `ch13` 文件夹中的 `mysql_02.php` 进行比较。\n\n## MySQLi 连接速查表\n\n表 13-1\
    \ 总结了 MySQLi 的连接和数据库查询的基本细节。\n\n**表 13-1.** 使用 MySQL 改进的面向对象接口连接到 MySQL/MariaDB\n\
    \n| 操作 | 用法 | 说明 |\n| --- | --- | --- |\n| 连接 | `$conn = new mysqli($h,$u,$p,$d);`\
    \ | 所有参数都是可选的；但在实践中始终需要前四个：主机名、用户名、密码、数据库名。创建连接对象。 |\n| 选择数据库 | `$conn->select_db('dbName');`\
    \ | 用于选择不同的数据库。 |\n| 提交查询 | `$result = $conn->query($sql);` | 返回结果对象。 |\n| 统计结果数\
    \ | `$numRows = $result->num_rows;` | 返回结果对象中的行数。 |\n| 提取记录 | `$row = $result->fetch_assoc();`\
    \ | 将结果对象中的当前行提取为关联数组。 |\n| 提取记录 | `$row = $result->fetch_row();` | 将结果对象中的当前行提取为索引（编号）数组。\
    \ |\n\n# PHP 解决方案 13-4：统计结果集中的记录数（PDO）\n\nPDO 没有与 MySQLi 的 `num_rows` 属性直接对应的功能。对于大多数数据库，您需要执行一条\
    \ SQL 查询来统计表中的项目数，然后获取结果。然而，PDO 的 `rowCount()` 方法在 MySQL 和 MariaDB 中具有双重用途。通常，它只报告插入、更新或删除记录所影响的行数，但在\
    \ MySQL 和 MariaDB 中，它也会报告 `SELECT` 查询找到的记录数。\n\n1.  在 `phpsols-4e` 站点中创建一个名为 `pdo`\
    \ 的新文件夹。然后，在刚创建的文件夹中创建一个名为 `pdo.php` 的文件。该页面最终将用于显示一个表格，因此它应该包含一个 `DOCTYPE` 声明和\
    \ HTML 骨架。\n\n2.  在 `DOCTYPE` 声明上方的 PHP 代码块中包含连接文件，然后使用只读账户创建到 `phpsols` 数据库的\
    \ PDO 连接，如下所示：\n\n    ```php\n    require_once '../includes/connection.php';\n\
    \    $conn = dbConnect('read', 'pdo');\n    ```\n\n3.  接下来，准备 SQL 查询：\n\n    ```php\n\
    \    $sql = 'SELECT * FROM images';\n    ```\n\n    这意味着“选择 `images` 表中的每条记录”。星号（`*`）是“所有列”的简写。\n\
    \n4.  现在执行查询并将结果存储在变量中，如下所示：\n\n    ```php\n    $result = $conn->query($sql);\n\
    \    ```\n\n5.  要检查查询是否存在问题，可以使用连接对象的 `errorInfo()` 方法从数据库中获取错误信息数组。如果出现问题，数组的第三个元素包含问题的简要描述。添加以下代码：\n\
    \n    ```php\n    $error = $conn->errorInfo()[2];\n    ```\n\n    我们只关心第三个元素，因此可以使用在\
    \ PHP 解决方案 7-1（“获取文本文件的内容”）中遇到的数组解引用技术：在 `$conn->errorInfo()` 调用的右侧直接添加方括号内的数组索引，并将值赋给\
    \ `$error`。\n\n6.  如果查询执行成功，`$error` 将为 `null`，PHP 将其视为 `false`。因此，如果没有错误，我们可以通过调用\
    \ `$result` 对象的 `rowCount()` 方法来获取结果集中的行数，如下所示：\n\n    ```php\n    if (!$error)\
    \ {\n    $numRows = $result->rowCount();\n    }\n    ```\n\n7.  现在可以在页面主体中显示查询结果，如下所示：\n\
    \n    ```php\n    $error\";\n    } else {\n    echo \"共找到 $numRows 条记录。\";\n \
    \   }\n    ?>\n    ```\n\n8.  保存页面并在浏览器中加载。您应该会看到与 PHP 解决方案 13-2 的第 8 步相同的结果。如有必要，请对照\
    \ `pdo_01.php` 检查您的代码。\n\n## 在其他数据库中使用 PDO 统计记录数\n\n使用 PDO 的 `rowCount()` 来报告\
    \ `SELECT` 查询找到的项目数适用于 MySQL 和 MariaDB，但不能保证在所有其他数据库上都能工作。如果 `rowCount()` 不起作用，请改用以下代码：\n\
    \n```php\n// 准备 SQL 查询\n$sql = 'SELECT COUNT(*) FROM images';\n// 提交查询并捕获结果\n\
    $result = $conn->query($sql);\n$error = $conn->errorInfo()[2];\nif (!$error) {\n\
    // 找出检索到的记录数\n$numRows = $result->fetchColumn();\n// 释放数据库资源\n$result->closeCursor();\n\
    }\n```\n\n这使用了带星号的 SQL `COUNT()` 函数来统计表中的所有项目。只有一个结果，因此可以使用 `fetchColumn()` 方法检索它，该方法从数据库结果中获取第一列。将结果存储在\
    \ `$numRows` 中后，必须调用 `closeCursor()` 方法来释放数据库资源，以便进行进一步的查询。\n\n# PHP 解决方案 13-5：使用\
    \ PDO 显示 images 表\n\n要使用 PDO 显示 `SELECT` 查询的结果，可以在 `foreach` 循环中使用 `query()` 方法将当前行提取为关联数组。数组中的每个元素都以表中相应的列名命名。\n\
    \n继续使用与上一个 PHP 解决方案相同的文件。\n\n1.  将 `utility_funcs.php` 从 `ch13` 文件夹复制到 `includes`\
    \ 文件夹，并将其包含在脚本顶部：\n\n    ```php\n    require_once '../includes/connection.php';\n\
    \    require_once '../includes/utility_funcs.php';\n    ```\n"
- fmt: "2.  Remove the closing curly brace at the end of the `else` block in the body\
    \ of the page (it should be around line 26). Although most of the code to display\
    \ the `images` table is HTML, it needs to be inside the `else` block.\n\n3.  Insert\
    \ a blank line after the closing PHP tag, then add the closing brace on the next\
    \ line in a separate PHP block. The revised code should look like this:\n\n```\n\
    \    } else {\n    echo \"A total of $numRows records were found.\";\n    ?>\n\
    \n```\n\n4.  Add the following table between the two PHP blocks in the main body\
    \ of `pdo.php` so that it’s controlled by the `else` block. This is to prevent\
    \ errors if the SQL query fails. The PHP code that displays the result set is\
    \ displayed in bold.\n\n```\n\nimage_id\n    filename\n    caption\n\nquery($sql)\
    \ as $row) { ?>\n\n```\n\n5.  Save the page and view it in a browser. It should\
    \ look like the screenshot in PHP Solution 13-3\\. You can compare your code against\
    \ `pdo_02.php` in the `ch13` folder.\n\n## PDO connection Crib Sheet\n\nTable\
    \ [13-2](#332054_4_En_13_Chapter.xhtml#Tab2) summarizes the basic details of connection\
    \ and database queries with PDO. Some commands will be used in later chapters,\
    \ but are included here for ease of reference.\n\n**Table 13-2.** Database connection\
    \ with PDO\n\n| Action | Usage | Comments |\n| --- | --- | --- |\n| Connect |\
    \ `$conn = new PDO($DSN,$u,$p);` | In practice, requires three arguments: data\
    \ source name (DSN), username, password. Must be wrapped in try/catch block. |\n\
    | Submit `SELECT` query | `$result = $conn->query($sql);` | Returns results as\
    \ a `PDOStatement` object. |\n| Extract records | `foreach($conn->query($sql)\
    \ as $row) {` | Submits `SELECT` query and gets current row as associative array\
    \ in a single operation. |\n| Count results | `$numRows = $result->rowCount()`\
    \ | In MySQL/MariaDB, returns number of results from `SELECT`. Not supported in\
    \ most other databases. |\n| Get single result | `$item = $result->fetchColumn();`\
    \ | Gets first record in first column of result. To get result from other columns,\
    \ use column number (counting from 0) as argument. |\n| Get next record | `$row\
    \ = $result->fetch();` | Gets next row from result set as associative array. |\n\
    | Release DB resources | `$result->closeCursor();` | Frees up connection to allow\
    \ new query. |\n| Submit non-`SELECT` query | `$affected = $conn->exec($sql);`\
    \ | Although `query()` can be used for non-`SELECT` queries, `exec()` returns\
    \ the number of affected rows. |\n\n## Using SQL to Interact with a Database\n\
    \nAs you have just seen, PHP connects to the database, sends the query, and receives\
    \ the results, but the query itself needs to be written in SQL. Although SQL is\
    \ a common standard, there are many dialects of SQL. Each database vendor, including\
    \ MySQL, has added extensions to the standard language. These improve efficiency\
    \ and functionality, but are usually incompatible with other databases. The SQL\
    \ in this book works with MySQL 5.1 or later and with MariaDB, but it won’t necessarily\
    \ transfer to Microsoft SQL Server, Oracle, or another database.\n\n### Writing\
    \ SQL queries\n\nSQL syntax doesn’t have many rules, and all of them are quite\
    \ simple.\n\n#### SQL keywords are case-insensitive\n\nThe query that retrieves\
    \ all records from the `images` table looks like this:\n\n```\nSELECT * FROM images\n\
    ```\n\nThe words in uppercase are SQL keywords. This is purely a convention. The\
    \ following are all equally correct:\n\n```\nSELECT * FROM images\nselect * from\
    \ images\nSeLEcT * fRoM images\n```\n\nAlthough SQL keywords are case-insensitive,\
    \ the same *doesn’t* apply to database column names. The advantage of using uppercase\
    \ for keywords is that it makes SQL queries easier to read. You’re free to choose\
    \ whichever style suits you best, but the ransom-note style of the last example\
    \ is probably best avoided.\n\n#### Whitespace is ignored\n\nThis allows you to\
    \ spread SQL queries over several lines for increased readability. The one place\
    \ where whitespace is *not* allowed is between a function name and the opening\
    \ parenthesis. The following generates an error:\n\n```\nSELECT COUNT (*) FROM\
    \ images  /* BAD EXAMPLE */\n```\n\nThe space needs to be closed up like this:\n\
    \n```\nSELECT COUNT(*) FROM images  /* CORRECT */\n```\n\nAs you probably gathered\
    \ from these examples, you can add comments to SQL queries by putting them between\
    \ `/*` and `*/`.\n\n#### Strings must be quoted\n\nAll strings must be quoted\
    \ in an SQL query. It doesn’t matter whether you use single or double quotes,\
    \ as long as they are in matching pairs. However, it’s normally better to use\
    \ MySQLi or PDO prepared statements, as explained later in this chapter.\n\n####\
    \ Handling numbers\n\nAs a general rule, numbers should not be quoted, as anything\
    \ in quotes is a string. However, MySQL accepts numbers enclosed in quotes and\
    \ treats them as their numeric equivalent. Be careful to distinguish between a\
    \ real number and any other data type made up of numbers. For instance, a date\
    \ is made up of numbers but should be enclosed in quotes and stored in a date-related\
    \ column type. Similarly, telephone numbers should be enclosed in quotes and stored\
    \ in a text-related column type.\n\n#### Note\n\nSQL queries normally end with\
    \ a semicolon, which is an instruction to the database to execute the query. When\
    \ using PHP, the semicolon must be omitted from the SQL. Consequently, stand-alone\
    \ examples of SQL are presented throughout this book without a concluding semicolon.\n\
    \n## Refining the Data Retrieved by a SELECT query\n\nThe only SQL query you have\
    \ run so far retrieves all records from the `images` table. Much of the time,\
    \ you want to be more selective.\n\n### Selecting Specific Columns\n\nUsing an\
    \ asterisk to select all columns is a convenient shortcut, but you should normally\
    \ specify only those columns you need. List the column names separated by commas\
    \ after the `SELECT` keyword. For example, this query selects only the `filename`\
    \ and `caption` fields for each record:\n\n```\nSELECT filename, caption FROM\
    \ images\n```\n\nYou can test this in `mysqli_03.php` and `pdo_03.php` in the\
    \ `ch13` folder.\n\n### Changing the order of results\n\nTo control the sort order,\
    \ add an `ORDER BY` clause with the name(s) of the column(s) in order of precedence.\
    \ Separate multiple columns by commas. The following query sorts the captions\
    \ from the `images` table in alphabetical order (the code is in `mysqli_04.php`\
    \ and `pdo_04.php`):\n\n```\n$sql = 'SELECT * FROM images ORDER BY caption';\n\
    ```\n\n**Note**\nThis semicolon is part of the PHP statement, not part of the\
    \ SQL query.\n\nThe preceding query produces this output:\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figg_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figg_HTML.jpg)\n\
    \nTo reverse the sort order, add the `DESC` (for “descending”) keyword like this\
    \ (there are examples in `mysqli_05.php` and `pdo_05.php`):\n\n```\n$sql = 'SELECT\
    \ * FROM images ORDER BY caption DESC';\n```\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figh_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figh_HTML.jpg)\n\
    \nThere is also an `ASC` (for “ascending”) keyword. It’s the default sort order,\
    \ so is normally omitted.\n\nHowever, specifying `ASC` increases clarity when\
    \ columns in the same table are sorted in a different order. For example, if you\
    \ publish multiple articles every day, you could use the following query to display\
    \ titles in alphabetical order, but ordered by the date of publication with the\
    \ most recent ones first:\n\n```\nSELECT * FROM articles\nORDER BY published DESC,\
    \ title ASC\n```\n\n### Searching for Specific Values\n\nTo search for specific\
    \ values, add a `WHERE` clause to the `SELECT` query. The `WHERE` clause follows\
    \ the name of the table. For example, the query in `mysqli_06.php` and `pdo_06.php`\
    \ looks like this:\n\n```\n$sql = 'SELECT * FROM images\nWHERE image_id = 6';\n\
    ```\n\n**Note**\nSQL uses one equal sign to test for equality, unlike PHP, which\
    \ uses two."
