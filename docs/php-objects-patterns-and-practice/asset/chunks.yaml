    您可以在第 18 章中了解更多关于模拟对象和桩对象的内容。


    ### 注册表、作用域与 PHP


    "作用域"（scope）一词通常用于描述对象或值在代码结构上下文中的可见性。变量的生命周期也可以从时间维度来衡量。从这个意义上讲，您可以考虑三种作用域级别。标准的是
    HTTP 请求覆盖的时间段。PHP 还内置支持会话变量。这些变量会在请求结束时被序列化并保存到文件系统或数据库中，然后在下一个请求开始时恢复。存储在 Cookie
    中或通过查询字符串传递的会话 ID 用于跟踪会话所有者。因此，您可以将某些变量视为具有会话作用域。您可以通过在请求之间存储一些对象来利用这一点，从而省去一次数据库查询。显然，您需要小心，避免最终出现同一个对象的多个版本，因此当您检查一个也存在于数据库中的对象并将其存入会话时，可能需要考虑一种锁定策略。


    在其他语言中（尤其是 Java 和运行在 `ModPerl` Apache 模块上的 Perl），存在"应用程序作用域"（application scope）的概念。处于该作用域内的变量适用于应用程序的所有实例。这对
    PHP 来说相当陌生；但在大型应用中，能够访问一个应用级全局空间来获取配置变量，可能会被认为是有用的。


    在本书的先前版本中，我演示了会话作用域和应用作用域注册表类的示例；但自从我第一次编写那段示例代码以来的大约十年间，我从未需要过除请求作用域注册表之外的任何其他类型。这种按请求处理的方式存在初始化成本，但您通常会使用缓存策略来管理它。


    ### 影响


    `Registry` 对象使其数据全局可访问。这意味着任何作为注册表客户端的类都会表现出一种未在其接口中声明的依赖关系。如果您开始依赖 `Registry`
    对象来处理系统中的大量数据，这可能会成为一个严重的问题。最好谨慎使用 `Registry` 对象，仅将其用于一组明确定义的数据项。


    ## 表示层


    当请求到达您的系统时，您必须解释其所携带的需求，调用所需的任何业务逻辑，最后返回一个响应。对于简单的脚本，整个过程通常完全在视图本身内部完成，只有重量级的逻辑和持久化代码被分离到库中。


    > **注意：** 视图是视图层中的单个元素。它可以是一个 PHP 页面（或由多个组合视图元素构成的集合），其主要职责是显示数据，并提供用户生成新请求的机制。也可以是一个像
    `Twig` 这样的系统中的模板。


    随着系统规模的增长，这种默认策略会变得越来越不可行，因为请求处理、业务逻辑调用和视图分发逻辑必然会在各个视图之间重复。


    在本节中，我将探讨管理表示层这三项关键职责的策略。由于视图层与命令控制层之间的界限通常相当模糊，因此将它们统一放在"表示层"这个通用术语下一起讨论是合理的。


    ### 前端控制器


    这种模式与传统的、具有多个入口点的 PHP 应用程序截然相反。前端控制器模式为所有传入请求提供一个中心访问点，最终委托视图来执行向用户呈现结果的任务。这是
    Java 企业社区中的一个关键模式。`Core J2EE Patterns: Best Practices and Design Strategies` 对此有非常详细的介绍，该书至今仍是最具影响力的企业模式资源之一。这种模式在
    PHP 社区中并非普遍受欢迎，部分原因在于初始化有时会带来开销。


    我编写的大多数系统都倾向于使用前端控制器。也就是说，我可能不会从一开始就部署完整的模式，但我清楚如果未来需要它提供的灵活性，应该如何将项目演进为前端控制器实现所需采取的步骤。


    #### 问题所在


    当请求在系统的多个点被处理时，很难避免代码中的重复。您可能需要验证用户身份、将术语翻译成不同语言，或者仅仅是访问通用数据。当一个请求跨视图需要执行通用操作时，您可能会发现自己反复复制粘贴代码。这会使修改变得困难，因为一个简单的改动可能需要在系统的多个位置进行部署。因此，代码的某些部分很容易与其他部分变得不一致。当然，第一步可能是将通用操作集中到库代码中，但您仍然需要在系统各处分布调用这些库函数或方法。


    另一个可能出现在控制分散在各视图中的系统里的问题，是难以管理视图到视图的流转。在一个复杂系统中，根据输入以及在逻辑层执行的操作是否成功，一个视图中的提交可能导致任意数量的结果页面。视图之间的转发可能会变得混乱，特别是当同一个视图可能在不同流程中被使用时。'
- fmt: '#### Implementation


    At heart, the Front Controller pattern defines a central point of entry for every
    request. It processes the request and uses it to select an operation to perform.
    Operations are often defined in specialized `command` objects organized according
    to the Command pattern.


    Figure [12-3](#A314621_5_En_12_Chapter.html#Fig3) shows an overview of a Front
    Controller implementation.


    ![A314621_5_En_12_Fig3_HTML.gif](A314621_5_En_12_Fig3_HTML.gif)


    Figure 12-3. A `Controller` class and a command hierarchy


    In fact, you are likely to deploy a few helper classes to smooth the process,
    but let’s begin with the core participants. Here is a simple `Controller` class:


    ```

    // listing 12.09

    class Controller

    {

    private $reg;

    private function __construct()

    {

    $this->reg = Registry::instance();

    }

    public static function run()

    {

    $instance = new Controller();

    $instance->init();

    $instance->handleRequest();

    }

    private function init()

    {

    $this->reg->getApplicationHelper()->init();

    }

    private function handleRequest()

    {

    $request = $reg->getRequest();

    $resolver = new CommandResolver();

    $cmd = $resolver->getCommand($request);

    $cmd->execute($request);

    }

    }

    ```


    Simplified as this is, and bereft of error handling, there isn’t much more to
    the `Controller` class. A controller sits at the tip of a system, delegating to
    other classes. It is these other classes that do most of the work. `run()` is
    merely a convenience method that calls `init()` and `handleRequest()`. It is static,
    and the constructor is private, so the only option for client code is to kick
    off execution of the system. I usually do this in a file called `index.php` that
    contains only a few lines of code:


    ```

    // listing 12.10

    require_once(__DIR__ . "/../../../vendor/autoload.php");

    use \popp\ch12\batch05\Controller;

    Controller::run();

    ```


    Notice that nasty looking `require` statement. It is really only there so that
    the rest of the system can live in ignorance of the need for requiring files.
    The `autoload.php` script is automatically generated by Composer. It manages the
    logic for loading class files, as needed. If that meant nothing to you, don’t
    worry; we cover autoloading in much more detail in Chapter [16](#A314621_5_En_16_Chapter.html).


    The distinction between the `init()` and `handleRequest()` methods is really one
    of category in PHP. In some languages, `init()` would be run only at application
    startup, and `handleRequest()` or an equivalent would be run for each user request.
    This class observes the same distinction between setup and request handling, even
    though `init()` is called for each request.


    The `init()` method makes a call to a class called `ApplicationHelper` via the
    `Registry` class, which is referenced by the Controller’s `$reg` property. The
    `ApplicationHelper` class manages configuration data for the application as a
    whole. `Controller::init()` calls a method in `ApplicationHelper`, also called
    `init()`, which, as you will see, initializes data used by the application.


    The `handleRequest()` method uses a `CommandResolver` to acquire a `Command` object,
    which it runs by calling `Command::execute()`.


    ##### ApplicationHelper


    The `ApplicationHelper` class is not essential to Front Controller. Most implementations
    must acquire basic configuration data, though, so I should develop a strategy
    for this. Here is a simple `ApplicationHelper`:


    ```

    // listing 12.11

    class ApplicationHelper

    {

    private $config = __DIR__ . "/data/woo_options.ini";

    private $reg;

    public function __construct()

    {

    $this->reg = Registry::instance();

    }

    public function init()

    {

    $this->setupOptions();

    if (isset($_SERVER[''REQUEST_METHOD''])) {

    $request = new HttpRequest();

    } else {

    $request = new CliRequest();

    }

    $this->reg->setRequest($request);

    }

    private function setupOptions()

    {

    if (! file_exists($this->config)) {

    throw new AppException("Could not find options file");

    }

    $options = parse_ini_file($this->config, true);

    $conf = new Conf($options[''config'']);

    $this->reg->setConf($conf);

    $commands = new Conf($options[''commands'']);

    $this->reg->setCommands($commands);

    }

    }

    ```


    This class simply reads a configuration file and adds various objects to a registry,
    thereby making them available to the wider system. The `init()` method calls a
    private method—`setupOptions()`—which reads an `.ini` file and passes two arrays
    (each in an instance of a class named `Conf`) to the `Registry` object. There
    is nothing to `Conf` but a `get()` and a `set()` method—although more sophisticated
    configuration classes might manage searching for and parsing files, as well as
    managing the found data. One of these `Conf` arrays is intended to hold general
    configuration values—and that is passed to `Registry::setConf()`. The other array
    is for mapping URL paths to `Command` classes, and I pass that to `Registry::setCommands()`.


    The `init()` method also attempts to discover whether the application is being
    run in a web context or on the command line (by checking for the existence of
    `$_SERVER[''REQUEST_METHOD'']`). It passes a distinct `Request` subclass to the
    `Registry` object, depending on the result of that test.


    Since `Registry` classes do very little but store and serve up objects, they do
    not make for exciting source code listings. For the sake of completeness, though,
    here are the additional `Registry` methods used or implied by the `ApplicationHelper`:


    ```

    // listing 12.12

    // must be initialized by some smarter component

    public function setRequest(Request $request)

    {

    $this->request = $request;

    }

    public function getRequest(): Request

    {

    if (is_null($this->request)) {

    throw new \Exception("No Request set");

    }

    return $this->request;

    }

    public function getApplicationHelper(): ApplicationHelper

    {

    if (is_null($this->applicationHelper)) {

    $this->applicationHelper = new ApplicationHelper();

    }

    return $this->applicationHelper;

    }

    public function setConf(Conf $conf)

    {

    $this->conf = $conf;

    }

    public function getConf(): Conf

    {

    if (is_null($this->conf)) {

    $this->conf = new Conf();

    }

    return $this->conf;

    }

    public function setCommands(Conf $commands)

    {

    $this->commands = $commands;

    }

    public function getCommands(): Conf

    {

    return $this->commands;

    }

    ```


    Here is the simple configuration file:


    ```

    [config]

    dsn=sqlite:/var/popp/src/ch12/batch05/data/woo.db

    [commands]

    /=\popp\ch12\batch05\DefaultCommand

    ```'
