    </p>

    ```


    这会创建另一个`SELECT`查询，用于获取`images`表中每张图像的主键和文件名。目前你应该已经非常熟悉这段代码，因此无需额外解释。


    复选框、文件输入字段以及用于图片说明的文本输入字段应放置在上一段代码与提交按钮之间。代码如下所示：


    ```

    <p id="allowUpload">

    <input type="checkbox" name="upload_new" id="upload_new">

    <label for="upload_new">上传新图像</label>

    </p>

    <p class="optional">

    <label for="image">选择图像：</label>

    <input type="file" name="image" id="image">

    </p>

    <p class="optional">

    <label for="caption">图片说明：</label>

    <input name="caption" type="text" id="caption">

    </p>

    ```


    包含复选框的段落已被赋予 ID `allowUpload`，另外两个段落则被赋予类名`optional`。`admin.css`中的样式规则将这三个段落的`display`属性设置为`none`。


    保存`blog_insert_mysqli.php`并在浏览器中加载该页面。`images <select>`下拉菜单显示在`categories`列表下方，但你在步骤
    9 中插入的三个表单元素是隐藏的。如果浏览器中禁用了 JavaScript，页面将显示为此状态。用户将可以选择类别和现有图像，但无法上传新图像。


    如有需要，可将你的代码与`ch16`文件夹中的`blog_insert_mysqli_03.php`进行比对。


    将`ch16`文件夹中的`toggle_fields.js`复制到`admin`文件夹。该文件包含以下 JavaScript 代码：


    ```

    var cbox = document.getElementById(''allowUpload'');

    cbox.style.display = ''block'';

    var uploadImage = document.getElementById(''upload_new'');

    uploadImage.onclick = function () {

    var image_id = document.getElementById(''image_id'');

    var image = document.getElementById(''image'');

    var caption = document.getElementById(''caption'');

    var sel = uploadImage.checked;

    image_id.disabled = sel;

    image.parentNode.style.display = sel ? ''block'' : ''none'';

    caption.parentNode.style.display = sel ? ''block'' : ''none'';

    image.disabled = !sel;

    caption.disabled = !sel;

    }

    ```


    这段代码利用步骤 8 中插入元素的 ID 来控制它们的显示状态。如果启用了 JavaScript，页面加载时会自动显示复选框，但文件输入字段和图片说明的文本输入字段仍保持隐藏。如果复选框被选中，现有图像的下拉菜单将被禁用，隐藏的元素则会显示出来。如果随后取消选中复选框，下拉菜单将重新启用，文件输入字段和图片说明字段会再次隐藏。


    使用`<script>`标签将`toggle_fields.js`链接到`blog_insert_mysqli.php`，并放置在闭合的`</body>`标签之前，如下所示：


    ```

    </form>

    <script src="toggle_fields.js"></script>

    </body>

    ```


    将 JavaScript 代码添加到页面底部可以加快下载和显示速度。如果将其添加到`<head>`中，`toggle_fields.js`中的代码将无法正常工作。


    保存`blog_insert_mysqli.php`并在浏览器中加载该页面。在支持 JavaScript 的浏览器中，复选框应显示在`<select>`下拉菜单和提交按钮之间。选中复选框可禁用下拉菜单并显示隐藏字段，如图
    16-9 所示。


    ![A978-1-4842-0635-5_16_Fig9_HTML.jpg](img/A978-1-4842-0635-5_16_Fig9_HTML.jpg)


    **图 16-9.** 复选框控制文件和图片说明输入字段的显示。


    取消选中复选框。文件和图片说明输入字段将隐藏，下拉菜单重新启用。如有需要，你可以与`ch16`文件夹中的`blog_insert_mysqli_04.php`和`toggle_fields.js`核对代码。


    如果你好奇我为什么使用 JavaScript 而不是 PHP 来控制文件和图片说明输入字段的显示，那是因为 PHP 是一种服务器端语言。在 PHP 引擎将输出发送到浏览器后，除非你向
    Web 服务器发送另一个请求，否则它不会与页面进一步交互。而 JavaScript 则在浏览器中运行，因此它能够在本地操控页面内容。JavaScript 还可以与
    PHP 结合使用，在后台向 Web 服务器发送请求，并利用返回结果在不重新加载页面的情况下刷新部分页面——这种技术称为 Ajax，但不在本书的讨论范围之内。


    更新后的插入表单现在包含了类别和图像的输入字段，但处理脚本仍然只处理标题的文本输入字段和博客条目的文本区域。

    ```'
- fmt: "# PHP Solution 16-4: Inserting data into multiple tables\n\nThis PHP solution\
    \ adapts the existing script in `blog_insert_mysqli.php` to upload a new image\
    \ (if required) and then insert data into the `images`, `blog`, and `article2cat`\
    \ tables following the decision chain outlined in Figure [16-6](#A978-1-4842-0635-5_16_Chapter.html#Fig6).\
    \ It assumes you have set up the `article2cat` cross-reference table and have\
    \ completed PHP Solutions 16-2 and 16-3.\n\nDon’t attempt to rush through this\
    \ section. The code is quite long, but it brings together many of the techniques\
    \ you have learned previously.\n\n**Note:** If you’re using PDO, a separate section\
    \ after this PHP solution describes the main differences in the code.\n\nThe `Upload`\
    \ class that you updated in PHP Solution 16-2 uses a namespace, so you need to\
    \ import it at the top level of the script. Add this line immediately after the\
    \ opening PHP tag at the top of `blog_insert_mysqli.php`:\n\n`use PhpSolutions\\\
    File\\Upload;`\n\nImmediately after the prepared statement has been initialized,\
    \ insert the following conditional statement to process the image if one has been\
    \ uploaded or selected.\n\n```\n// initialize prepared statement\n$stmt = $conn->stmt_init();\n\
    \n// if a file has been uploaded, process it\nif(isset($_POST['upload_new']) &&\
    \ $_FILES['image']['error'] == 0) {\n    $imageOK = false;\n    require_once '../PhpSolutions/File/Upload.php';\n\
    \    $loader = new Upload('../images/');\n    $loader->upload();\n    $names =\
    \ $loader->getFilenames();\n    // $names will be an empty array if the upload\
    \ failed\n    if ($names) {\n        $sql = 'INSERT INTO images (filename, caption)\
    \ VALUES (?, ?)';\n        if ($stmt->prepare($sql)) {\n            $stmt->bind_param('ss',\
    \ $names[0], $_POST['caption']);\n            $stmt->execute();\n            $imageOK\
    \ = $stmt->affected_rows;\n        }\n    }\n    // get the image's primary key\
    \ or find out what went wrong\n    if ($imageOK) {\n        $image_id = $stmt->insert_id;\n\
    \    } else {\n        $imageError = implode(' ', $loader->getMessages());\n \
    \   }\n} elseif (isset($_POST['image_id']) && !empty($_POST['image_id'])) {\n\
    \    // get the primary key of a previously uploaded image\n    $image_id = $_POST['image_id'];\n\
    }\n\n// create SQL\n$sql = 'INSERT INTO blog (title, article, created) VALUES(?,\
    \ ?, NOW())';\n```\n\nThis begins by checking if `$_POST['upload_new']` has been\
    \ set. As explained in [Chapter 5](#A978-1-4842-0635-5_5_Chapter.html), a check\
    \ box is included in the `$_POST` array only if it has been selected. So, if the\
    \ check box hasn’t been selected, the condition fails, and the `elseif` clause\
    \ at the bottom is tested instead. The `elseif` clause checks for the existence\
    \ of `$_POST['image_id']`. If it exists and is not empty, it means that an existing\
    \ image has been selected from the drop-down menu, and the value is stored in\
    \ `$image_id`.\n\nIf both tests fail, an image has neither been uploaded nor selected\
    \ from the drop-down menu. The script later takes this into account when preparing\
    \ the `INSERT` query for the `blog` table, allowing you to create a blog entry\
    \ without an image.\n\nHowever, if `$_POST['upload_new']` exists, the check box\
    \ has been selected, and an image has probably been uploaded. To make sure, the\
    \ conditional statement also checks the value of `$_FILES['image']['error']`.\
    \ As you learned in [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html), the error\
    \ code `0` indicates a successful upload. Any other error code means the upload\
    \ failed or that no file was selected.\n\nAssuming a file has been successfully\
    \ uploaded from the form, the conditional statement includes the `Upload` class\
    \ definition and creates an object called `$loader`, setting the destination folder\
    \ to `images`. It then calls the `upload()` method to process the file and store\
    \ it in the `images` folder. To avoid complicating the code, I’m using the default\
    \ maximum size and MIME types.\n\nThe changes you made to the `Upload` class in\
    \ PHP Solution 16-2 add the name of an uploaded file to the `$filenames` property\
    \ only if the file was moved successfully to the destination folder. The `getFilenames()`\
    \ method retrieves the contents of the `$filenames` property and assigns the result\
    \ to `$names`.\n\nIf the file was moved successfully, its filename is stored as\
    \ the first element of the `$names` array. So if `$names` contains a value, you\
    \ can safely proceed with the `INSERT` query, which binds the values of `$names[0]`\
    \ and `$_POST['caption']` as strings to the prepared statement.\n\nAfter the statement\
    \ has been executed, the `affected_rows` property resets the value of `$imageOK`.\
    \ If the `INSERT` query succeeded, `$imageOK` is `1`, which is treated as `true`.\n\
    \nIf the image details were inserted in the `images` table, the prepared statement’s\
    \ `insert_id` property retrieves the primary key of the new record and stores\
    \ it in `$image_id`. The `insert_id` property must be accessed before running\
    \ any other SQL queries because it contains the primary key of the most recent\
    \ query.\n\nHowever, if `$imageOK` is still false, the `else` block calls the\
    \ upload object’s `getMessages()` method and assigns the result to `$imageError`.\
    \ The `getMessages()` method returns an array, so the `implode()` function is\
    \ used to join the array elements as a single string. The most likely causes of\
    \ failure are a file that’s too big or that’s of the wrong MIME type.\n\nAs long\
    \ as the image upload didn’t fail, the next stage in the process is to insert\
    \ the blog entry into the `blog` table. The form of the `INSERT` query depends\
    \ on whether an image is associated with the blog entry. If it is, `$image_id`\
    \ exists and needs to be inserted in the `blog` table as a foreign key. Otherwise,\
    \ the original query can be used.\n\nAmend the original query like this:\n\n```\n\
    // don't insert blog details if the image failed to upload\nif (!isset($imageError))\
    \ {\n    // if $image_id has been set, insert it as a foreign key\n    if (isset($image_id))\
    \ {\n        $sql = 'INSERT INTO blog (image_id, title, article) VALUES(?, ?,\
    \ ?)';\n        if ($stmt->prepare($sql)) {\n            $stmt->bind_param('iss',\
    \ $image_id, $_POST['title'], $_POST['article']);\n            $stmt->execute();\n\
    \        }\n    } else {\n        // create SQL\n        $sql = 'INSERT INTO blog\
    \ (title, article)\n                VALUES(?, ?)';\n        if ($stmt->prepare($sql))\
    \ {\n            // bind parameters and execute statement\n            $stmt->bind_param('ss',\
    \ $_POST['title'], $_POST['article']);\n            $stmt->execute();\n      \
    \  }\n    }\n\n    if ($stmt->affected_rows > 0) {\n        $OK = true;\n    }\n\
    }\n```\n\nThis whole section of code is wrapped in a conditional statement that\
    \ checks whether `$imageError` exists. If it does, there’s no point in inserting\
    \ the new blog entry, so the entire code block is ignored.\n\nHowever, if `$imageError`\
    \ doesn’t exist, the nested conditional statement prepares different `INSERT`\
    \ queries depending on whether `$image_id` exists and then executes whichever\
    \ one has been prepared.\n\nThe conditional statement that checks the `affected_rows`\
    \ property is moved out of the `else` block so that it applies to either `INSERT`\
    \ query.\n\nThe next stage of the process inserts values into the `article2cat`\
    \ cross-reference table. The code follows immediately after the code in the previous\
    \ step and looks like the following:\n\n```\n// if the blog entry was inserted\
    \ successfully, check for categories\nif ($OK && isset($_POST['category'])) {\n\
    \    // get the article's primary key\n    $article_id = $stmt->insert_id;\n\n\
    \    foreach ($_POST['category'] as $cat_id) {\n        if (is_numeric($cat_id))\
    \ {\n            $values[] = \"($article_id, \" . (int) $cat_id . ')';\n     \
    \   }\n    }\n\n    if ($values) {\n        $sql = 'INSERT INTO article2cat (article_id,\
    \ cat_id)\n                VALUES ' . implode(',', $values);\n        // execute\
    \ the query and get error message if it fails\n        if (!$conn->query($sql))\
    \ {\n            $catError = $conn->error;\n        }\n    }\n}\n```"
  raw: '#### PHP Solution 16-4: Inserting data into multiple tables


    This PHP solution adapts the existing script in `blog_insert_mysqli.php` to upload
    a new image (if required) and then insert data into the `images`, `blog`, and
    `article2cat` tables following the decision chain outlined in Figure [16-6](#A978-1-4842-0635-5_16_Chapter.html#Fig6).
    It assumes you have set up the `article2cat` cross-reference table and have completed
    PHP Solutions 16-2 and 16-3.


    Don’t attempt to rush through this section. The code is quite long, but it brings
    together many of the techniques you have learned previously.


    Note


    If you’re using PDO, a separate section after this PHP solution describes the
    main differences in the code.


    The `Upload` class that you updated in PHP Solution 16-2 uses a namespace, so
    you need to import it at the top level of the script. Add this line immediately
    after the opening PHP tag at the top of `blog_insert_mysqli.php`:


    `use PhpSolutions\File\Upload;`


    Immediately after the prepared statement has been initialized, insert the following
    conditional statement to process the image if one has been uploaded or selected.


    `// initialize prepared statement`


    `$stmt = $conn->stmt_init();`


    `// if a file has been uploaded, process it`


    `if(isset($_POST[''upload_new''])` `&&` `$_FILES[''image''][''error''] == 0) {`


    `$imageOK = false;`


    `require_once ''../PhpSolutions/File/Upload.php'';`


    `$loader = new Upload(''../images/'');`


    `$loader->upload();`


    `$names = $loader->getFilenames();`


    `// $names will be an empty array if the upload failed`


    `if ($names) {`


    `$sql = ''INSERT INTO images (filename, caption) VALUES (?, ?)'';`


    `if ($stmt->prepare($sql)) {`


    `$stmt->bind_param(''ss'', $names[0], $_POST[''caption'']);`


    `$stmt->execute();`


    `$imageOK = $stmt->affected_rows;`


    `}`


    `}`


    `// get the image''s primary key or find out what went wrong`


    `if ($imageOK) {`


    `$image_id = $stmt->insert_id;`


    `} else {`


    `$imageError = implode('' '', $loader->getMessages());`


    `}`


    `} elseif (isset($_POST[''image_id''])` `&&` `!empty($_POST[''image_id''])) {`


    `// get the primary key of a previously uploaded image`


    `$image_id = $_POST[''image_id''];`


    `}`


    `// create` `SQL`


    `$sql = ''INSERT INTO blog (title, article, created) VALUES(?, ?, NOW())'';`


    This begins by checking if `$_POST[''upload_new'']` has been set. As explained
    in [Chapter 5](#A978-1-4842-0635-5_5_Chapter.html), a check box is included in
    the `$_POST` array only if it has been selected. So, if the check box hasn’t been
    selected, the condition fails, and the `elseif` clause at the bottom is tested
    instead. The `elseif` clause checks for the existence of `$_POST[''image_id'']`.
    If it exists and is not empty, it means that an existing image has been selected
    from the drop-down menu, and the value is stored in `$image_id`.


    If both tests fail, an image has neither been uploaded nor selected from the drop-down
    menu. The script later takes this into account when preparing the `INSERT` query
    for the `blog` table, allowing you to create a blog entry without an image.


    However, if `$_POST[''upload_new'']` exists, the check box has been selected,
    and an image has probably been uploaded. To make sure, the conditional statement
    also checks the value of `$_FILES[''image''][''error'']`. As you learned in [Chapter
    6](#A978-1-4842-0635-5_6_Chapter.html), the error code `0`indicates a successful
    upload. Any other error code means the upload failed or that no file was selected.


    Assuming a file has been successfully uploaded from the form, the conditional
    statement includes the `Upload` class definition and creates an object called
    `$loader`, setting the destination folder to `images`. It then calls the `upload()`
    method to process the file and store it in the `images` folder. To avoid complicating
    the code, I’m using the default maximum size and MIME types.


    The changes you made to the `Upload` class in PHP Solution 16-2 add the name of
    an uploaded file to the `$filenames` property only if the file was moved successfully
    to the destination folder. The `getFilenames()` method retrieves the contents
    of the `$filenames` property and assigns the result to `$names`.


    If the file was moved successfully, its filename is stored as the first element
    of the `$names` array. So if `$names` contains a value, you can safely proceed
    with the `INSERT` query, which binds the values of `$names[0]` and `$_POST[''caption'']`
    as strings to the prepared statement.


    After the statement has been executed, the `affected_rows` property resets the
    value of `$imageOK`. If the `INSERT` query succeeded, `$imageOK` is `1`, which
    is treated as `true`.


    If the image details were inserted in the `images` table, the prepared statement’s
    `insert_id` property retrieves the primary key of the new record and stores it
    in `$image_id`. The `insert_id` property must be accessed before running any other
    SQL queries because it contains the primary key of the most recent query.


    However, if `$imageOK` is still false, the `else` block calls the upload object’s
    `getMessages()` method and assigns the result to `$imageError`. The `getMessages()`
    method returns an array, so the `implode()` function is used to join the array
    elements as a single string. The most likely causes of failure are a file that’s
    too big or that’s of the wrong MIME type.


    As long as the image upload didn’t fail, the next stage in the process is to insert
    the blog entry into the `blog` table. The form of the `INSERT` query depends on
    whether an image is associated with the blog entry. If it is, `$image_id` exists
    and needs to be inserted in the `blog` table as a foreign key. Otherwise, the
    original query can be used.


    Amend the original query like this:


    `// don''t insert blog details if the image failed to upload`


    `if (!isset($imageError)) {`


    `// if $image_id has been set, insert it as a foreign key`


    `if (isset($image_id)) {`


    `$sql = ''INSERT INTO blog (image_id, title, article) VALUES(?, ?, ?)'';`


    `if ($stmt->prepare($sql)) {`


    `$stmt->bind_param(''iss'', $image_id, $_POST[''title''], $_POST[''article'']);`


    `$stmt->execute();`


    `}`


    `} else {`


    `// create SQL`


    `$sql = ''INSERT INTO blog (title, article)`


    `VALUES(?, ?)'';`


    `if ($stmt->prepare($sql)) {`


    `// bind parameters and execute statement`


    `$stmt->bind_param(''ss'', $_POST[''title''], $_POST[''article'']);`


    `$stmt->execute();`


    `}`


    `}`


    `if ($stmt->affected_rows > 0) {`


    `$OK = true;`


    `}`


    `}`


    This whole section of code is wrapped in a conditional statement that checks whether
    `$imageError` exists. If it does, there’s no point in inserting the new blog entry,
    so the entire code block is ignored.


    However, if `$imageError` doesn’t exist, the nested conditional statement prepares
    different `INSERT` queries depending on whether `$image_id` exists and then executes
    whichever one has been prepared.


    The conditional statement that checks the `affected_rows` property is moved out
    of the `else` block so that it applies to either `INSERT` query.


    The next stage of the process inserts values into the `article2cat` cross-reference
    table. The code follows immediately after the code in the previous step and looks
    like the following:


    `// if the blog entry was inserted successfully, check for categories`


    `if ($OK && isset($_POST[''category''])) {`


    `// get the article''s primary key`


    `$article_id = $stmt->insert_id;`


    `foreach ($_POST[''category''] as $cat_id) {`


    `if (is_numeric($cat_id)) {`


    `$values[] = "($article_id, " . (int) $cat_id . '')'';`


    `}`


    `}`


    `if ($values) {`


    `$sql = ''INSERT INTO article2cat (article_id, cat_id)`


    `VALUES '' . implode('','', $values);`


    `// execute the query and get error message if it fails`


    `if (!$conn->query($sql)) {`


    `$catError = $conn->error;`


    `}`


    `}`


    `}`'
  trans: "\n# PHP 解决方案 16-4：向多张表插入数据\n\n本 PHP 解决方案修改了 `blog_insert_mysqli.php` 中的现有脚本，根据图\
    \ 16-6 所示的决策链，上传新图片（如有必要），然后将数据插入到 `images`、`blog` 和 `article2cat` 表中。此解决方案假设您已经设置了\
    \ `article2cat` 交叉引用表，并完成了 PHP 解决方案 16-2 和 16-3。\n\n不要急于完成本部分内容。代码虽然较长，但它汇集了您之前学到的许多技术。\n\
    \n**注意：** 如果您使用 PDO，本 PHP 解决方案之后会有一个独立部分介绍代码的主要区别。\n\n您在 PHP 解决方案 16-2 中更新的 `Upload`\
    \ 类使用了命名空间，因此您需要在脚本顶层导入它。在 `blog_insert_mysqli.php` 顶部的 PHP 起始标签之后立即添加以下代码行：\n\
    \n`use PhpSolutions\\File\\Upload;`\n\n在准备好的语句初始化之后，立即插入以下条件语句，用于处理已上传或已选择的图片。\n\
    \n```\n// 初始化准备好的语句\n$stmt = $conn->stmt_init();\n\n// 如果已上传文件，则进行处理\nif(isset($_POST['upload_new'])\
    \ && $_FILES['image']['error'] == 0) {\n    $imageOK = false;\n    require_once\
    \ '../PhpSolutions/File/Upload.php';\n    $loader = new Upload('../images/');\n\
    \    $loader->upload();\n    $names = $loader->getFilenames();\n    // 如果上传失败，$names\
    \ 将是一个空数组\n    if ($names) {\n        $sql = 'INSERT INTO images (filename, caption)\
    \ VALUES (?, ?)';\n        if ($stmt->prepare($sql)) {\n            $stmt->bind_param('ss',\
    \ $names[0], $_POST['caption']);\n            $stmt->execute();\n            $imageOK\
    \ = $stmt->affected_rows;\n        }\n    }\n    // 获取图片的主键或找出问题所在\n    if ($imageOK)\
    \ {\n        $image_id = $stmt->insert_id;\n    } else {\n        $imageError\
    \ = implode(' ', $loader->getMessages());\n    }\n} elseif (isset($_POST['image_id'])\
    \ && !empty($_POST['image_id'])) {\n    // 获取之前上传图片的主键\n    $image_id = $_POST['image_id'];\n\
    }\n\n// 创建 SQL\n$sql = 'INSERT INTO blog (title, article, created) VALUES(?, ?,\
    \ NOW())';\n```\n\n这首先检查 `$_POST['upload_new']` 是否已设置。如第 5 章所述，复选框仅在被选中时才会包含在\
    \ `$_POST` 数组中。因此，如果复选框未被选中，条件不成立，则转而测试底部的 `elseif` 子句。`elseif` 子句检查 `$_POST['image_id']`\
    \ 是否存在。如果存在且不为空，则表示已从下拉菜单中选择了一张现有图片，该值存储在 `$image_id` 中。\n\n如果两个测试都失败，则既没有上传图片，也没有从下拉菜单中选择图片。脚本稍后在为\
    \ `blog` 表准备 `INSERT` 查询时会考虑这一点，允许您创建不带图片的博客条目。\n\n但是，如果 `$_POST['upload_new']`\
    \ 存在，则表示复选框已被选中，并且可能已上传了图片。为了确保这一点，条件语句还会检查 `$_FILES['image']['error']` 的值。如您在第\
    \ 6 章中所学，错误代码 `0` 表示上传成功。任何其他错误代码都表示上传失败或未选择文件。\n\n假设表单已成功上传文件，条件语句会包含 `Upload`\
    \ 类定义，并创建一个名为 `$loader` 的对象，将目标文件夹设置为 `images`。然后调用 `upload()` 方法来处理文件并将其存储在 `images`\
    \ 文件夹中。为了避免代码复杂化，我使用了默认的最大尺寸和 MIME 类型。\n\n您在 PHP 解决方案 16-2 中对 `Upload` 类所做的修改，仅当文件成功移动到目标文件夹时，才会将上传文件的名称添加到\
    \ `$filenames` 属性中。`getFilenames()` 方法检索 `$filenames` 属性的内容，并将结果赋给 `$names`。\n\
    \n如果文件移动成功，其文件名将作为第一个元素存储在 `$names` 数组中。因此，如果 `$names` 包含一个值，您可以安全地继续执行 `INSERT`\
    \ 查询，该查询将 `$names[0]` 和 `$_POST['caption']` 的值作为字符串绑定到准备好的语句中。\n\n语句执行后，`affected_rows`\
    \ 属性会重置 `$imageOK` 的值。如果 `INSERT` 查询成功，`$imageOK` 为 `1`，将被视为 `true`。\n\n如果图片详情已插入到\
    \ `images` 表中，则准备好的语句的 `insert_id` 属性会检索新记录的主键，并将其存储在 `$image_id` 中。必须在运行任何其他\
    \ SQL 查询之前访问 `insert_id` 属性，因为它包含最新查询的主键。\n\n但是，如果 `$imageOK` 仍然为 false，则 `else`\
    \ 块会调用上传对象的 `getMessages()` 方法，并将结果赋给 `$imageError`。`getMessages()` 方法返回一个数组，因此使用\
    \ `implode()` 函数将数组元素连接成一个字符串。失败最可能的原因是文件太大或 MIME 类型错误。\n\n只要图片上传没有失败，下一步就是将博客条目插入到\
    \ `blog` 表中。`INSERT` 查询的形式取决于博客条目是否关联了图片。如果有关联，则 `$image_id` 存在，需要作为外键插入到 `blog`\
    \ 表中。否则，可以使用原始查询。\n\n像这样修改原始查询：\n\n```\n// 如果图片上传失败，则不插入博客详情\nif (!isset($imageError))\
    \ {\n    // 如果已设置 $image_id，则将其作为外键插入\n    if (isset($image_id)) {\n        $sql\
    \ = 'INSERT INTO blog (image_id, title, article) VALUES(?, ?, ?)';\n        if\
    \ ($stmt->prepare($sql)) {\n            $stmt->bind_param('iss', $image_id, $_POST['title'],\
    \ $_POST['article']);\n            $stmt->execute();\n        }\n    } else {\n\
    \        // 创建 SQL\n        $sql = 'INSERT INTO blog (title, article)\n      \
    \          VALUES(?, ?)';\n        if ($stmt->prepare($sql)) {\n            //\
    \ 绑定参数并执行语句\n            $stmt->bind_param('ss', $_POST['title'], $_POST['article']);\n\
    \            $stmt->execute();\n        }\n    }\n\n    if ($stmt->affected_rows\
    \ > 0) {\n        $OK = true;\n    }\n}\n```\n\n整个代码块都包裹在一个条件语句中，检查 `$imageError`\
    \ 是否存在。如果存在，则无需插入新博客条目，因此会忽略整个代码块。\n\n但是，如果 `$imageError` 不存在，则嵌套的条件语句会根据 `$image_id`\
    \ 是否存在准备不同的 `INSERT` 查询，然后执行已准备好的那一个。\n\n检查 `affected_rows` 属性的条件语句被移到了 `else`\
    \ 块之外，以便它适用于任何一种 `INSERT` 查询。\n\n流程的下一步是向 `article2cat` 交叉引用表中插入值。代码紧跟在之前步骤的代码之后，如下所示：\n\
    \n```\n// 如果博客条目插入成功，检查分类\nif ($OK && isset($_POST['category'])) {\n    // 获取文章的主键\n\
    \    $article_id = $stmt->insert_id;\n\n    foreach ($_POST['category'] as $cat_id)\
    \ {\n        if (is_numeric($cat_id)) {\n            $values[] = \"($article_id,\
    \ \" . (int) $cat_id . ')';\n        }\n    }\n\n    if ($values) {\n        $sql\
    \ = 'INSERT INTO article2cat (article_id, cat_id)\n                VALUES ' .\
    \ implode(',', $values);\n        // 执行查询，如果失败则获取错误消息\n        if (!$conn->query($sql))\
    \ {\n            $catError = $conn->error;\n        }\n    }\n}\n```\n"
- fmt: "`$OK`的值由插入`blog`表数据的查询中的`affected_rows`属性决定，且多选的`<select>`列表仅在选中任何分类时才包含在`$_POST`数组中。因此，仅当数据成功插入`blog`表且表单中至少选中一个分类时，才会执行此代码块。它首先从预处理语句的`insert_id`属性获取插入操作的主键，并将其赋值给`$article_id`。\n\
    \n表单将分类值作为数组提交。`foreach`循环检查`$_POST['category']`中的每个值。如果值为数字，则执行以下行：\n\n```\n\
    $values[] = \"($article_id, \" . (int) $cat_id . ')';\n```\n\n这将创建一个包含两个主键`$article_id`和`$cat_id`的字符串，用逗号分隔并包裹在括号内。`(int)`类型转换运算符确保`$cat_id`为整数。结果赋值给名为`$values`的数组。例如，如果`$article_id`为`10`且`$cat_id`为`4`，则赋值给数组的结果字符串为`(10,\
    \ 4)`。\n\n如果`$values`包含任何元素，`implode()`会将其转换为逗号分隔的字符串并附加到SQL查询中。例如，如果选中了分类`2`、`4`和`5`，则生成的查询如下所示：\n\
    \n```\nINSERT INTO article2cat (article_id, cat_id)\nVALUES (10, 2),(10, 4),(10,5)\n\
    ```\n\n正如“回顾四个基本的SQL命令”中[第13章](#A978-1-4842-0635-5_13_Chapter.html)所述，这是如何使用单个`INSERT`查询插入多行数据的方法。\n\
    \n由于`$article_id`来自可靠源且`$cat_id`的数据类型已检查，因此直接在SQL查询中使用这些变量而无需使用预处理语句是安全的。该查询通过`query()`方法执行。如果失败，连接对象的`error`属性将存储在`$catError`中。\n\
    \n代码的最后部分处理成功时的重定向和错误消息。修改后的代码如下所示：\n\n```\n// redirect if successful or display\
    \ error\nif ($OK && !isset($imageError) && !isset($catError)) {\n    header('Location:\
    \ http://localhost/phpsols/admin/blog_list_mysqli.php');\n    exit;\n} else {\n\
    \    $error = $stmt->error;\n    if (isset($imageError)) {\n        $error .=\
    \ ' ' . $imageError;\n    }\n    if (isset($catError)) {\n        $error .= '\
    \ ' . $catError;\n    }\n}\n```\n\n控制重定向的条件现在确保`$imageError`和`$catError`不存在。如果存在其中一个，该值将拼接到原始`$error`中，其中包含来自预处理语句对象的任何错误消息。\n\
    \n保存`blog_insert_mysqli.php`并在浏览器中测试。尝试上传过大的图像或类型错误的文件。表单应重新显示，并附带错误消息，同时保留博客详细信息。同时尝试插入带有或不带有图像和/或分类的博客条目。你现在拥有一个通用的插入表单。\n\
    \n如果没有合适的图像上传，请使用`phpsols images`文件夹中的图像。`Upload`类会重命名它们以避免覆盖现有文件。\n\n你可以对照`ch16`文件夹中的`blog_insert_mysqli_05.php`检查你的代码。\n\
    \n#### PDO版本的主要区别\n\n最终的PDO版本可以在`ch16`文件夹的`blog_insert_pdo_05.php`中找到。它遵循与MySQLi版本相同的基本结构和逻辑，但在将值插入数据库的方式上存在一些重要区别。\n\
    \n步骤2中的代码紧密遵循MySQLi版本，但使用命名占位符代替匿名占位符。要获取受影响的行数，PDO在语句对象上使用`rowCount()`方法。最近一次插入操作的主键通过连接对象的`lastInsertId()`方法获取。与MySQLi的`insert_id`属性一样，你需要在`INSERT`查询执行后立即访问它。\n\
    \n最大的变化在步骤3中将详细信息插入`blog`表的代码中。由于PDO可以使用`bindValue()`将`null`值插入列，因此只需要一个预处理语句。步骤3的PDO代码如下所示：\n\
    \n```\n// don't insert blog details if the image failed to upload\nif (!isset($imageError))\
    \ {\n    // create SQL\n    $sql = 'INSERT INTO blog (image_id, title, article)\n\
    \            VALUES(:image_id, :title, :article)';\n    // prepare the statement\n\
    \    $stmt = $conn->prepare($sql);\n    // bind the parameters\n    // if $image_id\
    \ exists, use it\n    if (isset($image_id)) {\n        $stmt->bindParam(':image_id',\
    \ $image_id, PDO::PARAM_INT);\n    } else {\n        // set image_id to NULL\n\
    \        $stmt->bindValue(':image_id', NULL, PDO::PARAM_NULL);\n    }\n    $stmt->bindParam(':title',\
    \ $_POST['title'], PDO::PARAM_STR);\n    $stmt->bindParam(':article', $_POST['article'],\
    \ PDO::PARAM_STR);\n    // execute and get number of affected rows\n    $stmt->execute();\n\
    \    $OK = $stmt->rowCount();\n}\n```\n\n如果已上传图像，高亮显示的条件语句将`$image_id`的值绑定到命名的`:image_id`占位符。但如果没有上传图像，`bindValue()`将值设置为`NULL`。\n\
    \n在步骤4中，PDO版本使用`exec()`而不是`query()`将值插入`article2cat`表。`exec()`方法执行SQL查询并返回受影响的行数，因此当不需要预处理语句时，应将其与`INSERT`、`UPDATE`和`DELETE`查询一起使用。\n\
    \n另一个重要区别在于构建错误消息的代码（如果出现问题）。由于在PDO中创建和准备语句是一个步骤，因此语句对象可能不存在（如果出现问题）。因此，在尝试调用`errorInfo()`方法之前，需要检查其是否存在。如果没有语句，则从数据库连接对象获取错误消息。还需要将`$error`初始化为空字符串，以便将各种消息拼接到其中，如下所示：\n\
    \n```\n// redirect if successful or display error\nif ($OK && !isset($imageError)\
    \ && !isset($catError)) {\n    header('Location: http://localhost/phpsols/admin/blog_list_pdo.php');\n\
    \    exit;\n} else {\n    $error = '';\n    if (isset($stmt)) {\n        $errorInfo\
    \ = $stmt->errorInfo();\n    } else {\n        $errorInfo = $conn->errorInfo();\n\
    \    }\n    if (isset($errorInfo[2])) {\n        $error .= $errorInfo[2];\n  \
    \  }\n    if (isset($imageError)) {\n        $error .= ' ' . $imageError;\n  \
    \  }\n    if (isset($catError)) {\n        $error .= ' ' . $catError;\n    }\n\
    }\n```\n\n## 更新和删除多表中的记录\n\n`categories`和`article2cat`表的添加意味着上一章中PHP Solutions\
    \ 15-2和15-3中的`blog_update_mysqli.php`和`blog_update_pdo.php`的更改不再充分覆盖`phpsols`数据库中的外键关系。除了修改更新表单外，你还需要创建脚本来删除记录而不破坏数据库的引用完整性。\n\
    \n### 更新交叉引用表中的记录\n\n交叉引用表中的每条记录仅包含一个复合主键。通常，主键绝不应更改。此外，它们必须是唯一的。这对更新`article2cat`表带来了问题。如果在更新博客条目时不对选中的分类进行任何更改，则无需更新交叉引用表。但是，如果更改了分类，则需要确定要删除哪些交叉引用以及要插入哪些新引用。\n\
    \n与其纠结于是否进行了任何更改，一个简单的解决方案是删除所有现有的交叉引用，然后重新插入选中的分类。如果没有进行任何更改，只需重新插入相同的分类即可。"
  raw: 'The value of `$OK` is determined by the `affected_rows` property from the
    query that inserted the data in the `blog` table, and the multiple-choice `<select>`
    list is included in the `$_POST` array only if any categories are selected. So,
    this code block is run only if the data was successfully inserted in the `blog`
    table and at least one category was selected in the form. It begins by obtaining
    the primary key of the insert operation from the prepared statement’s `insert_id`
    property and assigning it to `$article_id`.


    The form submits the category values as an array. The `foreach` loop checks each
    value in `$_POST[''category'']`. If the value is numeric, the following line is
    executed:


    `$values[] = "($article_id, " . (int) $cat_id . '')'';`


    This creates a string with the two primary keys, `$article_id` and `$cat_id`,
    separated by a comma and wrapped in a pair of parentheses. The `(int)`casting
    operator makes sure that `$cat_id` is an integer. The result is assigned to an
    array called `$values`. For example, if `$article_id` is `10` and `$cat_id` is
    `4`, the resulting string assigned to the array is `(10, 4)`.


    If `$values` contains any elements, `implode()` converts it to a comma-separated
    string and appends it to the SQL query. For example, if categories `2`, `4`, and
    `5` are selected, the resulting query looks like this:


    `INSERT INTO article2cat (article_id, cat_id)`


    `VALUES (10, 2),(10, 4),(10,5)`


    As explained in “Reviewing the four essential SQL commands” in [Chapter 13](#A978-1-4842-0635-5_13_Chapter.html),
    this is how you insert multiple rows with a single `INSERT` query.


    Because `$article_id` comes from a reliable source and the data type of `$cat_id`
    has been checked, it’s safe to use these variables directly in an SQL query without
    using a prepared statement. The query is executed with the `query()` method. If
    it fails, the connection object’s error property is stored in `$catError`.


    The final section of code handles the redirect on success and error messages.
    The amended code looks like this:


    `// redirect if successful or display error`


    `if ($OK &&` `!isset($imageError)` `&&` `!isset($catError)` `) {`


    `header(''Location:` `http://localhost/phpsols/admin/blog_list_mysqli.php` `'');`


    `exit;`


    `} else {`


    `$error = $stmt->error;`


    `if (isset($imageError)) {`


    `$error .= '' '' . $imageError;`


    `}`


    `if (isset($catError)) {`


    `$error .= '' '' . $catError;`


    `}`


    `}`


    The condition controlling the redirect now ensures that `$imageError` and `$catError`
    don’t exist. If either does, the value is concatenated to the original `$error`,
    which contains any error message from the prepared statement object.


    Save `blog_insert_mysqli.php` and test it in a browser. Try uploading an image
    that’s too big or a file of the wrong MIME type. The form should be redisplayed
    with an error message and the blog details preserved. Also try inserting blog
    entries both with and without images and/or categories. You now have a versatile
    insert form.


    If you don’t have suitable images to upload, use the images in the `phpsols images`
    folder. The `Upload` class renames them to avoid overwriting the existing files.


    You can check your code against `blog_insert_mysqli_05.php` in the `ch16` folder.


    #### Main differences in the PDO version


    The final PDO version can be found in `blog_insert_pdo_05.php` in the `ch16` folder.
    It follows the same basic structure and logic as the MySQLi version, but has some
    important differences in the way values are inserted in the database.


    The code in step 2 follows the MySQLi version closely but uses named placeholders
    instead of anonymous ones. To get the number of affected rows, PDO uses the `rowCount()`
    method on the statement object. The primary key of the most recent insert operation
    is obtained using the `lastInsertId()` method on the connection object. Like the
    MySQLi `insert_id` property, you need to access it immediately after the `INSERT`
    query has been executed.


    The biggest changes are in the code in step 3 that inserts the details into the
    blog table. Because PDO can insert a `null` value into a column using `bindValue()`,
    only one prepared statement is needed. The PDO code for step 3 looks like this:


    `// don''t insert blog details if the image failed to upload`


    `if (!isset($imageError)) {`


    `// create SQL`


    `$sql = ''INSERT INTO blog (image_id, title, article)`


    `VALUES(:image_id, :title, :article)'';`


    `// prepare the statement`


    `$stmt = $conn->prepare($sql);`


    `// bind the parameters`


    `// if $image_id exists, use it`


    `if (isset($image_id)) {`


    `$stmt->bindParam('':image_id'', $image_id, PDO::PARAM_INT);`


    `} else {`


    `// set image_id to NULL`


    `$stmt->bindValue('':image_id'', NULL, PDO::PARAM_NULL);`


    `}`


    `$stmt->bindParam('':title'', $_POST[''title''], PDO::PARAM_STR);`


    `$stmt->bindParam('':article'', $_POST[''article''], PDO::PARAM_STR);`


    `// execute and get number of affected rows`


    `$stmt->execute();`


    `$OK = $stmt->rowCount();`


    `}`


    If an image has been uploaded, the conditional statement highlighted in bold binds
    the value of `$image_id` to the named `:image_id` placeholder. But if no image
    has been uploaded, `bindValue()` sets the value to `NULL`.


    In step 4, the PDO version uses `exec()`instead of `query()` to insert the values
    into the `article2cat` table. The `exec()` method executes an SQL query and returns
    the number of rows affected, so it should be used with `INSERT`, `UPDATE`, and
    `DELETE` queries when a prepared statement is not required.


    The other important difference is in the code that builds the error message if
    there’s a problem. Because creating and preparing a statement is a one-step process
    in PDO, the statement object might not exist if a problem arises. So, you need
    to check for its existence before trying to call the `errorInfo()` method. If
    there’s no statement, the code gets the error message from the database connection
    object. It’s also necessary to initialize `$error` as an empty string to concatenate
    the various messages to it, like this:


    `// redirect if successful or display error`


    `if ($OK && !isset($imageError) && !isset($catError)) {`


    `header(''Location:` `http://localhost/phpsols/admin/blog_list_pdo.php` `'');`


    `exit;`


    `} else {`


    `$error = '''';`


    `if (isset($stmt)) {`


    `$errorInfo = $stmt->errorInfo();`


    `} else {`


    `$errorInfo = $conn->errorInfo();`


    `}`


    `if (isset($errorInfo[2])) {`


    `$error .= $errorInfo[2];`


    `}`


    `if (isset($imageError)) {`


    `$error .= '' '' . $imageError;`


    `}`


    `if (isset($catError)) {`


    `$error .= '' '' . $catError;`


    `}`


    `}`


    ## Updating and Deleting Records in Multiple Tables


    The addition of the `categories` and `article2cat` tables means that the changes
    to `blog_update_mysqli.php` and `blog_update_pdo.php` in PHP Solutions 15-2 and
    15-3 in the previous chapter no longer adequately cover the foreign-key relationships
    in the `phpsols` database. In addition to amending the update form, you also need
    to create scripts to delete records without destroying the database''s referential
    integrity.


    ### Updating records in a cross-reference table


    Each record in a cross-reference table contains only a composite primary key.
    Normally, primary keys should never be altered. Moreover, they must be unique.
    This poses a problem for updating the `article2cat` table. If you make no changes
    to the selected categories when updating a blog entry, the cross-reference table
    doesn’t need to be updated. However, if the categories are changed, you need to
    work out which cross references to delete and which new ones to insert.


    Rather than getting tied up in knots working out whether any changes have been
    made, a simple solution is to delete all existing cross references and insert
    the selected categories again. If no changes have been made, you simply insert
    the same ones again.'
  trans: "\n`$OK`的值由插入`blog`表数据的查询中的`affected_rows`属性决定，且多选的`<select>`列表仅在选中任何分类时才包含在`$_POST`数组中。因此，仅当数据成功插入`blog`表且表单中至少选中一个分类时，才会执行此代码块。它首先从预处理语句的`insert_id`属性获取插入操作的主键，并将其赋值给`$article_id`。\n\
    \n表单将分类值作为数组提交。`foreach`循环检查`$_POST['category']`中的每个值。如果值为数字，则执行以下行：\n\n```\n\
    $values[] = \"($article_id, \" . (int) $cat_id . ')';\n```\n\n这将创建一个包含两个主键`$article_id`和`$cat_id`的字符串，用逗号分隔并包裹在括号内。`(int)`类型转换运算符确保`$cat_id`为整数。结果赋值给名为`$values`的数组。例如，如果`$article_id`为`10`且`$cat_id`为`4`，则赋值给数组的结果字符串为`(10,\
    \ 4)`。\n\n如果`$values`包含任何元素，`implode()`会将其转换为逗号分隔的字符串并附加到 SQL 查询中。例如，如果选中了分类`2`、`4`和`5`，则生成的查询如下所示：\n\
    \n```\nINSERT INTO article2cat (article_id, cat_id)\nVALUES (10, 2),(10, 4),(10,5)\n\
    ```\n\n正如“回顾四个基本的 SQL 命令”中第 13 章所述，这是如何使用单个`INSERT`查询插入多行数据的方法。\n\n由于`$article_id`来自可靠源且`$cat_id`的数据类型已检查，因此直接在\
    \ SQL 查询中使用这些变量而无需使用预处理语句是安全的。该查询通过`query()`方法执行。如果失败，连接对象的`error`属性将存储在`$catError`中。\n\
    \n代码的最后部分处理成功时的重定向和错误消息。修改后的代码如下所示：\n\n```\n// redirect if successful or display\
    \ error\nif ($OK && !isset($imageError) && !isset($catError)) {\n    header('Location:\
    \ http://localhost/phpsols/admin/blog_list_mysqli.php');\n    exit;\n} else {\n\
    \    $error = $stmt->error;\n    if (isset($imageError)) {\n        $error .=\
    \ ' ' . $imageError;\n    }\n    if (isset($catError)) {\n        $error .= '\
    \ ' . $catError;\n    }\n}\n```\n\n控制重定向的条件现在确保`$imageError`和`$catError`不存在。如果存在其中一个，该值将拼接到原始`$error`中，其中包含来自预处理语句对象的任何错误消息。\n\
    \n保存`blog_insert_mysqli.php`并在浏览器中测试。尝试上传过大的图像或类型错误的文件。表单应重新显示，并附带错误消息，同时保留博客详细信息。同时尝试插入带有或不带有图像和/或分类的博客条目。你现在拥有一个通用的插入表单。\n\
    \n如果没有合适的图像上传，请使用`phpsols images`文件夹中的图像。`Upload`类会重命名它们以避免覆盖现有文件。\n\n你可以对照`ch16`文件夹中的`blog_insert_mysqli_05.php`检查你的代码。\n\
    \n#### PDO 版本的主要区别\n\n最终的 PDO 版本可以在`ch16`文件夹的`blog_insert_pdo_05.php`中找到。它遵循与\
    \ MySQLi 版本相同的基本结构和逻辑，但在将值插入数据库的方式上存在一些重要区别。\n\n步骤 2 中的代码紧密遵循 MySQLi 版本，但使用命名占位符代替匿名占位符。要获取受影响的行数，PDO\
    \ 在语句对象上使用`rowCount()`方法。最近一次插入操作的主键通过连接对象的`lastInsertId()`方法获取。与 MySQLi 的`insert_id`属性一样，你需要在`INSERT`查询执行后立即访问它。\n\
    \n最大的变化在步骤 3 中将详细信息插入`blog`表的代码中。由于 PDO 可以使用`bindValue()`将`null`值插入列，因此只需要一个预处理语句。步骤\
    \ 3 的 PDO 代码如下所示：\n\n```\n// don't insert blog details if the image failed to\
    \ upload\nif (!isset($imageError)) {\n    // create SQL\n    $sql = 'INSERT INTO\
    \ blog (image_id, title, article)\n            VALUES(:image_id, :title, :article)';\n\
    \    // prepare the statement\n    $stmt = $conn->prepare($sql);\n    // bind\
    \ the parameters\n    // if $image_id exists, use it\n    if (isset($image_id))\
    \ {\n        $stmt->bindParam(':image_id', $image_id, PDO::PARAM_INT);\n    }\
    \ else {\n        // set image_id to NULL\n        $stmt->bindValue(':image_id',\
    \ NULL, PDO::PARAM_NULL);\n    }\n    $stmt->bindParam(':title', $_POST['title'],\
    \ PDO::PARAM_STR);\n    $stmt->bindParam(':article', $_POST['article'], PDO::PARAM_STR);\n\
    \    // execute and get number of affected rows\n    $stmt->execute();\n    $OK\
    \ = $stmt->rowCount();\n}\n```\n\n如果已上传图像，高亮显示的条件语句将`$image_id`的值绑定到命名的`:image_id`占位符。但如果没有上传图像，`bindValue()`将值设置为`NULL`。\n\
    \n在步骤 4 中，PDO 版本使用`exec()`而不是`query()`将值插入`article2cat`表。`exec()`方法执行 SQL 查询并返回受影响的行数，因此当不需要预处理语句时，应将其与`INSERT`、`UPDATE`和`DELETE`查询一起使用。\n\
    \n另一个重要区别在于构建错误消息的代码（如果出现问题）。由于在 PDO 中创建和准备语句是一个步骤，因此语句对象可能不存在（如果出现问题）。因此，在尝试调用`errorInfo()`方法之前，需要检查其是否存在。如果没有语句，则从数据库连接对象获取错误消息。还需要将`$error`初始化为空字符串，以便将各种消息拼接到其中，如下所示：\n\
    \n```\n// redirect if successful or display error\nif ($OK && !isset($imageError)\
    \ && !isset($catError)) {\n    header('Location: http://localhost/phpsols/admin/blog_list_pdo.php');\n\
    \    exit;\n} else {\n    $error = '';\n    if (isset($stmt)) {\n        $errorInfo\
    \ = $stmt->errorInfo();\n    } else {\n        $errorInfo = $conn->errorInfo();\n\
    \    }\n    if (isset($errorInfo[2])) {\n        $error .= $errorInfo[2];\n  \
    \  }\n    if (isset($imageError)) {\n        $error .= ' ' . $imageError;\n  \
    \  }\n    if (isset($catError)) {\n        $error .= ' ' . $catError;\n    }\n\
    }\n```\n\n## 更新和删除多表中的记录\n\n`categories`和`article2cat`表的添加意味着上一章中 PHP Solutions\
    \ 15-2 和 15-3 中的`blog_update_mysqli.php`和`blog_update_pdo.php`的更改不再充分覆盖`phpsols`数据库中的外键关系。除了修改更新表单外，你还需要创建脚本来删除记录而不破坏数据库的引用完整性。\n\
    \n### 更新交叉引用表中的记录\n\n交叉引用表中的每条记录仅包含一个复合主键。通常，主键绝不应更改。此外，它们必须是唯一的。这对更新`article2cat`表带来了问题。如果在更新博客条目时不对选中的分类进行任何更改，则无需更新交叉引用表。但是，如果更改了分类，则需要确定要删除哪些交叉引用以及要插入哪些新引用。\n\
    \n与其纠结于是否进行了任何更改，一个简单的解决方案是删除所有现有的交叉引用，然后重新插入选中的分类。如果没有进行任何更改，只需重新插入相同的分类即可。\n"
- fmt: "#### PHP Solution 16-5: Adding categories to the update form\n\nThis PHP solution\
    \ amends `blog_update_mysqli.php` from PHP Solution 15-2 in the previous chapter\
    \ to allow you to update the categories associated with a blog entry. To keep\
    \ the structure simple, the only change that can be made to the image associated\
    \ with the entry is to select a different existing image or no image at all.\n\
    \nContinue working with `blog_update_mysqli.php` from PHP Solution 15-2. Alternatively,\
    \ copy `blog_update_mysqli_04.php` from the `ch16` folder and save it in the `admin`\
    \ folder as `blog_update_mysqli.php`. When the page first loads, you need to run\
    \ a second query to get the categories associated with the blog entry. Add the\
    \ following highlighted code to the conditional statement that gets details of\
    \ the selected record:\n\n```\n$stmt->free_result();\n\n// get categories associated\
    \ with the article\n$sql = 'SELECT cat_id FROM article2cat\nWHERE article_id =\
    \ ?';\n\nif ($stmt->prepare($sql)) {\n    $stmt->bind_param('i', $_GET['article_id']);\n\
    \    $OK = $stmt->execute();\n    $stmt->bind_result($cat_id);\n\n    // loop\
    \ through the results to store them in an array\n    $selected_categories = [];\n\
    \    while ($stmt->fetch()) {\n        $selected_categories[] = $cat_id;\n   \
    \ }\n}\n```\n\nThe query selects `cat_id` from all records in the cross-reference\
    \ table that match the primary key of the selected blog entry. The results are\
    \ bound to `$cat_id`, and a `while` loop extracts the values into an array called\
    \ `$selected_categories`.\n\nIn the body of the HTML page, add a multiple-choice\
    \ `<select>` list between the text area and the `<select>` drop-down menu that\
    \ displays the list of images. Use another SQL query to populate it, like this:\n\
    \n```\n<p>\n<label for=\"category\">Categories:</label>\n<select name=\"category[]\"\
    \ size=\"5\" multiple id=\"category\">\n<?php\n// get categories\n$getCats = 'SELECT\
    \ cat_id, category FROM categories\nORDER BY category';\n$categories = $conn->query($getCats);\n\
    while ($row = $categories->fetch_assoc()) {\n?>\n<option value=\"<?= $row['cat_id'];\
    \ ?>\" <?php\nif (isset($selected_categories) &&\nin_array($row['cat_id'], $selected_categories))\
    \ {\necho 'selected';\n} ?>><?= $row['category']; ?></option>\n<?php } ?>\n</select>\n\
    </p>\n```\n\nThe `while` loop builds each `<option>` tag by inserting `cat_id`\
    \ in the `value` attribute and displaying the category between the opening and\
    \ closing tags. If `cat_id` is in the `$selected_categories` array, `selected`\
    \ is inserted in the `<option>` tag. This selects the categories already associated\
    \ with the blog entry.\n\nSave `blog_update_mysqli.php` and select one of the\
    \ `EDIT` links in `blog_list_mysqli.php` to make sure the multiple-choice list\
    \ is populated with the categories. If you inserted a new entry in PHP Solution\
    \ 16-4, the categories you associated with the item should be selected, as shown\
    \ in the following screenshot.\n\nYou can check your code, if necessary, against\
    \ `blog_update_mysqli_05.php` in the `ch16` folder. The PDO version is found in\
    \ `blog_update_pdo_05.php`.\n\nNext, you need to edit the section of code that\
    \ updates the record when the form is submitted. The new code begins by removing\
    \ all entries in the cross-reference table that match `article_id` and then inserts\
    \ the values selected in the update form. Inline comments indicate where existing\
    \ code has been omitted to save space.\n\n```\n// if form has been submitted,\
    \ update record\nif (isset($_POST ['update'])) {\n    // prepare update query\n\
    \    if (!empty($_POST['image_id'])) {\n        // existing code omitted\n   \
    \ } else {\n        // existing code omitted\n        $stmt->execute();\n    }\n\
    \n    // delete existing values in the cross-reference table\n    $sql = 'DELETE\
    \ FROM article2cat WHERE article_id = ?';\n    if ($stmt->prepare($sql)) {\n \
    \       $stmt->bind_param('i', $_POST['article_id']);\n        $stmt->execute();\n\
    \    }\n\n    // insert the new values in articles2cat\n    if (isset($_POST['category'])\
    \ && is_numeric($_POST['article_id'])) {\n        $article_id = (int) $_POST['article_id'];\n\
    \        foreach ($_POST['category'] as $cat_id) {\n            $values[] = \"\
    ($article_id, \" . (int) $cat_id . ')';\n        }\n        if ($values) {\n \
    \           $sql = 'INSERT INTO article2cat (article_id, cat_id)\n           \
    \ VALUES ' . implode(',', $values);\n            if (!$conn->query($sql)) {\n\
    \                $catError = $conn->error;\n            }\n        }\n    }\n\
    }\n```\n\nThe code that inserts the values selected in the update form is identical\
    \ to the code in step 4 of PHP Solution 16-4. The key thing to note is that it\
    \ uses an `INSERT` query, not `UPDATE`. The original values have been deleted,\
    \ so you're adding them anew.\n\nSave `blog_update_mysqli.php` and test it by\
    \ updating existing records in the `blog` table. You can check your code, if necessary,\
    \ against `blog_update_mysqli_06.php` in the `ch16` folder. The PDO version is\
    \ found in `blog_update_pdo_06.php`.\n\n### Preserving referential integrity on\
    \ deletion\n\nIn PHP Solution 16-5, there was no need to worry about referential\
    \ integrity when you deleted records in the cross-reference table because the\
    \ values stored in each record are foreign keys. Each record simply refers to\
    \ the primary keys stored in the `blog` and `categories` tables. Referring to\
    \ Figure 16-1 at the beginning of this chapter, deleting from the cross-reference\
    \ table the record that combines `article_id 2` with `cat_id 1` simply breaks\
    \ the link between the article titled \"Trainee Geishas Go Shopping\" and the\
    \ `Kyoto` category. Neither the article nor the category is affected. They both\
    \ remain in their respective tables.\n\nThe situation is very different if you\
    \ decide to delete either the article or the category. If you delete the \"Trainee\
    \ Geishas Go Shopping\" article from the `blog` table, all references to `article_id\
    \ 2` must also be deleted from the cross-reference table. Similarly, if you delete\
    \ the `Kyoto` category, all references to `cat_id 1` must be removed from the\
    \ cross-reference table. Alternatively, you must halt the deletion if an item's\
    \ primary key is stored elsewhere as a foreign key.\n\nThe best way to do this\
    \ is through the establishment of foreign-key restraints. To do so, related tables\
    \ must use the InnoDB storage engine. If you're using MySQL or MariaDB 5.5 or\
    \ later, InnoDB is the default. Also, all the `.sql` files that accompany this\
    \ book select the InnoDB engine. However, if you have existing tables that were\
    \ created using the MyISAM storage engine, you need to convert them before you\
    \ can establish foreign-key constraints.\n\n#### PHP Solution 16-6: Converting\
    \ tables to the InnoDB storage engine\n\nThis PHP solution shows how to convert\
    \ a table from MyISAM to InnoDB. If you plan to upload the tables to your remote\
    \ server, it must also support InnoDB (see PHP Solution 16-1).\n\nSelect the `phpsols`\
    \ database in phpMyAdmin, and then select the `article2cat` table. Click the Operations\
    \ tab at the top right of the screen. In the Table options section, the Storage\
    \ Engine field reports which engine the table is currently using. If it says MyISAM,\
    \ select InnoDB from the drop-down menu, as shown in Figure 16-10.\n\nChanging\
    \ a table's storage engine is very easy in phpMyAdmin. Click `Go`. Changing the\
    \ storage engine is as simple as that!\n\nEach table needs to be converted individually.\
    \ You cannot change all tables in a database in a single operation."
