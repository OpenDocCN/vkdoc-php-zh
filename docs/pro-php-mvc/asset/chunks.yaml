- fmt: 'Let’s now see how to use this class in our Users controller, where we modify
    the `profile()` action. Take a look at Listing 24-6.


    **Listing 24-6.** The Modified `profile()` Action


    ```

    class Users extends CI_Controller


    {


    public function profile()


    {


    // check for user session


    $this->_isSecure();


    // get profile photo


    $this->load->model("file");


    $file = File::first(array(


    "user" => $this->user->id


    ));


    // get thumbnail


    $this->load->library("thumbnail", array(


    "file" => $file


    ));


    $filename = $this->thumbnail->getFilename();


    // load view


    $this->load->view("users/profile", array(


    "user" => $this->user,


    "filename" => $filename


    ));


    }


    }

    ```


    There are two new aspects to our `profile()` action. The first is that we get
    the first `File` row from the database. The second is that we need to pass this
    to `$this->load->library()`. This will initialize the `Thumbnail` class with the
    file we want the thumbnail of.


    **Note** You can learn more about the nuances of resource loading in CodeIgniter,
    at [http://codeigniter.com/user_guide/libraries/loader.html](http://codeigniter.com/user_guide/libraries/loader.html).


    Finally, we need to change the `profile.html` view and the main `.htaccess` files,
    as demonstrated in Listings 24-7 and 24-8.


    **Listing 24-7.** The Modified `.htaccess` File


    ```

    RewriteEngine on


    RewriteCond $1 !^(index\.php|images|uploads|robots\.txt)


    RewriteRule ^(.*)$ /index.php/$1 [L]

    ```


    **Listing 24-8.** The Modified `profile.html` View


    ```

    <?php if ($filename): ?>


    <img src="/uploads/<?php echo $filename; ?>" />


    <?php endif; ?>


    <h1><?php echo $user->first; ?> <?php echo $user->last; ?></h1> This is a profile
    page!

    ```


    The change we make to the `.htaccess` file (in the regular expression) allows
    calls to files in the `uploads` directory. We also add the profile photo to the
    `profile.html` view if it has been provided from the controller.


    **Note** In terms of security, file upload directories shouldn’t be web accessible,
    or should have strict `.htaccess` rules protecting against the execution of scripts
    within the `uploads` directory. Web sites often break when malicious users are
    able to upload scripts and execute them on the server, usually through interfaces
    designed specifically to allow file uploads!


    ## Extending the Core


    The last thing we need to cover is how to extend CodeIgniter core classes. The
    trick to this is to add classes in the `application/core` directory that match
    the name of the core classes, with a special prefix. If we wanted to create a
    controller from which our application can inherit, we simply need to create a
    `MY_Controller.php` file within this directory, as shown in Listing 24-9.


    **Listing 24-9.** `application/core/MY_Controller.php`


    ```

    class MY_Controller extends CI_Controller


    {


    public $user;


    public static function redirect($url)


    {


    header("Location: {$url}");


    exit();


    }


    protected function _isSecure()


    {


    // get user session


    $this->_getUser();


    if (!$this->user)


    {


    self::redirect("/login");


    }


    }


    protected function _getUser()


    {


    // load session library


    $this->load->library("session");


    // get user id


    $id = $this->session->userdata("user");


    if ($id)


    {


    // load user model


    $this->load->model("user");


    // get user


    $this->user = new User(array(


    "id" => $id


    ));


    }


    }


    }

    ```


    The important things to note about extended core classes are that the file name
    must match the `my_*` pattern and that the custom core class must extend the built-in
    core class. We can move the `redirect()`, `_isSecure()`, and `_getUser()` methods
    into this new class, since any controller can reuse them.


    **Note** There’s a lot more to know about extending core classes, and you can
    learn more at [http://codeigniter.com/user_guide/general/core_classes.html](http://codeigniter.com/user_guide/general/core_classes.html).


    ## Questions


    1. In our original application we also created a `File` model to store a reference
    to uploaded files in the database. Why do we not simply search the `uploads` directory
    for the file belonging to the user?

    2. In our original application we also created a special `/thumbnails/*` route
    for thumbnail generation, and then integrated the thumbnail generation into the
    controller. Are there any drawbacks to this new approach?


    ## Answers


    1. We involve the database in file lookups simply because it is faster to query
    the database than it is to iterate over files in the file system. We could make
    things even faster by caching a list of files belonging to the user.

    2. There are two drawbacks to this new approach. The first is that the controller
    now needs to be aware of how the thumbnails are generated. The second is that
    thumbnails are less dynamic—you can no longer simply request a new thumbnail size,
    because it has to be coded!


    ## Exercises


    1. We’ve learned about the drawbacks to this approach of thumbnail generation.
    Now re-create our previous approach with CodeIgniter MVC.

    2. We also learned about how to extend core classes, and did so with the `CI_Controller`
    class. Try replicating this idea with the models we have created, by moving reusable
    code into an extended `CI_Model` subclass.


    # Chapter 25 CodeIgniter: Testing


    We conclude the section on CodeIgniter by looking at how we can unit test our
    CodeIgniter applications with built-in CodeIgniter classes.


    ## Goals


    - We need to find out what CodeIgniter offers in the way of unit testing.

    - We need to see what alternatives we have.


    ## Tools


    CodeIgniter provides a simple unit-testing class that you can use to write tests
    for your CodeIgniter applications.


    It has one method you can use to add more tests, and one method to return the
    formatted results. Let’s look at an example of how to use it, as shown in Listing
    25-1.


    **Listing 25-1.** Using the CodeIgniter Unit-Testing Class


    ```

    class Welcome extends CI_Controller


    {


    public function index()


    {


    $this->load->view(''welcome_message'');


    }


    public function tests()


    {


    $this->load->library("unit_test");


    $test = $this->testing();


    $expected_result = "hello world";


    $test_name = "testing function returns hello world";


    $this->unit->run($test, $expected_result, $test_name);


    echo $this->unit->report();


    }


    public function testing()


    {


    return "hello world";


    }


    }

    ```


    As Listing 25-1 shows, you may use the unit-testing library supplied by CodeIgniter
    to compare only two values (one of them presumably the result of the call to an
    action or function). This is a little limiting in terms of testing how actions
    perform when supplied posted form data.


    Another limitation that we need to be aware of is that the unit testing that CodeIgniter
    allows has to occur within the MVC architecture. This couples the tests closely
    with the framework they should be testing, which is never a good thing.


    ### The Alternative


    You are far better off using a third-party library to test the functionality of
    your CodeIgniter applications.


    A unit-testing library, such as `PHPUnit`, includes a multitude of different assertion
    functions to test not only the equality of two values but also the size of arrays,
    the type of exceptions thrown, whether files exist in a directory, and more.


    **Note** If you would like to download or learn more about `PHPUnit`, you can
    do so at [https://github.com/sebastianbergmann/phpunit](https://github.com/sebastianbergmann/phpunit).


    You can utilize third-party unit-testing libraries by including them in the `application/libraries`
    folder (as we did in the Chapter 24), or even separating them out of the application
    altogether. The choice is yours.'
