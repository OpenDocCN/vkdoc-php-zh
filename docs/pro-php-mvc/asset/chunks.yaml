    return null;


    }


    public static function split($string, $pattern, $limit = null)


    {


    $flags = PREG_SPLIT_NO_EMPTY | PREG_SPLIT_DELIM_CAPTURE;


    return preg_split(self::_normalize($pattern), $string, $limit, $flags);


    }


    }


    }


    The $delimiter and _normalize() members are all for the normalization of regular
    expression strings, so that the remaining methods can operate on them without
    first having to check or normalize them. The match() and split() methods perform
    similarly to the preg_match_all() and preg_split() functions, but require less
    formal structure to the regular expressions, and return a more predictable set
    of results. The match() method will return the first captured substring, the entire
    substring match, or null. The split() method will return the results of a call
    to the preg_split() function, after setting some flags and normalizing the regular
    expression.


