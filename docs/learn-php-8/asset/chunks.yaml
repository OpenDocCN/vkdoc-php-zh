- fmt: "\n示例 [4-13](#394210_2_En_4_Chapter.xhtml#PC43) 第三行对象的创建方式略有变化。\n\n```\n$lab\
    \ = new Dog('Fred','Lab','Yellow','100');\n```\n\n现在我们通过构造函数将初始值（`Fred`、`Lab`、`Yellow`\
    \ 和 `100`）传入对象。否则，我们需要调用四次 `set` 方法（`set_dog_name`、`set_dog_breed`、`set_dog_color`\
    \ 和 `set_dog_weight`）才能达到相同效果。这允许我们在初始设置对象（`$lab`）后，使用 `set` 方法进行所需的更新。\n\n为了确定四个属性的更新是否成功，我们必须从对象中的\
    \ `$error_message` 属性检索值（`TRUE`、`TRUE`、`TRUE`、`TRUE`）。`Dog` 类中的 `__toString` 方法允许我们通过将\
    \ `$lab` 视为字符串来实现这一点。这允许我们使用 `explode` 方法以类似 `get_properties` 方法输出的方式进行操作。\n\n\
    ```\nlist($name_error, $breed_error, $color_error, $weight_error) = explode(',',\
    \ $lab);\n```\n\n这行代码将按照逗号分割 `$lab` 的内容（`TRUE`、`TRUE`、`TRUE`、`TRUE`），并将每个部分放入属性\
    \ `$name_error`、`$breed_error`、`$color_error` 和 `$weight_error` 中。这些属性现在每个都应包含字符串\
    \ `'TRUE'`。然后，我们可以使用与评估 `set` 方法结果非常相似的技术来评估这些消息，以查看更新是否成功。\n\n```\nprint $name_error\
    \ == 'TRUE' ? 'Name update successful' : 'Name update not successful';\n```\n\n\
    这种格式与评估 `set` 方法结果的相似语句之间只有几个小的差异。这些代码行中的每一行都使用不同的错误消息进行评估（`$name_error`、`$breed_error`、`$color_error`\
    \ 和 `$weight_error`）。之前，我们对所有 `set` 方法的结果使用相同的属性（`$error_message`）。现在我们评估字符串 `'TRUE'`\
    \ 而不是常量 `TRUE`（代码中唯一的区别是实际引号）。\n\n在图 [4-5](#394210_2_En_4_Chapter.xhtml#Fig5)\
    \ 中，前四行输出是通过将值传递给构造函数以为每个属性提供初始设置而产生的。接下来的四行输出是在使用 `set` 方法更改属性中的值时产生的。最后四行是通过执行\
    \ `get` 方法（显示每个属性的内容）产生的。最后一行输出是由 `get_properties` 方法产生的。尽管初始值（`Fred`、`Lab`、`Yellow`\
    \ 和 `100`）成功传递给了构造函数，但每个属性中的值可以使用 `set` 方法（传递 `Sally`、`Labrador`、`Brown` 和 `5`）进行更改。\n\
    \n![../images/394210_2_En_4_Chapter/394210_2_En_4_Fig5_HTML.jpg](images/394210_2_En_4_Chapter/394210_2_En_4_Fig5_HTML.jpg)\n\
    \n图 4-5  \n来自 `dog.php` 和 `lab.php` 的输出，使用了 `constructor`、`set` 和 `get` 方法\n\n\
    *   *安全性与性能 — 有些人可能会认为，每次更新都检查错误有些过度。然而，在当前数据不断被篡改的环境下，执行更新时尽可能谨慎是必要的。没有程序能 100%\
    \ 防止数据损坏。希望你已经注意到，一旦养成了检查数据的习惯，你的数据检查代码行每次都会变得非常相似。因此，通过复制和粘贴（稍作修改）那些成功验证数据的代码行，你可以在不增加过多额外编码时间的情况下大大增强安全性。*\n\
    \n动手实践\n\n1.  本章涉及了许多 PHP 示例和术语。为了帮助你澄清当前在理解 PHP 语言时可能遇到的任何困难，请访问以下网站获取更多教程：\n\
