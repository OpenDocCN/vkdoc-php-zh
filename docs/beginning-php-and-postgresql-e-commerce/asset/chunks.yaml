    ■**Caution** 是的，制造一个“添加到购物车”链接就是这么简单！这种简单性的缺点是它可能被用于对您不利的用途。在PayPal确认付款后，您可以将产品运送给客户。每次付款时，您都需要仔细检查产品价格是否对应正确的金额，因为任何人都很容易向购物车添加一个虚假产品，或添加一个价格被修改的现有产品。这可以通过伪造一个PayPal“添加到购物车”链接并导航到它来实现。您可以在`http://www.alphabetware.com/pptamper.asp`阅读关于此问题的详细文章。


    添加“添加到购物车”和“查看购物车”按钮后，网站将如图6-1所示。


    **Figure 6-1.** *HatShop with* Add to Cart *and* View Cart *buttons*


    您将在下一个练习中实施PayPal集成。


