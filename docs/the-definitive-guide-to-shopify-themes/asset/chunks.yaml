    \ Shopify 主题的上下文中：\n\n-   避免编写因页面中不存在某个 DOM 元素或未使用特定 Liquid 模板而失败的代码。其他第三方代码、应用程序或开发者可能已经调整了主题。\n\
    -   在 Liquid 代码中分配变量时，尽量使用唯一的变量名，以避免覆盖其他代码可能依赖的通用名称（例如，使用 `{% assign first_related_product\
    \ ... %}` 而不是 `{% assign product ... %}`）。\n-   对于 JavaScript，如果 jQuery 或其他库不在你的直接控制之下，请不要假设它们存在。如果必须使用，则从你的脚本中自行加载它们，但要避免编写加载八个不同版本\
    \ jQuery 的代码（是的，我亲眼见过）。\n-   同样对于 JavaScript，避免编写需要特定执行顺序或需要在页面顶部执行的代码。这样做不仅能避免代码中许多常见的功能性问题，还能让你更容易构建高性能的主题（见第\
    \ 10 章）。\n\n采用模块化编程，我们尝试将主题分解为具有单一逻辑功能的小型、独立的组件。这能让我们在任意时刻需要记住的知识量降到最低，并使修改代码变得更加容易。它还允许我们以最小的麻烦在主题的其他地方重用这些组件。\n\
    \n作为一个实际例子，请考虑图 3-1，这是一个处理动态送货目的地、货币和变体选项的 Shopify 产品页面。\n\n![A437216_1_En_3_Fig1_HTML.jpg](img/A437216_1_En_3_Fig1_HTML.jpg)\n\
    \n图 3-1  \n一个标有多个动态页面元素的 Shopify 产品页面\n\n当客户更改目的地国家、客户货币或产品选项时，可能需要对页面进行各种更新（特色图片、页眉中的客户支持号码、显示的价格等）。我们可以通过一个大的\
    \ JavaScript 回调函数来处理所有页面的更新，但一个更清晰的解决方案是将页面上的每个框分解成各自独立的组件，这些组件监听相关事件，并且只关注更新自身。\n\
    \n这种方法允许我们编写像清单 3-4 这样的小段代码，该代码负责在所选变体或货币发生变化时更新显示的价格元素。\n\n```\n$(document).on('variant.changed\
    \ currency.changed', function(e, variant, currency) {\nvar formattedPrice = Currency.format(variant.price,\
    \ currency);\n$('[data-variant-price]').text(formattedPrice);\n});\n清单 3-4\n针对图\
    \ 3-1 中产品页面的模块化 JavaScript 函数\n```\n\n如果你以后想更改显示价格的渲染方式，可以在这个代码片段中修改，而无需担心影响其他任何东西。同样，如果你想更改\
    \ `variant changed` 或 `currency changed` 事件的触发方式，也可以在不了解此价格组件实现细节的情况下进行修改。\n"
- fmt: '# Principles of Process


    No two theme building processes are going to be the same—every designer, developer,
    and agency is going to approach things their own way, and even within that you’ll
    see variation depending on the client or project.


    Without the possibility of a single prescriptive guideline for a winning Shopify
    theme development process, what I’ve tried to do in this section is identify four
    important things that I’ve seen successful developers commonly focus on.


    ## Client and Project Match


    Projects where you and the client are comfortable with each other and feel like
    you’re collaborating rather than undertaking a transaction generally see much
    better results. Make sure you spend some time upfront getting to know the client
    and what they’re after before committing to a project.


    Ask yourself questions like these:


    - Do I feel comfortable talking to the client? Do I get on well with them?

    - Am I motivated by what the client does?

    - Is the project interesting on a technical level?

    - Will my opinion and expertise be valued, or am I seen as “just a pair of hands”?

    - Most importantly—do I feel like delivering this project will result in success
    for the client?


    Depending on the situation, you may be in a position where you feel you should
    say yes despite a sense that the project isn’t right for you or the client. While
    you need to make your own judgment calls, my experience (and the experience of
    many others in the industry) is that your gut instinct is often accurate and such
    relationships and projects falter.


    ## Iterative Development and Client Investment


    For the clients you do end up working with, it’s important to make sure that they
    are closely involved with the design and development of the theme along the way.
    Kicking off a project, disappearing for three months, and coming back with a “finished”
    product is a sure-fire way to deliver something the client doesn’t want, need,
    or feel invested in.


    You do need to drive and manage your development process to avoid being micromanaged
    by the client, but ensure that the process includes plenty of structured ways
    for your client to give feedback, discuss use cases, and test possible design
    options. A common technique is to plan design and development in short (one to
    two week) “sprints” or “cycles,” with each sprint or cycle having its own specific
    goals and opportunities for you to present progress and receive feedback.


    Planning for an iterative approach upfront also makes it easier to factor inevitable
    changes into your timelines and budget, and ultimately makes it more likely that
    you can deliver something that meets the client’s needs. Having the clients regularly
    involved in the feedback and iteration process also gives them a greater sense
    of ownership in the final product.


    ## Expectation Setting


    The culprit for many projects and client relationships gone bad is poor expectation
    setting. This is sometimes due to poor communication from the client, but most
    of the time it’s freelancers or agencies that haven’t been clear about the nature
    of deliverables, what the timeline for them is, where the scope and boundaries
    of a project are, and what the breakdown of responsibilities are.


    A good development process should present the client with such a breakdown, clearly
    delineating things that are in-scope (e.g., a code for a polished theme that matches
    the developed mockups and wireframes) and things that aren’t (e.g., the data entry
    of 5,000 SKUs into the Shopify backend). Timelines should be set in a way that’s
    realistic and that account for the time needed for parties to provide feedback,
    conduct research, and handle revisions to the original scope.


    Finally, it must be noted that expectations aren’t a one-way street. It’s important
    that you make it clear to clients what your expectations are of them, whether
    it’s providing timely feedback on your latest iteration, sending over copy and
    images, or payment of invoices. For each of these expectations, be clear about
    the consequences on timelines and deliverables of failing to meet them.


    ## User Testing


    Regardless of store or project size, one of the most useful yet most often overlooked
    things to do is user testing—getting actual people to sit down and use your theme.
    Without any hard data to back this up, my suspicion for the reason behind this
    neglect is that the expected (indeed, the desired) outcome of user testing is
    more work—fixing user experience issues you weren’t previously aware of.


    The solution is simple—plan and budget for it as part of your process, making
    room in your timeline (and in your ego) for addressing issues brought about by
    your theme’s assumptions around usability.


    The simplest form of user testing (and really, there’s no excuse for not doing
    this even on a shoestring budget) is the “coffee shop or office coworker” test.
    Find someone who’s never seen your site before, sit them in front of a desktop
    or mobile device, and give them a task to complete like “find a sweater you like
    and buy it” or “find all shoes from a particular designer.” Watch over their shoulder,
    take copious notes (record the sessions if possible) and, above all, bite your
    tongue and do not help them. No design survives first contact with actual users,
    and I can guarantee you’ll be exposed to a number of usability issues you weren’t
    previously aware of.


    For larger projects, you may want to invest the time and money in professional
    user testing, either by engaging a company specializing in it or by using an online
    user testing service. Using such services can be advantageous over the less formal
    “over the shoulder” approach, as they help you conduct the testing at scale while
    also selecting a demographic that more accurately reflects your store’s visitor
    makeup.


    Finally, once you deploy your theme, you can keep an eye on the actual visitors
    coming to your site to identify potential usability problems. In a recent project,
    we made some customizations to the Shopify checkout flow, collecting some additional
    information from customers on the way. The changes were quite significant, both
    on the frontend and also in terms of the resulting data flowing through to a third-party
    logistics system, so we took a pretty cautious approach to deployment. The first
    step was to conduct thorough testing of the frontend using the “over the shoulder”
    approach and with a range of different browsers and devices.


    We then conducted a live test of the changes for an hour and recorded the actions
    of every single user session going through the checkout flow with user analytics
    tool Hotjar ( [`https://www.hotjar.com`](https://www.hotjar.com) ). Reverting,
    we could then go through every recording to see exactly how users were interacting
    with the new interface and where they were getting stuck or delayed.


    This method picked up a couple of usability issues that were obvious once we saw
    them but just hadn’t cropped up until contact with real customers. One of the
    most obvious is shown in Figure [3-2](#A437216_1_En_3_Chapter.html#Fig2). The
    clickable area of a new button design was smaller than the visual area of the
    button, meaning a lot of users were failing to activate it properly and consequently
    move to the next checkout step.


    ![A437216_1_En_3_Fig2_HTML.jpg](A437216_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    The clickable area (green/darker) of one of our custom checkout buttons before
    user testing (left) and after correction (right)'
