- "# 1. 引言\n\n电子补充材料 本章的在线版本（doi:[10.1007/978-1-4842-1672-9_1](http://dx.doi.org/10.1007/978-1-4842-1672-9_1)）包含补充材料，授权用户可获取。\n\
  \n在本书中，你将学习如何开发一个电子商务网站。电子商务，也称为电商，是指通过计算机/智能手机利用互联网购买和销售产品或服务。如今，几乎所有企业都需要一个电子商务网站。为什么呢？以下是一些原因：\n\
  \n- 在线销售无需办公空间或任何产品展示空间。\n- 你可以全天候/每周 7 天/每年 365 天进行销售；没有商店营业时间的限制。\n- 消费者可以在家中方便且随时购买。他们可以节省大量在交通拥堵中前往商店所浪费的时间。\n\
  - 你可以将产品销往全球。\n- 资金在线转移快速、方便且用户友好。\n\n因此，大多数公司都通过开发电子商务网站在互联网上展示自己的存在。你在本书中将要学习开发的电子商务网站将销售几乎所有商品，包括书籍、智能手机、笔记本电脑等。该网站将通过一个下拉菜单展示不同的产品类别，并在顶部提供一个搜索框。用户可以选择产品并在线支付。该网站将所有产品、订单和客户信息存储在数据库中。\n\
  \n尽管你可以通过不同网站托管提供商提供的免费电子商务网站设计工具非常轻松地创建一个网站，但这会存在以下限制：\n\n- 设计工具可能不够灵活。菜单、表格和其他界面可能不适合你的需求。\n\
  - 你可能会遇到数据库连接和其他身份验证过程的问题。\n- 你可能无法获得支持来获取网站管理任务所需的信息。\n- 如果你通过其专利工具构建网站，那么更换网站托管商将会非常困难。\n\
  \n因此，你将从头开始使用 PHP 开发这个电子商务网站。\n\n在本章中，你将学习：\n\n- 全书将制作的电子商务网站的概要\n- 开发网站所需的软件\n\
  - 安装 WampServer\n- 配置 MySQL\n- 网站中所需的数据库表的详细信息\n\n\n\n## 为什么选择 PHP？\n\nPHP 全称为“PHP\
  \ 超文本预处理器”，是开发者中最流行的 Web 脚本引擎之一。问题是，它为何如此受欢迎？\n\n原因有很多，但首要的一点是它是一种服务器端脚本语言，因此所有\
  \ PHP 脚本都是在服务器而非客户端机器上执行的。因此，脚本执行消耗的是服务器资源而非客户端资源。在本书中，你也会在适当且有必要使用的地方看到一些客户端的 `JavaScript`\
  \ 代码。\n\nPHP 脚本在服务器上运行，其输出以纯 HTML 形式发送给客户端，这使其非常安全。网站访客永远无法通过浏览器的“查看源代码”选项看到 PHP\
  \ 源代码，他们只能看到 PHP 脚本的输出，即纯 HTML。\n\n除此之外，PHP 支持众多数据库（`MySQL`、`Informix`、`Oracle`、`Sybase`、`Solid`、`PostgreSQL`、`Generic\
  \ ODBC` 等）。因此你可以将客户信息、访客信息、服务及产品信息存入数据库，并在需要时随时检索。\n\nPHP 是开源软件（OSS），可免费获取，使用 PHP\
  \ 无需付费。而且，有庞大的社区参与开发和增强 PHP 特性，这确保了更快的错误修复和更完善的功能更新。\n\nPHP 通常运行在一个名为 `LAMP` 的开源平台上。`LAMP`\
  \ 的全称是 `Linux`、`Apache`、`MySQL` 和 `PHP`。同样得益于开源，该平台能得到全球开发者持续的支持。\n\nPHP 可以轻松嵌入\
  \ HTML 标签和脚本。因此，不那么重要的代码可以用 HTML 编写，关键代码则用 PHP 编写。这种组合比纯 PHP 编写的代码运行速度更快。\n\nPHP\
  \ 可运行于任何平台——`Linux`、`Unix`、`Mac OS X` 和 `Windows`。此外，PHP 拥有垃圾回收机制和高效的内存管理器，能优化任何站点的内存消耗。\n\
  \n## 电子商务网站的外观\n\n让我们快速预览一下本书的最终成果。你将贯穿全书开发的电子商务网站，其外观将如下列图示所示。\n\n启动购物车网站后，你看到的第一个界面如图\
  \ 1-1 所示。\n\n![A978-1-4842-1672-9_1_Fig1_HTML.jpg](img/A978-1-4842-1672-9_1_Fig1_HTML.jpg)\n\
  \n图 1-1. 启动电子商务网站后的第一个界面\n\n可以看到顶部是包含网站标题的页眉，右上角是一个购物车图标（方便用户了解购物车已选了什么）。页眉下方是一个下拉菜单，显示网站上可用的产品类别列表（见图\
  \ 1-2）。\n\n![A978-1-4842-1672-9_1_Fig2_HTML.jpg](img/A978-1-4842-1672-9_1_Fig2_HTML.jpg)\n\
  \n图 1-2. 显示不同产品类别的下拉菜单\n\n如果你选择一个类别，比如“笔记本电脑”，来查看该类别下的所有产品，你将看到如图 1-3 所示的输出。\n\n\
  ![A978-1-4842-1672-9_1_Fig3_HTML.jpg](img/A978-1-4842-1672-9_1_Fig3_HTML.jpg)\n\n\
