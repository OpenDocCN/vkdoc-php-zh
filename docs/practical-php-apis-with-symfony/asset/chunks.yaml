    \    name: OperationNames::SendPayment->name,\n    input: SendPaymentInput::class,\n\
    \    useValidationGroups: false,\n    background: new Background(300)\n)]\nclass\
    \ SendPaymentOperation implements OperationInterface\n{\n    // Rest of the methods\n\
    }\n```\n\nIn the above example, we indicate that the `SendPayment` operation will\
    \ be executed in the background and its execution will be delayed 300 seconds\
    \ (5 minutes).\n\n### Conclusion\n\nWe have extended the existing `OperationMetadata`\
    \ attribute by adding a new parameter that allows us to indicate whether a specific\
    \ operation should be executed in the background. By setting this flag, we signal\
    \ that the operation's execution can be asynchronous and decoupled from the user's\
