- fmt: 'The first test posts some user data to the `register.html` form and checks
    to see whether this leads to a response indicating a user account was created.
    The second test is similar except that it posts instead to the `login.html` form
    with user details matching those of the user account that was created by the first
    test. The validity of the second test is indicated by whether the `Request` instance
    is told to go to a new location.


    Testing can initially seem daunting – it was for me before the first time I tried
    it. The truth is that it’s really quite easy. We’ve not only managed to develop
    our own unit-testing framework code but also a handful of tests which will pave
    the way for you to be able to create even more tests for your projects in the
    future.


    ## Questions


    1. How does testing for the presence of certain fields help us to further ensure
    the stability of our application?

    2. Is there a reason why we should avoid testing forms that require the user to
    be logged in?

    3. What are some other ways in which we can test our application?


    ## Answers


    1. The fields contained in a form are indicative of the action a user should want
    to perform. While fields can change over time, this is a good way to know if something
    has broken the basic structure of each form.

    2. On the contrary, we should be testing everything we can get our hands on. The
    problem is one of session management meeting our `Request` class. Session management
    is tricky even without the added proxy, and this presents problems with tests
    that require valid, secure sessions.

    3. There are a number of things we didn’t test for. One thing that would be relatively
    easy to test is the validity of posted form data. We could knowingly provide invalid
    form data and check the response for validation error messages concerning the
    invalid data. Another thing we could test for is the presence of interface elements
    (such as a consistent navigation menu across multiple pages).


