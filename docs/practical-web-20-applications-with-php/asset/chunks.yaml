    **Operating System**


    The code in this book has been developed and tested on Linux, FreeBSD, and Microsoft
    Windows XP. There are no differences in code required for any of these platforms.
    Note also that references to Linux can typically also include similar platforms
    such as FreeBSD and Mac OS X.


    For Windows there are slight differences in the configuration of the web server,
    as well as in the application configuration file we will develop later in this
    chapter. Each of these differences is noted in the relevant places.


    **Installing the Apache HTTP Server**


    Apache HTTP Server 2.2 is the web server of choice for this book—it is the latest
    stable release of Apache at the time of writing. This web server is available
    for Linux and Windows. Since I can’t guarantee all PHP code in this book will
    work correctly on IIS, you should use Apache if you are using Windows. Alternatively,
    you may choose to use an older version of Apache (such as 1.3 or 2.0). There should
    be no problems with doing so, but this cannot be guaranteed.


    You can download Apache 2.2 fr[om http://httpd.apache.org.](http://httpd.apache.org)
    We will use a typical configuration, enabling all modules (including mod_rewrite,
    which we require in order to use Zend_Controller). You may also wish to include
    extra options that aren’t included by default (such as SSL).


    To install Apache on Windows, you can download the installer from the Apache web
    site, which will take you through the installation step by step.


    The easiest way to install Apache (as well as PHP and MySQL) on Linux is to use
    the packaging system that comes with your operating system (such as Ports on FreeBSD).


    However, if you do not use a packaging system, you can install Apache 2.2.4 on
