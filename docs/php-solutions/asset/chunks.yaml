- fmt: "### Building an Indexed Array\n\nSince PHP 5.4, you have a choice of how to\
    \ define an array in a single statement. The quick way is to use the shorthand\
    \ syntax, which is the same as an array literal in JavaScript. You create the\
    \ array by enclosing a comma-separated list of values between a pair of square\
    \ brackets, like this:\n\n`$shoppingList = ['wine', 'fish', 'bread', 'grapes',\
    \ 'cheese'];`\n\n**Caution**: The comma must go outside the quotes, unlike in\
    \ American typographic practice. For ease of reading, I have inserted a space\
    \ following each comma, but it’s not necessary to do so.\n\nThe alternative is\
    \ to pass a comma-separated list to `array()`, like this:\n\n`$shoppingList =\
    \ array('wine', 'fish', 'bread', 'grapes', 'cheese');`\n\nPHP numbers each array\
    \ element automatically, beginning from 0, so both methods create exactly the\
    \ same array as if you had numbered them individually. To add a new element to\
    \ the end of the array, use a pair of empty square brackets, like this:\n\n`$shoppingList[]\
    \ = 'coffee';`\n\nPHP uses the next number available, so this becomes `$shoppingList[5]`.\n\
    \n### Building an Associative Array\n\nAssociative arrays use the `=>` operator\
    \ (an equal sign followed by a greater-than sign) to assign a value to each array\
    \ key. Using shorthand square-bracket syntax, the structure looks like this:\n\
    \n`$arrayName = ['key1' => 'element1', 'key2' => 'element2'];`\n\nUsing `array()`\
    \ achieves the same outcome:\n\n`$arrayName = array('key1' => 'element1', 'key2'\
    \ => 'element2');`\n\nSo, this is the shorthand way to build the `$book` array:\n\
    \n```\n$book = [\n    'title'     => 'PHP Solutions: Dynamic Web Design Made Easy,\
    \ Third Edition',\n    'author'    => 'David Powers',\n    'publisher' => 'Apress',\n\
    \    'ISBN'      => '978-1-4842-0636-2'\n];\n```\n\nIt’s not essential to put\
    \ the opening and closing brackets on separate lines, nor to align the `=>` operators\
    \ as I have done, but it makes code easier to read and maintain.\n\n### Creating\
    \ an Empty Array\n\nThere are two reasons you might want to create an empty array,\
    \ as follows:\n\n- To create (or initialize) an array so that it’s ready to have\
    \ elements added to it inside a loop\n- To clear all elements from an existing\
    \ array\n\nTo create an empty array, just use an empty pair of square brackets:\n\
    \n`$shoppingList = [];`\n\nAlternatively, use `array()` with nothing between the\
    \ parentheses, like this:\n\n`$shoppingList = array();`\n\nThe `$shoppingList`\
    \ array now contains no elements. If you add a new one using `$shoppingList[]`,\
    \ it will automatically start numbering again at 0.\n\n### Multidimensional Arrays\n\
    \nArray elements can store any data type, including other arrays. For instance,\
    \ the `$book` array holds details of only one book. It might be more convenient\
    \ to create an array of arrays—in other words, a multidimensional array—containing\
    \ details of several books, like this (using square-bracket shorthand):\n\n```\n\
    $books = [\n    [\n        'title'     => 'PHP Solutions: Dynamic Web Design Made\
    \ Easy, Third Edition',\n        'author'    => 'David Powers',\n        'publisher'\
    \ => 'Apress',\n        'ISBN'      => '978-1-4842-0636-2'\n    ],\n    [\n  \
    \      'title'     => 'Beginning PHP and MySQL: From Beginner to Professional,\
    \ Fourth Edition',\n        'author'    => 'W. Jason Gilmore',\n        'publisher'\
    \ => 'Apress',\n        'ISBN'      => '978-1-4302-3114-1'\n    ]\n];\n```\n\n\
    This example shows associative arrays nested inside an indexed array, but multidimensional\
    \ arrays can nest either type. To refer to a specific element, use the key of\
    \ both arrays; for example:\n\n`$books[1]['author']`  // value is `'W. Jason Gilmore'`\n\
    \nWorking with multidimensional arrays isn’t as difficult as it first looks. The\
    \ secret is to use a loop to get to the nested array. Then you can work with it\
    \ in the same way as an ordinary array. This is how you handle the results of\
    \ a database search, which is normally contained in a multidimensional array.\n\
    \n**Tip**: The shorthand syntax works only with PHP 5.4 or later, whereas `array()`\
    \ works with all versions of PHP. Using `array()` has the marginal advantage of\
    \ making the structure easier to visualize, but the array literal syntax borrowed\
    \ from JavaScript involves less typing and is likely to be familiar to most web\
    \ developers. Use whichever you feel comfortable with.\n\n### Using `print_r()`\
    \ to Inspect an Array\n\nTo inspect the contents of an array during testing, pass\
    \ the array to `print_r()` like this (see `inspect_array_01.php`):\n\n`print_r($books);`\n\
    \nLoad `inspect_array_01.php` into a browser to see how `print_r()` outputs the\
    \ contents of an ordinary array. The following screenshot shows how PHP displays\
    \ a multidimensional array (the code is in `inspect_array_02.php`). Often, it\
    \ helps to switch to Source view to inspect the details, as browsers ignore indenting\
    \ in the underlying output. Alternatively, add HTML `<pre>` tags outside the PHP\
    \ code block to preserve the indenting.\n\n![A978-1-4842-0635-5_3_Fige_HTML.jpg](A978-1-4842-0635-5_3_Fige_HTML.jpg)\n\
    \n**Tip**: Always use `print_r()` to inspect arrays; `echo` and `print` don’t\
    \ work. To display the contents of an array in a webpage, use a `foreach` loop,\
    \ as described later in this chapter.\n\n### The Truth According to PHP\n\nDecision-making\
    \ in PHP conditional statements is based on the mutually exclusive Boolean values\
    \ of `true` and `false`. If the condition equates to `true`, the code within the\
    \ conditional block is executed. If `false`, it’s ignored. Whether a condition\
    \ is `true` or `false` is determined in one of these ways:\n\n- A variable set\
    \ explicitly to one of the Boolean values\n- A value PHP interprets implicitly\
    \ as `true` or `false`\n- The comparison of two non-Boolean values\n\n#### Explicit\
    \ Boolean Values\n\nIf a variable is assigned the value `true` or `false` and\
    \ is used in a conditional statement, the decision is based on that value. The\
    \ keywords `true` and `false` are case-insensitive and must not be enclosed in\
    \ quotes; for example:\n\n```\n$OK = false;\n\nif ($OK) {\n    // do something\n\
    }\n```\n\nThe code inside the conditional statement won’t be executed, because\
    \ `$OK` is `false`.\n\n#### Implicit Boolean (“Truthy” and “Falsy”) Values\n\n\
    Using implicit Boolean values provides a convenient shorthand, although it has\
    \ the disadvantage—at least to beginners—of being less clear. Implicit Boolean\
    \ values—or “truthy” and “falsy” values, as they’re sometimes called—rely on PHP’s\
    \ relatively narrow definition of what it regards as `false`, namely:\n\n- The\
    \ case-insensitive keywords `false` and `null`\n- Zero as an integer (`0`), a\
    \ floating-point number (`0.0`), or a string (`'0'` or `\"0\"`)\n- An empty string\
    \ (single or double quotes with no space between them)\n- An empty array\n- SimpleXML\
    \ objects created from empty tags\n\nEverything else is `true`.\n\n**Tip**: This\
    \ explains why PHP interprets `\"false\"` (in quotes) as `true`. It’s a string,\
    \ and all strings—except an empty one—are `true`."
  raw: '#### Building an Indexed Array


    Since PHP 5.4, you have a choice of how to define an array in a single statement.
    The quick way is to use the shorthand syntax, which is the same as an array literal
    in JavaScript. You create the array by enclosing a comma-separated list of values
    between a pair of square brackets, like this:


    `$shoppingList = [''wine'', ''fish'', ''bread'', ''grapes'', ''cheese''];`


    Caution


    The comma must go outside the quotes, unlike in American typographic practice.
    For ease of reading, I have inserted a space following each comma, but it’s not
    necessary to do so.


    The alternative is to pass a comma-separated list to `array()`, like this:


    `$shoppingList = array(''wine'', ''fish'', ''bread'', ''grapes'', ''cheese'');`


    PHP numbers each array element automatically, beginning from 0, so both methods
    create exactly the same array as if you had numbered them individually. To add
    a new element to the end of the array, use a pair of empty square brackets, like
    this:


    `$shoppingList[] = ''coffee'';`


    PHP uses the next number available, so this becomes `$shoppingList[5]`.


    #### Building an Associative Array


    Associative arrays use the `=>` operator (an equal sign followed by a greater-than
    sign) to assign a value to each array key. Using shorthand square-bracket syntax,
    the structure looks like this:


    `$arrayName = [''key1'' => ''element1'', ''key2'' => ''element2''];`


    Using `array()` achieves the same outcome:


    `$arrayName = array(''key1'' => ''element1'', ''key2'' => ''element2'');`


    So, this is the shorthand way to build the `$book` array:


    `$book = [`


    `''title''     => ''PHP Solutions: Dynamic Web Design Made Easy, Third Edition'',`


    `''author''    => ''David Powers'',`


    `''publisher'' => ''Apress'',`


    `''ISBN''      => ''978-1-4842-0636-2''`


    `];`


    It’s not essential to put the opening and closing brackets on separate lines,
    nor to align the `=>` operators as I have done, but it makes code easier to read
    and maintain.


    #### Creating an Empty Array


    There are two reasons you might want to create an empty array, as follows:


    *   To create (or initialize) an array so that it’s ready to have elements added
    to it inside a loop

    *   To clear all elements from an existing array


    To create an empty array, just use an empty pair of square brackets:


    `$shoppingList = [];`


    Alternatively, use `array()` with nothing between the parentheses, like this:


    `$shoppingList = array();`


    The `$shoppingList` array now contains no elements. If you add a new one using
    `$shoppingList[]`, it will automatically start numbering again at 0.


    #### Multidimensional Arrays


    Array elements can store any data type, including other arrays. For instance,
    the `$book` array holds details of only one book. It might be more convenient
    to create an array of arrays—in other words, a multidimensional array—containing
    details of several books, like this (using square-bracket shorthand):


    `$books = [`


    `[`


    `''title''     => ''PHP Solutions: Dynamic Web Design Made Easy, Third Edition'',`


    `''author''    => ''David Powers'',`


    `''publisher'' => ''Apress'',`


    `''ISBN''      => ''978-1-4842-0636-2''`


    `],`


    `[`


    `''title''     => ''Beginning PHP and MySQL: From Beginner to Professional,`


    `Fourth Edition'',`


    `''author''    => ''W. Jason Gilmore'',`


    `''publisher'' => ''Apress'',`


    `''ISBN''      => 978-1-4302-3114-1''`


    `]`


    `];`


    This example shows associative arrays nested inside an indexed array, but multidimensional
    arrays can nest either type. To refer to a specific element, use the key of both
    arrays; for example:


    `$books[1][''author'']  // value is ''W. Jason Gilmore''`


    Working with multidimensional arrays isn’t as difficult as it first looks. The
    secret is to use a loop to get to the nested array. Then you can work with it
    in the same way as an ordinary array. This is how you handle the results of a
    database search, which is normally contained in a multidimensional array.


    Tip


    The shorthand syntax works only with PHP 5.4 or later, whereas `array()` works
    with all versions of PHP. Using `array()` has the marginal advantage of making
    the structure easier to visualize, but the array literal syntax borrowed from
    JavaScript involves less typing and is likely to be familiar to most web developers.
    Use whichever you feel comfortable with.


    #### Using Print_r( ) to Inspect An Array


    To inspect the contents of an array during testing, pass the array to `print_r()`
    like this (see `inspect_array_01.php`):


    `print_r($books);`


    Load `inspect_array_01.` `php`into a browser to see how `print_r()` outputs the
    contents of an ordinary array. The following screenshot shows how PHP displays
    a multidimensional array (the code is in `inspect_array_02.php`). Often, it helps
    to switch to Source view to inspect the details, as browsers ignore indenting
    in the underlying output. Alternatively, add HTML `<pre>` tags outside the PHP
    code block to preserve the indenting.


    ![A978-1-4842-0635-5_3_Fige_HTML.jpg](A978-1-4842-0635-5_3_Fige_HTML.jpg)


    Tip


    Always use `print_r()` to inspect arrays; `echo` and `print` don’t work. To display
    the contents of an array in a webpage, use a `foreach` loop, as described later
    in this chapter.


    ### The Truth According to PHP


    Decision-making in PHP conditional statements is based on the mutually exclusive
    Boolean values of `true` and `false`. If the condition equates to `true`, the
    code within the conditional block is executed. If `false`, it’s ignored. Whether
    a condition is `true` or `false` is determined in one of these ways:


    *   A variable set explicitly to one of the Boolean values

    *   A value PHP interprets implicitly as `true` or `false`

    *   The comparison of two non-Boolean values


    #### Explicit Boolean Values


    If a variable is assigned the value `true` or `false` and is used in a conditional
    statement, the decision is based on that value. The keywords `true` and `false`
    are case-insensitive and must not be enclosed in quotes; for example:


    `$OK = false;`


    `if ($OK) {`


    `// do something`


    `}`


    The code inside the conditional statement won’t be executed, because `$OK` is
    `false`.


    #### Implicit Boolean (“Truthy” and “Falsy”) Values


    Using implicit Boolean values provides a convenient shorthand, although it has
    the disadvantage—at least to beginners—of being less clear. Implicit Boolean values—or
    “truthy” and “falsy” values, as they’re sometimes called—rely on PHP’s relatively
    narrow definition of what it regards as `false`, namely:


    *   The case-insensitive keywords `false` and `null`

    *   Zero as an integer (`0`), a floating-point number (`0.0`), or a string (`''0''`
    or `"0"`)

    *   An empty string (single or double quotes with no space between them)

    *   An empty array

    *   SimpleXML objects created from empty tags


    Everything else is `true`.


    Tip


    This explains why PHP interprets `"false"` (in quotes) as `true`. It’s a string,
    and all strings—except an empty one—are `true`.'
  trans: "\n### 构建索引数组\n\n自 PHP 5.4 起，你可以选择在单条语句中定义数组。快捷方式是使用简写语法，这与 JavaScript 中的数组字面量相同。通过将逗号分隔的值列表放在一对方括号内来创建数组，如下所示：\n\
    \n`$shoppingList = ['wine', 'fish', 'bread', 'grapes', 'cheese'];`\n\n**注意**：逗号必须放在引号外面，这与美式排版惯例不同。为便于阅读，我在每个逗号后加了一个空格，但这不是必需的。\n\
    \n另一种方法是将逗号分隔的列表传递给`array()`，如下所示：\n\n`$shoppingList = array('wine', 'fish', 'bread',\
    \ 'grapes', 'cheese');`\n\nPHP 会自动为每个数组元素从 0 开始编号，因此两种方法创建的都是完全相同的数组，就像你逐个编号一样。要在数组末尾添加新元素，可以使用一对方括号，如下所示：\n\
    \n`$shoppingList[] = 'coffee';`\n\nPHP 会使用下一个可用编号，因此这将成为 `$shoppingList[5]`。\n\
    \n### 构建关联数组\n\n关联数组使用 `=>` 运算符（等号后跟大于号）为每个数组键赋值。使用简写的方括号语法，结构如下：\n\n`$arrayName\
    \ = ['key1' => 'element1', 'key2' => 'element2'];`\n\n使用 `array()` 也能达到相同效果：\n\
    \n`$arrayName = array('key1' => 'element1', 'key2' => 'element2');`\n\n因此，这是构建\
    \ `$book` 数组的简写方式：\n\n```\n$book = [\n    'title'     => 'PHP Solutions: Dynamic\
    \ Web Design Made Easy, Third Edition',\n    'author'    => 'David Powers',\n\
    \    'publisher' => 'Apress',\n    'ISBN'      => '978-1-4842-0636-2'\n];\n```\n\
    \n将开头和结尾的大括号放在单独的行中，以及像我那样对齐 `=>` 运算符并非必需，但这能使代码更易于阅读和维护。\n\n### 创建空数组\n\n你可能想要创建空数组的原因有以下两个：\n\
    \n- 创建（或初始化）一个数组，使其准备好可以在循环中添加元素\n- 清空现有数组中的所有元素\n\n要创建空数组，只需使用一对空方括号：\n\n`$shoppingList\
    \ = [];`\n\n或者，使用 `array()` 且括号内不留任何内容，如下所示：\n\n`$shoppingList = array();`\n\n\
    `$shoppingList` 数组现在不包含任何元素。如果使用 `$shoppingList[]` 添加新元素，它将自动从 0 重新开始编号。\n\n###\
    \ 多维数组\n\n数组元素可以存储任何数据类型，包括其他数组。例如，`$book` 数组只保存一本书的详细信息。创建一个数组的数组（即多维数组）来包含多本书的详细信息可能更方便，如下所示（使用方括号简写）：\n\
    \n```\n$books = [\n    [\n        'title'     => 'PHP Solutions: Dynamic Web Design\
    \ Made Easy, Third Edition',\n        'author'    => 'David Powers',\n       \
    \ 'publisher' => 'Apress',\n        'ISBN'      => '978-1-4842-0636-2'\n    ],\n\
    \    [\n        'title'     => 'Beginning PHP and MySQL: From Beginner to Professional,\
    \ Fourth Edition',\n        'author'    => 'W. Jason Gilmore',\n        'publisher'\
    \ => 'Apress',\n        'ISBN'      => '978-1-4302-3114-1'\n    ]\n];\n```\n\n\
    这个示例展示了关联数组嵌套在索引数组中的情况，但多维数组可以嵌套任何一种类型。要引用特定元素，请使用两个数组的键；例如：\n\n`$books[1]['author']`\
    \  // 值是 `'W. Jason Gilmore'`\n\n处理多维数组并不像初看那么困难。秘诀是使用循环来获取嵌套数组。然后你可以像处理普通数组一样处理它。这就是处理数据库搜索结果的方式，结果通常包含在多维数组中。\n\
    \n**提示**：简写语法仅适用于 PHP 5.4 或更高版本，而 `array()` 适用于所有 PHP 版本。使用 `array()` 的微弱优势是使结构更易于可视化，但从\
    \ JavaScript 借用的数组字面量语法输入更少，并且大多数 Web 开发人员可能都很熟悉。使用你觉得舒服的即可。\n\n### 使用 `print_r()`\
    \ 检查数组\n\n要在测试时检查数组内容，请将数组传递给 `print_r()`，如下所示（参见 `inspect_array_01.php`）：\n\n\
    `print_r($books);`\n\n将 `inspect_array_01.php` 加载到浏览器中，了解 `print_r()` 如何输出普通数组的内容。以下截图显示了\
    \ PHP 如何显示多维数组（代码在 `inspect_array_02.php` 中）。通常，切换到“源代码”视图有助于检查细节，因为浏览器会忽略底层输出中的缩进。或者，在\
    \ PHP 代码块外添加 HTML `<pre>` 标签以保留缩进。\n\n![A978-1-4842-0635-5_3_Fige_HTML.jpg](img/A978-1-4842-0635-5_3_Fige_HTML.jpg)\n\
    \n**提示**：始终使用 `print_r()` 来检查数组；`echo` 和 `print` 不起作用。要在网页中显示数组内容，请使用 `foreach`\
    \ 循环，本章后面会介绍。\n\n### PHP 中的“真”与“假”\n\nPHP 条件语句中的决策基于互斥的布尔值 `true` 和 `false`。如果条件等于\
    \ `true`，则执行条件块内的代码。如果为 `false`，则忽略。条件是否为 `true` 或 `false` 通过以下方式之一确定：\n\n- 显式设置为布尔值之一的变量\n\
    - PHP 隐式解释为 `true` 或 `false` 的值\n- 两个非布尔值的比较\n\n#### 显式布尔值\n\n如果变量被赋值为 `true`\
    \ 或 `false` 并在条件语句中使用，则基于该值进行决策。关键字 `true` 和 `false` 不区分大小写，且不得用引号括起来；例如：\n\n\
    ```\n$OK = false;\n\nif ($OK) {\n    // 执行某些操作\n}\n```\n\n条件语句内的代码不会被执行，因为 `$OK`\
    \ 是 `false`。\n\n#### 隐式布尔（“真值”和“假值”）值\n\n使用隐式布尔值提供了一种便捷的简写方式，尽管它有一个缺点——至少对初学者来说——不够清晰。隐式布尔值——有时称为“真值”和“假值”——依赖于\
    \ PHP 对其视为 `false` 的相对狭窄的定义，即：\n\n- 不区分大小写的关键字 `false` 和 `null`\n- 作为整数（`0`）、浮点数（`0.0`）或字符串（`'0'`\
    \ 或 `\"0\"`）的零\n- 空字符串（单引号或双引号之间无空格）\n- 空数组\n- 由空标签创建的 SimpleXML 对象\n\n其他所有值都是\
    \ `true`。\n\n**提示**：这解释了为什么 PHP 将 `\"false\"`（带引号）解释为 `true`。它是一个字符串，所有字符串——除了空字符串——都是\
    \ `true`。\n"
- fmt: "#### Making Decisions by Comparing Two Values\n\nMost `true/false` decisions\
    \ are based on a comparison of two values using comparison operators. Table 3-5\
    \ lists the comparison operators used in PHP.\n\n**Table 3-5.** PHP comparison\
    \ operators used for decision-making\n\n| Symbol | Name | Example | Result |\n\
    | --- | --- | --- | --- |\n| `==` | Equality | `$a == $b` | Returns `true` if\
    \ `$a` and `$b` are equal; otherwise, returns `false` |\n| `!=` | Inequality |\
    \ `$a != $b` | Returns `true` if `$a` and `$b` are different; otherwise, returns\
    \ `false` |\n| `===` | Identical | `$a === $b` | Determines whether `$a` and `$b`\
    \ are identical. They must not only have the same value but also must be of the\
    \ same data type (e.g., both integers). |\n| `!==` | Not identical | `$a !== $b`\
    \ | Determines whether `$a` and `$b` are not identical (according to the same\
    \ criteria as the previous operator) |\n| `>` | Greater than | `$a > $b` | Returns\
    \ `true` if `$a` is greater than `$b` |\n| `>=` | Greater than or equal to | `$a\
    \ >= $b` | Returns `true` if `$a` is greater than or equal to `$b` |\n| `<` |\
    \ Less than | `$a < $b` | Returns `true` if `$a` is less than `$b` |\n| `<=` |\
    \ Less than or equal to | `$a <= $b` | Returns `true` if `$a` is less than or\
    \ equal to `$b` |\n\n> **Caution:** A single equal sign doesn’t perform comparisons;\
    \ it assigns a value. When comparing two values, you must always use the equality\
    \ operator (`==`), the identical operator (`===`), or their negative equivalents\
    \ (`!=` and `!==`).\n\n#### Testing More Than One Condition\n\nFrequently, comparing\
    \ two values is not enough. PHP allows you to set a series of conditions using\
    \ logical operators to specify whether all or just some need to be fulfilled.\n\
    \nThe most important logical operators in PHP are listed in Table 3-6. The logical\
    \ Not operator applies to individual conditions rather than to a series.\n\n**Table\
    \ 3-6.** The main logical operators used for decision-making in PHP\n\n| Symbol\
    \ | Name | Example | Result |\n| --- | --- | --- | --- |\n| `&&` | And | `$a &&\
    \ $b` | Equates to `true` if both `$a` and `$b` are `true` |\n| `&#124;&#124;`\
    \ | Or | `$a &#124;&#124; $b` | Equates to `true` if either `$a` or `$b` is `true`;\
    \ otherwise, `false` |\n| `!` | Not | `!$a` | Equates to `true` if `$a` is not\
    \ `true` |\n\nTechnically speaking, there is no limit to the number of conditions\
    \ that can be tested. Each condition is considered in turn from left to right,\
    \ and as soon as a defining point is reached, no further testing is carried out.\
    \ When using `&&`, every condition must be fulfilled, so testing stops as soon\
    \ as one turns out to be `false`. Similarly, when using `||`, only one condition\
    \ needs to be fulfilled, so testing stops as soon as one turns out to be `true`.\n\
    \n```\n$a = 10;\n$b = 25;\nif ($a > 5 && $b > 20) // returns true\nif ($a > 5\
    \ || $b > 30) // returns true, $b never tested\n```\n\nYou should always design\
    \ your tests to provide the speediest result. If all conditions must be met, evaluate\
    \ the one most likely to fail first. If only one condition needs to be met, evaluate\
    \ the one most likely to succeed first. If a set of conditions needs to be considered\
    \ as a group, enclose them in parentheses, as follows:\n\n```\nif (($a > 5 &&\
    \ $a < 8) || ($b > 20 && $b < 40))\n```\n\n> **Note:** PHP also uses `AND` in\
    \ place of `&&` and `OR` in place of `||`. However, they aren’t exact equivalents.\
    \ To avoid problems, it’s advisable to stick with `&&` and `||`.\n\n#### Using\
    \ the Switch Statement for Decision Chains\n\nThe `switch` statement offers an\
    \ alternative to `if . . . else` for decision making. The basic structure looks\
    \ like this:\n\n```\nswitch(variable being tested) {\n    case value1:\n     \
    \   statements to be executed\n        break;\n    case value2:\n        statements\
    \ to be executed\n        break;\n    default:\n        statements to be executed\n\
    }\n```\n\nThe `case` keyword indicates possible matching values for the variable\
    \ passed to `switch()`. Each alternative value must be preceded by `case` and\
    \ followed by a colon. When a match is made, every subsequent line of code is\
    \ executed until the `break` or `return` keyword is encountered, at which point\
    \ the `switch` statement comes to an end. A simple example follows:\n\n```\nswitch($myVar)\
    \ {\n    case 1:\n        echo '$myVar is 1';\n        break;\n    case 'apple':\n\
    \    case 'orange':\n        echo '$myVar is a fruit';\n        break;\n    default:\n\
    \        echo '$myVar is neither 1 nor a fruit';\n}\n```\n\nThe main points to\
    \ note about `switch` are as follows:\n\n* The expression following the `case`\
    \ keyword is normally a number or a string. You can’t use a complex data type\
    \ like an array or object.\n* To use comparison operators with `case`, you must\
    \ repeat the variable being tested. So `case > 100:` won’t work, but `case $myVar\
    \ > 100:` will.\n* Each block of statements should normally end with `break` or\
    \ `return` unless you specifically want to continue executing code within the\
    \ `switch` statement.\n* You can group several instances of the `case` keyword\
    \ together to apply the same block of code to all of them.\n* If no match is made,\
    \ any statements following the `default` keyword are executed. If no default has\
    \ been set, the `switch` statement exits silently and continues with the next\
    \ block of code.\n\n#### Using the Ternary Operator\n\nThe ternary operator (`?:`)\
    \ is a shorthand method of representing a conditional statement. Its name comes\
    \ from the fact that it normally uses three operands. The basic syntax looks like\
    \ this:\n\n```\ncondition ? value if true : value if false ;\n```\n\nHere is an\
    \ example of it in use:\n\n```\n$age = 17;\n$fareType = $age >= 16 ? 'adult' :\
    \ 'child';\n```\n\nThe second line tests the value of `$age`. If it’s greater\
    \ than or equal to 16, `$fareType` is set to `adult`, otherwise `$fareType` is\
    \ set to `child`. The equivalent code using `if . . . else` looks like this:\n\
    \n```\nif ($age >= 16) {\n    $fareType = 'adult';\n} else {\n    $fareType =\
    \ 'child';\n}\n```\n\nThe `if . . . else` version is easier to read, but the conditional\
    \ operator is more compact. Most beginners hate this shorthand, but once you get\
    \ to know it, you’ll realize how convenient it can be.\n\nYou can leave out the\
    \ value between the question mark and the colon. This has the effect of assigning\
    \ the value of the condition to the variable if the condition is true. The preceding\
    \ example could be rewritten like this:\n\n```\n$age = 17;\n$adult = $age >= 16\
    \ ?: false; // $adult is true\n```\n\nIn this case, the expression before the\
    \ question mark is a comparison, so it can equate to only `true` or `false`. However,\
    \ if the expression before the question mark is “truthy” (implicitly true), the\
    \ value itself is returned. For example:\n\n```\n$age = 17;\n$years = $age ?:\
    \ 'unknown';  // $years is 17\n```\n\n> **Note:** Omitting the value between the\
    \ question mark and the colon is a specialized use of the ternary operator. It\
    \ is mentioned here only to alert you to its meaning if you come across it elsewhere.\n\
    \n### Creating Loops\n\nA loop is a section of code that is repeated until a certain\
    \ condition is met. Loops are often controlled by setting a variable that counts\
    \ the number of iterations. By increasing the variable by one each time, the loop\
    \ comes to a halt when the variable gets to a preset number. Loops are also controlled\
    \ by running through each item of an array. When there are no more items to process,\
    \ the loop stops. Loops frequently contain conditional statements, so although\
    \ they’re very simple in structure, they can be used to create code that processes\
    \ data in often sophisticated ways."
  raw: '#### Making Decisions by Comparing Two Values


    Most `true/false` decisions are based on a comparison of two values using comparison
    operators. Table [3-5](#A978-1-4842-0635-5_3_Chapter.html#Tab5) lists the comparison
    operators used in PHP.


    Table 3-5.


    PHP comparison operators used for decision-making


    | Symbol | Name | Example | Result |

    | --- | --- | --- | --- |

    | `==` | Equality | `$a == $b` | Returns `true` if `$a` and `$b` are equal; otherwise,
    returns `false` |

    | `!=` | Inequality | `$a != $b` | Returns `true` if `$a` and `$b` are different;
    otherwise, returns `false` |

    | `===` | Identical | `$a === $b` | Determines whether `$a` and `$b` are identical.
    They must not only have the same value but also must be of the same data type
    (e.g., both integers). |

    | `!==` | Not identical | `$a !== $b` | Determines whether `$a` and `$b` are not
    identical (according to the same criteria as the previous operator) |

    | `>` | Greater than | `$a > $b` | Returns `true` if `$a` is greater than `$b`
    |

    | `>=` | Greater than or equal to | `$a >= $b` | Returns `true` if `$a` is greater
    than or equal to `$b` |

    | `<` | Less than | `$a < $b` | Returns `true` if `$a` is less than `$b` |

    | `<=` | Less than or equal to | `$a <= $b` | Returns `true` if `$a` is less than
    or equal to `$b` |


    Caution


    A single equal sign doesn’t perform comparisons; it assigns a value. When comparing
    two values, you must always use the equality operator (`==`), the identical operator
    (`===`), or their negative equivalents (`!=` and `!==`).


    #### Testing More Than One Condition


    Frequently, comparing two values is not enough. PHP allows you to set a series
    of conditions using logical operators to specify whether all or just some need
    to be fulfilled.


    The most important logical operators in PHP are listed in Table [3-6](#A978-1-4842-0635-5_3_Chapter.html#Tab6).
    The logical Not operator applies to individual conditions rather than to a series.


    Table 3-6.


    The main logical operators used for decision-making in PHP


    | Symbol | Name | Example | Result |

    | --- | --- | --- | --- |

    | `&&` | And | `$a && $b` | Equates to `true` if both `$a` and `$b` are `true`
    |

    | `&#124;&#124;` | Or | `$a &#124;&#124; $b` | Equates to `true` if either `$a`
    or `$b` is `true`; otherwise, `false` |

    | `!` | Not | `!$a` | Equates to `true` if `$a` is not `true` |


    Technically speaking, there is no limit to the number of conditions that can be
    tested. Each condition is considered in turn from left to right, and as soon as
    a defining point is reached, no further testing is carried out. When using `&&`,
    every condition must be fulfilled, so testing stops as soon as one turns out to
    be `false`. Similarly, when using `||`, only one condition needs to be fulfilled,
    so testing stops as soon as one turns out to be `true`.


    `$a = 10;`


    `$b = 25;`


    `if ($a > 5 && $b > 20) // returns true`


    `if ($a > 5 || $b > 30) // returns true, $b never tested`


    You should always design your tests to provide the speediest result. If all conditions
    must be met, evaluate the one most likely to fail first. If only one condition
    needs to be met, evaluate the one most likely to succeed first. If a set of conditions
    needs to be considered as a group, enclose them in parentheses, as follows:


    `if (($a > 5 && $a < 8) || ($b > 20 && $b < 40))`


    Note


    PHP also uses `AND` in place of `&&` and `OR` in place of `||`. However, they
    aren’t exact equivalents. To avoid problems, it’s advisable to stick with `&&`
    and `||`.


    #### Using the Switch Statement for Decision Chains


    The `switch` statement offers an alternative to `if . . . else` for decision making.
    The basic structure looks like this:


    `switch(` `variable being tested` `) {`


    `case` `value1` `:`


    `statements to be executed`


    `break;`


    `case v` `alue2` `:`


    `statements to be executed`


    `break;`


    `default:`


    `statements to be executed`


    `}`


    The `case` keyword indicates possible matching values for the variable passed
    to `switch()`. Each alternative value must be preceded by `case` and followed
    by a colon. When a match is made, every subsequent line of code is executed until
    the `break` or `return` keyword is encountered, at which point the `switch` statement
    comes to an end. A simple example follows:


    `switch($myVar) {`


    `case 1:`


    `echo ''$myVar is 1'';`


    `break;`


    `case ''apple'':`


    `case ''orange'':`


    `echo ''$myVar is a fruit'';`


    `break;`


    `default:`


    `echo ''$myVar is neither 1 nor a fruit'';`


    `}`


    The main points to note about `switch` are as follows:


    *   The expression following the `case` keyword is normally a number or a string.
    You can’t use a complex data type like an array or object.

    *   To use comparison operators with `case`, you must repeat the variable being
    tested. So `case > 100:` won’t work, but `case $myVar > 100:` will.

    *   Each block of statements should normally end with `break` or `return` unless
    you specifically want to continue executing code within the `switch` statement.

    *   You can group several instances of the `case` keyword together to apply the
    same block of code to all of them.

    *   If no match is made, any statements following the `default` keyword are executed.
    If no default has been set, the `switch` statement exits silently and continues
    with the next block of code.


    #### Using the Ternary Operator


    The ternary operator (`?:`) is a shorthand method of representing a conditional
    statement. Its name comes from the fact that it normally uses three operands.
    The basic syntax looks like this:


    `condition` `?` `value if true` `:` `value if false` `;`


    Here is an example of it in use:


    `$age = 17;`


    `$fareType = $age >= 16 ? ''adult'' : ''child'';`


    The second line tests the value of `$age`. If it’s greater than or equal to 16,
    `$fareType` is set to `adult`, otherwise `$fareType` is set to `child`. The equivalent
    code using `if . . . else` looks like this:


    `if ($age >= 16) {`


    `$fareType = ''adult'';`


    `} else {`


    `$fareType = ''child'';`


    `}`


    The `if . . . else` version is easier to read, but the conditional operator is
    more compact. Most beginners hate this shorthand, but once you get to know it,
    you’ll realize how convenient it can be.


    You can leave out the value between the question mark and the colon. This has
    the effect of assigning the value of the condition to the variable if the condition
    is true. The preceding example could be rewritten like this:


    `$age = 17;`


    `$adult = $age >= 16 ?: false; // $adult is true`


    In this case, the expression before the question mark is a comparison, so it can
    equate to only `true` or `false`. However, if the expression before the question
    mark is “truthy” (implicitly true), the value itself is returned. For example:


    `$age = 17;`


    `$years = $age ?: ''unknown'';  // $years is 17`


    Note


    Omitting the value between the question mark and the colon is a specialized use
    of the ternary operator. It is mentioned here only to alert you to its meaning
    if you come across it elsewhere.


    ### Creating Loops


    A loop is a section of code that is repeated until a certain condition is met.
    Loops are often controlled by setting a variable that counts the number of iterations.
    By increasing the variable by one each time, the loop comes to a halt when the
    variable gets to a preset number. Loops are also controlled by running through
    each item of an array. When there are no more items to process, the loop stops.
    Loops frequently contain conditional statements, so although they’re very simple
    in structure, they can be used to create code that processes data in often sophisticated
    ways.'
  trans: "\n#### 通过比较两个值来做出决策\n\n大多数 `true/false`（真/假）决策都是基于使用比较运算符对两个值进行比较。表 3-5\
    \ 列出了 PHP 中使用的比较运算符。\n\n**表 3-5.** 用于决策的 PHP 比较运算符\n\n| 符号 | 名称 | 示例 | 结果 |\n\
    | --- | --- | --- | --- |\n| `==` | 等于 | `$a == $b` | 如果 `$a` 和 `$b` 相等，则返回 `true`；否则返回\
    \ `false` |\n| `!=` | 不等于 | `$a != $b` | 如果 `$a` 和 `$b` 不相等，则返回 `true`；否则返回 `false`\
    \ |\n| `===` | 全等 | `$a === $b` | 判断 `$a` 和 `$b` 是否全等。它们不仅需要值相同，而且数据类型也必须相同（例如，都是整数）。\
    \ |\n| `!==` | 不全等 | `$a !== $b` | 判断 `$a` 和 `$b` 是否不全等（判断标准与上一个运算符相同） |\n| `>`\
    \ | 大于 | `$a > $b` | 如果 `$a` 大于 `$b`，则返回 `true` |\n| `>=` | 大于等于 | `$a >= $b`\
    \ | 如果 `$a` 大于等于 `$b`，则返回 `true` |\n| `<` | 小于 | `$a < $b` | 如果 `$a` 小于 `$b`，则返回\
    \ `true` |\n| `<=` | 小于等于 | `$a <= $b` | 如果 `$a` 小于等于 `$b`，则返回 `true` |\n\n> **注意：**\
    \ 单个等号不执行比较操作；它用于赋值。当比较两个值时，必须始终使用相等运算符（`==`）、全等运算符（`===`）或其否定形式（`!=` 和 `!==`）。\n\
    \n#### 测试多个条件\n\n通常，仅比较两个值是不够的。PHP 允许你使用逻辑运算符设置一系列条件，以指定是需要满足所有条件还是仅需满足部分条件。\n\
    \nPHP 中最主要的逻辑运算符列于表 3-6。逻辑非运算符应用于单个条件，而非一系列条件。\n\n**表 3-6.** PHP 中用于决策的主要逻辑运算符\n\
    \n| 符号 | 名称 | 示例 | 结果 |\n| --- | --- | --- | --- |\n| `&&` | 与 | `$a && $b` |\
    \ 如果 `$a` 和 `$b` 均为 `true`，则结果为 `true` |\n| `&#124;&#124;` | 或 | `$a &#124;&#124;\
    \ $b` | 如果 `$a` 或 `$b` 中任意一个为 `true`，则结果为 `true`；否则为 `false` |\n| `!` | 非 | `!$a`\
    \ | 如果 `$a` 不为 `true`，则结果为 `true` |\n\n从技术上讲，可以测试的条件数量没有限制。每个条件会从左到右依次被评估，一旦达到决定性的判断点，便不再进行后续测试。当使用\
    \ `&&` 时，所有条件都必须满足，因此一旦某个条件为 `false`，测试便会停止。同样，当使用 `||` 时，只需满足一个条件即可，因此一旦某个条件为\
    \ `true`，测试便会停止。\n\n```\n$a = 10;\n$b = 25;\nif ($a > 5 && $b > 20) // 返回 true\n\
    if ($a > 5 || $b > 30) // 返回 true，$b 从未被测试\n```\n\n你应该始终设计测试条件，以期获得最快的结果。如果所有条件都必须满足，先评估最有可能失败的那个。如果只需满足一个条件，先评估最有可能成功的那个。如果一组条件需要作为一个整体来考虑，请将它们括在圆括号中，如下所示：\n\
    \n```\nif (($a > 5 && $a < 8) || ($b > 20 && $b < 40))\n```\n\n> **注意：** PHP 也允许使用\
    \ `AND` 代替 `&&`，使用 `OR` 代替 `||`。然而，它们并非完全等同。为避免出现问题，建议坚持使用 `&&` 和 `||`。\n\n####\
    \ 使用 Switch 语句进行决策链\n\n`switch` 语句为使用 `if . . . else` 进行决策提供了一种替代方案。其基本结构如下所示：\n\
    \n```\nswitch(被测试的变量) {\n    case 值 1:\n        要执行的语句\n        break;\n    case\
    \ 值 2:\n        要执行的语句\n        break;\n    default:\n        要执行的语句\n}\n```\n\
    \n`case` 关键字表示传递给 `switch()` 的变量可能匹配的值。每个备选值前必须加上 `case`，后跟冒号。当找到匹配项时，会执行后续的每一行代码，直到遇到\
    \ `break` 或 `return` 关键字，此时 `switch` 语句结束。以下是一个简单的示例：\n\n```\nswitch($myVar) {\n\
    \    case 1:\n        echo '$myVar 是 1';\n        break;\n    case 'apple':\n\
    \    case 'orange':\n        echo '$myVar 是一种水果';\n        break;\n    default:\n\
    \        echo '$myVar 既不是 1 也不是水果';\n}\n```\n\n关于 `switch` 需要注意的要点如下：\n\n* `case`\
    \ 关键字后面的表达式通常是数字或字符串。不能使用像数组或对象这样的复杂数据类型。\n* 要在 `case` 中使用比较运算符，必须重复被测试的变量。因此\
    \ `case > 100:` 无法工作，但 `case $myVar > 100:` 可以。\n* 每个代码块通常应以 `break` 或 `return`\
    \ 结尾，除非你特别希望继续执行 `switch` 语句中的后续代码。\n* 可以将多个 `case` 关键字组合在一起，对它们应用相同的代码块。\n* 如果没有找到匹配项，则执行\
    \ `default` 关键字后面的任何语句。如果未设置 default 情况，`switch` 语句会静默退出并继续执行下一个代码块。\n\n#### 使用三元运算符\n\
    \n三元运算符（`?:`）是表示条件语句的一种简写方法。其名称来源于它通常使用三个操作数。基本语法如下所示：\n\n```\n条件 ? 值为真时的结果 :\
    \ 值为假时的结果 ;\n```\n\n以下是其使用示例：\n\n```\n$age = 17;\n$fareType = $age >= 16 ? 'adult'\
    \ : 'child';\n```\n\n第二行测试 `$age` 的值。如果它大于等于 16，`$fareType` 被设置为 `adult`，否则 `$fareType`\
    \ 被设置为 `child`。使用 `if . . . else` 的等效代码如下所示：\n\n```\nif ($age >= 16) {\n    $fareType\
    \ = 'adult';\n} else {\n    $fareType = 'child';\n}\n```\n\n`if . . . else` 版本更易读，但条件运算符更简洁。大多数初学者讨厌这种简写，但一旦熟悉它，你就会意识到它有多方便。\n\
    \n你可以省略问号和冒号之间的值。这会产生如下效果：如果条件为真，则将条件本身的值赋给变量。前面的例子可以重写如下：\n\n```\n$age = 17;\n\
    $adult = $age >= 16 ?: false; // $adult 为 true\n```\n\n在这种情况下，问号前面的表达式是一个比较，因此它只能等于\
    \ `true` 或 `false`。然而，如果问号前面的表达式是“真值”（隐式为真），则返回该值本身。例如：\n\n```\n$age = 17;\n$years\
    \ = $age ?: 'unknown';  // $years 为 17\n```\n\n> **注意：** 省略问号和冒号之间的值是三元运算符的一种特殊用法。在这里提到它，只是为了提醒你，如果在其他地方遇到它时，了解其含义。\n\
    \n### 创建循环\n\n循环是一段被重复执行的代码，直到满足某个特定条件为止。循环通常通过设置一个变量来计数迭代次数进行控制。每次将变量递增 1，当变量达到预设值时循环停止。循环也可以通过遍历数组中的每个元素来控制。当没有更多元素需要处理时，循环停止。循环中通常包含条件语句，因此尽管它们结构非常简单，但可用于创建以相当复杂的方式处理数据的代码。\n"
- fmt: "# Loops Using While and Do . . . While\n\nThe simplest type of loop is called\
    \ a `while` loop. Its basic structure looks like this:\n\n```\nwhile (condition\
    \ is true) {\n    do something\n}\n```\n\nThe following code displays every number\
    \ from 1 through 100 in a browser (you can test it in `while.php` in the files\
    \ for this chapter). It begins by setting a variable (`$i`) to 1 and then uses\
    \ the variable as a counter to control the loop, as well as displays the current\
    \ number onscreen.\n\n```\n$i = 1;  // set counter\nwhile ($i <= 100) {\n    echo\
    \ \"$i<br>\";\n    $i++; // increase counter by 1\n}\n```\n\n**Tip**\n\nIn the\
    \ first half of this chapter, I warned against using variables with cryptic names.\
    \ However, using `$i` as a counter is a widely accepted convention. If `$i` is\
    \ already in use, the normal practice is to use `$j` or `$k` as counters.\n\n\
    A variation of the `while` loop uses the keyword `do` and follows this basic pattern:\n\
    \n```\ndo {\n    code to be executed\n} while (condition to be tested);\n```\n\
    \nThe difference between a `do . . . while` loop and a `while` loop is that the\
    \ code within the `do` block is executed at least once, even if the condition\
    \ is never true. The following code (in `dowhile.php`) displays the value of `$i`\
    \ once, even though it’s greater than the maximum expected.\n\n```\n$i = 1000;\n\
    do {\n    echo \"$i<br>\";\n    $i++; // increase counter by 1\n} while ($i <=\
    \ 100);\n```\n\nThe danger with `while` and `do . . . while` loops is forgetting\
    \ to set a condition that brings the loop to an end or setting an impossible condition.\
    \ This is known as an infinite loop that either freezes your computer or causes\
    \ the browser to crash.\n\n## The Versatile for Loop\n\nThe `for` loop is less\
    \ prone to generating an infinite loop because you are required to declare all\
    \ the conditions of the loop in the first line. The `for` loop uses the following\
    \ basic pattern:\n\n```\nfor (initialize loop; condition; code to run after each\
    \ iteration) {\n    code to be executed\n}\n```\n\nThe following code does exactly\
    \ the same as the previous `while` loop, displaying every number from 1 to 100\
    \ (see `forloop.php`):\n\n```\nfor ($i = 1; $i <= 100; $i++) {\n    echo \"$i<br>\"\
    ;\n}\n```\n\nThe three expressions inside the parentheses control the action of\
    \ the loop (note that they are separated by semicolons, not commas):\n\n- The\
    \ first expression is executed before the loop starts. In this case, it sets the\
    \ initial value of the counter variable `$i` to 1.\n- The second expression sets\
    \ the condition that determines how long the loop should continue to run. This\
    \ can be a fixed number, a variable, or an expression that calculates a value.\n\
    - The third expression is executed at the end of each iteration of the loop. In\
    \ this case, it increases `$i` by 1, but there is nothing stopping you from using\
    \ bigger increments. For instance, replacing `$i++` with `$i+=10` in this example\
    \ would display 1, 11, 21, 31, and so on.\n\n## Looping Through Arrays and Objects\
    \ with Foreach\n\nThe final type of loop in PHP is used with arrays and objects.\
    \ It takes two forms, both of which use temporary variables to handle each element.\
    \ If you only need to do something with the element’s value, the `foreach` loop\
    \ takes the following form:\n\n```\nforeach (variable_name as element) {\n   \
    \ do something with element\n}\n```\n\nThe following example loops through the\
    \ `$shoppingList` array and displays the name of each item (the code is in `foreach_01.php`):\n\
    \n```\n$shoppingList = ['wine', 'fish', 'bread', 'grapes', 'cheese'];\nforeach\
    \ ($shoppingList as $item) {\n    echo $item.'<br>';\n}\n```\n\n**Caution**\n\n\
    The `foreach` keyword is one word. Inserting a space between `for` and `each`\
    \ doesn’t work.\n\nAlthough the preceding example uses an indexed array, you can\
    \ also use the simple form of the `foreach` loop with an associative array.\n\n\
    The alternative form of the `foreach` loop gives access to both the key and the\
    \ value of each element. It takes this slightly different form:\n\n```\nforeach\
    \ (variable_name as key => value) {\n    do something with key and value\n}\n\
    ```\n\nThis next example uses the `$book` associative array from the \"Creating\
    \ arrays\" section earlier in this chapter and incorporates the key and value\
    \ of each element into a simple string, as shown in the following screenshot (see\
    \ `foreach_02.php`):\n\n```\nforeach ($book as $key => $value) {\n    echo \"\
    $key: $value<br>\";\n}\n```\n\n![A978-1-4842-0635-5_3_Figf_HTML.jpg](A978-1-4842-0635-5_3_Figf_HTML.jpg)\n\
    \n**Note**\n\nApart from arrays, the main use of a `foreach` loop is with a special\
    \ type of object known as an iterator. You’ll see how to use iterators in [Chapter\
    \ 7](#A978-1-4842-0635-5_7_Chapter.html).\n\n## Breaking Out Of a Loop\n\nTo bring\
    \ a loop prematurely to an end when a certain condition is met, insert the `break`\
    \ keyword inside a conditional statement. As soon as the script encounters `break`,\
    \ it will exit the loop.\n\nTo skip the code in a loop when a certain condition\
    \ is met, use the `continue` keyword. Instead of exiting, it returns to the top\
    \ of the loop and deals with the next element. For example, the following loop\
    \ skips the current element if `$photo` has no value:\n\n```\nforeach ($photos\
    \ as $photo) {\n    if (empty($photo)) continue;\n    // code to display a photo\n\
    }\n```\n\n# Modularizing Code with Functions\n\nFunctions offer a convenient way\
    \ of running frequently performed operations. In addition to the large number\
    \ of built-in functions, PHP lets you create your own. The advantages are that\
    \ you write the code only once, rather than needing to retype it everywhere you\
    \ need it. This not only speeds up development but also makes your code easier\
    \ to read and maintain. If there’s a problem with the code in your function, you\
    \ can update it in just one place rather than hunting through your entire site.\
    \ Moreover, functions usually speed up the processing of your pages.\n\nBuilding\
    \ your own functions in PHP is easy. You simply wrap a block of code in a pair\
    \ of curly braces and use the `function` keyword to name the new function. The\
    \ function name is always followed by a pair of parentheses. The following—admittedly\
    \ trivial—example demonstrates the basic structure of a custom-built function\
    \ (see `functions_01.php` in the files for this chapter):\n\n```\nfunction sayHi()\
    \ {\n    echo 'Hi!';\n}\n```\n\nSimply putting `sayHi();` in a PHP code block\
    \ results in `Hi!` being displayed onscreen. This type of function is like a drone:\
    \ it always performs exactly the same operation. For functions to be responsive\
    \ to circumstances, you need to pass values to them as arguments.\n\n## Passing\
    \ Values to Functions\n\nLet’s say you want to adapt the `sayHi()` function so\
    \ that it displays someone’s name. You do this by inserting a variable between\
    \ the parentheses in the function declaration. The same variable is then used\
    \ inside the function to display whatever value is passed to the function. To\
    \ pass more than one argument to a function, separate the variables with commas\
    \ inside the opening parentheses. This is what the revised function looks like\
    \ (see `functions_02.php`):\n\n```\nfunction sayHi($name) {\n    echo \"Hi, $name!\"\
    ;\n}\n```\n\nYou can now use this function inside a page to display the value\
    \ of any variable passed to `sayHi()`. For instance, if you have an online form\
    \ that saves someone’s name in a variable called `$visitor`, and Ben visits your\
    \ site, you can give him the sort of personal greeting shown in the following\
    \ screenshot by putting `sayHi($visitor);` in your page.\n\n![A978-1-4842-0635-5_3_Figg_HTML.jpg](A978-1-4842-0635-5_3_Figg_HTML.jpg)\n\
    \nA downside of PHP’s weak typing is that if Ben is being particularly uncooperative,\
    \ he might type 5 into the form instead of his name, giving you not quite the\
    \ type of high five you might have been expecting.\n\n![A978-1-4842-0635-5_3_Figh_HTML.jpg](A978-1-4842-0635-5_3_Figh_HTML.jpg)\n\
    \nThis is why you should check user input before using it in any critical situation."
  raw: '#### Loops Using While and Do . . . While


    The simplest type of loop is called a `while` loop. Its basic structure looks
    like this:


    `while (` `condition is true` `) {`


    `do something`


    `}`


    The following code displays every number from 1 through 100 in a browser (you
    can test it in `while.php` in the files for this chapter). It begins by setting
    a variable (`$i`) to 1 and then uses the variable as a counter to control the
    loop, as well as displays the current number onscreen.


    `$i = 1;  // set counter`


    `while ($i <= 100) {`


    `echo "$i<br>";`


    `$i++; // increase counter by 1`


    `}`


    Tip


    In the first half of this chapter, I warned against using variables with cryptic
    names. However, using `$i` as a counter is a widely accepted convention. If `$i`
    is already in use, the normal practice is to use `$j` or `$k` as counters.


    A variation of the `while` loop uses the keyword `do` and follows this basic pattern:


    `do {`


    `code to be executed`


    `} while (` `condition to be tested` `);`


    The difference between a `do . . . while` loop and a `while` loop is that the
    code within the `do` block is executed at least once, even if the condition is
    never true. The following code (in `dowhile.php`) displays the value of `$i` once,
    even though it’s greater than the maximum expected.


    `$i = 1000;`


    `do {`


    `echo "$i<br>";`


    `$i++; // increase counter by 1`


    `} while ($i <= 100);`


    The danger with `while` and `do . . . while` loops is forgetting to set a condition
    that brings the loop to an end or setting an impossible condition. This is known
    as an infinite loop that either freezes your computer or causes the browser to
    crash.


    #### The Versatile for Loop


    The `for` loop is less prone to generating an infinite loop because you are required
    to declare all the conditions of the loop in the first line. The `for` loop uses
    the following basic pattern:


    `for (` `initialize loop` `;` `condition` `;` `code to run after each iteration`
    `) {`


    `code to be executed`


    `}`


    The following code does exactly the same as the previous `while` loop, displaying
    every number from 1 to 100 (see `forloop.php`):


    `for ($i = 1; $i <= 100; $i++) {`


    `echo "$i<br>";`


    `}`


    The three expressions inside the parentheses control the action of the loop (note
    that they are separated by semicolons, not commas):


    *   The first expression is executed before the loop starts. In this case, it
    sets the initial value of the counter variable `$i` to 1.

    *   The second expression sets the condition that determines how long the loop
    should continue to run. This can be a fixed number, a variable, or an expression
    that calculates a value.

    *   The third expression is executed at the end of each iteration of the loop.
    In this case, it increases `$i` by 1, but there is nothing stopping you from using
    bigger increments. For instance, replacing `$i++` with `$i+=10` in this example
    would display 1, 11, 21, 31, and so on.


    #### Looping Through Arrays and Objects with Foreach


    The final type of loop in PHP is used with arrays and objects. It takes two forms,
    both of which use temporary variables to handle each element. If you only need
    to do something with the element’s value, the `foreach` loop takes the following
    form:


    `foreach (` `variable_name` `as` `element` `) {`


    `do something with element`


    `}`


    The following example loops through the `$shoppingList` array and displays the
    name of each item (the code is in `foreach_01.php`):


    `$shoppingList = [''wine'', ''fish'', ''bread'', ''grapes'', ''cheese''];`


    `foreach ($shoppingList as $item) {`


    `echo $item.''<br>'';`


    `}`


    Caution


    The `foreach` keyword is one word. Inserting a space between `for` and `each`
    doesn’t work.


    Although the preceding example uses an indexed array, you can also use the simple
    form of the `foreach` loop with an associative array.


    The alternative form of the `foreach` loop gives access to both the key and the
    value of each element. It takes this slightly different form:


    `foreach (` `variable_name` `as` `key` `=>` `value` `) {`


    `do something with key and value`


    `}`


    This next example uses the `$book`associative array from the “Creating arrays”
    section earlier in this chapter and incorporates the key and value of each element
    into a simple string, as shown in the following screenshot (see `foreach_02.php`):


    `foreach ($book as $key => $value) {`


    `echo "$key: $value<br>";`


    `}`


    ![A978-1-4842-0635-5_3_Figf_HTML.jpg](A978-1-4842-0635-5_3_Figf_HTML.jpg)


    Note


    Apart from arrays, the main use of a `foreach` loop is with a special type of
    object known as an iterator. You’ll see how to use iterators in [Chapter 7](#A978-1-4842-0635-5_7_Chapter.html).


    #### Breaking Out Of a Loop


    To bring a loop prematurely to an end when a certain condition is met, insert
    the `break` keyword inside a conditional statement. As soon as the script encounters
    `break`, it will exit the loop.


    To skip the code in a loop when a certain condition is met, use the `continue`
    keyword. Instead of exiting, it returns to the top of the loop and deals with
    the next element. For example, the following loop skips the current element if
    `$photo` has no value:


    `foreach ($photos as $photo) {`


    `if (empty($photo)) continue;`


    `// code to display a photo`


    `}`


    ### Modularizing Code with Functions


    Functions offer a convenient way of running frequently performed operations. In
    addition to the large number of built-in functions, PHP lets you create your own.
    The advantages are that you write the code only once, rather than needing to retype
    it everywhere you need it. This not only speeds up development but also makes
    your code easier to read and maintain. If there’s a problem with the code in your
    function, you can update it in just one place rather than hunting through your
    entire site. Moreover, functions usually speed up the processing of your pages.


    Building your own functions in PHP is easy. You simply wrap a block of code in
    a pair of curly braces and use the `function` keyword to name the new function.
    The function name is always followed by a pair of parentheses. The following—admittedly
    trivial—example demonstrates the basic structure of a custom-built function (see
    `functions_01.php` in the files for this chapter):


    `function sayHi() {`


    `echo ''Hi!'';`


    `}`


    Simply putting `sayHi()` `;` in a PHP code block results in Hi! being displayed
    onscreen. This type of function is like a drone: it always performs exactly the
    same operation. For functions to be responsive to circumstances, you need to pass
    values to them as arguments.


    #### Passing Values to Functions


    Let’s say you want to adapt the `sayHi()` function so that it displays someone’s
    name. You do this by inserting a variable between the parentheses in the function
    declaration. The same variable is then used inside the function to display whatever
    value is passed to the function. To pass more than one argument to a function,
    separate the variables with commas inside the opening parentheses. This is what
    the revised function looks like (see `functions_02.php`):


    `function sayHi(` `$name` `) {`


    `echo` `"` `Hi,` `$name` `!` `"` `;`


    `}`


    You can now use this function inside a page to display the value of any variable
    passed to `sayHi()`. For instance, if you have an online form that saves someone’s
    name in a variable called `$visitor`, and Ben visits your site, you can give him
    the sort of personal greeting shown in the following screenshot by putting `sayHi($visitor);`
    in your page.


    ![A978-1-4842-0635-5_3_Figg_HTML.jpg](A978-1-4842-0635-5_3_Figg_HTML.jpg)


    A downside of PHP’s weak typing is that if Ben is being particularly uncooperative,
    he might type 5 into the form instead of his name, giving you not quite the type
    of high five you might have been expecting.


    ![A978-1-4842-0635-5_3_Figh_HTML.jpg](A978-1-4842-0635-5_3_Figh_HTML.jpg)


    This is why you should check user input before using it in any critical situation.'
  trans: "\n# 使用 While 和 Do . . . While 循环\n\n最简单的循环类型称为 `while` 循环。其基本结构如下：\n\n```\n\
    while (条件为真) {\n    执行某些操作\n}\n```\n\n以下代码在浏览器中显示从 1 到 100 的每个数字（你可以在本章配套文件中的\
    \ `while.php` 中测试）。它首先将变量（`$i`）设置为 1，然后使用该变量作为控制循环的计数器，同时在屏幕上显示当前数字。\n\n```\n\
    $i = 1;  // 设置计数器\nwhile ($i <= 100) {\n    echo \"$i<br>\";\n    $i++; // 将计数器增加\
    \ 1\n}\n```\n\n**提示**\n\n在本章前半部分，我警告过不要使用含义模糊的变量名。然而，使用 `$i` 作为计数器是一种广泛接受的约定。如果\
    \ `$i` 已被使用，通常的做法是使用 `$j` 或 `$k` 作为计数器。\n\n`while` 循环的一种变体使用关键字 `do`，其基本模式如下：\n\
    \n```\ndo {\n    要执行的代码\n} while (待测试的条件);\n```\n\n`do . . . while` 循环与 `while`\
    \ 循环的区别在于，`do` 块中的代码至少会执行一次，即使条件永远不为真。以下代码（位于 `dowhile.php` 中）会显示 `$i` 的值一次，即使该值大于预期的最大值。\n\
    \n```\n$i = 1000;\ndo {\n    echo \"$i<br>\";\n    $i++; // 将计数器增加 1\n} while\
    \ ($i <= 100);\n```\n\n使用 `while` 和 `do . . . while` 循环的危险在于忘记设置结束循环的条件，或者设置了不可能实现的条件。这被称为无限循环，它可能会冻结你的计算机或导致浏览器崩溃。\n\
    \n## 多功能的 for 循环\n\n`for` 循环不太容易产生无限循环，因为你需要在第一行声明循环的所有条件。`for` 循环使用以下基本模式：\n\n\
    ```\nfor (初始化循环; 条件; 每次迭代后执行的代码) {\n    要执行的代码\n}\n```\n\n以下代码的功能与之前的 `while`\
    \ 循环完全相同，显示从 1 到 100 的每个数字（参见 `forloop.php`）：\n\n```\nfor ($i = 1; $i <= 100;\
    \ $i++) {\n    echo \"$i<br>\";\n}\n```\n\n括号内的三个表达式控制循环的动作（注意，它们用分号分隔，而不是逗号）：\n\
    \n- 第一个表达式在循环开始前执行。在此例中，它将计数器变量 `$i` 的初始值设置为 1。\n- 第二个表达式设置决定循环应持续运行多长时间的条件。它可以是一个固定数字、一个变量或一个计算值的表达式。\n\
    - 第三个表达式在循环的每次迭代结束时执行。在此例中，它将 `$i` 增加 1，但你可以使用更大的增量。例如，将此示例中的 `$i++` 替换为 `$i+=10`\
    \ 将显示 1、11、21、31，依此类推。\n\n## 使用 Foreach 遍历数组和对象\n\nPHP 中的最后一种循环类型用于数组和对象。它有两种形式，两者都使用临时变量来处理每个元素。如果你只需要对元素的值进行操作，`foreach`\
    \ 循环采用以下形式：\n\n```\nforeach (变量名 as 元素) {\n    对元素执行某些操作\n}\n```\n\n以下示例遍历 `$shoppingList`\
    \ 数组并显示每个项目的名称（代码位于 `foreach_01.php`）：\n\n```\n$shoppingList = ['wine', 'fish',\
    \ 'bread', 'grapes', 'cheese'];\nforeach ($shoppingList as $item) {\n    echo\
    \ $item.'<br>';\n}\n```\n\n**注意**\n\n`foreach` 关键字是一个单词。在 `for` 和 `each` 之间插入空格是无效的。\n\
    \n虽然前面的示例使用了索引数组，但你也可以将 `foreach` 循环的简单形式用于关联数组。\n\n`foreach` 循环的另一种形式可以访问每个元素的键和值。它采用这种略有不同的形式：\n\
    \n```\nforeach (变量名 as 键 => 值) {\n    对键和值执行某些操作\n}\n```\n\n下一个示例使用本章前面“创建数组”部分中的\
    \ `$book` 关联数组，并将每个元素的键和值合并到一个简单的字符串中，如下面的屏幕截图所示（参见 `foreach_02.php`）：\n\n```\n\
    foreach ($book as $key => $value) {\n    echo \"$key: $value<br>\";\n}\n```\n\n\
    ![A978-1-4842-0635-5_3_Figf_HTML.jpg](img/A978-1-4842-0635-5_3_Figf_HTML.jpg)\n\
    \n**注意**\n\n除了数组之外，`foreach` 循环的主要用途是处理一种称为迭代器的特殊类型对象。你将在第 7 章中了解如何使用迭代器。\n\n\
    ## 跳出循环\n\n为了在满足特定条件时提前结束循环，可以在条件语句中插入 `break` 关键字。一旦脚本遇到 `break`，它将退出循环。\n\n\
    要在满足特定条件时跳过循环中的代码，请使用 `continue` 关键字。它不是退出循环，而是返回到循环顶部并处理下一个元素。例如，以下循环在 `$photo`\
    \ 没有值时跳过当前元素：\n\n```\nforeach ($photos as $photo) {\n    if (empty($photo)) continue;\n\
    \    // 显示照片的代码\n}\n```\n\n# 使用函数模块化代码\n\n函数提供了一种执行频繁操作任务的便捷方式。除了大量内置函数外，PHP 还允许你创建自己的函数。其优点是你只需编写一次代码，而不需要在需要它的每个地方重新输入。这不仅加快了开发速度，还使代码更易于阅读和维护。如果函数中的代码有问题，你只需在一个地方更新它，而不必在整个网站中搜索。此外，函数通常可以加快页面的处理速度。\n\
    \n在 PHP 中构建自己的函数很容易。你只需将一段代码用一对花括号括起来，并使用 `function` 关键字为新函数命名。函数名后面总是跟着一对圆括号。以下（虽然微不足道）示例演示了自定义函数的基本结构（参见本章配套文件中的\
    \ `functions_01.php`）：\n\n```\nfunction sayHi() {\n    echo 'Hi!';\n}\n```\n\n\
    只需在 PHP 代码块中放置 `sayHi();` 就会在屏幕上显示 `Hi!`。这种类型的函数就像一个无人机：它总是执行完全相同的操作。为了使函数能够响应不同的情况，你需要将值作为参数传递给它。\n\
    \n## 向函数传递值\n\n假设你想要调整 `sayHi()` 函数，使其显示某人的名字。你可以通过在函数声明的圆括号之间插入一个变量来实现这一点。然后在函数内部使用相同的变量来显示传递给函数的任何值。要向函数传递多个参数，请在起始圆括号内用逗号分隔变量。这是修改后的函数的样子（参见\
    \ `functions_02.php`）：\n\n```\nfunction sayHi($name) {\n    echo \"Hi, $name!\"\
    ;\n}\n```\n\n你现在可以在页面中使用此函数来显示传递给 `sayHi()` 的任何变量的值。例如，如果你有一个在线表单，将某人的姓名保存在名为\
    \ `$visitor` 的变量中，并且 Ben 访问了你的网站，你可以通过在你的页面中放置 `sayHi($visitor);` 来向他显示如下屏幕截图所示的个性化问候。\n\
    \n![A978-1-4842-0635-5_3_Figg_HTML.jpg](img/A978-1-4842-0635-5_3_Figg_HTML.jpg)\n\
    \nPHP 弱类型的一个缺点是，如果 Ben 特别不配合，他可能会在表单中键入 5 而不是他的名字，这带给你的可能不是你期望的那种击掌（high five）。\n\
    \n![A978-1-4842-0635-5_3_Figh_HTML.jpg](img/A978-1-4842-0635-5_3_Figh_HTML.jpg)\n\
    \n这就是为什么在任何关键情况下使用用户输入之前，应先检查用户输入的原因。\n"
- fmt: "#### Variable Scope—Functions as Black Boxes\n\nIt’s also important to understand\
    \ that functions create a separate environment that is rather like a black box.\
    \ Normally what goes on inside the function has no impact on the rest of the script,\
    \ unless it returns a value, as described in the next section. Variables inside\
    \ a function remain exclusive to the function. This example should illustrate\
    \ the point (see `functions_04.php`):\n\n```\nfunction doubleIt($number) {\n \
    \   $number *= 2;\n    echo '$number is ' . $number . '<br>';\n}\n\n$number =\
    \ 4;\ndoubleIt($number);\necho '$number is ' . $number;\n```\n\nThe first four\
    \ lines define a function called `doubleIt()`, which takes a number, doubles it,\
    \ and displays it onscreen. The rest of the script assigns the value 4 to `$number`.\
    \ Then it passes `$number` as an argument to `doubleit()`. The function processes\
    \ `$number` and displays 8. After the function comes to an end, `$number` is displayed\
    \ onscreen by `echo`. This time, it’s 4 and not 8, as shown in the following screenshot:\n\
    \n![A978-1-4842-0635-5_3_Figi_HTML.jpg](A978-1-4842-0635-5_3_Figi_HTML.jpg)\n\n\
    This demonstrates that `$number` in the main script is totally unrelated to the\
    \ variable with the same name inside the function. This is known as the scope\
    \ of the variable. Even if the value of the variable changes inside a function,\
    \ variables with the same name outside are not affected. To avoid confusion, it’s\
    \ a good idea to use variable names in the rest of your script that are different\
    \ from those used inside functions. This isn’t always possible, so it’s useful\
    \ to know that functions work like little black boxes and don’t normally have\
    \ any direct impact on the values of variables in the rest of the script.\n\n\
    Another aspect of variable scope is that a function cannot normally access values\
    \ in the outer script unless they’re passed to the function as arguments.\n\n\
    **Note:** PHP superglobal variables, such as `$_POST` and `$_GET`, are not affected\
    \ by variable scope. They’re always available, which is why they’re called superglobal.\n\
    \n#### Returning Values from Functions\n\nThere’s more than one way to get a function\
    \ to change the value of a variable passed to it as an argument, but the most\
    \ important method is to use the `return` keyword and to assign the result either\
    \ to the same variable or to another one. This can be demonstrated by amending\
    \ the `doubleIt()` function like this (the code is in `functions_05.php`):\n\n\
    ```\nfunction doubleIt($number) {\n    return $number *= 2;\n}\n\n$num = 4;\n\
    $doubled = doubleIt($num);\necho '$num is: ' . $num . '<br>';\necho '$doubled\
    \ is: ' . $doubled;\n```\n\n![A978-1-4842-0635-5_3_Figj_HTML.jpg](A978-1-4842-0635-5_3_Figj_HTML.jpg)\n\
    \nThis time, I have used different names for the variables to avoid confusing\
    \ them. I have also assigned the result of `doubleIt($num)` to a new variable.\
    \ The benefit of doing this is that both the original value and the result of\
    \ the calculation are now available. You won’t always want to keep the original\
    \ value, but it can be very useful at times.\n\n#### Passing by Reference—Changing\
    \ the Value of an Argument\n\nAlthough functions don’t normally change the value\
    \ of variables passed to them as arguments, there are occasions when you do want\
    \ to change the original value rather than capture a return value. To do so, when\
    \ defining the function, you prefix the parameter you want to change with an ampersand,\
    \ like this:\n\n```\nfunction doubleIt(&$number) {\n    $number *= 2;\n}\n```\n\
    \nNotice that this version of the `doubleIt()` function doesn’t `echo` the value\
    \ of `$number`, nor does it return the value of the calculation. Because the parameter\
    \ between the parentheses is prefixed by an ampersand, the original value of a\
    \ variable passed as an argument to the function will be changed. This is known\
    \ as **passing by reference**.\n\nThe following code (found in `functions_06.php`)\
    \ demonstrates the effect:\n\n```\n$num = 4;\necho '$num is: ' . $num . '<br>';\n\
    doubleIt($num);\necho '$num is now: ' . $num;\n```\n\n![A978-1-4842-0635-5_3_Figk_HTML.jpg](A978-1-4842-0635-5_3_Figk_HTML.jpg)\n\
    \nThe ampersand is used only in the function definition, not when the function\
    \ is invoked.\n\n**Note:** Generally speaking, it’s not a good idea to use functions\
    \ to change the original values of variables passed to them as arguments because\
    \ there can be unexpected consequences if the variable is used elsewhere in a\
    \ script. However, there are situations in which it makes a lot of sense to do\
    \ this. For example, the built-in array-sorting functions use pass by reference\
    \ to affect the original array.\n\n#### Where to Locate Custom-Built Functions\n\
    \nIf your custom-built function is found on the same page it’s being used, it\
    \ doesn’t matter where you declare the function; it can be either before or after\
    \ it’s used. It’s a good idea, however, to store functions together, either at\
    \ the top or the bottom of a page. This makes them easier to find and maintain.\n\
    \nFunctions that are used in more than one page are best stored in an external\
    \ file that is included in each page. Including external files with `include`\
    \ and `require` is covered in detail in the next chapter. When functions are stored\
    \ in external files, you must include the external file before calling any of\
    \ its functions.\n\n### Creating New Variables Dynamically\n\nPHP supports the\
    \ creation of what’s known as a **variable variable**. Although that looks like\
    \ a typographical error, it’s not. Simply put, a variable variable creates a new\
    \ variable that derives its name from an existing variable. This concept can be\
    \ difficult to understand, but the following examples should clarify the situation\
    \ (the code is in `variable_variables.php`).\n\nThe following statement assigns\
    \ the string “city” to a variable called `$location`:\n\n```\n$location = 'city';\n\
    ```\n\nYou create a variable variable by using two dollar signs, like this:\n\n\
    ```\n$$location = 'London';\n```\n\nThe variable variable takes the value of the\
    \ original variable as its name. In other words, `$$location` is the same as `$city`.\n\
    \n```\necho $city; // London\n```\n\nAlthough this demonstrates how variable variables\
    \ work, it’s not a very practical example. So let’s consider a situation that\
    \ creates new variables dynamically. Let’s say you have an associative array like\
    \ this:\n\n```\n$fields = [\n    'name'     => 'David',\n    'email'    => 'david@example.com',\n\
    \    'comments' => \"What's a variable variable?\"\n];\n```\n\nTo get the value\
    \ of an array element, you would use the name of its key as a string in square\
    \ brackets after the array variable, like this:\n\n```\necho $fields['name'];\
    \  // David\n```\n\nInstead of using this syntax, you could use a `foreach` loop\
    \ to generate `$name`, `$email`, and `$comments` variables dynamically as variable\
    \ variables, as follows:\n\n```\nforeach ($fields as $key => $value) {\n    $$key\
    \ = $value;\n}\n\necho $name . '<br>';\necho $email . '<br>';\necho $comments;\n\
    ```\n\nThis produces the following output:\n\n![A978-1-4842-0635-5_3_Figl_HTML.jpg](A978-1-4842-0635-5_3_Figl_HTML.jpg)\n\
    \nInside the loop, `$$key` is a variable variable that creates a new variable\
    \ based on the value of `$key`. The loop also assigns `$value` to `$$key`. The\
    \ first time the loop runs, `$key` is “name” and `$value` is “David.” Thus it\
    \ creates a variable called `$name` with the value “David.” As the loop continues\
    \ to run, `$$key` creates new variables called `$email` and `$comments`.\n\nYou’ll\
    \ see this technique used in the mail-processing script in [Chapter 5](#A978-1-4842-0635-5_5_Chapter.html).\n\
    \n**Tip:** To indicate that the double `$` is intentional, I like to enclose the\
    \ variable being used to create the variable variable in curly braces like this:\
    \ `${$key}`. The braces are purely optional, but make the code easier to read."
  raw: '#### Variable Scope—Functions as Black Boxes


    It’s also important to understand that functions create a separate environment
    that is rather like a black box. Normally what goes on inside the function has
    no impact on the rest of the script, unless it returns a value, as described in
    the next section. Variables inside a function remain exclusive to the function.
    This example should illustrate the point (see `functions_04.php`):


    `function doubleIt($number) {`


    `$number *= 2;`


    `echo ''$number is '' . $number . ''<br>'';`


    `}`


    `$number = 4;`


    `doubleIt($number);`


    `echo ''$number is '' . $number;`


    The first four lines define a function called `doubleIt()`, which takes a number,
    doubles it, and displays it onscreen. The rest of the script assigns the value
    4 to `$number`. Then it passes `$number` as an argument to `doubleit()`. The function
    processes `$number` and displays 8\. After the function comes to an end, `$number`
    is displayed onscreen by `echo`. This time, it’s 4 and not 8, as shown in the
    following screenshot:


    ![A978-1-4842-0635-5_3_Figi_HTML.jpg](A978-1-4842-0635-5_3_Figi_HTML.jpg)


    This demonstrates that `$number` in the main script is totally unrelated to the
    variable with the same name inside the function. This is known as the scope of
    the variable. Even if the value of the variable changes inside a function, variables
    with the same name outside are not affected. To avoid confusion, it’s a good idea
    to use variable names in the rest of your script that are different from those
    used inside functions. This isn’t always possible, so it’s useful to know that
    functions work like little black boxes and don’t normally have any direct impact
    on the values of variables in the rest of the script.


    Another aspect of variable scope is that a function cannot normally access values
    in the outer script unless they’re passed to the function as arguments.


    Note


    PHP superglobal variables, such as `$_POST` and `$_GET`, are not affected by variable
    scope. They’re always available, which is why they’re called superglobal.


    #### Returning Values from Functions


    There’s more than one way to get a function to change the value of a variable
    passed to it as an argument, but the most important method is to use the `return`
    keyword and to assign the result either to the same variable or to another one.
    This can be demonstrated by amending the `doubleIt()` function like this (the
    code is in functions_05.php):


    `function doubleIt($number) {`


    `return` `$number *= 2;`


    `}`


    `$num` `= 4;`


    `$doubled =` `doubleIt(` `$num` `);`


    `echo ''$num is: '' . $num . ''<br>'';`


    `echo ''$doubled is: '' . $doubled;`


    ![A978-1-4842-0635-5_3_Figj_HTML.jpg](A978-1-4842-0635-5_3_Figj_HTML.jpg)


    This time, I have used different names for the variables to avoid confusing them.
    I have also assigned the result of `doubleIt($num)` to a new variable. The benefit
    of doing this is that both the original value and the result of the calculation
    are now available. You won’t always want to keep the original value, but it can
    be very useful at times.


    #### Passing by Reference—Changing the Value of an Argument


    Although functions don’t normally change the value of variables passed to them
    as arguments, there are occasions when you do want to change the original value
    rather than capture a return value. To do so, when defining the function, you
    prefix the parameter you want to change with an ampersand, like this:


    `function doubleIt(&$number) {`


    `$number *= 2;`


    `}`


    Notice that this version of the `doubleIt()` function doesn’t `echo` the value
    of `$number`, nor does it return the value of the calculation. Because the parameter
    between the parentheses is prefixed by an ampersand, the original value of a variable
    passed as an argument to the function will be changed. This is known as passing
    by reference.


    The following code (found in `functions_06.php`) demonstrates the effect:


    `$num = 4;`


    `echo ''$num is: '' . $num . ''<br>'';`


    `doubleIt($num);`


    `echo ''$num is now: '' . $num;`


    ![A978-1-4842-0635-5_3_Figk_HTML.jpg](A978-1-4842-0635-5_3_Figk_HTML.jpg)


    The ampersand is used only in the function definition, not when the function is
    invoked.


    Note


    Generally speaking, it’s not a good idea to use functions to change the original
    values of variables passed to them as arguments because there can be unexpected
    consequences if the variable is used elsewhere in a script. However, there are
    situations in which it makes a lot of sense to do this. For example, the built-in
    array-sorting functions use pass by reference to affect the original array.


    #### Where to Locate Custom-Built Functions


    If your custom-built function is found on the same page it’s being used, it doesn’t
    matter where you declare the function; it can be either before or after it’s used.
    It’s a good idea, however, to store functions together, either at the top or the
    bottom of a page. This makes them easier to find and maintain.


    Functions that are used in more than one page are best stored in an external file
    that is included in each page. Including external files with `include` and `require`
    is covered in detail in the next chapter. When functions are stored in external
    files, you must include the external file before calling any of its functions.


    ### Creating New Variables Dynamically


    PHP supports the creation of what’s known as a variable variable. Although that
    looks like a typographical error, it’s not. Simply put, a variable variable creates
    a new variable that derives its name from an existing variable. This concept can
    be difficult to understand, but the following examples should clarify the situation
    (the code is in `variable_variables.php`).


    The following statement assigns the string “city” to a variable called `$location`:


    `$location = ''city'';`


    You create a variable variable by using two dollar signs, like this:


    `$$location = ''London'';`


    The variable variable takes the value of the original variable as its name. In
    other words, `$$location` is the same as `$city`.


    `echo $city; // London`


    Although this demonstrates how variable variables work, it’s not a very practical
    example. So let’s consider a situation that creates new variables dynamically.
    Let’s say you have an associative array like this:


    `$fields = [`


    `''name''     => ''David'',`


    `''email''    => ''` `david@example.com` `'',`


    `''comments'' => "What''s a variable variable?"`


    `];`


    To get the value of an array element, you would use the name of its key as a string
    in square brackets after the array variable, like this:


    `echo $fields[''name''];  // David`


    Instead of using this syntax, you could use a `foreach` loop to generate `$name`,
    `$email`, and `$` `comments` variables dynamically as variable variables, as follows:


    `foreach ($fields as $key => $value) {`


    `$$key = $value;`


    `}`


    `echo $name . ''<br>'';`


    `echo $email . ''<br>'';`


    `echo $comments;`


    This produces the following output:


    ![A978-1-4842-0635-5_3_Figl_HTML.jpg](A978-1-4842-0635-5_3_Figl_HTML.jpg)


    Inside the loop, `$$key` is a variable variable that creates a new variable based
    on the value of `$key`. The loop also assigns `$value` to `$$key`. The first time
    the loop runs, `$key` is “name” and `$value` is “David.” Thus it creates a variable
    called `$name` with the value “David.” As the loop continues to run, `$$key` creates
    new variables called `$email` and `$comments`.


    You’ll see this technique used in the mail-processing script in [Chapter 5](#A978-1-4842-0635-5_5_Chapter.html).


    Tip


    To indicate that the double `$` is intentional, I like to enclose the variable
    being used to create the variable variable in curly braces like this: `${$key}`.
    The braces are purely optional, but make the code easier to read.'
  trans: "好的，作为高级文档工程师和翻译员，我将遵循您的指示，完成以下翻译任务。\n\n\n#### 变量作用域——函数如同黑盒子\n\n理解函数会创建一个类似于黑盒子的独立环境也很重要。通常，函数内部的操作不会影响脚本的其他部分，除非它返回一个值，这将在下一节中描述。函数内部的变量是函数独有的。下面的例子可以说明这一点（参见\
    \ `functions_04.php`）：\n\n```\nfunction doubleIt($number) {\n    $number *= 2;\n\
    \    echo '$number is ' . $number . '<br>';\n}\n\n$number = 4;\ndoubleIt($number);\n\
    echo '$number is ' . $number;\n```\n\n前四行定义了一个名为 `doubleIt()` 的函数，它接收一个数字，将其加倍，并显示在屏幕上。脚本的其余部分将值\
    \ 4 赋给 `$number`。然后，它将 `$number` 作为参数传递给 `doubleIt()` 函数。函数处理 `$number` 并显示 8。函数结束后，`echo`\
    \ 将 `$number` 显示在屏幕上。这一次，它的值是 4 而不是 8，如下面的截图所示：\n\n![A978-1-4842-0635-5_3_Figi_HTML.jpg](img/A978-1-4842-0635-5_3_Figi_HTML.jpg)\n\
    \n这表明主脚本中的 `$number` 与函数内部同名的变量完全无关。这被称为变量的作用域。即使在函数内部改变了变量的值，外部同名的变量也不会受到影响。为了避免混淆，最好在脚本的其余部分使用与函数内部不同的变量名。但这并不总是可能做到，因此，理解函数像小黑盒子一样工作，并且通常不会直接影响脚本其余部分中的变量值，是很有用的。\n\
    \n变量作用域的另一个方面是，函数通常无法访问外部脚本中的值，除非这些值作为参数传递给函数。\n\n**注意：** PHP 的超全局变量，如 `$_POST`\
    \ 和 `$_GET`，不受变量作用域的影响。它们始终可用，这就是为什么它们被称为超全局变量。\n\n#### 从函数返回值\n\n让函数改变传递给它的参数的值不止一种方法，但最重要的方法是使用\
    \ `return` 关键字，并将结果赋给同一个变量或另一个变量。这可以通过修改 `doubleIt()` 函数来演示，如下所示（代码在 `functions_05.php`\
    \ 中）：\n\n```\nfunction doubleIt($number) {\n    return $number *= 2;\n}\n\n$num\
    \ = 4;\n$doubled = doubleIt($num);\necho '$num is: ' . $num . '<br>';\necho '$doubled\
    \ is: ' . $doubled;\n```\n\n![A978-1-4842-0635-5_3_Figj_HTML.jpg](img/A978-1-4842-0635-5_3_Figj_HTML.jpg)\n\
    \n这次，我为变量使用了不同的名称以避免混淆。我还将 `doubleIt($num)` 的结果赋给了一个新变量。这样做的好处是，原始值和计算结果现在都可以使用。你并不总是需要保留原始值，但有时它非常有用。\n\
    \n#### 通过引用传递——改变参数的值\n\n尽管函数通常不会改变传递给它们的参数的值，但有时你确实希望改变原始值，而不是捕获返回值。为此，在定义函数时，你需要在想要改变的参数前加上一个与符号（ampersand），如下所示：\n\
    \n```\nfunction doubleIt(&$number) {\n    $number *= 2;\n}\n```\n\n请注意，这个版本的 `doubleIt()`\
    \ 函数既没有 `echo` `$number` 的值，也没有返回计算结果的值。因为括号内的参数前面加了一个与符号，所以作为参数传递给函数的变量的原始值将被改变。这被称为**通过引用传递**。\n\
    \n下面的代码（位于 `functions_06.php` 中）演示了这一效果：\n\n```\n$num = 4;\necho '$num is: ' .\
    \ $num . '<br>';\ndoubleIt($num);\necho '$num is now: ' . $num;\n```\n\n![A978-1-4842-0635-5_3_Figk_HTML.jpg](img/A978-1-4842-0635-5_3_Figk_HTML.jpg)\n\
    \n与符号仅用于函数定义中，在调用函数时不需要使用。\n\n**注意：** 一般来说，使用函数来改变传递给它的参数的原始值并不是一个好主意，因为如果该变量在脚本的其他地方使用，可能会产生意想不到的后果。然而，在某些情况下这样做是很有意义的。例如，内置的数组排序函数就使用传递引用来影响原始数组。\n\
    \n#### 自定义函数的位置\n\n如果自定义函数位于使用它的同一个页面中，那么在哪里声明该函数并不重要；可以在使用它的前面或后面。然而，最好将函数集中存储，放在页面的顶部或底部。这样可以使它们更容易查找和维护。\n\
    \n在多个页面中使用的函数最好存储在一个外部文件中，并在每个页面中包含该文件。使用 `include` 和 `require` 包含外部文件将在下一章中详细介绍。当函数存储在外部文件中时，你必须在调用任何函数之前包含该外部文件。\n\
    \n### 动态创建新变量\n\nPHP 支持创建所谓的**可变变量**。虽然这看起来像是一个排版错误，但事实并非如此。简单来说，可变变量会创建一个新变量，其名称源自一个现有变量。这个概念可能难以理解，但下面的例子应该能说明情况（代码在\
    \ `variable_variables.php` 中）。\n\n以下语句将字符串 “city” 赋给一个名为 `$location` 的变量：\n\n\
    ```\n$location = 'city';\n```\n\n通过使用两个美元符号来创建一个可变变量，如下所示：\n\n```\n$$location\
    \ = 'London';\n```\n\n这个可变变量以原始变量的值作为其名称。换句话说，`$$location` 等同于 `$city`。\n\n```\n\
    echo $city; // London\n```\n\n虽然这演示了可变变量的工作原理，但它并不是一个非常实用的例子。因此，让我们考虑一个动态创建新变量的场景。假设你有一个像这样的关联数组：\n\
    \n```\n$fields = [\n    'name'     => 'David',\n    'email'    => 'david@example.com',\n\
    \    'comments' => \"What's a variable variable?\"\n];\n```\n\n要获取数组元素的值，你可以在数组变量后面使用方括号括起来的键名（作为字符串），如下所示：\n\
    \n```\necho $fields['name'];  // David\n```\n\n你可以不使用这种语法，而是使用一个 `foreach` 循环来动态生成\
    \ `$name`、`$email` 和 `$comments` 变量作为可变变量，如下所示：\n\n```\nforeach ($fields as $key\
    \ => $value) {\n    $$key = $value;\n}\n\necho $name . '<br>';\necho $email .\
    \ '<br>';\necho $comments;\n```\n\n这会产生以下输出：\n\n![A978-1-4842-0635-5_3_Figl_HTML.jpg](img/A978-1-4842-0635-5_3_Figl_HTML.jpg)\n\
    \n在循环内部，`$$key` 是一个可变变量，它根据 `$key` 的值创建一个新变量。循环还将 `$value` 赋给 `$$key`。第一次运行循环时，`$key`\
    \ 是 “name”，`$value` 是 “David”。因此它创建了一个名为 `$name` 且值为 “David” 的变量。随着循环继续运行，`$$key`\
    \ 会创建名为 `$email` 和 `$comments` 的新变量。\n\n你将在第 5 章的邮件处理脚本中看到这种技术。\n\n**提示：** 为了表明双\
    \ `$` 是有意为之，我喜欢将用于创建可变变量的变量用花括号括起来，像这样：`${$key}`。花括号完全是可选的，但可以使代码更易于阅读。\n"
- fmt: '# PHP Quick Checklist


    This chapter contains a lot of information that is impossible to absorb in one
    sitting, but hopefully the first half has given you a broad overview of how PHP
    works. The second half fills in a lot of essential details that you can refer
    to as you progress through this book. Here’s a reminder of some of the main points:


    - Always give PHP pages the correct filename extension, normally `.php`.

    - Enclose all PHP code between the correct tags: `<?php` and `?>`.

    - Avoid the short form of the opening tag: `<?`. Using `<?php` is more reliable.

    - It’s recommended to omit the closing PHP tag in files that contain only PHP
    code.

    - PHP variables begin with `$` followed by a letter or the underscore character.

    - Choose meaningful variable names and remember they’re case-sensitive.

    - Use comments to remind you what your script does.

    - Remember that numbers don’t require quotes, but strings (text) do.

    - You can use either single or double quotes, but the outer pair must match.

    - Use a backslash to escape quotes of the same type inside a string.

    - To store related items together, use an array.

    - Use conditional statements, such as `if` and `if . . . else`, for decision making.

    - Simplify repetitive tasks with loops.

    - Use functions to perform preset tasks.

    - Display PHP output with `echo` or `print`.

    - Inspect the content of arrays with `print_r()`.

    - With most error messages, work backward from the position indicated.

    - Keep smiling—and remember that PHP is not difficult.


    # 4. Lightening Your Workload with Includes


    The ability to include the contents of one file inside another is one of the most
    powerful features of PHP. It’s also one of the easiest to implement.


    Most pages in a website share common elements, such as a header, footer, and navigation
    menu. You can alter the look of those elements throughout the site by changing
    the style rules in an external style sheet. But CSS has only a limited ability
    to change the content of page elements. If you want to add a new item to your
    menu, you need to edit the HTML for every page that displays it. Web-authoring
    tools, such as Dreamweaver, have templating systems that automatically update
    all pages connected to a master file, but you would still need to upload all the
    files to your remote server.


    That’s not necessary with PHP, which supports server-side includes (SSI). A server-side
    include is an external file which contains dynamic code or HTML (or both) that
    you want to incorporate into multiple pages. PHP merges the content into each
    webpage on the server. Because each page uses the same external file, you can
    update a menu or other common element by editing and uploading a single file—a
    great timesaver.


    As you work through this chapter, you’ll learn how PHP includes work, where PHP
    looks for include files, and how to prevent error messages when an include file
    can’t be found. In addition, you’ll learn to do some cool tricks with PHP, such
    as creating a random image generator.


    This chapter covers the following topics:


    - Understanding the different include commands

    - Telling PHP where to find your include files

    - Using PHP includes for common page elements

    - Protecting sensitive information in include files

    - Automating a “you are here” menu link

    - Generating a page’s title from its filename

    - Automatically updating a copyright notice

    - Displaying random images complete with captions

    - Handling errors with include files

    - Changing your web server’s `include_path`


    Figure [4-1](#A978-1-4842-0635-5_4_Chapter.html#Fig1) shows how four elements
    of a page benefit from a little PHP magic with include files.


    ![A978-1-4842-0635-5_4_Fig1_HTML.jpg](A978-1-4842-0635-5_4_Fig1_HTML.jpg)


    Figure 4-1. Identifying elements of a static webpage that could be improved with
    PHP


    The menu and copyright notice appear on each page. By turning them into include
    files, you can make changes to just one page and see them propagate throughout
    the site. With PHP’s conditional logic, you can also get the menu to display the
    correct style to indicate which page the visitor is currently on. Similar PHP
    wizardry automatically changes the date on the copyright notice and the text in
    the page title. PHP can also add variety by displaying a random image and caption.
    The images don’t need to be the same size; a PHP function inserts the correct
    `width` and `height` attributes in the `<img>` tag.


    ## Including Code from External Files


    The ability to include code from other files is a core part of PHP. All that’s
    necessary is to use one of PHP’s include commands and tell the server where to
    find the file.


    ### Introducing the PHP Include Commands


    PHP has four commands that can be used to include code from an external file,
    namely:


    - `include`

    - `include_once`

    - `require`

    - `require_once`


    They all do basically the same thing, so why have four? The fundamental difference
    is that `include` attempts to continue processing a script, even if the external
    file is missing, whereas `require` is used in the sense of mandatory: if the file
    is missing, the PHP engine stops processing and throws a fatal error. In practical
    terms, this means you should use `include` if your page would remain usable even
    without the contents of the external file. Use `require` if the page depends on
    the external file.


    The other two commands, `include_once` and `require_once`, work the same way,
    but they prevent the same file from being included more than once in a page. This
    is particularly important when including files that define functions or classes.
    Attempting to define a function or class more than once in a script triggers a
    fatal error. So, using `include_once` or `require_once` ensures that functions
    and classes are defined only once, even if the script tries to include the external
    file more than once, as might happen if the commands are in conditional statements.


    Tip


    Use `include` for external files that aren’t mission critical and `require_once`
    for files that define functions and classes.


    ### Where PHP Looks for Include Files


    To include an external file, use one of the four include commands followed by
    the file path as a string—in other words, the file path must be in quotes (single
    or double, it doesn’t matter). The file path can be either absolute or relative
    to the current document. For example, any of the following will work (as long
    as the target file exists):


    `include ''includes/menu.php'';`


    `include ''C:/xampp/htdocs/phpsols/includes/menu.php'';`


    `include ''/Applications/MAMP/htdocs/phpsols/includes/menu.php'';`


    Note


    PHP accepts forward slashes in Windows file paths.


    You can optionally use parentheses with the include commands, so the following
    would also work:


    `include(''includes/menu.php'');`


    `include(''C:/xampp/htdocs/phpsols/includes/menu.php'');`


    `include(''/Applications/MAMP/htdocs/phpsols/includes/menu.php'');`


    When using a relative file path, it’s recommended to use `./` to indicate that
    the path begins in the current folder. Thus, it’s more efficient to rewrite the
    first example like this:


    `include ''./includes/menu.php''; // path begins in current folder`


    What doesn’t work is using a file path relative to the site root, like this:


    `include ''/includes/menu.php''; // THIS WILL NOT WORK`


    PHP also looks in the `include_path` as defined in your PHP configuration. I’ll
    return to this subject later in this chapter. Before that, let’s put PHP includes
    to practical use.'
