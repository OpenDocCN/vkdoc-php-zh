  \ `RequestMethods::post()` 方法。第二是检查每个表单字段的值，并为缺失值创建错误消息。第三是只要表单数据中没有发现错误，就在数据库中创建一个新的用户行。\n\
  \n> **注意**：这是最基本的一种验证方式。我们只是确保用户为每个字段都输入了某些值。稍后，我们将了解如何扩展 ORM 以实现更精确的数据验证。\n\n现在，填写表单并点击注册按钮，应该会在用户数据库表中插入一行。\n\
  \n如果你看到了这行数据，请为自己鼓个掌。你可能还会注意到，其中有四个字段的值为 `null`。\n\n就数据库结构而言，这可能允许，但我们真正想要的是在创建行时填充这些值，然后从那时起可选地进行更新。为了实现这种自动数据填充，我们需要重写\
  \ `Shared\\Model->save()` 方法，如 **代码清单 14-8** 所示。\n\n**代码清单 14-8.** 重写 `save()` 方法以实现默认填充\n\
  \n```php\npublic function save()\n{\n    $primary = $this->getPrimaryColumn();\n\
  \    $raw = $primary[\"raw\"];\n\n    if (empty($this->$raw))\n    {\n        $this->setCreated(date(\"\
  Y-m-d H:i:s\"));\n        $this->setDeleted(false);\n        $this->setLive(true);\n\
  \    }\n\n    $this->setModified(date(\"Y-m-d H:i:s\"));\n    parent::save();\n\
  }\n```\n\n使用这个新方法，每次创建行时，这些字段都会被填充默认值。你现在注册的下一个用户账户，即使我们没有在控制器中显式设置这些值，其数据行中也应该包含这些值了。\n\
  \n### 会话\n\n会话是与网络浏览器关联的临时存储区域。会话中存储的数据在同一网站的不同页面间持久存在，甚至可以设计成在浏览器重启后依然有效。因此，会话是追踪用户是否已登录的理想方式。\n\
  \n我们现在将要创建的 `Session` 类，与我们在第 5 章创建的 `Cache` 类非常相似。甚至可以将两者合并，但我们不会为此分散精力。`Session`\
  \ 类遵循我们在 `Cache`、`Configuration` 和 `Database` 中见过的工厂模式。因为你应该已经熟悉了相关概念，所以我只会简要介绍。我们从\
  \ `Session` 工厂类开始，如 **代码清单 14-9** 所示。\n\n**代码清单 14-9.** Session 类\n\n```php\nnamespace\
  \ Framework\n{\n    use Framework\\Base as Base;\n    use Framework\\Registry as\
  \ Registry;\n    use Framework\\Session as Session;\n    use Framework\\Session\\\
  Exception as Exception;\n\n    class Session extends Base\n    {\n        /**\n\
  \         * @readwrite\n         */\n        protected $_type;\n\n        /**\n\
  \         * @readwrite\n         */\n        protected $_options;\n\n        protected\
  \ function _getExceptionForImplementation($method)\n        {\n        }\n    }\n\
  }\n```\n\n```php\nreturn new Exception\\Implementation(\"{$method} 方法未实现\");\n}\n\
  \nprotected function _getExceptionForArgument()\n{\n    return new Exception\\Argument(\"\
  无效参数\");\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- "# 第 14 章 ■ 注册与登录\n\n```php\npublic function initialize()\n{\n    $type = $this->getType();\n\
  \    if (empty($type))\n    {\n        $configuration = Registry::get(\"configuration\"\
  );\n        if ($configuration)\n        {\n            $configuration = $configuration->initialize();\n\
  \            $parsed = $configuration->parse(\"configuration/session\");\n     \
  \       if (!empty($parsed->session->default) &&\n                !empty($parsed->session->default->type))\n\
  \            {\n                $type = $parsed->session->default->type;\n     \
  \           unset($parsed->session->default->type);\n                $this->__construct(array(\n\
  \                    \"type\" => $type,\n                    \"options\" => (array)\
  \ $parsed->session->default\n                ));\n            }\n        }\n   \
  \ }\n    if (empty($type))\n    {\n        throw new Exception\\Argument(\"无效类型\"\
  );\n    }\n    switch ($type)\n    {\n        case \"server\":\n        {\n    \
