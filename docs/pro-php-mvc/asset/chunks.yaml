    \ = $this->_parse($comment);\n        }\n        else\n        {\n           \
    \ $_meta[\"methods\"][$method] = null;\n        }\n    }\n    return $_meta[\"\
    methods\"][$method];\n}\n```\n\n利用 `Inspector` 类，我们现在只需查看每个属性/方法上方的注释，就能确定各种元数据！在接下来的章节中，我们将利用这一点，并取得显著成效。\n\
    \n> **注意：** 你可以在 [`php.net/manual/en/book.reflection.php`](http://www.php.net/manual/en/book.reflection.php)\
    \ 阅读更多关于 PHP 反射 API 的内容。\n\n### 问题\n\n1.  我们的自动加载器在类名和文件夹层级之间进行转换。相比于使用四个 `include`/`require`\
    \ 语句，这对我们有什么好处？\n2.  我们设置了一些包含处理特定数据类型实用方法的静态类。为什么这比我们在全局命名空间中创建相同的方法更好？\n3. \
    \ 借助 `Inspector` 类，我们现在可以使用代码评估特殊的注释块以获取信息。这在后续章节中对我们有何益处？\n\n### 答案\n\n1.  类的自动加载远优于手动包含/引入类，尤其是在大型系统中。这是因为我们不再需要记住要手动包含/引入哪些依赖项。它也更加高效，因为只有在需要使用时才会加载。\n\
    2.  我们在全局命名空间中放置的内容越少越好。静态类是以面向对象方式处理这些方法的理想方法。\n3.  我们将能够定义和检查不同类型的标志和键/值对。这可以像判断方法/属性是否应该能从\
    \ `Router` 访问那样简单，也可以像指定在被检查的方法之前或之后是否应该调用其他方法那样复杂。\n\n### 练习\n\n1.  尝试添加一些代码，用于跟踪加载依赖项所花费的时间，以及加载了哪些依赖项。\n\
    2.  尝试创建一些包含特殊注释（带有元属性）的类，然后这些注释可以被检查。\n\n---\n\n## 第三章 — 基类\n\n使用面向对象范式构建 MVC\
    \ 框架的优点之一，是我们能够以最小的努力重用代码。任何时候，我们可能都需要向大多数类添加核心功能，一个好的面向对象基础将帮助我们做到这一点。\n\n想象一下，我们用新构建的框架开发一个应用程序，突然需要在整个应用程序中添加新的安全措施。我们可以修改每个控制器，调用重复的函数或引用共享函数，但最好的解决方案是在继承链的更高层级添加共享功能。\n\
    \n如果我们所有的框架类都继承自一个基类，我们只需修改这一个类，就能轻松添加这类功能。这就是继承对我们的框架有好处的例子。在接下来的章节中，我们还会探讨它的其他用途。\n\
    \n### 目标\n\n-   我们需要使用上一章创建的 `Inspector` 类来检查 `Base` 类及其任何子类的方法/属性。\n-   根据检索到的元数据，我们需要确定某些属性是否应该被视为拥有\
    \ getter/setter。\n\n### Getter 和 Setter\n\n在本章中，我们将探讨如何创建一个坚实的基类，使我们能够使用自己编写的检查器代码来创建\
    \ getter/setter。这些 getter/setter 将是公共访问点，用于访问受保护的类属性。在开始之前，让我们看一些例子，如列表 3-1 所示。\n\
    \n***列表 3-1.*** 可公开访问的属性\n\n```php\nclass Car\n{\n    public $color;\n    public\
    \ $model;\n}\n\n$car = new Car();\n$car->color = \"blue\";\n$car->model = \"b-class\"\
    ;\n```\n\n在这个例子中，`Car` 类的属性是公开可访问的。这就是 PHP 4（及更早版本）处理所有类属性和方法的方式。自 PHP 5 发布以来，PHP\
    \ 开发者已经开始能够使用属性/方法作用域——这是大多数其他面向对象语言早已允许的特性。\n\n使用实例/类属性的主要原因是影响实例/类方法逻辑的执行。因此，我们经常希望防止外部干扰，或者至少使用通常所说的\
    \ getter/setter 来拦截这种干扰。\n\n考虑列表 3-2 中给出的例子。\n\n***列表 3-2.*** 应该是私有的/受保护的变量\n\n\
    ```php\nclass Database\n{\n    public $instance;\n\n    public function __construct($host,\
    \ $username, $password, $schema)\n    {\n        $this->instance = new MySQLi($host,\
    \ $username, $password, $schema);\n    }\n\n    public function query($sql)\n\
    \    {\n        return $this->instance->query($sql);\n    }\n}\n\n// 你应该指定与你的数据库匹配的用户名、密码和模式\n\
    $database = new Database(\"localhost\", \"username\", \"password\", \"schema\"\
    );\n$database->instance = \"cheese\";\n\n$database->query(\"select * from pantry\"\
    );\n```\n\n在这个例子中，当我们创建一个新的 `Database` 实例时，我们的类会打开一个到 MySQL 数据库的连接。由于 `$instance`\
    \ 属性是公开的，它可以随时在外部被修改。它不是一个有效的数据库连接器实例；调用 `query()` 方法将会引发异常。实际上，我们通过将 `$instance`\
    \ 属性设置为 `\"cheese\"` 来做到这一点，这使得后续对 `query()` 方法的调用会引发异常。\n\n让我们看看 getter/setter\
    \ 如何帮助我们避免这个问题，如列表 3-3 所示。\n\n***列表 3-3.*** 保护敏感变量\n\n```php\nclass Database\n\
    {\n    protected $_instance;\n\n    public function getInstance()\n    {\n   \
    \     throw new Exception(\"Instance is protected\");\n    }\n\n    public function\
    \ setInstance($instance)\n    {\n        if ($instance instanceof MySQLi)\n  \
    \      {\n            $this->_instance = $instance;\n        }\n        throw\
    \ new Exception(\"Instance must be of type MySQLi\");\n    }\n\n    public function\
    \ __construct($host, $username, $password, $schema)\n    {\n        $this->_instance\
    \ = new MySQLi($host, $username, $password, $schema);\n    }\n\n    public function\
    \ query($sql)\n    {\n        return $this->_instance->query($sql);\n    }\n}\n\
    ```\n\n现在，我们的数据库连接实例受到了保护，免受外部干扰。我们的类还会提供一些有用的信息，说明如何处理与 `$instance` 属性的交互，这对其他开发者很有帮助。\n\
    \n顾名思义，getter/setter 是用于获取或设置某些内容的方法。它们通常是实例方法，在允许外部访问内部变量时被视为最佳实践。它们通常遵循 `getProperty()`/`setProperty()`\
    \ 的模式，其中 `Property` 可以是任何名词。让我们看看我们的 `Car` 类使用 getter/setter 后会是什么样子，如列表 3-4 所示。\n\
    \n***列表 3-4.*** 简单的 Getter/Setter\n\n```php\nclass Car\n{\n    protected $_color;\n\
    \    protected $_model;\n\n    public function getColor()\n    {\n        return\
    \ $this->_color;\n    }\n\n    public function setColor($color)\n    {\n     \
    \   $this->_color = $color;\n        return $this;\n    }\n\n    public function\
    \ getModel()\n    {\n        return $this->_model;\n    }\n\n    public function\
    \ setModel($model)\n    {\n        $this->_model = $model;\n        return $this;\n\
    \    }\n}\n\n$car = new Car();\n$car->setColor(\"blue\");\n$car->setModel(\"b-class\"\
    );\n```\n\n这里有几件重要的事情需要注意。首先，我们实际上需要自己创建 getter/setter 方法。其他一些语言会自动执行此操作，或者用更少的代码就能实现，但\
    \ PHP 本身并不支持 getter/setter。\n"
- fmt: "# Instead of Using Public Properties\nInstead of using public properties,\
    \ we make them protected/private. The aim is to allow access only through the\
    \ getters/setters. The `getColor()` and `getModel()` methods simply return the\
    \ values of those protected properties. The `setColor()` and `setModel()` methods\
    \ set the values for those protected properties, and return `$this`. Because we\
    \ return `$this`, we can chain calls to the setter methods.\n\nThese getters/setters\
    \ are really quite simple, but there is nothing stopping us from adding additional\
    \ logic to them, such as validation on the setters, or transformations to the\
    \ getters.\n\n## Magic Methods\nWhat PHP lacks, in native getter/setter support,\
    \ it makes up for with magic methods. As their name suggests, magic methods perform\
    \ functionality in addition to that of ordinary functions/methods. We have already\
    \ seen two magic methods: `__construct()` and `__destruct()`.\n\nThe magic method\
    \ we will be focusing on is `__call()`. The `__call()` method is an instance method,\
    \ which is invoked whenever an undefined method is called on a class instance.\
    \ To put it another way, if you call a method that has not been defined, the class’s\
    \ `__call()` method will be called instead. Let us look at an example in Listing\
    \ 3-5.\n\n### Listing 3-5. The `__call()` Method\n\n```php\nclass Car\n{\n   \
    \ public function __call($name, $arguments)\n    {\n        echo \"hello world!\"\
    ;\n    }\n}\n\n$car = new Car();\n$car->hello();\n```\n\nWe do not define a `hello()`\
    \ method on the `Car` class, but when we execute this code, we can see that the\
    \ `__call()` method will be run, and will output the string `\"hello world!\"\
    `. This is because `__call()` is automatically invoked when an undefined method\
    \ is called on an instance of `Car`.\n\nWe can use this to our advantage. If we\
    \ expect our getters/setters to follow the format of `getProperty()`/`setProperty()`,\
    \ we can create a `__call()` method that interprets exactly which property we\
    \ seek to allow access to, and make the relevant changes/return the correct data.\
    \ How would we do that, exactly? Take a look at the example shown in Listing 3-6.\n\
    \n### Listing 3-6. Using `__call()` for Getters/Setters\n\n```php\nclass Car\n\
    {\n    protected $_color;\n    protected $_model;\n    public function __call($name,\
    \ $arguments)\n    {\n        $first = isset($arguments[0]) ? $arguments[0] :\
    \ null;\n        switch ($name)\n        {\n            case \"getColor\":\n \
    \               return $this->_color;\n            case \"setColor\":\n      \
    \          $this->_color = $first;\n                return $this;\n          \
    \  case \"getModel\":\n                return $this->_model;\n            case\
    \ \"setModel\":\n                $this->_model = $first;\n                return\
    \ $this;\n        }\n    }\n}\n\n$car = new Car();\n$car->setColor(\"blue\")->setModel(\"\
    b-class\");\necho $car->getModel();\n```\n\nIn this example, we can note a few\
    \ important things. First, the `__call()` method is always provided with two properties:\
    \ the `$name` of the method being called, and an array of `$arguments` given during\
    \ the call to the method.\n\nIf no arguments are given, this array will be empty.\n\
    \nWe then have to account for all the accessor methods that will be called, which\
    \ we do with the `switch` statement. We could use a lot of `if`/`else` statements,\
    \ but `switch` works best for a list of preset methods. You might notice that\
    \ we do not need to use `break` statements, as `return` statements will prevent\
    \ further cases from being executed.\n\nIn this example, the getter/setter logic\
    \ differs little from property to property. It makes sense to reuse all of the\
    \ surrounding code, and simply implement the few lines of code required for handling\
    \ each individual property, than it does repeating the same body of code for each\
    \ property.\n\n## Adding Introspection\nThis approach works well for a limited\
    \ number of non-public properties, but wouldn’t it be cool if we could account\
    \ for many non-public properties, without even needing to duplicate any code?\
    \ We can achieve this by utilizing a combination of the knowledge we have gained\
    \ about the `__call()` method, as well as the `Inspector` class we built previously.\n\
    \nImagine we could tell our `Base` class to create these getters/setters simply\
    \ by adding comments around the protected properties, as in the example given\
    \ in Listing 3-7."
