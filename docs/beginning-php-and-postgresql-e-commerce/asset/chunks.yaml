- fmt: "#### 4. Use the query tool to execute this code, which creates the `catalog_update_department`\
    \ function in your `hatshop` database:\n\n```sql\n-- Create catalog_update_department\
    \ function\n\nCREATE FUNCTION catalog_update_department(\n  INTEGER, VARCHAR(50),\
    \ VARCHAR(1000))\nRETURNS VOID LANGUAGE plpgsql AS $$\n  DECLARE\n    inDepartmentId\
    \ ALIAS FOR $1;\n    inName ALIAS FOR $2;\n    inDescription ALIAS FOR $3;\n \
    \ BEGIN\n    UPDATE department\n    SET name = inName, description = inDescription\n\
    \    WHERE department_id = inDepartmentId;\n  END;\n$$;\n```\n\nThe `catalog_update_department`\
    \ function updates the name and description of an existing department using the\
    \ `UPDATE SQL` statement.\n\n#### 5. Use the query tool to execute this code,\
    \ which creates the `catalog_delete_department` function in your `hatshop` database:\n\
    \n```sql\n-- Create catalog_delete_department function\n\nCREATE FUNCTION catalog_delete_department(INTEGER)\n\
    RETURNS SMALLINT LANGUAGE plpgsql AS $$\n  DECLARE\n    inDepartmentId ALIAS FOR\
    \ $1;\n    categoryRowsCount INTEGER;\n  BEGIN\n    SELECT INTO categoryRowsCount\n\
    \      count(*)\n    FROM category\n    WHERE department_id = inDepartmentId;\n\
    \    IF categoryRowsCount = 0 THEN\n      DELETE FROM department WHERE department_id\
    \ = inDepartmentId;\n      RETURN 1;\n    END IF;\n    RETURN -1;\n  END;\n$$;\n\
    ```\n\n`catalog_delete_department` deletes an existing department from the database,\
    \ but only if no categories are related to it.\n\n#### 6. Use the query tool to\
    \ execute this code, which creates the `catalog_add_department` function in your\
    \ `hatshop` database:\n\n```sql\n-- Create catalog_add_department function\n\n\
    CREATE FUNCTION catalog_add_department(VARCHAR(50), VARCHAR(1000))\nRETURNS VOID\
    \ LANGUAGE plpgsql AS $$\n  DECLARE\n    inName ALIAS FOR $1;\n    inDescription\
    \ ALIAS FOR $2;\n  BEGIN\n    INSERT INTO department (name, description)\n   \
    \ VALUES (inName, inDescription);\n  END;\n$$;\n```\n\n`catalog_add_department`\
    \ inserts a new department into the database.\n\n#### 7. Finally, load the `admin.php`\
    \ page in your browser, and admire your results. Check all the buttons carefully.\n\
    \n### Administering Categories and Products\n\nBecause the pages that administer\
    \ categories and products are based on the same steps and concepts as the departments’\
    \ admin page, we’ll quickly list the steps you need to follow.\n\nAs you saw earlier,\
    \ when clicking the **Edit Categories** button in the departments page, you get\
    \ the list of categories for that department. In the categories page, clicking\
    \ an **Edit Products** button brings up the list of products for the selected\
    \ category (see Figure 7-10).\n\n![Figure 7-10](images/00061.png)\n\n**Figure\
    \ 7-10.** *Visiting the Christmas Hats category*\n\n### Exercise: Creating Admin\
    \ Categories and Products Pages\n\n#### 1. Create a new template file named `admin_categories.tpl`\
    \ in the `presentation/templates` folder, and add the following code to it:\n\n\
    ```smarty\n{* admin_categories.tpl *}\n{load_admin_categories assign=\"admin_categories\"\
    }\n<span class=\"admin_page_text\">\nEditing categories for department: {$admin_categories->mDepartmentName}\
    \ [\n{strip}\n  <a href=\"{$admin_categories->mAdminDepartmentsLink|prepare_link:\"\
    https\"}\">\n    back to departments ...\n  </a>\n{/strip}\n]\n</span>\n<br /><br\
    \ />\n{if $admin_categories->mErrorMessage neq \"\"}\n  <span class=\"admin_error_text\"\
    >\n    {$admin_categories->mErrorMessage}<br /><br />\n  </span>\n{/if}\n<form\
    \ method=\"post\"\n      action=\"{$admin_categories->mAdminCategoriesTarget|prepare_link:\"\
    https\"}\">\n  {if $admin_categories->mCategoriesCount eq 0}\n    <strong>There\
    \ are no categories in this department!</strong><br />\n  {else}\n    <table>\n\
    \      <tr>\n        <th>Category Name</th>\n        <th>Category Description</th>\n\
    \        <th> </th>\n      </tr>\n      {section name=cCategories loop=$admin_categories->mCategories}\n\
    \        {if $admin_categories->mEditItem ==\n             $admin_categories->mCategories[cCategories].category_id}\n\
    \          <tr>\n            <td width=\"122\">\n              <input type=\"\
    text\" name=\"name\""
