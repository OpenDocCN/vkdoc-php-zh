- fmt: "# create authorized_keys file and paste in the user's key:\n```\n$ vi .ssh/authorized_keys\n\
    $ chmod 0700 .ssh/authorized_keys\n```\n\n> **Note**  \n> A common cause of SSH\
    \ access failure is the creation of configuration files with overly liberal permissions.\
    \ The SSH configuration environment should be readable and writable to the account’s\
    \ owner, only. Pro OpenSSH by Michael Stahnke (Apress, 2005) covers SSH comprehensively.\n\
    \n## Closing Down Shell Access for the `git` User\n\nNo server should be any more\
    \ open than it needs to be. You may want to enable your user to access Git commands,\
    \ but probably not much more.\n\nYou can see the shell associated with a user\
    \ on a Linux server by looking at the file, `/etc/passwd`. Here is the relevant\
    \ line for the `git` account on my remote server:\n\n```\ngit:x:1001:1001::/home/git:/bin/bash\n\
    ```\n\nGit provides a special shell, named `git-shell`, that restricts the user\
    \ to selected commands only. I can enable this program for logins by editing `/etc/passwd`:\n\
    \n```\ngit:x:1001:1001::/home/git:/usr/bin/git-shell\n```\n\nNow, if I attempt\
    \ to log in via SSH, I’m told the score and logged out:\n\n```\n$ ssh git@poppch17.vagrant.internal\n\
    Last login: Sat Jul 30 11:58:27 2016 from 192.168.33.1\nfatal: What do you think\
    \ I am? A shell?\nConnection to poppch17.vagrant.internal closed.\n```\n\n## Beginning\
    \ a Project\n\nNow that I have a remote Git server and access to it from my local\
    \ account, it’s time to add my work in progress to the repository at `/var/git/megaquiz`.\n\
    \nBefore I start, I take a good look at my files and directories, and remove any\
    \ temporary items I might find. Failure to do this is a common annoyance. Temporary\
    \ items to watch for include automatically generated files such as composer packages,\
    \ build directories, installer logs, and so on.\n\n> **Note**  \n> You can specify\
    \ files and patterns to ignore by placing a file named `.gitignore` in your repository.\
    \ On a Linux system, the `man gitignore` command should provide examples of filename\
    \ wildcarding that you can amend to exclude the various lock files and temporary\
    \ directories created by your build processes, editors, and IDEs. This text is\
    \ also available online at [`http://git-scm.com/docs/gitignore`](http://git-scm.com/docs/gitignore).\n\
    \nBefore I go any further, I should register my identity with Git—this makes it\
    \ easier to track who did what in the repository:\n\n```\n$ git config --global\
    \ user.name \"matt z\"\n$ git config --global user.email \"matt@getinstance.com\"\
    \n```\n\nNow that I have established my personal details and ensured that my project\
    \ is clean, I can set it up and push its code to the server:\n\n```\n$ cd megaquiz\n\
    $ git init\nInitialized empty Git repository in /home/mattz/work/megaquiz/.git/\n\
    ```\n\nNow it’s time to add my files:\n\n```\n$ git add .\n```\n\nGit is now tracking\
    \ all the files and directories under `megaquiz`. Tracked files can be in three\
    \ states: unmodified, modified, or staged. You can check this by running the command,\
    \ `git status`:\n\n```\n$ git status\nOn branch master\nInitial commit\nChanges\
    \ to be committed:\n(use \"git rm --cached ...\" to unstage)\nnew file:   command/Command.php\n\
    new file:   command/CommandContext.php\nnew file:   command/FeedbackCommand.php\n\
    new file:   command/LoginCommand.php\nnew file:   main.php\nnew file:   quizobjects/User.php\n\
    new file:   quiztools/AccessManager.php\nnew file:   quiztools/ReceiverFactory.php\n\
    ```\n\nThanks to my previous `git add` command, all my files are staged for commit.\
    \ I can go ahead now and execute the `commit` command:\n\n```\n$ git commit -m\
    \ 'my first commit'\n[master (root-commit) f147d21] my first commit\n8 files changed,\
    \ 235 insertions(+)\ncreate mode 100755 command/Command.php\ncreate mode 100755\
    \ command/CommandContext.php\ncreate mode 100755 command/FeedbackCommand.php\n\
    create mode 100755 command/LoginCommand.php\ncreate mode 100755 main.php\ncreate\
    \ mode 100755 quizobjects/User.php\ncreate mode 100755 quiztools/AccessManager.php\n\
    create mode 100644 quiztools/ReceiverFactory.php\n```\n\nI add a message via the\
    \ `-m` flag. If I omitted this, then Git would launch an editor that I can use\
    \ to add my check-in message.\n\nIf you are accustomed to version-control systems\
    \ such as CVS and Subversion, you might think that we’re done. And although I\
    \ could happily continue editing, adding, committing, and branching from here,\
    \ there is an additional stage I need to consider if I want to share this code\
    \ using a central repository. As we will see later on in the chapter, Git allows\
    \ us to manage multiple project branches. Thanks to this feature, I can maintain\
    \ a branch for each release, but also keep my bleeding-edge risky development\
    \ safely out of my production code. When we start out, Git sets up a single branch\
    \ named `master`. I can confirm the state of my branches with the command, `git\
    \ branch`:\n\n```\n$ git branch -a\n* master\n```\n\nThe `-a` flag specifies that\
    \ Git should show us all branches (the default is to omit the remote ones). And\
    \ the output shows the `master` branch.\n\nIn fact, I have done nothing yet to\
    \ associate my local repository with the remote server. It’s time to put that\
    \ right:\n\n```\n$ git remote add origin git@poppch17.vagrant.internal:/var/git/megaquiz\n\
    ```\n\nThis command is disappointingly quiet, given the work that it has done.\
    \ In fact, it is the equivalent of telling Git to \"associate the nickname `origin`\
    \ with the given server location. Furthermore, set up a tracking relationship\
    \ between the local branch `master` and a remote equivalent.\"\n\nTo confirm all\
    \ of this, I check with Git that the remote handle `origin` has been set up:\n\
    \n```\n$ git remote -v\norigin git@poppch17.vagrant.internal:/var/git/megaquiz\
    \ (fetch)\norigin git@poppch17.vagrant.internal:/var/git/megaquiz (push)\n```\n\
    \nOf course, if you used a service like GitHub, you would use your equivalent\
    \ of the `git remote add` step shown in Figure [17-2](#A314621_5_En_17_Chapter.html#Fig2).\
    \ In my case, that looks like this:\n\n```\n$ git remote add origin git@github.com:popp5/megaquiz.git\n\
    ```\n\nI still haven’t sent any actual files to my Git server, however, so that’s\
    \ my next step:\n\n```\n$ git push origin master\nCounting objects: 12, done.\n\
    Delta compression using up to 2 threads.\nCompressing objects: 100% (9/9), done.\n\
    Writing objects: 100% (12/12), 2.65 KiB, done.\nTotal 12 (delta 1), reused 0 (delta\
    \ 0)\nTo git@poppch17.vagrant.internal:/var/git/megaquiz\n* [new branch]     \
    \ master -> master\n```\n\nNow I can run the `git branch` command again to confirm\
    \ that the remote version of the `master` branch has appeared:\n\n```\n$ git branch\
    \ -a\n* master\nremotes/origin/master\n```\n\n> **Note**  \n> I have established\
    \ what is called a tracking branch. This is a local branch that is associated\
    \ with a remote twin.\n\n## Cloning the Repository\n\nFor the purposes of this\
    \ chapter, I have invented a team member named Bob. Bob is working with me on\
    \ the MegaQuiz project. Naturally, he wants his own version of the code. I have\
    \ already added his public key to the Git server, so he is good to go. In the\
    \ parallel world of GitHub, I have invited Bob to join my project, and he has\
    \ added his own public key to his account. The effect is the same; Bob can acquire\
    \ the repository using the command, `git clone`:\n\n```\n$ git clone git@github.com:popp5/megaquiz.git\n\
    remote: Counting objects: 14, done.\nremote: Compressing objects: 100% (12/12),\
    \ done.\nremote: Total 14 (delta 1), reused 14 (delta 1), pack-reused 0\nReceiving\
    \ objects: 100% (14/14), done.\nResolving deltas: 100% (1/1), done.\n```\n\nNow\
    \ both of us can develop locally and, when we’re ready, share our code with one\
    \ another.\n\n## Updating and Committing\n\nBob is, of course, a fine and talented\
    \ fellow. Except, that is, for one common and highly annoying trait: he cannot\
    \ leave other people’s code alone.\n\nBob is smart and inquisitive, easily excited\
    \ by shiny new avenues of development, and he’s keen to help optimize new code.\
    \ As a result, everywhere I turn, I seem to see the hand of Bob. Bob has added\
    \ to my documentation, and he has implemented an idea I mentioned over coffee.\
    \ I may have to kill Bob. In the meantime, however, I must handle the fact that\
    \ the code on which I am working needs to be merged with Bob’s input.\n\nHere’s\
    \ a file called `quizobjects/User.php`. At the moment, it contains nothing but\
    \ the barest of bones:\n\n```\nnamespace popp\\ch17\\megaquiz\\quizobjects;\n\
    class User\n{\n}\n```\n\nI have decided to add some documentation. I begin by\
    \ adding a file comment to my version of the file:\n\n```\nnamespace popp\\ch17\\\
    megaquiz\\quizobjects;\n/**\n* @license   http://www.example.com Borsetshire Open\
    \ License\n* @package  quizobjects\n*/\nclass User\n{\n}\n```\n\nRemember that\
    \ a file can have three states: unmodified, modified, and staged. The `User.php`\
    \ file has now moved from unmodified to modified. I can see this with the `git\
    \ status` command:\n\n```\n$ git status\nOn branch master\nYour branch is up-to-date\
    \ with 'origin/master'.\nChanges not staged for commit:\n  (use \"git add <file>...\"\
    \ to update what will be committed)\n  (use \"git checkout -- <file>...\" to discard\
    \ changes in working directory)\nmodified:   quizobjects/User.php\nno changes\
    \ added to commit (use \"git add\" and/or \"git commit -a\")\n```\n\n`User.php`\
    \ has been modified, but not yet staged for commit. I can change this state using\
    \ the command, `git add`:\n\n```\n$ git add quizobjects/User.php\n$ git status\n\
    On branch master\nYour branch is up-to-date with 'origin/master'.\nChanges to\
    \ be committed:\n  (use \"git reset HEAD <file>...\" to unstage)\nmodified:  \
    \ quizobjects/User.php\n```\n\nNow I am ready to commit:\n\n```\n$ git commit\
    \ -m'added documentation' quizobjects/User.php\n[master 97472c4] added documentation\n\
    1 file changed, 5 insertions(+)\n```\n\nA Git commit only affects my local repository.\
    \ If I am sure that the world is ready for my change, I must push my code to the\
    \ remote repository:\n\n```\n$ git push origin master\nCounting objects: 6, done.\n\
    Delta compression using up to 4 threads.\nCompressing objects: 100% (5/5), done.\n\
    Writing objects: 100% (6/6), 670 bytes | 0 bytes/s, done.\nTotal 6 (delta 2),\
    \ reused 0 (delta 0)\nTo git@github.com:popp5/megaquiz.git\n   715fc2f..04d75b4\
    \  master -> master\n```\n\nMeanwhile, working in his own sandbox, Bob is keen\
    \ as ever, and he has created a class comment:\n\n```\nnamespace popp\\ch17\\\
    megaquiz\\quizobjects;\n/**\n* @package  quizobjects\n*/\nclass User\n{\n}\n```\n\
    \nNow it’s Bob’s turn to `add`, `commit`, and `push`. Because the adding and committing\
    \ parts of this are so commonly run together, Git allows you to combine them into\
    \ a single command:\n\n```\n$ git commit -a -m'my great documentation'\n[master\
    \ 161c6c5] my great documentation\n1 files changed, 4 insertions(+), 0 deletions(-)\n\
    ```\n\nSo we now have two distinct versions of `User.php`. There’s the version\
    \ I just pushed to the remote repository, and there is Bob’s version, committed,\
    \ but not yet pushed. Let’s see what happens when Bob tries to push his local\
    \ version to the remote repository:\n\n```\n$ git push origin master\nTo git@github.com:popp5/megaquiz.git\n\
    \ ! [rejected]        master -> master (non-fast-forward)\nerror: failed to push\
    \ some refs to 'git@github.com:popp5/megaquiz.git'\nTo prevent you from losing\
    \ history, non-fast-forward updates were rejected\nMerge the remote changes before\
    \ pushing again.  See the 'Note about\nfast-forwards' section of 'git push --help'\
    \ for details.\n```\n\nAs you can see, Git won’t let you push if there’s an update\
    \ to apply. Bob must first pull down my version of the `User.php` file:\n\n```\n\
    $ git pull origin master\nremote: Counting objects: 6, done.\nremote: Compressing\
    \ objects: 100% (3/3), done.\nremote: Total 6 (delta 2), reused 6 (delta 2), pack-reused\
    \ 0\nUnpacking objects: 100% (6/6), done.\nFrom github.com:popp5/megaquiz\n *\
    \ branch            master     -> FETCH_HEAD\nAuto-merging quizobjects/User.php\n\
    CONFLICT (content): Merge conflict in quizobjects/User.php\nAutomatic merge failed;\
    \ fix conflicts and then commit the result.\n```\n\nGit will happily merge data\
    \ from two sources into the same file, so long as the changes don’t overlap. Git\
    \ has no means of handling changes that affect the same lines. How can it decide\
    \ what is to have priority? Should the repository overwrite Bob’s changes, or\
    \ the other way around? Should both changes coexist? Which should go first? Git\
    \ has no choice but to report a conflict and let Bob sort out the problem.\n\n\
    Here’s what Bob sees when he opens the file:\n\n```\nnamespace popp\\ch17\\megaquiz\\\
    quizobjects;\n/**\n<<<<<<< HEAD\n* @package  quizobjects\n=======\n* @license\
    \   http://www.example.com Borsetshire Open License\n* @package  quizobjects\n\
    >>>>>>> 04d75b41c8d972438bd803042f1117e12d2869eb\n*/\nclass User\n{\n}\n```\n\n\
    Git includes both Bob’s comment and the conflicting changes, together with metadata\
    \ that tells him which part originates where. The conflicting information is separated\
    \ by a line of equals signs. Bob’s input is signaled by a line of less-than symbols\
    \ followed by \"HEAD\". The remote changes are included on the other side of the\
    \ divide.\n\nNow that Bob has identified the conflict, he can edit the file to\
    \ fix the collision:\n\n```\nnamespace popp\\ch17\\megaquiz\\quizobjects;\n/**\n\
    * @license   http://www.example.com Borsetshire Open License\n* @package   quizobjects\n\
    */\nclass User\n{\n}\n```\n\nNext, Bob resolves the conflict by staging the file:\n\
    \n```\n$ git add quizobjects/User.php\n$ git commit -m'documentation merged'\n\
    [master 89e5e46] documentation merged\n```\n\nAnd now, finally, he can push to\
    \ the remote repository:\n\n```\n$ git push origin master\n```\n\n## Adding and\
    \ Removing Files and Directories\n\nProjects change shape as they develop. Version-control\
    \ software must take account of this, allowing users to add new files and remove\
    \ deadwood that would otherwise get in the way.\n\n### Adding a File\n\nYou have\
    \ seen the `add` subcommand many times already. I used it during my project setup\
    \ to add my code to the empty `megaquiz` repository, and subsequently, to stage\
    \ files for commit. By running `git add` on an untracked file or directory, you\
    \ ask Git to track it—and stage it for commit. Here I add a document called `Question.php`\
    \ to the project:\n\n```\n$ touch quizobjects/Question.php\n$ git add quizobjects/Question.php\n\
    ```\n\nIn a real-world situation, I would probably start out by adding some content\
    \ to `Question.php`. Here, I confine myself to creating an empty file using the\
    \ standard `touch` command. Once I have added a document, I must still invoke\
    \ the `commit` subcommand to complete the addition:\n\n```\n$ git commit -m'initial\
    \ checkin'\n[master 02cf67c] initial checkin\n1 file changed, 0 insertions(+),\
    \ 0 deletions(-)\ncreate mode 100644 quizobjects/Question.php\n```\n\n`Question.php`\
    \ is now in the local repository.\n\n### Removing a File\n\nShould I discover\
    \ that I have been too hasty and need to remove the document, it should come as\
    \ no surprise to learn that I can use a subcommand called `rm`:\n\n```\n$ git\
    \ rm quizobjects/Question.php\nrm 'quizobjects/Question.php'\n```\n\nOnce again,\
    \ a `commit` is required to finish the job. As usual, I can confirm this by running\
    \ `git status`:\n\n```\n$ git status\nOn branch master\nYour branch is ahead of\
    \ 'origin/master' by 1 commit.\n  (use \"git push\" to publish your local commits)\n\
    Changes to be committed:\n  (use \"git reset HEAD <file>...\" to unstage)\ndeleted:\
    \    quizobjects/Question.php\n$ git commit -m'removed Question'\n[master fd4d64e]\
    \ removed Question\n1 file changed, 0 insertions(+), 0 deletions(-)\ndelete mode\
    \ 100644 quizobjects/Question.php\n```\n\n### Adding a Directory\n\nYou can also\
    \ add and remove directories with `add` and `rm`. Let’s say Bob wants to make\
    \ a new directory available:\n\n```\n$ mkdir resources\n$ touch resources/blah.gif\n\
    $ git add resources/\n$ git status\nOn branch master\nYour branch is ahead of\
    \ 'origin/master' by 2 commits.\n  (use \"git push\" to publish your local commits)\n\
    Changes to be committed:\n  (use \"git reset HEAD <file>...\" to unstage)\nnew\
    \ file:   resources/blah.gif\n```\n\nNotice how the contents of `resources` are\
    \ added automatically to the repository. Now Bob can commit and then push the\
    \ whole lot to the remote repository in the usual way.\n\n### Removing Directories\n\
    \nAs you might expect, you can remove directories with the `rm` subcommand. In\
    \ this situation, however, I must tell Git that I wish it to remove the directory's\
    \ contents by passing an `-r` flag to the subcommand. Here, I profoundly disagree\
    \ with Bob’s decision to add a `resources` directory:\n\n```\n$ git rm -r resources/\n\
    rm 'resources/blah.gif'\n```\n\n## Tagging a Release\n\nAll being well, a project\
    \ will eventually reach a state of readiness, and you will want to ship it or\
    \ deploy it. Whenever you make a release, you should leave a bookmark in your\
    \ repository, so that you can always revisit the code at that point. As you might\
    \ expect, you can create a tag in your code with the `git tag` command:\n\n```\n\
    $ git tag -a 'version1.0' -m 'release 1.0'\n```\n\nYou can see the tags associated\
    \ with your repository by running `git tag` with no arguments:\n\n```\n$ git tag\n\
    version1.0\n```\n\nWe have been working locally up until this point. In order\
    \ to get the tag onto the remote repository, we must use the `--tags` flag with\
    \ the `git push` subcommand:\n\n```\n$ git push origin --tags\nCounting objects:\
    \ 1, done.\nWriting objects: 100% (1/1), 168 bytes | 0 bytes/s, done.\nTotal 1\
    \ (delta 0), reused 0 (delta 0)\nTo git@github.com:popp5/megaquiz.git\n * [new\
    \ tag]         version1.0 -> version1.0\n```\n\nUsing the `--tags` flag causes\
    \ all local tags to be pushed to the remote repository.\n\nOf course, any action\
    \ you take on a GitHub repo can be tracked on the site. You can see my release\
    \ tag in Figure [17-4](#A314621_5_En_17_Chapter.html#Fig4).\n\n![A314621_5_En_17_Fig4_HTML.jpg](A314621_5_En_17_Fig4_HTML.jpg)\n\
    \n*Figure 17-4. Viewing a tag on GitHub*\n\nOnce you can bookmark your code with\
    \ a tag, it makes sense to wonder how you might go about revisiting old releases.\
    \ For this, however, you should first spend some time looking at branching—something\
    \ at which Git is particularly good.\n\n## Branching a Project\n\nOnce my project\
    \ has been released, I can pack it away and wander off to do something new, right?\
    \ After all, it was so elegantly written that bugs are an impossibility, not to\
    \ mention so thoroughly specified that no user could possibly require any new\
    \ features!\n\nMeanwhile, back in the real world, I must continue to work with\
    \ the codebase on at least two levels. Bug reports should be trickling in right\
    \ about now, and the wish list for version 1.2.0 will be swelling with demands\
    \ for fantastic new features. How do I reconcile these forces? I need to fix the\
    \ bugs as they are reported, and I need to push on with primary development. I\
    \ could fix the bugs as part of development and release everything in one go,\
    \ when the next version is stable. But then users may have a long wait before\
    \ they see any problems addressed. This is plainly unacceptable. On the other\
    \ hand, I could release as I go. In that scenario, I risk shipping broken code.\
    \ Clearly, I need two strands to my development. I will continue to add new and\
    \ risky features to the project’s main branch (often called the trunk), but I\
    \ should now create a branch for my new release on which I can add only bug fixes.\n\
    \n> **Note**  \n> This way of managing branches is by no means the only game in\
    \ town. Developers argue constantly about the best way of organizing branches\
    \ and managing releases and bug fixes. One of the most popular approaches is git-flow\
    \ (neatly described at [`http://danielkummer.github.io/git-flow-cheatsheet/`](http://danielkummer.github.io/git-flow-cheatsheet/)).\
    \ Under this practice, `master` is the release branch. New code goes on a `develop`\
    \ branch, and it’s merged to `master` at release time. Each unit of active development\
    \ has its own feature branch, which gets merged into `develop` when stable.\n\n\
    I can both create and switch to a new branch using the `git checkout` command.\
    \ First, let’s take a quick look at the state of my branches:\n\n```\n$ git branch\
    \ -a\n* master\nremotes/origin/master\n```\n\nAs you can see, I have a single\
    \ branch: `master`, and its remote equivalent. Now, I will create and switch to\
    \ a new branch:\n\n```\n$ git checkout -b megaquiz-branch1.0\nSwitched to a new\
    \ branch 'megaquiz-branch1.0'\n```\n\nTo track my use of branches I will use a\
    \ particular file as an example, `command/FeedbackCommand.php`. It seems that\
    \ I created my bug fix branch just in time. Users have started to report that\
    \ they are unable to use the feedback mechanism in the system. I locate the bug:\n\
    \n```\n//...\n$result = $msgSystem->despatch($email, $msg, $topic);\nif (! $user)\
    \ {\n$this->context->setError($msgSystem->getError());\n//...\n```\n\nI should,\
    \ in fact, be testing `$result` and not `$user`. Here is my edit:\n\n```\n//...\n\
    $result = $msgSystem->dispatch($email, $msg, $topic);\nif (! $result) {\n$this->context->setError($msgSystem->getError());\n\
    //...\n```\n\nBecause I am working on the branch `megaquiz-branch1.0`, I can commit\
    \ this change:\n\n```\n$ git add command/FeedbackCommand.php\n$ git commit -m'bugfix'\n\
    [megaquiz-branch1.0 d69dfc1] bugfix\n1 file changed, 1 insertion(+), 1 deletion(-)\n\
    ```\n\nOf course, this commit is local. I need to use the `git push` command to\
    \ get the branch onto the remote repository:\n\n```\n$ git push origin megaquiz-branch1.0\n\
    Counting objects: 4, done.\nDelta compression using up to 4 threads.\nCompressing\
    \ objects: 100% (4/4), done.\nWriting objects: 100% (4/4), 440 bytes | 0 bytes/s,\
    \ done.\nTotal 4 (delta 2), reused 0 (delta 0)\nTo git@github.com:popp5/megaquiz.git\n\
    \ * [new branch]      megaquiz-branch1.0 -> megaquiz-branch1.0\n```\n\nNow, what\
    \ about Bob? He will inevitably want to pitch in and fix some bugs. First, he\
    \ invokes `git pull`, which helpfully tells him about the new branch (and my recent\
    \ other activities):\n\n```\n$ git pull\nremote: Counting objects: 11, done.\n\
    remote: Compressing objects: 100% (7/7), done.\nremote: Total 11 (delta 4), reused\
    \ 11 (delta 4), pack-reused 0\nUnpacking objects: 100% (11/11), done.\nFrom github.com:popp5/megaquiz\n\
    \   f6ab532..cf120a4  master     -> origin/master\n * [new branch]      megaquiz-branch1.0\
    \ -> origin/megaquiz-branch1.0\n * [new tag]         version1.0 -> version1.0\n\
    Updating f6ab532..cf120a4\nFast-forward\n 0 files changed, 0 insertions(+), 0\
    \ deletions(-)\n delete mode 100644 resources/blah.gif\n```\n\nNow Bob can switch\
    \ to a local branch which will track the remote one:\n\n```\n$ git checkout megaquiz-branch1.0\n\
    Branch megaquiz-branch1.0 set up to track remote branch megaquiz-branch1.0 from\
    \ origin.\nSwitched to a new branch 'megaquiz-branch1.0'\n```\n\nBob is good to\
    \ go now. He can add and commit his own fixes; and when he pushes, they will end\
    \ up on the remote branch.\n\nMeanwhile, I would like to add some bleeding-edge\
    \ enhancements on the trunk—that is, my `master` branch. Let’s look again at the\
    \ state of my branches from the perspective of my local repository:\n\n```\n$\
    \ git branch -a\n* master\n  megaquiz-branch1.0\nremotes/origin/master\nremotes/origin/megaquiz-branch1.0\n\
    ```\n\nI can switch to an existing branch by invoking `git checkout`:\n\n```\n\
    $ git checkout master\nSwitched to branch 'master'\nYour branch is up-to-date\
    \ with 'origin/master'.\n```\n\nWhen I look now at `command/FeedbackCommand.php`,\
    \ I see that my bug fix has magically disappeared. Of course, it’s still stored\
    \ under `megaquiz-branch1.0`. Later, I can merge the fix into the `master` branch,\
    \ so there’s no need to worry. Instead, I can focus on adding new code:\n\n```\n\
    class FeedbackCommand extends Command\n{\n    public function execute(CommandContext\
    \ $context)\n    {\n        // new development\n        // goes here\n       \
    \ $msgSystem = ReceiverFactory::getMessageSystem();\n        $email = $context->get('email');\n\
    \        // ...\n```\n\nAll I have done here is to add a comment to simulate an\
    \ addition to the code. I can now commit and push this:\n\n```\n$ git commit -am'new\
    \ development on master'\n$ git push origin master\n```\n\nSo I now have parallel\
    \ branches. Of course, sooner or later, I will want my master branch to benefit\
    \ from the bug fixes that I have committed on `megaquiz-branch1.0`.\n\nI can do\
    \ this on the command line, but first let’s pause to look at a feature supported\
    \ by GitHub and similar services like BitBucket. The pull request (often abbreviated\
    \ to PR) allows me to request a code review before merging a branch. So before\
    \ `megaquiz-branch1.0` hits `master`, I can ask Bob to check my work. As you can\
    \ see in Figure [17-5](#A314621_5_En_17_Chapter.html#Fig5), GitHub detects the\
    \ branch and gives me the opportunity to issue my pull request.\n\n![A314621_5_En_17_Fig5_HTML.jpg](A314621_5_En_17_Fig5_HTML.jpg)\n\
    \n*Figure 17-5. GitHub makes issuing pull requests easy*\n\nI hit the button and\
    \ add a comment before submitting the pull request. You can see the result of\
    \ that in Figure [17-6](#A314621_5_En_17_Chapter.html#Fig6).\n\n![A314621_5_En_17_Fig6_HTML.jpg](A314621_5_En_17_Fig6_HTML.jpg)\n\
    \n*Figure 17-6. Issuing the pull request*\n\nNow Bob can examine my changes and\
    \ add any comments he may have. GitHub shows him exactly what has changed. You\
    \ can see Bob’s comment in Figure [17-7](#A314621_5_En_17_Chapter.html#Fig7).\n\
    \n![A314621_5_En_17_Fig7_HTML.jpg](A314621_5_En_17_Fig7_HTML.jpg)\n\n*Figure 17-7.\
    \ The changes covered by a pull request*\n\nOnce Bob approves my pull request,\
    \ I can merge directly from the browser, or I can return to the command line.\
    \ This is pretty easy. Git provides a subcommand named `merge`:\n\n```\n$ git\
    \ checkout master\nAlready on 'master'\nYour branch is up-to-date with 'origin/master'.\n\
    ```\n\nIn fact, I’m already on the master branch—but it can’t hurt to be sure.\
    \ Now I perform the actual merge:\n\n```\n$ git merge megaquiz-branch1.0\nAuto-merging\
    \ command/FeedbackCommand.php\nMerge made by the 'recursive' strategy.\n command/FeedbackCommand.php\
    \ | 2 +-\n 1 file changed, 1 insertion(+), 1 deletion(-)\n```\n\n> **Note**  \n\
    > To merge or not to merge? The choice is not always as straightforward as it\
    \ might seem. In some cases, for example, your bug fix may be the kind of temporary\
    \ work that is supplanted by a more thorough refactoring on the trunk, or it may\
    \ no longer apply due to a change in specification. This is necessarily a judgment\
    \ call. Most teams I have worked in, however, tend to merge to the trunk where\
    \ possible, while keeping work on the branch to the bare minimum. New features\
    \ for us generally appear on the trunk and find their way quickly to users through\
    \ a \"release early and often\" policy.\n\nNow, when I look at the version of\
    \ `FeedbackCommand` in the trunk, I confirm that all changes have been merged:\n\
    \n```\npublic function execute(CommandContext $context)\n{\n    // new development\n\
    \    // goes here\n    $msgSystem = ReceiverFactory::getMessageSystem();\n   \
    \ $email = $context->get('email');\n    $msg = $context->get('pass');\n    $topic\
    \ = $context->get('topic');\n    $result = $msgSystem->despatch($email, $msg,\
    \ $topic);\n    if (! $result) {\n        $this->context->setError($msgSystem->getError());\n\
    \        return false;\n    }\n```\n\nThe `execute()` method now includes both\
    \ my simulated trunk development and the bug fix.\n\nI created a branch when I\
    \ first \"released\" MegaQuiz version 1.0 and that’s what we have been working\
    \ with. Remember, however, that I also created a tag at that stage. I promised\
    \ at the time that I would show you how to access the tag. In fact, you’ve already\
    \ seen how. You can create a local branch based on the tag in just the same way\
    \ that Bob set up his local version of our bug fix branch. The difference is that\
    \ this new branch is entirely fresh. It does not track an existing remote branch:\n\
    \n```\n$ git checkout -b new-version1.0-branch version1.0\nSwitched to a new branch\
    \ 'new-version1.0-branch'\n```\n\nHowever, now that I have this new branch, I\
    \ can push it and share it just as you have seen.\n\n## Summary\n\nGit comprises\
    \ an enormous number of tools, each with a daunting range of options and capabilities.\
    \ I can only hope to provide a brief introduction in the space available. Nonetheless,\
    \ if you only use the features that I have covered in this chapter, you should\
    \ see the benefit in your own work, whether through protection against data loss\
    \ or improvements in collaborative working.\n\nIn this chapter, we took a tour\
    \ through the basics of Git. I looked briefly at configuration before importing\
    \ a project. I checked out, committed, and updated code, and then showed you how\
    \ to tag and export a release. I ended the chapter with a brief look at branches,\
    \ demonstrating their usefulness in maintaining concurrent development and bug-fix\
    \ strands in a project.\n\nThere is one issue that I have glossed over here, to\
    \ some extent. We established the principle that developers should check out their\
    \ own versions of a project. On the whole, however, projects will not run in place.\
    \ In order to test their changes, developers need to deploy code locally. Sometimes,\
    \ this is as simple as copying over a few directories. More often, however, deployment\
    \ must address a whole range of configuration issues. In the next chapter, we\
    \ will look at some techniques for automating this process.\n\n# 18. Testing with\
    \ PHPUnit\n\nEvery component in a system depends for its continued smooth running\
    \ on the consistency of operation and interface of its peers. By definition, then,\
    \ development breaks systems. As you improve your classes and packages, you must\
    \ remember to amend any code that works with them. For some changes, this can\
    \ create a ripple effect, affecting components far away from the code you originally\
    \ changed. Eagle-eyed vigilance and an encyclopedic knowledge of a system’s dependencies\
    \ can help to address this problem. Of course, while these are excellent virtues,\
    \ systems soon grow too complex for every unwanted effect to be easily predicted,\
    \ not least because systems often combine the work of many developers. To address\
    \ this problem, it is a good idea to test every component regularly. This, of\
    \ course, is a repetitive and complex task; and as such, it lends itself well\
    \ to automation.\n\nAmong the test solutions available to PHP programmers, PHPUnit\
    \ is perhaps the most ubiquitous and certainly the most fully featured tool. In\
    \ this chapter, you will learn the following about PHPUnit:\n\n* **Installation:**\
    \ Using PEAR to install PHPUnit\n* **Writing Tests:** Creating test cases and\
    \ using assertion methods\n* **Handling Exceptions:** Strategies for confirming\
    \ failure\n* **Running multiple tests:** Collecting tests into suites\n* **Constructing\
    \ assertion logic:** Using constraints\n* **Faking components:** Mocks and stubs\n\
    * **Testing web applications:** Testing with and without additional tools\n\n\
    ## Functional Tests and Unit Tests\n\nTesting is essential in any project. Even\
    \ if you don’t formalize the process, you must have found yourself developing\
    \ informal lists of actions that put your system through its paces. This process\
    \ soon becomes wearisome, and that can lead to a fingers-crossed attitude to your\
    \ projects.\n\nOne approach to testing starts at the interface of a project, modeling\
    \ the various ways in which a user might negotiate the system. This is probably\
    \ the way you would go when testing by hand, although there are various frameworks\
    \ for automating the process. These functional tests are sometimes called acceptance\
    \ tests because a list of actions performed successfully can be used as criteria\
    \ for signing off a project phase. Using this approach, you typically treat the\
    \ system as a black box—your tests remain willfully ignorant of the hidden components\
    \ that collaborate to form the system under test.\n\nWhereas functional tests\
    \ operate from without, unit tests work from the inside out. Unit testing tends\
    \ to focus on classes, with test methods grouped together in test cases. Each\
    \ test case puts one class through a rigorous workout, checking that each method\
    \ performs as advertised and fails as it should. The objective, as far as possible,\
    \ is to test each component in isolation from its wider context. This often supplies\
    \ you with a sobering verdict on the success of your mission to decouple the parts\
    \ of your system.\n\nTests can be run as part of the build process, directly from\
    \ the command line, or even via a web page. In this chapter, I’ll concentrate\
    \ on the command line.\n\nUnit testing is a good way of ensuring the quality of\
    \ design in a system. Tests reveal the responsibilities of classes and functions.\
    \ Some programmers even advocate a test-first approach. You should, they say,\
    \ write the tests before you even begin work on a class. This lays down a class’s\
    \ purpose, ensuring a clean interface and short, focused methods. Personally,\
    \ I have never aspired to this level of purity—it just doesn’t suit my style of\
    \ coding. Nevertheless, I attempt to write tests as I go. Maintaining a test harness\
    \ provides me with the security I need to refactor my code. I can pull down and\
    \ replace entire packages with the knowledge that I have a good chance of catching\
    \ unexpected errors elsewhere in the system.\n\n## Testing by Hand\n\nIn the last\
    \ section, I said that testing was essential in every project. I could have said\
    \ instead that testing is inevitable in every project. We all test. The tragedy\
    \ is that we often throw away this good work.\n\nSo, let’s create some classes\
    \ to test. Here is a class that stores and retrieves user information. For the\
    \ sake of demonstration, it generates arrays, rather than the `User` objects you’d\
    \ normally expect to use:\n\n```php\n//"
  raw: "# create authorized_keys file and paste in the user's key:\n$ vi .ssh/authorized_keys\n\
    $ chmod 0700 .ssh/authorized_keys\n```\n\nNote\n\nA common cause of SSH access\
    \ failure is the creation of configuration\nfiles with overly liberal permissions.\
    \ The SSH configuration environment\nshould be readable and writable to the account’s\
    \ owner, only. Pro OpenSSH by Michael Stahnke\n(Apress, 2005) covers SSH comprehensively.\n\
    \nClosing Down Shell Access for the git User\n\nNo server should be any more open\
    \ than it needs to be. You may want to\nenable your user to access Git commands,\
    \ but probably not much more.\n\nYou can see the shell associated with a user\
    \ on a Linux server by\nlooking at the file, `/etc/passwd`. Here is\nthe relevant\
    \ line for the `git` account on my\nremote server:\n\n```\ngit:x:1001:1001::/home/git:/bin/bash\n\
    ```\n\nGit provides a special shell, named `git-shell,` that\nrestricts the user\
    \ to selected commands only. I can enable this program\nfor logins by editing\
    \ `/etc/passwd`:\n\n```\ngit:x:1001:1001::/home/git:/usr/bin/git-shell\n```\n\n\
    Now, if I attempt to log in via SSH, I’m told the score and logged out:\n\n```\n\
    $ ssh git@poppch17.vagrant.internal\nLast login: Sat Jul 30 11:58:27 2016 from\
    \ 192.168.33.1\nfatal: What do you think I am? A shell?\nConnection to poppch17.vagrant.internal\
    \ closed.\n```\n\nBeginning a Project\n\nNow that I have a remote Git server and\
    \ access to it from my local\naccount, it’s time to add my work in progress to\
    \ the repository at `/var/git/` `megaquiz` .\n\nBefore I start, I take a good\
    \ look at my files and directories, and\nremove any temporary items I might find.\
    \ Failure to do this is a common\nannoyance. Temporary items to watch for include\
    \ automatically generated\nfiles such as composer packages, build directories,\
    \ installer logs, and\nso on.\n\nNote\n\nYou can specify files and patterns to\
    \ ignore by placing a file named\n`.gitignore` in\nyour repository. On a Linux\
    \ system, the `man gitignore` command\nshould provide examples of filename wildcarding\
    \ that you can amend to\nexclude the various lock files and temporary directories\
    \ created by your\nbuild processes, editors, and IDEs. This text is also available\
    \ online\nat [`http://git-scm.com/docs/gitignore`](http://git-scm.com/docs/gitignore)\
    \ .\n\nBefore I go any further, I should register my identity with Git—this\n\
    makes it easier to track who did what in the repository:\n\n```\n$ git config\
    \ --global user.name \"matt z\"\n$ git config --global user.email \"matt@getinstance.com\"\
    \n```\n\nNow that I have established my personal details and ensured that my\n\
    project is clean, I can set it up and push its code to the server:\n\n```\n$ cd\
    \ megaquiz\n$ git init\nInitialized empty Git repository in /home/mattz/work/megaquiz/.git/\n\
    ```\n\nNow it’s time to add my files:\n\n```\n$ git add .\n```\n\nGit is now tracking\
    \ all the files and directories under `megaquiz`. Tracked\nfiles can be in three\
    \ states: unmodified, modified, or staged. You can check this by running\nthe\
    \ command, `git status`:\n\n```\n$ git status\nOn branch master\nInitial commit\n\
    Changes to be committed:\n(use \"git rm --cached ...\" to unstage)\nOn branch\
    \ master\nInitial commit\nChanges to be committed:\n(use \"git rm --cached ...\"\
    \ to unstage)\nnew file:   command/Command.php\nnew file:   command/CommandContext.php\n\
    new file:   command/FeedbackCommand.php\nnew file:   command/LoginCommand.php\n\
    new file:   main.php\nnew file:   quizobjects/User.php\nnew file:   quiztools/AccessManager.php\n\
    new file:   quiztools/ReceiverFactory.php\n```\n\nThanks to my previous `git add`\
    \ command, all\nmy files are staged for commit. I can go ahead now and execute\
    \ the `commit` command:\n\n```\n$ git commit -m 'my first commit'\n[master (root-commit)\
    \ f147d21] my first commit\n8 files changed, 235 insertions(+)\ncreate mode 100755\
    \ command/Command.php\ncreate mode 100755 command/CommandContext.php\ncreate mode\
    \ 100755 command/FeedbackCommand.php\ncreate mode 100755 command/LoginCommand.php\n\
    create mode 100755 main.php\ncreate mode 100755 quizobjects/User.php\ncreate mode\
    \ 100755 quiztools/AccessManager.php\ncreate mode 100644 quiztools/ReceiverFactory.php\n\
    ```\n\nI add a message via the `-m` flag. If I omitted\nthis, then Git would launch\
    \ an editor that I can use to add my check-in\nmessage.\n\nIf you are accustomed\
    \ to version-control systems such as CVS and\nSubversion, you might think that\
    \ we’re done. And although I could\nhappily continue editing, adding, committing,\
    \ and branching from here,\nthere is an additional stage I need to consider if\
    \ I want to share this\ncode using a central repository. As we will see later\
    \ on in the chapter,\nGit allows us to manage multiple project branches. Thanks\
    \ to this\nfeature, I can maintain a branch for each release, but also keep my\n\
    bleeding-edge risky development safely out of my production code. When\nwe start\
    \ out, Git sets up a single branch named `master`. I can confirm\nthe state of\
    \ my branches with the command, `git branch`:\n\n```\n$ git branch -a\n* master\n\
    ```\n\nThe `-a` flag\nspecifies that Git should show us all branches (the default\
    \ is to omit\nthe remote ones). And the output shows the `master` branch.\n\n\
    In fact, I have done nothing yet to associate my local repository with\nthe remote\
    \ server. It’s time to put that right:\n\n```\n$ git remote add origin git@poppch17.vagrant.internal:/var/git/megaquiz\n\
    ```\n\nThis command is disappointingly quiet, given the work that it has done.\n\
    In fact, it is the equivalent of telling Git to “associate the nickname\n`origin`\
    \ with the\ngiven server location. Furthermore, set up a tracking relationship\n\
    between the local branch `master` and a remote\nequivalent.”\n\nTo confirm all\
    \ of this, I check with Git that the remote handle `origin` has been set\nup:\n\
    \n```\n$ git remote -v\norigin git@poppch17.vagrant.internal:/var/git/megaquiz\
    \ (fetch)\norigin git@poppch17.vagrant.internal:/var/git/megaquiz (push)\n```\n\
    \nOf course, if you used a service like GitHub, you would use your\nequivalent\
    \ of the git remote add step shown in Figure [17-2](#A314621_5_En_17_Chapter.html#Fig2).\
    \ In my case,\nthat looks like this:\n\n```\n$ git remote add origin git@github.com:popp5/megaquiz.git\n\
    ```\n\nI still haven’t sent any actual files to my Git server, however, so\nthat’s\
    \ my next step:\n\n```\n$ git push origin master\nCounting objects: 12, done.\n\
    Delta compression using up to 2 threads.\nCompressing objects: 100% (9/9), done.\n\
    Writing objects: 100% (12/12), 2.65 KiB, done.\nTotal 12 (delta 1), reused 0 (delta\
    \ 0)\nTo git@poppch17.vagrant.internal:/var/git/megaquiz\n* [new branch]     \
    \ master -> master\n```\n\nNow I can run the `git branch` command again to confirm\
    \ that the remote version of the\n`master` branch\nhas appeared:\n\n```\n$ git\
    \ branch -a\n* master\nremotes/origin/master\n```\n\nNote\n\n`I` have\nestablished\
    \ what is called a tracking\nbranch. This is a local branch that is associated\
    \ with a remote\ntwin.\n\nCloning the Repository\n\nFor the purposes of this chapter,\
    \ I have invented a team member named\nBob. Bob is working with me on the MegaQuiz\
    \ project. Naturally, he wants\nhis own version of the code. I have already added\
    \ his public key to the\nGit server, so he is good to go. In the parallel world\
    \ of GitHub, I have\ninvited Bob to join my project, and he has added his own\
    \ public key to\nhis account. The effect is the same; Bob can acquire the repository\n\
    using the command, `git clone`:\n\n```\n$ git clone git@github.com:popp5/megaquiz.git\n\
    remote: Counting objects: 14, done.\nremote: Compressing objects: 100% (12/12),\
    \ done.\nremote: Total 14 (delta 1), reused 14 (delta 1), pack-reused 0\nReceiving\
    \ objects: 100% (14/14), done.\nResolving deltas: 100% (1/1), done.\n```\n\nNow\
    \ both of us can develop locally and, when we’re ready, share our code\nwith one\
    \ another.\n\nUpdating and Committing\n\nBob is, of course, a fine and talented\
    \ fellow. Except, that is, for one\ncommon and highly annoying trait: he cannot\
    \ leave other people’s code\nalone.\n\nBob is smart and inquisitive, easily excited\
    \ by shiny new avenues of\ndevelopment, and he’s keen to help optimize new code.\
    \ As a result,\neverywhere I turn, I seem to see the hand of Bob. Bob has added\
    \ to my\ndocumentation , and he has implemented an idea I mentioned over coffee.\n\
    I may have to kill Bob. In the meantime, however, I must handle the fact\nthat\
    \ the code on which I am working needs to be merged with Bob’s input.\n\nHere’s\
    \ a file called `quizobjects/User.php`.\nAt the moment, it contains nothing but\
    \ the barest of bones:\n\n```\nnamespace popp\\ch17\\megaquiz\\quizobjects;\n\
    class User\n{\n}\n```\n\nI have decided to add some documentation. I begin by\
    \ adding a file\ncomment to my version of the file:\n\n```\nnamespace popp\\ch17\\\
    megaquiz\\quizobjects;\n/**\n* @license   http://www.example.com Borsetshire Open\
    \ License\n* @package  quizobjects\n*/\nclass User\n{\n}\n```\n\nRemember that\
    \ a file can have three states: unmodified, modified, and staged. The `User.php`\
    \ file has now\nmoved from unmodified to modified. I can see this with the\n`git\
    \ status`\ncommand:\n\n```\n$ git status\nOn branch master\nYour branch is up-to-date\
    \ with 'origin/master'.\nChanges not staged for commit:\n(use \"git add ...\"\
    \ to update what will be committed)\n(use \"git checkout -- ...\" to discard changes\
    \ in working directory)\nmodified:   quizobjects/User.php\nno changes added to\
    \ commit (use \"git add\" and/or \"git commit -a\")\n```\n\n`User.php` has\nbeen\
    \ modified, but not yet staged for commit. I can change this state\nusing the\
    \ command, `git add`:\n\n```\n$ git add quizobjects/User.php\n$ git status\nOn\
    \ branch master\nYour branch is up-to-date with 'origin/master'.\nChanges to be\
    \ committed:\n(use \"git reset HEAD ...\" to unstage)\nmodified:   quizobjects/User.php\n\
    ```\n\nNow I am ready to commit:\n\n```\n$ git commit -m'added documentation'\
    \ quizobjects/User.php\n[master 97472c4] added documentation\n1 file changed,\
    \ 5 insertions(+)\n```\n\nA Git commit only affects my local repository. If I\
    \ am sure that the\nworld is ready for my change, I must push my code to the remote\n\
    repository:\n\n```\n$ git push origin master\nCounting objects: 6, done.\nDelta\
    \ compression using up to 4 threads.\nCompressing objects: 100% (5/5), done.\n\
    Writing objects: 100% (6/6), 670 bytes | 0 bytes/s, done.\nTotal 6 (delta 2),\
    \ reused 0 (delta 0)\nTo git@github.com:popp5/megaquiz.git\n715fc2f..04d75b4 \
    \ master -> master\n```\n\nMeanwhile, working in his own sandbox, Bob is keen\
    \ as ever, and he has\ncreated a class comment:\n\n```\nnamespace popp\\ch17\\\
    megaquiz\\quizobjects;\n/**\n* @package  quizobjects\n*/\nclass User\n{\n}\n```\n\
    \nNow it’s Bob’s turn to `add`, `commit,` and `push`. Because the\nadding and\
    \ committing parts of this are so commonly run together, Git\nallows you to combine\
    \ them into a single command:\n\n```\n$ git commit -a -m'my great documentation'\n\
    [master 161c6c5] my great documentation\n1 files changed, 4 insertions(+), 0 deletions(-)\n\
    ```\n\nSo we now have two distinct versions of `User.php`. There’s the\nversion\
    \ I just pushed to the remote repository, and there is Bob’s\nversion, committed,\
    \ but not yet pushed. Let’s see what happens when Bob\ntries to push his local\
    \ version to the remote repository:\n\n```\n$ git push origin master\nTo git@github.com:popp5/megaquiz.git\n\
    ! [rejected]        master -> master (non-fast-forward)\nerror: failed to push\
    \ some refs to 'git@github.com:popp5/megaquiz.git'\nTo prevent you from losing\
    \ history, non-fast-forward updates were rejected\nMerge the remote changes before\
    \ pushing again.  See the 'Note about\nfast-forwards' section of 'git push --help'\
    \ for details.\n```\n\nAs you can see, Git won’t let you push if there’s an update\
    \ to apply.\nBob must first pull down my version of the `User.php` file:\n\n```\n\
    $ git pull origin master\nremote: Counting objects: 6, done.\nremote: Compressing\
    \ objects: 100% (3/3), done.\nremote: Total 6 (delta 2), reused 6 (delta 2), pack-reused\
    \ 0\nUnpacking objects: 100% (6/6), done.\nFrom github.com:popp5/megaquiz\n* branch\
    \            master     -> FETCH_HEAD\nAuto-merging quizobjects/User.php\nCONFLICT\
    \ (content): Merge conflict in quizobjects/User.php\nAutomatic merge failed; fix\
    \ conflicts and then commit the result.\n```\n\nGit will happily merge data from\
    \ two sources into to the same file, so\nlong as the changes don’t overlap. Git\
    \ has no means of handling changes\nthat affect the same lines. How can it decide\
    \ what is to have priority?\nShould the repository overwrite Bob’s changes, or\
    \ the other way around?\nShould both changes coexist? Which should go first? Git\
    \ has no choice\nbut to report a conflict and let Bob sort out the problem.\n\n\
    Here’s what Bob sees when he opens the file:\n\n```\nnamespace popp\\ch17\\megaquiz\\\
    quizobjects;\n/**\n>>>>>> 04d75b41c8d972438bd803042f1117e12d2869eb\n* @package\
    \  quizobjects\n*/\nclass User\n{\n}\n```\n\nGit includes both Bob’s comment and\
    \ the conflicting changes, together\nwith metadata that tells him which part originates\
    \ where. The\nconflicting information is separated by a line of equals signs.\
    \ Bob’s\ninput is signaled by a line of less-than symbols followed by \"HEAD\"\
    . The\nremote changes are included on the other side of the divide.\n\nNow that\
    \ Bob has identified the conflict, he can edit the file to fix\nthe collision:\n\
    \n```\nnamespace popp\\ch17\\megaquiz\\quizobjects;\n/**\n* @license   http://www.example.com\
    \ Borsetshire Open License\n* @package   quizobjects\n*/\nclass User\n{\n}\n```\n\
    \nNext, Bob resolves the conflict by staging the file:\n\n```\n$ git add quizobjects/User.php\n\
    $ git commit -m'documentation merged'\n[master 89e5e46] documentation merged\n\
    ```\n\nAnd now, finally, he can push to the remote repository:\n\n```\n$ git push\
    \ origin master\n```\n\nAdding and Removing Files and Directories\n\nProjects\
    \ change shape as they develop. Version-control software must\ntake account of\
    \ this, allowing users to add new files and remove\ndeadwood that would otherwise\
    \ get in the way.\n\nAdding a File\n\nYou have seen the `add` subcommand many\n\
    times already. I used it during my project setup to add my code to the\nempty\
    \ `megaquiz`\nrepository, and subsequently, to stage files for commit. By running\n\
    `git add` on an\nuntracked file or directory, you ask Git to track it—and stage\
    \ it for\ncommit. Here I add a document called `Question.php` to the\nproject:\n\
    \n```\n$ touch quizobjects/Question.php\n$ git add quizobjects/Question.php\n\
    ```\n\nIn a real-world situation, I would probably start out by adding some\n\
    content to `Question.php`. Here, I\nconfine myself to creating an empty file using\
    \ the standard `touch` command. Once I\nhave added a document, I must still invoke\
    \ the `commit` subcommand to\ncomplete the addition:\n\n```\n$ git commit -m'initial\
    \ checkin'\n[master 02cf67c] initial checkin\n1 file changed, 0 insertions(+),\
    \ 0 deletions(-)\ncreate mode 100644 quizobjects/Question.php\n```\n\n`Question.php`\
    \ is\nnow in the local repository.\n\nRemoving a File\n\nShould I discover that\
    \ I have been too hasty and need to remove the\ndocument, it should come as no\
    \ surprise to learn that I can use a\nsubcommand called `rm`:\n\n```\n$ git rm\
    \ quizobjects/Question.php\nrm 'quizobjects/Question.php'\n```\n\nOnce again,\
    \ a `commit` is required to\nfinish the job. As usual, I can confirm this by running\
    \ `git status`:\n\n```\n$ git status\nOn branch master\nYour branch is ahead of\
    \ 'origin/master' by 1 commit.\n(use \"git push\" to publish your local commits)\n\
    Changes to be committed:\n(use \"git reset HEAD ...\" to unstage)\ndeleted:  \
    \  quizobjects/Question.php\n$ git commit -m'removed Question'\n[master fd4d64e]\
    \ removed Question\n1 file changed, 0 insertions(+), 0 deletions(-)\ndelete mode\
    \ 100644 quizobjects/Question.php\n```\n\nAdding a Directory\n\nYou can also add\
    \ and remove directories with `add` and `rm`. Let’s say Bob\nwants to make a new\
    \ directory available:\n\n```\n$ mkdir resources\n$ touch resources/blah.gif\n\
    $ git add resources/\n$ git status\nOn branch master\nYour branch is ahead of\
    \ 'origin/master' by 2 commits.\n(use \"git push\" to publish your local commits)\n\
    Changes to be committed:\n(use \"git reset HEAD ...\" to unstage)\nnew file: \
    \  resources/blah.gif\n```\n\nNotice how the contents of `resources` are added\n\
    automatically to the repository. Now Bob can commit and then push the\nwhole lot\
    \ to the remote repository in the usual way.\n\nRemoving Directories\n\nAs you\
    \ might expect, you can remove directories with the `rm` subcommand. In\nthis\
    \ situation, however, I must tell Git that I wish it to remove the\ndirectory's\
    \ contents by passing an `-r` flag to the\nsubcommand. Here, I profoundly disagree\
    \ with Bob’s decision to add a\n`resources`\ndirectory:\n\n```\n$ git rm -r resources/\n\
    rm 'resources/blah.gif'\n```\n\nTagging a Release\n\nAll being well, a project\
    \ will eventually reach a state of readiness,\nand you will want to ship it or\
    \ deploy it. Whenever you make a release,\nyou should leave a bookmark in your\
    \ repository, so that you can always\nrevisit the code at that point. As you might\
    \ expect, you can create a\ntag in your code with the `git tag` command:\n\n```\n\
    $ git tag -a 'version1.0' -m 'release 1.0'\n```\n\nYou can see the tags associated\
    \ with your repository by running `git tag` with no\narguments:\n\n```\n$ git\
    \ tag\nversion1.0\n```\n\nWe have been working locally up until this point. In\
    \ order to get the\ntag onto the remote repository, we must use the `--tags` flag\
    \ with the\n`git push`\nsubcommand:\n\n```\n$ git push origin --tags\nCounting\
    \ objects: 1, done.\nWriting objects: 100% (1/1), 168 bytes | 0 bytes/s, done.\n\
    Total 1 (delta 0), reused 0 (delta 0)\nTo git@github.com:popp5/megaquiz.git\n\
    * [new tag]         version1.0 -> version1.0\n```\n\nUsing the `--tags` flag causes\n\
    all local tags to be pushed to the remote repository.\n\nOf course, any action\
    \ you take on a GitHub repo can be tracked on the\nsite. You can see my release\
    \ tag in Figure [17-4](#A314621_5_En_17_Chapter.html#Fig4).\n\n![A314621_5_En_17_Fig4_HTML.jpg](A314621_5_En_17_Fig4_HTML.jpg)\n\
    \nFigure 17-4.\n\nViewing a tag on GitHub\n\nOnce you can bookmark your code with\
    \ a tag, it makes sense to wonder how\nyou might go about revisiting old releases.\
    \ For this, however, you\nshould first spend some time looking at branching—something\
    \ at which Git\nis particularly good.\n\nBranching a Project\n\nOnce my project\
    \ has been released, I can pack it away and wander off to\ndo something new, right?\
    \ After all, it was so elegantly written that\nbugs are an impossibility, not\
    \ to mention so thoroughly specified that\nno user could possibly require any\
    \ new features!\n\nMeanwhile, back in the real world, I must continue to work\
    \ with the\ncodebase on at least two levels. Bug reports should be trickling in\n\
    right about now, and the wish list for version 1.2.0 will be swelling\nwith demands\
    \ for fantastic new features. How do I reconcile these\nforces? I need to fix\
    \ the bugs as they are reported, and I need to push\non with primary development.\
    \ I could fix the bugs as part of development\nand release everything in one go,\
    \ when the next version is stable. But\nthen users may have a long wait before\
    \ they see any problems addressed.\nThis is plainly unacceptable. On the other\
    \ hand, I could release as I\ngo. In that scenario, I risk shipping broken code.\
    \ Clearly, I need two\nstrands to my development. I will continue to add new and\
    \ risky features\nto the project’s main branch (often called the trunk), but I\
    \ should now\ncreate a branch for my new release on which I can add only bug fixes.\n\
    \nNote\n\nThis way of managing branches is by no means the only game in town.\n\
    Developers argue constantly about the best way of organizing branches\nand managing\
    \ releases and bug fixes. One of the most popular approaches\nis git-flow (neatly\
    \ described at [`http://danielkummer.github.io/git-flow-cheatsheet/`](http://danielkummer.github.io/git-flow-cheatsheet/)\
    \ ). Under this practice, `master` is the release\nbranch. New code goes on a\
    \ `develop` branch, and\nit’s merged to `master` at release\ntime. Each unit of\
    \ active development has its own feature branch, which\ngets merged into `develop`\
    \ when stable.\n\nI can both create and switch to a new branch using the `git\
    \ checkout` command.\nFirst, let’s take a quick look at the state of my branches\
    \ :\n\n```\n$ git branch -a\n* master\nremotes/origin/master\n```\n\nAs you can\
    \ see, I have a single branch: `master,` and its\nremote equivalent. Now, I will\
    \ create and switch to a new branch:\n\n```\n$ git checkout -b megaquiz-branch1.0\n\
    Switched to a new branch 'megaquiz-branch1.0'\n```\n\nTo track my use of branches\
    \ I will use a particular file as an example,\n`command/FeedbackCommand.`\n`php`\
    \ . It seems\nthat I created my bug fix branch just in time. Users have started\
    \ to\nreport that they are unable to use the feedback mechanism in the system.\n\
    I locate the bug:\n\n```\n//...\n$result = $msgSystem->despatch($email, $msg,\
    \ $topic);\nif (! $user) {\n$this->context->setError($msgSystem->getError());\n\
    //...\n```\n\nI should, in fact, be testing `$result` and not `$user`. Here is\
    \ my\nedit:\n\n```\n//...\n$result = $msgSystem->dispatch($email, $msg, $topic);\n\
    if (! $result) {\n$this->context->setError($msgSystem->getError());\n//...\n```\n\
    \nBecause I am working on the branch `megaquiz-branch1.0,` I\ncan commit this\
    \ change:\n\n```\n$ git add command/FeedbackCommand.php\n$ git commit -m'bugfix'\n\
    [megaquiz-branch1.0 d69dfc1] bugfix\n1 file changed, 1 insertion(+), 1 deletion(-)\n\
    ```\n\nOf course, this commit is local. I need to use the `git` push command to\n\
    get the branch onto the remote repository:\n\n```\n$ git push origin megaquiz-branch1.0\n\
    Counting objects: 4, done.\nDelta compression using up to 4 threads.\nCompressing\
    \ objects: 100% (4/4), done.\nWriting objects: 100% (4/4), 440 bytes | 0 bytes/s,\
    \ done.\nTotal 4 (delta 2), reused 0 (delta 0)\nTo git@github.com:popp5/megaquiz.git\n\
    * [new branch]      megaquiz-branch1.0 -> megaquiz-branch1.0\n```\n\nNow, what\
    \ about Bob? He will inevitably want to pitch in and fix some\nbugs. First, he\
    \ invokes `git pull,` which\nhelpfully tells him about the new branch (and my\
    \ recent other\nactivities):\n\n```\n$ git pull\nremote: Counting objects: 11,\
    \ done.\nremote: Compressing objects: 100% (7/7), done.\nremote: Total 11 (delta\
    \ 4), reused 11 (delta 4), pack-reused 0\nUnpacking objects: 100% (11/11), done.\n\
    From github.com:popp5/megaquiz\nf6ab532..cf120a4  master     -> origin/master\n\
    * [new branch]      megaquiz-branch1.0 -> origin/megaquiz-branch1.0\n* [new tag]\
    \         version1.0 -> version1.0\nUpdating f6ab532..cf120a4\nFast-forward\n\
    0 files changed, 0 insertions(+), 0 deletions(-)\ndelete mode 100644 resources/blah.gif\n\
    ```\n\nNow Bob can switch to a local branch which will track the remote one:\n\
    \n```\n$ git checkout megaquiz-branch1.0\nBranch megaquiz-branch1.0 set up to\
    \ track remote branch megaquiz-branch1.0 from origin.\nSwitched to a new branch\
    \ 'megaquiz-branch1.0'\n```\n\nBob is good to go now. He can add and commit his\
    \ own fixes; and when he\npushes, they will end up on the remote branch.\n\nMeanwhile,\
    \ I would like to add some bleeding-edge enhancements on the\ntrunk—that is, my\
    \ `master` branch. Let’s\nlook again at the state of my branches from the perspective\
    \ of my local\nrepository:\n\n```\n$ git branch -a\nmaster\n* megaquiz-branch1.0\n\
    remotes/origin/master\nremotes/origin/megaquiz-branch1.0\n```\n\nI can switch\
    \ to an existing branch by invoking `git checkout`:\n\n```\n$ git checkout master\n\
    Switched to branch 'master'\nYour branch is up-to-date with 'origin/master'.\n\
    ```\n\nWhen I look now at `command/FeedbackCommand.php,`\nI see that my bug fix\
    \ has magically disappeared. Of course, it’s still\nstored under `megaquiz-branch1.0.`\n\
    Later, I can merge the fix into the `master` branch, so\nthere’s no need to worry.\
    \ Instead, I can focus on adding new code:\n\n```\nclass FeedbackCommand extends\
    \ Command\n{\npublic function execute(CommandContext $context)\n{\n// new development\n\
    // goes here\n$msgSystem = ReceiverFactory::getMessageSystem();\n$email = $context->get('email');\n\
    // ...\n```\n\nAll I have done here is to add a comment to simulate an addition\
    \ to the\ncode. I can now commit and push this:\n\n```\n$ git commit -am'new development\
    \ on master'\n$ git push origin master\n```\n\nSo I now have parallel branches.\
    \ Of course, sooner or later, I will want\nmy master branch to benefit from the\
    \ bug fixes that I have committed on\n`megaquiz-branch1.0.`\n\nI can do this on\
    \ the command line, but first let’s pause to look at a\nfeature supported by GitHub\
    \ and similar services like BitBucket. The\npull request (often abbreviated to\
    \ PR) allows me to request a code\nreview before merging a branch. So before magaquiz-branch1.0\
    \ hits\nmaster, I can ask Bob to check my work. As you can see in Figure [17-5](#A314621_5_En_17_Chapter.html#Fig5),\
    \ GitHub\ndetects the branch and gives me the opportunity to issue my pull\nrequest.\n\
    \n![A314621_5_En_17_Fig5_HTML.jpg](A314621_5_En_17_Fig5_HTML.jpg)\n\nFigure 17-5.\n\
    \nGitHub makes issuing pull requests easy\n\nI hit the button and add a comment\
    \ before submitting the pull request.\nYou can see the result of that in Figure\
    \ [17-6](#A314621_5_En_17_Chapter.html#Fig6).\n\n![A314621_5_En_17_Fig6_HTML.jpg](A314621_5_En_17_Fig6_HTML.jpg)\n\
    \nFigure 17-6.\n\nIssuing the pull request\n\nNow Bob can examine my changes and\
    \ add any comments he may have. GitHub\nshows him exactly what has changed. You\
    \ can see Bob’s comment in Figure\n[17-7](#A314621_5_En_17_Chapter.html#Fig7).\n\
    \n![A314621_5_En_17_Fig7_HTML.jpg](A314621_5_En_17_Fig7_HTML.jpg)\n\nFigure 17-7.\n\
    \nThe changes covered by a pull request\n\nOnce Bob approves my pull request,\
    \ I can merge directly from the\nbrowser, or I can return to the command line.\
    \ This is pretty easy. Git\nprovides a subcommand named `merge`:\n\n```\n$ git\
    \ checkout master\nAlready on 'master'\nYour branch is up-to-date with 'origin/master'.\n\
    ```\n\nIn fact, I’m already on the master branch—but it can’t hurt to be sure.\n\
    Now I perform the actual merge:\n\n```\n$ git merge megaquiz-branch1.0\nAuto-merging\
    \ command/FeedbackCommand.php\nMerge made by the 'recursive' strategy.\ncommand/FeedbackCommand.php\
    \ | 2 +-\n1 file changed, 1 insertion(+), 1 deletion(-)\n```\n\nNote\n\nTo merge\
    \ or not to merge? The choice is not always as straightforward as\nit might seem.\
    \ In some cases, for example, your bug fix may be the kind\nof temporary work\
    \ that is supplanted by a more thorough refactoring on\nthe trunk, or it may no\
    \ longer apply due to a change in specification.\nThis is necessarily a judgment\
    \ call. Most teams I have worked in,\nhowever, tend to merge to the trunk where\
    \ possible, while keeping work\non the branch to the bare minimum. New features\
    \ for us generally appear\non the trunk and find their way quickly to users through\
    \ a “release\nearly and often” policy.\n\nNow, when I look at the version of `FeedbackCommand`\
    \ in\nthe trunk, I confirm that all changes have been merged:\n\n```\npublic function\
    \ execute(CommandContext $context)\n{\n// new development\n// goes here\n$msgSystem\
    \ = ReceiverFactory::getMessageSystem();\n$email = $context->get('email');\n$msg\
    \ = $context->get('pass');\n$topic = $context->get('topic');\n$result = $msgSystem->despatch($email,\
    \ $msg, $topic);\nif (! $result) {\n$this->context->setError($msgSystem->getError());\n\
    return false;\n}\n```\n\nThe `execute()`\nmethod now includes both my simulated\
    \ trunk development and the bug fix.\n\nI created a branch when I first “released”\
    \ MegaQuiz version 1.0 and\nthat’s what we have been working with. Remember, however,\
    \ that I also\ncreated a tag at that stage. I promised at the time that I would\
    \ show\nyou how to access the tag. In fact, you’ve already seen how. You can\n\
    create a local branch based on the tag in just the same way that Bob set\nup his\
    \ local version of our bug fix branch. The difference is that this\nnew branch\
    \ is entirely fresh. It does not track an existing remote\nbranch:\n\n```\n$ git\
    \ checkout -b new-version1.0-branch version1.0\nSwitched to a new branch 'new-version1.0-branch'\n\
    ```\n\nHowever, now that I have this new branch, I can push it and share it\n\
    just as you have seen.\n\nSummary\n\nGit comprises an enormous number of tools,\
    \ each with a daunting range of\noptions and capabilities. I can only hope to\
    \ provide a brief\nintroduction in the space available. Nonetheless, if you only\
    \ use the\nfeatures that I have covered in this chapter, you should see the benefit\n\
    in your own work, whether through protection against data loss or\nimprovements\
    \ in collaborative working.\n\nIn this chapter, we took a tour through the basics\
    \ of Git. I looked\nbriefly at configuration before importing a project. I checked\
    \ out,\ncommitted, and updated code, and then showed you how to tag and export\
    \ a\nrelease. I ended the chapter with a brief look at branches,\ndemonstrating\
    \ their usefulness in maintaining concurrent development and\nbug-fix strands\
    \ in a project.\n\nThere is one issue that I have glossed over here, to some extent.\
    \ We\nestablished the principle that developers should check out their own\nversions\
    \ of a project. On the whole, however, projects will not run in\nplace. In order\
    \ to test their changes, developers need to deploy code\nlocally. Sometimes, this\
    \ is as simple as copying over a few directories.\nMore often, however, deployment\
    \ must address a whole range of\nconfiguration issues. In the next chapter, we\
    \ will look at some\ntechniques for automating this process.\n\n18. Testing with\
    \ PHPUnit\n\nEvery component in a system depends for its continued smooth running\
    \ on\nthe consistency of operation and interface of its peers. By definition,\n\
    then, development breaks systems. As you improve your classes and\npackages, you\
    \ must remember to amend any code that works with them. For\nsome changes, this\
    \ can create a ripple effect, affecting components far\naway from the code you\
    \ originally changed. Eagle-eyed vigilance and an\nencyclopedic knowledge of a\
    \ system’s dependencies can help to address\nthis problem. Of course, while these\
    \ are excellent virtues, systems soon\ngrow too complex for every unwanted effect\
    \ to be easily predicted, not\nleast because systems often combine the work of\
    \ many developers. To\naddress this problem, it is a good idea to test every component\n\
    regularly. This, of course, is a repetitive and complex task; and as\nsuch, it\
    \ lends itself well to automation.\n\nAmong the test solutions available to PHP\
    \ programmers, PHPUnit is\nperhaps the most ubiquitous and certainly the most\
    \ fully featured tool.\nIn this chapter, you will learn the following about PHPUnit:\n\
    \n*   Installation: Using PEAR to\n    install PHPUnit\n\n*   Writing Tests: Creating\
    \ test\n    cases and using assertion methods\n\n*   Handling Exceptions: Strategies\n\
    \    for confirming failure\n\n*   Running multiple tests:\n    Collecting tests\
    \ into suites\n\n*   Constructing assertion logic:\n    Using constraints\n\n\
    *   Faking components: Mocks and\n    stubs\n\n*   Testing web applications:\n\
    \    Testing with and without additional tools\n\nFunctional Tests and Unit Tests\n\
    \nTesting is essential in any project. Even if you don’t formalize the\nprocess,\
    \ you must have found yourself developing informal lists of\nactions that put\
    \ your system through its paces. This process soon\nbecomes wearisome, and that\
    \ can lead to a fingers-crossed attitude to\nyour projects.\n\nOne approach to\
    \ testing starts at the interface of a project, modeling\nthe various ways in\
    \ which a user might negotiate the system. This is\nprobably the way you would\
    \ go when testing by hand, although there are\nvarious frameworks for automating\
    \ the process. These functional tests\nare sometimes called acceptance tests because\
    \ a list of actions\nperformed successfully can be used as criteria for signing\
    \ off a project\nphase. Using this approach, you typically treat the system as\
    \ a black\nbox—your tests remain willfully ignorant of the hidden components that\n\
    collaborate to form the system under test.\n\nWhereas functional tests operate\
    \ from without, unit tests work from the\ninside out. Unit testing tends to focus\
    \ on classes, with test methods\ngrouped together in test cases. Each test case\
    \ puts one class through a\nrigorous workout, checking that each method performs\
    \ as advertised and\nfails as it should. The objective, as far as possible, is\
    \ to test each\ncomponent in isolation from its wider context. This often supplies\
    \ you\nwith a sobering verdict on the success of your mission to decouple the\n\
    parts of your system.\n\nTests can be run as part of the build process, directly\
    \ from the command\nline, or even via a web page. In this chapter, I’ll concentrate\
    \ on the\ncommand line.\n\nUnit testing is a good way of ensuring the quality\
    \ of design in a\nsystem. Tests reveal the responsibilities of classes and functions.\
    \ Some\nprogrammers even advocate a test-first approach. You should, they say,\n\
    write the tests before you even begin work on a class. This lays down a\nclass’s\
    \ purpose, ensuring a clean interface and short, focused methods.\nPersonally,\
    \ I have never aspired to this level of purity—it just doesn’t\nsuit my style\
    \ of coding. Nevertheless, I attempt to write tests as I go.\nMaintaining a test\
    \ harness provides me with the security I need to\nrefactor my code. I can pull\
    \ down and replace entire packages with the\nknowledge that I have a good chance\
    \ of catching unexpected errors\nelsewhere in the system.\n\nTesting by Hand\n\
    \nIn the last section, I said that testing was essential in every project.\nI\
    \ could have said instead that testing is inevitable in every project. We all\n\
    test. The tragedy is that we often throw away this good work.\n\nSo, let’s create\
    \ some classes to test. Here is a class that stores and\nretrieves user information.\
    \ For the sake of demonstration, it generates\narrays, rather than the `User`\
    \ objects you’d\nnormally expect to use:\n\n```\n// listing 18.01\nclass UserStore\n\
    {\nprivate $users = [];\npublic function addUser(string $name, string $mail, string\
    \ $pass):bool\n{\nif (isset($this->users[$mail])) {\nthrow new \\Exception(\n\"\
    User {$mail} already in the system\"\n);\n}\nif (strlen($pass) users[$mail] =\
    \ [\n'pass' => $pass,\n'mail' => $mail,\n'name' => $name\n];\nreturn true;\n}\n\
    public function notifyPasswordFailure(string $mail)\n{\nif (isset($this->users[$mail]))\
    \ {\n$this->users[$mail]['failed'] = time();\n}\n}\npublic function getUser(string\
    \ $mail):array\n{\nreturn ( $this->users[$mail] );\n}\n}\n```\n\nThis class accepts\
    \ user data with the `addUser()` method and\nretrieves it via `getUser()` . The\n\
    user’s e-mail address is used as the key for retrieval. If you’re like\nme, you’ll\
    \ write some sample implementation as you develop, just to\ncheck that things\
    \ are behaving as you designed them:\n\n```\n// listing 18.02\n$store = new UserStore();\n\
    $store->addUser(\n\"bob williams\",\n\"bob@example.com\",\n\"12345\"\n);\n$store->notifyPasswordFailure(\"\
    bob@example.com\");\n$user = $store->getUser(\"bob@example.com\");\nprint_r($user);\n\
    ```\n\nThis is the sort of thing that I might add to the foot of a file as I\n\
    work on the class it contains. The test validation is performed\nmanually, of\
    \ course; it’s up to me to eyeball the results and confirm\nthat the data returned\
    \ by `UserStore::getUser()`\ncorresponds with the information I added initially.\
    \ It’s a test of\nsorts, nevertheless.\n\nHere is a client class that uses `UserStore`\
    \ to confirm\nthat a user has provided the correct authentication information:\n\
    \n```\n// listing 18.03\nclass Validator\n{\nprivate $store;\npublic function\
    \ __construct(UserStore $store)\n{\n$this->store = $store;\n}\npublic function\
    \ validateUser(string $mail, string $pass): bool\n{\nif (! is_array($user = $this->store->getUser($mail)))\
    \ {\nreturn false;\n}\nif ($user['pass'] == $pass) {\nreturn true;\n}\n$this->store->notifyPasswordFailure($mail);\n\
    return false;\n}\n}\n```\n\nThe class requires a `UserStore` object,\nwhich it\
    \ saves in the `$store` property. This\nproperty is used by the `validateUser()`\
    \ method\nto ensure, first of all, that the user referenced by the given e-mail\n\
    address exists in the store; and, second, that the user’s password\nmatches the\
    \ provided argument. If both these conditions are fulfilled,\nthe method returns\
    \ `true`. Once again, I\nmight test this as I go along:\n\n```\n// listing 18.04\n\
    $store = new UserStore();\n$store->addUser(\"bob williams\", \"bob@example.com\"\
    , \"12345\");\n$validator = new Validator($store);\nif ($validator->validateUser(\"\
    bob@example.com\", \"12345\")) {\nprint \"pass, friend!\\n\";\n}\n```\n\nI instantiate\
    \ a `UserStore` object,\nwhich I prime with data and pass to a newly instantiated\
    \ `Validator` object. I\ncan then confirm a user name and password combination.\n\
    \nOnce I’m finally satisfied with my work, I could delete these sanity\nchecks\
    \ altogether or comment them out. This is a terrible waste of a\nvaluable resource.\
    \ These tests could form the basis of a harness to\nscrutinize the system as I\
    \ develop. One of the tools that might help me\nto do this is PHPUnit.\n\nIntroducing\
    \ PHPUnit\n\nPHPUnit is a member of the xUnit family of testing tools. The ancestor\n\
    of these is SUnit , a framework invented by Kent Beck to test systems\nbuilt with\
    \ the Smalltalk language. The xUnit framework was probably\nestablished as a popular\
    \ tool, however, by the Java implementation,\njUnit, and by the rise to prominence\
    \ of agile methodologies like Extreme\nProgramming (XP) and Scrum, all of which\
    \ place great emphasis on\ntesting.\n\nYou can get PHPUnit with Composer:\n\n\
    ```\n{\n\"require-dev\": {\n\"phpunit/phpunit\": \"5.3.*\"\n}\n}\n```\n\nOnce\
    \ you have run composer install, you will find the `phpunit` script at\n`vendor/bin/phpunit`.\n\
    Or, you can download a PHP archive (.phar) file . You can then make the\narchive\
    \ executable:\n\n```\n$ wget https://phar.phpunit.de/phpunit.phar\n$ chmod 755\
    \ phpunit.phar\n$ sudo mv phpunit.phar/usr/local/bin/phpunit\n```\n\nNote\n\n\
    I show commands that are input at the command line in bold to\ndistinguish them\
    \ from any output they may produce.\n\nCreating a Test Case\n\nArmed with PHPUnit,\
    \ I can write tests for the `UserStore` class .\nTests for each target component\
    \ should be collected in a single class\nthat extends `PHPUnit_Framework_TestCase`,\n\
    one of the classes made available by the PHPUnit package. Here’s how to\ncreate\
    \ a minimal test case class:\n\n```\n// listing 18.05\nnamespace popp\\ch18\\\
    batch01;\nclass UserStoreTest extends \\PHPUnit_Framework_TestCase\n{\npublic\
    \ function setUp()\n{\n}\npublic function tearDown()\n{\n}\n// ...\n}\n```\n\n\
    I named the test case class `UserStoreTest`. You\nare not obliged to use the name\
    \ of the class you are testing in the\ntest’s name, although that is what many\
    \ developers do. Naming\nconventions of this kind can greatly improve the accessibility\
    \ of a test\nharness, especially as the number of components and tests in the\
    \ system\nbegins to increase. It is often useful to place your test in the same\n\
    namespace as the class under test. This will give you easy access to the\nclass\
    \ under test and its peers, and the structure of your test files\nwill likely\
    \ mirror that of your system. Remember that, thanks to\nComposer’s support for\
    \ PSR-4, you can maintain separate directory\nstructures for class files in the\
    \ same package.\n\nHere’s how we might do this in Composer:\n\n```\n\"autoload\"\
    : {\n\"psr-4\": {\n\"popp\\\\\": [\"myproductioncode/\",  \"mytestcode/\"]\n}\n\
    }\n```\n\nIn this code, I have nominated two directories that map to the `popp`\
    \ namespace. I can\nnow maintain these in parallel, making it easy to keep my\
    \ test and\nproduction code separate.\n\nEach test in a test case class is run\
    \ in isolation from its siblings.\nThe `setUp()`\nmethod is automatically invoked\
    \ for each test method, allowing us to set\nup a stable and suitably primed environment\
    \ for the test. `tearDown()` is invoked\nafter each test method is run. If your\
    \ tests change the wider\nenvironment of your system, you can use this method\
    \ to reset state. The\ncommon platform managed by `setUp()` and `tearDown()` is\
    \ known\nas a fixture.\n\nIn order to test the `UserStore` class, I\nneed an instance\
    \ of it. I can instantiate this in `setUp()` and assign it\nto a property. Let’s\
    \ create a test method as well:\n\n```\n// listing 18.05\nnamespace popp\\ch18\\\
    batch01;\nclass UserStoreTest extends \\PHPUnit_Framework_TestCase\n{\nprivate\
    \ $store;\npublic function setUp()\n{\n$this->store = new UserStore();\n}\npublic\
    \ function tearDown()\n{\n}\npublic function testGetUser()\n{\n$this->store->addUser(\"\
    bob williams\", \"a@b.com\", \"12345\");\n$user = $this->store->getUser(\"a@b.com\"\
    );\n$this->assertEquals($user['mail'], \"a@b.com\");\n$this->assertEquals($user['name'],\
    \ \"bob williams\");\n$this->assertEquals($user['pass'], \"12345\");\n}\npublic\
    \ function testAddUserShortPass()\n{\ntry {\n$this->store->addUser(\"bob williams\"\
    , \"bob@example.com\", \"ff\");\n} catch (\\Exception $e) {\nreturn;\n}\n$this->fail(\"\
    Short password exception expected\");\n}\n}\n```\n\nNote\n\nRemember that `setUp()`\
    \ and `tearDown()` are called\nonce for every test method in your class.\n\nTest\
    \ methods should be named to begin with the word “test” and should\nrequire no\
    \ arguments. This is because the test case class is manipulated\nusing reflection.\n\
    \nNote\n\nReflection is covered in detail in Chapter [5](#A314621_5_En_5_Chapter.html).\n\
    \nThe object that runs the tests looks at all the methods in the class and\ninvokes\
    \ only those that match this pattern (that is, methods that begin\nwith “test”).\n\
    \nIn the example, I tested the retrieval of user information. I don’t need\nto\
    \ instantiate `UserStore` for each\ntest because I handled that in `setUp().`\
    \ Because\n`setUp()` is\ninvoked for each test, the `$store` property is\nguaranteed\
    \ to contain a newly instantiated object.\n\nWithin the `testgetUser()` method\n\
    , I first provide `UserStore::addUser()`\nwith dummy data, and then I retrieve\
    \ that data and test each of its\nelements.\n\nThere is one additional issue to\
    \ be aware of here, before we can run our\ntest. I am using `use` statements\n\
    without `require`\nor `require_once`. In\nother words, I am relying on autoloading.\
    \ That’s fine, but where do I\ntell my tests how to locate the generated `autoload.php`\
    \ file? I\ncould put a `require_once`\nstatement in the test class (or a superclass),\
    \ but that would break the\nPSR-1 rule that class files should not have side effects.\
    \ The simplest\nthing to do is to tell PHPUnit about the `autoload.php` file\n\
    from the command line:\n\n```\n$ phpunit src/ch18/batch01/UserStoreTest.php --bootstrap\
    \ vendor/autoload.php\nPHPUnit 5.0.10 by Sebastian Bergmann and contributors.\n\
    ..                                                                  2 / 2 (100%)\n\
    Time: 175 ms, Memory: 4.00MB\nOK (2 tests, 3 assertions)\n```\n\nAssertion Methods\n\
    \nAn assertion in programming is a statement or method that allows you to\ncheck\
    \ your assumptions about an aspect of your system. In using an\nassertion, you\
    \ typically define an expectation that something is the\ncase, that `$cheese`\
    \ is `\"blue\"` or `$pie` is `\"apple\"`. If your\nexpectation is confounded,\
    \ a warning of some kind will be generated.\nAssertions are such a good way of\
    \ adding safety to a system that PHP\nsupports them natively inline and allows\
    \ you to turn them off in a\nproduction context.\n\nNote\n\nSee the manual page\
    \ at [ `http://php.net/assert`\n](http://php.net/assert) for more information\
    \ on PHP’s support for assertions.\n\nPHPUnit supports assertions through a set\
    \ of static methods.\n\nIn the previous example, I used an inherited static method,\
    \ `assertEquals()`. This\nmethod compares its two provided arguments and checks\
    \ them for\nequivalence. If they do not match, the test method will be chalked\
    \ up as\na failed test. Having subclassed `PHPUnit_Framework_TestCase,`\nI have\
    \ access to a set of assertion methods. Some of these methods are\nlisted in Table\
    \ [18-1](#A314621_5_En_18_Chapter.html#Tab1).\n\nTable 18-1.\n\nPHPUnit_Framework_TestCase\
    \ Assert Methods\n\n  Method\n |\n  Description\n |\n\n| --- | --- | --- | ---\
    \ | --- |\n\n  `assertEquals($val1, $val2, $message, $delta)`\n |\n  Fail if `$val1`\n\
    is not equivalent to `$val2` (`$delta` represents an\nallowable margin of error)\n\
    \ |\n\n  `assertFalse($expression, $message)`\n |\n  Evaluate `$expression`; fail\
    \ if\nit does not resolve to `false`\n |\n\n  `assertTrue($expression, $message)`\n\
    \ |\n  Evaluate `$expression`; fail if\nit does not resolve to `true`\n |\n\n\
    \  `assertNotNull($val, $message)`\n |\n  Fail if `$val` is\n`null`\n |\n\n  `assertNull($val,\
    \ $message)`\n |\n  Fail if `$val` is\nanything other than `null`\n |\n\n  `assertSame($val1,\
    \ $val2, $message)`\n |\n  Fail if `$val1`\nand `$val2` are\nnot references to\
    \ the same\nobject, or if they are variables of different types or values\n |\n\
    \n  `assertNotSame($val1, $val2, $message)`\n |\n  Fail if `$val1`\nand `$val2`\
    \ are\nreferences to the same object or variables of the same type and value\n\
    \ |\n\n  `assertRegExp($regexp, $val, $message)`\n |\n  Fail if `$val` is\nnot\
    \ matched by the regular expression, `$regexp`\n |\n\n  `assertAttributeSame($val,\
    \ $attribute, $classname, $message)`\n |\n  Fail if `$val` is\nnot the same type\
    \ and value as `$classname::$attribute`\n |\n\n  `fail()`\n |\n  Fail\n |\n\n\
    Testing Exceptions\n\nYour focus as a coder is usually to make stuff work and\
    \ work well. Often, that\nmentality carries through to testing, especially if\
    \ you are testing your\nown code. The temptation is to test that a method behaves\
    \ as advertised.\nIt’s easy to forget how important it is to test for failure.\
    \ How good is\na method’s error checking? Does it throw an exception when it should?\n\
    Does it throw the right exception? Does it clean up after an error if,\nfor example,\
    \ an operation is half complete before the problem occurs? It\nis your role as\
    \ a tester to check all of this. Luckily, PHPUnit can\nhelp.\n\nHere is a test\
    \ that checks the behavior of the `UserStore` class when\nan operation fails:\n\
    \n```\n//...\npublic function testAddUserShortPass()\n{\ntry {\nthis->store->addUser(\"\
    bob williams\", \"bob@example.com\", \"ff\");\n} catch (\\Exception $e) {\nreturn;\n\
    }\n$this->fail(\"Short password exception expected\");\n}\n//...\n```\n\nIf you\
    \ look back at the `UserStore::` `addUser()` method ,\nyou will see that I throw\
    \ an exception if the user’s password is less\nthan five characters long. My test\
    \ attempts to confirm this. I add a\nuser with an illegal password in a `try`\
    \ clause. If the\nexpected exception is thrown, then flow skips to the catch clause,\
    \ and\nall is well. If the `addUser()` method does\nnot throw an exception as\
    \ expected, the execution flow reaches the `fail()` method call.\n\nAnother way\
    \ to test that an exception is thrown is to use an assertion\nmethod called `expectException()`\
    \ ,\nwhich requires the name of the exception type you expect to be thrown\n(either\
    \ `Exception` or a\nsubclass). If the test method exits without the correct exception\
    \ having\nbeen thrown, the test will fail.\n\nNote\n\nThe `expectedException()`\n\
    method was added in PHP 5.2.0.\n\nHere’s a quick reimplementation of the previous\
    \ test:\n\n```\n// listing 18.06\nnamespace popp\\ch18\\batch02;\nclass UserStoreTest\
    \ extends \\PHPUnit_Framework_TestCase\n{\nprivate $store;\npublic function setUp()\n\
    {\n$this->store = new UserStore();\n}\npublic function testAddUserShortPass()\n\
    {\n$this->expectException('\\\\Exception');\n$this->store->addUser(\"bob williams\"\
    , \"a@b.com\", \"ff\");\n$this->fail(\"Short password exception expected\");\n\
    }\n}\n```\n\nRunning Test Suites\n\nIf I am testing the `UserStore` class, I\n\
    should also test `Validator`. Here is a\ncut-down version of a class called `ValidateTest`\
    \ that\ntests the `Validator::validateUser()`\nmethod:\n\n```\n// listing 18.07\n\
    namespace popp\\ch18\\batch02;\nclass ValidatorTest extends \\PHPUnit_Framework_TestCase\n\
    {\nprivate $validator;\npublic function setUp()\n{\n$store = new UserStore();\n\
    $store->addUser(\"bob williams\", \"bob@example.com\", \"12345\");\n$this->validator\
    \ = new Validator($store);\n}\npublic function tearDown()\n{\n}\npublic function\
    \ testValidateCorrectPass()\n{\n$this->assertTrue(\n$this->validator->validateUser(\"\
    bob@example.com\", \"12345\"),\n\"Expecting successful validation\"\n);\n}\n}\n\
    ```\n\nSo now that I have more than one test case, how do I go about running\n\
    them together? The best way is to place your test classes in a common\nroot directory.\
    \ You can then specify this directory, and PHPUnit will\nrun all the tests beneath\
    \ it`:`\n\n```\n$ phpunit src/ch18/batch02/\nPHPUnit 5.0.10 by Sebastian Bergmann\
    \ and contributors.\n......\nTime: 104 ms, Memory: 3.75Mb\nOK (7 tests, 8 assertions)\n\
    ```\n\nConstraints\n\nIn most circumstances, you will use off-the-peg assertions\
    \ in your\ntests. In fact, at a stretch you can achieve an awful lot with `AssertTrue()`\
    \ alone.\nAs of PHPUnit 3.0, however, `PHPUnit_Framework_TestCase`\nincluded a\
    \ set of factory methods that return `PHPUnit_Framework_Constraint`\nobjects.\
    \ You can combine these and pass them to `PHPUnit_Framework_TestCase::AssertThat()`\n\
    in order to construct your own assertions.\n\nIt’s time for a quick example. The\
    \ `UserStore` object\nshould not allow duplicate e-mail addresses to be added.\
    \ Here’s a test\nthat confirms this:\n\n```\n// listing 18.08\n// UserStoreTest\n\
    public function testAddUserDuplicate()\n{\ntry {\n$ret = $this->store->addUser(\"\
    bob williams\", \"a@b.com\", \"123456\");\n$ret = $this->store->addUser(\"bob\
    \ stevens\", \"a@b.com\", \"123456\");\nself::fail(\"Exception should have been\
    \ thrown\");\n} catch (\\Exception $e) {\n$const = $this->logicalAnd(\n$this->logicalNot($this->contains(\"\
    bob stevens\")),\n$this->isType('array')\n);\nself::AssertThat($this->store->getUser(\"\
    a@b.com\"), $const);\n}\n}\n```\n\nThis test adds a user to the `UserStore` object\
    \ and\nthen adds a second user with the same e-mail address. The test thereby\n\
    confirms that an exception is thrown with the second call to `addUser()`. In the\n\
    `catch` clause, I\nbuild a constraint object using the convenience methods available\
    \ to us.\nThese return corresponding instances of `PHPUnit_Framework_Constraint`.\n\
    Let’s break down the composite constraint in the previous example:\n\n```\n$this->contains(\"\
    bob stevens\")\n```\n\nThis returns a `PHPUnit_Framework_Constraint_TraversableContains`\n\
    object. When passed to `AssertThat`, this\nobject will generate an error if the\
    \ test subject does not contain an\nelement matching the given value (`\"bob stevens\"\
    `). I\nnegate this, though, by passing this constraint to another: `PHPUnit_Framework_Constraint_Not`.\n\
    Once again, I use a convenience method, available through the `TestCase` class\n\
    (actually through a superclass, `Assert`):\n\n```\n$this->logicalNot( $this->contains(\"\
    bob stevens\"))\n```\n\nNow, the `AssertThat` assertion\nwill fail if the test\
    \ value (which must be traversable) contains an\nelement that matches the string,\
    \ `\"bob stevens\"`. In\nthis way, you can build up quite complex logical structures.\
    \ By the time\nI have finished, my constraint can be summarized as follows: 'Do\
    \ not\nfail if the test value is an array and does not contain the string `\"\
    bob stevens\"`.' You\ncould build much more involved constraints in this way.\
    \ The constraint\nis run against a value by passing both to `AssertThat()`.\n\n\
    You could achieve all this with standard assertion methods, of course,\nbut constraints\
    \ have a couple of virtues. First, they form nice logical\nblocks with clear relationships\
    \ among components (although good use of\nformatting may be necessary to support\
    \ clarity). Second, and more\nimportant, a constraint is reusable. You can set\
    \ up a library of complex\nconstraints and use them in different tests. You can\
    \ even combine\ncomplex constraints with one another:\n\n```\n$const = $this->logicalAnd(\n\
    $a_complex_constraint,\n$another_complex_constraint\n);\n```\n\nTable [18-2](#A314621_5_En_18_Chapter.html#Tab2)\
    \ shows the some\nof the constraint methods available in a `TestCase` class.\n\
    \nTable 18-2.\n\nSome Constraint Methods\n\n  TestCase Method\n |\n  Constraint\
    \ Fails Unless . . .\n |\n\n| --- | --- | --- | --- | --- |\n\n  `greaterThan($num)`\n\
    \ |\n  Test value is greater than `$num`\n |\n\n  `contains($val)`\n |\n  Test\
    \ value (traversable) contains an element that matches `$val`\n |\n\n  `identicalTo($val)`\n\
    \ |\n  Test value is a reference to the same object as `$val` or, for\nnonobjects,\
    \ is of the same type and value\n |\n\n  `greaterThanOrEqual($num)`\n |\n  Test\
    \ value is greater than or equal to `$num`\n |\n\n  `lessThan($num)`\n |\n  Test\
    \ value is less than `$num`\n |\n\n  `lessThanOrEqual($num)`\n |\n  Test value\
    \ is less than or equal to `$num`\n |\n\n  `equalTo($value, $delta=0, $depth=10)`\n\
    \ |\n  Test value equals `$val`. If specified,\n`$delta` defines\na margin of\
    \ error for numeric comparisons, and `$depth` determines how\nrecursive a comparison\
    \ should be for arrays or objects\n |\n\n  `stringContains($str, $casesensitive=true)`\n\
    \ |\n  Test value contains `$str`. This is case\nsensitive by default\n |\n\n\
    \  `matchesRegularExpression($pattern)`\n |\n  Test value matches the regular\
    \ expression in `$pattern`\n |\n\n  `logicalAnd(PHPUnit_Framework_Constraint $const,  [,\
    \ $const..])`\n |\n  All provided constraints pass\n |\n\n  `logicalOr(PHPUnit_Framework_Constraint\
    \ $const,  [, $const..])`\n |\n  At least one of the provided constraints match\n\
    \ |\n\n  `logicalNot(PHPUnit_Framework_Constraint $const)`\n |\n  The provided\
    \ constraint does not pass\n |\n\nMocks and Stubs\n\nUnit tests aim to test a\
    \ component in isolation of the system that\ncontains it to the greatest possible\
    \ extent. Few components exist in a\nvacuum, however. Even nicely decoupled classes\
    \ require access to other\nobjects as methods arguments. Many classes also work\
    \ directly with\ndatabases or the filesystem.\n\nYou have already seen one way\
    \ of dealing with this. The `setUp()` and `tearDown()` methods\ncan be used to\
    \ manage a fixture (i.e., a common set of resources for\nyour tests, which might\
    \ include database connections, configured\nobjects, a scratch area on the file\
    \ system, etc.)\n\nAnother approach is to fake the context of the class you are\
    \ testing.\nThis involves creating objects that pretend to be the objects that\
    \ do\nreal stuff. For example, you might pass a fake database mapper to your\n\
    test object’s constructor. Because this fake object shares a type with\nthe real\
    \ mapper class (extends from a common abstract base or even\noverrides the genuine\
    \ class itself), your subject is none the wiser. You\ncan prime the fake object\
    \ with valid data. Objects that provide a\nsandbox of this sort for unit tests\
    \ are known as stubs. They can be useful because they\nallow you to focus in on\
    \ the class you want to test without\ninadvertently testing the entire edifice\
    \ of your system at the same\ntime.\n\nFake objects can be taken a stage further\
    \ than this, however. Because\nthe object you are testing is likely to call a\
    \ fake object in some way,\nyou can prime it to confirm the invocations you are\
    \ expecting. Using a\nfake object as a spy in this way is known as behavior verification,\
    \ and it is what\ndistinguishes a mock object from a stub.\n\nYou can build mocks\
    \ yourself by creating classes hard-coded to return\ncertain values and to report\
    \ on method invocations. This is a simple\nprocess, but it can be time-consuming.\n\
    \nPHPUnit provides access to an easier and more dynamic solution. It will\ngenerate\
    \ mock objects on the fly for you. It does this by examining the\nclass you wish\
    \ to mock and building a child class that overrides its\nmethods. Once you have\
    \ this mock instance, you can call methods on it to\nprime it with data and to\
    \ set the conditions for success.\n\nLet’s build an example. The `UserStore` class\n\
    contains a method called `notifyPasswordFailure()`\n, which sets a field for a\
    \ given user. This should be called by `Validator` when an\nattempt to set a password\
    \ fails. Here, I mock up the `UserStore` class so\nthat it both provides data\
    \ to the `Validator` object and\nconfirms that its `notifyPasswordFailure()`\n\
    method was called as expected:\n\n```\n// listing 18.09\n// ValidatorTest\npublic\
    \ function testValidateFalsePass()\n{\n$store = $this->getMock(__NAMESPACE__ .\
    \ \"\\\\UserStore\");\n$this->validator = new Validator($store);\n$store->expects($this->once())\n\
    ->method('notifyPasswordFailure')\n->with($this->equalTo('bob@example.com'));\n\
    $store->expects($this->any())\n->method(\"getUser\")\n->will($this->returnValue([\n\
    \"name\" => \"bob williams\",\n\"mail\" => \"bob@example.com\",\n\"pass\" => \"\
    right\"\n]));\n$this->validator->validateUser(\"bob@example.com\", \"wrong\");\n\
    ```\n\nMock objects use a fluent\ninterface; that is, they have a language-like\
    \ structure. These\nare much easier to use than to describe. Such constructs work\
    \ from left\nto right, each invocation returning an object reference, which can\
    \ then\nbe invoked with a further modifying method call (itself returning an\n\
    object). This can make for easy use, but painful debugging.\n\nIn the previous\
    \ example, I called the `PHPUnit_Framework_TestCase`\nmethod : `getMock()`, passing\
    \ it\n`\"UserStore\"`,\nthe name of the class I wish to mock. This dynamically\
    \ generates a class\nand instantiates an object from it. I store this mock object\
    \ in `$store` and pass it to\n`Validator`. This\ncauses no error because the object’s\
    \ newly minted class extends `UserStore`. I have\nfooled `Validator` into\naccepting\
    \ a spy into its midst.\n\nMock objects generated by `PHPUnit` have an `expects()`\
    \ method.\nThis method requires a matcher object (actually it’s of type `PHPUnit_Framework_MockObject_Matcher_Invocation`,\n\
    but don’t worry; you can use the convenience methods in `TestCase` to generate\n\
    your matcher). The matcher defines the cardinality of the expectation;\nthat is,\
    \ it dictates the number of times a method should be called.\n\nTable [18-3](#A314621_5_En_18_Chapter.html#Tab3)\
    \ shows the\nmatcher methods available in a `TestCase` class .\n\nTable 18-3.\n\
    \nSome Matcher Methods\n\n  TestCase Method\n |\n  Match Fails Unless . . .\n\
    \ |\n\n| --- | --- | --- | --- | --- |\n\n  `any()`\n |\n  Zero or more calls\
    \ are made to the corresponding method (useful for stub\nobjects that return values,\
    \ but don’t test invocations)\n |\n\n  `never()`\n |\n  No calls are made to the\
    \ corresponding method\n |\n\n  `atLeastOnce()`\n |\n  One or more calls are made\
    \ to the corresponding method\n |\n\n  `once()`\n |\n  A single call is made to\
    \ the corresponding method\n |\n\n  `exactly($num)`\n |\n  `$num` calls are\n\
    made to the corresponding method\n |\n\n  `at($num)`\n |\n  A call to the corresponding\
    \ method made at `$num` index (each\nmethod call to a mock is recorded and indexed)\n\
    \ |\n\nHaving set up the match requirement, I need to specify a method to which\n\
    it applies. For instance, `expects()` returns an\nobject (`PHPUnit_Framework_MockObject_Builder_InvocationMocker`,\n\
    if you must know) that has a method called `method()` . I can\nsimply call that\
    \ with a method name. This is enough to get some real\nmocking done:\n\n```\n\
    $store = $this->getMock(\"UserStore\");\n$store->expects($this->once())\n->method('notifyPasswordFailure');\n\
    ```\n\nI need to go further, however, and check the parameters that are passed\n\
    to `notifyPasswordFailure()`\n. The `InvocationMocker::method()`\nreturns an instance\
    \ of the object it was called on. `InvocationMocker`\nincludes a method name,\
    \ `with()`, which accepts\na variable list of parameters to match. It also accepts\
    \ constraint\nobjects, so you can test ranges and so on. Armed with this, you\
    \ can\ncomplete the statement and ensure that the expected parameter is passed\n\
    to `notifyPasswordFailure()`:\n\n```\n$store->expects($this->once())\n->method('notifyPasswordFailure')\n\
    ->with($this->equalTo('bob@example.com'));\n```\n\nYou can see why this is known\
    \ as a fluent interface. It reads a bit like\na sentence: “The `$store` object\
    \ expects a single call to the `notifyPasswordFailure()`\nmethod `with`\nparameter\
    \ `bob@example.com`.”\n\nNotice that I passed a constraint to `with()`. Actually,\n\
    that’s redundant; any bare arguments are converted to constraints\ninternally,\
    \ so I could write the statement like this:\n\n```\n$store->expects($this->once())\n\
    ->method('notifyPasswordFailure')\n->with('bob@example.com');\n```\n\nSometimes,\
    \ you only want to use PHPUnit’s mocks as stubs; that is, as\nobjects that return\
    \ values to allow your tests to run. In such cases,\nyou can invoke `InvocationMocker::will()`\n\
    from the call to `method()`. The `will()` method\nrequires the return value (or\
    \ values if the method is to be called\nrepeatedly) that the associated method\
    \ should be primed to return. You\ncan pass in this return value by calling either\
    \ `TestCase::returnValue()`\nor `TestCase::onConsecutiveCalls()`.\nOnce again,\
    \ this is much easier to do than to describe. Here’s the\nfragment from my earlier\
    \ example in which I prime `UserStore` to return a\nvalue:\n\n```\n$store->expects($this->any())\n\
    ->method(\"getUser\")\n->will($this->returnValue([\n\"name\" => \"bob williams\"\
    ,\n\"mail\" => \"bob@example.com\",\n\"pass\" => \"right\"\n]));\n```\n\nI prime\
    \ the `UserStore` mock to\nexpect any number of calls to `getUser()`. Right now,\n\
    I’m concerned with providing data, not with testing calls. Next, I call\n`will()`\
    \ with the\nresult of invoking `TestCase::returnValue()`\nwith the data I want\
    \ returned (this happens to be a `PHPUnit_Framework_MockObject_Stub_Return`\n\
    object, although if I were you, I’d just remember the convenience method\nyou\
    \ use to get it).\n\nYou can alternatively pass the result of a call to `TestCase::onConsecutiveCalls()`\n\
    to `will()`. This\naccepts any number of parameters, each one of which will be\
    \ returned by\nyour mocked method as it is called repeatedly.\n\nTests Succeed\
    \ When They Fail\n\nAlthough most agree that testing is a fine thing, you grow\
    \ to really\nlove it generally only after it has saved your bacon a few times.\
    \ Let’s\nsimulate a situation where a change in one part of a system has an\n\
    unexpected effect elsewhere.\n\nThe `UserStore`\nclass has been running for a\
    \ while when, during a code review, it is\nagreed that it would be neater for\
    \ the class to generate `User` objects rather\nthan associative arrays. Here is\
    \ the new version:\n\n```\n// listing 18.10\nnamespace popp\\ch18\\batch03;\n\
    class UserStore\n{\nprivate $users = [];\npublic function addUser(string $name,\
    \ string $mail, string $pass)\n{\nif (isset($this->users[$mail])) {\nthrow new\
    \ \\Exception(\n\"User {$mail} already in the system\"\n);\n}\n$this->users[$mail]\
    \ = new User($name, $mail, $pass);\nreturn true;\n}\npublic function notifyPasswordFailure(string\
    \ $mail)\n{\nif (isset($this->users[$mail])) {\n$this->users[$mail]->failed(time());\n\
    }\n}\npublic function getUser(string $mail)\n{\nif (isset($this->users[$mail]))\
    \ {\nreturn ( $this->users[$mail] );\n}\nreturn null;\n}\n}\n```\n\nHere is the\
    \ simple `User` class:\n\n```\n// listing 18.11\nnamespace popp\\ch18\\batch03;\n\
    class User\n{\nprivate $name;\nprivate $mail;\nprivate $pass;\nprivate $failed;\n\
    public function __construct(string $name, string $mail, string $pass)\n{\n$this->name\
    \ = $name;\n$this->mail = $mail;\nif (strlen($pass) pass = $pass;\n}\npublic function\
    \ getMail(): string\n{\nreturn $this->mail;\n}\npublic function getPass(): string\n\
    {\nreturn $this->pass;\n}\npublic function failed(string $time)\n{\n$this->failed\
    \ = $time;\n}\n}\n```\n\nOf course, I amend the `UserStoreTest` class\nto account\
    \ for these changes. Consider this code designed to work with\nan array:\n\n```\n\
    public function testGetUser()\n{\n$this->store->addUser(\"bob williams\", \"a@b.com\"\
    , \"12345\");\n$user = $this->store->getUser(\"a@b.com\");\n$this->assertEquals($user['mail'],\
    \ \"a@b.com\");\n//...\n```\n\nIt is now converted into code designed to work\
    \ with an object, like\nthis:\n\n```\npublic function testGetUser()\n{\n$this->store->addUser(\"\
    bob williams\", \"a@b.com\", \"12345\");\n$user = $this->store->getUser(\"a@b.com\"\
    );\n$this->assertEquals($user->getMail(), \"a@b.com\");\n}\n```\n\nWhen I come\
    \ to run my test suite, however, I am rewarded with a warning\nthat my work is\
    \ not yet done:\n\n```\n$ phpunit src/ch18/batch03/\nPHPUnit 5.0.10 by Sebastian\
    \ Bergmann and contributors.\n....F..                                        \
    \                     7 / 7 (100%)\nTime: 254 ms, Memory: 4.00MB\nThere was 1\
    \ failure:\n1) popp\\ch18\\batch03\\ValidatorTest::testValidateCorrectPass\nExpecting\
    \ successful validation\nFailed asserting that false is true.\n/var/popp/src/ch18/batch03/ValidatorTest.php:24\n\
    FAILURES!\nTests: 7, Assertions: 6, Failures: 1.\n```\n\nI invoke `getUser()`\
    \ . Although\n`getUser()` now\nreturns an object and not an array, my method does\
    \ not generate a\nwarning. `getUser()` originally\nreturned the requested user\
    \ array on success or `null` on failure, so I\nvalidated users by checking for\
    \ an array using the `is_array()` function .\nNow, of course, `getUser()` returns\
    \ an\nobject, and the `validateUser()` method\nwill always return `false`. Without\
    \ the\ntest framework, the `Validator` would have\nsimply rejected all users as\
    \ invalid without fuss or warning.\n\nNow, imagine making this neat little change\
    \ on a Friday night without a\ntest framework in place. Think about the frantic\
    \ text messages that\nwould drag you out of your pub, armchair, or restaurant:\
    \ “What have you\ndone? All our customers are locked out!”\n\nThe most insidious\
    \ bugs don’t cause the interpreter to report that\nsomething is wrong. They hide\
    \ in perfectly legal code, and they silently\nbreak the logic of your system.\
    \ Many bugs don’t manifest themselves\nwhere you are working; they are caused\
    \ there, but the effects pop up\nelsewhere, days or even weeks later. A test framework\
    \ can help you catch\nat least some of these, preventing rather than discovering\
    \ problems in\nyour systems.\n\nWrite tests as you code, and run them often. If\
    \ someone reports a bug,\nfirst add a test to your framework to confirm it. Next,\
    \ fix the bug so\nthat the test is passed. Bugs have a funny habit of recurring\
    \ in the\nsame area. Writing tests to prove bugs and then to guard the fix against\n\
    subsequent problems is known as regression testing. Incidentally, if\nyou keep\
    \ a separate directory of regression tests, remember to name your\nfiles descriptively.\
    \ On one project, our team decided to name our\nregression tests after Bugzilla\
    \ ticket numbers. We ended up with a\ndirectory containing 400 test files, each\
    \ with a name like `test_973892.php`.\nFinding an individual test became a tedious\
    \ chore!\n\nWriting Web Tests\n\nYou should engineer your web systems in such\
    \ a way that they can be\ninvoked easily from the command line or an API call.\
    \ In Chapter [12](#A314621_5_En_12_Chapter.html), you saw some tricks that might\n\
    help you with this. In particular, if you create a `Request` class to\nencapsulate\
    \ an HTTP request, you can just as easily populate an instance\nfrom the command\
    \ line or method argument lists as from request\nparameters. The system can then\
    \ run in ignorance of its context.\n\nIf you find a system hard to run in different\
    \ contexts, that may\nindicate a design issue. If, for example, you have numerous\
    \ filepaths\nhard-coded into components, it’s likely you are suffering from tight\n\
    coupling. You should consider moving elements that tie your components\nto their\
    \ context into encapsulating objects that can be acquired from a\ncentral repository.\
    \ The registry pattern, also covered in Chapter [12](#A314621_5_En_12_Chapter.html),\
    \ will likely help you with this.\n\nOnce your system can be run directly from\
    \ a method call, you’ll find\nthat high-level web tests are relatively easy to\
    \ write without any\nadditional tools.\n\nYou may find, however, that even the\
    \ most well-thought-out project will\nneed some refactoring to get things ready\
    \ for testing. In my experience,\nthis almost always results in design improvements.\
    \ I’m going to\ndemonstrate this by retrofitting one aspect of the WOO example\
    \ from\nChapters [12](#A314621_5_En_12_Chapter.html) and [13](#A314621_5_En_13_Chapter.html)\
    \ for unit testing.\n\nRefactoring a Web Application for Testing\n\nWe actually\
    \ left the WOO example in a reasonable state from a tester’s\npoint of view. Because\
    \ the system uses a single Front Controller,\nthere’s a simple API interface.\
    \ This is a simple class called `Runner.` `php` :\n\n```\n// listing 18.13\nrequire_once(\"\
    vendor/autoload.php\");\nuse popp\\ch18\\batch04\\woo\\controller\\Controller;\n\
    Controller::run();\n```\n\nThat would be easy enough to add to a unit test, right?\
    \ But what about\ncommand line arguments? To some extent, this is already handled\
    \ in the\n`Request` class:\n\n```\n// listing 18.14\npublic function init()\n\
    {\nif (isset($_SERVER['REQUEST_METHOD'])) {\nif ($_SERVER['REQUEST_METHOD']) {\n\
    $this->properties = $_REQUEST;\nreturn;\n}\n}\nforeach ($_SERVER['argv'] as $arg)\
    \ {\nif (strpos($arg, '=')) {\nlist($key, $val) = explode(\"=\", $arg);\n$this->setProperty($key,\
    \ $val);\n}\n}\n}\n```\n\nNote\n\nJust a reminder that, if you do implement your\
    \ own `Request` class, you\nshould capture and store `GET`, `POST` and even `PUT`\
    \ properties\nseparately, rather than dumping them into a single `$request` property.\n\
    \nThe `init()`\nmethod detects whether the process is running in a server context,\
    \ and\npopulates the `$properties` array\naccordingly (either directly or via\
    \ `setProperty()`). This\nworks fine for command-line invocation. For example,\
    \ it means I can run\nsomething like this:\n\n```\n$ php src/ch18/batch04/Runner.php\
    \ cmd=AddVenue venue_name=bob\n```\n\nThe preceding line generates this response:\n\
    \n```\n\nAdd a Space for venue bob\n\nAdd a Space for Venue 'bob'\n\n'bob' added\
    \ (18)please add name for the space\n\n[add space]\n\n```\n\nAlthough this works\
    \ for the command line, it remains a little tricky to\npass in arguments via a\
    \ method call. One inelegant solution would be to\nmanually set the `$argv` array\
    \ before\ncalling the controller’s `run()` method . I\ndon’t much like this, though.\
    \ Playing directly with magic arrays feels\nplain wrong, and the string manipulation\
    \ involved at each end would\ncompound the sin. Looking at the `Controller` class\
    \ more\nclosely, however, reveals a design decision that can help us:\n\n```\n\
    // listing 18.15\n// Controller\npublic function handleRequest()\n{\n$request\
    \ = ApplicationRegistry::getRequest();\n$app_c = ApplicationRegistry::appController();\n\
    while ($cmd = $app_c->getCommand($request)) {\n$cmd->execute($request);\n}\n$this->invokeView($app_c->getView($request));\n\
    }\n```\n\nThis method is designed to be invoked by the static `run()` method .\
    \ Note\nhow the `Request`\nobject is not directly instantiated. Instead, I acquire\
    \ it from the\n`ApplicationRegistry`.\nWhen the Registry holds a single instance\
    \ of an object like `Request`, I can\nacquire a reference to it and load it with\
    \ data from within my test\nbefore I start the system running by invoking the\
    \ controller. In this\nway, I can simulate a web request. Because my system uses\
    \ a `Request` object as its\nonly interface to a web request, it is decoupled\
    \ from the data source.\nAs long as `Request` is sane, the\nsystem will not care\
    \ whether its data originates ultimately from a test\nor from a web server. As\
    \ a general principle I prefer to push\ninstantiations back to a registry, where\
    \ possible. That way, I can later\nextend my implementation of the static factory\
    \ method, `ApplicationRegistry::instance()`\nin this case. This approach returns\
    \ a mock registry populated with fake\ncomponents if a flag is set, thereby creating\
    \ an entirely mocked\nenvironment. I love to fool my systems.\n\nHere, however,\
    \ I will demonstrate the first, more conservative trick by\npreloading my `Request`\
    \ object with\ntest data.\n\nSimple Web Testing\n\nHere’s a test case that performs\
    \ a very basic test on the WOO system :\n\n```\n// listing 18.16\nnamespace popp\\\
    ch18\\batch04;\nuse popp\\ch18\\batch04\\woo\\controller\\Controller;\nuse popp\\\
    ch18\\batch04\\woo\\controller\\Request;\nuse popp\\ch18\\batch04\\woo\\base\\\
    ApplicationRegistry;\nuse popp\\ch18\\batch04\\woo\\controller\\ApplicationHelper;\n\
    class AddVenueTest extends \\PHPUnit_Framework_TestCase\n{\npublic function testAddVenueVanilla()\n\
    {\n$output = $this->runCommand(\"AddVenue\", [\"venue_name\"=>\"bob\"]);\n}\n\
    public function runCommand($command = null, array $args = null)\n{\n$applicationHelper\
    \ = ApplicationHelper::instance();\n$applicationHelper->init();\n$request = ApplicationRegistry::getRequest();\n\
    if (! is_null($args)) {\nforeach ($args as $key => $val) {\n$request->setProperty($key,\
    \ $val);\n}\n}\nif (! is_null($command)) {\n$request->setProperty('cmd', $command);\n\
    }\nwoo\\controller\\Controller::run();\n}\n}\n```\n\nIn fact, it does not so much\
    \ test anything as prove that the system can\nbe invoked. The real work is done\
    \ in the `runCommand()` method .\nThere is nothing terribly clever here. I get\
    \ a `Request` object from\nthe `RequestRegistry`, and\nI populate it with the\
    \ keys and values provided in the method call.\nBecause the `Controller` will\
    \ go to\nthe same source for its `Request` object, I\nknow that it will work with\
    \ the values that I have set.\n\nRunning this test confirms that all is well.\
    \ I see the output I expect.\nThe problem is that this output is printed by the\
    \ view, so it’s hard to\ntest. I can fix that quite easily by buffering the output:\n\
    \n```\n// listing 18.17\nnamespace popp\\ch18\\batch04;\nuse popp\\ch18\\batch04\\\
    woo\\controller\\Controller;\nuse popp\\ch18\\batch04\\woo\\controller\\Request;\n\
    use popp\\ch18\\batch04\\woo\\base\\ApplicationRegistry;\nuse popp\\ch18\\batch04\\\
    woo\\controller\\ApplicationHelper;\nclass AddVenueTest2 extends \\PHPUnit_Framework_TestCase\n\
    {\npublic function testAddVenueVanilla()\n{\n$output = $this->runCommand(\"AddVenue\"\
    , [\"venue_name\"=>\"bob\"]);\nself::AssertRegexp(\"/added/\", $output);\n}\n\
    public function runCommand($command = null, array $args = null)\n{\n$applicationHelper\
    \ = ApplicationHelper::instance();\n$applicationHelper->init();\nob_start();\n\
    $request = ApplicationRegistry::getRequest();\nif (! is_null($args)) {\nforeach\
    \ ($args as $key => $val) {\n$request->setProperty($key, $val);\n}\n}\nif (! is_null($command))\
    \ {\n$request->setProperty('cmd', $command);\n}\nwoo\\controller\\Controller::run();\n\
    $ret = ob_get_contents();\nob_end_clean();\nreturn $ret;\n}\n}\n```\n\nBy catching\
    \ the system’s output in a buffer, I’m able to return it from\nthe `runCommand()`\
    \ method .\nNext, I apply a simple assertion to the return value to examine.\n\
    \nHere is the view from the command line:\n\n```\n$ phpunit src/ch18/batch04/AddVenueTest2.php\n\
    PHPUnit 5.0.10 by Sebastian Bergmann and contributors.\n.                    \
    \                                               1 / 1 (100%)\nTime: 194 ms, Memory:\
    \ 4.00MB\nOK (1 test, 1 assertion)\n```\n\nIf you are going to be running lots\
    \ of tests on a system in this way, it\nwould make sense to create a Web UI superclass\
    \ to hold `runCommand()`.\n\nI am glossing over some details here that you will\
    \ face in your own\ntests. You will need to ensure that the system works with\
    \ configurable\nstorage locations. You don’t want your tests going to the same\
    \ datastore\nthat you use for your development environment. This is another\n\
    opportunity for design improvement. Look for hard-coded filepaths and\nDSN values,\
    \ and push them back to the Registry. Next, ensure your tests\nwork within a sandbox,\
    \ but set these values in your test case’s `setUp()` method .\nFinally, look into\
    \ swapping in a `MockRequestRegistry`,\nwhich you can charge up with stubs, mocks,\
    \ and various other sneaky\nfakes.\n\nApproaches like this are great for testing\
    \ the inputs and output of a\nweb application. There are some distinct limitations,\
    \ however. This\nmethod won’t capture the browser experience. Where a web application\n\
    uses JavaScript, Ajax, and other client-side cleverness, testing the\ntext generated\
    \ by your system won’t tell you whether the user is seeing\na sane interface.\n\
    \nLuckily, there is a solution.\n\nIntroducing Selenium\n\nSelenium ( [`http://seleniumhq.org/`](http://seleniumhq.org/)\
    \ ) consists of a set of commands for defining web\ntests. It also provides tools\
    \ and APIs for authoring and running browser\ntests.\n\nIn this brief introduction,\
    \ I’ll create a quick test for the WOO system\nthat I created in Chapter [12](#A314621_5_En_12_Chapter.html).\
    \ The test will work in\nconjunction with Selenium Server via an API called php-webdriver.\n\
    \nGetting Selenium\n\nYou can download Selenium components at [`http://seleniumhq.org/download/`](http://seleniumhq.org/download/)\
    \ . For the purposes of this example, you will need the\nSelenium Standalone Server.\n\
    \nOnce you’ve downloaded the package, you should find a file named `selenium-server-standalone-2.53.0.jar`\n\
    (although, of course, your version number will probably be different).\nCopy this\
    \ file somewhere central. To proceed further, you’ll need Java\ninstalled on your\
    \ system. Once you’ve confirmed this, you can start the\nSelenium Server.\n\n\
    Here, I copy the server to the `/usr/local/lib`\ndirectory. Then I start the server:\n\
    \n```\n$ sudo cp selenium-server-standalone-2.53.0.jar /usr/local/lib/\n$ java\
    \ -jar /usr/local/lib/selenium-server-standalone-2.53.0.jar\n20:20:06.501 INFO\
    \ - Launching a standalone Selenium Server\n20:20:06.673 INFO - Java: Oracle Corporation\
    \ 25.65-b01\n20:20:06.673 INFO - OS: Linux 4.0.4-303.fc22.x86_64 amd64\n20:20:06.746\
    \ INFO - v2.53.0, with Core v2.53.0\\. Built from revision 35ae25b\n20:20:06.922\
    \ INFO - Driver provider org.openqa.selenium.ie.InternetExplorerDriver registration\
    \ is skipped:\nregistration capabilities Capabilities [{ensureCleanSession=true,\
    \ browserName=internet explorer, version=, platform=WINDOWS}] does not match the\
    \ current platform LINUX\n20:20:06.923 INFO - Driver provider org.openqa.selenium.edge.EdgeDriver\
    \ registration is skipped:\nregistration capabilities Capabilities [{browserName=MicrosoftEdge,\
    \ version=, platform=WINDOWS}] does not match the current platform LINUX\n20:20:06.923\
    \ INFO - Driver class not found: com.opera.core.systems.OperaDriver\n20:20:06.923\
    \ INFO - Driver provider com.opera.core.systems.OperaDriver is not registered\n\
    20:20:06.925 INFO - Driver provider org.openqa.selenium.safari.SafariDriver registration\
    \ is skipped:\nregistration capabilities Capabilities [{browserName=safari, version=,\
    \ platform=MAC}] does not match the current platform LINUX\n20:20:06.926 INFO\
    \ - Driver class not found: org.openqa.selenium.htmlunit.HtmlUnitDriver\n20:20:06.927\
    \ INFO - Driver provider org.openqa.selenium.htmlunit.HtmlUnitDriver is not registered\n\
    20:20:07.254 INFO - RemoteWebDriver instances should connect to: http://127.0.0.1:4444/wd/hub\n\
    20:20:07.254 INFO - Selenium Server is up and running\n```\n\nNote that the startup\
    \ output tells us the URL we should use in order to\ncommunicate with the server.\
    \ This will come in handy later.\n\nNow I’m ready to proceed.\n\nPHPUnit and Selenium\n\
    \nAlthough PHPUnit has provided APIs for working with Selenium in the\npast, its\
    \ support has been patchy and its documentation has been even\nmore so. In order\
    \ to access as many of Selenium’s features as possible,\ntherefore, it makes sense\
    \ to use PHPUnit in conjunction with a tool that\nis designed to provide the bindings\
    \ that we need.\n\nIntroducing php-webdriver\n\nWebDriver is the mechanism by\
    \ which Selenium controls browsers, and it\nwas introduced with Selenium 2\\.\
    \ Selenium developers provide Java,\nPython, and C# APIs for WebDriver. There\
    \ are a few PHP APIs available. I\nhave chosen to use php-webdriver, which was\
    \ created by Facebook\ndevelopers. It is under active development and mirrors\
    \ the official\nAPIs. This is very handy when you want to look up a technique,\
    \ since\nmany examples you’ll find online will be offered in Java, which means\n\
    they will apply readily to php-webdriver with a little porting of code.\n\nYou\
    \ can add php-webdriver it to your project with Composer:\n\n```\n\"require-dev\"\
    : {\n\"phpunit/phpunit\": \"5.0.*\",\n\"facebook/webdriver\" : \"*\"\n},\n```\n\
    \nUpdate your `composer.json` file,\nrun `composer update`, and you should be\
    \ ready to go.\n\nCreating the Test Skeleton\n\nI will be working with an instance\
    \ of the WOO application, which will\nrun on my system at the URL, [`http://popp.vagrant.internal/webwoo/`](http://popp.vagrant.internal/webwoo/)\
    \ .\n\nI’ll start off with a boilerplate test class :\n\n```\n// listing 18.18\n\
    namespace popp\\ch18\\batch04;\nuse Facebook\\WebDriver\\Remote\\DesiredCapabilities;\n\
    use Facebook\\WebDriver\\Remote\\RemoteWebDriver;\nuse Facebook\\WebDriver\\Remote\\\
    WebDriverCapabilityType;\nuse Facebook\\WebDriver\\WebDriverBy;\nclass SeleniumTest\
    \ extends \\PHPUnit_Framework_TestCase\n{\nprotected function setUp()\n{\n}\n\
    public function testAddVenue()\n{\n}\n}\n```\n\nI specify some of the php-webdriver\
    \ classes I will be using, and then\ncreate a bare bones test class. Now it’s\
    \ time to make this test do\nsomething.\n\nConnecting to Selenium\n\nRemember\
    \ that, on start up, the server outputs its connection URL. In\norder to make\
    \ the connection to Selenium, I need to pass this URL and a\ncapabilities array\
    \ to a class named `RemoteWebDriver` :\n\n```\n// listing 18.19\nnamespace popp\\\
    ch18\\batch04;\nuse Facebook\\WebDriver\\Remote\\DesiredCapabilities;\nuse Facebook\\\
    WebDriver\\Remote\\RemoteWebDriver;\nuse Facebook\\WebDriver\\Remote\\WebDriverCapabilityType;\n\
    use Facebook\\WebDriver\\WebDriverBy;\nclass SeleniumTest extends PHPUnit_Framework_TestCase\n\
    {\nprivate $driver;\nprotected function setUp()\n{\n$host = \"http://127.0.0.1:4444/wd/hub\"\
    ;\n$capabilities = [WebDriverCapabilityType::BROWSER_NAME => 'firefox'];\n$this->driver\
    \ = RemoteWebDriver::create($host, $capabilities);\n}\npublic function testAddVenue()\n\
    {\n}\n}\n```\n\nIf you installed php-webdriver with Composer, you can see a full\
    \ list of\ncapabilities in the class file at `vendor/facebook/webdriver/lib/Remote/WebDriverCapabilityType.php`.\n\
    For my present purposes, however, I really only need to specify the\nbrowser name.\
    \ I pass the host string and the `$capabilities` array\nto the static `RemoteWebDriver::create()`\n\
    method, and store the resulting object reference in the `$driver` property.\n\
    When I run this test, I should see that Selenium launches a fresh\nbrowser window\
    \ in preparation for my tests.\n\nNote\n\nThese code examples were tested with\
    \ Selenium 2.53 and Firefox 43.0, and\nthen tested again with Selenium 2.53 and\
    \ Firefox 45.0\\. There have been\nreports that some later versions of Firefox\
    \ have manifested\ncompatibility issues with Selenium. Hopefully, by the time\
    \ you read\nthis, these issues will have been resolved!\n\nWriting the Test\n\n\
    I would like to test a simple workflow. I will navigate to the `AddVenue` page,\
    \ add a\nvenue, and then add a space. This involves interacting with three web\n\
    pages .\n\nHere is my test:\n\n```\n// listing 18.20\nnamespace popp\\ch18\\batch04;\n\
    use Facebook\\WebDriver\\Remote\\DesiredCapabilities;\nuse Facebook\\WebDriver\\\
    Remote\\RemoteWebDriver;\nuse Facebook\\WebDriver\\Remote\\WebDriverCapabilityType;\n\
    use Facebook\\WebDriver\\WebDriverBy;\nclass seleniumtest3 extends \\PHPUnit_Framework_TestCase\
    \ {\nprotected function setUp() {\n$host = \"http://127.0.0.1:4444/wd/hub\";\n\
    $capabilities = array(WebDriverCapabilityType::BROWSER_NAME => 'firefox');\n$this->driver\
    \ = RemoteWebDriver::create($host, $capabilities);\n}\npublic function testAddVenue()\
    \ {\n$this->driver->get(\"http://popp.vagrant.internal/webwoo/AddVenue.php\");\n\
    $venel = $this->driver->findElement(WebDriverBy::name(\"venue_name\"));\n$venel->sendKeys(\"\
    my_test_venue\");\n$venel->submit();\n$tdel = $this->driver->findElement( WebDriverBy::xpath(\"\
    //td[1]\") );\n$this->assertRegexp(\"/'my_test_venue' added/\", $tdel->getText());\n\
    $spacel = $this->driver->findElement(WebDriverBy::name(\"space_name\"));\n$spacel->sendKeys(\"\
    my_test_space\");\n$spacel->submit();\n$el = $this->driver->findElement(WebDriverBy::xpath(\"\
    //td[1]\"));\n$this->assertRegexp(\"/'my_test_space' added/\", $el->getText());\n\
    }\n}\n```\n\nHere’s what happens when I run this test on the command line:\n\n\
    ```\n$ phpunit src/ch18/batch04/seleniumtest3.php\nPHPUnit 5.0.10 by Sebastian\
    \ Bergmann and contributors.\n.                                              \
    \                     1 / 1 (100%)\nTime: 3.11 seconds, Memory: 3.00MB\nOK (1\
    \ test, 2 assertions)\n```\n\nOf course, it’s not all that happens. Selenium also\
    \ launches a browser\nwindow and performs my specified operations upon it. I have\
    \ to admit, I\nfind this effect a little eerie!\n\nLet’s run through the code.\
    \ First, I invoke `WebDriver::get(),`\nwhich acquires my starting page. Note that\
    \ this method expects a full\nURL (which does not need to be local to the Selenium\
    \ Server host). In\nthis case, I configured an Apache server on a Vagrant virtual\
    \ machine to\nserve up a mocked up `AddVenue.php` script.\nSelenium will load\
    \ the specified document into the browser it has\nlaunched. You can see this page\
    \ in Figure [18-1](#A314621_5_En_18_Chapter.html#Fig1).\n\n![A314621_5_En_18_Fig1_HTML.jpg](A314621_5_En_18_Fig1_HTML.jpg)\n\
    \nFigure 18-1.\n\nThe AddVenue page loaded by Selenium\n\nOnce the page has loaded,\
    \ I have access to it via the WebDriver API. I\ncan acquire a reference to a page\
    \ element using the `RemoteWebDriver::findElement()`\nmethod. This requires an\
    \ object of type `WebDriverBy`. The\n`WebDriverBy`\nclass provides a set of factory\
    \ methods, each of which returns a `WebDriverBy` object\nconfigured to specify\
    \ a particular means of locating an element. My form\nelement has a `name` attribute\
    \ set to\n`\"venue_name\"`,\nso I use the `WebDriverBy::name()`\nmethod to tell\
    \ `findElement()` to look\nfor an element this way. Table [18-4](#A314621_5_En_18_Chapter.html#Tab4)\
    \ lists all of\nthe available factory methods.\n\nTable 18-4.\n\nWebDriverBy factory\
    \ methods\n\n  Method\n |\n  Description\n |\n\n| --- | --- | --- | --- | ---\
    \ |\n\n  `className()`\n |\n  Find elements by CSS class name\n |\n\n  `cssSelector()`\n\
    \ |\n  Find elements by CSS selector\n |\n\n  `id()`\n |\n  Find an element by\
    \ its id\n |\n\n  `name()`\n |\n  Find elements by name attribute\n |\n\n  `linkText()`\n\
    \ |\n  Find elements by their link text\n |\n\n  `partialLinkText()`\n |\n  Find\
    \ elements by a fragment of link text\n |\n\n  `tagName()`\n |\n  Find elements\
    \ by their tag\n |\n\n  `xpath()`\n |\n  Find elements that match an Xpath expression\n\
    \ |\n\nOnce I have a reference to the `venue_name` form\nelement, an object of\
    \ type `RemoteWebElement`, I\ncan use its `sendKeys()` method to\nset a value.\
    \ It’s important to note that `sendKeys()` does more\nthan just set a value. It\
    \ also simulates the act of typing into an\nelement. This is useful for testing\
    \ systems that use JavaScript to\ncapture keyboard events.\n\nWith my new value\
    \ set, I submit the form. The API is smart about this.\nWhen I call `submit()`\
    \ on an\nelement, Selenium locates the containing form and submits it.\n\nSubmitting\
    \ the form, of course, causes a new page to be loaded. So, next\nI check that\
    \ all is as I expect. Once again, I use `WebDriver::findElement()`,\nalthough\
    \ this time I pass it a `WebDriverBy` object\nconfigured for Xpath. If my search\
    \ is successful, `findElement()` will\nreturn a new `RemoteWebElement`\nobject.\
    \ If my search fails, on the other hand, the resulting exception\nwill bring down\
    \ my test. Assuming that all is well, I acquire the\nelement’s value using the\
    \ `RemoteWebElement::getText()`\nmethod.\n\nAt this stage, I have submitted the\
    \ form and checked the state of the\nreturned web page. You can see the page in\
    \ Figure [18-2](#A314621_5_En_18_Chapter.html#Fig2).\n\n![A314621_5_En_18_Fig2_HTML.jpg](A314621_5_En_18_Fig2_HTML.jpg)\n\
    \nFigure 18-2.\n\nThe AddSpace page\n\nNow all that remains is to populate the\
    \ form once again, submit, and\ncheck the new page. I use techniques that you\
    \ have already encountered\nto achieve this.\n\nOf course, I’ve only just scratched\
    \ the surface of Selenium here. But I\nhope this discussion has been enough to\
    \ give you an idea of the\npossibilities. If you want to learn more, there is\
    \ a complete Selenium\nmanual at [`http://seleniumhq.org/docs/index.html`](http://seleniumhq.org/docs/index.html)\
    \ .\n\nA Note of Caution\n\nIt’s easy to get carried away with the benefits that\
    \ automated tests can\noffer. I add unit tests to my projects, and I use PHPUnit\
    \ for functional\ntests, as well. That is, I test at the level of the system,\
    \ as well as\nthat of the class. I have seen real and observable benefits, but\
    \ I\nbelieve that these come at a price.\n\nTests add a number of costs to your\
    \ development. As you build safety\ninto the project, for example, you are also\
    \ adding a time penalty into\nthe build process that can impact releases. The\
    \ time it takes to write\ntests is part of this, but so is the time it takes to\
    \ run them. On one\nsystem, we may have suites of functional tests that run against\
    \ more\nthan one database and more than one version control system. Add a few\n\
    more contextual variables like that, and we face a real barrier to\nrunning the\
    \ test suite. Of course, tests that aren’t run aren’t useful.\nOne answer to this\
    \ is to fully automate your tests, so runs are kicked\noff by a scheduling application\
    \ like `cron`. Another is to\nmaintain a subset of your tests that can be easily\
    \ run by developers as\nthey commit code. These should sit alongside your longer,\
    \ slower test\nrun.\n\nAnother issue to consider is the brittle nature of many\
    \ test harnesses.\nYour tests may give you confidence to make changes, but as\
    \ your test\ncoverage increases along with the complexity of your system, it becomes\n\
    easier to break multiple tests. Of course, this is often what you want.\nYou want\
    \ to know when expected behavior does not occur or when\nunexpected behavior does.\n\
    \nOftentimes, however, a test harness can break because of a relatively\ntrivial\
    \ change, such as the wording of a feedback string. Every broken\ntest is an urgent\
    \ matter, but it can be frustrating to have to change 30\ntest cases to address\
    \ a minor alteration in architecture or output. Unit\ntests are less prone to\
    \ problems of this sort because, by and large,\nthey focus on each component in\
    \ isolation.\n\nThe cost involved in keeping tests in step with an evolving system\
    \ is a\ntradeoff that you simply have to factor in. On the whole, I believe the\n\
    benefits justify the costs.\n\nYou can also do some things to reduce the fragility\
    \ of a test harness.\nIt’s a good idea to write tests with the expectation of\
    \ change built in,\nto some extent. I tend to use regular expressions to test\
    \ output rather\nthan direct equality tests, for example. Testing for a few key\
    \ words is\nless likely to make my test fail when I remove a newline character\
    \ from\nan output string. Of course, making your tests too forgiving is also a\n\
    danger, so it is a matter of using your judgment.\n\nAnother issue is the extent\
    \ to which you should use mocks and stubs to\nfake the system beyond the component\
    \ you wish to test. Some insist that\nyou should isolate your component as much\
    \ as possible and mock\neverything around it. This works for me in some projects.\
    \ In others,\nhowever, I have found that maintaining a system of mocks can become\
    \ a\ntime sink. Not only do you have the cost of keeping your tests in line\n\
    with your system, but you must keep your mocks up-to-date. Imagine\nchanging the\
    \ return type of a method. If you fail to update the method\nof the corresponding\
    \ stub object to return the new type, client tests\nmay pass in error. With a\
    \ complex fake system, there is a real danger of\nbugs creeping into mocks. Debugging\
    \ tests is frustrating work,\nespecially when the system itself is not at fault.\n\
    \nI tend to play this by ear. I use mocks and stubs by default, but I’m\nunapologetic\
    \ about moving to real components if the costs begin to mount\nup. You may lose\
    \ some focus on the test subject, but this comes with the\nbonus that errors originating\
    \ in the component’s context are at least\nreal problems with the system. You\
    \ can, of course, use a combination of\nreal and fake elements. I routinely use\
    \ an in-memory database in test\nmode, for example.\n\nAs you may have gathered,\
    \ I am not an ideologue when it comes to\ntesting. I routinely “cheat” by combining\
    \ real and mocked components;\nand because priming data is repetitive, I often\
    \ centralize test fixtures\ninto what Martin Fowler calls Object Mothers. These\
    \ classes are simple\nfactories that generate primed objects for the purpose of\
    \ testing.\nShared fixtures of this sort are anathema to some.\n\nHaving pointed\
    \ out some of the problems that testing may force you to\nconfront, it is worth\
    \ reiterating a few points that, for my money, trump\nall objections. Testing\
    \ accomplishes several things:\n\n*   It helps you prevent bugs (to the extent\
    \ that you find them during\n    development and refactoring)\n\n*   It helps\
    \ you discover bugs (as you extend test coverage)\n\n*   It encourages you to\
    \ focus on the design of your system\n\n*   It lets you improve code design with\
    \ less fear that changes will cause\n    more problems than they solve\n\n*  \
    \ It gives you confidence when you ship code\n\nIn every project for which I’ve\
    \ written tests, I’ve had occasion to be\ngrateful for that fact sooner or later.\n\
    \nSummary\n\nIn this chapter, I revisited the kinds of tests we all write as\n\
    developers, but all too often thoughtlessly discard. From there, I\nintroduced\
    \ PHPUnit, which lets you write the same kind of throwaway\ntests during development,\
    \ but then keep them and feel the lasting\nbenefit! I created a test-case implementation,\
    \ and I covered the\navailable assertion methods. I also examined constraints\
    \ and explored\nthe devious world of mock objects. Next, I showed how refactoring\
    \ for\ntesting can improve design, demonstrating some techniques for testing\n\
    web applications—first by using just PHPUnit, and then by using\nSelenium. Finally,\
    \ I risked the ire of some by warning of the costs that\ntests incur and discussing\
    \ the trade-offs involved.\n\n19. Automated Build with Phing\n\nIf version control\
    \ is one side of the coin, then automated build is the\nother. Version control\
    \ allows multiple developers to work\ncollaboratively on a single project. With\
    \ many coders each deploying a\nproject in her own space, automated build soon\
    \ becomes essential. One\ndeveloper may have her web-facing directory in `/usr/local/apache/htdocs`;\n\
    another might use `/home/bibble/public_html`.\nDevelopers may use different database\
    \ passwords, library directories, or\nmail mechanisms. A flexible codebase might\
    \ easily accommodate all of\nthese differences, but the effort of changing settings\
    \ and manually\ncopying directories around your file system to get things working\
    \ would\nsoon become tiresome—especially if you need to install code in progress\n\
    several times a day (or several times an hour).\n\nYou have already seen that\
    \ Composer automates package installation.\nYou’ll almost certainly want to deliver\
    \ a project to an end user via a\nComposer or PEAR package because that mechanism\
    \ is straightforward for\nthe user and because package-management systems handle\
    \ dependencies. But\nthere’s a lot of work that might need automating before a\
    \ package has\nbeen created. You may need to generate template-generated code,\
    \ for\nexample. You should run tests and provide mechanisms for creating and\n\
    updating database tables. Finally, you may want to automate the creation\nof a\
    \ production-ready package. In this chapter, I introduce you to\nPhing, which\
    \ handles just such jobs. This chapter will cover the\nfollowing:\n\n*   Getting\
    \ and installing Phing: Who builds the builder?\n\n*   Properties: Setting and\
    \ getting data\n\n*   Types: Describing complex parts of a project\n\n*   Targets:\
    \ Breaking a build into callable, interdependent sets of\n    functionality\n\n\
    *   Tasks: The things that get stuff done\n\nWhat Is Phing?\n\nPhing is a PHP\
    \ tool for building projects. It is very closely modeled on\nthe hugely popular\
    \ (and very powerful) Java tool called Ant . Ant was so\nnamed because it is small\
    \ but capable of constructing things that are\nvery large indeed. Both Phing and\
    \ Ant use an XML file (usually named\n`build.xml`) to\ndetermine what to do in\
    \ order to install or otherwise work with a\nproject.\n\nThe PHP world really\
    \ needs a\ngood build solution. Serious developers have had a number of options\
    \ in\nthe past. First, it is possible to use make, the ubiquitous Unix build\n\
    tool that is still used for most C and Perl projects. However, make is\nextremely\
    \ picky about syntax and requires quite a lot of shell\nknowledge, up to and including\
    \ scripting—this can be challenging for\nsome PHP programmers who have not come\
    \ to programming via the Unix or\nLinux command line. What’s more, make provides\
    \ very few built-in tools\nfor common build operations such as transforming file\
    \ names and\ncontents. It is really just a glue for shell commands. This makes\
    \ it\nhard to write programs that will install across platforms. Not all\nenvironments\
    \ will have the same version of make, or even have it at all.\nEven if you have\
    \ make, you may not have all the commands the makefile\n(the configuration file\
    \ that drives make) requires.\n\nPhing’s relationship with make is illustrated\
    \ in its name: Phing stands\nfor PHing Is Not Gnu make. This playful recursion\
    \ is a common coder’s\njoke (for example, GNU itself stands for Gnu is Not Unix).\n\
    \nPhing is a native PHP application that interprets a user-created XML\nfile in\
    \ order to perform operations on a project. Such operations would\ntypically involve\
    \ the copying of files from a distribution directory to\nvarious destination directories,\
    \ but there is much more to Phing. Phing\ncan be used to generate documentation,\
    \ run tests, invoke commands, run\narbitrary PHP code, create packages , replace\
    \ keywords in files, strip\ncomments, and generate tar/gzipped package releases.\
    \ Even if Phing does\nnot yet do what you need, it is designed to be easily extensible.\n\
    \nBecause Phing is itself a PHP application , all you need to run it is a\nrecent\
    \ PHP engine. As Phing is an application for installing PHP\napplications, the\
    \ presence of a PHP executable is a reasonably safe bet.\n\nGetting and Installing\
    \ Phing\n\nIf it is difficult to install an install tool , then something is surely\n\
    wrong! However, assuming that you have PHP 5 or better on your system\n(and if\
    \ you haven’t, this isn’t the book for you!), installation of\nPhing could not\
    \ be easier.\n\nYou can acquire and install Phing with two simple commands:\n\n\
    ```\n$ pear channel-discover pear.phing.info\n$ pear install phing/phing\n```\n\
    \nThis will install Phing as a PEAR package. You should have write\npermission\
    \ for your PEAR directories, which, on most Unix or Linux\nsystems, will mean\
    \ running the command as the root user.\n\nNote\n\nAt the time of this writing,\
    \ Phing installed with Pear is broken due to\na namespacing issue. This problem\
    \ will likely be resolved by the time\nyou read this. If not, however, we have\
    \ had good results using Composer.\n\nYou can also install Phing with Composer.\
    \ You should add this to your\n`composer.json`\nfile:\n\n```\n{\n\"require-dev\"\
    : {\n\"phing/phing\": \"2.*\"\n}\n}\n```\n\nIf you run into any installation problems,\
    \ you should visit the download\npage at [`http://phing.info/trac/wiki/Users/Download`](http://phing.info/trac/wiki/Users/Download)\
    \ . You will find plenty of installation instructions\nthere.\n\nComposing the\
    \ Build Document\n\nYou should now be ready to get cracking with Phing! Let’s\
    \ test things\nout:\n\n```\n$ phing -v\nPhing 2.14.0\n```\n\nThe `-v` flag to\n\
    the `phing`\ncommand causes the script to return version information. By the time\
    \ you\nread this, the version number may have changed, but you should see a\n\
    similar message when you run the command on your system.\n\nNote\n\nIf you installed\
    \ Phing using Composer, the runnable script file will be\ninstalled in your local\
    \ `vendor/bin/`\ndirectory. To run Phing you should either add this directory\
    \ to your\n`$PATH`\nenvironment variable or use an explicit path to the executable.\n\
    \nNow I’ll run the `phing` command without\narguments:\n\n```\n$ phing\nBuildfile:\
    \ build.xml does not exist!\n```\n\nAs you can see, Phing is lost without instructions.\
    \ By default, it will\nlook for a file called `build.xml` . Let’s\nbuild a minimal\
    \ document so that we can at least make that error message\ngo away:\n\nThis is\
    \ the bare minimum you can get away with in a build file. If we\nsave the previous\
    \ example as `build.xml` and run\n`phing` again, we\nshould get some more interesting\
    \ output:\n\n```\n$ phing\nBuildfile: /home/bob/working/megaquiz/build.xml\nWarning:\
    \ target 'main' has no tasks or dependencies\nmegaquiz > main:\nBUILD FINISHED\n\
    Total time: 1.3404 second\n```\n\nA lot of effort to achieve precisely nothing,\
    \ you may think, but we have\nto start somewhere! As you can see, Phing also helpfully\
    \ points out\nthere’s nothing very useful about this build file. Look again at\
    \ that\nbuild file. Because we are dealing with XML, I include an XML\ndeclaration.\
    \ As you probably know, XML comments look like this:\n\n```\n\nSo, because it’s\
    \ a comment, the second line in my build file is ignored.\nYou can put as many\
    \ comments as you like in your build files, and as\nthey grow, you should make\
    \ full use of this fact. Large build files can\nbe hard to follow without suitable\
    \ comments.\n\nThe real start of any build file is the `project` element. The\n\
    `project` element\ncan include up to five attributes. Of these, `name` and `default`\
    \ are\ncompulsory. The `name` attribute\nestablishes the project’s name; `default`\
    \ defines a\ntarget to run if none are specified on the command line. An optional\n\
    `description`\nattribute can provide summary information. You can specify the\
    \ context\ndirectory for the build using a `basedir` attribute. If\nthis is omitted,\
    \ the current working directory will be assumed. Finally,\nyou can specify the\
    \ minimum version of the Phing application with which\nthe build file should work\
    \ using `phingVersion`. You can\nsee these attributes summarized in Table [19-1](#A314621_5_En_19_Chapter.html#Tab1).\n\
    \nTable 19-1.\n\nThe Attributes of the Project Element\n\n  Attribute\n |\n  Required\n\
    \ |\n  Description\n |\n  Default Value\n |\n\n| --- | --- | --- | --- | --- |\
    \ --- | --- | --- | --- |\n\n  `name`\n |\n  Yes\n |\n  The name of the project\n\
    \ |\n  None\n |\n\n  `description`\n |\n  No\n |\n  A brief project summary\n\
    \ |\n  None\n |\n\n  `default`\n |\n  Yes\n |\n  The default target to run\n |\n\
    \  None\n |\n\n  `phingVersion`\n |\n  No\n |\n  The minimum version of Phing\
    \ to run against\n |\n  None\n |\n\n  `basedir`\n |\n  No\n |\n  The file system\
    \ context in which build will run\n |\n  Current directory `(.)`\n |\n\nOnce I\
    \ have defined a `project` element , I\nmust create at least one target—the one\
    \ I reference in the `default` attribute.\n\nTargets\n\nTargets are similar, in\
    \ some senses, to functions. A target is a set of\nactions grouped together to\
    \ achieve an objective: to copy a directory\nfrom one place another, for example,\
    \ or to generate documentation.\n\nIn my previous example, I included a bare-minimum\
    \ implementation for a\ntarget:\n\n```\n\nAs you can see, a target must define\
    \ at least a `name` attribute . I\nhave made use of this in the `project` element.\n\
    Because the default element points to the `main` target , this\ntarget will be\
    \ invoked whenever Phing is run without command-line\narguments. This was confirmed\
    \ by the output:\n\n```\nmegaquiz > main:\n```\n\nTargets can be organized to\
    \ depend on one another. By setting up a\ndependency between one target and another,\
    \ you tell Phing that the first\ntarget should not run before the target it depends\
    \ on has been run. Now,\nI’ll add a dependency to my build file:\n\nAs you can\
    \ see, I have introduced a new attribute for the target\nelement. `depends` tells\
    \ Phing\nthat the referenced target should be executed before the current one,\
    \ so\nI might want a target that copies certain files to a directory to be\ninvoked\
    \ before one that runs a transformation on all files in that\ndirectory. I added\
    \ two new targets in the example: `runsecond` , on which\n`main` depends;\nand\
    \ `runfirst` ,\non which `runsecond` depends.\nHere’s what happens when I run\
    \ Phing with this build file:\n\n```\n$ phing\nBuildfile: /home/bob/working/megaquiz/build.xml\n\
    Warning: target 'runfirst' has no tasks or dependencies\nmegaquiz > runfirst:\n\
    megaquiz > runsecond:\nmegaquiz > main:\nBUILD FINISHED\nTotal time: 0.3029 seconds\n\
    ```\n\nAs you can see, the dependencies are honored. Phing encounters the `main`\
    \ target, sees its\ndependency, and moves back to `runsecond. runsecond`\nhas\
    \ its own dependency, and Phing invokes `runfirst`. Having\nsatisfied its dependency,\
    \ Phing can invoke `runsecond`. Finally,\n`main` is\ninvoked. The `depends` attribute\
    \ can\nreference more than one target at a time. A comma-separated list of\ndependencies\
    \ can be provided, and each will be honored in turn.\n\nNow that I have more than\
    \ one target to play with, I can override the\nproject element’s `default` attribute\n\
    from the command line:\n\n$ phing runsecond\n\n```\nBuildfile: /home/bob/working/megaquiz/build.xml\n\
    Warning: target 'runfirst' has no tasks or dependencies\nmegaquiz > runfirst:\n\
    megaquiz > runsecond:\nBUILD FINISHED\nTotal time: 0.2671 seconds\n```\n\nBy passing\
    \ in a target name, I cause the default attribute to be\nignored. The `target`\
    \ matching my\nargument is invoked instead (as well as the `target` on which it\n\
    depends). This is useful for invoking specialized tasks, such as\ncleaning up\
    \ a build directory or running post-install scripts.\n\nThe `target`\nelement\
    \ also supports an optional `description` attribute\n, to which you can assign\
    \ a brief description of the target’s purpose:\n\nAdding a description to your\
    \ targets makes no difference to the normal\nbuild process. If the user runs Phing\
    \ with a `-projecthelp` flag,\nhowever, the descriptions will be used to summarize\
    \ the project:\n\n```\n$ phing -projecthelp\nBuildfile: /home/bob/working/megaquiz/build.xml\n\
    Warning: target 'runfirst' has no tasks or dependencies\nA quiz engine\nDefault\
    \ target:\n\nmain       The main target\nMain targets:\n\nmain       The main\
    \ target\nrunfirst   The first target\nrunsecond  The second target\n```\n\nNotice\
    \ that I added the `description` attribute\nto the `project`\nelement, too. If\
    \ you want to hide a target from a listing like this, you\ncan add a hidden attribute.\
    \ This is useful for targets that provide\nhousekeeping functionality, but which\
    \ should not be invoked directly\nfrom the command line:\n\nProperties\n\nPhing\
    \ allows you to set such values using the `property` element.\n\nProperties are\
    \ similar to global variables in a script. As such, they\nare often declared toward\
    \ the top of a project to make it easy for\ndevelopers to work out what’s what\
    \ in the build file. Here I create a\nbuild file that works with database information:\n\
    \n```\n\ndatabase: ${dbname}\npass:     ${dbpass}\nhost:     ${dbhost}\n\n```\n\
    \nI introduced a new element: `property. property`\nrequires `name`\nand `value`\n\
    attributes. Notice also that I have added this to the `main` target. `echo` is\
    \ an example of\na task. I will explore tasks more fully in the next section.\
    \ For now,\nthough, it’s enough to know that `echo` does exactly\nwhat you would\
    \ expect—it causes its contents to be output. Notice the\nsyntax used to reference\
    \ the value of a property here. By using a dollar\nsign, and wrapping the property\
    \ name in curly brackets, you tell Phing\nto replace the string with the property\
    \ value :\n\n```\n${propertyname}\n```\n\nAll this build file achieves is to declare\
    \ three properties and to print\nthem to standard output. Here it is in action:\n\
    \n```\n$ phing\nBuildfile: /home/bob/working/megaquiz/build.xml\nmegaquiz > main:\n\
    [echo] database: megaquiz\n[echo] pass:     default\n[echo] host:     localhost\n\
    BUILD FINISHED\nTotal time: 0.4402 seconds\n```\n\nNow that I have introduced\
    \ properties, I can wrap up my exploration of\ntargets. The `target` element\n\
    accepts two additional attributes : `if` and `unless`. Each of these\nshould be\
    \ set with the name of a property. When you use `if` with a property\nname, the\
    \ target will only be executed if the given property is set. If\nthe property\
    \ is not set, the target will exit silently. Here, I comment\nout the `dbpass`\n\
    property and make the `main` task require it\nusing the `if`\nattribute :\n\n\
    ```\n-->\n\ndatabase: ${dbname}\npass:     ${dbpass}\nhost:     ${dbhost}\n\n\
    ```\n\nLet’s run `phing`\nagain:\n\n```\n$ phing\nBuildfile: /home/bob/working/megaquiz/build.xml\n\
    megaquiz > main:\nBUILD FINISHED\nTotal time: 0.2628 seconds\n```\n\nAs you can\
    \ see, I have raised no error, but the `main` task did not\nrun. Why might I want\
    \ to do this? There is another way of setting\nproperties in a project. They can\
    \ be specified on the command line. You\ntell Phing that you are passing it a\
    \ property with the `-D` flag followed by a\nproperty assignment. So the argument\
    \ should look like this:\n\n```\n-Dname=value\n```\n\nIn my example, I want the\
    \ `dbname` property to be\nmade available via the command line:\n\n```\n$ phing\
    \ -Ddbpass=userset\nBuildfile: /home/bob/working/megaquiz/build.xml\nmegaquiz\
    \ > main:\n[echo] database: megaquiz\n[echo] pass:     userset\n[echo] host: \
    \    localhost\nBUILD FINISHED\nTotal time: 0.4611 seconds\n```\n\nThe `if`\n\
    attribute of the main target is satisfied that the `dbpass` property is\npresent,\
    \ and the target is allowed to execute.\n\nAs you might expect, the `unless` attribute\
    \ is\nthe opposite of `if`. If a property is\nset and it is referenced in a target’s\
    \ `unless` attribute,\nthen the target will not run. This is useful if you want\
    \ to make it\npossible to suppress a particular target from the command line.\
    \ So I\nmight add something like this to the main target:\n\n```\n\n`main` will\
    \ be\nexecuted unless a `suppressmain` property\nis present:\n\n```\n$ phing -Dsuppressmain=yes\n\
    ```\n\nI have wrapped up the `target` element; Table\n[19-2](#A314621_5_En_19_Chapter.html#Tab2)\
    \ shows a\nsummary of its attributes.\n\nTable 19-2.\n\nThe Attributes of the\
    \ Target Element\n\n  Attribute\n |\n  Required\n |\n  Description\n |\n\n| ---\
    \ | --- | --- | --- | --- | --- | --- |\n\n  `name`\n |\n  Yes\n |\n  The name\
    \ of the target\n |\n\n  `depends`\n |\n  No\n |\n  Targets on which the current\
    \ depends\n |\n\n  `if`\n |\n  No\n |\n  Execute target only if given property\
    \ is present\n |\n\n  `unless`\n |\n  No\n |\n  Execute target only if given property\
    \ is not present\n |\n\n  `logskipped`\n |\n  No\n |\n  If a target is skipped\
    \ (e.g., because of `if` / `unless`), add a\nnotification to output\n |\n\n  `hidden`\n\
    \ |\n  No\n |\n  Hide target from lists and summaries\n |\n\n  `description`\n\
    \ |\n  No\n |\n  A short summary of the target’s purpose\n |\n\nWhen a property\
    \ is set on the command line, it overrides any and all\nproperty declarations\
    \ within the build file. There is another condition\nin which a property value\
    \ can be overwritten. By default, if a property\nis declared twice, the original\
    \ value will have primacy. You can alter\nthis behavior by setting an attribute\
    \ called `override` in the\nsecond `property`\nelement. Here’s an example:\n\n\
    ```\n\npass:     ${dbpass}\n\n```\n\nI set a property called `dbpass`, giving\
    \ it the\ninitial value `\"default\"`. In the\nmain target I set the property\
    \ once again, adding an `override` attribute\nset to `\"yes\"`\nand providing\
    \ a new value. The new value is reflected in the output:\n\n```\n$ phing\nBuildfile:\
    \ /home/bob/working/megaquiz/build.xml\nmegaquiz > main:\n[echo] pass:     specific\n\
    BUILD FINISHED\n```\n\nIf I had not set the `override` element in\nthe second\
    \ property element, the original value of `\"default\"` would have\nstayed in\
    \ place. It is important to note that targets are not functions:\nthere is no\
    \ concept of local scope. If you override a property within a\ntask, it remains\
    \ overridden for all other tasks throughout the build\nfile. You could get around\
    \ this, of course, by storing a property value\nin a temporary property before\
    \ overriding, and then resetting it when\nyou have finished working locally.\n\
    \nSo far, I have dealt with properties that you define yourself. Phing\nalso provides\
    \ built-in properties. You reference these in exactly the\nsame way that you would\
    \ reference properties you have declared yourself.\nHere’s an example:\n\n```\n\
    \nname:     ${phing.project.name}\nbase:     ${project.basedir}\nhome:     ${user.home}\n\
    pass:     ${env.DBPASS}\n\n```\n\nI reference just a few of the built-in Phing\
    \ properties. `phing.project.name`\nresolves to the name of the project as defined\
    \ in the `name` attribute of the\n`project`\nelement; `project.basedir` gives\n\
    the starting directory; and `user.home` provides\nthe executing user’s home directory\
    \ (this is useful for providing\ndefault install locations).\n\nFinally, the `env`\
    \ prefix in a\nproperty reference indicates an operating system environment variable.\n\
    So by specifying `${env.DBPASS}` , I am\nlooking for an environment variable called\
    \ `DBPASS` . Here I run\nPhing on this file:\n\n```\n$ phing\nBuildfile: /home/bob/working/megaquiz/build.xml\n\
    megaquiz > main:\n[echo] name:     megaquiz\n[echo] base:     /home/bob/working/megaquiz\n\
    [echo] home:     /home/bob\n[echo] pass:     ${env.DBPASS}\nBUILD FINISHED\nTotal\
    \ time: 0.1120 seconds\n```\n\nNotice that the final property has not been translated.\
    \ This is the\ndefault behavior when a property is not found—the string referencing\
    \ the\nproperty is left untransformed. If I set the `DBPASS` environment\nvariable\
    \ and run again, I should see the variable reflected in the\noutput:\n\n```\n\
    $ export DBPASS=wooshpoppow\n$ phing\nBuildfile: /home/bob/working/megaquiz/build.xml\n\
    megaquiz > main:\n...\n[echo] pass:     whooshpoppow\nBUILD FINISHED\nTotal time:\
    \ 0.2852 seconds\n```\n\nSo now you have seen three ways of setting a property:\
    \ the `property` element, a\ncommand-line argument, and an environment variable.\n\
    \nThere is a fourth approach that complements these. You can use a\nseparate file\
    \ to specify property values. As my projects grow in\ncomplexity, I tend to favor\
    \ this approach. Let’s return to a basic build\nfile:\n\n```\n\ndatabase: ${dbname}\n\
    pass:     ${dbpass}\nhost:     ${dbhost}\n\n```\n\nAs you can see, this build\
    \ file simply outputs properties without first\ndeclaring them, or checking that\
    \ their values exist. This is what I get\nwhen I run this with no arguments:\n\
    \n```\n$ phing\n...\n[echo] database: ${dbname}\n[echo] pass:     ${dbpass}\n\
    [echo] host:     ${dbhost}\n...\n```\n\nNow I’ll declare my properties in a separate\
    \ file. I’ll call it `megaquiz.properties`:\n\n```\ndbname=filedb\ndbpass=filepass\n\
    dbhost=filehost\n```\n\nNow I can apply this file to my build process with Phing’s\
    \ `propertyfile` option:\n\n```\n$ phing -propertyfile megaquiz.properties\n...\n\
    [echo] database: filedb\n[echo] pass:     filepass\n[echo] host:     filehost\n\
    ...\n```\n\nI find this mechanism much more convenient than managing long lists\
    \ of\ncommand-line options. However, you do need to be careful not to check\n\
    your property file into your version-control system!\n\nYou can use targets to\
    \ ensure that properties are populated. Let’s say,\nfor example, that my project\
    \ requires a `dbpass` property. I\nwould like the user to set `dbpass` on the\
    \ command\nline (this always has priority over other property-assignment methods).\n\
    Failing that, I should look for an environment variable. Finally, I\nshould give\
    \ up and go for a default value:\n\n```\n\npass:     ${dbpass}\n\n```\n\nSo, as\
    \ usual, the default target `main` is invoked\nfirst. This has a dependency set,\
    \ so Phing goes back to the `setpass` target. `setpass`, though,\ndepends on `setenvpass`,\
    \ so I\nstart there. `setenvpass` is\nconfigured to run only if `dbpass` has not\
    \ been\nset and if `env.DBPASS` is\npresent. If these conditions are met, then\
    \ I set the `dbpass` property using\nthe `property`\nelement. At this stage then,\
    \ `dbpass` is populated\neither by a command-line argument or by an environment\
    \ variable. If\nneither of these were present, then the property would remain\
    \ unset at\nthis stage. The `setpass` target is now\nexecuted, but only if `dbpass`\
    \ is not yet\npresent. In this case, it sets the property to the default string:\
    \ `\"default\"`.\n\nConditionally Setting Property Values with the\nCondition\
    \ Task\n\nThe previous example set up quite a complex assignment logic. More\n\
    often, however, you’ll need a simple default value. The `condition` task allows\n\
    you to set a property’s value based upon configurable conditions. Here\nis an\
    \ example:\n\n```\n\npass:     ${dbpass}\n\n```\n\nThe `condition`\ntask requires\
    \ a `property` attribute.\nIt also optionally accepts a `value` attribute,\nwhich\
    \ is assigned to the property if the nested test clause resolves to\n`true`. If\
    \ no\nvalue attribute is provided, then the property will be set to `true` if\
    \ the nested\ntest resolves to `true`.\n\nThe test clause is one of a number of\
    \ tags, some of which, like `not` in this example,\naccept their own nested elements.\
    \ I used the `isset` element, which\nreturns `true` if\nthe referenced property\
    \ is set. Because I want to assign a value to the\n`dbpass` property\nif it is\
    \ not set, I need to\nnegate this result by wrapping it in the `not` tag. This\
    \ inverts\nthe resolution of the tag it contains. So, in terms of PHP syntax,\
    \ the\n`condition` task\nin my example is analogous to this:\n\n```\nif (! isset($dbpass))\
    \ {\n$dbpass = \"default\";\n}\n```\n\nTypes\n\nYou may think that having looked\
    \ at properties, you are now through with\ndata. In fact, Phing supports a set\
    \ of special elements called types.\nThese encapsulate different kinds of information\
    \ useful to the build\nprocess.\n\nFileSet\n\nLet’s say that you need to represent\
    \ a directory in your build file.\nThis is a common situation as you might imagine.\
    \ You could use a\nproperty to represent this directory, certainly, but you’d\
    \ run into\nproblems straightaway if your developers use different platforms that\n\
    support distinct directory separators. The answer is the FileSet data\ntype. FileSet\
    \ is platform independent, so if you represent a directory\nwith forward slashes\
    \ in the path, they will be automatically translated\nbehind the scenes into backslashes\
    \ when the build is run on a Windows\nmachine. You can define a minimal `fileset`\
    \ element like\nthis:\n\n```\n\nAs you can see, I use the `dir` attribute to set\n\
    the directory I wish to represent. You can optionally add an `id` attribute, so\
    \ that\nyou can refer to the `fileset` later on:\n\n```\n\nThe `FileSet`\ndata\
    \ type is particularly useful in specifying types of documents to\ninclude or\
    \ exclude. When installing a set of files, you may not wish\nthose that match\
    \ a certain pattern to be included. You can handle\nconditions like this in an\
    \ `excludes` attribute:\n\n```\n\nNotice the syntax I have used in the `excludes`\
    \ attribute .\nDouble asterisks represent any directory or subdirectory within\
    \ `src/lib`. A single\nasterisk represents zero or more characters. So I am specifying\
    \ that I\nwould like to exclude files that end in `_test.php` or `Test.php` in\
    \ all\ndirectories below the starting point defined in the `dir` attribute. The\n\
    `excludes`\nattribute accepts multiple patterns separated by white space.\n\n\
    I can apply the same syntax to an `includes` attribute .\nPerhaps my `src/lib`\
    \ directories\ncontain many non-PHP files that are useful to developers, but which\n\
    should not find their way into an installation. I could exclude those\nfiles,\
    \ of course, but it might be simpler just to define the kinds of\nfiles I can\
    \ include. In this\ncase, if a file doesn’t end in `.php`, it isn’t going\nto\
    \ be installed:\n\n```\n\nAs you build up `include` and `exclude` rules, your\n\
    `fileset` element\nis likely to become overly long. Luckily, you can pull out\
    \ individual\n`exclude` rules\nand place each one in its own `exclude` subelement.\n\
    You can do the same for `include` rules. I can\nnow rewrite my FileSet like this:\n\
    \nYou can see some of the attributes of the `fileset` element in\nTable [19-3](#A314621_5_En_19_Chapter.html#Tab3).\n\
    \nTable 19-3.\n\nSome Attributes of the Fileset Element\n\n  Attribute\n |\n \
    \ Required\n |\n  Description\n |\n\n| --- | --- | --- | --- | --- | --- | ---\
    \ |\n\n  `refid`\n |\n  No\n |\n  Current `fileset`\nis a reference to `fileset`\
    \ of given ID\n |\n\n  `dir`\n |\n  No\n |\n  The starting directory\n |\n\n \
    \ `expandsymboliclinks`\n |\n  No\n |\n  If set to `'true'` follow\nsymbolic links\n\
    \ |\n\n  `includes`\n |\n  No\n |\n  A comma-separated list of patterns—those\
    \ that match will be included\n |\n\n  `excludes`\n |\n  No\n |\n  A comma-separated\
    \ list of patterns—those that match will be excluded\n |\n\nPatternSet\n\nAs you\
    \ build up patterns in your `fileset` elements (and\nin others), there is a danger\
    \ that you will begin to repeat groups of\n`exclude` and\n`include`\nelements.\
    \ In my previous example, I defined patterns for test files and\nregular code\
    \ files. I may add to these over time (perhaps I wish to\ninclude `.conf`\nand\
    \ `.inc`\nextensions to my definition of code files). If I define other `fileset`\
    \ elements that\nalso use these patterns, I will be forced to make any adjustments\
    \ across\nall relevant `fileset` elements.\n\nYou can overcome this problem by\
    \ grouping patterns into `patternset` elements.\nThe `patternset`\nelement groups\
    \ `include` and `exclude` elements so\nthat they can be referenced later from\
    \ within other types. Here I\nextract the `include` and `exclude` elements from\n\
    my `fileset`\nexample and add them to `patternset` elements:\n\nI create two `patternset`\
    \ elements,\nsetting their `id` attributes to\n`inc_code` and\n`exc_test`\nrespectively.\
    \ `inc_code` contains the\n`include`\nelements for including code files, and `exc_test`\
    \ contains the\n`exclude` files\nfor excluding test files. I can now reference\
    \ these `patternset` elements\nwithin a `fileset`:\n\nTo reference an existing\
    \ `patternset`, you must\nuse another `patternset` element.\nThe second element\
    \ must set a single attribute: `refid`. The `refid` attribute\nshould refer to\
    \ the `id` of the `patternset` element\nyou wish to use in the current context.\
    \ In this way, I can reuse `patternset` elements\nacross different `fileset` elements:\n\
    \nAny changes I make to the `inc_code patternset`\nwill automatically update any\
    \ types that use it. As with FileSet, you\ncan place `exclude` rules either\n\
    in an `excludes`\nattribute or a set of `exclude` subelements.\nThe same is true\
    \ of `include` rules.\n\nSome `patternset`\nelement attributes are summarized\
    \ in Table [19-4](#A314621_5_En_19_Chapter.html#Tab4).\n\nTable 19-4.\n\nSome\
    \ Attributes of the Patternset Element\n\n  Attribute\n |\n  Required\n |\n  Description\n\
    \ |\n\n| --- | --- | --- | --- | --- | --- | --- |\n\n  `id`\n |\n  No\n |\n \
    \ A unique handle for referring to the element\n |\n\n  `excludes`\n |\n  No\n\
    \ |\n  A list of patterns for exclusion\n |\n\n  `includes`\n |\n  No\n |\n  A\
    \ list of patterns for inclusion\n |\n\n  `refid`\n |\n  No\n |\n  Current `patternset`\
    \ is a\nreference to `patternset` of given\nID\n |\n\nFilterChain\n\nThe types\
    \ that I have encountered so far have provided mechanisms for\nselecting sets\
    \ of files. FilterChain , by contrast, provides a flexible\nmechanism for transforming\
    \ the contents of text files.\n\nIn common with all types, defining a `filterchain`\
    \ element\ndoes not in itself cause any changes to take place. The element and\
    \ its\nchildren must first be associated with a task—that is, an element that\n\
    tells Phing to take a course of action. I will return to tasks a little\nlater.\n\
    \nA `filterchain`\nelement groups any number of filters together. Filters operate\
    \ on files\nlike a pipeline—the first alters its file and passes its results on\
    \ to\nthe second, which makes its own alterations, and so on. By combining\nmultiple\
    \ filters in a `filterchain` element,\nyou can effect flexible transformations.\n\
    \nHere I dive straight in and create a `filterchain` that\nremoves PHP comments\
    \ from any text passed to it:\n\nThe StripPhpComments task does just what the\
    \ name suggests. If you have\nprovided detailed API documentation in your source\
    \ code, you may have\nmade life easy for developers, but you have also added a\
    \ lot of dead\nweight to your project. Because all the work that matters takes\
    \ place\nwithin your source directories, there is no reason why you should not\n\
    strip out comments on installation.\n\nNote\n\nIf you use a build tool for your\
    \ projects, ensure that no-one makes\nchanges in the installed code. The installer\
    \ will copy over any altered\nfiles, and the changes will be lost. I have seen\
    \ it happen.\n\nLet’s sneak a peek at the next section and place the `filterchain`\
    \ element\nin a task:\n\nThe Copy task is probably the one you get most use out\
    \ of. It copies\nfiles from place to place. As you can see, I define the destination\n\
    directory in the `todir` attribute . The\nsource of the files is defined by the\
    \ `fileset` element I\ncreated in the previous section. Then comes the `filterchain`\
    \ element.\nAny file copied by the Copy task will have this transformation applied\n\
    to it.\n\nPhing supports filters for many operations, including stripping new\n\
    lines (`StripLineBreaks`) and\nreplacing tabs with spaces (`TabToSpaces`). There\n\
    is even an XsltFilter for applying XSLT transformations to source files!\nPerhaps\
    \ the most commonly used filter, however, is `ReplaceTokens` . This\nallows you\
    \ to swap tokens in your source code for properties defined in\nyour build file,\
    \ whether pulled from environment variables or passed in\non the command line.\
    \ This is very useful for customizing an\ninstallation. It’s a good idea to centralize\
    \ your tokens into a central\nconfiguration file for easy overview of the variable\
    \ aspects of your\nproject.\n\n`ReplaceTokens`\noptionally accepts two attributes,\
    \ `begintoken` and `endtoken`. You can use\nthese to define the characters that\
    \ delineate token boundaries. If you\nomit these, Phing will assume the default\
    \ character of `@`. In order to\nrecognize and replace tokens, you must add `token`\
    \ elements to the\n`replacetokens`\nelement. Now I’ll add a `replacetokens` element\n\
    to my example:\n\nAs you can see, `token` elements\nrequire `key` and\n`value`\n\
    attributes. Let’s see the effect of running this task with its\ntransformations\
    \ on a file in my project. The original file lives in a\nsource directory, `src/lib/Config.php`:\n\
    \n```\n/**\n* Quick and dirty Conf class\n**/\nclass Config {\npublic $dbname\
    \ =\"@dbname@\";\npublic $dbpass =\"@dbpass@\";\npublic $dbhost =\"@dbhost@\"\
    ;\n}\n```\n\nRunning my main target containing the Copy task defined previously\
    \ gives\nthe following output:\n\n```\n$ phing\nBuildfile: /home/bob/working/megaquiz/build.xml\n\
    megaquiz > main:\n[copy] Copying 8 files to /home/bob/working/megaquiz/build/lib\n\
    BUILD FINISHED\nTotal time: 0.1413 seconds\n```\n\nThe original file is untouched,\
    \ of course, but thanks to the Copy task,\nit has been reproduced at `build/lib/Config.php`:\n\
    \n```\nclass Config {\npublic $dbname =\"megaquiz\";\npublic $dbpass =\"default\"\
    ;\npublic $dbhost =\"localhost\";\n}\n```\n\nNot only has the comment been removed,\
    \ but the tokens have been replaced\nwith their property equivalents.\n\nTasks\n\
    \nTasks are the elements in a build file that get things done. You won’t\nachieve\
    \ much without using a task, which is why I have cheated and used\na couple already.\
    \ I’ll reintroduce these.\n\nEcho\n\nThe Echo task is perfect for the obligatory\
    \ “Hello World” example. In\nthe real world, you can use it to tell the user what\
    \ you are about to do\nor what you have done. You can also sanity-check your build\
    \ process by\ndisplaying the values of properties. As you have seen, any text\
    \ placed\nwithin the opening and closing tags of an `echo` element will be\nprinted\
    \ to the browser:\n\n```\nThe pass is '${dbpass}', shhh!\n```\n\nAlternatively,\
    \ you can add the output message to a `msg` attribute :\n\n```\n\nThis will have\
    \ the identical effect of printing the following to\nstandard output:\n\n```\n\
    [echo] The pass is 'default', shhh!\n```\n\nCopy\n\nCopying is really what installation\
    \ is all about. Typically, you will\ncreate one target that copies files from\
    \ your source directories and\nassembles them in a temporary build directory.\
    \ You will then have\nanother target that copies the assembled (and transformed)\
    \ files to\ntheir output locations. Breaking the installation into separate build\n\
    and install phases is not absolutely necessary, but it does mean that\nyou can\
    \ check the results of the initial build before committing to\noverwriting production\
    \ code. You can also change a property and install\nagain to a different location\
    \ without the need to run a potentially\nexpensive copy/replace phase again.\n\
    \nAt its simplest, the Copy task allows you to specify a source file and a\ndestination\
    \ directory or file:\n\n```\n\nAs you can see, I specify the source file using\
    \ the `file` attribute. You\nmay be familiar already with the `todir` attribute,\n\
    which is used to specify the target directory. If the target directory\ndoes not\
    \ exist, Phing will create it for you.\n\nIf you need to specify a target file,\
    \ rather than a containing\ndirectory, you can use the `tofile` attribute\ninstead\
    \ of `todir`:\n\n```\n\nOnce again, the `build/conf` directory\nis created if\
    \ necessary, but this time, `Config.php` is renamed\nto `myConfig.php`.\n\nAs\
    \ you have seen, to copy more than one file at a time, you need to add\na `fileset`\n\
    element to `copy`:\n\nThe source files are defined by the `srclib fileset`\nelement,\
    \ so all you have to set in `copy` is the `todir` attribute.\n\nPhing is smart\
    \ enough to test whether or not your source file has been\nchanged since the target\
    \ file was created. If no change has been made,\nthen Phing will not copy. This\
    \ means that you can build many times, and\nonly the files that have changed in\
    \ the meantime will be installed. This\nis fine, as long as other things are not\
    \ likely to change. If a file is\ntransformed according to the configuration of\
    \ a `replacetokens`\nelement, for example, you may want to ensure that the file\
    \ is\ntransformed every time that the Copy task is invoked. You can do this by\n\
    setting an `overwrite` attribute :\n\nNow whenever copy is run, the files matched\
    \ by the `fileset` element are\nreplaced whether or not the source has been recently\
    \ updated.\n\nYou can see the `copy` element\nsummarized in Table [19-5](#A314621_5_En_19_Chapter.html#Tab5).\n\
    \nTable 19-5.\n\nThe Attributes of the Copy Element\n\n  Attribute\n |\n  Required\n\
    \ |\n  Description\n |\n  Default Value\n |\n\n| --- | --- | --- | --- | --- |\
    \ --- | --- | --- | --- |\n\n  `todir`\n |\n  Yes (if `tofile`\nnot present)\n\
    \ |\n  Directory to copy into\n |\n  None\n |\n\n  `tofile`\n |\n  Yes (if `todir`\n\
    not present)\n |\n  The file to copy to\n |\n  None\n |\n\n  `tstamp`\n |\n  No\n\
    \ |\n  Match the timestamp of any file overwritten (it will appear unaltered)\n\
    \ |\n  `false`\n |\n\n  `preservemode`\n |\n  No\n |\n  Match the permissions\
    \ of any file overwritten\n |\n  `false`\n |\n\n  `includeemptydirs`\n |\n  No\n\
    \ |\n  Copy empty directories over\n |\n  `false`\n |\n\n  `mode`\n |\n  No\n\
    \ |\n  Set the (octal) mode\n |\n\n |\n\n  `haltonerror`\n |\n  No\n |\n  Build\
    \ process will be stopped if an error encountered\n |\n  `true`\n |\n\n  `overwrite`\n\
    \ |\n  No\n |\n  Overwrite target if it already exists\n |\n  `no`\n |\n\nInput\n\
    \nYou have seen that the `echo` element is used\nto send output to the user. To\
    \ gather input from the user, I have used separate\nmethods involving the command\
    \ line and an environment variable. These\nmechanisms are neither very structured\
    \ nor interactive, however.\n\nNote\n\nOne reason for allowing users to set values\
    \ at build time is to allow\nfor flexibility from build environment to build environment.\
    \ In the case\nof database passwords, another benefit is that this sensitive data\
    \ is\nnot enshrined in the build file itself. Of course, once the build has\n\
    been run, the password will be saved into a source file, so it is up to\nthe developer\
    \ to ensure the security of his system!\n\nThe `input`\nelement allows you to\
    \ present the user with a prompt message. Phing then\nawaits input which it assigns\
    \ it to a property. Here’s an example:\n\n```\n\" />\n\npass:     ${dbpass}\n\n\
    ```\n\nOnce again, I have a default target: `main`. This depends on\nanother target,\
    \ `setpass`, which is\nresponsible for ensuring that the `dbpass` property is\n\
    populated. To this end, I use the target element’s `unless` attribute,\nwhich\
    \ ensures that it will not run if `dbpass` is already\nset.\n\nThe `setpass`\n\
    target consists of a single `input` task element.\nAn `input`\nelement can have\
    \ a `message` attribute,\nwhich should contain a prompt for the user. The `propertyName`\n\
    attribute is required and defines the property to be populated by user\ninput.\
    \ If the user presses Enter at the prompt without setting a value,\nthe property\
    \ is given a fallback value if the `defaultValue`\nattribute is set. Finally,\
    \ you can customize the prompt character using\nthe `promptChar`\nattribute—this\
    \ provides a visual cue for the user to input data. Let’s\nrun Phing using the\
    \ previous targets:\n\n```\n$ phing\nBuildfile: /home/bob/working/megaquiz/build.xml\n\
    megaquiz > setpass:\nYou don't seem to have set a db password [default] > mypass\n\
    megaquiz > main:\n[echo] pass:     mypass\nBUILD FINISHED\nTotal time: 6.0322\
    \ seconds\n```\n\nThe `input`\nelement is summarized in Table [19-6](#A314621_5_En_19_Chapter.html#Tab6).\n\
    \nTable 19-6.\n\nThe Attributes of the Input Element\n\n  Attribute\n |\n  Required\n\
    \ |\n  Description\n |\n\n| --- | --- | --- | --- | --- | --- | --- |\n\n  `propertyName`\n\
    \ |\n  Yes\n |\n  The property to populate with user input\n |\n\n  `message`\n\
    \ |\n  No\n |\n  The prompt message\n |\n\n  `defaultValue`\n |\n  No\n |\n  A\
    \ value to assign to the property if the user does not provide input\n |\n\n \
    \ `validArgs`\n |\n  No\n |\n  A list of acceptable input values separated by\
    \ commas. If the user\ninputs a value that is not on this list Phing will re-present\
    \ the prompt\n |\n\n  `promptChar`\n |\n  No\n |\n  A visual cue that the user\
    \ should provide input\n |\n\nDelete\n\nInstallation is generally about creating,\
    \ copying, and transforming\nfiles. Deletion has its place as well, however. This\
    \ is particularly the\ncase when you wish to perform a clean install. As I have\
    \ already\ndiscussed, files are generally only copied from source to destination\n\
    for source files that have changed since the last build. By deleting a\nbuild\
    \ directory, you ensure that the full compilation process will take\nplace.\n\n\
    Here I delete a directory:\n\nWhen I run `phing` with the\nargument `clean`\n\
    (the name of the target), my `delete` task element\nis invoked. Here’s Phing’s\
    \ output:\n\n```\n$ phing clean\nBuildfile: /home/bob/working/megaquiz/build.xml\n\
    megaquiz > clean:\n[delete] Deleting directory /home/bob/working/megaquiz/build\n\
    BUILD FINISHED\n```\n\nThe `delete`\nelement accepts an attribute, `file`, which\
    \ can be\nused to point to a particular file. Alternatively, you can fine-tune\n\
    your deletions by adding a `fileset` subelement to\n`delete`.\n\nSummary\n\nSerious\
    \ development rarely happens all in one place. A codebase needs to\nbe separated\
    \ from its installation, so that work in progress does not\npollute production\
    \ code that needs to remain functional at all times.\nVersion control allows developers\
    \ to check out a project and work on it\nin their own space. This requires that\
    \ they should be able to configure\nthe project easily for their environments.\
    \ Finally, and perhaps most\nimportantly, the customer (even if the customer is\
    \ yourself in a year’s\ntime, when you’ve forgotten the ins-and-outs of your code)\
    \ should be\nable to install your project after a glance at a Read Me file.\n\n\
    In this chapter, I have covered some of the basics of Phing, a fantastic\ntool,\
    \ which brings much of the functionality of Apache Ant to the PHP\nworld. I have\
    \ only scratched the surface of Phing’s capabilities.\nNevertheless, once you\
    \ are up and running with the targets, tasks,\ntypes, and properties discussed\
    \ here, you’ll find it easy to bolt on new\nelements for advanced features like\
    \ creating tar/gzipped distributions,\nautomatically generating PEAR package installations,\
    \ and running PHP\ncode directly from the build file.\n\nIf Phing does not satisfy\
    \ all your build needs, you will discover that,\nlike Ant, it is designed to be\
    \ extensible—get out there and build your\nown tasks! Even if you don’t add to\
    \ Phing, you should take some time to\nexamine the source code. Phing is written\
    \ entirely in object-oriented\nPHP, and its code is chock-full of design examples.\n\
    \n20. Vagrant\n\nWhere do you run your code?\n\nMaybe you have a development environment\
    \ you have honed to perfection\nwith a favorite editor and any number of useful\
    \ development tools. Of\ncourse, your perfect set up for writing code is probably\
    \ very different\nfrom the best system on which to run it. And that’s a challenge\
    \ that\nVagrant can help you with. Using Vagrant you get to work on your local\n\
    machine and run your code on a system that’s all but identical to your\nproduction\
    \ server. In this chapter I will show you how. We will cover\nthe following:\n\
    \n*   Basic set up: From installation\n    to choosing your first box\n\n*   Logging\
    \ in: Investigating your\n    virtual machine with ssh\n\n*   Mounting host directories:\n\
    \    Editing code on your host machine and having it available transparently\n\
    \    in your Vagrant box\n\n*   Provisioning: Writing a script\n    to install\
    \ packages and configure Apache and MySQL\n\n*   Set a hostname: Configuring your\n\
    \    box so that you can access it using a custom hostname\n\nThe Problem\n\n\
    As always, let’s spend a little time defining the problem space. It is\nrelatively\
    \ easy, these days, to configure a LAMP stack on most desktop\nor laptop computers.\
    \ Even so, a personal computer is unlikely to match\nyour production environment.\
    \ Is it running the same version of PHP? What\nabout Apache and MySQL? If you’re\
    \ using Elasticsearch, you may need to\nconsider Java, too. The list soon grows.\
    \ Developing against one set of\ntools on a particular platform can sometimes\
    \ be problematic if your\nproduction stack is significantly different.\n\nYou\
    \ might give up and shift your development to a remote machine—there\nare plenty\
    \ of cloud vendors who will allow you to spin up a box quickly.\nBut that’s not\
    \ a free option, and, depending upon your editor of choice,\na remote system may\
    \ not integrate well with the development tools you\nwish to use.\n\nSo it may\
    \ be worth the effort of matching the packages on your computer\nas closely as\
    \ possible with those installed on the production system.\nThe match won’t be\
    \ perfect, but perhaps it will be good enough, and\nyou’ll probably catch most\
    \ issues on the staging server.\n\nWhat happens, though, when you begin work on\
    \ a second project with\nradically different requirements? We have seen that Composer\
    \ does a\ngreat job of keeping dependencies separate, but there are still global\n\
    packages like PHP, MySQL, and Apache to keep in line.\n\nNote\n\nIf you decide\
    \ to develop on remote systems, I recommend making the\neffort to learn how to\
    \ use the vim editor. Despite its quirks, it is\nextremely powerful, and you can\
    \ be 99% certain that either vim or its\nmore basic ancestor vi will available\
    \ on any Unix-like system you\nencounter.\n\nVirtualization is a potential solution,\
    \ and a good one. It can be a pain\ninstalling an operating system, though, and\
    \ there can be considerable\nconfiguration hassles.\n\nIf only there were a tool\
    \ that made creating a production-like\ndevelopment environment on a local machine\
    \ really simple. OK, it’s\nobvious that now I’m going to say that just such a\
    \ tool exists. Well,\none does. It’s called Vagrant, and it is truly amazing.\n\
    \nA Little Setup\n\nIt is tempting to say that Vagrant gives you a development\
    \ environment\nwith a single command. That can\nbe true—but you do have to install\
    \ the requisite software first. Given\nthat, and a configuration file that you\
    \ can check out from your\nproject’s version-control repository, launching a new\
    \ environment truly\ncan involve a single command.\n\nLet’s get started with the\
    \ setup first. Vagrant requires a\nvirtualization platform. It supports several,\
    \ but I will use VirtualBox\n. My host machine runs Fedora, but you can install\
    \ VirtualBox on any\nLinux distribution and on OSX or Windows. You can find the\
    \ download page\nat [`https://www.virtualbox.org/wiki/Downloads`](https://www.virtualbox.org/wiki/Downloads)\
    \ , together with instructions for your platform.\n\nOnce you have VirtualBox\
    \ installed, you’ll need Vagrant, of course. The\ndownload page is at [`https://www.vagrantup.com/downloads.html`](https://www.vagrantup.com/downloads.html)\
    \ . Once we have installed these applications, our next\ntask will be to choose\
    \ the box we’ll run our code on.\n\nChoosing and Installing a Vagrant Box\n\n\
    Probably the easiest way to acquire a Vagrant box is to use the search\ninterface\
    \ at [`https://atlas.hashicorp.com/search`](https://atlas.hashicorp.com/search)\
    \ . Since many production systems run CentOS, that’s\nwhat I will look for. You\
    \ can see the fruits of my research in Figure\n[20-1](#A314621_5_En_20_Chapter.html#Fig1).\n\
    \n![A314621_5_En_20_Fig1_HTML.jpg](A314621_5_En_20_Fig1_HTML.jpg)\n\nFigure 20-1.\n\
    \nSearching for a Vagrant box\n\nCentOS 6.7 looks about right for my needs. I\
    \ now have enough information\nto get a Vagrant environment running. Usually when\
    \ you run Vagrant, it\nwill read a configuration file named `Vagrantfile`—but\
    \ since\nI am starting from scratch, I need to ask Vagrant to generate one:\n\n\
    ```\n$ vagrant init bento/centos-6.7\nA 'Vagrantfile' has been placed in this\
    \ directory. You are now\nready to 'vagrant up' your first virtual environment!\
    \ Please read\nthe comments in the Vagrantfile as well as documentation on\n'vagrantup.com'\
    \ for more information on using Vagrant.\n```\n\nAs you can see, I pass Vagrant\
    \ the name of the box I want to work with,\nand it uses this information to generate\
    \ some minimal configuration.\n\nIf I open up the generated `Vagrantfile` document\n\
    , I can see this (among much other boilerplate):\n\n```"
