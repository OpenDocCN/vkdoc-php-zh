  trans: "\n# 删除关联表中的条目\n\n评论系统是一项很棒的改进。但遗憾的是，评论也给管理模块带来了我们不希望看到的系统行为：现在无法删除带有评论的条目了。我们可以尝试删除一篇带有评论的博客来测试这一点，系统会忽略该请求。这是一个*完整性违规*问题。\n\
    \n你甚至可能会看到如下错误提示，它指明了问题所在。\n\n```\nException: exception 'PDOException' with message\
    \ 'SQLSTATE[23000]: Integrity constraint violation: 1451 Cannot delete or update\
    \ a parent row: a foreign key constraint fails'\n```\n\n## 理解外键约束\n\n遇到错误总是有点烦人，但这个错误其实很友好。它实际上是在阻止我们破坏数据库的完整性。表\
    \ 9-1 展示了 `blog_entry` 表内部的结构。\n\n**表 9-1** `blog_entry` 表中的一行数据\n\n| `entry_id`\
    \ | 标题 | `entry_text` | 创建时间 |\n|------------|------|--------------|---------|\n\
    | 17         | 删除我 | 测试        | 2022-07-23 10:26:18 |\n\n一条评论可能与这篇特定的博客条目相关联。表\
    \ 9-2 显示了评论表中对应的行。\n\n**表 9-2** 评论表中的一行数据\n\n| `comment_id` | `entry_id` | 作者\
    \ | 文本 | 日期 |\n|--------------|------------|------|------|------|\n| 4       \
    \     | 17         | Thomas | 测试评论 | 2022-07-23 10:26:40 |\n\n想象一下，如果删除了 `entry_id\
    \ = 17` 的 `blog_entry`，那么就会有一条评论关联着一个已不存在的博客条目。评论只有在正确的上下文中才有意义。`comment_id =\
    \ 4` 的这条评论将失去其上下文，失去其完整性。再想象一下，如果我们插入一条新的 `entry_id = 17` 的博客条目，那么这条新的博客条目将天生附带一条完全无关的评论！外键的目的就是维护数据完整性。因此，当我们尝试删除一条拥有评论的\
    \ `blog_entry` 时，MySQL/MariaDB 会阻止我们，因为删除操作会导致一条“叛逃的”评论在数据库中飘荡，毫无上下文意义。请记住，只有删除没有评论的博客条目，才不会丢失数据完整性。\n\
    \n## 在删除博客条目之前先删除评论\n\n在删除博客条目时，我们首先会删除与该条目相关的所有评论。我们已有一个类提供了对评论表的单一访问点。我们可以添加一个新方法，用于删除与特定\
    \ `entry_id` 相关的所有评论。\n\n```\n// models/Comment_Table.class.php 的代码片段\npublic\
    \ function deleteByEntryId( $id ) {\n    $sql = \"DELETE FROM comment WHERE entry_id\
    \ = ?\";\n    $data = array( $id );\n    $statement = $this->executeSQL( $sql,\
    \ $data );\n}\n```\n\n**代码清单 9-1** `Comments_Table.class.php` 的代码片段\n\n这个方法将在删除博客条目之前被调用。博客条目是从\
    \ `Blog_Entry_Table` 类中删除的。\n\n```\n// models/Blog_Entry_Table.class.php 的代码片段\n\
    // 编辑现有方法\npublic function deleteEntry ( $id ) {\n    // 新代码：在删除条目之前删除所有评论\n \
    \   $this->deleteCommentsByID( $id );\n    $sql = \"DELETE FROM blog_entry WHERE\
    \ entry_id = ?\";\n    $data = array( $id );\n    $statement = $this->executeSQL(\
    \ $sql, $data );\n}\n\n// 新代码：在 Blog_Entry_Table.class.php 中声明一个新的私有方法\nprivate\
    \ function deleteCommentsByID( $id ) {\n    include_once \"models/Comment_Table.class.php\"\
    ;\n    // 创建一个 Comment_Table 对象\n    $comments = new Comment_Table( $this->db\
    \ );\n    // 在删除条目之前删除所有评论\n    $comments->deleteByEntryId( $id );\n}\n```\n\n\
    **代码清单 9-2** `Blog_Entry_Table.class.php` 的代码片段\n\n现在，如果 `blog_entry` 有关联的评论，这些评论会被优先删除，以避免违反外键约束！\n\
    \n## 创建图片管理器\n\n目前，`admin` 模块有两个不同的页面视图：条目列表和条目编辑器。现在我们将添加第三个页面，用于上传和删除我们将在博客条目中使用的图片。我们可以从为图片管理器创建菜单项开始。\n\
    \n```\n所有条目\n编辑器\n图片管理器\n\";\n?>\n```\n\n**代码清单 9-3** `admin-navigation.php`\n\
    \n点击“图片管理器”链接将生成一个名为 `page` 的 URL 变量，并将其值设置为 `images`。前端控制器 `admin.php` 将引入一个名为\
    \ `images.php` 的新控制器脚本。一如既往，我们会从一小步开始，以便在错误还容易纠正时及时发现。\n\n```\n图片管理器即将上线！\n\"\
    ;\n?>\n```\n\n**代码清单 9-4** `images.php`\n\n如果我们浏览器中加载 `http://localhost/ch9/blog/admin.php?page=images`，应该会看到新的菜单和这条消息。\n\
    \n![](img/323857_3_En_9_Fig1_HTML.jpg)\n\n网页（`admin.php?page=images`）的快照显示了“图片管理器即将上线！”这段文字。\n\
    \n**图 9-1** `http://localhost/ch9/blog/admin.php?page=images` 的输出\n\n### 显示用于上传图片的表单\n\
    \n现在我们有了图片管理器控制器脚本，可以创建图片管理器的视图了。让我们从一个基本的 HTML 表单开始，我们最终可以用它来上传图片。\n\n```\n图片上传\n\
    \n$uploadMessage\n\n\";\n?>\n```\n\n**代码清单 9-5** `images-html.php`\n\n我们可以看到，`views`\
    \ 代码已经预留了一个占位符，用于向用户显示上传消息。默认的上传消息是*上传一张新图片*。很快，系统就会让我们的用户知道上传是否成功。请记住，为了允许用户上传图片等文件，我们需要一个\
    \ HTML 表单。我们必须使用 HTTP 方法 `POST`，并且必须显式声明表单的编码类型，以允许文件上传。我们必须将表单的 `enctype` 设置为\
    \ `multipart/form-data`，这样既能接受文件，也能接受普通的 URL 编码表单数据。如前所述，带有 `type=file` 的 `<input>`\
    \ 元素会从操作系统调出文件窗口；这允许用户浏览本地计算机以选择要上传的文件。`accept` 属性已设置为仅允许 JPEG 图像。\n\n请记住，客户端验证可以提高可用性，但不能提高安全性。在文件窗口中，文件类型可以更改为“所有文件”。我们还应该预料到，恶意用户会绕过任何客户端验证。为了保护我们的系统免受攻击，我们还将实现服务器端验证。我们很快会添加这个功能。但首先，让我们更新图片管理器控制器，以便显示上传表单。\n\
    \n```\n代码清单 9-6\nnewimages.com\n```\n\n现在，我们可以将浏览器指向 `http://localhost/ch9/blog/newadmin.php?page=newimages`，以确认表单确实在浏览器中显示了。\n\
    \n> **注**  \n> 以下文件已更新，以访问新的图片控制器：`newadmin.php`、`new-admin-navigation.php`。\n\
    \n### 快速回顾 `$_FILES` 超全局数组\n\n我们在第 4 章学习了 `$_FILES` 超全局变量，但在继续之前，复习一下它的功能可能会有所帮助。每当通过\
    \ HTML 表单上传文件时，该文件会存储在临时内存中，关于该文件的信息会通过 `$_FILES` 超全局数组传递出去。该数组包含关于所上传文件的几个重要方面。\n\
    \n```\nArray (\n    [image-data] => Array (\n        [name] => alberte-lea.jpg\n\
    \        [type] => image/jpeg\n        [tmp_name] => /Applications/XAMPP/xamppfiles/temp/phpYPcBjK\n\
    \        [error] => 0\n        [size] => 119090\n    )\n)\n```\n\n名称（name）和类型（type）不言自明。`tmp_name`\
    \ 是文件上传后的临时文件名。如果文件太大（根据 `php.ini` 中的设置），则此项会被设置为 `\"none\"`。错误代码为 0 或 `UPLOAD_ERR_OK`\
    \ 表示文件上传成功。文件大小（size）以字节为单位。\n\n`image-data` 这个名字是从哪里来的？\n\n```\n// 来自 views/admin/images-html.php\
    \ 的一段代码\n\n```\n"
- fmt: "# 排版后的文本\n\nThe answer is that we provided it! The `image-data` is there because\
    \ of the `name` attribute for the file chooser window. If we look at the code\
    \ in `views/admin/images-html.php`, we see that it was set in the file input.\n\
    \nWe are just one or two lines of code away from uploading the image. All we have\
    \ to do is to save the file data on the server. The file data is already uploaded\
    \ and saved temporarily under `tmp_name`, inside `image-data` array, inside `$_FILES`.\
    \ To grab the file data, we would simply have to write something similar to the\
    \ following lines:\n\n```\n//don't write this anywhere...yet\n$fileData = $_FILES['image-data']['tmp_name'];\n\
    ```\n\nInstead of reinventing a solution every time we need one, we can write\
    \ a reusable class for uploading. That way, we can reuse the upload code in many\
    \ projects without changing it. Come to think of it, we already wrote an `Uploader`\
    \ class back in Chapter [4](#323857_3_En_4_Chapter.xhtml). Let us copy the `Uploader`\
    \ class from `ch4/classes/ImagesUploader.class.php` and save it into `ch9/blog/models/Uploader.class.php`.\
    \ Alternatively, we can also download the class from the publisher’s website.\
    \ Let us also copy the `checkImageFile.php` program (used in the uploader) from\
    \ `ch4/views/CheckImageFile.php` to `ch9/blog/views/CheckImageFile.php`. We can\
    \ also copy this file from the publisher’s website.\n\n## Uploading an Image\n\
    \nTo upload an image using the `Uploader` class, we begin by creating a new folder\
    \ for images (`imgs`) directly under the `ch9/blog` folder location.\n\nWhen the\
    \ image manager upload form is submitted, the code will attempt to upload the\
    \ indicated file. Submitting a form is a user interaction, so the code belongs\
    \ in a controller. We will copy the code from `ch4/views/imagesUpload.php` with\
    \ only a very small modification. It is always logical to reuse code that has\
    \ been well tested and used successfully.\n\n```\n$uploader = new ImagesUploader(\
    \ \"image-data\" );\n$uploader->saveIn(\"imgs\");\n$fileUploaded = $uploader->save();\n\
    if ( $fileUploaded ) {\n$out = \"New image uploaded\";\n} else {\nthrow new Exception(\"\
    Error: File not uploaded to Imgs folder\");\n}\nreturn $out;\n}\n$imageSubmitted\
    \ = isset( $_POST['new-image'] );\n//if the upload form was submitted\nif ( $imageSubmitted\
    \ ) {\n$info = upload();\n}\nelse {\ninclude_once \"views/admin/newest-images-html.php\"\
    ;\n}\n?>\nListing 9-7\nnewestimages.php\n```\n\n```\n$uploader = new ImagesUploader(\
    \ \"image-data\" );\n$uploader->saveIn(\"imgs\");\n$fileUploaded = $uploader->save();\n\
    if ( $fileUploaded ) {\n$out = \"New image uploaded\";\n} else {\n$out = \"File\
    \ not uploaded to Imgs folder. Check file size and type.\");\n}\nreturn $out;\n\
    }\n```\n\nThe upload function from Chapter [4](#323857_3_En_4_Chapter.xhtml) remains\
    \ unchanged, except for changing the display messages. The method uses the `Uploader`\
    \ class to set location for the image to be stored. Then the `save()` method of\
    \ the `Uploader` class is called to attempt to save the image. The corresponding\
    \ message is then displayed, if the upload was successful or not.\n\n```\nif (\
    \ $imageSubmitted ) {\n$info = upload();\n}\nelse {\ninclude_once \"views/admin/newest-images-html.php\"\
    ;\n}\n```\n\nThe function is called, only if an image has been selected from the\
    \ `newest-images-html.php` page. If an image has not been selected, then the page\
    \ is displayed to allow the user to select a file.\n\n```\nkeyValue = $key;\n\
    $this->filename = $_FILES[$key]['name'];\n$this->fileData = $_FILES[$key]['tmp_name'];\n\
    }\npublic function saveIn( $folder ) {\n$this->destination = $folder;\n}\npublic\
    \ function save(){\n$variableName = $this->keyValue;\n$tmp = $_FILES[$this->keyValue]['tmp_name'];\n\
    $folderIsWriteAble = is_writable( $this->destination );\n$notValid = checkImageFile($tmp,\
    \ $variableName);\nif ( !$notValid and $folderIsWriteAble) {\n$name = \"$this->destination/$this->filename\"\
    ;\n$success = move_uploaded_file( $this->fileData, $name );\n} else {\n$success\
    \ = false;\n}\nreturn $success;\n}\n}\n?>\nListing 9-8\nUploader.class.php\n```\n\
    \nThe `Uploader` class is unchanged from Chapter [4](#323857_3_En_4_Chapter.xhtml).\
    \ However, it is worth reviewing the code that is included to validate the file\
    \ which the user is attempting to upload.\n\n```\n$folderIsWriteAble = is_writable(\
    \ $this->destination );\n$notValid = checkImageFile($tmp, $variableName);\nif\
    \ ( !$notValid and $folderIsWriteAble) {\n$name = \"$this->destination/$this->filename\"\
    ;\n$success = move_uploaded_file( $this->fileData, $name );\n} else {\n$success\
    \ = false;\n}\n```\n\nThe folder is checked to assure it is writable. The `checkImageFile()`\
    \ function from `checkimagefile.php` is called to verify the file. If it is valid,\
    \ the file is stored in the `imgs` folder. `$success` is set to `true` if the\
    \ move is successful. It is set to `false` if the move was not successful or the\
    \ file was not valid.\n\n```\n 'jpg');\n$max_Size  = 40 * 1024 * 1024;\n//  40MB\
    \ must be the same size or less than the setting in php.ini\n$errorStatus = false;\n\
    if(!isset($_FILES[$variableName]) ) {\n// error $_FILE does not exist\n$errorStatus\
    \ = true;\n} else {\n$info = finfo_open(FILEINFO_MIME_TYPE);\nif (!$info) {\n\
    // error Can't open finfo using mime type\n$errorStatus = true;\n} else {\n$mime_type\
    \ = finfo_file($info, $tmpName);\nif (!in_array($mime_type, array_keys($valid_File_Types)))\
    \ {\n// error invalid file type\n$errorStatus = true;\n} else {\nif (filesize($_FILES[$variableName]['tmp_name'])\
    \ > $max_Size) {\n// error file size too big\n$errorStatus = true;\n}\nfinfo_close($info);\n\
    }\n}\n}\nreturn $errorStatus;\n}\n?>\nListing 9-9\ncheckImageFile.php\n```\n\n\
    The function will check to see if the file exists (`if(!isset($_FILES[$variableName])`)\
    \ and if the mime information can be accessed (`$info = finfo_open(FILEINFO_MIME_TYPE);`).\
    \ If it does exist, it will check for the valid file type (`if (!in_array($mime_type,\
    \ array_keys($valid_File_Types)))`) and if the file does not exceed the maximum\
    \ file size (`if (filesize($_FILES[$variableName]['tmp_name']) > $max_Size) {`).\
    \ If any test fails, `$errorStatus` will be set to `true`. Otherwise, it will\
    \ be sent to `false`. This status is then returned to the `Uploader` class. We\
    \ can test the upload procedure by entering `http://localhost/ch9/blog/newestadmin.php`\
    \ in the browser and by selecting the `Image manager` menu item – then by selecting\
    \ a file to upload. The single most common error to encounter at this point relates\
    \ to folder permissions. If the destination folder is write-protected, PHP cannot\
    \ save the upload file. So, if we cannot upload a file, the permissions of the\
    \ `img` folder must be changed to `read & write`.\n\n## Exercises\n\n1. We can\
    \ improve the error messages further. We can check for the error codes (see the\
    \ listing provided in Chapter [4](#323857_3_En_4_Chapter.xhtml)) and provide custom\
    \ error messages for them. To accomplish this task, you will need to learn how\
    \ to trigger these errors and display meaningful error messages to the users.\n\
    2. It would be a significant improvement if we could check for name conflicts\
    \ before upload. The system should throw an exception and prompt the user to rename\
    \ the image before upload? Or we could even change the upload form to allow users\
    \ to rename the image through the form?\n\n## Displaying Images\n\nWe now have\
    \ an image manager that allows image upload. It should be possible for a blog\
    \ administrator to see all available images and use any one of those in a blog\
    \ entry. We can reuse the code from Chapter [4](#323857_3_En_4_Chapter.xhtml),\
    \ with some changes, to meet most of these requirements.\n\nThe following additional\
    \ files have been copied and renamed from Chapter [4](#323857_3_En_4_Chapter.xhtml)\
    \ and Chapter [8](#323857_3_En_8_Chapter.xhtml) to begin our journey into displaying\
    \ the uploaded images. Each file has been adjusted to use additional files with\
    \ their new names. It is recommended that you use the files from the editor’s\
    \ website to avoid any logical errors.\n\n| Original Name | New Name | Location\
    \ From->To |\n| --- | --- | --- |"
