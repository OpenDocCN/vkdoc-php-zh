    \necho \"Distance from New York to Los Angeles: \" . Pos2Distance($p1, $p2) .\
    \ \" km\\n\";\n\nDistance from New York to Los Angeles: 3936 km\n\nWith similar\
    \ math it is possible to calculate the bearing it would take to travel in a straight\
    \ line from New York to Los Angeles.\n\n```php\n<?php\n// 3_25.php\n\nfunction\
    \ Bearing($pos1, $pos2) {\n    $lon1 = deg2rad($pos1['lon']);\n    $lat1 = deg2rad($pos1['lat']);\n\
