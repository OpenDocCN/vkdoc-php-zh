- fmt: 'It is also worth noting that some settings related to working with PHP are
    performed in a special window, which can be accessed using the `Options` command
    from the `Tools` menu.


    In NetBeans, you can create a single file with PHP code instead of creating a
    project. To do that, in the NetBeans development environment window, select the
    `New File` command from the `File` menu (see Figure [1-13](#613529_1_En_1_Chapter.xhtml#Fig13)).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig13_HTML.jpg)


    A cropped screenshot of the NetBeans environment window, Apache NetBeans IDE 19.
    The thirteen menus at the top are `File`, `Edit`, `View`, `Navigate`, `Source`,
    `Refactor`, `Run`, `Debug`, `Profile`, `Team`, `Tools`, `Window`, and `Help`.
    The `New File` option under the `File` menu is selected.


    Figure 1-13


    Creating a file in NetBeans


    The `New File` window opens, in which you select the file type to be created (see
    Figure [1-14](#613529_1_En_1_Chapter.xhtml#Fig14)).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig14_HTML.jpg)


    A screenshot of the `New File` window from the NetBeans environment. Under the
    two steps, the `Choose File Type` option is selected. `Other` from categories
    and `Empty File` from file types are selected. The description reads creates an
    empty file with an arbitrary extension on your disk. The `Next` button is selected.


    Figure 1-14


    Selecting the file type


    In particular, select `Other` in the `Categories` section and `Empty File` in
    the `File Types` section. Then, the `New Empty File` window appears (see Figure
    [1-15](#613529_1_En_1_Chapter.xhtml#Fig15)).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig15_HTML.jpg)


    A screenshot of the `New Empty File` window from the NetBeans environment. Under
    the two steps, the `Name and Location` option is selected. It includes `File Name`
    as `hello.php`, `Project`, `Folder`, and `Created File`. The `Finish` button is
    selected.


    Figure 1-15


    The window to determine the file name


    In this window, you set the file name (`hello.php` in the `File Name` field).
    The `Folder` field specifies the file location (in this case, `D:\Books\php`).
    As a result, an empty file is created into which you enter the program, as shown
    in Figure [1-16](#613529_1_En_1_Chapter.xhtml#Fig16).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig16_HTML.jpg)


    A screenshot of the NetBeans environment window, Apache NetBeans IDE 19. The thirteen
    menus at the top are `File`, `Edit`, `View`, `Navigate`, `Source`, `Refactor`,
    `Run`, `Debug`, `Profile`, `Team`, `Tools`, `Window`, and `Help`. The left panel
    has 3 tabs, including `Projects`, `Files`, and `Services`. The `print` function
    is used in `hello.php`. The output reads `Hello, PHP!`


    Figure 1-16


    The file with the program in the NetBeans window


    To run the file with the code for execution, select the `Run File` command in
    the `Run` menu (see Figure [1-17](#613529_1_En_1_Chapter.xhtml#Fig17)).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig17_HTML.jpg)


    A screenshot of the NetBeans environment window, Apache NetBeans IDE 19. The thirteen
    menus at the top are `File`, `Edit`, `View`, `Navigate`, `Source`, `Refactor`,
    `Run`, `Debug`, `Profile`, `Team`, `Tools`, `Window`, and `Help`. The left panel
    has 3 tabs, including `Projects`, `Files`, and `Services`. The `Run File` option
    is selected from the `Run` menu for `hello.php`.


    Figure 1-17


    Running the file with code for execution


    After you run the program for execution, the result appears in the output area
    at the bottom of the development environment window, as shown in Figure [1-18](#613529_1_En_1_Chapter.xhtml#Fig18).


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fig18_HTML.jpg)


    A screenshot of the NetBeans environment window, Apache NetBeans IDE 19. The thirteen
    menus at the top are `File`, `Edit`, `View`, `Navigate`, `Source`, `Refactor`,
    `Run`, `Debug`, `Profile`, `Team`, `Tools`, `Window`, and `Help`. The left panel
    has 3 tabs, including `Projects`, `Files`, and `Services`. The output from the
    `Run File` option is `Hello, PHP!` for `hello.php`.


    Figure 1-18


    The result of executing the program from the file


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Fige_HTML.jpg)An information icon.


    **Note**


    When you run the file for execution, the `Run File` window appears, in which you
    just need to click the `OK` button.


    | Details |

    | --- |

    | Sometimes, it is vital to ensure that the encoding of the development environment
    editor matches the encoding in which the file is written and the encoding of the
    output area. You can change the default encoding of the NetBeans Environment Editor.
    To do that, open the `netbeans.conf` file (located in the `etc` subfolder of the
    folder where the NetBeans environment is installed). Then, find the `netbeans_default_options`
    parameter and append the value `-J-Dfile.encoding=UTF-8` (UTF-8 encoding is used)
    by the space. If there are any problems, it is recommended to consult the NetBeans
    IDE Help. |


    What software to use depends on taste, personal preferences, and technical capabilities.
    The main thing is to check the performance of the program codes from the book.'
