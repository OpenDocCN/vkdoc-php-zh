    **Authenticating with Zend_Auth**


    In Chapter 4 we will be implementing the login and logout forms for our web application,
    but before we get to that we will take a look at how the login and logout process
    actually work. As mentioned previously, we will be using the Zend_Auth_Adapter_DbTable
    authentication adapter. Prior to using this adapter, you must already have a valid
    Zend_Db object.


    Because Zend_Auth_Adapter_DbTable is flexible and is designed to work with any
    database configuration, you must tell it how your storage is set up. Thus, you
    must include the following when instantiating it:


    • The name of the database table being used (our table is called users).


    • The column that holds the user identity (we are using the username column in
    the users table).


    • The column that holds the user credentials (we are using the password column).


    • And finally, the *treatment* used on the credentials. This is essentially a
    function that (if specified) wraps around the credentials. Remember that we are
    storing an MD5 hash of the password in the password column. Therefore, we pass
    md5(?) as this final argument.


    The question mark tells Zend_Db where to substitute in the password value.


    Once Zend_Auth_Adapter_DbTable is instantiated (we will use the variable name
    $adapter), we can set the identity (username) and credentials (password). To do
    this, we use setIdentity() and setCredential().


