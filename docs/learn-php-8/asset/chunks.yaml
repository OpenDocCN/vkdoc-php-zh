    breeds.xml\");\n$xmlText = $breed_file->asXML();\nif(stristr($xmlText, $value)\
    \ === FALSE)\n{\nreturn FALSE;\n}\nelse\n{\nreturn TRUE;\n}\n}\n}\n?>\n```\n\n\
    **示例 5-8**  \n带有验证功能的完整犬类类\n\n我们对检查 `dog_breed` 值合法性的代码行做了细微更改。\n\n```php\n((ctype_alpha($value))\
    \ && ($this->validator_breed($value) === TRUE) &&\nstrlen($value) dog_breed =\
    \ $value : $error_message = FALSE;\n```\n\n该语句将 `$value` 传递给 `validator_breed\
    \ ($this->validator_breed($value)`)。如果返回 `TRUE`，则 `if` 语句的这一部分为真；否则为假。如果整个 `if`\
    \ 语句为 `TRUE`，则 `dog_breed` 属性被设置为 XML 文件中找到的品种（`$this->dog_breed = $value`）。如果为假，则将\
    \ `FALSE` 传递给 `$error_message` 属性（`$error_message = FALSE`）。\n\n*编程提示——当你在同一个对象中调用函数时，必须使用\
    \ `$this` 指针（`$this->validator_breed($value) === TRUE))）。*\n\n我们现在已经完成了一个更加安全的程序。在大多数情况下，用户无法输入任何无效信息。他们唯一可以尝试输入无效信息的字段是\
    \ `dog_name` 字段。然而，即使他们试图输入程序代码或其他代码，服务器端程序也会剥离特殊字符，从而使代码变得无害。如果某个数据包嗅探程序在数据被服务器端程序接收之前试图更改数据，验证和/或过滤方法要么会导致数据被拒绝，要么同样会使数据变得无害。\n\
    \n该程序效率很高，因为它会在信息发送到服务器之前尝试进行验证。它减少了服务器和用户之间来回的通信量。完成后的程序具有两层结构（界面、业务规则），并且可以在不进行重大代码修改的情况下扩展出第三层（数据层）。\n\
    \n*编程建议——对于那些不常用的小型 Web 应用程序，没有必要像本例这样将程序拆分开。然而，如果这是一个未来可能会扩展，或者未来可能会增加大量用户的应用，那么在最初创建时就应考虑到这一点。*\n\
    \n**动手实践**\n\n1.  访问本书网站并运行示例程序。看看你是否能“攻破”程序中内置的安全机制。请记住，你只能尽力做到尽可能安全；没有任何东西是\
    \ 100%安全的。你是否成功向程序发送了影响其运行的有害信息？如果是，你做了什么？程序中可能缺少了什么才导致这种情况发生？如果没有，是什么阻止了你的有害数据破坏程序？你会对该程序做哪些修改，从而需要你引入一个数据层？程序中还存在哪些低效之处？你可以做些什么来修复它们？\n\
    \n## 依赖注入\n\n正如你所见，在创建程序时，开发者会经历多次迭代，最终才能完成应用程序。在此过程中，经验丰富的程序员会保留他们程序的不同版本。这使得程序员可以在当前版本出现太多重大问题时，快速回退到之前的版本。否则，他们就必须尝试在不破坏好代码的前提下剥离出“坏”的代码。应用程序包含许多文件（HTML、JavaScript、CSS、PHP\
    \ 类和 PHP 库）。跟踪哪个版本与哪个版本兼容，或者轻松地将程序的一个部分替换成另一个部分的新版本，可能会变得令人困惑，尤其是当文件名和类名被硬编码在程序本身的代码中时。\n\
    \n第 2 章简要讨论了*依赖注入*。它允许将要使用某段代码（例如一个类）的程序（客户端）在不了解其实际实现细节的情况下使用该代码。客户端程序并不知道实际的类名。\n"
- fmt: '你可以利用这一思路来辅助开发流程。接下来的示例虽非面向大型应用，但能让你直观感受依赖注入的优势。大型应用应使用 MVC（模型-视图-控制器）模型或成熟的分层（或组件）系统，以实现组件间更高效通信。


    *   **安全与性能**——在极致安全与最佳性能之间，常常需要权衡。后续示例在检查程序是否存在并调用`require_once`加载程序时，会执行多次系统调用。检查文件存在性能让程序优雅处理文件缺失，而非直接崩溃。后续章节将介绍使用`try/catch`块，使程序能捕获异常而不崩溃，从而减少系统调用次数（无需再检查文件是否存在），提升程序性能。


    `dog`应用使用了不同文件中的类和方法。因此代码中必须包含`require_once`语句来引入这些文件。当前设计将实际文件名写死在`require_once`语句中，这意味着除非修改代码，否则无法切换不同版本的文件。现在我们将移除这些依赖，为应用的未来开发提供更大灵活性。


    我们本可以通过修改 Web 服务器配置来实现灵活性。例如，在 Apache 中，可以声明别名目录并添加`DirectoryIndex`标签：


    ```

    ...

    DirectoryIndex lab.html

    DirectoryIndex lab.php

    ...

    ```


    如果一个 PHP 程序包含`require(“/lab”);`语句，系统会优先尝试加载`lab.html`文件（问题在于它并非`.php`文件）。如果文件不存在，则会尝试加载`lab.php`。这或许能成功。但如果两个文件都不存在，则会将目录内容列出。这种机制将控制权从程序中剥离，完全依赖于服务器配置文件与目录内容的匹配。一旦文件名变更，就必须重新配置服务器使用新文件名。本章示例虽然需要编写更多代码，但能将应用所使用文件的控制权与服务器或操作系统解耦。


    在深入代码之前，图 [5-3](#394210_2_En_5_Chapter.xhtml#Fig3) 展示了程序间的数据流关系。


    ![../images/394210_2_En_5_Chapter/394210_2_En_5_Fig3_HTML.jpg](images/394210_2_En_5_Chapter/394210_2_En_5_Fig3_HTML.jpg)


    图 5-3

    `dog`应用的数据流


    `dog_interface.php`程序将为`dog`应用的所有部分提供接口。此外，它还将提供安全性和过滤功能（如前面示例所设计）。除了这些功能外，`dog_interface`会创建并使用`dog_container`对象来包含、创建和传递所需的其他对象（无需知道对象的具体名称）。`dog_container`对象使用一个
    XML 文件（未展示）来发现它将创建的类文件的位置和名称（实现依赖注入）。


    应用将始终通过`dog_interface`程序来访问其他类。`dog_interface`程序会确定完成特定任务所需的类。每当需要某个类时，`dog_interface`会使用`dog_container`通过
    XML 文件确定该类的位置和名称，并创建该类的一个实例（对象）。通过使用 XML 文件来列出类文件名和位置，可以在不修改应用代码的情况下进行更改。


    当从`lab.html`页面请求品种选择框时，会调用`dog_interface`程序。该程序会创建一个`dog_container`对象。`dog_container`对象会查找`get_breeds`类文件和品种
    XML 文件的位置及文件名。找到后，`dog_container`对象会创建一个`get_breeds`对象。`get_breeds`对象随后构建选择框的代码，最终将代码返回到`lab.html`中的表单，呈现给用户。所有对象（`dog_container`和`get_breeds`）随后被销毁（从内存中移除）。


    当点击`lab.html`表单上的提交按钮时（假设所有验证通过），它会调用`dog_interface`程序。该程序会创建`dog_container`对象。`dog_container`对象会查找`dog.php`类文件的位置和文件名。找到后，`dog_container`对象会创建`dog`对象。`dog`对象的行为与先前示例完全一致（验证属性并显示属性）。`dog`对象完成后，对象（`dog_container`和`dog`）被销毁（从内存中移除）。这种设计实现了对象的完全独立，同时提供了双层设计（接口层与业务规则层）和依赖注入。


    ```

    dog3.php

    get_breeds2.php

    breeds.xml


    示例 5-9

    `dog_applications.xml`文件

    ```


    在示例 [5-9](#394210_2_En_5_Chapter.xhtml#PC20) 中，我们创建了一个简单的 XML 文件，用于管理 PHP 应用中重要文件的版本变更。每个`application`标签标识文件类型（`dog`、选择框、品种）。每个`application`标签内的`location`标签提供了文件名和位置（尽管本例中所有文件位于同一位置）。一旦我们调整程序来使用此文件，就可以灵活更改文件名（例如使用`dog3.php`代替`dog.php`）和位置，而无需修改任何程序代码。这有助于我们在开发过程中轻松地交换应用的版本。


    接下来，我们将创建一个`Dog_container`类，其中包含两个方法。`get_dog_application`方法用于“获取”XML 文件中列出的任何文件的名称为位置。`create_object`方法将创建`dog`类或`get_breeds`类的一个实例。'
  raw: "You can use this idea to help the development process. The example you\nare\
    \ about to look at is not for large-scale applications. However, it\ndoes give\
    \ you a chance to look at the benefits of dependency injection.\nLarge-scale applications\
    \ should use an MVC (Model-View-Control  ) model or an\nestablished tier (or component)\
    \ system that provides more efficient\ncommunication between components.\n\n*\
    \   *Security and performance—Many times there is a trade-off\n    between being\
    \ as secure as possible and having a program that has the\n    best performance\
    \ possible. The example that follows will make multiple\n    system calls when\
    \ it checks to see if a program exists and then\n    uses* *require_once* *to\
    \ load the program. The check for\n    file existence allows the program to handle\
    \ missing files rather than\n    the program just crashing. In a later chapter,\
    \ you will look at\n    using* *try/catch* *blocks to allow the program to capture\n\
    \    any problems without crashing the program. This would reduce the number\n\
    \    of system calls (you would no longer need to check for the existence of\n\
    \    the files), giving the program better performance.*\n\nThe `dog`\napplication\
    \  uses\nclasses and methods contained in different files. This requires the code\n\
    to also include `require_once`\nstatements to pull the files into the program.\
    \ The current design places\nthe actual file name in the `require_once`\nstatement.\
    \ This does not allow us to change different versions of the\nfiles unless we\
    \ change the code. We will now remove these dependencies\nto provide more flexibility\
    \ for future development of the\napplication.\n\nWe could have chosen to allow\
    \ flexibility by changing settings within\nthe web server. For example, in Apache,\
    \ we can declare an alias\ndirectory and include a DirectoryIndex tag.\n\n```\n\
    ...\n\nDirectoryIndex lab.html\nDirectoryIndex lab.php\n\n...\n```\n\nIf a PHP\
    \ program contained the statement `require(“/lab”);`, the\nsystem would first\
    \ try to load the lab.html file (a problem since it is\nnot a .php file). If the\
    \ file did not exist, it would attempt to load\nthe lab.php file. This might be\
    \ successful. However, if neither file\nexisted, then it would list the contents\
    \ of the directory. The control\nof what occurs is taken away from the program\
    \ and is completely\ndependent on the configuration file for the server matching\
    \ the contents\nin the directory. If a name change occurs, then the server must\
    \ be\nreconfigured with the new file name. The example shown in this chapter,\n\
    while requiring more code, keeps the control of files used in an\napplication\
    \ independent of the server or operating system used.\n\nBefore we get too bogged\
    \ down with the code, Figure [5-3](#394210_2_En_5_Chapter.xhtml#Fig3) shows the\
    \ flow\nof the relationship with the programs.\n\n![../images/394210_2_En_5_Chapter/394210_2_En_5_Fig3_HTML.jpg](images/394210_2_En_5_Chapter/394210_2_En_5_Fig3_HTML.jpg)\n\
    \nFigure 5-3\nData flow for the dog\napplication\n\nThe `dog_interface.php`\n\
    program will provide the interface for all parts of the `dog` application. In\n\
    addition, it provides security and filtering as you have already\ndesigned in\
    \ the previous examples. Along with these other activities,\n`dog_interface`\n\
    creates and uses the `dog_container` object\nto contain, create, and pass any\
    \ other objects needed (without knowing\nthe name of the objects). The `dog_container`\
    \ object\nuses an XML file (not shown) to discover the location and name of files\n\
    containing the classes it will create (providing dependency\ninjection).\nThe\
    \ application will always use the `dog_interface` program\nto access the other\
    \ classes. The `dog_interface`\nprogram  will\ndetermine what classes are needed\
    \ to accomplish a particular task.\nWhenever a class is needed, the `dog_interface`\
    \ will\nuse the `dog_container` to\ndetermine the name and location of the class\
    \ (via the XML file) and to\ncreate an instance of the class (object). By using\
    \ an XML file to list\nthe class file names and locations, changes can be made\
    \ without causing\nany code changes to programs in the application.\nWhen the\
    \ breed select box is requested from the `lab.htm`l page, the\n`dog_interface`\n\
    program  is\ncalled. It will create a `dog_container` object.\nThe `dog_container`\
    \ object\nwill discover the location and file name of the `get_breeds` class file\n\
    and the breeds XML file. Once it is discovered, the `dog_container` object\nwill\
    \ create a `get_breeds` object.\nThe `get_breeds`\nobject will then build the\
    \ code for the select box, eventually returning\nthe code to the form in `lab.html`\
    \ for display\nto the user. All objects (`dog_container` and\n`get_breeds`) are\n\
    then destroyed (removed from memory).\n\nWhen the Submit button is clicked on\
    \ the `lab.ht`ml form\n(assuming all validation is passed), it will call the `dog_interface`\n\
    program . This\nprogram will create the `dog_container` object.\nThe `dog_container`\
    \ object\nwill then discover the location and file name of the `dog.php` class\
    \ file.\nOnce discovered, the `dog_container` object\nwill create the `dog` object.\
    \ The `dog` object will\nbehave exactly as it has in previous examples (validating\
    \ properties and\ndisplaying properties). Once the `dog` object has\ncompleted,\
    \ the objects (`dog_container` and\n`dog`) are\ndestroyed (removed from memory).\
    \ This design allows complete\nindependence of the objects providing both two-tier\
    \ design (interface\nand business rules) and dependency injection.\n\n```\n\n\
    dog3.php\n\nget_breeds2.php\n\nbreeds.xml\n\nExample 5-9\nThe dog_applications.xml\
    \ file\n```\n\nIn Example [5-9](#394210_2_En_5_Chapter.xhtml#PC20), we have created\n\
    a simple XML file that will be used for version changes of the\nsignificant files\
    \ in the PHP application. Each `application` tag\nidentifies the type of file\
    \ (dog, select box, breeds). Each `location` tag within\nthe `application`\ntag\
    \ provides the file name and location (although in this example we\nhave all files\
    \ in the same location). Once we adjust the program to use this\nfile, we will\
    \ have the flexibility to change the file names (such as the\nexample using `dog3.php`\
    \ instead of\n`dog.php`) and\nthe location without having to change any program\
    \ code. This can help us\nto swap versions in/out of the application during the\
    \ development\nprocess.\n\nWe will now create a `Dog_container` class\nthat will\
    \ contain two methods. `get_dog_application`\nwill be used to “fetch” the name\
    \ and location of any of the files listed\nin the XML file. The `create_object`\
    \ method\nwill create an instance of either the dog class or the `get_breeds`\
    \ class."
  trans: '

    你可以利用这一思路来辅助开发流程。接下来的示例虽非面向大型应用，但能让你直观感受依赖注入的优势。大型应用应使用 MVC（模型-视图-控制器）模型或成熟的分层（或组件）系统，以实现组件间更高效通信。


    *   **安全与性能**——在极致安全与最佳性能之间，常常需要权衡。后续示例在检查程序是否存在并调用`require_once`加载程序时，会执行多次系统调用。检查文件存在性能让程序优雅处理文件缺失，而非直接崩溃。后续章节将介绍使用`try/catch`块，使程序能捕获异常而不崩溃，从而减少系统调用次数（无需再检查文件是否存在），提升程序性能。


    `dog`应用使用了不同文件中的类和方法。因此代码中必须包含`require_once`语句来引入这些文件。当前设计将实际文件名写死在`require_once`语句中，这意味着除非修改代码，否则无法切换不同版本的文件。现在我们将移除这些依赖，为应用的未来开发提供更大灵活性。


    我们本可以通过修改 Web 服务器配置来实现灵活性。例如，在 Apache 中，可以声明别名目录并添加`DirectoryIndex`标签：


    ```

    ...

    DirectoryIndex lab.html

    DirectoryIndex lab.php

    ...

    ```


    如果一个 PHP 程序包含`require(“/lab”);`语句，系统会优先尝试加载`lab.html`文件（问题在于它并非`.php`文件）。如果文件不存在，则会尝试加载`lab.php`。这或许能成功。但如果两个文件都不存在，则会将目录内容列出。这种机制将控制权从程序中剥离，完全依赖于服务器配置文件与目录内容的匹配。一旦文件名变更，就必须重新配置服务器使用新文件名。本章示例虽然需要编写更多代码，但能将应用所使用文件的控制权与服务器或操作系统解耦。


    在深入代码之前，图 5-3 展示了程序间的数据流关系。


    ![../images/394210_2_En_5_Chapter/394210_2_En_5_Fig3_HTML.jpg](img/394210_2_En_5_Fig3_HTML.jpg)


    图 5-3

    `dog`应用的数据流


    `dog_interface.php`程序将为`dog`应用的所有部分提供接口。此外，它还将提供安全性和过滤功能（如前面示例所设计）。除了这些功能外，`dog_interface`会创建并使用`dog_container`对象来包含、创建和传递所需的其他对象（无需知道对象的具体名称）。`dog_container`对象使用一个
    XML 文件（未展示）来发现它将创建的类文件的位置和名称（实现依赖注入）。


    应用将始终通过`dog_interface`程序来访问其他类。`dog_interface`程序会确定完成特定任务所需的类。每当需要某个类时，`dog_interface`会使用`dog_container`通过
    XML 文件确定该类的位置和名称，并创建该类的一个实例（对象）。通过使用 XML 文件来列出类文件名和位置，可以在不修改应用代码的情况下进行更改。


    当从`lab.html`页面请求品种选择框时，会调用`dog_interface`程序。该程序会创建一个`dog_container`对象。`dog_container`对象会查找`get_breeds`类文件和品种
    XML 文件的位置及文件名。找到后，`dog_container`对象会创建一个`get_breeds`对象。`get_breeds`对象随后构建选择框的代码，最终将代码返回到`lab.html`中的表单，呈现给用户。所有对象（`dog_container`和`get_breeds`）随后被销毁（从内存中移除）。


    当点击`lab.html`表单上的提交按钮时（假设所有验证通过），它会调用`dog_interface`程序。该程序会创建`dog_container`对象。`dog_container`对象会查找`dog.php`类文件的位置和文件名。找到后，`dog_container`对象会创建`dog`对象。`dog`对象的行为与先前示例完全一致（验证属性并显示属性）。`dog`对象完成后，对象（`dog_container`和`dog`）被销毁（从内存中移除）。这种设计实现了对象的完全独立，同时提供了双层设计（接口层与业务规则层）和依赖注入。


