- fmt: '```markdown

    The multiple-choice `<select>` list pulls the values from the `categories` table.
    Navigate to `blog_insert_mysqli_02.php` in the `ch16` folder to verify that the
    primary key of each category is correctly embedded in the `value` attribute of
