    Index.php


    We now need to create a script that will send rerouted requests to a controller/action.
    That file is, as you can guess, index.php. This is a simple task, and forms the
    bulk of the bootstrapping code we will need to create in this chapter.


    You might see bootstrapping code as an extension of the framework code we already
    created, but it is really the first application-specific code we will create.
    You see, the framework is largely complete, at this stage. It has the means of
    routing requests to controllers and loading models. It can persist those model
    structures (ORM data objects) to the database. We have created code to parse templates,
    code to manage cache and configuration files, even code to handle sessions and
    inspect class structures and store class instances. However, in order for our
    application to utilize these framework classes, it must first load them into memory
    and string them together. This is at the heart of the bootstrapping code we are
    about to create.


    There are a few framework classes that we can expect to use throughout our framework.
    The first step toward getting out application off the ground is to instantiate
    these classes and store them in the registry. We do this after establishing an
    application directory (so that our class loader knows where to start looking for
    the framework classes), and promptly dispatch the request thereafter. In terms
    of code, our index.php should look like that shown in Listing 13-2.


    ***Listing 13-2.*** Bootstrapping


    // 1\. define the default path for includes


    define("APP_PATH", dirname(dirname(__FILE__)));


    // 2\. load the Core class that includes an autoloader


    require("../framework/core.php");


    Framework\Core::initialize();


    // 3\. load and initialize the Configuration class


    $configuration = new Framework\Configuration(array(


    "type" = > "ini"


    ));


    Framework\Registry::set("configuration", $configuration- > initialize());


    // 4\. load and initialize the Database class – does not connect


    $database = new Framework\Database();


