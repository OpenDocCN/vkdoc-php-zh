  大会还通过（公开表决）投票选举他们中的哪些人进入董事会。任何寻求董事会职位的永久成员都必须向主席提交一份申请，说明他们的动机和拟议的贡献。如果候选人获得大会三分之二多数投票批准，他们便正式成为董事，不过是由董事会其他成员——而非大会——投票决定哪位董事担任哪个职位。换句话说，大会不能直接投票选举主席，只有大会批准的人才有机会成为协会主席。^(37)


  ### 故事仍在继续


  正如开头所述，Drupal 的历史远不止本文所涵盖的内容。除此之外，它还包含了 Drupal 的商业化成长、Drupal 作为企业级软件的演变，以及本书中隐含的
  Drupal 7 的发展历程。Drupal 是一个极其混乱的系统，却能产生出奇特功能的结果……就像自然一样。然而，它并非完全随机；本章所叙述的事件表明，影响 Drupal
  生态系统的关键行动帮助了 Drupal 社区所享有的成功。此外，很明显，这个不断发展的软件项目仍然对其历史进程和广度的改变持开放态度——也许是因为另一个笔误或服务器崩溃，也许是因为你。


