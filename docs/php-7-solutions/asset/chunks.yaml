  trans: "\n将左、右大括号放在单独的行上，或者像我这样对齐`=>`运算符并非必需，但这能让代码更易于阅读和维护。\n\n**提示**  \n简写语法和`array()`都允许在最后一个数组元素后面加一个尾随逗号。这同样适用于索引数组和关联数组。\n\
    \n## 创建空数组\n\n你可能想要创建一个空数组，原因有以下两个：\n\n-   创建（或**初始化**）一个数组，以便在循环内部向其添加元素\n- \
    \  清除现有数组中的所有元素\n\n要创建一个空数组，只需使用一对空方括号：\n\n```\n$shoppingList = [];\n```\n\n或者，使用不带参数的`array()`，像这样：\n\
    \n```\n$shoppingList = array();\n```\n\n`$shoppingList`数组现在不包含任何元素。如果你使用`$shoppingList[]`添加一个新元素，它将自动从\
    \ 0 开始重新编号。\n\n## 多维数组\n\n数组元素可以存储任何数据类型，包括其他数组。你可以创建一个数组的数组——换句话说，就是一个多维数组——其中包含几本书的详细信息，就像这样（使用简写语法）：\n\
    \n```\n$books = [\n[\n'title'     => 'PHP 7 Solutions: Dynamic Web Design Made\
    \ Easy, Fourth Edition',\n'author'    => 'David Powers'\n],\n[\n'title'     =>\
    \ 'Learn PHP 7',\n'author'    => 'Steve Prettyman'\n]\n];\n```\n\n这个示例展示了嵌套在索引数组内的关联数组，但多维数组可以嵌套任何类型。要引用特定元素，请使用两个数组的键，例如：\n\
    \n```\n$books[1]['author']  // 值为 'Steve Prettyman'\n```\n\n处理多维数组并不像乍看起来那么困难。秘诀是使用循环来进入嵌套数组。然后，你就可以像处理普通数组一样处理它。这就是处理数据库搜索结果的方式，结果通常包含在一个多维数组中。\n\
    \n## 使用 `print_r()` 检查数组\n\n像这样将数组传递给 `print_r()`，可以在测试期间检查其内容（参见 `inspect_array.php`）：\n\
    \n```\nprint_r($books);\n```\n\n通常，切换到源代码视图查看详细信息会更有帮助，因为浏览器会忽略底层输出中的缩进。\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figd_HTML.jpg](img/332054_4_En_4_Figd_HTML.jpg)\n\
    \n**提示**  \n始终使用`print_r()`来检查数组。`echo`和`print`不起作用。要在网页中显示数组的内容，请使用`foreach`循环，如本章后面所述。\n\
    \n## PHP 眼中的真相\n\n在 PHP 条件语句中进行决策，是基于`true`和`false`这两个互斥的布尔值。如果条件等于`true`，则执行条件块内的代码。如果为`false`，则忽略该代码。一个条件为`true`还是`false`，通过以下方式之一确定：\n\
    \n-   变量显式设置为布尔值之一\n-   PHP 隐式解释为`true`或`false`的值\n-   两个非布尔值的比较\n\n### 显式布尔值\n\
    \n如果变量被赋值为`true`或`false`，并在条件语句中使用，则决策基于该值。关键字`true`和`false`不区分大小写，且不得用引号括起来，例如：\n\
    \n```\n$ok = false;\nif ($ok) {\n// 执行某些操作\n}\n```\n\n条件语句内的代码不会被执行，因为`$ok`是`false`。\n\
    \n### 隐式布尔值（“真值”和“假值”）\n\n使用隐式布尔值提供了一种便捷的简写方式，尽管它的缺点是——至少对初学者来说——不够清晰。隐式布尔值——有时也称为“真值”和“假值”——依赖于\
    \ PHP 对其视为`false`的相对狭窄的定义，即：\n\n-   不区分大小写的关键字`false`和`null`\n-   零作为整数（`0`）、浮点数（`0.0`）或字符串（`'0'`\
    \ 或 `\"0\"`）\n-   空字符串（单引号或双引号之间没有空格）\n-   空数组\n-   从空标签创建的 SimpleXML 对象\n\n其他所有内容都是`true`。\n\
    \n**提示**  \n这解释了为什么 PHP 将 `\"false\"`（带引号）解释为`true`。它是一个字符串，而所有字符串——除了空字符串——都是`true`。另请注意，`–1`与其他任何非零数字一样被视为`true`。\n\
    \n## 通过比较两个值进行决策\n\n许多`true/false`决策是基于使用**比较运算符**对两个值进行比较。表 4-6 列出了 PHP 中使用的比较运算符。\n\
    \n**表 4-6. 用于决策的 PHP 比较运算符**\n\n| 符号 | 名称 | 示例 | 结果 |\n| --- | --- | --- | ---\
    \ |\n| `==` | 等于 | `$a == $b` | 如果 `$a` 和 `$b` 相等，返回 `true`；否则返回 `false` |\n|\
    \ `!=` | 不等于 | `$a != $b` | 如果 `$a` 和 `$b` 不同，返回 `true`；否则返回 `false` |\n| `===`\
    \ | 全等 | `$a === $b` | 确定 `$a` 和 `$b` 是否全等。它们不仅值必须相同，而且数据类型也必须相同（例如，都是整数） |\n\
    | `!==` | 不全等 | `$a !== $b` | 确定 `$a` 和 `$b` 是否不全等（依据与上一个运算符相同的标准） |\n| `>` |\
    \ 大于 | `$a > $b` | 如果 `$a` 大于 `$b`，返回 `true` |\n| `>=` | 大于或等于 | `$a >= $b` |\
    \ 如果 `$a` 大于或等于 `$b`，返回 `true` |\n| `<` | 小于 | `$a < $b` | 如果 `$a` 小于 `$b`，返回\
    \ `true` |\n| `<=` | 小于或等于 | `$a <= $b` | 如果 `$a` 小于或等于 `$b`，返回 `true` |\n| `<=>`\
    \ | 飞船 | `$a <=> $b` | 如果 `$a` 小于 `$b`，返回小于零的整数；如果 `$a` 大于 `$b`，返回大于零的整数；如果 `$a`\
    \ 和 `$b` 相等，返回零 |\n\n正如你将在第 9 章中看到的，飞船运算符对于自定义排序非常有用。它的名字来源于该运算符起源地 Perl 相关书籍的作者。他认为这比不断提及“小于-等于-或-大于运算符”要简单。\n\
    \n**警告**  \n单个等号不执行比较；它执行赋值。在比较两个值时，始终使用等于运算符（`==`）、全等运算符（`===`）或它们的否定形式（`!=`\
    \ 和 `!==`）。\n\n## 测试多个条件\n\n通常，比较两个值是不够的。PHP 允许你使用**逻辑运算符**设置一系列条件，以指定是需要满足所有条件还是仅需满足部分条件。\n\
    \nPHP 中最重要的逻辑运算符列于表 4-7。逻辑非运算符适用于单个条件，而非一系列条件。\n\n**表 4-7. PHP 中用于决策的主要逻辑运算符**\n\
    \n| 符号 | 名称 | 示例 | 结果 |\n| --- | --- | --- | --- |\n| `&&` | 与 | `$a && $b` |\
    \ 如果 `$a` 和 `$b` 都为 `true`，则结果为 `true` |\n| `||` | 或 | `$a || $b` | 如果 `$a` 或\
    \ `$b` 中有一个为 `true`，则结果为 `true`；否则为 `false` |\n| `!` | 非 | `!$a` | 如果 `$a` *不*为\
    \ `true`，则结果为 `true` |\n\n从技术上讲，可测试的条件数量没有限制。每个条件从左到右依次被考虑，一旦达到决定点，就不再执行进一步的测试。使用`&&`时，每个条件都必须满足，因此一旦一个条件结果为`false`，测试就会停止。类似地，使用`||`时，只需满足一个条件，因此一旦一个条件结果为`true`，测试就会停止。\n\
    \n```\n$a = 10;\n$b = 25;\nif ($a > 5 && $b > 20) // 返回 true\nif ($a > 5 || $b\
    \ > 30) // 返回 true，$b 从未被测试\n```\n"
- fmt: "# 排版后内容\n\nAlways design tests to provide the speediest result. If all conditions\
    \ must be met, evaluate the one most likely to fail first. If only one condition\
    \ needs to be met, evaluate the one most likely to succeed first. If a set of\
    \ conditions needs to be considered as a group, enclose them in parentheses, as\
    \ follows:\n\n```\nif (($a > 5 && $a < 10) || ($a > 20 && $b < 40))\n```\n\n##\
    \ Note\n\nPHP also uses `AND` in place of `&&` and `OR` in place of `||`. However,\
    \ `AND` and `OR` have much lower precedence that can lead to unexpected results.\
    \ To avoid problems, it’s advisable to stick with `&&` and `||`.\n\n## Using the\
    \ switch statement for decision chains\n\nThe `switch` statement offers an alternative\
    \ to `if ... else` for decision-making. The basic structure looks like this:\n\
    \n```\nswitch(variable being tested) {\ncase value1:\n    statements to be executed\n\
    \    break;\ncase value2:\n    statements to be executed\n    break;\ndefault:\n\
    \    statements to be executed\n}\n```\n\nThe `case` keyword indicates possible\
    \ matching values for the variable passed to `switch()`. Each alternative value\
    \ must be preceded by `case` and followed by a colon. When a match is made, every\
    \ subsequent line of code is executed until the `break` or `return` keyword is\
    \ encountered, at which point the `switch` statement comes to an end. A simple\
    \ example follows:\n\n```\nswitch($myVar) {\ncase 1:\n    echo '$myVar is 1';\n\
    \    break;\ncase 'apple':\ncase 'orange':\n    echo '$myVar is a fruit';\n  \
    \  break;\ndefault:\n    echo '$myVar is neither 1 nor a fruit';\n}\n```\n\nThe\
    \ main points to note about `switch` are as follows:\n\n*   The expression following\
    \ the `case` keyword is normally a number or a string. You can’t use a complex\
    \ data type like an array or object.\n*   To use comparison operators with `case`,\
    \ you must repeat the expression being tested. For example, `case > 100:` won’t\
    \ work, but `case $myVar > 100:` will. There’s a practical example of this situation\
    \ in PHP Solution 8-4 “Joining an array with commas” in Chapter [8](#332054_4_En_8_Chapter.xhtml).\n\
    *   Every subsequent case will also be executed, unless you end a case with `break`\
    \ or `return`.\n*   You can group several instances of the `case` keyword together\
    \ to apply the same block of code to all of them. So, in the preceding example,\
    \ if `$myVar` is “apple” or “orange,” the following line will be executed.\n*\
    \   If no match is made, any statements following the `default` keyword are executed.\
    \ If no default has been set, the `switch` statement exits silently and continues\
    \ with the next block of code.\n\n## Using the Ternary Operator\n\nThe ternary\
    \ operator (`?:`) is a shorthand method of representing a conditional statement.\
    \ Its name comes from the fact that it normally uses three operands. The basic\
    \ syntax looks like this:\n\n```\ncondition ? value if true : value if false;\n\
    ```\n\nHere is an example of it in use:\n\n```\n$age = 17;\n$fareType = $age >=\
    \ 16 ? 'adult' : 'child';\n```\n\nThe second line tests the value of `$age`. If\
    \ it’s greater than or equal to 16, `$fareType` is set to `adult`, otherwise `$fareType`\
    \ is set to `child`. The equivalent code using `if ... else` looks like this:\n\
    \n```\nif ($age >= 16) {\n    $fareType = 'adult';\n} else {\n    $fareType =\
    \ 'child';\n}\n```\n\nThe `if ... else` version is easier to read, but the ternary\
    \ operator is more compact. Most beginners hate this shorthand, but once you get\
    \ to know it, you’ll realize how convenient it can be.\n\nYou can leave out the\
    \ value between the question mark and the colon. This has the effect of assigning\
    \ the value of the condition to the variable if the condition is true. The preceding\
    \ example could be rewritten like this:\n\n```\n$age = 17;\n$adult = $age >= 16\
    \ ?: false; // $adult is true\n```\n\nIn this case, the expression before the\
    \ question mark is a comparison, so it can equate to only `true` or `false`. However,\
    \ if the expression before the question mark is “truthy” (implicitly true), the\
    \ value itself is returned. For example:\n\n```\n$age = 17;\n$years = $age ?:\
    \ 'unknown';  // $years is 17\n```\n\nThe problem with the preceding example is\
    \ that if the variable being used as the condition hasn’t been defined, it generates\
    \ an error. A better solution is to use the null coalescing operator as described\
    \ in the next section.\n\n## Setting a default value with the null Coalescing\
    \ Operator\n\nThe null coalescing operator was introduced in PHP 7.0 as a convenient\
    \ way of assigning a default value to a variable when another variable—such as\
    \ one containing user input from an online form—hasn’t been defined. The operator\
    \ consists of two question marks (`??`) and is used like this:\n\n```\n$greeting\
    \ = $_GET['name'] ?? 'guest';\n```\n\nThis attempts to set the value of `$greeting`\
    \ to whatever is stored in `$_GET['name']`. But if `$_GET['name']` hasn’t been\
    \ defined—in other words, it’s null—the value after the `??` (`'guest'`) is used\
    \ instead. The null coalescing operator can be chained like this:\n\n```\n$greeting\
    \ = $_GET['name'] ?? $nonexistent ?? $undefined ?? 'guest';\n```\n\nPHP tests\
    \ each value in turn and assigns the first non-null one to the variable.\n\n###\
    \ Caution\nThe null coalescing operator rejects only **null** values—in other\
    \ words, variables that don’t exist or have been explicitly set to `null`. In\
    \ the preceding examples, `$_GET['name']` would be set to an empty string if a\
    \ form were submitted without entering a value in a field called `name`. Although\
    \ PHP treats this as `false`, it’s not `null`. Consequently, `$greeting` would\
    \ be set to an empty string.\n\n## Executing code repeatedly with a loop\n\nA\
    \ **loop** is a section of code that is repeated until a certain condition is\
    \ met. Loops are often controlled by setting a variable that counts the number\
    \ of iterations. By incrementing the variable each time, the loop comes to a halt\
    \ when the variable gets to a preset number. Loops are also controlled by running\
    \ through each item of an array. When there are no more items to process, the\
    \ loop stops. Loops frequently contain conditional statements, so although they’re\
    \ very simple in structure, they can be used to create code that processes data\
    \ in often sophisticated ways.\n\n### Loops using While and Do...While\n\nThe\
    \ simplest type of loop is called a `while` loop. Its basic structure looks like\
    \ this:\n\n```\nwhile (condition is true) {\n    do something\n}\n```\n\nThe following\
    \ code displays every number from 1 through 100 in a browser (you can test it\
    \ in `while.php` in the files for this chapter). It begins by setting a variable\
    \ (`$i`) to 1 and then uses the variable as a counter to control the loop, as\
    \ well as displays the current number onscreen.\n\n```\n$i = 1;  // set counter\n\
    while ($i <= 100) {\n    echo \"$i<br>\";\n    $i++; // increase counter by 1\n\
    }\n```\n\n#### Tip\nIn the previous chapter, I warned against using variables\
    \ with cryptic names. However, using `$i` as a counter is a common convention.\
    \ If `$i` is already in use, the normal practice is to use `$j` or `$k` as counters.\n\
    \nA variation of the `while` loop uses the keyword `do` and follows this basic\
    \ pattern:\n\n```\ndo {\n    code to be executed\n} while (condition to be tested);\n\
    ```\n\nThe difference between a `do...while` loop and a `while` loop is that the\
    \ code within the `do` block is executed at least once, even if the condition\
    \ is never true. The following code (in `dowhile.php`) displays the value of `$i`\
    \ once, even though it’s greater than the maximum expected.\n\n```\n$i = 1000;\n\
    do {\n    echo \"$i\";\n    $i++; // increase counter by 1\n} while ($i <= 100);\n\
    ```\n\nThe danger with `while` and `do...while` loops is forgetting to set a condition\
    \ that brings the loop to an end or setting an impossible condition. This is known\
    \ as an **infinite loop** that either freezes your computer or causes the browser\
    \ to crash.\n\n### The versatile for loop\n\nThe `for` loop is less prone to generating\
    \ an infinite loop because all the conditions of the loop are declared in the\
    \ first line. The `for` loop uses the following basic pattern:\n\n```\nfor (initialize\
    \ loop; condition; code to run after each iteration) {\n    code to be executed\n\
    }\n```"
