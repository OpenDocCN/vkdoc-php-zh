- "# Mac OSX 安装\n\n**作者：Dani Nordin**\n\n要在 Mac 平台上使用 MAMP 搭建 Drupal 环境，首先在 `mamp.info`\
  \ 下载 MAMP 的免费版本（左侧图标，参见图 H-1）。文件下载完成后，解压缩并点击解压后的文件启动安装程序。\n\n![images](img/Apph-01.jpg)\n\
  \n***图 H-1.** `mamp.info` 的截图。你需要选择左侧的图标。*\n\nMAMP 本质上会将你电脑中的一个文件夹变为一个微型开发服务器；因此，你在本地开发的所有站点实际上都是该主文件夹的子文件夹。务必确保将主文件夹的位置设置为你文件系统中一个合理的位置，并定期备份该文件夹。\n\
  \n要启动 MAMP，请执行以下步骤：\n\n1.  点击程序坞中的 MAMP 图标。这将启动 MySQL 服务器和 PHP。\n2.  忽略它打开的浏览器窗口，返回\
  \ MAMP 屏幕（参见图 H-2）。\n\n    ![images](img/Apph-02.jpg)\n\n    ***图 H-2.** MAMP 主屏幕*\n\
  \n3.  点击“偏好设置”按钮，进入“Apache”标签页。将文档根目录（后续称为“web 根目录”）设置为适合你文件系统的位置。\n\n    ![images](img/Apph-03.jpg)\n\
  \n    ***图 H-3.** 为 MAMP 设置默认文档根目录*\n\n从图 H-3 可以看到，我将主文件夹设置在了一个 Dropbox 文件夹内。Dropbox（可在\
  \ `getdropbox.com` 获取）允许你免费存储高达 2GB 的数据，并且所有数据都会在每次更改时通过网络同步。如果你没有大量的大文件需要存储，Dropbox\
  \ 是一种简便的方法，可以让你无论使用哪台机器都能访问你的数据。\n\n## 下载 Drupal 核心文件\n\n接下来，从 `http://drupal.org/project/drupal`（或\
  \ `drupal.org/start`）下载 Drupal 核心安装文件。将该文件解压到你之前在 MAMP 中设置的文档根目录中，并将解压后的文件夹名称更改为\
  \ DGD7 或类似名称。\n\n### 命令行操作\n\n以下是下载 Drupal 并准备运行 Web 安装程序的命令行步骤。将代码中的 `drupal-7.0`\
  \ 替换为 Drupal 7 当前稳定版本的编号，你可以在 [`http://drupal.org/project/drupal`](http://drupal.org/project/drupal)\
  \ 找到。更好的方法是，在开始之前就从网站上复制链接！\n\n![images](img/square.jpg) **注意** 请在 web 根目录下执行此操作。由\
  \ ** 括起来的注释描述了实际发生的情况。\n\n```\nwget http://ftp.drupal.org/files/projects/drupal-7.0.tar.gz\n\
  \        **从提供的链接下载文件**\ntar -xzf drupal-7.0.tar.gz\n        **将其从压缩文件中解压**\nmkdir\
  \ ~/dgd7\n        **创建一个名为 dgd7 的新目录**\nmv drupal-7.0 ~/dgd7/web\n        **将 Drupal\
  \ 文件夹移动到 dgd7 目录中**\ncd ~/dgd7/web\n        **导航到新目录**\n```\n\n### 创建数据库\n\n要安装\
  \ Drupal，你需要在本地 MySQL 服务器上创建一个数据库。你可以使用 phpMyAdmin 创建数据库，该工具是免费的，可在 `phpmyadmin.net`\
  \ 获取。或者，使用 Navicat（一款付费软件，可在 `navicat.com` 获取），这是我发现的处理数据库最简单的方法之一。尽管高级版软件价格较高（并且在需要启动上线时，用于在多个服务器上复制或同步数据库非常重要），你可以在\
  \ `navicat.com/en/download/download.html` 下载一个名为 Navicat Lite 的免费版本，该版本同时适用于 Windows\
  \ 和 Mac。你也可以免费试用 Navicat 30 天。\n\n为本演示之目的，我将使用 Navicat Premium，但 Navicat Lite 中的流程基本相同。\n\
  \n1.  打开 Navicat 并选择“连接” ![images](img/U001.jpg) “新建连接” ![images](img/U001.jpg)\
  \ “MySQL”。\n2.  按如下方式创建设置：主机名为 `localhost`，用户名和密码均为 `root`。如果你保持 MAMP 默认端口不变，端口可能是\
  \ 8888。在我的设置中，它已被改为 8889（参见图 H-4）。\n\n    ![images](img/Apph-04.jpg)\n\n    ***图\
  \ H-4.** Navicat 的连接设置*\n\n3.  创建连接后，双击左栏中的连接名称打开它。右键单击连接名称，从菜单中选择“新建数据库”。将数据库命名为\
  \ `dgd7`。\n\n就这样，完成了。看有多简单？\n\n### 创建数据库的命令行步骤\n\n以下是创建 MySQL 数据库的命令行说明。由 ** 括起来的注释解释了发生的情况。请记住，你将使用“终端”在\
  \ web 根目录下执行此操作。\n\n```\n$ mysql -u root -p\n        **登录到 web 根目录**\nmysql> CREATE\
  \ DATABASE dgd7;\n**创建一个名为 \"dgd7\" 的数据库**\nmysql> GRANT ALL PRIVILEGES ON database.*\
  \ TO \"username\"@\"localhost\" IDENTIFIED BY...\n  \"password\";\n        **正如其所述**\n\
  mysql> FLUSH PRIVILEGES;\n        **此操作亦然**\nmysql> EXIT;\n        **此操作亦然**\n```\n\
  \n你需要为斜体部分填写你自己的值。对于 `root`，请使用你数据库的管理员用户名（通常为 `root`）。（在某些设置中，默认情况下 root 密码可能为空。）对于数据库名称，你可以保持简单，命名为\
  \ `dgd7`。为了使事情更简单，将数据库用户也命名为 `dgd7`。此情况下的主机名将是 `localhost`，并且由于在你自己的电脑上安全不是问题，请继续将密码也设置为\
  \ `dgd7`。\n\n\n\n"
- '# 开始安装：好戏开场了


  创建好数据库后，在浏览器中访问 `localhost:8888/dgd7`。这应该会带你到 `localhost:8888/dgd7/install.php`。暂时选择标准安装配置；它会为你处理一些基本设置（参见图
  H-5）。在下一页，选择英语作为安装语言。如果你需要用其他语言安装，该页面上有一个方便的链接会告诉你如何操作。


  ![images](img/Apph-05.jpg)


  **图 H-5.** Drupal 安装界面


  现在该使用你刚刚创建的数据库信息了。在接下来的界面中，输入你在创建数据库时提供的值。


  提交表单。Drupal 将在几分钟内自行安装。当安装程序完成后，你将能够填写一些基本的站点详细信息，以及管理员用户账户的用户名和电子邮件地址（参见图 H–6 和
  H–7）。


  ![images](img/Apph-06.jpg)


  **图 H-6.** 设置站点默认值


  ![images](img/Apph-07.jpg)


  **图 H-7.** 数据库设置


  ![images](img/square.jpg) **注意** 安装过程中创建的第一个用户被授予在站点上执行所有操作的权限——永久有效。因此，强烈建议永远不要将此用户作为你的个人账户使用。相反，应将其用作“超级用户”或管理员账户，并为其设置一个强密码。该站点目前可能只在你自己的电脑上，但当你将其迁移到线上时，你需要保留这些用户账户。Drupal
  要求所有站点用户的电子邮件地址唯一，因此如果你只有一个电子邮件地址，最好创建第二个电子邮件账户，例如 `admin.user@gmail.com`，专门用于超级用户账户。


  ![images](img/Apph-08.jpg)


  **图 H-8.** 你的新主页，包含 Drupal 管理菜单


  恭喜！你现在拥有了一个空的 Drupal 站点，可以准备添加内容了（参见图 H-8）。前往第 1 章开始构建一个新站点。


  ![images](img/square.jpg) **提示** 有关在 Mac OS X 上安装 Drupal 的读者笔记，请访问 `dgd7.org/mac`。


  '
- "# 附 录 I\n\n![images](img/squ.jpg)\n\n## 使用 Acquia Dev Desktop 设置 Drupal 环境\n\n\
  **作者：Ed Carlevale**\n\nAcquia 的 Dev Desktop 应用程序有许多优点。下载安装程序（参见图 I-1），在 10 分钟内，你的服务器、数据库和第一个\
  \ Drupal 站点就能启动并运行。只需点击一下即可访问 phpMyAdmin。创建任意数量的全新安装。通过转储数据库并将 `sql` 文件导入到新安装中来克隆站点。优雅、简单且功能强大。\n\
  \n![images](img/AppI-01.jpg)\n\n**图 I-1**. Acquia 提供的 Drupal 堆栈安装程序\n\n![images](img/square.jpg)\
  \ **注意** Dev Desktop 适用于 Mac 和 Windows。我只使用过 Mac 版本，而且发现它非常好用。据说适用于 Windows 的 Drupal\
  \ 6 版本有点问题，不过这些问题可能在 Drupal 7 版本中已经得到解决。\n\n### 安装\n\n从 Acquia 网站（`acquia.com/downloads`）以磁盘映像文件的形式下载\
  \ Dev Desktop。\n\n点击文件以展开磁盘映像并打开安装程序。\n\n双击图标启动安装过程。\n\n安装程序将引导你完成一系列关于文件位置、端口设置和默认站点设置的屏幕（参见图\
  \ I-2）。默认设置就是你需要的。Drupal 站点设置用于你创建的第一个站点，但你可以修改任何你创建的子站点或导入站点的设置。\n\n![images](img/AppI-02.jpg)\n\
  \n**图 I-2.** Dev Desktop 安装的默认设置\n\n![images](img/square.jpg) **注意** 你可以设置 Dev Desktop\
  \ 的多个副本（在你的硬盘、便携式硬盘、Dropbox 等上）。只需重复安装过程并相应地修改设置即可。对于端口设置，增加默认设置（例如 8082, 8083 等）。\n\
  \n当安装过程完成后，安装程序会请求权限来创建你的第一个网站。点击是。这将启动 Dev Desktop 的控制面板（参见图 I-3）并打开一个新的浏览器窗口，显示你新网站的欢迎界面（参见图\
  \ I-4）。使用你在设置期间提供的用户名和密码登录。\n\n![images](img/AppI-03.jpg)\n\n**图 I-3**. Dev Desktop\
  \ 的控制面板\n\n![images](img/AppI-04.jpg)\n\n**图 I-4**. 堆栈安装程序第一个网站的登录界面\n\n### 更进一步\n\
  \nDev Desktop 的真正强大之处在于创建更多站点是多么容易。你有两个选择：\n\n1.  在你的主安装上创建子站点——或者用 Drupal 术语来说，是多站点。子站点会创建一个新的数据库，但使用你原始安装的文件和模块。\n\
  2.  创建一个新的、独立的 Drupal 7 安装。这对于使用安装配置文件来说非常理想。\n\n前者快速，后者强大。两全其美。\n\n所有这些操作都可以通过\
  \ Dev Desktop 的控制面板完成，从今以后它将成为你最好的朋友。在这里，你可以打开 phpMyAdmin，导航到任何你创建的站点，或创建新站点（参见图\
  \ I-5）。\n\n![images](img/AppI-05.jpg)\n\n**图 I-5.** 控制面板链接\n\n#### 创建子站点\n\n要创建当前安装的子站点，从控制面板开始，转到“设置”\
  \ ![images](img/U001.jpg) “站点” ![images](img/U001.jpg) “新建”。这将打开如图图 I-6 所示的表单。填写站点名称。数据库和子服务器会自动填写，其他设置则沿用你在安装过程中提供的默认值。点击确定。大约一分钟后，新站点就创建好了。点击“转到”按钮在新浏览器窗口中打开该站点。\n\
  \n更多关于多站点的信息，请参阅 Drupal 的在线文档（`drupal.org/node/53705`）。\n\n![images](img/AppI-06.jpg)\n\
  \n**图 I-6.** 创建子站点\n\n![images](img/square.jpg) **注意** 在 Drupal 6 版本的 Dev Desktop\
  \ 中，某些贡献模块被从它们的默认位置（`/sites/all/modules`）移到了核心模块文件夹（`modules/acquia`）内的一个文件夹中，从而使模块更新变得复杂。对于\
  \ Drupal 7 版本，一些贡献模块被放置在 Profiles 文件夹中（参见图 I-7），但新的“自动更新”功能可以在后台高效且不显眼地处理更新。\n\n\
  ![images](img/AppI-07.jpg)\n\n**图 I-7**. Dev Desktop 主 Drupal 安装及其关联子站点的目录结构\n\n\
  #### 导入站点\n\n“导入”选项非常适合与安装配置文件一起使用。只需下载安装文件，将其解压缩到一个方便的文件夹中，并确保它位于存储 Dev Desktop\
  \ 主 Drupal 安装的文件夹之外。然后，导航到“设置” ![images](img/U001.jpg) “站点” ![images](img/U001.jpg)\
  \ “导入”（参见图 I-8）。\n\n![images](img/AppI-08.jpg)\n\n**图 I-8**. 导入新的 Drupal 安装\n\n\
  有关安装配置文件的更多信息，请参阅第 38 章。前往第 1 章开始构建一个新站点。\n\n![images](img/square.jpg) **注意** 有关使用\
  \ Acquia 的 Dev Desktop 运行 Drupal 的更新和讨论，请参见 `dgd7.org/stack`。当然，对于本书整体的更正和新材料，请查看\
  \ `dgd7.org/updates`。\n\n#### 索引\n\n\n\n### 特殊字符与数字\n\n`#access` 属性，338\n\n`#ajax`\
