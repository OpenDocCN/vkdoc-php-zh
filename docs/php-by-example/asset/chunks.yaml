    Sheets) formatting can be used in the document. The document may also contain
    JavaScript scripts. In the latter case, the browser executes these scripts. So,
    the server sends a set of commands, and the browser executes them. The important
    thing is that the commands are executed on the same computer that made the request.


    Note


    The server tells what to do, and the client’s browser performs the necessary operations.
    Convenient but not always safe.


    So, where is the place for PHP in this scheme? The answer is at the stage of processing
    the request by the server. When the server receives a request from a client, it
    processes the request, and while processing it, scripts can be executed—in this
    case, PHP scripts.


    | Details |

    | --- |

    | Often, the script’s output is a generated HTML code passed to the client. |


    But that is not all. Many programs try to exchange information over the network.
    Processes on a client send signals to processes on a server and back, and you
    need to know which signal is for which process. For that purpose, you use ports.
    Ports are unique integer identifiers the processes use to identify the signals
    sent to them. Therefore, requests from the client’s browser and server responses
    must be synchronized by ports. That is, to work effectively with PHP, you need
    to solve quite a few technical problems. All that is considered step by step,
    as necessary.


    ## How to Execute the PHP Code


    Let’s take the next step in studying PHP. Namely, focusing on how to execute a
    program written in PHP. If you are talking about the “natural” way of using PHP
    code, you would need a server and a client. That is two computers. The script
    (the program) is hosted on the server, and you can view the result of the program
    execution by accessing the web page on the server through the client browser.
    But even if all these resources are available, the described strategy is not very
    convenient since you need to edit the program on one computer (the server) and
    check the result on another computer (the client). So, it is clear that you would
    like to have a more reliable strategy.


    An alternative way is to “trick” the browser. Namely, you can create an illusion
    that the server is a client itself. It’s about using a *local server*. It is easy
    to switch to that mode. The advantage of the approach is that the program and
    its result are localized within the same computer.


    On the other hand, PHP code can be executed using an interpreter— that is, approximately
    the same as in the case of other interpreted languages. That is probably the easiest
    way to see what the result of running a program is. Nevertheless, you should not
    forget that PHP programs are not written to be executed by the interpreter on
    the client’s computer. So, there will be some tricks, too.'
  trans: "  \n## 客户端与服务器  \n\n概而言之，以下是网站在网络中呈现的示意图。在此场景中，主要“角色”是您用于查看网页的计算机和存储该页面的计算机。第一台计算机（您查看网页所用的计算机）称为*客户端*，而存储网页的计算机称为*服务器*。\
    \  \n\n这两台计算机通过全球网络建立连接，因此可以相互发送信息。您在客户端计算机上操作并希望查看某个网页。为此，您需要运行一个专门用于查看网页的程序，该程序称为*浏览器*。打开浏览器（例如\
    \ Chrome、Opera 或 Edge），在地址栏中输入您要查看的网站地址。浏览器随即向服务器发起请求。服务器接收请求、处理请求，并将响应返回给客户端。响应中包含文档代码，浏览器应将其显示在客户端屏幕上。“交互”的总体方案如图\
    \ I-1 所示。  \n\n| 详细信息 |\n| --- |\n| **您可以使用** `php -v` **命令行指令检查 PHP 版本。要获取 PHP\
    \ 帮助，请使用** `php -h` **命令。通过** `php -i` **命令可获取关于 PHP 的更多信息。**<br>**如果您使用 Windows\
    \ 操作系统，可以在 Windows 资源管理器的地址栏中输入** `cmd` **指令以切换到终端模式。随后，需在终端窗口中切换到 PHP 目录。例如，如果\
    \ PHP 位于** `C:\\PHP` **文件夹中，则相应的命令为** `cd C:\\PHP`**。另一种方法是先导航至 PHP 目录，然后在资源管理器地址栏中输入**\
    \ `cmd` **指令。**<br>**许多 Linux 家族操作系统都预装了 PHP。但若未安装，您可以使用** `sudo apt install php`\
    \ **命令进行安装。** |\n\n![](img/613529_1_En_BookFrontmatter_Fig1_HTML.jpg)  \n\n示意图展示了计算机设备，以及表示客户端与服务器之间连接的流向。\
    \  \n\n**图 I-1** 客户端与服务器交互示意图  \n\n浏览器处理 HTML 格式的文档（缩写源自超文本标记语言）。文本中包含特殊标记。浏览器“理解”这些标记，并按照文档中嵌入的指令渲染文档。除实际的\
    \ HTML 标记外，浏览器显示的文档可能还包含其他指令。例如，文档中可使用 CSS（层叠样式表）进行格式化，也可能包含 JavaScript 脚本。在后一种情况下，浏览器会执行这些脚本。因此，服务器发送一组命令，浏览器负责执行。关键在于，命令是在发出请求的同一台计算机上执行的。\
    \  \n\n> **注意：** 服务器指示要执行的操作，客户端的浏览器则执行必要的操作。虽方便，但并不总是安全。  \n\n那么，PHP 在此方案中位于何处？答案在于服务器处理请求的阶段。当服务器接收到客户端请求时，它会处理该请求，而在处理过程中，可以执行脚本——此处即\
    \ PHP 脚本。  \n\n| 详细信息 |\n| --- |\n| 通常，脚本的输出是生成并传递给客户端的 HTML 代码。 |\n\n但这并非全部。许多程序试图通过网络交换信息。客户端上的进程向服务器上的进程发送信号，反之亦然，因此需要知道哪个信号对应哪个进程。为此，我们使用端口。端口是进程用来识别发往自身信号的唯一整数标识符。因此，客户端浏览器的请求与服务器的响应必须通过端口进行同步。也就是说，要有效使用\
    \ PHP，需要解决相当多的技术问题。所有这些都将根据实际需要逐步展开介绍。  \n\n## 如何执行 PHP 代码  \n\n让我们在 PHP 学习之旅中迈出下一步，即关注如何执行用\
    \ PHP 编写的程序。如果讨论的是 PHP 代码的“常规”使用方式，则需要一台服务器和一个客户端，也就是两台计算机。脚本（程序）托管在服务器上，您可以通过客户端浏览器访问服务器上的网页来查看程序执行结果。但即便拥有所有这些资源，所描述的策略也并不十分方便，因为您需要在一台计算机（服务器）上编辑程序，而在另一台计算机（客户端）上检查结果。因此，显然您更希望采用更可靠的策略。\
    \  \n\n另一种方法是“欺骗”浏览器，即制造一种“服务器本身就是客户端”的假象。这涉及使用*本地服务器*。切换到该模式非常简单。这种方法的优势在于，程序及其结果都局限于同一台计算机内。\
    \  \n\n另一方面，PHP 代码也可以使用解释器来执行——这与大多数其他解释型语言的情况大致相同。这可能是查看程序运行结果的最简单方式。不过，您不应忘记，PHP\
    \ 程序的编写初衷并非为了在客户端计算机上用解释器执行。因此，其中也会涉及一些技巧。  \n"
- fmt: "# The Software\n\nThe book contains many examples, and in the process of studying\
    \ them, it is desirable to disassemble the program and examine the result of its\
    \ execution. That requires special software.\n\nFirst of all, you have to install\
    \ the software that supports PHP. To do that, go to [`www.php.net`](http://www.php.net),\
    \ as shown in Figure I-2.\n\n![A screengrab of the window for PHP support.](images/613529_1_En_BookFrontmatter_Fig2_HTML.jpg)\
    \  \n**Figure I-2** The window for PHP support at [`www.php.net`](http://www.php.net)\n\
    \nYou should find the software download section in that window and download the\
    \ necessary files.\n\n> **Note**  \n> In the simplest case, the installation comes\
    \ down to unpacking the archive downloaded from [`www.php.net`](http://www.php.net).\
    \ That will likely be enough for using the PHP interpreter (`php.exe` file) in\
    \ command-line mode. You may need to perform additional settings for a more “comfortable”\
    \ work regime involving special software. If so, refer to the help information\
    \ on the [`www.php.net`](http://www.php.net) page and use the help for the relevant\
    \ software product (for example, a code editor).\n\nIn general, to have a PHP\
    \ interpreter that allows you to execute programs written in PHP is enough. However,\
    \ you also need to type and edit your programs somewhere. In principle, a regular\
    \ text editor could be the choice. But it’s much better to install something more\
    \ advanced, with support for PHP syntax (an editor that “understands” PHP special\
    \ instructions).\n\n> **Note**  \n> It is easy to find a suitable editor for processing\
    \ PHP code if necessary. However, such a strategy is mainly aimed at advanced\
    \ users. That is why it is beyond your attention.\n\nThere are other options as\
    \ well. For example, the Visual Studio Code development environment (the address\
    \ is [`https://code.visualstudio.com`](https://code.visualstudio.com)) is quite\
    \ convenient. The browser opened on the project page is shown in Figure I-3.\n\
    \n| Details |\n| --- |\n| The first time you run the Visual Studio Code application,\
    \ you must confirm the installation of the PHP support in the Customize section.\
    \ |\n\n![A screengrab represents the Visual Studio code project support page with\
    \ download links and more options.](images/613529_1_En_BookFrontmatter_Fig3_HTML.jpg)\
    \  \n**Figure I-3** The Visual Studio Code project support page\n\nAnother good\
    \ option for developing PHP programs is the NetBeans IDE. The installation files\
    \ can be downloaded from [`http://netbeans.apache.org`](http://netbeans.apache.org).\
    \ Figure I-4 shows a browser open on the NetBeans project support page.\n\n| Details\
    \ |\n| --- |\n| You may need the Java Development Kit (JDK) pre-installed on your\
    \ computer to use NetBeans. |\n\n![A screenshot indicates the NetBeans project\
    \ support page with further details.](images/613529_1_En_BookFrontmatter_Fig4_HTML.jpg)\
    \  \n**Figure I-4** The NetBeans project support page\n\nThere are other helpful\
    \ software products, including commercial ones. But once again, it is enough to\
    \ install PHP and select a suitable code editor.\n\n> **Note**  \n> You will learn\
    \ how to use the software (at the primary level) through examples.\n\n# About\
    \ This Book\n\nThis book is entirely devoted to the PHP language, focusing on\
    \ why it is needed and its features. It investigates the main constructions of\
    \ the language, as well as the approaches and mechanisms used in PHP. In the book,\
    \ considerable attention is paid to examples. The range of topics discussed in\
    \ the book is enough for writing effective PHP codes. The main part of the book\
    \ consists of twelve chapters.\n\n- **Chapter 1** contains simple programs, and\
    \ it discusses how to use the software and analyzes the general principles of\
    \ creating PHP programs there.\n- **Chapter 2** discusses variables and data types.\
    \ There, you will learn how to create variables, perform operations with them,\
    \ and use data of different types.\n- **Chapter 3** is devoted to the control\
    \ statements. You will get a notion of the conditional statement, selection statement,\
    \ and loop statements, as well as the `goto` instruction. All those are critical\
    \ for creating efficient PHP programs.\n- **Chapter 4** contains information about\
    \ arrays. In PHP, arrays have several unique features and will be the study’s\
    \ subject. This chapter discusses one-dimensional and multi-dimensional arrays,\
    \ describes the iteration over a collection statement, and provides an overview\
    \ of the basic operations performed on arrays.\n- **Chapter 5** describes functions.\
    \ You will learn how they are created, discuss the mechanisms for passing arguments,\
    \ consider how a result is returned, learn how to set default values for arguments,\
    \ and how to create functions with an arbitrary number of arguments. You will\
    \ consider ways for passing arguments by name. The chapter also focuses on recursion,\
    \ anonymous functions, and some other topics related to functions.\n- **Chapter\
    \ 6** deals with links, constants, global and statistic variables, file handling,\
    \ and methods for working with multi-line text.\n- **Chapter 7** discusses the\
    \ principles of object-oriented programming (OOP) and considers how PHP implements\
    \ these principles. You will learn how to create classes and objects and what\
    \ to do with methods. You will also meet constructors, destructors, and static\
    \ class members. The chapter deals with the problem of copying objects and illustrates\
    \ how to use private fields and methods. Some special methods are also described\
    \ in the chapter.\n- **Chapter 8** is devoted to such an important OOP mechanism\
    \ as inheritance. You will learn how a child’s class is created and how methods\
    \ are overridden. You will consider the features of constructors, private and\
    \ protected members of a class in the context of the inheritance. The chapter\
    \ also discusses the virtuality of methods, describes multi-level inheritance\
    \ and contains some other information.\n- **Chapter 9** describes abstract classes\
    \ and interfaces (including their implementation and inheritance). You will learn\
    \ what traits are, how an interface can control the type of an object, what a\
    \ namespace is, and how it is used.\n- **Chapter 10** The principles of error\
    \ and exception handling are discussed in Chapter 10. You become familiar with\
    \ the main exception classes and learn how exceptions are generated. In addition,\
    \ the chapter describes methods for creating classes for user-defined exceptions.\
    \ Some other issues related to error and exception handling are also covered.\n\
    - **Chapter 11** is devoted to generators and iterators. You will learn to use\
    \ and apply the generator functions in different situations. You will also learn\
    \ what iterators are and how they are created."
  raw: '## The Software


    The book contains many examples, and in the process of studying them, it is desirable
    to disassemble the program and examine the result of its execution. That requires
    special software.


    First of all, you have to install the software that supports PHP. To do that,
    go to [`www.php.net`](http://www.php.net), as shown in Figure [I-2](#613529_1_En_BookFrontmatter_OnlinePDF.xhtml#Fig2).


    ![](images/613529_1_En_BookFrontmatter_Fig2_HTML.jpg)


    A screengrab of the window for PHP support.


    Figure I-2


    The window for PHP support at [`www.php.net`](http://www.php.net)


    You should find the software download section in that window and download the
    necessary files.


    Note


    In the simplest case, the installation comes down to unpacking the archive downloaded
    from [`www.php.net`](http://www.php.net). That will likely be enough for using
    the PHP interpreter (`php.exe` file) in command-line mode. You may need to perform
    additional settings for a more “comfortable” work regime involving special software.
    If so, refer to the help information on the [`www.php.net`](http://www.php.net)
    page and use the help for the relevant software product (for example, a code editor).


    In general, to have a PHP interpreter that allows you to execute programs written
    in PHP is enough. However, you also need to type and edit your programs somewhere.
    In principle, a regular text editor could be the choice. But it’s much better
    to install something more advanced, with support for PHP syntax (an editor that
    “understands” PHP special instructions).


    Note


     It is easy to find a suitable editor for processing PHP code if necessary. However,
    such a strategy is mainly aimed at advanced users. That is why it is beyond your
    attention.


    There are other options as well. For example, the Visual Studio Code development
    environment (the address is [`https://code.visualstudio.com`](https://code.visualstudio.com))
    is quite convenient. The browser opened on the project page is shown in Figure
    [I-3](#613529_1_En_BookFrontmatter_OnlinePDF.xhtml#Fig3).


    | Details |

    | --- |

    | The first time you run the Visual Studio Code application, you must confirm
    the installation of the PHP support in the Customize section. |


    ![](images/613529_1_En_BookFrontmatter_Fig3_HTML.jpg)


    A screengrab represents the Visual Studio code project support page with download
    links and more options.


    Figure I-3


    The Visual Studio Code project support page


    Another good option for developing PHP programs is the NetBeans IDE. The installation
    files can be downloaded from [`http://netbeans.apache.org`](http://netbeans.apache.org).
    Figure [I-4](#613529_1_En_BookFrontmatter_OnlinePDF.xhtml#Fig4) shows a browser
    open on the NetBeans project support page.


    | Details |

    | --- |

    | You may need the Java Development Kit (JDK) pre-installed on your computer to
    use NetBeans. |


    ![](images/613529_1_En_BookFrontmatter_Fig4_HTML.jpg)


    A screenshot indicates the NetBeans project support page with further details.


    Figure I-4


    The NetBeans project support page


    There are other helpful software products, including commercial ones. But once
    again, it is enough to install PHP and select a suitable code editor.


    Note


     You will learn how to use the software (at the primary level) through examples.


    ## About This Book


    This book is entirely devoted to the PHP language, focusing on why it is needed
    and its features. It investigates the main constructions of the language, as well
    as the approaches and mechanisms used in PHP. In the book, considerable attention
    is paid to examples. The range of topics discussed in the book is enough for writing
    effective PHP codes. The main part of the book consists of twelve chapters.


    *   Chapter [1](#613529_1_En_1_Chapter.xhtml) contains simple programs, and it
    discusses how to use the software and analyzes the general principles of creating
    PHP programs there.


    *   Chapter [2](#613529_1_En_2_Chapter.xhtml) discusses variables and data types.
    There, you will learn how to create variables, perform operations with them, and
    use data of different types.


    *   Chapter [3](#613529_1_En_3_Chapter.xhtml) is devoted to the control statements.
    You will get a notion of the conditional statement, selection statement, and loop
    statements, as well as the goto instruction. All those are critical for creating
    efficient PHP programs.


    *   Chapter [4](#613529_1_En_4_Chapter.xhtml) contains information about arrays.
    In PHP, arrays have several unique features and will be the study’s subject. This
    chapter discusses one-dimensional and multi-dimensional arrays, describes the
    iteration over a collection statement, and provides an overview of the basic operations
    performed on arrays.


    *   Chapter [5](#613529_1_En_5_Chapter.xhtml) describes functions. You will learn
    how they are created, discuss the mechanisms for passing arguments, consider how
    a result is returned, learn how to set default values for arguments, and how to
    create functions with an arbitrary number of arguments. You will consider ways
    for passing arguments by name. The chapter also focuses on recursion, anonymous
    functions, and some other topics related to functions.


    *   Chapter [6](#613529_1_En_6_Chapter.xhtml) deals with links, constants, global
    and statistic variables, file handling, and methods for working with multi-line
    text.


    *   Chapter [7](#613529_1_En_7_Chapter.xhtml) discusses the principles of object-oriented
    programming (OOP) and considers how PHP implements these principles. You will
    learn how to create classes and objects and what to do with methods. You will
    also meet constructors, destructors, and static class members. The chapter deals
    with the problem of copying objects and illustrates how to use private fields
    and methods. Some special methods are also described in the chapter.


    *   Chapter [8](#613529_1_En_8_Chapter.xhtml) is devoted to such an important
    OOP mechanism as inheritance. You will learn how a child’s class is created and
    how methods are overridden. You will consider the features of constructors, private
    and protected members of a class in the context of the inheritance. The chapter
    also discusses the virtuality of methods, describes multi-level inheritance and
    contains some other information.


    *   Chapter [9](#613529_1_En_9_Chapter.xhtml) describes abstract classes and interfaces
    (including their implementation and inheritance). You will learn what traits are,
    how an interface can control the type of an object, what a namespace is, and how
    it is used.


    *   The principles of error and exception handling are discussed in Chapter [10](#613529_1_En_10_Chapter.xhtml).
    You become familiar with the main exception classes and learn how exceptions are
    generated. In addition, the chapter describes methods for creating classes for
    user-defined exceptions. Some other issues related to error and exception handling
    are also covered.


    *   Chapter [11](#613529_1_En_11_Chapter.xhtml) is devoted to generators and iterators.
    You will learn to use and apply the generator functions in different situations.
    You will also learn what iterators are and how they are created.'
  trans: "\n# 软件\n\n本书包含许多示例，在学习这些示例的过程中，需要对程序进行拆解并检查其执行结果。这需要特定的软件。\n\n首先，你需要安装支持\
    \ PHP 的软件。为此，请访问 [`www.php.net`](http://www.php.net)，如图 I-2 所示。\n\n![PHP 支持窗口的屏幕截图。](img/613529_1_En_BookFrontmatter_Fig2_HTML.jpg)\
    \  \n**图 I-2** [`www.php.net`](http://www.php.net) 上的 PHP 支持窗口\n\n你应该在该窗口中找到软件下载区域，并下载必要的文件。\n\
    \n> **注意**  \n> 在最简单的情况下，安装过程等同于解压从 [`www.php.net`](http://www.php.net) 下载的压缩包。对于在命令行模式下使用\
    \ PHP 解释器（`php.exe` 文件）来说，这很可能就足够了。如果需要使用专门的软件来实现更“舒适”的工作模式，则可能需要进行额外的设置。如果是这样，请查阅\
    \ [`www.php.net`](http://www.php.net) 页面上的帮助信息，并参考相关软件产品（例如，代码编辑器）的帮助文档。\n\n一般来说，拥有一个允许你执行\
    \ PHP 编写程序的 PHP 解释器就足够了。但是，你还需要在某个地方键入和编辑你的程序。原则上，普通的文本编辑器是一种选择。但更好的选择是安装更高级的、支持\
    \ PHP 语法的编辑器（一个“理解” PHP 特殊指令的编辑器）。\n\n> **注意**  \n> 如果需要，很容易找到合适的编辑器来处理 PHP 代码。然而，这种策略主要针对高级用户。因此，这不在你的关注范围之内。\n\
    \n还有其他选择。例如，Visual Studio Code 开发环境（地址是 [`https://code.visualstudio.com`](https://code.visualstudio.com)）就相当方便。在项目页面上打开的浏览器窗口如图\
    \ I-3 所示。\n\n| 详情 |\n| --- |\n| 首次运行 Visual Studio Code 应用程序时，必须先在“自定义”部分确认安装\
    \ PHP 支持。 |\n\n![屏幕截图展示了 Visual Studio Code 项目支持页面，包含下载链接和更多选项。](img/613529_1_En_BookFrontmatter_Fig3_HTML.jpg)\
    \  \n**图 I-3** Visual Studio Code 项目支持页面\n\n另一个开发 PHP 程序的好选择是 NetBeans IDE。其安装文件可以从\
    \ [`http://netbeans.apache.org`](http://netbeans.apache.org) 下载。图 I-4 显示了在 NetBeans\
    \ 项目支持页面上打开的浏览器窗口。\n\n| 详情 |\n| --- |\n| 你可能需要预先在你的计算机上安装 Java 开发工具包 (JDK) 才能使用\
    \ NetBeans。 |\n\n![屏幕截图显示了 NetBeans 项目支持页面及其详细信息。](img/613529_1_En_BookFrontmatter_Fig4_HTML.jpg)\
    \  \n**图 I-4** NetBeans 项目支持页面\n\n还有其他有用的软件产品，包括商业产品。但再次强调，安装 PHP 并选择合适的代码编辑器就足够了。\n\
    \n> **注意**  \n> 你将通过示例学习如何使用这些软件（在初级水平上）。\n\n# 关于本书\n\n本书完全致力于 PHP 语言，重点阐述其必要性及其特性。它探讨了语言的主要结构，以及在\
    \ PHP 中使用的方法和机制。本书非常重视示例。书中讨论的主题范围足以让你编写出高效的 PHP 代码。本书主体部分由十二章组成。\n\n- **第 1 章**包含简单的程序，讨论了如何使用软件，并分析了在那里创建\
    \ PHP 程序的一般原则。\n- **第 2 章**讨论变量和数据类型。你将学习如何创建变量、对它们执行操作以及使用不同类型的数据。\n- **第 3 章**专门讲述控制语句。你将了解条件语句、选择语句和循环语句，以及\
    \ `goto` 指令。所有这些对于创建高效的 PHP 程序至关重要。\n- **第 4 章**包含有关数组的信息。在 PHP 中，数组具有几个独特的功能，将是研究的主题。本章讨论了一维和多维数组，描述了集合遍历语句，并概述了对数组执行的基本操作。\n\
    - **第 5 章**描述了函数。你将学习如何创建函数，讨论参数传递的机制，考虑如何返回结果，学习如何为参数设置默认值，以及如何创建具有任意数量参数的函数。你将考虑按名称传递参数的方式。本章还重点介绍了递归、匿名函数以及与函数相关的其他一些主题。\n\
    - **第 6 章**涉及链接、常量、全局和静态变量、文件处理以及处理多行文本的方法。\n- **第 7 章**讨论面向对象编程（OOP）的原则，并考虑 PHP\
    \ 如何实现这些原则。你将学习如何创建类和对象，以及如何处理方法。你还将了解构造函数、析构函数和静态类成员。本章处理了对象复制的问题，并说明了如何使用私有字段和方法。本章还描述了一些特殊方法。\n\
    - **第 8 章**专门讲述一个重要的 OOP 机制：继承。你将学习如何创建子类以及如何重写方法。你将考虑在继承的背景下，构造函数、私有和受保护类成员的特性。本章还讨论了方法的虚拟性，描述了多级继承，并包含了一些其他信息。\n\
    - **第 9 章**描述了抽象类和接口（包括它们的实现和继承）。你将了解什么是 trait，接口如何控制对象的类型，什么是命名空间以及如何使用它。\n-\
    \ **第 10 章**错误和异常处理的原则在第 10 章中讨论。你将熟悉主要的异常类，并学习异常是如何产生的。此外，本章还描述了为用户自定义异常创建类的方法。还涵盖了与错误和异常处理相关的其他一些问题。\n\
    - **第 11 章**专门讲述生成器和迭代器。你将学习在不同情况下使用和应用生成器函数。你还将了解什么是迭代器以及如何创建它们。\n"
- fmt: '# Chapter 12


    Chapter [12](#613529_1_En_12_Chapter.xhtml) contains examples of using PHP programs
    in practice. The chapter discusses several subjects that give an idea of the role
    PHP codes play in creating web documents.


    At the end of each chapter, for convenience, a summary lists all the main points
    discussed in the chapter.


    **Note**


    This book is primarily for those with minimal programming experience, so the content
    is presented as simply as possible.


    **Acknowledgments**


    To my dear children Anastasia and Bohdan, and all my family. Thank you for your
    support and love. You give meaning to my life and encourage me to move on.


    I sincerely thank the great and professional Apress team for the outstanding support
    and dedication provided throughout the process of bringing the book to fruition.
    Their collective efforts have undoubtedly played a pivotal role in making the
    book better.


    **About the Author** **About the Technical Reviewer**


    # 1. The First Program


    > *—I demand to restore the Earth’s ozone layer.*

    >

    > *—Alf, we won’t make it by Saturday.*

    >

    > —*ALF* (TV series)


    In this chapter, you will create your first PHP program. Namely, you will examine
    some simple code and determine how it can be executed. There is not much programming
    in the chapter, but a lot of information is essential for using PHP.


    ## The Program’s Code


    A program in PHP is a set of instructions that an interpreter executes. These
    instructions must be appropriately formatted and passed to the interpreter for
    execution. The plans are focused on solving the following two tasks.


    - Writing the code of a program

    - Launching the program for execution


    The second task is much more complex than the first one.


    So, let’s create your first PHP program. Namely, let’s define what your program
    should do. Traditionally, the first program displays a message. You will do the
    same. Your program displays a welcome message in the output window (terminal).
    The program is shown in Listing [1-1](#613529_1_En_1_Chapter.xhtml#PC1).


    ```

    Listing 1-1

    The First Program

    ```


    The program begins with the `<?php` statement and ends with the `?>` statement.
    That is a standard situation for all programs in PHP. The commands to be executed
    in the program are placed between these instructions. In this case, there is a
    single command. It calls the `print()` built-in function with `"Hello, PHP!"`
    passed as an argument.


    | Details |

    | --- |

    | A function is a named block of code (command block) that can be executed by
    calling the function (by specifying its name with arguments, if necessary). Functions
    can be created in a program, or you can use built-in functions. Among the built-in
    functions, there is the `print()` function. Text values are enclosed in double
    quotes. Also, text values can be enclosed in single quotes. Both styles are almost
    equivalent, but there are essential differences, which are discussed a little
    later. It is also worth noting that every command in PHP ends with a semicolon.
    |


    ![](images/613529_1_En_1_Chapter/613529_1_En_1_Figa_HTML.jpg)An information icon.


    **Note**


    Frankly speaking, `print()` is not exactly a function but rather a special syntax
    construction of the PHP language. But since its properties are similar to a function,
    consider it a function. And you proceed in the same way in all such cases.


    As you might guess, the command displays a message in the terminal. The message’s
    text is passed to the `print()` function as an argument. The following shows the
    result of running the program.


    ```

    The output of the program (from Listing 1-1)

    Hello, PHP!

    ```


    There is nothing complicated in this program. It remains only to figure out how
    to run the program for execution.


    | Details |

    | --- |

    | The argument can be specified without parentheses when calling the `print()`
    function. That means that instead of the `print("Hello, PHP!")` command, you can
    use the `print "Hello, PHP!"` statement. Another alternative to the `print()`
    function is the `echo` statement. Namely, the `echo "Hello, PHP!"` command could
    display the message. |'
