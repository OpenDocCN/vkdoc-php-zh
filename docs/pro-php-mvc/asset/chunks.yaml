    \              \"handler\" => \"yield\"\n                )\n            ) + $this->_map;\n\
    \n            $this->_map[\"statement\"][\"tags\"] = array(\n                \"\
    set\" => array(\n                    \"isolated\" => false,\n                \
    \    \"arguments\" => \"{key}\",\n                    \"handler\" => \"set\"\n\
    \                ),\n                \"append\" => array(\n                  \
    \  \"isolated\" => false,\n                    \"arguments\" => \"{key}\",\n \
    \                   \"handler\" => \"append\"\n                ),\n          \
    \      \"prepend\" => array(\n                    \"isolated\" => false,\n   \
