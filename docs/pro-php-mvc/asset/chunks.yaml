    Questions


    1\. We used URL rewriting to reroute application requests to a single index.php
    file. Why was this required?


    2\. Our bootstrap file references many classes by their full namespace (e.g.,
    Framework\ Configuration) instead of utilizing use statements. It also unsets
    the variables we define. Why are these steps necessary?


    3\. We added automatic configuration of the Database and Cache classes. This is
    useful for configuring these classes exclusively with configuration files. What
    are the benefits of this approach to configuration?


    4\. Our Controller class has been modified to attempt automatic rendering, should
    a matching view be found. It will also try to wrap the results in a layout file.
    Can you think of a practical use for this behavior?


    Answers


    1\. URL rewriting is not strictly required. All application requests are handled
    through the same file, but there is nothing stopping you from addressing the index.php
    file directly. The difference is apparent in the URLs [http://localhost/users/view.html](http://localhost/users/view.html)


    [and http://localhost/index.php?url=users/view&extension = html. T](http://localhost/index.php?url=users/view%26extension=html.)he
    benefit of using URL rewriting is that the URLs will be simpler and neater.'
