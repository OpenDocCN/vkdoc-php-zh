    **Dealing with Forgotten Passwords**


    Now that we have added login functionality, we must also allow users who have
    forgotten their passwords to access their accounts. Because we store the user
    password as an MD5 hash of the actual password, we cannot send them the old password.
    Instead, when they complete the fetch-password form, we will generate a new password
    and send that to them.


    We can’t automatically assume that the person who filled out the fetch-password
    form is the account holder, so we won’t update the actual account password until
    their identity has been verified. We do this by providing a link in the sent e-mail
    that will confirm the password change. This has the added advantage of allowing
    them to remember their old password after filling out the form and before clicking
    the confirmation link.


    The basic algorithm for implementing fetch-password functionality is as follows:
    **1.** Display a form to the user asking for their username.


    **2.** If the supplied username is found, generate a new password and write it
    to their profile, and then send an e-mail to the address associated with the account
    informing them of their new password.


    **3.** If the supplied username is not found, display an error message to the
    user.


