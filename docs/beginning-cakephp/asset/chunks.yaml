    As I discuss more advanced ways of developing controllers and models in this chapter,
    don’t forget that changes to the view may be necessary for the operation or customization
    to work correctly. For example, managing sessions is such an integrated process
    that you may spend equal time in the view (creating login screens and displaying
    a session’s status), the controller (performing session logic to determine aspects
    of the session), and the model (saving session data in the database). To work
    an overall session operation into the application, in other words, will mean editing
    and testing actions in the controller, model functions, and views together.


    **Building an Extensive Blog**


    The classic tutorial for frameworks has been to build a blog. On Cake’s official
    web site, there is an entire blog application tutorial. However, you need a thorough
    explanation of *what* is happening, not just a walk-through of *how* to build
    the program. So, how this tutorial differs from others is that I will systematically
    explain every line of code in this application. You should be able to master the
    concepts, not just the steps. With such mastery, you should be able to wrap your
    head around a lot of the features Cake has to offer and understand how to incorporate
    them into your own customized applications.


    The blog program you’ve been working with has already allowed you to explore the
    scaffolding, Bake, and helper features Cake has to offer. To make the blog more
    powerful, you’ll need to deal with models, views, and controllers simultaneously.
    Now that you’ve been introduced to various starting points and key concepts, it’s
    time to discuss application building in more detail. Let’s begin with controllers
    and models, the lifeblood of any Cake application.


    The extensive blog you will build will include these advanced features: **89**


