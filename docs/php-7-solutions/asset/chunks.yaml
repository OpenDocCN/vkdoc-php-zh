    **注意**  各种`fopen()`模式在 7 章中有所描述。


    理想情况下，您希望内部指针位于文件的开头，以便可以循环遍历现有记录。`r+`模式可以做到这一点，但除非文件已存在，否则操作会失败。不能使用`w+`，因为它会删除现有内容。也不能使用`x+`，因为如果同名的文件已存在，它会失败。


    这样就只剩下`a+`和`c+`作为具有您所需灵活性的唯一选项：两者都能在必要时创建文件，并允许您读取和写入。它们的区别在于打开文件时内部指针的位置：`a+`将其放在末尾，而`c+`将其放在开头。这使得`c+`对于检查现有记录更有用，但`a+`具有始终将新内容附加到文件末尾的优势。这避免了意外覆盖现有值的危险。我们将以`a+`模式打开
    CSV 文件。


    第一次运行脚本时，文件是空的（您可以通过`filesize()`函数返回`0`来判断），因此您可以继续使用`fputcsv()`写入详细信息。这是`fgetcsv()`的对应函数，在第
    7 章中对`fgetcsv()`进行了描述。`fgetcsv()`一次从 CSV 文件中提取一行数据，而`fputcsv()`则创建一个 CSV 记录。它有两个必需参数：文件引用和要作为
    CSV 记录插入的值数组。它还接受可选参数来设置分隔符和封闭字符（请参阅[`www.php.net/manual/en/function.fputcsv.php`](http://www.php.net/manual/en/function.fputcsv.php)上的在线文档）。


