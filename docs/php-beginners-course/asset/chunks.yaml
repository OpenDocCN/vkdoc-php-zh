- fmt: '为了连续输出几个变量的内容，必须用点号（`.`）将它们分隔开：


    ```php

    <?php


    $part1 = "Hello ";


    $part2 = "World!";


    echo $part1 . $part2;


    ?>

    ```


    这与第一个示例的输出相同。我们也可以将文本块与变量一起输出：


    ```php

    <?php


    $part1 = "Hello";


    echo $part1 . " World!";


    ?>

