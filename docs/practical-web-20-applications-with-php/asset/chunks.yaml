    **Ajax Operations in Prototype**


    One of the key reasons for choosing to use Prototype in this book was not only
    the extended functionality applied to all elements—which in itself is extremely
    useful—but also for its Ajax support. Cross-browser Ajax solutions can easily
    be created by using the Prototype Ajax class.


    Typical usage of this class involves first defining a hash of options (such as
    form data that should be submitted in the request), and then instantiating one
    of Ajax.Request, Ajax.Updater, or Ajax.PeriodicalUpdater:


    • Ajax.Request: Generally used for a one-time request. This is the core Ajax method
    available, and it is the function you will call directly to initiate most Ajax
    operations.


    • Ajax.Updater: Behaves in the same way as Ajax.Request, except its specific purpose
    is to populate an element on your HTML page with the response data from a request.
    This can also be achieved by using Ajax.Request, but Ajax.Updater simplifies the
    process for this specific operation.


    • Ajax.PeriodicalUpdater: Behaves the same way as Ajax.Updater in that it populates
    an element with the Ajax response data; however, it will continue to execute with
    a specified frequency. For instance, if you need to retrieve fresh data every
    *N* seconds, you can use this method. Another way to look at it is that Ajax.PeriodicalUpdater
    performs a request with Ajax.Updater every *N* seconds.


    **Ajax Request Options**


    When initiating an Ajax request with Prototype, the one key thing you need is
    the URL you are requesting. In addition to this, you can define a set of options
    that dictate the behavior of the request. These options are not required to perform
    the request (default options are defined internally); however, it is rare that
    you wouldn’t need to set various options or callbacks.


    The options you will typically need to set are as follows:


    • method: The HTTP method used for the request. This is typically get or post
    (with post being the default). Note that there are other types of HTTP requests
    possible, but they are typically not used and are beyond the scope of this book.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


