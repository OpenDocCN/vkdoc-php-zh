  trans: "\n# PHP 方案 9-3：构建登录页面\n\n该 PHP 方案展示了如何通过 `post` 方法提交用户名和密码，然后将提交的值与外部文本文件中存储的值进行核对。如果找到匹配项，脚本将设置一个会话变量，然后将用户重定向到另一个页面。\n\
    \n在 `sessions` 文件夹中创建一个名为 `login.php` 的文件，然后插入一个包含用户名和密码文本输入字段的表单，以及一个名为 `login`\
    \ 的提交按钮，如下所示（或者，使用 `ch09` 文件夹中的 `login_01.php`）：\n\n```html\n<form method=\"post\"\
    \ action=\"\">\n  <p>\n    <label for=\"username\">用户名:</label>\n    <input type=\"\
    text\" name=\"username\" id=\"username\">\n  </p>\n  <p>\n    <label for=\"pwd\"\
    >密码:</label>\n    <input type=\"password\" name=\"pwd\" id=\"pwd\">\n  </p>\n\
    \  <p>\n    <input name=\"login\" type=\"submit\" value=\"登录\">\n  </p>\n</form>\n\
    ```\n\n这是一个简单的表单，没什么特别的：\n\n![A978-1-4842-0635-5_9_Figf_HTML.jpg](img/A978-1-4842-0635-5_9_Figf_HTML.jpg)\n\
    \n在 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码：\n\n```php\n$error = '';\n\nif (isset($_POST['login']))\
    \ {\n  session_start();\n  $username = $_POST['username'];\n  $password = $_POST['pwd'];\n\
    \n  // 存储用户名和密码的位置\n  $userlist = 'C:/private/users.csv';\n\n  // 登录成功后的重定向地址\n\
    \  $redirect = 'http://localhost/phpsols/sessions/menu.php';\n\n  require_once\
    \ '../includes/authenticate.php';\n}\n```\n\n-   这段代码将一个名为 `$error` 的变量初始化为空字符串。如果登录失败，将用它来显示错误消息，告知用户失败原因。\n\
    -   条件语句随后检查 `$_POST` 数组中是否包含名为 `login` 的元素。如果包含，表示表单已提交，花括号内的代码会启动一个 PHP 会话，并将通过\
    \ `$_POST` 数组传递的值存储在 `$username` 和 `$password` 中。然后创建 `$userlist`，用于定义包含注册用户名和密码的文件路径，以及\
    \ `$redirect`，即用户成功登录后将跳转到的页面 URL。\n-   最后，条件语句内的代码引入了 `authenticate.php`，你接下来将创建这个文件。\n\
    \n> **注意：** 请调整 `$userlist` 的值，使其与你自己系统中的实际路径一致。\n\n在 `includes` 文件夹中创建一个名为 `authenticate.php`\
    \ 的文件。该文件只包含 PHP 代码，因此删除脚本编辑器插入的任何 HTML 内容，并插入以下代码：\n\n```php\n<?php\nif (!file_exists($userlist)\
    \ || !is_readable($userlist)) {\n  $error = '登录功能不可用，请稍后再试。';\n} else {\n  $file\
    \ = fopen($userlist, 'r');\n  // 忽略 CSV 文件第一行中的标题\n  $titles = fgetcsv($file);\n\
    \  // 循环处理剩余行\n  while (($data = fgetcsv($file)) !== false) {\n    // 如果第一个元素为空则跳过\n\
    \    if (is_null($data[0])) {\n      continue;\n    }\n    // 如果用户名和密码匹配，则创建会话变量，\n\
    \    // 重新生成会话 ID，并跳出循环\n    if ($data[0] == $username && $data[1] == $password)\
    \ {\n      $_SESSION['authenticated'] = 'Jethro Tull';\n      session_regenerate_id();\n\
    \      break;\n    }\n  }\n  fclose($file);\n}\n```\n\n如果登录成功，`header()` 函数需要将用户重定向到\
    \ `$redirect` 中存储的 URL，然后退出脚本。否则，需要生成一条错误消息，告知用户登录失败。完整的脚本如下所示：\n\n-   这段代码改编自\
    \ PHP 方案 7-2 中 `getcsv.php` 使用的代码。条件语句首先检查文件是否存在或是否可读。如果 `$userlist` 有问题，则立即生成错误消息。\n\
    -   否则，`else` 块中的主代码通过以只读模式打开文件，并使用 `fgetcsv()` 函数返回每一行数据的数组，来提取 CSV 文件的内容。在 PHP\
    \ 方案 7-2 中，这些值被存储在一个包含每位注册用户名称和密码的多维数组中。这次则无需存储它们。我们只关心找到与 `$username` 和 `$password`\
    \ 值匹配的用户名/密码对。\n-   CSV 文件的第一行包含字段标题。脚本将其提取到一个名为 `$titles` 的变量中，但从未使用过。`while`\
    \ 循环随后检查剩余行。每次循环运行时，它都会将当前行提取到一个名为 `$data` 的数组中。第一个元素包含用户名，第二个元素包含对应的密码。如果 `$data[0]`\
    \ 为 `null`，则可能意味着当前行是空行，因此会跳过。\n-   如果 `$data` 数组中的两个元素都与 `$username` 和 `$password`\
    \ 匹配，脚本会创建一个名为 `$_SESSION['authenticated']` 的变量，并赋予它一个 1970 年代伟大民谣摇滚乐队的名字。这两者（除了杰思罗·塔尔的音乐）并无特殊含义；变量名和值是我随意选择的。关键的是创建了一个会话变量。一旦找到匹配项，会话\
    \ ID 会被重新生成，然后 `break` 退出循环。\n\n```php\n<?php\nif (!file_exists($userlist) ||\
    \ !is_readable($userlist)) {\n  $error = '登录功能不可用，请稍后再试。';\n} else {\n  $file\
    \ = fopen($userlist, 'r');\n  // 忽略 CSV 文件第一行中的标题\n  $titles = fgetcsv($file);\n\
    \  // 循环处理剩余行\n  while (($data = fgetcsv($file)) !== false) {\n    // 如果第一个元素为空则跳过\n\
    \    if (is_null($data[0])) {\n      continue;\n    }\n    // 如果用户名和密码匹配，则创建会话变量，\n\
    \    // 重新生成会话 ID，并跳出循环\n    if ($data[0] == $username && $data[1] == $password)\
    \ {\n      $_SESSION['authenticated'] = 'Jethro Tull';\n      session_regenerate_id();\n\
    \      break;\n    }\n  }\n  fclose($file);\n\n  // 如果会话变量已设置，则进行重定向\n  if (isset($_SESSION['authenticated']))\
    \ {\n    header(\"Location: $redirect\");\n    exit;\n  } else {\n    $error =\
    \ '用户名或密码无效。';\n  }\n}\n```\n\n在 `login.php` 文件中，在 `<body>` 开始标签之后添加以下简短代码块，用于显示任何错误消息：\n\
    \n```php\n<body>\n<?php\nif ($error) {\n  echo \"<p>$error</p>\";\n}\n?>\n<form\
    \ method=\"post\" action=\"\">\n```\n\n完成后的代码位于 `ch09` 文件夹中的 `login_02.php`。在测试\
    \ `login.php` 之前，你需要创建 `menu.php` 并使用会话限制访问权限。\n"
- fmt: "### PHP Solution 9-4: Restricting Access to a Page with a Session\n\nThis\
    \ PHP solution demonstrates how to restrict access to a page by checking for the\
    \ existence of a session variable that indicates the user’s credentials have been\
    \ authenticated. If the variable hasn’t been set, the `header()` function redirects\
    \ the user to the login page.\n\nCreate two pages in the `sessions` folder called\
    \ `menu.php` and `secretpage.php`. It doesn’t matter what they contain, as long\
    \ as they link to each other. Alternatively, use `menu_01.php` and `secretpage_01.php`\
    \ in the `ch09` folder. Protect access to each page by inserting the following\
    \ above the `DOCTYPE` declaration:\n\n```\n<?php\nsession_start();\n// if session\
    \ variable not set, redirect to login page\nif (!isset($_SESSION['authenticated']))\
    \ {\n    header('Location: http://localhost/phpsols/sessions/login.php ');\n \
    \   exit;\n}\n?>\n```\n\n- After starting the session, the script checks if `$_SESSION['authenticated']`\
    \ has been set. If it hasn’t been, it redirects the user to `login.php` and exits.\
    \ That’s all there is to it! The script doesn’t need to know the value of `$_SESSION['authenticated']`,\
    \ although you could make doubly sure by amending line 4 like this:\n\n```\nif\
    \ (!isset($_SESSION['authenticated']) || $_SESSION['authenticated']\n!= 'Jethro\
    \ Tull' ) {\n```\n\n- You can check your code against `menu_02.php` and `secretpage_02.php`\
    \ in the `ch09` folder.\n\nSave `menu.php` and `secretpage.php`, then try to load\
    \ either of them into a browser. You should always be redirected to `login.php`.\
    \ Enter a valid username and password from `users.csv` (the values are case-sensitive)\
    \ in `login.php`, and then click `Log in`. You should be redirected immediately\
    \ to `menu.php`, and the link to `secretpage.php` should also work.\n\n- This\
    \ now also rejects a visitor if `$_SESSION['authenticated']` has the wrong value.\n\
    \n**Tip**\n\nThe login might fail if you create your own version of `users.csv`\
    \ on Mac OS X. If that happens, add the following line at the top of `authenticate.php`,\
    \ as described in “CSV files created on Mac OS” in [Chapter 7](#A978-1-4842-0635-5_7_Chapter.html):\n\
    \n`ini_set('auto_detect_line_endings', true);`\n\nAll you need to do to protect\
    \ any page on your site is to add the eight lines of code in step 2 above the\
    \ `DOCTYPE` declaration.\n\n### PHP Solution 9-5: Creating a Reusable Logout Button\n\
    \nAs well as logging in to a site, users should be able to log out. This PHP solution\
    \ shows how to create a logout button that can be inserted in any page.\n\nContinue\
    \ working with the files from the preceding section.\n\nCreate a logout button\
    \ in the `<body>` of `menu.php` by inserting the following form:\n\n```\n<form\
    \ method=\"post\" action=\"\">\n<input name=\"logout\" type=\"submit\" value=\"\
    Log out\">\n</form>\n```\n\n- The page should look similar to the following screenshot:\n\
    \n![A978-1-4842-0635-5_9_Figg_HTML.jpg](A978-1-4842-0635-5_9_Figg_HTML.jpg)\n\n\
    You now need to add the script that runs when the logout button is clicked. Amend\
    \ the code above the `DOCTYPE` declaration like this (the code is in `menu_02.php`):\n\
    \n```\n<?php\nsession_start();\n// if session variable not set, redirect to login\
    \ page\nif (!isset($_SESSION['authenticated'])) {\n    header('Location: http://localhost/phpsols/sessions/login.php\
    \ ');\n    exit;\n}\n// run this script only if the logout button has been clicked\n\
    if (isset($_POST['logout'])) {\n    // empty the $_SESSION array\n    $_SESSION\
    \ = [];\n    // invalidate the session cookie\n    if (isset($_COOKIE[session_name()]))\
    \ {\n        setcookie(session_name(), '', time()-86400, '/');\n    }\n    //\
    \ end session and redirect\n    session_destroy();\n    header('Location: http://localhost/phpsols/sessions/login.php\
    \ ');\n    exit;\n}\n?>\n```\n\nSave `menu.php` and test it by clicking `Log out`.\
    \ You should be redirected to `login.php`. Any attempt to return to `menu.php`\
    \ or `secretpage.php` will bring you back to `login.php`. You can put the same\
    \ code in every restricted page, but PHP is all about saving work, not making\
    \ it. It makes sense to turn this into an include file. Create a new file called\
    \ `logout.php` in the `includes` folder. Cut and paste the new code from steps\
    \ 1 and 2 into the new file, like this (it’s in `logout.php` in the `ch09` folder):\n\
    \n- This is the same code as in “Destroying a session” earlier in the chapter.\
    \ The only differences are that it’s enclosed in a conditional statement so that\
    \ it runs only when the logout button is clicked, and it uses `header()` to redirect\
    \ the user to `login.php`.\n\n```\n<?php\n// run this script only if the logout\
    \ button has been clicked\nif (isset($_POST['logout'])) {\n    // empty the $_SESSION\
    \ array\n    $_SESSION = array();\n    // invalidate the session cookie\n    if\
    \ (isset($_COOKIE[session_name()])) {\n        setcookie(session_name(), '', time()-86400,\
    \ '/');\n    }\n    // end session and redirect\n    session_destroy();\n    header('Location:\
    \ http://localhost/phpsols/sessions/login.php ');\n    exit;\n}\n?>\n<form method=\"\
    post\" action=\"\">\n<input name=\"logout\" type=\"submit\" value=\"Log out\"\
    >\n</form>\n```\n\nAt the same point in `menu.php` from which you cut the code\
    \ for the form, include the new file, as follows:\n\n`<?php include '../includes/logout.php';\
    \ ?>`\n\n- You can check your code against `menu_04.php`, `secretpage_03.php`,\
    \ and `logout.php` in the `ch09` folder.\n\nAdd `ob_start();` immediately after\
    \ the call to `session_start()` at the top of `menu.php`. There’s no need to use\
    \ `ob_end_flush()` or `ob_end_clean()`. PHP automatically flushes the buffer at\
    \ the end of the script if you haven’t already explicitly done so. Save `menu.php`\
    \ and test the page. It should look and work exactly the same as before. Repeat\
    \ steps 5 and 6 with `secretpage.php`. You now have a simple, reusable logout\
    \ button that can be incorporated into any restricted page.\n\n- Including the\
    \ code from an external file like this means that there will be output to the\
    \ browser before the calls to `setcookie()` and `header()`. So you need to buffer\
    \ the output, as shown in PHP Solution 9-2."
  raw: '### PHP Solution 9-4: Restricting Access to a Page with a Session


