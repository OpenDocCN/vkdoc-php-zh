    **About the Author**


    **Frank M. Kromann** has spent more than 30 years solving business problems using
    software and technology. Since the introduction of the first web browser he has
    developed systems with web technology on Unix, Linux, Windows, and Mac platforms,
    with the primary focus on `PHP`, `JavaScript`, `C/C++`, and other languages.


    He has contributed several PHP extensions over the years and has been a member
    of the PHP development team since 1997. Previous publications included several
    articles in *PHP Magazine* and he was the coauthor of *PHP 5 Recipes* (Apress,
    2005).


    Frank M. Kromann has held managing positions for more than 20 years, leading both
    smaller and larger teams in development and implementation of business systems
    and processes utilizing databases and programming. Currently he is an Engineering
    Manager at Panasonic Avionics and the CEO and cofounder of Web by Pixel, Inc.


    Kromann holds a Master of Science degree in Electrical Engineering from the Technical
    University of Denmark.


    xxix


    ![Image 3](index-32_1.jpg)


    **About the Technical Reviewer**


    **Massimo Nardone** holds a Master of Science degree in Computing Science from
    the University of Salerno, Italy. He has worked as a Project Manager, Software
    Engineer, Research Engineer, Chief Security Architect, Information Security Manager,
    PCI/SCADA Auditor, and Senior Lead IT Security/Cloud/SCADA Architect for many
    years. He currently works as Chief Information Security Office (CISO) for Cargotec
    Oyj. He has more than 22 years of work experience in IT including Security, SCADA,
    Cloud Computing, IT Infrastructure, Mobile, Security, and WWW technology areas
    for both national and international projects. He worked as visiting lecturer and
    supervisor for exercises at the Networking Laboratory of the Helsinki University
    of Technology (Aalto University). He has been programming and teaching how to
    program with Android, Perl, PHP, Java, VB, Python, `C/C++`, and MySQL for more
    than 20 years. He holds four international patents (PKI, SIP, SAML, and Proxy
    areas).


    Nardone is the coauthor of *Pro Android Games* (Apress, 2015).


    **xxxi**


    **Introduction**


    *PHP 5 Recipes: A Problem-Solution Approach* was released in 2005. At that time
    there were still many sites using the older PHP 4 version of the scripting language,
    and PHP 5 introduced many new features and a totally redesigned model for object-oriented
    programming. Since then PHP has seen many releases, and it’s time to upgrade the
    contents and recipes that cover some of the new features that have been added
    to the language in the eleven years since the first book. The current version
    of PHP is 5.6.x and the development team recently released version 7.0 that promises
    double the performance and half the memory use compared to PHP 5.6. The jump from
    PHP 5 to PHP 7, skipping the major version 6 has to do with a research project
    that was labeled PHP 6. This project was abandoned because of complexity and performance
    problems.


    PHP is a scripting language most commonly used to create dynamic web content;
    in fact about 80 percent of the web servers have PHP installed in some form. PHP
    can also be used as a general purpose scripting language for shell scripts, and
    it’s even possible to create desktop applications with the help of the PHP-GTK
    extension. This book is going to focus on web and shell scripting and it is intended
    for beginners as well as advanced users.'
