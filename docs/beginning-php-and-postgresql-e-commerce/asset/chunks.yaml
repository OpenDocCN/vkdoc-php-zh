    \ := '|';\n        END IF;\n        -- 组合搜索字符串\n        FOR i IN array_lower(inWords,\
    \ 1)..array_upper(inWords, 1) LOOP\n            IF i = array_upper(inWords, 1)\
    \ THEN\n                query := query || inWords[i];\n            ELSE\n    \
    \            query := query || inWords[i] || search_operator;\n            END\
    \ IF;\n        END LOOP;\n        -- 返回匹配的数量\n        SELECT INTO outSearchResultCount\n\
    \            count(*)\n        FROM product,\n            to_tsquery(query) AS\
    \ query_string\n        WHERE search_vector @@ query_string;\n        RETURN outSearchResultCount;\n\
    \    END;\n    $$;\n    ```\n\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
