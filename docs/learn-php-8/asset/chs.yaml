- "# 4. 模块化编程\n\n*我刚看到我的人生在眼前闪过，而我所能看到的只有一个闭合标签……*\n\n## 章节目标/学生学习成果\n\n完成本章后，学生将能够\n\
  \n*   创建一个无错误的、简单的面向对象 (OO) 模块化 PHP 程序\n*   创建一个 PHP 类并实例化该类（对象）\n*   创建一个 OO PHP\
  \ 封装程序，包括 GET 和 SET 方法\n*   创建接受参数并返回信息的 PHP 方法（函数）\n*   创建 PHP 公有和私有属性（变量）\n* \
  \  将来自另一个文件或库的现有 PHP 代码导入到程序中\n*   使用三元（条件）运算符验证接收到的信息\n\n\n\n### PHP 库、扩展、类与对象\n\
  \nPHP 的一大优势在于能够轻松地将代码模块存储在库中。代码一旦存入库中，便可方便地在其他程序中复用。使用那些已在“实际”环境中经过充分测试和使用的代码，能大大减少程序错误并提高生产力，因为你无需重新发明轮子。没有必要重新创建已经成功运行的代码，这既浪费时间和精力，又容易导致不必要的程序错误。实际上，程序员可能并不了解代码模块（`class`）中具体存在什么代码。然而，程序员知道可以向这个“黑箱”传递哪些参数（例如数字），以及能从黑箱中获得什么结果（例如数字之和）。\n\
  \n你可能会担心：程序员盲目地将信息传入黑箱，又盲目地接收返回的信息。但这其实是个优势，而非劣势。它允许模块的创建者更新代码，而不会影响模块的使用方式。只要模块接受相同的输入并返回相同的输出，使用该模块的程序员就察觉不到任何变化。模块可以进行更新以提升效率、增强安全性或修正程序代码问题，而无需用户改变他们在代码中处理该模块的方式。\n\
  \n#### PHP 扩展\n\n```\nextension=bz2\nextension=curl\n;extension=ffi\n;extension=ftp\n\
  extension=fileinfo\nextension=gd2\nextension=gettext\n;extension=gmp\n;extension=intl\n\
  ;extension=imap\n;extension=ldap\nextension=mbstring\nextension=exif\nextension=mysqli\n\
  ;extension=oci8_12c\n;extension=odbc\n;extension=openssl\n;extension=pdo_firebird\n\
  extension=pdo_mysql\n;extension=pdo_oci\n;extension=pdo_odbc\n;extension=pdo_pgsql\n\
  extension=pdo_sqlite\n;extension=pgsql\n;extension=shmop\n;extension=snmp\n;extension=soap\n\
  ;extension=sockets\n;extension=sodium\n;extension=sqlite3\n;extension=tidy\n;extension=xmlrpc\n\
  ;extension=xsl\n例 4-1\nphp.ini 文件中的扩展\n```\n\n*有关 PHP 扩展及其功能的完整列表和说明，请访问* [*www.php.net/manual/en/extensions.alphabetical.php*](http://www.php.net/manual/en/extensions.alphabetical.php)*。*\n\
  \nPHP 拥有大量包含数千行经过充分测试代码的库。例 4-1 是 `php.ini` 文件的部分副本，展示了几个*可在 PHP 中激活的扩展（库）*。这些代码已经编译完成。通过移除扩展语句前的注释符号（`;`），即可激活\
  \ PHP 环境中已存在的库扩展。保存 INI 文件后，必须重启 PHP 和 Web 服务器（`Apache`）（参见第 1 章中关于 `php.ini` 文件位置以及重启\
  \ PHP 和 Apache 的示例）。这种便捷的库添加方式是 PHP 如此受欢迎的原因之一。还可以通过多种方法将额外的库“安装”到 PHP 中。其中一种流行的方法是\
  \ *PEAR*（PHP 扩展与应用仓库），它负责第三方库的代码分发与维护。\n\n- *PEAR 以及其他第三方库的安装方法超出了本书的讨论范围。不过，你可以通过以下链接了解更多信息：*\n\
  - [`pear.php.net/manual/en/about-pear.php`](https://pear.php.net/manual/en/about-pear.php)\n\
  \n此外，程序员还可以通过 `require` 或 `require_once` 语句，将自有的代码库（未编译的）直接“安装”到应用程序中。在企业中，将可能多次复用的代码（例如数据库访问）包含进来是一种常见做法。通过将其（经过充分测试的代码）存放在本地库中，任何更改（例如数据库迁移到另一台服务器）只需在一个位置（本地库文件）处理，而无需修改多个文件。这同时也减少了代码冗余，提高了可靠性。\n\
  \n虽然本地库可以只包含代码方法（函数），但更常见的是这些库中包含模块（类）。这使得程序员能够采用前面提到的“黑箱”概念进行编程。三层架构（第 2 章中解释过）正是基于这一前提。通过引用包含代码的库（使用\
  \ `require` 或 `require_once` 语句），可以从库中访问代码类。一旦建立引用，便会创建该类的一个实例（`对象`）。创建实例后，程序代码就能访问该对象的所有功能。\n\
  \n#### 类与对象\n\n类类似于房屋的蓝图。蓝图包含建造房屋所需所有元素的描述（特征）。但蓝图本身并非实际的房屋，它描述的是如果我们召集施工队建造房屋，可能实现的结果。蓝图不被认为实际存在（如同房屋那样存在）。然而，它描述了建造房屋所需的材料（钉子、石膏板和木材）以及建造过程。\n\
  \n一个**类**描述了代码模块的**特征**（属性）以及该代码中可能发生的**行为**（方法或函数）。但在创建该类的一个实例（称为**对象**）之前，它在内存中并不实际存在。一旦创建实例，就可以访问其特征和行为。正确创建的类与对象能够保护特征（属性）不受直接访问。这为对象提供了在属性值变更请求生效之前，验证该请求是否合法的机会。这通常被称为**封装**。为了保护属性不被外部直接访问，应使用\
  \ **private** 访问类型来声明它们。`Private` 访问类型只允许类内部的方法修改属性的值。**设置方法**（本章稍后讨论）用于修改属性。**获取方法**（同样在稍后讨论）通常用于检索属性值。\n\
  \n#### 创建 PHP 类\n\n我们先创建一个类的基本结构。我们将创建一个 `dog` 类，它可以设置狗的某些特征（体型、品种、颜色和名字），并且能让狗“叫”以及显示各属性中保存的值。我们将把\
  \ `dog` 类创建在一个独立的文件（库）中，以便在需要时加载到程序（或任何其他程序）中。\n\n要创建一个 PHP 类，我们使用 `class` 关键字，并将类中的所有代码封装在\
  \ `{}` 中。\n\n```\n例 4-2\ndog.php 文件中的基本类结构\n```\n\n\n\n### 文本排版：PHP 类与属性\n\n如示例\
  \ 4-2 所示，`class`关键字是小写的。然而，类名`Dog`以大写字母开头。PHP 允许你创建以小写字母开头的类，但通常的实践是通过大写首字母来轻松识别类。包含类的实际文件名（`dog.php`）也应与类名（`Dog`）匹配。\n\
  \n*关于类、方法和属性的更多信息，请访问 php.net 上的 [www.php.net/manual/en/classobj.examples.php](http://www.php.net/manual/en/classobj.examples.php)。*\n\
  \n类名不能包含空格。你还应避免使用特殊字符。不过，下划线（`_`）是允许的，并且常用于连接两个单词（`set_name`）。你可能注意到，有些类名在类名之前包含双下划线（`__`）（例如`__Myclass`）。但由于存在使用此格式的“魔术”类（本章后面会介绍其中两个），这并不是推荐的做法。\n\
  \n如前所述，类包含属性。**属性**也称为**变量**。\n\n属性包含类的特征。当创建类的一个实例时，属性对于该对象是唯一的。操作系统会在内存中预留一块空间来保存属性。操作系统为我们处理内存管理，包括清理不再需要的属性。在\
  \ PHP 中，一旦到达右花括号（`}`），已创建的属性就会被操作系统中的**垃圾回收器**安排移除。此时程序无法再访问该属性。\n\n属性可以保存多种不同类型的数据。在大多数语言中，创建属性时，还必须包含一个数据类型来描述所存储数据的种类（例如字符串）。然而，PHP\
  \ 不需要定义数据类型。但我们建议你使用数据类型，以便验证是否接受了正确的信息。当未声明数据类型时，PHP 会在数据首次放入属性时确定要存储在该属性中的数据类型。\n\
  \n属性以初始的`$`和属性名称创建。属性名称可以包含字母、数字和下划线（`_`）。下划线可以放在属性名前（在`$`之后）或单词之间。不允许包含空格。属性通常以小写字母创建，但\
  \ PHP 也允许大写字母。PHP 是区分大小写的，会将小写属性（`speak`）和大写属性（`Speak`）视为两个不同的属性。\n\n*   *程序设计建议——在\
  \ PHP 中，属性可以随时创建。属性在你第一次使用时创建。这既可能是帮助也可能是麻烦。如果你拼错了属性名，PHP 不会报错，而是会创建一个拼写错误名称的新属性。建议（在可能的情况下）在程序（或方法、类）的顶部用初始值创建属性，以便更容易确定属性名以及它是否已被创建。*\n\
  \n```\nExample 4-3a\nBasic class structure with properties in dog.php file\n```\n\
  \n如示例 4-3a 所示，`Dog`类的每个属性（除了`$dog_size`）都被声明为`private`并初始设置为字符串（文本）。`$dog_size`属性已设置为数字零（我们知道它是数字而不是字符串，因为周围没有`\"\
  \"`）。默认情况下，PHP 会请求操作系统以 ASCII 格式（用于表示每个字符的 0 和 1 组合）存储属性（`$dog_breed`、`$dog_color`和`$dog_name`）中的字符串值，并以数字格式在内存中存储`$dog_size`属性中的值。当变量在程序中使用时，操作系统会创建内存表来查找变量值的实际内存地址。\n\
  \n注意\n\n代码格式必须包括代码语句末尾的分号（所有被执行的代码行都必须包含分号）。\n\n```\nExample 4-3b\nBasic class structure\
  \ with data type–defined properties in dog.php file\n```\n\n如前所述，我们建议使用数据类型，通过限制可存储在属性中的数据类型来提高安全性和验证。在示例\
  \ 4-3b 中，`$dog_size`被声明为只允许整数（整数）。其他三个属性被定义为只允许字符串。请记住，无论何时使用数据类型，都必须将`strict`类型设置为\
  \ 1，如示例所示。默认情况下，`strict`设置不强制数据类型。\n\n正如你可能注意到的，在这一点上，示例并不是很有用。即使我们创建了类的一个实例，我们也无法访问类中的任何东西或显示属性中的值。让我们向类中添加一个方法，以允许我们显示类中包含的内容。为此，我们需要创建一个使用`print`语句来显示值的方法。我们也可以借此机会使用**字符串拼接**来构建一个字符串输出。\n\
  \n在 PHP 中，字符串拼接可以通过多种方式完成。在许多语言中，使用属性构建字符串需要不断地打开和关闭字符串（使用`\"\"`）。\n\n```\nprint\
  \ \"Dog_weight is \" . $this->dog_weight  . \". Dog breed is \" . $this->dog_breed\
  \ . \"Dog color is \" . $this->dog_color;\n```\n\n给定的`print`代码行在 PHP 中是有效的。然而，如你所见，有很多引号和许多句点。这可能导致难以正确匹配所有内容。句点（`.`）是\
  \ PHP 中的字符串拼接字符，如果我们选择使用这种技术，就需要用到它（在许多语言中，我们不得不使用类似疯狂的做法）。然而，PHP 比这友好得多。\n\n* \
  \  *`$this`指针——`$this`指针用于访问对象中包含的属性。`$this`表示代码想要检索存在于特定对象（类的实例）中的属性的值。很快我们将创建一个名为`$lab`的类的实例。当`$lab`实例中存在的代码被执行时，`$this`指针将告诉操作系统它想要仅存在于`$lab`实例中的属性（例如`dog_weight`）的值。注意，语句的格式包含`$this`指针的`$`符号，但不包含变量（`$this->dog_weight`）的`$`符号。*\n\
  \n*   *你可能会问，为什么我们需要`$this`指针？简单答案是，你可以创建一个对类的每个实例都存在的属性（称为静态属性）。*\n\n```\nprivate\
  \ static int $dog_count = 0;\n```\n\n在上面的示例中，如果`$dog_count`的值发生改变，它将对`Dog`类的所有实例都发生改变。这可以作为跟踪所创建狗的数量的一种方式。三个`private\
  \ string`属性将仅针对它被引用的特定类实例（`$lab`）发生改变。\n\n\n```php\nprint \"Dog weight is $this->dog_weight.\
  \ Dog breed is $this->dog_breed.\nDog color is $this->dog_color.\";\n```\n\nPHP\
  \ 允许我们将属性放入字符串（引号）中。这样可以减少句点和引号的使用（或许也能减少你抓耳挠腮的次数）。关于 `$this` 指针的示例，请访问 [`php.net/manual/en/language.oop5.basic.php`](http://php.net/manual/en/language.oop5.basic.php)。\n\
  \n现在我们已经有了生成输出所需的代码，需要在类中添加一个方法来执行 `print` 行。类中发生的所有\"动作\"都必须包含在**方法**中。方法的创建风格与类类似（只是它们实际上包含在类内部）。方法使用关键字\
  \ `function` 后跟方法名和 `()` 来声明。通常方法名使用小写字母，但 PHP 也接受大写字母。下划线（`_`）也可以放在方法名的开头或内部。方法内的所有代码都包含在\
  \ `{}` 中。\n\n- **程序设计建议**——如示例 4-4 所示，注意正确使用开闭括号（`{` 和 `}`）变得更加重要。每个开括号都必须有一个闭括号。编辑器（在第\
  \ 1 章中讨论过）可以通过颜色编码帮助你更轻松地查看所有括号。此外，缩进（如示例 4-4 所示）有助于在视觉上对齐括号。PHP 引擎会忽略多余的空格（称为**空白**）。因此，程序员可以让代码在视觉上更美观且更容易调试。\n\
  \n```php\ndog_weight. Dog breed is\n$this->dog_breed. Dog color is $this->dog_color.\"\
  ;\n}\n}\n?>\nExample 4-4\nBasic class structure with properties and a method in\
  \ dog.php file\n```\n\n这个类现在能够执行一个动作（通过 `display_properties` 方法）。所以，我们终于可以测试其功能了。为此，示例\
  \ 4-4 中的代码必须放在 `dog.php` 文件中（与类名相同），并且位于将使用它的程序所在的同一位置。\n\n现在我们需要创建一个程序，通过 `require_once`\
  \ 语句引入这个代码库。然后，程序需要创建类（`Dog`）的一个实例。最后，程序需要调用方法（`display_properties`）来显示属性的内容。\n\n\
  - **程序设计建议**——PHP 允许在程序代码中的任何位置使用 `include`、`include_once`、`require` 和 `require_once`\
  \ 语句。如果在错误的位置使用或多次使用，可能会导致潜在问题。强烈建议将这些语句集中放在代码尽可能靠前的位置，以便于检查库是否已安装。在 PHP 8 中，我们可以将这些文件预加载到服务器的内存中。我们将在后续章节中演示这一功能。\n\
  \n- **安全性与可靠性**——PHP 有多种方法可将库引入 PHP 程序。`include` 方法会尝试引入一个库。但是，如果库不存在，程序会继续运行（或显示警告）。`include`\
  \ 方法也不关心该库是否已附加到代码中。大型程序可能会意外地多次尝试引入同一个库（由于重复的方法和/或类名，这会在程序中抛出异常）。`include_once`\
  \ 方法消除了多次尝试引入同一个库的可能性。如果库已被包含，则该语句不会执行。`require` 方法不允许在找不到库时继续运行程序。但与 `include`\
  \ 方法一样，它也可能多次尝试引入同一个库。`require_once` 方法通过仅在库尚未安装时引入它，解决了这些潜在问题。\n\n我们在前一章简要介绍了 `require`\
  \ 语句。但在这里回顾其用法是值得的，因为我们将在本书的剩余部分中使用它。`require_once` 语句的格式很简单。关键字 `require_once`\
  \ 后跟库名（`dog.php`）。该语句应放在代码的开头附近，并且在实际创建类（`Dog`）的实例之前。\n\n```php\nrequire_once(\"\
  dog.php\");\n```\n\n*你可以在 `require_once` 语句中包含路径名。但建议不要使用绝对路径。更多信息，请访问 [www.php.net/manual/en/function.require-once.php](http://www.php.net/manual/en/function.require-once.php)。*\n\
  \n要创建类的实例，需要创建一个属性，该属性\"指向\"内存中的类实例。使用 `new` 关键字来告知操作系统应在内存中创建该类的一个实例（并且构造函数方法应执行，稍后会提到）。实际的类名用于确定要构建成对象的类。\n\
  \n```php\n$lab = new Dog;\n```\n\n这段代码会创建 `Dog` 类的一个实例，并用 `$lab` 属性（指针）来引用它。每个类实例都会创建各个属性的实际独立副本（`$dog_size`、`$dog_breed`、`$dog_color`\
  \ 和 `$dog_name`）。这允许你更改该实例（`$lab`）的属性值，而不会影响其他实例的属性。\n\n```php\n$lab->display_properties();\n\
  ```\n\n一旦创建了实例，你就可以通过对象名（`$lab`）和方法名（`display_properties`）来访问任何方法。\n\n```php\ndisplay_properties();\n\
  ?>\nExample 4-5\nBasic program structure including a library, object, and method\
  \ call in lab.php\n```\n\n**注意**  \n我们目前假设 `dog.php` 文件存在。但是，如果这段代码用于生产环境，我们需要处理文件可能丢失的情况。我们将在后面的示例中使用第\
