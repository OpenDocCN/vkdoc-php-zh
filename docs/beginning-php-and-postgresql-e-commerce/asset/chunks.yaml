    \ function\nCREATE FUNCTION shopping_cart_create_order(CHAR(32), INTEGER, INTEGER,\
    \ INTEGER)\nRETURNS INTEGER LANGUAGE plpgsql AS $$\nDECLARE\n  inCartId ALIAS\
    \ FOR $1;\n  inCustomerId ALIAS FOR $2;\n  inShippingId ALIAS FOR $3;\n  inTaxId\
    \ ALIAS FOR $4;\n  outOrderId INTEGER;\n  cartItem cart_product;\n  orderTotalAmount\
    \ NUMERIC(10, 2);\nBEGIN\n  -- Insert a new record into orders\n  INSERT INTO\
    \ orders (created_on, customer_id, shipping_id, tax_id)\n  VALUES (NOW(), inCustomerId,\
    \ inShippingId, inTaxId);\n\n  -- Obtain the new Order ID\n  SELECT INTO outOrderId\n\
    \  currval('orders_order_id_seq');\n\n  orderTotalAmount := 0;\n\n  -- Insert\
    \ order details in order_detail table\n  FOR cartItem IN\n    SELECT p.product_id,\
    \ p.name,\n           COALESCE(NULLIF(p.discounted_price, 0), p.price) AS price,\n\
    \           sc.quantity,\n           COALESCE(NULLIF(p.discounted_price, 0), p.price)\
    \ * sc.quantity AS subtotal\n    FROM shopping_cart sc\n    INNER JOIN product\
    \ p\n      ON sc.product_id = p.product_id\n    WHERE sc.cart_id = inCartId AND\
    \ sc.buy_now\n  LOOP\n    INSERT INTO order_detail (order_id, product_id, product_name,\
    \ quantity, unit_cost)\n    VALUES (outOrderId, cartItem.product_id, cartItem.name,\
    \ cartItem.quantity, cartItem.price);\n\n    orderTotalAmount := orderTotalAmount\
    \ + cartItem.subtotal;\n  END LOOP;\n\n  -- Save the order's total amount\n  UPDATE\
    \ orders\n  SET total_amount = orderTotalAmount\n  WHERE order_id = outOrderId;\n\
    \n  -- Clear the shopping cart\n  PERFORM shopping_cart_empty(inCartId);\n\n \
    \ -- Return the Order ID\n  RETURN outOrderId;\nEND;\n$$;\n```\n\n**10.** Create\
