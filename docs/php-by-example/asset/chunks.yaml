- fmt: '`sum()`函数计算调用时传递给它的参数的总和。为了在函数体内存储总和的值，使用初始值为零的`$s`变量。参数的迭代在`foreach`循环语句中执行。`func_get_args()`表达式被指定为要迭代的数组。由于`func_get_args()`函数返回一个包含传递给函数（此处为`sum()`）的参数列表，因此迭代的就是这些值。`$a`变量用于存储参数。每次循环时，`$s+=$a`命令将`$s`变量的当前值增加`$a`的值，因此循环语句终止后，`sum()`函数参数的总和被写入`$s`变量。`return
    $s`命令将该数字作为函数的结果返回。


    | 详情 |

    | --- |

    | 如果调用`sum()`函数时不带任何参数，结果为零。这是`$s`变量的初始值，在函数代码执行期间不会改变。 |


    `count_type()`函数不返回结果，仅显示消息。这些消息包含关于总共向函数传递了多少个参数以及特定类型参数数量的信息。类型由函数的第一个参数`$type`作为字符串确定（例如，`"integer"`或`"string"`）。


    在函数体内，`$num=func_num_args()`命令将传递给函数的参数数量赋值给`$num`变量。该值作为`func_num_args()`的结果返回。为了计算由`$type`参数指定类型的参数数量，使用初始值为零的`$count`变量。


    在开始计数之前，使用条件语句检查`$num==1`条件。条件为真意味着仅向函数传递了一个参数，该参数按假设决定了参数的类型，且没有其他参数。如果是这样，则`echo
    "The search is over\n"`显示一条消息，然后函数因`return`指令而终止。


    如果参数多于一个，则不执行`return`语句，`for`循环语句开始执行。在此，`$k`变量取值从`1`到严格小于`$num`。这里迭代除第一个参数之外的所有参数：忽略第一个参数，因为它是唯一的。


    ![An information icon with the letter ''i''.]（images/613529_1_En_5_Chapter/613529_1_En_5_Figm_HTML.jpg）

    注意


    参数索引从零开始。


    要检查参数的类型，使用条件语句并检查`gettype(func_get_arg($k))==$type`条件。`gettype()`函数返回一个字符串，其中包含传递给`gettype()`函数的值对应的类型名称。在此，传递`func_get_arg($k)`表达式作为参数。它给出索引为`$k`的`count_type()`函数参数的值。如果该参数的类型与`$type`中指定的类型匹配，则`$count++`命令将`$count`变量递增一。循环语句终止后，`$count`变量包含传递给`count_type()`函数的给定类型参数的数量。


    ![An information icon with the letter ''i''.]（images/613529_1_En_5_Chapter/613529_1_En_5_Fign_HTML.jpg）

    注意


    `func_num_args()`和`func_get_arg()`函数用于实现`count_type()`函数代码（尽管也可以使用`func_get_args()`函数），以说明处理传递给函数的参数的不同方式。


    创建函数后，检查它们如何运行。因此，`sum(5,9,6)`表达式给出数字`5`、`9`和`6`的总和。当不带参数调用`sum()`函数时，结果为`0`。`sum(1,3,5,7,9)`表达式的值是数字`1`、`3`、`5`、`7`和`9`的总和。


    在`count_type("integer",2,8,"12",3.5,2,"hello")`命令中，使用七个参数调用`count_type()`函数，整数参数的数量为三。在`count_type("string",2,8,"12",3.5,2,"hello")`命令中，`count_type()`函数获得相同数量的参数，但现在需要计算字符串参数的数量，这样的参数有两个（不计算第一个）。最后，当使用`count_type("integer")`命令调用`count_type()`函数时，仅向其传递一个参数，因此不会进行整数类型参数的计数。


    如前所述，存在一种更便捷的方法来创建具有任意数量参数的函数。它要求在声明函数时使用一个参数，并在参数前加省略号。这样的参数标识传递给函数的整个参数列表，并将其视为数组。让我们重新审视之前的程序，但针对声明具有任意数量参数的函数的新方法进行调整。代码如清单
    [5-8](#613529_1_En_5_Chapter.xhtml#PC17) 所示（为保持代码简洁，评论已删除）。


    ```

    Listing 5-8

    One More Way to Declare a Function with an Arbitrary Number of Arguments

    ```


    程序结果与之前情况相同。代码的主要部分也没有改变。但仍然有一些创新之处，而且它们很重要。让我们分析一下。


    `sum()`函数有一个由`...$nums`指令描述的参数。`$nums`前的省略号意味着它“隐藏”了一组值，这些值可以用函数参数的数组来标识。当在`foreach`循环语句中迭代参数时，使用的就是这个“数组”。


    `count_type()`函数使用两个参数声明。第一个`$type`参数的含义与之前示例相同。第二个参数`$args`，由`...$args`指令描述，被标识为传递给函数的其他参数（除第一个之外）的集合（或“数组”）。


    `$num`变量的值现在由`$num=sizeof($args)+1`命令确定，该命令使用`sizeof()`函数获取“数组”`$args`的大小。由于还存在未包含在`$args`参数中的第一个参数，因此在`sizeof()`函数的结果上加一。


    在`for`循环语句中，`$k`变量的初始值现在是`0`，而不是之前的`1`。此处考虑到第一个参数`$type`未包含在“数组”`$args`中，并且必须处理`$args`中所有元素的索引。


    最后，在条件语句中检查`gettype($args[$k])==$type`条件，其中使用`$args[$k]`指令来访问参数。'
  raw: 'The `sum()` function calculates the sum of the arguments passed to the function
    when called. To store the sum’s value in the function’s body, you use the `$s`
    variable with the initial zero value. The iteration of arguments is performed
    in the `foreach` loop statement. The `func_get_args()` expression is specified
    as the array to iterate over it. Since the `func_get_args()` function returns
    a list with the arguments passed to the function (in this case, `sum()`), it is
    these values that are iterated over. The `$a` variable is used to store the arguments.
    For each loop, the `$s+=$a` command increments the current value of the `$s` variable
    by the value of `$a`, so after terminating the loop statement, the sum of the
    arguments of the `sum()` function is written to the `$s` variable. The `return
    $s` command returns that number as the result of the function.


    | Details |

    | --- |

    | If you call the `sum()` function with no arguments, the result is zero. That
    is the initial value of the `$s` variable, which does not change during the execution
    of the function code. |


    The `count_type()` function does not return a result but only displays messages.
    They contain information about how many arguments were passed to the function
    in total and the count of arguments of a specific type. The type is determined
    as a string by the first argument `$type` of the function (for example, `"integer"`
    or `"string"`).


    In the function’s body, the `$num=func_num_args()` command assigns the number
    of arguments passed to the function to the `$num` variable. That value is returned
    as the result of `func_num_args()`. To count the number of arguments of the type
    given by the `$type` argument, you use the `$count` variable with the initial
    zero value.


    Before starting the count, you use the conditional statement to check the `$num==1`
    condition. The true condition means that only one argument is passed to the function,
    which, following the assumptions, determines the type of the arguments, and there
    are no other arguments. If so, then `echo "The search is over\n"` displays a message,
    and then the function is terminated due to the `return` instruction.


    If there are more arguments than one, the `return` statement is not executed,
    and the `for` loop statement comes into play. There, the `$k` variable takes the
    values from `1` and strictly less than `$num`. Here, you iterate over all but
    the first argument: ignore the first one because it is unique.


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Figm_HTML.jpg)An information icon
    with the letter ''i''.Note


    Argument indexing begins from zero.


    To check the type of an argument, use the conditional statement with the `gettype(func_get_arg($k))==$type`
    condition to be checked. The `gettype()` function returns a string with the type
    name for the value passed as an argument to the `gettype()` function. In this
    case, the `func_get_arg($k)` expression is passed as an argument. It gives the
    value of the `count_type()` function argument with the `$k` index. If the type
    of that argument matches the type specified in `$type`, then the `$count++` command
    increments the `$count` variable by one. After the loop statement is terminated,
    the `$count` variable contains the count of arguments of the given type passed
    to the `count_type()` function.


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Fign_HTML.jpg)An information icon
    with the letter ''i''.Note


    The `func_num_args()` and `func_get_arg()` functions are used to implement the
    `count_type()` function code (although the `func_get_args()` function could be
    as well) to illustrate different ways of handling arguments passed to a function.


    After creating the functions, you check how they operate. Thus, the `sum(5,9,6)`
    expression gives the sum of the numbers `5`, `9`, and `6`. When the function `sum()`
    is called without arguments, the result is `0`. The value of the `sum(1,3,5,7,9)`
    expression is the sum of the numbers `1`, `3`, `5`, `7`, and `9`.


    In the `count_type("integer",2,8,"12",3.5,2,"hello")` command, the `count_type()`
    function is called with seven arguments, and the count of integer arguments is
    three. In the `count_type("string",2,8,"12",3.5,2,"hello")` command, the `count_type()`
    function gets the same number of arguments, but now the string arguments have
    to be counted, and there are two (not counting the first one) such arguments.
    Finally, when the `count_type()` function is called with the `count_type("integer")`
    command, only one argument is passed to it, so it does not come to counting the
    integer type arguments.


    As noted, a more convenient way to create functions with an arbitrary number of
    arguments exists. It assumes declaring a function with one argument with the ellipsis
    before the argument. Such an argument identifies the entire list of arguments
    passed to the function and is treated as an array. Let’s re-examine the previous
    program but adjust it for the new way of declaring functions with an arbitrary
    number of arguments. The code is shown in Listing [5-8](#613529_1_En_5_Chapter.xhtml#PC17)
    (the comments are removed to keep the code short).


    ```

    Listing 5-8

    One More Way to Declare a Function with an Arbitrary Number of Arguments

    ```


    The program’s result is the same as in the previous case. The main part of the
    code has not changed either. But there are still some innovations, and they are
    important ones. Let’s analyze them.


    The `sum()` function has an argument described by the `...$nums` instruction.
    The ellipsis before `$nums` means that it "hides" a set of values, which can be
    identified with an array of the function arguments. That "array" is what you use
    in the `foreach` loop statement when iterating over the arguments.


    The `count_type()` function is declared with two arguments. The first `$type`
    argument has the same meaning as in the previous example. The second argument
    `$args`, described by the `...$args` instruction, is identified with a set (or
    "array") of other arguments (except the first one) passed to the function.


    The value of the `$num` variable is now determined by the `$num=sizeof($args)+1`
    command, which uses the `sizeof()` function to get the size of the "array" `$args`.
    Since there is also the first argument that is not included in the `$args` argument,
    one is added to the result of the `sizeof()` function.


    The initial value of the `$k` variable in the `for` loop statement is now `0`
    instead of `1` as it used to be. It is taken into account here that the first
    argument `$type` is not included in the “array” `$args`, and the indexes of all
    elements from `$args` must be handled.


    Finally, the `gettype($args[$k])==$type` condition is checked in the conditional
    statement, in which the `$args[$k]` instruction is used to access the argument.'
