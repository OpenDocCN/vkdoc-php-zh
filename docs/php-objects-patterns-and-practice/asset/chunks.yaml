    of original code, sometimes to the detriment of their projects.


    **Note**


    The unwillingness to use third party tools and solutions is often built-in at
    the institutional level. This tendency to treat external products with suspicion
    is sometimes known as the not invented here syndrome.


    This emphasis on authorship may be one reason that there often seems to be more
    creation than actual use of reusable code.


    Effective programmers see original code as just one of the tools available to
    aid them in engineering a project’s successful outcome. Such programmers look
    at the resources they have at hand and deploy them effectively. If a package exists
    to take some strain, then that is a win. To steal and paraphrase an aphorism from
    the Perl world: good coders are lazy.'
  raw: '## Borrowing a Wheel


    When faced with a challenging but discrete requirement in a project (the need
    to parse a particular format, perhaps, or to use a novel protocol in talking to
    a remote server), there is a lot to be said for building a component that addresses
    the need. It can also be one of the best ways to learn your craft. In creating
    a package, you gain insight into a problem and file away new techniques that might
    have wider application. You invest at once in your project and in your own skills.
    By keeping functionality internal to your system, you can save your users from
    having to download third-party packages . Occasionally, too, you may sidestep
    thorny licensing issues. There’s nothing like the sense of satisfaction you can
    get when you test a component you designed yourself and find that, wonder of wonders,
    it works—it does exactly what you wrote on the tin.


    There is a dark side to all this, of course. Many packages represent an investment
    of thousands of man-hours: a resource that you may not have on hand. You may be
    able to address this by developing only the functionality needed specifically
    by your project, whereas a third-party tool might fulfill a myriad of other needs,
    as well. The question remains, however: if a freely available tool exists, why
    are you squandering your talents in reproducing it? Do you have the time and resources
    to develop, test, and debug your package? Might not this time be better deployed
    elsewhere?


    I am one of the worst offenders when it comes to wheel reinvention. Picking apart
    problems and inventing solutions to them is a fundamental part of what we do as
    coders. Getting down to some serious architecture is a more rewarding prospect
    than writing some glue to stitch together three or four existing components. When
    this temptation comes over me, I remind myself of projects past. Although the
    choice to build from scratch has never killed a project in my experience, I have
    seen it devour schedules and murder profit margins. There I sit with a manic gleam
    in my eye, hatching plots and spinning class diagrams, failing to notice as I
    obsess over the details of my component that the big picture is now a distant
    memory.


    Now, when I map out a project, I try to develop a feel for what belongs inside
    the codebase and what should be treated as a third-party requirement. For example,
    your application may generate (or read) an RSS feed; and you may need to validate
    e-mail addresses and automate mailouts, authenticate users, or read from a standard-format
    configuration file. All of these needs can be fulfilled by external packages.


    In previous versions of this book, I suggested that PEAR (PHP Extension and Application
    Repository ) was the way to go for packages. Times change, though, and the PHP
    world has very definitely moved to the Composer dependency manager and its default
    repository, Packagist ( [`https://packagist.org`](https://packagist.org) ). Because
    Composer manages packages on a per-project basis, it is less prone to the dreaded
    dependency hell syndrome (where different packages require incompatible versions
    of the same library). Besides, the fact that all the action has moved to Composer/Packagist
    means that you’re more likely to find what you’re looking for there. What’s more,
    many of the PEAR packages are available through Packagist ( [`https://packagist.org/packages/pear/`](https://packagist.org/packages/pear/)
    ).


    So, once you have defined your needs, your first stop should be the Packagist
    site. You can then use Composer to install your package and to manage package
    dependencies. I will cover Composer in more detail in the next chapter.


    To give you some idea of what’s available using Composer and Packagist , here
    are just a few of the things you can do with the packages you’ll find there:


    *   Cache output with `pear/cache_lite`

    *   Test the efficiency of your code with the `athletic/athletic` benchmark library

    *   Abstract the details of database access with `doctrine/dbal`

    *   Extract RSS feeds with `simplepie/simplepie`

    *   Send mail with attachments with `pear/mail`

    *   Parse configuration file formats with `symfony/config`

    *   Parse and manipulate URLs with `jwage/purl`


    The Packagist website provides a powerful search facility. You may find packages
    that address your needs there, or you may need to cast your net wider using a
    search engine. Either way, you should always take time to assess existing packages
    before setting out to potentially reinvent that wheel.


    The fact that you have a need—and that a package exists to address it—should not
    be the start and end of your deliberations. Although it is preferable to use a
    package where it will save you otherwise unnecessary development, in some cases
    it can add overhead without real gain. Your client’s need for your application
    to send mail, for example, does not mean that you should automatically use the
    pear/mail package. PHP provides a perfectly good `mail()` function , so this would
    probably be your first stop. As soon as you realize that you have a requirement
    to validate all e-mail addresses according to the RFC822 standard and that the
    design team wants to send image attachments with the e-mails, you may begin to
    weigh the options differently. As it happens, pear/mail supports both these features
    (the latter in conjunction with `mail_mime`).


    Many programmers, myself included, often place too much emphasis on the creation
    of original code, sometimes to the detriment of their projects.


    Note


    The unwillingness to use third party tools and solutions is often built-in at
    the institutional level. This tendency to treat external products with suspicion
    is sometimes known as the not invented here syndrome.


    This emphasis on authorship may be one reason that there often seems to be more
    creation than actual use of reusable code.


    Effective programmers see original code as just one of the tools available to
    aid them in engineering a project’s successful outcome. Such programmers look
    at the resources they have at hand and deploy them effectively. If a package exists
    to take some strain, then that is a win. To steal and paraphrase an aphorism from
    the Perl world: good coders are lazy.'
  trans: '

    # 借用轮子


    当项目中遇到一个具有挑战性但相对独立的需求时（例如，需要解析特定格式，或使用新协议与远程服务器通信），构建一个满足需求的组件是很有价值的。它也可能是学习技艺的最佳途径之一。在创建包的过程中，你能深入理解问题，并掌握可能具有更广泛应用的新技术。你既是在为项目投资，也是在提升自身技能。通过将功能保留在系统内部，你可以让用户免于下载第三方包。有时，你还能规避棘手的许可问题。当你测试自己设计的组件，并惊奇地发现它竟然能正常工作——完全实现了你承诺的功能时，那种成就感是无可替代的。


    当然，这也有其阴暗面。许多包凝聚了数千工时的投入：这是你可能并不具备的资源。你或许可以通过只开发项目所需的功能来解决这个问题，而第三方工具可能还能满足其他众多需求。但问题依然存在：如果已有免费可用的工具，为何还要浪费才华去重新创造它？你是否有时间和资源来开发、测试和调试自己的包？这些时间难道不能更好地用在别处吗？


    在重复造轮子这件事上，我算是罪魁祸首之一。拆解问题并发明解决方案，是我们作为程序员工作的核心部分。着手进行一些严肃的架构设计，比编写胶水代码将三四个现有组件拼凑起来更有成就感。每当这种诱惑袭来，我都会提醒自己过往的项目。虽然在我经验中，选择从头构建从未导致项目失败，但我目睹过它吞噬项目进度、扼杀利润。我坐在那里，眼中闪烁着狂热的光芒，构思方案、绘制类图，却未曾注意到，当我沉迷于组件的细节时，全局蓝图早已变得遥不可及。


    如今，在规划项目时，我会努力培养一种直觉，判断哪些内容应属于代码库内部，哪些应作为第三方需求处理。例如，你的应用可能需要生成（或读取）RSS 源；你可能需要验证电子邮件地址、自动发送邮件、验证用户身份，或读取标准格式的配置文件。所有这些需求都可以通过外部包来实现。


    在本书的先前版本中，我建议使用 PEAR（PHP 扩展与应用库）来获取包。但时代在变，PHP 世界已明确转向 Composer 依赖管理器及其默认仓库 Packagist（[`https://packagist.org`](https://packagist.org)）。由于
    Composer 按项目管理包，它不太容易引发可怕的“依赖地狱”综合征（即不同包需要同一库的不兼容版本）。此外，所有行动都已转移至 Composer/Packagist，这意味着你更有可能在那里找到所需内容。更重要的是，许多
    PEAR 包也通过 Packagist 提供（[`https://packagist.org/packages/pear/`](https://packagist.org/packages/pear/)）。


    因此，一旦你定义了需求，第一站就应该是 Packagist 网站。然后你可以使用 Composer 安装包并管理包依赖。我将在下一章更详细地介绍 Composer。


    为了让你了解使用 Composer 和 Packagist 可以获取什么，以下是你能在那里找到的众多包所能实现的一些功能：


    - 使用 `pear/cache_lite` 缓存输出

    - 使用 `athletic/athletic` 基准测试库测试代码效率

    - 使用 `doctrine/dbal` 抽象数据库访问细节

    - 使用 `simplepie/simplepie` 提取 RSS 源

    - 使用 `pear/mail` 发送带附件的邮件

    - 使用 `symfony/config` 解析配置文件格式

    - 使用 `jwage/purl` 解析和操作 URL


    Packagist 网站提供了强大的搜索功能。你可以在那里找到满足需求的包，或者可能需要使用搜索引擎扩大搜索范围。无论如何，在着手可能重复造轮子之前，你都应该花时间评估现有的包。


    你有需求，并且存在满足该需求的包——这不应该是你决策的唯一依据。虽然使用包能节省不必要开发的成本是可取的，但在某些情况下，它可能徒增开销而无实际收益。例如，你的客户需要应用能发送邮件，这并不意味着你应该自动使用
    `pear/mail` 包。PHP 提供了相当好用的 `mail()` 函数，因此这可能是你的首选。但一旦你意识到需要根据 RFC822 标准验证所有电子邮件地址，并且设计团队想要在邮件中发送图片附件时，你可能就开始重新权衡选择了。碰巧的是，`pear/mail`
    支持这两个功能（后一个功能需结合 `mail_mime` 使用）。


    许多程序员，包括我在内，常常过分强调创作原创代码，有时甚至损害了项目利益。


    **注意**


    不愿使用第三方工具和解决方案的态度，常常是机构层面固有的。这种对外部产品持怀疑倾向的现象，有时被称为“非我发明”综合征。


    这种对原创性的强调，可能是导致可重用代码似乎被创造得多、实际用得少的原因之一。


    高效的程序员将原创代码视为帮助他们成功完成项目的工具之一。这样的程序员会审视手头的资源，并有效利用它们。如果某个包能分担压力，那就是胜利。借用并改写 Perl
    世界的一句格言：好程序员都是“懒人”。

    '
- fmt: '# Playing Nice


    The truth of Sartre’s famous dictum that “Hell is other people” is proved on a
    daily basis in some software projects. This might describe the relationship between
    clients and developers, symptomized by the many ways that lack of communication
    leads to creeping features and skewed priorities. But the cap fits, too, for happily
    communicative and cooperative team members when it comes to sharing code.


    As soon as a project has more than one developer, version control becomes an issue.
    A single coder may work on code in place, saving a copy of her working directory
    at key points in development. Introduce another programmer to the mix, and this
    strategy breaks down in minutes. If the new developer works in the same development
    directory, then there is a real chance that one programmer will overwrite the
    work of his colleague when saving, unless both are very careful to always work
    on different files.


    Alternatively, our two developers can each take a version of the codebase to work
    on separately. That works fine until the moment comes to reconcile the two versions.
    Unless the developers have worked on entirely different sets of files, the task
    of merging two or more development strands rapidly becomes an enormous headache.


    This is where Git, Subversion, and similar tools come in. Using a version control
    system, you can check out your own version of a codebase and work on it until
    you are happy with the result. You can then update your version with any changes
    that your colleagues have been making. The version control software will automatically
    merge these changes into your files, notifying you of any conflicts it cannot
    handle. Once you have tested this new hybrid, you can save it to the central repository,
    making it available to other developers.


    Version control systems provide you with other benefits. They keep a complete
    record of all stages of a project, so you can roll back to, or grab a snapshot
    of, any point in the project’s lifetime. You can also create branches, so that
    you can maintain a public release at the same time as a bleeding-edge development
    version.


    Once you have used version control on a project, you will not want to attempt
    another without it. Working simultaneously with multiple branches of a project
    can be a conceptual challenge, especially at first, but the benefits soon become
    clear. Version control is just too useful to live without. I cover Git in Chapter
    [17](#A314621_5_En_17_Chapter.html).


    # Giving Your Code Wings


    Have you ever seen your code grounded because it is just too hard to build? This
    is especially true for projects that are developed in place. Such projects settle
    into their context, with passwords and directories, databases and helper application
    invocations programmed right into the code. Deploying a project of this kind can
    be a major undertaking, with teams of programmers picking through source code
    to amend settings, so that they fit the new environment.


    This problem can be eased to some degree by providing a centralized configuration
    file or class so that settings can be changed in one place. But even then, build
    can be a chore. The difficulty or ease of installation will have a major impact
    upon the popularity of any application you distribute. It will also impede or
    encourage multiple and frequent deployments during development.


    As with any repetitive and time-consuming task, build should be automated. A build
    tool can determine default values for install locations, check and change permissions,
    create databases, and initialize variables, among other tasks. In fact, a build
    tool can do just about anything you need to get an application from a source directory
    in a distribution to full deployment.


    This doesn’t absolve the user from the responsibility for adding information about
    his environment to the code, of course, but it can make the process as easy as
    answering a few questions or providing a couple of command line switches.


    Cloud products such as Amazon’s EC2 have made it possible to create test and staging
    environments, as needed. Good build and install solutions are essential in order
    to take full advantage of these resources. It’s no good being able to provision
    a server on an automated basis if you can’t also deploy your system on the fly.


    There are various build tools available to the developer. Both PEAR and Composer
    manage installation (PEAR centrally, and Composer to a local `vendor` directory).
    You can create your own packages for either system, which can then be downloaded
    and installed by users with ease. Build is about much more than the process of
    placing file A in location B, however.


    In Chapter [19](#A314621_5_En_19_Chapter.html), I will look at an application
    called Phing. This open source project is a port of the popular Ant build tool
    that is written in and for Java. Phing is written in and for PHP, but it’s architecturally
    similar to Ant and uses the same XML format for its build files.


    Composer performs a limited number of tasks extremely well and offers the simplest
    possible configuration. Phing is more daunting at first, but with the tradeoff
    of immense flexibility. Not only can you use Phing to automate anything from file
    copying to XSLT transformation, you can easily write and incorporate your own
    tasks, should you need to extend the tool. Phing is written using PHP’s object-oriented
    features, and its design emphasizes modularity and ease of extension.


    Build tools and those designed for package or dependency management are far from
    mutually exclusive. Typically, a build tool is used during development to run
    tests, perform project housekeeping, and to prepare the packages that are ultimately
    deployed via PEAR, Composer, or even distribution based–package management systems
    like RPM and Apt.


    # Standards


    I mentioned previously that this book is shifting its focus in this edition from
    PEAR to Composer. Is this because Composer is much better than PEAR? I do love
    lots of things about Composer, and these might swing the decision on their own.
    The principal reason the book is shifting, though, is that everyone else has shifted.
    Composer has become the standard for dependency management. That is crucial because
    it means that when I find a package at Packagist, I am also likely to find all
    its dependencies and related packages. I’ll even find many of the PEAR packages
    there.


    Choosing a standard for dependency management, then, ensures availability and
    interoperability. But standards apply beyond packages and dependencies to the
    ways that systems work and to the ways that we code. If we agree on protocols,
    then our systems and teams can integrate seamlessly with one another. And, as
    more and more components mix across more and more systems, that is increasingly
    essential.


    Where a definitive way of handling, say, logging, is needed, it is obviously ideal
    that we adopt the best protocol. But the quality of the recommendation (which
    will dictate formats, log levels, etc.) is possibly less important than the fact
    that we all comply with it. It’s no good implementing the best standard if you’re
    the only person doing it.


    In chapter [15](#A314621_5_En_15_Chapter.html), I discuss standards in more detail
    with particular reference to a set of recommendations managed by the PHP-FIG group.
    These PSRs (PHP Standards Recommendations) cover everything from caching to security.
    In the chapter, I will focus on PSR-1 and PSR-2, recommendations which address
    the thorny issue of coding style (where do you like to put your braces? And how
    do you feel about someone else telling you to change the way you do it?). Then
    I move on to the absolute boon of PSR-4, which covers autoloading (support for
    PSR-4 is another area in which Composer excels).'
