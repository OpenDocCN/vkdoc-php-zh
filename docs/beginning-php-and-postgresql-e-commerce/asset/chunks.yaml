    \n```php\n<?php\n\n// 插件文件中的插件函数必须命名为: smarty_type_name\nfunction smarty_function_load_reviews($params,\
    \ $smarty)\n{\n    // 创建评论对象\n    $reviews = new Reviews();\n    $reviews->init();\n\
    \n    // 分配模板变量\n    $smarty->assign($params['assign'], $reviews);\n}\n\n// 处理产品评论的类\n\
    class Reviews\n{\n    public $mProductId;\n    public $mReviews;\n    public $mTotalReviews;\n\
    \    public $mReviewerName;\n    public $mEnableAddProductReviewForm = false;\n\
    \    public $mAddProductReviewTarget = 'index.php';\n\n    public function __construct()\n\
    \    {\n        if (isset ($_GET['ProductID']))\n            $this->mProductId\
    \ = (int)$_GET['ProductID'];\n        else\n            trigger_error('未设置产品 ID',\
    \ E_USER_ERROR);\n\n        $this->mAddProductReviewTarget .= '?ProductID=' .\
    \ $this->mProductId;\n    }\n\n    public function init()\n    {\n        // 如果访客已登录...\n\
    \        if (Customer::IsAuthenticated())\n        {\n            // 检查访客是否正在添加评论\n\
    \            if (isset($_POST['AddProductReview']))\n                Catalog::CreateProductReview(\n\
    \                    Customer::GetCurrentCustomerId(),\n                    $this->mProductId,\n\
    \                    $_POST['review'],\n                    $_POST['rating']\n\
    \                );\n\n            // 显示\"添加评论\"表单，因为访客已注册\n            $this->mEnableAddProductReviewForm\
    \ = true;\n\n            // 获取访客（评论者）的姓名\n            $customer_data = Customer::Get();\n\
    \            $this->mReviewerName = $customer_data['name'];\n        }\n\n   \
    \     // 获取该产品的评论\n        $this->mReviews = Catalog::GetProductReviews($this->mProductId);\n\
    \n        // 获取评论数量\n        $this->mTotalReviews = count($this->mReviews);\n\
    \    }\n}\n?>\n```\n\n3. 打开`presentation/templates/product.tpl`，并在其末尾添加以下行：\n\n\
    ```\n<br /><br />\n{include file=\"reviews.tpl\"}\n```\n\n4. 在`hatshop.css`末尾添加以下样式：\n\
    \n```css\nul\n{\n    list-style-type: none;\n    padding: 0px;\n}\n\nli span\n\
    {\n    background: #ccddff;\n    display: block;\n    padding: 5px;\n}\n\n.add_review\
    \ tr td\n{\n    background: #e6e6e6;\n    border: none;\n}\n```\n\n5. 在浏览器中加载`index.php`，点击某个产品查看其产品详情页面，并欣赏结果（请参考本章开头的图\
    \ 16-1）。您必须登录才能添加新评论。\n\n## 工作原理：评论组件化模板\n\n评论组件化模板负责显示评论和添加新评论。`reviews.tpl`文件的第一部分判断当前产品是否有评论要显示。如果没有，则会显示一条简短消息，鼓励访客撰写第一条评论。\n\
    \n```\n{if $reviews->mTotalReviews != 0}\n<span class=\"description\">客户评论：</span><br\
    \ />\n**[评论列表]**\n{else}\n<span class=\"description\">\n成为第一个发表意见的人！<br /><br\
    \ />\n</span>\n{/if}\n```\n\n模板的第二部分显示用于添加评论的表单，或者显示一条邀请访客“登录”以添加评论的消息：\n\n```\n\
    {if $reviews->mEnableAddProductReviewForm}\n{* 添加评论表单 *}\n<span class=\"description\"\
    >添加一条评论：</span><br /><br />\n**[添加评论表单]**\n{else}\n<span>\n<strong>您必须登录才能添加评论。<strong/>\n\
    </span>\n{/if}\n```\n\n函数插件中的代码相当简单，应该不会对您造成困扰。\n\n## 总结\n\n是的，就这么简单。尽管您可能希望为自己的解决方案添加某些改进（例如，允许访客编辑他们的评论，或禁止他们添加更多评论），但基础已经存在，并且按预期工作。\n\
    \n您现在已准备好进入本书的最后一章，在那里您将学习如何通过使用 XML Web Services 从 Amazon.com 向您的客户销售商品。\n"
- fmt: '# Connecting to Web Services


    In the dynamic world of the Internet, sometimes it isn’t enough to just have an
    important web presence; you also need to interact with functionality provided
    by third parties to achieve your goals. So far in this book, you already saw how
    to integrate external functionality to process payments from your customers.


    In this chapter, you’ll learn new possibilities for integrating features from
    an external source through a Web Service. A **Web Service** is a piece of functionality
    that is exposed through a web interface using standard Internet protocols such
    as `HTTP`. The messages exchanged by the client and the server are encoded using
    an XML-based protocol named `SOAP` (Simple Object Access Protocol) or by using
    `REST` (Representational State Transfer).


    These messages are sent over `HTTP`. You’ll learn more about these technologies
    a bit later.


    The beauty of using Web Services is that the client and the server can use any
    technology, any language, and any platform. As long as they exchange information
    with a standard protocol such as `SOAP` over `HTTP`, there is no problem if the
    client is a cell phone, and the server is a Java application running on Solaris,
    for example.


    The possibilities are exciting, and we recommend you purchase a book that specializes
    in Web Services to discover more about their world. Have a look at the list of
    public Web Services at `http://www.xmethods.net/` to get an idea of the kinds
    of external functionality you can integrate into your application.


    In this chapter, you’ll learn how to integrate the **Amazon E-Commerce Service**
    (`ECS`; Web Services interface provided by Amazon.com, formerly known as Amazon
    Web Services—`AWS`) to sell Amazon.com products through your HatShop web site.


    You already have an e-commerce web site that sells hats to its customers. You
    can go further and make some more money from their passion for hats by incorporating
    some other kinds of hats-related gifts from Amazon.com into your site. For free?
    Oh no... You’ll display Amazon.com’s details on your site, but the final checkout
    will be processed by Amazon.com, and Amazon.com will deliver in your bank account
    a small commission fee for purchases made from your web site. Sounds like easy
    money, doesn’t it?


    In this chapter, you’ll learn how to use `ECS` to add a special department called
    Amazon Super Hats to your web store, which you can see in Figure 17-1. This will
    be a “special” department in that it will be handled differently from others—for
    example, payment is handled directly by Amazon when the visitor wants to buy a
    product. This chapter explores just a small subset of `ECS`’s capabilities, so
    if you really want to make a fortune from this service, you should dig deeper
    to find more substance.


    `547`


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    `648XCH17a.qxd` `11/22/06` `5:41` AM Page `548`


    `548`


    **CHAPTER 17 ■ CONNECTING TO WEB SERVICES**


    **Figure 17-1.** *Integrating the Amazon Super Hats department into HatShop*


    The rest of the chapter is divided into two parts. In the first part, you’ll learn
    how to access the Amazon E-Commerce Service (`ECS`); in the second part, you’ll
    integrate `ECS` into the HatShop web site.


    **Tip** The code in this chapter is independent of the rest of the site, so all
    you need to get started integrating Amazon functionality is the code from the
    first four chapters (so you have a working product catalog).


    Of course, with minor adjustments you can also adapt this code to your own personal
    solutions.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    `648XCH17a.qxd` `11/22/06` `5:41` AM Page `549`


