  trans: "\n# 排版后的文档\n\n您刚刚添加到表示层的代码是一个 `Smarty` 修饰符。`Smarty` 修饰符的使用方式与您在 `header.tpl`\
    \ 和 `departments_list.tpl` 中实现的修改一致，它可以将作为参数接收到的相对链接转换为绝对链接。`prepare_link` `Smarty`\
    \ 修饰符接受用于生成链接的协议名称作为参数；如果传入 `http`，将生成 HTTP 链接；如果传入 `https`，将生成 HTTPS 链接。\n\n\
    以页眉中的链接为例：\n\n```\n<a href=\"{\"index.php\"|prepare_link:\"http\"}\">\n```\n\n\
    该链接将由我们的 `Smarty` 修饰符转换为绝对链接，到达客户端时将显示如下：\n\n```\n<a href=\"http://www.example.com/index.php\"\
    >\n```\n\n如果您希望该特定链接仅通过 HTTPS 访问，则可以像这样使用 `Smarty` 修饰符：\n\n```\n<a href=\"{\"\
    index.php\"|prepare_link:\"https\"}\">\n```\n\n此修饰符会将链接转换为：\n\n```\n<a href=\"\
    https://www.example.com/index.php\">\n```\n\n请注意，如果 `USE_SSL` 常量设置为 `no`，即使参数为\
    \ `https`，也仍会使用 HTTP。\n\n您可以重新加载网站以确保一切正常。\n\n> **注意**：如果您没有像第 2 章所述的那样使用 `hatshop`\
    \ 别名，则需要修改 `config.php` 中的 `VIRTUAL_LOCATION` 常量，以反映您的 Web 应用程序的实际位置。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n---\n\n请注意，如果 `HTTP_SERVER_PORT` 常量未定义或包含默认端口 80，则 `Smarty` 修饰符不会添加端口：\n\n```\n\
    // 如果 HTTP_SERVER_PORT 已定义且不同于默认值\nif (defined('HTTP_SERVER_PORT') && HTTP_SERVER_PORT\
    \ != '80')\n{\n    // 追加服务器端口\n    $link .= ':' . HTTP_SERVER_PORT;\n}\n```\n\n\
    不过，您仍应无论如何都将 `HTTP_SERVER_PORT` 添加到 `config.php` 中，以便在将应用程序迁移到运行于其他端口的服务器时可以更轻松地修改。例如，如果\
    \ `HTTP_SERVER_PORT` 为 `8080`，则之前指定的指向 `index.php` 的链接将转换为：\n\n```\n<a href=\"\
    http//www.example.com:8080/index.php\">\n```\n\n## 总结\n\n考虑到您在本章中学到了多少理论知识并将其应用到\
    \ HatShop 项目中，这漫长的一章是绝对值得的！在本章中，您完成了以下内容：\n\n- 创建了部门表并向其中填充了数据。\n- 学习了如何使用 PDO\
    \ 从数据层访问这些数据，以及如何从业务层访问数据层的方法。\n- 学习了如何使用 PHP 5 异常。\n- 使用 Smarty 模板实现了用户界面。\n\n\
    在下一章中，您将通过显示网站的分类和产品来完成产品目录的创建！\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n---\n\n## 创建产品目录：第二部分\n\n在上一章中，您为 HatShop 网站实现了一个可选部门列表。然而，一个产品目录的意义远不止于那个部门列表。在本章中，您将添加许多新的产品目录功能。本章的结构与上一章类似，但需要添加大量新功能，这涉及相当多的代码。\n\
    \n请回顾第 3 章的图 3-1、图 3-2 和图 3-3，以直观了解您将在本章中实现的新功能。\n\n在本章中，您将：\n\n- 学习关系数据以及数据表之间发生的关系类型，然后在数据库中创建新的数据结构。\n\
    - 理解如何关联相关数据表、如何使用子查询、如何在数据层实现分页，以及更多关于 PL/pgSQL 函数和技术的理论。\n- 完成业务层，使其能够与新的 PL/pgSQL\
    \ 函数协同工作，发送参数，并将请求的数据传递给表示层。\n"
- fmt: '• Complete the presentation tier to show your visitor details about the catalog’s
    categories, products, and more.


    ## Storing the New Data


    Given the new functionality you are adding in this chapter, it’s not surprising
    that you need to add more data tables to the database. However, this isn’t just
    about adding new data tables.


    You also need to learn about relational data and the relationships that you can
    implement between the data tables, so that you can obtain more significant information
    from your database.


    ## What Makes a Relational Database


    It’s no mystery that a database is something that stores data. However, today’s
    modern **Relational Database Management Systems (RDBMS)**, such as PostgreSQL,
    MySQL, SQL Server, Oracle, DB2, and others, have extended this basic role by adding
    the capability to store and manage **relational data**. This is a concept that
    deserves some attention.


    So what does *relational data* mean? It’s easy to see that every piece of data
    ever written in a real-world database is somehow related to some already existing
    information. Products are related to categories and departments, orders are related
    to products and customers, and so on. A relational database keeps its information
    stored in data tables but is also aware of the relations between them.


    These related tables form the *relational database*, which becomes an object with
    a significance of its own, rather than simply being a group of unrelated data
    tables. It is said that *data* becomes *information* only when we give significance
    to it, and establishing relations with other pieces of data is an ideal means
    of doing so.


    Look at the product catalog to see what pieces of data it needs and how you can
    transform this data into information. For the product catalog, you’ll need at
    least three data tables: one for departments, one for categories, and one for
    products. It’s important to note that physically each data table is an independent
    database object, even if logically it’s part of a larger entity—in other words,
    even though we say that a category *contains* products, the table that contains
    the products is not inside the table that contains categories. This is not in
    contradiction with the relational character of the database. Figure 4-1 depicts
    a simple representation of three data tables, including some selected sample data.


    Table with departments


    Name


    **Holiday**


    Table with products


    **Caps and Berets**


    **?**


    Name


    **Costume Hats**


    **Black Puritan Hat**


    **Military Beret**


    **?**


    **Metal Viking Helmet**


    Table with categories


    **Uncle Sam Top Hat**


    Name


    **Velvet Sombrero Hat**


    **?**


    **Christmas Hats**


    **Chauffeur Hat**


    **Halloween Hats**


    **...**


    **St. Patrick’s Day Hats**


    **Berets**


    **Driving Caps**


    **Theatrical Hats**


    **Military Hats**


    **Figure 4-1.** *Unrelated departments, categories, and products*


    When two tables are said to be related, this more specifically means that the
    *records* of those tables are related. So, if the products table is related to
    the categories table, this translates into each product record being somehow related
    to one of the records in the categories table.


    Figure 4-1 doesn’t show the physical representation of the database, so we didn’t
    list the table names there. Diagrams like this are used to decide *what* needs
    to be stored in the database. After you know *what* to store, the next step is
    to decide *how* the listed data is related, which leads to the physical structure
    for the database. Although Figure 4-1 shows three kinds of data that you want
    to store, you’ll learn later that to implement this structure in the database,
    you’ll actually use four tables.'
