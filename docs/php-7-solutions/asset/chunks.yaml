  trans: "\n## 注意\n\n如果在关闭文件前忘记解锁，即使你自己能再次打开，该文件对其他用户和进程仍将保持锁定状态。\n\n## 防止覆盖现有文件\n\
    \n与其他写入模式不同，`x` 模式不会打开现有文件，只会创建可供写入的新文件。如果同名文件已存在，`fopen()` 将返回 `false`，从而防止文件被覆盖。`fopen_exclusive.php`\
    \ 中的处理代码如下：\n\n```\n// 仅当文件不存在时才创建可供写入的文件\n// 错误控制运算符用于防止显示错误信息\nif ($file = @\
    \ fopen('C:/private/once_only.txt', 'x')) {\n    // 写入内容\n    fwrite($file, $_POST['contents']);\n\
    \    // 关闭文件\n    fclose($file);\n} else {\n    $error = '文件已存在，无法被覆盖。';\n}\n\
    ```\n\n尝试以 `x` 模式写入已有文件会生成一系列 PHP 错误信息。将写入和关闭操作包裹在条件语句中可以处理大部分错误，但 `fopen()` 仍会触发警告。在\
    \ `fopen()` 前添加错误控制运算符（`@`）可抑制该警告。\n\n在浏览器中加载 `fopen_exclusive.php`，输入一些文本，然后点击“写入文件”。内容将被写入目标文件夹中的\
    \ `once_only.txt`。如果再次尝试，表单上方会显示存储在 `$error` 中的提示信息。\n\n## 使用 `fopen()` 进行组合读写操作\n\
    \n在上述任一模式后添加加号（`+`），即可同时打开文件进行读取和写入。在文件关闭前，你可以按任意顺序执行任意数量的读取或写入操作。组合模式的区别如下：\n\
    \n- `r+`：文件必须已存在，不会自动创建新文件。内部指针置于开头，准备读取现有内容。\n- `w+`：删除现有内容，因此首次打开文件时无内容可读。\n\
    - `a+`：文件打开时内部指针位于末尾，准备追加新内容，因此读取前需将指针移回。\n- `c+`：文件打开时内部指针位于开头。\n- `x+`：始终创建新文件，因此首次打开时无内容可读。\n\
    \n读取操作使用 `fread()` 或 `fgets()`，写入操作使用 `fwrite()`，用法与之前完全相同。关键在于理解内部指针的位置。\n\n\
    ## 移动内部指针\n\n读写操作始终从内部指针当前位置开始，因此通常期望读操作时指针位于文件开头，写操作时位于文件末尾。\n\n要将指针移至开头，可按如下方式将文件引用传递给\
    \ `rewind()`：\n\n```\nrewind($file);\n```\n\n要将指针移至文件末尾，可使用 `fseek()`，示例如下：\n\n\
    ```\nfseek($file, 0, SEEK_END);\n```\n\n你还可以使用 `fseek()` 将内部指针移至指定位置，或相对于当前位置进行移动。详情请参阅\
    \ [`https://secure.php.net/manual/en/function.fseek.php`](https://secure.php.net/manual/en/function.fseek.php)。\n\
    \n## 小贴士\n\n在追加模式（`a` 或 `a+`）下，无论指针当前位置如何，内容始终写入文件末尾。\n\n## 探索文件系统\n\nPHP 的文件系统函数还可以打开目录（文件夹）并检查其内容。从\
    \ Web 开发者的角度来看，文件系统函数的实际用途包括构建显示文件夹内容的下拉菜单，以及创建提示用户下载文件（如图像或 PDF 文档）的脚本。\n\n##\
    \ 使用 `scandir()` 检查文件夹\n\n`scandir()` 函数返回一个数组，包含指定文件夹中的文件和子文件夹。只需将文件夹（目录）的路径作为字符串传递给\
    \ `scandir()`，并将结果存储到变量中，示例如下：\n\n```\n$files = scandir('../images');\n```\n"
- fmt: 'You can examine the result by using `print_r()` to display the contents of
    the array, as shown in the following screenshot (the code is in `scandir.php`
    in the `ch07` folder):

    ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figh_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figh_HTML.jpg)


    The array returned by `scandir()` doesn’t contain just files. The first two items
    are known as dot files, which represent the current and parent folders. The final
    item is a folder called `thumbs`. The array contains only the names of each item.
    If you want more information about the contents of a folder, it’s better to use
    the `FilesystemIterator` class.


    ## Inspecting the contents of a folder with `FilesystemIterator`


    The `FilesystemIterator` class lets you loop through the contents of a directory
    or folder. It’s part of the Standard PHP Library (SPL), a core part of PHP. Among
    the main features of the SPL is a collection of specialized iterators that create
    sophisticated loops with very little code.


    Because it’s a class, you instantiate a `FilesystemIterator` object with the `new`
    keyword and pass the path of the folder you want to inspect to the constructor,
    like this:


    ```

    $files = new FilesystemIterator(''../images'');

    ```


    Unlike `scandir()`, this doesn’t return an array of filenames, so you can’t use
    `print_r()` to display its contents. Instead, it creates an object that gives
    you access to everything inside the folder. To display the filenames, use a `foreach`
    loop like this (the code is in `iterator_01.php` in the `ch07` folder):


    ```

    $files = new FilesystemIterator(''../images'');

    foreach ($files as $file) {

    echo $file . '''';

    }

    ```


    This produces the following result:

    ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figi_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figi_HTML.jpg)


    The following observations can be made about this output:


    *   The dot files representing the current and parent folders are omitted.

    *   The value displayed represents the relative path to the file rather than just
    the filename.

    *   Because the screenshot was taken on Windows, a backslash is used in the relative
    path.


    In most circumstances, the backslash is unimportant, because PHP accepts either
    forward- or backslashes in Windows paths. However, if you want to generate URLs
    from the output of `FilesystemIterator`, there’s an option to use Unix-style paths.
    One way to set the option is to pass a constant as the second argument to `FilesystemIterator()`,
    like this (see `iterator_02.php`):


    ```

    $files = new FilesystemIterator(''../images'', FilesystemIterator::UNIX_PATHS);

    ```


    Alternatively, you can invoke the `setFlags()` method on the `FilesystemIterator`
    object like this (see `iterator_03.php`):


    ```

    $files = new FilesystemIterator(''../images'');

    $files->setFlags(FilesystemIterator::UNIX_PATHS);

    ```


    Both produce the output shown in the following screenshot.

    ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figj_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figj_HTML.jpg)

    Of course, this won’t make any difference on macOS or Linux, but setting this
    option makes your code more portable.


    **Tip**

    The constants used by SPL classes are all class constants. They’re always prefixed
    by the class name and the scope resolution operator (two colons). Lengthy names
    like this make it really worthwhile to use an editing program with PHP code hints
    and code completion.


    Although it’s useful to be able to display the relative paths of the folder’s
    contents, the real value of using the `FilesystemIterator` class is that each
    time the loop runs, it gives you access to an `SplFileInfo` object. The `SplFileInfo`
    class has nearly 30 methods that can be used to extract useful information about
    files and folders. Table [7-3](#332054_4_En_7_Chapter.xhtml#Tab3) lists a selection
    of the most useful `SplFileInfo` methods.


    **Table 7-3.** File information accessible through `SplFileInfo` methods


    | Method | Returns |

    | --- | --- |

    | `getFilename()` | The name of the file |

    | `getPath()` | The current object’s relative path minus the filename, or minus
    the folder name if the current object is a folder |

    | `getPathName()` | The current object’s relative path, including the filename
    or folder name, depending on the current type |

    | `getRealPath()` | The current object’s full path, including filename if appropriate
    |

    | `getSize()` | The size of the file or folder in bytes |

    | `isDir()` | True, if the current object is a folder (directory) |

    | `isFile()` | True, if the current object is a file |

    | `isReadable()` | True, if the current object is readable |

    | `isWritable()` | True, if the current object is writable |


    To access the contents of subfolders, use the `RecursiveDirectoryIterator` class.
    This burrows down through each level of the folder structure, but you need to
    use it in combination with the curiously named `RecursiveIteratorIterator`, like
    this (the code is in `iterator_04.php`):


    ```

    $files = new RecursiveDirectoryIterator(''../images'');

    $files->setFlags(RecursiveDirectoryIterator::SKIP_DOTS);

    $files = new RecursiveIteratorIterator($files);

    foreach ($files as $file) {

    echo $file->getRealPath() . '''';

    }

    ```


    **Note**

    By default, the `RecursiveDirectoryIterator` includes the dot files that represent
    the current and parent folders. To exclude them, you need to pass the class’s
    `SKIP_DOTS` constant as the second argument to the constructor method or use the
    `setFlags()` method.


    As the following screenshot shows, the `RecursiveDirectoryIterator` inspects the
    contents of all subfolders, revealing the contents of the `thumbs` folder, in
    a single operation:

    ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figk_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figk_HTML.jpg)


    What if you want to find only certain types of files? Cue another iterator…


    ## Restricting File Types with the `RegexIterator`


    The `RegexIterator` acts as a wrapper to another iterator, filtering its contents
    using a regular expression (regex) as a search pattern. Let’s say you want to
    find the text and CSV files in the `ch07` folder. The regex used to search for
    `.txt` and `.csv` filename extensions looks like this:


    ```

    ''/\.(?:txt|csv)$/i''

    ```


    This regex matches those two filename extensions in a case-insensitive manner.
    The code in `iterator_05.php` looks like this:


    ```

    $files = new FilesystemIterator(''.'');

    $files = new RegexIterator($files, ''/\.(?:txt|csv)$/i'');

    foreach ($files as $file) {

    echo $file->getFilename() . '''';

    }

    ```


    The dot passed to the `FilesystemIterator` constructor tells it to inspect the
    current folder. The original `$files` object is then passed as the first argument
    to the `RegexIterator` constructor, with the regex as the second argument, and
    the filtered set is reassigned to `$files`. Inside the `foreach` loop, the `getFilename()`
    method retrieves the file’s name. The result is this:

    ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figl_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figl_HTML.jpg)

    Only the text and CSV files are now listed. All the PHP files have been ignored.


    I expect that by this stage, you might be wondering if this can be put to any
    practical use. Let’s build a drop-down menu of images in a folder.


    ## PHP Solution 7-3: Building a Drop-Down Menu of Files


    When you work with a database, you often need a list of images or other files
    in a particular folder. For instance, you may want to associate a photo with a
    product detail page. Although you can type the name of the image into a text field,
    you need to make sure that the image is there and that you spell its name correctly.
    Get PHP to do the hard work by building a drop-down menu automatically. It’s always
    up to date, and there’s no danger of misspelling the name.


    ![../images/332054_4_En_7_Chapter/332054_4_En_7_Fig2_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Fig2_HTML.jpg)


    **Figure 7-2.** PHP makes light work of creating a drop-down menu of images in
    a specific folder'
