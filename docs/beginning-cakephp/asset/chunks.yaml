    Feed。由于路由解析了扩展名且控制器正确处理了请求，您最终会得到一个有效的 `RSS` Feed，而不是一个 HTML 页面。


    ## 自定义路由练习


    本章探讨了在 Cake 中构建自定义路由的一些方法。在此练习中，请构建一条路由，使其能够按日期和 ID 显示博客文章。提供正确的路由配置只是问题的一半；请务必重建
    `View` 操作以正确执行查找。同时，构建管理路由以处理博客文章的编辑和添加。如果可以通过访问 `http://localhost/blog/admin/posts/edit/{id}`
    来编辑文章，而不是使用编辑和添加的标准路径，则说明您已正确完成练习。


    ## 总结


    通过编辑 Cake 的路由配置文件，重写应用程序的 URL 变得容易得多。您不仅可以通过 `app/config/routes.php` 文件使 URL 更友好，甚至可以设置反向路由，即由分发器动态映射的路由；只需在创建链接时使用详细链接语法，Cake
    便会自动为您指定的所有控制器和操作更改所有 URL 字符串。路由器还包含一个管理路由功能，您可以通过该功能为任何操作名称和视图文件附加前缀，Cake 会将包含该前缀的
    URL 映射到这些文件。这对于区分仅管理员可访问的 CRUD 操作和普通用户可用的操作非常有用。对于生成非 HTML 文件输出的应用程序，分发器可以解析扩展名。例如，在本章中，我描述了如何使用
    Cake 生成一个 `.rss` 文件的 RSS Feed。当输入包含 `.rss` 扩展名的 URL 时，路由器会检测到此扩展名并相应地映射请求。现在您已了解如何在
    Cake 中自定义 URL 和其他路径，是时候探索更多 Cake 的高级功能了。在第 11 章中，我将介绍组件和工具，它们可以显著增强您的 Cake 应用程序并减少多项与网络相关的任务。


    ---


    # 第 11 章：组件和工具


    **C**ake 使用辅助程序来扩展视图的功能。通过将多个视图功能放置在辅助程序中，不仅能使视图保持简洁，还能让应用程序更好地组织。除了保持有序和维持应用程序的一致性外，并没有精确的方法来规定如何在辅助程序中组织功能。辅助程序之于视图，就如同组件和工具之于控制器。在某种程度上，您可以将组件视为“控制器的辅助程序”。


    ## 为什么要使用组件？


    但您可能会问，既然已经有 `AppController`，为什么还要有组件呢？难道 `AppController` 不应该包含所有被多个控制器使用的功能吗？既是也不是。`AppController`
    确实保存了更通用的操作，或是多个控制器都会使用的操作。与其使用 `requestAction()` 函数让一个控制器访问另一个控制器中的函数，不如直接将函数放在
    `AppController` 中，并使其能够在整个应用程序中被多个控制器调用。


    您可以把 `AppController` 中的操作看作布局中的显示元素；即那些您希望在所有视图中可见的视图部分。多个视图应该放在布局中，类似地，跨控制器使用的操作应该放在
    `AppController` 中。然而，视图仍然有用于*特定*显示输出任务的辅助程序。例如，`$html->link()` 辅助函数只能用于视图，因为它生成
    HTML 输出；但由于它会在多个视图中重复使用，因此将此函数放在辅助程序文件中而不是布局或控制器中才合理。在 Cake 应用程序中，组件服务于类似的目的，它们包含控制器或多个控制器可以使用的特定功能。


    例如，考虑 Cake 中的内置组件。其中一些包括 `Auth`、`Session` 和 `RequestHandler` 组件。它们的功能都专门用于帮助控制器执行与其特定方法相关的操作；认证组件中的操作都与帮助控制器管理用户认证过程等有关。从某种意义上说，辅助程序是*可移植的视图函数*，因为它们可以被分发并引入任何
    Cake 应用程序，并以特定方式工作，以增强和简化视图可能需要的流程。类似地，组件是*可移植的控制器函数*，它们服务于特定目的，并且可以被分发到任何 Cake
    应用程序中的任何控制器。


    ## 使用组件


    所有组件都存储在 `app/controllers/components` 目录中，并通过 `$components` 数组像辅助程序一样被引入到控制器中。与其他参数一样，组件必须使用驼峰式命名，并在数组中用逗号分隔。内置组件和自定义组件都必须包含在
    `$components` 数组中才能在控制器中工作，并且像辅助程序一样，`AppController` 可以包含供任何或所有控制器使用的组件。请参见代码清单
    11-1。


    **代码清单 11-1.** *使用 $components 数组在控制器中包含组件*

    ```

    var $components = array(''Session'',''RequestHandler'');

    ```


    一旦组件被包含在控制器中，控制器就可以通过 `$this` 标识符来引用其函数。请记住，像使用模型一样指定组件：`$this` 后跟组件的驼峰式名称以及正在使用的函数。代码清单
    11-2。


    **代码清单 11-2.** *在控制器中运行组件函数*

    ```

    $user = $this->Session->read(''User'');

    ```


    组件并非设计为直接与数据库交互，因此组件除了返回供控制器使用的变量、字符串或数组外，不会做更多事情。如果需要数据库调用，使用该组件的控制器应该通过模型运行这些调用，并将必要的数据提供给组件。这并不意味着组件仅限于逻辑测试或重新格式化转发的数据；像
    `Session` 和 `Cookie` 组件一样，这里的函数可以写入外部文件或处理图像等等。


    除了允许使用自定义组件外，Cake 还附带了许多内置组件和工具。在构建您自己的组件之前，让我们先看看 Cake 提供了什么，并探讨这些组件函数如何改进应用程序。

