- fmt: "# A Single Operation in Cake\n\nA single operation in Cake will generally\
    \ invoke multiple MVC elements and will work in those elements simultaneously.\
    \ For instance, in the previous chapter, you used the `Form` helper both to receive\
    \ fetched data from the controller and model, and to send user form data to the\
    \ controller for processing. Changing something in the controller can affect how\
    \ the `Form` helper behaves, which is most noticeable when manipulating something\
    \ like the `$this->data` variable.\n\nAs I discuss more advanced ways of developing\
    \ controllers and models in this chapter, don’t forget that changes to the view\
    \ may be necessary for the operation or customization to work correctly. For example,\
    \ managing sessions is such an integrated process that you may spend equal time\
    \ in the view (creating login screens and displaying a session’s status), the\
    \ controller (performing session logic to determine aspects of the session), and\
    \ the model (saving session data in the database). To work an overall session\
    \ operation into the application, in other words, will mean editing and testing\
    \ actions in the controller, model functions, and views together.\n\n## Building\
    \ an Extensive Blog\n\nThe classic tutorial for frameworks has been to build a\
    \ blog. On Cake’s official web site, there is an entire blog application tutorial.\
    \ However, you need a thorough explanation of *what* is happening, not just a\
    \ walk-through of *how* to build the program. So, how this tutorial differs from\
    \ others is that I will systematically explain every line of code in this application.\
    \ You should be able to master the concepts, not just the steps. With such mastery,\
    \ you should be able to wrap your head around a lot of the features Cake has to\
    \ offer and understand how to incorporate them into your own customized applications.\n\
    \nThe blog program you’ve been working with has already allowed you to explore\
    \ the scaffolding, Bake, and helper features Cake has to offer. To make the blog\
    \ more powerful, you’ll need to deal with models, views, and controllers simultaneously.\
    \ Now that you’ve been introduced to various starting points and key concepts,\
    \ it’s time to discuss application building in more detail. Let’s begin with controllers\
    \ and models, the lifeblood of any Cake application.\n\nThe extensive blog you\
    \ will build will include these advanced features:\n\n- Articles that run through\
    \ a wiki processor that turns content into HTML elements\n- Reader comments with\
    \ community voting\n- Routes that create date-friendly URLs\n- An admin area where\
    \ the site administrator can add stories\n- User management for multiple authors\n\
    - Category sorting for organizing posts dynamically\n- A sitewide menu system\
    \ for navigating through categories and articles\n\nFeatures such as these will\
    \ not be too difficult to produce but will make full use of all the controllers,\
    \ models, and views. In this tutorial, you’ll approach one feature at a time and\
    \ build it into the application. Along the way, I’ll continue to explain important\
    \ concepts for developing in Cake. First I’ll discuss controller actions in general,\
    \ and then I’ll show how to build some custom actions.\n\n## Working with Actions\n\
    \nYou have already built and worked with actions in Cake. In the following extensive\
    \ blog application, you will build a host of actions, each for a specific function\
    \ in the site. Rules for developing actions follow the pattern of typical PHP\
    \ functions.\n\nIn Listing 7-1, I’ve created a basic controller action named `foo`.\
    \ Notice that it follows the typical function syntax in PHP. Controller actions\
    \ behave somewhat differently from typical PHP functions, however. For instance,\
    \ when the action is launched by Cake, it will also automatically render a corresponding\
    \ view or produce an error. Only if the action is called by another action in\
    \ the application will it be capable of returning a value without displaying a\
    \ view.\n\n**Listing 7-1.** *A Basic Controller Action*\n\n```\nfunction foo($bar\
    \ = null) {\n    $this->set('output',$bar);\n}\n```\n\n### Using Variables in\
    \ Actions\n\nPassed function variables can be initiated and receive default values\
    \ by naming and setting variables in the parentheses of the action. These variables\
    \ are available throughout the action.\n\nGlobal variables, however, to be used\
    \ by all actions in a controller can be created within the controller class as\
    \ class attributes:\n\n```\nvar $myVar = 'Variable value';\n```\n\nNow, in any\
    \ of the controller actions, I could use the `$myVar` attribute by placing `$this->`\
    \ before it:\n\n```\nfunction foo($bar = null) {\n    $bar = $this->myVar;\n \
    \   $this->set('output',$bar);\n}\n```\n\nBe sure when creating your own class\
    \ attributes that they don’t conflict with other Cake properties like `$scaffold`\
    \ or `$helpers`.\n\nOther local variables can be called within the action as in\
    \ other PHP scripts:\n\n```\nfunction foo() {\n    $bar = 'hello world';\n   \
    \ $this->set('output',$bar);\n}\n```\n\n## Requesting Actions\n\nIn your `Posts`\
    \ controller, suppose you needed to fetch a list of tags from the `Tags` controller.\
    \ Conventionally, you do this through the model, especially since what you are\
    \ trying to accomplish is a database query of some kind. But to illustrate how\
    \ controller actions can talk to one another, let’s run this query through the\
    \ controllers instead of the models.\n\nIn the `Posts` controller in one of the\
    \ actions, I could pass along a list of tags to the view by using the `set()`\
    \ and `requestAction()` functions, like so:\n\n```\n$this->set('tags',$this->requestAction('/tags/getList'));\n\
    ```\n\nThe `requestAction()` function is pointing to the `Tags` controller’s `getList()`\
    \ action, which hasn’t been produced yet. For the `$tags` variable in the `Posts`\
    \ controller’s view to be formatted with data, the `getList()` action in the `Tags`\
    \ controller will need to run a return of some data, *not* point to the view (which\
    \ it will do by default). If you leave out a return in the `getList()` action,\
    \ then the `Tags` controller will by default try to render a view in the `app/views/tags`\
    \ directory named `getlist.ctp`.\n\nSo, for this to work properly, the `getList()`\
    \ action will need to look something like this:\n\n```\nfunction getList() {\n\
    \    return $this->Tag->find('list');\n}\n```\n\nSometimes there is just no way\
    \ around using the `requestAction()` function. Most of the time, however, you\
    \ should be able to use a component, model, or other element to navigate your\
    \ code. When needing to launch another action with its views and everything else,\
    \ use the `redirect()` function instead of `requestAction()`. Requesting actions\
    \ as opposed to redirecting is reserved for performing logic in another controller\
    \ and pulling its results to the current controller, not for simply launching\
    \ another action elsewhere in the application. In short, the `redirect()` function\
    \ causes another browser request and changes the URL, while `requestAction()`\
    \ works internally to launch specific actions.\n\n## How Callback Actions Work\
    \ in the Controller\n\nController callbacks make it possible to perform logic\
    \ before or after launching an action. For example, say you launched the `View`\
    \ action in the `Posts` controller. Before the `View` action is run by the controller,\
    \ certain callbacks are checked for any content. By placing code in these callback\
    \ actions, you can perform some logic for any and all actions before the action\
    \ is executed, after it is executed, or just before the view is rendered. Let’s\
    \ say you wanted to restrict access to the `View` action; you could accomplish\
    \ this in a callback action.\n\n`beforeFilter`"
