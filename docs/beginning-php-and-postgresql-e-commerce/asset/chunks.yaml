    C H A P T E R 1 5


    Credit Card Transactions


    **T**he last thingyou need to do before launching the e-commerce siteis to enable
    credit card processing. In this chapter, we examine how you can build this into
    the pipeline you created in the previous chapter.


    We’ll start by looking at the theory behind credit card transactions, the sort
    of organizations that help you achieve credit card processing, and the sort of
    transactions that are possible. Moving on, we’ll take two example organizations
    and discuss the specifics of their transaction APIs (Application Program Interfaces,
    the means by which you access credit card transaction functionality). After this,
    you’ll build a new class library that helps you use one of these transaction APIs
    via some simple test code.


    Finally, you’ll integrate the API with the HatShop e-commerce application and
    order-processing pipeline.


    **Credit Card Transaction Fundamentals**


    Banks and other financial institutions use secure networks for their transactions
    based on the X.25 protocol rather than TCP/IP (Transmission Control Protocol/Internet
    Protocol, the primary means by which data is transmitted across the Internet).
    X.25 isn’t something you need to know anything about, apart from the fact that
    it’s a different protocol for networking and isn’t compatible with TCP/IP. As
    such, X.25 networks are completely separate from the Internet, and although it’s
    possible to get direct access to them, this isn’t likely to be a reasonable option.
    To do so, you might have to enter into some serious negotiation with the owner
    of the network you want to use. The owner will want to be completely sure that
    you are a reliable customer who is capable of enforcing the necessary safeguards
    to prevent an attack on their system. Accordingly, the network owner won’t be
    handing out these licenses to just anyone because most people can’t afford the
    security measures required (which include locking your servers in a cage, sending
    daily backup tapes down a secure chute, having three individuals with separate
    keys to access these tapes, and so on).


    The alternative is to access these networks via a gateway provider. This enables
    you to perform your side of the credit card transaction protocol over the Internet
    (using a secure protocol), while relying on your chosen gateway to communicate
    with X.25 networks.


    Although there is likely to be a cost involved with this, the provider should
    have a deal with financial institutions to keep costs low and pass the savings
    on to you (after the gateway takes its share), so it’s likely to be much cheaper
    than having your own X.25 connection. This method is also likely to be cheaper
    than using a third party such as PayPal because you only need the minimum functionality
    when you are handling your own order pipeline. There is no need, for example,
    to use all the order-auditing functionality offered by a company such as PayPal
    because you already built all this functionality in the previous chapter.


