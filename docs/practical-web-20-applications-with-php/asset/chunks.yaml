- fmt: '# Now that the PHP code for the error handler is complete, we must create
    a template for each of the controller actions. First we create the template used
    to display a message when an application error occurs. The location of this file
    is `./templates/error/error.tpl`. This is the first time we’ve used this error
    directory, so you’ll probably have to create it first. As noted earlier, you can
    throw a fake exception from an existing controller action to test this error handler.


    Listing 14-16 shows the contents of the `error.tpl` file. Note that in this template
    I haven’t included the header and footer templates since in our case these templates
    can potentially cause more code to execute (such as by using one of the Smarty
    plug-ins we wrote). This may result in an infinite error loop, so we try to simplify
    the template as much as possible.


    **Listing 14-16.** *Notifying the User That a System Error Has Occurred (`error.tpl`)*


    ```

    <!DOCTYPE html

    PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"

    ["http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd)


    [<html lang="en" xml:lang="en">](http://www.w3.org/1999/xhtml)

    <head>

    <title>A system error occurred</title>

    <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />

    </head>

    <body>

    <p>

    An error occurred completing your request, please try again shortly.

    The system administrator has been notified of the problem.

    </p>

    </body>

    </html>

    ```


    Next we write the template used when a 404 error occurs. Note that unlike handling
    application errors, 404 errors can occur frequently, and they don’t typically
    represent an underlying problem in the application. As such, we can use the normal
    header and footer to display this error.


    Listing 14-17 shows the `error404.tpl` template, which we write to the `./templates/error`
    directory. Note that we use the `$requestedAddress` variable we assigned in the
    controller action.


    **Listing 14-17.** *Displaying an Error Message to the User Using the Normal Site
    Layout* *(`error404.tpl`)*


    ```

    {include file=''header.tpl''}

    <p>

    The file you requested

    (<strong>{$requestedAddress|escape}</strong>)

    could not be found.

    </p>

    {include file=''footer.tpl''}

    ```


