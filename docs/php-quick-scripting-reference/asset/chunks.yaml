    ![image](images/frontdot.jpg)


    Type Hinting


    PHP relies on the proper documentation of functions for developers to know what
    arguments a function can take. To simplify this PHP 5 introduced type hinting,
    which allows a function to specify the type of arguments it accepts. Allowed types
    include classes, interfaces and the pseudo types `array` and `callable`.


    | Name | Description |

    | --- | --- |

    | class name | Argument must be an object of this class or a child. |

    | interface name | Argument must be an object implementing this interface. |

    | `array` | Argument must be an array. |

    | `callable` | Argument must be callable as a function. |


    A type hint is set by prefixing the parameter with the type in the function signature.
    Below is an example using the `array` pseudo type introduced in PHP 5.1.


    ```

    function myprint(array $a)

    {

      foreach ($a as $v) { echo $v; }

    }


    myprint( array(1,2,3) ); // "123"

    ```


    Failing to satisfy the type hint results in a fatal error. This makes it easier
    to detect when an invalid argument is used.


    ```

    myprint(''Test''); // error

    ```


    The `callable` pseudo type was added in PHP 5.4\. With this type hint in place
    the argument must be a callable function, method or object. Language constructs
    such as `echo` are not allowed, but anonymous functions may be used as in the
    example below.


    ```

    function mycall(callable $callback, $data)

    {

      $callback($data);

    }


    $say = function($myString) { echo $myString; };

    mycall( $say, ''Hi'' ); // "Hi";

    ```


    Type hints cannot be used with scalar types, such as bool, int or string. The
    pseudo types used by built-in functions, such as mixed and number, are also not
    allowed. Furthermore, there is no way to hint a function’s return value.


