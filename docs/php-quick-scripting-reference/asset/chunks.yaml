- fmt: "# One use for explicit casts\n\nOne use for explicit casts can be seen when\
    \ the `bool` variable is sent as output to the page. Due to automatic type conversions\
    \ the `false` value becomes an empty string and is therefore not displayed. By\
    \ first converting it to an integer, the value `false` will show up as zero instead.\n\
    \n```\necho $myBool;      // \"\"\necho (int)$myBool; // \"0\"\n```\n\nAllowed\
    \ casts are listed in the table below.\n\n| Name | Description |\n| --- | ---\
    \ |\n| `(int)`, `(integer)` | Cast to int |\n| `(bool)`, `(boolean)` | Cast to\
    \ bool |\n| `(float)`, `(double)`, `(real)` | Cast to float |\n| `(string)` |\
    \ Cast to string |\n| `(array)` | Cast to array |\n| `(object)` | Cast to object\
    \ |\n| `(unset)` | Cast to null |\n\nTo give some examples, the array cast will\
    \ convert a scalar type to an array with a single element. It performs the same\
    \ function as using the array constructor.\n\n```\n$myInt = 10;\n$myArr = (array)$myInt;\n\
    $myArr = array($myInt); // same as above\necho $myArr[0];         // \"10\"\n\
    ```\n\nIf a scalar type such as int is cast to object it will become an instance\
    \ of the built-in class `stdClass`. The value of the variable will be stored in\
    \ a property of this class called `scalar`.\n\n```\n$myObj = (object)$myInt;\n\
    echo $myObj->scalar; // \"10\"\n```\n\nThe unset cast makes the variable evaluate\
    \ to `null`. Despite its name, it does not actually unset the variable. The cast\
    \ merely exists for the sake of completeness, as `null` is considered a data type.\n\
    \n```\n$myNull = (unset)$myInt;\n$myNull = null; // same as above\n```\n\n## Settype\n\
    \nAn explicit cast does not change the type of the variable it precedes, only\
    \ how it is evaluated in that expression. To change the type of a variable the\
    \ `settype` function can be used, which takes two arguments. The first is the\
    \ variable to be converted and the second is the data type given as a string.\n\
    \n```\n$myVar = 1.2;\nsettype($myVar, 'int'); // convert variable to int\n```\n\
    \nAlternatively, a type conversion can be performed by storing the result of an\
    \ explicit cast back into the same variable.\n\n```\n$myVar = 1.2;\n$myVar = (int)$myVar;\
    \ // 1\n```\n\n## Gettype\n\nRelated to `settype` is the `gettype` function, which\
    \ returns the type of the supplied argument as a human-readable string.\n\n```\n\
    $myBool = true;\necho gettype($myBool); // \"boolean\"\n```\n\n# CHAPTER 20\n\n\
    ![image](images/frontdot.jpg)\n\n## Variable Testing\n\nPHP has a number of built-in\
    \ constructs that can be used to test the value of a variable. All these functions\
    \ return a `bool` value.\n\n### Isset\n\nThe `isset` language construct returns\
    \ `true` if the variable has been assigned a value other than `null`.\n\n```\n\
    isset($a); // false\n\n$a = 10;\nisset($a); // true\n\n$a = null;\nisset($a);\
    \ // false\n```\n\n### Empty\n\nThe `empty` construct checks whether the specified\
    \ variable has an empty value – such as `null`, `0`, `false` or an empty string\
    \ – and returns `true` if that is the case. It also returns `true` if the variable\
    \ does not exist.\n\n```\nempty($b); // true\n\n$b = false;\nempty($b); // true\n\
    ```\n\n### Is_null\n\nThe `is_null` construct can be used to test whether a variable\
    \ is set to `null`.\n\n```\n$c = null;\nis_null($c); // true\n\n$c = 10;\nis_null($c);\
    \  // false\n```\n\nIf the variable does not exist `is_null` will also return\
    \ `true`, but with an error notice as it is not supposed to be used with uninitialized\
    \ variables.\n\n```\nis_null($d); // true (undefined variable notice)\n```\n\n\
    ### Unset\n\nAnother language construct that is useful to know about is `unset`,\
    \ which deletes a variable from the current scope.\n\n```\n$e = 10;\nunset($e);\
    \ // delete $e\n```\n\nReferences may be deleted with `unset` without destroying\
    \ the variable content.\n\n```\n$var = 'my value';\n$ref = &$var;\n\nunset($ref);\
    \ // delete only $ref\n```\n\nWhen a global variable is made accessible in a function\
    \ with the `global` keyword, this code actually creates a local reference to the\
    \ global variable in the `$GLOBALS` array. For this reason, attempting to unset\
    \ a global variable in a function will only delete the local reference. To delete\
    \ the global variable from a function scope the `unset` has to be made directly\
    \ on the `$GLOBALS` array.\n\n```\nfunction myUnset()\n{\n  // Make $o a reference\
    \ to $GLOBALS['o']\n  global $o;\n\n// Remove the reference variable\n  unset($o);\n\
    \n// Remove the global variable\n  unset($GLOBALS['o']);\n}\n```\n\nUnsetting\
    \ a variable is slightly different than setting the variable to `null`. When a\
    \ variable is set to `null` the variable still exists, but the variable content\
    \ it held is immediately freed. In contrast, unsetting a variable deletes the\
    \ variable, but the memory will still be considered to be in use until the garbage\
    \ collector clears it. Performance issues aside, using `unset` is recommended\
    \ as it makes the code’s intent clearer.\n\n```\n$var = null; // free memory\n\
    unset($var); // delete variable\n```\n\nKeep in mind that most of the time it\
    \ is not necessary to manually unset variables, as the PHP garbage collector will\
    \ automatically delete variables when they go out of scope. However, if a server\
    \ performs very memory intensive tasks then unsetting those variables manually\
    \ will allow the server to handle a greater number of simultaneous requests before\
    \ running out of memory.\n\n## Determining types\n\nPHP has several useful functions\
    \ for determining the type of a variable. These functions can be seen in the table\
    \ below.\n\n| Name | Description |\n| --- | --- |\n| `is_array()` | True if variable\
    \ is an array. |\n| `is_bool()` | True if variable is a bool. |\n| `is_callable()`\
    \ | True if variable can be called as a function. |\n| `is_float()`, `is_double()`,\
    \ `is_real()` | True if variable is a float. |\n| `is_int()`, `is_integer()`,\
    \ `is_long()` | True if variable is an integer. |\n| `is_null()` | True if variable\
    \ is set to null. |\n| `is_numeric()` | True if variable is a number or numeric\
    \ string. |\n| `is_scalar()` | True if variable is an int, float, string or bool.\
    \ |\n| `is_object()` | True if variable is an object. |\n| `is_resource()` | True\
    \ if variable is a resource. |\n| `is_string()` | True if variable is a string.\
    \ |\n\nTo give an example, the `is_numeric` function will return `true` if the\
    \ argument contains either a number or a string that can be evaluated to a number.\n\
    \n```\nis_numeric(10.5);   // true  (float)\nis_numeric('33');   // true  (numeric\
    \ string)\nis_numeric('text'); // false (non-numeric string)\n```\n\n## Variable\
    \ information\n\nPHP has three built-in functions for retrieving information about\
    \ variables: `print_r`, `var_dump` and `var_export`. The `print_r` function displays\
    \ the value of a variable in a human-readable way. It is useful for debugging\
    \ purposes.\n\n```\n$a = array('one', 'two', 'three');\nprint_r($a);\n```\n\n\
    The code above will produce the following output.\n\n```\nArray ( [0] => one [1]\
    \ => two [2] => three )\n```\n\nSimilar to `print_r` is `var_dump`, which in addition\
    \ to values also displays data types and sizes. Calling `var_dump($a)` will show\
    \ this output.\n\n```\narray(3) {\n  [0]=> string(3) \"one\"\n  [1]=> string(3)\
    \ \"two\"\n  [2]=> string(5) \"three\"\n}\n```\n\nFinally, there is the `var_export`\
    \ function, which prints variable information in a style that can be used as PHP\
    \ code. The output for `var_export($a)` can be seen below. Note the trailing comma\
    \ after the last element which is allowed.\n\n```\narray ( 0 => 'one', 1 => 'two',\
    \ 2 => 'three', )\n```\n\nThe `var_export` function, along with `print_r`, accepts\
    \ an optional Boolean second argument. When set to `true`, the function will return\
    \ the output instead of printing it. This gives `var_export` further uses, such\
    \ as being combined with the language construct `eval`. This construct takes a\
    \ string argument and evaluates it as PHP code.\n\n```\neval('$b = ' . var_export($a,\
    \ true) . ';');\n```\n\nThe ability to execute arbitrary code with `eval` is a\
    \ powerful feature that should be used with care. It should not be used to execute\
    \ any user provided data, at least not without proper validation, as this represents\
    \ a security risk. Another reason why the use of `eval` is discouraged is because\
    \ similarly to `goto` it makes the execution of code more difficult to follow.\n\
    \n# CHAPTER 21\n\n![image](images/frontdot.jpg)\n\n## Overloading"
  raw: 'One use for explicit casts can be seen when the bool variable is sent as output
    to the page. Due to automatic type conversions the false value becomes an empty
    string and is therefore not displayed. By first converting it to an integer, the
    value false will show up as zero instead.


    ```

    echo $myBool;      // ""

    echo (int)$myBool; // "0"

    ```


    Allowed casts are listed in the table below.


    | Name | Description |

    | --- | --- |

    | (int), (integer) | Cast to int |

    | (bool), (boolean) | Cast to bool |

    | (float), (double), (real) | Cast to float |

    | (string) | Cast to string |

    | (array) | Cast to array |

    | (object) | Cast to object |

    | (unset) | Cast to null |


    To give some examples, the array cast will convert a scalar type to an array with
    a single element. It performs the same function as using the array constructor.


    ```

    $myInt = 10;

    $myArr = (array)$myInt;

    $myArr = array($myInt); // same as above

    echo $myArr[0];         // "10"

    ```


    If a scalar type such as int is cast to object it will become an instance of the
    built-in class `stdClass`. The value of the variable will be stored in a property
    of this class called `scalar`.


    ```

    $myObj = (object)$myInt;

    echo $myObj->scalar; // "10"

    ```


    The unset cast makes the variable evaluate to null. Despite its name, it does
    not actually unset the variable. The cast merely exists for the sake of completeness,
    as null is considered a data type.


    ```

    $myNull = (unset)$myInt;

    $myNull = null; // same as above

    ```


    Settype


    An explicit cast does not change the type of the variable it precedes, only how
    it is evaluated in that expression. To change the type of a variable the `settype`
    function can be used, which takes two arguments. The first is the variable to
    be converted and the second is the data type given as a string.


    ```

    $myVar = 1.2;

    settype($myVar, ''int''); // convert variable to int

    ```


    Alternatively, a type conversion can be performed by storing the result of an
    explicit cast back into the same variable.


    ```

    $myVar = 1.2;

    $myVar = (int)$myVar; // 1

    ```


    Gettype


    Related to `settype` is the `gettype` function, which returns the type of the
    supplied argument as a human-readable string.


    ```

    $myBool = true;

    echo gettype($myBool); // "boolean"

    ```


    CHAPTER 20


    ![image](images/frontdot.jpg)


    Variable Testing


    PHP has a number of built-in constructs that can be used to test the value of
    a variable. All these functions return a bool value.


    Isset


    The `isset` language construct returns true if the variable has been assigned
    a value other than null.


    ```

    isset($a); // false


    $a = 10;

    isset($a); // true


    $a = null;

    isset($a); // false

    ```


    Empty


    The `empty` construct checks whether the specified variable has an empty value
    – such as null, 0, false or an empty string – and returns true if that is the
    case. It also returns true if the variable does not exist.


    ```

    empty($b); // true


    $b = false;

    empty($b); // true

    ```


    Is_null


    The `is_null` construct can be used to test whether a variable is set to null.


    ```

    $c = null;

    is_null($c); // true


    $c = 10;

    is_null($c);  // false

    ```


    If the variable does not exist `is_null` will also return true, but with an error
    notice as it is not supposed to be used with uninitialized variables.


    ```

    is_null($d); // true (undefined variable notice)

    ```


    Unset


    Another language construct that is useful to know about is `unset`, which deletes
    a variable from the current scope.


    ```

    $e = 10;

    unset($e); // delete $e

    ```


    References may be deleted with `unset` without destroying the variable content.


    ```

    $var = ''my value'';

    $ref = &$var;


    unset($ref); // delete only $ref

    ```


    When a global variable is made accessible in a function with the `global` keyword,
    this code actually creates a local reference to the global variable in the $GLOBALS
    array. For this reason, attempting to unset a global variable in a function will
    only delete the local reference. To delete the global variable from a function
    scope the unset has to be made directly on the $GLOBALS array.


    ```

    function myUnset()

    {

      // Make $o a reference to $GLOBALS[''o'']

      global $o;


    // Remove the reference variable

      unset($o);


    // Remove the global variable

      unset($GLOBALS[''o'']);

    }

    ```


    Unsetting a variable is slightly different than setting the variable to null.
    When a variable is set to null the variable still exists, but the variable content
    it held is immediately freed. In contrast, unsetting a variable deletes the variable,
    but the memory will still be considered to be in use until the garbage collector
    clears it. Performance issues aside, using `unset` is recommended as it makes
    the code’s intent clearer.


    ```

    $var = null; // free memory

    unset($var); // delete variable

    ```


    Keep in mind that most of the time it is not necessary to manually unset variables,
    as the PHP garbage collector will automatically delete variables when they go
    out of scope. However, if a server performs very memory intensive tasks then unsetting
    those variables manually will allow the server to handle a greater number of simultaneous
    requests before running out of memory.


    Determining types


    PHP has several useful functions for determining the type of a variable. These
    functions can be seen in the table below.


    | Name | Description |

    | --- | --- |

    | is_array() | True if variable is an array. |

    | is_bool() | True if variable is a bool. |

    | is_callable() | True if variable can be called as a function. |

    | is_float(), is_double(), is_real() | True if variable is a float. |

    | is_int(), is_integer(), is_long() | True if variable is an integer. |

    | is_null() | True if variable is set to null. |

    | is_numeric() | True if variable is a number or numeric string. |

    | is_scalar() | True if variable is an int, float, string or bool. |

    | is_object() | True if variable is an object. |

    | is_resource() | True if variable is a resource. |

    | is_string() | True if variable is a string. |


    To give an example, the `is_numeric` function will return true if the argument
    contains either a number or a string that can be evaluated to a number.


    ```

    is_numeric(10.5);   // true  (float)

    is_numeric(''33'');   // true  (numeric string)

    is_numeric(''text''); // false (non-numeric string)

    ```


    Variable information


    PHP has three built-in functions for retrieving information about variables: `print_r`,
    `var_dump` and `var_export`. The `print_r` function displays the value of a variable
    in a human-readable way. It is useful for debugging purposes.


    ```

    $a = array(''one'', ''two'', ''three'');

    print_r($a);

    ```


    The code above will produce the following output.


    ```

    Array ( [0] => one [1] => two [2] => three )

    ```


    Similar to `print_r` is `var_dump`, which in addition to values also displays
    data types and sizes. Calling `var_dump($a)` will show this output.


    ```

    array(3) {

      [0]=> string(3) "one"

      [1]=> string(3) "two"

      [2]=> string(5) "three"

    }

    ```


    Finally, there is the `var_export` function, which prints variable information
    in a style that can be used as PHP code. The output for `var_export($a)` can be
    seen below. Note the trailing comma after the last element which is allowed.


    ```

    array ( 0 => ''one'', 1 => ''two'', 2 => ''three'', )

    ```


    The `var_export` function, along with `print_r`, accepts an optional Boolean second
    argument. When set to true, the function will return the output instead of printing
    it. This gives `var_export` further uses, such as being combined with the language
    construct `eval` . This construct takes a string argument and evaluates it as
    PHP code.


    ```

    eval(''$b = '' . var_export($a, true) . '';'');

    ```


    The ability to execute arbitrary code with `eval` is a powerful feature that should
    be used with care. It should not be used to execute any user provided data, at
    least not without proper validation, as this represents a security risk. Another
    reason why the use of `eval` is discouraged is because similarly to `goto` it
    makes the execution of code more difficult to follow.


    CHAPTER 21


    ![image](images/frontdot.jpg)


    Overloading'
  trans: "\n# 显式类型转换的用途\n\n当 `bool` 变量作为输出发送到页面时，就能看到显式类型转换的一个用途。由于自动类型转换，`false`\
    \ 值会变成空字符串，因此不会显示。通过先将其转换为整数，`false` 值就会以 0 的形式显示出来。\n\n```\necho $myBool;   \
    \   // \"\"\necho (int)$myBool; // \"0\"\n```\n\n允许的转换类型如下表所示。\n\n| 名称 | 描述 |\n\
    | --- | --- |\n| `(int)`、`(integer)` | 转换为 int 类型 |\n| `(bool)`、`(boolean)` |\
    \ 转换为 bool 类型 |\n| `(float)`、`(double)`、`(real)` | 转换为 float 类型 |\n| `(string)`\
    \ | 转换为 string 类型 |\n| `(array)` | 转换为 array 类型 |\n| `(object)` | 转换为 object 类型\
    \ |\n| `(unset)` | 转换为 null 类型 |\n\n举几个例子，数组转换会将标量类型转换为一个单元素数组。它执行的功能与使用数组构造函数相同。\n\
    \n```\n$myInt = 10;\n$myArr = (array)$myInt;\n$myArr = array($myInt); // 同上\n\
    echo $myArr[0];         // \"10\"\n```\n\n如果将 int 等标量类型转换为对象，它将变成内置类 `stdClass`\
    \ 的一个实例。变量的值将存储在该类的一个名为 `scalar` 的属性中。\n\n```\n$myObj = (object)$myInt;\necho\
    \ $myObj->scalar; // \"10\"\n```\n\nUnset 转换使得变量的值变为 `null`。尽管名称如此，它实际上并不会删除变量。这种转换只是为了完整性而存在，因为\
    \ `null` 被视为一种数据类型。\n\n```\n$myNull = (unset)$myInt;\n$myNull = null; // 同上\n\
    ```\n\n## Settype\n\n显式类型转换不会改变它前面的变量的类型，只会改变该表达式中的求值方式。要改变变量的类型，可以使用 `settype`\
    \ 函数，它接受两个参数。第一个是要转换的变量，第二个是作为字符串给出的数据类型。\n\n```\n$myVar = 1.2;\nsettype($myVar,\
    \ 'int'); // 将变量转换为 int 类型\n```\n\n或者，可以通过将显式转换的结果存回同一个变量来执行类型转换。\n\n```\n$myVar\
    \ = 1.2;\n$myVar = (int)$myVar; // 1\n```\n\n## Gettype\n\n与 `settype` 相关的是 `gettype`\
    \ 函数，它返回所提供参数的类型，并以人类可读的字符串形式呈现。\n\n```\n$myBool = true;\necho gettype($myBool);\
    \ // \"boolean\"\n```\n\n# 第 20 章\n\n![image](img/frontdot.jpg)\n\n## 变量测试\n\n\
    PHP 有许多内置结构可用于测试变量的值。所有这些函数都返回一个 `bool` 值。\n\n### Isset\n\n如果变量已被赋予一个非 `null`\
    \ 的值，`isset` 语言结构将返回 `true`。\n\n```\nisset($a); // false\n\n$a = 10;\nisset($a);\
    \ // true\n\n$a = null;\nisset($a); // false\n```\n\n### Empty\n\n`empty` 结构检查指定的变量是否具有空值（例如\
    \ `null`、`0`、`false` 或空字符串），如果是则返回 `true`。如果变量不存在，它也会返回 `true`。\n\n```\nempty($b);\
    \ // true\n\n$b = false;\nempty($b); // true\n```\n\n### Is_null\n\n`is_null`\
    \ 结构可用于测试变量是否被设置为 `null`。\n\n```\n$c = null;\nis_null($c); // true\n\n$c = 10;\n\
    is_null($c);  // false\n```\n\n如果变量不存在，`is_null` 也会返回 `true`，但会附带一个错误通知，因为它不应用于未初始化的变量。\n\
    \n```\nis_null($d); // true (未定义变量通知)\n```\n\n### Unset\n\n另一个有用的语言结构是 `unset`，它从当前作用域中删除一个变量。\n\
    \n```\n$e = 10;\nunset($e); // 删除 $e\n```\n\n可以使用 `unset` 删除引用，而不会破坏变量内容。\n\n\
    ```\n$var = 'my value';\n$ref = &$var;\n\nunset($ref); // 仅删除 $ref\n```\n\n当使用\
    \ `global` 关键字使全局变量在函数中可访问时，这段代码实际上在 `$GLOBALS` 数组中创建了一个指向全局变量的本地引用。因此，尝试在函数中\
    \ unset 一个全局变量只会删除该本地引用。要从函数作用域中删除全局变量，必须直接在 `$GLOBALS` 数组上执行 `unset`。\n\n```\n\
    function myUnset()\n{\n  // 使 $o 成为 $GLOBALS['o'] 的一个引用\n  global $o;\n\n// 删除引用变量\n\
    \  unset($o);\n\n// 删除全局变量\n  unset($GLOBALS['o']);\n}\n```\n\nUnsetting 一个变量与将变量设置为\
    \ `null` 略有不同。当变量被设置为 `null` 时，变量仍然存在，但它所持有的变量内容会立即被释放。相比之下，unsetting 一个变量会删除该变量，但内存仍会被视为正在使用，直到垃圾回收器将其清除。抛开性能问题不谈，建议使用\
    \ `unset`，因为它能使代码意图更清晰。\n\n```\n$var = null; // 释放内存\nunset($var); // 删除变量\n```\n\
    \n请记住，大多数情况下不需要手动 unset 变量，因为 PHP 垃圾回收器会在变量超出作用域时自动删除它们。但是，如果服务器执行非常占用内存的任务，那么手动\
    \ unset 这些变量将使服务器在内存耗尽之前能够处理更多数量的并发请求。\n\n## 确定类型\n\nPHP 有几个有用的函数用于确定变量的类型。这些函数见下表。\n\
    \n| 名称 | 描述 |\n| --- | --- |\n| `is_array()` | 如果变量是数组，则为 True。 |\n| `is_bool()`\
    \ | 如果变量是布尔值，则为 True。 |\n| `is_callable()` | 如果变量可以作为函数调用，则为 True。 |\n| `is_float()`、`is_double()`、`is_real()`\
    \ | 如果变量是浮点数，则为 True。 |\n| `is_int()`、`is_integer()`、`is_long()` | 如果变量是整数，则为\
    \ True。 |\n| `is_null()` | 如果变量被设置为 null，则为 True。 |\n| `is_numeric()` | 如果变量是数字或数字字符串，则为\
    \ True。 |\n| `is_scalar()` | 如果变量是 int、float、string 或 bool，则为 True。 |\n| `is_object()`\
    \ | 如果变量是对象，则为 True。 |\n| `is_resource()` | 如果变量是资源，则为 True。 |\n| `is_string()`\
    \ | 如果变量是字符串，则为 True。 |\n\n举例来说，如果参数包含一个数字或一个可以求值为数字的字符串，则 `is_numeric` 函数将返回\
    \ `true`。\n\n```\nis_numeric(10.5);   // true  (float)\nis_numeric('33');   //\
    \ true  (数字字符串)\nis_numeric('text'); // false (非数字字符串)\n```\n\n## 变量信息\n\nPHP\
    \ 有三个用于检索变量信息的内置函数：`print_r`、`var_dump` 和 `var_export`。`print_r` 函数以人类可读的方式显示变量的值。它对于调试很有用。\n\
    \n```\n$a = array('one', 'two', 'three');\nprint_r($a);\n```\n\n上述代码将产生以下输出。\n\
    \n```\nArray ( [0] => one [1] => two [2] => three )\n```\n\n与 `print_r` 类似的是 `var_dump`，它除了显示值之外，还显示数据类型和大小。调用\
    \ `var_dump($a)` 将显示此输出。\n\n```\narray(3) {\n  [0]=> string(3) \"one\"\n  [1]=>\
    \ string(3) \"two\"\n  [2]=> string(5) \"three\"\n}\n```\n\n最后，还有 `var_export`\
    \ 函数，它以可作为 PHP 代码使用的风格打印变量信息。`var_export($a)` 的输出如下所示。注意最后一个元素后面的尾随逗号是允许的。\n\n\
    ```\narray ( 0 => 'one', 1 => 'two', 2 => 'three', )\n```\n\n`var_export` 函数和\
    \ `print_r` 一样，接受一个可选的布尔类型第二个参数。当设置为 `true` 时，该函数将返回输出而不是打印它。这为 `var_export` 提供了更多用途，例如与语言结构\
    \ `eval` 结合使用。该结构接受一个字符串参数并将其作为 PHP 代码进行求值。\n\n```\neval('$b = ' . var_export($a,\
    \ true) . ';');\n```\n\n使用 `eval` 执行任意代码的能力是一个强大的特性，应谨慎使用。不应将其用于执行任何用户提供的数据，至少在没有适当验证的情况下不应使用，因为这代表了安全风险。不鼓励使用\
    \ `eval` 的另一个原因是，与 `goto` 类似，它使得代码执行流程更难跟踪。\n\n# 第 21 章\n\n![image](img/frontdot.jpg)\n\
    \n## 重载\n"
- fmt: '# PHP 中的重载（Overloading）


    PHP 中的重载提供了在运行时添加对象成员的能力。这是通过让类实现重载方法`__get`、`__set`、`__call`和`__callStatic`来实现的。请记住，PHP
    中重载的含义与许多其他语言不同。


    ## 属性重载（Property overloading）


    `__get`和`__set`方法提供了一种便捷的方式来实现 getter 和 setter 方法，这些方法通常用于安全地读写属性。当使用不可访问的属性时——要么是因为它们未在类中定义，要么是因为它们在当前作用域中不可用——这些重载方法会被调用。在下面的示例中，`__set`方法将所有不可访问的属性添加到`$data`数组中，而`__get`则安全地检索这些元素。


    ```

    class MyProperties

    {

      private $data = array();


    public function __set($name, $value)

      {

        $this->data[$name] = $value;

      }


    public function __get($name)

      {

        if (array_key_exists($name, $this->data))

          return $this->data[$name];

      }

    }

    ```


    当设置一个不可访问属性的值时，`__set`会被调用，其参数为属性名称和值。类似地，当访问一个不可访问属性时，`__get`会被调用，其参数为属性名称。


    ```

    $obj = new MyProperties();


    $obj->a = 1;  // __set called

    echo $obj->a; // __get called

    ```


    ## 方法重载（Method overloading）


    有两个方法用于处理对类中不可访问方法的调用——`__call`和`__callStatic`。`__call`方法用于实例方法调用。


    ```

    class MyClass

    {

      public function __call($name, $args)

      {

        echo "Calling $name $args[0]";

      }

    }


    // "Calling myTest in object context"

    (new MyClass())->myTest(''in object context'');

    ```


    `__call`的第一个参数是被调用方法的名称，第二个参数是一个包含传递给该方法参数的数值数组。这些参数对于`__callStatic`方法也是相同的，该方法用于处理对不可访问静态方法的调用。


    ```

    class MyClass

    {

      public static function __callStatic($name, $args)

      {

        echo "Calling $name $args[0]";

      }

    }


    // "Calling myTest in static context"

    MyClass::myTest(''in static context'');

    ```


    ## `isset` 和 `unset` 重载


    内置结构`isset`、`empty`和`unset`仅对显式定义的属性有效，而对重载属性无效。可以通过重载`__isset`和`__unset`方法将这一功能添加到类中。


    ```

    class MyClass

    {

      private $data = array();


    public function __set($name, $value) {

        $this->data[$name] = $value;

      }

      public function __get($name) {

        if (array_key_exists($name, $this->data))

          return $this->data[$name];

      }


    public function __isset($name) {

        return isset($this->data[$name]);

      }


    public function __unset($name) {

        unset( $this->data[$name] );

      }

    }

    ```


    当对不可访问属性调用`isset`时，`__isset`方法会被调用。


    ```

    $obj = new MyClass();

    $obj->name = "Joe";


    isset($obj->name); // true

    isset($obj->age);  // false

    ```


    当对不可访问属性调用`unset`时，`__unset`方法会处理该调用。


    ```

    unset($obj->name); // delete property

    isset($obj->name); // false

    ```


    仅当同时实现了`__isset`和`__get`时，`empty`结构才能对重载属性正常工作。如果`__isset`返回`false`，则`empty`结构返回`true`。另一方面，如果`__isset`返回`true`，则`empty`会通过`__get`检索该属性，并判断其值是否被视为空值。


    ```

    empty($obj->name); // false

    empty($obj->age);  // true

    ```


