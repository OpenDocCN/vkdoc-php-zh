    **Field Name**


    **Data Type**


    **Description**


    featured in the departments it’s a part of ), and 3 (the product is also featured
    on both the front page and on


    the department page). With the help of this field, the


    site administrators can highlight a set of products that will be of particular
    interest to visitors at a specific time. For example, before Halloween, you will
    want


    the Halloween hats to appear prominently on the front


    page of the site. Also if you want to promote products


    that have a discounted price, this feature is just what you need.


    Follow the steps of the exercise to create the product table in your database.


    **Exercise: Creating the product Table**


    **1.** Start pgAdmin III, and connect to the hatshop database.


    **2.** Select Tools ➤ Query tool.


    **3.** Enter the following code:


    -- Create product table


    CREATE TABLE product


    (


    product_id SERIAL NOT NULL,


    name VARCHAR(50) NOT NULL,


    description VARCHAR(1000) NOT NULL,


    price NUMERIC(10, 2) NOT NULL,


    discounted_price NUMERIC(10, 2) NOT NULL DEFAULT 0.00,


    image VARCHAR(150),


    thumbnail VARCHAR(150),


    display SMALLINT NOT NULL DEFAULT 0,


    CONSTRAINT pk_product PRIMARY KEY (product_id)


    );


    **4.** Execute the query by selecting Query ➤ Execute, or by pressing F5.


    ■**Note** When executing this command, the database will automatically create
    a sequence named product_product_id_seq that will generate the values for the
    product_id field. Also, an index will be created for the primary key column.


    **5.** Let’s now populate the table with products. Because there are so many of
    them, use the populate_product.sql script provided in the Source Code/Download
    section (http://www.apress.com).


