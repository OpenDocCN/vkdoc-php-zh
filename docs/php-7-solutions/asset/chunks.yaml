  trans: "  \n# PHP 条件语句与变量处理  \n\n条件语句的第一行使用两个等号检查`$title`的值。下一行使用单个等号将新值赋给`$title`。如果页面被调用的名称不是`index.php`，则花括号内的行将被忽略，`$title`保持其原始值。\
    \  \n\n## 提示  \nPHP 是区分大小写的，因此此解决方案仅在“index”全部为小写时有效。要进行不区分大小写的比较，请将前面代码的第四行修改为：`if\
    \ (strtolower($title) == 'index') {`。函数`strtolower()`将字符串转换为小写——因此得名——并常用于进行不区分大小写的比较。转换为小写不是永久性的，因为`strtolower($title)`没有赋值给变量；它仅用于进行比较。要永久更改，需要将结果赋值回变量，就像最后一行中`ucwords($title)`被赋值回`$title`一样。要将字符串转换为大写，请使用`strtoupper()`。\
    \  \n\n1.  保存`title.php`并在浏览器中重新加载`index.php`。页面标题现在看起来更自然，如图 5-9 所示。  \n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig9_HTML.jpg](img/332054_4_En_5_Fig9_HTML.jpg)\
    \  \n\n**图 5-9.** 条件语句将`index.php`上的标题更改为`Home`  \n\n2.  导航回`contact.php`，您会看到页面标题仍然从页面名称正确派生。\
    \  \n\n您可以将代码与`title.php`以及`ch05`文件夹中的`index_03.php`、`blog_02.php`、`gallery_02.php`和`contact_02.php`的更新版本进行对照检查。\
    \  \n\n## 注意事项  \n绝大多数 PHP 网站托管在 Linux 服务器上，这些服务器将文件和目录（文件夹）名称视为区分大小写。然而，在 Windows\
    \ 或 macOS 上本地开发时，文件和文件夹名称的处理方式不区分大小写。为避免在将文件部署到生产服务器时出现路径错误，我建议在命名文件和文件夹时仅使用小写。如果您想混合使用大小写，请确保拼写一致。\
    \  \n\n# PHP 解决方案 5-5：处理缺失的变量  \n\n在许多场景中，预期值可能会缺失。例如，您可能拼错了变量名，表单可能没有提交值，或者包含文件缺失。因此，在尝试使用外部来源的值之前，检查其是否存在是一个好策略。在本解决方案中，您将使用两种不同的方法处理此问题。\
    \  \n\n1.  继续使用与上一个解决方案相同的文件。或者，将`index_03.php`、`blog_02.php`、`gallery_02.php`和`contact_02.php`从`ch05`文件夹复制到您的站点根目录。同时确保`title.php`、`menu_02.php`和`footer_01.php`位于`includes`文件夹中。如果使用`ch05`文件夹中的文件，请从每个文件名中删除下划线和数字。\
    \  \n\n2.  在`index.php`中，将`<title>`标签中变量的首字母大写，从`$title`改为`$Title`。PHP 变量是区分大小写的，因此这不再引用`title.php`生成的值。\
    \  \n\n3.  保存文件，并在浏览器中加载`index.php`。右键单击查看源代码。如果您将`error_reporting`设置为第 2 章推荐的级别，您应该会看到如图\
    \ 5-10 所示的结果。浏览器选项卡包含来自 PHP 错误通知的原始 HTML，关于未定义变量。  \n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig10_HTML.jpg](img/332054_4_En_5_Fig10_HTML.jpg)\
    \  \n\n**图 5-10.** 拼错变量会生成一个错误通知，显示在浏览器选项卡中  \n\n4.  PHP 7 中的 null 合并运算符无缝处理了这种情况。像这样修改`<title>`标签中的\
    \ PHP 块：  \n\n5.  保存并重新加载页面。浏览器选项卡现在应该如下所示：  \n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Figc_HTML.jpg](img/332054_4_En_5_Figc_HTML.jpg)\
    \  \n\n未定义的变量被忽略，null 合并运算符后面的值被显示而不生成错误通知。  \n\n6.  删除引号之间的文本，留空字符串如下：  \n\n\
    7.  再次保存并重新加载页面。这次，浏览器选项卡只显示 HTML 中的文本。空字符串简单地抑制了错误通知。  \n\n8.  通过将变量名首字母改为小写来更正变量名，并再次测试页面。现在它看起来与上一个\
    \ PHP 解决方案结束时相同（参见图 5-9）。  \n\n9.  null 合并运算符适用于在变量不存在时设置默认值；但如果要修改变量，则不能使用它。在这种情况下，您需要使用`isset()`函数来测试变量是否存在。\
    \  \n\n打开`blog.php`并按如下方式修改`<title>`标签：  \n\n```\nJapan Journey\n```\n\n请注意，HTML\
    \ 文本与开始 PHP 标签之间的空格已被移除。此外，开始 PHP 标签不再是简写形式，因为 PHP 块包含一个条件语句；它不仅仅是显示一个值。  \n\n\
    `isset()`函数在变量存在时返回`true`。因此，如果`$title`已被定义，`echo`会显示一个包含长破折号（`&mdash;`是 HTML\
    \ 字符实体）后跟`$title`值的双引号字符串。我将变量包裹在花括号中，因为实体和`$title`之间没有空格。这是可选的，但它使代码更易于阅读。  \n\
    \n## 提示  \n`isset()`函数在值为空字符串时返回`true`。它检查变量是否已定义且不是`null`。使用`empty()`检查空字符串或零值。\
    \  \n\n1.  保存`blog.php`并在浏览器中测试。浏览器选项卡应如下所示：  \n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Figd_HTML.jpg](img/332054_4_En_5_Figd_HTML.jpg)\
    \  \n\n由于`$title`有值，`isset()`返回`true`并显示前面带长破折号的值。  \n\n2.  尝试使用未定义的变量，例如`$Title`。条件语句内的代码将被忽略而不会触发错误通知。\
    \  \n\n3.  使用`isset()`或 null 合并运算符来保护`gallery.php`和`contact.php`免受`<title>`标签中使用未定义变量的影响。\
    \  \n\n您可以将代码与`ch05`文件夹中的`index_04.php`、`blog_03.php`、`gallery_03.php`和`contact_03.php`进行对照检查。\
    \  \n\n# 创建内容变化的页面  \n\n到目前为止，您已经使用 PHP 根据页面的文件名生成不同的输出。接下来的两个解决方案生成独立于文件名变化的内容：每年\
    \ 1 月 1 日自动更新年份的版权声明和一个随机图像生成器。  \n\n# PHP 解决方案 5-6：自动更新版权声明  \n\n`footer.php`中的版权声明仅包含静态\
    \ HTML。本 PHP 解决方案展示了如何使用`date()`函数自动生成当前年份。该代码还指定了版权起始年份，并使用条件语句确定当前年份是否不同。如果是，则显示两个年份。\
    \  \n\n继续使用 PHP 解决方案 5-5 中的文件。或者，使用`ch05`文件夹中的`index_04.php`和`footer_01.php`，并从文件名中删除数字。如果使用`ch05`文件夹中的文件，请确保在`includes`文件夹中有`title.php`和`menu.php`的副本。\
    \  \n\n1.  打开`footer.php`。它包含以下 HTML：  \n"
- fmt: "```\n© 2006&ndash;2019 David Powers\n```\n\nThe advantage of using an include\
    \ file is that you can update the copyright notice throughout the site by changing\
    \ this one file. However, it would be much more efficient to increment the year\
    \ automatically.\n\n2. The PHP `date()` function neatly takes care of this. Change\
    \ the code in the paragraph like this:\n\n```\n© 2006&ndash; David Powers\n```\n\
    \nThis replaces the second date and displays the current year using four digits.\
    \ Make sure you pass an uppercase `Y` as the argument to `date()`.\n\n**Note**\
    \  \nTable [16-4](https://doi.org/10.1007/978-1-4842-4338-1_Table#16-4) in Chapter\
    \ [16](#332054_4_En_16_Chapter.xhtml) lists the most frequently used characters\
    \ that can be passed to the `date()` function to display date parts, such as month,\
    \ day of the week, and so on.\n\n1. Save `footer.php` and load `index.php` into\
    \ a browser. The copyright notice at the foot of the page should look the same\
    \ as before—unless, of course, you’re reading this in 2020 or later, in which\
    \ case the current year will be displayed.\n\n2. Like most copyright notices,\
    \ this covers a range of years, indicating when a site was first launched. Since\
    \ the first date is in the past, it can be hard-coded. But if you’re creating\
    \ a new web site, you need only the current year. The range of years isn’t needed\
    \ until January 1.\n\nTo display a range of years, you need to know the start\
    \ year and the current year. If both years are the same, display only the current\
    \ year; if they’re different, display both with an en dash between them. It’s\
    \ a simple `if...else` situation. Change the code in the paragraph in `footer.php`\
    \ like this:\n\n```\n© David Powers\n```\n\nAs in PHP Solution 5-5, I’ve used\
    \ curly braces around the variables in the `else` clause because they’re in a\
    \ double-quoted string that contains no whitespace.\n\n3. Save `footer.php` and\
    \ reload `index.php` in a browser. The copyright notice should look the same as\
    \ before.\n\n4. Change the argument passed to the `date()` function to a lowercase\
    \ `y`, like this:\n\n```\n$thisYear = date('y');\n```\n\n5. Save `footer.php`\
    \ and click the Reload button in your browser. The second year is displayed using\
    \ only the last two digits, as shown in the following screenshot:\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fige_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fige_HTML.jpg)\n\
    \n**Tip**  \nThis should serve as a reminder of the importance of case-sensitivity\
    \ in PHP. Uppercase `Y` and lowercase `y` produce different results with the `date()`\
    \ function. Forgetting about case-sensitivity is one of the most common causes\
    \ of errors in PHP.\n\n1. Change the argument passed to `date()` back to an uppercase\
    \ `Y`. Set the value of `$startYear` to the current year and reload the page.\
    \ This time, you should see only the current year displayed.\n\nYou now have a\
    \ fully automated copyright notice. The finished code is in `footer_02.php` in\
    \ the `ch05` folder.\n\n## PHP Solution 5-7: Displaying a Random Image\n\nAll\
    \ you need to display a random image is a list of available images, stored in\
    \ an indexed array (see “Creating arrays” in Chapter [4](#332054_4_En_4_Chapter.xhtml)).\
    \ Since indexed arrays are numbered from 0, you can select one of the images by\
    \ generating a random number between 0 and one less than the length of the array.\
    \ All this is accomplished by a few lines of code…\n\nContinue using the same\
    \ files. Alternatively, use `index_04.php` from the `ch05` folder and rename it\
    \ `index.php`. Since `index_04.php` uses `title.php`, `menu.php`, and `footer.php`,\
    \ make sure all three files are in your `includes` folder. The images are already\
    \ in the `images` folder.\n\n1. Create a blank PHP page in the `includes` folder\
    \ and name it `random_image.php`. Insert the following code (it’s also in `random_image_01.php`\
    \ in the `ch05` folder):\n\n```\n<?php\n$images = ['kinkakuji', 'maiko', 'maiko_phone',\
    \ 'monk', 'fountains',\n'ryoanji', 'menu', 'basin'];\n$i = random_int(0, count($images)-1);\n\
    $selectedImage = \"images/{$images[$i]}.jpg\";\n```\n\nThis is the complete script:\
    \ an array of image names minus the `.jpg` filename extension (there’s no need\
    \ to repeat shared information—they’re all JPEG), a random number generator, and\
    \ a string that builds the correct path name for the selected file.\n\nTo generate\
    \ a random number within a range, pass the minimum and maximum numbers as arguments\
    \ to the `random_int()` function. Since there are eight images in the array, you\
    \ need a number between 0 and 7. The simple way to do this would be to use `random_int(0,\
    \ 7)`—simple, but inefficient. Every time you change the `$images` array, you\
    \ need to count how many elements it contains and change the maximum number passed\
    \ to `random_int()`.\n\nIt’s much easier to get PHP to do that for you with the\
    \ `count()` function, which counts the number of elements in an array. You need\
    \ a number one less than the number of elements in the array, so the second argument\
    \ passed to `random_int()` becomes `count($images)-1`, and the result is stored\
    \ in `$i`.\n\nThe random number is used in the final line to build the correct\
    \ path name for the selected file. The variable `$images[$i]` is embedded in a\
    \ double-quoted string with no whitespace separating it from surrounding characters,\
    \ so it’s enclosed in curly braces. Arrays start at 0, so if the random number\
    \ is 1, `$selectedImage` is `images/maiko.jpg`.\n\nIf you’re new to PHP, you may\
    \ find it difficult to understand code like this:\n\n```\n$i = random_int(0, count($images)-1);\n\
    ```\n\nAll that’s happening is that the second argument passed to `random_int()`\
    \ is an expression rather than a number. If it makes it easier for you to follow,\
    \ rewrite the code like this:\n\n```\n$numImages = count($images); // $numImages\
    \ is 8\n$max = $numImages – 1;       // $max is 7\n$i = random_int(0, $max); \
    \   // $i = random_int(0, 7)\n```\n\n2. Open `index.php` and include `random_image.php`\
    \ by inserting the command in the same code block as `title.php`, like this:\n\
    \n```\nSince `random_image.php` doesn’t send any direct output to the browser,\
    \ it’s safe to put it above the `DOCTYPE`.\n```\n\n3. Scroll down inside `index.php`,\
    \ and locate the code that displays the image in the figure element. It looks\
    \ like this:\n\n```\n<img src=\"images/basin.jpg\" alt=\"Water basin at Ryoanji\
    \ temple\" width=\"360\" height=\"240\" class=\"picBorder\">\n<figcaption>Water\
    \ basin at Ryoanji temple</figcaption>\n```\n\n4. Instead of using `images/basin.jpg`\
    \ as a fixed image, replace it with `$selectedImage`. All the images have different\
    \ dimensions, so delete the `width` and `height` attributes and use a generic\
    \ `alt` attribute. Also remove the text in the `figcaption` element. The code\
    \ in step 3 should now look like this:\n\n```\n<img src=\"<?= $selectedImage ?>\"\
    \ alt=\"Random image\" class=\"picBorder\">\n```\n\n**Note**  \nThe PHP block\
    \ displays only a single value, so you can use the short `echo` tag `<?=`.\n\n\
    1. Save both `random_image.php` and `index.php`, then load `index.php` into a\
    \ browser. The image should now be chosen at random. Click the Reload button in\
    \ your browser; you should see a variety of images, as shown in Figure [5-11](#332054_4_En_5_Chapter.xhtml#Fig11).\n\
    \n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig11_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig11_HTML.jpg)\n\
    \n**Figure 5-11.** Storing image filenames in an indexed array makes it easy to\
    \ display a random image\n\nYou can check your code against `index_05.php` and\
    \ `random_image_01.php` in the `ch05` folder. This is a simple and effective way\
    \ of displaying a random image, but it would be much better if you could set the\
    \ width and height for different-sized images dynamically, as well as add a caption\
    \ to describe the image."
