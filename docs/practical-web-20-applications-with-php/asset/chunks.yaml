    Integrating Google Maps


    **A**ll ofthe code we have developed so far inthis book has been self-containedwith
    no reliance on any outside services. Frequently in your web development endeavors
    you will need to integrate features that you don’t necessarily have the resources
    to provide. Or it simply may be that an outside service provides you with access
    to data you wouldn’t otherwise be able to access.


    In this chapter, we will be integrating Google Maps ([http://maps.google.com)
    into our](http://maps.google.com)


    web application as an example of using third-party services. Specifically, we
    will allow users to assign one or more locations to each of their blog posts and
    then display a map marking the location when visitors view the respective blog
    post.


    Many other services are available on the Internet that can be used on your web
    site (or even desktop applications), such as displaying product information and
    reviews using Amazon Web Services or processing credit card payments (using PayPal,
    Google Checkout, or one of the many other similar options available).


    In addition to displaying maps with Google Maps, we will also make use of the
    geo microformat, extending what we learned about microformats in Chapter 10.


    **Google Maps Features**


    The Google Maps API is a well-documented and comprehensive JavaScript API that
    gives developers a wide range of options for displaying maps and controlling how
    their maps behave. Before we begin planning our usage of the maps, let’s take
    a look at some of the key features available.


    **Geocoding**


    Gecoding is the process of converting a street address into geographical coordinates
    (latitude and longitude). For example, Google’s address is 1600 Amphitheatre Pkwy,
    Mountain View, California. If you were to enter this address into the Google Maps
    geocoder, then the coordinates of latitude 37.423111 and longitude -122.081783
    would be returned. These coordinates can then be used to mark locations on the
    displayed map.


    Google provides two ways to access its geocoder. The first method is to use their
    JavaScript interface to look up addresses. This allows you to look up and add
    new points on your map from within the client-side web browser.


    **469**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch13CMP3 11/15/07 8:20 AM Page 470


    **470**


    C H A P T E R 1 3 ■ I N T E G R AT I N G G O O G L E M A P S


    The second method to access the geocoder is to query their geocoder web service
    on the server side. This makes it easy to look up addresses and save the results
    in your database for future use, and it doesn’t therefore rely on the end-user
    having a JavaScript-enabled web browser.


    For any given request, the geocoder may return zero, one, or several matches.
    Since an API key is required to access Google Maps (which we will create shortly)
    and each IP address has a limitation on the number of geocoder requests daily
    (15,000), an incorrect key or too many requests might be the cause for no matches
    being returned. Note that these errors are indicated in the status section of
    the response.


    ■**Note** An API key is what Google uses to control access to their services.
    For you (as a web site owner or developer) to use Google Maps on your own web
    site, you must have an API key. When a user tries to load a map from your site,
    your API key is used in the request.


    If multiple addresses are found (perhaps you entered an address such as 123 Main
    St.


    without specifying the town), it is up to you as the developer to determine which
    address is the one you were after. The response includes an accuracy rating with
    each matched address.


    The rating indicates to what level the response is accurate (such as country,
    region, city, street, intersection, or an exact match).


    We will use the client-side geocoder in this chapter to look up addresses entered
    by users when they try to add locations to their blog posts.


    **Displaying Maps**


    When displaying a map with Google Maps, you must provide an HTML element on your
    page in which to hold the map. The map will automatically fill the entire width
    and height of the specified element.


    Additionally, the objects in the following sections can be placed on maps as required.


    Map Controls


    When the map is initially displayed, there will be no controls displayed. Controls
    are buttons on the map that allow the user to manipulate the display. The available
    controls are as follows:


    • **Zoom.** The user can zoom in or zoom out using the appropriate buttons or
    slider.


    • **Panning.** The user can move the map north, south, east, or west using the
    panning buttons.


    • **Map Type.** The user can choose the type of map displayed, which by default
    includes a street map, a satellite map, or a combination of the two (called a
    *hybrid* map).


    • **Mini-map.** This a small map that sits in the corner of the main map that
    is zoomed out further than the main map, allowing users to change the location
    of the map more quickly for large distances.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 52](index-493_1.jpg)


    9063Ch13CMP3 11/15/07 8:20 AM Page 471


    C H A P T E R 1 3 ■ I N T E G R AT I N G G O O G L E M A P S


    **471**


    • **Map scale.** This indicates how many meters, yards, kilometers, or miles the
    displayed distance represents.


    Figure 13-1 shows an example map that includes each of these controls.


    **Figure 13-1.** *A sample map showing various map controls*


    The Google Maps API allows you to add any of these controls as required. Additionally,
    you can choose which corner of the map to anchor the control. By default, the
    zoom and panning buttons are in the top-left, the map type buttons are in the
    top-right, the mini-map is in the bottom-right, and the scale is in the bottom-left.


    Although we will not be doing so in this chapter, the API also allows developers
    to create custom controls that can be overlaid on the map. For example, if you
    wanted to use graphical icons to switch between the map types instead of the text
    buttons, you could do so by creating a custom control.


    Map Overlays


    A map overlay is any object (aside from the map controls) that appears on top
    of the map that isn’t actually part of the map yet moves with the map as it is
    panned. The use of overlays is essential to portray any useful custom information
    to your users. The different types of overlays available in Google Maps are as
    follows:


    • **Markers.** A marker represents a single point on the map. It is possible to
    use any icon you desire to display the marker, although the simplest solution
    is to use the built-in icon (shown in Figure 13-2). A map can have any number
    of markers, although there may be scalability issues you need to take into account
    for a large number of markers.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 53](index-494_1.jpg)


    9063Ch13CMP3 11/15/07 8:20 AM Page 472


    **472**


    C H A P T E R 1 3 ■ I N T E G R AT I N G G O O G L E M A P S


    ■**Note** The Google Maps API provides a class (google.maps.MarkerManager) that
    can be used to manage a large number of points. Since loading a large number of
    points (hundreds or thousands) can result in a large amount of memory use in the
    client web browser, then how these points are loaded and displayed needs to be
    managed—there’s no sense in loading points that are in Europe when the user is
    viewing North America. Since we will not be displaying a large number of markers
    at any one time in this book, we will not be using this class. However, if you
    wanted to extend the functionality we add this chapter to display every location
    of every blog post in our database, then you would consider using this class.


    • **Information windows.** An information window is a callout box you can add
    to your map that points to a specified point on the map (which may or may not
    have a corresponding marker). Within the information window you can display any
    HTML content you please (such as text, links, or images). This is commonly used
    to display information after a marker has been clicked. The API also allows you
    to display tabbed information windows, allowing you to display multiple pages
    of information in a single information window.


    • **Polylines.** By specifying a series of points, you can draw lines on the map
    using the polyline classes. Google uses this on its own maps to display driving
    directions between locations. You can use this feature in many ways, such as if
    you want to plot the path and distance of your morning jog (since the distance
    between two points can be calculated using their latitude and longitude).


    Figure 13-2 shows an example of what a marker and information window looks like
    on a map.


    **Figure 13-2.** *Map overlays in Google Maps*


