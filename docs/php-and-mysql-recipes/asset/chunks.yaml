    In the client example the wsdl file is loaded from the server. It could also be
    loaded locally to save a web request but the soap client supports caching of the
    wsdl file preventing it from being loaded on every request. The cache is usually
    stored in the /tmp directory and it must be cleared manually if the wsdl file
    is updated on the server.


    CHAPTER 14 ■ XML, RSS, WDDX, AND SOAP


    With the use of a wsdl file the client becomes more like ‘normal’ PHP code. When
    the wsdl file is loaded the SoapClient will create magic functions for each of
    the methods defined and these can now be called directly.


    If the server defines additional methods that are not included in the wsdl file
    it is still possible to call these, but only with the use of the __soapCall()
    method .


    The soap functions can be used over HTTPS to make the requests more secure. It
    is also recommended that if sensitive data is being transferred the server the
    client should make use of additional parameters to pass credentials. This can
    be done in the same way as other parameters and the values can be exchanged by
    some other means before the client can make calls and the server will validate
    the credentials before returning any values to the client. This makes it possible
    to revoke the access to a client from the server side by invalidating the credentials.


    **CHAPTER 15**


    **Data Exchange with JSON**


    Chapter [14 co](http://dx.doi.org/10.1007/978-1-4842-0605-8_14)vered the use of
    XML to exchange date between a client and a server. When the client is created
    with JavaScript in a browser it’s much easier to exchange data with something
    called JSON. JSON is an acronym for JavaScript Object Notation. It is a sting-like
    notation that makes it easy to declare complex structures like arrays and object.


    Recipe 15-1\. Fetching Data with AJAX


    Problem


    Traditionally a browser is used to fetch HTML pages from a server. Navigation
    to a different page on the same or different server is done with links in the
    HTML document. When a user clicks on a link the browser will fetch and render
    the content of the new page.


    As the web technology evolves and in order to reduce load time it’s becoming more
    common to load part of a page and when the user clicks on a read more link or
    scrolls to the bottom of the page, the browser will fetch additional content and
    render it inline without reloading the existing document.


    Solution


    The technology to use is an AJAX request. This is a section of JavaScript code
    that will perform an HTTP


    request to a server (usually the same server where the page was loaded from) and
    the response will be used to insert additional content into the HTML document.


    The simple approach is to have the server generate the HTML that needs to be added
    and simply append the returned value directly into the HTML document.


    How it Works


    Using the XMLHTTP object in the browsers is relatively simple but it can be made
    even simpler with the use of jQuery. jQuery is a JavaScript library that makes
    it very easy to manipulate the HTML document, add event listeners, and perform
    AJAX requests. All the recipes in this chapter will make use of the jQuery library.


    © Frank M. Kromann 2016


    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_15


    CHAPTER 15 ■ DATA EXCHANGE WITH JSON


    The first example shows how to use jQuery and PHP scripts to load a simple document
    with a few rows of data and then make AJAX request to update the section of data
    without reloading the document.


    <?php


    // 15_1.php


    $languages = [


    ''PHP'', ''JavaScript'',


    ''C'', ''C++'', ''C#'', ''Objective-C'',


    ''Python'', ''Java'', ''Ruby'',


    ''Visual Basic'',


    ''Scala''


    ];


    shuffle($languages);


    $data = array_slice($languages, 0, 3);


    $html = "";


    foreach($data as $lang) {


    $html .= "<li>$lang</li>";


    }


    if ($_REQUEST[''data'']) {


    echo $html;


    }


    else {


    echo <<<HEREDOC


    <!DOCTYPE html>


    <html>


    <head>


    <script src="https://code.jquery.com/jquery-1.12.2.min.js"


    integrity="sha256-lZFHibXzMHo3GGeehn1hudTAP3Sc0uKXBXAzHX1sjtk="


    crossorigin="anonymous"></script>


    </bead>


    <body>


    <h1>Programming Languages</h1>


    <ul id="lang">


    $html


    </ul>


    <button onclick="Update()">Update</button>


    <script>


    function Update() {


    $.get("{$_SERVER[''PHP_SELF'']}?data=1", function(data) {


    $("#lang").html(data);


    });


    }


    </script>


    </body>


    </html>


    HEREDOC;


    }


    ![Image 27](index-345_1.jpg)


    CHAPTER 15 ■ DATA EXCHANGE WITH JSON


    The output of the initial load of this script will look like this:


    Every time the user clicks the Update button the same script is called with the
    parameter data=1 and it will return only the HTML for the 3 <li> elements. The
    returned string will be inserted into the <ul> element with the id=“lang” attributes
    and replaces the content that was already there.


    Recipe 15-2\. Returning JSON


    Problem


    Returning the finished HTML string from the server makes it difficult for the
    client to manipulate the data, if needed. Is there was a way to get the data back
    in a structured form that would allow the client to manipulate the data and perhaps
    create the html needed to match the device it’s rendering on?


    Solution


    PHP has functions to encode and decode variables to and from the JSON format.
    The function json_


    encode() will convert the variable into a stringified version and json_decode()
    will take a stringified JSON string and convert it back to a PHP variable. Encoding
    variables as JSON is often used to generate a response and decoding is used when
    PHP acts as a client to an API that returns a JSON response. In addition to the
    encode and decode function PHP also supports json_last_error() . This function
    does not take any parameters and can be called after encode or decode. It will
    return an integer value that represents the result of the last operation. The
    possible return values can be compared to one of the following constants: **Constant**


    **Meaning**


    **Available**


    JSON_ERROR_NONE


    **No errors detected**


    JSON_ERROR_DEPTH


    **Maximum stack depth exceeded**


    JSON_ERROR_STATE_MISMATCH


    **Invalid JSON**


    JSON_ERROR_CTRL_CHAR


    **Invalid control character**


    JSON_ERROR_SYNTAX


    **Syntax error**


    JSON_ERROR_UTF8


    **Malformatted UTF-8 characters**


    **5.3.3**


    JSON_ERROR_RECURSION


    **Recursive references**


    **5.5.0**


    JSON_ERROR_INF_OR_NAN


    **NAN or INF values found**


    **5.5.0**


    JSON_ERROR_UNSUPPORTED_TYPE


    **Unsupported type**


    **5.5.0**


