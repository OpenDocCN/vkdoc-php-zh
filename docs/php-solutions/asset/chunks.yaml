- fmt: "## Which Database Should You Choose?\n\nIn the first two editions of this\
    \ book, there was no question about which database to use. `MariaDB` either didn’t\
    \ exist or had a tiny user base, and `MySQL` offered the following advantages:\n\
    \n*   **Cost**: The MySQL Community Edition is free under the open source GPL\
    \ license ([`www.gnu.org/licenses/old-licenses/gpl-2.0.html`](http://www.gnu.org/licenses/old-licenses/gpl-2.0.html)).\n\
    *   **Powerful**: MySQL is used by leading organizations such as NASA, the White\
    \ House, DaimlerChrysler, and BBC News. It’s feature-rich and fast.\n*   **Widespread\
    \ availability**: MySQL is the most popular open source database. Most hosting\
    \ companies automatically offer MySQL in combination with PHP.\n*   **Cross-platform\
    \ compatibility**: MySQL runs on Windows, Mac OS X, and Linux. A database requires\
    \ no conversion when transferred from one system to another.\n*   **Open source**:\
    \ The code and features in the Community Edition are identical to the commercial\
    \ version.\n\nMySQL was originally developed by MySQL AB in Sweden, but the company\
    \ was sold to Sun Microsystems in 2008. Sun was acquired two years later by Oracle,\
    \ a major commercial database supplier. Many regarded this as a threat to MySQL’s\
    \ continued survival as a free, open source database. However, Oracle is on record\
    \ as saying “MySQL is integral to Oracle's complete, open and integrated strategy.”\
    \ This did little to impress one of MySQL’s original creators, Michael “Monty”\
    \ Widenius, who has accused Oracle of removing features from MySQL and of being\
    \ slow to fix security issues.\n\nBecause the MySQL code is open source, Widenius\
    \ has forked it to create MariaDB, which is described as “an enhanced, drop-in\
    \ replacement for MySQL.” Originally, MariaDB followed the same version numbering\
    \ as MySQL, so MariaDB 5.1 was a replacement for MySQL 5.1. This continued until\
    \ version 5.5. Thereafter, MariaDB jumped to version 10.0. This change was made\
    \ to make it clear that not all features in MySQL 5.6 will be imported into MariaDB.\n\
    \n**Tip**  \nThe official pronunciation of MySQL is “my-ess-queue-ell.”\n\n###\
    \ Compatibility of MariaDB and MySQL\n\nIn spite of the break between MariaDB\
    \ 10.0 and MySQL 5.6, the two database systems are virtually interchangeable.\
    \ The MariaDB executable uses the same name as MySQL (`mysqld` on Mac OS X and\
    \ Linux, `mysqld.exe` on Windows). The main privileges table is also called `mysql`,\
    \ and the default storage engine identifies itself as `InnoDB`, even though it’s\
    \ actually a fork of `InnoDB` called `Percona XtraDB`.\n\nAs far as the code in\
    \ this book is concerned, it should make no difference whether you use MariaDB\
    \ or MySQL. MariaDB understands all the MySQL-specific PHP code. It’s also supported\
    \ by the `phpMyAdmin` graphical interface for MySQL that I’ll be using in the\
    \ remaining chapters.\n\nI don’t have a crystal ball to predict how the rivalry\
    \ between MariaDB and MySQL will play out in the coming years. At the time of\
    \ this writing, MariaDB ranked 27th in the monthly survey conducted by DB-Engines,\
    \ with only a fraction of the score achieved by MySQL. But with big names like\
    \ Google and Wikimedia migrating to MariaDB, the situation could change rapidly.\
    \ Nevertheless, to make this book readable, I have decided to stick with the current\
    \ market leader, MySQL. Except where I make a specific reference to MariaDB, you\
    \ should assume that all references to MySQL apply equally to MariaDB.\n\n**Note**\
    \  \nAll of the code in this book has been tested on the current stable versions\
    \ of MySQL (5.6) and MariaDB (10.0). The code should also work in versions 5.1\
    \ through 5.5 of both.\n\n## How a Database Stores Information\n\nAll the data\
    \ in a relational database, such as MySQL, is stored in tables, very much in the\
    \ same way as in a spreadsheet, with information organized into rows and columns.\
    \ Figure [10-1](#A978-1-4842-0635-5_10_Chapter.html#Fig1) shows the database table\
    \ that you will build later in this chapter, as displayed in `phpMyAdmin`.\n\n\
    ![A978-1-4842-0635-5_10_Fig1_HTML.jpg](A978-1-4842-0635-5_10_Fig1_HTML.jpg)\n\n\
    **Figure 10-1.** A database table stores information in rows and columns like\
    \ in a spreadsheet\n\nEach column has a name (`image_id`, `filename`, and `caption`)\
    \ indicating what it stores.\n\nThe rows aren’t labeled, but the first column\
    \ (`image_id`) contains a unique value known as a primary key, which identifies\
    \ the data associated with the row. Each row contains an individual record of\
    \ related data.\n\nThe intersection of a row and a column, where the data is stored,\
    \ is called a field. For instance, the `caption` field for the third record in\
    \ Figure [10-1](#A978-1-4842-0635-5_10_Chapter.html#Fig1) contains the value “The\
    \ Golden Pavilion in Kyoto,” and the primary key for that record is 3.\n\n**Note**\
    \  \nThe terms “field” and “column” are often used interchangeably, particularly\
    \ in older versions of `phpMyAdmin`. A field holds one piece of information for\
    \ a single record, whereas a column contains the same field for all records.\n\
    \n### How primary keys work\n\nAlthough Figure [10-1](#A978-1-4842-0635-5_10_Chapter.html#Fig1)\
    \ shows `image_id` as a consecutive sequence from 1 to 8, they’re not row numbers.\
    \ Figure [10-2](#A978-1-4842-0635-5_10_Chapter.html#Fig2) shows the same table\
    \ with the captions sorted in alphabetical order. The field highlighted in Figure\
    \ [10-1](#A978-1-4842-0635-5_10_Chapter.html#Fig1) has moved to the seventh row,\
    \ but it still has the same `image_id` and `filename`.\n\n![A978-1-4842-0635-5_10_Fig2_HTML.jpg](A978-1-4842-0635-5_10_Fig2_HTML.jpg)\n\
    \n**Figure 10-2.** The primary key identifies the row even when the table is sorted\
    \ in a different order\n\nAlthough the primary key is rarely displayed, it identifies\
    \ the record and all the data stored in it. Once you know the primary key of a\
    \ record, you can update it, delete it, or use it to display data in a separate\
    \ page. Don’t worry about how you find the primary key. It’s easily done using\
    \ Structured Query Language (SQL), the standard means of communicating with all\
    \ major databases. The important thing to remember is to assign a primary key\
    \ to every record.\n\n**Tip**  \nSome people pronounce SQL like the word “sequel.”\
    \ Others spell it out as “ess-queue-ell.”\n\n- A primary key doesn’t need to be\
    \ a number, but it must be unique.\n- Social Security, staff ID, or product numbers\
    \ make good primary keys. They may consist of numbers, letters, and other characters,\
    \ but are always unique.\n- MySQL can generate a primary key for you automatically.\n\
    - Once a primary key has been assigned, it should never repeat, and never be changed.\n\
    \nBecause a primary key must be unique, MySQL doesn’t normally reuse the number\
    \ when a record is deleted. This leaves holes in the sequence. Don’t even think\
    \ about renumbering. Gaps in the sequence are of no importance whatsoever. The\
    \ purpose of the primary key is to identify the record, and by changing the numbers\
    \ to close the gaps, you put the integrity of your database at serious risk.\n\
    \n**Tip**  \nSome people want to remove gaps in the sequence to keep track of\
    \ the number of records in a table. It’s not necessary, as you’ll discover in\
    \ the next chapter."
  raw: '## Which Database Should You Choose?


    In the first two editions of this book, there was no question about which database
    to use. MariaDB either didn’t exist or had a tiny user base, and MySQL offered
    the following advantages:


    *   Cost: The MySQL Community Edition is free under the open source GPL license
    ( [`www.gnu.org/licenses/old-licenses/gpl-2.0.html`](http://www.gnu.org/licenses/old-licenses/gpl-2.0.html)
    ).

    *   Powerful: MySQL is used by leading organizations such as NASA, the White House,
    DaimlerChrysler, and BBC News. It’s feature-rich and fast.

    *   Widespread availability: MySQL is the most popular open source database. Most
    hosting companies automatically offer MySQL in combination with PHP.

    *   Cross-platform compatibility: MySQL runs on Windows, Mac OS X, and Linux.
    A database requires no conversion when transferred from one system to another.

    *   Open source: The code and features in the Community Edition are identical
    to the commercial version.


    MySQL was originally developed by MySQL AB in Sweden, but the company was sold
    to Sun Microsystems in 2008\. Sun was acquired two years later by Oracle, a major
    commercial database supplier. Many regarded this as a threat to MySQL’s continued
    survival as a free, open source database. However, Oracle is on record as saying
    “MySQL is integral to Oracle''s complete, open and integrated strategy.” This
    did little to impress one of MySQL’s original creators, Michael “Monty” Widenius,
    who has accused Oracle of removing features from MySQL and of being slow to fix
    security issues.


    Because the MySQL code is open source, Widenius has forked it to create MariaDB,
    which is described as “an enhanced, drop-in replacement for MySQL.” Originally,
    MariaDB followed the same version numbering as MySQL, so MariaDB 5.1 was a replacement
    for MySQL 5.1\. This continued until version 5.5\. Thereafter, MariaDB jumped
    to version 10.0\. This change was made to make it clear that not all features
    in MySQL 5.6 will be imported into MariaDB.


    Tip


    The official pronunciation of MySQL is “my-ess-queue-ell.”


    ### Compatibility of MariaDB and MySQL


    In spite of the break between MariaDB 10.0 and MySQL 5.6, the two database systems
    are virtually interchangeable. The MariaDB executable uses the same name as MySQL
    (`mysqld` on Mac OS X and Linux, `mysqld.exe` on Windows). The main privileges
    table is also called `mysql`, and the default storage engine identifies itself
    as InnoDB, even though it’s actually a fork of InnoDB called Percona XtraDB.


    As far as the code in this book is concerned, it should make no difference whether
    you use MariaDB or MySQL. MariaDB understands all the MySQL-specific PHP code.
    It’s also supported by the phpMyAdmin graphical interface for MySQL that I’ll
    be using in the remaining chapters.


    I don’t have a crystal ball to predict how the rivalry between MariaDB and MySQL
    will play out in the coming years. At the time of this writing, MariaDB ranked
    27th in the monthly survey conducted by DB-Engines, with only a fraction of the
    score achieved by MySQL. But with big names like Google and Wikimedia migrating
    to MariaDB, the situation could change rapidly. Nevertheless, to make this book
    readable, I have decided to stick with the current market leader, MySQL. Except
    where I make a specific reference to MariaDB, you should assume that all references
    to MySQL apply equally to MariaDB.


    Note


    All of the code in this book has been tested on the current stable versions of
    MySQL (5.6) and MariaDB (10.0). The code should also work in versions 5.1 through
    5.5 of both.


    ## How a Database Stores Information


    All the data in a relational database, such as MySQL, is stored in tables, very
    much in the same way as in a spreadsheet, with information organized into rows
    and columns. Figure [10-1](#A978-1-4842-0635-5_10_Chapter.html#Fig1) shows the
    database table that you will build later in this chapter, as displayed in phpMyAdmin.


    ![A978-1-4842-0635-5_10_Fig1_HTML.jpg](A978-1-4842-0635-5_10_Fig1_HTML.jpg)


    Figure 10-1.


    A database table stores information in rows and columns like in a spreadsheet


    Each column has a name (`image_id`, `filename`, and `caption`) indicating what
    it stores.


    The rows aren’t labeled, but the first column (`image_id`) contains a unique value
    known as a primary key, which identifies the data associated with the row. Each
    row contains an individual record of related data.


    The intersection of a row and a column, where the data is stored, is called a
    field. For instance, the `caption` field for the third record in Figure [10-1](#A978-1-4842-0635-5_10_Chapter.html#Fig1)
    contains the value “The Golden Pavilion in Kyoto,” and the primary key for that
    record is 3.


    Note


    The terms “field” and “column” are often used interchangeably, particularly in
    older versions of phpMyAdmin. A field holds one piece of information for a single
    record, whereas a column contains the same field for all records.


    ### How primary keys work


    Although Figure [10-1](#A978-1-4842-0635-5_10_Chapter.html#Fig1) shows `image_id`
    as a consecutive sequence from 1 to 8, they’re not row numbers. Figure [10-2](#A978-1-4842-0635-5_10_Chapter.html#Fig2)
    shows the same table with the captions sorted in alphabetical order. The field
    highlighted in Figure [10-1](#A978-1-4842-0635-5_10_Chapter.html#Fig1) has moved
    to the seventh row, but it still has the same `image_id` and `filename`.


    ![A978-1-4842-0635-5_10_Fig2_HTML.jpg](A978-1-4842-0635-5_10_Fig2_HTML.jpg)


    Figure 10-2.


    The primary key identifies the row even when the table is sorted in a different
    order


    Although the primary key is rarely displayed, it identifies the record and all
    the data stored in it. Once you know the primary key of a record, you can update
    it, delete it, or use it to display data in a separate page. Don’t worry about
    how you find the primary key. It’s easily done using Structured Query Language
    (SQL), the standard means of communicating with all major databases. The important
    thing to remember is to assign a primary key to every record.


    Tip


    Some people pronounce SQL like the word “sequel.” Others spell it out as “ess-queue-ell.”


    *   A primary key doesn’t need to be a number, but it must be unique.

    *   Social Security, staff ID, or product numbers make good primary keys. They
    may consist of numbers, letters, and other characters, but are always unique.

    *   MySQL can generate a primary key for you automatically.

    *   Once a primary key has been assigned, it should never repeat, and never be
    changed.


    Because a primary key must be unique, MySQL doesn’t normally reuse the number
    when a record is deleted. This leaves holes in the sequence. Don’t even think
    about renumbering. Gaps in the sequence are of no importance whatsoever. The purpose
    of the primary key is to identify the record, and by changing the numbers to close
    the gaps, you put the integrity of your database at serious risk.


    Tip


    Some people want to remove gaps in the sequence to keep track of the number of
    records in a table. It’s not necessary, as you’ll discover in the next chapter.'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵守您提供的注意事项和示例，将给定的英文文本翻译成中文。



    ## 你应该选择哪个数据库？


    在本节的第一版和第二版中，对于选择哪个数据库是毫无疑问的。`MariaDB` 要么不存在，要么用户群极小，而 `MySQL` 则提供了以下优势：


    *   **成本**：MySQL 社区版在开源 GPL 许可证下是免费的（[`www.gnu.org/licenses/old-licenses/gpl-2.0.html`](http://www.gnu.org/licenses/old-licenses/gpl-2.0.html)）。

    *   **功能强大**：MySQL 被 NASA、白宫、戴姆勒克莱斯勒和 BBC 新闻等领先机构使用。它功能丰富且速度快。

    *   **广泛可用**：MySQL 是最流行的开源数据库。大多数托管公司都会自动提供 MySQL 与 PHP 的组合。

    *   **跨平台兼容性**：MySQL 可在 Windows、Mac OS X 和 Linux 上运行。当数据库从一个系统转移到另一个系统时，无需进行转换。

    *   **开源**：社区版的代码和功能与商业版本完全相同。


    MySQL 最初由瑞典的 MySQL AB 开发，但该公司于 2008 年被 Sun Microsystems 收购。两年后，Sun 被主要的商业数据库供应商甲骨文收购。许多人认为这威胁到了
    MySQL 作为免费开源数据库的持续生存。然而，甲骨文公司公开表示“MySQL 是甲骨文完整、开放和集成战略中不可或缺的一部分。”这并没有给 MySQL 的原始创建者之一
    Michael “Monty” Widenius 留下深刻印象，他指责甲骨文从 MySQL 中移除功能，并且在修复安全漏洞方面行动迟缓。


    由于 MySQL 代码是开源的，Widenius 将其复刻出来创建了 MariaDB，它被描述为“MySQL 的增强型、可直接替代的版本。”最初，MariaDB
    遵循与 MySQL 相同的版本号，因此 MariaDB 5.1 是 MySQL 5.1 的替代品。这种情况一直持续到版本 5.5。此后，MariaDB 跃升至版本
    10.0。进行此更改是为了明确 MySQL 5.6 中的某些功能将不会导入到 MariaDB 中。


    **提示**

    MySQL 的官方发音是“my-ess-queue-ell”。


    ### MariaDB 和 MySQL 的兼容性


    尽管 MariaDB 10.0 和 MySQL 5.6 之间存在分歧，但这两个数据库系统实际上是可互换的。MariaDB 的可执行文件使用与 MySQL 相同的名称（Mac
    OS X 和 Linux 上为 `mysqld`，Windows 上为 `mysqld.exe`）。主要的权限表也叫做 `mysql`，并且默认存储引擎标识为
    `InnoDB`，尽管它实际上是 `InnoDB` 的一个名为 `Percona XtraDB` 的复刻版本。


    就本书中的代码而言，使用 MariaDB 还是 MySQL 应该没有区别。MariaDB 理解所有 MySQL 特有的 PHP 代码。我将在后续章节中使用的
    MySQL 图形界面 `phpMyAdmin` 也支持它。


    我没有水晶球来预测 MariaDB 和 MySQL 之间的竞争在未来几年将如何发展。在撰写本文时，MariaDB 在 DB-Engines 每月调查中排名第
    27 位，其分数仅为 MySQL 的一小部分。但随着像谷歌和维基媒体这样的大公司迁移到 MariaDB，这种情况可能会迅速改变。尽管如此，为了使本书更具可读性，我决定坚持使用当前的市场领导者
    MySQL。除非我特别提到 MariaDB，否则您应假定所有对 MySQL 的引用同样适用于 MariaDB。


    **注意**

    本书中的所有代码已在当前稳定版本的 MySQL (5.6) 和 MariaDB (10.0) 上测试通过。这些代码也应在两者的 5.1 至 5.5 版本中运行。


    ## 数据库如何存储信息


    关系型数据库（如 MySQL）中的所有数据都存储在表中，这与电子表格的存储方式非常相似，信息按行和列组织。图 10-1 显示了您将在本章后面构建的数据库表，该表显示在
    `phpMyAdmin` 中。


    ![A978-1-4842-0635-5_10_Fig1_HTML.jpg](img/A978-1-4842-0635-5_10_Fig1_HTML.jpg)


    **图 10-1.** 数据库表像电子表格一样按行和列存储信息


    每列都有一个名称（`image_id`、`filename` 和 `caption`），指明其存储的内容。


    行没有标签，但第一列（`image_id`）包含一个称为主键的唯一值，用于标识与该行关联的数据。每行包含一条相关数据的独立记录。


    行和列相交、存储数据的位置称为字段。例如，图 10-1 中第三条记录的 `caption` 字段包含值“京都的金阁寺”，该记录的主键是 3。


    **注意**

    术语“字段”和“列”经常互换使用，尤其是在旧版本的 `phpMyAdmin` 中。一个字段为单个记录保存一条信息，而一个列则为所有记录保存相同的字段。


    ### 主键如何工作


    尽管图 10-1 显示 `image_id` 是从 1 到 8 的连续序列，但它们不是行号。图 10-2 显示了按字母顺序排序标题后的同一张表。在图 10-1
    中突出显示的字段已移动到第七行，但它仍然具有相同的 `image_id` 和 `filename`。


    ![A978-1-4842-0635-5_10_Fig2_HTML.jpg](img/A978-1-4842-0635-5_10_Fig2_HTML.jpg)


    **图 10-2.** 即使表格按不同顺序排序，主键也能标识该行


    虽然主键很少显示，但它能标识记录及其存储的所有数据。一旦您知道记录的主键，就可以更新、删除它，或者用它来在单独的页面中显示数据。不用担心如何找到主键，使用结构化查询语言
    (SQL) 可以轻松完成，这是与所有主流数据库通信的标准方式。要记住的重要事情是，为每条记录分配一个主键。


    **提示**

    有些人将 SQL 发音为“sequel”。其他人则将其拼读为“ess-queue-ell”。


    - 主键不必是数字，但它必须是唯一的。

    - 社会保险号、员工 ID 或产品编号是很好的主键。它们可能由数字、字母和其他字符组成，但始终是唯一的。

    - MySQL 可以自动为您生成一个主键。

    - 一旦主键被分配，它永远不应重复，也永远不应更改。


    由于主键必须是唯一的，MySQL 在删除记录时通常不会重用该编号。这会在序列中留下空洞。甚至不要考虑重新编号。序列中的间隙根本不重要。主键的目的是标识记录，而通过更改数字来填补间隙，您将使数据库的完整性面临严重风险。


    **提示**

    有些人希望删除序列中的间隙，以便跟踪表中的记录数。这是不必要的，您将在下一章中发现这一点。

