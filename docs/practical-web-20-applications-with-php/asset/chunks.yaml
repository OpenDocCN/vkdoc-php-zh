    C H A P T E R 2


    Setting Up the Application


    Framework


    **I**n thelast chapter, we covered the featuresthat we will be implementingin
    our web application. Before we can get started on these features, however, we
    must set up our development environment. In this chapter, we will be completing
    a number of tasks, beginning with setting up the required server software.


    Following that, we will create a filesystem structure that will serve as the basis
    for our web application. There are a number of different types of files in our
    web application, and we will keep them as organized as possible. For example,
    we need one directory for the web server to use as the base directory from which
    to serve files, we need another directory to hold custom and third-party PHP libraries,
    and we need another to hold web site templates.


    Next, we will set up the database. The actual creation of database schema and
    various queries will be covered in later chapters, but here we will write the
    PHP code required to connect to the database.


    Then we will write code to handle client requests to our web site. We will use
    the Model-View-Controller design pattern to handle requests, and we will look
    more closely at this model in this chapter.


    Finally, we will install the Smarty Template Engine into our application and set
    up some basic templates. We will expand on these templates as we continue through
    this book, but the material provided here should explain the basics of Smarty.


    Also in this chapter, we will create a configuration file for our web application.
    This file allows you to deploy the web applications to different servers easily.
    For example, we will be storing database connection settings in this file, meaning
    that you can switch databases or the database password simply by modifying this
    file.


    **Web Server Setup**


    Setting up a web server correctly can be a complex task, and I cannot cover all
    scenarios in this book. However, I will cover the setup used for all code in this
    book.


    I have used a somewhat typical LAMP setup (Linux/Apache/MySQL/PHP), broken down
    as follows:


    • Operating system: Linux


    • Web server: Apache 2.2


    • Database server: MySQL 5


    • Server-side scripting language: PHP 5.2.3


