    \ 90 天的测试目的。如果你拥有有效的 Windows 许可证，还可以创建一个永不过期的安装。\n\n## 第 2 章 ■ 类与对象\n\n面向对象编程相比过程化编程具有许多优势。当代码在团队内或团队之间共享时，它有助于封装，并且可以保护代码元素不被滥用。当代码以编译形式共享时尤其如此，但同样的机制也可以应用于像\
    \ PHP 这样的脚本语言。本章描述了面向对象编程在 PHP 中的工作方式。\n\n### 方案 2-1. 编写一个简单的类\n\n#### 问题\n\n\
