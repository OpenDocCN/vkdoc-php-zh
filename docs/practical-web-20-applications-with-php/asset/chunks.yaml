    **Styling the Application Web Forms**


    In Chapter 4 we created three forms for the user system: a registration form,
    a login form, and a fetch-password form. Since forms play such an important part
    in interactive web sites, we must make our forms easy for users to understand
    and use. Let’s look at how to style these forms. Each form should meet the following
    requirements:


    • Elements must be clearly labeled.


    • Errors that occur should be highlighted.


    • A submit button must be included.


    In Chapter 4 we used a Smarty template called error.tpl to output errors. This
    template outputs a div regardless of whether an error has occurred, since this
    allows us to use it as a placeholder for JavaScript-generated errors. As such,
    we must hide this div if no error has occurred.


    First, we style the .error div. This div will have a red background with white
    text so it stands out. Additionally, we will add a rule so that if the error div
    occurs inside the .row class (the container we use to hold each form element),
    we will shrink the font slightly.


    div.error {


    background : #a00;


    padding : 5px;


    margin : 5px 0;


    color : #fff;


    }


