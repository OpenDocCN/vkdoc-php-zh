  trans: "\n\n简单来说，这个 `foreach` 循环会遍历 `$_POST` 数组，去除文本字段中的首尾空白字符，并将字段内容赋值给同名的变量（例如\
    \ `$_POST['email']` 变成 `$email`，以此类推）。如果某个必填字段留空，其 `name` 属性的值会被添加到 `$missing`\
    \ 数组中，同时相关变量被设置为空字符串。只有 `$_POST` 数组中键名存在于 `$required` 和 `$expected` 数组中的元素才会被处理。\n\
    \n去除首尾空白字符可以防止有人通过多次按空格键来规避填写必填字段。同时，我们还会获得一个未填写的必填字段列表，并且表单中的所有值都会被赋值给简化后的变量，这样后续处理起来更方便。\n\
    \n如果你不需要了解代码运行的细节，可以直接跳到第 7 步。但如果你想深入理解这段代码，请继续往下读。\n\n循环内的第一行代码使用了三元运算符（参见第 3\
    \ 章中的“使用三元运算符”）。这是一种根据条件为真或假来赋值的便捷简写方式。同样的代码行可以改写如下：\n\n```\nif (is_array($value)\
    \ {\n  $temp = $value;\n} else {\n  $temp = trim($value);\n}\n```\n\n`is_array()`\
    \ 函数用于检查当前值是否为数组。如果是，则将该值原封不动地赋值给名为 `$temp` 的变量。但如果不是数组，则 `trim()` 函数会先去除该值的首尾空白字符，然后再将其赋值给\
    \ `$temp`。\n\n循环的其余部分使用条件语句来处理 `$_POST` 数组中每个元素的键和值。第一个条件使用 `empty()` 函数检查 `$temp`\
    \ 在上一行去除首尾空白字符后是否仍然包含值。如果 `empty()` 返回 `true`，则 `in_array()` 函数会检查当前数组键是否存在于 `$required`\
    \ 数组中。如果该项也返回 `true`，则意味着必填字段没有设置值。因此，`if` 块中的两行代码会将这个键添加到 `$missing` 数组中，然后根据键名动态创建一个变量，并将其值设置为空字符串。\n\
    \n条件语句的 `elseif` 部分会检查该键是否存在于 `$expected` 数组中。如果存在，则会根据键名动态创建一个变量，并将 `$temp` 的值赋给它。\n\
    \n> **注意**：关于如何使用数组键创建同名新变量的详细解释，请参见第 3 章中的“动态创建新变量”。\n\n保存 `processmail.php`，稍后还会向其中添加更多代码。现在让我们转向\
    \ `contact.php` 的主体部分。如果缺少任何内容，你需要显示一条警告。在页面内容中，`<h2>` 标题和第一段之间添加一个条件语句，如下所示：\n\
    \n```\n<h2>联系我们</h2>\n<?php if ($missing || $errors) { ?>\n  <p class=\"warning\"\
    >请修正指出的问题。</p>\n<?php } ?>\n<p>Ut enim ad minim veniam . . . </p>\n```\n\n这会检查\
    \ `$missing` 和 `$errors` 两个变量，你已经在第 1 步中将它们初始化为空数组。正如第 3 章中“PHP 的‘真值’判断”所解释的，空数组被视为\
    \ `false`，因此条件语句内的段落会在页面首次加载时不显示。但是，如果在提交表单时必填字段没有填写，该字段的名称就会被添加到 `$missing` 数组中。至少包含一个元素的数组会被视为\
    \ `true`。这里的 `||` 表示“或”，因此，如果必填字段留空或检测到错误，就会显示这个警告段落。（`$errors` 数组将在 PHP 解决方案\
    \ 5-3 中发挥作用。）\n\n为确保到目前为止一切正常，请保存 `contact.php` 并在浏览器中正常加载（不要点击刷新按钮）。警告消息不会显示。在未填写任何字段的情况下点击“发送消息”。现在你应该看到关于缺失项目的消息，如下面的截图所示。\n\
    \n![A978-1-4842-0635-5_5_Figd_HTML.jpg](img/A978-1-4842-0635-5_5_Figd_HTML.jpg)\n\
    \n为了在每个缺失的必填字段旁边显示合适的消息，请使用 PHP 条件语句在 `<label>` 标签内插入一个 `<span>`，如下所示：\n\n```\n\
    <label for=\"name\">姓名：\n<?php if ($missing && in_array('name', $missing)) { ?>\n\
    \  <span class=\"warning\">请输入您的姓名</span>\n<?php } ?>\n</label>\n```\n\n第一个条件检查\
    \ `$missing` 数组。如果数组为空，条件语句失败，`<span>` 永远不会显示。但如果 `$missing` 包含任何值，`in_array()`\
    \ 函数会检查 `$missing` 数组中是否包含值 `name`。如果包含，则显示 `<span>`。\n\n为 `email` 和 `comments`\
    \ 字段插入类似的警告，如下所示：\n\n```\n<label for=\"email\">电子邮件：\n<?php if ($missing && in_array('email',\
    \ $missing)) { ?>\n  <span class=\"warning\">请输入您的电子邮件地址</span>\n<?php } ?>\n\
    </label>\n<input name=\"email\" id=\"email\" type=\"text\">\n</p>\n<p>\n<label\
    \ for=\"comments\">评论：\n<?php if ($missing && in_array('comments', $missing))\
    \ { ?>\n  <span class=\"warning\">请输入您的评论</span>\n<?php } ?>\n</label>\n```\n\n\
    PHP 代码完全相同，只是在 `$missing` 数组中查找的值不同。该值与表单元素的 `name` 属性相同。\n\n保存 `contact.php`\
    \ 并再次测试该页面，首先在所有字段中不输入任何内容。表单标签应显示为图 5-3。\n\n![A978-1-4842-0635-5_5_Fig3_HTML.jpg](img/A978-1-4842-0635-5_5_Fig3_HTML.jpg)\n\
    \n**图 5-3.** 通过验证用户输入，您可以显示有关必填字段的警告\n\n尽管你为 `email` 字段的 `<label>` 添加了警告，但它并未显示，因为\
    \ `email` 尚未被添加到 `$required` 数组中。因此，`processmail.php` 中的代码也不会将其添加到 `$missing`\
    \ 数组中。\n\n将 `email` 添加到 `comments.php` 顶部代码块中的 `$required` 数组，如下所示：\n\n```\n$required\
    \ = ['name', 'comments', 'email'];\n```\n\n再次在不填写任何字段的情况下点击“发送消息”。这次，每个标签旁边都会出现一条警告消息。在“姓名”字段中输入您的姓名。在“电子邮件”和“评论”字段中，只需按下几次空格键，然后点击“发送消息”。“姓名”字段旁边的警告消息消失了，但其他两个警告消息仍然存在。`processmail.php`\
    \ 中的代码会去除文本字段中的空白字符，因此它会拒绝通过输入一系列空格来绕过必填字段的尝试。\n\n如果遇到任何问题，请将您的代码与 `ch05` 文件夹中的\
    \ `contact_02.php` 和 `includes/processmail_01.php` 进行比较。\n\n更改必填字段只需要更改 `$required`\
    \ 数组中的名称，并在表单内相应输入元素的 `<label>` 标签中添加适当的提示信息即可。这样做很容易，因为您始终使用表单输入元素的 `name` 属性。\n\
    \n### 表单未完成时保留用户输入\n\n想象一下，您花了十分钟填写一个表单。您点击“提交”按钮，然后收到回复说某个必填字段缺失。如果必须重新填写所有字段，那会让人抓狂。由于每个字段的内容都在\
    \ `$_POST` 数组中，所以在发生错误时重新显示这些内容是很容易的。\n"
- fmt: "### PHP Solution 5-2: Creating Sticky Form Fields\n\nThis PHP solution shows\
    \ how to use a conditional statement to extract the user’s input from the `$_POST`\
    \ array and redisplay it in text input fields and text areas.\n\nContinue working\
    \ with the same files as before. Alternatively, use `contact_02.php` and `includes/processmail_01.php`\
    \ from the `ch05` folder.\n\nWhen the page first loads, you don’t want anything\
    \ to appear in the input fields, but you do want to redisplay the content if a\
    \ required field is missing or there’s an error. That’s the key: if the `$missing`\
    \ or `$errors` arrays contain any values, the content of each field should be\
    \ redisplayed. You set default text for a text input field with the `value` attribute\
    \ of the `<input>` tag, so amend the `<input>` tag for `name` like this:\n\n```\n\
    <input name=\"name\" id=\"name\" type=\"text\"\n<?php if ($missing || $errors)\
    \ {\n    echo 'value=\"' . htmlentities($name) . '\"';\n} ?>>\n```\n\nThe line\
    \ inside the curly braces contains a combination of quotes and periods that might\
    \ confuse you. The first thing to realize is that there’s only one semicolon—right\
    \ at the end—so the `echo` command applies to the whole line. As explained in\
    \ [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html), a period is called the concatenation\
    \ operator, which joins strings and variables. You can break down the rest of\
    \ the line into three sections, as follows:\n\n- `'value=\"' .`\n- `htmlentities($name)`\n\
    - `. '\"'`\n\nThe first section outputs `value=\"` as text and uses the concatenation\
    \ operator to join it to the next section, which passes `$name` to a function\
    \ called `htmlentities()`. I’ll explain what the function does in a moment, but\
    \ the third section uses the concatenation operator again to join the next section,\
    \ which consists solely of a double quote. So, if `$missing` or `$errors` contain\
    \ any values, and `$_POST['name']` contains `Joe`, you’ll end up with this inside\
    \ the `<input>` tag:\n\n```\n<input name=\"name\" id=\"name\" type=\"text\" value=\"\
    Joe\">\n```\n\nThe `$name` variable contains the original user input, which was\
    \ transmitted through the `$_POST` array. The `foreach` loop that you created\
    \ in `processmail.php` in PHP Solution 5-1 processes the `$_POST` array and assigns\
    \ each element to a variable with the same name. This allows you to access `$_POST['name']`\
    \ simply as `$name`.\n\nSo, what’s the `htmlentities()` function for? As the function\
    \ name suggests, it converts certain characters to their equivalent HTML character\
    \ entities. The one you’re concerned with here is the double quote. Let’s say\
    \ Elvis really is still alive and decides to send feedback through the form. If\
    \ you use `$name` on its own, Figure [5-4](#A978-1-4842-0635-5_5_Chapter.html#Fig4)\
    \ shows what happens when a required field is omitted and you don’t use `htmlentities()`.\n\
    \n![A978-1-4842-0635-5_5_Fig4_HTML.jpg](A978-1-4842-0635-5_5_Fig4_HTML.jpg)\n\n\
    **Figure 5-4.** Quotes need special treatment before form fields can be redisplayed\n\
    \nPassing the content of the `$_POST` array element to `htmlentities()`, however,\
    \ converts the double quotes in the middle of the string to `&quot;`. And, as\
    \ Figure [5-5](#A978-1-4842-0635-5_5_Chapter.html#Fig5) shows, the content is\
    \ no longer truncated.\n\n![A978-1-4842-0635-5_5_Fig5_HTML.jpg](A978-1-4842-0635-5_5_Fig5_HTML.jpg)\n\
    \n**Figure 5-5.** Passing the value to `htmlentities()` before it’s displayed\
    \ solves the problem\n\nWhat’s cool about this is that the character entity `&quot;`\
    \ is converted back to double quotes when the form is resubmitted. As a result,\
    \ there’s no need for further conversion before the email can be sent.\n\n**Note:**\
    \ Prior to PHP 5.4, `htmlentities()` used ISO-8859-1 (Western European) as the\
    \ default encoding for conversion. This was changed to UTF-8 in PHP 5.4. It changed\
    \ again in PHP 5.6 to the value of `default_charset` in the server’s PHP configuration.\
    \ This latest change won’t affect most people because UTF-8 is the default value\
    \ for `default_charset`. But it does mean you can set your own default encoding\
    \ if you have particular requirements.\n\nIf `htmlentities()` corrupts your text,\
    \ you can set the encoding directly within a script by passing the second and\
    \ third optional arguments to the function. For example, to set the encoding to\
    \ Simplified Chinese, use `htmlentities($name, ENT_COMPAT, 'GB2312')`. For details,\
    \ see the documentation at [`http://php.net/manual/en/function.htmlentities.php`](http://php.net/manual/en/function.htmlentities.php).\n\
    \nEdit the `email` field the same way, using `$email` instead of `$name`. The\
    \ `comments` text area needs to be handled slightly differently because `<textarea>`\
    \ tags don’t have a `value` attribute. You must place the PHP block between the\
    \ opening and closing tags of the text area, like this (new code is shown in bold):\n\
    \n```\n<textarea name=\"comments\" id=\"comments\"><?php\nif ($missing || $errors)\
    \ {\n    echo htmlentities($comments);\n} ?></textarea>\n```\n\nIt’s important\
    \ to position the opening and closing PHP tags right up against the `<textarea>`\
    \ tags. If you don’t, you’ll get unwanted whitespace inside the text area.\n\n\
    Save `contact.php` and test the page in a browser. If any required fields are\
    \ omitted, the form displays the original content along with any error messages.\n\
    \nYou can check your code with `contact_03.php` in the `ch05` folder.\n\n**Caution:**\
    \ Using this technique prevents a form’s reset button from clearing any fields\
    \ that have been changed by the PHP script. This is a minor inconvenience in comparison\
    \ with the greater usability offered by preserving existing content when an incomplete\
    \ form is submitted.\n\n### Filtering Out Potential Attacks\n\nA particularly\
    \ nasty exploit known as email header injection seeks to turn online forms into\
    \ spam relays. A simple way of preventing this is to look for the strings `Content-Type:`,\
    \ `Cc:`, and `Bcc:`, as these are email headers that the attacker injects into\
    \ your script to trick it into sending HTML email with copies to many people.\
    \ If you detect any of these strings in user input, it’s a pretty safe bet that\
    \ you’re the target of an attack, so you should block the message. An innocent\
    \ message may also be blocked, but the advantages of stopping an attack outweigh\
    \ that small risk."
  raw: '#### PHP Solution 5-2: Creating Sticky form fields


    This PHP solution shows how to use a conditional statement to extract the user’s
    input from the `$_POST` array and redisplay it in text input fields and text areas.


    Continue working with the same files as before. Alternatively, use `contact_02.php`
    and `includes/processmail_01.php` from the `ch05` folder.


    When the page first loads, you don’t want anything to appear in the input fields,
    but you do want to redisplay the content if a required field is missing or there’s
    an error. That’s the key: if the `$missing` or `$errors` arrays contain any values,
    the content of each field should be redisplayed. You set default text for a text
    input field with the `value` attribute of the `<input>` tag, so amend the `<input>`
    tag for `name` like this:


    `<input name="name" id="name" type="text"`


    `<?php if ($missing || $errors) {`


    `echo ''value="'' . htmlentities($name) . ''"'';`


    `} ?>` `>`


    The line inside the curly braces contains a combination of quotes and periods
    that might confuse you. The first thing to realize is that there’s only one semicolon—right
    at the end—so the `echo` commandapplies to the whole line. As explained in [Chapter
    3](#A978-1-4842-0635-5_3_Chapter.html), a period is called the concatenation operator,
    which joins strings and variables. You can break down the rest of the line into
    three sections, as follows:


    *   `''value="'' .`

    *   `htmlentities($name)`

    *   `. ''"''`


    The first section outputs `value="` as text and uses the concatenation operator
    to join it to the next section, which passes `$name` to a function called `htmlentities()`.
    I’ll explain what the function does in a moment, but the third section uses the
    concatenation operator again to join the next section, which consists solely of
    a double quote. So, if `$missing` or `$errors` contain any values, and `$_POST[''name'']`
    contains `Joe`, you’ll end up with this inside the `<input>` tag:


    `<input name="name" id="name" type="text"` `value="Joe"` `>`


    The `$name` variable contains the original user input, which was transmitted through
    the `$_POST` array. The `foreach` loop that you created in `processmail.php` in
    PHP Solution 5-1 processes the `$_POST` array and assigns each element to a variable
    with the same name. This allows you to access `$_POST[''name''`] simply as `$name`.


    So, what’s the `htmlentities()` function for? As the function name suggests, it
    converts certain characters to their equivalent HTML character entities. The one
    you’re concerned with here is the double quote. Let’s say Elvis really is still
    alive and decides to send feedback through the form. If you use `$name` on its
    own, Figure [5-4](#A978-1-4842-0635-5_5_Chapter.html#Fig4) shows what happens
    when a required field is omitted and you don’t use `htmlentities()`.


    ![A978-1-4842-0635-5_5_Fig4_HTML.jpg](A978-1-4842-0635-5_5_Fig4_HTML.jpg)


    Figure 5-4.


    Quotes need special treatment before form fields can be redisplayed


    Passing the content of the `$_POST` array element to the `htmlentities()`, however,
    converts the double quotes in the middle of the string to `&quot;`. And, as Figure
    [5-5](#A978-1-4842-0635-5_5_Chapter.html#Fig5) shows, the content is no longer
    truncated.


    ![A978-1-4842-0635-5_5_Fig5_HTML.jpg](A978-1-4842-0635-5_5_Fig5_HTML.jpg)


    Figure 5-5.


    Passing the value to `htmlentities()` before it’s displayed solves the problem


    What’s cool about this is that the character entity `&quot;` is converted back
    to double quotes when the form is resubmitted. As a result, there’s no need for
    further conversion before the email can be sent.


    Note


    Prior to PHP 5.4, `htmlentities()` used ISO-8859-1 (Western European) as the default
    encoding for conversion. This was changed to UTF-8 in PHP 5.4\. It changed again
    in PHP 5.6 to the value of `default_charset` in the server’s PHP configuration.
    This latest change won’t affect most people because UTF-8 is the default value
    for `default_charset`. But it does mean you can set your own default encoding
    if you have particular requirements.


    If `htmlentities()` corrupts your text, you can set the encoding directly within
    a script by passing the second and third optional arguments to the function. For
    example, to set the encoding to Simplified Chinese, use `htmlentities($name, ENT_COMPAT,
    ''GB2312'')`. For details, see the documentation at [`http://php.net/manual/en/function.htmlentities.php`](http://php.net/manual/en/function.htmlentities.php)
    .


    Edit the `email` field the same way, using `$email` instead of `$name`.   The
    `comments` text area needs to be handled slightly differently because `<textarea>`
    tags don’t have a `value` attribute. You must place the PHP block between the
    opening and closing tags of the text area, like this (new code is shown in bold):


    `<textarea name="comments" id="comments">` `<?php`


    `if ($missing || $errors) {`


    `echo htmlentities($comments);`


    `} ?>` `</textarea>`


    It’s important to position the opening and closing PHP tags right up against the
    `<textarea>` tags. If you don’t, you’ll get unwanted whitespace inside the text
    area.


    Save `contact.php` and test the page in a browser. If any required fields are
    omitted, the form displays the original content along with any error messages.


    You can check your code with `contact_03.php` in the `ch05` folder.


    Caution


    Using this technique prevents a form’s reset button from clearing any fields that
    have been changed by the PHP script. This is a minor inconvenience in comparison
    with the greater usability offered by preserving existing content when an incomplete
    form is submitted.


    ### Filtering Out Potential Attacks


    A particularly nasty exploit known as email header injection seeks to turn online
    forms into spam relays. A simple way of preventing this is to look for the strings
    “Content-Type:”, “Cc:”, and “Bcc:”, as these are email headers that the attacker
    injects into your script to trick it into sending HTML email with copies to many
    people. If you detect any of these strings in user input, it’s a pretty safe bet
    that you’re the target of an attack, so you should block the message. An innocent
    message may also be blocked, but the advantages of stopping an attack outweigh
    that small risk.'
  trans: "\n### PHP 方案 5-2：创建粘性表单字段\n\n本 PHP 方案演示了如何使用条件语句从 `$_POST` 数组中提取用户输入，并将其重新显示在文本输入字段和文本区域中。\n\
    \n请继续使用之前的文件进行操作。或者，使用 `ch05` 文件夹中的 `contact_02.php` 和 `includes/processmail_01.php`。\n\
    \n页面首次加载时，你希望输入字段中不显示任何内容，但如果必填字段缺失或存在错误，则需要重新显示内容。关键在于：如果 `$missing` 或 `$errors`\
    \ 数组包含任何值，则应重新显示每个字段的内容。你通过 `<input>` 标签的 `value` 属性为文本输入字段设置默认文本，因此请按如下方式修改 `name`\
    \ 的 `<input>` 标签：\n\n```\n<input name=\"name\" id=\"name\" type=\"text\"\n<?php\
    \ if ($missing || $errors) {\n    echo 'value=\"' . htmlentities($name) . '\"\
    ';\n} ?>>\n```\n\n花括号内的那一行包含引号和句点的组合，可能会让你感到困惑。首先需要明白的是，这里只有一个分号——就在行尾——因此 `echo`\
    \ 命令适用于整行。如第 3 章所述，句点被称为连接运算符，用于连接字符串和变量。你可以将整行分解为以下三个部分：\n\n-   `'value=\"' .`\n\
    -   `htmlentities($name)`\n-   `. '\"'`\n\n第一部分输出文本 `value=\"`，并使用连接运算符将其连接到下一部分，第二部分将\
    \ `$name` 传递给一个名为 `htmlentities()` 的函数。我将稍后解释该函数的作用，第三部分再次使用连接运算符连接下一部分，该部分仅由一个双引号组成。因此，如果\
    \ `$missing` 或 `$errors` 包含任何值，并且 `$_POST['name']` 包含 `Joe`，那么 `<input>` 标签内将生成如下内容：\n\
    \n```\n<input name=\"name\" id=\"name\" type=\"text\" value=\"Joe\">\n```\n\n\
    `$name` 变量包含原始用户输入，该输入通过 `$_POST` 数组传输。你在 PHP 方案 5-1 的 `processmail.php` 中创建的\
    \ `foreach` 循环会处理 `$_POST` 数组，并将每个元素分配给同名的变量。这允许你直接将 `$_POST['name']` 作为 `$name`\
    \ 访问。\n\n那么，`htmlentities()` 函数有什么作用呢？顾名思义，该函数将某些字符转换为其对应的 HTML 字符实体。这里我们需要关注的是双引号。假设\
    \ Elvis 真的还在世，并决定通过表单发送反馈。如果你仅使用 `$name`（不使用 `htmlentities()`），图 5-4 展示了当省略必填字段时会发生的情况。\n\
    \n![A978-1-4842-0635-5_5_Fig4_HTML.jpg](img/A978-1-4842-0635-5_5_Fig4_HTML.jpg)\n\
    \n**图 5-4.** 在重新显示表单字段之前，引号需要特殊处理\n\n然而，将 `$_POST` 数组元素的内容传递给 `htmlentities()`\
    \ 后，字符串中间的双引号会被转换为 `&quot;`。如图 5-5 所示，内容不再被截断。\n\n![A978-1-4842-0635-5_5_Fig5_HTML.jpg](img/A978-1-4842-0635-5_5_Fig5_HTML.jpg)\n\
    \n**图 5-5.** 在显示之前将值传递给 `htmlentities()` 解决了问题\n\n很酷的一点是，当表单重新提交时，字符实体 `&quot;`\
    \ 会被转换回双引号。因此，在发送电子邮件之前无需进一步转换。\n\n**注意：** 在 PHP 5.4 之前，`htmlentities()` 默认使用\
    \ ISO-8859-1（西欧）编码进行转换。这在 PHP 5.4 中更改为 UTF-8。在 PHP 5.6 中，它又更改为服务器 PHP 配置中 `default_charset`\
    \ 的值。这一最新更改不会影响大多数人，因为 UTF-8 是 `default_charset` 的默认值。但如果你有特殊需求，这意味着你可以设置自己的默认编码。\n\
    \n如果 `htmlentities()` 导致文本乱码，你可以通过向该函数传递第二个和第三个可选参数来直接在脚本中设置编码。例如，要将编码设置为简体中文，请使用\
    \ `htmlentities($name, ENT_COMPAT, 'GB2312')`。详情请参阅文档：[`http://php.net/manual/en/function.htmlentities.php`](http://php.net/manual/en/function.htmlentities.php)。\n\
    \n以同样方式编辑 `email` 字段，使用 `$email` 代替 `$name`。`comments` 文本区域需要稍作不同处理，因为 `<textarea>`\
    \ 标签没有 `value` 属性。你必须将 PHP 代码块放在文本区域的开始和结束标签之间，如下所示（新代码以粗体显示）：\n\n```\n<textarea\
    \ name=\"comments\" id=\"comments\"><?php\nif ($missing || $errors) {\n    echo\
    \ htmlentities($comments);\n} ?></textarea>\n```\n\n务必将 PHP 开始和结束标签紧贴着 `<textarea>`\
    \ 标签放置。如果不这样做，文本区域内会出现不需要的空白字符。\n\n保存 `contact.php` 并在浏览器中测试页面。如果任何必填字段被省略，表单将显示原始内容以及任何错误消息。\n\
    \n你可以使用 `ch05` 文件夹中的 `contact_03.php` 检查你的代码。\n\n**警告：** 使用此技术会阻止表单的重置按钮清除已被 PHP\
    \ 脚本更改的任何字段。与在提交不完整表单时保留现有内容所带来的更高可用性相比，这是一个小不便。\n\n### 过滤潜在攻击\n\n一种被称为电子邮件标头注入的特别恶劣的攻击技术，试图将在线表单变成垃圾邮件中继。防止这种情况的一个简单方法是查找字符串\
    \ `Content-Type:`、`Cc:` 和 `Bcc:`，因为这些是攻击者注入到你的脚本中以诱骗其发送包含多个收件人的 HTML 电子邮件的电子邮件标头。如果你在用户输入中检测到任何这些字符串，几乎可以肯定你成为了攻击目标，因此你应该阻止该消息。无辜的消息也可能被阻止，但阻止攻击的优势超过了这个微小的风险。\n"
- fmt: "#### PHP Solution 5-3: Blocking Emails that Contain Specific Phrases\n\nThis\
    \ PHP solution checks the user input for suspect phrases. If one is detected,\
    \ a Boolean variable is set to `true`. This will be used later to prevent the\
    \ email from being sent.\n\nContinue working with the same page as before. Alternatively,\
    \ use `contact_03.php` and `includes/processmail_01.php` from the `ch05` folder.\n\
    \nPHP conditional statements rely on a true/false test to determine whether to\
    \ execute a section of code. The way to filter out suspect phrases is to create\
    \ a Boolean variable that is switched to `true` as soon as one of those phrases\
    \ is detected. The detection is done using a search pattern or regular expression.\
    \ Add the following code at the top of `processmail.php` before the existing `foreach`\
    \ loop:\n\n```\n// assume nothing is suspect\n$suspect = false;\n// create a pattern\
    \ to locate suspect phrases\n$pattern = '/Content-Type:|Bcc:|Cc:/i';\nforeach\
    \ ($_POST as $key => $value) {\n```\n\nThe string assigned to `$pattern` will\
    \ be used to perform a case-insensitive search for any of the following: “Content-Type:”,\
    \ “Bcc:”, or “Cc:”. It’s written in a format called Perl-compatible regular expression\
    \ (PCRE). The search pattern is enclosed in a pair of forward slashes, and the\
    \ `i` after the final slash makes the pattern case-insensitive.\n\n**Tip**  \n\
    For a basic introduction to regular expressions (regex), see my tutorial at [`www.adobe.com/devnet/dreamweaver/articles/regular_expressions_pt1.html`](http://www.adobe.com/devnet/dreamweaver/articles/regular_expressions_pt1.html).\
    \ For a more in-depth treatment, *Regular Expressions Cookbook, 2nd Edition* by\
    \ Jan Goyvaerts and Steven Levithan (O’Reilly, 2012, ISBN: 978-1-4493-1943-4)\
    \ is excellent.\n\nYou can now use the PCRE stored in `$pattern` to filter out\
    \ any suspect user input from the `$_POST` array. At the moment, each element\
    \ of the `$_POST` array contains only a string. However, multiple-choice form\
    \ elements, such as check-box groups, return an array of results. So you need\
    \ to tunnel down any subarrays and check the content of each element separately.\
    \ That’s what the following custom-built function `isSuspect()` does. Insert it\
    \ immediately after the `$pattern` variable from step 1:\n\n```\n$pattern = '/Content-Type:|Bcc:|Cc:/i';\n\
    // function to check for suspect phrases\nfunction isSuspect($val, $pattern, &$suspect)\
    \ {\n    // if the variable is an array, loop through each element\n    // and\
    \ pass it recursively back to the same function\n    if (is_array($val)) {\n \
    \       foreach ($val as $item) {\n            isSuspect($item, $pattern, $suspect);\n\
    \        }\n    } else {\n        // if one of the suspect phrases is found, set\
    \ Boolean to true\n        if (preg_match($pattern, $val)) {\n            $suspect\
    \ = true;\n        }\n    }\n}\nforeach ($_POST as $key => $value) {\n```\n\n\
    The `isSuspect()` function is a piece of code that you may want to just copy and\
    \ paste without delving too deeply into how it works. The important thing to notice\
    \ is that the third argument has an ampersand (`&`) in front of it (`&$suspect`).\
    \ This means that any changes made to the variable passed as the third argument\
    \ to `isSuspect()` will affect the value of that variable elsewhere in the script.\
    \ This technique is known as passing by reference (see “Passing by reference—changing\
    \ the value of an argument” in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)).\n\
    \nThe other feature of this function is that it’s what’s known as a recursive\
    \ function. It keeps on calling itself until it finds a value that it can compare\
    \ against the regex using the `preg_match()` function, which returns `true` if\
    \ it finds a match.\n\nTo call the function, pass it as arguments the `$_POST`\
    \ array, the pattern, and the `$suspect` Boolean variable. Insert the following\
    \ code immediately after the function definition:\n\n```\n// check the $_POST\
    \ array and any subarrays for suspect content\nisSuspect($_POST, $pattern, $suspect);\n\
    ```\n\n**Note**  \nYou don’t put an ampersand in front of `$suspect` this time.\
    \ The ampersand is required only when you define the function in step 2, not when\
    \ you call it.\n\nIf suspect phrases are detected, the value of `$suspect` changes\
    \ to `true`. There’s also no point in processing the `$_POST` array any further.\
    \ Wrap the code that processes the `$_POST` variables in a conditional statement\
    \ like this:\n\n```\nif (!$suspect) {\n    foreach ($_POST as $key => $value)\
    \ {\n        // assign to temporary variable and strip whitespace if not an array\n\
    \        $temp = is_array($value) ? $value : trim($value);\n        // if empty\
    \ and required, add to $missing array\n        if (empty($temp) && in_array($key,\
    \ $required)) {\n            $missing[] = $key;\n            ${$key} = '';\n \
    \       } elseif (in_array($key, $expected)) {\n            // otherwise, assign\
    \ to a variable of the same name as $key\n            ${$key} = $temp;\n     \
    \   }\n    }\n}\n```\n\nThis processes the variables in the `$_POST` array only\
    \ if `$suspect` is not `true`.\n\nDon’t forget the extra curly brace to close\
    \ the conditional statement.\n\nEdit the PHP block after the `<h2>` heading in\
    \ `contact.php` to add a new warning message above the form, like this:\n\n```\n\
    <h2>Contact Us</h2>\n<?php if ($_POST && $suspect) { ?>\n<p class=\"warning\"\
    >Sorry, your mail could not be sent.\nPlease try later.</p>\n<?php } else if ($missing\
    \ || $errors) { ?>\n<p class=\"warning\">Please fix the item(s) indicated.</p>\n\
    <?php } ?>\n```\n\nThis sets a new condition that takes priority over the original\
    \ warning message by being considered first. It checks if the `$_POST` array contains\
    \ any elements—in other words, the form has been submitted—and if `$suspect` is\
    \ `true`. The warning is deliberately neutral in tone. There’s no point in provoking\
    \ attackers. More important, it avoids offending anyone who may have innocently\
    \ used a suspect phrase.\n\nSave `contact.php` and test the form by typing one\
    \ of the suspect phrases in one of the fields. You should see the second warning\
    \ message, but your input won’t be preserved.\n\nYou can check your code against\
    \ `contact_04.php` and `includes/processmail_02.php` in the `ch05` folder.\n\n\
    ## Sending Email\n\nBefore proceeding any further, it’s necessary to explain how\
    \ the PHP `mail()` function works, because it will help you understand the rest\
    \ of the processing script.\n\nThe PHP `mail()` function takes up to five arguments,\
    \ all of them strings, as follows:\n\n- The address(es) of the recipient(s)\n\
    - The subject line\n- The message body\n- A list of other email headers (optional)\n\
    - Additional parameters (optional)\n\nEmail addresses in the first argument can\
    \ be in either of the following formats:\n\n```\n'user@example.com'\n'Some Guy\
    \ <user2@example.com>'\n```\n\nTo send to more than one address, use a comma-separated\
    \ string like this:\n\n```\n'user@example.com, another@example.com, Some Guy <user2@example.com>'\n\
    ```\n\nThe message body must be presented as a single string. This means that\
    \ you need to extract the input data from the `$_POST` array and format the message,\
    \ adding labels to identify each field. By default, the `mail()` function supports\
    \ only plain text. New lines must use both a carriage return and newline character.\
    \ It’s also recommended to restrict the length of lines to no more than 78 characters.\
    \ Although it sounds complicated, you can build the message body automatically\
    \ with about 20 lines of PHP code, as you’ll see in PHP Solution 5-5.\n\nAdding\
    \ other email headers is covered in detail in the next section.\n\nMany hosting\
    \ companies now make the fifth argument a requirement. It ensures that the email\
    \ is sent by a trusted user, and it normally consists of your own email address\
    \ prefixed by `-f` (without a space in between), all enclosed in quotes. Check\
    \ your hosting company’s instructions to see whether this is required and the\
    \ exact format it should take."
  raw: '#### PHP Solution 5-3: Blocking Emails that Contain Specific Phrases


    This PHP solution checks the user input for suspect phrases. If one is detected,
    a Boolean variable is set to `true`. This will be used later to prevent the email
    from being sent.


    Continue working with the same page as before. Alternatively, use `contact_03.php`
    and `includes/processmail_01.php` from the `ch05` folder.


    PHP conditional statements rely on a true/false test to determine whether to execute
    a section of code. The way to filter out suspect phrases is to create a Boolean
    variable that is switched to `true` as soon as one of those phrases is detected.
    The detection is done using a search pattern or regular expression. Add the following
    code at the top of `processmail.php` before the existing `foreach` loop:


    `// assume nothing is suspect`


    `$suspect = false;`


    `// create a pattern to locate suspect phrases`


    `$pattern = ''/Content-Type:|Bcc:|Cc:/i'';`


    `foreach ($_POST as $key => $value) {`


    The string assigned to `$pattern` will be used to perform a case-insensitive search
    for any of the following: “Content-Type:”, “Bcc:”, or “Cc:”. It’s written in a
    format called Perl-compatible regular expression (PCRE). The search pattern is
    enclosed in a pair of forward slashes, and the `i` after the final slash makes
    the pattern case-insensitive.


    Tip


    For a basic introduction to regular expressions (regex), see my tutorial at [`www.adobe.com/devnet/dreamweaver/articles/regular_expressions_pt1.html`](http://www.adobe.com/devnet/dreamweaver/articles/regular_expressions_pt1.html)
    . For a more in-depth treatment, Regular Expressions Cookbook, 2nd Edition by
    Jan Goyvaerts and Steven Levithan (O’Reilly, 2012, ISBN: 978-1-4493-1943-4) is
    excellent.


    You can now use the PCRE stored in `$pattern` to filter out any suspect user input
    from the `$_POST` array. At the moment, each element of the `$_POST` array contains
    only a string. However, multiple-choice form elements, such as check-box groups,
    return an array of results. So you need to tunnel down any subarrays and check
    the content of each element separately. That’s what the following custom-built
    function `isSuspect()` does. Insert it immediately after the `$pattern` variable
    from step 1:


    `$pattern = ''/Content-Type:|Bcc:|Cc:/i'';`


    `// function to check for suspect phrases`


    `function isSuspect($val, $pattern,` `&` `$suspect) {`


    `// if the variable is an array, loop through each element`


    `// and pass it recursively back to the same function`


    `if (is_array($val)) {`


    `foreach ($val as $item) {`


    `isSuspect($item, $pattern, $suspect);`


    `}`


    `} else {`


    `// if one of the suspect phrases is found, set Boolean to true`


    `if (preg_match($pattern, $val)) {`


    `$suspect = true;`


    `}`


    `}`


    `}`


    `foreach ($_POST as $key => $value) {`


    The `isSuspect()` function is a piece of code that you may want to just copy and
    paste without delving too deeply into how it works. The important thing to notice
    is that the third argument has an ampersand (`&`) in front of it (`&$suspect`).
    This means that any changes made to the variable passed as the third argument
    to `isSuspect()` will affect the value of that variable elsewhere in the script.
    This technique is known as passing by reference (see “Passing by reference—changing
    the value of an argument” in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)).


    The other feature of this function is that it’s what’s known as a recursive function.
    It keeps on calling itself until it finds a value that it can compare against
    the regex using the `preg_match()` function, which returns `true` if it finds
    a match.


    To call the function, pass it as arguments the `$_POST` array, the pattern, and
    the `$suspect` Boolean variable. Insert the following code immediately after the
    function definition:


    `// check the $_POST array and any subarrays for suspect content`


    `isSuspect($_POST, $pattern, $suspect);`


    Note


    You don’t put an ampersand in front of `$suspect` this time. The ampersand is
    required only when you define the function in step 2, not when you call it.


    If suspect phrases are detected, the value of `$suspect` changes to `true`. There’s
    also no point in processing the `$_POST` array any further. Wrap the code that
    processes the `$_POST` variables in a conditional statement like this:


    `if (!$suspect) {`


    `foreach ($_POST as $key => $value) {`


    `// assign to temporary variable and strip whitespace if not an array`


    `$temp = is_array($value) ? $value : trim($value);`


    `// if empty and required, add to $missing array`


    `if (empty($temp) && in_array($key, $required)) {`


    `$missing[] = $key;`


    `${$key} = '''';`


    `} elseif (in_array($key, $expected)) {`


    `// otherwise, assign to a variable of the same name as $key`


    `${$key} = $temp;`


    `}`


    `}`


    `}`


    This processes the variables in the `$_POST` array only if `$suspect` is not `true`.


    Don’t forget the extra curly brace to close the conditional statement.


    Edit the PHP block after the `<h2>` heading in `contact.php` to add a new warning
    message above the form, like this:


    `<h2>Contact Us</h2>`


    `<?php if ($_POST` `&&` `$suspect) { ?>`


    `<p class="warning">Sorry, your mail could not be sent.`


    `Please try later.</p>`


    `<?php } else` `if ($missing || $errors) { ?>`


    `<p class="warning">Please fix the item(s) indicated.</p>`


    `<?php } ?>`


    This sets a new condition that takes priority over the original warning message
    by being considered first. It checks if the `$_POST` array contains any elements—in
    other words, the form has been submitted—and if `$suspect` is `true`. The warning
    is deliberately neutral in tone. There’s no point in provoking attackers. More
    important, it avoids offending anyone who may have innocently used a suspect phrase.


    Save `contact.php` and test the form by typing one of the suspect phrases in one
    of the fields. You should see the second warning message, but your input won’t
    be preserved.


    You can check your code against `contact_04.php` and `includes/processmail_02.php`
    in the `ch05` folder.


    ## Sending Email


    Before proceeding any further, it’s necessary to explain how the PHP `mail()`
    function works, because it will help you understand the rest of the processing
    script.


    The PHP `mail()` function takes up to five arguments, all of them strings, as
    follows:


    *   The address(es) of the recipient(s)

    *   The subject line

    *   The message body

    *   A list of other email headers (optional)

    *   Additional parameters (optional)


    Email addresses in the first argument can be in either of the following formats:


    `''user@example.com''`


    `''Some Guy <user2@example.com>''`


    To send to more than one address, use a comma-separated string like this:


    `''user@example.com, another@example.com, Some Guy <user2@example.com>''`


    The message body must be presented as a single string. This means that you need
    to extract the input data from the `$_POST` array and format the message, adding
    labels to identify each field. By default, the `mail()` function supports only
    plain text. New lines must use both a carriage return and newline character. It’s
    also recommended to restrict the length of lines to no more than 78 characters.
    Although it sounds complicated, you can build the message body automatically with
    about 20 lines of PHP code, as you’ll see in PHP Solution 5-5.


    Adding other email headers is covered in detail in the next section.


    Many hosting companies now make the fifth argument a requirement. It ensures that
    the email is sent by a trusted user, and it normally consists of your own email
    address prefixed by `-f` (without a space in between), all enclosed in quotes.
    Check your hosting company’s instructions to see whether this is required and
    the exact format it should take.'
  trans: "\n#### PHP 方案 5-3：拦截包含特定短语的邮件\n\n此 PHP 方案检查用户输入中是否存在可疑短语。如果检测到，则将一个布尔变量设置为\
    \ `true`。稍后将利用此变量阻止邮件发送。\n\n继续处理与之前相同的页面。或者，使用 `ch05` 文件夹中的 `contact_03.php` 和\
    \ `includes/processmail_01.php`。\n\nPHP 条件语句依赖于真/假测试来决定是否执行某段代码。过滤可疑短语的方法是创建一个布尔变量，一旦检测到这些短语中的任何一个，该变量就会切换为\
    \ `true`。检测是通过搜索模式或正则表达式完成的。将以下代码添加到 `processmail.php` 顶部现有的 `foreach` 循环之前：\n\
    \n```\n// 假设没有可疑内容\n$suspect = false;\n// 创建用于定位可疑短语的模式\n$pattern = '/Content-Type:|Bcc:|Cc:/i';\n\
    foreach ($_POST as $key => $value) {\n```\n\n赋值给 `$pattern` 的字符串将用于执行不区分大小写的搜索，查找以下任一内容：“Content-Type:”、“Bcc:”或“Cc:”。它采用一种称为\
    \ Perl 兼容正则表达式（PCRE）的格式编写。搜索模式被括在一对正斜杠中，最后一个斜杠后面的 `i` 使模式不区分大小写。\n\n**提示**  \n\
    有关正则表达式（regex）的基础介绍，请参阅我在 [`www.adobe.com/devnet/dreamweaver/articles/regular_expressions_pt1.html`](http://www.adobe.com/devnet/dreamweaver/articles/regular_expressions_pt1.html)\
    \ 上的教程。如需更深入的讲解，*《正则表达式食谱（第 2 版）》*由 Jan Goyvaerts 和 Steven Levithan 合著（O’Reilly，2012\
    \ 年，ISBN：978-1-4493-1943-4）非常出色。\n\n现在，您可以使用存储在 `$pattern` 中的 PCRE 来过滤 `$_POST`\
    \ 数组中的任何可疑用户输入。目前，`$_POST` 数组的每个元素仅包含一个字符串。但是，多选表单元素（例如复选框组）会返回一个结果数组。因此，您需要深入任何子数组并分别检查每个元素的内容。这正是以下自定义函数\
    \ `isSuspect()` 的作用。将其紧接在第 1 步的 `$pattern` 变量之后插入：\n\n```\n$pattern = '/Content-Type:|Bcc:|Cc:/i';\n\
    // 用于检查可疑短语的函数\nfunction isSuspect($val, $pattern, &$suspect) {\n    // 如果变量是数组，则遍历每个元素\n\
    \    // 并将其递归传递回同一个函数\n    if (is_array($val)) {\n        foreach ($val as $item)\
    \ {\n            isSuspect($item, $pattern, $suspect);\n        }\n    } else\
    \ {\n        // 如果找到其中一个可疑短语，则将布尔值设置为 true\n        if (preg_match($pattern, $val))\
    \ {\n            $suspect = true;\n        }\n    }\n}\nforeach ($_POST as $key\
    \ => $value) {\n```\n\n`isSuspect()` 函数是一段代码，您可能只想复制粘贴，而无需深入了解其工作原理。需要注意的重要一点是，第三个参数前面有一个\
    \ &（`&$suspect`）。这意味着，传递给 `isSuspect()` 作为第三个参数的变量所做的任何更改，都会影响该变量在脚本其他位置的值。这种技术称为按引用传递（参见第\
    \ 3 章中的“按引用传递——更改参数的值”）。\n\n该函数的另一个特点是它被称为递归函数。它会不断调用自身，直到找到一个可以使用 `preg_match()`\
    \ 函数与正则表达式进行比较的值，如果找到匹配项，`preg_match()` 将返回 `true`。\n\n要调用该函数，请将 `$_POST` 数组、模式和\
    \ `$suspect` 布尔变量作为参数传递给它。紧跟在函数定义之后插入以下代码：\n\n```\n// 检查 $_POST 数组及其任何子数组中是否有可疑内容\n\
    isSuspect($_POST, $pattern, $suspect);\n```\n\n**注意**  \n这次您不需要在 `$suspect` 前面加上\
    \ &。仅当在第 2 步定义函数时才需要 &，调用时不需要。\n\n如果检测到可疑短语，`$suspect` 的值将变为 `true`。此时也没有必要进一步处理\
    \ `$_POST` 数组。将处理 `$_POST` 变量的代码包装在如下条件语句中：\n\n```\nif (!$suspect) {\n    foreach\
    \ ($_POST as $key => $value) {\n        // 赋值给临时变量，如果不是数组则去除空白\n        $temp\
    \ = is_array($value) ? $value : trim($value);\n        // 如果为空且是必填项，则添加到 $missing\
    \ 数组\n        if (empty($temp) && in_array($key, $required)) {\n            $missing[]\
    \ = $key;\n            ${$key} = '';\n        } elseif (in_array($key, $expected))\
    \ {\n            // 否则，赋给一个与 $key 同名的变量\n            ${$key} = $temp;\n      \
    \  }\n    }\n}\n```\n\n仅当 `$suspect` 不为 `true` 时，此代码才会处理 `$_POST` 数组中的变量。\n\n\
    不要忘记添加额外的花括号来关闭条件语句。\n\n编辑 `contact.php` 中 `<h2>` 标题之后的 PHP 块，在表单上方添加一条新的警告消息，如下所示：\n\
    \n```\n<h2>联系我们</h2>\n<?php if ($_POST && $suspect) { ?>\n<p class=\"warning\"\
    >抱歉，您的邮件无法发送。请稍后重试。</p>\n<?php } else if ($missing || $errors) { ?>\n<p class=\"\
    warning\">请修正指出的项目。</p>\n<?php } ?>\n```\n\n这设置了一个新条件，通过被优先考虑来覆盖原始警告消息。它检查 `$_POST`\
    \ 数组是否包含任何元素——换句话说，表单是否已提交——以及 `$suspect` 是否为 `true`。该警告故意保持语气中立。没有必要激怒攻击者。更重要的是，它避免冒犯任何可能无意中使用了可疑短语的人。\n\
    \n保存 `contact.php` 并在其中一个字段中输入其中一个可疑短语来测试表单。您应该会看到第二条警告消息，但您的输入将不会被保留。\n\n您可以将您的代码与\
    \ `ch05` 文件夹中的 `contact_04.php` 和 `includes/processmail_02.php` 进行比对。\n\n## 发送邮件\n\
    \n在进一步操作之前，有必要解释一下 PHP 的 `mail()` 函数是如何工作的，因为它将帮助您理解处理脚本的其余部分。\n\nPHP 的 `mail()`\
    \ 函数最多接受五个参数，所有参数均为字符串，如下所示：\n\n- 收件人的地址\n- 主题行\n- 邮件正文\n- 其他邮件标头列表（可选）\n- 附加参数（可选）\n\
    \n第一个参数中的电子邮件地址可以是以下两种格式之一：\n\n```\n'user@example.com'\n'Some Guy <user2@example.com>'\n\
    ```\n\n要发送到多个地址，请使用逗号分隔的字符串，如下所示：\n\n```\n'user@example.com, another@example.com,\
    \ Some Guy <user2@example.com>'\n```\n\n邮件正文必须作为单个字符串呈现。这意味着您需要从 `$_POST` 数组中提取输入数据并格式化消息，添加标签以标识每个字段。默认情况下，`mail()`\
    \ 函数仅支持纯文本。新行必须同时使用回车符和换行符。还建议将行的长度限制为不超过 78 个字符。虽然听起来很复杂，但您可以使用大约 20 行 PHP 代码自动构建邮件正文，您将在\
    \ PHP 方案 5-5 中看到这一点。\n\n添加其他邮件标头将在下一节详细介绍。\n\n许多托管公司现在要求提供第五个参数。它确保邮件由受信任的用户发送，通常由您自己的电子邮件地址前面加上\
    \ `-f`（中间没有空格）组成，并全部括在引号中。请查看您托管公司的说明，以了解是否需要此参数及其应采用的准确格式。\n"
- fmt: "### Using Additional Email Headers Safely\n\nYou can find a full list of email\
    \ headers at [`www.faqs.org/rfcs/rfc2076`](http://www.faqs.org/rfcs/rfc2076),\
    \ but some of the most well-known and useful ones enable you to send copies of\
    \ an email to other addresses (Cc and Bcc) or to change the encoding. Each new\
    \ header, except the final one, must be on a separate line terminated by a carriage\
    \ return and new line character. This means using the `\\r` and `\\n` escape sequences\
    \ in double-quoted strings (see Table 3-4 in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)).\n\
    \nBy default, `mail()` uses Latin1 (ISO-8859-1) encoding, which doesn’t support\
    \ accented characters. Webpage editors these days frequently use Unicode (UTF-8),\
    \ which supports most written languages, including the accents commonly used in\
    \ European languages, as well as nonalphabetic scripts, such as Chinese and Japanese.\
    \ To ensure that email messages aren’t garbled, use the `Content-Type` header\
    \ to set the encoding to UTF-8, like this:\n\n```\n$headers = \"Content-Type:\
    \ text/plain; charset=utf-8\\r\\n\";\n```\n\nYou also need to add UTF-8 as the\
    \ `charset` attribute in a `<meta>` tag in the `<head>` of your webpages like\
    \ this in HTML5:\n\n```\n<meta charset=\"utf-8\">\n```\n\nIf you’re still using\
    \ HTML 4.01, the `<meta>` tag is more verbose:\n\n```\n<meta http-equiv=\"Content-Type\"\
    \ content=\"text/html; charset=utf-8\">\n```\n\nLet’s say you also want to send\
    \ copies of messages to other departments, plus a copy to another address that\
    \ you don’t want the others to see. Email sent by `mail()` is often identified\
    \ as coming from `nobody@yourdomain` (or whatever username is assigned to the\
    \ web server), so it’s a good idea to add a more user-friendly \"From\" address.\
    \ This is how you build those additional headers, using the combined concatenation\
    \ operator (`.=`) to add each one to the existing variable:\n\n```\n$headers .=\
    \ \"From: Japan Journey<feedback@example.com>\\r\\n\";\n$headers .= \"Cc: sales@example.com,\
    \ finance@example.com\\r\\n\";\n$headers .= 'Bcc: secretplanning@example.com';\n\
    ```\n\nAfter building the set of headers you want to use, you pass the variable\
    \ containing them as the fourth argument to `mail()`, like this (assuming that\
    \ the destination address, subject, and message body have already been stored\
    \ in variables):\n\n```\n$mailSent = mail($to, $subject, $message, $headers);\n\
    ```\n\nHard-coded additional headers like this present no security risk, but anything\
    \ that comes from user input must be filtered before it’s used. The biggest danger\
    \ comes from a text field that asks for the user’s email address. A widely used\
    \ technique is to incorporate the user’s email address into a `From` or `Reply-To`\
    \ header, which enables you to reply directly to incoming messages by clicking\
    \ the Reply button in your email program. It’s very convenient, but attackers\
    \ frequently try to pack an email input field with a large number of spurious\
    \ headers.\n\nAlthough email fields are the prime target for attackers, the destination\
    \ address and subject line are both vulnerable if you let users change the value.\
    \ User input should always be regarded as suspect. PHP Solution 5-3 performs only\
    \ a basic test for suspect phrases. Before using external input directly in a\
    \ header you need to apply a more rigorous test, as seen in PHP Solution 5-4.\n\
    \n#### PHP Solution 5-4: Adding Headers and Automating the Reply Address\n\nThis\
    \ PHP solution adds three headers to the email: `From`, `Content-Type` (to set\
    \ the encoding to UTF-8), and `Reply-To`. Before adding the user’s email address\
    \ to the final header, it uses a built-in PHP filter to verify that the submitted\
    \ value conforms to the format of a valid email address.\n\nContinue working with\
    \ the same page as before. Alternatively, use `contact_04.php` and `includes/processmail_02.php`\
    \ from the `ch05` folder.\n\nHeaders are often specific to a particular website\
    \ or page, so the `From` and `Content-Type` headers will be added to the script\
    \ in `contact.php`. Add the following code to the PHP block at the top of the\
    \ page just before `processmail.php` is included:\n\n```\n$required = ['name',\
    \ 'comments', 'email'];\n\n// create additional headers\n$headers = \"From: Japan\
    \ Journey<feedback@example.com>\\r\\n\";\n$headers .= 'Content-Type: text/plain;\
    \ charset=utf-8';\n\nrequire './includes/processmail.php';\n```\n\nThe `\\r\\\
    n` at the end of the `From` header is an escape sequence that inserts a carriage\
    \ return and newline character, so the string must be in double quotes. At the\
    \ moment, `Content-Type` is the final header, so it isn’t followed by a carriage\
    \ return or newline character, and the string is in single quotes.\n\nThe purpose\
    \ of validating the email address is to make sure it’s in a valid format, but\
    \ the field might be empty because you decide not to make it required or because\
    \ the user simply ignored it. If the field is required but empty, it will be added\
    \ to the `$missing` array, and the warning you added in PHP Solution 5-1 will\
    \ be displayed. If the field isn’t empty, but the input is invalid, you need to\
    \ display a different message.\n\nSwitch to `processmail.php` and add this code\
    \ at the bottom of the script:\n\n```\n// validate the user's email\nif (!$suspect\
    \ && !empty($email)) {\n    $validemail = filter_input(INPUT_POST, 'email', FILTER_VALIDATE_EMAIL);\n\
    \    if ($validemail) {\n        $headers .= \"\\r\\nReply-To: $validemail\";\n\
    \    } else {\n        $errors['email'] = true;\n    }\n}\n```\n\nThis begins\
    \ by checking that no suspect phrases have been found and that the `email` field\
    \ isn’t empty. Both conditions are preceded by the logical Not operator (`!`),\
    \ so they return `true` if `$suspect` and `empty($email)` are both `false`. The\
    \ `foreach` loop you added in PHP Solution 5-1 assigns all expected elements in\
    \ the `$_POST` array to simpler variables, so `$email` contains the same value\
    \ as `$_POST['email']`.\n\nThe next line uses `filter_input()` to validate the\
    \ email address. The first argument is a PHP constant, `INPUT_POST`, which specifies\
    \ that the value must be in the `$_POST` array. The second argument is the name\
    \ of the element you want to test. The final argument is another PHP constant\
    \ that specifies you want to check that the element conforms to the valid format\
    \ for an email.\n\nThe `filter_input()` function returns the value being tested\
    \ if it’s valid. Otherwise, it returns `false`. So, if the value submitted by\
    \ the user looks like a valid email address, `$validemail` contains the address.\
    \ If the format is invalid, `$validemail` is `false`. The `FILTER_VALIDATE_EMAIL`\
    \ constant accepts only a single email address, so any attempt to insert multiple\
    \ email addresses will be rejected.\n\n**Note:** `FILTER_VALIDATE_EMAIL` checks\
    \ the format, not whether the address is genuine.\n\nIf `$validemail` isn’t `false`,\
    \ it’s safe to incorporate into a `Reply-To` email header. Since the last value\
    \ added to `$headers` in step 1 doesn’t end with a carriage return and newline\
    \ character, they’re added before `Reply-To`. When building the `$headers` string,\
    \ it doesn’t matter whether you put the `\\r\\n` at the end of a header or at\
    \ the beginning of the next one, as long as a carriage return and newline character\
    \ separate them.\n\nIf `$validemail` is `false`, `$errors['email']` is added to\
    \ the `$errors` array.\n\nYou now need to amend the `<label>` for the `email`\
    \ field in `contact.php`, like this:\n\n```\n<label for=\"email\">Email:\n```"
  raw: '### Using Additional Email Headers Safely


    You can find a full list of email headers at [`www.faqs.org/rfcs/rfc2076`](http://www.faqs.org/rfcs/rfc2076)
    , but some of the most well-known and useful ones enable you to send copies of
    an email to other addresses (Cc and Bcc) or to change the encoding. Each new header,
    except the final one, must be on a separate line terminated by a carriage return
    and new line character. This means using the `\r` and `\n` escape sequences in
    double-quoted strings (see Table 3-4 in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)).


    By default, `mail()` uses Latin1 (ISO-8859-1) encoding, which doesn’t support
    accented characters. Webpage editors these days frequently use Unicode (UTF-8),
    which supports most written languages, including the accents commonly used in
    European languages, as well as nonalphabetic scripts, such as Chinese and Japanese.
    To ensure that email messages aren’t garbled, use the `Content-Type` header to
    set the encoding to UTF-8, like this:


    `$headers = "Content-Type: text/plain; charset=utf-8\r\n";`


    You also need to add UTF-8 as the `charset` attribute in a `<meta>` tag in the
    `<head>` of your webpages like this in HTML5:


    `<meta charset="utf-8">`


    If you’re still using HTML 4.01, the `<meta>` tag is more verbose:


    `<meta http-equiv="Content-Type" content="text/html; charset=utf-8">`


    Let’s say you also want to send copies of messages to other departments, plus
    a copy to another address that you don’t want the others to see. Email sent by
    `mail()` is often identified as coming from `nobody@yourdomain` (or whatever username
    is assigned to the web server), so it’s a good idea to add a more user-friendly
    “From” address. This is how you build those additional headers, using the combined
    concatenation operator (`.=`) to add each one to the existing variable:


    `$headers .= "From: Japan Journey<feedback@example.com>\r\n";`


    `$headers .= "Cc: sales@example.com, finance@example.com\r\n";`


    `$headers .= ''Bcc: secretplanning@example.com'';`


    After building the set of headers you want to use, you pass the variable containing
    them as the fourth argument to `mail()`, like this (assuming that the destination
    address, subject, and message body have already been stored in variables):


    `$mailSent = mail($to, $subject, $message` `, $headers` `);`


    Hard-coded additional headers like this present no security risk, but anything
    that comes from user input must be filtered before it’s used. The biggest danger
    comes from a text field that asks for the user’s email address. A widely used
    technique is to incorporate the user’s email address into a `From` or `Reply-To`
    header, which enables you to reply directly to incoming messages by clicking the
    Reply button in your email program. It’s very convenient, but attackers frequently
    try to pack an email input field with a large number of spurious headers.


    Although email fields are the prime target for attackers, the destination address
    and subject line are both vulnerable if you let users change the value. User input
    should always be regarded as suspect. PHP Solution 5-3 performs only a basic test
    for suspect phrases. Before using external input directly in a header you need
    to apply a more rigorous test, as seen in PHP Solution 5-4.


    #### PHP Solution 5-4: Adding Headers and Automating the Reply Address


    This PHP solution adds three headers to the email: `From`, `Content-Type` (to
    set the encoding to UTF-8), and `Reply-To`. Before adding the user’s email address
    to the final header, it uses a built-in PHP filter to verify that the submitted
    value conforms to the format of a valid email address.


    Continue working with the same page as before. Alternatively, use `contact_04.php`
    and `includes/processmail_02.php` from the `ch05` folder.


    Headers are often specific to a particular website or page, so the `From` and
    `Content-Type` headers will be added to the script in `contact.php`. Add the following
    code to the PHP block at the top of the page just before `processmail.php` is
    included:


    `$required = [''name'', ''comments'', ''email''];`


    `// create additional headers`


    `$headers = "From: Japan Journey<feedback@example.com>\r\n";`


    `$headers .= ''Content-Type: text/plain; charset=utf-8'';`


    `require ''./includes/processmail.php'';`


    The `\r\n` at the end of the `From` header is an escape sequence that inserts
    a carriage return and newline character, so the string must be in double quotes.
    At the moment, `Content-Type` is the final header, so it isn’t followed by a carriage
    return or newline character, and the string is in single quotes.


    The purpose of validating the email address is to make sure it’s in a valid format,
    but the field might be empty because you decide not to make it required or because
    the user simply ignored it. If the field is required but empty, it will be added
    to the `$missing` array, and the warning you added in PHP Solution 5-1 will be
    displayed. If the field isn’t empty, but the input is invalid, you need to display
    a different message.


    Switch to `processmail.php` and add this code at the bottom of the script:


    `// validate the user''s email`


    `if (!$suspect && !empty($email)) {`


    `$validemail = filter_input(INPUT_POST, ''email'', FILTER_VALIDATE_EMAIL);`


    `if ($validemail) {`


    `$headers .= "\r\nReply-To: $validemail";`


    `} else {`


    `$errors[''email''] = true;`


    `}`


    `}`


    This begins by checking that no suspect phrases have been found and that the `email`
    field isn’t empty. Both conditions are preceded by the logical Not operator (`!`),
    so they return `true` if `$suspect` and `empty($email)` are both `false`. The
    `foreach` loop you added in PHP Solution 5-1 assigns all expected elements in
    the `$_POST` array to simpler variables, so `$email` contains the same value as
    `$_POST[''email'']`.


    The next line uses `filter_input()`to validate the email address. The first argument
    is a PHP constant, `INPUT_POST`, which specifies that the value must be in the
    `$_POST` array. The second argument is the name of the element you want to test.
    The final argument is another PHP constant that specifies you want to check that
    the element conforms to the valid format for an email.


    The `filter_input()` function returns the value being tested if it’s valid. Otherwise,
    it returns `false`. So, if the value submitted by the user looks like a valid
    email address, `$validemail` contains the address. If the format is invalid, `$validemail`
    is `false`. The `FILTER_VALIDATE_EMAIL` constant accepts only a single email address,
    so any attempt to insert multiple email addresses will be rejected.


    Note


    `FILTER_VALIDATE_EMAIL` checks the format, not whether the address is genuine.


    If `$validemail` isn’t `false`, it’s safe to incorporate into a `Reply-To` email
    header. Since the last value added to `$headers` in step 1 doesn’t end with a
    carriage return and newline character, they’re added before `Reply-To`. When building
    the `$headers` string, it doesn’t matter whether you put the `\r\n` at the end
    of a header or at the beginning of the next one, as long as a carriage return
    and newline character separate them.


    If `$validemail` is `false`, `$errors[''email'']` is added to the `$errors` array.


    You now need to amend the `<label>` for the `email` field in `contact.php`, like
    this:


    `<label for="email">Email:`'
  trans: "\n### 安全使用额外的邮件头\n\n您可以在 [`www.faqs.org/rfcs/rfc2076`](http://www.faqs.org/rfcs/rfc2076)\
    \ 找到完整的邮件头列表，但一些最知名且实用的邮件头能让您将邮件副本发送到其他地址（抄送和密件抄送）或更改编码。除最后一个外，每个新邮件头都必须在单独的一行上，并以回车符和换行符结尾。这意味着要在双引号字符串中使用\
    \ `\\r` 和 `\\n` 转义序列（请参阅第 3 章中的表 3-4）。\n\n默认情况下，`mail()` 使用 Latin1 (ISO-8859-1)\
    \ 编码，这种编码不支持重音字符。如今的网页编辑器经常使用 Unicode (UTF-8)，它支持大多数书面语言，包括欧洲语言中常用的重音，以及非字母文字，例如中文和日文。为确保邮件消息不乱码，请使用\
    \ `Content-Type` 邮件头将编码设置为 UTF-8，如下所示：\n\n```\n$headers = \"Content-Type: text/plain;\
    \ charset=utf-8\\r\\n\";\n```\n\n您还需要在网页的 `<head>` 部分的 `<meta>` 标签中添加 UTF-8 作为\
    \ `charset` 属性，如下所示，这是在 HTML5 中：\n\n```\n<meta charset=\"utf-8\">\n```\n\n如果您仍在使用\
    \ HTML 4.01，`<meta>` 标签会更为冗长：\n\n```\n<meta http-equiv=\"Content-Type\" content=\"\
    text/html; charset=utf-8\">\n```\n\n假设您还想将消息的副本发送给其他部门，外加一份发送给另一个不希望其他人看到的地址。由\
    \ `mail()` 发送的邮件通常被标识为来自 `nobody@yourdomain`（或任何分配给 Web 服务器的用户名），因此添加一个更友好的“发件人”地址是个好主意。以下是构建这些额外邮件头的方法，使用组合连接运算符（`.=`）将每个邮件头添加到现有变量中：\n\
    \n```\n$headers .= \"From: Japan Journey<feedback@example.com>\\r\\n\";\n$headers\
    \ .= \"Cc: sales@example.com, finance@example.com\\r\\n\";\n$headers .= 'Bcc:\
    \ secretplanning@example.com';\n```\n\n构建完您想使用的邮件头集合后，将包含它们的变量作为第四个参数传递给 `mail()`，如下所示（假设目标地址、主题和消息正文已存储在变量中）：\n\
    \n```\n$mailSent = mail($to, $subject, $message, $headers);\n```\n\n像这样的硬编码额外邮件头不会带来安全风险，但任何来自用户输入的内容在使用前都必须经过过滤。最大的危险来自要求用户输入电子邮件地址的文本字段。一种广泛使用的技术是将用户的电子邮件地址合并到\
    \ `From` 或 `Reply-To` 邮件头中，这使得您可以通过点击电子邮件程序中的“回复”按钮直接回复收到的消息。这非常方便，但攻击者经常试图在电子邮件输入字段中塞入大量伪造的邮件头。\n\
    \n虽然电子邮件字段是攻击者的主要目标，但如果您允许用户更改值，目标地址和主题行都很容易受到攻击。用户输入应始终被视为可疑。PHP Solution 5-3\
    \ 仅对可疑短语进行了基本测试。在直接在邮件头中使用外部输入之前，您需要应用更严格的测试，如 PHP Solution 5-4 所示。\n\n#### PHP\
    \ Solution 5-4：添加邮件头并自动设置回复地址\n\n此 PHP 解决方案为邮件添加了三个邮件头：`From`、`Content-Type`（用于将编码设置为\
    \ UTF-8）和 `Reply-To`。在将用户的电子邮件地址添加到最后一个邮件头之前，它使用内置的 PHP 过滤器来验证提交的值是否符合有效电子邮件地址的格式。\n\
    \n继续使用之前的页面进行练习。或者，使用 `ch05` 文件夹中的 `contact_04.php` 和 `includes/processmail_02.php`。\n\
    \n邮件头通常特定于某个网站或页面，因此 `From` 和 `Content-Type` 邮件头将被添加到 `contact.php` 的脚本中。将以下代码添加到页面顶部\
    \ `processmail.php` 被引入之前的 PHP 代码块中：\n\n```\n$required = ['name', 'comments',\
    \ 'email'];\n\n// 创建额外的邮件头\n$headers = \"From: Japan Journey<feedback@example.com>\\\
    r\\n\";\n$headers .= 'Content-Type: text/plain; charset=utf-8';\n\nrequire './includes/processmail.php';\n\
    ```\n\n`From` 邮件头末尾的 `\\r\\n` 是一个转义序列，用于插入回车符和换行符，因此该字符串必须放在双引号中。目前，`Content-Type`\
    \ 是最后一个邮件头，因此它后面没有跟回车符或换行符，并且该字符串放在单引号中。\n\n验证电子邮件地址的目的是确保其格式有效，但该字段可能为空，原因可能是您决定不将其设为必填项，或者用户忽略了它。如果该字段是必填项但为空，它将被添加到\
    \ `$missing` 数组中，并且您在 PHP Solution 5-1 中添加的警告将会显示。如果该字段不为空，但输入无效，您需要显示一条不同的消息。\n\
    \n切换到 `processmail.php` 并将以下代码添加到脚本底部：\n\n```\n// 验证用户的电子邮件\nif (!$suspect &&\
    \ !empty($email)) {\n    $validemail = filter_input(INPUT_POST, 'email', FILTER_VALIDATE_EMAIL);\n\
    \    if ($validemail) {\n        $headers .= \"\\r\\nReply-To: $validemail\";\n\
    \    } else {\n        $errors['email'] = true;\n    }\n}\n```\n\n这首先检查是否未发现可疑短语，并且\
    \ `email` 字段不为空。两个条件前都使用了逻辑非运算符（`!`），因此如果 `$suspect` 和 `empty($email)` 都为 `false`，则返回\
    \ `true`。您在 PHP Solution 5-1 中添加的 `foreach` 循环会将 `$_POST` 数组中的所有预期元素分配给更简单的变量，因此\
    \ `$email` 包含与 `$_POST['email']` 相同的值。\n\n下一行使用 `filter_input()` 来验证电子邮件地址。第一个参数是一个\
    \ PHP 常量 `INPUT_POST`，它指定值必须存在于 `$_POST` 数组中。第二个参数是您要测试的元素的名称。最后一个参数是另一个 PHP 常量，它指定您要检查该元素是否符合电子邮件的有效格式。\n\
    \n如果 `filter_input()` 函数测试的值有效，则返回该值。否则，返回 `false`。因此，如果用户提交的值看起来像有效的电子邮件地址，则\
    \ `$validemail` 包含该地址。如果格式无效，则 `$validemail` 为 `false`。`FILTER_VALIDATE_EMAIL`\
    \ 常量只接受单个电子邮件地址，因此任何插入多个电子邮件地址的尝试都将被拒绝。\n\n**注意：** `FILTER_VALIDATE_EMAIL` 检查的是格式，而不是地址是否真实有效。\n\
    \n如果 `$validemail` 不为 `false`，则可以安全地将其合并到 `Reply-To` 邮件头中。由于步骤 1 中添加到 `$headers`\
    \ 的最后一个值没有以回车符和换行符结尾，因此会在 `Reply-To` 之前添加它们。在构建 `$headers` 字符串时，只要用回车符和换行符将它们分隔开，将\
    \ `\\r\\n` 放在一个邮件头的末尾还是下一个邮件头的开头都没有关系。\n\n如果 `$validemail` 为 `false`，则将 `$errors['email']`\
    \ 添加到 `$errors` 数组中。\n\n您现在需要修改 `contact.php` 中 `email` 字段的 `<label>`，如下所示：\n\n\
    ```\n<label for=\"email\">电子邮件:\n```\n"
- fmt: "// 重新排版的 Markdown 文档\n\n```php\n<?php if ($missing && in_array('email', $missing))\
    \ { ?>\n```\n\n```php\n<span class=\"warning\">Please enter your email address</span>\n\
    ```\n\n```php\n<?php } elseif (isset($errors['email'])) { ?>\n```\n\n```php\n\
    <span class=\"warning\">Invalid email address</span>\n```\n\n```php\n<?php } ?>\n\
    ```\n\n```php\n</label>\n```\n\n这段代码在第一个条件语句中添加了一个`elseif`子句，如果电子邮件地址验证失败，则显示不同的警告信息。\n\
    \n保存`contact.php`并通过将所有字段留空并单击“发送消息”来测试表单。您将看到原始错误消息。通过在“电子邮件”字段中输入非电子邮件地址的值再次测试。这次，您将看到无效消息。如果输入两个电子邮件地址，也会发生同样的情况。\n\
    \n您可以对照`ch05`文件夹中的`contact_05.php`和`includes/processmail_03.php`检查您的代码。\n\n###\
    \ PHP 解决方案 5-5：构建消息正文并发送邮件\n\n许多 PHP 教程演示了如何像这样手动构建消息正文：\n\n```php\n$message =\
    \ \"Name: $name\\r\\n\\r\\n\";\n$message .= \"Email: $email\\r\\n\\r\\n\";\n$message\
    \ .= \"Comments: $comments\";\n```\n\n这种方式为每个输入字段添加标签以标识其来源，并在每个字段之间插入两个回车和换行符。对于少量字段来说这很好，但当字段增多时，操作会变得繁琐。只要您为表单字段指定了有意义的`name`属性，就可以通过`foreach`循环自动构建消息正文，这也是本\
    \ PHP 解决方案采用的方法。\n\n> **注意**：`name`属性不能包含空格。要使用多个单词命名表单字段，请用下划线或连字符连接它们，例如`first_name`或`first-name`。\n\
    \n继续使用与之前相同的文件。或者，使用`ch05`文件夹中的`contact_05.php`和`includes/processmail_03.php`。\n\
    \n在`processmail.php`脚本的底部添加以下代码：\n\n```php\n$mailSent = false;\n```\n\n这将初始化一个变量，用于在邮件发送后将用户重定向到感谢页面。在确定`mail()`函数成功之前，它需要设置为`false`。\n\
    \n现在添加构建消息的代码。它紧跟在刚刚初始化的变量之后：\n\n```php\n// go ahead only if not suspect, all\
    \ required fields OK, and no errors\nif (!$suspect && !$missing && !$errors) {\n\
    \    // initialize the $message variable\n    $message = '';\n    // loop through\
    \ the $expected array\n    foreach($expected as $item) {\n        // assign the\
    \ value of the current item to $val\n        if (isset(${$item}) && !empty(${$item}))\
    \ {\n            $val = ${$item};\n        } else {\n            // if it has\
    \ no value, assign 'Not selected'\n            $val = 'Not selected';\n      \
    \  }\n        // if an array, expand as comma-separated string\n        if (is_array($val))\
    \ {\n            $val = implode(', ', $val);\n        }\n        // replace underscores\
    \ and hyphens in the label with spaces\n        $item = str_replace(['_', '-'],\
    \ ' ', $item);\n        // add label and value to the message body\n        $message\
    \ .= ucfirst($item).\": $val\\r\\n\\r\\n\";\n    }\n    // limit line length to\
    \ 70 characters\n    $message = wordwrap($message, 70);\n    $mailSent = true;\n\
    }\n```\n\n这是另一个复杂的代码块，您可能更愿意直接复制粘贴。尽管如此，您需要知道它的作用。简而言之，代码检查`$suspect`、`$missing`和`$errors`是否都为`false`。如果是，它通过遍历`$expected`数组来构建消息正文，将结果存储为一系列标签/值对。\n\
    \n理解这段代码工作原理的关键在于以下条件语句：\n\n```php\nif (isset(${$item}) && !empty(${$item})) {\n\
    \    $val = ${$item};\n}\n```\n\n看起来有点奇怪的`${$item}`根据`$item`的值动态创建一个变量。这是变量变量（参见[第\
    \ 3 章](#A978-1-4842-0635-5_3_Chapter.html)中的“动态创建新变量”）的另一个示例。每次循环运行时，`$item`包含`$expected`数组中当前元素的值。第一个元素是`name`，所以`${$item}`动态创建一个名为`$name`的变量。实际上，条件语句变成了这样：\n\
    \n```php\nif (isset($name) && !empty($name)) {\n    $val = $name;\n}\n```\n\n\
    在下一次循环中，`${$item}`创建了一个名为`$email`的变量，依此类推。\n\n> **注意**：关于此脚本的关键点是，它只从`$expected`数组中的项目构建消息正文。要使它正常工作，您必须将所有表单字段的名称列出在`$expected`数组中。\n\
