    \n## Using Secret-Key Encryption\n\nThe main differences in setting up user registration\
    \ and authentication for secret-key encryption are that the password needs to\
    \ be stored in the database as a binary object using the `BLOB` data type (see\
    \ \"Storing binary data\" in Chapter [12](#332054_4_En_12_Chapter.xhtml) for more\
    \ information) and that the password verification takes place in the SQL query,\
    \ rather than in the PHP script.\n\n### Creating the table to store Users' Details\n\
    \nIn phpMyAdmin, create a new table called `users_2way` in the `phpsols` database.\
    \ It needs three columns, with the settings listed in Table [19-2](#332054_4_En_19_Chapter.xhtml#Tab2).\n\
    \n**Table 19-2.** Settings for the `users_2way` table\n\n| Name       | Type \
    \   | Length/Values | Attributes | Null      | Index     | A_I       |\n|------------|---------|---------------|------------|-----------|-----------|-----------|\n\
    | `user_id`  | `INT`   |               | `UNSIGNED` | Deselected | `PRIMARY` |\
    \ Selected  |\n| `username` | `VARCHAR` | `15`         |            | Deselected\
    \ | `UNIQUE`  |           |\n| `pwd`      | `BLOB`  |               |        \
    \    | Deselected |           |           |\n\n### Registering New Users\n\nThe\
    \ `AES_ENCRYPT()` function takes two arguments: the value to be encrypted and\
    \ an encryption key. The encryption key can be any string of characters you choose.\
    \ For the purposes of this example, I have chosen `takeThisWith@PinchOfSalt`,\
    \ but a random series of alphanumeric characters and symbols would be more secure.\
    \ By default, `AES_ENCRYPT()` encodes data with a 128-bit key. For the more secure\
    \ 256-bit key length, you need to set the `block_encryption_mode` system variable\
    \ in MySQL to `aes-256-cbc` (for more details, see [`https://dev.mysql.com/doc/refman/8.0/en/encryption-functions.html#function_aes-decrypt`](https://dev.mysql.com/doc/refman/8.0/en/encryption-functions.html%2523function_aes-decrypt)).\
    \ The basic registration scripts for one-way password hashing and secret-key encryption\
    \ are the same. The only difference lies in the section that inserts the user's\
    \ data into the database.\n\n> **Tip**  \n> The following scripts embed the encryption\
    \ key directly in the page. For security, you should define the key in an include\
    \ file and store it outside the server's document root.\n\nThe code for MySQLi\
    \ looks like this (the full listing is in `register_2way_mysqli.php` in the `ch19`\
    \ folder):\n\n```php\nif (!$errors) {\n    // include the connection file\n  \
    \  require_once 'connection.php';\n    $conn = dbConnect('write');\n    // create\
    \ a key\n    $key = 'takeThisWith@PinchOfSalt';\n    // prepare SQL statement\n\
    \    $sql = 'INSERT INTO users_2way (username, pwd)\n            VALUES (?, AES_ENCRYPT(?,\
    \ ?))';\n    $stmt = $conn->stmt_init();\n    if ($stmt = $conn->prepare($sql))\
    \ {\n        // bind parameters and insert the details into the database\n   \
    \     $stmt->bind_param('sss', $username, $password, $key);\n        $stmt->execute();\n\
    \    }\n    if ($stmt->affected_rows == 1) {\n        $success = htmlentities($username)\
    \ . ' has been registered. You may now log in.';\n    } elseif ($stmt->errno ==\
    \ 1062) {\n        $errors[] = htmlentities($username) . ' is already in use.\
    \ Please choose another username.';\n    } else {\n        $errors[] = $stmt->error;\n\
    \    }\n}\n```\n\nFor PDO, it looks like this (see `register_2way_pdo.php` in\
    \ the `ch19` folder for the full listing):"
