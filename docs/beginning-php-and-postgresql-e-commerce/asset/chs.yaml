- "# 主网页结构\n\n主网页包含三个主要区域。在后续章节中，你将用组件化模板填充两个表格单元格——一个用于部门列表，一个用于页面内容。\n\n请注意左侧的部门列表、顶部的页眉，以及填充了首页信息的内容单元格。如前所述，这个内容单元格是浏览网站时唯一会变化的区域；无论访问哪个页面，其他两个单元格的外观都完全相同。这种实现方式既简化了程序员的工作，又能保持网站外观的一致性。\n\
  \n## 理解 Smarty 模板\n\n在继续之前，理解 Smarty 模板的工作原理非常重要。一切从 `index.php` 开始，因此你需要仔细查看它。以下是相关代码：\n\
  \n```php\n<?php\n\n// 加载 Smarty 库和配置文件\n\nrequire_once 'include/app_top.php';\n\n\
  // 加载 Smarty 模板文件\n\n$page = new Page();\n\n// 显示页面\n\n$page->display('index.tpl');\n\
  \n?>\n```\n\n目前，这个文件的功能非常简单。首先，它加载设置了全局变量的 `app_top.php`，然后加载 Smarty 模板文件——当客户端请求\
  \ `index.php` 时，该文件将生成实际的 HTML 内容。\n\n## 创建和配置 Smarty 页面\n\n创建和配置 Smarty 页面的标准方法如下列代码片段所示：\n\
  \n```php\n<?php\n\n// 加载 Smarty 库\n\nrequire_once SMARTY_DIR . 'Smarty.class.php';\n\
  \n// 创建一个 Smarty 类的新实例\n\n$smarty = new Smarty();\n\n$smarty->template_dir = TEMPLATE_DIR;\n\
  \n$smarty->compile_dir = COMPILE_DIR;\n\n$smarty->config_dir = CONFIG_DIR;\n\n?>\n\
  ```\n\n### Page 类\n\n在 HatShop 中，我们创建了一个继承自 `Smarty` 的 `Page` 类，其构造函数中包含初始化过程。这使\
  \ Smarty 模板的使用更加简便。以下是 `Page` 类的代码：\n\n```php\nclass Page extends Smarty\n{\n\n\
  \    // 类构造函数\n\n    public function __construct()\n    {\n\n        // 调用 Smarty\
  \ 的构造函数\n\n        parent::Smarty();\n\n        // 更改默认模板目录\n\n        $this->template_dir\
  \ = TEMPLATE_DIR;\n\n        $this->compile_dir = COMPILE_DIR;\n\n        $this->config_dir\
  \ = CONFIG_DIR;\n\n    }\n\n}\n```\n\n> **注意：** 构造函数的概念是面向对象编程术语中专用的。类的构造函数是一种特殊方法，当创建该类实例时会自动执行。在\
  \ PHP 中，类的构造函数被称为 `__construct()`。将这段代码写在 `Page` 类的构造函数中，可以确保在创建 `Page` 的新实例时自动执行。\n\
  \n## Smarty 模板文件\n\nSmarty 模板文件（`index.tpl`）除了少数细节外，包含的是简单的 HTML 代码。这些细节值得分析。在 `index.tpl`\
  \ 中，HTML 代码开始之前，会加载配置文件 `site.conf`。\n\n```\n{* smarty *}\n{config_load file=\"\
  site.conf\"}\n```\n\n> **提示：** Smarty 注释用 `{*` 和 `*}` 标记括起来。\n\n### 站点配置变量\n\n目前，`site.conf`\
  \ 文件中设置的唯一变量是 `site_title`，它包含网站的名称。该变量的值用于在 HTML 代码中生成页面标题：\n\n```html\n<!DOCTYPE\
  \ html PUBLIC \"-//W3C//DTD XHTML 1.1//EN\"\n\"http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd\"\
  >\n<html>\n<head>\n<title>{#site_title#}</title>\n<link href=\"hatshop.css\" type=\"\
  text/css\" rel=\"stylesheet\" />\n</head>\n```\n\n从配置文件加载的变量通过用井号（`#`）括起来引用，或者使用\
  \ Smarty 变量 `$smarty.config`，如下所示：\n\n```html\n<head>\n<title>{$smarty.config.site_title}</title>\n\
  </head>\n```\n\n我们使用 `{config_load file=\"site.conf\"}` 加载了 `site.conf` 配置文件，并通过\
  \ `{#site_title#}` 访问了 `site_title` 变量——当你需要获取站点标题时即可使用此方式。\n\n如果需要更改站点标题，只需编辑 `site.conf`\
  \ 文件即可。\n\n\n\n最后，需要注意如何在另一个 Smarty 模板中包含一个 Smarty 模板。`index.tpl` 引用了 `header.tpl`，后者也将在其他许多页面中重复使用：\n\
  \n```html\n<body>\n\n<div>\n\n<div class=\"left_box\">\n\n在此放置部门列表\n\n</div>\n\n\
  {include file=\"header.tpl\"}\n\n<div id=\"content\">\n\n在此放置内容\n\n</div>\n\n</div>\n\
  \n</body>\n\n</html>\n```\n\n另外值得一提的是，我们使用了 CSS（层叠样式表）。CSS 允许将格式化选项集中在一个文档中，该文档被\
  \ HTML 文件引用。如果操作得当，并且在网站中一致地使用 CSS，你只需通过编辑 CSS 文件，就能以极小的代价对整个站点（或站点的部分区域）进行视觉上的改动。市面上有许多关于\
  \ CSS 的书籍和教程，包括你可以在 [`www.w3.org/Style/CSS/`](http://www.w3.org/Style/CSS/) 和 [`www.w3schools.com/css/default.asp`](http://www.w3schools.com/css/default.asp)\
  \ 找到的免费资源。许多实用的 CSS 相关资源可以在 [`www.csszengarden.com/`](http://www.csszengarden.com/)\
  \ 找到。强烈推荐使用 CSS，因为它能带来显著的好处。你将在第 3 章看到更多关于 CSS 的实际应用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 处理与报告错误\n\n虽然代码的编写会尽量避免出现任何不愉快的意外，但在处理客户端请求时，总有可能出现问题。处理这些意外问题的最佳策略是找到一种集中的方式来处理这些错误，并在错误发生时执行某些特定操作。\n\
  \nPHP 以其令人困惑的错误消息而闻名。如果你使用过其他编程语言，你可能很欣赏在出现错误时通过显示堆栈跟踪所获得的信息。但在 PHP 错误发生时，默认情况下不会显示跟踪信息，因此你需要改变这种行为。在开发阶段，跟踪信息将帮助你调试应用程序，而在发布版本中，错误消息必须报告给网站管理员。另一个问题是棘手的\
  \ `E_WARNING` 错误消息类型，因为它很难判断对应用程序来说是否致命。\n\n> **提示** 如果你不记得或不知道 PHP 错误消息的样子，请尝试在你的\
  \ `include/app_top.php` 文件中添加以下代码行：\n> \n> `require_once 'inexistent_file.php';`\n\
  > \n> 然后在常用浏览器中加载该网站，并留意你收到的错误消息。如果你进行此测试，请务必随后删除有问题的代码行！\n\n在在线 Web 应用程序的背景下，错误可能因各种原因意外发生，例如软件故障（操作系统或数据库服务器崩溃、病毒等）和硬件故障。能够记录这些错误并最终通知网站管理员（例如通过发送电子邮件）非常重要，以便尽快处理错误。\n\
  \n基于这些原因，我们将开始建立一种高效的错误处理和报告策略。你将创建一个名为 `ErrorHandler` 的类来管理错误处理。在此类中，你将创建一个名为 `Handler`\
  \ 的静态用户自定义错误处理方法，该方法将在运行时发生 PHP 错误时执行。在 PHP 中，你可以使用 `set_error_handler()` 函数来定义自定义错误处理器。\n\
  \n> **警告** 如你将要看到的，`set_error_handler()` 的第二个参数用于指定应由特定处理器函数处理的错误类型。然而，这个第二个参数仅在\
  \ PHP 5 及以上版本中受支持。更多详细信息请访问 [`www.php.net/set_error_handler`](http://www.php.net/set_error_handler)。你也可以在\
  \ PHP 手册 [`www.php.net/manual/en/ref.errorfunc.php`](http://www.php.net/manual/en/ref.errorfunc.php)\
  \ 中找到关于 PHP 错误和日志记录的更多信息。\n\n严重的错误类型（`E_ERROR`、`E_PARSE`、`E_CORE_ERROR`、`E_CORE_WARNING`、`E_COMPILE_ERROR`\
  \ 和 `E_COMPILE_WARNING`）不能被 `ErrorHandler::Handler` 拦截和处理，但其他类型的 PHP 错误（例如 `E_WARNING`）则可以。\n\
  \n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH02.qxd 11/8/06 9:33\
