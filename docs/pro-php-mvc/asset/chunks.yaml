    Linux


    In this section, we will be covering the installation process in Ubuntu 11.10\.
    The installation of these software packages is commonly known as LAMP (**L**inux
    **A**pache **M**ySQL **P**HP). While there might be small differences, the methods
    described in this section should work on other Linux distributions.


    Step 1


    Switch to the root user account by typing sudo –s, and providing the root account
    password. The commands that follow require root access to install/configure correctly.
    After you have root access, type the following commands, answering Y when prompted:


    • apt-get update


    • apt-get install tasksel (see Figure [A-12](#index_split_007.html#p444))


    • tasksel


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 14](index-444_1.png)


    ![Image 15](index-444_2.png)


