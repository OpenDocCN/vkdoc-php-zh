  trans: "\n该扩展提供了一些函数，用于在 WDDX 数据包格式和变量之间进行序列化和反序列化。\n\n要创建一个包含单个值的 WDDX 数据包，可以使用`wddx_serialize_value()`函数。该函数接受两个参数。第一个参数是值：\n\
    \n```\n<?php\n// 14_9.php\n\necho wddx_serialize_value(\"PHP & MySQL Recipes\"\
    , \"Packet\");\n```\n\n此脚本将生成以下 XML：\n\n```\n<wddxPacket version='1.0'>\n<header><comment>Packet</comment></header>\n\
    <data><string>PHP &amp; MySQL Recipes</string></data>\n</wddxPacket>\n```\n\n\
    要将 WDDX 数据包转换回 PHP 变量，可以像这样使用`wddx_deserialize()`函数：\n\n```\n<?php\n// 14_10.php\n\
    \n$wddx = <<<HEREDOC\n<wddxPacket version='1.0'>\n<header><comment>Packet</comment></header>\n\
    <data><string>PHP &amp; MySQL Recipes</string></data>\n</wddxPacket>\nHEREDOC;\n\
    \nvar_dump(wddx_deserialize($wddx));\n```\n\n此脚本将生成以下 XML：\n\n```\n<wddxPacket\
    \ version='1.0'>\n<header><comment>Packet</comment></header>\n<data><string>PHP\
    \ &amp; MySQL Recipes</string></data>\n</wddxPacket>\n```\n\n这可用于交换任何类型的单个变量，但通过使用更多函数，可以交换多个变量。\n\
    \n```\n<?php\n// 14_11.php\n\n$int = 1234;\n$str = \"PHP & MySQL Recipes\";\n\
    $arr = [\n    12,\n    \"abc\",\n    [\n        3.15,\n        7.25\n    ]\n];\n\
    \n$packet_id = wddx_packet_start(\"Packet\");\nwddx_add_vars($packet_id, \"int\"\
    );\nwddx_add_vars($packet_id, \"str\");\nwddx_add_vars($packet_id, \"arr\");\n\
    echo wddx_packet_end($packet_id);\n```\n\n经过换行和缩进格式化后，输出如下所示：\n\n```\n<wddxPacket\
    \ version='1.0'>\n<header>\n<comment>Packet</comment>\n</header>\n<data>\n<struct>\n\
    <var name='int'>\n<number>1234</number>\n</var>\n<var name='str'>\n<string>PHP\
    \ &amp; MySQL Recipes</string>\n</var>\n<var name='arr'>\n<array length='3'>\n\
    <number>12</number>\n<string>abc</string>\n<array length='2'>\n<number>3.15</number>\n\
    <number>7.25</number>\n</array>\n</array>\n</var>\n</struct>\n</data>\n</wddxPacket>\n\
    ```\n\n## 方案 14-6：SOAP 服务器与客户端\n\n### 问题\n\n尽管上一节中的 WDDX 扩展可用于在不同系统和不同编程语言之间交换数据，但它仅支持有限的数据类型，并且直接对编程语言中的变量进行操作。拥有一种包含所交换数据的定义以及数据如何被验证的描述的数据交换格式，将大大提升交换的质量和灵活性。\n\
    \n### 解决方案\n\nSOAP（最初称为“简单对象访问协议”）就是解决方案。从该标准的 1.2 版本开始，这个缩写被弃用，现在简称为 SOAP。SOAP\
    \ 是一种基于 XML 的格式，其消息定义在 WSDL 文件（同样为 XML 格式）中提供。通过使用 WSDL 文件，客户端可以自动使用 SOAP API，而无需事先了解\
    \ API 的结构。\n\nSOAP 可工作于任何类型的传输协议，但通常与 HTTP/HTTPS 一起使用。\n\nPHP 实现了用于创建 SOAP 服务器和\
    \ SOAP 客户端功能的类。其基本功能是接受一个 PHP 类，并使用它来生成一个 SOAP 服务器。该类中的每个公共方法都将作为端点暴露出来，供客户端访问。\n\
    \n### 工作原理\n\nSOAP 格式支持向端点传递参数。这些参数可以作为查询的输入，就像方法是在本地调用一样。\n\n在第一个示例中，我们将创建一个能够执行一些简单数学运算的\
    \ SOAP 服务器。名为`Math`的类包含三个方法：`Add`、`Subtract`和`Multiply`，用于对两个数字进行加、减、乘运算。\n\n\
    ```\n<?php\n// 14_12.php\n\nclass Math {\n    function Add($i, $j) {\n       \
    \ return $i + $j;\n    }\n\n    function Subtract($i, $j) {\n        return $i\
    \ - $j;\n    }\n\n    function Multiply($i, $j) {\n        return $i * $j;\n \
    \   }\n}\n```\n"
- fmt: "To use this class in a SOAP server it is necessary to define an instance of\
    \ the `SoapServer` class. The constructor of the `SoapServer` class takes two\
    \ arguments. The first is a wsdl and the second is an array of options to use.\
    \ The wsdl can be omitted by setting it to `null` and the minimum set of options\
    \ in the second parameter is the URI of the API endpoint for the server. In this\
    \ example the SOAP Server will be used on the localhost so the configuration of\
    \ the server will look like this:\n\n```php\n// 14_13.php\n\ninclude \"./14_12.php\"\
    ;\n\n$server = new SoapServer(null, ['uri' => 'http://localhost/14_13.php']);\n\
    $server->setClass('Math');\n$server->handle();\n```\n\nThe last two method calls\
    \ are used to add the `Math` class to the server, exposing the public functions\
    \ and to start the server.\n\nThe next step is to create a client that can consume\
    \ the APIs. Because there is no wsdl definition for the file the client must have\
    \ prior knowledge about the available APIs.\n\n```php\n// 14_14.php\n\n$client\
    \ = new SoapClient(null, array(\n    'location' => \"http://localhost/14_13.php\"\
    ,\n    'uri' => \"http://localhost/14_13.php\",\n    'trace' => 1\n));\n\necho\
    \ $return = $client->__soapCall(\"Add\", array(5, 2)) . \"\\n\";\necho $return\
    \ = $client->__soapCall(\"Subtract\", array(5, 2)) . \"\\n\";\necho $return =\
    \ $client->__soapCall(\"Multiply\", array(5, 2)) . \"\\n\";\n```\n\nThe `SoapClient()`\
    \ class follows the same system as the `SoapServer()` and can be used with or\
    \ without a WSDL file, but without a WSDL file it’s necessary to pass in the location\
    \ and url of the endpoints.\n\nCreating a wsdl file can be a bit cumbersome but\
    \ it’s worth the work as the code for the client becomes simpler and more readable.\
    \ As an example for the `Math` service above, we can create a wsdl file that defines\
    \ the input and output of each procedure call and binds it all together in a service:\n\
    \n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\" ?>\n<definitions name=\"Math\"\
    \n             targetNamespace=\"http://localhost/math.wsdl\"\n>\n\n  <message\
    \ name=\"addRequest\">\n    <part name=\"i\" type=\"xsd:int\"/>\n    <part name=\"\
    j\" type=\"xsd:int\"/>\n  </message>\n  <message name=\"addResponse\">\n    <part\
    \ name=\"Result\" type=\"xsd:int\"/>\n  </message>\n\n  <message name=\"subtractRequest\"\
    >\n    <part name=\"i\" type=\"xsd:int\"/>\n    <part name=\"j\" type=\"xsd:int\"\
    />\n  </message>\n  <message name=\"subtractResponse\">\n    <part name=\"Result\"\
    \ type=\"xsd:int\"/>\n  </message>\n\n  <message name=\"multiplyRequest\">\n \
    \   <part name=\"i\" type=\"xsd:int\"/>\n    <part name=\"j\" type=\"xsd:int\"\
    />\n  </message>\n  <message name=\"multiplyResponse\">\n    <part name=\"Result\"\
    \ type=\"xsd:int\"/>\n  </message>\n\n  <portType name=\"MathPortType\">\n   \
    \ <operation name=\"Add\">\n      <input message=\"tns:addRequest\"/>\n      <output\
    \ message=\"tns:addResponse\"/>\n    </operation>\n    <operation name=\"Subtract\"\
    >\n      <input message=\"tns:subtractRequest\"/>\n      <output message=\"tns:subtractResponse\"\
    />\n    </operation>\n    <operation name=\"Multiply\">\n      <input message=\"\
    tns:multiplyRequest\"/>\n      <output message=\"tns:multiplyResponse\"/>\n  \
    \  </operation>\n  </portType>\n\n  <binding name=\"MathBinding\" type=\"tns:MathPortType\"\
    >\n    <soap:binding style=\"rpc\"\n                  transport=\"http://schemas.xmlsoap.org/soap/http\"\
    />\n    <operation name=\"Add\">\n      <soap:operation soapAction=\"http://localhost/Add\"\
    />\n      <input>\n        <soap:body use=\"encoded\"\n                   namespace=\"\
    http://localhost/math.wsdl\"\n                   encodingStyle=\"http://schemas.xmlsoap.org/soap/encoding/\"\
    />\n      </input>\n      <output>\n        <soap:body use=\"encoded\"\n     \
    \              namespace=\"http://localhost/math.wsdl\"\n                   encodingStyle=\"\
    http://schemas.xmlsoap.org/soap/encoding/\"/>\n      </output>\n    </operation>\n\
    \n    <operation name=\"Subtract\">\n      <soap:operation soapAction=\"http://localhost/Subtract\"\
    />\n      <input>\n        <soap:body use=\"encoded\"\n                   namespace=\"\
    http://localhost/math.wsdl\"\n                   encodingStyle=\"http://schemas.xmlsoap.org/soap/encoding/\"\
    />\n      </input>\n      <output>\n        <soap:body use=\"encoded\"\n     \
    \              namespace=\"http://localhost/math.wsdl\"\n                   encodingStyle=\"\
    http://schemas.xmlsoap.org/soap/encoding/\"/>\n      </output>\n    </operation>\n\
    \n    <operation name=\"Multiply\">\n      <soap:operation soapAction=\"http://localhost/Multiply\"\
    />\n      <input>\n        <soap:body use=\"encoded\"\n                   namespace=\"\
    http://localhost/math.wsdl\"\n                   encodingStyle=\"http://schemas.xmlsoap.org/soap/encoding/\"\
    />\n      </input>\n      <output>\n        <soap:body use=\"encoded\"\n     \
    \              namespace=\"http://localhost/math.wsdl\"\n                   encodingStyle=\"\
    http://schemas.xmlsoap.org/soap/encoding/\"/>\n      </output>\n    </operation>\n\
    \  </binding>\n</definitions>\n```"
