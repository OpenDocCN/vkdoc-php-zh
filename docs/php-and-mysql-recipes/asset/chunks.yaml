    \ 5-5. Using ISO Formats\n\n### Problem\n\nIn many cases there is a need for a\
    \ very specific string formatting. When creating e-mail messages it’s convenient\
    \ to have a formatting string, to generate date values for the headers, which\
    \ follow the standard without having to remember the exact formatting.\n\n###\
    \ Solution\n\nThe `date()` function provides a few specific formatting characters\
    \ that will convert a timestamp into the string representation according to the\
    \ specific ISO formatting. Using `\"c\"` will generate a string formatted according\
    \ to the ISO 8601 standard and `\"r\"` will generate an RFC 2822-formatted string.\n\
    \nThe ISO 8601 standard is intended to make it possible to exchange date and time\
    \ values between different parts of the world where different formatting is used.\
    \ The RFC 2822 standard covers exchange of e-mails. There is a commonly used string\
    \ that looks similar to this and it’s used to see the `Last-Modified` and `Expire`\
    \ headers on an HTTP response. The main difference is that the e-mail data includes\
    \ a time zone offset and the response header is always given in GMT value.\n\n\
    ### How it Works\n\nIf you create your own e-mail client you will have to set\
    \ headers for to, from, subject, and other parameters in each e-mail message.\
    \ In addition you would also have to create a header entry for the date and time\
    \ the e-mail was created. This could look something like this:\n\n```\n<?php\n\
    \n// 5_10.php\n\n$msg = \"From: mail@example.com\\r\\n\" .\n       \"To: mail@somedomain.com\\\
    r\\n\" .\n       \"Subject: ISO date format\\r\\n\";\n$msg .= date(\"c\") . \"\
    \\r\\n\\r\\n\";\n$msg .= \"This is the body of the email message\\r\\n\";\necho\
    \ $msg;\n```\n\nThis is just a very simple e-mail message and it is recommended\
    \ to use one of the many e-mail client classes to handle sending and receiving\
    \ of e-mail messages. This example will echo the content of the `$msg` variable.\n\
    \nFrom: mail@example.com\n\nTo: mail@somedomain.com\n\nSubject: ISO date format\n\
    \n2015-04-01T12:25:38-07:00\n\nThis is the body of the email message\n\nSetting\
    \ the `Expires` and `Last-Modified` headers for a HTTP response could look something\
    \ like this:\n\n```\n<?php\n\n// 5_11.php\n\n$gmt_mtime = gmdate('D, d M Y H:i:s',\
    \ $last_modified) . ' GMT';\n$gmt_etime = gmdate('D, d M Y H:i:s', time() + $ttl)\
    \ . ' GMT';\nheader(\"Pragma: Cache\");\nheader(\"Cache-Control: max-age=0, must-revalidate\"\
    );\nheader(\"Last-Modified: \" . $gmt_mtime);\nheader(\"Expires: \" . $gmt_etime);\n\
    if (!empty($_SERVER['HTTP_IF_MODIFIED_SINCE']) &&\n     $_SERVER['HTTP_IF_MODIFIED_SINCE']\
    \ == $gmt_mtime) {\n    http_response_code(304);\n    exit();\n}\n\n// Output\
    \ the rest of the response\n```\n\nThis will allow the browser to use a cached\
    \ version of the response if and only if a revalidation sends back the HTTP status\
    \ 304.\n\n## Recipe 5-6. Working with Week Numbers\n\n### Problem\n\nIn some industries\
    \ around the world the use of week numbers are quite common. Unfortunately there\
    \ are multiple different standards for how week numbers are calculated. The week\
    \ that includes the first Thursday of the year, the week that includes January\
    \ 4th, the first week with four or more days, or the week that starts with the\
    \ Monday that falls between December 29th and January 4th.\n\n### Solution\n\n\
    The date functions in PHP support the ISO-8601 standard for week numbers, which\
    \ define the first week to be the week that includes the first Thursday of the\
    \ year. It is also worth mentioning that week numbering changes between Sunday\
    \ and Monday and not between Saturday and Sunday as weeks are defined in some\
    \ parts of the world.\n\n### How it Works\n\nIn order to get the week number of\
    \ a given timestamp we use the `'W'` formatting character to get week number according\
    \ to the ISO-8601 standard. Week numbers are often given with the year so the\
    \ formatting string would be `'Y-W'` or `'W-Y'`.\n\n```\n<?php\n\n// 5_12.php\n\
    \n$ts = time();\n```"
