    **Displaying the Map on Users’ Public Blogs**


    The final thing we need to do in this chapter is to display added locations on
    the blog post details page. The functionality required to achieve this is only
    a subset of that required to manage locations, because we simply add each location
    to the map and then center the map on those locations.


    In the following sections, we’ll create a new JavaScript class (called BlogLocations)
    to help us display the locations, and then we’ll update the blog post display
    page to use the new class.


    Note that this class will only ever be used if there is at least one location
    on a blog post. If a post has no locations, then we don’t display the map at all.


    We will use the geo microformat when outputting locations to the map. The BlogLocations
    JavaScript class will search the page for all locations using this microformat
    and then add each found location to the map.


    **Outputting Locations Using the Geo Microformat**


    The geo microformat is a subset of the hCard microformat that we looked at in
    Chapter 10, used to include longitude and latitude coordinates on a page. We’ll
    use this microformat to output any locations added to a blog post when the live
    post is viewed.


    There are several way to mark up this data using geo, each of which uses the class
    name geo for the root element. The first way allows the inclusion of the coordinates
    only:


    <div class="geo">


    <span class="latitude">37.423111</span>,


    <span class="longitude">-122.081783</span>


    </div>


    Alternatively, you can specify the coordinates using the <abbr> HTML tag and using
    the title tag as the machine-readable coordinate and the value of the element
    a human-readable format, like this:


    <div class="geo">


    <abbr class="latitude" title="37.423111">+37° 25'' 23.20"</abbr>,


    <abbr class="longitude" title="-122.081783">-122° 4'' 54.42"</abbr>


    </div>


