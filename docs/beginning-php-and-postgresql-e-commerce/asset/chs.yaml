  ### 显示订单详情\n\n在本节中，你将创建 `admin_order_details` 组件化模板，允许管理员编辑特定订单的详细信息。最常见的任务是将已下的订单标记为“已验证”或“已取消”，以及在发货时将已验证的订单标记为“已完成”。请查看图\
  \ 9-5（前面已展示）以了解 `admin_order_details` 模板的实际效果。\n\n当 PayPal 确认了某笔订单的付款时，站点管理员会将该订单标记为“已验证”；当订单完成组装、填写地址并邮寄给购买者时，则将其标记为“已完成”。例如，如果\
  \ PayPal 未能在合理时间（“合理”的确切含义由管理员决定）内确认付款，管理员可以将订单标记为“已取消”。\n\n其他按钮——“编辑”、“更新”和“取消”——允许管理员手动编辑订单的任何详细信息。点击“编辑”按钮时，选择框和文本框将变为可编辑状态。\n\
  \n\n\n现在您已经对这个控件的功能有了大致了解，接下来我们将按照常规方式从数据层开始实现它。\n\n## 实现数据层\n\n在此部分，您将实现支持 UI 所需功能的数据层逻辑。\n\
  \n您需要让管理员能够执行三个操作，并将通过以下函数来实现它们：\n\n- `orders_get_order_info`：获取填充表单所需的一般订单信息数据，例如总金额、创建日期、发货日期等。您可以在前面图\
  \ 9-6 中看到完整列表。\n- `orders_get_order_details`：返回属于所选订单的所有产品，其返回数据用于填充表单底部的网格。\n-\
  \ `orders_update_order`：当管理员在编辑模式下更新订单时调用。\n\n现在，请按照下一步练习中的步骤来实现每个函数。\n\n### 练习：实现相关函数\n\
  \n**1.** 加载 `pgAdmin III`，并连接到 `hatshop` 数据库。\n\n**2.** 点击 `Tools` ➤ `Query tool`（或点击工具栏上的\
  \ `SQL` 按钮）。将会出现一个新的查询窗口。\n\n**3.** 使用查询工具执行以下代码，该代码会在 `hatshop` 数据库中创建 `orders_get_order_info`\
  \ 函数：\n\n```sql\n-- Create orders_get_order_info function\n\nCREATE FUNCTION orders_get_order_info(INTEGER)\n\
  \nRETURNS orders LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninOrderId ALIAS FOR $1;\n\n\
  outOrdersRow orders;\n\nBEGIN\n\nSELECT INTO outOrdersRow\n\norder_id, total_amount,\
  \ created_on, shipped_on, status, comments, customer_name, shipping_address, customer_email\
  \ FROM orders\n\nWHERE order_id = inOrderId;\n\nRETURN outOrdersRow;\n\nEND;\n\n\
  $$;\n```\n\n该函数返回填充 `admin_order_details` 组件化模板中表单所需的信息。\n\n**4.** 使用查询工具执行以下代码，该代码会在\
  \ `hatshop` 数据库中创建 `order_details` 类型和 `orders_get_order_details` 函数：\n\n```sql\n\
  -- Create order_details type\n\nCREATE TYPE order_details AS\n\n(\n\norder_id INTEGER,\n\
  \nproduct_id INTEGER,\n\nproduct_name VARCHAR(50),\n\nquantity INTEGER,\n\nunit_cost\
  \ NUMERIC(10, 2),\n\nsubtotal NUMERIC(10, 2)\n\n);\n\n-- Create orders_get_order_details\
  \ function\n\nCREATE FUNCTION orders_get_order_details(INTEGER)\n\nRETURNS SETOF\
  \ order_details LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninOrderId ALIAS FOR $1;\n\n\
  outOrderDetailsRow order_details;\n\nBEGIN\n\nFOR outOrderDetailsRow IN\n\nSELECT\
  \ order_id, product_id, product_name, quantity,\n\nunit_cost, (quantity * unit_cost)\
  \ AS subtotal\n\nFROM order_detail\n\nWHERE order_id = inOrderId\n\nLOOP\n\nRETURN\
  \ NEXT outOrderDetailsRow;\n\nEND LOOP;\n\nEND;\n\n$$;\n```\n\n`orders_get_order_details`\
  \ 函数返回属于特定订单的产品列表。该列表将用于填充页面底部的订单详情表格。\n\n**5.** 使用查询工具执行以下代码，该代码会在 `hatshop` 数据库中创建\
  \ `orders_update_order` 函数：\n\n```sql\n-- Create orders_update_order function\n\n\
  CREATE FUNCTION orders_update_order(INTEGER, INTEGER, VARCHAR(255), VARCHAR(50),\
  \ VARCHAR(255), VARCHAR(50))\n\nRETURNS VOID LANGUAGE plpgsql AS $$\n\nDECLARE\n\
  \ninOrderId ALIAS FOR $1;\n\ninStatus ALIAS FOR $2;\n\ninComments ALIAS FOR $3;\n\
  \ninCustomerName ALIAS FOR $4;\n\ninShippingAddress ALIAS FOR $5;\n\ninCustomerEmail\
  \ ALIAS FOR $6;\n\ncurrentStatus INTEGER;\n\nBEGIN\n\nSELECT INTO currentStatus\n\
  \nstatus\n\nFROM orders\n\nWHERE order_id = inOrderId;\n\nIF inStatus != currentStatus\
  \ AND (inStatus = 0 OR inStatus = 1) THEN\n\nUPDATE orders SET shipped_on = NULL\
  \ WHERE order_id = inOrderId;\n\nELSEIF inStatus != currentStatus AND inStatus =\
  \ 2 THEN\n\nUPDATE orders SET shipped_on = NOW() WHERE order_id = inOrderId;\n\n\
  END IF;\n\nUPDATE orders\n\nSET status = inStatus, comments = inComments,\n\ncustomer_name\
  \ = inCustomerName,\n\nshipping_address = inShippingAddress,\n\ncustomer_email =\
  \ inCustomerEmail;\n```\n\n\n\n```sql\nWHERE order_id = inOrderId;\n\nEND;\n\n$$;\n\
  ```\n\n`orders_update_order` 函数用于更新订单的详细信息。\n\n### 实现业务层\n\n`admin_order_details`\
