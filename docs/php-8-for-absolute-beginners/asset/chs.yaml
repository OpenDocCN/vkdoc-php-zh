  \n### 在数据库中创建评论表\n\n让我们在`simple_blog`数据库中创建一个名为`comment`的表。我们将使用它来存储所有关于评论的信息。我们将在此表中包含以下几种不同类型的信息：\n\
  \n*   `comment_id`：评论的唯一标识符。这是表的主键。我们将使用`AUTO_INCREMENT`属性，以便自动为新评论分配唯一的 ID 编号。\n\
  *   `entry_id`：评论对应的博客条目的标识符。此列是`INT`（整数）类型。`entry_id`引用另一个表中的主键。`entry_id`是评论表中的外键。\n\
  *   `author`：评论作者的姓名。此列最多接受 30 个字符，类型为`VARCHAR`（字符串）。\n*   `txt`：实际的评论文本。列的数据类型为`TEXT`。\n\
  *   `date`：评论发布的日期，以`TIMESTAMP`类型存储。我们可以为此列设置一个默认值：`CURRENT_TIMESTAMP`，它将在用户向表中添加新评论时提供精确日期和时间的`TIMESTAMP`。\n\
  \n要创建此表，我们将在浏览器中导航到`http://localhost/phpmyadmin`，选择`simple_blog`数据库，然后打开 SQL 选项卡。接着，我们将执行以下命令来创建评论表：\n\
  \n```\nCREATE TABLE comment (\ncomment_id INT NOT NULL AUTO_INCREMENT,\nentry_id\
  \ INT NOT NULL,\nauthor VARCHAR( 75 ),\ntxt TEXT,\ndate TIMESTAMP DEFAULT CURRENT_TIMESTAMP,\n\
  PRIMARY KEY (comment_id),\nFOREIGN KEY (entry_id) REFERENCES blog_entry (entry_id)\n\
  )\n```\n\n**注意**\n\n您也可以使用`phpmyadmin`中的 GUI 屏幕来创建评论表及其内容，正如其他章节中讨论的那样。\n\n评论是用户对某一特定博客条目的回应。因此，每个新评论都必须与一个博客条目唯一关联。当显示特定博客条目时，只会显示与该博客条目相关的评论。\n\
  \n因此，数据库的设计必须能够表示博客条目和评论之间的关系。数据库设计必须支持任何一个评论只能与一个博客条目相关。一个逻辑解决方案是创建评论表，其中包含`entry_id`列，如表\
  \ 8-1 所示。这样，一个评论就会知道特定条目的相关`entry_id`。\n\n**表 8-1** 与特定条目相关的评论行\n\n| comment_id\
  \ | entry_id | Author | txt | date |\n| --- | --- | --- | --- | --- |\n| 1 | 1 |\
  \ Thomas | […] | 2022-09-02 12:54:15 |\n| 2 | 8 | Thomas | […] | 2022-09-02 13:25:41\
  \ |\n| 3 | 1 | Brennan | […] | 2022-09-07 01:43:19 |\n\n让我们看看表 8-1 中填充的评论表。看到任何人的评论是如何显式地与特定条目的`entry_id`相关联的吗？这样，每个评论都知道关联的博客条目。还要注意，一个博客条目可能有许多关联的评论。在上面的例子中，`entry_id\
  \ = 1`的条目有两个评论。这种关系在关系数据库术语中称为*一对多关系*。\n\n### 使用外键\n\n在建立两个表之间的关系时，使用*外键*非常常见。您可以在前面的\
  \ SQL 语句中看到如何声明外键。但它究竟有什么用呢？外键也是对*外部*表中*主键*列的*引用*。在前面的例子中，评论表的`entry_id`是对`blog_entry`表的`entry_id`列的引用。外键有助于维护数据完整性，因为评论表只接受那些能在`blog_entry`表中找到相应`entry_id`的评论。换句话说，评论表只接受与已存在的博客条目相关的评论。\n\
  \n### 构建 Comment_Table 类\n\n现在让我们为评论创建模型，该模型将用于访问数据库中的新评论表。我们继续使用表数据网关设计，它提供了从 PHP\
  \ 代码到单个数据库表的单一访问点。`Blog_Entry_Table`类包含几个我们也会在评论表中使用的项目。这包括接受 PDO 对象的构造函数，以及将执行我们新\
  \ SQL 语句的`executeSQL()`方法。我们可以简单地将重用的代码复制到新类中。然而，这不是代码效率。这种情况为我们提供了另一个学习新东西的机会：使用*继承*来在不同类之间共享公共代码。\n\
  \n### 继承\n\n使用*继承*时，我们可以创建一个单独的类定义来保存多个类之间共享的代码。我们将创建独立的*子类*，其中包含各个类的独特代码。\n\n![](img/323857_3_En_8_Fig6_HTML.jpg)\n\
  \n*图表表示父类中使用的共享属性和共享方法，以及两个子类。*\n\n**图 8-6** 子类从父类继承属性和方法\n\n\n\n图 8-6 展示了一些代码如何在父类中声明，以便在多个类之间共享。父类的所有子类将天生拥有这些属性。在图\
  \ 8-6 中，我们可以看到`A_Child`和`Another_Child`都拥有`$sharedProperty`和`sharedMethod()`，这些是从父类继承而来的。在图\
  \ 8-6 中，我们还可以看到`A_Child`和`Another_Child`各自拥有特殊的属性和方法。这些是在子类定义中声明的。例如，只有`A_Child`拥有`changeA()`方法。我们将利用这个思路，在`Blog_Entry_Table`和`Comment_Table`类之间共享`$db`的内容以及函数`executeSQL()`。`Comment_Table`和`Blog_Entry_Table`类都将天生拥有从`Table`类（父类）继承的`$db`属性和`executeSQL()`方法。\n\
  \n**Is-a 关系**  \n在面向对象术语中，父类和子类之间的关系被称为“is-a”关系。一个`Comment_Table`是一个`Table`。`Table`是一个表示数据库表的通用抽象。`Comment_Table`是特定数据库表的表示。\
  \  \n对象间的“is-a”关系概念在你日常思维中也会用到。咖啡是一种饮料。橙汁也是一种饮料。橙汁和咖啡虽然明显不同，但共享一些特征。饮料是可饮用液体的抽象概念，而咖啡和橙汁是特定种类的可饮用液体。面向对象编程借用了这种广泛使用的人类推理方式，并将其用于为计算机程序带来层次结构。\n\
  \n**在我们的代码中使用继承**  \n子类之间共享的代码必须使用`public`或`protected`访问修饰符。任何具有`private`访问修饰符的属性或方法都不会通过继承共享。让我们创建一个通用的`Table`类，它将包含由子类共享的那些项。\n\
  \n```php\ndb = $db;\n}\nprotected function executeSQL ( $sql, $data = NULL) {\n\
  //create a PDOStatement object\n$statement = $this->db->prepare( $sql );\ntry{\n\
  //use the dynamic data and run the query\n$statement->execute( $data );\n} catch\
  \ (Exception $e) {\n$exceptionMessage = \"You tried to run this sql: $sql \nException:\
  \ $e\";\ntrigger_error($exceptionMessage);\n}\n//return the PDOStatement object\n\
  return $statement;\n}\n}\n?>\nListing 8-12\nTable.class.php\n```\n\n这段代码看起来应该非常熟悉，因为它是从`Blog\
  \ Entry`类复制过来的，只做了一些小修改。\n\n```php\nprotected $db;\n...\nprotected function executeSQL\
  \ ( $sql, $data = NULL) {\n```\n\n`protected`访问修饰符与我们已使用的`private`访问修饰符非常相似。`protected`方法和属性不能从类外部访问，但可以从类内部访问。如果我们对这些语句使用`private`，那么需要用到它们的子类将无法访问它们。\n\
  \n要使此代码对诸如`Comment_Table`之类的子类可用，我们必须在代码中包含`Table`类脚本，并使用关键字`extends`指示其用途。\n\n\
  ```php\nexecuteSQL($sql, $data);\nreturn $statement;\n}\npublic function getAllById\
  \ ( $id ) {\n$sql = \"SELECT author, txt, date FROM comment\nWHERE entry_id = ?\n\
  ORDER BY comment_id DESC\";\n$data = array($id);\n$statement = $this->executeSQL($sql,\
  \ $data);\nreturn $statement;\n}\n}\n?>\nListing 8-13\nTable.class.php\n```\n\n\
  现在，`Comment_Table`类仅包含特定于访问和更新数据库中评论表的代码。`saveComment()`函数使用熟悉的代码将评论插入到表中。`getAllById()`函数使用熟悉的代码检索与特定`entry_id`相关的所有评论。请注意，这两个函数都使用`Table`类中包含的`executeSQL()`函数来执行每个\
  \ SQL 命令。这个函数是从`Table`类继承而来的，因此可供两个函数使用。`getAllById()`函数还对结果进行降序排序（`DESC`），以便将最新的评论显示在结果顶部。\n\
  \n**注意**  \n可以编写很长的继承链。你可以创建一个`Dog`类，它是`Wolf`的子类，`Wolf`是`Canine`的子类，`Canine`是`Quadruped`的子类，`Quadruped`是`Mammal`的子类。但经验表明，浅层继承关系更可取。长继承链会导致依赖性问题，因为`Dog`将依赖于`Wolf`的存在，而`Wolf`又依赖于`Canine`，`Canine`依赖于`Quadruped`。请保持继承链简短。\n\
  \n花点时间阅读前面代码中使用的 select SQL 语句。它将为与特定`entry_id`关联的所有评论选择`author`、`txt`和`date`列。请记住，`entry_id`被声明为外键。它是对`blog_entry`表主键的引用。通过`entry_id`，我们可以明确地识别出一条特定的`blog_entry`：我们知道哪条评论与哪个博客条目相关。\
  \  \n在 insert SQL 语句中，`comment_id`列被声明为`auto_incrementing`，这意味着插入的第一条评论将自动获得`comment_id`值\
  \ 1。下一条评论将获得`comment_id`值 2，依此类推。因此，最新的评论将具有最高的`comment_id`值。所以，降序排列会将新评论列在前面，旧评论列在后面。\
  \  \n现在模型已经创建，是时候创建一个视图来检查一切是否正常运行了。\n\n**为评论列表创建视图**  \n我们正在创建的视图将使用与之前创建的其他视图类似的逻辑。\n\
