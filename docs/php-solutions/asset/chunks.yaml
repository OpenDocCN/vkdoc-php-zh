    # PHP 方案 16-7：设置外键约束


    本 PHP 方案介绍如何在 phpMyAdmin 中为 `article2cat`、`blog` 和 `categories` 表设置外键约束。外键约束必须始终在子表中定义。在此例中，子表是
    `article2cat`，因为它将其他表中的主键 `article_id` 和 `cat_id` 作为外键存储。


    在 phpMyAdmin 中选择 `article2cat` 表，点击“结构”选项卡。然后点击结构表底部的“关系视图”（如图 16-11 中圈出部分）。


    ![A978-1-4842-0635-5_16_Fig11_HTML.jpg](img/A978-1-4842-0635-5_16_Fig11_HTML.jpg)


    图 16-11. 外键约束在 phpMyAdmin 的关系视图中定义


    外键约束只能设置在已建立索引的列上。`article2cat` 表中的 `article_id` 和 `cat_id` 列是该表的复合主键，因此它们都会出现在打开的页面中。如果你的
    phpMyAdmin 版本有“内部关系”选项，可以忽略它。


    在 `article_id` 行中，打开“外键约束（INNODB）”下的下拉菜单，会显示数据库中已建立索引的列列表，然后选择 `phpsols.blog.article_id`，如图
    16-12 所示。这将用于在 `article2cat` 表的 `article_id` 和 `blog` 表的 `article_id` 之间建立正式的外键关系。


    ![A978-1-4842-0635-5_16_Fig12_HTML.jpg](img/A978-1-4842-0635-5_16_Fig12_HTML.jpg)


    图 16-12. 选择父表的主键


    这会显示更多选项（在较旧版本的 phpMyAdmin 中，这些选项始终可见）。将“约束名称”留空。phpMyAdmin 会自动生成约束名称。


    `ON DELETE` 下拉菜单包含以下选项：


    - `CASCADE`：当你删除父表中的记录时，子表中所有从属记录也会被删除。例如，如果你删除 `blog` 表中主键为 `article_id 2` 的记录，则
    `article2cat` 表中所有 `article_id` 为 2 的记录也会被自动删除。

    - `SET NULL`：当你删除父表中的记录时，子表中所有从属记录的外键会被设置为 `NULL`。外键列必须允许 `NULL` 值。

    - `NO ACTION`：在某些数据库系统中，此选项允许延迟外键约束检查。MySQL 会立即执行检查，因此其效果与 `RESTRICT` 相同。

    - `RESTRICT`：如果子表中仍存在从属记录，此选项会阻止删除父表中的记录。


    注意


    `ON UPDATE` 也有相同的选项。除了 `RESTRICT` 之外，其他选项通常使用价值有限，因为除非特殊情况，你不应更改记录的主键。`ON UPDATE
    RESTRICT` 不仅会阻止修改父表中的主键，还会拒绝子表中任何会导致外键值在父表中找不到匹配项的插入或更新操作。


    对于交叉引用表，`CASCADE` 是合乎逻辑的选择。如果决定删除父表中的一条记录，你希望所有对该记录的交叉引用也同时被移除。然而，为了演示外键约束的默认行为，请将
    `ON DELETE` 和 `ON UPDATE` 都设置为 `RESTRICT`。


    在 `cat_id` 行中，从“外键约束（INNODB）”下拉菜单中选择 `phpsols.categories.cat_id`，并将 `ON DELETE`
    和 `ON UPDATE` 设置为 `RESTRICT`。点击“保存”。


    注意


    如果下拉菜单中没有 `RESTRICT` 选项，请将该选项留空。


    如果尚未完成，请至少更新一条博客记录，使其与某个分类关联。在 phpMyAdmin 中，选择 `categories` 表，然后点击某个已知与博客记录关联的分类旁边的“删除”按钮，如图
    16-13 所示。


    ![A978-1-4842-0635-5_16_Fig13_HTML.jpg](img/A978-1-4842-0635-5_16_Fig13_HTML.jpg)


    图 16-13. 尝试删除 `categories` 表中的一条记录


    注意


    在较旧版本的 phpMyAdmin 中，删除图标是一个大的红色 X 号。


    当 phpMyAdmin 要求确认删除时，点击“确定”。如果你已正确设置外键约束，将会看到类似图 16-14 的错误消息。


    ![A978-1-4842-0635-5_16_Fig14_HTML.jpg](img/A978-1-4842-0635-5_16_Fig14_HTML.jpg)


    图 16-14. 若存在从属记录，外键约束会阻止删除操作


    如果错误消息出现在模态对话框中，点击对话框将其关闭。选择 `article2cat` 表，点击“结构”选项卡，然后点击“关系视图”。


    注意


    在较旧版本的 phpMyAdmin 中，`ON DELETE` 和 `ON UPDATE` 可能为空。将这些选项留空与选择 `RESTRICT` 效果相同，这也是两者的默认值。


    将两个 `ON DELETE` 设置都改为 `CASCADE`，然后点击“保存”。在 `blog` 表中选择一条你知道已与某个分类关联的记录。记下它的 `article_id`，然后删除该记录。检查
    `article2cat` 表，与你刚刚删除的记录相关的记录也被删除了。


    为继续探索外键约束，请选择 `blog` 表，并与 `images` 表中的 `image_id` 建立外键关系。如果从 `images` 表中删除一条记录，`blog`
    表中的 `image_id` 外键需要设置为 `NULL`。如果将 `ON DELETE` 的值设置为 `SET NULL`，这将自动完成。通过从 `images`
    表中删除一条记录并检查 `blog` 表中的关联记录来测试此功能。


    注意


    如果需要将 InnoDB 表转换回 MyISAM，必须先移除所有外键约束。选择“关系视图”，将“外键（INNODB）”字段留空，然后点击“保存”。移除外键约束后，即可按照
    PHP 方案 16-6 所述更改存储引擎。此时需选择 `MyISAM` 而非 `InnoDB`。

