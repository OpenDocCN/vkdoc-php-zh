    $this->add(''username'');


    $this->add(''password'');


    $this->add(''user_type'', ''member'');


    $this->add(''ts_created'', time(), self::TYPE_TIMESTAMP);


    $this->add(''ts_last_login'', null, self::TYPE_TIMESTAMP);


