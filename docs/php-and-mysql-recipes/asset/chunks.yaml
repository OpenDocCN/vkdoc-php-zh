    \      $artists[] = $row;\n            }\n            $result->close();\n    \
    \    }\n        return $artists;\n    }\n\n    function addAlbum($title, $artist_id\
    \ = null, $description = null) {\n        if (is_null($artist_id)) {\n       \
    \     $id = \"NULL\";\n        } else {\n            $id = (int)$artist_id;\n\
    \        }\n        $t = $this->real_escape_string($title);\n        if ($description)\
    \ {\n            $d = $this->real_escape_string($description);\n            $sql\
    \ = \"insert into album (title, artist_id, description) values ('$t', $id, '$d')\"\
    ;\n        } else {\n            $sql = \"insert into album (title, artist_id)\
    \ values ('$t', $id)\";\n        }\n        $this->Query($sql);\n        return\
    \ $this->insert_id;\n    }\n\n    function getAlbums($artist_id = null) {\n  \
    \      $albums = [];\n        if ($artist_id) {\n            $sql = \"select album.id,\
    \ artist_id, artist_name, title from album, artist where album.artist_id=artist.id\
    \ and artist_id=$artist_id\";\n        } else {\n            $sql = \"select album.id,\
    \ artist_id, artist_name, title from album left outer join artist on (album.artist_id=artist.id)\"\
    ;\n        }\n        $result = $this->Query($sql);\n        if ($result) {\n\
    \            while($row = $result->fetch_assoc()) {\n                $albums[]\
    \ = $row;\n            }\n            $result->close();\n        }\n        return\
    \ $albums;\n    }\n}\n\n$music = new music();\n\n$music->addAlbum(\"Let It Be\"\
    );\n$music->addAlbum(\"Twist and Shout\");\n\nprint_r($music->getAlbums());\n\
    ```"
