  \ 方法接受若干查询参数，并返回一个匹配的用户行数组，这些结果将在 `search.phtml` 模板中呈现。\n\n以上便是构建 Zend Framework\
  \ 示例应用所需的所有方法及模板。相比之下，本章所需的代码比 CodeIgniter 的对应代码更为简洁，这体现了类自动加载的便捷性，无需手动加载模型、库和视图。\n\
  \n### 问题\n\n1. Zend Framework 的 ORM 模型与 CodeIgniter 乃至我们自己的框架都不同。我们采用的是连接器和查询的方式，CodeIgniter\
  \ 提供了简单的查询接口，而 Zend Framework 则同时提供了表适配器和模型类。这种方式的优缺点分别是什么？\n\n2. Zend Framework\
  \ 与我们自己的框架一样，会根据控制器和动作名称自动加载视图，而 CodeIgniter 则需要显式加载视图。这种方式的优缺点是什么？\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 27 章：Zend Framework：MVC\n\n### 答案\n\n1. 需要处理更多的类/接口意味着更复杂。Zend Framework\
  \ 拥有更陡峭的学习曲线，因为你需要了解所有不同的类，但这允许更高的粒度。例如，我们可以在表中添加不属于模型的方法。Zend Framework 甚至提供了行级接口（继承\
  \ `Zend_Db_Table_Row_Abstract` 的类），支持行级方法。\n\n2. 自动加载视图非常方便，但当不需要加载视图，或者视图名称与控制器及操作名称不同时，这就会带来问题。在这种情况下，了解如何切换自动渲染，或者能够覆盖将要使用的视图，是很有好处的。\n\
  \n### 练习\n\n1. 我们的 `User` 模型反映了我们框架和 CodeIgniter 模型的行为，但更好的做法是将此功能放在一个可被继承的类中。请尝试这样做。\n\
  \n2. 查阅 Zend Framework 文档，尝试几种禁用或阻止自动视图渲染的方法。\n\n> **注意** 关于动作视图与视图模板如何交互，以及如何禁用自动视图渲染，可访问\
  \ [`framework.zend.com/manual/en/zend.controller.action.html`](http://framework.zend.com/manual/en/zend.controller.action.html)\
  \ 了解更多。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 28 章：Zend Framework：扩展\n\
  \n在试图理解 Zend Framework 的细节时，我们需要认识到它并不是附带大量类库，而是*本身*就是一个庞大的类库集合，这些类库大致按照连贯的 MVC\
  \ 框架进行组织。\n\n因此，使用内部类库与使用第三方类库并无区别，这一点不足为奇。让我们来看看具体如何操作。\n\n### 目标\n\n-   我们需要学习如何使用\
  \ Zend Framework 内置的类。\n-   我们需要学习如何在 Zend Framework 应用中引入我们自己的（第三方）库。\n\n### 文件上传\n\
