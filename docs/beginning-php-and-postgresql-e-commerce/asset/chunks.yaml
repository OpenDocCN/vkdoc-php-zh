  trans: "\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00055.png)\n\
    \n648XCH07a.qxd 10/25/06 10:56 PM Page 214\n\n**214** 第 7 章 ■ 目录管理\n\n**图 7-8.**\
    \ *登录页面*\n\n输入正确的登录信息（`hatshopadmin/hatshopadmin`）后，您将被重定向到目录管理页面。目前，目录管理页面仅包含主菜单，但我们将立即对此进行更改。\n\
    \n## 工作原理：管理页面\n\n到目前为止，您已经创建了 `admin.php` 文件，并在本章后续部分继续开发该文件，以允许用户管理目录数据；同时创建了\
    \ `admin_login` 组件化模板，其中包含管理员身份验证和授权功能。\n\n所有有趣的工作从 `admin.php` 开始，该文件通过检查 `admin_logged`\
    \ 会话变量是否为 true 来判断访问者是否已通过管理员身份验证。如果访问者未以管理员身份登录，则会加载 `admin_login` 组件化模板：\n\n\
    ```\n// 如果管理员未登录，则将 admin_login 模板赋值给 $pageContentsCell\nif (!(isset ($_SESSION['admin_logged']))\
    \ || $_SESSION['admin_logged'] != true)\n    $pageContentsCell = 'admin_login.tpl';\n\
    ```\n\n在 `AdminLogin` 助手类中，登录机制将当前身份验证状态存储在访问者会话的 `admin_logged` 变量中。在 `__construct`\
    \ 函数中，我们测试提供的用户名和密码是否与 `config.php` 中存储的 `ADMIN_USERNAME` 和 `ADMIN_PASSWORD` 值匹配；如果匹配，则将\
    \ `admin_logged` 的值设置为 true，并重定向到 `admin.php`：\n\n```\n// 验证是否提供了正确的用户名和密码\nif\
    \ (isset ($_POST['submit']))\n{\n    if ($_POST['username'] == ADMIN_USERNAME\n\
    \        && $_POST['password'] == ADMIN_PASSWORD)\n    {\n        $_SESSION['admin_logged']\
    \ = true;\n        header('Location: admin.php');\n        exit;\n    }\n    else\n\
    \        $this->mLoginMessage = '登录失败，请重试：';\n}\n```\n\n`admin_menu.tpl` 中的注销链接仅仅是在\
    \ `admin.php` 中取消设置 `admin_logged` 会话变量，并将管理员重定向到 `index.php`。这样一来，下次尝试访问管理页面时，管理员将被重定向到登录页面。\n\
    \n```\n// 如果正在注销……\nif (isset ($_GET['Page']) && ($_GET['Page'] == 'Logout'))\n\
    {\n    unset($_SESSION['admin_logged']);\n    header('Location: admin.php');\n\
    \    exit;\n}\n```\n\n## 管理部门\n\n部门管理部分允许客户端添加、删除或更改部门信息。要实现此功能，您需要编写表示层、业务层和数据层的必要代码。\n\
    \n关于 *n* 层应用程序的一个基本事实（同样适用于本案例）是：业务层和数据层的最终目的是支持表示层。先在纸上绘制并确定网站的期望外观（即 UI 需要支持哪些功能），这能很好地指示数据库和业务层应包含的内容。\n\
    \n通过合理的设计工作，您可以确切知道每个层中应放置什么内容，因此编写代码的顺序并不重要。当设计明确确立后，一个程序员团队可以同时工作并并行实现三个层，这也是分层架构的优势之一。\n\
    \n然而，除了那些确实需要非常谨慎设计和规划的大型项目外，这在实际中很少发生。在我们的案例中，通常最佳方式是从底层（数据库和数据对象）开始，在创建 UI 之前先打好基础。\n\
    \n为此，首先需要分析 UI 需要哪些功能；否则，您将不知道在数据层和业务层中编写什么内容。"
- fmt: "# In This Chapter\n\nIn this chapter, we will always start with the presentation\
    \ tier. You can do this because now you have a good overview of the architecture\
    \ and know beforehand how you’ll implement the other two tiers. This knowledge\
    \ is necessary because in the presentation tier, you call methods from the business\
    \ tier (which you haven’t created yet), and in the business tier, you call the\
    \ data tier (which, again, you haven’t yet created). If you don’t have a clear\
    \ idea of how to implement the other tiers, starting with the presentation tier\
    \ can be trickier in the long run.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](images/00100.png)\n\n648XCH07a.qxd 10/25/06 10:56 PM Page 216\n\n**216**\n\
    C H A P T E R 7 ■ C ATA L O G A D M I N I S T R AT I O N\n\nBecause you already\
    \ have a working architecture, it will be simple to write components as needed\
    \ for each tier. Of course, if you had to implement something new or more complicated,\
    \ we would have spent some time analyzing the full implications, but here you\
    \ won’t do anything more complicated than the code in the previous chapters. You’ll\
    \ apply the same technique for all componentized templates you’ll build in this\
    \ chapter.\n\n## Implementing the Presentation Tier\n\nTake another look at what\
    \ the `admin_departments` componentized template looks like in action (see Figure\
    \ 7-9).\n\n**Figure 7-9.** *The* `admin_departments` *componentized template in\
    \ action*\n\nThis componentized template will generate a list populated with the\
    \ departments’ information, and it also has a label, two text boxes, and a button\
    \ used to add new departments to the list.\n\nWhen you click on a department’s\
    \ Edit button, the name and the description of that department becomes editable,\
    \ and the Update and Cancel buttons appear in place of the Edit button, as you\
    \ saw earlier in Figure 7-3.\n\n### Exercise: Implementing the `admin_departments`\
    \ Componentized Template\n\n1.  Create a new template file named `admin_departments.tpl`\
    \ in the `presentation/templates` folder, and add the following code to it:\n\n\
