  trans: '

    # 第一阶段开发


    ## 第 1 章：启动电子商务网站


    好消息是，第 8 章实现的全新购物车看起来不错，功能也完整。坏消息是，它无法让访问者真正下订单，因此在生产系统中完全无用。你可能已经猜到，本章将分两个阶段解决这个问题。在本章的第一部分，你将实现下单机制的客户端部分；在本章的第二部分，你将实现一个简单的订单管理页面，网站管理员可以在此查看和处理待处理订单。


    ## 第 10 章：产品推荐


    与实体店相比，互联网商店最大的优势之一在于能够根据每位访问者的偏好，或根据从具有类似偏好的其他访问者收集的数据，为每位访问者定制网站。如果你的网站能够以巧妙的方式向访问者推荐额外产品，他或她最终可能会购买超出最初计划的商品。在第
    10 章中，你将学习如何实现一个动态的产品推荐系统。


    # 第三部分：第三阶段开发


    ## 第 11 章：管理客户详细信息


    在开发的前两个阶段，你已经构建了一个基本（但功能完整）的网站，并将其连接到 PayPal 以接收付款和确认订单。在本书的第三部分，你将更进一步。通过将 PayPal
    从订单流程中移除，你可以获得更好的控制权并减少开销。这并不像你想象的那么复杂，但必须小心谨慎地做好。第 11 章通过实现一个客户账户系统，并研究交换和存储客户及信用卡详细信息的安全方面，为后续工作奠定了基础。


    ## 第 12 章：存储客户订单


    在本章中，你将进行必要的修改，使客户能够下订单并与他们的用户资料相关联。这里的主要修改是，与订单关联的客户将通过 `orders` 表中的一条新信息来识别，其余大部分修改将用于应用此信息。


    同样在本章中，你还将了解如何处理电子商务网站的另一个常见功能：税费和运费。实现此功能有多种选择，但我们只探讨一种简单的方法，并为你自己的进一步开发奠定基础。


    ## 第 13 章：实现订单处理管道：第一部分


    HatShop 电子商务应用正在逐步成型。你已经添加了客户账户功能，并安全地跟踪和存储了客户地址及信用卡信息。但是，你当前并未使用这些信息——而是将这部分责任委托给了
    PayPal。在本章和下一章中，你将构建自己的订单处理管道，处理信用卡授权、库存检查、发货、发送电子邮件通知等事宜。我们将把信用卡处理的具体细节留到第 15
    章，但在此之前，我们会向你展示此流程在何处适用。


    ## 第 14 章：实现订单处理管道：第二部分


    在本章中，你将添加所需的管道部分，以便从头到尾处理订单，不过要到下一章才会添加完整的信用卡交易功能。我们还将通过修改本书前面添加的订单管理页面，来考虑新的订单处理系统，从而研究订单的
    Web 管理。


    ## 第 15 章：信用卡交易


    在启动电子商务网站之前，你需要做的最后一件事是启用信用卡处理功能。在本章中，我们将探讨如何将其构建到你在第 13 章和第 14 章创建的管道中。你将学习如何使用两种流行的信用卡支付网关来实现这一点：DataCash
    和 Authorize.net。到本章结束时，HatShop 将成为一个功能齐全、安全且可用的电子商务应用。


    ## 第 16 章：产品评论


    至此，你已经拥有一个完整且功能齐全的电子商务网站。但这并不妨碍你为其添加更多功能，使其对访问者更加有用和愉悦。


    通过在你的网站中添加产品评论系统，你可以增加访问者回访网站的机会，无论是为他们购买的产品撰写评论，还是查看其他人对该产品的看法。


    ## 第 17 章：连接到 Web 服务


    在动态的互联网世界中，仅仅拥有一个重要的网络存在有时是不够的；你还需要与第三方提供的功能进行交互以实现你的目标。在本书中，到目前为止你已经看到了如何集成外部功能来处理客户付款。在第
    17 章中，你将学习如何使用亚马逊网站的功能，通过 Web 服务来实现。Web 服务通过使用 HTTP 等标准互联网协议的 Web 接口暴露出来。客户端和服务器交换的消息使用基于
    XML 的协议（名为 SOAP，即简单对象访问协议）或 REST（表述性状态传递）进行编码。这些消息通过 HTTP 发送。


    在本章中，你将进一步了解这些技术。


    # 前提条件


    本书中的代码使用 PHP 5 和 PostgreSQL 8 构建和测试。它无法与 PHP 4 或更早版本一起使用。你可以在附录 A 中找到所需软件的详细信息。


    # 下载代码


    本书的代码可以从 Apress 网站 (`http://www.apress.com`) 的源代码/下载部分以 zip 文件格式下载。你也可以在 Cristian
    的网站 (`http://www.cristiandarie.ro/php-postgresql-ecommerce/`) 或 Emilian 的网站 (`http://www.emilianbalanescu.ro/beginning-php-postgresql-ecommerce/`)
    上找到代码、勘误表以及与本书相关的其他资源。


    # 联系作者


    你可以通过他们的网站联系作者，如下所示：


    -   Cristian Darie，`http://www.cristiandarie.ro`

    -   Emilian Balanescu，`http://www.emilianbalanescu.ro`

    -   Mihai Valentin Bucica，`http://www.valentinbucica.ro`


    # 第一部分：第一阶段开发


    ## 第 1 章：启动电子商务网站


    “电子商务”这个词在过去几年中经历了一场显著的衰落。仅仅拥有一个电子商务网站的想法就足以让许多商人满怀期待。但现在，光说“电子商务是未来——要么上线，要么关门”已经不够了。你现在需要有说服力、现实且具体的理由，才能将你的业务带到线上。


    本书专注于编程及相关的学科，例如创建、访问和操作数据库。但在我们深入探讨之前，我们需要理解最初导致创建电子商务网站的商业决策。


    如果你想在今天构建一个电子商务网站，你必须回答一些棘手的问题。


    好消息是，这些问题确实有答案，我们将在本章中尝试回答它们：


    -   这么多大型电子商务网站都失败了。在如今这个更加严峻的环境中，电子商务还能给我带来什么？

    '
- fmt: '# 决定是否上线


    大多数电子商务公司似乎都需要大量投资。我如何在有限的预算下创建一个网站？


    即使是成功的电子商务网站也预计需要数年才能盈利。我的企业等不了那么久。我现在如何赚钱？


    ## 决定是否上线


    尽管上线可能有数百种理由，但它们通常分为以下几类：


    - 获得更多客户

    - 让现有客户消费更多

    - 降低订单履行成本


    我们将在以下各节中逐一讨论这些内容。


    ---


    ## 获得更多客户


    获得更多客户是最直接吸引人的理由。通过电子商务网站，即使是小企业也能接触到世界各地的客户。然而，这个理由也可能是最危险的，因为许多人建立电子商务网站时假设网站能立即吸引到客户。事实并非如此。在离线世界中，你需要知道一家商店的存在才能进入它。这在电子商务世界中仍然如此——人们必须知道你的网站存在，你才有希望接到第一笔订单。


    解决这个问题主要是一个广告问题，而不是网站本身的问题。获得更多客户的流行方法包括：将网站注册到流行的搜索引擎和目录列表中、优化网站在搜索引擎中的排名、创建论坛、发送新闻通讯等。


    本书不涵盖电子商务的这些方面，因为我们专注于电子商务开发。只需搜索“网站广告教程”，便会找到许多有用的资源。


    ## 让客户消费更多


    假设你的公司已经有客户，你可能希望他们能购买更多。是什么阻止了他们？如果客户对某种产品没有更多需求，电子商务能做的并不多，但很可能还有其他原因：


    - 前往商店或通过邮件下单很麻烦。

    - 你销售的一些商品可以在更方便的地方买到。

    - 你的营业时间大多与客户的工作时间重叠。

    - 在实体店中实现高效的产品推荐系统更加困难。


    一个优质的电子商务网站（因为目前存在许多有bug、不安全或难以使用的网站）可以解决这些问题。有互联网接入的人会发现在线下单比任何其他方式都容易得多——这意味着当购买冲动来袭时，他们更容易屈服。当然，在线的便利性也意味着人们更有可能选择你而非其他本地供应商。


    由于你的网站是24小时在线，而不是通常的朝九晚五，客户可以在工作之外的时间购物。如果你的客户在办公室工作，在线商店还会带来双重好处：因为他们可以直接在办公桌前进行零售疗法。


    娴熟的电子商务设计可以鼓励客户购买他们通常不会想到的商品。你可以轻松更新网站，以推荐季节性商品、宣布有趣的新产品，或推荐与该特定客户已购买商品相似的产品。


    许多大型电子商务网站鼓励客户在购买主要产品的同时购买有用的配件，或者购买比他们正在考虑的商品更昂贵的替代品。其他网站则向常客提供特别优惠，或在结账过程中建议冲动购买。


    你将在后续章节中学习如何使用其中一些方法；到本书结束时，你将清楚地了解如何为自己添加更多功能。


    最后，通过电子商务了解客户比面对面商店甚至邮购要容易得多。即使你只是收集电子邮件地址，也可以利用它们——'
  raw: '• Most e-commerce companies seemed to need massive investment. How can I produce
    a site on my limited budget?


    • Even successful e-commerce sites expect to take years before they turn a profit.
    My business can’t wait that long. How can I make money now?


    **Deciding Whether to Go Online**


    Although there are hundreds of possible reasons to go online, they tend to fall
    into the following groups:


    • Get more customers


    • Make existing customers spend more


    • Reduce the costs of fulfilling orders


    We’ll look at each of these in the following sections.


    **3**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH01.qxd 10/4/06 6:16 PM Page 4


    **4**


    CH A P TE R 1 ■ S TA RTI NG A N E - CO MME R CE SI TE


    **Get More Customers**


    Getting more customers is immediately the most attractive reason. With an e-commerce
    site, even small businesses can reach customers all over the world. This reason
    can also be the most dangerous, however, because many people set up e-commerce
    sites assuming that the site will reach customers immediately. It won’t. In the
    offline world, you need to know a shop exists before you can go into it. This
    is still true in the world of e-commerce—people must know your site exists before
    you can hope to get a single order.


    Addressing this issue is largely a question of advertising, rather than the site
    itself. Popular methods of getting more customers include registering the web
    site with the popular search engines and directory listings, optimizing the site
    for search-engine ranking, creating forums, sending newsletters, and so on.


    We don’t cover many of these aspects of e-commerce in this book, as we try to
    stay focused on e-commerce development. A simple web search for “web site advertising
    tutorial”


    will point you to many useful resources.


    **Make Customers Spend More**


    Assuming your company already has customers, you probably wish that they bought
    more.


    What stops them? If the customers don’t want any more of a certain product, there’s
    not a lot that e-commerce can do, but chances are there are other reasons, too:


    • Getting to the shop/placing an order by mail is a hassle.


    • Some of the things you sell can be bought from more convenient places.


    • You’re mostly open while your customers are at work.


    • It’s harder to implement an efficient product recommendations system in a physical
    s t o re.


    A quality e-commerce site (because there are so many buggy, insecure, or hard-to-use
    web sites out there) can fix those problems. People with Internet access will
    find placing an order online far easier than any other method—meaning that when
    the temptation to buy strikes, it’s much easier for them to give in. Of course,
    the convenience of being online also means that people are more likely to choose
    you over other local suppliers.


    Because your site is online 24 hours a day, rather than the usual 9 to 5, your
    customers can shop with you outside of their working hours. Having an online store
    brings a double blessing to you if your customers work in offices because they
    can indulge in retail therapy directly from their desks.


    Skillful e-commerce design can encourage your customers to buy things they wouldn’t
    usually think of. You can easily update your site to suggest items of particular
    seasonal interest, to announce interesting new products, or to recommend products
    similar to what that specific customer has already bought.


    Many of the large e-commerce sites encourage customers to buy useful accessories
    along with the main product or to buy a more expensive alternative to the one
    they’re considering.


    Others give special offers to regular shoppers or suggest impulse purchases during
    checkout.


    You’ll learn how to use some of these methods in later chapters; by the end of
    the book, you’ll have a good idea of how to add more features for yourself.


    Finally, it’s much easier to learn about your customers via e-commerce than in
    face-to-face shops, or even mail order. Even if you just gather email addresses,
    you can use these to


    [www.it-ebooks.info](http://www.it-ebooks.info/)'
