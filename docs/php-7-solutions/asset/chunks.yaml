    The code then unsets `$_SESSION['formStarted']`\n    and loops through the `$expected`\
    \ array using\n    each value to access the relevant element of the `$_SESSION`\
    \ array and\n    display it in the unordered list. The session variable is then\
    \ deleted.\n    Deleting the session variables individually leaves intact any\
    \ other\n    session-related information.\n\n12.  Save all the pages, then try\
    \ to load one of the middle pages of the\n    form, or the last one, into a browser.\
    \ You should be taken to the first\n    page. Click Next without filling in either\
    \ field. You’ll be asked to\n    fill in the `first_name` field.\n    Fill in\
    \ the required fields and click Next on each page. The results\n    should be\
    \ displayed on the final page, as shown in Figure [11-5](#332054_4_En_11_Chapter.xhtml#Fig5).\n\
    \n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fig5_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Fig5_HTML.jpg)\n\
    \nFigure 11-5.\n\nThe session variables preserved the input from multiple pages\n\
    \nYou can check your code against `multiple_01_done.php`,\n    `multiple_02_done.php`,\n\
    \    `multiple_03_done.php`,\n    `multiple_04_done.php`,\n    and `multiform.php`\
    \ in the\n    `ch11`\n    folder.\n\nThis is just a simple demonstration of a\
    \ multipage form. In a\nreal-world application, you would need to preserve the\
    \ user input when\nrequired fields are left blank.\nThe script in `multiform.php`\
    \ can be\nused with any multipage form by creating `$_SESSION['formStarted']`\n\
    on the first page after the form has been submitted, and by using `$required`,\
    \ `$firstPage`, `$nextPage`, and `$submit` on each page.\nUse the `$missing` array\
    \ to\nhandle required fields that aren’t filled in.\n\nChapter Review\nIf you\
    \ started this book with little or no knowledge of PHP, you’re\nno longer in the\
    \ beginners’ league, but rather are leveraging the power\nof PHP in a lot of useful\
    \ ways. Hopefully, by now you’ll have begun to\nappreciate that the same or similar\
    \ techniques crop up again and again.\nInstead of just copying code, you should\
    \ start to recognize techniques\nthat you can adapt to your needs and then experiment\
    \ on your own.\nThe rest of this book continues to build on your knowledge but\
    \ brings\na new factor into play: the MySQL relational database (and its drop-in\n\
    replacement, MariaDB), which will take your PHP skills to a higher\nlevel. The\
    \ next chapter offers an introduction to MySQL and shows you\nhow to set it up\
    \ for the remaining chapters.\n\n12. Getting Started with a Database\n\nDynamic\
    \ web sites take on a whole new meaning in combination with a\ndatabase. Drawing\
    \ content from a database allows you to present material\nin ways that would be\
    \ impractical—if not impossible—with a static web\nsite. Examples that spring\
    \ to mind are online stores, such as [Amazon.​com](http://amazon.com); news sites,\
    \ such as the\nBBC ( [`www.bbcnews.com`](http://www.bbcnews.com) ); and the big\
    \ search engines, including Google and\nBing. Database technology allows these\
    \ web sites to present thousands,\noften millions, of unique pages. Even if your\
    \ ambitions are nowhere near\nas grandiose, a database can increase your web site’s\
    \ richness of\ncontent with relatively little effort.\nPHP supports all major\
    \ databases, including Microsoft SQL Server,\nOracle, and PostgreSQL, but it’s\
    \ most frequently used in conjunction\nwith the open source MySQL database. According\
    \ to DB-Engines ( [`http://db-engines.com/en/ranking`](http://db-engines.com/en/ranking)\
    \ ), MySQL ranked as the second most widely used\ndatabase in early 2019, a position\
    \ it has held for many years. However,\ncontroversy surrounds the future of MySQL,\
    \ which Google and Wikimedia\nhave abandoned in favor of MariaDB ( [`https://mariadb.org/`](https://mariadb.org/)\
    \ ), which stands at 15 in the DB-Engines ranking.\nSeveral leading Linux distributions\
    \ have also replaced MySQL with\nMariaDB. This chapter begins with a brief discussion\
    \ of the implications\nof the rivalry between these two databases.\n\nIn this\
    \ chapter, you’ll learn about the following:\n\n*   Understanding how a database\
    \ stores information\n\n*   Choosing a graphical interface to interact with a\n\
    \    database\n\n*   Creating user accounts\n\n*   Defining a database table with\
    \ the appropriate data\n    types\n\n*   Backing up and transferring data to another\
    \ server"
  trans: "\n这段代码设置了 `$firstPage`、`$nextPage` 和 `$submit` 的值，并包含了你刚刚创建的处理脚本。此页面上的表单只包含一个可选字段，因此不需要\
    \ `$required` 变量。如果处理脚本在主页面中未设置该变量，它会自动创建一个空数组。\n\n8.  在 `multiple_03.php` 中，在\
    \ `DOCTYPE` 声明上方的 PHP 代码块中添加以下内容：\n\n```\n// 设置必填字段\n$required = ['city', 'country'];\n\
    $firstPage = 'multiple_01.php';\n$nextPage = 'multiple_04.php';\n$submit = 'next';\n\
    require_once '../includes/multiform.php';\n```\n\n这里有两个必填字段，因此它们的 `name` 属性被列为一个数组并赋值给\
    \ `$required`。其他代码与上一页中的相同。\n\n9.  在 `multiple_01.php`、`multiple_02.php` 和 `multiple_03.php`\
    \ 的 `<form>` 标签上方添加以下代码：\n\n```\n<?php\nif ($missing) {\n    echo '请修复以下必填字段：<ul>';\n\
    \    foreach ($missing as $item) {\n        echo \"<li>$item</li>\";\n    }\n\
    \    echo '</ul>';\n}\n?>\n```\n\n这会显示一个尚未填写的必填字段列表。\n\n10. 在 `multiple_04.php`\
    \ 中，在 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码，以便在用户不是从第一页进入表单时将其重定向回第一页：\n\n```\n<?php\n\
    session_start();\nif (!isset($_SESSION['formStarted'])) {\n    header('Location:\
    \ http://localhost/phpsols-4e/sessions/multiple_01.php');\n    exit;\n}\n?>\n\
    ```\n\n11. 在页面正文中，将以下代码添加到无序列表中以显示结果：\n\n```\n<?php\n$expected = ['city', 'country',\
    \ 'first_name', 'last_name', 'age'];\nforeach ($expected as $key) {\n    echo\
    \ \"<li>$key: \" . htmlentities($_SESSION[$key]) . '</li>';\n    // 删除会话变量\n \
    \   unset($_SESSION[$key]);\n}\n?>\n```\n\n这段代码将表单字段的 `name` 属性列为一个数组，并将该数组赋值给\
    \ `$expected`。这是一种安全措施，用于确保你不会处理可能被恶意用户注入到 `$_POST` 数组中的虚假值。\n\n然后，该代码取消设置 `$_SESSION['formStarted']`，并遍历\
    \ `$expected` 数组，使用每个值访问 `$_SESSION` 数组中的相关元素，并在无序列表中显示它。随后删除会话变量。逐个删除会话变量可以保留其他与会话相关的信息。\n\
    \n12. 保存所有页面，然后尝试在浏览器中加载表单的中间页面之一或最后一页。你应被重定向到第一页。在不填写任何字段的情况下点击“下一步”。系统将提示你填写\
    \ `first_name` 字段。填写必填字段并在每个页面点击“下一步”。最终页面上应显示结果，如图 11-5 所示。\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fig5_HTML.jpg](img/332054_4_En_11_Fig5_HTML.jpg)\n\
    \n图 11-5. 会话变量保留了来自多个页面的输入\n\n你可以在 `ch11` 文件夹中将你的代码与 `multiple_01_done.php`、`multiple_02_done.php`、`multiple_03_done.php`、`multiple_04_done.php`\
    \ 和 `multiform.php` 进行比对。\n\n这只是一个多页面表单的简单演示。在实际应用中，当必填字段留空时，你需要保留用户输入。`multiform.php`\
    \ 中的脚本可用于任何多页面表单，只需在表单提交后的第一页创建 `$_SESSION['formStarted']`，并在每个页面使用 `$required`、`$firstPage`、`$nextPage`\
    \ 和 `$submit`。使用 `$missing` 数组来处理未填写的必填字段。\n\n## 章节回顾\n\n如果你在开始阅读本书时对 PHP 知之甚少或一无所知，那么你已不再属于新手行列，而是正在以许多有用的方式利用\
    \ PHP 的强大功能。希望到现在为止，你已经开始意识到相同或相似的技术会反复出现。你不应只是复制代码，而应开始识别那些可以按需调整的技术，然后自行实践。\n\
    \n本书的其余部分将继续扩展你的知识，但引入了一个新因素：MySQL 关系数据库（以及它的替代品 MariaDB），这将把你的 PHP 技能提升到一个更高的水平。下一章将介绍\
    \ MySQL，并向你展示如何为后续章节进行设置。\n\n## 12. 数据库入门\n\n动态网站与数据库相结合后，将呈现出全新的面貌。从数据库提取内容可以让你以静态网站无法实现（即使不是不可能）的方式呈现内容。脑海中浮现的例子包括\
    \ [Amazon.com](http://amazon.com) 等在线商店、BBC（[www.bbcnews.com](http://www.bbcnews.com)）等新闻网站，以及\
    \ Google 和 Bing 等大型搜索引擎。数据库技术使这些网站能够呈现成千上万，甚至数百万个独特的页面。即使你的目标远没有那么宏大，数据库也可以相对轻松地增加你网站的丰富内容。\n\
    \nPHP 支持所有主流数据库，包括 Microsoft SQL Server、Oracle 和 PostgreSQL，但它最常与开源 MySQL 数据库结合使用。根据\
    \ DB-Engines 排名，截至 2019 年初，MySQL 已成为第二广泛使用的数据库，这一地位已保持多年。然而，围绕 MySQL 的未来存在争议，谷歌和维基百科已转而使用\
    \ MariaDB（排名第 15 位）。一些主要的 Linux 发行版也已用 MariaDB 取代了 MySQL。本章首先简要讨论这两个数据库之间竞争的影响。\n\
    \n在本章中，你将学习以下内容：\n\n* 了解数据库如何存储信息\n* 选择与数据库交互的图形界面\n* 创建用户帐户\n* 使用适当的数据类型定义数据库表\n\
    * 备份数据并将其传输到另一台服务器\n"
- fmt: '# MySQL or MariaDB?


    MySQL was originally developed as a free, open source database by MySQL AB in
    Sweden. It rapidly gained popularity among individual developers and was also
    adopted by major players, such as Wikipedia and BBC News. However, MySQL AB was
    sold to Sun Microsystems in 2008, which in turn was acquired 2 years later by
    Oracle, a major commercial database supplier. Many regarded this as a threat to
    MySQL’s continued survival as a free, open source database. Oracle is on record
    as saying "MySQL is integral to Oracle’s complete, open and integrated strategy."
    But this did little to impress one of MySQL’s original creators, Michael “Monty”
    Widenius, who accused Oracle of removing features from MySQL and of being slow
    to fix security issues.


    Because the MySQL code is open source, Widenius forked it to create MariaDB, which
    is described as “an enhanced, drop-in replacement for MySQL.” Since then, MariaDB
    has started to implement new features of its own. In spite of the break, the two
    database systems are virtually interchangeable. The MariaDB executable uses the
    same name as MySQL (`mysqld` on macOS and Linux, `mysqld.exe` on Windows). The
    main privileges table is also called `mysql`, and the default storage engine identifies
    itself as InnoDB, even though it’s actually a fork of InnoDB called Percona XtraDB.


    As far as the code in this book is concerned, it should make no difference whether
    you use MariaDB or MySQL. MariaDB understands all the MySQL-specific PHP code.
    It’s also supported by the phpMyAdmin graphical interface for MySQL that I’ll
    be using in the remaining chapters.


    > **Note**: To avoid constant repetition, you should assume that all references
    to MySQL apply equally to MariaDB, except where I make a specific reference to
    MariaDB.


    ## How a Database Stores Information


    All the data in a relational database, such as MySQL, is stored in tables, very
    much in the same way as in a spreadsheet, with information organized into rows
    and columns. Figure 12-1 shows the database table that you will build later in
    this chapter, as displayed in phpMyAdmin.


    ![images/332054_4_En_12_Chapter/332054_4_En_12_Fig1_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Fig1_HTML.jpg)


    *Figure 12-1. A database table stores information in rows and columns like in
    a spreadsheet*


    Each **column** has a name (`image_id`, `filename`, and `caption`) indicating
    what it stores. The rows aren’t labeled, but the first column (`image_id`) contains
    a unique value known as a **primary key**, which identifies the data associated
    with the row. Each row contains an individual **record** of related data. The
    intersection of a row and a column, where the data is stored, is called a **field**.
    For instance, the `caption` field for the third record in Figure 12-1 contains
    the value "The Golden Pavilion in Kyoto," and the primary key for that record
    is 3.


    > **Note**: The terms "field" and "column" are often used interchangeably, particularly
    in older versions of phpMyAdmin. A field holds one piece of information for a
    single record, whereas a column contains the same field for all records.


    ## How Primary Keys Work


    Although Figure 12-1 shows `image_id` as a consecutive sequence from 1 to 8, they’re
    not row numbers. Figure 12-2 shows the same table with the captions sorted in
    alphabetical order. The field highlighted in Figure 12-1 has moved to the seventh
    row, but it still has the same `image_id` and `filename`.


    ![images/332054_4_En_12_Chapter/332054_4_En_12_Fig2_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Fig2_HTML.jpg)


    *Figure 12-2. The primary key identifies the row even when the table is sorted
    in a different order*


    Although the primary key is rarely displayed, it identifies the record and all
    the data stored in it. Once you know the primary key of a record, you can update
    it, delete it, or use it to display data in a separate page. Don’t worry about
    how you find the primary key. It’s easily done using **Structured Query Language**
    (SQL), the standard means of communicating with all major databases. The important
    thing to remember is to assign a primary key to every record.


    > **Tip**: Some people pronounce SQL like the word "sequel." Others spell it out
    as "ess-queue-ell." The official pronunciation of MySQL is "My-ess-queue-ell."


    - A primary key doesn’t need to be a number, but *it must be unique*.

    - Product numbers make good primary keys. They may consist of numbers, letters,
    and other characters, but are always unique. Social Security and staff ID numbers
    are also unique, but could lead to personal data breaches because primary keys
    are appended to query strings when retrieving or updating data.

    - MySQL can generate a primary key for you automatically.

    - Once a primary key has been assigned, it should never repeat, and never be changed.


    Because a primary key must be unique, MySQL doesn’t normally reuse the number
    when a record is deleted. Although this leaves gaps in the sequence, it’s unimportant.
    The purpose of the primary key is to identify the record. Any attempt to close
    the gaps puts the integrity of the database at serious risk.


    > **Tip**: Some people want to remove gaps in the sequence to keep track of the
    number of records in a table. It’s not necessary, as you’ll discover in the next
    chapter.


    ## Linking Tables with Primary and Foreign Keys


    Unlike a spreadsheet, most databases store data in several smaller tables, rather
    than in one huge table. This prevents duplication and inconsistency. Let’s say
    you’re building a database of your favorite quotations. Instead of typing out
    the name of the author each time, it’s more efficient to put the authors’ names
    in a separate table and store a reference to an author’s primary key with each
    quotation. As you can see in Figure 12-3, every record in the left-hand table
    identified by `author_id 32` is a quotation from William Shakespeare.


    ![images/332054_4_En_12_Chapter/332054_4_En_12_Fig3_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Fig3_HTML.jpg)


    *Figure 12-3. Foreign keys are used to link information stored in separate tables*


    Because the name is stored in only one place, it guarantees that it’s always spelled
    correctly. And if you do make a spelling mistake, just a single correction is
    all that’s needed to ensure that the change is reflected throughout the database.


    Storing a primary key from one table within another table is known as creating
    a **foreign key**. Using foreign keys to link information in different tables
    is one of the most powerful aspects of a relational database. It can also be difficult
    to grasp in the early stages, so we’ll work with single tables until Chapters
    17 and 18, which cover foreign keys in detail. In the meantime, bear the following
    points in mind:


    - When used as the primary key of a table, the value must be unique within the
    column. So each `author_id` in the table on the right of Figure 12-3 is used only
    once.

    - When used as a foreign key, there can be multiple references to the same value.
    So `32` appears several times in the `author_id` column in the table on the left.'
