    # 2.6 一些重要的术语


    在深入探讨之前，我想先澄清本书中使用的一些术语。使用 IaaS 时，你租用的大致是机器。它们是*虚拟*机器（即真实机器划分出的分区），但抽象来说，它们本身仍可被视为机器。在云计算术语中，它们通常被称为*节点*。由于它们为网络上的其他机器和/或用户提供服务，因此也被视为*服务器*。因此，节点常被称作
    VPS——虚拟专用服务器。在本书中，`machine`、`node` 和 `server` 这三个术语基本可以互换使用，不过选择哪个特定术语通常取决于你当时的用法。


    *集群* 是一组协同工作的节点。因此，我们正在云端构建一个集群。一种为在云端实现可扩展性而构建的服务被称为*云集群*，或者简称为*云*。


    *可扩展性* 是云计算中的一个重要术语。可扩展性与性能不同。性能指的要么是效率，要么是原始速度。可扩展性指的是系统快速扩展其处理能力的能力。例如，一个每秒能处理
    2,000 个请求的程序可能被视为高性能，但如果这个程序的速度无法通过增加节点来提升，那么它就不具备可扩展性。


    另一方面，即使是低性能的程序也可能是可扩展的。如果我的程序每秒只处理 1 个请求，但我每增加一个节点，它能处理的请求数量都会增加，那么我的程序就是可扩展的。如果我将这个低性能程序扩展到
    4,000 个节点，它将能够处理比之前那个最多每秒处理 2,000 个请求的程序更多的请求。整个集群（拥有 4,000 个节点）现在可能会因为整体吞吐量而被视为高性能，即使其各个部分并非高性能。


    通常，可扩展性取决于你*并行化*任务的能力。并行化指的是任务能够彼此独立运行，甚至在其他机器上运行的能力。两个任务需要相互协调的程度越高，它们的可并行化程度就越低。在设计面向可扩展性的应用程序时，你需要特别关注系统不同部分需要协调的方式，并力求最小化或消除这些协调点的影响。


    希望你所构建的东西*既*是高性能的（即使节点数量较少）*又*是可扩展的（以便增加更多节点能提升性能）。让应用表现良好，需要寻找低效代码并用快速代码替换，或者重写应用以避免使用低效代码。让应用具备可扩展性，则需要寻找阻碍并行化的*瓶颈*，并将这些瓶颈替换为能够扩展到多个节点的代码，或者重新设计你的架构，使瓶颈根本不会出现。


    本书的重点是可扩展性，不过也会兼顾性能。


    ### 告别服务器机房


    这里有一个关于我不再怀念处理服务器机房事宜的有趣故事。在 20 世纪 90 年代末，我曾在一家托管自己服务器的公司担任程序员/系统管理员。这些服务器不在标准的服务器机架里，而是放在金属线架上。主要的面向外部的服务器就在顶层架子上。


    这台服务器需要增加一些硬盘空间，于是我给它安装了一个外部硬盘组。那时，连接外部存储到服务器的主要方式叫做 SCSI（发音为“scuzzy”），并且问题多多。过了一段时间，服务器访问硬盘组开始出现大量问题，于是我去排查。


    由于服务器在顶层架子上，我站在凳子上操作机器。我花了大约半个小时试图找出问题所在。要知道，这发生在我们的主外部服务器上，所以每一分钟都很宝贵，因为我们的（非常活跃的）网站正出现问题。


    于是，我设法把所有数据从新的硬盘组中移出，然后断开硬盘连接，准备把它们拿回办公室看看问题出在哪里。然而，我站在凳子上摆弄电脑太久了，以至于忘了自己还站在凳子上。所以，我抓起硬盘组就想走出房间，至少我是这么想的。庆幸的是，我和硬盘组都没有摔伤，但我的自尊心确实受到了伤害。


    虽然回忆这样的故事很有趣，但我很高兴那些日子已经过去了。


    # 3. 设置云服务器


    与大多数云提供商一样，在 Linode 上设置云服务器非常简单。本章将通过截图向您展示启动并运行的基本流程。


    ## 3.1 创建你的虚拟服务器


    希望你作为一名 Web 开发人员或管理者，能够轻松注册 Linode 服务。它需要预先提供信用卡信息，但你会发现在本书中运行所有内容的成本可能比书本身还低，前提是你在使用完毕后关闭服务。


    在继续之前，现在就去创建你的 Linode 账户吧。


    注册并登录后，Linode 会带你到你的控制面板，它看起来应该像图 3-1 所示。


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig1_HTML.jpg](img/487291_1_En_3_Fig1_HTML.jpg)


    *图 3-1: Linode 控制面板*


    你目前还没有设置任何东西，所以你的控制面板几乎是空的。要开始操作，请点击“创建”按钮。Linode 将它们的虚拟服务器称为“节点”或 “Linodes”，因此选择“Linode”来创建一台新机器。


    然后，Linode 会询问你几个问题，以帮助你配置节点供使用。虽然有很多好的选择，但为了能够跟随本书操作，请使用此处给出的选项：


    1. 在“选择发行版”下，选择“CentOS 7”。

    2. 在“区域”下，选择哪个区域无关紧要，但为了让你的服务器能够相互通信，每次都必须选择同一个区域。本书将使用“达拉斯，德克萨斯州”设施。

    3. 在“Linode 方案”下，最便宜且足以满足我们需求的方案是“Nanode 1GB”方案。在撰写本文时，此方案每小时运行成本不到 1 美分。

    4. 在“Linode 标签”下，我们将这台机器命名为 `template_node`。

    5. 你可以忽略“添加标签”部分。当你有很多机器时，标签有助于对机器进行分组。

    6. 在“Root 密码”下，为此机器添加一个密码。请确保密码安全，因为有很多黑客会四处尝试各种 Root 账户的密码。每个月遭遇 50,000 次此类黑客攻击尝试并不罕见。

    7. 暂时，你可以保留“可选附加组件”不做改动。我们将在本书后面处理备份和私有 IP 地址。


    设置完所有这些后，点击“创建”按钮，Linode 将开始构建你的机器。Linode 会带你进入该机器的控制面板，其中会有一个进度条和一个“活动日志”（见图
    3-2）。当进度条完成时，你就成为了云端一台新服务器的自豪拥有者！


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig2_HTML.jpg](img/487291_1_En_3_Fig2_HTML.jpg)


    *图 3-2: 你的新节点的控制面板*

