    }\n```\n\n**4.** 在同一方法中，进行如下修改：\n\n```php\nforeach ($shipping_regions as $item)\n\
    \    if ($item['shipping_region_id'] ==\n        $this->mCustomerData['shipping_region_id'])\n\
    \        $this->mShippingRegion = $item['shipping_region'];\n}\nif ($this->mNoCreditCard\
