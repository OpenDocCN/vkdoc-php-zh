    ## Summary


    *   An array is a collection of values joined by a common name. The values, in
    general, can be of different types.

    *   An array element is accessed by the key or index (indicated in square brackets
    after the array name). Keys/indexes can be integers or strings.

    *   There are several ways to create an array. Namely, you can assign values to
    array elements, use the `array()` function (syntax construction), or list the
    values of the array elements in square brackets. If the keys/indexes are not specified
    explicitly, they are calculated automatically.

    *   You can use the `foreach` loop statement to iterate over the contents of an
    array. It allows you to access the keys and values of the array elements.

    *   The array elements can be arrays. In that case, the elements of the internal
    arrays are accessed using multiple keys.

    *   You can perform various operations on arrays, including assignment and comparison
    for equality/inequality. You can also concatenate arrays.

    *   There exist special functions designed to handle arrays.


    # 5. Functions


    > *—I notice you spend a lot of time fixing stuff, Willie.*

    > *—That’s because you spend a lot of time breaking stuff, Alf.*

    > *—Well, it’s nice that our hobbies are so compatible.*

    > —*ALF* (TV series)


    This chapter introduces functions, which play an essential role in any programming
    language. The PHP language is not an exception. You learn how to create functions,
    how they can be used, and what is unique about functions in the PHP language.


    ## Creating Functions


    Very often in programs, you must execute many times the same sequence of commands.
    It is convenient to write such commands as a separate block of code and then,
    if necessary, simply put the instruction that means the execution of the corresponding
    block of commands. In general terms, that idea underlies the use of functions.


    A function is a named block of code that can be called by that name. In other
    words, you form a block of commands, specify a name for that block of commands,
    and every time you need the block of commands executed, you just specify its name.
    As usual, you use commands to process some values or data. If you are intended
    to process such values during the function call, the function should be called
    with an argument (or arguments). Traditionally, function arguments are specified
    in parentheses after the function name. If there are multiple arguments, they
    are separated by commas.


    Before calling a function, it must be declared (or created). The description of
    a function implies that you must define what commands are executed when the function
    is called and what operations are performed on the arguments (if any). So, how
    is a function defined in PHP?


    A function declaration begins with the `function` keyword followed by the function
    name and a list of arguments in parentheses. Arguments are similar to variables
    and are identified with the values passed to the function when called. If the
    function has no arguments, empty parentheses are placed after the function name
    in the function’s description. The commands executed when the function is called
    are placed in a block enclosed in curly braces. The following is the general function
    declaration template.


    ```

    function name(arguments){

    // commands

    }

    ```


    Commands in the body of a function may refer to the function arguments, and the
    function arguments are described as variable names (the argument names begin with
    the `$` symbol). When a function is called and arguments are passed to it, the
    commands described in its body are executed. In that case, in those places where
    the arguments are put in the code, the actual values passed to the function are
    used.


    | Details |

    | --- |

    | Function names are not case-sensitive. In other words, whether the function
    name is in uppercase or lowercase letters doesn’t matter. For example, if you
    have the `show()` function, then that is the same as the `SHOW()` or `Show()`
    function. It is also worth mentioning that traditionally, function names are specified
    with empty parentheses after the function name. That is usually done to distinguish
    function names from variable names. As you know, in PHP, the distinguishing feature
    of variable names is the `$` symbol with which the name begins. Nevertheless,
    the tradition is held. |


    To call a function, it is enough to specify its name and parentheses: empty if
    the function has no arguments and with a list of values if there are arguments.
    A small example in which you declare and then call a function is shown in Listing
    [5-1](#613529_1_En_5_Chapter.xhtml#PC2).


