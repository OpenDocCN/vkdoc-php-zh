    Questions


    1\. CakePHP makes a large number of assumptions about the naming conventions


    and default configuration of our application, allowing it to achieve very much
    with very little code. What are some of the benefits and drawbacks of this approach
    to application development?


    2\. CakePHP, like Zend Framework, uses a custom file extension for its template
    files.


    How could this introduce security errors for our applications?


    Answers


    1\. CakePHP’s approach to convention over configuration means that we can do


    very much with very little code. It’s beneficial as developers can rapidly prototype
    applications without repeating the same tasks common to each application. It also
    requires that developers learn the conventions before being able to efficiently
    use the framework.


    2\. Files that contain PHP code, yet do not have the .php extension, could possibly
    be interpreted as plain text files or plain HTML files (by the web server responsible
    for serving the files). It is recommended that you use .php files for everything
    that contains PHP code, or at the very least ensure that every web-accessible
    folder that serves files containing PHP serves these files with the PHP mime type.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


