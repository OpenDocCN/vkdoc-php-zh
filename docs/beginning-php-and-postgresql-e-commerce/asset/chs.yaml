  ■**提示** 如需了解更多关于 PostgreSQL 或 PHP（包括 PostgreSQL 数据类型）的任何具体细节，你始终可以参考 W. Jason Gilmore
  的《Beginning PHP and PostgreSQL 8: From Novice to Professional》（Apress, 2006），这是一本极好的参考书。


  为保持表格简洁，在“数据类型”标题下，我们列出了本项目中使用到的类型，而相似的数据类型则在“描述与备注”标题下加以说明。你无需记住整个列表，但应对哪些数据类型可用有所了解。


  **表 3-1.** *用于 HatShop 的 PostgreSQL 服务器数据类型*


  | **数据类型** | **大小（字节）** | **描述与备注** |

  | --- | --- | --- |

  | `integer` | 4 字节 | 有符号 4 字节整数，存储范围从 `-2,147,483,648` 到 `2,147,483,647`。你也可以使用别名
  `int` 和 `int4` 来指代它。相关类型有 `bigint`（8 字节）和 `smallint`（2 字节）。 |

  | `numeric` | 可变 | 以精确精度存储数字。`(precision, scale)` 中的 `precision`（精度）指定数字可以包含的总位数（包括小数点右边的位数）。`scale`（小数位数）指定数字小数部分的位数。整数的
  `scale` 为 `0`。PostgreSQL 文档以数字 `23.5141` 为例，其 `precision` 为 6，`scale` 为 4。你将使用 `numeric`
  类型来存储货币信息，因为它具有精确精度。 |

  | `timestamp` | 8 字节 | 存储从公元前 4713 年到公元 5874897 年的日期和时间数据。 |

  | `character` | 可变 | 存储固定长度的字符数据。比最大值短的字符串会用空格补充，而更长的字符串则会被截断。在比较这种类型的值时，尾随空格不会被考虑在内。该数据类型常用的别名是
  `char`。 |

  | `character varying` | 可变 | 存储可变长度的字符数据。该数据类型常用的别名是 `varchar`。你设置的维度（dimension）代表它能接受的最大字符串长度（更长的字符串会被截断）。
  |

  | `text` | 无限 | 存储长度无限的字符串。PostgreSQL 文档指出，`text` 和 `character varying` 字符串数据类型之间没有性能差异。
  |

  | `serial` | 4 字节 | 这不是一个“真正的”数据类型，而是一种用于定义自动编号整数列的约定，类似于 MySQL 中的 `AUTO_INCREMENT`
  或 SQL Server 中的 `IDENTITY`。在 PostgreSQL 7.3 或更高版本中，`serial` 并不意味着 `UNIQUE`，如果你希望该列存储唯一值，则必须（且应该）明确指定这一点。`serial`
  的变体是 `bigserial` 类型，它在 `bigint` 之上实现了自动编号功能。 |


