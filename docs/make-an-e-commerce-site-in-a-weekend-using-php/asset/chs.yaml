  \ {\n        extract($row);\n        echo \"<tr><td>\";\n        echo $cart_itemcode;\n\
  \        echo \"</td>\";\n        echo \"<td><form method=\\\"POST\\\" action=\\\
  \"cart.php?action=change&icode=$cart_itemcode\\\"><input type=\\\"text\\\" name=\\\
  \"modified_quantity\\\" size=\\\"2\\\" value=\\\"$cart_quantity\\\">\";\n      \
  \  echo \"</td><td>\";\n        echo $cart_item_name;\n        echo \"</td><td>\"\
  ;\n        echo $cart_price;\n        echo \"</td><td>\";\n        $totalquantity\
  \ = $totalquantity + $cart_quantity;\n        $totalprice = number_format($cart_price\
  \ * $cart_quantity, 2);\n        $totalamount=$totalamount + ($cart_price * $cart_quantity);\n\
  \        echo $totalprice;\n        echo \"</td><td>\";\n        echo \"<input type=\\\
  \"submit\\\" name=\\\"Submit\\\"  value=\\\"Change quantity\\\"></form></td>\";\n\
  \        echo \"<td>\";\n        echo \"<form method=\\\"POST\\\" action=\\\"cart.php?action=delete&icode=$cart_itemcode\\\
  \">\";\n        echo \"<input type=\\\"submit\\\" name=\\\"Submit\\\" value=\\\"\
  Delete Item\\\"></form></td></tr>\";\n    }\n    echo \"<tr><td >Total</td><td>$totalquantity</td><td></td><td></td><td>\"\
  ;\n    $totalamount = number_format($totalamount, 2);\n    echo $totalamount;\n\
  \    echo \"</td></tr>\";\n    echo \"</table><br>\";\n    echo \"<div style=\\\"\
  width:400px; margin:auto;\\\">You currently have \" . $totalquantity . \" product(s)\
  \ selected in your cart</div> \";\n    ?>\n    <table border=\"0\" style=\"margin:auto;\"\
  >\n    <tr><td  style=\"padding: 10px;\">\n    <form method=\"POST\" action=\"cart.php?action=empty\"\
  >\n    <input type=\"submit\" name=\"Submit\" value=\"Empty Cart\" style=\"font-family:verdana;\
  \ font-size:150%;\" >\n    </form>\n    </td><td>\n    <form method=\"POST\" action=\"\
  checklogin.php\">\n    <input id=\"cartamount\" name=\"cartamount\" type=\"hidden\"\
  \ value= \"<?php echo $totalamount ; ?>\">\n    <input type=\"submit\" name=\"Submit\"\
  \ value=\"Checkout\"  style=\"font-family:verdana; font-size:150%;\" >\n    </form>\n\
  \    </td></tr></table>\n    <?php\n}\n?>\n</body>\n</html>\n```\n\n该程序确定会话 ID 是否已设置。如果未设置，则启动一个新会话。如前所述，会话\
  \ ID 有助于识别特定网站访问者选择的产品。此后，建立与 MySQL 服务器的连接，并选择`shopping`数据库。执行 SQL 查询，以检查具有给定会话\
  \ ID 的购物车中是否有任何产品。如果有，则表示该访问者已经向购物车中添加了一个或多个产品。在这种情况下，购物车中存储的所有商品及其各自的数量都会显示在屏幕上。\n\
  \n如果在`cart`表中未找到与给定会话 ID 匹配的产品，则表示购物车中没有产品。屏幕上会显示一条消息，告知访问者“购物车中已选择 0 件产品”。\n\n\
  该脚本使访问者能够执行以下任务：\n\n*   通过从顶部菜单中选择任何商品类别，向购物车添加更多产品。\n*   修改购物车中任何商品的数量。\n*   从购物车中删除某件商品或清空整个购物车。\n\
  \n\n\n运行脚本后，您会在购物车中看到选中的产品，如图 4-2 所示。请注意，此时购物车中只选中了一个产品。\n\n![A978-1-4842-1672-9_4_Fig2_HTML.jpg](img/A978-1-4842-1672-9_4_Fig2_HTML.jpg)\n\
  \n图 4-2. 维护购物车\n\n假设访客向购物车中添加了两部 iPhone 智能手机，购物车内容现在应如图 4-3 所示。\n\n![A978-1-4842-1672-9_4_Fig3_HTML.jpg](img/A978-1-4842-1672-9_4_Fig3_HTML.jpg)\n\
  \n图 4-3. 展示购物车中选中的商品\n\n您始终可以通过在文本框中输入所需数量，然后点击该商品行中的“更改数量”（Change Quantity）按钮，来更改任何产品的数量。将\
