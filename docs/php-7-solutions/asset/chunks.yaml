    \ tables until Chapters [17](#332054_4_En_17_Chapter.xhtml) and [18](#332054_4_En_18_Chapter.xhtml),\
    \ which cover foreign keys in\ndetail. In the meantime, bear the following points\
    \ in mind:\n\n*   When used as the primary key of a table, the value must be unique\n\
    \    within the column. So each `author_id` in the\n    table on the right of\
    \ Figure [12-3](#332054_4_En_12_Chapter.xhtml#Fig3) is used only\n    once.\n\n\
    *   When used as a foreign key, there can be multiple references to\n    the same\
    \ value. So `32` appears several\n    times in the `author_id` column in\n   \
    \ the table on the left."
