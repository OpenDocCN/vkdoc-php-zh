  ```\n\n`init()` 方法延续了构造函数的工作，首先获取请求的产品列表。它通过分析 `mCategoryId` 和 `mDepartmentId` 成员（得益于构造函数，它们代表了查询字符串参数\
  \ `CategoryID` 和 `DepartmentID` 的值）来决定调用业务层的哪个方法。\n\n如果查询字符串中存在 `CategoryID`，则说明访客正在浏览某个子类别，因此调用\
  \ `GetProductsInCategory` 来获取该类别中的产品。如果只存在 `DepartmentID`，则调用 `GetProductsOnDepartmentDisplay`\
