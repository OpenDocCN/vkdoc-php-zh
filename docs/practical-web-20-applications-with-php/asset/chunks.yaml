    Introduction


    **M**any of today’s web development books and articles cover single aspects of
    the development life cycle, delving only into specific features rather than looking
    at the whole picture.


    In this book, we will develop a complete web application. Although we will be
    using various third-party libraries and tools to aid in development, we will be
    developing the application from start to finish.


    The focus of this book is on Web 2.0, a catchphrase that has been in use for a
    few years now and is typically used to refer to web sites or web applications
    that have particular characteristics. Some of these characteristics include the
    following:


    • Correctly using HTML/XHTML, CSS, and other standards


    • Using Ajax (Asynchronous JavaScript and XML) to provide a responsive application
    without requiring a full refresh of pages


    • Allowing syndication of web site content using RSS


    • Adding wikis, blogs, or tags


    Although not everybody is an advocate of the “Web 2.0” phrase, the term does signify
    forward progress in web development. And although not everybody has the need to
    provide a wiki or a blog on their web site, the other characteristics listed (such
    as correct standards usage) provide a good basis for a web site and should be
    used by all developers, regardless of how they want their web site or application
    categorized.


    I wrote this book because I want to share with other users how I build web sites.
    Having been a web developer for ten years now (full-time for the past seven),
    I have a solid understanding of a wide range of web-related topics and have much
    to offer newer developers or developers looking to expand their own knowledge.


    **Who This Book Is For**


    This book has been written primarily for intermediate to expert PHP programmers.
    Although programmers of all levels will benefit from this book, we do jump in
    to the deep end very quickly, so some prior knowledge of PHP is assumed.


    Having said that, if you’re relatively new to PHP, you will definitely benefit
    from this book because it will formalize some of the techniques you have already
    learned and will show you some different ways of approaching various problems.


    In this book, I have made the assumption that you are familiar with HTML and CSS,
    although since most of the code developed in this book is PHP and JavaScript,
    an advanced knowledge of HTML and CSS is not critical. All JavaScript code is
    explained thoroughly, which, in combination with the Prototype JavaScript library
    we will be using, makes the listings relatively straightforward.


