    \ />';\n    echo '... and the hash of \"' . HASH_PREFIX . $original_string .\n\
    \        '\" (secret prefix concateneted with password) is ' .\n        PasswordHasher::Hash($original_string,\
    \ true);\n}\n?>\n<br /><br />\n<form action=\"test_hasher.php\">\nWrite your password:\n\
    <input type=\"text\" name=\"to_be_hashed\" /><br />\n<input type=\"submit\" value=\"\
    Hash it\" />\n</form>\n```\n\n**4.** Load the `test_hasher.php` file in your favorite\
    \ browser, enter a password to hash, and admire the results as shown in Figure\
    \ 11-1.\n\n**Figure 11-1.** *Testing the password hashing functionality*\n\n###\
    \ How It Works: The Hashing Functionality\n\nThe code in the `PasswordHasher`\
    \ class is pretty simple. By default, the static `Hash()` method returns the hash\
    \ of a string representing the secret prefix concatenated with the password.\n\
    \nYou might be wondering what the secret prefix is all about. As you might have\
    \ already guessed, it has to do with security. If your database is stolen, the\
    \ thief could try to match the hashed password values with a large dictionary\
    \ of hashed values that looks something like this:\n\n```\nword1 .... sha1(word1)\n\
    word2 .... sha1(word2)\n...\nword10000 .... sha1(word10000)\n```\n\nIf two hash\
    \ values match, it means the original strings (which, in our case, are the customers’\
    \ passwords) also match.\n\nAppending a secret prefix to the password before hashing\
    \ it reduces the risk of dictionary attacks on the hashed passwords database because\
    \ the resulting string being hashed (secret prefix + password) is less likely\
    \ to be found in a large dictionary of “password – hash value” pairs.\n\nThe `test_hasher.php`\
    \ page tests your newly created `PasswordHasher` class.\n\n> **Note:** You can\
    \ also handle hashing at the database level by using PostgreSQL cryptographic\
    \ functions.\n> First, you need to add cryptographic functions to PostgreSQL.\
