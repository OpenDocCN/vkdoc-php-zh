- fmt: '# 2. What Is the Cloud


    There is a little bit of confusion over what it is to “be in the cloud.” Some
    people even mistakenly think that just being on the Internet is utilizing cloud
    technology.


    The essential difference between cloud technology and other types of Internet
    hosting is that a cloud service offers at least the ability to scale your application
    quickly. Historically, developers would deploy their web application to fixed
    servers that they purchased or leased at a specific facility. It was possible
    to get more equipment, but this always involved quite a bit of time and effort.
    Oftentimes, the developer would have to put together a large capital outlay for
    the servers, purchase them, configure them, and deploy them. This process could
    take weeks or even months. Even when purchasing direct from a hosting company,
    the process of putting together a quote and getting everything up and running
    could take more than a week.


    The promise of the cloud is that, rather than having to go through the process
    of physical setup for new servers, additional capacity can be granted either instantaneously
    or at least within minutes or hours rather than days, weeks, or months. With some
    solutions, you don’t even have to worry about machines—the cloud solution automatically
    scales your application across as many machines as you need. With others, it is
    just a few clicks to request, image, and boot up a new machine that is a replica
    of some existing machine and then add it to your web application.


    In any case, the core idea of the cloud is instant, automated scalability and
    flexibility.


    Many cloud providers even provide access to more than one data center. Do you
    want a set of servers in America and a set of servers in Europe? No problem. With
    just a few clicks, you can get it done.


    ## 2.1 Infrastructure as a Service


    Cloud computing is often confusing because there are several different *types*
    of cloud computing, each of which has its own benefits and drawbacks. The difference
    between the types of cloud services is mostly based on the level of abstraction
    that is being offered.


    The most basic type of cloud service, which this book will focus on, is called
    *Infrastructure as a Service*, abbreviated IaaS. IaaS means that you can purchase
    and deploy pieces of infrastructure (servers, load balancers, firewalls, etc.)
    with just a click of the button. This is done through server virtualization technology.


    Server virtualization allows an IaaS service company to deploy a single, very
    large server and split it up into multiple, smaller servers. Each server runs
    a *hypervisor* program, which allows the company to split up the server quickly
    and automatically. A company might take a computer with 16 processors and 64 gigabytes
    of RAM and split it up into 4 virtual machines, each with 4 processors and 16
    gigabytes of RAM.


    Doing this has three advantages. The first is space. By buying the biggest machine,
    the IaaS company gives themselves the most computing power per rack unit, which
    is a valuable commodity in server rooms. Therefore, by buying a single, big machine
    and splitting it into four smaller machines, they have only used a fourth of the
    space that they might otherwise have done.


    The second is cost per CPU core. By packing so many CPU cores and so much memory
    into a single server, their cost per CPU core and cost per gigabyte of memory
    go down. Therefore, by buying larger computers, they can deliver a lower cost
    per CPU core to the user who buys the smaller, virtual servers.


    The third advantage, however, is the most important—manageability. In order to
    support virtualization, a small part of each machine is dedicated to the hypervisor—the
    small operating system that manages the other virtual machines on the server.
    Because the machines are virtual machines, and not real hardware devices, they
    are incredibly easy to manage. An operator can send a command to a hypervisor,
    and it can instantly set up a new virtual machine, clone a new boot disk, and
    start up the new virtual server in minutes.


    Historically, if I wanted a new server, I would have to buy the server, then,
    while being physically at the console, would have to install the relevant operating
    system and system software, and finally carry the server to the rack where I plug
    it in and turn it on. I have to make sure the network is plugged in and configured.
    I might have to configure the BIOS to allow for keyboard-disconnected operation.
    If there is a problem with the machine, I have to make a backup of the machine,
    find a new physical machine, copy the backup to the new machine, install the new
    machine, and physically swap it out with the old machine.


    With virtualized machines, I can let the hypervisor take care of all of that.
    All I need are enough extra servers running hypervisors so that when I need a
    new machine, I can just tell a hypervisor to create a new virtual machine for
    me, and where the copy of the disk is that I want to use.


    What’s even better is that with most IaaS platforms, you don’t even need to worry
    about hypervisors and capacity. The IaaS vendor does all of that for you. The
    IaaS vendor provides a point-and-click interface that allows you to boot up virtual
    servers just by logging in to your web management console. You tell it how big
    of a machine you want (i.e., number of CPU cores and size of memory), and it will
    allocate a server for you. You tell it what you want on it (either a base operating
    system or a clone of an existing machine), and it will copy that to its boot disk
    and boot it up for you. Voilà! You have a new server ready to go.


    Additionally, with most IaaS services, if there are physical hardware issues,
    the service will take care of it for you. If a severe hardware problem is detected,
    they will simply turn off your server, migrate it to a new one, start it back
    up, and send you an e-mail letting you know what happened. If it is a less severe
    problem, some vendors will give you a notification, requesting that you push a
    button to perform the migration at a time that is most convenient for you.


    Even better is the pricing model. Most IaaS vendors have an option for *hourly*
    pricing. Do you need a machine, but just for a few hours? With Linode, you can
    get a 32-core and 64 gigabyte machine for well under $1.00 per hour!


    In Chapter [3](#487291_1_En_3_Chapter.xhtml), we will look at the specific steps
    required to set up a cloud server.


    ## 2.2 Platform as a Service


    Another option for scaling applications is known as *Platform as a Service*, which
    is abbreviated as PaaS. With PaaS, rather than giving you bare machines and letting
    you run whatever you wish, a PaaS *defines* a platform for you to run your application
    on. The PaaS vendor manages the entire platform, and you just have to worry about
    your application.


    For instance, Heroku is a popular PaaS vendor. Heroku handles all of the server
    administration and maintenance. You don’t even get to log in to their machines!
    You simply push the code to them, and they deploy it on their machines for you.
    Other common PaaS vendors include Google App Engine, Windows Azure, Amazon’s Elastic
    Beanstalk, and OpenShift.


    With PaaS, you choose how many “workers” to use, and the system will distribute
    that work across however many machines are needed (a worker is just an active
    process, and each PaaS vendor has their own term for it). Thus, the PaaS vendor
    takes care of the *platform* (hardware, operating system, installed applications),
    and you just manage the application code.


    This sounds great in theory—you no longer have to manage servers at all! It is
    all done for you automagically behind the scenes. However, the reality is that
    PaaS platforms are not as transparent as they appear, and PaaS vendors tend to
    price their value addition fairly high.'
