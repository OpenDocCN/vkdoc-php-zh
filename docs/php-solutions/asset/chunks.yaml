    再次测试页面。当您从下拉菜单中选择图像时，它会像以前一样正常显示。但如果您在查询字符串中输入一个超出范围的值，则会看到以下信息：


    - 对于 PDO，使用 `$result->rowCount()` 代替 `$result->num_rows`。

    - 如果查询没有返回任何行，PHP 会将 0 隐式视为 `false`，因此条件判断失败，转而执行 `else` 子句。


    ![A978-1-4842-0635-5_11_Fign_HTML.jpg](A978-1-4842-0635-5_11_Fign_HTML.jpg)


    修改后的代码位于 `ch11` 文件夹中的 `mysqli_integer_03.php` 和 `pdo_integer_03.php`。


    ### PHP 解决方案 11-7：使用 `real_escape_string()` 在 MySQLi 中插入字符串


    本 PHP 解决方案展示了如何使用 MySQLi 的 `real_escape_string()` 方法将搜索表单中的值插入到 SQL 查询中。除了处理单引号和双引号之外，它还会转义其他控制字符，例如换行符和回车符。


    提示


    仅当需要将来自外部源的一两个字符串值插入到查询中，或者该查询仅使用一次时，此 MySQLi 专属技术才更有用。对于更复杂的查询，请使用准备好的语句，如下一节所述。要在
    PDO 中嵌入字符串，始终建议使用准备好的语句。


    从 `ch11` 文件夹复制 `mysqli_real_escape_01.php`，并将其保存到 `mysqli` 文件夹中，命名为 `mysql_real_escape.php`。该文件包含一个搜索表单和一个用于显示结果的表格。在
    `DOCTYPE` 声明之上的 PHP 代码块中添加以下代码：


    ```

    if (isset($_GET[''go''])) {

    require_once ''../includes/connection.php'';

    $conn = dbConnect(''read'');

    $searchterm = ''%'' . $conn->real_escape_string($_GET[''search'']) . ''%'';

    }

    ```


    在下一行（右花括号之前）添加 `SELECT` 查询：


    ```

    $sql = "SELECT * FROM images WHERE caption LIKE ''$searchterm''";

    ```


    - 如果表单已提交，这将包含连接文件并为只读用户帐户建立连接。然后，将 `$_GET[''search'']` 传递给连接对象的 `real_escape_string()`
    方法，使其能够安全地合并到 SQL 查询中，并在结果两端连接 `%` 通配符，然后将结果赋值给 `$searchterm`。因此，如果通过搜索表单提交的值是“hello”，则
    `$searchterm` 变为 `%hello%`。


    执行查询并通过在前一行之后添加以下代码来获取返回的行数：


    - 整个查询被包裹在双引号中，以便包含 `$searchterm` 的值。但是，`$searchterm` 包含一个字符串，因此它也需要用引号包裹。为避免冲突，请在
    `$searchterm` 周围使用单引号。


    ```

    $result = $conn->query($sql);

    if (!$result) {

    $error = $conn->error;

    } else {

    $numRows = $result->num_rows;

    }

    ```


    在表单上方插入一个 PHP 代码块，以在查询出现问题时显示错误消息：


    ```html

    <body>

    <?php

    if (isset($error)) {

    echo "<p>$error</p>";

    }

    ?>

    <form method="get" action="">

    ```


    在表单之后，添加显示结果的 PHP 代码：


    ```html

    </form>

    <?php if (isset($numRows)) { ?>

    <p>Number of results for <b><?= htmlentities($_GET[''search'']); ?></b>:

    <?= $numRows; ?></p>

    <?php if ($numRows) { ?>

    <table>

    <tr>

    <th>image_id</th>

    <th>filename</th>

    <th>caption</th>

    </tr>

    <?php while ($row = $result->fetch_assoc()) { ?>

    <tr>

    <td><?= $row[''image_id'']; ?></td>

    <td><?= $row[''filename'']; ?></td>

    <td><?= $row[''caption'']; ?></td>

    </tr>

    <?php } ?>

    </table>

    <?php }

    } ?>

    </body>

    ```


    - 第一个条件语句包裹了段落和表格，如果 `$numRows` 不存在（这在页面首次加载时发生），则阻止显示它们。如果表单已提交，则会设置 `$numRows`，因此搜索词会使用
    `htmlentities()`（参见[第 5 章](#A978-1-4842-0635-5_5_Chapter.html)）重新显示，并且 `$numRows`
