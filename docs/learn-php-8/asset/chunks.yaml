  trans: '

    这两项修改（连同之前的修改）将会更新一个 JSON 文件，其中包含新的用户 ID/密码组合。


    ## MySQL 数据


    MySQL 还需要进行一些额外的修改。在使用 `password_hash` 对密码进行哈希处理后，可以打开数据库、插入记录，然后关闭数据库。


    ```

    $password = password_hash($password, PASSWORD_DEFAULT);

    $mysqli =mysqli_connect($server, $db_username, $db_password, $database);

    if (mysqli_connect_errno())

    {

    throw new Exception("MySQL connection error: " . mysqli_connect_error());

    }

    $sql="INSERT INTO Users (userid, password) VALUES(''" . $userid . "'',''" . $password
    . "'');";

    $result=mysqli_query($con,$sql);

    If($result===null)

    {

    throw new Exception("Userid/Password not added to Database");

    }

    mysqli_close($con);

    $login_string = date(''mdYhis'') . " | New Userid | " . $userid . "\n";

    error_log($login_string,3,$user_log_file);

    header("Location: e7login.php");

    ```


    ## 登录


    除了为用户提供创建自己用户 ID 和密码的功能外，应用程序还应提供修改密码的功能。设置密码有效期以限制密码使用时间，对于提升安全性非常有益。每次用户登录时，都可以对该值进行比较。如果当前日期比保存的日期早超过
    `xx` 天，则要求用户更改密码。


    由于密码嗅探程序会尝试猜测密码，因此限制使用正确用户 ID 和密码组合的登录尝试次数也是一个好主意。这将降低密码嗅探程序生成正确组合的可能性。重要的是，在达到最大尝试次数后，在一定时间内不允许成功登录。尽管这会让用户感到沮丧，但它降低了密码嗅探程序发现正确组合的机会。如果程序不知道尝试已超时，即使它在
    `timeout` 期间猜对了正确的组合，它也会收到无效的用户 ID/密码消息。这些调整需要为用户 ID/密码文件（或数据库）添加额外的字段。


    ```

    Fredfred

    $2y$10$VosI32FejL.bOMaCjGbBp.Jre6Ipa.tLYQrVqj9kiVpef5zZ25qQK

    2015-09-03


    Poppoppop

    $2y$10$C1jXhTl0myamuLKhZxK5m.4X4TVcdeFbeLSBIA7l4fx6tUnC8vrg6

    2015-06-04

    ```


    `$newupstring` 可以在 `registration.php` 程序（示例 8-3）中进行调整，以添加身份验证字段。


    ```

    $newupstring = "\n" . $userid . "\n" . $hashed_password . "\n";

    $newupstring .= "" . date(''Y-m-d'', strtotime(''+30 days'')) . "\n";

    $newupstring .= "0\n" . date(''mdYhis'') . "\n";

    $newupstring .= "" . date(''mdYhis'') . "\n\n";

    ```


    PHP 方法 `strtotime` 将解析任何标准的日期和时间格式，并尝试将其转换为 UNIX 日期时间格式（PHP 使用的格式）。在此示例中，该方法提供了在当前日期上增加
    30 天的能力，这反过来将用于判断密码是否已过期。或者，在批量创建用户 ID 时（例如在课程管理系统中填充学生 ID），可以将一个已过期的日期（例如当前日期的前一天）放入此字段。这将强制用户在首次登录系统时更改密码。过期日期存储在
    `datestamp` 中，供用户登录系统时使用。示例中的 `attempts` 标签将记录用户尝试使用错误的用户 ID 密码组合登录的次数（在成功登录时重置为零）。如果
    `lastattempt` 中的日期和时间在五分钟内，并且 `attempts` 的值为 `3` 或更大，则用户必须等到距离上次尝试登录超过五分钟才能再次尝试。与大多数登录系统一样，即使用户使用有效信息登录，距离上次无效登录也必须至少过去五分钟。上次成功登录的日期和时间也记录在
    `validattempt` 标签中。虽然在本示例中这不用于身份验证，但记录所有成功登录非常重要。


    为了尽可能保持程序主代码的简洁，查找用户 ID 和密码文件位置的代码已被移至 `retrieve_useridpasswordfile` 方法。将数据保存到
    XML 文件的代码也已移至 `saveupfile` 方法。这些方法的代码没有发生任何变化（除了如前所述新增了更多 XML 标签）。

