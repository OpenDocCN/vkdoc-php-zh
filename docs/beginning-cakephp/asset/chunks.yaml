    要显示面包屑导航，您必须使用`$html->getCrumbs()`函数。


    `$html->getCrumbs()`函数存在一些参数，用于更好地控制这些链接的渲染方式。


    **`getCrumbs( separator[string], startText[string] )`**


    - `separator` = `''&raquo;''`: 当存在多个面包屑时，显示在它们之间的文本。

    - `startText` = `false`: 面包屑轨迹中的第一个面包屑；如果设置为`false`，则数组中的第一个面包屑将首先显示。


    如果您想显示在前一个`$html->addCrumb()`函数示例中添加到面包屑数组的主页链接，您可以像这样使用`$html->getCrumbs()`：


    `<?=$html->getCrumbs();?>`


    当 Cake 应用命名为 `blog` 时，这将渲染以下内容：


    `<a href="/blog/">Home</a>`


    当然，该链接会根据应用的特定服务器设置而改变。


    **在默认布局中使用 HTML 助手**


    目前，您的博客应用在其默认布局中并未大量使用 HTML 助手。


    为了充分利用这些函数，让我们改造默认布局以包含更多函数。


    在`app/views/default.ctp`中，将其内容替换为清单 9-1。


    **清单 9-1.** *在默认布局中使用 HTML 助手*


    ```

    <?=$html->docType(''xhtml-strict'');?>

    <head>

    <title>The Extensive Blog</title>

    <?=$html->charset(''UTF-8'');?>

    <?=$html->meta(''icon'');?>

    <?=$html->css(''cake.generic'');?>

    <?=($this->params[''controller''] == ''posts'' && $this->params[''action''] ==
    ''add'' ? $javascript->link(array(''jquery.js'')) : $javascript->link(''prototype''));?>

    </head>

    <body>

    <?=$html->div(null,$session->flash().$html->div(null,$content_for_layout,array(''id''=>''content'')),array(''id''=>''container''));?>

    </body>

    </html>

    ```


    在默认布局中找到使用 HTML 助手的方法，使您能够用 PHP 替换大量 HTML。通过使用`$html->docType()`和`$html->charset()`函数，您已经绕过了所有符合标准的声明编码，同时使布局能够适应未来可能的标准变更。此外，`$html->div()`函数允许您将布局内容包裹在与`app/webroot/css/cake.generic.css`样式表匹配的`<div>`标签中，并将其缩减为一行代码。


    在各个视图中，您可以重复此过程，并寻找使用 HTML 助手来替换手工编码标记为 PHP 的方法。


    **使用表单助手**


    就像 HTML 助手对于简化视图中 HTML 标记的使用至关重要一样，表单助手对于表单处理也是不可或缺的。事实上，避免使用这个助手可能需要比学习其功能更多的精力。


    在详细检查表单助手函数之前，有几个要点需要解释。首先，某些函数旨在显示已处理表单的结果。从某种意义上说，这些函数充当一种接收器，在页面中并非立即可见。其他函数则负责格式化数据并将其发送给模型使用。接收器和供应函数都必须遵循模型命名约定才能正常工作。例如，`Model.fieldname`用于告诉`$form->input()`函数将用户输入数据存储在数据库中的哪个字段和哪个表中。每当在函数中调用字段参数或字段数组时，请务必正确命名这些字段。为确保助手能够将数据发送到正确的模型，请包含驼峰式命名的模型名称，后跟一个句点，再后跟字段名称：


    `<?=$form->error(''Post.content'');?>`


    当您确定控制器不会与多个模型发生冲突时，通常可以只指定字段的名称：


    `<?=$form->error(''content'');?>`


    ■**注意** 较早版本的 Cake 遵循此约定，使用 HTML 助手指定模型和字段时使用斜杠代替句点，例如 `Model/fieldname`。如果您确实遇到较早的
    Cake 应用程序，请务必将正斜杠替换为句点，以与 Cake 1.2 保持一致。请使用表单助手（而非 HTML 助手）来渲染所有表单元素。


    其次，大多数表单元素将以相同的方式使用 `options` 或 `attributes` 参数。由于表单元素在 JavaScript、Ajax 和其他交互功能方面可能比其他
    HTML 元素更复杂，因此它们可能需要传递更具体的选项。您可以通过正确键控 `options` 或 `attributes` 数组，完全自定义要在表单元素中传递的
    HTML 属性。确保键与属性名称匹配，其值包含正确的值。以下代码行：


    `<?=$form->submit(''Submit'',array(''onSubmit''=>''return false;''));?>`


    将返回一个包含 `onSubmit` 属性的提交按钮，如下所示：


    `<input type="submit" value="Submit" onSubmit="return false;" />`


    任何属性都可以通过 `options` 和 `attributes` 数组传递。


    ■**注意** 由于大多数表单助手函数的 `options` 和 `attributes` 参数基本一致，我将不为每个函数详细描述它们。在特定选项或属性影响函数输出的地方，我会在描述中强调该选项。


    记住这些要点，让我们来看看表单助手的主要函数。它们中的大多数只有在包含在`<form>`元素内时才能正常工作，该元素通常使用下面列出的`$form->create()`函数创建。


    **`create`**


    `$form->create()`函数简化了`<form>`标签的渲染。此函数还管理 `action` HTML 属性，并将表单指向正确的模型。


    **`create( model[string], options[array] )`**


    - `model` = `null`: 表单数据应发送到的模型。

    - `options`: 除了 HTML 属性外，此数组还可以包含一些特定选项——`type`、`action`、`url` 和 `default`。


    当为控制器和模型要处理的新表单创建时，此函数确保`<form>`标签指向正确的 URL 并适当发送数据。例如，您可以通过在 `options` 数组中指定
    `type` 选项来选择 `post` 或 `get` 方法来处理用户数据。或者，对于处理文件上传的表单，通过将 `type` 选项指定为 `file`，必要的
    `enctype` 属性会自动正确格式化。`model` 参数确保表单数据被发送到适当的模型，而无需担心 URL 或其他应用程序路径。可能的表单类型包括 `delete`、`file`、`get`、`post`
    和 `put`。


    当您需要指定提交表单时要调用的操作时，只需将 `action` 选项设置为该操作的 Cake 相对路径。此操作必须在当前控制器中才能正常工作。


    要将表单发送到当前控制器之外的操作，请使用 `url` 选项。这可以是一个指定控制器和操作的数组，也可以是指向该操作的 Cake 相对路径。


    要抑制表单的默认行为，请将 `default` 选项设置为 `false`。当设置为 `false` 时，`default` 选项会告知表单不要提交。这可以允许进行
    Ajax 处理或对表单数据进行其他自定义行为。默认情况下，`default` 选项设置为 `true`，这意味着表单将像正常的 HTTP 请求一样运行。


    如果我要添加一个将数据提交到另一个模型的表单，我可以像这样使用`$form->create()`函数进行设置：


    `<?=$form->create(''Post'',array(''url''=>''/tags/add''));?>`


    在这个例子中，此表单的提交将被发送到 `Tags` 控制器的 `Add` 操作。通常，表单只包含当前模型的名称。需要注意的一点是，您可以通过 `options`
    参数传递 HTML 属性。'
