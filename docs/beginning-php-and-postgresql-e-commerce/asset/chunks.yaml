    -- Create department_category type\nCREATE TYPE department_category AS\n(\n  \
    \  category_id INTEGER,\n    name VARCHAR(50),\n    description VARCHAR(1000)\n\
    );\n\n-- Create catalog_get_department_categories function\nCREATE FUNCTION catalog_get_department_categories(INTEGER)\
    \ RETURNS SETOF department_category LANGUAGE plpgsql AS $$\nDECLARE\n    inDepartmentId\
    \ ALIAS FOR $1;\n    outDepartmentCategoryRow department_category;\nBEGIN\n  \
    \  FOR outDepartmentCategoryRow IN\n        SELECT category_id, name, description\n\
    \        FROM category\n        WHERE department_id = inDepartmentId\n       \
    \ ORDER BY category_id\n    LOOP\n        RETURN NEXT outDepartmentCategoryRow;\n\
    \    END LOOP;\nEND;\n$$;\n\n-- Create catalog_add_category function\nCREATE FUNCTION\
    \ catalog_add_category(\n    INTEGER, VARCHAR(50), VARCHAR(1000))\nRETURNS VOID\
    \ LANGUAGE plpgsql AS $$\nDECLARE\n    inDepartmentId ALIAS FOR $1;\n    inName\
    \ ALIAS FOR $2;\n    inDescription ALIAS FOR $3;\nBEGIN\n    INSERT INTO category\
    \ (department_id, name, description) VALUES (inDepartmentId, inName, inDescription);\n\
    END;\n$$;\n\n-- Create catalog_delete_category function\nCREATE FUNCTION catalog_delete_category(INTEGER)\n\
    RETURNS SMALLINT LANGUAGE plpgsql AS $$\nDECLARE\n    inCategoryId ALIAS FOR $1;\n\
    \    productCategoryRowsCount INTEGER;\nBEGIN\n    SELECT INTO productCategoryRowsCount\n\
    \        count(*)\n    FROM product p\n    INNER JOIN product_category pc\n  \
    \      ON p.product_id = pc.product_id\n    WHERE pc.category_id = inCategoryId;\n\
    \    IF productCategoryRowsCount = 0 THEN\n        DELETE FROM category WHERE\
    \ category_id = inCategoryId;\n        RETURN 1;\n    END IF;\n    RETURN -1;\n\
    END;\n$$;\n\n-- Create catalog_update_category function\nCREATE FUNCTION catalog_update_category(\n\
    \    INTEGER, VARCHAR(50), VARCHAR(1000))\nRETURNS VOID LANGUAGE plpgsql AS $$\n\
    DECLARE\n    inCategoryId ALIAS FOR $1;\n    inName ALIAS FOR $2;\n    inDescription\
    \ ALIAS FOR $3;\nBEGIN\n    UPDATE category\n    SET name = inName, description\
    \ = inDescription\n    WHERE category_id = inCategoryId;\nEND;\n$$;\n\n-- Create\
    \ category_product type\nCREATE TYPE category_product AS\n(\n    product_id INTEGER,\n\
    \    name VARCHAR(50),\n    description VARCHAR(1000),\n    price NUMERIC(10,\
    \ 2),\n    discounted_price NUMERIC(10, 2)\n);\n\n-- Create catalog_get_category_products\
    \ function\nCREATE FUNCTION catalog_get_category_products(INTEGER)\nRETURNS SETOF\
    \ category_product LANGUAGE plpgsql AS $$\nDECLARE\n    inCategoryId ALIAS FOR\
    \ $1;\n    outCategoryProductRow category_product;\nBEGIN\n    FOR outCategoryProductRow\
    \ IN\n        SELECT p.product_id, p.name, p.description, p.price, p.discounted_price\n\
    \        FROM product p\n        INNER JOIN product_category pc\n            ON\
    \ p.product_id = pc.product_id\n        WHERE pc.category_id = inCategoryId\n\
    \        ORDER BY p.product_id\n    LOOP\n        RETURN NEXT outCategoryProductRow;\n\
    \    END LOOP;\nEND;\n$$;\n\n-- Create catalog_add_product_to_category function\n\
    CREATE FUNCTION catalog_add_product_to_category(INTEGER, VARCHAR(50), VARCHAR(1000),\
    \ NUMERIC(10, 2))\nRETURNS VOID LANGUAGE plpgsql AS $$\nDECLARE\n    inCategoryId\
    \ ALIAS FOR $1;\n    inName ALIAS FOR $2;\n    inDescription ALIAS FOR $3;\n \
    \   inPrice ALIAS FOR $4;\n    productLastInsertId INTEGER;\nBEGIN\n    INSERT\
    \ INTO product (name, description, price, image, thumbnail, search_vector)\n \
    \   VALUES (inName, inDescription, inPrice, 'generic.jpg',\n            'generic.thumb.jpg',\n\
    \            (setweight(to_tsvector(inName), 'A')\n            || to_tsvector(inDescription)));\n\
    \    SELECT INTO productLastInsertId currval('product_product_id_seq');\n    INSERT\
    \ INTO product_category (product_id, category_id)\n    VALUES (productLastInsertId,\
    \ inCategoryId);\nEND;\n$$;\n\n-- Create catalog_update_product function\nCREATE\
    \ FUNCTION catalog_update_product(INTEGER, VARCHAR(50), VARCHAR(1000), NUMERIC(10,\
    \ 2), NUMERIC(10, 2))\nRETURNS VOID LANGUAGE plpgsql AS $$\nDECLARE\n    inProductId\
    \ ALIAS FOR $1;\n    inName ALIAS FOR $2;\n    inDescription ALIAS FOR $3;\n \
    \   inPrice ALIAS FOR $4;\n    inDiscountedPrice ALIAS FOR $5;\nBEGIN\n    UPDATE\
    \ product\n    SET name = inName, description = inDescription, price = inPrice,\
    \ discounted_price = inDiscountedPrice,\n        search_vector = (setweight(to_tsvector(inName),\
    \ 'A')\n                        || to_tsvector(inDescription))\n    WHERE product_id\
    \ = inProductId;\nEND;\n$$;\n```\n\n8.  Load `admin.php` in your browser, choose\
