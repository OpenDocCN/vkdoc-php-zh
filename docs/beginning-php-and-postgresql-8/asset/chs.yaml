  [www.it-ebooks.info](http://www.it-ebooks.info)\n\n## 第 9 章：字符串与正则表达式\n\n##### `substr_replace()`\n\
  \n`string substr_replace (string *str*, string *replacement*, int *start* [, int\
  \ *length*])`\n\n`substr_replace()` 函数将 `str` 中的一部分替换为 `replacement`，替换从 `str` 的\
  \ `start` 位置开始，并在 `start + length` 处结束（假设包含了可选输入参数 `length`）。或者，替换将在 `replacement`\
  \ 完全放置到 `str` 中时停止。关于 `start` 和 `length` 的值，有几个行为需要牢记：\n\n- 如果 `start` 为正数，替换将从字符\
  \ `start` 开始。\n- 如果 `start` 为负数，替换将从 (`str length – start`) 开始。\n- 如果提供了 `length`\
  \ 且为正数，则替换内容的长度为 `length` 个字符。\n- 如果提供了 `length` 且为负数，则替换将在 (`str length – length`)\
  \ 个字符处结束。\n\n假设你建立了一个电子商务网站，并且在用户个人资料界面中，你想只显示所提供的信用卡号的最后四位数字。这个函数非常适合此类任务：\n\n\
  ```php\n<?php\n$ccnumber = \"1234567899991111\";\necho substr_replace($ccnumber,\"\
  ************\",0,12);\n?>\n```\n\n这将返回：\n\n```\n************1111\n```\n\n#### 填充与修剪字符串\n\
  \n出于格式化原因，有时你需要通过填充或修剪字符来修改字符串长度。PHP 提供了许多函数来实现此目的。在本节中，我们将探讨许多常用的函数。\n\n##### `ltrim()`\n\
  \n`string ltrim (string *str* [, string *charlist*])`\n\n`ltrim()` 函数从 `str` 的开头移除各种字符，包括空格、水平制表符（`\\\
  t`）、换行符（`\\n`）、回车符（`\\r`）、空字符（`\\0`）和垂直制表符（`\\x0b`）。你可以通过可选参数 `charlist` 来指定其他需要移除的字符。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info)\n\n##### `rtrim()`\n\n`string\
  \ rtrim(string *str* [, string *charlist*])`\n\n`rtrim()` 函数的操作与 `ltrim()` 相同，区别在于它从\
  \ `str` 的右侧移除指定的字符。\n\n##### `trim()`\n\n`string trim (string *str* [, string *charlist*])`\n\
  \n你可以将 `trim()` 函数视为 `ltrim()` 和 `rtrim()` 的结合体，它从 `str` 的两端移除指定的字符。\n\n##### `str_pad()`\n\
  \n`string str_pad (string *str*, int *length* [, string *pad_string* [, int *pad_type*]])`\n\
