    2. Passwords should never be saved in plain-text format. All secure applications
    perform a nonreversible hash conversion of the password. This prevents them from
    knowing what the password is, but allows them to repeat the process in order to
    check whether a submitted password matches a password stored in the database.


    **Exercises**


    1. We added some basic validation types, but there are many more we could add.
