    ''home''));` You’ll recognize from our discussion in Chapter 10 that this route
    connects the base path (`''/''`) to the `Pages` controller’s `Display` action.
    It also passes the parameter `home` to the action, thus rendering Cake’s default
    home page, which is the welcome screen. Changing `home` to another value or creating
    a view file named `home.ctp` in the `app/views/pages` directory will point this
    base route to your own custom view. The `Pages` controller is already built into
    the core, so you do not need to create an `app/controllers/pages_controller.php`
    file by hand. Simply pass along the name of the view you want to render and create
    the corresponding view file (with the `.ctp` extension), and the `Pages` controller
    will automatically render the view for you.


    Once you’ve created your own `home.ctp` file or created a custom one, you should
    be able to go to `http://localhost/blog`, and that view will be displayed. Simply
    add links in this view file that point to the `Posts` `Index` action and other
    areas of the site, and the user will be able to navigate through the blog just
    fine. Elsewhere in the site, you’ll be able to point back to this home page by
    using the base path or by using more verbose links, like this: `$html->link(''Sample
    Link'',array(''controller''=>''pages'',''action''=>''display'',''home''));`


    ## Making an Action the Starting Point


    To make the `Posts` `Index` action the home page, simply change the base route
    in `app/config/routes.php`. One way you could do this would be with the following
    route: `Router::connect(''/'', array(''controller'' => ''posts'', ''action'' =>
    ''index''));` Now, when the user comes to the home page, the `Posts` `Index` view
    will be rendered, rather than the Cake welcome screen. Then, in the `app/views/posts/index.ctp`
    file, you could provide all the navigation to access other areas of the site.
    The benefit of using an existing action as the starting point for your application
    is that the logic needed to pull together various methods is already in place.
    Creating dynamic content like categories links is possible because the controller
    and model are already at work fetching that data. I prefer this method for building
    my home pages, but I have used the other methods in the past for specific reasons
    relating to the project at hand. Most important, however, is that you provide
    a home page or starting point that easily provides the necessary navigation and
    displays from across the application dynamically. Most of the time you won’t want
    to manually update the home page, so the more you can allow the application to
    do that for you, the better.


    ## Generating Dynamic Navigation


    More complex navigation will likely require creating some kind of menu system
    in the application. The blog is already equipped to handle categories and rendering
    posts. It’s easy to make a menu that is rendered in every view. (Displaying a
    menu is a good time to use an element instead of a layout or a helper.)


    You could create a menu element like I’ve done with **Listing 15-1** and call
    it in the various views throughout the site. Notice that I’ve checked the `Session`
    component to see whether the user is logged in, changing what links are available
    to the user accordingly. Of course, the login process would need to be built,
    preferably with the `Auth` component, but the element does work well for adjusting
    the interface to supply the links based on the status of the user’s session.


    **Listing 15-1.** *The* `app/views/elements/menu.ctp` *Element*


    ```html

    <div class="menu">

    <ul>

    <?=$html->link(''<li>Home</li>'',''/'',null,null,false);?>

    <?=$html->link(''<li>Posts</li>'',array(''controller''=>''posts'',''action''=>➥

    ''index''),null,null,false);?>

    <?=$html->link(''<li>Tags</li>'',array(''controller''=>''tags'',''action''=>➥

    ''index''),null,null,false);?>

    <? if (!$session->check(''User'')): ?>

    <?=$html->link(''<li>Log In</li>'',array(''controller''=>''users'',➥

    ''action''=>''login''),null,null,false);?>

    <? else: ?>

    <?=$html->link(''<li>Add Post</li>'',array(''controller''=>''posts'',➥

    ''action''=>''admin_add''),null,null,false);?>

    <?=$html->link(''<li>Edit Posts</li>'',array(''controller''=>''posts'',➥

    ''action''=>''admin_index''),null,null,false);?>

    <?=$html->link(''<li>Log Out</li>'',array(''controller''=>''users'',➥

    ''action''=>''logout''),null,null,false);?>

    <? endif;?>

    </ul>

    </div>

    ```


    Remember to call out your menu element in the view with the `$this->element()`
    view function:


    ```

    $this->element(''menu'');

    ```


    ## Customizing the Overall Design


    When preparing the application for production and when improving existing methods
    in the process, you will likely need to change the design of the views, usually
    on an individual basis. One important routine when wrapping up the application
    is to go through each view and interact with the site. Then, adjust the design
    as needed.


    In this book, I stuck with Cake’s built-in style sheet and HTML markup as much
    as possible. You will undoubtedly want to change the design to fit your needs.
    Most of the time, you’ll work with CSS and HTML to tweak the design as you build
    the application. In the case of your blog application, now is a good time to go
    in and apply your own CSS and graphics to the design. Maybe you’ll want to hire
    a graphic designer to do this part.


    In any Cake project, reviewing the design and improving it where possible is an
    important routine when wrapping up the application. Sometimes you’ll create new
    layouts, views, elements, and helpers at this stage to better separate the display
    elements and maintain a consistent structure for the code. Remember, where possible,
    to make sure that repeatable design elements are saved in a single place in the
    code. This is the programming principle called DRY—Don’t Repeat Yourself. In this
    way, you’re thinking ahead for any possible adjustments you may need to make in
    the future that will save you time.


    ## Debugging the Application


    Let’s hope your Cake applications are built without too many errors creeping in.
    Nevertheless, an important routine when finishing the application is to double-check
    for any bugs. Testing deeper resources such as models, components, DataSources,
    and behaviors can be tricky when calling actions in the browser through the controller.
    Cake comes with a helpful test suite that allows you to run tests on models and
    components with sample data. You will need to have your `app/config/database.php`
    file correctly set to link with a test database and then run unit tests through
    what Cake calls *fixtures*. But performing unit tests with sample data can ultimately
    cut down on the amount of time you spend making your application’s models error-free,
    especially if you build a lot of custom model functions. As you explore ways to
    work better with Cake, consult the online Cake community for details on running
    the test suite. Many features are still in development with some promising methods
    set for later release. (Mariano Iglesias has written an excellent tutorial on
    model testing with the built-in test suite at `http://bakery.cakephp.org/articles/view/testing-models-with-cakephp-1-2-test-suite`,
    which will help you get started working with fixtures; you can check out other
    test suite articles at `http://bakery.cakephp.org/tags/view/test`.)


