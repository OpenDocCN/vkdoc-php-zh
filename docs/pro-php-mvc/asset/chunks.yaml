    $normalized = self::_normalize("\\{$part}");


    $string = preg_replace(


    "{$normalized}m",


    "\\{$part}",


    $string


    );


    }


    return $string;


    }


    public static function unique($string)


    {


    $unique = "";


    $parts = str_split($string);


    foreach ($parts as $part)


    {


    if (!strstr($unique, $part))


    {


    $unique . = $part;


    }


    }


    return $unique;


    }


    public function indexOf($string, $substring, $offset = null)


    {


    $position = strpos($string, $substring, $offset);


    if (!is_int($position))


    {


    return -1;


    }


    return $position;


    }


    }


    }


    The sanitize() method loops through the characters of a string, replacing them
    with regular expression friendly character representations. The unique() method
    eliminates all duplicated characters in a string. Finally, the indexOf() method
    returns the position of a substring within a larger string, or -1 if the substring
    isn’t found.


    The reason for that last method, instead of just using PHP’s native strpos() method,
    is that strpos() can return any number of values to represent a missing substring.
    Our new indexOf() method will always return an integer result.


