    ■**Note** While this chapter deals specifically with images, many of the principles
    we will look at also apply to general file uploads (after all, an image is a file).
    The only things that don’t apply to non-image files are resizing the images and
    displaying them in HTML using the <img> tag.


    **Storing Uploaded Files**


    The first thing we must decide is how we will store files uploaded by users: in
    the database or on the filesystem. Each method has its own advantages and disadvantages.


    Here are some of the reasons you might prefer to store files in the database:


    • Doing so provides easy access to all the image information. When using the filesystem,
    some of the data will still be stored in the database, meaning there is a slight
    redundancy. Additionally, deleting the image from the database is simply a matter
    of removing the database record, while on the filesystem you must also delete
    the image file. It is easier to roll back a failed transaction if you are only
    using a database.


    • Keeping backups of your web application is simpler, since you only need to back
    up the database and no separate uploaded files.


    Now let’s take a look at why you may prefer to store images using the filesystem:


    • Cross-platform compatibility is easier to achieve. Since most database servers
    will use different methods for storing binary data, a separate implementation
    may be required for each type of database server your application is used on.


    • It is much simpler to perform filesystem operations on files that are already
    on the filesystem. For example, if you were to use ImageMagick (a suite of image
    manipulation tools) to create thumbnails of images, you would find it much simpler
    to work with files already stored on the filesystem.


    ■**Note** We will be using the GD image functions that are built with PHP instead
    of ImageMagick—I simply used this as an example of filesystem operations that
    may take place on uploaded files.


    There are some other considerations we must take into account. For example, we
    need to store metadata for each of the images. As mentioned earlier, we want to
    allow users to change the order of images belonging to each blog post (since a
    blog post may have several images).


    As such, not only do we need to track which images belong to which blog posts,
    but we must also track the order of the images.


    My preferred method is to store all uploaded images on the filesystem, and to
    also use a database table to store information about the images and to link each
    image to its blog post.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


