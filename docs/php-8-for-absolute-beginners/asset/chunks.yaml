    \n## 为什么要从 PHP 开始？\n\n这确实是一个非常好的问题。有很多编程语言可供我们选择。为什么选择`PHP`作为我们的第一门语言体验？首先，`PHP`是比较容易学习的语言之一。仅凭一些基本命令和概念，您就能完成很多工作。它是最流行的语言之一，因为它能够管理网页和应用程序。它通常被认为是成为*全栈开发者*所需的技能之一。\n\
    \n> **注意**\n> \n> 全栈开发者既了解 Web 应用程序的前端（显示给用户的网页），也了解后端（存在于 Web 服务器上供网页使用的代码）。他们掌握前端工具的知识，如`HTML`、`CSS`和`JavaScript`。他们拥有使用能够支持后端的\
    \ Web 页面的语言（如`PHP`和`Java`）的经验。他们还可能使用其他工具来管理开发周期。\n\n随着*PHP 8*的出现，该语言在操作和计算效率上比以往任何时候都高。虽然在本书编写时，由于先前的限制，`PHP`并不以开发游戏平台或大数据操作而闻名，但最新版本的效率可能很快让这成为现实。已经有一些团体开始使用`PHP`开发智能手机应用程序。但即使它永远不会成为游戏平台，仅通过托管网页和创建应用程序，`PHP`也有大量的工作要完成。\n\
    \n**练习**：`PHP`还活着并且发展良好吗？不要相信我们的话。去您最喜欢的搜索引擎并提问：“谁在使用`PHP`？”或者“`PHP`还活着且发展良好吗？”您找到了什么？答案应该告诉您：“是的，`PHP`还活着且发展良好”以及“很多组织都在使用`PHP`。”目前有哪些组织在使用`PHP`？他们用它来做什么？`PHP`的未来是怎样的？您会发现，除了\
    \ Web 应用程序之外，目前在创建大数据仪表盘、智能手机应用程序和游戏应用程序方面也有开发。小心点，`Python`，`PHP`可能正在抢你的饭碗！\n"
- fmt: '# Setting Up a Development Environment


    Getting a working *development environment* put together might initially be intimidating,
    especially for the absolute beginner. However, developers have created many types
    of software packages, which can install everything we need, with default settings.
    No longer do we need to go into the setup files to connect our environment together
    (unless we choose to do so). The environment is automatically linked together
    for us. To follow along with the projects in this book, we will need to have access
    to a working development (test) environment which contains *Apache* (*web server*),
    PHP, and *MySQL/MariaDB* (*database*). It’s always desirable to test locally (on
    a single machine, not a server), both for speed and security. Doing this both
    shelters your work in progress from the hackers on the open Internet and decreases
    the amount of time spent uploading files to a *web server*. It allows you to completely
    test and secure your programs before placing them in a live environment.


    PHP is a powerful *scripting language* that can be run by itself. However, PHP
    alone isn’t sufficient for building dynamic website applications. To use PHP for
    a website, we need a web server that knows how to process PHP scripts. Apache
    is a free web server that, once installed on a computer, allows developers to
    test PHP scripts locally; this makes it an invaluable piece for a local development
    environment. Apache is the most popular web server used in conjunction with PHP.


    Additionally, web applications need to store information. PHP code can be developed
    to store this information in a database, so it can be modified quickly and easily.
    This is the significant difference between a PHP application and an *HTML* site.
    Strictly HTML-only sites cannot store information. This is where a *relational
    database management system* such as MySQL can come into play. Many of the book’s
    examples store information using the MySQL/MariaDB database systems.


    > **Note**: Without going into too much detail, MySQL and MariaDB are very similar
    systems. When Oracle purchased MySQL, some developers wanted to ensure that a
    free version of MySQL would still exist (although Oracle does still provide a
    free version as of the release of this book). MariaDB was the result of this collaborative
    effort. They ensured that no coding changes would be needed when creating programs
    using either database system. You will even discover some of the software packages
    still use the term MySQL when they are really referring to a MariaDB database.


    ## What Is PHP? How Does PHP Work?


    PHP is a general-purpose scripting language that was originally conceived by Rasmus
    Lerdorf in 1995. Lerdorf created PHP to satisfy the need for an easy way to process
    data when creating pages for the *World Wide Web*.


    > **Note**: PHP was born out of Rasmus Lerdorf’s desire to create a script that
    would keep track of how many visits his online résumé received. Due to the wild
    popularity of the script he created, Lerdorf continued developing the language.
    Over time, other developers joined him in creating the software. Today, PHP is
    one of the most popular scripting languages.


    PHP originally stood for *Personal Home Page* and was released as a free, *open
    source* project. Over time, the language was reworked to meet the needs of its
    users. In 1997, PHP was renamed PHP: *Hypertext Preprocessor*, as it is known
    currently. At the time we are writing this, PHP 8.1.1 is the current stable version.
    Older versions of PHP are still in use on many servers. However, they might not
    be as secure. PHP 8 has provided many powerful changes to the language which has
    increased usability, speed, and security. All code provided in this book works
    with PHP 8 (or later). Some of the code will also work with previous versions.
    We suggest you install and use the most current version available.


    HTML is parsed by a *browser* on the user’s computer after the page downloads.
    The browsers determine how to display the information provided from the code provided
    by the HTML and CSS. Since, unlike HTML, PHP code is retained on a remote web
    server, browsers cannot process PHP code. PHP is processed by a *PHP interpreter*
    connected to a web server (such as Apache). The results of the execution of the
    PHP code (not the actual PHP code) are included in the document (web page) before
    it is sent to the user’s browser to be interpreted. Because PHP is processed on
    a server, it is a *server-side scripting language*.


    **Exercise**: Search for a company that uses PHP. Go to their website. View the
    source code of the main page of their site. You can view the code by selecting
    "View Source" within your browser. Did you find some PHP code? The answer is no.
    Why? Because your browser shows the results after the PHP code has been processed
    by the web server. You can see HTML, CSS, and JavaScript code, but you will not
    see any PHP code. Where can you see the PHP code? If you had access, you could
    view it on the server itself.


    With PHP, you can create dynamic web pages (web pages that can change according
    to conditions). For example: When you log in to your Facebook account, you can
    see your content. When you log in to another Facebook account, you see different
    content. We are loading the same resource (`www.facebook.com`) and code, but we
    are served different content dynamically. This would be impossible with strictly
    HTML web pages because they are *static*, meaning they can’t change. Every user
    would see exactly the same HTML page. We will soon explore many more examples
    of dynamic web pages in this book.


    PHP is an interpreted language, which is another great advantage for PHP programmers.
    Many programming languages require that you *compile* files into *machine code*
    before they can be run, which can be a time-consuming process. Bypassing the need
    to compile every time you make a code change means you’re able to edit and test
    code much more quickly. However, this also can cause PHP to be slower than compiled
    programs in a live environment. Compiled programs are already machine-level programs
    that the server can directly run. Script programs (like PHP) have to first be
    interpreted before they can run. With PHP 8, this disadvantage has been removed.
    PHP 8 includes a *JIT (just-in-time)* *compiler* which can be used to compile
    PHP code for live sites. This removes the delay.


    > **Note**: While doing initial testing of our code, we first are concerned with
    removing all syntax and logical errors. During this phase, we can test PHP using
    the original interpreted mode. After errors are removed, for heavily used web
    applications, we can use the JIT compiler to speed up the PHP application in the
    live environment. Since this is a beginner’s book, most of our testing will be
    using the interpretive mode of PHP, to save debugging time and effort.


    Because PHP is a server-side language, running PHP scripts requires a server.
    To develop PHP projects in a local development environment means we need to install
    a server on our local machine. The examples in this book rely on the Apache web
    server to deliver our web pages, since it is the most popular server used with
    PHP.'
