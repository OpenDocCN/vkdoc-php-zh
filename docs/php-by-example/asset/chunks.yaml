  raw: 'A screenshot of the NetBeans environment window, Apache NetBeans I D E 19\.
    The thirteen menus at the top are File, Edit, View, Navigate, Source, Refactor,
    Run, Debug, Profile, Team, Tools, Window, and Help. The left panel has 3 tabs,
    including Projects, Files, and Services. The Source Files option is selected under
