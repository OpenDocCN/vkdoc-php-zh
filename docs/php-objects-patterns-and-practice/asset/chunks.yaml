    specified that a `Teacher` object will have a reference to one or more `Pupil`
    objects, or vice versa. This relationship may or may not be reciprocal.


    You can use arrows to describe the direction of the association. If the `Teacher`
    class has an instance of the `Pupil` class but not the other way round, then you
    should make your association an arrow leading from the `Teacher` to the `Pupil`
    class. This association, which is called unidirectional, is shown in Figure [6-10](#A314621_5_En_6_Chapter.html#Fig10).


