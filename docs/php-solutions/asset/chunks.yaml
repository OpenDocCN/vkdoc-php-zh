    ### PHP Solution 11-7: Inserting a string in MySQLi with real_escape_string()


    This PHP solution shows how to insert a value from a search form into an SQL query
    using the MySQLi `real_escape_string()` method. In addition to handling single
    and double quotes, it also escapes other control characters, such as newlines
    and carriage returns.


    Tip


    This MySQLi-only technique is useful when only one or two string values from external
    sources need to be inserted into a query, or if the query will be used only once.
    For more complex queries, use a prepared statement, as described in the next section.
    To embed strings in PDO, it’s always recommended to use a prepared statement.


    Copy `mysqli_real_escape_01.php` from the `ch11` folder and save it in the `mysqli`
    folder as `mysql_real_escape.php`. The file contains a search form and a table
    for displaying the results.   Add the following code in a PHP block above the
    `DOCTYPE` declaration:


    `if (isset($_GET[''go''])) {`


    `require_once ''../includes/connection.php'';`


    `$conn = dbConnect(''read'');`


    `$searchterm = ''%'' . $conn->real_escape_string($_GET[''search'']) . ''%'';`


    `}`


    Add the `SELECT` query on the next line (before the closing curly brace):


    *   This includes the connection file and establishes a connection for the read-only
    user account if the form has been submitted. Then, `$_GET[''search'']` is passed
    to the connection object’s `real_escape_string()` method to make it safe to incorporate
    into an SQL query, and the `%` wildcard character is concatenated to both ends
    before the result is assigned to `$searchterm`. So, if the value submitted through
    the search form is “hello,” `$searchterm` becomes `%hello%`.


    `$sql = "SELECT * FROM images WHERE caption LIKE ''$searchterm''";`


    Execute the query and get the number of rows returned by adding the following
    code after the previous line:


    *   The whole query is wrapped in double quotes so that the value of `$searchterm`
    is incorporated. However, `$searchterm` contains a string, so it also needs to
    be wrapped in quotes. To avoid a clash, use single quotes around `$searchterm`.


    `$result = $conn->query($sql);`


    `if (!$result) {`


    `$error = $conn->error;`


    `} else {`


    `$numRows = $result->num_rows;`


    `}`


    Insert a PHP block above the form to display the error message if there’s a problem
    with the query:


    `<body>`


    `<?php`


    `if (isset($error)) {`


    `echo "<p>$error</p>";`


    `}`


    `?>`


    `<form method="get" action="">`


    After the form, add the PHP code to display the results:


    `</form>`


    `<?php if (isset($numRows)) { ?>`


    `<p>Number of results for <b>` `<?= htmlentities($_GET[''search'']); ?>` `</b>:`


    `<?= $numRows; ?>` `</p>`


    `<?php if ($numRows) { ?>`


    `<table>`


    `<tr>`


    `<th>image_id</th>`


    `<th>filename</th>`


    `<th>caption</th>`


    `</tr>`


    `<?php while ($row = $result->fetch_assoc()) { ?>`


    `<tr>`


    `<td>` `<?= $row[''image_id'']; ?>` `</td>`


    `<td>` `<?= $row[''filename'']; ?>` `</td>`


    `<td>` `<?= $row[''caption'']; ?>` `</td>`


    `</tr>`


    `<?php } ?>`


    `</table>`


    `<?php }`


    `} ?>`


    `</body>`


    Save the page and load it into a browser. Enter some text in the search field
    and click Search. The number of results is displayed, together with any captions
    that contain the search term, as shown in the following screenshot:


    *   The first conditional statement is wrapped around the paragraph and table,
    preventing them from being displayed if `$numRows` doesn’t exist, which happens
    when the page is first loaded. If the form has been submitted, `$numRows` will
    have been set, so the search term is redisplayed using `htmlentities()` (see [Chapter
    5](#A978-1-4842-0635-5_5_Chapter.html)), and the value of `$numRows` reports the
    number of matches.

    *   If the query returns no results, `$numRows` is 0, which is treated as `false`,
    so the table is not displayed. If `$numRows` contains anything other than 0, the
    table is displayed, and the `while` loop displays the results of the query.


    ![A978-1-4842-0635-5_11_Figo_HTML.jpg](A978-1-4842-0635-5_11_Figo_HTML.jpg)


    You can check your code against `mysqli_real_escape_02.php` in the `ch11` folder.


    Note


    If you click the `Search` button without entering anything into the search field,
    all the records are displayed. This is because the search term becomes `%%`, which
    matches anything. If you don’t want that to happen, you can use the `empty()`
    function to test whether `$_GET[''search'']` has a value.


    Although `real_escape_string()` escapes quotes and other control characters in
    the submitted value, you still need to wrap strings in quotes in the SQL query.
    The `LIKE` keyword must always be followed by a string, even if the search term
    is limited to numbers.'
