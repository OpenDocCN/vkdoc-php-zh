  trans: '

    ### 实现


    与所有最佳模式一样，策略模式简单而强大。当类必须支持一个接口的多种实现时（例如，多种评分机制），最佳方法通常是提取这些实现并将其放入它们自己的类型中，而不是扩展原始类来处理它们。


    因此，在示例中，你的评分方法可能会放在一个 `Marker` 类型中。图 11-5 展示了新的结构。


    ![A314621_5_En_11_Fig5_HTML.gif](img/A314621_5_En_11_Fig5_HTML.gif)


    图 11-5. 将算法提取到它们自己的类型中


    还记得四人组原则“优先使用组合而非继承”吗？这是一个极好的例子。通过定义和封装评分算法，你减少了子类化的需求并增加了灵活性。你可以随时添加新的评分策略，而完全无需修改
    `Question` 类。所有 `Question` 类只知道它们拥有一个可用的 `Marker` 实例，并且该实例由其接口保证支持 `mark()` 方法。实现的细节完全是别人的问题。


    以下是 `Question` 类呈现为代码的形式：


    ```

    // 清单 11.13

    abstract class Question

    {

    protected $prompt;

    protected $marker;

    public function __construct(string $prompt, Marker $marker)

    {

    $this->prompt = $prompt;

    $this->marker = $marker;

    }

    public function mark(string $response): bool

    {

    return $this->marker->mark($response);

    }

    }

    // 清单 11.14

    class TextQuestion extends Question

    {

    // 处理文本问题的特定操作

    }

    // 清单 11.15

    class AVQuestion extends Question

    {

    // 处理视听问题的特定操作

    }

    ```


    如你所见，我将 `TextQuestion` 和 `AVQuestion` 之间差异的具体性质留给你想象。`Question` 基类提供了所有实际功能，存储了一个提示属性和一个
    `Marker` 对象。当使用最终用户的响应调用 `Question::mark()` 方法时，该方法只是将问题处理委托给它的 `Marker` 对象。


    现在是定义一些简单的 `Marker` 对象的时候了：


    ```

    // 清单 11.16

    abstract class Marker

    {

    protected $test;

    public function __construct(string $test)

    {

    $this->test = $test;

    }

    abstract public function mark(string $response): bool;

    }

    // 清单 11.17

    class MarkLogicMarker extends Marker

    {

    private $engine;

    public function __construct(string $test)

    {

    parent::__construct($test);

    $this->engine = new MarkParse($test);

    }

    public function mark(string $response): bool

    {

    return $this->engine->evaluate($response);

    }

    }

    // 清单 11.18

    class MatchMarker extends Marker

    {

    public function mark(string $response): bool

    {

    return ($this->test == $response);

    }

    }

    // 清单 11.19

    class RegexpMarker extends Marker

    {

    public function mark(string $response): bool

    {

    return (preg_match("$this->test", $response) === 1);

    }

    }

    ```


    对于 `Marker` 类本身，应该没什么特别令人惊讶的地方。注意，`MarkParse` 对象设计用于配合第 24 章开发的简单解析器。这里的关键在于我定义的结构，而非策略本身的细节。我可以将
    `RegexpMarker` 替换为 `MatchMarker`，而对 `Question` 类没有任何影响。


    当然，你仍然必须决定选择具体 `Marker` 对象的方法。我见过两种实际应用中的解决方案。第一种，生产者使用单选按钮来选择首选的评分策略。第二种，利用评分条件本身的结构；也就是说，匹配语句保持明文形式：


    ```

    five

    ```


    MarkLogic 语句前面加一个冒号：


    ```

    :$input equals ''five''

    ```


    而正则表达式使用正斜杠：


    ```

    /f.ve/

    ```


    下面是一些用来测试这些类的代码：


    ```

    // 清单 11.20

    $markers = [

    new RegexpMarker("/f.ve/"),

    new MatchMarker("five"),

    new MarkLogicMarker(''$input equals "five"'')

    ];

    foreach ($markers as $marker) {

    print get_class($marker)."\n";

    $question = new TextQuestion("how many beans make five", $marker);

    foreach (["five", "four"] as $response) {

    print "    response: $response: ";

    if ($question->mark($response)) {

    print "well done\n";

    } else {

    print "never mind\n";

    }

    }

    }

    ```


    我构造了三个策略对象，依次使用每个对象来构造一个 `TextQuestion` 对象。接着用两个示例响应来测试 `TextQuestion` 对象。


    以下是输出结果（包含命名空间）：


    ```

    popp\ch11\batch02\RegexpMarker

    response: five: well done

    response: four: never mind

    popp\ch11\batch02\MatchMarker

    response: five: well done

    response: four: never mind

    popp\ch11\batch02\MarkLogicMarker

    response: five: well done

    response: five: never mind

    ```


    在这个例子中，我通过 `mark()` 方法将特定数据（`$response` 变量）从客户端传递给策略对象。有时，你可能会遇到这样的情况：在调用策略对象的操作时，并不总是能事先知道它需要多少信息。你可以通过将客户端实例本身传递给策略，来委托其决定获取哪些数据。然后，策略可以查询客户端，以便构建它所需的数据。'
- fmt: '# The Observer Pattern


    Orthogonality is a virtue I have described before. One of our objectives as programmers
    should be to build components that can be altered or moved with minimal impact
    on other components. If every change we make to one component necessitates a ripple
    of changes elsewhere in the codebase, the task of development can quickly become
    a spiral of bug creation and elimination.


    Of course, orthogonality is often just a dream. Elements in a system must have
    embedded references to other elements. You can, however, deploy various strategies
    to minimize this. You have seen various examples of polymorphism in which the
    client understands a component’s interface, but the actual component may vary
    at runtime.


    In some circumstances, you may wish to drive an even greater wedge between components
    than this. Consider a class responsible for handling a user’s access to a system:


    ```

    // listing 11.21

    class Login

    {

    const LOGIN_USER_UNKNOWN = 1;

    const LOGIN_WRONG_PASS = 2;

    const LOGIN_ACCESS = 3;

    private $status = [];

    public function handleLogin(string $user, string $pass, string $ip): bool

    {

    $isvalid=false;

    switch (rand(1, 3)) {

    case 1:

    $this->setStatus(self::LOGIN_ACCESS, $user, $ip);

    $isvalid = true;

    break;

    case 2:

    $this->setStatus(self::LOGIN_WRONG_PASS, $user, $ip);

    $isvalid = false;

    break;

    case 3:

    $this->setStatus(self::LOGIN_USER_UNKNOWN, $user, $ip);

    $isvalid = false;

    break;

    }

    print "returning ".(($isvalid)?"true":"false")."\n";

    return $isvalid;

    }

    private function setStatus(int $status, string $user, string $ip)

    {

    $this->status = [$status, $user, $ip];

    }

    public function getStatus(): array

    {

    return $this->status;

    }

    }

    ```


    In a real-world example, of course, the `handleLogin()` method would validate
    the user against a storage mechanism. As it is, this class fakes the login process
    using the `rand()` function. There are three potential outcomes of a call to `handleLogin()`.
    The status flag may be set to `LOGIN_ACCESS`, `LOGIN_WRONG_PASS`, or `LOGIN_USER_UNKNOWN`.


    Because the `Login` class is a gateway guarding the treasures of your business
    team, it may excite much interest during development and in the months beyond.
    Marketing might call you up and ask that you keep a log of IP addresses. You can
    add a call to your system’s `Logger` class:


    ```

    // listing 11.22

    public function handleLogin(string $user, string $pass, string $ip): bool

    {

    switch (rand(1, 3)) {

    case 1:

    $this->setStatus(self::LOGIN_ACCESS, $user, $ip);

    $isvalid = true;

    break;

    case 2:

    $this->setStatus(self::LOGIN_WRONG_PASS, $user, $ip);

    $isvalid = false;

    break;

    case 3:

    $this->setStatus(self::LOGIN_USER_UNKNOWN, $user, $ip);

    $isvalid = false;

    break;

    }

    Logger::logIP($user, $ip, $this->getStatus());

    return $isvalid;

    }

    ```


    Worried about security, the system administrators might ask for notification of
    failed logins. Once again, you can return to the login method and add a new call:


    ```

    // listing 11.23

    if (! $isvalid) {

    Notifier::mailWarning(

    $user,

    $ip,

    $this->getStatus()

    );

    }

    ```


    The business development team might announce a tie-in with a particular ISP, asking
    that a cookie be set when particular users log in. And so on, and so on.


    These are all easy enough requests to fulfill, but addressing them comes at a
    cost to your design. The `Login` class soon becomes very tightly embedded into
    this particular system. You cannot pull it out and drop it into another product
    without going through the code line-by-line and removing everything that is specific
    to the old system. This isn’t too hard, of course, but then you are off down the
    road of cut-and-paste coding. Now that you have two similar but distinct `Login`
    classes in your systems, you find that an improvement to one will necessitate
    the same changes in the other—until, inevitably and gracelessly, they fall out
    of alignment with one another.


    So what can you do to save the `Login` class? The Observer pattern is a great
    fit here.


    ## Implementation


    At the core of the Observer pattern is the unhooking of client elements (the observers)
    from a central class (the subject). Observers need to be informed when events
    occur that the subject knows about. At the same time, you do not want the subject
    to have a hardcoded relationship with its observer classes.


    To achieve this, you can allow observers to register themselves with the subject.
    You give the `Login` class three new methods, `attach()`, `detach()`, and `notify()`,
    and enforce this using an interface called `Observable`:


    ```

    // listing 11.24

    interface Observable

    {

    public function attach(Observer $observer);

    public function detach(Observer $observer);

    public function notify();

    }

    // listing 11.25

    class Login implements Observable

    {

    private $observers = [];

    private $storage;

    const LOGIN_USER_UNKNOWN = 1;

    const LOGIN_WRONG_PASS   = 2;

    const LOGIN_ACCESS       = 3;

    public function attach(Observer $observer)

    {

    $this->observers[] = $observer;

    }

    public function detach(Observer $observer)

    {

    $this->observers = array_filter(

    $this->observers,

    function ($a) use ($observer) {

    return (! ($a === $observer ));

    }

    );

    }

    public function notify()

    {

    foreach ($this->observers as $obs) {

    $obs->update($this);

    }

    }

    // ...

    }

    ```


    So the `Login` class manages a list of observer objects. These can be added by
    a third party using the `attach()` method and removed via `detach()`. The `notify()`
    method is called to tell the observers that something of interest has happened.
    The method simply loops through the list of observers, calling `update()` on each
    one.


    The `Login` class itself calls `notify()` from its `handleLogin()` method:


    ```

    // listing 11.26

    public function handleLogin(string $user, string $pass, string $ip)

    {

    switch (rand(1, 3)) {

    case 1:

    $this->setStatus(self::LOGIN_ACCESS, $user, $ip);

    $isvalid = true;

    break;

    case 2:

    $this->setStatus(self::LOGIN_WRONG_PASS, $user, $ip);

    $isvalid = false;

    break;

    case 3:

    $this->setStatus(self::LOGIN_USER_UNKNOWN, $user, $ip);

    $isvalid = false;

    break;

    }

    $this->notify();

    return $isvalid;

    }

    ```


    Here’s the interface for the `Observer` class:


    ```

    // listing 11.27

    interface Observer

    {

    public function update(Observable $observable);

    }

    ```


    Any object that uses this interface can be added to the `Login` class via the
    `attach()` method. Here’s a concrete instance:


    ```

    // listing 11.28

    class LoginAnalytics implements Observer

    {

    public function update(Observable $observable)

    {

    // not type safe!

    $status = $observable->getStatus();

    print __CLASS__ . ":    doing something with status info\n";

    }

    }

    ```


    Notice how the observer object uses the instance of `Observable` to get more information
    about the event. It is up to the subject class to provide methods that observers
    can query to learn about state. In this case, I have defined a method called `getStatus()`
    that observers can call to get a snapshot of the current state of play.


    This addition also highlights a problem, though. By calling `Login::getStatus()`,
    the `LoginAnalytics` class assumes more knowledge than it safely can. It is making
    this call on an `Observable` object, but there’s no guarantee that this will also
    be a `Login` object. I have a couple of options here. I could extend the `Observable`
    interface to include a `getStatus()` declaration and perhaps rename it to something
    like `ObservableLogin` to signal that it is specific to the `Login` type.


    Alternatively, I could keep the `Observable` interface generic and make the `Observer`
    classes responsible for ensuring that their subjects are of the correct type.
    They could even handle the chore of attaching themselves to their subject. Since
    there will be more than one type of `Observer`, and since I’m planning to perform
    some housekeeping that is common to all of them, here’s an abstract superclass
    to handle the donkey work:'
  raw: '## The Observer Pattern


    Orthogonality is a virtue I have described before. One of our objectives as programmers
    should be to build components that can be altered or moved with minimal impact
    on other components. If every change we make to one component necessitates a ripple
    of changes elsewhere in the codebase, the task of development can quickly become
    a spiral of bug creation and elimination.


    Of course, orthogonality is often just a dream. Elements in a system must have
    embedded references to other elements. You can, however, deploy various strategies
    to minimize this. You have seen various examples of polymorphism in which the
    client understands a component’s interface, but the actual component may vary
    at runtime.


    In some circumstances, you may wish to drive an even greater wedge between components
    than this. Consider a class responsible for handling a user’s access to a system:


    ```

    // listing 11.21

    class Login

    {

    const LOGIN_USER_UNKNOWN = 1;

    const LOGIN_WRONG_PASS = 2;

    const LOGIN_ACCESS = 3;

    private $status = [];

    public function handleLogin(string $user, string $pass, string $ip): bool

    {

    $isvalid=false;

    switch (rand(1, 3)) {

    case 1:

    $this->setStatus(self::LOGIN_ACCESS, $user, $ip);

    $isvalid = true;

    break;

    case 2:

    $this->setStatus(self::LOGIN_WRONG_PASS, $user, $ip);

    $isvalid = false;

    break;

    case 3:

    $this->setStatus(self::LOGIN_USER_UNKNOWN, $user, $ip);

    $isvalid = false;

    break;

    }

    print "returning ".(($isvalid)?"true":"false")."\n";

    return $isvalid;

    }

    private function setStatus(int $status, string $user, string $ip)

    {

    $this->status = [$status, $user, $ip];

    }

    public function getStatus(): array

    {

    return $this->status;

    }

    }

    ```


    In a real-world example, of course, the `handleLogin()` method would validate
    the user against a storage mechanism. As it is, this class fakes the login process
    using the `rand()` function . There are three potential outcomes of a call to
    `handleLogin()`. The status flag may be set to `LOGIN_ACCESS`, `LOGIN_WRONG_PASS`,
    or `LOGIN_USER_UNKNOWN`.


    Because the `Login` class is a gateway guarding the treasures of your business
    team, it may excite much interest during development and in the months beyond.
    Marketing might call you up and ask that you keep a log of IP addresses. You can
    add a call to your system’s `Logger` class :


    ```

    // listing 11.22

    public function handleLogin(string $user, string $pass, string $ip): bool

    {

    switch (rand(1, 3)) {

    case 1:

    $this->setStatus(self::LOGIN_ACCESS, $user, $ip);

    $isvalid = true;

    break;

    case 2:

    $this->setStatus(self::LOGIN_WRONG_PASS, $user, $ip);

    $isvalid = false;

    break;

    case 3:

    $this->setStatus(self::LOGIN_USER_UNKNOWN, $user, $ip);

    $isvalid = false;

    break;

    }

    Logger::logIP($user, $ip, $this->getStatus());

    return $isvalid;

    }

    ```


    Worried about security, the system administrators might ask for notification of
    failed logins. Once again, you can return to the login method and add a new call:


    ```

    // listing 11.23

    if (! $isvalid) {

    Notifier::mailWarning(

    $user,

    $ip,

    $this->getStatus()

    );

    }

    ```


    The business development team might announce a tie-in with a particular ISP, asking
    that a cookie be set when particular users log in. And so on, and so on.


    These are all easy enough requests to fulfill, but addressing them comes at a
    cost to your design. The `Login` class soon becomes very tightly embedded into
    this particular system. You cannot pull it out and drop it into another product
    without going through the code line-by-line and removing everything that is specific
    to the old system. This isn’t too hard, of course, but then you are off down the
    road of cut-and-paste coding. Now that you have two similar but distinct `Login`
    classes in your systems, you find that an improvement to one will necessitate
    the same changes in the other—until, inevitably and gracelessly, they fall out
    of alignment with one another.


    So what can you do to save the `Login` class? The Observer pattern is a great
    fit here.


    ### Implementation


    At the core of the Observer pattern is the unhooking of client elements (the observers)
    from a central class (the subject). Observers need to be informed when events
    occur that the subject knows about. At the same time, you do not want the subject
    to have a hardcoded relationship with its observer classes.


    To achieve this, you can allow observers to register themselves with the subject.
    You give the `Login` class three new methods, `attach()` , `detach()` , and `notify()`
    , and enforce this using an interface called `Observable` :


    ```

    // listing 11.24

    interface Observable

    {

    public function attach(Observer $observer);

    public function detach(Observer $observer);

    public function notify();

    }

    // listing 11.25

    class Login implements Observable

    {

    private $observers = [];

    private $storage;

    const LOGIN_USER_UNKNOWN = 1;

    const LOGIN_WRONG_PASS   = 2;

    const LOGIN_ACCESS       = 3;

    public function attach(Observer $observer)

    {

    $this->observers[] = $observer;

    }

    public function detach(Observer $observer)

    {

    $this->observers = array_filter(

    $this->observers,

    function ($a) use ($observer) {

    return (! ($a === $observer ));

    }

    );

    }

    public function notify()

    {

    foreach ($this->observers as $obs) {

    $obs->update($this);

    }

    }

    // ...

    }

    ```


    So the `Login` class manages a list of observer objects. These can be added by
    a third party using the `attach()` method and removed via `detach()` . The `notify()`
    method is called to tell the observers that something of interest has happened.
    The method simply loops through the list of observers, calling `update()` on each
    one.


    The `Login` class itself calls `notify()` from its `handleLogin()` method :


    ```

    // listing 11.26

    public function handleLogin(string $user, string $pass, string $ip)

    {

    switch (rand(1, 3)) {

    case 1:

    $this->setStatus(self::LOGIN_ACCESS, $user, $ip);

    $isvalid = true;

    break;

    case 2:

    $this->setStatus(self::LOGIN_WRONG_PASS, $user, $ip);

    $isvalid = false;

    break;

    case 3:

    $this->setStatus(self::LOGIN_USER_UNKNOWN, $user, $ip);

    $isvalid = false;

    break;

    }

    $this->notify();

    return $isvalid;

    }

    ```


    Here’s the interface for the `Observer` class :


    ```

    // listing 11.27

    interface Observer

    {

    public function update(Observable $observable);

    }

    ```


    Any object that uses this interface can be added to the `Login` class via the
    `attach()` method . Here’s a concrete instance:


    ```

    // listing 11.28

    class LoginAnalytics implements Observer

    {

    public function update(Observable $observable)

    {

    // not type safe!

    $status = $observable->getStatus();

    print __CLASS__ . ":    doing something with status info\n";

    }

    }

    ```


    Notice how the observer object uses the instance of `Observable` to get more information
    about the event. It is up to the subject class to provide methods that observers
    can query to learn about state. In this case, I have defined a method called `getStatus()`
    that observers can call to get a snapshot of the current state of play.


    This addition also highlights a problem, though. By calling `Login::getStatus()`,
    the `LoginAnalytics` class assumes more knowledge than it safely can. It is making
    this call on an `Observable` object, but there’s no guarantee that this will also
    be a `Login` object. I have a couple of options here. I could extend the `Observable`
    interface to include a `getStatus()` declaration and perhaps rename it to something
    like `ObservableLogin` to signal that it is specific to the `Login` type.


    Alternatively, I could keep the `Observable` interface generic and make the `Observer`
    classes responsible for ensuring that their subjects are of the correct type.
    They could even handle the chore of attaching themselves to their subject. Since
    there will be more than one type of `Observer`, and since I’m planning to perform
    some housekeeping that is common to all of them, here’s an abstract superclass
    to handle the donkey work:'
  trans: "\n# 观察者模式\n\n我曾在之前描述过“正交性”这一美德。作为程序员，我们的目标之一应该是构建那些在修改或移动时对其他组件影响最小的组件。如果每次对一个组件的修改都导致代码库中其他地方产生连锁反应，那么开发任务很快就会变成一个不断产生和消灭\
    \ Bug 的螺旋。\n\n当然，正交性往往只是一个梦想。系统中的各个元素必须包含对其他元素的嵌入式引用。不过，你可以采用多种策略来最小化这种依赖。你们已经看到过多态的各种例子，在这些例子中，客户端理解一个组件的接口，但实际的组件可能在运行时发生变化。\n\
    \n在某些情况下，你可能希望在这样的组件之间实现比这更大的分离。考虑一个负责处理用户访问系统的类：\n\n```\n// 清单 11.21\nclass Login\n\
    {\n    const LOGIN_USER_UNKNOWN = 1;\n    const LOGIN_WRONG_PASS = 2;\n    const\
    \ LOGIN_ACCESS = 3;\n    private $status = [];\n    public function handleLogin(string\
    \ $user, string $pass, string $ip): bool\n    {\n        $isvalid=false;\n   \
    \     switch (rand(1, 3)) {\n            case 1:\n                $this->setStatus(self::LOGIN_ACCESS,\
    \ $user, $ip);\n                $isvalid = true;\n                break;\n   \
    \         case 2:\n                $this->setStatus(self::LOGIN_WRONG_PASS, $user,\
    \ $ip);\n                $isvalid = false;\n                break;\n         \
    \   case 3:\n                $this->setStatus(self::LOGIN_USER_UNKNOWN, $user,\
    \ $ip);\n                $isvalid = false;\n                break;\n        }\n\
    \        print \"returning \".(($isvalid)?\"true\":\"false\").\"\\n\";\n     \
    \   return $isvalid;\n    }\n    private function setStatus(int $status, string\
    \ $user, string $ip)\n    {\n        $this->status = [$status, $user, $ip];\n\
    \    }\n    public function getStatus(): array\n    {\n        return $this->status;\n\
    \    }\n}\n```\n\n当然，在真实世界的例子中，`handleLogin()` 方法会针对某个存储机制来验证用户。而在这里，这个类使用 `rand()`\
    \ 函数模拟了登录过程。调用 `handleLogin()` 有三种可能的结果。状态标志可能被设置为 `LOGIN_ACCESS`、`LOGIN_WRONG_PASS`\
    \ 或 `LOGIN_USER_UNKNOWN`。\n\n因为 `Login` 类是守护你业务团队宝藏的网关，它在开发期间及之后的几个月里可能会引起很多关注。市场部门可能会打电话给你，要求你记录\
    \ IP 地址日志。你可以在你的系统 `Logger` 类中添加一个调用：\n\n```\n// 清单 11.22\npublic function handleLogin(string\
    \ $user, string $pass, string $ip): bool\n{\n    switch (rand(1, 3)) {\n     \
    \   case 1:\n            $this->setStatus(self::LOGIN_ACCESS, $user, $ip);\n \
    \           $isvalid = true;\n            break;\n        case 2:\n          \
    \  $this->setStatus(self::LOGIN_WRONG_PASS, $user, $ip);\n            $isvalid\
    \ = false;\n            break;\n        case 3:\n            $this->setStatus(self::LOGIN_USER_UNKNOWN,\
    \ $user, $ip);\n            $isvalid = false;\n            break;\n    }\n   \
    \ Logger::logIP($user, $ip, $this->getStatus());\n    return $isvalid;\n}\n```\n\
    \n出于安全考虑，系统管理员可能会要求你提供登录失败的告警通知。再次地，你不得不返回到登录方法中添加一个新的调用：\n\n```\n// 清单 11.23\n\
    if (! $isvalid) {\n    Notifier::mailWarning(\n        $user,\n        $ip,\n\
    \        $this->getStatus()\n    );\n}\n```\n\n业务开发团队可能宣布与某个特定 ISP 合作，要求在特定用户登录时设置一个\
    \ cookie。诸如此类，不一而足。\n\n这些都是很容易满足的请求，但处理它们会以牺牲你的设计为代价。`Login` 类很快就变得与这个特定系统紧密耦合。你无法在不逐行检查代码并移除所有与旧系统相关的内容的情况下，将它抽取出来放到另一个产品中。当然，这并不太难，但随后你便走上了复制粘贴编码的道路。现在，你的系统中有两个相似但不同的\
    \ `Login` 类，你发现对一个类的改进必然需要对另一个类进行相同的修改——直到它们不可避免地、笨拙地变得彼此不一致。\n\n那么，你能做些什么来拯救\
    \ `Login` 类呢？观察者模式在这里非常适用。\n\n## 实现\n\n观察者模式的核心是将客户端元素（观察者）从中心类（主题）解耦。当主题知道的事件发生时，观察者需要得到通知。同时，你也不希望主题与它的观察者类之间存在硬编码的关系。\n\
    \n为了实现这一点，你可以允许观察者向主题注册自身。你给 `Login` 类添加三个新方法：`attach()`、`detach()` 和 `notify()`，并通过一个名为\
    \ `Observable` 的接口来强制执行：\n\n```\n// 清单 11.24\ninterface Observable\n{\n    public\
    \ function attach(Observer $observer);\n    public function detach(Observer $observer);\n\
    \    public function notify();\n}\n// 清单 11.25\nclass Login implements Observable\n\
    {\n    private $observers = [];\n    private $storage;\n    const LOGIN_USER_UNKNOWN\
    \ = 1;\n    const LOGIN_WRONG_PASS   = 2;\n    const LOGIN_ACCESS       = 3;\n\
    \    public function attach(Observer $observer)\n    {\n        $this->observers[]\
    \ = $observer;\n    }\n    public function detach(Observer $observer)\n    {\n\
    \        $this->observers = array_filter(\n            $this->observers,\n   \
    \         function ($a) use ($observer) {\n                return (! ($a === $observer\
    \ ));\n            }\n        );\n    }\n    public function notify()\n    {\n\
    \        foreach ($this->observers as $obs) {\n            $obs->update($this);\n\
    \        }\n    }\n    // ...\n}\n```\n\n因此，`Login` 类管理一个观察者对象列表。第三方可以通过 `attach()`\
    \ 方法添加这些观察者，并通过 `detach()` 方法移除它们。调用 `notify()` 方法是为了通知观察者有关趣的事件发生了。该方法简单地遍历观察者列表，并对每个观察者调用\
    \ `update()`。\n\n`Login` 类本身从其 `handleLogin()` 方法中调用 `notify()`：\n\n```\n// 清单\
    \ 11.26\npublic function handleLogin(string $user, string $pass, string $ip)\n\
    {\n    switch (rand(1, 3)) {\n        case 1:\n            $this->setStatus(self::LOGIN_ACCESS,\
    \ $user, $ip);\n            $isvalid = true;\n            break;\n        case\
    \ 2:\n            $this->setStatus(self::LOGIN_WRONG_PASS, $user, $ip);\n    \
    \        $isvalid = false;\n            break;\n        case 3:\n            $this->setStatus(self::LOGIN_USER_UNKNOWN,\
    \ $user, $ip);\n            $isvalid = false;\n            break;\n    }\n   \
    \ $this->notify();\n    return $isvalid;\n}\n```\n\n以下是 `Observer` 类的接口：\n\n```\n\
    // 清单 11.27\ninterface Observer\n{\n    public function update(Observable $observable);\n\
    }\n```\n\n任何实现了这个接口的对象都可以通过 `attach()` 方法添加到 `Login` 类中。下面是一个具体的实例：\n\n```\n//\
    \ 清单 11.28\nclass LoginAnalytics implements Observer\n{\n    public function update(Observable\
    \ $observable)\n    {\n        // not type safe!\n        $status = $observable->getStatus();\n\
    \        print __CLASS__ . \":    doing something with status info\\n\";\n   \
    \ }\n}\n```\n\n注意观察者对象是如何使用 `Observable` 的实例来获取关于该事件的更多信息的。这取决于主题类是否提供可供观察者查询以了解状态的方法。在这个例子中，我定义了一个名为\
    \ `getStatus()` 的方法，观察者可以调用它来获取当前状态的快照。\n\n不过，这种添加也揭示了一个问题。通过调用 `Login::getStatus()`，`LoginAnalytics`\
    \ 类假设了比其安全所能保证的更多的知识。它是在对一个 `Observable` 对象发起这个调用，但并不能保证这个对象同时也必须是 `Login` 对象。我有几个选择。我可以扩展\
    \ `Observable` 接口，加入一个 `getStatus()` 声明，并可能将其重命名为类似 `ObservableLogin` 的名字，以表明它特定于\
    \ `Login` 类型。\n\n或者，我可以让 `Observable` 接口保持通用，并让 `Observer` 类负责确保它们的主题是正确类型。它们甚至可以自己处理将自己附加到主题上的琐事。由于会有不止一种类型的\
    \ `Observer`，并且我打算执行一些对所有观察者都通用的内务管理工作，因此这里提供一个抽象超类来处理这些基础工作：\n"
- fmt: "```\n// listing 11.29\nabstract class LoginObserver implements Observer\n\
    {\nprivate $login;\npublic function __construct(Login $login)\n{\n$this->login\
    \ = $login;\n$login->attach($this);\n}\npublic function update(Observable $observable)\n\
    {\nif ($observable === $this->login) {\n$this->doUpdate($observable);\n}\n}\n\
    abstract public function doUpdate(Login $login);\n}\n```\n\n`LoginObserver`类在其构造函数中需要一个`Login`对象。它存储一个引用并调用`Login::attach()`。当`update()`被调用时，它会检查提供的`Observable`对象是否为正确的引用，然后调用模板方法`doUpdate()`。现在可以创建一套`LoginObserver`对象，它们都能确保与`Login`对象而非任意`Observable`对象配合工作：\n\
    \n```\n// listing 11.30\nclass SecurityMonitor extends LoginObserver\n{\npublic\
    \ function doUpdate(Login $login)\n{\n$status = $login->getStatus();\nif ($status[0]\
    \ == Login::LOGIN_WRONG_PASS) {\n// send mail to sysadmin\nprint __CLASS__ . \"\
    :    sending mail to sysadmin\\n\";\n}\n}\n}\n// listing 11.31\nclass GeneralLogger\
    \ extends LoginObserver\n{\npublic function doUpdate(Login $login)\n{\n$status\
    \ = $login->getStatus();\n// add login data to log\nprint __CLASS__ . \":    add\
    \ login data to log\\n\";\n}\n}\n// listing 11.32\nclass PartnershipTool extends\
    \ LoginObserver\n{\npublic function doUpdate(Login $login)\n{\n$status = $login->getStatus();\n\
    // check $ip address\n// set cookie if it matches a list\nprint __CLASS__ . \"\
    :    set cookie if it matches a list\\n\";\n}\n}\n```\n\n现在创建并附加`LoginObserver`类可以在实例化时一次性完成：\n\
    \n```\n$login = new Login();\nnew SecurityMonitor($login);\nnew GeneralLogger($login);\n\
    new PartnershipTool($login);\n```\n\n至此，我在主体类和观察者之间建立了灵活的关系。图 [11-6](#A314621_5_En_11_Chapter.html#Fig6)\
    \ 展示了本例的类图。\n\n![A314621_5_En_11_Fig6_HTML.gif](A314621_5_En_11_Fig6_HTML.gif)\n\
    \nFigure 11-6. Observer模式\n\nPHP通过内置的SPL（标准PHP库）扩展提供了对Observer模式的原生支持。SPL是一套帮助解决常见面向对象问题的工具集。这套面向对象瑞士军刀中的观察者部分由三个元素组成：`SplObserver`、`SplSubject`和`SplObjectStorage`。`SplObserver`和`SplSubject`是接口，与本节示例中展示的`Observer`和`Observable`接口完全对应。`SplObjectStorage`是一个实用类，旨在提供更好的对象存储和移除功能。以下是Observer实现的一个精简版本：\n\
    \n```\n// listing 11.33\nclass Login implements \\SplSubject\n{\nprivate $storage;\n\
    // ...\npublic function __construct()\n{\n$this->storage = new \\SplObjectStorage();\n\
    }\npublic function attach(\\SplObserver $observer)\n{\n$this->storage->attach($observer);\n\
    }\npublic function detach(\\SplObserver $observer)\n{\n$this->storage->detach($observer);\n\
    }\npublic function notify()\n{\nforeach ($this->storage as $obs) {\n$obs->update($this);\n\
    }\n}\n// ...\n}\n// listing 11.34\nabstract class LoginObserver implements \\\
    SplObserver\n{\nprivate $login;\npublic function __construct(Login $login)\n{\n\
    $this->login = $login;\n$login->attach($this);\n}\npublic function update(\\SplSubject\
    \ $subject)\n{\nif ($subject === $this->login) {\n$this->doUpdate($subject);\n\
    }\n}\nabstract public function doUpdate(Login $login);\n}\n```\n\n就`SplObserver`（原`Observer`）和`SplSubject`（原`Observable`）而言，两者之间没有实质区别——当然，我无需再声明接口，并且必须根据新名称修改类型提示。然而`SplObjectStorage`确实提供了非常有用的服务。你可能注意到，在最初的示例中，我的`Login::detach()`实现使用了`array_filter`（配合匿名函数）来查找和移除`$observers`数组中的参数对象。`SplObjectStorage`类在底层为你完成了这项工作。它实现了`attach()`和`detach()`方法，并且可以像数组一样传递给`foreach`进行迭代。\n\
    \n> **注意**  \n> 你可以在PHP文档 [`http://www.php.net/spl`](http://www.php.net/spl) 中了解更多关于SPL的信息。特别地，你会发现那里有许多迭代器工具。我在第13章“数据库模式”中介绍了PHP内置的`Iterator`接口。\n\
    \n在`Observable`类与其`Observer`之间通信的另一种方法，是通过`update()`方法传递特定的状态信息，而不是传递主体类的实例。对于快速解决方案，我通常一开始就采用这种方法。因此，在示例中，`update()`将期望接收状态标志、用户名和IP地址（可能以数组形式保证可移植性），而不是`Login`实例。这让你无需在`Login`类中编写状态方法。另一方面，当主体类存储大量状态时，将其实例传递给`update()`可以为观察者提供更大的灵活性。\n\
