    Unlike a spreadsheet, most databases store data in several smaller tables, rather
    than in one huge table. This prevents duplication and inconsistency. Let’s say
    you’re building a database of your favorite quotations. Instead of typing out
    the name of the author each time, it’s more efficient to put the authors’ names
    in a separate table, and store a reference to an author’s primary key with each
    quotation. As you can see in Figure [10-3](#A978-1-4842-0635-5_10_Chapter.html#Fig3),
    every record in the left-hand table identified by `author_id 32` is a quotation
    from William Shakespeare.


    ![A978-1-4842-0635-5_10_Fig3_HTML.jpg](A978-1-4842-0635-5_10_Fig3_HTML.jpg)


    Figure 10-3.


    Foreign keys are used to link information stored in separate tables


    Because the name is stored in only one place, it guarantees that it’s always spelled
    correctly. And if you do make a spelling mistake, just a single correction is
    all that’s needed to ensure that the change is reflected throughout the database.


    Storing a primary key from one table within another table is known as creating
    a foreign key. Using foreign keys to link information in different tables is one
    of the most powerful aspects of a relational database. It can also be difficult
    to grasp in the early stages, so we’ll work with single tables until [Chapters
    15](#A978-1-4842-0635-5_15_Chapter.html) and [16](#A978-1-4842-0635-5_16_Chapter.html),
    which cover foreign keys in detail. In the meantime, bear the following points
    in mind:


