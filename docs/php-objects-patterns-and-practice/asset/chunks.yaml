    ```\n\nNote\n\nWhen you run the `composer install`\ncommand, Composer creates\
    \ a file named `composer.lock`. This\nrecords the exact version of every file\
    \ you installed under `vendor/`. If you run\n`composer install` with a `composer.lock`\
