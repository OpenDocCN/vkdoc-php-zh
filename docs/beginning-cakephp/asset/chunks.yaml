  trans: "\n# 插件命名约定与用法\n\n插件中的独立视图文件无需更改命名约定。换言之，它们的命名方式与标准 Cake 视图文件相同。例如，Events\
    \ 视图将存储在 `app/plugins/calendar/views/events` 文件夹中。插件中的独立视图随后根据操作命名：如 `index.ctp`\
    \ 等。\n\n插件中不仅部分文件名需要进行调整才能正常工作，文件中的类名也需要调整。为避免插件与周围的 Cake 应用文件名和类名冲突，必须对命名约定和语法进行适当调整。\n\
    \n例如，类名不再命名为 `AppController`，而是需要在前面加上插件名称。名为 Calendar 的插件，其类名应按照插件名称命名。举例来说，App\
    \ 控制器将命名为 `CalendarAppController`，App 模型将命名为 `CalendarAppModel`。插件使用的其他元素，其类名应根据元素类型进行相应调整。\n\
    \n控制器和模型分别继承插件的 App 控制器和 App 模型（参见清单 13-3）。因此，在实例化插件类时，类名必须体现这种继承关系。\n\n**清单 13-3.**\
    \ *插件控制器继承 App 控制器示例*\n\n```\n<?\nclass EventsController extends CalendarAppController\
    \ {\n    var $name = 'Events';\n    var $uses = array('Event');\n}\n?>\n```\n\n\
    请注意，清单 13-3 的第 4 行显示插件控制器使用 `$uses` 类属性来指定对应的模型。虽然 Cake 应该能自动选择相应的模型和视图，但持续设置\
    \ `$uses` 数组将使插件更具可移植性，并降低插件控制器与周围应用命名空间冲突的风险。\n\n与插件控制器类似，插件模型继承 App 模型，并且其命名语法已调整以适配插件（参见清单\
    \ 13-4）。\n\n**清单 13-4.** *插件模型继承 App 模型示例*\n\n```\n<?\nclass EventModel extends\
    \ CalendarAppModel {\n    var $name = 'Event';\n}\n?>\n```\n\n辅助器、组件、行为和数据源也可以作为插件的一部分使用。它们的命名约定通常保持不变，与作为\
    \ Cake 应用元素而非插件元素时相同。有关如何命名其他插件类以及它们继承哪些对象的信息，请参考表 13-1。\n\n## 运行插件操作\n\n插件安装到\
    \ Cake 应用后，可以通过在 URL 中添加插件名称以及操作和参数来访问其操作。清单 13-3 中使用的 Events 控制器可通过以下 URL 在博客应用中调用：\n\
    \n`http://localhost/blog/calendar/events`\n\n当然，操作和参数也可以跟随其后：\n\n`http://localhost/blog/calendar/events/view/01/2009`\n\
    \n周围的 Cake 应用中的控制器可以使用 `requestAction()` 函数来运行插件的控制器操作：\n\n```php\n$events = $this->requestAction(array('controller'=>'CalendarEvents','action'=>'getEvents'));\n\
    ```\n\n## 使用插件布局\n\n默认情况下，插件将使用周围应用中 `app/views/layouts` 目录下的默认布局。指定存储在插件中的布局很简单：只需在操作或控制器中使用\
    \ `$layout` 类变量即可。确保在布局设置中添加插件名称。清单 13-5 给出了如何执行此操作的示例。\n\n**清单 13-5.** *在插件控制器中使用插件布局*\n\
    \n```\n<?\nclass EventsController extends CalendarAppController {\n    var $name\
    \ = 'Events';\n    var $layout = 'Calendar.default';\n}\n?>\n```\n"
- fmt: 'Now that I’ve explained plugins and how to create one, let’s build a plugin
    for the blog application. This Calendar plugin will be very simple: the author
    of the blog will store different events in the database, and the user will be
    able to visit a page showing a month with links to each event. For this plugin
    to be portable, I will approach writing it from a general standpoint. In other
    words, I won’t necessarily be thinking of the blog application when writing the
    plugin, though ultimately the plugin will be implemented in the blog.


    ## Setting Up the Files and Folders


    Remember that the Calendar plugin will need the `controllers`, `models`, and `views`
    folders as well as the `App` controller and `App` model for it to work properly.
    In each of these files, the syntax will have to be adjusted so that they all work
    as a plugin and not as a Cake application element.


    Create the plugin root folder, and name it `calendar` after the name of the plugin.
    In this folder, create all the basic files and folders:


    ```

    calendar/

    calendar_app_controller.php

    calendar_app_model.php

    controllers/

    events_controller.php

    models/

    calendar_event.php

    views/

    events/

    ```


    In the `calendar_app_controller.php` file, be sure to include the appropriate
    class names:


    ```php

    <?

    class CalendarAppController extends AppController {


    }

    ?>

    ```


    The App model will also need to be named correctly:


    ```php

    <?

    class CalendarAppModel extends AppModel {


    }

    ?>

    ```


    Without the App controller and App model, Cake will not be able to connect to
    the plugin’s controllers, models, and views. By naming the classes in the plugin’s
    App controller and App model files, I’ve made sure Cake knows how to use the plugin
    and by what name the various elements of the plugin will be called.


    The rest of the plugin will be written as though it were a basic Cake application.
    Of course, you must remember to name the customized controllers, models, and views
    according to the plugin syntax.


    09775ch13final 7/1/08 9:58 PM Page 225


    C H A P T E R 1 3 ■ P L U G I N S


    **225**


    ## Create the Events Table


    The Calendar plugin will need to store data, so let’s build an `events` table
    in the database.


    Listing 13-6 contains the SQL needed to create this table.


    **Listing 13-6.** *The* `events` *Table for the Calendar Plugin*


    ```sql

    CREATE TABLE `calendar_events` (

    `id` int(11) unsigned NOT NULL auto_increment,

    `name` varchar(255) NULL,

    `date` datetime NULL,

    `details` text NULL,

    PRIMARY KEY (`id`)

    );

    ```


    Notice that the table stores only the event’s date and time with some details.
    The `name` field will contain the text the user will click to read more details
    about the event. To keep the records from being duplicated, the table includes
    an ID field that is set to `auto_increment`.


    Next, connect the plugin to this table by creating a plugin model.


    ## Create the Event Model


    The `calendar_events` table will need a model with which to connect. Because the
    table is named with an underscore, the model name will need to be camel-cased.
    Create a file named `calendar_event.php`, and store it in the `app/plugins/calendar/models`
    directory. Then paste into this file the contents of Listing 13-7.


    **Listing 13-7.** *The* `CalendarEvent` *Model*


    ```php

    <?

    class CalendarEvent extends CalendarAppModel {

    var $name = ''CalendarEvent'';

    var $uses = array(''CalendarEvents'');

    }

    ?>

    ```


    Notice that on line 2 this model extends the plugin’s App model, *not* the surrounding
    application’s App model. Line 3 assigns the model a name, and line 4 sets the
    `$uses` array to `CalendarEvents`, which ensures that the model will connect to
    the `calendar_events` table correctly. Lastly, create the controller that will
    run the plugin.


    ## Create the Events Controller


    The `Events` controller will contain all the actions for the Calendar plugin since
    the plugin itself is going to be fairly basic. To get this controller working
    inside the plugin, you must extend the Calendar App controller and provide actions
    to perform the plugin’s logic. Listing 13-8 contains the initial content of the
    `Events` controller. Write this code to a new file called `app/plugins/calendar/controllers/events_controller.php`.'
