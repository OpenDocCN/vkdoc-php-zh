- fmt: "## 步骤 5\n\n在`presentation/smarty_plugins/function.load_products_list.php`中的`init()`方法末尾，添加创建\
    \ PayPal 添加到购物车链接代码：\n\n```\nfor ($i = 0; $i < count($this->mProducts); $i++)\n\
    {\n  $this->mProducts[$i]['link'] =\n    $url . $this->mProducts[$i]['product_id'];\n\
    \n  // 创建 PayPal 链接\n  $this->mProducts[$i]['paypal'] =\n    'JavaScript:OpenPayPalWindow(\"\
    ' .\n    'https://www.paypal.com/cgi-bin/webscr?' .\n    'cmd=_cart&business=youremail@example.com'\
    \ .\n    '&item_name=' . rawurlencode($this->mProducts[$i]['name']) .\n    '&amount='\
    \ .\n    (($this->mProducts[$i]['discounted_price'] == 0) ?\n      $this->mProducts[$i]['price']\
    \ :\n      $this->mProducts[$i]['discounted_price']) .\n    '&currency=USD&add=1&return=www.example.com'\
    \ .\n    '&cancel_return=www.example.com\")';\n}\n```\n\n## 步骤 6\n\n确保将`youremail@example.com`替换为你创建\
    \ PayPal 账户时提交的电子邮件地址，此替换适用于添加到购物车和查看购物车按钮！此外，将两个`www.example.com`实例替换为你电子商务商店的地址。或者，如果你不希望\
    \ PayPal 在客户完成或取消支付后重定向到你的网站，可以删除`return`和`cancel_return`变量。\n\n> **Caution:**\
    \ 如果你希望资金存入你的账户，必须使用正确的电子邮件地址！\n\n## 步骤 7\n\n在浏览器中加载`index.php`页面，并点击某个添加到购物车按钮。你应该会看到\
    \ PayPal 购物车，如图 6-2 所示。\n\n**Figure 6-2.** *集成 PayPal 购物车*\n\n尝试操作 PayPal 购物车，确保其正常工作。\n\
    \n---\n\n**工作原理：PayPal 集成**\n\n是的，就这么简单。现在，所有访客都成为了潜在客户！他们可以点击 PayPal 购物车的结账按钮，然后购买产品！\n\
    \n在构建 PayPal 调用时，我们使用 Smarty 的转义功能，以确保产品名称在包含不可移植字符（如`&`、空格等）时格式正确。有关`escape`方法的更多详情，请访问：`http://smarty.php.net/manual/en/language.modifier.escape.php`。\n\
    \n客户在网站上完成支付后，一封电子邮件通知会发送到 PayPal 注册的邮箱以及客户邮箱。你的 PayPal 账户将反映该笔支付，你可以在账户历史或历史交易日志中查看交易信息。\n\
    \nPayPal 确认支付后，你可以将产品发货给客户。\n\n如果你决定在自己的网站上使用 PayPal，请务必了解其所有功能。例如，你可以让 PayPal\
    \ 自动计算每笔订单的运费和税费。\n\n---\n\n## 使用 PayPal 单品购买功能\n\n单品购买是 PayPal 的一项功能，允许你将访客直接引导至支付页面，而非\
    \ PayPal 购物车。在第 8 章中，你将创建自己的购物车，届时 PayPal 购物车将不再适用。\n\n在第 9 章中，你将在购物车中实现“下单”按钮，将订单保存到数据库并跳转到\
    \ PayPal 支付页面。要调用 PayPal 支付页面（绕过 PayPal 购物车），你需要重定向到如下链接：\n\n`https://www.paypal.com/xclick/business=youremail@example.com&item_name=Order\
    \ 123 &item_number=123&amount=123&currency=USD&return=www.example.com &cancel_return=www.example.com`\n\
    \n请参阅 PayPal 网站支付标准集成指南，了解有关该服务的更多详细信息。"
