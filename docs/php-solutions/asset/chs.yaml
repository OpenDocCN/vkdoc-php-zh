- "# PHP 解决方案 7-4：创建通用文件选择器\n\n前面的 PHP 解决方案依赖于对正则表达式的理解。将其调整为适用于其他文件扩展名并不困难，但您需要小心，以免意外删除关键字符。除非正则表达式是您的专长，否则将代码包装在一个函数中可能更简单，该函数可用于检查特定文件夹并创建特定类型文件名的数组。例如，您可能想创建一个\
  \ PDF 文档文件名的数组，或者一个同时包含 PDF 和 Word 文档的数组。操作方法如下。\n\n在 `filesystem` 文件夹中创建一个名为 `buildlist.php`\
  \ 的新文件。该文件将只包含 PHP 代码，因此请删除编辑程序插入的任何 HTML。将以下代码添加到文件中：\n\n```\nfunction buildFileList($dir,\
  \ $extensions) {\n    if (!is_dir($dir) || !is_readable($dir)) {\n        return\
  \ false;\n    } else {\n        if (is_array($extensions)) {\n            $extensions\
  \ = implode('|', $extensions);\n        }\n    }\n}\n```\n\n这里定义了一个名为 `buildFileList()`\
  \ 的函数，它接收两个参数：\n\n*   `$dir`：您希望从中获取文件名列表的文件夹路径。\n*   `$extensions`：可以是一个包含单个文件扩展名的字符串，也可以是一个文件扩展名数组。为保持代码简洁，文件扩展名不应包含前导句点。\n\
  \n该函数首先检查 `$dir` 是否是一个文件夹并且是否可读。如果不是，函数返回 `false`，并且不再执行后续代码。\n\n如果 `$dir` 没问题，则执行\
  \ `else` 代码块。它同样以一个条件语句开始，检查 `$extensions` 是否是一个数组。如果是，则将数组传递给 `implode()`，该函数将数组元素用竖线（`|`）连接起来。竖线在正则表达式中用于表示“或”关系。假设以下数组作为第二个参数传递给函数：\n\
  \n`['jpg', 'png', 'gif']`\n\n条件语句会将其转换为 `jpg|png|gif`。因此，这将查找 `jpg`、`png` 或 `gif`。然而，如果参数是一个字符串，则保持不变。\n\
  \n现在您可以构建正则表达式搜索模式，并将两个参数传递给 `FilesystemIterator` 和 `RegexIterator`，如下所示：\n\n```\n\
  function buildFileList($dir, $extensions) {\n    if (!is_dir($dir) || !is_readable($dir))\
  \ {\n        return false;\n    } else {\n        if (is_array($extensions)) {\n\
  \            $extensions = implode('|', $extensions);\n        }\n        $pattern\
  \ = \"/\\.(?:{$extensions})$/i\";\n        $folder = new FilesystemIterator($dir);\n\
  \        $files = new RegexIterator($folder, $pattern);\n    }\n}\n```\n\n正则表达式模式是通过使用双引号字符串构建的，并将\
  \ `$extensions` 包裹在花括号中，以确保 PHP 引擎能正确解析它。复制代码时请小心。它确实不太容易阅读。\n\n代码的最后一部分提取文件名以构建一个数组，该数组经过排序后被返回。完成的函数定义如下所示：\n\
  \n```\nfunction buildFileList($dir, $extensions) {\n    if (!is_dir($dir) || !is_readable($dir))\
  \ {\n        return false;\n    } else {\n        if (is_array($extensions)) {\n\
  \            $extensions = implode('|', $extensions);\n        }\n        $pattern\
  \ = \"/\\.(?:{$extensions})$/i\";\n        $folder = new FilesystemIterator($dir);\n\
  \        $files = new RegexIterator($folder, $pattern);\n        $filenames = [];\n\
  \        foreach ($files as $file) {\n            $filenames[] = $file->getFilename();\n\
  \        }\n        natcasesort($filenames);\n        return $filenames;\n    }\n\
  }\n```\n\n这段代码初始化了一个数组，并使用 `foreach` 循环通过 `getFilename()` 方法将文件名赋值给该数组。最后，将数组传递给\
  \ `natcasesort()`，该函数以自然、不区分大小写的顺序对其进行排序。所谓“自然”排序，是指包含数字的字符串会按照人类习惯的方式排序。例如，计算机通常会将\
  \ `img12.jpg` 排在 `img2.jpg` 之前，因为 12 中的 1 小于 2。而使用 `natcasesort()` 则会使 `img2.jpg`\
  \ 排在 `img12.jpg` 之前。\n\n要使用该函数，将文件夹路径和您想要查找的文件的扩展名作为参数传入。例如，您可以像这样从文件夹中获取所有 Word\
  \ 和 PDF 文档：\n\n`$docs = buildFileList('文件夹名称', ['doc', 'docx', 'pdf']);`\n\n`buildFileList()`\
  \ 函数的代码位于 `ch07` 文件夹的 `buildlist.php` 中。\n\n\n\n"
- "# 访问远程文件\n\n在本地计算机或自有网站上读取、写入和检查文件非常有用。但 `allow_url_fopen` 也能让你访问互联网上任何位置的公开文档。你不能直接包含来自其他服务器的文件——除非开启了\
  \ `allow_url_include`——但你可以读取其内容，保存到变量中，并在将其整合到你自己的页面或保存信息到数据库之前，使用 PHP 函数进行处理。只要远程服务器的所有者设置了适当的权限，你还可以向远程服务器上的文档写入内容。\n\
  \n在此需要提醒一句。从远程来源提取内容整合到自己的页面时，存在潜在的安全风险。例如，远程页面可能包含嵌入在 `<script>` 标签或超链接中的恶意脚本。除非远程页面以已知格式从受信任的来源提供数据（例如\
  \ Amazon.com 数据库中的产品详情、政府气象局提供的天气信息、或报纸或广播公司提供的新闻源），否则应通过将内容传递给 `htmlentities()`\
  \ 函数（参见 PHP 方案 5-2）进行清理。`htmlentities()` 不仅会将双引号转换为 `&quot;`，还会将 `<` 转换为 `&lt;`，将\
  \ `>` 转换为 `&gt;`。这样会将标签显示为纯文本，而不是将其作为 HTML 处理。\n\n如果你希望允许某些 HTML 标签，可以使用 `strip_tags()`\
  \ 函数。向 `strip_tags()` 传递一个字符串时，它会返回移除了所有 HTML 标签和注释的字符串。它还会移除 PHP 标签。第二个可选参数是一个列表，用于指定你想要保留的标签。例如，以下代码会剥离除段落、一级标题和二级标题之外的所有标签：\n\
  \n`$stripped = strip_tags($original, '<p><h1><h2>');`\n\n**提示**  \n关于安全问题的深入讨论，请参阅\
  \ Chris Snyder 和 Michael Southwell 合著的《Pro PHP Security, 2nd Edition》（Apress, 2010,\
  \ ISBN: 978-1-4302-3318-3）。\n\n## 消费新闻及其他 RSS 源\n\n你可能希望在网站中整合的一些最有用的远程信息来源来自 RSS\
  \ 源。RSS 代表 Really Simple Syndication（真正简易聚合），它是 XML 的一种方言。XML 与 HTML 类似，都使用标签来标记内容。不同之处在于，XML\
  \ 标签用于以可预测的层次结构组织数据，而不是定义段落、标题和图像。XML 以纯文本编写，因此经常用于在可能运行不同操作系统的计算机之间共享信息。\n\n图 7-3\
  \ 展示了典型的 RSS 2.0 源结构。整个文档由一对 `<rss>` 标签包裹。这是根元素，类似于网页中的 `<html>` 标签。文档的其余部分由一对 `<channel>`\
  \ 标签包裹，其中始终包含描述 RSS 源的以下三个元素：`<title>`、`<description>` 和 `<link>`。\n\n![A978-1-4842-0635-5_7_Fig3_HTML.jpg](img/A978-1-4842-0635-5_7_Fig3_HTML.jpg)\n\
  **图 7-3.** RSS 源的主要内容位于 item 元素中\n\n除了这三个必需的元表外，`<channel>` 还可以包含许多其他元素，但有趣的内容要在\
  \ `<item>` 元素中寻找。以新闻源为例，这里就是各个新闻条目所在之处。如果你查看的是博客的 RSS 源，`<item>` 元素通常包含博文的摘要。\n\n\
  每个 `<item>` 元素可以包含多个子元素，但图 7-3 中显示的是最常见，通常也是最有趣的：\n\n- `<title>`：条目的标题\n- `<link>`：条目的\
  \ URL\n- `<pubDate>`：发布日期\n- `<description>`：条目的摘要\n\n这种可预测的格式使得使用 SimpleXML 从 RSS\
  \ 源中提取信息变得容易。\n\n**注意**  \n你可以在 [`www.rssboard.org/rss-specification`](http://www.rssboard.org/rss-specification)\
  \ 找到完整的 RSS 规范。与大多数技术规范不同，它用平实的语言写成，易于阅读。\n\n## 使用 SimpleXML\n\n只要你了解 XML 文档的结构，SimpleXML\
  \ 就能做到名副其实：它让从 XML 中提取信息变得简单。第一步是将 XML 文档的 URL 传递给 `simplexml_load_file()`。你也可以通过将路径作为参数传递来加载本地\
  \ XML 文件。例如，以下代码从 BBC 获取世界新闻源：\n\n```\n$feed = simplexml_load_file('http://feeds.bbci.co.uk/news/world/rss.xml');\n\
  ```\n\n这会创建 `SimpleXMLElement` 类的一个实例。现在，源中的所有元素都可以作为 `$feed` 对象的属性，通过元素名称来访问。对于\
  \ RSS 源，`<item>` 元素可以像 `$feed->channel->item` 这样访问。\n\n要显示每个 `<item>` 的 `<title>`，可以创建一个如下的\
  \ `foreach` 循环：\n\n```\nforeach ($feed->channel->item as $item) {\n    echo $item->title\
  \ . '<br>';\n}\n```\n\n如果你将此与图 7-3 进行比较，你会看到你通过使用 `->` 运算符链接元素名称来访问元素，直到到达目标。由于有多个\
  \ `<item>` 元素，你需要使用循环来进一步深入。或者，也可以使用数组表示法，如下所示：\n\n`$feed->channel->item[2]->title`\n\
  \n这会获取第三个 `<item>` 元素的 `<title>`。除非你只想要一个特定的值，否则使用循环更简单。\n\n有了这些背景知识，接下来让我们使用 SimpleXML\
  \ 来显示新闻源的内容。\n\n\n\n## PHP 方案 7-5：消费 RSS 新闻源\n\n本 PHP 方案演示了如何使用 `SimpleXML` 从实时新闻源中提取信息，并将其展示在网页上。它同时也展示了如何将\
  \ `<pubDate>` 元素格式化为更友好的格式，以及如何使用 `LimitIterator` 类限制显示的项目数量。\n\n在 `filesystem`\
  \ 文件夹中创建一个名为 `newsfeed.php` 的新页面。此页面将包含 PHP 和 HTML 的混合代码。本 PHP 方案选择的新闻源是 BBC 世界新闻。使用大多数新闻源的一个条件是必须注明来源。因此，在页面顶部添加一个格式化为\
  \ `<h1>` 标题的“来自 BBC 新闻的最新消息”。\n\n**注意：** 关于在自己的网站上使用 BBC 新闻源的条款和条件，请参阅 [`www.bbc.co.uk/news/10628494#mysite`](http://www.bbc.co.uk/news/10628494#mysite)\
  \ 和 [`www.bbc.co.uk/terms/additional_rss.shtml`](http://www.bbc.co.uk/terms/additional_rss.shtml)。\n\
  \n在标题下方创建一个 PHP 代码块，并添加以下代码来加载新闻源：\n\n```php\n$url = 'http://feeds.bbci.co.uk/news/world/rss.xml';\n\
  $feed = simplexml_load_file($url);\n```\n\n使用一个 `foreach` 循环来访问 `<item>` 元素并显示每个元素的\
  \ `<title>`：\n\n```php\nforeach ($feed->channel->item as $item) {\n    echo $item->title\
  \ . '<br>';\n}\n```\n\n通常，新闻源包含 50 个或更多项目。这对于新闻网站来说没问题，但你可能希望在自己的网站上显示更短的选项。使用另一个\
  \ SPL 迭代器来选择特定范围的项目。像这样修改代码：\n\n![A978-1-4842-0635-5_7_Fig4_HTML.jpg](img/A978-1-4842-0635-5_7_Fig4_HTML.jpg)\n\
  \n**图 7-4.** 新闻源包含大量项目\n\n保存 `newsfeed.php` 并在浏览器中加载该页面。你应该会看到一长串类似于图 7-4 显示的新闻项。\n\
  \n```php\n$url = 'http://feeds.bbci.co.uk/news/world/rss.xml';\n$feed = simplexml_load_file($url,\
  \ 'SimpleXMLIterator');\n$filtered = new LimitIterator($feed->channel->item, 0,\
  \ 4);\nforeach ($filtered as $item) {\n    echo $item->title . '<br>';\n}\n```\n\
  \n要使用 `SimpleXML` 配合 SPL 迭代器，你需要将 `SimpleXMLIterator` 类的名称作为第二个参数提供给 `simplexml_load_file()`。然后，你可以将要影响的\
  \ `SimpleXML` 元素传递给迭代器的构造函数。\n\n在这个例子中，`$feed->channel->item` 被传递给 `LimitIterator`\
  \ 的构造函数。`LimitIterator` 接受三个参数：要限制的对象、起始点（从 0 开始计数）以及循环运行的次数。这段代码从第一个项目开始，并将项目数量限制为四个。\n\
  \n`foreach` 循环现在遍历 `$filtered` 的结果。如果你再次测试页面，你将看到仅四个标题，如图 7-5 所示。如果显示的标题选择与之前不同，请不要感到惊讶。BBC\
  \ 新闻网站每分钟都在更新。\n\n既然你已经限制了项目的数量，修改 `foreach` 循环，将 `<title>` 元素包裹在一个指向原始文章的链接中，然后显示\
  \ `<pubDate>` 和 `<description>` 元素。循环体如下所示：\n\n![A978-1-4842-0635-5_7_Fig5_HTML.jpg](img/A978-1-4842-0635-5_7_Fig5_HTML.jpg)\n\
  \n**图 7-5.** `LimitIterator` 限制显示的项目数量\n\n```php\nforeach ($filtered as $item) {\
  \ ?>\n    <h2><a href=\"<?= $item->link; ?>\"><?= $item->title; ?></a></h2>\n  \
  \  <p class=\"datetime\"><?php echo $item->pubDate; ?></p>\n    <p><?php echo $item->description;\
  \ ?></p>\n<?php } ?>\n```\n\n保存页面并再次测试。链接会将你直接带到 BBC 网站上的相关新闻报道。新闻源现在可以工作了，但是 `<pubDate>`\
  \ 的格式遵循 RSS 规范中规定的格式，如下一个截图所示：\n\n![A978-1-4842-0635-5_7_Figl_HTML.jpg](img/A978-1-4842-0635-5_7_Figl_HTML.jpg)\n\
  \n要以更友好的方式格式化日期和时间，请将 `$item->pubDate` 传递给 `DateTime` 类的构造函数，然后使用 `DateTime format()`\
  \ 方法进行显示。像这样修改 `foreach` 循环中的代码：\n\n```php\n<p class=\"datetime\"><?php $date =\
  \ new DateTime($item->pubDate);\necho $date->format('M j, Y, g:ia'); ?></p>\n```\n\
  \n这将日期重新格式化为如下所示：\n\n![A978-1-4842-0635-5_7_Figm_HTML.jpg](img/A978-1-4842-0635-5_7_Figm_HTML.jpg)\n\
  \n神秘的 PHP 日期格式化字符串在第 14 章中解释。\n\n这看起来好多了，但时间仍然以 GMT（伦敦时间）表示。如果你的网站大多数访问者在美国东海岸，你可能希望显示当地时间。使用\
  \ `DateTime` 对象就没有问题。使用 `setTimezone()` 方法更改为纽约时间。你甚至可以自动显示 EDT（美国东部夏令时）或 EST（美国东部标准时间），具体取决于是否处于夏令时。像这样修改代码：\n\
  \n```php\n<p class=\"datetime\"><?php $date = new DateTime($item->pubDate);\n$date->setTimezone(new\
  \ DateTimeZone('America/New_York'));\n$offset = $date->getOffset();\n$timezone =\
  \ ($offset == -14400) ? ' EDT' : ' EST';\necho $date->format('M j, Y, g:ia') . $timezone;\
  \ ?></p>\n```\n\n要创建一个 `DateTimeZone` 对象，请将 [`http://php.net/manual/en/timezones.php`](http://php.net/manual/en/timezones.php)\
  \ 上列出的一个时区作为参数传递给它。这是唯一需要 `DateTimeZone` 对象的地方，因此它被直接创建为 `setTimezone()` 方法的参数。\n\
  \n没有专门的方法告诉你是否处于夏令时，但 `getOffset()` 方法返回时间相对于协调世界时（UTC）的偏移秒数。以下代码行决定显示 EDT 还是 EST：\n\
  \n```php\n$timezone = ($offset == -14400) ? ' EDT' : ' EST';\n```\n\n这使用了 `$offset`\
  \ 的值与三元运算符。在夏季，纽约比 UTC 晚四个小时（-14400 秒）。所以，如果 `$offset` 是 -14400，条件判断为 `true`，则 EDT\
  \ 被赋值给 `$timezone`。否则，使用 EST。\n\n最后，`$timezone` 的值被连接到格式化后的时间上。`$timezone` 使用的字符串有一个前导空格，用于将时区与时间分隔开。当页面加载时，时间会调整为美国东海岸的时间，如下所示：\n\
  \n![A978-1-4842-0635-5_7_Fign_HTML.jpg](img/A978-1-4842-0635-5_7_Fign_HTML.jpg)\n\
  \n![A978-1-4842-0635-5_7_Fig6_HTML.jpg](img/A978-1-4842-0635-5_7_Fig6_HTML.jpg)\n\
  \n**图 7-6.** 实时新闻源只需要十几行 PHP 代码\n\n现在页面只需要用 CSS 进行美化。图 7-6 展示了在 `styles` 文件夹中使用\
  \ `newsfeed.css` 样式化后的最终新闻源。\n\n**提示：** 如果你订阅了 lynda.com 在线培训库，你可以在我的课程“Up and Running\
  \ with the Standard PHP Library”（[`www.lynda.com/PHP-tutorials/Up-Running-Standard-PHP-Library/175038-2.html`](http://www.lynda.com/PHP-tutorials/Up-Running-Standard-PHP-Library/175038-2.html)）中学习更多关于\
  \ SPL 和 SimpleXML 的知识。\n\n虽然我在这个 PHP 方案中使用了 BBC 新闻源，但它应该适用于任何 RSS 2.0 源。例如，你可以在本地尝试使用\
  \ [`http://rss.cnn.com/rss/edition.rss`](http://rss.cnn.com/rss/edition.rss)。在公开网站上使用\
  \ CNN 新闻源需要获得 CNN 的许可。在将任何新闻源整合到网站之前，请务必向版权所有者核实条款和条件。\n\n\n\n"
- "# 创建下载链接\n\n在线论坛中经常出现的一个问题是：“如何创建一个指向图片（或 PDF 文件）的链接，让用户点击后能直接下载？”快速解决方案是将其文件压缩成\
  \ ZIP 格式。这通常能减小下载体积，但缺点是不熟悉电脑的用户可能不知道如何解压文件，或者他们使用的旧版操作系统不包含解压功能。借助 PHP 文件系统函数，可以轻松创建一个自动提示用户以原始格式下载文件的链接。\n\
  \n## PHP 解决方案 7-6：提示用户下载图片\n\n该 PHP 解决方案会发送必要的 HTTP 头信息，并使用`readfile()`将文件内容以二进制流形式输出，强制浏览器进行下载。\n\
  \n在`filesystem`文件夹中创建一个名为`download.php`的 PHP 文件。完整代码将在下一步给出。你也可以在`ch07`文件夹的`download.php`文件中找到它。删除编辑器自动生成的任何默认代码，并插入以下代码：\n\
  \n```php\n<?php\n\n// 定义错误页面\n$error = 'http://localhost/phpsols/error.php';\n\n\
  // 定义下载文件夹的路径\n$filepath = 'C:/xampp/htdocs/phpsols/images/';\n\n$getfile = NULL;\n\
  \n// 阻止任何试探文件系统的尝试\nif (isset($_GET['file']) && basename($_GET['file']) == $_GET['file'])\
  \ {\n    $getfile = $_GET['file'];\n} else {\n    header(\"Location: $error\");\n\
  \    exit;\n}\n\nif ($getfile) {\n    $path = $filepath . $getfile;\n\n    // 检查文件是否存在且可读\n\
  \    if (file_exists($path) && is_readable($path)) {\n        // 发送适当的头信息\n    \
  \    header('Content-Type: application/octet-stream');\n        header('Content-Length:\
  \ '. filesize($path));\n        header('Content-Disposition: attachment; filename='\
  \ . $getfile);\n        header('Content-Transfer-Encoding: binary');\n\n       \
  \ // 输出文件内容\n        readfile($path);\n    } else {\n        header(\"Location:\
  \ $error\");\n    }\n}\n```\n\n此脚本中需要修改的两行代码已用粗体标注。第一行定义了`$error`变量，这个变量包含你的错误页面\
  \ URL。第二行需要修改的是定义存储下载文件文件夹路径的代码。\n\n脚本的工作原理是：从 URL 后附加的查询字符串中获取要下载的文件名，并将其保存为`$getfile`。由于查询字符串很容易被篡改，`$getfile`首先被设置为`NULL`。如果不这样做，可能会让恶意用户访问你服务器上的任何文件。\n\
  \n开头的条件语句使用`basename()`来确保攻击者无法从文件结构的其他部分请求文件（例如存储密码的文件）。正如第 4 章所解释的，`basename()`会提取路径中的文件名部分，因此如果`basename($_GET['file'])`与`$_GET['file']`不同，就说明有人试图探测你的服务器。这时可以用`header()`函数将用户重定向到错误页面，从而阻止脚本继续执行。\n\
  \n在检查请求的文件存在且可读后，脚本会发送适当的 HTTP 头信息，并使用`readfile()`将文件发送到输出缓冲区。如果找不到该文件，用户将被重定向到错误页面。\n\
  \n通过创建另一个页面来测试该脚本；向`download.php`添加两个链接。在每个链接的末尾添加带有`file=`的查询字符串，后跟要下载的文件名。你可以在`ch07`文件夹中找到名为`getdownloads.php`的页面，其中包含以下两个链接：\n\
  \n```html\n<p><a href=\"download.php?file=maiko.jpg\">下载图片 1</a></p>\n<p><a href=\"\
  download.php?file=basin.jpg\">下载图片 2</a></p>\n```\n\n点击其中一个链接。根据你的浏览器设置，文件将下载到默认的下载文件夹，或者会弹出一个对话框询问你要如何处理该文件。\n\
  \n我使用图片文件演示了`download.php`，但它可以用于任何类型的文件，因为头信息会将文件作为二进制流发送。\n\n## 注意\n\n此脚本依赖于`header()`向浏览器发送适当的\
  \ HTTP 头信息。务必确保在 PHP 开始标签之前没有任何换行符或空白字符。如果你已经移除了所有空白字符但仍收到“headers already sent”报错信息，可能是你的编辑器在文件开头插入了不可见的控制字符。某些编辑程序会插入字节顺序标记（BOM），已知这会导致`header()`函数出现问题。请检查你的程序偏好设置，确保取消选中插入\
  \ BOM 的选项。\n\n## 章节回顾\n\n文件系统函数并不特别难用，但存在许多细微之处，这些细节可能会将一个看似简单的任务变成复杂的难题。检查你是否拥有正确的权限非常重要。即使在处理自己网站内的文件时，PHP\
  \ 也需要有权限访问你想读取或写入文件的任何文件夹。\n\nSPL 的`FilesystemIterator`和`RecursiveDirectoryIterator`类可以轻松检查文件夹的内容。结合`SplFileInfo`方法和`RegexIterator`，你可以快速在文件夹或文件夹层级中找到特定类型的文件。\n\
  \n处理远程数据源时，需要检查`allow_url_fopen`是否未被禁用。远程数据源最常见的用途之一是从 RSS 新闻源或 XML 文档中提取信息，由于 SimpleXML\
  \ 的存在，这项任务只需几行代码即可完成。\n\n在接下来的两章中，我们将进一步实际应用本章的一些 PHP 解决方案，包括处理图片和构建一个简单的用户身份验证系统。\n\
  \n\n\n"
- "# 8. 生成缩略图\n\nPHP 拥有大量用于处理图像的函数。你已在第 4 章中认识了其中一个函数——`getimagesize()`。除了提供图像尺寸的有用信息外，PHP\
  \ 还能通过调整大小或旋转来操作图像。它还能在不影响原图的情况下动态添加文本，甚至可以即时创建图像。\n\n为了让你初步体验 PHP 的图像处理功能，我将向你展示如何生成已上传图像的较小副本。大多数情况下，你会想使用像\
  \ Adobe Photoshop 这样的专用图形程序来生成缩略图，因为它能提供更好的质量控制。但如果你想允许注册用户上传图像，同时确保它们符合最大尺寸限制，使用\
  \ PHP 自动生成缩略图就会非常有用。你可以只保存调整大小后的副本，也可以同时保存副本和原图。\n\n在第 6 章中，你构建了一个处理文件上传的 PHP 类。本章中，你将创建两个类：一个用于生成缩略图，另一个用于在单次操作中上传和调整图像大小。第二个类并非从头构建，而是基于第\
  \ 6 章的 `Upload` 类。使用类的一大优势是它们具有可扩展性——基于另一个类的类可以继承其父类的功能。构建用于上传图像并从中生成缩略图的类涉及大量代码。但一旦定义了这些类，使用它们只需几行脚本。如果你很赶时间，或者写大量代码会让你冷汗直流，可以直接使用完成后的类。稍后再回来了解代码的工作原理。它使用了许多在其他情况下也很有用的基本\
  \ PHP 函数。\n\n在本章中，你将了解以下内容：\n\n*   缩放图像\n*   保存缩放后的图像\n*   自动调整大小并重命名上传的图像\n*  \
  \ 通过扩展现有类来创建子类\n\n## 检查服务器的能力\n\n在 PHP 中处理图像依赖于 GD 扩展。最初，GD 代表 GIF Draw，但由于 GIF\
  \ 专利的问题，对 GIF 文件的支持在 1999 年被取消，但 GD 这个名称保留了下来。有问题的专利于 2004 年到期，GIF 再次得到支持。第 2 章中推荐的一体化\
  \ PHP 包默认支持 GD，但你需要确保你的远程 Web 服务器上也已启用 GD 扩展。\n\n与前几章一样，在你的网站上运行 `phpinfo()` 来检查服务器配置。向下滚动，直到到达以下屏幕截图所示的区域（它应该在页面中间位置）：\n\
  \n![A978-1-4842-0635-5_8_Figa_HTML.jpg](img/A978-1-4842-0635-5_8_Figa_HTML.jpg)\n\
  \n如果你找不到这个区域，说明 GD 扩展未启用，因此你将无法在你的网站上使用本章的任何脚本。请请求启用它，或更换到不同的主机。\n\n> **注意**  \n\
  > 严格针对缩写/首字母缩略词爱好者：GIF 代表图形交换格式。JPEG 是联合图像专家小组创建的标准，而 PNG 是便携式网络图形的缩写。尽管 JPEG 是该标准的正确名称，但\
  \ “E” 经常被省略，尤其是在用作文件扩展名时。\n\n## 动态操作图像\n\nGD 扩展允许你完全从头生成图像或处理现有图像。无论哪种方式，底层过程总是遵循四个基本步骤：\n\
  \n1.  在处理图像时，在服务器内存中为图像创建一个资源。\n2.  处理图像。\n3.  显示和/或保存图像。\n4.  从服务器内存中移除图像资源。\n\n\
  这个过程意味着你始终只在内存中操作图像，而不是在原图上操作。除非你在脚本终止前将图像保存到磁盘，否则任何更改都会丢失。处理图像需要大量内存，因此在不再需要时立即销毁图像资源至关重要。如果脚本运行非常缓慢或崩溃，很可能表明原始图像过大。\n\
  \n### 制作较小的图像副本\n\n本章的目的是向你展示如何在上传时自动调整图像大小。这涉及到扩展第 6 章中的 `Upload` 类。然而，为了更容易理解如何使用\
  \ PHP 的图像处理函数，我建议先从使用服务器上已有的图像开始，然后创建一个单独的类来生成缩略图。\n\n#### 准备工作\n\n起点是以下简单的表单，它使用\
  \ PHP 解决方案 7-3 创建 `images` 文件夹中照片的下拉菜单。你可以在 `ch08` 文件夹的 `create_thumb_01.php` 中找到代码。将其复制到\
  \ `phpsols` 站点根目录的新文件夹 `gd` 中，并将其重命名为 `create_thumb.php`。\n\n页面顶部是一个 PHP 代码块，它将\
  \ `phpsols` 站点中指向 `images` 文件夹的完整路径分配给名为 `$folder` 的变量（基于 Windows 系统上的 XAMPP）。下一行注释掉了\
  \ Mac OS X 上 MAMP 的默认位置。请根据你自己的设置进行相应调整。\n\n页面主体中的表单如下所示：\n\n```html\n<form method=\"\
  post\" action=\"\">\n<p>\n<select name=\"pix\" id=\"pix\">\n<option value=\"\">选择一张图像</option>\n\
  <?php\n$files = new FilesystemIterator('../images');\n$images = new RegexIterator($files,\
  \ '/\\.(?:jpg|png|gif)$/i');\nforeach ($images as $image) {\n$filename = $image->getFilename();\n\
  ?>\n<option value=\"<?= $folder . $filename; ?>\"><?= $filename; ?></option>\n<?php\
  \ } ?>\n</select>\n</p>\n<p>\n<input type=\"submit\" name=\"create\" value=\"创建缩略图\"\
  >\n</p>\n</form>\n```\n\n加载到浏览器后，下拉菜单应显示 `images` 文件夹中照片的名称。这可以让你更方便地快速选择图像进行测试。\n\
  \n在你于第 6 章创建的 `upload_test` 文件夹中，创建一个名为 `thumbs` 的新文件夹，并确保它具有 PHP 写入所需的权限。如果需要复习，请参考第\
  \ 6 章中的“建立上传目录”。\n\n#### 构建缩略图类\n\n为了生成缩略图，该类需要执行以下步骤：\n\n-   获取原始图像的尺寸。\n-   获取图像的\
  \ MIME 类型。\n-   计算缩放比例。\n-   为原始图像创建正确 MIME 类型的图像资源。\n-   为缩略图创建一个图像资源。\n-   创建调整大小后的副本。\n\
  -   使用正确的 MIME 类型将调整大小后的副本保存到目标文件夹。\n-   销毁图像资源以释放内存。\n\n除了生成缩略图，该类会自动在文件扩展名之前插入\
  \ `_thb`，但一个公共方法允许你更改此值。该类还需要公共方法来设置目标文件夹和缩略图的最大尺寸，以及检索由该类生成的消息。为了简化计算，最大尺寸仅控制缩略图两个维度中较大的那个。\n\
  \n为了避免命名冲突，`Thumbnail` 类将使用命名空间。由于它专门用于图像，我们将在 `PhpSolutions` 文件夹中创建一个名为 `Image`\
  \ 的新文件夹，并使用 `PhpSolutions\\Image` 作为命名空间。\n\n要做的事情很多，所以我将代码分成几个部分。它们都是同一个类定义的一部分，但以这种方式呈现脚本应该更易于理解，特别是如果你想在其他上下文中使用其中的某些代码。\n\
  \n\n\n"
- "# PHP 解决方案 8-1：获取图像详情\n\n本 PHP 解决方案介绍了如何获取原始图像的尺寸和 MIME 类型。\n\n在 `PhpSolutions`\
  \ 文件夹中创建一个名为 `Image` 的新文件夹。然后在该文件夹中创建一个名为 `Thumbnail.php` 的页面。该文件仅包含 PHP 代码，因此请删除编辑程序插入的任何\
  \ HTML 代码。在新文件顶部声明命名空间：\n\n`namespace PhpSolutions\\Image;`\n\n该类需要跟踪相当多的属性。通过列出这些属性来开始类的定义，如下所示：\n\
  \n```\nclass Thumbnail {\n\n    protected $original;\n    protected $originalwidth;\n\
  \    protected $originalheight;\n    protected $basename;\n    protected $thumbwidth;\n\
  \    protected $thumbheight;\n    protected $maxSize = 120;\n    protected $canProcess\
  \ = false;\n    protected $imageType;\n    protected $destination;\n    protected\
  \ $suffix = '_thb';\n    protected $messages = [];\n\n}\n```\n\n如同 `Upload` 类一样，所有属性都被声明为\
  \ `protected`，这意味着它们不能在类定义之外被意外更改。这些名称具有描述性，因此几乎不需要解释。`$maxSize` 属性被赋予了一个默认值 120（像素）。这决定了缩略图较长边的最大尺寸。\n\
  \n`$canProcess` 布尔值初始设置为 `false`。这是为了防止脚本尝试处理非图像文件。如果 MIME 类型与图像匹配，则该值将重置为 `true`。如果发生其他错误，您也可以使用它来阻止生成缩略图。\n\
  \n构造函数接受一个参数，即图像的路径。在受保护属性列表之后，但在闭合花括号内部，添加构造函数定义：\n\n```\npublic function __construct($image)\
  \ {\n    if (is_file($image) && is_readable($image)) {\n        $details = getimagesize($image);\n\
  \    } else {\n        $details = null;\n        $this->messages[] = \"Cannot open\
  \ $image.\";\n    }\n\n    // 如果 getimagesize() 返回一个数组，则看起来像一张图像\n    if (is_array($details))\
  \ {\n        $this->original = $image;\n        $this->originalwidth = $details[0];\n\
  \        $this->originalheight = $details[1];\n        $this->basename = pathinfo($image,\
  \ PATHINFO_FILENAME);\n        // 检查 MIME 类型\n        $this->checkType($details['mime']);\n\
  \    } else {\n        $this->messages[] = \"$image doesn't appear to be an image.\"\
  ;\n    }\n}\n```\n\n构造函数以一个条件语句开始，该语句检查 `$image` 是否是一个文件并且是可读的。如果是，则将其传递给 `getimagesize()`，结果存储在\
  \ `$details` 中。否则，`$details` 被设置为 `null`，并向 `$messages` 属性添加一条错误消息。\n\n当您将图像传递给\
  \ `getimagesize()` 时，它会返回一个包含以下元素的数组：\n\n- `0`：宽度（以像素为单位）\n- `1`：高度\n- `2`：一个指示图像类型的整数\n\
  - `3`：一个字符串，包含正确的宽度和高度属性，用于插入 `<img>` 标签\n- `mime`：图像的 MIME 类型\n- `channels`：对于\
  \ RGB 图像为 `3`，对于 CMYK 图像为 `4`\n- `bits`：每种颜色的位数\n\n如果传递给 `getimagesize()` 的参数值不是图像，则返回\
  \ `false`。因此，如果 `$details` 是一个数组，您就知道正在处理一张图像。图像的路径存储在 `$original` 属性中，其宽度和高度分别存储在\
  \ `$originalWidth` 和 `$originalHeight` 中。\n\n文件的名称（不含扩展名）使用带有 `PATHINFO_FILENAME`\
  \ 常量的 `pathinfo()` 提取，方式与 PHP 解决方案 6-6 相同。这存储在 `$basename` 属性中，并将在之后用于构建带有后缀的缩略图名称。\n\
  \n但是，图像可能不是合适的类型，因此最后的检查是将其 MIME 类型传递给一个名为 `checkType()` 的内部方法，您将在下一步中定义该方法。\n\n\
  `checkType()` 方法将 MIME 类型与可接受的图像类型数组进行比较。如果找到匹配项，则将 `$canProcess` 属性重置为 `true`，并将类型存储在\
  \ `$imageType` 属性中。该方法在内部使用，因此需要声明为 `protected`。将以下代码添加到类定义中：\n\n```\nprotected\
  \ function checkType($mime) {\n    $mimetypes = ['image/jpeg', 'image/png', 'image/gif'];\n\
  \    if (in_array($mime, $mimetypes)) {\n        $this->canProcess = true;\n   \
  \     // 提取 'image/' 之后的字符\n        $this->imageType = substr($mime, 6);\n    }\n\
  }\n```\n\n图像类型有很多种，但只有 JPEG、PNG 和 GIF 是浏览器普遍支持的；只有当图像的 MIME 类型与 `$mimetypes` 数组中列出的其中之一匹配时，`$canProcess`\
  \ 属性才会被设置为 `true`。如果 MIME 类型不在列表中，`$canProcess` 保持为 `false`，这稍后会阻止该类尝试创建缩略图。\n\n\
  所有图像的 MIME 类型都以 `image/` 开头。为了使该值在以后更容易使用，`substr()` 函数提取斜杠后的字符并将其存储在 `$imageType`\
  \ 属性中。当使用两个参数时，`substr()` 从第二个参数指定的位置（从 0 开始计数）开始，并返回字符串的其余部分。\n\n> **注意：** 尽管 PHP\
  \ 5.5 及更高版本可以处理 WebP 图像，但鉴于浏览器支持有限，我决定不将其包含在 `Thumbnail` 类中。在撰写本文时，WebP 图像格式仅受 Google\
  \ Chrome、Opera 和 Android 4 支持。\n\n在构建类时测试代码是个好主意。尽早发现错误比在长脚本中寻找问题要容易得多。为了测试代码，在类定义内部创建一个名为\
  \ `test()` 的新公共方法。\n\n方法在类定义中出现的顺序无关紧要，但常见的做法是将所有公共方法放在构造函数之后，并将受保护方法放在文件底部。这使代码更易于维护。\n\
  \n在构造函数和 `checkType()` 定义之间插入以下定义：\n\n```\npublic function test() {\n    echo 'File:\
  \ ' . $this->original . '<br>';\n    echo 'Original width: ' . $this->originalwidth\
  \ . '<br>';\n    echo 'Original height: ' . $this->originalheight . '<br>';\n  \
  \  echo 'Base name: ' . $this->basename . '<br>';\n    echo 'Image type: ' . $this->imageType\
  \ . '<br>';\n    if ($this->messages) {\n        print_r($this->messages);\n   \
  \ }\n}\n```\n\n这使用 `echo` 和 `print_r()` 来显示属性的值。\n\n为了测试目前为止的类定义，保存 `Thumbnail.php`，并在\
  \ `create_thumb.php` 中 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码（该代码可在 `ch08` 文件夹的 `create_thumb_02.php`\
  \ 中找到）：\n\n```\nuse PhpSolutions\\Image\\Thumbnail;\n\nif (isset($_POST['create']))\
  \ {\n    require_once('../PhpSolutions/Image/Thumbnail.php');\n    try {\n     \
  \   $thumb = new Thumbnail($_POST['pix']);\n        $thumb->test();\n    } catch\
  \ (Exception $e) {\n        echo $e->getMessage();\n    }\n}\n```\n\n这从 `PhpSolutions\\\
  Image` 命名空间导入 `Thumbnail` 类，然后添加在表单提交时要执行的代码。\n\n`create_thumb.php` 中提交按钮的 `name`\
  \ 属性是 `create`，因此此代码仅在表单被提交时运行。它包含 `Thumbnail` 类定义，创建一个类的实例（将表单中选定的值作为参数传递），并调用\
  \ `test()` 方法。\n\n![A978-1-4842-0635-5_8_Fig1_HTML.jpg](img/A978-1-4842-0635-5_8_Fig1_HTML.jpg)\n\
  \n**图 8-1.** 显示所选图像的详细信息，确认代码正在工作。\n\n保存 `create_thumb.php` 并将其加载到浏览器中。选择一张图像，然后单击“创建缩略图”。这将产生类似于图\
  \ 8-1 的输出。\n\n如有必要，请对照 `ch08/PhpSolutions/Images` 文件夹中的 `Thumbnail_01.php` 检查您的代码。\n\
  \n\n\n虽然某些属性具有默认值，但您需要提供通过创建公共方法来更改它们的选项，以设置缩略图的最大尺寸以及应用于文件名基础的（文件名茎部）后缀。您还需要告诉类在哪里创建缩略图。这类方法的正式术语是“赋值方法”（mutator\
  \ method），但由于它设置一个值，通常被称为“设置器方法”（setter method）。下一步就是创建这些设置器方法。\n\n### PHP 解决方案\
  \ 8-2：创建设置器方法\n\n除了设置受保护属性的值之外，设置器方法在确保所赋值有效性方面也扮演着重要角色。继续使用同一个类定义。或者，使用`ch08/PhpSolutions/Image`文件夹中的`Thumbnail_01.php`。\n\
  \n首先，为将要创建缩略图的文件夹创建设置器方法。在构造函数定义之后，将以下代码添加到`Thumbnail.php`中：\n\n```\npublic function\
  \ setDestination($destination) {\n    if (is_dir($destination) && is_writable($destination))\
  \ {\n        // 获取最后一个字符\n        $last = substr($destination, -1);\n        //\
  \ 如果缺少尾部斜杠，则添加一个\n        if ($last == '/' || $last == '\\\\') {\n            $this->destination\
  \ = $destination;\n        } else {\n            $this->destination = $destination\
  \ . DIRECTORY_SEPARATOR;\n        }\n    } else {\n        $this->messages[] = \"\
  Cannot write to $destination.\";\n    }\n}\n```\n\n这段代码首先检查`$destination`是否是一个文件夹（目录）并且是否可写。如果不是，则方法定义末尾的`else`子句中的错误消息会被添加到`$messages`属性中。否则，执行其余代码。\n\
  \n在将`$destination`的值赋给`$destination`属性之前，代码检查提交的值是否以正斜杠或反斜杠结尾。它通过使用`substr()`函数提取`$destination`中的最后一个字符来实现这一点。`substr()`的第二个参数决定开始提取的位置。负数表示从字符串末尾开始计数。如果省略第三个参数，函数将返回字符串的剩余部分。所以，`$last\
  \ = substr($destination, -1)` 的效果是提取最后一个字符并将其存储在`$last`中。\n\n条件语句检查`$last`是否是正斜杠或反斜杠。需要两个反斜杠，因为\
  \ PHP 使用反斜杠来转义引号（参见第 3 章中的“理解何时使用引号”和“使用转义序列”）。\n\n有必要检查`$destination`中是正斜杠还是反斜杠，因为\
  \ Windows 用户可能会习惯性地使用反斜杠。如果条件语句确认最后一个字符是正斜杠或反斜杠，则将`$destination`赋给`$destination`属性。否则，`else`块在将\
  \ PHP 常量`DIRECTORY_SEPARATOR`赋给`$destination`属性之前，将其连接到`$destination`的末尾。`DIRECTORY_SEPARATOR`常量会根据操作系统自动选择正确的斜杠类型。\n\
  \n> 提示：PHP 在路径中同样对待正斜杠或反斜杠。即使这导致添加了相反类型的斜杠，就 PHP 而言，路径仍然是有效的。\n\n用于缩略图最大尺寸的设置器方法只需要检查该值是否为数字。将以下代码添加到类定义中：\n\
  \n```\npublic function setMaxSize($size) {\n    if (is_numeric($size)) {\n     \
  \   $this->maxSize = abs($size);\n    }\n}\n```\n\n`is_numeric()`函数检查提交的值是否为数字。如果是，则将其赋给`$maxSize`属性。作为预防措施，该值被传递给`abs()`函数，该函数将数字转换为其绝对值。换句话说，负数被转换为正数。\n\
  \n如果提交的值不是数字，则什么也不会发生。该属性的默认值保持不变。\n\n用于插入到文件名中的后缀的设置器函数需要确保该值不包含任何特殊字符。代码如下所示：\n\
  \n```\npublic function setSuffix($suffix) {\n    if (preg_match('/^\\w+$/', $suffix))\
  \ {\n        if (strpos($suffix, '_') !== 0) {\n            $this->suffix = '_'\
  \ . $suffix;\n        } else {\n            $this->suffix = $suffix;\n        }\n\
  \    } else {\n        $this->suffix = '';\n    }\n}\n```\n\n这使用了`preg_match()`，它以正则表达式作为第一个参数，并在作为第二个参数传递的值中搜索匹配项。正则表达式需要包裹在一对匹配的分隔符字符中——通常如这里所使用的正斜杠。去掉分隔符后，正则表达式看起来像这样：\n\
  \n`^\\w+$`\n\n在此上下文中，脱字符（`^`）告诉正则表达式从字符串的开头开始匹配。`\\w`是一个正则表达式标记，它匹配任何字母数字字符或下划线。`+`表示匹配前面的标记或字符一次或多次，而`$`表示匹配字符串的结尾。换句话说，正则表达式匹配一个仅包含字母数字字符和下划线的字符串。如果字符串包含空格或特殊字符，则不会匹配。\n\
  \n如果匹配失败，方法定义末尾的`else`子句将`$suffix`属性设置为空字符串。否则，执行此条件语句：\n\n`if (strpos($suffix,\
  \ '_') !== 0) {`\n\n如果`$suffix`的第一个字符不是下划线，则条件为真。它使用`strpos()`函数来查找第一个下划线的位置。如果第一个字符是下划线，则`strpos()`返回的值是`0`。但是，如果`$suffix`不包含下划线，`strpos()`返回`false`。如第\
  \ 3 章所述，`0`在 PHP 中被视为`false`，因此条件需要使用“不完全相同”运算符（使用两个等号）。所以，如果后缀不是以下划线开头，则会添加一个下划线。否则，保留原始值。\n\
  \n> 注意：不要混淆`strpos()`和`strrpos()`。前者找到第一个匹配字符的位置。后者则反向搜索字符串。\n\n更新`test()`方法以显示您刚刚为其创建设置器方法的那些属性的值。修订后的代码如下所示：\n\
  \n```\npublic function test() {\n    echo 'File: ' . $this->original . '<br>';\n\
  \    echo 'Original width: ' . $this->originalwidth . '<br>';\n    echo 'Original\
  \ height: ' . $this->originalheight . '<br>';\n    echo 'Base name: ' . $this->basename\
  \ . '<br>';\n    echo 'Image type: ' . $this->imageType . '<br>';\n    echo 'Destination:\
  \ ' . $this->destination . '<br>';\n    echo 'Max size: ' . $this->maxSize .  '<br>';\n\
  \    echo 'Suffix: ' . $this->suffix .  '<br>';\n    if ($this->messages) {\n  \
  \      print_r($this->messages);\n    }\n}\n```\n\n通过在`create_thumb.php`中使用新的设置器方法来测试更新后的类，如下所示：\n\
  \n```\n$thumb = new Thumbnail($_POST['pix']);\n$thumb->setDestination('C:/upload_test/thumbs/');\n\
  $thumb->setMaxSize(100);\n$thumb->setSuffix('small');\n$thumb->test();\n```\n\n\
  将`upload_test/thumbs`的路径调整为与您的设置匹配。\n\n尝试进行多项测试，例如省略传递给`setDestination()`的值的尾部斜杠，或选择一个不存在的文件夹。同时，将无效值传递给最大尺寸和后缀的设置器。无效的目标文件夹会产生错误消息，但其他错误会静默失败，使用默认值作为最大尺寸，或使用空字符串作为后缀。\n\
