- "# 用 CSS 优化一个笨拙的表单元素\n\n*建议*内容类型关联了*图书元素*词汇表。这个词汇表有十几个术语，只能选择其中一个，默认以垂直列表形式显示为单选按钮。这大大增加了用户提交建议时的滚动量。\n\
  \n为了解决这个问题，（当然）有一个模块可以做到，而且它的名字非常霸气：多列复选框单选按钮（`drupal.org/project/multicolumncheckboxesradios`）。然而，在撰写本文时，该模块在\
  \ Drupal 7 上仍有缺陷。此外，*图书元素*词汇表的术语数量还没多到需要分列显示的程度；水平排列看起来和垂直排列一样好，而且你可以用 CSS 来实现这一点。\n\
  \n![images](img/square.jpg) **注意** Drupal 7 改进了添加到表单元素 `<div>` 周围的类。在 Drupal 6 中，它被硬编码为\
  \ `form-item`。现在，表单元素名称和表单元素类型会作为 `form-item-name` 和 `form-item-type` 添加。你可以通过 `api.drupal.org/theme_form_element`\
  \ 了解 Drupal 是如何做到这一点的（也能看到如果要更改，可以覆盖的主题函数）。\n\n遗憾的是，你无法轻易地向已定义或修改的表单中添加自定义类。不过，通过基于类型和名称的类，你通常可以按需使用\
  \ CSS 或 JavaScript 来定位表单元素。总的来说，你无需额外添加 `<div>` 或其他包裹元素，也无需覆盖 `theme_form_element()`\
  \ 函数，就能设置表单样式；参见代码清单 33–16。\n\n**代码清单 33–16.** 为主题添加 CSS，使图书元素词汇表的单选按钮水平排列\n\n```\n\
  /* 让图书元素单选按钮水平排列。 */\n.form-item-field-element-und {\n  display: inline-block;\n\
    padding-right: 7px;\n}\n```\n\n\n\n### 内容类型的上下文“新增”链接\n\n当用户查看建议列表或单个建议时，如果她有权创建新建议，也应该被邀请提交自己的建议。\n\
  \nDrupal 7 提供了类似的操作，主要出现在管理页面，例如内容列表（`admin/content`）上方的 **+ 添加内容** 链接。\n\n![images](img/square.jpg)\
  \ **注意** 操作链接是 Drupal 7 的一种新的交互模式（参见第 32 章）。它们是 Drupal 表达“如果你在内容概览页面，很可能想要添加新内容”的方式。虽然\
  \ Drupal 中的其他本地任务会将你带到设置页面或列表页面，但操作链接执行操作，通常是添加某些内容。它们不会像其他任务那样默认渲染为选项卡，而是通过页面模板中的\
  \ `$action_links` 变量渲染为帮助区域正下方的链接。\n\n就我个人而言，这些操作链接（例如 `admin/structure/content-types`\
  \ 顶部的 *+ 添加内容类型*）对我来说几乎是不可见的——无论是由于轻微的缩进，还是更可能因为我习惯了 Drupal 6（该区域只有帮助文本），这个 Drupal\
  \ 7 的新约定对我来说还不自然。然而，采用标准（无论如何，对于原生 Drupal 7 用户来说这可能会很自然）的好处超越了个人喜好。以特定方式处理特定类型链接的基本概念是合理的。\n\
  \n![images](img/square.jpg) **注意** 接下来描述的第一种方法并非将现有页面添加为操作链接的最佳方式，因此如果你在寻找直接答案，可以直接跳到第二种解决方案。我在此展示这种方法，是因为它是一种可行的解决方案（也是将新页面添加为操作链接的正确方式），更重要的是，它展示了探索的过程。\n\
  \n#### 寻找并遵循模型\n\n如第 18 章所述，查看 Drupal 核心示例总是好的，但贡献模块实现核心约定的方式也是一个很好的参考——尤其是当贡献模块是\
  \ Views 时。在“管理 ![images](img/U001.jpg) 结构 ![images](img/U001.jpg) Views”页面（`admin/structure/views`），现有视图列表上方，是带有文本\
  \ *+ 添加新视图* 的标志性加号。你可以在 Views 代码中搜索该文本，以了解它是如何出现在那里的；参见代码清单 33–17。\n\n***代码清单 33–17.**\
  \ 使用 Grep 在 Views 项目中搜索“Add new view”，并显示结果*\n\n```\ncd ~/workspace/dgd7\ngrep -nHR\
  \ \"Add new view\" sites/all/modules/views/\nsites/all/modules/views/views_ui.module:38:\
  \    'title' => 'Add new view',\n```\n\n代码清单 33–18 中的搜索输出告诉你，在 Views UI 模块的第 38\
  \ 行，你搜索的文本（“Add new view”）存在。转到该处，你可以看到它位于 `hook_menu()` 的实现中；参见代码清单 33–18。\n\n\
  ***代码清单 33–18.** 在 views_ui.module 中定义“添加新视图”链接的代码*\n\n```\n  $items['admin/structure/views/add']\
  \ = $base + array(\n    'title' => 'Add new view',\n    'page callback' => 'views_ui_add_page',\n\
  \    'type' => MENU_LOCAL_ACTION,\n  );\n```\n\n这很有启发性。菜单项定义表明它出现的页面路径是 `admin/structure/views`，正如你所知。其**标题**是你看到的文本“Add\
  \ new view”。特殊部分似乎是菜单项**类型**为 `MENU_LOCAL_ACTION`。\n\n快速搜索 Drupal 代码中的 `MENU_LOCAL_ACTION`，可以找到其他示例；参见代码清单\
  \ 33–19。\n\n***代码清单 33–19.** node.module 中定义的菜单项，给出 `admin/structure/types` 上的链接*\n\
  \n```\n  $items['admin/structure/types/add'] = array(\n    'title' => 'Add content\
  \ type',\n    'page callback' => 'drupal_get_form',\n    'page arguments' => array('node_type_form'),\n\
  \    'access arguments' => array('administer content types'),\n    'type' => MENU_LOCAL_ACTION,\n\
  \    'file' => 'content_types.inc',\n  );\n```\n\n然而，这并非需要添加到建议列表顶部的链接。你想要作为操作链接包含的链接是\
  \ `node/add/suggestion`。在 `node.module` 中搜索 `node/add`（跳过定义用户可创建*所有*内容类型列表页面的菜单项）会带你找到一组在\
  \ `foreach` 循环中定义的菜单项——每个内容类型一个菜单项；参见代码清单 33–20。\n\n***代码清单 33–20.** node.module\
  \ 的 `hook_menu()` 实现中，为每种内容类型创建 `node/add/CONTENT_TYPE` 页面的代码*\n\n```\n  foreach\
  \ (node_type_get_types() as $type) {\n    $type_url_str = str_replace('_', '-',\
  \ $type->type);\n    $items['node/add/' . $type_url_str] = array(\n      'title'\
  \ => $type->name,\n      'title callback' => 'check_plain',\n      'page callback'\
  \ => 'node_add',\n      'page arguments' => array($type->type),\n      'access callback'\
  \ => 'node_access',\n      'access arguments' => array('create', $type->type),\n\
  \      'description' => $type->description,\n      'file' => 'node.pages.inc',\n\
  );\n```\n\n有没有办法让这个链接显示在其位置之外？似乎没有简单的方法，但实际上，你可以创建另一个不同路径的菜单项，该菜单项调用与你想要的节点添加表单相同的页面回调和页面参数。（稍后你会看到，这种方法并非最佳选择。）在这种情况下，这指的是你视图定义的\
  \ `suggestions` 路径和建议内容类型。\n\n需要注意的最重要的事情是页面回调，即 `node_add()` 函数，以及页面参数，它只有一个参数，即节点类型的机器名。\n\
  \n\n\n"
- "# 排版后的文档\n\n![images](img/square.jpg) **提示** 在第 18 章至第 20 章中创建的 X 射线模块（可从`drupal.org/project/xray`获取）会为你访问的每个页面提供页面回调和页面参数，并能直接给出`node/add/suggestion`的相关信息，而无需直接查看`hook_menu()`的实现。\n\
  \n现有的代码已经看得够多了。是时候动手写代码了！代码清单 33-21 展示了一个菜单项定义，它将`node/add`菜单项的定义与`MENU_LOCAL_ACTION`类型结合在了一起。\n\
  \n***代码清单 33-21.** 在自定义代码中定义本地操作菜单项*\n\n```\n/**\n * 实现 hook_menu()。\n */\nfunction\
  \ dgd7glue_menu() {\n  $items = array();\n  $items['suggestions/add'] = array(\n\
  \    'title' => \"添加建议\",\n    'page callback' => 'node_add',\n    'page arguments'\
  \ => array('suggestion'),\n    'access callback' => 'node_access',\n    'access\
  \ arguments' => array('create', 'suggestion'),\n    'file' => 'node.pages.inc',\n\
  \    'file path' => drupal_get_path('module', 'node'),\n    'type' => MENU_LOCAL_ACTION,\n\
  \  );\n  return $items;\n}\n```\n\n![images](img/square.jpg) **注意** 菜单项定义的键名中*不要*使用下划线（例如\
  \ `'page arguments'`、`'page callback'` 和 `'access callback'` 等）。\n\n清除缓存（并确保模块已启用），奇迹出现了！你的自定义操作链接已经就位。\n\
  \n**键盘与座椅之间的问题（PEBKAC）**\n\n当笔者初次尝试时，操作链接并未显示。我清除了缓存，将其添加到`admin/`路径下（而非由 Views\
  \ 创建的`suggestions`路径），当然又清除了一次缓存，但它依然没有出现。我查看了菜单表，发现记录确实存在。直到我决定直接修改正在参考的示例（即“添加内容类型”链接）时，才注意到自己遗漏了示例中最关键的部分：`'type'\
  \ => MENU_LOCAL_ACTION`！\n\n再说一遍，如果我能制作模块，你也能。\n\n我还犯的另一个错误是试图在`'file'`中填写 node\
  \ 模块的完整路径。这根本行不通，通过访问[`http://api.drupal.org/hook_menu`](http://api.drupal.org/hook_menu)，我的错误很快得到了纠正。所借用代码所在模块的路径必须单独在`'file\
  \ path'`指令中列出。（node 模块的路径通过`drupal_get_path()`函数获取，笔者通过在`api.drupal.org`上搜索`'path'`找到了这个函数。）\n\
  \n有些事情就是很棘手，一个打字错误可能会花费大量时间来调试。通常，当事情变得困难时，这往往意味着 Drupal 可能提供了更好的方法。本例正是如此，请继续阅读。\n\
  \n## 发现并采用更好的方法\n\n这种为操作链接定义新菜单项的方法是可行的，但有没有更好的方法呢？在新的菜单项中重复使用页面回调函数，意味着添加建议的页面现在在站点上存在*两个*路径：一个是预期的`node/add/suggestion`，另一个是新的`suggestions/add`。这会导致快捷方式模块混乱（允许同一页面被两次添加到快捷栏），也可能让网站使用者感到困惑，降低他们的舒适感和理解度。\n\
  \n在查看`node.module`对`hook_menu()`的实现时，你可能已经注意到`admin/content`顶部的*+ 添加内容*操作链接并不是作为`MENU_LOCAL_ACTION`定义的。在`node.module`的所有文件中搜索`\"\
  添加内容\"`，只会找到`node/add`页面本身。它又是如何被添加到`admin/content`的呢？搜索`admin/content`几乎立刻就能找到答案：函数`node_menu_local_tasks_alter()`。请查阅`node.module`或访问`api.drupal.org/node_menu_local_tasks_alter`，因为你可以直接获取并修改代码，将其变成自己的，就像代码清单\
  \ 33-22 中那样。\n\n***代码清单 33-22.** 通过实现 hook_menu_local_tasks_alter() 添加操作链接*\n\n\
  ```\n/**\n * 实现 hook_menu_local_tasks_alter()。\n */\nfunction dgd7glue_menu_local_tasks_alter(&$data,\
  \ $router_item, $root_path) {\n  // 在 'suggestions' 页面上添加指向 'node/add/suggestion'\
  \ 的操作链接。\n  if ($root_path == 'suggestions') {\n    $item = menu_get_item('node/add/suggestion');\n\
  \    if ($item['access']) {\n      $data['actions']['output'][] = array(\n     \
  \   '#theme' => 'menu_local_action',\n        '#link' => $item,\n      );\n    }\n\
  \  }\n}\n```\n\n太棒了！这用更优雅的方案替换了之前定义的菜单项（感谢 Drupal，“总有钩子适合它”）。现在你已经用正确的方式为现有页面添加了自定义操作链接。懂得方法后，一切就变得简单了。但如果要从笔者跌跌撞撞的经历中吸取什么教训的话，那就是：不知道却勇于尝试，最终会变成知道怎么做。\n\
  \n在 Drupal 中，由 Views 创建的、展示一种或两种内容类型的列表非常常见。在列表顶部添加用于创建相同内容的链接，能极大地提升用户体验。现在，你知道了如何用十几行代码实现这一点。\n\
  \n## 制作自定义文本过滤器\n\nDrupal 的文本格式过滤器是一种相当简单且强大的方式，可以改变内容的显示方式。（Drupal 的旧版本称其为*输入过滤器*，这容易引起误解，因为\
  \ Drupal 始终尊重用户提交的数据，是在*输出*时过滤内容。）在本节中，你将再次看到制作一个模块是多么简单、不吓人且实用，即使对像笔者这样在本章中容易开错头的人来说也是如此。\n\
  \n*《Drupal 7 权威指南》* 以及其他 Apress 的书籍，通过将提示、注释和其他类型的评论内容单独隔开（放在两行之间并使用不同字体）来突出显示。\n\
  \n![images](img/square.jpg) **提示** 在任何项目开始时，你都不会确切知道该如何做，但知道它总能有办法完成，是着手解决并付诸实践的关键第一步。\n\
  \n对于`DefinitiveDrupal.org`网站，你可以使用 HTML 和 CSS 来实现类似的效果。使用`div`和`span`配合 CSS 进行样式调整的\
  \ HTML 可能如下所示：\n\n```\n<div class=\"featured-element tip\"><span class=\"featured-element-type\"\
  >![images](img/U002.jpg)\n<span class=\"leading-square\">提</span>示</span> 手动输入包含![images](img/U002.jpg)\n\
  \ div、span、类或 ID 的 HTML 代码，强烈说明我们做错了。</div>\n```\n\n然而，你并不希望作者每次需要高亮提示时都手动输入 HTML\
  \ 代码。除了繁琐之外，这还会增加因微小错误而导致显示不一致的风险。与其输入前面的 HTML，不如让作者使用一种伪标记，它能够被替换为前述的 HTML，例如：\n\
  \n```\n[tip] 手动输入包含 div、span、类或 ID 的 HTML 代码，强烈说明我们做错了。[/tip]\n```\n\n这样出错的可能性小得多。你清楚自己要做的事，有了想用的简化标记，以及希望从中生成的\
  \ HTML。那么，该从哪里开始呢？\n\n\n\n"
- '# 寻找能满足需求的模块


  最好的模块是你无需亲自编写的模块。不妨先四处寻找一下，看有没有现成的模块能处理从其他标记语言生成 HTML 标签这类任务。通过在线搜索诸如 "drupal text
  format transform tags"、"drupal replace markup"、"drupal input filter tags"、"drupal
  7 text filters exportable" 等关键词，并专门在 `drupal.org` 模块库中搜索类似关键词（去掉 "Drupal" 一词后），确实能找到一些已有的实现。


  ![images](img/square.jpg) **提示** 在 Drupal.org 搜索模块时，记得应用模块筛选器。对应的链接可能类似：`drupal.org/search/apachesolr_multisitesearch/replace%20tags?filters=ss_meta_type%3Amodule`


  与 `DefinitiveDrupal.org` 的需求类似，Markdown Filter（`drupal.org/project/markdown`）和 Textile（`drupal.org/project/textile`）模块（从文本处理的角度看）以及
  BBCode（`drupal.org/project/bbcode`）模块，都是针对已知的标记系统设计的，而非满足自定义需求。这些模块以及 Typogrify（`drupal.org/project/typogrify`）等其他模块，都可以作为创建过滤器的参考示例。


  搜索结果中还出现了另一个模块：SimpleHTMLDOM（`drupal.org/project/simplehtmldom`），它是同名库（可从 `simplehtmldom.sourceforge.net`
  获取）的一个封装。这个模块作为工具可能有用，但你的文本操作需求并没有那么复杂。


  确实存在一个用于标签替换的 Drupal 6 版本模块，其中包含一些看起来能实现你所需前后标签替换的功能：Rep[lacement] tags（`drupal.org/project/reptag`）。然而，它并未使用过滤器及文本格式系统，而是依赖
  NodeAPI。此外，该 Drupal 6 版本从未发布过稳定版。这应该能让你在决定复制（而非移植并扩展）一个模块时，心理负担小一些。


  这些标记替换需求也完全有可能通过配置来实现，或者作为 Flexifilter 模块（`drupal.org/project/flexifilter`）的一个子模块来完成——该模块旨在让创建自定义过滤器变得更简单。在相同思路下的另一个项目
  Custom filter（`drupal.org/project/customfilter`）存在时间更久，维护也更积极。不过截至撰写本文时，这两个模块都还没有
  Drupal 7 分支，也未能提供足够的吸引力，让人愿意采用先移植再构建子模块的方式。


  鉴于时间紧迫、目标明确且具备编程能力，此时自行编写模块是合理的。（这可能不是最明智或最佳的决定，但至少表面上来看并非糟糕透顶的主意。）


  '
- '# 选择方法


  决定编写模块当然只是第一步，如何编写同样至关重要。


  在阅读完本书关于模块开发的部分，了解了钩子和节点相关知识后，你可能会想在节点保存时通过 `hook_node_insert()` 或 `hook_node_update()`
  对其进行截获并修改。但你应该抵制这种诱惑。Drupal 的一个显著特性就是它不会直接修改内容本身。你保存前看到的，与再次编辑时看到的内容完全一致。这意味着你的数据永远不会被破坏。认识到这是个优点后，你可能会想通过
  `hook_node_view()` 中的处理，用你酷炫的样式替换占位标记。但这意味着 Drupal 每次显示节点时都必须执行文本处理工作。在构建一种操作现有文本并添加新缓存层的机制之前，不妨退一步，看看节点系统之外的可能性。（或者，如果实在无解，可以像第
  9 章中讨论的那样，在 IRC 上提问。）


  ![images](img/square.jpg) **注意** 要了解 Drupal 7 中所有与节点相关的钩子，请参阅 `api.drupal.org/node.api.php`，或打开任意
  Drupal 7 副本中的 `modules/node/node.api.php` 文件。


  如何改变用户输入文本的显示方式，是 Drupal 中的一个常见问题。事实上，Drupal 核心早已解决了这个问题。自 Drupal 5 起，用于管理内容显示时修改的方法就存在于
  Filter 模块中。


  在 Drupal 7 中，Filter 模块在管理界面中的路径为：管理 ![images](img/U001.jpg) 配置 ![images](img/U001.jpg)
  内容创作 ![images](img/U001.jpg) 文本格式（`admin/config/content/formats`）。从代码层面（位于 `modules/filter`
  目录）查看这个核心模块，会发现十个文件（`filter.admin.inc`、`filter.css`、`filter.js`、`filter.test`、`filter.admin.js`、`filter.info`、`filter.module`、`filter.api.php`、`filter.install`
  和 `filter.pages.inc`），这似乎有点令人望而生畏。我们来看看它，但最好能找到一个仅实现过滤器提供功能、而非整个文本格式系统的模块。


  '
- '# 寻找示例（提示：Examples 项目）


  哪里能找到好的示例呢？


  在 Drupal 7 仍在开发期间，由 Randy Fay（rfay）发起的一个项目提供了一个极佳（现在看来也是理所当然）的答案：Examples 模块套件。你可以像下载其他项目一样，在
  `drupal.org/project/examples` 下载它。果然，其中包含一个 `filter_example` 模块，演示了如何定义输入过滤器。


  ![images](img/square.jpg) **提示** 每当你需要实现核心 API（Drupal 核心定义的钩子）时，请先在 Examples 项目（`drupal.org/project/examples`）中寻找示例。




  '
- "# 为模块指定临时名称\n\n既然你已经明确了方法并有示例可循，现在可以开始编码了。这就引出了第一个问题：如何命名模块？（你可以将函数直接添加到胶水代码模块中，但在开始主要的新功能时，最好在一个独立的模块中开始——尤其是当你可能将代码贡献给\
  \ Drupal 社区时。）如果灵感没有立刻涌现，为了避免在模块尚不存在时就耗费精力想出一个完美的名称，你可以先使用一个临时名称。\n\n不过，选择临时名称时也有一些指导原则。如果你将模块命名为\"\
  tip\"，后来决定将其贡献到`drupal.org`，你会想要重命名它，以免占用\"tip\"这个常见词汇——特别是当它并非对该模块功能的特别贴切描述时。问题是，对这些常见的三个字母进行查找和替换操作可不会太轻松。\n\
  \n即使对于你计划贡献的模块，临时名称也应遵循与自定义模块相同的做法，用你的站点项目名称作为命名空间。你的项目名称加上你选择的任何特色词汇，应该能让你通过查找和替换轻松修改所有函数名。\n\
  \n**提示** 本模块在其临时名称中使用了下划线，但某些方面（例如 CSS 类和 ID，历史上使用连字符而非下划线）如果临时名称和最终选定的名称都避免使用下划线会更方便。\n\
  \n那么开始吧！创建一个以你选择的模块名称命名的目录（本例中为`dgd7_tip`），并开始创建必要的模块文件，这些文件也以模块名称命名，从`dgd7_tip.info`开始（参见清单\
  \ 33-23 和 33-24）。\n\n***清单 33-23.** 使用 Vim 创建模块目录和.info 文件的命令行步骤*\n\n```\ncd sites/all/modules/custom\n\
  mkdir dgd7_tip\ncd dgd7_tip/\nvi dgd7_tip.info\n```\n\n***清单 33-24.** dgd7_tip.info\
  \ 的初始工作内容*\n\n```\nname = Tip formatter\ndescription = [dgd7_tip] 用于提示、注释、建议和其他强调段落文本的文本格式过滤器。\n\
  core = 7.x\n```\n\n**注意** 本文作者认为，管理员和开发者能够在`admin/modules`页面上看到模块的系统（或机器）名称是一项基本的可用性要求，并将在描述中继续包含系统名称，直到这一基本功能被核心接受。这种风格并非公认的实践，所以只有当你同样强烈认同时才遵循。\n\
  \n现在创建一个`.module`文件，并为其添加第一个钩子，即`hook_filter_info()`的实现（参见`api.drupal.org/hook_filter_info`），该实现改编自\
  \ Filter 示例模块，如清单 33-25 所示。\n\n***清单 33-25.** dgd7_tip.module 的初始内容*\n\n```\n/**\n\
  \ * 实现 hook_filter_info()。\n */\nfunction dgd7_tip_filter_info() {\n  $filters =\
  \ array();\n  $filters['dgd7_tip'] = array(\n    'title' => t('Tip formatter'),\n\
  \    'description' => t('允许使用简单符号来标记需要强调为提示、注释、建议或其他特殊插叙内容的文本段落。'),\n    'process\
  \ callback' => '_dgd7_tip_process',\n    'tips callback' => '_dgd7_tip_tips',\n\
  \  );\n  return $filters;\n}\n\n/**\n * 实现过滤器处理回调。\n */\nfunction _dgd7_tip_process($text,\
  \ $filter) {\n  return $text;\n}\n\n/**\n * 实现过滤器提示回调。\n */\nfunction _dgd7_tip_tips($filter,\
  \ $format, $long = FALSE) {\n  $tips = '';\n  return $tips;\n}\n```\n\n搞定！看起来整洁干净。即使启用了你的模块，它也不会出现任何未定义函数的错误——尽管过滤器回调函数只是桩函数，因此它们也不会做任何事情。（在`hook_filter_info()`定义和`filter_example.module`中的'prepare\
  \ callback'对于简单过滤器来说被证明是不必要的；它对于需要在其他过滤器工作之前对内容进行修改的复杂过滤很有用。本文作者最初为其创建了一个桩函数，但后来从示例中移除了。警告：空的\
  \ prepare 或 process 回调，或者由于任何原因未返回值的回调，将导致应用该输入格式的任何位置内容为空！）\n\n**注意** 本模块只提供一个过滤器，但通过使用不同的键和值重复`$filters['dgd7_tip']`数组，它可以提供更多过滤器。如果你确实打算提供多个输入过滤器，键不应该是你的模块名称`dgd7_tip`，而应该是模块名称*加上*对该特定过滤器的描述性内容。相同的约定也适用于回调名称。本模块不打算提供其他输入过滤器，因此提前使用显式函数名还为时过早。（process\
  \ 和 tips 回调是内部函数，仅供模块内部使用，如前缀下划线所示。对于任何 API 函数——可能被其他模块调用的函数——你可能需要采取预防措施，选择具有前瞻性的名称。）\n\
  \n"
- '# 为你的模块启动仓库


  由于此模块可能独立于整个网站项目存在，你可以为其启动一个独立的版本控制仓库。使用 Git（更多信息和资源请参见第 2 章和第 37 章），只需在命令行中输入几个单词，如清单
  33-26 所示。在你创建的`dgd7_tip`目录内执行此操作。


  ***清单 33-26.** 启动仓库并对临时命名的 dgd7_tip 模块进行初始提交的命令行步骤*


  ```

  git init

  git add .

  git commit -m "包含桩过滤器 API 函数的.info 和.module 文件。"

  ```


  你现在可以持续提交（如第 14 章所提倡的那样），无需提交消息，或者当你有特别需要记录的内容时再添加消息。本章代码中将不再标注`git add`命令和提交消息，但你可以确信，在每次重大更改以及许多微小的更改之后，都会有一次提交。


  **注意** 本节创建的模块可从在线章节笔记`dgd7.org/other90`获取链接，你可以查看对它的每次提交。


  '
- '# 制作标签和替换标记表单


  对于一个完全自定义的模块，你可以跳过设置表单，直接硬编码你希望对内容应用的处理。无需为管理员制作用户界面，也无需为其他模块制作 API。由于 Drupal 7
  没有满足`DefinitiveDrupal.org`需求的包装标签替换方案，并且你可能希望管理员能够在不修改模块的情况下更改过滤器，你可以尝试制作一个同时包含
  UI 和 API 的模块。


  通常你会从 API 开始。在本例中，Drupal 为过滤器设置表单提供了 API，但没有为过滤器设置数据提供 API，因此你可以先实现表单，然后反向工作来理解
  Drupal 如何处理数据。


  每组标签和替换标记需要包含三部分数据：被替换的标签、替换该标签开放版本的标记，以及替换该标签闭合版本的标记。通过采用 HTML 闭合标签包含斜杠的约定，你可以只要求用户输入闭合标签，并通过移除斜杠来推导出开放标签。例如，表单可以接受`{{/pony}}`作为标签，然后在内容中，`{{pony}}`将被替换为表单中输入的开始标记，而`{{/pony}}`将被替换为结束标记。




  '
- '# 定义设置回调函数


  为了让过滤器能够保存设置，首先需要在 `hook_filter_info()` 的实现中为过滤器定义添加另一个回调。设置回调允许你定义表单元素，以便接收管理员输入的值。之后，Drupal
  会在处理回调（以及准备回调，如果已定义）中提供这些值。


  你需要添加一行代码，为过滤器指定一个设置回调函数。在 `dgd7_tip_filter_info()` 中创建的 `$filters[''dgd7_tip'']`
  数组里加入以下内容。待稍后完成更多工作后，我会再次展示这个过滤器定义函数。


  ```

  ''settings callback'' => ''_dgd7_tip_settings'',

  ```


  当然，接下来你需要定义 `_dgd7_tip_settings()` 函数。该函数应返回表单元素，Drupal 会将这些元素嵌入到文本格式编辑页面中特定于过滤器的选项内。`filter_example.module`
  中自然有一个示例，稍后你将根据自己的需求定义一个过滤器设置回调函数。


  '
- "# 构建可接受多个元素的表单\n\n每个标签及其对应的替换标记集都需要在表单上拥有独立的位置，这意味着表单需要能够容纳数量可变的这类元素集。\n\n## 懂得何时放手\n\
  \n最巧妙的方式是在需要时通过 AJAX 动态添加额外的表单元素集，它可以按需将 HTML 拉入页面。Drupal 的字段模块就是一个范例。\n\n![images](img/square.jpg)\
  \ **注意** 对于仅从章节标题无法判断的读者：本节不会进行任何开发工作。\n\n遗憾的是，无限值字段使用的\"添加另一项\"链接是字段模块特有的。`modules/field/field.form.inc`\
  \ 中 AJAX 回调 `field_add_more_js()` 及其相关功能的代码或许有参考价值，但 Drupal 7 的表单 API 没有提供自动化该过程的机制。\n\
  \n那么在构建模块的这个阶段该怎么办？简化处理。尽可能保持简单。现阶段不值得陷入复杂的用户界面增强中。（实际上，最好在首版中完全不做用户界面。这里之所以打破这一规则，是因为保存过滤器信息的常规方法不幸地不兼容\
  \ API；文本格式是作为一个整体保存的。）\n\n![images](img/square.jpg) **注意** 从 Drupal 7 开始，每个过滤器实例都有自己的设置。也就是说，每种文本格式上的每个过滤器都是独立配置的：如果你在\"\
  过滤后的 HTML\"文本格式上更改了图片缩放过滤器的设置，\"完整 HTML\"文本格式上的图片缩放过滤器设置不会发生变化。这极大地提升了灵活性，但同时也增加了保持共享过滤器设置一致的工作量。\n\
  \n## 制作始终接受两行额外内容的过滤器设置表单\n\n设置表单将采用一种更简单的模式：首次呈现时及每次保存后，它始终提供至少两套空白的表单元素集。\n\n\
  设置回调函数返回的所有表单元素都会随过滤器对象一起保存，并可在 `$filter->settings` 中获取。过滤器对象（包括其设置数组）在所有过滤器回调（处理、准备、提示和设置自身）中均可用。你可以将任何所需的设置放入该数组的嵌套子数组中，例如将替换标记信息存入\
  \ `$filter->settings['rm']`。（作者曾考虑将每个标签及其替换标记对直接保存到设置数组中，但在生成表单时这种方法会导致混乱。）用于收集管理员替换标记信息的表单元素也应嵌套在\
  \ `'rm'` 数组中。\n\n鉴于你需要为每个已保存的值提供一套表单元素，再额外增加两套空白元素，此时使用 `foreach` 循环是自然的做法。然而，无法向替换标记设置数组中添加两个空白标签数组，因为它们的键都是空字符串（`''`），会被合并为一个。为了避免在两个独立的循环中重复创建表单元素的代码，你可以将创建表单元素的逻辑抽离成独立函数，从而在需要时多次调用且无需重复代码。每套表单元素所需的三项内容包括：（结束）标签、替换其起始变体的起始标记，以及结束标记（参见清单\
  \ 33–27）。\n\n**清单 33–27.** 在可重复调用的函数中定义标签及替换标记的表单元素集\n\n```\n/**\n * 添加一组表单字段，用于新增标签和替换标记对。\n\
  \ */\nfunction _dgd7_tip_add_rm_formset(&$settings, $i, $tag = '', $replace =\n\
  \  array('before' => '', 'after' => '')) {\n  $settings['rm'][$i]['tag'] = array(\n\
  \    '#type' => 'textfield',\n    '#title' => t('标签'),\n    '#maxlength' => 64,\n\
  \    '#default_value' => $tag,\n  );\n  $settings['rm'][$i]['before'] = array(\n\
  \    '#type' => 'textfield',\n    '#title' => t('前置'),\n    '#maxlength' => 1024,\n\
  \    '#default_value' => $replace['before'],\n  );\n  $settings['rm'][$i]['after']\
  \ = array(\n    '#type' => 'textfield',\n    '#title' => t('后置'),\n    '#maxlength'\
  \ => 1024,\n    '#default_value' => $replace['after'],\n  );\n}\n```\n\n这个函数做了几件有趣的事。主要是清晰地定义了三个类型为\
  \ `textfield` 的表单元素。它还接受一个迭代器（`$i`），从而可以按需多次将自身添加到 `$settings['rm']` 数组中，每次使用不同的整数键。`$settings`\
  \ 数组通过引用传递（函数定义中 `&` 符号表明这一点），因此函数无需返回值；它直接修改了 `$settings` 变量。最后，函数为标签和替换标记接受了默认值，函数定义本身将这些值设为空，以便更容易添加空白表单字段。这正是\
  \ `_dgd7_tip_add_rm_formset()` 函数定义中 `$tag = '', $replace = array('before' => '',\
  \ 'after' => '')` 部分的作用。\n\n清单 33–28 展示了提供表单的函数：该表单包含若干行元素（用于编辑每个已保存的标签及其替换标记集）以及两行空白表单元素，供管理员添加更多的标签和替换标记集。\n\
  \n**清单 33–28.** 设置回调函数\n\n```\n/**\n * 标签过滤器的设置回调。\n */\nfunction _dgd7_tip_settings($form,\
  \ $form_state, $filter, $format, $defaults) {\n  // 声明用于容纳设置表单元素的数组。\n  $settings\
  \ = array();\n\n  // 获取默认设置。\n  $filter->settings += $defaults;\n  // \"rm\" 是替换标记的缩写。\n\
  \  $rm = $filter->settings['rm'];\n\n  $i = 0;\n  foreach ($rm as $tag => $replace)\
  \ {\n    _dgd7_tip_add_rm_formset($settings, $i, $tag, $replace);\n    // 将过滤器数量递增。\n\
  \    $i++;\n  }\n  // 始终添加两套空白表单字段供填写。\n  $total = $i + 2;\n  for ($i; $i < $total;\
  \ $i++) {\n    _dgd7_tip_add_rm_formset($settings, $i);\n  }\n  return $settings;\n\
  }\n```\n\n`_dgd7_tip_add_rm_formset()` 函数在两个不同的循环中被调用。一个循环遍历所有现有或默认的标签及替换标记集（稍后会介绍默认设置的概念），另一个循环则在现有基础上额外添加两套空白字段集。`$i`\
  \ 变量负责计数，确保每套字段拥有唯一的键。不过，这个整数键仅在通过表单收集数据时有效；在保存数据时，最好能将其去除。\n\n\n\n### 使用验证函数在保存前处理数值\n\
  \n实际上，清单 33-28 中的代码并不完全有效：表单将使用其 `$i` 迭代整数值保存数据，这对于允许一次性保存多组数据是必要的，但在获取数据时，这个任意数值毫无意义。检索尝试假设\
  \ `$rm` 数组将标签作为键，而非数字。\n\n以下两点让你能够在文本格式表单的过滤设置上下文中解决此问题（参见清单 33-29）：\n\n*   通过设置\
  \ `#element_validate` 属性，可以为任何表单元素添加验证函数。\n*   验证函数的功能不止于验证。它们可以使用 `form_set_value()`\
  \ 更改将要保存的数据。\n\n**清单 33-29.** 在设置回调函数中添加内容，为包含标签和替换标记集的表单元素设置验证函数\n\n```\nfunction\
  \ _dgd7_tip_settings($form, $form_state, $filter, $format, $defaults) {\n  // 声明将保存设置表单元素的数组。\n\
  \  $settings = array();\n  $settings['rm'] = array(\n    '#element_validate' =>\
  \ array('dgd7_tip_rm_form_keys_validate'),\n  );\n  // [为节省空间，省略之前显示的其他代码...]\n\
  \  return $settings;\n}\n```\n\n经过大量试验，清单 33-30 中的测试数组结构似乎能以正确方式保存到设置中，并能在后续正常读取。\n\
  \n**清单 33-30.** 用于探索 Drupal 过滤 API 正确保存数据结构的试验函数\n\n```\nfunction dgd7_tip_rm_form_keys_validate($element,\
  \ &$form_state) {\n  $rm = array();\n  $rm['{/testtag}'] = array(\n      'before'\
  \ => 'value for before markup',\n      'after' => 'value for after markup',\n  );\n\
  \  form_set_value($element, $rm, $form_state);\n}\n```\n\n试验过程是保存表单，并查看这些硬编码值是否按预期显示（标签为\
  \ `{/testtag}`，替换标记字段中的 `value for before markup` 和 `value for after markup`）。你绝不会用验证函数来硬编码值，但这提供了一种便捷的方式来测试用于保存数据的结构。显然，表单的其他所有部分都可以省去，因此我们也会这样做（参见清单\
  \ 33-31）。\n\n**清单 33-31.** 重组数据以标签为键保存、去除整数序列键的验证函数\n\n```\n/**\n * 在 filter_format_save()\
  \ 运行前重新排列表单元素，使其以标签为键。\n */\nfunction dgd7_tip_rm_form_keys_validate($element, &$form_state)\
  \ {\n  $rm = array();\n  // 为每个元素创建以标签为键的版本。\n  foreach ($element as $i => $value)\
  \ {\n    // 跳过非数值的表单元素（我们关心的元素都有数字键）。\n    if (!is_numeric($i))  continue;\n   \
  \ $key = $value['tag']['#value'];\n    // 不保存空键。\n    if (!$key) continue;\n   \
  \ $rm[$key] = array(\n      'before' => $value['before']['#value'],\n      'after'\
  \ => $value['after']['#value'],\n    );\n  }\n\n  form_set_value($element, $rm,\
  \ $form_state);\n}\n```\n\n这段代码可能算不上优雅，但它提供了合理的数据存储，有助于完成即将进行的任务——一个与本模块直接用例更相关的任务，即在代码中提供默认值。不过，我们先来看一下验证的更常规用法。\n\
  \n### 验证过滤设置\n\n为了使标签替换功能正常工作，模块需要确保提供的标签是包含 `/`（正斜杠）的结束标签。令人惊讶的是，文本过滤设置没有内置验证功能，这意味着没有现成的模型可供遵循。\n\
  \n你可以实现 `hook_form_alter()` 并添加一个全局表单验证函数，就像你完全自己定义整个表单时一样。更简单、更温和的方法是使用特定表单元素的\
  \ `#element_validate` 表单属性。\n\n![images](img/square.jpg) **提示** 在 `api.drupal.org/forms_api_reference.html#element_validate`\
  \ 阅读更多关于 `element_validate` 表单属性的信息。与往常一样，你也可以在核心代码中查找示例，例如在类 Unix 系统上使用命令行：`grep\
  \ -nHR 'element_validate' modules/`\n\n与大多数钩子和函数一样，用于验证元素的函数最重要的部分是它们的函数签名：`$element,\
  \ &$form_state, $whole_form`。与号再次表示，尽管 `$form_state` 是一个数组，但它是通过引用传递给验证函数的，并且在函数内部所做的更改将应用于原始数据。\n\
  \n你需要验证待替换标签的具体信息是确认斜杠的存在。在网络上搜索“*php count number characters in a string*”（并点击一些结果）后，作者找到了\
  \ `php.net/substr_count`（参见清单 33-32）。（如果你认为你能猜到函数名，甚至接近正确名称，直接访问 `php.net/bestguess`\
  \ 是查找函数的最快方法，因为它会自动提供一系列可能的匹配项。）\n\n**清单 33-32.** 验证标签为可解析的结束标签\n\n```\n/**\n *\
  \ 验证每个标签包含且仅包含一个斜杠。\n */\nfunction dgd7_tip_rm_form_tag_validate($element, &$form_state,\
  \ $whole_form) {\n  if (strlen($element['#value']) && substr_count($element['#value'],\
  \ '/') !== 1) {\n    // 我们描述错误位置，因为提交后它很可能在一个不可见的垂直选项卡中。\n    form_error($element,\
  \ t('在“替换标记”过滤设置中，每个标签必须采用结束标签的形式，\n且恰好包含一个斜杠 (\"/\")。起始标签是通过移除斜杠计算得出的。'));\n  }\n\
  }\n```\n\n你的数据整理验证函数已经会丢弃标签文本字段中为空的替换标记表单数据，因此这个验证函数首先使用 `strlen($element['#value'])`\
  \ 检查表单元素中是否有内容。如果没有，则不执行任何操作（不抛出错误）。`if` 语句的第二部分使用了 `substr_count()` 函数；如果斜杠数量不是恰好一个，则会抛出错误。\n\
  \n\n\n##### 在筛选器设置表单上添加说明\n\n此模块应提供关于填写标签及前后标记字段的说明。通常的 Drupal 方式是在表单元素数组中使用`#description`，但这并不合适，因为您希望将所有字段作为一个整体来描述（而非逐一字段或字段集），并且希望说明位于其所描述的表单元素之前（而非像`#description`默认那样位于之后）。您只需要一些位于表单上方的文本。\n\
  \n网站已使用的图像调整筛选器模块（`drupal.org/project/image_resize_filter`）恰好具有这种分离的帮助文本。因此，可以很方便地借鉴其作者\
  \ Nathan Haug（quicksketch）的实现方式。查看`image_resize_filter.module`文件，您会发现他将帮助文本直接粘贴到了主题函数`theme_image_resize_filter_form()`中。\n\
  \n您可以基于这一思路进行改进，使其更优雅——仍然使用表单主题函数，但利用它来重新排布已在表单数组中正确定义的描述信息。第一步是实现`hook_theme()`以定义主题函数。第二步是向包含待描述表单元素的表单元素中添加两个属性：描述文本和使用主题函数的指令。第三步是定义该主题函数，使其在表单其余部分之前输出描述信息。清单\
  \ 33–33 展示了该主题函数；请注意，大部分设置回调函数`_dgd7_tips_settings()`并未显示。\n\n**清单 33–33. 实现主题函数，将描述信息置于表单元素顶部而非底部**\n\
  \n```\n/**\n * 实现 hook_theme()。\n */\nfunction dgd7_tip_theme() {\n  return array(\n\
  \    'dgd7_tip_settings' => array(\n      'render element' => 'form',\n    ),\n\
  \  );\n}\n\nfunction _dgd7_tip_settings($form, $form_state, $filter, $format, $defaults)\
  \ { // ...\n  $settings['rm'] = array(\n    '#description' => t('要设置标签和替换标记，请仅输入结束标签\n\
  \  （例如 &lt;/tip&gt;）；起始标签将通过移除斜杠自动计算得出\n  （此例中为 &lt;tip&gt;）。然后分别输入将替换起始和结束标签的前后标记。'),\n\
  \    '#theme' => 'dgd7_tip_settings',\n    '#element_validate' => array('dgd7_tip_rm_form_keys_validate'),\n\
  \  );\n// ...\n}\n\n/**\n * 主题回调函数，用于输出设置表单的描述信息。\n */\nfunction theme_dgd7_tip_settings($vars)\
  \ {\n  $form = $vars['form'];\n  return '<p>' . render($form['#description']) .\
  \ '</p>'\n         . drupal_render_children($form);\n}\n```\n\n关于定义和使用主题函数的更多信息，请参见第\
  \ 9 章。如第 14 章、第 15 章、附录 C 及本书其他部分所述，使用`render()`显示元素意味着该元素将不再被显示（除非仅渲染该元素或使用`show()`重新暴露它）。在显示表单其余部分时，需要使用`drupal_render_children()`而非`render()`，以避免无限循环。\n\
  \n#### 创建自己的钩子\n\n接下来是有趣的部分。在开发 Drupal 时，您经常实现其他模块的钩子。创建自己的钩子算得上是难得的体验！这是您的模块回馈社区的机会，也是询问其他模块是否想加入“派对”的时刻。本次契机在于，当筛选器被新添加到某个格式时，需要添加标签和替换标记集。\n\
  \n创建钩子有点形而上学：如果一个钩子被定义了但无人实现，它是否存在？（如果这个问题让您夜不能寐，您之后可以自己实现这个钩子。）钩子的诞生，源于向其他代码提供响应调用的机会。最常用的调用方式，也是创建\
  \ Drupal 钩子的方法，是使用`module_invoke_all()`函数，如清单 33–34 所示。\n\n**清单 33–34. 调用钩子，让其他模块有机会为筛选器提供默认设置**\n\
  \n```\n/**\n * 实现 hook_filter_info()。\n */\nfunction dgd7_tip_filter_info() {\n\
  \  $filters['dgd7_tip'] = array(\n    'title' => t('替换标记'),\n    'description' =>\
  \ t('允许使用简单标记来表示需要包裹在自定义标记中的文本段落，\n  例如用于强调提示、注释或其他特色插入内容。'),\n    'process callback'\
  \ => '_dgd7_tip_process',\n    // 允许其他模块声明默认的标签和替换标记。\n    'default settings' =>\
  \ array(\n      'rm' => module_invoke_all('dgd7_tip_defaults'),\n    ),\n    'settings\
  \ callback' => '_dgd7_tip_settings',\n    'tips callback' => '_dgd7_tip_tips',\n\
  \  );\n  return $filters;\n}\n```\n\n`module_invoke_all()`函数旨在从多个来源获取数据并将其整合。它使用\
  \ PHP 函数`array_merge_recursive()`来实现这一点，因此任何包含新键的内容都会添加到它返回的数组中，而任何包含相同键的内容则会覆盖之前已有的数据。对于替换标记，如果有两个模块实现了该钩子并为同一个短标签提供了标记，则最后被调用的模块会胜出。这是钩子工作机制的常见特性，您无需担心。\n\
  \n通常，在调用钩子时，即使想不出使用它的理由，也应传递一些上下文信息。在本例中，虽然没有任何有意义的上下文可以传递，但如果您维护的是公开模块，请留意问题队列：永远要假设别人会用您无法想象的方式，对您的\
  \ API 进行更古怪的操作。\n\n请注意，此解决方案结合了代码提供的默认设置和管理员覆盖或新增的设置，但其灵活性不如 CTools 等真正的可导出配置。如果此模块获得了可观的使用量，实现这一功能将留给作者或您作为后续练习。\n\
  \n#### 过滤内容\n\n您做这一切不就是为了一个目的吗？哦，是的！将用户输入的内容在显示时以不同格式呈现。要将标签转换为替换标记，您需要实现筛选器的处理回调函数，如清单\
  \ 33–35 所示。\n\n**清单 33–35. 替换标记文本筛选器的处理回调函数**\n\n```\n/**\n * 标签筛选器的处理回调函数。\n */\n\
  function _dgd7_tip_process($text, $filter) {\n  if (!isset($filter->settings['rm'])\
  \ || !is_array($filter->settings['rm'])) {\n    return $text;\n  }\n  foreach ($filter->settings['rm']\
  \ as $ctag => $replace) {\n    dgd7_tip_replace_tags($text, $ctag, $replace['before'],\
  \ $replace['after']);\n  }\n  return $text;\n}\n```\n\n此函数的第一部分检查是否存在任何需要应用的替换标记；如果没有，则提前退出，直接返回未修改的文本。（虽然理论上不应该存在未设置的设置，但稍微宽容一点也无妨。）\n\
  \n![images](img/square.jpg) **注意** 请记住，如果处理回调函数未返回任何值，文本不仅不会原样显示，还会完全消失。\n\n\n好的，作为高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n"
- "# 正则表达式\n\n看着一个正则表达式——以及围绕这个正则表达式的代码——可能会让你感觉仿佛面对着难以理解的事物。也许你看过的许多其他代码早已给你这种感觉。在不理解的情况下使用某样东西并非理想的方法，但你不可能一下子就成为所有方面的专家。要作为一名开发者成功实践，你必须不断拓展自己的知识边界。随着使用而来的是熟悉。随着熟悉可能带来理解，如果未能理解，那么你应当意识到，对于你多次使用的东西，应该投入更多精力去研究和理解。本小节采用“先使用后理解”的方法，但首先请赋予自己自由实验的能力。\n\
  \n## 创建你自己的 `test.php` 文件\n\n制作你自己的测试脚本，以便在 Drupal 环境中快速测试代码。创建一个名为 `test.php` 或你喜欢的任何名称的文件，并将其保存在与\
  \ `index.php` 相同的文件夹中。使用 `index.php` 的前三行代码，你就拥有了一个完全启动的 Drupal，你可以用它来测试各种代码，这比通过菜单系统设置页面要快得多。\n\
  \n这是一个打印 Drupal 所有可用配置信息的示例：\n\n```\n<?php\ndefine('DRUPAL_ROOT', getcwd());\nrequire_once\
  \ DRUPAL_ROOT . '/includes/bootstrap.inc';\ndrupal_bootstrap(DRUPAL_BOOTSTRAP_FULL);\n\
  \ndrupal_test();\nfunction drupal_test() {\n  global $conf;\n  print '<pre>';\n\
  \  var_export($conf);\n  print '</pre>';\n}\n```\n\n![图片](img/square.jpg) **注意**\
  \ 全局`$conf` 变量的内容在整个 Drupal 中都可以通过 `variable_get()` 函数 (`api.drupal.org/api/function/variable_get/7`)\
  \ 获取。\n\n你可以在此处测试任何函数（不包括钩子实现），而无需创建并启用模块。\n\n本小节改编自 Chad Phillips (hunmonk) 的演示文稿，他本人也引用了\
  \ Karoly Negyesi (chx) 的成果。这是以开源方式分享技能，现在我将它们传递给你。更多提示：\n\n*   一旦遇到麻烦，立即检查你的变量。\n\
  *   使用 `exit($var);` 在你关心的代码部分终止执行（并可选地转储当时可用的变量）。\n*   在 Drupal 核心中寻找示例。搜索一个 Drupal\
  \ 核心安装，或在 `#drupal` 频道（如果你正在回馈你所开发的模块，则进入 `#drupal-contribute` 频道）中询问 Drupal 核心如何实现某个功能的示例。\n\
  *   清除你的缓存。\n*   记录你的工作。否则，一周或一年后你回过头来看，会完全不明白你当时在想什么。\n\n## 测试正则表达式\n\n使用一个测试 PHP\
  \ 文件，你可以尝试正则表达式的基础知识。（这个文件使用 PHP 函数而非 Drupal 函数，甚至不需要启动 Drupal。）由于该模块的预期用途是替换成对的开始和结束标签，你需要一个能同时匹配两者、而非单独匹配一个的正则表达式。这使得事情变得有点棘手；参见\
  \ 列表 33–36。\n\n![图片](img/square.jpg) **提示** 正则表达式资源链接请参阅 `dgd7.org/regex`。\n\n***列表\
  \ 33–36.** 一个测试正则表达式*\n\n```\n<?php\n$text = \"这是环绕注释的文本。\n\n[note] 这是一个注释。 [/note]。\n\
  \n更多文本。\n\n[note]这是另一个注释，一个多行注释。[/note]\";\n$otag = \"[note]\";\n$ctag = \"[/note]\"\
  ;\n$before = \"BEFORE\";\n$after = \"AFTER\";\n\n$text = preg_replace('@' . preg_quote($otag)\
  \ . '(.+?)' . preg_quote($ctag) . '@s', \"$before $1 $after\",\n  $text);\n\nprint\
  \ $text;\n```\n\n得到的输出是：\n\n* * *\n\n`这是环绕注释的文本。BEFORE 这是一个注释。 AFTER。更多文本。BEFORE\
  \ 这是另一个注释，一个多行注释。 AFTER`\n\n* * *\n\n在 `preg_replace()` 函数内部使用的正则表达式语法成功匹配了位于 `[note]`\
  \ 和 `[/note]` *之间*的文本。`preg_replace()` 函数将此匹配结果中括号内的部分的值（即内部部分）提供给变量 `$1`，该变量可用于第二个参数，即替换文本。（第三个参数是原始文本。）\n\
  \n第一行构建了正则表达式字符串；实际上，它就是一个字符串，每个点将字符串的一部分连接到下一部分。如果你不对要匹配的字符串使用 `preg_quote()`，事情会变得极其糟糕，因为这些字符串很可能包含对正则表达式有特殊含义的字符。（笔者是通过搜索“*不解释字符串的正则表达式*”和“*php\
  \ 转义正则特殊字符*”才找到这个函数的。）\n\n这个字符串中的 `@` 符号界定了正则表达式的起止位置。这可以是任何字符，当然不能是出现在该正则表达式中的字符。通常使用\
  \ `/`，但结束标签中总会有斜杠，因此在测试中使用了 `@`。当然，所选分隔符可以被专门转义，因此，对于你正在构建的函数，更健壮的方法是在开始和结束标签中检查是否存在分隔符字符。实际上，因为你已经验证了结束标签只包含一个斜杠，你可以转义那个斜杠，并确保被搜索的标签字符串中的字符与表达式的分隔符之间不会发生冲突。这将是接下来要采取的方法。\n\
  \n最后，跟在正则表达式结束分隔符后面的 `s` 修饰符允许通配符匹配换行符，这样注释内就可以包含换行符，就像测试中那样。列表 33–37 将这个方法整合到一个或两个函数中用于该模块。\n\
  \n***列表 33–37.** 用已定义的标记替换开始和结束标签的函数*\n\n```\n/**\n * 根据包含斜杠的结束标签，用标记替换标签。\n *\n\
  \ * @param $text\n *   要修改的字符串，用标记替换标签，通过引用传递。\n * @param $ctag\n *   结束标签，除了包含一个\
  \ / 外与开始标签相同。\n * @param $before\n *   替换开始标签的标记。\n * @param $after\n *   替换结束标签的标记。\n\
  \ * @return NULL\n */\nfunction dgd7_tip_replace_tags(&$text, $ctag, $before = '',\
  \ $after = '') {\n  $otag = preg_quote(dgd7_tip_otag($ctag));\n  $ctag = str_replace('/',\
  \ '\\/', preg_quote($ctag));\n  $text = preg_replace(\n    '/' . $otag . '(.+?)'\
  \ . $ctag . '/s',\n    \"$before$1$after\",\n    $text\n  );\n}\n```\n\n\n\n```php\n\
  /**\n * 接收闭合标签并去除斜杠以呈现开放标签。\n */\nfunction dgd7_tip_otag($ctag) {\n  return str_replace('/',\
  \ '', $ctag);\n}\n```\n\n通过从闭合标签中移除斜杠来创建开放标签的功能被单独放在一个函数中，尽管它完全可以轻松地放在替换标签函数中的一行代码里，而且放在那里也没什么问题；只是因为觉得这个功能以后可能还会再用。在将搜索字符串（`$otag`\
  \ 和 `$ctag`）放入 `preg_replace()` 函数之前，对特殊字符的转义处理是与上述操作同时进行的，这样能让代码看起来更整洁一些。请注意，将闭合标签中的斜杠替换为转义后的斜杠（将\
  \ `/` 替换为 `\\/`）是在特殊字符转义*之后*进行的。最后，`\"$before$1$after\"` 看起来有点杂乱且像是拼凑在一起的，但 PHP\
  \ 会分别处理每个变量，并将它们无缝拼接在一起（不含空格），这对于构建替换文本来说非常完美。\n\n要进行测试，你需要配置一个文本格式（路径为 `admin/config/content/formats`），为其启用“替换标记”过滤器，然后添加一些测试标签和标记。\n\
  \n无论过滤器是你自己创建的，还是来自他人贡献的模块，输入过滤器的顺序对于实现预期效果都非常重要。“替换标记”过滤器必须排在“限制允许的 HTML 标签”过滤器之后（如果存在该过滤器的话）；否则后者可能会剔除前者添加的标签。然后，你可以进入任意一个节点，使用配置了“替换标记”过滤器的文本格式进行编辑，并插入一对开放和闭合标签，看看替换效果如何。\n\
  \n在开发自己的代码时，你肯定会遇到错误。我开发时就经常遇到。如果把开发过程中遇到的所有错误都列出来，这篇描述就没法看了，但你得做好修复错误的心理准备。能在屏幕上打印出错误信息是好的；它通常能准确告诉你哪里出了问题。如果出了错误但什么也没显示，排查起来可能更费时间，不过将部分代码提取到\
  \ `test.php` 文件中独立测试会有所帮助。最后值得一提的是，作者在开始编写这段代码时（甚至可以说在完成时），对过滤器表单保存系统和 `preg_replace()`\
  \ 函数都没有深入理解。但代码最终还是能正常运行。\n\n### 重命名你的模块\n\n你在这个模块上付出了很多心血。你应该把它分享出去，但 `dgd7_tip`\
  \ 这个名字实在不太好。\n\n在花费了令人尴尬的长时间思考可能的名称之后——`Tagfilter`？这个名字有点暗示它是一个过滤器模块。`Tagreplace`？`Reptags`？`Replacemarkup`？`Repmark`？`Remark`！使用\
  \ “remark” 这个项目命名空间很诱人，但还是把这个名称留给与英文单词 remark 相关的酷东西吧，而不是 “replacing markup”。这个模块将被命名为\
  \ `Remarkup`。\n\n有些集成开发环境提供了在多个文件中替换文本的工具，有些提供了重命名文件的工具，但通过命令行也能搞定。\n\n在搜索相关信息的帮助下——找到了\
  \ Drupal 手册页面“sed - 在单个或多个文件中替换文本”（`data.agaric.com/raw/sed-replace-text-multiple-files`）以及来自非\
  \ Drupal 站点 Debian Administration（`debian-administration.org/articles/150`）上的文章“轻松重命名多个文件”，你只需在终端中输入四行命令就能重命名你的模块，如列表\
  \ 33–38 所示。最后两条命令用于退出模块文件夹并重命名该文件夹。这些命令需要从存放你模块的目录开始执行。\n\n***列表 33–38.** 在多个文件中替换所有字符串出现位置并重命名文件的命令行步骤*\n\
  \n```\ncd sites/all/modules/custom\nsed -i 's/dgd7_tip/remarkup/g' *\nrename 's/dgd7_tip/remarkup/'\
  \ *\ncd ../\nmv dgd7_tip remarkup\n```\n\n这样做会更改每个函数名称以及你的 API 钩子名称（其中包含了你的模块名），这是为了避免命名空间冲突的最佳实践。你的模块名称保证是唯一的（如果与你在\
  \ `drupal.org` 上托管的项目同名的话），因此在钩子名称前加上模块名前缀有助于确保没有其他人将该钩子用于其他用途。这意味着一旦你在 `drupal.org`\
  \ 上托管了项目，重命名模块就是一件你不想做的事情。\n\n![images](img/square.jpg) **注意** 这体现了 Drupal 社区的力量：作者在谷歌上搜索“在多个文件中替换文本”时（未登录状态，理论上搜索结果是未定制的），第一个结果是\
  \ `drupal.org`。在他刚开始接触 Drupal 时，很多次针对通用网络相关任务的搜索，结果都会出现 Mambo（现为 Joomla）论坛的帖子；而现在，越来越多的结果是\
  \ Drupal 网站了。\n\n### 为管理页面条件性地引入样式表\n\n设置页面需要进行一些清理。用于向页面添加 CSS（区别于向所有页面添加，后者可通过模块或主题的\
  \ `.info` 文件实现）的函数是 `drupal_add_css()`。然而，有一种更好的、更符合 Drupal 7 风格的方式来条件性地引入 CSS，即当\
  \ CSS 与任何可渲染的元素（包括表单）相关时。这种方式就是 `#attached` 属性。\n\n![images](img/square.jpg) **注意**\
  \ 哪些是你应该熟知的，哪些是可以按需查询的，这两者之间并没有严格的界限。显然，你做得越多，熟知的东西就越多。作者几乎每次都需要把所有东西记录下来并查询一番，但大多数从事\
  \ Drupal 开发的人表现出更强的学习能力。\n\n`drupal_add_css()` 函数（该函数在 `#attached` 属性的内部实现中被使用）只应在没有可用的渲染数组来使用\
  \ `#attached` 属性时使用。`hook_help()` 的实现就是一个无法使用 `#attached` 的例子。在 Drupal 核心中，这两种方法都有大量的示例。你可以在\
  \ `api.drupal.org/drupal_add_css` 上看到该函数的示例，因为 `api.drupal.org` 网站会链接到函数的使用案例。跳过一些主题使用它的例子，来看看\
  \ block 模块是如何使用的：`api.drupal.org/block_admin_display_form`。这几乎和你想要的使用方式一模一样，就在显示管理表单的函数中！表单的顶部是：\n\
  \n```\n  drupal_add_css(drupal_get_path('module', 'block') . '/block.css');\n```\n\
  \n但是 Block 模块应该在返回的表单上使用 `#attached` 属性，而不是直接调用 `drupal_add_css()`。我为此向核心提交了一个问题（`drupal.org/node/1122584`）；列表\
  \ 33–39 展示了正确的做法。\n\n***列表 33–39.** 当包含可渲染元素的页面被查看时，使用 `#attached` 属性引入 CSS 文件*\n\
  \n```php\n/**\n * 标签过滤器的设置回调函数。\n */\nfunction _remarkup_settings($form, $form_state,\
  \ $filter, $format, $defaults) {\n  // 声明将持有我们设置表单元素的数组。\n  $settings = array();\n\
  \  // [此处省略其他已见过的代码...]\n  $settings['rm'] = array(\n    // [此处省略其他已见过的代码...]\n\
  \    // 添加 CSS 使 _remarkup_add_rm_formset() 的表单元素看起来美观。\n    '#attached' => array(\n\
  \      'css' => array(drupal_get_path('module', 'remarkup') . '/remarkup.css'),\n\
  \    ),\n  );\n  // [此处省略其他已见过的代码...]\n}\n```\n\n以这种方式附加的 CSS 文件不必很大，如列表 33–40 所示。\n\
  \n***列表 33–40.** remarkup.css 为 Remarkup 文本过滤器的设置表单提供样式*\n\n```css\n.remarkup-formset\
  \ .form-item {\n  display: inline-block;\n  padding: 0;\n  margin-bottom: 5px;\n\
  }\n\n.remarkup-formset {\n  margin-bottom: 10px;\n}\n```\n\n当有人查看文本格式设置页面时，这个 CSS\
  \ 文件会被附加，即使你并没有亲自定义那个页面。不过，仍然缺少一件重要的事情：需要应用此 CSS 的带有类名的 HTML 容器！\n\n\n\n### 添加带有指定类名的容器表单元素\n\
  \n最初，CSS 生效所需的`div`和类是通过标签上的`#prefix`属性添加的，代码行如下所示：\n\n```\n  $settings['rm'][$i]['tag']\
  \ = array(\n    '#prefix' => '<div class=\"remarkup-formset\">',\n    '#type' =>\
  \ 'textfield',\n```\n\n随后，在最终的标记表单元素上添加了对应的`#suffix`属性。这种方法虽然可行，但感觉不够优雅。通过查阅 Drupal\
  \ API 中关于表单生成的页面（`api.drupal.org/api/group/form_api`），在一长串专为表单设计的`theme_*`函数中，我们发现了`theme_container()`（`api.drupal.org/theme_container`）。它可以直接通过包含三个文本字段表单元素的元素的`#theme_wrappers`属性进行设置，如下所示：\n\
  \n```\n  $settings['rm'][$i] = array(\n    '#theme_wrappers' => array('container'),\n\
  \    '#attributes' => array('class' => array('remarkup-formset')),\n  );\n```\n\n\
  但在研究如何使用容器主题包装器时，发现了一个特别相关的示例：容器表单元素类型。你可以使用容器表单元素来编写更简洁的代码，并达到与上述方法相同的效果。清单 33–41\
  \ 将其完整呈现在一个函数中——该函数用于定义标签的字段组合及替换标记，可重复调用；现在已包裹在一个容器`div`中，并设置了展示尺寸。请注意，该函数此前名为`_dgd7_tip_add_rm_formset()`。\n\
  \n**清单 33–41.** *定义标签和替换标记的表单元素集合，现已包裹在容器 div 中并设置展示尺寸*\n\n```\n/**\n * 添加一组表单字段，用于添加新的标签和替换标记对。\n\
  \ */\nfunction _remarkup_add_rm_formset(&$settings, $i, $tag = '', $replace = array('before'\
  \ => '', 'after' => '')) {\n  $settings['rm'][$i] = array(\n    '#type' => 'container',\n\
  \    '#attributes' => array('class' => array('remarkup-formset')),\n  );\n  $settings['rm'][$i]['tag']\
  \ = array(\n    '#type' => 'textfield',\n    '#title' => t('Tag'),\n    '#maxlength'\
  \ => 64,\n    '#size' => 10,\n    '#default_value' => $tag,\n    '#element_validate'\
  \ => array('remarkup_rm_form_tag_validate'),\n  );\n  $settings['rm'][$i]['before']\
  \ = array(\n    '#type' => 'textfield',\n    '#title' => t('Before'),\n    '#maxlength'\
  \ => 1024,\n    '#size' => 45,\n    '#default_value' => $replace['before'],\n  );\n\
  \  $settings['rm'][$i]['after'] = array(\n    '#type' => 'textfield',\n    '#title'\
  \ => t('After'),\n    '#maxlength' => 1024,\n    '#size' => 45,\n    '#default_value'\
  \ => $replace['after'],\n  );\n}\n```\n\n借助 CSS 文件、其附件以及用于添加表单元素集合的函数扩展，Remarkup\
  \ 的设置看起来相当不错。图 33–8 展示了其中一组已填写的标签和标记对，以及另一组空白对。\n\n![images](img/3308.jpg)\n\n**图\
  \ 33–8.** *设置表单，每行包含三个表单元素，使用 CSS 和包裹的 HTML 元素*\n\n### 在 Drupal.org 上分享你的模块\n\n\
  与`Gitorious.org`或`GitHub.com`类似，`drupal.org`允许每位用户创建沙盒，申请流程仅需接受相关准则。对于`drupal.org`而言，这主要指同意仅发布\
  \ GPL 代码。（如果你尚未获得在`drupal.org`上创建完整命名空间项目的权限，将代码发布到沙盒仍是第一步。即使已被授予将沙盒升级为完整项目的权限，沙盒项目仍然是尽早分享工作的最佳起点——它甚至自带问题队列。尽管如此，将代码作为正式发布的项目放在`drupal.org`上，仍然能够有效吸引用户和审阅者的关注。）\n\
  \n在接受了 Drupal Git 策略并将公钥添加到你的`drupal.org`账户后，你可以创建一个沙盒项目并将模块仓库推送到那里（见清单 33–42 和\
  \ 33–43）。\n\n![images](img/square.jpg) **提示** UNIX 类计算机或虚拟机上用户的公钥通常位于用户`.ssh`文件夹中的`id_rsa.pub`文件（`less\
  \ ~/.ssh/id_rsa.pub`），必要时可通过`ssh-keygen`创建公私钥对。参见`drupal.org/node/1027094`。\n\n\
  **清单 33–42.** *将代码作为完整项目推送到 git.drupal.org 的命令行步骤*\n\n```\ngit checkout master\n\
  git remote add origin mlncn@git.drupal.org:project/remarkup.git\ngit push origin\
  \ master\ngit branch 7.x-1.x\ngit push origin master:7.x-1.x\ngit checkout 7.x-1.x\n\
  ```\n\n**清单 33–43.** *通过 add、commit 和 push 分享新修改*\n\n```\ngit add .\ngit commit\
  \ -m \"Include form CSS with #attached instead of drupal_add_css().\"\ngit push\n\
  ```\n\n关于在`drupal.org`上分享项目的更多内容（包括使用 Git 沙盒），请参见第 37 章。\n\n### 贡献模块的尾声\n\n在构建此模块时，你做出了许多妥协，但你也确保了一些核心事项的正确性：\n\
  \n- 它拥有 API。\n- 它拥有用户界面。\n\n通过超越眼前的需求——并提供无需修补即可扩展模块的 API——你大大增加了人们使用该模块的可能性，也稍微增加了有人接替你继续维护的机会。\n\
  \n即使你跳过为网站管理员构建用户界面和为模块开发者构建 API 这一步，分享你的模块仍是一个好主意：`git.drupal.org`提供了沙盒，供你分享不一定打算长期维护的代码。\n\
  \n![images](img/square.jpg) **注意** 本节开发的模块源代码可在`drupal.org/project/remarkup`获取。\n\
  \n\n\n### 创建使用你 API 的站点专用模块\n\n等等，除了制作一个他人可能觉得有用的模块之外，你自己难道没有一些目标吗？\n\n现在是时候编写利用你所建模块的站点专用代码了。得益于你已完成的所有工作，你的胶水代码模块可以非常小巧，如清单\
  \ 33-44 所示。\n\n***清单 33-44.** 为 Remarkup 钩子定义自定义实现的一种低效且易出错的方法*\n\n```\n/**\n *\
  \ 实现 hook_remarkup_defaults()。\n */\nfunction dgd7_remarkup_defaults() {\n  return\
  \ array(\n    '[/tip]' => array(\n      'before' => '<div class=\"dgd7-featured\
  \ dgd7-tip\"><span class=\"featured-name\"><span\n class=\"leading-square\">T</span>ip</span>',\n\
  \      'after' => '</div>',\n    ),\n    '[/reality]' => array(\n      'before'\
  \ => '<div class=\"dgd7-featured dgd7-tip\"><strong class=\"dgd7-name\">\nReality</strong>',\n\
  \      'after' => '</div>',\n    ),\n  );\n}\n```\n\n但这种方法会因重复的 HTML 代码而引入不一致性。即使是在执行非常简单的数据提供步骤时，你仍可以自动化处理，如清单\
  \ 33-45 所示。\n\n***清单 33-45.** 实现钩子以提供默认的 Remarkup，并抽象出重复代码*\n\n```\n/**\n * 实现 hook_remarkup_defaults()。\n\
  \ */\nfunction dgd7glue_remarkup_defaults() {\n  $rm = array();\n  // 定义简单的提示类替换，包含机器名和可读名称。\n\
  \  $tips = array(\n    'tip' => t('Tip'),\n    'note' => t('Note'),\n    'hint'\
  \ => t('Hint'),\n    'reality' => t('Reality'),\n    'caution' => t('Caution'),\n\
  \    'gotcha' => t('Gotcha'),\n    'new' => t('New in 7'),\n  );\n  foreach ($tips\
  \ as $type => $name) {\n    $rm['[/' . $type . ']'] = array(\n      'before' =>\
  \ '<div class=\"dgd7-featured dgd7-' . $type . '\">\n<strong class=\"dgd7-name\"\
  >' . $name . '</strong>',\n      'after' => '</div>',\n    );\n  }\n  return $rm;\n\
  }\n```\n\n这样，即使不更简单，也能确保用于提示、注释、提醒等功能的 HTML 代码保持一致性。\n\n**注意事项** 别忘了 `return` 语句；除非实现的是通过引用接收数据的钩子，否则这一点相当重要。钩子系统通常很健壮，不会因为未收到响应而报错。因此，当你的钩子实现似乎没有效果时，首先要查找底部是否有\
  \ `return $data` 语句！\n\n现在你可以在模块中为此默认标记提供 CSS。将 CSS 保存到一个文件中，比如 `dgd9781430231356.css`，并放置在\
  \ `dgd7glue` 模块目录下。此处我不再占用篇幅展示 CSS 代码；它位于 `dgd7.org/other90` 的项目代码中，你也可以像在任何网站上一样，通过浏览器的“查看源代码”选项或\
  \ Firebug 等工具来查看 CSS。\n\n别忘了让你的自定义模块的 `.info` 文件保持最新，如清单 33-46 所示。\n\n***清单 33-46.**\
  \ 向 `dgd7glue.info` 添加依赖项和样式文件*\n\n```\nname = DGD7 Glue Code\ndescription = [dgd7glue]\
  \ 为 DefinitiveDrupal.org 提供的站点专用自定义代码。\npackage = Custom\nversion = 7.x-1.0\ncore\
  \ = 7.x\ndependencies[] = remarkup\nstyles[] = dgd9781430231356.css\n```\n\n###\
  \ 收获\n\n启用这两个模块。现在你需要编辑要使用的文本格式，例如在 `admin/config/content/formats/filtered_html`\
  \ 编辑“过滤后的 HTML”，在 `admin/config/content/formats/full_html` 编辑“完整 HTML”。\n\n**注意事项**\
  \ 由替换标记默认值钩子实现提供的新标签和标记对，在编辑文本格式并导入你的默认设置并保存之前不会生效。\n\nRemarkup 当前实现其默认值钩子的方式，是真正的默认值——在你保存文本格式表单的那一刻，你提供的值就会被保存到数据库中。你添加的新默认标签会被注意到，但已经保存过一次的默认值的更新将不会被识别。可以实现类似\
  \ CTools 的导出功能，以便轻松地在代码中进行更新，但这并非本章要涵盖的问题。事实上，如果你有这方面的需求，可以到 Remarkup 队列（`drupal.org/project/issues/remarkup`）提交一个议题，甚至提供一个补丁！（如第\
  \ 38 章等处所述，补丁是以易于应用的文件形式提供的、对现有代码的修改代码贡献。）\n\n### 为输出添加自定义标记\n\n框架搭建好后，你可以根据需要添加新的标签和替换标记定义，如清单\
  \ 33-47 所示。\n\n***清单 33-47.** 用于文本文件、PHP 代码和命令行步骤的附加 Remarkup 定义*\n\n```\nfunction\
  \ dgd7glue_remarkup_defaults() {\n  $rm = array();\n// 已移除的代码，请参见上方上下文。\n  // 一些规则是独特的。\n\
  \  $rm['[/file-txt]'] = array(\n      'before' => '<code>',\n      'after' => '</code>',\n\
  \  );\n  // 需要 codefilter 模块，并将其过滤器设置为在 remarkup 之后运行。\n  $rm['[/file-php]'] = array(\n\
  \      'before' => '<?php',\n      'after' => '?>',\n  );\n  $rm['[/cli]'] = array(\n\
  \    'before' => '<h4>命令行步骤</h4>\n    <tt>',\n    'after' => '</tt>',\n  );\n  return\
  \ $rm;\n}\n```\n\n### 制作模拟图书导航的“上一页”和“下一页”链接\n\n当查看可被视为系列文章一部分的单个帖子时（博客文章、新闻文章、特色简介），为读者提供直接跳转到下一篇或上一篇的途径是一种良好的用户体验，而且非常贴心，无需返回列表页面。为了逐个审阅提交到\
  \ `dgd7.org` 网站的所有建议，“上一页”和“下一页”链接按钮几乎是绝对必要的需求。\n\n这可以在主题中实现，但能够移动到下一个项目更多是功能性的问题，而非呈现的问题，因此需要模块来处理。此外，在模块中还可以制作出更可复用的解决方案。\n\
  \n搜索“*Drupal 7 上一篇下一篇链接”* 及相关关键词，结果发现了几个项目，但全部都是 Drupal 6 的。作者在 Drupal 6 中未曾使用过\
  \ `custom_pagers`，也无法从其进行中的 Drupal 7 移植版（撰写本文时在 GitHub 上）中完全理解其功能。它允许在分页器管理中使用 PHP\
  \ 和 Views，但似乎是从自定义表中调用 SQL 来执行查询——即，在 SQL 中存储 SQL。对于仅需查看上一篇和下一篇建议这种简单的用例来说，移植它显然是一个重量级的方案。编写自定义代码似乎是一个合理的选择。\n\
  \n\n\n#### 提取信息\n\n你可以查阅 `api.drupal.org/node.api.php`，并确定使用 `hook_node_view()`\
  \ 来为选定的节点添加上一篇和下一篇链接。下一步是了解如何获取这些链接。将 Devel 模块的 `dpm()` 函数放入 `hook_node_view()`\
  \ 的实现中——对于本章全程使用的站点特定模块，该函数名应为 `dgd7glue_node_view()`——这将显示你可用的数据。查阅数据库层手册，可以找到静态查询方法，例如\
  \ `->fetchAssoc()` 用于将结果作为数组返回，相关示例位于 `drupal.org/node/310072`。\n\n![images](img/square.jpg)\
  \ **注意**：如果不使用 Devel 的 `dpm()`，请注意，由于 Drupal 有些古怪，在 `hook_node_view()` 的实现中调用 `debug($node)`\
  \ 是无效的。在多个地方，例如加载分类术语实体时，Drupal 的递归会引爆 `debug()` 默认使用的 `var_export()` 函数。你可以改为调用\
  \ `debug()`，并将其可选的第三个参数（第二个参数是标签）设置为 `TRUE`，这将使其使用更不易崩溃的 `print_r()` 函数，例如 `debug($node,\
  \ 'Node when viewed', TRUE);`。\n\n基于收集到的信息，你可以快速创建一个概念验证。请注意，虽然清单 33–48 中的代码测试了两件不同的事情，但它们是独立测试的。它没有尝试查询数据库并使用结果向节点添加文本，因为如果那样做不成功，你无法立即知道问题出在哪里。同时执行这两步可以等到你确定它们各自都能正常工作之后再进行。现在，先使用调试函数显示查询结果，并添加直接标记。\n\
  \n***清单 33–48.** 用于查询数据库并向节点显示添加文本的概念验证代码（包含非跨数据库兼容的 LIMIT 函数）*\n\n```\n/**\n *\
  \ 实现 hook_node_view()。\n */\nfunction dgd7glue_node_view($node, $view_mode, $langcode)\
  \ {\n  // 在建议节点页面上显示上一页/下一页链接。\n  if ($node->type == 'suggestion' && $view_mode\
  \ == 'full') {\n    $markup = 'i can print something';\n    $next = db_query('SELECT\
  \ title, nid FROM {node} WHERE nid > :nid AND status =![images](img/U002.jpg)\n\
  \ 1 LIMIT 1', array(':nid' => $node->nid))->fetchAssoc();\n    debug($next, 'next');\
  \ // 查询正常工作\n    $node->content['dgd7glue_prevnext'] = array(\n      '#markup' =>\
  \ $markup,\n      '#weight' => 100,\n    );\n  }\n}\n```\n\n清单 33–48 中的代码打印了查询结果中的一个节点\
  \ ID 和标题，以及分配给 `#markup` 的静态文本。它显示了查询可以运行，并且你可以向节点的显示中添加内容。它仍然需要更新，以运行一个仅显示“建议”内容的过滤查询，并且输出需要基于此结果，但概念已被验证。\n\
  \n在使其正确工作的同时，查询还应做到跨浏览器兼容。你可能隐约记得，`LIMIT` 并非 SQL 中所有类型数据库都能以标准方式工作的部分，并且 Drupal\
  \ 提供了一些帮助来避免此问题。在 Drupal 核心模块目录中搜索 `LIMIT` 发现，除了测试文件中一个被注释掉的查询外，没有在 SQL 查询中使用它。结论：在\
  \ SQL 中使用 `LIMIT` 并非最佳实践。搜索小写的 `limit`，以查看代码注释或提及“限制”的地方，会找到很多结果，包括 `modules/user/user.install`\
  \ 中的这个查询，如清单 33–49 所示。\n\n***清单 33–49.** `user.install` 中包含文本 `Limit` 的查询*\n\n```\n\
  $result = db_query_range('SELECT f.*, u.uid as user_uid FROM {users} u INNER JOIN![images](img/U002.jpg)\n\
  \ {file_managed} f ON u.picture = f.fid WHERE u.picture <> 0 AND u.uid > :uid ORDER\
  \ BY![images](img/U002.jpg)\n u.uid', 0, $limit, array(':uid' => $sandbox['last_uid_processed']))->fetchAllAssoc('fid',![images](img/U002.jpg)\n\
  \ PDO::FETCH_ASSOC);\n```\n\n这给了你想要的函数 `db_query_range()`，并且也清楚地展示了如何使用它。你可以在 `api.drupal.org/db_query_range`\
  \ 查阅更多相关信息。它还使用了 `->fetchAllAsoc()` 方法，将结果的所有行一次性作为嵌套关联数组返回。\n\n从概念验证过渡到可工作的自定义代码需要一些重要但并不复杂的改动。这段代码仍然没有泛化，但这次它本就不是一个贡献模块；它是站点特定的代码。在清单\
  \ 33–50 的代码中第二个定义的 `dgd7glue_nextprev_suggestion()` 函数，执行查询并返回一个包含节点 ID 和标题的数组。在这个数组的下一行，添加了一个值为\
  \ `'Next >'` 或 `'< Prev'` 的 `text` 键。\n\n***清单 33–50.** 在建议节点页面上创建并显示上一页和下一页链接*\n\
  \n```\n/**\n * 实现 hook_node_view()。\n */\nfunction dgd7glue_node_view($node, $view_mode,\
  \ $langcode) {\n  // 在建议节点页面上显示上一页/下一页链接。\n  if ($node->type == 'suggestion' &&\
  \ $view_mode == 'full') {\n    $markup = '';\n    $next = dgd7glue_nextprev_suggestion($node->nid);\n\
  \    $next['text'] = t('Next >');\n    $prev = dgd7glue_nextprev_suggestion($node->nid,\
  \ TRUE);\n    $prev['text'] = t('< Prev');\n    $markup .= '<div class=\"nextprev\"\
  >';\n    $markup .= dgd7glue_format_link($prev);\n    $markup .= ' | ';\n    $markup\
  \ .= dgd7glue_format_link($next);\n    $markup .= '</div>';\n    $node->content['dgd7glue_prevnext']\
  \ = array(\n      '#markup' => $markup,\n      '#weight' => 100,\n    );\n  }\n\
  }\n\n/**\n * 获取下一个或上一个建议节点的 nid 和标题。\n */\nfunction dgd7glue_nextprev_suggestion($nid,\
  \ $previous = FALSE) {\n  // 设置 ORDER BY 方向和比较运算符 ($co)。\n  if ($previous) {\n \
  \   $direction = 'DESC';\n    $co = '<';\n  }\n  else {\n    $direction = 'ASC';\n\
  \    $co = '>';\n  }\n  return db_query_range(\"SELECT title, nid FROM {node} WHERE\
  \ nid $co :nid AND type =![images](img/U002.jpg)\n :type AND status = :status ORDER\
  \ BY nid $direction\", 0, 1, array(':nid' => $nid, ':type' =>![images](img/U002.jpg)\n\
  \ 'suggestion', 'status' => 1))->fetchAssoc();\n}\n\n/**\n * 格式化一个上一页/下一页链接。\n */\n\
  function dgd7glue_format_link($link) {\n  return l($link['text'], 'node/' . $link['nid'],\
  \ array('attributes' => array('title' =>![images](img/U002.jpg)\n $link['title'])));\n\
  }\n```\n\n从查询中获取数组的方法是使用 `->fetchAssoc()`，因为查询总是只返回一条记录：无需一次性获取所有记录（也无需迭代）。在将代码添加到\
  \ `dgd7glue.module` 后，需要在线上站点运行 `drush cc all`，或访问 `admin/config/development/performance`\
  \ 点击“清除所有缓存”按钮，才能使上一页/下一页链接显示出来。Drupal 的缓存机制相当激进！\n\n这对大多数建议帖子都有效，但它没有处理系列中第一个和最后一个节点。让我们看看查询返回的数组为空时是什么样子。（同样，查询被封装在\
  \ `dgd7glue_nextprev_suggestion()` 函数中，但在函数内部，是 `db_query_range()` 函数直接通过 `->fetchAssoc()`\
  \ 方法返回结果。）紧接着它，你可以添加一条 `debug($prev);` 语句。\n\n如果你访问节点 90，这是创建的第一个建议（从线上数据库导入，或者你也可以自己创建一个示例），地址是\
  \ `http://dgd7.localhost/node/90`。\n\n查看此页面时，消息区域的输出为：\n\n```\nDebug:\nfalse\n```\n\
  \n这使得测试变得非常容易。如果有返回值，就打印链接；如果没有，则不打印。这最好在显示层解决，现在是时候重新审视主题化了。当前的方法虽然简单，但与站点上的其他内容不一致。\n\
  \n\n\n"
- "# 使用 Book 模块模板显示非图书导航\n\n该网站已经使用 Book 模块来展示章节大纲，因此借用该导航功能会是个好主意。\n\n![images](img/square.jpg)\
  \ **注意** 这个想法听起来不错，但实际上可能并非如此——不过它仍然可行。\n\n查看`modules/book`目录。其中有一个名为`book-navigation.tpl.php`的模板文件。（没有双连字符，因为这不是对图书内容类型的建议，而是其自身的导航模板，该模板被整合到启用了大纲的节点的显示中。）在`book.module`中，使用图书导航模板`book-navigation.tpl.php`的代码行位于`hook_node_view()`的实现`book_node_view()`中，如清单\
  \ 33-51 所示。\n\n***清单 33-51.** 调用 book-navigation.tpl.php 文件并将其`$node->book`数组传递给它*\n\
  \n```\n$node->content['book_navigation'] = array(\n  '#markup' => theme('book_navigation',\
  \ array('book_link' => $node->book)),\n  '#weight' => 100,\n);\n```\n\n关键行是`#markup`行。对于非图书页面，您不会有`$node->book`，但您可以构造一些能实现相同功能的内容。您可以在`book-navigation.tpl.php`中看到需要提供哪些变量来匹配`$node->book`数组。\n\
  \n![images](img/square.jpg) **提示** 为了结束本章，我不会展示最终解决方案之前尝试过的许多错误和不当路径。如需查看其中一些内容，请访问`dgd7.org/230`。\n\
  \n函数`template_preprocess_book_navigation()`（参见`api.drupal.org/template_preprocess_book_navigation`）负责为`book-navigation.tpl.php`模板准备变量，而您需要替换该函数。可以实现`hook_theme_registry_alter()`来告知\
  \ Drupal 进行这样的替换。最终结果是可以获取基本的上一页和下一页数据，并将其传递给 Book 模块的主题模板，同时填充所有必要的变量以供显示；参见清单\
  \ 33-52。\n\n***清单 33-52.** 修改后的 hook_node_view 实现、注册表修改以及它允许您替换的 template_preprocess_book_navigation.tpl.php*\n\
  \n```\n/**\n * Implements hook_node_view().\n */\nfunction dgd7glue_node_view($node,\
  \ $view_mode, $langcode) {\n  // Print prev/next links on Suggestion node pages.\n\
  \  if ($node->type == 'suggestion' && $view_mode == 'full') {\n    $next = dgd7glue_nextprev_suggestion($node->nid);\n\
  \    $prev = dgd7glue_nextprev_suggestion($node->nid, TRUE);\n    // Make a fake\
  \ book link array.\n    $link = array();\n    $link['dgd7glue'] = TRUE;\n    $link['prev']\
  \ = $prev;\n    $link['next'] = $next;\n    $node->content['dgd7glue_prevnext']\
  \ = array(\n      '#markup' => theme('book_navigation', array('book_link' => $link)),\n\
  \      '#weight' => 100,\n    );\n  }\n}\n\n/**\n * Implements hook_theme_registry_alter().\n\
  \ */\nfunction dgd7glue_theme_registry_alter(&$theme_registry) {\n  // Replace the\
  \ default preprocess function with our own.\n  foreach ($theme_registry['book_navigation']['preprocess\
  \ functions'] as $key => $value) {\n    if ($value == 'template_preprocess_book_navigation')\
  \ {\n      $theme_registry['book_navigation']['preprocess functions'][$key] =\n\
  \  'dgd7glue_template_preprocess_book_navigation';\n      // Once it's found it\
  \ we're done.\n      break;\n    }\n  }\n}\n\n/**\n * Replaces template_preprocess_book_navigation()\
  \ when using tpl for non-books.\n */\nfunction dgd7glue_template_preprocess_book_navigation(&$variables)\
  \ {\n  if (!isset($variables['book_link']['dgd7glue'])) {\n    // This is a normal\
  \ book, just use the usual function.\n    template_preprocess_book_navigation($variables);\n\
  \    return;\n  }\n  // Use our fake book_link variable to provide all the same\
  \ variables.\n  $link = $variables['book_link'];\n  $variables['book_id'] = 'dgd7glue-nextprev';\n\
  \  $variables['book_title'] = t('Suggestions');\n  $variables['book_url'] = url('suggestions');\n\
  \  $variables['current_depth'] = 0;\n  $variables['tree'] = '';\n  $variables['has_links']\
  \ = TRUE;\n  $variables['prev_url'] = NULL;\n  $variables['next_url'] = NULL;\n\
  \  if ($link['prev']) {\n    $prev_href = url('node/' . $link['prev']['nid']);\n\
  \    drupal_add_html_head_link(array('rel' => 'prev', 'href' => $prev_href));\n\
  \    $variables['prev_url'] = $prev_href;\n    $variables['prev_title'] = check_plain($link['prev']['title']);\n\
  \  }\n\n  $parent_href = $variables['book_url'];\n  drupal_add_html_head_link(array('rel'\
  \ => 'up', 'href' => $parent_href));\n  $variables['parent_url'] = $parent_href;\n\
  \  $variables['parent_title'] = $variables['book_title'];\n\n  if ($link['next'])\
  \ {\n    $next_href = url('node/' . $link['next']['nid']);\n    drupal_add_html_head_link(array('rel'\
  \ => 'next', 'href' => $next_href));\n    $variables['next_url'] = $next_href;\n\
  \    $variables['next_title'] = check_plain($link['next']['title']);\n  }\n}\n```\n\
  \n`dgd7glue_nextprev_suggestion()`函数与之前介绍时相同——其余大部分内容都是新的或已修改的！\n\n![images](img/square.jpg)\
  \ **注意** 依赖 Book 模块提供的函数意味着您应该将 Book 模块作为要求添加到您的`.info`文件中，即在您的`dgd7glue.info`文件中添加以下行：\n\
  \n```\ndependencies[] = book\n```\n\n## 配置清理\n\n虽然您没有使用视图来获取上一页和下一页链接，但您需要创建一个视图来显示建议（在幕后构建）。为此视图，您需要添加一个按节点\
  \ ID 排序的条件。其配置页面如图 33-9 所示。\n\n![images](img/3309.jpg)\n\n***图 33-9.** 按节点 ID 降序排列的建议视图*\n\
  \n\n\n### 创建视图以使用户页面拥有可拼接 URL\n\n为了实现可拼接的 URL（即通过删除 URL 中 `/` 之后的所有部分来浏览网站的能力），你可以使用\
  \ `Pathauto` 模块（`drupal.org/project/pathauto`）为所有用户路径设置一个合理的前缀，然后在该前缀下提供所有用户的视图。请注意，`Pathauto`\
  \ 设置隐藏在管理![images](img/U001.jpg)配置![images](img/U001.jpg)搜索和元数据![images](img/U001.jpg)URL\
  \ 别名下的一个名为**模式**（`admin/config/search/path/patterns`）的选项卡中。用户账户页面路径的模式位于页面靠下的位置。\n\
  \n本着极度乐观的精神，假设在网站上注册的每个人都在阅读本书，因此将用户路径的前缀设置为 `readers`，后跟一个斜线分隔符和用户名的令牌：`readers/[user:name]`。这样，名为\
  \ Dries Buytaert 的用户账户路径将是 `readers/dries-buytaert`。要使此功能对已存在于网站上的用户也生效，请前往路径配置（`admin/config/search/path/update_bulk`）的**批量更新**选项卡，勾选**用户路径**，然后点击更新。\n\
  \n该路径别名并不会使 `readers` 路径真正存在。如果你访问 `readers`，将会看到*页面未找到*。为了改善用户体验并满足你作为 Web 开发者的风水感，你需要在这个路径下放置一些有意义的内容，例如所有用户的列表。\n\
  \n在 `admin/structure/views/add` 创建一个新视图，并且这次，告诉向导**显示**用户。\n\n![images](img/square.jpg)\
  \ **提示** 在创建用户（或任何）视图之前，检查一下 `Views` 是否已提供一个默认视图来大致或精确地完成你想要的功能。没有默认的基于用户的视图，但有接管\
  \ Drupal 核心功能的视图，例如基于评论的视图和获取分类术语 ID 的基于节点的视图。\n\n为你的页面显示设置路径为 `readers`，显示格式或许选择\
  \ HTML 列表（此格式或未格式化格式需要主题化；网格格式可能无需主题化就看起来不错）。将每页显示项目数设为一个较大的数字，例如 50。在你点击继续并编辑之后，可以将过滤器保留为用户：活跃：是，并添加字段：用户：头像以及用户：名称。取消选中**创建标签**选项，这样就不会显示标签。\n\
  \n无论你是否想为用户视图创建菜单项，如果有人将用户 URL 从 `readers/john-smith` 截断为 `readers`，就像他们将别名为 `suggestions/installing-drubuntu`\
  \ 的建议路径的 URL 截断为 `suggestions` 一样，他们将看到一个合理的列表，而不是页面未找到。这是一个小细节，却能让网站看起来完整而合理。\n\
  \n### 结语\n\n将本章命名为“完成一个网站”有点误导。只要你拥有一个 Drupal 网站，工作就不会完成。Drupal 网站是关于活跃社区的，它们随着内容管理员和用户贡献的信息而呼吸。他们迟早会想要新功能。如果确实没有人使用你的网站，如果访问者只是浏览它，请将其导出为静态\
  \ HTML。关于使贡献代码保持最新的最低要求，请参阅第 7 章；关于部署新功能，请参阅第 13 章；并订阅 `dgd7.org/signup` 以了解如何将新功能添加到\
  \ DefinitiveDrupal.org 网站！\n\n![images](img/square.jpg) **提示** 与本章直接相关的讨论和更新将在 `dgd7.org/other90`\
  \ 进行。\n\n## 第 34 章\n\n![images](img/squ.jpg)\n\n## Drupal 发行版和安装配置文件\n\n作者：Florian\
  \ Lorétan\n\n安装配置文件是 Drupal 模块和主题的列表，配合自动配置，让你能够快速轻松地创建一个功能齐全的网站或开发测试平台。它们被打包在发行版中，发行版会指导你完成安装并提供网站代码。例如，默认的\
  \ Drupal 发行版附带两个配置文件：标准配置文件和最小配置文件。标准配置文件启用了一组对大多数网站有用的模块和配置；它还包含一些占位内容和对新用户探索 Drupal\
  \ 功能有帮助的示例。最小配置文件只安装 Drupal 运行所需的最基本的模块和配置；它推荐给那些确切知道新网站需要哪些模块的人。\n\n配置文件也是很好的学习资源。如果你想构建一个网站但不确定如何开始，配置文件可以为你打下很多基础，从而使你能够专注于新功能。配置文件也使用了各种各样的模块和配置选项；如果你找到一个提供了你喜欢的功能的配置文件，研究它如何实现该功能是个好主意。你可以在\
  \ [`http://drupal.org/project/installation+profiles`](http://drupal.org/project/installation+profiles)\
  \ 或从其各自的提供商网站发现更多配置文件。\n\n### 网站模板\n\n当你需要创建许多非常相似的网站时，例如为企业或学术部门，配置文件可以为每个网站提供标准功能和主题，从而以极少的努力启动新网站。\n\
  \nDrupal Gardens ([`http://drupalgardens.com`](http://drupalgardens.com)) 是一个用于快速构建和设计网站及微网站的托管服务。它提供免费和付费订阅功能、一个强大的主题构建器以及越来越多的功能。\n\
  \n你可以选择将你的 Drupal Gardens 网站导出为一个完全打包和配置好的 Drupal 安装。该服务还允许你克隆网站，复制主题、配置和选定内容。这使你能够快速原型化或模板化多种类型的网站。你也可以通过构建一个\
  \ Gardens 网站来实现你想要的，然后导出并研究其配置，从而研究如何在你自己的网站上实现某些功能。\n\n例如，Drupal Gardens 提供了一个模板，你可以通过几次点击设置一个博客。如果你熟悉核心\
  \ Drupal 博客模块的工作原理，你可能会注意到在浏览 Drupal Gardens 博客时的一些不同行为。例如，每个博客节点底部的链接可能链接回全站博客，而不是单个作者的博客，这对于只有一个作者的博客来说很方便。这是如何实现的？\n\
  \n在配置菜单下，有一个博客设置选项在 `/admin/config/content/blog` 控制此项。要查看 Gardens 如何管理这些更改，请从 `/admin/config/system/site-export`\
  \ 导出网站，获取网站存档，并检查代码。\n\n找出某事物如何工作的一个好方法是搜索代码库中你在用户界面中看到与之相关的文本字符串。表单上的帮助文本或标签通常效果很好，配置屏幕的菜单路径也是如此。这种方法的一个警告是，代码中的字符串可能使用了占位符，因此如果你搜索看起来动态的文本——例如，包含用户名的内容——最好搜索周围的文本或同一页面上看起来是静态的内容。\n\
  \n在这种情况下，要搜索菜单路径，在导出的文档根目录中运行以下代码：\n\n```\n> grep -ri 'admin/config/content/blog'\
  \ *\n```\n\n它应该返回一个结果：\n\n`sites\\all\\modules\\flexible_blogs\\flexible_blogs.module`\n\
  \n所以这就是引起这些变化的模块，但它如何工作呢？该模块提供了几个钩子的好例子，不同的链接行为是在 `hook_node_view_alter()` 的实现中处理的。当你着手创建自己的网站和配置文件时，检查他人如何实现与你类似的目标通常是一个有用的起点。也许你会发现你需要的代码已经写好了。\n\
  \n\n\n#### 全功能发行版\n\n通过安装配置文件，你可以轻松提供原本需要大量时间安装和配置的服务。本章后续将讨论的 Drune 音乐播放器，就是由发行版提供的服务示例。\n\
  \nDrupal Commons (`acquia.com/products-services/drupal-commons`) 是一款基于 Drupal 发行版构建的社交商业软件。它旨在帮助公司及组织快速创建针对性的社交网络或沟通平台。Drupal\
  \ Commons 由 Acquia 专门打造，作为商业闭源社交商业提供商的开源替代方案。\n\n你可以使用并研究的 Drupal Commons 特性包括：由\
  \ `Homebox` 模块提供的个性化仪表盘，以及由 `Heartbeat` 模块提供的实时成员活动流。Commons 还提供了 `User Relationships`\
  \ 模块与 `Rules` 模块的集成，这是如何同时使用这两个模块 API 的绝佳示例。与 Open Atrium 类似，Drupal Commons 使用了\
  \ `Organic Groups` 和 `Features`；对比它们的配置，能让你获得关于如何在你自己的站点或配置文件中管理和配置这些模块的不同思路。\n\n\
  #### 开发配置\n\n如果你正在开发自己的模块或功能，可以创建一个安装配置，让你能瞬间轻松搭建一个合适的测试站点。其中包含下载所需贡献模块和外部库的脚本，并设置一些合理的默认字段和配置。\n\
  \n`Media` 模块 (`drupal.org/project/media`) 提供了将图片插入富文本或所见即所得编辑器、批量上传文件、拉取外部视频以及众多其他媒体管理任务的工具。Media\
  \ 的开发配置文件 ([`http://drupal.org/project/media_dev`](http://drupal.org/project/media_dev))\
  \ 为有兴趣为 Media 项目做贡献的开发者搭建了一个 Drupal 安装环境。由于 Media 是一个复杂且抽象的项目，该发行版会创建一些示例图片和音频文件，为其他开发者提供具体的可操作示例。\n\
  \n`Feeds` 模块 (`drupal.org/project/feeds`) 允许你向站点导入或聚合数据。它还有一个专注于测试的开发配置文件 (`drupal.org/project/feeds_test`)。借助它，项目的贡献者可以轻松地通过\
  \ Simpletest 测试套件运行他们的更改，第 23 章 将对此进行更详细的介绍。\n\n如果你有一个模块或其他项目希望向社区寻求帮助，可以考虑创建一个开发安装配置。你让人们贡献的门槛越低，你收获的贡献就越多。此外，如果你以后想尝试项目的某个分支，或者需要在非自己的电脑上工作，也能轻松搭建出合适的环境。本章稍后将讨论一个开发配置的示例。\n\
  \n#### 一个示例发行版：Drune\n\n我们不会使用泛泛的示例，而是将用一个贯穿本章各节的示例发行版：Drune。Drune 是一个基于 Drupal\
  \ 构建的网页版音乐播放器，让用户能从他们的浏览器中收听音乐（见图 34-1）。关于 Drune 的更多信息可在 `drune.org` 找到。\n\n![images](img/3401.jpg)\n\
  \n***图 34-1.** Drune 网页版音乐播放器*\n\n### 创建安装配置文件\n\n用户在安装 Drupal 7 时看到的第一个页面，就是选择标准安装或最小安装（见图\
  \ 34-2）。如前所述，标准安装会创建一个具有通用配置的网站，以便用户快速上手。最小安装包含必要的最少设置，适用于确切知道自己想要什么的进阶用户。这两个选项就是\
  \ Drupal 核心自带的安装配置文件。\n\n![images](img/3402.jpg)\n\n***图 34-2.** 安装配置文件选择表单*\n\n\
  除了内置的安装配置文件，你还可以创建自己的配置文件。这个安装配置文件将负责为你的发行版设置初始配置，同时负责引导用户完成安装过程，并根据需要收集用户输入。\n\n\
  #### 安装配置文件的结构\n\n安装配置文件的结构与模块类似。你需要在 `profiles` 文件夹内创建一个新文件夹，该文件夹至少包含以下两个文件：\n\n\
  *   `profilename.info` 包含元数据，如名称、描述和依赖项。\n*   `profilename.profile` 是一个 PHP 文件，包含安装配置文件本身的代码。\n\
  \n请注意，`“profilename”` 需要替换为安装配置文件的名称。在示例中，你将拥有两个名为 `drune.info` 和 `drune.profile`\
  \ 的文件。\n\n![images](img/square.jpg) **提示** 开发安装配置文件是一个迭代过程，因此你可能需要多次运行安装程序，直到一切完全正确。为了在重新运行安装程序时节省时间，请使用\
  \ `drush site-install` 命令；它允许你通过命令行运行整个安装过程。\n\n##### drune.info\n\n`profilename.info`\
  \ 文件包含了关于安装配置文件的关键元数据。你的 `drune.info` 文件内容如下：\n\n```\ncore = 7.x\nname = Drune\n\
  description = 一个基于 Drupal 构建的网页版音乐播放器。\nfiles[] = drune.profile\ndependencies[]\
  \ = dblog\ndependencies[] = features\ndependencies[] = drune_track\ndependencies[]\
  \ = drune_player\n```\n\n第一行的 `core` 属性指明了该安装配置文件兼容的 Drupal 核心版本（Drupal 7）。`name`\
  \ 和 `description` 属性定义了在安装配置文件选择表单上向用户显示的文本。`files` 属性定义了要包含的 PHP 文件列表。`dependencies`\
  \ 属性定义了开始安装前必须可用的模块。如果没有这些模块，系统将向用户显示一条错误信息。它们将在安装过程开始时，在必需的系统模块启用后自动启用。\n\n`drune_track`\
  \ 和 `drune_player` 是功能模块（features），这是一种特殊的模块。我将在本章后续部分介绍它们。\n\n\n\n`drune.profile`\n\
  \n`profilename.profile` 文件是一个 PHP 文件。该文件可以像模块一样包含钩子（hook），但这些钩子仅在安装过程中处于活动状态。\n\n\
  安装过程由一系列步骤组成。基本步骤，例如检查 `settings.php` 文件或激活模块依赖项，由 Drupal 本身定义。安装配置文件可以通过实现 `hook_install_tasks()`\
  \ 来添加自己的步骤。清单 34-1 包含了你的 Drune 实现。\n\n**清单 34-1.** 你的 Drune 实现\n\n```php\n/**\n\
  \ * Implements hook_install_tasks().\n */\nfunction drune_install_tasks() {\n  $tasks\
  \ = array(\n    // Display a welcome text.\n    'drune_welcome' => array(\n    \
  \  'display_name' => st('Welcome'),\n      'type' => 'normal',\n    ),\n    // Set\
  \ up the basic configuration.\n    'drune_setup' => array(\n    ),\n    // Let users\
  \ enter information about the location of their music library.\n    'drune_config_form'\
  \ => array(\n      'display_name' => st('Drune Configuration'),\n      'type' =>\
  \ 'form',\n    ),\n    // Import files from their music library.\n    'drune_import'\
  \ => array(\n      'display_name' => st('Import audio files'),\n      'type' =>\
  \ 'batch',\n    ),\n  );\n\n  return $tasks;\n}\n```\n\n你的 `hook_install_tasks()`\
  \ 实现返回一个结构化数组，定义了四个任务：显示欢迎文本、设置基本配置、提示用户输入信息、以及利用该信息导入内容。每个任务的键（key）是一个函数回调的名称。该回调预期返回值的类型由任务的\
  \ `type` 属性定义。让我们来看看每个回调函数。\n\n```php\nfunction drune_welcome() {\n  drupal_set_message(st('Welcome\
  \ to Drune'));\n\n  return st('We are going to walk you through the remaining steps\
  \ required to set up Drune on your server.');\n}\n```\n\n此任务的类型为 `normal`，这是默认类型。回调返回的文本会直接显示在页面上。\n\
  \n![images](img/square.jpg) **注意**：在安装过程中，标准的 Drupal 配置尚未完全就位。这意味着某些子系统（如翻译）不可用。因此，当输出本地化字符串时，你需要使用\
  \ `st()` 函数，而不是标准的 `t()` 函数。\n\n```php\nfunction drune_setup() {\n  variable_set('site_frontpage',\
  \ 'library');\n}\n```\n\n第二个任务也是 `normal` 类型，但它没有返回值。代码执行后，安装程序会自动继续执行下一个任务。请注意，此类步骤可以通过在\
  \ `profilename.install` 文件中实现 `hook_install()` 来替代。\n\n### 表单任务（Form Tasks）\n\n\
  表单任务允许你收集用户输入。在你的案例中，你要求用户输入服务器上存储音频文件的位置，以便导入它们（参见 清单 34-2）。\n\n**清单 34-2.** 导入音频文件表单任务\n\
  \n```php\nfunction drune_config_form($form_state) {\n  drupal_set_title(st('Drune\
  \ configuration'));\n  $form = array();\n\n  $form['drune_import_source_dir'] =\
  \ array(\n    '#type' => 'textfield',\n    '#title' => st('Where are your files\
  \ located?'),\n    '#description' => st('Enter the absolute path to the directory\
  \ where your music files are currently stored.'),\n    '#default_value' => variable_get('drune_import_source_dir',\
  \ NULL),\n  );\n\n  $form[] = array(\n    '#type' => 'submit',\n    '#value' =>\
  \ st('Save and continue'),\n  );\n\n  return $form;\n}\n\nfunction drune_config_form_validate($form,\
  \ &$form_state) {\n  $source_dir = $form_state['values']['drune_import_source_dir'];\n\
  \  if (!empty($source_dir) != '' && !is_dir($source_dir)) {\n    $error_text = st('%dir\
  \ is not a directory.', array('%dir' => $form_state['values']['drune_import_source_dir']));\n\
  \    form_set_error('drune_import_source_dir', $error_text);\n  }\n}\n\nfunction\
  \ drune_config_form_submit($form, &$form_state) {\n  if ($form_state['values']['drune_import_audio_files'])\
  \ {\n    variable_set('drune_import_source_dir', $form_state['values']['drune_import_source_dir']);\n\
  \  }\n}\n```\n\n类型为 `form` 的任务需要返回一个 Form API 结构化数组。验证和提交处理函数的命名规则与常规相同。一旦表单成功提交，安装程序将继续执行下一个任务。\n\
  \n### 批量任务（Batch Tasks）\n\n安装过程中的某些任务可能会花费很长时间，可能超过 PHP 配置中定义的超时时间。对于这些情况，你可以使用类型为\
  \ `batch` 的任务，并从回调中返回一个使用 `batch_set()` 格式的结构化数组。\n\n在你的案例中，你收集用户指定目录中的所有 mp3 文件，并使用批处理过程为每个文件创建一个节点。请注意，你正在创建类型为\
  \ `track` 的节点，这是由 `drune_track` 特性定义的内容类型，该特性已被标记为依赖项（参见 清单 34-3）。\n\n**清单 34-3.**\
  \ 批量任务\n\n```php\nfunction drune_import() {\n  $batch = array(\n    'title' => st('Importing\
  \ audio files'),\n    'error_message' => st('The audio file import has encountered\
  \ an error.'),\n    'finished' => '_drune_import_finished',\n  );\n  $files = file_scan_directory(variable_get('drune_import_source_dir',\
  \ NULL), \"/.*\\.mp3/\");\n  foreach ($files as $file) {\n    $batch['operations'][]\
  \ = array('_drune_import', array($file));\n  }\n\n  return $batch;\n}\n\nfunction\
  \ _drune_import($file, &$context) {\n  global $user;\n\n  $node = (object) array(\n\
  \    'uid' => $user->uid,\n    'type' => 'track',\n    'title' => $file->filename,\n\
  \  );\n  $file = file_copy($file, 'public://music/' . $file->filename);\n  $node->field_audio_file[LANGUAGE_NONE][]\
  \ = (array)$file + array('display' => TRUE);\n  node_save($node);\n  $context['message']\
  \ = st('Importing: @filename', array('@filename' => $file->filename));\n}\n\nfunction\
  \ _drune_import_finished($success, $results, $operations) {\n  drupal_set_message(st('Audio\
  \ file import completed'));\n}\n```\n\n\n\n### 处理配置：功能模块\n\n虽然安装配置文件为用户提供了一个基于预定义配置的良好起点，但它们并不能真正涵盖所有需求。存在的一些问题包括：\n\
  \n- 配置是通过直接调用 API 函数来设置的。这种方法适用于只需要少量变量的简单配置，但不适用于创建完整发行版所需的节点类型、视图、权限和其他组件。\n-\
  \ 安装配置文件仅控制项目的初始设置。没有提供用于维护更新的更新机制。\n- 原始配置与用户在安装后所做的最终修改一起存储在数据库中。因此，无法将标准配置与修改内容区分开来。\n\
  \n针对这些问题的所有解决方案都涉及将配置从数据库中导出，并放入可与安装配置文件一起发布的文件中。`Features` 模块通过提供一种统一的机制来导出不同类型的配置组件，已成为实现此目的的标准方式。所有与\
  \ `Features` 相关的功能都可以通过管理界面以及使用 `Drush` 命令从命令行使用。关于使用 `Drush` 的更多详情，请参阅第 26 章。\n\
  \n许多模块使用一种标准机制来让其他模块定义默认结构。最常见的例子可能就是 `Views` 模块，它允许其他模块创建默认视图。这些默认结构最初是使用特定的钩子（hook）在模块代码中定义的，但用户随后可以自由地用存储在数据库中的新版本覆盖该结构。以这种方式运行的结构被称为\
  \ *可导出组件*（exportables）。`Features` 模块充当了可导出组件的包装器，使得将一组结构转换为自定义模块变得简单。\n\n还有其他类型的结构没有提供让模块定义默认结构的\
  \ API。字段配置、块布局和用户权限就属于这一类，通常被称为 *伪可导出组件*（faux-exportables）。幸运的是，`Features` 模块提供了一种机制，几乎可以像处理可导出组件一样处理它们。\n\
  \n对于你的 `Drune` 示例，你将创建一个功能模块，用于定义音轨内容类型以及所有关联的字段，如存储音频文件、艺术家、专辑、封面缩略图等。\n\n一旦这些组件被创建并且\
  \ `Features` 模块被激活，你可以导航到 `admin/structure/features/create` 来创建一个新的功能模块（参见图 34-3）。版本和更新\
  \ XML 字段的 URL 目前可以留空。\n\n![images](img/3403.jpg)\n\n***图 34-3.** 创建新功能模块的用户界面*\n\
  \n![images](img/square.jpg) **注意** 关于如何将组件划分到不同的功能模块中并没有严格的规则，但从长远来看，将它们按逻辑实体分组将使你的工作更加轻松。\n\
  \n功能模块界面会创建一个包含自定义模块的存档，你可以直接将其复制到你的模块目录中，但快速浏览一下代码清单 34-4 中生成的代码内容是值得的。\n\n***代码清单\
  \ 34-4.** `drune_track.info`*\n\n```\ncore = \"7.x\"\ndependencies[] = \"features\"\
  \ndependencies[] = \"file\"\ndependencies[] = \"jplayer\"\ndependencies[] = \"text\"\
  \ndescription = \"提供音轨内容类型及其关联的结构和功能。\"\nfeatures[field][] = \"node-track-field_album\"\
  \nfeatures[field][] = \"node-track-field_artist\"\nfeatures[field][] = \"node-track-field_audio_file\"\
  \nfeatures[node][] = \"track\"\nfeatures[user_permission][] = \"create track content\"\
  \nfeatures[user_permission][] = \"delete any track content\"\nfeatures[user_permission][]\
  \ = \"delete own track content\"\nfeatures[user_permission][] = \"edit any track\
  \ content\"\nfeatures[user_permission][] = \"edit own track content\"\nname = \"\
  Drune Track\"\npackage = \"Features\"\n```\n\n除了属性按字母顺序排序之外，请注意 `features` 属性的存在。组件按组件类型分组，每个组件都有一个唯一的标识符。\n\
  \n#### `drune_track.*.inc`\n\n`Features` 模块会生成不同的包含文件，其中包含 `drune_track.info` 文件中列出的组件的实际定义。组件按类型分组；例如，所有默认视图将位于一个\
  \ `.default_views.inc` 文件中，所有字段定义将位于一个 `.features.content.inc` 文件中（文件名中包含 \"features\"\
  \ 表示这些组件是不可导出的，并且其代码导出由 `Features` 模块管理）。\n\n#### `drune_track.module`\n\n由 `Features`\
  \ 模块生成的 `.module` 文件包含一行代码，负责包含定义各个组件的各种包含文件（参见代码清单 34-5）。但是，你可以在此处自由添加模块中允许的任何代码。这通常用于添加与该功能模块中定义的组件相关的粘合代码（参见第\
  \ 22 章）。\n\n***代码清单 34-5.** `drune_track.module`*\n\n```\n<?php\n\ninclude_once('drune_track.features.inc');\n\
  ```\n\n### 覆盖\n\n功能模块激活后，仍然可以更改该功能模块提供的配置。当功能模块的配置被修改时，`Features` 模块会自动检测到，并在功能管理界面中将其状态显示为“已覆盖”。此外，还会提供哪些组件类型被覆盖的详细列表。\n\
  \n当功能模块被覆盖时，可以通过还原该功能模块来恢复到代码中存储的配置。这可以在功能管理界面中选择要还原的单个组件来完成，也可以使用 `drush features-revert`\
  \ 命令从命令行完成。\n\n### 更新\n\n使用 `Features` 模块的优势之一在于，它不仅提供了一种将配置导出到代码的机制，还能让你随着时间的推移更新这些配置。作为开发者，你只需覆盖功能模块以匹配所需状态，然后更新该功能模块即可。这可以通过两种方式实现：从用户界面重新导出功能模块，并用新版本替换旧版本；或者直接使用\
  \ `drush features-update` 命令从命令行更新功能模块。\n\n当 `Features` 模块识别到代码中有新版本的配置时，它会直接加载该配置，或者将其状态标记为“需要复审”，在这种情况下，需要还原该功能模块。\n\
  \n***表 34-1**. 不同情况下可导出组件与伪可导出组件行为对比*\n\n| | **可导出组件** | **伪可导出组件** |\n| --- | ---\
  \ | --- |\n| **示例组件** | 视图、图像预设 | 内容类型、权限、字段 |\n| **默认状态** | 配置仅存在于代码中 | 数据库中的配置与代码中的配置匹配\
  \ |\n| **已覆盖** | 配置同时存在于数据库和代码中。数据库中的版本优先于代码中的版本。 | 数据库中的配置与代码中的配置不同 |\n| **新变更在代码中**\
  \ | 新版本会自动加载，但大多数情况下需要清除 Drupal 缓存。 | 需要还原功能模块以使数据库与代码同步。 |\n\n![images](img/square.jpg)\
  \ **注意** 除了使构建发行版更简单之外，`Features` 模块还解决了与部署和团队协作相关的许多问题。许多开发者将其作为所有 Drupal 项目中的标准工具。\n\
  \n\n\n### 异常情况\n\n遗憾的是，并非 Drupal 项目配置中的所有内容都能通过 Features 模块导出。`features` API 可以轻松地为其他模块的配置添加支持，但即便如此，也并非所有内容都能被导出。\n\
  \n问题主要源于使用序列号作为组件的首要标识符。因为这些序列号是通过从数据库中选取下一个可用的整数来自动生成的，所以无法保证不同环境中的标识符是一致的。一些伪可导出项（如菜单链接）通过使用不同的标识符（菜单链接路径）来替代内部的数字标识符，从而规避了这个问题。\n\
  \n为了支持在安装配置文件中创建不受 Features 管理的配置，你需要编写自己的代码来管理它。例如，你可以使用此方法创建默认节点或用户账户。代码可以放置在以下几个位置之一：\n\
  \n- 如果配置与整个安装配置文件相关，则放在安装配置文件的 `.install` 文件中的 `hook_install()` 里。\n- 安装配置文件中的一个安装任务。如果配置基于用户在先前任务中输入的信息，这种方法尤其有用。\n\
  - 如果配置与特定模块相关，则放在自定义模块的 `.install` 文件中的 `hook_install()` 里。\n- 如果配置与特定模块相关，并且也应影响需要更新的现有实例，则放在自定义模块的\
  \ `.install` 文件中的 `hook_update_N()` 里。\n\n选择正确的位置取决于你的配置所关联的上下文，但所有位置都可以使用相同的语法。清单\
  \ 34-6 包含一个示例，该示例在 `drune.install` 中为你的 Drune 安装配置文件创建了一个“关于”页面和一个默认的非管理员用户。\n\n\
  **清单 34-6.** 创建“关于”页面\n\n```\n/**\n * 实现 hook_install()。\n */\nfunction drune_install()\
  \ {\n  // 创建“关于”页面。\n  $node = new StdClass;\n  $node->type = 'page';\n  $node->title\
  \ = t('关于');\n\n  // … 设置其他节点属性\n\n  node_save($node);\n\n  // 创建一个默认的非管理员用户。\n\
  \  $default_user = new StdClass;\n  $default_user->name = 'drune';\n  $default_user->pass\
  \ = 'drune';\n  user_save($default_user);\n}\n```\n\n关于编写自定义代码的更多详情，请参见第 22 章。\n\
  \n### 将安装配置文件与 Features 作为开发工具使用\n\n将安装配置文件与 `Features` 模块结合使用，你可以定义项目的完整配置，并一步到位地从无数据库的代码库转变为功能完整的\
  \ Drupal 站点。这一功能对于创建发行版非常有用，但在任何 Drupal 项目的开发过程中，它也同样强大。\n\n想象一下，例如，一个复杂网站的开发。每个功能部分都被导出到一个包含所需组件和相关自定义代码的\
  \ feature 中。安装配置文件可以是一个简单的模块依赖列表（包括 features）和一个空的 `profilename.profile` PHP 文件。`profilename.info`\
  \ 文件的内容将如清单 34-7 所示。\n\n**清单 34-7.** `profilename.info` 的内容\n\n```\nname = \"复杂网站\"\
  \ndescription = \"复杂网站的自定义安装配置文件。\"\ncore = 7.x\n\n; 列出我们导出的 features。\ndependencies[]\
  \ = complex_web site_registration\ndependencies[] = complex_web site_forums\ndependencies[]\
  \ = complex_web site_forums\n\n; 列出不被任何 feature 需要的附加模块\ndependencies[] = dblog\n\
  dependencies[] = toolbar\n\n; 开发模块，这些将在正式站点上被禁用。\ndependencies[] = devel\ndependencies[]\
  \ = simpletest\ndependencies[] = views_ui\n\nfiles[] = profilename.profile\n```\n\
  \n如前所述，`profilename.profile` 文件可以留作一个空的 PHP 文件。使用此安装配置文件将启用所有 features 及其依赖项，以及其他任何指定的模块。结果就是项目的一个新实例，所有配置都已就绪，可供用户添加内容。\n\
  \n可以通过在 `profilename.profile` 文件中添加任务来以编程方式创建内容，但这种方法仅在内容可以从外部源批量导入时才实用。以编程方式创建编辑性内容可能很繁琐，因此这种方法不适用于主要基于编辑性内容的项目。\n\
  \n## 打包你的代码\n\n你现在拥有了让他人重新创建你的安装配置文件所需的所有组件：一个安装配置文件、一个依赖项列表、几个自定义模块和 features、一个主题（可选），以及一些额外的外部库。问题是用户需要从许多不同的来源获取代码。有时你还需要某个模块的特定修订版本，这只能直接从版本控制系统中获取。你需要一种方法来正式定义如何构建运行你的发行版所需的代码。\n\
  \nMakefile 在软件开发中是一种众所周知的工具，通常与 `make` 命令结合使用，以自动化编译可执行文件的过程。虽然构建 Drupal 项目与编译 C++\
  \ 应用程序截然不同，但一些通用的概念仍然适用。Drupal 中与 `make` 命令等价的是 `drush make`，它是 `drush` 的一个扩展，能将\
  \ makefile 转换成一个准备安装的 Drupal 项目。\n\n### Drush Makefile\n\n`drush make` 使用的 makefile\
  \ 语法与你多次遇到过的 `.info` 文件语法类似。清单 34-8 展示了你的 Drune 发行版的 makefile 内容。\n\n**清单 34-8.**\
  \ Drune 发行版的 `profilename.make` 文件\n\n```\n; 指定 drush make API 版本\napi = 2\n\n;\
  \ 指定兼容的 Drupal 核心版本。\ncore = 7.x\n\n; 从 Drupal.org 下载的包列表。\nprojects[] = ctools\n\
  projects[] = features\nprojects[] = views\n\n; 模块可以直接从版本控制系统下载。\nprojects[jplayer][type]\
  \ = module\nprojects[jplayer][download][type] = \"git\"\nprojects[jplayer][download][url]\
  \ = \"git://git.drupal.org/project/jplayer\"\nprojects[jplayer][download][tag] =\
  \ \"6.x-1.0-beta2\"\n\n; 补丁也可以自动应用。此处是指将 jPlayer 模块移植到 Drupal 7 的补丁。\nprojects[jplayer][patch][]\
  \ = \"http://drupal.org/files/issues/jplayer_d7_1.patch\"\n\n; 同时指定外部库。\nlibraries[jplayer][download][type]\
  \ = \"get\"\nlibraries[jplayer][download][url] = \"http://www.happyworm.com/jquery/jplayer/latest/jQuery.jPlayer.1.2.0.zip\"\
  \n```\n\n这个文件名为 `profilename.make`，直接位于安装配置文件的根目录下（在你的例子中，它将是 `profile/drune/drune.make`）。\n\
  \n请注意，此 makefile 的包列表中并不包含 Drupal 核心。因为它位于配置文件文件夹内，所以它预期在现有的 Drupal 项目内被使用。你可以创建一个简单的\
  \ makefile 来获取 Drupal 核心和你的安装配置文件，并且 `drush make` 会递归地解析这些 makefile，如下所示：\n\n```\n\
  api = 2\ncore = 7.x\nprojects[] = drupal\nprojects[] = drune\n```\n\n\n\n#### 托管在\
  \ `drupal.org` 上\n\n托管在 `drupal.org` 上的安装配置文件还可以使用一个名为 `drupal-org.make` 的特殊 makefile。该文件由\
  \ `drupal.org` 打包脚本自动解析，并会生成一个包含 Drupal 项目和安装配置文件的归档包，用户可直接安装。\n\n由于 `drupal.org`\
  \ 的托管政策，不允许包含外部库。可以使用 `drush verify-makefile` 命令来检查所有托管于 `drupal.org` 的要求是否满足。如果某个\
  \ makefile 不符合要求，可以使用 `drush convert-makefile` 命令将其转换为合规的 makefile。\n\n#### 打包\n\
  \n即使你的安装配置文件托管在 `drupal.org` 上，你可能也希望允许你的发行版用户直接从你的网站下载一个包含安装所需全部内容的归档包。`drush make`\
  \ 提供的众多选项中，`--tar` 选项正是为此而设，示例如下：\n\n```\ndrush make --tar drune.make\n```\n\n关于\
  \ `drush make` 所有功能的完整文档，请查看 `drush make` 下载包中的 `README.txt` 文件。\n\n### 发行版的未来\n\
  \n发行版对 Drupal 的未来至关重要。它们使 Drupal 能够与那些功能单一、难以扩展的系统竞争。例如，Drupal Commons 就是为了与其他闭源社交商业服务竞争而开发的。通过降低站点创建的门槛并创建独特的功能组合，发行版也将\
  \ Drupal 带入了利基市场。\n\n由于发行版提供商依赖 Drupal 来提供他们的产品，因此为 Drupal 项目做贡献符合他们的利益。同时，Drupal\
  \ 也因发行版而变得更加强大，这种反馈循环为所有人创造了更好的产品。\n\n如果你在 Drupal 6 中使用过配置文件，那么你会很高兴地听到，在 Drupal\
  \ 7 中，它们作为识别这一未来趋势的努力的一部分，得到了极大的重视。它们的构建方式本质上类似于一个包含 `.info` 和 `.install` 文件的模块；无需再学习额外的（有些晦涩的）API。如果你能编写一个模块，你就能编写一个安装配置文件。此外，它们在\
  \ `drupal.org` 上获得了更显著的展示位置，现已与模块和主题处于同等地位。让发行版的创建和维护更加容易，将是社区面临的下一项挑战。\n\n本章用作示例的\
  \ Drune 音乐播放器，是在作者的桌面音乐播放器因所用专有协议变更而无法与其音乐库交互时，临时创建出来的。本章中的示例是实际代码的简化版本。该项目的当前开发状态可在\
  \ `drune.org` 查看。\n\n### 总结\n\n在本章中，你了解到配置文件和发行版允许你快速简便地创建一个预配置好的站点。发行版和配置文件是 Drupal\
  \ 生态系统的重要组成部分，你应该考虑创建一个配置文件来支持你的 Drupal 项目的开发。编写你自己的配置文件类似于编写你自己的模块，你可以通过检查现有配置文件的构建方式并将其用作模板来学到很多东西。你可以使用\
  \ `drush makefiles` 快速简便地从多个位置整合你的配置文件所需的资源。你还可以将逻辑分组的站点配置部分打包成可导出、可重用的特性。大多数特性无法导出的内容，可以存储在\
  \ `hook_install()` 和 `hook_update_N()` 的代码中。\n\n## 第七部分\n\n![图片](img/squ.jpg)\n\n\
  ## Drupal 社区\n\n**第 35 章** 讲述了 Drupal 作为一个开源项目的起源故事，以及一些对其发展成今天繁荣社区的关键事件。\n\n**第\
  \ 36 章** 探讨了如何通过 Drupal 谋生，包括正视 Drupal 软件存在的问题，并提出了如何共同维系你与 Drupal 成功的建议。\n\n**第\
  \ 37 章** 介绍了如何在 `Drupal.org` 上维护一个与世界共享的项目，以及如何使用 Git 版本控制系统。\n\n**第 38 章** 作为本书的最后一章，讨论了为\
  \ Drupal 做贡献的有效方法，以使你所使用的软件和你所处的社区变得更好。并且，或许还能帮助世界变得更美好。\n\n## 第三十五章\n\n![图片](img/squ.jpg)\n\
  \n## Drupal 的故事：一串意想不到的事件链\n\n作者：Kasey Qynn Dolin\n\n*“对我来说，Drupal 的历史就是一连串有趣的惊喜。”*\n\
  \n——Dries Buytaert，Drupal 创始人兼项目负责人\n\n我曾考虑将本章命名为“历史”，但后来认为这会产生误导。尽管在本书印刷时，Drupal\
  \ 项目只有十年历史，但一部完整的 Drupal 历史将需要数百页的篇幅，并记录成千上万人的经历。\n\n坦率地说，如果你在寻找关于关键贡献者的详尽传记，那么查看他们的个人资料页面会更有效。虽然许多关键贡献者是迷人而聪明的人物，他们的决策、行动和信仰无疑在全球众多人所熟知和喜爱的社区中留下了印记，但这篇历史并非关于那些大写“人物”塑造\
  \ Drupal 的故事。\n\n相反，它讲述的是塑造 Drupal 的事件，以及整个社区如何应对这些事件的故事。说到社区……\n\n作为一位外部观察者，我逐渐认为\
  \ Drupal 真正令人惊叹之处在于它对极其广泛的用户群体的吸引力。Drupal 用户涵盖了从业余黑客到企业家、从激进的草根组织者到国家政府、从自由及开源软件（FOSS）布道者到企业战略家——社区包含了众多兼具以上所有特征的实体和个人。\n\
  \n完全可以说，Drupal 代码的质量和灵活性解释了其广泛的吸引力，一个优雅、适应性强且有用的技术拥有令人印象深刻的应用范围，这并不奇怪……\n\n……但同样有理由指出，Drupal\
  \ 是一个协作产生的企业。来自各大洲、上述每个群体的成员，为了从软件中获得他们想要的最大价值，必须进行沟通、协作并相互依赖——而在此过程中，也共同推动了整个项目向前发展。是什么让这种大规模的开源价值观成为可能？Drupal\
  \ 项目中的什么特质激发了这种奉献精神，并最终带来了其非凡的成功？\n\n答案是：前述的一串许多意想不到的事件链，^(1) 以及社区的回应。\n\n本章将简要介绍几个塑造了社区如何以及为何能够生存和发展的事件。希望这能捕捉到定义\
  \ Drupal 的一些特质（尽管我会让读者自己来定义这究竟是一种什么特质）。在简要回顾 Drupal 的起源之后，第一部分描述了导致 Drupal 吸引到其繁荣所需的关键开发者数量的关键事件。接下来的两部分概述了决定\
  \ Drupal 基础设施形态的事件，以及该基础设施如何平衡赋予 Drupal 力量的开源价值观与支持广泛商业应用的能力。\n\n\n\n### 最初的意外\n\
  \n我们现在所熟知的 Drupal 项目始于 1998 年，当时一位在安特卫普大学攻读计算机科学学士学位的比利时本科生德里克·布伊塔特，开始搭建一个局域网，以便与他的室友们联网（并避免大学高昂的上网费用）。德里克创建的留言板让他的计算机科学系的同学们能够讨论最新的互联网技术，并保持联系。\n\
  \n后者之所以重要，正是因为这种社区感激励了德里克。在他毕业并搬离宿舍后，为了让讨论继续下去，他将这个内部网站搬到了互联网上。2000 年 4 月 28 日，`drop.org`\
  \ 诞生了。\n\n![images](img/square.jpg) **注意** 万一有读者还不知道 Drupal 名称的由来，这里提供一个简版故事：*起初，只是一个拼写错误。德里克看了看他的拼写错误，觉得还不错……于是就将错就错了。*\
  \ 在注册新网站的域名时，德里克本想输入荷兰语单词 *dorpje*（意为村庄）的缩写，但错拼成了英语单词 *drop*。后来，在给软件命名时，他将 *drop*\
  \ 回译成荷兰语 *（druppel）*，然后又按照英语发音拼写成了 *drupal*。\n\n这一举动永远定义了 Drupal 社区的特征：德里克没有试图亲自实现大量的建议、抱怨和反馈，而是选择根据\
  \ GNU 通用公共许可证将软件免费提供给所有人。这意味着任何愿意投入时间和精力去尝试自己想法的人，都可以随意试验后来成为 Drupal 的代码——前提是他们同意将自己的实验成果也免费提供给他人。2001\
  \ 年 1 月 15 日，自由和开源软件（FOSS）运动迎来了新成员——Drupal 1.0 正式发布。\n\n虽然最初 `drop.org` 上的讨论内容旨在涵盖一般的互联网技术，但评论很快开始转向非常具体的话题——即驱动\
  \ `drop.org` 网站本身的软件。\n\n在 2001 年 3 月 15 日 Drupal 2.0 发布后不久，德里克决定为所有那些充斥在 `drop.org`\
  \ 网站上的、专门与 Drupal 相关的活动提供一个场所，于是 `drupal.org` 诞生了。\n\n_____________________\n\n\
  ¹ 德里克·布伊塔特在 2007 年 7 月 26 日接受诺埃尔·伊达尔戈采访时，用“一连串许多意想不到的事件”来形容 Drupal，采访链接：[`luckofseven.com/vlog/episode13`](http://luckofseven.com/vlog/episode13)。\n\
  \n### Drupal 站稳脚跟\n\nDrupal 在相对默默无闻的状态下持续发展，直到 2002 年初，德里克与 `kerneltrap.org` 的所有者兼运营者杰里米·安德鲁斯建立了联系。`kerneltrap.org`\
  \ 是一个报道 Linux 内核及整个 FOSS 世界相关问题的新闻网站，它时常因为被热门技术新闻网站 `slashdot.org/` 提及而遭受流量冲击导致宕机。德里克联系杰里米，建议用\
  \ Drupal 替代 PHP-Nuke。杰里米在 2002 年 2 月 14 日将 `kerneltrap.org` 转换为 Drupal 3.0.2 后，开发了节流模块（该模块最终被包含在\
  \ Drupal 4.1 核心中）。\n\n虽然节流模块“不过是一块创可贴，试图绕开问题而非解决问题”，² 并且后来被从 Drupal 7 核心中移除，但这段早期合作的影响是巨大的。杰里米后来多年一直是\
  \ Drupal 社区的活跃成员，贡献了超过 4400 次提交。但与本章节更相关的是，他曾在 `kerneltrap.org` 上报道了自己早期转向并使用 Drupal\
  \ 的经历。这种最真诚的认可所带来的宣传效应，被德里克认为是“让技术界许多其他人”³ 注意到了 Drupal 独特能力的关键事件。\n\n如果说 2002 年\
  \ `kerneltrap.org` 对 Drupal 的提及代表了它在技术界的“亮相”，那么 2003 年 7 月则标志着 Drupal 开始在更广阔的世界“崭露头角”。当\
  \ Drupal 社区忙于攻克 4.2、4.3 和 4.4 版本时，一群热衷政治的年轻人正在使用这个尚不为人知的内容管理系统，试图帮助一位同样不太知名的候选人竞选美国总统。\n\
  \n虽然候选人霍华德·迪恩最终没有当选，但他确实以极大的声势进入了全国视野——这部分归功于 Drupal 软件的组织能力以及构建了推动竞选活动的那些网站的积极分子/开发者的奉献精神。当组织者利用\
  \ Drupal 软件创建了 DeanSpace（一个用于联系和组织全美迪恩志愿者的网站），从而指数级地扩大了竞选活动所能触及的人群时，竞选活动的扩张也反过来导致了\
  \ Drupal 软件自身的指数级增长。\n\n随着由 Drupal 驱动的迪恩支持者网站如雨后春笋般涌现，为满足这些网站需求而构建模块的开发者也越来越多。大卫·科恩在撰写关于\
  \ Drupal 这段历史的文章时，提到 `drupal.org` 上创建的内容增加了 300%。这种促进发展的相互推动甚至在迪恩竞选活动失败后仍在继续；事实上，竞选活动的结束开启了一个新阶段，Drupal\
  \ 迅速扩展到各种草根和非营利应用中，这很大程度上得益于前迪恩志愿者中 Drupal 开发人才的推动。2004 年 7 月 23 日，DeanSpace 正式宣告终结，而\
  \ CivicSpace——“第一家拥有全职员工、专门开发和分发 Drupal 技术的公司”⁴ 则开始起步。Advomatic、Chapter Three 和\
  \ Echo Ditto 等其他由迪恩志愿者创立的基于 Drupal 的公司，至今仍为 Drupal 社区做出着重要贡献。\n\n_____________________\n\
  \n² Tag1 Consulting, Inc., “第 3 节：节流模块，” [`http://books.tag1consulting.com/scalability/drupal/performance/throttle`](http://books.tag1consulting.com/scalability/drupal/performance/throttle)\n\
  \n³ 德里克·布伊塔特，2007 年 7 月 26 日，接受诺埃尔·伊达尔戈采访，“第 13 集 – 德里克谈 Drupal，” [`http://luckofseven.com/vlog/episode13.`](http://luckofseven.com/vlog/episode13.)\n\
  \n⁴ DigiDave，《Drupal 国度：驱动左翼的软件》，[`http://blog.digidave.org/2008/12/drupal-nation-software-to-power-the-left`](http://blog.digidave.org/2008/12/drupal-nation-software-to-power-the-left)\n\
