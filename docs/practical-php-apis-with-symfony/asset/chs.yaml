- "# 总结\n\n我们已经确立了面向操作的 API 的核心要素：操作及其相关的元数据。在下一节中，我们将探讨如何有效地发现和收集这些已定义的操作，确保它们在我们的\
  \ API 中随时可访问。\n\n## 第三节 收集与发现操作\n\n我们已经学习了如何使用 `OperationInterface` 和 `OperationMetadata`\
  \ 属性创建单个 API 操作。现在，让我们探讨如何构建一个专门用于管理这些操作的服务。该服务将负责：\n\n*   **持有操作集合**：该服务将作为一个中央仓库，存储应用中所有已定义的操作。\n\
  *   **通过名称检索操作**：我们可以在服务中通过唯一名称高效检索特定操作。这简化了操作查找，并提升了代码的清晰度。\n\n通过创建这个服务，我们将能以一种更有组织、更高效的方式来管理和访问应用中的\
  \ API 操作。\n\n### 操作集合\n\n首先，我们需要创建一个用于存储操作集合的类。\n\n```\nnamespace App\\Api\\Collection;\n\
  class OperationCollection\n{\nprivate array $operations;\npublic function setOperations(array\
  \ $operations): void\n{\n$this->operations = $operations;\n}\npublic function getOperation(string\
  \ $operation): ApiOperation\n{\nif(!isset($this->operations[$operation])){\nthrow\
  \ new NotFoundOperationException(sprintf('Operation %s is not defined', $operation));\n\
  }\nreturn $this->operations[$operation];\n}\n}\n```\n\n操作集合非常直接。它只包含一个用于加载操作的 setter\
  \ 方法和一个用于获取具体操作的 getter 方法。如果操作不存在，则会抛出一个 `NotFoundOperationException` 异常。\n\n我们将稍后创建这个异常。目前，我们只需知道它是在操作不存在时抛出的异常。\n\
  \n现在的问题是：我们如何加载操作数组？答案是使用 [Symfony 服务配置器](https://symfony.com/doc/current/service_container/configurators.html)。这些是特殊的服务，允许开发者将服务逻辑与提供所需配置的服务解耦。\n\
  \n让我们来看看操作集合配置器：\n\n### 操作配置器\n\n操作配置器将包含必要的代码，用于将操作填充到集合中。它使用一个名为 `ApiOperation`\
  \ 的类来包装每个操作，该类接收操作处理器和操作元数据。\n\n```\nnamespace App\\Api;\nuse App\\Api\\Attribute\\\
  OperationMetadata;\nuse App\\Api\\Operation\\OperationInterface;\nreadonly class\
  \ ApiOperation {\npublic function __construct(\npublic OperationInterface $handler,\n\
  public OperationMetadata  $metadata\n){}\n}\n```\n\n现在，让我们探讨操作配置器是如何工作的。\n\n```\n\
  namespace App\\Api\\Collection;\nuse App\\Api\\ApiOperation;\nuse App\\Api\\Attribute\\\
  OperationMetadata;\nuse Symfony\\Component\\DependencyInjection\\Attribute\\TaggedIterator;\n\
  class OperationCollectionConfigurator {\npublic function __construct(\n#[TaggedIterator('api.operation')]\
  \ private readonly iterable    $apiOperations\n){}\npublic function configure(OperationCollection\
  \ $operationCollection): void\n{\n$operations = [];\nforeach ($this->apiOperations\
  \ as $operation){\n$metadata = $this->readAttribute(OperationMetadata::class, $operation);\n\
  $operations[$metadata->name] = new ApiOperation($operation, $metadata);\n}\n$operationCollection->setOperations($operations);\n\
  }\n/**\n* @template T\n* @param class-string $attrClass\n* @return T|null\n*/\n\
  private function readAttribute(string $attrClass, object $object)\n{\n$reflectionClass\
  \ = new \\ReflectionClass($object);\n$attrs = $reflectionClass->getAttributes($attrClass);\n\
  if(!empty($attrs)) {\n$attr = reset($attrs);\nreturn $attr->newInstance();\n}\n\
  throw new \\RuntimeException(sprintf('Operation class %s has no metadata', get_class($object)));\n\
  }\n}\n```\n\n配置器服务包含稍多一些的代码。我们从构造函数开始看起。它注入了带有 `TaggedIterator` 属性的参数。这个属性会将所有标记为\
  \ `api.operation` 的服务（即所有操作）加载到 `$apiOperations` 可迭代对象中。\n\n*   当我们创建 `OperationInterface`\
  \ 时，我们使用了 `AutoConfigure` 属性来将所有实现了该接口的服务标记为 `api.operation`。\n\n私有的 `readAttribute`\
  \ 方法利用 PHP 的反射功能来检查作为第二个参数传入的对象是否标记了由第一个参数指定的属性。如果是，则返回该属性的一个新实例；否则，抛出一个 PHP 异常。\n\
  \n`configure` 方法遍历 `$apiOperations` 数组中的操作。对于每个操作，它使用 `readAttribute` 方法获取元数据，并将操作及其元数据包装到一个\
  \ `ApiOperation` 对象中。循环结束后，它通过 `setOperations` 方法将操作设置到 `OperationCollection` 中。\n\
  \n我们必须告诉 Symfony 使用这个配置器来配置 `OperationCollection` 服务。为此，我们需要在 `config/services.yaml`\
  \ 文件的 `services` 部分进行定义。\n\n```\nApp\\Api\\Collection\\OperationCollection:\nconfigurator:\
  \ ['@App\\Api\\Collection\\OperationCollectionConfigurator', 'configure']\n```\n\
  \n通过上述配置，Symfony 就知道必须使用 `OperationCollectionConfigurator` 的 `configure` 方法来配置 `OperationCollection`\
  \ 服务。\n\n\n\n### 发现操作\n\n发现操作非常简单，只需使用来自 `OperationCollection` 服务的 `getOperation`\
  \ 方法即可。让我们创建一个 `ApiOperationHandler` 服务来封装此逻辑。\n\n```php\nnamespace App\\Api;\n\
  use App\\Api\\Collection\\OperationCollection;\nuse App\\Api\\Input\\ApiInput;\n\
  use App\\Api\\Output\\ApiOutput;\nclass ApiOperationHandler\n{\npublic function\
  \ __construct(\nprivate readonly OperationCollection $operationCollection,\n){ }\n\
  public function performOperation(ApiInput $apiInput): ApiOutput\n{\n$operation =\
  \ $this->operationCollection->getOperation($apiInput->operation);\nreturn $operation->handler->perform($apiInput->data);\n\
  }\n}\n```\n\n`performOperation` 方法接收一个输入模型作为参数。由于该模型包含操作名称，该方法将其传递给 `OperationCollection::getOperation`\
  \ 方法，并获取一个 `ApiOperation` 包装器，其中包含操作处理器和操作元数据。然后，它执行操作（使用 `OperationInterface::perform`\
  \ 方法）并将结果作为 `ApiOutput` 模型返回。\n\n### 处理 `NotFoundOperationException` 错误\n\n在编写操作集合服务时，我们在未找到操作时抛出了一个异常。让我们为这个异常编写类：\n\
  \n```php\nuse Symfony\\Component\\HttpKernel\\Exception\\NotFoundHttpException;\n\
  class NotFoundOperationException extends NotFoundHttpException\n{\n}\n```\n\n这个异常类本身不做任何事情。它只是继承自\
  \ Symfony 的 `NotFoundHttpException`，该类会自动将 HTTP 响应码设置为“404 Not Found”。现在，我们需要指示\
  \ Symfony 在抛出此异常时，在缺失操作的消息中返回一个格式化的 JSON 响应。为此，我们将编写一个 [Symfony 事件订阅器](https://symfony.com/doc/current/event_dispatcher.html%2523listeners-or-subscribers)，它将持续监听\
  \ Symfony 的 [KernelException 事件](https://symfony.com/doc/current/reference/events.html%2523kernel-exception)。每次抛出异常时，Symfony\
  \ 都会触发此事件。\n\n```php\nnamespace App\\EventSubscriber;\nuse App\\Exception\\NotFoundOperationException;\n\
  use Symfony\\Component\\EventDispatcher\\EventSubscriberInterface;\nuse Symfony\\\
  Component\\HttpFoundation\\JsonResponse;\nuse Symfony\\Component\\HttpKernel\\Event\\\
  ExceptionEvent;\nuse Symfony\\Component\\HttpKernel\\KernelEvents;\nclass KernelSubscriber\
  \ implements EventSubscriberInterface\n{\npublic static function getSubscribedEvents():\
  \ array\n{\nreturn [\nKernelEvents::EXCEPTION => 'onException'\n];\n}\npublic function\
  \ onException(ExceptionEvent $event): void\n{\n$exception = $event->getThrowable();\n\
  if($exception instanceof NotFoundOperationException){\n$event->setResponse(new JsonResponse([\n\
  'errors' => [\n'operation' => $exception->getMessage()\n]\n]));\n}\n}\n}\n```\n\n\
  如上代码所示，`onException` 方法在内核异常事件被触发后执行。该方法检查抛出的异常是否是 `NotFoundOperationException`\
  \ 的实例。如果是，它会创建一个包含异常消息的 [JsonResponse](https://symfony.com/doc/current/components/http_foundation.html%2523creating-a-json-response)，并将其传递给事件的\
  \ `setResponse` 方法。最后，此响应将被返回给最终客户端。\n\n### 结论\n\n我们已经探讨了如何创建一个作为中心枢纽的集合仓库，用于存储所有已定义的操作。此外，我们还引入了一个负责从集合中检索操作并执行它们的处理器。更进一步，我们处理了在集合中遇到不存在操作的情况。通过实现优雅地处理“未找到”操作的机制，我们可以确保\
  \ API 的健壮性和用户友好性。\n\n在下一节中，我们将把重点转向惰性操作。通过利用 Symfony 的惰性加载技术，我们可以确保应用程序保持响应和高效，仅在需要时加载必要的组件。\n\
  \n## 第 4 节：惰性操作\n\n在上一节中，我们学习了如何使用 Symfony 的功能来创建一个集合，用于存储可在 API 中执行的操作。在拥有大量可用操作的环境中，考虑预先加载所有操作对性能的影响至关重要。这就是惰性操作可以发挥作用的地方。\n\
  \n惰性操作允许我们将操作的加载推迟到真正需要它们的时候。这种方法可以显著提高 API 的性能，尤其是在处理大量操作或实例化成本较高的操作时。\n\n例如，我们可以设想一个注入了邮件服务的操作。即使你不需要邮件服务，为了构造该操作并将其添加到集合中，它也会被始终实例化。\n\
  \n为了能够向集合中添加惰性操作，我们依赖于 `Autoconfigure` 属性的 `lazy` 参数。\n\n### `LazyOperationInterface`\
  \ 接口\n\n`LazyOperationInterface` 的代码类似于 `OperationInterface`，但有以下不同之处：\n\n- `Autoconfigure`\
  \ 属性将参数 `lazy` 设置为 true。这意味着实现此接口的操作将被惰性加载到集合中。\n- 它添加了一个名为 `getMetadata` 的方法来返回操作元数据。此方法是必需的，因为对于惰性加载的（代理）服务，无法可靠地访问元数据属性。\n\
  \n```php\nuse App\\Api\\Attribute\\OperationMetadata;\nuse App\\Api\\Output\\ApiOutput;\n\
  use Symfony\\Component\\DependencyInjection\\Attribute\\Autoconfigure;\n#[Autoconfigure(lazy:\
  \ true, tags: ['api.operation'])]\ninterface LazyOperationInterface\n{\npublic function\
  \ perform(mixed $data): ApiOutput;\npublic function getMetadata(): OperationMetadata;\n\
  }\n```\n\n我们必须注意，惰性操作服务不能是只读类或 final 类。\n\n### 将操作标记为惰性\n\n要将操作标记为惰性，我们只需实现上述接口即可。\n\
  \n```php\nuse App\\Api\\Attribute\\OperationMetadata;\nuse App\\Api\\Operation\\\
  LazyOperationInterface;\nuse App\\Api\\Output\\ApiOutput;\nuse App\\Security\\Miscelanea\\\
  OperationNames;\nclass SendReportingByEmail implements LazyOperationInterface\n\
  {\npublic function perform(mixed $data): ApiOutput\n{\n/**\n* 通过电子邮件发送报告所需的代码\n\
  */\nreturn new ApiOutput([\n'report_id' => '5899865', 'email_status' => 'queued'\n\
  ], 200);\n}\npublic function getMetadata(): OperationMetadata\n{\nreturn new OperationMetadata(\n\
  name: OperationNames::SendReportingByEmail->name,\ninput: SendReportingByEmailInput::class\n\
  );\n}\n}\n```\n\n我们可以看到，操作元数据在 `getMetadata` 方法中返回。\n\n### 修改 `OperationCollectionConfigurator`\n\
  \n我们需要修改 `OperationCollectionConfigurator` 服务，以检查操作是否被标记为惰性。如果是，它将必须使用 `getMetadata`\
  \ 方法来提取元数据，而不是读取 `OperationMetadata` 属性。\n\n```php\npublic function configure(OperationCollection\
  \ $operationCollection): void\n{\n$operations = [];\nforeach ($this->apiOperations\
  \ as $operation){\nif($operation instanceof LazyOperationInterface) {\n$metadata\
  \ = $operation->getMetadata();\n$operations[$metadata->name] = new ApiOperation(\n\
  $operation,\n$metadata\n);\n}\nelse{\n$metadata = $this->readAttribute(OperationMetadata::class,\
  \  $operation);\n$operations[$metadata->name] = new ApiOperation($operation, $metadata);\n\
  }\n}\n$operationCollection->setOperations($operations);\n}\n```\n\n\n\n### 结论\n\n\
  我们已经使用了 `Autoconfigure` 属性的 `lazy` 参数，使得所有实现了 `LazyOperation` 接口的操作都以惰性模式加载。这让我们能够提升性能，并且仅在需要执行时实例化重量级操作。\n\
  \n在下一节中，我们将把焦点转向验证。我们将探讨确保传入请求符合预期要求的策略，为可靠且无差错的执行操作铺平道路。\n\n## 第 5 节 验证操作\n\n在“第\
  \ 1 节 请求输入与输出”中，我们讨论了定义可能需要特定参数才能执行的操作。确保这些参数有效且一致，对于避免操作执行过程中的错误至关重要。\n\n本节将探讨如何利用\
  \ [Symfony 的验证](https://symfony.com/doc/6.4/validation.html)功能来实现这一目标。\n\n### 验证服务\n\
  \n我们首先创建一个服务来封装验证逻辑：\n\n```\nnamespace App\\Validation;\nuse App\\Exception\\InvalidPayloadException;\n\
  use Symfony\\Component\\Serializer\\SerializerInterface;\nuse Symfony\\Component\\\
  Validator\\Exception\\ValidationFailedException;\nuse Symfony\\Component\\Validator\\\
  Validator\\ValidatorInterface;\nclass ValidationHandler\n{\npublic function __construct(\n\
  private readonly SerializerInterface $serializer,\nprivate readonly ValidatorInterface\
  \ $validator\n){}\npublic function deserializeAndValidate(array|string $payload,\
  \ string $className)\n{\ntry{\n$object = (is_array($payload))\n? $this->serializer->denormalize($payload,\
  \ $className)\n: $this->serializer->deserialize($payload, $className, 'json')\n\
  ;\n}\ncatch(\\Symfony\\Component\\Serializer\\Exception\\ExceptionInterface $e)\
  \ {\nthrow new InvalidPayloadException();\n}\n$errors = $this->validator->validate($object);\n\
  if(count($errors) > 0) {\nthrow new ValidationFailedException(null, $errors);\n\
  }\nreturn $object;\n}\n}\n```\n\n该服务使用了两个关键的 Symfony 组件：\n\n-   **Symfony 序列化器**：处理器首先使用序列化服务，将传入的请求负载转换为元数据输入参数中指定的输入模型。负载格式可以是\
  \ JSON（编码字符串）或数组。\n-   **Symfony 验证器**：反序列化后，使用 Symfony 验证器服务对输入模型进行验证。这确保了数据符合预定义的约束条件，保证了数据的一致性，并防止操作执行过程中可能出现错误。\n\
  \n如果验证过程顺利结束，将会返回已反序列化的输入模型，供操作处理器进一步处理。如果验证失败（数据无效），则会抛出一个 Symfony 的 `ValidationFailedException`\
  \ 异常。\n\n我们将反序列化过程包裹在 try-catch 块中，以处理潜在的错误，例如不正确的数据类型、缺少必填字段或无效的 JSON。如果出现这些问题，则会抛出一个\
  \ `InvalidPayloadException` 异常：\n\n```\nnamespace App\\Exception;\nuse Symfony\\\
  Component\\HttpFoundation\\Response;\nclass InvalidPayloadException extends \\RuntimeException\n\
  {\npublic function __construct(string $msg = '格式错误或无法识别的有效负载' , int $code = Response::HTTP_BAD_REQUEST,\
  \ ?\\Throwable $previous = null)\n{\nparent::__construct($msg, $code, $previous);\n\
  }\n}\n```\n\n`InvalidPayloadException` 仅添加了一条消息，提示已发送了无效的有效负载。\n\n### 在执行操作前进行验证\n\
  \n我们对 `ApiOperationHandler` 进行一些修改，以便在执行操作之前验证数据。\n\n```\nuse App\\Api\\Collection\\\
  OperationCollection;\nuse App\\Api\\Input\\ApiInput;\nuse App\\Api\\Output\\ApiOutput;\n\
  use App\\Validation\\ValidationHandler;\nclass ApiOperationHandler\n{\npublic function\
  \ __construct(\nprivate readonly ValidationHandler $validationHandler,\nprivate\
  \ readonly OperationCollection $operationCollection,\n){ }\npublic function performOperation(ApiInput\
  \ $apiInput): ApiOutput\n{\n$operation = $this->operationCollection->getOperation($apiInput->operation);\n\
  $inputData = ($operation->metadata->input)\n? $this->validationHandler->deserializeAndValidate($apiInput->data,\
  \ $operation->metadata->input)\n: $apiInput->data\n;\nreturn $operation->handler->perform($inputData);\n\
  }\n}\n```\n\n现在，构造函数也注入了 `ValidationHandler` 服务。`performOperation` 方法会验证 API 输入数据（如果操作的元数据指定了输入模型类）。如果验证失败，将抛出一个\
  \ `ValidationFailedException` 异常，并且操作将不会被执行。\n\n### 处理反序列化和验证错误\n\n正如我们处理 `NotFoundOperationException`\
  \ 一样，我们必须处理验证错误异常（`InvalidPayloadException` 和 `ValidationFailedException`），以便能够返回可读的\
  \ JSON 输出。让我们修改 `KernelSubscriber`。\n\n```\nnamespace App\\EventSubscriber;\nuse\
  \ App\\Exception\\InvalidPayloadException;\nuse App\\Exception\\NotFoundOperationException;\n\
  use Symfony\\Component\\EventDispatcher\\EventSubscriberInterface;\nuse Symfony\\\
  Component\\HttpFoundation\\JsonResponse;\nuse Symfony\\Component\\HttpKernel\\Event\\\
  ExceptionEvent;\nuse Symfony\\Component\\HttpKernel\\KernelEvents;\nuse Symfony\\\
  Component\\Validator\\Exception\\ValidationFailedException;\nclass KernelSubscriber\
  \ implements EventSubscriberInterface\n{\npublic static function getSubscribedEvents():\
  \ array\n{\nreturn [\nKernelEvents::EXCEPTION => 'onException',\n];\n}\npublic function\
  \ onException(ExceptionEvent $event): void\n{\n$exception = $event->getThrowable();\n\
  if($exception instanceof ValidationFailedException){\n$errors = [];\nforeach($exception->getViolations()\
  \ as $violation) {\n$errors[$violation->getPropertyPath()] = $violation->getMessage();\n\
  }\n$event->setResponse( new JsonResponse([\n'errors' => $errors\n], 400));\nreturn;\n\
  }\nif($exception instanceof InvalidPayloadException) {\n$event->setResponse( new\
  \ JsonResponse([\n'payload' => $exception->getMessage()\n], 400));\nreturn;\n}\n\
  if($exception  instanceof NotFoundOperationException){\n$event->setResponse( new\
  \ JsonResponse([\n'errors' => [\n'operation' => $exception->getMessage()\n]\n],\
  \ 404));\nreturn;\n}\n}\n}\n```\n\n我们添加了两个 `if` 块来处理 `InvalidPayloadException` 和\
  \ `ValidationFailedException`。对于 `ValidationFailedException`，它会遍历所有违反约束的错误，并创建一个数组，其中键是导致错误的属性，值是错误消息。对于\
  \ `InvalidPayloadException`，它会返回异常消息。\n\n### 结论\n\n在建立了执行操作和确保传入负载有效性的机制之后，我们只需要创建接收操作请求的端点即可。\n\
  \n## 第 6 节 连接各模块：构建 API 端点\n\n我们已经建立了用于处理操作执行的核心组件。现在，是时候让客户端能够与 API 进行交互了。本节重点介绍如何创建一个\
  \ Symfony 控制器，作为接收操作请求的端点。\n\n通过在此控制器中定义路由，我们将建立一个指定的 URL，客户端可以使用它来提交操作请求。\n\n让我们探索一下如何将我们创建的各种服务连接到外部世界，从而让我们的\
  \ API 能够处理传入的操作调用。\n\n### 创建控制器\n\n在“第 1 节 请求输入与输出”中，我们学习了如何构造我们的 `ApiInput`，以便将待执行的操作和执行该操作所需的数据封装到其中。尽管我们的控制器似乎必须严格按照\
  \ `ApiInput` 模型的结构接收数据，但事实并非必须如此。在本节的剩余部分，我们将学习如何通过编写少量额外代码，就能以多种不同方式接收输入数据。\n\n\
  \n\n### 将接收到的载荷直接映射到 `ApiInput`\n\n第一种情况最为直接。接收到的载荷必须与 `ApiInput` 模型完全匹配。`MapRequestPayload`\
  \ 属性会在内部将请求载荷反序列化为模型并进行验证。如果发现任何错误，Symfony 会创建一个包含错误信息的 `ValidationFailedException`，将其包装成\
  \ `UnprocessableEntityHttpException`，并以 422 Unprocessable Entity HTTP 状态码抛出。\n\n\
  ```php\nuse App\\Api\\ApiOperationHandler;\nuse App\\Api\\Input\\ApiInput;\nuse\
  \ Symfony\\Bundle\\FrameworkBundle\\Controller\\AbstractController;\nuse Symfony\\\
  Component\\HttpFoundation\\JsonResponse;\nuse Symfony\\Component\\Routing\\Annotation\\\
  Route;\nuse Symfony\\Component\\HttpKernel\\Attribute\\MapRequestPayload;\n\nclass\
  \ ApiController extends AbstractController\n{\n    public function __construct(\n\
  \        private readonly ApiOperationHandler $apiOperationHandler\n    ) {}\n\n\
  \    #[Route('/api/v1/operation', name: 'api_operation', methods: ['POST'])]\n \
  \   public function operationAction(#[MapRequestPayload] ApiInput $apiInput): JsonResponse\n\
  \    {\n        $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
  \        return new JsonResponse($apiOutput->data, $apiOutput->code);\n    }\n}\n\
  ```\n\n### 将操作名称作为路由参数接收\n\n此类情况下，操作名称来源于路由参数 `operationSlug`，而操作数据来自请求载荷。为了处理该请求，我们需要做一些修改：\n\
  \n#### 从 Slug 中获取操作名称\n\n为了确定需要执行哪个操作，让我们在 `OperationNames` 枚举中创建一个静态方法，将操作 slug\
  \ 转换为操作名称。\n\n```php\nuse function Symfony\\Component\\String\\u;\n// .......\n\n\
  public static function getBySlug(string $slug): string\n{\n    return u($slug)->camel()->title();\n\
  }\n```\n\n`getBySlug` 函数使用 Symfony String 的 `u` 函数将 slug 转为驼峰式并将首字母大写。通过这种方式，我们成功将\
  \ slug 转换成了有效的操作名称。\n\n#### 手动创建 `ApiInput` 模型\n\n在下面的代码中，我们将按照以下步骤创建 `ApiInput`\
  \ 模型：\n\n- 确保接收到的载荷是有效的 JSON。这一步是强制性的，因为此情况下我们没有使用 `MapRequestPayload` 属性。\n- 使用\
  \ `getBySlug` 函数获取操作名称，并将其作为 `ApiInput` 构造函数的第一个参数。\n- 将接收到的载荷（操作数据）解码为数组，并将其作为\
  \ `ApiInput` 构造函数的第二个参数。\n\n我们来在 `ValidationHandler` 类中创建一个方法，确保接收到的载荷是有效的 JSON：\n\
  \n```php\nclass ValidationHandler\n{\n    public function __construct(\n       \
  \ private readonly SerializerInterface $serializer,\n        private readonly ValidatorInterface\
  \ $validator\n    ) {}\n\n    // 其他方法...\n\n    public function validateAndGetJsonInput(string\
  \ $content): array\n    {\n        $data = json_decode($content, true);\n      \
  \  if (is_null($data)) {\n            if (json_last_error() !== JSON_ERROR_NONE)\
  \ {\n                throw new InvalidPayloadException('Invalid Json Payload');\n\
  \            }\n            $data = [];\n        }\n        return $data;\n    }\n\
  }\n\n#[Route('/api/v1/operation/{operationSlug}', name: 'api_slug_operation', methods:\
  \ ['POST'])]\npublic function operationActionSlug(string $operationSlug, Request\
  \ $request, ValidationHandler $validationHandler): JsonResponse\n{\n    $data =\
  \ $validationHandler->validateAndGetJsonInput($request->getContent());\n    $apiInput\
  \ = new ApiInput(\n        OperationNames::getBySlug($operationSlug),\n        $data\n\
  \    );\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
  \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n```\n\n如果没有错误，`ApiInput`\
  \ 的第二个参数（保存操作数据）会接收到 JSON 解码后的数据。请注意，此数据会根据操作输入模型，由 `performOperation` 方法进行验证。为了进行验证，它使用了上一章中的\
  \ `ValidationHandler` 服务。\n\n### 不使用 Slug 参数，为每个操作使用独立的路由\n\n此情况与前一种类似，但路由不通过参数传递操作\
  \ slug，而是直接定义操作名称。这样，我们可以在保持 API 面向操作的同时，方便文档的生成。\n\n```php\n#[Route('/api/v1/operation/send-payment',\
  \ name: 'api_send_payment_operation', methods: ['POST'])]\npublic function operationActionSendPayment(Request\
  \ $request, ValidationHandler $validationHandler): JsonResponse\n{\n    $data =\
  \ $validationHandler->validateAndGetJsonInput($request->getContent());\n    $apiInput\
  \ = new ApiInput(\n        OperationNames::SendPayment->name,\n        $data\n \
  \   );\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
  \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n```\n\n###\
  \ 使用 HTTP GET 路由\n\nHTTP GET 请求通常通过 URL 查询字符串接收数据。因此，为了获取数据并将其传递给 `ApiInput` 模型，我们可以依赖\
  \ Symfony Request 的查询参数。\n\n```php\n#[Route('/api/v1/operation/get-campaigns', name:\
  \ 'api_send_get_campaigns', methods: ['GET'])]\npublic function operationActionGetCampaigns(Request\
  \ $request): JsonResponse\n{\n    $apiInput = new ApiInput(\n        OperationNames::GetCampaigns->name,\n\
  \        $request->query->all()\n    );\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
  \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n```\n\n###\
  \ 在路由参数中传递数据\n\n可能会出现某些参数通过路由参数传递，而不是使用查询字符串或请求载荷的情况。让我们看下面的例子。\n\n```php\n#[Route('/api/v1/sensor/{sensorId}/operation/update-data',\
  \ name: 'api_update_sensor_data', methods: ['PATCH'])]\npublic function operationActionUpdateSensorData(int\
  \ $sensorId, Request $request, ValidationHandler $validationHandler): JsonResponse\n\
  {\n    $data = $validationHandler->validateAndGetJsonInput($request->getContent());\n\
  \    $apiInput = new ApiInput(\n        OperationNames::UpdateSensorData->name,\n\
  \        array_merge(\n            $data,\n            ['sensorId' => $sensorId]\n\
  \        )\n    );\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
  \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n```\n\n在此情况下，我们需要手动将\
  \ `sensorId` 参数添加到接收到的载荷中，这通过 PHP 的 `array_merge` 函数实现。\n\n作为改进，我们可以创建一个枚举来保存这些参数名称，而不是硬编码\
  \ `sensorId` 参数名。\n\n```php\nenum OperationParametersNames: string\n{\n    case\
  \ SensorId = 'sensorId';\n}\n```\n\n然后，我们将 `array_merge` 部分改成这样：\n\n```php\narray_merge(\n\
  \    json_decode($request->getContent(), true),\n    [OperationParametersNames::SensorId->value\
  \ => $sensorId]\n)\n```\n\n### 与传统的 CRUD 路由结合使用\n\n与我们可以通过多种方式定义端点来接收待执行的操作和数据一样，我们也可以将面向操作的路由与传统的\
  \ CRUD 路由结合使用。\n\n```php\n#[Route('/api/v1/template')]\nclass ApiTemplatingController\
  \ extends AbstractController\n{\n    public function __construct(\n        private\
  \ readonly ApiOperationHandler $apiOperationHandler\n    ) {}\n\n    #[Route('',\
  \ name: 'api_get_templates', methods: ['GET'])]\n    public function getTemplates():\
  \ JsonResponse\n    {\n        return new JsonResponse([]);\n    }\n\n    #[Route('/operation',\
  \ name: 'api_template_operation', methods: ['POST'])]\n    public function operationAction(#[MapRequestPayload]\
  \ ApiInput $apiInput): JsonResponse\n    {\n        $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
  \        return new JsonResponse($apiOutput->data, $apiOutput->code);\n    }\n}\n\
  ```\n\n如上控制器所示，它结合了一个 CRUD 类型的端点（`getTemplates`）和一个面向操作的端点（`operationAction`）。\n\
  \n\n\n\n### 结论\n\n在本节中，我们学习了如何以不同方式构建端点，以便客户端能够连接到我们的 API 并执行操作。在下一章中，我们将研究如何为我们的\
  \ API 创建版本，从而允许某些操作仅适用于一个或多个 API 版本。\n\n## 第 7 节 对 API 进行版本管理\n\n在开发 API 时，添加新功能和新操作是很常见的，同样常见的是，其中一些新功能仅对特定版本可用。在本节中，我们将探讨如何指定一个操作仅对一个或多个版本可用。\n\
  \n### 一个新的元数据参数\n\n操作元数据是指定操作在哪些版本中可用的理想位置。为了实现这一点，让我们向该属性添加一个新参数。\n\n```\n#[\\\
  Attribute(\\Attribute::TARGET_CLASS)]\nclass OperationMetadata\n{\n    public function\
  \ __construct(\n        public readonly string $name,\n        public readonly ?array\
  \ $version = null,\n        public readonly ?string $input = null\n    ){ }\n}\n\
  ```\n\n`version` 参数指定了哪些 API 版本可以执行该操作。如果未指定版本，则意味着不要求任何特定版本。现在，我们需要以某种方式接收 API\
  \ 版本。一种方式是使用 Symfony 路由参数。\n\n### 接收版本\n\n以下代码向控制器路由添加了一个 `version` 参数。\n\n```\n\
  #[Route('/api/{version}/operations', name: 'post_api_operation', methods: ['POST'])]\n\
  public function operationAction(string $version, #[MapRequestPayload] ApiInput $apiInput):\
  \ JsonResponse\n{\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput,\
  \ $version);\n    return new JsonResponse($apiOutput->data, $apiOutput->code);\n\
  }\n```\n\n`version` 参数作为路由参数传入。然后，该参数被传递给 `ApiOperationHandler`，以便其能在内部检查版本是否与操作匹配。\n\
  \n### 检查版本\n\n现在，是时候对 `ApiOperationHandler` 进行一些修改，使其能够检查版本了。\n\n```\npublic function\
  \ performOperation(ApiInput $apiInput, ?string $version = null): ApiOutput\n{\n\
  \    $operation = $this->operationCollection->getOperation($apiInput->operation);\n\
  \    if(!is_null($version) && $operation->metadata->version && !in_array($version,\
  \ $operation->metadata->version)) {\n        OperationDoesNotSupportApiVersionException(sprintf(\n\
  \            '操作支持的版本：%s - 使用的版本：%s',\n            implode(“，”, $operation->metadata->version),\n\
  \            $version\n        ));\n    }\n    $inputData = ($operation->metadata->input)\n\
  \        ? $this->validationHandler->deserializeAndValidate($apiInput->data, $operation->metadata->input)\n\
  \        : null\n    ;\n    $operation->handler->perform($inputData);\n}\n```\n\n\
  `performOperation` 方法现在接收 `version` 作为一个可选参数。然后，该方法检查以下条件：\n\n- 传入了版本。\n- 操作元数据中保存了版本信息。\n\
  - 传入的版本不存在于操作允许的版本数组中。\n\n如果满足上述条件，则会抛出一个 `OperationDoesNotSupportApiVersionException`\
  \ 异常，告知客户端该操作无法在该 API 版本上执行。让我们看一下异常代码。\n\n```\nnamespace App\\Exception;\nclass\
  \ OperationDoesNotSupportApiVersionException extends \\RuntimeException\n{\n}\n\
  ```\n\n这个异常本身不执行任何操作。我们只需在 `KernelSubscriber` 中捕获它，以便在 JSON 响应中告知用户版本错误。\n\n###\
  \ 在 KernelSubscriber 中检查 OperationDoesNotSupportApiVersionException 异常\n\n正如我们在上一节中所做的那样，我们必须在内核订阅器中检查版本错误，并正确地格式化错误信息。\n\
  \n```\nif($exception instanceof OperationDoesNotSupportApiVersionException){\n \
  \   $event->setResponse( new JsonResponse([\n        'errors' => [\n           \
  \ 'operation_version' => $exception->getMessage()\n        ]\n    ], 400));\n  \
  \  return;\n}\n```\n\n如你所见，我们只是为这种类型的异常添加了另一个条件判断。\n\n### 结论\n\n在本节中，我们扩展了 `OperationMetadata`\
  \ 属性，添加了一个新参数来指定操作所支持的 API 版本。在最后一节中，我们将看到如何利用 Symfony 的 Monolog Bundle 及其事件系统来自动记录每个\
  \ API 的请求和响应。\n\n## 第 8 节 监控操作\n\n在开发 API（无论采用何种方法）时，另一个需要考虑的关键方面是如何监控它们的性能。例如：\n\
  \n-   一个操作需要多长时间来处理？\n-   哪些操作最容易导致瓶颈？\n-   每个操作或端点的错误率（4xx/5xx）是多少？\n-   有多少比例的请求超过了可接受的延迟阈值（例如，第\
  \ 95 百分位数）？\n\n有许多工具允许 DevOps 人员监控 API，例如 Prometheus + Grafana、ELK（Elastic/Logstash/Kibana）、OpenTelemetry\
  \ 等。\n\n在本章中，我们不会介绍如何设置外部监控工具。相反，我们将重点介绍如何使用 Symfony 的内置功能生成包含详细执行数据的日志文件。之后，开发人员和\
  \ DevOps 工程师可以将这些日志导入任何监控平台，以构建仪表板并分析结果。\n\n### 创建 Monolog 处理器\n\n在上一章的*第 3 节 先决条件*中，我们学习了如何安装\
  \ Monolog bundle：它是 Symfony 应用程序中日志记录的事实标准。其配置位于 `config/packages/monolog.yaml`\
  \ 文件中。以下是一个示例，它定义了一个写入专用日志文件的自定义处理器：\n\n```\nmonolog:\n    handlers:\n        operations_performance:\n\
  \            type: stream\n            path: \"%kernel.logs_dir%/op_performance.log\"\
  \n            level: debug\n            channels: [op_performance]\n    channels:\n\
  \        - deprecation # 弃用警告会记录到专用的“deprecation”通道中（如果存在）\n        - op_performance\n\
  ```\n\n这里，`operations_performance` 处理器监听 `op_performance` 通道，并将所有 debug 级别（及更高级别）的记录写入\
  \ `var/log/op_performance.log` 文件（`%kernel.logs_dir%` 变量的默认位置）。由于最近的 Symfony 版本包含了自动服务注册功能，内核会为你配置的每个\
  \ Monolog 自定义通道动态创建一个服务。服务 ID 由处理器的通道名称转换而来，转换为驼峰格式，并附加 `Logger` 字符串。在此示例中，服务变为\
  \ `$opPerformanceLogger`。\n\n\n\n\n### 创建日志包装器以记录操作执行信息\n\n在本节中，我们将探讨如何注入上一节配置的日志记录器，以及如何使用它向配置的文件写入内容。\n\
  \n```php\nuse Psr\\Log\\LoggerInterface;\nuse Symfony\\Component\\Uid\\Uuid;\nclass\
  \ OperationPerformanceLogger\n{\npublic function __construct(\nprivate readonly\
  \ LoggerInterface $opPerformanceLogger\n){}\npublic function logStartOperation(string\
  \ $operation, ?array $inputData): string\n{\n$id = Uuid::v4();\n$this->opPerformanceLogger->info(json_encode([\n\
  'operation' => $operation,\n'id' => $id,\n'input_data' => $inputData ?? [],\n'ts_start'\
  \ => microtime(true)\n]));\nreturn (string)$id;\n}\npublic function logEndOperation(string\
  \ $operation, string $id, int $responseCode, ?array $outputData): void\n{\n$this->opPerformanceLogger->info(json_encode([\n\
  'operation' => $operation,\n'id' => $id,\n'output_data' => $outputData ?? [],\n\
  'ts_end' => microtime(true),\n'response_code' => $responseCode\n]));\n}\n}\n```\n\
  \n我们从构造函数开始。如你所见，我们注入了 `$opPerformanceLogger` 服务，它实现了 Symfony 内核所需的 `Psr\\Log\\\
  LoggerInterface`。该服务暴露了两个关键方法：\n\n- **`logStartOperation`**：此方法应在收到操作请求时调用。它接收操作名称和输入值数组（如果没有则为空数组），并将以下信息（以\
  \ JSON 格式）写入日志文件：\n    - **`operation`**：操作名称\n    - **`id`**：用于标识请求的 ID。这里我们使用\
  \ Symfony Uid 组件生成一个 UUID v4 作为 ID。\n    - **`input_data`**：接收到的输入数据数组，如果没有接收到输入数据则为空数组。\n\
  \    - **`ts_start`**：收到操作的时间戳。\n\n    此方法返回生成的 ID。在接下来的几节中，我们将学习如何在请求中携带此 ID，以便用于记录操作终止数据。\n\
  \n- **`logEndOperation`**：此方法应在操作请求执行结束、响应已发送给客户端后调用。它接收操作名称、在 `logStartOperation`\
  \ 方法中生成的 ID、返回给客户端的 HTTP 响应码以及执行结果数据。该方法将以下信息写入日志文件：\n    - **`operation`**：操作名称。\n\
  \    - **`id`**：用于标识请求的 ID，与 `logStartOperation` 方法中生成的 ID 相同。\n    - **`output_data`**：输出数据数组，如果没有向客户端返回响应数据则为空数组。这可能是出现\
  \ 204 No Content HTTP 响应的情况。\n    - **`ts_end`**：操作结束的时间戳。\n    - **`response_code`**：返回给客户端的\
  \ HTTP 响应码。\n\n有了这个日志服务，你可以利用 Symfony 的事件系统自动记录每个 API 操作的开始和结束。\n\n### 在收到操作请求时写入日志\n\
  \n我们将使用 `kernelEvents.REQUEST` Symfony 事件来检测是否收到了操作请求，如果是，则写入日志。为此，我们将创建一个新的 Symfony\
  \ 内核订阅者：\n\n```php\nuse App\\Api\\Input\\ApiInput;\nuse App\\Api\\Logger\\OperationPerformanceLogger;\n\
  use Symfony\\Component\\EventDispatcher\\EventSubscriberInterface;\nuse Symfony\\\
  Component\\HttpKernel\\Event\\RequestEvent;\nuse Symfony\\Component\\HttpKernel\\\
  KernelEvents;\nuse Symfony\\Component\\Serializer\\Exception\\ExceptionInterface;\n\
  use Symfony\\Component\\Serializer\\SerializerInterface;\nclass OperationPerformanceSubscriber\
  \ implements EventSubscriberInterface\n{\npublic const string OP_REQ_ATTR = 'OP_REQ';\n\
  public function __construct(\nprivate readonly SerializerInterface $serializer,\n\
  private readonly OperationPerformanceLogger $operationPerformanceLogger\n){}\npublic\
  \ static function getSubscribedEvents(): array\n{\nreturn [\nKernelEvents::REQUEST\
  \   => ['onOperationReceived', 2]\n];\n}\npublic function onOperationReceived(RequestEvent\
  \ $event): void\n{\n$uri = $event->getRequest()->getUri();\nif(!preg_match('#\\\
  /api\\/v[1-9]{1}\\/operation#', $uri)) {\nreturn;\n}\ntry{\n$apiInput = $this->serializer->deserialize($event->getRequest()->getContent(),\
  \ ApiInput::class, 'json');\nif(!empty($apiInput->operation)) {\n$operationRequestId\
  \ = $this->operationPerformanceLogger->logStartOperation($apiInput->operation, $apiInput->data);\n\
  $event->getRequest()->attributes->set(self::OP_REQ_ATTR, $operationRequestId . ':'\
  \ . $apiInput->operation);\n}\n}\ncatch(ExceptionInterface $e) {}\n}\n}\n```\n\n\
  让我们来分析一下上述新的订阅者。该订阅者持续监听 `KernelEvents::REQUEST` 事件，并在捕获到该事件后执行 `onOperationReceived`\
  \ 方法。此方法执行以下逻辑：\n\n- 检查请求 URI 是否匹配操作请求路由路径。\n- 如果不匹配，则返回且不执行额外逻辑。\n- 如果匹配，则将负载反序列化为\
  \ `ApiInput` 模型。\n- 如果反序列化过程没有错误，该方法使用 `OperationPerformanceLogger` 服务中的 `logStartOperation`\
  \ 方法写入操作请求信息。然后，它获取由 `logStartOperation` 方法返回的 `$operationRequestId`，并将其保存到请求属性包中，以便稍后使用。\n\
  \n正如你所注意到的，`onOperationReceived` 的 catch 块中没有代码。这是因为，如果在验证接收到的 API 输入负载后出现任何错误，客户端将收到\
  \ 400 Bad Request 响应，并且请求不会继续到处理器，因此在这种情况下不值得写入日志。\n\n\n\n### 在操作请求结束时写入日志\n\n最后，我们只需在操作请求结束后写入日志。为此，我们将依赖\
  \ Symfony 的 `KernelEvents.TERMINATE` 事件。\n\n```\nuse App\\Api\\Input\\ApiInput;\n\
  use App\\Api\\Logger\\OperationPerformanceLogger;\nuse Symfony\\Component\\EventDispatcher\\\
  EventSubscriberInterface;\nuse Symfony\\Component\\HttpKernel\\Event\\RequestEvent;\n\
  use Symfony\\Component\\HttpKernel\\Event\\TerminateEvent;\nuse Symfony\\Component\\\
  HttpKernel\\KernelEvents;\nuse Symfony\\Component\\Serializer\\Exception\\ExceptionInterface;\n\
  use Symfony\\Component\\Serializer\\SerializerInterface;\nclass OperationPerformanceSubscriber\
  \ implements EventSubscriberInterface\n{\npublic const string OP_REQ_ATTR = 'OP_REQ';\n\
  public function __construct(\nprivate readonly SerializerInterface $serializer,\n\
  private readonly OperationPerformanceLogger $operationPerformanceLogger\n){}\npublic\
  \ static function getSubscribedEvents(): array\n{\nreturn [\nKernelEvents::REQUEST\
  \   => ['onOperationReceived', 2],\nKernelEvents::TERMINATE => 'onOperationTerminated'\n\
  ];\n}\npublic function onOperationReceived(RequestEvent $event): void\n{\n$uri =\
  \ $event->getRequest()->getUri();\nif(!preg_match('#^\\/api\\/v[1-9]{1}\\/operation#',\
  \ $uri)) {\nreturn;\n}\ntry{\n$apiInput = $this->serializer->deserialize($event->getRequest()->getContent(),\
  \ ApiInput::class, 'json');\nif(!empty($apiInput->operation)) {\n$operationRequestId\
  \ = $this->operationPerformanceLogger->logStartOperation($apiInput->operation, $apiInput->data);\n\
  $event->getRequest()->attributes->set(self::OP_REQ_ATTR, $operationRequestId . ':'\
  \ . $apiInput->operation);\n}\n}\ncatch(ExceptionInterface $e) {}\n}\npublic function\
  \ onOperationTerminated(TerminateEvent $event): void\n{\n$opReqAttr = $event->getRequest()->attributes->get(self::OP_REQ_ATTR);\n\
  if($opReqAttr) {\nlist($opId, $opName) = explode(':', $opReqAttr);\n$responseArray\
  \ = ($event->getResponse()->getContent())\n? json_decode($event->getResponse()->getContent(),\
  \ true)\n: []\n;\n$responseCode = $event->getResponse()->getStatusCode();\n$this->operationPerformanceLogger->logEndOperation($opName,\
  \ $opId, $responseCode, $responseArray);\n}\n}\n}\n```\n\n现在我们来分析一下 `onOperationTerminated`\
  \ 事件。其执行流程如下：\n\n-   它检查请求属性包中是否包含键名为 `OP_REQ` 的值。如果包含，则意味着在 `REQUEST` 事件中已经记录了请求操作，现在我们需要记录其终止。\n\
  -   它使用 `:` 标记字符串来分割 `$opReqAttr`，从而获取操作 ID 和操作名称的值。\n-   它通过对接收到的响应内容应用 PHP 的 `json_decode`\
  \ 函数来创建响应数组；如果未向客户端发送响应内容，则创建 `null` 值。\n-   它获取 HTTP 响应码。\n-   最后，它使用 `OperationPerformanceLogger\
  \ logEndOperation` 方法将终止信息写入日志。\n\n"
- '# 总结


  在本章中，我们构建了面向操作的 API 的核心功能。我们通过以下方式建立了坚实的基础：


  -   为操作输入和输出定义了清晰的模型

  -   定义了一种创建操作服务的具体方式（`OperationInterface` 和 `OperationMetadata`）

  -   实现了对可能实例化较重的操作进行懒加载

  -   实现了一个用于存储操作的集中式集合，以及一个用于高效检索和执行操作的专用处理器

  -   使用专用验证处理器验证操作数据，保护 API 免受无效载荷的攻击

  -   精心设计了作为所有 API 请求入口点的端点，简化了用户交互和请求处理

  -   结合 Symfony Monolog 包和 Symfony 事件系统，记录操作请求的接收和终止，以便日后分析 API 系统的健康状况


  有了这些核心功能，我们的 API 就能够处理各种操作并提供所需的功能。然而，安全性仍然至关重要。在下一章中，我们将把重点转移到加强端点和单个操作的安全性上，以确保
  API 环境的安全。


  '
- "# 2. 保护操作安全\n\n在本节中，我们将使用 Symfony 的安全特性来保护端点（endpoints）和操作（operations）。为了保护端点，我们将使用\
  \ Symfony 的防火墙系统，通过它来建立用户认证机制。然后，我们将依靠 Symfony 的投票器（voters），根据特定规则来授予或拒绝操作的执行。\n\
  \n## 第一节 用户\n\n在本节中，我们将创建用户实体，用于存储可以访问 API 的用户。然后，我们将启动在本书前言“第 3 节 前提条件”中配置的数据库，并向其中加载用户。\n\
  \n### 用户实体\n\n我们将使用 Symfony 的 maker 命令来创建实体。为此，我们需要在项目根文件夹中执行以下命令：\n\n```\nbin/console\
  \ make:entity\n```\n\n创建一个名为 `token` 的字符串字段，一个名为 `email` 的字符串字段，以及一个名为 `roles` 的\
  \ JSON 字段（JSON 字段需要支持它们的平台，例如 PostgreSQL 和 MySQL 5.7+）：\n\n-   `token` 字段将存储令牌，该令牌将在本章后续部分用于对用户进行身份验证。\n\
  -   `email` 字段将用作标识符。\n-   `roles` 字段将存储用户角色。我们将使用该字段，通过 Symfony 投票器来授权特定角色执行操作。\n\
  \n命令执行完毕后，您可以在 `src/Entity` 文件夹下看到一个新的用户类。它看起来应该像这样：\n\n```\nnamespace App\\Entity;\n\
  use App\\Repository\\UserRepository;\nuse Doctrine\\ORM\\Mapping as ORM;\n#[ORM\\\
  Entity(repositoryClass: UserRepository::class)]\nclass User\n{\n#[ORM\\Id]\n#[ORM\\\
  GeneratedValue]\n#[ORM\\Column]\nprivate ?int $id = null;\n#[ORM\\Column(length:\
  \ 255)]\nprivate ?string $token = null;\n#[ORM\\Column(length: 255)]\nprivate ?string\
  \ $email = null;\n#[ORM\\Column]\nprivate array $roles = [];\npublic function getId():\
  \ ?int\n{\nreturn $this->id;\n}\npublic function getToken(): ?string\n{\nreturn\
  \ $this->token;\n}\npublic function setToken(string $token): static\n{\n$this->token\
  \ = $token;\nreturn $this;\n}\npublic function getEmail(): ?string\n{\nreturn $this->email;\n\
  }\npublic function setEmail(string $email): static\n{\n$this->email = $email;\n\
  return $this;\n}\npublic function getRoles(): array\n{\nreturn $this->roles;\n}\n\
  public function setRoles(array $roles): static\n{\n$this->roles = $roles;\nreturn\
  \ $this;\n}\n}\n```\n\n我们现在必须让我们的 `User` 实体实现 `Symfony UserInterface`。实现此接口是 Symfony\
  \ 认证系统识别 `User` 实体为有效用户的必要条件。\n\n```\nnamespace App\\Entity;\nuse App\\Repository\\\
  UserRepository;\nuse Doctrine\\ORM\\Mapping as ORM;\nuse Symfony\\Component\\Security\\\
  Core\\User\\UserInterface;\n#[ORM\\Entity(repositoryClass: UserRepository::class)]\n\
  class User implements UserInterface\n{\n// ... 其他方法在此\npublic function eraseCredentials()\n\
  {\n}\npublic function getUserIdentifier(): string\n{\nreturn $this->getEmail();\n\
  }\n}\n```\n\n由于我们的实体已经定义了 `getRoles` 方法（因为它是一个实体属性），我们需要定义接口要求的另外两个方法：\n\n-   **eraseCredentials**：我们可以使用此方法来清除存储在此对象中的敏感信息。我们将其留空，因为我们没有存储诸如明文密码之类的临时敏感数据。\n\
  -   **getUserIdentifier**：我们使用此方法来返回用户标识符，即电子邮件。\n\n\n\n### 向数据库填充用户数据\n\n借助 Symfony\
  \ Fixtures Bundle，我们可以创建充当数据库加载服务的类。这些服务必须位于 `src/DataFixtures` 文件夹下，并且必须继承 `Doctrine\\\
  Bundle\\FixturesBundle\\Fixture` 类。让我们创建一个 Fixture 类，用于向 `User` 实体填充用户数据：\n\n```\n\
  namespace App\\DataFixtures;\nuse App\\Entity\\User;\nuse Doctrine\\Bundle\\FixturesBundle\\\
  Fixture;\nuse Doctrine\\Persistence\\ObjectManager;\nclass UserFixtures extends\
  \ Fixture\n{\npublic function load(ObjectManager $manager): void\n{\n$user = new\
  \ User();\n$user->setToken('vWvn1GOu2Lx5foFgQrRp');\n$user->setRoles(['ROLE_USER']);\n\
  $user->setEmail('spiderman@avengers.com');\n$user2 = new User();\n$user2->setToken('zPLhK8iQqg9fg7u5jnp');\n\
  $user2->setRoles(['ROLE_SENDER']);\n$user2->setEmail('captain-america@avengers.com');\n\
  $manager->persist($user);\n$manager->persist($user2);\n$manager->flush();\n}\n}\n\
  ```\n\n`load` 方法接收 Doctrine 的 `ObjectManager` 服务作为参数。在该方法内部，我们创建了两个用户，一个具有 `ROLE_USER`\
  \ 角色，另一个具有 `ROLE_SENDER` 角色。然后，我们使用 `ObjectManager` 的 `persist` 和 `flush` 方法将它们保存到数据库中。\n\
  \n要执行 fixture 并将用户数据加载到数据库，我们必须执行以下命令：\n\n*   第一个命令只需要执行一次。它创建数据库模式，以便下一个命令能够成功加载数据行。如果你之前已创建数据库，则必须在再次创建之前使用\
  \ `doctrine:schema:drop` 命令删除它。在真实环境中，请考虑使用 Doctrine 迁移。\n\n```\nbin/console doctrine:schema:create\n\
  bin/console doctrine:fixtures:load\n```\n\n命令执行完毕后，我们的用户表就已经加载好了，可以开始下一节的内容了。\n\n\
  ### 结论\n\n在本节中，我们创建了 `User` 实体，它代表了存储在数据库中的、可以访问我们 API 的用户。在下一节中，我们将创建一个 Symfony\
  \ 防火墙，它能够保护我们的 API 端点，并只允许经过身份验证的用户访问。\n\n## 第 2 节：保护端点\n\n为了确保只有经过身份验证的用户才能访问我们的\
  \ API 端点，我们将使用自定义的 [Symfony 身份验证器](https://symfony.com/doc/current/security/custom_authenticator.html)来实现基于令牌的身份验证。它将从请求头中提取令牌，进行验证，如果令牌有效，则用户身份验证成功；否则，将向客户端返回身份验证失败的信息。\n\
  \n### 操作身份验证器\n\n该身份验证器服务继承了 [AbstractAuthenti​cator](https://github.com/symfony/symfony/blob/current/src/Symfony/Component/Security/Http/Authenticator/AbstractAuthenticator.php)\
  \ 类，该类实现了 [AuthenticatorInt​erface](https://github.com/symfony/symfony/blob/current/src/Symfony/Component/Security/Http/Authenticator/AuthenticatorInterface.php)\
  \ 接口。所有身份验证器都必须实现此接口。`AbstractAuthenticator` 定义了 `createToken` 方法，该方法应能满足大多数用例。下面你可以看到身份验证器的代码：\n\
  \n```\nnamespace App\\Security;\nuse Symfony\\Component\\HttpFoundation\\JsonResponse;\n\
  use Symfony\\Component\\HttpFoundation\\Request;\nuse Symfony\\Component\\HttpFoundation\\\
  Response;\nuse Symfony\\Component\\Security\\Core\\Authentication\\Token\\TokenInterface;\n\
  use Symfony\\Component\\Security\\Core\\Exception\\AuthenticationException;\nuse\
  \ Symfony\\Component\\Security\\Core\\Exception\\CustomUserMessageAuthenticationException;\n\
  use Symfony\\Component\\Security\\Http\\Authenticator\\AbstractAuthenticator;\n\
  use Symfony\\Component\\Security\\Http\\Authenticator\\Passport\\Badge\\UserBadge;\n\
  use Symfony\\Component\\Security\\Http\\Authenticator\\Passport\\Passport;\nuse\
  \ Symfony\\Component\\Security\\Http\\Authenticator\\Passport\\SelfValidatingPassport;\n\
  class ApiTokenAuthenticator extends AbstractAuthenticator\n{\npublic function supports(Request\
  \ $request): ?bool\n{\nreturn $request->headers->has('X-AUTH-TOKEN') || preg_match('#\\\
  /api\\/v1#', $request->getUri());\n}\npublic function authenticate(Request $request):\
  \ Passport\n{\n$apiToken = $request->headers->get('X-AUTH-TOKEN');\nif (empty($apiToken))\
  \ {\nthrow new CustomUserMessageAuthenticationException('未提供 API 令牌');\n}\nreturn\
  \ new SelfValidatingPassport(new UserBadge($apiToken));\n}\npublic function onAuthenticationSuccess(Request\
  \ $request, TokenInterface $token, string $firewallName): ?Response\n{\nreturn null;\n\
  }\npublic function onAuthenticationFailure(Request $request, AuthenticationException\
  \ $exception): JsonResponse\n{\n$data = [\n'message' => strtr($exception->getMessageKey(),\
  \ $exception->getMessageData())\n];\nreturn new JsonResponse($data, Response::HTTP_UNAUTHORIZED);\n\
  }\n}\n```\n\n让我们逐步分析身份验证器的方法：\n\n*   **supports**：它决定是否处理该身份验证器。如果请求头中包含 `X-AUTH-TOKEN`，或者请求\
  \ URI 匹配 `/api/v1` 模式，则执行此身份验证器。通过实现这种方法，我们可以有效处理不包含令牌的请求，同时又不会损害安全性。\n\n*   **authenticate**：首先，它检查令牌是否为空。如果为空，则抛出异常。否则，它将返回一个\
  \ [SelfValidatingPa​ssport](https://symfony.com/doc/current/security/custom_authenticator.html%2523self-validating-passport)，并将\
  \ API 令牌作为徽章传递。返回后，安全组件将检查该令牌是否已注册。\n\n在配置 User Provider 时，我们将了解安全层如何验证令牌。\n\n*\
  \   **onAuthenticationSuccess**：仅在身份验证成功时执行。例如，可用于更新用户的有效登录计数器。在本例中，我们将其留空，以便流程继续执行。\n\
  \n*   **onAuthenticationFailure**：仅在身份验证失败时执行。在这种情况下，它会返回一个包含身份验证错误消息和 `401 Unauthorized`\
  \ 状态码的 JSON 响应。\n\n### 防火墙与用户提供器\n\n防火墙和用户提供器都必须在 Symfony 的 `config/packages/security.yaml`\
  \ 文件中定义。下面我们来展示一下：\n\n#### 用户提供器\n\n我们使用 [entity-user-provider](https://symfony.com/doc/current/security/user_providers.html%2523security-entity-user-provider)\
  \ 作为用户提供器。\n\n```\nsecurity:\n# .......\nproviders:\nusers_provider:\nentity:\n\
  class: App\\Entity\\User\nproperty: token\n```\n\n此提供器使用 Doctrine 包在 `User` 实体中查找令牌与请求头中发送的令牌匹配的用户。在\
  \ `authenticate` 方法返回 `SelfValidatingPassport` 后，安全层将使用此提供器检查令牌是否有效。\n\n#### 防火墙\n\
  \n防火墙将保护所有 URI 匹配 `^/api/v1` 模式的请求。它将使用 ApiTokenAuthenticator 对用户进行身份验证，并使用上一节配置的提供器加载用于比较的用户。\n\
  \n```\nfirewalls:\n### 其他防火墙\napi:\npattern: '^/api/v1'\nprovider: users_provider\n\
  stateless: true\ncustom_authenticators:\n- App\\Security\\ApiTokenAuthenticator\n\
  ```\n\n`stateless` 参数指示防火墙应该是无状态的还是有状态的。当设置为 `true` 时，表示 Symfony 不会将会话中的用户身份验证信息存储起来。这在基于令牌进行\
  \ API 身份验证时非常有用，因为每次请求都会在请求头中发送令牌。\n\n### 结论\n\n通过使用 Symfony 身份验证器，我们实现了只有持有有效凭据的授权用户才能访问\
  \ API。在下一节中，我们将把安全措施从端点扩展到单个操作。我们将探索 Symfony Voter 的使用，这是 Symfony 中一个灵活的授权系统。\n\n\
  \n\n## 第三节 保护操作\n\n现在，我们的端点已受到保护，只有经过身份验证的用户才能执行操作，因此下一个安全目标是启用对需要保护的操作的防护。例如，某些操作可能只允许具有特定角色的用户执行。为了实现这一目标，我们将使用\
  \ [Symfony 投票器](https://symfony.com/doc/current/security/voters.html)。\n\n### 抽象操作投票器\n\
  \n首先，让我们编写一个抽象的操作投票器，其余的操作投票器都将继承它。\n\n```php\nuse App\\Api\\ApiOperation;\nuse\
  \ Symfony\\Component\\Security\\Core\\Authorization\\Voter\\Voter;\nabstract class\
  \ OperationVoter extends Voter {\nprotected function supports(string $attribute,\
  \ mixed $subject): bool\n{\nreturn ($attribute === 'PERFORM' && $subject instanceof\
  \ ApiOperation);\n}\n}\n```\n\n`supports` 方法为所有继承它的投票器添加了通用逻辑。它检查属性参数是否持有值 `\"PERFORM\"\
  `，以及主题参数是否为 `ApiOperation` 类的实例。考虑到当前面向操作的上下文，这两项检查是合理的：\n\n-   我们始终检查属性是否持有 `\"\
  PERFORM\"` 值，因为我们始终想要执行一个操作。\n-   我们始终检查主题是否为 `ApiOperation` 实例，这样我们就能在子类中检查操作名称。\n\
  \n### 操作投票器\n\n如上一节所述，操作投票器必须继承自抽象操作投票器，并实现授权逻辑。让我们为 `SendPayment` 操作创建一个投票器，确保经过身份验证的用户拥有\
  \ `\"ROLE_SENDER\"` 角色。\n\n```php\nuse App\\Security\\Miscelanea\\OperationNames;\n\
  use Symfony\\Component\\Security\\Core\\Authentication\\Token\\TokenInterface;\n\
  class SendPaymentVoter extends OperationVoter\n{\nprotected function supports(string\
  \ $attribute, mixed $subject): bool\n{\nif(parent::supports($attribute, $subject)\
  \ && $subject->metadata->name === OperationNames::SendPayment->name){\nreturn true;\n\
  }\nreturn false;\n}\nprotected function voteOnAttribute(string $attribute, mixed\
  \ $subject, TokenInterface $token): bool\n{\nif(!in_array('ROLE_SENDER', $token->getUser()->getRoles()))\
  \ {\nreturn false;\n}\nreturn true;\n}\n}\n```\n\n`supports` 方法使用父类逻辑检查属性和主题实例，同时还检查操作名称是否为\
  \ `\"SendPayment\"`。如果 `supports` 方法返回 `\"true\"`，Symfony 将执行 `voteOnAttribute`\
  \ 方法，并检查用户是否持有 `ROLE_SENDER` 角色。如果用户角色与所需角色不匹配，将返回 403 禁止访问响应，并停止操作执行。\n\n可能存在一组操作共享相同授权规则的情况。在这种情况下，同一个投票器可以授权这组操作。为此，投票器的\
  \ `supports` 方法应检查请求的操作是否属于该集合。举个例子，假设我们有一个名为 `\"ApprovePayment\"` 的操作，并且 `\"SendPayment\"\
  ` 和 `\"ApprovePayment\"` 操作只能由 `ROLE_SENDER` 执行。我们可以在第 1 章的 `OperationNames` 枚举中创建一个名为\
  \ `getPaymentOperations` 的新静态方法。该方法应返回一个包含允许 `ROLE_SENDER` 执行的操作的数组，然后投票器应检查所请求的操作是否包含在该数组中。\n\
  \n```php\nenum OperationNames\n{\ncase SendPayment;\ncase ApprovePayment;\npublic\
  \ static function getPaymentOperations(): array\n{\nreturn [\nself::ApprovePayment->name,\n\
  self::SendPayment->name\n];\n}\n}\n```\n\n如我们所见，`getPaymentOperations` 方法返回了允许执行的操作。现在在投票器中，我们应该在\
  \ `supports` 方法中使用它：\n\n```php\nuse App\\Security\\Miscelanea\\OperationNames;\n\
  use Symfony\\Component\\Security\\Core\\Authentication\\Token\\TokenInterface;\n\
  class SenderVoter extends OperationVoter\n{\nprotected function supports(string\
  \ $attribute, mixed $subject): bool\n{\nif(parent::supports($attribute, $subject)\
  \ && in_array($subject->metadata->name, OperationNames::getPaymentOperations())){\n\
  return true;\n}\nreturn false;\n}\nprotected function voteOnAttribute(string $attribute,\
  \ mixed $subject, TokenInterface $token): bool\n{\nif(!in_array('ROLE_SENDER', $token->getUser()->getRoles()))\
  \ {\nreturn false;\n}\nreturn true;\n}\n}\n```\n\n只要用户的角色是 `\"ROLE_SENDER\"`，上述投票器就会授予对\
  \ `getPaymentOperations` 返回的数组中所有操作的访问权限。\n\n在检查投票器之前，我们还需要进行一项额外的配置。由于我们不知道是否有投票器会被执行，如果没有任何投票器被执行，则被视为所有投票器都投了弃权票。当这种情况发生时，Symfony\
  \ 会查阅安全配置参数 `\"allow_if_all_abstain\"`，该参数默认为 `\"false\"`。我们必须将此参数的值更改为 `\"true\"\
  `，因为我们希望 Symfony 在没有任何投票器被执行时允许我们执行操作。如果您想查询有关访问决策策略的更多信息，可以阅读 [Symfony 安全文档](https://symfony.com/doc/current/security/voters.html%2523changing-the-access-decision-strategy)。\n\
  \n我们可以通过在 `config/packages/security.yaml` 文件中设置新值来更改此配置：\n\n```yaml\nsecurity:\n\
  access_decision_manager:\nstrategy: unanimous\nallow_if_all_abstain: true\n```\n\
  \n### 处理访问被拒绝错误\n\nSymfony 的安全 HTTP 组件通过异常监听器来监控安全错误。为了定制“操作被拒绝”的响应，我们需要创建一个自定义订阅者。该订阅者必须在默认的安全监听器之前执行。我们可以通过为自定义的\
  \ `AccessDeniedSubscriber` 分配更高的优先级来实现这一点。\n\n```php\nuse Symfony\\Component\\EventDispatcher\\\
  EventSubscriberInterface;\nuse Symfony\\Component\\HttpFoundation\\JsonResponse;\n\
  use Symfony\\Component\\HttpKernel\\Event\\ExceptionEvent;\nuse Symfony\\Component\\\
  HttpKernel\\KernelEvents;\nuse Symfony\\Component\\Security\\Core\\Exception\\AccessDeniedException;\n\
  class AccessDeniedSubscriber implements EventSubscriberInterface\n{\npublic static\
  \ function getSubscribedEvents(): array\n{\nreturn [\nKernelEvents::EXCEPTION =>\
  \ ['onException', 2]\n];\n}\npublic function onException(ExceptionEvent $event):\
  \ void\n{\n$exception = $event->getThrowable();\nif (!$exception instanceof AccessDeniedException)\
  \ {\nreturn;\n}\n$event->setResponse(new JsonResponse(\n[ 'authorization' => $exception->getMessage()],\n\
  \n));\n}\n}\n```\n\n在上述订阅者中，有两个重要的方面需要我们注意：\n\n-   订阅者的优先级设置为 2。这使其能够首先拦截“访问被拒绝”异常并定制响应。\n\
  -   订阅者会忽略并非 `AccessDeniedException` 实例的异常。这是因为这些其他错误将由第 1 章中详述的 `KernelSubscriber`\
  \ 处理。\n\n\n\n### 检查权限\n\n在本节中，我们将修改 `ApiOperationHandler`，使其能够检查用户是否拥有执行操作的足够权限。\n\
  \n```\nuse App\\Api\\Collection\\OperationCollection;\nuse App\\Api\\Input\\ApiInput;\n\
  use App\\Api\\Output\\ApiOutput;\nuse App\\Validation\\ValidationHandler;\nuse Symfony\\\
  Bundle\\SecurityBundle\\Security;\nuse Symfony\\Component\\Security\\Core\\Exception\\\
  AccessDeniedException;\nclass ApiOperationHandler\n{\npublic function __construct(\n\
  private readonly ValidationHandler $validationHandler,\nprivate readonly OperationCollection\
  \ $operationCollection,\nprivate readonly Security $security\n){ }\npublic function\
  \ performOperation(ApiInput $apiInput): ApiOutput\n{\n$operation = $this->operationCollection->getOperation($apiInput->operation);\n\
  $isGranted = $this->security->isGranted('PERFORM', $operation);\nif(!$isGranted){\n\
  throw new AccessDeniedException('Not allowed to perform this operation');\n}\n$inputData\
  \ = ($operation->metadata->input)\n? $this->validationHandler->deserializeAndValidate($apiInput->data,\
  \ $operation->metadata->input)\n: null\n;\nreturn $operation->handler->perform($inputData);\n\
  }\n}\n```\n\n让我们重点关注 `getOperation` 行下方的变化。它使用了 `security.helper` Symfony 服务的 `isGranted`\
  \ 方法来检查用户是否拥有权限。在内部，此方法会执行所有其 `supports` 方法返回 `true` 的投票器。由于投票器采用“一致同意”策略，如果任何投票器拒绝访问，则请求的操作将被撤销；否则，该操作将被授予权限。\n\
  \n-   为了使用 `security.helper` 服务，我们通过注入 `Symfony\\Bundle\\SecurityBundle\\Security`\
  \ 类（它是该服务的别名）来使用它。\n\n### 结论\n\n通过使用投票器，我们已经实现了对操作访问的细粒度控制。这确保了只有授权的用户才能执行特定操作，从而保护了\
  \ API 中的敏感数据和功能。在下一节中，我们将处理操作需要访问当前登录用户信息的情况。\n\n## 第 4 节：从操作中访问已登录用户\n\n可能存在需要访问已登录用户数据的操作。例如，`SendPayment`\
  \ 操作在发送付款前可能需要获取当前用户的余额。因此，我们需要一种方法来实现：\n\n-   确定操作是否需要访问用户信息\n-   将用户传递给操作，以便操作可以使用它\n\
  \n### OperationRequiresUserInterface 接口\n\n让我们先创建一个接口，该接口将由那些需要访问用户信息的操作来实现。\n\n\
  ```\nuse Symfony\\Component\\Security\\Core\\User\\UserInterface;\ninterface OperationRequiresUserInterface\n\
  {\npublic function setUser(UserInterface $user): void;\n}\n```\n\n该接口声明了一个名为 `setUser`\
  \ 的方法，`ApiOperationHandler` 将使用此方法将用户传递给操作。\n\n### 将用户传递给操作\n\n我们必须修改 `ApiOperationHandler`\
  \ 的 `performOperation` 方法，使其能够检查操作是否需要用户信息并将其传递。\n\n```\npublic function performOperation(ApiInput\
  \ $apiInput): ApiOutput\n{\n$operation = $this->operationCollection->getOperation($apiInput->operation);\n\
  $isGranted = $this->security->isGranted('PERFORM', $operation);\nif(!$isGranted){\n\
  throw new AccessDeniedException('Not allowed to perform this operation');\n}\n$inputData\
  \ = ($operation->metadata->input)\n? $this->validationHandler->deserializeAndValidate($apiInput->data,\
  \ $operation->metadata->input)\n: null\n;\nif($this-security-getToken()?-getUser()\
  \ && $operation->handler instanceof OperationRequiresUserInterface) {\n$operation->handler->setUser($this->security->getToken()->getUser());\n\
  }\n$operation->handler->perform($inputData);\n}\n```\n\n在验证操作数据之后，`performOperation`\
  \ 函数会检查操作对象是否是 `OperationRequiresUserInterface` 的实例，也就是说，该操作实现了这个接口。如果是，处理器就会使用\
  \ `setUser` 方法将用户传递给该操作。\n\n### 实现 OperationRequiresUserInterface 接口\n\n让我们让 `SendPayment`\
  \ 操作实现 `OperationRequiresUserInterface` 接口。\n\n```\nuse App\\Api\\Attribute\\OperationMetadata;\n\
  use App\\Api\\Input\\Operation\\SendPaymentInput;\nuse App\\Api\\Output\\ApiOutput;\n\
  use App\\Security\\Miscelanea\\OperationNames;\nuse Symfony\\Component\\Security\\\
  Core\\User\\UserInterface;\n#[OperationMetadata(\nname: OperationNames::SendPayment->name,\n\
  input: SendPaymentInput::class,\n)]\nclass SendPaymentOperation implements OperationInterface,\
  \ OperationRequiresUserInterface\n{\nprivate ?UserInterface $user = null;\n/**\n\
  * @param SendPaymentInput $data\n*/\npublic function perform(mixed $data): ApiOutput\n\
  {\n/**\n* 发送付款的业务逻辑将在此处编写\n*/\nreturn new ApiOutput([\n'id' => '77fg76hf'\n], 202);\n\
  }\npublic function setUser(?UserInterface $user): void\n{\n$this->user = $user;\n\
  }\n}\n```\n\n如您所见，`setUser` 方法使用作为参数传递的用户来初始化操作的 `user` 属性，从那一刻起，该用户便可在操作中使用。\n\n\
  ### 结论\n\n在本节中，我们设计了一种方法，允许操作在需要时访问当前登录的用户。在下一节中，我们将学习如何根据用户角色验证输入请求。\n\n## 第 5\
  \ 节：根据用户角色验证操作\n\n在上一章中，我们根据操作输入类的属性约束来验证操作。在本章中，我们将更进一步，也根据用户角色来验证操作。\n\n### 在输入模型中使用验证组\n\
  \nSymfony [验证组](https://symfony.com/doc/current/validation/groups.html) 是一个很好的功能，可以仅针对对象的某些约束进行验证。让我们从以下假设开始：我们想要创建一个用于创建项目的操作。这些项目始终需要名称和描述。项目的开始日期和结束日期仅对\
  \ `ROLE_PROJECT_MANAGER` 用户是必需的，因此：\n\n-   **ROLE_PROJECT_MANAGER**：他们必须发送所有参数。\n\
  -   **ROLE_DEVELOPER**：他们只需发送名称和描述。\n\n下面您可以看到输入类：\n\n```\nuse Symfony\\Component\\\
  Validator\\Constraints\\IsNull;\nuse Symfony\\Component\\Validator\\Constraints\\\
  Date;\nuse Symfony\\Component\\Validator\\Constraints\\NotBlank;\nreadonly class\
  \ CreateProjectInput\n{\npublic function __construct(\n#[NotBlank(message: '名称不能为空',\
  \ groups: ['ROLE_PROJECT_MANAGER', 'ROLE_DEVELOPER'])]\npublic string $name,\n#[NotBlank(message:\
  \ '描述不能为空', groups: ['ROLE_PROJECT_MANAGER', 'ROLE_DEVELOPER'])]\npublic string\
  \ $description,\n#[NotBlank(message: '开始日期不能为空', groups: ['ROLE_PROJECT_MANAGER'])]\n\
  #[IsNull(message: '开始日期必须为空', groups: ['ROLE_DEVELOPER'])]\n#[Date(message: '开始日期必须是一个有效的日期',\
  \ groups: ['ROLE_PROJECT_MANAGER'])]\npublic string $startDate,\n#[NotBlank(message:\
  \ '结束日期不能为空', groups: ['ROLE_PROJECT_MANAGER'])]\n#[IsNull(message: '结束日期必须为空',\
  \ groups: ['ROLE_DEVELOPER'])]\n#[Date(message: '结束日期必须是一个有效的日期', groups: ['ROLE_PROJECT_MANAGER'\
  \ ])]\npublic string $endDate,\n){}\n}\n```\n\n正如您所看到的，该模型规定名称和描述对于管理员和开发人员都是必需的，但开始和结束日期只能由项目经理指定。实际上，[`IsNull`](https://symfony.com/doc/current/reference/constraints/IsNull.html)\
  \ 约束指定了开发人员不能填写这些属性。\n\n-   我们使用 `IsNull` 约束来避免由于尝试在可为空的日期字段中存储空字符串而导致数据库错误。\n\n\
  \n\n### 指定操作使用验证组\n\n现在，我们需要指定操作使用验证组，以便处理器能够据此做出响应。为此，我们将在 `OperationMetadata`\
  \ 属性中添加一个名为 `validateByRole` 的新参数，使 `ApiOperationHandler` 能够判断是否使用验证组。\n\n```\n\
  #[Attribute(\\Attribute::TARGET_CLASS)]\nclass OperationMetadata\n{\npublic function\
  \ __construct(\npublic readonly string $name,\npublic readonly ?string $version\
  \ = null,\npublic readonly ?string $input = null,\npublic readonly ?bool $validateByRole\
  \ = null\n){ }\n}\n```\n\n### 调整验证处理器以使用验证组\n\n如果你还记得第 1 章“第 5 节：验证操作”中的内容，我们创建了一个名为\
  \ `ValidationHandler` 的类，用于根据操作输入模型来反序列化和验证接收到的操作数据。我们需要修改这个类，使其能够在需要时应用验证组。\n\n\
  让我们再次查看 `ValidationHandler` 类：\n\n```\nuse App\\Exception\\InvalidPayloadException;\n\
  use Symfony\\Component\\Serializer\\SerializerInterface;\nuse Symfony\\Component\\\
  Validator\\Exception\\ValidationFailedException;\nuse Symfony\\Component\\Validator\\\
  Validator\\ValidatorInterface;\nclass ValidationHandler\n{\npublic function __construct(\n\
  private readonly SerializerInterface $serializer,\nprivate readonly ValidatorInterface\
  \ $validator\n){}\npublic function deserializeAndValidate(array|string $payload,\
  \ string $className, ?array $groups)\n{\ntry{\n$object = (is_array($payload))\n\
  ? $this->serializer->denormalize($payload, $className)\n: $this->serializer->deserialize($payload,\
  \ $className, 'json')\n;\n}\ncatch(\\Symfony\\Component\\Serializer\\Exception\\\
  ExceptionInterface $e) {\nthrow new InvalidPayloadException();\n}\n$errors = $this->validator->validate($object,\
  \ null, $groups);\nif(count($errors) > 0) {\nthrow new ValidationFailedException(null,\
  \ $errors);\n}\nreturn $object;\n}\n}\n```\n\n如你所见，我们只做了两处修改：\n\n- 在 `deserializeAndValidate`\
  \ 方法中添加了第三个参数，以便能够传入要应用的验证组。该参数可能为 null，因为可能不需要应用验证组。\n- 将验证组传递给了 Symfony 验证服务。对于不需要应用验证组的情况，Symfony\
  \ 也接受将 groups 参数设为 null。\n\n### 调整 ApiOperationHandler 以传递验证组\n\n为了完成本部分内容，我们必须指示\
  \ `ApiOperationHandler`，使其能够判断是否使用验证组。\n\n```\npublic function performOperation(ApiInput\
  \ $apiInput): ApiOutput\n{\n$operation = $this->operationCollection->getOperation($apiInput->operation);\n\
  $isGranted = $this->security->isGranted('PERFORM', $operation);\nif(!$isGranted){\n\
  throw new AccessDeniedException('Not allowed to perform this operation');\n}\n$validationGroups\
  \ = ($operation->metadata->validateByRole) ? $this->security->getUser()->getRoles()\
  \ : null;\n$inputData = ($operation->metadata->input)\n? $this->validationHandler->deserializeAndValidate($apiInput->data,\
  \ $operation->metadata->input, $validationGroups)\n: $apiInput->data\n;\nreturn\
  \ $operation->handler->perform($inputData);\n}\n```\n\n如果我们查看 `ApiOperationHandler\
  \ performOperation` 方法，它会检查 `validateByRole` 的值。如果为 true，它会为 `$validationGroups`\
  \ 变量分配一个数组，该数组包含组名（与用户角色对应）。否则，它会赋值为 null。然后，`$validationGroups` 变量作为第三个参数传递给 `deserializeAndValidate`\
  \ 方法。\n\n### 结论\n\n我们已经探讨了如何使用 Symfony 验证组，根据经过身份验证的用户角色来验证操作输入属性的子集。这为我们提供了灵活性，可以针对每个用户角色的特定权限和职责实施不同的验证规则。\n\
  \n在下一节中，我们将学习如何使用速率限制器来控制每个用户发起请求的频率，以防止滥用并确保系统稳定性。\n\n## 第 6 节：控制请求\n\n为了防止拒绝服务攻击，我们将依赖\
  \ Symfony 的速率限制器组件来控制到达 API 的请求数量。\n\n### 令牌桶策略\n\n将令牌桶想象成一个容纳有限数量令牌的容器。在对 API 进行速率限制请求的上下文中，令牌桶策略的工作原理如下：\n\
  \n- 初始时，令牌桶被填充了一定数量的令牌。\n- 每次向 API 发出请求时，系统会检查桶中是否有足够的令牌。\n- 如果有足够的令牌可用，请求继续执行，系统会从桶中移除一个令牌。\n\
  - 如果没有足够的令牌可用，则请求会被延迟，直到有更多令牌可用。\n\n随着时间的推移，令牌桶会以一定的速率重新填充，向桶中添加新的令牌。\n\n### 配置令牌桶策略\n\
  \n速率限制器的配置位于文件 `config/packages/framework.yaml` 中的 `rate_limiter` 部分。\n\n```\nframework:\n\
  rate_limiter:\napi:\npolicy: 'token_bucket'\nlimit: 5000\nrate: { interval: '20\
  \ minutes', amount: 200 }\n```\n\n上述配置允许最多 5000 个令牌，并且在发出第一个 HTTP 请求后，每 20 分钟添加\
  \ 200 个令牌。`policy` 键表示我们正在使用 `token_bucket` 策略。由于我们使用了服务的自动装配，Symfony 会创建一个名为 `apiLimiter`\
  \ 的绑定变量，该变量将持有我们的速率限制器服务。让我们在下一节中看看如何使用它。\n\n\n\n### 使用限流器\n\n我们将在第 1 章创建的订阅者中使用\
  \ `apiLimiter` 服务。具体来说，我们将监听 Symfony 的 `KernelRequest` 事件，以检查是否可以继续处理请求，即是否有可用的令牌。这样，我们就能在请求到达控制器之前检查限制。\n\
  \n```\nuse App\\Exception\\InvalidPayloadException;\nuse App\\Exception\\NotFoundOperationException;\n\
  use App\\Validation\\ValidationHandler;\nuse Symfony\\Component\\EventDispatcher\\\
  EventSubscriberInterface;\nuse Symfony\\Component\\HttpFoundation\\JsonResponse;\n\
  use Symfony\\Component\\HttpKernel\\Event\\ExceptionEvent;\nuse Symfony\\Component\\\
  HttpKernel\\Event\\RequestEvent;\nuse Symfony\\Component\\HttpKernel\\KernelEvents;\n\
  use Symfony\\Component\\RateLimiter\\RateLimiterFactory;\nuse Symfony\\Component\\\
  Validator\\Exception\\ValidationFailedException;\nuse Symfony\\Component\\RateLimiter\\\
  Exception\\RateLimitExceededException;\n\nclass KernelSubscriber implements EventSubscriberInterface\n\
  {\n    public function __construct(\n        private readonly ValidationHandler\
  \ $validationHandler,\n        private readonly RateLimiterFactory $apiLimiter\n\
  \    ){}\n\n    public static function getSubscribedEvents(): array\n    {\n   \
  \     return [\n            KernelEvents::EXCEPTION => 'onException',\n        \
  \    KernelEvents::REQUEST => 'onKernelRequest'\n        ];\n    }\n\n    public\
  \ function onKernelRequest(RequestEvent $event): void\n    {\n        $limiter =\
  \ $this->apiLimiter->create($event->getRequest()->getClientIp());\n        $limiter->consume()->ensureAccepted();\n\
  \    }\n\n    public function onException(ExceptionEvent $event): void\n    {\n\
  \        $exception = $event->getThrowable();\n        if($exception instanceof\
  \ ValidationFailedException){\n            $errors = [];\n            foreach ($exception->getViolations()\
  \ as $violation) {\n                $errors[$violation->getPropertyPath()] = $violation->getMessage();\n\
  \            }\n            $event->setResponse(new JsonResponse([\n           \
  \     'errors' => $errors\n            ], 400));\n            return;\n        }\n\
  \        if($exception instanceof RateLimitExceededException) {\n            $event->setResponse(new\
  \ JsonResponse([\n                'error' => 'Api Rate limit exceeded'\n       \
  \     ], 429));\n            return;\n        }\n        if($exception instanceof\
  \ InvalidPayloadException) {\n            $event->setResponse(new JsonResponse([\n\
  \                'error' => $exception->getMessage()\n            ], 400));\n  \
  \          return;\n        }\n        if($exception instanceof NotFoundOperationException){\n\
  \            $event->setResponse(new JsonResponse([\n                'errors' =>\
  \ [\n                    'operation' => $exception->getMessage()\n             \
  \   ]\n            ], 400));\n            return;\n        }\n    }\n}\n```\n\n\
  `onKernelRequest` 方法通过使用 `apiLimiter` 服务获取限流器，并检查请求是否被接受。如果不接受，则会抛出 `RateLimitExceededException`。我们还在\
  \ `onException` 方法中检查此异常，并向客户端返回 *429 Too Many Requests* HTTP 状态码。\n\n"
- '# 结论


  作为本章的附加内容，我们添加了一个额外的安全层，通过使用令牌桶策略为 API 能处理的请求设置限制，帮助我们防止 DoS 攻击。在下一章中，我们将深入探讨如何使用
  Symfony Messenger（Symfony 框架中的一个强大工具）来实现大型操作的异步执行，即那些可能需要一些时间才能处理完成的操作。


  '
- "# 3. API 操作的背景执行\n\n到目前为止，我们学习了如何通过单个端点管理操作、如何使用 Symfony 防火墙保护端点，以及如何使用 Symfony\
  \ voter 授予或拒绝访问操作的权限。在本章中，我们将学习如何在后台执行操作，这样客户端就无需等待操作执行完成。这对于可能需要一段时间才能执行的操作非常有用。我们的\
  \ `SendPayment` 操作就是一个很好的例子，因为它可能需要连接到支付提供商来发送资金。由于我们不知道这种连接可能需要多长时间，因此最好在后台执行它，并在操作完成后向客户端发送通知（可以是电子邮件、短信或推送通知等）。\n\
  \n## 第 1 节 将操作标记为后台执行\n\n我们在第 1 章中创建了 `OperationMetadata` 属性，用于存储与操作相关的以下数据：\n\n\
  - 操作名称\n- 类名，包含执行操作所需的参数\n- 是否需要在验证过程中将角色作为组传递\n\n现在让我们向属性类添加一个新参数，该参数将指示操作是否必须在后台执行。\n\
  \n```\nreadonly class Background\n{\n    /**\n     * 后台操作执行前的延迟时间（秒）\n     */\n\
  \    public function __construct(\n        public ?int $delay = null\n    ){ }\n\
  }\n\n#[\\Attribute(\\Attribute::TARGET_CLASS)]\nclass OperationMetadata\n{\n   \
  \ public function __construct(\n        public readonly string $name,\n        public\
  \ readonly ?string $input = null,\n        public readonly ?bool $useValidationGroups\
  \ = null,\n        public readonly ?Background $background = null\n    ){ }\n}\n\
  ```\n\n由于后台执行可能会有延迟，我们首先创建一个包含可为 `null` 的 `delay` 参数的 `Background` 类。如果提供了该参数，操作将在后台执行并增加额外的延迟。`OperationMetadata`\
  \ 现在包含一个新的 `Background` 类型参数。如果提供了该参数，操作必须发送到后台执行，而不是实时执行。\n\n现在，如果我们想将 `SendPayment`\
  \ 操作标记为后台执行，只需向属性添加 `background` 参数即可。\n\n```\n#[OperationMetadata(\n    name: OperationNames::SendPayment->name,\n\
  \    input: SendPaymentInput::class,\n    useValidationGroups: false,\n    background:\
  \ new Background(300)\n)]\nclass SendPaymentOperation implements OperationInterface\n\
  {\n    // 其余方法\n}\n```\n\n在上面的示例中，我们指明 `SendPayment` 操作将在后台执行，并且执行将延迟 300 秒（5 分钟）。\n\
  \n### 结论\n\n我们通过添加一个新参数扩展了现有的 `OperationMetadata` 属性，该参数允许我们指示特定操作是否应在后台执行。通过设置此标志，我们表明操作的执行可以是异步的，并且与用户的即时请求解耦。在下一节中，我们将探讨如何创建操作消息及其对应的处理程序，以及使用\
  \ Symfony 的 `AsMessageHandler` 属性将它们连接起来的魔力。\n\n## 第 2 节 操作消息和处理程序\n\n我们将使用 [Symfony\
  \ messenger 组件](https://symfony.com/doc/current/messenger.html)在后台执行操作。首先，我们必须创建一个消息类和一个消息处理程序。\n\
  \n### 创建操作消息\n\n```\nuse Symfony\\Component\\Security\\Core\\User\\UserInterface;\n\
  \nclass OperationMessage\n{\n    public function __construct(\n        public readonly\
  \ string $operation,\n        public readonly mixed $operationInput,\n        public\
  \ readonly ?string $userIdentifier\n    ){ }\n}\n```\n\n消息类的构造函数中包含执行操作所需的参数：操作名称、操作数据和用户标识符（如果操作需要）。现在让我们编写消息处理程序。\n\
  \n-   正如我们将在下一节中看到的，我们将使用 User 实体中的 `getUserIdentifier` 方法来设置 `OperationMessage`\
  \ 用户参数的值。此方法返回用户的电子邮件。\n\n\n\n### 创建操作处理器\n\n现在，我们需要一个处理器来管理 `OperationMessage`\
  \ 消息。\n\n```php\nuse App\\Api\\Collection\\OperationCollection;\nuse App\\Api\\\
  Operation\\OperationRequiresUserInterface;\nuse Symfony\\Component\\Messenger\\\
  Attribute\\AsMessageHandler;\nuse Doctrine\\ORM\\EntityManagerInterface;\n\n#[AsMessageHandler]\n\
  class OperationMessageHandler\n{\n    public function __construct(\n        private\
  \ readonly OperationCollection $operationCollection,\n        private readonly EntityManagerInterface\
  \ $em\n    ){ }\n\n    public function __invoke(OperationMessage $message): void\n\
  \    {\n        $apiOperation = $this->operationCollection->getOperation($message->operation);\n\
  \n        if($message->user && $apiOperation->handler instanceof OperationRequiresUserInterface)\
  \ {\n            $user = $this->em->getRepository(User::class)->findOneByEmail($message->userIdentifier);\n\
  \            if(!$user){\n                throw new \\InvalidArgumentException(\"\
  Unknown user while executing operation: \" . $message->operation);\n           \
  \ }\n            $apiOperation->handler->setUser($user);\n        }\n\n        $apiOperation->handler->perform($message->operationInput);\n\
  \    }\n}\n```\n\n处理器的 `__invoke` 函数与 `ApiOperationHandler` 的行为方式类似。它从集合中获取要执行的操作，检查操作是否需要设置用户，如果需要则进行设置。最后，它执行该操作。如果需要用户，处理器会先从数据库中检索用户，然后将用户传递给操作。由于用户实体中的\
  \ `getUserIdentifier()` 方法返回用户的电子邮件，我们在后台处理器中使用 `findOneByEmail()` 从数据库中检索用户。\n\n\
  ### 结论\n\n我们已经创建了操作消息及其对应的处理器，这样，在将操作消息分发到后台后，它就能被成功处理。在下一节中，我们将弥合现有 `ApiOperationHandler`\
  \ 之间的差距，以根据先前在 `OperationMetadata` 属性中引入的标志来检查操作是否需要后台处理。\n\n## 第三节：将操作发送到后台\n\n\
  到目前为止，我们已经建立了将操作标记为后台操作以及处理这些已入队操作（消息及其处理器）的机制。现在，我们需要让 `ApiOperationHandler` 能够检查某个操作是否必须发送到后台。让我们修改它以添加此功能。\n\
  \n```php\nuse App\\Api\\Collection\\OperationCollection;\nuse App\\Api\\Input\\\
  ApiInput;\nuse App\\Api\\Operation\\OperationRequiresUserInterface;\nuse App\\Api\\\
  Output\\ApiOutput;\nuse App\\Messenger\\OperationMessage;\nuse App\\Validation\\\
  ValidationHandler;\nuse Symfony\\Bundle\\SecurityBundle\\Security;\nuse Symfony\\\
  Component\\Messenger\\MessageBusInterface;\nuse Symfony\\Component\\Messenger\\\
  Stamp\\DelayStamp;\nuse Symfony\\Component\\Security\\Core\\Exception\\AccessDeniedException;\n\
  \nclass ApiOperationHandler\n{\n    public function __construct(\n        private\
  \ readonly ValidationHandler $validationHandler,\n        private readonly OperationCollection\
  \ $operationCollection,\n        private readonly Security $security,\n        private\
  \ readonly MessageBusInterface $bus\n    ){ }\n\n    public function performOperation(ApiInput\
  \ $apiInput): ApiOutput\n    {\n        $operation = $this->operationCollection->getOperation($apiInput->operation);\n\
  \        $isGranted = $this->security->isGranted('PERFORM', $operation);\n     \
  \   if(!$isGranted){\n            throw new AccessDeniedException('Not allowed to\
  \ perform this operation');\n        }\n\n        $validationGroups = ($operation->metadata->useValidationGroups)\
  \ ? [$this->security->getUser()->getRoles()] : null;\n        $inputData = ($operation->metadata->input)\n\
  \            ? $this->validationHandler->deserializeAndValidate($apiInput->data,\
  \ $operation->metadata->input, $validationGroups)\n            : null\n        ;\n\
  \n        $userIdentifier = null;\n        $user = null;\n        if($operation->handler\
  \ instanceof OperationRequiresUserInterface) {\n            $user = $this->security->getToken()->getUser();\n\
  \            $userIdentifier = $user->getUserIdentifier();\n        }\n\n      \
  \  if($operation->metadata->background) {\n            // 延迟时间乘以 1000，因为 DelayStamp\
  \ 期望延迟时间以毫秒为单位\n            $stamps = ($operation->metadata->background->delay)\
  \ ? [new DelayStamp($operation->metadata->background->delay * 1000)] : [];\n   \
  \         $this->bus->dispatch(new OperationMessage($operation->metadata->name,\
  \ $inputData, $userIdentifier), $stamps);\n            return new ApiOutput(['status'\
  \ => 'queued'], 202);\n        }\n\n        if($user){\n            $operation->handler->setUser($user);\n\
  \        }\n\n        return $operation->handler->perform($inputData);\n    }\n\
  }\n```\n\n让我们检查一下我们引入的更改：\n\n- 构造函数注入了 `MessageBusInterface` 服务，这使我们能够将操作发送到后台（我们将在下一章学习如何将消息路由到相应的传输器）。\n\
  - 在确保操作可以被执行、其数据有效以及是否需要用户之后，处理器通过检查操作元数据是否包含 background 参数（即不为 null）来确定操作是否必须发送到后台。如果是，处理器将按如下方式继续：\n\
  \  - 它通过查看 background 的 delay 值来检查是否必须添加延迟。如果指定了延迟，它将创建一个 `DelayStamp`，并传入指定的延迟时间（我们将延迟时间乘以\
  \ 1000，因为 `DelayStamp` 构造函数接收的延迟时间是以毫秒为单位的）。\n  - 它创建操作消息并使用总线服务分发它。\n  - 它返回一个带有\
  \ *202 Accepted* 状态码的相应输出，这表示请求的操作已被接受，稍后将执行。\n\n由于 `ApiOperationHandler` 在将操作加入队列之前验证了操作参数并检查了授权规则，因此我们不必在消息处理器中再次进行这些检查。\n\
  \n### 结论\n\n我们已经探讨了如何修改处理器以识别被标记为后台处理的操作，并如何利用 Symfony Messenger 总线服务将其入队。然而，确保高效的后台处理需要正确的配置。在下一节中，我们将学习如何配置系统，将后台操作执行消息路由到指定的传输器。\n\
  \n## 第四节：路由操作\n\n到目前为止，如果我们发送一个请求来执行标记为后台的操作，它不会被加入队列。这是因为我们需要配置最重要的部分，即，将操作消息路由到一个[传输器](https://symfony.com/doc/6.4/messenger.html%23routing-messages-to-a-transport)。\n\
  \n传输器配置位于 `config/packages/messenger.yaml` 文件中。下面，我们将展示如何将我们在“Bootfront 关键事项”的第三节“先决条件”中安装的\
  \ Redis 服务器配置为传输器，以及如何指示 Messenger 将操作消息路由到该传输器。\n\n```yaml\nframework:\n    messenger:\n\
  \        transports:\n            operations:\n                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'\n\
  \        routing:\n            App\\Messenger\\OperationMessage: 'operations'\n\
  ```\n\n如我们所见， “transports” 部分显示了可用的传输器。在这个案例中，只有一个创建的 Redis 传输器，它使用的 dsn 来自 `.env`\
  \ 文件。routing 部分指定了哪些消息被路由到哪些传输器。在这个案例中， `OperationMessage` 将被路由到 `operations` 传输器。\n\
  \n\n\n### 消费消息\n\n当传输就绪后，发送至后台的操作不会立即执行。相反，它们会被加入队列，等待一个名为 `worker` 的专用进程来处理。这些\
  \ worker 会在后台持续运行，等待队列中出现新的操作。Symfony messenger 提供了一个名为 `messenger:consume` 的实用命令来启动\
  \ worker 并使其持续消费消息。让我们看看如何从 `operations` 传输中消费消息：\n\n```\nbin/console messenger:consume\
  \ operations\n```\n\n我们不应让消费者永久运行，因为它们可能会随时间推移消耗更多内存。为避免这种情况，我们可以使用以下命令选项来控制 worker\
  \ 的活动时长：\n\n- `time-limit`：用于指定 worker 将活动多长时间（以秒为单位）。\n- `message-limit`：用于指定在退出前将消费多少条消息。\n\
  \n```\nbin/console messenger:consume operations --time-limit=3600\n```\n\n上述命令启动一个\
  \ worker，它将持续从 `operations` 传输中消费消息一小时。一小时后它将被终止。\n\n### 管理 Worker\n\n由于我们的 worker\
  \ 应在一定时间后被终止，我们应该使用一个工具来重新启动 worker，以便它们持续从队列中消费消息。[Supervisor](https://symfony.com/doc/6.4/messenger.html%2523supervisor-configuration)\
  \ 是一个易于使用的工具，可以帮助实现这一点。你可以通过以下命令安装 supervisor：\n\n```\nsudo apt-get install supervisor\n\
  ```\n\n安装完成后，我们必须编写所需的配置，以便我们的操作 worker 能在每次重启后启动。Supervisor 的配置通常存放在 `/etc/supervisor/conf.d`\
  \ 目录中。我们可以在该文件夹中创建一个名为 `operations.conf` 的文件，配置内容如下：\n\n```\n/etc/supervisor/conf.d/operations.conf\n\
  [program:messenger-consume]\ncommand=php /path/to/your/app/bin/console messenger:consume\
  \ operations --time-limit=3600\nuser=\nnumprocs=4\nstartsecs=0\nautostart=true\n\
  autorestart=true\nstartretries=5\nprocess_name=%(program_name)s_%(process_num)02d\n\
  ```\n\n让我们逐项回顾上述配置：\n\n- `command`：这是 Supervisor 将处理的命令，在我们的案例中是操作执行 worker。\n-\
  \ `user`：执行命令的操作系统用户。\n- `numprocs`：将执行的进程（worker）数量。\n- `autostart`：指示命令是否自动初始化（我们必须将其设置为\
  \ true，因为我们希望 worker 自动启动）。\n- `autorestart`：指示命令是否自动重启（我们必须将其设置为 true，因为我们希望 worker\
  \ 在每 3600 秒后自动重启）。\n- `startretries`：指示 Supervisor 在失败后尝试启动进程的次数。\n- `process_name`：指示用于构建进程名称的格式。\n\
  \n### 检查传输是否正常工作\n\n为了检查执行某个操作是否被放入队列以待后续处理，我们将修改 `SendPayment` 元数据属性，将其标记为后台操作。正如我们在“第\
  \ 1 节：将操作标记为后台”中所学的，我们必须将操作元数据 `background` 参数设置为一个新的 `Background` 类实例。\n\n现在，让我们请求操作端点来执行一个\
  \ `SendPayment` 操作。由于它被标记为后台操作，端点应使用 Redis 传输将其加入队列，并返回 202 Accepted 状态码。\n\n```\n\
  请求：\ncurl --request POST \\\n--url http://127.0.0.1:8000/api/v1/operation \\\n--header\
  \ 'Content-Type: application/json' \\\n--header 'X-AUTH-TOKEN: zPLhK8iQqg9fg7u5jnp'\
  \ \\\n--data '{\n\"operation\" : \"SendPayment\",\n\"data\" : {\n\"receiver\" :\
  \ \"8528f744fg788\",\n\"amount\" : 56.87\n}\n}'\n响应：\n202 Accepted\n{\n\"status\"\
  : \"queued\"\n}\n```\n\n至此，操作已被加入队列，但在 worker 启动之前不会被执行。在启动 worker 之前，让我们确保操作已成功路由到\
  \ Redis 传输。为此，我们可以登录到 Redis 服务器并检查操作流的内容。我们有两种方式登录 Redis 服务器：\n\n- 通过访问 docker 容器，然后使用\
  \ `redis-cli` 命令进入 Redis shell（该容器已预装 `redis-cli` 命令）。\n- 直接通过链接端口访问（需安装 `redis-cli`）。\n\
  \n我们使用第一种方式。要访问容器，打开终端并执行以下命令：\n\n```\ndocker exec -it  sh\n```\n\n进入容器提示符后，我们需要登录到\
  \ Redis 服务器。这只需运行下面的命令：\n\n```\nredis-cli\n```\n\n然后，当我们登录到 Redis 服务器后，可以运行以下命令来检查操作流的长度：\n\
  \n```\nxlen operations\n```\n\n注意：`operations` 指的是在 messenger 传输配置中定义的流名称。\n\n上述命令应返回长度\
  \ 1，这告诉我们操作已成功路由。最后，我们只需要启动一个 worker 并确保其处理该操作。让我们执行 `messenger:consume` 命令并观察操作如何被执行。\n\
  \n```\nbin/console messenger:consume operations -vv\n```\n\n执行 worker 后，我们应该看到以下输出：\n\
  \n```\n[OK] Consuming messages from transport \"operations\".\n// The worker will\
  \ automatically exit once it has received a stop signal via the messenger:stop-workers\
  \ command.\n// Quit the worker with CONTROL-C.\n[info] Received message App\\Messenger\\\
  OperationMessage\n[info] Message App\\Messenger\\OperationMessage handled by App\\\
  Messenger\\OperationMessageHandler::__invoke\n[info] App\\Messenger\\OperationMessage\
  \ was handled successfully (acknowledging to transport).\n```\n\n正如我们所见，`info` 日志告诉我们操作已成功处理。\n\
  \n### 重试失败的操作\n\n默认情况下，如果处理消息失败三次，Symfony 将丢弃该消息。你可以使用 `max_retries` 选项更改这些参数，如下所示：\n\
  \n```\nframework:\nmessenger:\ntransports:\noperations:\ndsn: '%env(MESSENGER_TRANSPORT_DSN)%'\n\
  retry_strategy\nmax_retries 2\n```\n\n如上配置所示，我们将指示 Symfony messenger 重试 2 次，而不是\
  \ 3 次。为避免失败时永久丢失消息，我们必须配置一个失败传输。当 Symfony messenger 检测到配置了失败传输时，它会将失败的消息路由到该传输，以便在导致失败的错误得到修复后稍后重试它们。让我们看看如何配置：\n\
  \n```\nframework:\nmessenger:\nfailure_transport: failed\ntransports:\noperations:\n\
  dsn: '%env(MESSENGER_TRANSPORT_DSN)%'\nretry_strategy\nmax_retries 2\nfailed 'doctrine://default?table_name=failed_operations'\n\
  ```\n\n现在，当一个操作处理失败后，Symfony 不会丢弃它，而是将失败的消息路由到 `failed` 传输。`failed` 传输使用 doctrine\
  \ 作为后端，因此操作消息将存储在我们数据库的名为 `failed_operations` 的表中。之后，我们可以像使用任何其他传输一样消费这些消息。\n\n\
  - Symfony 提供了一组命令来从失败传输中重试消息。你可以在此处阅读更多内容：[`https://symfony.com/doc/current/messenger.html`](https://symfony.com/doc/current/messenger.html)。\n\
  \n\n\n## 结论\n\n在本节中，我们学习了如何设置正确的配置，将操作消息路由到`Redis`传输层。我们还探讨了如何通过检查对应的`Redis`键来验证操作是否成功路由，并最终运行了一个工作进程来执行该操作。此外，我们还展示了如何使用`Supervisor`来管理工作进程并在其崩溃后重启。\n\
  \n下一节，我们将学习如何根据优先级创建独立的队列来路由操作。\n\n## 第 5 节 操作优先级排序\n\n在某些情况下，需要发送到后台处理的操作量可能非常大。这时，根据优先级等因素将操作量按队列进行分段管理会显得很实用。这就是我们本节要实现的内容。为此，我们将依赖\
  \ [Symfony 优先级传输](https://symfony.com/doc/current/messenger.html) 这一特性。\n\n### 定义优先级\n\
  \n为了定义可用的操作优先级，我们先创建一个枚举来存储它们：\n\n```php\nenum Priority\n{\n    case NORMAL;\n \
  \   case HIGH;\n}\n```\n\n为简单起见，该枚举包含两个表示优先级的选项：`NORMAL` 和 `HIGH`。\n\n### 修改元数据属性\n\
  \n现在，我们需要在 `Background` 类属性中新增一个参数，以便用指定的优先级来标记操作。\n\n```php\nclass Background\n\
  {\n    public function __construct(\n        public readonly ?int $delay = null,\n\
  \        public readonly ?Priority $priority = Priority::NORMAL\n    ){ }\n}\n```\n\
  \n如你所见，`Background` 类的构造函数将 `Priority` 枚举值作为第二个构造参数。默认情况下，所有后台操作都拥有 `NORMAL` 优先级。\n\
  \n### 为高优先级操作创建消息\n\n`NORMAL` 优先级的操作将继续使用现有的 `OperationMessage` 消息类。回顾“第 4 节 路由操作”，分派一个\
  \ `OperationMessage` 后，它会被路由到 `operations` 传输层。为了区分 `NORMAL` 和 `HIGH` 操作，我们必须将它们路由到不同的传输层。因此，首先我们需要为\
  \ `HIGH` 优先级的消息创建一个新的消息类：\n\n```php\nuse App\\Messenger\\OperationMessage;\n\nclass\
  \ HighPriorityOperationMessage extends OperationMessage\n{\n}\n```\n\n由于 `NORMAL`\
  \ 优先级和 `HIGH` 优先级操作拥有相同的参数，我们可以简单地继承现有的 `OperationMessage` 类。\n\n### 为每种优先级创建传输层\n\
  \n由于我们希望将不同优先级的操作分离到不同的传输层，需要对传输层配置进行一些修改。\n\n```yaml\nframework:\n    messenger:\n\
  \        transports:\n            operations:\n                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'\n\
  \                options:\n                    group: 'normal'\n            operations_high:\n\
  \                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'\n                options:\n\
  \                    group: 'high'\n        routing:\n            App\\Messenger\\\
  OperationMessage: 'operations'\n            App\\Messenger\\HighPriorityOperationMessage:\
  \ 'operations_high'\n```\n\n让我们看一下这个新配置。\n\n*   这里有两条传输层：\n    *   `operations`：用于路由\
  \ `NORMAL` 优先级的操作\n    *   `operations_high`：用于路由 `HIGH` 优先级的操作\n*   每个选项都设置了 `group`\
  \ 参数。在使用 Symfony 的 `redis-transport` 时，你可以在 `options` 部分使用 `group` 参数来设置优先级。Symfony\
  \ 在内部利用 `Redis` 的流组和消费者特性来实现此功能。\n*   每条消息将被路由到其对应的传输层。\n\n### 修改消息处理器\n\n消息处理器需要能够处理这两种类型的消息。Symfony\
  \ Messenger 允许我们通过使用方法级别的 `AsMessageHandler` 属性来实现这一点，而不是在类级别使用。\n\n```php\nclass\
  \ OperationMessageHandler\n{\n    public function __construct(\n        private\
  \ readonly OperationCollection $operationCollection,\n        private readonly EventDispatcherInterface\
  \ $eventSubscriber,\n        private readonly EntityManagerInterface $em\n    ){\
  \ }\n\n    #[AsMessageHandler]\n    public function handleNormalPriorityOperations(OperationMessage\
  \ $message): void\n    {\n        $this->handleMessage($message);\n    }\n\n   \
  \ #[AsMessageHandler]\n    public function handleHighPriorityOperations(HighPriorityOperationMessage\
  \ $message): void\n    {\n        $this->handleMessage($message);\n    }\n\n   \
  \ private function handleMessage(OperationMessage|HighPriorityOperationMessage $message):\
  \ void\n    {\n        $apiOperation = $this->operationCollection->getOperation($message->operation);\n\
  \        $user = null;\n        if($message->user && $apiOperation->handler instanceof\
  \ OperationRequiresUserInterface) {\n            $user = $this->em->getRepository(User::class)->findOneByEmail($message->user);\n\
  \            $apiOperation->handler->setUser($user);\n        }\n        $apiOperation->handler->perform($message->operationInput);\n\
  \    }\n}\n```\n\n如上代码所示，我们创建了一个名为 `handleNormalPriorityOperations` 的方法来处理 `NORMAL`\
  \ 操作，以及另一个名为 `handleHighPriorityOperations` 的方法来处理 `HIGH` 操作。由于这两个方法执行相同的代码，我们将处理逻辑移到了一个名为\
  \ `handleMessage` 的私有方法中。\n\n### 根据优先级分派消息\n\n这里，我们需要回顾一下前面的章节。在那里，我们修改了 `ApiOperationHandler`\
  \ 类来检查是否需要将操作执行放入队列。现在，我们需要再次修改它，以检查操作优先级并使用相应的消息类。\n\n```php\nif($operation->metadata->background)\
  \ {\n    $stamps = ($operation->metadata->background->delay)\n        ? [new DelayStamp($operation->metadata->background->delay\
  \ * 1000)]\n        : []\n    ;\n    $message = ($operation->metadata->background->priority\
  \ === Priority::NORMAL)\n        ?  new OperationMessage($operation->metadata->name,\
  \ $inputData, $userIdentifier)\n        :  new HighPriorityOperationMessage($operation->metadata->name,\
  \ $inputData, $userIdentifier)\n    ;\n    $this->bus->dispatch($message, $stamps);\n\
  \    return new ApiOutput(['status' => 'queued'], 202);\n}\n```\n\n如上所示，在检查了元数据的延迟参数之后，我们为\
  \ `NORMAL` 优先级操作创建 `OperationMessage` 消息类的实例，或者为 `HIGH` 优先级操作创建 `HighPriorityOperationMessage`\
  \ 消息类的实例。\n\n### 结论\n\n在本节中，我们学习了如何利用 Symfony Messenger 的功能，根据优先级参数来平衡操作消息在队列间的分布。这使我们能够优先处理某些操作，使其不必等待其他操作处理完毕。\n\
  \n下一章，我们将使用 Symfony 事件系统，在后台操作完成后分派一个事件。\n\n## 第 6 节 触发执行后通知\n\n某些操作可能需要在执行完成后通知用户。例如，在发送一笔付款后，用户可能会收到一封包含付款流程信息的电子邮件或短信。\n\
  \n我们将只对后台操作实现执行后通知，因为用户不知道操作何时结束，通知他们将非常有用。\n\n### 标记需要发送通知的操作\n\n由于并非所有操作都需要发送通知，我们需要一种方法来指定某个操作在处理后需要发送通知。让我们在\
  \ `OperationMetadata` 属性中添加一个新参数来指定这一点。\n\n```php\n#[\\Attribute(\\Attribute::TARGET_CLASS)]\n\
  class OperationMetadata\n{\n    public function __construct(\n        public readonly\
  \ string $name,\n        public readonly ?string $version = null,\n        public\
  \ readonly ?string $input = null,\n        public readonly ?bool $validateByRole=\
  \ null,\n        public readonly ?Background $background = null,\n        public\
  \ readonly ?bool $requiresNotification = null\n    ){ }\n}\n```\n\n负责决定是否发送通知的代码将需要检查\
  \ `$requiresNotification` 参数。我们将在下一节处理这个问题。\n\n\n\n### 创建事件和订阅者\n\n首先，我们需要一个在操作执行完成后触发的事件，以及一个将持续监听该事件的订阅者。\n\
  \n```php\nuse Symfony\\Contracts\\EventDispatcher\\Event;\nclass OperationPerformedEvent\
  \ extends Event\n{\npublic function __construct(\npublic readonly OperationMetadata\
  \ $operationMetadata,\npublic readonly mixed $inputData,\npublic readonly mixed\
  \ $outputData,\npublic readonly ?UserInterface $user\n){}\n}\n```\n\n上述事件携带着以下数据：\n\
  \n- **operationMetadata**: 操作元数据。\n- **inputData**: 来自 ApiInput 模型的操作输入数据。\n- **outputData**:\
  \ 来自 ApiOutput 模型的操作结果数据。\n- **user**: 操作的用户。它可能为空，因为并非所有操作都需要用户。只有那些实现了 `OperationRequiresUserInterface`\
  \ 的操作才需要。\n\n现在，让我们编写订阅者的代码，它将持续监听 `OperationPerformedEvent` 事件。\n\n```php\nuse\
  \ Symfony\\Component\\EventDispatcher\\EventSubscriberInterface;\nclass OperationSubscriber\
  \ implements EventSubscriberInterface\n{\npublic static function getSubscribedEvents():\
  \ array\n{\nreturn [\nOperationPerformedEvent::class => 'onOperationPerformed'\n\
  ];\n}\npublic function onOperationPerformed(OperationPerformedEvent $event): void\n\
  {\n}\n}\n```\n\n正如我们所说，订阅者将持续监听 `OperationPerformedEvent` 事件，并在事件被触发后执行 `onOperationPerformed`\
  \ 方法。稍后我们将定义该方法的具体内容。\n\n### 创建通知服务\n\n通知服务应负责向用户发送通知。\n\n```php\nclass Notifier\
  \ {\npublic function notify(string $operation, mixed $inputData, mixed $outputData,\
  \ ?UserInterface $user) : void\n{\n}\n}\n```\n\n`notify` 方法是空的。在此方法中，我们将编写发送通知所需的代码。我们可以使用像\
  \ Amazon 这样的服务发送电子邮件，或者使用像 Twilio 这样的服务发送短信。我们应该将通知服务注入到订阅者中，并在 `onOperationPerformed`\
  \ 方法中使用它。`notify` 方法接收操作名称、输入和输出数据以及用户作为参数。\n\n### 基于操作处理通知\n\n需要发送通知的操作可以有不同的处理方式。这就是为什么我们需要将每个操作的通知逻辑封装在不同的服务中。\n\
  \n#### 创建 NotificationHandlerInterface\n\n该接口将定义所有通知处理器必须实现的契约。\n\n```php\nuse Symfony\\\
  Component\\Security\\Core\\User\\UserInterface;\ninterface NotificationHandlerInterface\
  \ {\npublic function handleNotification(mixed $inputData, mixed $outputData, ?UserInterface\
  \ $user);\n}\n```\n\n处理器必须在 `handleNotification` 方法中实现发送通知的逻辑。\n\n#### 创建通知处理器\n\
  \n下面，我们展示 SendPayment 操作的通知处理器。它实现了 `NotificationHandlerInterface`，并定义了 `handleNotification`\
  \ 方法。在此方法中，我们将实现发送逻辑（短信、电子邮件等）。根据接口要求，`handleNotification` 方法接收输入和输出数据以及用户。用户可以为空，因为并非所有操作都需要它。\n\
  \n需要注意的是，大多数通知都需要用户，因为通知通常发送给用户。\n\n```php\nuse App\\Api\\Notification\\NotificationHandlerInterface;\n\
  use Symfony\\Component\\Security\\Core\\User\\UserInterface;\nclass SendPaymentNotificationHandler\
  \ implements NotificationHandlerInterface {\npublic function handleNotification(mixed\
  \ $inputData, mixed $outputData, ?UserInterface $user) : void\n{\n}\n}\n```\n\n\
  但是，我们如何将处理器与操作关联起来呢？让我们借助 [Symfony 服务订阅者](https://symfony.com/doc/6.4/service_container/service_subscribers_locators.html)来实现这个目标。\n\
  \n#### 创建服务订阅者\n\n服务订阅者允许我们访问一组预定义的服务，同时仅在需要时通过服务定位器（一个独立的延迟加载容器）实例化它们。让我们编写服务订阅者的代码。\n\
  \n```php\nuse App\\Api\\Notification\\Types\\SendPaymentNotificationHandler;\nuse\
  \ App\\Security\\Miscelanea\\OperationNames;\nuse Psr\\Container\\ContainerInterface;\n\
  use Symfony\\Contracts\\Service\\ServiceSubscriberInterface;\nclass NotificationHandlerSubscriber\
  \ implements ServiceSubscriberInterface\n{\npublic function __construct(\nprivate\
  \ readonly ContainerInterface $locator,\n) { }\npublic static function getSubscribedServices():\
  \ array\n{\nreturn [\nOperationNames::SendPayment->name => SendPaymentNotificationHandler::class\n\
  ];\n}\npublic function getHandler(string $operationName): NotificationHandlerInterface\n\
  {\nreturn $this->locator->get($operationName);\n}\n}\n```\n\n这个服务订阅者非常简洁。构造函数注入了定位器，该定位器仅持有在\
  \ `getSubscribedServices` 方法中定义的服务。`getSubscribedServices` 方法以键值对数组的形式加载可用的服务，其中键是服务键（我们使用操作名称作为键），值是服务类。`getHandler`\
  \ 方法使用定位器服务来返回与 `$operationName` 参数相关的服务。\n\n#### 使用服务订阅者\n\n最后，我们必须使用订阅者来通过正确的处理器发送通知。让我们修改\
  \ `Notifier` 服务。\n\n```php\nuse Symfony\\Component\\Security\\Core\\User\\UserInterface;\n\
  class Notifier {\npublic function __construct(\nprivate readonly NotificationHandlerSubscriber\
  \ $notificationHandlerSubscriber\n){}\npublic function notify(string $operation,\
  \ mixed $inputData, mixed $outputData, ?UserInterface $user) : void\n{\n$handler\
  \ = $this->notificationHandlerSubscriber->getHandler($operation);\n$handler->handleNotification($inputData,\
  \ $outputData, $user);\n}\n}\n```\n\n现在，`Notifier` 服务根据操作名称使用相应的处理器。它注入了新创建的 `NotificationHandlerSubscriber`，并使用它来获取处理器。然后，它使用该处理器发送通知。\n\
  \n### 使用通知服务\n\n准备好 Notifier 服务后，我们可以在 OperationSubscriber 中使用它。\n\n```php\nuse\
  \ App\\EventSubscriber\\Event\\OperationPerformedEvent;\nuse Symfony\\Component\\\
  EventDispatcher\\EventSubscriberInterface;\nclass OperationSubscriber implements\
  \ EventSubscriberInterface\n{\npublic function __construct(\nprivate readonly Notifier\
  \ $notifier\n){}\npublic static function getSubscribedEvents(): array\n{\nreturn\
  \ [\nOperationPerformedEvent::class => 'onOperationPerformed'\n];\n}\npublic function\
  \ onOperationPerformed(OperationPerformedEvent $event): void\n{\nif($event->operationMetadata->requiresNotification){\n\
  $this->notifier->notify($event->operationMetadata->name, $event->inputData, $event->outputData,\
  \ $event->user);\n}\n}\n}\n```\n\n`onOperationPerformed` 方法仅当操作需要发送通知时才会执行此操作。它通过检查元数据的\
  \ `requiresNotification` 参数来判断。\n\n\n\n### 触发事件\n\n到目前为止，我们已经创建了订阅者，并构建了一个用于放置发送通知代码的服务。现在我们需要在后端操作完成后触发事件。我们将把这部分代码放在\
  \ `OperationMessageHandler` 中。\n\n```\nuse App\\Api\\Collection\\OperationCollection;\n\
  use App\\Api\\Operation\\OperationRequiresUserInterface;\nuse App\\EventSubscriber\\\
  Event\\OperationPerformedEvent;\nuse Symfony\\Component\\EventDispatcher\\EventDispatcherInterface;\n\
  use Symfony\\Component\\Messenger\\Attribute\\AsMessageHandler;\n\n#[AsMessageHandler]\n\
  class OperationMessageHandler\n{\n    public function __construct(\n        private\
  \ readonly OperationCollection $operationCollection,\n        private readonly EventDispatcherInterface\
  \ $eventDispatcher,\n        private readonly EntityManagerInterface $em\n    ){\
  \ }\n\n    public function __invoke(OperationMessage $message): void\n    {\n  \
  \      $apiOperation = $this->operationCollection->getOperation($message->operation);\n\
  \        $user = null;\n        if($message->user && $apiOperation->handler instanceof\
  \  OperationRequiresUserInterface) {\n            $user = $this->em->getRepository(User::class)->findOneByEmail($message->user);\n\
  \            $apiOperation->handler->setUser($user);\n        }\n        $apiOutput\
  \ = $apiOperation->handler->perform($message->operationInput);\n        $this->eventDispatcher->dispatch(\n\
  \            new OperationPerformedEvent($apiOperation->metadata, $message->operationInput,\
  \ $apiOutput->data, $user),\n        );\n    }\n}\n```\n\n我们注入了 Symfony 事件分发器服务，并在获取操作结果后，使用\
  \ `dispatch` 方法来触发事件。事件触发后，`OperationSubscriber` 将检测到触发的事件并做出响应。此外，我们将用户初始化为 null\
  \ 值，以避免在将其传递给事件构造函数时出现“未定义变量”错误。\n\n### 结论\n\n本章节结束之际，我们已掌握了如何在后台操作完成后分发事件，从而能够通知用户。在下一章中，我们将实现必要的机制，确保端点只能执行与其上下文相关的操作。\n\
  \n"
- "# 4. 上下文特定操作\n\n在前面的章节中，我们已经学习了以下内容：\n\n- 如何创建能够根据请求有效负载内容处理操作的端点\n- 如何保护我们的端点和操作\n\
  - 如何在后台执行操作\n\n在本章中，我们将深入探讨将端点封装在特定上下文中的过程，确保它只能执行为该上下文定义的操作。这种方法不仅增强了我们 API 的安全性和清晰度，而且通过促进关注点的清晰分离，简化了多个控制器的管理。这样做可以精简我们的代码库，使其随着应用程序的发展更易于维护和扩展。\n\
  \n有必要澄清一点，我们不应将保护操作（确保只有特定角色才能执行操作，如第 2 章所述）与端点上下文化的概念混为一谈。基于角色的访问控制主要关注用户权限，而上下文化则根据其指定的上下文限制端点可用的操作。这种区分促进了更有组织性和可维护性的代码结构。这两种策略可以有效地结合使用以增强安全性。例如，“支付”上下文可能只允许与支付相关的操作，其中某些操作限制为特定角色才能执行，从而确保敏感操作仅由授权用户执行。\n\
  \n## 第一节 上下文化端点\n\n在本节中，我们将构建必要的元素，以便能够为端点包裹一个上下文。\n\n### 上下文枚举\n\n首先，我们将创建一个枚举，用于保存上下文以及这些上下文相关的操作。\n\
  \n```\nenum Context\n{\n    case inventoryManagement;\n    case payment;\n    case\
  \ orderManagement;\n\n    public function getAllowedOperations()\n    {\n      \
  \  match($this) {\n            self::inventoryManagement => [\n                'AddInventoryItem',\n\
  \                'UpdateInventoryItem',\n                'RemoveInventoryItem',\n\
  \                'ListInventoryItems'\n            ],\n            self::payment\
  \ => [\n                'SendPayment',\n                'RefundPayment',\n     \
  \           'ChargePayment'\n            ],\n            self::orderManagement =>\
  \ [\n                'CreateOrder',\n                'UpdateOrder',\n          \
  \      'CancelOrder'\n            ]\n        };\n    }\n}\n```\n\n上述枚举包含以下情况：\n\n\
  - **inventoryManagement**：表示与库存管理相关的操作的上下文。\n- **payment**：表示与支付相关的操作的上下文。\n- **orderManagement**：表示与订单管理操作的上下文。\n\
  \n`getAllowedOperations` 方法返回一个包含该上下文所允许操作的数组。\n\n### OperationContext 属性\n\n在本节中，我们将创建用于为端点包裹上下文的属性。\n\
  \n```\nuse App\\Api\\Context;\n\n#[\\Attribute(\\Attribute::TARGET_METHOD)]\nclass\
  \ OperationContext\n{\n    public function __construct(\n        public readonly\
  \ Context $context\n    ){ }\n}\n```\n\n如你所见，`OperationContext` 属性的构造函数接收一个 `Context`\
  \ 枚举作为参数。这使得我们可以简单地指定上下文，正如我们将在下一节中看到的那样。\n\n### 为端点包裹上下文\n\n在本节中，我们将使用 `OperationContext`\
  \ 属性来指定面向操作的端点上下文。\n\n```\n#[Route('/inventory-management/operation', name: 'api_inventory_management_operation',\
  \ methods: ['POST'])]\n#[OperationContext(Context::inventoryManagement)]\npublic\
  \ function inventoryManagementOperationsAction(#[MapRequestPayload] ApiInput $apiInput):\
  \ JsonResponse\n{\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
  \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n\n#[Route('/payment/operation',\
  \ name: 'api_payment_operation', methods: ['POST'])]\n#[OperationContext(Context::payment)]\n\
  public function paymentOperationsAction(#[MapRequestPayload] ApiInput $apiInput):\
  \ JsonResponse\n{\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
  \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n\n#[Route('/order-management/operation',\
  \ name: 'api_order_management_operation', methods: ['POST'])]\n#[OperationContext(Context::orderManagement)]\n\
  public function orderManagementOperationsAction(#[MapRequestPayload] ApiInput $apiInput):\
  \ JsonResponse\n{\n    $apiOutput = $this->apiOperationHandler->performOperation($apiInput);\n\
  \    return new JsonResponse($apiOutput->data, $apiOutput->code);\n}\n```\n\n如你所见，我们使用了\
  \ `OperationContext` 属性来指定每个端点只能执行其上下文允许的操作。\n\n### 结论\n\n在本节中，我们创建了一个 PHP 枚举，用于集中特定上下文所允许的操作，并实现了一个\
  \ `OperationContext` 属性来指定可以在控制器中执行的操作。最后，我们创建了三个不同的端点（每个上下文一个），并使用 `OperationContext`\
  \ 属性将它们包裹起来，并将相应的上下文传递给其构造函数。\n\n在下一节中，我们将创建一个专用的订阅者来监听 Symfony 的 `KernelController`\
  \ 事件。该订阅者需要确定所请求的操作执行是否可以被该端点执行。\n\n## 第二节 检测指定上下文中的端点\n\n我们需要一种方法来检测请求是否已路由到指定了上下文的端点，以便检查要执行的操作是否被允许。为了实现这一点，让我们依赖\
  \ Symfony 的[控制器内核事件](https://symfony.com/doc/6.4/reference/events.html%23kernel-controller)。\n\
  \n\n\n### 监听内核控制器事件\n\n我们将在第 1 章创建的`KernelSubscriber`类中添加一个方法来监听控制器事件。\n\n#### 用于通知上下文操作无效的异常\n\
  \n在编写事件相关的订阅器之前，我们先编写当操作无法执行时将抛出的异常。\n\n```\nuse Symfony\\Component\\HttpKernel\\\
  Attribute\\WithHttpStatus;\n#[WithHttpStatus(403)]\nclass InvalidContextForOperationException\
  \ extends \\RuntimeException\n{\n    public function __construct(string $context,\
  \ string $operation, int $code = 403, ?\\Throwable $previous = null)\n    {\n  \
  \      $msg = sprintf('操作 %s 不属于上下文 %s', $operation, $context);\n        parent::__construct($msg,\
  \ $code, $previous);\n    }\n}\n```\n\n上述异常继承了 PHP 的 `RuntimeException`。`WithHttpStatus`\
  \ 属性负责在抛出异常时发送给客户端的 HTTP 响应，而 `$code` 变量则指异常本身的错误码。在此特定情况下，两者都设置为 403，但如有需要也可以设置不同的值。我们使用\
  \ 403 Access Denied 异常是因为我们拒绝执行某个操作的访问，尽管原因与在第 3 章中使用 Symfony 投票器时不同。\n\n#### 内核控制器订阅器\n\
  \n现在我们有了一个用于报告上下文错误的异常，终于可以编写内核控制器订阅器了。\n\n```\npublic function onKernelController(ControllerEvent\
  \ $event): void\n{\n    $controllerAttributes = $event->getAttributes();\n    $operationContextAttributes\
  \ = $controllerAttributes[OperationContext::class] ?? null;\n    if(count($operationContextAttributes)\
  \ > 0) {\n        $operationContextAttribute = $operationContextAttributes[0];\n\
  \        $apiInput = $this->validationHandler->deserializeAndValidate($event->getRequest()->getContent(),\
  \ ApiInput::class, null);\n        if(!in_array($apiInput->operation, $operationContextAttribute->context->getAllowedOperations()))\
  \ {\n            throw new InvalidContextForOperationException($operationContextAttribute->context->name,\
  \ $apiInput->operation);\n        }\n    }\n}\n```\n\n以上监听器的工作流程如下：\n\n- 检查与事件关联的控制器是否标注了\
  \ `OperationContext` 属性。\n- 如果控制器已标注该属性，则通过 `Context` 枚举的 `getAllowedOperations`\
  \ 方法检查操作是否可执行。如果不可执行，则抛出 `InvalidContextForOperationException` 异常以通知错误。\n\n####\
  \ 在 `KernelSubscriber` 中检查 `InvalidContextForOperationException`\n\n与迄今为止处理所有异常的方式一样，我们必须指示\
  \ `KernelSubscriber` 订阅器检测此异常并将消息格式化为 JSON。\n\n```\nif($exception instanceof InvalidContextForOperationException){\n\
  \    $event->setResponse(new JsonResponse([\n        'errors' => [\n           \
  \ 'operation_endpoint_context' => $exception->getMessage()\n        ]\n    ], 400));\n\
  }\n```\n\n如您所见，我们仅为 `InvalidContextForOperationException` 添加了另一个条件。\n\n### 结论\n\n\
  我们再次借助 Symfony 的事件系统来捕获控制器请求。这样，我们就可以检查控制器方法是否标注了 `OperationContext` 属性，如果是，则确保上下文允许请求的操作执行。\n\
  \n在下一章中，我们将创建必要的应用程序测试，以确保我们的 API 按预期运行。\n\n"
- "# 5. 测试 API\n\n在构建并保护了我们的面向操作的 API 之后，巩固其功能并确保其按预期运行至关重要。本章作为最后一章，将向您展示如何使用 Symfony\
  \ 应用程序测试来检查 API 是否按预期工作。\n\n## 第 1 节 创建测试类\n\nSymfony Test Pack 组件允许我们通过 Symfony\
  \ 生成器轻松创建测试类，因此我们用它来自动生成测试类。\n\n```\nbin/console make:test\n```\n\n执行上述命令后，系统会要求您输入一些信息来创建测试类：\n\
  \n- **要生成的测试类型**：选择 `WebTestCase` 类型。\n- **类的名称**：输入您想要的名称。\n\n完成后，它将在项目根目录的 `/tests/`\
  \ 目录下生成测试类，通常为 `tests/Controller/ApiControllerTest.php`。如果我们打开测试类，会看到类似以下内容：\n\n\
  ```\nnamespace App\\Tests;\nuse Symfony\\Bundle\\FrameworkBundle\\Test\\WebTestCase;\n\
  class ApiControllerTest extends WebTestCase\n{\n    public function testSomething():\
  \ void\n    {\n        $client = static::createClient();\n        $crawler = $client->request('GET',\
  \ '/');\n        $this->assertResponseIsSuccessful();\n        $this->assertSelectorTextContains('h1',\
  \ 'Hello World');\n    }\n}\n```\n\n该类包含一个示例测试（`testSomething`）。让我们逐行分析其内容：\n\n\
  1. 创建一个客户端实例，以便我们可以发送请求\n2. 向 URL 执行 GET 请求\n3. 检查响应状态码是否在 200–299 范围内\n4. 检查 `h1`\
  \ 选择器是否包含 \"Hello World\" 文本\n\n这只是一个模板。如果您直接运行此测试，它会失败，因为 \"/\" 路由和预期的 HTML 内容（`<h1>Hello\
  \ World</h1>`）在应用程序中尚不存在。\n\n让我们在下一节编写我们的测试。\n\n### 结论\n\n在本节中，我们探讨了如何在 Symfony\
  \ 生成器的帮助下，使用 Symfony Test Pack 组件创建测试类。通过执行 `bin/console make:test` 命令，我们可以轻松生成测试类的模板，其中包含一个基本的示例测试。在下一节中，我们将用一组测试填充测试类，以便覆盖尽可能多的用例。\n\
  \n## 第 2 节 API 测试\n\n以下各节展示了一系列测试，每个测试都针对特定的使用场景。\n\n- 为了能够发送自定义的 HTTP 标头，特别是身份验证令牌，我们必须使用\
  \ `HTTP_` 字符串作为标头键的前缀。\n\n在创建自己的测试时，应使用用户夹具中的身份验证令牌来对 API 进行身份验证。\n\n### 测试成功执行操作\n\
  \n此测试检查操作是否成功执行。\n\n```\npublic function testOperationSuccess(): void\n{\n    $client\
  \ = static::createClient();\n    $client->request('POST', '/api/v1/operation', [],\
  \ [], [\n        'HTTP_X-AUTH-TOKEN' => 'fYDg7nMhlvxAtL7KfBnS',\n        'HTTP_Content-Type'\
  \ => 'application/json'\n    ], json_encode([\n        'operation' => 'SendPayment',\n\
  \        'data' => [\n            'amount' => 13.69,\n            'receiver' =>\
  \ 'hghgfyyfg'\n        ]\n    ]));\n    $this->assertResponseStatusCodeSame(200);\n\
  }\n```\n\n该测试发送一个有效的令牌，操作负载包含一个现有操作，并且所需参数有效，因此测试应返回 `200 HTTP OK` 状态码。\n\n### 测试成功后台操作\n\
  \n此测试检查操作是否成功发送到后台。对于此测试，您需要创建一个操作，其元数据属性将操作标记为后台操作。在第 3 章中，我们学习了如何通过将 `Background`\
  \ 类实例传递给 `OperationMetadata` 属性的 `background` 参数来实现这一点。\n\n```\npublic function\
  \ testBackgroundOperation(): void\n{\n    $client = static::createClient();\n  \
  \  $client->request('POST', '/api/v1/operation', [], [], [\n        'HTTP_X-AUTH-TOKEN'\
  \ => 'fYDg7nMhlvxAtL7KfBnS',\n        'HTTP_Content-Type' => 'application/json'\n\
  \    ], json_encode([\n        'operation' => 'SendPaymentBackground',\n       \
  \ 'data' => [\n            'amount' => 13.69,\n            'receiver' => 'hghgfyyfg'\n\
  \        ]\n    ]));\n    $this->assertResponseStatusCodeSame(202);\n}\n```\n\n\
  由于该操作被标记为后台操作，测试应返回 `202 ACCEPTED` 状态码。\n\n\n\n### 测试无效的操作数据\n\n在此案例中，我们将测试一项因发送数据无效而无法执行的操作。\n\
  \n```php\npublic function testOperationInvalidData(): void\n{\n$client = static::createClient();\n\
  $client->request('POST', '/api/v1/operation', [], [], [\n'HTTP_X-AUTH-TOKEN' =>\
  \ 'fYDg7nMhlvxAtL7KfBnS',\n'HTTP_Content-Type' => 'application/json'\n], json_encode([\n\
  'operation' => 'SendPayment',\n'data' => [\n'amount' => 0,\n'receiver' => 'hghgfyyfg'\n\
  ]\n]));\n$this->assertResponseStatusCodeSame(400);\n}\n```\n\n测试发送了一个无效的请求负载，因为\
  \ `amount` 参数必须大于 0。它应返回一个 *400 Bad request* 响应。此测试假设操作输入模型包含一个 `amount` 参数，并且该参数被\
  \ Symfony 的 `GreaterThan` 验证约束所包裹，该约束指定 `amount` 的值必须大于 0。让我们回顾一下第一章中创建的输入模型。\n\n\
  ```php\nreadonly class SendPaymentInput\n{\npublic function __construct(\n#[Assert\\\
  NotBlank(message: 'Receiver cannot be empty')]\npublic string $receiver,\n#[Assert\\\
  NotBlank(message: 'Amount cannot be empty')]\n#[Assert\\GreaterThan(0, message:\
  \ 'Amount must be greater than 0')]\npublic float|int $amount,\npublic ?string $label\
  \ = null\n){}\n}\n```\n\n如上所示，`amount` 参数既不能为空，也不能为 0。\n\n### 测试不存在的操作\n\n此项测试检查一项因操作不存在而无法执行的操作。\n\
  \n```php\npublic function testUnexistingOperation(): void\n{\n$client = static::createClient();\n\
  $client->request('POST', '/api/v1/operation', [], [], [\n'HTTP_X-AUTH-TOKEN' =>\
  \ 'fYDg7nMhlvxAtL7KfBnS',\n'HTTP_Content-Type' => 'application/json'\n], json_encode([\n\
  'operation' => 'SendPayme',\n'data' => [\n'amount' => 0,\n'receiver' => 'hghgfyyfg'\n\
  ]\n]));\n$this->assertResponseStatusCodeSame(404);\n}\n```\n\n测试发送了一个无效的操作名称，因此应返回\
  \ *404 Not Found* 响应码。\n\n### 测试缺少操作名称\n\n此项测试检查因未发送操作名称而导致操作请求验证失败的情况。\n\n```php\n\
  public function testMissingOperationName(): void\n{\n$client = static::createClient();\n\
  $client->request('POST', '/api/v1/operation', [], [], [\n'HTTP_X-AUTH-TOKEN' =>\
  \ 'zPLhK8iQqg9fg7u5jnp',\n'HTTP_Content-Type' => 'application/json'\n], json_encode([\n\
  'operation' => '',\n'data' => [\n'amount' => 13.69,\n'receiver' => 'hghgfyyfg'\n\
  ]\n]));\n$this->assertResponseStatusCodeSame(422);\n}\n```\n\n测试发送了一个有效的数据负载；然而，操作名称缺失，这应导致返回\
  \ *422 UnprocessableEntityHttpException* 状态码。出现此响应的原因是操作名称的缺失会在 `ApiInput` 模型验证期间触发异常。具体来说，当请求到达控制器时，Symfony\
  \ 的 `MapRequestPayload` 属性执行验证并随后抛出 `UnprocessableEntityHttpException` 异常。\n\n###\
  \ 测试无效的用户令牌\n\n此项测试检查因发送的令牌无效而导致操作无法执行的情况。\n\n```php\npublic function testInvalidAuth():\
  \ void\n{\n$client = static::createClient();\n$client->request('POST', '/api/v1/operation',\
  \ [], [], [\n'HTTP_X-AUTH-TOKEN' => 'fYDg7AtL7KfBnS',\n'HTTP_Content-Type' => 'application/json'\n\
  ], json_encode([\n'operation' => 'SendPayment',\n'data' => [\n'amount' => 13.69,\n\
  'receiver' => 'hghgfyyfg'\n]\n]));\n$this->assertResponseStatusCodeSame(401);\n\
  }\n```\n\n测试发送了正确的负载，但 `X-AUTH-TOKEN` 头部包含了一个无效的令牌，因此响应码应为 *401 Unauthorized*。\n\
  \n### 测试未授权用户\n\n此项测试检查 API 因用户没有正确角色而拒绝执行操作的情况。\n\n```php\npublic function testUnauthorizedToExecuteOperation():\
  \ void\n{\n$client = static::createClient();\n$client->request('POST', '/api/v1/operation',\
  \ [], [], [\n'HTTP_X-AUTH-TOKEN' => 'vWvn1GOu2Lx5foFgQrRp',\n'HTTP_Content-Type'\
  \ => 'application/json'\n], json_encode([\n'operation' => 'SendPayment',\n'data'\
  \ => [\n'amount' => 13.69,\n'receiver' => 'hghgfyyfg'\n]\n]));\n$this->assertResponseStatusCodeSame(403);\n\
  }\n```\n\n测试发送了正确的负载和一个存在的用户令牌，但此用户没有正确的角色，因此返回的状态码应为 *403 Forbidden*。为了执行此测试，我们应该创建一个持有未被允许执行\
  \ `SendPayment` 操作角色的用户，并使用其令牌进行测试。\n\n### 测试无效的上下文\n\n此项测试尝试请求一个不允许在当前上下文中执行的操作。\n\
  \n```php\npublic function testInvalidContext(): void\n{\n$client = static::createClient();\n\
  $client->request('POST', '/api/v1/inventory-management/operation', [], [], [\n'HTTP_X-AUTH-TOKEN'\
  \ => 'fYDg7nMhlvxAtL7KfBnS',\n'HTTP_Content-Type' => 'application/json'\n], json_encode([\n\
  'operation' => 'SendPayment',\n'data' => [\n'amount' => 13.69,\n'receiver' => 'hghgfyyfg'\n\
  ]\n]));\n$this->assertResponseStatusCodeSame(403);\n}\n```\n\n测试发送了正确的负载和一个有效的用户令牌，但由于\
  \ `SendPayment` 操作不能在 `inventory-management` 上下文中执行，因此应返回一个 *403 Forbidden* 响应码。\n\
  \n### 进行轻微重构\n\n你应该注意到，所有测试都共享相同的代码来发送 API 请求。为了提高可读性并避免重复，我们可以创建一个私有方法来执行 API 请求。\n\
  \n```php\nprivate function postOperation(array $payload, string $token, string $uri\
  \ = '/api/v1/operation'): void\n{\nstatic::createClient()->request('POST', $uri,\
  \ [], [], [\n'HTTP_X-AUTH-TOKEN' => $token,\n'HTTP_Content-Type' => 'application/json',\n\
  ], json_encode($payload));\n}\n```\n\n上述方法接收要发送的负载、认证令牌和要调用的 URI。`uri` 参数默认持有 `/api/v1/operation`\
  \ 路径，因为它在大多数测试中都会用到。\n\n然后我们可以在测试中使用这个方法。例如，在无效上下文测试中使用它。\n\n```php\npublic function\
  \ testInvalidContext(): void\n{\n$this->postOperation([\n'operation' => 'SendPayment',\n\
  'data' => [\n'amount' => 13.69,\n'receiver' => 'hghgfyyfg'\n]], 'vWvn1GOu2Lx5foFgQrRp');\n\
  $this->assertResponseStatusCodeSame(403);\n}\n```\n\n如你所见，通过此更改，我们不再重复发送请求的逻辑。在每个测试中，我们只需要提供负载和认证令牌。\n\
  \n### 执行测试\n\n要执行测试，我们需要从项目根目录运行以下命令：\n\n```bash\nbin/phpunit\n```\n\n这将执行你所有的测试。\n\
  \n### 结论\n\n本章提供了关于如何使用 Symfony 为 API 实现有效测试的详细指南。通过各种示例，我们学会了验证操作的预期行为，从成功执行到错误处理和验证。这些测试不仅确保了\
  \ API 的功能性，还有助于在整个开发过程中维护代码质量。通过整合这些测试实践，开发者可以确保其 API 的健壮性和可靠性，从而提升最终用户的整体体验。\n\n"
- '# 后记


  在这段旅程中，我们探索了使用 PHP 和 Symfony 框架构建功能强大且通用的面向操作 API 的复杂性。我们走过了从定义操作及其输入/输出模型到实现安全措施以及通过后台执行优化性能的路径。这篇后记旨在作为对关键要点以及面向操作的方法在
  API 开发领域所带来的优势的最终反思。




  '
- '# 关键要点


  - **结构化方法**：促进在独立服务中封装明确定义的操作，提升模块化与可维护性。

  - **灵活性**：新操作可以无缝集成，不会影响现有操作，确保 API 能够随应用程序的发展而演进。

  - **安全性**：通过利用 Symfony 的安全功能，我们建立了一个多层安全架构来保护 API。这包括身份验证以确保只有授权用户才能执行操作，以及使用投票者（voters）的授权机制，根据特定的用户角色或条件进一步限制或授予访问权限。

  - **性能优化**：通过 Symfony Messenger 执行后台任务，使我们能够异步处理非关键操作，即使在高负载下也能保持 API 的响应性。


  '
- '# 优势


  - **增强的可维护性**：促进代码组织与复用，使维护和未来修改显著简化。

  - **可扩展性**：模块化设计允许随着 API 需求的增长而平滑扩展，使我们能够高效地添加新操作。

  - **改进的开发体验**：清晰的关注点分离促进结构化的代码库，带来更愉快和高效的开发体验。


  '
- '# 劣势


  - **学习曲线**：对于不熟悉面向操作范式的团队来说，可能存在陡峭的学习曲线。理解如何有效设计和实现操作，以及管理它们之间的交互，可能需要额外的培训与经验积累。

  - **冗余风险**：随着新操作不断增加，如果不同服务中实现了类似功能，则存在冗余风险。这可能导致代码重复并增加维护工作量。在此，如果多个操作共享某些逻辑，则将其提取到其他服务中至关重要。


  '
- '# 实际应用


  除了理论优势之外，面向操作的方法在多种实际场景中表现卓越。以下是一些示例：


  - **电子商务平台**：诸如将商品加入购物车、处理支付和管理订单等用户操作，可以在面向操作的 API 中实现为独立操作。这便于添加新功能（如忠诚度计划或订阅服务），而不会影响现有功能。

  - **社交媒体应用**：为与社交媒体平台交互而构建的 API 可以极大地受益于面向操作的方法。每个动作（例如关注用户或点赞评论）都可以定义为一个专用操作。这种结构确保了
  API 的可扩展性与可维护性，能够无缝集成群聊或直播视频流等新功能。

  - **物联网应用**：为与各种物联网设备交互而构建的 API 通常需要处理多样化的数据流与功能。面向操作的方法为定义与设备控制、数据检索和配置管理相关的操作提供了稳固的结构，从而打造出健壮且可维护的
  API。


  '
- '# 总结


  通过采用面向操作的方法，我们可以让 API 具备以结构化、安全且高性能的方式处理复杂功能的能力。这种方法使您能够构建适应不断变化的业务需求的 API，确保它们在应用程序生态系统中的长期性与韧性。

  '
