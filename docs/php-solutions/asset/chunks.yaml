- fmt: '# Security and Error Messages


    When developing a website with PHP and a database, it’s essential to display error
    messages so that you can debug your code if anything goes wrong. However, raw
    error messages look unprofessional in a live website. They can also reveal clues
    about your database structure to potential attackers. Therefore, before deploying
    your scripts live on the Internet, you should replace the error messages generated
    by the database with a neutral message of your own, such as “Sorry, the database
    is unavailable.”


    ## Chapter Review


    Content management with a database involves inserting, selecting, updating, and
    deleting records. Each record’s primary key plays a vital role in the update and
    delete processes. Most of the time, generating the primary key is handled automatically
    by the database when a record is first created. Thereafter, finding a record’s
    primary key is simply a matter of using a `SELECT` query, either by displaying
    a list of all records or by searching for something you know about the record,
    such as a title or words in an article.


    `MySQLi` and `PDO` prepared statements make database queries more secure by removing
    the need to ensure that quotes and control characters are properly escaped. They
    also speed up your application if the same query needs to be repeated during a
    script using different variables. Instead of validating the SQL every time, the
    script needs do it only once with the placeholders.


    Although this chapter has concentrated on content management, the same basic techniques
    apply to most interaction with a database. Of course, there’s a lot more to SQL—and
    to PHP. In the next chapter, I’ll address some of the most common problems, such
    as displaying only the first sentence or so of a long text field and handling
    dates. Then in [Chapter 15](#A978-1-4842-0635-5_15_Chapter.html) we’ll explore
    working with more than one table in a database.


    # 14. Formatting Text and Dates


    We have some unfinished business left over from the previous chapter. Figure 13-1
    in [Chapter 13](#A978-1-4842-0635-5_13_Chapter.html) shows content from the `blog`
    table with just the first two sentences of each article displayed and a link to
    the rest of the article. However, I didn’t show you how it was done. There are
    several ways to extract a shorter piece of text from the beginning of a longer
    one. Some are rather crude and usually leave you with a broken word at the end.
    In this chapter, you’ll learn how to extract complete sentences.


    The other unfinished business is that the full list of articles in `blog_list_mysqli.php`
    and `blog_list_pdo.php` displays the MySQL timestamp in its raw state, which isn’t
    very elegant. You need to reformat the date to look more user friendly. Handling
    dates can be a major headache because MySQL and MariaDB store them in a completely
    different way from PHP. This chapter guides you through the minefield of storing
    and displaying dates in a PHP/MySQL context. You’ll also learn about PHP date
    and time features that make complex date calculations, such as finding the second
    Tuesday of each month, child’s play.


    In this chapter, you’ll learn about the following:


    - Extracting the first section of a longer text item

    - Using an alias in an SQL query

    - Displaying text retrieved from a database as paragraphs

    - Formatting dates with MySQL

    - Selecting records based on temporal criteria

    - Using the PHP `DateTime`, `DateTimeZone`, `DateInterval`, and `DatePeriod` classes


    ## Displaying a Text Extract


    There are many ways to extract the first few lines or characters from a longer
    piece of text. Sometimes you need just the first 20 or 30 characters to identify
    an item. At other times, it’s preferable to show complete sentences or paragraphs.


    ### Extracting a Fixed Number of Characters


    You can extract a fixed number of characters from the beginning of a text item
    either with the PHP `substr()` function or with the `LEFT()` function in an SQL
    query.


    #### Using the PHP `substr()` Function


    The `substr()` function extracts a substring from a longer string. It takes three
    arguments: the string you want to extract the substring from, the starting point
    (counted from 0), and the number of characters to extract. The following code
    displays the first 100 characters of `$row[''article'']`:


    ```

    echo substr($row[''article''], 0, 100);

    ```


    The original string remains intact. If you omit the third argument, `substr()`
    extracts everything to the end of the string. This makes sense only if you choose
    a starting point other than 0.


    #### Using the `LEFT()` Function in an SQL Query


    The `LEFT()` function extracts characters from the beginning of a column. It takes
    two arguments: the column name and the number of characters to extract. The following
    retrieves `article_id`, `title`, and the first 100 characters from the `article`
    column of the `blog` table:


    ```

    SELECT article_id, title, LEFT(article, 100)

    FROM blog ORDER BY created DESC

    ```


    Whenever you use a function in an SQL query like this, the column name no longer
    appears in the result set as `article`, but as `LEFT(article, 100)` instead. So
    it’s a good idea to assign an alias to the affected column using the `AS` keyword.
    You can either reassign the column’s original name as the alias or use a descriptive
    name as in the following example (the code is in `blog_left_mysqli.php` and `blog_left_pdo.php`
    in the `ch14` folder):


    ```

    SELECT article_id, title, LEFT(article, 100) AS first100

    FROM blog ORDER BY created DESC

    ```


    If you process each record as `$row`, the extract is in `$row[''first100'']`.
    To retrieve both the first 100 characters and the full article, simply include
    both in the query like this:


    ```

    SELECT article_id, title, LEFT(article, 100) AS first100, article

    FROM blog ORDER BY created DESC

    ```


    Taking a fixed number of characters produces a crude result, as Figure 14-1 shows.


    ![A978-1-4842-0635-5_14_Fig1_HTML.jpg](A978-1-4842-0635-5_14_Fig1_HTML.jpg)


    Figure 14-1. Selecting the first 100 characters from an article chops many words
    in half


    ### Ending an Extract on a Complete Word


    To end an extract on a complete word, you need to find the final space and use
    that to determine the length of the substring. So, if you want the extract to
    be a maximum of 100 characters, use either of the preceding methods to start with,
    and store the result in `$extract`. Then you can use the PHP string functions
    `strrpos()` and `substr()` to find the last space and end the extract like this
    (the code is in `blog_word_mysqli.php` and `blog_word_pdo.php`):


    ```

    $extract = $row[''first100''];

    // find position of last space in extract

    $lastSpace = strrpos($extract, '' '');

    // use $lastSpace to set length of new extract and add ...

    echo substr($extract, 0, $lastSpace) . ''... '';

    ```


    This produces the more elegant result shown in Figure 14-2. It uses `strrpos()`,
    which finds the last position of a character or substring within another string.
    Since you’re looking for a space, the second argument is a pair of quotes with
    a single space between them. The result is stored in `$lastSpace`, which is passed
    as the third argument to `substr()`, finishing the extract on a complete word.
    Finally, add a string containing three dots and a space, and join the two with
    the concatenation operator (a period or dot).


    ![A978-1-4842-0635-5_14_Fig2_HTML.jpg](A978-1-4842-0635-5_14_Fig2_HTML.jpg)


    Figure 14-2. Ending the extract on a complete word produces a more elegant result


    **Caution:** Don’t mix up `strrpos()`, which gets the last position of a character
    or substring, with `strpos()`, which gets the first position. The extra “r” stands
    for “reverse”—`strrpos()` searches from the end of the string.'
