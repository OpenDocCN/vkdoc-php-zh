  \ `http`，将生成 HTTP 链接；如果传入 `https`，将生成 HTTPS 链接。\n\n以页眉中的链接为例：\n\n```\n<a href=\"\
  {\"index.php\"|prepare_link:\"http\"}\">\n```\n\n该链接将由我们的 `Smarty` 修饰符转换为绝对链接，到达客户端时将显示如下：\n\
