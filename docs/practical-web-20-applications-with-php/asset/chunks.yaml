    **Implementing Client-Side Form Validation**


    Now that we have looked at how Prototype and Scriptaculous work and have added
    styles to the site, we can revisit the user registration form. In this section,
    we will add client-side form validation to the user registration form using JavaScript
    and Ajax. Adding client-side validation improves usability since the user will
    receive feedback about any invalid form values more quickly.


    Specifically, we will check that each of the form fields contain valid values
    when the user clicks the submit button to register. If everything appears correct,
    we will allow the form to be sent to the server. Note that we will still have
    our server-side validation in place (as implemented in Chapter 4), so even if
    the user doesn’t have JavaScript enabled, they cannot circumvent any of the data
    checks.


    Rather than duplicating the server-side validation we already have in place, we
    will make some small changes to the existing code so it can be used for Ajax validation
    in addition to the normal registration. The changes we will implement include
    the following:


    • Modifying the FormProcessor_UserRegistration class so we have the option of
    validating form data without actually creating the user if no errors occur


    • Changing the way the registerAction() method of AccountController works so that
    if the action is requested via Ajax, a JSON response is sent containing any errors
    that occurred


    • Creating a JavaScript class to trigger the form validation, as well as submitting
    the form once all values have been verified


    In actual fact, the form validation we are implementing here still uses the server
    in that it submits the data to the server for validation. We could add simple
    validation (such as checking for empty fields) without communicating with the
    server, but more complicated checks such as determining whether or not a username
    is already in use require server interaction.


    Although the client-side validation still uses the server for validation, it is
    quicker than doing a normal post-back since the page doesn’t need to be reloaded.


    ■**Note** In this particular example, all validation is done using the FormProcessor_UserRegistration
    class. The client-side code we will implement is really just a proxy to this class.
    This means we can easily expand the form-processing capabilities in the future
    by modifying FormProcessor_UserRegistration—


    the JavaScript we develop in this section will scale automatically.


