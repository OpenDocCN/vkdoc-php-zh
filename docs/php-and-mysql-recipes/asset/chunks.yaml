    \ `list()` 结构来分解数组。`list()` 结构位于赋值语句的左侧，用于获取数组的元素并将其分配给各个变量，如下例所示。\n\n```php\n\
    // 10_31.php\n$a = [1, 2, 3];\n\nlist($v1) = $a;\necho \"$v1\\n\";\n\nlist($v1,\
    \ $v2) = $a;\necho \"$v1, $v2\\n\";\n\nlist($v1, $v2, $v3) = $a;\necho \"$v1,\
