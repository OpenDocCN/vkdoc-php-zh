  我们已经了解了 Shopify 主题是如何组合的，并在上一章末尾通过 Shopify 管理后台的在线主题编辑器查看了默认 Debut 主题的内容。如果你有点自虐倾向，你完全可以在这个编辑器中完成所有主题开发。不过，如果你尝试这样做，你很可能会遇到以下困难：


  - 在线编辑器很不错——同类中最好的之一——但在有用的开发功能方面，它无法与桌面 IDE 或文本编辑器相比。

  - 如果你作为一名网页开发者，习惯并高效地使用特定的开发环境，那么你会失去这种效率。

  - 你需要在线并在浏览器中才能对主题进行任何修改。

  - 与他人在主题开发上进行协作很困难，并且很容易导致覆盖彼此的工作。

  - 你的主题只存储在一个地方，没有任何备份。

  - 虽然存在有限的版本控制形式（你可以将单个文件恢复到以前的版本），但这与 `Git` 或 `Mercurial` 等“严肃”的版本控制系统无法相比。

  - 你需要“原样”编辑文件，这意味着你无法轻易使用诸如合并资源或为生产环境压缩资源之类的技术。


  本章着眼于如何通过设置一个本地开发环境来同步你的代码更改到 Shopify，从而解决上述每一个限制。它还探讨了如何使用流行的修订控制系统 (`Git`) 来正确地对主题进行版本管理和更改管理，最后探讨了高级构建工具（Shopify
  的 `Slate` 等），这些工具允许我们在处理主题时利用更高级的网页开发技术。


  你无需在开始处理主题之前就实施这些实践，但尽早养成其中一些习惯是好的——我可以保证这会让你的 Shopify 开发体验顺畅得多。我确实建议，在进入第 4 章开始开发你自己的示例主题之前，你至少熟悉一下在本地编辑主题文件并将更改自动推送到
  Shopify 商店的过程。




  ### 迁移至本地开发环境


  我们对开发工作流程的第一项改进，就是将主题文件的编辑地点从在线编辑器迁移到本地机器。获取当前主题文件副本的操作很简单。在商店后台的“主题”板块，使用“操作”下拉菜单并选择“下载主题文件”（见图
  2-1）。


  ![A437216_1_En_2_Fig1_HTML.jpg](img/A437216_1_En_2_Fig1_HTML.jpg)


  图 2-1


  将当前主题下载为 `.zip` 文件


  Shopify 会通过电子邮件向您发送一个下载链接。您可以获取该链接，解压缩文件，并将其移动到一个工作目录中，如代码清单 2-1 所示。


  ```

  $ unzip ~/Downloads/example-theme.zip -d /projects/example-theme

  $ cd /projects/example-theme

  $ ls

  assets        config        layout        locales

  sections      snippets     templates

  代码清单 2-1

  在命令行中解压已下载的主题文件并查看其内容

  ```


  现在我们在本地有了主题文件的副本，就可以使用文本编辑器或自己偏好的 IDE 来开发主题了。编辑器或工具集没有唯一的“最佳”选择；实际上，这完全取决于您个人，取决于您熟悉或舒适的工具。如果您暂无头绪，流行的编辑器包括
  Vim、Sublime Text 和 Atom。


  **提示**


  如果您偏好的编辑器支持插件或语法扩展，请务必检查是否有适用于 Liquid 模板语言的扩展。这将极大地提升您处理 Shopify 主题文件的体验。如果找不到专门支持
  Liquid 的扩展，您可以尝试寻找支持 Twig（一种语法与 Liquid 非常相似的替代模板语言）的扩展，并在编辑器中将其与 `.liquid` 文件关联。


  ### 将更改同步到 Shopify


  能够在自己的编辑器中修改代码固然很好，这解决了本章开头提到的前几个问题。然而，现在我们又遇到了另一个问题：如何将我们在本地文件中所做的任何更改推送回我们的 Shopify
  商店？


  我们可以将更改后的文件内容从本地环境复制粘贴到在线网页编辑器，但这似乎算不上改进。我们也可以将主题目录打包成 `.zip` 文件，然后通过 Shopify 后台上传，但如果每次修改都需要这样做，那将非常麻烦。


  #### 介绍 Theme Kit


  解决这个问题的方案是 Theme Kit ( [`https://github.com/Shopify/themekit`](https://github.com/Shopify/themekit)
  )，这是一个由 Shopify 构建和维护的小型命令行工具。由于它被构建为简单的、单一的跨平台二进制文件，开发者无论使用什么平台都可以使用它。（Theme Kit
  是作为之前解决方案 `shopify_theme` gem 的替代品而构建的。它执行类似的功能，但要求用户在其本地机器上有一个可运行的 Ruby 环境。）


  关于不同平台的下载和安装说明，我将留给 Theme Kit 详尽的文档（位于 [`https://shopify.github.io/themekit`](https://shopify.github.io/themekit)
  ）。但一旦设置完成，它就能让您从命令行下载和上传主题文件，如代码清单 2-2 所示。更棒的是，您可以使用它来监视一个主题目录，并在文件保存时自动上传更改后的文件，如代码清单
  2-3 所示。


  ```

  $ cd /projects

  $ mkdir /projects/example-theme

  $ cd ./example-theme

  $ theme configure --store example.myshopify.com --password 905bbb49ee10d0eb9c7b380183b2bc43
  --themeid 74729482

  $ theme download layout/theme.liquid

  [development]: 1 / 1 [================] 100 %

  (... 编辑 layout/theme.liquid ...)

  $ theme upload layout/theme.liquid

  [development]: 1 / 1 [================] 100 %

  代码清单 2-2

  命令行示例，展示 Theme Kit 的配置及下载/上传流程

  ```


  ```

  $ cd /projects/example-theme

  $ theme watch

  [development] 正在监听主机 example.myshopify.com 上的更改

  [development] 收到 layout/theme.liquid 的更新事件

  [development] 成功对文件 layout/theme.liquid 执行更新操作，已上传至 example.myshopify.com

  代码清单 2-3

  命令行示例，展示 Theme Kit 监视主题目录的更改并自动上传到 Shopify

  ```


  #### 使用 Theme Kit


  设置好 Theme Kit 并让它监视我们的文件更改后，我们就可以使用本地文本编辑器或 IDE 来管理和编辑主题文件，然后切换到浏览器并刷新以查看更改。对于 Web
  开发来说，这并非最理想的工作流程（与一些允许在浏览器中自动、即时“热重载”代码的现代 Web 开发工作流程相比，它可能显得有些笨拙），但它的反馈循环足够短，足以应用于日常开发。


  关于 Theme Kit 需要注意的几点：


  *   它将所有配置细节（商店 URL、API 凭据等）存储在一个名为 `config.yml` 的文件中。此文件允许定义不同的“环境”（例如，开发、预发布和生产），以方便从单个主题目录更新多个主题。

  *   使用 Theme Kit，我们可以跳过 `.zip` 文件下载步骤来开始处理现有主题，只需运行主题配置步骤，然后从命令行运行不带任何参数的 `theme
  download` 命令即可。

  *   您可以处理并预览当前未在 Shopify 商店中发布的主题（对于正在被客户积极使用的网站，这是推荐的做法）。您可以通过在 Shopify 后台查找未发布主题的
  ID（Theme Kit 的文档中有相关操作说明），将其设置在 `config.yml` 中，然后运行 `theme open` 命令，在默认浏览器中预览该主题。


  ### 将主题纳入版本控制


  如果您尚未这样做，那么本课最重要的收获应该是：在开发主题时，请使用版本控制系统（如 Git 或 Mercurial）。如果您不熟悉 VCS，Git 书籍在 [`https://git-scm.com/book/en/v2/Getting-Started-About-Version-Control`](https://git-scm.com/book/en/v2/Getting-Started-About-Version-Control)
  上提供了很好的概述。


  在 Shopify 主题的上下文中，版本控制可以：


  *   防止您在主题代码库中犯下无法挽回的错误

  *   使团队更容易共同开发一个主题

  *   跟踪对主题所做的工作（以及由谁完成）

  *   让您能够在“功能”分支或“主题”分支上试验新功能，这些分支可以在不影响生产代码的情况下进行测试

  *   提供了一种结合部署工具简化主题部署的方法（您将在第 11 章中看到其工作原理）


  在开始使用版本控制一段时间后，您还会注意到自己对开发流程的思考方式发生了变化。您会发现自己在思考对主题代码库的修改时，会将其视为一个个小的、原子的、便于您自己、您的同事以及未来的开发者理解的变更块。您还可以利用版本控制生态系统中的各种工具和服务，例如用于代码托管的
  GitHub、GitLab 或 Bitbucket，或者用于代码审查的工具如 GitX（见图 2-2）。


  ![A437216_1_En_2_Fig2_HTML.jpg](img/A437216_1_En_2_Fig2_HTML.jpg)


  图 2-2


  GitX，一个可视化的 Git diff 工具，展示了主题的历史记录和更改概览




  #### 适用于 Shopify 主题的 Git 工作流


  Git 可以说是当下事实上的版本控制系统（也是我唯一熟悉的系统，我已经成功将 RCS 和 Subversion 的不愉快记忆从脑海中抹去）。如果你是 Mercurial
  的粉丝，我表示歉意，但以下示例将完全以 Git 为中心。


  假设我们已经安装了 Git，清单 2-4 展示了如何开始将我们的示例主题纳入版本控制。


  ```bash

  $ cd /projects/example-theme

  $ git init .

  已初始化空的 Git 仓库于 /projects/example-theme/.git/

  $ echo "config.yml" > .gitignore

  $ git add .

  $ git commit -m "初始提交。"

  清单 2-4

  在 Shopify 主题目录中初始化 Git 仓库

  ```


  请注意，在初始化仓库之前，我们必须将 `config.yml` 添加到 Git 的忽略列表中。这是因为 Theme Kit 使用此文件来存储敏感的 API 凭据，我们绝对不希望将其检入版本控制。之后，你可以在本地编辑主题文件，同时运行主题
  gem 以自动将更改上传到商店，然后完成工作后，将更改提交到 Git。


  如果你不确定本地工作目录是否与 Shopify 商店上的内容匹配，可以运行 `theme download` 来获取所有远程文件，并使用 `git diff`
  查看差异。


  当我与那些喜欢通过网页编辑器自行对主题进行小改动（通常是微小的文案或样式调整）的客户合作时，这种情况实际上经常发生。执行 `theme download` 并提交他们的任何更改，可以避免在你最终修改同一文件时覆盖他们的工作。（如果这种情况频繁发生，很可能是一个明确的信号，表明客户所做的更改应移入主题设置或语言文件中，这将在第
  8 章中介绍。）


  **提示**


  当你运行 `theme download` 时，有时可能会注意到一些“孤立文件”从你的 Shopify 主题中被拉取下来——这些文件曾经在你的仓库中，后来被重命名或删除，但仍然上传到了
  Shopify 服务器上的主题版本中。一个便捷的一行命令（在运行 `theme download` 之后）可以用来清理服务器上的这些文件：`git clean
  -n | sed ''s/Would remove //'' | xargs theme remove`。此命令使用 `git clean` 获取不在版本控制中的文件列表，并将它们传递给
  `theme remove` 命令，以便从服务器上清理。此命令不会在本地删除文件，因此你无需担心意外丢失工作。


  ##### 使用 Git 的主题功能分支


  在使用 Git 进行开发时，通常希望在功能分支上工作，以便开发新功能而不影响主分支或线上代码库。稍加调整，我们也可以在 Shopify 主题中实现这一点。假设：


  1.  你已在 Shopify 商店中安装并发布了一个主主题（“master”主题）。

  2.  你有一个已纳入版本控制的该主题的本地副本（“master”分支）。

  3.  你正在使用 Theme Kit 将更改同步到主主题，并已使用“master”主题的 ID 配置了 Theme Kit 的 `config.yml`。


  你可以创建一个功能分支来进行开发，首先确保 Theme Kit 中的任何 `theme watch` 进程已停止，然后在浏览器中：


  1.  打开商店管理后台的主题部分。

  2.  打开“master”主题上的操作下拉菜单，选择“复制”。

  3.  等待主题复制完成，然后通过单击“自定义主题”按钮并查看 URL 来获取新创建主题的 ID。


  然后，在命令行中，切换到新的 git 分支并更换主题 ID，如清单 2-5 所示。


  ```bash

  $ cd /project/example-theme

  $ git checkout -b new-feature

  切换到一个新分支 ''new-feature''

  $ sed -i '''' ''s/[主主题 ID]/[新主题 ID]/g'' config.yml

  $ theme watch

  [development] 正在监听主机 example.myshopify.com 上的更改

  清单 2-5

  从命令行切换到 Git 功能分支

  ```


  你现在已在 Shopify 商店上创建了一个完全独立的预览主题，该主题将与本地的 `new-feature` 分支同步。进行一些更改，等待它们自动上传，然后运行
  `theme open`。你将被带到“new-feature”主题的预览页面（你会在浏览器底部看到相关通知，如图 2-3 所示），但访问常规网站的访客仍然会看到“master”主题。


  ![A437216_1_En_2_Fig3_HTML.jpg](img/A437216_1_En_2_Fig3_HTML.jpg)


  图 2-3


  当我们查看对公众不可见的页面时，浏览器底部会出现此覆盖层


  如果你想知道控制台中的那个 `sed` 命令是做什么的，它只是更新 `config.yml` 文件，使其指向商店上主题的新副本，而不是主副本。你也可以通过在文本编辑器中直接打开
  `config.yml` 并手动更改包含 `theme_id` 的行来达到同样的效果。


  如你所见，这个过程有点棘手，而且当你试图在分支之间来回切换时（这正是你经常想做的），它可能会变得更加棘手。从功能分支切换回主分支工作的过程现在大致如下：


  1.  确保所有我们想在功能分支上保留的更改都已提交或暂存。

  2.  确保任何 `theme watch` 进程已停止。

  3.  运行 `git checkout master`。

  4.  编辑 `config.yml` 文件中的 `theme_id`，使其再次指向“master”主题。

  5.  运行 `theme watch`。


  一旦你习惯了这个过程，就可以很轻松地执行分支切换。你还可以在 `theme watch` 运行时将更改合并到主分支，并将合并后的文件直接更新到主要的 Shopify
  商店主题（不过要注意合并冲突！）。


  这个工作流目前适合你，并且可以处理我们在后续章节构建示例主题时将遇到的所有情况。在第 11 章中，你将开始了解一些替代的主题部署策略，并学习如何自动化地将主题更改推送到当前生产环境中的主题。


  ### Slate 与主题构建工具


  到目前为止，我们在构建主题时所编辑的主题文件与 Shopify 使用的最终格式之间存在 1:1 的对应关系。这在入门阶段非常棒——它有助于我们完全理解 Shopify
  主题是如何组合在一起的，并让我们能够非常快速地开始使用主题。但是，如果你拥有 Shopify 之外的 Web 开发背景，你就会知道现代网站很少在源文件和生产交付物之间保持这种
  1:1 的映射关系。


  与任何其他网站一样，Shopify 主题可以在将源文件交付给最终用户之前，通过不同方式的转换而受益匪浅。其中两种转换是合并和优化。


  合并将许多单独的文件捆绑成一个单独的资产发送到浏览器。这使我们在编写主题时能够在逻辑上分离和维护文件，但只向浏览器发送一个文件。优化则接收一个源文件（可能是 JavaScript、CSS、Liquid
  或图像）并对其进行一些处理，通常是为了减少要交付给浏览器的总字节数。


  当你阅读到第 10 章（性能）时，你将更详细地了解这些过程的具体细节及其优势。但就目前而言，重点在于一件事：鉴于我们希望对源文件执行这些转换，我们如何将其整合到现有的开发工作流中？




  #### Grunt 和 Gulp：自动化任务运行器


  直到最近，想要在主题工作流中接入拼接（concatenation）或优化等预处理任务的最佳选择是使用任务运行器，其中最常用的两个是 `Grunt`（[`http://gruntjs.com`](http://gruntjs.com)）和
  `Gulp`（[`http://gulpjs.com`](http://gulpjs.com)）。


  这些工具对于在其他平台上工作的 Web 开发者来说可能很熟悉，但如果你之前从未见过或使用过它们，那么两者的目标都是提供一种方式，用于定义在特定情况下要执行的一系列自动化任务。在
  Shopify 主题的上下文中，这些任务的一些示例包括：


  - 优化图像资源

  - 预处理并将 `SASS` 或 `LESS` 源文件编译成最终的 CSS 样式表

  - 拼接并压缩 JavaScript

  - 将主题打包成 `.zip` 文件以便分发


  `Grunt` 和 `Gulp` 都允许你定义触发这些自动化任务的事件，因此你可以配置它们来监听主题的源文件，并在保存更改时自动执行处理步骤。在我过去为主题使用的标准设置中，我在本地处理
  Shopify 主题的目录结构类似于列表 2-6。


  ```

  /.build

  /theme

  /Gruntfile.coffee

  Listing 2-6

  The Top-Level Directory Structure of a Theme Using Grunt for a Preprocessing Workflow

  ```


  在这种配置中，顶层`/theme`目录包含我的主题源文件，其结构便于维护。例如，我不会被限制在将所有脚本和样式表资源放在一个`/assets`目录中的扁平目录结构里，而是将内容分离到`/assets/js/vendor`、`/assets/js/product`、`/assets/js/common`等目录中。`Gruntfile.coffee`定义了所有要运行的任务以及触发它们的规则，而`/.build`则包含最终“构建完成”的主题，其组织方式符合
  Shopify 期望的标准目录结构。


  当积极开发一个主题时，我会在`/.build`目录内运行 Theme Kit 的 `theme configure` 和 `theme watch` 命令，然后在顶层目录运行
  `grunt watch` 命令。当我修改`/theme`中的模板和资源时，`Grunt` 的监听任务会检测到更改，触发相应的处理任务，并将更新编译到`/.build`，Theme
  Kit 会从那里自动将更改后的文件上传到 Shopify。


  此工作流的目录布局（包括设置说明和一个标准的 `Gruntfile.coffee`，它能处理许多常见的 Shopify 构建任务，如 Sass 编译、JavaScript
  压缩、图像优化以及生成适合上传到 Shopify 的 `.zip` 文件）可免费在 [`https://github.com/discolabs/shopify-theme-scaffold`](https://github.com/discolabs/shopify-theme-scaffold)
  获取。


  #### 其他工作流自动化工具


  `Gulp` 和 `Grunt` 是相当“底层”的工具，它们需要你花一些时间编写配置文件并将其设置为可与 Shopify 一起工作。我觉得这里应该提一下另外几个工作流自动化工具，它们要么更“用户友好”，要么是专门为
  Shopify 设计的：


  - `Prepos`（[`https://prepros.io/`](https://prepros.io/)）是一个跨平台的 GUI 工具，用于配置和执行常见的预处理任务，并支持实时浏览器重载。

  - `CodeKit`（[`https://codekitapp.com/`](https://codekitapp.com/)）与 `Prepos` 类似，但仅适用于
  Mac（不过开发者似乎更有幽默感）。

  - `Quickshot`（[`https://quickshot.readme.io`](https://quickshot.readme.io)）是一个命令行工具，但它是专门针对
  Shopify 开发而设计的。它支持预编译、并行上传和下载，以及一些不错的高级功能，例如能够下载/上传 Shopify 博客、页面和产品内容。


  #### 介绍 Slate


  在上一节中，我提到像 `Grunt` 和 `Gulp` 这样的工具“直到最近”还是向主题工作流添加自动化任务的最佳选择。2017 年，Shopify 发布了 `Slate`，这是一个新的命令行工具，专门专注于辅助
  Shopify 主题的开发（见图 2-4）。


  ![A437216_1_En_2_Fig4_HTML.jpg](img/A437216_1_En_2_Fig4_HTML.jpg)


  图 2-4


  位于 [`​shopify.​github.​io/​slate`](https://shopify.github.io/slate) 的 Slate 文档页面


  `Slate` 提供了与 `Grunt` 或 `Gulp` 驱动的类似工作流：它允许你使用灵活的目录结构开发 Shopify 主题，并将预处理任务接入开发流程。它还提供了一些额外的功能，例如：


  - 主题脚手架生成，允许通过一个简单的 `slate theme new-theme` 命令为新的 Shopify 主题创建源目录和构建目录。

  - 内置支持监听、重新编译并将更改上传到多个 Shopify 环境，这意味着你只需要运行一个 `watch` 进程，而不是像 `Grunt`/`Gulp` 和
  Theme Kit 示例中那样需要运行两个进程（`Slate` 底层使用 Theme Kit 来实现此功能）。

  - 支持在浏览器中实时重载主题，以缩短修改代码和看到结果之间的循环时间。

  - 向工作流添加自动化测试和样式检查。

  - 提供大多数 Shopify 主题通用的可复用前端组件。


  由于 `Slate` 是专为 Shopify 主题开发而设计的，它提供了比 `Grunt`、`Gulp` 或其他工具更流畅的体验。虽然它仍是 Shopify 生态系统中的一个非常新的成员，并且还有一些粗糙之处需要打磨，但我预计
  Shopify 主题开发者将以我们在不太标准的 `Grunt` 和 `Gulp` 工作流中未曾见过的方式围绕 `Slate` 实现标准化，这将使得在项目和项目之间共享可复用的主题片段和设计模式变得更加容易。


  在本书中的大多数示例开发中，我们不会使用 `Slate` 或任何其他构建工具。原因是它在我们编写的代码和 Shopify 上运行的代码之间增加了一层额外的间接层。然而，在本书的最后一章中，你将看到如何将你的示例主题迁移到由
  `Slate` 驱动的工作流中，以及如何将其接入更高级的部署流程。通过示例 GitHub 仓库，你将看到确切需要修改的代码以及使用 `Slate` 处理你自己主题所需运行的命令。


  ### 总结


  本章涵盖了一些你可以用来开发 Shopify 主题的关键工具，并解释了它们如何帮助你更高效地构建商店。它涵盖了本地开发、版本控制和工作流自动化，并介绍了 `Slate`，一个
  Shopify 开发的工具，它提供了许多开箱即用的功能。




  '
- "# 3. 原则与流程\n\n既然我们已经扎实掌握了 Shopify 主题的构成要素（第 1 章），并了解了如何组合一个主题（第 2 章），那么是时候深入实践开始编码了，对吧？还差一点！\n\
  \n在进入实操练习前的最后一步，是退后一步，从宏观角度思考主题开发流程。你的目标是什么？如何才能最大程度地确保交付的主题成功实现这些目标？你可以做些什么来确保你的交付成果无论现在还是六个月后都易于维护？\n\
  \n在本章中，我将讨论我在开发 Shopify 主题时喜欢牢记的一些原则，并探讨主题开发者用于成功交付项目所用的各类流程。为了避免太多看似高深却空洞的套话，我会用一些真实的案例来支撑我的建议。\n\
  \n阅读过程中，你可能会觉得本章只针对为客户构建定制主题的自由职业者和机构。如果你觉得这不适用于自己，请不要气馁——我相信，无论你是为自己建站、作为内部团队的一员，还是计划在\
  \ Shopify 主题商店中出售主题，这些建议同样适用。在这些情况下，你只需将自己、你的公司或广大 Shopify 商家视为“客户”即可。\n\n### 设计原则\n\
  \n优秀设计的标志在于它能解决问题。\n\n由于 Shopify 是一个在线电商平台，作为主题设计师，我们解决的问题大多围绕客户展开。我们如何在访问的第一秒传达品牌的“感觉”？如何让某些产品更容易被发现？我们可以做些什么来优化客户的结账体验？我们又能做些什么来追加销售，提升客户的客单价？\n\
  \n#### 理解设计目标\n\n从某种意义上说，首要的设计目标是帮助商店实现收入最大化。（如果你觉得这有点过于露骨的资本主义色彩，那么请考虑到这个总目标确实涵盖了品牌设计、创建独特且令人喜爱的网站，以及提供出色的客户体验。）\n\
  \n在与客户（或你自己）讨论某个功能或变更的目标时，牢记这一点会很有用。如果需求是“在主页添加一个轮播图”或“我们把这个按钮的颜色改改怎么样？”，将讨论拉回到对底线的潜在影响上，有助于优先安排有意义的工作，并为基础问题找到更简单的解决方案。\n\
  \n在场的设计师们会认出这里运用的“五个为什么”技巧：针对任何拟议的功能或变更，连续问五次“为什么”，有助于揭示根本问题，并将其与首要目标关联起来。\n\n以这种方式追问“为什么”，还能揭示出连客户自己都未明确意识到的更广泛的潜在目标。我们最近在为一位客户进行需求发现阶段时就遇到了这种情况。那是一家护肤品公司，计划在澳大利亚和新西兰市场推出多个新品牌，并为每个品牌设计定制化的\
  \ Shopify 主题。\n\n在初次沟通和阅读背景资料时，我们注意到，与“传统”电商功能（如产品表单和结账流程）相比，客户对“产品展示”功能（轮播图、主视觉大图、长篇幅产品详情页）的重视程度要高得多。深入挖掘后，我们发现客户预计其大部分销售额将由与零售商的线下合作来驱动。\n\
  \n这帮助我们认识到，该 Shopify 网站最重要的目标之一根本不是传统的电商功能，而是作为销售代表向潜在零售合作方进行推销时的营销工具。了解这一点后，我们能够调整方案，更侧重这个应用场景，并使我们的解决方案契合客户的实际目标。\n\
  \n#### 为人而设计\n\n一旦我们确立了 Shopify 网站的设计目标，接下来就要努力构建主题来实现这些目标。通常，这意味着你的主题应以帮助人类（客户）达成其目标（在网站上找到想要的东西并购买）为导向。\n\
  \n风格与装饰应让位于可用性与可访问性。添加一个全屏视差滚动轮播图在原型中可能看起来很棒，但它的价值必须与页面加载时间的增加、用户导航复杂度的提升以及可访问性的潜在下降进行权衡。\n\
  \n用户界面和信息传达应力求清晰和有用，而不是事后才想到的敷衍了事。如果某产品因缺货而无法添加到购物车，应返回一条详细的说明信息，而不是一条索然无味的“错误”或“无库存”提示。要设法给用户提供可操作的下一步（“我们有蓝色的变体库存，您愿意改买这个吗？”），而不是让他们沮丧地卡在死胡同里。\n\
  \n用户的需求（清晰的导航和页面结构、快速的页面加载和响应时间）应优先于商家的需求（页面内广告、大量的第三方跟踪代码以及侵入式的追加销售）。\n\n尽量避免排除用户——让你的主题具备可访问性，并遵守\
  \ WAI-ARIA（`https://www.w3.org/TR/wai-aria`）等标准。这不仅体现了体贴，能最大化可访问你商店并购买商品的人数，而且在某些情况下，未能做到这一点还可能带来法律风险¹。\n\
  \n在构建主题时，像这样支持用户体验有几个好处。首先，它能帮助你聚焦真实用户的使用场景和讨论，而不是停留在空泛的理想状态。其次，深切关注客户体验会在其他方面带来回报：快速、无痛的购买能促进回头客生意，激发口碑推荐，并且（如你将在第\
  \ 9 章所见）对搜索引擎排名产生积极影响。\n\n\n\n#### 针对不同场景的设计\n\n尽管我们尚未全部接入云端，但过去几年中，普通西方消费者的互联网连接水平确实有所提升；连接方式也日益多样化——无论是在家中使用传统台式机/笔记本，在移动中通过五花八门的移动设备，还是通过集成消息应用或联网冰箱等新兴平台。\n\
  \n其中任何一种都可能与电子商务商店相关，具体取决于商家及其典型客户。作为 Shopify 主题设计师，你需要开始考虑客户在访问商店时可能遇到的各种使用场景以及他们所处的具体情境。\n\
  \n请注意，我强调的焦点是“针对不同场景的设计”，而不仅仅是不同设备。这是因为，重要的不仅是思考客户可能使用哪些设备，还要考虑他们何时使用、以及希望达成什么目标。\n\
  \n以一位访问服装精品店首页的访客为例：\n\n*   他们是在工作日午休时，用办公桌上的台式机浏览系列商品、寻找时尚灵感吗？\n*   他们是在当晚坐在沙发上，边喝红酒边用手机，冲动购买白天看到的那件衬衫吗？\n\
  *   还是他们同样在用手机，但正值交通高峰，正拼命想在商店关门前找到离自己最近的门店位置？\n\n通常情况下，投入时间和精力去构建一个能同时优化所有场景的网站是不可能的，但优秀的设计师会花时间识别这些不同的潜在使用场景，并与客户协作确定其优先级。\n\
  \n### 开发原则\n\n一旦你走出设计阶段，开始主题的开发，有几件事值得牢记，以便让交付成果既健壮又易于维护。\n\n优先考虑这些原则并不总是那么容易，尤其是当我们面临截止日期，或试图向客户证明多花些时间合理时。它们确实往往需要在前期多投入一点时间，但根据我的经验，从长远来看，它们带来的回报远超成本。\n\
  \n#### 保持简单\n\n你的主题中概念和代码越简单，编写和维护起来就越容易。就代码而言，这意味着：\n\n*   将包含的 `Liquid` 代码片段数量控制在最小，以简化代码的逻辑模型\n\
  *   将巧妙的 `Liquid` 单行代码拆解为更小、更易于理解的步骤\n*   在驱动动态逻辑时，优先使用 HTML 和 `Liquid`，而非 JavaScript\n\
  *   识别那些定义在不同位置但服务于相同目的的页面或组件，并考虑将它们合并为一个\n\n**注意**\n\n那些允许将源码拆分成小而逻辑组件的开发实践对此大有裨益。你在第\
  \ 2 章（“工具与工作流”）中看到了一些例子，并在第 11 章（“协作式主题开发”）中会遇到更多。\n\n此外，专注于利用 Shopify 的内置功能和概念（如集合、产品、链接列表和标签），而不是尝试自行开发，也会有所帮助。理解\
  \ `Liquid` 和 Shopify 的局限性，并在这些界限内工作，可以减少头痛问题，比起用巧妙的 hack 绕开它们要省心得多。\n\n与此相关，我会尽可能避免为常见的电子商务功能依赖\
  \ Shopify 应用。不仅使用应用会产生持续的经济成本，许多应用还要求复杂的 `Liquid` 代码修改和额外的 JavaScript，这增加了心智和性能负担。许多\
  \ Shopify 应用是编写良好、健壮的软件，不会干扰商店的主题或其他应用——但也有很多不是，这可能在后续引发各种问题。\n\n举个例子，我经常看到商家和开发者依赖某个应用来实现简单的追加销售功能，比如“如果客户购物车中有产品\
  \ A，则建议他们添加产品 B”。虽然有多个应用能处理这种情况及更复杂的场景，但大多数应用依赖 JavaScript 来检查和调整购物车（这意味着需要加载额外的脚本文件，并为用户带来延迟），在某些情况下，还会强制用户刷新整个页面。相比之下，请看列表\
  \ 3-1 中的 `Liquid` 代码片段，它基于客户购物车的当前内容显示一条可配置的追加销售消息，简洁明了。\n\n```\n{%- unless settings.upsell_trigger_product\
  \ == blank or settings.upsell_target_product == blank -%}\n{%- assign has_trigger_product\
  \ = false -%}\n{%- assign has_target_product = false -%}\n{%- comment -%}\n遍历当前购物车中的商品，检查我们是否有触发产品\n\
  但还没有目标产品。\n{%- endcomment -%}\n{%- for item in cart.items -%}\n{%- if item.product\
  \ == settings.upsell_trigger_product -%}\n{%- assign has_trigger_product = true\
  \ -%}\n{%- endif -%}\n{%- if item.product == settings.upsell_target_product -%}\n\
  {%- assign has_target_product = true -%}\n{%- endif -%}\n{%- endfor -%}\n{%- if\
  \ has_trigger_product and !has_target_product -%}\n\n何不 \n添加一件 {{ settings.upsell_target_product.title\
  \ }}？\n\n{%- endif -%}\n{%- endunless -%}\n```\n**列表 3-1**  \n购物车页面上一个简单的、可配置追加销售消息的\
  \ `Liquid` 实现\n\n#### 利用渐进增强\n\n作为网页设计师，我们通常希望利用浏览器提供的最前沿、最酷的功能。然而，确保不把部分访客群体排除在外非常重要——尤其是在\
  \ Shopify 主题的背景下，这种排除会直接转化为金钱损失。\n\n渐进增强是一种以“自下而上”方式设计网站的做法——从能为能力最基础的设备（例如，一台不支持\
  \ JavaScript、图形支持有限的黑白 Kindle 浏览器）正常工作的内容开始，然后当更高级的功能可用时，“渐进地”加以利用（比如 JavaScript！CSS3！推送通知！彩色！）。\n\
  \n采用这种方法在开发阶段并不一定需要更多精力，而且它有助于我们避免出现整个潜在客户群体被剥夺购买机会的情况。（这方面的高调失败案例令人警醒——例如，访问 `Nike.com`\
  \ 的访客会看到一个黑屏，除非他们的浏览器支持特定的 CSS 功能；更过分的是，在很长一段时间里，沃尔玛的“加入购物车”按钮甚至对没有启用 JavaScript\
  \ 的用户根本不显示！）²\n\n**注意**\n\n在本书的实践部分中，我们将对我们开发的所有代码采用渐进增强的方法，重点关注无障碍支持，并确保你的主题为没有\
  \ JavaScript 的用户提供可靠的后备体验——这是电子商务商店最关心的两个问题。\n\n\n\n### 文档化工作\n\n初入 Shopify 主题开发的开发者常犯的一个错误（我自己也曾深陷其中）是过度关注\
  \ Shopify 网站的上线交付，而忽略了成功上线之后的维护工作。\n\n如果一切顺利，使用你主题的网站持续运营，那么新的季节、产品线、竞争对手和行业趋势都将要求对主题进行迭代和大规模修改。无论是你本人还是其他开发者负责这些修改，对代码、流程和架构进行恰当的文档化记录，都能让每个人的工作轻松得多。\n\
  \n对于代码而言，这意味着要花时间清晰地组织你的 `Liquid`、`JavaScript` 和样式表，并为它们添加详尽且有意义的注释。\n\n比较清单 3-2\
  \ 和清单 3-3 中的 Liquid 代码片段，两者功能相同。与第二个示例相比，你需要花费多少额外的时间和精力来理清第一个示例在做什么？你对修改这两个代码片段中的哪一个更有信心？\n\
  \n```\n{%- assign p1s = -1 -%}{%- assign p2s = -1 -%}{%- assign p3s = -1 -%}{%-\
  \ assign p4s = -1 -%}\n{%- for cp in collections.all.products -%}\n{%- unless cp.id\
  \ == product.id -%}\n{%- assign cp_score = 0 -%}\n{%- for tag in product.tags -%}{%-\
  \ for rt in cp.tags -%}\n{%- if tag == rt -%}\n{%- assign cp_score = cp_score |\
  \ plus: 1 -%}\n{%- endif -%}\n{%- endfor -%}{%- endfor -%}\n{%- if cp_score > p1s\
  \ -%}{%- assign p1s = cp_score -%}{%- assign p1h = cp.handle -%}\n{%- elsif cp_score\
  \ > p2s -%}{%- assign p2s = cp_score -%}{%- assign p2h = cp.handle -%}\n{%- elsif\
  \ cp_score > p3s -%}{%- assign p3s = cp_score -%}{%- assign p3h = cp.handle -%}\n\
  {%- elsif cp_score > p4s -%}{%- assign p4s = cp_score -%}{%- assign p4h = cp.handle\
  \ -%}\n{%- endif -%}\n{%- endunless -%}\n{%- endfor -%}\n\n{%- for rp in collections.all.products\
  \ -%}{%- if rp.handle == p1h or rp.handle == p2h or rp.handle == p3h or rp.handle\
  \ == p4h -%}\n{%- include 'product' with rp -%}\n{%- endif -%}{%- endfor -%}\n\n\
  清单 3-2\n一个难以解析的、用于计算相关产品的 Liquid 代码片段\n```\n\n```\n{%- comment -%}\n通过使用相似标签作为简单的评分系统来计算相关产品。\n\
  {%- endcomment -%}\n{%- assign product_1_score = -1 -%}\n{%- assign product_2_score\
  \ = -1 -%}\n{%- assign product_3_score = -1 -%}\n{%- assign product_4_score = -1\
  \ -%}\n{%- for current_product in collections.all.products -%}\n{%- unless current_product.id\
  \ == product.id -%}\n{%- assign current_product_score = 0 -%}\n{%- for tag in product.tags\
  \ -%}\n{%- for related-tag in current_product.tags -%}\n{%- if tag == related-tag\
  \ -%}\n{%- assign current_product_score = current_product_score | plus: 1 -%}\n\
  {%- endif -%}\n{%- endfor -%}\n{%- endfor -%}\n{%- if current_product_score > product_1_score\
  \ -%}\n{%- assign product_1_score = current_product_score -%}\n{%- assign product_1_handle\
  \ = current_product.handle -%}\n{%- elsif current_product_score > product_2_score\
  \ -%}\n{%- assign product_2_score = current_product_score -%}\n{%- assign product_2_handle\
  \ = current_product.handle -%}\n{%- elsif current_product_score > product_3_score\
  \ -%}\n{%- assign product_3_score = current_product_score -%}\n{%- assign product_3_handle\
  \ = current_product.handle -%}\n{%- elsif current_product_score > product_4_score\
  \ -%}\n{%- assign product_4_score = current_product_score -%}\n{%- assign product_4_handle\
  \ = current_product.handle -%}\n{%- endif -%}\n{%- endunless -%}\n{%- endfor -%}\n\
  \n{%- for related-product in collections.all.products -%}\n{%- if related-product.handle\
  \ == product_1_handle or related-product.handle == product_2_handle or related-product.handle\
  \ == product_3_handle or related-product.handle == product_4_handle -%}\n\n{%- include\
  \ 'product' with related-product -%}\n\n{%- endif -%}\n{%- endfor -%}\n\n清单 3-3\n\
  一个与清单 3-2 功能相同，但更具可维护性的 Liquid 代码片段\n```\n\n良好的文档化工作也不仅限于代码层面。其他一些有用的做法包括：\n\n-\
  \   在你的源代码的 `README` 文件中记录主题的概念和架构。\n-   为其他人编写一份“入门指南”，提供设置开发环境的分步说明，讲解主题中的任何非标准方面，并突出显示任何“陷阱”。\n\
  -   为客户和商店所有者提供一份“内容管理指南”，说明如何在不依赖开发人员的情况下管理其 Shopify 主题的各个方面。遵循“展示，而非告知”的原则，我经常为此目的录制简短的截屏视频。\n\
  \n### 采用防御式与模块化编程\n\n防御式编程意味着我们尽量在代码中少做假设，并优雅地处理失败情况。在 Shopify 主题的上下文中：\n\n-   避免编写因页面中不存在某个\
  \ DOM 元素或未使用特定 Liquid 模板而失败的代码。其他第三方代码、应用程序或开发者可能已经调整了主题。\n-   在 Liquid 代码中分配变量时，尽量使用唯一的变量名，以避免覆盖其他代码可能依赖的通用名称（例如，使用\
  \ `{% assign first_related_product ... %}` 而不是 `{% assign product ... %}`）。\n- \
  \  对于 JavaScript，如果 jQuery 或其他库不在你的直接控制之下，请不要假设它们存在。如果必须使用，则从你的脚本中自行加载它们，但要避免编写加载八个不同版本\
  \ jQuery 的代码（是的，我亲眼见过）。\n-   同样对于 JavaScript，避免编写需要特定执行顺序或需要在页面顶部执行的代码。这样做不仅能避免代码中许多常见的功能性问题，还能让你更容易构建高性能的主题（见第\
  \ 10 章）。\n\n采用模块化编程，我们尝试将主题分解为具有单一逻辑功能的小型、独立的组件。这能让我们在任意时刻需要记住的知识量降到最低，并使修改代码变得更加容易。它还允许我们以最小的麻烦在主题的其他地方重用这些组件。\n\
  \n作为一个实际例子，请考虑图 3-1，这是一个处理动态送货目的地、货币和变体选项的 Shopify 产品页面。\n\n![A437216_1_En_3_Fig1_HTML.jpg](img/A437216_1_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1  \n一个标有多个动态页面元素的 Shopify 产品页面\n\n当客户更改目的地国家、客户货币或产品选项时，可能需要对页面进行各种更新（特色图片、页眉中的客户支持号码、显示的价格等）。我们可以通过一个大的\
  \ JavaScript 回调函数来处理所有页面的更新，但一个更清晰的解决方案是将页面上的每个框分解成各自独立的组件，这些组件监听相关事件，并且只关注更新自身。\n\
  \n这种方法允许我们编写像清单 3-4 这样的小段代码，该代码负责在所选变体或货币发生变化时更新显示的价格元素。\n\n```\n$(document).on('variant.changed\
  \ currency.changed', function(e, variant, currency) {\nvar formattedPrice = Currency.format(variant.price,\
  \ currency);\n$('[data-variant-price]').text(formattedPrice);\n});\n清单 3-4\n针对图\
  \ 3-1 中产品页面的模块化 JavaScript 函数\n```\n\n如果你以后想更改显示价格的渲染方式，可以在这个代码片段中修改，而无需担心影响其他任何东西。同样，如果你想更改\
  \ `variant changed` 或 `currency changed` 事件的触发方式，也可以在不了解此价格组件实现细节的情况下进行修改。\n\n\n\
  \n### 流程原则\n\n任何主题构建流程都不可能完全相同——每位设计师、开发者或机构都会有自己独特的处理方式，即便在同一个人手中，也会根据客户或项目的不同而有所变化。\n\
  \n由于无法为成功的 Shopify 主题开发流程提供一套单一的规范性指南，我在本节中力求做的是：梳理出我所观察到的成功开发者通常共同关注的四个重要事项。\n\n\
  #### 客户与项目匹配度\n\n当你与客户双方都感到彼此合拍，感觉是在协作而非进行交易时，项目通常会取得好得多的成果。在承诺承接项目之前，请务必提前花些时间了解客户及其目标。\n\
  \n问问自己这些问题：\n\n-   与客户交流时我感到自在吗？我和他们相处融洽吗？\n-   客户所从事的事业是否能激发我的动力？\n-   该项目在技术层面是否有趣？\n\
  -   我的意见和专业知识会得到重视，还是我只被当作“一双干活的手”？\n-   最重要的是——我是否认为交付这个项目会为客户带来成功？\n\n根据具体情况，你可能会觉得自己应该同意，尽管感觉这个项目并不适合你或客户。虽然你需要自行判断，但我的经验（以及业内许多其他人的经验）是，你的直觉通常是准确的，而这样的关系和项目往往会以失败告终。\n\
  \n#### 迭代开发与客户投入\n\n对于最终选择合作的客户，确保他们在主题设计开发过程中保持密切参与至关重要。启动项目后消失三个月，然后带着一个“成品”回来，这绝对是交付客户不想要、不需要或没有投入感的产品的必由之路。\n\
  \n你确实需要主导和管理你的开发流程，以避免被客户微观管理，但要确保该流程包含多种有结构的方式，让客户能够提供反馈、讨论用例并测试可能的设计方案。一种常见的技术是将设计和开发规划为短期（一到两周）的“冲刺”或“周期”，每个冲刺或周期都有其特定的目标，并为你提供展示进展和接收反馈的机会。\n\
  \n提前采用迭代方法进行规划，也更便于将不可避免的变更纳入你的时间表和预算中，并最终提高你交付满足客户需求产品的可能性。让客户定期参与反馈和迭代过程，也会让他们对最终产品拥有更强的归属感。\n\
  \n#### 预期设定\n\n许多项目和客户关系恶化的问题根源在于预期设定不当。这有时是由于客户沟通不畅，但更多情况下，是自由职业者或机构未能清晰说明交付物的性质、时间表、项目范围与界限，以及职责划分。\n\
  \n一个好的开发流程应向客户提供这样一份划分，清晰地界定在范围之内的事项（例如，与已开发的模型和线框相匹配的精美主题的代码）以及范围之外的事项（例如，在 Shopify\
  \ 后台录入 5000 个 SKU 的数据）。时间表的设定应切合实际，并考虑到各方提供反馈、进行调研以及处理原始范围修订所需的时间。\n\n最后，必须指出的是，预期不是单行线。重要的是，你要向客户明确你对他们的预期，无论是及时对你最新的迭代版本提供反馈、发送文案和图片，还是支付发票。对于每一项预期，都要清楚说明未能满足这些预期对时间表和交付物的影响。\n\
  \n#### 用户测试\n\n无论商店或项目规模如何，最有用却最常被忽视的事项之一就是用户测试——让真实用户坐下来使用你的主题。虽然没有任何硬数据支持，但我认为造成这种忽视的原因可能是：用户测试预期（实际上也是期望）的结果是更多的工作——修复你之前未意识到的用户体验问题。\n\
  \n解决方案很简单——将其作为你流程的一部分进行规划和预算，在你的时间表（以及你的自尊心）中为处理因主题对可用性的假设所引发的问题留出空间。\n\n最简单的用户测试形式（老实说，即使预算极其有限，这也毫无借口可言）就是“咖啡店或同事”测试。找一个从未见过你网站的人，让他们坐在台式机或移动设备前，给他们一个任务，比如“找一件你喜欢的毛衣并买下它”或“找出来自某位特定设计师的所有鞋子”。在他们身后观察，大量记笔记（如果可能的话录下过程），最重要的是，咬住舌头，不要帮助他们。任何设计在第一次接触真实用户时都不会完美，我保证你会发现自己之前未曾意识到的许多可用性问题。\n\
  \n对于较大的项目，你可能需要投入时间和金钱进行专业的用户测试，可以委托专门从事此事的公司，或使用在线用户测试服务。使用此类服务可能比不那么正式的“背后观察”方法更有优势，因为它们能帮助你进行大规模测试，同时选择更能准确反映你商店访客构成的人群。\n\
  \n最后，一旦部署了你的主题，你可以密切关注实际访客在你的网站上的行为，以识别潜在的可用性问题。在最近的一个项目中，我们对 Shopify 结账流程进行了一些定制，在过程中向客户收集了一些额外信息。这些改动相当大，无论是前端还是流向第三方物流系统的结果数据，因此我们对部署采取了相当谨慎的态度。第一步是使用“背后观察”方法，并在多种不同浏览器和设备上进行前端测试。\n\
  \n随后，我们进行了为期一小时的改动实时测试，并利用用户分析工具 Hotjar（[`https://www.hotjar.com`](https://www.hotjar.com)）记录了每个用户会话在结账流程中的操作。回放时，我们可以逐一查看每段录屏，精确了解用户如何与新界面互动，以及他们在何处遇到困难或延迟。\n\
  \n这种方法发现了一些可用性问题，这些问题一旦我们看到就显而易见，但在与真实客户接触之前从未出现过。其中最明显的一个问题如图 3-2 所示。一个新按钮设计的可点击区域小于按钮的视觉区域，这意味着许多用户无法正确激活它，从而无法进入下一个结账步骤。\n\
  \n![A437216_1_En_3_Fig2_HTML.jpg](img/A437216_1_En_3_Fig2_HTML.jpg)\n\n图 3-2\n\n\
  用户测试前（左）和修正后（右），我们一个自定义结账按钮的可点击区域（绿色/深色部分）\n\n\n\n### 总结\n\n在本章中，我们退后一步，从整体角度思考\
  \ Shopify 设计以及构建主题时力求实现的目标。本章讨论了与用户共情的重要性，以及为各种情境下的访客进行设计的重要性。\n\n本章还讨论了在开发主题过程中应牢记的一些最佳实践，并介绍了一些在测试阶段帮助发现可用性问题的技巧。\n\
  \n脚注 1\n\n这方面最常被引用的例子是塔吉特百货，他们因未能让视障顾客正常访问其在线商店而遭到起诉，最终以 600 万美元达成和解。详见 [`https://www.w3.org/WAI/bcase/target-case-study`](https://www.w3.org/WAI/bcase/target-case-study)。\n\
  \n2\n\n这些例子取自 Filament Group 的著作《渐进增强设计》，作者是 Todd Parker、Patty Toland、Scott Jehl\
  \ 和 Maggie Costello Wachs。\n\n"
- "# 4. 设计主题基础\n\n在接下来的四章中，我们将一步步地设计并构建一个示例 Shopify 主题——逐页、逐功能地推进。在本章中，我们将探讨新主题的起步方式，然后设计并实现整个商店共有的关键元素——布局和导航。\n\
  \n重点将放在构建 Shopify 主题的基础知识上，而非网页或视觉设计的基础知识。这意味着你不会看到太多关于样式、视觉调整或前端框架选择的讨论，除非这些内容与\
  \ Shopify 特有的问题直接相关。\n\n在构建电商网站时，不同场景下可以且应该做出多种设计选择——使用何种导航风格、产品页面的最佳布局是什么等等。正确答案（如果存在的话）当然会因商店和目标受众的不同而有所差异。\n\
  \n我们不可能在一本书的范围内详细探讨每一种可能的选择。因此，面对这些选择时，我会先讨论不同的可行方案，然后选定一种常见方案用于演示。\n\n此外，为了避免将所有用于构建示例主题的代码直接堆砌在书中，我已将其放在一个\
  \ GitHub 仓库中（`https://github.com/gavinballard/defguide-theme`）。该仓库的提交历史记录着本章开始后示例主题的进展，方便你逐节跟踪所做的具体修改。\n\
  \n当代码有助于阐明某个观点或演示某项技术时，我会在文中使用它。为了使这些示例尽可能清晰且实用，我会剔除无关信息（如 HTML 类名或可访问性属性）。你随时可以查阅示例主题仓库中对应的完整代码片段。\n\
  \n准备好了吗？我们开始吧！\n\n### 起点\n\n在开始设计和构建主题之前，我们先确定工作流程并做好准备工作。我在第 2 章中讨论了多种工具和工作流技术，包括\
  \ Shopify 的 Slate 以及其他构建工具，这些工具能将你的主题从不同的源文件结构组装成 Shopify 期望的目录结构。\n\n了解并使用这些工具很重要，但首先，你需要在简单性和易用性之间找到平衡。这里我们假定直接使用\
  \ Shopify 主题目录结构（因此不使用 Grunt 或 Slate 等构建和编译工具），但在本地使用文本编辑器处理文件，并利用 Theme Kit 或 Theme\
  \ gem 保持变更与开发商店同步（如需复习这两种工具的使用，请回顾第 2 章）。\n\n#### 主题脚手架\n\n在日常处理 Shopify 主题的工作中，大部分时间你会在已有的\
  \ Shopify 源文件上工作——也许你会被请来定制一个从主题商店购买或由他人开发的主题。当你从头开始一个“绿地”项目时，拥有一个起点——一块可以工作的空白画布——会很有帮助。以下是几个免费可用的主题脚手架：\n\
  \n*   **Slate**：Shopify 官方主题开发工具，包含其自身的默认主题设置，当你运行 `slate theme new-theme-name`\
  \ 时会自动生成。它相当精简，为你提供模板文件以及一些初始样式和 JavaScript 辅助函数。Slate 使用一系列构建工具从源目录“编译”你的主题。\n\
  *   **Timber**：在 Slate 出现之前，这是 Shopify 的官方主题框架，提供了许多样式辅助函数和 Ajax 购物车等 JavaScript\
  \ 功能。随着 Slate 的推出，Timber 已不再维护，因此最好将 Timber 视为实现特定 Shopify 功能的灵感来源，而非起点。\n*   **Shopify\
  \ Theme Scaffold**：这是一个非官方项目，基于我们在 Disco 的主题工作。它包含一个简单的基于 Grunt 的主题编译工作流。与其他工具不同，它是一块真正的空白画布，因为其中只包含空的模板文件，没有任何样式或\
  \ JavaScript。\n\n随着时间的推移，你可能会逐渐形成自己处理 Shopify 主题的偏好，并开始构建自己的起点脚手架。\n\n不过，就本书而言，我们将回归最基础的方式。我们会从将\
  \ `blank.zip`（可从本书的 GitHub 资源中获取）上传到你开发商店的主题编辑器开始。顾名思义，`blank.zip` 是一个完全空白的主题，只包含\
  \ Shopify 认为有效上传所必需的最小内容。从图 4-1 中可以看到，一旦上传成功，它确实名副其实。\n\n![A437216_1_En_4_Fig1_HTML.jpg](img/A437216_1_En_4_Fig1_HTML.jpg)\n\
  \n图 4-1\n\n你可以直接将 `blank.zip` 文件上传到 Shopify 后台的“主题”页面（左图）。完成后，预览该主题会呈现一个令人兴奋的画面（右图）\n\
  \n\n\n#### 示例产品数据\n\n常见的设计错误是围绕不切实际的“虚拟”数据（比如 Lorem Ipsum）进行构建，而非使用网站上线后实际会用到的真实内容。我鼓励所有主题开发者养成一个习惯：在开始构建主题之前，务必确保客户提供了实际的产品数据和文案。\n\
  \n这并非总是可行，但幸运的是，Shopify 提供了一系列可供导入到开发商店的虚拟库存数据，帮助你处理真实的数据。这些虚拟产品包含各种尺寸的图片、不同数量的变体以及长度各异的描述，从而让你的主题能够在一系列内容中得到充分测试。\n\
  \n你可以从 [`https://github.com/shopifypartners/shopify-product-csvs-and-images`](https://github.com/shopifypartners/shopify-product-csvs-and-images)\
  \ 下载四组示例产品数据中的任意一组。\n\n**练习：起点**\n\n1.  搭建一个 Shopify 开发商店，以便开始跟随实践练习。具体步骤请参考第 1\
  \ 章。\n2.  从本书的资源页面下载 `blank.zip`，然后通过 Shopify 后台的“主题”页面上传到你的商店。\n3.  从 Shopify 下载一组示例产品数据，并将其导入你的商店。\n\
  4.  按照第 2 章“迁移到本地开发”中概述的步骤，将空白主题的副本下载到本地机器，并使用 Theme Kit 确保你在本地所做的任何更改都能同步到你的 Shopify\
  \ 商店。\n5.  一个可选（但强烈推荐）的步骤是将你的主题纳入版本控制，这样你就能保存整个过程中的进度，并将其与 GitHub 上示例主题的提交历史进行比较。请按照第\
  \ 2 章“将你的主题置于版本控制下”中概述的步骤进行操作。\n\n#### 主题的布局\n\n除非另有指定，否则主题中的所有页面模板都将在默认布局 `theme.liquid`\
  \ 内呈现。空白起始主题附带的布局文件如清单 4-1 所示。\n\n```\n{{ content_for_header }}\n{{ 'styles.css'\
  \ | asset_url | stylesheet_tag }}\n\n{{ content_for_layout }}\n{{ 'theme.js' | asset_url\
  \ | script_tag }}\n```\n\n清单 4-1 – 默认 `theme.liquid` 的内容\n\n整体结构对于任何使用过 HTML 的人来说应该都很熟悉。特定于\
  \ Shopify 的元素包括：\n\n-   `{{ content_for_header }}`：Shopify 要求将此输出标签放置在布局的 `<head>`\
  \ 部分。它将利用此位置在商店前端渲染的每个页面上添加 Shopify 端的 JavaScript、样式和跟踪代码。\n-   `{{ content_for_layout\
  \ }}`：Shopify 要求将此输出标签放置在布局的 `<body>` 部分。这是每个独立页面模板（`page.liquid`、`article.liquid`\
  \ 等）内容将被渲染的位置。\n-   `{{ 'styles.css' | asset_url | stylesheet_tag }}` 和 `{{ 'theme.js'\
  \ | asset_url | script_tag }}`：这些标签并非严格必需，但我将它们包含在默认布局中，因为你通常希望在每个页面都添加全站样式表和脚本。`asset_url`\
  \ 和 `stylesheet_tag` / `script_tag` 是 Liquid 过滤器，它们将特定资源的名称（如 `'theme.js'`）首先转换为该资源在\
  \ Shopify CDN 上的引用，然后转换为加载该资源的 HTML 标签，例如：`<script src=\"//cdn.shopify.com/s/files/1/1744/7651/t/2/assets/theme.js?2331723957652526606\"\
  \ type=\"text/javascript\"></script>`。\n\n随着时间的推移，我们将向 `theme.liquid` 添加越来越多的内容。其中大部分是我们希望在每个页面上显示的内容或元素，而另一些则会根据当前页面模板有条件地加载。首先，我们将研究整体站点布局和导航元素的设计考虑与实现——这些内容通常会影响到网站的所有页面。\n\
  \n### 设计布局与导航\n\n设计 Shopify 网站的布局和导航远不止是在网站顶部设置一个漂亮的导航栏并确保下拉菜单正常工作。这需要思考网站的用户，以及如何以最少的步骤，最好地帮助他们找到所需内容。\n\
  \n在网站布局方面，主题设计师面临的一个矛盾是“惯例与创意”。长期以来，客户对特定电商网站外观和运作方式的期望已经形成，这意味着我们往往会看到电商网站的外观趋于一致。看一下图\
  \ 4-2 中“原型电商网站”的布局，你可能会同意 90% 的电商网站都属于这种基本结构。\n\n![A437216_1_En_4_Fig2_HTML.jpg](img/A437216_1_En_4_Fig2_HTML.jpg)\n\
  \n图 4-2 – 原型电商网站布局\n\n我不认为这种趋同一定是坏事。如果我们的网站遵循客户的期望，他们将能够更有效地找到所需内容，这本身就是设计师的职责之一。在这些惯例之内，我们仍然有足够的空间来寻找品牌的“声音”。\n\
  \n对于这个示例主题，我们将实现一个与图 4-2 中“原型”布局非常相似的结构：一个包含标题区域的布局，左侧是 Logo 和文本链接，右侧是搜索栏、账户信息和购物车链接。在标题下方，我们为各个页面内容留出空间，最后在底部添加一个包含网站各版块链接的页脚。\n\
  \n由于我们预计会有大量移动端访客（访问 Shopify 网站的流量中，超过一半来自移动设备），我们需要确保布局具有响应式设计，并且通过折叠导航项、创建大触控区域以及调整字体大小，使其在移动设备上易于使用。\n\
  \n\n\n#### 站点页眉\n\n对于示例主题，我们将添加一个新的 `header.liquid` 区块（参见代码清单 4-2），该区块会渲染店铺名称，遍历主导航菜单（可从\
  \ Shopify 后台配置）中定义的链接，以及搜索、登录/我的账户和购物车链接。随后，我们将其包含在 `theme.liquid`（参见代码清单 4-3）中，使其出现在网站的每个页面上。\n\
  \n```liquid\n{{ shop.name | escape }}\n\n{%- for link in linklists.main-menu.links\
  \ -%}\n\n{{ link.title | escape }}\n\n{%- endfor -%}\n\n搜索\n\n{%- if shop.customer_accounts_enabled\
  \ -%}\n{%- if customer -%}\n\n{{ customer.first_name | escape }}\n\n{%- else -%}\n\
  \n登录\n\n{%- endif -%}\n{%- endif -%}\n\n购物车 ({{ cart.item_count }})\n\n代码清单 4-2\n\
  一个简单的 sections/header.liquid 区块\n```\n\n```liquid\n...\n\n{%- section 'header' -%}\n\
  {{ content_for_layout }}\n...\n代码清单 4-3\n将页眉区块包含在 theme.liquid 顶部，使其出现在每个页面上\n```\n\
  \n在 Shopify 站点上呈现时，效果类似于图 4-3（请注意，本书跳过了所有样式代码的添加；详情请参考示例主题仓库）。注意，菜单栏中的项目（如“商店”、“畅销商品”等）是在\
  \ Shopify 后台的“在线商店 > 导航”部分定义的，而非直接在主题中定义。\n\n![A437216_1_En_4_Fig3_HTML.jpg](img/A437216_1_En_4_Fig3_HTML.jpg)\n\
  \n**图 4-3** 示例主题的页眉\n\n简单但有效！需要注意以下几点：\n\n* 实现方式保持一致。我们不会根据当前页面更改可用的菜单项或菜单项的布局。保持网站导航结构在页面之间的一致性非常重要，因为这能减少用户在切换页面时需要处理的信息量。对网站布局或结构进行重大的“上下文相关”更改可能会让用户感到困惑，应予以避免。\n\
  * 购物车链接位于其常规位置（页面右上角）。保留此元素意味着，无论顾客身在何处，他们都知道如何执行电商网站最重要的步骤——进入结账环节。同时请注意，购物袋中当前的商品数量会显示出来，以帮助顾客跟踪其购物车状态。\n\
  * 该设计仅允许在页眉中显示单级导航。此阶段没有下拉菜单或分类筛选器。稍后你将更详细地了解导航模式。\n\n##### 使页眉可配置\n\n使用区块而非代码片段来实现页眉的优势之一在于，我们可以直接在区块中定义配置设置，并使这些设置在\
  \ Shopify 后台的主题定制器中以简单界面形式呈现。为了演示这一点，让我们进行一项更改，允许店铺所有者选择要使用的导航菜单，以渲染站点顶部的链接列表（目前固定在\
  \ `main-menu`，这是默认的 Shopify 导航菜单）。\n\n我们可以首先在 `sections/header.liquid` 顶部添加一个 `{%\
  \ schema %}` 定义，然后更新获取导航菜单的方式（参见代码清单 4-4）。完成后，从 Shopify 后台打开主题定制器的用户将能够选择要使用的菜单（见图\
  \ 4-4）。请注意，`link_list` 类型指的是 Shopify 后台中标题为“导航菜单”的项。\n\n![A437216_1_En_4_Fig4_HTML.jpg](img/A437216_1_En_4_Fig4_HTML.jpg)\n\
  \n**图 4-4** 添加 `{% schema %}` 标记为用户提供了一个优美的界面，使其能够在 Shopify 后台的主题定制器中进行配置更改\n\n\
  ```liquid\n{% schema %}\n{\n\"name\": \"页眉\",\n\"settings\": [\n{\n\"id\": \"primary_link_list\"\
  ,\n\"type\": \"link_list\",\n\"label\": \"主导航菜单\",\n\"default\": \"main-menu\"\n\
  }\n]\n}\n{% endschema %}\n\n...\n{%- assign primary_link_list = linklists[section.settings.primary_link_list]\
  \ -%}\n{%- unless primary_link_list == blank -%}\n\n{%- for link in primary_link_list.links\
  \ -%}\n...\n代码清单 4-4\n添加 {% schema %} 标记\n```\n\n#### 导航菜单\n\n导航页眉的初始方法仅提供单级选项。对于页面或产品数量非常有限的店铺，这种简单方法可能就足够了。然而，许多店铺为用户提供更多选择以及更快缩小产品范围的方式会更有用。这通常通过添加上下文相关的菜单选项（例如下拉菜单）来实现。\n\
  \n\n\n### 导航菜单设计\n\n为你的网站选择合适的菜单设计方案，需要深入理解网站的信息层级，尤其是产品层级。你需要考虑以下事项：\n\n- 客户/店铺所有者如何对商品进行分类\n\
  - 竞争对手如何对相同或相似商品进行分类\n- 客户如何对商品进行分类\n- 分类是“深”的（顶层类别少，但包含大量子类别和孙类别）还是“宽”的（顶层类别多，子类别很少或没有）\n\
  - 类别之间的重叠程度\n- 需要筛选或搜索的产品属性维度\n- 网站是否“内容密集”（例如，包含大量博客文章和文章）\n\n这个列表可能有点令人畏惧，但在确定你的导航菜单需要多大规模时，这是一个需要考虑的重要因素。如果店铺只销售\
  \ 2-3 种商品，你可以完全跳过分类；如果销售 50 种，可能只需要类别就够了；如果销售 500 种以上，那么你至少需要两级分类。\n\n重要的是，要意识到\
  \ Shopify 后台在分类方面（常被诟病的）局限性。严格来说，我们只被允许有一“真正”级的分类（用 Shopify 的术语来说就是“集合”）。并没有内在的子类别概念。我们真正得到的是产品上几个不同的字段，让我们可以对它们进行分组：**标签**、**产品类型**和**产品供应商**。**标签**最常用于模拟子类别功能。\n\
  \n在 Shopify 开发的几乎所有领域，我的一般性建议是避免过于聪明，过度突破边界会导致麻烦。作为推论，我不建议尝试用 Shopify 实现孙类别，除非你有非常明确的需求和可维护的方法（也许需要应用程序支持）。\n\
  \n对于示例店铺，我使用 Shopify 提供的“Apparel”示例产品数据。这为我们提供了 25 种产品的库存，涵盖了一些服装（男装和女装）、包袋和一些配饰。考虑到产品的分布以及客户可能如何看待它们，我将为此店铺设定四个主要产品类别：**女装**、**男装**、**包袋**和**配饰**。由于每个类别下只有\
  \ 4-5 种产品，我暂时不对它们进行子分类。\n\n除了这个产品层级，我还要假设店铺所有者认为有几个内容页面很重要——**关于我们**、**商品评价**和**媒体报道**。我还想为客户提供一个到达最受欢迎产品的快捷方式，我们可以通过一个指向“畅销品”集合的链接来实现。基于这些信息，主导航菜单的最终示例信息层级如下：\n\
  \n- 店铺\n  - 女装\n  - 男装\n  - 包袋\n  - 配饰\n- 畅销品\n- 关于我们\n- 商品评价\n- 媒体报道\n\n一旦我们有了一个层级结构，就需要决定如何在店铺前端最好地实现它。鉴于\
  \ Shopify 不原生支持层级导航菜单（在撰写本文时，此功能仍处于测试阶段），实现它们的标准方法是：\n\n1. 在 Shopify 后台为每个子菜单创建一个新的导航菜单，其名称与其顶层名称匹配（在此示例中，意味着创建一个名为“店铺”的新导航菜单，其中包含指向“女装”、“男装”、“包袋”和“配饰”集合的链接）。\n\
  2. 在遍历顶层菜单项时，更新 Liquid 代码以检查当前项是否存在子菜单。如果存在，则通过依次遍历其项来渲染该子菜单。\n\n你可以在 Shopify 后台（参见图\
  \ 4-5）和 `header.liquid` 部分（参见代码清单 4-5）中看到我如何为示例店铺实现这一点，并在前端看到结果（参见图 4-6）。\n\n![A437216_1_En_4_Fig6_HTML.jpg](img/A437216_1_En_4_Fig6_HTML.jpg)\n\
  \n图 4-6：示例主题店铺前端上的最终简单下拉菜单\n\n![A437216_1_En_4_Fig5_HTML.jpg](img/A437216_1_En_4_Fig5_HTML.jpg)\n\
  \n图 4-5：在 Shopify 后台配置子导航菜单\n\n```\n{%- for link in primary_link_list.links -%}\n\
  {%- assign child_link_list_handle = link.title | handle -%}\n{%- assign child_link_list\
  \ = linklists[child_link_list_handle] -%}\n{%- if child_link_list and child_link_list.links.size\
  \ > 0 -%}\n{%- assign has_child_link_list = true %}\n{%- else- %}\n{%- assign has_child_link_list\
  \ = false %}\n{%- endif -%}\n\n{{ link.title | escape }}\n\n{%- if has_child_link_list\
  \ -%}\n\n{%- for child_link in child_link_list.links -%}\n{{ child_link.title |\
  \ escape }}\n{%- endfor -%}\n\n{%- endif -%}\n\n{%- endfor -%}\n```\n代码清单 4-5：更新后的导航菜单链接循环，用于处理子菜单导航项\n\
  \n### 下拉菜单设计指南\n\n-   **限制菜单选项：** 尽量避免菜单项超过七个，因为这会给用户带来过大的认知负担。如果你觉得需要更多，可以考虑增加一级层级，或者仅仅依靠集合页面流畅的筛选体验来让用户缩小结果范围。记住，这是一个**上限**，而不是目标——ASOS\
  \ 的店铺只有三个顶层菜单项（首页、男装和女装）。\n-   **保持下拉菜单只有一级：** 尽管在下拉菜单一侧添加子菜单很诱人，但研究表明这对用户来说操作繁琐且棘手。当下拉菜单通过悬停激活时尤其如此——除非用户非常小心地移动鼠标，否则就会“丢失”菜单。如果你需要能够显示更大的类别范围，可以考虑使用下一节讨论的超级菜单。\n\
  -   **通过点击激活下拉菜单，而不是悬停：** 这意味着你不必担心移动设备和平板电脑等触控设备（在这些设备上无法触发悬停事件）有不同体验。它还允许你即使光标离开菜单，也能保持打开的菜单就位，从而避免用户的主要挫败感和潜在的可访问性问题。\n\
  \n图 4-7 中的下拉菜单是一个存在一些问题的菜单示例。首先，它太长，客户必须滚动才能看到所有选项。其次，它是悬停激活的，鼠标一离开就会立即关闭（在滚动以查看底部时非常常见）。最后，它包含的子菜单也存在同样的悬停问题，并且主菜单没有通过任何方式（例如右侧的箭头）提示它们的存在。\n\
  \n![A437216_1_En_4_Fig7_HTML.jpg](img/A437216_1_En_4_Fig7_HTML.jpg)\n\n图 4-7：一个存在若干可用性问题的下拉菜单\n\
  \n\n\n#### 大型菜单（Mega-Menus）\n\n如果你的分类很多，可能会发现信息量太大，无法在单级下拉菜单中容纳。这时，常见的大型菜单设计模式就派上了用场。大型菜单允许你向用户提供许多深层次的导航选项，并以你可控且可配图的结构呈现（见图\
  \ 4-8）。\n\n![A437216_1_En_4_Fig8_HTML.jpg](img/A437216_1_En_4_Fig8_HTML.jpg)\n\n\
  图 4-8\n\n尽管看起来有些杂乱，但这个示例展示了如何使用大型菜单对 ASOS 网站上大量深层链接进行分类。\n\n由于大型菜单提供了高度的空间和灵活性，它们应被视为一个独立的设计画布，而不仅仅是列出大量项目的方式。这样做，并结合以下建议，将帮助你充分利用菜单，为客户提供更好的购物体验。\n\
  \n-   使用标题和列来清晰地划分和标识你所选的菜单部分。列的选择应反映客户浏览产品范围的常见方式——例如，“按尺寸选购”、“按品牌选购”和“按价格选购”。\n\
  -   你不必简单地按字母顺序排列产品或分类。利用大型菜单的灵活性，在菜单的左上角推广你的畅销品或特色商品。\n-   保持大型菜单简短。菜单过高会给屏幕较小的用户带来问题。你可以通过充分利用屏幕宽度来弥补。\n\
  -   不要害怕使用图片或图形来美化产品或分类（但不要过度，以免让你的大型菜单变得视觉混乱）。\n-   通过使用响应式设计技术，确保你的菜单在移动设备上友好。\n\
  \nSunglass Hut 提供了一个优秀的大型菜单示例，如图 4-9 所示。精心挑选的顶级项目（女款、男款...）通过点击打开一个提供更深层次导航的大型菜单。该菜单有效利用图形提供了“特色品牌”功能以及底部的特色系列。\n\
  \n![A437216_1_En_4_Fig9_HTML.jpg](img/A437216_1_En_4_Fig9_HTML.jpg)\n\n图 4-9\n\n\
  Sunglass Hut 在大型菜单上有趣的横向变动是菜单设计的一个绝佳范例。\n\n大型菜单背后的实现逻辑与我们已经在示例主题中实现的下拉菜单类似；主要区别在于所显示元素的样式和大小。基于这个原因，并且因为我们还没有处理那么多产品，让我们暂时搁置在商店中实现大型菜单的工作，转而讨论另一个重要的导航元素——页脚。\n\
  \n#### 网站页脚（The Site Footer）\n\n页脚不仅仅是放置电子邮件注册表单的地方，设计师们常常忽视页脚在导航中极其有用的作用。对于已经滚动到页面底部但未找到所需内容的用户来说，页脚可以充当“救星”工具，降低用户跳出你网站的可能性。由于惯例，页脚也通常是客户寻找有关运费、退款和退货政策信息时首先查看的地方。\n\
  \n此外，页脚是放置信任信号的好地方，例如“安全”或“可信赖”网站徽章和标志、知名客户的标志，或报道过你品牌的媒体公司标志。研究表明，在每个页面上使用这些类型的信号来加强网站的可信度，可以对转化率产生积极影响。\n\
  \n> **注**\n> 如果你的商店在系列页面上采用了“无限滚动”技术，页脚中所有这些有用的信息可能会丢失。这是我不建议在电商网站使用无限滚动的几个原因之一。在深入探讨系列页面设计的第\
  \ 6 章中，你将更深入地了解这一点。\n\n为了在示例主题中实现页脚，我们将采用与页眉类似的方法，创建一个名为 `footer.liquid` 的新部分（参见代码清单\
  \ 4-6），然后从 `theme.liquid`（参见代码清单 4-7）中包含它，这次放在 `{{ content_for_layout }}` 标签之下。与\
  \ `sections/header.liquid` 一样，我们需要在顶部包含一个 `{% schema %}` 部分，以允许用户自定义页脚。\n\n```liquid\n\
  {% schema %}\n{\n\"name\": \"Footer\",\n\"blocks\": [\n{\n\"type\": \"link_list\"\
  ,\n\"name\": \"导航菜单\",\n\"settings\": [\n{\n\"id\": \"link_list\",\n\"type\": \"\
  link_list\",\n\"label\": \"导航菜单\"\n}\n]\n},\n{\n\"type\": \"payment_icons\",\n\"\
  name\": \"支付图标\"\n}\n]\n}\n{% endschema %}\n\n{%- for block in section.blocks -%}\n\
  {%- case block.type -%}\n{%- when 'link_list' -%}\n{%- include 'footer-block-link-list'\
  \ -%}\n{%- when 'payment_icons' -%}\n{%- include 'footer-block-payment-icons' -%}\n\
  {%- endcase -%}\n{%- endfor -%}\n\n代码清单 4-6\n新建 sections/footer.liquid 文件的内容\n```\n\
  \n```liquid\n...\n{{ content_for_layout }}\n{%- section 'footer' -%}\n{{- 'jquery-3.1.1.min.js'\
  \ | asset_url | script_tag -}}\n...\n代码清单 4-7\n在 theme.liquid 中包含新的页脚部分\n```\n\n\
  `footer.liquid` 代码引入了一个新的 Liquid 概念：块。块是内容和设置的封装器，可以在特定部分内添加、删除和重新排序。当你希望允许主题所有者定义重复的内容部分或控制内容出现的顺序时，使用块是合理的。\n\
  \n在此页脚中，我们在页脚部分内定义了两类块——一个 `link_list` 类型和一个 `payment_icons` 类型。第一个允许在页脚列内呈现垂直导航菜单，第二个则在商店前台显示支持的支付图标列表。通过主题定制器，店主将能够自由添加或删除这些块来配置页脚。\n\
  \n在 `footer.liquid` 中，代码会遍历在该部分中配置的每个块，检查其类型，并包含 `footer-block-link-list.liquid`\
  \ 或 `footer-block-payment-icons.liquid`。这些是 Liquid 代码片段文件，存储在主题的 `snippets` 目录中，以便在逻辑上划分和简化\
  \ `footer.liquid` 部分中的代码。这里使用的文件名只是一种约定，用以标识它们是从页脚部分作为块被包含进来的。请查看示例主题仓库以获取这些代码片段的完整实现。\n\
  \n图 4-10 展示了在主题定制器和主题预览中添加页脚后的结果。\n\n![A437216_1_En_4_Fig10_HTML.jpg](img/A437216_1_En_4_Fig10_HTML.jpg)\n\
  \n图 4-10\n\n添加页脚代码段可提供可自定义的多列页脚布局\n\n#### 练习：布局与导航\n\n1.  按照本章的步骤，向你的主题添加页眉和页脚部分，包括可配置的\
  \ `{% schema %}` 部分，以允许用户配置每个部分中使用的导航菜单。\n2.  为你自己假设的商店设计最重要页面的信息层级，包括产品层级和合理的分类系统。\n\
  3.  如果你的信息层级需要多层信息，请在主导航中添加一个下拉菜单，以便客户更容易找到他们想要的东西。如果你有雄心壮志，可以将该下拉菜单实现为大型菜单，并在展开区域内包含一些额外的图形信息。\n\
  \n\n\n### 总结\n\n在本章中，我们为构建一个新的 Shopify 主题做好了充分准备。本章涵盖了开发人员在开始新主题时可以使用的选项和框架，并解释了如何利用已有的示例产品\
  \ CSV 文件，基于真实数据开始构建。\n\n你学习了一些关键的 Shopify 概念，如布局、区块和块，并了解了在为商店主题设计导航布局时应遵循的设计原则。\n\
  \n脚注 1\n\n关于导入产品数据的说明，请参见[`https://www.shopify.com/partners/blog/93467590-design-your-store-faster-with-product-csvs-and-images`](https://www.shopify.com/partners/blog/93467590-design-your-store-faster-with-product-csvs-and-images)。\n\
  \n"
- "# 5\\. 设计产品页面\n\n一旦我们有了可用的基础主题结构，就可以开始构建商店中的各个页面。本章将从最重要的页面——产品页面——开始讲解。\n\n###\
  \ 产品页面\n\n对于电子商务商店来说，产品页面通常是最重要的页面。顾客在这里评估商品并做出购买的关键决定。它需要向访客传达大量信息——核心信息包括你的产品是什么、有什么功能、外观如何、价格多少、有哪些配置选项；以及补充信息，如尺码指南、配送详情、产品指南和顾客评价。\n\
  \n除了清晰地呈现所有这些信息，它还需要提供交互元素，帮助顾客根据喜好配置产品（例如，选择合适的尺码和颜色）、将其加入购物车，并进入结账流程。\n\n根据我的经验，设计师和店主往往花费过多时间来思考和完善网站的主页，却牺牲了产品页面。这完全可以理解——毕竟，当店主想查看自己的网站时，他们输入域名后看到的就是主页——但人们很容易忽视这样一个事实：许多商店访客并非从主页进入，然后依次线性地浏览到集合页和产品页。图\
  \ 5-1 展示了设计师和店主常常如何构想顾客在网站中的浏览路径（左侧），以及现实情况（右侧）。如果你正在为一个现有商店设计主题，可以申请查看已有的分析数据，以便了解商家实际顾客最常见的访问路径。\n\
  \n![A437216_1_En_5_Fig1_HTML.jpg](img/A437216_1_En_5_Fig1_HTML.jpg)\n\n图 5-1：设计师和店主如何构想顾客在网站中的浏览路径（左侧）与现实情况（右侧）\n\
  \n通过谷歌搜索、付费广告或社交网络到达网站的顾客，更有可能直接进入与其兴趣相符的特定产品页面，而非主页。因此，确保该页面的体验尽可能流畅至关重要。\n\n出于这个原因，我建议你优先开始产品页面的设计和开发工作，这正是我们在本章示例主题中的做法。\n\
  \n### 产品页面信息层级\n\n要设计一个高效的产品页面，我们首先需要建立信息层级——哪些产品信息对访客最重要？我们应该优先展示什么？哪些可以被视为不需要那么突出的“补充”信息？\n\
  \n答案会因商店而异，尽管通常有些信息比其他信息更重要。一种“标准”的信息层级，将产品信息按优先级分类，可能如图 5-2 所示。\n\n![A437216_1_En_5_Fig2_HTML.jpg](img/A437216_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2：一种“标准”的产品信息层级\n\n偏离这个标准层级的原因可能包括：我们销售的产品类型、我们对访问商店顾客的了解，甚至是我们预期访客使用的设备。举个例子，比较图\
  \ 5-3 中 Colonna Coffee 的烘焙咖啡豆产品页面与 Bespoke Verse 的礼品马克杯产品页面。Colonna 的咖啡豆包装外观相似，无论烘焙程度或风味如何，因此产品图片相对较小，重点放在了咖啡口味的文字描述和可用选项（浓缩咖啡与过滤咖啡，长杯与短杯）上。相反，Bespoke\
  \ Verse 的礼品马克杯根本不需要任何文字描述，因为产品图片本身就说明了一切，并且被非常突出地展示。\n\n![A437216_1_En_5_Fig3_HTML.jpg](img/A437216_1_En_5_Fig3_HTML.jpg)\n\
  \n图 5-3：Colonna Coffee（colonnacoffee.com，左侧）的整颗咖啡豆产品页面与 Bespoke Verse（www.bespokeverse.co.uk，右侧）的礼品马克杯产品页面\n\
  \n对于这个示例主题，我们将采用图 5-2 中的“标准”信息层级。第一版将使用基于图 5-4 中粗略设计稿的布局来实现这一点。如你所见，我分别为移动端和桌面端环境独立应用了该层级，以确保信息优先级的一致性，同时也要考虑用户在不同设备上浏览页面的体验。\n\
  \n![A437216_1_En_5_Fig4_HTML.jpg](img/A437216_1_En_5_Fig4_HTML.jpg)\n\n图 5-4：基于标准产品信息层级并插入第\
  \ 4 章开发的布局格式中，为示例主题产品页面制作的粗略设计稿\n\n\n\n### 添加产品图片\n\n让我们开始为例题主题中的产品页面编写代码。\n\n默认情况下，商店中所有产品均使用\
  \ `templates/product.liquid` 文件进行展示。与其他页面模板文件类似，`product.liquid` 的内容由 Shopify 处理，并渲染在\
  \ `theme.liquid` 的 `{{ content_for_layout }}` 标签中。接下来，我们将通过一个简单的产品图片轮播代码，开始向 `product.liquid`\
  \ 添加内容。其简化版 HTML 代码见`[5-1]`清单，显示效果见`[图 5-5]`。如果产品有多个图片，则会显示产品缩略图列表。用于生成`[图 5-5]`所示产品模板的更详细的\
  \ `product.liquid` 文件，可在例题主题的 GitHub 仓库中找到。\n\n![A437216_1_En_5_Fig5_HTML.jpg](img/A437216_1_En_5_Fig5_HTML.jpg)\n\
  \n*图 5-5 – 示例产品页面上[5-1]清单的运行结果*\n\n```\n{%- if product.images.size > 0 -%}\n{%-\
  \ if product.images.size > 0 -%}\n{%- for image in product.images -%}\n{%- endfor\
  \ -%}\n{%- endif -%}\n{%- else -%}\n{{ 'image' | placeholder_svg_tag }}\n{%- endif\
  \ -%}\n```\n\n*清单 5-1 – 显示主产品的简化版 `product.liquid` 代码*\n\n在此，我添加了一些 HTML 标记，用于创建一个左侧列来插入产品图片。通过\
  \ Liquid，我们查询 `product` 变量（Shopify 在所有产品页面上自动提供该变量），以查看店主是否已为产品添加了图片（`{%- if product.images.size\
  \ > 0 -%}`）。如果已添加，我们会在一个大的 `<img>` 标签中显示“主”图；如果产品有多个图片，我们则遍历所有产品图片，生成一个产品缩略图列表。\n\
  \n目前，当点击缩略图时，实现方式是在新浏览器窗口中打开图片，而不是将大图替换为缩略图版本。如果你查看 GitHub 仓库中更完整的示例，会发现我利用了一个轮播控件，它允许用户通过左/右箭头滑动切换产品图片，也可以使用缩略图直接跳转到特定产品图片。\n\
  \n#### 产品图片的设计考量\n\n在例题主题中添加产品图片的过程中，有必要考虑一些高层次的指导原则。产品图片通常应满足：\n\n*   **尺寸够大**（即使在较小的屏幕上或对于视力不佳的访客，也能轻松辨认细节）\n\
  *   **画质够高**（无论是拍摄技术还是文件质量）\n*   **对于实物产品，应体现产品尺寸比例**\n*   **同时展示产品本身及使用场景**\n*\
  \   **不要使用任何明显的滤镜或数字修改**\n*   **在视觉风格、质感和宽高比上尽可能保持一致性**\n\n你并非总能控制主题中使用的产品图片，但当有机会时，应努力倡导这些原则。鼓励客户投入时间和预算，聘请专业团队拍摄（最好是具有电商产品摄影经验的摄影工作室）。顾客对电商网站的产品摄影质量非常敏感，如果你的产品图片看起来不专业，他们转化的可能性会大大降低。\n\
  \n在主题设计项目开始时，你能做的最好的事情之一，就是为产品图片的分辨率和宽高比设定严格的指导原则。要求商家上传尽可能高分辨率的图片（2048 x 2048 像素是一个不错的目标，也是\
  \ Shopify 渲染的最大尺寸）。为了避免页面加载时间过长，你可以利用 Shopify 的图片滤镜（将在下一节讨论）在适当位置渲染低分辨率版本的图片。\n\n\
  在整个网站上为产品图片坚持使用一致的宽高比，可以降低产品并排渲染时出现不规则或突兀外观差异的可能性。我倾向于鼓励使用方形（1:1）图片，但根据所售产品类型，4:3\
  \ 或 3:4 的比例也能取得不错的效果。虽然你可以使用样式表和 Shopify 的图片滤镜来裁剪、拉伸和修剪图片，但拥有一个共同的起点总是更容易处理。\n\n\
  #### Shopify 的图片滤镜\n\nShopify 的实用功能之一是能够使用 Liquid 滤镜对图片进行即时尺寸调整和编辑。这意味着店主可以将最高分辨率的产品图片上传到后台，而主题开发者则可以使用这些滤镜生成适合特定位置尺寸和宽高比的版本。\n\
  \n这里涉及的关键滤镜叫做 `product_img_url`，你可以在`[5-1]`清单中看到它的用法。你可以查阅 Shopify 文档了解详细信息¹，但该滤镜的主要用途包括：\n\
  \n*   **使用较小版本的图片**，以减小文件大小和页面加载时间（你将在关于性能的`[第 10 章]`中学习相关内容）\n*   **裁剪或填充图片**，确保它们具有一致的宽高比\n\
  *   **将图片转换为渐进式 JPEG**，以加快加载速度\n\n#### 可缩放的产品图片与产品灯箱\n\n实现可缩放的产品图片（将鼠标悬停在产品图片上，会显示“放大”版本）或产品灯箱（点击产品图片会弹出一个“模态”全屏产品图片），是让顾客近距离查看产品的绝佳方式。但至关重要的是，这些设计元素不应让用户感觉离开了原产品页面，从而打断他们的浏览流程。在实现这些功能时，还需要注意以下几点：\n\
  \n*   它们应**渐进增强**，确保在未启用 JavaScript 时也能保持可用性。\n*   考虑在移动设备上**禁用**这些功能，因为在移动设备上产品图片通常已经是全宽显示，或者用户习惯于通过捏合触屏来放大图片。\n\
  *   确保它们**支持键盘操作**，用户应能使用方向键在连续的图片间移动，并能通过 `Escape` 键关闭灯箱。\n\n\n\n#### 产品视频\n\n\
  在产品页面添加相关的视频可以带来显著的转化率提升²，并且越来越多的在线零售商很可能会利用视频来更好地展示其产品和独特卖点。\n\n如何将视频整合到主题中，取决于高质量视频是适用于所有产品，还是仅适用于部分产品。如果商店中每一件产品都有高质量的大尺寸视频，那么在每个产品页面上为这些视频预留出显眼的空间就很有意义，如图\
  \ 5-6 所示的 Sonos 网站。\n\n![A437216_1_En_5_Fig6_HTML.jpg](img/A437216_1_En_5_Fig6_HTML.jpg)\n\
  \n图 5-6\n\nSonos 在其产品页面上突出展示了产品视频\n\n对于那些并非所有产品都有视频，或者每件产品有多个视频的商店，主题可以通过第二个“缩略图”区域来展示这些视频。\n\
  \n避免使用会自动加载并显示控件或品牌标识（例如 YouTube）的视频嵌入工具，因为它们可能会分散用户的注意力。实际上，出于性能考虑，最好避免在页面加载时加载任何依赖大量\
  \ JavaScript 的播放器，而是提供一个图片，当用户点击该图片时，再触发视频播放器弹窗或嵌入。请参见图 5-7。\n\n![A437216_1_En_5_Fig7_HTML.jpg](img/A437216_1_En_5_Fig7_HTML.jpg)\n\
  \n图 5-7\n\nBoosted Boards 在展示其产品方面做得不错，但他们的一些产品缩略图是视频。他们可以通过在这些缩略图上添加“播放视频”覆盖层来提高可发现性。\n\
  \n### 添加产品详情与“加入购物车”表单\n\n回到示例主题，我们现在来充实图 5-4 中桌面版模拟图右侧的内容：产品详情、描述以及一个基本的“加入购物车”表单。代码清单\
  \ 5-2 展示了实现此功能所需的简化版 Liquid 代码，图 5-8 显示了其在浏览器中的呈现效果。\n\n![A437216_1_En_5_Fig8_HTML.jpg](img/A437216_1_En_5_Fig8_HTML.jpg)\n\
  \n图 5-8\n\n添加了产品信息和“加入购物车”表单的示例产品页面\n\n```\n... (产品图片代码已省略) ...\n\n{{ product.title\
  \ | escape }}\n{{ product.vendor | escape }}\n{% if product.price_varies %}{{ product.price_min\
  \ | money }} - {{ product.price_max | money }}{% else %}{{ product.price | money\
  \ }}{% endif %}\nh3>\n{{ product.description }}\n\n{%- if product.variants.size\
  \ > 1 -%}\n选择您的 {{ product.title | downcase }}\n\n{%- for variant in product.variants\
  \ -%}\n{{ variant.title | escape }} - {{ variant.price | money }}\n{%- endfor -%}\n\
  \n{%- else -%}\n\n{%- endif -%}\n加入购物车\n\n代码清单 5-2\n在 templates/product.liquid 中添加产品信息与“加入购物车”表单\n\
  ```\n\n我们来逐一解析这些更改。\n\n#### 产品详情与描述\n\n用于呈现产品详情和描述的代码清单 5-2 中的代码并不复杂。实际上，只需在像 `<h1>`\
  \ 这样具有适当信息层级的 HTML 元素中输出相应的 Liquid 变量（`product.title`，`product.min_price`）即可。\n\n\
  我使用了几个 Liquid 过滤器来输出这些信息。在输出标题和供应商时，我使用了 `| escape` 过滤器。这在输出任何用户生成的文本内容时是一个好习惯，可以避免潜在的格式或输出问题（例如，如果你的产品标题包含像\
  \ `<` 这样的 HTML 字符，escape 过滤器会确保它被渲染为文本而非 HTML）。我还使用了 `| money` 过滤器，以商店货币和偏好设定的格式来显示产品价格（Shopify\
  \ 以分为单位存储，例如 `18800`）。\n\n`product.description` 是直接输出的。它可以包含 HTML（以允许描述内容中的锚点链接等），因此我们没有对其使用\
  \ `| escape` 过滤器。如果你希望确保描述不会渲染出任何可能破坏页面布局的怪异内容，可以使用 `| strip_html` 过滤器将其强制转换为纯文本。\n\
  \n你可能注意到示例在显示产品价格时使用了一些 Liquid 逻辑。这样做是因为不同的产品款式（例如颜色和尺寸的组合）可能有不同的价格。我们应该检查当前产品是否属于这种情况（`{%\
  \ if product.price_varies %}`），以决定是显示单一价格（`product.price`）还是价格范围（`product.price_min`\
  \ 到 `product.price_max`）。在本章后面，你将看到如何调整这种方法，动态更新 `price` 元素，使其仅显示当前所选款式的价格。\n\n\
  **提示**\n\n在设计产品页面时，应使用真实的产品描述，而不是虚拟文字或占位符（lorem ipsum）文本。这样你能更好地了解产品的呈现效果和布局，避免日后出现意外。\n\
  \n另一件要避免的事情是从制造商或竞争对手网站复制粘贴产品描述。这样做不仅可能因为重复内容对 SEO 产生负面影响，而且你也错失了在描述中注入品牌独特声音并说服客户的机会。\n\
  \n\n\n#### 添加到购物车表单\n\n在最简单的形式中，Shopify 的“添加到购物车”表单是一个 `<form>` 元素，它使用 `POST` 方法将数据提交到商店前端的\
  \ `/cart/add` 链接。表单数据中必须提交的唯一信息是一个或多个待添加到购物车的变体 ID（如果只添加单个变体，这些参数应命名为 `id`；如果同时添加多个变体，则应命名为\
  \ `id[]`）。\n\n在本示例中，我们允许客户通过一个 `<select>` 下拉菜单来选择要添加到购物车的变体，该下拉菜单包含产品所有变体的列表，并显示每个变体的描述及其价格。在渲染下拉菜单之前，我们会检查是否确实需要它（`{%\
  \ if product.variants.size > 1 %}`）。如果只有一个变体，我们就通过一个隐藏输入将其 ID 作为参数提供给表单。\n\n在渲染下拉菜单中的可用选项时，我们使用一个名为\
  \ `product.selected_or_first_available_variant` 的 Liquid 变量来判断在加载页面时是否应默认选中某个特定选项。`product.selected_or_first_available_variant`\
  \ 是一个名称冗长但准确命名的变量，用于表示“已选中的”变体（由请求链接中的 `?variant=` 参数决定）或第一个“可用的”产品变体，其中可用性取决于商家库存策略下该变体是否有库存。请参见图\
  \ 5-9。\n\n![A437216_1_En_5_Fig9_HTML.jpg](img/A437216_1_En_5_Fig9_HTML.jpg)  \n\
  图 5-9 – 在链接的 `?variant=` 参数中指定变体 ID，即可在“添加到购物车”表单的下拉菜单中预选该变体\n\n“添加到购物车”表单的最后一个元素是至关重要的“提交”按钮。在本示例中，它被实现为一个标准的\
  \ HTML 按钮。我添加了一些 Liquid 逻辑，以便在产品不可用（即所有变体均已售罄）时禁用“添加”按钮。\n\n这个初始的“添加到购物车”表单虽然简单，但它是重要的基础，我们可以在此基础上增加对更多动态变体选择器、自定义输入和\
  \ Ajax 功能的支持。在添加这些额外功能时，牢记基本的可用性和可访问性准则非常重要，具体包括：\n\n-   确保所有输入都有对应的标签\n-   尽量避免使用内联表单元素和输入\n\
  -   使用适当的 HTML5 输入类型（例如 `type=\"number\"`）\n-   对输入类型做出合理的选择（例如，对于选项较少的情况，使用单选按钮而非下拉菜单）\n\
  -   确保所有输入均可通过键盘访问\n-   确保像“提交”按钮这样的操作输入有清晰标示并具备可交互的外观\n\n### 添加推荐产品\n\n我们即将完成图\
  \ 5-4 中规划的页面布局，只差在页面底部添加“你可能也喜欢……”的推荐产品部分了。\n\n#### 关联产品与替代产品\n\n许多主题对此感到困惑，或者没有区分两种不同类型的推荐产品：关联产品与替代产品。\n\
  \n-   **关联产品**是当前展示产品的配件或补充品。比如说，与相机兼容的电池，或者与开衫相配的围巾。在产品页面上显示关联产品列表，既提供了一条“追加销售”路径以鼓励客户增加购买，也提高了客户对商店整体产品范围的认知。\n\
  -   **替代产品**，顾名思义，是当前展示产品的可能替代品或备选方案。比如说，用 Xbox 代替 PlayStation，或者选择另一种款式的大衣。与关联产品不同，替代产品列表的目的不是为了增加客户购物车中的商品数量，而是为了确保客户首先能找到他们真正想要的东西。\n\
  \n由于关联产品和替代产品服务于两种截然不同的目的，它们不应被一起展示。它们应该被清晰地标注，以便客户能理解推荐的来源——例如使用“购买此商品的用户也购买了……”而非“关联产品”，以及使用“我们认为您也可能喜欢……”而非“替代产品”。\n\
  \n在关联产品旁边添加一个小型的、由 Ajax 驱动的“添加到购物车”链接，是一种很好的方式，可以在不将客户带离主产品页面的情况下，让追加销售变得轻松无感。\n\
  \n\n\n#### Shopify 上的推荐商品\n\nShopify 并没有为管理推荐商品列表提供任何明确的内置支持，尽管有很多 Shopify 应用可以提供此功能（在\
  \ Shopify 应用商店中搜索“product recommendations”）。\n\n虽然这些应用可以做一些非常巧妙的事情，例如使用销售数据算法生成推荐，或为个别访客量身定制推荐，但我更倾向于在求助应用之前，先尝试用\
  \ Shopify 的“原生”概念和一些自定义的 Liquid 代码来解决问题。这不仅能降低经营店铺的持续成本，还能减少应用相互干扰、破坏店铺功能或对性能产生负面影响的风险。虽然应用可能提供稍多一些的功能，但在许多情况下，基于主题的解决方案对于商家的需求来说已经足够好了。\n\
  \n我们可以通过几种方式使用 Shopify 的内置功能来优雅地实现相关和替代产品功能。首先，我们可以允许店主为其店铺中的每款产品手动指定一个推荐商品列表，然后在产品模板中显示该列表。店主可以通过以下两种方法之一来实现此指定：\n\
  \n-   在产品上设置一个包含相关产品标识符列表的元字段。你将在本章后面了解更多关于元字段的内容；现在，你只需要知道它们允许店主在产品和其他 Shopify\
  \ 对象上存储自定义信息。这些信息可以在 Liquid 中检索，并用于渲染相关产品列表。\n-   使用命名约定，创建一个与产品 URL（标识符）匹配的集合，然后用所需的相关产品填充该集合。例如，如果产品的标识符是\
  \ `foraker-canvas-coat`，店主可以创建一个标识符为 `foraker-canvas-coat-related` 的集合。Liquid 代码可以计算出当前产品相关产品集合的预期名称，检查它是否存在，如果存在则显示这些产品。\n\
  \n手动指定推荐商品的优点在于，它让店主能够对产品列表中显示的产品进行精细控制，但其缺点是创建和维护起来非常耗时。作为替代方案，我们可以使用一些 Liquid\
  \ 逻辑来自动计算相关产品列表。同样，我们有两种可能的策略：\n\n-   找到一个当前产品所属的非通用集合，并认为该集合中的其他产品是“相关的”。这可能是一种简单的方法，但在许多情况下都能产生足够好的结果。\n\
  -   将当前产品与商店中的所有其他产品进行比较，并根据它们与当前产品共享的标签和集合数量来“评分”。得分较高的产品被认为与当前产品密切相关。这种方法的实现稍微复杂一些，但可能比第一种方法产生更好的结果。\n\
  \n对于示例主题，我们将实现一个 Liquid 片段（`snippets/related-products.liquid`，位于主题目录中），该片段支持这三种方法，用于在页面上显示最多四个相关产品的列表。当在产品页面上引用时，它将：\n\
  \n1.  检查产品是否定义了“related_products”元字段。如果是，它将使用该元字段来渲染其中列出的前四个产品。\n2.  如果没有定义“related_products”元字段，那么它将检查是否存在一个与产品具有相同标识符（但末尾带有\
  \ `-related`）的集合。如果存在，它将渲染该集合中的前四个产品。\n3.  如果既没有元字段也没有集合存在，那么它将回退到寻找当前产品所属的一个集合，并渲染该集合中的前四个产品。\n\
  \n这种方法为我们提供了一种基本方式，可以在每个产品页面上自动查找相关产品，同时让店主可以选择创建集合或元字段来覆盖默认行为，如果他们需要更多控制的话。该片段逻辑的概要如代码清单\
  \ 5-3 所示（为简洁起见进行了删节；完整版本可在示例主题仓库中找到）。代码清单 5-4 展示了如何在 `product.liquid` 中包含该片段。最后，图\
  \ 5-11 展示了在浏览器中实现的结果。\n\n![A437216_1_En_5_Fig11_HTML.jpg](img/A437216_1_En_5_Fig11_HTML.jpg)\n\
  \n图 5-11\n\n佳能网站上的“推荐配件”部分是通过相关产品进行追加销售的绝佳示例（左图）。Zen Pencil 的“您可能也喜欢…”部分则建议了替代海报作为当前选择的替代品（右图）\n\
  \n```\n{%- assign RELATED_PRODUCTS_LIMIT = 4 -%}\n{%- if product.metafields.theme.related_products\
  \ != blank -%}\n{%- assign related_product_handles = product.metafields.theme.related_products\
  \ | split: ',' -%}\n{%- for related_product_handle in related_product_handles -%}\n\
  ... 从元字段渲染产品...\n{%- endfor -%}\n{%- else -%}\n{%- assign related_collection_handle\
  \ = product.handle | append: '-related' -%}\n{%- assign related_collection = collections[related_collection_handle]\
  \ -%}\n{%- if related_collection and related_collection.products.size > 0 %}\n{%-\
  \ for related_product in related_collection.products limit: RELATED_PRODUCTS_LIMIT\
  \ -%}\n... 从集合渲染产品...\n{%- endfor -%}\n{%- else -%}\n{%- assign related_collection\
  \ = nil -%}\n{%- for collection in product.collections -%}\n{%- unless collection.handle\
  \ == 'all' -%}\n{%- if related_collection == blank or collection.products.size >\
  \ related_collection.products.size -%}\n{%- assign related_collection = collection\
  \ -%}\n{%- if related_collection.products.size > 5 -%}\n{%- break -%}\n{%- endif\
  \ -%}\n{%- endif -%}\n{%- endunless -%}\n{%- endfor -%}\n{%- for related_product\
  \ in related_collection.products limit: RELATED_PRODUCTS_LIMIT -%}\n... 从集合渲染产品...\n\
  {%- endfor -%}\n{%- endif -%}\n{%- endif -%}\n代码清单 5-3\nrelated-products.liquid\
  \ Liquid 片段的逻辑概要\n```\n\n![A437216_1_En_5_Fig12_HTML.jpg](img/A437216_1_En_5_Fig12_HTML.jpg)\n\
  \n图 5-12\n\n将相关产品片段添加到示例主题产品页面底部的结果\n\n```\n\n...\n\n...\n\n您可能也喜欢\n{%- include\
  \ 'related-products' -%}\n\n代码清单 5-4\n在 templates/product.liquid 底部包含相关产品 Liquid\
  \ 片段\n```\n\n### 改进产品页面\n\n恭喜！你的产品页面的桌面版现在已经完全实现了你在图 5-4 中计划的布局设计。你拥有了一个简单但功能齐全的产品页面，客户可以使用它来浏览你的产品、选择所需的产品变体，并将该选择添加到购物车。由于这个页面非常简洁，它加载速度很快，并且无需任何\
  \ JavaScript 即可运行。\n\n在本章的剩余部分，我们将逐步实现主题设计者可能在此起点上添加的一些常见功能。\n\n\n\n#### 添加产品信息\n\
  \n在原始产品信息层级结构中（见图 5-2），我们发现了一类“辅助性”信息——这些产品详情虽然不像标题或价格那样至关重要，但客户仍可能用其来辅助购买决策。常见的例子包括产品的技术规格、配送与退货信息、尺码指南或服装护理说明。在向产品页面添加此类信息时，我们需要考虑：\n\
  \n- 如何以最佳方式展示信息（表格、图形、图表、文本等）\n- 信息在页面上的显著程度及放置位置（内嵌于页面下方、选项卡组件内部、弹出对话框中等）\n- 该信息是否适用于商店中的每一件产品，还是仅适用于部分产品\n\
  - 该信息在不同产品之间是存在差异，还是在全店范围内保持一致\n- 在何处存储这些额外的产品信息，以及如何让店主能够管理和更新这些信息\n\n为了示例主题的需要，我们将实现一种处理附加产品信息的常见模式——将产品描述区域转换为一个选项卡面板，让客户能在单独的选项卡中查看配送信息。同时，我们还会允许店主使用\
  \ Shopify 的元字段（metafields）来指定每件产品的服装护理说明，并在单独的选项卡中显示这些信息（若存在）。\n\n清单 5-5 展示了一个简单的选项卡实现，它被提取为\
  \ `product-details.liquid` 代码片段，并在一个选项卡中显示动态的产品描述，在另一个选项卡中显示一些静态的配送信息。图 5-13 显示了实现后的效果。\n\
  \n![A437216_1_En_5_Fig13_HTML.jpg](img/A437216_1_En_5_Fig13_HTML.jpg)\n\n图 5-13\
  \  \n将清单 5-5 中的产品描述选项卡添加到产品详情界面\n\n```\n描述\n\n配送\n\n{{ product.description }}\n\n\
  下午 4 点前下的订单将在当天发货。\n下表显示了使用我们标准配送服务的大致配送时间。\n\n...\n清单 5-5\n产品信息选项卡的简单实现\n```\n\n\
  ##### 使用元字段管理附加信息\n\n下一步是向产品页面添加一个“服装护理”选项卡。我们不能像处理“配送信息”选项卡那样静态地编码这个选项卡，因为该选项卡的内容——以及该选项卡是否显示——在不同的产品之间会有所不同。\n\
  \n一种潜在的解决方案是将护理信息直接硬编码到 Liquid 模板中——类似于清单 5-6 所示。\n\n```\n...\n{%- if product.handle\
  \ == 'foraker-canvas-coat' -%}\n\n服装护理\n\n{%- endif -%}\n...\n\n...\n{%- if product.handle\
  \ == 'foraker-canvas-coat' -%}\n\n始终存放在干燥、通风良好的地方。\n\n{%- endif -%}\n...\n\n清单 5-6\n\
  有条件显示服装护理信息的一种可行（但不推荐）方法\n```\n\n这种方法的局限性在于，每当我们想要修改服装护理信息本身，或者为新产品添加护理信息时，都需要打开\
  \ Liquid 模板并进行更改。一般来说，在 Liquid 模板内部管理内容是一场灾难。这种方式对店主来说难以管理，很容易被其他用户或自动主题部署脚本覆盖。这也意味着，经验不足的店主可能会忘记关闭某个\
  \ HTML 标签，从而给网站的所有产品页面造成严重破坏。\n\n我们将使用元字段（metafields）来解决这个问题。元字段是 Shopify 的一项功能，允许针对产品、客户、商品系列等对象存储任意的自定义数据。在\
  \ Liquid 代码中这样访问元字段：`{{ product.metafields.extra.garment_care }}`，其中 `extra` 是元字段的“命名空间”或“分组”（旨在避免元字段冲突），而\
  \ `garment_care` 是特定元字段值的“键”。\n\n过去，Shopify 使得访问和管理元字段数据非常笨拙，并且没有在 Shopify 后台的产品页面上公开元字段控件，因此市面上有数十个提供元字段功能的\
  \ Shopify 应用。但实际上，你并不需要它们——你可以通过构造一个批量编辑 URL 来在 Shopify 后台内编辑产品元字段，这个 URL 看起来像 `https://defguide.myshopify.com/admin/bulk?resource_name=Product&edit=metafields.extra.garment_care:string`。\
  \ ³\n\n如果你在浏览器中打开该 URL（将 `defguide.myshopify.com` 替换为你自己的商店域名），将会看到一个产品列表，并能够为每个产品的\
  \ `extra_garment` 元字段键设置一个值。店主可以为这个 URL 添加书签，随时返回以更新或添加一个或多个产品的服装护理信息。\n\n有了管理护理信息的策略，我们现在可以更新产品详情代码片段，使其在元字段存在且包含信息时，有条件地显示“服装护理”选项卡，如清单\
  \ 5-7 所示。实现后，当客户浏览到已设置服装护理信息的产品时，我们会得到图 5-14 中的结果。如前所述，这个改进版本使用元字段（而非硬编码数据）来在单独的选项卡中显示服装护理信息。\n\
  \n![A437216_1_En_5_Fig14_HTML.jpg](img/A437216_1_En_5_Fig14_HTML.jpg)\n\n图 5-14\
  \  \n当相关元字段存在时，服装护理信息的显示效果\n\n```\n...\n{%- unless product.metafields.extra.garment_care\
  \ == blank -%}\n\n服装护理\n\n{%- endunless -%}\n...\n\n...\n{%- unless product.metafields.extra.garment_care\
  \ == blank -%}\n\n{{ product.metafields.extra.garment_care }}\n\n{%- endunless -%}\n\
  ...\n\n清单 5-7\n清单 5-6 的改进版本，使用了元字段\n```\n\n\n\n#### 改善移动端体验\n\n到目前为止，我们的示例主要关注主题在桌面端的呈现效果和运行情况。若只关注桌面端而忽略移动端体验——即便你使用的是“响应式”框架——在电商领域也是十分危险的。Shopify\
  \ 商店的流量中，超过一半来自移动设备，部分商家的这一比例甚至高达 75%。\n\n在开发 Shopify 主题时，请务必考虑使用移动设备浏览的顾客将如何查看信息层级，或执行添加商品到购物车等关键操作。这不仅仅意味着在桌面端缩小浏览器窗口——你需要实际拿起一到两台设备，亲自浏览网站，才能充分体会其不同的使用体验。触控区域的大小、按钮是否便于拇指触及，以及可见内容区域等因素，都会产生影响。\n\
  \n请看图 5-15，其中展示了当前示例商品页面在移动设备上的状态。有几个问题点会立刻凸显出来：\n\n![A437216_1_En_5_Fig15_HTML.jpg](img/A437216_1_En_5_Fig15_HTML.jpg)\n\
  \n图 5-15\n\n在移动设备上滚动浏览当前商品页面时，会暴露出一些显示和可用性问题\n\n*   商品页面的初始视图并未显示商品标题、供应商或价格——这些都是我们在商品信息层级中确认的重要信息。\n\
  *   商品图片轮播区域的显示效果尚可，但所有缩略图都以全宽图片的形式显示在下方，导致我们需要滚动很长距离才能看到商品信息。\n*   `服装护理`标签页上的文字发生了断行，破坏了布局。\n\
  *   “加入购物车”按钮宽度不足屏幕一半且偏左，使得右手持单机操作的用户更难用拇指触及。\n*   “你可能也喜欢…” 区域每行只显示一件商品，导致需要滚动很长时间才能浏览完毕。\n\
  \n解决这类问题通常并不困难，特别是当你使用了提供响应式辅助工具的 CSS 框架或库时。为了解决示例主题中的这些问题，我决定：\n\n*   在页面顶部添加一个仅在移动端可见的商品标题、供应商和价格版本，并隐藏页面靠下位置的相同信息。\n\
  *   保留商品轮播区，预期移动用户可以通过左右滑动来浏览可用的商品图片，但完全隐藏商品缩略图。\n*   在小屏幕上，对于“`服装护理`”标签页，隐藏“服装”二字，因为“护理”已能传达足够信息。如果你有更多标签页，另一种常见做法是在空间有限时改用图标。\n\
  *   让“加入购物车”按钮在移动设备上变为全宽，以便于点击。\n*   将相关商品以 2x2 的网格形式展示，而非每行一个。\n\n实现这些更改的代码可在示例主题的代码库中找到。如图\
  \ 5-16 所示，这些更改带来了更友好的移动端体验。\n\n![A437216_1_En_5_Fig16_HTML.jpg](img/A437216_1_En_5_Fig16_HTML.jpg)\n\
  \n图 5-16\n\n仅需几个简单的改动，就解决了网站移动版的一些主要可用性问题。\n\n#### 创建备选页面模板\n\n商品页面目前看起来相当不错了，因此我们将继续探讨网站的其他方面，从第\
  \ 6 章的主页开始。在继续之前，我将快速介绍最后一个 Shopify 主题功能——备选页面模板。\n\n对于 Shopify 主题中存在的每种 Liquid\
  \ 模板类型（如 `product.liquid`、`collection.liquid`、`article.liquid` 等），你都可以创建这些模板的“备选”版本，用以完全不同的方式有选择性地渲染不同的商品（或不同的商品系列、不同的文章）。这在某些情况下会非常有用，例如，你的一些商品带有演示视频，这完全改变了页面的预期布局；或者你想要为基于文本的博客文章和以照片为主的博客文章创建不同的布局。\n\
  \n要创建并使用备选页面模板，只需创建一个新的模板文件，其名称与基础模板相同，但增加一个额外的后缀——例如 `product.video.liquid`。上传到商店后，Shopify\
  \ 会在相关页面上显示一个模板选择界面，你或商店所有者可以在此选择所需的模板。见图 5-17。\n\n![A437216_1_En_5_Fig17_HTML.jpg](img/A437216_1_En_5_Fig17_HTML.jpg)\n\
  \n图 5-17\n\n当所显示的对象类型有多个模板选项可用时，“主题模板”部分会出现在 Shopify 管理后台中。\n\n为了在示例主题中演示这一点，我创建了一个\
  \ `product.image-right.liquid` 模板（代码可见于示例主题代码库），该模板简单地将商品页面的列顺序反转，使商品信息显示在左侧，图片显示在右侧。你可以在图\
  \ 5-18 中看到它在商店中的显示效果。\n\n![A437216_1_En_5_Fig18_HTML.jpg](img/A437216_1_En_5_Fig18_HTML.jpg)\n\
  \n图 5-18\n\n使用备选模板 `product.image-right.liquid` 显示的商品页面。\n\n**提示**\n\n虽然“主题模板”部分仅在\
  \ Shopify 管理后台中针对特定数量的对象类型（商品、商品系列和博客）显示，但所有 Shopify 页面都支持备选模板，并且你可以为一个页面创建任意数量的备选模板。要按需渲染这些备选模板，只需在\
  \ URL 中包含一个 `?view=` 参数即可——例如，你可以通过链接到 [`https://defguide.myshopify.com/products/foraker-canvas-coat?view=image-right`](https://defguide.myshopify.com/products/foraker-canvas-coat?view=image-right)，强制示例商店中的任何商品页面以图片居右的方式渲染。\n\
  \n备选页面模板的一个巧妙用途是，以 JSON 格式渲染对象的自定义表示形式（例如 `product.json.liquid`），你可以通过 Ajax 从其他可能需要动态获取商品信息的页面中获取它。\n\
  \n### 总结\n\n本章深入探讨了 Shopify 商店商品页面的设计与实现。我们从讨论商品信息层级的重要性开始，并阐述了不同商品信息的重要性如何因商店和用户情境而异。\n\
  \n在掌握了示例商品信息层级后，我们逐步讲解了构建一个功能完整的 Shopify 商品页面所需的代码。\n\n**脚注**\n\n1 [`https://help.shopify.com/themes/liquid/filters/url-filters#product_img_url`](https://help.shopify.com/themes/liquid/filters/url-filters#product_img_url)\n\
  \n2 例如，参见 [`blog.kissmetrics.com/product-videos-conversion/`](https://blog.kissmetrics.com/product-videos-conversion/)。\n\
  \n3 如果你是 Google Chrome 用户，我强烈推荐查看 ShopifyFD ([`shopifyfd.com`](http://shopifyfd.com))，这是一个\
  \ Chrome 扩展程序，它连接到 Shopify 管理后台，允许直接在商品管理页面上编辑元字段。\n\n"
- "# 设计主页和商品系列页面\n\n处理完至关重要的商品页面后，我们现在可以转向 Shopify 主题的其他一些重要组成部分。在本章中，我们将探讨商店主页和商品系列页面的设计与实现。\n\
  \n\n\n### 首页\n\n如前一章所述，我认为客户常常过于关注首页上每个微小细节的完美呈现，却牺牲了客户旅程中的其他环节。然而，精心设计的首页之重要性也不容低估——只是对像素级完美的执念不应导致你忽视页面本身的主要目标。\n\
  \n#### 首页的设计目标\n\n在设计首页时，应努力实现三个主要目标：\n\n*   向客户传达品牌定位\n*   向客户传达店铺提供的商品\n*   向客户传达下一步操作指引\n\
  \n##### 传达品牌定位\n\n“品牌个性”、“企业形象”、“生活方式品牌”。无论你想用哪种营销术语，首页都必须让访客立刻感受到店铺的本质特质。\n\n用户对不同垂直行业的在线商店外观有着强烈的预期。这并不意味着你应该完全照搬竞争对手的设计而放弃创新，但值得关注市场惯例——比如通用术语、分类方式和风格元素——以避免因过度创新而影响转化率。简而言之，滑板品牌不应该看起来像沃尔玛。\n\
  \n传达信息的最佳方式是将店铺的简短描述与合适的视觉素材相结合。（没错，这听起来简单得可笑。但你会发现，许多店铺在这方面做得有多差。）你可以在图 6-1 中看到实现与未实现该目标的首页两极分化的例子。\n\
  \n![A437216_1_En_6_Fig1_HTML.jpg](img/A437216_1_En_6_Fig1_HTML.jpg)\n\n图 6-1\n\n\
  Brooklinen 的首页（左图）清晰展示了其产品系列，而 Clove Club 则为了保持神秘感牺牲了转化率\n\n##### 传达产品范围\n\nBaymard\
  \ 研究所的 Christian Holst 将电商首页的试金石测试描述为：\n\n> 快速浏览你的首页能否充分传达店铺的产品多样性？如果不能，首次访问者可能会对网站产品目录的范围得出错误结论。\n\
  \n简而言之，如果你的店铺销售种类繁多的产品，但首页只突出展示了其中一小部分或单一产品系列，客户可能会认为你不出售他们想要的商品而离开网站。传达产品的最佳方式取决于所提供的产品范围。如果店铺更偏向“产品型”公司，只销售单一产品线（如苹果），那么只需突出展示几款最热门或最新的商品可能就足够了。相反，如果店铺更偏向“零售商”模式，销售多种不同产品线（如沃尔玛），则更可能在首页突出展示并推广整个品类或产品线（见图\
  \ 6-2）。\n\n![A437216_1_En_6_Fig2_HTML.jpg](img/A437216_1_En_6_Fig2_HTML.jpg)\n\n\
  图 6-2\n\n苹果（“产品型”公司）和沃尔玛（“零售型”公司）的首页\n\n注意两家店铺在关注点上的差异——苹果侧重于突出某一关键产品并直接链接到该产品，而沃尔玛则直接通过首页展示整个品类的链接。\n\
  \n##### 清晰的下一步操作\n\n电商店铺设计师可能犯的最大错误之一，就是让访客不清楚该采取什么行动才能更接近购买目标。\n\n在传达了品牌定位和所提供的产品之后，下一步任务是确保潜在客户拥有清晰的路径，能够浏览店铺的品类和/或深入查看特定产品。与你选择展示产品范围的方式一样，设计如何实现这一目标很可能取决于所提供的品类和产品数量。\n\
  \n“产品型”公司可以在首页不同位置展示其全部产品线，并直接链接到各个产品页面。行动号召可以更具体（“了解更多关于新款 MacBook Air 的信息”）。\n\
  \n“零售型”公司则应在首页展示关键品类，鼓励用户点击并浏览其全部产品范围，以增加找到心仪商品的几率。产品范围广泛的店铺应设计首页，使其更侧重于导航元素和搜索功能——回顾第\
  \ 4 章对这些元素的讨论。\n\n#### 实现首页\n\n正如设计目标所示，你的首页通常需要高度的灵活性，以适配使用你主题的不同类型商家，并允许展示不同内容类型——这些内容可能不与产品或系列直接相关（例如，博客文章）。即使你正在为特定商家设计主题，他们的需求和营销活动也会随时间变化，这要求首页内容能够被定制。\n\
  \n幸运的是，Shopify 为其网站首页提供了一项名为“动态分区”的功能，它允许你设计各种关键组件，商家随后可以选择并配置这些组件，以匹配自己的使用场景。下一节将介绍如何在我们的示例主题中创建三种不同类型的动态分区——“主视觉图片”、“特色产品”区块和“特色系列”区块（见图\
  \ 6-3）。使用此主题的店主将能够根据需要在其首页上添加、配置和重新排列这些分区，以满足本章开头列出的设计目标。\n\n![A437216_1_En_6_Fig3_HTML.jpg](img/A437216_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3\n\n显示我们将实现的三个关键首页分区——“主视觉图片”、特色产品区块和特色系列区块的示意图\n\n##### 上手首页分区\n\nShopify\
  \ 使用文件`template/index.liquid`来渲染商店的首页。与其他模板一样，由`index.liquid`生成的 HTML 将在`layout/theme.liquid`内部渲染。传统上，首页模板的实现方式与其他页面模板相同，首页所需的\
  \ HTML 和 Liquid 代码直接添加到`index.liquid`中。\n\n然而，在主题首页上引入动态分区意味着，用于渲染首页内容的大部分代码将出现在独立定义的分区中。就像`layout/theme.liquid`中的`{{\
  \ content_for_layout }}`标签会被当前主题的页面内容替换一样，`templates/index.liquid`中的`{{ content_for_index\
  \ }}`标签也会被店主配置的动态生成的分区内容替换。\n\n由于目前将所有首页内容交由分区管理已足够，我们可以更新`templates/index.liquid`的内容，使其仅包含清单\
  \ 6-1 中的代码。\n\n```\n{{ content_for_index }}\n\n清单 6-1\n`templates/index.liquid`的简单内容，用于在首页启用动态分区渲染\n\
  ```\n\n\n\n##### 添加英雄图像部分\n\n如果你还记得，在本书的第 4 章中，当你设计和实现页面布局的页眉和页脚元素时，你第一次接触到了“部分”。我们即将为首页构建的动态部分将以完全相同的方式实现——唯一的区别在于，这些新部分将由商店店主在\
  \ Shopify 后台选择和插入，而不是通过主题中其他地方的`{% section %}` Liquid 标签显式包含。\n\n你可以先添加一个用于展示“英雄图像”的部分，这是一种常见的设计元素，用于吸引访问首页用户的注意力并传达一些关于你品牌的信息。我们还会在该元素顶部添加一句标语，以及一个包含行动号召的按钮。所有这些元素（使用的图像、文本内容和目标\
  \ URL）都将由商店店主配置。\n\n为此，我们首先在主题中创建一个新的 Liquid 文件`sections/hero.liquid`，并插入代码清单 6-2\
  \ 的内容。\n\n```\n{% schema %}\n{\n\"name\": \"英雄图像\",\n\"settings\": [\n{\n\"id\"\
  : \"image\",\n\"type\": \"image_picker\",\n\"label\": \"英雄图像\"\n},\n{\n\"id\": \"\
  title\",\n\"type\": \"text\",\n\"label\": \"标题\"\n},\n{\n\"id\": \"label\",\n\"\
  type\": \"text\",\n\"label\": \"按钮文本\"\n},\n{\n\"id\": \"href\",\n\"type\": \"url\"\
  ,\n\"label\": \"按钮链接\"\n}\n],\n\"presets\": [\n{\n\"name\": \"英雄图像\",\n\"category\"\
  : \"图像\"\n}\n]\n}\n{% endschema %}\n\n{{ section.settings.title | escape }}\n{{\
  \ section.settings.label | escape }}\n\n代码清单 6-2\nsections/hero.liquid 文件内容\n```\n\
  \n希望这里没有太多你不熟悉的内容。与页眉和页脚部分一样，我们有一个包含 JSON 的`{% schema %}`标签，用于定义英雄图像部分的可配置属性。这些可配置设置随后在文件底部被使用，以输出用于渲染包含图像和文本元素的`<div>`元素的\
  \ HTML。\n\n如果我们把这个部分上传到开发商店并刷新首页，页面不会有任何变化。这是因为要显示英雄图像，它需要先被添加到 Shopify 后台的“自定义主题”页面中的首页上。如果你导航到后台的主题定制器（如果你忘了在哪里，请参阅第\
  \ 4 章），你会看到现在在左侧边栏的“页面内容”部分中有一个“添加部分”选项。点击它，你将可以选择添加一个“英雄图像”部分，并可以用图像、文本和链接对其进行配置（见图\
  \ 6-4）。\n\n![A437216_1_En_6_Fig4_HTML.jpg](img/A437216_1_En_6_Fig4_HTML.jpg)\n\n\
  图 6-4\n\n在配置和添加英雄图像部分之前（左）和之后（右）的 Shopify 后台主题定制器\n\n与第 4 章中实现的“静态”页眉和页脚部分不同，这些动态的首页部分可以被多次使用，并且可以独立配置或根据需要重新排列。与静态部分一样，它们也支持使用块（blocks），这意味着我们可以让商店店主对每个部分中显示的内容拥有大量控制权。\n\
  \n现在，我们将再添加几个动态部分，以便实现图 6-3 中草拟的首页布局。首先，我们将添加一个“特色产品”部分（见代码清单 6-3），文件名为`sections/featured-products.liquid`。当添加至首页时，该部分会要求商店店主从其商店中选择一个产品系列，并显示该系列中的前四个产品。我们还将添加一个“特色系列”部分（见代码清单\
  \ 6-4），文件名为`sections/featured-collections.liquid`。该部分将以类似于特色产品部分的方式显示一系列产品系列，但与其显示预设数量的系列不同，我们将使用块来允许商店店主精确选择他们想要显示多少个系列。\n\
  \n```\n{% schema %}\n{\n\"name\": \"特色产品\",\n\"settings\": [\n{\n\"id\": \"title\"\
  ,\n\"type\": \"text\",\n\"label\": \"部分标题\",\n\"info\": \"默认使用系列标题。\"\n},\n{\n\"\
  id\": \"collection\",\n\"type\": \"collection\",\n\"label\": \"产品系列\"\n}\n],\n\"\
  presets\": [\n{\n\"name\": \"特色产品\",\n\"category\": \"特色\"\n}\n]\n}\n{% endschema\
  \ %}\n{%- assign collection = collections[section.settings.collection] -%}\n\n{{\
  \ section.settings.title | default: collection.title | escape }}\n{%- for product\
  \ in collection.products limit: 4 -%}\n{%- include 'product' with product -%}\n\
  {%- endfor -%}\n\n代码清单 6-3\n首页上的动态“特色产品”部分\n```\n\n```\n{% schema %}\n{\n\"name\"\
  : \"特色系列\",\n\"max_blocks\": 4,\n\"settings\": [\n{\n\"id\": \"title\",\n\"type\"\
  : \"text\",\n\"label\": \"部分标题\"\n}\n],\n\"blocks\": [\n{\n\"type\": \"collection\"\
  ,\n\"name\": \"产品系列\",\n\"settings\": [\n{\n\"id\": \"collection\",\n\"type\": \"\
  collection\",\n\"label\": \"产品系列\"\n}\n]\n}\n],\n\"presets\": [\n{\n\"name\": \"\
  特色系列\",\n\"category\": \"特色\"\n}\n]\n}\n{% endschema %}\n\n{{ section.settings.title\
  \ | escape }}\n{%- for block in section.blocks -%}\n{%- if block.type == 'collection'\
  \ -%}\n{%- include 'collection' with collections[block.settings.collection] -%}\n\
  {%- endif -%}\n{%- endfor -%}\n\n代码清单 6-4\n首页上的动态“特色系列”部分\n```\n\n有了这些新的部分，我们在主题定制器的“添加部分”选项下就能看到一些额外的选择，并且可以配置这两个新部分来实现图\
  \ 6-3 中期望的布局，如图 6-5 所示。\n\n![A437216_1_En_6_Fig5_HTML.jpg](img/A437216_1_En_6_Fig5_HTML.jpg)\n\
  \n图 6-5\n\n在 Shopify 主题定制器中配置特色产品部分（左）和特色系列部分（右）\n\n仅凭这几个简单的部分，我们就赋予了商店店主对首页布局和显示内容的巨大控制权，同时确保每个独立的部分都与整体主题设计保持一致。如图\
  \ 6-6 所示，商店店主可以使用同一部分类型的多个实例来构建适合其品牌和产品系列的首页。\n\n![A437216_1_En_6_Fig6_HTML.jpg](img/A437216_1_En_6_Fig6_HTML.jpg)\n\
  \n图 6-6\n\n使用我们刚刚实现的部分构建的几种不同的首页布局示例\n\n### 产品系列页面\n\n在完成了产品页面和首页的设计与实现之后，我们现在可以着手设计和实现主题的产品系列页面了。这些页面（也称为“分类页面”）会展示特定系列中包含的所有产品列表，以便顾客可以一次性浏览大量产品，然后再深入了解他们感兴趣的商品。\n\
  \n所有 Shopify 商店都带有一个默认的“全部”系列（通过`/collections/all`访问），其中包含 Shopify 商店在线渠道中列出的所有产品。此外，Shopify\
  \ 还在`/collections`提供了一个产品系列列表页面，用于展示所有可用的产品系列。该系列列表页面通过`templates/list-collections.liquid`进行渲染。\n\
  \n**提示**\n\n在某些情况下，你可能不希望“全部”系列实际列出所有可供购买的产品。例如，你可能有一系列产品，其中包含一个“隐藏”的产品类型，该类型只能通过产品\
  \ URL 访问的用户才能看到。在这种情况下，你可以通过在 Shopify 后台创建一个新系列，并确保其系列句柄设置为“all”，来覆盖默认的“全部”系列。然后，你可以根据需要为该默认系列配置任何规则，例如“产品类型不是隐藏的”。\n\
  \n\n\n#### 商品集合页的设计目标\n\n优秀的商品集合页应达成三个关键设计目标：\n\n-   为用户呈现当前集合中商品（或通过当前筛选条件匹配的商品）的清晰概览。\n\
  -   为用户提供充足的商品信息，使其能够判断是否对特定商品感兴趣。\n-   为用户提供易用的导航和筛选工具，以便他们能够优化商品列表，更精准地匹配自身兴趣。\n\
  \n商品集合页通常被视为顾客初次访问网站到进入商品详情页之间的“垫脚石”，顾客在详情页将商品加入购物车并最终完成购买。然而，不应低估它们在帮助顾客通过视觉和信息对比来选择感兴趣商品方面的重要作用。\n\
  \n由于 Shopify 中的商品集合可以关联自身的图片和文本内容，商品集合页还能通过提供针对顾客可能搜索的关键词类型的内容，在店铺的搜索引擎优化（SEO）中发挥重要作用（见图\
  \ [6-7]）。对于某些类型的店铺，商品集合页甚至更为重要，因为预期顾客能在此获得足够信息，无需访问商品详情页即可直接将商品加入购物车（见图 [6-8]）。\n\
  \n![A437216_1_En_6_Fig8_HTML.jpg](img/A437216_1_En_6_Fig8_HTML.jpg)\n\n**图 6-8**\n\
  \nYoufoodz 期望顾客直接从“午餐与晚餐”集合页将单个商品（餐食）加入购物车。请注意，他们在每份餐食下方提供了一个形似“加号”按钮的操作提示，并且顾客如果需要在做出购买决定前获取更多信息，仍可以深入查看单个餐食的详细信息。\n\
  \n![A437216_1_En_6_Fig7_HTML.jpg](img/A437216_1_En_6_Fig7_HTML.jpg)\n\n**图 6-7**\n\
  \n《纽约时报》“畅销书”集合包含一些集合专属的文本内容，旨在为顾客提供其所查看集合的上下文信息，并帮助搜索引擎将“纽约时报畅销书”等搜索词直接导向此页面。\n\
  \n我将在本章后续部分，随着对集合页各功能实现的逐步讲解，更详细地讨论这些设计目标。\n\n#### Shopify 商品集合页概念\n\n在开始着手实现一个满足上述设计目标的商品集合页之前，有必要先概览一些关键的主题集合概念，并理解\
  \ Shopify 期望如何对商品进行分类和导航。\n\n##### Shopify 中的分类\n\n在 Shopify 之外，电子商务系统通常拥有“嵌套式分类”结构，商品可被分配到一个或多个存在于多层级体系中的分类。Shopify\
  \ 的层级结构则扁平得多——商品可以属于零个或多个商品集合，且没有固有的子分类概念。商品集合分为两种类型：**手动集合**（也称为自定义集合），由店主手动分配商品成员；以及**智能集合**，其成员由一组规则决定（例如，“类型为‘衬衫’的商品”）。\n\
  \n进一步的商品分类可以通过商品标签实现（稍后在“筛选”部分讨论）。我见过很多尝试使用嵌套导航列表或通过句柄和标签名链接的集合，在 Shopify 主题中塞入更复杂分类结构的做法，但总的来说，我认为最好坚持使用\
  \ Shopify 的基本概念。如果商家拥有的产品系列需要更复杂的分类方法，那么研究一个专门构建的搜索和筛选应用程序是值得的，Shopify 应用商店中有大量此类应用。\n\
  \n##### 筛选\n\n如上述所暗示的，Shopify 允许我们通过使用商品标签进一步细化集合中展示的商品。商家可以从 Shopify 后台为商品添加任意数量的标签，将标签名称追加到集合页面的\
  \ URL 末尾，将仅显示带有相应标签的商品。\n\n例如，在 Shopify 店铺中访问 `/collections/shirts/blue` 将显示“衬衫”集合中所有标记为“蓝色”的商品。标签的常见用途包括颜色、尺寸、性别、商品类型、“促销中”或“库存有限”标记，等等。\n\
  \n虽然你可以按多个标签进行筛选（例如 `/collections/shirts/blue+large`），但需要注意筛选是以合取方式应用的（在此例中，意味着仅显示同时标记了“蓝色”和“大号”的商品）。无法使用标签应用范围筛选（例如，“价格在\
  \ 100 到 200 美元之间”）或析取逻辑（例如，“蓝色”或“红色”）。\n\n##### 排序\n\nShopify 提供了几个常用属性，你可以根据它们对展示的商品集合进行排序（“A-Z”、“Z-A”、“价格：从低到高”、“价格：从高到低”、“畅销商品”等）。所需的排序顺序可以通过\
  \ URL 中的 `sort_by` 查询参数传递——例如 `/collections/shirts?sort_by=price-ascending`。\n\n\
  商家可以从 Shopify 后台设置集合中商品的默认排序顺序，但目前无法在不使用第三方应用程序的情况下定义自定义排序属性。\n\n##### 分页\n\nShopify\
  \ 还支持在集合 URL 中使用 `page` 查询参数（`/collections/shirts?page=3`）。要使用分页功能，你需要使用 `{% paginate\
  \ %}` 标签包裹在集合中遍历商品的 Liquid 代码，你很快就会看到。\n\n目前，Shopify 在对集合进行分页时，每页商品数量上限为 50 件。\n\
  \n##### 视图\n\n与商品模板类似，我们也可以为商品集合页创建备选商品模板，并通过使用 `view` 查询参数在它们之间切换（如需回顾其工作原理，请参阅第\
  \ [5] 章的“创建备选页面模板”）。\n\n在商品集合页的上下文中，备选模板在允许顾客切换集合的不同视图（例如列表视图与网格视图）时非常有用。我将在即将进行的实现阶段中讨论何时以及为何可能需要这样做。\n\
  \n##### 整合所有要素\n\n图 [6-9] 将所有商品集合 URL 参数整合在一起，并展示了每个参数的作用。\n\n![A437216_1_En_6_Fig9_HTML.jpg](img/A437216_1_En_6_Fig9_HTML.jpg)\n\
  \n**图 6-9**\n\n生成商品集合 URL 时可用选项的分解说明\n\n因此，商品集合页的实现就变成了这样一个练习：（a）以对用户最有用的方式展示商品列表，以及（b）提供一个简单的用户界面，使用户能够通过生成和操作商品集合\
  \ URL 在商品系列中进行导航。\n\n#### 实现商品集合页\n\n正如商品模板位于 `templates/product.liquid`，Shopify\
  \ 用于渲染商品集合页的模板位于 `templates/collection.liquid`，这也是本章余下部分的重点。与商品页和首页一样，起点将是一个“原型”商品集合页布局，如图\
  \ [6-10] 所示。\n\n![A437216_1_En_6_Fig10_HTML.jpg](img/A437216_1_En_6_Fig10_HTML.jpg)\n\
  \n**图 6-10**\n\n显示我们在此示例主题中将要实现的商品集合页布局的线框图\n\n如您所见，我们将致力于实现前面讨论过的商品集合页的所有关键功能——排序、备选视图样式的支持、分类级别筛选、标签级别筛选以及分页。让我们开始吧！\n\
  \n\n\n#### 添加带分页的商品循环\n\n首先，我们在 `templates/collection.liquid` 中添加一些初始代码（见列表 6-5），以实现最关键的功能——列出商品。\n\
  \n```\n{{ collection.title | escape }}\n\n{%- paginate collection.products by 12\
  \ -%}\n\n{%- for product in collection.products -%}\n{%- include 'product' -%}\n\
  {%- endfor -%}\n{%- if paginate.pages > 1 -%}\n{{ paginate | default_pagination\
  \ }}\n{%- endif -%}\n\n{%- endpaginate -%}\n\n列表 6-5\n用于列出和分页商品的基础集合页面\n```\n\n\
  列表 6-5 中需要关注的重点是商品循环（`{%- for product in collection.products -%}`），它会遍历集合中的商品，并使用之前创建的商品代码片段来渲染商品本身（`{%\
  \ include 'product' %}`）。此迭代循环中可用的商品由包裹该循环的 `{% paginate %}` 的 Liquid 标签控制。如您所见，我最初选择按每组\
  \ 12 个对集合进行分页。每页显示 12、18 或 24 个商品是列表页面的常见选择，因为它们具有许多约数，从而更容易创建响应式布局。在此示例中，每页显示 12\
  \ 个商品，我们可以在较大的桌面屏幕上每行显示四个，在平板电脑和其他较小设备上每行显示三个，而在移动设备上也许每行显示两个。\n\n我们引入的另一项“新”内容是页面底部的\
  \ `{{ paginate | default_pagination }}` 标签。顾名思义，这个方便的 Liquid 辅助工具会获取 `paginate`\
  \ 变量中的信息（当前页面、商品总数等），并将其渲染为一组简单的链接，允许用户浏览集合的每一页。您可以在图 6-11 中看到这些链接的样式，以及初始实现的其余部分。\n\
  \n![A437216_1_En_6_Fig11_HTML.jpg](img/A437216_1_En_6_Fig11_HTML.jpg)\n\n**图 6-11**\
  \  \n集合页面的初始实现（左），以及在初始 12 个商品页面底部渲染的分页链接的详细视图（右）\n\n#### 添加排序功能\n\n接下来，我们将添加对集合进行排序的支持，使用\
  \ Shopify 支持的任意预定义排序方式。为此，我们将在集合模板的左列中添加一个下拉控件，并用一系列可能的排序机制填充它。为了从无 JavaScript 的解决方案开始，我们将所有集合控件包裹在一个\
  \ `<form>` 元素内，并要求用户提交该表单以应用所选排序选项。\n\n让我们看看列表 6-6 中集合模板的效果。\n\n```\n{{ collection.title\
  \ | escape }}\n\n{%- assign current_sort_by = collection.sort_by | default: collection.default_sort_by\
  \  -%}\n排序方式...\n\n精选\n价格：从低到高\n价格：从高到低\n字母顺序 A-Z\n字母顺序 Z-A\n从旧到新\n从新到旧\n最畅销\n\n\
  更新\n\n{%- paginate collection.products by 12 -%}\n\n{%- for product in collection.products\
  \ -%}\n{%- include 'product' -%}\n{%- endfor -%}\n{%- if paginate.pages > 1 -%}\n\
  {{ paginate | default_pagination | replace: '&laquo; Previous', '&larr;' | replace:\
  \ 'Next &raquo;', '&rarr;' }}\n{%- endif -%}\n\n{%- endpaginate -%}\n\n列表 6-6\n\
  添加排序控件后的集合模板\n```\n\n添加此代码后，集合页面上会渲染出一个下拉选择框。用户能够选择排序方式，并点击**更新**按钮提交表单。然后，他们会被重定向到同一个集合\
  \ URL，但会带有相应的 `sort_by` 查询参数（这得益于包裹新控件的表单上的 `method=\"get\"` 属性，该属性会根据提交时的表单输入将用户发送到一个新的\
  \ URL，而不是将数据“发布”到服务器）。您可以在图 6-12 中查看结果。\n\n![A437216_1_En_6_Fig12_HTML.jpg](img/A437216_1_En_6_Fig12_HTML.jpg)\n\
  \n**图 6-12**  \n在集合页面左列添加排序控件\n\n您可能会疑惑，为什么我选择实现这种包裹 `<form>` 的模式，而不是（比如说）向 `<select>`\
  \ 元素的 `change` 事件添加一个 JavaScript 事件处理程序，并直接更新集合 URL？对于用户来说，后者可能比必须选择排序方式并提交表单更省事。\n\
  \n我采用这种方法有几个原因。正如在第 3 章中讨论过的，构建不依赖 JavaScript 的功能有助于加快页面加载时间，并在 JavaScript 出错或尚未加载的情况下保持网站可用。此外，专注于基础组件往往能产生更简单、更易于管理的设计模式。您将在本章末尾看到这一点，届时我们将使用渐进增强技术，在现有简单的基于表单的控件之上添加一个\
  \ JavaScript 层。我想，当您看到基于坚实的基础开始实现“动态”用户界面模式时，需要的额外代码竟然如此之少，您会感到惊讶。\n\n\n\n#### 产品列表的不同呈现方式\n\
  \n如前所述，集合页面设计的主要目标之一是让顾客能够有效了解当前集合中的产品范围，同时还能在不深入产品页面的情况下直接比较特定产品。\n\n让顾客实现这一目标的最佳方式往往取决于所售产品的类型以及顾客所处的场景。一个经典的例子是：在“网格”视图（例如示例主题当前的产品列表方式）与“列表”视图（每行仅显示一个产品）之间做出选择。\n\
  \n传统观点认为，网格视图在以下情况下最为适用：\n\n- 产品的外观比产品信息更重要。\n- 所展示的产品之间视觉差异明显。\n- 顾客不太可能对展示的产品进行直接比较。\n\
  - 顾客更倾向于浏览，而非寻找特定产品。\n\n由此推论，列表视图在以下情况下则更为适宜：\n\n- 产品的信息比产品外观更重要。\n- 所展示的产品视觉上相似或完全相同。\n\
  - 顾客可能想要对展示的产品进行比较。\n- 顾客很可能在寻找特定产品。\n\n第一种场景的一个典型例子是服装店的“新品”集合。该集合很可能包含完全不同类型的服装（围巾、帽子和夹克），顾客可能在毫无特定目标的情况下随意浏览。一般来说，那些产品外观至关重要的店铺（如服装店）更倾向于使用网格视图（见图\
  \ 6-13）。\n\n![A437216_1_En_6_Fig13_HTML.jpg](img/A437216_1_En_6_Fig13_HTML.jpg)\n\
  \n图 6-13  \n时尚店铺及其他产品视觉元素突出的店铺常使用网格视图\n\n相反的案例是电子产品商店中的“液晶电视”列表。所有电视机看起来都相当相似——重要的是规格参数（尺寸、对比度和功能），而且顾客很可能想要比较两种或多种选择。当产品细节更为重要时，更倾向于使用列表视图（见图\
  \ 6-14）。\n\n![A437216_1_En_6_Fig14_HTML.jpg](img/A437216_1_En_6_Fig14_HTML.jpg)\n\
  \n图 6-14  \n拥有大量技术信息或产品比较尤为重要的店铺常使用列表视图\n\n电商网站提供在这两种视图之间切换的功能相当普遍。添加此类功能会增加额外的工作量，但在以下情况下会很有用：\n\
  \n- 你无法确定所设计的主题将面向哪些产品类型（在构建供多位商家使用的主题时很常见）。\n- 你有一些产品集合更适合网格视图，而另一些则更适合列表视图。\n\
  - 你拥有大型产品集合，顾客可能希望先用网格视图直观地缩小选择范围，再通过列表视图对挑选出的产品进行比较。\n\n我一直主张保持界面简洁并降低用户的认知负担，所以如果你认为集合页面仅凭网格视图或列表视图就能胜任其功能，我会建议你坚持单一视图。如果你确实觉得需要提供视图选择功能，务必添加主题选项（见第\
  \ 8 章），以便店主能够独立开启或关闭每种视图，并设置默认视图类型。\n\n你还需要花些时间思考：根据不同的视图类型，你所展示给顾客的信息可能会发生怎样的变化。如果考虑经典场景——网格视图主要用于浏览，那么“顶层”信息（如产品外观、标题和价格）可能就足以让用户判断是否要进一步了解。列表视图通常信息密度更高，以便顾客能够从集合页面进行更全面的比较（见图\
  \ 6-15）。\n\n![A437216_1_En_6_Fig15_HTML.jpg](img/A437216_1_En_6_Fig15_HTML.jpg)\n\
  \n图 6-15  \nKershaw 刀具网站在网格视图中仅显示产品图片、标题和价格\n\n切换到列表视图后，会展示更详细的信息，如组件材质和刀片规格。这使得比较变得更加容易，尽管列表视图中产品图片的尺寸使得同时比较两个以上产品时略显困难。\n\
  \n\n\n##### 为主题示例添加视图切换选项\n\n基于我们希望为主题示例用户提供视图选择的前提，接下来我们探讨如何为商品集合页面添加列表视图，以补充现有的网格视图。为此，我们将使用前一章讨论过的\
  \ Shopify 备选模板功能。\n\n首先，我们将 `templates/collection.liquid` 中的所有现有代码移至一个代码片段 (`snippets/collection-view.liquid`)。之所以这样做，是因为我们希望在网格视图和列表视图之间共享大量代码——排序、筛选、分页以及页面的整体布局对两种视图而言都是相同的，我们希望尽可能避免重复代码。完成此步骤后，我们就可以从新版本的\
  \ `templates/collection.liquid` 中包含此代码片段（请参见列表 6-7）。每当集合 URL 包含 `?view=grid` 参数，或者未指定视图参数时，都将使用此模板。默认的集合模板\
  \ (`templates/collection.liquid`) 包含了集合代码片段，并指定应使用网格视图。\n\n```\n{%- include 'collection-view'\
  \ with 'grid' -%}\n列表 6-7\n网格视图\n```\n\n下面的备选集合模板 (`templates/collections.list.liquid`)\
  \ 将在集合 URL 包含 `?view=list` 参数时被渲染（请参见列表 6-8）。\n\n```\n{%- include 'collection-view'\
  \ with 'list' -%}\n列表 6-8\n?view=list 参数\n```\n\n如果你之前没遇到过，`{% include %}` 标签中的\
  \ `with` 关键字允许我们向包含的代码片段传递一个参数。在该代码片段内部，将创建一个名为 `collection-view` 的 Liquid 变量，其值就是我们要渲染的视图类型。\n\
  \n在 `collection-view.liquid` 代码片段内部，代码与原始集合模板基本保持一致，有两个关键改动。在集合排序的 `<select>` 元素下方，我们添加了第二个\
  \ `<select>` 来处理视图切换（请参见列表 6-9）。它被插入到 `snippets/collection-view.liquid` 中，位于原有的排序选择下拉菜单和“更新”表单提交按钮之间。然后，围绕产品循环输出的代码（请参见列表\
  \ 6-10）会检查 `collection-view` 的值，以渲染相应的产品代码片段——要么是之前用于网格视图的 `product.liquid` 代码片段，要么是用于在单行水平排列中渲染产品的新\
  \ `product-list.liquid` 代码片段（请参见列表 6-11）。\n\n```\n视图切换为...\n\n网格\n列表\n\n列表 6-9\n\
  新视图选择下拉菜单的代码\n```\n\n```\n...\n{%- paginate collection.products by 12 -%}\n\n{%-\
  \ if collection-view == 'grid' -%}\n{%- for product in collection.products -%}\n\
  {%- include 'product' -%}\n{%- endfor -%}\n{%- else  -%}\n{%- for product in collection.products\
  \ -%}\n{%- include 'product-list' -%}\n{%- endfor -%}\n{%- endif -%}\n...\n列表 6-10\n\
  产品循环的更新代码\n```\n\n```\n{{ product.title | escape }}\n{{ product.vendor | escape\
  \ }}\n\n{{ product.price | money }}\n\n列表 6-11\n新的 snippets/product-list.liquid\
  \ 代码片段\n```\n\n图 6-16 展示了结果，左侧栏出现了一个新的视图选择下拉菜单，右侧则用新的列表样式渲染了产品。\n\n![A437216_1_En_6_Fig16_HTML.jpg](img/A437216_1_En_6_Fig16_HTML.jpg)\n\
  \n图 6-16\n\n商品集合页面现在可以以简单的列表视图显示\n\n##### 添加类别级筛选\n\n目前我们已经在商品集合页面上实现了分页、排序和视图管理。最后要添加的功能是筛选——一种让客户能够将产品范围缩小到他们感兴趣商品的方式。\n\
  \n与我们之前在集合页面所做的其他工作相比，产品筛选是最依赖于具体用例的。根据所涉及的产品范围不同，需要采用不同的筛选策略以及不同的分组方法来组合不同筛选条件。一家卖酒的商店可能有成千上万种产品，需要让客户根据年份、原产国或葡萄品种的各种组合进行筛选。另一方面，一家销售有限范围预包装餐食的网站，可能每次只需提供单一维度的筛选（早餐、午餐或晚餐）。\n\
  \n大多数商店都需要某种“类别级”筛选的概念，这是一种将产品范围初步缩小到客户感兴趣商品的高级方法。如前所述，Shopify 中通过集合来实现这个层次的筛选。在商品集合页面上添加类别级筛选，可以简单到在商店中为每个集合添加一个链接列表，这就是我在列表\
  \ 6-12 中为主题示例实现的方式。此代码已添加到 `snippets/collection-view.liquid` 中，位于排序和视图控件之下。\n\n\
  ![A437216_1_En_6_Fig17_HTML.jpg](img/A437216_1_En_6_Fig17_HTML.jpg)\n\n图 6-17\n\n\
  类别筛选在左侧栏显示为一个简单的链接列表。一次只能选择一个类别\n\n```\n...\n更新\n\n类别\n\n{%- for collection_option\
  \ in collections -%}\n\n{%- if collection.handle == collection_option.handle -%}\n\
  {{ collection_option.title | escape }}\n{%- else -%}\n\n{{ collection_option.title\
  \ | escape }}\n\n{%- endif -%}\n\n{%- endfor -%}\n\n...\n列表 6-12\n添加一个直接的类别（集合）级筛选\n\
  ```\n\n这种简单的方法允许客户通过遍历所有集合，并为每个集合渲染一个指向其集合页面的链接，轻松地在商店的各个集合之间导航。请注意，在生成指向每个集合的 URL\
  \ 时，我们包含了当前视图和排序参数，以便在集合之间切换时保持一致的体验。相反，我们没有包含当前分页信息，因为从用户体验的角度来看，当我们完全改变可见类别时，跳回到第一页似乎是最优的。\n\
  \n这种直接方法的一个潜在问题是，店主无法控制显示的集合列表或它们的排列顺序。我们将在本章末尾解决这个问题，但现在，让我们继续探讨下一级别的筛选功能。\n\n\n\
  \n#### 添加基于标签的筛选功能\n\n对于产品数量有限的商店，按类别筛选就足够了。然而，在许多情况下，还需要额外的细化筛选层级。这时就要用到基于标签的筛选功能。\n\
  \n正如你之前查看集合页面 URL 结构时所看到的，在集合 URL 末尾添加一个标签名称，会将可见产品筛选为仅显示该集合中带有该标签的产品。Shopify 提供了几个\
  \ Liquid 辅助工具，可以轻松生成用于在当前集合视图中添加或移除这些标签的集合 URL。你可以在代码清单 6-13 中看到这些 Liquid 辅助工具（`current_tags`、`link_to_remove_tag`\
  \ 和 `link_to_add_tag`）的用法，我在类别级筛选器下方添加了一个可筛选的标签列表。另请注意，我还更新了表单的 `action` 属性，以确保在更改排序顺序或视图时能够保留标签筛选信息。使用\
  \ `&#9745;` 和 `&#9744;` HTML 实体来显示选中或未选中的复选框，具体取决于当前标签是否处于激活状态。\n\n```\n...\n筛选方式...\n\
  \n{% for tag in collection.tags %}\n\n{% if current_tags contains tag %}\n{{ '&#9745;'\
  \ | append: tag | link_to_remove_tag: tag }}\n{% else %}\n{{ '&#9744;' | append:\
  \ tag | link_to_add_tag: tag }}\n{% endif %}\n\n{% endfor %}\n\n代码清单 6-13\n在类别级筛选器下方添加基于标签的筛选器\n\
  ```\n\n如图 6-18 所示，这段代码片段会在类别级筛选器正下方渲染出一个标签列表。\n\n![A437216_1_En_6_Fig18_HTML.jpg](img/A437216_1_En_6_Fig18_HTML.jpg)\n\
  \n**图 6-18**  \n添加标签筛选器后集合页面的效果：分别选择零个（左）、一个（中）和两个（右）标签进行筛选\n\n关于这种方法，需要注意两个重要事项：\n\
  \n- 这里的标签筛选器是以累加方式使用的。也就是说，如图 6-18 所示，我们可以先筛选出男士产品，然后再添加第二个“衬衫”筛选器。这是一种选择；另一种可能是只允许单层标签筛选，类似于我们只允许单层类别筛选的方式。\n\
  - 你可能已经从截图中注意到，随着我们添加筛选条件，“筛选方式...”标题下的可用标签筛选器列表会缩小。这是因为标签循环 `{% for tag in collection.tags\
  \ %}` 只会返回当前可见产品中存在的标签列表。这通常是期望的行为，因为它能避免显示对最终产品列表没有影响的标签筛选选项。但如果你希望保持标签筛选器列表的一致性，可以使用\
  \ `{% for tag in collection.all_tags %}` 来代替。\n\n#### 渐进增强集合页面\n\n现在的集合页面功能已经相当完善，能够让客户执行本节开头所述的所有关键任务。为了总结本节，我们将介绍一些可用于改进页面用户体验的方法。\n\
  \n首先是当用户可使用 JavaScript 时，添加一些功能（渐进增强）。之前添加排序和视图选择下拉框时，我提到要求用户在更改下拉框后点击**更新**是一个不必要的额外步骤。得益于我们迄今为止构建集合页面的稳健方式，只需添加少量\
  \ JavaScript 和 CSS，我们就可以增加一些逻辑：当下拉选择框发生变化时自动提交集合表单。你还将看到当 JavaScript 可用时如何隐藏**更新**按钮，因为届时它已不再需要。\n\
  \n由于这些更改所需的代码涉及多个不同的文件，我不会在书中完整复制（和往常一样，这些代码更改可在示例主题在线仓库中找到）。以下是该方法的大纲：\n\n1. 添加一些\
  \ `no-js` 和 `js-hide` CSS 类，分别应用于 `<body>` 和**更新**按钮，以便在 JavaScript 可用时隐藏**更新**按钮。\n\
  2. 添加一行 JavaScript，在初始化时从 `<body>` 中移除 `no-js` CSS 类。\n3. 使用 JavaScript 捕获排序和视图选择下拉元素的\
  \ `change` 事件。\n4. 在该事件的处理程序中，自动提交集合表单以应用更改。\n\n实施这些更改后，你应该能够在启用和不启用 JavaScript\
  \ 的情况下加载集合页面，并看到与图 6-19 中相同的结果。对排序顺序或视图选择的任何更改都应立即生效。\n\n![A437216_1_En_6_Fig19_HTML.jpg](img/A437216_1_En_6_Fig19_HTML.jpg)\n\
  \n**图 6-19**  \n渐进增强的实际效果！\n\n当 JavaScript 可用、已被解析并初始化后，**更新**按钮被隐藏，更改选择框会立即更新视图。否则，按钮保持可见，并提供一个可访问的后备方案。\n\
  \n我们可以进行的另一项增强是，使用 Ajax 调用避免在每次更改排序、视图或筛选条件时都刷新整个页面。虽然我认为基于 Ajax 的动态界面带来的速度优势常常被夸大（特别是如果你已经花精力对主题进行了适当优化），但如果在稳固的基础上渐进式地添加，你可以用相对较少的工作来避免一些开销（例如重新解析页面加载时涉及的样式表和\
  \ JavaScript）。\n\n同样，为了简洁起见，我将跳过完整代码，仅提供该方法的大纲：\n\n1. 使用 JavaScript 拦截集合表单的 `submit`\
  \ 事件，该事件将在排序或视图下拉框更改时触发。\n2. 阻止默认的表单提交，而是向原本的目标 URL 发起一个 Ajax 请求以获取页面内容，然后用新内容替换当前页面内容。\n\
  3. 使用 JavaScript 拦截类别和标签筛选链接的 `click` 事件。\n4. 采用类似于表单提交的方法，发起 Ajax 请求获取链接的目标 URL，并用新内容替换当前页面。\n\
  \n### 本章小结\n\n在本章中，你了解了如何实现任何 Shopify 商店中两个关键页面——主页和集合页面。对于主页，你明确了页面的关键目标（传达品牌形象和产品范围），并了解了如何使用动态板块构建一个高度可配置的布局。\n\
  \n你还学习了集合页面的设计目标与实现技术，以及客户在这些页面上的四个关键操作——视图选择、排序、筛选和分页。\n\n"
- "# 购物车、结账与内容\n\n前三章涵盖了 Shopify 商店访客发现想要购买的产品（或产品）并将其加入购物车所需组件的设计与实现。在本章中，我们将讨论如何鼓励客户从这一点开始完成他们的旅程，并顺利完成结账，以便商家收到付款。作为其中的一部分，我们将研究如何最大限度地减少购物车放弃率，以及最大化平均订单金额的策略。\n\
  \n本章的最后部分还将讨论 Shopify 商店主题中涉及的“其他”页面——内容页面、博客页面和文章页面，这些页面在推动产品销售方面起到辅助作用。\n\n\n\n\
  ### 购物车页面\n\n当客户将商品添加到购物车后，Shopify 的默认行为是将他们重定向到 `/cart` 页面，作为进入结账流程前的最后一步。如果你正在开发的主题使用了基于\
  \ Ajax 的“加入购物车”功能（通常来自商品页或商品系列页），客户可能会停留在当前页面，此时默认行为将不适用。\n\n无论哪种情况，购物车页面都让客户有机会在提供收货和付款信息前，复核订单并确保满意。为了尽可能让更多客户顺利完成结账流程，在设计购物车页面时，我们需要牢记一些设计要点。\n\
  \n#### 购物车页面的设计目标\n\n研究表明，平均有 69% 的在线购物车会在结账流程的某个阶段被放弃。¹ 虽然再精妙的设计也无法挽回所有流失的销售，但我们可以采取一些关键措施来鼓励用户完成订单。上述报告中对购物车放弃原因的分析表明，导致在线商店转化率下降的两大主因是：\n\
  \n- 添加了不合理或意外的附加成本（如运费、税费或手续费）\n- 结账流程过于复杂，或需要花费太多时间和精力才能完成\n\n虽然商家收取的实际运费和税费不在主题设计师的掌控范围内，但我们完全可以在购物车页面上采取措施，确保客户在结账过程中不会遭遇意外或“隐藏”费用。我们还可以集中精力简化购物车页面，确保只显示对客户有用的信息，并鼓励他们采取下一步合乎逻辑的操作（结账）。\n\
  \n下一节将介绍如何在示例主题中添加一个符合这些设计目标的购物车页面。在每一步中，我们都会更详细地探讨具体的设计决策。\n\n#### 实现购物车页面\n\n\
  延续示例主题采用“标准”设计的传统，我们将要构建的购物车页面将遵循图 7-1 所示的布局。\n\n![A437216_1_En_7_Fig1_HTML.jpg](img/A437216_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1\n\n本章将实现的购物车页面布局示意图\n\n你会注意到该购物车布局的几个关键设计特点：\n\n- 它允许客户编辑购物车，既可以调整商品数量，也可以完全移除商品。这对于提高平均订单价值（当客户希望或被鼓励订购更多数量时）和降低放弃率（如果客户认为调整数量或从购物车中移除商品过于困难，他们可能会直接离开网站）都至关重要。\n\
  - 它包含一条关于运费率的提示，旨在降低客户在结账过程中遇到意外费用的风险。\n- 它包含一个购物车内的追加销售（upsell）推荐，旨在通过冲动消费决策提高平均订单价值。实施这类推荐时务必谨慎，确保它们不会干扰客户完成结账这一首要目标，因此在实施时应考虑其对转化率和整体营收的影响。\n\
  \n##### 添加可编辑的购物车内容列表\n\n我们将从添加一个显示当前购物车内容的简单表格开始购物车页面的工作，如代码清单 7-1 所示。\n\n```\n\
  您的购物车\n{%- if cart.items.size > 0 -%}\n\n商品\n数量\n价格\n\n{%- for item in cart.items\
  \ -%}\n\n{{ item.title | escape }}\n{{ item.sku | escape }}\n移除\n\n{{ item.line_price\
  \ | money }}\n\n{%- endfor -%}\n\n{{ cart.total_price | money }}\n\n{%- else -%}\n\
  \n您的购物车是空的。\n\n{%- endif -%}\n\n代码清单 7-1\ntemplates/cart.liquid 的初始 Liquid 模板\n\
  ```\n\n表格内容被包裹在 `<form>` 中，页面底部包含一个“更新”按钮。客户可以通过更改数量输入框的值并提交表单来更新购物车中商品的数量。我们还会为每个商品行添加一个“移除”链接，以及一个“前往结账”按钮作为页面上的主要行动号召。\n\
  \n实现后，包含几件商品的购物车应如图 7-2 所示。\n\n![A437216_1_En_7_Fig2_HTML.jpg](img/A437216_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2\n\n购物车页面的初始浏览器显示效果\n\n正如我们在第 6 章中对商品系列页面的视图控制所做的处理一样，我们可以使用渐进增强技术，在 JavaScript\
  \ 可用时驱动商品数量的更新，避免用户在购物车页面上必须点击“更新”按钮的笨拙体验。实现该功能所需的完整代码可在示例主题的 GitHub 仓库中找到，但总体思路是：\n\
  \n- 拦截购物车表格中数量输入框的 `change` 事件。\n- 当变化发生时，使用 Shopify 的 Ajax API² 发起一个 Ajax 请求，以更新指定商品行的数量。\n\
  - 利用我们为商品系列页面实现的 CSS 类，在 JavaScript 可用时隐藏“更新”按钮。\n\n\n\n###### 添加运费计算器\n\n在购物车页面的基本功能就绪后，我们可以在“继续结账”按钮上方添加一条提示，旨在降低顾客在结账过程中遇到意外情况的风险。由于加载运费需要一些动态\
  \ JavaScript，我们可以先实现一个默认的纯 HTML 备用方案——如代码清单 7-2 和图 7-3 所示，显示一条静态提示。在代码清单 7-2 中，代码清单\
  \ 7-1 中的表格底部已被更新，加入了一条静态运费信息。包含该信息的元素被赋予了 `id` 属性，以便我们后续引用并动态更新它。\n\n![A437216_1_En_7_Fig3_HTML.jpg](img/A437216_1_En_7_Fig3_HTML.jpg)\n\
  \n**图 7-3** 购物车表格中显示的备用运费信息\n\n```\n...\n{{ cart.total_price | money }}\nShipping\
  \ and taxes calculated during checkout\n...\n代码清单 7-2\n更新后的代码清单 7-1 中的表格底部包含静态运费信息\n\
  ```\n\n有了这个备用方案后，我们现在来实现一些 JavaScript 代码，使用 Shopify 的 Ajax API 获取运费估算并显示给顾客。为了准确估算运费，我们需要知道发货目的地（国家、州和邮政编码）——这些信息通常在购物车步骤中并不具备。\n\
  \n出于示例主题的考虑，我们将保持简单，仅为已知收货地址的已登录顾客获取并显示更准确的运费估算。在其他情况下，我们不会执行任何动态更新，而是显示备用信息。在实际场景中，你可以扩展即将实现的代码，通过\
  \ JavaScript 地理定位 API 获取陌生顾客的位置，或根据其 IP 地址进行近似定位，也可以直接通过一个表单请求其详细地址。\n\n实现此功能需要对三个主题文件进行修改：\n\
  \n1.  首先，我们需要在 `assets/theme.js.liquid` 中添加一个新的 `fetchShippingRateEstimate` JavaScript\
  \ 方法。该方法需要接收已登录顾客的地址以及用于渲染运费估算信息的目标元素的选择器。然后，它会向 Shopify 的运费 API 发出 Ajax 调用并渲染结果。此方法见代码清单\
  \ 7-3。\n2.  由于任何已登录顾客的详细信息仅在核心 Liquid 模板中可用，而非资产文件，因此我们需要在 `templates/cart.liquid`\
  \ 中将顾客详情传递给新编写的 `fetchShippingRateEstimate` 方法。如代码清单 7-4 所示，这里使用了笔者称之为“捕获 JS”的模式，具体解释见随后的提示。\n\
  3.  最后，为了让“捕获 JS”模式生效，我们需要在 `layout/theme.liquid` 的底部、所有其他 JavaScript 代码之下添加一行代码。如代码清单\
  \ 7-5 所示。\n\n**提示**\n\n良好的实践要求将 JavaScript 加载并初始化在 `theme.liquid` 所有页面的底部，因为顶部加载\
  \ JavaScript 是导致页面加载缓慢和加载时间过长的主要原因之一。然而，有时你可能希望只在特定页面上加载或执行某些 JavaScript 代码——这里对\
  \ `fetchShippingRateEstimates` 的初始化调用就是一个很好的例子。\n\n在这些情况下，我使用捕获 JS 技术：在 Liquid 模板中使用\
  \ `{% capture %}` 标签，将任何页面特定的 JavaScript 存储到名为 `captured_js` 的变量中。只要确保将 `captured_js`\
  \ 之前的内容与新捕获的内容一同输出，就可以在页面上多次使用此方法（参见代码清单 7-4）。然后，你的 `theme.liquid` 模板可以在页面最底部输出捕获的内容，确保所有\
  \ JavaScript 库在执行前都已加载完毕。\n\n请注意，代码清单 7-3 将此方法暴露在 window 对象的全局作用域中——在生产主题中，你可能需要为其设置命名空间（例如\
  \ `window.ExampleTheme.fetchShippingRateEstimate`）。\n\n```\n...\nwindow.fetchShippingRateEstimate\
  \ = function(target, shipping_address) {\nif(!shipping_address) return;\n$.ajax({\n\
  url: '/cart/shipping_rates.json',\ndata: $.serialize({ shipping_address: shipping_address\
  \ }),\nsuccess: function(shipping_rates) {\nif(shipping_rates.length === 0) return;\n\
  var shipping_rate = shipping_rates[0];\n$(target).html(\n'' +\nshipping_rate.name\
  \ + ' ($' + shipping_rate.price + ') 发往 ' +\nshipping_address.city + ', ' + shipping_address.province\
  \ +\n''\n);\n}\n});\n};\n...\n代码清单 7-3\n添加到 theme.js.liquid 中的 fetchShippingRateEstimate\
  \ 方法\n```\n\n请注意，代码清单 7-4 使用了方便的 Liquid `| json` 过滤器，它可以将 Liquid 变量（例如顾客的默认地址）转换为\
  \ JSON 对象，以便在 JavaScript 中使用。\n\n```\n...\n{%- capture captured_js -%}\n{{- captured_js\
  \ -}}\n\nfetchShippingRateEstimate('#cart-shipping', {{ customer.default_address\
  \ | json }});\n\n{%- endcapture -%}\n代码清单 7-4\ncart.liquid 底部执行的“捕获 JS”模式\n```\n\
  \n```\n...\n{{- 'theme.js' | asset_url | script_tag -}}\n{{- captured_js -}}\n\n\
  代码清单 7-5\ntheme.liquid 底部新增内容——输出 captured_js Liquid 变量\n```\n\n图 7-4 展示了购物车页面在获取运费后的效果。\n\
  \n![A437216_1_En_7_Fig4_HTML.jpg](img/A437216_1_En_7_Fig4_HTML.jpg)\n\n**图 7-4**\
  \ 如果拥有已知地址的顾客已登录，购物车页面现在会为其所在地获取运费估算，并提供更具体的运费信息\n\n\n\n##### 添加追加销售优惠\n\n购物车页面的最后一项功能，将是一个基于购物车当前内容的简单追加销售优惠。为了实现此功能，我们将采用以下方法：\n\
  \n1.  我们将引入一个新的“追加销售”元字段，它可以应用于我们的产品（关于其工作原理，请参阅第 5 章“使用元字段管理附加信息”一节）。\n2.  在购物车页面上，我们将遍历购物车中的每一项，检查它是否设置了追加销售元字段，并且该字段指向的商品是否尚未在购物车中。如果是，我们将显示追加销售商品的图片以及一个按钮，让顾客可以将其添加到购物车。\n\
  \n为了使这种方法生效，我们需要添加一个 `cart-upsell.liquid` 代码片段（参见代码清单 7-6），并将其包含在现有 `cart.liquid`\
  \ 模板的底部。它包含 Liquid 逻辑，用于遍历当前购物车，查找被指定为追加销售但尚未在购物车中的商品。一旦找到有效的追加销售商品，我们就跳出循环，因此每次最多只会显示一个优惠。\n\
  \n```\n{%- assign upsell_product = nil -%}\n{%- for item in cart.items -%}\n{%-\
  \ assign upsell_product_handle = item.product.metafields.theme.upsell_product_handle\
  \ -%}\n{%- if upsell_product_handle == blank -%}\n{%- next -%}\n{%- endif -%}\n\
  {%- assign already_in_cart = false -%}\n{%- for upsell_item in cart.items -%}\n\
  {%- if upsell_product_handle == upsell_item.handle -%}\n{%- assign already_in_cart\
  \ = true -%}\n{%- endif -%}\n{%- endfor -%}\n{%- unless already_in_cart -%}\n{%-\
  \ assign upsell_product = all_products[upsell_product_handle] -%}\n{%- break -%}\n\
  {%- endunless -%}\n{%- endfor -%}\n{%- if upsell_product -%}\n\nSpecial offer: add\
  \ a {{ upsell_product.title }} to your cart for only {{ upsell_product.variants.first.price\
  \ | money }}\n\n{%- endif -%}\n代码清单 7-6\ncart-upsell.liquid 文件\n```\n\n完成这最后一项添加后，购物车页面就完成了，应该如图\
  \ 7-5 所示。\n\n![A437216_1_En_7_Fig5_HTML.jpg](img/A437216_1_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5  \n完整的购物车页面，包含购物车表格、运费估算和追加销售优惠\n\n### 结账流程\n\n一旦顾客点击“继续结账”按钮，他们就会离开主题的购物车页面，进入\
  \ Shopify 的结账流程，系统会要求他们输入配送和付款信息以完成订单。出于安全原因，结账流程中使用的布局和 Liquid 模板与其它页面模板不同，不会以相同的方式向主题开发者开放。取而代之的是，商户可以在\
  \ Shopify 管理后台的“主题”部分访问多个预定义设置，允许他们自定义标题图片和颜色，以匹配其店铺的其他部分（参见图 7-6）。\n\n![A437216_1_En_7_Fig6_HTML.jpg](img/A437216_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6  \n商户可以在 Shopify 管理后台选择有限的选项来自定义其结账流程以匹配主题\n\nShopify 结账流程缺乏可定制性，常被认为是该平台的一个主要缺点。这确实可能带来限制——例如，无法更改结账时表单元素的顺序、无法从顾客那里获取额外信息，或无法使用自定义字体。但作为交换，你获得的是一个安全、稳健的结账体验，并且\
  \ Shopify 会持续对其进行调整和优化——在我看来，尽管存在局限性，这对店铺来说总体上仍然是赢家。\n\n在 Shopify 结账流程可能的范围内，我认为需要牢记的最重要一点是增强对店铺品牌以及结账流程本身的信任。应选择与主商店主题紧密匹配的字体、颜色和标题图片，这样顾客就不会感觉他们“跳转”到了另一个网站。\n\
  \n**旁注**\n\n历史上，顾客在结账过程中会从 Shopify 店铺被引导到一个不同的域名 (`checkout.shopify.com`)，这让商户担心这可能会影响转化率。如今，Shopify\
  \ 的结账流程与店铺其他部分托管在同一个域名下——但有趣的是，在为此更改进行的测试中，结账团队发现无论域名是否更改，转化率都没有差异。\n\n#### 使用 Shopify\
  \ Plus 自定义结账流程\n\n使用 Shopify Plus 企业平台（相对于“常规”Shopify 产品）的店铺，在处理结账模板时拥有更高的灵活性。Plus\
  \ 店铺可以为结账流程添加自定义的 Liquid、CSS 和 JavaScript，尽管布局和结账步骤的控制权仍由 Shopify 掌握。这些自定义需要针对每个店铺单独实施，因为你无法在主题中提供通用的自定义\
  \ `checkout.liquid` 模板（无论如何，结账自定义往往具有很强的店铺特异性）。\n\n虽然你早期的主题工作不太可能涉及 Shopify Plus\
  \ 店铺，但掌握一些结账自定义知识作为储备还是有益的。为此，我们将在示例主题中通过添加一个简单的门店自提选择器，来探讨一个常见但简单的结账自定义。\n\n\n\n\
  ##### 在结账流程中添加门店自提选择器\n\n为与商家实体零售店位于同一国家或地区的顾客提供“本地自提”配送选项是相当常见的做法。通常，这通过在 Shopify\
  \ 配送设置中添加一个“门店自提”选项来实现，并限制在特定的地理位置（见图 7-7）。\n\n![A437216_1_En_7_Fig7_HTML.jpg](img/A437216_1_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7\n\n在 Shopify 后台中配置的门店自提配送选项（左）；以及结账时向顾客展示的最终配送选项（右）\n\n虽然这种方法适用于简单的场景，但对于拥有多个自提点的商家来说，可能会遇到复杂情况。假设你的示例商店在澳大利亚的几个主要城市——墨尔本、悉尼和布里斯班——都设有实体店。虽然我们可以为每个自提点创建独立的配送选项，并按州进行限制，但这会导致在结账过程中选项过多，让顾客感到不知所措（见图\
  \ 7-8）。\n\n![A437216_1_En_7_Fig8_HTML.jpg](img/A437216_1_En_7_Fig8_HTML.jpg)\n\n\
  图 7-8\n\n当有多个实体自提点时，配置变得难以管理，结账流程对顾客来说也更加复杂\n\n借助 Shopify Plus 商店对 `checkout.liquid`\
  \ 模板的访问权限，我们可以通过一些自定义 JavaScript 来解决这个问题。具体方法如下：\n\n1.  在 Shopify 后台中设置一个名为“门店自提”的单一配送区域。\n\
  2.  添加一些自定义 JavaScript，用于检测顾客何时选择了“门店自提”配送选项。当该选项被选中时，渲染一个自定义下拉元素，让顾客可以选择他们想从哪个具体门店提货。\n\
  3.  当顾客进入下一步时，将所选选项作为购物车属性传递，从而将该选择与最终订单关联起来。\n\n你可以在示例主题仓库中查看实现此功能所需的代码变更（虽然代码不算复杂，但在此列出会占用过多篇幅）。你可以在图\
  \ 7-9 的结账页面中看到结果。\n\n![A437216_1_En_7_Fig9_HTML.jpg](img/A437216_1_En_7_Fig9_HTML.jpg)\n\
  \n图 7-9\n\n结账自定义功能现已就位\n\n有了结账自定义功能后，顾客在结账时首先会看到一个单一的“门店自提”选项（左）。选择该选项后，会显示第二个表单输入，允许顾客选择具体的自提地点（右），随后该信息会出现在\
  \ Shopify 后台订单详情页的“其他详细信息”部分。\n\n### 内容页面\n\n现在你已经了解了顾客在 Shopify 网站上最关键的几个环节——首页、商品系列页、产品页、购物车页和结账页。但这些并非\
  \ Shopify 商店仅有的页面——大多数商店还会包含“内容”页面，用于存放常见问题解答、关于我们、联系表单、退货政策等内容。许多商店还会有博客内容，无论是用于内容营销和搜索引擎优化，还是用于记录新产品的发布。\n\
  \n虽然这些页面对所有商店都很重要，但我不会在此详细展开介绍。我们用于构建首页、产品页和商品系列页的原则和技术，同样适用于页面、博客和文章模板。通常，处理这些页面的主要工作在于组织内容本身，并围绕内容构建设计。诸如\
  \ Liquid 变量和过滤器、替代页面模板、主题区段和设置等功能，在这些模板中均可使用，这为你实现功能和布局提供了高度的灵活性。\n\n你可以查看示例主题仓库，了解我是如何为页面、博客和文章模板实现简单示例的。\n\
  \n### 总结\n\n本章涵盖了顾客从商店购买商品旅程中最后几步的设计与实现。你学习了如何构建一个可编辑的购物车页面，该页面包含运费估算和追加销售等额外功能。\n\
  \n本章还讨论了 Shopify 结账流程及其在自定义方面的一些限制。在结束本章之前，我们简要介绍了 Shopify Plus 商家如何克服其中一些限制，并讨论了\
  \ Shopify 商店中的“其他”内容页面。\n\n### 脚注\n\n1  \n[`https://baymard.com/lists/cart-abandonment-rate`](https://baymard.com/lists/cart-abandonment-rate)\n\
  \n2  \n[`https://help.shopify.com/themes/development/getting-started/using-ajax-api`](https://help.shopify.com/themes/development/getting-started/using-ajax-api)\n\
  \n"
- "# 8. 主题设置与全球化\n\n无论何种情况，Shopify 主题的最终用户通常都需要一定程度的主题自定义。为了避免每次商店需要变更时都让商家去找开发者，Shopify\
  \ 主题通过两种不同的功能——主题设置和区域设置——提供按商店进行配置的能力。\n\n对于为客户开发的主题，使用这些功能添加一定程度的自助自定义能力，将为你节省大量宝贵的“五分钟修复”式客户支持时间。对于你销售给多个客户的主题来说，最终用户能够修改主题的多个方面至关重要，这样他们才能“拥有”自己的主题，并以符合其品牌的方式进行自定义。\n\
  \n\n\n### 主题设置\n\n正如你在第 1 章“剖析 Shopify 主题”一节中所看到的，主题的可配置项是通过一种特殊的 JSON 格式来指定的，要么在\
  \ `config/settings_schema.json` 文件中（用于应用于整个主题的全局设置），要么位于模板文件内部的 `{% schema %}` Liquid\
  \ 标签内（用于特定模板的设置）。一个全局设置文件的简单示例如代码清单 8-1 所示，其对应的 UI 界面如图 8-1 所示，向 Shopify 管理员端用户展示。请注意，你可以添加\
  \ Markdown 风格的引用标记，以提供指向更多信息的链接，并避免主题编辑器中出现信息过载。\n\n![A437216_1_En_8_Fig1_HTML.jpg](img/A437216_1_En_8_Fig1_HTML.jpg)\n\
  \n**图 8-1** 代码清单 8-1 中的简单复选框设置在 Shopify 管理后台界面中的显示结果\n\n```\n{\n\"type\": \"checkbox\"\
  ,\n\"id\": \"favicon_enable\",\n\"label\": \"使用[自定义图标](https://en.wikipedia.org/wiki/Favicon)\"\
  \n}\n```\n\n**代码清单 8-1** 一个简单复选框设置的 JSON 格式设置\n\n设置项的 JSON 格式以及所有可能的设置输入类型在 Shopify\
  \ 的在线文档中都有详细说明，¹ 因此我在此不再赘述。（Shopify 也会定期添加新的输入类型，所以定期查阅最新资料是值得的。）本章重点讨论何时使用主题设置是合理的、探索其用例，以及一些关于如何在你的主题中使用这些设置的实用技巧。\n\
  \n> **注意**\n> 除了 `settings_schema.json` 文件，在你的主题的 `/config` 目录下还有一个名为 `settings_data.json`\
  \ 的文件。该文件包含特定商店实例中主题的当前选定设置。请尽量避免在开发过程中直接编辑此文件，并确保在你使用的任何版本控制或自动上传流程中忽略它。否则，可能会导致开发者意外覆盖商店所有者精心配置的设置。\n\
  \n#### 什么应该被设为设置项？\n\n决定是否通过主题设置让商店所有者配置某项功能，通常取决于这个主题是为谁而构建的。\n\n##### 针对“单次使用”主题的设置\n\
  \n为特定商店的特定客户构建的主题（“单次使用”主题）在主题设置方面通常范围非常狭窄。\n\n鉴于你很可能与客户紧密合作设计和构建了网站，像字体、品牌颜色和图形元素等关键设计元素不太可能频繁更改。主题可能需要集成的第三方服务列表（例如，邮件列表服务商）很可能是预先确定的，或者至少在你的掌控之中。\n\
  \n因此，我发现为单次使用主题添加的设置类型通常是时敏功能标志或数值——例如，一个用于切换全站横幅的开关，显示关于正在进行的促销或假日配送延误的自定义信息；或者，哪些产品应该出现在某个关键内容页面上。\n\
  \n作为主题设计流程的一部分，我会与客户沟通，试图理解网站哪些部分可能会以这种方式具有时敏性，并据此规划我的设置项。一般原则是，如果你不确定某件事是否需要转为主题设置，那就先不要做，直到客户多次要求修改它。（我发现，如果放任不管，客户会想要定制一切，即使实际上它根本没有可能被更改。）\n\
  \n##### 针对“多用途”主题的设置\n\n“单次使用”主题的一个变体是“多用途”主题，你为某个特定客户设计和构建一个主题，但该主题将用于多个 Shopify\
  \ 商店。此类主题的常见用例是，客户运营多个 Shopify 商店来服务不同地区（例如，美国与澳大利亚）或不同的客户群体（例如，零售与批发）。\n\n除非地区或客户群体之间的差异大到需要完全不同的设计，否则，使用单一的代码库来驱动特定主题的所有变体是非常有用的，通过每个独立商店的设置来决定该地区或目标客户的最终外观和功能。\n\
  \n作为这种实际应用方法的例子，你可以对比图 8-2 中 Colonna Coffee Shopify 商店的零售版和批发版。\n\n![A437216_1_En_8_Fig2_HTML.jpg](img/A437216_1_En_8_Fig2_HTML.jpg)\n\
  \n**图 8-2** Colonna Coffee 零售页面（左）和 Colonna Coffee 批发页面（右）的主页。两个网站都由完全相同主题代码驱动\n\
  \n两个商店使用相同的主题，并且 `settings_schema.json` 文件中包含一个用于 `store_type`（设置为 `retail` 或 `wholesale`）的选项，模板文件本身可以读取并根据结果显示不同的内容。\n\
  \n其他常用于“多用途”主题的主题设置示例包括：\n\n*   根据所服务地区的法律要求激活主题功能（例如，年龄验证或 Cookie 警告）\n*   批发站点的最低订单金额\n\
  *   用于区分零售和批发的品牌主色\n\n同样，确定哪些内容需要进入主题设置的最佳方式是与客户进行讨论，并了解他们的需求。\n\n##### 针对“分发式”主题的设置\n\
  \n与为特定客户设计的“单次使用”主题范围狭窄截然相反的是“分发式”主题——一种可能被无数与你无直接关联的企业使用的主题。这在主题设置方面带来了最多的问题。\n\
  \n用户会想要更大的灵活性和控制权，包括能够配置颜色、字体和布局设置。你所支持的集成功能也需要有更大的灵活性——例如，你的新闻通讯组件现在可能需要支持使用 MailChimp、Campaign\
  \ Monitor 和 InfusionSoft 的设置，而不仅仅是单一的服务商。\n\n我能提供的最佳建议是，从一些有主见的选择开始（例如有限的字体范围、这几个邮件列表服务商、这些布局选项），并且只有在收到客户反复反馈时才加以扩展，因为每向你的主题选项列表中添加一项，都会导致你需要测试的事项成倍增加。\n\
  \n\n\n#### 主题设置指南\n\n为主题编写优秀设置的关键在于深入思考最终用户的需求。当然，你需要运用自己的判断力，但我建议遵循以下通用指南：\n\n\
  - 如果主题中包含这些元素，请务必将其设为主题设置项：\n  - JavaScript 库使用的任何 API 密钥（例如 Instagram 客户端密钥）\n\
  \  - 所有关键图像，包括背景图、网站徽标和网站图标\n  - 用于“附加”主题功能（如新闻通讯弹窗或倒计时器）的开启/关闭开关\n- 避免“上帝设置”——即那些影响网站诸多方面的主题设置（Colonna\
  \ Coffee 商店使用的零售/批发主题设置可能就属于此类——这是我的过错！）。一个设置引发网站的重大变更，会使主题状态难以推理，或难以隔离功能变化。如果可能，请将这些设置拆分为更聚焦、控制单个行为的设置项。\n\
  - 避免直接在主题设置中指定列表，而应利用 Shopify 内置的概念，如导航菜单、商品系列和博客。使用一个指向灵活尺寸商品系列（例如“精选商品”）的设置，远比使用多个分别指向特定商品的设置简单得多。\n\
  - 几乎毫无例外，所有向客户展示的可配置文本内容，都应通过商店的语言文件（我们稍后会讨论）而非主题设置来配置。这能让店主在一个地方控制所有主题文本内容，避免遗漏翻译或文本更改。\n\
  \n#### 在主题中使用设置\n\n在主题的 Liquid 代码中，设置可以像其他任何变量一样使用，如清单 8-2 所示。\n\n```liquid\n{%\
  \ if settings.display_site_banner %}\n{% include 'site-banner' %}\n{% endif %}\n\
  ```\n\n##### 迭代模式\n\n经常会有需要重复多次使用的一组设置。例如，如果你的主题在主页上有一个图片轮播，你可能希望用户能够为每张幻灯片配置图片、标题和链接。最直接的方法（如清单\
  \ 8-3 所示）是为每个重复元素重复一次 HTML 逻辑。更好的方法（如清单 8-4 所示）是动态迭代设置值。\n\n```liquid\n{% if settings.show_slide_1\
  \ %}\n  {{ settings.caption_slide_1 | escape }}\n{% endif %}\n{% if settings.show_slide_2\
  \ %}\n  {{ settings.caption_slide_2 | escape }}\n{% endif %}\n{% if settings.show_slide_3\
  \ %}\n  {{ settings.caption_slide_3 | escape }}\n{% endif %}\n```\n\n```liquid\n\
  {% for i in (1..3) %}\n{% capture setting_slide_show %}show_slide_{{i}}{% endcapture\
  \ %}\n{% capture setting_slide_image %}image_slide_{{i}}.png{% endcapture %}\n{%\
  \ capture setting_slide_title %}caption_slide_{{i}}{% endcapture %}\n{% if settings[setting_slide_show]\
  \ %}\n  {{ settings[setting_slide_title] | escape }}\n{% endif %}\n{% endfor %}\n\
  ```\n\n这段代码不仅编写起来更简短，而且当你想要添加超过三张幻灯片时，扩展也非常容易。同时，这意味着你只需在一个地方更新每张幻灯片渲染的 HTML。\n\n\
  ##### 在预处理文件中使用设置\n\n如果你的 `assets` 目录中有 JavaScript 或样式表文件，并且文件名末尾带有 `.liquid` 扩展名，Shopify\
  \ 会在提供这些文件之前通过 Liquid 解析器运行它们，如清单 8-5 所示。\n\n```css\n/* assets/styles.css.liquid\
  \ */\nbody {\n  background-color: {{ settings.body_background_color }};\n}\n```\n\
  \n当直接在 `assets` 目录中处理简单资源时，这没问题，但通常你希望在将最终文件添加到 `assets` 之前进行一些预处理（例如 LESS/SCSS\
  \ 编译，或 JavaScript 连接和压缩）。在这些情况下，你需要考虑预处理器将如何与资源文件中的 Liquid 语法交互。\n\n为了解决这些限制，你需要将可控的样式或\
  \ JavaScript 设置提取到主 Liquid 模板中，或者以一种能通过任何预处理工具和 Liquid 检查的方式编写 SCSS 和 JavaScript。Lucid\
  \ Design 的 Stewart Knapman 在他的文章“Escaping Liquid in SCSS”² 中剖析了 SCSS 文件的问题，并提供了一些示例变通方法，如清单\
  \ 8-6 所示。\n\n```scss\n/* assets/styles.scss.liquid */\nbody {\n  /* {% if settings.background-image\
  \ %} */\n  background: url(#{'{{ settings.background-image | asset_url }}'}) center\
  \ no-repeat;\n  /* {% else %} */\n  background: whitesmoke;\n  /* {% endif %} */\n\
  }\n```\n\nStewart 在此概述的方法——将 Liquid 包裹在注释中——通常也适用于其他形式的预处理，如 Less 和 JavaScript。\n\
  \n> **注意**\n> `assets` 目录中带有 `.liquid` 扩展名的 SVG 文件也会被 Liquid 处理，因此可以使用主题设置。\n\n\
  ##### 默认值过滤器\n\n当你的主题首次安装时，某些设置可能没有初始值。为了处理这些情况，建议在 Liquid 模板中使用默认值，以防止生成无效的 HTML\
  \ 或 CSS。例如，如果你将页面背景色设为主题设置，你可能需要像清单 8-7 那样操作。\n\n请注意，你也可以在 `settings_schema.json`\
  \ 中为设置指定默认值——例如，使用 `default: 'white'`。一般来说，我建议在两个地方都设置默认值，以避免未设置值的边缘情况。\n\n```css\n\
  /* assets/styles.css.liquid */\nbody {\n  background-color: {{ settings.body_background_color\
  \ | default: 'white' }};\n}\n```\n\n### 走向全球化\n\n说电子商务是全球性事务是显而易见的，但为了达到字数要求，我还是得提一下。对于主题开发者来说，这意味着我们的工作需要开箱即用，支持不同的地区、语言和货币。\n\
  \n#### i18n 与 l16n 的区别\n\n你知道我花了多久才意识到 “i18n” 是国际化（internationalization）的缩写（严格来说是数字缩写词）吗？好吧，我不告诉你确切时间，因为太尴尬了。简而言之，在我开始深入研究如何让非英语母语者也能使用我正在构建的软件和网站之前，我已经从事专业软件开发工作一段时间了。\n\
  \n那么，快速回顾一下：\n\n- `i18n` 是国际化（internationalization）的简写（中间有 18 个被省略的字母，因此得名），指的是使软件（包括网站）能够支持多种区域设置的过程。\n\
  - `l16n` 是本地化（localization）的简写，指的是在软件产品中为支持 `i18n` 而实际实现某个区域设置的过程。\n\n为了清晰起见，在 Shopify\
  \ 主题的上下文中：\n\n- `i18n` 是使用 `| t` 翻译过滤器使主题支持多种区域设置的过程。\n- `l16n` 是为主题创建特定语言翻译（例如瑞典语）的过程。\n\
  \n\n\n#### 区域设置，而非语言\n\n您可能注意到，我在本节中使用了“区域设置”而非“语言”这一术语。这是因为虽然语言可能是本地化中最重要的部分，但它并非全部。两个区域设置可能共用同一种语言，但它们可能使用不同的日期/时间格式、货币、数字格式、度量衡与温度体系，以及电话/地址格式。\n\
  \n本课程主要聚焦于语言和货币，但了解您所处理的区域设置之间其他这些潜在差异也很有益处。\n\n#### 为何本地化至关重要\n\n归根结底，如果无法为客户或消费者带来实际价值，讨论`i18n`便毫无意义。本节列出了店主可能希望拓展新区域、要求为其主题制作新本地化版本的一些原因。\n\
  \n##### 获取流量\n\n拥有本地化网站可以为店铺带来来自新地区的流量。Google 不仅会将网站内容和商品页面收录到本地化搜索索引中，而且客户更愿意分享来自他们社交网络所使用和理解语言的网站内容。\n\
  \n##### 转化率\n\n让客户在完成任务时需要思考，是扼杀转化率的可靠方式——而用第二或第三语言摸索如何进入结账流程，这本身就属于思考行为。即使客户具有较高的第二语言流利度（例如，北欧国家用户浏览英语店铺）时，情况也同样如此。\n\
  \n##### 上级要求\n\n在某些情况下，客户可能仅仅需要以多种语言提供店铺服务。这可能是法律义务（例如，政府机构需要同时以英语和法语提供服务和产品），或者仅仅是其组织内部其他部门的硬性要求。\n\
  \n##### 实证需求\n\n如果您对此仍存疑虑，我请您参考 Shopify 论坛上一个八年前的帖子，自远古以来，店主和主题设计师们一直在那里为 Shopify\
  \ 支持`i18n`而争论。³\n\n人们对`i18n`支持非常渴望！\n\n如果您打算销售自己的主题，而不是为客户开发主题，拥有可靠的`i18n`方案也是一个巨大的卖点。（如果您计划在\
  \ Shopify 官方主题商店销售主题，则这是强制性的。）\n\n展示您的主题能够适配多种语言，将让潜在购买者对您深思熟虑的能力充满信心——即使您没有针对他们计划使用的特定语言提供翻译。更进一步，将您主题的基础部分翻译成目标市场中的几种常见语言（例如，美国的西班牙语或加拿大的法语），也能使您的主题从众多主题中脱颖而出。\n\
  \n#### 要么不做，要么做好\n\n对于`i18n`而言，敷衍了事的尝试比不做更糟糕。将您的主题内容放入 Google 翻译，然后复制粘贴结果，这绝不会带来好结果。\n\
  \n想一想您在网上见过的那些翻译成您的母语却质量低劣的网站——您对它们的信任度有多高？您会从它们那里购物吗？\n\n拥有一个单一语言但做得好的主题，远比拥有三种明显由\
  \ Google 翻译“撰写”的语言要好得多。请让母语者提供翻译，无论是您认识且信任的人，还是使用值得信赖的翻译服务，或者暂时搁置`i18n`，直到您有资源妥善处理它。\n\
  \n这也是给正在考虑多语言支持的客户们的良好建议。\n\n#### Shopify 主题的局限性\n\n既然您已经认同整个`i18n`概念并渴望将其融入主题，请允许我稍稍泼点冷水。\n\
  \n不幸的是，在 Shopify 上进行国际化处理时，存在一些显著的限制。近年来，Shopify 开始着手解决这些问题（我们很快将使用的较新的`i18n`主题功能就是一个很好的例子），但了解仍然存在一些硬性限制非常重要。\n\
  \n这些限制包括：\n\n-   对于任何一个店铺，店主一次只能设置一个区域设置。\n-   对于任何一个 Shopify 店铺，店主一次只能设置一种结账货币。\n\
  \n这意味着，即使您在主题中投入精力支持多种区域设置，店主一次也只能选择一种区域设置向顾客展示。没有内置的方式可以让顾客选择语言，或根据访客的浏览器区域设置自动显示翻译。\n\
  \n同样，也没有办法让顾客使用店主在店铺后台所选货币以外的任何货币进行支付。\n\n虽然这些限制可能令人烦恼，但在本课程的剩余部分，我们将探讨在这些限制下我们能做些什么。我有意将对提供翻译功能的\
  \ Shopify 应用的任何讨论排除在外。了解这些应用是好事，但归根结底，安装自定义应用在大多数情况下超出了主题设计师的职责范围。\n\n#### 让主题可翻译\n\
  \n确保您的主题可翻译的过程非常简单——只需确保您 Liquid 文件中所有面向用户的文本内容都映射到“翻译键”，然后通过翻译过滤器 `| t` 处理即可。\n\
  \n作为一个实际例子，我们可以看看国际化之前（见清单 8-8）和之后（见清单 8-9）的结账链接在 Liquid 中的样子。\n\n```\n...\n\n立即结账\n\
  \n...\n清单 8-8\n国际化之前的结账链接\n```\n\n```\n...\n\n{{ 'cart.links.checkout_now_text'\
  \ | t }}\n\n...\n清单 8-9\n来自清单 8-8 的结账链接，已国际化\n```\n\n`cart.links.checkout_now_text`\
  \ 字符串是一个翻译键，用于标识当前区域设置文件中的特定部分。区域设置文件以 JSON 格式存储在主题的 `locales` 目录中，主题支持的每种语言都有一个对应的文件。\n\
  \n有关翻译键结构、区域设置文件命名约定以及一些更高级的翻译功能（如插值和复数形式）的完整说明，请参阅 Shopify 的详细翻译文档：[`https://help.shopify.com/themes/development/internationalizing`](https://help.shopify.com/themes/development/internationalizing)。\n\
  \n##### 别忘了 JavaScript！\n\n如果您的 JavaScript 文件生成面向用户的文本，如错误消息或闪存消息，您需要确保它们也是可翻译的。\n\
  \nJavaScript 文件中的翻译键应以 `_html` 结尾（这告诉 Shopify 不要转义其内容），并通过 `json` 过滤器处理，如清单 8-10\
  \ 所示。\n\n```\n// assets/alerts.js.liquid\nfunction outOfStockError() {\nalert({{\
  \ 'cart.messages.out_of_stock_message_html' | t | json }});\n}\n清单 8-10\nJavaScript\
  \ 中的翻译过滤器\n```\n\n\n\n#### 向顾客展示多种货币\n\n正如本节开头所述，店主在结账时只能选择一种货币。这对于面向国际客户的商店来说显然是个问题，但主题开发者可以通过在主题中构建多货币显示支持来一定程度上缓解这个问题。\n\
  \n这种方案不会影响结账时使用的货币，但它确实能让顾客清楚了解产品以其本国货币计算的具体价格。最常用方法的核心思路如下：\n\n1.  确保在 Liquid 文件中，任何显示价格信息的元素\
  \ HTML 都标有特殊的 `data-` 属性。\n2.  使用名为 `currencies.js`（由 Shopify 提供）的文件来获取当前外汇汇率列表。\n\
  3.  添加一个包含支持货币列表的下拉输入框，允许用户选择其首选货币。\n4.  当下拉选项更改时，查找所有带有特殊标记的元素，并使用汇率信息将其转换为指定货币。\n\
  5.  使用 cookie 存储用户的首选货币以备将来使用。\n\n在你的练习商店中实现此模式的具体代码，请参见本书的代码资源。如果你使用了这种技术，应确保向顾客说明：即使他们选择了不同的货币，结账时仍会以商店的默认货币进行收费。\n\
  \n### 本章小结\n\n本章讨论了 Shopify 主题（单次使用、多次使用和分发）的不同用例，以及每种用例可能用到的主题设置类型。我们涵盖了主题设置的实际实现，并讨论了确保设置易于商家使用的最佳实践。\n\
  \n最后，本章介绍了 Shopify 对国际化和翻译的内置支持。你学习了如何在 Liquid 模板中实现翻译，并了解了 Shopify 在此领域的一些局限性。\n\
  \n脚注 1  \n[`https://help.shopify.com/themes/development/theme-editor/settings-schema.`](https://help.shopify.com/themes/development/theme-editor/settings-schema.)\
  \  \n2  \n[`https://github.com/luciddesign/bootstrapify/wiki/Escaping-liquid-in-SASS`](https://github.com/luciddesign/bootstrapify/wiki/Escaping-liquid-in-SASS)\
  \  \n3  \n[`https://ecommerce.shopify.com/c/shopify-discussion/t/definitively-time-for-multi-language-support-19980`](https://ecommerce.shopify.com/c/shopify-discussion/t/definitively-time-for-multi-language-support-19980)\n\
  \n"
- "# SEO 与社交分享\n\n你见过希望网站流量减少的客户吗？\n\n反正我没见过。\n\n流量是任何在线商店的命脉，虽然其质量可能参差不齐，但就数量而言，通常越大越好。当然，困难的部分在于如何首先获得这些流量。\n\
  \n每天，Shopify 店主都在尝试数百种不同的营销渠道和策略，试图为他们的网站带来更多的付费客户。即使只覆盖这些策略的一小部分，也远远超出了本书的范畴。\n\
  \n相反，本章重点介绍作为 Shopify 主题开发者可以做的具体事情，以确保你的主题为寻求营销和发展品牌的商家提供最佳起点。本章涵盖了一份“页面内”最佳实践清单，讨论了向搜索引擎提供\
  \ Shopify 商店结构化信息的方法，并最后探讨了如何通过社交渠道促进商店内容的分享。\n\n### 搜索引擎优化（SEO）\n\n为网站带来高质量流量是一项棘手、令人困惑且耗时的工作——庞大、复杂且往往令人反感的搜索引擎优化（SEO）和在线营销行业正是依赖于此。该行业中普遍存在的错误信息和欺诈性商业行为，常常训练客户将“SEO”视为一个神奇的“黑箱”，他们在这一头投入资金，就能从另一头获得流量。\n\
  \n好消息是，随着搜索引擎变得越来越智能，对可疑做法和“投机取巧”的敏感度降低，那些做“正确事情”（例如为访客提供更好的体验）的网站得到了更好的回报。在我看来，这使得主题开发者在\
  \ SEO 方面的工作变得简单直接——在构建网站时遵循最佳实践，确保搜索引擎能够读取和理解你的页面，最重要的是，确保网站对与之交互的人类用户来说是可访问和可用的。\n\
  \n#### 站外优化与站内优化\n\n广义上讲，各种各样的 SEO 策略、技巧和技术可分为两大类：\n\n- **站内优化** 方法直接实现在网站的代码中，以帮助提高流量和点击率。站内方法的示例包括：确保页面具有合理的\
  \ HTML 结构，添加适当的元数据，以及确保网站快速加载。\n- **站外优化** 方法涵盖了你可能用来吸引别人访问你网站的所有其他方式：电子邮件营销、点击付费广告、社交分享，或者是在固特异飞艇侧面做广告。\n\
  \n当我们扮演 Shopify 主题开发者的角色时，我们关注的是站内优化这一类别，因为这是我们唯一能直接控制的。站外方法对商家的成功同样重要，但可能需要（也确实有）一整本书来阐述。如果你有兴趣了解更多，我强烈推荐\
  \ `Moz.com`，它提供了大量免费和付费的 SEO 资源。他们的材料不仅写得很好、详细、及时，而且诚实，没有在 SEO 领域其他地方能感受到的那种令人反感的东西。\n\
  \n本章及本书其他地方涵盖的主要站内优化方法有：\n\n- 语义化 HTML\n- 关键词与内容\n- 结构化数据\n- 性能（见第 10 章）\n- 布局与导航设计（见第\
  \ 4 章）\n\n#### 语义化 HTML\n\n这里的“语义”一词仅指“按照各种 HTML 标签的预期目的来使用它们”。这有助于搜索引擎（以及屏幕阅读器等辅助工具）理解页面上的信息，并向用户显示正确的信息。\n\
  \n- 标题标签（`<h1>`、`<h2>`、`<h3>` 等）应按重要性顺序使用，与页面最相关的文本内容应放在 `<h1>` 中，副标题放在 `<h2>` 中，依此类推。标题应少于\
  \ 70 个字符，并且每个页面应独一无二。\n- 使用 `<nav>`、`<main>` 和 `<article>` 等 HTML5 元素来帮助指示页面元素的作用。\n\
  - 确保每个页面都呈现一个唯一的元描述（位于网站 `<head>` 中的 `<meta name=\"description\">` 标签内的内容）。\n- 确保所有图片都定义了\
  \ `alt=\"图片描述\"` 属性，以便基于图片的搜索引擎能够索引它们，并针对相关搜索词进行显示。\n\nShopify 不会自动验证你主题的 HTML，因此请确保在质量保证过程中，使用\
  \ HTML 验证工具（例如 [`https://validator.w3.org`](https://validator.w3.org)）对主题中的关键页面进行验证。\n\
  \n#### 关键词与内容\n\n在互联网早期，搜索引擎很容易被“操纵”。某些短语的相关性是由特定单词出现的频率决定的，这意味着你会看到很多页面进行“关键词堆砌”，如图\
  \ 9-1 所示。\n\n![A437216_1_En_9_Fig1_HTML.jpg](img/A437216_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1  \n这帮家伙到底在哪？\n\n\n\n### 关键词分析\n\n幸运的是，搜索引擎如今已更为智能，关键词堆砌的策略不再奏效。但这并不意味着关键词分析与研究不再重要。搜索引擎并非读心术士，因此它们需要明确指示，了解哪些词语和短语与每个页面最相关。理解顾客在寻找商家产品时使用的词汇和短语，对于确定主题应在页面不同元素上给予何种优先级至关重要。请思考以下问题：\n\
  \n-   顾客在搜索时更倾向于使用品牌或供应商名称（例如 “耐克气垫” 而非 “气泵”）吗？\n-   顾客是否会使用标准化的部件或型号编号（例如 “MS2846728”）来搜索产品？\n\
  -   产品的变体（如尺寸或颜色）是产品的附属属性，还是决定性特征（例如 “苹果手表” 与 “金色苹果手表”）？\n\n### 重复内容\n\n电商商店常遇到的一个问题是“重复内容”。由于许多商店转售他人的产品，商家可能会被诱惑直接从供应商或竞争对手的网站复制粘贴产品描述。应强烈反对这种做法，因为搜索引擎会识别出来，并认为你的产品页面在搜索结果中的相关性低得多。\n\
  \n另一个 Shopify 网站特有的问题是，同一件产品可能出现在多个 URL 地址下（它出现在其“根 URL” `https://example.myshopify.com/products/product-name`，但也出现在\
  \ `https://example.myshopify.com/collections/widgets/product-name`、`https://example.myshopify.com/collections/under-50-dollars/product-name`，产品出现在每个集合中都会产生一个\
  \ URL）。\n\n幸运的是，缓解此问题只需确保你的主题布局在页面顶部包含一个规范 URL 引用，如下所示：\n\n`<link rel=\"canonical\"\
  \ href=\"{{ canonical_url }}\" />`\n\n### 结构化数据\n\n如果你花时间让你的网站易于人类使用，并遵循 HTML5 规范中的标准约定，那么搜索引擎和社交网络等自动化系统也能很好地理解你的页面。\n\
  \n然而，你还可以采取一些措施，让机器更容易理解你网站上的信息，并提示这些信息如何最有效地呈现给用户。\n\n方法之一是使用多种不同类型的结构化数据，这些数据以标准的、机器可读的格式提供信息。本章重点介绍与电商商店最相关的两种结构化数据类型：\n\
  \n-   `Schema.org` 标记，它允许谷歌及其他搜索引擎读取并展示价格、库存、评价和产品状况信息。它也用于一些商品库存源应用，例如 Google Shopping。\n\
  -   社交媒体标记，由 Facebook、Twitter 和 Pinterest 等社交网络使用，用于决定如何展示你网站上被分享的页面。\n\n#### Schema.org\
  \ 词汇表\n\n`Schema.org` 词汇表是一项开放的努力，旨在为描述网络上的“事物”提供一种标准化方式。它包括从 `TVSeason` 到 `RentalCarReservation`\
  \ 等广泛对象及其属性的层次化定义。与 Shopify 商店最相关的是，它允许指定网站上每个待售 `Product` 的信息（以及销售这些产品的 `Organization`\
  \ 信息和网站博客上可能出现的任何 `Article` 信息）。\n\n所有主流搜索引擎和许多其他自动化系统都能读取 `Schema.org` 标记，正是它驱动了你在各种搜索结果中肯定见过的“丰富”信息，如图\
  \ 9-2 所示。\n\n![A437216_1_En_9_Fig2_HTML.jpg](img/A437216_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2 谷歌搜索结果中的产品“丰富摘要”。亚马逊的结果不仅包含价格和库存信息，还包含汇总评价信息。\n\n#### 微数据\n\n历史上，`Schema.org`\
  \ 标记是通过一种称为微数据（Microdata）的系统提供的。这需要在网站的 HTML 元素中添加与相关数据对应的特殊属性和属性。要了解此过程的工作原理，请比较清单\
  \ 9-1（无微数据标记）和清单 9-2（有微数据标记）。\n\n```\n{{ product.title | escape }}\n{{ product.price\
  \ | money }}\n{{ product.description }}\n\n{% for image in product.images %}\n\n\
  {% endfor %}\n\n清单 9-1\n无微数据标记的产品 Liquid 模板示例\n```\n\n```\n{{ product.title | escape\
  \ }}\n\n{{ product.price | money }}\n\n{{ product.description }}\n\n{% for image\
  \ in product.images %}\n\n{% endfor %}\n\n清单 9-2\n添加微数据标记后的同一产品 Liquid 模板示例\n```\n\
  \n虽然微数据得到广泛支持，但它给 Web 开发者带来了一些问题。在现有的 HTML 标记中到处添加这些额外属性，增加了源代码的视觉复杂性。Shopify 开发者可能要将单个产品实体的微数据标记分散到多个模板和\
  \ Liquid 代码片段中，这使得跟踪和维护变得困难。\n\n除此之外，添加微数据还强制将页面 HTML 结构与相关的 `Schema.org` 数据模型紧密耦合，降低了灵活性，并常常迫使开发者为了迎合\
  \ `Schema.org` 的嵌套结构而在页面中添加无意义的 HTML 元素。\n\n\n\n##### 进入 JSON-LD\n\nMicrodata 的局限性现已通过\
  \ JSON-LD（用于链接数据的 JSON，[`http://json-ld.org`](http://json-ld.org)）得到解决。\n\nJSON-LD\
  \ 将实体的信息与其 HTML 表示解耦，并允许在 HTML 页面的单个位置指定该信息，这使其成为 Shopify 主题提供 `Schema.org` 结构化数据的推荐方式。它作为\
  \ `<script>` 标签内的简单 JSON 对象添加到页面中，如清单 9-3 所示。\n\n```json\n{\n\"@context\": \"http://json-ld.org/contexts/person.jsonld\"\
  ,\n\"@id\": \"http://dbpedia.org/resource/John_Lennon\",\n\"name\": \"John Lennon\"\
  ,\n\"born\": \"1940-9-09\",\n\"spouse\": \"http://dbpedia.org/resource/Cynthia_Lennon\"\
  \n}\n```\n*清单 9-3 简单的 JSON-LD 示例*\n\n对于 Shopify 主题，我通常的做法是创建一个单独的 `json-ld.liquid`\
  \ 代码片段，其中包含条件逻辑，以便为当前页面显示适当的结构化数据，并将其包含在主题布局文件的 `<head>` 中。\n\n由于篇幅限制，此处略去了 Liquid\
  \ JSON-LD 示例，但我在大多数主题中使用的完整代码片段可在本书的可下载资源中找到。请查找 `code/snippets/json-ld.liquid`\
  \ 文件。它不仅包含了 JSON-LD 产品标记的良好起点，还包含了商店实体本身以及任何博客文章的标记。\n\n**提示：** 尽管 Shopify 使许多您希望使用\
  \ JSON-LD 标记的产品信息（如标题、价格和库存信息）在 Liquid 模板中可用，但某些属性（如商品状况或制造商 URL）在 Shopify 管理后台中没有对应的字段，因此无法以标准化方式获取。\n\
  \n如果您希望在 Shopify 商店中包含此信息，好的方法是使用产品和变体元字段来存储该信息，并使其可用于您的 JSON-LD Liquid 代码片段（有关元字段使用的详细信息，请参阅第\
  \ 5 章）。资源中提供的 JSON-LD 示例代码片段包含了对此的演示。\n\n关于 JSON-LD 最后要注意的一点是，某些类型的 `Schema.org`\
  \ 信息尚不支持。其中一个例子是 `Breadcrumb` 实体，它通常出现在网站导航栏的 HTML 中。如果您希望结构化数据机器人理解这些导航提示，则必须使用\
  \ Microdata 方法，并将这些属性直接添加到相关的 HTML 元素中。这可以与页面上的 JSON-LD 结合使用，因此您只需标记不受支持的元素即可。\n\
  \n### 社交分享\n\n除了 Microdata，还有其他几种标记模式可用于为特定网站（尤其是社交媒体平台）提供更多信息。这里涵盖的两个主要模式是开放图谱协议（由\
  \ Facebook 开发和使用，现在被 Pinterest 用于其 Rich Pins 功能）和 Twitter 卡片标记。\n\n添加对这些标记模式的支持的好处是，这些及其他社交网络可以更多地了解商店的产品和页面，从而带来“更丰富”的分享体验。\n\
  \n#### 开放图谱标记\n\n开放图谱标记只是一系列添加到主题 `<head>` 部分的 `<meta>` 标签。通过这些标签添加的信息被 Facebook\
  \ 用于在页面被分享时生成图片和描述。\n\n这些标签也被 Pinterest 的 Rich Pins 功能使用，该功能提供价格和库存信息，以便用户可以直接从\
  \ Pinterest 购买 Shopify 商店的产品。\n\n##### 添加开放图谱标记\n\n对于 Shopify 主题，我们主要关注将开放图谱信息添加到我们的产品页面和（如果我们有博客）文章页面。这些是我们希望确保\
  \ Facebook 和 Pinterest 能够从中提取大量信息的页面。\n\n与 JSON-LD 标记一样，我通常使用 Liquid 代码片段来处理开放图谱标记，然后将该代码片段包含在布局文件的\
  \ `<head>` 部分，类似于清单 9-4 和 9-5。在清单 9-4 中，请注意 `<html>` 元素上的 `prefix` 属性，该属性用于指示我们正在使用开放图谱模式。为简洁起见，我在清单\
  \ 9-5 的逻辑块中省略了文章模板的开放图谱标记。资源部分随课程捆绑的文件包含该部分的完整代码。\n\n```html\n<!-- ... 标签，样式表包含\
  \ ... -->\n{% include 'head-open-graph' %}\n```\n*清单 9-4 示例 layout/theme.liquid*\n\
  \n```html\n{% if template contains 'product' %}\n  {% for image in product.images\
  \ limit:6 %}\n    <meta property=\"og:image\" content=\"{{ image.src | img_url:\
  \ 'grande' }}\" />\n  {% endfor %}\n  {% if product.compare_at_price_max %}\n  \
  \  <meta property=\"og:price:amount\" content=\"{{ product.price | money_without_currency\
  \ }}\" />\n    <meta property=\"og:price:currency\" content=\"{{ shop.currency }}\"\
  \ />\n  {% endif %}\n{% elsif template contains 'article' %}\n  <!-- Article template\
  \ Open Graph markup -->\n{% endif %}\n```\n*清单 9-5 示例 snippets/open-graph.liquid\
  \ 代码*\n\n##### 测试开放图谱标记\n\n使用 Facebook 的开放图谱调试工具（[`https://developers.facebook.com/tools/debug`](https://developers.facebook.com/tools/debug)）可以轻松检查您的开放图谱标记是否正常工作。您只需输入要测试的页面的\
  \ URL，然后点击调试按钮，即可获取关于 Facebook 能够提取哪些信息的报告。\n\n**注意：** 如果您正在开发的商店受密码保护，开放图谱调试工具将无法工作！这是因为\
  \ Facebook 需要能够请求页面以读取您的开放图谱标记。\n\n当您在 Facebook 或 Pinterest 上启动分享过程时，检查一下显示效果也是值得的，如图\
  \ 9-3 所示。\n\n![A437216_1_En_9_Fig3_HTML.jpg](img/A437216_1_En_9_Fig3_HTML.jpg)\n\
  *图 9-3 从开放图谱标签中正确提取了图片和描述*\n\n进行此最终测试将让您确切了解当您的产品或文章被分享时其他人会看到什么，包括图片的检索和裁剪方式，以及任何被截断的文本信息。\n\
  \n务必注意，Facebook 经常缓存开放图谱信息。因此，如果您看到错误或过时的数据，请使用调试工具获取相关 URL，然后点击“获取新的抓取信息”按钮强制刷新。\n\
  \n#### 推特卡片标记\n\n推特卡片标记提供与开放图谱标记类似的功能，它允许 Twitter 在共享商店页面时显示“更丰富”的信息。添加标记本身的过程与开放图谱数据的处理几乎完全相同，只是多了几个测试和验证结果的步骤。\n\
  \n**注意：** 需要 Twitter 账户才能为您的 Shopify 主题添加 Twitter 卡片支持。\n\n##### 添加推特卡片标记\n\n首先，我们需要添加所需的标记，与开放图谱标记一样，它采用\
  \ `<head>` 内一系列 `<meta>` 标签的形式。同样，我倾向于使用 Liquid 代码片段来保持我的 Twitter 卡片标记独立，如清单 9-6\
  \ 和 9-7 所示。同样，为简洁起见，清单 9-7 中处理文章模板的代码已被省略，可在本书的资源部分查看完整内容。\n\n```html\n<!-- ...\
  \ Tags, stylesheet includes ... -->\n{% include 'head-open-graph' %}\n{% include\
  \ 'head-twitter-cards' %}\n```\n*清单 9-6 示例 layout/theme.liquid，包含了 Twitter 卡片标记代码片段*\n\
  \n```html\n{% if template contains 'product' %}\n  <meta name=\"twitter:card\" content=\"\
  product\" />\n  <meta name=\"twitter:title\" content=\"{{ product.title }}\" />\n\
  \  <meta name=\"twitter:description\" content=\"{{ product.description | strip_html\
  \ | truncate: 200 }}\" />\n  {% if product.vendor == blank %}\n    <meta name=\"\
  twitter:label1\" content=\"Price\" />\n    <meta name=\"twitter:data1\" content=\"\
  {{ product.price | money_without_currency }}\" />\n  {% else %}\n    <meta name=\"\
  twitter:label1\" content=\"Vendor\" />\n    <meta name=\"twitter:data1\" content=\"\
  {{ product.vendor }}\" />\n  {% endif %}\n{% elsif template contains 'article' %}\n\
  \  <!-- Article template Twitter Card markup -->\n{% endif %}\n```\n*清单 9-7 示例 snippets/twitter-card.liquid*\n\
  \n\n\n##### 验证 Twitter 卡片标记\n\n与 `Open Graph` 标记不同，你需要“验证”新的标记后，`Twitter` 才会使用它。\n\
  \n为此，请直接访问 Twitter 的卡片验证器 [`https://cards-dev.twitter.com/validator`](https://cards-dev.twitter.com/validator)（你需要登录\
  \ `Twitter`）。在 `Card Catalog` 中选择 `Product`，接着选择 `Validate & Apply` 选项卡，并输入你网站上任意商品页面的\
  \ `URL`。\n\n点击 `Go`，你应能看到确认信息，表明你的卡片标记已通过验证，同时还会显示预览效果，展示当有人从你的主题分享商品时的呈现样式，如图 9-4\
  \ 所示。\n\n![A437216_1_En_9_Fig4_HTML.jpg](img/A437216_1_En_9_Fig4_HTML.jpg)\n\n图\
  \ 9-4 Twitter 卡片验证器会根据提取的数据显示预览\n\n#### 重视分享\n\n一旦你花费精力设置好这些标记，你就应充分利用它，鼓励访问你网站的访客分享你的商品和内容页面。\n\
  \n##### 决定支持哪些分享选项\n\n首先，你需要认识到，“多多益善”这句口号并不适用于分享小部件。相反，网站若专注于少数几个关键社交网络，而非在商品页面上堆砌大量图标，通常能获得更好的社交流量（见图\
  \ 9-5）。\n\n![A437216_1_En_9_Fig5_HTML.jpg](img/A437216_1_En_9_Fig5_HTML.jpg)\n\n\
  图 9-5 像这样散弹枪式的分享方式很少有效，用户参与度也不高\n\n用户很容易被过多的选择压垮，因此简化选择（比如“我该分享到 `Facebook` 还是 `Twitter`？”）能提高他们采取其中一项操作的可能性，而不是彻底放弃。将重点放在两三个网络上，也能让店主在运营店铺时更容易管理这些网络并与用户互动，而不会因为精力分散而力不从心。\n\
  \n如果你是在为特定客户工作，与他们进行沟通将有助于你们共同确定哪些网络对其最有益。¹ 根据具体情况，更多小众或针对特定地理位置的平台也可能很重要。\n\n如果你是在构建一个供多家店铺使用的主题，那么你应该添加对所有主流社交网络的支持，并允许店主在主题设置页面中开启或关闭它们（请参考第\
  \ 8 章关于主题设置定制的内容）。\n\n无论你选择专注于哪些网络，我强烈建议你为用户提供一种通过邮件分享页面的简便方式。虽然并非所有人都习惯你使用的社交网络，但电子邮件无所不在，并且是与特定个人分享商品最常用的方式。添加邮件分享支持非常简单，只需添加一个\
  \ `mailto:` 链接，设置空白收件人、简短的预设主题和正文，让用户通过自己的邮件客户端发送消息即可。\n\n##### 整合分享功能\n\n所有主流社交网络都允许你非常轻松地整合分享按钮，通常只需一小段\
  \ JavaScript 代码片段。然而，使用这些默认按钮存在两个主要问题：\n\n-   它们很可能与你主题的设计美学不匹配\n-   它们往往会带来性能开销，可能拖慢你的网站\n\
  \n第一个问题在于，如果按钮与页面其他部分不匹配，最终可能会分散用户对页面主要内容的注意力。第二个问题是可用性问题，尤其是在移动设备上，添加四五个脚本（这些脚本又通常会加载额外的脚本）会严重影响性能。\n\
  \n幸运的是，这两个问题的解决方案都非常简单！所有社交网络都允许用户通过简单的 `<a href=\"\">` 链接触发分享操作，你当然可以随意设计它的样式（图\
  \ 9-6 展示了在 Shopify 的 `Pop` 主题中如何实现这一点）。\n\n![A437216_1_En_9_Fig6_HTML.jpg](img/A437216_1_En_9_Fig6_HTML.jpg)\n\
  \n图 9-6 `Pop` 主题中的分享触发器被重新设计为与美学风格匹配的简单链接\n\n为不同社交网络构建 `href` 属性所需的 `URL` 可能会有点棘手。以下是一个例子，展示我如何在\
  \ `Liquid` 中为 `Twitter` 分享链接实现这一点：\n\n```\nTweet this!\n```\n\nTwitter 的用例相当简单，因为它只要求我们传递文本和\
  \ `URL` 参数。像 `LinkedIn` 这样的网络则需要更多参数。\n\n本书附带资源中的 `code/snippets/social-share.liquid`\
  \ 示例包含一个处理多个社交网络分享链接的模式，并且能够根据所使用的页面类型（商品、文章或内容页面）进行适配，欢迎你在自己的主题中复用。\n\n#### 练习：SEO\
  \ 与社交分享\n\n按照本章各节的内容，逐一检查你的练习主题，确保其符合 `SEO` 最佳实践，并已为社交分享做好配置。\n\n你应检查的一些事项包括：\n\n\
  -   每个页面都包含一个 `<h1>` 标题和一个 `meta` 描述。\n-   你的 `theme.liquid` 使用 `Liquid` 的 `{{ canonical_url\
  \ }}` 标签为每个页面定义了规范 `URL`。\n-   所有图片都定义了合适的 `alt` 属性。\n-   在首页、商品页面和文章页面上，通过 `Microdata`\
  \ 或 `JSON-LD` 提供了 `Schema.org` 标记。\n-   商品和文章页面定义了 `Open Graph` 和 `Twitter Card`\
  \ 标记。\n-   商品可通过页面内链接轻松分享。\n\n你可以随意使用可下载资源中提供的 `JSON-LD`、`Open Graph`、`Twitter Card`\
  \ 和 `Social Sharing` 代码片段来实现这些功能。但请务必花几分钟浏览一下代码，以确保你清楚每个片段的作用。\n\n### 总结\n\n本章讨论了页面内\
  \ `SEO` 与页面外 `SEO` 的区别。随后，重点介绍了在主题中改进页面内 `SEO` 的技术，因为这些元素通常是我们作为设计师和开发者最能控制的。\n\n\
  本章还探讨了如何帮助客户从主题中分享内容，并研究了你的主题支持哪些分享机制才有意义。\n\n### 脚注\n\n[1] Kevan Lee 发表的一篇名为“如何为你的企业选择合适的社交网络”的精彩博文为此提供了极佳的指导：[`https://blog.bufferapp.com/how-to-choose-a-social-network`](https://blog.bufferapp.com/how-to-choose-a-social-network)。\n\
  \n"
- "# 10. 性能\n\n本章解释了主题性能——为什么它很重要，如何衡量它，以及如何改进它。讨论了我们可以用来减少初始加载时间和提高 `Shopify` 商店界面感知响应速度的技术。\n\
  \n虽然从主题设计的第一天就开始考虑这些想法会大有裨益，但这里讨论的技术对于那些需要精简优化的现有主题同样有用。\n\n\n\n### 为什么性能很重要\n\n\
  早在遥远的网页古早时代（2009 年），必应的 Eric Schurman 和谷歌的 Jake Brutlag 进行了一系列实验，观察用户对服务器响应时间受控增加的反应。¹\n\
  \n结果令人信服：以谷歌为例，增加不到半秒的延迟导致用户参与度下降 0.6%。必应则更进一步，让测试用户经历了整整两秒的延迟，结果参与度（和每用户收入）下降了超过\
  \ 4%。他们的结论是，“速度很重要”并非空谈，而且“不到半秒的延迟就会影响业务指标”。\n\n这种性能影响并不仅仅局限于实验室实验：\n\n*   Mozilla\
  \ 将页面加载时间缩短了 2.2 秒，下载量增加了 15.4%。\n*   巴拉克·奥巴马的竞选团队将网站速度提升了 60%，捐款额增加了 14%。\n\n在当今的电子商务背景下，我认为网站性能比以往任何时候都更加重要。随着越来越多的企业转向网络，消费者在网上花钱的地方有了更多选择，他们对欠佳购物体验的耐心也越来越低。\n\
  \n> 消费者期待更快的网络。企业因更快的网络而成功。— Steve Souders，“我们现在有多快？”²\n\n人们很容易通过指出设备性能越来越强大、互联网连接提供的带宽越来越高来忽视这类性能问题。我认为这是一种危险的想法，原因如下：\n\
  \n*   自 2014 年以来，Shopify 商店的大部分流量来自移动设备，这些设备的处理能力不那么普遍，且 3G（或更慢）的连接也不稳定。\n*   在发展中市场，电子商务增长迅速，这些市场对在线销售的需求很高，但互联网连接常常滞后。\n\
  *   即使在发达国家，在网络连接不佳的情况下进行网购也很常见（我现在就在一家瑞典咖啡馆里写这句话，这里的 WiFi 相当差劲）。\n*   随着物联网的兴起，客户可能用来加载你网站的、能够联网但功耗低的设备（比如电视或冰箱）数量正在增加。\n\
  \n此外，最初我们若将自身对 Shopify 主题性能的责任推卸掉，很容易让我们的工作像滚雪球一样，变成臃肿的怪物网站。\n\n### 为什么性能会被忽视\n\n\
  如果你为客户做转化率优化，并且提升了 1%，那将是一个巨大的成功。你会打开香槟庆祝，并讨论你将为他们赚到的数万美元该如何使用（希望能给你一笔奖金，但那只是美好愿望）。\n\
  \n那么，考虑到一个性能不佳的网站对转化的负面影响可能远超 1%，你会以为性能优化是主题开发者的首要任务之一，对吧？\n\n并非如此。\n\n虽然一些在 Shopify\
  \ 上运行的网站确实重视性能，但绝大多数网站都严重未经优化——它们拥有巨大的图片、大量的 HTTP 请求以及结构不佳的页面。\n\n当我开始为自己的 Shopify\
  \ 主题框架工作时，我对 Shopify 主题商店中的现有主题进行了一次“性能汇总”。结果相当糟糕——商店中的平均主题在页面加载时加载了 2MB 的资源，并产生了\
  \ 58 个 HTTP 请求。\n\n我对此有自己的一套理论：客户看不到性能，所以他们不会将其作为优先事项来付费。\n\n与所有那些漂亮的图片或时髦的 JavaScript\
  \ 功能不同，客户无法“看到”他们网站的速度。当一个页面需要十秒钟才能加载时，他们可能会感到有点不对劲，但即便如此，他们也是以店主的心态（而非潜在客户的心态）来审视自己的网站。他们很少会想到，如果加载的不是他们自己的网站，他们五秒钟前就会关闭标签页，然后转向谷歌搜索结果中的下一个链接。\n\
  \n设计师和开发者也不能免于此问题。当我们坐在高速桌面连接上，在本地开发且浏览器缓存中已填充内容时，许多性能问题会被忽略。就像客户一样，当页面加载时，我们的心思也不在性能上——我们在寻找对齐问题，检查颜色是否匹配，以及新的灯箱效果是否按预期工作。\n\
  \n当这些因素结合在一起时，作为主题创建者，很容易让性能问题变成低优先级事项。\n\n在构建用于广泛销售的主题时（例如，在 Shopify 主题商店中），情况尤其如此。主题商店列表中没有“按性能排序”的选项——能卖出你主题的是大型光鲜图片和流畅的\
  \ CSS 动画。\n\n### 性能分析与指标\n\n那么，假设你想成为一位开明且重视性能的主题创建者，你的第一步是什么？\n\n和许多事情一样，提高性能的第一步是了解你当前的状况（“你无法管理你无法衡量的东西”，诸如此类）。因此，接下来的几个部分将介绍几种有助于此的不同工具。\n\
  \n#### 性能测量工具\n\n我将在这里介绍三种工具，但你无需花太多时间纠结哪个“最好”。大多数性能工具都会涵盖一组相似的指标——关键是在优化工作之前和之后都使用某个工具，这样你就能评估你的更改是否产生了效果。\n\
  \n##### PageSpeed 见解（PageSpeed Insights）\n\n谷歌的 PageSpeed 工具可能是最常用的性能分析工具。通过在线工具运行\
  \ PageSpeed 测试，将显示你的主题存在的性能问题明细，以及需要优先处理的事项列表（见图 10-1）。\n\n![A437216_1_En_10_Fig1_HTML.jpg](img/A437216_1_En_10_Fig1_HTML.jpg)\n\
  \n*图 10-1 — 在线 PageSpeed Insights 工具。看来这个主题还有改进空间！*\n\n##### 雅虎 YSlow\n\n如果你在理念上反对谷歌，或者只是想尝试点不同的东西，YSlow\
  \ 是一个适用于 Safari 和 Firefox 的浏览器插件，提供与 PageSpeed 类似的分析功能（见图 10-2）。\n\n![A437216_1_En_10_Fig2_HTML.jpg](img/A437216_1_En_10_Fig2_HTML.jpg)\n\
  \n*图 10-2 — Safari 中的 YSlow 报告*\n\n\n\n##### WebPageTest.org\n\n这是我最喜欢的性能测试工具，没有之一。与之前的方案不同，它并非浏览器插件——你只需访问\
  \ [`http://www.webpagetest.org`](http://www.webpagetest.org) 并输入待测页面的 URL 即可。\n\n\
  如图 10-3 所示，这是一款比 `PageSpeed` 或 `YSlow` 强大得多的工具，允许你在运行测试时指定大量变量（浏览器、地理位置、连接类型与速度、用户代理字符串……不胜枚举）。它还支持将测试过程录制成视频、模拟页面加载过程中特定域名失效的情况，并为你提供详尽的页面加载“瀑布流”时间线。\n\
  \n![A437216_1_En_10_Fig3_HTML.jpg](img/A437216_1_En_10_Fig3_HTML.jpg)  \n图 10-3\
  \  \n`WebPageTest.org` 或许不是外观最漂亮的工具，但它提供了大量实用细节。\n\n另一个出色的附加功能是网站的“成本分析”，它能根据移动用户所在国家的平均移动数据资费，估算出用户加载你的网站需要支付多少费用。这对于那些身处数据流量和\
  \ Wi-Fi 资源丰富国家的人来说，是一个很好的提醒。\n\n`WebPageTest.org` 是本文提及的唯一一个能分析网站 `SpeedIndex`³\
  \ 的工具，该指标用于衡量页面可见部分呈现给用户的速度（通常这比整体页面加载时间重要得多）。\n\n##### 该用哪个工具？\n\n除非你非常渴望深入性能优化的细枝末节，否则我建议暂时坚持使用\
  \ `PageSpeed Insights` 和 `YSlow` 提供的更简单报告和分析。它们能帮你找出主题中 90% 的性能问题，并指出哪些优化能带来最大收益。\n\
  \n一旦你处理完了这些“低垂的果实”，再转向 `WebPageTest` 的详细报告，它会帮你识别出那些“百分之一”的细节问题。对于销量庞大的网站，投入时间优化这些问题往往物有所值。\n\
  \n如果你想将性能测试整合到开发工作流中，可以看看 `grunt-perfbudget` 这个 Grunt 插件。⁴ 它由 Tim Kadlec 编写，他在他的博客上（[`https://timkadlec.com`](https://timkadlec.com)）提供了大量关于为网站设定“性能预算”的资料。\n\
  \n#### 主题性能指标\n\n能够获取所有这些性能信息当然很好，但问题是：我们该如何利用它们？首先，最好清楚哪些事情需要担心，哪些可以安全地忽略。\n\n\
  对于 Shopify 主题而言，任何需要服务器或 CDN 配置的性能优化都不在你的掌控范围内。幸运的是，Shopify 在这方面做得相当不错，因此我们通常不必为此操心，而可以专注于我们力所能及的事情。\n\
  \n在接下来的章节里，我会列出在尝试优化 Shopify 主题时关注的关键指标，以及我用来改进这些指标的技术列表。对于经验丰富的 Web 开发者来说，其中许多技术都很熟悉（毕竟，Shopify\
  \ 主题归根结底只是 HTML、CSS 和 JavaScript），但有些技术在概念或实现上是 Shopify 特有的。\n\n本章的最后部分将详细阐述这些技术，并逐步讲解如何实施它们。\n\
  \n##### 关键指标 1：页面重量\n\n页面重量指的是将你的网站显示在浏览器中需要传输的字节数。你需要关注两个数字：页面首次加载时（浏览器缓存任何内容之前）传输的字节数，以及缓存后传输的字节数。\n\
  \n即使你的网站图片很多，你也应该能够用几百 KB 甚至更少的字节，向顾客呈现一个可用的页面。利用本课程中描述的一些技术，你可以做到这一点，然后根据需要稍后加载更大的资源（例如高分辨率图片）。\n\
  \n侧重于减少页面权重的优化技术包括：\n\n*   图片优化\n*   资源压缩\n*   懒加载\n*   页面精简\n\n##### 关键指标 2：HTTP\
  \ 请求次数\n\n浏览器为获取一个资源而发起的每一次 HTTP 请求，都需要浏览器与服务器之间进行一次往返，并伴随由此产生的所有开销。\n\n专注于提高页面请求效率的方法有：\n\
  \n*   资源合并\n*   无 Cookie 的 CDN 域名（由 Shopify 处理）\n*   CDN 主机名分发（不由 Shopify 处理，但如果我们仍想利用\
  \ Shopify 全面的 CDN，我们能做的也有限）\n*   智能资源加载\n*   页面精简\n\n##### 关键指标 3：加载时间\n\n“加载时间”这个术语有点不精确，因为在\
  \ Web 性能的上下文中，“加载”可以指代几种不同的情况。它可能意味着：\n\n*   浏览器加载初始 HTML 并开始渲染页面所花费的时间（“渲染时间”）\n\
  *   浏览器在视觉上向用户呈现页面所花费的时间（“视觉完成时间”）\n*   整个页面（包括所有资源）加载、渲染和执行所花费的时间（“加载时间”）\n\n从用户体验的角度来看，“视觉完成时间”是最重要的解释，因为它能让网站感觉“更快”。不幸的是，它也是最难以通过自动化工具衡量的（尽管\
  \ `SpeedIndex`——这个由 Google 开发并在 `WebPageTest.org` 的报告中得到详尽分析的指标——在这方面做得相当不错）。\n\n\
  好消息是，针对所有类型页面加载的优化技术存在一些重叠，因此，你为优化初始渲染时间所做的努力也将有助于改善其他指标。在某些情况下，你可能希望优先考虑某一种加载时间——这最常见于那些试图尽快让页面达到初始“视觉完成”阶段，然后再完成额外资源加载的技术中。\n\
  \n一个例子是使用渐进式 JPEG。它会先渲染一个低质量的“首遍”图像，随后随着页面继续加载，该图像会被更高质量的版本替换。其效果是，用户感觉页面加载速度快得多，即使传输给用户的字节总数增加了，因为我们需要发送多个不同质量级别的图像版本的数据。\n\
  \n### 性能优化技术\n\n在确定了我们认为最重要的指标之后，现在我们来谈谈本章的核心内容：作为主题开发者，你实际上可以做些什么来改善这些数字。\n\n\n\
  \n#### 技巧一：简化页面\n\n有句老话说得好，“少即是多”。在网页性能方面，这句话同样适用。你的主题中“少”的东西越多——越少的图片、请求和页面元素——你的页面加载和显示的速度就越快。\n\
  \n听起来合情合理且直截了当，对吧？我同意，但这一点似乎从未被纳入互联网上那些“加速网站并改善你生活的五种方法”之类的列表中。\n\n它缺席的原因，或许在于它并不总是一个容易的、“立竿见影”的办法。与我们稍后要探讨的一些技巧不同，花时间审视自己的心血之作并从中剔除冗余，既耗时又需要情感上的勇气。但是，就像写出好文章一样，制作高性能的\
  \ Shopify 主题需要*无情的编辑*。\n\n这个技巧的妙处在于，除了性能提升之外，你还能获得一些附带好处。就像编辑文字能让读者更易理解一样，编辑你的 Shopify\
  \ 主题也能让你的客户看得更清晰、用得更顺手，同时还能因减轻维护负担而改善你作为开发者的生活。这真是三赢！\n\n如果你想找一些关于如何“精简”你的 Shopify\
  \ 主题的灵感，这里有一些思路：\n\n*   重构 CSS：在一个网站的开发过程中，很容易在 CSS 文件中积累技术债务。重构并简化你的 CSS 不仅能减少样式表的大小，还能让网站更易于维护，并为访客提供一致的用户体验。\n\
  *   干掉轮播图：轮播图不仅用户体验糟糕，而且通常会加载大量高分辨率图片。为了你的用户和网站性能着想，请用一个（经过优化的）单张图片来替换轮播图。\n*  \
  \ 用 CSS 替换背景图片：如今的 CSS 功能已经非常强大。如果你还在使用平铺图片作为背景，不妨考虑用 CSS 背景来替代。你会惊讶于 CSS 能做到的事情。\n\
  \n#### 技巧二：图片优化\n\n这几乎是每一篇关于页面加载优化的文章都会首先提到的内容。这并非巧合——图片占用了大多数网站体量中的最大比例，而你只需付出很少的努力就能获得巨大的收益。\n\
  \n##### 图片优化基础\n\n这里有一个在不到 50 秒内精简主题的超级简单方法：\n\n1.  从 [`imageoptim.com`](https://imageoptim.com)\
  \ 下载 `ImageOptim` 并打开它。\n2.  将你主题的 `assets` 文件夹拖拽到该应用程序中。\n3.  等待看看你节省了多少空间（见图 10-4）。\n\
  \n   ![A437216_1_En_10_Fig4_HTML.jpg](img/A437216_1_En_10_Fig4_HTML.jpg)\n\n   **图\
  \ 10-4** ImageOptim 正在工作\n\n就这么简单！\n\n当我撰写本书时，为了截图，我把自己正在开发的一个主题的 `assets` 文件夹通过\
  \ `ImageOptim` 跑了一遍。我之前已经用 `ImageOptim` 处理过这个主题了，但仅仅五秒钟的工作，我仍然节省了 200KB 的页面体积。还不错！\n\
  \n另一个值得一试的工具是 `JPEGMini` ([`www.jpegmini.com`](http://www.jpegmini.com))。与 `ImageOptim`\
  \ 不同，它只处理 JPEG 图片（可能你也猜到了），但它应用了一些更高级的算法，可以进一步压缩这些文件。对于那些不是 Mac 用户的读者（抱歉，我很少走出自己的“舒适圈”），`Kraken`\
  \ ([`kraken.io`](https://kraken.io)) 是一个很棒的替代方案。\n\n##### 自动化图片优化\n\n一旦你亲眼见证了图片优化的好处，你很可能就希望一直使用它。这时，像第\
  \ 2 章中描述的那样使用基于 Grunt 的工作流就派上用场了。\n\n使用像 `grunt-contrib-imagemin`（它使用了与 `ImageOptim`\
  \ 程序相同的库构建）这样的 Grunt 插件，我们可以让 Grunt 在我们部署主题时自动优化所有图片。你可以回顾第 2 章中的示例，了解如何实现这一点。\n\
  \n##### 有损图片优化——突破极限\n\n上述这些优化方法都是“无损”的——也就是说，它们在不降低图像质量的前提下减小文件大小。这听起来很合理，但通常我们可以通过牺牲一些微小的画质，来实现相当惊人的文件大小缩减——而这些画质损失中的一部分，最终用户根本看不出来。\n\
  \n我们先以 JPEG 图片为例。\n\n如果你熟悉 Photoshop 的“存储为 Web 所用格式”功能，你就会知道可以选择最终图片的质量。默认情况下，这个值为\
  \ 60——但事实上，你通常可以将这个质量设置降低到低至 25，而最终效果也不至于变得“一团糟”。如果你处理的是用于高分辨率显示器的 `@2x` 或 `@3x`\
  \ 图片，情况尤其如此。\n\n如果你不相信我，可以看看 [`retinafy.me/examples/jpeg-scaling.html`](https://retinafy.me/examples/jpeg-scaling.html)\
  \ 上来自 Thomas Fuchs 的精彩著作 *Retinafy Me* 中的缩放示例，该书以大量有用的细节详细介绍了创建高分辨率图像的过程。\n\n我们也可以对\
  \ PNG 图片进行有损优化，这要归功于一个名为 `ImageAlpha` 的工具（由与 `ImageOptim` 同一个出色的团队开发，可在 [`pngmini.com`](https://pngmini.com)\
  \ 获取）。\n\n与 `ImageOptim` 类似，`ImageAlpha` 允许你将特定 PNG 文件拖入此应用程序，选择一个质量级别（对于 PNG 来说，由可用的颜色数量决定），预览结果，并保存一个优化后的版本，如图\
  \ 10-5 所示。\n\n![A437216_1_En_10_Fig5_HTML.jpg](img/A437216_1_En_10_Fig5_HTML.jpg)\n\
  \n**图 10-5** 使用 ImageAlpha 很有趣\n\n结果令人印象深刻，就像你在图 10-6 中的优化前后对比图里看到的那样。\n\n![A437216_1_En_10_Fig6_HTML.jpg](img/A437216_1_En_10_Fig6_HTML.jpg)\n\
  \n**图 10-6** 优化前（上，224KB）与优化后（下，34KB）的对比（图片由 [`pngmini.com`](http://pngmini.com)\
  \ 提供）\n\n与无损优化不同，我不建议将有损优化自动化，因为你往往需要亲自检查结果，以确保优化没有做得太过分，并确认一切看起来“没问题”。\n\n\n\n\
  #### 技巧 3：资源合并\n\n对于页面引用的每个 JavaScript、样式表或图片，客户端的浏览器都需要发起一个 HTTP 请求来获取并解析该资源。资源合并是将多个资源文件合并成一个文件的过程，旨在减少浏览器必须发起的请求数量，从而降低这种开销，实现更快的加载速度。\n\
  \n举个例子，如果你的 `theme.liquid` 文件顶部包含类似代码清单 10-1 的内容，那么浏览器将在继续渲染页面之前，需要等待大量请求。更好的策略是选择性地合并这些文件以减少其数量，最终得到类似代码清单\
  \ 10-2 的效果。\n\n```\n{{ 'bootstrap.css' | asset_url | stylesheet_tag }}\n{{ 'index.css'\
  \ | asset_url | stylesheet_tag }}\n{{ 'products.css' | asset_url | stylesheet_tag\
  \ }}\n{{ 'articles.css' | asset_url | stylesheet_tag }}\n\n{{ 'jquery.js' | shopify_asset_url\
  \ | script_tag }}\n{{ 'bootstrap-core.js' | shopify_asset_url | script_tag }}\n\
  {{ 'bootstrap-tooltips.js' | shopify_asset_url | script_tag }}\n{{ 'bootstrap-modals.js'\
  \ | shopify_asset_url | script_tag }}\n{{ 'products.js' | shopify_asset_url | script_tag\
  \ }}\n{{ 'cart.js' | shopify_asset_url | script_tag }}\n...\n代码清单 10-1\n包含来自多种来源资源的示例\
  \ theme.liquid 布局文件\n```\n\n```\n{{ 'main.css' | asset_url | stylesheet_tag }}\n\
  \n{{ 'jquery.js' | shopify_asset_url | script_tag }}\n{{ 'bootstrap.js' | shopify_asset_url\
  \ | script_tag }}\n{{ 'main.js' | shopify_asset_url | script_tag }}\n...\n代码清单 10-2\n\
  利用合并资源优化后的代码清单 10-1 版本\n```\n\n对于样式表和 JavaScript 文件，合并操作非常简单——只需将每个文件的文本内容依次复制并粘贴即可。只要你按照这些文件在\
  \ HTML 中最初出现的顺序进行合并，就不会察觉到任何功能上的差异，但浏览器必须发起的请求数量将显著减少。\n\n**注意**：切勿像本示例那样，将 JavaScript\
  \ 的 `<script>` 标签放在 `<head>` 元素中。浏览器在读取它们时会阻塞页面渲染。请将所有标签放在页面底部，紧挨在闭合的 `</body>`\
  \ 标签之前。\n\n与其他技巧一样，过度使用此技巧也可能适得其反，将一切合并到一个文件中可能会产生反效果。在接下来的几个小节中，我列出了在主题中可能合理选择保持分离的一些内容。\n\
  \n##### 大型 JavaScript 库\n\n将 jQuery 这样的大型库与特定于网站的 JavaScript 打包在一起被视为不良实践，因为对网站脚本的任何修改都会迫使浏览器重新下载所有内容。\n\
  \n实际上，对于 jQuery 这类大型且通用的 JavaScript 库，更好的策略是使用公共的外部 CDN（谷歌的托管库是一个不错的起点）。这不仅意味着你无需担心在主题中管理该资源，而且网站访问者有很大可能已经在浏览器缓存中拥有该库。\n\
  \n##### 使用主题设置的资源\n\n正如你在第 8 章所见，为资源文件附加后缀（例如 `main.js.liquid`）会促使 Shopify 使用 Liquid\
  \ 对这些资源进行预处理，从而允许我们在这些文件中使用主题设置和资源过滤器。\n\n如果你的主题利用了这一功能，我建议尽可能将使用主题设置的代码部分分离到它们自己的资源文件中。否则，你将遇到与大型\
  \ JavaScript 库类似的问题：每当主题设置发生变化时，都会迫使用户进行大量下载。\n\n如果你仅对少数细微调整使用了主题设置，你甚至可以只保留一个静态资源文件，并将动态内容添加到主题的\
  \ `<head>` 中，如代码清单 10-3 所示。\n\n```\n{{ 'main.css' | asset_url | stylesheet_tag }}\n\
  \nbody {\nbgcolor: {{ settings.bgcolor | default: '#ffffff' }};\n}\n\n{{ 'https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js'\
  \ | script_tag }}\n代码清单 10-3\n在 `<style>` 块中使用主题设置的简单示例\n```\n\n##### 仅用于特定页面的资源\n\
  \n当你通过合并来打包资源时，这些文件中的样式表和脚本将在你网站的所有页面上可用。这通常是一个合理的假设，即使某个脚本在单个页面上未被使用，拥有单一资源文件的好处通常也超过在某些页面上下载稍大文件的缺点。然而，如果你有仅用于特定、不常用页面的大型资源，那么将这些资源保持分离并仅在需要时加载，可能会更有效率。\n\
  \n一个很好的例子是 Shopify 商店为登录用户提供的订单历史查看和账户管理页面。由于网站的大部分访问并非来自登录用户，也非用于账户管理，因此避免将账户管理功能的脚本和样式与其他所有内容打包在一起是合理的。\n\
  \n##### 自动合并\n\n合并的一个明显缺点是它使得资源的管理和开发变得更加困难，因为你现在所有的脚本和样式表都混在一个巨大的文件中。\n\n建立一种自动合并文件的方式意味着你可以在不牺牲开发者便利性的情况下获得合并的好处。你可能已经猜到了，我建议使用一个工作流工具来自动化这个过程——更多信息请参见第\
  \ 2 章。\n\n##### 图片合并\n\n本节主要关注脚本和样式表的合并，但合并同样适用于图片！事实上，你可能以前在 CSS 精灵图中见过这种做法，网站使用单个\
  \ PNG 图片来容纳它们所有的图标，如图 10-7 所示。\n\n![A437216_1_En_10_Fig7_HTML.jpg](img/A437216_1_En_10_Fig7_HTML.jpg)\n\
  \n图 10-7：谷歌的 CSS 精灵图\n\n这背后的逻辑与样式表和脚本相同：减少需要发起的请求数量可以提高网站性能。\n\n自行进行图片合并的最简单方法是使用非常出色的\
  \ Grumpicon 网络应用 (`http://www.grumpicon.com`)。它是一个拖放式解决方案，额外的好处是还涉及一只独角兽（见图 10-8）。\n\
  \n![A437216_1_En_10_Fig8_HTML.jpg](img/A437216_1_En_10_Fig8_HTML.jpg)\n\n图 10-8：任何带有\
  \ ASCII 独角兽的工具一定是个好工具\n\n与所有优秀的资源管理任务一样，Grumpicon 背后的魔法也可以作为 Grunt 插件（`grunticon`）获得，用于添加到你的自动化开发工作流中。\n\
  \n##### 未来发展\n\n如果你一直关注 Web 技术的最新发展，可能听说过 SPDY 或 HTTP2 协议。在不深入技术细节的情况下（主要是因为我自己也不完全清楚所有细节），这些是旨在大幅提升网络速度的下一代技术。\n\
  \n这些协议的特性之一是“请求多路复用”，其目标是在更底层实现与资源合并等效的功能。这意味着像我们这样的开发者可以只使用单个资源（更简单），而无需强迫浏览器发起比麦当娜的演出合同要求还多的请求。\n\
  \n然而，这些协议在服务器和客户端上的广泛部署和支持仍需时日，所以目前你还得坚持使用本文所述的技术。抱歉！\n\n\n\n#### 技巧 4：资源压缩\n\n\
  虽然样式表和脚本通常不像图片那么庞大，但它们仍然会对页面的整体体积产生显著影响。\n\n在遵循技巧 #1，尽可能简化并移除多余样式和内容之后，你可以使用资源压缩来进一步减小样式表和脚本的文件大小。\n\
  \n压缩会移除资源中那些让人类易于读写，但对浏览器并非必需的多余信息（例如换行符和空白）。就 JavaScript 而言，压缩还可以通过重写 `var aLongVariableNameUsefulForHumans`\
  \ 为 `var a` 等方式，积极地优化你的代码大小。\n\n##### 如何压缩资源\n\n如果你想尝试压缩，或者只是想要进行一次性的压缩，有很多在线工具可以接收\
  \ CSS 或 JavaScript 文件并输出压缩后的版本（只需搜索“CSS/JavaScript minifier”）。然而，压缩最有用之处在于我们能将其嵌入工作流一次，然后不再操心。在这里，Grunt\
  \ 插件 `grunt-contrib-cssmin` 和 `grunt-contrib-uglify` 再次登场，分别用于 CSS 和 JavaScript\
  \ 的压缩。\n\n如果你有不同的工作流流程，或想通过命令行进行压缩，可以试试功能全面的 `YUICompressor`，它能处理 CSS 和 JavaScript。`uglify`\
  \ 工具也作为独立的 JavaScript 压缩器提供，可在命令行中运行。\n\n#### 技巧 5：其他零碎事项\n\n正确实施所有这些技巧，在大多数情况下，都能让你在提升主题性能方面取得很大进展。如果你和我一样，对性能有些吹毛求疵，或者你正处在一个需要压榨出每一丝速度来切实影响商店利润的情况，那么还有一些事情可以做。\n\
  \n##### 实现设备响应式设计\n\n在“响应式设计”成为我们通过来回拖拽浏览器宽度来做的那件事之前，它有着更广泛的含义——网站能够响应一系列上下文环境以提供最佳体验。\n\
  \n这个想法在性能领域派上用场的一个好例子是“视网膜”或“高分辨率”图片。过去几年处理高分辨率图片的常见技术是，直接向所有客户端提供一张缩小到一半大小的高分辨率图片。然后由浏览器负责适当调整大小和显示。\n\
  \n这种方法的问题在于，当服务于非高分辨率屏幕时非常浪费——它们下载了一张四倍大小的图片却毫无益处。“设备响应式设计”正是考虑了这种情况，通过使用媒体查询或 JavaScript\
  \ 库，仅在高分辨率设备上加载高分辨率图片。\n\n##### 使用延迟加载\n\n这项技术对 Shopify 商店特别有效，因为它们通常包含大量图片。延迟加载图片涉及使用\
  \ JavaScript 库，仅在图片应在用户视口内可见时才进行加载，从而改善初始页面加载时间。\n\n当你的主题涉及很长的页面，而许多访客实际上不需要加载大部分内容时，这项技术尤其方便。Matt\
  \ Mlinac 的延迟加载 jQuery 插件（[`http://www.appelsiini.net/projects/lazyload`](http://www.appelsiini.net/projects/lazyload)）是一个非常可靠的实现。\n\
  \n##### 为垫片/回退方案使用条件加载\n\n如果你正在为旧版浏览器使用“垫片”或回退方案（例如，`RespondJS` 回退方案允许 Internet\
  \ Explorer 8 等旧版浏览器使用媒体查询），请确保你不会在新版浏览器上浪费地下载它们。\n\n你可以通过在加载脚本时使用条件注释来实现这一点，如清单\
  \ 10-4 所示，或者根据使用 `Modernizr` 等库的测试结果，使用基于 JavaScript 的条件加载。\n\n```\n...\n清单 10-4\n\
  使用条件注释为 Internet Explorer 8 及更低版本加载 Respond.js 回退方案\n```\n\n##### 掌握“async”属性\n\n\
  如前所述，将 `<script>` 标签放在 HTML 的 `<head>` 部分会严重影响页面加载时间，因为浏览器在等待 JavaScript 加载时会阻塞页面渲染。常识告诉我们，页面中包含\
  \ `script` 标签的最佳位置是在页面最底部，`</body>` 标签之前。\n\n这是一个很好的默认方法，但随着 HTML5 的出现，我们现在可以为 script\
  \ 元素使用 `async` 属性，它告诉浏览器在后台加载脚本的同时，继续解析和渲染页面。\n\n然而，使用 `async` 有一些重要的注意事项——即无法保证执行时间或顺序。如果你有兴趣深入探讨\
  \ `async` 的细节，我读过最好的文章是 Jake Archibald 在 [`http://www.html5rocks.com/en/tutorials/speed/script-loading/`](http://www.html5rocks.com/en/tutorials/speed/script-loading/)\
  \ 上的讲解。\n\n##### 检查资源 404 和 301 错误\n\n通过浏览器的开发者工具查看 Network 面板或类似面板，检查是否有资源返回 404\
  \ 或 301 错误。\n\n缺少的资源（404 错误）浪费了一次请求，你应该移除对该资源的引用或用有效的资源替换——如果网站本身有一个很大或复杂的自定义 404\
  \ 页面，每次缺少资源时都需要下载它，这个问题会变得更加严重。\n\n资源请求被 301 响应码重定向实际上相当常见（例如，对某个资源 `http://` 版本的请求可能会被自动重定向到\
  \ `https://` 版本）。如果你看到这种情况，直接链接到最终的 URL 以避免浪费最初的请求。\n\n### 评估性能改进\n\n每次进行性能优化后，最好再次测量你的性能指标，看看改变了什么。这不仅能给你带来成就感并激励你，你还会开始清楚地知道哪些地方容易优化，并开始将它们融入你正常的开发工作流程中。\n\
  \n现在，尽管所有这些测量都很有用，但没有什么比实际使用你的网站来检查客户是否获得了良好体验更有效的了！下次你在火车上，或者在信号不好的地方用手机时，试着清除浏览器缓存然后加载你的网站。如果你能让咖啡馆里的陌生人也做同样的事，并尝试从你的商店买东西，那将获得额外加分。\n\
  \n如果你等不及要离开家或办公室来测试你的性能改进，并且你有一台 Mac，你可以使用 OS X 的网络链路调节器，如图 10-9 所示。将你的连接设置调低到不稳定的\
  \ 2G 网络，看看你的网站是否还能撑住。\n\n![A437216_1_En_10_Fig9_HTML.jpg](img/A437216_1_En_10_Fig9_HTML.jpg)\n\
  \n*图 10-9 — 调节那个链接！*\n\n在 [`http://nshipster.com/network-link-conditioner/`](http://nshipster.com/network-link-conditioner/)\
  \ 上获取如何设置网络链路调节器的说明。Chrome 用户（Mac 和 Windows 上均可）在开发者工具的 Network 选项卡中可以使用类似的功能（称为\
  \ Throttling）。\n\n### 最后想法\n\n性能优化是一项能为店主带来显著回报的任务，但在开发和测试过程中却经常被忽视，因为我们很容易下意识地掩盖网站的问题。\n\
  \n请记住：作为主题开发者，你必须等待 Shopify 商店加载（这是你的工作）。客户没有这个义务，他们会毫不犹豫地转向竞争对手。\n\n\n\n### 总结\n\
  \n本章探讨了为什么性能既是主题开发中最重要却又最常被忽视的方面之一。本章深入分析了提升主题性能的动机，并讨论了需要跟踪的关键指标以及用于跟踪这些指标的工具。\n\
  \n在理解了需要改进的方向之后，你将学习一系列具体的策略和技术，以确保主题快速加载并提供响应迅速的客户体验。\n\n脚注 1\n\n他们在 2009 年 Velocity\
  \ 大会上提交的报告可在[`http://velocityconf.com/velocity2009/public/schedule/detail/8523`](http://velocityconf.com/velocity2009/public/schedule/detail/8523)找到。\n\
