    **Parsing Files with Extensions Other Than .php**


    As of yet you have mapped only routes to controllers and actions in Cake. What
    about other file types such as RSS or XML files? Because of how Cake’s .htaccess
    files are constructed, the server will supply files when they are directly referenced
    and available on the server. So, you can feasibly write static files such as RSS
    feeds, PDF files, or XML files and place these files in the app/webroot directory,
    and they can be accessed directly by entering the file name in the URL. But the
    router can also parse extensions, which makes it possible to use Cake to dynamically
    create and render non-HTML file types.


