  trans: '

    ## PHP 解决方案 4-2：测试包含文件的安全性


    本方案演示了使用 `.inc` 和 `.php`（或 `.inc.php`）作为包含文件的扩展名之间的区别。请使用上一节中的 `index.php` 和 `menu.php`。或者使用
    `ch04` 文件夹中的 `index_02.php` 和 `menu_01.php`。如果你使用下载的文件，请在使用前从文件名中移除 `_02` 和 `_01`。


    将 `menu.php` 重命名为 `menu.inc`，并相应编辑 `index.php` 来包含它：


    ```

    <?php require ''./includes/menu.inc''; ?>

    ```


    在浏览器中加载 `index.php`。你应该看不到任何区别。


    修改 `menu.inc` 内部的代码，将密码存储在 PHP 变量中，如下所示：


    ```

    <ul id="nav">

    <li><a href="index.php" id="here">首页</a></li>

    <?php $password = ''topSecret''; ?>

    <li><a href="blog.php">博客</a></li>

    <li><a href="gallery.php">画廊</a></li>

    <li><a href="contact.php">联系</a></li>

    </ul>

    ```


    ![A978-1-4842-0635-5_4_Fig4_HTML.jpg](img/A978-1-4842-0635-5_4_Fig4_HTML.jpg)


    图 4-4. 在浏览器中直接加载 `menu.inc` 会暴露 PHP 代码


    现在在浏览器中直接加载 `menu.inc`。图 4-4 显示了会发生什么。


    ![A978-1-4842-0635-5_4_Fig3_HTML.jpg](img/A978-1-4842-0635-5_4_Fig3_HTML.jpg)


    图 4-3. PHP 代码没有输出，因此只有 HTML 被发送到浏览器


    重新加载页面。如图 4-3 所示，密码在源代码中保持隐藏。尽管包含文件没有 `.php` 扩展名，但其内容已与 `index.php` 合并，所以 PHP
    代码被处理了。


    服务器和浏览器都不知道如何处理 `.inc` 文件，因此整个内容都会显示在屏幕上：原始的 HTML、你的秘密密码，一切都会暴露。


    将包含文件的名称改为 `menu.inc.php`，然后通过在之前步骤使用的 URL 末尾添加 `.php`，直接在浏览器中加载它。这次，你应该会看到一个无序的链接列表。检查浏览器的源代码视图。PHP
    代码没有被暴露。


    将名称改回 `menu.php`，并通过直接在浏览器中加载包含文件并再次查看源代码来测试它。


    移除你在步骤 3 中添加至 `menu.php` 中的密码 PHP 代码，并将 `index.php` 中的包含命令改回原始设置，如下所示：


    ```

    <?php require ''./includes/menu.php''; ?>

    ```


    ## PHP 解决方案 4-3：自动标识当前页面


    现在你已经了解了使用 `.inc` 和 `.php` 作为文件扩展名之间的区别，让我们修复菜单不标识当前页面的问题。该解决方案涉及使用 PHP 找出当前页面的文件名，然后使用条件语句在相应的
    `<a>` 标签中插入一个 ID。


    继续使用相同的文件。或者使用 `ch04` 文件夹中的 `index_02.php`、`contact.php`、`gallery.php`、`blog.php`、`menu_01.php`
    和 `footer_01.php`，确保从所有文件名中移除 `_01` 和 `_02`。


    打开 `menu.php`。当前代码如下所示：


    ```

    <ul id="nav">

    <li><a href="index.php" id="here">首页</a></li>

    <li><a href="blog.php">博客</a></li>

    <li><a href="gallery.php">画廊</a></li>

    <li><a href="contact.php">联系</a></li>

    </ul>

    ```


    控制当前页面指示的样式由第 2 行高亮的 `id="here"` 定义。你需要 PHP 在以下情况插入 `id="here"`：如果当前页面是 `blog.php`，则插入到
    `blog.php <a>` 标签中；如果页面是 `gallery.php`，则插入到 `gallery.php <a>` 标签中；如果页面是 `contact.php`，则插入到
    `contact.php <a>` 标签中。


    希望你现在已经得到了提示——你需要在每个 `<a>` 标签中加入一个 `if` 语句（参见第 3 章中的“做出决策”）。第 2 行需要看起来像这样：


    ```

    <li><a href="index.php" <?php if ($currentPage == ''index.php'') { echo ''id="here"'';
    } ?>>首页</a></li>

    ```


    其他链接应以类似的方式进行修改。但是 `$currentPage` 如何获取其值呢？你需要找出当前页面的文件名。


    暂时将 `menu.php` 放在一边，创建一个名为 `get_filename.php` 的新 PHP 页面。在一对 PHP 标签之间插入以下代码（或者使用
    `ch04` 文件夹中的 `get_filename.php`）：


    ```

    echo $_SERVER[''SCRIPT_FILENAME''];

    ```


    保存 `get_filename.php` 并在浏览器中查看它。在 Windows 系统上，你应该会看到类似以下截图的内容。（`ch04` 文件夹中的版本包含此步骤和下一步的代码，并附有文本说明哪个是哪个。）


    ![A978-1-4842-0635-5_4_Figa_HTML.jpg](img/A978-1-4842-0635-5_4_Figa_HTML.jpg)


    在 Mac OS X 上，你应该会看到类似这样的内容：


    ![A978-1-4842-0635-5_4_Figb_HTML.jpg](img/A978-1-4842-0635-5_4_Figb_HTML.jpg)


    `$_SERVER[''SCRIPT_FILENAME'']` 来自 PHP 内置的超全局数组之一，它总是给出当前页面的绝对文件路径。你现在需要的是提取出文件名的方法。


    像这样修改上一步中的代码：


    ```

    echo basename($_SERVER[''SCRIPT_FILENAME'']);

    ```


    保存 `get_filename.php` 并点击浏览器中的“重新加载”按钮。你现在应该只看到文件名：`get_filename.php`。


    内置的 PHP 函数 `basename()` 以文件路径作为参数并提取出文件名。就这样——你找到了一种找出当前页面文件名的方法。


    像这样修改 `menu.php` 中的代码（更改部分以粗体显示）：


    ```

    <?php $currentPage = basename($_SERVER[''SCRIPT_FILENAME'']); ?>

    <ul id="nav">

    <li><a href="index.php" <?php if ($currentPage == ''index.php'') { echo ''id="here"'';}
    ?>>首页</a></li>

    <li><a href="blog.php" <?php if ($currentPage == ''blog.php'') { echo ''id="here"'';}
    ?>>博客</a></li>

    <li><a href="gallery.php" <?php if ($currentPage == ''gallery.php'') { echo ''id="here"'';}
    ?>>画廊</a></li>

    <li><a href="contact.php" <?php if ($currentPage == ''contact.php'') { echo ''id="here"'';}
    ?>>联系</a></li>

    </ul>

    ```


    **注意：** 确保你正确结合了单引号和双引号。虽然 HTML 允许在属性值周围省略引号，但通常最佳实践是使用它们。由于我在 `here` 周围使用了双引号，所以我将字符串
    `''id="here"''` 用单引号括起来。我本可以写成 `"id=\"here\""`，但混合使用单引号和双引号更容易阅读。


    如有必要，将你的代码与 `ch04` 文件夹中的 `menu_02.php` 进行比较。


    ![A978-1-4842-0635-5_4_Fig5_HTML.jpg](img/A978-1-4842-0635-5_4_Fig5_HTML.jpg)


    图 4-5. 包含文件中的条件代码为每个页面生成不同的输出


    保存 `menu.php` 并在浏览器中加载 `index.php`。菜单看起来应该和之前没有区别。使用菜单导航到其他页面。这次，如图 4-5 所示，当前页面的边框应该是白色的，指示你在网站中的位置。如果你在浏览器中查看页面的源代码视图，你会看到
    `here` ID 已自动插入到正确的链接中。

    '
- fmt: "#### PHP Solution 4-4: Generating a Page’s Title From its Filename\n\nNow\
    \ that you know how to find the filename of the current page, you might also find\
    \ it useful to automate the `<title>` tag of each page. This solution uses `basename()`\
    \ to extract the filename and then uses PHP string functions to format the name\
    \ ready for insertion in the `<title>` tag.\n\nThis works only with filenames\
    \ that tell you something about the page’s contents, but since that’s a good practice\
    \ anyway, it’s not really a restriction. Although the following steps use the\
    \ Japan Journey website, you can try this out with any page.\n\nCreate a new PHP\
    \ file called `title.php` and save it in the `includes` folder. Strip out any\
    \ code inserted by your script editor and type in the following code:\n\n```\n\
    <?php\n$title = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n```\n\n**Tip:**\
    \ Because this file contains only PHP code, do not add a closing PHP tag at the\
    \ end. The closing PHP tag is optional when nothing follows the PHP code in the\
    \ same file. Omitting the tag helps avoid a common error with include files known\
    \ as “headers already sent.” You’ll learn more about this error in PHP Solution\
    \ 4-8.\n\nThe `basename()` function used in PHP Solution 4-3 takes an optional\
    \ second argument: a string containing the filename extension preceded by a leading\
    \ period. Adding the second argument extracts the filename and strips the filename\
    \ extension from it. So, this code finds the filename of the current page, strips\
    \ the `.php` filename extension, and assigns the result to a variable called `$title`.\n\
    \nOpen `contact.php` and include `title.php` by typing this above the `DOCTYPE`:\n\
    \n```\n<?php include './includes/title.php'; ?>\n```\n\nAmend the `<title>` tag\
    \ like this:\n\n```\n<title>Japan Journey <?php echo \"&#8212;{$title}\"; ?></title>\n\
    ```\n\nThis uses `echo` to display `—` (the numerical entity for an em dash) followed\
    \ by the value of `$title`. Because the string is enclosed in double quotes, PHP\
    \ displays the value of `$title`. The variable `$title` has been enclosed in curly\
    \ braces because there is no space between the em dash and `$title`. Although\
    \ not always necessary, it’s a good idea to enclose variables in braces when using\
    \ them without any whitespace in a double-quoted string. It makes the variable\
    \ clear to both you and the PHP engine.\n\nI’m not using the shorthand version\
    \ of `echo` (`<?=`) because we’ll be adding more script to this block.\n\nThe\
    \ first few lines of your page should look like this:\n\n![A978-1-4842-0635-5_4_Figc_HTML.jpg](A978-1-4842-0635-5_4_Figc_HTML.jpg)\n\
    \n**Note:** Normally, nothing should precede the `DOCTYPE` declaration in a webpage.\
    \ However, this doesn’t apply to PHP code, as long as it doesn’t send any output\
    \ to the browser. The code in `title.php` only assigns a value to `$title`, so\
    \ the `DOCTYPE` declaration remains the first output the browser sees.\n\nNot\
    \ bad, but what if you prefer an initial capital letter for the part of the title\
    \ derived from the filename? PHP has a neat little function called `ucfirst()`,\
    \ which does exactly that (the name is easy to remember once you realize that\
    \ `uc` stands for “uppercase”). Add another line to the code in step 2, like this:\n\
    \n![A978-1-4842-0635-5_4_Fig6_HTML.jpg](A978-1-4842-0635-5_4_Fig6_HTML.jpg)\n\n\
    Figure 4-6. Once you extract the filename, you can generate the page title dynamically\n\
    \nSave both pages and load `contact.php` into a browser. The filename without\
    \ the `.php` extension has been added to the browser tab, as shown in Figure [4-6](#A978-1-4842-0635-5_4_Chapter.html#Fig6).\n\
    \n```\n<?php\n$title = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n$title\
    \ = ucfirst($title);\n```\n\nIf you’re new to programming, this might look confusing,\
    \ but it’s actually quite simple once you analyze it: the first line of code after\
    \ the PHP tag gets the filename, strips the `.php` off the end, and stores it\
    \ as `$title`. The next line takes the value of `$title`, passes it to `ucfirst()`\
    \ to capitalize the first letter, and stores the result back in `$title`. So,\
    \ if the filename is `contact.php`, `$title` starts out as `contact`, but by the\
    \ end of the following line, it has become `Contact`.\n\n**Tip:** You can shorten\
    \ the code by combining both lines into one, like this:\n\n```\n$title = ucfirst(basename($_SERVER['SCRIPT_FILENAME'],\
    \ '.php'));\n```\n\nWhen you nest functions like this, PHP processes the innermost\
    \ one first and passes the result to the outer function. It makes your code shorter,\
    \ but it’s not so easy to read.\n\nA drawback with this technique is that filenames\
    \ consist of only one word—at least they should. Spaces are not allowed in URLs,\
    \ which is why most web design software replaces spaces with `%20`, which looks\
    \ ugly and unprofessional in a URL. You can get around this problem by using an\
    \ underscore.\n\nChange the filename of `contact.php` to `contact_us.php`.\n\n\
    Amend the code in `title.php` like this:\n\n```\n<?php\n$title = basename($_SERVER['SCRIPT_FILENAME'],\
    \ '.php');\n$title = str_replace('_', ' ', $title);\n$title = ucwords($title);\n\
    ```\n\nThe middle line uses a function called `str_replace()` to look for every\
    \ underscore and replace it with a space. The function takes three arguments:\
    \ the character(s) you want to replace, the replacement character(s), and the\
    \ string you to change.\n\n**Tip:** You can also use `str_replace()` to remove\
    \ character(s) by using an empty string (a pair of quotes with nothing between\
    \ them) as the second argument. This replaces the string in the first argument\
    \ with nothing, effectively removing it.\n\nInstead of `ucfirst()`, the final\
    \ line of code uses the related function `ucwords()`, which gives each word an\
    \ initial cap.\n\n![A978-1-4842-0635-5_4_Fig8_HTML.jpg](A978-1-4842-0635-5_4_Fig8_HTML.jpg)\n\
    \nFigure 4-8. Generating the page title from `index.php` produces an unsatisfactory\
    \ result\n\nSave `title.php` and load the renamed `contact_us.php` into a browser.\
    \ Figure [4-7](#A978-1-4842-0635-5_4_Chapter.html#Fig7) shows the result. (Google\
    \ Chrome truncates the title in the tab, but you can see the complete title as\
    \ a tooltip.)\n\n![A978-1-4842-0635-5_4_Fig7_HTML.jpg](A978-1-4842-0635-5_4_Fig7_HTML.jpg)\n\
    \nFigure 4-7. The underscore has been removed, and both words have been given\
    \ initial caps\n\nChange the name of the file back to `contact.php` and reload\
    \ the file into a browser. The script in `title.php` still works. There are no\
    \ underscores to replace, so `str_replace()` leaves the value of `$title` untouched,\
    \ and `ucwords()` converts the first letter to uppercase, even though there’s\
    \ only one word.\n\nRepeat steps 3 and 4 with `index.php`, `blog.php`, and `gallery.php`.\n\
    \nThe home page of the Japan Journey site is called `index.php`. As Figure [4-8](#A978-1-4842-0635-5_4_Chapter.html#Fig8)\
    \ shows, applying the current solution to this page doesn’t seem quite right.\n\
    \nThere are two solutions: either don’t apply this technique to such pages or\
    \ use a conditional statement (an `if` statement) to handle special cases. For\
    \ instance, to display Home instead of Index, amend the code in `title.php` like\
    \ this:\n\n```\n<?php\n$title = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n\
    $title = str_replace('_', ' ', $title);\nif ($title == 'index') {\n    $title\
    \ = 'home';\n}\n$title = ucwords($title);\n```\n\nThe first line of the conditional\
    \ statement uses two equal signs to check the value of `$title`. The following\
    \ line uses a single equal sign to assign the new value to `$title`. If the page\
    \ is called anything other than `index.php`, the line inside the curly braces\
    \ is ignored, and `$title` keeps its original value.\n\n**Tip:**"
  raw: '#### PHP Solution 4-4: Generating a Page’s Title From its Filename


    Now that you know how to find the filename of the current page, you might also
    find it useful to automate the `<title>` tag of each page. This solution uses
    `basename()` to extract the filename and then uses PHP string functions to format
    the name ready for insertion in the `<title>` tag.


    This works only with filenames that tell you something about the page’s contents,
    but since that’s a good practice anyway, it’s not really a restriction. Although
    the following steps use the Japan Journey website, you can try this out with any
    page.


    Create a new PHP file called `title.php` and save it in the `includes` folder.
      Strip out any code inserted by your script editor and type in the following
    code:


    `<?php`


    `$title = basename($_SERVER[''SCRIPT_FILENAME''], ''.php'');`


    Tip


    Because this file contains only PHP code, do not add a closing PHP tag at the
    end. The closing PHP tag is optional when nothing follows the PHP code in the
    same file. Omitting the tag helps avoid a common error with include files known
    as “headers already sent.” You’ll learn more about this error in PHP Solution
    4-8.


    The `basename()` function used in PHP Solution 4-3 takes an optional second argument:
    a string containing the filename extension preceded by a leading period. Adding
    the second argument extracts the filename and strips the filename extension from
    it. So, this code finds the filename of the current page, strips the `.php` filename
    extension, and assigns the result to a variable called `$title`.


    Open `contact.php` and include `title.php` by typing this above the `DOCTYPE`:


    `<?php include ''./includes/title.php''; ?>`


    Amend the `<title>` tag like this:


    `<title>Japan Journey` `<?php echo "` `&` `#8212;{$title}"; ?>` `</title>`


    This uses `echo` to display `—` (the numerical entity for an em dash) followed
    by the value of `$title`. Because the string is enclosed in double quotes, PHP
    displays the value of `$title`. The variable `$title` has been enclosed in curly
    braces because there is no space between the em dash and `$title`. Although not
    always necessary, it’s a good idea to enclose variables in braces when using them
    without any whitespace in a double-quoted string. It makes the variable clear
    to both you and the PHP engine.


    I’m not using the shorthand version of `echo` (`<?=`) because we’ll be adding
    more script to this block.


    The first few lines of your page should look like this:


    ![A978-1-4842-0635-5_4_Figc_HTML.jpg](A978-1-4842-0635-5_4_Figc_HTML.jpg)


    Note


    Normally, nothing should precede the `DOCTYPE` declaration in a webpage. However,
    this doesn’t apply to PHP code, as long as it doesn’t send any output to the browser.
    The code in `title.php` only assigns a value to `$title`, so the `DOCTYPE` declaration
    remains the first output the browser sees.


    Not bad, but what if you prefer an initial capital letter for the part of the
    title derived from the filename? PHP has a neat little function called `ucfirst()`,
    which does exactly that (the name is easy to remember once you realize that `uc`
    stands for “uppercase”). Add another line to the code in step 2, like this:


    ![A978-1-4842-0635-5_4_Fig6_HTML.jpg](A978-1-4842-0635-5_4_Fig6_HTML.jpg)


    Figure 4-6.


    Once you extract the filename, you can generate the page title dynamically Save
    both pages and load `contact.php` into a browser. The filename without the `.php`
    extension has been added to the browser tab, as shown in Figure [4-6](#A978-1-4842-0635-5_4_Chapter.html#Fig6).


    `<?php`


    `$title = basename($_SERVER[''SCRIPT_FILENAME''], ''.php'');`


    `$title = ucfirst($title);`


    If you’re new to programming, this might look confusing, but it’s actually quite
    simple once you analyze it: the first line of code after the PHP tag gets the
    filename, strips the `.php` off the end, and stores it as `$title`. The next line
    takes the value of `$title`, passes it to `ucfirst()` to capitalize the first
    letter, and stores the result back in `$title`. So, if the filename is `contact.php`,
    `$title` starts out as `contact`, but by the end of the following line, it has
    become `Contact`.


    Tip


    You can shorten the code by combining both lines into one, like this:


    `$title =` `ucfirst(` `basename($_SERVER[''SCRIPT_FILENAME''], ''.php'')` `)`
    `;`


    When you nest functions like this, PHP processes the innermost one first and passes
    the result to the outer function. It makes your code shorter, but it’s not so
    easy to read.


    A drawback with this technique is that filenames consist of only one word—at least
    they should. Spaces are not allowed in URLs, which is why most web design software
    replaces spaces with `%20`, which looks ugly and unprofessional in a URL. You
    can get around this problem by using an underscore.


    Change the filename of `contact.php` to `contact_us.php`.


    Amend the code in `title.php` like this:


    `<?php`


    `$title = basename($_SERVER[''SCRIPT_FILENAME''], ''.php'');`


    `$title = str_replace(''_'', '' '', $title);`


    `$title =` `ucwords` `($title);`


    The middle line uses a function called `str_replace()` to look for every underscore
    and replace it with a space. The function takes three arguments: the character(s)
    you want to replace, the replacement character(s), and the string you to change.


    Tip


    You can also use `str_replace()` to remove character(s) by using an empty string
    (a pair of quotes with nothing between them) as the second argument. This replaces
    the string in the first argument with nothing, effectively removing it.


    Instead of `ucfirst()`, the final line of code uses the related function `ucwords()`,
    which gives each word an initial cap.


    ![A978-1-4842-0635-5_4_Fig8_HTML.jpg](A978-1-4842-0635-5_4_Fig8_HTML.jpg)


    Figure 4-8.


    Generating the page title from index.php produces an unsatisfactory result Change
    the name of the file back to `contact.php` and reload the file into a browser.
    The script in `title.php` still works. There are no underscores to replace, so
    `str_replace()` leaves the value of `$title` untouched, and `ucwords()` converts
    the first letter to uppercase, even though there’s only one word.   Repeat steps
    3 and 4 with `index.php`, `blog.php`, and `gallery.php`.   The home page of the
    Japan Journey site is called `index.php`. As Figure [4-8](#A978-1-4842-0635-5_4_Chapter.html#Fig8)
    shows, applying the current solution to this page doesn’t seem quite right.


    ![A978-1-4842-0635-5_4_Fig7_HTML.jpg](A978-1-4842-0635-5_4_Fig7_HTML.jpg)


    Figure 4-7.


    The underscore has been removed, and both words have been given initial caps Save
    `title.php` and load the renamed `contact_us.php` into a browser. Figure [4-7](#A978-1-4842-0635-5_4_Chapter.html#Fig7)
    shows the result. (Google Chrome truncates the title in the tab, but you can see
    the complete title as a tooltip.)


    There are two solutions: either don’t apply this technique to such pages or use
    a conditional statement (an `if` statement) to handle special cases. For instance,
    to display Home instead of Index, amend the code in `title.php` like this:


    `<?php`


    `$title = basename($_SERVER[''SCRIPT_FILENAME''], ''.php'');`


    `$title = str_replace(''_'', '' '', $title);`


    `if ($title == ''index'') {`


    `$title = ''home'';`


    `}`


    `$title = ucwords($title);`


    The first line of the conditional statement uses two equal signs to check the
    value of `$title`. The following line uses a single equal sign to assign the new
    value to `$title`. If the page is called anything other than `index.php`, the
    line inside the curly braces is ignored, and `$title` keeps its original value.


