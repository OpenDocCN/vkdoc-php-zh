    **Resizing Images**


    Depending on the context, you will often want to display uploaded images at different
    resolutions in different areas of your site. For example, on the blog post index
    page in our application, you might want small thumbnails (perhaps around about
    100 pixels by 75 pixels) while on the blog post detail page you might want to
    show somewhat larger images (such as about 200 pixels by 150 pixels). In addition,
    you may want to allow the user to click on an image to show the image at full
    size.


    In this section, we will build a simple mechanism to generate resized versions
    (that is, thumbnails) of uploaded images. We will build this system such that
    the desired dimensions can be specified in the URL and an image the appropriate
    size will be returned.


    In order to do this, we will use the GD functions that are included with PHP.
    A popular alternative to GD is ImageMagick, but it requires that ImageMagick also
    be installed on the server, while GD is typically included in most PHP installations.


    ■**Note** The techniques we use here can be achieved using ImageMagick’s convert
    tool. You can use this tool either by calling convert directly within your script,
    or by using the imagick PECL package. After lying dormant for several years, this
    package has recently gained new life and provides a simple interface to ImageMagick.
    The biggest drawback to using this package is that it needs to be built into the
    PHP server in addition to ImageMagick being installed on the server. More information
    about convert can be found at


    [http://www.imagemagick.org/script/convert.php.](http://www.imagemagick.org/script/convert.php)


    **Creating Thumbnails**


    The image thumbnailer we will now create is fairly straightforward when you look
    at the individual pieces. We will create a new method in the DatabaseObject_BlogPostImage
    class called createThumbnail(), which generates a thumbnail for the loaded record
    based on the width and height arguments specified. This method will return the
    full filesystem path to the created thumbnail, which allows us to easily link
    the thumbnailer into the existing code to load and display images. Additionally,
    it allows us to simply return the path of the original file if the requested thumbnail
    is bigger than the original image. This saves unnecessary duplication of the image
    on the filesystem.


    The other thing createThumbnail() will do is cache the thumbnails. Since creating
    thumbnails can be processor-intensive (depending on the size of the input and
    output images), we want to make this process as efficient as possible. Fortunately,
    it is very straightforward to cache the created thumbnails, as we will soon see.


    Before we write createThumbnail(), we will add in another method, which we will
    call GetThumbnailPath(). This method will return the filesystem path to where
    created thumbnails should be stored. We will use the ./data/tmp directory as the
    base directory for this, and use a subdirectory within it called thumbnails, as
    shown in Listing 11-19.


