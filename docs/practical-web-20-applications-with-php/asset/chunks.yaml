    **Creating and Editing Blog Posts**


    We will now implement the functionality that will allow users to create new blog
    posts and edit existing posts. To avoid duplication, both the creating and editing
    of posts use the same code. Initially, we will implement this action using a <textarea>
    as the input method for users to enter their blog posts. In Chapter 8, we will
    implement a what-you-see-is-what-you-get (WYSIWYG) editor to replace this text
    area.


    The fields we will be prompting users to complete are as follows:


    • **A title for the post entry.** This is typically a short summary or headline
    of the post. Later in development, all blog posts will be accessible via a friendly
    URL. We will generate the URL based on this title.


    • **The submission date for the post.** For new posts, the current date and time
    will be selected by default, but we will allow members to modify this date.


    • **The blog post content.** Users will be able to enter HTML tags in this field.
    We will write code to correctly filter this HTML to prevent unwanted tags or JavaScript
    injection. As mentioned previously, we will use a text area for this field, to
    be replaced with a WYSIWYG editor in Chapter 8.


    We will first create a form that users will use to create new or edit existing
    blog posts. Next, we will implement the editAction() method for the BlogmanagerController
    class. Finally, we will write a class to process the blog post submission form
    (FormProcessor_BlogPost).


