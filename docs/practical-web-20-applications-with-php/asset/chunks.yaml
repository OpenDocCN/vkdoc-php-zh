    **Controlling Maps**


    In addition to using the controls that can be added to maps, it is also possible
    to control maps programmatically. For example, you must choose where to center
    the map initially; you can use code to switch between satellite and street map
    view, and you can open or close information windows as required using function
    calls.


    The code we write in this chapter will use a combination of programmed map control
    as well as allowing users to control the map as they please. For example, when
    a marker is dragged to a new location, we will make its information window appear,
    but we will also allow the users to close and reopen the window as they please.


    **Planning Integration**


    Now that we have an idea of the functionality that Google Maps provides, it’s
    time to plan how we use the available features. As mentioned previously, we are
    going to allow users to add one or more locations to each of their blog posts.
    In doing so, we must consider a number of issues:


    • We will use the geocoder to find the coordinates of each location being added
    by the user. This means we must add a map to the blog manager section of the site
    and display a marker when they enter an address.


    • Since the found location might not be the exact point the user wants to display,
    we will allow them to drag the marker to any location on the map that they please.


    • We will save the coordinates and a description for each point in the database.


    • For each post that has locations assigned to it, we must display the map on
    the post details page, as well as including an information window showing the
    description for every marker that is added.


    **Limitations of Google Maps**


    Although the terms and conditions of Google Maps state there is no limit to the
    number of page views for each map, there is a limitation for the number of geocoder
    requests. Each IP


    address has a limit of 15,000 geocoder requests per day. This means when the geocoder
    is used from a user’s web browser, the request counts against their quota (not
    your server’s). Note, however, that if you use the server-side geocoder, then
    each request counts against your server’s IP address.


    Theoretically, you could perform a geocoder request every time somebody viewed
    the page with the address that was added; however, you could potentially go over
    the limit, meaning the geocoder request would fail (we discuss the different error
    codes returned from the geocoder shortly).


    It is unnecessary and slower to perform the geocoder request for every view, especially
    since the locations for a given blog post won’t change. Because of this, it is
    important to cache


