  \  <div id=\"tabs-1\">\n    <p>Lorem Ipsum Dolor Sit Amet…</p>\n  </div>\n  <div\
  \ id=\"tabs-2\">\n    <p>Lorem Ipsum Dolor Sit Amet…</p>\n  </div>\n  <div id=\"\
  tabs-3\">\n    <p>Lorem Ipsum Dolor Sit Amet…</p>\n  </div>\n</div>\n```\n![images](img/1714.jpg)\n\
  \n**图 17-14.** 操作中的标签页\n\n\n\n#### Drupal 核心中的 jQuery UI 特效\n\n除了已介绍的众多小部件外，还有几种特效可用于动画和增强效果，只需引入相应库，然后在\
  \ jQuery 动画中调用对应特效即可。请亲自尝试以下操作：\n\n*   blind `drupal_add_library('system', 'effects.blind');`\n\
  *   bounce `drupal_add_library('system', 'effects.bounce');`\n*   clip `drupal_add_library('system',\
  \ 'effects.clip');`\n*   drop `drupal_add_library('system', 'effects.drop');`\n\
  *   explode `drupal_add_library('system', 'effects.explode');`\n*   fade `drupal_add_library('system',\
  \ 'effects.fade');`\n*   fold `drupal_add_library('system', 'effects.fold');`\n\
  *   highlight `drupal_add_library('system', 'effects.highlight');`\n*   pulsate\
  \ `drupal_add_library('system', 'effects.pulsate');`\n*   scale `drupal_add_library('system',\
  \ 'effects.scale');`\n*   shake `drupal_add_library('system', 'effects.shake');`\n\
  *   slide `drupal_add_library('system', 'effects.slide');`\n*   transfer `drupal_add_library('system',\
  \ 'effects.transfer');`\n\n### 更多 jQuery 资源\n\n关于 JavaScript 和 jQuery，互联网上有数不尽的资源，同时通过\
  \ `drupal.org` 也能获取大量资源，这些资源将帮助你解答关于实现特定功能的问题。在搜索某个问题或疑问的相关信息时，你可能会惊讶地发现，它在 `drupal.org`\
  \ 上已被反复解答过。\n\n*   Drupal 7 JavaScript API 文档： [`http://drupal.org/node/751744`](http://drupal.org/node/751744)\n\
  *   jQuery JavaScript 库的文档： [`http://docs.jQuery.com`](http://docs.jQuery.com)\n\
  *   jQuery UI 的资源： [`http://jqueryui.com`](http://jqueryui.com)\n\n### 总结\n\n许多热门网站，包括\
  \ Facebook 和 Twitter，都严重依赖 JavaScript 交互来增强其网站的可用性。Drupal 7 及其 JavaScript 框架拥有足够的灵活性和强大功能，能够实现你能想象到的、或在其他任何网站上看到过的任何功能！\n\
  \n正如本章所展示的，Drupal 7 的 JavaScript 框架增加了丰富的功能；它改变了许多我们应用程序利用 JavaScript 和 jQuery 库的方式。本章的基本示例将助你顺利上手，为你已有的强大\
  \ Drupal 7 网站提供强大的 JavaScript 增强功能。\n\n![images](img/square.jpg) **提示：** 关于 Drupal\
  \ 7 中 jQuery 和 AJAX 的更多资源和推荐，包括 `#attached` 渲染属性和 `#ajax` 表单属性，请参阅本章在线主页 `dgd7.org/jquery`。\n\
  \n## 第 V 部分\n\n![images](img/squ.jpg)\n\n## 后端开发\n\n**第 18 章、第 19 章 和 第 20 章** 构成一个单元，最初是作为一个章节撰写的，涵盖了开始编写你自己的模块所需了解的一切知识。\n\
  \n**第 21 章** 介绍了如何将 Drupal 6 模块移植到 Drupal 7，这是学习模块开发的一个好方法。\n\n**第 22 章** 提供了编写模块的另一个良好入门途径——“粘合代码”或站点特定模块，用于实现那些你无法通过配置完成的最终调整。阅读本章无需先阅读之前任何章节。\n\
  \n**第 23 章** 涵盖了为你的模块编写测试，这是编写可靠且可持续代码的必要组成部分。\n\n**第 24 章** 介绍了 API 模块的概念，并深入探讨了编写这些\
  \ Drupal 功能构建块的一些策略。\n\n## 第 18 章\n\n![images](img/squ.jpg)\n\n## 模块开发入门\n\n**作者：Benjamin\
  \ Melançon**\n\n到目前为止，你已经了解到 Drupal 是一个强大且模块化的系统。事实上，Drupal 的许多强大功能都源自其模块，这些即插即用的功能模块构建在\
  \ Drupal 基础系统之上，并相互协作，以实现令人惊叹的效果。\n\n你如何利用这种强大功能来添加自己的原创特性呢？你可以编写一个模块。你只需创建两个文件。第一个文件告诉\
  \ Drupal 关于该模块的信息；它并非代码。第二个文件中的代码可以少至三行。在本章的第一节中，你将创建这两个文件的内容，从而制作出一个可用的模块。编写模块是*任何人都可以做到*的事情。有许多（大多很简单）规则需要遵守，有大量工具可供使用——还有大量的探索工作要做。每个开发模块的人仍在不断学习。\n\
  \n本章是模块构建的入门介绍，第 19 章 和 第 20 章 将在此基础上进一步展开。本章提供了以下内容：\n\n*   模块的基础知识，以及 Drupal 如何几乎在其所有功能中都使用钩子，从而允许模块扩展和修改\
  \ Drupal。\n*   开发模块所需技术技能的概述，包括 PHP 基础和 Drupal 编码标准。\n\n### 一个非常简单的模块\n\n在本节中，你将快速浏览一个小型模块，然后回过头来详细重新审视整个过程。当在第\
  \ 19 章末尾功能完备时，该模块将帮助网站构建者和模块开发者研究网站；理想情况下，他们将看到网站的骨架结构，因此该模块被命名为 X-ray。该模块将在网站上每个表单的顶部打印出表单\
  \ ID。\n\n\n\n#### 文件夹中的两个文件\n\n最简单的模块由文件夹中的两个文件组成：一个用于标识模块，另一个包含代码（即模块应执行的操作指令）。信息文件的命名格式为“模块名`.info`”（读作“点\
  \ info”），而代码文件的命名格式为“模块名`.module`”（读作“点 module”）。你的模块可以使用任何人类可读的名称，但开始所需的名称是其*机器名*：名称的小写版本，不包含空格或特殊字符。你将始终如一地使用此名称来命名文件夹、文件名以及代码中的函数。因此，在本例中，X-ray\
  \ 模块的机器名将是 xray，因此列表 18–1 和 18–2 中定义的`xray.info`和`xray.module`文件应放入名为 xray 的文件夹中。稍后你将详细讨论此部分和代码。\n\
  \n***列表 18–1.** `xray.info`文件*\n\n```\nname = X-ray\ndescription = 显示网站的内部结构和连接。\n\
  core = 7.x\n```\n\n***列表 18–2.** `xray.module`文件，包含注释（`/**`和`*/`之间的文本）*\n\n```php\n\
  <?php\n/**\n * @file\n * 帮助站点构建者和模块开发者调查网站。\n */\n\n/**\n * 实现 hook_form_alter()以显示每个表单的标识符。\n\
  \ */\nfunction xray_form_alter(&$form, &$form_state, $form_id) {\n  $form['xray_display_form_id']\
  \ = array(\n    '#type' => 'item',\n    '#title' => t('表单 ID'),\n    '#markup' =>\
  \ $form_id,\n    '#weight' => -100,\n  );\n}\n```\n\n现在你知道你可以制作一个模块了！全部内容只占半页纸，到本节结束时你将理解这些代码的含义。要使用该模块，请执行与其他人为你编写的模块相同的操作：将其放入\
  \ Drupal 查找模块的目录中并启用它。在你的开发站点中，将 xray 文件夹放入诸如`sites/all/modules/custom`这样的模块文件夹中（如有必要，请创建“custom”目录）。然后，使用浏览器访问你的开发站点，并在管理![images](img/U001.jpg)模块（`admin/modules`）页面上启用\
  \ X-ray 模块。（当然，你也可以使用 Drush 启用它，但第一次启用自己制作的模块时，在模块页面上看到它并手动启用，感觉会很好。）X-ray 一启用就会开始工作。你会立即在模块页面上看到变化：X-ray\
  \ 会修改站点上的表单，使其打印出内部表单 ID；你现在知道，模块管理页面正是由`system_modules()`函数提供的一个大型表单（参见图 18–1）。\n\
  \n![images](img/1801.jpg)\n\n***图 18–1.** 内部表单 ID `system_modules`（生成该表单的函数名称）打印在模块管理表单的顶部*\n\
  \n诚然，这并不是最令人兴奋的模块，但它仍然是一个功能完整的模块，仅用几行代码就影响了你的站点。那种认为模块开发是 Drupal 忍者专属领域的神话已被彻底打破。你可以充满信心地继续前进。你将获得所需的知识，通过自己制作的模块为你的\
  \ Drupal 站点注入额外的动力。\n\n![images](img/square.jpg) **注意** 不要在第一次制作模块时试图做出独一无二、令人惊叹甚至特别有用的东西。作为学习练习而创建的模块不必是前所未有的事物；它只需要对你来说是新的。参阅第\
  \ 20 章以制作既简单又实用的模块。\n\n尽管如此，这确实有点令人兴奋。只需很少的代码，你就在站点上的每个表单中添加了一些东西！它是如何工作的？让我们进行一次慢动作回放，进行逐步分析，并附带大量背景信息的彩色评论。\n\
  \n#### 自定义模块的放置位置\n\n你的模块是自包含在其文件夹中的，可以放在 Drupal 查找模块的任何位置，就像你从`drupal.org`获取的模块一样。但是，你*应该*把它放在哪里呢？\n\
  \n你知道应该将其放在 sites 文件夹中的某个位置，因为你对 Drupal 发行版所做的*每一项*自定义都归属于 sites。本章遵循将自定义模块放在`sites/all/modules/custom`中的实践，首次将模块放入时需要创建此目录。\n\
  \n![images](img/square.jpg) **注意** 当制作你自己的发行版时（如第 34 章所述），你可以将模块与你的安装配置文件捆绑在一起。包含在示例配置文件（example_profile）中的模块最终会被放置在`profiles/example_profile/modules`中。\n\
  \n从`drupal.org`下载的每个模块都可以放入`sites/all/modules/contrib`目录中（如第 4 章所述，用于放置手动下载或通过 drush\
  \ 下载的模块；一旦你创建了`sites/all/modules/contrib`目录，Drush 会自动将从`drupal.org`下载的模块放入其中）。\n\
  \n作为将自定义模块放在`sites/all/modules/custom`的替代方案，许多开发者采用将自定义模块放在`sites/default/modules`并将贡献模块直接放在`sites/all/modules`中的约定）。只要你不使用\
  \ Drupal 的多站点功能，这种方法就很有效。（*多站点*意味着通过在`sites`中放置其他文件夹，使用单个 Drupal 安装来服务多个站点。通常，多个\
  \ Drupal*安装*对你会更好，或与单个安装上的多个站点效果相当。然而，一些部署多个 Drupal 站点的方法，例如 Aegir（`aegirproject.org`），确实大量使用了多站点。关于设置你自己的多站点的说明，请参阅任何\
  \ Drupal 副本的 web 根目录中的`INSTALL.txt`。）\n\n表 18–1 列出了自定义模块的推荐目录。\n\n![images](img/square.jpg)\
  \ **注意** 在 Drupal 查找模块的目录中，它会进行彻底的搜索：它会不断深入所有嵌套的子目录，并找到其中的任何模块。因此，因为 Drupal 在`sites/all/modules`中查找模块，如果你将\
  \ John Albin Wilkin 的 Bad Judgment 模块放在`sites/all/modules/contrib/experiments/set_a/johnalbin/amusements/bad_judgment`中，它也会找到它。但这并不意味着你应该把它或任何其他模块放在那里。（包含多个模块的模块项目必然会利用此功能，让\
  \ Drupal 在其项目文件夹中找到其他模块，有些还会将子模块嵌套得更深一层或两层，例如放在 modules 子目录中，这是核心的 Field 模块所采用的方法。）\n\
  \n***表 18–1**. 自定义模块的推荐位置*\n\n| **目录** | **使用场景** |\n| --- | --- |\n| `sites/all/modules/custom/`\
  \ | 用于单个站点，或用于多站点安装中的所有站点。 |\n| `sites/example.com/modules/custom/` | 仅用于多站点安装中的单个站点`example.com`。\
  \ |\n| `sites/default/modules/` | 在单站点安装中，自定义模块可接受的快捷位置。 |\n\n你将在本地开发站点（这是一个单站点安装）中开发\
  \ X-ray 模块，因此上述任何位置都可以使用。（这样的本地站点也称为沙盒站点，意味着它是一个游乐场，不用于生产环境。）\n\n![images](img/square.jpg)\
  \ **提示** 要开发你的模块，你需要在计算机上有一个可用的 Drupal 站点。如果还没有，请参阅第 12 章关于设置开发环境的内容，以及附录 F（Windows）、G（Linux）、H（Mac）或\
  \ I（适用于 Acquia 的跨平台 Drupal 栈安装程序），以在本地提供网页服务。或者，一些开发者通过 SSH 或 FTP 接入远程开发服务器来完成所有工作。\n\
  \n**使用命令行**\n\n\n\n您可以使用计算机的图形用户界面（GUI），也可以使用命令行。在创建`modules`文件夹，然后在其中创建`xray`文件夹，再打开文本编辑器创建`xray.info`文件所需的时间里，您可能已经使用命令写完了整个文件。（用于创建目录的`mkdir`命令和用于切换目录的`cd`命令如下所示，而关于使用通用文本编辑器的`vi`命令则是`dgd7.org/vi`上在线附录的主题。）\n\
  \n掌握命令行是一项特别有用的技能，尤其是在学习 Web 开发时，因为它允许您在服务器上导航、查看和编辑文件，而这些服务器通常运行 Linux 且没有可用的 GUI。（不过，不要利用编辑服务器文件的能力去修改线上网站的代码！）\n\
  \n我想说“不要畏惧命令行”，但命令行没有“撤销”功能，因此在某些方面它确实令人畏惧——但正因如此，我们才使用版本控制。总之：使用命令行能为您的 Web 开发工作打开一系列有用、强大且便捷的工具。您可以通过\
  \ Linux 上的 Terminal 或 Mac OS X 上的 Terminal.app 来使用命令行。\n\n虽然您可以使用图形化文件管理工具（例如 Mac\
  \ OS X 的 Finder 或 Microsoft Windows 的资源管理器）创建文件夹，但本章将展示如何通过命令行操作（见清单 18–3）。这将帮助您成为一名更优秀、更高效的开发者，或许还能磨炼您的意志。\n\
  \n***清单 18–3.** 创建 `xray` 文件夹及其父文件夹 `modules`，并切换目录到该位置的命令*\n\n```\nmkdir -p sites/default/modules/xray\n\
  cd sites/default/modules/xray\n```\n\n#### 为您的模块创建仓库\n\n这一步与让模块工作无关，而是关乎编写模块时的工作流程。第\
  \ 2 章 介绍了使用 Git 进行版本控制，第 14 章 则进一步阐述了版本控制在实现开发者“心流状态”方面的优势：您希望自由尝试任何操作，并始终知道可以回退到工作状态。您应该在开发模块时使用版本控制，并持续提交更改。\n\
  \n从您正在开发的模块根目录（在本例中，即 `xray` 文件夹；在我的计算机上，该目录位于`~/code/dgd7/web/sites/all/modules/custom/xray`）初始化一个\
  \ Git 仓库。然后进行您的第一次提交，这可以在您创建第一个文件后立即进行，如下所示：\n\n```\ngit init\n```\n\n![images](img/square.jpg)\
  \ **注意**您可以在模块目录中创建一个仓库，即使它已经存在于一个受版本控制的网站项目中。这能让您将模块与站点分开，以便与世界共享模块。\n\n初始化仓库后，添加并提交您在模块目录中所做的更改。在编写模块的每个关键节点、暂停或喘息之际，您将一遍又一遍地重复这些步骤，以确保在需要时能够回退到旅程中的任何步骤。\n\
  \n```\ngit add .\ngit commit -m \"Basic xray.info and .module files.\"\n```\n\n\
  在第 14 章中，Drupal 核心最 prolific 的贡献者之一 Károly Négyesi 提到不必担心提交信息的内容。最重要的是让记录所有更改变得轻松自然。（我经常提交，但自己尚未完全遵循这一实践。您可以在`drupal.org/node/953650/commits`查看\
  \ X-ray 模块开发过程中的每一次提交。）\n\n版本控制的另一个巨大好处是，您现在可以轻松地将您的工作与世界分享。参见第 37 章，了解如何将您的模块与`drupal.org`上的沙盒项目关联，以便任何人都可以试用您的工作。第\
  \ 37 章 还包含大量关于使用 Git 跟踪更改、共享代码以及与其他开发者协作的内容。\n\n#### .info 文件\n\n这个文件只是告诉 Drupal\
  \ 关于您的模块的信息，但其中仍有许多值得关注的内容。一个`.info`文件告诉 Drupal：“嘿，这是你可以玩的东西。” Drupal 在模块启用之前只读取`.info`文件，而忽略模块的其他部分。因此，Drupal\
  \ 在模块管理页面（`admin/modules`）上显示的信息，对于未启用的模块来说，完全来自`.info`文件。（一旦某个模块被启用，依赖于模块代码才能工作的“帮助”、“权限”和“配置”链接可能会出现。）\n\
  \n##### 基本的 .info 指令\n\n`.info`文件的内容简单且公式化。我将在接下来几页中介绍许多常见指令，但所有指令都可以在`drupal.org/node/542202`找到。以下是`.info`文件的最小内容，作为自解释的示例，如同在`machine_name.info`中所见：\n\
  \n```\nname = Human-readable name of our module\ndescription = Describes what our\
  \ module does in a sentence or two.\ncore = 7.x\n```\n\n还可以有其他值，但这些是必需的。语法是简单的*标签等于值*配对。它始终是标签（或名称）和值，之间用空格、等号和另一个空格分隔。例如，在上面的最后一条指令（或属性）中，`core`是标签，`7.x`是值。\n\
  \n![images](img/square.jpg) **注意**从 Drupal 7 开始，不再需要显示`$Id$`。`drupal.org`以前使用的旧版版本控制系统\
  \ CVS 要求托管在`cvs.drupal.org`上的每个文件顶部都有一个`$Id$`注释，CVS 会将其替换为提交时间和提交者名称。在使用 Git 和`git.drupal.org`的今天，这已无必要，但\
  \ Git 仍然知道谁在何时提交了什么。\n\n人类可读的`name`是模块在模块管理页面上被选中（从而被启用）所必需的。没有机器名称指令；它从`.info`文件名中读取。虽然技术上并非必需，但包含`description`是模块开发者的最低礼仪。`core`指令必须设置为`7.x`，否则\
  \ Drupal 7 将拒绝与该模块协作。（目前 Drupal 不允许模块要求特定的次要“点发布”版本，但您可以通过声明某个特定版本的 core 系统模块作为模块的依赖项来绕过此限制。依赖项指令将在下一部分介绍。）\n\
  \n\n\n##### `dependencies[]`\n\n最常见的可选指令之一是 `dependencies[]`，它列出模块运行所需的任何模块的系统名称。如果你决定让前面的示例依赖于\
  \ Views 模块，你需要在 `.info` 文件中添加一行 `dependencies[] = views`。\n\n你只应列出**直接**依赖关系。例如，Views\
  \ 依赖于 CTools，但只有当你的模块直接使用 CTools 时，才应在模块中列出 CTools。这有助于避免列出虚假的（过时的）依赖关系。同理，如果你修改模块使其不再依赖另一个模块，就应将其从依赖关系中移除，这样站点构建者就不会被迫安装额外的模块。\n\
  \n方括号是做什么用的？当一个指令可以有多个值时，名称末尾会加上数组表示法 `[]`，以便根据需要重复该指令多次。因此，一个同时依赖核心 Help 模块和贡献模块\
  \ Views 的模块，需要重复两次 `dependencies[]` 指令，如清单 18-4 所示。\n\n> **注意：** 从 Drupal 7 开始，每个依赖项必须单独列在一行，针对模块依赖的每个模块的系统名称重复\
  \ `dependencies[] = system_name`。\n\n**清单 18-4.** 需要两个其他模块的模块的 `.info` 文件\n\n```\n\
  ; 要求启用核心 Help 模块和贡献模块 Views。\ndependencies[] = help\ndependencies[] = views\n```\n\
  \n清单 18-4 中的第一行是注释。在 `.info` 文件中，注释由行首的分号（`;`）标识。因此，`.info` 文件中任何以分号开头的行都会被 Drupal\
  \ 忽略。由于 `.info` 文件非常简单且不言自明，通常不需要在模块的 `.info` 文件中添加注释。清单 18-4 接下来的两行是两个依赖项，即 Help\
  \ 和 Views 模块的机器名称。（请记住，机器名称可能与人类可读的名称有很大差异。例如，Views Bulk Operations 模块的机器名称是 `vbo`。）\n\
  \n##### 版本特定依赖项\n\n依赖项可以指定模块的特定版本，例如 `>=3.x` 表示任何 3.x 或更高版本。对于贡献模块，这是模块版本字符串中 Drupal\
  \ 版本之后的第二部分，因此 `dependencies[] = views (>=3.x)` 将允许 Views 7.x-3.0（以及 4.x 系列，如果存在）但不会允许\
  \ Views 7.x-2.9。请注意，即使是最简单的版本字符串，也需要括号。以下是复杂版本感知依赖项规范的示例，由 Károly Négyesi (chx)\
  \ 提供：\n\n`dependencies[] = foo (>=2.x, <4.17, !=3.7)`\n\n这意味着你需要 `foo` 模块的主版本至少为\
  \ 2，并且版本低于（但不包括）4.17，同时排除存在严重错误的版本 3.7。\n\n如前所述，你可以使用这种形式的 `dependencies[]` 指令来要求特定版本的\
  \ Drupal 核心。如果 Drupal 7.0 中存在阻止你的模块正常工作的错误，并且在 Drupal 7.1 中已修复，你可以要求系统模块（一个始终需要启用的核心模块）版本为\
  \ 7.1 或更高，如下所示：\n\n`dependencies[] = system (>=7.1)`\n\n##### `configure`\n\n`configure`\
  \ 指令是可选的，但强烈推荐使用，它允许你提供模块配置页面的路径。当模块启用时，Drupal 会使用此路径在模块管理页面上提供一个链接。以下是核心搜索模块中 `configure`\
  \ 指令的示例：\n\n`configure = admin/config/search/settings`\n\n（目前 X-ray `.info` 文件中没有\
  \ `configure` 行，但当你创建配置页面以链接到时，会添加一行。）\n\n> **注意：** 从 Drupal 7 开始，`configure` 指令通过在模块页面的列表中提供指向模块配置页面的链接，极大地改善了站点构建者的体验。（我非常喜欢这个配置链接。）\n\
  \n##### `package`\n\n另一个可选指令是 `package`，用于在模块管理页面（`admin/modules`）上对模块进行分组。如果你不确定模块的包名是什么，建议完全跳过它。省略\
  \ `package` 会将你的模块归入“Other”类别。如果你的模块属于某个模块组，你可以通过使用相同的包名将它们放在一起。\n\n> **注意：** 关于如何使用\
  \ `package` 指令对模块进行分组，在 Drupal 中尚未形成定论。请留意手册页面（`drupal.org/node/542202#package`）以了解政策更新，同时关注包维基页面（`groups.drupal.org/node/97054`）以了解模块维护者所做的选择。如前所述，如有疑问，就省略它。\n\
  \n你会将你的 X-ray 模块放在 Development 包中，这是建议的开发相关模块的位置。你可以使用任何代码或纯文本编辑器创建和编辑模块的 `.info`\
  \ 文件；**不要**使用富文本编辑器或文字处理器。（有关如何使用 Vim 编辑器（大多数 Web 服务环境中都有）的简要信息，请参阅 `dgd7.org/vi`。）创建或编辑\
  \ X-ray 模块的 `.info` 文件，将 `package` 指令设置为 \"Development\"，如清单 18-5 所示。（请注意，与 `dependencies[]`\
  \ 不同，此指令与 `name` 和 `description` 一样，需要使用正确的大小写。）\n\n**清单 18-5.** 添加了包信息的 `xray.info`\
  \ 文件\n\n```\nname = X-ray\ndescription = 显示网站的内部结构和连接。\npackage = Development\n\
  core = 7.x\n```\n\n就这样——这个 `.info` 文件告诉 Drupal 你的模块名称、描述、在“管理 > 模块”页面上分组所属的包，以及兼容的核心版本。你的模块已经准备好震撼\
  \ Drupal 世界了；它唯一缺少的就是……代码。\n\n> **提示：** 如果你在需要为新的模块编写 `.info` 文件时手头没有本书或其他参考资料，可以查看核心模块或其他贡献模块的\
  \ `.info` 文件（并忽略“由 `drupal.org` 打包脚本添加的信息”一行以下的所有内容），或者你可以在 `drupal.org/node/542202`\
  \ 找到 Drupal 7 `.info` 文件的手册页面。\n\n\n\n#### `.module` 文件\n\n第二个文件，即 `.module`（\"\
  点模块\"）文件，用于告知你的模块要执行什么操作。其重要性并不取决于文件长度；它甚至可能比 `.info` 文件还要短！（诚然，它通常要长得多。）\n\n`.module`\
  \ 文件的机器名必须与 `.info` 文件相同，而两者的机器名都应与其所在文件夹的名称一致。（模块不必与所在文件夹同名，但出于对站点构建者和其他模块开发者的便利考虑，通常建议这样做。即使是包含多个模块的项目，每个模块也都应有自己的文件夹，且多模块项目中所有模块的机器名都应以项目名开头。）\n\
  \n对于 X-ray 模块来说，项目名、文件夹名和机器名均为 `xray`，因此主模块文件名将是 `xray.module`。像打开所有 PHP 代码文件一样，使用完整的\
  \ `<?php` 标签来打开你的 `.module` 文件，该标签用于标识文件包含待处理的 PHP 代码，如下所示：\n\n`<?php`\n\n我强调这一点，是因为本书中的许多代码示例*不会*包含这一行，但所有代码都应置于以\
  \ `<?php` 开头的文件中。没有起始行，任何 PHP 代码都无法运行。\n\n接下来，对于 `.module` 以及每个代码文件，添加一条注释来解释整个文件的用途。它使用\
  \ docblock 注释，这是 Drupal 编码标准认可的两种 PHP 注释风格之一。注释非常重要，本章有专门的一节对其进行描述。\n\n##### 代码注释\n\
  \n以 `//` 开头的单行注释样式用于函数内部，例如函数 `xray_form_alter()`。两个斜杠后至行尾的所有内容均被忽略，因此跨越多行的内联注释需要每行都以\
  \ `//` 开头。X-ray 模块目前还没有函数内联注释的示例，但你很快就会看到并编写大量的此类注释。\n\n`.module` 文件的前几行是另一种类型的注释，称为\
  \ *docblock*，即 *doc*umentation（文档） *block*。让我们逐一分解。首先是 `@file` 标记，用于描述整个文件的用途（参见列表\
  \ 18–6）。对于 `.module` 文件，其描述通常与 `.info` 文件中的模块描述类似。\n\n**列表 18–6.** 文件开头和函数前的 Docblock\
  \ 格式代码注释\n\n```\n/**\n * @file\n * 帮助站点构建者和模块开发者调查站点。\n */\n\n/**\n * 实现 hook_form_alter()\
  \ 以显示每个表单的标识符。\n */\nfunction xray_form_alter(&$form, &$form_state, $form_id) {\n\
  \  // 这是一条内联注释，告诉你代码已被移除。\n}\n```\n\nPHP 的 `/* */` C 风格注释从起始的 `/*` 到结尾的 `*/`，注释掉两者之间的所有内容，并且可以跨越多行。在\
  \ Drupal 中，它仅用于函数*外部*，通常用于介绍函数。在列表 18–6 中，这种块状注释借助 `@file` 标识符来介绍文件。请注意，Drupal 编码标准要求不仅仅是简单的注释开始和结束标签：注释开头需多一个星号（`/**`）；注释的每一行都以一个空格、一个星号和一个空格（`\
  \ * `）开头；结尾处缩进一个空格（` */`）。\n\n同样的 docblock 标记用于介绍你模块中目前唯一的那个函数。此注释必须紧邻函数上方，两者之间不得有空行。其第一句话必须适合单行，包括必须有的句号，额外的描述或解释行必须用空注释行分隔。在这种情况下，作为简单的钩子实现，一行文档说明就足够了。该注释告知任何阅读代码的人，函数\
  \ `xray_form_alter()` 实现了 `hook_form_alter()`。\n\n等等，“实现了 `hook_form_alter()`”？这到底是什么意思？\n\
  \n### 钩子\n\n钩子是神奇的门户，它允许任何模块（包括你的模块）出现在 Drupal 的其他部分并执行操作。当 Drupal 执行它认为重要的操作时（如加载内容、保存用户账户、显示评论等），它会稍作停顿，邀请所有已安装的模块进行观察或干预。每个钩子都是你的模块针对\
  \ Drupal 正在做的事情做出响应的机会——根据 `api.drupal.org/hooks` 上的列表，Drupal 核心共有 251 个钩子。\n\n\
  钩子名称中的“hook”是实现模块的短名称的占位符。它代表了允许函数以这种特殊方式运行的命名约定。当调用一个典型的钩子时，Drupal 会遍历所有启用的模块，寻找以模块名开头并以钩子名结尾（不包括“hook”一词）的函数。因此，要实现一个钩子，只需将钩子名称前面的“hook”部分去掉，替换为你的模块短（机器）名。这就是为什么\
  \ `hook_form_alter()` 在 X-ray 模块中是由函数 `xray_form_alter()` 实现的。\n\n![images](img/square.jpg)\
  \ **提示** 如果你看到一个函数 `hook_anything_whatsoever()`，它是一个演示如何使用该钩子的示例（因此应存在于 `.api.php`\
  \ 文件中，例如 `modules/system/system.api.php`）。你模块的函数不会以“hook”开头。实现钩子的函数*会*在其文档块注释中说明它实现了哪个钩子，但函数名本身会使用模块的短名称代替“hook”一词。\n\
  \n从计算机科学的角度来看，Drupal 的钩子符合控制反转系列设计模式中的事件驱动模式。每次使用 `module_invoke_all()`（或调用钩子的变体方法）都是一个事件，Drupal\
  \ 的其他部分（包括贡献模块）可以对此做出响应（不响应也完全可以）。例如，当评论模块显示一条评论时，它会运行以下代码：\n\n```\nmodule_invoke_all('comment_view',\
  \ $comment, $view_mode, $langcode);\n```\n\n以便通过实现 `hook_comment_view()` 为任何模块提供对评论进行操作的机会。评论对象通过引用传递给实现函数，以便可以直接对其进行更改。视图模式和语言代码作为上下文提供，在响应正在被查看的评论时可以将其考虑在内。钩子函数签名描述了传递给钩子的内容，每个函数签名都可以在\
  \ `api.drupal.org` 上看到。例如，`hook_comment_view()` 的定义可以在 `api.drupal.org/hook_comment_view`\
  \ 找到。每个钩子的 API 文档还会说明钩子实现是否以及应该返回什么。\n\nLarry Garfield (crell) 写道，在 PHP 应用历史上所采用的程序化系统中，这种钩子方法是一种保持代码松散耦合的极好方式，这意味着只要你知道其他代码想要什么，你的代码就无需了解你与之交互的代码是如何运作的。有关编程方法以及其中一些方法与\
  \ Drupal 的关系的更多信息，你可以阅读 crell 的博客 [`garfieldtech.com/blog/language-tradeoffs`](http://www.arfieldtech.com/blog/language-tradeoffs)。至于这对你的模块意味着什么，请阅读关于\
  \ Drupal 如何在页面上显示帮助文本的边栏。\n\n![images](img/square.jpg) **提示** Drupal 开发者和教育家 Chacha\
  \ Sikes 说，学习如何使用钩子的最佳方法是下载几个贡献的 Drupal 模块，并找到钩子实际使用的位置。然后，你可以将正在使用的钩子与 `api.drupal.org`\
  \ 上的钩子定义进行比较，看看模块开发者是如何弄清楚如何实现该钩子的。\n\n\n\n##### Drupal 核心中定义的所有钩子都可以在 `api.drupal.org`\
  \ 上查询到。许多由贡献模块定义的钩子则可以在 `drupalcontrib.org` 上查阅。所有这些文档均由 Drupal 代码中的注释生成，因此你可以自行安装（目前为\
  \ Drupal 6 版本的）API 模块（`drupal.org/project/api`），或者直接查看你感兴趣的模块代码。如果一个模块定义了钩子，它通常会包含一个\
  \ `.api.php` 文件，其中提供了如何使用这些钩子的示例。\n\n##### Drupal 如何利用钩子在页面上显示帮助文本\n\nX-ray 模块将大量使用\
  \ `hook_help()` 来在其调查的页面的帮助区域中显示文本。将以下代码放置在 `xray.module` 文件中，就足以在访问管理 > 结构（`admin/structure`）页面时，向帮助区块添加文本：\n\
  \n```\n<?php\n// [因篇幅原因，现有代码未显示]...\n/**\n * 实现 hook_help()。\n */\nfunction xray_help($path,\
  \ $arg) {\n  if ($path == 'admin/structure') {\n    return t('这个网站有内容！');\n  }\n\
  }\n```\n\n在结构管理页面顶部显示“这个网站有内容！”这段文字似乎是一项简单的任务——好吧，它*确实*是一项简单的任务——然而，这段文本如何到达那里的复杂性，正是\
  \ Drupal 强大力量的秘密源泉。你不需要了解钩子如何工作就能使用它们，但理解 Drupal 的工作原理也绝不会有什么坏处。让我们简短地走一遍 Drupal\
  \ 如何在页面上放置帮助文本的流程。\n\n##### Drupal 将路径转化为页面：`hook_menu()`\n\nDrupal 正在处理它的常规事务，这通常意味着显示一个网页。你点击了工具栏中的“结构”链接（`admin/structure`）。你的浏览器告诉\
  \ Drupal，这就是你想要访问的页面。每个路径最终都会匹配到一个包含页面回调函数的菜单项，该函数主要负责显示该路径的页面。这些菜单项由 `hook_menu()`\
  \ 的实现提供，并存储在 `menu_router` 表中。（菜单系统在第 29 章中有更详细的介绍。）\n\n菜单项可以包含用于判断请求页面的用户是否具有访问权限的信息，以及在调用页面回调函数之前是否需要包含某些文件。处理完主要内容后（通常是一个可渲染的数组或\
  \ HTML 片段，在本例中，是结构部分内管理链接的列表），Drupal 也会着手加载页面的所有其他区域。它从当前使用的主题中获取可用的区域，并从区块系统中获取分配给该主题每个区域的区块。所有这些信息都是由\
  \ Drupal 调用钩子来提供的。Drupal 核心代码的其他部分，或者你添加的贡献代码或自定义代码，会通过实现这些钩子的函数来响应这些调用。\n\n而在执行到你那个小小的帮助钩子之前，还有一个重要的钩子要走。\n\
  \n##### Drupal 显示区块：`hook_block_view()`\n\n当处理到 `system_help` 区块（默认情况下，它将自己分配到帮助区域）时，Drupal\
  \ 会调用 `hook_block_view()` 的一个特定实现。也就是说，Drupal 这里遵循了一种替代模式，而不是遵循在所有实现该钩子的模块中调用钩子的常见模式：它只在一个特定模块中调用该钩子的实现。Drupal\
  \ 根据提供该区块的模块名称（`system`）和钩子名称（`block_view`）来构造一个函数名。基于模块名称和钩子名称组合来调用函数的命名约定，与在多个模块中调用钩子时使用的命名约定相同。这允许你说函数\
  \ `system_block_view()` *实现了* `hook_block_view()`。（有些人通过将它们称为回调函数来区分真正的钩子；请查看 `drupal.org/node/1114032`\
  \ 了解这在 Drupal 8 中是否实现。）\n\n当调用 system 模块为 `system_help` 区块实现的 `hook_block_view()`\
  \ 时，Drupal 将文本“help”作为参数传入。在 `system_block_view()` 函数内部，有一个 switch 语句来决定执行哪段代码。当给定的参数是“help”时，这个\
  \ switch 语句（以及随后的函数）会返回 `system_help` 区块所需的信息。它将区块的标题设置为空，并将区块的主体设置为 `menu_get_active_help()`\
  \ 函数返回的值。\n\n##### Drupal 收集页面帮助信息：`hook_help()`\n\n现在，Drupal 终于调用了你的模块实现的钩子，即 `hook_help()`。在\
  \ `menu_get_active_help()` 函数内部，Drupal 获取了当前访问页面的内部路由路径。然后，它大体上是这么说的：“对于每个实现了‘help’钩子的模块，给我你们为这个路径准备的内容。”它会从所有\
  \ `hook_help()` 的实现中接收返回的内容（如果有的话），并将它们合并成一个字符串。然后它将这个输出返回，用作 `system_help` 区块的主体。你的模块名为\
  \ `xray`，钩子名为 `help`。因此，你将函数命名为 `xray_help()`，并在代码注释中声明它实现了 `hook_help()`。如前所述，整个钩子系统都基于这种“模块名加钩子名”的命名约定；如果存在一个具有该名称的函数，Drupal\
  \ 就会认为该钩子已被实现，并在调用该钩子时执行该函数。\n\n![images](img/square.jpg) **注意** “对于每个实现了钩子 x 的模块”这一步，与\
  \ Drupal 调用 `module_invoke_all('x')`（其中 'x' 是去掉前缀“`hook`”的钩子名称）时所发生的事情是一样的。无论是否使用\
  \ `module_invoke_all()` 函数，每次调用钩子时都会发生非常类似的过程。\n\n`hook_help()` 的函数签名让你知道，你的函数将接收一个由\
  \ `$path` 代表的参数（你可以将*参数*或*实参*视为一条信息），并且你的函数需要返回一些文本。`hook_help()` 的函数签名定义在 `api.drupal.org/hook_help`，也定义在\
  \ Drupal 核心代码的 `modules/help/help.api.php` 文件中。\n\n![images](img/square.jpg) **提示**\
  \ 你可以像查找任何函数一样查询任何钩子——只需在 Drupal 的 API 网站 `api.drupal.org` 上搜索即可。你可以通过直接在搜索地址中输入函数或钩子名称（例如\
  \ `api.drupal.org/api/search/7/hook_menu`）来访问一个函数或钩子，或者，在搜索当前版本 Drupal 时更简洁的方法是，只需将函数名或钩子名附加到\
  \ API 网站的地址后面：`api.drupal.org/hook_menu`。请确保你正在查看的是与你所用 Drupal 版本对应的函数或钩子文档；`api.drupal.org`\
  \ 为 Drupal 5、Drupal 6 和 Drupal 7 提供了标签页。\n\n`menu_get_active_help()` 函数，在我刚才描述的事件序列中，当为结构管理页面调用时，会将参数\
  \ `$path` 设置为 `admin/structure`，并传递给每个实现 `hook_help()` 的函数。区块模块的 `block_help()`\
  \ 函数检查后告诉 Drupal，它在该路径下没有提供任何内容。节点模块的 `node_help()` 也检查并报告没有内容。分类模块的 `taxonomy_help()`\
  \ 函数以及所有其他实现了 `hook_help()` 的模块都会检查它们是否为 `admin/structure` 这个路径准备了任何内容，而它们全都表示没有。（情况并非必须如此；它们都可以为某个路径返回文本，Drupal\
  \ 会合并这些帮助文本并显示在页面上，但这正是之前 `admin/structure` 页面上没有任何帮助信息的原因——无论你的模块是否启用，所有这些过程都会发生。）最后，`menu_get_active_help()`\
  \ 询问 X-ray 模块的 `xray_help()` 是否为 `admin/structure` 路径准备了内容。\n\n```\nfunction xray_help($path,\
  \ $arg) {\n  if ($path == 'admin/structure') {\n     return t('这个网站有内容！');\n  }\n\
  }\n```\n\n\n\n\n在`xray_help()`内部，它接收`$path`参数并检查其是否等于文本“admin/structure”。发现相等后，该函数会惊叹“OMG!”，并立即将文本“This\
  \ site has stuff!”返回给`menu_get_active_help()`，后者再将同一文本沿调用栈向上传递至`system_block_view()`。`system_block_view()`返回该文本（同时合并了之前设置的空标题）给\
  \ Block 模块——你在六个段落之前最后一次见过它，但幸运的是 Drupal 的运行速度远快于这个故事。\n\n![images](img/square.jpg)\
  \ **提示** 关于`$path`参数及尚未提及的`$arg`参数的详细信息，请参见第 20 章中的`hook_help()`函数签名。\n\n这一过程达到了不错的戏剧效果，但\
  \ X-ray 模块之所以最后被询问路径，仅仅是因为其字母顺序靠后。如果你有一个 Zebra 模块及其函数`zebra_help()`，或某个被有意设为更高权重的模块，它们中的任何一个都会在你的模块之后被调用。所有实现了`hook_help()`的模块都会被调用。除非你关心自己的帮助文本在页面上的排序（是在其他提供帮助文本的模块之前还是之后），否则调用顺序影响不大。另请注意，你的`xray_help()`函数会在*每个*页面请求时被此事件链调用，但在其他所有页面上，它将`$path`与“admin/structure”比较后，发现两者不相等且无话可说，因此返回空值。\n\
  \n**Drupal 允许修改区块：`hook_block_view_alter()`与`hook_block_BLOCK_ID_view_alter()`**\n\
  \nBlock 模块在从`system_block_view()`接收到响应后，立即构建区块。随后，它通过`drupal_alter()`触发另一个钩子，允许任何模块实现`hook_block_view_alter()`并基于区块的机器名称（此处为`system_help`）修改区块的标题或正文。实际上，Drupal\
  \ 在此阶段提供了两个 alter 钩子；第二个是精确命名的`hook_block_view_system_help_alter()`，供需要精准定位`system_help`区块进行修改的模块使用。你未实现任何钩子，其他模块也未实现，但关键在于你可以这么做——这是\
  \ Drupal 构建灵活性和可扩展性的另一种方式。\n\n![images](img/square.jpg) **注意** 除非绝对必要，否则不要使用 alter\
  \ 钩子。你可以让 X-ray 模块拥有一个名为`xray_block_view_system_help_alter()`的函数，并通过修改该特定区块来将文本附加到帮助区块内容中。但你需要自行判断当前路径，更重要的是，这是错误的方法，因为它偏离了\
  \ Drupal 为帮助文本建立的系统。你应该始终在 Drupal 为你提供的第一个机会点完成任务。延迟操作意味着错失 Drupal 提供的工具，并剥夺其他模块对你模块中操作进行响应和处理的机会。\n\
  \n**钩子让 Drupal 拥抱变化与扩展**\n\n从 Drupal 在页面显示帮助文本时使用钩子的过程，你能真切感受到 Drupal 的思维方式。Drupal\
  \ 并未硬编码页面的区域集合，而是从主题中获取。它允许任何模块提供可放置于任意区域的区块。在其自身代码中，当提供帮助区块时，它允许任何模块在其中插入帮助消息。此外，为了周全考虑，它允许任何其他模块尝试修改此区块。（页面渲染层在输出前还会提供一次修改页面部分内容的机会。）总体而言，Drupal\
  \ 的每个操作都有对应的钩子——这就是为什么无论你需要什么功能，总有一个模块能实现（或即将实现！）。\n\n![images](img/square.jpg)\
  \ **注意** 上述故事由调试工具讲述。第 12 章与`dgd7.org/ide`讲述了阅读你自己的“Drupal 生命周期中的页面请求”冒险故事所需的工具。\n\
  \n### 技术技能\n\n即使你熟悉 PHP 和 Drupal 的编码标准，也值得快速浏览本节——总能学到新东西。事实上，在编写本节时我也学到了新知识。\n\n\
  #### PHP 基础\n\n有人会告诉你，在深入 Drupal 内部之前应该先学习 PHP 和 SQL。对此你可以回应称，作者们很快就会提醒你这些缩写词的含义，然后你就能顺利跟上。PHP\
  \ 是 Drupal 的编程语言（其缩写现已基本无实际含义，官方定义为递归缩写“PHP: Hypertext Preprocessor”）。PHP 几乎能在任何运行\
  \ Web 服务器的地方运行，且极容易被找到。SQL（结构化查询语言）用于与关系型数据库通信——Drupal 默认将其配置和内容存储在其中。\n\n学习 PHP\
  \ 和 SQL 当然是个好主意，但从 Drupal 开发入手并边学边用也是可行的。由于这是一本书而非多卷系列丛书，本书采用“通过 Drupal 学习一切”的方法。我将在本节介绍一些\
  \ PHP 基础知识；SQL 将在第 19 章关于 Drupal 数据库层的部分提及。\n\n编程（无论是 PHP 还是其他语言）本质上就是逻辑——几乎字面意义上的逻辑——这使它在某些方面简单，另一些方面困难。你可以通过学习语法并应用基本逻辑来掌握任何编程语言的基础。另一方面，人们可以攻读逻辑学博士学位，而这还未考虑不同编程语言的特性。但别担心，你将直接上手学习\
  \ PHP 基础，并在 Drupal 编程的框架中实践应用。\n\n最好的学习建议是阅读大量 Drupal 代码。每当遇到不理解的操作或函数时，请到`php.net`（用于通用\
  \ PHP 函数）或`api.drupal.org`（用于 Drupal 专用函数）查询。如果在 Drupal 核心中看到一个函数，它必定出现在这两个网站之一。\n\
  \n![images](img/square.jpg) **提示** 官方 PHP 网站`php.net`是绝佳资源，每个函数都有详尽的文档，并附有先行者们的实践经验评论。此外，通过在网站\
  \ URL 后直接输入函数名即可轻松找到定义。要查找`substr()`函数的定义，你可以在浏览器中输入`php.net/substr`；若记不清准确函数名，可尝试猜测。从`php.net`的建议中选择一个，并查看大多数函数定义下方的“参见”部分，通常比全局搜索更高效。如果我有模糊印象，我会首选`php.net`进行查询。\n\
  \n\n\n\n### 术语\n\n代码中有一些词在最初看起来似乎只是为了混淆视听；然而，使用一段时间后，你会发现离开它们简直无法表达。\n\n- *字符串*（string）字面上就是一串字符。它可以是一个单词、一个短语，或者一组随机的字符。最接近的非术语表达大概是“文本块”。它可以是一个字符，也可以完全没有文本，这种情况被称为*空字符串*（empty\
  \ string）。\n- 整数（integer）是不带小数点的整数，可以是正数或负数，或者如 PHP 手册所述：“集合 **Z** = {..., -2, -1,\
  \ 0, 1, 2, ...} 中的数字。”（`php.net/integer`）\n- *数组*（array）可以容纳各种其他变量类型（字符串、整数、对象），甚至可以容纳更多数组！后者在\
  \ Drupal 中频繁出现，被称为*嵌套数组*（nested arrays）。关联数组拥有键（keys），这些键是指向值的整数或字符串；而值，如前所述，可以是任何内容。\n\
  - *对象*（object）在 Drupal 中有时与数组类似，用于保存一组相关数据（例如 `$user` 对象或 `$node` 对象）。对象的功能远不止于此，例如可以从父对象继承信息和功能，并定义自己的方法（即特定于该类型对象的函数）。\n\
  - *变量*（variable）是一个带有标签的容器，用于存放可以更改的值。PHP 中的变量必须以美元符号开头，例如 `$name_of_variable`。变量可以是字符串、数字、数组、对象或其他变量类型，例如非整数的数字，称为*浮点数*（floats）。\n\
  - *函数*（function）是一段可以通过名称调用的代码。它可以接收变量（作为参数，将在下一部分介绍），并可以返回一个值。你可以定义自己的函数，每个函数在其内部使用的变量拥有局部作用域，从而使函数代码与其他代码隔离。为模块编写的所有代码都应位于你定义的函数内。前面已经见过的\
  \ `xray_form_alter()` 和 `xray_help()` 都是函数。\n- *参数*（parameters，也称为 *arguments*）允许调用函数的代码向该函数发送信息。函数期望的一个或多个参数构成了该函数的签名（signature）。\n\
  \n虽然 PHP 对于遇到一个之前未被告知的空变量只会轻微抱怨，但你应该始终*初始化*（initialize）你的变量。这意味着在首次使用变量之前或使用之时就对其进行定义。函数允许定义默认参数，这有助于确保这些变量的初始化。例如，一个名为\
  \ `example_takes_arguments` 的函数定义为 `function example_takes_arguments($text = 'Hi.')\
  \ { ... }`，那么变量 `$text` 将在函数内部可用（在替换 `...` 的代码中），并赋值为 'Hi.'。\n\n### 运算符与条件语句\n\n\
  运算符（operator）是接收一个或多个值并返回一个值的符号。值也称为表达式（expression），这意味着任何能够返回值的组合确实都是一个“值”。\n\n\
  #### 赋值运算符\n\n最常见的运算符是赋值运算符（等号），用于为任何变量赋值或赋予某个表达式的结果。\n\n```\n$num = 5;\n$an_array\
  \ = array(\n  'a_number' => $num,\n  'a_letter' => 'k',\n);\n$another_array = array(\n\
  \  'a_letter' => \"如果合并，这将用一句话覆盖掉 k。哎呀。\",\n);\n$function_result = array_merge($an_array,\
  \ $another_array);\n```\n\n这些略显随意的例子都使用了赋值运算符 `=`，而事实上你会不断使用它来设置变量的值。注意，最后变量 `$function_result`\
  \ 的值为：\n\n```\narray('a_number' => 5, 'a_letter' => 如果合并，这将用一句话覆盖掉 k。哎呀。\",\n```\n\
  \n#### 字符串运算符\n\n字符串运算符包括连接运算符（concatenation operator），根据 Drupal 编码标准，该运算符两侧始终用空格分隔，如下所示：\n\
  \n```\n$end = \" 字符串的结尾\";\n$msg = \"字符串的开头\" . $end;\n```\n\n连接赋值运算符（concatenating\
  \ assignment operator）可以取字符串中已有的内容，并在其末尾追加内容。\n\n```\n$msg .= \"!!!\";\n```\n\n\
  最终得到的字符串 `$msg` 为：\n\n`字符串的开头 字符串的结尾!!!`\n\n#### 算术运算符\n\n从简单的加法到取余运算，这些运算符的作用方式与计算器上的符号相同。\n\
  \n- `5` `+` `2` 返回 `7`\n- `5` `-` `2` 返回 `3`\n- `5` `*` `2` 返回 `10`\n- `5` `/` `2`\
  \ 返回 `2.5`\n- `5` `%` `2` 返回 `1`\n\n#### 比较运算符\n\n比较运算符用于比较两个值。例如：\n\n- `5 == 2`\
  \ 返回 `FALSE`（等于；不要忘记两个等号，否则它就成了赋值运算符，因此在比较变量与值或其他变量时始终为真）；`\"apple\" == \"apple\"\
  ` 返回 `TRUE`。\n- `5 != 2` 返回 `TRUE`（不等于）。\n- `5 < 2` 返回 `FALSE`（小于）。\n- `5 > 2` 返回\
  \ `TRUE`（大于）。\n- `5 <= 2` 返回 `FALSE`（小于或等于）；`3 <= 3` 返回 `TRUE`。\n- `5 >= 2` 返回 `TRUE`（大于或等于）；`3\
  \ >= 3` 返回 `TRUE`。\n\n还有两个非常重要的比较运算符。它们是*恒等比较*（identity comparisons），在尝试比较之前会先检查两个值是否属于同一类型。这意味着，例如\
  \ `FALSE` 不会等于空数组，字符串不会转换为整数进行比较（这是一个不错的额外好处，因为这种转换可能导致意外结果）。它们也比相等比较更快。示例如下：\n\n\
  `1 === TRUE` 返回 `FALSE`，而 `1 === 1` 返回 `TRUE`。\n\n`'' !== array()` 返回 `TRUE`。\n\n\
  #### 三元运算符\n\n*三元运算符*（ternary operator）是 Drupal 偏向于更分散、更易理解代码的一种偶尔允许的例外情况。三元运算符既紧凑又令人困惑。\n\
  \n```\n$resulting_value = ($condition) ? \"如果为 TRUE 的值\" : \"如果为 FALSE 的值\";\n```\n\
  \n让我们从括号内开始（括号并非必需，但属于最佳实践）。首先会计算此处的表达式。它可以是一个简单的变量，也可以是一组复杂的逻辑判断。通常它会是一个变量或一个直接的比较，例如\
  \ `($maybe_seven == 7)`。如果计算结果为 TRUE，则返回紧跟问号后面的值。如果第一个表达式计算结果为 false，则返回冒号后面的值。（严格来说，这两个值也可以是表达式，因此被称为第二个和第三个表达式。）更多信息，请参阅\
  \ `php.net/ternary` 的 Comparison Operators 页面。\n\n![images](img/square.jpg) **注意：**\
  \ 你经常会遇到这样的情况：你想将一个变量设置为某个值，*前提是*该值非空或非零，例如 `$result = ($value) ? $value : \"default\"\
  `。在这种情况下，三元运算符看起来没那么紧凑，因为你重复使用了变量来进行测试和赋值。你只能等待 Drupal 8 了：Drupal 7 要求最低 PHP 版本为\
  \ 5.2，而直到 PHP 5.3 你才可以省略三元运算符的中间部分。在 PHP 5.3 中，表达式 `$value ?: \"default\"` 如果 `$value`\
  \ 计算结果不为 FALSE，则返回 `$value`，否则返回 “default”。（如果你有更充分的理由要求 PHP 5.3 及以上版本，可以在你的 `.info`\
  \ 文件中添加 `php = 5.3` 一行，将其声明为模块或主题支持的最低版本。）\n\n\n\n#### 逻辑运算符\n\n在 Drupal 中，常见的比较运算符如下：\n\
  \n*   `$a && $b`：如果 `$a` **和** `$b` 均为 `TRUE`，则返回 `TRUE`。\n*   `$a || $b`：如果 `$a`\
  \ **或** `$b` 为 `TRUE`，则返回 `TRUE`。\n*   `!$a`：如果 `$a` **不**为 `TRUE`，则返回 `TRUE`。\n\
  \n词语“`and`”和“`or`”也可以使用，它们分别作为 `&&` 和 `||` 的低优先级（稍后求值）版本。（还有一个逻辑运算符 `xor`，其作用是：当\
  \ `$a` 和 `$b` **仅有其一**为 true 时，表达式 `$a xor $b` 返回 true。）\n\n你可以在 `php.net/operator`\
  \ 找到更多类型的运算符（以及更详细的说明）。\n\n### 控制结构\n\nPHP 使用控制结构来决定运行或*执行*哪段代码。通常，这种决策会借助条件语句来完成，例如等于（`$a\
  \ == $b`）、全等（`$a === $b`）、小于（`$a < $b`）、大于或等于（`$a >= $b`）等，这些内容在上一节关于比较运算符的部分已经讨论过。\n\
  \n#### if、elseif 和 else 语句\n\n`if` 语句可以单独使用，也可以后跟一个 `else` 语句（当 `if` 的条件判断为 FALSE\
  \ 时执行），或者可以使用 `elseif` 语法形成 `if` 语句链。这个链也可以以 `else` 语句结尾，当上述所有条件均不满足时执行。示例请参见清单\
  \ 18–7。\n\n***清单 18–7.** 链式 if/else 语句*\n\n```\nif ($advice == 'good') {\n  $do\
  \ = 'Follow it.';\n}\nelseif ($advice == 'bad') {\n  $do = 'Don\\'t follow it.';\n\
  }\nelse {\n  $do = 'Who knows?  If all else fails, do as you please.';\n}\n```\n\
  \n![images](img/square.jpg) **注意** 请注意字符串 *Don't follow it* 中的撇号。这个撇号用反斜杠（`\\`）进行了*转义*，因为在纯文本中，撇号与单引号是同一个字符，而单引号正是用于表示字符串开始和结束的字符。如果你使用双引号来界定字符串，则不需要转义单引号——但你将需要使用反斜杠来转义字符串中的任何双引号。\n\
  \n这些 `if()` 语句使用了比较运算符。当一个 `if()` 语句仅提供一个表达式进行求值时，它也可以执行隐式比较：如果该表达式具有任何非零、非空的值，该语句将判断为\
  \ TRUE，因此无需使用“`== TRUE`”。只需使用：\n\n```\nif ($condition) {\n  // Take example action\
  \ when condition is true.\n  take_example_action();\n}\n```\n\n在表达式前面加一个感叹号会反转其真/假求值，例如：\n\
  \n```\nif (!$condition) {\n  // Take example action when condition is false.\n \
  \ take_example_action();\n}\n```\n\n#### switch 和 case 语句\n\n另一种控制结构是 switch 语句，它内部使用任意数量的\
  \ case 语句。它并不能完成 `if`、`elseif`、`elseif`、`elseif`... 语句链做不到的事情，但被认为是一种更简洁、更易读的将一个值与多个选项进行比较的方式。\n\
  \n你之前只有一个 case，由 `if ($path == 'admin/structure')`... 语句处理。现在，你要将 path 变量与更多可能性进行比较（在清单\
  \ 18–8 中有五种），因此你已用 switch/case 语法替换了 `if` 语句。（你还将消息处理转移到了辅助函数中。稍后你会查看这些函数的具体内容。）\n\
  \n***清单 18–8.** 在 xray_help() 的一个版本中使用的 switch 语句*\n\n```\nswitch ($path) {\n  \
  \  case 'admin/content':\n      return _xray_help_admin_content();\n    case 'admin/structure':\n\
  \      return _xray_help_admin_structure();\n    case 'admin/appearance':\n    \
  \  return _xray_help_admin_appearance();\n    case 'admin/people':\n      return\
  \ _xray_help_admin_people();\n    case 'admin/modules':\n      return _xray_help_admin_modules();\n\
  \  }\n```\n\nswitch 语句对第一个 case 语句执行相当于 `($path == 'admin/content')` 的比较，如果判断为 true，则执行\
  \ `case 'admin/content':` 行下方的代码，以此类推处理每个 case 语句。请注意，在执行 case 语句下方的代码时，通常使用 `break;`\
  \ 语句在 case 匹配后退出 switch，但 `return;` 语句会结束整个函数，因此不需要其他任何操作。更多信息请参见 `php.net/switch`。\n\
  \n#### 循环\n\n在 Drupal 中，你最常见到的其他控制结构是循环。`while ($expression) { ... }` 语句会持续执行其花括号内的代码，只要\
  \ `$expression` 判断为 `TRUE`；当然，表达式中的变量值必须被此语句内的代码改变，以便循环最终停止。更多关于 `while` 的内容，请参见\
  \ `php.net/while`。`for ($i = 0; $i < 5; $i++) { ... }` 语句在此示例中会执行其花括号内的代码五次，对应 `$i`\
  \ 从零到四的值；更多信息请参见 `php.net/for`。最后，特殊的 `foreach ($array as $key => $value) { ...\
  \ }` 会遍历数组中的所有项，为花括号内的重复代码提供每个项的键和值。列出键是可选的。\n\n```\n      foreach ($lumps as $lump)\
  \ {\n        $variables['extra'] .= krumo_ob($lump);\n      }\n```\n\n### Drupal\
  \ 编码标准\n\n有人可能会问，为什么代码的*外观*与其*运行*方式同样重要？PHP 会忽略多余的空白，因此如果你愿意，完全可以将整个模块写在一行里，它也能工作。但这样的代码将难以阅读。当然，这是一个极端的例子——一个稻草人论证。然而在\
  \ Drupal 中，标准远高于你自己能读懂代码。你的代码必须尽可能对其他 Drupal 开发者清晰易懂；遵循编码标准对于协作至关重要。如果美感和逻辑还不足以说服你保持代码质量，那么当你违反标准时，你会被反复指出。这一章是塑造品格的章节，良好的编码习惯最好尽早养成，所以请做正确的事。\n\
  \n#### 一些重要的标准及其解释\n\n当你了解需要做什么以及为什么应该这样做时，保持代码的可读性和可维护性就更容易了。以下规则是编写模块时最重要的部分。更多规则和解释可以在\
  \ `drupal.org/coding-standards` 找到。\n\n##### 使用 <?php 开始标记\n\n始终使用完整的 `<?php` 标记，不要使用任何缩写形式。除了看起来不雅观之外，任何非\
  \ `<?php` 的形式都不能保证在所有 PHP 配置中都能正常工作。\n\n##### 文件末尾不要使用 PHP 结束标记\n\n在大多数文件中，你根本不需要使用\
  \ PHP 结束标记。每个模块文件 (`.module`)、包含文件 (`.inc`)、安装文件 (`.install`)、`settings.php` 文件和\
  \ `template.php` 文件（主题中）都应在顶部*立即*放置 `<?php`，并且不包含任何 PHP 结束标记。\n\n省略 PHP 结束标记可以防止由结束标记后的空白字符引起的常见问题。该问题会显示为如下错误：“*Warning:\
  \ Cannot modify header information - headers already sent by (output started at\
  \ `/var/www/example/drupal/sites/default/oops/oops.module.php:37`) in `/var/www/example/drupal/includes/bootstrap.inc`\
  \ on line 568*”。PHP 结束标记后的任何空白字符都会被发送到浏览器，并可能干扰输出的启动时机。\n\n当然，这条规则有一个例外：模板文件 (`.tpl.php`)，这些文件本来就应当发送输出。通常，模板文件以\
  \ HTML 开头，然后切入 PHP，再返回 HTML，如此反复，通常以 HTML 结尾。因此，PHP 结束标记不仅允许，而且必要。PHP 结束标记就是简单的\
  \ `?>`，并且应仅在模板中使用。\n\n\n\n##### 内部函数前加下划线\n\n名称以下划线开头的函数（例如 `_function_name()`）仅供模块内部使用。不应被其他模块调用。\n\
  \n为私有函数使用下划线命名约定有两个主要好处。首先，它让所有人都知道该函数仅供内部使用，如果有人使用了它，那他们的做法就是错误的，因为你保留随时删除或修改该函数的权利。你也可以更改非下划线的公共\
  \ API 函数，但除非你同时发布模块的新主分支（例如，将版本号从 1.x 更改为 2.x），否则应尽量避免这样做。其次，在内部函数前加下划线有助于防止你意外实现一个\
  \ Drupal 钩子（请记住，仅核心就有超过 250 个钩子）。\n\n> **警告** 你仍然需要在内部函数名称前加上模块名称和下划线，格式为 `_ 模块名\
  \ _ 函数()`，否则你的函数可能会与其他人的函数重名。两个同名函数会导致命名空间冲突，从而引发 PHP 致命错误，这几乎和听起来一样糟糕。\n\n#####\
  \ 缩进两个空格\n\n你应该对函数、控制结构（如循环和 `if` 语句）、数组定义以及几乎所有看起来需要缩进的内容进行缩进；并且使用两个空格，而不是一个制表符。（你可以配置某些\
  \ IDE 和代码编辑工具，在按 Tab 键时使用两个空格；参见第 12 章和 `dgd7.org/ide`。）\n\n例如，函数内的所有内容都应另起一行并缩进两个空格；该函数内\
  \ `if` 语句中的所有内容再缩进两个空格，总共四个空格。\n\n##### 所有控制语句（包括 else）另起一行\n\n`if` 语句中的 `else`\
  \ 子句应紧跟右大括号另起一行，开头不缩进：\n\n```\nif ($following_coding_standards) {\n  drupal_set_message(\"\
  Good job!\");\n}\nelse {\n  drupal_set_message(\"Follow this example!\");\n}\n```\n\
  \n##### 控制语句与其左括号之间使用空格\n\n为了使这些控制语句与函数更容易区分，请在控制条件（括号内）与控制语句名称之间用一个空格隔开；在前一个示例的\
  \ `if` 语句行中可以看到这一点。与函数类似，左大括号也与前一个元素用一个空格隔开。这就是 `\"if ($following_coding_standards)\
  \ {\"` 一行中两个空格的由来。`foreach` 语句、`while` 循环等也是如此。\n\n##### 参数之间使用空格\n\n在函数定义和函数调用的参数之间加上空格，如下所示：\n\
  \n```\nfunction space_standard($parameter, $another_parameter, $last_parameter)\
  \ {\n  _space_standard($parameter, $another_parameter, $last_parameter);\n}\n```\n\
  \n##### 所有二元运算符、连接符等两侧使用空格\n\n二元运算符是对*两个*值同时进行*操作*并返回新值的运算符。这包括比较运算符，如 `==` 或 `>=`；算术运算符，如\
  \ `+` 或 `/`；字符串运算符，如 `.` 或 `.=`；逻辑运算符，如 `&&` 或 `||`；以及赋值运算符，如 `=` 或 `+=`（后者是组合的算术和赋值运算符，就像\
  \ `.=` 是组合的字符串和赋值运算符一样）。一般规则是，只要某东西位于两个值之间，就在其两侧各加一个空格。\n\n以下代码中运算符密集。关键在于每一个运算符的两侧都礼貌地用一个空格隔开。\n\
  \n```\nif ($budget < $money || ($is_broke && !$has_credit)) {\n  $message = 'Your\
  \ remaining $' . $money - $budget . ' is not enough.';\n}\n```\n\n**关于代码含义的补充说明**\n\
  \n了解前面代码示例的含义可能对你有帮助，也可能没有帮助，但这里用*斜体*表示**值**，用**粗体**表示**运算符**：如果*预算* **小于** *资金*\
  \ **或**这个人既*破产* **且** *没有信贷*，那么将*消息* **设置为等于**一个短语，该短语由*文本字符串*（‘Your remaining $’）**连接**\
  \ *资金* **减去** *预算* 的结果，再**连接**一个结尾的*文本字符串*（‘ is not enough.’）组成。\n\n这个例子中有几个值得注意的代码技巧。首先，否定由感叹号表示。在代码示例中，它将\
  \ `$has_credit` 的含义改变为其相反面：如果 `$has_credit` 为真，则表达式 `!$has_credit` 评估为假。其次，美元符号几乎无处不在，是变量的标记，但有一个例外——在单引号内，美元符号不表示变量，它只是字符串中的一个字符。最后，两个与号——`&&`——将\
  \ `$is_broke` 和 `!$has_credit` 连接在一起，因此*两者*都必须评估为真，组合表达式才为真。另一方面，或符号——`||`——表示如果其左侧或右侧的任一表达式评估为真，则整个表达式为真。\n\
  \n##### 自动化遵守规范\n\n得益于 Stella Power (stella)、Doug Green (douggreen) 和 Jim Berry\
  \ (solotandem) 的出色工作，遵守编码规范的过程可以实现自动化。当你在第 20 章完善你的模块以准备贡献时，你将看到这一点的实际应用。\n\nStella\
  \ 的 Coder Review 模块（Coder 项目的一部分，位于 `drupal.org/project/coder`）会审查源代码文件中不符合 Drupal\
  \ 编码规范的代码，并将每个违规标记为轻微、普通或严重严重性。该模块的使用方法将在第 20 章中解释，之后你就可以与世界分享你的模块了。\n\nSolotandem\
  \ 的 Grammar Parser 库（`drupal.org/project/grammar_parser`）将更进一步，尝试重写模块文件以使其符合编码规范。目前，本文作者不采用\
  \ Grammar Parser 方法，而是信奉“食之甘苦”哲学，手动纠正编码规范错误（在 Coder Review 自动指出它们之后），但 Grammar Parser\
  \ 贡献的出色之处迟早会压倒所有反对意见。\n\n> **提示** JavaScript 也有编码规范。参见 `drupal.org/node/172169`\
  \ 和第 17 章。\n\n\n\n### 开发技巧 #1：功能异常时，请清除缓存\n\n为了提升性能，Drupal 拥有数十个用于缓存或快速存取信息的位置，而非每次需要时都从数据库和代码中重新读取解析。因此，在开发过程中，如果你看不到代码变更的效果，不一定是代码本身的问题——可能是\
  \ Drupal 的缓存和注册表尚未更新。\n\n你可以在管理后台 ![images](img/U001.jpg) 配置 ![images](img/U001.jpg)\
  \ 开发 ![images](img/U001.jpg) 性能 (`admin/config/development/performance`) 页面中，点击“清除所有缓存”按钮来手动清除缓存并重建主题和菜单注册表。你也可以通过快捷方式模块链接到该页面，或使用管理菜单等模块，通过一键点击链接即可清除所有缓存。\n\
  \n另一种清除缓存的方式是在代码的某个实际被执行（即非缓存区域）的位置添加函数 `drupal_flush_all_caches();`。`index.php`\
  \ 文件中的 `drupal_bootstrap()` 与 `menu_execute_active_handler()` 之间是一个万无一失的放置点，但请记得之后将其移除。\n\
  \n一如既往，最便捷的清除所有缓存（包括主题注册表）的方式是使用 Drush：`drush cc all`（你可在 shell 中为其设置别名以缩短命令，详情参见\
  \ `dgd7.org/162`）。\n\n无论采用何种方式清除缓存，请学会喜欢你所用的方法——因为你将频繁操作。\n\n![images](img/square.jpg)\
  \ **提示** 关于在开发时完全禁用缓存的方法，请参见第 27 章。不过，Drupal 也包含注册表机制（如 `hook_menu()` 和 `hook_theme()`\
  \ 的注册表），这些需要通过前述的清除所有缓存方法来重建。\n\n### 开发技巧 #2：任何内容缺失时，请检查权限\n\n当你添加了新的页面、区块或任意功能后，重新加载页面、清除缓存（见上文）、强制刷新页面以确保不是浏览器缓存问题，但仍然无果时，就该检查访问控制和权限了。在代码层面，当某个页面或选项卡无法正常工作时，应检查对应菜单项是否定义了访问参数或访问回调函数。在配置层面，请确保在权限页面（`admin/people/permissions`）和相应用户的编辑页面（`user/[uid]/edit`，其中\
  \ `[uid]` 为用户的数字 ID）中，已为你测试的用户授予了正确的权限。\n\n![images](img/square.jpg) **提示** 如果某个功能在登录为超级用户或管理员时正常工作，但在注销登录或使用较低权限角色时失效，那么问题几乎可以肯定出在你的权限配置上。\n\
  \n### 开发技巧 #3：将站点设置为显示所有错误\n\n在开发模块时，你希望系统能以最快速度反馈所有信息。将代码清单 18-9 中的代码添加到本地的 `settings.php`\
  \ 文件中，可确保所有通知和错误立即打印到屏幕上。（在 Drupal 6 中需要更多操作，参见 `randyfay.com/node/76`。）\n\n**代码清单\
  \ 18-9.** 添加到 `settings.php` 中以显示所有通知和错误的代码行\n\n```\nerror_reporting(-1);\n$conf['error_level']\
  \ = 2;\nini_set('display_errors', TRUE);\nini_set('display_startup_errors', TRUE);\n\
  ```\n\n第一行设置 PHP 报告所有可预见的通知和错误（-1 是一个未文档化的快捷方式）。第二行告诉 Drupal 将所有这些通知和错误作为消息显示在屏幕上（2\
  \ 对应常量 `ERROR_REPORTING_DISPLAY_ALL`，但由于加载 `settings.php` 时该常量尚未定义，因此直接使用数值）。最后两行有助于确保\
  \ PHP 错误导致的臭名昭著的“白屏死机”（WSOD）变为一个显示错误信息的屏幕。\n\n### 总结\n\n本章介绍了模块构建的基本概念，为你提供了模块的基础知识，以及\
  \ Drupal 如何在其几乎所有功能中使用钩子以允许模块扩展和修改 Drupal。本章还概述了开发模块所需的技术技能，包括 PHP 基础和 Drupal 编码标准，并提供了一些实用的开发技巧。\n\
  \n现在，你已经准备好迎接一个完整模块的开发了，这正是第 19 章的内容。\n\n![images](img/square.jpg) 提示 更多技巧和讨论请访问\
  \ `dgd7.org/intromodule`。\n\n"
