    随着你的应用程序变得越来越复杂，你对工具的需求也会越来越复杂，而拥有像 Capistrano 这样的工具可以满足许多此类需求。


    ### 12.3 全服务解决方案


    虽然 `pssh` 允许你向一组机器发出命令，Capistrano 允许你以更稳健的方式自动化部署，但还有一些更进一步的解决方案，它们可以为你完全管理目标系统。这些解决方案被称为“配置管理系统”。这些系统虽然能处理各种情况，但也带来了复杂性。对于大多数系统来说，我认为配置管理系统有些大材小用，它们增加的复杂性比解决的问题还多。然而，它们做得很好的一件事是，迫使你记录你的配置是什么（并且希望也能记录为什么这样设置）。仅仅拥有一台配置正确的服务器，并不能向未来的管理员（或未来的你自己）传达哪些配置部分是默认设置的，哪些部分是为特定目的而专门配置的。使用配置管理工具，你的系统配置既可以记录在案，也可以进行版本控制。


    作为一个喜欢极简方法的人，在系统配置方面，我真的很欣赏 Ansible 系统，它甚至不需要在远程服务器上安装任何东西。Ansible 通过 `ssh` 完成所有配置，并且很容易上手和运行。在
    [`http://ansible.com/`](http://ansible.com/) 上有一个不错的用户界面，但它需要额外的费用（尽管也有开源的 GUI
    可用）。然而，如果你只需要一个命令行工具，那么开源版本拥有所有配置管理工具中最小的占用空间之一。


    你甚至可以通过一个简单的命令从 EPEL 仓库安装它：

    '
- fmt: '`yum install -y ansible`


    然而，如果你想进行大规模部署，虽然还有其他几种选择可供参考，但许多开发者会选择 Chef。Chef 基于 Ruby 编程语言，允许开发者根据需求创建任意复杂度的配置。Chef
    还提供多种反馈机制，让你能查看所有受管服务器的状态。使用 Chef，你不仅可以随心所欲地配置服务器，还可以收集相关数据并进行分析。


    对于刚起步的应用程序，我建议只保留一份手动的配置变更日志。随着你的应用成长和成熟（并希望最终拥有数百万用户），明确你的配置管理就变得愈发重要，此时可能值得转向一个更全面的解决方案。


    我们已讨论过的某些云系统内置了一定程度的配置管理功能。GCP 的实例模板/实例组系统可以被视为一个极简的配置管理系统。简而言之，当你保持实例模板为最新时，GCP
    会将其部署到整个实例组中。而 Elastic Beanstalk 允许你使用名为“EB Extensions”的环境自定义设置，来定制部署应用的机器。尽管
    Elastic Beanstalk 技术上是一个 PaaS，但这些扩展允许你在部署目标平台上执行配置管理。


    ## 13. Linux 安全基础


    本章并非旨在成为一份云安全完整指南，而仅仅是为你指明正确的方向。安全与其说是一系列步骤，不如说是一个过程和一种思维方式。因此，本章将重点介绍你需要如何思考，以保护服务器的完整性和数据的完整性。


    ### 13.1 基本考量


    对于系统管理员来说，最重要的安全考量如下：


    *   如何降低连接到互联网的风险？

    *   在保证系统正常运行的前提下，可以运行的最少服务集是什么？

    *   如何限制对那些并非所有人都需要的服务的服务器访问？

    *   我所有的软件是否都已更新最新的安全补丁？

    *   他人可能以何种方式滥用部署在服务器上的服务，以及如何减轻这种风险？


    安全的关键在于明确服务器的用途，然后移除任何不直接服务于该用途的部分，以防止意外后果。你运行的每一个服务都是一个潜在的安全漏洞——某天可能会有人找到利用它的方法。因此，你不想暴露那些不直接贡献于核心功能的点。


    ### 13.2 检查当前服务器


    检查服务器上当前正在运行并监听的服务的最佳工具是 `ss`（socket statistics）。要查找每个正在监听连接的 TCP 服务，请以 root 身份运行以下命令：


    ```

    ss -plnt

    ```


    每一行显示 `LISTEN` 的条目都是一个正在监听 IP 连接的服务。如果“Local Address”是 `127.0.0.1`、`::1`（对于 IPv6
    地址）或节点的私有 IP 地址，这意味着该服务是受保护的——只有*机器本身上的应用程序*（或者在私有网络的情况下，私有网络上的程序）才能看到该服务。但是，如果本地地址是
    `*`、`0.0.0.0` 或 `::`（对于 IPv6 地址），则意味着任何人都可以连接到该服务。


    类似地，对于 UDP 连接，你可以执行：


    ```

    ss -plnu

    ```


    对于每个可供连接的服务（TCP 或 UDP），除非你完全确定希望他人连接，否则应确保它没有被防火墙允许。要获取防火墙允许的服务列表，请执行以下命令：


    ```

    firewall-cmd –list-all

    ```


    列在“services”和“ports”下的项目就是防火墙放行的内容。你应该允许的服务包括 `dhcpv6-client`（用于云配置网络）、`ssh`（以便你能登录）、`http`（用于非
    SSL 的 HTTP 连接）和 `https`（用于启用 SSL 的 HTTP 连接）。


    即使防火墙会阻止对未列出的任何内容的连接，如果你运行了任何监听连接但并非特别需要运行的服务，也应该禁用该服务。此外，你应该定期检查防火墙，确保其配置正确。


    此外，你应该盘点所有正在运行的进程，即使它们没有在监听连接。在 Linux 上，最好的方法是使用命令 `ps -afxww`。请注意，每个人调用 `ps`
    都有自己偏爱的方式，但这是我的做法。


    我无法给你一个应该/不应该运行的所有内容的列表。不过，最好的做法是了解每个组件的功能，并关闭你不需要的组件。运行的服务越少越好。


    你还可以使用命令 `rpm -qa` 列出你已安装的所有软件包。随着你经验的积累，你应该能够卸载不需要的程序。


    ### 13.3 Root 用户


    Linux 系统中最危险的部分是 root 用户。它之所以危险，有两个原因。首先，它是超级用户，因此拥有对其他一切的完全控制权。其次，每个人都知道它的用户名，这使得自动化的黑客工具更容易入侵。


    有几种方法可以缓解与 root 用户相关的问题，包括：


    1.  root 口令应该是安全的（即，即使是计算机也难以猜测）。实际上，*每个*用户的口令都应该是安全的。

    2.  服务器不应允许远程直接 root 登录。要阻止通过 `ssh` 的直接 root 登录，请修改 `/etc/ssh/sshd_config`。如果已存在一行
    `PermitRootLogin`，请将值从 `yes` 改为 `no`。如果没有这一行，则添加一行 `PermitRootLogin no`。保存文件后，执行
    `systemctl restart sshd`，更改将生效。此后，你将需要以普通用户身份登录，并使用 `su` 命令切换到 `root` 用户。

    3.  服务应尽量避免以 root 用户身份运行，除非有压倒性的理由这样做。如果某个服务必须以 root 身份执行某些操作，那么该服务中直接与远程计算机通信的部分不应是
    root。

    4.  用户不应长时间以 root 用户身份操作。在本书中，我们大部分时间都是以 root 用户身份操作的。实际上，用户应以自己的账户登录，然后使用 `su`
    或 `sudo` 临时切换到 root 用户以获取 root 权限。

    5.  你应该安装某种服务拒绝程序，例如 `fail2ban`，它会在特定 IP 地址经过一定次数的失败尝试后禁止其登录。


    通过防止他人成为 root 用户、运行不以 root 用户身份运行的服务，以及保护 root 账户免受外部访问，入侵者造成破坏的能力将大大降低。


    大多数管理员使用 `sudo` 来管理对 root 用户的访问。`sudo` 命令允许用户*使用自己的密码*临时获得 root 用户的访问权限，或者登录后无需密码即可获得。它已经安装在你的机器上，并允许任何属于
    `wheel` 组的用户以 root 身份运行任何命令。要将用户（例如 `fred`）添加到 `wheel` 组，请执行以下命令：


    ```

    usermod -a -G wheel fred

    ```'
