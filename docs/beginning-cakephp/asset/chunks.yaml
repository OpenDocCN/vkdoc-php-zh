- fmt: "# The Translate Behavior\n\nThe `Translate` behavior also involves more complicated\
    \ methods for working it into your application. A tutorial for this behavior would\
    \ go beyond the general purpose of this book because it would require knowledge\
    \ of another language (as well as English). So, keep in mind that if your project\
    \ requires complicated data mapping for changing language settings, the `Translate`\
    \ behavior is your best bet for working with those methods in a dynamic fashion.\
    \ In short, `Translate` can map field names, routes, and more on the fly.\n\n\
    ## Using the Containable Behavior\n\nBy supplying the model with specific find\
    \ conditions, you can effectively search through the database and filter out exactly\
    \ what you don’t want in the result set. Not only can you avoid writing and looping\
    \ through complex queries by sticking with Cake’s model functions, but you can\
    \ work with a normalized database and expand your application to accommodate more\
    \ elaborate schemas. But with all of these possibilities, you may notice that\
    \ constructing find conditions that work with the database to give you precisely\
    \ what you need can become difficult in its own right. Or, worse yet, you may\
    \ find yourself writing complex loops or helper functions to filter through the\
    \ data in the view, especially when you end up with elaborate many-to-many associations.\n\
    \nIt’s best to let the model provide the controller and view with the exact pieces\
    \ of data, but when complex associations are used, extra find methods must be\
    \ employed. This is where the `Containable` behavior comes in—it applies filtering\
    \ methods to associated models and records that allow you to be more specific\
    \ when retrieving associated data.\n\nAs with all other behaviors, `Containable`\
    \ must be included in the `$actsAs` property. To illustrate how `Containable`\
    \ works, consider how some of our blog application’s tables are arranged: posts\
    \ have many comments, tags have and belong to many posts, and users have many\
    \ posts. Now, consider this scenario: suppose you wanted to fetch a post based\
    \ on a specific comment author from the `Post` model. `Containable` makes this\
    \ operation simple.\n\nIn the controller, you could enter the following:\n\n```\n\
    $this->Post->find('all', array('contain'=>'Comment.name = \"Superman\"'));\n```\n\
    \nThis string would return all posts that contain a comment whose name value is\
    \ set to `Superman`.\n\n`Containable` can also \"contain\" associated models,\
    \ meaning you can restrict the result set to a specific model without using `unbindModel()`\
    \ or changing the recursive parameter.\n\nFor example, if you wanted to retrieve\
    \ all the posts in the database but only the associated comments (not associated\
    \ tags), `Containable` could simplify that operation with the following:\n\n```\n\
    $this->Post->find('all',array('contain'=>'Comment'));\n```\n\nWithout `Containable`,\
    \ you’d need to use `unbindModel()` to produce the same result, like so:\n\n```\n\
    $this->Post->undbindModel(array('hasAndBelongsToMany'=>'Tag'));\n$this->Post->find('all');\n\
    ```\n\n`Containable` can also return specific fields in associated result sets.\
    \ For instance, you may want only the name of the post’s author and not the additional\
    \ fields in the users table (like password and role). Using the following:\n\n\
    ```\n$this->Post->find('all',array('contain'=>'User.username'));\n```\n\nwill\
    \ still provide you with the associated user for each post but include only the\
    \ `username` and `id` fields. An example array for one returned post using `Containable`\
    \ in this way would look like this:\n\n```\nArray\n(\n    [Post] => Array\n  \
    \  (\n        [id] => 1\n        [name] => A Sample Post Title\n        [date]\
    \ => 2008-12-01 00:00:00\n         => Sample content.\n    )\n    [User] => Array\n\
    \    (\n        [id] => 1\n        [username] => sampleuser\n    )\n)\n```\n\n\
    Notice that only the `id` and `username` have been returned in the `User` array.\
    \ With `Containable`, you can apply more specific rules to the find operations\
    \ the model performs and significantly reduce the amount of data that gets passed\
    \ around your application, not to mention the amount of work done in the controller\
    \ or view to process the result sets.\n\n## Attaching and Detaching Behaviors\n\
    \nWhenever dealing with data, any application can get inundated with information.\
    \ Not just in web development but in programming in general, managing memory and\
    \ CPU load is essential for keeping the program running at optimum performance.\
    \ In the case of web development, anything you can do to decrease the load on\
    \ the server will improve the user experience, especially since speed is a factor\
    \ when considering how a user interacts with the site. The model trims the amount\
    \ of data that gets pulled from across the datasource by making use of detailed\
    \ find conditions, recursive settings, and its `bindModel()` and `unbindModel()`\
    \ functions. In a similar way the model can curb its load on the server by efficiently\
    \ attaching or detaching behaviors. Other reasons for attaching and detaching\
    \ behaviors exist that generally center on streamlining the application, whether\
    \ to decrease server load or to clean up code. A few functions are built into\
    \ the model to manage how much it uses behaviors and which behaviors get used.\n\
    \n### Detaching and Disabling Behaviors\n\nThere are two ways to trim down a model’s\
    \ use of a behavior: make the model \"turn off\" all a behavior’s callbacks or\
    \ make the model stop completely from adopting the specified behavior. The `disable()`\
    \ and `detach()` functions, respectively, perform these tasks. Simply provide\
    \ an array containing the name of each behavior to be either disabled or detached\
    \ from the current model. The only catch is that these functions are called through\
    \ the `Behaviors` class:\n\n```\n$this->Tag->Behaviors->detach(array('Tree'));\n\
    ```\n\nSo, to completely remove a behavior from working in the current model,\
    \ use the `detach()` function; to limit the callback responses the behavior will\
    \ send to the model, use the `disable()` function. When `disable()` has been used,\
    \ model functions may still use the behavior’s functions. Just remember that automatic\
    \ callback processes, such as when a record is saved to the database, will not\
    \ run; these processes will have to be called manually in the model.\n\n### Attaching\
    \ and Enabling Behaviors\n\nJust as with `detach()` and `disable()`, you can tell\
    \ the model manually when and where to use certain behaviors. With `enable()`,\
    \ you tell the model to allow the behavior to begin working during callbacks.\
    \ This means that the model will automatically consult the behavior as it performs\
    \ callback methods such as saving to the database or deleting a file from the\
    \ database.\n\nThe `attach()` function is used to start the behavior. Settings\
    \ here are passed along just as in the `$actsAs` array. Simply format an array\
    \ as you would the `$actsAs` property, and place it as the first parameter in\
    \ this function.\n\nTo test whether a specific behavior has been enabled or disabled\
    \ (not necessarily attached or detached), use the `enabled()` function. This contains\
    \ the name of a behavior and checks whether it is enabled in the model. The `enabled()`\
    \ function will return either a `true` value or a `false` value indicating whether\
    \ the specified behavior is enabled.\n\n## Writing Custom Behaviors\n\nConventionally,\
    \ behaviors are used for extending the model, so they should not contain any logic\
    \ that would normally appear in a controller or component. Here’s a simple checklist\
    \ for determining whether the particular task or set of tasks ought to be performed\
    \ by a behavior:\n\n- Does the task involve handling data for the model?\n- Does\
    \ the task do more than perform data validation?\n- Does the task perform more\
    \ than one query when fetching data?"
