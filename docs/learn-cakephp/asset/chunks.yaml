- fmt: '# Why I Wrote This Book


    I started to use CakePHP at version 1.1. The framework is wonderful and improving
    nicely, with an open and helpful staff and community. It helped me to became a
    better programmer.


    When I started to code, I did everything from scratch. I did not know about programming
    patterns, utilities, or libraries. I was able to build middle-size systems this
    way.


    After a while, I decided that mixing application logic and presentation logic
    have more cons than pros, so I started to use [Smarty](http://smarty.net/). Smarty
    was a great help. In time, it helped me to see that my best practices were really
    my worst practices. I knew I needed something more.


    I realized there are a few features I need in most of my web applications. I started
    to think about how I code and, after some time, came up with an extremely simple
    and dull framework, without really knowing that frameworks exist.


    That was when I heard about MVC (Model-View-Controller) Pattern. At first, it
    seemed like an unnecessary complication in the code, but I wanted to give it a
    try anyway. When I tried to understand MVC, I found some information about frameworks.
    I tried [CodeIgniter](http://ellislab.com/codeigniter), and then [CakePHP](http://cakephp.org/).


    The first bite of CakePHP was awful, especially because I was (and am) a big fan
    of `bake` auto-code generation. I thought that the whole framework just saved
    so much time and produced a much clearer and more maintainable code.


    But eventually, I would use CakePHP to write an online accounting system. It was
    about money, so the code should always work as expected. I spent a lot of time
    testing—by clicking links, filling out forms, typing in test data again and again—trying
    to understand why the code failed when it failed. But that was OK. That’s how
    you make things work.


    CakePHP version 1.3 came out, and then Cake 2. I wanted to upgrade, but upgrading
    seemed like such a hassle. I was reluctant. I didn’t know how much time I should
    spend upgrading, or how many hidden bugs would be in the code. Relying on error
    messages when the base framework of a third-party code changes is a nightmare.


    I had heard about unit testing, but I actually didn’t care. A code that’ll test
    my code? Silly. But I tried to understand, and I found many articles in support
    of unit testing. You can read them for yourself under “Arguments” in Chapter 2.
    Finally, I gave them a try, and they helped. They helped a lot.


    I think many of you have had similar experiences. Let’s try to shorten our learning
    curve.


    I hope this book will help you, and that my suggestions can save you some time.


    # My Development Environment


    I tried to use code examples that are independent of the environment, but, as
    we all know, this is impossible. With that in mind, following is my system and
    the software I’m using:


    - Ubuntu 16.04

    - PHP 7.0.4

    - CakePHP 3.2.8

    - PHPUnit 5.3.2

    - MySQL 5.0.12

    - MySQL Workbench 6.3.4

    - PHPStorm 10

    - xdebug 2.4.0


    # Who This Book Is For


    This book is for novice and intermediate programmers. It assumes that you have
    a general understanding of PHP and object-oriented programming (OOP).


    It’s good if you are familiar with CakePHP, especially in later chapters. But
    even if you’re not, you will probably still be able to understand most of the
    principles and codes.


    # Acknowledgments


    I would like to thank you for spending your time reading this book.


    I also should say thank you to the core CakePHP team and everybody else who’s
    contributed anything, small or big, to this wonderful framework.


    Finally, special thanks go to Italy for pizza and to Hungary for Túró Rudi—both
    are essential for web development.'
