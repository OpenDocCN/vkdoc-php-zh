    for SSL/TLS configuration. Let’s walk through the steps and code samples to set
    up SSL/TLS and HTTPS in our Laravel application.'
  trans: '

    # SSL/TLS 握手过程


    ![图 6-3](img/609480_1_En_6_Fig3_HTML.jpg)


    *图 6-3 SSL/TLS 握手过程工作流程*


    SSL/TLS 握手过程是建立客户端与服务器之间安全连接的关键序列，通过协商加密方法和交换加密密钥，确保双方能够安全通信。该过程始于客户端向服务器发送`ClientHello`消息来发起握手，该消息包含客户端支持的加密算法及其他参数信息。


    作为响应，服务器会回复一条`ServerHello`消息，从客户端提供的列表中选择最安全的参数。服务器还会提供其 SSL/TLS 证书，该证书包含服务器的公钥并作为身份验证的一种手段。随后，客户端与服务器协商密钥交换方法。这一步对于建立共享密钥至关重要，这些密钥将用于加密双方之间传输的数据，常用的方法包括
    Diffie-Hellman 或 RSA 等。


    密钥交换成功协商后，双方会交换`Finished`消息。这些消息确认握手过程已完成，并且客户端和服务器均已验证对方的加密参数。`Finished`消息经过加密，为握手过程增加了额外的安全层。


    握手完成后，客户端和服务器现在可以安全地交换加密数据。握手期间建立的共享密钥用于加密和解密信息，确保数据传输过程中的机密性和完整性。理解 SSL/TLS 握手过程对于在
    Web 应用中实现安全通信至关重要，因为它能确保交换的数据保持私密且免受篡改。


    在现代 Web 应用中，TLS 是保障通信安全的标准协议。术语`SSL`和`TLS`经常互换使用，但需要注意的是，SSL 已被视为过时，建议使用 TLS 以获得更好的安全性。


    SSL（安全套接层）及其继承者 TLS（传输层安全）是为通过计算机网络（尤其是互联网）提供安全通信而设计的加密协议。在安全语境下，这些协议在确保客户端（如
    Web 浏览器）与服务器之间交换数据的机密性、完整性和真实性方面发挥着关键作用。当用于网页浏览时，HTTPS（超文本传输安全协议）正是这些协议的应用体现，表示存在安全通信通道。


    在互联网安全领域，SSL/TLS 和 HTTPS 在保护通信和数据交换方面扮演着关键角色。SSL/TLS 协议的主要功能之一是数据加密。这些协议确保客户端和服务器之间交换的信息经过加密处理，使任何可能拦截通信的人无法读取。这种加密对于维护登录凭证、个人详细信息及金融交易等敏感信息的机密性至关重要。


    数据完整性是 SSL/TLS 的另一个关键作用。通过加密机制，这些协议确保接收方收到的数据与发送方发送的数据完全一致，防止传输过程中的篡改或未授权修改。这保证了所交换数据的准确性和可靠性。


    身份验证是 SSL/TLS 支持的一项关键特性，通过该功能，服务器的身份会向客户端进行验证。此过程有助于用户确信他们正在连接到合法且预期的网站，从而降低中间人攻击的风险。SSL/TLS
    握手过程还促进了安全的密钥交换。这确保即使通信被拦截，在没有正确加密密钥的情况下，数据也无法被破译。


    SSL/TLS 还提供强大的防窃听保护。这些协议的加密功能可防止未授权方监听客户端与服务器之间的通信。如果没有相应的加密密钥，任何被拦截的数据都将保持安全且不可读。


    HTTPS 作为 HTTP 协议的安全版本，其实现将 SSL/TLS 应用于保护客户端 Web 浏览器与 Web 服务器之间的通信。HTTPS 对于处理敏感信息的网站（如登录凭证、支付详情及个人数据）尤为重要。浏览器地址栏中的
    HTTPS 和挂锁图标向用户表明其连接是安全的，从而建立信任和信心，确保用户数据正在安全传输。


    此外，SSL/TLS 通过其握手过程及证书的使用帮助防止中间人攻击。通过相互验证身份，客户端和服务器确保它们直接通信，没有中间人篡改数据。SSL/TLS 和
    HTTPS 所提供的这种全面安全框架，对于在日益数字化的世界中保护用户及其数据至关重要。


    SSL/TLS 和 HTTPS 是互联网上创建安全通信通道的基础。它们为加密数据、确保数据完整性以及验证通信双方身份提供了强大的框架。对于处理敏感信息的网站而言，采用
    HTTPS 尤为重要，因为它能提升整体安全态势和用户信任度。


    ## SSL/TLS/HTTPS 在 PHP 应用中的使用


    要在 Laravel 应用中实现 SSL/TLS 和 HTTPS，我们将重点放在配置 Web 服务器（如 Apache 或 Nginx）来管理安全连接上。Laravel
    本身提供了处理安全通信的功能，但 SSL/TLS 配置仍需依赖 Web 服务器。让我们逐步了解在 Laravel 应用中设置 SSL/TLS 和 HTTPS
    的步骤及代码示例。

    '
- fmt: '### Web Server Configurations


    #### Nginx Configuration


    First, let’s configure Nginx to handle HTTPS connections. We need to provide an
    SSL certificate and configure the server to listen on port 443, which is the default
    port for HTTPS.


    ```

    nginx

    server {

    listen 443 ssl;

    server_name yourdomain.com;

    ssl_certificate /path/to/your/certificate.crt;

    ssl_certificate_key /path/to/your/private.key;

    # Other SSL/TLS configurations...

    location / {

    # Laravel application configuration...

    }

    }

    ```


    In this configuration, we specify the paths to our SSL certificate and private
    key. These files are crucial because they establish the secure connection between
    the client and server. The `listen 443 ssl;` directive tells Nginx to listen for
    secure connections on port 443.


    #### Apache Configuration


    For Apache, we’ll set up the virtual host to use SSL and specify the paths to
    our SSL certificate files.


    ```

    apache


    ServerName yourdomain.com

    DocumentRoot /path/to/your/laravel/public

    SSLEngine on

    SSLCertificateFile /path/to/your/certificate.crt

    SSLCertificateKeyFile /path/to/your/private.key

    # Other SSL/TLS configurations...


    # Laravel application configuration...

    AllowOverride All

    Require all granted


    ```


    Here, we enable SSL with `SSLEngine on` and specify where our certificate and
    key files are located. These settings allow Apache to handle secure HTTPS connections
    on port 443, ensuring encrypted communication.


    #### Laravel Configuration


    Next, we need to ensure that our Laravel application recognizes secure connections
    and generates secure URLs. We’ll update the `.env` file and the `config/app.php`
    file.


    `.env`:


    ```

    APP_URL=https://yourdomain.com

    ```


    By setting the `APP_URL` to use HTTPS, we ensure that Laravel generates secure
    URLs, which is critical for ensuring all links and asset references are secured.


    `config/app.php`:


    ```

    ''url'' => env(''APP_URL'', ''http://localhost''),

    ```


    Updating the URL configuration in `config/app.php` helps Laravel use the correct
    base URL for all generated links and redirects.


    ### Forced HTTPS in Laravel


    To force HTTPS on specific routes or the entire application, we’ll use Laravel’s
    `forceScheme` middleware. This ensures that all traffic to our application is
    securely transmitted over HTTPS.


    To force HTTPS for the entire application, in the `App\Providers\AppServiceProvider`
    class, add the following to the `boot` method:


    ```

    use Illuminate\Support\Facades\URL;

    public function boot()

    {

    if (env(''APP_ENV'') === ''production'') {

    URL::forceScheme(''https'');

    }

    }

    ```


    This ensures that our application always uses HTTPS in production, automatically
    redirecting HTTP requests to HTTPS.


    We can also force HTTPS on certain routes using the `forceScheme` method within
    our routes:


    ```

    php

    Route::group([''scheme'' => ''https''], function () {

    // Your HTTPS routes go here

    });

    ```


    This allows us to selectively enforce HTTPS on routes that require it, providing
    flexibility in our security settings.


    ### HSTS (HTTP Strict Transport Security)


    Enabling HSTS instructs browsers to always use HTTPS, further enhancing security
    by preventing downgrade attacks and ensuring that users always connect securely.


    ```

    nginx

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"
    always;

    ```


    Adding this header in our Nginx configuration tells browsers to remember to use
    HTTPS for a specified period (in this case, one year), including all subdomains.


    ### Mixed Content Handling


    To avoid mixed content issues, we’ll ensure all assets (CSS, JavaScript, images,
    etc.) are loaded over HTTPS. We can achieve this by using Laravel’s `asset` helper,
    which generates secure URLs for assets.


    ```

    html


    ```


    Using the `asset` helper ensures that all references to assets are secure, preventing
    mixed content warnings in the browser.


    ### Laravel Mix


    If we’re using Laravel Mix for asset compilation, we need to ensure that the `mix()`
    function generates HTTPS URLs:


    ```

    mix.js(''resources/js/app.js'', ''public/js'').version();

    mix.sass(''resources/sass/app.scss'', ''public/css'').version();

    ```


    By versioning our assets, Laravel Mix helps ensure that we always reference the
    latest versions, and using the `mix()` function ensures these URLs are generated
    correctly.


    ### Testing


    Finally, we should test our SSL/TLS configuration and HTTPS setup using online
    tools like SSL Labs to ensure proper security configurations.


    By following these steps, we can set up SSL/TLS and HTTPS for our Laravel application,
    providing a secure and encrypted communication channel between our server and
    clients. This ensures that sensitive data remains protected throughout its transmission,
    enhancing the overall security of our web application.'
