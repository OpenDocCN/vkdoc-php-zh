    ## Recipe 10-14\\. Iterating Over Array Values\n\n### Problem\n\nWorking with\
    \ arrays often requires the program to perform the same action for each row in\
    \ the array. Fetching a result set from a database query and turning it into a\
    \ HTML structure for presentation is an example of this.\n\n### Solution\n\nThere\
    \ are a number of ways to access elements in an array. If the elements are indexed\
    \ with integers and the starting value is known a `for( ;; )` or `while()` loop\
    \ could be used. If there are holes in the index or string values are used as\
    \ the keys it's possible to use `each()` or `foreach()` language constructs to\
    \ iterate over the array.\n\n### How it Works\n\nThe `each()` construct takes\
    \ an array as the parameter and returns the element at the current internal index\
    \ pointer. It will also increment the internal index pointer to the next element.\
    \ This is useful when iterating over the elements of an array.\n\n```php\n<?php\n\
    \n// 10_34.php\n\n$a = [10, 15, 20, 25];\n\nwhile ($b = each($a)) {\n    echo\
