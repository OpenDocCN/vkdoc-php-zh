    ''FALSE,'';

    ```


    要从数组中复制一个项目，我们使用数组的名称（`$properties_array`）和项目在数组中的位置（`[0]`）来引用它。注意我们使用 `[]` 括号来声明位置。这个位置通常被称为*下标*。数组下标通常从位置
    0 开始，而不是位置 1。


