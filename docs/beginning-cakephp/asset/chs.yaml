  `database.php`（从末尾删除 `.default`），并在您选择的纯文本编辑器中编辑它。无论您的 `localhost` 如何设置，您都需要知道 Cake
  连接数据库所需的 MySQL 登录名和密码。这通常设置为默认值，除非您配置了管理员帐户（例如，登录名和密码的默认值为 `root` 等）。在数据库配置中，会有一个位置供您输入登录名和密码值。清单
