  亲爱的读者，


  `PrWactical`


  当今市场上的许多编程书籍专门关注特定的方法或软件包，虽然您会从这些书中获得对主题的扎实理解，但您并不总是知道如何在现实世界中运用 `eb 2.0` 所学到的知识。本书旨在
  `Practical` 向您展示如何通过从零开始并逐步构建代码库，使其演变成一个完整的 Web 应用程序，从而将许多不同的想法和功能整合在一起。


  我们在本书中构建的应用程序的基础是它是一个“Web 2.0”应用程序。这意味着（除其他外）我们的应用程序生成可访问且符合标准的代码，同时大量使用 `Web 2.0`
  `Ajax`。我们通过使用 `Smarty™ 模板引擎` 和层叠样式表，以及 `Prototype JavaScript 库` 来实现这一点。此外，我们使用 `Script.aculo.us
  JavaScript 库` 在各个页面上应用简单的视觉效果，从而创建一个有趣且直观的界面。


  `Applications with`


  为了帮助开发本书中大量的 PHP 代码，我们使用了 `Zend Framework`。这是一个开源的 `PHP 5` 库，包含许多不同的组件，您可以在日常的 `使用
  PHP 进行应用开发` 中轻松使用这些组件。我们在本书中使用了 `Zend Framework` 的许多组件，例如数据库抽象（重点放在 `MySQL®` 和 `PostgreSQL`
  上）、日志记录、身份验证和搜索。


  我们在本书中构建的“Web 2.0”应用程序是一个协作博客工具。它将允许用户注册并创建个人博客。在创建博客文章时，用户将能够上传图片、应用标签和分配位置（使用
  `Google Maps`）。我们还将研究如何在显示用户博客文章时使用微格式。


