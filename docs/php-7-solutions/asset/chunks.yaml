    \ value to “Not selected.”\n\nFigure [6-9](#332054_4_En_6_Chapter.xhtml#Fig9)\
    \ shows `contact.php` with each\ntype of input added to the original design.\n\
    \n![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig9_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Fig9_HTML.jpg)\n\
    \nFigure 6-9.\nThe feedback form with examples of multiple-choice form elements\n\
    \nTip\nHTML5 form input elements all use the `name` attribute and\nsend values\
    \ as text or as a subarray of the `$_POST` array, so you\nshould be able to adapt\
    \ the code accordingly.\n\nPHP Solution 6-7: Handling Radio Button Groups\n\n\
    Radio button groups let you pick only one value. Although it’s common to\nset\
    \ a default value in the HTML markup, it’s not obligatory. This PHP\nsolution\
    \ shows how to handle both scenarios.\n\n1.  The simple way to deal with radio\
    \ buttons is to make one of them the\n    default. The radio group is always included\
    \ in the `$_POST` array because\n    a value is always selected.\n\nThe code for\
    \ a radio group with a default value looks like this (the\n    `name` attributes\n\
    \    and PHP code are highlighted in bold):\n\n```\n    Subscribe to newsletter?\n\
    \n>\n    Yes\n    >\n    No\n\n```\n\nAll members of the radio group share the\
    \ same `name` attribute.\n    Because only one value can be selected, the `name`\
    \ attribute does\n    *not* end with a pair of empty brackets.\n\nThe conditional\
    \ statement related to the Yes button checks `$_POST` to see if the\n    form\
    \ has been submitted. If it has and the value of `$_POST['subscribe']`\n    is\
    \ “Yes,” the `checked` attribute is\n    added to the `<input>`\n    tag.\n\n\
    In the No button, the conditional statement uses `||` (or). The first\n    condition\
    \ is `!$_POST`, which is\n    `true` when the\n    form hasn’t been submitted.\
    \ If `true`, the `checked` attribute is\n    added as the default value when the\
    \ page first loads. If `false`, it means the\n    form has been submitted, so\
    \ the value of `$_POST['subscribe']`\n    is checked.\n\n2.  When a radio button\
    \ doesn’t have a default value, it’s not included in\n    the `$_POST`\n    array,\
    \ so it isn’t detected by the loop in `processmail.php` that\n    builds the `$missing`\
    \ array. To\n    ensure that the radio button element is included in the `$_POST`\
    \ array, you\n    need to test for its existence after the form has been submitted.\
    \ If it\n    isn’t included, you need to set its value to an empty string, like\
    \ this:\n\n```\n    $required = ['name', 'comments', 'email', 'subscribe'];\n\
    \    // set default values for variables that might not exist\n    if (!isset($_POST['subscribe']))\
    \ {\n    $_POST['subscribe'] = \";\n    }\n    ```\n\n3.  If the radio button\
    \ group is required but not selected, you need to\n    display an error message\
    \ when the form reloads. You also need to change\n    the conditional statements\
    \ in the `<input>` tags to\n    reflect the different behavior.\n\nThe following\
    \ listing shows the `subscribe` radio\n    button group from `contact_09.php`,\
    \ with\n    all the PHP code highlighted in bold:\n\n```\n    Subscribe to newsletter?\n\
    \nPlease make a selection\n\n>\n    Yes\n    >\n    No\n\n```\n\nThe conditional\
    \ statement that controls the warning message in the\n    `<h2>` tag\n    uses\
    \ the same technique as for the text input fields. The message is\n    displayed\
    \ if the radio group is a required item and it’s in the `$missing` array.\n\n\
    The conditional statement surrounding the `checked` attribute is\n    the same\
    \ in both radio buttons. It checks if the form has been submitted\n    and displays\
    \ the checked attribute only if the value in `$_POST['subscribe']`\n    matches.\n\
    \nPHP Solution 6-8: Handling check-box groups\nCheck boxes can be used individually\
    \ or in groups. The method of\nhandling them is slightly different. This PHP solution\
    \ shows how to deal\nwith a check-box group called `interests`. PHP\nSolution\
    \ 6-11 explains how to handle a single check box. \nWhen used as a group, all\
    \ check boxes in the group share the same\n`name` attribute,\nwhich needs to end\
    \ with an empty pair of square brackets in order for\nPHP to transmit the selected\
    \ values as an array. To identify which check\nboxes have been selected, each\
    \ one needs a unique `value` attribute.\n\nIf no items are selected, the check-box\
    \ group is not included in the\n`$_POST` array.\nAfter the form has been submitted,\
    \ you need to check the `$_POST` array to see\nif it contains a subarray for the\
    \ check-box group. If it doesn’t, you\nneed to create an empty subarray as the\
    \ default value for the script in\n`processmail.php`.\n\n1.  To save space, just\
    \ the first two check boxes of the group are shown.\n    The `name`\n    attribute\
    \ and PHP sections of code are highlighted in bold.\n\n```\n    Interests in Japan\n\
    \n>\n    Anime/manga\n\n>\n    Arts & crafts\n\n. . .\n\n```"
  trans: "\n### 使用第五个参数\n通常情况下，使用第五个参数可以替代提供 `From` 标头的需求，因此使用 `null`（不加引号）作为第四个参数表示它没有值。如果你看到“邮件已发送”但没有收到邮件，或者尝试所有五个参数后看到“失败”，请咨询你的托管公司寻求建议。如果你从该脚本收到了测试邮件，但未从\
    \ `contact.php` 收到，则说明代码中存在错误，或者你忘记上传 `processmail.php`。临时开启错误显示（如第 3 章“为什么我的页面是空白的？”中所述），以检查\
    \ `contact.php` 是否能找到 `processmail.php`。\n\n> **提示**：我曾在一所英国大学任教，当时无法弄清为什么学生们的邮件无法送达，尽管他们的代码完美无缺。结果发现是\
    \ IT 部门禁用了 Sendmail（MTA）以防止服务器被用于发送垃圾邮件！\n\n### 处理多项选择表单元素\n`contact.php` 中的表单仅使用了文本输入字段和文本区域。要成功地处理表单，你还需要了解如何处理多项选择元素，即：\n\
    - 单选按钮\n- 复选框\n- 下拉选项菜单\n- 多项选择列表\n\n它们背后的原理与你一直在使用的文本输入字段相同：表单元素的 `name` 属性被用作\
    \ `$_POST` 数组中的键。然而，存在一些重要的区别：\n\n- 复选框组和多项选择列表将选中的值存储为数组，因此对于这些类型的输入，你需要在 `name`\
    \ 属性的末尾添加一对空的方括号。例如，对于一个名为 `interests` 的复选框组，每个 `<input>` 标签中的 `name` 属性应为 `name=\"\
    interests[]\"`。如果省略方括号，则只有最后选中的项会通过 `$_POST` 数组传输。\n- 复选框组或多项选择列表中选中项的值会作为 `$_POST`\
    \ 数组的子数组进行传输。PHP 解决方案 6-6 中的代码会自动将这些子数组转换为逗号分隔的字符串。然而，当将表单用于其他目的时，你需要从子数组中提取值。你将在后续章节中了解如何操作。\n\
    - 如果未选中任何值，单选按钮、复选框和多项选择列表*不会*包含在 `$_POST` 数组中。因此，在处理表单时，在尝试访问它们的值之前，务必使用 `isset()`\
    \ 检查它们是否存在。\n\n本章其余 PHP 解决方案展示了如何处理多项选择表单元素。我不会详细讲解每一步，而是只强调重点。在研读本章剩余内容时，请牢记以下几点：\n\
    - 处理这些元素依赖于 `processmail.php` 中的代码。\n- 你必须将每个元素的 `name` 属性添加到 `$expected` 数组中，以便将其包含在邮件正文中。\n\
    - 若要使某个字段为必填项，请将其 `name` 属性添加到 `$required` 数组中。\n- 如果非必填字段留空，`processmail.php`\
    \ 中的代码会将其值设置为“未选择”。\n\n图 6-9 显示了 `contact.php` 在原始设计基础上添加了每种输入类型后的效果。\n\n![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig9_HTML.jpg](img/332054_4_En_6_Fig9_HTML.jpg)\n\
    \n*图 6-9. 包含多项选择表单元素示例的反馈表单*\n\n> **提示**：HTML5 表单输入元素都使用 `name` 属性，并将值作为文本或 `$_POST`\
    \ 数组的子数组发送，因此你应该能够相应地调整代码。\n\n### PHP 解决方案 6-7：处理单选按钮组\n单选按钮组允许你只选择一个值。虽然在 HTML\
    \ 标记中设置默认值很常见，但并非必须。此 PHP 解决方案展示了如何处理这两种情况。\n\n1. 处理单选按钮的简单方法是将其中的一个设置为默认值。由于始终有值被选中，单选按钮组总是会包含在\
    \ `$_POST` 数组中。\n\n带有默认值的单选按钮组代码类似如下（`name` 属性和 PHP 代码以粗体突出显示）：\n\n```\n    订阅新闻通讯？\n\
    \n>\n    是\n    >\n    否\n```\n\n单选按钮组的所有成员共享同一个 `name` 属性。由于只能选择一个值，因此 `name`\
    \ 属性*不*以一对空方括号结尾。\n\n与“是”按钮相关的条件语句检查 `$_POST` 以查看表单是否已提交。如果已提交且 `$_POST['subscribe']`\
    \ 的值为“是”，则将 `checked` 属性添加到 `<input>` 标签中。\n\n在“否”按钮中，条件语句使用了 `||`（或）。第一个条件是 `!$_POST`，当表单未提交时为\
    \ `true`。如果为 `true`，则在页面首次加载时将 `checked` 属性添加为默认值。如果为 `false`，则表示表单已提交，因此会检查 `$_POST['subscribe']`\
    \ 的值。\n\n2. 当单选按钮没有默认值时，它不会包含在 `$_POST` 数组中，因此不会被 `processmail.php` 中构建 `$missing`\
    \ 数组的循环检测到。为了确保单选按钮元素包含在 `$_POST` 数组中，你需要在表单提交后测试其是否存在。如果未包含，则需要将其值设置为空字符串，如下所示：\n\
    \n```\n    $required = ['name', 'comments', 'email', 'subscribe'];\n    // 为可能不存在的变量设置默认值\n\
    \    if (!isset($_POST['subscribe'])) {\n    $_POST['subscribe'] = \"\";\n   \
    \ }\n```\n\n3. 如果单选按钮组是必填项但未选中，则在表单重新加载时需要显示错误消息。你还需要更改 `<input>` 标签中的条件语句以反映不同的行为。\n\
    \n以下列表显示了 `contact_09.php` 中的 `subscribe` 单选按钮组，所有 PHP 代码均以粗体突出显示：\n\n```\n  \
    \  订阅新闻通讯？\n\n请做出选择\n\n>\n    是\n    >\n    否\n```\n\n控制 `<h2>` 标签中警告消息的条件语句使用了与文本输入字段相同的技术。如果单选按钮组是必填项且位于\
    \ `$missing` 数组中，则会显示该消息。\n\n在两个单选按钮中，包围 `checked` 属性的条件语句是相同的。它会检查表单是否已提交，并且仅当\
    \ `$_POST['subscribe']` 中的值匹配时才显示 `checked` 属性。\n\n### PHP 解决方案 6-8：处理复选框组\n复选框可以单独使用，也可以成组使用。处理它们的方法略有不同。此\
    \ PHP 解决方案展示了如何处理名为 `interests` 的复选框组。PHP 解决方案 6-11 解释了如何处理单个复选框。  \n当作为一组使用时，组中的所有复选框共享相同的\
    \ `name` 属性，该属性需要以一对空的方括号结尾，以便 PHP 将选中的值作为数组传输。为了标识哪些复选框已被选中，每个复选框都需要一个唯一的 `value`\
    \ 属性。\n\n如果未选中任何项，则复选框组不会包含在 `$_POST` 数组中。表单提交后，你需要检查 `$_POST` 数组以查看它是否包含该复选框组的子数组。如果不包含，你需要为\
    \ `processmail.php` 中的脚本创建一个空子数组作为默认值。\n\n1. 为节省空间，仅显示该组的前两个复选框。`name` 属性和 PHP\
    \ 代码部分以粗体突出显示。\n\n```\n    在日本的兴趣\n\n>\n    动漫/漫画\n\n>\n    艺术与手工艺\n\n. . .\n\
    ```\n"
- fmt: "每个复选框共享相同的`name`属性，该属性以空方括号结尾，因此数据被视为数组。如果省略方括号，`$_POST['interests']`仅包含所选第一个复选框的值。此外，如果未选中任何复选框，`$_POST['interests']`将不存在。你将在下一步中修复此问题。\n\
    \n**注意**：虽然多选时必须为`name`属性添加方括号，但所选值的子数组存储在`$_POST['interests']`中，而不是`$_POST['interests[]']`。\n\
    \n每个复选框元素内的PHP代码与单选按钮组中的作用相同，将`checked`属性包裹在条件语句中。第一个条件检查表单是否已提交。第二个条件使用`in_array()`函数检查与该复选框关联的`value`是否存在于`$_POST['interests']`子数组中。如果存在，则表示该复选框已被选中。\n\
    \n1. 表单提交后，需要检查`$_POST['interests']`是否存在。如果未设置，必须创建一个空数组作为脚本其余部分处理的默认值。代码遵循与单选组相同的模式：\n\
    \n```\n$required = ['name', 'comments', 'email', 'subscribe', 'interests'];\n\
    // set default values for variables that might not exist\nif (!isset($_POST['subscribe']))\
    \ {\n    $_POST['subscribe'] = \"\";\n}\nif (!isset($_POST['interests'])) {\n\
    \    $_POST['interests'] = [];\n}\n```\n\n2. 要设置所需复选框的最小数量，使用`count()`函数确认从表单传输的值数量。如果少于所需的最小数量，将该组添加到`$errors`数组中，如下所示：\n\
    \n```\nif (!isset($_POST['interests'])) {\n    $_POST['interests'] = [];\n}\n\
    // minimum number of required check boxes\n$minCheckboxes = 2;\nif (count($_POST['interests'])\
    \ < $minCheckboxes) {\n    $errors['interests'] = true;\n}\n```\n\n`count()`函数返回数组中的元素数量，因此如果选中的复选框少于两个，则会创建`$errors['interests']`。你可能会疑惑为什么我使用变量而不是像这样直接使用数字：\n\
    \n```\nif (count($_POST['interests']) < 2) {\n```\n\n这当然可行且输入更少，但`$minCheckboxes`可以在错误消息中重用。将数字存储在变量中意味着此条件和错误消息始终保持同步。\n\
    \n3. 表单主体中的错误消息如下所示：\n\n```\nInterests in Japan\nPlease select at least\n```\n\
    \n## PHP Solution 6-9: 使用下拉选项菜单\n\n使用`<select>`标签创建的下拉选项菜单类似于单选按钮组，通常只允许用户从多个选项中选择一个。不同之处在于，下拉菜单中始终会选中一个项目（即使只是第一个邀请用户选择其他项目的项）。因此，`$_POST`数组始终包含引用`<select>`菜单的元素，而单选按钮组除非预设了默认值，否则会被忽略。\n\
    \n1. 以下代码显示了`contact_09.php`中下拉菜单的前两个项目，PHP代码以粗体突出显示。与所有多项选择元素一样，PHP代码包裹了指示已选项的属性。虽然此属性在单选按钮和复选框中称为`checked`，但在`<select>`菜单和列表中称为`selected`。如果表单在缺少必填项的情况下提交，使用正确的属性来重新显示选择非常重要。当页面首次加载时，`$_POST`数组不包含任何元素，因此可以通过测试`!$_POST`来选择第一个`<option>`。一旦表单提交，`$_POST`数组始终包含来自下拉菜单的元素，因此无需测试其是否存在。\n\
    \n```\nHow did you hear of Japan Journey?\n>Select one\n>Apress\n...\n```\n\n\
    2. 尽管下拉菜单中始终会选中一个选项，但你可能希望强制用户选择一个默认选项以外的选项。为此，将`<select>`菜单的`name`属性添加到`$required`数组中，然后将默认选项的`value`属性和`$_POST`数组元素设置为空字符串，如下所示：\n\
    \n```\n>Select one\n```\n\n`<option>`标签中不需要`value`属性，但如果省略它，表单将使用开始和结束标签之间的文本作为选中值。因此，必须将`value`属性显式设置为空字符串。否则，“Select\
    \ one”将作为选中值传输。\n\n3. 如果未做选择时显示警告消息的代码遵循熟悉的模式：\n\n```\nHow did you hear of Japan\
    \ Journey?\nPlease make a selection\n```\n\n## PHP Solution 6-10: 处理多项选择列表\n\n\
    多项选择列表类似于复选框组：它们允许用户选择零个或多个项目，因此结果存储在数组中。如果未选择任何项目，则多项选择列表不会包含在`$_POST`数组中，因此你需要像复选框组一样添加一个空子数组。\n\
    \n1. 以下代码显示了`contact_09.php`中多项选择列表的前两个项目，`name`属性和PHP代码以粗体突出显示。附加到`name`属性的方括号确保结果以数组形式存储。代码的工作方式与PHP\
    \ Solution 6-8中的复选框组完全相同。\n\n```\nWhat characteristics do you associate with Japan?\n\
    >Dynamic\n>Honest\n...\n```\n\n2. 在处理消息的代码中，以与复选框数组相同的方式为多项选择列表设置默认值：\n\n```\n\
    if (!isset($_POST['interests'])) {\n    $_POST['interests'] = [];\n}\nif (!isset($_POST['characteristics']))\
    \ {\n    $_POST['characteristics'] = [];\n}\n```\n\n3. 要使多项选择列表成为必填项并设置最小选择数量，使用与PHP\
    \ Solution 6-8中复选框组相同的技术。\n\n## PHP Solution 6-11: 处理单个复选框\n\n处理单个复选框的方式与复选框组略有不同。对于单个复选框，不要附加方括号到`name`属性，因为它不需要作为数组处理。此外，`value`属性是可选的。如果未设置`value`属性，当复选框被选中时，它默认为\"\
    On\"。然而，如果复选框未被选中，则其名称不会包含在`$_POST`数组中，因此你需要测试其是否存在。\n\n此PHP解决方案展示了如何添加一个用于确认接受网站条款的单个复选框。假设选中该复选框是必填项。\n\
    \n1. 以下代码显示了单个复选框，`name`属性和PHP代码以粗体突出显示。\n\n```\n>\nI accept the terms of using\
    \ this website\n```"
  raw: "Each check box shares the same `name` attribute, which\n    ends with an empty\
    \ pair of square brackets, so the data is treated as an\n    array. If you omit\
    \ the brackets, `$_POST['interests']`\n    contains the value of only the first\
    \ check box selected. Also, `$_POST['interests']`\n    won’t exist if no check\
    \ box has been selected. You’ll fix that in the\n    next step.\n\nNote\nAlthough\
    \ the brackets must be added to the `name` attribute for\nmultiple selections,\
    \ the subarray of selected values is in `$_POST['interests']`,\nnot `$_POST['interests[]']`.\n\
    \nThe PHP code inside each check-box element performs the same role as in\nthe\
    \ radio button group, wrapping the `checked` attribute in\na conditional statement.\
    \ The first condition checks that the form has\nbeen submitted. The second condition\
    \ uses the `in_array()` function\n to check whether\nthe `value`\nassociated with\
    \ that check box is in the `$_POST['interests']`\nsubarray. If it is, it means\
    \ the check box was selected.\n\n1.  After the form has been submitted, you need\
    \ to check for the existence\n    of `$_POST['interests']`.\n    If it hasn’t\
    \ been set, you must create an empty array as the default\n    value for the rest\
    \ of the script to process. The code follows the same\n    pattern as for the\
    \ radio group:\n\n```\n    $required = ['name', 'comments', 'email', 'subscribe',\
    \ 'interests'];\n    // set default values for variables that might not exist\n\
    \    if (!isset($_POST['subscribe'])) {\n    $_POST['subscribe'] = \";\n    }\n\
    \    if (!isset($_POST['interests'])) {\n    $_POST['interests'] = [];\n    }\n\
    \    ```\n\n2.  To set a minimum number of required check boxes, use the `count()`\
    \ function to\n    confirm  the\n    number of values transmitted from the form.\
    \ If it’s less than the\n    minimum required, add the group to the `$errors`\
    \ array, like\n    this:\n\n```\n    if (!isset($_POST['interests'])) {\n    $_POST['interests']\
    \ = [];\n    }\n    // minimum number of required check boxes\n    $minCheckboxes\
    \ = 2;\n    if (count($_POST['interests']) < $minCheckboxes) {\n    $errors['interests']\
    \ = true;\n    }\n    ```\n\nThe `count()`\n    function returns the number of\
    \ elements in an array, so this creates\n    `$errors['interests']`\n    if fewer\
    \ than two check boxes have been selected. You might be wondering\n    why I have\
    \ used a variable instead of the number like this:\n\n```\n    if (count($_POST['interests'])\
    \ < 2) {\n    ```\n\nThis certainly works and it involves less typing, but `$minCheckboxes`\
    \ can be\n    reused in the error message. Storing the number in a variable means\
    \ this\n    condition and the error message always remain in sync.\n\n3.  The\
    \ error message in the body of the form looks like this:\n\n```\n    Interests\
    \ in Japan\n\nPlease select at least\n\n```\n\nPHP Solution 6-9: Using a drop-down\
    \ Option Menu\n\nDrop-down option menus created with the `<select>` tag\nare similar\
    \ to radio button groups in that they normally allow the user\nto pick only one\
    \ option from several. Where they differ is one item is\nalways selected in a\
    \ drop-down menu, even if it’s only the first item\ninviting the user to select\
    \ one of the others. As a result, the `$_POST` array always\ncontains an element\
    \ referring to a `<select>` menu,\nwhereas a radio button group is ignored unless\
    \ a default value is\npreset.\n\n1.  The following code shows the first two items\
    \ from the drop-down menu in\n    `contact_09.php`,\n    with the PHP code highlighted\
    \ in bold. As with all multiple-choice\n    elements, the PHP code wraps the attribute\
    \ that indicates which item has\n    been chosen. Although this attribute is called\
    \ `checked` in both radio\n    buttons and check boxes, it’s called `selected`\
    \ in `<select>` menus\n    and lists. It’s important to use the correct attribute\
    \ to redisplay the\n    selection if the form is submitted with required items\
    \ missing. When the\n    page first loads, the `$_POST` array contains\n    no\
    \ elements, so you can select the first `<option>` by\n    testing for `!$_POST`.\
    \ Once the\n    form is submitted, the `$_POST` array  always contains an\n  \
    \  element from a drop-down menu, so you don’t need to test for its\n    existence.\n\
    \n```\n    How did you hear of Japan Journey?\n\n>Select one\n    >Apress\n  \
    \  . . .\n\n```\n\n2.  Even though an option is always selected in a drop-down\
    \ menu, you might\n    want to force users to make a selection other than the\
    \ default. To do\n    so, add the `name` attribute of the\n    `<select>`\n  \
    \  menu to the `$required` array, then\n    set the `value`\n    attribute and\
    \ the `$_POST` array element\n    for the default option to an empty string, like\
    \ this:\n\n```\n    >Select one\n    ```\n\nThe `value`\n    attribute is not\
    \ required in the `<option>` tag,\n    but if you leave it out, the form uses\
    \ the text between the opening and\n    closing tags as the selected value. Therefore,\
    \ it’s necessary to set the\n    `value` attribute\n    explicitly to an empty\
    \ string. Otherwise, “Select one” is transmitted as\n    the selected value.\n\
    \n3.  The code that displays a warning message if no selection has been made\n\
    \    follows a familiar pattern:\n\n```\n    How did you hear of Japan Journey?\n\
    \nPlease make a selection\n\n```\n\nPHP Solution 6-10: Handling a multiple-choice\n\
    list\n\nMultiple-choice lists are similar to check-box groups:  they allow the\
    \ user to\nchoose zero or more items, so the result is stored in an array. If\
    \ no\nitems are selected, the multiple-choice list is not included in the\n`$_POST`\
    \ array,\nso you need to add an empty subarray in the same way as with a check-box\n\
    group.\n\n1.  The following code shows the first two items from the multiple-choice\n\
    \    list in `contact_09.php`, with\n    the `name`\n    attribute and PHP code\
    \ highlighted in bold. The square brackets appended\n    to the `name`\n    attribute\
    \ ensure that it stores the results as an array. The code works\n    in an identical\
    \ way to the check-box group in PHP Solution 6-8.\n\n```\n    What characteristics\
    \ do you associate with\n    Japan?\n\n>Dynamic\n    >Honest\n    . . .\n\n```\n\
    \n2.  In the code that processes the message, set a default value for a\n    multiple-choice\
    \ list in the same way as for an array of check boxes:\n\n```\n    if (!isset($_POST['interests']))\
    \ {\n    $_POST['interests'] = [];\n    }\n    if (!isset($_POST['characteristics']))\
    \ {\n    $_POST['characteristics'] = [];\n    }\n    ```\n\n3.  To make a multiple-choice\
    \ list required and to set a minimum number\n    of choices, use the same technique\
    \ used for a check-box group in PHP\n    Solution 6-8.\n\nPHP Solution 6-11: Handling\
    \ a Single Check Box\nThe way you handle a single check box is slightly different\
    \ from a\ncheck-box group. With an individual check box, you don’t  append square\
    \ brackets\nto the `name`\nattribute because it doesn’t need to be processed as\
    \ an array. Also, the\n`value` attribute\nis optional. If you don’t set the `value`\
    \ attribute, it\ndefaults to “On” if the check box is selected. However, if the\
    \ check box\nisn’t selected, its name isn’t included in the `$_POST` array, so\
    \ you\nneed to test for its existence.\n\nThis PHP solution shows how to add a\
    \ single check box that seeks\nconfirmation that the site’s terms have been accepted.\
    \ It assumes that\nselecting the check box is required.\n\n1.  This code shows\
    \ the single check box, with the `name` attribute and\n    PHP code highlighted\
    \ in bold.\n\n```\n    >\n    I accept the terms of using this website"
  trans: "\n每个复选框共享相同的`name`属性，该属性以空方括号结尾，因此数据被视为数组。如果省略方括号，`$_POST['interests']`仅包含所选第一个复选框的值。此外，如果未选中任何复选框，`$_POST['interests']`将不存在。你将在下一步中修复此问题。\n\
    \n**注意**：虽然多选时必须为`name`属性添加方括号，但所选值的子数组存储在`$_POST['interests']`中，而不是`$_POST['interests[]']`。\n\
    \n每个复选框元素内的 PHP 代码与单选按钮组中的作用相同，将`checked`属性包裹在条件语句中。第一个条件检查表单是否已提交。第二个条件使用`in_array()`函数检查与该复选框关联的`value`是否存在于`$_POST['interests']`子数组中。如果存在，则表示该复选框已被选中。\n\
    \n1. 表单提交后，需要检查`$_POST['interests']`是否存在。如果未设置，必须创建一个空数组作为脚本其余部分处理的默认值。代码遵循与单选组相同的模式：\n\
    \n```\n$required = ['name', 'comments', 'email', 'subscribe', 'interests'];\n\
    // 为可能不存在的变量设置默认值\nif (!isset($_POST['subscribe'])) {\n    $_POST['subscribe']\
    \ = \"\";\n}\nif (!isset($_POST['interests'])) {\n    $_POST['interests'] = [];\n\
    }\n```\n\n2. 要设置所需复选框的最小数量，使用`count()`函数确认从表单传输的值数量。如果少于所需的最小数量，将该组添加到`$errors`数组中，如下所示：\n\
    \n```\nif (!isset($_POST['interests'])) {\n    $_POST['interests'] = [];\n}\n\
    // 所需复选框的最小数量\n$minCheckboxes = 2;\nif (count($_POST['interests']) < $minCheckboxes)\
    \ {\n    $errors['interests'] = true;\n}\n```\n\n`count()`函数返回数组中的元素数量，因此如果选中的复选框少于两个，则会创建`$errors['interests']`。你可能会疑惑为什么我使用变量而不是像这样直接使用数字：\n\
    \n```\nif (count($_POST['interests']) < 2) {\n```\n\n这当然可行且输入更少，但`$minCheckboxes`可以在错误消息中重用。将数字存储在变量中意味着此条件和错误消息始终保持同步。\n\
    \n3. 表单主体中的错误消息如下所示：\n\n```\n对日本感兴趣\n请至少选择\n```\n\n## PHP Solution 6-9: 使用下拉选项菜单\n\
    \n使用`<select>`标签创建的下拉选项菜单类似于单选按钮组，通常只允许用户从多个选项中选择一个。不同之处在于，下拉菜单中始终会选中一个项目（即使只是第一个邀请用户选择其他项目的项）。因此，`$_POST`数组始终包含引用`<select>`菜单的元素，而单选按钮组除非预设了默认值，否则会被忽略。\n\
    \n1. 以下代码显示了`contact_09.php`中下拉菜单的前两个项目，PHP 代码以粗体突出显示。与所有多项选择元素一样，PHP 代码包裹了指示已选项的属性。虽然此属性在单选按钮和复选框中称为`checked`，但在`<select>`菜单和列表中称为`selected`。如果表单在缺少必填项的情况下提交，使用正确的属性来重新显示选择非常重要。当页面首次加载时，`$_POST`数组不包含任何元素，因此可以通过测试`!$_POST`来选择第一个`<option>`。一旦表单提交，`$_POST`数组始终包含来自下拉菜单的元素，因此无需测试其是否存在。\n\
    \n```\n您是如何了解到日本之旅的？\n>选择一个\n>Apress\n...\n```\n\n2. 尽管下拉菜单中始终会选中一个选项，但你可能希望强制用户选择一个默认选项以外的选项。为此，将`<select>`菜单的`name`属性添加到`$required`数组中，然后将默认选项的`value`属性和`$_POST`数组元素设置为空字符串，如下所示：\n\
    \n```\n>选择一个\n```\n\n`<option>`标签中不需要`value`属性，但如果省略它，表单将使用开始和结束标签之间的文本作为选中值。因此，必须将`value`属性显式设置为空字符串。否则，“Select\
    \ one”将作为选中值传输。\n\n3. 如果未做选择时显示警告消息的代码遵循熟悉的模式：\n\n```\n您是如何了解到日本之旅的？\n请做出选择\n\
    ```\n\n## PHP Solution 6-10: 处理多项选择列表\n\n多项选择列表类似于复选框组：它们允许用户选择零个或多个项目，因此结果存储在数组中。如果未选择任何项目，则多项选择列表不会包含在`$_POST`数组中，因此你需要像复选框组一样添加一个空子数组。\n\
    \n1. 以下代码显示了`contact_09.php`中多项选择列表的前两个项目，`name`属性和 PHP 代码以粗体突出显示。附加到`name`属性的方括号确保结果以数组形式存储。代码的工作方式与\
    \ PHP Solution 6-8 中的复选框组完全相同。\n\n```\n您认为日本具有哪些特征？\n>充满活力\n>诚实守信\n...\n```\n\n\
    2. 在处理消息的代码中，以与复选框数组相同的方式为多项选择列表设置默认值：\n\n```\nif (!isset($_POST['interests']))\
    \ {\n    $_POST['interests'] = [];\n}\nif (!isset($_POST['characteristics']))\
    \ {\n    $_POST['characteristics'] = [];\n}\n```\n\n3. 要使多项选择列表成为必填项并设置最小选择数量，使用与\
    \ PHP Solution 6-8 中复选框组相同的技术。\n\n## PHP Solution 6-11: 处理单个复选框\n\n处理单个复选框的方式与复选框组略有不同。对于单个复选框，不要附加方括号到`name`属性，因为它不需要作为数组处理。此外，`value`属性是可选的。如果未设置`value`属性，当复选框被选中时，它默认为\"\
    On\"。然而，如果复选框未被选中，则其名称不会包含在`$_POST`数组中，因此你需要测试其是否存在。\n\n此 PHP 解决方案展示了如何添加一个用于确认接受网站条款的单个复选框。假设选中该复选框是必填项。\n\
    \n1. 以下代码显示了单个复选框，`name`属性和 PHP 代码以粗体突出显示。\n\n```\n>\n我接受使用本网站的条款\n```\n"
- fmt: "Please select the check box\n\n```\nThe PHP block inside the `<input>` element\n\
    \    inserts the `checked` attribute\n    only if the `$_POST` array contains\
    \ values\n    and `$errors['terms']`\n    hasn’t been set. This ensures that the\
    \ check box is not selected when\n    the page first loads. It also remains unchecked\
    \ if the user submitted\n    the form without confirming acceptance of the terms.\n\
    \nThe second PHP block displays an error message alongside the label if\n    `$errors['terms']`\
    \ has\n    been set.\n```\n\nIn addition to adding terms to the `$expected` and\
    \ `$required` arrays, you need to set a default value for `$_POST['terms']`; then\
    \ set `$errors['terms']` in the code that processes the data when the form is\
    \ submitted:\n\n```\nif (!isset($_POST['characteristics'])) {\n    $_POST['characteristics']\
    \ = [];\n}\nif (!isset($_POST['terms'])) {\n    $_POST['terms'] = \"\";\n    $errors['terms']\
    \ = true;\n}\n```\n\nYou need to create `$errors['terms']` only if the check box\
    \ is required. For an optional check box, just set the value to an empty string\
    \ if it’s not included in the `$_POST` array.\n\n## Chapter Review\n\nA lot of\
    \ work has gone into building `processmail.php`, but the beauty of this script\
    \ is that it works with any form. The only parts that need changing are the `$expected`\
    \ and `$required` arrays and details specific to the form, such as the destination\
    \ address, headers, and default values for multiple-choice elements that won’t\
    \ be included in the `$_POST` array if no value is selected.\nI’ve avoided talking\
    \ about HTML email because the `mail()` function is poorly equipped to handle\
    \ it. The PHP online manual at [`www.php.net/manual/en/book.mail.php`](http://www.php.net/manual/en/book.mail.php)\
    \ shows a way of sending HTML mail by adding an additional header. However, it’s\
    \ generally accepted that HTML mail should always contain an alternative text\
    \ version for email programs that don’t accept HTML. If you want to send HTML\
    \ mail or attachments, try PHPMailer ([`https://github.com/PHPMailer/PHPMailer/`](https://github.com/PHPMailer/PHPMailer/)).\n\
    As you’ll see in later chapters, online forms lie at the heart of just about everything\
    \ you do with PHP. They’re the gateway between the browser and the web server.\
    \ You’ll come back time and again to the techniques that you have learned in this\
    \ chapter.\n\n## Using PHP to Manage Files\n\nPHP has a huge range of functions\
    \ designed to work with the server’s file system, but finding the right one for\
    \ the job isn’t always easy. This chapter cuts through the tangle to show you\
    \ some practical uses of these functions, such as reading and writing text files\
    \ to store small amounts of information without a database. Loops play an important\
    \ role in inspecting the contents of the file system, so you’ll also explore some\
    \ of the Standard PHP Library (SPL) iterators that are designed to make loops\
    \ more efficient.\nAs well as opening local files, PHP can read public files,\
    \ such as news feeds, on other servers. News feeds are normally formatted as XML\
    \ (Extensible Markup Language). In the past, extracting information from an XML\
    \ file was a tortuous process, but the very aptly named SimpleXML makes it easy\
    \ with PHP. In this chapter, you’ll see how to create a drop-down menu that lists\
    \ all images in a folder, to create a function to select files of a particular\
    \ type from a folder, to pull in a live news feed from another server, and to\
    \ prompt a visitor to download an image or PDF file rather than open it in the\
    \ browser. As a bonus, you’ll learn how to change the time zone of a date retrieved\
    \ from another web site.\n\nThis chapter covers the following subjects:\n\n* \
    \  Reading and writing files\n*   Listing the contents of a folder\n*   Inspecting\
    \ files with the `SplFileInfo` class\n*   Controlling loops with SPL iterators\n\
    *   Using SimpleXML to extract information from an XML file\n*   Consuming an\
    \ RSS feed\n*   Creating a download link\n\n### Checking that PHP can Open a File\n\
    \nMany of the PHP solutions in this chapter involve opening files for reading\
    \ and writing, so it’s important to make sure the correct permissions are set\
    \ in your local testing environment and on your remote server. PHP is capable\
    \ of reading and writing files anywhere, as long as it has the correct permissions\
    \ and knows where to find the file. So, for security, you should store files that\
    \ you plan to read or write outside the web server root (typically called `htdocs`,\
    \ `public_html`, or `www`). This prevents unauthorized people from reading your\
    \ files or—worse—altering their content.\nMost hosting companies use Linux or\
    \ Unix servers, which impose strict rules about the ownership of files and directories.\
    \ Check that the permissions on the directory where you store files outside the\
    \ web server root have been set to 644 (this allows the owner to read and write\
    \ to the directory, all other users can read only). If you still get the warning\
    \ about permission being denied, consult your hosting company. If you are told\
    \ to elevate any setting to 7, be aware that this gives permission for scripts\
    \ to be executed, which could be exploited by a malicious attacker.\n\n#### Tip\n\
    \nIf you don’t have access to a directory outside the site root, I recommend moving\
    \ to a different hosting company. Files that are uploaded to a site other than\
    \ by the site maintainer should always be checked before they are included in\
    \ web pages. Storing them out of public view reduces any security risk.\n\n###\
    \ Creating a Folder Outside the Server Root for Local Testing on Windows\n\nFor\
    \ the following exercises, I suggest you create a folder called `private` at the\
    \ top level of the C drive. There are no permissions issues on Windows, so that’s\
    \ all that you need to do.\n\n### Creating a Folder Outside the Server Root for\
    \ Local Testing on MacOS\n\nMac users might need to do a little more preparation\
    \ because file permissions are similar to Linux. Create a folder called `private`\
    \ in your home folder and follow the instructions in PHP Solution 7-1.\n\nIf everything\
    \ goes smoothly, you won’t need to do anything extra. But if you get a warning\
    \ that PHP “failed to open stream,” change the permissions for the `private` folder\
    \ like this:\n\n1.  Select `private` in the Mac Finder and select File ➤ Get Info\
    \ (Cmd+I) to open its info panel.\n2.  In Sharing & Permissions click the padlock\
    \ icon at the bottom right to unlock the settings, then change the setting for\
    \ everyone from Read only to Read & Write, as shown in the following screenshot.\n\
    \    ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figa_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figa_HTML.jpg)\n\
    3.  Click the padlock icon again to preserve the new settings and close the info\
    \ panel. You should now be able to use the `private` folder to continue with the\
    \ rest of the chapter.\n\n### Configuration Settings that Affect File Access\n\
    \nHosting companies can impose further restrictions on file access through `php.ini`.\
    \ To find out what restrictions have been imposed, run `phpinfo()` on your web\
    \ site and check the settings in the Core section. Table 7-1 lists the settings\
    \ you need to check. Unless you run your own server, you normally have no control\
    \ over these settings.\n\n**Table 7-1.** PHP configuration settings that affect\
    \ file access\n\n| Directive | Default value | Description |\n| --- | --- | ---\
    \ |\n| `allow_url_fopen` | On | Allows PHP scripts to open public files on the\
    \ Internet |\n| `allow_url_include` | Off | Controls the ability to include remote\
    \ files |"
