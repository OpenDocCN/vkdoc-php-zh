  raw: 'There are two important points yet to note about this added code. The first
    is that we render the error page templates using an include statement. You might
    be wondering why we do that, if we have gone through the effort of creating an
    awesome view/template system. The reason is that the exceptions should be raised
    in the View/Template classes. It is hardly ideal that the exceptions we are trying
    to address could be caused by the code used to address them. For this reason,
    we need to use as little as possible of our framework code in order to render
    the error pages.


    This brings us to the second important point, which is that the error page templates
    are PHP files. Using PHP


    files, we can use the error pages to present the PHP exception data, and act on
    the DEBUG constant we created. We can see this in action, by looking at the general
    layout of an error page, as demonstrated in Listing 17–2.


    ***Listing 17–2.*** application/views/errors/404.php


    <!DOCTYPE html>


    <html>


    <head>


    <title>Social Network</title>


    </head>


    <body>


    error 404


    <?php if (DEBUG): ?>


    <pre><?php print_r($e); ?></pre>


    <?php endif; ?>


    </body>


    </html>


    The reality is that changes to the layouts will not affect these error documents.
    The result is that we will have some repeated view markup. On the other hand,
    we will have a secure application, which helps us debug the application, and presents
    user-friendly error pages.


    ■ **Note** Remember to set DEBUG to false when your code is in a production environment.
    You don’t want the average Joe knowing the details of your code malfunctions.


    Friends


