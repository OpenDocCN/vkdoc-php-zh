    \n9063Ch14CMP2 11/13/07 8:20 PM Page 524\n\n**524**\n\n第 14 章 ■ 部署与维护\n\n> **注意**\
    \ `grep` 的 `-i` 选项表示搜索时不区分大小写。\n\n在开发新功能时，实时监控日志文件也很有用。当你无法轻松地将调试信息直接输出到浏览器时（例如在\
    \ Ajax 子请求中或使用第三方服务时），这一点尤其重要。你可以使用 `tail -f` 来实现这一点，这意味着 `tail` 会监控文件的任何更改，并在文件写入时显示其中的任何新数据。\n\
    \n```\ntail -f /var/www/phpweb20/data/logs/debug.log\n```\n\n> **提示** 使用 `-f`\
    \ 选项时，可以按 Ctrl+C 退出 `tail`。另请注意，运行此命令时，在监控新内容之前会显示最后十行，就像正常运行 `tail` 时一样（假设你没有指定要显示的行数）。\n\
    \n你可能还需要考虑的另一个问题是管理日志文件，因为在一个记录了大量调试信息的高流量站点上，它们可能会变得非常大。你可能需要考虑使用诸如 `logrotate`\
    \ 之类的工具。\n\n无论如何，现在已为你的应用程序日志记录和审计需求奠定了坚实的基础。你现在可以轻松地为任何新开发的类添加日志记录功能。\n\n## 站点错误处理\n\
    \n现在我们将要更改代码，以处理用户访问站点时可能发生的任何错误。在你的网站日常运行中，可能会发生几种类型的错误：\n\n- **数据库错误。** 这是与访问数据库服务器或其数据相关的任何错误。例如，可能发生的错误包括：\n\
    \  - 连接错误，由于服务器或网络可能宕机、用户名或密码不正确或数据库名称不正确而导致。\n  - 查询错误，由于使用的 SQL 无效而导致。如果你的应用程序已正确开发和测试，则这些错误不应发生。\n\
    \  - 数据错误，由于违反数据库中的约束而导致。如果你在唯一字段中输入了重复值，或者从通过外键被其他地方引用的表中删除数据，则可能发生此错误。同样，如果应用程序已正确开发和测试，则不应发生此错误。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n9063Ch14CMP2 11/13/07 8:20\
    \ PM Page 525\n\n第 14 章 ■ 部署与维护\n\n**525**\n\n- **应用程序运行时错误。** 这是一个相当宽泛的标题，基本上涵盖了代码中发生的任何错误（包括未捕获的异常）。可能发生的应用程序错误示例如下：\n\
    \  - 文件系统和权限错误，例如应用程序尝试读取不存在的文件或不允许读取的文件。同样，如果应用程序尝试写入文件但不允许，那么也会导致错误。你的应用程序读取的格式不正确的文件也可能导致错误。\n\
    \  - 如果你的应用程序访问远程服务器上的 Web 服务，那么你的应用程序运行的好坏程度部分取决于这些服务器。例如，如果你使用第三方网关处理信用卡付款，那么该网关必须正常运行，你才能在你的站点上进行销售。\n\
    \n- **HTTP 错误。** 这些是基于用户请求发生的错误。最常见的 HTTP 错误（也是我们将在本节中介绍的错误）是 404 文件未找到错误。虽然可能发生许多不同的错误，但其他常见的错误包括\
    \ 401 未经授权（如果用户尝试访问他们必须登录才能访问的资源）和 403 禁止访问（如果用户根本不被允许访问该资源）。\n\n> **注意** 首先，由于我们在第\
    \ 2 章中为应用程序设置的 Apache 重写规则，我们不会按照人们使用 Apache 的“传统方式”（使用 `ErrorDocument 404`）来处理\
    \ 404 错误。相反，当用户尝试访问不存在的控制器或操作时，我们将生成 404 错误。其次，401 和 403 错误不适用于我们的应用程序，即使我们有权限系统。这是因为我们已经实现了自己的用户登录和权限系统，所以传统的\
    \ HTTP 状态码并不适用。\n\n尽管我们可以在设置应用程序时（特别是处理数据库和 404 错误时）就包含上述错误处理，但我选择将它们全部归并到这一节中，以便你可以看到系统作为一个整体如何对错误做出反应。\n\
    \n请注意，在某些情况下，我们已经处理了发生的各种应用程序错误。一个例子是捕获在各种情况下抛出的异常，例如在第 12 章实现博客文章索引功能时。\n\n在我们即将实现的错误处理中，我们将为应用程序的两个区域添加处理能力：\n\
    \n- 在请求被分发之前。这是为了处理在使用 `Zend_Controller_Front` 分发结果之前发生的任何错误。换句话说，它将处理 `index.php`\
    \ 引导文件中代码发生的任何错误。\n- 在请求被分发期间。这是为了处理应用程序内部发生的任何错误，例如在控制器操作或我们编写的众多类之一中（即我们尚未处理的错误）。这还包括\
    \ HTTP 错误，例如当文件未找到时（404）。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n9063Ch14CMP2 11/13/07 8:20 PM Page 526\n\n**526**\n\n第 14 章 ■ 部署与维护\n\n## 错误处理的目标\n\
    \n在实施任何错误处理之前，我们必须确定我们实际上希望通过处理错误来实现什么。一个错误处理系统应执行以下操作：\n\n- **通知用户发生了错误。** 无论是系统错误还是用户错误，用户都应该知道出了问题，并且他们的请求无法正确完成。\n\
    - **记录错误。** 这可能涉及将错误写入日志文件或通知系统管理员，或两者兼而有之。通常，用户错误（例如 404 错误）是不需要通知管理员的（尽管记录 404\
    \ 错误在统计分析中可能有用）。\n- **回滚当前请求。** 如果在客户端请求中途发生服务器错误，则应回滚任何已执行的操作。让我们以这样一个系统为例：它将用户提交的表单保存到本地数据库，并将其提交给第三方服务器。如果第三方服务器宕机（导致错误），则不应在本地保存表单，并且应通知用户。请注意，我们的应用程序不需要以这种方式处理错误。\n\
    \n> **注意** 这个例子有点粗糙。实际上，如果你有这样的系统，你通常会有一个外部进程（例如 cron 作业/计划任务）负责与第三方服务器通信，而不是在完成用户请求时实时执行该操作。然后，本地数据库记录将有一个状态列来指示表单是否已成功远程提交。这个例子应该能说明回滚请求的要点。\n\
    \n## 处理分发前错误\n\n首先，我们将处理在分发用户请求之前可能出现的任何错误。在我们的应用程序中，在分发请求之前，我们会加载配置文件、初始化应用程序日志记录器并连接到数据库。此外，我们将捕获其他任何地方（即在分发循环中）未捕获的错误。\n"
- fmt: "# 应用错误处理与日志记录\n\n本质上，我们要做的是将应用程序引导文件（`./htdocs/index.php`）中的所有代码包装在单个`try\
    \ … catch`语句中，这意味着如果在处理用户请求的任何部分发生任何错误（尚未以其他方式处理），我们可以在一个地方处理它。\n\n## 向用户通知错误\n\
    \n当我们检测到发生错误时，我们将把用户的浏览器重定向到一个静态HTML页面，该页面不依赖数据库甚至PHP。\n\n这个页面将简单地告知用户出了问题，并且他们的请求无法完成。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n---\n\n**第14章 部署与维护 527**\n\
    \n`Listing 14-6`显示了`error.html`文件的代码，我们将其存储在`./htdocs`目录中。在生产环境中使用时，你可能更愿意进一步自定义此页面（通过添加你的Logo和CSS样式）。\n\
    \n**Listing 14-6.** *通知用户网站正在维护（error.html）*\n\n```\n<!DOCTYPE html\nPUBLIC \"\
    -//W3C//DTD XHTML 1.0 Strict//EN\"\n\"http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd\"\
    >\n<html lang=\"en\" xml:lang=\"en\">\n<head>\n<title>This site is undergoing\
    \ maintenance</title>\n<meta http-equiv=\"Content-Type\" content=\"text/html;\
    \ charset=iso-8859-1\" />\n</head>\n<body>\n<div>\n<h1>Site Under Maintenance</h1>\n\
    <p>\nThis site is currently under maintenance.\nPlease check back shortly.\n</p>\n\
    </div>\n</body>\n</html>\n```\n\n## 捕获错误\n\n现在我们有了一个出错时显示的错误模板，接下来要对引导文件进行一些修改。我们不在此文件中使用多个`try\
    \ … catch`结构，而是只使用一个。这将涵盖`index.php`中几乎所有的代码。\n\n然而，这样做的唯一问题是，我们无法将这些错误写入日志文件，因为日志记录器将在`try`块内创建，因此在`catch`块中不可用。为了解决这个问题，我们将首先创建日志记录器，并且不使用配置文件中的值，而是使用Apache的`SERVER_ADMIN`变量。如果Web服务器配置正确，那么这应该包含一个有效的电子邮件地址，用于联系管理员。\n\
    \n我们将在代码中初始使用`SERVER_ADMIN`值，一旦`settings.ini`成功加载，就使用配置文件中的`logging.email`值。如果此值在Apache配置中设置不正确，那么异常处理器将捕获此问题。由于`Zend_Log`至少需要一个写入器，我使用了`Zend_Log_Writer_Null`来确保始终有一个写入器。如果不这样做，异常处理器中将会发生错误，因为我们将异常消息写入`$logger`。\n\
    \n---\n\n**第14章 部署与维护 528**\n\n> **注意** `Zend_Log_Writer_Null`是一个特殊的写入器，它只是丢弃所有消息，而不实际写入或发送到任何地方。\n\
    \n`Listing 14-7`显示了引导文件的开头部分，存储在`./htdocs/index.php`中。整个文件将在后续的列表中展示。\n\n**Listing\
    \ 14-7.** *使用Apache配置确定日志电子邮件地址（index.php）*\n\n```\n<?php\nrequire_once('Zend/Loader.php');\n\
    Zend_Loader::registerAutoload();\n\n// setup the application logger\n$logger =\
    \ new Zend_Log(new Zend_Log_Writer_Null());\n\ntry {\n    $writer = new EmailLogger($_SERVER['SERVER_ADMIN']);\n\
    \    $writer->addFilter(new Zend_Log_Filter_Priority(Zend_Log::CRIT));\n    $logger->addWriter($writer);\n\
    ```\n\n请注意，我们使用`$writer`变量来保存`EmailLogger`对象，以便稍后更改目标电子邮件地址。"
  raw: 'Essentially what we are going to do is to wrap all of the code in the application
    bootstrap (./htdocs/index.php) in a single try … catch statement, meaning if any
    error occurs (that hasn’t otherwise been handled) in any part of handling the
    user request, we can deal with it in a single spot.


    Notifying the User of Errors


    When we detect that an error has occurred, we are going to redirect the user’s
    browser to a static HTML page that has no reliance on the database or even on
    PHP for that matter.


    This page will simply tell them that something went wrong and their request could
    not be completed.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch14CMP2 11/13/07 8:20 PM Page 527


    C H A P T E R 1 4 ■ D E P L OY M E N T A N D M A I N T E N A N C E


    **527**


    Listing 14-6 shows the code for the error.html file, which we store in the ./htdocs
    directory. When using this in a production site, you will probably prefer to customize
    this page further (by adding your logo and CSS styles).


    **Listing 14-6.** *Notifying the User the Site Is Undergoing Maintenance (error.html)*


    <!DOCTYPE html


    PUBLIC "-//W3C//DTD XHTML 1.0 Strict//EN"


    ["http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd">](http://www.w3.org/TR/xhtml1/DTD/xhtml1-strict.dtd)


    [<html lang="en" xml:lang="en">](http://www.w3.org/1999/xhtml)


    <head>


    <title>This site is undergoing maintenance</title>


    <meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />


    </head>


    <body>


    <div>


    <h1>Site Under Maintenance</h1>


    <p>


    This site is currently under maintenance.


    Please check back shortly.


    </p>


    </div>


    </body>


    </html>


    Catching Errors


    Now that we have an error template to display when something goes wrong, we are
    going to make some changes to the bootstrap file. Instead of having several try
    … catch constructs in this file, we are going to have only one. This will encompass
    nearly all of the code in index.php.


    The only problem with this, however, is that we won’t be able to write any of
    these errors to the log file, since the logger will be created inside the try
    block and therefore will not be available in the catch block. To deal with this
    problem, we are going to create the logger first, and instead of using the value
    from the configuration, we will use the Apache SERVER_ADMIN


    variable. If the web server has been configured correctly, then this should contain
    a valid e-mail address with which to contact the administrator.


    We will use the SERVER_ADMIN value initially in the code and then use the logging.email
    value in the configuration file once settings.ini has been successfully loaded.
    If this value isn’t set correctly in the Apache configuration, then this will
    be caught by the exception handler. Since Zend_Log requires at least one writer,
    I have used Zend_Log_Writer_Null to ensure there will always be a writer. If this
    is not done, then an error will occur in the exception handler, since we write
    the exception message to $logger.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch14CMP2 11/13/07 8:20 PM Page 528


    **528**


    C H A P T E R 1 4 ■ D E P L OY M E N T A N D M A I N T E N A N C E


    ■**Note** Zend_Log_Writer_Null is a special writer that just discards all messages
    without actually writing or sending them anywhere.


    Listing 14-7 shows the beginning of the bootstrap file, stored in ./htdocs/index.php.
    This entire file will be shown in the coming listings.


    **Listing 14-7.** *Using the Apache Configuration to Determine the Log E-mail
    Address (index.php)*


    <?php


    require_once(''Zend/Loader.php'');


    Zend_Loader::registerAutoload();


    **// setup the application logger**


    **$logger = new Zend_Log(new Zend_Log_Writer_Null());**


    **try {**


    **$writer = new EmailLogger($_SERVER[''SERVER_ADMIN'']);**


    **$writer->addFilter(new Zend_Log_Filter_Priority(Zend_Log::CRIT));**


    **$logger->addWriter($writer);**


    Note that we use the $writer variable to hold the EmailLogger object so we can
    change the target e-mail address shortly.'
