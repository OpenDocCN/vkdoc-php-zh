    System32`（如果 `System32` 文件夹在其他位置，则复制到相应位置）。\n\n3.  将 `php.ini-recommended` 从 `C:\\\
    PHP` 复制到你的 Windows 文件夹，并将其重命名为 `php.ini`。\n\n4.  取消 `php.ini` 中以下行的注释，以启用 `mhash`、`mcrypt`、`curl`、`pdo`\
