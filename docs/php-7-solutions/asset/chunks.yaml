    完成的代码位于 `ch11` 文件夹中的 `authenticate.php` 和 `login_02.php` 文件中。在测试 `login.php` 之前，你需要创建
    `menu.php` 并通过会话限制访问。


    ### PHP 解决方案 11-6：使用会话限制页面访问


    此 PHP 解决方案演示了如何通过检查是否存在一个指示用户凭据已通过身份验证的会话变量来限制对页面的访问。如果该变量尚未设置，`header()` 函数会将用户重定向到登录页面。


    1. 在 `sessions` 文件夹中创建两个页面，分别命名为 `menu.php` 和 `secretpage.php`。只要它们能相互链接，内容无关紧要。或者，使用
    `ch11` 文件夹中的 `menu_01.php` 和 `secretpage_01.php`。


    2. 通过在 `DOCTYPE` 声明之前插入以下代码来保护对每个页面的访问：


    ```

    <?php

    session_start();

    if (!isset($_SESSION[''authenticated''])) {

    header(''Location: login.php'');

    exit;

    }

    ?>

    ```


    启动会话后，脚本会检查 `$_SESSION[''authenticated'']` 是否已设置。如果未设置，它会将用户重定向到 `login.php` 并退出。就这么简单！脚本不需要知道
    `$_SESSION[''authenticated'']` 的值，不过你也可以通过修改第 4 行来加倍确保安全，如下所示：


    ```

    if (!isset($_SESSION[''authenticated'']) || $_SESSION[''authenticated''] != ''Jethro
    Tull'') {

    ```


    如果 `$_SESSION[''authenticated'']` 的值错误，此修改还会拒绝访问者。


    3. 保存 `menu.php` 和 `secretpage.php`，然后尝试在浏览器中加载它们中的任何一个。你应该总是被重定向到 `login.php`。


    4. 在 `login.php` 中输入一个你在 `hashed.csv` 中注册的有效用户名和密码（该值区分大小写），然后点击 `Log in`。你应该会立即被重定向到
    `menu.php`，并且指向 `secretpage.php` 的链接也应该有效。


    你可以在 `ch11` 文件夹中将你的代码与 `menu_02.php` 和 `secretpage_02.php` 进行对照检查。


    要保护你网站上的任何页面，只需在 `DOCTYPE` 声明之上添加第二步中的八行代码即可。


    ### PHP 解决方案 11-7：创建可重用的退出按钮


    除了登录网站，用户还应该能够退出登录。此 PHP 解决方案展示了如何创建一个可以插入到任何页面中的退出按钮。


    继续使用上一节中的文件。


    1. 通过插入以下表单，在 `menu.php` 的 `<body>` 中创建一个退出按钮：


    ```

    <form method="post" action="">

    <input type="submit" name="logout" value="退出登录">

    </form>

    ```


    该页面应类似于以下截图：


    ![../images/332054_4_En_11_Chapter/332054_4_En_11_Figj_HTML.jpg](img/332054_4_En_11_Figj_HTML.jpg)


    2. 现在你需要添加点击退出按钮时运行的脚本。像这样修改 `DOCTYPE` 声明上方的代码（该代码在 `menu_02.php` 中）：


    ```

    <?php

    session_start();

    if (isset($_POST[''logout''])) {

    $_SESSION = array();

    if (ini_get("session.use_cookies")) {

    $params = session_get_cookie_params();

    setcookie(session_name(), '''', time() - 42000,

    $params["path"], $params["domain"],

    $params["secure"], $params["httponly"]

    );

    }

    session_destroy();

    header(''Location: login.php'');

    exit;

    }

    if (!isset($_SESSION[''authenticated''])) {

    header(''Location: login.php'');

    exit;

    }

    ?>

    ```


    这与本章前面“销毁会话”中的代码相同。唯一的区别是它被包裹在一个条件语句中，以便仅在点击退出按钮时运行，并且它使用 `header()` 将用户重定向到 `login.php`。


    3. 保存 `menu.php` 并通过点击退出登录进行测试。你应该会被重定向到 `login.php`。任何试图返回到 `menu.php` 或 `secretpage.php`
    的操作都将把你带回到 `login.php`。


    4. 你可以将相同的代码放在每个受限页面中，但 PHP 的重点在于节省工作，而不是增加工作量。将其变成一个包含文件是有意义的。在 `includes` 文件夹中创建一个名为
    `logout.php` 的新文件。将步骤 1 和 2 中的新代码剪切并粘贴到新文件中，如下所示（它位于 `ch11` 文件夹的 `logout.php`
    中）：


    因为该表单将被包含在不同的页面中，所以你无法将 `action` 属性设置为特定页面。但是，省略它只会导致当前页面被重新加载，因此退出脚本将在每个包含 `logout.php`
    的页面中可用。


    5. 在你剪切表单代码的 `menu.php` 中的同一位置，包含新文件，如下所示：


    ```

    <?php include(''includes/logout.php''); ?>

    ```


    像这样从外部文件包含代码意味着在对 `setcookie()` 和 `header()` 的调用之前会有输出发送到浏览器。因此，你需要对输出进行缓冲，如 PHP
    解决方案 11-2 所示。


    6. 在 `menu.php` 顶部的 `session_start()` 调用之后立即添加 `ob_start();`。无需使用 `ob_end_flush()`
    或 `ob_end_clean()`。如果你尚未显式地执行此操作，PHP 会在脚本结束时自动刷新缓冲区。


    7. 保存 `menu.php` 并测试页面。它的外观和功能应与之前完全相同。


    8. 对 `secretpage.php` 重复步骤 5 和 6。现在你有了一个简单、可重用的退出按钮，可以将其合并到任何受限页面中。


    你可以在 `ch11` 文件夹中将你的代码与 `menu_04.php`、`secretpage_03.php` 和 `logout.php` 进行对照检查。


    ### 保持哈希算法的最新状态


    PHP 解决方案 11-3 到 11-7 构建了一个简单而有效的用户身份验证系统，该系统不需要数据库后端。然而，它确实有其局限性。最重要的是，包含用户名和密码的
    CSV 文件必须位于服务器根目录之外。此外，一旦记录数量增多，查询数据库通常比逐行循环处理 CSV 文件快得多。第 19 章涵盖了使用数据库进行用户身份验证。


    使用 `password_hash()` 和 `password_verify()` 的主要优势在于，它们被设计为能够跟上密码学技术的改进。使用 `PASSWORD_DEFAULT`
    作为 `password_hash()` 的第二个参数，而不是指定特定的哈希算法，可以确保新注册始终使用当时被认为是最安全的方法。即使默认算法发生更改，现有的密码仍然可以通过
    `password_verify()` 函数进行验证，因为哈希密码包含了标识其哈希方式的信息。'
