- fmt: "### Extracting the First Paragraph\n\nAssuming that you have entered your\
    \ text in the database using the Enter or Return key to indicate new paragraphs,\
    \ this is very easy. Simply retrieve the full text, use `strpos()` to find the\
    \ first new line character, and use `substr()` to extract the first section of\
    \ text up to that point.\n\nThe following SQL query is used in `blog_para_mysqli.php`\
    \ and `blog_para_pdo.php`:\n\n```\nSELECT article_id, title, article\nFROM blog\
    \ ORDER BY created DESC\n```\n\nThe following code is used to display the first\
    \ paragraph of `article`:\n\n```\n<?= substr($row['article'], 0, strpos($row['article'],\
    \ PHP_EOL)); ?>\n```\n\nIf that makes your head spin, then let’s break it up and\
    \ take a look at the third argument on its own:\n\n`strpos($row['article'], PHP_EOL)`\n\
    \nThis locates the first end of line character in `$row['article']` in a cross-platform\
    \ way using the `PHP_EOL` constant (see “Appending content with `fopen()`” in\
    \ [Chapter 7](#A978-1-4842-0635-5_7_Chapter.html)). You could rewrite the code\
    \ like this:\n\n```\n$newLine = strpos($row['article'], PHP_EOL);\necho substr($row['article'],\
    \ 0, $newLine);\n```\n\nBoth sets of code do exactly the same thing, but PHP lets\
    \ you nest a function as an argument passed to another function. As long as the\
    \ nested function returns a valid result, you can frequently use shortcuts like\
    \ this.\n\nUsing the `PHP_EOL` constant eliminates the problem of dealing with\
    \ the different characters used by Linux, Mac OS X, and Windows to insert a new\
    \ line.\n\n### Displaying Paragraphs\n\nSince we’re on the subject of paragraphs,\
    \ many beginners are confused by the fact that all the text retrieved from a database\
    \ is displayed as a continuous block, with no separation between paragraphs. HTML\
    \ ignores whitespace, including new lines. To get text stored in a database displayed\
    \ as paragraphs, you have the following options:\n\n- Store your text as HTML.\n\
    - Convert new lines to `<br/>` tags.\n- Create a custom function to replace new\
    \ lines with paragraph tags.\n\n#### Storing Database Records as HTML\n\nThe first\
    \ option involves installing an HTML editor, such as CK Editor ( [http://ckeditor.com/](http://ckeditor.com/)\
    \ ) or TinyMCE ( [www.tinymce.com](http://www.tinymce.com/) ) in your content\
    \ management forms. Mark up your text as you insert or update it. The HTML is\
    \ stored in the database, and the text displays as intended. Installing one of\
    \ these editors is beyond the scope of this book.\n\n#### Converting Newlines\
    \ to `<br/>` Tags\n\nThe simplest option is to pass your text to the `nl2br()`\
    \ function before displaying it, like this:\n\n```\necho nl2br($row['article']);\n\
    ```\n\nVoilà!—paragraphs. Well, not really. The `nl2br()` function converts new\
    \ line characters to `<br/>` tags (the closing slash is for compatibility with\
    \ XHTML, and is valid in HTML5). As a result, you get fake paragraphs. It’s a\
    \ quick and dirty solution, but not ideal.\n\n#### Creating a Function to Insert\
    \ `<p>` Tags\n\nTo display text retrieved from a database as genuine paragraphs,\
    \ wrap the database result in a pair of paragraph tags, and then use the `preg_replace()`\
    \ function to convert consecutive newline characters to a closing `</p>` tag,\
    \ immediately followed by an opening `<p>` tag, like this:\n\n```\n<p><?= preg_replace('/[\\\
    r\\n]+/', \"</p>\\n<p>\", $row['article']); ?></p>\n```\n\nThe regular expression\
    \ used as the first argument matches one or more carriage returns and/or newline\
    \ characters. You can’t use the `PHP_EOL` constant here because you need to match\
    \ all consecutive newline characters and replace them with a single pair of paragraph\
    \ tags. The pair of `<p>` tags is in double quotes, with `\\n` between them to\
    \ add a newline character, in order to make the HTML code easier to read. Remembering\
    \ the pattern for a regex can be difficult, so you can easily convert this into\
    \ a custom function, like this:\n\n```\nfunction convertToParas($text) {\n   \
    \ $text = trim($text);\n    return '<p>' . preg_replace('/[\\r\\n]+/', \"</p>\\\
    n<p>\", $text) . \"</p>\\n\";\n}\n```\n\nThis trims whitespace, including newline\
    \ characters, from the beginning and end of the text, adds a `<p>` tag at the\
    \ beginning, replaces internal sequences of newline characters with closing and\
    \ opening tags, and appends a closing `</p>` tag and newline character at the\
    \ end.\n\nYou can then use the function like this:\n\n```\n<?= convertToParas($row['article']);\
    \ ?>\n```\n\nThe code for the function definition is in `utility_funcs.php` in\
    \ the `ch14` folder. You can see it being used in `blog_ptags_mysqli.php` and\
    \ `blog_ptags_pdo.php`."
  raw: '### Extracting the First Paragraph


    Assuming that you have entered your text in the database using the Enter or Return
    key to indicate new paragraphs, this is very easy. Simply retrieve the full text,
    use `strpos()` to find the first new line character, and use `substr()` to extract
    the first section of text up to that point.


    The following SQL query is used in `blog_para_mysqli.php`, and `blog_para_pdo.php`:


    `SELECT article_id, title, article`


    `FROM blog ORDER BY created DESC`


    The following code is used to display the first paragraph of `article`:


    `<?= substr($row[''article''], 0, strpos($row[''article''], PHP_EOL)); ?>`


    If that makes your head spin, then let’s break it up and take a look at the third
    argument on its own:


    `strpos($row[''article''], PHP_EOL)`


    This locates the first end of line character in `$row[''article'']` in a cross-platform
    way using the `PHP_EOL` constant (see “Appending content with fopen()” in [Chapter
    7](#A978-1-4842-0635-5_7_Chapter.html)). You could rewrite the code like this:


    `$newLine = strpos($row[''article''], PHP_EOL);`


    `echo substr($row[''article''], 0,` `$newLine` `);`


    Both sets of code do exactly the same thing, but PHP lets you nest a function
    as an argument passed to another function. As long as the nested function returns
    a valid result, you can frequently use shortcuts like this.


    Using the `PHP_EOL` constant eliminates the problem of dealing with the different
    characters used by Linux, Mac OS X, and Windows to insert a new line.


    ### Displaying Paragraphs


    Since we’re on the subject of paragraphs, many beginners are confused by the fact
    that all the text retrieved from a database is displayed as a continuous block,
    with no separation between paragraphs. HTML ignores whitespace, including new
    lines. To get text stored in a database displayed as paragraphs, you have the
    following options:


    *   Store your text as HTML.

    *   Convert new lines to `<br/>` tags.

    *   Create a custom function to replace new lines with paragraph tags.


    #### Storing Database Records as HTML


    The first option involves installing an HTML editor, such as CK Editor ( [`http://ckeditor.com/`](http://ckeditor.com/)
    ) or TinyMCE ( [`www.tinymce.com`](http://www.tinymce.com/) ) in your content
    management forms. Mark up your text as you insert or update it. The HTML is stored
    in the database, and the text displays as intended. Installing one of these editors
    is beyond the scope of this book.


    #### Converting Newlines to <br/> Tags


    The simplest option is to pass your text to the `nl2br()` function before displaying
    it, like this:


    `echo nl2br($row[''article'']);`


    Voilà!—paragraphs. Well, not really. The `nl2br()` function converts new line
    characters to `<br/>` tags (the closing slash is for compatibility with XHTML,
    and is valid in HTML5). As a result, you get fake paragraphs. It’s a quick and
    dirty solution, but not ideal.


    #### Creating a Function to Insert <p> Tags


    To display text retrieved from a database as genuine paragraphs, wrap the database
    result in a pair of paragraph tags, and then use the `preg_replace()` function
    to convert consecutive newline characters to a closing `</p>` tag, immediately
    followed by an opening `<p>` tag, like this:


    `<p><?= preg_replace(''/[\r\n]+/'', "</p>\n<p>", $row[''article'']); ?></p>`


    The regular expression used as the first argument matches one or more carriage
    returns and/or newline characters. You can’t use the `PHP_EOL` constant here because
    you need to match all consecutive newline characters and replace them with a single
    pair of paragraph tags. The pair of `<p>` tags is in double quotes, with `\n`
    between them to add a newline character, in order to make the HTML code easier
    to read. Remembering the pattern for a regex can be difficult, so you can easily
    convert this into a custom function, like this:


    `function convertToParas($text) {`


    `$text = trim($text);`


    `return ''<p>'' . preg_replace(''/[\r\n]+/'', "</p>\n<p>", $text) . "</p>\n";`


    `}`


    This trims whitespace, including newline characters, from the beginning and end
    of the text, adds a `<p>` tag at the beginning, replaces internal sequences of
    newline characters with closing and opening tags, and appends a closing `</p>`
    tag and newline character at the end.


    You can then use the function like this:


    `<?= convertToParas($row[''article'']); ?>`


    The code for the function definition is in `utility_funcs.php` in the `ch14` folder.
    You can see it being used in `blog_ptags_mysqli.php` and `blog_ptags_pdo.php`.'
  trans: "\n### 提取第一段落\n\n假设你在数据库中输入文本时，使用回车键（Enter）来分隔段落，那么这将会非常简单。只需检索完整文本，使用 `strpos()`\
    \ 找到第一个换行符，然后用 `substr()` 提取截至该位置的第一段文本。\n\n以下 SQL 查询用于 `blog_para_mysqli.php`\
    \ 和 `blog_para_pdo.php`：\n\n```\nSELECT article_id, title, article\nFROM blog\
    \ ORDER BY created DESC\n```\n\n以下代码用于显示 `article` 的第一段落：\n\n```\n<?= substr($row['article'],\
    \ 0, strpos($row['article'], PHP_EOL)); ?>\n```\n\n如果这段代码让你头晕，那么让我们把它拆开，单独查看第三个参数：\n\
    \n`strpos($row['article'], PHP_EOL)`\n\n这行代码使用 `PHP_EOL` 常量（参见第 7 章中的“使用 `fopen()`\
    \ 追加内容”），以跨平台的方式定位 `$row['article']` 中的第一个行结束符。你可以将代码重写为：\n\n```\n$newLine = strpos($row['article'],\
    \ PHP_EOL);\necho substr($row['article'], 0, $newLine);\n```\n\n两组代码的功能完全相同，但\
    \ PHP 允许你将一个函数嵌套作为另一个函数的参数。只要嵌套函数返回有效结果，就可以经常使用此类简写方式。\n\n使用 `PHP_EOL` 常量解决了处理\
    \ Linux、Mac OS X 和 Windows 系统在插入换行符时使用不同字符的问题。\n\n### 显示段落\n\n既然我们讨论到了段落主题，许多初学者会对从数据库检索的所有文本都显示为连续块、段落之间没有分隔这一事实感到困惑。HTML\
    \ 会忽略空白字符，包括换行符。要将数据库中存储的文本按段落显示，你可以选择以下方法：\n\n- 将文本存储为 HTML 格式。\n- 将换行符转换为 `<br/>`\
    \ 标签。\n- 创建自定义函数，将换行符替换为段落标签。\n\n#### 将数据库记录存储为 HTML 格式\n\n第一种选择是在内容管理表单中安装 HTML\
    \ 编辑器，例如 CK Editor（[`ckeditor.com/`](http://ckeditor.com/)）或 TinyMCE（[www.tinymce.com](http://www.tinymce.com/)）。在插入或更新文本时进行标记。HTML\
    \ 格式会被存储在数据库中，文本也能按预期方式显示。安装这些编辑器的内容超出了本书的讨论范围。\n\n#### 将换行符转换为 `<br/>` 标签\n\n\
    最简单的方法是在显示文本之前，将其传递给 `nl2br()` 函数，代码如下：\n\n```\necho nl2br($row['article']);\n\
    ```\n\n瞧！——段落出来了。嗯，其实并非如此。`nl2br()` 函数将换行符转换为 `<br/>` 标签（结尾处的斜杠是为了与 XHTML 兼容，在\
    \ HTML5 中也是有效的）。结果，你得到的是伪段落。这是一种快速但粗糙的解决方案，并不理想。\n\n#### 创建插入 `<p>` 标签的函数\n\n\
    要将从数据库检索的文本显示为真正的段落，可以用一对段落标签包裹数据库结果，然后使用 `preg_replace()` 函数将连续的换行符替换为关闭的 `</p>`\
    \ 标签，后面紧接着一个起始的 `<p>` 标签，代码如下：\n\n```\n<p><?= preg_replace('/[\\r\\n]+/', \"</p>\\\
    n<p>\", $row['article']); ?></p>\n```\n\n用作第一个参数的正则表达式匹配一个或多个回车符和/或换行符。这里不能使用\
    \ `PHP_EOL` 常量，因为你需要匹配所有连续的换行符，并将它们替换为一对段落标签。这对 `<p>` 标签放在双引号内，并在它们之间添加 `\\n`\
    \ 以插入换行符，从而使 HTML 代码更易于阅读。记住正则表达式的模式可能比较困难，因此你可以轻松地将其转换为自定义函数，如下所示：\n\n```\nfunction\
    \ convertToParas($text) {\n    $text = trim($text);\n    return '<p>' . preg_replace('/[\\\
    r\\n]+/', \"</p>\\n<p>\", $text) . \"</p>\\n\";\n}\n```\n\n该函数会剔除文本开头和结尾的空白字符（包括换行符），在开头添加一个\
    \ `<p>` 标签，将内部的连续换行符序列替换为闭合和起始标签，并在末尾附加一个关闭的 `</p>` 标签和一个换行符。\n\n然后你可以这样使用该函数：\n\
    \n```\n<?= convertToParas($row['article']); ?>\n```\n\n函数定义的代码位于 `ch14` 文件夹中的\
    \ `utility_funcs.php` 文件内。你可以在 `blog_ptags_mysqli.php` 和 `blog_ptags_pdo.php`\
    \ 中查看其用法。\n"
- fmt: '### Extracting Complete Sentences


    PHP has no concept of what constitutes a sentence. Counting periods means you
    ignore all sentences that end with an exclamation point or a question mark. You
    also run the risk of breaking a sentence on a decimal point or cutting off a closing
    quote after a period. To overcome these problems, I have devised a PHP function
    called `getFirst()` that identifies the punctuation at the end of a normal sentence:


    - A period, question mark, or exclamation point

    - Optionally followed by a single or double quote

    - Followed by one or more spaces


    The `getFirst()` function takes two arguments: the text from which you want to
    extract the first section and the number of sentences you want to extract. The
    second argument is optional; if it''s not supplied, the function extracts the
    first two sentences. The code looks like this (it''s in `utility_funcs.php`):


    ```

    function getFirst($text, $number=2) {


    // use regex to split into sentences

    $sentences = preg_split(''/([.?!]["\\'''']?\s)/'', $text, $number+1,

    PREG_SPLIT_DELIM_CAPTURE);

    if (count($sentences) > $number * 2) {

    $remainder = array_pop($sentences);

    } else {

    $remainder = '''';

    }

    $result = [];

    $result[0] = implode('''', $sentences);

    $result[1] = $remainder;

    return $result;

    }

    ```


    All you really need to know about this function is that it returns an array containing
    two elements: the extracted sentences and any text that''s left over. You can
    use the second element to create a link to a page containing the full text.


    If you''re interested in how the function works, read on. The line highlighted
    in bold uses a regex to identify the end of each sentence—a period, question mark,
    or exclamation point, optionally followed by a double or single quotation mark
    and a space. This is passed as the first argument to `preg_split()`, which uses
    the regex to split the text into an array. The second argument is the target text.
    The third argument determines the maximum number of chunks to split the text into.
    You want one more than the number of sentences to be extracted. Normally, `preg_split()`
    discards the characters matched by the regex, but using `PREG_SPLIT_DELIM_CAPTURE`
    as the fourth argument together with a pair of capturing parentheses in the regex
    preserves them as separate array elements. In other words, the elements of the
    `$sentences` array consist alternately of the text of a sentence followed by the
    punctuation and space, like this:


    ```

    $sentences[0] = ''"Hello, world'';

    $sentences[1] = ''!" '';

    ```


    It''s impossible to know in advance how many sentences there are in the target
    text, so you need to find out if there''s anything remaining after extracting
    the desired number of sentences. The conditional statement uses `count()` to ascertain
    the number of elements in the `$sentences` array and compares the result with
    `$number` multiplied by 2 (because the array contains two elements for each sentence).
    If there''s more text, `array_pop()` removes the last element of the `$sentences`
    array and assigns it to `$remainder`. If there''s no further text, `$remainder`
    is an empty string.


    The final stage of the function uses `implode()` with an empty string as its first
    argument to stitch the extracted sentences back together and then returns a two-element
    array containing the extracted text and anything that''s left over.


    Don''t worry if you found that explanation hard to follow. The code is quite advanced.
    It took a lot of experimentation to build the function, and I have improved it
    gradually over the years.


    ### PHP Solution 14-1: Displaying the First Two Sentences of an Article


    This PHP solution shows how to display an extract from each article in the `blog`
    table using the `getFirst()` function described in the preceding section. If you
    created the Japan Journey site earlier in the book, use `blog.php`. Alternatively,
    use `blog_01.php` from the `ch14` folder and save it as `blog.php` in the `phpsols`
    site root. You also need `footer.php`, `menu.php`, `title.php`, and `connection.php`
    in the `includes` folder. There are copies of these files in the `ch14` folder
    if you don''t already have them in the `includes` folder.


    Copy `utility_funcs.php` from the `ch14` folder to the `includes` folder, and
    include it in `blog.php` in the PHP code block above the `DOCTYPE` declaration.
    Also include `connection.php` and create a connection to the database. This page
    needs read-only privileges, so use `read` as the argument passed to `dbConnect()`,
    like this:


    ```

    require_once ''./includes/connection.php'';

    require_once ''./includes/utility_funcs.php'';

    // create database connection

    $conn = dbConnect(''read'');

    ```


    Prepare an SQL query to retrieve all records from the `blog` table and then submit
    it, like this:


    - Add ''pdo'' as the second argument to `dbConnect()` if you''re using PDO.


    ```

    $sql = ''SELECT * FROM blog ORDER BY created DESC'';

    $result = $conn->query($sql);

    ```


    - For MySQLi, use this:


    Add the code to check for a database error.


    ```

    if (!$result) {

    $error = $conn->error;

    }

    ```


    - For PDO, call the `errorInfo()` method and check for the existence of the third
    array element, like this:


    ```

    $errorInfo = $conn->errorInfo();

    if (isset($errorInfo[2])) {

    $error = $errorInfo[2];

    }

    ```


    Delete all the static HTML inside the `<main>` element in the body of the page,
    and add the code to display the error message if a problem arises with the query:


    ```

    <main>

    <?php if (isset($error)) {

    echo "<p>$error</p>";

    } else {

    }

    ?>

    </main>

    ```


    Create a loop inside the `else` block to display the results:


    ```

    while ($row = $result->fetch_assoc()) {

    echo "<h2>{$row[''title'']}</h2>";

    $extract = getFirst($row[''article'']);

    echo "<p>$extract[0]";

    if ($extract[1]) {

    echo ''<a href="details.php?article_id='' . $row[''article_id''] . ''">

    More</a>'';

    }

    echo ''</p>'';

    }

    ```


    - The code is the same for PDO, except for this line:


    `while ($row = $result->fetch_assoc()) {`


    - Replace it with this:


    `while ($row = $result->fetch()) {`


    Test the function by adding a number as a second argument to `getFirst()`, like
    this:


    `$extract = getFirst($row[''article''], 3);`


    - This displays the first three sentences. If you increase the number so that
    it equals or exceeds the number of sentences in an article, the `More` link won''t
    be displayed.

    - You can compare your code with `blog_mysqli.php` and `blog_pdo.php` in the `ch14`
    folder.


    The first two sentences have been extracted cleanly from the longer text. Save
    the page and test it in a browser. You should see the first two sentences of each
    article displayed as shown in Figure 14-3.


    - The `getFirst()` function processes `$row[''article'']` and stores the result
    in `$extract`. The first two sentences of `article` in `$extract[0]` are immediately
    displayed. If `$extract[1]` contains anything, it means there is more to display.
    So the code inside the `if` block displays a link to `details.php`, with the article''s
    primary key in a query string.


    We''ll look at `details.php` in Chapter 15. Before that, let''s tackle the minefield
    presented by using dates in a dynamic website.


    ## Let''s Make a Date


    Dates and time are so fundamental to modern life that we rarely pause to think
    how complex they are. There are 60 seconds to a minute and 60 minutes to an hour,
    but 24 hours to a day. Months range between 28 and 31 days, and a year can be
    either 365 or 366 days. The confusion doesn''t stop there, because 7/4 means July
    4 to an American or Japanese person, but 7 April to a European. To add to the
    confusion, PHP handles dates differently from MySQL. Time to bring order to chaos...


    > Note: MariaDB handles dates the same way. To avoid unnecessary repetition, I''ll
    refer only to MySQL.'
  raw: '### Extracting Complete Sentences


    PHP has no concept of what constitutes a sentence. Counting periods means you
    ignore all sentences that end with an exclamation point or a question mark. You
    also run the risk of breaking a sentence on a decimal point or cutting off a closing
    quote after a period. To overcome these problems, I have devised a PHP function
    called `getFirst()` that identifies the punctuation at the end of a normal sentence:


    *   A period, question mark, or exclamation point

    *   Optionally followed by a single or double quote

    *   Followed by one or more spaces


    The `getFirst()` function takes two arguments: the text from which you want to
    extract the first section and the number of sentences you want to extract. The
    second argument is optional; if it’s not supplied, the function extracts the first
    two sentences. The code looks like this (it’s in `utility_funcs.php`):


    `function getFirst($text, $number=2) {`


    `// use regex to split into sentences`


    `$sentences = preg_split(''/([.?!]["\'']?\s)/'', $text, $number+1,`


    `PREG_SPLIT_DELIM_CAPTURE);`


    `if (count($sentences) > $number * 2) {`


    `$remainder = array_pop($sentences);`


    `} else {`


    `$remainder = '''';`


    `}`


    `$result = [];`


    `$result[0] = implode('''', $sentences);`


    `$result[1] = $remainder;`


    `return $result;`


    `}`


    All you really need to know about this function is that it returns an array containing
    two elements: the extracted sentences and any text that’s left over. You can use
    the second element to create a link to a page containing the full text.


    If you’re interested in how the function works, read on. The line highlighted
    in bold uses a regex to identify the end of each sentence—a period, question mark,
    or exclamation point, optionally followed by a double or single quotation mark
    and a space. This is passed as the first argument to `preg_split()`, which uses
    the regex to split the text into an array. The second argument is the target text.
    The third argument determines the maximum number of chunks to split the text into.
    You want one more than the number of sentences to be extracted. Normally, `preg_split()`
    discards the characters matched by the regex, but using `PREG_SPLIT_DELIM_CAPTURE`
    as the fourth argument together with a pair of capturing parentheses in the regex
    preserves them as separate array elements. In other words, the elements of the
    `$sentences` array consist alternately of the text of a sentence followed by the
    punctuation and space, like this:


    `$sentences[0] = ''"Hello, world'';`


    `$sentences[1] = ''!" '';`


    It’s impossible to know in advance how many sentences there are in the target
    text, so you need to find out if there’s anything remaining after extracting the
    desired number of sentences. The conditional statement uses `count()` to ascertain
    the number of elements in the `$sentences` array and compares the result with
    `$number` multiplied by 2 (because the array contains two elements for each sentence).
    If there’s more text, `array_pop()` removes the last element of the `$sentences`
    array and assigns it to `$remainder`. If there’s no further text, `$remainder`
    is an empty string.


    The final stage of the function uses `implode()` with an empty string as its first
    argument to stitch the extracted sentences back together and then returns a two-element
    array containing the extracted text and anything that’s left over.


    Don’t worry if you found that explanation hard to follow. The code is quite advanced.
    It took a lot of experimentation to build the function, and I have improved it
    gradually over the years.


