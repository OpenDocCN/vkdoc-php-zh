    \      echo '$'.$price .'<br/>';\n        echo \"</td>\";\n    }\n    else\n \
    \   {\n        $x=1;\n        echo \"</tr><tr>\";\n    }\n}\necho \"</table>\"\
    ;\n?>\n```\n\nThe `topmenu.php` script is included at the top to display the web\
