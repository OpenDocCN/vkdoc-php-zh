  trans: "\n■**注意** 函数参数前的与符号（`&`）表示该参数通过引用传递。当变量通过引用传递时，传递的是变量的别名，而不是创建该值的新副本。这样，当变量通过引用传递且被调用函数更改其值时，其新值也会反映在调用函数中。通过引用传递是接收被调用函数返回值的另一种方法，当需要从被调用函数获取多个返回值时尤其有用。`CreateSubpageQuery`\
    \ 通过其返回值返回 `SELECT` 查询的文本，并通过通过引用传递的 `$rHowManyPages` 参数返回子页面总数。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH04.qxd 10/31/06 10:01 PM Page 141\n\n第 4 章 ■ 创建产品目录：第二部分 **141**\n\n##\
    \ GetProductsOnDepartment\n\n`GetProductsOnDepartment` 函数返回特定部门推荐的产品列表。当顾客访问某个部门的主页时，必须显示该部门的推荐产品。将其放入\
    \ `Catalog` 类中。\n\n```\n// 检索部门页面的产品列表\npublic static function GetProductsOnDepartmentDisplay(\n\
    \  $departmentId, $pageNo, &$rHowManyPages)\n{\n  // 查询返回部门页面中的产品数量\n  $sql =\
    \ 'SELECT catalog_count_products_on_department(:department_id);';\n  $params =\
    \ array (':department_id' => $departmentId);\n\n  // 计算显示产品所需的页数\n  $rHowManyPages\
    \ = Catalog::HowManyPages($sql, $params);\n\n  // 计算起始项\n  $start_item = ($pageNo\
    \ - 1) * PRODUCTS_PER_PAGE;\n\n  // 检索产品列表\n  $sql = 'SELECT *\n          FROM\
    \ catalog_get_products_on_department(\n            :department_id, :short_product_description_length,\n\
    \            :products_per_page, :start_item);';\n  $params = array (\n    ':department_id'\
    \ => $departmentId,\n    ':short_product_description_length' => SHORT_PRODUCT_DESCRIPTION_LENGTH,\n\
    \    ':products_per_page' => PRODUCTS_PER_PAGE,\n    ':start_item' => $start_item);\n\
    \  $result = DatabaseHandler::Prepare($sql);\n\n  // 执行查询并返回结果\n  return DatabaseHandler::GetAll($result,\
    \ $params);\n}\n```\n\n## GetProductsOnCatalog\n\n`GetProductsOnCatalog` 函数返回目录首页上推荐的产品列表。它放在\
    \ `Catalog` 类中。\n\n```\n// 检索目录显示的产品列表\npublic static function GetProductsOnCatalogDisplay($pageNo,\
    \ &$rHowManyPages)\n{\n  // 查询返回目录首页的产品数量\n  $sql = 'SELECT catalog_count_products_on_catalog();';\n\
    \n  // 计算显示产品所需的页数\n  $rHowManyPages = Catalog::HowManyPages($sql, null);\n\n\
    \  // 计算起始项\n  $start_item = ($pageNo - 1) * PRODUCTS_PER_PAGE;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH04.qxd 10/31/06 10:01 PM Page 142\n\n**142** 第 4 章 ■ 创建产品目录：第二部分\n\n```\n\
    \  // 检索产品列表\n  $sql = 'SELECT *\n          FROM catalog_get_products_on_catalog(\n\
    \            :short_product_description_length,\n            :products_per_page,\
    \ :start_item);';\n  $params = array (\n    ':short_product_description_length'\
    \ => SHORT_PRODUCT_DESCRIPTION_LENGTH,\n    ':products_per_page' => PRODUCTS_PER_PAGE,\n\
    \    ':start_item' => $start_item);\n  $result = DatabaseHandler::Prepare($sql);\n\
    \n  // 执行查询并返回结果\n  return DatabaseHandler::GetAll($result, $params);\n}\n```\n\
    \n## GetProductDetails\n\n将 `GetProductDetails` 方法添加到 `Catalog` 类中：\n\n```\n//\
    \ 检索完整的产品详情\npublic static function GetProductDetails($productId)\n{\n  // 构建\
    \ SQL 查询\n  $sql = 'SELECT *\n          FROM catalog_get_product_details(:product_id);';\n\
    \n  // 构建参数数组\n  $params = array (':product_id' => $productId);\n\n  // 使用 PDO\
    \ 特定功能准备语句\n  $result = DatabaseHandler::Prepare($sql);\n\n  // 执行查询并返回结果\n  return\
    \ DatabaseHandler::GetRow($result, $params);\n}\n```\n\n## 实现表示层\n"
- fmt: "# Believe It or Not\n\nBelieve it or not, right now the data and business\
    \ tiers of the product catalog are complete for this chapter. All you have to\
    \ do is use their functionality in the presentation tier. In this final section,\
    \ you’ll create a few Smarty templates and integrate them into the existing project.\n\
    \nExecute the HatShop project (or load `http://localhost/hatshop` in your favorite\
    \ web browser) to see once again what happens when the visitor clicks a department.\
    \ After the page loads, click one of the departments. The main page (`index.php`)\
    \ is reloaded, but this time with a query string at the end:\n\n`http://localhost/hatshop/index.php?DepartmentID=1`\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](images/00141.png)\n\n\
    Using this parameter, `DepartmentID`, you can obtain any information about the\
    \ selected department, such as its name, description, list of products, and so\
    \ on. In the following sections, you’ll create the controls that display the list\
    \ of categories associated with the selected department, and the products for\
    \ the selected department, category, or main web page.\n\n## Displaying Department\
    \ and Category Details\n\nThe componentized template responsible for showing the\
    \ contents of a particular department is named `department`, and you’ll build\
    \ it in the exercise that follows. You’ll first create the componentized template\
    \ and then modify `index.php` and `templates/index.tpl` to load it when `DepartmentID`\
    \ is present in the query string. After this exercise, when clicking a department\
    \ in the list, you should see a page like the one in Figure 4-9.\n\n**Figure 4-9.**\
    \ *Selecting the Holiday department*\n\n## Exercise: Displaying Department Details\n\
    \n**1.** Add the following two styles to the `hatshop.css` file. You’ll need them\
    \ for displaying the department’s title and description:\n\n```css\n.title\n{\n\
    \  color: #ff0000;\n  font-family: arial, tahoma, verdana;\n  font-size: 18px;\n\
    \  margin: 0px;\n}\n\n.description\n{\n  color: #0583b5;\n  font-size: 12px;\n\
    \  font-weight: bold;\n  margin: 0px;\n}\n```\n\n**2.** Create a new template\
    \ file named `blank.tpl` in the `presentation/templates` folder with the following\
    \ contents:\n\n```\n{* Smarty blank page *}\n```\n\nYes, this is a blank Smarty\
    \ template file, which contains just a comment. You’ll use it a bit later. Make\
    \ sure you add that comment to the file; otherwise, if you leave it empty, you’ll\
    \ get an error when trying to use the template.\n\n**3.** Create a new template\
    \ file named `department.tpl` in the `presentation/templates` folder, and add\
    \ the following code to it:\n\n```\n{* department.tpl *}\n{load_department assign=\"\
    department\"}\n<p class=\"title\">{$department->mNameLabel}</p>\n<br />\n<p class=\"\
    description\">{$department->mDescriptionLabel}</p>\n<br />\nPlace list of products\
    \ here\n```\n\nThe two variables, `$department->mNameLabel` and `$department->mDescriptionLabel`,\
    \ contain the name and description of the selected department and are populated\
    \ by the template plugin file, `function.load_department.php`.\n\n**4.** Let’s\
    \ now create the template plugin file for `department.tpl`. Create the `presentation/smarty_plugins/function.load_department.php`\
    \ file, and add the following code to it:\n\n```php\n<?php\n// Plugin functions\
    \ inside plugin files must be named: smarty_type_name\nfunction smarty_function_load_department($params,\
    \ $smarty)\n{\n  // Create Department object\n  $department = new Department();\n\
    \  $department->init();\n\n  // Assign template variable\n  $smarty->assign($params['assign'],\
    \ $department);\n}\n\n// Deals with retrieving department details\nclass Department\n\
    {\n  // Public variables for the smarty template\n  public $mDescriptionLabel;\n\
    \  public $mNameLabel;\n\n  // Private members\n  private $_mDepartmentId;\n \
    \ private $_mCategoryId;\n}\n```"
