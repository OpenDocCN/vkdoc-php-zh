  trans: "\n3.  页面主体中的表单需要能够上传文件，因此你需要在开头的`<form>`标签中添加`enctype`属性，如下所示：\n\n4.  如果尝试上传文件时发生错误（例如，文件太大或不是图像文件），插入操作将停止。修改现有的文本输入字段和文本区域，使用与第\
    \ 6 章相同的技术重新显示这些值。文本输入字段如下所示：\n\n    ```\n    \">\n    ```\n\n文本区域如下所示：\n\n```\n\
    确保开始和结束的 PHP 标签与 HTML 之间没有间隙。否则，你会在文本输入字段和文本区域内部添加不需要的空白。\n```\n\n5.  新的表单元素位于文本区域和提交按钮之间。首先，为分类添加多选的`<select>`列表代码。代码如下所示：\n\
    \n```\n分类：\n\nquery($getCats);\nwhile ($row = $categories->fetch_assoc()) {\n\
    ?>\n\" >\n\n```\n\n为了允许选择多个值，`multiple`属性已被添加到`<select>`标签中，并且`size`属性设置为`5`。这些值需要以数组形式提交，因此一对中括号已附加到`name`属性上。\n\
    \nSQL 查询`categories`表，`while`循环使用主键和分类名称填充`<option>`标签。`while`循环中的条件语句在`insert`操作失败时，会向`<option>`标签添加`selected`以重新显示已选中的值。\n\
    \n6.  保存`blog_insert_mysqli.php`并在浏览器中加载该页面。此时表单应如图 18-8 所示。\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig8_HTML.jpg](img/332054_4_En_18_Fig8_HTML.jpg)\n\
    \n图 18-8.\n\n多选`<select>`列表从`categories`表中拉取值\n\n7.  查看页面的源代码，以验证每个分类的主键已正确嵌入到每个`<option>`标签的`value`属性中。你可以将自己的代码与`ch18`文件夹中的`blog_insert_mysqli_02.php`进行比较。\n\
    \n8.  接下来，创建`<select>`下拉菜单以显示已注册到数据库中的图像。在步骤 5 中插入的代码之后立即添加此代码：\n\n```\n已上传的图像：\n\
    \n选择图像\nquery($getImages);\nwhile ($row = $images->fetch_assoc()) {\n?>\n\"\n\
    >\n\n```\n\n这将创建另一个`SELECT`查询，以获取存储在`images`表中的每个图像的主键和文件名。现在你应该非常熟悉这段代码，因此无需解释。\n\
    \n9.  用于标题的复选框、文件输入字段和文本输入字段位于上一步的代码和提交按钮之间。代码如下所示：\n\n```\n\n上传新图像\n\n选择图像：\n\
    \n标题：\n\n```\n\n包含复选框的段落已被赋予`allowUpload`的 ID，另外两个段落被分配了一个名为`optional`的类。`admin.css`中的样式规则将这些段落的`display`属性设置为`none`。\n\
    \n10. 保存`blog_insert_mysqli.php`并在浏览器中加载该页面。`images <select>`下拉菜单显示在`categories`列表下方，但你在步骤\
    \ 9 中插入的三个表单元素是隐藏的。如果浏览器中禁用了 JavaScript，将会显示此状态。用户将可以选择分类和现有图像，但不能上传新图像。\n\n如有必要，请对照`ch18`文件夹中的`blog_insert_mysqli_03.php`检查你的代码。\n\
    \n11. 将`toggle_fields.js`从`ch18`文件夹复制到`admin`文件夹。该文件包含以下 JavaScript：\n\n```\n\
    var cbox = document.getElementById('allowUpload');\ncbox.style.display = 'block';\n\
    var uploadImage = document.getElementById('upload_new');\nuploadImage.onclick\
    \ = function () {\nvar image_id = document.getElementById('image_id');\nvar image\
    \ = document.getElementById('image');\nvar caption = document.getElementById('caption');\n\
    var sel = uploadImage.checked;\nimage_id.disabled = sel;\nimage.parentNode.style.display\
    \ = sel ? 'block' : 'none';\ncaption.parentNode.style.display = sel ? 'block'\
    \ : 'none';\nimage.disabled = !sel;\ncaption.disabled = !sel;\n}\n```\n\n这使用了步骤\
    \ 8 中插入的元素的 ID 来控制它们的显示。如果启用了 JavaScript，页面加载时会自动显示复选框，但标题的文件输入字段和文本输入字段仍保持隐藏。如果复选框被选中，现有图像的下拉菜单将被禁用，并且隐藏的元素会显示出来。如果随后取消选中复选框，下拉菜单会重新启用，文件输入字段和标题字段将再次隐藏。\n\
    \n12. 使用`<script>`标签将`toggle_fields.js`链接到`blog_insert_mysqli.php`，放在结束的`</body>`标签之前，如下所示：\n\
    \n在页面底部添加 JavaScript 可以加快下载和显示速度。如果你将其添加到`<head>`中，`toggle_fields.js`中的代码将无法正常运行。\n\
    \n13. 保存`blog_insert_mysqli.php`并在浏览器中加载该页面。在支持 JavaScript 的浏览器中，复选框应显示在`<select>`下拉菜单和提交按钮之间。选中复选框可禁用下拉菜单并显示隐藏字段，如图\
    \ 18-9 所示。\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig9_HTML.jpg](img/332054_4_En_18_Fig9_HTML.jpg)\n\
    \n图 18-9.\n\n复选框控制文件和标题输入字段的显示\n\n14. 取消选中复选框。文件和标题输入字段被隐藏，下拉菜单重新启用。如有必要，你可以对照`ch18`文件夹中的`blog_insert_mysqli_04.php`和`toggle_fields.js`检查你的代码。\n\
    \n我使用 JavaScript 而不是 PHP 来控制文件和标题输入字段的显示，因为 PHP 是一种服务器端语言。在 PHP 引擎将输出发送到浏览器之后，除非你向\
    \ Web 服务器发送另一个请求，否则它将不再与页面进行交互。另一方面，JavaScript 在浏览器中运行，因此它能够在本地操作页面内容。JavaScript\
    \ 还可以与 PHP 结合使用，在后台向 Web 服务器发送请求，并使用结果刷新页面的一部分而无需重新加载页面——这种技术称为 Ajax，超出了本书的范围。\n\
    更新后的插入表单现在包含了分类和图像的输入字段，但处理脚本仍然只处理标题的文本输入字段和博客条目的文本区域。\n\n## PHP 解决方案 18-4：将数据插入多个表\n\
    \n此 PHP 解决方案改编了`blog_insert_mysqli.php`中的现有脚本，以按需上传新图像，然后按照图 18-6 中概述的决策链将数据插入`images`、`blog`和`article2cat`表。它假设你已经设置了`article2cat`交叉引用表，并完成了\
    \ PHP 解决方案 18-2 和 18-3。\n不要试图匆忙完成本节。代码相当长，但它整合了许多你之前学过的技术。\n\n> **注意**\n> 如果你使用的是\
    \ PDO，此 PHP 解决方案之后会有一个单独的部分描述代码中的主要差异。\n"
- fmt: "1.  你在 PHP Solution 18-2 中更新的 `Upload` 类使用了一个命名空间，因此你需要在脚本的顶层导入它。在 `blog_insert_mysqli.php`\
    \ 顶部 PHP 开始标签之后立即添加此行：\n\n```\nuse PhpSolutions\\File\\Upload;\n```\n\n2.  在预处理器语句初始化之后，立即插入以下条件语句来处理已上传或选择的图像。\n\
    \n```\n// initialize prepared statement\n$stmt = $conn->stmt_init();\n// if a\
    \ file has been uploaded, process it\nif(isset($_POST['upload_new']) && $_FILES['image']['error']\
    \ == 0) {\n    $imageOK = false;\n    require_once '../PhpSolutions/File/Upload.php';\n\
    \    $loader = new Upload('../images/');\n    $loader->upload('image');\n    $names\
    \ = $loader->getFilenames();\n    // $names will be an empty array if the upload\
    \ failed\n    if ($names) {\n        $sql = 'INSERT INTO images (filename, caption)\
    \ VALUES (?, ?)';\n        if ($stmt->prepare($sql)) {\n            $stmt->bind_param('ss',\
    \ $names[0], $_POST['caption']);\n            $stmt->execute();\n            $imageOK\
    \ = $stmt->affected_rows;\n        }\n    }\n    // get the image's primary key\
    \ or find out what went wrong\n    if ($imageOK) {\n        $image_id = $stmt->insert_id;\n\
    \    } else {\n        $imageError = implode(' ', $loader->getMessages());\n \
    \   }\n} elseif (!empty($_POST['image_id'])) {\n    // get the primary key of\
    \ a previously uploaded image\n    $image_id = $_POST['image_id'];\n}\n// create\
    \ SQL\n$sql = 'INSERT INTO blog (title, article) VALUES(?, ?)';\n```\n\n这首先检查\
    \ `$_POST['upload_new']` 是否已设置。如第 6 章所述，复选框只有在被选中时才会包含在 `$_POST` 数组中。因此，如果复选框未被选中，条件失败，转而测试底部的\
    \ `elseif` 子句。`elseif` 子句检查 `$_POST['image_id']` 是否存在。如果存在且不为空，则表示已从下拉菜单中选择了一个现有图像，该值存储在\
    \ `$image_id` 中。\n\n如果两个测试都失败，则表示既未上传也未从下拉菜单中选择图像。脚本稍后会在准备 `blog` 表的 `INSERT`\
    \ 查询时考虑到这一点，允许你在没有图像的情况下创建博客条目。\n\n但是，如果 `$_POST['upload_new']` 存在，则表示复选框已被选中，并且可能已上传图像。为了确保这一点，条件语句还会检查\
    \ `$_FILES['image']['error']` 的值。如第 9 章所学，错误代码 `0` 表示上传成功。任何其他错误代码意味着上传失败或未选择文件。\n\
    \n假设文件已成功从表单上传，条件语句会包含 `Upload` 类定义并创建一个名为 `$loader` 的对象，将目标文件夹设置为 `images`。然后调用\
    \ `upload()` 方法，将文件输入字段的名称传递给它，以处理文件并将其存储在 `images` 文件夹中。为避免使代码复杂化，这里使用了默认的最大文件大小和\
    \ MIME 类型。\n\n你在 PHP Solution 18-2 中对 `Upload` 类所做的更改仅在文件成功移动到目标文件夹时，将上传文件的名称添加到\
    \ `$filenames` 属性中。`getFilenames()` 方法检索 `$filenames` 属性的内容，并将结果赋值给 `$names`。\n\
    \n如果文件成功移动，其文件名会作为 `$names` 数组的第一个元素被存储。因此，如果 `$names` 包含一个值，你可以安全地继续执行 `INSERT`\
    \ 查询，该查询将 `$names[0]` 和 `$_POST['caption']` 的值作为字符串绑定到预处理语句。\n\n语句执行后，`affected_rows`\
    \ 属性会重置 `$imageOK` 的值。如果 `INSERT` 查询成功，`$imageOK` 为 `1`，这被视为 `true`。\n\n如果图像详情已插入到\
    \ `images` 表中，预处理语句的 `insert_id` 属性会检索新记录的主键并将其存储在 `$image_id` 中。必须在运行任何其他 SQL\
    \ 查询之前访问 `insert_id` 属性，因为它包含最近一次查询的主键。\n\n但是，如果 `$imageOK` 仍为 `false`，则 `else`\
    \ 块会调用上传对象的 `getMessages()` 方法，并将结果赋值给 `$imageError`。`getMessages()` 方法返回一个数组，因此使用\
    \ `implode()` 函数将数组元素连接成一个字符串。失败最可能的原因是文件过大或 MIME 类型错误。\n\n3.  只要图像上传没有失败，过程的下一步就是将博客条目插入到\
    \ `blog` 表中。`INSERT` 查询的形式取决于博客条目是否与图像关联。如果有关联，`$image_id` 存在并需要作为外键插入到 `blog`\
    \ 表中。否则，可以使用原始查询。\n\n像这样修改原始查询：\n\n```\n// insert blog details only if there hasn't\
    \ been an image upload error\nif (!isset($imageError)) {\n    // if $image_id\
    \ has been set, insert it as a foreign key\n    if (isset($image_id)) {\n    \
    \    $sql = 'INSERT INTO blog (image_id, title, article) VALUES(?, ?, ?)';\n \
    \       if ($stmt->prepare($sql)) {\n            $stmt->bind_param('iss', $image_id,\
    \ $_POST['title'], $_POST['article']);\n            $stmt->execute();\n      \
    \  }\n    } else {\n        // create SQL\n        $sql = 'INSERT INTO blog (title,\
    \ article)\n        VALUES(?, ?)';\n        if ($stmt->prepare($sql)) {\n    \
    \        // bind parameters and execute statement\n            $stmt->bind_param('ss',\
    \ $_POST['title'], $_POST['article']);\n            $stmt->execute();\n      \
    \  }\n    }\n    if ($stmt->affected_rows > 0) {\n        $OK = true;\n    }\n\
    }\n```\n\n整个代码段被包裹在一个条件语句中，该语句检查 `$imageError` 是否存在。如果存在，则无需插入新博客条目，因此整个代码块被忽略。\n\
    \n但是，如果 `$imageError` 不存在，嵌套的条件语句会根据 `$image_id` 是否存在来准备不同的 `INSERT` 查询，然后执行已准备好的那个。\n\
    \n检查 `affected_rows` 属性的条件语句被移出了 `else` 块，以便它适用于任一 `INSERT` 查询。\n\n4.  过程的下一步是将值插入到\
    \ `article2cat` 交叉引用表中。代码紧跟在上一节的代码之后，如下所示：\n\n```\n// if the blog entry was inserted\
    \ successfully, check for categories\nif ($OK && isset($_POST['category'])) {\n\
    \    // get the article's primary key\n    $article_id = $stmt->insert_id;\n \
    \   foreach ($_POST['category'] as $cat_id) {\n        if (is_numeric($cat_id))\
    \ {\n            $values[] = \"($article_id, \" . (int) $cat_id . ')';\n     \
    \   }\n    }\n    if ($values) {\n        $sql = 'INSERT INTO article2cat (article_id,\
    \ cat_id)\n        VALUES ' . implode(',', $values);\n        // execute the query\
    \ and get error message if it fails\n        if (!$conn->query($sql)) {\n    \
    \        $catError = $conn->error;\n        }\n    }\n}\n```"
  raw: "1.  The `Upload`\n    class that you updated in PHP Solution 18-2 uses a namespace,\
    \ so you\n    need to import it at the top level of the script. Add this line\n\
    \    immediately after the opening PHP tag at the top of `blog_insert_mysqli.php`:\n\
    \n```\n    use PhpSolutions\\File\\Upload;\n    ```\n\n2.  Immediately after the\
    \ prepared statement has been initialized, insert\n    the following conditional\
    \ statement to process the image if one has been\n    uploaded or selected.\n\n\
    ```\n    // initialize prepared statement\n    $stmt = $conn->stmt_init();\n \
    \   // if a file has been uploaded, process it\n    if(isset($_POST['upload_new'])\
    \ && $_FILES['image']['error'] == 0) {\n    $imageOK = false;\n    require_once\
    \ '../PhpSolutions/File/Upload.php';\n    $loader = new Upload('../images/');\n\
    \    $loader->upload('image');\n    $names = $loader->getFilenames();\n    //\
    \ $names will be an empty array if the upload failed\n    if ($names) {\n    $sql\
    \ = 'INSERT INTO images (filename, caption) VALUES (?, ?)';\n    if ($stmt->prepare($sql))\
    \ {\n    $stmt->bind_param('ss', $names[0], $_POST['caption']);\n    $stmt->execute();\n\
    \    $imageOK = $stmt->affected_rows;\n    }\n    }\n    // get the image's primary\
    \ key or find out what went wrong\n    if ($imageOK) {\n    $image_id = $stmt->insert_id;\n\
    \    } else {\n    $imageError = implode(' ', $loader->getMessages());\n    }\n\
    \    } elseif (!empty($_POST['image_id'])) {\n    // get the primary key of a\
    \ previously uploaded image\n    $image_id = $_POST['image_id'];\n    }\n    //\
    \ create SQL\n    $sql = 'INSERT INTO blog (title, article) VALUES(?, ?)';\n \
    \   ```\n\nThis begins by checking if `$_POST['upload_new']`\n    has been set.\
    \ As explained in Chapter [6](#332054_4_En_6_Chapter.xhtml), a check box is included\
    \ in the\n    `$_POST` array\n     only if it has\n    been selected. So, if the\
    \ check box hasn’t been selected, the condition\n    fails, and the `elseif` clause\
    \ at the\n    bottom is tested instead. The `elseif` clause checks\n    for the\
    \ existence of `$_POST['image_id']`.\n    If it exists and is not empty, it means\
    \ that an existing image has been\n    selected from the drop-down menu, and the\
    \ value is stored in `$image_id`.\n\nIf both tests fail, an image has neither\
    \ been uploaded nor selected\n    from the drop-down menu. The script later takes\
    \ this into account when\n    preparing the `INSERT` query for the\n    `blog`\
    \ table,\n    allowing you to create a blog entry without an image.\n\nHowever,\
    \ if `$_POST['upload_new']`\n    exists, the check box has been selected, and\
    \ an image has probably been\n    uploaded. To make sure, the conditional statement\
    \ also checks the value\n    of `$_FILES['image']['error']`.\n    As you learned\
    \ in Chapter [9](#332054_4_En_9_Chapter.xhtml), the error code `0`  indicates\
    \ a successful\n    upload. Any other error code means the upload failed or that\
    \ no file was\n    selected.\n\nAssuming a file has been successfully uploaded\
    \ from the form, the\n    conditional statement includes the `Upload` class\n\
    \    definition and creates an object called `$loader`, setting the\n    destination\
    \ folder to `images`.  It then calls the\n    `upload()`\n    method, passing\
    \ it the name of the file input field, to process the file\n    and store it in\
    \ the `images` folder. To\n    avoid complicating the code, I’m using the default\
    \ maximum size and MIME\n    types.\n\nThe changes you made to the `Upload` class\
    \ in PHP\n    Solution 18-2 add the name of an uploaded file to the `$filenames`\
    \ property\n    only if the file was moved successfully to the destination folder.\
    \ The\n    `getFilenames()`\n    method  retrieves\n    the contents of the `$filenames`\
    \ property\n    and assigns the result to `$names`.\n\nIf the file was moved successfully,\
    \ its filename is stored as the\n    first element of the `$names` array. So if\n\
    \    `$names` contains\n    a value, you can safely proceed with the `INSERT`\
    \ query, which\n    binds the values of `$names[0]` and `$_POST['caption']` as\n\
    \    strings to the prepared statement.\n\nAfter the statement has been executed,\
    \ the `affected_rows`\n    property resets the value of `$imageOK`. If the\n \
    \   `INSERT` query\n    succeeded, `$imageOK` is `1`, which is treated\n    as\
    \ `true`.\n\nIf the image details were inserted in the `images` table, the\n \
    \   prepared statement’s `insert_id` property\n    retrieves the primary key of\
    \ the new record and stores it in `$image_id`. The `insert_id` property\n    must\
    \ be accessed before running any other SQL queries because it\n    contains the\
    \ primary key of the most recent query.\n\nHowever, if `$imageOK` is still\n \
    \   false, the `else`\n    block calls the upload object’s `getMessages()` method\n\
    \     and assigns the\n    result to `$imageError`. The\n    `getMessages()`\n\
    \    method returns an array, so the `implode()`\n    function  is used\n    to\
    \ join the array elements as a single string. The most likely cause of\n    failure\
    \ is a file that’s too big or that’s of the wrong MIME type.\n\n3.  As long as\
    \ the image upload didn’t fail, the next stage in the\n    process is to insert\
    \ the blog entry into the `blog` table. The form\n    of the `INSERT`\n    query\
    \ depends on whether an image is associated with the blog entry. If\n    it is,\
    \ `$image_id` exists and\n    needs to be inserted in the `blog` table as a\n\
    \    foreign key. Otherwise, the original query can be used.\n\nAmend the original\
    \ query like this:\n\n```\n    // insert blog details only if there hasn't been\
    \ an image upload error\n    if (!isset($imageError)) {\n    // if $image_id has\
    \ been set, insert it as a foreign key\n    if (isset($image_id)) {\n    $sql\
    \ = 'INSERT INTO blog (image_id, title, article) VALUES(?, ?, ?)';\n    if ($stmt->prepare($sql))\
    \ {\n    $stmt->bind_param('iss', $image_id, $_POST['title'], $_POST['article']);\n\
    \    $stmt->execute();\n    }\n    } else {\n    // create SQL\n    $sql = 'INSERT\
    \ INTO blog (title, article)\n    VALUES(?, ?)';\n    if ($stmt->prepare($sql))\
    \ {\n    // bind parameters and execute statement\n    $stmt->bind_param('ss',\
    \ $_POST['title'], $_POST['article']);\n    $stmt->execute();\n    }\n    }\n\
    \    if ($stmt->affected_rows > 0) {\n    $OK = true;\n    }\n    }\n    ```\n\
    \nThis whole section of code is wrapped in a conditional statement that\n    checks\
    \ whether `$imageError` exists.\n    If it does, there’s no point in inserting\
    \ the new blog entry, so the\n    entire code block is ignored.\n\nHowever, if\
    \ `$imageError` doesn’t\n    exist, the nested conditional statement prepares\
    \ different `INSERT` queries\n    depending on whether `$image_id` exists and\n\
    \    then executes whichever one has been prepared.\n\nThe conditional statement\
    \ that checks the `affected_rows`\n    property is moved out of the `else` block\
    \ so that it\n    applies to either `INSERT` query .\n\n4.  The next stage of\
    \ the process inserts values into the `article2cat`\n    cross-reference table.\
    \ The code follows immediately after the code in\n    the previous step and looks\
    \ like the following:\n\n```\n    // if the blog entry was inserted successfully,\
    \ check for categories\n    if ($OK && isset($_POST['category'])) {\n    // get\
    \ the article's primary key\n    $article_id = $stmt->insert_id;\n    foreach\
    \ ($_POST['category'] as $cat_id) {\n    if (is_numeric($cat_id)) {\n    $values[]\
    \ = \"($article_id, \" . (int) $cat_id . ')';\n    }\n    }\n    if ($values)\
    \ {\n    $sql = 'INSERT INTO article2cat (article_id, cat_id)\n    VALUES ' .\
    \ implode(',', $values);\n    // execute the query and get error message if it\
    \ fails\n    if (!$conn->query($sql)) {\n    $catError = $conn->error;\n    }\n\
    \    }\n    }\n    ```"
  trans: "\n1.  你在 PHP Solution 18-2 中更新的 `Upload` 类使用了一个命名空间，因此你需要在脚本的顶层导入它。在 `blog_insert_mysqli.php`\
    \ 顶部 PHP 开始标签之后立即添加此行：\n\n```\nuse PhpSolutions\\File\\Upload;\n```\n\n2.  在预处理器语句初始化之后，立即插入以下条件语句来处理已上传或选择的图像。\n\
    \n```\n// 初始化预处理语句\n$stmt = $conn->stmt_init();\n// 如果已上传文件，则处理它\nif(isset($_POST['upload_new'])\
    \ && $_FILES['image']['error'] == 0) {\n    $imageOK = false;\n    require_once\
    \ '../PhpSolutions/File/Upload.php';\n    $loader = new Upload('../images/');\n\
    \    $loader->upload('image');\n    $names = $loader->getFilenames();\n    //\
    \ 如果上传失败，$names 将是一个空数组\n    if ($names) {\n        $sql = 'INSERT INTO images\
    \ (filename, caption) VALUES (?, ?)';\n        if ($stmt->prepare($sql)) {\n \
    \           $stmt->bind_param('ss', $names[0], $_POST['caption']);\n         \
    \   $stmt->execute();\n            $imageOK = $stmt->affected_rows;\n        }\n\
    \    }\n    // 获取图像的主键或查明问题所在\n    if ($imageOK) {\n        $image_id = $stmt->insert_id;\n\
    \    } else {\n        $imageError = implode(' ', $loader->getMessages());\n \
    \   }\n} elseif (!empty($_POST['image_id'])) {\n    // 获取之前上传的图像的主键\n    $image_id\
    \ = $_POST['image_id'];\n}\n// 创建 SQL\n$sql = 'INSERT INTO blog (title, article)\
    \ VALUES(?, ?)';\n```\n\n这首先检查 `$_POST['upload_new']` 是否已设置。如第 6 章所述，复选框只有在被选中时才会包含在\
    \ `$_POST` 数组中。因此，如果复选框未被选中，条件失败，转而测试底部的 `elseif` 子句。`elseif` 子句检查 `$_POST['image_id']`\
    \ 是否存在。如果存在且不为空，则表示已从下拉菜单中选择了一个现有图像，该值存储在 `$image_id` 中。\n\n如果两个测试都失败，则表示既未上传也未从下拉菜单中选择图像。脚本稍后会在准备\
    \ `blog` 表的 `INSERT` 查询时考虑到这一点，允许你在没有图像的情况下创建博客条目。\n\n但是，如果 `$_POST['upload_new']`\
    \ 存在，则表示复选框已被选中，并且可能已上传图像。为了确保这一点，条件语句还会检查 `$_FILES['image']['error']` 的值。如第 9\
    \ 章所学，错误代码 `0` 表示上传成功。任何其他错误代码意味着上传失败或未选择文件。\n\n假设文件已成功从表单上传，条件语句会包含 `Upload`\
    \ 类定义并创建一个名为 `$loader` 的对象，将目标文件夹设置为 `images`。然后调用 `upload()` 方法，将文件输入字段的名称传递给它，以处理文件并将其存储在\
    \ `images` 文件夹中。为避免使代码复杂化，这里使用了默认的最大文件大小和 MIME 类型。\n\n你在 PHP Solution 18-2 中对\
    \ `Upload` 类所做的更改仅在文件成功移动到目标文件夹时，将上传文件的名称添加到 `$filenames` 属性中。`getFilenames()`\
    \ 方法检索 `$filenames` 属性的内容，并将结果赋值给 `$names`。\n\n如果文件成功移动，其文件名会作为 `$names` 数组的第一个元素被存储。因此，如果\
    \ `$names` 包含一个值，你可以安全地继续执行 `INSERT` 查询，该查询将 `$names[0]` 和 `$_POST['caption']`\
    \ 的值作为字符串绑定到预处理语句。\n\n语句执行后，`affected_rows` 属性会重置 `$imageOK` 的值。如果 `INSERT` 查询成功，`$imageOK`\
    \ 为 `1`，这被视为 `true`。\n\n如果图像详情已插入到 `images` 表中，预处理语句的 `insert_id` 属性会检索新记录的主键并将其存储在\
    \ `$image_id` 中。必须在运行任何其他 SQL 查询之前访问 `insert_id` 属性，因为它包含最近一次查询的主键。\n\n但是，如果 `$imageOK`\
    \ 仍为 `false`，则 `else` 块会调用上传对象的 `getMessages()` 方法，并将结果赋值给 `$imageError`。`getMessages()`\
    \ 方法返回一个数组，因此使用 `implode()` 函数将数组元素连接成一个字符串。失败最可能的原因是文件过大或 MIME 类型错误。\n\n3.  只要图像上传没有失败，过程的下一步就是将博客条目插入到\
    \ `blog` 表中。`INSERT` 查询的形式取决于博客条目是否与图像关联。如果有关联，`$image_id` 存在并需要作为外键插入到 `blog`\
    \ 表中。否则，可以使用原始查询。\n\n像这样修改原始查询：\n\n```\n// 仅当没有图像上传错误时才插入博客详情\nif (!isset($imageError))\
    \ {\n    // 如果设定了 $image_id，则将其作为外键插入\n    if (isset($image_id)) {\n        $sql\
    \ = 'INSERT INTO blog (image_id, title, article) VALUES(?, ?, ?)';\n        if\
    \ ($stmt->prepare($sql)) {\n            $stmt->bind_param('iss', $image_id, $_POST['title'],\
    \ $_POST['article']);\n            $stmt->execute();\n        }\n    } else {\n\
    \        // 创建 SQL\n        $sql = 'INSERT INTO blog (title, article)\n      \
    \  VALUES(?, ?)';\n        if ($stmt->prepare($sql)) {\n            // 绑定参数并执行语句\n\
    \            $stmt->bind_param('ss', $_POST['title'], $_POST['article']);\n  \
    \          $stmt->execute();\n        }\n    }\n    if ($stmt->affected_rows >\
    \ 0) {\n        $OK = true;\n    }\n}\n```\n\n整个代码段被包裹在一个条件语句中，该语句检查 `$imageError`\
    \ 是否存在。如果存在，则无需插入新博客条目，因此整个代码块被忽略。\n\n但是，如果 `$imageError` 不存在，嵌套的条件语句会根据 `$image_id`\
    \ 是否存在来准备不同的 `INSERT` 查询，然后执行已准备好的那个。\n\n检查 `affected_rows` 属性的条件语句被移出了 `else`\
    \ 块，以便它适用于任一 `INSERT` 查询。\n\n4.  过程的下一步是将值插入到 `article2cat` 交叉引用表中。代码紧跟在上一节的代码之后，如下所示：\n\
    \n```\n// 如果博客条目插入成功，检查分类\nif ($OK && isset($_POST['category'])) {\n    // 获取文章的主键\n\
    \    $article_id = $stmt->insert_id;\n    foreach ($_POST['category'] as $cat_id)\
    \ {\n        if (is_numeric($cat_id)) {\n            $values[] = \"($article_id,\
    \ \" . (int) $cat_id . ')';\n        }\n    }\n    if ($values) {\n        $sql\
    \ = 'INSERT INTO article2cat (article_id, cat_id)\n        VALUES ' . implode(',',\
    \ $values);\n        // 执行查询，如果失败则获取错误信息\n        if (!$conn->query($sql)) {\n\
    \            $catError = $conn->error;\n        }\n    }\n}\n```\n"
- fmt: '`$OK`的值由插入数据到`blog`表的查询的`affected_rows`属性决定，且仅当选中任意分类时，多选的`<select>`列表才会被包含在`$_POST`数组中。因此，仅当数据成功插入`blog`表，且表单中至少选中了一个分类时，此代码块才会执行。它首先从预处理语句对象的`insert_id`属性获取插入操作的主键，并将其赋值给`$article_id`。


    表单将分类值作为数组提交。`foreach`循环检查`$_POST[''category'']`中的每个值。如果该值是数值，则执行以下行：


    ```

    $values[] = "($article_id, " . (int) $cat_id . '')'';

    ```


    这会创建一个由两个主键`$article_id`和`$cat_id`组成的字符串，它们用逗号分隔并包裹在一对圆括号中。`(int)`强制转换运算符确保`$cat_id`是一个整数。结果被赋值给一个名为`$values`的数组。例如，如果`$article_id`是`10`且`$cat_id`是`4`，则赋值给数组的结果字符串为`(10,
    4)`。


    如果`$values`包含任何元素，则`implode()`会将其转换为逗号分隔的字符串，并追加到SQL查询中。例如，如果选中了分类`2`、`4`和`5`，生成的查询如下所示：


    ```

    INSERT INTO article2cat (article_id, cat_id)

    VALUES (10, 2),(10, 4),(10, 5)

    ```


    正如第[15](#332054_4_En_15_Chapter.xhtml)章“回顾四个基本SQL命令”中所述，这是如何使用单个`INSERT`查询插入多行的方法。


    由于`$article_id`来自可靠来源，并且`$cat_id`的数据类型已检查过，因此直接将这些变量用于SQL查询是安全的，无需使用预处理语句。查询通过`query()`方法执行。如果失败，连接对象的`error`属性将存储在`$catError`中。


    5.  最后的代码段处理成功时的重定向和错误消息。修改后的代码如下所示：


    ```

    // redirect if successful or display error

    if ($OK && !isset($imageError) && !isset($catError)) {

    header(''Location: http://localhost/phpsols-4e/admin/blog_list_mysqli.php'');

    exit;

    } else {

    $error = $stmt->error;

    if (isset($imageError)) {

    $error .= '' '' . $imageError;

    }

    if (isset($catError)) {

    $error .= '' '' . $catError;

    }

    }

    ```


    控制重定向的条件现在确保`$imageError`和`$catError`不存在。如果任一存在，其值会被追加到原始的`$error`中，`$error`包含了来自预处理语句对象的任何错误消息。


    6.  保存`blog_insert_mysqli.php`并在浏览器中测试。尝试上传一张过大的图片或一个MIME类型错误的文件。表单应重新显示，并附有错误消息，且博客详情得以保留。同时尝试插入带或不带图片和/或分类的博客条目。你现在拥有一个通用的插入表单。


    如果你没有合适的图片供上传，请使用`phpsols images`文件夹中的图片。`Upload`类会重命名它们以避免覆盖现有文件。


    你可以对照`ch18`文件夹中的`blog_insert_mysqli_05.php`检查你的代码。


    ## PDO版本的主要差异


    最终的PDO版本可以在`ch18`文件夹中的`blog_insert_pdo_05.php`找到。它遵循与MySQLi版本相同的基本结构和逻辑，但在将值插入数据库的方式上存在一些重要差异。


    步骤2中的代码紧跟MySQLi版本，但使用了命名占位符代替匿名占位符。为了获取受影响的行数，PDO在语句对象上使用`rowCount()`方法。最近一次插入操作的主键通过在连接对象上调用`lastInsertId()`方法获得。与MySQLi的`insert_id`属性类似，你需要在`INSERT`查询执行后立即访问它。


    最大的变化在于步骤3中向`blog`表插入详情信息的代码。由于PDO可以使用`bindValue()`将`null`值插入列，因此只需要一个预处理语句。步骤3的PDO代码如下所示：


    ```

    // insert blog details only if there hasn''t been an image upload error

    if (!isset($imageError)) {

    // create SQL

    $sql = ''INSERT INTO blog (image_id, title, article)

    VALUES(:image_id, :title, :article)'';

    // prepare the statement

    $stmt = $conn->prepare($sql);

    // bind the parameters

    // if $image_id exists, use it

    if (isset($image_id)) {

    $stmt->bindParam('':image_id'', $image_id, PDO::PARAM_INT);

    } else {

    // set image_id to NULL

    $stmt->bindValue('':image_id'', NULL, PDO::PARAM_NULL);

    }

    $stmt->bindParam('':title'', $_POST[''title''], PDO::PARAM_STR);

    $stmt->bindParam('':article'', $_POST[''article''], PDO::PARAM_STR);

    // execute and get number of affected rows

    $stmt->execute();

    $OK = $stmt->rowCount();

    }

    ```


    如果已上传图片，以粗体高亮的条件语句会将`$image_id`的值绑定到命名的`:image_id`占位符。但如果没有上传图片，`bindValue()`会将该值设置为`NULL`。


    在步骤4中，PDO版本使用`exec()`代替`query()`来将值插入`article2cat`表。`exec()`方法执行一个SQL查询并返回受影响的行数，因此当不需要使用预处理语句时，它应与`INSERT`、`UPDATE`和`DELETE`查询一起使用。


    另一个重要的区别在于构建错误消息的代码（如果出现问题）。由于在PDO中，创建和准备语句是一个步骤，因此如果出现问题，语句对象可能不存在。所以，在尝试调用`errorInfo()`方法之前，你需要检查其是否存在。如果没有语句，代码会从数据库连接对象获取错误消息。同时需要将`$error`初始化为空字符串，以便连接各种消息，如下所示：


    ```

    // redirect if successful or display error

    if ($OK && !isset($imageError) && !isset($catError)) {

    header(''Location: http://localhost/phpsols-4e/admin/blog_list_pdo.php'');

    exit;

    } else {

    $error = ";

    if (isset($stmt)) {

    $error .= $stmt->errorInfo()[2];

    } else {

    $error .= $conn->errorInfo()[2];

    }

    if (isset($imageError)) {

    $error .= '' '' . $imageError;

    }

    if (isset($catError)) {

    $error .= '' '' . $catError;

    }

    }

    ```


    ## 在多表中更新和删除记录


    `categories`和`article2cat`表的添加意味着上一章PHP解决方案17-2和17-3中对`blog_update_mysqli.php`和`blog_update_pdo.php`所做的修改不再完全覆盖`phpsols`数据库中的外键关系。除了修改更新表单外，你还需要创建脚本来删除记录，而不破坏数据库的参照完整性。'
  raw: "The value of `$OK` is determined by\n    the `affected_rows`\n    property\
    \ from the query that inserted the data in the `blog` table, and the\n    multiple-choice\
    \ `<select>` list\n    is included in the `$_POST` array only if\n    any categories\
    \ are selected. So, this code block is run only if the data\n    was successfully\
    \ inserted in the `blog` table and at\n    least one category was selected in\
    \ the form. It begins by obtaining the\n    primary key of the insert operation\
    \ from the prepared statement’s `insert_id` property\n    and assigning it to\
    \ `$article_id`.\n\nThe form submits the category values as an array. The `foreach`\
    \ loop checks\n    each value in `$_POST['category']`.\n    If the value is numeric,\
    \ the following line is executed:\n\n```\n    $values[] = \"($article_id, \" .\
    \ (int) $cat_id . ')';\n    ```\n\nThis creates a string with the two primary\
    \ keys, `$article_id` and `$cat_id`, separated by\n    a comma and wrapped in\
    \ a pair of parentheses. The `(int)` casting operator makes\n    sure that `$cat_id`\
    \ is an\n    integer. The result is assigned to an array called `$values`. For\
    \ example,\n    if `$article_id`\n    is `10` and `$cat_id` is `4`, the resulting\n\
    \    string assigned to the array is `(10, 4)`.\n\nIf `$values`\n    contains\
    \ any elements, `implode()` converts it\n    to a comma-separated string and appends\
    \ it to the SQL query. For\n    example, if categories `2`, `4`, and `5` are selected,\
    \ the\n    resulting query looks like this:\n\n```\n    INSERT INTO article2cat\
    \ (article_id, cat_id)\n    VALUES (10, 2),(10, 4),(10, 5)\n    ```\n\nAs explained\
    \ in “Reviewing the Four Essential SQL Commands” in\n    Chapter [15](#332054_4_En_15_Chapter.xhtml),\
    \ this is how you insert multiple\n    rows with a single `INSERT` query.\n\n\
    Because `$article_id` comes\n    from a reliable source and the data type of `$cat_id`\
    \ has been\n    checked, it’s safe to use these variables directly in an SQL query\n\
    \    without using a prepared statement. The query is executed with the `query()`\
    \ method . If it fails, the\n    connection object’s error property is stored\
    \ in  `$catError`\n    .\n\n5.  The final section of code handles the redirect\
    \ on success and error\n    messages. The amended code looks like this:\n\n```\n\
    \    // redirect if successful or display error\n    if ($OK && !isset($imageError)\
    \ && !isset($catError)) {\n    header('Location: http://localhost/phpsols-4e/admin/blog_list_mysqli.php');\n\
    \    exit;\n    } else {\n    $error = $stmt->error;\n    if (isset($imageError))\
    \ {\n    $error .= ' ' . $imageError;\n    }\n    if (isset($catError)) {\n  \
    \  $error .= ' ' . $catError;\n    }\n    }\n    ```\n\nThe condition controlling\
    \ the redirect now ensures that `$imageError` and `$catError` don’t\n    exist.\
    \ If either does, the value is concatenated to the original `$error`, which\n\
    \    contains any error message from the prepared statement object.\n\n6.  Save\
    \ `blog_insert_mysqli.php`\n    and test it in a browser. Try uploading an image\
    \ that’s too big or a\n    file of the wrong MIME type. The form should be redisplayed\
    \ with an\n    error message and the blog details preserved. Also try inserting\
    \ blog\n    entries both with and without images and/or categories. You now have\
    \ a\n    versatile insert form.\n\nIf you don’t have suitable images to upload,\
    \ use the images in the\n    `phpsols images`\n    folder. The `Upload` class\
    \ renames\n    them to avoid overwriting the existing files.\n\nYou can check\
    \ your code against `blog_insert_mysqli_05.php`\n    in the `ch18`\n    folder.\n\
    \nMain differences in the PDO version\nThe final PDO\nversion can be found in\
    \ `blog_insert_pdo_05.php`\nin the `ch18`\nfolder. It follows the same basic structure\
    \ and logic as the MySQLi\nversion, but has some important differences in the\
    \ way values are\ninserted in the database.\nThe code in step 2 follows the MySQLi\
    \ version closely but uses named\nplaceholders instead of anonymous ones. To get\
    \ the number of affected\nrows, PDO uses the `rowCount()`\nmethod  on the\nstatement\
    \ object. The primary key of the most recent insert operation is\nobtained using\
    \ the `lastInsertId()`\nmethod  on the\nconnection object. Like the MySQLi `insert_id`\
    \ property,\nyou need to access it immediately after the `INSERT` query has been\n\
    executed.\n\nThe biggest changes are in the code in step 3 that inserts the details\n\
    into the blog table. Because PDO can insert a `null` value into a\ncolumn using\
    \ `bindValue()`, only one\nprepared statement is needed. The PDO code for step\
    \ 3 looks like this:\n\n```\n// insert blog details only if there hasn't been\
    \ an image upload error\nif (!isset($imageError)) {\n// create SQL\n$sql = 'INSERT\
    \ INTO blog (image_id, title, article)\nVALUES(:image_id, :title, :article)';\n\
    // prepare the statement\n$stmt = $conn->prepare($sql);\n// bind the parameters\n\
    // if $image_id exists, use it\nif (isset($image_id)) {\n$stmt->bindParam(':image_id',\
    \ $image_id, PDO::PARAM_INT);\n} else {\n// set image_id to NULL\n$stmt->bindValue(':image_id',\
    \ NULL, PDO::PARAM_NULL);\n}\n$stmt->bindParam(':title', $_POST['title'], PDO::PARAM_STR);\n\
    $stmt->bindParam(':article', $_POST['article'], PDO::PARAM_STR);\n// execute and\
    \ get number of affected rows\n$stmt->execute();\n$OK = $stmt->rowCount();\n}\n\
    ```\n\nIf an image has been uploaded, the conditional statement highlighted\n\
    in bold binds the value of `$image_id` to the\nnamed `:image_id`\nplaceholder.\
    \ But if no image has been uploaded, `bindValue()` sets the\nvalue to `NULL`.\n\
    In step 4, the PDO version uses `exec()` instead of\n`query()` to\ninsert the\
    \ values into the `article2cat` table.\nThe `exec()`\nmethod  executes\nan SQL\
    \ query and returns the number of rows affected, so it should be\nused with `INSERT`,\
    \ `UPDATE`, and `DELETE` queries when a\nprepared statement is not required.\n\
    \nThe other important difference is in the code that builds the error\nmessage\
    \ if there’s a problem. Because creating and preparing a statement\nis a one-step\
    \ process in PDO, the statement object might not exist if a\nproblem arises. So,\
    \ you need to check for its existence before trying to\ncall the `errorInfo()`\n\
    method . If\nthere’s no statement, the code gets the error message from the database\n\
    connection object. It’s also necessary to initialize `$error` as an empty\nstring\
    \ to concatenate the various messages to it, like this:\n\n```\n// redirect if\
    \ successful or display error\nif ($OK && !isset($imageError) && !isset($catError))\
    \ {\nheader('Location: http://localhost/phpsols-4e/admin/blog_list_pdo.php');\n\
    exit;\n} else {\n$error = \";\nif (isset($stmt)) {\n$error .= $stmt->errorInfo()[2];\n\
    } else {\n$error .= $conn->errorInfo()[2];\n}\nif (isset($imageError)) {\n$error\
    \ .= ' ' . $imageError;\n}\nif (isset($catError)) {\n$error .= ' ' . $catError;\n\
    }\n}\n```\n\nUpdating and Deleting Records in Multiple\nTables\nThe addition of\
    \ the `categories` and `article2cat` tables\nmeans that the changes to `blog_update_mysqli.php`\n\
    and `blog_update_pdo.php`\nin PHP Solutions 17-2 and 17-3 in the previous chapter\
    \ no longer\nadequately cover the foreign-key relationships in the `phpsols` database.\
    \ In\naddition to amending the update form, you also need to create scripts to\n\
    delete records without destroying the database’s referential\nintegrity."
  trans: '

    `$OK`的值由插入数据到`blog`表的查询的`affected_rows`属性决定，且仅当选中任意分类时，多选的`<select>`列表才会被包含在`$_POST`数组中。因此，仅当数据成功插入`blog`表，且表单中至少选中了一个分类时，此代码块才会执行。它首先从预处理语句对象的`insert_id`属性获取插入操作的主键，并将其赋值给`$article_id`。


    表单将分类值作为数组提交。`foreach`循环检查`$_POST[''category'']`中的每个值。如果该值是数值，则执行以下行：


    ```

    $values[] = "($article_id, " . (int) $cat_id . '')'';

    ```


    这会创建一个由两个主键`$article_id`和`$cat_id`组成的字符串，它们用逗号分隔并包裹在一对圆括号中。`(int)`强制转换运算符确保`$cat_id`是一个整数。结果被赋值给一个名为`$values`的数组。例如，如果`$article_id`是`10`且`$cat_id`是`4`，则赋值给数组的结果字符串为`(10,
    4)`。


    如果`$values`包含任何元素，则`implode()`会将其转换为逗号分隔的字符串，并追加到 SQL 查询中。例如，如果选中了分类`2`、`4`和`5`，生成的查询如下所示：


    ```

    INSERT INTO article2cat (article_id, cat_id)

    VALUES (10, 2),(10, 4),(10, 5)

    ```


    正如第 15 章“回顾四个基本 SQL 命令”中所述，这是如何使用单个`INSERT`查询插入多行的方法。


    由于`$article_id`来自可靠来源，并且`$cat_id`的数据类型已检查过，因此直接将这些变量用于 SQL 查询是安全的，无需使用预处理语句。查询通过`query()`方法执行。如果失败，连接对象的`error`属性将存储在`$catError`中。


    5.  最后的代码段处理成功时的重定向和错误消息。修改后的代码如下所示：


    ```

    // redirect if successful or display error

    if ($OK && !isset($imageError) && !isset($catError)) {

    header(''Location: http://localhost/phpsols-4e/admin/blog_list_mysqli.php'');

    exit;

    } else {

    $error = $stmt->error;

    if (isset($imageError)) {

    $error .= '' '' . $imageError;

    }

    if (isset($catError)) {

    $error .= '' '' . $catError;

    }

    }

    ```


    控制重定向的条件现在确保`$imageError`和`$catError`不存在。如果任一存在，其值会被追加到原始的`$error`中，`$error`包含了来自预处理语句对象的任何错误消息。


    6.  保存`blog_insert_mysqli.php`并在浏览器中测试。尝试上传一张过大的图片或一个 MIME 类型错误的文件。表单应重新显示，并附有错误消息，且博客详情得以保留。同时尝试插入带或不带图片和/或分类的博客条目。你现在拥有一个通用的插入表单。


    如果你没有合适的图片供上传，请使用`phpsols images`文件夹中的图片。`Upload`类会重命名它们以避免覆盖现有文件。


    你可以对照`ch18`文件夹中的`blog_insert_mysqli_05.php`检查你的代码。


    ## PDO 版本的主要差异


    最终的 PDO 版本可以在`ch18`文件夹中的`blog_insert_pdo_05.php`找到。它遵循与 MySQLi 版本相同的基本结构和逻辑，但在将值插入数据库的方式上存在一些重要差异。


    步骤 2 中的代码紧跟 MySQLi 版本，但使用了命名占位符代替匿名占位符。为了获取受影响的行数，PDO 在语句对象上使用`rowCount()`方法。最近一次插入操作的主键通过在连接对象上调用`lastInsertId()`方法获得。与
    MySQLi 的`insert_id`属性类似，你需要在`INSERT`查询执行后立即访问它。


    最大的变化在于步骤 3 中向`blog`表插入详情信息的代码。由于 PDO 可以使用`bindValue()`将`null`值插入列，因此只需要一个预处理语句。步骤
    3 的 PDO 代码如下所示：


    ```

    // insert blog details only if there hasn''t been an image upload error

    if (!isset($imageError)) {

    // create SQL

    $sql = ''INSERT INTO blog (image_id, title, article)

    VALUES(:image_id, :title, :article)'';

    // prepare the statement

    $stmt = $conn->prepare($sql);

    // bind the parameters

    // if $image_id exists, use it

    if (isset($image_id)) {

    $stmt->bindParam('':image_id'', $image_id, PDO::PARAM_INT);

    } else {

    // set image_id to NULL

    $stmt->bindValue('':image_id'', NULL, PDO::PARAM_NULL);

    }

    $stmt->bindParam('':title'', $_POST[''title''], PDO::PARAM_STR);

    $stmt->bindParam('':article'', $_POST[''article''], PDO::PARAM_STR);

    // execute and get number of affected rows

    $stmt->execute();

    $OK = $stmt->rowCount();

    }

    ```


    如果已上传图片，以粗体高亮的条件语句会将`$image_id`的值绑定到命名的`:image_id`占位符。但如果没有上传图片，`bindValue()`会将该值设置为`NULL`。


    在步骤 4 中，PDO 版本使用`exec()`代替`query()`来将值插入`article2cat`表。`exec()`方法执行一个 SQL 查询并返回受影响的行数，因此当不需要使用预处理语句时，它应与`INSERT`、`UPDATE`和`DELETE`查询一起使用。


    另一个重要的区别在于构建错误消息的代码（如果出现问题）。由于在 PDO 中，创建和准备语句是一个步骤，因此如果出现问题，语句对象可能不存在。所以，在尝试调用`errorInfo()`方法之前，你需要检查其是否存在。如果没有语句，代码会从数据库连接对象获取错误消息。同时需要将`$error`初始化为空字符串，以便连接各种消息，如下所示：


    ```

    // redirect if successful or display error

    if ($OK && !isset($imageError) && !isset($catError)) {

    header(''Location: http://localhost/phpsols-4e/admin/blog_list_pdo.php'');

    exit;

    } else {

    $error = ";

    if (isset($stmt)) {

    $error .= $stmt->errorInfo()[2];

    } else {

    $error .= $conn->errorInfo()[2];

    }

    if (isset($imageError)) {

    $error .= '' '' . $imageError;

    }

    if (isset($catError)) {

    $error .= '' '' . $catError;

    }

    }

    ```


    ## 在多表中更新和删除记录


    `categories`和`article2cat`表的添加意味着上一章 PHP 解决方案 17-2 和 17-3 中对`blog_update_mysqli.php`和`blog_update_pdo.php`所做的修改不再完全覆盖`phpsols`数据库中的外键关系。除了修改更新表单外，你还需要创建脚本来删除记录，而不破坏数据库的参照完整性。

