  ## 为正确的层配置正确的逻辑


  由于每一层都包含自己的逻辑，有时很难决定各层之间的界限究竟在哪里。在前面的场景中，与其在业务层读取产品数量并根据该数字决定产品是否可用（这会导致两次数据层调用，也就意味着两次数据库调用），不如使用一个名为
  `add_product_if_available`（如果可用则添加产品）的单一数据层方法，该方法仅当产品有库存时才将其加入购物车。




