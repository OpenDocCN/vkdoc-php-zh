    Rather than start again from scratch, it makes sense to adapt the existing page.
    As it stands, the page contains only a text input field for the title and a text
    area for the article.


    You need to add a multiple-choice `<select>` list for categories and a drop-down
    `<select>` menu for existing images.


    To prevent a user from selecting an existing image at the same time as uploading
    a new one, a check box and JavaScript control the display of the relevant input
    fields. Selecting the check box disables the drop-down menu for existing images
    and displays the input fields for a new image and caption. Deselecting the check
    box hides and disables the file and caption fields and re-enables the drop-down
    menu. If JavaScript is disabled, the options for uploading a new image and captions
    are hidden.


