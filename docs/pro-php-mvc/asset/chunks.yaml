    Questions


    1\. Why did we subclass the Controller class to add database functionality?


    2\. PHP has built-in session management functions, some of which are even used
    in the Session classes we created. Why do we even need to create these Session
    classes?


    3\. What is the purpose of the $_prefix property of the Session driver class?


    Answers


    1\. First, we chose the Controller class as the ideal place for the database code
    due to the fact that all of our application controllers will need access to the
    database. Second, the reason we subclass Controller, instead of modifying the
    original, is because this is clearly in the territory of application requirements.
    Not all applications will require a database connection; therefore, it should
    be decided per application.


    2\. We do, in fact, use some of PHP’s built-in session management code, but there
    are two reasons why it is still a good idea to create these classes. The first
    is that working with sessions (in PHP) requires opening the session before, and
    closing the session after, any changes to the session data. We no longer have
    to repeat that code every time we work with the session. The second reason is
    that we are free to create any number of session drivers, which might not use
    the default session management code.


    3\. We prefix all session keys for the same reason that all our framework code
    is organized in namespaces. Namely, we don’t know what other server code will
    be


    running alongside our framework. Likewise, we do not know what other systems


    will be using the same session space. The best thing for us to do is avoid collisions
    by prefixing all session keys.


    Exercises


    1\. Our Controller subclass opens a connection to the database, but does not close
    it.


    This isn’t usually a problem (for systems with many resources to throw around),
    but it would be ideal for the connection to be closed when no longer in use. Now
    add the additional code to close the connection to the database. Be careful not
    to close the connection too early.


    2\. Our Session classes only use the native PHP sessions. Now add another driver
    that uses some other form of storage to manage sessions. You can use files or
    cache, or anything you like. Just be sure to keep each user’s session data private!


