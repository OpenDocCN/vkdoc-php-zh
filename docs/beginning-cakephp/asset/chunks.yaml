  trans: "\n# 使用 Bake 生成视图和控制器操作可以快速启动应用程序开发。然而，最终你需要更定制化的代码来完善应用程序的功能集。为了让应用程序提供丰富的功能，用户不可避免地会以点击链接和\
    \ HTML 元素、提交表单数据或执行其他交互的形式进行一定程度的操作。当用户与应用程序交互时，他们会发出请求，这些请求会依次经过控制器和视图进行处理。本章将深入探讨这些请求序列，并介绍\
    \ Cake 中那些让你能更精细地控制用户体验的特性。\n\n## 处理用户交互\n\n一般来说，用户与 Cake 应用程序交互会产生三种类型的请求序列：\n\
    \n* 简单的页面请求序列\n* 表单提交序列\n* 异步（Ajax）请求序列\n\n视图及其与控制器和模型的交互方式会根据程序的具体流程而变化。当你需要在\
    \ Bake 或脚手架生成的视图之外进行自定义时，必须牢记你正在构建的流程类型。\n\n## 一个简单的页面请求\n\n打开 `app/controllers/posts_controller.php`\
    \ 文件，滚动到 View 操作。代码应该类似于清单 6-1。\n\n**清单 6-1.** *Posts 控制器中的 View 操作*\n\n```\n\
    function view($id = null) {\n    if (!$id) {\n        $this->Session->setFlash(__('无效的文章。',\
    \ true));\n        $this->redirect(array('action'=>'index'));\n    }\n    $this->set('post',\
    \ $this->Post->read(null, $id));\n}\n```\n\n通常情况下——即便不是总是如此——请求流程会先分发到控制器。在这里，View\
    \ 操作由控制器处理，当流程终止时，会调用相应的视图文件。该操作的第一步是接收用户提供的任何参数。由于这是一个简单的页面请求序列，用户仅需提供一个或两个与数据库中某条记录匹配的变量——没有表单数据，没有复杂的逻辑测试，最多只包含几个参数。清单\
    \ 6-1 中的第 1 行通过函数变量 `$id` 接收用户提供的参数。此变量默认值为 `null`，但根据应用程序的需求，它完全可以改为一个数组或设定一个默认值。\n\
    \n在此操作中，会执行一个简单的逻辑测试：如果用户没有提供要从数据库中提取的文章的唯一 ID，则返回错误；否则，读取匹配的记录并将其内容作为变量传递给视图。这个测试在第\
    \ 2 到第 6 行执行。\n\n如果用户没有将 ID 值作为参数提供，则执行第 3 行。该行使用了 Cake 的 Session 组件，这是一个包含多个用于管理和处理会话的函数的组件类。Session\
    \ 组件不是显示一个呈现错误消息的 Flash 页面，而是向视图发送一段文本字符串，该字符串将在布局（layout）或单独的视图文件中显示。在这种情况下，该操作使用了\
    \ Session 组件的 `setFlash()` 函数。要发送的错误字符串设置为“无效的文章”。在 `app/views/layouts/default.ctp`\
    \ 文件中，你必须包含 `Session->setFlash()` 函数的另一端，它将接收该错误字符串并显示它。\n\n打开默认布局，在 `<body>`\
    \ 元素内的某处插入清单 6-2 中的代码行。\n\n**清单 6-2.** *显示 Session Flash 消息*\n\n```\n<? $session->flash();?>\n\
    ```\n\n现在，当识别到错误时，清单 6-1 中的第 4 行会将用户重定向到 Posts 控制器中的 Index 操作。因为你在默认布局中包含了 Session\
    \ 组件，第 3 行中指定的错误消息将会在页面中显示出来。\n\n清单 6-1 中的第 6 行使用 `set()` 函数将数据库中的信息传递给视图。该行还包含了一个模型函数\
    \ `read()`，它会查找与用户提供的 ID 相对应的记录并提取其数据。通过将这个模型函数赋值给 `set()` 函数中的视图变量 `post`，记录中的所有内容都可以在视图中使用。\n\
    \n简单的页面请求通常就像这个 View 操作一样工作。第一步是从用户的链接或 URL 中获取参数，并使其在操作中可用。第二步是检查提供的参数，如果参数为空，则提供错误消息。第三步是获取与请求相对应的数据项，并将它们传递给视图。现在，对于简单的页面请求，控制器的逻辑已经正常工作，你可以开始自定义视图了。\n\
    \n这个请求序列包含的内容远比我之前解释的代码要多得多。例如，该操作可以对参数执行更复杂的检查，或同时处理多个参数，运行多个数据库查询，然后将结果转发给视图。在某些情况下，你可能希望该操作不与视图交互，而是将数据转发给另一个操作。在这些情况下，Cake\
    \ 的行为就像一个典型的 PHP 脚本，只是在为用户生成显示内容时有所不同。使用 Cake 的函数和组件（就像 Bake 使用 Session 组件那样）来代替你自己编写的函数或代码，但通常控制器会像一个通用的\
    \ PHP 脚本一样运行。\n\n## 表单提交序列\n\n处理用户表单数据比简单的页面请求序列更进了一步。在这种场景下，将按顺序发生以下几件事：\n\n\
    1. 控制器操作被调用，并判断用户是否提交了任何表单数据。\n2. 如果没有表单数据，控制器则指示视图显示表单。如果是在编辑现有记录，控制器可能会执行数据库查找，以便在后续视图中预填充字段。\n\
    3. 用户填写表单并将其提交给控制器。\n4. 这一次，控制器在请求中找到了表单数据并处理这些数据。根据操作结果的不同，会渲染另一个视图，通常是一个反馈页面，提示用户提交成功或失败。\n\
    \n要理解 Cake 流程的内部机制，请打开 `app/controllers/posts_controller.php`，滚动到 Add 操作。代码应该类似于清单\
    \ 6-3。\n\n**清单 6-3.** *Posts 控制器中的 Add 操作*\n\n```\nfunction add() {\n    if (!empty($this->data))\
    \ {\n        $this->Post->create();\n        if ($this->Post->save($this->data))\
    \ {\n            $this->Session->setFlash(__('文章已保存', true));\n            $this->redirect(array('action'=>'index'));\n\
    \        } else {\n            $this->Session->setFlash(__('文章无法保存，请重试。', true));\n\
    \        }\n    }\n    $tags = $this->Post->Tag->find('list');\n    $users = $this->Post->User->find('list');\n\
    \    $this->set(compact('tags', 'users'));\n}\n```\n\nAdd 操作的行为与上述概要一致：在清单 6-3\
    \ 的第 2 行，它通过一个简单的逻辑测试检查是否有用户表单数据，如果有，则将数据保存到数据库；否则，向用户返回错误并渲染 Add 视图。\n\n### `$this->data`\n\
    \nCake 会为你处理表单数据，并遵循约定。提交给控制器的所有表单字段都会自动格式化为一个数组，其命名约定决定了数据在数组中的存储位置。表单将始终按照 MVC\
    \ 结构进行解析和组织。例如，观察清单 6-4。\n\n**清单 6-4.** *一个简单的表单*\n\n```\n<?=$form->create('Posts');?>\n\
    <?=$form->input('name');?>\n<?=$form->input('content',array('type'=>'textarea','rows'=>4,'cols'=>40));?>\n\
    <?=$form->end('提交');?>\n```\n"
- fmt: "虽然尚未讨论，但清单6-4使用了`Form`辅助器，后续将更广泛地使用它。简而言之，`Form`辅助器会在视图中运行函数，决定如何显示一段HTML代码。`Form`辅助器中的`input()`函数非常有用，因为它接受提供的名称（对应数据库中的字段）并渲染一个HTML\
    \ `<input type=\"text\"/>`元素，该元素包含所有适当的名称和值，以便Cake自动解析数据。如果你查看浏览器的页面源代码，此视图将输出以下内容：\n\
    \n```html\n<form method=\"post\" action=\"/blog/posts/add\">\n<input type=\"text\"\
    \ name=\"data[Post][name]\" id=\"PostName\"/>\n<textarea name=\"data[Post]\" cols=\"\
    40\" rows=\"4\" id=\"PostContent\"></textarea>\n<input type=\"submit\" value=\"\
    Submit\"/>\n</form>\n```\n\n当用户填写表单并提交时，Cake将表单数据放入`$this->data`数组中，如下所示：\n\n\
    ```\nArray (\n    [Post] => Array (\n        [name] => Title Entered in the Name\
    \ Field\n         => All the content provided in the <textarea> field.\n    )\n\
    )\n```\n\n当处理关联模型时，`$this->data`还可能包含这些字段。对于`Post`模型，您已经为博客构建了文章和标签之间的关联。如果操作正确，表单将把关联字段一并传递给`$this->data`，结果如下：\n\
    \n```\nArray (\n    [Post] => Array (\n        [name] => Title Entered in the\
    \ Name Field\n         => All the content provided in the <textarea> field.\n\
    \    )\n    [Tag] => Array (\n        [Tag] => Array (\n            [0] => 1\n\
    \            [1] => 56\n        )\n    )\n)\n```\n\n在`$this->data['Tag']['Tag']`数组中，每个选中项的ID作为数组中的独立元素存在，因为`Tag`模型与`Post`模型是“拥有并属于多个”（hasAndBelongsToMany）的关系。\n\
    \n用户表单提交可能会迅速变得更加复杂。同样在文章的添加操作中，还有一个日期时间字段。处理日期和时间可能会相当繁琐；区分月份、天数、分钟和小时可能是一场噩梦，因为每个单位都有其特定的数值范围（例如，一个月可能有30天，另一个月有31天，而二月每四年在28天和29天之间变化）。\n\
    \n与`Form`辅助器结合使用时，`$this->data`可以大幅减少处理日期和时间的代码。如果在视图中正确使用`Form`辅助器，Cake会解析包含日期和时间的表单，并将其放入`$this->data`数组中，如下所示：\n\
    \n```\nArray (\n    [Post] => Array (\n        [date] => Array (\n           \
    \ [month] => 07\n            [day] => 04\n            [year] => 2008\n       \
    \     [hour] => 12\n            [min] => 00\n            [meridian] => pm\n  \
    \      )\n    )\n)\n```\n\n无论是在视图中还是控制器中，都可以像操作任何PHP数组一样，从`$this->data`中提取用户提交的数据。例如，通过检查`$this->data['Post']['date']['year']`的值可以轻松获取年份。或者，通过调用`$this->data['Post']['date']['meridian']`的值来获取上午/下午标识。考虑到在视图中，所有必要的日期和时间字段只需一行代码即可提供，Cake中的日期和时间处理就更加吸引人了：\n\
    \n```php\n<?=$form->input('date');?>\n```\n\n回到清单6-3的第2行，添加操作通过检查`$this->data`数组来判断用户是否提交了表单：如果数组为空，则用户未提交任何内容；如果不为空，则表示表单已提交，操作必须处理这些数据。\n\
    \n清单6-3的第3-6行在`$this->data`测试通过后，将数据保存到数据库。其余的操作行为类似简单的页面请求。如果未提供数据，操作会从`Tag`和`User`模型中提取一些关联数据，并将其传递给视图。\n\
    \n## 保存表单\n\n当`$this->data`按照Cake的约定（主要通过视图中实现`Form`辅助器来管理）进行格式化时，保存数据非常简单。Cake通过使用模型的`create()`和`save()`函数来执行保存操作。"
  raw: 'Though I haven’t yet discussed it, Listing 6-4 uses the Form helper, which
    I will use more extensively later. In short, the Form helper runs functions in
    the view that determine how to display a chunk of HTML code. The input() function
    in the Form helper is useful because it takes the name provided (which corresponds
    to fields in the database) and renders an HTML


    <input type="text"/> element with all the appropriate names and values for Cake
    to parse the data automatically. If you were to take a peek at the page source
    in the browser, this view would output the following:


    <form method="post" action="/blog/posts/add">


    <input type="text" name="data[Post][name]" id="PostName"/>


    <textarea name="data[Post][content]" cols="40" rows="4" id="PostContent"></textarea>


    <input type="submit" value="Submit"/>


    </form>


    When the user fills out the form and submits it, Cake places the form data into
    the $this->data array like this:


    Array (


    [Post] => Array (


    [name] => Title Entered in the Name Field


    [content] => All the content provided in the <textarea> field.


    )


    )


    When working with associated models, $this->data may also include those fields
    as well.


    In the case of the Post model, you have already built an association between posts
    and tags for the blog. When done correctly, the form will pass along associated
    fields to $this->data nicely: Array (


    [Post] => Array (


    [name] => Title Entered in the Name Field


    [content] => All the content provided in the <textarea> field.


    )


    [Tag] => Array (


    [Tag] => Array (


    [0] => 1


    [1] => 56


    )


    )


    )


    09775ch06final 7/1/08 9:44 PM Page 77


    C H A P T E R 6 ■ C U S TO M I Z I N G V I E W S


    **77**


    In the $this->data[''Tag''][''Tag''] array, each selected item’s ID is placed
    as a separate element in the array, since the Tag model is associated with the
    Post model as a “has and belongs to many” relationship.


    User form submissions can get more complex quickly. Also in the posts’ Add action
    is a datetime field. Working with dates and times can be rather cumbersome; differentiating
    between months, days, minutes, and hours can be a nightmare considering each has
    a specific set of numbers by which it may be represented (for example, one month
    may have 30


    days, another may have 31, and February changes between 28 and 29 days every four
    years).


    When used in conjunction with the Form helper, $this->data can dramatically shave
    off code for dealing with dates and times. When done correctly in the view with
    the Form helper, Cake parses a form containing dates and times for the $this->data
    array like so: Array (


    [Post] => Array (


    [date] => Array (


    [month] => 07


    [day] => 04


    [year] => 2008


    [hour] => 12


    [min] => 00


    [meridian] => pm


    )


    )


    )


    Whether in the view or the controller, you can pull user-submitted data from $this->data
    like any PHP array. For example, checking for the year can easily be done by examining
    the $this->data[''Post''][''date''][''year''] value. Or, you can fetch the meridian
    by calling the $this->data[''Post''][''date''][''meridian''] value. Dates and
    times in Cake are all the more attractive when considering that in the view all
    the necessary date and time fields are supplied with a single line:


    <?=$form->input(''date'');?>


    Back in line 2 of Listing 6-3, the Add action checks for a user submission by
    looking at the $this->data array: if it is empty, then the user has not submitted
    anything; if not, a form has been submitted, and the action must handle the data.


    Lines 3–6 in Listing 6-3 save the data to the database, provided a test of $this->data
    has passed successfully. The rest of the action behaves like a simple page request.
    If no data has been supplied, the action pulls some associated data from the Tag
    and User models and passes it along to the view.


    Saving Forms


    When $this->data is formatted according to Cake’s conventions (which is mostly
    managed by implementing the Form helper in the view), saving data is easy. Cake
    performs saves through the use of the create() and save() model functions.


    09775ch06final 7/1/08 9:44 PM Page 78


    **78**'
