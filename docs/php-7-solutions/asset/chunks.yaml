  trans: "\n# 处理后的文本\n\n如果 `$trans_error` 包含任何错误消息，则其值为 `true`，因此会在重定向上追加一个查询字符串。\n\
    \n9.  最后的改动在 `blog_list_pdo.php` 中表格上方的 PHP 代码块里。添加粗体部分的代码，以便在更新失败时显示错误消息：\n\n\
    ```\nif (isset($_GET['updated'])) {\n    echo 'Record updated';\n} elseif (isset($_GET['trans_error']))\
    \ {\n    echo \"Can't update record because of the following error: \";\n    echo\
    \ safe($_GET['trans_error']) . '';\n}\n```\n\nPDO 在遇到错误时会立即抛出异常，因此即使存在多个错误，也只会有一条错误消息。\n\
    \n10. 保存 `blog_update_pdo.php` 和 `blog_list_pdo.php`，并更新一条现有记录。脚本应像之前一样正常工作。\n\
    \n11. 在 `blog_update_pdo.php` 的某个更新查询中故意引入一个错误，然后再次测试。这一次，当你被重定向回 `blog_list_pdo.php`\
    \ 时，将会看到错误消息。\n\n12. 点击刚刚尝试更新的记录旁的 `EDIT` 链接，并验证没有任何值发生变化。你可以将你的代码与 `ch18` 文件夹中的\
    \ `blog_update_pdo_07.php` 和 `blog_list_pdo_05.php` 进行核对。\n\n**提示：** 当事务需要满足特定条件才能处理一系列查询时，它们至关重要。例如，在金融数据库中，只有在资金充足时才能进行资金转账。\n\
    \n## 删除时保持参照完整性\n\n在 PHP Solution 18-5 中，删除交叉引用表中的记录时无需担心参照完整性，因为每条记录中存储的值都是外键。每个记录只是引用了\
    \ `blog` 表和 `categories` 表中存储的主键。参照本章开头的图 18-1，从交叉引用表中删除组合了 `article_id 2` 和 `cat_id\
    \ 1` 的记录，只是断开了题为“见习艺妓逛商店”的文章与 `Kyoto` 分类之间的链接。文章和分类本身不受影响，它们仍然保留在各自的表中。\n\n如果你决定删除文章或分类，情况就完全不同了。如果你从\
    \ `blog` 表中删除“见习艺妓逛商店”这篇文章，则所有对 `article_id 2` 的引用也必须从交叉引用表中删除。同样地，如果你删除 `Kyoto`\
    \ 分类，则所有对 `cat_id 1` 的引用都必须从交叉引用表中移除。或者，如果一个项目的主键作为外键存储在别处，你必须阻止该删除操作。\n\n最好的方法是通过建立外键约束。为此，相关表必须使用\
    \ InnoDB 存储引擎。如果你使用的是 MySQL 或 MariaDB 5.5 或更高版本，InnoDB 是默认引擎。此外，本书附带的所有 `.sql`\
    \ 文件都选择 InnoDB 引擎。但是，如果你有使用 MyISAM 存储引擎创建的现有表，则需要先转换它们，然后才能建立外键约束（参见 PHP Solution\
    \ 18-6）。\n\n## PHP Solution 18-9：设置外键约束\n\n本 PHP 解决方案介绍如何在 phpMyAdmin 中设置 `article2cat`、`blog`\
    \ 和 `categories` 表之间的外键约束。外键约束必须始终在子表中定义。在本例中，子表是 `article2cat`，因为它将其他表中的 `article_id`\
    \ 和 `cat_id` 主键作为外键存储。\n\n1.  在 phpMyAdmin 中选择 `article2cat` 表，然后点击“结构”选项卡。\n\n\
    2.  点击结构表上方的“关系视图”（如图 18-12 中圆圈所示）（在旧版 phpMyAdmin 中，它是结构表下方的一个链接）。\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig12_HTML.jpg](img/332054_4_En_18_Fig12_HTML.jpg)\n\
    \n**图 18-12.** 在 phpMyAdmin 的关系视图中定义外键约束\n\n3.  打开的屏幕就是你定义外键约束的地方。将“约束名称”字段留空。phpMyAdmin\
    \ 会自动为约束生成一个名称。\n\n4.  只能在已建立索引的列上设置外键约束。`article2cat` 表中的 `article_id` 和 `cat_id`\
    \ 列是该表的复合主键，因此它们都列在“列”下拉菜单中。选择 `article_id`。然后在“外键约束（INNODB）”下选择以下设置：\n\n    *\
    \   数据库：`phpsols`\n    *   表：`blog`\n    *   列：`article_id`\n\n    这就在父表（`blog`）中的\
    \ `article_id` 和子表（`article2cat`）中的 `article_id` 之间建立了一个约束。\n\n5.  接下来，你需要决定约束的行为方式。“ON\
    \ DELETE”下拉菜单包含以下选项：\n\n    *   `CASCADE`：当你删除父表中的一条记录时，子表中的所有依赖记录都会被删除。例如，如果你在\
    \ `blog` 表中删除了主键为 `article_id 2` 的记录，则 `article2cat` 表中所有包含 `article_id 2` 的记录都会被自动删除。\n\
    \    *   `SET NULL`：当你删除父表中的一条记录时，子表中所有依赖记录的外键都会被设置为 NULL。外键列必须接受 NULL 值。\n  \
    \  *   `NO ACTION`：在某些数据库系统上，这允许延迟外键约束检查。MySQL 会立即执行检查，因此其效果与 `RESTRICT` 相同。\n\
    \    *   `RESTRICT`：如果子表中仍存在依赖记录，则阻止删除父表中的记录。\n\n    **注意：** `ON UPDATE` 也有相同的选项。除了\
    \ `RESTRICT` 之外，其他选项的用途有限，因为只有在特殊情况下才应该更改记录的主键。`ON UPDATE RESTRICT` 不仅阻止对父表中的主键进行更改；还会拒绝子表中任何会导致外键值在父表中找不到匹配行的插入或更新操作。\n\
    \n    对于交叉引用表来说，`CASCADE` 是合乎逻辑的选择。如果你决定删除父表中的一条记录，你希望该记录的所有交叉引用也同时被移除。但是，为了演示外键约束的默认行为，请为\
    \ `ON DELETE` 和 `ON UPDATE` 都选择 `RESTRICT`。\n\n6.  点击“添加约束”链接，使用以下设置为 `cat_id`\
    \ 建立外键约束：\n\n    *   列：`cat_id`\n    *   数据库：`phpsols`\n    *   表：`categories`\n\
    \    *   列：`cat_id`\n\n7.  将 `ON DELETE` 和 `ON UPDATE` 设置为 `RESTRICT`。设置应如图 18-13\
    \ 所示。然后点击“保存”按钮。\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig13_HTML.jpg](img/332054_4_En_18_Fig13_HTML.jpg)\n\
    \n**图 18-13.** 为交叉引用表设置外键约束\n\n**注意：** 旧版 phpMyAdmin 中关系视图的布局不同，它将“数据库”、“表”和“列”下拉菜单组合在一个下拉菜单中。\n\
    \n8.  如果尚未完成，请至少更新一篇博客条目，将其与一个分类关联起来。\n\n9.  在 phpMyAdmin 中，选择 `categories` 表，然后点击已知与某博客条目关联的分类旁边的\
    \ `Delete`，如图 18-14 所示。\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig14_HTML.jpg](img/332054_4_En_18_Fig14_HTML.jpg)\n\
    \n**图 18-14.** 尝试删除 `categories` 表中的一条记录\n"
- fmt: '10. 点击 `OK`，当 phpMyAdmin 要求你确认删除时。如果你已正确设置外键约束，你将看到类似于图 [18-15](#332054_4_En_18_Chapter.xhtml#Fig15)
    的错误信息。


    ![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig15_HTML.jpg](images/332054_4_En_18_Chapter/332054_4_En_18_Fig15_HTML.jpg)


    图 18-15. 如果存在依赖记录，外键约束会阻止删除。


    11. 如果错误信息出现在模态对话框中，点击对话框将其关闭。


    12. 选择 `article2cat` 表，然后点击“结构”选项卡。接着点击“关系视图”。


    **注意**：在较旧版本的 phpMyAdmin 中，`ON DELETE` 和 `ON UPDATE` 可能为空。将这些选项留空与选择 `RESTRICT`
    效果相同，后者是两者的默认值。


    13. 将两个 `ON DELETE` 设置都改为 `CASCADE`，然后点击 `Save`。


    14. 在 `blog` 表中选择一条你知道已关联某个分类的记录。记下其 `article_id`，然后删除该记录。


    15. 检查 `article2cat` 表。与你刚刚删除的记录相关联的记录也已被删除。


    要继续探索外键约束，请选择 `blog` 表，并与 `images` 表中的 `image_id` 建立外键关系。如果你从 `images` 表中删除一条记录，`blog`
    表中的 `image_id` 外键需要被设置为 `NULL`。如果你将 `ON DELETE` 的值设置为 `SET NULL`，这将会自动完成。通过从 `images`
    表中删除一条记录并检查 `blog` 表中的相关记录来测试它。


    **注意**：如果你需要将 InnoDB 表转换回 MyISAM，你必须先移除所有外键约束。选择“关系视图”，然后点击每个约束左上角的“删除”。在较旧版本的
    phpMyAdmin 中，将“外键 (INNODB)”字段留空，然后点击 `Save`。移除约束后，你可以按照 PHP 方案 18-6 中的描述更改存储引擎。选择
    `MyISAM` 而不是 `InnoDB`。


    ## 创建带有外键约束的删除脚本


    在 InnoDB 表中选择 `ON DELETE` 的值取决于表之间的关系性质。在 `phpsols` 数据库的情况下，不仅安全而且最好将 `article2cat`
    交叉引用表中两列的选项都设置为 `CASCADE`。如果在 `blog` 或 `categories` 父表中删除了记录，则需要在交叉引用表中删除相关值。


    `images` 表和 `blog` 表之间的关系不同。如果你从 `images` 表中删除一条记录，你可能不希望删除 `blog` 表中的相关文章。在这种情况下，选择
    `SET NULL` 是合适的。当从 `images` 表中删除一条记录时，相关文章中的外键会被设置为 `NULL`，但文章内容保持不变。


    另一方面，如果图像对文章理解至关重要，请选择 `RESTRICT`。任何删除仍有关联文章的图像的尝试都会被自动阻止。


    这些考虑因素会影响你处理删除脚本的方式。当外键约束设置为 `CASCADE` 或 `SET NULL` 时，你不需要做任何特殊处理。你可以使用简单的 `DELETE`
    查询，其余部分交给数据库处理。


    然而，如果外键约束设置为 `RESTRICT`，`DELETE` 查询将会失败。为了显示适当的错误信息，请使用 MySQLi 语句对象的 `errno` 属性。由于外键约束而失败的查询的
    MySQL 错误代码是 `1451`。在调用 `execute()` 方法之后，你可以按如下方式检查 MySQLi 中的错误：


    ```

    $stmt->execute();

    if ($stmt->affected_rows > 0) {

    $deleted = true;

    } else {

    $deleted = false;

    if ($stmt->errno == 1451) {

    $error = ''That record has dependent files in a child table, and cannot be deleted.'';

    } else {

    $error = ''There was a problem deleting the record.'';

    }

    }

    ```


    如果你使用 PDO，请使用 `errorCode()` 方法。由于外键约束而失败的查询的代码是 `HY000`。在检查受影响行数后，你可以像这样使用 PDO
    预处理语句检查错误代码：


    ```

    $deleted = $stmt->rowCount();

    if (!$deleted) {

    if ($stmt->errorCode() == ''HY000'') {

    $error = ''That record has dependent files in a child table, and cannot be deleted.'';

    } else {

    $error = ''There was a problem deleting the record.'';

    }

    }

    ```


    如果你使用 PDO 的 `exec()` 方法，技术是相同的，该方法在使用非 `SELECT` 查询时返回受影响的行数。当使用 `exec()` 时，`errorCode()`
    方法是在数据库连接上调用的：


    ```

    $deleted = $conn->exec($sql);

    if (!$deleted) {

    if ($conn->errorCode() == ''HY000'') {

    $error = ''That record has dependent files in a child table, and cannot be deleted.'';

    } else {

    $error = ''There was a problem deleting the record.'';

    }

    }

    ```


    ## 创建没有外键约束的删除脚本


    如果你不能使用 InnoDB 表，你需要在你自己的删除脚本中构建相同的逻辑。为了实现与 `ON DELETE CASCADE` 相同的效果，像这样连续运行两个
    `DELETE` 查询：


    ```

    $sql = ''DELETE FROM article2cat WHERE article_id = ?'';

    $stmt->prepare($sql);

    $stmt->bind_param(''i'', $_POST[''article_id'']);

    $stmt->execute();

    $sql = ''DELETE FROM blog WHERE article_id = ?'';

    $stmt->prepare($sql);

    $stmt->bind_param(''i'', $_POST[''article_id'']);

    $stmt->execute();

    ```


    为了实现与 `ON DELETE SET NULL` 相同的效果，像这样运行一个结合了 `DELETE` 查询的 `UPDATE` 查询：


    ```

    $sql = ''UPDATE blog SET image_id = NULL WHERE image_id = ?'';

    $stmt->prepare($sql);

    $stmt->bind_param(''i'', $_POST[''image_id'']);

    $stmt->execute();

    $sql = ''DELETE FROM images WHERE image_id = ?'';

    $stmt->prepare($sql);

    $stmt->bind_param(''i'', $_POST[''image_id'']);

    $stmt->execute();

    ```


    为了实现与 `ON DELETE RESTRICT` 相同的效果，你需要在继续执行 `DELETE` 查询之前先运行一个 `SELECT` 查询来查找是否存在依赖记录，如下所示：


    ```

    $sql = ''SELECT image_id FROM blog WHERE image_id = ?'';

    $stmt->prepare($sql);

    $stmt->bind_param(''i'', $_POST[''image_id'']);

    $stmt->execute();

    // store result to find out how many rows it contains

    $stmt->store_result();

    // if num_rows is not 0, there are dependent records

    if ($stmt->num_rows) {

    $error = ''That record has dependent files in a child table, and cannot be deleted.'';

    } else {

    $sql = ''DELETE FROM images WHERE image_id = ?'';

    $stmt->prepare($sql);

    $stmt->bind_param(''i'', $_POST[''image_id'']);

    $stmt->execute();

    }

    ```


    ## 章节回顾


    一旦你学会了与数据库通信所需的基本 SQL 和 PHP 命令，处理单张表就变得非常容易。然而，通过外键链接表可能相当具有挑战性。关系数据库的强大之处在于其极高的灵活性。问题在于这种无限的灵活性意味着没有单一的“正确”做事方式。


    尽管如此，不要因此气馁。你的直觉可能是坚持使用单张表，但在那条路上会面临更大的复杂性。使数据库工作变得简单的关键在于在早期阶段限制你的野心。构建如本章中所示的简单结构，尝试它们，并了解它们的工作原理。逐步添加表和外键链接。具有丰富数据库经验的人说，他们经常花费超过一半的开发时间来思考表结构。在那之后，编码就是简单的事了！


    在最后一章中，我们将回到处理单张表，讨论用户认证这一重要主题以及如何处理哈希和加密密码。


    ## 19. 使用数据库进行用户认证'
