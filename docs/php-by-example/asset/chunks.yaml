    \ you enter the request `localhost:6789` into the browser’s address bar (or specify\
    \ a different port, depending on which one was indicated when running the local\
    \ server). The result is shown in Figure [12-4](#613529_1_En_12_Chapter.xhtml#Fig4).\n\
    \n![](images/613529_1_En_12_Chapter/613529_1_En_12_Fig4_HTML.jpg)\n\nA screenshot\
    \ of the greetings web page. It reads the title, introduce yourself with a question,\
    \ what is your name question mark. A field is below it with a submit button.\n\
    \nFigure 12-4\nThe initial browser window\n\nThe window contains an input field\
    \ with the text `What is your name?` above it, as well as the **Submit** button.\
    \ If you just click the button (without filling in the field), then the contents\
    \ of the browser window change and is as in Figure [12-5](#613529_1_En_12_Chapter.xhtml#Fig5)."
