    # 使用变量表示变化的值


    图 3-1 中的代码看起来像是显示年份范围的一种非常冗长的方式。直接输入实际日期肯定简单得多？是的，确实如此，但从长远来看，PHP 解决方案能为你节省时间。无需每年手动更新版权声明，PHP
    代码会自动完成。你只需编写一次代码，之后便可高枕无忧。更重要的是，正如你在下一章将看到的，如果将代码存储在外部文件中，对外部文件所做的任何更改都会反映在网站的每个页面上。


    这种自动显示年份的能力依赖于 PHP 的两个关键方面：变量和函数。顾名思义，函数用于执行操作；它们执行预设任务，例如获取当前日期并将其转换为人类可读的格式。稍后我会介绍函数，所以让我们先来看变量。图
    3-1 中的脚本包含两个变量：`$startYear` 和 `$thisYear`。


    **提示**


    变量只是你赋予某个可能变化或你事先未知事物的一个名称。PHP 中的变量总是以 `$`（美元符号）开头。


    尽管变量的概念听起来很抽象，但我们在日常生活中一直在使用变量。当你第一次见到某人时，你首先会问的问题之一是"你叫什么名字？"无论你刚认识的人是汤姆、迪克还是哈利，"名字"这个词始终保持不变。同样，对于你的银行账户，资金不断进出（似乎主要是支出），但如图
    3-2 所示，无论你是囊中羞涩还是富甲一方，可用金额始终被称为余额。


    ![A978-1-4842-0635-5_3_Fig2_HTML.jpg](img/A978-1-4842-0635-5_3_Fig2_HTML.jpg)


    图 3-2. 银行对账单上的余额是变量的一个日常例子——名称保持不变，即使数值可能每天都在变化


    所以，"名字"和"余额"就是日常生活中的变量。只需在它们前面加上美元符号，就得到了两个现成的 PHP 变量，就像这样：


    `$name`


    `$balance`


    很简单。


    ## 命名变量


    你可以选择几乎任何你喜欢的内容作为变量名，只要记住以下规则即可：


    - 变量始终以美元符号（`$`）开头。

    - 美元符号后的第一个字符不能是数字。

    - 不允许有空格或标点符号，下划线（`_`）除外。

    - 变量名区分大小写：`$startYear` 和 `$startyear` 不是同一个变量。


    在为变量选择名称时，明智的做法是选择一个能说明其用途的名称。你目前看到的变量——`$startYear`、`$thisYear`、`$name` 和 `$balance`——就是很好的例子。由于变量名中不能使用空格，一个好习惯是在组合多个单词时，将第二个及后续单词的首字母大写（有时称为驼峰式命名）。另一种方法是使用下划线（`$start_year`、`$this_year`等）。


    从技术上讲，你可以使用下划线作为美元符号后的第一个字符，但不推荐这样做。PHP 预定义变量（例如本章稍后描述的超级全局数组）以下划线开头，因此你可能会意外选择相同的名称，从而给脚本带来问题。


    不要试图通过使用非常短的变量来节省时间。使用 `$sy`、`$ty`、`$n` 和 `$b` 而不是更具描述性的名称，会使代码更难理解——从而增加编写难度。更重要的是，这会使错误更难发现。当然，规则总有例外。按照惯例，`$i`、`$j`
    和 `$k` 经常用于记录循环运行的次数，而 `$e` 则用于错误检查。你将在本章后面看到这些示例。


    **注意**


    尽管在变量名的选择上有相当大的自由度，但不能使用 `$this`，因为它在 PHP 面向对象编程中具有特殊含义。还建议避免使用 [`php.net/manual/en/reserved.php`](http://php.net/manual/en/reserved.php)
    中列出的任何关键字。


    ## 为变量赋值


    变量从多种来源获取值，包括以下途径：


    - 通过在线表单的用户输入

    - 数据库

    - 外部来源，例如新闻供稿或 XML 文件

    - 计算结果

    - 直接包含在 PHP 代码中


    无论值来自何处，都始终使用等号（`=`）进行赋值，如下所示：


    `$variable = value;`


    变量放在等号左侧，值放在右侧。因为它负责赋值，所以等号被称为赋值运算符。


    **注意**


    从小对等号的熟悉使得我们很难改掉认为它表示"等于"的习惯。然而，PHP 使用两个等号（`==`）来表示相等。这是初学者犯错的主要原因，也常常让经验更丰富的开发者措手不及。`=`
    和 `==` 之间的区别将在本章后面更详细地介绍。


    ## 以分号结束命令


    PHP 由一系列命令或语句编写而成。每条语句通常告诉 PHP 引擎执行特定操作，并且其后必须始终跟一个分号，如下所示：


    ```

    <?php

    执行这个;

    现在执行其他操作;

    ?>

    ```


    与所有规则一样，存在一个例外：如果代码块中只有一条语句，则可以省略分号。但是，不要这样做。与 JavaScript 不同，如果你省略分号，PHP 不会自动假设行尾应该有一个分号。这有一个很好的副作用：你可以将长语句分布在多行上，并为了便于阅读而安排代码的布局。PHP
    和 HTML 一样，会忽略代码中的空白。相反，它依靠分号来指示一条命令在何处结束，下一条命令在何处开始。


    **提示**


    在 PHP 语句（或命令）的末尾使用分号总是正确的。缺少分号会使你的脚本戛然而止。


    ## 注释脚本


    PHP 会将开始和结束 PHP 标签之间的所有内容视为要执行的语句，除非你通过将一段代码标记为注释来告诉它不要这样做。以下三个原因解释了你可能想要这样做的原因：


    - 插入提醒，说明脚本的功能

    - 为稍后要添加的代码插入占位符

    - 临时禁用一段代码


    当脚本在你的脑海中还很清晰时，插入任何不会被处理的内容似乎没有必要。但是，如果你需要在几个月后修改脚本，你会发现注释比尝试单独理解代码更容易阅读。当你在团队中工作时，注释也至关重要。它们帮助你的同事理解代码的意图。


    在测试期间，阻止一行代码甚至整个部分运行通常很有用。PHP 会忽略任何标记为注释的内容，因此这是一种打开和关闭代码的有用方法。


    添加注释有三种方式：两种用于单行注释，一种用于跨越多行的注释。

