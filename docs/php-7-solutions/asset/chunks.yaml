  trans: '

    ### 使用相对日期处理溢出问题


    `modify()` 方法接受一个相对日期字符串，这可能会产生意外结果。例如，如果你向一个表示 2019 年 1 月 31 日的`DateTime`对象增加一个月，结果值不会是二月的最后一天，而是
    3 月 3 日。


    发生这种情况是因为，在原日期上增加一个月得到的是 2 月 31 日，但在非闰年中二月只有 28 天。因此，超出范围的值会累加到月份上，最终得到 3 月 3
    日。如果随后从同一个`DateTime`对象减去一个月，你会回到 2 月 3 日，而不是原始的起始日期。`date_modify_01.php` 中的代码说明了这一点，如图
    16-9 所示。


    ![图 16-9](img/332054_4_En_16_Fig9_HTML.jpg)


    **图 16-9.** 增加和减少月份可能导致意外结果


    ```

    原始日期: format($format) ?>.

    增加一个月: modify(''+1 month'');

    echo $date->format($format);

    $date->modify(''-1 month'');

    ?>

    减少一个月: format($format) ?>

    ```


    避免此问题的方法是在相对表达式中使用`''last day of''`，如下所示（代码在 `date_modify_02.php`）：


    ```

    原始日期: format($format) ?>.

    增加一个月: modify(''last day of +1 month'');

    echo $date->format($format);

    $date->modify(''last day of -1 month'');

    ?>

    减少一个月: format($format) ?>

    ```


    如图 16-10 所示，这样做现在得到了期望的结果。


    ![图 16-10](img/332054_4_En_16_Fig10_HTML.jpg)


    **图 16-10.** 在相对表达式中使用`''last day of''`解决了问题


    ### 使用 `DateTimeZone` 类


    除非你已使用前面描述的方法之一重置了时区，否则`DateTime`对象会自动使用 Web 服务器的默认时区。但是，你可以通过构造函数的可选第二个参数或使用`setTimezone()`方法来设置单个`DateTime`对象的时区。在这两种情况下，参数都必须是一个`DateTimeZone`对象。


    要创建一个`DateTimeZone`对象，需将`www.php.net/manual/en/timezones.php`列出的一个受支持的时区作为参数传递给构造函数，如下所示：


    ```

    $UK = new DateTimeZone(''Europe/London'');

    $USeast = new DateTimeZone(''America/New_York'');

    $Hawaii = new DateTimeZone(''Pacific/Honolulu'');

    ```


    查看受支持时区列表时，务必认识到它们是基于地理区域和城市，而非官方时区。这是因为 PHP 会自动考虑夏令时。亚利桑那州不使用夏令时，它被覆盖在`America/Phoenix`之下。将时区按地理区域组织会带来一些意外。`America`
    并非指美国，而是指南北美洲和加勒比地区的大陆。因此，火奴鲁鲁并不在`America`之下，而是作为太平洋时区列出。`Europe` 也指的是欧洲大陆，包括不列颠群岛，但排除其他岛屿。因此，雷克雅未克和马德拉群岛被列为大西洋时区，而位于挪威斯瓦尔巴群岛上的朗伊尔城则独享作为唯一一个北极时区的特权。


    `timezones.php`中的代码为伦敦、纽约和火奴鲁鲁创建了`DateTimeZone`对象，然后使用第一个对象初始化一个`DateTime`对象，如下所示：


    ```

    $now = new DateTime(''now'', $UK);

    ```


    在使用`echo`和`format()`方法显示日期和时间后，通过`setTimezone()`方法更改时区，如下所示：


    ```

    $now->setTimezone($USeast);

    ```


    下次显示`$now`时，它会显示纽约的日期和时间。最后，再次使用`setTimezone()`将时区更改为火奴鲁鲁，输出如下：


    ![输出](img/332054_4_En_16_Figd_HTML.jpg)


    **注意：** 时区转换的准确性取决于 PHP 中编译的时区数据库是否为最新。欧盟计划从 2021 年起废除夏令时，但成员国将有权自由选择永久采用标准时间还是夏令时。如果某些服务器没有更新，这很可能会导致时间不正确。


    要查找服务器的时区，你可以检查`php.ini`，或者对`DateTime`对象使用`getTimezone()`方法。`getTimezone()`方法返回的是一个`DateTimeZone`对象，而不是包含时区的字符串。要获取时区的值，你需要使用`DateTimeZone`对象的`getName()`方法，如下所示（代码在
    `timezone_display.php`）：


    ```

    $now = new DateTime();

    $timezone = $now->getTimezone();

    echo $timezone->getName();

    ```


    `DateTimeZone`类还有其他几个方法，用于公开时区的相关信息。为完整起见，它们被列在表 16-6 中，但`DateTimeZone`类的主要用途是设置`DateTime`对象的时区。


    **表 16-6.** `DateTimeZone` 方法


    | 方法 | 参数 | 描述 |

    | --- | --- | --- |

    | `getLocation()` | 无 | 返回一个关联数组，包含国家代码、纬度、经度以及关于该时区的注释。 |

    | `getName()` | 无 | 返回一个包含该时区地理区域和城市的字符串。 |

    | `getOffset()` | `DateTime` 对象 | 计算作为参数传递的`DateTime`对象与 UTC 的偏移量（以秒为单位）。 |

    | `getTransitions()` | 开始，结束 | 返回一个多维数组，包含夏令时启用和禁用的历史及未来日期和时间。接受两个可选的时间戳参数来限制结果范围。
    |

    | `listAbbreviations()` | 无 | 生成一个大的多维数组，包含 PHP 支持的时区的 UTC 偏移量和名称。 |

    | `listIdentifiers()` | `DateTimeZone` 常量，国家代码 | 返回一个包含所有 PHP 时区标识符（例如`Europe/London`、`America/New_York`等）的数组。接受两个可选参数来限制结果范围。第一个参数使用`www.php.net/manual/en/class.datetimezone.php`列出的`DateTimeZone`常量之一。如果第一个参数是`DateTimeZone::PER_COUNTRY`，则可以使用两个字母的国家代码作为第二个参数。
    |


    表 16-6 中的最后两个方法是静态方法。使用范围解析运算符直接在类上调用它们，如下所示：


    ```

    $abbreviations = DateTimeZone::listAbbreviations();

    ```


    ### 使用 `DateInterval` 类添加和减去固定时间段


    `DateInterval`类用于指定要使用`add()`和`sub()`方法对`DateTime`对象增加或减去的时段。`diff()`方法也使用它，该方法返回一个`DateInterval`对象。起初使用`DateInterval`类可能会感觉有点奇怪，但它实际上相对容易理解。


    要创建一个`DateInterval`对象，需要向构造函数传递一个指定间隔长度的字符串；该字符串必须按照 ISO 8601 标准格式化。该字符串始终以字母`P`（代表期间）开头，后跟一个或多个整数与字母（称为**期间指示符**）组成的对。如果间隔包含小时、分钟或秒，则时间元素前面需要加上字母`T`。表
    16-7 列出了有效的期间指示符。'
- fmt: 'Table 16-7. ISO 8601 period designators used by the `DateInterval` class


    | Period designator | Meaning                                             |

    | :----------------- | :-------------------------------------------------- |

    | `Y`                | Years                                               |

    | `M`                | Months                                              |

    | `W`                | Weeks—cannot be combined with days                  |

    | `D`                | Days—cannot be combined with weeks                  |

    | `H`                | Hours                                               |

    | `M`                | Minutes                                             |

    | `S`                | Seconds                                             |


    The following examples should clarify how to specify an interval:


    ```

    $interval1 = new DateInterval(''P2Y'');           // 2 years

    $interval2 = new DateInterval(''P5W'');           // 5 weeks

    $interval3 = new DateInterval(''P37D'');          // 5 weeks 2 days

    $interval4 = new DateInterval(''PT6H20M'');       // 6 hours 20 minutes

    $interval5 = new DateInterval(''P1Y2DT3H5M50S''); // 1 year 2 days 3 hours 5 min
    50 sec

    ```


    Note that `$interval3` needs to specify the total number of days because weeks
    are automatically converted to days, so `W` and `D` cannot be combined in the
    same interval definition.


    To use a `DateInterval` object with the `add()` or `sub()` method of the `DateTime`
    class, pass the object as an argument. For example, this adds 12 days to the date
    for Christmas Day 2019:


    ```

    $xmas2019 = new DateTime(''12/25/2019'');

    $interval = new DateInterval(''P12D'');

    $xmas2019->add($interval);

    ```


    If you don’t need to reuse the interval, you can pass the `DateInterval` constructor
    directly as the argument to `add()` like this:


    ```

    $xmas2019 = new DateTime(''12/25/2019'');

    $xmas2019->add(new DateInterval(''P12D''));

    ```


    The result of this calculation is demonstrated in `date_interval_01.php`, which
    produces the following output:

    ![../images/332054_4_En_16_Chapter/332054_4_En_16_Fige_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Fige_HTML.jpg)


    An alternative to using the period designators listed in Table [16-7](#332054_4_En_16_Chapter.xhtml#Tab7)
    is to use the static `createFromDateString()` method, which takes as an argument
    an English relative date string in the same way as `strtotime()` does. Using `createFromDateString()`,
    the preceding example can be rewritten like this (the code is in `date_interval_02.php`):


    ```

    $xmas2014 = new DateTime(''12/25/2014'');

    $xmas2014->add(DateInterval::createFromDateString(''+12 days''));

    ```


    This produces exactly the same result.


    Caution

    Adding and subtracting months with `DateInterval` has the same effect as described
    earlier. If the resulting date is out of range, the extra days are added. For
    example, adding one month to January 31 results in March 3 or 2, depending on
    whether it’s a leap year. To get the last day of the month, use the technique
    described earlier in “Handling overflows with relative dates.”


    ### Finding the Difference Between Two Dates with the `diff()` Method


    To find the difference between two dates, create a `DateTime` object for both
    dates, and pass the second object as the argument to the first object’s `diff()`
    method. The result is returned as a `DateInterval` object. To extract the result
    from the `DateInterval` object, you need to use the object’s `format()` method,
    which uses the format characters listed in Table [16-8](#332054_4_En_16_Chapter.xhtml#Tab8).
    These are different from the format characters used by the `DateTime` class. Fortunately,
    most of them are easy to remember.


    Table 16-8. Format characters used by the `DateInterval format()` method


    | Format character | Description                                                  |
    Examples      |

    | :---------------- | :-----------------------------------------------------------
    | :------------ |

    | `%Y`              | Years. At least two digits, with leading zero if necessary   |
    12, 01        |

    | `%y`              | Years, no leading zero                                       |
    12, 1         |

    | `%M`              | Months with leading zero                                     |
    02, 11        |

    | `%m`              | Months, no leading zero                                      |
    2, 11         |

    | `%D`              | Days with leading zero                                       |
    03, 24        |

    | `%d`              | Days, no leading zero                                        |
    3, 24         |

    | `%a`              | Total number of days                                         |
    15, 231       |

    | `%H`              | Hours with leading zero                                      |
    03, 23        |

    | `%h`              | Hours, no leading zero                                       |
    3, 23         |

    | `%I`              | Minutes with leading zero                                    |
    05, 59        |

    | `%i`              | Minutes, no leading zero                                     |
    5, 59         |

    | `%S`              | Seconds with leading zero                                    |
    05, 59        |

    | `%s`              | Seconds, no leading zero                                     |
    5, 59         |

    | `%R`              | Display minus when negative, plus when positive              |
    -, +          |

    | `%r`              | Display minus when negative, no sign when positive           |
    -             |

    | `%%`              | Percentage sign                                              |
    %             |


    The following example in `date_interval_03.php` shows how to get the difference
    between the current date and the American Declaration of Independence using `diff()`
    and displaying the result with the `format()` method:


    ```

    diff($independence);

    echo $interval->format(''%Y years %m months %d days''); ?>

    since American Declaration of Independence.

    ```


    If you load `date_interval_03.php` into a browser, you should see something similar
    to the following screenshot (of course, the actual period will be different).

    ![../images/332054_4_En_16_Chapter/332054_4_En_16_Figf_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Figf_HTML.jpg)

    The format characters follow a logical pattern. Uppercase characters always produce
    at least two digits with a leading zero if necessary. Lowercase characters have
    no leading zero.


    Caution

    With the exception of `%a`, which represents the total number of days, the format
    characters represent only specific parts of the overall interval. For example,
    if you change the format string to `$interval->format(''%m months'')`, it shows
    only the number of whole months that have elapsed since last July 4. It does not
    show the total number of months since July 4, 1776.


    ### Calculating Recurring Dates with the `DatePeriod` Class


    Working out recurring dates, such as the second Tuesday of each month, is now
    remarkably easy thanks to the `DatePeriod` class. It works in conjunction with
    a `DateInterval`.


    The `DatePeriod` constructor is unusual in that it accepts arguments in three
    different ways. The first way of creating a `DatePeriod` object is to supply the
    following arguments:


    - A `DateTime` object representing the start date

    - A `DateInterval` object representing the recurring interval

    - An integer representing the number of recurrences

    - The `DatePeriod::EXCLUDE_START_DATE` constant (optional)


    Once you have created a `DatePeriod` object, you can display the recurring dates
    in a `foreach` loop using the `DateTime format()` method.


    The code in `date_interval_04.php` displays the second Tuesday of each month in
    2019:


    ```

    $start = new DateTime(''12/31/2018'');

    $interval = DateInterval::createFromDateString(''second Tuesday of next month'');

    $period = new DatePeriod($start, $interval, 12, DatePeriod::EXCLUDE_START_DATE);

    foreach ($period as $date) {

    echo $date->format(''l, F jS, Y'') . '''';

    }

    ```


    It produces the output shown in Figure [16-11](#332054_4_En_16_Chapter.xhtml#Fig11).


    ![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig11_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Fig11_HTML.jpg)


    **Figure 16-11.** Calculating a recurring date is remarkably easy with the `DatePeriod`
    class


    The first line of PHP code sets the start date as December 31, 2018. The next
    line uses the `DateInterval` static method `createFromDateString()` to set the
    interval at the second Tuesday of next month. Both values are passed to the `DatePeriod`
    constructor, together with 12 as the number of recurrences and the `DatePeriod::EXCLUDE_START_DATE`
    constant. The constant’s name is self-explanatory. Finally, a `foreach` loop displays
    the resulting dates using the `DateTime format()` method.


    The second way of creating a `DatePeriod` object is to replace the number of recurrences
    in the third argument with a `DateTime` object representing the end date. The
    code in `date_interval_05.php` has been amended like this:


    ```

    $start = new DateTime(''12/31/2018'');

    $interval = DateInterval::createFromDateString(''second Tuesday of next month'');

    $end = new DateTime(''12/31/2019'');

    $period = new DatePeriod($start, $interval, $end, DatePeriod::EXCLUDE_START_DATE);

    foreach ($period as $date) {

    echo $date->format(''l, F jS, Y'') . '''';

    }

    ```


    This produces exactly the same output as shown in Figure [16-11](#332054_4_En_16_Chapter.xhtml#Fig11).'
