    Code coverage helps you to identify code parts that are not covered by tests.
    Theoretically, 100% coverage is attainable, but most of the time, you will achieve
    less than that percentage.


    Generating code coverage is simple, like a piece of cake. We can generate coverage
    for all tests, test suites, or only for test files, with the same options described
    in the previous chapter.


    ```

    $ cd ∼/public_html/cakeBlog

    $ vendor/bin/phpunit --coverage-html webroot/coverage tests/TestCase/Model/Table/UsersTableTest.php

    ```


    Now, open your browser and check your app’s `coverage/index.html` file. In my
    case, this is `http://localhost/∼rrd/cakeBlog/coverage/index.html` (Figure [14-1](#A337704_2_En_14_Chapter.html#Fig1)).


    ![A337704_2_En_14_Fig1_HTML.jpg](A337704_2_En_14_Fig1_HTML.jpg)


    Figure 14-1.


    Code Coverage index page


    You can see a summary of your code coverage. As we generated only for one model
    file, our coverage is very low. You can click Model to view its details. We can
    see that only `TagsTable.php` has tests (Figure [14-2](#A337704_2_En_14_Chapter.html#Fig2)).


    ![A337704_2_En_14_Fig2_HTML.jpg](A337704_2_En_14_Fig2_HTML.jpg)


    Figure 14-2.


    Code coverage for the models


    Click this to go deeper. At the top of the page, we can see what methods we have,
