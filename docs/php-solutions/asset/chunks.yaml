  trans: "\n# PHP 解决方案 6-3：检测错误级别、文件大小和 MIME 类型\n\n该 PHP 解决方案更新了 `checkFile()` 方法，使其调用一系列内部（受保护）方法来验证文件是否可以接受。如果文件因任何原因未能通过验证，系统会通过错误信息向用户报告原因。\n\
    \n继续使用 `Upload.php` 文件进行操作。或者，使用 `ch06/PhpSolutions/File` 文件夹中的 `Upload_01.php`\
    \ 文件，将其移动到 `phpsols` 站点顶层目录下的 `PhpSolutions/File` 文件夹，并重命名为 `Upload.php`。（对于未完成的文件，务必移除下划线和数字。）\n\
    \n`checkFile()` 方法需要执行三项检测：错误级别检测、文件大小检测以及文件 MIME 类型检测。按如下方式更新该方法定义：\n\n```\n\
    protected function checkFile($file) {\n    $accept = true;\n    if ($file['error']\
    \ != 0) {\n        $this->getErrorMessage($file);\n        // 若未提交文件，则停止检查\n \
    \       if ($file['error'] == 4) {\n            return false;\n        } else\
    \ {\n            $accept = false;\n        }\n    }\n    if (!$this->checkSize($file))\
    \ {\n        $accept = false;\n    }\n    if (!$this->checkType($file)) {\n  \
    \      $accept = false;\n    }\n    return $accept;\n}\n```\n\n最初，`checkFile()`\
    \ 直接返回 `true`。现在，使用一个名为 `$accept` 的变量作为该方法的返回值，并初始化为 `true`。三个条件语句执行一系列检测，这些检测由稍后将定义的受保护方法完成。如果文件未通过任一检测，`$accept`\
    \ 将被设为 `false`。只有当所有三项检测都通过时，该方法才返回 `true`。\n\n使用 `$accept` 作为返回值可以生成描述文件所有问题的错误信息。这避免了令人烦恼的情况：上传因一个原因被拒绝，而第一个问题解决后又因另一个不同原因被拒绝。\n\
    \n传递给 `checkFile()` 方法的参数是 `$_FILES` 数组中的顶层元素。我们使用的表单中的上传字段名为 `image`，因此 `$file`\
    \ 等同于 `$_FILES['image']`。这意味着你可以将 `$_FILES['image']['error']` 作为 `$file['error']`\
    \ 来访问。\n\n> **注意：** 如 PHP 解决方案 6-2 所述，上传字段的名称并不重要，因为 `upload()` 方法会自动从 `$_FILES`\
    \ 数组中获取当前元素。\n\n第一个条件语句检查错误级别。如果不为零，则上传存在问题；`$file` 作为参数传递给 `getErrorMessage()`\
    \ 方法，该方法你将在接下来定义。\n\n如果错误级别为 4，则表示未选择文件。没有进一步检查的必要，因此该方法立即返回 `false`。否则，将 `$accept`\
    \ 设为 `false`，并执行接下来的两个条件语句，对文件大小和 MIME 类型进行检查。\n\n`getErrorMessage()` 方法是一个 `switch`\
    \ 语句（参见 第 3 章 中的“使用 switch 语句进行决策链”），它使用表 6-2 中列出的错误级别，将相应的信息添加到 `$messages` 数组中。代码如下：\n\
    \n```\nprotected function getErrorMessage($file) {\n    switch($file['error'])\
    \ {\n        case 1:\n        case 2:\n            $this->messages[] = $file['name']\
    \ . ' 太大了: (最大: ' .\n                $this->getMaxSize() . ')。';\n           \
    \ break;\n        case 3:\n            $this->messages[] = $file['name'] . ' 仅被部分上传。';\n\
    \            break;\n        case 4:\n            $this->messages[] = '未提交文件。';\n\
    \            break;\n        default:\n            $this->messages[] = '抱歉，上传\
    \ ' .\n                $file['name'] . ' 时出现问题。';\n            break;\n    }\n\
    }\n```\n\n错误级别 1 和 2 的错误信息部分由一个名为 `getMaxSize()` 的方法生成，该方法将 `$max` 的值从字节转换为千字节。你将很快定义\
    \ `getMaxSize()`。\n\n只有前四个错误级别有描述性信息。`default` 关键字捕获其他错误级别（包括未来可能添加的），并添加一个通用的原因。\n\
    \n在定义 `getMaxSize()` 之前，我们先处理其他检测。`checkSize()` 方法如下所示：\n\n```\nprotected function\
    \ checkSize($file) {\n    if ($file['error'] == 1 || $file['error'] == 2 ) {\n\
    \        return false;\n    } elseif ($file['size'] == 0) {\n        $this->messages[]\
    \ = $file['name'] . ' 是一个空文件。';\n        return false;\n    } elseif ($file['size']\
    \ > $this->max) {\n        $this->messages[] = $file['name'] . ' 超过了文件的最大大小 ('\
    \ .\n            $this->getMaxSize() . ')。';\n        return false;\n    } else\
    \ {\n        return true;\n    }\n}\n```\n\n该条件语句首先检查错误级别。如果是 1 或 2，则文件太大，因此该方法直接返回\
    \ `false`。相应的错误信息已由 `getErrorMessage()` 方法设置。\n\n下一个条件检查报告的大小是否为零。虽然文件太大或未选择文件时也会发生这种情况，但这些情况已被\
    \ `getErrorMessage()` 方法处理。因此，这里假设文件是空的。\n\n接下来，将报告的大小与存储在 `$max` 属性中的值进行比较。虽然过大的文件应触发错误级别\
    \ 2，但你仍需进行此比较，以防用户成功绕过了 `MAX_FILE_SIZE`。错误信息也使用 `getMaxSize()` 来显示最大大小。\n\n如果大小正常，该方法返回\
    \ `true`。\n\n第三项检测检查 MIME 类型。将以下代码添加到类定义中：\n\n```\nprotected function checkType($file)\
    \ {\n    if (in_array($file['type'], $this->permitted)) {\n        return true;\n\
    \    } else {\n        $this->messages[] = $file['name'] . ' 是不允许的文件类型。';\n  \
    \      return false;\n    }\n}\n```\n\n该条件语句将 `$_FILES` 数组报告的类型与存储在 `$permitted`\
    \ 属性中的数组进行对比。如果该类型存在于数组中，则方法返回 `true`。否则，拒绝原因被添加到 `$messages` 数组中，方法返回 `false`。\n\
    \n`getErrorMessages()` 和 `checkSize()` 方法所使用的 `getMaxSize()` 方法，会将存储在 `$max` 中的原始字节数转换为更友好的格式。将以下定义添加到类文件中：\n\
    \n```\npublic function getMaxSize() {\n    return number_format($this->max/1024,\
    \ 1) . ' KB';\n}\n```\n\n这使用了 `number_format()` 函数，该函数通常接收两个参数：要格式化的数值以及数值保留的小数位数。第一个参数是\
    \ `$this->max/1024`，它将 `$max` 除以 1024（一千字节的字节数）。第二个参数是 1，因此数字格式化为保留一位小数。末尾的 `'.\
    \ ' KB'` 将 KB 附加到格式化后的数字后面。\n\n`getMaxSize()` 方法被声明为 public，以便你可以在使用 `Upload`\
    \ 类的脚本的其他部分显示该值。\n\n保存 `Upload.php` 并使用 `file_upload.php` 再次测试。对于小于 50 KB 的图片，其工作方式与之前相同。但如果你尝试上传一个既太大又属于错误\
    \ MIME 类型的文件，你将得到类似于图 6-5 的结果。\n\n你可以将代码与 `ch06/PhpSolutions/File` 文件夹中的 `Upload_02.php`\
    \ 进行对比。\n\n![A978-1-4842-0635-5_6_Fig5_HTML.jpg](img/A978-1-4842-0635-5_6_Fig5_HTML.jpg)\n\
    \n**图 6-5.** 该类现在能够报告无效大小和 MIME 类型导致的错误\n"
- fmt: "### Changing protected properties\n\nThe `$permitted` property allows only\
    \ images to be uploaded, and the `$max` property limits files to no more than\
    \ 50 KB, but these limits might be too restrictive. Instead of diving into the\
    \ class definition file every time you have different requirements, you can create\
    \ public methods that allow you to make changes to protected properties on the\
    \ fly.\n\nA problem with using the MIME type to filter permitted types of files\
    \ is that there are hundreds of different MIME types. What’s more, the value reported\
    \ in the `$_FILES` array is dependent on the browser. MIME types work well for\
    \ images, but the values reported for other types of files are often inconsistent.\
    \ For example, Firefox reports the MIME type of Microsoft Word documents as `application/vnd.ms-word.document.12`,\
    \ whereas Internet Explorer and Chrome use `application/vnd.openxmlformats-officedocument.wordprocessingml.document`.\n\
    \nTo make the `Upload` class more flexible, we’ll create a public method to turn\
    \ off MIME-type checking. This will permit any type of file to be uploaded. Removing\
    \ all restrictions on the type of upload is risky, so we’ll need a strategy later\
    \ to neutralize potentially dangerous files. We’ll also create a public method\
    \ to change the maximum permitted size of file.\n\n#### PHP Solution 6-4: Allowing\
    \ different types and sizes to be uploaded\n\nThis PHP solution shows you how\
    \ to allow all types of files to be uploaded by skipping the MIME-types check.\
    \ You’ll also add a public method to change the maximum permitted size.\n\nContinue\
    \ working with `Upload.php` from the previous PHP solution. Alternatively, use\
    \ `Upload_02.php` in the `ch06/PhpSolutions/File` folder.\n\nTo control whether\
    \ the MIME type should be checked, create a protected property called `$typeCheckingOn`\
    \ and set its value to `true`. Add the following line of code to the list of properties\
    \ at the top of the class definition in `Upload.php`:\n\n```\nprotected $typeCheckingOn\
    \ = true;\n```\n\nNext, create a public method called `allowAllTypes()` to set\
    \ the value of `$typeCheckingOn` to `false`:\n\n```\npublic function allowAllTypes()\
    \ {\n    $this->typeCheckingOn = false;\n}\n```\n\n`$typeCheckingOn` is a class\
    \ property, so you need to access it using `$this->`.\n\nYou can now control type\
    \ checking by using the `$typeCheckingOn` property as a condition in the `checkFile()`\
    \ method. Amend the method definition like this:\n\n```\nprotected function checkFile($file)\
    \ {\n    $accept = true;\n    if ($file['error'] != 0) {\n        $this->getErrorMessage($file);\n\
    \        // stop checking if no file submitted\n        if ($file['error'] ==\
    \ 4) {\n            return false;\n        } else {\n            $accept = false;\n\
    \        }\n    }\n    if (!$this->checkSize($file)) {\n        $accept = false;\n\
    \    }\n    if ($this->typeCheckingOn) {\n        if (!$this->checkType($file))\
    \ {\n            $accept = false;\n        }\n    }\n    return $accept;\n}\n\
    ```\n\nThis simply nests the final conditional statement in `checkFile()` in another\
    \ condition. By default, `$typeCheckingOn` is `true`, so the MIME type will be\
    \ checked by `checkType()`. But if you call the `Upload` object’s `allowAllTypes()`\
    \ method before the `upload()` method, `$typeCheckingOn` will be `false`, and\
    \ any type of file can be uploaded. You’ll see how to do this shortly, but first\
    \ let’s create a public method to adjust the maximum size of a file that can be\
    \ uploaded.\n\nThe method for changing the maximum permitted size needs to check\
    \ that the submitted value is a number and assign it to the `$max` property. Add\
    \ the following method definition to the class file:\n\n```\npublic function setMaxSize($num)\
    \ {\n    if (is_numeric($num) && $num > 0) {\n        $this->max = (int) $num;\n\
    \    }\n}\n```\n\nThe conditional statement passes the submitted value to the\
    \ `is_numeric()` function, which checks that it’s a number. It also checks that\
    \ `$num` is greater than zero.\n\nIf both conditions are true, `$num` is assigned\
    \ to the `$max` property using what’s known as a casting operator, which forces\
    \ the value to be an integer (see “Explicitly changing a data type” at the end\
    \ of this PHP solution for a detailed explanation). The `is_numeric()` function\
    \ accepts any type of number, including a hexadecimal one or a string containing\
    \ a numeric value. This ensures that the value is converted to an integer.\n\n\
    **Caution**\n\nPHP also has a function called `is_int()` that checks for an integer.\
    \ However, the value cannot be anything else. For example, it rejects `'102400'`\
    \ even though it’s a numeric value because the quotes make it a string.\n\nSave\
    \ `Upload.php` and test `file_upload.php` again. It should continue to upload\
    \ images smaller than 50 KB, as before. Amend `file_upload.php` to change the\
    \ maximum permitted size to 3000 bytes, like this (the code is just before the\
    \ conditional statement that processes the upload):\n\n```\n$max = 3000;\n```\n\
    \nYou also need to invoke the `setMaxSize()` method on the `$loader` object in\
    \ the `try` block, like this:\n\n```\n$loader = new Upload($destination);\n$loader->setMaxSize($max);\n\
    $loader->upload();\n$result = $loader->getMessages();\n```\n\nBy changing the\
    \ value of `$max` and passing it as the argument to `setMaxSize()`, you affect\
    \ both `MAX_FILE_SIZE` in the form’s hidden field and the maximum value stored\
    \ inside the class.\n\n**Caution**\n\nThe call to `setMaxSize()` must come before\
    \ you use the `upload()` method. There’s no point changing the maximum size in\
    \ the class after the file has already been saved."
  raw: '### Changing protected properties


    The `$permitted` property allows only images to be uploaded, and the `$max` property
    limits files to no more than 50 KB, but these limits might be too restrictive.
    Instead of diving into the class definition file every time you have different
    requirements, you can create public methods that allow you to make changes to
    protected properties on the fly.


    A problem with using the MIME type to filter permitted types of files is that
    there are hundreds of different MIME types. What’s more, the value reported in
    the `$_FILES` array is dependent on the browser. MIME types work well for images,
    but the values reported for other types of files are often inconsistent. For example,
    Firefox reports the MIME type of Microsoft Word documents as `application/vnd.ms-word.document.12`,
    whereas Internet Explorer and Chrome use `application/vnd.openxmlformats-officedocument.wordprocessingml.document`.


    To make the `Upload` class more flexible, we’ll create a public method to turn
    off MIME-type checking. This will permit any type of file to be uploaded. Removing
    all restrictions on the type of upload is risky, so we’ll need a strategy later
    to neutralize potentially dangerous files. We’ll also create a public method to
    change the maximum permitted size of file.


    #### PHP Solution 6-4: Allowing different types and sizes to be uploaded


    This PHP solution shows you how to allow all types of files to be uploaded by
    skipping the MIME-types check. You’ll also add a public method to change the maximum
    permitted size.


    Continue working with `Upload.php` from the previous PHP solution. Alternatively,
    use `Upload_02.php` in the `ch06/PhpSolutions/File` folder.


    To control whether the MIME type should be checked, create a protected property
    called `$typeCheckingOn` and set its value to `true`. Add the following line of
    code to the list of properties at the top of the class definition in `Upload.php`:


    `protected $typeCheckingOn = true;`


    Next, create a public method called `allowAllTypes()` to set the value of `$typeCheckingOn`
    to `false`:


    `public function allowAllTypes() {`


    `$this->typeCheckingOn = false;`


    `}`


    `$typeCheckingOn` is a class property, so you need to access it using `$this->`.


    You can now control type checking by using the `$typeCheckingOn` property as a
    condition in the `checkFile()` method. Amend the method definition like this:


    `protected function checkFile($file) {`


    `$accept = true;`


    `if ($file[''error''] != 0) {`


    `$this->getErrorMessage($file);`


    `// stop checking if no file submitted`


    `if ($file[''error''] == 4) {`


    `return false;`


    `} else {`


    `$accept = false;`


    `}`


    `}`


    `if (!$this->checkSize($file)) {`


    `$accept = false;`


    `}`


    `if ($this->typeCheckingOn) {`


    `if (!$this->checkType($file)) {`


    `$accept = false;`


    `}`


    `}`


    `return $accept;`


    `}`


    This simply nests the final conditional statement in `checkFile()` in another
    condition. By default, `$typeCheckingOn` is `true`, so the MIME type will be checked
    by `checkType()`. But if you call the `Upload` object’s `allowAllTypes()` method
    before the `upload()` method, `$typeCheckingOn` will be `false`, and any type
    of file can be uploaded. You’ll see how to do this shortly, but first let’s create
    a public method to adjust the maximum size of a file that can be uploaded.


    The method for changing the maximum permitted size needs to check that the submitted
    value is a number and assign it to the `$max` property. Add the following method
    definition to the class file:


    `public function setMaxSize($num) {`


    `if (is_numeric($num) && $num > 0) {`


    `$this->max = (int) $num;`


    `}`


    `}`


    The conditional statement passes the submitted value to the `is_numeric()` function,
    which checks that it’s a number. It also checks that `$num` is greater than zero.


    If both conditions are true, `$num` is assigned to the `$max` property using what’s
    known as a casting operator, which forces the value to be an integer (see “Explicitly
    changing a data type” at the end of this PHP solution for a detailed explanation).
    The `is_numeric()` function accepts any type of number, including a hexadecimal
    one or a string containing a numeric value. This ensures that the value is converted
    to an integer.


    Caution


    PHP also has a function called `is_int()` that checks for an integer. However,
    the value cannot be anything else. For example, it rejects `''102400''` even though
    it’s a numeric value because the quotes make it a string.


    Save `Upload.php` and test `file_upload.php` again. It should continue to upload
    images smaller than 50 KB, as before.   Amend `file_upload.php` to change the
    maximum permitted size to 3000 bytes, like this (the code is just before the conditional
    statement that processes the upload):


    `$max =` `3000` `;`


    You also need to invoke the `setMaxSize()` method on the `$loader` object in the
    `try` block, like this:


    `$loader = new Upload($destination);`


    `$loader->setMaxSize($max);`


    `$loader->upload();`


    `$result = $loader->getMessages();`


    By changing the value of `$max` and passing it as the argument to `setMaxSize()`,
    you affect both `MAX_FILE_SIZE` in the form’s hidden field and the maximum value
    stored inside the class.


    Caution


    The call to `setMaxSize()` must come before you use the `upload()` method. There’s
    no point changing the maximum size in the class after the file has already been
    saved.'
  trans: "\n### 修改受保护的属性\n\n`$permitted` 属性仅允许上传图片，而 `$max` 属性将文件大小限制为不超过 50 KB，但这些限制可能过于严格。无需每次需求不同时都深入类定义文件进行修改，你可以创建公共方法，从而能够动态地修改受保护属性。\n\
    \n使用 MIME 类型来筛选允许的文件类型存在一个问题：MIME 类型有成百上千种。此外，`$_FILES` 数组中报告的值依赖于浏览器。MIME 类型对图片文件效果良好，但其他类型文件报告的值往往不一致。例如，Firefox\
    \ 将 Microsoft Word 文档的 MIME 类型报告为 `application/vnd.ms-word.document.12`，而 Internet\
    \ Explorer 和 Chrome 则使用 `application/vnd.openxmlformats-officedocument.wordprocessingml.document`。\n\
    \n为了让 `Upload` 类更加灵活，我们将创建一个公共方法来关闭 MIME 类型检查。这将允许上传任何类型的文件。取消上传类型的所有限制是有风险的，因此我们稍后需要制定一个策略来消除潜在的危险文件。我们还将创建一个公共方法来更改允许的最大文件大小。\n\
    \n#### PHP 解决方案 6-4：允许上传不同类型和大小的文件\n\n该 PHP 解决方案展示了如何通过跳过 MIME 类型检查来允许上传所有类型的文件。你还需要添加一个公共方法来更改允许的最大文件大小。\n\
    \n继续使用上一个 PHP 解决方案中的 `Upload.php` 文件。或者，使用 `ch06/PhpSolutions/File` 文件夹中的 `Upload_02.php`\
    \ 文件。\n\n为了控制是否应检查 MIME 类型，创建一个名为 `$typeCheckingOn` 的受保护属性并将其值设置为 `true`。在 `Upload.php`\
    \ 的类定义顶部，向属性列表添加以下代码行：\n\n```\nprotected $typeCheckingOn = true;\n```\n\n接下来，创建一个名为\
    \ `allowAllTypes()` 的公共方法，将 `$typeCheckingOn` 的值设置为 `false`：\n\n```\npublic function\
    \ allowAllTypes() {\n    $this->typeCheckingOn = false;\n}\n```\n\n`$typeCheckingOn`\
    \ 是一个类属性，因此你需要使用 `$this->` 来访问它。\n\n现在，你可以通过在 `checkFile()` 方法中使用 `$typeCheckingOn`\
    \ 属性作为条件来控制类型检查。修改方法定义如下：\n\n```\nprotected function checkFile($file) {\n    $accept\
    \ = true;\n    if ($file['error'] != 0) {\n        $this->getErrorMessage($file);\n\
    \        // 如果未提交文件则停止检查\n        if ($file['error'] == 4) {\n            return\
    \ false;\n        } else {\n            $accept = false;\n        }\n    }\n \
    \   if (!$this->checkSize($file)) {\n        $accept = false;\n    }\n    if ($this->typeCheckingOn)\
    \ {\n        if (!$this->checkType($file)) {\n            $accept = false;\n \
    \       }\n    }\n    return $accept;\n}\n```\n\n这仅是将 `checkFile()` 中的最后一个条件语句嵌套在另一个条件中。默认情况下，`$typeCheckingOn`\
    \ 为 `true`，因此 `checkType()` 将检查 MIME 类型。但是，如果你在 `upload()` 方法之前调用 `Upload` 对象的\
    \ `allowAllTypes()` 方法，`$typeCheckingOn` 将变为 `false`，从而允许上传任何类型的文件。你很快将看到如何操作，但首先让我们创建一个公共方法来调整可上传文件的最大大小。\n\
    \n更改允许的最大大小的方法需要检查提交的值是否为数字，并将其赋值给 `$max` 属性。在类文件中添加以下方法定义：\n\n```\npublic function\
    \ setMaxSize($num) {\n    if (is_numeric($num) && $num > 0) {\n        $this->max\
    \ = (int) $num;\n    }\n}\n```\n\n该条件语句将提交的值传递给 `is_numeric()` 函数，该函数会检查其是否为数字。同时，它还检查\
    \ `$num` 是否大于零。\n\n如果两个条件都成立，则使用所谓的强制类型转换运算符将 `$num` 赋值给 `$max` 属性，该运算符会强制将值转换为整数（有关详细说明，请参阅本\
    \ PHP 解决方案末尾的“显式更改数据类型”）。`is_numeric()` 函数接受任何类型的数字，包括十六进制数或包含数值的字符串。这确保了该值被转换为整数。\n\
    \n**注意**\n\nPHP 还有一个名为 `is_int()` 的函数，用于检查整数类型。但是，该值不能是其他任何类型。例如，它会拒绝 `'102400'`，即使它是一个数值，因为引号使其成为字符串。\n\
    \n保存 `Upload.php` 并再次测试 `file_upload.php`。它应该像之前一样继续上传小于 50 KB 的图片。修改 `file_upload.php`，将允许的最大大小更改为\
    \ 3000 字节，如下所示（代码位于处理上传的条件语句之前）：\n\n```\n$max = 3000;\n```\n\n你还需要在 `try` 块中调用\
    \ `$loader` 对象的 `setMaxSize()` 方法，如下所示：\n\n```\n$loader = new Upload($destination);\n\
    $loader->setMaxSize($max);\n$loader->upload();\n$result = $loader->getMessages();\n\
    ```\n\n通过更改 `$max` 的值并将其作为参数传递给 `setMaxSize()`，你可以同时影响表单隐藏字段中的 `MAX_FILE_SIZE`\
    \ 和类内部存储的最大值。\n\n**注意**\n\n对 `setMaxSize()` 的调用必须在你使用 `upload()` 方法之前进行。在文件已经保存后更改类中的最大大小是没有意义的。\n"
- fmt: "保存`file_upload_php`并再次测试。选择一个之前未使用过的图片，或删除`upload_test`文件夹的内容。第一次尝试时，你可能只会看到一条文件过大的消息。检查`upload_test`文件夹以确认文件没有被传输。\n\
    \n再试一次。这次，你应该会看到类似图[6-6](#A978-1-4842-0635-5_6_Chapter.html#Fig6)的结果。\n\n![A978-1-4842-0635-5_6_Fig6_HTML.jpg](A978-1-4842-0635-5_6_Fig6_HTML.jpg)\n\
    \n图 6-6.\n\n大小限制生效了，但检查 MIME 类型时出现错误\n\n这是怎么回事？第一次可能没有看到关于允许文件类型的消息，原因是隐藏字段中`MAX_FILE_SIZE`的值直到你在浏览器中重新加载表单时才会刷新。第二次出现错误消息是因为更新后的`MAX_FILE_SIZE`值阻止了文件上传。因此，`$_FILES`数组的`type`元素为空。你需要调整`checkType()`方法来解决这个问题。\n\
    \n在`Upload.php`中，修改`checkType()`的定义如下：\n\n```\nprotected function checkType($file)\
    \ {\n\n    if (in_array($file['type'], $this->permitted)) {\n\n        return\
    \ true;\n\n    } else {\n\n        if (!empty($file['type'])) {\n\n          \
    \  $this->messages[] = $file['name'] . ' is not permitted \n\ntype of file.';\n\
    \n        }\n\n        return false;\n\n    }\n\n}\n```\n\n如果文件大小超过了表单隐藏字段中`MAX_FILE_SIZE`指定的限制，则不会上传任何内容，因此`$_FILES`数组的`type`元素为空。高亮显示的代码添加了一个新条件，仅在`$file['type']`不为空时才创建错误消息。\n\
    \n注意\n\n这样做的缺点是不会在文件类型不可接受时警告用户。然而，这比仅仅因为文件太大而显示关于允许类型的虚假警告更可取。\n\n保存类定义并再次测试`file_upload.php`。这次你应该只看到文件过大的消息。将`file_upload.php`顶部的`$max`值重置为`51200`。现在你应该能够上传图片了。如果第一次失败，那是因为`MAX_FILE_SIZE`还没有在表单中刷新。通过以下方式在`Upload`对象上调用`allowAllTypes()`方法来测试它（新代码行必须在调用`upload()`方法之前）：\n\
    \n```\n$loader = new Upload($destination);\n$loader->setMaxSize($max);\n$loader->allowAllTypes();\n\
    $loader->upload();\n$result = $loader->getMessages();\n```\n\n尝试上传任何类型的文件。只要它小于\
    \ 50 KB，就应该会成功上传。如有必要，将`$max`的值更改为一个足够大的数字。\n\n提示\n\n使用计算来设置`$max`的值。例如：`$max\
    \ = 600 * 1024; // 600 KB`。\n\n你可以对照`ch06/PhpSolutions/File`文件夹中的`Upload_03.php`来检查你的类定义。`ch06`文件夹中的`file_upload_06.php`包含了上传表单的更新版本。\n\
    \n到现在，我希望你已经理解了 PHP 类是如何由专门执行单一任务的函数（方法）构建的。修复关于图片不是允许类型的错误消息正因为该消息只能来自`checkType()`方法而变得简单。方法定义中使用的大部分代码都依赖于内置的\
    \ PHP 函数。一旦你学会了哪些函数最适合手头的任务，构建一个类——或任何其他 PHP 脚本——就变得容易多了。\n\n### 显式更改数据类型\n\n\
    大多数时候，你不需要担心变量或值的数据类型。严格来说，通过表单提交的所有值都是字符串，但 PHP 会静默地将数字转换为适当的数据类型。这种自动的类型转换非常方便。但有时，你需要确保一个值是特定的数据类型。在这种情况下，你可以通过在值前面加上括号括起来的数据类型名称来将其强制转换（或更改）为所需的类型。你在\
    \ PHP Solution 6-4 中看到了这样一个例子，它将一个数值强制转换为整数，如下所示：\n\n```\n$this->max = (int) $num;\n\
    ```\n\n如果该值已经是目标类型，则保持不变。表[6-4](#A978-1-4842-0635-5_6_Chapter.html#Tab3)列出了 PHP\
    \ 中使用的强制转换运算符。\n\n表 6-4.\n\nPHP 强制转换运算符\n\n| 运算符 | 替代写法 | 转换为 |\n| :--- | :---\
    \ | :--- |\n| `(array)` |  | 数组 |\n| `(bool)` | `(boolean)` | 布尔值（`true` 或 `false`）\
    \ |\n| `(float)` | `(double)`， `(real)` | 浮点数 |\n| `(int)` | `(integer)` | 整数\
    \ |\n| `(object)` |  | 对象 |\n| `(string)` |  | 字符串 |\n| `(unset)` |  | Null |\n\
    \n要了解更多关于特定类型之间强制转换时的行为，请参阅在线文档：[`http://php.net/manual/en/language.types.type-juggling.php`](http://php.net/manual/en/language.types.type-juggling.php)\n\
    \n### 使潜在危险的文件无害化\n\nPHP Solution 6-4 中添加的`allowAllTypes()`方法使`Upload`类更灵活，但这也让你的服务器面临有人上传可执行文件并尝试运行它的风险。为了减轻这些风险，你可以自动为某些类型的文件名添加后缀。如果有人将`dosomedamage.php`上传到你的站点，你可以通过将名称更改为`dosomedamage.php.upload`来使其无害。"
  raw: 'Save `file_upload_php` and test it again. Select an image you haven’t used
    before, or delete the contents of the `upload_test` folder. The first time you
    try it, you might see only a message that the file is too big. Check the `upload_test`
    folder to confirm that it hasn’t been transferred.


    Try it again. This time, you should see a result similar to Figure [6-6](#A978-1-4842-0635-5_6_Chapter.html#Fig6).


    ![A978-1-4842-0635-5_6_Fig6_HTML.jpg](A978-1-4842-0635-5_6_Fig6_HTML.jpg)


    Figure 6-6.


    The size restriction is working, but there’s an error in checking the MIME type


    What’s going on? The reason you probably didn’t see the message about the permitted
    type of file the first time is because the value of `MAX_FILE_SIZE` in the hidden
    field isn’t refreshed until you reload the form in the browser. The error message
    appears the second time because the updated value of `MAX_FILE_SIZE` prevents
    the file from being uploaded. As a result, the `type` element of the `$_FILES`
    array is empty. You need to tweak the `checkType()` method to fix this problem.


    In `Upload.php`, amend the `checkType()` definition like this:


    `protected function checkType($file) {`


    `if (in_array($file[''type''], $this->permitted)) {`


    `return true;`


    `} else {`


    `if (!empty($file[''type''])) {`


    `$this->messages[] = $file[''name''] . '' is not permitted`


    `type of file.'';`


    `}`


    `return false;`


    `}`


    `}`


    If a file is bigger than the limit specified by `MAX_FILE_SIZE` in the form’s
    hidden field, nothing is uploaded, so the `type` element of the `$_FILES` array
    is empty. The code highlighted in bold adds a new condition that creates an error
    message only if `$file[''type'']` is not empty.


    Note


    This has the disadvantage that it doesn’t warn the user if the file type isn’t
    acceptable. However, it’s preferable to displaying a false warning about permitted
    types simply because the file is too big.


    Save the class definition and test `file_upload.php` again. This time you should
    see only the message about the file being too big.   Reset the value of `$max`
    at the top of `file_upload.php` to `51200`. You should now be able to upload the
    image. If it fails the first time, it’s because `MAX_FILE_SIZE` hasn’t been refreshed
    in the form.   Test the `allowAllTypes()` method by calling it on the `Upload`
    object like this (the new line of code must go before you call the `upload()`
    method):


    `$loader = new Upload($destination);`


    `$loader->setMaxSize($max);`


    `$loader->allowAllTypes();`


    `$loader->upload();`


    `$result = $loader->getMessages();`


    Try uploading any type of file. As long as it’s smaller than 50 KB, it should
    be uploaded. Change the value of `$max` to a suitably large number, if necessary.


    Tip


    Use a calculation to set the value of `$max`. For example, `$max = 600 * 1024;
    // 600 KB`.


    You can check your class definition against `Upload_03.php` in the `ch06/PhpSolutions/File`
    folder. There’s an updated version of the upload form in `file_upload_06.php`
    in the `ch06` folder.


    By now I hope you’re getting the idea of how a PHP class is built from functions
    (methods) dedicated to doing a single job. Fixing the incorrect error message
    about the image not being a permitted type was made easier by the fact that the
    message could only have come from the `checkType()` method. Most of the code used
    in the method definitions relies on built-in PHP functions. Once you learn which
    functions are best suited to the task in hand, building a class—or any other PHP
    script—becomes much easier.


    ### Explicitly changing a data type


    Most of the time you don’t need to worry about the data type of a variable or
    value. Strictly speaking, all values submitted through a form are strings, but
    PHP silently converts numbers to the appropriate data type. This automatic type
    juggling, as it’s called, is very convenient. There are times, though, when you
    want to make sure a value is a specific data type. In such cases, you can cast
    (or change) a value to the desired type by preceding it with the name of the data
    type in parentheses. You saw an example of this in PHP Solution 6-4, which casts
    a numeric value to an integer, like this:


    `$this->max =` `(int)` `$num;`


    If the value is already of the desired type, it remains unchanged. Table [6-4](#A978-1-4842-0635-5_6_Chapter.html#Tab3)
    lists the casting operators used in PHP.


    Table 6-4.


    PHP casting operators


    | Operator | Alternatives | Converts to |

    | --- | --- | --- |

    | `(array)` |   | Array |

    | `(bool)` | `(boolean)` | Boolean (`true` or `false`) |

    | `(float)` | `(double)`, `(real)` | Floating-point number |

    | `(int)` | `(integer)` | Integer |

    | `(object)` |   | Object |

    | `(string)` |   | String |

    | `(unset)` |   | Null |


    To learn more about what happens when casting between certain types, see the online
    documentation at [`http://php.net/manual/en/language.types.type-juggling.php`](http://php.net/manual/en/language.types.type-juggling.php)
    .


    ### Neutralizing potentially dangerous files


    The `allowAllTypes()` method added in PHP Solution 6-4 makes the `Upload` class
    more flexible, but it exposes your server to the danger of someone uploading an
    executable file and then trying to run it. To mitigate these risks, you can automatically
    append a suffix to the filename of certain types of files. If someone uploads
    `dosomedamage.php` to your site, you can render it harmless by changing the name
    to `dosomedamage.php.upload`.'
  trans: "\n保存`file_upload_php`并再次测试。选择一个之前未使用过的图片，或删除`upload_test`文件夹的内容。第一次尝试时，你可能只会看到一条文件过大的消息。检查`upload_test`文件夹以确认文件没有被传输。\n\
    \n再试一次。这次，你应该会看到类似图 6-6 的结果。\n\n![A978-1-4842-0635-5_6_Fig6_HTML.jpg](img/A978-1-4842-0635-5_6_Fig6_HTML.jpg)\n\
    \n图 6-6.\n\n大小限制生效了，但检查 MIME 类型时出现错误\n\n这是怎么回事？第一次可能没有看到关于允许文件类型的消息，原因是隐藏字段中`MAX_FILE_SIZE`的值直到你在浏览器中重新加载表单时才会刷新。第二次出现错误消息是因为更新后的`MAX_FILE_SIZE`值阻止了文件上传。因此，`$_FILES`数组的`type`元素为空。你需要调整`checkType()`方法来解决这个问题。\n\
    \n在`Upload.php`中，修改`checkType()`的定义如下：\n\n```\nprotected function checkType($file)\
    \ {\n\n    if (in_array($file['type'], $this->permitted)) {\n\n        return\
    \ true;\n\n    } else {\n\n        if (!empty($file['type'])) {\n\n          \
    \  $this->messages[] = $file['name'] . ' is not permitted \n\ntype of file.';\n\
    \n        }\n\n        return false;\n\n    }\n\n}\n```\n\n如果文件大小超过了表单隐藏字段中`MAX_FILE_SIZE`指定的限制，则不会上传任何内容，因此`$_FILES`数组的`type`元素为空。高亮显示的代码添加了一个新条件，仅在`$file['type']`不为空时才创建错误消息。\n\
    \n注意\n\n这样做的缺点是不会在文件类型不可接受时警告用户。然而，这比仅仅因为文件太大而显示关于允许类型的虚假警告更可取。\n\n保存类定义并再次测试`file_upload.php`。这次你应该只看到文件过大的消息。将`file_upload.php`顶部的`$max`值重置为`51200`。现在你应该能够上传图片了。如果第一次失败，那是因为`MAX_FILE_SIZE`还没有在表单中刷新。通过以下方式在`Upload`对象上调用`allowAllTypes()`方法来测试它（新代码行必须在调用`upload()`方法之前）：\n\
    \n```\n$loader = new Upload($destination);\n$loader->setMaxSize($max);\n$loader->allowAllTypes();\n\
    $loader->upload();\n$result = $loader->getMessages();\n```\n\n尝试上传任何类型的文件。只要它小于\
    \ 50 KB，就应该会成功上传。如有必要，将`$max`的值更改为一个足够大的数字。\n\n提示\n\n使用计算来设置`$max`的值。例如：`$max\
    \ = 600 * 1024; // 600 KB`。\n\n你可以对照`ch06/PhpSolutions/File`文件夹中的`Upload_03.php`来检查你的类定义。`ch06`文件夹中的`file_upload_06.php`包含了上传表单的更新版本。\n\
    \n到现在，我希望你已经理解了 PHP 类是如何由专门执行单一任务的函数（方法）构建的。修复关于图片不是允许类型的错误消息正因为该消息只能来自`checkType()`方法而变得简单。方法定义中使用的大部分代码都依赖于内置的\
    \ PHP 函数。一旦你学会了哪些函数最适合手头的任务，构建一个类——或任何其他 PHP 脚本——就变得容易多了。\n\n### 显式更改数据类型\n\n\
    大多数时候，你不需要担心变量或值的数据类型。严格来说，通过表单提交的所有值都是字符串，但 PHP 会静默地将数字转换为适当的数据类型。这种自动的类型转换非常方便。但有时，你需要确保一个值是特定的数据类型。在这种情况下，你可以通过在值前面加上括号括起来的数据类型名称来将其强制转换（或更改）为所需的类型。你在\
    \ PHP Solution 6-4 中看到了这样一个例子，它将一个数值强制转换为整数，如下所示：\n\n```\n$this->max = (int) $num;\n\
    ```\n\n如果该值已经是目标类型，则保持不变。表 6-4 列出了 PHP 中使用的强制转换运算符。\n\n表 6-4.\n\nPHP 强制转换运算符\n\
    \n| 运算符 | 替代写法 | 转换为 |\n| :--- | :--- | :--- |\n| `(array)` |  | 数组 |\n| `(bool)`\
    \ | `(boolean)` | 布尔值（`true` 或 `false`） |\n| `(float)` | `(double)`， `(real)`\
    \ | 浮点数 |\n| `(int)` | `(integer)` | 整数 |\n| `(object)` |  | 对象 |\n| `(string)`\
    \ |  | 字符串 |\n| `(unset)` |  | Null |\n\n要了解更多关于特定类型之间强制转换时的行为，请参阅在线文档：[`http://php.net/manual/en/language.types.type-juggling.php`](http://php.net/manual/en/language.types.type-juggling.php)\n\
    \n### 使潜在危险的文件无害化\n\nPHP Solution 6-4 中添加的`allowAllTypes()`方法使`Upload`类更灵活，但这也让你的服务器面临有人上传可执行文件并尝试运行它的风险。为了减轻这些风险，你可以自动为某些类型的文件名添加后缀。如果有人将`dosomedamage.php`上传到你的站点，你可以通过将名称更改为`dosomedamage.php.upload`来使其无害。\n"
- fmt: "#### PHP Solution 6-5: Checking and Amending Filenames\n\nThis PHP solution\
    \ demonstrates how to neutralize potentially dangerous files by optionally appending\
    \ `.upload` to the filename of files that don’t have a filename extension or that\
    \ have an extension that’s not trusted. It also checks filenames to replace spaces\
    \ with underscores.\n\nContinue working with `Upload.php` from the previous PHP\
    \ solution. Alternatively, use `Upload_03.php` in the `ch06/PhpSolutions/File`\
    \ folder.\n\nAdd the following three new protected properties to the existing\
    \ ones at the top of the class definition in `Upload.php`:\n\n```\nprotected $notTrusted\
    \ = ['bin', 'cgi', 'exe', 'js', 'pl', 'php', 'py', 'sh'];\nprotected $suffix =\
    \ '.upload';\nprotected $newName;\n```\n\nThe first property defines an array\
    \ of filename extensions that are potentially unsafe. The second one sets the\
    \ default suffix that will be appended to the filename of risky files. The third\
    \ one will be used to store the file’s new name if it is changed.\n\n> **Note**:\
    \ The filename extensions in the `$notTrusted` array don’t have a preceding dot.\
    \ This is because the built-in PHP function that detects the filename extension\
    \ strips off the leading dot.\n\nBy default, the class will append the `.upload`\
    \ suffix to files with extensions in the not trusted list. But you don’t want\
    \ that to happen if only registered (and trusted) users can upload files. To make\
    \ the suffix optional, amend the definition of the `allowAllTypes()` method, like\
    \ this:\n\n```\npublic function allowAllTypes($suffix = true) {\n    $this->typeCheckingOn\
    \ = false;\n    if (!$suffix) {\n        $this->suffix = '';  // empty string\n\
    \    }\n}\n```\n\nThis adds `$suffix` as an argument to the `allowAllTypes()`\
    \ method and sets its value to `true`. Assigning a value to an argument in a function\
    \ (method) definition makes it optional.\n\nThe conditional statement that has\
    \ been added to the method definition uses the negation operator (`!`). So, if\
    \ the argument passed to `allowAllTypes()` is `false`, the value of the class’s\
    \ `$suffix` property is set to an empty string (a pair of quotes with nothing\
    \ in between). In effect, this turns off appending a suffix to the filename. Instead\
    \ of adding `.upload`, it adds nothing.\n\nWe need to add another check to the\
    \ series of tests a file undergoes before it’s uploaded. Amend the `checkFile()`\
    \ method like this (part of the existing code has been omitted to save space):\n\
    \n```\nprotected function checkFile($file) {\n    $accept = true;\n    // error\
    \ and size checking code omitted\n    if ($this->typeCheckingOn) {\n        if\
    \ (!$this->checkType($file)) {\n            $accept = false;\n        }\n    }\n\
    \    if ($accept) {\n        $this->checkName($file);\n    }\n    return $accept;\n\
    }\n```\n\nYou don’t need to check the filename if the file has failed any of the\
    \ previous tests, so the code highlighted in bold uses a conditional statement\
    \ to call a new method `checkName()` only if `$accept` is `true`.\n\nDefine `checkName()`\
    \ as a protected method. The first part of the code looks like this:\n\n```\n\
    protected function checkName($file) {\n    $this->newName = null;\n    $nospaces\
    \ = str_replace(' ', '_', $file['name']);\n    if ($nospaces != $file['name'])\
    \ {\n        $this->newName = $nospaces;\n    }\n}\n```\n\nThe method begins by\
    \ setting the `$newName` property to `null` (in other words, no value). The class\
    \ will eventually be capable of handling multiple file uploads. Consequently,\
    \ the property needs to be reset each time.\n\nThen, the `str_replace()` function\
    \ replaces spaces in the filename with underscores and assigns the result to `$nospaces`.\
    \ The `str_replace()` function was described in PHP Solution 4-4.\n\nThe value\
    \ of `$nospaces` is compared with `$file['name']`. If they’re not the same, `$nospaces`\
    \ is assigned as the value of the `$newName` property.\n\nThat deals with spaces\
    \ in filenames. Next, you need to add the suffix to the names of potentially unsafe\
    \ files.\n\nTo determine if a file is potentially unsafe, you need to extract\
    \ the filename extension. You can do that with the `pathinfo()` function. Add\
    \ the following line of code to the `checkName()` method just before the closing\
    \ curly brace:"
  raw: '#### PHP Solution 6-5: Checking and amending filenames


    This PHP solution demonstrates how to neutralize potentially dangerous files by
    optionally appending `.upload` to the filename of files that don’t have a filename
    extension or that have an extension that’s not trusted. It also checks filenames
    to replace spaces with underscores.


    Continue working with `Upload.php` from the previous PHP solution. Alternatively,
    use `Upload_03.php` in the `ch06/PhpSolutions/File` folder.


    Add the following three new protected properties to the existing ones at the top
    of the class definition in `Upload.php`:


    `protected $notTrusted = [''bin'', ''cgi'', ''exe'', ''js'', ''pl'', ''php'',
    ''py'', ''sh''];`


    `protected $suffix = ''.upload'';`


    `protected $newName;`


    The first property defines an array of filename extensions that are potentially
    unsafe. The second one sets the default suffix that will be appended to the filename
    of risky files. The third one will be used to store the file’s new name if it
    is changed.


    Note


    The filename extensions in the `$notTrusted` array don’t have a preceding dot.
    This is because the built-in PHP function that detects the filename extension
    strips off the leading dot.


    By default, the class will append the `.upload` suffix to files with extensions
    in the not trusted list. But you don’t want that to happen if only registered
    (and trusted) users can upload files. To make the suffix optional, amend the definition
    of the `allowAllTypes()` method, like this:


    `public function allowAllTypes(` `$suffix = true` `) {`


    `$this->typeCheckingOn = false;`


    `if (!$suffix) {`


    `$this->suffix = '''';  // empty string`


    `}`


    `}`


    This adds `$suffix` as an argument to the `allowAllTypes()` method and sets its
    value to `true`. Assigning a value to an argument in a function (method) definition
    makes it optional.


    The conditional statement that has been added to the method definition uses the
    negation operator (`!`). So, if the argument passed to `allowAllTypes()` is `false`,
    the value of the class’s `$suffix` property is set to an empty string (a pair
    of quotes with nothing in between). In effect, this turns off appending a suffix
    to the filename. Instead of adding `.upload`, it adds nothing.


    We need to add another check to the series of tests a file undergoes before it’s
    uploaded. Amend the `checkFile()` method like this (part of the existing code
    has been omitted to save space):


    `protected function checkFile($file) {`


    `$accept = true;`


    `// error and size checking code omitted`


    `if ($this->typeCheckingOn) {`


    `if (!$this->checkType($file)) {`


    `$accept = false;`


    `}`


    `}`


    `if ($accept) {`


    `$this->checkName($file);`


    `}`


    `return $accept;`


    `}`


    You don’t need to check the filename if the file has failed any of the previous
    tests, so the code highlighted in bold uses a conditional statement to call a
    new method `checkName()` only if `$accept` is `true`.


    Define `checkName()` as a protected method. The first part of the code looks like
    this:


    `protected function checkName($file) {`


    `$this->newName = null;`


    `$nospaces = str_replace('' '', ''_'', $file[''name'']);`


    `if ($nospaces != $file[''name'']) {`


    `$this->newName = $nospaces;`


    `}`


    `}`


    The method begins by setting the `$newName` property to `null` (in other words,
    no value). The class will eventually be capable of handling multiple file uploads.
    Consequently, the property needs to be reset each time.


    Then, the `str_replace()` function replaces spaces in the filename with underscores
    and assigns the result to `$nospaces`. The `str_replace()` function was described
    in PHP Solution 4-4.


    The value of `$nospaces` is compared with `$file[''name'']`. If they’re not the
    same, `$nospaces` is assigned as the value of the `$newName` property.


    That deals with spaces in filenames. Next, you need to add the suffix to the names
    of potentially unsafe files.


    To determine if a file is potentially unsafe, you need to extract the filename
    extension. You can do that with the `pathinfo()` function. Add the following line
    of code to the `checkName()` method just before the closing curly brace:'
  trans: "\n#### PHP 解决方案 6-5：检查并修正文件名\n\n本 PHP 解决方案演示了如何通过为没有文件扩展名或扩展名不受信任的文件名可选地附加\
    \ `.upload`，来消除潜在危险文件的安全隐患。同时，它还会检查文件名，将空格替换为下划线。\n\n继续使用上一个 PHP 解决方案中的 `Upload.php`\
    \ 文件进行操作。或者，也可以使用 `ch06/PhpSolutions/File` 文件夹中的 `Upload_03.php` 文件。\n\n在 `Upload.php`\
    \ 类的定义顶部，于现有属性之后添加以下三个新的受保护属性：\n\n```\nprotected $notTrusted = ['bin', 'cgi',\
    \ 'exe', 'js', 'pl', 'php', 'py', 'sh'];\nprotected $suffix = '.upload';\nprotected\
    \ $newName;\n```\n\n第一个属性定义了一个包含潜在不安全文件扩展名的数组。第二个属性设置了将附加到风险文件名的默认后缀。第三个属性用于在文件名被更改时存储新的文件名。\n\
    \n> **注意**：`$notTrusted` 数组中的文件扩展名前面没有点号。这是因为检测文件扩展名的 PHP 内置函数会去掉开头的点号。\n\n默认情况下，该类会将\
    \ `.upload` 后缀附加到扩展名位于不可信列表中的文件。但如果只有已注册（且受信任）的用户才能上传文件，你可能不希望发生这种情况。为了使后缀变为可选，请像这样修改\
    \ `allowAllTypes()` 方法的定义：\n\n```\npublic function allowAllTypes($suffix = true)\
    \ {\n    $this->typeCheckingOn = false;\n    if (!$suffix) {\n        $this->suffix\
    \ = '';  // 空字符串\n    }\n}\n```\n\n这为 `allowAllTypes()` 方法添加了 `$suffix` 参数，并将其默认值设置为\
    \ `true`。在函数（方法）定义中为参数赋值会使其变为可选参数。\n\n添加到方法定义中的条件语句使用了取反运算符（`!`）。因此，如果传递给 `allowAllTypes()`\
    \ 的参数是 `false`，则类的 `$suffix` 属性值会被设置为空字符串（一对中间没有任何内容的引号）。实际上，这关闭了为文件名附加后缀的功能。它不会添加\
    \ `.upload`，而是什么都不加。\n\n我们需要在文件上传前所经历的一系列检查中再添加一项检查。请像这样修改 `checkFile()` 方法（为节省篇幅，省略了部分现有代码）：\n\
    \n```\nprotected function checkFile($file) {\n    $accept = true;\n    // 省略了错误和大小检查代码\n\
    \    if ($this->typeCheckingOn) {\n        if (!$this->checkType($file)) {\n \
    \           $accept = false;\n        }\n    }\n    if ($accept) {\n        $this->checkName($file);\n\
    \    }\n    return $accept;\n}\n```\n\n如果文件未能通过之前的任何一项测试，则无需检查其文件名。因此，加粗显示的代码使用了条件语句，仅在\
    \ `$accept` 为 `true` 时才会调用新方法 `checkName()`。\n\n将 `checkName()` 定义为一个受保护的方法。其第一部分代码如下所示：\n\
    \n```\nprotected function checkName($file) {\n    $this->newName = null;\n   \
    \ $nospaces = str_replace(' ', '_', $file['name']);\n    if ($nospaces != $file['name'])\
    \ {\n        $this->newName = $nospaces;\n    }\n}\n```\n\n该方法开始时将 `$newName`\
    \ 属性设置为 `null`（换言之，没有值）。该类最终将能够处理多个文件的上传。因此，每次都需要重置该属性。\n\n然后，`str_replace()`\
    \ 函数将文件名中的空格替换为下划线，并将结果赋值给 `$nospaces`。`str_replace()` 函数在 PHP 解决方案 4-4 中已有描述。\n\
    \n将 `$nospaces` 的值与 `$file['name']` 进行比较。如果两者不相同，则将 `$nospaces` 赋值给 `$newName`\
    \ 属性。\n\n这样就处理了文件名中的空格问题。接下来，你需要为潜在不安全文件的名称添加后缀。\n\n要判断文件是否潜在不安全，你需要提取文件扩展名。你可以使用\
    \ `pathinfo()` 函数来实现。在 `checkName()` 方法的右花括号之前添加以下代码行：\n"
- fmt: '`$extension = pathinfo($nospaces, PATHINFO_EXTENSION);`


    The first argument to `pathinfo()` is the filename with the space removed. The
    second argument is a PHP constant that tells the function to return only the filename
    extension.


    **Caution**: PHP constants are case-sensitive. `PATHINFO_EXTENSION` must be all
    uppercase.


    You need to add the suffix only if the `$typeCheckingOn` property is `false` and
    the `$suffix` property is not an empty string. So, the code to add the suffix
    needs to be enclosed in a conditional statement that checks for both conditions.


    Then, a second conditional statement nested inside the first one needs to check
    if the filename extension is in the `$notTrusted` array. It’s also a good idea
    to add the suffix to files that don’t have an extension, as they’re frequently
    used as executable files on Linux servers. Add the following code to the `checkName()`
    method after the line you inserted in the previous step:


    ```

    if (!$this->typeCheckingOn && !empty($this->suffix)) {


    if (in_array($extension, $this->notTrusted) || empty($extension)) {


    $this->newName = $nospaces . $this->suffix;


    }


    }

    ```


    The code inside the nested conditional statement concatenates the suffix onto
    the version of the filename without spaces and assigns the result to the `$newName`
    property.


    If the name has been changed by removing spaces, adding a suffix, or both, the
    `moveFile()` method needs to use the amended name when saving the file to its
    destination. Update the beginning of the `moveFile()` method like this:


    ```

    protected function moveFile($file) {


    $filename = isset($this->newName) ? $this->newName : $file[''name''];


    $success = move_uploaded_file($file[''tmp_name''],


    $this->destination . $filename );


    if ($success) {

    ```


    The new first line uses the ternary operator (see “Using the ternary operator”
    in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)) to assign a value to `$filename`.
    The condition before the question mark checks if the `$newName` property has been
    set by the `checkName()` method. If it has, the new name is used. Otherwise, `$file[''name'']`,
    which contains the original value from the `$_FILES` array, is assigned to `$filename`.


    In the second line, `$filename` replaces the value concatenated to the `$destination`
    property. So, if the name has been changed, the new name is used to store the
    file. But if no change has been made, the original name is used.


    It’s a good idea to let the user know if the filename has been changed. Make the
    following change to the conditional statement in `moveFile()` that creates the
    message if the file has been successfully uploaded:


    ```

    if ($success) {


    $result = $file[''name''] . '' was uploaded successfully'';


    if (!is_null($this->newName)) {


    $result .= '', and was renamed '' . $this->newName;


    }


    $this->messages[] = $result;


    }

    ```


    If the `$newName` property is not `null`, you know the file has been renamed,
    and that information is added to the message stored in `$result` using the combined
    concatenation operator (`.=`).


    Save `Upload.php` and test uploading files that have spaces in their names and/or
    have filename extensions listed in the `$notTrusted` array. The spaces should
    be replaced by underscores, and a suffix should be added to potentially risky
    file types, as shown in Figure [6-7](#A978-1-4842-0635-5_6_Chapter.html#Fig7).


    ![A978-1-4842-0635-5_6_Fig7_HTML.jpg](A978-1-4842-0635-5_6_Fig7_HTML.jpg)


    Figure 6-7. The spaces have been replaced, and a suffix has been added to the
    filename


    In `file_upload.php`, pass `false` as an argument to `allowAllTypes()`, like this:


    `$loader->allowAllTypes(false);`


    Save `file_upload.php` and test the upload form again with a file that has an
    extension listed in the `$notTrusted` array. This time, only spaces will be replaced
    in the filename. The `.upload` suffix won’t be added (see Figure [6-8](#A978-1-4842-0635-5_6_Chapter.html#Fig8)).


    ![A978-1-4842-0635-5_6_Fig8_HTML.jpg](A978-1-4842-0635-5_6_Fig8_HTML.jpg)


    Figure 6-8. This time, the suffix hasn’t been appended to the filename


    You can check your code against `Upload_04.php` in the `ch06/PhpSolutions/File`
    folder.


    ## Preventing files from being overwritten


    As the script stands, PHP automatically overwrites existing files without warning.
    That may be exactly what you want. On the other hand, it may be your worst nightmare.
    The class needs to offer a choice of whether to overwrite an existing file or
    to give it a unique name.'
