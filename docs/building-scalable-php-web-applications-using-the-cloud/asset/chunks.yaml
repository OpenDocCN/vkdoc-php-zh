    *Cloud computing is really a no-brainer for any startup because it allows you
    to test your business plan very quickly for little money. Every startup, or even
    a division within a company that has an idea for something new, should be figuring
    out how to use cloud computing in its plan.*


    *—Brad Jefferson, CEO of Animoto*


    Acknowledgments


    This book was written based on a number of experiences moving clients from traditional
    hosting environments to cloud-based hosting environments. The material here started
    as some notes that I put together for other people on my team and eventually blossomed
    as the book that you see here.


    I would like to thank my clients for giving me the opportunity to work with them
    on exciting projects and for allowing me to explore and learn new systems on their
    behalf. I would also like to thank my employer, New Medio (now part of ITX), for
    always having great clients to work with and always putting up with all of my
    little side projects. A number of companies look down upon employees doing side
    projects. They have always been encouraging to me in my endeavors, whether it
    is teaching science to homeschool co-ops, going to seminary to study theology,
    organizing seminars on obscure subjects, or my steady stream of books. Thanks
    especially to Adam Nemec for making all of these things possible. I doubt I could
    do them from anywhere else.


    Next, I want to thank my early test readers, Tavo Soto, Charles McNamara, Garret
    Wilson, and Cara Waken, for taking the time to read through the book and test
    out the different examples to make sure they functioned properly. I also want
    to thank David Roesch and Alex Fornuto for their help with many technical details
    in early drafts of this book. Finally, I want to thank the editorial staff at
    Apress for their great work helping me to make this book perfect. It is a much
    stronger book because of your help.


    ### About the Author


    # 1. Introduction


    “The cloud” is the new technology buzzword. It seems like everyone is talking
    about “moving to the cloud,” but few people really know what that means, least
    of all how to take advantage of it. With every technology shift, there are people
    who think that the new technology will solve all of their problems, without even
    taking inventory of what those problems are. Many technologies make promises,
    and some of those are even true, but for them to come true, you have to use the
    technology in the right way.


    This book is primarily for developers who want to start moving their apps to the
    cloud, and want to know how to get started and different options available to
    them. Secondarily, this book is for managers who want to be conversant in cloud
    technology and ideas, in order to better understand the options available and
    how different development decisions will affect them. This book has a focus on
    PHP, but, even if PHP is not your intended deployment language, this book will
    tell you what you need to know to architect a cloud application in any language
    or platform.


    This book will talk about several different cloud options, but will focus on developing
    for Linode and similar clouds, the reasons for which we will see in Chapter [2](#487291_1_En_2_Chapter.xhtml).


    Please note that this book makes many comparisons between specific infrastructure
    vendors. I do not represent any particular company, nor do I warrant that these
    comparisons are foolproof or permanent. They are, however, the results of my experience
    and my knowledge at the time of writing, and I have attempted to do all due diligence
    to provide factual information as best I can. Nonetheless, while the general considerations
    discussed in this book are unlikely to change, the specific vendors, products,
    and how they measure up *are* likely to change over time.


    Additionally, while the general outlines of the tasks for setup, programming,
    and configuration are likely to remain the same for a long period of time, the
    specific steps and screenshots may differ from this book as products and platforms
    change. Nevertheless, the steps presented here should remain a reliable guide
    for what types of things you should expect from different cloud vendors.'
