    a list of methods in the `dog_data` class. The last method in the class is `processRecords`.
    The name of this method is pulled and placed into `$method_name`. The `record_Array`
    is then built to be passed into `processRecords`. The method is called, passing
    `"Insert"` and the `record_Array`. Finally, the `dog_data` object is set to `NULL`,
    which causes the destructor to save the data.


