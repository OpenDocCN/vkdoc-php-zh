  \ function requireNumbers($num = 1) {\n    if (is_numeric($num) && $num > 0) {\n\
  \        $this->minNums = (int) $num;\n    }\n}\npublic function requireSymbols($num\
  \ = 1) {\n    if (is_numeric($num) && $num > 0) {\n        $this->minSymbols = (int)\
  \ $num;\n    }\n}\n```\n\n这段代码非常直观。`requireMixedCase()`方法不接受任何参数，并将`$mixedCase`属性重置为`true`。另外两个方法接受一个参数，检查该参数是否大于\
  \ 0 的数值，并将其赋值给相应的属性。`(int)`类型转换运算符确保它是一个整数（详细说明请参见第 4 章的“显式更改变量的数据类型”）。`$num`的值设置了密码必须包含的数字或非字母数字符号的最小数量。默认情况下，该值设置为\
  \ 1，使这个参数变为可选。\n\n4.  需要更新`check()`方法，以对这些强度标准执行必要的检查。请按如下方式修改代码：\n\n```\npublic\
  \ function check() {\n    if (preg_match('/\\s{2,}/', $this->password)) {\n    \
  \    $this->errors[] = '密码只能包含单个空格。';\n    }\n    if (preg_match('/^\\s+|\\s+$/',\
