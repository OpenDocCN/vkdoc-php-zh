    Why Not Zend Framework?


    Zend Framework can be tricky to learn, simply due to the initial application layout
    (or lack thereof) and the sheer volume of bundled classes. Once you understand
    how to create MVC applications and how to navigate the documentation, these aren’t
    really factors in the ongoing use of the framework.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


