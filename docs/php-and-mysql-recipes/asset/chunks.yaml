- fmt: "# XML 处理扩展概览\n\n当 XML 结构变得更加复杂，或者你想要从 XML 结构转换为可用于遍历值的对象结构时，PHP 提供了多种选项。其中大多数都需要系统安装名为`libxml`的库。\n\
    \n`DOM`扩展允许通过所谓的 DOM API 来操作 XML 文档。这是一个面向对象的接口。\n\n`libxml`扩展是围绕`libxml`库的“包装器”。它主要被许多其他\
    \ XML 扩展所使用，但它本身也提供了一些可以直接调用的函数。\n\n`SDO`扩展提供了一种使用相同接口处理来自不同数据源的数据的方法。数据的使用者无需了解底层数据源以及如何与之交互。数据源可以是\
