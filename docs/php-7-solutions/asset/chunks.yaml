    \ the session cookie’s lifetime to 10 minutes like this:\n\n```\nsession_start();\n\
    ini_set('session.cookie_lifetime', '600');\n```\n\nAlthough this is effective,\
    \ it has two drawbacks. First, the expiration is set relative to the time on the\
    \ server, not the user’s computer. If the user’s computer clock is wrong, the\
    \ cookie might be out of date immediately, or it might persist much longer than\
    \ you anticipate. The other problem is that the user might be automatically logged\
    \ out without explanation. The next PHP solution offers an approach that is more\
    \ user-friendly.\n\n### PHP Solution 11-8: Ending a Session After a period of\
    \ inactivity\n\nThis PHP solution shows how to end a session if a user doesn’t\
    \ do anything within a specified period that triggers a page to load. When the\
    \ session first starts, typically when the user logs in, the current time is stored\
    \ in a session variable. Each time the user loads a page, the session variable\
    \ is compared with the current time. If the difference is greater than a predetermined\
    \ limit, the session and its variables are destroyed. Otherwise, the variable\
    \ is updated to the current time.\n\nThese instructions assume you have set up\
    \ the login system in PHP Solutions 11-3 to 11-7.\n\n1.  You need to store the\
