    98 );


    I’ve deliberately skipped over lines 48–96 in Listing 9-7 because the same idea
    is repeated throughout the array. The HTML helper uses this array to construct
    the HTML tags that are returned with its functions. Changing one of these keys
    and values will change the output for the whole HTML helper. In other words, whenever
    the HTML helper, in any function, displays the error tag, you can replace its
    value on line 97 with your own, and all error tags will reflect the change.


    The most direct way to alter the $tags array would be to create your own in the
    App helper. However, you would have to specify *all* tags used by the HTML helper,
    which would result in duplication between the App helper and the HTML helper.
    To trim the amount of data you supply to affect the $tags array, you can use the
