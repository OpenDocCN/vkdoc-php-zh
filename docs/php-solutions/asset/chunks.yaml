    ASC\" <?php if ($dir == 'ASC') echo 'selected'; ?>\n    >Ascending</option>\n\
    \    <option value=\"DESC\" <?php if ($dir == 'DESC') echo 'selected'; ?>\n  \
    \  >Descending</option>\n</select>\n```\n\n保存页面并在浏览器中测试。你可以通过选择下拉菜单中的值并点击“更改”来更改显示的排序顺序。但是，如果你尝试通过查询字符串注入非法值，页面将使用\
    \ `$col` 和 `$dir` 的默认值，按 `image_id` 以升序显示结果。\n\n你可以将你的代码与 `ch11` 文件夹中的 `mysqli_order_02.php`\
    \ 和 `pdo_order_02.php` 进行对照。\n\n### 章节回顾\n\nPHP 提供了三种与 MySQL 通信的方法：\n\n*   原始的\
    \ MySQL 扩展，已弃用：不应在新项目中使用。如果你维护一个现有站点，可以轻松识别它是否使用了原始的 MySQL 扩展，因为所有函数都以 `mysql_`\
    \ 开头。你需要立即计划将站点转换为使用其他方法之一。原始的 MySQL 函数将在 PHP 的未来版本中停止工作。\n*   MySQL 改进版（MySQLi）扩展：建议用于所有新的\
    \ MySQL 项目。它需要 PHP 5.0 和 MySQL 4.1 或更高版本。它更高效，并且具有预处理语句的附加安全性。它也完全兼容 MariaDB。\n\
    *   PHP 数据对象（PDO）抽象层，它是与数据库无关的：如果你可能需要调整项目以适用于其他数据库，则应选择此选项。尽管代码与数据库无关，但 PDO 需要为所选数据库安装正确的驱动程序。MySQL\
    \ 的驱动程序完全兼容 MariaDB，并且通常已安装。其他驱动程序不太常见。但是，如果安装了正确的驱动程序，则只需更改连接字符串中的数据源名称（DSN）即可从一个数据库切换到另一个数据库。\n\
    \n尽管 PHP 与数据库通信并存储结果，但查询需要用 SQL 编写，SQL 是用于查询关系型数据库的标准语言。本章展示了如何使用 `SELECT` 语句检索存储在数据库表中的信息，使用\
    \ `WHERE` 子句细化搜索，以及使用 `ORDER BY` 更改排序顺序。你还学习了几种保护查询免受 SQL 注入的技术，包括预处理语句，它使用占位符而不是将变量直接嵌入查询中。\n\
    \n在下一章中，你将通过创建一个在线相册来将所学知识付诸实践。\n\n## 12. 创建动态相册\n\n上一章主要侧重于以文本形式提取 `images` 表的内容。本章将基于这些技术来开发图\
    \ 12-1 所示的迷你相册。\n\n![A978-1-4842-0635-5_12_Fig1_HTML.jpg](img/A978-1-4842-0635-5_12_Fig1_HTML.jpg)\n\
    \n图 12-1. 这个迷你相册通过从数据库中提取信息来驱动\n\n该相册还演示了一些你很可能会希望整合到纯文本驱动页面中的酷炫功能。例如，左侧的缩略图网格每行显示两张图片。只需更改两个数字，你就可以随心所欲地设置网格的列宽和行深。单击其中一个缩略图会替换主图像和标题。重新加载的是同一个页面，但创建在线目录时使用的正是同样的技术，该目录会将你带到另一个页面，获取有关产品的更多详细信息。缩略图网格底部的“下一步”链接会向你显示下一组照片，使用的技术与在长搜索结果集中翻页的技术完全相同。这个相册可不只是一两张漂亮脸蛋......\n\
    \n本章涵盖内容：\n\n*   为什么将图片存储在数据库中是一个坏主意，以及你应该怎么做\n*   规划动态相册的布局\n*   在表格行中显示固定数量的结果\n\
    *   限制一次检索的记录数\n*   在长结果集中进行分页\n"
- fmt: '# Why Not Store Images in a Database?


    The `images` table contains filenames and captions, but not the images themselves.
    Even though you can store binary objects, such as images, in a database, I don’t
    intend to do so for the simple reason that it’s usually more trouble than it’s
    worth. The main problems are as follows:


    - Images can’t be indexed or searched without storing textual information separately.

    - Images are usually large, bloating the size of tables. If there’s a limit on
    the amount of storage in your database, you risk running out of space.

    - Table fragmentation affects performance if images are deleted frequently.

    - Retrieving images from a database involves passing the image to a separate script,
    slowing down display on a webpage.


    It’s more efficient to store images in an ordinary folder on your website and
    use the database for information about the images. You need just two pieces of
    information—the filename and a caption that can also be used as `alt` text. Some
    developers store the full path to the image in the database, but I think storing
    only the filename gives you greater flexibility. The path to the `images` folder
    will be embedded in the HTML. There’s no need to store the image’s height and
    width. As you saw in [Chapters 4](#A978-1-4842-0635-5_4_Chapter.html) and [8](#A978-1-4842-0635-5_8_Chapter.html),
    you can generate that information dynamically using PHP’s `getimagesize()` function.


    ## Planning the Gallery


    I find that the best way to design a database-driven site is to start with a static
    page and fill it with placeholder text and images. I then create my CSS style
    rules to get the page looking the way I want, and finally I replace each placeholder
    element with PHP code. Each time I replace something, I check the page in a browser
    to make sure everything is still holding together.


    Figure [12-2](#A978-1-4842-0635-5_12_Chapter.html#Fig2) shows the static mockup
    I made of the gallery and points out the elements that need to be converted to
    dynamic code. The images are the same as those used for the random image generator
    in [Chapter 4](#A978-1-4842-0635-5_4_Chapter.html) and are all different sizes.
    I experimented by scaling the images to create the thumbnails, but decided that
    the result looked too untidy, so I made the thumbnails a standard size (80 × 54
    pixels). Also, to make life easy, I gave each thumbnail the same name as the larger
    version and stored them in a separate subfolder of the `images` folder called
    `thumbs`.


    ![A978-1-4842-0635-5_12_Fig2_HTML.jpg](A978-1-4842-0635-5_12_Fig2_HTML.jpg)


    Figure 12-2. Working out what needs to be done to convert a static gallery to
    a dynamic one


    In the previous chapter, displaying the contents of the `images` table was easy.
    You created a single table row, with the contents of each field in a separate
    table cell. By looping through the result set, each record was displayed on a
    row of its own, simulating the column structure of the database table. This time,
    the two-column structure of the thumbnail grid no longer matches the database
    structure. You need to count how many thumbnails have been inserted in a row before
    creating the next row.


    Once I had worked out what needed to be done, I stripped out the code for thumbnails
    2 to 6, and for the navigation link. The following listing shows what was left
    in the `<main>` element of `gallery.php`, with the elements that need to be converted
    to PHP code highlighted in bold (you can find the code in `gallery_01.php` in
    the `ch12` folder):


    ```html

    <main>

    <h2>Images of Japan</h2>

    <p id="picCount">Displaying 1 to 6 of 8</p>

    <div id="gallery">

    <table id="thumbs">

    <tr>

    <!-- This row needs to be repeated -->

    <td><a href="gallery.php"><img src="images/thumbs/basin.jpg" alt=""

    width="80" height="54"></a></td>

    </tr>

    <!-- Navigation link needs to go here -->

    </table>

    <figure id="main_image">

    <img src="images/basin.jpg" alt="" width="350" height="237">

    <figcaption>Water basin at Ryoanji temple, Kyoto</figcaption>

    </figure>

    </div>

    </main>

    ```


    ## Converting the Gallery Elements to PHP


    Before you can display the contents of the gallery, you need to connect to the
    `phpsols` database and retrieve all the records stored in the `images` table.
    The procedure for doing so is the same as that in the previous chapter, using
    the following simple SQL query:


    ```sql

    SELECT filename, caption FROM images

    ```


    You can then use the first record to display the first image and its associated
    caption and thumbnail. You don’t need `image_id`.'
