    \ 类的 `save()` 方法来尝试保存图片。如果上传成功与否，会显示相应的消息。\n\n```\nif ( $imageSubmitted ) {\n\
    $info = upload();\n}\nelse {\ninclude_once \"views/admin/newest-images-html.php\"\
    ;\n}\n```\n\n仅当从 `newest-images-html.php` 页面选择了图片时，才会调用该函数。如果未选择图片，则会显示该页面以允许用户选择文件。\n\
    \n```\nkeyValue = $key;\n$this->filename = $_FILES[$key]['name'];\n$this->fileData\
    \ = $_FILES[$key]['tmp_name'];\n}\npublic function saveIn( $folder ) {\n$this->destination\
    \ = $folder;\n}\npublic function save(){\n$variableName = $this->keyValue;\n$tmp\
    \ = $_FILES[$this->keyValue]['tmp_name'];\n$folderIsWriteAble = is_writable( $this->destination\
    \ );\n$notValid = checkImageFile($tmp, $variableName);\nif ( !$notValid and $folderIsWriteAble)\
    \ {\n$name = \"$this->destination/$this->filename\";\n$success = move_uploaded_file(\
    \ $this->fileData, $name );\n} else {\n$success = false;\n}\nreturn $success;\n\
    }\n}\n?>\n清单 9-8\nUploader.class.php\n```\n\n`Uploader` 类与第 4 章中的相同。不过，值得回顾一下用于验证用户尝试上传的文件的代码。\n\
    \n```\n$folderIsWriteAble = is_writable( $this->destination );\n$notValid = checkImageFile($tmp,\
    \ $variableName);\nif ( !$notValid and $folderIsWriteAble) {\n$name = \"$this->destination/$this->filename\"\
    ;\n$success = move_uploaded_file( $this->fileData, $name );\n} else {\n$success\
    \ = false;\n}\n```\n\n检查文件夹以确保其可写。调用 `checkimagefile.php` 中的 `checkImageFile()`\
    \ 函数来验证文件。如果有效，文件将存储在 `imgs` 文件夹中。如果移动成功，`$success` 设置为 `true`；如果移动不成功或文件无效，则设置为\
    \ `false`。\n\n```\n 'jpg');\n$max_Size  = 40 * 1024 * 1024;\n//  40MB 必须小于或等于\
    \ php.ini 中的设置\n$errorStatus = false;\nif(!isset($_FILES[$variableName]) ) {\n\
    // 错误：$_FILE 不存在\n$errorStatus = true;\n} else {\n$info = finfo_open(FILEINFO_MIME_TYPE);\n\
    if (!$info) {\n// 错误：无法使用 MIME 类型打开 finfo\n$errorStatus = true;\n} else {\n$mime_type\
    \ = finfo_file($info, $tmpName);\nif (!in_array($mime_type, array_keys($valid_File_Types)))\
    \ {\n// 错误：无效的文件类型\n$errorStatus = true;\n} else {\nif (filesize($_FILES[$variableName]['tmp_name'])\
    \ > $max_Size) {\n// 错误：文件大小过大\n$errorStatus = true;\n}\nfinfo_close($info);\n\
    }\n}\n}\nreturn $errorStatus;\n}\n?>\n清单 9-9\ncheckImageFile.php\n```\n\n该函数将检查文件是否存在（`if(!isset($_FILES[$variableName])`）以及\
    \ MIME 信息是否可访问（`$info = finfo_open(FILEINFO_MIME_TYPE);`）。如果存在，它将检查有效的文件类型（`if\
    \ (!in_array($mime_type, array_keys($valid_File_Types)))`）以及文件是否未超过最大文件大小（`if\
    \ (filesize($_FILES[$variableName]['tmp_name']) > $max_Size) {`）。如果任何测试失败，`$errorStatus`\
    \ 将设置为 `true`；否则设置为 `false`。此状态随后返回给 `Uploader` 类。我们可以通过在浏览器中输入 `http://localhost/ch9/blog/newestadmin.php`\
    \ 并选择“图片管理器”菜单项，然后选择要上传的文件来测试上传过程。此时最常见的错误与文件夹权限有关。如果目标文件夹受写保护，PHP 将无法保存上传的文件。因此，如果我们无法上传文件，必须将\
    \ `img` 文件夹的权限更改为“读取和写入”模式。\n\n## 练习\n\n1. 我们可以进一步改进错误消息。我们可以检查错误代码（参见第 4 章提供的列表）并为其提供自定义错误消息。要完成此任务，您需要学习如何触发这些错误并向用户显示有意义的错误消息。\n\
    2. 如果我们能在上传前检查名称冲突，这将是一个重大改进。系统是否应该抛出异常并提示用户在上传前重命名图片？或者我们甚至可以通过更改上传表单来允许用户通过表单重命名图片？\n\
    \n## 显示图片\n\n我们现在有一个允许上传图片的图片管理器。博客管理员应该能够看到所有可用的图片，并在博客条目中使用其中任意一张。我们可以重用第 4\
    \ 章的代码，并做了一些修改，以满足大部分需求。\n\n以下附加文件已从第 4 章和第 8 章复制并重命名，以便开始显示上传的图片。每个文件都经过调整，以使用重命名后的附加文件。建议您使用编辑者网站上的文件，以避免任何逻辑错误。\n\
    \n| 原始名称 | 新名称 | 位置（从->到） |\n| --- | --- | --- |\n"
- fmt: "`ImagesUploader.class.php` | `Uploader.class.php` | `ch4 classes -> models`\
    \ |\n`gallery.php` | `gallery.php` | `ch4 views -> views/admin` |\n`searchedblog.php`\
    \ | `blog.php` | `ch8 controller-> controllers` |\n`searchedcomments.php` | `comments.php`\
    \ | `ch8 controller->controller` |\n`searched.php` | `searched.php` | `ch8 controller->controller`\
    \ |\n`searched-comment-form-html.php` | `comment-form-html.php` | `ch8 views->\
    \ views` |\n`searched-comments-html.php` | `comments-html.php` | `ch8 views->\
    \ views` |\n`searched-entry-html.php` | `entry-html.php` | `ch8 views-> views`\
    \ |\n`searched-form-html.php` | `form-html.php` | `ch8 views-> views` |\n`searched-results-html.php`\
    \ | `results-html.php` | `ch8 views-> views` |\n\nLet us review the contents of\
    \ the `gallery.php` file now located in `views/admin`.\n\n```php\n<?php\nfunction\
    \ showImages() {\n    $out = \"<div id='gallery'>\\n\";\n    $out .= \"<h2>Images\
    \ Gallery</h2>\";\n    $out .= \"\";\n    $totalSize = 0;\n    $numberOfImages\
    \ = 0;\n    $dir_name = \"imgs\";\n    chdir($dir_name);\n    $images = glob(\"\
    *.jpg\");\n    foreach($images as $image) {\n        if((filesize($image) < 50000)\
    \ && (getimagesize($image) )) {\n            $out .= '<img src=\"'.$dir_name.\
    \ '/' .$image.'\" alt=\"'.$image.'\" title=\"'.$image.'\" /> ';\n            $totalSize\
    \ += filesize($image);\n            $numberOfImages++;\n        }\n        if\
    \ (($numberOfImages % 2) == 0) {\n            $out .= \"\";\n        }\n    }\n\
    \    $out .= \"\";\n    return $out;\n}\n$info = showImages();\n?>\n```\n\n*Listing\
    \ 9-10: `gallery.php`*\n\nOnly a minor change was required from the original Chapter\
    \ [4](#323857_3_En_4_Chapter.xhtml) gallery program. We will look at this change\
    \ in a moment. But first, let’s look at what `showimages()` accomplishes. Function\
    \ `showImages()` uses CSS to format the container for the images. It sets default\
    \ values for the size requirements and uses `glob` to retrieve the images from\
    \ the `img` folder. Then, if the images are the proper size, it formats the images\
    \ using CSS and displays two images per row.\n\n```php\n$out .= '<img src=\"'.$dir_name.\
    \ '/' .$image.'\" alt=\"'.$image.'\" title=\"'.$image.'\" />';\n```\n\nThe only\
    \ change is the addition of the `alt` and `title` values. The administrator will\
    \ now be able to scroll over the image to determine its file name. This will be\
    \ useful as the administrator will soon be able to select an image to associate\
    \ with a blog.\n\nThe navigation has also been updated to allow the administrator\
    \ to select the viewing of all images.\n\n```php\n<?php\n// Navigation\necho \"\
    <ul>\n<li><a href='updatedadmin.php?page=entries'>All entries</a></li>\n<li><a\
    \ href='updatedadmin.php?page=editor'>Editor</a></li>\n<li><a href='updatedadmin.php?page=images'>Image\
    \ manager</a></li>\n<li><a href='updatedadmin.php?page=gallery'>Image gallery</a></li>\n\
    </ul>\";\n?>\n```\n\n*Listing 9-11: `updated-admin-navigation.php`*\n\nThis new\
    \ navigation is now accessed in `updatedadmin.php`. Once these updates have been\
    \ saved, the gallery can be tested by loading `updatedadmin.php` into a browser.\
    \ Of course, some images must exist within the `imgs` folder before they are displayed.\
    \ The display of the images is the same as in Chapter [4](#323857_3_En_4_Chapter.xhtml),\
    \ except for the addition of the tool tip (scroll over the image) will display\
    \ the image name.\n\n**Exercise**: While our program does a great job of displaying\
    \ images, it does not provide a delete function to remove unwanted images from\
    \ the folder. Add links to the image manager to delete each image. Then use the\
    \ `unlink` function to remove the image from the folder. The following function\
    \ can be used to complete the process.\n\n```php\nif ( $deleteImage ) {\n    //grab\
    \ the src of the image to delete\n    $whichImage = $_GET['delete-image'];\n \
    \   unlink($whichImage);\n}\n```\n\nYou could format a URL string similar to the\
    \ following to be used by the function.\n\n```html\n<a href=\"updatedadmin.php?page=images&delete-image=img/coffee.jpg\"\
    >delete</a>\n```\n\nSee how a URL variable, `page`, is set to `images` and another\
    \ URL variable, `delete-image`, is set to `img/coffee.jpg`? Clicking this delete\
    \ link will load the `images` controller and then can use the `if` statement to\
    \ determine if a request to delete the image is desired. Hint: Place the link\
    \ within the loop so each picture has its own delete link.\n\n### Using an Image\
    \ in a Blog Entry\n\nWe can now make changes to our editor to allow the administrator\
    \ to select which image they would like to use in their blog.\n\n```php\n<?php\n\
    if ( $entryData->title !=\"\" ) {\n    $info .= \"value='$entryData->title' \"\
    ;\n}\n$info .= \"pattern='[A-Za-z]{,150}'\n      title='Title can contain only\
    \ alphabetic letters, no special characters. Title is required.'\n      required\
    \ />\";\n\n$info .= \"<br /><label>Image</label><br />\";\n$info .= \"<select\
    \ name='image'>\";\n\n$dir_name = \"imgs\";\nchdir($dir_name);\n$images = glob(\"\
    *.jpg\");\n$info .=\"<option value=''\";\nif ($entryData->image ==\"\") {\n  \
    \  $info .=\" selected \";\n}\n$info .= \">None\";\n\nforeach($images as $value)\
    \ {\n    $info .= \"<option value='$value'\";\n    if ($entryData->image == $value)\
    \ {\n        $info .=\" selected \";\n    }\n    $info .= \">$value\";\n}\n$info\
    \ .= \"</select>\";\n?>\n```\n\n*Listing 9-12: Partial Listing of `updated-editor-html.php`*\n\
    \nThis partial listing from `updated-editor-html.php` shows a very commonly used\
    \ algorithm to create an HTML `select` list using the contents from the `imgs`\
    \ folder. The `glob` function creates a `$images` array. The `foreach` loop goes\
    \ through the array and places the file names into the `option` statements for\
    \ the `select` statement. If this is an update, the `if` statement will compare\
    \ the contents of `$entryData->image` to the current file name from the folder.\
    \ If they match, the selected value is also appended to the `option` tag to highlight\
    \ the previous choice of image.\n\nBut wait, where did `$entryData->image` come\
    \ from? Ah you caught me. Let’s look at a few other changes.\n\nFirst, we must\
    \ add a column to the database table using `phpMyAdmin`. `phpMyAdmin` can be found\
    \ in the `Adobe` dashboard. Simply enter `http://localhost/` into a browser. Then\
    \ click the menu item on the right. Select the database (`simple_blog`) from the\
    \ left side menu. Then select the table (`blog_entry`). Click the `structure`\
    \ menu tab.\n\n![Figure 9-2: phpMyAdmin](images/323857_3_En_9_Chapter/323857_3_En_9_Fig2_HTML.jpg)\n\
    \nNear the bottom of the window is an `add` area. In Figure [9-2](#323857_3_En_9_Chapter.xhtml#Fig2),\
    \ it indicates that one column will be added after the `entry_text` column. Click\
    \ the `Go` button.\n\n![Figure 9-3: phpMyAdmin insert](images/323857_3_En_9_Chapter/323857_3_En_9_Fig3_HTML.jpg)\n\
    \nEnter the information shown earlier and click the `Save` button. The column\
    \ will now be added to the table.\n\n> **Note**: In the examples in this chapter,\
    \ a copy of the table (`simple_blog1`) has been produced with the new column to\
    \ keep the integrity of the original table intact.\n\nNow that we have the table\
    \ adjusted, we need to make some minor adjustments to the functions that use this\
    \ table, to retrieve and save the information whenever needed.\n\nIn the Blog\
    \ Entry Table (now named `Updated_Blog_Entry_Table.class.php`), each function\
    \ has been updated to access the new column.\n\n```php\npublic function searchEntry\
    \ ( $searchTerm ) {\n    $sql = \"SELECT entry_id, title, image FROM blog_entry\n\
    \            WHERE title LIKE ?\n            OR entry_text LIKE ?\";\n    $data\
    \ = array( \"%$searchTerm%\", \"%$searchTerm%\" );\n    $statement = $this->executeSQL($sql,\
    \ $data);\n    return $statement;\n}\n```\n\n*Listing 9-13: Partial Listing of\
    \ `Updated_Blog_Entry_Table.class.php`*\n\nFor example, in Listing [9-13](#323857_3_En_9_Chapter.xhtml#PC23),\
    \ the `searchEntry()` function has been updated to return the `image` column in\
    \ addition to the other columns. Once we include these updates, the `select` list\
    \ will be populated and the administrator can use it to create a new entry or\
    \ update an existing entry. We can now enter `updatedadmin.php` program into a\
    \ browser and click the `Editor` menu item to test the functionality.\n\n![Figure\
    \ 9-4: `updatededitor.php`](images/323857_3_En_9_Chapter/323857_3_En_9_Fig4_HTML.jpg)\n\
    \nOK, but how do we attach the image to the display of a blog? Actually, now that\
    \ everything else is working. That task is pretty straightforward."
