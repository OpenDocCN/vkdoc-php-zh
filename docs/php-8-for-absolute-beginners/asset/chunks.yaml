    \ code assumes that the database does not require a userid and\npassword for access.\
    \ However, in production, it is essential that the\ndatabase be secured with login\
    \ credentials. This requires only a simple\nchange to update the code with the\
    \ proper userid and password.\n\n```\ngetMessage();\n$pageData->setContent (\"\
    Connection failed!$e\");\nexit();\n}\n?>\nListing 6-7\ndatabase.php\n```"
  trans: "\n# PHP/MySQL 网站投票示例\n\n```php\n<?php\nsetTitle(\"PHP/MySQL 网站投票示例\");\n\
    $pageData->setContent(\"目前一切正常！\");\n$pageData->appendContent(\"...此处放置内容。\");\n\
    require \"views/page.php\";\necho $page;\n?>\n```\n\n**列表 6-1** `index.php`\n\n\
    此 `index` 程序仅对先前见过的原始 `privateindex` 程序稍作修改。删除了一些内容，并且文件夹名称以及标题和内容的值已更改！让我们测试一下。\n\
    \n![](img/323857_3_En_6_Fig10_HTML.jpg)\n\n一张管理网页的图片，主标题为“目前一切正常！”，副标题为“此处放置内容。”\n\
    \n**图 6-10** 新 `index.php` 程序的输出\n\n我们的视图现已更改。我们现在正从模型-视图-控制器的角度审视这段代码。我们可以看到创建的\
    \ HTML 页面是如何将*视图*与*模型*结合起来的。我们可以看到*前端控制器*如何连接模型和视图，并将格式良好的 HTML5 页面输出到浏览器供用户查看。\n\
    \n## 创建投票控制器\n\n有了一个使用其自身模型、视图和前端控制器设置创建的几乎空白的页面后，我们可以准备一个文件来在浏览器中显示我们的投票示例。坚持使用\
    \ MVC 方法，我们最终将需要一个投票模型、一个投票视图和一个投票控制器。让我们创建一个基本的投票控制器，并从前端控制器（`index.php`）加载它。让我们在\
    \ `controllers` 文件夹中创建一个新文件 `poll.php`。\n\n```php\n<?php\n$info = \"<p>投票即将在此显示</p>\"\
    ;\n?>\n```\n\n**列表 6-2** `poll.php`\n\n接下来，我们将从前端控制器（我们现在将其命名为 `pollindex.php`）加载投票控制器。\n\
    \n```php\n<?php\n$pageData = new stdClass();\n$pageData->setTitle(\"PHP/MySQL\
    \ 网站投票示例\");\ninclude_once \"controllers/poll.php\";\n$pageData->setContent($info);\n\
    $pageData->appendContent(\"...and content goes here.\");\nrequire \"views/page.php\"\
    ;\necho $page;\n?>\n```\n\n**列表 6-3** `pollindex.php`\n\n此格式应该看起来很熟悉，因为它与本教材中先前的索引示例非常相似。\n\
    \n![](img/323857_3_En_6_Fig11_HTML.jpg)\n\n一张管理网页的图片，显示“投票即将在此显示。”\n\n**图 6-11**\
    \ `pollindex.php` 的输出\n\n现在，我们的前端控制器和投票控制器正在协同工作，为我们的投票创建一个动态网页！接下来让我们开发投票模型。\n\
    \n## 创建投票模型\n\n有了初步的投票控制器，我们就可以开发一个初步的投票模型了。\n\n```php\n<?php\nclass Poll {\n\
    \    private $poll_question = \"Are you sure?\";\n    private $yes = 0;\n    private\
    \ $no = 0;\n\n    public function getPollData() {\n        return $this;\n   \
    \ }\n\n    public function getPollQuestion() : string {\n        return $this->poll_question;\n\
    \    }\n\n    public function getYes() : int {\n        return $this->yes;\n \
    \   }\n\n    public function getNo() : int {\n        return $this->no;\n    }\n\
    }\n?>\n```\n\n**列表 6-4** `Poll.class.php`\n\n`Poll` 类定义了所有 `Poll` 对象的蓝图。`Poll`\
    \ 类包含一个方法 `getPollData()`，它返回 `$this`。这个返回实现了什么？简单的答案是，它为调用此方法的任何代码返回一个指向该对象的*指针*（内存地址）。这个程序里有什么对象？在调用此方法之前，必须创建此类的一个实例（我们很快就会看到）。一旦创建，就可以调用\
    \ `getPollData()` 方法。此时，一个包含此类内容的对象将在其自己的内存空间中存在。`return` 语句将一个指向该对象的引用（指针）传递给调用该函数的代码。这将允许调用代码直接访问和使用该对象及其内容。\n\
    \n`$pollData` 对象具有 `poll_question`、`yes` 和 `no` 的属性及获取方法。`$pollData` 对象*表示*显示投票所需的所有内容。换句话说，`$pollData`\
    \ *模型化*了投票数据。\n\n## 创建投票视图\n\n我们现在可以创建一个投票视图来查看我们的数据（包含在我们刚刚创建的模型中）。\n\n```php\n\
    <?php\necho \"\n<div>\n<h2>投票结果</h2>\n<ul>\n<li>\" . $pollData->getYes() . \"\
    \ 回答是</li>\n<li>\" . $pollData->getNo() . \" 回答否</li>\n</ul>\n</div>\n\";\n?>\n\
    ```\n\n**列表 6-5** `poll-html.php`\n\n此视图使用获取方法来检索投票结果（目前默认值为零）并将它们放入一个无序列表中。\n\
    \n## 连接投票视图与投票模型\n\n在创建了初步的投票模型和投票视图后，我们可以更新投票控制器来连接模型和视图，并最终在浏览器中显示一些内容。\n\n\
    ```php\n<?php\ninclude_once \"models/Poll.class.php\";\n$poll = new Poll();\n\
    $pollData = $poll->getPollData();\ninclude_once \"views/poll-html.php\";\n?>\n\
    ```\n\n**列表 6-6** `newpoll.php`\n\n`Poll` 类模型被包含到控制器中，并创建了一个实例（`$poll`）。调用了 `getPollData()`\
    \ 方法，该方法创建了指向 `$poll` 对象的引用，命名为 `$pollData`。我们说 `$pollData` 现在是一个指向该对象的指针。我们现在可以使用\
    \ `$pollData` 访问对象中的任何内容。最后，附加了显示投票结果的 `poll-html.php` 视图。就是这样！我们有了一个 MVC 投票。\n\
    \n![](img/323857_3_En_6_Fig12_HTML.jpg)\n\n一个应用程序输出（`newpollindex.php`）显示了投票结果，YES\
    \ 和 NO 均为 0。\n\n**图 6-12** `newpollindex.php` 的输出\n\n也许你非常想问这样一个问题：*为什么我要创建三个不同的文件来显示一个简单的\
    \ `<ul>` 元素？* 这是一个完全合理的问题。如果你只是想显示一个包含几个硬编码值的 `<ul>` 元素，那么 MVC 方法完全是小题大做。最好的方法可能是编写一个简短的\
    \ HTML 程序。\n\n这里的重点是引入一个非常简单的示例来介绍 MVC 设计模式，这样就不会有过于复杂的代码来掩盖 MVC 的基本原则。通过 MVC\
    \ 方法，你可以完美地搭建一个数据库驱动的 Web 应用程序。对于如此简单的事情，MVC 架构几乎不是必需的，但它确实可以解决你在更复杂的项目中会遇到的一些挑战，例如我们将在下一章开始制作的博客系统。\n\
    \nMVC 将视图与模型和控制器分离开。这意味着我们可以在不更改其他任何内容的情况下更改视图。假设我们不希望投票使用 `<ul>` 元素。我们可以简单地更改\
    \ `views/poll-html.php` 中使用的 HTML 标签，并相信其余代码能正确运行。我们可以在不更改其他任何内容的情况下轻松更改视图。\n\n\
    类似地，我们可以更改内容，同时仍然相信我们的代码能按预期运行。将 `no` 属性设置为 9 将是一项简单的任务。我们只需要更改一小段代码。这个投票应用程序是使用自包含元素构建的。\n\
    \n## 从 PHP 连接到 MySQL/MariaDB\n\nMVC 架构将使连接到数据库并使用数据库驱动的数据进行投票变得相当简单。一旦建立了这样的连接，我们就可以从数据库中检索数据并使用\
    \ HTML 进行查看。这就是 MVC 数据库驱动网站的精髓。\n\n### PHP 数据对象 (PDO)\n\nPHP 提供了几种访问 MySQL/MariaDB\
    \ 数据库的方法。在本书中，我们将专门使用 PHP 数据对象 (PDO)。这是一种从 PHP 连接到数据库的非常安全且高效的方式。PDO 支持多种数据库，并提供了一套统一的方法来处理大多数数据库交互。这对于需要支持多种数据库类型（如\
    \ PostgreSQL、Firebird 或 Oracle）的应用程序来说是一个巨大的优势。\n\n### 打开连接\n\n是时候连接到我们的数据库了。请记住，模型包含所有检索数据的代码。因此，我们将创建一个模型程序来连接到我们的数据库，并很快创建一个程序来检索我们的数据库信息。以下代码假定数据库不需要用户\
    \ ID 和密码即可访问。但是，在生产环境中，使用登录凭据来保护数据库至关重要。这只需要进行简单的更改，即可用正确的用户 ID 和密码更新代码。\n\n```php\n\
    <?php\ntry {\n    $dbh = new PDO('mysql:host=localhost;dbname=bitter', 'root',\
    \ '');\n    $pageData->setContent(\"连接成功！\");\n} catch (PDOException $e) {\n \
    \   $pageData->setContent(\"连接失败！$e\");\n    exit();\n}\n?>\n```\n\n**列表 6-7**\
    \ `database.php`\n"
- fmt: "# 排版后的文档\n\n前面的代码使用了之前介绍的`try/catch`块来处理可能抛出异常的任何代码。当尝试打开数据库时，我们可能不会成功。因此，这行代码被放在`try`块中。如果引发了异常，`catch`块将执行，显示异常消息、我们自己的消息并退出程序。如果一切正常，我们可以继续尝试检索数据。如果成功，代码会创建一个`PDO`对象并将其存储在`$db`变量中。\n\
    \n> **注意**  \n> 你可能还有其他可用于创建到数据库的`PDO`连接的设置。你可以查阅[`www.php.net/manual/en/book.pdo.php`](http://www.php.net/manual/en/book.pdo.php)获取完整且详细的覆盖信息。\n\
    \n我们很快会将这个程序导入到我们的控制器中。\n\n## 与Poll模型共享数据库连接\n\n我们可以使用带参数的构造函数来与`Poll`模型共享数据库连接。\n\
    \n```\ndb property\n$this->db = $dbConnection;\n}\npublic function getPollData()\
    \ {\nreturn $this;\n}\npublic function getPollQuestion() : string {\nreturn $this->poll_question;\n\
    }\npublic function getYes() : int {\nreturn $this->yes;\n}\npublic function getNo()\
    \ : int {\nreturn $this->no;\n}\n}\n?>\nListing 6-8\nNewPoll.class.php\n```\n\n\
    现在构造函数接受指向数据库连接对象的指针，并将其放入`$db`中。接下来，我们将调用`Poll`类的构造函数，并将`PDO`对象指针作为参数传递。暂停一下思考。在我们的代码中，我们应该在哪里加载`Poll`模型？\n\
    \n从`poll`控制器！\n\n```\ngetPollData();\ninclude_once \"views/poll-html.php\";\n\
    ?>\nListing 6-9\nnewestpoll.php\n```\n\n现在，我们已经将数据库连接传递给了`Poll`模型。代码共享了一个数据库连接，但目前还没有使用它做任何事情。让我们更新`index.php`文件，以包含我们的数据库连接。\n\
    \n```\nsetTitle(\"PHP/MySQL site poll example\");\ninclude_once \"models/database.php\"\
    ;\ninclude_once \"controllers/newestpoll.php\";\n$pageData->setContent($info);\n\
    require \"views/page.php\";\necho $page;\n?>\nListing 6-10\nnewestpollindex.php\n\
    ```\n\n只有少数几个小改动。`database.php`程序已被包含，控制器已更新到最新版本。如果我们执行这个索引文件，在输出中不会看到任何变化。然而，我们已经连接到了数据库并传递了指向数据对象的指针。我们离一个完整的程序越来越近了！\n\
    \n变量`$db`在`newestpollindex.php`中声明。它在`newestpoll.php`中可用，因为它是在`newestpollindex.php`中被包含的。包含一个文件很像将代码从一个文件复制并粘贴到另一个文件中。因此，在任何包含文件中声明的所有变量都可以在其他被包含的文件中使用，只要这些文件是在之后被包含的。\n\
    \n## 使用PDOStatement检索数据\n\n在数据库内部，我们有一个`poll`表，包含`poll_question`以及`yes`和`no`属性的值。我们准备从数据库中检索数据。\n\
    \n请记住，处理轮询数据的代码属于`Poll`模型。因此，我们需要修改`Poll`类中的`getPollData`方法。目前，该方法返回硬编码的轮询数据；我们希望返回基于数据库驱动的轮询数据。\n\
    \n```\n?php\n//complete code for models/Poll.class.php\nclass Poll {\nprivate\
    \ $db;\n//method requires a database connection as argument\npublic function __construct(\
    \ $dbConnection ){\n//store the received connection in the $this->db property\n\
    $this->db = $dbConnection;\n}\npublic function getPollData() {\n$sql = \"SELECT\
    \ poll_question, yes, no FROM poll WHERE poll_id = 1\";\n$statement = $this->db->prepare($sql);\n\
    $statement->execute();\n$pollData = $statement->fetchObject();\nreturn $pollData;\n\
    }\n}\n?>\nListing 6-11\nNewestPoll.class.php\n```\n\n`Poll`类实际上变成了一个更小的程序。我们不再需要存储问题和响应的值，因为我们正在将包含来自数据库信息的对象传递回调用程序。因此，属性和`get`方法不再需要。只需要几行代码就可以检索到我们的信息。\n\
    \n```\n$sql = \"SELECT poll_question, yes, no FROM poll WHERE poll_id = 1\";\n\
    ```\n\n属性`$sql`包含用于检索所需信息的SQL语句。\n\n```\n$statement = $this->db->prepare($sql);\n\
    ```\n\nSQL字符串在执行前被转换为`PDOStatement`对象。`prepare()`将一个简单的SQL字符串转换为`PDOStatement`对象。\n\
    \n```\n$statement->execute();\n```\n\n`PDOStatement`方法`execute()`针对MySQL/MariaDB数据库执行SQL。\n\
    \n```\n$pollData = $statement->fetchObject();\n```\n\n`fetchObject()`从查询的数据库表中检索一行数据，创建一个`StdClass`对象（`$pollData`）。这个对象将公开暴露我们检索到的所有数据。然而，这并不是什么安全问题，因为我们原本就打算向所有人显示这些数据。如果我们打算使用这些数据更新数据库，则需要使用更安全的方法。返回的`StdClass`对象会自动创建属性`poll_question`、`yes`和`no`。\n\
    \n```\nreturn $pollData;\n```\n\n该对象被返回给调用程序（`finalpoll.php`）。\n\n> **注意**  \n\
    > 你可以在[`www.php.net/manual/en/class.pdostatement.php`](http://www.php.net/manual/en/class.pdostatement.php)查阅`PDOStatement`对象的官方文档。\n\
    \n```\ngetPollData();\ninclude_once \"views/finalpoll-html.php\";\n?>\nListing\
    \ 6-12\nfinalpoll.php\n```\n\n`finalpoll.php`仅被修改为调用更新后的`Poll`类和一个略有修改的HTML视图。\n\
    \n```\nPoll results\n\n$pollData->yes said yes\n $pollData->no said no\n\n\";\n\
    ?>\nListing 6-13\nfinalpoll-html.php\n```\n\n由于从数据库返回的是一个`StdObject`，我们可以直接访问属性而无需使用`get`方法。因此，视图程序（`finalpoll-html.php`）发生了一个小变化。\n\
    \n```\nsetTitle(\"PHP/MySQL site poll example\");\ninclude_once \"models/database.php\"\
    ;\ninclude_once \"controllers/finalpoll.php\";\n$pageData->setContent($info);\n\
    require \"views/page.php\";\necho $page;\n?>\nListing 6-14\nfinalpollindex.php\n\
    ```\n\n索引文件（控制器）也仅被略微修改以调用新版本的轮询控制器。如果我们在浏览器中执行`finalpollindex.php`程序，会发现与图[6-12](#323857_3_En_6_Chapter.xhtml#Fig12)相同的输出格式。然而，一个重要的区别是现在数据是从数据库中提取的。一个真正的数据库驱动的网站！\n\
    \n## 显示轮询表单\n\n我们还没有一个像样的站点轮询。站点访问者应该被允许提交他们的意见，从而为轮询结果做出贡献。我们必须为站点访问者提供一个表单。请记住，所有显示都是视图。那么，让我们更新视图，不仅要显示轮询结果，还要接受站点访问者的意见。\n\
    \n```\n\n$pollData->poll_question\n\nYes, it is!\nNo, not really!\n\nPoll results\n\
    \n$pollData->yes said yes\n$pollData->no said no\n\n\";\n?>\nListing 6-15\ncompletepoll-html.php\n\
    ```\n\n```\n$dataFound = isset( $pollData );\nif( $dataFound === false ){\ntrigger_error(\
    \ 'views/completepoll-html.php needs an $pollData object' );\n}\n```\n\n为了提高程序的可靠性，我们添加了一个`if`语句，用于判断`$pollData`信息是否被正确创建。我们之前假设它总是被正确创建的。但永远不要假设。始终要预料到意外情况，并检查可能出错的情况。`trigger_error`将创建一个自定义错误消息。当表单在其他程序（如控制器）中使用时，你可以创建一个`try/catch`来捕获这个可能的错误。\n\
    \n```\nform method='post' action='completepollindex.php'>\n$pollData->poll_question\n\
    \nYes, it is!\nNo, not really!\n\n```"
  raw: "The preceding code uses the try/catch blocks introduced previously to\nhandle\
    \ any code which might throw exceptions. When attempting to open\nthe database,\
    \ we might not be successful. Thus, this line of code is\nplaced in the try block.\
    \ If an exception is raised, the catch block will\nexecute, displaying the exception\
    \ message, our own message and exiting\nthe program. If all works correctly, we\
    \ can proceed with attempting to\nretrieve the data. If successful, the code creates\
    \ a PDO object and\nstores it in the `$db` variable.\n\nNote\n\nThere are other\
    \ possible settings you might use for creating a PDO\nconnection to a database.\
    \ You can consult [ `www.php.net/manual/en/book.pdo.php`\n](http://www.php.net/manual/en/book.pdo.php)\
    \ for complete and detailed coverage.\n\nWe will import this program into our\
    \ controller soon.\n\nSharing the Database Connection with the Poll\nModel\n\n\
    We can use a constructor with arguments to share a database connection  with the\n\
    poll model.\n\n```\ndb property\n$this->db = $dbConnection;\n}\npublic function\
    \ getPollData() {\nreturn $this;\n}\npublic function getPollQuestion() : string\
    \ {\nreturn $this->poll_question;\n}\npublic function getYes() : int {\nreturn\
    \ $this->yes;\n}\npublic function getNo() : int {\nreturn $this->no;\n}\n}\n?>\n\
    Listing 6-8\nNewPoll.class.php\n```\n\nThe constructor now accepts the pointer\
    \ to the database connection\nobject and places it in `$db`. Next, we will\ncall\
    \ the `Poll`\nclass’s constructor and pass the PDO object pointer as an argument.\
    \ Take\na pause to reflect. Where in our code would we load the poll model?\n\n\
    From the poll controller!\n\n```\ngetPollData();\ninclude_once \"views/poll-html.php\"\
    ;\n?>\nListing 6-9\nnewestpoll.php\n```\n\nNow, we have passed the database connection\
    \ to the poll model. The code\nshares a database connection, but it doesn’t use\
    \ it for anything yet.\nLet’s update the index.php file to now include our database\
    \ connection.\n\n```\nsetTitle(\"PHP/MySQL site poll example\");\ninclude_once\
    \ \"models/database.php\";\ninclude_once \"controllers/newestpoll.php\";\n$pageData->setContent($info);\n\
    require \"views/page.php\";\necho $page;\n?>\nListing 6-10\nnewestpollindex.php\n\
    ```\n\nThere are only a couple of minor changes. The database.php program\nhas\
    \ been included and the controller has been updated to the newest\nversion. If\
    \ we execute this index file, we will see no changes in the\noutput. However,\
    \ we have connected to the database and passed the\npointer to the data object.\
    \ We are getting close to a complete\nprogram!\nThe variable `$db` is declared\
    \ in\n`newestpollindex.php`.\nIt is available in `newestpoll.php`\nbecause it\
    \ is included in `newestpollindex.php`.\nIncluding a file is a lot like copying\
    \ all the code from one file and\npasting it into another file. As a consequence,\
    \ all variables declared\nin any including file can be available in other included\
    \ files, if those\nfiles are included afterward.\n\nRetrieving Data with a PDOStatement\n\
    Inside the database, we have a `poll` table with a\n`poll_question`\nand values\
    \ for its `yes` and `no` attributes. We are\nready to retrieve data from the database.\n\
    \nRemember, code dealing with the data for the poll belongs in the poll\nmodel.\
    \ Thus, we need to modify the `getPollData` method in\nthe Poll class. At this\
    \ point, the method returns hard-coded poll data;\nwe want to return database-driven\
    \ poll data.\n\n```\n?php\n//complete code for models/Poll.class.php\nclass Poll\
    \ {\nprivate $db;\n//method requires a database connection as argument\npublic\
    \ function __construct( $dbConnection ){\n//store the received connection in the\
    \ $this->db property\n$this->db = $dbConnection;\n}\npublic function getPollData()\
    \ {\n$sql = \"SELECT poll_question, yes, no FROM poll WHERE poll_id = 1\";\n$statement\
    \ = $this->db->prepare($sql);\n$statement->execute();\n$pollData = $statement->fetchObject();\n\
    return $pollData;\n}\n}\n?>\nListing 6-11\nNewestPoll.class.php\n```\n\nThe Poll\
    \ class actually becomes a much smaller program. We no longer\nneed to store the\
    \ values for the question and the responses because we\nare passing the object\
    \ which contains the information from the database\nback to the calling program.\
    \ Thus, the properties and get methods are no\nlonger required. It only takes\
    \ a few lines of code to retrieve our\ninformation.\n\n```\n$sql = \"SELECT poll_question,\
    \ yes, no FROM poll WHERE poll_id = 1\";\n```\n\nThe property `$sql` contains\
    \ the SQL\nstatement to retrieve the information needed.\n\n```\n$statement =\
    \ $this->db->prepare($sql);\n```\n\nThe SQL string is converted to a `PDOStatement`\
    \ object    before it can be\nexecuted. `prepare()` converts a\nsimple SQL string\
    \ to a `PDOStatement` object.\n\n```\n$statement->execute();\n```\n\nThe `PDOStatement`\
    \ method\ncalled `execute()` executes\nthe SQL against the MySQL/MariaDB database.\n\
    \n```\n$pollData = $statement->fetchObject();\n```\n\n`fetchObject()`\nretrieves\
    \ the one row of data from the queried database table creating a\n`StdClass` object\n\
    (`$pollData`).\nThis object will publicly expose all the data we have retrieved.\n\
    However, this is not much of a security concern, since we only intend to\ndisplay\
    \ the data to everyone, anyways. If we intended to use this data\nto update our\
    \ database, we would need to use a more secure approach. The\nreturned `StdClass`\
    \ object is\nautomatically created with properties for `poll_question`, `yes`,\
    \ and `no`.\n\n```\nreturn $pollData;\n```\n\nThe object is returned to the calling\
    \ program (`finalpoll.php`).\n\nNote\n\nYou can consult the official documentation\
    \ for `PDOStatement` objects\nat [`www.php.net/manual/en/class.pdostatement.php`](http://www.php.net/manual/en/class.pdostatement.php)\
    \ .\n\n```\ngetPollData();\ninclude_once \"views/finalpoll-html.php\";\n?>\nListing\
    \ 6-12\nfinalpoll.php\n```\n\n`finalpoll.php`\nhas only been modified to call\
    \ the updated Poll class and a slightly\nmodified HTML view.\n\n```\nPoll results\n\
    \n$pollData->yes said yes\n $pollData->no said no\n\n\";\n?>\nListing 6-13\nfinalpoll-html.php\n\
    ```\n\nSince a `StdObject` is returned\nfrom the database, we can directly access\
    \ the properties without using\nget methods. Therefore, a slight change has occurred\
    \ in the view program\n(`finalpoll-html.php`).\n\n```\nsetTitle(\"PHP/MySQL site\
    \ poll example\");\ninclude_once \"models/database.php\";\ninclude_once \"controllers/finalpoll.php\"\
    ;\n$pageData->setContent($info);\nrequire \"views/page.php\";\necho $page;\n?>\n\
    Listing 6-14\nfinalpollindex.php\n```\n\nThe index file (controller) was also\
    \ only slightly modified to call\nthe new version of the poll controller. If we\
    \ execute the `finalpollindex.php`\nprogram in our browser, we will discover the\
    \ same output format as\nFigure [6-12](#323857_3_En_6_Chapter.xhtml#Fig12). However,\
    \ the\none big difference is now the data is being pulled from the database. A\n\
    true database-driven website!\n\nShowing a Poll Form\n\nWe don’t have much of\
    \ a site poll  yet. Site visitors\nshould be allowed to submit their opinions\
    \ and, thus, contribute to the\npoll results. We must provide a form for the site\
    \ visitors. Remember,\nall displays are views. So, let’s update our view not only\
    \ to display\npoll results but also to accept the site visitor’s opinion.\n\n\
    ```\n\n$pollData->poll_question\n\nYes, it is!\nNo, not really!\n\nPoll results\n\
    \n$pollData->yes said yes\n$pollData->no said no\n\n\";\n?>\nListing 6-15\ncompletepoll-html.php\n\
    ```\n\n```\n$dataFound = isset( $pollData );\nif( $dataFound === false ){\ntrigger_error(\
    \ 'views/completepoll-html.php needs an $pollData object' );\n}\n```\n\nTo increase\
    \ reliability of the program, we have added an if statement\nwhich determines\
    \ if the `$pollData` information\nwas properly created. We assumed it was previously.\
    \ But we should never\nassume. Always expect the unexpected and check for the\
    \ possibility that\nsomething went wrong. `trigger_error` will\ncreate a custom\
    \ error message. You can create a try/catch to capture\nthis possible error whenever\
    \ the form is used in another program (such\nas the controller).\n\n```\nform\
    \ method='post' action='completepollindex.php'>\n$pollData->poll_question\n\n\
    Yes, it is!\nNo, not really!\n\n```"
  trans: "好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n# 排版后的文档\n\n前面的代码使用了之前介绍的`try/catch`块来处理可能抛出异常的任何代码。当尝试打开数据库时，我们可能不会成功。因此，这行代码被放在`try`块中。如果引发了异常，`catch`块将执行，显示异常消息、我们自己的消息并退出程序。如果一切正常，我们可以继续尝试检索数据。如果成功，代码会创建一个`PDO`对象并将其存储在`$db`变量中。\n\
    \n> **注意**  \n> 你可能还有其他可用于创建到数据库的`PDO`连接的设置。你可以查阅[`www.php.net/manual/en/book.pdo.php`](http://www.php.net/manual/en/book.pdo.php)获取完整且详细的覆盖信息。\n\
    \n我们很快会将这个程序导入到我们的控制器中。\n\n## 与 Poll 模型共享数据库连接\n\n我们可以使用带参数的构造函数来与`Poll`模型共享数据库连接。\n\
    \n```\ndb property\n$this->db = $dbConnection;\n}\npublic function getPollData()\
    \ {\nreturn $this;\n}\npublic function getPollQuestion() : string {\nreturn $this->poll_question;\n\
    }\npublic function getYes() : int {\nreturn $this->yes;\n}\npublic function getNo()\
    \ : int {\nreturn $this->no;\n}\n}\n?>\nListing 6-8\nNewPoll.class.php\n```\n\n\
    现在构造函数接受指向数据库连接对象的指针，并将其放入`$db`中。接下来，我们将调用`Poll`类的构造函数，并将`PDO`对象指针作为参数传递。暂停一下思考。在我们的代码中，我们应该在哪里加载`Poll`模型？\n\
    \n从`poll`控制器！\n\n```\ngetPollData();\ninclude_once \"views/poll-html.php\";\n\
    ?>\nListing 6-9\nnewestpoll.php\n```\n\n现在，我们已经将数据库连接传递给了`Poll`模型。代码共享了一个数据库连接，但目前还没有使用它做任何事情。让我们更新`index.php`文件，以包含我们的数据库连接。\n\
    \n```\nsetTitle(\"PHP/MySQL site poll example\");\ninclude_once \"models/database.php\"\
    ;\ninclude_once \"controllers/newestpoll.php\";\n$pageData->setContent($info);\n\
    require \"views/page.php\";\necho $page;\n?>\nListing 6-10\nnewestpollindex.php\n\
    ```\n\n只有少数几个小改动。`database.php`程序已被包含，控制器已更新到最新版本。如果我们执行这个索引文件，在输出中不会看到任何变化。然而，我们已经连接到了数据库并传递了指向数据对象的指针。我们离一个完整的程序越来越近了！\n\
    \n变量`$db`在`newestpollindex.php`中声明。它在`newestpoll.php`中可用，因为它是在`newestpollindex.php`中被包含的。包含一个文件很像将代码从一个文件复制并粘贴到另一个文件中。因此，在任何包含文件中声明的所有变量都可以在其他被包含的文件中使用，只要这些文件是在之后被包含的。\n\
    \n## 使用 PDOStatement 检索数据\n\n在数据库内部，我们有一个`poll`表，包含`poll_question`以及`yes`和`no`属性的值。我们准备从数据库中检索数据。\n\
    \n请记住，处理轮询数据的代码属于`Poll`模型。因此，我们需要修改`Poll`类中的`getPollData`方法。目前，该方法返回硬编码的轮询数据；我们希望返回基于数据库驱动的轮询数据。\n\
    \n```\n?php\n//complete code for models/Poll.class.php\nclass Poll {\nprivate\
    \ $db;\n//method requires a database connection as argument\npublic function __construct(\
    \ $dbConnection ){\n//store the received connection in the $this->db property\n\
    $this->db = $dbConnection;\n}\npublic function getPollData() {\n$sql = \"SELECT\
    \ poll_question, yes, no FROM poll WHERE poll_id = 1\";\n$statement = $this->db->prepare($sql);\n\
    $statement->execute();\n$pollData = $statement->fetchObject();\nreturn $pollData;\n\
    }\n}\n?>\nListing 6-11\nNewestPoll.class.php\n```\n\n`Poll`类实际上变成了一个更小的程序。我们不再需要存储问题和响应的值，因为我们正在将包含来自数据库信息的对象传递回调用程序。因此，属性和`get`方法不再需要。只需要几行代码就可以检索到我们的信息。\n\
    \n```\n$sql = \"SELECT poll_question, yes, no FROM poll WHERE poll_id = 1\";\n\
    ```\n\n属性`$sql`包含用于检索所需信息的 SQL 语句。\n\n```\n$statement = $this->db->prepare($sql);\n\
    ```\n\nSQL 字符串在执行前被转换为`PDOStatement`对象。`prepare()`将一个简单的 SQL 字符串转换为`PDOStatement`对象。\n\
    \n```\n$statement->execute();\n```\n\n`PDOStatement`方法`execute()`针对 MySQL/MariaDB\
    \ 数据库执行 SQL。\n\n```\n$pollData = $statement->fetchObject();\n```\n\n`fetchObject()`从查询的数据库表中检索一行数据，创建一个`StdClass`对象（`$pollData`）。这个对象将公开暴露我们检索到的所有数据。然而，这并不是什么安全问题，因为我们原本就打算向所有人显示这些数据。如果我们打算使用这些数据更新数据库，则需要使用更安全的方法。返回的`StdClass`对象会自动创建属性`poll_question`、`yes`和`no`。\n\
    \n```\nreturn $pollData;\n```\n\n该对象被返回给调用程序（`finalpoll.php`）。\n\n> **注意**  \n\
    > 你可以在[`www.php.net/manual/en/class.pdostatement.php`](http://www.php.net/manual/en/class.pdostatement.php)查阅`PDOStatement`对象的官方文档。\n\
    \n```\ngetPollData();\ninclude_once \"views/finalpoll-html.php\";\n?>\nListing\
    \ 6-12\nfinalpoll.php\n```\n\n`finalpoll.php`仅被修改为调用更新后的`Poll`类和一个略有修改的 HTML 视图。\n\
    \n```\nPoll results\n\n$pollData->yes said yes\n $pollData->no said no\n\n\";\n\
    ?>\nListing 6-13\nfinalpoll-html.php\n```\n\n由于从数据库返回的是一个`StdObject`，我们可以直接访问属性而无需使用`get`方法。因此，视图程序（`finalpoll-html.php`）发生了一个小变化。\n\
    \n```\nsetTitle(\"PHP/MySQL site poll example\");\ninclude_once \"models/database.php\"\
    ;\ninclude_once \"controllers/finalpoll.php\";\n$pageData->setContent($info);\n\
    require \"views/page.php\";\necho $page;\n?>\nListing 6-14\nfinalpollindex.php\n\
    ```\n\n索引文件（控制器）也仅被略微修改以调用新版本的轮询控制器。如果我们在浏览器中执行`finalpollindex.php`程序，会发现与图 6-12\
    \ 相同的输出格式。然而，一个重要的区别是现在数据是从数据库中提取的。一个真正的数据库驱动的网站！\n\n## 显示轮询表单\n\n我们还没有一个像样的站点轮询。站点访问者应该被允许提交他们的意见，从而为轮询结果做出贡献。我们必须为站点访问者提供一个表单。请记住，所有显示都是视图。那么，让我们更新视图，不仅要显示轮询结果，还要接受站点访问者的意见。\n\
    \n```\n\n$pollData->poll_question\n\nYes, it is!\nNo, not really!\n\nPoll results\n\
    \n$pollData->yes said yes\n$pollData->no said no\n\n\";\n?>\nListing 6-15\ncompletepoll-html.php\n\
    ```\n\n```\n$dataFound = isset( $pollData );\nif( $dataFound === false ){\ntrigger_error(\
    \ 'views/completepoll-html.php needs an $pollData object' );\n}\n```\n\n为了提高程序的可靠性，我们添加了一个`if`语句，用于判断`$pollData`信息是否被正确创建。我们之前假设它总是被正确创建的。但永远不要假设。始终要预料到意外情况，并检查可能出错的情况。`trigger_error`将创建一个自定义错误消息。当表单在其他程序（如控制器）中使用时，你可以创建一个`try/catch`来捕获这个可能的错误。\n\
    \n```\nform method='post' action='completepollindex.php'>\n$pollData->poll_question\n\
    \nYes, it is!\nNo, not really!\n\n```\n"
- fmt: "# A form was created to obtain the customer’s opinion.\n\nOnce the customer\
    \ responds by clicking the submit button, the response is passed, via `post`,\
    \ to the index (controller).\n\n## Updating a Database Table According to Form\
    \ Input\n\nThere is one final step required to complete the site poll example.\
    \ We need to retrieve any user input submitted through the form and update the\
    \ poll table with the received input. If a site visitor submits a `no`, we will\
    \ increment the value of the `no` attribute in the poll database table.\n\nAll\
    \ data interactions are a task for a model. Let’s update the poll model class\
    \ with a method for updating the database table.\n\n```\ndb property\n$this->db\
    \ = $dbConnection;\n}\npublic function getPollData() {\n$sql = \"SELECT poll_question,\
    \ yes, no FROM poll WHERE poll_id = 1\";\n$statement = $this->db->prepare($sql);\n\
    $statement->execute();\n$pollData = $statement->fetchObject();\nreturn $pollData;\n\
    }\npublic function updatePoll ( $input ) {\nif ( $input === \"yes\" ) {\n$updateSQL\
    \ = \"UPDATE poll SET yes = yes+1 WHERE poll_id = 1\";\n} else if ( $input ===\
    \ \"no\" ) {\n$updateSQL = \"UPDATE poll SET no = no+1 WHERE poll_id = 1\";\n\
    }\n$updateStatement = $this->db->prepare($updateSQL);\n$updateStatement->execute();\n\
    }\n}\n?>\n```\n\nThe new method `updatePoll()` is similar to the `getPollData`\
    \ method. However, if the user submitted a `yes`, we format an SQL string that\
    \ can update the `yes` attribute in the poll table. If the user submitted a `no`,\
    \ we format a different SQL string to update the `no` attribute. Notice that the\
    \ yes or no values are incremented by one to add the user’s choice into the proper\
    \ location in the database table. Whichever SQL string is created, it is stored\
    \ in a variable called `$updateSQL`. Once the `$updateSQL` string is created,\
    \ we again use the PDO method `prepare()` to convert the SQL string to a `PDOStatement`\
    \ object, which is stored in the variable `$updateStatement`. We then call `execute()`\
    \ to update the poll table.\n\n### Secure Programming\n\nWe should always be aware\
    \ that a hacker can attempt to use *SQL Injection* to corrupt our tables and databases.\
    \ SQL Injection is an attempt to insert SQL statements into a program’s use of\
    \ SQL to insert or update data in the database. In future chapters, we will use\
    \ prepared statements to create our SQL commands, which will reduce the possibility\
    \ of successful injection. We will also validate the data before making any updates\
    \ to the database. In the previous example, we did not use any information gathered\
    \ from the user to format the SQL statement. Thus, the SQL statement created was\
    \ secure and resistant to SQL Injection.\n\n## Responding to User Input\n\nControllers\
    \ are responsible for dealing with user interactions. So, the `poll controller`\
    \ is the right place to intercept user input from the poll form. There are a couple\
    \ of things to add to the script.\n\n```\nupdatePoll( $input );\n}\n$pollData\
    \ = $poll->getPollData();\ninclude_once \"views/completepoll-html.php\";\n?>\n\
    ```\n\n```\n//check if form was submitted\n$isPollSubmitted = isset( $_POST['user-input']\
    \ );\n//if it was just submitted...\nif ( $isPollSubmitted ) {\n```\n\nWe will\
    \ use the `isset` method to determine if the user has chosen to give their opinion\
    \ in the survey. If they have, we will update the results.\n\n```\n//get input\
    \ received from form\n$input = $_POST['user-input'];\n//...update model\n$poll->updatePoll(\
    \ $input );\n}\n```\n\nIf they did, we will retrieve the value selected and place\
    \ it into `$input`. Then we will pass that value to the `updatePoll` method, which\
    \ will make the changes to the database table.\n\n```\n$pollData = $poll->getPollData();\n\
    include_once \"views/completepoll-html.php\";\n```\n\nWhether or not the user\
    \ provides their opinion, the program will get the current poll results and display\
    \ them by calling the HTML page.\n\n**Note**: A minor change has occurred to the\
    \ index (controller) program to call `completepoll.php`. You can view this change\
    \ in the files downloaded from the publisher’s website.\n\nTo see the results,\
    \ run `completepollindex.php` in the browser.\n\n![An application output (completepollindex.php)\
    \ shows PHP and Poll results: 2 said YES, and 0 said NO.](images/323857_3_En_6_Chapter/323857_3_En_6_Fig13_HTML.jpg)\
    \  \n**Figure 6-13** Output from completepollindex.php\n\nWe now have a completely\
    \ functional poll site! There is one weakness to this final version. Can you see\
    \ it? Once the user has entered their opinion, the program allows them to enter\
    \ it again. How can this be corrected? We can change the output to only display\
    \ the question the first time the page is shown. Once the opinion has been given,\
    \ then we can display the page that does not ask the question again, but does\
    \ display the results. We can change the results to use `finalpoll-html.php` which\
    \ was created earlier. This will require just a change to the include statement\
    \ discussed earlier.\n\n**Exercise**: Adjust the final poll project to accept\
    \ more than one input from the user. Adjust the controller, model, and view to\
    \ request, store, and display this information.\n\n## Summary\n\nIn this chapter,\
    \ we’ve learned the basics of SQL statements, as well as how to interact with\
    \ a database using PHP. We learned how MVC provides a logical structure to creating\
    \ programs which require data and interfaces. In the next chapters, we’ll learn\
    \ how to build a blog with a basic entry manager that will allow us to create,\
    \ modify, and delete entries, as well as display them on a public page.\n\n##\
    \ Projects\n\n1. The power of MVC design is the ability to change the model or\
    \ view with little or no changes to the other components of the project. Review\
    \ the PHP documentation ([`www.php.net/manual/en/function.file.php`](http://www.php.net/manual/en/function.file.php))\
    \ on reading and writing to files. Change the model code from the examples to\
    \ read and store the poll information into a file, instead of a database. You\
    \ should be able to make these changes within very minimal changes to the controller\
    \ or the viewer. Most of your changes should occur within the model.\n2. Visit\
    \ [`www.w3schools.in/laravel-tutorial/`](http://www.w3schools.in/laravel-tutorial/)\
    \ and discover how Laravel can help create robust data-driven web applications\
    \ using PHP and other tools.\n\n# 7. Building the Basic Blog System\n\n## Objectives\n\
    \nAfter completing this chapter, you will be able to:\n\n- Create a view, containing\
    \ an HTML form to accept a new blog entry\n- Create a controller, to handle input\
    \ from the form\n- Create a model, to save and retrieve any entry using a database\
    \ table\n- Design and create a MySQL/MariaDB database with a table\n- Use a design\
    \ pattern for the front controller\n- Use the table data gateway design pattern\
    \ for database access\n- Use a `while` loop to iterate through a data set\n\n\
    In this chapter, we will begin to build our blog system. We will start by creating\
    \ an entry manager (front controller). We will create two front pages for the\
    \ blog system, one for the administrator and one for the user. By the end of the\
    \ chapter, the basic blog system will be able to save new blogs and display all\
    \ entries stored within a database. Along the way, we will use the concepts and\
    \ topics we have previously covered: database design, SQL, and MVC. We will also\
    \ learn new techniques including design practices and prepared SQL statements.\n\
    \n### Creating the blog_entry Database Table\n\nOne of the most important steps\
    \ with any new application is the planning of the tables that will hold data.\
    \ This has an enormous impact on the ease of scaling the application later. *Scaling*\
    \ is the expansion of an application to manage more information and/or users,\
    \ and it can be a tremendous pain, if we do not look ahead when starting a new\
    \ project. At first, the blog needs to store several types of entry information\
    \ to function, including the following:\n\n- Unique ID\n- Entry title\n- Entry\
    \ text\n- Date created\n\nThe first step is to determine the types of fields for\
    \ the entries table."
