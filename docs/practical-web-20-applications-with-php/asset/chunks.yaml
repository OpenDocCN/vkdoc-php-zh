    **Showing and Hiding Elements**


    As we saw before, the show() method makes a hidden element visible (or does nothing
    if the element is already visible), while the hide() method hides a visible element
    hidden (or does nothing if the element is already hidden).


    In addition, there is a toggle() method. This will hide a visible element or show
    a hidden element. You can check whether an element is hidden or not by using the
    visible() method, which returns true if the element is visible and false if not.


    Additionally, you can remove an element from the DOM completely by calling its
    remove() method.


    **Retrieving Dimensions of Elements**


    Prototype provides a method called getDimensions(), which returns the width and
    height of an element (in the width and height properties). You can retrieve an
    element’s width by just using getWidth(), or its height by using getHeight(),
    but if you need both of these values you should use a single call to getDimensions().
    This is because both getWidth() and getHeight() will internally make a call to
    getDimensions(), thereby resulting in an extra unnecessary function call.


    The following example shows a simple function that accepts the ID of an element
    and then determines and displays its dimensions in an alert box:


    <script type="text/javascript">


    function displayDimensions(id)


    {


    var dims = $(id).getDimensions();


    alert(''This size of this box is '' + dims.width + ''x'' + dims.height);


    }


    </script>


    **Managing Classes of Elements**


    You can easily manipulate an element’s classes with Prototype, which may be of
    great use for achieving mouseover effects or to allow the user to mark an item
    as selected.


    The following functions are available to elements:


    • addClassName(): Applies a class to an element. This might be useful if you have
    a highlight class for a selected element.


    • removeClassName(): Removes a class from an element. This would typically be
    used at some point after calling addClassName().


    • toggleClassName(): Adds or removes a class name (if the element doesn’t have
    the class, it is added; it is removed if the element already has it).


    • hasClassName(): Checks whether an element has a particular class.


