  \ [`leanpub.com/freelancedeveloperbook`](https://leanpub.com/freelancedeveloperbook?a=0_YKAEBrn4BvyagDZlmBZy&subID=b)\
  \ |\n\n### 10.10 部署框架\n\n`PHP` 有许多编码框架，其中许多可以用于 `CLI` 应用程序，尽管只有一个框架是专门为非 Web 编程创建或针对其开发的。各种框架中的代码可能假定它将在与\
  \ `http` 相关的上下文中被调用，因此你可能需要额外的工作来规避这一点。在决定是否使用框架，或者使用哪个框架时，你应该考虑它们的适用性（就其对 Web 的关注程度而言），以及你的应用程序性能是否会因为它们可能带来的开销而受到影响。你通常还需要查看它们的许可证，因为它们通常包含需要与你的脚本一起发布的组件。这并不是说它们在通用编程中没有用处，例如，许多框架实现了模型-视图-控制器（MVC）设计模式，该模式于\
  \ 70 年代在施乐帕克研究中心发明，远在 Web 出现之前。然而，目前你的作者无法具体推荐任何专门用于非 Web 项目的框架。\n\n| ![信息](img/image00248.jpeg)\
  \ | **延伸阅读** 面向 `CLI` 的 `PHP` 框架 `CLImax` [`github.com/apinstein/climax/`](https://github.com/apinstein/climax/)\
  \ `PHP` 框架互操作小组 - 标准化框架间的互操作性 [`www.php-fig.org/`](http://www.php-fig.org/) 在 `CLI`\
  \ 脚本中使用 `Zend Framework` 的示例 [`stackoverflow.com/questions/2325338/running-a-zend-framework-action-from-command-line`](http://stackoverflow.com/questions/2325338/running-a-zend-framework-action-from-command-line)\
  \ 框架对比矩阵 [`matrix.include-once.org/framework/`](http://matrix.include-once.org/framework/)\
  \ |\n\n## 11\\. 何去何从？或者说，致谢与反馈\n\n如果你读到了这里，感谢你。我衷心希望这本书引起了你的兴趣，并且至少为你未来的 `PHP` 编程在某些方面提供了参考。如果是这样，我鼓励你现在就基于本书中的一个或多个主题开始编写代码，趁它们在你脑海中还清晰。比我聪明得多的人已经证明，学习后越早进行相关的实践活动，长期记忆信息和技术就越容易。如果你在“现实生活”中使用了本书提出的任何技巧，我会非常感兴趣！最后，如果你还没有奔向键盘，别忘了浏览后面的附录。那里可能有一些对你来说有趣或有用的内容（无论是现在使用还是为了将来了解）。\n\
  \n\n\n### 11.1 提供反馈，以及获取帮助与支持\n\n邮箱：author@phpbeyondtheweb.com\n\n我们诚挚地欢迎您就本书提出任何反馈，无论是正面还是负面的，无论是根本性的还是琐碎的。请告诉我您对本书的整体或某个特定章节的看法。如果您觉得某些内容介绍得不够深入（或过于详细），或者您期望的某个主题未被涵盖，又或者某些信息阐述得不够清晰，也请告知。同样，如果您在运行示例代码时遇到问题，或在实现书中讨论的技术时遇到困难，请随时给我发邮件，我会看看能否提供帮助。\n\
  \n### 11.2 你读的是“盗版”吗？\n\n在我的生活中，也曾阅读过一些“未经授权”的书籍；有时是因为我买不起，有时是因为无法通过合法渠道（本地书店、在线销售、图书馆）轻松获得，或者（对于电子书）是因为数字版权管理（DRM）阻挠了我在我拥有的设备上阅读它们。所以我非常理解您可能处于这种情况，并且我无意批评您的选择。如果您暂时无力购买本书，或许可以考虑在将来有能力时再购买。与此同时，我请求您帮我一个忙——请考虑向那些有能力购买本书的人推荐，尝试在线写书评，或以其他方式帮忙宣传，以此作为回报。如果您阅读未授权副本是因为其他原因（而非价格）阻碍了您获取正版，请告诉我，我会尽最大努力为您扫除障碍。我希望每个想要购买和阅读本书的人都能毫不费力地做到这一点。这就是为什么我不会在我的作品上使用\
  \ DRM，因为对于每个它阻止的“盗版者”来说（而且不会很多），很可能有十倍之多的正版读者会因此感到困扰。\n\n如果您阅读未授权副本仅仅是因为不想为其付费，那么这便取决于您自己的良知了。\n\
  \n## 附录 A：编译和安装 PHP 及其扩展\n\n有多种方式可以获取 PHP，包括自己下载并编译、下载预编译的二进制文件、使用包管理器和软件仓库，以及寻找由前瞻性系统管理员预先安装好的版本。在大多数\
  \ Linux 发行版上，可以通过一行命令如 `sudo apt-get install php5` 或通过图形化的包管理器（如 Synaptic 包管理器或\
  \ Ubuntu 软件中心）来安装 PHP。许多常见的 PHP 扩展和附加组件同样可以作为预构建包获得，或者通过 PECL 和 PEAR 系统获取。\n\n然而，有时需要花更多功夫来安装\
  \ PHP，例如以下几种情况：\n\n- 当您的项目对特定版本的 PHP 有要求，且该版本与操作系统捆绑的版本不同时\n- 当您需要的扩展没有现成的软件包时\n\
  - 或者当您想根据自身需求编译定制版的 PHP 时。\n\n与任何涉及计算机和软件开发的事情一样，编译 PHP 可能会让你陷入选项、定制化、兼容性问题、库和依赖项的“兔子洞”。关于不同的可能性（以及可能的麻烦），足可以写成一整本书了。幸运的是，在大多数使用情况下，编译标准版本的基础步骤是相当直接的。而且，和生活中大多数事情一样，一旦你做过一次，就会变得更容易。下面的第一部分将介绍获取、编译和安装\
  \ PHP 及其核心扩展所需的步骤。PHP 是用 C 语言编写的，鉴于你们中的许多人可能不熟悉编译 C 程序的过程，我尽力解释了下面的每一步，以让你了解发生了什么。这会使过程看起来略显冗长，但实际上它非常直接。如果你不信，不妨亲自试一试！接下来的部分也值得一读，因为它们涵盖了如何从\
  \ PECL、PEAR 和 Packagist 仓库安装库和扩展等额外内容。\n\n### 编译和安装 PHP 本身\n\nWindows 开发者注意 —— 这些步骤针对\
  \ Linux/Unix 类型系统，并使用操作系统几乎总是自带的免费编译工具。对于 Windows，则需要专有的 Visual Studio 编译器，且步骤有所不同，超出了本书的范围。Windows\
  \ 的源代码、预编译二进制文件以及编译说明可以在 [`windows.php.net/download/`](http://windows.php.net/download/)\
  \ 找到，旧版本则存档于 [`windows.php.net/downloads/releases/archives/`](http://windows.php.net/downloads/releases/archives/)。\n\
  \nOS X 开发者注意 —— 虽然下面的步骤与 Mac 上的类似，但根据您使用的 OS X 版本，可能会遇到一些问题。关于如何在 OS X Mavericks\
  \ 上安装并运行 PHP（及相关软件）的详细介绍，请参考 [`akrabat.com/computing/setting-up-php-mysql-on-os-x-mavericks/`](http://akrabat.com/computing/setting-up-php-mysql-on-os-x-mavericks/)。\n\
  \n在 *nix 机器上，我们的第一步是从 PHP 网站 [`www.php.net/downloads.php`](http://www.php.net/downloads.php)\
  \ 下载 PHP 源代码。此页面列出了当前稳定版和上一个受支持的稳定版。仍在开发中的较新版本可在 [`snaps.php.net/`](http://snaps.php.net/)\
  \ 获取，已停止支持的旧版本可在 [`museum.php.net/`](http://museum.php.net/) 获取。Git 用户也可以从官方镜像 [`github.com/php`](https://github.com/php)\
  \ 拉取源代码。\n\n当您确定了想要下载的版本后，请记下我们稍后将使用的 `.tar.gz` 源代码文件的 URL。\n\n```\n1 ~$ mkdir php5.4\n\
  2 ~$ cd php5.4\n3 ~$ wget http://uk3.php.net/get/php-5.4.6.tar.gz/from/uk.php.net/mirror\
  \ \n4 \t-o php-5.4.6.tar.gz\n5 ~$ tar zxvf php-5.4.6.tar.gz\n6 ~$ cd php-5.4.6\n\
  ```\n\n前两行创建了一个工作目录并进入其中。该目录存放源代码和中间文件，在 PHP 安装完成后，如果需要，可以将其删除。然而，保留它通常是个好主意，以防您之后需要或想要重新安装，或检查您下载的文件版本。第三行将源代码文件的副本下载到我们的目录中。请将第三行中的\
  \ URL 更改为您要使用的 `.tar.gz` 文件的 URL，并将 `-o` 选项后文件名的名称改为您想要的文件名（否则，在上述示例中，`wget` 会简单地将您的文件命名为“mirror”）。第五行将归档文件解包到一个包含各个源代码文件的目录中，请将文件名更改为您在第三行使用的那个。最后，最后一行让我们进入源代码目录。现在，我们开始实际的编译过程。\n\
  \n```\n1 ~$ ./configure\n```\n\n\n\n`configure`命令创建编译的“设置”。我们使用它来提供编译会话所需的设置和参数。例如，我们可以指定希望在构建中包含哪些核心扩展。如果不指定任何参数（如上所示），则将使用\
  \ PHP 开发团队提供的默认值。如果你没有特殊需求，并且希望得到一个与大多数发行版中包含的版本非常相似/兼容的版本，这是一个不错的选择。你也可以在之后单独安装扩展，或者从头开始重新编译\
  \ PHP，这将在下一节中讨论。如果想在此阶段包含一个未包含在默认设置中的扩展，那么这正是执行此操作的地方。例如，如果你想包含`ldap`扩展，则需要将上述命令改为`./configure\
  \ --with-ldap[=DIR]`，其中`[=DIR]`是系统中`ldap`的基础安装目录。要使用的确切选项以及任何必要的依赖项，都可以在 PHP 手册中相关扩展的“安装/配置”部分找到。例如，`ldap`扩展的详细信息可以在[`www.php.net/manual/en/ldap.setup.php`](http://www.php.net/manual/en/ldap.setup.php)找到。可以传递给`configure`命令的选项列表（略有过时）可以在[`www.php.net/manual/en/configure.about.php`](http://www.php.net/manual/en/configure.about.php)找到，或者，要获取当前尝试编译的版本中系统支持的所有选项的完整列表，你可以执行`autoconf`命令，然后执行`./configure\
  \ --help`。关于`configure`命令的更多信息可以在[`www.airs.com/ian/configure/`](http://www.airs.com/ian/configure/)找到。现在我们将实际编译\
  \ PHP。\n\n```\n1 ~$ make clean\n2 ~$ make\n3 ~$ sudo make install\n```\n\n我们使用`make`工具编译\
  \ PHP 二进制文件。第一行删除任何先前创建的文件，并将我们重置到`make`过程的起点。这在首次尝试编译时并非严格必要，但如果你的尝试因某些原因失败（例如缺少依赖项、设置不正确、进程意外中断等），它可能会有所帮助，因此默认包含它通常是一个好选择。第二行执行文件的实际构建和编译。第三行将这些文件接管过来并安装到系统中。默认情况下，PHP\
  \ 通常安装在 Linux 的`/usr/bin`目录中。但是，你可以通过在上述`./configure`阶段指定一个“前缀”目录来选择安装位置。只需添加`--prefix=/path/to/dir`开关，其中`/path/to/dir`是你希望安装\
  \ PHP 的目录。如果你想在同一台机器上安装多个版本，这通常很有用（但请注意，这样做时还有其他考虑因素）。请注意，`make install`行必须以更高的权限（`sudo`）运行，以允许它将文件复制到“特权”位置。\n\
  \n如果一切顺利，恭喜你，你已经安装了 PHP！要检查是否正确安装并可用，请在命令行中使用`php -v`，PHP 将显示当前版本号。如果你将 PHP 安装在搜索路径之外的某个位置，则需要指定完整路径名，例如`/path/to/dir/php\
  \ -v`。要检查安装了哪些扩展和其他选项，请在命令行中使用`php -i`来运行`phpinfo()`函数。除了扩展信息（以及更多其他信息）外，它还会返回与`./configure`命令一起使用的选项列表。这在重新安装\
  \ PHP 或尝试在另一台机器上克隆安装时非常有用（此时不能直接复用相同的二进制文件）。\n\n如果一切不顺利，请仔细查看产生的错误。最常见的错误类型发生在你的系统没有安装特定扩展的相关依赖项时。通常，错误消息会明确说明这一点，但即使它只给出一个晦涩的错误消息并提到某个扩展的名称，最好的建议是仔细检查\
  \ PHP 手册中该扩展的安装部分，以确切了解需要哪些依赖项。通常可以使用系统的包管理器安装缺失的依赖项，而不必手动编译它们。你还应该检查是否在之前的`configure`阶段按要求提供了任何依赖项的位置。\n\
  \n如果其他方法都失败了，请将确切的错误消息复制并粘贴到你最喜欢的互联网搜索引擎中，如果出现多个错误，可能从显示的第一个错误消息开始。很多人已经编译过 PHP，大多数错误都已被遇到并记录在网上。不要让所有这些关于错误的讨论阻止你尝试编译\
  \ PHP。你的配置越复杂，就越容易出现错误，如果你对依赖项足够小心，通常可以完全避免它们。所以，先用默认选项尝试一次简单的编译来熟悉整个过程，然后在此基础上继续！\n\
  \n更多关于安装的信息，虽然主要关注 Web 服务器，但其他方面也有用，可以在 PHP 手册的[`www.php.net/manual/en/install.php`](http://www.php.net/manual/en/install.php)找到。\n\
  \n\n\n### 编译和安装（额外的）核心扩展\n\n正如我们在上一节中看到的，安装核心扩展最常见的方式是在编译主 PHP 安装程序的 `configure`\
  \ 阶段启用相关标志（注意：默认情况下，许多扩展是自动启用的）。然而，后期需要安装额外扩展的情况也并不少见，例如，随着程序需求从最初设计发生改变。有两种方法可以解决这个问题。第一种方法（你会在网上看到很多人推荐）是从头开始重新编译/安装\
  \ PHP，并在 `configure` 阶段添加新需要的模块（在执行 `php -i` 以记住你第一次使用的配置选项之后）。虽然这种方法完全可行，但编译完整的\
  \ PHP 二进制文件有点繁琐，尤其是在较老的 PC 上可能需要很长时间才能完成。不过，有一种捷径。\n\n每个核心扩展实际上都是一个独立的 `.so` 二进制文件，并且可以独立编译。为此，请按照上一节的前几个步骤下载并解压\
  \ PHP 源代码，然后进入该目录。如果你在编译 PHP 本身时没有删除它，那么它应该已经准备好可以使用了。在源代码中有一个名为 `ext` 的目录，其中每个扩展都有各自的独立目录。\n\
  \n```\n1 ~$ cd ext\n2 ~$ ls\n```\n\n这将显示所有可用的核心扩展。例如，如果我们想添加 `pcntl` 扩展（本书中用于守护程序软件），我们可以进入\
  \ `pnctl` 目录，并以类似于上一节中编译整个 PHP 包的方式，仅编译/安装该扩展。\n\n```\n1 ~$ cd pcntl\n2 ~$ phpize\n\
  3 ~$ ./configure\n4 ~$ make clean\n5 ~$ make\n6 ~$ sudo make install\n```\n\n上面用到的额外命令\
  \ `phpize`，用于准备扩展的构建环境。在构建完整的 PHP 二进制文件时不需要它，但在构建单个扩展时需要。如果你发现你的系统上没有 `phpize`，它通常可以通过你的系统包管理器在\
  \ `php-dev` 包中获得（例如，在 Ubuntu 上，它在 `php5-dev` 包中作为 `phpize5` 提供）。关于 `phpize` 以及如何获取它的更多详细信息，请访问\
  \ [`us.php.net/manual/en/install.pecl.phpize.php`](http://us.php.net/manual/en/install.pecl.phpize.php)。\n\
  \n运行完上述命令后，你应该会发现一个 `.so` 文件（在我们的示例中是 `pcntl.so`）已被编译并放置在 PHP 的扩展目录中。最后一步是告诉 PHP\
  \ 这个文件，方法是在你的 `php.ini` 文件中添加以下行：\n\n```\n1 extension=pcntl.so\n```\n\n如果你不确定你的\
  \ `php.ini` 文件在哪里，可以通过在命令行中运行 `php -i | grep \"Loaded Configuration File\"` 来查找。你也可以使用\
  \ `php -i` 来检查你的扩展现在是否已正确安装并可供使用。\n\n### 安装多个版本的 PHP\n\n有时（尤其是在开发机器上），你可能希望同时安装多个版本的\
  \ PHP，例如，当你部署给已经安装了 PHP 但版本可能不同的最终用户时。实现这一点的一种直接方法是创建一组虚拟机（我使用 VirtualBox 来实现这一点），每个虚拟机中安装不同版本的\
  \ PHP。在这种场景下，你总能确定你正在运行哪个版本，并且一个版本的安装和配置不会干扰另一个版本。缺点是启动和关闭不同的虚拟机可能很慢（或者同时运行所有虚拟机对资源消耗很大），而且如果你使用的是\
  \ Windows 等专有操作系统，可能会产生额外的许可费用。正如我在前一节中指出的，可以在同一台机器上直接安装并运行多个版本。然而，如果你不小心，试图保持各个版本及其依赖项相互分离，并确保你始终知道正在使用哪个版本，可能会变成一场噩梦。因此，我不打算在本书中深入探讨这个问题。不过，下面有两篇来自备受尊敬的\
  \ PHP 社区成员的文章，他们正是这样做的，这可能会给你提供一些关于如何操作以及所涉及陷阱的指导。我建议在你尝试此操作之前，要非常熟悉编译和安装 PHP、PHP\
  \ 使用的文件和目录结构及位置，以及如何检查正在运行的 PHP 和扩展的版本。\n\n下面还列出了一些相关的工具。第一个是 `php-build`，它可以自动从源代码构建多个\
  \ PHP 版本，不过你仍然需要小心地同时安装和使用它们。第二个是 3v4l.org，这是一个 Web 服务，允许你同时在 90 多个 PHP 版本中测试代码片段。这可能会完全省去安装多个版本的需要。最后一个工具是一个库，它可以模拟新版\
  \ PHP 中的许多函数，以便在旧版本中使用。\n\n| ![信息](img/image00248.jpeg) | **延伸阅读** |\n| --- | ---\
  \ |\n| | 安装多个版本，使用 SVN [`derickrethans.nl/multiple-php-version-setup.html`](http://derickrethans.nl/multiple-php-version-setup.html)\
  \ |\n| | 安装多个版本，使用 GIT [`mark-story.com/posts/view/installing-multiple-versions-of-php-from-source`](http://mark-story.com/posts/view/installing-multiple-versions-of-php-from-source)\
  \ |\n\n| ![](img/image00249.gif) | **`php-build`** |\n| --- | --- |\n| | `php-build`\
