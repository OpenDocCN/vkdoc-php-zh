  trans: "\n# PHP 方案 13-4：使用 MySQLi 更新记录\n\n本 PHP 方案演示了如何将现有记录加载到更新表单中，然后将编辑后的详情发送到数据库，使用\
    \ MySQLi 进行更新。要加载记录，您需要先创建列出所有记录的管理页面，如 PHP 方案 13-3 所述。\n\n将 `ch13` 文件夹中的 `blog_update_mysqli_01.php`\
    \ 复制到 `admin` 文件夹中，并保存为 `blog_update_mysqli.php`。第一阶段涉及检索要更新的记录的详细信息。将以下代码放在 `DOCTYPE`\
    \ 声明上方的 PHP 代码块中：\n\n```php\nrequire_once '../includes/connection.php';\n\n//\
    \ 初始化标志\n$OK = false;\n$done = false;\n\n// 创建数据库连接\n$conn = dbConnect('write');\n\
    \n// 初始化语句\n$stmt = $conn->stmt_init();\n\n// 获取所选记录的详细信息\nif (isset($_GET['article_id'])\
    \ && !$_POST) {\n    // 准备 SQL 查询\n    $sql = 'SELECT article_id, title, article\n\
    \            FROM blog WHERE article_id = ?';\n    if ($stmt->prepare($sql)) {\n\
    \        // 绑定查询参数\n        $stmt->bind_param('i', $_GET['article_id']);\n   \
    \     // 执行查询，并获取结果\n        $OK = $stmt->execute();\n        // 将结果绑定到变量\n  \
    \      $stmt->bind_result($article_id, $title, $article);\n        $stmt->fetch();\n\
    \    }\n}\n\n// 如果未定义 $_GET['article_id'] 则重定向\nif (!isset($_GET['article_id']))\
    \ {\n    header('Location: http://localhost/phpsols/admin/blog_list_mysqli.php');\n\
    \    exit;\n}\n\n// 如果查询失败，获取错误信息\nif (isset($stmt) && !$OK && !$done) {\n   \
    \ $error = $stmt->error;\n}\n```\n\n虽然这与插入页面使用的代码非常相似，但前几行位于条件语句之外。更新过程的两个阶段都需要数据库连接和预处理语句，这样可以避免稍后重复相同的代码。初始化了两个标志：`$OK`\
    \ 用于检查记录检索是否成功，`$done` 用于检查更新是否成功。\n\n第一个条件语句确保 `$_GET['article_id']` 存在且 `$_POST`\
    \ 数组为空。因此，仅在设置了查询字符串但表单尚未提交时，才会执行大括号内的代码。\n\n准备 `SELECT` 查询的方式与 `INSERT` 命令相同，使用问号作为变量的占位符。但是，请注意，查询并未使用星号检索所有列，而是按名称指定了三列，如下所示：\n\
    \n```sql\n$sql = 'SELECT article_id, title, article\n        FROM blog WHERE article_id\
    \ = ?';\n```\n\n这是因为 MySQLi 预处理语句允许您将 `SELECT` 查询的结果绑定到变量，为此必须指定所需的列名及其顺序。\n\n\
    首先，需要初始化预处理语句，并使用 `$stmt->bind_param()` 将 `$_GET['article_id']` 绑定到查询。由于 `article_id`\
    \ 的值必须是整数，因此将 `'i'` 作为第一个参数传递。\n\n代码执行查询，然后按 `SELECT` 查询中指定的列顺序将结果绑定到变量，最后获取结果。\n\
    \n下一个条件语句在未定义 `$_GET['article_id']` 时，将页面重定向到 `blog_list_mysqli.php`。这可以防止任何人尝试直接在浏览器中加载更新页面。\n\
    \n最后一个条件语句在已创建预处理语句，但 `$OK` 和 `$done` 仍为 `false` 时，存储一条错误消息。您尚未添加更新脚本，但如果记录检索或更新成功，其中一个标志将变为\
    \ `true`。因此，如果两者仍为 `false`，则说明某个 SQL 查询出现问题。\n\n现在已检索到记录的内容，需要在更新表单中显示它们。如果预处理语句成功，`$article_id`\
    \ 应包含要更新的记录的主键，因为它是您使用 `bind_result()` 方法绑定到结果集的变量之一。\n\n但是，如果出现错误，则需要在屏幕上显示消息。但如果有人将查询字符串更改为无效数字，`$article_id`\
    \ 将设置为 `0`，因此显示更新表单毫无意义。在开头 `<form>` 标签之前立即添加以下条件语句：\n\n```php\n<p><a href=\"\
    blog_list_mysqli.php\">列出所有条目</a></p>\n\n<?php if (isset($error)) {\n    echo\
    \ \"<p class='warning'>错误：$error</p>\";\n}\n\nif($article_id == 0) { ?>\n    <p\
    \ class=\"warning\">无效请求：记录不存在。</p>\n<?php } else { ?>\n    <form name=\"form1\"\
    \ method=\"post\" action=\"\">\n```\n\n第一个条件语句显示由 MySQLi 预处理语句报告的任何错误消息。第二个条件语句将更新表单包裹在\
    \ `else` 块中，因此如果 `$article_id` 为 `0`，表单将被隐藏。\n\n在结束 `</form>` 标签后立即添加 `else` 块的闭合花括号，如下所示：\n\
    \n```php\n</form>\n<?php } ?>\n</body>\n```\n\n如果 `$article_id` 不为 `0`，则可知 `$title`\
    \ 和 `$article` 也包含有效值，并且无需进一步测试即可在更新表单中显示。但是，需要将文本值传递给 `htmlentities()` 以避免显示引号时出现问题。按如下所示在\
    \ `title` 输入字段的 `value` 属性中显示 `$title`：\n\n```php\n<input name=\"title\" type=\"\
    text\" id=\"title\" value=\"<?= htmlentities($title); ?>\">\n```\n\n对 `article`\
    \ 文本区域执行相同操作。由于文本区域没有 `value` 属性，因此代码位于开始和结束 `<textarea>` 标签之间，如下所示：\n\n```php\n\
    <textarea name=\"article\" id=\"article\"><?= htmlentities($article); ?></textarea>\n\
    ```\n\n确保开始和结束的 PHP 标签与 `<textarea>` 标签之间没有空格。否则，在更新后的记录中会出现不需要的空格。\n\n`UPDATE`\
    \ 命令需要知道要更改记录的主键。需要将主键存储在隐藏字段中，以便它与其他详细信息一起在 `$_POST` 数组中提交。由于隐藏字段不会在屏幕上显示，以下代码可以放在表单内的任何位置：\n\
    \n```php\n<input name=\"article_id\" type=\"hidden\" value=\"<?= $article_id;\
    \ ?>\">\n```\n\n保存更新页面，并通过在浏览器中加载 `blog_list_mysqli.php` 并为其中一个记录选择 `EDIT` 链接来进行测试。记录的内容应显示在表单字段中，如图\
    \ 13-3 所示。\n\n`Update Entry` 按钮目前尚未执行任何操作。只需确保所有内容都正确显示，并确认主键已注册到隐藏字段中。如有必要，可以对照\
    \ `blog_update_mysqli_02.php` 检查代码。\n\n提交按钮的 `name` 属性为 `update`，因此所有更新处理代码都需要放在一个条件语句中，该语句检查\
    \ `$_POST` 数组中是否存在 `update`。将以下以粗体突出显示的代码立即放置在步骤 1 中重定向页面的代码上方：\n\n```php\n$stmt->fetch();\n\
    \    }\n}\n\n// 如果表单已提交，则更新记录\nif (isset($_POST ['update'])) {\n    // 准备更新查询\n\
    \    $sql = 'UPDATE blog SET title = ?, article = ?\n            WHERE article_id\
    \ = ?';\n    if ($stmt->prepare($sql)) {\n        $stmt->bind_param('ssi', $_POST['title'],\
    \ $_POST['article'],\n                          $_POST['article_id']);\n     \
    \   $done = $stmt->execute();\n    }\n}\n\n// 成功时或未定义 $_GET['article_id'] 时重定向页面\n\
    if ($done || !isset($_GET['article_id'])) {\n```\n\n`UPDATE` 查询使用问号占位符进行准备，这些占位符将由变量提供值。预处理语句已在条件语句外的代码中初始化，因此可以将\
    \ SQL 传递给 `prepare()` 方法，并使用 `$stmt->bind_param()` 绑定变量。前两个变量是字符串，第三个是整数，因此第一个参数是\
    \ `'ssi'`。\n"
- fmt: "If the `UPDATE` query succeeds, the `execute()` method returns `true`, resetting\
    \ the value of `$done`. Unlike an `INSERT` query, using the `affected_rows` property\
    \ has little meaning because it returns `0` if the user decides to click the `Update\
    \ Entry` button without making any changes, so we won’t use it here. You need\
    \ to add `$done ||` to the condition in the redirect script. This ensures that\
    \ the page is redirected if either the update succeeds or someone tries to access\
    \ the page directly.\n\nSave `blog_update_mysqli.php` and test it by loading `blog_list_mysqli.php`,\
    \ selecting one of the `EDIT` links, and making changes to the record that is\
    \ displayed. When you click `Update Entry`, you should be taken back to `blog_list_mysqli.php`.\
    \ You can verify that your changes were made by clicking the same `EDIT` link\
    \ again. Check your code, if necessary, with `blog_update_mysqli_03.php`.\n\n\
    ### PHP Solution 13-5: Updating a Record with PDO\n\nThis PHP solution shows how\
    \ to load an existing record into the update form and then send the edited details\
    \ to the database for updating using PDO. To load the record, you need to have\
    \ created the management page that lists all records, as described in PHP Solution\
    \ 13-3.\n\nCopy `blog_update_pdo_01.php` from the `ch13` folder and save it in\
    \ the `admin` folder as `blog_update_pdo.php`. The first stage involves retrieving\
    \ the details of the record that you want to update. Put the following code in\
    \ a PHP block above the `DOCTYPE` declaration:\n\n```php\nrequire_once '../includes/connection.php';\n\
    \n// initialize flags\n$OK = false;\n$done = false;\n\n// create database connection\n\
    $conn = dbConnect('write', 'pdo');\n\n// get details of selected record\nif (isset($_GET['article_id'])\
    \ && !$_POST) {\n    // prepare SQL query\n    $sql = 'SELECT article_id, title,\
    \ article FROM blog WHERE article_id = ?';\n    $stmt = $conn->prepare($sql);\n\
    \    // pass the placeholder value to execute() as a single-element array\n  \
    \  $OK = $stmt->execute([$_GET['article_id']]);\n    // bind the results\n   \
    \ $stmt->bindColumn(1, $article_id);\n    $stmt->bindColumn(2, $title);\n    $stmt->bindColumn(3,\
    \ $article);\n    $stmt->fetch();\n}\n\n// redirect if $_GET['article_id'] not\
    \ defined\nif (!isset($_GET['article_id'])) {\n    header('Location: http://localhost/phpsols/admin/blog_list_pdo.php');\n\
    \    exit;\n}\n\n// store error message if query fails\nif (isset($stmt) && !$OK\
    \ && !$done) {\n    $errorInfo = $stmt->errorInfo();\n    if (isset($errorInfo[2]))\
    \ {\n        $error = $errorInfo[2];\n    }\n}\n```\n\nAlthough this is very similar\
    \ to the code used for the insert page, the first few lines are outside the first\
    \ conditional statement. Both stages of the update process require the database\
    \ connection, so this avoids the need to duplicate the same code later. Two flags\
    \ are initialized: `$OK` to check the success of retrieving the record and `$done`\
    \ to check whether the update succeeds.\n\nThe first conditional statement checks\
    \ that `$_GET['article_id']` exists and that the `$_POST` array is empty. This\
    \ makes sure that the code inside is executed only when the query string is set,\
    \ but the form hasn’t yet been submitted.\n\nWhen preparing the SQL query for\
    \ the insert form, you used named placeholders for the variables. This time, let’s\
    \ use a question mark, like this:\n\n```sql\n$sql = 'SELECT article_id, title,\
    \ article FROM blog WHERE article_id = ?';\n```\n\nThere’s only one variable that\
    \ needs to be bound to the anonymous placeholder, so pass it directly to the `execute()`\
    \ method as a single-element array, like this:\n\n```php\n$OK = $stmt->execute([$_GET['article_id']]);\n\
    ```\n\n**Caution**: This code uses the array shorthand syntax, so `$_GET['article_id']`\
    \ is wrapped in a pair of square brackets. Don’t forget the array’s closing square\
    \ bracket.\n\nThe results are then bound to `$article_id`, `$title`, and `$article`\
    \ with the `bindColumn()` method. This time, I have used numbers (counting from\
    \ 1) to indicate which column to bind each variable to.\n\nThere’s only one record\
    \ to fetch in the result, so the `fetch()` method is called immediately.\n\nThe\
    \ next conditional statement redirects the page to `blog_list_pdo.php` if `$_GET['article_id']`\
    \ hasn’t been defined. This prevents anyone from trying to load the update page\
    \ directly in a browser.\n\nThe final conditional statement stores an error message\
    \ if the prepared statement has been created, but both `$OK` and `$done` remain\
    \ `false`. You haven’t added the update script yet, but if the record is retrieved\
    \ or updated successfully, one of them will be switched to `true`. So if both\
    \ remain `false`, you know there was something wrong with one of the SQL queries.\n\
    \nNow that you have retrieved the contents of the record, you need to display\
    \ them in the update form. If the prepared statement succeeded, `$article_id`\
    \ should contain the primary key of the record to be updated, because it’s one\
    \ of the variables you bound to the result set with the `bindColumn()` method."
