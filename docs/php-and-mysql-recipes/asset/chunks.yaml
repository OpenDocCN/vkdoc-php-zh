    printf("Temperature: %3.1f K / %3.1f C / %3.1f F\n", $k, $c, $f); echo "Wind:
    {$weather->wind->speed} mph, direction: {$weather->wind->deg}\n"; 323


    CHAPTER 15 ■ DATA EXCHANGE WITH JSON


    This script will generate output similar to the code in example 14_4.php.


    City: Los Angeles


    Temperature: 290.7 K / 17.6 C / 63.7 F


    Wind: 1.31 mph, direction: 201.001


    Recipe 15-4\. JSON API


    Problem


    When a client consumes API’s from multiple sources it’s common that each source
    has its own definition for how the content is formatted and which elements are
    included in the response. This makes it more difficult to work with these API’s.


    Solution


    In 2015 a new standard called JSON API reached version 1.0\. This standard defines
    all the headers and other information about how API requests and responses should
    be formatted. The standard is documented at


    [http://jsonapi.org . The goal is to impr](http://jsonapi.org/)ove caching and
    thereby reduce the amount of network traffic required to interact with the API’s.
    Less network traffic makes it possible to serve a greater number of users on the
    same hardware.


    The basic structure of all API’s is a JSON structure with one or more of these
    three top-level objects; data, errors, and meta. In addition it is also allowed
    to include jsonapi, links, and includes as top-level objects.


    The data object should contain the primary data for the response. This can be
    a single object or null for API’s returning a single resource and an array of
    objects or an empty array for API’s returning a list of resources.


    A simple response of an API to get the number of visitors to a site could look
    like this:


    {


    ''data'': {


    ''type'': ''statistics'',


    ''id'': ''visitors'',


    ''attributes'': {


    ''value'': 25


    }


    }


    }


    Each resource must include type and id and they must be strings. A link object
    can be added to the top level to show the link to the API.


    {


    ''data'': {


    ''type'': ''statistics'',


    ''id'': ''visitors'',


    ''attributes'': {


    ''value'': 25


    CHAPTER 15 ■ DATA EXCHANGE WITH JSON


    }


    },


    ''links'': {


    ''self'': "http://localhost/statistics/visitors"


    }


    The link section can also be used to reference other data in the same dataset.
    If the API returns a single blog post and you want to link to the next, previous,
    first, and list posts in the same series the response could look like this:


    {


    ''data'': {


    ''type'': ''articles'',


    ''id'': ''5'',


    ''attributes'': {


    ''title'': ''PHP and MySQL Recipes''


    }


    },


    ''links'': {


    ''self'': "http://localhost/articles/5",


    ''next'': "http://localhost/articles/6",


    ''prev'': "http://localhost/articles/4",


    ''first'': "http://localhost/articles/1",


    ''last'': "http://localhost/articles/17"


    }


    All requests and responses must use the Content-Type: application/vnd.api+json
    and the standard also describes how to handle related data like comments on a
    blog post, etc.


    How it Works


    One of the benefits of using a standard like JSON API is its ability to be handled
    with a common set of tools.


    <?php


    // 15_5.php


    class JsonResource {


    function __construct($type, $id) {


    $this->type = $type;


    $this->id = $id;


    $this->addLink(''self'', "$type/$id");


    }


    function addAttribute($name, $value) {


    if (!$this->attributes) {


    $this->attributes = new stdClass();


    }


    $this->attributes->$name = $value;


    }'
