  trans: '

    ### 打开 XAMPP 控制面板


    在图 1-12 中，我们勾选了“启动控制面板”选项。这将自动显示控制面板（图 1-13）。当你需要打开控制面板时，可以在操作系统的“开始”菜单中找到它。如果它已经启动而你之后需要再次访问，请点击系统托盘（操作系统窗口底部的菜单栏）中的
    XAMPP 图标。该图标只有在控制面板首次启动后才会出现。


    ![](img/323857_3_En_1_Fig13_HTML.jpg)


    这个对话框代表 XAMPP 的控制面板，仅当我们选中了前一个对话框中的“现在启动控制面板”选项时才会显示。


    **图 1-13** — 控制面板


    **注意：** 作者已将文件存储在 `xampp8.1.1` 文件夹中，因为演示机器上存在其他版本。你的消息应指示文件存储在 `xampp` 文件夹中。


    在你的开发机器上激活 Apache、PHP 和 MySQL 非常简单，只需在 XAMPP 管理器中点击 Apache 和 MySQL 旁边的“启动”按钮即可。系统可能会提示你确认允许服务器在计算机上运行，并且可能需要你输入系统密码。完成这些操作后，状态应显示
    Apache 正在运行，如图 1-14 所示。


    ![](img/323857_3_En_1_Fig14_HTML.jpg)


    此对话框反映了不同的控制选项，我们可以在此管理所有模块的启动和停止操作，并且还可以查看配置信息。


    **图 1-14** — Apache 和 MySQL 成功运行


    **注意：** XAMPP 中提供了 FTP FileZilla（文件传输协议）选项。FTP 提供了一种在网络之间传输文件的方法。本书中的示例不需要此选项，因此无需在
    XAMPP 控制面板中激活它。Mercury 和 Tomcat 也无需激活。前几章甚至不需要 MySQL 数据库。


    ### 如果 Apache 无法运行怎么办？


    有时，即使你尝试启动，XAMPP 的 Apache 服务器也无法运行。最常见的问题是它与计算机上使用相同*端口*的其他服务发生冲突。请检查你是否正在运行 Skype、Messenger
    或类似的网络服务。请完全关闭它们，运气好的话，Apache 就能运行了。如果你胆子够大，也可以点击控制面板中的“配置”按钮，更改 Apache（或 MySQL）运行的端口。


    如果仍然无法运行，你可以向互联网寻求帮助。XAMPP 在线社区非常有帮助，大多数安装问题已在 Apache Friends 论坛（[`https://community.apachefriends.org/f/`](https://community.apachefriends.org/f/)）中得到解答。你也可以查看
    [`http://stackoverflow.com/`](http://stackoverflow.com/)。请记住，互联网是你的好帮手；肯定有人遇到过同样的问题。如果你收到错误消息，请将其复制并粘贴到浏览器中。你将找到针对你问题的建议解决方案。切勿为解决方案付费。有许多免费网站和博客会提供你正在寻找的答案。


    ### 验证 Apache 和 PHP 是否在运行


    检查 Apache 是否在你的开发机器上正常运行是一件简单的事情。只需打开浏览器并访问以下地址：`http://localhost`。如果一切顺利，你应该会看到一个类似于图
    1-15 的屏幕。


    ![](img/323857_3_En_1_Fig15_HTML.jpg)


    此窗口显示 XAMPP 的欢迎信息，同时还提供了关于我们可以通过它访问哪些模块的完整信息。


    **图 1-15** — Apache 运行正常！


    如果此屏幕加载成功，说明你已经成功在你的开发机器上安装了 Apache 和 PHP！我们尚未检查 MySQL/MariaDB 的状态；我们将在创建使用数据库的程序时检查该状态。地址
    `http://localhost` 是当前所用计算机的别名。使用 XAMPP 时，在浏览器中访问 `http://localhost` 会告诉服务器打开根
    Web 目录。该目录是 XAMPP 安装目录中的 `htdocs` 文件夹。另一种使用服务器访问本地机器根 Web 目录的方法是访问 *IP 地址*（分配给连接到计算机网络的任何设备的数字标识符），该地址是所有
    HTTP 服务器的“主”地址：`http://127.0.0.1`。

