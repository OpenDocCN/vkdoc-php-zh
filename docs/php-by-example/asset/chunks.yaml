  raw: "## Summary\n\n*   A function is a named block of code that can be called by\
    \ the name. The function declaration begins with the `function` keyword, followed\
    \ by the function’s arguments (in parentheses). Then, the commands are enclosed\
    \ in curly braces. The commands are executed when the function is called.\n\n\
    *   A function can return a result. The return value of a function is specified\
    \ after the `return` instruction, which terminates the execution of the function.\n\
    \n*   For a function, you can explicitly specify the type of arguments and the\
    \ type of result.\n\n*   By default, the arguments of functions are passed by\
    \ value (copies of the variables specified as the function arguments are created).\
    \ To pass the arguments by reference, in the function declaration, the name of\
    \ the corresponding argument is preceded by the `&` reference symbol.\n\n*   Arguments\
    \ can have default values (specified through the assignment operator after the\
    \ argument name in the function declaration). The default value is used if no\
    \ value is specified for the argument when the function is called.\n\n*   You\
    \ can create functions with an arbitrary number of arguments. In that case, the\
    \ entire set of arguments is identified with one argument, preceded by an ellipsis\
    \ in the function declaration. The argument is treated as an array.\n\n*   Functions\
    \ can be defined using recursion when the function calls itself (but usually with\
    \ a different argument).\n\n*   The function (syntax construction) `eval()` allows\
    \ you to execute the commands in the string passed as an argument to the function.\n\
    \n*   It is possible to create anonymous functions that do not have a name. An\
    \ anonymous function is assigned to a variable; after that, the variable can be\
    \ called as if it were a function.\n\n*   Starting with PHP 8, arguments can be\
    \ passed by name when calling functions. In that case, you specify the argument’s\
    \ name (without the `$` symbol) and, separated by a colon, the argument’s value\
    \ when calling the function.\n\n# 6. Useful Tricks and Operations\n\n> *Imitation\
    \ is the sincerest form of plagiarism.*\n> \n> —*ALF* (TV series)\n\nThis chapter\
    \ discusses topics that are essential and useful in everyday practice.\n\n## Constants\n\
    \nConstants are fundamentally different from variables in that the value of a\
    \ constant cannot be changed. The `define()` function (more precisely, a syntax\
    \ construction) is usually used to add a constant to a program. The function’s\
    \ first argument is a string with the constant’s name. The second argument specifies\
    \ the value of the constant. The `$` symbol is not used at the beginning of the\
    \ constant name. Following the generally accepted convention, the names of constants\
    \ consist of capital letters (that is, this is not necessary, but good manners\
    \ oblige). For example, the `define(\"PI\",3.141592)` command defines the constant\
    \ `PI` with the value `3.141592`. After executing that command, the value of the\
    \ constant `PI` cannot be changed.\n\nA constant cannot be deleted after it has\
    \ been created. To check the existence of a constant, the `defined()` function\
    \ is used, the argument of which is a string with the name of the constant; for\
    \ example, `defined(\"PI\")`. The result is `true` or `false` depending on whether\
    \ the constant is defined.\n\nThere is another way to add a constant to a program.\
    \ In that case, the keyword `const` is used, after which the name of the constant\
    \ is specified (without the `$` symbol at the beginning of the name), and, through\
    \ the assignment operator, the value of the constant. For example, the constant\
    \ `TEN` with the value `10` can be defined with the `const TEN=10` command.\n\n\
    The fundamental difference between these two ways of creating constants is that\
    \ constants defined by the `define()` function are created at runtime. In contrast,\
    \ constants created using the `const` statement are created at the compilation\
    \ time. That circumstance has consequences. For example, the command to create\
    \ a constant using the `const` statement cannot be placed in a conditional statement\
    \ but can be done using the `define()` function. On the other hand, the `define()`\
    \ function cannot be used in classes and interfaces (discussed in later chapters\
    \ of the book) to create constant fields; in that case, an expression based on\
