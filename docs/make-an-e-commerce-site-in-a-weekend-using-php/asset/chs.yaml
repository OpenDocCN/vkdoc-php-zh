  \ MySQL 的 root 用户设置密码，并在必要时创建其他用户。那么，让我们继续配置 MySQL 服务器。\n\n### 配置 MySQL\n\n您将使用\
  \ `phpMyAdmin` 来配置 MySQL 服务器。`phpMyAdmin` 是一个用 PHP 编写的软件工具，用于通过网络管理 MySQL。您可以通过\
  \ `phpMyAdmin` 的图形用户界面轻松管理 MySQL 数据库、表、索引、用户等。要调用 `phpMyAdmin`，请单击 WampServer 图标并选择\
  \ `phpMyAdmin` 选项。\n\n`phpMyAdmin` 将打开，如图 1-24 所示。屏幕的左窗格中显示了最近的数据库。在右上角，您会找到用于管理数据库、SQL、用户等的按钮。中间窗格显示了下拉列表，使您能够定义\
  \ MySQL 连接。您还会找到用于更改默认语言、主题、字体大小和其他设置的下拉列表。\n\n![A978-1-4842-1672-9_1_Fig24_HTML.jpg](img/A978-1-4842-1672-9_1_Fig24_HTML.jpg)\n\
  \n*图 1-24. 启动 phpMyAdmin 工具时的首屏*\n\n要配置 root 密码，您需要访问位于左窗格 `mysql` 数据库中的用户表。`mysql`\
  \ 数据库节点上的 `+`（加号）表示它当前处于折叠状态。要展开节点，请单击其 `+` 号。`mysql` 数据库节点将展开，显示其中存在的所有表。单击 `user`\
  \ 表以显示其中的行数（见图 1-25）。您可以看到 `user` 表默认包含以下四个用户：\n\n-   主机 `127.0.0.1` 的用户 `root`——表示\
  \ localhost（IPv4 未解析 IP）的 root 用户。\n-   主机 `::1` 的用户 `root`——表示 localhost（IPv6 未解析\
  \ IP）的 root 用户。\n-   主机 `localhost` 的用户 `root`——表示 localhost（已解析 IP）的 root 用户。\n\
  -   主机 `localhost` 的用户 `anonymous`——表示具有已解析 IP 的匿名用户。\n\n![A978-1-4842-1672-9_1_Fig25_HTML.jpg](img/A978-1-4842-1672-9_1_Fig25_HTML.jpg)\n\
  \n*图 1-25. 显示 user 表行的屏幕*\n\n默认情况下，这些用户的密码为空。root 用户名是拥有所有权限的超级用户帐户，但空密码使得 MySQL\
  \ 服务器极易受到未经授权的访问。因此，首要任务是为所有这些 root 帐户提供密码，并删除匿名用户或也为该用户帐户提供一个密码。\n\n要为 root 用户提供密码，请单击相应行上的**编辑**图标以编辑其内容。该行将展开并显示三个文本框——Host、User\
  \ 和 Password。在**Password**列中输入密码（见图 1-26）。如果您想加密密码（而不是以纯文本格式保存），请从**函数**组合框中选择 `PASSWORD`\
  \ 选项。输入密码后，单击底部的**执行**按钮以保存更改。\n\n![A978-1-4842-1672-9_1_Fig26_HTML.jpg](img/A978-1-4842-1672-9_1_Fig26_HTML.jpg)\n\
  \n*图 1-26. 更改 MySQL 服务器的 root 密码*\n\n一旦为所有 root 用户设置了密码，您的 MySQL 服务器就会变得相当安全，免受未经授权的访问。接下来，让我们了解您的电子商务网站所需的不同数据库表。\n\
  \n\n\n#### 必需的数据库表\n\n我们的电子商务网站总共将创建七张表，名称如下：\n\n- `products` — 存储产品信息，包括产品名称、重量、价格、描述等。\n\
  - `productfeatures` — 存储产品的功能特性。\n- `cart` — 存储购物车中选择的商品信息。\n- `customers` — 存储已注册客户的信息。\n\
  - `orders` — 存储订单号、订单数据以及下订单客户的配送信息。\n- `orders_details` — 存储给定订单中购买的所有产品的信息。\n\
  - `payment_details` — 存储用于支付任何订单的所选支付方式的卡号及其他信息。\n\n你将在名为 `shopping` 的数据库中创建这些表。这些表的结构在表\
  \ 1-1 到 1-7 中进行了说明。\n\n**表 1-7.** `payment_details` 表结构简要说明\n\n| 列名 | 类型 | 描述 |\n\
  | --- | --- | --- |\n| `order_no` | `int(6)` | 存储付款所对应的订单号。 |\n| `order_date` |\
  \ `date` | 存储给定订单的下单日期。 |\n| `amount_paid` | `DECIMAL(7,2)` | 存储给定订单已支付的金额。 |\n\
  | `email_address` | `varchar(50)` | 存储付款客户的电子邮件地址。 |\n| `customer_name` | `varchar(50)`\
  \ | 存储付款客户的姓名。 |\n| `payment_type` | `varchar(20)` | 存储支付方式，即客户是通过借记卡、信用卡、网上银行等方式付款。\
  \ |\n| `name_on_card` | `varchar(30)` | 如果客户使用银行卡付款，则存储借记卡/信用卡上的姓名。 |\n| `card_number`\
  \ | `varchar(20)` | 存储信用卡号。 |\n| `expiration_date` | `varchar(10)` | 存储卡的到期日期（如果客户使用银行卡付款）。\
