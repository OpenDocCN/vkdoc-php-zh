  trans: "\n想象你对一个存储了数千条记录的大型数据库运行了与上一节相同的查询。所有关联的模型都会被拉入数组中，导致处理过程变得极其庞大。在早期阶段，你通常只处理少量的测试数据，因此不会注意到自定义代码可能给服务器带来的负载。但是，如果你在访问量极大的网站上部署这个应用呢？在搜索所有关联时，该应用很可能会使服务器过载。出于这个原因，Cake\
    \ 提供了一些函数，可以通过动态解除关联来帮助精简结果。\n\n## `unbindModel()` 函数\n\n在代码清单 7-11 中，返回了多行代码来描述数组中的关联模型。请记住，这仅仅是一条记录。所有这些行不仅会乘以返回的记录数，还会乘以分配给每条记录的关联标签数量。\n\
    \n存在加载冗余数据的可能性，尤其是在对“多对多”关联执行查询时。\n\n模型函数 `unbindModel()` 允许你临时解除 Post 模型与 Tag\
    \ 模型之间的“多对多”关系。在 Post 模型的 `findByYear()` 函数中，你可以在执行数据库查询之前运行此函数，结果将发生显著变化。代码清单\
    \ 7-12 展示了如何将此函数插入到 `findByYear()` 函数中。\n\n**代码清单 7-12.** *使用 `unbindModel()`\
    \ 函数精简结果并减轻服务器负载*\n\n```\nfunction findByYear($year=null) {\n\n$date = $year.'-01-01\
    \ 00:00:00';\n\n$end_date = $year.'-12-31 23:59:59';\n\n$this->unbindModel(array('hasAndBelongsToMany'=>array('Tag')));\
    \ 5\n\nreturn $this->find('all',array('conditions'=>array('DATE(Post.date)'=>➥\n\
    \n'>'.$date,'DATE(Post.date)'=>'<'.$end_date)));\n\n}\n```\n\n代码清单 7-12 中的第 4\
    \ 行展示了如何使用 `unbindModel()` 函数来解除 `hasAndBelongsToMany` 关联。此函数的一个重要方面是它只运行一次；换句话说，一旦第\
    \ 5 行执行了 `find()` 查询，该关联将在所有后续的模型函数中恢复。\n\n现在重新加载 Read 动作并查看生成的数组：\n\n```\nArray\n\
    \n(\n\n[0] => Array\n\n(\n\n[Post] => Array\n\n(\n\n[id] => 1\n\n[name] => New\
    \ Functions in 1.2\n\n[date] => 2008-01-01 00:00:00\n\n => No content yet.\n\n\
    [user_id] => 1\n\n)\n\n[User] => Array\n\n(\n\n[id] => 1\n\n[name] => spiderman\n\
    \n[email] => spidey@hero.com\n\n[firstname] => Peter\n\n[lastname] => Parker\n\
    \n)\n\n)\n\n)\n```\n\n*在查询运行时*，整个 Tag 关联被排除在外，这意味着服务器减少了检索所有 Tag 模型关联记录所需的负载。你获得了一个更精简的数组，只包含所需内容，这呼应了\
    \ Cake 的哲学：应该减轻负担，而非增加负担。\n\n`unbindModel()` 函数接受两个数组：一个包含所有要解除的关联，另一个用于指定模型本身。请注意，代码清单\
    \ 7-12 的第 4 行有一个包含“多对多”关系的数组，并且此关系被分配了一个包含所有可能具有该关联的模型的数组。你可以通过扩展数组来指定要从当前模型中解除绑定的一个或多个模型。\n\
    \n## `bindModel()` 函数\n\n正如 `unbindModel()` 函数可以帮助你动态解除关联一样，`bindModel()` 也允许你动态添加关联。同样，此函数仅对一次查询生效，然后不再影响后续的其他模型函数。\n\
    \n此函数遵循与 `unbindModel()` 函数相同的语法，并包含两个数组：一个用于要绑定到当前模型的关联，另一个用于要分配给该关联的模型。\n\n\
    ```\n$this->bindModel(array('hasMany'=>array('Tag')));\n```\n\n## Read 视图\n\n\
    目前，Read 视图只包含 `debug()` 函数来显示 `$posts` 数组的内容。\n\n使用 Cake 的 HTML 助手以及其他自定义 HTML，创建一个视图来包裹此数组。\n\
    \n## 总结\n\nMVC 结构对某些人来说可能有些棘手，但你应该能轻松掌握 Cake 对此类架构的运用。你探索了如何向模型和控制器添加自定义函数以扩展应用，并了解了由生成的（baked）动作和视图带来的逻辑。在接下来的章节中，你将深入挖掘并利用你的博客应用做出一些成果。在此过程中，你将引入其他有用的内置助手，并且在第\
    \ 3 部分中，你将使用其他可自定义的领域来增强应用的威力。如果你认为自己已经掌握了在模型、视图和控制器中工作的要领，那么恭喜你——你已经克服了学习 Cake\
    \ 过程中最困难的部分。\n\n# 实现 Ajax 特性\n\n近年来，Ajax 已成为热门网站处理请求的一种更常见的方法。简而言之，Ajax 使用户无需等待页面加载或刷新即可与网站进行交互。通过以这种方式处理\
    \ HTTP 请求，网站的行为更像一个桌面应用程序。那些曾被认为在 Web 浏览器中不可能实现的方法，不仅改变了互联网的格局，也正在扭转软件开发的趋势。许多开发者称这种现象为“Web\
    \ 2.0”的兴起。然而，构建一个丰富的 Web 2.0 应用程序并非易事，通常需要大量的 JavaScript。\n\n借助 Cake 的帮助，你可以轻松地将常见的\
    \ Ajax 流程引入到应用程序中，并且所需的 JavaScript 量将被最小化。\n\n在本章中，你将使用 Ajax 助手为你功能强大的博客应用构建一个评论部分。用户将能够添加评论，并对其他用户的评论进行点赞或点踩，所有这些操作都无需等待页面重新加载或刷新。在此过程中，我将提及\
    \ Ajax 助手的各种可能性，并介绍一些超出该助手范围的 Ajax 方法。本章不会深入探讨 Ajax 提供的所有可能性（因为这本身就足以写成一本书），但会解释\
    \ Ajax 如何在 Cake 应用中工作，并为你打开通往其他更复杂方法的大门，你可以自行尝试。\n\n让我们首先探讨 Ajax 的工作原理，然后使用它来改进你的博客。\n\
    \n## Ajax 的工作原理\n\n在第 6 章中，我讨论了异步序列以及 Cake 如何使用 `render()` 函数在不加载整个页面的情况下拉取视图。在你的博客应用中，你将使用\
    \ Ajax 以这种方式管理评论提交，这意味着用户提交评论后，他们将看到评论立即发布到页面上。换句话说，评论表单将消失，评论文本将出现在任何先前发布的评论下方，而页面上的其他所有内容都将保持不变。图\
    \ 8-1 展示了 Ajax 如何在后台工作以将评论添加到特定帖子。\n\n![Image 35](img/index-136_1.jpg)\n\n![Image\
    \ 36](img/index-136_2.jpg)\n\n![Image 37](img/index-136_3.jpg)\n\n**图 8-1.** *异步提交评论的\
    \ Ajax 流程*\n\n此图看起来与 Cake 中的典型流程几乎相同。但它有几个重要方面不同：\n\n1. 在此步骤中，当表单提交给控制器时，是使用 Ajax\
    \ 助手完成的。这意味着表单数据由 JavaScript 函数收集，并传递给控制器，而不会改变浏览器的状态。\n"
- fmt: '**2.** The controller handles the form data as it would a typical response.
    It sends data to be saved to the model and checks for invalidations.


    **3.** The model saves the data in the database and returns a successful response.


    **4.** Rather than display the view normally, the controller uses the `render()`
    function to pass the output along as an Ajax response. The view file is fetched
    normally, but its contents are rendered in the waiting HTML element. In other
    words, the Ajax helper observes the response and places whatever is returned in
    a specified HTML element (for example, a `<div>` or `<span>` element).


    **5.** The view is sent back to the client and, thanks to JavaScript, is displayed
    within the page, not replacing the whole page as a normal HTTP response would
    do.


    In the blog application, the user will enter some data into a couple of form fields
    and then click Submit. The form will be passed along in the background because
    the Ajax helper intercepts the HTTP request and, with the help of JavaScript,
    does all the server-side processing without refreshing the page. You will render
    the view inside the web page rather than replace the page because you will tell
    the Ajax helper where in the page to update once the server responds. This area
    will be the whole comments section, allowing you to dynamically add the user’s
    comment to the rest of the post’s comments without refreshing the browser.


    ## Working with Ajax Frameworks


    Just as Cake helps reduce the amount of PHP code needed to run a script, some
    Ajax frameworks cut down on the amount of JavaScript needed to perform Ajax methods.
    These frameworks are worthwhile because tackling Ajax can be extremely complex.
    It’s better to take advantage of open source Ajax frameworks than pull open that
    500-page JavaScript primer.


    Some of the most popular Ajax frameworks include the following:


    - Prototype ([www.prototypejs.org](http://www.prototypejs.org))

    - jQuery ([www.jquery.com](http://www.jquery.com))

    - Adobe Spry ([http://labs.adobe.com/technologies/spry](http://labs.adobe.com/technologies/spry))

    - MooTools ([www.mootools.net](http://www.mootools.net))


    Any of these frameworks can be used in Cake, but the Ajax helper currently works
    only with Prototype. Later, I’ll use jQuery to run some Ajax methods in Cake,
    but it will be done without the Ajax helper.


    ## Using the Ajax Helper


    Cake comes standard with the Ajax helper—a nifty set of methods for simplifying
    the code you enter in the view to make Ajax requests work properly. Like other
    helpers, it has more than a dozen useful functions (see Table 8-1) that can be
    called to reduce a process usually to a single string.


    **Table 8-1.** Functions in the Ajax Helper


    | Function | Description |

    | --- | --- |

    | `afterRender()` | Includes code blocks after a view has been rendered |

    | `autoComplete()` | Creates an autocomplete text field |

    | `div()` | Creates a `<div>` element for Ajax updates |

    | `divEnd()` | Closes an Ajaxed `<div>` element |

    | `drag()` | Creates a draggable element; requires the Scriptaculous animation
    libraries |

    | `drop()` | Creates a droppable element; requires Scriptaculous |

    | `dropRemote()` | Creates an area that triggers an Ajax response when a draggable
    is dropped onto it |

    | `editor()` | Creates an editor control that is swapped for the element when
    triggered by the user; requires Scriptaculous |

    | `form()` | Creates a form element that runs in the background when submitted
    |

    | `isAjax()` | Returns true if the current request is a Prototype update |

    | `link()` | Creates a link to run an Ajax call |

    | `observeField()` | Triggers an Ajax response when the observed field is changed
    |

    | `observeForm()` | Observes a form and triggers an Ajax response when changed
    |

    | `remoteFunction()` | Creates Ajax functions to be run, usually in conjunction
    with a `link()` event |

    | `remoteTimer()` | Triggers an Ajax response at a specified time interval |

    | `slider()` | Creates a slider control; requires Scriptaculous |

    | `sortable()` | Makes lists or other objects sortable; requires Scriptaculous
    |

    | `submit()` | (Function description missing in original text) |'
