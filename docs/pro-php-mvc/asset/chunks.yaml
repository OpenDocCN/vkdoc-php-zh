    ![Image 18](index-446_1.png)


    appendix a ■ Setting Up a Web Server


    ***Figure A-16.** Providing the username/password for MySQL*


    After setting up phpMyAdmin, feel free to create the prophpmvc database and username/password
    for your application/unit tests. You can do this in exactly the same way was we
    did for Windows 7, as phpMyAdmin should work similarly in both.


    Step 3


    Installing Memcached could not be easier. Simply type the command apt-get install
    memcached php5-memcache, and answer Y when prompted (see Figure [A-17](#index_split_007.html#p447)).
    Once installed, the Apache2 server (and the Memcached service) will restart and
