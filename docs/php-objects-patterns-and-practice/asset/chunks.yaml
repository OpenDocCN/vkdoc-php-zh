  trans: '

    ### 实现


    身份映射本质上是一个对象，其任务是跟踪系统中的所有对象，从而帮助确保本应是一个对象的事物不会变成两个。


    实际上，`Identity Map` 本身并不会主动阻止这种情况发生。它的作用是管理关于对象的信息。下面是一个简单的 `Identity Map`：


    ```

    // 清单 13.19

    class ObjectWatcher

    {

    private $all = [];

    private static $instance = null;

    private function __construct()

    {

    }

    public static function instance(): self

    {

    if (is_null(self::$instance)) {

    self::$instance = new ObjectWatcher();

    }

    return self::$instance;

    }

    public function globalKey(DomainObject $obj): string

    {

    $key = get_class($obj) . "." . $obj->getId();

    return $key;

    }

    public static function add(DomainObject $obj)

    {

    $inst = self::instance();

    $inst->all[$inst->globalKey($obj)] = $obj;

    }

    public static function exists($classname, $id)

    {

    $inst = self::instance();

    $key = "{$classname}.{$id}";

    if (isset($inst->all[$key])) {

    return $inst->all[$key];

    }

    return null;

    }

    }

    ```


    图 13-4 展示了 `Identity Map` 对象如何与你见过的其他类进行集成。


    ![A314621_5_En_13_Fig4_HTML.gif](img/A314621_5_En_13_Fig4_HTML.gif)


    **图 13-4.** 身份映射


    使用 `Identity Map` 的主要技巧，很明显，在于标识对象。这意味着你需要以某种方式标记每个对象。这里你可以采取多种不同的策略。系统所有对象已经使用的数据库表键并不合适，因为
    ID 并不能保证在所有表中都是唯一的。


    你也可以使用数据库来维护一个全局键表。每当你创建一个对象时，你都会递增键表的运行总数，并将该全局键与对象关联到其自身的行中。这种开销相对较小，而且很容易实现。


    如你所见，我选择了一种完全更简单的方法。我将对象的类名与其表 ID 拼接起来。不可能有两个 ID 为 4 的 `popp\ch13\batch03\Event`
    类型的对象，所以我的键 `popp\ch13\batch03\Event.4` 对于我的目的来说足够安全。


    `globalKey()` 方法处理了这方面的细节。该类提供了一个 `add()` 方法用于添加新对象。每个对象都用其唯一键标记在一个数组属性 `$all`
    中。


    `exists()` 方法接受一个类名和一个 `$id`，而不是一个对象。我不希望为了检查某个对象是否已经存在而去实例化它！该方法从这些数据构建一个键，并检查它是否索引了
    `$all` 属性中的一个元素。如果找到了一个对象，则会相应地返回一个引用。


    只有一个类中我将 `ObjectWatcher` 类用作 `Identity Map`。`Mapper` 类提供了生成对象的功能，因此在那里添加检查是合理的：


    ```

    // 清单 13.20

    // Mapper

    public function find(int $id): DomainObject

    {

    $old = $this->getFromMap($id);

    if (! is_null($old)) {

    return $old;

    }

    // 处理数据库

    return $object;

    }

    abstract protected function targetClass(): string;

    private function getFromMap($id)

    {

    return ObjectWatcher::exists(

    $this->targetClass(),

    $id

    );

    }

    private function addToMap(DomainObject $obj)

    {

    ObjectWatcher::add($obj);

    }

    public function createObject($raw)

    {

    $old = $this->getFromMap($raw[''id'']);

    if (! is_null($old)) {

    return $old;

    }

    $obj = $this->doCreateObject($raw);

    $this->addToMap($obj);

    return $obj;

    }

    public function insert(DomainObject $obj)

    {

    $this->doInsert($obj);

    $this->addToMap($obj);

    }

    ```


    该类提供了两个便捷方法：`addToMap()` 和 `getFromMap()`。这些方法省去了我记忆 `ObjectWatcher` 静态调用完整语法的麻烦。更重要的是，它们会调用子类实现（例如
    `VenueMapper`）来获取当前等待实例化的类的名称。


    这是通过调用 `targetClass()` 来实现的，这是一个抽象方法，由所有具体的 `Mapper` 类实现。它应该返回该 `Mapper` 设计用来生成的类的名称。下面是
    `SpaceMapper` 类对 `targetClass()` 的实现：


    ```

    // 清单 13.21

    // SpaceMapper

    protected function targetClass(): string

    {

    return Space::class;

    }

    ```


    `find()` 和 `createObject()` 都首先通过将对象 ID 传递给 `getFromMap()` 来检查现有对象。如果找到对象，则将其返回给客户端，并结束方法执行。然而，如果该对象尚不存在任何版本，则继续执行对象实例化。在
    `createObject()` 中，新对象会被传递给 `addToMap()`，以防止将来发生任何冲突。


    那么，为什么我要在 `find()` 和 `createObject()` 中都调用 `getFromMap()`，从而两次经历这个过程的某个部分呢？答案在于
    `Collections`。当它们生成对象时，是通过调用 `createObject()` 来完成的。我需要确保 `Collection` 对象封装的行不是过时的，同时确保将对象的最新版本返回给用户。


    ### 后果


    只要你在所有从数据库生成或向数据库添加对象的场景中都使用 `Identity Map`，那么你进程中出现重复对象的可能性几乎为零。


    当然，这仅在你的进程内有效。不同的进程不可避免地会同时访问同一对象的多个版本。仔细考虑并发访问可能导致的数据库损坏的可能性非常重要。如果存在严重问题，你可能需要考虑锁定策略。你也可以考虑将对象存储在共享内存中，或者使用像
    Memcached 这样的外部对象缓存系统。你可以在 [`http://danga.com/memcached/`](http://danga.com/memcached/)
    了解 Memcached，并在 [`http://www.php.net/memcache`](http://www.php.net/memcache) 了解
    PHP 对它的支持。


    ## 工作单元


    你何时保存你的对象？在我发现 `Unit of Work` 模式（由 David Rice 在 Martin Fowler 的《企业应用架构模式》一书中撰写）之前，我是在命令执行完成后从表示层发出保存指令的。事实证明，这是一个代价高昂的设计决策。


    `Unit of Work` 模式可以帮助你只保存那些需要保存的对象。


    ### 问题所在


    有一天，我将 SQL 语句回显到浏览器窗口以追踪一个问题，结果大吃一惊。我发现自己在同一个请求中一遍又一遍地保存相同的数据。我有一套精巧的复合命令系统，这意味着一个命令可能会触发多个其他命令，而每个命令都会清理自己的状态。


    我不仅两次保存了同一个对象，我还保存了那些不需要保存的对象。


    那么，这个问题在某些方面与 `Identity Map` 所解决的问题类似。那个问题涉及不必要的对象加载；而这个问题则处于流程的另一端。正如这些问题互为补充一样，这些解决方案也是如此。

    '
- fmt: '### Implementation


    To determine what database operations are required, you need to keep track of
    various events that befall your objects. Probably the best place to do that is
    in the objects themselves.


    You also need to maintain a list of objects scheduled for each database operation
    (i.e., insert, update, delete). I am only going to cover insert and update operations
    here. Where might be a good place to store a list of objects? It just so happens
    that I already have an `ObjectWatcher` object, so I can develop that further:


    ```

    // listing 13.22

    // ObjectWatcher

    private $all = [];

    private $dirty = [];

    private $new = [];

    private $delete = []; // unused in this example

    private static $instance = null;

    public static function addDelete(DomainObject $obj)

    {

    $inst = self::instance();

    $inst->delete[$self->globalKey($obj)] = $obj;

    }

    public static function addDirty(DomainObject $obj)

    {

    $inst = self::instance();

    if (! in_array($obj, $inst->new, true)) {

    $inst->dirty[$inst->globalKey($obj)] = $obj;

    }

    }

    public static function addNew(DomainObject $obj)

    {

    $inst = self::instance();

    // we don''t yet have an id

    $inst->new[] = $obj;

    }

    public static function addClean(DomainObject $obj)

    {

    $inst  = self::instance();

    unset($inst->delete[$inst->globalKey($obj)]);

    unset($inst->dirty[$inst->globalKey($obj)]);

    $inst->new = array_filter(

    $inst->new,

    function ($a) use ($obj) {

    return !($a === $obj);

    }

    );

    }

    public function performOperations()

    {

    foreach ($this->dirty as $key => $obj) {

    $obj->getFinder()->update($obj);

    }

    foreach ($this->new as $key => $obj) {

    $obj->getFinder()->insert($obj);

    print "inserting " . $obj->getName() . "\n";

    }

    $this->dirty = [];

    $this->new = [];

    }

    ```


    The `ObjectWatcher` class remains an Identity Map and continues to serve its function
    of tracking all objects in a system via the `$all` property. This example simply
    adds more functionality to the class.


    You can see the Unit of Work aspects of the `ObjectWatcher` class in Figure [13-5](#A314621_5_En_13_Chapter.html#Fig5).


    ![A314621_5_En_13_Fig5_HTML.gif](A314621_5_En_13_Fig5_HTML.gif)


    Figure 13-5.


    Unit of Work aspects in the ObjectWatcher class


    Objects are described as “dirty” when they have been changed since extraction
    from the database. A dirty object is stored in the `$dirty` array property (via
    the `addDirty()` method) until the time comes to update the database. Client code
    may decide that a dirty object should not undergo update for its own reasons.
    It can ensure this by marking the dirty object as clean (via the `addClean()`
    method). As you might expect, a newly created object should be added to the `$new`
    array (via the `addNew()` method). Objects in this array are scheduled for insertion
    into the database. I am not implementing delete functionality in these examples,
    but the principle should be clear enough.


    The `addDirty()` and `addNew()` methods each add an object to their respective
    array properties. `addClean()`, however, removes the given object from the `$dirty`
    array, marking it as no longer pending update.


    When the time finally comes to process all objects stored in these arrays, the
    `performOperations()` method should be invoked (probably from the controller class,
    or its helper). This method loops through the `$dirty` and `$new` arrays, either
    updating or adding the objects.


    The `ObjectWatcher` class now provides a mechanism for updating and inserting
    objects. The code is still missing a means of adding objects to the `ObjectWatcher`
    object.


    Because it is these objects that are operated upon, they are probably best placed
    to perform this notification. Here are some utility methods I can add to the `DomainObject`
    class —notice the constructor method in particular:


    ```

    // listing 13.23

    abstract class DomainObject

    {

    private $id;

    public function __construct(int $id)

    {

    $this->id = $id;

    if ($id markNew();

    }

    }

    abstract public function getFinder(): Mapper;

    public function getId(): int

    {

    return $this->id;

    }

    public function setId(int $id)

    {

    $this->id = $id;

    }

    public function markNew()

    {

    ObjectWatcher::addNew($this);

    }

    public function markDeleted()

    {

    ObjectWatcher::addDelete($this);

    }

    public function markDirty()

    {

    ObjectWatcher::addDirty($this);

    }

    public function markClean()

    {

    ObjectWatcher::addClean($this);

    }

    }

    ```


    As you can see, the constructor method marks the current object as new (by calling
    `markNew()`) if no `$id` property has been passed to it. This qualifies as magic
    of a sort and should be treated with some caution. As it stands, this code slates
    a new object for insertion into the database without any intervention from the
    object creator. Imagine a coder new to your team writing a throwaway script to
    test some domain behavior. There’s no sign of persistence code there, so all should
    be safe enough, shouldn’t it? Now imagine these test objects, perhaps with interesting
    throwaway names, making their way into persistent storage. Magic is nice, but
    clarity is nicer. It may be better to require client code to pass some kind of
    flag into the constructor in order to queue the new object for insertion.


    I also need to add some code to the `Mapper` class:


    ```

    // listing 13.24

    // Mapper

    public function createObject($raw): DomainObject

    {

    $old = $this->getFromMap($raw[''id'']);

    if (! is_null($old)) {

    return $old;

    }

    $obj = $this->doCreateObject($raw);

    $this->addToMap($obj);

    return $obj;

    }

    ```


    The only thing remaining to do is to add `markDirty()` invocations to methods
    in the Domain Model classes. Remember, a dirty object is one that has been changed
    since it was retrieved from the database. This is the one aspect of this pattern
    that has a slightly fishy odor. Clearly, it’s important to ensure that all methods
    that mess up the state of an object are marked dirty, but the manual nature of
    this task means that the possibility of human error is all too real.


    Here are some methods in the `Space` object that call `markDirty()`:


    ```

    // listing 13.25

    // Space

    public function setVenue(Venue $venue)

    {

    $this->venue = $venue;

    $this->markDirty();

    }

    public function setName(string $name)

    {

    $this->name = $name;

    $this->markDirty();

    }

    ```


    Here is some code for adding a new `Venue` and `Space` to the database, taken
    from a `Command` class:


    ```

    // listing 13.26

    $venue = new Venue(-1, "The Green Trees");

    $venue->addSpace(

    new Space(-1, ''The Space Upstairs'')

    );

    $venue->addSpace(

    new Space(-1, ''The Bar Stage'')

    );

    // this could be called from the controller or a helper class

    ObjectWatcher::instance()->performOperations();

    ```


    I have added some debug code to the `ObjectWatcher`, so you can see what happens
    at the end of the request:


    ```

    inserting The Green Trees

    inserting The Space Upstairs

    inserting The Bar Stage

    ```


    Because a high-level controller object usually calls the `performOperations()`
    method, all you need to do in most cases is create or modify an object, and the
    Unit of Work class (`ObjectWatcher`) will do its job just once at the end of the
    request.


    ### Consequences


    This pattern is very useful, but there are a few issues to be aware of. You need
    to be sure that all modify operations actually do mark the object in question
    as dirty. Failing to do this can result in hard-to-spot bugs.


    You may like to look at other ways of testing for modified objects. Reflection
    sounds like a good option there, but you should look into the performance implications
    of such testing—the pattern is meant to improve efficiency, not undermine it.


    ### Lazy Load


    `Lazy Load` is one of those core patterns most web programmers learn for themselves
    very quickly, simply because it’s such an essential mechanism for avoiding massive
    database hits, which is something we all want to do.'
  raw: '### Implementation


    To determine what database operations are required, you need to keep track of
    various events that befall your objects. Probably the best place to do that is
    in the objects themselves.


    You also need to maintain a list of objects scheduled for each database operation
    (i.e., insert, update, delete). I am only going to cover insert and update operations
    here. Where might be a good place to store a list of objects? It just so happens
    that I already have an `ObjectWatcher` object , so I can develop that further:


    ```

    // listing 13.22

    // ObjectWatcher

    private $all = [];

    private $dirty = [];

    private $new = [];

    private $delete = []; // unused in this example

    private static $instance = null;

    public static function addDelete(DomainObject $obj)

    {

    $inst = self::instance();

    $inst->delete[$self->globalKey($obj)] = $obj;

    }

    public static function addDirty(DomainObject $obj)

    {

    $inst = self::instance();

    if (! in_array($obj, $inst->new, true)) {

    $inst->dirty[$inst->globalKey($obj)] = $obj;

    }

    }

    public static function addNew(DomainObject $obj)

    {

    $inst = self::instance();

    // we don''t yet have an id

    $inst->new[] = $obj;

    }

    public static function addClean(DomainObject $obj)

    {

    $inst  = self::instance();

    unset($inst->delete[$inst->globalKey($obj)]);

    unset($inst->dirty[$inst->globalKey($obj)]);

    $inst->new = array_filter(

    $inst->new,

    function ($a) use ($obj) {

    return !($a === $obj);

    }

    );

    }

    public function performOperations()

    {

    foreach ($this->dirty as $key => $obj) {

    $obj->getFinder()->update($obj);

    }

    foreach ($this->new as $key => $obj) {

    $obj->getFinder()->insert($obj);

    print "inserting " . $obj->getName() . "\n";

    }

    $this->dirty = [];

    $this->new = [];

    }

    ```


