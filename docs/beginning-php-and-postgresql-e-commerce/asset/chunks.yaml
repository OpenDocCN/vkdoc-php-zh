    **How It Works: Handling Tax and Shipping Issues**


    Note that this is one of the most crucial pieces of code in this chapter. Here,
    you’ll most likely make any modifications to the tax and shipping systems if you
    decide to add your own system because choices are made on this page. The database
    and business layer changes are far more generic—although that’s not to say that
    modifications wouldn’t be necessary.


    Before testing that the new system is working for tax and shipping charges, use
    the orders admin page to check that old orders are unaffected. The information
    retrieved for an old order should be unaffected because the data is unchanged.


    Place a new order, preferably with a customer in the United States/Canada shipping
    region (as this is currently the only region where tax is applied). Notice that
    on the checkout page, you must select a shipping option.


    After placing the order, check the new order in the database. The result is shown
    in Figure 12-3.


    In this chapter leading up to this example, you’ve pretty much examined how the
    tax and shipping charges operate, but let’s recap.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH12.qxd 11/17/06 3:44 PM Page 452


    **452**


    C H A P T E R 1 2 ■ S TO R I N G C U S TO M E R O R D E R S


    First, the customer is required to select a shipping region for his or her address.
    Without this shipping region being selected, visitors cannot place orders because
    they cannot select a shipping option. When a visitor places an order, the shipping
    region selected is attached to the order in the orders table. The tax requirement
    for the order is also attached, although this requires no user input and is currently
    selected using a very simple algorithm (although this wouldn’t be difficult to
    change).


    Further Development


    There are several ways to proceed from here. Perhaps the first might be to add
    an administration system for tax and shipping options. This hasn’t been implemented
    here partly because it would be trivial given the experience you’ve had so far
    in this book and partly because the techniques laid out here are more of a template
    for development than a fully developed way of doing things. There are so many
    options to choose from for both tax and shipping calculations that only the basics
    are discussed here.


    Hooking into online services for tax and shipping cost calculations is an attractive
    option; for shipping services, this is very much a possibility. In fact, the services
    offered by shipping companies such as FedEx use a similar process to the credit
    card gateway companies we’ll look at later in this book. Much of the code you
    would have to write to access these services will be very similar to that for
    credit card processing, although, of course, you’ll have to adapt it to get the
    specifics right. Sadly, there may be more major changes required, such as adding
    weights and dimensions to products, but that very much depends on what products
    you are selling. For items in the HatShop catalog, many products are lighter than
    air, so shipping could be very cheap.


    **Summary**


    In this chapter, you’ve extended the HatShop site to enable customers to place
    orders using all the new data and techniques introduced in Chapter 11\. Much of
    the modification made in this chapter lays the groundwork for the order pipeline
    to be used in the rest of this book. You’ve also included a quick way to examine
    customer orders, although this is by no means a fully fleshed-out administration
    tool—that will come later.


    You also implemented a simple system for adding tax and shipping charges to orders.


    This system is far from being a universal solution, but it works, and it’s simple.
    More importantly, the techniques can easily be built on to introduce more complex
    algorithms and user interaction to select tax and shipping options and price the
    order accordingly.


    From the next chapter onward, you’ll be expanding on the customer ordering system
    even more by starting to develop a professional order pipeline for order processing.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH13.qxd 11/17/06 3:46 PM Page 453


    C H A P T E R 1 3


    Implementing the Order Pipeline:


    Part I


    **Y**our e-commerceapplication is shaping up nicely. You have added customer account
    functionality, and you are keeping track of customer addresses and credit card
    information, which is stored securely. However, you are not currently using this
    information—instead, you are delegating responsibility for this to PayPal.


    In this and the next chapter, you’ll build your own order-processing pipeline
    that deals with credit card authorization, stock checking, shipping, email notification,
    and so on. We’ll leave the credit card processing specifics until Chapter 15,
    but in this chapter, we’ll show you where this process fits into the picture.


    Order pipeline functionality is an extremely useful capability for an e-commerce
    site.


    Order pipeline functions let you keep track of orders at every stage in the process
    and provide auditing information that you can refer to later or if something goes
    wrong during the order processing. You can do all this without relying on a third-party
    accounting system, which can also reduce costs. The first section of this chapter
    discusses what an order pipeline is and the specifics that apply to the HatShop
    application.


    The bulk of this chapter deals with constructing the order pipeline system, which
    also involves a small amount of modification to the way things currently work,
    and some additions to the database you’ve been using. However, the code in this
    chapter isn’t much more complicated than the code you’ve already been using. The
    real challenges are in designing your system.'
