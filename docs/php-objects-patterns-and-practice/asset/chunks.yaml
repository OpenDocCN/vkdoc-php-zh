  raw: '```

    // listing 11.29

    abstract class LoginObserver implements Observer

    {

    private $login;

    public function __construct(Login $login)

    {

    $this->login = $login;

    $login->attach($this);

    }

    public function update(Observable $observable)

    {

    if ($observable === $this->login) {

    $this->doUpdate($observable);

    }

    }

    abstract public function doUpdate(Login $login);

    }

    ```


    The `LoginObserver` class requires a `Login` object in its constructor. It stores
    a reference and calls `Login::attach()`. When `update()` is called, it checks
    that the provided `Observable` object is the correct reference. It then calls
    a Template Method : `doUpdate()`. I can now create a suite of `LoginObserver`
    objects, all of which can be secure they are working with a `Login` object and
    not just any old `Observable`:


    ```

    // listing 11.30

    class SecurityMonitor extends LoginObserver

    {

    public function doUpdate(Login $login)

    {

    $status = $login->getStatus();

    if ($status[0] == Login::LOGIN_WRONG_PASS) {

    // send mail to sysadmin

    print __CLASS__ . ":    sending mail to sysadmin\n";

    }

    }

    }

    // listing 11.31

    class GeneralLogger extends LoginObserver

    {

    public function doUpdate(Login $login)

    {

    $status = $login->getStatus();

    // add login data to log

    print __CLASS__ . ":    add login data to log\n";

    }

    }

    // listing 11.32

    class PartnershipTool extends LoginObserver

    {

    public function doUpdate(Login $login)

    {

    $status = $login->getStatus();

    // check $ip address

    // set cookie if it matches a list

    print __CLASS__ . ":    set cookie if it matches a list\n";

    }

    }

    ```


    Creating and attaching `LoginObserver` classes is now achieved in one go at the
    time of instantiation:


    ```

    $login = new Login();

    new SecurityMonitor($login);

    new GeneralLogger($login);

    new PartnershipTool($login);

    ```


    So now I have created a flexible association between the subject classes and the
    observers. You can see the class diagram for the example in Figure [11-6](#A314621_5_En_11_Chapter.html#Fig6).


    ![A314621_5_En_11_Fig6_HTML.gif](A314621_5_En_11_Fig6_HTML.gif)


    Figure 11-6.


    The Observer pattern


    PHP provides built-in support for the Observer pattern through the bundled SPL
    (Standard PHP Library ) extension. The SPL is a set of tools that help with common,
    largely object-oriented problems. The Observer aspect of this OO Swiss Army knife
    consists of three elements: `SplObserver`, `SplSubject` , and `SplObjectStorage`
    . `SplObserver` and `SplSubject` are interfaces and exactly parallel the `Observer`
    and `Observable` interfaces shown in this section’s example. `SplObjectStorage`
    is a utility class designed to provide improved storage and removal of objects.
    Here’s an edited version of the Observer implementation :


    ```

    // listing 11.33

    class Login implements \SplSubject

    {

    private $storage;

    // ...

    public function __construct()

    {

    $this->storage = new \SplObjectStorage();

    }

    public function attach(\SplObserver $observer)

    {

    $this->storage->attach($observer);

    }

    public function detach(\SplObserver $observer)

    {

    $this->storage->detach($observer);

    }

    public function notify()

    {

    foreach ($this->storage as $obs) {

    $obs->update($this);

    }

    }

    // ...

    }

    // listing 11.34

    abstract class LoginObserver implements \SplObserver

    {

    private $login;

    public function __construct(Login $login)

    {

    $this->login = $login;

    $login->attach($this);

    }

    public function update(\SplSubject $subject)

    {

    if ($subject === $this->login) {

    $this->doUpdate($subject);

    }

    }

    abstract public function doUpdate(Login $login);

    }

    ```


    There are no real differences, as far as `SplObserver` (which was `Observer`)
    and `SplSubject` (which was `Observable`) are concerned—except, of course, I no
    longer need to declare the interfaces, and I must alter my type hinting according
    to the new names. `SplObjectStorage` provides you with a really useful service,
    however. You may have noticed that, in my initial example, my implementation of
    `Login::detach()` applied `array_filter` (together with an anonymous function)
    to the `$observers` array, in order to find and remove the argument object. The
    `SplObjectStorage` class does this work for you under the hood. It implements
    `attach()` and `detach()` methods , and can be passed to `foreach` and iterated
    like an array.


    Note


    You can read more about SPL in the PHP documentation at [`http://www.php.net/spl`](http://www.php.net/spl)
    . In particular, you will find many iterator tools there. I cover PHP’s built-in
    Iterator interface in Chapter [13](#A314621_5_En_13_Chapter.html), “Database Patterns.”


    Another approach to the problem of communicating between an `Observable` class
    and its `Observer` could be to pass specific state information via the `update()`
    method , rather than an instance of the subject class. For a quick-and-dirty solution,
    this is often the approach I would take initially. So in the example, `update()`
    would expect a status flag, the username, and IP address (probably in an array
    for portability), rather than an instance of `Login`. This saves you from having
    to write a state method in the `Login` class. On the other hand, where the subject
    class stores a lot of state, passing an instance of it to `update()` allows observers
    much more flexibility.


    You could also lock down type completely, by making the `Login` class refuse to
    work with anything other than a specific type of observer class (`LoginObserver`,
    perhaps). If you want to do that, then you may consider some kind of runtime check
    on objects passed to the `attach()` method ; otherwise, you may need to reconsider
    the `Observable` interface altogether.


    Once again, I have used composition at runtime to build a flexible and extensible
    model. The `Login` class can be extracted from its context and dropped into an
    entirely different project without qualification. There, it might work with a
    different set of observers.


    ## The Visitor Pattern


    As you have seen, many patterns aim to build structures at runtime, following
    the principle that composition is more flexible than inheritance. The ubiquitous
    Composite pattern is an excellent example of this. When you work with collections
    of objects, you may need to apply various operations to the structure that involve
    working with each individual component. Such operations can be built into the
    components themselves. After all, components are often best placed to invoke one
    another.


    This approach is not without issues. You do not always know about all the operations
    you may need to perform on a structure. If you add support for new operations
    to your classes on a case-by-case basis, you can bloat your interface with responsibilities
    that don’t really fit. As you might guess, the Visitor pattern addresses these
    issues.'
