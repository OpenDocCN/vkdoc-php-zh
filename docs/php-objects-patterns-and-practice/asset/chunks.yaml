    ## 配置（Provisioning）


    再次强调，配置过程由 `Vagrantfile` 文档驱动。Vagrant 支持多种用于配置虚拟机的工具，包括 Chef（[`https://www.chef.io/chef/`](https://www.chef.io/chef/)）、Puppet（[`https://puppet.com`](https://puppet.com)）和
    Ansible（[`https://www.ansible.com`](https://www.ansible.com)）。这些工具都值得研究。不过，在本示例中，我将使用传统的
    shell 脚本。


    我再次从 `Vagrantfile` 开始：


    ```

    config.vm.provision "shell", path: "setup.sh"

    ```


    这段代码的含义应该相当清晰。我告诉 Vagrant 使用 shell 脚本来配置虚拟机，并指定 `setup.sh` 为要执行的脚本。


    当然，shell 脚本的内容取决于你的需求。我将从设置几个变量和安装一些软件包开始：


    ```

    #!/bin/bash

    VAGRANTDIR=/vagrant

    SERVERDIR=/var/www/poppch20/

    sudo rpm -Uvh https://mirror.webtatic.com/yum/el6/latest.rpm

    sudo yum install -y patch

    sudo yum install -y vim

    sudo yum -q -y install mysql-server

    sudo yum -q -y install httpd;

    sudo yum -q -y install php70w

    sudo yum -q -y install php70w-mysql

    sudo yum -q -y install php70w-xml

    sudo yum -q -y install php70w-dom

    ```


    PHP 7 在 CentOS 6 上默认不可用。不过，通过安装 `webtatic.com` 提供的 yum 仓库，就可以获取名为 `php70w` 的软件包及其一系列相关扩展。我将脚本写入名为
    `setup.sh` 的文件中，并将其放置在 `Vagrantfile` 所在的 infrastructure 目录中。


    现在，如何启动配置过程呢？如果在我运行 `vagrant up` 时，`config.vm.provision` 指令和 `setup.sh` 脚本都已经就位，那么配置过程就会自动进行。由于目前并非如此，我需要手动运行它：


    ```

    $ vagrant provision

    ```


    当 `setup.sh` 脚本在 Vagrant 虚拟机内运行时，终端上会输出大量信息。让我们检查一下是否成功了：


    ```

    $ vagrant ssh

    $ php -v

    PHP 7.0.7 (cli) (built: May 28 2016 08:26:36) ( NTS )

    Copyright (c) 1997-2016 The PHP Group

    Zend Engine v3.0.0, Copyright (c) 1998-2016 Zend Technologies

    ```


    ## 设置 Web 服务器


    当然，即便安装了 MySQL 和 Apache，系统也还不能直接运行。首先，我们应该配置 Apache。最简单的方法是创建一个配置文件，并将其复制到 Apache
    的 `conf.d` 目录中。我们把这个文件命名为 `poppch20.conf`，并放入 infrastructure 目录：


    ```

    NameVirtualHost *:80


    ServerAdmin matt@getinstance.com

    DocumentRoot /var/www/poppch20

    ServerName poppch20.vagrant.internal

    ErrorLog logs/poppch20-error_log

    CustomLog logs/poppch20-access_log common


    AllowOverride all


    ```


    稍后我会再回到这个主机名。暂且放下这个诱人的细节，这段配置足以告知 Apache 关于 `/var/www/poppch20` 目录的信息并设置日志。当然，我还需要更新
    `setup.sh`，以便在配置时复制该配置文件：


    ```

    sudo cp $VAGRANTDIR/poppch20.conf /etc/httpd/conf.d/

    sudo service httpd restart

    sudo /sbin/chkconfig httpd on

    ```


    我将配置文件复制到位，然后重启 Web 服务器以便加载新的配置。我还运行了 `chkconfig` 来确保服务器在开机时自动启动。


    做出这些更改后，我可以重新运行此脚本：


    ```

    $ vagrant provision

    ```


    需要注意的是，我们之前编写的设置脚本中的部分内容也会被重新执行。在创建配置脚本时，必须确保它能够重复执行而不会造成严重问题。幸运的是，Yum 会检测到我指定的软件包已经安装，只会发出无害的抱怨——部分原因是我预先使用了
    `-q` 标志，这会让抱怨信息相对安静。


    ## 设置 MySQL


    对于许多应用程序，你需要确保数据库已创建并准备好接受连接。下面是我对设置脚本的一个简单补充：


    ```

    sudo service mysqld start

    /usr/bin/mysqladmin -s -u root password ''vagrant'' || echo "** unable to create
    pass - probably already done"

    echo "CREATE DATABASE IF NOT EXISTS poppch20_vagrant" | mysql -u root -pvagrant


    # install data here if needed

    #

    echo "GRANT ALL PRIVILEGES  ON poppch20_vagrant.* TO

    ''vagrant''@''localhost'' IDENTIFIED BY ''vagrant''

    WITH GRANT OPTION" | mysql -u root -pvagrant

    echo "FLUSH PRIVILEGES" | mysql -u root -pvagrant

    sudo /sbin/chkconfig mysqld on

    ```


    我启动 MySQL。然后运行 `mysqladmin` 命令来创建 root 密码。由于密码在首次运行后就已经设置，之后运行该命令会失败，因此我使用 `-s`
    标志来抑制错误信息，并在命令失败时打印一条自定义消息。接着，我创建了一个数据库、一个用户和对应的密码。最后，我运行 `chkconfig` 来确保 MySQL
    守护进程在开机时自动启动。


    完成这些设置后，我可以再次进行配置，然后测试数据库：


    ```

    $ vagrant provision

    ```

