    这里，在循环语句中，`$v`变量依次获取`$A`数组元素的值。键未被使用。


    值得一提的是，在所描述的框架内，你可以以只读模式访问元素的值。你不能为元素赋予新值，因为标准的数组元素遍历方案会将元素值的副本写入相应的变量。通过更改副本的值，你不会影响元素的值。尽管如此，有一种简单的方法可以改变这种情况。为此，在`foreach`循环语句的描述中，在你打算用于存储数组元素值的变量名之前，放置`&`符号。如果这样做，指定的变量将引用数组元素。换句话说，你可以访问元素的值和元素本身（并且如果需要，可以更改其值）。


    | 详细信息 |

