    ## Overriding Methods


    It is pretty convenient that, due to inheritance, a child class gets the fields
    and methods of its parent class. However, in some cases, it is necessary for the
    method inherited in a child class to be performed somewhat differently than it
    is implemented in the parent class. In other words, there are situations when
    an inherited method needs to be *overridden*. To override a method in a child
    class is easy. You just need to declare it explicitly. Listing [8-2](#613529_1_En_8_Chapter.xhtml#PC4)
    shows how that can be done.


    ```

    number=$args[0];

    }

    // The method for displaying the field:

    public function show(){

    echo "The class Alpha\n";

    echo "The field \$number: ",$this->number,"\n";

    }

    }

    // The child class:

    class Bravo extends Alpha{

    // The field:

    public $symbol;

    // Overrides the method for assigning

    // values to the fields:

    public function set(...$args){

    parent::set($args[0]);

    $this->symbol=$args[1];

    }

    // Overrides the method for displaying

    // the fields:

    public function show(){

    echo "-----------------\n";

    parent::show();

    echo "The class Bravo\n";

    echo "The field \$symbol: ",$this->symbol,"\n";

    }

    }

    // An object of the parent class:

    $A=new Alpha;

    // Assigning a value to the field:

    $A->set(100);

    // Displays the field:

    $A->show();

    // An object of the child class:

    $B=new Bravo;

    // Assigns values to the fields:

    $B->set(200,''B'');

    // Displays the fields:

    $B->show();

    ?>

    Listing 8-2

    Overriding Methods

    ```


    The result of the program execution is as follows.


    ```

    The output of the program (from Listing 8-2)

    The class Alpha

    The field $number: 100


    The class Alpha

    The field $number: 200

    The class Bravo

    The field $symbol: B

    ```


    The `Alpha` parent class has the `$number` field and two public `set()` and `show()`
    methods you plan to override in the child class. The `show()` method has no arguments.
    When the method is called, it displays a message with the name of the `Alpha`
    class and the `$number` field of the object from which the method is called. The
    `set()` method, which you need for assigning a value to the `$number` field, is
    described as one that can take an arbitrary number of arguments (formally, it
    is described with the `$args` argument preceded by an ellipsis). To understand
    why you did that, it is necessary to consider the following important circumstances.
    When overriding a method in a child class, the method must be declared with the
    same arguments as in the parent class. The `set()` method in the parent class
    assigns a value to a single field. In the child class, use the method to assign
    values to two fields. Therefore, use a trick: describe the method with an arbitrary
    number of arguments and use only those that are needed. In the parent class, that
    is the first argument accessed using the `$args[0]` instruction. The value is
    assigned to the `$number` field by the `$this->number=$args[0]` command in the
    method body.


    > **PHP 8 Standard**: In PHP 8, a method with an arbitrary number of arguments
    can override a method with a fixed number of arguments (subject to type compatibility).


    The `Bravo` child class is created by inheriting the `Alpha` class. The `$symbol`
    field also appears, and the `set()` and `show()` methods are overridden. In the
    description of the `set()` method, the `parent::set($args[0])` command calls the
    version of the `set()` method inherited from the parent class. Here, the general
    rule was used, according to which, if you want to access a parent class method,
    you should precede it with the `parent` keyword and a double colon (`::`). In
    particular, the `parent::set($args[0])` statement means that when the `set()`
    method is called from an object of the `Bravo` class, the version of the method
    from the parent class (that is, the `Alpha` class) must be called first. The first
    argument of that version of the method (from the `Alpha` class) is defined by
    the first argument passed to the `set()` method (from the `Bravo` class). As a
    result, the `$number` field is assigned a value. To assign a value to the `$symbol`
    field, the `$this->symbol=$args[1]` command is used, according to which the second
    argument determines the value of the field passed to the `set()` method. To override
    the `show()` method, the following commands were used. First, the `echo "-----------------\n"`
    statement displays a “decorative” line, purely aesthetic, to separate the results
    of different calls to the `show()` method. The `parent::show()` command calls
    the version of the `show()` method from the `Alpha` parent class, after which
    the `echo "The class Bravo\n"` command displays a message, and then the value
    of the `$symbol` field is displayed (by the `echo "The field \$symbol: ",$this->symbol,"\n"`
    command). The `$A=new Alpha` command creates the `$A` object based on the `Alpha`
    class. The `set()` and `show()` methods for that object are executed as described
    in the `Alpha` class. The `$B` object of the `Bravo` child class is created by
    the `$B=new Bravo` command. You check directly that for the object, the `show()`
    and `set()` methods are executed differently (if compared to the `$A` object),
    namely, according to how they are overridden in the `Bravo` class.


    > **Note**: You can disable method overriding by declaring the method with the
    `final` keyword.


    ## Constructors and Inheritance


    Let''s examine the program shown in Listing [8-3](#613529_1_En_8_Chapter.xhtml#PC6).


    ```

    Listing 8-3

    Constructors and Inheritance

    ```


    The following is the program''s output.


    ```

    The output of the program (from Listing 8-3)

    An object of the class Alpha is created

    An object of the class Alpha is deleted

    ```


    You have created a very simple `Alpha` parent class. The class only has the constructor
    and the destructor. When you create an object, a message appears that an object
    of the `Alpha` class is created. When an object is removed from memory, a message
    appears that an object of the `Alpha` class is deleted. The `Bravo` child class
    is based on the `Alpha` class. The body of the `Bravo` class is empty. You don''t
    describe anything in it at all (you may do that, but why to do that is another
    question). Then, create an object based on the `Bravo` class. As a result, you
    get messages about creating and deleting an object of the `Alpha` class appearing
    in the output window. How is that possible? The parent class''s constructor and
    the destructor of the parent class and other public methods are inherited in the
    child class. In this case, you did not describe either the constructor or the
    destructor for the `Bravo` child class. If so, the constructor and the destructor
    inherited from the `Alpha` parent class are used. Another important point is that
    the constructor can be overridden in a child class. As you already know, if you
    override ordinary methods in a child class, you must describe them with the same
    arguments as in the parent class. But that rule does not apply to the constructors.
    In the child class, the constructor may have arguments different from the arguments
    of the constructor in the parent class.


    Finally, as with regular methods, you can call the constructor and destructor
    from the parent class. To do that, use the `parent` keyword. Namely, an instruction
    of the form `parent::__construct(arguments)` means calling the parent class''s
    constructor with the appropriate arguments. The `parent::__destruct()` statement
    means calling the destructor of the parent class. The corresponding example is
    shown in Listing [8-4](#613529_1_En_8_Chapter.xhtml#PC8).


    ```

    number=$number;

    echo "The number: ",$this->number,"\n";

    }

    // The destructor:

    function __destruct(){

    echo "Deleted: the number ",$this->number,"\n";

    }

    }

    // The child class:

    class Bravo extends Alpha{

    // The field:

    public $symbol;

    // The constructor:

    function __construct($number,$symbol){

    echo "----------\n";

    parent::__construct($number);

    $this->symbol=$symbol;

    echo "The character: ",$this->symbol,"\n";

    }

    // The destructor:

    function __destruct(){

    echo "~~~~~~~~~~~~~~~~~~\n";

    parent::__destruct();

    echo "Deleted: the character ",$this->symbol,"\n";

    }

    }

    // Creates an object of the child class:

    $obj=new Bravo(200,''B'');

    ?>

    Listing 8-4

    The Constructor and the Destructor of a Child Class

    ```


    The result of the program execution is as follows.


    ```

    The output of the program (from Listing 8-4)


    The number: 200

    The character: B

    ~~~~~~~~~~~~~~~~~~

    Deleted: the number 200

    Deleted: the character B

    ```


    You have the `Alpha` parent class with the `$number` field, the constructor, and
    the destructor. The constructor is passed one argument that defines the value
    of the `$number` field. The constructor and the destructor display messages with
    the `$number` field value. The `Bravo` child class, derived from the `Alpha` class,
    adds another field, `$symbol`, and overrides the constructor and the destructor.
    The constructor of the `Bravo` class has two arguments (named as `$number` and
    `$symbol`). One is passed as an argument to the parent class''s constructor (the
    `parent::__construct($number)` instruction) and defines the value of the `$number`
    field. The other argument specifies the value of the `$symbol` field (the `$this->symbol=$symbol`
    statement). In the destructor of the `Bravo` class, among other actions, the destructor
    from the `Alpha` class is called. To do that, use the `parent::__destruct()` instruction.
    The `$obj=new Bravo(200,''B'')` command creates an object of the `Bravo` class,
    and due to that, the constructor of the child class is automatically called. Next,
    the destructor is automatically called before the program terminates.


    ## Inheritance and Private Members


    Let''s explore what happens to private class members during inheritance starting
    with the program in Listing [8-5](#613529_1_En_8_Chapter.xhtml#PC10).


    ```

    code=$code;

    }

    // The public method for getting

    // the value of the field:

    public function get(){

    return $this->code;

    }

    }

    // The child class:

    class Bravo extends Alpha{

    // The constructor:

    function __construct($code){

    // Calls the inherited methods:

    $this->set($code);

    echo "An object is created: ",$this->get(),"\n";

    }

    }

    // Creates an object of the child class:

    $obj=new Bravo(123);

    // Calls the inherited methods:

    $obj->set(321);

    echo "The field \$code: ",$obj->get(),"\n";

    ?>

    Listing 8-5

    Private Members and Inheritance

    ```


    The following is the result of the program execution.


    ```

    The output of the program (from Listing 8-5)

    An object is created: 123

    The field $code: 321

    ```


    The `Alpha` class has the private `$code` field and two public methods: the `set()`
    method allows you to assign a value to the field, and the `get()` method returns
    the field''s value. Based on the `Alpha` class, the `Bravo` class is created by
    inheritance. It inherits the public `set()` and `get()` methods but does not (according
    to conventional terminology) inherit the private `$code` field. It turns out that
    the `Bravo` class has the `set()` and `get()` methods that require the `$code`
    field to operate properly, but that field itself is not inherited. How can that
    be? To answer the question, it is necessary to clarify what the phrase "not inherited"
    means. The matter of fact is that the private field `$code` is not inherited in
    the `Bravo` class because you cannot directly access the `$code` field in the
    body of the `Bravo` class. You can interpret the situation so that the class "does
    not know" anything about that field, but technically, such a field exists, and
    the `set()` and `get()` methods can operate with it. The `set()` and `get()` methods
    are used in the `Bravo` class constructor. The `$this->set($code)` command assigns
    a value to the `$code` field, and the `$this->get()` instruction is used to get
    the field''s value.


    A child class object is created with the `$obj=new Bravo(123)` command. The object
    has public `set()` and `get()` methods. The methods, in turn, refer to the "invisible,"
    even for the `Bravo` class, the `$code` field. Thus, the `$obj->set(321)` command
    writes the value `321` to the field, and the `$obj->get()` instruction is used
    to get its value.


    | Details |

    | --- |

    | You must remember the following important circumstances when working with private
    class members. If the non-existing field of an object is assigned a value, then
    the object gets such a field. Therefore, if you assign a value to a non-inherited
    private field from the parent class in the child class, then the object has such
    a field, and it is not the field described in the parent class. |


    ## Protected Members of a Class


    In addition to public and private members, a class can also have protected class
    members. Protected class members are described with the `protected` access level
    specifier. Like private members, protected members of a class are available only
    within the class''s code. But unlike private members, protected members are inherited.
    An example of using protected class members is shown in Listing [8-6](#613529_1_En_8_Chapter.xhtml#PC12).


    ```

    code=$code;

    }

    // The method for displaying the field:

    public function show(){

    echo "The field \$code = ",$this->code,"\n";

    }

    }

    // Creates an object of the child class:

    $obj=new Bravo;

    // Assigns a value to the field:

    $obj->set(123);

    // Displays the field:

    $obj->show();

    ?>

    Listing 8-6

    Protected Class Members

    ```


    The result of the program execution is as follows.


    ```

    The output of the program (from Listing 8-6)

    The field $code = 123

    ```


    The `Alpha` parent class has the single protected `$code` field. The field is
    only available in the body of the `Alpha` class. And that field is inherited in
    the `Bravo` child class. Therefore, in the body of the `Bravo` class, in the methods
    `set()` (the method for assigning a value to the field) and `show()` (the method
    for displaying the field value), you can directly access the inherited `$code`
    field (the instruction like `$this->code`). The `$obj` object is created based
    on the `Bravo` class. The object has the `$code` field, but it is not directly
    accessible. To assign a value to the field, use the `set()` method (the `$obj->set(123)`
    command), and to display the field value, use the `show()` method (the `$obj->show()`
    command).


    ## Virtual Methods


    An interesting property of overridden methods is illustrated in Listing [8-7](#613529_1_En_8_Chapter.xhtml#PC14).


    ```

    hello();

    }

    ```'
