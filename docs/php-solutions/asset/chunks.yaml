    \ extends OriginalClass {\n    // 子类定义\n}\n```\n\n这会从原始父类 `OriginalClass` 创建一个名为\
    \ `MyNewClass` 的新子类。父子类比非常贴切，因为子类继承了父类的所有特性，但可以调整其中一些特性，并拥有自己的新特性。这意味着 `MyNewClass`\
    \ 与 `OriginalClass` 共享相同的属性和方法，但你可以添加新的属性和方法。你还可以重新定义（或覆盖）父类的某些方法和属性。这简化了创建用于执行更专门化任务的类的过程。你在第\
    \ 6 章 中创建的 `Upload` 类执行基本的文件上传。在本章中，你将对其进行扩展，创建一个名为 `ThumbnailUpload` 的子类，它使用其父类的基本上传功能，但增加了创建缩略图的专门功能。该子类将创建在\
    \ `PhpSolutions/Image` 文件夹中，因此它将使用 `PhpSolutions\\Image` 作为其命名空间。\n\n像所有孩子一样，子类经常需要向父类借用东西。当你重写子类中的方法但又需要使用原始版本时，这种情况经常发生。要引用父类版本，你需要在它前面加上\
    \ `parent` 关键字后跟两个冒号，如下所示：\n\n```\nparent::originalMethod();\n```\n\n你将在 PHP 解法\
    \ 8-5 中看到这是如何工作的，因为子类定义了自己的构造函数以添加一个额外的参数，但同时还需要使用父类的构造函数。\n\n> **注意**  \n> 这里对继承的描述仅涵盖了理解\
    \ PHP 解法 8-5 所需的最低限度内容。要更深入地了解 PHP 类，请参阅我的 *PHP Object-Oriented Solutions*（friends\
    \ of ED, 2008，ISBN: 978-1-4302-1011-5）。\n\n让我们创建一个能够同时上传图片并生成缩略图的类。\n\n"
- fmt: "### PHP Solution 8-5: Creating the `ThumbnailUpload` Class\n\nThis PHP solution\
    \ extends the `Upload` class from [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html)\
    \ and uses it in conjunction with the `Thumbnail` class to upload and resize images.\
    \ It demonstrates how to create a child class and override parent methods. To\
    \ create the child class, you need `Upload.php` from [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html)\
    \ and `Thumbnail.php` from this chapter. There’s a copy of these files in the\
    \ `ch06/PhpSolutions/File` and `ch08/PhpSolutions/Image` folders, respectively.\n\
    \nCreate a new file called `ThumbnailUpload.php` in the `PhpSolutions/Image` folder.\
    \ It will contain only PHP code, so strip out any HTML inserted by your script\
    \ editor and add the following code:\n\n```\n<?php\n\nnamespace PhpSolutions\\\
    Image;\n\nuse PhpSolutions\\File\\Upload;\n\nrequire_once __DIR__ . '/../File/Upload.php';\n\
    require_once 'Thumbnail.php';\n\nclass ThumbnailUpload extends Upload {\n\n}\n\
    ```\n\nThis declares the `PhpSolutions\\Image` namespace and imports the `Upload`\
    \ class from the `PhpSolutions\\File` namespace before including the definitions\
    \ of the `Upload` and `Thumbnail` classes.\n\n> **Note**  \n> When used in an\
    \ include file, `__DIR__` returns the directory of the included file without a\
    \ trailing slash. Adding the slash at the beginning of the relative path to `Upload.php`\
    \ allows PHP to build a complete path, moving back up one level to find it in\
    \ the `PhpSolutions/File` folder. `Thumbnail.php` is in the same folder as `ThumbnailUpload.php`,\
    \ so it’s included using only the filename. See “Nesting include files” in [Chapter\
    \ 4](#A978-1-4842-0635-5_4_Chapter.html).\n\nThe `ThumbnailUpload` class then\
    \ declares that it extends `Upload`. Although `Upload` is in a different namespace,\
    \ you can refer to it simply as `Upload` because it has been imported. All subsequent\
    \ code needs to be inserted between the curly braces of the class definition.\n\
    \nThe child class needs three properties: the folder where the thumbnail is to\
    \ be saved, a Boolean that determines whether to delete the original image, and\
    \ the suffix to be added to the thumbnail. The last of these is required in case\
    \ you don’t want to use the default suffix defined in `Thumbnail`. Add the following\
    \ property definitions inside the curly braces:\n\n```\nprotected $thumbDestination;\n\
    protected $deleteOriginal;\nprotected $suffix = '_thb';\n```\n\nWhen you extend\
    \ a class, the only time you need to define a constructor method is when you want\
    \ to change how the constructor works. The `ThumbnailUpload` class takes an extra\
    \ argument that determines whether to delete the original image, giving you the\
    \ option to retain only the thumbnail or to keep both versions of the image. When\
    \ testing locally, a `Thumbnail` object can access the original image on your\
    \ own hard drive. However, generating the thumbnail is a server-side operation,\
    \ so it won’t work on a website without first uploading the original image to\
    \ the server.\n\nThe constructor also needs to call the parent constructor to\
    \ define the path to the upload folder. Add the following definition to the class:\n\
    \n```\npublic function __construct($path, $deleteOriginal = false) {\n    parent::__construct($path);\n\
    \    $this->thumbDestination = $path;\n    $this->deleteOriginal = $deleteOriginal;\n\
    }\n```\n\nThe constructor takes two arguments: the path to the upload folder and\
    \ a Boolean variable that determines whether to delete the original image. The\
    \ second argument is set to `false` in the constructor signature, making it optional.\n\
    \n> **Note**  \n> When defining a function or a class method, the arguments (strictly\
    \ speaking, parameters) passed to the function (method) are known as its signature.\n\
    \nThe first line of code inside the constructor passes `$path` to the parent constructor\
    \ in order to set the destination folder for the file uploads. The second line\
    \ also assigns `$path` to the `$thumbDestination` property, making the same folder\
    \ the default for both images.\n\nThe final line assigns the value of the second\
    \ argument to the `$deleteOriginal` property. Because the second argument is optional,\
    \ it’s automatically set to `false`, and both images are retained unless you set\
    \ it explicitly to `true`.\n\nCreate the setter method for the thumbnail destination\
    \ folder like this:\n\n```\npublic function setThumbDestination($path) {\n   \
    \ if (!is_dir($path) || !is_writable($path)) {\n        throw new \\Exception(\"\
    $path must be a valid, writable directory.\");\n    }\n    $this->thumbDestination\
    \ = $path;\n}\n```\n\nThis takes a path as its only argument, checks that it’s\
    \ a folder (directory) and is writable, and assigns the value to the `$thumbDestination`\
    \ property. If the value passed as an argument is invalid, the class throws an\
    \ exception. `Exception` is preceded by a backslash to indicate you’re using the\
    \ core `Exception` class, not one specific to this namespace.\n\n> **Tip**  \n\
    > Instead of creating a setter method for the thumbnail destination folder, I\
    \ could have added an extra argument to the constructor. However, my choice simplifies\
    \ the constructor for occasions when you want to save the thumbnail and original\
    \ image in the same folder. Also, I could have silently used the original upload\
    \ folder instead of throwing an exception if there’s a problem with the thumbnail\
    \ destination. I decided that a problem with the destination folder is too serious\
    \ to ignore. Decisions like this are an integral part of writing any script, not\
    \ just of designing a class.\n\nApart from the name, the setter method for the\
    \ thumbnail suffix is identical to the one in `Thumbnail.php`. It looks like this:\n\
    \n```\npublic function setThumbSuffix($suffix) {\n    if (preg_match('/\\w+/',\
    \ $suffix)) {\n        if (strpos($suffix, '_') !== 0) {\n            $this->suffix\
    \ = '_' . $suffix;\n        } else {\n            $this->suffix = $suffix;\n \
    \       }\n    } else {\n        $this->suffix = '';\n    }\n}\n```\n\nYou need\
    \ to define the method here because the class inherits from `Upload`, not `Thumbnail`.\
    \ A PHP class can have only a single parent.\n\n> **Note**  \n> To solve the problem\
    \ of single inheritance, PHP 5.4 introduced a feature called traits. A trait defines\
    \ methods intended to be used by multiple classes. The structure of a trait is\
    \ the same as a class, except that it’s declared using the keyword `trait` instead\
    \ of `class`. You import traits into a class definition with the `use` keyword.\
    \ I decided against moving `setThumbSuffix()` to a trait because it’s so short\
    \ and is used by only two classes. To learn more about traits, see [http://php.net/manual/en/language.oop5.traits.php](http://php.net/manual/en/language.oop5.traits.php).\n\
    \nThe parent `Upload` class has an `allowAllTypes()` method that removes restrictions\
    \ on the MIME types of files that can be uploaded. The `ThumbnailUpload` class\
    \ is for image types only. To prevent this inherited method from allowing other\
    \ types of files to be uploaded, add the following code to override it:\n\n```\n\
    public function allowAllTypes() {\n    $this->typeCheckingOn = true;\n}\n```\n\
    \nUnlike the parent method, this sets the `$typeCheckingOn` property to `true`,\
    \ enforcing MIME-type checking. In other words, calling `allowAllTypes()` on a\
    \ `ThumbnailUpload` object will have no effect.\n\nNext, create a protected method\
    \ to generate the thumbnail using the following code:\n\n```\nprotected function\
    \ createThumbnail($image) {\n    $thumb = new Thumbnail($image);\n    $thumb->setDestination($this->thumbDestination);\n\
    \    $thumb->setSuffix($this->suffix);\n    $thumb->create();\n    $messages =\
    \ $thumb->getMessages();\n    $this->messages = array_merge($this->messages, $messages);\n\
    }\n```\n\nThis takes a single argument, the path to an image, and creates a `Thumbnail`\
    \ object. The code is similar to `create_thumb.php` so it shouldn’t need explanation.\n\
    \nThe final line uses `array_merge()` to merge any messages generated by the `Thumbnail`\
    \ object with the `$messages` property of the `ThumbnailUpload` class. Although\
    \ the properties you defined in step 2 don’t include a `$messages` property, the\
    \ child class automatically inherits it from its parent."
  raw: '#### PHP Solution 8-5: Creating the ThumbnailUpload Class


    This PHP solution extends the `Upload` class from [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html)
    and uses it in conjunction with the `Thumbnail` class to upload and resize images.
    It demonstrates how to create a child class and override parent methods. To create
    the child class, you need `Upload.php` from [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html)
    and `Thumbnail.php` from this chapter. There’s a copy of these files in the `ch06/PhpSolutions/File`
    and `ch08/PhpSolutions/Image` folders, respectively.


    Create a new file called `ThumbnailUpload.php` in the `PhpSolutions/Image` folder.
    It will contain only PHP code, so strip out any HTML inserted by your script editor
    and add the following code:


    `<?php`


    `namespace PhpSolutions\Image;`


    `use PhpSolutions\File\Upload;`


    `require_once __DIR__ . ''/../File/Upload.php'';`


    `require_once ''Thumbnail.php'';`


    `class ThumbnailUpload extends Upload {`


    `}`


    This declares the `PhpSolutions\Image` namespace and imports the `Upload` class
    from the `PhpSolutions\File` namespace before including the definitions of the
    `Upload` and `Thumbnail` classes.


    Note


    When used in an include file, `__DIR__` returns the directory of the included
    file without a trailing slash. Adding the slash at the beginning of the relative
    path to `Upload.php` allows PHP to build a complete path, moving back up one level
    to find it in the `PhpSolutions/File` folder. `Thumbnail.php` is in the same folder
    as `ThumbnailUpload.php`, so it’s included using only the filename. See “Nesting
    include files” in [Chapter 4](#A978-1-4842-0635-5_4_Chapter.html).


    The `ThumbnailUpload` class then declares that it extends `Upload`. Although `Upload`
    is in a different namespace, you can refer to it simply as `Upload` because it
    has been imported. All subsequent code needs to be inserted between the curly
    braces of the class definition.


    The child class needs three properties: the folder where the thumbnail is to be
    saved, a Boolean that determines whether to delete the original image, and the
    suffix to be added to the thumbnail. The last of these is required in case you
    don’t want to use the default suffix defined in `Thumbnail`. Add the following
    property definitions inside the curly braces:


    `protected $thumbDestination;`


    `protected $deleteOriginal;`


    `protected $suffix = ''_thb'';`


    When you extend a class, the only time you need to define a constructor method
    is when you want to change how the constructor works. The `ThumbnailUpload` class
    takes an extra argument that determines whether to delete the original image,
    giving you the option to retain only the thumbnail or to keep both versions of
    the image. When testing locally, a `Thumbnail` object can access the original
    image on your own hard drive. However, generating the thumbnail is a server-side
    operation, so it won’t work on a website without first uploading the original
    image to the server.


    The constructor also needs to call the parent constructor to define the path to
    the upload folder. Add the following definition to the class:


    `public function __construct($path, $deleteOriginal = false) {`


    `parent::__construct($path);`


    `$this->thumbDestination = $path;`


    `$this->deleteOriginal = $deleteOriginal;`


    `}`


    The constructor takes two arguments: the path to the upload folder and a Boolean
    variable that determines whether to delete the original image. The second argument
    is set to `false` in the constructor signature, making it optional.


    Note


    When defining a function or a class method, the arguments (strictly speaking,
    parameters) passed to the function (method) are known as its signature.


    The first line of code inside the constructor passes `$path` to the parent constructor
    in order to set the destination folder for the file uploads. The second line also
    assigns `$path` to the `$thumbDestination` property, making the same folder the
    default for both images.


    The final line assigns the value of the second argument to the `$deleteOriginal`
    property. Because the second argument is optional, it’s automatically set to `false`,
    and both images are retained unless you set it explicitly to `true`.


    Create the setter method for the thumbnail destination folder like this:


    `public function setThumbDestination($path) {`


    `if (!is_dir($path) || !is_writable($path)) {`


    `throw new \Exception("$path must be a valid, writable directory.");`


    `}`


    `$this->thumbDestination = $path;`


    `}`


    This takes a path as its only argument, checks that it’s a folder (directory)
    and is writable, and assigns the value to the `$thumbDestination` property. If
    the value passed as an argument is invalid, the class throws an exception. `Exception`
    is preceded by a backslash to indicate you’re using the core `Exception` class,
    not one specific to this namespace.


    Tip


    Instead of creating a setter method for the thumbnail destination folder, I could
    have added an extra argument to the constructor. However, my choice simplifies
    the constructor for occasions when you want to save the thumbnail and original
    image in the same folder. Also, I could have silently used the original upload
    folder instead of throwing an exception if there’s a problem with the thumbnail
    destination. I decided that a problem with the destination folder is too serious
    to ignore. Decisions like this are an integral part of writing any script, not
    just of designing a class.


    Apart from the name, the setter method for the thumbnail suffix is identical to
    the one in `Thumbnail.php`. It looks like this:


    `public function` `setThumbSuffix` `($suffix) {`


    `if (preg_match(''/\w+/'', $suffix)) {`


    `if (strpos($suffix, ''_'') !== 0) {`


    `$this->suffix = ''_'' . $suffix;`


    `} else {`


    `$this->suffix = $suffix;`


    `}`


    `} else {`


    `$this->suffix = '''';`


    `}`


    `}`


    You need to define the method here because the class inherits from `Upload`, not
    `Thumbnail`. A PHP class can have only a single parent.


    Note


    To solve the problem of single inheritance, PHP 5.4 introduced a feature called
    traits. A trait defines methods intended to be used by multiple classes. The structure
    of a trait is the same as a class, except that it’s declared using the keyword
    `trait` instead of `class`. You import traits into a class definition with the
    `use` keyword. I decided against moving `setThumbSuffix()` to a trait because
    it’s so short and is used by only two classes. To learn more about traits, see
    [`http://php.net/manual/en/language.oop5.traits.php`](http://php.net/manual/en/language.oop5.traits.php)
    .


    The parent `Upload` class has an `allowAllTypes()` method that removes restrictions
    on the MIME types of files that can be uploaded. The `ThumbnailUpload` class is
    for image types only. To prevent this inherited method from allowing other types
    of files to be uploaded, add the following code to override it:


    `public function allowAllTypes() {`


    `$this->typeCheckingOn = true;`


    `}`


    Unlike the parent method, this sets the `$typeCheckingOn` property to `true`,
    enforcing MIME-type checking. In other words, calling `allowAllTypes()` on a `ThumbnailUpload`
    object will have no effect.


    Next, create a protected method to generate the thumbnail using the following
    code:


    `protected function createThumbnail($image) {`


    `$thumb = new Thumbnail($image);`


    `$thumb->setDestination($this->thumbDestination);`


    `$thumb->setSuffix($this->suffix);`


    `$thumb->create();`


    `$messages = $thumb->getMessages();`


    `$this->messages = array_merge($this->messages, $messages);`


    `}`


    This takes a single argument, the path to an image, and creates a `Thumbnail`
    object. The code is similar to `create_thumb.php` so it shouldn’t need explanation.


    The final line uses `array_merge()` to merge any messages generated by the `Thumbnail`
    object with the `$message`s property of the `ThumbnailUpload` class. Although
    the properties you defined in step 2 don’t include a `$messages` property, the
    child class automatically inherits it from its parent.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n### PHP 方案 8-5：创建\
    \ `ThumbnailUpload` 类\n\n该 PHP 方案扩展了 第 6 章 中的 `Upload` 类，并与 `Thumbnail` 类结合使用，以完成图片的上传和调整大小。它演示了如何创建子类并重写父类方法。要创建子类，你需要来自第\
    \ 6 章的 `Upload.php` 和本章的 `Thumbnail.php`。这些文件的副本分别位于 `ch06/PhpSolutions/File`\
    \ 和 `ch08/PhpSolutions/Image` 文件夹中。\n\n在 `PhpSolutions/Image` 文件夹中创建一个名为 `ThumbnailUpload.php`\
    \ 的新文件。它只包含 PHP 代码，因此请删除脚本编辑器插入的任何 HTML，并添加以下代码：\n\n```\n<?php\n\nnamespace PhpSolutions\\\
    Image;\n\nuse PhpSolutions\\File\\Upload;\n\nrequire_once __DIR__ . '/../File/Upload.php';\n\
    require_once 'Thumbnail.php';\n\nclass ThumbnailUpload extends Upload {\n\n}\n\
    ```\n\n这声明了 `PhpSolutions\\Image` 命名空间，并在包含 `Upload` 和 `Thumbnail` 类的定义之前，导入了来自\
    \ `PhpSolutions\\File` 命名空间的 `Upload` 类。\n\n> **注意**  \n> 在包含文件中使用时，`__DIR__`\
    \ 返回被包含文件的目录，不包含尾部斜杠。在 `Upload.php` 相对路径的开头添加斜杠，允许 PHP 构建完整路径，向上返回一级以在 `PhpSolutions/File`\
    \ 文件夹中找到它。`Thumbnail.php` 与 `ThumbnailUpload.php` 位于同一文件夹，因此仅使用文件名即可包含。请参阅第 4\
    \ 章中的“嵌套包含文件”。\n\n然后，`ThumbnailUpload` 类声明它扩展了 `Upload`。尽管 `Upload` 位于不同的命名空间，但因为它已被导入，你可以直接将其称为\
    \ `Upload`。所有后续代码都需要插入到类定义的花括号之间。\n\n子类需要三个属性：保存缩略图的文件夹、决定是否删除原始图片的布尔值，以及要添加到缩略图的后缀。如果不想使用\
    \ `Thumbnail` 中定义的默认后缀，则需要最后一个属性。在花括号内添加以下属性定义：\n\n```\nprotected $thumbDestination;\n\
    protected $deleteOriginal;\nprotected $suffix = '_thb';\n```\n\n当你扩展一个类时，唯一需要定义构造函数方法的情况是，当你想改变其工作方式时。`ThumbnailUpload`\
    \ 类接受一个额外的参数，该参数决定是否删除原始图片，让你可以选择只保留缩略图，或保留两个版本的图片。在本地测试时，`Thumbnail` 对象可以访问你本地硬盘上的原始图片。但是，生成缩略图是服务器端操作，因此，如果不先将原始图片上传到服务器，它就无法在网站上工作。\n\
    \n构造函数还需要调用父构造函数来定义上传文件夹的路径。将以下定义添加到类中：\n\n```\npublic function __construct($path,\
    \ $deleteOriginal = false) {\n    parent::__construct($path);\n    $this->thumbDestination\
    \ = $path;\n    $this->deleteOriginal = $deleteOriginal;\n}\n```\n\n构造函数接受两个参数：上传文件夹的路径和一个决定是否删除原始图片的布尔变量。第二个参数在构造函数签名中设置为\
    \ `false`，使其成为可选参数。\n\n> **注意**  \n> 定义函数或类方法时，传递给该函数（方法）的参数（严格来说是形参）被称为其签名。\n\
    \n构造函数内部的第一行代码将 `$path` 传递给父构造函数，以设置文件上传的目标文件夹。第二行代码也将 `$path` 赋值给 `$thumbDestination`\
    \ 属性，使得同一文件夹成为两个图片的默认文件夹。\n\n最后一行代码将第二个参数的值赋给 `$deleteOriginal` 属性。由于第二个参数是可选的，它会被自动设置为\
    \ `false`，除非你明确将其设置为 `true`，否则两个图片都会被保留。\n\n像这样创建缩略图目标文件夹的设置方法：\n\n```\npublic\
    \ function setThumbDestination($path) {\n    if (!is_dir($path) || !is_writable($path))\
    \ {\n        throw new \\Exception(\"$path 必须是有效且可写的目录。\");\n    }\n    $this->thumbDestination\
    \ = $path;\n}\n```\n\n此方法将路径作为其唯一参数，检查它是否是一个文件夹（目录）且可写，并将该值赋给 `$thumbDestination`\
    \ 属性。如果作为参数传递的值无效，该类将抛出异常。`Exception` 前面有一个反斜杠，表示你正在使用核心的 `Exception` 类，而不是此命名空间特定的类。\n\
    \n> **技巧**  \n> 除了为缩略图目标文件夹创建设置方法，我本可以向构造函数添加一个额外的参数。但是，当你想将缩略图和原始图片保存在同一文件夹时，我的选择简化了构造函数。另外，如果缩略图目标有问题，我本可以静默地使用原始上传文件夹，而不是抛出异常。我认为目标文件夹的问题过于严重，不容忽视。此类决策是编写任何脚本（不仅仅是设计类）不可或缺的一部分。\n\
    \n除了名称之外，缩略图后缀的设置方法与 `Thumbnail.php` 中的设置方法相同。它看起来像这样：\n\n```\npublic function\
    \ setThumbSuffix($suffix) {\n    if (preg_match('/\\w+/', $suffix)) {\n      \
    \  if (strpos($suffix, '_') !== 0) {\n            $this->suffix = '_' . $suffix;\n\
    \        } else {\n            $this->suffix = $suffix;\n        }\n    } else\
    \ {\n        $this->suffix = '';\n    }\n}\n```\n\n你需要在此处定义该方法，因为该类继承自 `Upload`，而不是\
    \ `Thumbnail`。一个 PHP 类只能有一个父类。\n\n> **注意**  \n> 为了解决单继承的问题，PHP 5.4 引入了一个名为 trait\
    \ 的特性。Trait 定义了旨在被多个类使用的方法。Trait 的结构与类相同，只是它使用关键字 `trait` 而不是 `class` 来声明。你可以使用\
    \ `use` 关键字将 trait 导入到类定义中。我决定不将 `setThumbSuffix()` 移到 trait 中，因为它非常简短，并且仅被两个类使用。要了解更多关于\
    \ trait 的信息，请参阅 [`php.net/manual/en/language.oop5.traits.php`](http://php.net/manual/en/language.oop5.traits.php)。\n\
    \n父类 `Upload` 有一个 `allowAllTypes()` 方法，该方法移除了对可上传文件 MIME 类型的限制。`ThumbnailUpload`\
    \ 类仅用于图片类型。为了防止这个继承的方法允许上传其他类型的文件，添加以下代码来覆盖它：\n\n```\npublic function allowAllTypes()\
    \ {\n    $this->typeCheckingOn = true;\n}\n```\n\n与父方法不同，此方法将 `$typeCheckingOn`\
    \ 属性设置为 `true`，强制执行 MIME 类型检查。换句话说，在 `ThumbnailUpload` 对象上调用 `allowAllTypes()`\
    \ 将不会产生任何效果。\n\n接下来，使用以下代码创建一个受保护的方法来生成缩略图：\n\n```\nprotected function createThumbnail($image)\
    \ {\n    $thumb = new Thumbnail($image);\n    $thumb->setDestination($this->thumbDestination);\n\
    \    $thumb->setSuffix($this->suffix);\n    $thumb->create();\n    $messages =\
    \ $thumb->getMessages();\n    $this->messages = array_merge($this->messages, $messages);\n\
    }\n```\n\n此方法接受一个参数，即图片的路径，并创建一个 `Thumbnail` 对象。该代码与 `create_thumb.php` 类似，因此无需解释。\n\
    \n最后一行使用 `array_merge()` 将 `Thumbnail` 对象生成的任何消息与 `ThumbnailUpload` 类的 `$messages`\
    \ 属性合并。尽管你在步骤 2 中定义的属性不包含 `$messages` 属性，但子类会自动从其父类继承它。\n"
- fmt: "# Using the `ThumbnailUpload` Class\n\nIn the parent class, the `moveFile()`\
    \ method saves an uploaded file to its target destination. The thumbnail needs\
    \ to be generated from the original image, so you need to override the parent’s\
    \ `moveFile()` method and use it to call the `createThumbnail()` method that you\
    \ have just defined. Copy the `moveFile()` method from `Upload.php` and amend\
    \ it by adding the code highlighted in bold.\n\n```\nprotected function moveFile($file)\
    \ {\n\n    $filename = isset($this->newName) ? $this->newName : $file['name'];\n\
    \n    $success = move_uploaded_file($file['tmp_name'],\n\n    $this->destination\
    \ . $filename);\n\n    if ($success) {\n\n        // add a message only if the\
    \ original image is not deleted\n\n        if (!$this->deleteOriginal) {\n\n \
    \           $result = $file['name'] . ' was uploaded successfully';\n\n      \
    \      if (!is_null($this->newName)) {\n\n                $result .= ', and was\
    \ renamed ' . $this->newName;\n\n            }\n\n            $this->messages[]\
    \ = $result;\n\n        }\n\n        // create a thumbnail from the uploaded image\n\
    \n        $this->createThumbnail($this->destination . $filename);\n\n        //\
    \ delete the uploaded image if required\n\n        if ($this->deleteOriginal)\
    \ {\n\n            unlink($this->destination . $filename);\n\n        }\n\n  \
    \  } else {\n\n        $this->messages[] = 'Could not upload ' . $file['name'];\n\
    \n    }\n\n}\n```\n\nIf the original image has been uploaded successfully, the\
    \ new code adds a conditional statement to generate the message only if `$deleteOriginal`\
    \ is `false`. It then calls the `createThumbnail()` method, passing it the uploaded\
    \ image as the argument. Finally, if `$deleteOriginal` has been set to `true`,\
    \ it uses `unlink()` to delete the uploaded image, leaving only the thumbnail.\n\
    \nSave `ThumbnailUpload.php`. To test it, copy `create_thumb_upload_01.php` from\
    \ the `ch08` folder to the `gd` folder and save it as `create_thumb_upload.php`.\
    \ The file contains a simple form with a file field and a PHP block that displays\
    \ messages. Add the following PHP code block above the `DOCTYPE` declaration:\n\
    \n```\n<?php\n\nuse PhpSolutions\\Image\\ThumbnailUpload;\n\nif (isset($_POST['upload']))\
    \ {\n\n    require_once('../PhpSolutions/Image/ThumbnailUpload.php');\n\n    try\
    \ {\n\n        $loader = new ThumbnailUpload('C:/upload_test/');\n\n        $loader->setThumbDestination('C:/upload_test/thumbs/');\n\
    \n        $loader->upload();\n\n        $messages = $loader->getMessages();\n\n\
    \    } catch (Exception $e) {\n\n        echo $e->getMessage();\n\n    }\n\n}\n\
    \n?>\n```\n\nAdjust the paths in the constructor and `setThumbDestination()` method,\
    \ if necessary.\n\nTest the `ThumbnailUpload` class by uploading the same images\
    \ again. This time, the original images and thumbnails should be renamed in the\
    \ same way as in [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html) through the addition\
    \ of a number before the filename extension. Try different tests, changing the\
    \ suffix inserted into the thumbnail names or deleting the original image after\
    \ the thumbnail has been created. If you run into problems, check your code against\
    \ `ThumbnailUpload.php` in the `ch08/PhpSolutions/Image` folder.\n\n![A978-1-4842-0635-5_8_Fig7_HTML.jpg](A978-1-4842-0635-5_8_Fig7_HTML.jpg)\n\
    \nFigure 8-7. The thumbnails are created at the same time as the images are uploaded\n\
    \nSave `create_thumb_upload.php` and load it in a browser. Click the Browse or\
    \ Choose Files button and select multiple images. When you click the Upload button,\
    \ you should see messages informing you of the successful upload and creation\
    \ of the thumbnails. Check the destination folders, as shown in Figure [8-7](#A978-1-4842-0635-5_8_Chapter.html#Fig7).\n\
    \n**Tip**: In older browsers that don’t support the `multiple` attribute on form\
    \ fields, the class uploads a single image and creates a thumbnail from it. To\
    \ support multiple uploads from older browsers, create multiple file fields in\
    \ the form and give them all the same `name` attribute followed by an empty pair\
    \ of square brackets, like this: `name=\"image[]\"`.\n\n## Using the `ThumbnailUpload`\
    \ Class\n\nThe `ThumbnailUpload` class is easy to use. Because it uses a namespace,\
    \ import the class at the top level of your file like this:\n\n`use PhpSolutions\\\
    Image\\ThumbnailUpload;`\n\nThen include the class definition and pass the path\
    \ for the upload folder to the class constructor method:\n\n`$loader = new ThumbnailUpload('C:/upload_test/');`\n\
    \nIf you want to delete the original image after the thumbnail has been created,\
    \ pass `true` as the second argument to the constructor, as follows:\n\n`$loader\
    \ = new ThumbnailUpload('C:/upload_test/', true);`\n\nThe class has the following\
    \ public methods:\n\n- `setThumbDestination()`: This sets the path to the folder\
    \ where the thumbnail images are to be saved. If you don’t call this method, the\
    \ thumbnails are stored in the same folder as the original images.\n- `setThumbSuffix()`:\
    \ Use this to change the suffix inserted into the thumbnail names. The default\
    \ is `_thb`.\n- `upload()`: This uploads the original image(s) and generates the\
    \ thumbnail(s). By default, images that have the same name as an existing one\
    \ are renamed. To overwrite existing images, pass `false` as an argument to this\
    \ method.\n- The class also inherits the following methods from the parent `Upload`\
    \ class:\n- `getMessages()`: Retrieves messages generated by the upload and the\
    \ thumbnail.\n- `getMaxSize()`: Gets the maximum upload size for an individual\
    \ image. The default is 50 KB.\n- `setMaxSize()`: Changes the maximum upload size.\
    \ The argument should be expressed as the number of bytes permitted.\n\nBecause\
    \ the `ThumbnailUpload` class is dependent on the `Upload` and `Thumbnail` classes,\
    \ you need to upload all three class definition files to your remote web server\
    \ when using this class on a live website.\n\n## Chapter Review\n\nThis has been\
    \ another intense chapter, showing not only how to generate thumbnails from larger\
    \ images, but also introducing you to extending an existing class and overriding\
    \ inherited methods. Designing and extending classes can be confusing at first,\
    \ but it becomes less intimidating if you concentrate on what each method is doing.\
    \ A key principle of class design is to break large tasks down into small, manageable\
    \ units. Ideally, a method should perform a single task, such as creating the\
    \ image resource for the original image.\n\nThe real advantage of using classes\
    \ is the time and effort they save once you have defined them. Instead of typing\
    \ dozens of lines of code each time you want to add file or thumbnail upload functionality\
    \ to a website, calling the class involves just a few simple lines. Also, don’t\
    \ think of the code in this chapter as being exclusively for creating and uploading\
    \ thumbnail images. Many of the subroutines in the class files could be adapted\
    \ for use in other situations.\n\nIn the next chapter, you’ll learn all about\
    \ PHP sessions, which preserve information related to a specific user and play\
    \ a vital role in password-protecting webpages."
