  \ 方法允许我们传递应用类型（`dogdata`），以便在 `get_dog_application` 中进行搜索。它还包含 `create_object` 类，该类将确定类名（`dog_data`），创建该类的一个实例，并将该类（类在内存中的地址）传回给调用程序。该类要求调用程序中存在一个\
  \ `get_properties` 函数。目前我们在 `Dog` 类中还没有这个函数。不过，我们可以在该类中创建一个外壳（一个空函数）来满足这个需求。\n\n\
