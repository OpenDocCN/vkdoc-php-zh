    versions of PHP do not have the json_encode() function, and by using Zend_Json
    we don’t have to worry about that.


    Now, if I wanted to represent the preceding PHP code as JavaScript code, I could
    call Zend_Json::encode() to do so:


    <script type="text/javascript">


    var book = <?php echo Zend_Json::encode($book) ?>


    </script>


