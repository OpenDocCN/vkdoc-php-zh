    **示例 5-7**  \n`validator_breed` 函数（位于`dog.php`中）\n\n我们可以创建一个 `private` 函数（仅供类内部使用）来检查品种是否合法。该函数接受一个传递给\
    \ `$value` 属性的字符串值。接着，函数使用 `$breed_file = simplexml_load_file(\"breeds.xml\");`\
