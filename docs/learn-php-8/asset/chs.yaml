  \ 选择框\n*   使用简单数组进行过滤和验证\n*   将简单数组传递给方法（函数）\n\n**安全的用户交互**\n\n在第 2 章中，`Hello World`\
  \ 示例包含了用户交互（点击提交按钮）来调用 PHP 程序。本章将使用 HTML web 表单来接受用户的信息，然后将这些信息传递给 PHP 程序。\n\n*不要信任你的用户！*\
  \ 你必须为你的用户在 web 表单中输入的任何类型的信息做好准备。你还必须确保在每次接受信息进入你的程序之前对其进行验证和保护。你必须记住，用户可能会选择不允许\
  \ JavaScript 在其浏览器中运行。因此，你的程序不能依赖 JavaScript 代码来进行输入验证。你必须能够处理以下场景：\n\n1.  如果用户使用的是支持\
  \ HTML5 的浏览器，你可以在将输入发送到 web 服务器上的 PHP 程序之前，使用 HTML5 和/或 JavaScript 验证所有输入。这将减少客户端机器和服务器之间的信息传递。信息在验证通过之前不会被传递。\n\
  2.  如果用户使用的浏览器不具备 HTML5 能力，用户输入仍然可以由 web 服务器上的 PHP 程序进行验证。\n\n最好使用第一种方法进行初始验证。这将在信息发送到服务器之前，大部分时间验证正确信息。第二种方法会导致更多的服务器调用，因为信息必须发送到服务器进行验证，然后任何错误消息必须发送回浏览器供用户更正。\n\
  \n即使你使用方法#1 验证了信息，当 PHP 程序在 web 服务器上接收到信息时，数据也必须再次进行评估。即使用户可能发送了有效信息，数据包嗅探程序也可以将有效信息更改为有害信息。\n\
  \n**HTML5 表单验证**\n\n当构建 HTML5 表单时，你可以验证用户输入的信息。如前所述，这将减少客户端机器和服务器之间的流量。安全的程序会限制接受用户文本输入的对象数量（如文本框）。在可能的情况下，向用户提供一个有效选项列表以供选择要安全得多。请记住，尚未实现\
  \ HTML5 技术（或全部 HTML5）的浏览器会将这些对象（如文本框）视为普通的非验证对象。框中的信息将被接受而不进行任何验证。然而，服务器上的 PHP 程序也会验证数据。\n\
  \n*   *安全性和性能——安全编程只是保护你信息完整过程的一部分。文件、目录、服务器、网络和数据库也必须得到适当的保护。此外，任何高度重要的信息（如信用卡号）必须通过安全通道（HTTPS）发送以进一步保护信息。用户\
  \ ID 和密码应进行哈希处理（加密），以使数据包嗅探软件难以获取。*\n\n我们将继续第 4 章的示例，通过更新 `Dog` 类来接受用户为我们属性输入的信息。`Dog`\
  \ 类已经具备了安全性；我们不需要对其进行额外的安全更新。\n\n```\nDog 对象\n\nDog 对象创建器\n\n请填写所有字段。请注意信息的所需格式。\n\
  您的狗的名字（最多 20 个字符，仅限字母）\n\n您的狗的品种（最多 35 个字符，仅限字母）\n\n您的狗的颜色（最多 15 个字符，仅限字母）\n\n您的狗的体重（仅限数字）\n\
  \n示例 5-1\n带有一些验证的 lab.html 文件\n```\n\n![../images/394210_2_En_5_Chapter/394210_2_En_5_Fig1_HTML.jpg](img/394210_2_En_5_Fig1_HTML.jpg)\n\
  \n**图 5-1**\nlab.html 文件\n\n在示例 5-1 中，`dog_name`、`dog_breed` 和 `dog_color` 文本框将字段长度设置为与第\
  \ 4 章中 `Dog` 类验证的相同最大值。它们还使用 HTML5 `pattern` 属性（[a-zA-Z]）来只允许字母字符。`title` 属性用于在输入错误信息时向用户显示错误。`dog_weight`\
  \ 文本框使用 `number` 输入类型，这自动限制了输入。`min` 和 `max` 参数也被设置，以将狗的体重限制在 1 到 120 磅之间。如前所述，如果浏览器没有完全实现\
  \ HTML5 标准，它可能不会解释这些限制。然而，这些信息将在服务器上的 PHP 程序中进行验证。\n\n\n\n### 用户输入验证与过滤\n\n确保从用户接受信息并将信息传递给应用程序的整个过程中，所有验证都是一致的，这一点非常重要。HTML\
  \ 和 JavaScript 代码很容易被用户查看（你可以在浏览器中通过“查看源代码”看到代码）。任何高安全级别格式的验证都应该在编译并受服务器保护的编程语言中完成。\n\
  \n- **安全性与性能**——你可能会疑惑为什么要在用户端进行验证。为什么不直接将所有信息传递给服务器上的程序，让程序告诉你是否需要修复任何问题？有些程序员确实这样做。然而，目标是拥有高效的程序。通过尝试在用户浏览器中验证信息，可以减少与服务器的往返调用次数。这提高了应用程序和\
  \ Web 服务器的性能与效率。此外，正如你将看到的，通过在浏览器中进行验证，文本框中的内容仍然可供用户调整。如果验证在 Web 服务器上完成，HTML 表单中的信息可能会丢失，因为每次与\
  \ Web 服务器收发信息时，网页都会重新加载。\n\n浏览器中验证的目标是确保用户提供的信息满足服务器上程序的要求。你最初可能会对这个示例向用户显示所需信息的格式感到不满。然而，目标不是保护数据安全；目标是确保数据有效。向用户告知所请求的数据格式并非安全漏洞。\n\
  \n#### 动手实践\n\n1. 调整示例 5-1，包含第 4 章“动手实践”中的性别信息。使用文本框从用户处接收信息。尝试使用 HTML5 来限制用户可以在文本框中输入的信息类型。测试你的代码。\n\
  \n### PHP 过滤\n\n现在是时候看看对 PHP 文件（`lab.php`）需要做哪些更改了。我们需要能够接收来自 HTML 程序的属性与值（`dog_name`、`dog_breed`、`dog_color`和`dog_weight`）。但是，我们需要担心有人可能会尝试发送可能影响程序运行甚至导致系统崩溃的信息。\n\
  \n本节采用两种方法来帮助减少有害数据的可能性。首先，我们将确定是否已收到所有必需信息。如果没有，我们将要求用户返回 HTML 页面（`lab.html`）输入信息。这至少可以确保我们拥有所有数据，并且这些数据可能已经通过了\
  \ HTML5 页面提供的验证。其次，我们将从接收到的数据中过滤掉 HTML、JavaScript 和 PHP 语法。这将减少可执行语句被传递到程序中的机会。\n\
  \n```php\n<?php declare(strict_types=1);\nrequire_once(\"dog.php\");\nif ((isset($_POST['dog_name']))\
  \ && (isset($_POST['dog_breed'])) && (isset($_POST['dog_color'])) && (isset($_POST['dog_weight'])))\n\
  {\nstring $dog_name = filter_var( $_POST['dog_name'],\nFILTER_SANITIZE_STRING);\n\
  string $dog_breed = filter_var( $_POST['dog_breed'],\nFILTER_SANITIZE_STRING);\n\
  string $dog_color = filter_var( $_POST['dog_color'],\nFILTER_SANITIZE_STRING);\n\
  string $dog_weight = filter_var( $_POST['dog_weight'],\nFILTER_SANITIZE_STRING);\n\
  $lab = new Dog($dog_name,$dog_breed,$dog_color,$dog_weight);\nlist($name_error,\
  \ $breed_error, $color_error, $weight_error) =\nexplode(',', $lab);\n...\n示例 5-2\n\
  lab.php 顶部含有 clean_input 方法的部分列表\n```\n\n*关于 PHP 函数`filter_var`的更多信息，请访问* [`www.php.net/manual/en/function.filter-var.php`](http://www.php.net/manual/en/function.filter-var.php)。*关于与`filter_var`一起使用的过滤器类型的更多信息，请访问*\
  \ [`www.php.net/manual/en/filter.filters.php`](http://www.php.net/manual/en/filter.filters.php)。*关于`$_POST`的更多信息，请访问*\
  \ [`www.php.net/manual/en/reserved.variables.post.php`](http://www.php.net/manual/en/reserved.variables.post.php)。\n\
  \n在`lab.php`的顶部，我们添加了几个项目以提供更安全的代码。\n\n```php\nif ((isset($_POST['dog_name'])) &&\
  \ (isset($_POST['dog_breed'])) &&\n(isset($_POST['dog_color'])) && (isset($_POST['dog_weight'])))\n\
  ```\n\n这个`if`语句使用`isset`方法和`$_POST`来验证所有四个属性（`dog_name`、`dog_breed`、`dog_color`和`dog_weight`）都已通过`POST`方法从\
  \ HTML 文件传递到程序中。如果所有项目都已传递，那么我们将过滤（清理）这些项目。如果其中任何一个没有传递，一个`else`语句（我们稍后将查看）将请求用户返回`lab.html`页面输入所有必需信息。\n\
  \n```php\nstring $dog_name = filter_var( $_POST['dog_name'],\nFILTER_SANITIZE_STRING);\n\
  string $dog_breed = filter_var( $_POST['dog_breed'],\nFILTER_SANITIZE_STRING);\n\
  string $dog_color = filter_var( $_POST['dog_color'],\nFILTER_SANITIZE_STRING);\n\
  string $dog_weight = filter_var( $_POST['dog_weight'],\nFILTER_SANITIZE_STRING);\n\
  ```\n\n`filter_var`方法与`FILTER_SANITIZE_STRING`过滤器将移除所有标签和其他字符来净化字符串。在字符串被净化后，它消除了用户输入可执行代码的可能性。但是，此时它不会消除不合逻辑的字符（例如狗名字中的数字）。我们稍后将进一步清理每个单独的字符串。\n\
  \n- **安全性与性能**——程序过滤掉从应用程序外部接收到的任何可能有害的信息至关重要。在有害数据被使用或保存之前，先将其移除或拒绝，要容易得多。在当今发生重大安全漏洞的情况下，这是绝对必须做的。\n\
  \n演示的过滤器方法不会阻止某人输入“asabsbabsa”作为狗的名字。然而，这些方法将防止任何输入造成危害。\n\n```php\nelse\n{\nprint\
  \ \"Missing or invalid parameters. Please go back to the lab.html page to\nenter\
  \ valid information.\";\nprint \"Dog Creation Page\";\n}\n示例 5-3\nlab.php 底部的部分列表\n\
  ```\n\n前面提到的`if`语句的`true`部分包含了`lab.php`文件中的所有活动代码。如果一个或多个参数缺失，`else`部分（位于`lab.php`文件的底部）将请求用户返回`lab.html`页面正确输入信息。\n\
  \n#### 动手实践\n\n1. 调整新的`lab.php`文件（从本书网站下载）中的代码。添加代码以过滤不良的性别代码，并确保已从 HTML 文件接收到性别信息。确保通过`filter_var`方法传递你的属性以移除任何有害数据。\n\
  \n### 额外的 HTML 输入安全\n\n从本章到目前为止开发的代码中可以看出，每当在 HTML 表单上使用文本框时，必须在多个区域包含额外的代码来验证用户输入的内容。当你需要允许用户在输入内容上有灵活性（例如包含姓名和地址的表单）时，文本框是必需的。但是，当你希望将用户的响应限制在特定的可能值列表（例如州的两字母缩写）时，可以使用其他表单对象。这将提供更有效的数据，因为用户将无法输入拼写错误或无效数据。\n\
  \n### HTML5 选择列表框和单选按钮\n\n\n\n### 排版后的内容\n\n我们可以从原始 HTML 文件中更改的一项内容是犬种条目。美国养犬俱乐部（American\
