- fmt: "# Summary\n\nIn this chapter, I covered some of the techniques and tools that\
    \ you can use to manage your libraries and classes. I explored PHP's namespace\
    \ feature. You saw that we can combine include paths, namespaces, autoload, and\
    \ the file system to provide flexible organization for classes.\n\nWe also examined\
    \ PHP's object and class functions, before taking things to the next level with\
    \ the powerful Reflection API. Finally, we used the `Reflection` classes to build\
    \ a simple example that illustrates one of the potential uses that `Reflection`\
    \ has to offer.\n\n# 6. Objects and Design\n\nNow that we have seen the mechanics\
    \ of PHP's object support in some detail, we will step back from the details and\
    \ consider how best to use the tools that we have encountered. In this chapter,\
    \ I introduce you to some of the issues surrounding objects and design. I will\
    \ also look at the UML, a powerful graphical language for describing object-oriented\
    \ systems.\n\nThis chapter will cover the following topics:\n\n- Design basics:\
    \ What I mean by design, and how object-oriented design differs from procedural\
    \ code\n- Class scope: How to decide what to include in a class\n- Encapsulation:\
    \ Hiding implementation and data behind a class's interface\n- Polymorphism: Using\
    \ a common supertype to allow the transparent substitution of specialized subtypes\
    \ at runtime\n- The UML: Using diagrams to describe object-oriented architectures\n\
    \n## Defining Code Design\n\nOne sense of code design concerns the definition\
    \ of a system: the determination of a system's requirements, scope, and objectives.\
    \ What does the system need to do? For whom does it need to do it? What are the\
    \ outputs of the system? Do they meet the stated need? On a lower level, design\
    \ can be taken to mean the process by which you define the participants of a system\
    \ and organize their relationships. This chapter is concerned with the second\
    \ sense: the definition and disposition of classes and objects.\n\nSo what is\
    \ a participant? An object-oriented system is made up of classes. It is important\
    \ to decide the nature of these players in your system. Classes are made up, in\
    \ part, of methods; so in defining your classes, you must decide which methods\
    \ belong together. As you will see, though, classes are often combined in inheritance\
    \ relationships to conform to common interfaces. It is these interfaces, or types,\
    \ that should be your first port of call in designing your system.\n\nThere are\
    \ other relationships that you can define for your classes. You can create classes\
    \ that are composed of other types or that manage lists of other type instances.\
    \ You can design classes that simply use other objects. The potential for such\
    \ relationships of composition or use is built into your classes (e.g., through\
    \ the use of type declarations in method signatures), but the actual object relationships\
    \ take place at runtime, which can add flexibility to your design. You will see\
    \ how to model these relationships in this chapter, and we'll explore them further\
    \ throughout the book.\n\nAs part of the design process, you must decide when\
    \ an operation should belong to a type and when it should belong to another class\
    \ used by the type. Everywhere you turn, you are presented with choices, decisions\
    \ that might lead to clarity and elegance or might mire you in compromise.\n\n\
    In this chapter, I will examine some issues that might influence a few of these\
    \ choices.\n\n## Object-Oriented and Procedural Programming\n\nHow does object-oriented\
    \ design differ from the more traditional procedural code? It is tempting to say\
    \ that the primary distinction is that object-oriented code has objects in it.\
    \ This is neither true nor useful. In PHP, you will often find procedural code\
    \ using objects. You may also come across classes that contain tracts of procedural\
    \ code. The presence of classes does not guarantee object-oriented design, even\
    \ in a language such as Java, which forces you to do most things inside a class.\n\
    \nOne core difference between object-oriented and procedural code can be found\
    \ in the way that responsibility is distributed. Procedural code takes the form\
    \ of a sequential series of commands and method calls. The controlling code tends\
    \ to take responsibility for handling differing conditions. This top-down control\
    \ can result in the development of duplications and dependencies across a project.\
    \ Object-oriented code tries to minimize these dependencies by moving responsibility\
    \ for handling tasks away from client code and toward the objects in the system.\n\
    \nIn this section, I'll set up a simple problem and then analyze it in terms of\
    \ both object-oriented and procedural code to illustrate these points. My project\
    \ is to build a quick tool for reading from and writing to configuration files.\
    \ In order to maintain focus on the structures of the code, I will omit implementation\
    \ details in these examples.\n\nI'll begin with a procedural approach to this\
    \ problem. To start with, I will read and write text in this format:\n\n```\n\
    key:value\n```\n\nI need only two functions for this purpose:\n\n```php\n// listing\
    \ 06.01\nfunction readParams(string $source): array\n{\n$params = [];\n// read\
    \ text parameters from $source\nreturn $params;\n}\nfunction writeParams(array\
    \ $params, string $source)\n{\n// write text parameters to $source\n}\n```\n\n\
    The `readParams` function requires the name of a source file. It attempts to open\
    \ it, and reads each line, looking for key/value pairs. It builds up an associative\
    \ array as it goes. Finally, it returns the array to the controlling code. `writeParams()`\
    \ accepts an associative array and the path to a source file. It loops through\
    \ the associative array, writing each key/value pair to the file. Here's some\
    \ client code that works with the functions:\n\n```php\n// listing 06.02\n$file\
    \ = __DIR__ . \"/params.txt\";\n$params = [\n\"key1\" => \"val1\",\n\"key2\" =>\
    \ \"val2\",\n\"key3\" => \"val3\",\n];\nwriteParams($params, $file);\n$output\
    \ = readParams($file);\nprint_r($output);\n```\n\nThis code is relatively compact\
    \ and should be easy to maintain. The `writeParams()` function is called to create\
    \ `param.txt` and to write to it with something like this:\n\n```\nkey1:val1\n\
    key2:val2\nkey3:val3\n```\n\nThe `readParams()` function parses the same format.\n\
    \nIn many projects, scope grows and evolves. Let's fake this by introducing a\
    \ new requirement. The code must now also handle an XML structure that looks like\
    \ this:\n\n```xml\n<params>\n    <param>\n        <key>my key</key>\n        <val>my\
    \ val</val>\n    </param>\n</params>\n```\n\nThe parameter file should be read\
    \ in XML mode if the parameter file ends in `.xml`. Although this is not difficult\
    \ to accommodate, it threatens to make my code much harder to maintain. I really\
    \ have two options at this stage. I can check the file extension in the controlling\
    \ code, or I can test inside my read and write functions. Here I go for the latter\
    \ approach:\n\n```php\n// listing 06.03\nfunction readParams(string $source):\
    \ array\n{\n$params = [];\nif (preg_match(\"/\\.xml$/i\", $source)) {\n// read\
    \ XML parameters from $source\n} else {\n// read text parameters from $source\n\
    }\nreturn $params;\n}\nfunction writeParams(array $params, string $source)\n{\n\
    if (preg_match(\"/\\.xml$/i\", $source)) {\n// write XML parameters to $source\n\
    } else {\n// write text parameters to $source\n}\n}\n```\n\n> Note"
  raw: '## Summary


    In this chapter, I covered some of the techniques and tools that you can use to
    manage your libraries and classes. I explored PHP’s namespace feature. You saw
    that we can combine include paths, namespaces, autoload, and the file system to
    provide flexible organization for classes.


    We also examined PHP’s object and class functions, before taking things to the
    next level with the powerful Reflection API. Finally, we used the `Reflection`
    classes to build a simple example that illustrates one of the potential uses that
    `Reflection` has to offer.


    # 6. Objects and Design


    Now that we have seen the mechanics of PHP’s object support in some detail, we
    will step back from the details and consider how best to use the tools that we
    have encountered. In this chapter, I introduce you to some of the issues surrounding
    objects and design. I will also look at the UML, a powerful graphical language
    for describing object-oriented systems.


    This chapter will cover the following topics:


    *   Design basics: What I mean by design, and how object-oriented design differs
    from procedural code

    *   Class scope: How to decide what to include in a class

    *   Encapsulation: Hiding implementation and data behind a class’s interface

    *   Polymorphism: Using a common supertype to allow the transparent substitution
    of specialized subtypes at runtime

    *   The UML: Using diagrams to describe object-oriented architectures


    ## Defining Code Design


    One sense of code design concerns the definition of a system: the determination
    of a system’s requirements, scope, and objectives. What does the system need to
    do? For whom does it need to do it? What are the outputs of the system? Do they
    meet the stated need? On a lower level, design can be taken to mean the process
    by which you define the participants of a system and organize their relationships.
    This chapter is concerned with the second sense: the definition and disposition
    of classes and objects.


    So what is a participant? An object-oriented system is made up of classes. It
    is important to decide the nature of these players in your system. Classes are
    made up, in part, of methods; so in defining your classes, you must decide which
    methods belong together. As you will see, though, classes are often combined in
    inheritance relationships to conform to common interfaces. It is these interfaces,
    or types, that should be your first port of call in designing your system.


    There are other relationships that you can define for your classes. You can create
    classes that are composed of other types or that manage lists of other type instances.
    You can design classes that simply use other objects. The potential for such relationships
    of composition or use is built into your classes (e.g., through the use of type
    declarations in method signatures), but the actual object relationships take place
    at runtime, which can add flexibility to your design. You will see how to model
    these relationships in this chapter, and we’ll explore them further throughout
    the book.


    As part of the design process, you must decide when an operation should belong
    to a type and when it should belong to another class used by the type. Everywhere
    you turn, you are presented with choices, decisions that might lead to clarity
    and elegance or might mire you in compromise.


    In this chapter, I will examine some issues that might influence a few of these
    choices.


    ## Object-Oriented and Procedural Programming


    How does object-oriented design differ from the more traditional procedural code?
    It is tempting to say that the primary distinction is that object-oriented code
    has objects in it. This is neither true nor useful. In PHP, you will often find
    procedural code using objects. You may also come across classes that contain tracts
    of procedural code. The presence of classes does not guarantee object-oriented
    design, even in a language such as Java, which forces you to do most things inside
    a class.


    One core difference between object-oriented and procedural code can be found in
    the way that responsibility is distributed. Procedural code takes the form of
    a sequential series of commands and method calls. The controlling code tends to
    take responsibility for handling differing conditions. This top-down control can
    result in the development of duplications and dependencies across a project. Object-oriented
    code tries to minimize these dependencies by moving responsibility for handling
    tasks away from client code and toward the objects in the system.


    In this section, I’ll set up a simple problem and then analyze it in terms of
    both object-oriented and procedural code to illustrate these points. My project
    is to build a quick tool for reading from and writing to configuration files.
    In order to maintain focus on the structures of the code, I will omit implementation
    details in these examples.


    I’ll begin with a procedural approach to this problem. To start with, I will read
    and write text in this format:


    ```

    key:value

    ```


    I need only two functions for this purpose:


    ```

    // listing 06.01

    function readParams(string $source): array

    {

    $params = [];

    // read text parameters from $source

    return $params;

    }

    function writeParams(array $params, string $source)

    {

    // write text parameters to $source

    }

    ```


    The `readParams` function requires the name of a source file. It attempts to open
    it, and reads each line, looking for key/value pairs. It builds up an associative
    array as it goes. Finally, it returns the array to the controlling code. `writeParams()`
    accepts an associative array and the path to a source file. It loops through the
    associative array, writing each key/value pair to the file. Here’s some client
    code that works with the functions:


    ```

    // listing 06.02

    $file = __DIR__ . "/params.txt";

    $params = [

    "key1" => "val1",

    "key2" => "val2",

    "key3" => "val3",

    ];

    writeParams($params, $file);

    $output = readParams($file);

    print_r($output);

    ```


    This code is relatively compact and should be easy to maintain. The `writeParams()`
    function is called to create `param.txt` and to write to it with something like
    this:


    ```

    key1:val1

    key2:val2

    key3:val3

    ```


    The `readParams()` function parses the same format.


    In many projects, scope grows and evolves. Let’s fake this by introducing a new
    requirement. The code must now also handle an XML structure that looks like this:


    ```


    my key

    my val


    ```


    The parameter file should be read in XML mode if the parameter file ends in `.xml`.
    Although this is not difficult to accommodate, it threatens to make my code much
    harder to maintain. I really have two options at this stage. I can check the file
    extension in the controlling code, or I can test inside my read and write functions.
    Here I go for the latter approach:


    ```

    // listing 06.03

    function readParams(string $source): array

    {

    $params = [];

    if (preg_match("/\.xml$/i", $source)) {

    // read XML parameters from $source

    } else {

    // read text parameters from $source

    }

    return $params;

    }

    function writeParams(array $params, string $source)

    {

    if (preg_match("/\.xml$/i", $source)) {

    // write XML parameters to $source

    } else {

    // write text parameters to $source

    }

    }

    ```


