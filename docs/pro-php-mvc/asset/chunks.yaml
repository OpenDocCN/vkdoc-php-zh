    The getColumn() method returns a column by name. One thing you might have noticed
    is that column class properties are assumed to begin with an underscore (_) character.
    This assumption is continued by the getColumn() method, which checks for a column
    without the _ character. When declared as a column property, columns will look
    like _firstName, but referenced by any public getters/setters/methods, they will
    look like setFirstName/firstName.


    The getPrimaryColumn() method loops through the columns, returning the one marked
    as primary.


    Now that we have the means to describe and iterate over our model properties (and,
