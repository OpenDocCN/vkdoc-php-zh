- fmt: '# Getting Familiar with Generators


    A *generator function* is a function that returns a special object as a result.
    That object resembles an array in its properties. But it is not really an array.
    Rather, it is a spectacular way to create an illusion of an array. In particular,
    the result of calling a generator function can be used in the `foreach` loop statement
    to iterate over a collection.


    | Details |

    | --- |

    | Formally, a generator function returns an object of the `Generator` class. The
    class implements the `Iterator` interface. An object of the `Generator` class
    cannot be created using the `new` statement. |


    Let’s consider the specifics of creating and using the generator functions employing
    small examples. You first need to know that the object returned by a generator
    function can be used to get a sequence of values. In particular, to get the current
    value, you can use the `current()` method, and to shift to the next value, you
    involve the `next()` method.


    Strictly speaking, “generator” is more appropriate for the object returned by
    a generator function. However, that term is used for the corresponding functions
    for convenience.


    The description of a generator function has its own peculiarities. So, to include
    a value to the list of values to be returned when the `current()` method is called,
    use the `yield` statement followed by the corresponding value within the function
    code. An example is shown in Listing [11-1](#613529_1_En_11_Chapter.xhtml#PC1).


    ```

    current(),"\n";

    // The shift to the next value:

    $color->next();

    }

    ?>

    Listing 11-1

    Getting Familiar with Generators

    ```


    The result of the program execution is as follows.


    ```

    The output of the program (from Listing 11-1)

    [1] Red

    [2] Yellow

    [3] Green

    ```


    In this case, you describe the `colors()` generator function, where you use the
    `yield "Red"`, `yield "Yellow"`, and `yield "Green"` commands. That means that
    the resulting generator object (which you get when calling the `colors()` function)
    generates the values `"Red"`, `"Yellow"`, and `"Green"`.


    The `$color=colors()` command is executed in the program, which writes the result
    of calling the `colors()` function to the `$color` variable. Thus, the `$color`
    variable refers to an object of the `Generator` class. That object has, among
    other things, the methods `current()` and `next()`. If you call the `current()`
    method from the `$color` object, you get the value `"Red"`. If, after that, you
    call the `next()` method and then the `current()` method again, you get the value
    `"Yellow"`. Finally, another call of the `next()` and `current()` methods gives
    you the value `"Green"`. All that is illustrated by the `for` loop statement,
    in which the `current()` and `next()` methods are called three times from the
    `$color` object.


    | Details |

    | --- |

    | If you call the `current()` method after three calls to the `next()` method
    (that is, after all the values “written” to the `$color` object have been iterated),
    you get a null reference. |


    There would be little use for the generator functions if two methods had to be
    called each time to generate a new value. Listing [11-2](#613529_1_En_11_Chapter.xhtml#PC3)
    illustrates a better way to use a generator function.


    ```

    Listing 11-2

    A Generator Function and a Loop Statement

    ```


    The program’s result is almost the same as in the previous case.


    ```

    The output of the program (from Listing 11-2)

    Red

    Yellow

    Green

    ```


    The code of the `colors()` generator function was slightly changed. The list of
    generated values is now implemented as an array, and the `yield` statement is
    called in the `foreach` loop statement in the function body. Also, you do not
    write the instruction with the function call into a separate variable but directly
    indicate it as a collection to be iterated in the `foreach` loop statement. The
    result is that instead of calling the `color()` function, you would specify an
    array with values displayed when the program is executed.


    ## A Generator Function with Arguments


    It might seem at first glance that the concept of a generator function is an unnecessary
    complication of the array-based approach. But it is far from being the case. The
    generator functions allow you to write beautiful and efficient codes. For example,
    Listing [11-3](#613529_1_En_11_Chapter.xhtml#PC5) uses a generator function with
    arguments to generate a sequence of numbers.


    ```

    Listing 11-3

    A Generator Function with Arguments

    ```


    The output of the program is as follows.


    ```

    The output of the program (from Listing 11-3)

    [1] 1 3 5 7 9

    [2] 3 4 5 6 7 8 9

    [3] 10 9 8 7 6 5

    ```


    The `numbers()` function is described with three arguments (the last one has a
    default value). The function is designed to create an object that generates a
    numeric sequence. The first argument `$count` specifies how many numbers should
    be in the sequence. The second argument `$start` specifies the first value in
    the sequence. The third argument, `$step` (with the default value `1`), specifies
    the increment when calculating the sequence. The core of the function is the loop
    statement. The count of cycles is determined by the `$count` argument. The `$num`
    variable, used in the `yield $num` command, gets the initial value defined by
    the `$start` argument. For each loop, the variable’s value is incremented by the
    value determined by the `$step` argument.


    You call the `number()` function in the `foreach` loop statements used to display
    the sequence of numbers. So, the `numbers(5,1,2)` instruction means generating
    the sequence of `5` numbers, the initial value is `1`, and each next number is
    `2` more than the previous one. The `numbers(7,3)` instruction is used to create
    the sequence of `7` numbers, starting from `3`, and each number is `1` greater
    than the previous one. Finally, using the `numbers(6,10,-1)` instruction, you
    get the sequence of `6` numbers; the first number is `10`, and each next number
    is `1` less than the previous one (the numbers are listed in reverse order).


    ## An Array Based on a Generator


    As noted, a generator gives the illusion of using an array. But sometimes, you
    must solve the more trivial task of creating an array based on a generator. In
    principle, the `iterator_to_array()` built-in function can be used for that. A
    generator is passed as an argument to the function, and the function returns the
    array created by iterating over the “contents” of the generator. Let’s say you
    have a function described as follows:


    ```

    function nums($n){

    for($k=1;$k<=$n;$k++){

    yield $k;

    }

    }

    ```


    Then, the following command inclusively creates the array of numbers from 1 to
    5, and a reference to the array is written to the `$A` variable.


    ```

    $A=iterator_to_array(nums(5));

    ```


    Listing [11-4](#613529_1_En_11_Chapter.xhtml#PC9) creates a function that duplicates
    the work of the built-in `iterator_to_array()` function.


    ```

    Listing 11-4

    An Array Based on a Generator

    ```


    The output of the program is as follows.


    ```

    The output of the program (from Listing 11-4)

    Array

    (

    [0] => 1

    [1] => 2

    [2] => 3

    [3] => 4

    [4] => 5

    )

    ```'
