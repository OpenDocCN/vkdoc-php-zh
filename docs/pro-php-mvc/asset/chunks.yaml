- fmt: "# Having defined the types of tags and statements our template parser must\
    \ be able to handle, we need to implement the functions that will process the\
    \ relevant tags and statements, as demonstrated in Listing 8-5.\n\n***Listing\
    \ 8-5.*** Statement Handler Functions\n\n```\nnamespace Framework\\Template\\\
    Implementation\n{\n    use Framework\\Template as Template;\n    use Framework\\\
    StringMethods as StringMethods;\n    \n    class Standard extends Template\\Implementation\n\
    \    {\n        protected function _echo($tree, $content)\n        {\n       \
    \     $raw = $this->_script($tree, $content);\n            return \"\\$_text[]\
    \ = {$raw}\";\n        }\n        \n        protected function _script($tree,\
    \ $content)\n        {\n            $raw = !empty($tree[\"raw\"]) ? $tree[\"raw\"\
    ] : \"\";\n            return \"{$raw};\";\n        }\n        \n        protected\
    \ function _each($tree, $content)\n        {\n            $object = $tree[\"arguments\"\
    ][\"object\"];\n            $element = $tree[\"arguments\"][\"element\"];\n  \
    \          return $this->_loop(\n                $tree,\n                \"foreach\
    \ ({$object} as {$element}_i => {$element}) {\n                    {$content}\n\
    \                }\"\n            );\n        }\n    }\n}\n```\n\nThe `_echo()`\
    \ method converts the string `“{echo $hello}”` to `“$_text[] = $hello”`, so that\
    \ it is already optimized for our final evaluated function. Similarly, the `_script()`\
    \ method converts the string `“{:$foo + = 1}”` to `“$foo + = 1”`.\n\nThe `_each()`\
    \ and `_for()` methods are also similar, but depend on the `_loop()` method to\
    \ augment their output with checks for the contents of the arrays used by those\
    \ statements, as long as an `{else}` tag follows them.\n\nThe `_each()` method\
    \ returns the code to perform a `foreach` loop through an array, while the `_for()`\
    \ method produces the code to perform a `for` loop through an array.\n\nThe methods\
    \ `_if()`, `_else()`, and `_elif()` return code to perform each of those operations\
    \ within our templates. We could obviously rewrite these methods (as well as `_each()`\
    \ and `_for()`) to use the alternative closing syntax (`endif`, `endforeach`,\
    \ `endfor`, etc.), but that’s really up to you.\n\nThe `_macro()` method creates\
    \ the string representation of a function, based on the contents of a `{macro...}...{/macro}`\
    \ tag set. It is possible, using the `{macro}` tag, to define functions, which\
    \ we then use within our templates.\n\nFinally, the `_literal()` method directly\
    \ quotes any content within it. The template parser only stops directly quoting\
    \ the content when it finds a `{/literal}` closing tag. Now that we have our template\
    \ dialect implementation class (see Listing 8-6), we can begin to use it in our\
    \ parser. But what does our parser look like?\n\n***Listing 8-6.*** The Template\
