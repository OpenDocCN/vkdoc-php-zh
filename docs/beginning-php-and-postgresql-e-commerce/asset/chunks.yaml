  raw: 'C H A P T E R 3 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I
    Under the list of departments, you can now see the list of categories that belong
    to the selected department. In the right side of the screen, you can see the name
    of the selected department, its description, and its featured products. We decided
    to list only the featured products in the department page, in part because the
    complete list would be too long. The text above the list of featured products
    is the description for the selected department, which means you’ll need to store
    both a name and a description for each department in the database.


    In this page, when a particular category from the categories list is selected,
    all of its products are listed, along with updated title and description text.


    Clicking a product’s image in any of the products lists takes you to a product
    details page, which you can see in Figure 3-3.


    **Figure 3-3.** *Visiting the Halloween Hats category* When a category is selected,
    all its products are listed—you no longer see featured products. Note that the
    description text also changes. This time, this is the description of the selected
    category.


    **Roadmap for This Chapter**


    As you can see, the product catalog, although not very complicated, has more parts
    that need to be covered. In this chapter, you’ll only create the departments list
    (see Figure 3-4).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


