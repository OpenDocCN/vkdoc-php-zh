  \n![](img/00041.png)\n\n**5.** 登录 Authorize.net 的商户管理界面 (https://test.authorize.net/)，您可以在“搜索”选项卡下的“未结算交易”部分看到刚刚执行的交易。该报告如图\
  \ 15-4 所示。\n\n**图 15-4.** *Authorize.net 未结算交易*\n\n## 工作原理：Authorize.net 交易\n\n\
  繁重的工作由 `AuthorizeNetRequest` 类完成，该类有两个重要方法：`SetRequest` 用于设置交易详情，`GetResponse` 用于向\
  \ Authorize.net 发送请求并接收响应。以下代码片段展示了它们的使用方法：\n\n```php\n// 认证\n\n$transaction = array\
  \ (\n    'x_invoice_num' => '99999',   // 发票编号\n    'x_amount' => '45.99',     \
  \   // 金额\n    'x_card_num' => '4007000000027', // 信用卡号\n    'x_exp_date' => '1209',\
  \       // 到期日期\n    'x_method' => 'CC',           // 支付方式\n    'x_type' => 'AUTH_ONLY');\
  \     // 交易类型\n\n$request->SetRequest($transaction);\n$response = $request->GetResponse();\n\
  ```\n\n> **注意** 本交易中提到的信用卡数据是 Authorize.net 为测试目的提供的\"魔法卡号\"之一。请查阅 AIM 实施指南获取完整的此类信用卡号列表。\n\
  \n我们将包含交易详情的数组作为参数发送给 `SetRequest`。接着，`SetRequest` 会将此数组与另一个包含 Authorize.net 账户详情的数组合并：\n\
  \n```php\npublic function SetRequest($request)\n{\n    $this->_mRequest = '';\n\n\
  \    $request_init = array (\n        'x_login' => AUTHORIZE_NET_LOGIN_ID,\n   \
  \     'x_tran_key' => AUTHORIZE_NET_TRANSACTION_KEY,\n        'x_version' => '3.1',\n\
  \        'x_test_request' => AUTHORIZE_NET_TEST_REQUEST,\n        'x_delim_data'\
  \ => 'TRUE',\n        'x_delim_char' => '|',\n        'x_relay_response' => 'FALSE');\n\
  \n    $request = array_merge($request_init, $request);\n```\n\n数组数据被合并成一个可以发送给 Authorize.net\
  \ 的“名称-值”字符串。这些值会通过 `urlencode()` 函数进行编码，以便包含在 URL 中：\n\n```php\nforeach($request\
  \ as $key => $value )\n    $this->_mRequest .= $key . '=' . urlencode($value) .\
  \ '&';\n}\n```\n\n\n\n`AuthorizeNetRequest`的`GetResponse()`方法使用`CURL`库执行实际的请求。\n\
  \n```php\n// 使用 CURL 向 Authorize.net 发送 HTTP POST 请求\n\npublic function GetResponse()\n\
  {\n    ...\n    // 执行 CURL 会话\n    $result = curl_exec($ch);\n\n    // 关闭 CURL 会话\n\
  \    curl_close ($ch);\n\n    // 返回响应\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n    648XCH15.qxd 11/15/06 6:21 PM Page 531\n\n    C H A P T E R 1 5 ■ C R E D\
  \ I T C A R D T R A N S A C T I O N S\n\n    **531**\n    return $result;\n}\n}\n\
  ?>\n```\n\n当执行`GetResponse()`函数进行`AUTH_ONLY`交易时，响应将包含一个交易 ID。如果授权成功，我们可以使用此交易 ID\
  \ 执行`PRIOR_AUTH_CAPTURE`交易，从而实际从客户账户中扣款。\n\n如前所述，`Authorize.net`的响应以字符串形式返回，其中包含由可配置字符（本例中为管道符`|`）分隔的值。要从字符串中读取特定值，我们使用\
  \ PHP 的`explode()`函数（<http://www.php.net/manual/en/function.explode.php>）将字符串转换为数组：\n\
  \n```php\n$auth_only_response = $request->GetResponse();\n$_SESSION['auth_only_response']\
  \ = $auth_only_response;\n\n**$auth_only_response = explode('|', $auth_only_response);**\n\
  ```\n\n此代码执行后，`$auth_only_response`将包含一个数组，其元素为原始字符串中由管道符分隔的值。我们关注该数组中的第七个元素，根据`Authorize.net`文档，这是交易\
  \ ID。（有关`Authorize.net`响应的完整详细信息，请阅读<http://www.authorize.net/support/AIM_guide.pdf>中的网关响应\
  \ API 详情。）\n\n```php\n// 读取交易 ID，后续扣款时需要用到\n$ref_trans_id = $auth_only_response[6];\n\
  ```\n\n> **注意**：`explode()`创建的`$auth_only_response`数组是基于零的，因此`$auth_only_response[6]`表示数组的第七个元素。\n\
  \n使用此交易 ID 扣款的代码非常简单。由于交易已授权，我们只需指定授权后收到的交易 ID 即可完成交易：\n\n```php\n// 扣款\n**$transaction\
  \ = array (\n    'x_ref_trans_id' => $ref_trans_id, // 交易 ID\n    'x_method' =>\
  \ 'CC',               // 支付方式\n    'x_type' => 'PRIOR_AUTH_CAPTURE'  // 交易类型\n);**\n\
  $request->SetRequest($transaction);\n$prior_auth_capture_response = $request->GetResponse();\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH15.qxd 11/15/06\
