    **Chapter 17**


    **Sharing**


    Relationships are at the heart of any social network. In the Chapter 16, we had
    a brief look at how to search for other social network users, and in this chapter
    we will make a way to befriend them! We will also explore the topic of status/link
    sharing, and integrate it all into an activity feed.


    **Goals**


    - We will create user-friendly error pages that present exception stack traces
    when the application is in debugging mode.


    - We will create the models, actions, and views necessary to support adding/removing
    friends from our account.


    - We will create the models, actions, and views necessary to be able to share
    messages, and read messages our friends have shared.


    **Error Pages**


    Error pages are an unavoidable part of any large application. We deal with them
    when programming, usually in the form of exceptions. We have already seen (and
    created) a number of `Exception` subclasses, but they aren''t really useful to
    us unless we have a nice way to present the exception data (in the case of debugging)
    or a user-friendly error page, in the case of a public-facing application.


    The difference between these two representations of errors is quite important.
    If you are intending on building a secure application, one of the first things
    you should do is disable error reporting. You don''t want users seeing why your
    application is failing. This is not to say that users shouldn''t be given advice
    on how to better use the system, as in the case of validation errors, but the
    average user should not be made aware that your application failed to connect
    to a database, or that a crucial class could not be loaded.


    We will solve this problem by creating (and loading) special pages to inform the
    user that something has gone wrong. We will achieve this by first modifying the
    `public/index.php` bootstrap file, as shown in Listing 17–1.


    **Listing 17–1.** `public/index.php` (Modified)


    ```php

    // constants


    define("DEBUG", TRUE);


    define("APP_PATH", dirname(dirname(__FILE__)));


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    try


    {


    // core


    require("../framework/core.php");


    Framework\Core::initialize();


    // configuration


    $configuration = new Framework\Configuration(array(


    "type" => "ini"


    ));


    Framework\Registry::set("configuration", $configuration->initialize());


    // database


    $database = new Framework\Database();


    Framework\Registry::set("database", $database->initialize());


    // cache


    $cache = new Framework\Cache();


    Framework\Registry::set("cache", $cache->initialize());


    // session


    $session = new Framework\Session();


    Framework\Registry::set("session", $session->initialize());


    // router


    $router = new Framework\Router(array(


    "url" => isset($_GET["url"]) ? $_GET["url"] : "home/index",


    "extension" => isset($_GET["url"]) ? $_GET["url"] : "html"


    ));


    Framework\Registry::set("router", $router);


    $router->dispatch();


    // unset globals


    unset($configuration);


    unset($database);


    unset($cache);


    unset($session);


    unset($router);


    }

    ```'
