    The save() method determines what kind of query you need by looking at whether
    you have called the where() method on this query object. If you have, it assumes
    it is to specify a row ID (or other row-specific criteria), and calls the _buildUpdate()
    method accordingly. If the INSERT/UPDATE query fails to execute, a Database\Exception\Sql
    exception is thrown. If they do execute correctly, and an INSERT query was performed,
    the last inserted ID will be returned. If an UPDATE query was performed, 0 is
    returned (as a means of specifying that the operation was successful).


    ■ **Note** We don’t return affected rows or boolean values with the save() method—those
    would make this function’s results ambiguous. You can find the affected rows of
    an UPDATE query, by calling the getAffectedRows() method on the database connector.


    The delete() method simply calls the _buildDelete() method and executes its result.
    If the query could not execute, a Database\Exception\Sql exception is thrown;
    otherwise, the number of affected rows are returned. The last three public methods
    we need return all rows matching a query, the first row matching a query, and
    a count of all rows to be returned by a query. You can see how this is demonstrated
    in Listings 9-12 and 9-13.'
