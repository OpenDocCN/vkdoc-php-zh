    ## 10.2 在 Elastic Beanstalk 上托管


    虽然本书大部分内容聚焦于基础设施即服务云，但我还是想花点时间介绍一种平台即服务云。AWS 有一种名为“Elastic Beanstalk”的 PaaS 云服务，它支持多种不同类型的应用程序，其中一种就是
    PHP。


    PaaS 云将云计算中的所有系统管理工作都剥离掉了。但问题是，大多数高级云系统最终仍然需要一定程度的系统管理。这并不是说当你有特殊配置需求时，PaaS 系统就无法使用，而是说，要正确、可维护地配置你的
    PaaS 系统，并使其与平台提供商的操作保持同步，所花费的精力往往比你在 IaaS 云中完全掌控还要多。无论如何，在本节中，我们将介绍如何让我们的应用程序在
    Elastic Beanstalk 上运行起来。


    在 PaaS 系统中，我们无法控制机器。因此，我们不能指定某台机器作为数据库服务器、作业服务器等。相反，每个应用程序可以根据 PaaS 系统的意愿在任意数量的机器上进行伸缩。这通常意味着
    PaaS 系统将管理数据库。


    对于 AWS 来说，这意味着要使用他们的关系型数据库服务——RDS。将应用程序连接到 RDS 非常简单。Elastic Beanstalk 会为所有连接信息设置环境变量，我们只需编程让应用程序读取它们即可。


    为此，我们只需修改 `common.php` 文件，替换 `getReadOnlyConnection()` 和 `getReadWriteConnection()`
    函数。这两个函数应该如图 10-5 所示。


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig5_HTML.png](img/487291_1_En_10_Fig5_HTML.png)


    **图 10-5** 使用 RDS 访问数据库


    这将根据 RDS 传入的环境变量构建一个连接字符串。


    其次，由于你无法直接访问数据库，我们需要一个 PHP 脚本来为我们创建数据库表。创建一个名为 `createdb.php` 的文件，并在其中放入以下代码。


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig6_HTML.png](img/487291_1_En_10_Fig6_HTML.png)


    **图 10-6** 使用 RDS 创建数据库


    请注意，由于我们没有特定的服务器，这些修改是在个人电脑硬盘上的本地应用程序副本中进行的。一旦修改完成，你就可以开始操作了。


    要开始使用 Elastic Beanstalk，请返回 AWS 管理控制台并搜索“Elastic Beanstalk”。在仪表板上，点击标题为“Create
    New Application”的按钮。为其命名，然后点击“Create”。


    在 EB 中，应用程序可以划分为“环境”。环境可用于各种用途，包括区分预发环境与生产环境、为不同任务划分不同的服务器组，以及在应用程序的不同版本之间快速切换。就我们而言，我们只需要一个环境。因此，点击按钮创建一个新环境。它会询问你要创建哪种类型的环境。我们需要一个“Web
    Server Environment”。


    下一个屏幕是配置屏幕，如图 10-7 所示。你可以根据需要为环境命名，但该屏幕上唯一重要的设置是选择“Preconfigured Platform”。显然，我们选择“PHP”。默认情况下，它会加载一个示例应用程序。这正是我们目前需要的。点击“Create
    Environment”完成该过程。


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig7_HTML.jpg](img/487291_1_En_10_Fig7_HTML.jpg)


    **图 10-7** 创建新环境


    创建完成后，你将看到一个如图 10-8 所示的仪表板。在“Overview”部分，它显示了应用程序的基本运行状况、版本和平台。在“Recent Events”下，它列出了系统最近执行的所有操作。请注意，EB
    中的*一切*操作最终花费的时间都可能比你想象的要长得多，但“Recent Events”能帮助你密切关注进度，并让你在等待时有所参照。在左侧，我们将关注三个区域：“Dashboard”（我们当前所在位置）、“Configuration”（应用程序的设置方式）和“Logs”。


    ![../images/487291_1_En_10_Chapter/487291_1_En_10_Fig8_HTML.jpg](img/487291_1_En_10_Fig8_HTML.jpg)


    **图 10-8** EB 环境仪表板


    由于我们是从示例应用程序开始的，你现在已经可以在网络浏览器中加载该示例应用程序了。在仪表板上，有一个指向你应用程序 URL 的链接。你可以点击它，它会带你进入示例应用程序。


    在上传我们的应用程序之前，我们需要先设置数据库。为此，请进入“Configuration”部分，然后转到“Database”并点击“Modify”。这将允许你为应用程序创建一个
    RDS 实例。将“Engine”设置为 `postgres`，输入用户名和密码（务必记下来！），然后点击“Apply”。当运行状态图标变为对勾时（这可能需要
    10-20 分钟），你就可以上传应用程序了。


    要上传你的应用程序，请将所有文件打包成一个 zip 归档文件。然后，在仪表板上，点击标有“Upload and Deploy”的按钮。从硬盘中选择 zip
    文件，为版本命名（具体名称无关紧要），然后点击“Deploy”。运行状态图标将变为一个旋转的刷新图标，开始部署你的应用程序。当图标变回对勾时，你的应用程序就部署完成了！


    但是，我们还没有完全结束。当你点击链接时，它会显示一条“Forbidden”消息。这是因为我们没有 `index.php` 文件（不过如果你愿意，可以添加一个）。然而，我们需要创建数据库，所以首先需要导航到
    `createdb.php` 文件来创建数据库（只需在浏览器 URL 末尾添加 `/createdb.php` 并按回车键）。这应该会显示一个空白页面，这没问题。


    现在，如果你将 URL 更改为访问 `list.php`，一切应该都能正常工作了！


    现在，你可以对你的应用程序进行许多操作，使其具有可伸缩性。所有这些都可以从环境的“Configuration”选项卡中找到。默认情况下，EB 创建的环境是单服务器环境。要将其升级为负载均衡的应用程序，只需进入“Capacity”部分，将“Environment
    Type”更改为“Load Balanced”。这将为你提供许多可供选择的选项。最简单（也最重要）的是实例的“minimum”和“maximum”数量。将最小值设置为
    `2`，以确保它至少为你启动两台机器。点击“Apply”，等待几分钟，你的应用程序现在就是负载均衡的了。


    你可以进行的其他更改包括：


    *   在“Instances”下，你可以更改每个单独实例的大小。

    *   在“Load Balancer”下，你可以更改许多变量，包括负载均衡机制。

    *   在“Rolling Updates and Deployments”下，你可以更改部署策略，以消除更新期间的停机时间（“Immutable”选项最适合生产环境，但执行更新需要很长时间）。

    *   在“Software”下，你可以设置环境变量和网络服务器配置选项。

    *   在“Database”下，你可以更改数据库的大小。你还可以点击“Endpoint”链接，进入 RDS 管理控制台，获取额外的数据库管理工具。

