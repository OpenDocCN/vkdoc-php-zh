    To understand the concept of passing of data through the GET and POST methods,
    you’ll make a form that asks the user to enter their name and e-mail address,
    as shown in Figure [2-3](#A978-1-4842-1672-9_2_Chapter.html#Fig3).


    ![A978-1-4842-1672-9_2_Fig3_HTML.jpg](A978-1-4842-1672-9_2_Fig3_HTML.jpg)


    Figure 2-3.


    Form prompting for name and e-mail address


    To create such a form, create a PHP script called `userinfo.php` with the code
    shown in Listing [2-5](#A978-1-4842-1672-9_2_Chapter.html#FPar6).


    Listing 2-5\. Form for Entering the Name and E-Mail Address (userinfo.php)


    `<html>`


        `<head>`


        `</head>`


        `<body>`


            `<form action="display.php" method="Get">`


                `Name: <input type="text" name="name" /><br/><br/>`


                `Email address: <input type="text" name="email_add" /><br/><br/>`


                `<input type="submit" value="Submit" />`


            `</form>`


        `</body>`


    `</html>`


    This form has two input boxes named `name` and `email_add`. The form `action`
    points to a PHP file, `display.php`. The HTTP method used for passing data (`name`
    and `email_add`) is GET.


    To pass information between the scripts, three arrays that act as a carrier of
    data are `$_GET`, `$_POST`, and `$_REQUEST`. You’ll learn how these arrays are
    used to transmit data one by one.


    ### Using $_GET Array


    The `$_GET` array is where data from the previous form sent using the HTTP GET
    method is stored. The data from the previous form is sent in the form of pairs:
    variable name(s) and value(s).


    Refer to the form shown in Listing [2-2](#A978-1-4842-1672-9_2_Chapter.html#FPar2).
    When the user clicks the Submit button in it, the URL in the browser’s address
    bar will appear as shown:


    `http://localhost/display.php?name=john&email_add=john@yahoo.com`


    You can see that the URL displays all the information that is being passed. The
    destination PHP script, `display.php`, can now extract the data from the `$_GET`
    array through the code, as shown in Listing [2-6](#A978-1-4842-1672-9_2_Chapter.html#FPar7).


    Listing 2-6\. Form for Accessing Information from the $_GET Array (display.php)


    `<html>`


        `<head>`


        `</head>`


        `<body>`


            `Welcome <?php echo $_GET["name"]; ?>.<br>`


            `Your email address is <?php echo $_GET["email_add"]; ?>`


        `</body>`


    `</html>`


    This code accesses the name and e-mail address passed by `userinfo.php` through
    the `$_GET` array and displays them on the screen, as shown in Figure [2-4](#A978-1-4842-1672-9_2_Chapter.html#Fig4).


    ![A978-1-4842-1672-9_2_Fig4_HTML.jpg](A978-1-4842-1672-9_2_Fig4_HTML.jpg)


    Figure 2-4.


    Name and e-mail address of the user displayed on another form


    ### Using $_POST Array


    The `$_POST` array collects the values sent from a form using the HTTP POST method.
    To pass data using the POST method, you only need to replace GET in the form’s
    method attribute with POST in the `userinfo.php` script shown in Listing [2-2](#A978-1-4842-1672-9_2_Chapter.html#FPar2).


    As discussed, in the POST method, the `$_POST` array collects the values from
    the form. It also means that when the users click the Submit button, the `$_POST["name"]`
    and `$_POST["email_add"]` variables will be automatically filled with the data
    they entered in the two boxes.


    To display the name and e-mail address in the destination PHP script, `display.php`,
    you need to replace the `$_GET` array with the `$_POST` array, as shown in Listing
    [2-7](#A978-1-4842-1672-9_2_Chapter.html#FPar8).


    Listing 2-7\. Form for Accessing Information from the $_POST Array (display.php)


    `<html>`


        `<head>`


        `</head>`


        `<body>`


            `Welcome <?php echo $_POST["name"]; ?>.<br>`


            `Your email address is <?php echo $_POST["email_add"]; ?>`


        `</body>`


    `</html>`


    Besides `$_GET` and `$_POST`, there is one more array that is used for storing
    information about the current form; it’s called `$_REQUEST`.


    ### Using the $_REQUEST Array


    The `$_REQUEST` array contains the content of `$_GET` and `$_POST`. That is, it
    is used to collect the information from a form that’s sending data by the GET
    or POST method.


    So, in case you don’t know which HTTP method was used by the source PHP script,
    it is wise to access the information using the `$_REQUEST` array. To display the
    name and e-mail address via the `$_REQUEST` array in the `display.php` script,
    you replace `$_POST` (in Listing [2-7](#A978-1-4842-1672-9_2_Chapter.html#FPar8))
    with `$_REQUEST`, as shown in Listing [2-8](#A978-1-4842-1672-9_2_Chapter.html#FPar9).


    Listing 2-8\. Form for Accessing Information from the $_REQUEST Array (display.php)


    `<html>`


        `<head>`


        `</head>`


        `<body>`


            `Welcome <?php echo $_REQUEST["name"]; ?>.<br />`


            `Your email address is <?php echo $_REQUEST["email_add"]; ?>`


        `</body>`


    `</html>`


    Now you know how forms are created and through which HTTP methods. Information
    from one form can also be transferred to another. Next, you’ll use the knowledge
    you’ve gained so far to create a sign-up form that enables users to register on
    your site.'
  trans: "\n# 在脚本之间传递信息\n\n为了理解通过 GET 和 POST 方法传递数据的概念，你将创建一个表单，要求用户输入姓名和电子邮件地址，如图\
