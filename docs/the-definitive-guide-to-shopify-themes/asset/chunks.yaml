    by Shopify on all product pages) to see if any images have been added to the product
    by the storeowner (`{%- if product.images.size > 0 -%}`). If so, we display the
    “primary” image in a large `<img>` tag, and, if the product has more than one
    image, we iterate over all product images to generate a list of product thumbnails.


    For now, the implementation opens images in a new browser window when the thumbnail
    images are clicked, rather than swapping out the large product image for the thumbnail
    version. If you check the more extensive example in the GitHub repository, you’ll
    see that I’ve leveraged a carousel control that allows the users to slide through
    product images with left/right controls, as well as skip to a specific product
    image using the thumbnails.


    ### Design Considerations for Product Images


    While we’re in the process of adding product images to your example theme, it’s
    worth considering some high-level design guidelines. Product imagery should generally:


    *   Be large (easy to discern details, even on smaller screens and for visitors
    with poor eyesight)

    *   Be of high quality (both in terms of production technique and the file quality)

    *   For physical products, give a sense of the scale of the product

    *   Display the product both by itself and in use

    *   Not use any overt filters or digital alteration

    *   Be as consistent as possible in terms of look, feel, and aspect ratio


    You won’t always have control over the product imagery used in your themes, but
    when you do, try to advocate for these principles. Encourage clients to invest
    time and budget on professionally-shot imagery (ideally, by a studio with specific
    experience in Ecommerce product photography). Customers are very sensitive to
    the quality of product photography on an Ecommerce site and will be much less
    likely to convert if your product images look unprofessional.


    One of the best things you can do at the start of a theme design project is set
    firm guidelines on product image resolution and aspect ratio. Request that merchants
    upload images in the highest resolution possible (2048 x 2048 pixels is a good
    goal and the largest Shopify will render). To avoid bloating your page load times,
    you can make use of Shopify’s image filters (discussed in the next section) to
    render a lower-resolution version of images where appropriate.


    Sticking to one consistent aspect ratio for product images across the entire site
    reduces the likelihood of irregular or jarring differences in the appearance of
    products when they are rendered next to each other. I like to encourage square
    (1:1) images where possible, although 4:3 or 3:4 can work well depending on the
    types of products being sold. While you can use stylesheets and Shopify’s image
    filters to crop, stretch, and trim images, it’s always easier to do that with
    a common starting point.


    ### Shopify’s Image Filters


    One of Shopify’s handy features is the ability to use Liquid filters to perform
    on-the-fly image resizing and manipulation. This means that storeowners can upload
    the highest-resolution version of a product image to the backend, and a theme
    developer can use these filters to generate a version that’s the appropriate size
    and aspect ratio for a given location.


    The key filter in question is called `product_img_url`, and you can see it being
    used in Listing [5-1](#A437216_1_En_5_Chapter.html#Par13). You can check the Shopify
    documentation for the details,[¹](#A437216_1_En_5_Chapter.html#Fn1) but key uses
    for the filter include:


    *   Using smaller versions of an image to decrease file size and page load times
    (you’ll be learning about this in Chapter [10](#A437216_1_En_10_Chapter.html)
    on performance)

    *   Cropping or padding images to ensure they have a consistent aspect ratio

    *   Converting images to Progressive JPEGs for faster load times


    ### Zoomable Product Images and Product Lightboxes


    Implementing zooming product images (where mousing over a product image provides
    a “zoomed” version of it), or product lightboxes (where clicking a product image
    pops open a “modal” full-screen product image) can be a great way of letting customers
    get up close with your productions, but it’s critical that these design elements
    don’t break the users’ flow by making them feel like they’ve left the original
    product page. Other things to be wary of when implementing these features are:


    *   They should be progressively enhanced, maintaining usability if JavaScript
    isn’t available.

    *   Consider disabling them on mobile devices, where product images will often
    be full width already, or where users are used to pinching a touch device to zoom
    in on images.

    *   Ensure that they are keyboard accessible in that users should be able to move
    through successive images using their arrow keys and close the lightbox with the
    Escape key.'
