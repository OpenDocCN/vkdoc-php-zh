    # 引言


    PHP 是一种服务器端编程语言，用于创建动态网站和交互式 Web 应用程序。PHP 这个缩写最初代表“Personal Home Page”（个人主页），但随着其功能的增强，它变为了“PHP：Hypertext
    Preprocessor”（PHP：超文本预处理器）。这个递归缩写的由来是因为它接收 PHP 代码作为输入，并生成 HTML 作为输出。这意味着用户无需安装任何软件即可查看
    PHP 生成的网页。唯一的要求是 Web 服务器上安装了 PHP 以解释脚本。


    与 HTML 网站相比，PHP 网站是动态生成的。网站不是由大量静态 HTML 文件组成，而可能仅由少数模板文件构成。模板文件仅使用 PHP 代码描述网站的结构，而网页内容则从数据库中提取，样式格式来自层叠样式表（CSS）。这提供了一个灵活的网站，允许多个位置进行全站范围的更改，使网站易于设计、维护和更新新内容。


    使用 PHP 创建网站时，通常使用内容管理系统（CMS）。CMS 提供了一个完全集成的网站开发平台，包括后端和前端。前端是访问者到达网站时看到的界面，而后端是管理员配置、更新和管理网站的地方。后端还允许
    Web 开发人员更改模板文件和修改插件，以更广泛地自定义网站的功能和结构。免费且基于 PHP 的 CMS 解决方案示例包括 WordPress、Joomla、ModX
    和 Drupal，其中 WordPress 最受欢迎，占据了超过一半的 CMS 市场份额。


    PHP 的第一个版本由拉斯姆斯·勒多夫创建并于 1995 年发布。自那时起，PHP 已从一个简单的脚本语言演变为功能齐全的 Web 编程语言。官方实现现由
    PHP 小组发布，截至撰写本文时，PHP 5.5 是最新版本。该语言可以免费使用并且是开源的，允许开发人员扩展它以用于自己的目的或为其开发做出贡献。


    PHP 是当今使用的最流行的服务器端编程语言。与其他服务器端技术（如 ASP.NET、Java、Ruby 和 Perl）相比，它拥有不断增长的 75% 市场份额。PHP
    被广泛采用的原因之一是其平台独立性。它可以安装在所有主要的 Web 服务器和操作系统上，并与任何主要的数据库系统一起使用。PHP 的另一个强大特性是其基于
    C 和 Perl 的简单易用的语法，新手易于学习，同时为专业程序员提供许多高级功能。


    # 第 1 章：使用 PHP


    ![image](img/frontdot.jpg)


    要开始使用 PHP 进行开发，请创建一个扩展名为 `.php` 的纯文本文件，并在您选择的编辑器中打开它——例如记事本、JEdit、Dreamweaver、Netbeans
    或 PHPEclipse。这个 PHP 文件可以包含任何 HTML 以及 PHP 脚本代码。首先将以下标准 HTML 元素输入到文档中。


    ```

    <html>

     <head><title>PHP 测试</title></head>

     <body></body>

    </html>

    ```


    ## 嵌入 PHP


    PHP 代码可以通过四种不同方式中的任何一种嵌入到 Web 文档中的任何位置。标准表示法是使用 "`<?php`" 和 "`?>`" 分隔代码。这称为 PHP
    代码块，或简称为 PHP 块。


    ```

    <?php ... ?>

    ```


    在 PHP 块内部，引擎处于 PHP 模式，而在块外部，引擎处于 HTML 模式。在 PHP 模式下，所有内容都将由 PHP 引擎解析（执行），而在 HTML
    模式下，所有内容都将发送到生成的网页而不执行任何操作。


    切换到 PHP 模式的第二种表示法是第一种的简写版本，其中省略了 "php" 部分。虽然这种表示法更短，但如果 PHP 代码需要可移植，则首选较长的表示法。这是因为对短分隔符的支持可以在
    `php.ini` 配置文件中禁用。


    ```

    <? ... ?>

    ```


    第三种替代方法是将 PHP 代码嵌入到带有 "php" 语言属性的 HTML `script` 元素中。这种替代方法始终可用，但很少使用。


    ```

    <script language="php">...</script>

    ```


    您可能遇到的另一种样式是脚本嵌入在 ASP 标签之间。这种样式默认是禁用的，但可以从 PHP 配置文件中启用。


    ```

    <% ... %>

    ```


    如果脚本文件以 PHP 模式结束，则可以省略文件中的最后一个结束标签。


    ```

    <?php ... ?>

    <?php ...

    ```


    ## 输出文本


    在 PHP 中打印文本是通过输入 `echo` 或 `print` 后跟输出内容来完成的。每个语句必须以分号（`;`）结尾，以便与其他语句分隔。PHP 块中最后一个语句的分号是可选的。


    ```

    <?php

      echo  "Hello World";

      print "Hello World"

    ?>

    ```


    也可以使用 "`<?=`" 开始分隔符生成输出。从 PHP 5.4 起，即使禁用了短 PHP 分隔符，此语法也是有效的。


    ```

    <?= "Hello World" ?>

    <? echo "Hello World" ?>

    ```


    请记住，只有当文本输出位于 HTML `<body>` 元素内时，它才会在网页上可见。


    ```

    <html>

     <head><title>PHP 测试</title></head>

    <body>

     <?php echo "Hello World"; ?>

    </body>

    </html>

    ```


    ## 安装 Web 服务器


    要在浏览器中查看 PHP 代码，代码首先必须在安装了 PHP 模块的 Web 服务器上进行解析。设置 PHP 环境的一个简单方法是下载并安装名为 XAMPP
    的流行 Apache Web 服务器发行版，该发行版预装了 PHP、Perl 和 MySQL。这将允许您在您自己的计算机上尝试 PHP。


    安装 Web 服务器后，将浏览器指向 "`http://localhost`" 以确保服务器在线。它应该显示 `index.php` 文件，在 Windows
    机器上，该文件默认位于 `C:\xampp\htdocs\index.php`。`htdocs` 是 Apache Web 服务器查找要提供给您的域提供的文件的文件夹。


