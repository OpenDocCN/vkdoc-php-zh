  trans: '

    # 电子商务的核心


    电子商务的核心——也是它真正区别于其他 Web 开发项目的地方——在于处理订单和信用卡。`PayPal`帮助我们推迟了这一点，但有很多充分的理由说明，最终你还是会想与`PayPal`分道扬镳：


    **成本**：`PayPal`并不昂贵，但它提供的额外服务终究需要以某种方式支付。


    转向更简单的信用卡处理服务可能意味着更低的交易成本（尽管这不是铁律），虽然开发自己的系统显然会带来前期投入。


    **自由度**：`PayPal`有一套相当严格的条款和条件，并且仅适用于有限数量国家的居民。通过自行承担更多的信用卡处理责任，你可以更好地控制网站的工作方式。一个明显的例子是，你可以接受使用地区性的支付方式，例如在英国常见的`Switch`借记卡。


    **集成度**：如果你使用自己的系统处理交易和订单，你可以根据自己的需求将商店和仓库的整合做到任何程度。你甚至可以自动联系第三方供应商，让供应商直接将商品发货给客户。


    **信息**：当你全权处理整个订单时，你可以记录并整理交易中涉及的所有信息——然后将其用于营销和研究目的。


    通过将订单处理与仓库、履行中心或供应商集成，你可以显著降低成本。这可能会减少履行中心对员工的需求，或者让业务在无需增加人手的情况下增长。


    获取客户信息可以反哺整个流程，为你提供关于如何增加销售额的宝贵信息。最简单的方式是，你可以通过电子邮件向客户发送特别优惠，或者通过新闻简报保持联系。你还可以分析购买模式，并利用这些数据来制定有针对性的营销活动。


    ## 第三阶段


    在第三阶段，你将学习如何：


    -   构建一个客户账户模块，以便客户每次下单时都能登录并调取其详细信息

    -   允许客户添加产品评论

    -   使用`XML Web Services`将`Amazon.com`的产品集成到你的网站中

    -   使用`SSL`（安全套接层）建立安全连接，确保用户在互联网上传输的数据得到加密

    -   使用`DataCash`和`Authorize.net`处理信用卡收费

    -   将信用卡号码安全地存储在数据库中


    这第三阶段是所有阶段中最复杂的一个，需要艰苦细致的工作。然而，到第三阶段结束时，你将拥有一个包含可搜索产品目录、购物车、安全结账和完整订单处理系统的电子商务网站。


    ## HatShop


    正如我们之前所说，我们将建立一个名为`HatShop`的在线商店（不出所料，它将销售帽子）。图 1-1 展示了`HatShop`在开发第二阶段某个时刻的外观。


    ![图 1-1](img/00150.png)


    **图 1-1**：`HatShop`在第二阶段的开发情况


    > **提示**：你可以在 `http://www.cristiandarie.ro/php-postgresql-ecommerce/` 找到`HatShop`在线版本的链接。非常感谢
    Hats in the Belfry (`http://www.hatsinthebelfry.com`) 的朋友们，他们允许我们使用他们的一些产品来填充我们的虚拟`HatShop`商店。


    就本书而言，我们假设该客户已经是一家邮购公司，并拥有良好的客户网络。这家公司并非行业新手，它希望这个网站能让现有客户更方便、更愉快地购物——目标是最终促成他们购买更多商品。


    知道了这一点，我建议采用分阶段开发，因为：


    -   公司最初不太可能获得海量订单——我们应该尽可能降低建站初期成本。

    -   公司习惯于手动处理邮购订单，因此手动处理由`PayPal`邮件发送的订单不会带来太多新问题。

    -   公司不想把所有资金都投入到一个庞大的电子商务网站上，结果却发现人们实际上还是更喜欢邮购！或者，它可能在第一阶段后发现网站完全满足了它的需求，没有必要进一步扩展。无论哪种情况，我希望提供较低的初始成本能让我的投标更具优势。（这也可能意味着我能在总价上定得更高。）


    因为这家公司已经是邮购业务，它很可能已经拥有一个商户账户并可以处理信用卡。因此，对于这家公司来说，尽快进入第三阶段是最好的，这样它就能享受到优惠的卡片处理费率。


    ## 总结


    在本章中，我们看到了真实而充满竞争的商业世界中电子商务的一些原则，其中重要的是聚焦短期收入并降低风险。我们探讨了电子商务网站盈利的三个基本原因：


    -   获取更多客户

    -   让客户花费更多

    -   降低订单履行成本


    我们将这些原则应用到了一个三阶段计划中，该计划在每个阶段都交付一个可用的站点，并将在本书中持续扩展。


    至此，你已经向帽子店的老板们提交了你的计划。在下一章中，你将戴上你的程序员的帽子，开始设计和构建这个网站（当然，前提是你拿到了合同）。


    ---


    # 第 2 章：奠定基础


    既然你已经说服了客户，让他们相信你能创建一个很棒的网站来辅助他们的业务，那么是时候停止庆祝，开始思考如何将你许下的所有承诺付诸实践了。像往常一样，当你在纸上写下必须满足的技术要求时，一切似乎开始变得比最初预想的要复杂一些。


    > **注意**：请注意，本章及下一章内容较为密集，如果你对`PHP`或`PostgreSQL`没有太多经验，可能会觉得颇具挑战性。诸如《Beginning
    PHP and PostgreSQL 8: From Novice to Professional》（Apress, 2006）之类的书籍，能在你构建第一个电子商务网站方面提供很好的准备。我们强烈建议你始终遵循一个高效的项目管理方法，以最大程度地确保项目在预算内按时成功。大多数项目管理理论都隐含地要求你和你的客户签署一份包含即将创建项目细节的初始需求/规范文档。你可以在创建解决方案时使用此文档作为指南；如果客户在开发开始后提出新的需求或要求更改，它还能让你有依据收取额外费用。更多详情请参阅附录
    B。

    '
- fmt: '

    # 确保项目成功的基础


    为了确保这个项目的成功，你需要想出一个聪明的方法来实现你在合同中签署的内容。你希望项目顺利且快速地开发，但最终目标是确保客户对你的工作感到满意。因此，你应该通过创建一个美观、功能强大且响应迅速的网站，为网站日益增多的访问者提供积极的网络体验。


    需求很高，但对于当今的电子商务网站来说，这是正常的。为了最大化成功的机会，我们将尽可能多地分析和预见技术需求，并以一种能够以最小精力支持变更和扩展的方式实施解决方案。


    本章为未来的`HatShop`网站奠定基础。我们将讨论你将使用的技术和工具，更重要的是，以及你将如何使用它们。


    本章的目标是：

    - 从技术角度分析项目

    - 分析并为你的应用选择一种架构

    - 决定使用哪些技术、编程语言和工具

    - 考虑命名和编码规范

    - 创建网站的基本结构并设置数据库

    - 在网站骨架中实现错误处理例程和报告例程


    # 为增长而设计


    在 Web 应用的语境下，“设计”一词可以指代很多方面。它最流行的用法可能指的是网站的视觉和用户界面设计。


    这方面至关重要，因为，坦率地说，访问者通常更看重网站的外观和易用性，而不是后台使用了哪些技术或 Web 服务器运行的是什么操作系统。如果网站运行缓慢、难以使用或容易被遗忘，那么无论用什么尖端技术来创建它都无关紧要。


    不幸的是，这种现实使得许多缺乏经验的程序员低估了网站不可见部分（代码、数据库等）实现方式的重要性。网站的视觉部分最初能吸引访问者，但功能性能让他们再次光顾。一个网站有时可以根据初始需求快速实现，但如果没有正确的架构，后续变更将会变得困难甚至不可能。


    对于任何规模的项目，在开始编码之前都必须做一些准备工作。尽管如此，无论做了多少准备和设计工作，意外总会发生，隐藏的问题、新的需求和不断变化的规则似乎总是在与截止日期作对。


    即使没有这些意外因素，网站设计者通常也会被要求，在项目完成并部署后，多次更改或添加新功能。`HatShop`也是如此，它将分三个独立的阶段实施，这在第 1
    章中已经讨论过。


    你将学习如何创建网站，以便在功能扩展或进行更新时，网站（或你）不会崩溃。因为这是一本关于编程的书，所以我们将重点关注如何设计使它们工作的代码，而不是聚焦于如何设计用户界面或营销技巧。


    “设计代码”这个短语可能有不同的含义；例如，我们需要简短地讨论一下命名约定。尽管如此，我们需要考虑的最重要的方面是应用架构。架构指的是将单一功能（例如产品搜索功能）的代码拆分成更小组件的方式。虽然以尽可能快和简单的方式在单个组件中实现该功能可能更容易，但通过创建更多协同工作以实现预期结果的组件，你可以获得巨大的长期优势。


    在讨论架构本身之前，你必须确定你希望从这个架构中获得什么。


    # 以最小精力满足长期需求


    除了你需要一个快速的网站之外，我们在第 1 章中讨论的每个开发阶段都会带来必须满足的新需求。


    每当你进入一个新阶段，你都希望能够**重用**大部分现有解决方案。仅仅因为需要添加一个新功能就重新设计整个网站（不仅包括视觉部分，还包括代码！）是非常低效的。通过提前规划，你可以使重用解决方案变得更容易，这样任何需要添加的新功能都可以轻松地嵌入，而不是每次更改都带来新的麻烦。


    在构建网站时，实现一个由可插拔组件组成的**灵活架构**，允许你通过将新功能（如购物车、部门列表、产品搜索功能）编码为独立组件，并将它们插入到现有应用中。实现良好的灵活性水平是应用架构的目标之一，本章将展示如何将其付诸实践。


    你会发现，灵活性与设计和实现它所需的时间成正比，因此我们将尝试找到一个折衷方案，在不过度复杂化代码的情况下提供最大的收益。


    所有在线应用共有的另一个主要需求是拥有一个**可扩展的架构**。可扩展性被定义为增加资源以产生服务能力的线性增长。换句话说，理想情况下，在一个可扩展的系统中，客户端请求数量与处理这些请求所需的硬件资源之间的比率（比例）是恒定的，即使客户端数量增加也是如此。一个不可扩展的系统无法处理不断增长的客户端数量，无论提供多少硬件资源。因为我们对客户数量持乐观态度，我们必须确保网站能够向大量客户提供其功能，而不会抛出错误或性能低下。


    **可靠性**对于电子商务应用来说也是一个关键方面。借助一致的错误处理策略和强大的关系型数据库，你可以确保数据完整性，并确保非关键性错误得到妥善处理，而不会导致网站崩溃。


    # 三层架构的魅力


    通常，架构指的是根据功能将应用的每个功能块拆分成独立的组件，并将每种组件分组到单个逻辑层中。


    你将为你网站创建的几乎每个模块都将包含来自应用服务器的这三个层的组件：

    - 表示层

    - 业务层

    - 数据层


    **表示层**包含网站的用户界面元素，并包含管理访问者与客户业务之间交互的所有逻辑。这一层让整个网站感觉充满活力，其设计方式对网站的成功至关重要。因为你的应用是一个网站，所以它的表示层由动态网页组成。


    **业务层**（也称为*中间层*）接收来自表示层的请求，并根据其包含的业务逻辑将结果返回给表示层。几乎表示层中发生的任何事件通常都会调用业务层。

