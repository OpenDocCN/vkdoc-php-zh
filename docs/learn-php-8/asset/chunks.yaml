- fmt: 'The type of information passed for a request to `insert` or `update` is almost
    exactly the same (all the dog properties plus `''index''`). Thus, the processes
    are very similar. We do need a way to indicate to the type of request (`update`
    or `insert`).


    ```

    if ((isset($_POST[''insert''])) || (isset($_POST[''update''])))

    {

    if (isset($_POST[''insert'']))

    {

    $insert = TRUE;

    }

    else

    {

    $insert = FALSE;

    }

    ```


    We can do this by creating a property. In this example, `$insert` will be set
    to `TRUE` if it is an insert request and `FALSE` if it is an `update` request.
    If the request is an `update` or `insert`, the properties array must be populated.


    ```

    $properties_array = array($dog_name,$dog_breed,$dog_color,$dog_weight,$breedxml,$insert,$dog_index);

    ```


    We can create the `$properties_array` as you have done in many examples before.
    Once created, it will be passed into an instance of the `dog` class. The only
    real changes are the addition of `$insert` and `$dog_index`. The `update` procedure
    will use `$dog_index` to indicate which record to change. It will be set to `-1`
    (by `lab.php`) when there is an insert because all records are inserted at the
    end of the data. (We could have used `-1` as an indicator of an insert, instead
    of creating `$Insert`.)


    ```

    $lab = $container->create_object($properties_array);

    ```


    Using `$container` (which is an instance of `dog_container` already created in
    the code), the `create_object` method creates an instance of the `dog` class and
    passes the property array into it. We will make a slight change to the `dog` class,
    in a moment, to use the property array to determine if the `insert` or `update`
    methods from `dog_data` should be called to complete the request.


    ```

    $_SESSION[''message''] = "Dog $dog_name Insert/Update was successful";

    ```


    If everything was successful with the `update`, instead of using `echo` or `print`
    to display a message, the program will set `$_SESSION[''message'']` with the message,
    which will then be displayed by `lab.php`.


    ```

    header("Location: lab.php");

    ```


    The application is then redirected back to `lab.php`. `lab.php` will verify that
    it was called from `dog_interface` and then display `"Dog $dog_name Insert/Update
    was successful<br />"` at the top of the page. (`$dog_name` is replaced with the
    actual dog name.)


    If the request is `delete`, a similar process occurs.


    ```

    else if($_POST[''delete''])

    {

    $properties_array = $dog_index;

    ```


    The `dog_data` `delete` method only needs the position in the array to determine
    what to remove. Thus, `$properties_array` is set to the value in `$dog_index`.
    Even though `$properties_array` is now a string and not an array, the `processRecords`
    method in `dog_data` uses polymorphism to accept an array or a string. This allows
    the code to be very similar to the `update` and `insert` code.


    ```

    $lab = $container->create_object($properties_array);

    $_SESSION[''message''] = "Dog $dog_name Deletion was successful";

    header("Location: lab.php");

    ```


    As seen with `update` and `delete`, `$container` (which is an instance of `dog_container`
    already created) calls the `create_object` method to create an instance of the
    `dog` class and pass `$properties_array` (which is really a string). If the delete
    is successful, `$_SESSION[''message'']` is set with the `delete` message. Then
    the `lab.php` program is called. `lab.php` will verify that `dog_container` called
    it and then display `"Dog $dog_name Deletion was successful<br />"` at the top
    of the page. (`$dog_name` is replaced with the actual dog name.)


    These are the only code changes needed in the `dog_interface` program in order
    to handle the request to insert, update, or delete. `dog_interface` must also
    accept the dogs list box and complete dogs array from the data tier to format
    and send to `lab.php`. `dog_interface` must request the dogs array information
    by calling the display method in `dog_data.php`.


    ```

    $container = NULL;

    ```


    The container pointer, `$container`, can be reused after the request to return
    the breeds list has been processed. By setting it to `NULL`, it will free up the
    current container (an instance of `dog_container` with properties set for retrieving
    the breeds information).


    ```

    $container = new dog_container("dog");

    ```


    A new instance of the `dog_container` passes `"dog"` instead of `"selectbox"`.
    This lets the container know that an instance of the `dog` class will be created,
    not an instance of the `breeds` class.


    ```

    $properties = "dog";

    $lab = $container->create_object($properties);

    ```


    When an instance of the `dog` class is created by `create_object`, `"dog"` is
    again passed in to indicate that an instance of the `dog` class is needed.


    ```

    $container->set_app("dog");

    $dog_app = $container->get_dog_application("dog");

    $method_array = get_class_methods($lab);

    $last_position = count($method_array) - 1;

    $method_name = $method_array[$last_position];

    $returned_array = $lab->$method_name("ALL");

    ```


    The same code that was used to call the `delete`, `insert`, and `update` methods
    in `dog_data` is used to call the `display` method. However, `"ALL"` is passed
    in instead of the properties array. `"ALL"` tells the `dog_data` `display` method
    to return all the dog records. All the records that are returned by `dog_data`
    are dropped into `$return_array`.


    Now that the `dog_interface` has all the records (in `$return_array`), it can
    format the code to display the dogs list box. The code used is similar to the
    code to create the `breeds` list box.


    ```

    $resultstring = "";

    $resultstring = $resultstring . "NEW";

    ```


    The property `$resultstring` will hold all the code for the list box. First, the
    HTML `<select>` tag is created with an ID of `''dogs''`. Then the first row of
    the list box is created for the user to select NEW if they want to insert a new
    dog. Notice that the value for NEW is `-1`. That is also the default value for
    the hidden property `''index''` on the HTML form in `lab.php`. The code we looked
    at early in this chapter will determine that `-1` is an indication to fill the
    HTML form objects with the default settings for the dog information. This is true
    either if the user selects NEW or does not select anything in the `dogs` list
    box.


    ```

    foreach ($returned_array as $column => $column_value)

    {

    $resultstring = $resultstring . "" . $column_value[''dog_name''];

    $resultstring .= "& nbsp;& nbsp;& nbsp;" . $column_value[''dog_breed''] . "";

    }

    $resultstring = $resultstring . "";

    ```


    A `foreach` loop will loop through the dogs array (contained in `$returned_array`)
    and build the remaining rows of the list box using the `dog_name` and `dog_breed`
    from each of the dog entries in the array. After all dogs have been placed in
    the list box, the list box is closed using the HTML `</select>` tag.


    ```

    print $result . "|" . $resultstring . "|" . ''{ "dogs" : '' . json_encode($returned_array)
    . "}";

    ```


    `lab.php` expects to receive the `breeds` list box code in the first position,
    the `dogs` list box code in the second position, and the complete dogs array in
    the third position. `$result` already contains the complete breeds list box. `$resultstring`
    contains the new dogs list box. `$return_array` still contains all the dog records.
    `lab.php` expects the outer array of the dogs array to be labeled as `''dogs''`.
    The `display` method from `dog_data` does not pass the outer array back. The previous
    code will create a dogs array that holds all the individual dog arrays in it.
    Notice that the `$return_array` has been converted to JSON code when returned.
    The JavaScript code in `lab.php` will verify that it is properly formatted JSON
    code when it is received.


    Let us look at the complete `dog_interface` program.'
