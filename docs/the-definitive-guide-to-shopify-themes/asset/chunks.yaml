  trans: '

    ### 改善移动端体验


    到目前为止，我们的示例主要关注主题在桌面端的呈现效果和运行情况。若只关注桌面端而忽略移动端体验——即便你使用的是“响应式”框架——在电商领域也是十分危险的。Shopify
    商店的流量中，超过一半来自移动设备，部分商家的这一比例甚至高达 75%。


    在开发 Shopify 主题时，请务必考虑使用移动设备浏览的顾客将如何查看信息层级，或执行添加商品到购物车等关键操作。这不仅仅意味着在桌面端缩小浏览器窗口——你需要实际拿起一到两台设备，亲自浏览网站，才能充分体会其不同的使用体验。触控区域的大小、按钮是否便于拇指触及，以及可见内容区域等因素，都会产生影响。


    请看图 5-15，其中展示了当前示例商品页面在移动设备上的状态。有几个问题点会立刻凸显出来：


    ![A437216_1_En_5_Fig15_HTML.jpg](img/A437216_1_En_5_Fig15_HTML.jpg)


    图 5-15


    在移动设备上滚动浏览当前商品页面时，会暴露出一些显示和可用性问题


    *   商品页面的初始视图并未显示商品标题、供应商或价格——这些都是我们在商品信息层级中确认的重要信息。

    *   商品图片轮播区域的显示效果尚可，但所有缩略图都以全宽图片的形式显示在下方，导致我们需要滚动很长距离才能看到商品信息。

    *   `服装护理`标签页上的文字发生了断行，破坏了布局。

    *   “加入购物车”按钮宽度不足屏幕一半且偏左，使得右手持单机操作的用户更难用拇指触及。

    *   “你可能也喜欢…” 区域每行只显示一件商品，导致需要滚动很长时间才能浏览完毕。


    解决这类问题通常并不困难，特别是当你使用了提供响应式辅助工具的 CSS 框架或库时。为了解决示例主题中的这些问题，我决定：


    *   在页面顶部添加一个仅在移动端可见的商品标题、供应商和价格版本，并隐藏页面靠下位置的相同信息。

    *   保留商品轮播区，预期移动用户可以通过左右滑动来浏览可用的商品图片，但完全隐藏商品缩略图。

    *   在小屏幕上，对于“`服装护理`”标签页，隐藏“服装”二字，因为“护理”已能传达足够信息。如果你有更多标签页，另一种常见做法是在空间有限时改用图标。

    *   让“加入购物车”按钮在移动设备上变为全宽，以便于点击。

    *   将相关商品以 2x2 的网格形式展示，而非每行一个。


    实现这些更改的代码可在示例主题的代码库中找到。如图 5-16 所示，这些更改带来了更友好的移动端体验。


    ![A437216_1_En_5_Fig16_HTML.jpg](img/A437216_1_En_5_Fig16_HTML.jpg)


    图 5-16


    仅需几个简单的改动，就解决了网站移动版的一些主要可用性问题。


    ### 创建备选页面模板


    商品页面目前看起来相当不错了，因此我们将继续探讨网站的其他方面，从第 6 章的主页开始。在继续之前，我将快速介绍最后一个 Shopify 主题功能——备选页面模板。


    对于 Shopify 主题中存在的每种 Liquid 模板类型（如 `product.liquid`、`collection.liquid`、`article.liquid`
    等），你都可以创建这些模板的“备选”版本，用以完全不同的方式有选择性地渲染不同的商品（或不同的商品系列、不同的文章）。这在某些情况下会非常有用，例如，你的一些商品带有演示视频，这完全改变了页面的预期布局；或者你想要为基于文本的博客文章和以照片为主的博客文章创建不同的布局。


    要创建并使用备选页面模板，只需创建一个新的模板文件，其名称与基础模板相同，但增加一个额外的后缀——例如 `product.video.liquid`。上传到商店后，Shopify
    会在相关页面上显示一个模板选择界面，你或商店所有者可以在此选择所需的模板。见图 5-17。


    ![A437216_1_En_5_Fig17_HTML.jpg](img/A437216_1_En_5_Fig17_HTML.jpg)


    图 5-17


    当所显示的对象类型有多个模板选项可用时，“主题模板”部分会出现在 Shopify 管理后台中。


    为了在示例主题中演示这一点，我创建了一个 `product.image-right.liquid` 模板（代码可见于示例主题代码库），该模板简单地将商品页面的列顺序反转，使商品信息显示在左侧，图片显示在右侧。你可以在图
    5-18 中看到它在商店中的显示效果。


    ![A437216_1_En_5_Fig18_HTML.jpg](img/A437216_1_En_5_Fig18_HTML.jpg)


    图 5-18


    使用备选模板 `product.image-right.liquid` 显示的商品页面。


    **提示**


    虽然“主题模板”部分仅在 Shopify 管理后台中针对特定数量的对象类型（商品、商品系列和博客）显示，但所有 Shopify 页面都支持备选模板，并且你可以为一个页面创建任意数量的备选模板。要按需渲染这些备选模板，只需在
    URL 中包含一个 `?view=` 参数即可——例如，你可以通过链接到 [`https://defguide.myshopify.com/products/foraker-canvas-coat?view=image-right`](https://defguide.myshopify.com/products/foraker-canvas-coat?view=image-right)，强制示例商店中的任何商品页面以图片居右的方式渲染。


    备选页面模板的一个巧妙用途是，以 JSON 格式渲染对象的自定义表示形式（例如 `product.json.liquid`），你可以通过 Ajax 从其他可能需要动态获取商品信息的页面中获取它。


    ### 总结


    本章深入探讨了 Shopify 商店商品页面的设计与实现。我们从讨论商品信息层级的重要性开始，并阐述了不同商品信息的重要性如何因商店和用户情境而异。


    在掌握了示例商品信息层级后，我们逐步讲解了构建一个功能完整的 Shopify 商品页面所需的代码。


    **脚注**


    1 [`https://help.shopify.com/themes/liquid/filters/url-filters#product_img_url`](https://help.shopify.com/themes/liquid/filters/url-filters#product_img_url)


    2 例如，参见 [`blog.kissmetrics.com/product-videos-conversion/`](https://blog.kissmetrics.com/product-videos-conversion/)。


    3 如果你是 Google Chrome 用户，我强烈推荐查看 ShopifyFD ([`shopifyfd.com`](http://shopifyfd.com))，这是一个
    Chrome 扩展程序，它连接到 Shopify 管理后台，允许直接在商品管理页面上编辑元字段。


    # 设计主页和商品系列页面


    处理完至关重要的商品页面后，我们现在可以转向 Shopify 主题的其他一些重要组成部分。在本章中，我们将探讨商店主页和商品系列页面的设计与实现。

