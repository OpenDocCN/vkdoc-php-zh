- fmt: "# 排版后的文本\n\nThe truck has 4 wheels, 2 seats, white color.\n\nThe big truck\
    \ has 6 wheels, 5 seats, blue color.\n\n**Notice**: Property `seats` must be 2,\
    \ 4, 5, 7 or 8 in `/source/2_15.php` on line 35.\n\nThe class `car` has two private\
    \ members called `$type` and `$properties`. The variable `$type` is set when an\
    \ object is instantiated from the class. In the example `$c1` is instantiated\
    \ with the type `truck` and `$c2` is instantiated with `big truck`. There is no\
    \ validation on the type so any value can be used. The example also allows the\
    \ setting of other properties: `wheels`, `seats`, `color`, etc. These are all\
    \ stored in the `$properties` array and the values are handled by the `__get()`\
    \ and `__set()` magic methods. The code allows any property to be added but provides\
    \ special handling for `wheels` and `seats`. If a value is set outside of the\
    \ valid ranges the code will use the `trigger_error()` function to print a notice.\
    \ The property will not be set but the code will continue.\n\n## Recipe 2-12.\
    \ Serializing Types and Objects\n\n### Problem\n\nSerializing PHP variables is\
    \ used to convert integers, strings, and arrays into a string representation that\
    \ can be written to a file or database and later on retrieved and deserialized\
    \ to get back to its original value.\n\nSerializing objects is a bit trickier\
    \ as these can contain connections to resources and other values that require\
    \ special handling on serialization and deserialization.\n\n### Solution\n\nWhen\
    \ working with the `serialize()` and `unserialize()` functions on objects it might\
    \ be necessary to perform special actions on the object to handle correct initialization\
    \ of member variables. The methods `__sleep()` and `__wakeup()` are used in this\
    \ context. The `__sleep()` function is called, if it exists, when an object is\
    \ serialized. The function should return an array of member variable names that\
    \ should be serialized.\n\nThe function `__wakeup()` is called when the object\
    \ is re-created with the `unserialize()` function. This can be used to handle\
    \ things like disconnect and reconnect to databases or other forms of cleanup\
    \ and initialization needed for proper use of the objects.\n\n### How it Works\n\
    \nThe following example shows how an object instance of a database class can be\
    \ serialized and unserialized.\n\nWhen the object is created the parameters to\
    \ the constructor are stored in private variables and a connection is created\
    \ to the database. When the object is serialized the name of the three private\
    \ variables is returned by the `__sleep()` function and when it is unserialized\
    \ the `__wakeup()` function will automatically reconnect to the same database.\n\
    \n```php\n<?php\n// 2_18.php\n\nclass Database {\n    protected $pdo;\n    private\
    \ $dsn, $username, $password;\n\n    public function __construct($dsn, $username,\
    \ $password) {\n        $this->dsn = $dsn;\n        $this->username = $username;\n\
    \        $this->password = $password;\n        $this->connect();\n    }\n\n  \
    \  private function connect() {\n        $this->pdo = new PDO($this->dsn, $this->username,\
    \ $this->password);\n    }\n\n    public function __sleep() {\n        return\
    \ array('dsn', 'username', 'password');\n    }\n\n    public function __wakeup()\
    \ {\n        $this->connect();\n    }\n}\n\n$db = new Database('sqlite:mydb',\
    \ 'user', 'password');\n$a = serialize($db);\necho $a;\n```\n\nThis script will\
    \ produce a single line of output that describes the serialized object: `O:8:\"\
    Database\":3:{s:13:\"Databasedsn\";s:11:\"sqlite:mydb\";s:18:\"Databaseusername\"\
    ; s:4:\"user\";s:18:\"Databasepassword\";s:8:\"password\";}`\n\n## Recipe 2-13.\
    \ Copying an Object\n\n### Problem\n\nIf an object is created by instantiating\
    \ a class with the `new` operator and later on is assigned to a second variable,\
    \ PHP only creates a reference to the object instead of copying the object. Manipulating\
    \ the object stored in the first variable will also affect the object stored in\
    \ the second variable as they both reference the same object.\n\n### Solution\n\
    \nThe magic function `__clone()` is used to perform special actions on a newly\
    \ created copy of an object. As with any of the magical methods these cannot be\
    \ called directly but they are invoked by special actions."
  raw: 'The truck has 4 wheels, 2 seats, white color


    The big truck has 6 wheels, 5 seats, blue color


    Notice: Property seats must be 2,4,5,7 or 8 in /source/2_15.php on line 35


    The class car has two private members called $type and $properties . The variable
    $type is set when an object is instantiated from the class. In the example $c1
    is instantiated with the type ‘truck’ and $c2 is instantiated with ‘big truck’.
    There is no validation on the type so any value can be used. The example also
    allows the setting of other properties: wheels, sets, color, etc. These are all
    stored in the $properties array and the values are handled by the __get() and
    __set() magic method. The code allows any property to be added but provides special
    handling for wheels and seats. If a value is set outside of the valid ranges the
    code will use the trigger_error() function to print a notice. The property will
    not be set but the code will continue.


    Recipe 2-12\. Serializing Types and Object


    Problem


    Serializing PHP variables is used to convert integers, strings, and arrays into
    a string representation that can be written to a file or database and later on
    retrieved and deserialized to get back to its original value.


    Serializing objects is a bit trickier as these can contain connections to resources
    and other values that require special handling on serialization and deserialization.


    Solution


    When working with the serialize() and unserialize() functions on objects it might
    be necessary to perform special actions on the object to handle correct initialization
    of member variables. The methods __sleep() and __wakeup() are used in this context.
    The __sleep() function is called, if it exists, when an object is serialized.
    The function should return an array of member variable names that should be serialized.


    The function __wakeup() is called when the object is re-created with the unserialize()
    function. This can be used to handle things like disconnect and reconnect to databases
    or other forms of cleanup and initialization needed for proper use of the objects.


    CHAPTER 2 ■ CLASSES AND OBJECTS


    How it Works


    The following example shows how an object instance of a database class can be
    serialized and unserialized.


    When the object is created the parameters to the constructor is stored in private
    variables and a connection is created to the database. When the object is serialized
    the name of the three private variables is returned by the __sleep() function
    and when it is unserialized the __wakeup() function will automatically reconnect
    to the same database.


    <?php


    // 2_18.php


    class Database {


    protected $pdo;


    private $dsn, $username, $password;


    public function __construct($dsn, $username, $password) {


    $this->dsn = $dsn;


    $this->username = $username;


    $this->password = $password;


    $this->connect();


    }


    private function connect() {


    $this->pdo = new PDO($this->dsn, $this->username, $this->password);


    }


    public function __sleep() {


    return array(''dsn'', ''username'', ''password'');


    }


    public function __wakeup() {


    $this->connect();


    }


    }


    $db = new Database(''sqlite:mydb'', ''user'', ''password'');


    $a = serialize($db);


    echo $a;


    This script will produce a single line of output that describes the serialized
    object: O:8:"Database":3:{s:13:"Databasedsn";s:11:"sqlite:mydb";s:18:"Databaseusername";
    s:4:"user";s:18:"Databasepassword";s:8:"password";}


    CHAPTER 2 ■ CLASSES AND OBJECTS


    Recipe 2-13\. Copying an Object


    Problem


    If an object is created by instantiating a class with the new operator and later
    on is assigned to a second variable, PHP only creates a reference to the object
    instead of copying the object. Manipulating the object stored in the first variable
    will also affect the object stored in the second variable as they both reference
    the same object.


    Solution


    The magic function __clone() is used to perform special actions on a newly created
    copy of an object. As with any of the magical methods these cannot be called directly
    but they are invoked by special actions.'
