- "# 幕后探秘：Drupal 在显示页面时的内部运作\n\n**作者：Stefan Freudenberg**\n\n当网页浏览器请求一个页面时，Drupal\
  \ 便开始执行一系列复杂的步骤，最终将一个完整渲染的页面返回给浏览器。每次页面请求，Drupal 都必须重复执行这些相同的计算过程，因此，理解这些步骤对于为你的模块或网站做出最佳的开发决策至关重要。\n\
  \n在本章中，你将了解当请求一个 Drupal URL 时会触发什么，例如请求 [`http://definitivedrupal.org/node/84`](http://definitivedrupal.org/node/84)。第\
  \ 29 章介绍了 Web 服务器如何将 URL 解析为 `index.php?q=node/84`。在本章中，我将从 Web 服务器将路径 `node/84`\
  \ 交给 Drupal 的 `index.php` 后发生的事情开始讲起。\n\nWeb 服务器的 PHP 解释器会解析 `index.php` 并执行代码。Drupal\
  \ 的开发者将创建 Drupal 页面的过程组织为两个序列：引导加载（Bootstrap）以及与当前路径关联的页面回调函数的执行。这种划分使得在生成网页以外的应用中也能使用可工作的\
  \ Drupal 环境。一个很好的例子是 Drupal 自身的 cron 任务，它在完成引导加载并执行一些基本检查后，会执行 `hook_cron()`。\n\n\
  ```\n/**\n * Drupal 安装的根目录。\n */\ndefine('DRUPAL_ROOT', getcwd());\n\nrequire_once\
  \ DRUPAL_ROOT . '/includes/bootstrap.inc';\ndrupal_bootstrap(DRUPAL_BOOTSTRAP_FULL);\n\
  menu_execute_active_handler();\n```\n\n对于完整的页面加载，引导加载过程始终相同。页面回调函数的执行则取决于传入的路径，在本例中是\
  \ `node/84`。\n\n### 引导加载\n\n引导加载的任务是通过包含所有必要的库、准备数据库连接以及读取配置，为业务逻辑和主题渲染搭建好舞台。它分多个阶段完成，每个阶段必须且仅执行一次，并且必须按照特定的顺序执行。这是通过\
  \ `drupal_bootstrap()` 函数以及为每个阶段分配代表其处理顺序的整型常量来强制实现的（参见表 30–1）。`drupal_bootstrap()`\
  \ 被调用时，需要传入应达到的引导加载阶段作为参数。\n\n***表 30–1.** Drupal 引导加载阶段*\n\n| **编号** | **阶段** |\
  \ **目的** |\n| --- | --- | --- |\n| 0 | `DRUPAL_BOOTSTRAP_CONFIGURATION` | 初始化配置\
  \ |\n| 1 | `DRUPAL_BOOTSTRAP_PAGE_CACHE` | 尝试提供缓存页面 |\n| 2 | `DRUPAL_BOOTSTRAP_DATABASE`\
  \ | 初始化数据库层 |\n| 3 | `DRUPAL_BOOTSTRAP_VARIABLES` | 初始化变量系统 |\n| 4 | `DRUPAL_BOOTSTRAP_SESSION`\
  \ | 初始化会话处理 |\n| 5 | `DRUPAL_BOOTSTRAP_PAGE_HEADER` | 设置页面头部 |\n| 6 | `DRUPAL_BOOTSTRAP_LANGUAGE`\
  \ | 确定页面语言 |\n| 7 | `DRUPAL_BOOTSTRAP_FULL` | 加载模块并初始化主题 |\n\n#### 第一阶段：初始化配置\n\n\
  在第一阶段，会从 `sites/default` 文件夹读取 `settings.php`，并设置最重要的全局变量，这些变量要么直接来自 `settings.php`（如\
  \ `$databases`），要么是根据服务器环境计算得出的。以下是你在日常站点开发中会遇到的三个变量：\n\n*   `$base_url`：你的所有 Drupal\
  \ 页面共享的基准 URL。每个路径都会附加到其后。它必须是一个不带尾部斜杠的有效 URL。仅当 Drupal 无法正确确定该值时，才需要手动设置。`$base_url\
  \ = 'http://www.example.com/drupal'; // 没有尾部斜杠！`^(`1`)\n*   `$base_path`：基准 URL\
  \ 的路径部分（要么是 '/'，要么是域名部分后面的任何内容），并带有尾部斜杠。它来源于 `$base_url`，并且本身也很有用。`$base_path =\
  \ '/drupal/';`\n*   `$base_root`：包含 URL 的协议和域名部分。它要么是基准 URL 本身，要么是移除了基准路径（如果有的话）后从基准\
  \ URL 派生而来。`$base_root = 'http://www.example.com';`\n\n__________\n\n¹ Jeff Eaton\
  \ 曾试图用一个更戏剧性的方式来记录这个要求。参见 `drupal.org/files/issues/settings.php_1.patch`\n\n####\
  \ 第二阶段：尝试提供缓存页面\n\n在第二阶段，如果配置界面的“性能”部分启用了页面缓存，并且访问者未登录，Drupal 会尝试从其缓存中提供整个页面。如果能找到缓存的页面版本且未过期，它将在调用\
  \ `hook_boot()` 和 `hook_exit()` 之间被发送出去。\n\n如果缓存后端需要数据库连接（由 `settings.php` 中的 `$conf['page_cache_without_database']`\
  \ 决定），则在获取缓存页面之前，会先执行第三和第四引导阶段。\n\n调试页面缓存可以通过 Drupal 开发者为此引入的一个附加 HTTP 头部来简化：如果页面确实是从缓存提供的，`X-Drupal-Cache`\
  \ HTTP 头部会被设置为 `HIT`（参见图 30–1）；否则，其值被设置为 `MISS`（参见图 30–2）。\n\n![images](img/3001.jpg)\n\
  \n***图 30–1.** `X-Drupal-Cache` HTTP 头部被设置为 `HIT`。你需要 Firebug 插件才能在 Firefox 中查看\
  \ HTTP 头部。*\n\n![images](img/3002.jpg)\n\n***图 30–2.** `X-Drupal-Cache` HTTP 头部被设置为\
  \ `MISS`。*\n\n![images](img/square.jpg) **提示** 缓存后端是可插拔的。默认情况下，Drupal 使用数据库表来缓存页面、区块等。可以通过在\
  \ `settings.php` 中的 `$conf['cache_backends']` 添加文件名来注册替代的后端。该文件必须包含一个实现了 `DrupalCacheInterface`\
  \ 的类。Drupal 自带了一个数据库缓存实现，以及一个安装期间所需的模拟实现。一个流行的替代缓存实现是由 memcache 模块（`drupal.org/project/memcache`）提供的，它使用\
  \ `memcached` 作为后端（详情参见第 27 章）。为了支持像 Varnish（[`www.varnish-cache.org/`](http://www.varnish-cache.org/)）这样的反向代理缓存代理来为匿名访客提供页面缓存，必须显式禁用\
  \ `hook_boot()` 和 `hook_exit()`。这是确保对源服务器的请求和对缓存中间服务器的请求行为一致所必需的。在你的 `settings.php`^(2)\
  \ 中添加以下代码行：\n\n```\n$conf['page_cache_invoke_hooks'] = FALSE;\nif (!class_exists('DrupalFakeCache'))\
  \ {\n  $conf['cache_backends'][] = 'includes/cache-install.inc';\n}\n// 依赖外部缓存进行页面缓存。\n\
  $conf['cache_class_cache_page'] = 'DrupalFakeCache';\n```\n\n__________\n\n² 参见\
  \ [`http://drupal.org/node/797346`](http://drupal.org/node/797346)\n\n\n\n#####\
  \ 第三引导阶段：初始化数据库层\n\n本阶段将建立数据库抽象层。由于此时无需建立连接，仅包含基类与工具函数（如 `db_query` 等）。此外，自动加载类与接口的回调函数会注册到标准\
  \ PHP 库（SPL）自动加载栈中^(3)。包含类与接口的文件由模块的 `.info` 文件声明，或存放于主包含文件夹中，Drupal 会维护一个注册表来追踪这些文件。执行过程中首次需要某个类或接口时，回调函数会利用该注册表加载所需文件。\n\
  \n![images](img/square.jpg) **注意** Drupal 7 的数据库抽象层是相较 Drupal 6 变革最剧烈的部分之一。取代了曾经令人又爱又恨的\
  \ `db_query()` 等函数，现在采用基于 PHP 5 PDO 的现代数据库层：查询构建器、流畅接口、提供迭代器接口的结果集、具名占位符，以及一致性事务与主从复制支持。（如果你喜欢\
  \ `db_query()`，有个好消息：它依然作为非动态查询的封装函数存在。）\n\n##### 第四引导阶段：初始化变量系统\n\n在第四引导阶段，Drupal\
  \ 从变量数据库表（包含配置设置与持久化变量）中获取所有值，并将其与 `settings.php` 中定义的变量合并到全局变量 `$conf` 中。通过 `$conf['variable_name']`\
  \ 在文件中设置的值优先于数据库中存储的值；换言之，你可以通过在 `settings.php` 文件中定义变量，防止这些变量通过用户界面被覆盖。\n\n`$conf`\
  \ 变量以巨型关联数组的形式存在。可通过调用 `variable_get('key_name', 'a default value')` 获取其值。在代码中调用\
  \ `variable_set('key_name', 'value')` 可持久化变量。\n\n除变量外，引导过程中所需的所有模块均被加载，并实现引导期间调用的钩子：`hook_boot()`、`hook_exit()`、`hook_language_init()`\
  \ 和 `hook_watchdog()`。可插拔锁系统也被包含在内。“可插拔”意味着你可以提供替代实现，并通过在 `settings.php` 中定义 `$conf['lock_inc']\
  \ = 'path/to/your/lock.inc'` 让 Drupal 使用它。本章前面已提及此类模式。\n\n__________\n\n³ [`http://php.net/manual/en/function.spl-autoload-register.php`](http://php.net/manual/en/function.spl-autoload-register.php)\n\
  \n![images](img/square.jpg) **提示** Drupal 优秀的代码内文档解释了锁机制：“Drupal 实现了一种协作式、顾问式的锁系统。任何可能被多个请求并行尝试的长时间运行操作，都应先尝试获取锁再继续执行。通过获取锁，一个请求知会其他请求：特定操作正在进行中，不得并行执行。”\n\
  \n变量初始化代码中可见一例。从变量表中获取所有数据已被证明是性能瓶颈，因此在 Drupal 7 中，该查询结果会被缓存。当多个进程尝试在缓存尚未就绪时填充变量缓存时，问题便会出现。这通过锁系统得以解决。在从数据库获取变量数据之前，必须先获取锁。若另一个进程已持有相同锁，则代码执行暂停一秒；随后再次尝试获取变量数据。此过程持续进行，直至最初获取锁的进程释放锁。如此，即可确保只有最先声明锁的进程从数据库获取变量，并将其存入缓存供后续请求使用。详见\
  \ [`http://api.Drupal.org/api/Drupal/includes--lock.inc/group/lock/7`](http://api.Drupal.org/api/Drupal/includes--lock.inc/group/lock/7)\n\
  \n##### 第五引导阶段：初始化会话处理\n\n目前已完成的内容：数据库、设置、变量、部分通用 Drupal 函数与常量、全局变量以及引导模块。\n\n本阶段，Drupal\
  \ 注册其会话处理器，并为已认证用户关联会话。通常，匿名用户根本不会获得会话，除非需要在 `$_SESSION` 中存储内容；在此情况下，会预生成一个会话 ID。这允许对匿名访客进行\
  \ HTTP 代理缓存。若 Drupal 无法检测到已登录用户，则会在本阶段创建一个虚拟用户对象，代表 Drupal 数据库中用户 ID 为 0 的匿名访客。\n\
  \n如果你需要比 Drupal 自身数据库方案更高级的会话处理，可以在 `settings.php` 中将 `$conf['session_inc']` 指向一个包含所需实现函数的文件。拥有大量已认证访客的站点可从更高效的会话存储中受益。第\
  \ 27 章 中介绍的 Mongodb 模块便提供了此类替代方案。\n\n##### 第六引导阶段：设置页面头部\n\n经过上述一系列初始化后，首条输出——HTTP\
  \ 头部——将被生成并发送给站点访客。Drupal 发送给客户端的默认头部仅影响缓存。准确来说：没有字节真正发送给访客，因为 Drupal 运行在输出缓冲模式下。换言之，在缓冲区刷新之前（这发生在循环的最后阶段），任何内容都不会离开服务器。等等！在此之前还会发生一件事：`hook_boot()`\
  \ 被调用，这给了模块在页面创建周期中首次干预的机会。注意，必须禁用此钩子以支持外部缓存机制（详见第三阶段的提示）。\n\n##### 第七引导阶段：确定页面语言\n\
  \n引导过程的倒数第二步处理多语言站点当前访客的语言选择。确定语言后，`hook_language_init()` 的实现可以进行响应，例如设置语言相关的变量。\n\
  \n###### 语言协商算法\n\n用于确定使用哪种语言的协商算法可通过 `hook_language_negotiation_info()` 提供，现有算法可通过\
  \ `hook_language_negotiation_info_alter()` 修改。这些提供者将按照站点管理员在语言配置页面（`admin/config/regional/language/configure`）设定的顺序依次尝试确定语言。每个定义的协商算法必须提供一个回调函数来确定语言。一旦某个提供者返回有效语言，语言选择即停止。\n\
  \n以下是语言提供者的示例：\n\n```\n$providers[LOCALE_LANGUAGE_NEGOTIATION_URL] = array(\n  'types'\
  \ => array(LANGUAGE_TYPE_CONTENT, LANGUAGE_TYPE_INTERFACE, LANGUAGE_TYPE_URL),\n\
  \    'callbacks' => array(\n      'language' => 'locale_language_from_url',\n  \
  \    'switcher' => 'locale_language_switcher_url',\n      'url_rewrite' => 'locale_language_url_rewrite_url',\n\
  \    ),\n    'file' => $file,\n    'weight' => -8,\n    'name' => t('URL'),\n  \
  \  'description' => t('从 URL（路径前缀或域名）确定语言。'),\n    'config' => 'admin/config/regional/language/configure/url',\n\
  \  );\n```\n\n\n\n##### 最终引导阶段：加载模块并初始化主题\n\n最后会执行 `drupal_bootstrap_full()`。所有包含\
  \ Drupal 工具函数的文件都被引入。已启用的模块被加载（换言之，`.module` 文件被引入）。模块有机会通过 `hook_stream_wrappers()`\
  \ 注册流包装器^(4)，并通过 `hook_stream_wrapper_alter()` 修改现有的包装器。（到目前为止你已经知道，所有用于注册事物的钩子也都有一个对应的\
  \ alter 钩子）。`$_GET['q']` 中的路径被规范化，主题被初始化。\n\n> **注意**：你可以通过在 `settings.php` 中提供替代的\
  \ `menu.inc` 或 `path.inc` 文件来替换 Drupal 菜单系统和路径处理函数的部分或全部原始功能。如果你想提升 Drupal 网站的性能，可能会考虑这样做……前提是你有足够的胆量和钢铁般的神经。请务必小心；你可能会无意中改变\
  \ Drupal 核心的行为。\n\n__________\n\n⁴ [`http://api.drupal.org/api/drupal/modules--system--system.api.php/function/hook_url_inbound_alter/7`](http://api.drupal.org/api/drupal/modules--system--system.api.php/function/hook_url_inbound_alter/7)\n\
  \n路径规范化的任务是 `drupal_get_normal_path()` 完成的。它会检查存储在 `$_GET['q']` 中的路径是否是一个路径别名或自定义\
  \ URL，需要将其映射到内部的 Drupal 实体 URL（如 `node/84`、`user/123`）。如果普通的存储别名对你来说不够用，`hook_url_inbound_alter()`\
  \ 的实现可以添加一些魔法。此钩子在 URL 别名表中的别名被映射到系统路径之后被调用。使用方法示例请参见 API 文档。\n\n初始化主题层涉及查找当前激活的主题，该主题可以是：在\
  \ UI 中设置为默认主题的主题、用户个人偏好的主题、由 `hook_custom_theme()` 实现返回的主题，或者通过菜单系统为当前路径显式设置的主题。所有在主题的\
  \ `.info` 文件中声明的 CSS 和 JavaScript 都被添加到页面中，如果主题的 `hook_init()` 实现存在，则会被调用。\n\n在此阶段的最末尾，当\
  \ Drupal 完全设置好后，会调用 `hook_init()`。关于使用 `hook_init()`，API 文档指出：“它通常用于设置请求后续阶段所需的全局参数。”\
  \ Drupal 核心的 Locale 模块实现了 `hook_init()` 来根据用户当前的语言初始化日期格式。\n\n> **注意**：在 Drupal\
  \ 6 中，`hook_init()` 通常用于添加每次页面加载都需要的 CSS 或 JavaScript 文件。虽然你仍然可以这样做，但这些资源现在也可以列在模块的\
  \ `.info` 文件中，例如 `scripts[] = example.js` 或 `stylesheets[all][] = example.css`。然后系统模块的\
  \ `hook_init()` 实现 `system_init()` 会负责添加这些文件。\n\n### 页面回调的执行\n\n完成引导阶段后，Drupal 就可以构建、渲染和交付内容了。由于所有请求都通过\
  \ `.htaccess` 中的重写规则路由到 `index.php`，Drupal 需要一个内部机制来将给定的请求 URL 分派给处理该请求的程序。在 Drupal\
  \ 中，这个程序就是当前菜单项的页面回调。一个菜单项包含关于如何响应客户端对特定路径请求的信息集合。你已经在第 29 章中学习了菜单系统的工作原理。最重要的部分是页面回调——一个返回可渲染数据结构的函数。渲染过程在附录\
  \ C 中解释。\n\nDrupal 需要考虑几种情况：\n\n*   网站处于离线模式。\n*   在 `menu_router` 表中未找到请求路径对应的菜单项。\n\
  *   访问者没有权限查看与菜单项关联的资源。\n*   一切正常，页面回调被执行。\n\n此算法的结果要么是一个与对应 HTTP 状态码相等的整数，要么是一个符合\
  \ `drupal_render()` 期望格式的渲染数组。它被传递给 `drupal_deliver_page()`，后者让交付回调产生输出。默认情况下，交付回调是\
  \ `drupal_deliver_html_page()`。它利用 `drupal_render()` 将页面回调返回的渲染数组与同样结构化的区域数据合并，并将整个页面转换成\
  \ HTML。图 30-3 展示了整个页面加载周期，并标明了 Drupal 的钩子被调用的时机。\n\n![images](img/3003.jpg)\n\n\
  **图 30-3**. 详细展示引导过程的页面加载周期\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n### 一个典型的示例\n\n让我们回到本章开头的示例 URL：`node/84`。Drupal 的菜单系统通过调用 `node_load(84)` 来加载由节点\
  \ ID 84 标识的节点。在底层，`DrupalDefaultEntityController` 及其子类 `NodeController` 负责从数据库中获取匹配的记录，并调用\
  \ `hook_load()`、`hook_entity_load()` 和 `hook_node_load()`，从而让模块有机会操作节点对象或触发其他操作。关联的字段通过\
  \ `field_attach_load()` 加载。实现了 `hook_field_storage_pre_load()` 或 `hook_field_attach_load()`\
  \ 的模块有机会动态地为每个字段添加和修改字段数据。节点 84 是一个由书籍核心模块提供的“书籍”类型的节点。图 30-4 显示了加载完成后节点对象的调试器视图。各个模块添加的属性和字段都已标明。\n\
  \n在下面的示例代码中，您会看到 `book_node_load()`，即书籍模块对 `hook_node_load()` 的实现。像所有实现一样，它接受两个参数：一个节点数组和一个节点类型数组。如果加载的节点是书籍的一部分，则会将附加数据附加到该节点以扩展其行为：该节点会意识到自己是书籍的一部分。这里忽略了类型，但对于其他模块可能很重要。作为开发人员，理解这个复杂的加载过程实际上为您减轻了很多负担是很重要的。您只需要实现合适的钩子即可。\n\
  \n```\n/**\n * 实现 hook_node_load()。\n */\nfunction book_node_load($nodes, $types)\
  \ {\n  $result = db_query(\"SELECT * FROM {book} b INNER JOIN {menu_links} ml ON\
  \ \\\nb.mlid = ml.mlid WHERE b.nid IN (:nids)\", array(':nids' => \\           array_keys($nodes)),\n\
  array('fetch' => PDO::FETCH_ASSOC));\n  foreach ($result as $record) {\n    $nodes[$record['nid']]->book\
  \ = $record;\n    $nodes[$record['nid']]->book['href'] = $record['link_path'];\n\
  \    $nodes[$record['nid']]->book['title'] = $record['link_title'];\n    $nodes[$record['nid']]->book['options']\
  \ = unserialize($record['options']);\n  }\n}\n```\n\n加载节点对象后，它会被传递给给定路径的页面回调函数 `node_page_view()`。它将节点的标题设置为页面标题，并向\
  \ HTML 头部元素（尚未渲染）和 HTTP 标头添加一个规范链接和一个简短链接^(5)。构建渲染数组是 `node_show()` 的职责，它将其委托给 `node_view_multiple()`。在此函数中，每个节点的渲染数组由\
  \ `node_view()` 构建。字段被准备好以供渲染，模块可以通过 `hook_entity_prepare_view()` 对要显示的内容进行操作。这个钩子尤其重要；实现新实体的开发人员应确保通过调用\
  \ `entity_prepare_view()`（就像 `node_view_multiple()` 所做的那样）在 `ENTITY_build_content()`\
  \ 或 `ENTITY_view_multiple()` 函数中调用它。请阅读 `entity_prepare_view()`^(6) 的 API 文档以了解更多详细信息。\n\
  \n__________\n\n⁵ 规范链接非常有用，可以避免因对同一内容发布多个 URL 而受到搜索引擎的惩罚。一个非常常见的例子是短 URL，它在短信服务中非常流行。\n\
  \n⁶ `api.drupal.org/api/drupal/includes--common.inc/function/entity_prepare_view/7`\n\
  \n![images](img/3004.jpg)\n\n***图 30-4.** 完全加载的节点对象的 Netbeans 调试器视图*\n\n每个单独的节点（对于此页面只有一个）由\
  \ `node_view()` 渲染，并将大部分工作委托给 `node_build_content()`。字段和链接被转换为渲染数组，并且模块可以通过 `hook_entity_view()`\
  \ 和 `hook_node_view()` 进一步向渲染数组添加内容。书籍模块实现了后者，并使用它来添加书籍导航元素，如图 30-5 所示。它在最终页面上的显示效果如图\
  \ 30-6 所示。在离开页面回调上下文之前，会调用 `hook_entity_view_alter()` 和 `hook_node_view_alter()`，这是修改其他模块之前所做操作的最后机会。\n\
  \n![images](img/3005.jpg)\n\n***图 30-5.** `book_node_view()` 将书籍导航添加到渲染数组后的节点 84\
  \ 的调试器视图*\n\n![images](img/3006.jpg)\n\n***图 30-6**. 最终结果*\n\n当页面回调最终返回渲染数组时，它会被传递给\
  \ `drupal_deliver_page()`，后者将渲染工作留给交付回调函数 `drupal_deliver_html_page()`。它确保其他模块在\
  \ `drupal_render()` 遍历渲染数组以生成标记之前，通过调用 `hook_page_build()` 和 `hook_page_alter()`\
  \ 有最后一次更改结果的机会。区块模块使用 `hook_page_build()` 将内容添加到主题定义的区域中。`book_page_alter()` 利用强大的新钩子\
  \ `hook_page_alter()` 将书籍菜单添加到活动菜单中。\n\n```\n/**\n * 实现 hook_page_alter()。\n *\n\
  \ * 将书籍菜单添加到用于在查看书籍页面时构建活动路径的菜单列表中。\n */\nfunction book_page_alter(&$page) {\n \
  \ if (($node = menu_get_object()) && !empty($node->book['bid'])) {\n    $active_menus\
  \ = menu_get_active_menu_names();\n    $active_menus[] = $node->book['menu_name'];\n\
  \    menu_set_active_menu_names($active_menus);\n  }\n}\n```\n\n总结这个典型页面加载周期的示例，渲染的详细信息可以在附录\
  \ C 中找到。一旦标记准备就绪，精美的页面就会被发送到访客的浏览器。图 30–7 说明了本章第二部分中涵盖的最重要的钩子。\n\n![images](img/3007.jpg)\n\
  \n***图 30-7.** 详细说明页面回调执行的节点页面加载周期*\n\n在深入研究了 Drupal 页面的完整加载周期之后，最好从鸟瞰的角度来审视它。引导过程已经为模块向访客提供内容搭建好了舞台。对于您网站的所有页面，这个过程都是相同的。在各个阶段会调用许多钩子，为您在全局层面上影响网站行为提供了机会。在为\
  \ Drupal 模块做贡献或创建自己的模块时，请仔细考虑某段代码何时需要被执行，并选择最合适的钩子。在页面加载的后期阶段确定语言选择是没有意义的；完成该任务所需的一切在引导期间都已可用，并且所有页面都可以从中受益。\n\
  \n### 总结\n\nDrupal 7 引入了几个新概念，其中最突出的是实体和字段。您可以使用众多钩子来影响内容的行为和呈现。这些钩子使您能够轻松地用简洁的代码和很少的努力产生巨大的效果。研究一些核心模块，看看它们如何利用实体和字段\
  \ API。\n\n不要犹豫，亲自体验一次页面加载的过程。使用您选择的工具开始调试——没有什么比看到路由路径与匹配项对应，以及渲染数组随着每个调用的钩子而增长更令人明了的了。如果您以\
  \ Drupal 开发为生，那么这是值得付出的努力。一份用于深入了解 Drupal 内部机制的工具摘要（包括您的建议）将在 `dgd7.org/inside`\
  \ 上保持更新。\n\n## 第 31 章\n\n![images](img/squ.jpg)\n\n\n\n"
- "# 搜索与 Apache Solr 集成\n\n作者：彼得·沃拉宁\n\n本章将从 Apache Solr 搜索集成模块如何实现 Drupal 核心搜索模块钩子的角度、如何创建自定义搜索的角度以及其功能性角度进行讨论。本章还将重点介绍一些额外的钩子，这些钩子允许自定义和扩展模块的行为。该模块可视为将\
  \ Drupal 与网络服务集成的示例，并运用了一些面向对象的代码。\n\nDrupal 核心中的`Search`模块为各模块提供搜索功能提供了一个框架和 API。`Search`模块本身除了提供搜索表单和一些管理配置选项外，几乎不做任何事情。为了让搜索表单显示出来，一个或多个模块必须实现\
  \ Search 模块的钩子。在 Drupal 核心中，`Node`模块和`User`模块都实现了搜索钩子。\n\n`Node`模块提供了对内容进行关键词搜索的能力。由于它是\
  \ Drupal 核心的一部分，它使用 SQL 数据库作为存储和搜索机制。虽然`Node`模块的搜索实现提供了非常好的关键词匹配，但其对数据库的使用可能会导致较大型网站出现显著的性能问题。此外，虽然它可以处理一些过滤（例如，通过高级搜索表单按用户或分类术语进行过滤），但这相当有限。\n\
  \nApache Solr 搜索集成模块（位于`drupal.org/project/apachesolr`）为索引和搜索内容提供了`Node`模块搜索的替代方案。它提供了更广泛的内容索引和过滤功能，并且可以从多个\
  \ Drupal 站点访问 Solr 服务器。Drupal 7 中 Search 模块 API 的许多增强和变更，是基于在 Drupal 6 Search 模块上创建\
  \ Apache Solr 搜索集成时遇到的局限性而推动的。有几个关键特性使其区别于`Node`模块搜索：\n\n*   使用 Facet API 模块进行分面搜索。\n\
  *   结果为用户提供多种可选的排序方式。\n*   高度可定制的权重调整，允许你调整搜索结果的相关性评分，以控制哪些结果优先显示。\n*   对大量内容（例如，超过\
  \ 10,000 个节点）进行快速搜索。\n*   具备进行多站点搜索或联邦搜索的潜力，例如在同一结果集中同时显示用户搜索和内容搜索。\n\n![images](img/square.jpg)\n\
  \n> **注意** 术语“分面”指的是搜索结果（或整个搜索索引）中文档的一个属性，例如一个分类术语。“分面搜索”指的是一个基于分面过滤搜索结果的界面，这是一种帮助用户找到所需结果并避免无效搜索的技术。\n\
  \nApache Solr 本身是一个开源项目。实际上，它是 Lucene Java 项目的一部分：Lucene 是 Solr 所基于的实际搜索库。Apache\
  \ Solr 提供了 HTTP 接口，因此可以（在同一台服务器或完全独立的服务器上）与 Drupal（或几乎任何其他应用程序）集成。Solr 可以在独立服务器上运行这一事实，是它在\
  \ Drupal 社区流行的原因之一：它允许站点管理员减少数据库服务器的负载，即使对于拥有数十万个节点的站点也能获得快速的搜索结果。Solr 还内置了对主从复制的支持，因此可以轻松地为搜索请求提供高可用性；如果搜索流量超过一台服务器的容量，它还可以进行水平扩展。该\
  \ Drupal 模块主要设计用于与稳定的 Solr 1.4.x 发布系列一起工作，尽管大多数或所有功能也应适用于即将发布的 Solr 版本。\n\n如果你想运行\
  \ Solr，你有以下几种选择：\n\n*   自己运行。通常，此选项适用于至少拥有一台专用服务器或 VPS 的用户。至少需要具备在 Java Servlet\
  \ 容器（如 Jetty 或 Tomcat）中部署 Solr，并通过防火墙规则、HTTP 认证或其他认证方式控制对其访问的能力。\n*   为托管的 Solr\
  \ 索引付费。Acquia 为每位拥有 Drupal 支持订阅的客户提供一个 Solr 索引。其他公司提供更通用的服务。\n*   通过非营利组织或合作组织（如\
  \ May First People Link）汇集资源。\n\nApache Solr 项目附带了一个易于运行的 Jetty 部署，几乎所有有兴趣尝试该模块的人都可以在本地机器上几分钟内运行起来。步骤概述在\
  \ Apache Solr 搜索集成模块附带的`README.txt`文件中。但是，这种简单的部署类型不包含任何认证机制，因此在公共服务器上用于生产站点时，至少需要通过防火墙来保护对\
  \ Solr 的访问。\n\n### 搜索模块管理选项\n\nDrupal 7 中搜索模块的管理界面提供了一些 Drupal 6 中没有的关键配置选项。搜索模块和\
  \ Apache Solr 搜索集成设置都可以在`admin/config`路径下的“搜索和元数据”部分找到，如图 31-1 所示。\n\n![images](img/3101.jpg)\n\
  \n*图 31-1. 管理员配置界面中的搜索设置*\n\n特别值得注意的是搜索模块（如图 31-2 所示），位于`admin/config/search/settings`的表单允许你有选择地启用任何或所有实现了搜索钩子的模块。你还可以选择其中任何一个作为默认搜索（即从搜索块表单和默认标签页运行的搜索）。如果你想使用\
  \ Apache Solr 搜索集成作为主要搜索，你应将其设为默认搜索，并可能禁用`Node`模块的搜索。\n\n![images](img/3102.jpg)\n\
  \n*图 31-2. 搜索模块配置选项*\n\n### 搜索结果与分面块\n\n进一步的配置将在本章后面讨论，但在启用适当的过滤器并配置好块之后，你会得到一个默认搜索，它允许你查看当前的关键词和过滤器，以便通过移除当前过滤器之一来缩小或扩大搜索范围。与当前搜索结果相关的已启用过滤器将显示在一个分面块中。该块中的每个链接将应用一个额外的过滤器来缩小结果集。默认设置会显示带有复选框的分面（这是通过\
  \ JavaScript 添加的）。一旦对搜索结果应用了分面过滤器，你还可以勾选“保留当前过滤器”复选框，这实质上是为你提供了使用不同关键词和当前过滤器再次搜索的选项（参见图\
  \ 31-3）。\n\n![images](img/3103.jpg)\n\n*图 31-3. 带有当前搜索块、分面块以及使用新关键词时保留过滤器的复选框的搜索结果*\n\
  \n### 搜索模块 API\n\nDrupal 核心中的`Search`模块提供了一个其他模块可以使用的框架。特别是，它们可以利用来自`Search`模块的搜索界面和标准结果格式化功能。\n\
  \n关于这些钩子的更多详细信息可以在 Drupal 7 搜索模块附带的`search.api.php`文件中找到；相同的文档也可以在`api.drupal.org`上在线访问。本节将重点介绍由\
  \ Apache Solr 搜索集成模块实现的钩子，这基本上是任何模块要实现自定义搜索所需实现的最小钩子集合。\n\n\n\n#### 创建搜索功能所需的钩子实现\n\
  \n以下钩子是定义新搜索标签页所必需的。一个模块只能定义一个搜索，这是一个有意的限制——这有助于保持 API 更简洁。\n\n`hook_search_info()`\n\
  `hook_search_execute()`\n\n仅需这两个钩子，你的新搜索功能就能生效。`hook_search_info()` 让搜索模块了解你的搜索实现、搜索标签页的标题、用于执行搜索的路径，以及（可选）一个回调函数的名称，该函数用于在关键词之外添加其他条件（如过滤器）到搜索中。另一个必需的钩子\
  \ `hook_search_execute()` 在用户访问搜索路径并发现存在关键词或条件时被调用。请注意，虽然搜索表单通过 POST 请求提交，但搜索模块实际上是从\
  \ URL 中获取所有搜索参数。因此，你可以例如将搜索加入书签，然后访问该 URL 重新运行以查找新结果。`hook_search_execute()` 的返回值是一个结果数组，每个结果都是一个包含主题函数所期望的特定键值对的数组。\n\
  \n![images](img/square.jpg) **注意** 所有搜索参数通过 GET 请求在 URL 中传递，这一事实不仅允许你将搜索加入书签，还有其他好处。例如，由于\
  \ Drupal 将页面 URL 用作缓存键，你可以从 Drupal 页面缓存中受益，为网站上的任何常用搜索（例如向用户提供特定搜索 URL 的链接）提供缓存页面。\n\
  \n#### 其他搜索模块钩子\n\n以下钩子是可选的，但它们允许你的模块更好地控制搜索过程和索引过程（如果使用搜索模块的索引功能），或者允许你向搜索模块管理界面添加内容：\n\
  \n`hook_search_access()`\n`hook_search_reset()`\n`hook_search_status()`\n`hook_search_admin()`\n\
  `hook_search_page()`\n`hook_search_preprocess()`\n`hook_update_index()`\n\n如果你实现了\
  \ `hook_search_page()`，则可以完全控制搜索结果的流程和显示，在这种情况下，你可以根据需要更改 `hook_search_execute()`\
  \ 的返回格式，而无需遵循搜索模块所期望的格式。清单 31–1 中所示的实现与核心搜索模块的实现非常相似，但增加了一个额外的输出选项，用于浏览所有分面区块。\n\
  \n`apachesolr_search` 集成模块实现了其中的五个钩子，以及在 `hook_search_info()` 中可选指定的回调。最后一个回调非常重要，因为它允许代码从查询字符串中提取额外的过滤参数，并用于在没有任何关键词时也执行搜索。正是基于\
  \ Apache Solr 搜索集成的这个需求，该功能被添加到了核心搜索模块中。你还会注意到，`hook_search_info()` 返回的信息实际上是一个变量的内容，尽管该变量（目前）并未在用户界面中暴露以供配置。这将允许开发人员更改搜索标签页的名称和路径，而无需使用\
  \ `hook_menu_alter()`。\n\n***清单 31–1.** 具有额外输出功能的基本搜索模块*\n\n```\n/**\n * 实现 hook_search_info()\n\
  \ */\nfunction apachesolr_search_search_info() {\n  return variable_get('apachesolr_search_search_info',\
  \ array(\n    'title' => '站点',\n    'path' => 'site',\n    'conditions_callback'\
  \ => 'apachesolr_search_conditions',\n  ));\n}\n\n/**\n * 实现 hook_search_execute()\n\
  \ */\nfunction apachesolr_search_search_execute($keys = NULL, $conditions = NULL)\
  \ {\n  $filters = isset($conditions['filters']) ? $conditions['filters'] : '';\n\
  \  $solrsort = isset($_GET['solrsort']) ? $_GET['solrsort'] : '';\n\n  try {\n \
  \   return apachesolr_search_run($keys, $filters, $solrsort, 'search/' . arg(1),\
  \ pager_find_page());\n  }\n  catch (Exception $e) {\n    watchdog('Apache Solr',\
  \ nl2br(check_plain($e->getMessage())), NULL, WATCHDOG_ERROR);\n    apachesolr_failure(t('Solr\
  \ 搜索'), $keys);\n  }\n}\n\n/**\n * 实现 search_view() 的条件回调\n */\nfunction apachesolr_search_conditions()\
  \ {\n  $conditions = array();\n\n  if (isset($_GET['filters']) && trim($_GET['filters']))\
  \ {\n    $conditions['filters'] = trim($_GET['filters']);\n  }\n  if (variable_get('apachesolr_search_browse',\
  \ 'browse') == 'results') {\n    // 设置条件以触发搜索。\n    $conditions['apachesolr_search_browse']\
  \ = 'results';\n  }\n  return $conditions;\n}\n\n/**\n * 实现 hook_search_reset()\n\
  \ */\nfunction apachesolr_search_search_reset(){\n  apachesolr_clear_last_index('apachesolr_search');\n\
  }\n\n/**\n * 实现 hook_search_status()。\n */\nfunction apachesolr_search_search_status(){\n\
  \  return apachesolr_index_status('apachesolr_search');\n}\n\n/**\n * 实现 hook_search_page()\n\
  \ */\nfunction apachesolr_search_search_page($results) {\n  if (!empty($results['apachesolr_search_browse']))\
  \ {\n    // 显示分面浏览区块。\n    $output = apachesolr_search_page_browse($results['apachesolr_search_browse']);\n\
  \  }\n  elseif ($results) {\n    $output = array(\n      '#theme' => 'search_results',\n\
  \      '#results' => $results,\n      '#module' => 'apachesolr_search',\n    );\n\
  \  }\n  else {\n    // 给用户一些自定义的帮助文本\n    $output = array('#markup' => theme('apachesolr_search_noresults'));\n\
  \  }\n  return $output;\n}\n```\n\n显然，这里的代码主要包装了对其他内部模块函数的调用；实现状态和重置钩子只是为了允许状态和重置操作在搜索模块管理页面以及\
  \ Apache Solr 搜索集成管理页面中正常工作。请注意，实现了 `hook_search_page()`，以便在没有搜索结果时提供分面区块浏览或自定义的帮助文本。格式化正常搜索结果的代码与搜索模块中的默认实现相同。\n\
  \n### Apache Solr 搜索配置\n\nApache Solr 搜索集成的管理界面提供了许多配置选项，能够满足大多数初始定制的需求。特别是，通过配置提升设置并进行一些关于最终用户对结果排序满意度的基本测试，你可以帮助搜索结果变得更加相关。\n\
  \n#### 启用的过滤器\n\n为了让最终用户能够通过特定分面进行导航，你需要遵循两个步骤。首先，通过 Apache Solr 搜索集成设置启用该过滤器，然后通过常规的块模块界面启用相应的块。启用过滤器的操作意味着\
  \ Solr 服务器会执行额外的处理，并返回额外的数据。因此，你只应启用那些你会使用其块或将数据用于其他目的的过滤器。例如，为了使标签字段的分面块可用，需要启用最后一个过滤器（参见图\
  \ 31–4），然后对块进行配置。\n\n![images](img/3104.jpg)\n\n***图 31–4.** 启用过滤器会在搜索结果中增加一个可供使用的分面。*\n\
  \n\n\n##### 内容类型加权与排除\n\n网站常见需求是：某些类型的内容应在搜索结果中获得加权，或某些内容类型根本不应被添加到搜索索引中。例如，你可能希望将用户引导至博客文章。或者，你可能希望他们首先找到由书籍节点代表的文档。最初，所有内容类型都被同等对待。通过将某个值设置为“忽略”以外的选项，即表示你网站内容中的特定节点类型具有更高重要性，并应在搜索结果中获得更高评分。相反，有些内容可能根本不应被索引。这适用于自动生成或代表数据而非实际网站内容的节点类型。\n\
  \n管理界面允许你按内容类型配置加权和排除（参见图 31-5）。如果你将某个类型添加到排除列表，模块将尝试立即从搜索索引中删除所有相关节点，因此请勿随意进行此更改。\n\
  \n![images](img/3105.jpg)\n\n***图 31-5.** 为特定内容类型设置搜索结果偏向与排除设置*\n\n### Apache Solr\
  \ 搜索定制\n\nApache Solr 搜索集成模块只是为 Drupal 网站实现完全优化界面的一个起点。此外，Solr 的过滤和排序功能使其作为某些列表页面（如电子商务网站、图书馆网站或\
  \ `drupal.org` 上列出所有模块的页面）的数据源极具吸引力。`apachesolr.api.php` 文件中记录了大量的钩子，但对于大多数典型定制，仅需使用其中少数几个即可。\n\
  \n#### 用于向 Solr 输入数据的钩子\n\n在索引节点时，Apache Solr 搜索集成模块默认会向文档添加某些字段。如果你想进行自定义过滤、加权等操作，则需要在索引中向文档添加额外字段。为此，你可以实现\
  \ `hook_apachesolr_update_index($document, $entity, $namespace)`。此钩子用于在文档发送到 Solr\
  \ 之前向其中添加更多数据；它也可用于修改或替换由 Apache Solr 或其他模块添加到文档中的数据。它类似于修改钩子，但由于文档是一个对象，因此无需通过引用传递变量。向\
  \ Solr 索引添加数据时，查看 `schema.xml` 文件以了解动态字段的类型名称会很有帮助。你只需使用正确的前缀命名文档上的属性，即可控制数据索引方式。例如，你可以像这样添加一个单值字段：\n\
  \n```\nfunction MYMODULE_apachesolr_update_index($document, $node, $namespace) {\n\
  \  if ($node->type == 'site_product' && $document->entity_type == 'node') {\n  \
  \  // 向索引添加一个额外的自定义节点字段。\n    $document->fs_price = $node->price;\n  }\n}\n```\n\
  \n有几种方法可以将可搜索数据放入索引。最简单的方法是在索引时简单地向要渲染的节点添加更多内容。另一种方法是实现 `hook_node_view($node,\
  \ $view_mode, $langcode)`，并查找 `$view_mode` 的值为 `'search_index'` 的情况。还有一种选择是通过 `hook_node_update_index($node)`\
  \ 添加内容。从该钩子返回的任何内容都会附加到发送到搜索索引的内容中。然而，在后两种情况下，这些内容只会作为关键词搜索的一部分被找到，而无法用于创建分面或排序。\n\
  \nDrupal 7 核心版本的一个重大特性是字段 API。Apache Solr 搜索集成模块内置了对索引节点或（可能）其他实体类型字段的支持，可基于字段类型甚至逐个字段进行。此功能基于模块\
  \ 6.x-2.x 版本中对内容构建工具包 (CCK) 字段的支持而创建；在 7.x 版本中，它已扩展为包含对分类术语引用字段的处理。默认情况下，只有分类和所有列表类型字段（例如\
  \ `list_text`）会作为 Solr 文档中的单独字段被索引。如果你需要添加或更改此索引，可以实现 `hook_apachesolr_field_mappings_alter(&$mappings)`。更多详情请参阅\
  \ `apachesolr.api.php`。\n\n最后要考虑的一点是，如何有选择地将数据排除在搜索索引之外。之前，你看到了用于排除所有特定类型节点的管理界面，但你可能需要更精细地排除内容。在这种情况下，你可以实现\
  \ `hook_apachesolr_node_exclude($node, $namespace)`。如果任何模块返回 `TRUE`，则该节点不会被发送到索引。\n\
  \n#### 用于修改查询和结果的钩子\n\n修改发送给 Solr 的查询的首要且最常见的原因是从搜索结果的文档中检索额外字段。这是通过 `hook_apachesolr_update_index($document,\
  \ $node, $namespace)` 向文档添加额外字段的补充操作。通常，当你修改查询时，不希望最终用户在分面链接等处看到该修改。在这种情况下，应使用 `hook_apachesolr_modify_query($query,\
  \ $caller)`，并将你的字段名称附加到发送给 Solr 的 `'fl'` 参数中，如下所示：\n\n```\nfunction MYMODULE_apachesolr_query_alter($query)\
  \ {\n  // 同时从索引中返回任何价格数据到结果中。\n  $query->addParam('fl', 'fs_price');\n}\n```\n\n\
  `hook_apachesolr_modify_query()` 还可用于向搜索添加最终用户不可见的过滤器。这一点非常重要，例如在实现 Apache Solr\
  \ 节点访问模块时。该模块使用 `node_access_grants()` 根据节点访问系统向搜索查询添加过滤器。它还使用前面描述的 `hook_apachesolr_update_index()`\
  \ 来将节点访问信息作为额外字段与每个从节点派生的 Solr 文档一起索引。\n\n一个非常相似的钩子是 `hook_apachesolr_query_prepare($query)`。使用此钩子所做的任何更改最终可能会在搜索结果页面上对用户可见，因此其用途比\
  \ `hook_apachesolr_query_alter()` 更为有限。\n\n还有一些钩子（和主题钩子）可用于在搜索结果向用户显示之前修改或丰富它们。最常用的是\
  \ `hook_apachesolr_search_result_alter($doc, $extra)`，它允许对结果集中的每个文档进行单独修改。\n\n###\
  \ 与 Apache Solr 服务器集成\n\n为了稍微理解 Apache Solr 搜索集成模块中搜索模块钩子实现为何如此编写，对 Apache Solr\
  \ 服务器的工作原理有一个广泛的概念性理解是很有用的。Drupal 通过 HTTP 请求与 Solr 交互，对 Drupal 而言，这意味着使用 `drupal_http_request`\
  \ 函数（不过，也可以通过 PHP 中的其他方式实现，包括使用 curl 函数或 `file_get_contents()`，具体取决于 PHP 安装）。Solr\
  \ 具有 RESTful API 接口，但至少在 1.4.x 版本中，它并不支持所有 HTTP 方法作为动词，因此从这个意义上说，它并非*真正的* REST 接口。相反，它使用不同的\
  \ URL 路径（并且可以为每个搜索索引配置）；POST 请求用于数据更改操作，GET 请求用于查询。\n\n一个 PHP 库被改编用于提供将数据传入和传出 Solr\
  \ 的某些底层逻辑。该库可在 `code.google.com/p/solr-php-client` 找到。Apache Solr 搜索集成模块提供了一个改编自主库类的类，该类改变了其行为。最重要的改动是使用\
  \ `Drupal_http_request()` 而不是 `file_get_contents()`，以便所有 Drupal 网站都能使用该模块。这是类 `DrupalApacheSolrService`，它扩展了\
  \ `Apache_Solr_Service`。文档类来自该库，仅做了最小限度的修改。\n\n\n\n#### 管理 Solr 索引中的数据\n\n数据以 XML\
  \ 文档的形式添加到 Solr 索引中，通过 `POST` 请求发送到 Solr 服务器的 `/update` 路径。Solr 将数据存储为文档，每个文档必须有一个唯一的字符串\
  \ ID 值。Solr 本身没有任何文档间关系概念，也没有将文档 `JOIN` 起来的能力。从这个意义上说，它类似于基于文档的 NoSQL 数据库（如 MongoDB），因此你必须将希望能够在搜索结果中搜索或检索的节点或其他实体的所有属性存储在一起。删除文档是通过\
  \ `POST` 请求发送一个 XML 文档来完成的，该文档要么指定文档 ID，要么通过一个查询来删除所有匹配的文档。\n\n#### 搜索与分析\n\n常规搜索仅基于\
  \ URL 路径和查询字符串进行。根据你的配置，不同的搜索可能使用不同的路径，例如关键词搜索与“更多类似结果”搜索。如果某些功能未按预期工作，在本地运行 Solr\
  \ 会非常有帮助，因为你可以直接在 URL 中输入查询，或使用 Solr 管理界面的其他功能。特别是，分析功能有助于理解索引内容或搜索关键词如何被 Solr `schema.xml`\
  \ 中配置的分析器和过滤器转换。如果使用示例 Jetty 部署在本地运行 Solr，你可以通过 [`http://localhost:8983/solr/admin/`](http://localhost:8983/solr/admin/)\
  \ 访问该界面。图 31–6 显示了管理界面：顶部括号内是正在使用的模式名称，然后是分析界面的链接以及可以发起搜索的文本框。\n\n![images](img/3106.jpg)\n\
  \n**图 31–6.** Apache Solr 管理页面，包含分析界面的链接\n\n### 总结\n\n通过使用 Apache Solr 搜索集成，你可以提高网站上搜索结果的质量和搜索界面，这将有助于留住用户，并帮助他们找到所需内容。\n\
  \nDrupal 7 版本的 Apache Solr 搜索集成将随着对用户和文件等其他实体的索引功能可用，以及 Drupal 7 版本的 Views 发布而得到增强。\n\
  \n![images](img/square.jpg) **提示** 在 `dgd7.org/solr` 查找更新。\n\n## 第三十二章\n\n![images](img/squ.jpg)\n\
  \n## 用户体验\n\n作者：Bojhan Somers 和 Roy Scholten\n\n学习 Drupal 的工作原理需要花费大量时间——而这还只是核心部分。随着模块的添加，复杂性也随之增加。作为\
  \ Drupal 开发者，你不希望这种复杂性妨碍用户和网站管理员从你的工作中充分受益。这在设计方面带来了一些挑战。这个模块如何与其他所有模块配合？我们如何设计\
  \ Drupal 管理界面以适应无限的可能性？\n\n这时，设计实践——最重要的是关注用户行为的交互设计——就派上用场了。例如，Drupal 7 设计中最大的变化之一是引入了名为\
  \ `Seven` 的管理主题。\n\n没有默认的管理主题从人们开始使用 Drupal 6 的第一秒起就造成了困惑，因为它不符合他们对 CMS 工作方式的认知。管理界面在视觉上位于网站内部，而不是一个独立的管理界面，这让人们感到困惑。\n\
  \n### 模块化\n\n无需破解应用程序即可插入功能是 Drupal 的核心。然而，一旦你开始组合使用多个模块，工作流问题就会出现。你能想象为了达成一个目标，需要在\
  \ Firefox 或 iPhone 中使用多个插件吗？\n\n### 人性化 API\n\n我们倾向于认为人类是理性的、有逻辑的生物，会基于深思熟虑做出有意识的行动。但事实是，我们的许多（如果不是大多数）决定都是无意识做出的，受到情绪和大脑中我们无法有意识访问的部分发出的自动触发器的驱动。\n\
  \n大脑这个潜意识部分是一个相当快速且智能的输入处理器——这是理所当然的——因为我们的五感每秒捕捉约 1100 万条信息。其中只有 40 条被有意识地处理。幸好我们有潜意识来处理所有其他信息，否则我们几秒钟内就会超负荷。\n\
  \n### 短期记忆\n\n你有没有过走进一个房间却忘了自己要做什么的经历？你刚刚遇到了短期记忆的限制，同时也体验到了自己容易分心的能力。在界面世界中，我们必须考虑到这一点，因为用户一天中很容易被许多事件打断他们的任务流程，比如同事走进来或电子邮件弹出。\n\
  \n短期记忆（持续时间从几秒到大约 30 秒）的存储容量有限。心理学教授乔治·A·米勒在一篇著名论文《神奇的数字七，加减二》（1956 年）中写道，一个人能记住大约\
  \ 7（±2）个项目。随着对这一主题研究的深入，人们发现人类可能记住的甚至更少（大约 4（±1）个项目），而且我们倾向于以块的形式记忆信息，比如电话号码。这就是为什么在游戏节目中，参与者更容易记住一大组相似或相关的名称，而不是少量不相关的名称。\n\
  \n在设计界面时，我们需要考虑到用户容易在任务流程中被打断，并且他们很难从一个屏幕到下一个屏幕记住大量信息，特别是当其中包含不熟悉的信息时。在不同屏幕之间以逻辑块的形式重复重要的信息集合，将帮助用户完成手头的任务。\n\
  \n### 长期记忆\n\n你还记得为即将到来的学校考试而学习的情景吗？你可能尝试了所有技巧，从间隔重复（逐渐增加学习材料重复之间的间隔）到你妈妈告诉你的需要睡眠来处理和恰当地组织记忆。当用户接触界面时，大量的长期记忆会通过识别熟悉元素（它们如何工作、下一步是什么等）而被激活。\n\
  \n语义记忆是关于概念和含义的记忆。它不是你第一次学习如何使用复选框表单元素的故事，而是关于它如何工作以及它与其他表单元素有何不同的具体知识。\n\n程序性记忆是我们对执行任务所涉及步骤的记忆。这使我们能够系鞋带，也使经验丰富的\
  \ Drupal 用户能够不假思索地设置一个模块。通常，当我们打破这些习得的过程时，用户混淆就会发生。\n\n通过更深入地理解用户的长期记忆（概念、先前经验和现有流程），我们可以提供更好的界面。我们可以匹配他们对事物工作方式的期望，甚至可以通过引导他们发现更多可能性来超越他们的期望。\n\
  \nDrupal 模块的工作方式是一个生态系统的一部分，从 Web 到内容管理系统，再到 Drupal 本身。所有这些系统都引入了用户在您的模块中会利用的概念和流程。通过遵循标准，你更有可能避免与概念和流程出现明显的错配。然而，随着\
  \ Drupal 模块变得越来越复杂，你可能需要进行额外的研究，以了解用户如何看待您的模块中涉及的概念，以及哪些现有知识可以应用于使其更易用。\n\n\n\n\
  #### 心智模型\n\n在用户接触 Drupal 之前，他们对其运作方式已有心智模型——这不仅来自以往使用内容管理系统的经验，也源自整体的计算机使用体验。在思考心智模型时，我们需要区分系统的实际运作方式（系统模型）与用户认为可借助系统达成目标的方式（交互模型）。\n\
  \n系统界面旨在弥合这两种模型之间的差距，这种界面被称为表征模型——即开发者或设计师选择呈现功能的方式。若未能充分理解用户在实际使用功能前的交互模型，开发者与设计师往往倾向于依据系统模型来设计界面，这通常会导致界面难以使用。例如，Drupal\
  \ 7 的字段管理界面就是基于系统模型设计的，要求用户将注意力从\"创建表单和内容区块\"的交互模型转移到\"构建数据库字段\"上。\n\n退一步思考用户（在首次看到模块前）如何构想通过你的模块达成目标，是打造可用界面的关键。这也是构建界面过程中常被遗忘的步骤。\n\
  \n图 32-1 展示了用户交互模型与系统模型的简化对比。我想要列出什么内容？在哪里展示？如何呈现？每个条目采用什么格式？\n\n![images](img/3201.jpg)\n\
  \n**图 32-1.** 视图模块的概念模型\n\n### 感知\n\n理解人类为何将某些事物视为前景而将其他视为背景，是设计优秀界面的基础。当环境刺激作用于感官时，我们开始讨论感知——即对这些刺激的解读。\n\
  \n> *“感知并非简单由刺激模式决定；它是对现有数据不断寻求最佳解释的动态过程。”*\n>\n> ——理查德·格雷戈里\n\n自上而下的感知理论认为，感知处理是基于我们的知识、预期和思维建构而成的。而自下而上的感知处理则主要由物理元素驱动。\n\
  \n在 Drupal 6 的一次可用性测试中，有一段知名视频显示：一名参与者艰难地寻找着\"创建内容\"链接——这个链接始终显示在左侧菜单中，但用户在管理界面各处辗转后，仍花了\
  \ 5 分钟才在屏幕上找到它。这清晰展现了预期和先验知识如何主导用户的视线方向，也暴露出 Drupal 未能突出展示内容管理系统中最重要链接的问题。\n\n在设计时，我们必须牢记如何利用视觉焦点之外的感知——即所谓的周边视觉。当人们浏览页面时，会通过周边视觉识别许多对象。基于这一原则的设计意味着：将相关元素进行视觉分组，并降低次要功能在视觉上的重要性。\n\
  \n感知是心理学最古老的领域之一，为模块界面设计提供了丰富的理论和实用洞见。本文将仅涉及两个主题：格式塔理论（页面元素间的形态与和谐性）以及一些通用的色彩使用技巧。在思考形态与色彩时，以下特性决定了其意义：\n\
  \n- 形态\n    - 线条方向\n    - 线条长度\n    - 线条宽度\n    - 尺寸\n    - 空间分组\n- 色彩\n    - 色调\n\
  \    - 色度\n    - 饱和度\n    - 明度\n\n理解感知在很大程度上是为了通过更符合逻辑的信息分组来管理界面复杂性。对于视图和规则这类模块而言，这些挑战尤为艰巨，会深刻影响模块的实用性、效率、效能、易学性和整体满意度。\n\
  \n#### 格式塔心理学\n\n在查看界面时，我们不会将页面中不同元素的不同刺激视为独立个体，而是将其视为一个更大的整体。格式塔心理学专注于理解：人类如何将某些元素视为前景而将其他视为背景、如何区分不同形态、以及如何在形态间发现相似性。\n\
  \n库尔特·科夫卡、沃尔夫冈·克勒和马克斯·韦特海默在 1920-1940 年的研究引入了这一理念——将物体或环境的感知视为一个整体形态，其中包含前景部分和背景部分。格式塔感知被归纳为\"\
  完形律\"，以下定律在 Drupal 环境中适用：\n\n- 相似律\n- 邻近律\n\n我们将简要介绍每条定律及其在 Drupal 中的应用。这些定律通常有助于评估和优化模块的表单设计。\n\
  \n### 相似律\n\n我们会将具有相似特征（如颜色、形状、方向、尺寸、空间等）的项目归为一组。当我们在图 32-2 中看到一排圆形位于方块区域中时，会将其感知为一行或一线，而非独立的圆形。\n\
  \n![images](img/3202.jpg)\n\n**图 32-2.** 活跃主题使用大图预览，非活跃主题使用小缩略图\n\n这一模式在 Drupal\
  \ 中常被用于区分不同项目，如图 32-2 右侧所示——通过尺寸对相似项目进行分组。这也是建筑和零售店中常用的\"宏大\"设计手法——通过重复相似部件营造宏伟感。\n\
  \n### 邻近律\n\n如图 32-3 所示，常见的模式是将视觉元素彼此靠近放置。从心理学角度看，当看到两人站得很近时，我们会默认他们彼此相识。这一模式在互联网上随处可见，最典型的例子是\
  \ Flickr——其页面几乎所有元素都采用此模式，仅偶尔使用线条进行分隔。Drupal 也采用此模式，如图 32-3 所示。\n\n![images](img/3203.jpg)\n\
  \n**图 32-3.** 利用留白定义表单标签与表单元素之间的关系\n\n我们在 Drupal 中广泛运用这一原则来布局各类列表页面，甚至在细节层面也通过留白来定义表单元素之间的关系。应用这一原则的关键在于：将页面视为整体，以引导视线的方式对页面元素进行分组。\n\
  \n这一基本定律经常被误用——要么留白过多，要么过少。正确应用的小技巧是：退后一步，将页面适当模糊处理后，你还能清晰看到页面上的分组吗？如果不行，你可能需要让分组更加明确，或减少分组数量。\n\
  \n\n\n### 色彩\n\n色彩不仅能美化事物，还能赋予页面元素结构、吸引注意力并传达意义。“感知”部分已阐述了色彩如何增强页面元素的构成并帮助传达信息。描述色彩本身既复杂又令人困惑，因为我们常赋予“暗淡”或“明亮”等词语不同含义，尤其在像这样一本黑白印刷的书中。从技术角度来说，色彩通过**色相**、**色度**、**饱和度**和**亮度**来描述。\n\
  \n- **色相**指的是我们识别主色时的尝试。红色、绿色、蓝色和黄色被称为独特色相。\n- **色度**是指色彩的纯度——即不含其他颜色的程度。例如，闪亮的深蓝色具有高色度，而紫色则具有中等色度。\n\
  - **饱和度**描述的是色彩随明暗变化的程度；更关键的是，它关乎给定色彩的强度——即为何一种颜色显得苍白而另一种却显得鲜艳。\n- **亮度**是衡量色彩明亮程度的指标。\n\
  \nDrupal 的管理界面（Seven）谨慎使用色彩。这主要出于品牌和可用性考虑。我们力求在页面的实际表单交互中尽可能减少视觉干扰。另一项考虑因素是无障碍性，因为我们社会中相当一部分人存在某种形式的色觉障碍。Seven\
  \ 使用了表 32-1 中描述的中性色。\n\n***表 32-1.** Seven 的色彩*\n\n| **Seven 的色彩** | **用途** |\n\
  | --- | --- |\n| `#a6a7a2`（浅灰色） | 选项卡、选中的表格列标题 |\n| `#e1e2dc`（浅灰色） | 表格标题背景 |\n\
  | `#0074bd`（蓝色） | 所有链接 |\n| `#008800`（绿色） | 成功消息、已启用的模块 |\n| `#b14400`（橙色） | 警告\
  \ |\n| `#8c2e0b`（暗红色） | 错误提示 |\n| `#b4d7f0`（浅蓝色） | 演示区块的背景 |\n\n如表 32-1 所示，系统内置了多种色彩可供使用，绝大多数模块使用这些颜色即可满足需求。对于需要超出这些预设色彩的模块，需遵循以下几条原则。\n\
  \n#### 色彩和谐\n\n在 Drupal 中，我们使用浅灰色，因为它不像蓝色、红色和绿色那样引人注目。选择色彩时，有多种色彩组合方式可供选择——从类似色（色轮上相近的色彩组合）到互补色（色轮上相对的色彩组合），再到不同色相和色度的色彩组合。\n\
  \n关键是要理解你希望着色的元素传达何种意义并吸引何种程度的注意力。尽管如此，请尽量限制新色彩的使用，因为色彩容易冲突，和谐感会被破坏，让用户困惑于这些色彩试图传达什么信息。\n\
  \n色彩理论是一门广阔的学科，我们在此仅触及基础。欲了解更多信息，我们推荐以下书籍：约翰内斯·伊滕的《色彩艺术：色彩的主观体验与客观理性》（John Wiley\
  \ & Sons，1997 年）和维多利亚·芬蕾的《色彩：调色板的自然史》（Random House Trade Paperbacks，2003 年）。但最重要的是，这是一个需要实验的领域——通过精心选择的色彩来寻找和谐与意义。\n\
  \n### 实践\n\n> *“理论上，理论和实践是一样的。实际上，它们不一样。”*  \n> ——尤吉·贝拉\n\n那么，有了这些理论，如何将原则付诸实践呢？关键在于建立一个流程，在模块创建过程中将设计视为一项活动，而非最后一刻才做的事情。\n\
  \n这是构建良好 UI 的重要方面：愿意采取必要步骤，绘制草图、线框和模型，然后让一些用户进行测试。本节描述的流程适用于大多数数字项目，但我们将其具体应用于 Drupal。\n\
  \n我们坚信，如果我们想打造一个更引人入胜的 Drupal，使其贡献模块的用户体验与 Drupal 核心及彼此之间无缝衔接，那么设计在当前模块设计流程中所扮演的角色必须改变。\n\
  \n#### 流程\n\n大多数 Drupal 模块服务于非常特定的需求，而这往往只是构建网站更大目标的一部分。设计行为主要关注两个部分：理解用户希望通过你的模块实现什么，以及他们如何通过你的\
  \ UI 以最佳方式实现这一目标。\n\n设计流程关乎一个非常简单的理念：要获得好的设计，你需要探索各种可能性，并根据用户的反馈不断迭代。重要的是要认识到，你的模块通常是更大工作流程的一部分；因此，不打破现有的交互模式、不破坏流程是关键。\n\
  \n我们将描述以下流程：\n\n- **概念：** 明确你要构建什么。\n- **设计：** 勾画模块的界面和关系草图。\n- **构建：** 构建用户界面，并对照核心交互模式进行检查。\n\
  - **优化：** 让用户进行测试，并根据测试结果进行优化。\n- **发布：** 准备项目文件，以便在 `drupal.org` 上分享。\n\n此流程可以根据你所处的周期阶段全面或部分应用；尽管如此，随着迭代的进行，每个步骤都会不时地被重新审视。在遵循流程的过程中，你会逐渐明白哪些活动能让你从程序员角色转变为设计师角色；这也能让你理解为何仅基于实现模型的设计往往无法满足用户需求。\n\
  \n设计活动关乎从全局视角看待你的模块所承担的角色及其如何融入整体。你的模块如何与其他模块协同使用？你正在为哪个任务流添加功能？用户可能在该流程的哪个环节使用它？如何以融合并提升用户体验的方式来实现？\n\
  \n在实践部分，你将把这个流程应用于 Rules 模块的管理界面。该模块的界面多年来不断发展，但在 Drupal 7 中进行了大规模改造，以更好地满足用户在其网站上的使用需求。与许多其他技术性更强的模块一样，其领域可能极其复杂。因此，用户界面必须处理大量数据和配置，才能真正发挥作用，使用户能够完成工作——这并非易事。\n\
  \n#### 挑战\n\n设计良好的用户体验很困难。一旦你的 1.0 版本发布，模块就进入了一个新阶段：它将真正被他人使用。可能需要一些时间，但最终问题会出现在你的问题队列中。哎呀！发现了\
  \ bug。或者更糟：功能请求！\n\n为像 Drupal 这样的模块化、可扩展且灵活的框架设计组件是一项艰巨的任务。让我们看看在 Drupal 生态系统中设计应用程序时可能遇到的一些主要挑战。\n\
  \n\n##### 专注于核心功能（学会说“不”）\n\n随着模块的迭代，新功能很可能会不断加入。久而久之，模块最初的简洁性和专注性可能会丧失。这对任何软件项目都是威胁，尤其是在那些功能实际使用情况鲜有反馈的模块中——常见模块功能实际上往往只有该模块的维护者本人在使用。\n\
  \n正如我们在 Drupal 核心开发中所经历的，问题队列并非获取用户界面反馈的最佳场所。该队列中的人通常都是经验丰富得多的 Drupal 用户（事实上是专家级用户），并且愿意花时间真正撰写问题报告。这些用户通常不能反映普通用户的需求或用户界面方面的问题，因此，当你处理这些问题时，请在心里牢记这一点。\n\
  \n例如，如果我们仅仅依据问题队列中收到的反馈，那么 Drupal 7 最大的问题就会是权限页面，第二大问题则是模块页面。然而，从测试中我们了解到，大多数问题在于如何找到创建内容的方法以及究竟在哪里才能找到相应功能。因此，Drupal\
  \ 7 在管理区新增了“添加内容”链接，对管理区进行了重组，并引入了用于编辑和配置的上下文链接；而模块页面和权限页面则要等到 Drupal 8 才能进行彻底改革。\n\
  \n如果某个功能请求偏离了你对模块的初衷，就要大胆地说“不”。有些模块通过为特定功能请求提供附加模块，或是在代码中提供该选项但不在用户界面中显示，来做到这一点。保持专注意味着你能够轻松交付模块的核心价值，并且你的界面将保持简洁，不会有令人分心的设置。\n\
  \n##### 如何做出明智的设计决策\n\n很少有问题报告会以“在观察并与一位用户交谈后……”开头，因为这不是什么值得分享的激动人心的信息。但说到底，这才是最能让你做出明智决策的依据：即它如何影响用户。你如何知道你的目标受众是谁，以及中级用户想要达成什么目标？你如何深入了解你的用户，从而做出明智的设计决策？\n\
  \n最快、最好的方法就是与他们交谈，并观察他们使用你的模块。这看起来可能是个大动作，但通常你可以在身边找到能提供此类反馈的人。\n\n在整个 Drupal 7\
  \ 的设计过程中，我们经常与问题队列中的用户、当地技术聚会和会议的参与者，以及那些更新当地侦察网站的用户进行交流。从所有这些案例中，我们得以就更明智地做出设计决策，了解设计对用户、代码以及他们的协作工作产生的影响。\n\
  \n##### 在资源有限的情况下进行设计\n\n在软件开发环境中，开发人员的数量远超设计人员是很常见的；在开源项目中，这种差距甚至更为悬殊。然而，要让你的设计奏效，你常常需要得到设计人员的反馈，以确保对齐方式、颜色使用以及页面上元素之间的关系等视觉提示达到平衡。\n\
  \n#### 概念：你到底在构建什么？\n\n这主要是关于退一步，审视全局。为了帮助你设定项目范围并映射将使用它的不同受众，有两个首要问题：\n\n-   你在构建什么？\n\
  -   谁会使用它（不包括你自己）？\n\n这两个问题都可以快速界定，并在需要时进行扩展。实际上，将这两个问题的答案记录下来，可以为讨论后续开发奠定良好基础，并有助于与社区进行沟通。那么，回答“你在构建什么？”这个问题需要包含哪些内容呢？\n\
  \n这个答案并非主要体现在工具的功能特性上，而是要在稍抽象的层面上，着眼于该模块旨在支持的用户目标。这里的机会在于，将模块的技术能力与真实的用户需求联系起来。\n\
  \n“谁会使用它”这个问题，主要是关于以一种超越将用户简单划分为初级、中级和高级组别的方式来理解你的用户。研究人们的不同需求，并考虑你的模块将如何在更大的工作流程中被使用。\n\
  \n让我们以示例项目——规则模块（`drupal.org/project/rules`）为例，来看看这两个问题。规则模块允许站点管理员定义按条件执行的操作，这些操作可由站点或应用中发生的事件触发。例如，你可以创建一条规则，当新用户在站点注册时，自动向站点管理员发送一封电子邮件。电子商务网站也广泛应用规则：例如，计算运费或应用促销码以获得更低价格。\n\
  \n让我们尝试回答这两个有助于界定该工具概念的问题。\n\n##### 规则模块：你在构建什么？\n\n规则模块旨在为用户提供一套完整的工具集，用于在 Drupal\
  \ 应用中定义业务逻辑。其预期范围非常广泛：规则模块的目标是成为在站点上定义和处理事件的主要、可扩展的平台。\n\n图 32-4 中的概念模型解释了规则模块试图解决的普遍问题。\n\
  \n![images](img/3204.jpg)\n\n***图 32-4.** 规则模块的概念模型*\n\n##### 规则模块：谁会使用它？\n\n规则模块的主要受众可以分为三类角色或人员：开发者、站点构建者和业务开发者。\n\
  \n他们使用规则模块的共同主要原因是：定义站点或应用的业务逻辑。开发者使用规则 API 来自定义系统工作流。站点构建者使用规则界面来定义站点上的不同交互如何触发其他事情。而有业务头脑的人则负责实施和改进订单处理及营销活动。\n\
  \n##### 设计\n\n那么，你如何将这些关于你的项目及其受众的想法，转化为软件的实际界面呢？你可以通过草图探索多种思路，在线框图中优化最佳方案，并为最终选定的方案创建一个模拟图。\n\
  \n不要害怕糟糕的想法。自由地去探索吧。\n\n\n\n### 获取创意：草图绘制\n\n俗话说：“获得好创意的最佳途径就是拥有大量创意。”要打造优秀的设计，首先需要探索多种可能性。\n\
  \n在软件设计中，几乎普遍存在一个问题，那就是投入在探索多种可行方案上的时间和精力非常少。往往第一个设计就被直接选中，而它通常并非最优解。\n\n从抽象层面来看，设计实践就是在两种对立的思维状态之间来回切换：发散性思维和收敛性思维，如图\
  \ 32–5 所示。运用发散性思维时，你寻找多种思路和机会；而收敛性思维则是对这些思路进行评估，并决定舍弃哪些、深化哪些。\n\n![images](img/3205.jpg)\n\
  \n***图 32–5.** 展示从发散性思维到收敛性思维过程中设计交付物的流程*\n\n草图绘制可以通过任何媒介完成：纸笔、线框软件、图形软件，甚至代码。在探索设计方案时，你可以拿起铅笔，快速勾勒出界面可能的样子。关键在于暂时抛开技术限制，进行头脑风暴，思考在理想状态下它应该如何运作。不断探索，再探索。把这些（或许很烂的）想法从脑子里倒出来，快速记下，然后转向下一个想法。\n\
  \n在比尔·巴克斯顿（Bill Buxton）所著的《用户体验草图设计：正确设计与设计正确》（摩根·考夫曼出版社，2007 年）一书中，草图被定义为具备以下属性：\n\
  \n* **快速**：绘制草图不需要太多时间。\n* **及时**：能够在需要时立即提供。\n* **廉价**：成本不应限制探索的可能性。\n* **可弃**：投入在于构思本身，而非呈现效果。\n\
  * **丰富**：草图以系列或集合的形式出现效果最佳。\n* **清晰的语汇**：草图拥有独特的风格，易于识别。\n* **鲜明的笔触**：不是严谨精确，而是开放流畅。\n\
  * **极简细节**：仅包含传达概念所必需的内容。\n* **适度的精炼程度**：精确度与项目实际所处的精炼阶段相匹配。\n* **建议与探索，而非确认**：不要规定解决方案，而是指明通向答案的途径。\n\
  * **模糊性**：留有多种解读的空间。\n\n你可能已经注意到，这个列表里并没有提到你必须画功了得。重点不在这里。也不在于你必须使用纸笔。草图也可以用代码来完成。关键是要专注于产生多种想法。工作到足以传达出想法的要点即可。截图或用其他方式记录下来，然后继续下一个想法。我们在示例中使用纸笔，是因为这是我们最习惯的方式。选择你顺手且能让你快速工作的工具。\n\
  \n反馈循环从这里开始。首先要将草图展示给他人，目的是获取更多想法，而不必急于区分好坏。如果别人提出了其他建议，就立刻把这些想法也草草画出来。\n\n如果你选择自己缩小选择范围，务必以相对新鲜的眼光来审视你的想法。在草绘和筛选之间留出一些时间间隔。试着倒着看或从远处观察这些草图。\n\
  \n### 规则用户界面的草图绘制\n\n我们来看一个规则模块的例子。如果探索规则界面，你会发现许多核心 UI 基础组件，如选项卡、表格和字段集都在发挥作用。但更引人注目的是，有几个地方刻意偏离了核心模式。有几个页面在一个页面上展示了多个表格。规则列表页面将活动规则和非活动规则分别放在各自的表格中。规则编辑页面则在一页内从上到下展示了不下三个表格。让我们追溯性地为这两种情况探索一些想法，并找出当初做出那些设计决策的原因。\n\
  \n### 规则列表页面\n\n![images](img/3206.jpg)\n\n***图 32–6.** 规则列表页面截图。注意活动规则和非活动规则各自展示在独立的表格中*\n\
  \n如图 32–6 所示，系统中的所有规则被分成两个表格：一个是所有活动规则的表格，其下方是另一个非活动规则的表格。这是区分两者的最佳方式吗？让我们尝试提出一些不同的处理方案，如图\
  \ 32–7a 至 32–7g 所示。\n\n![images](img/3207a.jpg)\n\n***图 32–7a.** 当前情况：一个活动规则表格和一个非活动规则表格*\n\
  \n![images](img/3207b.jpg)\n\n***图 32–7b.** 一个表格，底部为非活动部分。你可以通过拖放将规则移动到表格的相应区域，使其变为活动或非活动。这是在字段\
  \ UI 中使用的一种模式的变体，该交互用于在实体上显示或隐藏单个字段。*\n\n![images](img/3207c.jpg)\n\n***图 32–7c.**\
  \ 如果所有规则都放在一个表格中，并可以通过筛选仅显示活动或非活动规则，效果会如何？*\n\n![images](img/3207d.jpg)\n\n***图\
  \ 32–7d.** 如果将非活动规则全部放入活动规则下方一个可折叠的字段集中，效果会如何？*\n\n![images](img/3207e.jpg)\n\n\
  ***图 32–7e.** 将它们分散到不同的选项卡中是否是一个可行的方案？*\n\n![images](img/3207f.jpg)\n\n***图 32–7f.**\
  \ 是否必须根据活动或非活动来分组规则？能否只对非活动规则采用不同的样式（如灰显）？*\n\n![images](img/3207g.jpg)\n\n***图\
  \ 32–7g.** 如果所有规则都放在一个表格中，并可以通过筛选仅显示活动或非活动规则，效果会如何？*\n\n如你所见，有些想法很容易被舍弃（如 32–7e\
  \ 和 32–7f），但筛选方案（32–7g）和字段集方案（32–7d）看起来很有前景。筛选方案之所以可行，是因为界面上已经存在一个包含筛选选项的字段集。进一步的探索将着重研究如何通过设计来容纳这个活动/非活动筛选器。\n\
  \n另一种方案，即将所有非活动规则（放在一个表格中）置于一个可折叠的字段集内，看起来也不错，因为这使得它们在界面中不那么突出。可以合理地假设，当用户访问这个页面时，他们更频繁地是为了处理活动规则。让非活动规则占用更少的屏幕空间可以支持这种使用场景。这两种分组方式清晰地区分开来，从而更容易辨识。\n\
  \n从真实用户那里获取对页面概念的反馈。询问他们这如何契合他们的心智模型，向他们展示草图，并询问他们的看法。\n\n对于真正复杂的问题，你可能需要十个或更多的构思草图，才能感觉对问题空间进行了充分的探索。对于不太复杂的场景，三个草图通常就足够了。但即便如此，你也有了可供选择的素材，这仍然让你领先一步，因为你现在可以做出明智的决定，确定将沿着哪条路线前进并继续深化探索。\n\
  \n你可能会问：具体怎么做？\n\n\n\n### 线框图\n\n线框图可用于多种目的：确定内容优先级、初步设计简报、验证需求、在上下文中评估文案撰写，或作为可用于可用性测试的纸质原型。这种多功能性也带来了对多个受众传达过多信息的风险。制作线框图时，要明确其目的并坚持下去。保持这种专注才能使其发挥最大效用。\n\
  \n制作线框图可以使用多种工具：纸笔、专用图表软件、绘图软件，甚至办公效率工具也具备在屏幕上绘制带标签方框的基本功能。与草图一样，使用何种媒介并不重要。数字创建的线框图可能更容易在线分享，因为你需要先扫描或拍摄纸笔绘制的图纸。\n\
  \n假设你想为一个`Drupal`管理页面制作线框图。根据你的草图，你已经选出了两三个似乎指向解决方案的想法。你已经缩小了选择范围。现在，是时候审视这些想法，并对每一个进行更详细的探索。\n\
  \n很有可能，到现在为止，你已经非常清楚需要做什么了，因为你的项目范围很小。\n\n*   线框图是关于收集和安排所需的各个部分，其中“部分”指的是表单元素，“部分”的组合则是指交互模式（稍后会详细说明）。\n\
  *   使用`Seven`主题。它施加了有趣的限制，比如单列布局，并提供了一个可以扩展的漂亮基准线。其视觉语言是克制的。这留出了很大的实验空间。而你绝对应该去尝试。在贡献模块中，有许多复杂的界面是核心没有现成答案的。但是要让`Drupal`管理界面出彩，就要让它隐形。你也应该尊重这种克制，并对添加到视觉语言中的内容精挑细选。\n\
  \n#### 获取线框图的反馈\n\n如前所述，明确线框图的目的并坚持下去非常重要。这在向没有背景信息（即你之前的工作流程）的其他人征求反馈时尤其重要。以最能服务于其目的的方式呈现线框图。无论你使用什么工具，确保包含以下元素以实现有效的可视化：\n\
  \n1.  **标题和描述。** 是的，这显而易见，但也容易被遗忘。如果不知道他们在看什么，人们将很难给出有意义的反馈。最好将标题直接添加到图形中。这样做可以确保线框图不依赖于周围的文本来进行这种基本的说明。\n\
  2.  **主要页面区域。** 对于一个网页，勾勒出页眉、页脚、内容区域和侧边栏。对于`Drupal`管理页面，为工具栏和快捷键添加一个方框。在其下方为面包屑导航、页面标题和选项卡再添加一个。你的模块不太可能更改这些区域的内容，但加入它们可以提供上下文。\n\
  3.  **高亮和注释** 属于你设计中的具体细节。在你想要高亮的部分旁边放一个数字。在线框图旁边的列中重复该数字，并简要描述该特定位置的情况。\n\n现在，再次到了邀请他人对你的设计提出意见的时候了。\n\
  \n### 现实检验\n\n用四种基本屏幕状态对设计进行压力测试：正常、空白、溢出和错误。所有这些屏幕状态最终都会出现，你应该为每一种状态进行设计。\n\n####\
  \ 正常\n\n![图片](img/3208.jpg)\n\n***图 32–8.** 正常状态*\n\n`图 32–8` 展示了一个可管理的内容列表、少量标签以及具有适中链接数量的菜单。这很可能就是你的线框图已经描绘的状态。一切都很平均——没有极端情况。\n\
  \n#### 空白\n\n![图片](img/3209.jpg)\n\n***图 32–9.** 空白状态*\n\n如果你的模块生成对象列表，你很可能会使用表格来展示这个列表。但如果没有可用的项目呢？一方面，这种情况非常少见。另一方面，大多数列表一开始都是空的。所以，虽然这种状态（`图\
  \ 32–9`）并不经常发生，但可以肯定的是，它在非常重要的首次使用场景中会发生。`Drupal` 7 引入了一种标准的表格空白模式，你也应该实现它。\n\n\
  #### 溢出\n\n![图片](img/3210.jpg)\n\n***图 32–10.** 溢出选择列表状态*\n\n“我启用了太多模块，导致`站点配置`下拉菜单超出了我的屏幕高度。”当你拥有\
  \ 68,000 个内容条目时会发生什么？或者有 1429 个分类术语、500 万条评论，或是一个包含 63 个字段的内容类型？如果你的模块很可能会遇到这种情况（如`图\
  \ 32–10`所示），那么用户界面将提供哪些工具来帮助用户管理如此大量的数据？搜索、排序、筛选？\n\n#### 错误\n\n![图片](img/3211.jpg)\n\
  \n***图 32–11.** 错误状态*\n\n`图 32–11` 是一个你不想显示的屏幕。当然，最好的错误消息就是没有错误消息。不过，你仍然需要建设性地处理这种情况。`Drupal`提供了关于如何以及在哪里显示系统状态消息的基本模式。你将使用什么措辞来编写错误消息，以及如何引导用户解决问题？\n\
  \n这次审查将帮助你找到可能尚未考虑到的用户界面部分。根据需要修改你的线框图。必要时，草拟多个方案；注意不要简单地修补一下了事。\n\n### 用于详细设计的静态模型\n\
  \n在线框图制作或审查设计时，你可能会遇到一些特别棘手的特定界面部分。也许你注意到，在测试时，人们很难找到某个特定的信息或功能。\n\n那么，是时候将你的设计保真度再提升一个层次，并创建一些静态模型了。你已经通过绘制草图表提出了大概思路。然后你制作了线框图来细化各个屏幕。当你发现屏幕中的某个特定元素需要更详细的设计探索时，就该创建静态模型了。静态模型看起来与最终界面完全一样。你可以使用`Photoshop`或其他图像编辑软件制作它们。如果你已经有功能代码，那么使用`Firebug`插件或直接在模块代码中调整设计也完全可以，而且可能效率更高。\n\
  \n创建静态模型来仔细推敲细节，使设计完全准确。使用默认模式和样式可能让界面达到大约 80%的完成度。深入挖掘，完成最后 20%的细节是非常值得的。\n\n\n\
  好的，作为高级文档工程师和翻译员，我将遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 构建：构建阿尔法版本并与用户验证\n\n你已经确定了项目的范围和目标受众。你探索了屏幕布局的各种方案并选定了一个方向。是时候真正开始构建你的项目了。\n\
  \n你的目标是尽快获得一个可用的原型，这意味着要专注于只构建你想要实现的主要功能。如果你的项目包含多个屏幕，那么先让贯穿这些屏幕/状态的主要流程能够运行起来。着眼于大局；细节的填充留待以后。\n\
  \n为什么如此强调可用的原型？因为一个可工作的概念验证可以被其他人测试。如果人们无法实现你的项目想要支持的主要目标，那么所有你可能想要添加的漂亮小功能都是无用的。与其他人员一起验证。仅仅因为你已经对事物（应该）如何运作了解得太多，所以*你*并不是验证功能是否匹配用户目标的最佳人选。因为你已经了解，你已无法想象在不了解的情况下事物是如何被感知的。这被称为“知识的诅咒”，它是实现简洁性的障碍。你可能会觉得自己是在把事情简单化甚至过度简化。在大多数情况下，观察其他人使用你的应用会纠正这一点，并告诉你需要澄清说明。\n\
  \n所以，让基本功能运转起来，并观察其他人如何使用它。本章稍后会更多介绍如何通过简单的可用性测试获得最佳结果。\n\n但是，假设你的项目已经处于大多数功能都按计划运行的状态。人们能够成功使用该界面来完成工作。那么，是时候进行一次你*可以*自己完成的检查了，即验证你的界面元素是否遵循核心惯例，这些惯例可以在\
  \ `drupal.org/ui-standards` 找到。\n\n重要的是要认识到，当你在构建一个模块时，你的 UI 将会在核心模块和其他多个贡献模块的上下文中被看到。这就是一致性原则如此重要的原因：你几乎永远不会知道你的\
  \ UI 将出现在哪种确切的上下文中。那么最好的策略就是不要试图标新立异，而是尽最大努力融入其中。\n\n### 优化：观察与新版迭代\n\n一旦你的模块构建和设计完成，你应该对用户想要什么以及你的模块是否实现了这一点有了清晰的认识。最后阶段是根据实际情况优化你的模块。随着你的模块进入阿尔法阶段，你很可能会收到用户的反馈。\n\
  \n这个阿尔法阶段也是进行更彻底的可用性测试的最佳时机。任何可用性测试的主要目标都是为设计决策提供信息。\n\n-   模块是否达到其目的？它有用吗？\n- \
  \  它是否帮助人们实现他们更广泛的目标？\n-   它是否高效、有效，甚至用起来令人愉悦？\n\n本章将介绍进行定性可用性测试的一些基础知识，这种测试运行快速且适用于模块开发。我们遵循一个相当基础的流程来运行可用性测试：\n\
  \n-   制定测试计划。\n-   招募参与者。\n-   设置模块、录制和日志记录。\n-   运行可用性测试。\n-   分析结果。\n-   报告问题。\n\
  -   制定测试计划。\n\n测试计划是你的可用性测试蓝图，确保你充分准备测试，并能一致地运行每个单独的环节。但它也可以作为一种工具，说服他人你不是随便找用户测试一下，而是执行了一个经过深思熟虑的计划。\n\
  \n#### 测试计划大纲\n\n-   为什么进行测试？\n-   你测试哪种类型的用户？\n-   你如何进行测试？\n-   方法\n-   场景\n-\
  \   任务\n-   环境\n-   分析方法\n-   报告方法\n\n这是一个非常基础的测试计划，它省略了你在大型站点上通常会做的许多细节工作。这里的想法是，你可以更频繁地重复这个测试计划，并且其他人可以通过对周围的参与者执行该计划来提供帮助。那么，让我们使用这个测试计划大纲来为\
  \ Rules 模块设置一个可用性测试。\n\n#### 为什么要测试 Rules 模块？\n\n你进行测试是为了查明用户是否能够使用 Rules 2 界面设置一条规则。具体来说，你想了解：\n\
  \n-   模块的工作流程与用户的期望有多接近？\n-   基本的事件、条件和动作关系是否清晰？\n-   用户对他们的规则会被触发的信心有多大？\n\n你进行测试还为了向社区提供材料，帮助人们在未来为这个模块的用户界面做出更好的设计决策。\n\
  \n#### 你测试哪种类型的用户？\n\n在概念阶段，你为这个模块确定了三个受众群体。现在你必须评估在这个阶段应该测试哪些用户以及测试多少人。\n\n-  \
  \ **开发者**：开发者可以提供有价值的见解，了解他们在界面中看到的流程是否符合他们的期望，尤其是当他们从实现模型的角度来看待这个问题时。\n-   **站点构建者**：站点构建者能否设置一条规则，并且他是否有足够的信心认为这条规则能够成功执行？哪些触发因素可以帮助用户理解界面中所需的步骤？\n\
  -   **业务开发者（销售、内容策略师、店主）**：Rules 界面的引导性是否足够让他们理解需要采取哪些步骤？它是否符合他们的心智模型？\n\n站点构建者和开发者受众应该很容易从你周围的人中招募，但最后一组人会困难得多，因为他们也只占你目标受众的一小部分。对于测试，请参考\
  \ 表 32–2 中显示的分布。\n\n**表 32–2.** *测试分布*\n\n| **参与者类型** | **参与者人数** |\n| --- | ---\
  \ |\n| 开发者 | 2 |\n| 站点构建者 | 2 |\n| 业务开发者 | 1 |\n| **参与者总数** | **5** |\n\n让我们避免招募熟悉\
  \ Rules 2 界面或 Rules 2 实现的参与者。\n\n这些参与者将通过 Drupal.org 论坛、IRC 以及在你周围的人中招募。\n\n####\
  \ 你如何进行测试？\n\n本次可用性测试将是一次探索性测试，要求每位用户使用 Rules 2 界面创建两条规则。测试过程将被录制并与社区分享。\n\n#####\
  \ 方法\n\n你将进行五次独立的测试环节，每次大约持续 20 分钟。在此环节中，参与者将被要求执行两项任务。理想情况下，每个环节的场景和任务将根据参与者的背景进行调整。\n\
  \n测试主持人将介绍任务，并在适当时提问，同时做笔记并确保录像正常进行。\n\n##### 场景\n\n你正在为一家在线销售鞋子的小商店构建一个网上商店，你使用\
  \ Rules 在某种特定鞋子的订单超过 20 双时向商店管理层发送通知（以便检查商店库存），并在夏季促销期间为鞋子安排定期折扣。\n\n##### 任务\n\n\
  1.  当用户超过三个月未访问网站时，向其发送促销邮件。\n2.  从 6 月 1 日到 8 月 31 日，对所有鞋子提供 20% 的折扣。\n\n#####\
  \ 环境\n\n你需要有一个至少包含 Carlos 牌鞋子的网上商店。这个网上商店系统需要利用 Rules；这可以使用像 Drupal Commerce 或 Ubercart\
  \ 这样的电子商务系统来设置，或者使用带有鞋类内容类型价格字段的 Drupal 核心来设置。\n\n由于你将录制每个环节，你需要一个视频录制工具。如果你进行远程测试，你还需要一个屏幕共享工具（参见\
  \ `remoteusability.com/tools/` 了解远程测试工具）。\n\n\n\n"
- '# 选择分析方法


  本次测试，我们将采用一种探索性的定性可用性测试，直接在实际用户界面上进行。之所以选择这种方法，是因为`Rules 2`的发布周期以及对重要部分进行修改的能力。


  对于如何进行分析有一个清晰的思路，有助于你确定具体需要收集哪些数据。一种典型的分析结果是，通过回顾笔记和视频，记录下测试过程中发现的每个问题，从而回答“为什么进行测试？”部分中提出的研究问题。


  报告测试结果的核心在于分享信息，以便他人也能据此采取行动。这不仅有助于提升你的模块的可用性，也能帮助同一领域甚至 Drupal 核心中的其他模块；例如，你的发现可以帮助
  Drupal 核心优化其动作模块，因为它们在有些部分是相似的。


  '
- '# 招募参与者


  在测试计划中，你已经明确了希望招募哪些参与者；现在你需要实际找到这些参与者。为了验证他们是否符合你设定的要求，你需要进行一次简短的面试或问卷调查。


  ## 从哪里找到参与者？


  寻找参与者需要一点创意。由于这是开源项目，你很可能各方面预算都很紧张，因此使用付费招募表格或提供补偿可能要求过高。以下是一些我们曾用来寻找参与者的途径。


  -   **论坛和 IRC**：如果你试图招募开发者，在 IRC 和论坛上找到他们相对容易。从论坛招募参与者时，重要的是告知他们需要“保持新鲜感”，以避免他们在参加你的测试之前就试用过该模块。

  -   **模块页面注册**：如果你想招募那些即将使用或已经正在使用你模块的人，可以在你的模块页面上包含一个测试注册链接。这是招募参与者的有效方法。注册表可以包含几个问题，并询问他们何时有空。尽可能让为你自己和参与者选择合适的人选都变得简单。

  -   **Drupalcamp、用户组和贡献冲刺**：有许多本地活动为你提供了进行快速（15-20 分钟）可用性测试的机会。我们曾在 Drupalcamp 进行过测试；通过与组织者协调，通常可以在营会开始前、午餐休息期间，甚至在某些会议时段进行测试。这完全取决于参与者是否愿意错过其他会议。可以提前在关于活动的网站/博文中，或在活动期间（例如在开幕演讲中）发布招募测试参与者的请求。

  -   **同事、朋友和家人**：你可能在一家网页开发公司工作，有做网站的朋友，或者有一个对建站非常感兴趣的堂兄弟/表姐妹。他们很可能符合你为可用性测试设定的要求，因此招募他们是可行的。这里的一个风险是，你与参与者的关系可能会影响测试结果（感到不能自由批评），所以请牢记这一点。


  ## 安排参与者时间


  安排参与者时间相对简单。我们通常将测试安排在晚上或午餐时间。与他们保持密切联系，并在测试前确认一次甚至两次，以确保他们会预留时间。即使参与者来自 IRC，也总是要尝试预约时间。这样可以确保他们为你的测试专门预留了一段完整的时间，而不是临时安排，那样他们可能会被工作或其他事情打扰。


  ## 告知他们隐私注意事项


  告知参与者参与测试意味着哪些信息会被公开，这一点很重要。如果你要录制视频并与社区分享，必须获得参与者的许可。要清晰说明测试数据（包括任何素材）将如何被使用，并且这些数据将被匿名化处理。


  如果你与社区分享任何信息，请确保录音或笔记中不出现姓名。确保这一点的一个简单方法是在测试和分析过程中使用参与者编号而非姓名。


  对于分享视频，你还必须明确说明视频可以被分享——不含面部或任何可识别信息——纯粹是为了分享见解。


  ## 模块、录制和日志记录设置


  顺利进行可用性测试意味着要消除对技术环境和录制的一切担忧。以下是设置过程中的几个技巧：


  -   准备好备份安装。

  -   进行一次预测试（亲自测试一下）。

  -   评估为任务设定的时间是否现实。

  -   你提供的所有信息是否正确？

  -   测试麦克风和视频质量。

  -   禁用核心更新通知。


  '
- '# 执行可用性测试


  现在，我们来谈谈如何实际执行可用性测试！这其中很多是常识。关键在于你使用哪些技巧来从参与者那里获得最有价值的见解。传统测试我们使用以下流程：


  -   介绍（目的、流程、时长）

  -   期望（用户应做什么，例如大声说出想法）

  -   舒适感（你不是在被测试，可以问任何问题，必要时可以跳过某些内容）

  -   引入场景

  -   引入任务

  -   “出声思维”技巧

  -   测试后提问

  -   结束（评估）


  要了解人们浏览界面时每时每刻在想什么，以及他们做出的细微权衡，是非常困难的。你进行测试就是为了超越自己的假设。对参与者的沉默进行解读又会把你带回到假设中去。请使用“出声思维”技巧，即要求参与者在操作界面时说出自己的想法。这对于了解他们遇到的所有小问题以及他们的决策如何影响其使用界面的能力非常有效；它能为他们的心智模型提供宝贵的线索。它还能让参与者保持谈论自己正在做什么的状态。参与者需要接受这种技巧；对某些人来说，这可能会感觉不自然，或者因为他们操作界面速度很快而忘记这样做。在测试过程中，可以提醒参与者继续大声说出想法。


  ## 向参与者提问


  参与者会做很多事情，你可能想更深入地了解其背后的思考过程。可以随时询问参与者他们的感受、期望，或者他们对所发生事情的想法。


  通过提问，就像你是一个向参与者学习的学生一样，会让参与者感到更放松。


  ## 不要将参与者变成设计师


  你需要找出问题。不要询问解决方案。如果参与者主动提出解决方案，那没问题。如果他们提了，可以深入探究一下，但不要自己建议改进措施（例如：“你觉得如果那个按钮放在物体下方而不是右侧，效果会更好吗？”），或者询问哪种颜色能更好地传达信息。


  这些建议常常会干扰你后续寻找建议过程中的判断。


  ## 在提供帮助前，额外等待 20 秒


  参与者经常会遇到难以解决或在原型中尚无法完成的问题。想要友善地提供帮助是人之常情。但最好还是先等一会儿。正是通过参与者的挣扎，你才能获得更深入的理解。


  因此，每当参与者感到迷茫且确实无法完成任务时，再给他们一点时间，看看你是否能询问一些关于其心智模型的问题，例如错误提示信息是如何提供信息的。




  '
- "# 我们在测试软件，而非测试你\n\n这句话能让参与者感到更轻松。在测试过程中，你要确保参与者不会因害怕而不敢提出批评意见，甚至在必要时给出非常负面的反馈。\n\
  \n## 结果分析\n\n现在你已经收集了所有数据，就可以开始进行分析了。对于定性测试而言，这是一个相当混乱的过程，你需要翻阅笔记，记录下你在每项任务中看到的趋势，以及你在界面上观察到的更宏观的趋势。\n\
  \n分析的关键在于，要在你观察到的趋势与原始素材之间建立直接联系。这有助于你验证自己的理解，并让你在报告中更轻松地描述这些趋势。\n\n一种常用的分析方法是构建亲和图（KJ\
  \ 分析法），通常通过以下步骤完成：\n\n*   将各个独立问题写在便利贴上。\n*   统计每个问题出现的频率。\n*   将相似的问题进行分组。\n* \
  \  剔除重复的问题。\n*   根据趋势对问题再次进行分组。\n\n在此过程中，通常很容易发现趋势。有些问题可能频繁出现，或者某个问题是许多其他问题的根源。\n\
  \n在这个相当混乱的过程中，需要牢记的是，你正在绘制问题地图，而不是在寻找解决方案。作为开发者，很容易直接跳到构思解决方案的环节，但这并非当前的工作——而且它会干扰你进行深入分析的能力。\n\
  \n## 问题报告\n\n你希望如何向社区报告你的发现？传达可用性测试的结果并不总是容易的。我们在之前的测试中采用了以下方法：\n\n*   单一报告页面（重要发现、问题列表）\n\
  *   项目问题（描述特定问题）\n*   视频\n\n这里最重要的一点是，你始终要报告问题本身，而不是可能的解决方案。这是为了更清晰地区分这两种思维活动，并避免将解决方案当作绝对可行的方案来传达。\n\
  \n单一报告页面是对所学内容的整体概览，同时也是一个中心点，你可以从中跳转到各个具体问题和视频。传达具体问题的方法有很多种；例如，在 Drupal 6 核心测试中，我们描述了\
  \ 表 32–3 中所示的问题。\n\n**表 32–3.** *Drupal 6 核心测试问题*\n\n| **对象** | **观察结果** | **重要性**\
  \ |\n| --- | --- | --- |\n| 管理覆盖层 | 用户对管理界面覆盖了网站感到困惑。他们对 CMS 软件的认知模型是，管理界面和查看网站的界面是分开的。\
  \ | 严重 |\n\n通过使用一个简单的表格，我们能够传达大约 30 个已识别的问题，这些问题随后被转化为议题。\n\n本质上，报告就是将问题分解成你和模块贡献者可以处理的工作块。由于可用性测试很可能会暴露出大量问题，因此报告活动有助于你最终确定要处理哪些主要问题、采取何种策略，以及希望如何吸引其他开发者来处理那些容易解决的小问题。\n\
  \n## 来自问题队列的反馈\n\n当你的模块处于 beta 甚至 alpha 阶段时，很可能已经有人在尝试使用并通过问题队列给出反馈了。这些反馈对于改进你的模块至关重要，并且往往比测试等其他方法能促成更直接的交流。此外，无论你的模块处于哪个阶段，这种反馈都会持续不断地出现。\n\
  \n然而，始终要记住，这些反馈来自于那很小一部分、有能力和意愿通过提交问题来告知你情况的人。虽然这是一个重要的用户群体，但很可能这群用户的技术水平更高，并不一定能反映你的大部分用户所面临的问题。\n\
  \n理解某些反馈描述的是罕见边缘情况，还是实际上在讨论常见情况，这会很有帮助。贸然更改 UI 是有风险的；这些边缘情况往往会引发边缘情况界面元素的引入，从而可能使常见情况下的用户感到困惑。\n\
  \n## 发布：项目页面与文档\n\n当你发布模块后，还有一个步骤：为你的用户创建有用的项目页面和文档。面对如今众多的模块，找到正确的模块是一项艰巨的任务——对于那些不了解评估模块所有要点的人来说更是如此。可用性始于帮助你的潜在用户找到并评估你的模块。\n\
  \n### 你的模块是做什么的？\n\n人们问的首要问题是“你的模块是做什么的？”。我们来看看 Rules 模块是如何描述自己的。\n\n*   *Rules\
  \ 模块允许站点管理员根据发生的事件（称为响应式或 ECA 规则）定义有条件执行的 actions。它是核心中 trigger 模块的一个功能更丰富的替代品，也是\
  \ Drupal 5 的 Workflow-ng 模块的继承者。*\n*   *使用场景示例*\n*   *构建灵活的内容发布工作流变更*\n*   *发送自定义邮件以通知用户重要更新*\n\
  *   *创建自定义重定向、系统消息、面包屑导航以及更多功能*\n\n这是一个相当简洁的描述，说明了它的功能（触及一些有经验的 Drupal 用户熟知的细节），并给出了示例。很可能示例是最吸引人的部分，因为它们能让人们了解可以用这个模块做什么。\n\
  \n在你的项目描述顶部有一个清晰的描述来说明你的模块是做什么的，这看起来显而易见，但却是一个经常被忽略的步骤。\n\n另一个例子是 Pathauto 模块。\n\
  \n> Pathauto 模块可以自动为各种类型的内容（节点、分类、用户）生成路径别名，无需用户手动指定路径别名。这允许你获得类似 `/category/my-node-title.html`\
  \ 的别名，而不是 `/node/123`。这些别名基于一个管理员可以控制的“模式”系统。\n\n同样，简洁明了，并通过例子清楚地展示了功能。那么，你可以做些什么来改进这样的页面部分呢？以\
  \ Pathauto 的最后一个例子为例。一个浏览整个页面的用户可能会错过最重要的信息：那个清楚展示其功能的示例。重写这段内容可以像下面这样：\n\n> Pathauto\
  \ 模块可以自动为各种类型的内容（节点、分类、用户）生成路径别名，无需用户手动指定路径别名。\n> \n> 示例：\n> \n> 将 [`www.example.com/node/123`](http://www.example.com/node/123)\
  \ 转换为 [`www.example.com/category/my-page-title.html`](http://www.example.com/category/my-page-title.html)\n\
  > \n> 这些别名基于一个管理员可以控制的“模式”系统。\n\n理想情况下，你的项目页面应该尽可能简短，当需要解释特定错误或常见问题时，再将用户引导至其他手册。\n\
  \n项目页面的一个常见结构如下：\n\n* 概述\n* 功能特性\n* 系统要求\n* 已知问题\n* 教程\n* 捐赠\n* 贡献者\n* 推荐模块\n\n\
  关于如何制作一个可用的项目页面，更详细的描述请参阅 Lisa Rex 在 `growingventuresolutions.com/blog/module-owners-how-make-your-module-description-useful`\
  \ 上发表的文章。\n\n\n\n"
- "# 文案撰写\n\n打造更易用界面最快捷有效的方法就是写好文案。在多数情况下，文字本身就是界面。在`Drupal 6`中，我们见识了糟糕描述带来的影响：它们往往多余且不切合当前任务。这曾是`Drupal`大多数界面存在的严重问题，因此到了`Drupal\
  \ 7`，几乎所有描述和标签都经历了大改，优化为贴合当前任务和用户认知。\n\n在`Drupal 6`的一次可用性测试中就有这样的案例。一位聪明且精通网络的参与者被要求将她的部分内容分类。她确实很快就找到了分类页面，但随即又不敢确定自己是否来对了地方。于是她开始阅读页面顶部非常冗长的帮助文本。这段文本令她困惑不已，最终她离开了页面。\n\
  \n这里至少凸显出三个问题。\n\n* 帮助文本未能提供足够线索让参与者确认自己身处正确位置。\n* 即便是一大段帮助文本，起初也会被用户忽略。\n* 帮助文本越多，页面中可操作的部分就越会被挤到边缘视野。\n\
  \n`Drupal`中许多描述之所以错误，是因为它们试图提供过多信息——从概念本身、应用场景，到页面上的交互操作。信息一多，往往最重要的部分——概念——反而被淹没了。例如，看看`Drupal\
  \ 6`中分类页面的描述。\n\n> *“分类模块允许您使用标签和管理员定义的术语对内容进行分类。它是一个灵活的、具有许多高级功能的内容分类工具。首先，创建一个‘词汇表’来容纳一组术语或标签。您可以创建一个自由标记词汇表来管理所有内容，或者创建独立的受限词汇表来定义内容的各种属性，例如‘国家’或‘颜色’。*\n\
  > \n> *使用下方列表配置和审阅您站点上定义的词汇表，或者列出并管理它们包含的术语（标签）。一个词汇表可以选择性地绑定到特定内容类型（如类型列所示），如果绑定，则在创建或编辑该类型文章时会显示该词汇表。多个词汇表绑定到同一内容类型时，将按下方显示的顺序排列。若要更改词汇表顺序，请抓住名称列下的拖放手柄并将其拖到列表中的新位置。（通过单击并按住鼠标悬停在手柄图标上即可抓住手柄。）请记住，在您点击页面底部的保存按钮之前，更改不会生效。”*\n\
  \n第一段解释了概念，第二段则说明了这个页面的作用、词汇表可以绑定到什么位置，以及如何使用页面上的交互操作。在修改这段描述的过程中，我们确立了以下原则：\n\n\
  * 我们需要解释术语和词汇表的概念；当用户思考如何对内容分类时，这个概念往往对他们来说是陌生的。\n* 我们应该避免解释如何使用页面上的交互操作以及它在其他地方会产生什么效果；这些应当通过交互本身一目了然。\n\
  * 我们应该引入用户在对内容分类时熟悉的概念。\n\n基于这些思考，我们将描述重写如下：\n\n> *“分类用于对内容进行分类。术语分组归入词汇表。例如，一个名为‘水果’的词汇表将包含‘苹果’和‘香蕉’这两个术语。”*\n\
  \n正如你所见，这要切题得多。它首先确认了分类确实是用来对内容进行分类的，接着用一个例子清楚地说明了词汇表是如何用来容纳术语的。\n\n下一步是用户验证。新描述会引起困惑还是真正帮助了用户？我们进行了多次可用性测试，该页面是其中的一个环节。绝大多数阅读了这段文本的用户都理解了分类的用途以及词汇表和术语之间的关系。\n\
  \n"
- "# 无用文案的成因\n\n退一步看，是什么导致了`Drupal`及其贡献模块中出现如此多无用的文案？\n\n* **不聚焦于当前任务**：用户总是严格以任务为中心。为了实现目标，他们知道页面只是其中一步；因此，只有在确实必要时才会阅读描述。\n\
  * **对用户的错误态度**：我们很少能看到那种听起来轻松且对用户充满信心的文字。相反，大量文本试图说教，并且假设用户不关心。从我们写“请注意”、“警告”等字眼的频率中就能看出这一点。对用户说教从来不是好事。\n\
  * **开发者文档渗透到用户界面**：描述常常试图解释技术概念，从界面中“节点”一词的使用，到解释某些性能选项的影响等等。\n* **为糟糕的界面打补丁**：我们经常看到一些描述试图弥补难用的界面。当你发现自己不得不撰写描述来解释页面上的各个部分时，说明你创造了一个不流畅的交互。\n\
  * **不了解用户从何而来**：你的界面很少是他们进入`Drupal`后首先看到的内容，所以要思考他们从哪里来，要到哪里去。这将为你需要解释的内容划定界限。\n\
  * **措辞不够清晰**：界面中的文案应力求简洁。应当使用主动语态，去掉所有不必要的词语，以及那些本可以用简短词汇替代的长词。用“现在”代替“当前”之类的快速改进，有助于让你的写作更清晰。\n\
  \n当用户未能理解一段描述的含义时，他们通常会自责；他们会回头重读一遍，或者干脆无视继续操作。作为界面开发人员，你需要化身为作家，用极具清晰度和意义的方式遣词造句。反复修改你的文案，直到你想要表达的意思完全清楚为止。\n\
  \n就像好的设计一样，好的文案绝非偶然。它通常来自一个反复打磨、不断修改的过程。\n\n\n\n#### 原则\n\n以下列出的原则是我们用于 Drupal 7\
  \ 核心的原则。显然，写作时还需要应用更多原则，例如正确的拼写、语法和语气。\n\n- **使用主动语态**：主动语态强调主语执行某个动作；被动语态则强调动作已完成。例如，\"\
  用户创建内容\"（主动），\"内容由用户创建\"（被动）。此原则适用于 Drupal 中我们希望引导用户执行特定操作的大部分文本。\n- **聚焦当前任务**：描述或标签应仅针对当前任务，不应涉及任何前置或后续任务。\n\
  - **清晰优先于精确**：程序员的天性是追求尽可能精确；但在文案撰写中，这通常意味着冗长、密集且非常复杂的句子。请始终将清晰置于精确之上。你的精确表述很可能无法被用户理解，而你最重要的观点也会被忽略。当你需要解释它如何影响不同使用场景时，最好引用文档说明。\n\
  \n在更技术性的模块（如 Drupal 7 的字段界面，它本质上是一个用于设置数据库表的接口）中，你会更频繁地遇到这个问题；其文案对于熟悉数据库概念并能有效使用的人而言足够精确。然而，这意味着任何不完全熟悉数据库概念的人都无法以易于理解的方式获取所需信息。\n\
  \n- **先砍掉 50%；再砍掉 50%**：在写作过程中，尤其是当你整合其他人的反馈时，很容易将文本扩充成一大段。许多作家使用的一个技巧是不断砍掉文本的大部分内容；这迫使你舍弃那些精心雕琢但未能传达含义的句子。关键在于不断评估文本中的每个单词是否都有其作用。你会惊讶地发现，仅仅通过通读并删减文本，就能大幅度改善界面。前面提到的\"\
  分类\"页面经历了多次修订；在 Drupal 7 的生命周期中，它从内容过多，到内容过少（无法传达含义），再到恰到好处，历经多次变化。你可能需要将一句话重写三遍、四遍，甚至十遍才能写对；写对这句话将为许多模块用户节省大量时间。\n\
  - **仅在需要时添加描述**：这听起来显而易见，但在 Drupal 6 中，我们花了很大力气才移除所有那些描述要么是重复上面的标签，要么是几乎没有增加额外含义的地方。\n\
  \n如果你能在标签中增加两三个额外的单词，从而让描述变得多余，那最好这样做。我们强烈推荐模块维护者避免在表单中添加任何描述；这是一个好习惯，因为它意味着你的标签本身就足够具有描述性。\n\
  \n- **与核心术语保持一致**：Drupal 7 中应用了许多现有的文本模式，从我们标记菜单项、按钮和链接的方式，到单复数的正确使用方式。在编写界面文本时，请将你的工作与\
  \ Drupal 核心中的类似界面进行比较。这有助于你在术语和语气上保持一致性。\n\n在 Drupal 核心中，我们还有一些避免使用的词汇，这些词汇列在表 32–4\
  \ 中。\n\n**表 32–4.** Drupal 核心中避免使用的词汇\n\n| **不要用** | **请用** | **原因** |\n| --- |\
  \ --- | --- |\n| Drupal | 站点 | 这会使发行版变得复杂。 |\n| 请 | - | 听起来咄咄逼人；通常可以省略这个词。 |\n|\
  \ 我们 | 用户、管理员，明确指明某人 | \"我们\"常常无法明确说明适用于哪个用户，因此请具体指明受此影响的人。 |\n| 节点 | 内容、单篇内容 |\
  \ \"节点\"对用户来说是一个未知概念。 |\n| 帖子 | 单篇内容 | \"帖子\"可用作动词；\"帖子\"可能与其他概念混淆。 |\n| 输入格式 |\
  \ 文本格式 | 词语\"文本\"能更好地触发用户的心理模型。 |\n| 插件、扩展 | 模块 | 这些词可能有其他含义。 |\n\n希望你现在已经准备好为用户体验进行设计，并帮助\
  \ Drupal 变得更好！\n\n![images](img/square.jpg) 提示 请访问 `dgd7.org/ux` 获取本章提及的资源链接（以及更多内容），并跟踪\
  \ Drupal 用户体验方面的持续发展。\n\n## 第 33 章\n\n![images](img/squ.jpg)\n\n## 完成一个站点：另外的 90%\n\
  \n**作者：Benjamin Melançon**\n\n> *侯世达定律：\"即使你考虑了侯世达定律，它花费的时间总是比你预期的要长。\"*\n\n你已经构建了内容类型、视图、区块和菜单（如果还没有，请返回第\
  \ 1 章）。你还做了更多类似的工作以及大量其他配置（参见第 8 章）。你制作了一个自定义主题（参见第 15 章和第 16 章）。这个站点毫无疑问已经完成了 90%。只不过最后的\
  \ 10%很可能会花费你与之前投入相同的时间。完成一个站点通常意味着大量的反复调整和精益求精，直到所有功能和外观都达到完美。\n\n如果这个站点具有高知名度，并且必须看起来很棒且易于使用，那就继续努力，直到像歌里唱的那样，\"\
  你\"已经完成了所有需要完成的事情。\n\n本章将涉及高级配置，但主要是使用粘合代码来为 `DefinitiveDrupal.org` 站点增添自定义功能和改进用户体验（粘合代码是指为满足特定站点需求而编写的主题函数或模块；有关此方法的完整介绍，请参见第五部分\"\
  后端开发\"，特别是第 22 章）。你甚至将看到一个为该站点构建但已足够通用而贡献给 `drupal.org` 的衍生模块。\n\n本章*不*涉及主题制作。关于完成站点的这一关键部分，请参见第\
  \ 15 章和第 16 章，以及 `DefinitiveDrupal.org` 主题本身。Jacine Luisi 正在将该主题作为独立项目贡献给社区，其现成的生产版本也包含在站点的源代码中。请访问\
  \ `dgd7.org/theme` 和 `dgd7.org/code`。\n\n![images](img/square.jpg) **注意** 与本章相关的在线资源和讨论请访问\
  \ `dgd7.org/other90`。\n\n\n\n### 创建视图模式\n\n视图模式（在 Drupal 6 中称为构建模式）在第 8 章中曾提及，它们根据上下文改变内容或其他站点实体的显示方式，这一功能依然强大。在`DefinitiveDrupal.org`上，作者简介的独立页面使用“完整内容”视图模式（该模式继承“默认”视图模式的显示设置），而作者列表视图之一则使用“摘要”视图模式。然而，当作者简介显示在章节内容中时，最好能有另一种更精简的作者简介内容显示方式。\n\
  \n这时就需要借助视图模式的魔力。代码清单 33–1 中的代码放在一个名为 `dgd7glue.module` 的模块文件中；该代码改编自 Benjamin Doherty\
  \ 在佛罗里达 DrupalCamp 上所做的演示，随后发布在其 GitHub 账户 `github.com/bangpound/fldrupalcamp-demo`\
  \ 上。第一个函数定义了一个视图模式；直觉上可能认为这需要实现 `hook_entity_info_alter()`，但一旦你掌握了方法，这并不困难。\n\n\
  ***代码清单 33–1.** 为节点定义一个新的构建模式“紧凑”*\n\n```\n<?php\n/**\n * 实现 hook_entity_info_alter()。\n\
  \ *\n * 为节点实体揭示新的视图模式。如果你在字段用户界面的“管理显示”屏幕上看不到你的视图模式，\n * 可能需要多次清除缓存或重建菜单，直到它出现。\n\
  \ */\nfunction dgd7glue_entity_info_alter(&$entity_info) {\n  $entity_info['node']['view\
  \ modes']['compact'] = array(\n    'label' => t('Compact'),\n    'custom settings'\
  \ => FALSE,\n  );\n}\n\n/**\n * 实现 hook_preprocess_node()。\n *\n * 专门为视图模式添加类和主题钩子建议。\n\
  \ */\nfunction dgd7glue_preprocess_node(&$vars) {\n  $view_mode = $vars['view_mode'];\n\
  \  $vars['classes_array'][] = 'node-' . $view_mode;\n  $type = $vars['type'];\n\
  \  $vars['theme_hook_suggestions'][] = 'node__' . $type . '__' . $view_mode;\n}\n\
  ```\n\n第二个函数，`hook_preprocess_node()` 的实现，并不是使用视图模式的必要条件，但它是一个极佳的主题辅助工具。例如，向 `classes_array`\
  \ 添加内容，使得 CSS 可以通过寻找 `node-compact` 类来定位使用“紧凑”视图模式显示的内容。向 `theme_hook_suggestions`\
  \ 数组添加内容，则允许主题开发者复制 `node.tpl.php` 并重命名为例如 `node--profile--compact.tpl.php` 或 `node--article--teaser.tpl.php`，然后进行修改，这些修改仅影响以紧凑模式显示的简介内容或以摘要模式显示的文章内容。后面会介绍如何使用主题钩子建议为视图模式创建自定义模板。\n\
  \n![images](img/square.jpg) **注意** 由于 `hook_preprocess_node()` 也可以在主题的 `template.php`\
  \ 文件中实现，因此为视图模式使用主题钩子建议的能力可能已经在那里添加了。\n\n在编写或修改预处理函数时（如同在 Drupal 中的许多其他地方），你可以使用调试器或调试函数将输出打印到屏幕上。`hook_preprocess_node()`\
  \ 可用的变量集通常太大，`debug()` 无法优雅处理，因此建议安装 Devel 模块并使用增强的 Krumo 调试输出函数，例如 `kpr()`。\n\n\
  在 `hook_preprocess_node()` 的实现中使用 `kpr($vars);` 会在你显示的每个节点上运行，因此不建议在模块中包含变量打印代码时查看节点列表。同时请记住，你需要安装并启用\
  \ Devel 模块才能使用 `kpr()`。预处理函数可以完成*很多*工作。作为规则，你在预处理函数中更改或添加的任何内容，都将在相应的主题函数或模板中可用。在\
  \ `hook_preprocess_node()` 的变量数组中添加的内容，例如 `$vars['current_time'] = date('Y M d H:m:s',\
  \ time());`，将在 `node.tpl.php`（及其所有变体，包括 `node--article.tpl.php` 和现在可用的 `node--article--teaser.tpl.php`）中以\
  \ `$current_time` 的形式提供，可使用 `print $current_time;` 输出，对于渲染数组变量则使用 `print render($complex);`。你将在本章后面看到更多预处理函数的用法。\n\
  \n![images](img/square.jpg) **注意** 代码清单 33–1 中的代码需要放在名为 `dgd7glue.module` 的文件中，该文件应放在名为\
  \ `dgd7glue` 的文件夹中，该文件夹可以放在你网站的 `sites/all/modules/custom/` 目录下。然后你的自定义模块还需要一个 `.info`\
  \ 文件，`dgd7glue.info`（见代码清单 33–2），它应与 `dgd7glue.module` 一同放在 `dgd7glue` 文件夹中。（如何制作模块在第\
  \ 18 章至第 20 章中有详尽介绍，而创建站点特定模块的目的与本例相同，则在第 22 章中介绍。）\n\n***代码清单 33–2.** dgd7glue.info*\n\
  \n```\nname = DGD7 Glue Code\ndescription = [dgd7glue] 针对 DefinitiveDrupal.org 的站点特定自定义代码。\n\
  package = Custom\nversion = 7.x-1.0\ncore = 7.x\n```\n\n![images](img/square.jpg)\
  \ **注意** 版本指令仅包含在内，因为此站点特定代码不会托管在 `drupal.org` 上；对于贡献的代码，d.o 打包脚本会自动添加该行。\n\n现在——在启用\
  \ DGD7glue 模块后，或者如果已启用，则清除缓存（很可能不止一次）——你可以访问某个内容类型的“管理显示”标签页，例如 管理 ![images](img/U001.jpg)\
  \ 结构 ![images](img/U001.jpg) 内容类型 ![images](img/U001.jpg) 作者简介 ![images](img/U001.jpg)\
  \ 管理显示 (`admin/structure/types/manage/profile/display`)，然后看到在折叠的表单集 **自定义显示设置**\
  \ 中，有一个新的视图模式：紧凑（见图 33–1）。\n\n![images](img/3301.jpg)\n\n***图 33–1.** 用于启用视图模式自定义显示设置的复选框，现在新增了“紧凑”选项*\n\
  \n![images](img/square.jpg) **提示** 如果你希望为新视图模式自动启用所有内容类型的自定义设置（就像摘要那样），可以在 `hook_entity_info_alter()`\
  \ 实现中，将 `$entity_info['node']['view modes']['viewmodename']` 数组中的 `custom settings`\
  \ 行改为 `'custom settings' => TRUE,`。使用这种方法，它可能一开始没有显示任何字段。\n\n![images](img/3302.jpg)\n\
  \n***图 33–2.** 在“管理显示”标签页中可见的新视图模式“紧凑”*\n\n转到图 33–2 中所示的“紧凑”子标签页，并配置当使用紧凑视图模式时应显示的字段。你可以让它显示作者的头像（作为缩略图并链接到其内容）；将\
  \ `drupal.org` 用户 ID 显示为账户链接；以及简介文本，截断至仅 300 个字符。隐藏所有其他字段。\n\n接下来，转到“章节”内容类型并管理其字段的显示。你也可以为其紧凑显示模式设置自定义设置，但当前的目标是让它的节点引用“作者”字段使用紧凑视图模式来显示作者简介。对于“作者”字段，格式选项可能是一个下拉菜单，包含“标题（链接）”、“标题（无链接）”、“渲染节点”和“<隐藏>”。选择“渲染节点”，然后点击下拉菜单右侧的齿轮图标，为“作者”字段的渲染节点配置设置。在这里你可以选择“紧凑”作为视图模式（见图\
  \ 33–3）。\n\n![images](img/3303.jpg)\n\n***图 33–3.** 在章节内容上显示作者简介时使用紧凑视图模式。这是通过“章节”内容类型在其默认视图模式的“管理显示”页面中设置的。*\n\
  \n下一节将介绍如何为主题化你的视图模式。\n\n\n\n### 创建自定义主题模板\n\n为自己定义的模板钩子建议创建自定义模板文件的过程，与为核心提供的模板建议创建自定义模板文件完全相同。许多建议（例如基于内容类型的建议）都是内置的。要为所有作者个人资料使用自定义模板文件，你需要在主题中创建一个\
  \ `node--profile.tpl.php` 文件（其中 *profile* 是作者个人资料内容类型的机器名称）。下面，你将对你创建的、同时识别内容类型和显示模式的模板钩子建议执行相同操作。\n\
  \n1. 确保你的自定义主题文件夹（或主题文件夹内的 `templates` 子目录）中有一个 `node.tpl.php` 文件。除非你的主题中包含基础模板的版本，否则\
  \ Drupal 无法识别你的模板变体。\n2. 复制此 `node.tpl.php` 文件，使其匹配你想要使用自定义模板的模板建议模式。对于之前定义的模板钩子建议，该模式为\
  \ `node__content_type__view_mode`。在模板文件中，下划线会替换为短横线，因此它看起来像 `node--content-type--view-mode.tpl.php`。对于采用紧凑显示模式的作者个人资料，这将是\
  \ `node--profile--compact.tpl.php`。\n3. 修改此文件以满足你的主题需求。\n\n![images](img/square.jpg)\
  \ **注意** 在 Drupal 7 中，你需要使用两个短横线（或函数中的下划线）来分隔建议的每个部分。在 Drupal 6 中，你只需要一个——正如你从 `node--content-type--view-mode.tpl.php`\
  \ 示例中可能猜到的那样。使用两个短横线可以避免在处理机器名称中包含下划线的内容类型时产生混淆。\n\n`代码清单 33–3` 展示了修改后的节点模板文件（你可以在源代码中查看原始文件，即你复制的\
  \ `node.tpl.php`，以及 `api.drupal.org/api/modules--node--node.tpl.php`）。如前所述，该文件是\
  \ `node--profile--compact.tpl.php`。在你的主题中，它位于 `templates` 文件夹内。前三行是关于如何了解可用变量的方法；在用于正式站点之前应将其删除。\n\
  \n![images](img/square.jpg) **警告** `代码清单 33–3` 中的代码使用了 Devel 模块提供的一个函数——如果你还没有下载并启用该模块，则需要执行此操作，或者使用\
  \ Drupal 核心函数（如 `debug()`）或 PHP 函数（如 `print_r()`）替代。Devel 的 `dpm()` 和核心的 `debug()`\
  \ 都会将输出发送到 Drupal 的消息区域；Devel 的 `kpr()` 和 PHP 的 `print_r()` 默认直接在其所在位置打印输出，这适用于模板文件和预处理函数。\n\
  \n**代码清单 33–3.** 以紧凑显示模式展示作者个人资料的自定义节点模板\n\n```\n<?php\n  kpr($content);\n?>\n<div\
  \ id=\"node-<?php print $node->nid; ?>\" class=\"<?php print $classes; ?> clearfix\"\
  <?php print $attributes; ?>>\n  <?php print render($content['field_image']); ?>\n\
  \  <div class=\"author-info\">\n    <h3<?php print $title_attributes; ?>><a href=\"\
  <?php print $node_url; ?>\"><?php print $title; ?></a></h3>\n\n    <?php\n     \
  \ // 我们隐藏评论和链接。应该没有任何评论和链接。\n      hide($content['comments']);\n      hide($content['links']);\n\
  \      print render($content);\n    ?>\n  </div>\n</div>\n```\n\n此模板移除并重新排列了一些标记，并添加了一个\
  \ `div`，但它所做的最重要的事情是使用 `print render($content['field_image']);` 这一行在节点标题（作者姓名）之前打印作者头像。请注意，当使用\
  \ `render()` 打印其余内容时，图像不会再次打印。所有这些内容将在第 15 章和第 16 章中解释。\n\n`代码清单 33–3` 中的模板生成的 HTML\
  \ 与 `代码清单 33–4` 中显示的配套 CSS 配合使用，该 CSS 主要通过 Firebug 实验开发而成（参见 `getfirebug.com`）。\n\
  \n**代码清单 33–4.** 主题目录中 style.css 的补充内容，利用新的显示模式和自定义模板对紧凑作者个人资料进行主题化\n\n```\n/**\n\
  \ * 紧凑作者个人资料。\n */\n.node-compact .field {\n  padding: 0;\n}\n\n.node-compact .field-name-field-image\
  \ {\n  position: absolute;\n}\n\n.node-compact .author-info {\n  margin-left: 130px;\n\
  }\n```\n\n绝对定位之所以有效，是因为 `.node` div 已被定义为 `position: relative`。总的来说，这使得页面看起来相当不错，如图\
  \ 33–4 所示。\n\n![images](img/3304.jpg)\n\n**图 33–4.** 附加到章节的两个作者个人资料，采用紧凑显示模式和 CSS\
  \ 样式\n\n![images](img/square.jpg) **提示** 创建模板文件永远不应该是你的首选；随着情况变化，它们最难维护。其他方法，例如通过\
  \ CSS 设置样式、通过 Drupal 用户界面进行配置以及操作预处理函数中的变量，通常可以为你提供所需的所有灵活性。\n\n请记住，仅使用 CSS（尤其是当显示模式添加到节点主体类时）就可以实现很多效果，然后通过预处理函数甚至可以更进一步，而无需创建节点模板，因为当对内容类型进行更改时，维护节点模板可能需要大量工作。正如第\
  \ 15 章和第 16 章所述，虽然你可以实现 `theme_node__suggestion()` 或 `node--suggestion.tpl.php`，但没有与这些等效的\
  \ `hook_preprocess_node__suggestion`。相反，你可以使用 `hook_preprocess_node()` 实现中提供的众多变量来检查一个或两个变量的值，例如内容类型（在\
  \ `$vars['type']` 中）或显示模式（在 `$vars['view_mode']` 中），以决定是否要修改任何其他变量。（注意：`$vars` 可以是\
  \ `$variables` 或你在实现 `hook_preprocess_node()` 时放在括号中的任何内容，并且还要注意，所有这些同样适用于 `hook_preprocess_page()`、`hook_preprocess_comment()`\
  \ 等。这些钩子可以在模块或主题中使用，并在第 15 章和第 16 章中进行了介绍。）\n\n![images](img/square.jpg) **注意**\
  \ `代码清单 33–3` 中的模板看起来很简洁，并且适用于你的目的，但是当 Drupal 打印它时，会分别为 `field`、`field-items` 和\
  \ `field-item` 生成一个 `div`。这对于一致性非常有利：无论是一个单值字段还是包含五十个项目的字段，都将应用相同的 CSS。如果这影响了你的审美或干扰了你的设计，你可以更改围绕字段的输出。采用与在\
  \ `hook_preprocess_node()` 中提供模板钩子建议直接类似的方法，你可以通过实现 `hook_preprocess_field()` 为字段提供模板钩子建议。参见\
  \ `dgd7.org/222`。\n\n\n\n### 修改章节编号字段的显示\n\n如前所述，您还可以在字段输出前使用预处理函数来修改它们。章节编号/附录字母字段被设定为只能接受两个字符。目前\
  \ Drupal 不允许调整文本字段的尺寸（尽管某些模块可以覆盖此限制，甚至可能安全地做到；请参阅 `dgd7.org/226`），因此您必须提供一个代码解决方案，而原本或许可以让用户直接输入诸如“第\
  \ 1 章”之类的内容。好消息是，当然有可能实现一个优雅的代码解决方案。\n\n按照惯例，您可以首先查阅相关的 API 函数（例如 `template_preprocess_field()`），并且最有效的方法是，在继续使用同一自定义模块的同时，打印出您的\
  \ `hook_preprocess_HOOK()` 实现（此例中为 `dgd7glue_preprocess_field()`）中可用的变量。\n\n![images](img/square.jpg)\
  \ **注意** 各种预处理钩子被视为 `hook_process_HOOK()`（请参阅 `api.drupal.org/hook_process_HOOK`）的特殊情况，并且目前没有其独立的\
  \ API 文档。\n\n您也可以在主题的 `template.php` 文件中实现预处理钩子；使用您的主题名作为前缀，而不是模块名（请参阅列表 33-5）。\n\
  \n***列表 33-5.** 使用 Krumo 显示 `hook_preprocess_field()` 实现中所有可用数据*\n\n```\nfunction\
  \ dgd7glue_preprocess_field(&$vars) {\n  kpr($vars);\n}\n```\n\n![images](img/square.jpg)\
  \ **提示** 使用 Drupal 消息系统进行调试的函数（包括 `debug()` 和 Devel 模块的 `dpm()`），在预处理函数内部运行时，其功能可能不一致。在页面构建、渲染和主题化周期中，此时直接从这些函数打印输出是可行的，因此对于小型数组使用\
  \ `print_r()`，对于大型数组和对象使用 `krumo()`（需启用 Devel 模块）效果很好。列表 33-5 中展示的 `kpr()` 函数将对数组使用\
  \ `krumo`，并以标量形式打印变量。\n\n通过 `krumo`（即 Devel 模块的 `kpr()`），您可以看到给定字段的变量以一种高度可读的结构呈现。它一开始会折叠所有子数组和子对象；您可以单击展开感兴趣的部分。在图\
  \ 33-5 中，*element* 变量被展开；您可以看到它提供了非常有用的信息，例如 `#field_name` 中的字段名、`#view_mode` 中的视图模式，以及\
  \ `#bundle` 中的内容类型。*element* 变量是为渲染 API 层设计的（请参阅附录 C），它只是在预处理过程所在的主题化层面的信息，但这些信息非常有用。\n\
  \n其余变量是您可以在预处理函数中更改的；特别是完全展开的 *items*，您可以在此处更改字段输出的值，当前值为 `29`。*items* 的多层数组嵌套在代码中对应于\
  \ `$vars['items'][0]['#markup']`。\n\n![images](img/3305.jpg)\n\n***图 33-5.** Krumo\
  \ 输出，即查看一个包含“数字”字段的节点页面时，为 `hook_preprocess_field()` 的实现调用 `kpr($vars);` 的结果。*\n\
  \n我会再次提及这一点，因为它将为您节省大量猜测修改为何不生效的时间。用于决定何时以及如何采取行动的可读信息位于 *element* 变量中；而您可以修改以影响字段显示的数据位于\
  \ *items* 和其他变量中。\n\n![images](img/square.jpg) **易错点** element 数组中的任何值都不会产生效果。只有\
  \ `$vars['items'][0]['#markup']` 能改变字段输出的值（针对字段的第一个值；第二个值将位于索引 1 而非 0 的位置）。如果不在这里读到，我不知道您如何能知道这一点。我当初就是花了几个小时琢磨为什么修改诸如\
  \ `$vars['element']['#items'][0]['safe_value']` 这样的变量毫无效果。请参阅 `dgd7.org/225`，了解那段有趣旅程的一些摘录。\n\
  \n综合这些信息，您可以编写预处理函数的代码，来检查是否是您关心的字段和内容类型（bundle），为数字打印“第”，为字母打印“附录”，并进一步检查视图模式，以便在紧凑视图模式下打印更短的文本。\n\
  \n列表 33-6 中代码的最终结果是：在查看本章节节点时（位于 `dgd7.org/other90`），打印 **第 33 章** 而不是 **33**；在查看附录\
  \ C 时（位于 `dgd7.org/render`），打印 **附录 C** 而不是 C；并且在紧凑列表（如 `dgd7.org/chapters`）中显示时，则打印\
  \ **Ch 33** 和 **App C**。\n\n***列表 33-6.** 实现 `hook_preprocess_field()`，将数字或字母分别转换为文本“Chapter\
  \ [number]”或“Appendix [letter]”，并对紧凑视图模式使用简短形式*\n\n```\n/**\n * 实现 hook_preprocess_field()。\n\
  \ */\nfunction dgd7glue_preprocess_field(&$vars) {\n  if ($vars['element']['#field_name']\
  \ == 'field_number'\n      && $vars['element']['#bundle'] == 'book') {\n    $v =\
  \ $vars['items'][0]['#markup'];\n    if (is_numeric($v)) {\n      if ($vars['element']['#view_mode']\
  \ == 'compact') {\n        $v = t('Ch !n', array('!n' => $v),\n          array('context'\
  \ => '第（Chapter 的缩写）'));\n      }\n      else {\n        $v = t('Chapter !n', array('!n'\
  \ => $v));\n      }\n    }\n    else {\n      // 不是数字，因此是附录。\n      if ($vars['element']['#view_mode']\
  \ == 'compact') {\n        $v = t('App !n', array('!n' => $v),\n          array('context'\
  \ => '附录（Appendix 的缩写）'));\n      }\n      else {\n        $v = t('Appendix !n',\
  \ array('!n' => $v));\n      }\n    }\n    $vars['items'][0]['#markup'] = $v;\n\
  \  }\n}\n```\n\n作为编码者，您可以通过预处理函数完全控制字段输出。也可以通过对字段格式化器进行编码，为网站管理员提供更改字段显示方式的能力，这将在下一部分介绍。\n\
  \n\n\n"
- "# 使用字段格式化程序链接到 Drupal.org 和 Twitter 账户\n\n正如第 8 章中所构建的，作者个人资料包含了用于连接到其他特定网站的字段：一个\
  \ `drupal.org` ID、一个 `groups.drupal.org` ID 以及一个 Twitter 用户名。前两个 ID 被设置为整数字段，而用户名则被设置为纯文本字段。将这些数据转换为可读（且可点击）链接的任务被推迟到了这里进行。幸运的是，制作字段格式化程序是件有趣的事。\n\
  \n你已经见过格式化程序的实际应用，例如，在选择文本字段应显示为默认、纯文本或修剪格式时。要制作你自己的格式化程序，你可以直接查看 Drupal 自身的代码，或者在\
  \ `api.drupal.org` 上寻找答案。这次我们选择后者，访问 `api.drupal.org` 并点击“主题”链接，你会进入 `api.drupal.org/api/drupal/groups/7`，这是一个包含了大量已分组内容的列表——大约有两页之多——但\
  \ Field API 就在第一页。实际上，Field API 以某种形式被列出了八次（参见图 33–6）。\n\n![images](img/3306.jpg)\n\
  \n***图 33–6.** `api.drupal.org` 上列出的 Field API 主题*\n\n第一个列出的“Field API”链接到所有其他 Field\
  \ API 主题（在提供了大量关于字段的背景信息之后）。但正是最后一个列出的“Field Types API”才是你真正需要的：“定义字段类型、小部件类型、*显示格式化程序类型*、存储类型”（着重号为后加）。点击进入\
  \ `api.drupal.org/api/group/field_types`（这是可用的最短 URL；你会被重定向到长版本 URL），在钩子列表的底部，有两个被特别文档化了：\n\
  \n> *字段类型 API 还定义了两种可插入的处理程序：小部件和格式化程序，它们分别指定了字段在编辑表单[小部件]和显示实体[格式化程序]中的外观。小部件和格式化程序可以由字段类型模块为其自身的字段类型实现，也可以由第三方模块实现以扩展现有字段类型的行为。*\n\
  \n你可以通过一个模块来扩展现有字段类型的行为。所引用的钩子是 `hook_field_formatter_info()`，定义在 `api.drupal.org/hook_field_formatter_info`，并且它还提供了示例代码！你可以修改函数名中的模块名部分以及一些其他细节，并将其添加到胶水模块中（见代码清单\
  \ 33–7）。\n\n***代码清单 33–7.** `dgd7glue.module` 中 `hook_field_formatter_info()` 的基本实现*\n\
  \n```\n/**\n * 实现 hook_field_formatter_info()。\n */\nfunction dgd7glue_field_formatter_info()\
  \ {\n  return array(\n    'dgd7glue_number_account_link' => array(\n      'label'\
  \ => t('账户链接'),\n      'field types' => array('number_integer'),\n    ),\n    'dgd7glue_text_account_link'\
  \ => array(\n      'label' => t('账户链接'),\n      'field types' => array('text'),\n\
  \    ),\n  );\n}\n```\n\n清除缓存，然后访问一个包含文本或整数字段的字段显示管理页面，例如管理 ![images](img/U001.jpg)\
  \ 结构 ![images](img/U001.jpg) 内容类型 ![images](img/U001.jpg) 作者个人资料 ![images](img/U001.jpg)\
  \ 管理显示 (`admin/structure/types/manage/profile/display`) 下作者个人资料内容类型的“管理显示”页面，你会看到文本和整数字段的格式化程序选项中多了一个**账户链接**选项。目前它还没有任何功能，但它已经显示出来了！参见图\
  \ 33–7。\n\n![images](img/3307.jpg)\n\n***图 33–7.** 整数字段的账户链接格式化程序选项*\n\n如果你正在定义的两个格式化程序需要可配置，那么它们就需要一些设置。你可以从\
  \ Drupal 核心提供的文本和整数字段中获取格式化程序设置的示例。整数字段类型在数字模块中定义，该模块位于字段模块内部；数字模块的主文件位于 `modules/field/modules/number/number.module`。文本模块也位于字段模块内部。这两个模块定义的内容远不止格式化程序，但你只对其中各种格式化程序函数感兴趣：`hook_field_formatter_*()`\
  \ 的实现——包括 `info`、`settings_form`、`settings_summary` 和 `view`。\n\n![images](img/square.jpg)\
  \ **注意** 你可以使用 `hook_field_formatter_info_alter()` 为现有的文本和整数字段格式化程序添加设置，但要在字段数据周围添加链接需要其自身的格式化程序视图，因此需要一个新的格式化程序。\n\
  \n要向字段显示表单添加设置表单和设置摘要，你首先需要在你的 `hook_field_formatter_info()` 实现中添加默认设置；见代码清单 33–8。\n\
  \n***代码清单 33–8.** 为整数和文本字段的自定义账户链接格式化程序添加默认设置*\n\n```\n/**\n * 实现 hook_field_formatter_info()。\n\
  \ */\nfunction dgd7glue_field_formatter_info() {\n  return array(\n    'dgd7glue_number_account_link'\
  \ => array(\n      'label' => t('账户链接'),\n      'field types' => array('number_integer'),\n\
  \      'settings' => array('web_site' => 'drupal_org'),\n    ),\n    'dgd7glue_text_account_link'\
  \ => array(\n      'label' => t('账户链接'),\n      'field types' => array('text'),\n\
  \      'settings' => array('web_site' => 'twitter_com'),\n    ),\n  );\n}\n```\n\
  \n这提供了默认值，但管理员还没有办法更改这些默认值。你需要一个带选择列表的设置表单——一个具有预定义选项的表单元素。数字模块的字段格式化程序设置表单钩子实现中有一个选择列表元素，你可以从中借鉴（`api.drupal.org/number_field_formatter_settings_form`）。对于数字账户字段，此选择列表中的选项将是\
  \ `drupal.org` 和 `groups.drupal.org`；对于文本账户字段，选项则是 `twitter.com` 和 `identi.ca`。代码清单\
  \ 33–9 中的代码借鉴了数字表单结构和选择列表，并通过添加一个 `if` 语句，根据是数字字段的格式化程序还是文本字段的格式化程序来提供不同的选项。选择选项本身则被移到了辅助函数中。\n\
  \n***代码清单 33–9.** 文本和整数字段的账户链接格式化程序设置表单*\n\n```\n/**\n * 实现 hook_field_formatter_settings_form()。\n\
  \ */\nfunction dgd7glue_field_formatter_settings_form($field, $instance, $view_mode,\
  \ $form, &$form_state) {\n  $element = array();\n\n  $display = $instance['display'][$view_mode];\n\
  \  $settings = $display['settings'];\n\n  if ($display['type'] == 'dgd7glue_number_account_link')\
  \ {\n    $options = _dgd7glue_number_account_link_options();\n  }\n  else {\n  \
  \  // 字段类型为 dgd7glue_text_account_link。\n    $options = _dgd7glue_text_account_link_options();\n\
  \  }\n\n  $element['web_site'] = array(\n    '#title' => t('网站或服务'),\n    '#type'\
  \ => 'select',\n    '#options' => $options,\n    '#default_value' => $settings['web_site'],\n\
  \    '#required' => TRUE,\n  );\n\n  return $element;\n}\n\n/**\n * 为整数字段提供账户链接格式化程序选项。\n\
  \ */\nfunction _dgd7glue_number_account_link_options() {\n  return array(\n    'drupal_org'\
  \ => t('Drupal.org'),\n    'groups_drupal_org' => t('Groups.Drupal.org'),\n  );\n\
  }\n\n/**\n * 为文本字段提供账户链接格式化程序选项。\n */\nfunction _dgd7glue_text_account_link_options()\
  \ {\n  return array(\n    'twitter_com' => t('Twitter.com'),\n    'identi_ca' =>\
  \ t('Identi.ca'),\n  );\n}\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，为您提供以下中文翻译。\n\
  \n\n```markdown\n# Drupal 的 Field API 设置摘要\n\nDrupal 的 Field API 要求您提供所选设置的摘要。与其再次以数字字段为例，不如说明需要指出选择了哪个选项，这更接近于\
  \ `text.module` 的简单单行摘要（`api.drupal.org/text_field_formatter_settings_summary`）；请参见代码清单\
  \ 33–10。\n\n**代码清单 33–10. 所选设置的摘要**\n\n```\n/**\n * 实现 hook_field_formatter_settings_summary()。\n\
  \ */\nfunction dgd7glue_field_formatter_settings_summary($field, $instance, $view_mode)\
  \ {\n  $summary = '';\n\n  $display = $instance['display'][$view_mode];\n  $settings\
  \ = $display['settings'];\n\n  if ($display['type'] == 'dgd7glue_number_account_link')\
  \ {\n    $options = _dgd7glue_number_account_link_options();\n  }\n  else {\n  \
  \  // 字段类型为 dgd7glue_text_account_link。\n    $options = _dgd7glue_text_account_link_options();\n\
  \  }\n\n  $summary .= t('网站') . ': ' . $options[$settings['web_site']];\n\n  return\
  \ $summary;\n}\n```\n\n返回作者资料管理字段显示页面，为 Drupal ID 字段选择“账户链接”，并确认 `drupal.org` 和\
  \ `Groups.Drupal.org` 选项已经出现，以此来测试上述功能是否生效。\n\n![images](img/square.jpg) **注意：**\
  \ 如果未同时定义设置摘要钩子，则不会显示设置表单链接（齿轮图标）。\n\n代码清单 33–9 和 33–10 的初稿并没有为格式化器选项提供辅助函数。意识到\
  \ `dgd7glue_field_formatter_settings_form()` 和 `dgd7glue_field_formatter_settings_summary()`\
  \ 都应该使用选项的显示友好版本（例如，用 `'Drupal.org'` 代替 `'drupal_org'`），因此我们重构了代码，将选项放在它们各自的函数中。这样，设置表单函数和设置摘要函数都可以调用它们。（在代码中的两个地方重复信息是不好的做法；当需要修改某些内容时，您或下一个开发者很可能会漏掉其中一个地方。）事后看来，或许一个收集选项的辅助函数（而不是两个）会更简洁，并在其内部根据字段格式化器类型执行\
  \ `if` 或 `switch` 语句。然而，自定义代码的重点在于以一种可维护的方式在您的网站上执行有效且特定的操作，而不是为了追求优雅而无休止地重构。\n\n\
  ## 实现 `hook_field_formatter_view()`\n\n下一步是实现 `hook_field_formatter_view()`。在开发过程中，您可能希望查看调试器，或者在\
  \ `dgd7glue_field_formatter_view()` 中抛出一个 `debug($items)`，以准确地了解它接收到的项是什么，如代码清单\
  \ 33–11 所示。\n\n**代码清单 33–11. 用于调查传入内容的 `hook_field_formatter_view()` 实现**\n\n```\n\
  /**\n * 实现 hook_field_formatter_view()。\n */\nfunction dgd7glue_field_formatter_view($entity_type,\
  \ $entity, $field, $instance, $langcode,\n $items, $display) {\n  foreach ($items\
  \ as $delta => $item) {\n    debug($item);\n  }\n}\n```\n\n现在，查看一个对 `drupal.org`\
  \ ID 和 Twitter 账户都有值的作者资料页面，结果会输出到屏幕上。对于前者，一个数字字段：\n\n```\narray (\n  'value' =>\
  \ '64383',\n)\n```\n\n对于后者，一个文本字段项：\n\n```\narray (\n  'value' => 'mlncn',\n  'format'\
  \ => NULL,\n  'safe_value' => 'mlncn',\n)\n```\n\n知道了传入 `dgd7_field_formatter_view()`\
  \ 的项的结构，并且了解您刚刚定义的显示设置表单的结构，您就可以编写一个将两者结合起来的函数。\n\n![images](img/square.jpg) **注意：**\
  \ 如果您需要检查变量 `$display` 的结构，可以在调试器（参见 `dgd7.org/ide`）中查看，或者像上面处理 `$item` 那样，使用 `debug()`\
  \ 输出。\n\n代码清单 33–12 中的函数使用了一个 `switch` 语句来根据网站设置分配基础 URL（例如，对于 `drupal.org` 指定的字段，使用\
  \ [`http://drupal.org/`](http://drupal.org/)），并使用另一个 `switch` 语句来正确设置访问字段值的键。如上所示，`'value'`\
  \ 是整数字段唯一可用的属性。这是因为经过验证的整数字段本质上是安全的。Drupal 为文本字段提供了 `'safe_value'` 属性，因为您需要一个经过清理的版本来安全地打印它。用户输入的字符串可能包含恶意的\
  \ JavaScript 代码。\n\n**代码清单 33–12. 将账户 ID 显示为链接的 `hook_field_formatter_view()` 实现**\n\
  \n```\n/**\n * 实现 hook_field_formatter_view()。\n */\nfunction dgd7glue_field_formatter_view($entity_type,\
  \ $entity, $field, $instance, $langcode,\n $items, $display) {\n  $element = array();\n\
  \n  // 允许定义一个函数来获取账户链接标题。\n  $title_callback = NULL;\n  $item_key = 'safe_value';\n\
  \n  // 通常，视图格式化器会根据显示类型进行切换，但对于 dgd7glue 定义的\n  // 账户链接格式化器，重要的是网站。\n  switch ($display['settings']['web_site'])\
  \ {\n    case 'drupal_org':\n      $href = 'http://drupal.org/user/';\n      $title_callback\
  \ = 'dgd7glue_drupal_page_title';\n      break;\n    case 'groups_drupal_org':\n\
  \      $href = 'http://groups.drupal.org/user/';\n      $title_callback = 'dgd7glue_drupal_page_title';\n\
  \      break;\n    case 'twitter_com':\n      $href = 'http://twitter.com/';\n \
  \     break;\n    case 'identi_ca':\n      $href = 'http://identi.ca/';\n      break;\n\
  \  }\n\n  switch ($display['type']) {\n    case 'dgd7glue_number_account_link':\n\
  \      $item_key = 'value';\n      break;\n    default:\n      $item_key = 'safe_value';\n\
  \  }\n\n  foreach ($items as $delta => $item) {\n    if ($title_callback) {\n  \
  \    $title = $title_callback($item[$item_key], $href);\n    }\n    else {\n   \
  \   $title = $item[$item_key];\n    }\n    $href = $href .= $item[$item_key];\n\
  \    $element[$delta] = array(\n       '#type' => 'link',\n       '#title' => $title,\n\
  \       '#href' => $href,\n     );\n  }\n\n  return $element;\n}\n\n/**\n * 获取 Drupal\
  \ 站点上页面的标题。\n *\n * dgd7glue_field_formatter_view() 中账户链接标题的回调函数。\n */\nfunction\
  \ dgd7glue_drupal_page_title($account_id, $href) {\n  return $account_id;\n}\n```\n\
  \n上面的第一个 `switch` 语句根据字段显示设置中设置的网站提供了 URL 的基础部分，并可选地提供了一个标题回调函数来生成链接的文本部分。最后的那个函数\
  \ `dgd7glue_drupal_page_title()` 提供了这个回调。然而，如图所示，它只是一个占位符：它并没有执行您真正想让它做的事情。在下一节中，您将修改它，以便从\
  \ `drupal.org` 和 `groups.drupal.org` 的个人资料页面获取作者的用户名。\n\n主函数以一个 `foreach()` 语句（用于处理字段允许多个值的情况）结束，该语句构建要作为可渲染数组返回的元素。通过将\
  \ `'#type'` 设置为 `'link'`，Drupal 就知道要创建一个链接。（如附录 C 所述，返回渲染数组而不是 HTML 字符串，可以让其他 Drupal\
  \ 模块和主题有机会进行修改，例如添加一个 class 或 target 属性。）\n```\n\n\n\n"
- '# 获取用户名


  之前用到的 `dgd7glue_drupal_page_title()` 函数需要名副其实，即从 `drupal.org` 和 `groups.drupal.org`
  的用户个人资料页面中获取用户名。


  即便再疯狂的想法，在 Drupal 中也可能有人已经为你探过路了。就本例而言，这位先行者是 Kevin Hemenway，他更为人熟知的名字是 Morbus Iff。他开发的
  Bot 模块为 #drupal 以及其他 IRC 频道中的 Druplicon 提供了支持（参见第 9 章）。该模块可以配置为，当给定 Drupal 站点的 URL（例如
  [`http://example.com/node/523`](http://example.com/node/523)）时，神奇地获取该节点的标题。（对于 `drupal.org`
  上的议题，它还能获取项目、状态等信息。但对你当前的用例来说，有趣的是它能在没有特殊集成的情况下，抓取任意站点的标题。）


  知道了这一点，为何不执行 `drush dl bot` 呢？即便你并不打算使用它——只是看看它的代码（参见代码清单 33–13）。


  **代码清单 33–13.** `bot_project.module` 节选


  ```

  /**

   * 监听 URL 或数字 ID，并回复相关信息。

   *

   * @param $data

   *   IRC 库准备好的常规 $data 对象。

   * @param $from_query

   *   布尔值；表示是否是通过查询发起的请求。

   */

  function bot_project_irc_msg_channel($data, $from_query = FALSE) {

  // [与当前目的无关的代码未显示...]

        $result = drupal_http_request($url);

        if ($result->code != 200) { continue; }


        // 我们总是会显示标题，因此先抓取它以存入数据库。

        preg_match(''/<title>(.*?) \|.*?<\/title>/'', $result->data, $title_match);

        $title = $title_match[1] ? $title_match[1] : ''<'' . t(''无法确定标题'') . ''>'';

  // ...

  ```


  代码中充斥着模块作者 Morbus 的告诫，指出这并不是最佳做法——但它确实能用。你可以直接采用它，如代码清单 33–14 所示。


  **代码清单 33–14.** 从 `drupal.org` 用户页面标题（或任意 `drupal.org` 页面标题）中抓取用户名的函数


  ```

  /**

   * 获取 Drupal 站点的页面标题。

   *

   * dgd7glue_field_formatter_view() 中账号链接标题的回调函数。

   */

  function dgd7glue_drupal_page_title($account_id, $href) {

    $result = drupal_http_request($url);

    // 如果无法获取标题，则使用 $account_id 作为标题。

    if ($result->code != 200) {

      return $account_id;

    }

    // 从页面的 HTML 源码中提取标题的第一部分。

    preg_match(''/<title>(.*?) \|.*?<\/title>/'', $result->data, $title_match);

    $title = $title_match[1] ? $title_match[1] : $account_id;

    return $title;

  }

  ```


  这段代码能工作，而且相当不错，它用名字替换了数字。不过，它仍然有一个问题：每次有人查看作者的资料页时，都会向 `drupal.org` 发起两次请求，每次都会从
  `drupal.org` 或 `groups.drupal.org` 下载一整页完整的个人资料页面。无论如何，这个名字需要在本地缓存起来。


  ![images](img/square.jpg) **提示** 在实现缓存之前，请先确认你是否真的需要它。你可以通过调试器、查询日志记录器（如 Devel 模块提供的，`drupal.org/project/devel`），或临时包含一个
  `watchdog()` 日志命令（`api.drupal.org/watchdog`）来测试需要缓存的代码是否被调用。详见附录 B，了解如何查找需要优化的性能问题。


  ## 使用 Drupal 的默认缓存表缓存简单数据


  为了善待 `drupal.org`，更不用说提升你网站的性能了，不要在每次查询用户名时都抓取整个页面。


  在格式化器层面做这项工作，意味着对于 Field API 的内置缓存来说已经为时已晚。定义一个新的 `cache_*` 表，或者向通用的 `cache` 表中添加一行或多行数据，都是可行的方案。要实现一些基本的缓存，你可以先查看
  `cache` 表，然后倒推回去。在站点代码中搜索 `cache` 表中的键，很快就能发现 `cache_set()` 和 `cache_get()` 是 Drupal
  用来存取缓存数据的函数。搜索 `cache_set` 或 `cache_get`（例如在 Drupal 代码根目录下执行 `grep -nHR ''cache_get''
  modules`）可以找到大量示例。


  ![images](img/square.jpg) **注意** Drupal 的缓存函数会自动为你处理静态缓存，这很不错。在本例中可能不需要，但静态缓存意味着当数据通过数据库查询从缓存中取出后，在同一个页面请求中不会重复执行这个查询。（详情参见
  `cache_get()` 调用的 `api.drupal.org/_cache_get_object`。）


  以 `locale.module` 中对语言元数据的缓存为例，你可以将缓存功能集成到获取页面标题的函数中。与缓存相关的补充内容以粗体显示在代码清单 33–15
  中。


  **代码清单 33–15.** 为从标准 Drupal 站点获取页面标题的函数添加缓存


  ```

  /**

   * 获取 Drupal 站点的页面标题。

   *

   * dgd7glue_field_formatter_view() 中账号链接标题的回调函数。

   */

  function dgd7glue_drupal_page_title($account_id, $href) {

    $url = $href . $account_id;

    if ($cache = cache_get(''dgd7glue:'' . $url, ''cache'')) {

      $title = $cache->data;

    }

    else {

      $result = drupal_http_request($url);

      // 如果无法获取标题，则使用 $account_id 作为标题，但不缓存它。

      if ($result->code != 200) {

        return $account_id;

      }

      // 从页面的 HTML 源码中提取标题的第一部分。

      preg_match(''/<title>(.*?) \|.*?<\/title>/'', $result->data, $title_match);

      $title = $title_match[1] ? $title_match[1] : $account_id;

      cache_set(''dgd7glue:'' . $url, $title);

    }

    return $title;

  }

  ```


  现在，加载页面的请求只会发起一次，之后都会从缓存中读取，直到缓存被清除——在生产站点上，这可能是几周之后的事（开发环境除外）。


