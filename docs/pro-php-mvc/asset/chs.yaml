  \ ID。结合传入的`$id`参数，我们要么创建一条新的好友记录，要么删除已有的好友记录。\n\n你可能会好奇为什么我们重定向到`/search.html`而不是`/users/search.html`。简单的答案是，我们需要创建自定义路由来处理添加好友/解除好友的操作，因此我们将借此机会缩短我们已经看到的许多\
