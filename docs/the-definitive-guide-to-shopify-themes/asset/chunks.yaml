  trans: "\n### 向顾客展示多种货币\n\n正如本节开头所述，店主在结账时只能选择一种货币。这对于面向国际客户的商店来说显然是个问题，但主题开发者可以通过在主题中构建多货币显示支持来一定程度上缓解这个问题。\n\
    \n这种方案不会影响结账时使用的货币，但它确实能让顾客清楚了解产品以其本国货币计算的具体价格。最常用方法的核心思路如下：\n\n1.  确保在 Liquid\
    \ 文件中，任何显示价格信息的元素 HTML 都标有特殊的 `data-` 属性。\n2.  使用名为 `currencies.js`（由 Shopify\
    \ 提供）的文件来获取当前外汇汇率列表。\n3.  添加一个包含支持货币列表的下拉输入框，允许用户选择其首选货币。\n4.  当下拉选项更改时，查找所有带有特殊标记的元素，并使用汇率信息将其转换为指定货币。\n\
    5.  使用 cookie 存储用户的首选货币以备将来使用。\n\n在你的练习商店中实现此模式的具体代码，请参见本书的代码资源。如果你使用了这种技术，应确保向顾客说明：即使他们选择了不同的货币，结账时仍会以商店的默认货币进行收费。\n\
    \n## 本章小结\n\n本章讨论了 Shopify 主题（单次使用、多次使用和分发）的不同用例，以及每种用例可能用到的主题设置类型。我们涵盖了主题设置的实际实现，并讨论了确保设置易于商家使用的最佳实践。\n\
    \n最后，本章介绍了 Shopify 对国际化和翻译的内置支持。你学习了如何在 Liquid 模板中实现翻译，并了解了 Shopify 在此领域的一些局限性。\n\
    \n脚注 1  \n[`https://help.shopify.com/themes/development/theme-editor/settings-schema.`](https://help.shopify.com/themes/development/theme-editor/settings-schema.)\
    \  \n2  \n[`https://github.com/luciddesign/bootstrapify/wiki/Escaping-liquid-in-SASS`](https://github.com/luciddesign/bootstrapify/wiki/Escaping-liquid-in-SASS)\
    \  \n3  \n[`https://ecommerce.shopify.com/c/shopify-discussion/t/definitively-time-for-multi-language-support-19980`](https://ecommerce.shopify.com/c/shopify-discussion/t/definitively-time-for-multi-language-support-19980)\n\
    \n# SEO 与社交分享\n\n你见过希望网站流量减少的客户吗？\n\n反正我没见过。\n\n流量是任何在线商店的命脉，虽然其质量可能参差不齐，但就数量而言，通常越大越好。当然，困难的部分在于如何首先获得这些流量。\n\
    \n每天，Shopify 店主都在尝试数百种不同的营销渠道和策略，试图为他们的网站带来更多的付费客户。即使只覆盖这些策略的一小部分，也远远超出了本书的范畴。\n\
    \n相反，本章重点介绍作为 Shopify 主题开发者可以做的具体事情，以确保你的主题为寻求营销和发展品牌的商家提供最佳起点。本章涵盖了一份“页面内”最佳实践清单，讨论了向搜索引擎提供\
    \ Shopify 商店结构化信息的方法，并最后探讨了如何通过社交渠道促进商店内容的分享。\n\n## 搜索引擎优化（SEO）\n\n为网站带来高质量流量是一项棘手、令人困惑且耗时的工作——庞大、复杂且往往令人反感的搜索引擎优化（SEO）和在线营销行业正是依赖于此。该行业中普遍存在的错误信息和欺诈性商业行为，常常训练客户将“SEO”视为一个神奇的“黑箱”，他们在这一头投入资金，就能从另一头获得流量。\n\
    \n好消息是，随着搜索引擎变得越来越智能，对可疑做法和“投机取巧”的敏感度降低，那些做“正确事情”（例如为访客提供更好的体验）的网站得到了更好的回报。在我看来，这使得主题开发者在\
    \ SEO 方面的工作变得简单直接——在构建网站时遵循最佳实践，确保搜索引擎能够读取和理解你的页面，最重要的是，确保网站对与之交互的人类用户来说是可访问和可用的。\n\
    \n### 站外优化与站内优化\n\n广义上讲，各种各样的 SEO 策略、技巧和技术可分为两大类：\n\n- **站内优化** 方法直接实现在网站的代码中，以帮助提高流量和点击率。站内方法的示例包括：确保页面具有合理的\
    \ HTML 结构，添加适当的元数据，以及确保网站快速加载。\n- **站外优化** 方法涵盖了你可能用来吸引别人访问你网站的所有其他方式：电子邮件营销、点击付费广告、社交分享，或者是在固特异飞艇侧面做广告。\n\
    \n当我们扮演 Shopify 主题开发者的角色时，我们关注的是站内优化这一类别，因为这是我们唯一能直接控制的。站外方法对商家的成功同样重要，但可能需要（也确实有）一整本书来阐述。如果你有兴趣了解更多，我强烈推荐\
    \ `Moz.com`，它提供了大量免费和付费的 SEO 资源。他们的材料不仅写得很好、详细、及时，而且诚实，没有在 SEO 领域其他地方能感受到的那种令人反感的东西。\n\
    \n本章及本书其他地方涵盖的主要站内优化方法有：\n\n- 语义化 HTML\n- 关键词与内容\n- 结构化数据\n- 性能（见第 10 章）\n- 布局与导航设计（见第\
    \ 4 章）\n\n### 语义化 HTML\n\n这里的“语义”一词仅指“按照各种 HTML 标签的预期目的来使用它们”。这有助于搜索引擎（以及屏幕阅读器等辅助工具）理解页面上的信息，并向用户显示正确的信息。\n\
    \n- 标题标签（`<h1>`、`<h2>`、`<h3>` 等）应按重要性顺序使用，与页面最相关的文本内容应放在 `<h1>` 中，副标题放在 `<h2>`\
    \ 中，依此类推。标题应少于 70 个字符，并且每个页面应独一无二。\n- 使用 `<nav>`、`<main>` 和 `<article>` 等 HTML5\
    \ 元素来帮助指示页面元素的作用。\n- 确保每个页面都呈现一个唯一的元描述（位于网站 `<head>` 中的 `<meta name=\"description\"\
    >` 标签内的内容）。\n- 确保所有图片都定义了 `alt=\"图片描述\"` 属性，以便基于图片的搜索引擎能够索引它们，并针对相关搜索词进行显示。\n\n\
    Shopify 不会自动验证你主题的 HTML，因此请确保在质量保证过程中，使用 HTML 验证工具（例如 [`https://validator.w3.org`](https://validator.w3.org)）对主题中的关键页面进行验证。\n\
    \n### 关键词与内容\n\n在互联网早期，搜索引擎很容易被“操纵”。某些短语的相关性是由特定单词出现的频率决定的，这意味着你会看到很多页面进行“关键词堆砌”，如图\
    \ 9-1 所示。\n\n![A437216_1_En_9_Fig1_HTML.jpg](img/A437216_1_En_9_Fig1_HTML.jpg)\n\
    \n图 9-1  \n这帮家伙到底在哪？\n"
- fmt: '# Keyword Analysis


    Fortunately, keyword stuffing tactics no longer work as search engines have gotten
    wise to them, but that doesn’t mean that keyword analysis and research isn’t important.
    Search engines aren’t mind readers, so they do require indications on which words
    and phrases are most relevant to each page. Understanding the words and phrases
    customers are using when looking for a merchant’s products is important in determining
    the priority your theme should give to different elements on a page. Ask questions
    like:


    - Are customers likely to use brand or vendor names in their searches (“nike air
    pressure” versus “pumps”)?

    - Do customers search for products using a standardized part or model number (such
    as “MS2846728”)?

    - Are product variations like size or color incidental to the product, or a defining
    feature (“apple watch” versus “gold apple watch”)?


    # Duplicate Content


    One thing that often trips up Ecommerce stores are “duplicate content” issues.
    Because many stores resell the products of others, merchants can be tempted to
    copy and paste the description of their products from the site of a supplier or
    competitor. This should be strongly discouraged, as search engines will pick up
    on this and treat your product pages as having much lower relevance in product
    searches.


    Another issue unique to Shopify sites is that a single product can appear at multiple
    URLs (it appears at its “root URL” of `https://example.myshopify.com/products/product-name`
    but also `https://example.myshopify.com/collections/widgets/product-name`, `https://example.myshopify.com/collections/under-50-dollars/product-name`,
    once for each collection it appears in).


    Fortunately, all that’s required to alleviate this is to make sure that your theme
    layout includes a canonical URL reference at the top of the page, like this:


    `<link rel="canonical" href="{{ canonical_url }}" />`


    # Structured Data


    If you spend the time to make your site easy for humans to use and follow the
    standard conventions laid down in the HTML5 specification, automated systems like
    search engines and social networks will be able to do a pretty good job of understanding
    your pages as well.


    However, there are things you can do to make it even easier for machines to understand
    the information on your site and provide hints on how that information could be
    presented to users most effectively.


    One of the ways to do this is using one of many different types of structured
    data, which provide information in a standard, machine-readable format. This chapter
    focuses on the two types of structured data most relevant to Ecommerce stores:


    - `Schema.org` markup, which allows Google and other search engines to read and
    present price, availability, review, and condition product information. It’s also
    used for a few inventory feed applications such as Google Shopping.

    - Social Media markup, which is used by social networks such as Facebook, Twitter,
    and Pinterest when determining how to present pages on your site that have been
    shared.


    ## The Schema.org Vocabulary


    The `Schema.org` vocabulary is an open effort to provide a standardized way of
    describing “things” on the web. It includes a hierarchical definition of a wide
    range of objects and their attributes, from `TVSeason`s to `RentalCarReservation`s.
    Most relevant to Shopify stores, it allows the specification of information about
    each `Product` available for sale on a site (along with information about the
    `Organization` that sells them and any `Article`s that may appear on a site blog).


    Readable by all major search engines and many other automated systems, `Schema.org`
    markup is what drives the “rich” information that I’m sure you’ve seen in various
    search results, such as in Figure [9-2](#A437216_1_En_9_Chapter.html#Fig2).


    ![A437216_1_En_9_Fig2_HTML.jpg](A437216_1_En_9_Fig2_HTML.jpg)


    Figure 9-2 Product “rich snippets” in Google search results. Amazon’s result not
    only includes price and stock information but aggregate review information as
    well.


    ## Microdata


    Historically, `Schema.org` markup was provided through a system called Microdata.
    This involved the addition of special attributes and properties within a site’s
    HTML elements that corresponded with the relevant data. To see how this process
    works, compare Listing [9-1](#A437216_1_En_9_Chapter.html#Par41) (without Microdata
    markup) to Listing [9-2](#A437216_1_En_9_Chapter.html#Par42) (with Microdata markup).


    ```

    {{ product.title | escape }}

    {{ product.price | money }}

    {{ product.description }}


    {% for image in product.images %}


    {% endfor %}


    Listing 9-1

    Example Product Liquid Template Without Microdata Markup

    ```


    ```

    {{ product.title | escape }}


    {{ product.price | money }}


    {{ product.description }}


    {% for image in product.images %}


    {% endfor %}


    Listing 9-2

    Same Example Product Liquid Template with Microdata Markup

    ```


    While widely supported, Microdata posed a few problems for web developers. Having
    to add these additional attributes throughout existing HTML markup added visual
    complexity to source code. Shopify developers could have the Microdata markup
    for a single product entity spread over several templates and Liquid snippets,
    making it hard to keep track of and maintain.


    On top of that, the addition of Microdata imposed a tight coupling between the
    structure of a page’s HTML and the relevant `Schema.org` data model, reducing
    flexibility and often forcing developers to add meaningless HTML elements to their
    page just to please the `Schema.org` nesting structure.'
