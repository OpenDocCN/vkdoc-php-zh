    $a = 36;\n$b = 36;\nif ($a <= $b) {\n    print \"$a is less than or equal to $b.\"\
    ;\n} else {\n    print \"$a is not less than or equal to $b.\";\n}\n?>\n```\n\
    输出：36 is less than or equal to 36.\n原因：小于或等于比较的工作方式与 #5 类似。但是，如果值相等，则返回真。\n\n\
    7.\n```php\n<?php\n$a = 25;\n$b = 36;\nif ($a > $b) {\n    print \"$a is greater\
    \ than $b\";\n} else {\n    print \"$b is greater than $a\";\n}\n?>\n```\n输出：36\
    \ is greater than 25.\n原因：大于比较若左侧的值大于右侧的值，则返回真。在此示例中，25 小于 36。因此执行 `else` 部分的代码。\n\
    \n8.\n```php\n<?php\n$a = 36;\n$b = 36;\nif ($a >= $b) {\n    print \"$a is greater\
    \ than or equal to $b\";\n} else {\n    print \"$b is greater than $a\";\n}\n\
    ?>\n```\n输出：36 is greater than or equal to 36.\n原因：大于或等于比较的工作方式与 #7 类似。但是，如果两个值相等，则返回真。\n\
    \n9.\n```php\n<?php\n$a = 25;\n$b = 36;\n$result = $a <=> $b;\nif ($result ===\
    \ 0) {\n    print \"Both are equal\";\n} else if ($result === 1) {\n    print\
    \ \"$a is greater than $b\";\n} else {\n    print \"$b is greater than $a\";\n\
    }\n?>\n```\n"
- fmt: 'Output: `Both are equal.`

    Why: The **rocket ship operator** (available in PHP7+) returns `-1` if `$a < b`,
    returns `0` if `$a` equals `$b`, or returns `1` if `$a > $b`. The `if` statement
    shown determines the status returned by the rocket ship operator and displays
    the appropriate result. The use of the `if/else/elseif` structure is shown here
    to determine a range of possible values. More examples will be shown in future
    chapters.


    **Logical operators** allow you to ask more than one question in a conditional
    statement. Let us look at some examples:


    1.

    ```

    Output: Some or all of us are equal.

    Why: Both sides of the or statement evaluate to true. If either or both sides
    of an **or operator** are true, then the complete expression is true.

    *Note: The symbols || can also be used instead of or.*

    ```


    2.

    ```

    Output: All of us are equal.

    Why: Both sides of the expression must be true for complete expression to be true
    when using an **and operator**. In this example both sides are true.

    *Note: The symbols && can also be used instead of and.*

    ```


    3.

    ```

    Output: Someone is not equal.

    Why: With **excusive or** (xor), only one side of the expression can be true.
    In this example both sides were true, so it evaluates to false. If this were an
    or statement, it would have evaluated to true.

    ```


    4.

    ```

    Output: Everyone is equal.

    Why: The **not expression** (!) reverses the result. This exclusive or (xor) returned
    false because both sides are true. However, the not reversed the result to true.

    ```


    The **? operator** is a short coding version of a conditional `if-then-else` statement.


    ```

    Output: They are equal.

    Why: The statement placed between the `?` and `:` is executed if the comparison
    is true. The statement between the `:` and `;` is executed if the statement is
    false. Since a `print` command is to the left of the comparison, the result of
    the comparison will be printed. `$a` and `$b` are the same value; thus, the first
    string is displayed.

    ```


    ```

    $a <=> $b ? "They are equal" : "$a is greater than $b" : "$b is greater than $a";

    ?>

    ```


    Output: `36 is greater than 24.`

    Why: In PHP 7.5+ you can also evaluate for equal (`0`), greater than (`-1`), and
    less than (`1`) using the **spaceship operator**. This comparison becomes very
    short and efficient to determine whether the values are equal, or who is greater.
    Since `$a` is greater than `$b`, the statement between the two colons (`:`) is
    displayed. If `$a` were less than `$b`, the statement between the last colon and
    the semicolon would be displayed. Otherwise, when the values are equal, the statement
    between the question mark (`?`) and first colon would be displayed.


    Let us take a look at some invalid comparisons and the resulting error messages
    in PHP 8.


    1.

    ```

    "ten" > "eleven";

    ```

    Result: Error: "Unsupported type string for comparison".


    2.

    ```

    "eleven" > 10;

    ```

    Result: Error: "Operator type mismatch string and int for comparison".


    3.

    ```

    "ten" == 10;

    ```

    Result: Error: "Operator type mismatch string and int for comparison".


    4.

    ```

    "120" > "99.9";

    ```

    Result: Error: "Unsupported type string for comparison".


    5.

    ```

    "120"  "99.9";

    ```

    Result: Error: "Unsupported type string for comparison".


    The **switch statement** can be used to eliminate embedded `if-then-else` statements
    when determining a value within a variable.


    ```

    switch (value to compare) {

    case value:

    // code to execute if true

    break;

    case value;

    // code to execute if true

    break;

    default:

    // code to execute if there are no matches

    break;

    }

    ```


    The structure of the `switch` statement requires `break` commands (`break;`) at
    the end of each possible case situation. The colon (`:`) is used in each header
    of the case(s) after the value to compare.


    ```

    Result: Number was not found.

    Why: The value 36 is not caught in any of the case statements. PHP will do conversion,
    when possible. In this example, it will compare the value in the strings to the
    number presented. The flow of the structure will drop into the default statement
    since there are no matches. The default statement acts in a similar fashion to
    the else statement; it catches all remaining possibilities. It is a good idea
    to include a default statement in all case structures to handle the unexpected
    values rather than possibility causing an exceptional situation.

    ```


    **Do It**


    1. Create a program which uses a conditional statement that will determine what
    color is contained in a string. If the color is green, display "I love the earth".
    If the color is blue, display "The sky is beautiful". If the color is yellow or
    orange, display "I love sunsets". For any other color, display "selectedcolor
    is my favorite color". Replacing the selectedcolor with the color chosen. Hint:
    You can put a variable inside of a string.

    2. Complete #1 using a switch statement.

    3. Create a program that will determine if the number provided is even or odd.
    If the number is even, square it (power of 2) and display it. If the number is
    odd, cube it (power of 3) and display it.


    ## Functions


    In addition to the 1000s of built-in or easily importable PHP functions available
    for your use, you can also create your own functions.


    ```

    function function_Name(attribute1, attribute2, ...) {

    // code goes here

    }

    function_name(attribute, attribute, ...);

    // next statement after function has completed

    ```


    The general format of a function is shown here. The `function` keyword is lowercase.
    The name you provide for the function uses almost the same format as variables,
    except you do not include the `$`. Variables or values can be passed as parameters
    into the function in the parentheses. All code goes between the brackets `{}`.
    The function is called using the function name and the passing of any required
    attributes. When a function is called, the execution of the program jumps to the
    function. After all code has been executed, the program flow jumps to the instruction
    after the call to the function.


    Let us look at some examples:


    1.

    ```

    Output: Hello

    Why: No values are passed into the function. However, the print statement is executed.

    ```

    The function can also be placed at the bottom of the code. However, be consistent.
    Either place your functions at the top of the code or the bottom of the code.
    Functions can also be included in a separate file that can then be imported into
    the main PHP program. We will look at that example soon.


    2.

    ```

    Output: Hello

    Why: This example accomplishes the same task. However, it allows some flexibility
    by allowing the user to pass the value to be displayed. Notice that the string
    was passed within the parentheses when the function was called. The string will
    drop into the variable `$value` (it determines where values go by the position
    they are passed). The `print` statement in the function then uses the variable
    `$value` to display the information. This function would actually display almost
    anything passed (including numbers), even though it is called `display_hello`.

    ```


    3.

    ```

    Output: Your first name is James.

    Your first name is Jackie.

    Your last name is Jones.

    Why: The preceding `display_names` function accepts two values (`$first_name`,
    `$last_name`). However, it also provides a default value for the second parameter.
    In the first call to the function, "James" will pass into `$first_name`. Since
    there is not a second parameter passed, `$last_name` will contain "none". "Your
    first name is James" will be displayed. The `if` statement will determine that
    a second value has not been passed and will not attempt to display `$last_name`.
    In the second call, both values are passed. "Jackie" will be passed into `$first_name`.
    "Jones" will be passed into `$last_name`. The function will display "Your first
    name is Jackie" and "Your last name is Jones".

    ```'
