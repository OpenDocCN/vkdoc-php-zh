    \ It also limits the value returned to\nbe Boolean.\n\n```\n\nNote\n\ntrue is\
    \ not a string, it is a Boolean value. Thus, it does not\nrequire quotes.\n\n\
    Both of the preceding statements could be valid when calling the\nmyFunction function.\
    \ If there is no value passed, then the variable\n$value is set to the **default\
    \ value**, which is null.\n**Null**\n indicates that the variable is empty. However,\
    \ we could also\npass a Boolean value (true) which would be used instead of null.\n\
    \nIn order for the data type enforcement to take place, the following\nstatement\
    \ must be the first statement in the php code:\n\n```\n<?php declare(strict_types=1);\n\
    ```\n\nIf the **strict type** statement is not\nincluded, php will try to covert\
    \ data types when possible, which might\ncause the function or object to accept\
    \ invalid data, which will either\ncause invalid results or, worse yet, cause\
    \ the program to throw an\nexception (error condition). We will look at additional\
    \ examples when we\nlook at functions, arrays, and objects.\n\nArithmetic operations\
    \ work in a similar way to mathematics. The\nexception is that the calculation\
