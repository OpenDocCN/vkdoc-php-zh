    call `flock()`, like this:


    `// open the file in c mode`


    `$file = fopen(''C:/private/lock.txt'', ''c'');`


    `// acquire an exclusive lock`


    `flock($file, LOCK_EX);`


    This opens the file, or creates it if it doesn’t already exist, and places the
    internal pointer at the beginning of the file. This means you need to move the
    pointer to the end of the file or delete the existing content before you can start
    writing with `fwrite()`.


    To move the pointer to the end of the file, use the `fseek()` function, like this:


    `// move to end of file`


    `fseek($file, 0, SEEK_END);`


    Alternatively, delete the existing contents by calling `ftruncate()`:


    `// delete the existing contents`


    `ftruncate($file, 0);`


    After you have finished writing to the file, you must unlock it manually before
    calling `fclose()`:


    `// unlock the file before closing`


    `flock($file, LOCK_UN);`


    `fclose($file);`


    Caution


    According to the documentation for `flock()`, the file is no longer automatically
    unlocked when the file is closed (see [`http://php.net/manual/en/function.flock.php`](http://php.net/manual/en/function.flock.php)
    ). Even if you can reopen the file, it remains locked to other users and processes.


    #### Preventing Overwriting an Existing File


    Unlike other write modes, `x` mode won’t open an existing file. It only creates
    a new file ready for writing. If a file of the same name already exists, `fopen()`
    returns `false`, preventing you from overwriting it. The processing code in `fopen_exclusive.php`
    looks like this:


    `// create a file ready for writing only if it doesn''t already exist`


    `// error control operator prevents error message from being displayed`


    `if ($file = @ fopen(''C:/private/once_only.txt'', ''x'')) {`


    `// write the contents`


    `fwrite($file, $_POST[''contents'']);`


    `// close the file`


    `fclose($file);`


    `} else {`


    `$error = ''File already exists, and cannot be overwritten.'';`


    `}`


    Attempting to write to an existing file in `x` mode generates a series of PHP
    error messages. Wrapping the write and close operations in a conditional statement
    deals with most of them, but `fopen()` still generates a warning. The error control
    operator (`@`) in front of `fopen()` suppresses the warning.


    Load `fopen_exclusive.php` into a browser, type some text, and click Write to
    file. The content should be written to `once_only.txt` in your target folder.


    If you try it again, the message stored in `$error` is displayed above the form.


    #### Combined Read/Write Operations with fopen( )


    By adding a plus sign (`+`) after any of the previous modes, the file is opened
    for both reading and writing. You can perform as many read or write operations
    as you like—and in any order—until the file is closed. The difference between
    the combined modes is as follows:


    *   `r+`: The file must already exist; a new one will not be automatically created.
    The internal pointer is placed at the beginning, ready for reading existing content.

    *   `w+`: Existing content is deleted, so there is nothing to read when the file
    is first opened.

    *   `a+`: The file is opened with the internal pointer at the end, ready to append
    new material, so the pointer needs to be moved back before anything can be read.

    *   `c+`: The file is opened with the internal pointer at the beginning.

    *   `x+`: Always creates a new file, so there’s nothing to read when the file
    is first opened.


    Reading is done with `fread()` or `fgets()` and writing with `fwrite()`, exactly
    the same as before. What’s important is to understand the position of the internal
    pointer.


    #### Moving the Internal Pointer


    Reading and writing operations always start wherever the internal pointer happens
    to be, so you normally want it to be at the beginning of the file for reading,
    and at the end of the file for writing.


    To move the pointer to the beginning, pass the file reference to `rewind()` like
    this:


    `rewind($file);`


    To move the pointer to the end of a file use `fseek()` like this:


    `fseek($file, 0, SEEK_END);`


    You can also use `fseek()` to move the internal pointer to a specific position
    or relative to its current position. For details, see [`http://php.net/manual/en/function.fseek.php`](http://php.net/manual/en/function.fseek.php)
    .


    Tip


    In append mode (`a` or `a+`), content is always written to the end of the file
    regardless of the pointer’s current position.


    ## Exploring the File System


    PHP’s file system functions can also open directories (folders) and inspect their
    contents. You put one of these functions to practical use in PHP Solution 6-6
    by using `scandir()` to create an array of existing filenames in the `images`
    folder and looping through the array to create a unique name for an uploaded file.
    From the web developer’s point of view, other practical uses of the file system
    functions are building drop-down menus that display the contents of a folder and
    creating a script that prompts a user to download a file, such as an image or
    PDF document.


    ### Inspecting a Folder with Scandir( )


    Let’s take a closer look at the `scandir()` function, which you used in PHP Solution
    6-6\. It returns an array consisting of the files and folders within a specified
    folder. Just pass the path name of the folder (directory) as a string to `scandir()`
    and store the result in a variable like this:


    `$files = scandir(''../images'');`


    You can examine the result by using `print_r()` to display the contents of the
    array, as shown in the following screenshot (the code is in `scandir.php` in the
    `ch07` folder):


    ![A978-1-4842-0635-5_7_Figg_HTML.jpg](A978-1-4842-0635-5_7_Figg_HTML.jpg)


    The array returned by `scandir()` doesn’t contain just files. The first two items
    are known as dot files, which represent the current and parent folders. The final
    item is a folder called `thumbs`.


    The array contains only the names of each item. If you want more information about
    the contents of a folder, it’s better to use the `FilesystemIterator` class.'
