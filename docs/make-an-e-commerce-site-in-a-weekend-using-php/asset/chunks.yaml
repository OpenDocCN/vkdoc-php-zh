    check your server connection.");


    $complete_name=$_SESSION[''complete_name''];


    $address1 = $_SESSION[''address1''];


    $city = $_SESSION[''city''];


    $state = $_SESSION[''state''];


    $zipcode = $_SESSION[''zipcode''];


    $country = $_SESSION[''country''];


    $shipping_address_line1 = $_SESSION[''shipping_address_line1''];


    $shipping_address_line2 = $_SESSION[''shipping_address_line2''];


    $shipping_city = $_SESSION[''shipping_city''];


    $shipping_state = $_SESSION[''shipping_state''];


    $shipping_country = $_SESSION[''shipping_country''];


    $shipping_zipcode = $_SESSION[''shipping_zipcode''];


    $phone_no= $_SESSION[''phone_no''] ;


    $email_address= $_SESSION[''emailaddress''] ;


    $today = date("Y-m-d");


    $sessid = session_id();


    $sql = "INSERT INTO orders (order_date, email_address, shipping_address_line1,
    shipping_line_2, shipping_city, shipping_state, shipping_country, shipping_zipcode)


    VALUES (''$today'',''$email_address'',''$shipping_address_line1'', ''$shipping_address_line2'',
    ''$shipping_city'',''$shipping_state'',''$shipping_country'',''$shipping_zipcode'''')";


    $result = mysqli_query($connect, $sql) or die(mysql_error());


    $orderid = mysql_insert_id();


    try {


    $charge = Twocheckout_Charge::auth(array(


    "merchantOrderId" => "$orderid",


    "token" => $_POST[''token''],


    "currency" => ''USD'',


    "total" => ''$cartamount'',


    "billingAddr" => array(


    "name" => ''$complete_name'',


    "addrLine1" => ''$address1'',


    "city" => ''$city'',


    "state" => ''$state'',


    "zipCode" => ''$zipcode'',


    "country" => ''$country'',


    "email" => ''$email_address'',


    "phoneNumber" => ''$phone_no''


    ),


    "shippingAddr" => array(


    "name" => ''$complete_name'',


    "addrLine1" => ''$shipping_address_line1'',


    "city" => ''$shipping_city'',


    "state" => ''$shipping_state'',


    "zipCode" => ''$shipping_zipcode'',


    "country" => ''$shipping_country'',


    "email" => ''$email_address'',


    "phoneNumber" => ''$phone_no''


    )


    ), ''array'');


    if ($charge[''response''][''responseCode''] == ''APPROVED'') {


    echo "Thanks for your Order!";


    echo "Please, remember your Order number is $orderid<br>";


    echo "<h3>Return Parameters:</h3>";


    echo "<pre>";


    print_r($charge);


    echo "</pre>";


    $query = "SELECT * FROM cart WHERE cart_sess=''$sessid''";


    $results = mysqli_query($connect, $query) or die(mysql_error());


    while ($row = mysqli_fetch_array($results, MYSQLI_ASSOC)) {


    extract($row);


    $totalamount=$totalamount + ($cart_price * $cart_quantity);


    $sql2 = "INSERT INTO orders_details (order_no, item_code, item_name, quantity,
    price)


    VALUES ($orderid,$cart_itemcode,''$cart_item_name'',


    $cart_quantity,$cart_price)";


    $insert = mysqli_query($connect, $sql2) or die(mysql_error());


    }


    $sql2 = "INSERT INTO payment_details (order_no, email_address, customer_name,
    payment_type, name_on_card, card_number, expiration_date)


    VALUES ($orderid,$cart_itemcode,''$cart_item_name'',


    $cart_quantity,$cart_price)";


    $insertpayment = mysqli_query($connect, $sql2) or die(mysql_error());


    $query = "DELETE FROM cart WHERE cart_sess=''$sessid''";


    $delete = mysqli_query($connect, $query) or die(mysql_error());


    session_destroy();


    }


    } catch (Twocheckout_Error $e) {


    print_r($e->getMessage());


    }


    ?>

    ```


    The session is started. Connection to the MySQL server is established and the
    `shopping` database is selected. The shipping information (such as the shipping
    address, city, state, country, ZIP code, and payment mode entered by the user
    in the `shipping_info.php` script) is retrieved from the `$_POST` array. A SQL
    statement is executed to store that information in the `orders` table along with
    the system date, which is the date the order was placed. In the `orders` table
    a primary key field called `order_no` is made. It is of `integer` type and is
    set to `auto_increment` mode, which means its value is automatically incremented
    by 1 on insertion of every record. With the help of the following statement:


    ```

    $orderid = mysql_insert_id();

    ```


    The `id` of the `order_no` of the inserted record in the `orders` table is retrieved
    and is stored in the `$orderid` variable. This order number is added to each item
    in the `orders_details` table to determine all the items that have been purchased
    with a particular order number.


    All the records in the `cart` table with the given session ID (of the same user)
    are extracted one by one and stored in the `orders_details` table. After that,
    all the items from the `cart` table with the given session ID are deleted. The
    user sees the “Order Acceptance” message and the order ID is displayed for future
    communication. In the end, the session is destroyed.'
