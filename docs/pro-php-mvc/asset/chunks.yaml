    The _all() method creates a query, taking into account the various filters and
    flags, to return all matching records.


    The reason we go to the trouble of wrapping an instance method within a static
    method is because we have created a context wherein a model instance is equal
    to a database record. Multirecord operations make more sense as class methods,
    in this context.


