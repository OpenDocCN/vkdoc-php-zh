    ## CHAPTER 14 ■ DATA SOURCES AND BEHAVIORS


    `beforeSave()` callback function, so long as the behavior is attached to and enabled
    in the model. You can have the behavior automatically perform any logic for the
    model by using callback functions listed in Table 14-4. Remember that the parent
    model is available in the callback function as `&$model`.


    **Table 14-4.** *Callback Functions in the Behavior*


    **Function Name**

    **When Called**


    `afterDelete(&$model)`

    After the model successfully deletes a record or set of records.


    `afterFind(&$model, $results, $primary)`

    After the model performs a find; can be used to modify results returned by `find()`.
    If the model is being queried through an associated model, then `$primary` will
    be set to `false`.


    `afterSave(&$model, $created)`

    After the model successfully saves a record or set of records; `$created` is set
    to `true` if a new entry was saved.


    `beforeDelete(&$model, $cascade)`

    Before the model deletes a record; if `$cascade` is set to `true`, records depending
    on the current one are also deleted.


    `beforeFind(&$model, $query)`

    Before the model performs a find; `$query` is an array containing the find conditions.


    `beforeSave(&$model)`

    Before the model saves a record or set of records.


    `beforeValidate(&$model)`

    Before the model validates data.


    ### Things to Keep in Mind When Writing Behavior Functions


    Behaviors are simple to build, though they can be as complex as any other Cake
    resource. Generally, they will contain only functions and some properties, or
    class variables, that simplify handling data for the model. These functions behave
    like helper functions in that they finish by returning either a set of values,
    an array, or a boolean value. Only when the `ConnectionManager` is used to connect
    to a `DataSource` or certain callback functions are written will the behavior
    interact directly with the datasource. The rest of the time, the behavior serves
    to house processes that would otherwise bog down the model.


    ### Summary


    Conventionally, the model deals with all the data while the controller handles
    all the logic of the application. To better extend the model, Cake includes two
    resources that separate out repetitive functions: DataSources and behaviors. Through
    DataSources, you can provide the model with all the connection and querying processes
    in a background layer of sorts and allow the same finding, updating, saving, and
    deleting methods to appear in the model without changing the code there.


    In this chapter I explained how to build a simple XML DataSource that automatically
    opens an XML file, parses the XML, and displays each record there as a blog post.
    Through behaviors, you can provide the model with more complicated data-handling
    methods or methods that happen simultaneously without bogging down the model.
    By using the built-in Tree behavior to better organize tags, the blog application
    now has a more efficient hierarchy of categories. The user also benefits by you
    using the Tree behavior; when clicking a category, not only does the user see
    a list of posts directly associated with the tag but all posts associated with
    child tags as well. The Containable behavior, which is used to "contain" associated
    models—or, in other words, restrict the result set in specific ways to provide
    you with exactly the data values you want—also allows you to extend the functionality
    of the model. I showed some simple ways of using Containable in your application.


    Writing custom behaviors allows you to house these types of model functions in
    a type of extension and thus streamline your application even more. Now that you''ve
    used all of Cake''s resource files and have worked in the MVC structure, all that''s
    left is to wrap up the blog application.


