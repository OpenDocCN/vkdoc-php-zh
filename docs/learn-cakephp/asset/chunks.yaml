    Figure 13-1.


    Failing test


    The red F indicates that our test failed.


    The next line shows the test’s execution time and the memory used.


    We can see which method of which test file failed, and a message describing the
    reason for the failure.


    Then we can see the difference between the expected and the actual result. The
    - sign indicates the expected result; the + sign shows the actual result.


    So, the figure shows that we expected an array that has only one member, which
    is another array. This is OK.


    The expected id is 5, but the actual id is 2\. The `comment` and `user_id` are
    equal both in expected and actual arrays, but `post_id` again differs.


    Then the next line shows the line number of the failed assertion.


    At the end, we can see the summarized report of the run tests.


    ## Interrupting Tests


    You can stop running a test at any time at the console, by pressing Ctrl+C. If
    you do so, do not forget to check your test database, as database entries can
    remain there, as you interrupt test execution before it removes all entries.


    ## Summary


    In this chapter, you learned how to use information provided by `debug`, how to
    run all tests at once, and how to filter tests. An overview of the test output
    was provided, and you learned how to interrupt tests.


