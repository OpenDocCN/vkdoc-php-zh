- "# 第 32 章 ■ 视图与规则\n\n**709**\n\n#### 创建规则\n\n你可以使用`CREATE RULE`命令创建规则，其完整语法如下：\n\
  \n```\nCREATE [ OR REPLACE ] RULE rule_name AS ON event_type\nTO object_name [ WHERE\
  \ conditional ] DO [ ALSO | INSTEAD ] command\n```\n\n以下列表描述了该语法的各个部分：\n\n- `CREATE\
  \ [ OR REPLACE ] RULE rule_name`：指定规则的名称，并可选用`OR REPLACE`子句，该子句告知 PostgreSQL 替换同表或同视图上已存在的同名规则。\n\
  \n- `AS ON event_type`：确定规则将针对何种事件类型执行。`event_type`可以是`SELECT`、`INSERT`、`UPDATE`或`DELETE`之一，每种类型将在后续的“规则类型”一节中详细描述。\n\
  \n- `TO object_name [ WHERE conditional ]`：指定规则所应用的表或视图的名称。如果你希望规则仅在特定情况下执行，可以指定可选的`conditional`条件。可以使用任何\
  \ SQL 条件表达式，只要它返回布尔值、不包含聚合函数，并且除可选的`NEW`和`OLD`伪关系（在适用情况下）外，不引用其他表或视图。\n\n- `DO [\
  \ ALSO | INSTEAD ]`：描述规则是应在针对表的原始 SQL 语句操作之外执行，还是应替代原始 SQL 语句执行。如果既未指定`ALSO`也未指定`INSTEAD`，则默认使用`ALSO`。\n\
  \n- `command`：指定要为规则运行的所需查询。命令的形式为`SELECT`、`INSERT`、`UPDATE`、`DELETE`或`NOTIFY`语句。规则中`COMMAND`部分使用的\
  \ SQL 查询可以访问`NEW`和`OLD`伪关系（在适用情况下）。如果您不希望对规则执行任何操作，`COMMAND`部分也可以使用`NOTHING`关键字。\n\
  \n**提示** `COMMAND`部分中指定的操作不必与`event_type`中指定的操作相匹配。例如，你可以创建一个规则，每当有人试图更新视图时，该规则就向另一个表插入数据。\n\
  \n##### 删除规则\n\n要删除规则，可以使用`DROP RULE`命令。与`CREATE RULE`命令相比，其语法要简单得多：\n\n```\nDROP\
  \ RULE rule_name ON object_name [ CASCADE | RESTRICT ]\n```\n\n`DROP RULE`命令的关键元素包括：规则的名称、规则所应用到的视图或表的名称，以及可选的`CASCADE`或`RESTRICT`关键字。如果选择`CASCADE`，则所有依赖于该规则的对象都将被删除；如果指定了`RESTRICT`，则如果该规则有任何依赖对象，PostgreSQL\
  \ 将拒绝删除该规则；默认值为`RESTRICT`。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**710**\n\n### 规则类型\n\n如前所述，PostgreSQL 有四种基本规则类型：选择、插入、更新和删除。每种规则都有一些独特的特征，尽管它们都遵循相同的基本模式。\n\
  \n#### 选择规则\n\n最基本的规则类型是选择规则。选择规则被定义为`ON SELECT`，其操作必须是一个无条件的`SELECT`操作，并标记为替代原始查询运行。通过这种方式，表上的规则模拟了视图的功能，以至于以下两个示例在功能上是等效的：\n\
  \n```\nCREATE VIEW ourbooks AS SELECT * FROM books;\n```\n\n和\n\n```\nCREATE TABLE\
  \ ourbooks AS SELECT * FROM books;\nCREATE RULE \"_RETURN\" AS ON SELECT TO ourbooks\
  \ DO INSTEAD SELECT * FROM books;\n```\n\n对于`ON SELECT`规则，PostgreSQL 要求使用名称`_RETURN`，以帮助向内部查询重写器发出信号，表明被查询的关系是一个视图。PostgreSQL\
  \ 中的视图会自动使用选择规则来处理选择调用并从其基表中检索数据，但在大多数情况下，你不需要直接处理选择规则。\n\n##### 插入规则\n\n\n#####\
  \ 插入规则\nPostgreSQL 中使用的下一种规则类型是插入规则。插入规则可以具有 `ALSO` 或 `INSTEAD` 的动作，并且可以根据需要包含多个动作或没有动作。插入规则中定义的动作可以包含条件，并且还可以使用\
  \ `NEW` 伪关系。插入规则的语法如下所示：\n\n```\nCREATE RULE database_book_insert AS ON INSERT TO\
  \ database_books DO INSTEAD INSERT\nINTO books (title, copies_on_hand, genre) VALUES\
  \ (NEW.title, 1, 'technical');\n```\n\n有了这条规则，任何针对 `database_books` 视图的插入操作，都会改为将指定的值插入到原始的\
  \ `books` 表中。\n\n##### 更新规则\n下一种规则类型是更新规则。与插入规则类似，更新规则可以具有 `ALSO` 或 `INSTEAD` 的动作，并且可以根据需要包含多个动作或没有动作。更新规则中定义的动作可以包含条件，并且可以使用\
  \ `NEW` 和 `OLD` 伪关系。一个更新规则的示例如下所示：\n\n```\nCREATE RULE database_books_update AS\
  \ ON UPDATE TO database_books WHERE\nNEW.title <> OLD.title DO INSTEAD UPDATE books\
  \ SET title = NEW.title;\n```\n\n有了这条规则，针对我们的 `database_books` 视图的更新操作（其中标题已更改），会改为使用新标题更新原始的\
  \ `books` 表。\n\n##### 删除规则\n最后一种规则类型是删除规则。它可以具有 `ALSO` 或 `INSTEAD` 的动作，并且可以根据需要包含多个动作或没有动作。删除规则中定义的动作可以包含条件，并且可以使用\
  \ `OLD` 伪关系。一个删除规则的示例如下所示：\n\n```\nCREATE RULE database_books_delete AS ON DELETE\
  \ TO database_books\nDO INSTEAD NOTHING;\n```\n\n在这里，我们使用 `NOTHING` 关键字来防止当有人尝试从\
  \ `database_books` 视图中删除时发生任何删除操作。这会产生两种效果：我们阻止了对 `database_books` 视图有访问权限的人从我们的主\
  \ `books` 表中删除数据，同时我们允许对 `database_books` 表执行 `DELETE` 语句而不会报错。不要轻易忽略第二种效果。在大多数正常情况下，从视图中删除（以及插入和更新）会引发错误，但通过使用规则，如果我们的应用程序需要，我们可以处理这些错误。\n\
  \n### 让视图可交互\n如今，许多数据库都提供某种形式的可更新视图，允许你对视图运行 `UPDATE` 语句，并让它们更新底层表。然而，你经常会发现，这种视图的定义受到严格限制，例如不允许连接查询或不允许在视图定义中对条目进行特殊格式化。\n\
  \nPostgreSQL 通过其规则系统，允许你绕过这些限制，从而在创建可更新视图的类型方面提供更大的灵活性。下一节将引导你完成几个使用 PostgreSQL\
  \ 规则系统的示例。\n\n#### 可更新、可插入、可删除的视图\n我们示例的第一部分创建了一组我们将使用的简单表：\n\n```\nCREATE TABLE\
  \ employee (\n    employee_id INTEGER PRIMARY KEY,\n    fname TEXT NOT NULL,\n \
  \   lname TEXT NOT NULL\n);\n\nCREATE TABLE phone (\n    employee_id INTEGER REFERENCES\
  \ employee (employee_id) ON DELETE CASCADE,\n    npa INTEGER NOT NULL,\n    nxx\
  \ INTEGER NOT NULL,\n    xxxx INTEGER NOT NULL\n);\n```\n\n这建立了两个表，一个用于存储员工姓名，另一个用于存储他们的电话信息。当然，虽然使用像\
  \ `npa`、`nxx` 和 `xxxx` 这样的列名可能符合北美编号计划的官方格式，但它们使用起来有点笨拙，所以让我们继续创建我们的视图：\n\n```\n\
  CREATE VIEW directory AS (SELECT employee.employee_id,\n       fname || ' ' || lname\
  \ AS name,\n       npa || '-' || nxx || '-' || xxxx AS number\n```\n\n\n\n```sql\n\
  FROM employee JOIN phone USING (employee_id));\n```\n\n这将创建一个三列视图：一列显示员工 ID，一列显示员工全名，一列显示经过格式化的员工电话号码。有了这个结构之后，我们继续添加一些数据：\n\
  \n```sql\nINSERT INTO employee(employee_id,fname,lname) VALUES\n(1,'Amber','Lee');\n\
  \nINSERT INTO phone(employee_id, npa, nxx, xxxx) VALUES\n(1,607,555,5210);\n```\n\
  \n并通过我们的视图查看结果：\n\n```\nrob=# SELECT * FROM directory;\n employee_id |   name  \
  \  |   number\n-------------+-----------+--------------\n           1 | Amber Lee\
  \ | 607-555-5210\n(1 row)\n```\n\n这看起来很不错，但假设我们要向通讯录中添加一个新成员。为此，我们必须了解底层表的结构，并向这两个表中插入数据：\n\
  \n```sql\nINSERT INTO employee(employee_id, fname, lname)\nVALUES (2,'Dylan','Jairus');\n\
  \nINSERT INTO phone(employee_id, npa, nxx, xxxx)\nVALUES (2,813,555,5040);\n```\n\
  \n正如你所见，要向系统中添加信息，我们必须向两个表中插入数据。如果我们能找到一种方法，直接以我们习惯的格式向通讯录视图输入数据，那该多好。这时，我们的第一个规则就派上用场了。我们将创建一个规则，用于处理对通讯录视图的直接插入操作，将数据拆分到合适的表中，并转换为基表所需的合适类型：\n\
  \n```sql\nCREATE RULE directory_addition AS ON INSERT TO directory DO INSTEAD\n\
  (\nINSERT INTO employee VALUES\n(NEW.employee_id,\n split_part(NEW.name,' ', 1),\n\
  \ split_part(NEW.name,' ', 2) );\n\nINSERT INTO phone VALUES\n(NEW.employee_id,\n\
  \ split_part(NEW.number,'-', 1)::INTEGER,\n split_part(NEW.number,'-', 2)::INTEGER,\n\
  \ split_part(NEW.number,'-', 3)::INTEGER );\n) ;\n```\n\n由于通讯录视图将基表各列的数据合并成了单个列，我们必须将这些数据拆分后才能插回到底层表中；在本例中，我们使用了内置的数据库函数\
  \ `split_part`（自 PostgreSQL 7.3 起新增），该函数根据给定的分隔符拆分文本字符串。这一点非常重要，需要牢记：只要你能找到分解视图中数据组合规则的方法，就可以利用规则系统将数据推回到底层表中。有了这个规则，我们现在可以直接向视图中插入数据了：\n\
  \n```\nrob=# INSERT INTO directory VALUES (3,'Emma Jane','352-555-6120');\nINSERT\
  \ 107999 1\n```\n\n`INSERT` 提示表明我们的 INSERT 语句执行成功，但我们知道数据并没有直接存入通讯录视图。让我们查看一下基表的情况：\n\
  \n```\nrob=# SELECT * FROM employee;\n employee_id | fname | lname\n-------------+-------+--------\n\
  \           1 | Amber | Lee\n           2 | Dylan | Jairus\n           3 | Emma\
  \  | Jane\n(3 rows)\n```\n\n`employee` 表里有我们的新员工，这很好，但他们的联系方式呢？\n\n```\nrob=# SELECT\
  \ * FROM phone;\n employee_id | npa | nxx | xxxx\n-------------+-----+-----+------\n\
  \           1 | 607 | 555 | 5210\n           2 | 813 | 555 | 5040\n           3\
  \ | 352 | 555 | 6120\n(3 rows)\n```\n\n成功了！我们已经成功地向视图中插入了数据，并且该规则按照需要将数据拆分并插入了相应的表中。当然，既然你能向视图中插入数据，你肯定也希望从中删除数据，我们同样可以使用规则来实现这一点：\n\
  \n```sql\nCREATE RULE youre_fired AS ON DELETE TO directory DO INSTEAD\nDELETE FROM\
  \ employee WHERE fname=split_part(OLD.name,' ', 1) AND\n                       \
  \    lname=split_part(OLD.name,' ', 2);\n```\n\n如果你不想的话，连接表上的规则不必引用视图中的所有表。请注意，在这个规则中，我们只引用了\
  \ `employee` 表，这对我们的示例来说运行良好，因为 `phone` 表中的相关条目会由于我们在原始表中定义的级联引用而被自动删除。让我们解雇一名员工：\n\
  \n```\nrob=# DELETE FROM directory WHERE name = 'Amber Lee';\nDELETE 1\n```\n\n\n\
  \n同样，数据库指示我们的删除操作已成功，接下来我们查看基本表以验证数据：\n\n```\nrob=# SELECT * FROM employee;\n```\n\
  \n```\nemployee_id | fname | lname\n-------------+-------+--------\n2 | Dylan  |\
  \ Jairus\n3 | Emma   | Jane\n(2 行)\n```\n\n我们想要删除的员工已不在 `employee` 表中，接下来检查一下他们的联系方式：\n\
  \n```\nrob=# SELECT * FROM phone;\n```\n\n```\nemployee_id | npa | nxx | xxxx\n\
  -------------+-----+-----+------\n2 | 813 | 555 | 5040\n3 | 352 | 555 | 6120\n(2\
  \ 行)\n```\n\n再次看到，规则系统能够正确地将我们的请求传递到相应的表，并且该员工及其电话信息的条目已被删除。\n\n既然我们现在可以通过视图进行插入和删除操作，那么自然也应该能够更新已有数据。在本例中，我们将创建一个规则，允许修改电话号码信息，但不能修改姓名信息：\n\
  \n```\nCREATE RULE modify_employee AS\nON UPDATE TO directory DO INSTEAD\nUPDATE\
  \ phone SET\nnpa=split_part(NEW.number,'-', 1)::INTEGER,\nnxx=split_part(NEW.number,'-',\
  \ 2)::INTEGER,\nxxxx=split_part(NEW.number,'-', 3)::INTEGER\nWHERE employee_id =\
  \ NEW.employee_id;\n```\n\n这个规则结合了我们之前讨论过的多个要点：它仅与连接中的一个基本表交互；它逆转了视图定义中使用的复杂公式；并且它在运行时转换数据类型，以正确匹配基本表中定义的类型。\n\
  \n现在我们来更新 `directory`：\n\n```\nrob=# UPDATE directory SET number='352-555-7120'\n\
  WHERE employee_id = 3;\n```\n\n```\nUPDATE 1\n```\n\n像往常一样，我们从 PostgreSQL 收到关于语句执行成功的返回码，但让我们再次检查基本表，看看具体发生了什么：\n\
  \n```\nrob=# SELECT * FROM phone;\n```\n\n```\nemployee_id | npa | nxx | xxxx\n\
  -------------+-----+-----+------\n2 | 813 | 555 | 5040\n3 | 352 | 555 | 7120\n(2\
  \ 行)\n```\n\n如你所见，新的号码现在存储在 `phone` 表中。由于我们不需要更新 `employee` 表，让我们再次查看视图，看看更改是否已反映出来：\n\
  \n```\nrob=# SELECT * FROM directory;\n```\n\n```\nemployee_id | name          |\
  \ number\n-------------+--------------+--------------\n2           | Dylan Jairus\
  \ | 813-555-5040\n3           | Emma Jane    | 352-555-7120\n(2 行)\n```\n\n当然，规则系统的用途并不仅限于制作交互式视图：你也可以在表上使用它，而且能做的事情也不仅限于直接引用表。在下一个例子中，我们创建一个名为\
  \ `salary` 的新表，并向其中插入一些信息：\n\n```\nCREATE TABLE salary (employee_id INTEGER REFERENCES\n\
  employee(employee_id) ON DELETE CASCADE, salary INTEGER);\nINSERT INTO salary VALUES\
  \ (2,400000);\nINSERT INTO salary VALUES (3,200000);\n```\n\n我们决定做的第一件事是防止任何人删除员工的薪资。通常可以通过使用\
  \ `REVOKE DELETE` 命令来实现，但 `REVOKE DELETE` 并不能阻止超级用户意外删除数据，因此我们想要更进一步：\n\n```\nCREATE\
  \ RULE always_pay AS ON DELETE TO salary DO INSTEAD NOTHING;\n```\n\n这是规则的 `INSTEAD`\
  \ 形式，它会导致查询被重写，从而根本不执行。现在，即使超级用户试图从表中删除数据，删除操作也会被阻止：\n\n```\nrob=# DELETE FROM salary\
  \ WHERE employee_id = 2;\n```\n\n```\nDELETE 0\n```\n\n另一件可能需要的事情是记录员工薪资可能发生的任何变更。我们通过结合一个日志表和一个更新规则来实现：\n\
  \n```\nCREATE TABLE salary_log (employee_id INTEGER REFERENCES\nemployee(employee_id)\
  \ ON DELETE CASCADE, salary_change INTEGER,\nchanged_by TEXT, log_time TIMESTAMP\
  \ DEFAULT now());\nCREATE RULE log_salary_changes AS ON UPDATE TO salary DO ALSO\
  \ INSERT\nINTO salary_log VALUES (NEW.employee_id, NEW.salary - OLD.salary, CURRENT_USER);\n\
  ```\n\n\n\n请注意，此规则属于“同时也执行”类型，意味着原始查询将与规则中指定的操作一同执行。它使用原始查询中的数据、一个数学运算以及内部函数 `CURRENT_USER`（用于获取当前登录数据库的用户）：\n\
  \n```\nrob=# UPDATE salary SET salary = 250000 WHERE employee_id = 3;\n\nUPDATE\
  \ 1\n\nrob=# SELECT * FROM salary_log;\n\nemployee_id | salary_change | changed_by\
  \ | log_time\n-------------+---------------+------------+--------------------------\n\
  \          3 |         50000 | rob        |2005-07-11 15:19:33.703885\n(1 row)\n\
  ```\n\n我们尚未提及的一点是，规则会针对初始查询所涉及的所有行触发，而不仅仅是一行。这一点有时会让人措手不及，但也能带来极大便利。例如，如果我们需要将公司所有人的薪资削减\
  \ 15%，我们可以无需额外工作就追踪这些变更：\n\n```\nrob=# UPDATE salary SET salary = (salary – salary*.15)\
  \ ;\n\nUPDATE 2\n\nrob=# select * from salary_log;\n\nemployee_id | salary_change\
  \ | changed_by | log_time\n-------------+---------------+------------+---------------------------\n\
  \          3 |         50000 | rob        | 2005-07-11 15:19:33.703885\n       \
  \   2 |        -60000 | rob        | 2005-07-11 15:30:41.008909\n          3 | \
  \       -37500 | rob        | 2005-07-11 15:30:41.008909\n(3 rows)\n```\n\n由于我们更新了表中的两行，因此日志表中插入了两条额外记录，这正是我们期望的结果。\n\
  \n### 在 PHP 中操作视图\n\n尽管视图在数据库层面与表有一些不同的特性，但在 PHP 中，从视图查询数据与从表查询数据并无区别。清单 32-1 展示了一个简单的\
  \ PHP 页面，它从我们的 directory 视图查询数据并在屏幕上显示结果。你会注意到，它与第 31 章中查询表的示例非常相似。\n\n**清单 32-1.**\
  \ *使用 PHP 查询视图*\n\n```php\n<?php\ninclude \"pgsql.class.php\";\n\n// 创建新的 pgsql\
  \ 对象\n$pgsqldb = new pgsql(\"localhost\",\"rob\",\"rob\",\"secret\");\n\n// 连接到数据库服务器并选择数据库\n\
  $pgsqldb->connect();\n\n// 查询数据库\n$pgsqldb->query(\"SELECT name, number FROM directory\n\
  \                 ORDER BY name\");\n\n// 输出数据\nwhile ($row = $pgsqldb->fetchObject())\n\
  \  echo \"$row->name, $row->number<br />\";\n?>\n```\n\n在浏览器中执行此代码时，将返回以下结果：`Dylan\
  \ Jairus, 813-555-5040` `Emma Jane, 352-555-7120`\n\n你可以看到，无论对于 PHP 应用开发者还是最终用户，查询视图都与查询表毫无差别。因此，作为经验法则，在构建应用程序时，你应该将视图和表视为无区别对待。如果你使用\
  \ PostgreSQL 规则来使视图完全可交互，这一点尤为重要。\n\n### 总结\n\n在本章中，我们深入探讨了如何利用 PostgreSQL 的一些高级功能在数据库内部创建强大且交互的关系。我们首先了解了视图，包括它们在数据库中的工作原理以及添加和删除视图的命令。接着，我们通过探讨不同类型的规则并概述如何定义这些规则，详细解释了\
  \ PostgreSQL 的规则系统。最后，我们给出了一些示例，说明如何将视图、规则和表结合使用，以创建高度交互的数据库模式。这些示例虽然简单，但应能为你提供一些关于如何利用这些强大功能的好思路。\n\
  \n"
- "# PostgreSQL 函数\n\n尽管 PostgreSQL 长期以来以其对自定义函数语言的支持而闻名，但许多人并未充分利用其丰富的内置函数和大量的内置运算符。在本章中，我们将同时介绍运算符和函数，并花些时间探讨自定义函数。到本章结束时，你将熟悉以下内容：\n\
  \n\n\n•   什么是运算符以及 PostgreSQL 中最常用的运算符\n•   不同类型的 PostgreSQL 内部函数以及每种类型最常见的示例\n\
  •   PostgreSQL 的内部过程语言，包括如何用这些语言编写你自己的函数\n•   如何通过额外的自定义过程语言扩展 PostgreSQL\n\n你应该明白，我们的目标并非提供\
  \ PostgreSQL 中每个运算符和函数的全面参考——坦白说，这些内容实在太多了，而且许多仅在非常狭窄的领域中使用。相反，我们将聚焦于其中最常用和最有用的部分，这样你在开始开发基于\
  \ PostgreSQL 的应用程序时，就能打下坚实的基础。\n\n### 运算符\n\nPostgreSQL 提供了大量的内置运算符（截至最近一次统计，超过\
  \ 600 个！），用于执行各种比较和数据转换。在本节中，我们将研究最常用的运算符，其中许多可能你已经很熟悉了。\n\n#### 逻辑运算符\n\nPostgreSQL\
  \ 中的逻辑运算符与大多数编程语言类似，具体如下：\n\n- `AND`\n- `OR`\n- `NOT`\n\n关于 `AND` 和 `OR` 逻辑运算符，一个常被误解的方面是它们如何与\
  \ `NULL` 值交互。SQL 使用三态布尔逻辑，其中 `NULL` 值代表一个“未知”的值。表格 33-1 详细说明了各种逻辑运算符的效果。\n\n**表格\
  \ 33-1.** *逻辑运算符*\n\n| `foo` | `bar` | `foo AND bar` | `foo OR bar` |\n|-------|-------|---------------|--------------|\n\
  | TRUE | TRUE | TRUE | TRUE |\n| TRUE | FALSE | FALSE | TRUE |\n| TRUE | NULL |\
  \ NULL | TRUE |\n| NULL | NULL | NULL | NULL |\n| FALSE | NULL | FALSE | NULL |\n\
  | FALSE | FALSE | FALSE | FALSE |\n\n#### 比较运算符\n\n比较运算符，如表格 33-2 所示，用于比较两个值并返回一个布尔值。\n\
  \n**表格 33-2.** *常用比较运算符*\n\n| 运算符 | 示例 | 说明 |\n|----------|---------|-------------|\n\
  | `<` | `12 < 21` | 小于 |\n| `<=` | `12 <= 21` | 小于或等于 |\n| `>` | `21 > 12` | 大于\
  \ |\n| `>=` | `21 >= 12` | 大于或等于 |\n| `<>`, `!=` | `21 <> 12` | 不等于 |\n| `=` | `21\
  \ = 12 + 9` | 等于 |\n| `BETWEEN` | `12 BETWEEN 9 and 21` | 构造用于 `21 >= 12 AND 12\
  \ <= 9` |\n| `NOT BETWEEN` | `21 NOT BETWEEN 12 and 9` | 构造用于 `21 < 12 OR 21 > 9`\
  \ |\n\nPostgreSQL 还提供了一些额外的构造用于比较布尔值或 `NULL` 值，如表格 33-3 所示。这些值可以是一个特定列，也可以是一个表达式的结果。如果表达式符合所测试的构造，则返回\
  \ true。\n\n**表格 33-3.** *常用比较运算符构造*\n\n| 比较运算符构造 |\n|--------------------------------|\n\
  | `expression IS NULL` |\n| `expression IS NOT NULL` |\n| `expression IS TRUE` |\n\
  | `expression IS NOT TRUE` |\n| `expression IS FALSE` |\n| `expression IS NOT FALSE`\
  \ |\n\n#### 数学运算符\n\nPostgreSQL 中的数学运算符与大多数编程语言中的相同。最常用的数学运算符列在表格 33-4 中。\n\n**表格\
  \ 33-4.** *常用数学运算符*\n\n| 运算符 | 示例 | 说明 |\n|----------|---------|-------------|\n\
  | `+` | `9 + 6 = 15` | 加法 |\n| `-` | `9 – 6 = 3` | 减法 |\n| `*` | `9 * 6 = 54` |\
  \ 乘法 |\n| `/` | `9 / 6 = 1` | 除法（返回 1，因为是整数除法） |\n| `%` | `9 % 6 = 3` | 取模（余数） |\n\
  \n#### 字符串运算符\n\n字符串运算符通常在 PostgreSQL 中用于字符串操作或字符串匹配。最常用的列在表格 33-5 中。\n\n**表格 33-5.**\
  \ *常用字符串运算符*\n\n| 运算符 | 示例 | 说明 |\n|----------|---------|-------------|\n| `||`\
  \ | `'foo' || 'bar'` 结果为 `'foobar'` | 字符串连接 |\n| `~` | `'foobar' ~ 'oo.*r'` | 正则表达式匹配。`^`\
  \ 和 `$` 分别将搜索锚定到字符串的开头和结尾 |\n| `~*` | `'foobar' ~* 'OO.*R'` | 不区分大小写的正则表达式 |\n|\
  \ `!~` | `'foobar' !~ 'rr.*o'` | 不匹配正则表达式 |\n| `!~*` | `'foobar' !~* 'RR.*O'` |\
  \ 不匹配不区分大小写的正则表达式 |\n| `~~` | `'foobar' ~~ '%oo%'` | `LIKE` 的同义词 |\n| `!~~` | `'foobar'\
  \ !~~ '%RR%'` | `NOT LIKE` 的同义词 |\n\n\n\n#### 运算符优先级\n\n在 PostgreSQL 中使用运算符与在任何编程语言中使用运算符非常相似。所有运算符都具有优先级，该优先级决定了运算符的处理顺序，并且可以使用括号对某些操作进行分组来更改该优先级。为了说明我们的意思，请看以下两个查询：\n\
  \n```\nphppg=# SELECT 3*2+1;\n?column?\n(1 row)\n\nphppg=# SELECT 3*(2+1);\n?column?\n\
  (1 row)\n```\n\n如果你曾使用过像 PHP 这样的语言进行编程，那么这些结果应该不会让你感到意外，但在 SQL 层面操作时，有关于运算符优先级的几点特殊情况你需要了解。\n\
  \n其中一种特殊情况是，PostgreSQL 运算符还具有与运算符左侧或右侧值的结合性，这决定了具有相同优先级的运算符的处理顺序。例如，加法和减法的算术运算符是左结合的，因此像\
  \ `3 – 2 + 1` 这样的表达式会被计算为 `(3 – 2) + 1`。\n\n然而，相等运算符是右结合的，因此 `a = b = c` 会被计算为 `a\
  \ = (b = c)`。\n\n**表 33-6** 按降序列出了运算符优先级，并附带了运算符的结合性。不过，请始终牢记，如果你需要处理复杂的运算符组合，使用括号可以帮助更改和明确运算符的优先级。\n\
  \n**表 33-6.** *PostgreSQL 中的运算符优先级*\n\n| **运算符** | **结合性** | **说明** |\n| --- | ---\
  \ | --- |\n| `.` | 左 | 模式/表/列名称分隔符 |\n| `::` | 左 | PostgreSQL 特定的类型转换 |\n| `[]`\
  \ | 左 | 数组选择 |\n| `-` | 右 | 整数取负（一元减号） |\n| `^` | 左 | 指数运算 |\n| `*` / `%` | 左 |\
  \ 乘法、除法、取模 |\n| `+` `-` | 左 | 加法、减法 |\n| `IS` | | 测试是否为 `TRUE`、`FALSE`、`UNKNOWN`\
  \ 或 `NULL` |\n| `ISNULL` | | 测试是否为 `NULL` |\n| `NOTNULL` | | 测试是否不为 `NULL` |\n|\
  \ (所有其他) | 左 | 所有其他内置和用户定义的运算符 |\n| `IN` | | 测试集合成员资格 |\n| `BETWEEN` | | 测试是否在某个范围内\
  \ |\n| `OVERLAPS` | | 测试时间段是否存在重叠 |\n| `LIKE` `ILIKE` `SIMILAR` | | 测试字符串模式匹配 |\n\
  | `>` `<` | | 大于、小于 |\n| `=` | 右 | 测试相等性 |\n| `NOT` | 右 | 逻辑非 |\n| `AND` | 左 | 逻辑与\
  \ |\n| `OR` | 左 | 逻辑或 |\n\n### 内部函数\n\n与运算符的数量一样，PostgreSQL 内置函数的数量也相当惊人。在本节中，我们将介绍一些你最有可能遇到的最常用且最有用的内置函数。我们可以将这些函数分为以下几类：\n\
  \n-   用于处理日期和时间值的函数\n-   用于处理字符串值的函数\n-   用于格式化字符串和时间输出的函数\n-   聚合函数\n-   各种条件表达式\n\
  -   子查询表达式\n\n大多数 PostgreSQL 内置函数可以根据需要，在查询的 `SELECT` 部分或 `WHERE` 部分中调用。\n\n###\
  \ 日期和时间函数\n\nPostgreSQL 提供了许多与日期和时间相关的函数。对于可以接受时间或时间戳参数的函数，带或不带时区的时间和时间戳都是可以接受的。\n\
  \n**表 33-7** 展示了一些常见的日期和时间函数。\n\n**表 33-7.** *常见日期与时间相关函数*\n\n| **函数** | **说明**\
  \ |\n| --- | --- |\n| `current_date` | 返回今天的日期。 |\n| `current_time` | 返回当前时间（不返回日期信息）。\
  \ |\n| `current_timestamp` | 返回当前时间的时间戳（日期和时间）。 |\n| `date_part(text, timestamp)`\
  \ | 返回给定时间戳中文本指定的字段。 |\n| `now()` | 返回当前时间的时间戳，该时间戳在事务开始时固定。 |\n| `timeofday()`\
  \ | 返回当前时间的文本输出。该值在事务期间会递增。 |\n\n### 字符串函数\n\nPostgreSQL 中的字符串函数可以用于以多种方式操作字符串值。\n\
  \n\n\n对于这些函数，任何字符串输入，包括`text`、`varchar`和`char`类型的字符串，都将被视为函数的有效输入。表 33-8 列出了一些常见的字符串函数。\n\
  \n**表 33-8.** *常见字符串函数*\n\n| 函数 | 说明 |\n| --- | --- |\n| `lower(string)` | 返回字符串的小写形式。\
  \ |\n| `position(substring in string)` | 返回子串在字符串中的整数位置。 |\n| `split_part(string,delimiter,field)`\
  \ | 使用分隔符拆分字符串，并返回指定的字段。 |\n| `substring(string, from,[for])` | 从字符串中提取一个子串，从`from`位置开始，长度为指定的`for`位数。\
  \ |\n| `replace(string,from,to)` | 在给定字符串中，将`from`文本替换为`to`文本。 |\n| `upper(string)`\
  \ | 返回字符串的大写形式。 |\n\n**聚合函数**\n\n与大多数其他数据库系统一样，PostgreSQL 提供了许多函数，允许你进行计数、平均计算以及其他聚合操作。表\
  \ 33-9 列出了一些更常见的聚合函数。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 33\
  \ 章 • PostgreSQL 函数\n\n**725**\n\n**表 33-9.** *常见聚合函数*\n\n| 函数 | 说明 |\n| --- | ---\
  \ |\n| `avg(expression)` | 所有输入值的平均值。输入值必须为整数类型之一。 |\n| `count(*)` | 输入值的数量。 |\n\
  | `count(expression)` | 非空输入值的数量。 |\n| `max(expression)` | 所有输入值中`expression`的最大值。\
  \ |\n| `min(expression)` | 所有输入值中`expression`的最小值。 |\n| `sum(expression)` | 所有非空输入值的`expression`之和。\
  \ |\n\n在 PostgreSQL 中使用聚合函数时，请注意，PostgreSQL 通常需要对表进行全表扫描来满足聚合函数，尤其是在查询中未指定`WHERE`子句的情况下，而不是使用索引扫描。其主要原因是\
  \ PostgreSQL 将元组可见性信息存储在表内，而非索引中，因此它必须查看表以确定哪些元组与当前事务相关。（想象一下，尝试为两个并发查询提供准确的`count(*)`，其中一个刚执行了大量删除操作，而另一个则执行了大量插入操作。）如果不小心，这可能导致性能不佳。在\
  \ PostgreSQL 8.1 版本中，`min()`和`max()`函数已解决了此问题，PostgreSQL 现在会尝试利用可用的索引来确定此信息；希望未来我们能看到其他聚合函数得到改进。\n\
  \n**条件表达式**\n\n条件表达式更像是结构而非函数，但其工作方式与函数非常相似，并且在处理复杂 SQL 时非常有用。PostgreSQL 中有三个主要的条件表达式：`CASE`、`COALESCE`和`NULLIF`。\n\
  \n`CASE`\n\n`CASE`函数根据多个匹配条件中的一个，返回多个指定值之一。`CASE`表达式的语法如下：\n\n```\nCASE\n    WHEN\
  \ condition THEN result\n    [WHEN condition THEN result]\n    [ELSE result]\nEND\n\
  ```\n\n一个`CASE`表达式可以有任意多个`WHEN`条件，但它只返回第一个评估为真的条件对应的`result`。如果没有`WHEN`条件评估为真，则如果指定了`ELSE\
  \ result`则返回该结果；否则返回`NULL`。考虑以下示例：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**726**\n\n第 33 章 • PostgreSQL 函数\n\n```\ncompany=# SELECT name, price,\nCASE\
  \ WHEN price < 10.00 THEN 'Hot Deal'\n     ELSE 'Exceptional Value' END as offer\
  \ FROM product;\n      name       | price |      offer\n-----------------+-------+-----------------\n\
  \ Linux Hat       |  8.99 | Hot Deal\n PostgreSQL Hat  |  3.99 | Hot Deal\n PHP\
  \ Hat         | 16.99 | Exceptional Value\n(3 rows)\n```\n\n`COALESCE`\n\n`COALESCE`函数是`CASE`语句的一种特殊格式，它返回其输入中第一个非空值。`COALESCE`表达式的语法如下：\n\
  \n```\nCOALESCE(VALUE [,VALUE])\n```\n\n\n\n与 `CASE` 类似，`COALESCE` 可以按需接收任意多个值。如果在列表中未找到任何非空值，`COALESCE`\
  \ 将返回 `NULL`。为简单起见，我们在这里使用一个较为直接的例子：\n\n```\ncompany=# SELECT name, COALESCE(NULL,price)\
  \ as price from product; name | price\n----------------+-------\nLinux Hat     \
  \  | 8.99\nPostgreSQL Hat  | 3.99\nPHP Hat         | 16.99\n(3 rows)\n```\n\n###\
  \ `NULLIF`\n\n`NULLIF` 函数有时被认为是 `COALESCE` 的逆操作。`NULLIF` 接受两个参数，如果两个参数相等，则返回 `NULL`；如果不相等，则返回第一个参数。当其中一个或两个参数为\
  \ `NULL` 时，结果将被判定为参数不相等的情况。`NULLIF` 的语法如下：\n\n`NULLIF(VALUE1, VALUE2)`\n\n我们可以这样查看\
  \ `NULLIF` 的实际作用：\n\n```\ncompany=# select NULLIF(1,2) as different, NULLIF(1,1)\
  \ as same;\ndifferent | same\n-----------+--------\n        1 |\n(1 row)\n```\n\n\
  ### 更多函数\n\n正如本章开头所述，这里介绍的内置函数和运算符并非完整列表，而只是对您可能遇到的最常见项的简要介绍。PostgreSQL 还提供了更专门的函数，例如几何函数和网络地址函数。您会发现\
  \ PostgreSQL 还提供了与内置运算符完全等效的函数，以及用于在各种数据类型之间转换数据的函数。要更深入地了解内置函数，您应该查阅 [`www.postgresql.org/docs/`](http://www.postgresql.org/docs/)\
  \ 上的在线文档。\n\n### 用户自定义函数\n\n尽管 PostgreSQL 提供了大量内置函数，但有时这些选项可能并不完全适用。为解决此问题，PostgreSQL\
  \ 提供了一套非常强大的工具，允许开发者编写用户自定义函数。\n\n实际上，PostgreSQL 更进一步，允许用户编写自己的自定义过程语言。这催生了十多种不同的过程语言，有些包含在\
  \ PostgreSQL 中，有些则可在外部获取。在本节中，我们将介绍 PostgreSQL 用户自定义函数的一些基本方面，包括以下内容：\n\n- 如何使用\
  \ SQL 编写基本函数\n- 如何使用 PL/pgSQL 语言创建更高级的函数\n- 在哪里可以找到有关外部过程语言包的更多信息\n\n#### 创建函数语法\n\
  \n在深入探讨用户自定义函数的具体细节之前，我们先来了解一下创建用户自定义函数的语法。所有函数都使用此相同的语法创建。\n\n```\nCREATE [ OR\
  \ REPLACE ] FUNCTION name ( [ [ argmode ] [ argname ]\nargtype [, ...] ] )\n[ RETURNS\
  \ returntype ]\n{ AS 'definition'\n| LANGUAGE langname\n| IMMUTABLE | STABLE | VOLATILE\n\
  | CALLED ON NULL INPUT | RETURNS NULL ON NULL INPUT | STRICT\n| [ EXTERNAL ] SECURITY\
  \ INVOKER | [ EXTERNAL ] SECURITY DEFINER\n} ...\n[ WITH ( attribute [, ...] ) ]\n\
  ```\n\n只要不存在另一个同名且参数相同的函数，使用 `CREATE FUNCTION` 命令将会创建一个新函数。使用 `CREATE OR REPLACE`\
  \ 版本的函数则会创建新函数或覆盖现有定义。命令的下一部分指定了一个 `name`（名称）和可选数量的表示不同数据类型的可选命名参数。接下来指定 `return\
  \ type`（返回类型），该类型将定义函数在其结果中提供的数据类型。函数 `definition`（定义）通过带引号的字符串提供，该字符串可以用单引号引用，也可以用美元符号（有时称为*美元引号*）引用。`language`（语言）指定将使用哪个过程语言处理程序来执行该函数——例如，对于基于\
  \ SQL 的函数使用 `'sql'`，对于基于 PL/pgSQL 的函数使用 `'plpgsql'`。\n\n\n\n#### PostgreSQL 函数选项详解\n\
  \n`CREATE FUNCTION`命令的其他选项都与性能或安全相关。三个选项`IMMUTABLE`、`STABLE`和`VOLATILE`向计划器提供关于函数性质的指示。`IMMUTABLE`函数是指输出在相同输入下不会改变的函数——例如，如果函数返回两个整数相加的结果。`STABLE`函数是指那些在给定查询执行期间保持不变的函数，例如在查询中选择`CURRENT_TIME`，它在事务期间保持静态。`VOLATILE`函数是指每次执行时输出都不同的函数——例如，将新数据插入表的函数。请注意，如果省略上述级别之一，默认将为`VOLATILE`。\n\
  \n下一组选项具有类似的性能影响。当程序被标记为`RETURNS NULL ON NULL INPUT`（也称为`STRICT`）时，当给定`NULL`输入时，它实际上不会被执行；相反，PostgreSQL\
  \ 将简单地返回`NULL`。与此相反的是默认操作`CALLED ON NULL INPUT`，意味着函数会被执行。请注意，如果函数代码中实现了返回`NULL`的结果，函数仍可能返回`NULL`，但代码在任何情况下都会被执行。接下来的两个选项定义函数应以哪个用户的身份执行，要么使用调用用户的默认行为（如`SECURITY\
  \ INVOKER`），要么使用函数的原始创建者（如`SECURITY DEFINER`）。`CREATE FUNCTION`中的`WITH *attribute*`子句是为向后兼容而保留的，但并非必需。\n\
  \n如果这一切看起来有些令人不知所措，别担心。当我们通过几个不同类型函数的示例来逐步讲解时，事情会变得更清晰。此外，所有性能和安全选项最初都可以省略，因为它们都有合理的默认值，在大多数情况下都能正常工作。重要的是熟悉所使用的语法，因为它适用于所有不同类型的函数语言。\n\
  \n#### SQL 函数\n\nPostgreSQL 函数最简单的形式是基于 SQL 的函数。SQL 函数无需外部库即可运行，因此内置于每个 PostgreSQL\
  \ 安装中。SQL 函数本质上不是过程性的；相反，它们只是在其内部封装一个或多个 SQL 查询。即使如此简单，它们仍然可以非常强大，实际上您会发现很多人使用这类函数来简化标准例程。为了更好地理解它们，让我们来看一个简单的\
  \ SQL 函数。\n\n```sql\nCREATE OR REPLACE FUNCTION firstfunc () RETURNS text AS\n$$\
  \ SELECT 'hello world'::text;\n$$ LANGUAGE 'sql' IMMUTABLE;\n```\n\n如您所见，此函数遵循前面章节中介绍的约定。我们从`CREATE\
  \ OR REPLACE`子句开始，然后将我们的函数命名为`firstfunc`。参数列表留空，因为该函数不接受任何参数。然后我们指定返回类型为`text`，因为计划返回一个文本字符串。接下来是函数定义，即一个简单的`SELECT`语句。接着指定函数要使用的语言，这里是`SQL`。最后，指定此函数为`IMMUTABLE`，意味着无论发生什么，它都会产生相同的输出。在`psql`中执行此函数的结果如下：\n\
  \n```\nphppg=# SELECT firstfunc();\n\n firstfunc\n------------\n hello world\n(1\
  \ row)\n```\n\n如果您还记得上一章，我们创建了一个包含一组员工信息的数据库。在下一个示例中，我们将创建一个函数，将新用户及其薪资信息插入到相应的表中：\n\
  \n```sql\nCREATE OR REPLACE FUNCTION newemployee(integer,text,text,integer) RETURNS\
  \ boolean AS $$\nINSERT INTO employee (employee_id,fname,lname)\nVALUES ($1,$2,$3);\n\
  INSERT INTO salary (employee_id, salary)\nVALUES ($1,$4);\nSELECT TRUE;\n```\n\n\
  \n\n```sql\n$$ LANGUAGE 'sql' RETURNS NULL ON NULL INPUT;\n```\n\n如你所见，此函数遵循与之前示例相同的语法，仅存在少量差异。其中一个差异在于，该函数现在将接收一系列参数，分别对应员工\
  \ ID、名、姓和薪资。若查看函数体，你会发现我们使用了一系列 SQL 语句来添加新员工及其薪资。我们还最终选择了 `TRUE` 值，以匹配返回类型并在成功完成时给出响应。最后，我们指明：如果任何输入参数为\
  \ `NULL`，则直接返回 `NULL`，因为我们的 `INSERT` 语句将失效。\n\n接下来，我们再次通过 `psql` 程序来查看此函数被调用时的效果。\n\
  \n```\nrob=# SELECT newemployee(4,'Amber','Lee',33000);\n\nnewemployee\n------------\n\
  t\n(1 row)\n```\n\n与之前一样，函数已执行，并返回了 `t`，表示它已运行完成。我们还可以查询相关表，以确保数值已正确插入。\n\n```\n\
  rob=# SELECT * FROM employee WHERE employee_id = 4;\n\nemployee_id | fname | lname\n\
  -------------+-------+-------\n4 | Amber | Lee\n(1 row)\n```\n\n员工已插入，但员工的薪资呢？\n\
  \n```\nrob=# SELECT * FROM salary WHERE employee_id = 4;\n\nemployee_id | salary\n\
  -------------+--------\n4 | 33000\n(1 row)\n```\n\n是的，薪资也正确插入了，因此我们的函数按预期工作。\n\n\
  至此，你应该开始看到使用函数带来的一些好处了。即便是像上述函数这样简单的例子，我们也能设定一个定义明确的流程来添加新员工，确保他们都能获得薪资，并消除诸如使用错误的\
  \ `employee_id` 号插入薪资这类小问题。\n\n从更宏观的角度看，拥有用于插入新员工的函数，还能让我们更改表定义。例如，无需更改应用程序代码中插入用户的方式，只要更新函数，就能合并\
  \ `employee` 和 `salary` 表。这是一个强大的理念，尤其是在结合更复杂的 SQL 语句或使用诸如 `PL/pgSQL` 等语言实现复杂过程逻辑时。\n\
  \n#### 基于 PL/pgSQL 的函数\n\n使用 `PL/pgSQL` 与使用常规 SQL 函数类似。它们都使用相同的语法创建函数，并包含相同的基本部分：函数名、参数列表、返回类型和函数体。然而，在深入学习之前，有几个重要差异需要留意。首先，PostgreSQL\
  \ 默认未安装 `PL/pgSQL`，因此在使用 `PL/pgSQL` 函数前，需确保你的数据库已安装该扩展。另一个差异在于，`PL/pgSQL` 有自己独特的语法结构来实现过程化任务。对于熟悉其他编程语言的人来说，这种语法并不复杂；但对于习惯于仅使用纯\
  \ SQL 的用户而言，则需适应。\n\n在本节中，我们将涵盖这两点差异，并通过几个 `PL/pgSQL` 函数示例进行讲解。\n\n##### 安装 PL/pgSQL\n\
  \n与其他过程语言一样，`PL/pgSQL` 在 PostgreSQL 中并没有内置的解释器。相反，这些语言通过一个 C 语言函数来处理，该函数充当解析、语法分析及执行函数体内代码的胶水代码。基于这种架构，`PL/pgSQL`\
  \ 在 PostgreSQL 中默认不启用，而必须由数据库管理员安装。在某些平台上，这可以通过操作系统自带的包管理系统完成；若不可行，则可以使用 PostgreSQL\
  \ 提供的 `createlang` 命令行程序。`createlang` 命令接受语言名称和数据库名称作为参数，例如：`createlang plpgsql\
  \ template1`。\n\n\n\n"
- "# PL/pgSQL 函数\n\n##### PL/pgSQL 语法\n\n安装完成后，创建 PL/pgSQL 函数与创建常规 SQL 函数非常相似。\n\n\
  最大的区别在于，PL/pgSQL 中的函数体通常可以更加复杂，因为 PL/pgSQL 提供了自身的语法来处理过程性事件。在接下来的章节中，我们将介绍该语法的主要部分。\n\
  \n##### 函数参数\n\n与 SQL 函数一样，PL/pgSQL 函数接受零个或多个函数参数列表，这些参数对应有效的数据类型。从 8.0 版本开始，PL/pgSQL\
  \ 还允许你在函数声明中使用“命名”参数。例如，你可以不采用以下简单的函数声明方式：\n\n```sql\nCREATE OR REPLACE FUNCTION\
  \ fa(integer,text) RETURNS ...\n```\n\n而是使用以下方式：\n\n```sql\nCREATE OR REPLACE FUNCTION\
  \ fa(a integer, b text) RETURNS ...\n```\n\n使用第二种方法，你可以在整个函数中通过 `a` 或 `b` 引用参数，而不是使用\
  \ `$1` 和 `$2` 这种序号语法。虽然差别不大，但这无疑提高了可读性，尤其是在大型函数中，一般建议在新的安装中使用。\n\n##### 变量声明\n\n\
  创建函数的下一步是声明变量。当我们编写 PL/pgSQL 函数时，所有变量在使用前都必须先声明。\n\nPL/pgSQL 中的变量可以是 PostgreSQL\
  \ 中的任何有效数据类型，或者是几种可用的特殊类型之一，其中最常用的两种是 `ALIAS` 和 `RECORD`。要在 PL/pgSQL 中声明变量，我们使用以下语法：\n\
  \n```sql\nvariable_name [constant] data_type [NOT NULL] [{DEFAULT | :=} value];\n\
  ```\n\n以下是一些变量声明的示例：\n\n```sql\nDECLARE\n    intvar INTEGER;\n    txtvar TEXT DEFAULT\
  \ 'this is a text variable';\n    intvar ALIAS FOR $1;\n    recvar RECORD;\n...\n\
  ```\n\n`ALIAS` 类型表明该变量仅仅是传入 `$1` 的函数参数的别名，并将采用该参数中的数据类型和值。`RECORD` 类型在 PL/pgSQL\
  \ 中充当一个占位符。声明时，它没有关联的数据类型；相反，它会采用 PL/pgSQL 函数内 SQL 语句结果集的那些属性。\n\n##### 赋值\n\n一旦声明了变量，你很可能希望为其分配数据。变量赋值的最简单形式遵循以下语法：\n\
  \n```sql\nvariable := expression\n```\n\n该变量应该是你之前声明过的，而表达式可以是任何能求值为所声明变量正确数据类型的内容。\n\
  \n也可以使用 `INTO` 关键字，将 SQL 语句的结果赋值给变量，例如：\n\n```sql\nSELECT txtcol, intcol FROM mytable\
  \ INTO txtvar, intvar;\n```\n\n或者，另一种形式：\n\n```sql\nSELECT txtcol, intcol INTO txtvar,\
  \ intvar FROM mytable;\n```\n\n在这两种情况下，变量都将采用 SQL 语句返回的值，并且这些变量可以通过其变量名被引用。\n\n\
  ##### 控制结构\n\n当然，与常规 SQL 相比，使用过程化语言的一大优势是你可以使用控制结构来帮助确定函数的执行流程。PL/pgSQL 中可用的控制结构通常与其他编程语言（如\
  \ PHP）中的控制结构没有什么不同。\n\n###### IF 块\n\n最常见的结构是 `IF` 块，它使用以下语法构成：\n\n```sql\nIF condition\
  \ THEN statement(s)\n[ [ ELSEIF | ELSIF ] condition THEN ] statement(s)\n[ ELSE\
  \ statement(s) ]\nEND IF;\n```\n\n`IF` 语句中使用的条件必须产生一个布尔表达式。`ELSEIF` 和 `ELSIF` 选项是等价的；两者没有区别，你可以根据需要添加任意多个。如果你愿意，还可以在\
  \ `IF` 语句中嵌套其他 `IF` 语句。同样，这与在 PHP 等语言中可以做的没有太大区别。\n\n###### WHILE 循环\n\nPL/pgSQL\
  \ 中的 `WHILE` 循环也与其他语言中的非常相似。在 `WHILE` 语句中，只要指定的条件为真，就会重复执行一个过程。`WHILE` 语句使用以下语法：\n\
  \n```sql\nWHILE condition LOOP\n    statement(s)\nEND LOOP;\n```\n\n与 `IF` 语句一样，`WHILE`\
  \ 语句中的条件必须是布尔表达式，如果你愿意，可以在一个 `WHILE` 语句中嵌套另一个 `WHILE` 语句。\n\n###### FOR 循环\n\nPL/pgSQL\
  \ 还允许你在函数中使用 `FOR` 循环。实际上，PL/pgSQL 中有两种类型的 `FOR` 循环：一种迭代固定次数的 `FOR` 循环，另一种遍历给定记录集的\
  \ `FOR` 循环。要创建一个迭代固定次数的 `FOR` 循环，我们使用以下语法：\n\n```sql\nFOR name IN [REVERSE] FROM\
  \ .. TO LOOP\n    statement(s)\nEND LOOP;\n```\n\n这种 `FOR` 循环中给出的 `name` 会被自动定义为一个整型变量，并且仅在该循环内存在。`FROM`\
  \ 和 `TO` 值必须是整数表达式，代表将要迭代的范围。与其他条件语句一样，你可以在循环中包含一个或多个语句，如果需要，也可以嵌套循环。\n\n另一种形式的\
  \ `FOR` 循环（可能也是更有用的一种）允许你遍历查询结果。这种 `FOR` 循环也是将结果赋值给 `RECORD` 变量的方式。其语法如下：\n\n```sql\n\
  FOR name IN [ query | EXECUTE text_expression ] LOOP\n    statement(s)\nEND LOOP;\n\
  ```\n\n命名变量应该是 `RECORD` 类型或特定表的行类型之一，并且应在函数的 `DECLARE` 部分中声明。这些值可以通过直接的 SQL 查询填充，也可以通过执行的文本表达式填充——例如，一个代表函数内动态创建的\
  \ SQL 语句的文本字符串。与其他控制结构一样，这种类型的 `FOR` 循环可以有一个或多个语句，如果需要，也可以有嵌套的控制结构。\n\n##### 错误处理\n\
  \n讨论 PL/pgSQL 中的错误处理时，主要涉及两个问题。第一个是在 PL/pgSQL 函数内部捕获错误，第二个是引发你自己的错误消息。\n\n######\
  \ 错误捕获\n\n通常，在函数内部，所有操作都在单个事务中运行，任何可能出现的错误（也许来自无效插入或其他类型的查询）都会导致函数终止，以及调用该函数的整个事务也终止。\n\
  \n在许多情况下，这种默认行为是完全可接受的，但有时你可能希望在遇到错误时执行替代命令，而不是让整个事务回滚。从 PostgreSQL 8.0 开始，PL/pgSQL\
  \ 通过在函数体中使用 `EXCEPTION` 子句来具备此能力。该命令的一般格式如下：\n\n```sql\n[ DECLARE\n    declarations\
  \ ]\nBEGIN\n    statement(s)\nEXCEPTION\n    WHEN condition [ OR condition ... ]\
  \ THEN\n        handler_statements\n    [ WHEN condition [ OR condition ... ] THEN\n\
  \        handler_statements\n    ... ]\nEND;\n```\n\n\n\n##### PL/pgSQL 错误处理与 `RAISE`\
  \ 命令\n\n当以这种方式声明函数块时，若未产生任何错误，则 `EXCEPTION` 部分将被直接跳过，函数会像往常一样继续处理。然而，如果 `BEGIN`\
  \ 之后列出的某个语句返回了错误，则后续语句将不会执行；反之，`EXCEPTION` 块中的语句将会被执行。在此过程中，`PL/pgSQL` 会搜索第一个与所发生错误相匹配的*条件*。如果未找到匹配的条件，它将像没有\
  \ `EXCEPTION` 命令一样继续执行；但如果找到了匹配的条件，则会执行对应的语句。\n\n##### 错误通知\n\n有时在处理 `PL/pgSQL`\
  \ 函数时，强制 `PostgreSQL` 在未发生实际错误时抛出一个错误可能是有益的。这可用于强制执行某些业务逻辑——例如，如果一个特定表应始终包含某个特定条目，而针对它的\
  \ `SELECT` 语句返回了零行。返回零行本身并非错误，但对于我们的应用程序来说，这可能是需要关注的。在某些情况下，这可能不足以构成错误，但或许应该发出某种类型的通知，以标记潜在问题。\n\
  \n对于此类情况，我们使用 `RAISE` 命令。`RAISE` 命令可以返回表 33-10 中所示的任一标准 `PostgreSQL` 日志级别。\n\n**表\
  \ 33-10.** *PL/pgSQL 中按严重性降序排列的 RAISE 级别*\n\n| 级别        |\n|-------------|\n| `EXCEPTION`\
  \ |\n| `WARNING`   |\n| `NOTICE`    |\n| `INFO`      |\n| `LOG`       |\n| `DEBUG`\
  \     |\n\n`RAISE` 命令的语法为：\n\n`RAISE level 'format' [, variable ... ];`\n\n格式可以是任何有效的字符串，并且可以包含\
  \ `%` 来表示相应的变量。\n\n以下是一个 `RAISE` 命令的示例：\n\n```\nRAISE WARNING '答案应该是 42，但实际是 %',\
  \ intvar;\n```\n\n您可以在 `PL/pgSQL` 函数的任意位置发出 `RAISE` 命令，而在 `EXCEPTION` 级别发出 `RAISE`\
  \ 将强制函数返回错误并导致事务回滚。\n\n> **提示：** 调试 `PL/pgSQL` 函数通常是一项挑战。一种技巧是大量使用 `RAISE DEBUG`\
  \ 语句，然后设置您的客户端来接收这些消息，这些消息通常会被大多数客户端忽略。\n\n##### 一个 `PL/pgSQL` 函数示例\n\n既然我们已经了解了\
  \ `PL/pgSQL` 的许多核心内容，下面让我们来看一个示例函数。\n\n```\nCREATE OR REPLACE FUNCTION hal2000(text)\
  \ RETURNS text AS $$\nDECLARE\n    someuser ALIAS FOR $1;\n    greeting TEXT;\n\
  \    ampm INTEGER;\nBEGIN\n    SELECT to_char(now(),'HH24') INTO ampm;\n    IF ampm\
  \ < 12 THEN\n        greeting := '早上好 ';\n    ELSE\n        greeting := '晚上好 ';\n\
  \    END IF;\n    greeting := greeting || someuser;\n    RETURN greeting;\nEND;\n\
  $$ LANGUAGE 'plpgsql';\n```\n\n在查看此函数的输出之前，我们先花点时间检查代码清单，以便您确切了解发生了什么。第一行应该很熟悉，我们命名了函数，指定了一个输入参数，然后指定了过程执行时要返回的数据类型。\n\
  \n下一部分涉及 `PL/pgSQL` 函数体的一些细节。在第一部分中，我们声明了三个变量以供使用，其中一个是我们输入参数的 `ALIAS`。声明完变量后，我们开始函数的语句部分，以\
  \ `BEGIN` 命令开始。\n\n> **注意：** 此处的 `BEGIN` 命令不应与用于控制事务的 `BEGIN` 命令混淆。在这种情况下，它仅用作函数中过程化命令开始的标记。\n\
  \n函数的第一条语句使用内置的 `TO_CHAR` 函数将当前时间的小时部分提取到名为 `ampm` 的变量中。这是一个重要的提醒，我们可以在函数中嵌套其他函数调用，包括内置函数和用户自定义函数。填充完\
  \ `ampm` 变量后，我们使用 `IF ... THEN ... ELSE` 结构来测试该变量是否大于或小于 12，并根据结果将相应的字符串赋值给 `greeting`\
  \ 变量。然后，我们将 `greeting` 变量与传入函数的值拼接起来。在结束函数之前，我们必须返回一个值，因此我们发出 `RETURN` 命令，传递 `greeting`\
  \ 变量的结果。返回变量后，我们只需用 `END` 标记结束函数，然后声明函数语言。让我们看看它的实际效果：\n\n```\nrob=# SELECT hal2000('Dave');\n\
  \   hal2000\n----------------\n Dave 早上好\n(1 row)\n```\n\n如您所见，我们的函数返回了值，就像从表中查询到的一样。\n\
  \n### 其他过程化语言\n\n尽管 `PL/pgSQL` 是一个非常强大的工具，甚至可以作为完整应用的基础，但有时将某些功能构建到 `PL/pgSQL` 函数中可能会显得繁琐。当您需要执行诸如复杂字符串解析或处理复杂数学公式等操作时，通常会出现这种情况。此时，研究其他可用的过程化语言通常是值得的。\n\
  \n在撰写本文时，`PostgreSQL` 有十二种不同的函数语言可用。表 33-11 列出了当前可用的语言以及下载信息和许可证信息。\n\n**表 33-11.**\
  \ *PostgreSQL 函数语言*\n\n| 语言         | 许可证       | 主页                           \
  \                                    |\n|--------------|--------------|--------------------------------------------------------------------|\n\
  | `PL/C`       | BSD          | 包含在核心发行版中                                      \
  \           |\n| `PL/J`       | BSD 类       | http://plj.codehaus.org/index.html\
  \                                 |\n| `PL/Java`    | BSD 类       | http://pgfoundry.org/projects/pljava\
  \                               |\n| `PL/Mono`    | BSD          | http://gborg.postgresql.org/project/plmono/\
  \                        |\n| `PL/Perl`    | BSD          | 包含在核心发行版中          \
  \                                       |\n| `PL/PHP`     | BSD, PHP     | http://www.commandprompt.com/community/plphp/\
  \                      |\n| `PL/Python`  | BSD          | 包含在核心发行版中            \
  \                                     |\n| `PL/R`       | GPL          | http://www.joeconway.com/plr/\
  \                                      |\n| `PL/Ruby`    | Ruby         | http://raa.ruby-lang.org/project/pl-ruby\
  \                           |\n| `PL/sh`      | BSD          | http://plsh.projects.postgresql.org/\
  \                               |\n| `PL/TCL`     | BSD          | 包含在核心发行版中   \
  \                                              |\n| `SQL`        | BSD         \
  \ | 包含在核心发行版中                                                 |\n\n### 一个外部过程化语言示例\n\
  \n显然我们无法在此逐一介绍所有这些语言，但我们希望让您对其中一种其他语言有所了解。清单 33-1 展示了一个用 `PL/PHP` 编写的示例函数。\n\n**清单\
  \ 33-1.** *一个 PL/PHP 函数示例*\n\n```\nCREATE OR REPLACE FUNCTION phpmail(text,text,text)\
  \ RETURNS integer AS $$\n    $to = $arg0;\n    $subject = $arg1;\n    $body = $arg2;\n\
  \    if (mail($to, $subject, $body)) {\n        return 1;\n    } else {\n      \
  \  return 0;\n    }\n$$ LANGUAGE 'plphp';\n```\n\n无需担心函数的语法（尽管它足够简单，如果您熟悉 PHP，应该能理解），我们希望您看到，即使是这种外部开发的语言，也遵循着其他\
  \ `PostgreSQL` 函数相同的基本结构。该函数有一个名称，接受若干参数，有一个返回类型以及包含操作代码的函数体。如果您计划在数据库中实现复杂的逻辑，请不要害怕为您的项目研究这些外部语言。\n\
  \n### 总结\n\n\n\n"
- "# PostgreSQL 触发器\n\n在上一章中，我们探讨了 PostgreSQL 中的用户自定义函数，特别是 PL/pgSQL 函数。本章将深入探讨用户自定义函数最常见的用途之一——驱动触发器，并涵盖以下内容：\n\
  \n- 不同类型触发器的定义及其触发时机\n- 创建、修改和删除触发器的语法\n- 普通函数与触发器函数之间的区别\n\n触发器是非常强大的工具，可用于在数据库内部执行一系列任务，例如审计数据集、记录事件发生情况，或限制对特定数据的访问。\n\
  \n### 什么是触发器？\n\n从广义上讲，*触发器*定义了基于数据库中特定事件发生的特定操作。在 PostgreSQL 中，这指的是基于对特定表执行的某个操作而执行的存储过程。所有触发器都由六个特性定义：\n\
  \n- 触发器的名称\n- 触发器应触发的时机\n- 触发器应响应的事件\n- 触发器应作用的数据表\n- 执行的频率\n- 应调用的函数\n\n通过组合这六个特性，PostgreSQL\
  \ 允许你通过其触发器系统创建相当广泛的功能。\n\n### 添加触发器\n\n你可以使用 `CREATE TRIGGER` 命令向 PostgreSQL 添加触发器。发出此命令时，你将定义触发器的六个不同特性。语法如下：\n\
  \n```\nCREATE TRIGGER 名称\n{ BEFORE | AFTER }\n{ 事件[ OR ... ] }\nON 表名\n[ FOR [ EACH\
  \ ] { ROW | STATEMENT } ]\nEXECUTE PROCEDURE 函数名 ( 参数 )\n```\n\n如你所见，每个部分对应六个特性之一。第一部分指定触发器的名称。触发器名称对于任何给定的表必须是唯一的，但可以在不同的表中重复。触发器名称的另一个重要方面是，指定在同一时刻对同一表执行的触发器将按字母顺序执行。\n\
  \n触发器定义的第二部分设置了触发器应在事务中的哪个时间点执行。`BEFORE` 触发器会在触发查询所做的更改应用于事务*之前*执行其过程。`AFTER` 触发器会在触发查询所做的更改在事务中生效*之后*执行其过程。\n\
  \n事件部分指定了触发器将执行的查询类型，即 `DELETE`、`INSERT` 或 `UPDATE`，但不能是 `SELECT`。如果需要，你可以让触发器响应多个事件，例如同时响应插入和更新。\n\
  \n接下来，你需要定义触发器将作用于哪个表。一个触发器只能分配给一个表，但如果过程编写得足够通用，则不同表上的多个触发器可以调用同一个过程。\n\n下一步是定义所执行函数的调用频率：每条语句执行一次，或者受语句影响的每一行执行一次。当触发器按行执行时，被调用的函数可以通过适当地使用\
  \ `NEW` 或 `OLD` 结构来访问所影响每一行中的数据，从而使你能够逐行操作每个被修改行的数据。语句级触发器仅为整个查询调用一次，并且无法访问被操作的数据。我们稍后会进一步讨论\
  \ `NEW` 和 `OLD` 结构。\n\n最后一步是定义将由触发器执行的过程。并非所有过程都能被触发器调用；要符合条件，该过程必须返回 `trigger`\
  \ 数据类型，并且该过程的语言处理程序必须能够处理触发器信息。目前大多数语言都支持触发器，包括 PL/C、PL/pgSQL、PL/Perl 和 PL/PHP，但在使用特定语言之前，请务必确认其支持情况。\n\
  \n### 修改触发器\n\n触发器创建后，你可以使用 `ALTER TRIGGER` 命令对其进行修改。目前，你只能修改给定触发器的名称，但这种修改不仅仅是外观上的改变——它还会影响触发器的触发顺序，因为为同一表上同一操作同时定义的触发器会按字母顺序执行。修改触发器的语法如下：\n\
  \n```\nALTER TRIGGER 名称 ON 表名 RENAME TO 新名称;\n```\n\n要修改触发器，你必须拥有触发器定义中所指定表的所有权。\n\
  \n### 删除触发器\n\n你也可以使用 `DROP TRIGGER` 命令从表中删除触发器。该命令的语法如下：\n\n```\nDROP TRIGGER 名称\
  \ ON 表名 [CASCADE | RESTRICT]\n```\n\n要删除触发器，你必须拥有触发器定义中所指定表的所有权。`CASCADE` 或 `RESTRICT`\
  \ 选项控制删除触发器时是否同时删除任何依赖对象，或者在处理完所有依赖对象之前是否拒绝删除。默认行为是 `RESTRICT`。\n\n### 编写触发器函数\n\
  \n当然，在 PostgreSQL 中使用触发器的另一半是这些触发器所执行的函数。触发器函数在大多数方面与其他函数相似；它们以相同的方式定义，并且触发器函数内部的语法操作方式也与其他任何函数相同。但是，你应该注意触发器函数的一些不同之处：\n\
  \n- 触发器函数不能带参数。\n- 触发器函数可以访问特殊结构 `NEW` 和 `OLD`，它们分别表示要插入行的新数据（来自插入或更新操作）或行中先前包含的旧数据（来自更新或删除操作）。\n\
  - 触发器函数的返回类型必须是 `trigger` 类型。\n\n除了这三个主要区别之外，在处理触发器函数时，你还需要了解一些事项。在函数体内，被按语句调用的触发器函数应始终返回\
  \ `NULL`。如果你希望跳过对当前行的操作，可以在查询执行前触发的行级触发器中返回 `NULL`。你还可以为插入和更新的行级 `BEFORE` 触发器函数返回\
  \ `NEW`，这将用触发器函数中的数据替换要放入表中的数据。对于 `AFTER` 触发器函数，返回值会被忽略，因此通常建议直接返回 `NULL`。\n\n当你试图记住哪些触发器何时触发时，关于前置和后置以及语句级与行级触发器的讨论有时会令人困惑。表\
  \ 34-1 显示了给定表上不同触发器的操作顺序。\n\n**表 34-1.** *触发器操作顺序*\n\n| 时机 | 频率     | 顺序 |\n|------|----------|------|\n\
  | Before | 语句级  | 1    |\n| Before | 行级    | 2    |\n| After  | 行级    | 3    |\n\
  | After  | 语句级  | 4    |\n\n\n\n之前\n\n语句级触发器\n\n按触发器名称字母顺序排列\n\n之前\n\n行级触发器\n\n\
  按触发器名称字母顺序排列\n\n**正在执行触发查询**  \n（`Insert`、`Update` 或 `Delete`）\n\n之后\n\n行级触发器\n\n\
  按触发器名称字母顺序排列\n\n之后\n\n语句级触发器\n\n按触发器名称字母顺序排列\n\n一旦触发器被触发，PostgreSQL 将按这些步骤执行，执行所有找到的触发器函数。如果某个触发器函数恰好触发了其他触发器（例如通过向另一个表插入数据），PostgreSQL\
  \ 会先在该表上执行这些步骤，直到处理完毕，再返回原始表继续处理剩余的触发器。\n\n**注意** 你经常会看到这种一个触发器触发另一个触发器的过程被称为*级联触发器*。\n\
  \n### 示例触发器函数\n\n虽然编写触发器函数并不困难，但我们希望向你展示一个解决最常见触发器函数操作问题的示例：持续更新时间戳字段。在此场景中，你将修改第\
  \ 32 章中使用的 `employee` 表，添加一个用于标记表中信息最后更新时间的字段。然后，你将使用一个触发器来确保只要表中的数据被修改，该信息就会自动更新。首先，添加新列：\n\
  \n```\ncompany=# ALTER TABLE employee ADD COLUMN last_updated timestamptz; ALTER\
  \ TABLE\n```\n\n清单 34-1 展示了触发器函数的语法。\n\n**清单 34-1.** *一个简单的触发器函数*\n\n```\nCREATE\
  \ OR REPLACE FUNCTION last_updated() RETURNS trigger AS\n$$\nBEGIN\n    NEW.last_updated\
  \ = now();\n    RETURN NEW;\nEND\n$$ LANGUAGE 'plpgsql';\n```\n\n虽然这个函数很简单，但你可以看到它如何整合了触发器函数所需的各种变更：它不接受参数，并返回\
  \ `trigger` 类型。在函数内部，你使用了 `NEW` 结构，该结构包含将要插入到表中的数据，通过设置 `NEW` 结构的 `last_updated`\
  \ 列的值，并返回修改后的 `NEW` 行。随后，该行将被插入到数据库中，其中包含新设置的 `last_updated` 列。由于 `INSERT` 和 `UPDATE`\
  \ 都会向表中输入新数据，因此该函数适用于这两种查询类型。\n\n当然，下一步是将触发器添加到表中。由于你想在数据被插入表之前对其进行操作，因此你将创建一个 `BEFORE`\
  \ 触发器。同时，由于你想确保每一行都被更新，你将选择频率 `FOR EACH row`。语法如下：\n\n```\nCREATE TRIGGER last_updated\n\
  BEFORE insert OR update\nON employee\nFOR EACH row\nEXECUTE PROCEDURE last_updated();\n\
  ```\n\n创建此触发器后，任何后续的插入或更新操作都会更新这个新字段。让我们双重检查以确保一切按预期工作：\n\n```\ncompany=# UPDATE\
  \ employee SET fname = 'Emilia' WHERE employee_id = 3; UPDATE 1\ncompany=# SELECT\
  \ * FROM employee WHERE employee_id = 3;\nemployee_id | fname | lname | last_updated\n\
  -------------+--------+-------+-------------------------------\n3 | Emilia | Jane\
  \ | 2005-12-20 12:11:24.86753-09\n(1 row)\n```\n\n如你所见，`last_updated` 字段已按预期更新。值得注意的是，即使你为\
  \ `last_updated` 列指定了显式值，触发器也会触发。在这种情况下，指定的值将在 `NEW` 结构中被替换，并使用系统生成的时间。\n\n**提示**\
  \ 如果函数编写得足够通用，同一个函数可以被多个触发器使用。在前面的例子中，任何包含名为 `last_updated` 列的表都可以使用这个触发器函数。\n\n\
  在下一个例子中，你将进一步了解触发器函数。这次你将同时使用 `OLD` 和 `NEW` 结构，并且你将更新另一个表，而不是触发器所在的表。首先，让我们在 company\
  \ 数据库中添加另一个示例表：\n\n```\nCREATE TABLE email (\n    employee_id INTEGER PRIMARY KEY\
  \ REFERENCES employee(employee_id),\n    address TEXT\n);\n```\n\n然后继续向表中添加一条记录：\n\
  \n```\nINSERT INTO email (employee_id, address)\nVALUES (3, 'EmiliaJ@example.com');\n\
  ```\n\n现在，在继续之前，先看看这些数据：\n\n```\ncompany=# SELECT employee_id, fname, lname, address\n\
  company-# FROM employee JOIN email\ncompany-# USING (employee_id) WHERE employee_id\
  \ = 3 ;\nemployee_id | fname | lname | address\n-------------+--------+-------+---------------------\n\
  3 | Emilia | Jane | EmiliaJ@example.com\n```\n\n现在你已经有了可以处理的数据，接下来继续设置触发器。在这个例子中，假设公司决定希望员工的电子邮件地址遵循“名字首字母+姓氏首字母”的格式。为了实现这一点，你将设置一个触发器函数，以便在员工姓名发生更改时更新\
  \ `email` 表。第一步是创建触发器函数：\n\n```\nCREATE OR REPLACE FUNCTION email_address_change()\
  \ RETURNS TRIGGER AS\n$$\nDECLARE\n    lastinitial TEXT;\n    domain TEXT := '@example.com';\n\
  \    fulladdress TEXT;\nBEGIN\n    IF TG_OP = 'UPDATE' THEN\n        IF NEW.fname\
  \ <> OLD.fname OR NEW.lname <> OLD.lname THEN\n            SELECT substr(NEW.lname,1,1)\
  \ INTO lastinitial;\n            fulladdress := NEW.fname || lastinitial || domain;\n\
  \            UPDATE email SET address = fulladdress\n            WHERE employee_id\
  \ = NEW.employee_id;\n        END IF;\n    END IF;\n    RETURN NEW;\nEND;\n$$ LANGUAGE\
  \ 'plpgsql';\n```\n\n由于这个函数有点复杂，在继续创建触发器之前，我们先暂停一下。函数的第一行现在应该看起来相当熟悉了；你创建了函数，为其命名并指定了特殊的\
  \ `TRIGGER` 返回类型。接下来，你声明了一些变量，用于在函数内部操作数据。\n\n至此，你已经准备好开始实现函数的真正逻辑。在这个例子中，我们使用了一对嵌套的\
  \ `IF` 语句。第一个 `IF` 语句验证触发器是通过 `UPDATE` 语句调用的，第二个 `IF` 语句判断员工的名或姓是否发生了变化。虽然这是一个展示\
  \ PL/pgSQL 如何允许你嵌套控制结构的好例子，但为了函数能正确运行，这也是必需的。在 PL/pgSQL 中，条件判断不会“短路”，这意味着在确定条件判断的最终结果之前，条件判断的所有部分都会被评估。如果我们将这些嵌套的\
  \ `IF` 语句写成一个单一的 `IF`，例如：\n\n```\nIF TG_OP = 'UPDATE' AND NEW.fname <> OLD.fname\
  \ OR NEW.lname <> OLD.lname THEN\n```\n\n那么当从 `INSERT` 语句调用时，该函数会返回错误，因为 PL/pgSQL\
  \ 会尝试确定 `NEW.fname <> OLD.fname` 以及 `TG_OP = 'UPDATE'`，但对于 `INSERT` 语句来说，并没有 `OLD`\
  \ 结构可用。这种行为与许多编程语言略有不同，因此需要小心，即使是经验丰富的程序员有时也会因此出错。\n\n另一个值得仔细研究的项目是 `TG_OP` 变量。`TG_OP`\
  \ 表示一个文本字符串，告诉你函数是被 `INSERT`、`UPDATE` 还是 `DELETE` 触发的。实际上，PostgreSQL 在触发器函数中提供了相当多的这类特殊变量。表\
  \ 34-2 提供了这些特殊变量的更详细列表。\n\n**表 34-2.** *触发器函数的特殊变量*\n\n| 变量名 | 定义 |\n|--------|------|\n\
  | `NEW` | 在行级触发器中包含 `INSERT` 和 `UPDATE` 操作的新数据库行；在语句级触发器中为 `NULL`。数据类型为 `RECORD`。\
  \ |\n| `OLD` | |\n\n\n\n`TG_OLD` 包含行级触发器中 `UPDATE` 和 `DELETE` 操作的旧数据库行；在语句级触发器中为\
  \ `NULL`。数据类型为 `RECORD`。\n\n`TG_LEVEL` 包含基于触发器定义的字符串 `ROW` 或 `STATEMENT`。数据类型为 `TEXT`。\n\
  \n`TG_NAME` 包含实际触发的触发器名称。数据类型为 `NAME`。\n\n`TG_NARGS` 包含 `CREATE TRIGGER` 语句中传递给触发器过程的参数数量。数据类型为\
  \ `INTEGER`。\n\n`TG_OP` 包含基于触发触发器的操作对应的字符串 `INSERT`、`UPDATE` 或 `DELETE`。数据类型为 `TEXT`。\n\
  \n`TG_RELID` 包含导致触发器被触发的表的对象 ID。数据类型为 `OID`。\n\n`TG_RELNAME` 包含导致触发器被触发的表的名称。数据类型为\
  \ `NAME`。\n\n`TG_WHEN` 包含基于触发器定义的字符串 `BEFORE` 或 `AFTER`。数据类型为 `TEXT`。\n\n`TG_ARGV[]`\
  \ 包含来自 `CREATE TRIGGER` 语句的参数，从 0 开始。数据类型为 `TEXT`。\n\n---\n\n回到我们的函数，一旦确定满足适当条件，就开始构建新的电子邮件地址。首先确定姓氏的首字母，然后（使用\
  \ SQL 的 `||` 运算符）将名字、姓氏首字母和域名拼接在一起。获得新的电子邮件地址后，更新 `address` 表中的相应记录，然后发出 `RETURN`\
  \ 语句。\n\n现在函数已经完成，我们来创建触发器：\n```\nCREATE TRIGGER maintain_email\nAFTER update OR\
  \ insert\nON employee\nFOR EACH row\nEXECUTE PROCEDURE email_address_change();\n\
  ```\n如您所见，此触发器定义看起来与第一个示例非常相似，唯一显著的区别在于这里选择将其设为 `AFTER` 触发器。这样做的原因是无需修改即将插入到 `employee`\
  \ 表中的任何数据，因此无需事先触发触发器。这些部分就位后，让我们看看实际变更效果：\n```\ncompany=# UPDATE employee SET fname='Emma'\
  \ WHERE employee_id = 3;\nUPDATE 1\n\ncompany=# SELECT employee_id, fname, lname,\
  \ address\ncompany-# FROM employee JOIN email\ncompany-# USING (employee_id) WHERE\
  \ employee_id = 3 ;\n\nemployee_id | fname | lname | address\n-------------+--------+-------+---------------------\n\
  3           | Emma  | Jane  | EmmaJ@example.com\n```\n如您所见，触发器在 `employee` 表更新后成功更新了\
  \ `address` 表，完全符合预期。使用这些技术，您应该能够开始看到如何直接在数据库层面强制执行最复杂的业务规则集，并且以这种方式强制执行有助于保持数据规范，无论是从命令行、通过\
  \ Web 应用程序，甚至是通过 shell 脚本进行更新。\n\n### 查看现有触发器\n\n有时在处理数据库时，需要查看是否有任何触发器参与修改给定表。大多数管理工具不会查询数据库中的完整触发器列表，而是根据触发器依赖的表对它们进行分组。例如，在\
  \ `psql` 中，当描述一个表时，您会看到以下输出：\n```\ncompany=# \\d employee\n\nTable \"public.employee\"\
  \n    Column    |           Type           | Modifiers\n--------------+--------------------------+-----------\n\
  employee_id   | integer                  | not null\nfname         | text      \
  \               |\nlname         | text                     |\nlast_updated  | timestamp\
  \ with time zone |\nIndexes:\n    \"employee_pkey\" PRIMARY KEY, btree (employee_id)\n\
  Triggers:\n    last_updated BEFORE INSERT OR UPDATE ON employee FOR EACH\n     \
  \   ROW EXECUTE PROCEDURE last_updated()\n    maintain_email AFTER UPDATE OR INSERT\
  \ ON employee FOR EACH\n        ROW EXECUTE PROCEDURE email_address_change()\n```\n\
  在此输出中，显示了完整的触发器定义，包括触发器名称及其调用的函数。\n\n### 规则 vs. 触发器\n\n一个常见问题涉及到何时使用触发器而非规则。在许多情况下，两者的使用可能可以互换。然而，有时一种方法优于另一种方法。您可能想坚持使用规则的一个原因是，如果您不想涉及编写数据库函数（实现触发器需要编写函数）。规则胜出的另一个场景是处理针对视图的数据修改。在这种情况下，您唯一的选择是使用规则，因为视图中没有数据供触发器操作。\n\
  \n当然，触发器也有其优势。一方面，触发器概念在数据库系统中更为常见，因此触发器可能更容易被大多数人理解。触发器还可以利用 PostgreSQL 提供的各种函数语言中的过程能力或其他高级功能，比规则强大得多。\n\
  \n### 总结\n\n在本章中，我们研究了在 PostgreSQL 中使用触发器所涉及的基本概念。我们介绍了有助于定义触发器的六个不同特征，并探讨了这些特征如何影响触发器操作。我们还讨论了编写触发器函数与常规函数之间的区别，并展示了一个示例函数以及一个使用该函数的触发器。虽然触发器不直接交互，但它们的功能和实用性可以大大增强您的应用程序，并使您的应用程序代码更简单、更有效。\n\
  \n---\n\n"
- '# 第三十五章 索引与搜索


  在第二十八章中，我们简要介绍了主键和唯一键的概念，定义了各自的作用，并向您展示了如何识别它们并将其整合到表结构中。索引在数据库开发中扮演着如此重要的角色，我们认为值得为此功能投入更多时间。在本章中，我们将进一步向您介绍这些重要概念。我们还将展示如何创建用于搜索
  PostgreSQL 数据库的 Web 界面。具体来说，我们将讨论以下主题：


  - **数据库索引：** 我们将定义并讨论通用的数据库索引术语和概念，并向您展示如何创建主键、唯一、普通、部分、函数式和全文 PostgreSQL 索引。

  - **基于表单的搜索：** 在本章的后半部分，我们将向您展示如何创建一个 PHP 支持的搜索界面，用于查询您可能刚刚建立索引的 PostgreSQL 表。


  ### 数据库索引


  一般来说，将索引引入 PostgreSQL 数据库开发策略可以带来三个优势：


  - **查询优化：** 索引本质上是表列的一个有序（或索引）子集，每个行条目指向其对应的表行。在索引子集内工作可以更快地处理查询请求，因为它消除了搜索整个表的必要，而是专注于存储在预定义顺序中的相对较小的切片。

  - **数据唯一性：** 通常需要一种方法来根据已知对该行唯一的值或值集合来标识数据行。例如，考虑一个存储公司员工信息的表。此表可能包含关于特定员工的姓名、电话号码和社会安全号码的信息。虽然两个或多个员工可能共享相同的姓名（例如
  John Smith），并且共用办公室可能需要使用相同的电话号码，但您知道没有两个人应该拥有相同的社保号码。




