    \ of notifying disparate and varying components about system events. You also\
    \ revisited the Composite example; and with the Visitor pattern, learned how to\
    \ pay a call on, and apply many operations to, every component in a tree. You\
    \ even saw how the Command pattern can help you to build an extensible tiered\
    \ system. Finally, you saved yourself a heap of checking for nulls with the Null\
    \ Object pattern.\n\nIn the next chapter, I will step further beyond the Gang\
    \ of Four to examine some patterns specifically oriented toward enterprise programming.\n\
    \n# 12. Enterprise Patterns\n\nPHP is, first and foremost, a language designed\
