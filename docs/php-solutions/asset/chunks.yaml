- fmt: '### Creating the Blog Database Table


    If you just want to get on with studying the content management pages, import
    the table structure and data from `blog.sql` from the `ch13` folder. Open phpMyAdmin,
    select the `phpsols` database, and import the table in the same way as in [Chapter
    10](#A978-1-4842-0635-5_10_Chapter.html). The SQL file creates the table and populates
    it with four short articles.


    If you would prefer to create everything yourself from scratch, open phpMyAdmin,
    select the `phpsols` database, and click the `Structure` tab if it’s not already
    selected. In the `Create table` section, type `blog` in the `Name` field and `5`
    in the `Number of columns` field. Then click `Go`. Use the settings shown in the
    following screenshot and Table [13-1](#A978-1-4842-0635-5_13_Chapter.html#Tab1).


    ![A978-1-4842-0635-5_13_Figa_HTML.jpg](A978-1-4842-0635-5_13_Figa_HTML.jpg)


    **Table 13-1.** Column definitions for the `blog` table


    | Field | Type | Length/Values | Default | Attributes | Null | Index | A_I |

    | --- | --- | --- | --- | --- | --- | --- | --- |

    | `article_id` | `INT` | | | `UNSIGNED` | Deselected | `PRIMARY` | Selected |

    | `title` | `VARCHAR` | `255` | | | Deselected | | |

    | `article` | `TEXT` | | | | Deselected | | |

    | `created` | `TIMESTAMP` | | `CURRENT_TIMESTAMP` | | Deselected | | |

    | `updated` | `TIMESTAMP` | | `CURRENT_TIMESTAMP` | `on update CURRENT_TIMESTAMP`
    | Deselected | | |


    The default value of the `created` and `updated` columns is set to `CURRENT_TIMESTAMP`.
    So, both columns get the same value when a record is first entered. The `Attributes`
    column for `updated` is set to `on update CURRENT_TIMESTAMP`. This means it will
    be updated whenever a change is made to a record. To keep track of when a record
    was originally created, the value in the `created` column is never updated.


    ### Creating the Basic Insert and Update Form


    SQL makes an important distinction between inserting and updating records by providing
    separate commands. `INSERT` is used only for creating a brand-new record. Once
    a record has been inserted, any changes must be made with `UPDATE`. Since this
    involves working with identical fields, it is possible to use the same page for
    both operations. However, this makes the PHP more complex, so I prefer to create
    the HTML for the insert page first, save a copy as the update page, and then code
    them separately.


    The form in the insert page needs just two input fields: for the title and the
    article. The contents of the remaining three columns (the primary key and the
    two timestamps) are handled automatically. The code for the insert form looks
    like this:


    ```

    <form method="post" action="">

    <p>

    <label for="title">Title:</label>

    <input name="title" type="text" id="title">

    </p>

    <p>

    <label for="article">Article:</label>

    <textarea name="article" id="article"></textarea>

    </p>

    <p>

    <input type="submit" name="insert" value="Insert New Entry" id="insert">

    </p>

    </form>

    ```


    The form uses the `post` method. You can find the full code in `blog_insert_01.php`
    in the `ch13` folder. The content management forms have been given some basic
    styling with `admin.css`, which is in the `styles` folder. When viewed in a browser,
    the form looks like this:


    ![A978-1-4842-0635-5_13_Figb_HTML.jpg](A978-1-4842-0635-5_13_Figb_HTML.jpg)


    The update form is identical except for the heading and Submit button. The button
    code looks like this (the full code is in `blog_update_mysqli_01.php` and `blog_update_pdo_01.php`):


    ```

    <input type="submit" name="update" value="Update Entry" id="update">

    ```


    I’ve given the title and article input fields the same names as the columns in
    the `blog` table. This makes it easier to keep track of variables when coding
    the PHP and SQL later.


    **Tip**


    As a security measure, some developers recommend using different names from the
    database columns because anyone can see the names of input fields just by looking
    at the form’s source code. Using different names makes it more difficult to break
    into the database. This shouldn’t be a concern in a password-protected part of
    a site. However, you may want to consider the idea for publicly accessible forms,
    such as those used for user registration or login.


    ### Inserting New Records


    The basic SQL for inserting new records into a table looks like this:


    ```

    INSERT [INTO] table_name (column_names)

    VALUES (values)

    ```


    The `INTO` is in square brackets, which means that it’s optional. It’s purely
    there to make the SQL read a little more like human language. The column names
    can be in any order you like, but the values in the second set of parentheses
    must be in the same order as the columns they refer to.


    Although the code is very similar for MySQLi and PDO, I’ll deal with each one
    separately to avoid confusion.


    **Note**


    Many of the scripts in this chapter use a technique known as “setting a flag.”
    A `flag` is a Boolean variable that is initialized to either `true` or `false`
    and used to check whether something has happened. For instance, if `$OK` is initially
    set to `false` and reset to `true` only when a database query executes successfully,
    it can be used as the condition controlling another code block.'
