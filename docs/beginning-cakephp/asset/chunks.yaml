    <div class="vote"><?=$votes;?></div>


    Go ahead and refresh the Posts view, and click the Ajax links to vote comments
    up and down. The total number of votes should automatically change in the background
    without any page reloads, and this was all done without submitting any forms,
    like in Figure 8-4\. Using the $ajax->link() function allows you to do similar
    asynchronous tasks easily in a way that’s often easier and more fun for the user.
