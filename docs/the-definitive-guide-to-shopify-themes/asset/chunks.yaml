    ### 产品视频


    在产品页面添加相关的视频可以带来显著的转化率提升²，并且越来越多的在线零售商很可能会利用视频来更好地展示其产品和独特卖点。


    如何将视频整合到主题中，取决于高质量视频是适用于所有产品，还是仅适用于部分产品。如果商店中每一件产品都有高质量的大尺寸视频，那么在每个产品页面上为这些视频预留出显眼的空间就很有意义，如图
    5-6 所示的 Sonos 网站。


    ![A437216_1_En_5_Fig6_HTML.jpg](img/A437216_1_En_5_Fig6_HTML.jpg)


    图 5-6


    Sonos 在其产品页面上突出展示了产品视频


    对于那些并非所有产品都有视频，或者每件产品有多个视频的商店，主题可以通过第二个“缩略图”区域来展示这些视频。


    避免使用会自动加载并显示控件或品牌标识（例如 YouTube）的视频嵌入工具，因为它们可能会分散用户的注意力。实际上，出于性能考虑，最好避免在页面加载时加载任何依赖大量
    JavaScript 的播放器，而是提供一个图片，当用户点击该图片时，再触发视频播放器弹窗或嵌入。请参见图 5-7。


    ![A437216_1_En_5_Fig7_HTML.jpg](img/A437216_1_En_5_Fig7_HTML.jpg)


    图 5-7


    Boosted Boards 在展示其产品方面做得不错，但他们的一些产品缩略图是视频。他们可以通过在这些缩略图上添加“播放视频”覆盖层来提高可发现性。


    ### 添加产品详情与“加入购物车”表单


    回到示例主题，我们现在来充实图 5-4 中桌面版模拟图右侧的内容：产品详情、描述以及一个基本的“加入购物车”表单。代码清单 5-2 展示了实现此功能所需的简化版
    Liquid 代码，图 5-8 显示了其在浏览器中的呈现效果。


    ![A437216_1_En_5_Fig8_HTML.jpg](img/A437216_1_En_5_Fig8_HTML.jpg)


    图 5-8


    添加了产品信息和“加入购物车”表单的示例产品页面


    ```

    ... (产品图片代码已省略) ...


    {{ product.title | escape }}

    {{ product.vendor | escape }}

    {% if product.price_varies %}{{ product.price_min | money }} - {{ product.price_max
    | money }}{% else %}{{ product.price | money }}{% endif %}

    h3>

    {{ product.description }}


    {%- if product.variants.size > 1 -%}

    选择您的 {{ product.title | downcase }}


    {%- for variant in product.variants -%}

    {{ variant.title | escape }} - {{ variant.price | money }}

    {%- endfor -%}


    {%- else -%}


    {%- endif -%}

    加入购物车


    代码清单 5-2

    在 templates/product.liquid 中添加产品信息与“加入购物车”表单

    ```


    我们来逐一解析这些更改。


    #### 产品详情与描述


    用于呈现产品详情和描述的代码清单 5-2 中的代码并不复杂。实际上，只需在像 `<h1>` 这样具有适当信息层级的 HTML 元素中输出相应的 Liquid
    变量（`product.title`，`product.min_price`）即可。


    我使用了几个 Liquid 过滤器来输出这些信息。在输出标题和供应商时，我使用了 `| escape` 过滤器。这在输出任何用户生成的文本内容时是一个好习惯，可以避免潜在的格式或输出问题（例如，如果你的产品标题包含像
    `<` 这样的 HTML 字符，escape 过滤器会确保它被渲染为文本而非 HTML）。我还使用了 `| money` 过滤器，以商店货币和偏好设定的格式来显示产品价格（Shopify
    以分为单位存储，例如 `18800`）。


    `product.description` 是直接输出的。它可以包含 HTML（以允许描述内容中的锚点链接等），因此我们没有对其使用 `| escape`
    过滤器。如果你希望确保描述不会渲染出任何可能破坏页面布局的怪异内容，可以使用 `| strip_html` 过滤器将其强制转换为纯文本。


    你可能注意到示例在显示产品价格时使用了一些 Liquid 逻辑。这样做是因为不同的产品款式（例如颜色和尺寸的组合）可能有不同的价格。我们应该检查当前产品是否属于这种情况（`{%
    if product.price_varies %}`），以决定是显示单一价格（`product.price`）还是价格范围（`product.price_min`
    到 `product.price_max`）。在本章后面，你将看到如何调整这种方法，动态更新 `price` 元素，使其仅显示当前所选款式的价格。


    **提示**


    在设计产品页面时，应使用真实的产品描述，而不是虚拟文字或占位符（lorem ipsum）文本。这样你能更好地了解产品的呈现效果和布局，避免日后出现意外。


    另一件要避免的事情是从制造商或竞争对手网站复制粘贴产品描述。这样做不仅可能因为重复内容对 SEO 产生负面影响，而且你也错失了在描述中注入品牌独特声音并说服客户的机会。

    '
- fmt: "### Add To Cart Form\n\nIn its most simple form, a Shopify Add To Cart form\
    \ is a `<form>` element that uses the `POST` method to submit to the `/cart/add`\
    \ URL on the storefront. The only piece of information that’s required to be submitted\
    \ in the form’s data is the ID of one or more variants to add to the cart (these\
    \ parameters should be named `id` if adding a single variant or `id[]` if adding\
    \ multiple variants at once).\n\nIn this example, we allow the customer to select\
    \ which variant to add to the cart using a `<select>` dropdown element, which\
    \ contains a list of all the product’s variants and displays a description of\
    \ them alongside their price. Before rendering the dropdown, we check that it’s\
    \ actually needed (`{% if product.variants.size > 1 %}`). If there’s only one\
    \ variant, we just provide its ID as a parameter to the form using a hidden input.\n\
    \nWhen rendering the available options in the select dropdown, we use a Liquid\
    \ variable called `product.selected_or_first_available_variant` to see whether\
    \ we should make a particular option selected by default when loading the page.\
    \ `product.selected_or_first_available_variant` is a verbose but accurately named\
    \ variable used with either the \"selected\" variant (determined by a `?variant\
    \ =` parameter in the request URL) or the first \"available\" product variant,\
    \ where availability is determined by a variant being in stock based on the merchant’s\
    \ inventory policies. See Figure [5-9](#A437216_1_En_5_Chapter.html#Fig9).\n\n\
    ![A437216_1_En_5_Fig9_HTML.jpg](A437216_1_En_5_Fig9_HTML.jpg)  \nFigure 5-9 –\
    \ Specifying a variant ID in the `?variant=` parameter in the URL preselects that\
    \ variant in the Add To Cart form’s dropdown\n\nThe final element of the Add To\
    \ Cart form is the all-important Submit button. In this example, this is implemented\
    \ as a standard HTML button. I’ve added a bit of Liquid logic to disable the Add\
    \ button if the product isn’t available (meaning all variants are sold out).\n\
    \nThis initial Add To Cart form is simple, but it’s an important foundation that\
    \ we can build on to add support for more dynamic variant selectors, custom inputs,\
    \ and Ajax functionality. As we add these extras, it’s important to keep fundamental\
    \ usability and accessibility guidelines in mind, by:\n\n- Ensuring all inputs\
    \ have associated labels\n- Trying to avoid inline form elements and inputs\n\
    - Using appropriate HTML5 input types (e.g., `type=\"number\"`)\n- Making sensible\
    \ choices for input type (e.g., using radio inputs rather than select dropdowns\
    \ for options with few choices)\n- Keeping all inputs keyboard-accessible\n- Ensuring\
    \ action inputs like Submit buttons are clearly indicated and give the appearance\
    \ of being interactive\n\n### Adding Recommended Products\n\nWe’re nearly done\
    \ implementing our planned layout from Figure [5-4](#A437216_1_En_5_Chapter.html#Fig4),\
    \ with only the addition of the \"You may also like…\" recommended products section\
    \ at the bottom of the page.\n\n#### Related versus Alternate Products\n\nMany\
    \ themes get confused or don’t draw a distinction between two different types\
    \ of recommended products: related products and alternate products.\n\n- **Related\
    \ products** are accessories or complements to the currently visible product.\
    \ Think compatible batteries for a camera, or a matching scarf for a cardigan.\
    \ Displaying a list of related products on a product page both provides an \"\
    upsell\" path to encourage additional customer purchases. It also increases a\
    \ customer’s awareness of the store’s overall product range.\n- **Alternate products**,\
    \ as the name suggests, are a possible substitute or alternative for the currently\
    \ visible product. Think an Xbox instead of a PlayStation, or an overcoat in an\
    \ alternative style. Unlike related products, the purpose of a list of alternate\
    \ products isn’t to increase the size of a customer’s cart, but rather to make\
    \ sure that they can find what they’re looking for in the first place.\n\nBecause\
    \ related and alternate products serve two very different purposes, they shouldn’t\
    \ be displayed together. They should be clearly labeled, so that customers can\
    \ understand the source of their recommendation—using language like \"Users Who\
    \ Bought This Also Bought…\" instead of \"Related Products\" and \"We Think You\
    \ May Also Like…\" instead of \"Alternate Products\".\n\nAdding a small Ajax-powered\
    \ Add To Cart link next to related products is a good way to make these upsells\
    \ painless for the customer without taking them away from the main product page."
  raw: '### Add To Cart Form


    In its most simple form, a Shopify Add To Cart form is a `<form>` element that
    uses the `POST` method to submit to the `/cart/add` URL on the storefront. The
    only piece of information that’s required to be submitted in the form’s data is
    the ID of one or more variants to add to the cart (these parameters should be
    named `id` if adding a single variant or `id[]` if adding multiple variants at
    once).


    In this example, we allow the customer to select which variant to add to the cart
    using a `<select>` dropdown element, which contains a list of all the product’s
    variants and displays a description of them alongside their price. Before rendering
    the dropdown, we check that it’s actually needed (`{% if product.variants.size
    > 1 %}`). If there’s only one variant, we just provide its ID as a parameter to
    the form using a hidden input.


    When rendering the available options in the select dropdown, we use a Liquid variable
    called `product.selected_or_first_available_variant` to see whether we should
    make a particular option selected by default when loading the page. `product.selected_or_first_available_variant`
    is a verbose but accurately named variable used with either the “selected” variant
    (determined by a `?variant =` parameter in the request URL) or the first “available”
    product variant, where availability is determined by a variant being in stock
    based on the merchant’s inventory policies. See Figure [5-9](#A437216_1_En_5_Chapter.html#Fig9).


    ![A437216_1_En_5_Fig9_HTML.jpg](A437216_1_En_5_Fig9_HTML.jpg)


    Figure 5-9


    Specifying a variant ID in the ?variant= parameter in the URL preselects that
    variant in the Add To Cart form’s dropdown


    The final element of the Add To Cart form is the all-important Submit button.
    In this example, this is implemented as a standard HTML button. I’ve added a bit
    of Liquid logic to disable the Add button if the product isn’t available (meaning
    all variants are sold out).


    This initial Add To Cart form is simple, but it’s an important foundation that
    we can build on to add support for more dynamic variant selectors, custom inputs,
    and Ajax functionality. As we add these extras, it’s important to keep fundamental
    usability and accessibility guidelines in mind, by:


    ![A437216_1_En_5_Fig10_HTML.jpg](A437216_1_En_5_Fig10_HTML.jpg)


    Figure 5-10


    This Add To Cart button’s size and flat appearance makes it look like a label,
    rather than an interactive button that encourages clicking


    *   Ensuring all inputs have associated labels

    *   Trying to avoid inline form elements and inputs

    *   Using appropriate HTML5 input types (e.g., `type="number"`)

    *   Making sensible choices for input type (e.g., using radio inputs rather than
    select dropdowns for options with few choices)

    *   Keeping all inputs keyboard-accessible

    *   Ensuring action inputs like Submit buttons are clearly indicated and give
    the appearance of being interactive


    ## Adding Recommended Products


    We’re nearly done implementing our planned layout from Figure [5-4](#A437216_1_En_5_Chapter.html#Fig4),
    with only the addition of the “You may also like…” recommended products section
    at the bottom of the page.


    ### Related versus Alternate Products


    Many themes get confused or don’t draw a distinction between two different types
    of recommended products: related products and alternate products.


    *   Related products are accessories or complements to the currently visible product.
    Think compatible batteries for a camera, or a matching scarf for a cardigan. Displaying
    a list of related products on a product page both provides an “upsell” path to
    encourage additional customer purchases. It also increases a customer’s awareness
    of the store’s overall product range.

    *   Alternate products, as the name suggests, are a possible substitute or alternative
    for the currently visible product. Think an Xbox instead of a PlayStation, or
    an overcoat in an alternative style. Unlike related products, the purpose of a
    list of alternate products isn’t to increase the size of a customer’s cart, but
    rather to make sure that they can find what they’re looking for in the first place.


    Because related and alternate products serve two very different purposes, they
    shouldn’t be displayed together. They should be clearly labeled, so that customers
    can understand the source of their recommendation—using language like “Users Who
    Bought This Also Bought…” instead of “Related Products” and “We Think You May
    Also Like…” instead of “Alternate Products”.


    Adding a small Ajax-powered Add To Cart link next to related products is a good
    way to make these upsells painless for the customer without taking them away from
    the main product page.'
  trans: "\n### 添加到购物车表单\n\n在最简单的形式中，Shopify 的“添加到购物车”表单是一个 `<form>` 元素，它使用 `POST`\
    \ 方法将数据提交到商店前端的 `/cart/add` 链接。表单数据中必须提交的唯一信息是一个或多个待添加到购物车的变体 ID（如果只添加单个变体，这些参数应命名为\
    \ `id`；如果同时添加多个变体，则应命名为 `id[]`）。\n\n在本示例中，我们允许客户通过一个 `<select>` 下拉菜单来选择要添加到购物车的变体，该下拉菜单包含产品所有变体的列表，并显示每个变体的描述及其价格。在渲染下拉菜单之前，我们会检查是否确实需要它（`{%\
    \ if product.variants.size > 1 %}`）。如果只有一个变体，我们就通过一个隐藏输入将其 ID 作为参数提供给表单。\n\n在渲染下拉菜单中的可用选项时，我们使用一个名为\
    \ `product.selected_or_first_available_variant` 的 Liquid 变量来判断在加载页面时是否应默认选中某个特定选项。`product.selected_or_first_available_variant`\
    \ 是一个名称冗长但准确命名的变量，用于表示“已选中的”变体（由请求链接中的 `?variant=` 参数决定）或第一个“可用的”产品变体，其中可用性取决于商家库存策略下该变体是否有库存。请参见图\
    \ 5-9。\n\n![A437216_1_En_5_Fig9_HTML.jpg](img/A437216_1_En_5_Fig9_HTML.jpg)  \n\
    图 5-9 – 在链接的 `?variant=` 参数中指定变体 ID，即可在“添加到购物车”表单的下拉菜单中预选该变体\n\n“添加到购物车”表单的最后一个元素是至关重要的“提交”按钮。在本示例中，它被实现为一个标准的\
    \ HTML 按钮。我添加了一些 Liquid 逻辑，以便在产品不可用（即所有变体均已售罄）时禁用“添加”按钮。\n\n这个初始的“添加到购物车”表单虽然简单，但它是重要的基础，我们可以在此基础上增加对更多动态变体选择器、自定义输入和\
    \ Ajax 功能的支持。在添加这些额外功能时，牢记基本的可用性和可访问性准则非常重要，具体包括：\n\n-   确保所有输入都有对应的标签\n-   尽量避免使用内联表单元素和输入\n\
    -   使用适当的 HTML5 输入类型（例如 `type=\"number\"`）\n-   对输入类型做出合理的选择（例如，对于选项较少的情况，使用单选按钮而非下拉菜单）\n\
    -   确保所有输入均可通过键盘访问\n-   确保像“提交”按钮这样的操作输入有清晰标示并具备可交互的外观\n\n### 添加推荐产品\n\n我们即将完成图\
    \ 5-4 中规划的页面布局，只差在页面底部添加“你可能也喜欢……”的推荐产品部分了。\n\n#### 关联产品与替代产品\n\n许多主题对此感到困惑，或者没有区分两种不同类型的推荐产品：关联产品与替代产品。\n\
    \n-   **关联产品**是当前展示产品的配件或补充品。比如说，与相机兼容的电池，或者与开衫相配的围巾。在产品页面上显示关联产品列表，既提供了一条“追加销售”路径以鼓励客户增加购买，也提高了客户对商店整体产品范围的认知。\n\
    -   **替代产品**，顾名思义，是当前展示产品的可能替代品或备选方案。比如说，用 Xbox 代替 PlayStation，或者选择另一种款式的大衣。与关联产品不同，替代产品列表的目的不是为了增加客户购物车中的商品数量，而是为了确保客户首先能找到他们真正想要的东西。\n\
    \n由于关联产品和替代产品服务于两种截然不同的目的，它们不应被一起展示。它们应该被清晰地标注，以便客户能理解推荐的来源——例如使用“购买此商品的用户也购买了……”而非“关联产品”，以及使用“我们认为您也可能喜欢……”而非“替代产品”。\n\
    \n在关联产品旁边添加一个小型的、由 Ajax 驱动的“添加到购物车”链接，是一种很好的方式，可以在不将客户带离主产品页面的情况下，让追加销售变得轻松无感。\n"
- fmt: '### Recommended Products on Shopify


    Shopify doesn’t provide any explicit built-in support for managing lists of recommended
    products, although there are many Shopify Apps that offer this functionality (search
    for “product recommendations” in the Shopify App Store).


    While these apps can do some pretty nifty things, like using sales data to algorithmically
    generate recommendations, or tailoring recommendations to individual visitors,
    I prefer to try tackling problems with Shopify’s “native” concepts and some custom
    Liquid code before resorting to an app. Not only does this lower the ongoing costs
    involved in running a store, it reduces the risk of apps interfering with each
    other and breaking store functionality or negatively impacting on performance.
    While apps might offer slightly more functionality, in many cases a theme-based
    solution will be more than good enough for a merchant’s needs.


    There are a couple of ways we can use built-in Shopify features to elegantly implement
    related and alternate product functionality. First, we can allow a storeowner
    to manually specify a list of recommended products for each product on their stores,
    then display that list in the product template. This specification can be achieved
    by the storeowner using one of two methods:


    - By setting a metafield on the product containing a list of related product handles.
    You’ll learn more about metafields later in this chapter; for now, all you need
    to know is that they allow storeowners to store custom information on products
    and other Shopify objects. This information can be retrieved in Liquid and used
    to render a list of related products.

    - By using a naming convention where a collection is created with a URL (handle)
    that matches the product, and then populating that collection with the desired
    related products. For example, if the product’s handle is `foraker-canvas-coat`,
    the storeowner can create a collection with the handle `foraker-canvas-coat-related`.
    The Liquid code can calculate the expected name of the relevant related products
    collection for the current product, check if it exists, and display the products
    if so.


    Specifying recommended products manually has the advantage of giving storeowners
    fine-grained control over the products that appear in a products list, but it
    has the disadvantage of being time consuming to create and maintain. As an alternative,
    we can use some Liquid logic to automatically calculate a list of related products.
    Again, we have two possible strategies:


    - Find a non-generic collection the current product is a member of and consider
    the other products in that collection to be “related.” This can be a naïve approach,
    but often produces results good enough for many use cases.

    - Compare the current product to all other products on the store and “score” them
    based on the number of tags and collections they share with the current product.
    Products with a higher score are considered closely related to the current product.
    The implementation of this approach is a little more involved but it can yield
    better results than the first method.


    For the example theme, we’re going to implement a Liquid snippet (`snippets/related-products.liquid`
    in the theme’s directory) that supports three of these approaches to display a
    list of up to four related products on the page. When included on the product
    page, it will:


    1.  Check if the product has a “related products” metafield defined. If so, it
    will use that to render the first four products listed in that metafield.  

    2.  If no “related products” metafield is defined, then it will check to see if
    a collection with the same handle as the product (but with `–related` on the end)
    exists. If so, it will render the first four products in that collection.  

    3.  If neither a metafield or a collection exists, then it will fall back to finding
    a collection the current product is member of and render the first four products
    in that collection.


    This approach gives us a basic way of automatically finding related products on
    every product page, while giving the storeowner the option of creating a collection
    or metafield to override the default behavior if they need more control. An outline
    of the snippet’s logic is given in Listing [5-3](#A437216_1_En_5_Chapter.html#Par80)
    (it’s truncated for brevity; the full version is available in the example theme
    repository). Listing [5-4](#A437216_1_En_5_Chapter.html#Par81) shows how to include
    the snippet inside `product.liquid`. Finally, Figure [5-11](#A437216_1_En_5_Chapter.html#Fig11)
    shows the result of implementation in the browser.


    ![A437216_1_En_5_Fig11_HTML.jpg](A437216_1_En_5_Fig11_HTML.jpg)


    Figure 5-11


    The Recommended Accessories section on the Canon site is a good example of upselling
    through related products (left). Zen Pencil’s “You May Also Like…” section suggests
    alternative posters as a substitute to the current selection (right)


    ```

    {%- assign RELATED_PRODUCTS_LIMIT = 4 -%}

    {%- if product.metafields.theme.related_products != blank -%}

    {%- assign related_product_handles = product.metafields.theme.related_products
    | split: '','' -%}

    {%- for related_product_handle in related_product_handles -%}

    ... render products from metafield...

    {%- endfor -%}

    {%- else -%}

    {%- assign related_collection_handle = product.handle | append: ''-related'' -%}

    {%- assign related_collection = collections[related_collection_handle] -%}

    {%- if related_collection and related_collection.products.size > 0 %}

    {%- for related_product in related_collection.products limit: RELATED_PRODUCTS_LIMIT
    -%}

    ... render products from collection...

    {%- endfor -%}

    {%- else -%}

    {%- assign related_collection = nil -%}

    {%- for collection in product.collections -%}

    {%- unless collection.handle == ''all'' -%}

    {%- if related_collection == blank or collection.products.size > related_collection.products.size
    -%}

    {%- assign related_collection = collection -%}

    {%- if related_collection.products.size > 5 -%}

    {%- break -%}

    {%- endif -%}

    {%- endif -%}

    {%- endunless -%}

    {%- endfor -%}

    {%- for related_product in related_collection.products limit: RELATED_PRODUCTS_LIMIT
    -%}

    ... render products from collection...

    {%- endfor -%}

    {%- endif -%}

    {%- endif -%}

    Listing 5-3

    The Logic Outline for a related-products.liquid Liquid Snippet

    ```


    ![A437216_1_En_5_Fig12_HTML.jpg](A437216_1_En_5_Fig12_HTML.jpg)


    Figure 5-12


    The result of adding the related product snippet at the bottom of the example
    theme’s product page


    ```


    ...


    ...


    You may also like

    {%- include ''related-products'' -%}


    Listing 5-4

    Inclusion of Related Products Liquid Snippet at the Bottom of templates/product.liquid

    ```


    ## Improving the Product Page


    Congratulations! The desktop version of your product page has now fully implemented
    your planned layout design from Figure [5-4](#A437216_1_En_5_Chapter.html#Fig4).
    You have a simple, but fully-functional, product page that customers can use to
    view your products, select a desired product variant, and add that selection to
    their carts. Because this page is so simple, it’s very quick to load and doesn’t
    require any JavaScript to function.


    For the rest of this chapter, we’ll be walking through the implementation of common
    features that theme designers might add to this starting point.'
