    >\n```\n\nFinally, close the loop surrounding the second table row with a curly\
    \ brace, like this:\n\n```\n</tr>\n<?php } ?>\n</table>\n```\n\nSave `blog_list_mysqli.php`\
    \ or `blog_list_pdo.php` and load the page into a browser. Assuming that you loaded\
