    information from the tables and eventually you’ll use that knowledge to authenticate
    a user, by writing a sign-in script.


    [Chapter 3](#A978-1-4842-1672-9_3_Chapter.html), “Accessing the Database Using
    PHP”—This chapter explains the technique of accessing products from a products
    table and displaying them on-screen in tabular format. You will also learn to
    create a drop-down menu that displays different product categories and implements
    navigation from one page to another. You will learn to display products of specific
    categories, define a web site header, implement a search facility, and display
    detailed information of the selected product. You will also learn how session
    handling is done in a web site. You will learn to define the home page of your
    site, which will show the different product images with the fading effect.


    [Chapter 4](#A978-1-4842-1672-9_4_Chapter.html), “Managing the Shopping Cart”—In
    this chapter, you will learn how the chosen products are saved into the cart table
    after keeping track of the visitor’s session ID. You will also learn to manage
    the cart content on the visitor’s requirement. You will also learn to display
    the cart count (product quantities selected in the cart) and the visitor’s sign-in
    status on the site’s header. You will learn to supply the shipping information,
    accept payments, and save the chosen products into `orders` and `orders_details`
    database tables.


    Acknowledgments


    I owe a debt of gratitude to Ben Renow-Clarke, senior web development editor,
    for his initial acceptance and giving me an opportunity to create this work. I
    am highly grateful to the whole team at Apress for their constant cooperation
    and contributions to create this book.


    My gratitude to Matthew Moodie, who as a development editor, offered a significant
    amount of feedback that helped improve the chapters. He played a vital role in
    improving the structure and quality of the information.


    I must thank Massimo Nardone, the technical reviewer, for his excellent, detailed
    review of the work and the many helpful comments and suggestions he made.


    Special thanks to Kezia Endsley, the copy editor, for first class structural and
    language editing. I appreciate her efforts in enhancing the content of the book
    and giving it a polished look.


    I also thank SPi Global, the formatter, for doing excellent formatting and making
    the book dramatically better.


    Big and ongoing thanks to Melissa Maldonado, the coordinating editor, for doing
    a great job in getting the book published on time


    A great big thank you to the editorial and production staff and the entire team
    at Apress who worked tirelessly to produce this book. Really, I enjoyed working
    with each of you.


    I am also thankful to my family. Thanks to Anushka (my wife) and my two little
    darlings—Chirag and Naman—for always encouraging and inspiring me.


    I should not forget to thank my dear students who have been good teachers as they
    make me understand the basic problems they face and help me directly hit those
    topics. It is because of the endless interesting queries from my students that
    I was able to write this book with a firmly practical approach.'
