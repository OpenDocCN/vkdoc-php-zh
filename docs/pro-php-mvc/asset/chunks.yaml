    The _setRequestMethod() method sets Curl parameters relating to each of the different
    request methods.


    Some request methods need additional parameters set (such as GET and POST), while
    others need things excluded from the response (such as HEAD).


    The _setRequestOptions() method iterates through all the request-specific parameters
    that need to be set.


