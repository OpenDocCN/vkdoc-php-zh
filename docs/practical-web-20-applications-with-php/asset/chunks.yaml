    **Summary**


    In this chapter, we extended the blog post management tools that we began in Chapter
    7\. We first looked at how to select large amounts of data from the database in
    an efficient manner before using this data to help users manage their blogs.


    Next we extended the capabilities of the blog post listing so it is Ajax-powered,
    thereby making it easier to use (since each page will load more quickly). One
    of the biggest advantages of our implementation is that it will automatically
    fall back to a non-Ajax solution if the user wasn’t using JavaScript.


    The final step in this chapter was to implement FCKeditor, an open source WYSIWYG
    editor that allows users to easily format their blog posts using HTML.


    In the next chapter, we will focus on creating a public home page for each user
    that lists all of their live blog posts. When we do this, we will also update
    the application home page so it displays blog posts from all users that choose
    to have their posts included.


