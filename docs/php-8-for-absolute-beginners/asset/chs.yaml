  \ `securelistgallery.php` 通过 `securelistindex.php` 的输出\n\n### 使用 glob 查找文件夹中的文件\n\
  \nPHP 的 `glob` 方法可用于查找与模式匹配的路径名。它能快速扫描目录，并创建一个包含所有匹配项的数组。我们可以使用 `for` 循环来获取结果，因为我们不知道会返回多少结果。我们可以通过数组的\
  \ `length` 属性来获知这一信息。不过，还有一种更好的选择：`foreach` 循环。这种循环专为遍历数组和其他列表而设计。\n\n#### For Each\
  \ 循环\n\n```\nforeach ($arrayname as $value) {\n语句\n}\n```\n\n`foreach` 语法需要一个数组（或列表）名称和一个用于存储当前项的变量。例如：\n\
  \n```\n<?php\n$cars = array(\"Volvo\", \"BMW\", \"Toyota\");\nforeach ($cars as\
  \ $value) {\n  echo \"$value <br>\";\n}\n?>\n```\n\n在这个示例中，声明了一个汽车数组。`foreach` 循环会遍历该数组，并将每个值（汽车品牌）放入变量\
  \ `$value` 中，然后显示该值。循环会一直持续到数组中没有更多汽车为止。我们无需担心数组的大小，并且可以轻松更改数组而无需修改循环！\n\n### 显示所有图片\n\
