    C H A P T E R 7


    Catalog Administration


    **I**n the previouschapters, you worked with catalog information that already
    existed in the database. You have probably inserted some records yourself, or
    maybe you downloaded the department, category, and product information from the
    book’s accompanying source code.


    Obviously, both ways are unacceptable for a real web site, so you need to write
    some code to allow easy management of the web store data. That said, the final
    detail to take care of before launching a web site is to create its administrative
    interface. Although visitors will never see this part, it’s key to delivering
    a quality web site to your client.


    In this chapter, you’ll implement a catalog administration page. With this feature,
    you complete the first stage of your web site’s development! Because this page
    can be implemented in many ways, a serious discussion with the client is required
    to get the specific list of required features. In our case, the catalog administration
    page should allow your client to do the following:


    • Add and remove departments


    • Modify existing departments’ information (name, description)


    • View the list of categories that belong to a department


    • Manage department categories


    • Edit existing categories’ information (name, description)


    • View the list of products in a specific category


    • Edit product details


    • Assign an existing product to an additional category (a product can belong to
    multiple categories), or move it to another category


    • View the categories that a department is associated with


    • Remove a product from a category


    • Delete a product from the catalog


    To secure sensitive pages, such as the administrative section of your site, you’ll
    also do the following:


    • Implement a login form where the administrator needs to supply a username and
    password.


    • Learn how to secure the login form and the administrative pages using SSL.


    **199**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00176.png)


    648XCH07a.qxd 10/25/06 10:56 PM Page 200


    **200**


