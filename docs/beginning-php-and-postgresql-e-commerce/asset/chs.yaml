- "# 第 14 章 ■ II 实现订单管道：第二部分 **493**\n\n**图 14-5.** *已完成订单的审计条目*\n\n**工作原理：订单管道**\n\
  \n我们已经介绍了订单管道的工作原理，现在只需要解释添加到 `OrderProcessor` 中的新代码。我们修改了 `GetCurrentPipelineSection()`\
  \ 方法中的代码，该方法负责选择需要执行的管道部分。\n\n修改内容只是一个 switch 块，它将管道部分赋值给 `$_mCurrentPipelineSection`\
  \ 成员：\n\n```\n// 获取当前管道部分\n\nprivate function GetCurrentPipelineSection()\n\n{\n\
  \nswitch($this->mOrderInfo['status'])\n\n{\n\ncase 0:\n\n$this->_mOrderProcessStage\
  \ = $this->mOrderInfo['status']; $this->_mCurrentPipelineSection = new PsInitialNotification();\
  \ break;\n\ncase 1:\n\n$this->_mOrderProcessStage = $this->mOrderInfo['status'];\
  \ $this->_mCurrentPipelineSection = new PsCheckFunds(); break;\n\ncase 2:\n\n$this->_mOrderProcessStage\
  \ = $this->mOrderInfo['status']; $this->_mCurrentPipelineSection = new PsCheckStock();\
  \ break;\n\ncase 3:\n\n$this->_mOrderProcessStage = $this->mOrderInfo['status'];\
  \ $this->_mCurrentPipelineSection = new PsStockOk();\n\nbreak;\n\ncase 4:\n\n$this->_mOrderProcessStage\
  \ = $this->mOrderInfo['status']; $this->_mCurrentPipelineSection = new PsTakePayment();\
  \ break;\n\ncase 5:\n\n$this->_mOrderProcessStage = $this->mOrderInfo['status'];\
  \ $this->_mCurrentPipelineSection = new PsShipGoods(); break;\n\ncase 6:\n\n$this->_mOrderProcessStage\
  \ = $this->mOrderInfo['status']; $this->_mCurrentPipelineSection = new PsShipOk();\n\
  \nbreak;\n\ncase 7:\n\n$this->_mOrderProcessStage = $this->mOrderInfo['status'];\
  \ $this->_mCurrentPipelineSection = new PsFinalNotification(); break;\n\ncase 8:\n\
  \n$this->_mOrderProcessStage = 100;\n\nthrow new Exception('订单已完成。');\n\nbreak;\n\
  \ndefault:\n\n$this->_mOrderProcessStage = 100;\n\nthrow new Exception('请求了未知的管道部分。');\n\
  \n}\n\n}\n```\n\n如果订单已完成或请求了未知部分，则会生成异常。\n\n测试代码为您提供了额外测试此异常生成的机会，因为如果您再次运行它，您将处理一个已完成的订单。针对已完成（状态为\
  \ 8）的订单单击“处理订单”按钮，您应该会收到如图 14-6 所示的错误邮件。\n\n**图 14-6.** *订单完成错误邮件*\n\n发送给管理员的错误消息应足以帮助您开始排查问题。\n\
