    # 2. 什么是云


    对于“上云”的含义，存在一些混淆。有些人甚至错误地认为，只要在互联网上就是在利用云技术。


    云技术与其他类型互联网托管服务的本质区别在于，云服务至少提供了快速扩展应用的能力。过去，开发者通常会将他们的网络应用部署到在特定设施中购买或租赁的固定服务器上。虽然可以添加更多设备，但这始终需要相当多的时间和精力。开发者常常需要为服务器筹备大量资金、购买、配置并部署它们。这个过程可能需要数周甚至数月。即使直接从托管公司购买，从整理报价到让一切正常运行，也可能需要一周多的时间。


    云计算的承诺在于，无需经历为新服务器进行物理安装的过程，即可在瞬间、或在几分钟/几小时内（而非几天、几周或几个月）获得额外的容量。对于某些解决方案，你甚至无需操心机器——云解决方案会自动根据你的需求，将你的应用扩展到所需数量的机器上。对于其他方案，只需点击几下，即可请求、创建镜像并启动一台新机器，这台机器是现有某台机器的副本，然后将其添加到你的网络应用中。


    无论如何，云的核心思想是即时、自动化的可扩展性和灵活性。


    许多云提供商甚至提供对多个数据中心的访问。你想要一组服务器在美国，另一组在欧洲？没问题。只需点击几下，就能完成设置。


    ## 2.1 基础设施即服务


    云计算常常令人困惑，因为存在几种不同类型的云计算，每种都有其自身的优缺点。云服务类型之间的区别主要基于所提供的抽象层级。


    本书将重点介绍的最基本的云服务类型被称为*基础设施即服务*，缩写为 IaaS。IaaS 意味着你只需点击一个按钮，就可以购买和部署基础设施组件（服务器、负载均衡器、防火墙等）。这是通过服务器虚拟化技术实现的。


    服务器虚拟化允许 IaaS 服务公司部署一台非常大的服务器，并将其拆分成多个较小的服务器。每台服务器运行一个*虚拟机监视器*程序，这使公司能够快速、自动地拆分服务器。一家公司可能会拿一台拥有
    16 个处理器和 64 GB 内存的计算机，将其拆分为 4 台虚拟机，每台拥有 4 个处理器和 16 GB 内存。


    这样做有三个好处。第一是空间。通过购买最大的机器，IaaS 公司为每个机架单元提供了最大的计算能力，这在服务器机房中是宝贵的资源。因此，通过购买一台大机器并将其拆分为四台较小的机器，他们仅使用了原本可能需要的四分之一的空间。


    第二是每 CPU 核心的成本。通过将如此多的 CPU 核心和内存集成到一台服务器中，他们的每 CPU 核心成本和每 GB 内存成本都会降低。因此，通过购买更大的计算机，他们可以为购买较小虚拟服务器的用户提供更低的每
    CPU 核心成本。


    然而，第三个优势是最重要的——可管理性。为了支持虚拟化，每台机器的一小部分被专门用于虚拟机监视器——这是一个小型操作系统，用于管理服务器上的其他虚拟机。由于这些机器是虚拟机，而非真实的硬件设备，它们非常易于管理。操作员可以向虚拟机监视器发送命令，它可以在几分钟内立即设置一台新的虚拟机，克隆一个新的启动磁盘，并启动新的虚拟服务器。


    过去，如果我想要一台新服务器，我必须先购买服务器，然后，在物理上位于控制台前，安装相关的操作系统和系统软件，最后将服务器搬到机架旁，插上电源并开机。我必须确保网络已连接并配置好。我可能还需要配置
    BIOS 以支持无键盘操作。如果机器出现问题，我必须备份机器，找到一台新的物理机器，将备份复制到新机器上，安装新机器，并用新机器物理替换旧机器。


    有了虚拟化机器，我就可以让虚拟机监视器来处理所有这些事情。我只需要有足够的额外服务器运行虚拟机监视器，这样当我需要一台新机器时，只需告诉虚拟机监视器为我创建一个新的虚拟机，并指定要使用的磁盘副本所在位置即可。


    更棒的是，在大多数 IaaS 平台上，你甚至无需担心虚拟机监视器和容量问题。IaaS 供应商会为你处理这一切。IaaS 供应商提供了一个点击式界面，你只需登录网络管理控制台，就能启动虚拟服务器。你告诉它你想要多大的机器（即
    CPU 核心数和内存大小），它就会为你分配一台服务器。你告诉它你想要在上面安装什么（要么是基础操作系统，要么是现有机器的克隆），它就会将其复制到启动磁盘上，并为你启动它。瞧！你就得到了一台可以立即使用的新服务器。


    此外，对于大多数 IaaS 服务，如果出现物理硬件问题，服务商会为你处理。如果检测到严重的硬件问题，他们就会简单地关闭你的服务器，将其迁移到新服务器上，然后重新启动，并发送一封电子邮件通知你发生了什么。如果是较轻微的问题，一些供应商会向你发送通知，要求你在最方便的时候点击按钮执行迁移。


    更棒的是其定价模式。大多数 IaaS 供应商都提供*按小时*计费的选项。你是否需要一台机器，但只用几个小时？使用 Linode，你可以获得一台 32 核、64
    GB 内存的机器，每小时花费远低于 1 美元！


    在第 3 章中，我们将了解设置云服务器的具体步骤。


    ## 2.2 平台即服务


    另一种扩展应用的选择被称为*平台即服务*，缩写为 PaaS。使用 PaaS，PaaS *定义*一个平台供你在其上运行应用，而不是直接提供裸机让你随意运行任何东西。PaaS
    供应商管理整个平台，你只需关注你的应用。


    例如，Heroku 是一个受欢迎的 PaaS 供应商。Heroku 处理所有的服务器管理和维护工作。你甚至无法登录他们的机器！你只需将代码推送给他们，他们就会为你将其部署到他们的机器上。其他常见的
    PaaS 供应商包括 Google App Engine、Windows Azure、Amazon Elastic Beanstalk 和 OpenShift。


    使用 PaaS，你选择使用多少个“工作单元”，系统会将工作分配到所需数量的机器上（工作单元只是一个活跃的进程，每个 PaaS 供应商对其有自己的术语）。因此，PaaS
    供应商负责*平台*（硬件、操作系统、已安装的应用），而你只需管理应用代码。


    这理论上听起来很棒——你完全无需再管理服务器！所有这一切都在幕后自动神奇地为你完成。然而，现实是 PaaS 平台并不像看起来那么透明，而且 PaaS 供应商倾向于对其增值服务收取相当高的费用。

    '
- fmt: '# 2.3 Docker


    A new technology in the field generating a lot of buzz is `Docker`. `Docker` apps
    are kind of a midway between `IaaS` and `PaaS`. A `Docker` app is an image containing,
    essentially, a full installation of all of the programs needed to run your application.


    They can be managed, deployed, and scaled similar to `PaaS`, where you can just
    tell the service how many you want running, and it will take care of deploying
    your image to the right places, but you have a much larger degree of control,
    similar to `IaaS`.


    One interesting part of `Docker` is the ability to “link” different services together.
    Essentially, you put names on the different types of services that a `Docker`
    container provides or needs, and then can use those names to tell your services
    how to find each other. However, this is mostly only an issue during the initial
    setup for your application, after which it matters little whether you linked your
    application components together manually or with a fancy tool.


    `Docker` itself is a technology, not a vendor. There are many vendors which allow
    you to deploy `Docker` apps, including `Docker Inc.`, the company responsible
    for the `Docker` technology.


    ## 2.4 Why Choose IaaS


    This book concentrates on `IaaS` cloud models for a number of reasons. The first
    is that `IaaS` is very flexible. No matter what type of workload you want to run,
    no matter what platform you want to run, `IaaS` just gives you bare servers. What
    you do with them is up to you. This also means that you aren’t locked in to a
    specific vendor’s systems.


    The second is that `IaaS` works fairly predictably. While there are differences,
    the way that most `IaaS` vendors operate is fairly similar. You pick a box size,
    you say what you want on it, and you push the button. There is a lot of variability
    of the quality, cost, and flexibility of those services, but they are all fairly
    similar.


    With `PaaS`, your choices are much more limited. First of all, you are limited
    to what platforms your vendor offers. If you program in `Ruby on Rails`, you are
    limited to only `Ruby on Rails PaaS`. While most `PaaS` vendors have opened up
    their systems to quite a number of different application servers, there are still
    limitations. Second, you must write your code to match the way they have their
    platform configured. This usually involved little or no local file storage, certain
    specific types of databases to connect to, only certain allowed platform options
    or extensions, and little to no flexibility on how the server is configured. Sometimes
    that’s fine, but sometimes it is too constraining.


    Additionally, `PaaS` is usually too opaque. Access to server logs is often difficult,
    and debugging troubles that are server-specific is nearly impossible. Sometimes
    `PaaS` vendors have tools to help, but they are nothing like being able to debug
    directly on the machine having the problem. This opaqueness can sometimes lead
    to devastating results. For instance, if you purchase a `PaaS` database system,
    and somehow your database gets corrupted, your options are extremely limited.
    You basically have to call the company and beg for help. Some companies are very
    responsive in this regard, but it makes me really nervous.


    Also keep in mind that in order for a `PaaS` system to work, they have to keep
    upgrading their systems. In fact, that is what you are paying them to do. However,
    there is no guarantee that an upgrade they make tomorrow won’t also accidentally
    trash your application. Perhaps the upgrade was necessary, but that isn’t a decision
    that you get to make.


    Similarly, using a `PaaS` vendor means that you have to upgrade on *their* schedule.
    If they decide to deprecate a piece of their infrastructure, you have to rewrite
    your code to work around this. If they decide that the version of a piece of software
    you use is out of date, you have to rewrite your code to use the new version.
    In short, `PaaS` means that you lose control of your technology, while `IaaS`
    means that you have full control. While certain hassles are removed by using `PaaS`,
    they are usually compensated for by the hassles they introduce.


    Finally, `PaaS` is usually very expensive. For example, for four CPU cores on
    `Heroku` (a common `Ruby on Rails PaaS` vendor), it costs `$100` per month. For
    a 4-core machine on `Linode`, the cost is only `$40` per month, and the `Linode`
    machines are faster. I have found that most `PaaS` vendors charge around three
    times as much as a good `IaaS` vendor for equivalent performance. The `PaaS` vendors
    do more for you, but that is only worthwhile if you don’t possess any systems
    management experience in your developer lineup, and you will often wind up paying
    that cost anyway in keeping up with the `PaaS` platform.


    If your organization has the know-how to set up and maintain servers (and this
    book provides a good start to learning how to do that), `IaaS` is currently the
    easiest, most flexible, fastest, and least expensive way to take advantage of
    cloud technologies, and it doesn’t lock you in to a specific vendor. If you decide
    that you really want to use a `PaaS`-like system, just know that there are many
    open source `PaaS` systems that you can run on top of your `IaaS` servers.'
