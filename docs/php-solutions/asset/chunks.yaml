  trans: '

    ### 使用主键和外键关联表


    与电子表格不同，大多数数据库将数据存储在多个较小的表中，而非一个庞大的表中。这可以避免数据重复和不一致。假设你正在构建一个收藏名言的数据库。与其每次都输入作者姓名，更高效的做法是将作者姓名放在一个单独的表中，并在每条名言中存储对作者主键的引用。如图
    10-3 所示，左侧表中由`author_id 32`标识的每一条记录都是威廉·莎士比亚的名言。


    ![A978-1-4842-0635-5_10_Fig3_HTML.jpg](img/A978-1-4842-0635-5_10_Fig3_HTML.jpg)


    图 10-3. 外键用于关联存储在不同表中的信息


    由于姓名只存储在一个位置，这确保了它始终拼写正确。如果确实出现了拼写错误，只需更正一处，就能确保更改反映在整个数据库中。


    将一个表的主键存储在另一个表中称为创建外键。使用外键关联不同表中的信息是关系型数据库最强大的特性之一。在早期阶段这可能难以理解，因此我们将先处理单个表，直到第
    15 章和第 16 章再详细讨论外键。同时，请牢记以下几点：


    * 当值用作表的主键时，在该列中必须唯一。因此，图 10-3 右侧表中的每个`author_id`只使用一次。

    * 当值用作外键时，同一值可以有多个引用。因此，`32`在左侧表的`author_id`列中出现了多次。


    **提示**


    只要`author_id`在其作为主键的表中保持唯一，就能确定它始终指向同一个人。


    ### 将信息分解为小块


    你可能已经注意到，图 10-3 右侧的表为每位作者的名和姓分别设置了单独的列。这是关系型数据库的一条重要原则：将复杂信息分解为其组成部分，并将每个部分分开存储。


    决定将此过程进行到何种程度并不总是容易的。除了名和姓，你可能还需要为称谓（先生、夫人、女士、博士等）以及中间名或姓名首字母设置单独的列。地址最好分解为街道、城镇、县、州、邮政编码等。虽然将信息分解成小块可能有些麻烦，但你可以随时使用
    SQL 和/或 PHP 将它们重新组合起来。然而，一旦记录数量超过几十条，试图将存储在单个字段中的复杂信息分离出来将是一项重大工程。


    ### 良好数据库设计的检查点


    设计数据库没有唯一正确的途径——每个数据库都各不相同。不过，以下指南应能指引你正确的方向：


    * 为表中的每条记录赋予一个唯一标识符（主键）。

    * 将每组相关数据放入其自身的表中。

    * 通过将一个表的主键用作其他表中的外键来交叉引用相关信息。

    * 在每个字段中仅存储一条信息。

    * 保持 DRY（不要重复自己）。


    在早期阶段，你很可能会犯下后来才感到后悔的设计错误。尝试预见未来的需求，并使表结构具有灵活性。你可以随时添加新表以应对新的需求。


    理论就讲到这里。接下来我们将通过为第 4 章和第 5 章中的日本之旅网站构建一个数据库，来进行更实际的练习。


    ## 使用图形界面


    与 MySQL 数据库交互的传统方式是通过命令提示符窗口或终端。但使用第三方图形界面（例如 phpMyAdmin，一个基于浏览器的 MySQL 前端）要容易得多（见图
    10-4）。


    ![A978-1-4842-0635-5_10_Fig4_HTML.jpg](img/A978-1-4842-0635-5_10_Fig4_HTML.jpg)


    图 10-4. phpMyAdmin 是一个免费的 MySQL 图形界面，可在浏览器中运行


    由于 phpMyAdmin（[`www.phpmyadmin.net`](http://www.phpmyadmin.net/)）会随 XAMPP、MAMP
    以及大多数其他免费的一体化包自动安装，因此本书选用了它。它易于使用，并具备设置和管理 MySQL 数据库所需的所有基本功能。它适用于 Windows、Mac
    OS X 和 Linux。许多托管公司将其作为 MySQL 的标准界面提供。


    如果你经常使用数据库，最终可能会想探索其他图形界面。其中值得一提的是 Navicat（[`www.navicat.com`](http://www.navicat.com/)），这是一款付费产品，适用于
    Windows、Mac OS X 和 Linux。Navicat Cloud 服务还允许你通过 iPhone 或 iPad 管理数据库。Navicat 在
    Web 开发者中尤其受欢迎，因为它能够从远程服务器到本地计算机执行数据库的定时备份。它还帮助你以直观且可视化的方式构建 SQL 查询（见图 10-5）。


    ![A978-1-4842-0635-5_10_Fig5_HTML.jpg](img/A978-1-4842-0635-5_10_Fig5_HTML.jpg)


    图 10-5. Navicat 是最流行的 MySQL 图形用户界面之一


    **注意**


    Navicat 有分别适用于 MySQL 和 MariaDB 的版本，但 MySQL 版本也支持 MariaDB。


    ### 启动 phpMyAdmin


    如果你在 Windows 上运行 XAMPP，有三种方法可以启动 phpMyAdmin：


    * 在浏览器地址栏中输入 `http://localhost/phpMyAdmin/`。

    * 点击 XAMPP 控制面板中的 MySQL Admin 按钮。

    * 点击 XAMPP 管理页面（`http://localhost/xampp/`）中“工具”下的 phpMyAdmin 链接。


    如果你在 Mac OS X 上安装了 MAMP，请点击 MAMP 起始页顶部菜单中的 phpMyAdmin 标签（点击 MAMP 控件小部件中的“打开起始页”）。


    如果你手动安装了 phpMyAdmin 或使用了其他一体化包，请按照该包的说明操作，或在浏览器地址栏中输入相应的地址（通常为 `http://localhost/phpmyadmin/`）。


    **提示**


    如果收到消息说服务器未响应或套接字配置不正确，请确保 MySQL 服务器正在运行。


    如果你安装了 XAMPP，可能会看到一个要求输入用户名和密码的屏幕。如果是这样，请以 root 超级用户身份登录 phpMyAdmin。输入 `root`
    作为用户名，并使用设置 XAMPP 时为用户 root 创建的密码。


    ## 设置 phpsols 数据库


    在本地测试环境中，你在 MySQL 中可以创建的数据库数量没有限制，并且可以随意命名它们。我假设你正在本地测试环境中工作，因此将向你展示如何设置一个名为 `phpsols`
    的数据库，以及两个分别名为 `psread` 和 `pswrite` 的用户账户。


    **注意**


    在共享主机上，你可能仅限于使用托管公司设置的一个数据库。如果你在远程服务器上进行测试且无权设置新的数据库和用户账户，请将托管公司分配给你的数据库名称和用户名分别替换为
    `phpsols` 和 `pswrite`。

