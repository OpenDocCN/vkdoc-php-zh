    **How It Works: Order Details Admin**


    The init method found in AdminOrderDetails advances the pipeline to the next section
    if the Process button is clicked; the presence of this button on the page depends
    on the value of the mProcessButtonText member.


    This value is set to “Confirm Stock” if the current pipeline section is 3 (awaiting
    stock confirmation), or to “Confirm Shipment” if the current pipeline section
    is 6 (awaiting shipment confirmation). If the current pipeline section is not
    set to 3 or 6, it means that the order has been completed successfully, and the
    button is not shown. The administrator can always check what happened to the order
    by checking the audit trail that is displayed on the page.


    All that remains now is to check that everything is working properly. To do this,
    use the web interface to place an order, and then check it out via the orders
    details admin section. You should see that the order is awaiting confirmation
