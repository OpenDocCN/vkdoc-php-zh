    `foreach` 循环语句中被审查。在内层循环中，内部数组元素的键被写入 `$k2` 变量，该元素的值被写入 `$v2` 变量。命令 `echo "\$B[$k1][$k2]
    = $v2\n"` 显示内部数组中元素的键和值。


