  trans: "\n函数签名包含两个参数：`$array` 和 `$max`。`$array` 前有数组类型声明，因此如果向该函数传递其他类型的数据，将触发错误。`$max`\
    \ 设置了要连接的最大元素数量，默认值为 `4`，因此它是一个可选参数。\n\n在函数内部，我们可以使用 `switch` 语句，根据数组中元素的数量来决定如何处理输出：\n\
    \n```\nswitch (count($array)) {\ncase 0:\nreturn '';\ncase 1:\nreturn array_pop($array);\n\
    case 2:\nreturn implode(' and ', $array);\ndefault:\n$last = array_pop($array);\n\
    return implode(', ', $array) . \" and $last\";\n}\n```\n\n传递给 `switch` 语句的参数是\
    \ `count($array)`，也就是数组中元素的数量。\n\n如果数组不包含任何元素，则返回空字符串。如果只有一个元素，则在返回结果前将该数组传递给\
    \ `array_pop()` 函数。之所以需要这样做，是因为函数应该返回一个可直接显示的字符串。如果直接返回 `$array`，它仍然是一个数组，无法使用\
    \ `echo` 或 `print` 来显示。`array_pop()` 函数移除数组中的最后一个元素并将其返回。\n\n如果数组中有两个元素，`switch`\
    \ 语句会将数组传递给 `implode()` 函数，并附带两侧各有一个空格的字符串 \"and\"，然后返回结果。\n\n默认操作使用 `array_pop()`\
    \ 函数移除数组中的最后一个元素。然后，将数组传递给 `implode()` 函数，第一个参数为一个逗号加一个空格。并且，在返回结果之前，将最后一个元素的值与用逗号分隔的字符串拼接，前面加上\
    \ \"and\"。\n\n**提示**  \n每个 `case` 后面不需要使用 `break` 语句，因为 `return` 关键字会立即停止任何进一步执行。\n\
    \n1. 保存脚本，并依次使用每个测试数组进行测试。例如：\n\n```\necho with_commas($threesome);\n```\n\n2.\
    \ 此操作将以符合语法规范的方式，用逗号连接数组元素：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figq_HTML.jpg](img/332054_4_En_8_Figq_HTML.jpg)\n\
    \n3. 让我们修复数组元素数量超过 `$max` 的情况，首先处理超过一个的情况。在 `default` 之前立即插入以下代码：\n\n```\ncase\
    \ $max + 1:\nreturn implode(', ', array_slice($array, 0, $max)) . ' and one other';\n\
    ```\n\n此操作将 `array_slice($array, 0, $max)` 作为第二个参数传递给 `implode()`。`array_slice()`\
    \ 函数接受三个参数：要从中提取元素的数组、要开始提取的元素的索引，以及要提取的元素数量。数组从零开始计数，因此这会从数组开头开始，提取 `$max` 个元素。然后，在返回结果之前，将字符串\
    \ \"and one other\" 拼接到结果后面。\n\n4. 保存脚本并再次测试。如果使用 `$threesome` 进行测试，你将得到与上一屏幕截图相同的结果。`$fab_four`\
    \ 的结果也和之前一样。现在使用 `$too_many` 进行测试，会产生以下结果：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figr_HTML.jpg](img/332054_4_En_8_Figr_HTML.jpg)\n\
    \n5. 超出 `$max` 的多个元素也以类似方式处理。但是，`case` 语句不能以比较运算符开头。它必须是一个完整的表达式。在第 7 步的代码之后立即插入以下代码：\n\
    \n```\ncase count($array) > $max + 1:\nreturn implode(', ', array_slice($array,\
    \ 0, $max)) . ' and others';\n```\n\n这里的重要之处在于，你需要再次将 `$array` 传递给 `count()` 函数以获取数组中的元素数量。你不能使用以下代码：\n\
    \n```\n// 这会触发解析错误\ncase > $max + 1:\n```\n\n6. 保存脚本并再次运行。对于 `$too_many`，结果保持不变。但是，将\
    \ `with_commas()` 的第二个参数更改为一个较小的数字，如下所示：\n\n```\necho with_commas($too_many, 3);\n\
    ```\n\n这将按如下方式更改输出：\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figs_HTML.jpg](img/332054_4_En_8_Figs_HTML.jpg)\n\
    \n7. 你可以在 `ch08` 文件夹中的 `commas_02.php` 查看完成的代码。\n\n## 排序数组\n\n表 8-2 列出了许多用于排序数组的内置\
    \ PHP 函数。\n\n**表 8-2. 数组排序函数**\n\n| 函数 | 描述 |\n| --- | --- |\n| `sort()` | 按升序排序（从低到高）\
    \ |\n| `rsort()` | 按降序排序（从高到低） |\n| `asort()` | 按值升序排序，保持键值对应关系 |\n| `arsort()`\
    \ | 按值降序排序，保持键值对应关系 |\n| `ksort()` | 按键升序排序，保持键值对应关系 |\n| `krsort()` | 按键降序排序，保持键值对应关系\
    \ |\n| `natsort()` | 按“自然顺序”排序值，保持键值对应关系 |\n| `natcasesort()` | 按不区分大小写的“自然顺序”排序值，保持键值对应关系\
    \ |\n| `usort()` | 使用回调比较函数按值排序 |\n| `uasort()` | 使用回调比较函数按值排序，保持键值对应关系 |\n| `uksort()`\
    \ | 使用回调比较函数按键排序，保持键值对应关系 |\n| `array_multisort()` | 对多个或多维数组进行排序 |\n\n表 8-2 中的所有函数都会影响原始数组，并且仅根据操作是否成功返回\
    \ `true` 或 `false`。前六个函数（一直到 `krsort()`）可以将表 8-3 中列出的 PHP 常量作为可选的第二个参数来修改排序顺序。\n\
    \n**表 8-3. 修改排序顺序的常量**\n\n| 常量 | 描述 |\n| --- | --- |\n| `SORT_REGULAR` | 比较项时不更改其类型（默认）\
    \ |\n| `SORT_NUMERIC` | 将项作为数字进行比较 |\n| `SORT_STRING` | 将项作为字符串进行比较 |\n| `SORT_LOCALE_STRING`\
    \ | 基于当前区域设置比较项 |\n| `SORT_NATURAL` | 按“自然顺序”比较项 |\n| `SORT_FLAG_CASE` | 可与 `SORT_STRING`\
    \ 或 `SORT_NATURAL` 结合使用，使用竖线（`|`）进行不区分大小写的字符串排序 |\n\n这两个按“自然顺序”排序值的函数和常量，会以人类的方式对包含数字的字符串进行排序。在\
    \ `ch08` 文件夹中的 `natsort.php` 里有一个示例，它使用 `sort()` 和 `natsort()` 对以下数组进行排序：\n\n\
    ```\n$images = ['image10.jpg', 'image9.jpg', 'image2.jpg'];\n```\n\n以下屏幕截图显示了不同的结果：\
    \  \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figt_HTML.jpg](img/332054_4_En_8_Figt_HTML.jpg)\
    \  \n使用 `sort()` 时，顺序不仅违反直觉，而且索引也被重新编号了。使用 `natsort()` 时，顺序对人类更友好，并且原始索引得以保留。\n\
    \n**提示**  \n`natsort()` 和 `natcasesort()` 函数没有对应的逆序排序函数，但你可以将结果传递给内置的 `array_reverse()`\
    \ 函数。这将返回一个元素顺序相反的新数组，而不进行排序。与表 8-2 中的函数不同，原始数组不会改变。关联数组键得以保留，但索引数组会被重新编号。为了防止索引数组被重新编号，请将布尔值\
    \ `true` 作为第二个（可选）参数传递。\n"
- fmt: "The callback comparison function used in `usort()`, `uasort()`, and `uksort()`\
    \ must take two arguments and return an integer less than, equal to, or greater\
    \ than zero if the first argument is respectively less than, equal to, or greater\
    \ than the second argument. PHP Solution 8-5 shows how to do this with the PHP\
    \ 7 spaceship operator.\n\n## PHP Solution 8-5: Custom sorting with the Spaceship\
    \ Operator\n\nThe first eight sort functions in Table 8-2 do a great job handling\
    \ most sort operations. However, they can’t cover every scenario. That’s when\
    \ the custom sort functions come in handy. This PHP solution shows how the PHP\
    \ 7 spaceship operator simplifies custom sorting.\n\n1.  Open `spaceship_01.php`\
    \ in the `ch08` folder. It contains the following multidimensional array of a\
    \ music playlist and a loop to display it as an unordered list:\n\n    ```php\n\
    \    $playlist = [\n        ['artist' => 'Jethro Tull', 'track' => 'Locomotive\
    \ Breath'],\n        ['artist' => 'Dire Straits', 'track' => 'Telegraph Road'],\n\
    \        ['artist' => 'Mumford and Sons', 'track' => 'Broad-Shouldered Beasts'],\n\
    \        ['artist' => 'Ed Sheeran', 'track' => 'Nancy Mulligan'],\n        ['artist'\
    \ => 'Dire Straits', 'track' => 'Sultans of Swing'],\n        ['artist' => 'Jethro\
    \ Tull', 'track' => 'Aqualung'],\n        ['artist' => 'Mumford and Sons', 'track'\
    \ => 'Thistles and Weeds'],\n        ['artist' => 'Ed Sheeran', 'track' => 'Eraser']\n\
    \    ];\n    echo '';\n    foreach ($playlist as $item) {\n        echo \"{$item['artist']}:\
    \ {$item['track']}\";\n    }\n    echo '';\n    ```\n\n2.  Insert a line before\
    \ the loop to sort the array using `asort()`:\n\n    ```php\n    asort($playlist);\n\
    \    ```\n\n3.  Save the file, and load it into a browser. As Figure 8-1 shows,\
    \ `asort()` has not only sorted the artists alphabetically; the tracks associated\
    \ with each artist are also in alphabetical order.\n\n    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig1_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fig1_HTML.jpg)\n\
    \n    **Figure 8-1.** The `asort()` function makes light work of sorting the values\
    \ in a multidimensional associative array.\n\n4.  However, let’s say you want\
    \ to order the playlist alphabetically by track name. For that, you need a custom\
    \ sort. Replace the line of code you inserted in step 2 with the following:\n\n\
    \    ```php\n    usort($playlist, function ($a, $b) {\n        return $a['track']\
    \ <=> $b['track'];\n    });\n    ```\n\n    This uses the `usort()` function with\
    \ an anonymous callback function. The two arguments to the callback (`$a` and\
    \ `$b`) represent the two array elements that you want to compare. Inside the\
    \ body of the function, the values of the current track element are compared using\
    \ the PHP 7 spaceship operator, which returns an integer less than, equal to,\
    \ or greater than zero depending respectively on whether the operand on the left\
    \ is less than, equal to, or greater than the operand on the right. The callback\
    \ function returns the result of the comparison.\n\n5.  To make the results of\
    \ the custom sort clearer to see, swap the order of artist and track displayed\
    \ in each list item:\n\n    ```php\n    echo \"{$item['track']}: {$item['artist']}\"\
    ;\n    ```\n\n6.  Save the file and reload it in the browser. The tracks are now\
    \ listed in alphabetical order (see Figure 8-2).\n\n    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig2_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fig2_HTML.jpg)\n\
    \n    **Figure 8-2.** The playlist has now been sorted alphabetically by track\
    \ name.\n\n7.  To reverse the order of the custom sort, swap the order of the\
    \ operands on either side of the spaceship operator:\n\n    ```php\n    usort($playlist,\
    \ function ($a, $b) {\n        return $b['track'] <=> $a['track'];\n    });\n\
    \    ```\n\n8.  You can check your code against `spaceship_02.php` in the `ch08`\
    \ folder.\n\n## Complex sorting with `array_multisort()`\n\nThe `array_multisort()`\
    \ function serves two purposes, namely:\n\n*   To sort multiple arrays that you\
    \ want to keep in sync\n*   To sort a multidimensional array by one or more dimensions\n\
    \nThe code in `multisort_01.php` contains an example of arrays that need to be\
    \ kept in sync when reordered. The `$states` array lists states in alphabetical\
    \ order, while the `$population` array contains the population of each state listed\
    \ in the same order:\n\n```php\n$states = ['Arizona', 'California', 'Colorado',\
    \ 'Florida', 'Maryland', 'New York', 'Vermont'];\n$population = [7171646, 39557045,\
    \ 5695564, 21299325, 6042718, 19542209, 626299];\n```\n\nA loop then displays\
    \ each state’s name alongside its population:\n\n```php\necho '';\nfor ($i = 0,\
    \ $len = count($states); $i < $len; $i++) {\n    echo \"<li>$states[$i]: $population[$i]</li>\"\
    ;\n}\necho '';\n```\n\nFigure 8-3 shows the output.\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig3_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fig3_HTML.jpg)\n\
    \n**Figure 8-3.** Although the states and population figures are in different\
    \ arrays, they’re in the correct order.\n\nHowever, if you want to reorder the\
    \ population data in ascending or descending order, both arrays need to be kept\
    \ in sync.\n\nThe code in `multisort_02.php` shows how this is done with `array_multisort()`:\n\
    \n```php\narray_multisort($population, SORT_ASC, $states);\n```\n\nThe first argument\
    \ to `array_multisort()` is the array that you want to sort first. It can be followed\
    \ by two optional arguments: the sort direction using the constants `SORT_ASC`\
    \ or `SORT_DESC` for ascending and descending, respectively, and the sort type\
    \ using one of the constants listed in Table 8-3. The remaining arguments are\
    \ the other arrays that you want to be sorted in sync with the first. Each subsequent\
    \ array can also be followed by the optional arguments for sort direction and\
    \ type.\n\nIn this example, the `$population` array is sorted in ascending order,\
    \ and the `$states` array is reordered in sync with it. As Figure 8-4 shows, the\
    \ correct relationship between the population data and the state names is maintained.\n\
    \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Fig4_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Fig4_HTML.jpg)\n\
    \n**Figure 8-4.** The population numbers are now in ascending order, keeping the\
    \ correct state names with them.\n\nThe next PHP solution shows an example of\
    \ using `array_multisort()` to reorder a multidimensional array by multiple dimensions.\n\
    \n## PHP Solution 8-6: Sorting a Multidimensional Array with `array_multisort()`\n\
    \nIn the previous PHP solution, we used the spaceship operator to custom sort\
    \ a multidimensional array by comparing the values assigned to a single key. In\
    \ this solution, we’ll use `array_multisort()` to perform a more complex sort\
    \ operation.\n\n1.  The code in `multisort_03.php` contains an updated version\
    \ of the `$playlist` multidimensional array from PHP Solution 8-5. A rating key\
    \ has been added to each subarray like this:\n\n    ```php\n    $playlist = [\n\
    \        ['artist' => 'Jethro Tull', 'track' => 'Locomotive Breath', 'rating'\
    \ => 8],\n        ['artist' => 'Dire Straits', 'track' => 'Telegraph Road', 'rating'\
    \ => 7],\n        ['artist' => 'Mumford and Sons', 'track' => 'Broad-Shouldered\
    \ Beasts', 'rating' => 9],\n        ['artist' => 'Ed Sheeran', 'track' => 'Nancy\
    \ Mulligan', 'rating' => 10],\n        ['artist' => 'Dire Straits', 'track' =>\
    \ 'Sultans of Swing', 'rating' => 9],\n        ['artist' => 'Jethro Tull', 'track'\
    \ => 'Aqualung', 'rating' => 10],\n        ['artist' => 'Mumford and Sons', 'track'\
    \ => 'Thistles and Weeds', 'rating' => 6],\n        ['artist' => 'Ed Sheeran',\
    \ 'track' => 'Eraser', 'rating' => 8]\n    ];\n    ```\n\n2.  As the previous\
    \ solution demonstrated, it’s easy to sort the array alphabetically by track with\
    \ `usort()` and the spaceship operator. We could also sort the array by rating;\
    \ but sorting by both rating and track requires a different approach."
