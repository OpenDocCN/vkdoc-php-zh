- fmt: 'GET methods are also run with the HTTP Socket utility. The serialized set
    of GET names and values is generally appended to the URL string, so with the `HttpSocket::get()`
    function you can provide a GET query as the second parameter. The contents of
    the GET response are returned to the variable, so if the server returns some HTML
    or an error message or HTTP headers, it will appear as the returned string.


    `$response = $http->get(''http://domain.com/'');`


    To run a page scrape of another web site or to perform other HTTP requests, use
    the `HttpSocket::request()` function. This function will perform an HTTP request
    and return the raw server response, be it a web page or some other text.


    `$response = $http->request(''http://domain.com/web_page.html'');`


    ## Using Other HTTP Socket Functions


    Other functions in the HTTP Socket utility include `buildHeader()`, `buildRequestLine()`,
    `buildUri()`, `decodeBody()`, `delete()`, `parseHeader()`, `parseUri()`, `put()`,
    and more. When considering how to perform HTTP requests or socket methods for
    your site, consult this utility, and it will likely contain useful functions to
    minimize the amount of coding you will have to write.


    ## Localization and Internationalization


    For web sites that will have an international audience, translating site content
    can be difficult. In recent years some important localization (L10n) and internationalization
    (I18n) standards have been implemented for the Web and other software systems.
    Cake makes use of L10n and I18n standards and methods with their respective utilities.


    > **Note** The “10” and “18” in `L10n` and `I18n` represent the number of letters
    between the first and last in the words *localization* and *internationalization*.
    (Developers use these terms so often that spelling them out was taking too long.)
    Cake’s utility classes are named using these abbreviated versions, not the full
    titles, so the Localization utility class is named in the core `L10n`, not Localization.


    ## Working with Locale Files


    To localize a web site, or in other words, to make the site content fit the language,
    number system, currency, and other standards of visitors, use the `L10n` utility.
    For example, if a user in Spain were to need the application, you might want to
    translate some important titles, buttons, links, and other strings into Spanish.
    To do so, you must first set up Spanish locales or locale files for `L10n` to
    use in translation.


    Locale files are stored in the `app/locale` directory and are arranged in subfolders
    named for the language or locale. The names and strings that `L10n` uses conform
    to the ISO 639–2 standard (for more information, consult the Library of Congress,
    which is the official registration authority for the standard: [http://www.loc.gov/standards/iso639-2/](http://www.loc.gov/standards/iso639-2)).
    Locale files use the `.po` file extension and are arranged by locale.


    By default, Cake includes the English locale folder, `app/locale/eng`. In it you’ll
    see another subfolder, which contains locale files for translating strings and
    messages, `LC_MESSAGES`. For each language you’d like to localize, create a `default.po`
    file and store this in its locale folder. For Spanish, for example, you would
    need to create not only the `default.po` file for the `app/locale/eng/LC_MESSAGES`
    directory but also one for the `app/locale/spa/LC_MESSAGES` folder. The next step
    is to write in these locale files the string you want to be translated.


    ## Translating Strings


    Translating strings is made easy by using two keys: `msgid` and `msgstr`. In the
    `default.po` locale file, for each line provide one of these keys with an associated
    value. For example, in the English locale file, you could include the contents
    of Listing 11-11.


    **Listing 11-11.** *An Example of Content in the English Locale File*


    ```

    msgid

    "home"

    msgstr

    "Welcome to Our Site"


    msgid "contact"

    msgstr

    "Contact Us"


    msgid

    "login"

    msgstr "Log In"

    ```'
