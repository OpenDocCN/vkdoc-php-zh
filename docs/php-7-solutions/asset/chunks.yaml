    \ {\n    ```\n\n    将其替换为：\n\n```\n    while ($row = $result->fetch()) {\n   \
    \ ```\n\n    `getFirst()`函数处理`$row['article']`并将结果存储在`$extract`中。`$extract[0]`中的前两个句子会立即显示。如果`$extract[1]`包含内容，则表示还有更多要显示的内容。因此`if`块内的代码会显示一个指向`details.php`的链接，链接中带有文章主键的查询字符串。\n\
    \n6.  保存页面并在浏览器中测试。你应该会看到每篇文章的前两个句子如图 16-3 所示。\n\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig3_HTML.jpg](img/332054_4_En_16_Fig3_HTML.jpg)\n\
    \n图 16-3. 前两个句子已从较长的文本中干净地提取出来\n\n7.  通过向`getFirst()`添加数字作为第二个参数来测试函数，如下所示：\n\n\
    ```\n$extract = getFirst($row['article'], 3);\n```\n\n这将显示前三个句子。如果增加的数字等于或超过文章中的句子数量，则不会显示“More”链接。\
    \  \n你可以将你的代码与`ch16`文件夹中的`blog_mysqli.php`和`blog_pdo.php`进行比较。  \n我们将在第 17 章中介绍`details.php`。在此之前，让我们先处理动态网站中日期使用这个雷区。\n"
- fmt: "# Let’s Make a Date\n\nDates and time are so fundamental to modern life that\
    \ we rarely pause to think how complex they are. There are 60 seconds to a minute\
    \ and 60 minutes to an hour, but 24 hours to a day. Months range between 28 and\
    \ 31 days, and a year can be either 365 or 366 days. The confusion doesn’t stop\
    \ there, because 7/4 means July 4 to an American or Japanese person, but 7 April\
    \ to a European. To add to the confusion, PHP handles dates differently from MySQL.\
    \ Time to bring order to chaos…\n\n> **Note**: MariaDB handles dates the same\
    \ way. To avoid unnecessary repetition, I’ll refer only to MySQL.\n\n## How MySQL\
    \ Handles Dates\n\nIn MySQL, dates and time are always expressed in descending\
    \ order from the largest unit to the smallest: year, month, date, hour, minutes,\
    \ seconds. Hours are always measured using the 24-hour clock, with midnight expressed\
    \ as `00:00:00`. Even if this seems unfamiliar to you, it’s the recommendation\
    \ laid down by the International Organization for Standardization (ISO). MySQL\
    \ allows considerable flexibility about the separator between the units (any punctuation\
    \ symbol is acceptable), but there is no argument about the order—it’s fixed.\
    \ If you attempt to store a date in any other format than year, month, date, MySQL\
    \ inserts `0000-00-00` in the database.\n\nI’ll come back later to the way you\
    \ insert dates into MySQL, because it’s best to validate them and format them\
    \ using PHP. First, let’s look at some of the things you can do with dates once\
    \ they’re stored in MySQL. MySQL has many date and time functions, which are listed\
    \ with examples at [`https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html`](https://dev.mysql.com/doc/refman/8.0/en/date-and-time-functions.html).\
    \ One of the most useful functions is `DATE_FORMAT()`, which does exactly what\
    \ its name suggests.\n\n### Formatting Dates in a `SELECT` Query with `DATE_FORMAT()`\n\
    \nThe syntax for `DATE_FORMAT()` is as follows:\n\n```\nDATE_FORMAT(date, format)\n\
    ```\n\nNormally, *date* is the table column to be formatted, and *format* is a\
    \ string composed of formatting specifiers and any other text you want to include.\
    \ Table 16-1 lists the most common specifiers, all of which are case-sensitive.\n\
    \n**Table 16-1. Frequently used MySQL date format specifiers**\n\n| Period | Specifier\
    \ | Description | Example |\n| --- | --- | --- | --- |\n| Year | `%Y` | Four-digit\
    \ format | 2014 |\n| | `%y` | Two-digit format | 14 |\n| Month | `%M` | Full name\
    \ | January, September |\n| | `%b` | Abbreviated name, three letters | Jan, Sep\
    \ |\n| | `%m` | Number with leading zero | 01, 09 |\n| | `%c` | Number without\
    \ leading zero | 1, 9 |\n| Day of month | `%d` | With leading zero | 01, 25 |\n\
    | | `%e` | Without leading zero | 1, 25 |\n| | `%D` | With English text suffix\
    \ | 1st, 25th |\n| Weekday name | `%W` | Full text | Monday, Thursday |\n| | `%a`\
    \ | Abbreviated name, three letters | Mon, Thu |\n| Hour | `%H` | 24-hour clock\
    \ with leading zero | 01, 23 |\n| | `%k` | 24-hour clock without leading zero\
    \ | 1, 23 |\n| | `%h` | 12-hour clock with leading zero | 01, 11 |\n| | `%l` (lowercase\
    \ “L”) | 12-hour clock without leading zero | 1, 11 |\n| Minutes | `%i` | With\
    \ leading zero | 05, 25 |\n| Seconds | `%S` | With leading zero | 08, 45 |\n|\
    \ AM/PM | `%p` | | |\n\nAs explained earlier, when using a function in an SQL\
    \ query, assign the result to an alias using the `AS` keyword. Referring to Table\
    \ 16-1, you can format the date in the `created` column of the `blog` table in\
    \ a common US style and assign it to an alias, like this:\n\n```\nDATE_FORMAT(created,\
    \ '%c/%e/%Y') AS date_created\n```\n\nTo format the same date in the European\
    \ style, reverse the first two specifiers, like this:\n\n```\nDATE_FORMAT(created,\
    \ '%e/%c/%Y') AS date_created\n```\n\n> **Tip**: When using `DATE_FORMAT()`, don’t\
    \ use the original column name as the alias, because the values are converted\
    \ to strings, which plays havoc with the sort order. Choose a different alias,\
    \ and use the original column name to sort the results.\n\n### PHP Solution 16-2:\
    \ Formatting a MySQL Date or Timestamp\n\nThis PHP solution formats the dates\
    \ in the blog entry management page from Chapter 15.\n\n1. Open `blog_list_mysqli.php`\
    \ or `blog_list_pdo.php` in the `admin` folder and locate the SQL query. It looks\
    \ like this:\n\n   ![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig4_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Fig4_HTML.jpg)\n\
    \n   **Figure 16-4.** The MySQL timestamps are now nicely formatted\n\n2. Change\
    \ it like this:\n\n   ```sql\n   $sql = 'SELECT article_id, title,\n   DATE_FORMAT(created,\
    \ \"%a, %b %D, %Y\") AS date_created\n   FROM blog ORDER BY created DESC';\n \
    \  ```\n\n   I used single quotes around the whole SQL query, so the format string\
    \ inside `DATE_FORMAT()` needs to be in double quotes.\n\n   Make sure there is\
    \ no gap before the opening parenthesis of `DATE_FORMAT()`.\n\n   The format string\
    \ begins with `%a`, which displays the first three letters of the weekday name.\
    \ If you use the original column name as the alias, the `ORDER BY` clause sorts\
    \ the dates in reverse alphabetical order: Wed, Thu, Sun, and so on. Using a different\
    \ alias ensures that the dates are still ordered chronologically.\n\n3. In the\
    \ first table cell in the body of the page, change `$row['created']` to `$row['date_created']`\
    \ to match the alias in the SQL query.\n\n4. Save the page and load it into a\
    \ browser. The dates should now be formatted as shown in Figure 16-4. Experiment\
    \ with other specifiers to suit your preferences.\n\n```sql\n$sql = 'SELECT *\
    \ FROM blog ORDER BY created DESC';\n```\n\nUpdated versions of `blog_list_mysqli.php`\
    \ and `blog_list_pdo.php` are in the `ch16` folder.\n\n## Adding to and Subtracting\
    \ from Dates\n\nWhen working with dates, it’s often useful to add or subtract\
    \ a specific time period. For instance, you may want to display items that have\
    \ been added to the database within the past 7 days or stop displaying articles\
    \ that haven’t been updated for 3 months. MySQL makes this easy with `DATE_ADD()`\
    \ and `DATE_SUB()`. Both functions have synonyms called `ADDDATE()` and `SUBDATE()`,\
    \ respectively.\n\nThe basic syntax is the same for all of them and looks like\
    \ this:\n\n```\nDATE_ADD(date, INTERVAL value interval_type)\n```\n\nWhen using\
    \ these functions, *date* can be the column containing the date you want to alter,\
    \ a string containing a particular date (in `YYYY-MM-DD` format), or a MySQL function,\
    \ such as `NOW()`. `INTERVAL` is a keyword followed by a value and an interval\
    \ type, the most common of which are listed in Table 16-2.\n\n**Table 16-2. Most\
    \ frequently used interval types with `DATE_ADD()` and `DATE_SUB()`**\n\n| Interval\
    \ type | Meaning | Value format |\n| --- | --- | --- |\n| `DAY` | Days | Number\
    \ |\n| `DAY_HOUR` | Days and hours | String presented as `'DD hh'` |\n| `WEEK`\
    \ | Weeks | Number |\n| `MONTH` | Months | Number |\n| `QUARTER` | Quarters |\
    \ Number |\n| `YEAR` | Years | Number |\n| `YEAR_MONTH` | Years and months | String\
    \ presented as `'YY-MM'` |\n\nThe interval types are constants, so do *not* add\
    \ “S” to the end of `DAY`, `WEEK`, and so on to make them plural.\n\nOne of the\
    \ most useful applications of these functions is to display only the most recent\
    \ items in a table.\n\n### PHP Solution 16-3: Displaying Items Updated within\
    \ the Past Week\n\nThis PHP solution shows how to limit the display of database\
    \ results according to a specific time interval. Use `blog.php` from PHP Solution\
    \ 16-1.\n\n1. Locate the SQL query in `blog.php`. It looks like this:\n\n   ```sql\n\
    \   $sql = 'SELECT * FROM blog ORDER BY created DESC';\n   ```\n\n2. Change it\
    \ like this:\n\n   ```sql\n   $sql = 'SELECT * FROM blog\n   WHERE updated > DATE_SUB(NOW(),\
    \ INTERVAL 1 WEEK)\n   ORDER BY created DESC';\n   ```\n\n   This tells MySQL\
    \ that you want only items that have been updated in the past week."
