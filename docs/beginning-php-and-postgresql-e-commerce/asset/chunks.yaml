    ## How It Works: The Business Tier Search Method\n\nThe main purpose of the `FlagStopWords`\
    \ method is to analyze which words will and will not be used for searching.\n\n\
    The full-text feature of PostgreSQL automatically filters the words that are less\
    \ than four letters by default, and you don't interfere with this behavior in\
    \ the business tier. However, you need to find out which words will be ignored\
    \ by PostgreSQL so you can inform the visitor.\n\nThe `Search` method of the business\
    \ tier is called from the presentation tier with the following parameters (notice\
    \ all of them except the first one are the same as the parameters of the data\
    \ tier `Search` method):\n\n- `$searchString` contains the search string entered\
    \ by the visitor.\n- `$allWords` is \"on\" for all-words searches.\n- `$pageNo`\
    \ represents the page of products being requested.\n- `$rHowManyPages` represents\
    \ the number of pages.\n\nThe method returns the results to the presentation tier\
    \ in an associative array.\n\n## Implementing the Presentation Tier\n\nThe catalog-searching\
    \ feature has two separate interface elements that you need to implement:\n\n\
    - A componentized template named `search_box`, whose role is to provide the means\
    \ to enter the search string for the visitor (refer to Figure 5-1).\n- A componentized\
    \ template named `search_results`, which displays the products matching the search\
    \ criteria (refer to Figure 5-2).\n\nYou'll create the two componentized templates\
    \ in two separate exercises.\n\n### Creating the Search Box\n\nFollow the steps\
    \ in the exercise to build the `search_box` componentized template, and integrate\
    \ it into HatShop."
