    \ makes both the code and the\n    output easier to read.\n    ```\n\nCaution\n\
    If you’re using an older version of PHP than 7.3, the closing\ndelimiter (END)\
    \ must not be indented. In PHP 7.3 and later, it can be\nindented, but no further\
