    The result of the program execution is as follows:


    ```

    The output of the program (from Listing 7-3)

    The object is created: 123

    The object is created: 321

    The object is deleted: 321

    The object is deleted: 123

    ```


    The program describes the `MyClass` class. The class has the `$code` field, the
    constructor, and the destructor. The constructor has a single argument (denoted
    as `$code`) with the default value `123`. In the constructor, the `$this->code=$code`
    command is executed, which assigns a value (the method argument) to the `$code`
    field of the object being created.


    > A circular icon with a letter i at the center. **Note:** Thus, if an argument
    is passed to the constructor, its value becomes the value of the `$code` field
    of the created object. If no argument is passed to the constructor, the field
    gets the default value `123`.


    The `echo "The object is created: ",$this->code,"\n"` command displays a message
    that the object has been created and informs about the value of its field.


    > A circular icon with a letter i at the center. **Note:** So, when an object
    is created, a message about that automatically appears, and it also contains information
    about the value of the object’s field.


    The destructor contains only one command `echo "The object is deleted: ",$this->code,"\n"`,
    which informs you that the object is deleted.


    In addition to the class description, the program contains two commands, `$A=new
    MyClass()` and `$B=new MyClass(321)`, which create objects of the `MyClass` class.
    When the `$A` object is created, no arguments are passed to the constructor, so
    the `$code` field of that object is set to `123`.


    | Details |

    | --- |

    | If no arguments are passed to the constructor, you can put empty parentheses
    or not put them after the class name in the command that creates the object. In
    other words, instead of the `$A=new MyClass()` command, you could use the `$A=new
    MyClass` command. |


    When the `$B` object is created, the value `321` is passed to the constructor
    as an argument. That is the value of the `$code` field of the `$B` object. Each
    time an object is created, a constructor is called. The command displays a message
    in the constructor that the object was created. You create two objects, so two
    messages appear. Two more messages automatically appear when objects are deleted
    from memory. You see that the program ends with the commands creating objects.
    There are no other commands in the program. Therefore, after the objects are created,
    the program is terminated. But before the program is terminated, all created objects
    are automatically deleted from memory. As you already know, the destructor is
    called before the object is deleted. The command executed in the destructor displays
    a message that the object is deleted. Two objects were created, so two objects
    were also deleted.


    > A circular icon with a letter i at the center. **Note:** Objects are deleted
    in the reverse order as they were created: the last created object is deleted
    first.


    | Details |

    | --- |

    | In the previous versions of PHP, there was another way to create the constructor.
    It differs from the one described in that the constructor’s name is not `__construct()`,
    but its name matches the name of the class. In this case, that would be the `MyClass()`
    method. |


    > A bell icon. **The PHP 8 Standard:** In PHP 8, a method whose name is the same
    as the name of its class is no longer interpreted as the constructor.


    ## Static Fields and Methods


    The fields and methods that were described in the classes in the previous examples
    were ordinary—that is, non-static. But, as noted earlier, a class can also contain
    static members—*static* fields and static methods.


    From a formal point of view, creating a static field or method is easy. You describe
    it with the `static` keyword. But what is the difference between a static field
    or method and a non-static field or method? If ordinary (non-static) fields and
    methods are “attached” to an object, then static class members do not belong to
    any object. They exist on their own (but in the context of the class in which
    they are described).


    To refer to a static field or class method, specify the class name followed by
    a double colon (`::`), and then the name of the field or method (with arguments
    in parentheses) follows. If you call a static method or refer to a static field
    inside the class code, the `self` keyword is used instead of the class name.


    Listing [7-4](#613529_1_En_7_Chapter.xhtml#PC11) describes a class with a static
    field and two static methods.


    ```

    Listing 7-4

    Static Fields and Methods

    ```


    The output of the program is as follows:


    ```

    The output of the program (from Listing 7-4)

    The name: Alpha

    The name: Bravo

    ```


    The `MyClass` class has the static field `$name`. The `rename()` static method
    is designed to change the value of the `$name` field (the method argument has
    the same name). Assigning a value to the field is realized by the `self::$name=$name`
    command in the method. There, the `$name` instruction means the method’s argument,
    and the static field is accessed by the `self::$name` instruction.


    The static `hello()` method has no arguments. When the method is called, the `echo
    "The name: ",self::$name,"\n"` command is executed, which displays the value of
    the static field.


    After the class is declared, the `MyClass::$name="Alpha"` command assigns the
    `"Alpha"` string to the `$name` static field of the `MyClass` class. Here, you
    should pay attention to how the static field `$name` of the `MyClass` class is
    accessed: since you are accessing the field outside the class, use the `MyClass::$name`
    instruction, which contains the class name. Also noteworthy is that you have not
    yet created objects for the `MyClass` class and do not plan to create them.


    The `MyClass::hello()` and `MyClass::rename("Bravo")` commands are used to call
    the static methods. In the first case, the value of the static field `$name` of
    the `MyClass` class is displayed, and the second command sets the field to `"Bravo"`
    (after which the `hello()` method is called again in the program).


    ## Copying Objects


    From a practical point of view, such a task as copying objects is important. Let’s
    look at the example program shown in Listing [7-5](#613529_1_En_7_Chapter.xhtml#PC13).


    ```php

    code=$code;

    }

    function show(){

    echo "The field \$code: ",$this->code,"\n";

    }

    }


    # Creates an object:

    $A=new MyClass(100);

    echo "The object \$A\n";

    $A->show();


    # Assigns objects:

    $B=$A;

    echo "The object \$B\n";

    $B->show();

    ```'
