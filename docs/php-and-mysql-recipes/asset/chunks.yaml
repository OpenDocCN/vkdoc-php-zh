    ## Recipe 8-9. Transparency


    ### Problem


    Images are represented with a square box of a given width and height. If you draw
    objects on the image you might not use the entire canvas down to every last pixel.
    Placing an image on top of a web page will show all the pixels of the image, unless
    there is a way to make them transparent so that the background behind the image
    is visible through part of the image.


    ### Solution


    Some image formats (GIF and PNG) supports transparent pixels. Transparency is
    not supported with the JPEG format.


    Images created with the GD extension can have one of the colors defined as the
    transparent color or it''s possible to set partial transparency on specific colors
    to allow the background to be partially visible. This is called alpha blending.
    To create a color with transparency use the function `ImageColorAllocateAlpha()`.


