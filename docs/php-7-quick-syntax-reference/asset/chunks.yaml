    ## 运算符优先级


    当一个表达式包含多个运算符时，这些运算符的优先级决定了它们的求值顺序。优先级顺序见表[3-1](#A317139_2_En_3_Chapter.html#Tab1)。


    **表 3-1. 运算符优先级顺序**


    | 优先级 | 运算符 | 优先级 | 运算符 |

    | --- | --- | --- | --- |

    | `**` | | `&` |

    | `++ --` | | `^` |

    | `∼ - (unary)` | | `&#124;` |

    | `!` | | `&&` |

    | `* / %` | | `&#124;&#124;` |

    | `+ - (binary)` | | `= op=` |

    | `<< >>` | | `and` |

    | `< <= > >= <>` | | `xor` |

    | `== != === !== <=>` | | `or` |


    例如，乘法优先级高于加法，因此在以下代码行中会先计算乘法。


    ```

    $x = 4 + 3 * 2; // 10

    ```


    可以使用括号强制改变优先级。括号内的表达式会在该语句中的其他表达式之前被求值。


    ```

    $x = (4 + 3) * 2; // 14

    ```


    ## 额外的逻辑运算符


    在优先级表中，请特别注意最后三个运算符：`and`、`or`和`xor`。`and`和`or`运算符的工作方式与逻辑运算符`&&`和`||`相同。唯一的区别是它们的优先级更低。


    ```

    // 等同于：$a = (true && false);

    $x = true && false; // $x 为 false

    // 等同于：($a = true) and false;

    $x = true and false; // $x 为 true

    ```


    `xor`运算符是按位`^`运算符的布尔版本。如果只有一个操作数为`true`，则计算结果为`true`。


    ```

    $x = (true xor true); // false

    ```


    # 4. 字符串


    字符串是存储在变量中的一系列字符。在 PHP 中，字符串通常由单引号分隔。


    ```

    $a = ''Hello'';

    ```


    ## 字符串连接


    PHP 有两个字符串运算符。点号被称为连接运算符（`.`）。它将两个字符串合并为一个。它还有一个配套的赋值运算符（`.=`），用于将右侧的字符串追加到左侧的字符串变量中。


    ```

    $b = $a . '' World''; // Hello World

    $a .= '' World'';     // Hello World

    ```


    ## 字符串定界


    PHP 字符串可以用四种不同的方式定界。有两种常见的表示法：双引号（`" "`）和单引号（`'' ''`）。它们的区别在于，单引号字符串中不会解析变量，而双引号字符串中会解析变量。


    ```

    $c = ''World'';

    echo "Hello $c"; // "Hello World"

    echo ''Hello $c''; // "Hello $c"

    ```


    除非需要变量解析，否则通常倾向于使用单引号字符串，这突出了不会进行解析的特性。然而，双引号字符串被认为更易读，这使得选择更多取决于个人偏好。重要的是保持一致性。


    除了单引号和双引号字符串之外，还有两种表示法：heredoc 和 nowdoc。这些表示法主要用于包含较大的文本块。


    ## Heredoc 字符串


    heredoc 语法由`<<<`运算符后跟一个标识符和换行符组成。然后包含字符串，之后由包含该标识符的换行符来关闭字符串。在 heredoc 字符串中，变量会被解析，就像双引号字符串一样。


    ```

    $s = <<<LABEL

    Heredoc (with parsing)

    LABEL;

    ```


    ## Nowdoc 字符串


    nowdoc 字符串的语法与 heredoc 字符串相同，只是起始标识符需要用单引号括起来。在 nowdoc 字符串中，变量不会被解析。


    ```

    $s = <<<''LABEL''

    Nowdoc (without parsing)

    LABEL;

    ```


    ## 转义字符


    转义字符用于写入特殊字符，例如反斜杠和双引号。这些字符前总是需要一个反斜杠（`\`）。表[4-1](#A317139_2_En_4_Chapter.html#Tab1)列出了
    PHP 中可用的转义字符。


