  trans: "\n# JSON 数据\n修改密码程序若需处理 JSON 数据，只需参考本章前文 JSON 相关章节中的指示即可。\n\n# MySQL 数据\n\
    `UPDATE` SQL 语句需要按照前文 MySQL 章节中其他字段的修改方式，“设置”密码属性的结构。\n\n# 动手实践\n\n1.  从本书网站复制本节示例文件。调整密码修改程序，加入用于验证用户\
    \ ID、密码及新密码格式正确性的 PHP 代码。\n\n2.  从本书网站复制本章示例文件。调整注册程序，使其在尝试插入新的用户 ID/密码组合前，先检查是否存在重复的用户\
    \ ID。提示：可使用`in_array`方法实现。若用户 ID 已存在，应向用户显示相应提示信息。\n\n3.  从本书网站复制本节示例文件。修改必要程序，要求用户在注册时同时提供姓名、电话和邮箱。同时确保修改其他程序，以保证这些信息的有效性。\n\
    \n# 章节术语表\n\n| 身份验证 | 会话 |\n| --- | --- |\n| `session_start` | `isset` |\n| 会话属性\
    \ | `$_SESSION` |\n| 验证码 | `.{8,}` |\n| `?=.*\\d` | `?=.*[A-Z]` |\n| `?=.*[a-z]`\
    \ | 标头 |\n| `array_keys` | `password_hash` |\n| `password_verify` | 未注册用户 |\n\
    | `$_SERVER['REMOTE_ADDR']` | 注册页面 |\n| `preg_match` | `strlen` |\n| `file_get_contents`\
    \ | `preg_quote` |\n| `preg_replace` | 密码过期 |\n| 密码嗅探程序 | 限制尝试次数 |\n| 超时期限 | `strtotime`\
    \ |\n| SQL 注入 | |\n\n# 章节问题与项目\n\n## 选择题\n\n1.  身份验证具有以下哪项功能？\n    1.  为应用程序提供安全性\n\
    \    2.  验证用户 ID 和密码\n    3.  应使用加密密码\n    4.  以上所有选项\n\n2.  会话具有以下哪项功能？\n   \
    \ 1.  通过`session_create`方法创建\n    2.  允许在程序间共享信息\n    3.  不提供任何安全优势\n    4.  以上所有选项\n\
    \n3.  注册页面具有以下哪项功能？\n    1.  允许用户创建自己的用户 ID 和密码\n    2.  可用于收集用户信息\n    3.  应在存储密码前对其进行加密\n\
    \    4.  以上所有选项\n\n4.  验证码具有以下哪项功能？\n    1.  使用`session_start`将程序附加到当前会话\n   \
    \ 2.  验证用户是否已登录\n    3.  必须仅附加到界面层的程序\n    4.  以上所有选项\n\n5.  以下哪项描述了 SQL 注入？\n\
    \    1.  使用 SQL 语句更新数据库的过程\n    2.  在 SQL 语句中插入变量以提高灵活性的过程\n    3.  导致数据损坏\n \
    \   4.  以上所有选项\n\n## 判断题\n\n1.  MD5 是最新且最安全的加密技术。\n\n2.  应使用`password_hash`来创建加密密码。\n\
    \n3.  当用户输入正确用户 ID 和密码的尝试次数超过最大限制时，应通知用户。\n\n4.  身份验证系统无需设置密码超时，也无需在密码过期时强制用户更改密码。\n\
    \n5.  可以将`preg_replace`与加密密码结合使用，以确保 PHP 不会将特殊字符解释为 PHP 命令。\n\n## 简答题/论述题\n\n\
    1.  解释可用于降低密码嗅探程序发现正确用户 ID 和密码组合可能性的技术。\n\n2.  解释会话的工作原理。包括解释会话如何通过用户 ID 和密码身份验证帮助保护应用程序安全。\n\
    \n3.  什么是 SQL 注入？如何避免？\n\n4.  为什么密码需要加密？在互联网上探索并找出最新的加密版本。当前最新版本的 PHP 是否使用了最新版本的加密技术？\n\
    \n## 项目\n\n1.  从第 6 章下载日志维护文件，或使用你在第 6 章自行创建的维护文件。使用本章介绍的技术，通过用户 ID 和密码身份验证来保护这些文件。\n\
    \n2.  下载本章的文件。更新文件和程序，以便用户可以请求找回密码。必须随机生成一个临时密码（XML 文件中的新字段）（使用`rand`函数），并通过电子邮件发送给用户。该密码应有较短的过期时间（一天或更短）。用户必须能够通过验证注册页面输入的其他信息（安全问题或其他个人信息）来请求密码。如果用户使用临时密码成功登录，系统应强制用户更改密码。\n\
    \n## 课程项目\n\n1.  更新 ABC 电脑配件库存应用程序，使其包含本章所示的用户 ID 和密码身份验证功能。务必保护与该应用程序相关的所有日志维护程序。\n\
    \n# 9. 多功能界面\n\n*勤奋工作从未累死人，但何必冒险呢。*\n\n——埃德加·伯根（`http://coolfunnyquotes.com`）\n\
    \n## 章节目标/学生学习成果\n\n完成本章学习后，学生将能够\n\n*   创建一个能够执行删除、更新和插入操作的完整 PHP 应用程序\n*   使用\
    \ CSS 为完成的应用程序创建专业外观\n*   使用 JavaScript 接收和处理来自其他程序的数据\n*   保护应用程序内需要用户 ID/密码的所有程序\n\
    *   使用 JSON 对象中的值填充 HTML 对象\n*   创建一个使用当前密码加密技术的 PHP 程序\n\n## 完整的应用程序\n\n在本章中，我们将完成\
    \ ABC 流浪犬收容所预约系统的开发。系统的当前版本允许用户在每次添加完一只狗的信息后，必须重新登录才能添加别的狗。此外，系统也不允许用户更新或删除系统中已有的狗狗信息。我们在第\
    \ 7 章（数据对象）已经完成了提供更新和删除功能所需的大部分 PHP 代码。现在，我们需要将数据对象(`dog_data`)的这一部分附加到业务规则层(`dog`)。此外，我们还需要对界面层(`dog_interface`和`lab`)进行一些修改，以便调用`update`和`delete`方法并显示结果。正如你将很快看到的，大部分所需的编码工作都将在`lab.php`文件中进行。因此，我们将从这些修改开始。\n"
- fmt: '# Data Handling Using JavaScript


    The current `lab.php` file allows users to enter only dog information that will
    be inserted into the data storage (`XML`, `JSON`, or `MySQL`). The interface needs
    to be modified to allow users to indicate what activity they would like to accomplish
    (`Insert`, `Update`, or `Delete`). It also needs to allow users to pick a current
    dog if the process involves updating or deletion. This should, hopefully, indicate
    that we will need a list box that is populated with information on the dogs currently
    located in the shelter.


    We will look at the PHP changes necessary in later sections of this chapter. For
    now, let us assume that `dog_interface` (interface tier) will return this information,
    which was retrieved from `dog_data` (data tier) via the `dog` methods (business
    rules tier). We will also assume that similar coding to the `dog_breeds` program
    (Chapter [4](#394210_2_En_4_Chapter.xhtml)) will be created to produce a dogs
    list box.


    In addition, `lab.php` needs access to all the information from a particular dog
    that has been selected. The code will need to place all the information in the
    `dog_name` and `dog_weight` text boxes, the `dog_breeds` list box, and the `dog_color`
    radio buttons. We could accomplish this task in two ways. One is to allow the
    users to select the dog from the list box and then recall the `dog_interface`
    program to request the particular dog from the dog class, which in turn will request
    the information from the `dog_data` class. However, this is requiring an additional,
    unnecessary, call across the Internet to request the information. Instead, we
    can gather all the necessary information (`dog_breed` list box information, `dogs`
    list box information, and complete information of all dogs in the current data
    storage) when the user first calls the `lab.php` interface. We can use the current
    JavaScript AJAX code with just a couple of changes to retrieve all the necessary
    information.


    We must make sure that the user indicates what type of operation is requested
    (at least if it is an insert or change/delete) before we populate the form objects
    (text boxes, list box, and radio button). We can accomplish this by not displaying
    the form objects until a selection has been made. We can make a slight adjustment
    to the combination of JavaScript code and CSS code, used in Chapter [5](#394210_2_En_5_Chapter.xhtml),
    to require the users to select from a dogs list box before the form is displayed.


    ## Note


    The process we are about to look at is a very common practice used in web applications.
    Many web applications return data in an array, `JSON`, or `XML` format. The interface
    (in this example, `lab.php`) then can use JavaScript to retrieve the information
    needed.


    *Programming note—Shopping carts use a similar technique. As the customers select
    items to purchase, the items are placed in a data object (probably a `JSON` object)
    on the client machine. When the customer begins the process of checking out, the
    data is transferred to the server. This allows the customer to make changes that
    will not cause additional calls to the server. Since the purchase information
    is not considered a security risk, this is usually a safe procedure. Of course,
    this would not be a good way to handle credit card information.*


    Using the format shown in Figure [9-1](#394210_2_En_9_Chapter.xhtml#Fig1), the
    user is forced to select `NEW` or a dog from list box before proceeding. Once
    the user has made a choice, the HTML form can be displayed with the default values
    (for an insert) or the current values for the dog selected. CSS code will initially
    turn the display of the buttons (and the form) to `"none"`. JavaScript code (which
    we will look at soon) will change the display of the correct button(s) and the
    form to `"inline"` to display at the proper time.


    ![../images/394210_2_En_9_Chapter/394210_2_En_9_Fig1_HTML.jpg](images/394210_2_En_9_Chapter/394210_2_En_9_Fig1_HTML.jpg)'
