    ## Recipe 8-10. Adding Text


    ### Problem


    In the past few recipes we have seen how to draw on images and merge one image
    onto another image, but what if you want to add text? Can you use fonts or can
    it only be done with a system-defined font?


    ### Solution


    Depending on how PHP and the GD extension is compiled there are a few options
    to add text. The basic functionality is provided with the function `ImageString()`.
    This function will insert a string using one of five built-in fonts or you can
    use `ImageLoadFont()` to load a GD font. These font files must be generated on
    the same CPU architecture as they are being used on. This function can only draw
    horizontal text.


    In addition to this PHP can be compiled with FreeType support. When this is enabled
    you can use any TrueType font (`.ttf`) from your computer to render text on your
    images. The function `ImageTTFText()` is used to draw text with a TrueType font.
    The fonts used must be located on the server but there is no need to have them
    installed on the client computer.


    Using TrueType fonts makes it difficult to know the size (in pixels) of the resulting
    string. The size will depend on the font, font size and the characters written.
    The function `ImageTTFBox()` can be used to calculate the size of the surrounding
    box for a given text. This is useful if you want to check if a given string fits
    on the image or you want to center the text.


    ### How it Works


    The first example shows how to use the `ImageString()` function to add a text
    to an image.


    ![Image 25](index-224_1.jpg)


    ```php

    // 8_21.php


    $img = ImageCreateTrueColor(250, 50);


    ImageFill($img, 0, 0, 0xffffff);


    ImageString($img, 4, 10, 10, "PHP Recipes", 0);


    $f = $_GET[''f''] ?: ''gif'';


    switch (strtolower($f)) {


    case ''jpg'' :


    case ''jpeg'' :


    header(''Content-Type: image/jpeg'');


    ImageJPEG($img);


    break;


    case ''png'' :


    header(''Content-Type: image/png'');


    ImagePNG($img);


    break;


    default :


    header(''Content-Type: image/gif'');


    ImageGIF($img);


    break;


    }


    ImageDestroy($img);

    ```


    This will generate an image like the one shown below:


    There is a similar function called `ImageChar()`. In general it takes the same
    parameters as `ImageString` but it will only draw the first character of the string
    value passed.


    To create a similar image using TrueType fonts you need a version of PHP where
    TrueType/FreeType is compiled into the GD extension. This is not standard on Mac
    OSX but it''s available on most Linux distributions. The code would look something
    like this:


    ```php

    // 8_22.php


    $img = ImageCreateTrueColor(250, 50);


    ImageFill($img, 0, 0, 0xffffff);


    ImageTTFText($img, 12, -10, 10, 10, 0, "Verdana.ttf", "PHP Recipes"); $f = $_GET[''f'']
    ?: ''gif'';


    switch (strtolower($f)) {


    case ''jpg'' :


    case ''jpeg'' :


    header(''Content-Type: image/jpeg'');


    ImageJPEG($img);


    break;


    case ''png'' :


    header(''Content-Type: image/png'');

    ```


    ![Image 26](index-225_1.jpg)'
