    The program defines the `MyClass` class with the `$code` field, the one-argument
    constructor (defines the value of the `$code` field), and the `show()` method
    that displays the field’s value. Based on the `MyClass` class, the `$A=new MyClass(100)`
    command creates the `$A` object, whose `$code` field gets the value `100`. Using
    the `show()` method, check the value of that field. Then, the `$B=$A` command
    is executed. But the copying of objects, in that case, does not happen. The `$A`
    variable does not contain the object but only refers to it. The situation can
    be interpreted so that the `$A` variable contains the object’s address. Therefore,
    as a result of executing the `$B=$A` command, the address from the `$A` variable
    is copied to the `$B` variable. So, it turns out that the `$B` variable refers
    to the same object as the `$A` variable. Therefore, if you change the value of
    the `$code` field of the `$A` object (the `$A->code=200` command), the check shows
    that the value of the `$code` field of the `$B` object has also changed. But once
    again, you deal with the same object here.


    So, how can you create a copy of an object? One of the easiest ways is to use
    the `clone` instruction in the object assignment command. In particular, the `$B=clone
    $A` command could be used instead of the `$B=$A` command. The new version of the
    program that copies objects is shown in Listing [7-6](#613529_1_En_7_Chapter.xhtml#PC15).


    ```

    code=$code;

    }

    function show(){

    echo "The field \$code: ",$this->code,"\n";

    }

    }

    $A=new MyClass(100);

    echo "The object \$A\n";

    $A->show();


    # Copies objects:

    $B=clone $A;

    echo "The object \$B\n";

    $B->show();

    $A->code=200;

    echo "The object \$A\n";

    $A->show();

    echo "The object \$B\n";

    $B->show();

    ?>

    Listing 7-6

    Copying Objects

    ```


