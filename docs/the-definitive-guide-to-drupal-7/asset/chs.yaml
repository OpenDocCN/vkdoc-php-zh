  61 行记录 (0.00 秒)\n\n在列表靠前位置，由核心系统模块提供的权限中，有一个非常适合 X-ray 概览页面的权限：“访问站点报告”。这与管理后台![images](img/U001.jpg)\
  \ 报告 (`admin/reports`) 下其他页面使用的权限相同。你也可以将其用于 X-ray 页面。\n\n![images](img/square.jpg)\
  \ **提示** Drupal 在其数据库中存储了各种有趣且重要的信息。花些时间探索其中的内容非常值得。\n\n#### 在代码中查找权限的系统名称\n\n另一种查找机器名称的方法是在\
  \ Drupal 核心代码中搜索。如前所述，只有当至少一个角色被授予权限时，该权限才会存在于数据库中。一旦你在权限管理页面（`admin/people/permissions`）中看到“查看站点报告”，你就可以在\
  \ Drupal 核心模块的代码中搜索它。代码清单 19-14 展示了一个可在终端运行的`grep`命令；你的操作系统的文件浏览器或 IDE 也可以在 Drupal\
  \ 代码中搜索文本字符串。如果在 Drupal 安装根目录运行，此`grep`命令只会搜索`modules`文件夹中`.module`文件中包含“View site\
  \ reports”的文本。\n\n**代码清单 19-14.** 在 Drupal 核心中搜索“View site reports”文本的命令行步骤（加粗部分）\n\
  \n```bash\ngrep -nHR --include=*.module 'View site reports' modules\nmodules/system/system.module:233:\
  \      'title' => t('View site reports'),\n```\n\n正如`grep`命令（或其他搜索方式）所示，这个文本唯一出现的位置是`system.module`文件的第\
  \ 233 行，如代码清单 19-15 所示。\n\n**代码清单 19-15.** 系统模块`hook_permission()`实现代码片段\n\n```php\n\
  /**\n * 实现 hook_permission().\n */\nfunction system_permission() {\n  return array(\n\
  // ...\n    'access site reports' => array(\n      'title' => t('View site reports'),\n\
  \    ),\n// ...\n  );\n}\n```\n\n![images](img/square.jpg) **提示** 当然，这也是定义自定义权限的方法。第\
  \ 24 章对此有更深入的描述，但正如代码清单 19-15 中的代码所示：它就是`hook_permission()`实现返回的数组。\n\n每个`hook_permission()`实现都需要返回一个权限数组，该数组以内部系统名称为键（并且至少包含一个带有面向用户名称的\
  \ title 元素）。在`system_permission()`返回的数组中，标题为“View site reports”的权限键是“access site\
  \ reports”，因此你可以将其用作菜单项中的访问参数，如代码清单 19-16 所示。\n\n**代码清单 19-16.** 使用“access site\
  \ reports”权限进行访问控制的菜单项\n\n```php\n  $items['admin/reports/xray'] = array(\n    'title'\
  \ => 'X-ray 技术站点概览',\n    'description' => '查看此站点的内部结构。',\n    'page callback' =>\
  \ 'xray_overview_page',\n    'access arguments' => array('access site reports'),\n\
  \  );\n```\n\n默认的本地任务将继承此访问控制（但其他任务或标签页不会）。\n```\n\n\n### 补充默认本地任务的第二个本地任务\n\n如前所述，当你创建第一个本地任务时，会生成一个默认本地任务。但直到至少定义了两个用户可访问的本地任务后，这些本地任务才会以选项卡形式显示，如清单\
  \ 19–17 所示。\n\n***清单 19-17.** 为 X-ray 权限名称页面定义本地任务（显示为选项卡）的菜单项*\n\n```php\nfunction\
  \ xray_menu() {\n  $items = array();\n// ...\n  $items['admin/reports/xray/permissions']\
  \ = array(\n    'title' => 'Permissions',\n    'page callback' => 'xray_permission_names_page',\n\
  \    'type' => MENU_LOCAL_TASK,\n    'weight' => 10,\n    'access arguments' =>\
  \ array('access site reports'),\n  );\n// ...\n  return $items;\n}\n```\n\n你为其设置了权重值\
  \ 10，这样它会显示在权重为-10 的“概览”选项卡之后。权重值较低（更轻）和负值会被认为会浮到顶部（对于垂直排列的元素）或前面（对于水平排列的元素）。在从左到右书写的语言中，这意味着权重最轻（负值最大或数值最小）的本地任务会作为选项卡显示在权重更重选项卡的左侧，如图\
  \ 19–3 所示。\n\n![images](img/1903.jpg)\n\n***图 19-3.** 当定义至少两个本地任务时，选项卡会显示出来。*\n\n\
  ![images](img/square.jpg) **注意** 默认选项卡（`MENU_DEFAULT_LOCAL_TASK`）会从其父级菜单声明中继承访问控制，但其他选项卡（`MENU_LOCAL_TASK`）则不会。你必须在菜单项声明中声明\
  \ `access arguments` 和/或 `access callback`。\n\n现在我们来创建你定义的回调函数 `xray_permission_names_page()`\
  \ 的具体实现，让这个页面为你提供权限名称，既有人类可读的名称，也有机器名称！\n\n### 调用钩子的所有实现\n\n根据先前查找权限机器名称的研究，你需要的信息存在于各模块对\
  \ `hook_permissions()` 的实现中。如何自己获取这些信息呢？有一个专用函数：`module_invoke_all()` 用于调用指定钩子的所有实现。通过以下单行代码，可以从某个模块中调用\
  \ Drupal 中所有 `hook_permission()` 的实现，并收集它们的数据：\n\n```php\n  $permissions = module_invoke_all('permission');\n\
  ```\n\n此时 `$permissions` 变量是一个以权限机器名称为键的数组，但其值则是由权限描述和其他你不需要的信息组成的另一个数组。可以快速遍历该数组，丢弃多余数据，如下所示：\n\
  \n```php\n  // 从每个权限数组中仅提取权限标题。\n  foreach ($permissions as $machine_name => $permission)\
  \ {\n    $names[$machine_name] = $permission['title'];\n  }\n```\n\n现在，在将这些名称交给主题函数处理之前，我们先按标题字母顺序排序。PHP.net\
  \ 有出色的内置搜索功能，你只需访问 `php.net/sort` 即可查看结果。它会直接跳转到 PHP 的 `sort()` 函数，但阅读该函数的注释后会发现它并不够好：它会为数组分配新的键，而你使用的是键值数组——系统名称作为键，指向对应的人类可读标题。丢弃机器名称键会破坏你展示机器/系统权限名称与标题对应关系的目的。因此，你将改用\
  \ `asort()`，如下所示：\n\n```php\n  // 按标题字母顺序排列权限名称。\n  asort($names);\n```\n\n![images](img/square.jpg)\
  \ **提示** 务必阅读 PHP 手册页面中的“注释”和“参见”部分。特别是“参见”部分列出的相关函数，能让你深入了解 PHP 并帮助你选择真正需要的函数，而不是仅凭第一印象。\n\
  \n下一步，将排序后的 `$names` 数组交给主题函数，格式化为表格显示，这需要一些研究。\n\n### 将数据格式化为表格显示\n\n你希望将权限机器名称和权限标题以整洁的网格形式展示为\
  \ HTML 表格。这种需求非常普遍，Drupal 必定有用于打印表格的辅助函数或 API。让我们在核心代码中找找实现实例。由于这是用户界面元素，与其查看代码，不如先浏览用户界面。\n\
  \n点击，再点击……找到了！权限页面本身（`admin/people/permissions`）就是一个表格（一个包含大量复选框的复杂表单，但仍是一个表格）。在代码中搜索\
  \ `'admin/people/permissions'` 以查找创建该页面和表格的代码，会在 `modules/user/user.admin.inc` 中发现以下两个函数：`user_admin_permissions()`\
  \ 和 `theme_user_admin_permissions()`。你也可以通过 `api.drupal.org/user_admin_permissions`\
  \ 和 `api.drupal.org/user_admin_permissions` 在线查看完整函数。\n\n在复用代码时，你可以从 User 模块中借鉴\
  \ Doxygen 文档块。函数 `theme_user_admin_permissions()` 包含如清单 19–18 所示的文档内注释。\n\n***清单\
  \ 19-18.** `theme_user_admin_permissions()` 的 Doxygen 文档块*\n\n```php\n/**\n * 返回用于管理权限页面的\
  \ HTML。\n *\n * @param $variables\n *   一个关联数组，包含：\n *   - form: 表示表单的渲染元素。\n *\n\
  \ * @ingroup themeable\n */\n```\n\n与所有主题函数一样，它接受一个参数 `$variables`。有时 `$variables`\
  \ 只包含一个渲染元素（本例中为 `'form'`），但如该文档块所述，它仍然以关联数组形式提供。\n\n\n\n#### 使用 `@ingroup themeable`\
  \ 为可主题化代码编写文档\n\n此外，User 模块在其介绍性文档块中通过添加 `@ingroup themeable` 这一行，将 `theme_user_admin_permissions()`\
  \ 函数归入了一个与主题相关的组。使用 `@ingroup` 指令是一种让你的代码自文档化的方式。\n\n这个主题函数相当复杂，因为它正在切割和拼接一个大型表单。你不需要关心这些细节，可以直接跳到末尾，看看表格是如何生成的。即下面这一行：\n\
  \n`$output .= theme('table', array('header' => $header, 'rows' => $rows, 'attributes'\
  \ => array('id' => 'permissions')));`\n\n`$rows` 变量需要是一个行的数组，而每一行本身又是一个单元格的数组。每个单元格既可以只是一个字符串，也可以是一个数组，将数据（每个单元格的内容）与应用于该表格单元格的\
  \ HTML 属性分开。更多细节请参见 `api.drupal.org/theme_table`。\n\n代码清单 19–19 是 X-ray 模块的一个简单主题化表格版本，它基于调用所有\
  \ `hook_permission()` 实现所返回的数据构建而成。\n\n**代码清单 19–19.** 权限名称的主题表格（适用于机器和人类）\n\n```\n\
  /**\n * 显示 X-ray 权限名称页面。\n */\nfunction xray_permission_names_page() {\n  $names\
  \ = xray_permission_names();\n  return theme('xray_permission_names', array('names'\
  \ => $names));\n}\n\n/**\n * 收集权限名称。\n */\nfunction xray_permission_names() {\n\
  \  $names = array();\n  $permissions = module_invoke_all('permission');\n  // 从每个权限数组中提取权限标题。\n\
  \  foreach ($permissions as $machine_name => $permission) {\n    $names[$machine_name]\
  \ = $permission['title'];\n  }\n  // 按标题字母顺序排列权限名称。\n  asort($names);\n  return\
  \ $names;\n}\n\n/**\n * 返回包含权限机器名称和显示名称的表格的 HTML。\n *\n * @param $variables\n *\
  \   一个包含以下键的关联数组：\n *   - names: 以机器名称为键的可读名称数组。\n *\n * @ingroup themeable\n */\n\
  function theme_xray_permission_names($variables) {\n  $names = $variables['names'];\n\
  \  $output = '';\n  $header = array(t('权限标题'), t('权限机器名称'));\n  $rows = array();\n\
  \  foreach ($names as $machine_name => $title) {\n    $rows[] = array($title, $machine_name);\n\
  \  }\n  $output .= theme('table', array('header' => $header, 'rows' => $rows, 'attributes'\
  \ => array('id' => 'xray-permission-names')));\n  return $output;\n}\n```\n\n最终的主题函数接收一个权限名称数组，其中机器名称为键，供人类查看的名称版本为值，该数组由紧接其上定义的\
  \ `xray_permission_names()` 函数创建。\n\n如果你未向 Drupal 主题系统注册，那么 `theme_xray_permission_names()`\
  \ 这个主题函数以及任何用于覆盖它的函数都不会接收到任何内容，也不会被调用。这一点将在下一节介绍。\n\n### 使模块可主题化\n\n模块和主题完美结合，正如\
  \ Drupal 强力民谣《我可以做你的模块，你可以做我的主题》（`drupal.org/project/powerballad`；收听风险自负）中所说的那样。一个制作精良的模块允许其呈现的所有元素被使用它的网站的主题所覆盖。这通过在你想向屏幕输出内容时使用\
  \ `theme()` 函数，或者向 Drupal 中接受可渲染数组的部分（包括所有页面和块输出）提供一个可渲染数组来实现。（在提供可渲染数组的情况下，Drupal\
  \ 会为你调用 `theme()`，并利用 `#theme` 和 `#theme_wrapper` 属性。）对于复杂的输出，多个主题函数可能会汇入另一个主题函数。\n\
  \n为了让你的主题函数被识别，你的模块必须实现 `hook_theme()`，该函数返回一个主题钩子或回调及其相关信息的数组；大多数情况下，你只需给出一个名称（你将在其前面加上\
  \ `theme_`），而主题将把其 `THEMENAME_` 加在前面。因此，从代码清单 19–19 的代码来看，就是 `xray_permission_names`，你需要告诉它这个钩子接收的是单个渲染元素还是变量数组（你可以为其命名并提供默认值）。代码清单\
  \ 19–20 展示了 X-ray 模块的 `hook_theme()` 实现，定义了一个带有单个变量（称为 'render element'）的 `xray_permission_names`\
  \ 主题钩子。\n\n**代码清单 19–20.** 使用单个变量和 'render element' 定义 `xray_permission_names` 主题钩子\n\
  \n```\n/**\n * 实现 hook_theme()。\n */\nfunction xray_theme() {\n  return array(\n\
  \    'xray_permission_names' => array(\n      'render element' => 'names',\n   \
  \ ),\n  );\n}\n```\n\n尽管此处声明 `xray_permission_names` 接收一个可渲染数组，但当它被传递给一个主题化函数（如\
  \ `theme_xray_permission_names()`）时，它会被嵌套在另一个数组中，因此可以像 `$variables` 数组一样被处理，用于向主题化函数传递多个变量，你稍后会看到这一点。\n\
  \n![images](img/square.jpg) **提示** 无论何时你对 `hook_theme()` 的实现进行了修改，都需要重建主题注册表才能使这些更改生效，包括你首次定义该钩子时，如果你的模块已经启用的话。你可以通过在代码中运行的地方放置\
  \ `drupal_flush_all_caches();` 函数来实现；记得稍后将其移除。你也可以通过管理 ![images](img/U001.jpg) 配置\
  \ ![images](img/U001.jpg) 开发 ![images](img/U001.jpg) 性能（`admin/config/development/performance`）页面，点击“清除所有缓存”按钮来手动清除缓存和主题注册表。和往常一样，最方便的方式是通过\
  \ Drush 命令 `drush cc all`。\n\n#### 模块主题化资源\n\n阅读第 15 章（关于制作主题）无疑会帮助你理解模块的主题化。在 `drupal.org`\
  \ 上可以查看更多关于从模块代码生成高质量、可覆盖输出的信息。\n\n- 在 Drupal API 网站 `api.drupal.org/hook_theme`\
  \ 上阅读更多关于 `hook_theme()` 的内容。\n- 在 `api.drupal.org/api/group/themeable/7` 上查看 Drupal\
  \ 核心中的每个 `theme_` 函数——每个主题制作者可以覆盖以改变 Drupal 输出外观的函数。\n- 在 Module Developer's Guide\
  \ 中阅读“使用主题层 (Drupal 7.x)”，地址为 `drupal.org/node/933976`。\n- 在 `groups.drupal.org/node/6355`\
  \ 上查看 Drupal 标记风格指南，了解关于模块应生成何种 HTML 的工作提案。\n\n![images](img/square.jpg) **注** `Drupal.org`\
  \ 的文档页面完全由志愿者编写和维护。你可能会找到一篇关于如何在 Drupal 6 中完成某项操作的文章，却找不到解释 Drupal 7 中相应操作的指南页面。当你弄清楚某些内容时，你可以编辑或创建相应的指南页面。\n\
  \n\n\n### 一种更 Drupal 7 化的方式：利用渲染数组的力量\n\n如前所述，权限名称表格示例取自 Drupal 7 核心，但仍有一种更 Drupal\
  \ 7 化的方式来实现它！（你从中取例的`User`模块或许也需要一些改进。）如今，可渲染数组被接受并推荐作为页面回调函数的返回结果。本质上，Drupal 会将显示页面所需的所有信息收集成一个巨大的结构化数组，并知道该数组的每个部分需要运行哪个主题函数，但在所有信息整合完毕之前不会执行任何操作。这使得任何人都可以轻松地移动页面的各个部分（在附录\
  \ C 中对此有描述）。我们在 `xray_permission_names_page()` 回调中调用了自己的主题函数，随后对表格主题函数的调用打断了页面流程，在一定程度上改变了功能。采用可渲染数组的方法也让重构代码变得合理，甚至无需自定义主题函数，如清单\
  \ 19–21 所示。\n\n**清单 19–21.** 重构 X-ray 权限名称页面回调以利用 Drupal 7 的渲染系统\n\n```php\n/**\n\
  \ * 显示权限的机器名和显示名称的表格。\n *\n * @return\n *   一个符合 drupal_render() 预期的数组。\n */\nfunction\
  \ xray_permission_names_page() {\n  $build = array();\n  // 收集数据：一个以机器名为键、人类可读名称为值的数组。\n\
  \  $names = xray_permission_names();\n  // 将数据格式化为表格。\n  $header = array(t('权限标题'),\
  \ t('权限机器名'));\n  $rows = array();\n  foreach ($names as $machine_name => $title)\
  \ {\n    $rows[] = array($title, $machine_name);\n  }\n  $build['names_table'] =\
  \ array(\n    '#theme' => 'table__xray__permission_names',\n    '#header' => $header,\n\
  \    '#rows' => $rows,\n    '#attributes' => array('id' => 'xray-permission-names')\n\
  \  );\n  return $build;\n}\n```\n\n你使用了相同的数据收集函数并以相同的方式设置数据，也使用了之前确定的同一个 `theme_table()`\
  \ 函数，但你是通过在返回的子数组中标识 `#theme` 属性来告诉 Drupal 调用该函数。之前传递给表格主题调用的一组变量，现在变成了附加属性（`#rows`、`#header`、`#attributes`），Drupal\
  \ 会将这些属性交给表格主题函数处理。\n\n你刚刚撤销了之前的工作吗？嗯，是的。放弃旧代码正是代码改进的方式。但你学到的所有关于主题化的知识仍然适用，并且很快会再次用到！\n\
  \n你在这里做了一项创新：将表格主题钩子的名称从 `'table'` 扩展为 `'table__xray__permission_names'`。每对双下划线表示双下划线之后的部分是可选的，因此核心的\
  \ `theme_table()` 函数仍然会为你处理主题化，但现在你让那些想要调整你的表格的主题者能够仅在此实例中（或者对于所有 X-ray 表格，停在第一个下划线对处）覆盖\
  \ `theme_table()`，而不是提出修改 Drupal 中所有表格主题化这种不可行的方案。在通过 `theme()` 调用表格函数时，同样可以做到这一点。\n\
  \n从流程中移除你的自定义函数意味着：例如，如果主题者想要添加文本，他们不应覆盖你的主题函数，而是应该通过 `hook_page_alter()` 将其添加到可渲染的页面数组中。参见附录\
  \ C 以了解更多关于可渲染数组以及它们在事后修改页面时提供的灵活性。\n\n### 直接调用 Drupal 函数\n\n钩子并非与 Drupal 代码交互的唯一方式；Drupal\
  \ 还有许多你会想要直接调用的有用函数。清单 19–22 中的示例是一个在此案例中比较内部导向的函数（因为 X-ray 模块的目标是展示 Drupal 的内部运作），但它演示了从\
  \ Drupal 函数中获取数据并使用其中一部分的原理。\n\n**清单 19–22.** 使用 `menu_get_item()` 信息显示路由信息\n\n\
  ```php\n/**\n * 提供页面回调函数（以及其他路由项信息）。\n */\nfunction xray_show_page_callback() {\n\
  \  // 不要传入路径；menu_get_item() 会自动查找动态路径，\n  // 但如果传入 help 的 $path 变量（例如 node/% 对应\
  \ node/1），则会失败。\n  $router_item = menu_get_item();\n  // 当通过 drush 命令行调用时，menu_get_item()\
  \ 可能返回 null。\n  if ($router_item) {\n    return theme('xray_show_page_callback',\
  \ $router_item);\n  }\n}\n\n/**\n * 为页面回调和路由项的其他可选元素进行主题化。\n */\nfunction theme_xray_show_page_callback($variables)\
  \ {\n  extract($variables, EXTR_SKIP);\n  $output = '';\n  $output .= '<p class=\"\
  xray-help xray-page-callback\">';\n  $output .= t('本页面由 ');\n  if ($page_arguments)\
  \ {\n    foreach ($page_arguments as $key => $value) {\n      $page_arguments[$key]\
  \ = drupal_placeholder($value);\n    }\n    $output .= format_plural(count($page_arguments),\n\
  \      '参数 !arg 传递给 ',\n      '参数 !arg 传递给 ',\n      array('!arg' => xray_oxford_comma_list($page_arguments))\n\
  \    );\n  }\n  $output .= t('函数 %func',\n               array('%func' => $page_callback\
  \ . '()'));\n  if ($include_file) {\n    $output .= t('以及包含的文件 %file',\n       \
  \          array('%file' => $include_file));\n  }\n  $output .= '.</p>';\n  return\
  \ $output;\n}\n```\n\n第一个函数将 `menu_get_item()` 的返回值赋给变量 `$router_item`，并将其传递给一个主题函数。这个主题函数的默认实现是清单\
  \ 19–22 中的第二个函数。它检查可用信息，并将其添加到输出变量中，最后返回该变量。请注意，它使用了另一个为 X-ray 模块创建的函数 `xray_oxford_comma_list()`，该函数将在本章后面定义。\n\
  \n![images](img/square.jpg) **提示** 主题函数总是接收数组，即使对于单一的渲染元素也是如此。如清单 19–22 中的 `theme_xray_show_page_callback()`\
  \ 所示，处理数组的一个快速方法是将主题函数的第一行设为 `extract($variables, EXTR_SKIP);`。这会将 `$variables`\
  \ 中的单个元素转换为由 `'render element'` 提供的名称所对应的变量，并将多个 `$variables` 元素转换为 `hook_theme()`\
  \ 实现中 `'variables'` 提供的名称所对应的变量。`EXTR_SKIP` 参数是一项安全预防措施，用于防止覆盖任何现有变量。\n\n请记住，这个\
  \ `theme_xray_show_page_callback()` 函数（以及任何会覆盖它的函数）——你指望它来显示你收集的信息——除非你在 `hook_theme()`\
  \ 中将其注册到 Drupal，否则 Drupal 主题系统将无法找到它；参见清单 19–23。\n\n**清单 19–23.** 在 `hook_theme()`\
  \ 中添加内容，用三个变量定义 `xray_show_page_callback` 主题函数\n\n```php\n/**\n * 实现 hook_theme()。\n\
  \ */\nfunction xray_theme() {\n  return array(\n// [为节省空间，未显示现有代码]\n    'xray_show_page_callback'\
  \ => array(\n      'variables' => array(\n        'page_callback' => NULL,\n   \
  \     'include_file' => NULL,\n        'page_arguments' => NULL,\n      ),\n   \
  \ ),\n  );\n}\n```\n\n不要忘记清除缓存！\n\n\n\n#### 排版结果\n\n传递给`$variables`数组中主题函数的任何变量都将可用于该主题函数，但只有那些在`hook_theme()`中定义的变量（本例中为`page_callback`、`include_file`和`page_arguments`）才能绝对确保被初始化——即存在并具有设定的值，本例中均为`NULL`，但也可以设置任何默认值。（在这种将整个函数的结果提供给主题的特殊情况下，与清单\
  \ 19–23 中定义计划使用的三个变量不同，你本可以在主题钩子中运行`menu_get_item()`，仅仅为了将其返回的每个键定义为`NULL`或空字符串。）\n\
  \n开始看到这项工作的最后一步是使用`hook_help()`来打印它；你可以在`dgd7.org/259`看到效果。\n\n### 为模块设置样式：添加 CSS\
  \ 文件\n\n模块在外观方面的首要职责是能够被主题修改。这并不意味着它不能提供自己的默认外观。而且 Drupal 绝不会限制你的风格！模块可以像主题一样，通过在`.info`文件中列出它们，将层叠样式表\
  \ (CSS) 添加到每个页面。CSS 文件使用你赋予模块 HTML 输出的类或 ID 来设置其样式。\n\n使用`stylesheets[TYPE][]`指令添加样式表，其中`TYPE`是样式表应使用的媒体类型（例如打印、屏幕等）。第二组方括号是因为同一种媒体可以有多个样式表。如果你希望无论通过何种媒体查看网站都使用你的样式表，请使用“all”作为类型，如清单\
  \ 19–24 所示。\n\n**清单 19–24.** 带有样式表指令的`.info`文件\n\n```\nname = X-ray technical site\
  \ map\ndescription = Shows internal structures and connections of the web site.\n\
  package = Development\ncore = 7.x\nstylesheets[all][] = xray.css\n```\n\n![images](img/square.jpg)\
  \ **注意** 样式表文件在`.info`文件中使用`stylesheets`指令列出，*而不是*`files`指令。\n\n**清单 19–25.** X-Ray\
  \ 模块的 CSS 文件，平淡地（但正确地）命名为`xray.css`\n\n```\np.xray-help,\ndiv.xray {\n  display:\
  \ block;\n  color: white;\n  padding: 5px;\n  background-color: black;\n  border:\
  \ 4px solid white;\n  -webkit-border-radius: 8px;\n  -moz-border-radius: 8px;\n\
  \  border-radius: 8px;\n}\n```\n\n在清单 19–25 中，添加到`xray.info`的那一行告诉 Drupal 在每个页面上添加这个\
  \ CSS（指定文件`xray.css`的内容）。文件`xray.info`和`xray.css`都位于 xray 目录的同一层级，否则`xray.info`必须提供`xray.css`的路径。清单\
  \ 19–25 中定义的样式为帮助消息和标识表单的 div 提供了时尚的、显瘦的黑色背景和圆角边框。之所以有效，是因为你在通过`hook_help()`和`hook_form_alter()`打印输出时，用这些类包裹了输出内容。\n\
  \n![images](img/square.jpg) **警告** 始终为模块的 CSS 文件添加命名空间；也就是说，使用模块的名称作为 CSS 文件的名称或\
  \ CSS 文件名称的第一部分。这是因为 Drupal 允许主题仅通过同名文件来自动覆盖 CSS 文件，而你不希望主题意外覆盖你的样式表。\n\n![images](img/1904.jpg)\n\
  \n**图 19–4.** X-ray 模块的显示（包括两个帮助区域消息和在表单中打印的表单 ID）\n\n**清单 19–26.** 对`xray.css`文件的补充\n\
  \n```\n/* 使非帮助区域的 xray 字体大小与帮助文本大小一致。 */\ndiv.xray {\n  font-size: 0.923em;\n}\n\
  \n/* 移除 X-ray 输出中多余的表单项内边距（用于表单 ID）。 */\ndiv.xray .form-item {\n  margin: 0;\n \
  \ padding: 0;\n}\n```\n\n一旦你的 CSS 文件中有适用于你需要影响的 HTML 的条目（并且清除了 Drupal 的 CSS 聚合和浏览器的缓存），你就可以使用诸如\
  \ Firefox 的 Firebug 之类的 HTML/CSS 检查工具来调整属性，直到达到你想要的视觉效果。清单 19–26 显示了对`xray.css`文件的补充。你的模块样式至少应在\
  \ Stark、Bartik 和 Garland 这些核心主题中进行测试。如果你的模块输出任何将在管理区域看到的内容，这些部分还应在核心的 Seven 主题中进行测试。\n\
  \n### 数据库 API\n\nDrupal 7 引入了一个健壮的数据库层，它构建在 PHP 数据对象 (PDO) 之上，PDO 是一个轻量级、一致的数据库访问接口。Drupal\
  \ 7 数据库 API 由其首席开发者 Larry Garfield (crell) 称为 DBTNG (Database The Next Generation)，它提供了用于添加、修改和读取\
  \ SQL 数据的面向对象工具。\n\n这个用于访问多种数据库服务器的、与供应商无关的抽象层，旨在尽可能保留 SQL 的语法和功能，但更重要的是，它：\n\n\
  *   允许开发者使用复杂功能，例如事务，这些功能可能并非所有数据库引擎原生支持。\n*   为动态构建查询提供了结构。\n*   强制实施安全检查和其他良好实践。\n\
  *   为模块提供一个干净的接口来拦截和修改站点的查询。\n\n最明显的好处是，你的 Drupal 应用可以运行在任何拥有适用于 Drupal 7 数据库 API\
  \ 的驱动程序的数据库（或不止一个数据库）上。所有正确编写以利用数据库层的查询都不会关心你的站点使用的是哪个数据库。Drupal 核心开箱即支持 MariaDB/MySQL、PostgreSQL\
  \ 和 SQLite。MSSQL (`drupal.org/project/sqlsrv`) 和 Oracle (`drupal.org/project/oracle`)\
  \ 的后端数据库也已经存在。（所谓的 NoSQL 数据库 MongoDB 用于帮助 Drupal 扩展，如第 27 章所述，它利用 Field API 的可插拔存储，并且*不*使用为\
  \ SQL 数据库设计的数据库抽象层。）\n\n![images](img/square.jpg) **注意** 从版本 7 开始，Drupal 提供了事务支持。这意味着如果你正在对数据库进行更改，并且这些更改必须是全部或全无（经典例子是从一个账户扣款到另一个账户），那么你需要将对数据库的操作包裹在一个事务中。这通过使用此处描述的函数`api.drupal.org/db_transaction`声明一个事务变量来实现。该事务一直持续到该变量被销毁（包括在其定义的函数关闭时）。\n\
  \n另一个巨大的优势来自于动态查询（包括所有插入、更新和删除查询）的统一结构，即智能的数据库层有助于你的站点扩展。对于支持此特性的数据库（以及非常常见的 MariaDB/MySQL\
  \ 等其他数据库），多个插入操作将在一次查询中执行（一种快得多的方法），而对于不支持该特性的数据库，则回退到重复执行一系列单个查询。\n\n总而言之，DBTNG\
  \ 是 Drupal 7 发布周期中关键的开发者体验计划之一。接下来，我将介绍如何使用它。你也可以参考位于`drupal.org/developing/api/database`和`api.drupal.org/api/group/database`的优秀文档，以及位于`drupal.org/project/examples`的\
  \ DBTNG 示例模块。\n\n\n\n#### 使用选择查询获取数据\n\n从数据库中提取数据是你在 Drupal 核心、贡献模块以及自己的模块中遇到的最常见的数据库相关任务。\n\
  \n对于 Structure 管理页面顶部提供的摘要 X-Ray 功能，显示站点拥有多少内容类型会很方便。这当然意味着要统计内容类型的数量。你可以通过查看`node_type`表来获取内容类型的数量。请使用命令行数据库客户端或\
  \ phpMyAdmin 等应用程序浏览站点的数据库表及其中的列和内容。\n\n开箱即用，Drupal 将数据存储在关系数据库中（MariaDB/MySQL、Postgres\
  \ 和 SQLite 就是此类数据库）。通过使用标准化的结构化查询语言 SQL，可以访问、操作和保存这些数据。如前所述，所有动态查询（包括操作和保存）都应使用数据库\
  \ API 查询构建器，但非动态或*静态*查询可以且应该直接使用 SQL。（标准化方面存在一些不足，而解决这些不足正是数据库 API 的目的之一，不过这在你选取数据的大多数情况下并不是问题。）\n\
  \n我们鼓励你在数据访问查询中尽可能使用纯 SQL（稍后会详细介绍）。这意味着对于以 SELECT 开头的 SQL 查询，要使用`db_query()`函数，如清单\
  \ 19-27 所示。\n\n**清单 19-27.** 从`node_type`表中统计内容类型数量的基本 SQL 查询\n\n```\ndb_query(\"\
  SELECT COUNT(*) FROM {node_type}\")->fetchField();\n```\n\nSQL 位于引号之内。通常，这样的 SQL\
  \ 会采用\"`SELECT column_a, column_b FROM table_y`\"的形式。在这个例子中，它不是通过列名来选取数据，而是统计`node_type`表中所有行的数量。当添加了用于获取单个字段的方法`->fetchField()`时，`db_query()`会直接返回一个数字。对于新安装的标准\
  \ Drupal 安装包（具有 Article 和 Basic page 这两种内容类型），该数字是 2。\n\n`db_query()`函数几乎会原封不动地将你提供的任何内容传递给数据库；它只负责添加表前缀和展开数组占位符，仅此而已。这是\
  \ Drupal 获取可通过单个标准 SQL 查询获取的数据的最简单、最快速的方式。\n\n**提示** 除了`fetch*()`方法之外，你不能向`db_query()`附加其他方法。\n\
  \n为了完整起见，该查询不应返回任何已禁用的内容类型的数据。这意味着需要添加一个 WHERE 子句。\n\n**提示** 使用 phpMyAdmin 或命令行`mysql`来测试查询。你需要使用实际的表名（不带花括号）和实际的值（而不是占位符）。你还必须自行处理转义（字符串加引号，数字不加引号）；而使用`db_query()`和`db_select()`并正确使用占位符编写的查询，Drupal\
  \ 会替你处理这些。这样做的好处是你可以立即测试查询，而且 phpMyAdmin 等工具可以帮助你构建查询。\n\n清单 19-28 中的代码是一个原始 SQL\
  \ 查询的例子，可以在命令行或使用 phpMyAdmin 等应用程序中运行。\n\n**清单 19-28.** 从节点类型表返回可用内容类型数量的原始 SQL\n\
  \n```\nSELECT COUNT(*) FROM node_type WHERE disabled = 0;\n```\n\n**注意点** 如果你不熟悉\
  \ SQL，这里有一个容易出错的地方——等号比较使用单个等号，而不是两个。在 SQL 中，应使用`<>`来表示“不等于”的比较，这在 PHP 中同样有效。\n\n\
  要在 Drupal 中使用此查询，你可以使用`db_query()`函数并对 SQL 进行几处修改。清单 19-29 是与清单 19-27 相同的查询，但采用了\
  \ Drupal 作为`db_query()`内容所需的风格；换句话说，它在表名两侧添加了花括号，并通过占位符传递值。\n\n**清单 19-29.** 从`node_type`表中统计内容类型数量的推荐基本\
  \ SQL 查询\n\n```\ndb_query(\"SELECT COUNT(*) FROM {node_type} WHERE disabled = :status\"\
  , array(':status' => 0))->fetchField();\n```\n\n你已经将`node_type`替换为`{node_type}`，这样你的模块就能在使用数据库表前缀的站点上正常工作。第二个更大的改动是使用了占位符。你使用了`disabled\
  \ = :status`，而不是`disabled = 0`。在这种情况下，它替换的是一个硬编码的零，并非严格必要。但当它是一个可能来自用户的变量时，则绝对必要。你绝不应看到类似`disabled\
  \ = $status`的写法；它应该始终是`disabled = :status`，并在 select 查询的第二个参数中使用`array(':status'\
  \ => $status)`。请注意，这个数组中可以包含任意数量的占位符。\n\n使用占位符数组是一种最佳实践，对于可能来自用户的变量是绝对必要的，因此所有变量都应始终使用它。占位符还会为你处理字符串值的引号（并传入不带引号的数值）。\n\
  \n**提示** 你可以通过创建一个包含`index.php`前三行（共四行）代码的文件，然后在该文件后添加你想要运行的代码，在引导后的`test.php`文件中测试像这样的简单查询（以及其他代码）。别忘了打印输出。有关如何使用`test.php`文件来辅助开发流程的完整说明，请参见第\
  \ 33 章或`dgd7.org/testphp`。\n\nDrupal 更复杂的数据库函数`db_select()`也可用于构造获取数据的静态查询，不过不建议这样使用。即使你只了解一点\
  \ SQL，简单的`db_query()`方法对你来说也是最容易的。如果你不熟悉 SQL，同时学习普通 SQL 和 Drupal 面向对象的数据库语法可能会让人应接不暇。使用`db_select()`函数编写的相同简单选择查询可能看起来像清单\
  \ 19-30 中的内容，它统计一个站点上的内容类型数量，却不必要地使用了完整的数据库 API（仅作示例）。\n\n**清单 19-30.** 一个简单的选择查询\n\
  \n```\n  db_select('node_type')\n    ->fields('node_type')\n    ->condition('disabled',\
  \ 0)\n    ->countQuery()\n    ->execute()\n    ->fetchField();\n```\n\n此查询选择`node_type`表，为了查询能运行而添加`node_type`表的所有字段，添加一个等同于\"\
  `WHERE disabled = 0`\"子句的条件，添加`countQuery()`方法，执行查询，并获取单个字段。`countQuery()`方法使这个查询返回结果集中行的数量，而不是任何字段的内容。有关`db_select()`版本静态查询的更多反例，请参见`dgd7.org/235`。\n\
  \n**注意** 实现避免重复代码和编写可维护代码这些优点的最佳实践表明，你应该研究其他从 Drupal API 获取此信息的方法，而不是编写自己的查询。而 Drupal\
  \ 提供了大量的 API。与获取内容类型信息（以及你将看到的 Drupal 其他核心组件）极为相关的 Drupal 7 新 API 是实体 API。这将在接下来的章节“Drupal\
  \ 实体：站点组件背后的通用结构”中介绍（在此之前还会详细介绍更多数据库 API 的内容）。\n\n在继续讲解需要使用`db_select()`的动态查询之前，让我们先看更多几个将\
  \ SQL 放入`db_query()`函数的静态查询示例。\n\n\n\n#### 使用两表联动的静态查询获取数据\n\nX-ray 模块还能提供另一项信息：每个主题（theme）启用了多少个区块（block）。`modules/block.module`\
  \ 中有几个查询从区块表中获取信息，但它们并没有精确获取这些信息，而且无论如何它们都不在你可以使用的独立 API 函数中。因此，你完全有理由编写自己的查询。你可以将其封装在一个函数中，以便日后重用，如清单\
  \ 19-31 所示。\n\n***清单 19-31.** 统计每个主题已启用区块数量的静态查询*\n\n```\n/**\n * 获取每个主题已启用的区块数量。\n\
  \ */\nfunction xray_stats_blocks_enabled_by_theme() {\n  return db_query(\"SELECT\
  \ theme, COUNT(*) as num FROM {block} WHERE status = 1 GROUP BY theme\")->fetchAllKeyed();\n\
  }\n```\n\nDrupal 数据库 API 为 `db_query()` 对象提供的 `->fetchAllKeyed()` 方法，会获取任意一个两列的结果集（这里指主题和区块计数），并生成一个数组，其中第一列的值作为键，对应第二列的值。\n\
  \n***清单 19-32.** `db_query(\"SELECT theme, COUNT(*) as num FROM {block} WHERE status\
  \ = 1 GROUP BY theme\")->fetchAllKeyed()` 返回的数组*\n\n```\narray (\n  'bartik' =>\
  \ '10',\n  'garland' => '7',\n  'seven' => '9',\n  'stark' => '7',\n)\n```\n\n![images](img/square.jpg)\
  \ **注意** `->fetchAllKeyed()` 方法*仅*返回结果集的前两列，并会静默忽略其余列。\n\n清单 19-32 中仍存在两个问题。首先，本节的标题是“带联动的静态查询”，但该查询尚未包含联动。其次，该查询返回了每个主题的已启用区块数量，而将报告限制为仅针对已启用的主题会更有意义。让我们修改查询以解决这两个问题，如清单\
  \ 19-33 所示。\n\n***清单 19-33.** 涉及从区块表到系统表联动的静态查询，以将报告数据限制为已启用的主题*\n\n```\n/**\n *\
  \ 获取每个已启用主题已启用的区块数量。\n */\nfunction xray_stats_blocks_enabled_by_theme() {\nreturn\
  \ db_query(\"SELECT b.theme, COUNT(*) as num FROM {block} b INNER JOIN {system}\
  \ s ON b.theme = s.name WHERE s.status = 1 AND b.status = 1 GROUP BY b.theme\")->fetchAllKeyed();\n\
  }\n```\n\n此查询第一个必要的新部分是对 `{block}` 表的引用后跟一个字母 `b`（可以是任何字符或单词），用作其*表别名*。下一个主要添加部分是\
  \ `JOIN` 语句，这也就是需要表别名的原因；现在可能有两个来自不同表的同名列。然后，`b` 被用在 `WHERE` 条件 `status = 1` 之前，使其变为\
  \ `b.status = 1`。这对于数据库引擎区分区块状态和主题状态来说是必要的，因为你要联接到区块表的 `system` 表也有一个 `status` 列。\n\
  \n`system` 表也被赋予了一个别名 `s`，如在 `JOIN` 语句中所见，该语句紧随其后并成为 `FROM` 语句的一部分，因此整体读作 `FROM\
  \ {block} b INNER JOIN {system} s ON b.theme = s.name`。\n\n内连接 (INNER JOIN) 意味着两个表中都必须有匹配项，结果集中才会存在行；语句的\
  \ `ON` 部分声明了用于匹配两个表的列；在本例中，是区块 (`b`) 表的 `theme` 列（包含主题系统名称）与系统 (`s`) 表的 `name` 列（包含包括主题在内的项目名称）。整个查询中一致地使用了表别名以避免歧义，尽管在本例中\
  \ `system` 表没有 `theme` 列，`block` 表没有 `name` 列，因此在引用 `theme` 列时可以省略区块表的别名 `b`，在引用\
  \ `name` 列时可以省略别名 `s`，但一旦开始使用表连接，明确指定别名是很重要的。\n\n#### 非数据库插曲：在两个位置显示相同数据\n\n在继续讨论动态结构化查询之前，让我们先离开数据库，完成这个循环，向网站构建者展示\
  \ X-ray 的信息。首先，清单 19-34 展示了一个函数，用于提供“结构”页面的完整摘要，该函数调用了你刚刚定义的函数 `xray_stats_blocks_enabled_by_theme()`，以及另外几个在其他地方定义的函数。\n\
  \n***清单 19-34.** 在结构页面上显示摘要数据*\n\n```\n/**\n * 结构部分的摘要数据 (admin/structure)。\n */\n\
  function xray_structure_summary() {\n  $data = array();\n$data['blocks_enabled_by_theme']\
  \ = xray_stats_blocks_enabled_by_theme();\n  $data['block_total'] = xray_stats_block_total();\n\
  \  $data['content_type_total'] = xray_stats_content_type_total();\n  // @TODO menu,\
  \ taxonomy\n  return $data;\n}\n\n/**\n * 实现 hook_theme()。\n */\nfunction xray_theme()\
  \ {\n  return array(\n// [为节省篇幅，未显示现有代码] ...\n'xray_structure_summary' => array(\n\
  'variables' => array(\n'data' => array(),\n'attributes' => array('class' => 'xray-help'),\n\
  ),\n),\n  );\n}\n\n/**\n * 实现 hook_help()。\n */\nfunction xray_help($path, $arg)\
  \ {\n  $help = '';\n// [为节省篇幅，未显示现有代码] ...\n  switch ($path) {\n    // 主要管理部分的摘要。\n\
  // [为节省篇幅，未显示现有代码] ...\ncase 'admin/structure':\n$variables = array('data' => xray_structure_summary());\n\
  return $help . theme('xray_structure_summary', $variables);\n// [为节省篇幅，未显示现有代码]\
  \ ...\n    default:\n      return $help;\n  }\n}\n\n/**\n * 返回“结构”部分 (admin/structure)\
  \ 数据的 HTML 文本摘要。\n *\n * @param $attributes\n *   （可选）一个关联数组，包含 HTML 标签属性，适合通过 drupal_attributes()\
  \ 展开。\n * @param $variables\n *   一个包含以下键值的关联数组：\n *   - data: xray_structure_summary()\
  \ 的结果。\n *\n * @ingroup themeable\n */\nfunction theme_xray_structure_summary($variables)\
  \ {\n  // 将 xray_structure_summary() 的数据元素提取为直接变量。\n  extract($variables['data'],\
  \ EXTR_SKIP);\n  $attributes = drupal_attributes($variables['attributes']);\n\n\
  \  $output = '';   $output .= \"<p $attributes>\";\n  $output .= t('此站点共有 @total\
  \ 个可用区块。其中，',\n             array('@total' => $block_total));\n  $output .= ' ',\n\
  \  $list = array();\nforeach ($blocks_enabled_by_theme as $theme => $num) {\n$item\
  \ = '';\n$item .= format_plural($num, '1 个已启用', '@count 个已启用');\n$item .= ' ' .\
  \ t('在 %theme 上', array('%theme' => $theme));\nif ($theme == variable_get('default_theme',\
  \ 'bartik')) {\n$item .= t('，这是默认主题');\n}\nelseif ($theme == variable_get('admin_theme',\
  \ 'seven')) {\n$item .= t('，这是管理后台主题');\n}\n$list[] = $item;\n}\n$output .= xray_oxford_comma_list($list,\
  \ array('comma' => '; '));\n  $output .= '.  ';\n  $output .= format_plural($content_type_total,\n\
  \    '该站点有一个内容类型。',\n    '该站点有 @count 个内容类型。'\n  );\n  return $output;\n}\n```\n\
  \n`xray_oxford_comma_list()` 函数在第 20 章中标题为“当 Drupal 的 API 无法满足需求时编写实用函数”的部分定义。目前，你只需知道它可以将传入的项目数组转换为文本字符串输出即可。\n\
  \n***清单 19-35.** 在 X-ray 报告概览页面上复用摘要*\n\n\n```php\n/**\n * 包含站点内部数据摘要的总览页面。\n */\n\
  function xray_overview_page() {\n  $build = array();\n  $build['intro'] = array(\n\
  \    '#markup' => '<p>' . t(\"站点内部结构的技术总览。这些摘要也会出现在/可以配置为出现在主管理区域。\") . '</p>',\n\
  \  );\n  // 重复每个管理区域顶部的摘要。\n// [为节省空间，现有代码未显示] ...\n\n  $build['structure_title']\
  \ = array(     '#theme' => 'html_tag',\n    '#tag' => 'h3',\n    '#attributes' =>\
  \ array('class' => 'xray-section-title'),\n    '#value' => t('结构摘要'),\n  );\n$data\
  \ = xray_structure_summary();\n$build['structure_summary'] = array(\n'#theme' =>\
  \ 'xray_structure_summary',\n'#data' => $data,\n'#attributes' => array('class' =>\
  \ 'xray-report'),\n);\n\n  return $build;\n}\n```\n\n总览页面以一个可渲染数组的形式构建。与稍显过时的 Help\
  \ 系统不同——你必须在其中自行调用 `theme()` 将变量数组处理成 HTML 字符串——在页面回调函数 `xray_overview_page()` 中，你可以构建并返回一个完整的可渲染数组，Drupal\
  \ 会自行处理它。站点构建者可以通过更改 `#theme` 函数甚至向 `#data` 数组添加内容来修改此页面数组，但很少有人需要如此复杂的操作。大多数主题开发者的需求通过\
  \ CSS 即可满足，因此你还可以传入一个不同的类（在 `#attributes` 数组中），以便你或其他人可以轻松地通过 CSS 对其设置不同的样式。\n\n\
  还有两个函数为你刚才主题化并呈现的站点“结构”管理区域提供数据。这些数据也通过 SQL 查询提供。\n\n#### 使用 `variable_get()` 及另一个静态\
  \ SELECT 计数与分组查询\n\n用于呈现结构相关信息的其他输入也来自静态（`db_query()` 风格）的 SQL 查询。其中获取内容类型统计数据的函数是\
  \ `xray_stats_content_type_total()`，它返回你在清单 19–26 中展示的查询，用于计算非禁用内容类型的数量。\n\n使用的另一项数据是可用的区块总数，这可以从区块表中计算出，并通过主题进行过滤，因为区块表中每个主题的每个区块都有一行记录。\n\
  \n***清单 19–36.** 返回站点可用区块总数的查询*\n\n```php\n/**\n * 获取 Drupal 站点上可用区块的总数。\n */\n\
  function xray_stats_block_total() {\n  // 获取区块总数。所有区块在区块表中会为每个主题重复出现，\n  // 因此你需要针对一个主题进行过滤（可以是任何主题）。\n\
  \  return db_query(\"SELECT COUNT(*) FROM {block} WHERE theme = :theme\", array(':theme'\
  \ => variable_get('theme_default', 'bartik')))->fetchField();\n}\n```\n\n清单 19–36\
  \ 使用了 Drupal 的 `variable_get()` 函数。`variable_get()` 函数的有趣之处在于它必须始终提供自己的默认值作为第二个参数（此处为\
  \ 'bartik'）。该值应与对应的 `variable_set()` 函数使用的值相同。这是因为 `variable_set()` 函数可能从未被执行过——例如，如果从未有人保存过使用该函数的设置页面。在这种情况下，该配置值在\
  \ `{variable}` 表（该表在每个页面加载时会被加载到 `$conf` 数组中）中不存在，`variable_get()` 将返回空值。\n\n模块中使用类似的查询和主题化函数来获取站点其他区域的信息；请参阅代码或\
  \ `dgd7.org/252`。\n\n![images](img/square.jpg) **提示** Drupal 为其表的命名方案并不完全一致。这通常是由于需要避免各数据库保留使用的特殊词。因此，尽管规则是表名采用其所存内容的单数形式（*comment*、*block*、*variable*），但用户记录的表仍被称为\
  \ *users*，因为 *user* 这个术语在 MySQL 中是保留字。\n\n#### 动态查询\n\n如前所述，在可能的情况下最好使用简单的 SQL 查询，并且你已经开始演示查询构建器的替代方案，但尚未定义“可能的情况”具体指什么。对于所有动态查询，必须使用数据库\
  \ API 的函数和方法（即 DBTNG 在开篇部分所描述的所有优点），其中包括使用 `db_select()` 替代 `db_query()` 进行动态 SELECT\
  \ 查询。动态查询包括：\n\n- *所有* `INSERT`、`UPDATE` 或 `DELETE` 查询（数据库 API 分别提供 `db_insert()`、`db_update()`\
  \ 和 `db_delete()`）。\n- Drupal 可能需要修改的 `SELECT` 查询，例如用于提供访问控制。\n- 希望基于用户输入进行更改的 `SELECT`\
  \ 查询（这意味着查询结构会发生变化，因为 `db_query` 可以处理传入的内容）。\n- 使用在不同数据库引擎之间实现不一致的功能的 `SELECT` 查询。例如，如果你在\
  \ `->condition()` 方法中使用 `db_select()` 配合 `LIKE`（或 `NOT LIKE`）作为第三个参数，则可以确保比较将以不区分大小写的方式进行。\n\
  \n![images](img/square.jpg) **注意** 提供访问控制的需求包括每次查询节点表时，因此你必须使用 `db_select()` 查询构建器，并在\
  \ `->execute()` 方法之前包含 `->addTag('node_access')` 方法。省略此标签将构成安全漏洞，导致站点访客可能看到未经授权的內容，例如未发布的节点。别告诉别人你是在这里看到的，但如果你刚接触\
  \ SQL 并同时在学习数据库 API，有时即使不需要也使用更重量级的数据库 API 函数，只要你用得更顺手，也并无大碍。然而，`db_query()` 的 SQL\
  \ 方法还有几个额外的优点，使得它在可能的情况下值得被使用：你能学习到底层查询（这对使用查询构建器方法也有价值）；你能比用 `db_select()` 查询构建器更快地测试查询（例如直接在数据库上操作而完全不依赖\
  \ Drupal）；最后，你可能会遇到查询构建器无法完成的复杂查询。\n\n本章中你已经大量接触了数据库。在一个理想的 Drupal 世界中，你的模块不应查看其他模块的数据库表；而是应该有一个\
  \ API 来获取所需的一切信息。实际上，对于一个模块开发者来说，为其他模块可能从数据中需要的任何内容都尝试创建一个函数，无异于一次过早优化的练习。如前所述，Drupal\
  \ 7 中的数据库层非常健壮，它允许数据存储由任何与 Drupal 数据库层集成的数据库来处理，而你的代码无需关心具体使用哪种数据库。然而，当你的模块需要存储数据时，使用数据库层无疑是你分内之事！\n\
  \n你已经看到了一个查询构建器的刻意示例；现在让我们看一些真实的例子。但首先，如果你的模块要使用 SQL 操作其*自身*的数据，它需要创建一个数据库表。\n\n\
  好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的格式和注意事项，将以下英文文本翻译成中文。\n\n\n#### `.install` 文件\n\n你可能已经猜到，创建数据库表涉及另一个钩子：`hook_schema()`。\n\
  \n到目前为止，你看到的每个钩子都在 `.module` 文件中实现，但有四种主要类型的钩子需要放在一个不同的文件中：即 `.install` 文件。这些钩子是\
  \ `hook_install()`、`hook_schema()`、`hook_uninstall()` 和 `hook_update_N()`。当你的模块拥有自己的数据库表时，你需要一个实现\
  \ `hook_schema()` 的 `.install` 文件。拥有 `.install` 文件还有其他原因。你的 `hook_install()` 可以往该数据库表（或其他模块的表中）插入数据，并且可以用它来通过\
  \ `drupal_set_message()` 添加一条友好的消息，以帮助人们在你的模块启用后知道该做什么。如果你的数据库表的架构发生了变化，则需要一个或多个\
  \ `hook_update_N()` 的实现，例如 `example_update_7000` 和 `example_update_7001()`。虽然你应该始终确保\
  \ `hook_schema()` 包含最新的架构，但如果你已经发布了模块的某些版本，然后更改了架构，你就需要 `hook_update_N()` 来帮助那些安装了旧架构版本模块的用户进行更新。\n\
  \n其他 `.install` 模块钩子（或者实际上，所有这些都被称为回调函数，因为它们仅为正在安装的单个模块而被调用）包括 `hook_requirements()`，用于在安装模块前检查你能编码的任何需求是否满足；以及\
  \ `hook_update_dependencies()`，用于确保依赖于另一个模块的 `hook_update_N()` 函数的 `hook_update_N()`\
  \ 函数不会在其之前运行。请参阅 `dgd7.org/253` 以获取指向 `api.drupal.org` 上这些函数的便捷可点击链接，以及关于所有 `.install`\
  \ 回调的更多信息。\n\n![images](img/square.jpg) **注意：** 从 Drupal 7 开始，如果你的模块只需要定义一个数据库表，你可以跳过实现\
  \ `hook_install()` 和 `hook_uninstall()`。如果 Drupal 在你的 `.install` 文件中看到了 `hook_schema()`\
  \ 的实现，它会推断出你想要在安装时创建其中定义的表，并在卸载时删除它们。请注意，如果你的模块在变量表中放置了任何配置设置，你仍然必须使用 `hook_uninstall()`\
  \ 并结合 `variable_del()` 或通过 `db_delete()` 自行调用 SQL 来清理这些设置。\n\n#### 确定你的数据模型\n\n\
  在创建数据库表之前，理想情况下是在编写相关部分的代码之前，你需要确定什么样的数据模型能服务于你的目的。\n\nX-ray 模块需要一个数据库表来存储站点上钩子调用的记录，这样它就不必在每次缓存刷新时从头开始，并且可以将来自多个来源的钩子信息合并到一个可排序的表中。你想要存储的信息是：\n\
  \n- 被调用钩子的名称。\n- 你首次记录该钩子被调用的时间。\n- 你最后一次记录该钩子被调用的时间。\n- 实现此钩子的模块列表（如果有的话）。\n\n\
  收集钩子信息的代码，即 `module_implements_alter()` 钩子的调用，仅在钩子实现缓存被清除时运行，因此记录钩子被调用的总次数似乎没有确定的含义。但你无论如何还是会放一个计数器进去，看看是否会出现任何模式。\n\
  \n![images](img/square.jpg) **注意：** 当 Drupal 存储可能具有不同结构或数量的额外数据，并且不希望对其进行排序时，Drupal\
  \ 通常选择将所有数据作为序列化数组塞进单个列中。\n\n由于数据库无法对信息列表（例如你将存储在模块列中的信息）进行排序，你可以添加另一条你想单独存储的信息：实现模块的数量。（你也可以将实现模块存储在一个单独的数据库表中，该表包含两列，`hook`\
  \ 和 `module`，这两者一起提供唯一的组合——但为此设立一个单独的表违反了从简单开始，并在需要时**才**添加所需功能的常识。最初，X-ray 甚至完全跳过了自己的表，从\
  \ Drupal 的 `cache_bootstrap` 表中提取被调用的钩子信息；请参阅 `dgd7.org/255`。）\n\n#### 创建数据库表\n\n\
  Drupal 核心的 `.install` 文件及其 `hook_schema()` 实现是了解如何定义各种数据类型的好地方。对于钩子名称，你需要一个基本的文本字符串：`varchar`。对于时间戳，使用数字：`int`。对于中等大小的序列化数组的数据库字段类型比较难找，但\
  \ `system_schema()` 在 `{system}` 表的 info 数组中就有，因此你可以复制并修改其定义，其类型是 `blob`。对于计数，你又需要一个整数（`int`）。主键是钩子（每个钩子在表中应该只出现一次），并且你需要确保为你想要排序的每个附加列（字段）添加一个索引。请注意，主键会自动被索引。\n\
  \n闲话少说。现在让我们定义一个数据库表。如果你还没有 `.install` 文件，请创建一个，并实现 `hook_schema()`。列表 19–37 显示了用于保存钩子调用和实现信息的\
  \ X-ray 模块的架构定义，该表包含四列（或称字段）。\n\n![images](img/square.jpg) **注意：** 虽然每个拥有自己数据库表的模块都应该在其\
  \ `.install` 文件中定义这些表，但当数据存储由模块代劳时（例如 Field API 的情况），你不需要自己定义表。\n\n***列表 19–37.**\
  \ `xray.install` 文件的全部内容*\n\n```php\n<?php\n/**\n * @file\n * X-ray 模块的安装、更新和卸载函数。\n\
  \ */\n\n/**\n * 实现 hook_schema()。\n */\nfunction xray_schema() {\n  $schema['xray_hook']\
  \ = array(\n    'description' => '钩子调用记录（使用 module_invoke_all）。',\n    'fields'\
  \ => array(\n      'hook' => array(\n        'description' => '钩子的主要标识符。',\n   \
  \     'type' => 'varchar',\n        'length' => 255,\n        'not null' => TRUE,\n\
  \        'default' => '',\n      ),\n      'first' => array(\n        'description'\
  \ => '首次记录钩子的时间戳。',\n        'type' => 'int',\n        'unsigned' => TRUE,\n   \
  \     'not null' => TRUE,\n        'default' => 0,\n      ),\n      'last' => array(\n\
  \        'description' => '最后一次记录钩子的时间戳。',\n        'type' => 'int',\n        'unsigned'\
  \ => TRUE,\n        'not null' => TRUE,\n        'default' => 0,\n      ),\n   \
  \   'count' => array(\n        'description' => '钩子被记录为调用的总次数。注意，这仅在缓存清除后才会记录。',\n\
  \        'type' => 'int',\n        'unsigned' => TRUE,\n        'not null' => TRUE,\n\
  \        'default' => 0,\n      ),\n      'modules' => array(\n        'description'\
  \ => '实现此钩子的模块机器名称的序列化数组。',\n        'type' => 'blob',\n        'not null' => TRUE,\n\
  \      ),\n      'modules_count' => array(\n        'description' => '实现模块的数量计数。',\n\
  \        'type' => 'int',\n        'unsigned' => TRUE,\n        'not null' => TRUE,\n\
  \        'default' => 0,\n      ),\n    ),\n    'indexes' => array(\n      'xray_hook_first'\
  \ => array('first'),\n      'xray_hook_last'  => array('last'),\n      'xray_hook_count'\
  \ => array('count'),\n    ),\n    'primary key' => array('hook'),\n  );\n  return\
  \ $schema;\n}\n```\n\n\n\n虽然你不再需要告诉 Drupal 在安装时创建数据库表或在卸载时销毁它，但如果你有一个已发布的现有模块，你*确实*需要通过更新钩子（update\
  \ hook）告诉它创建该表。此外，你需要将该表结构（schema）复制到那个更新钩子中，因为它需要作为运行任何其他更新的基准。想象一下，你在模块的 1.2 版本中添加了一个数据库表，在\
  \ 1.3 版本中向该表添加了一个列，并在 1.4 版本中更改了唯一索引。下载 1.4 版本的用户应该拥有一个包含所有这些信息的 `hook_schema()`\
  \ 版本。然而，你的忠实用户（你真正关心的那个人）如果之前用的是 1.1 版本并升级到了 1.2，则需要一个创建该数据库表的更新钩子。当更新到 1.3 版本时，同一个用户还需要一个添加列的更新钩子。同样，当更新到\
  \ 1.4 版本时也是如此。（事实上，X-ray 在这个表添加之前就有一个测试版，因此需要一个安装完整表的更新钩子。关于此细节以及 `hook_update_N()`\
  \ 的更常见用法，请参见 `dgd7.org/261`。）\n\n#### 插入与更新数据\n\n你已经有了一个数据库；现在该往里面填充数据了。在代码的同一个位置，你经常需要插入新的数据行或更新现有的数据行。正如后面所述，`db_merge()`\
  \ 通常是实现这一目的的最佳函数。但情况并不总是如此，这里也不例外：在向前一节定义的 `{xray_hook}` 表中添加或更新钩子信息时，你需要同时使用 `db_insert()`\
  \ 和 `db_update()`。\n\n你不能使用 `db_merge()` 的原因是：如果是插入操作，你需要设置 \"first time\" 字段，但如果是更新操作，则不应修改该字段。同时，你还需要递增计数值。因此，你需要检查该钩子是否已经保存过，并从\
  \ count 列中获取该值。这应该通过直接的 SQL 语句完成，并且可以在一条语句中完成。清单 19–38 展示了 `db_insert()` 和 `db_update()`\
  \ 数据库 API 函数的使用。由于在通往你最关心的两个 DBTNG 函数的过程中会遇到一些波折，代码中这部分以粗体显示。\n\n***清单 19–38.**\
  \ 使用 `db_insert()` 和 `db_update()` 数据库 API 函数 /**\n\n```\n/**\n * 实现 hook_module_implements_alter()。\n\
  \ */\nfunction xray_module_implements_alter(&$implementations, $hook) {\n  // 由于\
  \ hook_module_implements_alter() 在 xray_hook 表创建之前\n  // 就会为 X-ray 调用，检查该表是否存在，如果不存在则退出此函数。\n\
  \  // 由于此钩子在缓存清除后的页面加载中可能被多次调用，因此静态缓存此检查结果。\n  static $table = NULL;\n  if ($table\
  \ === FALSE || !($table = db_table_exists('xray_hook'))) {\n    return;\n  }\n\n\
  \  $is_existing = (bool) $count = db_query('SELECT count FROM {xray_hook} WHERE\
  \ hook = :hook', array(':hook' => $hook))->fetchField();\n  // 将此钩子被调用检查的次数增加 1。\n\
  \  // 如果 $count 为 FALSE，则 $count++ 无法正常工作。\n  if ($is_existing) {\n    $count++;\n\
  \  }\n  else {\n    $count = 1;\n  }\n\n  // 你不希望第一次和最后一次的时间戳在它们本应相同的情况下\n  // 出现一秒的差异。\n\
  \  $timestamp = time();\n\n  $fields = array(\n    'last' => (int) $timestamp,\n\
  \    'count' => (int) $count,\n    'modules' => serialize($implementations),\n \
  \   'modules_count' => (int) count($implementations),\n  );\n\n  if ($is_existing)\
  \ {\n    // 更新钩子记录。\n    db_update('xray_hook')\n      ->fields($fields)\n     \
  \ ->condition('hook', $hook)\n      ->execute();\n  }\n  else {\n    // 该钩子尚未记录，将其插入数据库。\n\
  \    $fields['hook'] = (string) $hook;\n    $fields['first'] = (int) $timestamp;\n\
  \    db_insert('xray_hook')\n      ->fields($fields)\n      ->execute();\n  }\n\
  }\n```\n\n**提示** 如果你不需要检查第一次时间是否存在（并相应地提供或不提供它），你可以使用非常便捷的 `db_merge()` 函数，它会自动执行与主键已存在时等效的\
  \ `db_update()` 操作，以及主键不存在时等效的 `db_insert()` 操作。请参见 `api.drupal.org/db_merge` 和\
  \ `drupal.org/node/310085`。\n\n在最初编写这段代码时，我遇到了很多错误。在找出我犯错的地方时，我部署了许多 `debug()` 语句；请参见\
  \ `dgd7.org/256` 来和我一起（或笑话我）同情我的问题。\n\n\n\n#### 在可排序表格中显示数据\n\n接下来你应该已经轻车熟路了。在核心模块中找一个你喜欢的部分。数据库日志模块的“最近日志消息”页面看起来是个不错的选择。该页面的三列是可排序的，并且没有管理复选框带来的表单复杂性。“查找所需\
  \ Drupal 函数”一节会带你找到这个表格的创建位置——或者 X-ray 会告诉你：“本页面由函数`dblog_overview()`和包含文件`modules/dblog/dblog.admin.inc`提供支持。”那么开始吧。\n\
  \n![images](img/square.jpg) **提示** `dblog_overview()`函数及其在`modules/dblog/dblog.admin.inc`中的辅助函数也提供了一个使用过滤器查询和过滤器表单的示例，允许用户对表格进行筛选。\n\
  \n图 19–5 中的表格几乎每个部分都是示例代码中日志消息表格的简化版本。它使用可渲染数组结构将多个参数（作为数组的属性）传递给表格主题函数（`'#theme'\
  \ => 'table'`）。第一个选择实现`'table'`的函数（你甚至可以通过双下划线魔法进一步美化它，使用`'#theme' => 'table__xray__hooks'`来允许主题函数接管`'table__xray'`或`'table__xray__hooks'`）将会生成\
  \ HTML 表格。在本例中（实际上几乎所有情况下），没有模块或主题选择承担表格主题化的任务，因此由 Drupal 核心的`theme_table()`负责。你已经看过`theme_table()`，和之前一样，你可以在`api.drupal.org/theme_table`查看它所期望的参数。更棒的是，你还有`dblog.admin.inc`这个示例。\n\
  \n代码清单 19–39 中的代码引入了`db_query()`函数的合法使用（以粗体显示，因为本节主要讨论数据库 API）。通过向查询添加`->extend('TableSort')`方法，并且字段在查询中使用与表格表头相同的表别名（`'h'`），`theme_table()`函数就能神奇地知道要操纵哪个查询来以不同方式对表格进行排序。\n\
  \n对实现模块数组（从数据库中反序列化得到）使用`array_keys()`值得稍作解释。这要追溯到 Drupal 将实现传递给`xray_module_implements_alter()`的方式，正是在这里你将此信息保存到了数据库中。实现模块列表的键为模块名称，值仅为`FALSE`。如果某个模块的名称作为键存在，说明该模块实现了钩子；值不会被使用。Drupal\
  \ 这样做是因为对键进行搜索比对值进行搜索更快。（在 Drupal 的其他地方，出于同样的原因，有时也会使用相同的键和值。）由于你在保存到数据库之前没有改变这一点，因此在将数据传递给任何列表函数之前，你需要使用`array_keys()`从键中提取数组（并丢弃值）。\n\
  \n让我们直接看代码！第一个片段是添加这个菜单回调以便显示页面。你需要清除缓存才能看到管理![images](img/U001.jpg)报告![images](img/U001.jpg)X-ray\
  \ 部分新增的“钩子”选项卡。\n\n**代码清单 19–39.** 将{xray_hook}数据库表中的信息显示为可排序 HTML 表格的回调函数\n\n```\n\
  /**\n * 实现 hook_menu()。\n */\nfunction xray_menu() {\n// [因篇幅原因，现有代码未显示] ...\n \
  \ $items['admin/reports/xray/hooks'] = array(\n    'title' => '钩子',\n    'page callback'\
  \ => 'xray_hook_implementations_page',\n    'type' => MENU_LOCAL_TASK,\n    'weight'\
  \ => 20,\n    'access arguments' => array('access site reports'),\n  );\n  return\
  \ $items;\n}\n\n/**\n * 显示可用钩子及其实现模块的表格（如有）。\n */\nfunction xray_hook_implementations_page()\
  \ {\n  $build = array();\n\n  $header = array(\n    array('data' => t('钩子'), 'field'\
  \ => 'h.hook'),\n    array('data' => t('实现模块'), 'field' => 'h.modules_count'),\n\
  \    array('data' => t('首次记录'), 'field' => 'h.first'),\n    array('data' => t('最后记录'),\
  \ 'field' => 'h.last'),\n  );\n  $rows = array();\n\n  $query = db_select('xray_hook',\
  \ 'h')->extend('TableSort');\n  $query->fields('h', array('hook', 'modules', 'modules_count',\
  \ 'first', 'last'));\n  $result = $query\n    ->orderByHeader($header)\n    ->execute();\n\
  \n  foreach ($result as $invocation) {\n    // 准备实现模块的文本。\n    if (empty($invocation->modules))\
  \ {\n      $modules_text = t('<em>无</em>');\n    }\n    else {\n      $modules =\
  \ array_keys(unserialize($invocation->modules));\n      $modules_text = xray_oxford_comma_list($modules);\n\
  \    }\n    $rows[] = array(\n      // 单元格。必须与 $headers 的顺序一致！\n      $invocation->hook,\n\
  \      $modules_text,\n      format_date($invocation->first, 'short'),\n      format_date($invocation->last,\
  \ 'short'),\n    );\n  }\n\n  $build['hook_table'] = array(\n    '#theme' => 'table__xray__hooks',\n\
  \    '#header' => $header,\n    '#rows' => $rows,\n    '#attributes' => array('id'\
  \ => 'xray-hook-implementations'),\n    '#empty' => t('尚未记录任何钩子（这种情况不太可能）。'),\n\
  \  );\n\n  // 返回为页面构建的可渲染数组。\n  return $build;\n}\n```\n\n稍后再对代码多说几句，但首先……它奏效了！\n\
  \n这里隐藏着一个很酷的特性，并非来自“最近日志消息”表格。钩子 HTML 表格显示的数据来自数据库表的一列，但却是基于另一个数据库表的数据对该 HTML 列进行排序。这允许模块列表（来自数据库中一个不可排序的\
  \ blob 字段）根据模块数量进行排序。\n\n![images](img/1905.jpg)\n\n**图 19–5.** 成功！你现在拥有了一张美观且可排序的表格，列出了\
  \ Drupal 通过`module_implements()`调用的每一个钩子。\n\n![images](img/square.jpg) **提示** 如果你想知道某件事是否可行，那就去尝试。没有人事先知道一切，在带有版本控制的开发环境中编码意味着你总能从失败中恢复。\n\
  \n不太方便的是，当你第一次点击*实现模块*时，它会按模块数量升序排序，这意味着首先显示的是没有模块实现的钩子，这比最常用的钩子更无趣。有一个问题允许在点击表格表头时默认进行降序排序：请参阅`drupal.org/node/109493`。我是如何找到这个问题的？我在搜索“drupal\
  \ table sort different column”时发现的，但并没有直接得到答案。我是如何真正发现可以用与显示不同的字段来排序一列的呢？我只是试了试。这或许是学习和取得成功最重要的方法，如第\
  \ 14 章所述。如果你有疑问，就去尝试。这不会有什么损失，而且你可能会有一个很酷的发现。\n\n![images](img/square.jpg) **注意**\
  \ 这个表格的初始版本使用了 Drupal 核心的`item_list()`函数——`theme('item_list', array('items' => $modules));`——来格式化实现模块列表，但最常用钩子的行变得高得无法阅读。下一章定义的`xray_oxford_comma_list()`函数解救了这一困境。另一个常见技巧是使用\
  \ CSS 将 HTML 列表显示为内联元素。\n\n\n\n\n最后一点：虽然使用数据库中的`modules_number`字段对“实现模块”列进行排序的猜测几乎立刻成功了，但第一次编写这部分代码时，还有其他二十件事出了问题。数据库错误花费的时间最长，但甚至打印“实现模块”列表也先默默地失败了，因为我从查询中漏掉了`modules`字段（哎！），然后因为我在`$invocaton`中有一个拼写错误而非常响亮地失败，最后又因为我忘记反序列化该列的数据而中等程度响亮地失败。一个问题的三种不同原因！（这在编程中令人不安地常见。）其他书籍和章节的作者可能犯的错误更少，但请相信我，没有人能第一次就把所有事情做对，你甚至不应该尝试。（但不要漏掉你想要显示的字段。也不要让序列化的数据保持序列化。更不要犯拼写错误。跳过我的愚蠢错误，去追求明智的、有雄心的错误。当事情不工作时，修复错误。当它最终成功工作时，更要享受其中的乐趣！）\n\
  \n#### Drupal 实体：站点组件背后的通用结构\n\nDrupal 7 引入了*实体*的概念，以标准化其对基本数据对象的处理。用户、节点、评论、分类词汇表、分类术语和文件——这些都是\
  \ Drupal 7 核心中的实体。贡献模块可以通过实现`hook_entity_info()`来注册额外的实体类型；这在第 24 章中有所介绍。\n\n节点是\
  \ Drupal 站点上的主要内容对象，是典型的实体；Drupal 7 中实体概念的创建很大程度上是为了让其他对象的行为更像节点。特别是，Drupal 核心中字段的引入使得有必要为非节点对象提供类似于内容类型（也称为节点类型）的东西。在\
  \ Drupal 6 中，内容构造工具包项目（`drupal.org/project/cck`）和相关模块使得向内容类型添加字段（文本字段、数字字段、电子邮件地址字段、文件字段、图像字段等）成为可能。每个内容类型代表一组字段。在\
  \ Drupal 7 中，任何实体都可以拥有字段（如果其实体类型定义声明它是“可字段化的实体”），但也希望一种实体类型能拥有具有不同字段集的实体。*Bundle*\
  \ 这个词在 Drupal 中被强制征用，用来描述“带有字段的东西”这种通用含义，即非节点实体的内容类型类比。\n\n![images](img/square.jpg)\
  \ **注意** 实体引入了*bundle*的概念，而内容类型是*bundle*的例子。换句话说，内容类型就是一个*bundle*——这是你在 Drupal 7\
  \ 中最可能遇到的最常见的*bundle*。\n\n你可以通过名为`field_info_bundles()`的函数获取 Drupal 站点上每个*bundle*的信息。在确定“结构”管理页面要显示什么以及如何显示时，你可以使用`debug()`函数打印此函数或其他函数的输出以及变量。（当然，你也可以使用调试器；请参阅`dgd7.org/ide`）。在一个已引导的`test.php`文件（`dgd7.org/testphp`）或一个被调用的函数中（例如`hook_help()`中的回调或页面回调），放置代码`debug(field_info_bundles());`\n\
  \n输出是关于你站点实体的大量信息。如果放在本书中，它将占用 11 页，所以请查看你自己的输出（或参考`dgd7.org/151`）以获取完整结果。这是一个非常大的数组，但在使用\
  \ Drupal 开发时，巨大的嵌套数组是意料之中的。\n\n从`field_info_bundles()`函数输出的实体和*bundle*信息中，你可以了解到，在一个典型的安装中，你的站点上已经有六种类型的实体。这些实体是*comment*、*node*、*file*、*taxonomy_term*、*taxonomy_vocabulary*和*user*。每种实体类型进一步划分为至少一个*bundle*。例如，*file*实体类型只定义了*file*这个*bundle*，而*comment*实体类型则为每个附加了评论的内容类型都提供了*bundle*。\n\
  \n![images](img/square.jpg) **陷阱** 节点类型不存储在评论表中。它仅在评论实体中可用，因此需要通过`field_info_bundles()`这样的函数来获取。不要期望所有*bundle*信息都能在数据库中轻易找到！\n\
  \n你可以使用`field_info_bundles()`配合 X-ray 模块来提供所有实体和*bundle*的列表。请参阅`dgd7.org/254`了解如何将调试语句转化为格式良好的信息表格——当然，你也可以从调试输出中获取所需的所有信息。\n\
  \n### 总结\n\n本章向你介绍了 API，并教你如何编写一个完整的模块。你看到了使用 Drupal 提供的钩子和函数的说明和示例，其中包括修改表单、本地化、使模块可主题化、使用`hook_menu()`创建页面以及使用和定义权限。这些都是在构建一个完整模块的过程中介绍的。随着模块的每个特性需要使用\
  \ Drupal API 工具箱中的另一个工具，我介绍了这些工具并向你展示了如何使用它们。\n\n现在你知道编写一个完整的模块需要什么了，但模块的故事还有更多内容，这将在第\
  \ 20 章中完成，你将学习创建配置页面和设置表单，并将你的模块完善成一个符合`drupal.org`标准的模块，包括修复错误和检查编码标准。\n\n![images](img/square.jpg)\
  \ 提示 另请查看`dgd7.org/intromodule`，了解关于本章令人困惑的部分以及 X-ray 模块持续开发的讨论。\n\n## 第 20 章\n\n\
  ![images](img/squ.jpg)\n\n## 完善你的模块\n\n**作者：Benjamin Melançon**\n\n第 18 章和第 19 章向你展示了如何编写模块，但一个模块不仅仅包含你编写的代码。在本章中，你将学习如何：\n\
  \n*   创建配置页面和设置表单。\n*   将你的模块完善成一个符合`drupal.org`标准的模块，包括修复错误和检查编码标准。\n\n### 为你的模块创建配置页面\n\
  \nX-ray 模块可以设置合理的默认值，并且不需要配置页面。“别让我思考”的设计理念（泛指，但特指 Steve Krug 那本同名经典著作）主张移除非必要的选项。尽可能用合理的默认值取代用户需要做出的选择。或许，与完全省略配置选项几乎一样好（甚至更好）的是，提供一个大多数使用你模块的管理员永远不需要访问的配置页面。\n\
  \nX-ray 模块将允许管理员关闭管理部分摘要、页面回调和表单 ID 的显示。这些默认情况下都将处于开启状态，以便模块开箱即用。\n\n\n\n\n####\
  \ 配置页面的放置位置\n\nDrupal 的管理后台中有一个专门的“配置”分区，因此关于配置页面的放置位置，通常没有太多疑问。当然，事情并没有这么简单。Drupal\
  \ 7 的配置分区被划分为许多子分区，包括（在 Drupal 核心中）人员、内容编写、媒体、搜索与元数据、区域与语言、系统、用户界面、开发及 Web 服务。由于\
  \ X-ray 明显是一个开发辅助工具，它的配置应归入开发（`admin/config/development`）分区，但你需要根据核心模块以及任何相关且受尊敬的贡献模块，为你创建的每个（有配置分区的）模块决定其归属类别。就我个人而言，我不喜欢将模块的管理页面分散到完全不同的分区中，因为这会让管理员需要查找信息的地方翻倍。然而，这种分离正是\
  \ Drupal 7 的方式；实际上，这也将是未来的发展方向。像 X-ray 这样为管理员提供报告的模块，应将其放在管理后台的报告分区；如果该模块提供了任何配置选项，则应放入配置分区。从长远来看，这确实有道理，因为它使模块的工作方式与\
  \ Drupal 核心保持一致，但对于刚刚启用模块并试图弄清楚如何使用它的网站构建者来说，这种分离增加了导航本就令人应接不暇的界面的难度。你将在“按 Drupal\
  \ 设计意图使用 `hook_help()`”部分再次使用 `hook_help()`，以便从 X-ray 的报告页面生成一个指向其配置页面的链接，反之亦然。\n\
  \n#### 为设置表单定义菜单项\n\n配置表单在 Drupal 核心以及贡献模块中都是如此常见的需求，以至于 Drupal 提供了许多有用的函数和快捷方式（参见列表\
  \ 20–1）。\n\n**列表 20–1.** X-ray 设置页面的菜单项\n\n```\n/**\n * 实现 hook_menu()。\n */\nfunction\
  \ xray_menu() {\n  $items = array();\n  // ...\n  // 管理页面。\n  $items['admin/config/development/xray']\
  \ = array(\n    'title' => 'X-ray 配置',\n    'description' => '配置将显示内部站点结构的哪些元素。',\n\
  \    'page callback' => 'drupal_get_form',\n    'page arguments' => array('xray_admin_settings'),\n\
  \    'file' => 'xray.admin.inc',\n    'access arguments' => array('administer site\
  \ configuration'),\n    'weight' => 0,\n  );\n  return $items;\n}\n```\n\n与此前你见过的内容相比，这个菜单项声明中最有趣的部分是\
  \ `'page callback'`、`'page arguments'` 和 `'file'` 指令。这里的 `'page callback'` 并非像其他例子中的自定义函数，而是一个用于获取表单的\
  \ Drupal 核心函数。这个函数 `drupal_get_form()` 需要被赋予一个表单标识符，该标识符通常是一个返回表单结构（数组的数组）的函数名，但它也可以是通过\
  \ `hook_forms()` 注册的、能返回实际函数的标识符。此处，这个表单 ID 作为传递给 `'page arguments'` 的数组中的唯一一项传入。最后，指定了\
  \ `'file'`，因为你传递给 `drupal_get_form()` 的参数 `'xray_admin_settings'` 意味着函数 `xray_admin_settings()`\
  \ 将被调用——而该函数，正如我将在下面介绍的，是在一个单独的文件中定义的。\n\n**提示** 对于许多管理页面那样纯粹是表单的页面，Drupal 经常使用一种节省代码的技巧。菜单项的页面回调不是自定义函数，而是\
  \ `'drupal_get_form'`，并通过页面参数传递一个表单标识符。这避免了仅仅为了处理显示表单的页面回调而创建一个函数。\n\n你将借用这个菜单定义的代码，就像借用它所调用的设置表单的代码一样，这些都来自\
  \ Drupal 核心。用户模块提供了一个很好的例子。这段代码直接模仿了 `user.module` 中 `user_menu()` 对账户设置管理页面的定义。关于\
  \ `admin/config/people/accounts`，X-ray 本身会告诉你：“此页面由传递给函数 `drupal_get_form()` 的参数\
  \ `user_admin_settings` 提供，并借助文件 `modules/user/user.admin.inc` 实现。”\n\n#### 为管理代码创建单独文件\n\
  \n将代码划分到不同的文件中有两个优点。首先，它有助于你将代码组织成易于管理的片段。其次，它允许 Drupal 在不使用相关代码时避免将其加载到内存中。（这就是在\
  \ `admin/config/development/xray` 菜单项定义中指定 `file` 指令的意义所在。只有当该路径被访问时，文件 `xray.admin.inc`\
  \ 才会被包含。）\n\n你的页面回调是函数 `drupal_get_form()`，它已在 Drupal 引导过程中加载。它所处理的那个表单标识符是一个函数名，该函数返回一个表单数组。文件\
  \ `xray.admin.inc` 及其中的 `xray_admin_settings()` 函数是仿照 `user.admin.inc` 和 `user_admin_settings()`\
  \ 编写的。\n\n**注意** 当然，核心文件中的内容并非全部符合你的需求。用户模块对 `hook_menu()` 的实现定义了路径 `admin/config/people`，并使用回调函数\
  \ `system_admin_config_page()`。你创建的大多数模块不需要这样做，因为它们的配置页面将放入配置分区中已有的子分区。至于 X-ray\
  \ 模块，它归入开发子分区（`admin/config/development`）。\n\n\n\n#### 构建设置表单\n\n借助 Drupal 表单 API\
  \ 中一个专门函数的辅助，你的设置表单可以非常精简。在返回 `$form` 数组之前使用 `system_settings_form()` 函数，它会接收你提供的字段集和三个复选框选项，并负责添加提交按钮，以及处理所有表单键与变量名匹配的提交操作！注意，`'xray_display_section_summaries'`\
  \ 既是表单数组中的标识符，又是 `variable_get()` 函数中的默认值。Drupal 会使用 `variable_set()` 来保存某人提交表单时选择的值；你无需处理任何这些操作！清单\
  \ 20–2 是一个管理文件，其中包含了 X-ray 设置表单的表单定义，该文件仅在访问 `admin/config/development/xray` 时才会加载，并附带了用于管理设置的表单构建函数。\n\
  \n***清单 20–2.** 包含 X-ray 设置表单表单定义的管理文件*\n\n```\n<?php\n/**\n * @file\n * X-ray 模块设置\
  \ UI.\n */\n\n/**\n * 表单构建器；配置显示哪些 X-ray 信息。\n *\n * 此表单为 X-ray 设置页面提供菜单回调。\n *\n\
  \ * @ingroup forms\n * @see system_settings_form()\n */\nfunction xray_admin_settings()\
  \ {\n  $form = array();\n  // X-ray 输出可见性设置。\n  $form['display'] = array(\n    '#type'\
  \ => 'fieldset',\n    '#title' => t('显示选项'),\n  );\n  $form['display']['xray_display_section_summaries']\
  \ = array(\n    '#type' => 'checkbox',\n    '#title' => t('在管理部分显示摘要。'),\n    '#default_value'\
  \ => variable_get('xray_display_section_summaries', 1),\n    '#description' => t('如果取消选中，摘要仍将显示在\n\
  <a href=\"@xray-overview\">X-ray 报告</a>页面上。',\n      array('@xray-overview' => url('admin/reports/xray'))\n\
  \    ),\n  );\n  $form['display']['xray_display_callback_function'] = array(\n \
  \   '#type' => 'checkbox',\n    '#title' => t('在所有页面上显示页面回调函数。'),\n    '#default_value'\
  \ => variable_get('xray_display_callback_function', 1),\n  );\n  $form['display']['xray_display_form_id']\
  \ = array(\n    '#type' => 'checkbox',\n    '#title' => t('在表单中显示表单 ID。'),\n   \
  \ '#default_value' => variable_get('xray_display_form_id', 1),\n  );\n  return system_settings_form($form);\n\
  }\n```\n\n如图 20–1 所示，你现在正在你定义的管理页面上生成一个表单。\n\n***图 20–1.** 默认开启三个复选框的管理页面*\n\n**让\
  \ DRUPAL 存储配置设置 vs. 创建数据库表**\n\n在 Drupal 中存储配置设置有两种方式：让 Drupal 来做，或者你自己来做。Drupal\
  \ 让你能够轻松地将配置存储在全局配置变量（`$conf` 数组，从中可以通过 `variable_get()` 检索单个设置）中。默认情况下，`system_settings_form()`\
  \ 将一个裸表单数组包装在一个提交处理器中，该处理器会自动将所有表单元素通过 `variable_set()` 保存到变量表中。每个页面加载时，这些信息都会加载到全局\
  \ `$conf` 变量中。\n\n我破例认为，在 Drupal 中遵循阻力最小的路径不一定是最佳实践。每个页面加载时都可用的配置信息不应被仅在特定情况下才需要的设置所膨胀。模块作者应该多花费一点额外精力，将那些在\
  \ Drupal 全局上下文中不需要的大量数据单独存储。\n\n**提示** 在 Drupal 8 中有一项倡议，旨在让 Drupal 的配置保存更智能且可插拔；请参阅\
  \ `dgd7.org/config` 获取相关链接，包括所有向后移植到 Drupal 7 的内容。\n\n如果 X-ray 模块有一些仅在访问 X-ray 报告页面时才使用的设置，那么将它们保存在自己的数据库表中是有意义的。然而，你已有的设置会影响许多或所有页面视图，因此应将它们放入加载到\
  \ `$conf` 数组的变量表中。\n\n#### 定义新权限\n\n你还有非常重要的一步要走：让你的代码遵循你的新设置。然而，在这样做之前，让我们重新审视一下\
  \ X-ray 的权限问题，或者说权限的缺失。如果你允许管理员关闭特定类型的消息，你可以预见到有些人会想对整类用户隐藏 X-ray 的消息。（这些人不会是你或我，因为我们会遵循第\
  \ 13 章 中的部署实践，绝不会在实际网站上启用 X-ray，但那些没有读过本书的人有极小的可能会使用 X-ray。）\n\n这就需要一个“查看 X-ray\
  \ 消息”的权限。查看 `admin/people/permissions` 页面发现，没有合适粒度的权限用于 X-ray 模块管理。“管理站点配置”这个权限很可能被授予各种类型的管理员，而开启或关闭\
  \ X-ray 设置的能力只对那些至少有些开发倾向的用户才有意义。你可以尝试通过直觉推断，拥有“管理站点配置”和“查看 X-ray 输出”权限的用户应该能够配置显示，但\
  \ Drupal 不赞成这种对管理员来说不透明的技巧。因此，这里需要两个直接的新权限：“管理 X-ray”和“查看 X-ray 输出”。这些内容如清单 20–3\
  \ 所示。\n\n***清单 20–3.** 实现了 hook_permission() 的 X-ray 模块，并定义了两个新权限*\n\n```\n/**\n\
  \ * 实现 hook_permission()。\n */\nfunction xray_permission() {\n  return array(\n\
  \    'view xray messages' => array(\n      'title' => t('查看 X-ray 消息'),\n      'description'\
  \ => t('允许用户看到 X-ray 输出。'),\n    ),\n    'administer xray' => array(\n      'title'\
  \ => t('管理 X-ray'),\n      'description' => t('允许管理员配置显示哪些 X-ray 消息。'),\n    ),\n\
  \  );\n}\n```\n\n在清除缓存之前，这些权限不会出现在 `admin/people/permissions` 页面上。\n\n**注意** 请记住，像上面那样使用单引号来界定字符串时，如果在字符串中使用撇号，则会破坏一切。请对这些字符串使用双引号，或使用\
  \ `\\` 对撇号进行转义。\n\n回到你最近对 `xray_menu()` 的添加中，你需要将 'administer site configuration'\
  \ 替换为 'administer xray'，这样才能让你的新细粒度权限生效。而为了让“查看 X-ray 消息”权限有意义，你需要在检查不同 X-ray 消息类型是否显示配置的同时，也在代码中检查该权限。\n\
  \n\n\n##### 根据配置或用户访问权限有条件地执行操作\n\n在 Drupal 代码中，你经常会希望仅在特定配置设置或取决于用户权限时执行某些操作——或者在使用\
  \ X-ray 模块的情况下，同时检查这两者。\n\n根据配置设置有条件地执行操作通常就像检查`variable_get()`的结果一样简单。一个`if`语句使用`variable_get()`加载配置变量，如果该设置为\
  \ TRUE 则继续执行；对于更复杂的设置，它可以将设置中的几个可能值与您关心的条件进行比较。简单的情况如下所示：\n\n`if (variable_get('xray_show_formid'))\
  \ { ... }`\n\n根据用户可能拥有或不拥有的权限有条件地执行操作，需要调用`user_access()`函数。该函数接收一个包含权限机器名称的字符串。它也可以放在`if`语句中，包裹住那些只在用户有权访问时才需要运行的代码（基于授予角色的权限以及授予用户的角色）。或者，在函数内部，`if`语句可以反转检查条件并立即返回，这意味着跳过所有剩余代码；请参见清单\
  \ 20–4。\n\n**清单 20–4.** 如果用户没有所需权限，则通过权限检查来退出整个函数\n\n```\nfunction example_something($account\
  \ = NULL) {\n  if (!user_access('do something complex', $account)) {\n    return;\n\
  \  }\n  // 如果用户没有 'do something complex' 权限，\n  // 这里的大量复杂代码永远不会被执行。\n}\n```\n\n\
  最佳实践是将函数与对任何全局变量（例如当前登录用户的账户）的依赖分离开。通过适当分离，函数可以因不同目的而重用。当`$account`参数不存在时，`user_access()`函数会为当前用户执行检查，这会将函数限制为仅检查当前登录用户的访问权限。最好是在执行工作的函数之外进行用户访问检查，或者至少能够接受一个可以设置为非当前登录用户的用户账户。这就是清单\
  \ 20–4 所采用的方法。当`$account`为 NULL 时（这也是默认值），`user_access()`会检查当前登录用户的访问权限，但`example_something()`函数具备为任何传入的用户账户执行检查的潜力。\n\
  \n清单 20–5 中的代码不在潜在可重用的函数中，而是在一个钩子实现中，在这里*可以*预期全局环境变量（例如当前登录用户）是唯一重要的变量。它包含了在`xray_form_alter()`中添加的一个配置检查（你是否应该显示表单\
  \ ID？）和一个用户访问检查（该用户是否拥有查看 X-ray 消息的权限，该权限已被授予他们所属的角色？）。\n\n**清单 20–5.** 添加了配置检查和用户访问检查的\
  \ `xray_form_alter()`\n\n```\nxray_form_alter(&$form, &$form_state, $form_id) {\n\
  \  if (variable_get('xray_show_formid', TRUE) && user_access('view xray messages'))\
  \ {\n    $form['xray_display_form_id'] = array(\n      '#type' => 'item',\n    \
  \  '#theme_wrappers' => array('container__xray__form'),\n      '#attributes' =>\
  \ array('class' => array('xray')),\n      '#title' => t('Form ID'),\n      '#markup'\
  \ => $form_id,\n      '#weight' => -100,\n    );\n  }\n}\n```\n\n只有粗体显示的代码是新增的：`if`语句的开始及其与`}`的闭合。中间的代码已经缩进以满足编码规范，保证清晰性。如果`xray_show_formid`设置为\
  \ TRUE 并且`user_access`返回 TRUE，那么`xray_display_form_id`项将被添加到表单数组中。\n\n![images](img/square.jpg)\
  \ **注意** 别忘了`variable_get()`的默认值！Drupal 不会抛出错误，但将其留空相当于声称默认值是 FALSE，这与您在此情况下的意图相反。每次使用`variable_get()`都应该有两个参数：变量名及其默认值。\n\
  \n### 当 Drupal API 不能满足需求时编写工具函数\n\n在阅读了几十页关于 Drupal API 的内容之后，如果你认为你所有的编码需求都可以通过`drupal.org`和`PHP.net`来满足，这是情有可原的。从某种意义上说，这是真的；你编写的代码当然是为了\
  \ Drupal，并且其编写语言是 PHP。但是 Drupal 中的每一个函数都是为了满足某种需求而创建的，你也可以编写自己的函数。\n\n![images](img/square.jpg)\
  \ **注意** JavaScript，这种增强 Drupal 前端的客户端脚本语言，是全 PHP 规则下的一个例外。即便如此，Drupal 也提供了一些用于处理\
  \ JavaScript 的 PHP API 函数。而在 JavaScript 中，Drupal 提供了用于翻译和其他 Drupal 特有功能的函数。更不用说\
  \ Drupal 包含了 JQuery 库，它提供了许多许多的工具函数，使得使用 JavaScript 变得更加容易，尤其是在跨浏览器支持方面。\n\n\n\n\
  #### 将列表数据格式化为人类可读、标点规范的文本\n\nX-ray 模块在代码中大量使用了 `t()` 函数，并可能创下了模块中使用 `format_plural()`\
  \ 次数最多的记录。两者都能妥善处理变量的嵌入。然而，在将数据转换为自然语言文本时，X-ray 模块遇到了 Drupal 核心未能满足的一个反复出现的需求：将一个数组项处理成带有逗号和连词、可直接用于句子的列表。\n\
  \n在我搜索“逗号分隔列表 PHP”及类似关键词后，找到的函数可能出现在任何 PHP 项目中——任何人都能贡献一段代码片段。但这段代码是由一位 Drupal 爱好者分享的，因为社区的力量很强大。以该代码片段为基础，我们构建了清单\
  \ 20–6 中展示的实用函数。\n\n***清单 20–6.** 牛津逗号函数*\n\n```\n/**\n * 将数组项制作成格式规范、标点正确且可直接用于句子的列表。\n\
  \ *\n * 参考 www.drupaler.co.uk/blog/oxford-comma/503\n * 这是一个符合语法的辅助函数，用于将句子中的各项列表化，即\n\
  \ * 将数组转换为类似 'a, b, and c' 的字符串。\n *\n * @param $list\n *   要连接的单词或项目数组。\n * @param\
  \ $settings\n *   用于生成牛津逗号列表的可选设置数组：\n *   - type\n *     最后两项之间使用的文本。默认为 'and'。传入\n\
  \ *     'or' 和 'and' 时不进行翻译；其他连接词需要翻译。\n *   - comma\n *     列表的连接符。默认为逗号加空格。\n\
  \ *     若要使用分号生成牛津逗号列表，请使用 '; '。\n *   - oxford\n *     若将此默认值 'TRUE' 修改，你就是个外行。\n\
  \ */\nfunction xray_oxford_comma_list($list, $settings = array()) {\n  // 设置默认设置。\n\
  \  $comma = ', ';\n  $type = 'and';\n  $oxford = TRUE;\n  // 用传入的适用设置覆盖默认设置。\n \
  \ extract($settings, EXTR_IF_EXISTS);\n  // 翻译 'and' 和 'or'。\n  if ($type == 'and')\
  \ {\n    $type = t('and', array(), array('context' => '最终连接词'));\n  }\n  elseif\
  \ ($type == 'or') {\n    $type = t('or', array(), array('context' => '最终连接词'));\n\
  \  }\n  //\n  if ($oxford && count($list) > 2) {\n    $final_join = $comma . $type\
  \ . ' ';\n  }\n  else {\n    $final_join = ' ' . $type . ' ';\n  }\n  // 从 $list\
  \ 数组中移除最后两个元素。\n  $final = array_splice($list, -2, 2);\n  // 将最后两个移除的元素与最终连接字符串组合。\n\
  \  $final_string = implode($final_join, $final);\n  // 将组合后的元素（现已成为单个元素）重新添加回列表数组。\n\
  \  array_push($list, $final_string);\n  // 返回以逗号（或其他符号）连接的文本字符串列表。\n  return implode($comma,\
  \ $list);\n}\n```\n\n这个函数写起来很有趣，尤其是大部分工作已经由他人完成。它引入了翻译函数的*上下文*概念，通过向 `t()` 函数提供第三个参数，明确表明此处的\
  \ 'and' 和 'or' 用于最终连接，而非其他人可能给出的其他不当用法。\n\n另一个新特性是使用了`extract()` 并搭配一个新常量，指示它*仅在存在时提取*。（经验法则：永远不要使用裸\
  \ `extract()`；始终添加第二个参数。）参见 `dgd7.org/245` 了解旧版默认设置代码的详细写法，而通过此处使用 `extract()`，代码变得更简洁、更清晰。\n\
  \n随着你对 Drupal 和 PHP 的深入了解，你会更清晰地感知什么是可能的（几乎所有事情），并且，既然知道某些事情可能实现，你也会明白能找到实现它的方法。实际上，实现方法往往不止一种。将功能封装在函数和方法中的代码之美在于：可以在不总是关注其他所有代码的情况下，对某一段代码进行可读性或性能优化。`xray_oxford_comma_list()`\
  \ 函数经历了多次重大修改，以增加功能并纯粹出于代码优雅性考虑——毫无疑问，未来它还会经历更多优化。\n\n### 犯错并拥抱错误消息\n\n遵循“写你所知”的建议，我决定用一整节来讨论犯错。不存在没有\
  \ bug 的代码，尤其是在初稿中。知道代码出错时该怎么办，才是通往胜利之路。\n\n#### 搜索答案\n\n在错误消息方面，网络搜索始终是你的得力助手。请务必移除消息中与你环境相关的特定部分，例如网站\
  \ URL 或 Drupal 目录路径。\n\n![images](img/square.jpg) **提示** 引用足够多的错误消息以返回精确结果，但要去掉任何与你的站点或系统相关的部分（例如站点名称或主文件夹的系统路径）。即使你在初步搜索方面已经很熟练，有效搜索遇到的错误解决方案也需要反复试验。通常值得尝试\
  \ `drupal.org` 的搜索以及通用互联网搜索。\n\n查看其他人发布过的相同错误，并阅读他们的评论。运气好的话，再坚持一下，你就能找到有人提供了解决方案。大多数情况下，搜索答案都是有效的，但了解如何识别和解决某些类型的错误（如下列所示）也很有好处。\n\
  \n#### 语法致命错误\n\n致命错误意味着我们还在编程实践中。它们表明我们的代码正在产生影响。而且它们通常很容易修复：只需添加、删除或移动一个分号、圆括号或花括号即可。由于\
  \ PHP 不是编译型语言，尝试实际运行代码（从本地服务器加载网页）失败的速度，与在编辑器中检查代码语法并给出提示的速度几乎一样快。不过，任何好的 PHP IDE\
  \ 都提供语法检查功能。\n\n![images](img/square.jpg) **提示** 在 Vim 编辑器中启用语法检查；参见 `dgd7.org/vi`。\n\
  \n大多数情况下，Drupal 代码行应以分号结尾（当该行表示一条语句时）；当它是多行数组定义的一部分时，每个项目之间用逗号分隔。这类错误通常很容易修复，因为\
  \ PHP 会告诉你错误在哪一行。最难修复的语法错误是花括号不匹配。遗漏一个闭合花括号（也称为大括号）可能会产生一个指向文件末尾的错误，而实际原因可能在文件更靠前的位置。\n\
  \n\n\n#### 运行时致命错误\n\n如前所述，语法致命错误会在运行时显现，因为 PHP 并非编译型语言，但由于在运行整个应用程序的代码之前（仅加载代码就会触发错误）很容易捕获它们，因此此处将它们单独处理。我称之为运行时致命错误的情况，仅在执行使用你代码的操作（包括访问页面）时才会发生：\n\
  \n`Fatal error: Cannot use object of type stdClass as array in` ![图片](img/U002.jpg)\
  \ `/home/ben/code/dgd7/web/sites/default/modules/xray/xray.module on line 186`\n\
  \n如果你的开发环境设置得当，此错误会打印在你的屏幕上。即便在生产环境中，它也会写入服务器的错误日志，这很有帮助，因为你可能看到的只是信息量不足的白屏死机 (WSOD)。（更好的情况是，正确设置的开发环境会提供所有被调用函数的调用栈。下一节将展示如何启用\
  \ Devel 模块的堆栈跟踪。另外，请参阅第 30 章了解函数调用栈的演练，类似于你在本章开头所做的那样。）\n\nPHP 非常贴心，它精确地告诉了你问题在何处以及是什么问题。错误出现在第\
  \ 186 行，你正在尝试将对象用作数组。列表 20–7 中的代码展示了触发错误的代码以及修正后的代码。\n\n**列表 20–7.** 破坏一切的代码行及其修正版本\n\
  \n```php\n<?php\n// 第 186 行代码是这样的：\n    if (isset($theme['info'] ['hidden']) &&\
  \ $theme['info'] ['hidden'] == TRUE) {\n// ...\n}\n\n// 但它需要这样写：     if (isset($theme->info\
  \ ['hidden']) && $theme->info ['hidden'] == TRUE) {\n// ...\n}\n?>\n```\n\n关键在于，并非看起来像前者的代码总是错误的（如果\
  \ `$theme` 是一个数组，那它就是正确的）；关键在于，当你遇到 \"Cannot use object of type stdClass as array\"\
  \ 的错误时，这表示你正在处理一个对象，应该使用对象表示法，即箭头 (`->`)。\n\n#### 追踪错误和警告的原因\n\n如果你在编写模块时网站上出现了新的错误，很可能是你的代码引起的。然而，错误消息可能指向某个你从未碰过的核心文件。在这种情况下，几乎可以确定错误源自其他地方，无论是由你编写的代码还是你安装或配置的内容引起的。弄清楚错误或\
  \ bug 来自何处并修复它的过程称为*调试*。图 20–2 显示了在编写 X-ray 模块时出现的一个此类错误。\n\n![图片](img/2002.jpg)\n\
  \n**图 20–2.** \"Warning: `htmlspecialchars()` expects parameter 1 to be string\"\
  \ 错误消息\n\n警告：`bootstrap.inc` 文件的第 1,476 行给出了数组，警告：给出了对象？你该怎么处理？你甚至从未看过 `bootstrap.inc`\
  \ 文件！你现在可以查看一下 Drupal 函数 `check_plain()` 中 `htmlspecialchars()` 是如何使用的，然后你可以搜索 Drupal\
  \ 中所有调用 `check_plain()` 的 157 个函数。是的，157 个；请参阅 `api.drupal.org/check_plain` 获取列表。指出调用\
  \ `check_plain()` 的函数之一是 `t()` 翻译函数是多余的，该函数仅在内核中就被调用了 1,246 次，是 Drupal 中使用最频繁的函数。所以你可以查看所有使用\
  \ `t()` 的地方，以及所有其他使用 `check_plain()` 的地方，以及调用它们的函数，依此类推，向上追溯，试图找到是哪一个让 `htmlspecialchars()`\
  \ 对你发脾气...\n\n或者，你可以让工具瞬间处理这个问题。有独立的调试工具和集成开发环境 (IDE)，这些在 `dgd7.org/ides` 有讨论，但作为\
  \ Drupal，也有一个模块可以做到。Devel 模块包含一个选项，可以从 PHP 警告或错误开始，向上回溯函数链打印出回溯信息，并使用 Krumo 格式化以便阅读。让我们看看它是如何工作的。\n\
  \n#### 使用 Devel 模块向上回溯堆栈追踪错误\n\nDevel 模块包含用于 Drupal 开发的工具，值得常备在手。让我们安装带有 Krumo 的\
  \ Devel 模块，并观察它如何转换错误消息。\n\n1.  从 `drupal.org/project/devel` 或使用 Drush 下载 Devel\
  \ 模块：`drush dl devel`（并感谢 Moshe Weitzman，他是 Devel 和 Drush 的创建者）。\n2.  在 `admin/modules`\
  \ 或使用 Drush 启用模块：`drush -y en devel`。\n3.  转到 `admin/config/development/devel`（你可以通过\
  \ `admin/modules` 上的\"配置\"链接到达那里）。\n4.  向下滚动页面找到\"错误处理程序\"，将其从\"标准 Drupal\"改为\"\
  回溯\"，然后点击\"保存配置\"提交表单。\n5.  导航到引起错误消息的页面并享受结果。\n\n现在，回到你的 `htmlspecialchars()` 警告（参见图\
  \ 20–3）。\n\n![图片](img/2003.jpg)\n\n**图 20–3.** 使用 Devel 和 Krumo 显示的 \"Warning: `htmlspecialchars()`\
  \ expects parameter 1 to be string\" 错误消息\n\n好吧，这还帮不上什么忙。点击 \"... *(Array, 19 elements)*\"\
  \ 文本（其中 19 是你的回溯数组中的元素数量）来展开 Krumo 格式化的数组；请参见图 20–4。\n\n![图片](img/2004.jpg)\n\n\
  **图 20–4.** 针对 \"Warning: `htmlspecialchars()` expects parameter 1 to be string\"\
  \ 错误的 Krumo 格式化回溯数组\n\n现在你可以开始工作了。你可以看到从发起抱怨的 `htmlspecialchars()` 函数开始，向上经过调用它的函数、调用那个函数的函数，以及调用*那个*函数的函数，一直到\
  \ `menu_execute_active_handler()` 函数，这个函数位于 `index.php` 中，大多数时候是 Drupal 的启动函数（请参阅第\
  \ 30 章，通过这个函数的视角来观察 Drupal）。在这个长长的列表中，有多个来自 X-ray 模块的函数，它们远比一个核心函数自发产生错误更值得怀疑。\n\
  \n你可以在函数堆栈中点击 `theme_xray_show_callback`，并深入查看传递给它的参数。正如错误消息所指出的，`page_arguments`\
  \ 数组中包含一个对象，这是 `xray_show_page_callback()` 的过错。\n\n![图片](img/square.jpg) **提示**\
  \ 如果你手头没有 Devel 模块或任何其他工具，你可以在 Drupal 报告错误的地方放置一个 `debug(debug_backtrace())`; 调用，但输出的可读性远不如\
  \ Krumo 处理得那么清晰。\n\n要防止此错误，你需要检查每个页面参数，并确保在将其传递给 `drupal_placeholder()` 时，它不是对象或数组。主题函数（或模板）中出现这种复杂性级别，是一个明确的信号，表明应该有一个预处理函数在它之前清理变量。\n\
  \n\n\n### 创建预处理函数\n\n在为主题函数或模板文件创建预处理函数时，可以（通常情况下）借鉴 Drupal 核心的示例作为参考。`Node` 模块提供了\
  \ `template_preprocess_node()` 这一可能的模型（例如，通过命令行搜索 `grep -nHR 'preprocess' modules/node`\
  \ 命令搜索“preprocess”后获得）。\n\n![images](img/square.jpg) **注意** 自 Drupal 7 起，主题函数可以像模板一样拥有预处理函数。但对于主题制作者来说，能够复制和修改模板文件而非在\
  \ `template.php` 中覆盖主题函数，仍被认为是更友好的做法。不过，主题函数在性能上优于模板，因此更适用于小型功能或不太可能被重新主题化的场景。关于如何在模块中使用主题层的更多信息，请参阅模块开发者指南中的\
  \ `drupal.org/node/933976`。\n\n模块中定义的预处理函数以 `template_` 开头（主题则使用主题名称）；接着是 `preprocess_`；最后是主题函数的名称或下划线。无需在\
  \ `hook_theme()` 的实现中添加任何额外内容；Drupal 会自动查找预处理函数。无论是用于模板文件还是主题函数，预处理函数的外观和行为都相同。关键点是\
  \ `$variables` 数组是通过引用传递的，因此对该数组的任何更改或添加都需要在引用的副本上进行。示例请参见清单 20–8。\n\n***清单 20–8.**\
  \ 为 theme_xray_show_page_callback() 准备变量的预处理函数*\n\n```\n/**\n * 为显示页面回调主题函数处理变量。\n\
  \ */\nfunction template_preprocess_xray_show_page_callback(&$variables) {\n  if\
  \ ($variables['page_arguments']) {\n\n    foreach ($variables['page_arguments']\
  \ as $key => $value) {\n      // 数组和对象不易在消息中直接打印，因此标识它们是什么。\n      if (is_array($value))\
  \ {\n        $value = t('array') . ' ' . $key;\n      }\n      elseif (is_object($value))\
  \ {\n        $value = t('object') . ' ' . $key;\n      }\n      // 为安全进行清理，并为每个参数添加强调。\n\
  \      $variables['page_arguments'][$key] = drupal_placeholder($value);\n    }\n\
  \  }\n}\n\n/**\n * 主题化页面回调以及路由项的其他可选元素。\n *\n * @param $variables\n *   一个关联数组，由\
  \ menu_get_item() 生成，包含：\n *   - page_callback: 用于显示网页的函数。\n *   - page_arguments:\
  \ （可选）传递给页面回调函数的参数数组。\n *   - include_file: （可选）在调用页面回调之前包含的文件；允许将页面回调等放在单独的文件中。\n\
  \ *\n * @see template_preprocess_xray_show_page_callback()\n *\n * @ingroup themeable\n\
  \ */\nfunction theme_xray_show_page_callback($variables) {\n  extract($variables,\
  \ EXTR_SKIP);\n\n  $output = '';   $output .= '<p class=\"xray-help xray-page-callback\"\
  >';\n  $output .= t('此页面由 ');\n  if ($page_arguments) {\n    $output .= format_plural(count($page_arguments),\n\
  \      '传递给 ',\n      '传递给 ',\n      array('!arg' => xray_oxford_comma_list($page_arguments))\n\
  \    );\n  }\n  $output .= t('函数 %func',\n               array('%func' => $page_callback\
  \ . '()'));\n  if ($include_file) {\n    $output .= t('以及所包含的文件 %file',\n      \
  \           array('%file' => $include_file));\n  }\n  $output .= t(' 提供。');\n  return\
  \ $output;\n}\n```\n\n可以说，这种数据清理应该在预处理函数之前就完成。没有什么比将代码发表在一本书中更能引发审查了，因此请访问本章的在线配套资源\
  \ `dgd7.org/61`，那里无疑会有更多针对此代码的批评和改进意见。\n\n![images](img/square.jpg) **注意** 清单 20–8\
  \ 中的代码通过引入 Krumo 输出功能得到了增强（同时也变得更复杂）。改进和扩展版本请参见 `dgd7.org/259`，其中包含一个用于处理数组和对象的辅助函数。\n\
  \n### 最终考量\n\n你已经了解了一打 API，查看了大量代码，并编写了自己的代码，但你制作了一个模块吗？基本上，是的！X-ray 模块的每一行代码并未全部展示（特别是重复部分），但你可以在\
  \ `dgd7.org/code` 找到它，以及本书中的所有代码。\n\n此模块适合扩展，但你并未提供供其他模块扩展的 API；相反，非常欢迎补丁（项目维护者可以轻松应用的代码添加或修改）！现在我们来讨论一些最终考量，包括\
  \ Coder 模块审查和同行审查。\n\n当然，最重要的最终考量是，你是否达到了所尝试做的事情的最低要求。其他一切都是次要的——但仍然重要。\n\n- 确保没有硬编码人们想要更改的内容。\n\
  - 仔细检查安全漏洞。使用 Coder 审查模块（将在下一节介绍）有助于发现许多漏洞，但无法捕捉所有问题。用户访问权限是否在任何管理操作可见或更改前得到检查？用户可能输入的任何内容是否会在未经转义的情况下再次输出？转义潜在危险标记的需求包括：展示已保存到数据库中的用户提交数据；数据库\
  \ API 提供的防止 SQL 注入攻击的保护与 `t()`、`check_plain()`（`t()` 使用的函数）和 `filter_xss()` 等清理函数提供的防止\
  \ HTML 和 JavaScript 注入攻击的保护无关。安全考量概述请参见第 6 章。\n- 检查代码以确保符合编码标准；请参见 `drupal.org/coding-standards`。Coder\
  \ 审查模块可在这方面提供帮助；详情请参阅下一节。\n\n![images](img/square.jpg) **注意** 你的大部分代码都写入了 `.module`\
  \ 文件，但例如你的下一个钩子实现应该放在文件中的哪个位置？目前没有官方的编码标准或广泛认可的最佳实践。选择一种有助于你找到代码的方式（一个好的代码编辑器可以让你轻松跳转到特定函数），并且不要花太多时间思考这个问题。我将所有钩子实现放在\
  \ `.module` 文件的顶部，并优先按重要性排序，当犹豫不决时则按字母顺序排列。另一种方法是按执行顺序排列（顺序请参见第 30 章）。我将其余代码按功能分组，这与其说是科学，不如说是艺术。\n\
  \n\n\n#### 代码模块审查\n\n使用`Coder review module`对模块代码进行自动化审查，永远不会嫌太早——该模块位于`drupal.org/project/coder`项目中。但建议务必在发布前将其作为最后一步执行。\n\
  \n下载并启用 Coder 审查模块（`drush dl coder; drush -y en coder_review`），然后进入管理 ![images](img/U001.jpg)\
  \ 配置 ![images](img/U001.jpg) 开发 ![images](img/U001.jpg) 代码审查（`admin/config/development/coder`），保持所有选项为默认值。默认启用的审查项包括：Drupal\
  \ 编码标准、Drupal 注释标准、Drupal SQL 标准、Drupal 安全检查以及国际化。你可以选择\"minor\"级别，这样 Coder 会显示它发现的所有错误或潜在问题。在\"\
  选择特定模块\"部分，按字母顺序列出的模块机器名称中找到你正在开发的模块。\n\n对 X-ray 模块运行审查后，显示了这样的信息：\"Coder found\
  \ 1 projects, 3 files, 1 critical warnings, 12 normal warnings, 9 minor warnings,\
  \ 0 warnings were flagged to be ignored\"。幸运的是，那个严重警告是误报——解析器尚未更新以识别新的数据库 API 查询方式。\n\
  \n然而，其他错误暴露了一个编码失误，这个失误实际上除了 Coder 审查模块外没有任何文档记录：`t()`函数中的文本不应以空格开头或结尾。原因在于翻译人员不太可能理解或注意到空格，但为了构建依赖于是否存在页面参数的句子，我多次违反了这一规则。（此问题已在模块代码及本书展示的代码中得到修复。）\n\
  \n这个故事告诉我们：在期望他人查看和使用你的代码之前，一定要使用自动化代码审查进行最后检查。而让他人检查你的代码也是一种极好的学习方式，就像你通过阅读他人代码学习一样。\n\
  \n#### 同行评审\n\n> *\"为 Drupal 贡献代码就像与整个社区进行结对编程。\"*\n> \n> —Mark Ferree（`twitter.com/mrf`）\n\
  \n参与开源项目意味着可能有成千上万的审查者帮助改进你的代码。当你向 Drupal 核心贡献代码时，你的工作自然会得到审核。当你在`drupal.org`上发布第一个项目到自己的项目页面时（参见第\
  \ 37 章），它同样会收到代码审查。其他情况下，你需要主动请求审查。\n\n很长一段时间里，Drupal 都没有推荐的工作流程来请求代码审查。最优秀的贡献者会主动请求：即使是在为核心提交补丁时，顶级贡献者也会找其他人审查代码，他们经常互换审查以推动进度。IRC\
  \ 通常是最有效的请求渠道（这在多数情况下都适用）。如果模块与现有小组相关，你也许能在`groups.drupal.org`上找到感兴趣的人。\n\n现在已有专门的代码审查请求流程，以`groups.drupal.org/peer-review`上的同行评审小组为核心。该计划旨在将寻求项目审查的人与愿意提供审查的人匹配起来。记住，*提供*审查和接收审查都是学习以及建立社区关系的绝佳方式。要请求代码审查，请遵循以下步骤：\n\
  \n*   在寻求审查前，你需要将代码上传到`drupal.org`。关于如何使用 Git 沙箱项目，请参见第 37 章。\n*   为你希望审查的项目创建一个新问题——该问题应专门针对整体项目审查，而非在现有问题上添加标签。问题类别应为\"\
  任务\"，状态自然设置为\"需要审查\"。（这有点滥用\"需要审查\"状态，通常它表示有一个需要审查的补丁，但这里你将其用于整个项目。）在描述中，说明你最希望审查哪些方面，并明确承诺会根据建议进行改进。\n\
  *   提交问题前，添加`peer-review`标签（`peer`和`review`之间用连字符）。所有请求同行评审的问题都使用此标签。你可以通过添加`code-review`、`ux-review`、`accessibility-review`等标签来聚焦审查类型。当前标签列表请参见`groups.drupal.org/peer-review/requests`。\n\
  *   任何自愿审查者都会在该问题中回复。如果审查者发现问题，可以将状态从\"需要审查\"改为\"需要修改\"（应在评论中描述问题，或作为独立问题报告提交到你的项目）。通常\"\
  已分配\"属性属于负责代码的人，但由于你提交了问题且大家都理解你将修改代码，因此审查者可以使用此属性声明自己为主要审查者角色。\n*   修复所有发现的问题后，将状态改回\"\
  需要审查\"。如果幸运的话，审查者会回来并在认可你的工作后将其标记为\"已由社区审查和测试（RTBC）\"。\n*   欢迎将\"由[用户名（链接到用户账户）]于[日期（链接到问题）]审查\"\
  添加到项目页面的描述中！\n\n与核心贡献者一样，如果你主动请求审查，更容易获得及时审查；可以提出交换审查作为回报。在 IRC（参见第 9 章）中活跃通常是提出这类非正式请求的方式。Drupal\
  \ 聚会也是交换代码审查的好场所！\n\n![images](img/square.jpg) **注意** 在请求他人投入时间改进你的代码之前，遵循本书描述的最佳实践并遵守编码标准（位于`drupal.org/coding-standards`）非常重要。\n\
  \n最好的审查者是那些因为需要使用你的模块而被激励的人。你不一定非要主动请求这种审查——错误报告、功能建议和支持请求都会自动进入你的问题队列。如果你有机会观察他人尝试使用你的模块，那将提供无价的反馈。许多用户遇到的可用性问题不会自行上报。获得可用性审查的最佳方法是观察他人尝试使用某功能并立即收集反馈。你并不需要在实验室环境中进行才能学到很多。如果无法找到愿意参与的测试者，可以请那些感兴趣的人试用你的模块，并报告他们遇到的任何\
  \ bug 或困惑之处。\n\n#### 按 Drupal 原意使用 hook_help()\n\n`hook_help()`最常见的用法可能正是你尚未使用过的场景。但首先，我承诺过要完整解读这个钩子的定义。\n\
  \n##### hook_help()函数签名\n\n每个钩子都有函数签名：传递给钩子实现的参数，以及期望返回值类型（如果有）。定义了输入和输出数据类型，中间部分你可以自由发挥——这就是\
  \ API 的本质。\n\n![images](img/square.jpg) **注意** `hook_help()`的实现应返回 HTML 字符串，这很可能是由于\
  \ Drupal 7 向可渲染数组迁移时被忽略所致。关于适用于 Drupal 其他所有地方的渲染系统，详见附录 C。\n\n\n\n##### 参数 `$path`\
  \ 和 `$arg`\n\n你首先接收到的内容被称为函数的*参数*或*实参*。传递给实现 `hook_help()` 的函数的 `$path` 变量是路由路径，这是\
  \ Drupal 基于 `hook_menu()` 实现所定义的路径，对其当前所在路径的理想化理解。这仅意味着，在代码定义的页面上（例如 `admin/structure`），路由路径也是\
  \ `admin/structure`；而在可能由用户创建的页面上（例如 `node/1`），路由路径是 `node/%`。因此，要想只将消息显示在特定节点（或用户、分类术语）上，你仍然可以实现\
  \ `hook_help()`，但必须使用 `$arg` 参数来查看你当前所在的实际路径。\n\n对于那些不总是直观的页面，了解这些路径是什么的一种方法，是实现\
  \ `hook_help()`，并在每个页面上打印路径和 arg 变量。在一个名为 `test` 的模块中（在此提及只是为了提醒你，可以创建名称不是 X-ray\
  \ 的模块），该函数可以实现此功能；清单 20–9 展示了 `test.module` 的内容，配合一个基础的 `test.info` 文件并在启用后，它会在每个页面上打印由帮助系统解释的路径和参数。\n\
  \n**清单 20–9.** `test.module` 的内容\n\n```php\n<?php\nfunction test_help($path, $arg)\
  \ {\n  return $path . '<pre>' . var_export($arg, TRUE) . '</pre>';\n}\n```\n\n通过在\
  \ `xray.module` 的 `xray_help()` 函数中添加上述返回语句，也能达到相同的效果。\n\n**提示** 你几乎可以在 Drupal 的任何位置使用\
  \ `debug()` 函数将任意变量打印到屏幕上，例如：`debug($path, 'path'); debug($arg, 'arg');` 第二个参数（标签）是可选的。（对于大型数组或对象的变量，可能需要第三个参数\
  \ `TRUE` 来避免错误。）\n\n使用这个方法，你可以访问 `node/add/article`，并看到内容类型的机器名称（article）存在于路由路径\
  \ `node/add/article` 中。即使是你自己修改或创建的内容类型也是如此，因为所有内容类型的添加节点页面的路径都是在 `node_menu()`\
  \ 中动态定义的。然而，对于整个内容类型的编辑表单（例如节点的编辑表单），其路径在路由路径中使用了通配符占位符。例如，当你前往 `admin/structure/types/manage/article`\
  \ 编辑 Article 内容类型时，此路径的 `$path` 参数如下所示：`admin/structure/types/manage/%`（*article*\
  \ 已被百分号 % 替换，它表示通配符占位符）。要查看你正在编辑的是哪个内容类型，你需要查看 `$arg` 参数，它是一个数组，包含了真实路径的每个部分（`admin`、`structure`、`types`、`manage`\
  \ 和 `article`）。\n\n##### 模块的站内文档\n\n你在 X-ray 模块中对 `hook_help()` 的使用（在站点各处添加摘要和信息片段）并不常见。其常见用途是为站点管理员记录如何使用模块本身。这可以表现为模块配置页面上的帮助消息，其工作方式与你基于路径的使用方式相同。但具有讽刺意味的是，最常用的\
  \ `hook_help()` 用法，从代码角度来看，却是一个特例。当 `hook_help()` 的实现为路径 `admin/help` 加上井号（`#`）后跟模块名称（在你的例子中是\
  \ `admin/help#xray`）返回文本时，Drupal 会在 `admin/help/xray`（你的模块对应的路径）为模块创建一个帮助页面，并从 `admin/help`\
  \ 链接到这个专用帮助页面。\n\n让我们通过为 X-ray 模块添加一个适当的、普通的帮助页面来结束本章；请注意它返回的路径（参见清单 20–10）。\n\n\
  **清单 20–10.** X-ray 模块的经典帮助页面\n\n```php\n/**\n * 实现 hook_help()。\n */\nfunction\
  \ xray_help($path, $arg) {\n  $help = '';\n  // 在帮助消息中显示提供当前页面的函数。\n  $help .= xray_show_page_callback();\n\
  \  switch ($path) {\n    // 主要管理区域的摘要。\n    case 'admin/content':\n      $variables\
  \ = array('data' => xray_content_summary());\n      return $help . theme('xray_content_summary',\
  \ $variables);\n    case 'admin/structure':\n      $variables = array('data' =>\
  \ xray_structure_summary());\n      return $help . theme('xray_structure_summary',\
  \ $variables);\n    case 'admin/appearance':\n      $variables = array('data' =>\
  \ xray_appearance_summary());\n      return $help . theme('xray_appearance_summary',\
  \ $variables);\n    case 'admin/people':\n      $variables = array('data' => xray_people_summary());\n\
  \      return $help . theme('xray_people_summary', $variables);\n    case 'admin/modules':\n\
  \      $variables = array('data' => xray_modules_summary());\n      return $help\
  \ . theme('xray_modules_summary', $variables);\n    // 模块自身的主帮助页面。\n    case 'admin/help#xray':\n\
  \      // 这将作为一个普通页面显示；不要包含\n      // xray_show_page_callback 的 $help，否则会显示两次。\n\
  \      return _xray_help_page();\n    default:\n      return $help;\n  }\n}\n\n\
  /**\n * X-ray 模块的帮助页面。\n */\nfunction _xray_help_page() {\n  $output = '';\n  $output\
  \ .= '<h3>' . t('关于') . '</h3>';\n  $output .= '<p>' . t('X-ray 模块从几个不同的角度展示了您站点的骨架结构，旨在帮助开发者和站点构建者。')\
  \ . '</p>';\n  $output .= '<p>' . t('它在主要管理区域（结构页面的区块、内容类型、菜单；外观页面的主题等）上方的帮助区域添加了相关对象的统计摘要。',\
  \ array('@structure' => url('admin/structure'), '@appearance' => url('admin/appearance')))\
  \ . '</p>';\n  $output .= '<h3>' . t('用途') . '</h3>';\n  $output .= '<dl>';\n  $output\
  \ .= '<dt>' . t('页面回调与参数') . '</dt>';\n  $output .= '<dd>' . t('X-ray 会在页面的顶部帮助消息中显示主要负责提供该页面的函数名。如果函数接收参数，它会将参数显示在函数名之前。它还会提供该函数所在文件的名称（如果可用的话）（仅当回调函数不在\
  \ .module 文件中时，文件信息才可用）。请注意，函数接收到参数并不意味着这些参数一定被使用。') . '</dd>';\n  $output .= '</dl>';\n\
  \  return $output;\n}\n```\n\n许多用于在各个管理概览页面（例如“人员”和“模块”页面）上显示站点摘要数据的其他函数，与本章“结构”页面中展示的函数非常相似，可以在\
  \ `dgd7.org/252` 找到。值得再次指出的是，除了数据收集函数和主题函数之外，X-ray 的摘要数据还需要实现 `hook_theme()`、`hook_menu()`（以及一个页面回调函数）和\
  \ `hook_help()`。与所有托管在 `drupal.org` 上的模块一样，你可以查看 X-ray 的代码，了解这些消息和任何新特性是如何实现的。\n\
  \n\n\n### 摘要\n\n到现在为止，你可能已经发现，如果我能做到，你也能做到。读完第 18 章、第 19 章和第 20 章后，我希望你已准备好投入回报丰厚的工作：构建自己的模块，为你的\
  \ Web 项目增添功能，并为 Drupal 做出贡献。\n\n![images](img/square.jpg) **提示** 请在`dgd7.org/intromodule`讨论第\
  \ 18 章、第 19 章和第 20 章，以及 X-ray 模块的后续工作和模块开发的一般话题。\n\n## 第 21 章\n\n![images](img/squ.jpg)\n\
  \n## 移植模块到 Drupal 7\n\n**作者：Robin Monksand Benjamin Melançon**\n\n与许多开源项目一样，Drupal\
  \ 依赖志愿贡献者来保持其开发生态的活跃与现代。这是开源软件的关键优势之一；弊端在于，当其他事务占据时间后，那些曾志愿为 Drupal 付出的人往往会退出。\n\
  \n因此，你偶尔会发现一个完全符合需求的模块，但开发者尚未将其升级到 Drupal 7。在本章中，我将把一个简单的 Drupal 6 模块升级到 Drupal\
  \ 7。我会介绍执行模块升级的不同流程，并展示将模块从 Drupal 6*移植*到 Drupal 7 时一些常见的必要改动。\n\n`Add another`模块的设计目的是节省批量添加同类型内容的时间——在提交节点后会显示“添加另一个”提示。这个有用的模块能让你的站点对贡献者更友好。遗憾的是，它目前只有\
  \ Drupal 6 版本，尚无 Drupal 7 版。好在只需一些简单的努力，你就能解决这个问题！\n\n请注意，即使你个人没有需要移植到 Drupal 7\
  \ 的模块，也可以寻找那些别人请求过移植的模块。移植模块能带来三重好处：\n\n- 社区获得了所需的功能。\n- 移植比从头创建自己的模块更容易。\n- 你能通过两种方式强有力地扩展\
  \ Drupal 知识：一是检视你正在升级的代码，二是留意 Drupal 在 6 与 7 版本之间的变化。\n\n你无需完全理解要升级项目的每个方面（也无需了解\
  \ Drupal 中的每个变化），就能成功将项目升级到 Drupal 7。不过，你将在这一过程中学到很多东西。你可能无法立刻理解代码运作的每个细微之处，但在查看其他开发者的代码，并理解到足以修改\
  \ API 发生变更的部分时，你的学习将自然而然地发生。\n\n### 决定升级模块\n\n当你需要为 Drupal 站点添加某个功能时，重要的是先在现有 Drupal\
  \ 社区中搜索，看看是否有人有过同样的需求。如果有，那么对方很可能已经解决了问题——通常是以向 Drupal 社区贡献模块的形式。\n\n几乎毫无例外，与其从零开始开发，不如拿来他人的相似或过时模块（某些情况下甚至是代码片段），再根据自身需求进行调整。\n\
  \n幸运的是，将模块从 Drupal 6 升级到 Drupal 7 是获取项目所需功能的一种简单方式，并且如前所述，这也是了解 Drupal 更多知识、回馈社区的有趣途径。\n\
  \n在你开始实际升级工作这个有趣的环节之前，需要先做一些准备工作，确保自己没有重复劳动。同时，你也需要让其他人知道升级工作正在进行中。\n\n在本章中，你将始终以`Add\
  \ another`模块为示例进行练习。该模块公开托管在`drupal.org/project/addanother`上；我正是用本章所述方法将其从 Drupal\
  \ 6 移植到了 Drupal 7。\n\n![images](img/square.jpg) **提示** 一旦你确定某个模块应该升级——或任何 Drupal\
  \ 项目需要添加功能、修复漏洞或进行其他更改——你应该先调查是否有人在项目的议题队列中发布了相同的想法。如果没有，就主动发布一个。\n\n\n\n#### 提交问题\n\
  \n在社区环境中处理代码时，你首先需要向所有可能关心的人宣布你对代码的意图。虽然站在屋顶上大喊大叫可能是实现这一目标的有趣第一步，但最好的做法是下来，进入项目的议题队列。\n\
  \n项目的议题队列总是可以通过项目页面上的链接访问，该页面位于 [`http://drupal.org`](http://drupal.org)，如图 21-1\
  \ 所示。你也可以直接通过 `drupal.org/project/issues/`*`项目名称`* 访问项目的议题队列。要访问 Add another 模块的议题队列，请前往\
  \ `drupal.org/project/issues/addanother?status=All`，查看人们已提交的议题。可选的 `?status=All`\
  \ 查询参数将显示所有议题；默认情况下，议题页面会过滤掉已关闭的议题。议题的显示顺序是最新更新的在前；你可以按状态（议题是否正在处理或是否有需要审核的补丁）、版本（例如所有\
  \ 6.x 或所有 7.x 议题）和优先级（议题的相对重要性）等条件进行过滤。\n\n![images](img/square.jpg) **提示** 要无需搜索即进行过滤，请将**搜索**文本字段留空，然后使用所需的下拉菜单来过滤议题列表：\n\
  **状态** 按议题的当前阶段过滤（例如，活跃、已修复）\n**优先级** 按议题的紧急程度过滤（例如，重大、次要）\n**类别** 按议题的类型过滤（例如，错误报告、支持请求）\n\
  **版本** 按 Drupal 版本和模块版本过滤\n**组件** 按项目的组件过滤（例如，代码、文档）。然后你仍需点击**搜索**，但由于搜索字段中无文本，过滤器将应用于所有议题。\n\
  \n![images](img/2101.jpg)\n\n***图 21-1.** Add another 模块的区块议题显示开放议题与总议题数及错误报告的摘要。*\n\
  \n![images](img/2102.jpg)\n\n***图 21-2.** Add another 模块议题列表的摘录*\n\n看看图 21-2 中的所有信息；你可以看到每个议题的标题（理想情况下是一个简短准确的**摘要**）；议题**分配给**了谁（如果有人分配）；以及你可以用来过滤列表的信息。议题会根据其当前**状态**进行颜色编码（该状态也在第二列中写明）。你可以按此表格中任一粗体标题进行排序。如前所述，**最后更新**是默认排序方式（点击可反转排序，先显示最早的议题）。\n\
  \n如果所有议题或所有开放议题超过一页，逐一阅读议题标题将变得枯燥乏味，因此请使用**搜索**框来查找与你类似的问题。在 Add another 议题队列中，你可以搜索\
  \ \"Drupal 7\"、\"port\" 和 \"7.x version\"，但会发现搜索结果为空或与升级无关。\n\n从所有议题的列表中，点击“创建一个新议题”链接（在\
  \ Add another 模块的情况下，该链接会带你前往 `drupal.org/node/add/project-issue/addanother`）。\n\
  \n在议题创建表单中，**版本**是必填字段；由于尚无 7.x 版本，请使用最新的 6.x 版本。项目的维护者（或*一位*维护者；一个项目可以有多个维护者）需要创建一个\
  \ 7.x 分支以解决此议题。届时，该议题可以被正确地标记为 7.x 版本。另一个必填字段是**组件**，应选择*代码*（大多数与功能相关的议题都会如此），而**类别**可以是*任务*（在推荐修改模块代码时，更常见的是提交*功能请求*或*错误报告*）。**优先级**、**分配给**和**状态**可以保留为默认值。\n\
  \n你可以为标题发挥创意：*7.x 移植*。大多数议题需要多行来描述，但在升级的情况下，一句话就足够了：“这个简单且有用的模块需要一个 Drupal 7 移植版本。”\n\
  \n#### 为什么不用自定义代码？\n\n如果某个模块在你的 Drupal 版本中不存在、根本不存在，或者不能完全满足你的需求，那么自定义的站点特定模块始终是一个选择。（对于功能高度定制的站点，这通常是必要的。有关编写此类模块（通常称为*粘合代码*）的更多信息，请参见第\
  \ 22 章）。通常来说，编写仅针对你的站点、但在其他情况下不可用的代码更容易。如果你确切知道自己需要什么，就无需通过用户界面来实现配置。即使是在升级现有模块的情况下，抓取并修改关键的几行代码可能比移植整个模块更容易。\n\
  \n然而，仅从自私的角度来看，有两个强有力的理由去升级（或创建、扩展）一个具有用户界面的、正式的、公开发布的模块。首先，你（以及与你合作的人）可以在不修改代码的情况下进行更改。例如，如果添加了一个新内容类型，并且该类型也应该具有“提交并添加另一个”选项，这可以通过管理\
  \ UI 中的一个简单复选框来实现。其次，通过将你的代码作为 `drupal.org` 托管的模块与社区共享，你可以获得其他人对功能和代码的审视；可能有人会在漏洞或安全漏洞对你造成影响之前就发现它们。甚至可能有人会添加功能，或者在时机成熟时将模块升级到\
  \ Drupal 8！这确实会发生，就像你现在正将 Drupal 6 版本的 Add another 模块升级到 Drupal 7 一样。\n\n### 着手进行升级\n\
  \n如果你将 Add another 放入 Drupal 7 站点的模块目录中，你会在模块页面上看到它，显示着它的 Drupal 6 版本号 (6.x-1.6)\
  \ 和描述（“向用户提供一个选项，在添加节点后创建另一个相同类型的节点”）。但之后，Drupal 会添加一条注释：“此版本与 Drupal 7.x 不兼容，应予以替换。”你甚至无法尝试启用它，如图\
  \ 21-3 所示。\n\n![images](img/2103.jpg)\n\n***图 21-3.** 如果模块是为早期版本编写的，Drupal 将显示错误。*\n\
  \n![images](img/square.jpg) **提示** 一旦你开始工作，就可以将你创建的议题分配给自己。只有在你真正开始工作时才应该这样做；如果你不得不离开超过一天，请将其设置回*未分配*状态。议题队列中有大量议题分配给了数月或数年没有进行任何工作的用户。\n\
  \n如果它能正常工作，那会很有趣，但我们必须付出一些努力，让 Add another 模块能在 Drupal 7 中运行。对于最简单的模块，可能只需更改 `.info`\
  \ 文件中指定的核心版本即可，但盲目尝试实际上并不是让模块工作的最佳方法。\n\n#### 记录你需要了解的内容\n\n随着对 Drupal 的修改以创建下一个主要版本，会记录一份全面的\
  \ API 变更列表。这些变更可以在 `drupal.org` 手册的 *为 Drupal 开发* ![images](img/U001.jpg) *模块开发者指南*\
  \ ![images](img/U001.jpg) *更新你的模块* 下找到。从 Drupal 6 到 Drupal 7 的变更位于名为“将 6.x 模块转换为\
  \ 7.x”的页面，网址为 `drupal.org/update/modules/6/7`。\n\n记录 Drupal 主要版本之间的变更并保持此列表更新是 Drupal\
  \ 社区的一项了不起的努力。尽管这项工作值得尊敬，但你确定要审查这个列表上的 200 多项吗？作为学习练习，这是度过一个漫长下午的极好推荐方式……但对于你升级的每个模块呢？\n\
  \n一些坚毅的人已经付出了努力，进一步改善了 Drupal 开发者的体验（有时缩写为 *DX*）。\n\n\n\n#### 自动化（部分）模块升级\n\nJim\
  \ Berry 在 Jon Duell 等人的协助下，为我们带来了便捷的`Coder Upgrade`模块。你可以从 `drupal.org/project/coder`\
  \ 获取该模块，它属于 Coder 项目包的一部分。\n\n`Coder Upgrade` 模块需要依赖 `Grammar Parser` 模块来检查代码并提供修改建议，因此你还需下载\
  \ `drupal.org/project/grammar_parser`。关于完成上述操作的最快捷方法，请参阅本章的“命令行步骤”部分。\n\n![images](img/square.jpg)\
  \ **提示** 你也可以通过在线服务 `upgrade.boombatower.com` 使用这些工具。\n\n与所有开发工作一样，此操作应在你的本地计算机或测试服务器上进行，切勿直接在公网服务器的线上站点操作。你甚至不需要复制站点环境（尽管本示例中会这样做）；全新的\
  \ Drupal 7 安装即可满足模块升级需求。由于使用的是开发沙箱，请将 `Coder` 与 `Grammar Parser` 放置在 `sites/all/modules`\
  \ 目录下——尽管这些开发者模块最终不会纳入站点项目。\n\n在你的本地 Drupal 安装中，访问 *管理* ![images](img/U001.jpg)\
  \ *模块* (`admin/modules`)。在此处启用 `Coder`、`Coder Upgrade` 以及 `Grammar Parser`（`Coder\
  \ Upgrade` 所依赖的模块）。\n\n现在需要获取待升级的模块。前往该模块的项目页面，查找最新版本代码。通常这位于名为 `HEAD` 的 *-dev*\
  \ 开发分支；升级模块或添加新功能时，应使用此最新开发版本。以 `Add another` 模块为例，访问其项目页面 [`http://drupal.org/project/addanother`](http://drupal.org/project/addanother)，你会发现最新可用版本是正式发布版。查看代码仓库（可通过项目页面的链接浏览）后发现自该版本后未提交任何新工作。因此，请下载最新版本\
  \ `6.x-1.4` 开始移植。解压模块的压缩包，将所得文件夹和文件放入 `Coder Upgrade` 要求的暂存区；该暂存区位于 Drupal 站点文件目录（通常为\
  \ `sites/default/files`）下，需创建 `coder_upgrade` 子目录及其下的 `old` 目录（即 `coder_upgrade/old`）。换句话说，完整路径为\
  \ `sites/default/files/coder_upgrade/old`。请注意，你可以根据需要创建父目录。\n\n##### 命令行步骤\n\n从\
  \ Drupal 安装的 Web 根目录（本例中为 `drupal7`）开始，输入以下命令：\n\n```\ndrush dl coder grammar_parser\n\
  drush en coder coder_upgrade grammar_parser\nmkdir -p sites/default/files/coder_upgrade/old\n\
  cd ../\ndrush dl addanother --default-major=6 --select --\n    destination=drupal7/sites/default/files/coder_upgrade/old\n\
  ```\n\n![images](img/square.jpg) **注意** `mkdir` 命令的 `-p` 参数代表 `--parents`；在此例中，它会在创建\
  \ `old` 目录的同时自动创建 `coder_upgrade` 目录。\n\n在上述步骤中，我们需要从 Drupal 7 站点目录退出一级，以便让 `drush`\
  \ 下载 Drupal 6 模块，这正是 `cd`（切换目录）命令的作用。\n\n![images](img/square.jpg) **提示** `drush`\
  \ 的 `--select` 选项会显示模块当前所有可用版本，并允许你选择所需版本。\n\n强烈建议通过上述命令行方式安装模块并获取待升级模块。但后续的升级步骤仍需通过\
  \ `Coder Upgrade` 的用户界面来完成。\n\n![images](img/square.jpg) **提示** 许多模块都内置了详尽的帮助文档，可访问\
  \ `admin/help`。你也可以在本地站点的 `admin/help/coder_upgrade` 页面阅读 `Coder Upgrade` 模块在模块内提供的非常详尽的文档。\n\
  \n开始自动升级：访问 *管理* ![images](img/U001.jpg) *配置* ![images](img/U001.jpg) *开发* ![images](img/U001.jpg)\
  \ *Coder* ![images](img/U001.jpg) *升级* (`admin/config/development/coder/upgrade`)，点击\
  \ *目录* 垂直选项卡，找到要升级的模块。模块按系统名称列出，`Add another` 的系统名称是 `addanother`。`Coder Upgrade`\
  \ 还会显示路径——`coder_upgrade/old/addanother`——以便你确认这是刚下载的模块。勾选该模块，然后点击底部的“转换文件”按钮，如图\
  \ 21–4 所示。\n\n![images](img/2104.jpg)\n\n***图 21–4.** Coder 提供了简化模块升级的管理界面。*\n\n\
  你将看到以下令人兴奋的系统消息：\n\n- 模块转换代码已运行\n- 点击查看转换日志文件\n- 可通过点击下方“目录”和“模块”选项卡中的名称链接来查看补丁文件\n\
  \n你可以点击转换日志文件链接，但其中有趣的内容不多：仅列出了升级所查找的钩子列表。查看补丁文件则有趣得多。补丁文件展示了 `Coder Upgrade` 对模块所做的所有更改。\n\
  \n通常，自动升级的模块只是部分升级，但值得进行测试。\n\n你可以将 `Coder Upgrade` 放置在 `sites/default/files/coder_upgrade/new`\
  \ 中的升级后模块移动到 `sites/all/modules` 或 `sites/default/modules` 目录，也可以使用 `Coder Upgrade`\
  \ 提供的补丁就地升级模块的 `6.x` 版本。选择后者可避免处理权限问题。\n\n\n\n##### 命令行步骤\n\n`mv sites/default/files/coder_upgrade/old/addanother\
  \ sites/default/modules/`\n`patch -p0 <sites/default/files/coder_upgrade/patches/addanother.patch`\n\
  \n![images](img/square.jpg) **提示** Drupal 在 `drupal.org/patch/apply` 中提供了关于如何应用补丁的详细文档。我认为这个链接是快速回忆\
  \ `patch` 命令中尖括号方向的最佳捷径。（另一种方法：记住补丁命令“吃掉”补丁。因此，上一条代码的最后一行可以理解为“`patch -p0 < aiee-the-alligator-is-going-to-get-me.patch`”。）\n\
  \n如果其他方法都不奏效，自动升级必须完成的关键变更就是将模块的 `.info` 文件中的核心指令改为 7.x。这一行可能会出现两次，因为如注释所述，`drupal.org`\
  \ 会向下载的模块添加日期戳和其他自动信息（注意 `.info` 文件中的注释行以分号 `;` 开头）。这些由打包脚本添加的行可以安全删除，即使 `coder_upgrade`\
  \ 尝试更新了核心行。另外，在编写本文时，受支持的 Coder Upgrade 版本错误地为 `.install` 和 `.module` 文件添加了 `files[]`\
  \ 指令行；这一问题已在 Coder Upgrade 开发版中修复，但如果你看到这些残留的 Drupal 7 早期阶段产物，可以将其删除。\n\n`name =\
  \ Add another`\n`description = \"Presents users with an option to create another\
  \ node of the same type after a node is added.\"`\n`core = 7.x`\n\n`; Information\
  \ added by drupal.org packaging script on 2010-04-19`\n`version = \"6.x-1.6\"`\n\
  `core = 7.x`\n`project = \"addanother\"`\n`datestamp = \"1271637006\"`\n\n![images](img/square.jpg)\
  \ **注意** 如果你直接从 `drupal.org` 的版本控制系统检出模块，就不会获得打包脚本添加的这些信息；Drupal 仅修改打包成可下载版本的 `.info`\
  \ 文件。\n\n现在你应该启用该模块，并检查模块添加的其他配置选项（请在你的开发站点上操作，绝非任何类型的生产站点）。大多数模块会向管理用户菜单添加内容：*配置*下新增的设置项、*创建内容*下新增的节点类型，或管理界面中某处的新菜单链接或选项卡。不过，你不会看到该模块添加的任何内容。它本应在*配置*下添加一个“Add\
  \ another”链接，但那里什么都没有。\n\n如果自动移植成功了，那本会相当棒。\n\n然而，即使自动升级完全成功，你仍然需要审查代码。现在就来研究这个模块吧！\n\
  \n##### 找出问题所在\n\n在编程时，如果能明确知道某个具体功能不工作，其实是相当好的起点。这意味着你面前有一个非常清晰定义的任务。实际上，测试驱动开发（参见第\
  \ 23 章）采取的方法是：先编写一个关于预期行为是否发生的自动化测试，并明知测试会失败。然后程序员让测试通过，并可以重构（改进）代码，同时确信一旦破坏了任何部分，他们会立即知晓。在这个案例中，这意味着测试*配置*下是否存在“Add\
  \ another”菜单项。\n\n无论你是否使用测试驱动开发，你都需要深入模块内部来修复代码。\n\n模块就在你上次放置的位置，即 `sites/default/modules`\
  \ 目录下。打开 `addanother` 目录中的 `addanother.module` 文件。\n\n##### 命令行步骤\n\n从网站根目录输入以下命令：\n\
  \n`cd sites/default/modules/addanother/`\n`vi addanother.module`\n\n现在你已经进入模块。该从哪里开始寻找呢？\n\
  \n每当你需要在 Drupal 中创建菜单项时，都需要以某种形式处理 `hook_menu`。在 Drupal 7 中，为配置页面指定路径的方式略有变化。在 Drupal\
  \ 6 中，你可以将菜单路径指定为 `admin/settings/YourModuleName`；Coder Upgrade 会将其重新格式化为 `admin/config/YourModuleName`。遗憾的是，这并不符合\
  \ Drupal 7 在配置页面显示项目的标准，因为你需要向路径中传递另一个元素来指明你的配置所属的配置组，其中最基础的是 **system**。这样你的链接就会变成\
  \ `admin/config/system/YourModuleName`。我们来实际看看这个变化。\n\n##### Coder 模块输出\n\n```\n\
  /**\n'* 实现 hook_menu()。\n'*/\nfunction addanother_menu() {\n  $items = array();\n\
  \  $items['admin/config/addanother'] = array(\n    'title' => 'Add another',\n…\n\
  }\n```\n\n##### 修正后的代码\n\n```\n/**\n * 实现 hook_menu()。\n */\nfunction addanother_menu()\
  \ {\n  $items = array();\n  $items['admin/config/system/addanother'] = array(\n\
  \    'title' => 'Add another',\n…\n}\n```\n\n每当你对 Drupal 的菜单系统进行更改后，都需要清除菜单缓存才能使更改生效。有两种方法可以实现。第一种是进入*配置*，然后选择*开发*下的*性能*，再点击“清除所有缓存”按钮。第二种方法是使用\
  \ Drush 清除缓存；你可以直接在命令行中输入以下命令：\n\n`drush cc`\n\n无论你选择哪种方式清除页面缓存，“Add another”菜单项现在应该出现在你站点的配置页面上。你现在可以访问“Add\
  \ another”页面，并为 Drupal 默认附带的“文章”内容类型启用“Add another”。你还可以为了测试模块的其他功能，同时启用所有三个显示设置：节点创建后显示“Add\
  \ another”消息、在支持的节点类型上显示“Add another”选项卡、以及在支持的节点编辑页面上也显示“Add another”选项卡（如图 21–5\
  \ 所示）。\n\n![images](img/2105.jpg)\n\n***图 21–5**。“Add another”配置页面正逐渐接近你所需的功能。*\n\
  \n好了，你离所需的功能越来越近了。然而，如果你尝试创建一个“文章”节点类型，就会看到几条错误信息，而不是预期的消息：\n\n`Notice: Undefined\
  \ index: access in _menu_translate() (line 776 of C:\\xampp\\htdocs\\d7\\includes\\\
  menu.inc).`\n`Notice: Undefined index: access in menu_local_tasks() (line 1890 of\
  \ C:\\xampp\\htdocs\\d7\\includes\\menu.inc).`\n\n这是由于 Drupal 7 中的另一个变化，Coder 未能自动捕获。由于\
  \ Add another 的 Drupal 6 版本包含一个名为 `addanother_access` 的函数，Coder 假定它是一个节点访问函数，并将其重命名为\
  \ `addanother_node_access` 以适应 Drupal 7。这是不正确的；你需要将函数名改回去。因此这段代码\n\n```\n/**\n *\
  \ 检查是否应在节点上显示“Add another”提示。\n */\nfunction addanother_node_access($nid) {\n…\n\
  }\n```\n\n变成了\n\n```\n/**\n * 检查是否应在节点上显示“Add another”提示。\n */\nfunction addanother_access($nid)\
  \ {\n…\n}\n```\n\n现在，如果你创建一篇文章，就肯定有进展了！你可以看到“Add another”选项卡正常工作，但“Add another”消息仍未显示。这是由于\
  \ Drupal 7 中处理顺序的变化，你可以利用这一变化，将 `drupal_set_message` 调用移至 `addanother_node_insert`\
  \ 函数中。同时，你还可以通过移除处理现已弃用的 `Submit Again` 模块的遗留代码来进行清理。具体更改如下：\n\n\n\n###### 原文\n\n\
  ```\n/**\n * 实现 hook_node_insert()。\n */\nfunction addanother_node_insert($node)\
  \ {\n  if ($node->op == t('保存并创建另一个')) {\n    // 防止“添加另一个”的消息与“再次提交”冲突。\n    return;\n\
  \  }\n  $allowed_nodetypes = variable_get('addanother_nodetypes', array());\n  if\
  \ (user_access('使用添加另一个') && isset($allowed_nodetypes[$node->type]) && $allowed_nodetypes[$node->type])\
  \ {\n    global $_addanother_message;\n    $_addanother_message = t('添加另一个 <a href=\"\
  @typeurl\">%type</a>。', array(\n          '@typeurl' => url('node/add/' . str_replace('_',\
  \ '-', $node->type)),\n          '%type' => node_type_get_name($node)\n        \
  \  ));\n  }\n}\n```\n\n```\n/**\n * 实现 hook_nodeapi()。\n */\nfunction addanother_nodeapi_OLD(&$node,\
  \ $op, $a3 = NULL, $a4 = NULL) { }\n```\n\n```\n/**\n * 实现 hook_form_alter()。\n\
  \ */\nfunction addanother_form_alter(&$form, &$form_state, $form_id) {\n  if (isset($form['#node'])\
  \ && $form['#node']->type . '_node_form' == $form_id\n&& variable_get('addanother_message',\
  \ TRUE)) {\n    $form['buttons']['submit']['#submit'][] = '_addanother_message';\n\
  \  }\n}\n```\n\n```\n/**\n * 如果由 addanother_nodeapi() 设置了“添加另一个”消息，则显示该消息。\n */\n\
  function _addanother_message($form, &$form_state) {\n  global $_addanother_message;\n\
  \  if (isset($_addanother_message)) {\n    drupal_set_message($_addanother_message,\
  \ 'status', FALSE);\n  }\n}\n```\n\n###### 更新后\n\n```\n/**\n * 实现 hook_node_insert()。\n\
  \ */\nfunction addanother_node_insert($node) {\n  $allowed_nodetypes = variable_get('addanother_nodetypes',\
  \ array());\n  if (user_access('使用添加另一个') && isset($allowed_nodetypes[$node->type])\
  \ && $allowed_nodetypes[$node->type]) {\n    $_addanother_message = t('添加另一个 <a\
  \ href=\"@typeurl\">%type</a>。', array(\n      '@typeurl' => url('node/add/' . str_replace('_',\
  \ '-', $node->type)),\n      '%type' => node_type_get_name($node)\n      ));\n \
  \   drupal_set_message($_addanother_message, 'status', FALSE);\n  }\n}\n```\n\n\
  如您所见，您现在能够移除那个空的 `hook_nodeapi` 函数，以及不再需要的 `_addanother_message` 函数和调用它的 `hook_form_alter`。这是一个极好的示例，展示了\
  \ Drupal 7 中引入的一些更改如何让模块编写过程变得更加轻松。\n\n![images](img/square.jpg) **Drupal 7 的新特性**\
  \ Drupal 编码标准要求，实现钩子的函数应使用注释 `Implements hook_somethingorother().` 来标识。（请参阅 `drupal.org/coding-standards`，尤其是\
  \ `drupal.org/node/161085` 上的“模块文档指南”页面。）以现在时第三人称（他/她/它）动词（如“implements”）开头的函数描述是\
  \ Drupal 7 引入的新规范。\n\n保存模块并再次创作一篇文章后，如图 Figure 21–6 所示，尽享成功的美妙滋味！\n\n![images](img/2106.jpg)\n\
  \n***图 21–6**. “添加另一个”消息终于正常工作了！*\n\n#### 寻找可效仿的范例\n\n查阅 Drupal 核心代码是学习编写优质 Drupal\
  \ 代码的最佳方法之一。尽管核心的某些部分（讽刺的是）在“以 Drupal 的方式”行事方面并非尽善尽美，但核心代码通常受到最广泛的关注，也投入了最多的心血。您可以确信这些代码运行良好。\n\
  \n![images](img/square.jpg) **提示** 另一个寻找范例代码的好去处是 `drupal.org/projects/examples`\
  \ 上 Examples 项目中的模块套件。\n\n以这个模块为例，您本可以将菜单钩子与核心中生成系统菜单的其他模块（如 `comment.module`）进行比较。您还可以查看\
  \ `drupal.org` 上执行与您自身功能类似的其他贡献模块，将其作为范例。\n\n![images](img/square.jpg) **注意** 核心模块和贡献模块也经常在模块旁边的包含文件中或子目录中包含代码。以评论模块为例（除了多个主题模板文件、CSS\
  \ 文件、JavaScript 文件以及 `.install` 和 `.info` 文件外），它还包含 `comment.admin.inc`、`comment.pages.inc`\
  \ 和 `comment.tokens.inc`。\n\n本章重点讨论了升级模块所需执行的操作，但通过探索您升级或开发的任何模块的代码，您可以从 Drupal\
  \ 中学到更多。\n\n\n\n### 向 Drupal.org 贡献升级内容\n\n在提交补丁之前，你的工作尚未完成。\n\n开源免费软件真是太棒了。你正在他人的工作成果之上进行构建（并且会查看核心软件代码以获取指导）。现在，你需要与社区分享你完成的工作，并且你将至少获得一两个人的审阅和测试带来的好处。在你完成的工作被整合到`drupal.org`上的模块中之后，你将能够使用其他人所做的任何修复或改进，而无需保留一个与其它\
  \ Drupalistas 用户使用和贡献的版本相分离的版本。\n\n好吧，这些你都知道。那么，你究竟该如何贡献你的更改呢？传统的 Drupal 方式（这在许多软件项目中都很常见）是所有代码更改都以补丁文件的形式提交。关于制作补丁的说明，请参见`drupal.org/patch/create`上的“创建补丁”页面（以及手册中“参与进来”部分的“贡献代码”一节）。\n\
  \n在本书的大部分内容中，命令行文本都作为一种可选方案呈现——这是推荐方案，但仍是可选方案。对于创建补丁，它是唯一被描述的方案，尽管也有各种 GUI 程序，例如[`http://winmerge.org`](http://winmerge.org)，你可以尝试。要在不使用版本控制系统的情况下创建补丁，你需要一份代码的副本。任何类\
  \ UNIX 系统（Linux、Mac OS X 或 Windows 上的 Cygwin）都会为你提供`diff`命令，用于创建一个显示你的版本与原始版本之间差异的简单文件。\n\
  \n这个命令的使用方法很简单。它需要一些标志来创建 Drupal 社区所期望样式的补丁：`u`和`p`用于统一上下文（每次更改前后各三行未更改的代码）以及代码所在的函数，`r`用于递归遍历目录（以便能够修补多个文件）。然后，它需要两个参数或操作数：原始代码（文件或目录）和你修改后的代码（一个等效的文件或目录）。最后，你可以使用`>`（右尖括号）字符和一个文件名将命令的输出指向一个文件。上传到`drupal.org`的补丁文件名应包含相关的项目名称、非常简短的更改描述（通常取自问题标题）、问题的节点\
  \ ID 以及补丁将附加到的评论编号。\n\n信息量很大，但请注意它如何在一行命令中组合在一起。首先，你必须从模块的目录开始，因为项目补丁应该能够从项目根目录内应用。对于“Add\
  \ another”项目，它应该从“Add another”文件夹内应用。（同样，所有 Drupal 核心补丁都应该从 Drupal 根目录应用。）\n\n回到`drupal.org/project/issues/addanother`找到问题，*7.x\
  \ 移植*。你可以从问题的 URL [`http://drupal.org/node/554504`](http://drupal.org/node/554504)\
  \ 获取问题的节点 ID，并查看下一个评论的编号（只需将问题上的最后一个评论编号加一）。现在你已经准备好制作补丁了，这是你所有工作的顶点，如下所示：\n\n```\n\
  cd sites/default/modules/addanother\ndiff -urp ../../files/coder_upgrade/old/addanother/\
  \ . > addanother-7.x-port-554504-5.patch\n```\n\n你可以使用`patch`命令测试该补丁是否适用于“Add another”模块（你应始终检查最新版本）。将补丁复制到一个新目录，获取一份新的\
  \ Drupal 6 版本的“Add another”，然后尝试应用补丁，如下所示：\n\n```\nwget http://ftp.drupal.org/files/projects/addanother-6.x-1.4.tar.gz\n\
  tar -xzf addanother-6.x-1.4.tar.gz\ncd addanother\npatch -p0 < ../addanother-7.x-port-554504-5.patch\n\
  ```\n\n只要没有出现错误，补丁就正确应用了。现在，你只需要在问题上发布一条评论并附加`.patch`文件即可。永远不要指望一切都能一次成功，尤其是对于每个随后尝试应用你的补丁的人来说。一旦进入问题队列，人们会尝试提供帮助。\n\
  \n当其他人检查和审阅你的代码时，你将有机会对模块进行调整或进一步修改，但大部分工作已经完成。恭喜你完成了第一个 Drupal 模块升级！\n\n![images](img/square.jpg)\
  \ **提示** 访问 `dgd7.org/upmodule`，获取有关移植不同类型模块的更多技巧，以及随着 Drupal.org 转向 Git 版本控制这一新变化，当前最佳的补丁实践。\n\
  \n## 第 22 章\n\n![images](img/squ.jpg)\n\n"
- "# 编写项目特定代码\n\n作者：Florian Lorétan\n\nDrupal 的一大优势在于其丰富的可用模块选择，从外部媒体集成到复杂的访问限制，应有尽有，许多模块扩展了标准功能以适应特定用例。\n\
  \n组合现有模块可以满足你大部分的需求，但每个项目都不同，并且拥有任何模块都无法覆盖的独特细节。这时就需要*粘合代码*——一种填补现有模块提供的功能与项目精确需求之间空白的项目特定代码。粘合代码使你能将项目完成到\
  \ 100%，并让客户完全满意。\n\n![images](img/square.jpg) **注意** 许多模块提供配置选项，让用户根据自己的需求调整功能。在开始编写自己的自定义代码之前，请务必查看这些选项。\n\
  \n以下是你需要了解的术语：\n\n- *核心模块*：包含在 Drupal 标准下载包中的模块。这些模块由维护核心系统的同一批人维护。\n- *贡献模块*：在`drupal.org`上提供下载的模块。其中一些模块被广泛使用，而另一些则仅被特定人群使用。\n\
  - *自定义模块*：你在处理项目时编写的模块。它仅包含项目特定的功能，例如对核心模块和贡献模块的自定义。\n\n\n\n### 自定义模块\n\n与 Drupal\
  \ 中的任何功能类似，胶水代码也存在于模块中。自定义胶水代码模块与来自 `drupal.org` 的贡献模块之间没有技术差异，但将你的代码与他人维护的代码分开非常重要。这种分离使得你可以对贡献模块应用更新，并受益于安全更新和功能改进，而不会丢失你的自定义内容。\n\
  \nDrupal 新手开发者常犯的最大错误是直接修改现有模块甚至 Drupal 核心文件。我必须承认，在我 Drupal 职业生涯的早期也曾这样做过，这花费的时间比阅读这本（如果当时存在的话）书要多得多。\n\
  \n编写胶水代码的正确方法是创建一个自定义模块，并使其与贡献模块清晰分离。每种类型的模块都有不同的标准位置，便于区分。目录路径是相对于存放 `index.php`\
  \ 文件的 Drupal 主目录来指示的。\n\n* 核心模块存储在 `modules` 目录中。你不应该修改此目录中的任何内容。\n* 贡献模块存储在 `sites/all/modules/contrib`\
  \ 目录中。此目录的内容仅应在更新模块时进行修改。\n* 自定义模块存储在 `sites/all/modules/custom` 目录中。这些是你自己编写的模块，你可以根据需要自由修改它们。\n\
  \n除了将自定义模块存储在 `sites/all/modules/custom` 中之外，你还应遵循以下约定：\n\n* 为避免与现有名称发生潜在冲突，自定义模块的名称应以项目名称作为前缀，例如\
  \ `myproject_comment.module`。\n* 对于小型项目，所有内容可以放在一个模块中。如果你需要多个模块，请确保自己模块之间的依赖关系是清晰的。\n\
  * 如果自定义模块扩展了其他模块提供的功能，请确保在 `.info` 文件列出的依赖项中包含该模块。\n\n例如，一个为名为 “MyProject” 的项目自定义评论表单的模块，其结构如下：\n\
  \n`sites/all/modules/custom/myproject_comment/myproject_comment.info`\n\n```\nname\
  \ = \"MyProject Comment Customizations\"\ndescription = \"Customize the comment\
  \ form for MyProject.\"\ncore = 7.x\npackage = \"MyWebSite\"\n\n; 添加我们依赖的所有模块。\n\
  dependencies[] = comment\n```\n\n`sites/all/modules/custom/myproject_comment/myproject_comment.module`\n\
  \n```\n<?php\n```\n\n目前，`myproject_comment.module` 可以留空。你可以从模块管理页面启用该模块，但它目前尚未执行任何操作。\n\
  \n> **注意：** 本章给出的许多示例都可以使用现有的贡献模块来解决；文本中会提及这些解决方案。这些模块通常采用与所展示的自定义代码类似的方法。决定现有模块还是自定义模块更合适，取决于具体项目，这由读者自行判断。\n\
  \n### 钩子\n\n如前所述，胶水代码模块本身不提供功能，而是扩展现有模块提供的功能。在 Drupal 中，让模块相互交互的标准机制是 *钩子系统*。\n\n\
  钩子系统是一种非常灵活的方式，允许一个模块为其他模块提供响应特定事件的可能性。例如，评论模块定义了一个名为 `hook_comment_presave()` 的钩子，该钩子在保存评论之前执行。任何有兴趣在保存前修改评论的模块，都可以通过将\
  \ “hook” 替换为模块名称来定义一个函数。在你的例子中，你有一个 “myproject_comment” 模块实现了 `hook_comment_presave`，从而得到以下函数：\n\
  \n```\nfunction myproject_comment_comment_presave($comment) {\n  // 在此处执行操作。\n\n\
  }\n```\n\n钩子系统使得许多模块可以同时相互构建成为可能。它所提供的灵活性是 Drupal 作为开发平台的成功因素之一，但这种灵活性也意味着 Drupal\
  \ 新手有时很难跟踪代码的执行过程。一种将自定义功能添加到现有模块的标准化方法，对于保持对模块间发生的各种交互的良好概览非常有帮助。\n\n##### 方法\n\
  \n既然你已经有了放置代码的地方，让我们看看可以往里面放些什么。不过，在我深入介绍各种 API 以及如何使用它们之前，让我们先看看使用自定义代码实现目标的一般方法。无论你是一位经验丰富的\
  \ “Drupal 忍者”，还是正在编写第一个模块，编写自定义代码始终是一个由以下问题组成的探索过程：\n\n我需要修改什么，以及为什么要这么做？\n\n我可以在哪里接入（钩入）？\n\
  \n那里已经有什么了？\n\n我如何根据自己的需求修改现有功能？\n\n#### 我需要修改什么，以及为什么要这么做？\n\n我不打算花太多时间讨论想要特定功能的原因，但在开始编写代码之前，“我为什么要这样做？”\
  \ 总是要问的重要问题。\n\n自定义代码本质上会修改现有功能的标准行为。在开始编码之前，请确保你希望引入系统的更改是有意义的。标准功能之所以成为标准，通常是有原因的，考虑你的更改将带来的影响非常重要。\n\
  \n#### 我可以在哪里接入（钩入）？\n\nDrupal 拥有非常灵活的架构，使得不同模块之间的交互变得非常容易，但这也意味着有许多不同的方法可以达到相似的结果。用于模块交互的主要概念是\
  \ *钩子*。当一个模块提供特定功能时，钩子是一种让其他模块知道并做出相应反应的方式。这使得模块可以构建在其他模块之上。事实上，你可以将 Drupal 视为一种分层架构，核心系统位于最底层，一些基础模块构建其上，然后更多的模块扩展这些基础功能。\n\
  \n每个相互构建的模块都使用其下层模块的钩子。你的自定义模块将位于现有模块之上，因此了解接入它们的最佳方式对于构建稳固的功能至关重要。这个问题基本上归结为你想要实现哪个钩子。\n\
  \n虽然没有绝对的规则，但一个好的起点是找出你将处理哪种类型的元素或主要组件。在大多数情况下，它会是一个节点、一个表单或一个菜单路由项。在 `api.drupal.org`\
  \ 上搜索应该能帮你找到相关的钩子，但表 22-1 展示了一些基本的钩子。\n\n**表 22-1.** 基本钩子\n\n| **组件类型** | **可修改方式**\
  \ |\n| --- | --- |\n| 表单 | `hook_form_alter(&$form, &$form_state, $form_id)` |\n\
  | 节点 | `hook_node_presave()`、`hook_node_insert()` 等 |\n| 菜单路由项 | `hook_menu_alter(&$items)`\
  \ |\n\n#### 那里已经有什么了？\n\n一旦你找到了接入现有功能的点，你需要知道那里有什么可以操作的。这时，一些调试工具（例如 `debug()` 函数）就派上用场了。自定义模块主要处理由其他模块定义的结构，能够可视化这些结构对于与之交互至关重要。\n\
  \n> **提示：** Devel 模块提供了一套工具，可以轻松调查 Drupal 站点中涉及的各种结构。该模块不向最终用户提供任何功能，并且应在生产环境中禁用，但我绝对推荐在任何项目的开发过程中使用它。\n\
  \n\n\n#### 如何根据自身需求修改现有功能？\n\n这是整个流程的最后一步，但也是真正落实工作的环节。你清楚自己想要什么、知道可以挂载到何处、也了解有哪些可用数据；现在只需编写实现目标的代码。如果你在此处发现不知如何继续，回溯之前的步骤应该会有所帮助。\n\
  \n### 示例：更改提交按钮的标签\n\n以下是一个简单的例子来说明这个方法：\n\n1. **我需要修改什么，以及为什么这样做？**\n\n   你有一个来自贡献模块的表单，但为你构建网站的客户希望将显示为\"\
  保存\"的标准提交按钮替换为\"存储此信息\"。\n\n2. **我可以挂载到何处？**\n\n   有几个地方可以挂载来实现修改，但由于你要修改的是表单元素，因此需要实现\
  \ `hook_form_alter()`，它接受三个参数：`$form`、`$form_state` 和 `$form_id`：\n\n   ```\n  \
  \ function mymodule_form_alter(&$form, &$form_state, $form_id) {\n\n   }\n   ```\n\
  \n3. **已经存在什么？**\n\n   使用 Devel 模块及其辅助函数 `dpm()` 来查看参数的内容，例如：\n\n   ```\n   function\
  \ mymodule_form_alter(&$form, &$form_state, $form_id) {\n     dpm($form);\n    \
  \ dpm($form_state);\n     dpm($form_id);\n   }\n   ```\n\n   结果显示 `$form` 是一个 Form\
  \ API 结构化数组，你可以在其中找到要修改的提交按钮（参见 图 22-1）。`$form_state` 包含表单状态的其他信息，例如已提交的值。`$form_id`\
  \ 参数用于标识这个特定表单；你可以用它来确保不影响其他表单。\n\n   请注意，`hook_form_alter()` 还有一个针对特定表单的变体，形式为\
  \ `hook_form_FORM_ID_alter()`，且不接受 `$form_id` 参数。这种变体的优点是只影响特定表单，从而略微提升性能并减少产生意外副作用的风险。\n\
  \n   ![images](img/2201.jpg)\n\n   ***图 22-1.** `dpm()` 的输出*\n\n4. **如何根据自身需求修改现有功能？**\n\
  \n   既然已经锁定要使用的关键元素，就可以编写代码了。我们知道表单的 ID，因此也可以使用 `hook_form_FORM_ID_alter()` 变体来仅影响这个特定表单。假设该表单的\
  \ ID 是 `article_node_form`，我们的钩子实现将如下所示：\n\n   ```\n   function mymodule_form_article_node_formalter(&$form,\
  \ &$form_state, $form_id) {\n     // 替换提交按钮的 #value 属性。\n     $form['submit']['#value']\
  \ = t('存储此信息');\n   }\n   ```\n\n### 具体用例\n\nDrupal 中不同钩子提供的可能性是无穷无尽的。关于如何使用每个钩子的文档可在\
  \ `api.drupal.org` 上获取，因此在此处全部列出意义不大。相反，我将展示常见任务的示例及其解决方法。\n\n#### 隐藏用户界面中的元素\n\n\
  当谈到定制现有模块提供的功能时，我并不一定是要扩展它。事实上，粘合代码最常见任务之一就是隐藏用户界面中的元素。其目的可以是精简用户体验（移除多余元素），也可以是功能性的——有目的地限制提供给最终用户的选项以符合你的需求。\n\
  \n当需要向用户隐藏元素时，首先想到的是直接完全移除该元素。虽然这大多数时候可行，但在某些情况下这种方法会产生负面副作用。其他模块可能依赖这些元素的存在，因此最佳解决方案不是移除它们，而是拒绝访问，如下所示：\n\
  \n```\n/**\n * 实现 hook_form_alter()。\n * 从文章表单中移除评论设置。\n */\nfunction mymodule_form_alter(&$form,\
  \ &$form_state, $form_id) {\n  $form['comment_settings']['#access'] = FALSE;\n}\n\
  ```\n\n这段代码演示了如何使用 `hook_form_alter()` 将表单元素的 `#access` 属性设置为 `FALSE`，从而对所有用户隐藏该元素。该表单元素不可见，但仍在表单结构中，并会被正确处理。在这个例子中，你隐藏了文章创建表单中的评论设置，但使用此表单创建的文章仍会应用默认的评论设置。\n\
  \n下一个示例使用相同的原理处理菜单元素。访问回调通常是定义用户是否有权限访问页面的函数，但通过将访问回调设置为 `TRUE` 或 `FALSE`，我们可以无条件地允许或拒绝所有用户的访问。\n\
  \n```\n/**\n * 实现 hook_menu_alter()。\n *\n * 使 http://example.com/node 页面无法访问。\n\
  \ */\nfunction mymodule_menu_alter(&$items) {\n  $items['node']['access callback']\
  \ = FALSE;\n}\n```\n\n这个第二个示例使用相同的原理处理菜单元素。访问回调通常是定义用户是否有权限访问页面的函数，但通过将访问回调设置为 `TRUE`\
  \ 或 `FALSE`，我们可以无条件地允许或拒绝所有用户的访问。\n\n有时你并不想移除元素，而只想改变它的外观或行为。这通常可以通过更改其类型来实现。基本表单元素可以轻松地从一种类型转换为另一种类型。下一个示例将文本字段转换为选择字段，让用户从预定义选项中选择，而不是输入任意内容。请注意，表单元素只能转换为值兼容的元素类型。文本字段的值是字符串，而复选框组的值是数组；将文本字段转换为复选框组会导致不可预测的结果。\n\
  \n```\n/**\n * 实现 hook_form_FORM_NAME_alter()。\n *\n * 不再使用文本字段按类型过滤视图，而是通过选择元素来限制选项。\n\
  \ */\nfunction mymodule_form_views_exposed_form_alter(&$form, &$form_state) {\n\
  \  // 将过滤字段的类型更改为选择元素。\n  $form['title']['#type'] = \"select\";\n\n  // 设置仅搜索 Drupal\
  \ 或开源相关的选项。\n  $form['title']['#options'] = array(\n    '' => t('列出所有内容'),\n   \
  \ 'Drupal' => t('仅列出标题包含 \"Drupal\" 的文章'),\n    'Open Source' => t('仅列出标题包含 \"开源\"\
  \ 的文章'),\n  );\n}\n```\n\n最后一个示例非常常见。节点页面或用户注册表单上的选项卡通常是不需要的，尽管它们链接到的页面仍然需要可访问。通过将相应菜单定义的类型从\
  \ `MENU_LOCAL_TASK` 更改为 `MENU_CALLBACK`，可以轻松实现此效果，如下所示：\n\n```\n/**\n * 实现 hook_menu_alter()。\n\
  \ *\n * 隐藏编辑文章选项卡，改为在内容末尾创建链接。\n */\nfunction mymodule_menu_alter(&$items) {\n \
  \ // 默认类型是 MENU_LOCAL_TASK，会显示一个选项卡。\n  $items['node/%node/edit']['type'] = MENU_CALLBACK;\n\
  }\n```\n\n```\n/**\n * 实现 hook_node_view()。\n *\n * 添加我们自己的链接。\n */\nfunction mymodule_node_view($node,\
  \ $view_mode) {\n  $node->content['links']['mymodule_link'] = l(t('编辑'), 'node/'\
  \ . $node->nid . '/edit');\n}\n```\n\n\n\n#### 钩子（Hook）的执行顺序\n\n在添加胶水代码时，了解钩子实现的执行顺序非常重要。通常，您想要扩展的模块与您的自定义模块使用了相同的钩子，在这种情况下，您通常希望自己的模块实现能够明确地在原始模块之前或之后执行。\n\
  \n默认情况下，钩子的执行顺序由对应模块的权重决定，该权重存储在系统表中，并可使用 `hook_install()` 进行设置。（例如，请查看 Devel 模块在\
  \ `devel.install` 文件中对 `hook_install()` 的实现。）权重相同的模块会根据路径按字母顺序排序，这意味着存储在 `modules`\
  \ 目录中的核心模块的钩子会在存储于 `sites/all/modules` 的贡献模块的钩子之前执行。\n\n然而，有时您只需要控制一个钩子，而不是全部。这可以通过\
  \ `hook_module_implements_alter(&$implementations, $hook)` 来实现。假设您想在所有其他模块完成表单修改后，再进行一些修改。可以通过以下代码实现：\n\
  \n```\n/**\n * 实现 hook_module_implements_alter()。\n */\nfunction mymodule_module_implements_alter(&$implementations,\
  \ $hook) {\n  if ($hook == 'form_alter') {\n    $my_hook_implementation = $implementations['mymodule'];\n\
  \    unset ($implementations['mymodule']);\n    $implementations['mymodule'] = $my_hook_implementation;\n\
  \  }\n}\n```\n\n#### 使用字段\n\nDrupal 7 最重要的新特性之一是将字段 API（Fields API）包含到 Drupal 核心中。\n\
  \n虽然字段 API 的灵感来源于广泛使用的 CCK 模块，但发生了一些重大变化，使得字段 API 在网站功能中变得更加核心。以前字段仅限于节点，现在它们可以附加到任何实体上。这意味着用户、评论、分类术语以及任何其他定义的实体现在都可以拥有额外的属性。因此，在为\
  \ Drupal 7 编写胶水代码时，您会经常遇到字段 API 的结构。\n\n字段的标准结构如下：\n\n`$entity->field_name[language_code][delta]['attribute_name']`\n\
  \n通过查看使用 Devel 模块的标准安装中定义的文章的字段结构，您会发现以下几点：\n\n- 字段名称通常以 `field_` 前缀开头，但并非总是如此。例如，文章的正文字段就是一个字段，但其字段名称仅为\
  \ `'body'`。通过用户界面创建的字段将始终带有 `field_` 前缀。\n- 当语言环境（locale）模块未启用时，语言代码始终为 `'und'`，即常量\
  \ `LANGUAGE_NONE` 的值。但是，当语言环境模块启用时，某些情况下语言代码与文章的语言对应，但某些字段（如 `field_tags`）仍然是与语言无关的。`field_language()`\
  \ 函数帮助我们确定字段的语言代码，但我们也可以使用 `field_get_items()` 函数，它会为我们处理整个逻辑。\n\n```\n/**\n * 实现\
  \ hook_node_presave()。\n */\nfunction mymodule_node_presave($node) {\n  // 对特定字段使用\
  \ field_language()。\n  $body_language_code = field_language('node', $node, 'body',\
  \ $node->language);\n  $body_value = $node->body[$body_language_code][0]['value'];\n\
  \n  // 或者，直接获取项目。\n  $body = field_get_items('node', $node, 'body');\n  $body_value\
  \ = $body[0]['value'];\n}\n```\n\n请注意，在处理与字段小部件相关的表单元素时，语言代码可通过 `#language` 表单 API\
  \ 属性访问，并应通过这种方式获取。\n\n```\n/**\n * 实现 hook_form_alter()。\n */\nfunction mymodule_article_node_form_alter(&$form,\
  \ &$form_state) {\n  // 正确： $body_language_code = $form['body']['#language'];\n\
  \  // 错误： $body_language_code = field_language('node', $node['#node'], 'body');\n\
  }\n```\n\n- 增量（delta）是一个数字索引，用于多值字段以标识每个不同的值。然而，为了保持一致性，增量是所有附加字段结构的一部分。对于单值字段，增量始终为\
  \ 0。\n\n```\n  // 您可以遍历字段的多个值。\n  foreach (field_get_items('node', $node, 'field_tags')\
  \ as $delta => $item) {\n    // 对每个值执行某些操作。\n  }\n```\n\n- 每种字段类型可以有多种不同的属性。许多字段类型，如文本和数字，都有一个名为\
  \ `'value'` 的主属性，但这并非总是如此。分类术语引用字段只有一个 `'tid'` 属性，包含所引用分类术语的标识符。图片字段则包含关于所引用文件的更多信息。如果不确定有哪些数据可用，请使用\
  \ Devel 模块进行检查。如果您需要的数据不可用，通常可以基于现有属性加载该数据。\n\n![images](img/square.jpg) **注意**\
  \ 字段 API 提供了更多可能性，这些对于自定义模块非常实用。编写自定义小部件或自定义格式化器是一种非常优雅的方式，可以在保持代码通用和整洁的同时，利用现有的字段结构。有关字段\
  \ API 的更多信息，请访问 `api.drupal.org/api/drupal/modules--field--field.module/group/field/7`。\n\
  \n#### 添加动态前端交互\n\nWeb 2.0 运动普及了使用 JavaScript 和 Ajax 来改进用户界面，以至于它们已成为用户预期体验中不可或缺的一部分。幸运的是，Drupal\
  \ 7 包含了许多工具，极大地简化了动态用户界面的创建。有关如何使用这些不同 API 的更多详细信息，请参阅第 17 章。\n\n##### jQuery UI\n\
  \njQuery UI 库是一套基于 jQuery 构建的用户界面工具，包含在 Drupal 7 中。它提供了辅助函数，以便于创建诸如可调整大小、可拖动或可选择组件等行为。它还提供了\
  \ JavaScript 选项卡、折叠面板、滑块以及其他常见的用户界面组件。\n\n清单 22-1 是一个示例，演示了如何使用 jQuery UI 通过 `hook_page_alter()`\
  \ 将侧边栏区块转换为折叠面板。\n\n***清单 22-1**. 使用 jQuery UI*\n\n```\n/**\n * 实现 hook_page_alter()。\n\
  \ *\n * 将侧边栏区块转换为折叠面板。\n */\nfunction mymodule_page_alter(&$page) {\n  if (isset($page['sidebar_first']))\
  \ {\n    // 使用自定义主题函数调整侧边栏的 HTML 结构。\n    $page['sidebar_first']['#theme'] = 'mymodule_sidebar_accordion';\n\
  \n    // 从 jQueryUI 添加折叠面板库。\n    $page['sidebar_first']['#attached']['library']\
  \ = array(\n      array('system', 'ui.accordion'),\n    );\n\n    // 添加将侧边栏转换为折叠面板的代码。\n\
  \    $page['sidebar_first']['#attached']['js'][] = array(\n      'data' => '(function($)\
  \ {\n                   Drupal.behaviors.sidebarAccordion = {\n                \
  \     attach: function(context, settings) {\n                       $(\"#sidebar-first\"\
  ).accordion();\n                     }\n                   };\n                \
  \ })(jQuery);',\n      'type' => 'inline',\n    );\n  }\n}\n```\n\n\n\n##### #ajax\
  \ 和 #states\n\n交互性通常与表单密切相关。`#ajax` 和 `#states` 属性是表单 API 的新增功能，极大地简化了 Ajax 化组件的创建以及表单元素之间依赖关系的定义。这些任务曾需要自定义\
  \ jQuery 代码，但现在可以通过在 `hook_form_alter()` 的实现中直接修改表单数组，从 PHP 层面处理。请参见 `api.drupal.org/api/drupal/developer--topics--forms_api_reference.html/7`\
  \ 上的表单 API 参考文档，了解如何使用这些属性的文档和示例。\n\n### 使代码可复用\n\n尽管你放入自定义模块中的粘合代码大多与具体项目相关，但如果能在不同项目上复用相同的功能，而无需从头开始或花费数小时调整代码以适应新项目，那将非常理想。以下章节包含了一些指导原则，可帮助你保持代码的通用性和可复用性。\n\
  \n#### 使功能可配置\n\n当你需要针对某个特定组件进行操作时，最简单的方式是在模块中硬编码该组件的名称。其缺点是，从此以后，你的模块将依赖于一个具有特定名称的组件。你可以使功能可配置，而不是硬编码组件名称。\n\
  \n例如，你想创建一个小模块，用于在内容可能过时时通知用户，因为你的信息对时效性要求极高。硬编码版本如下所示：\n\n```\n/**\n * 实现 hook_node_view()。\n\
  \ */\nfunction mymodule_node_view($node, $view_mode, $langcode) {\n  $display_outdated\
  \ = $node->type == 'article';\n  $age = time() - $node->created\n  $is_outdated\
  \ =  $age > 60*60*24*7;\n\n  if ($display_outdated && $is_outdated) {\n    drupal_set_message(t('本文发布于\
  \ 1 周前，可能已过时。'));\n  }\n}\n```\n\n如果你在另一个需要相同功能（但内容类型为“story”，且阈值从一周变为一个月）的项目中使用此代码，你将需要修改四个地方的代码。这极易导致遗忘某项修改，最终出现损坏的代码。更好的解决方案是使代码可配置，如下所示：\n\
  \n```\n/**\n * 实现 hook_node_view()。\n */\nfunction mymodule_node_view($node, $view_mode,\
  \ $langcode) {\n  $delay = variable_get('mymodule_outdated_delay_' . $node->type,\
  \ 0);\n  $age = time() - $node->created\n  $is_outdated = $age > $delay;\n  if ($delay\
  \ && $is_outdated) {\n    $type = node_type_load($node->type);\n    drupal_set_message(t('此\
  \ @type 发布于 @delay 前，可能已过时。', array('@type' =>  $type->name, '@delay' => format_interval($age,\
  \ 1));\n  }\n}\n```\n\n这段代码不再依赖于特定内容类型的存在。相反，它定义了可为任何内容类型设置的变量。要使此配置对最终用户可用，你可以简单地扩展节点类型配置表单，如清单\
  \ 22-2 所示。\n\n***清单 22-2**. 扩展节点类型配置表单*\n\n```\n/**\n * 实现 hook_form_FORM_NAME_alter()。\n\
  \ */\nfunction mymodule_form_node_type_form_alter(&$form, &$form_state) {\n$form['mymodule_outdated_delay']\
  \ = array(\n    '#title' => t('过多久后你想警告用户。'),\n    '#type' => 'select',\n    '#default_value'\
  \ =>  variable_get('mymodule_outdated_delay_' .  $form['#node_type'], 60*60*24*7),\n\
  \    '#options' => array(\n      0 => t('不警告过时内容'),\n      60*60 => t('1 小时'),\n\
  \      60*60*24 => t('1 天'),\n      60*60*24*7 => t('1 周'),\n    ),\n  );\n}\n```\n\
  \n此代码将允许用户随其他节点设置一起配置功能。这些设置存储为变量，你可以像在 `hook_node_view()` 的实现中那样，从代码的其他部分访问它们。现在，配置与功能解耦，你就可以在具有类似功能但配置不同的另一个项目上复用相同的代码了。\n\
  \n#### 连接组件\n\n粘合代码在大多数情况下依赖于其他结构，例如内容类型、视图和其他配置组件。在清单 22-2 中，你使代码变得通用，以便能够将功能附加到任何内容类型上，但在某些情况下，你需要存在特定的结构。\n\
  \n例如，如果不存在用于博客文章的内容类型和用于列出博客文章的视图，那么自定义博客模块就没什么意义。与其让安装模块的人自己创建这些组件，不如让你的自定义模块自行定义它们。你可以使用\
  \ `hook_node_info()` 定义新的节点类型，并使用 `hook_views_default_view()` 定义用于博客列表的视图。\n\n然而，手动定义这些结构可能很繁琐，更新此类结构也很困难。Features\
  \ 模块可以极大地帮助将配置组件导出为代码，但这为你的模块增加了一个额外的依赖项。第 34 章 包含有关如何使用 Features 的更多详细信息。\n\n####\
  \ 为代码编写文档\n\n你可能已经听过很多次了，所以我不会在这点上花太多时间，但仅仅因为你编写的是项目特定的代码，并不意味着你不应该为代码编写文档。作为 Drupal\
  \ 项目的 PHP 开发者，自定义代码是你花费大部分时间的地方，因此缺乏文档会带来很大危害，并且无疑会降低代码的可复用性。\n\n#### 遵循 Drupal\
  \ 的编码标准\n\n与许多项目一样，Drupal 拥有保证编码风格清晰一致的编码标准。尽管在编写自己的代码时你可以自由发挥，但使用与其他 Drupal 模块开发者相同的编码风格，将更容易让你所有项目保持一致性，并提高可读性。\n\
  \n关于官方 Drupal 编码标准的更多信息，请访问 `drupal.org/coding-standards`。\n\n#### 发布你的作品\n\n无论你需要什么样的自定义功能，很可能总有其他人与你有类似的需求。如果你一直在保持代码的整洁和通用性，那么在\
  \ `drupal.org` 上发布你的代码是一个绝佳的主意。（这也不必非得是一个完整的、受支持的项目——许多人能够从你以沙盒项目形式分享的自定义代码中受益。）\n\
  \n所有 Drupal 模块均以 GPL 2 许可发布。如果你的开发工作是有偿的（无论是作为雇员还是承包商），请与你的联系人确认，确保他们对你将他们付费编写的代码公开没有异议。\n\
  \n除了为开源项目做贡献能积攒好口碑之外，公开发布代码还能为所有参与方带来诸多其他好处。让更多人使用你的模块，意味着代码会有更多人审查，很可能你的用户会贡献 bug\
  \ 报告和新功能。\n\n\n\n### 修补现有模块\n\n修改现有模块的代码通常被认为是一种不良实践。然而，当你正在改进模块本身时，这样做是合理的——只要将改进内容回馈给维护者，以便他们能在未来版本中包含这些改进。请注意，此类更改应始终在开发环境（而非生产服务器）中进行，并且应使用版本控制系统，以确保在必要时可以回滚更改。\n\
  \n大多数情况下，你将修复原始模块的漏洞或添加新功能。尽管具体细节可能有所不同，但以下是基本步骤：\n\n- 查看模块的问题队列，看看是否有人报告过类似问题并最终解决了。\n\
  - 如果漏洞尚未报告，请撰写一个 issue，描述问题及其复现方法。\n- 如果新功能尚未被请求，请撰写一个 issue，描述新功能及其必要性。\n- 如果有任何建议的解决方案，请尝试一下，并报告它们是否有效。\n\
  - 如果没有建议的解决方案，或者建议的解决方案无效，请尝试自己解决问题。\n- 务必更新你所发现的内容。即使是一次不成功的尝试，也可能提供有用的信息。\n- 一旦有了有效的解决方案，可以将其保留在代码库中。请确保保存对该\
  \ issue 的引用以及补丁的副本，以备日后需要重新应用。\n\n### 发布新模块\n\n最后，在某些情况下，你创建的新功能不属于现有模块，而是需要一个独立的模块。在\
  \ `drupal.org` 上获取模块维护者账户的步骤超出了本章的范围，但你可以在 `drupal.org/node/7765` 找到更多相关信息（并参见第\
  \ 37 章，了解如何使用 Git 在 `drupal.org` 上维护项目）。\n\n在发布代码之前，请务必检查以下几点：\n\n- 代码整洁、文档完善，并遵循\
  \ Drupal 的编码标准。\n- 所提供的功能对其他人有用。\n- 没有现有模块具有相同用途。如果有，请尝试与该模块的维护者合作。重复的模块会给最终用户造成混淆。\n\
  - 代码没有你所知道的安全漏洞。\n\n### 总结\n\n随着每个新版本的发布，Drupal 的 API 使得无需破解现有模块就能实现更多功能。从 Drupal\
  \ 7 开始，绝不应再需要破解模块。正确使用 API 编写自己的胶水代码，不仅能避免给自己带来问题，还能让你成为一名更优秀的 Drupal 开发者。\n\n保持代码整洁有助于你更好地利用\
  \ Drupal 周围的开发社区，而在遇到漏洞和新功能时贡献修复和代码，可能是你做出贡献并成为社区活跃成员的最简单方式。\n\n![images](img/square.jpg)\
  \ **提示** 请关注 `dgd7.org/glue`，获取本章的链接、更多资源以及读者提示。\n\n"
- "# 使用 Simpletest 进行功能测试简介\n\n作者：Albert Albala\n\nDrupal 7 的发布标志着一个转折点，尤其是在自动化测试方面，因为它允许核心和贡献模块开发者验证其代码是否按预期工作。由于内容管理系统最初是为更简单的网站设计的，自动化测试的相对复杂性传统上使其优先级较低。然而，在最近的版本中，特别是版本\
  \ 7，Drupal 已远不止是一个简单的内容管理系统。它是一个*平台*，一个利用异常处理、面向对象编程以及自动化测试等现代概念的复杂应用程序。\n\nDrupal\
  \ 现在支持两种类型的自动化测试：\n\n- *单元测试*验证代码单元（尤其是函数）。例如，单元测试可以向 `square_root()` 函数输入值 9，并确认其返回\
  \ 3。\n- *功能测试*验证涉及真实用户的特定用例是否产生预期结果。Drupal 核心节点模块测试（`modules/node/node.test`）中的一个实际示例验证了具有“创建页面内容”权限的用户可以转到添加内容\
  \ ![images](img/U001.jpg) 基本页面并成功创建页面。\n\n本章将专门聚焦于功能测试，这是 Drupal 中迄今为止最广泛使用且最适应\
  \ Drupal 编写方式的测试。Drupal 社区以其 Simpletest 测试框架基于同名的 PHP 库构建，尽管 Drupal 中的 Simpletest\
  \ 并不需要该库（对于 Drupal 6，请参见 `drupal.org/simpletest`）。事实上，Simpletest 现已紧密集成到 Drupal\
  \ 核心开发工作流中，所有新的核心代码几乎都必须通过功能测试验证。\n\n本章将向你展示如何利用 Simpletest 在自己的模块和补丁中进行功能测试（有关开发模块的更多信息，请参见第\
  \ 18 章）。将功能测试视为*验证模块是否确实按预期与真实用户交互*。例如，假设你想开发一个简单的模块，如果超过 25 个用户在过去一个月内至少发布了一个节点，则显示文本“超过\
  \ 25 名活跃用户！”。\n\n如果没有自动化功能测试，你会编写模块，然后通过创建 25 个用户并为每个用户发布一篇文章来进行测试。只有这样，你才能确定“超过\
  \ 25 名活跃用户！”文本确实在应该出现时出现。Simpletest 允许你在功能测试中定义这些步骤，以便它们可以在一个全新的临时 Drupal 站点中自动重复模拟任意次数——你无法直接操作该站点，只能通过测试文件中的代码进行操作（稍后你将看到）。\n\
  \n实际上，你将在本章后面创建这个确切的模块和功能测试。但首先，让我们快速概览一些关键的 Simpletest 概念。然后你将学习如何在 Drupal 7 中设置\
  \ Simpletest 工作环境。（别担心，其实没那么复杂。）\n\n\n\n### 使用 Simpletest 的优势（及注意事项）\n\n你的第一个问题很可能是：将\
  \ Simpletest 整合到工作流程中是否会增加开发时间。如果你考虑的是项目整个生命周期内的开发时间（而你确实应该这样考虑！），在大多数情况下你会发现使用\
  \ Simpletest 实际上能节省时间。是的，在项目初期，你会花更多时间来定义测试。但真正的回报出现在项目生命周期的后期。原因如下：\n\n*   *自动化测试允许你通过在全新的临时\
  \ Drupal 安装环境中运行特定用例来验证代码是否按预期工作。* 这使你能够尽早发现问题（希望在网站用户发现之前），并消除对代码的假设。\n*   *测试是模块文档的重要组成部分。*\
  \ 当你查看本章后面的示例测试或 Drupal 核心自带的测试（参见 `modules/node/node.test`）时，你会发现测试*讲述了一个故事*，从用户的角度说明了模块的实际功能。这将为未来的程序员（包括你自己）节省宝贵的理解模块最初意图的时间。\n\
  *   *自动化测试有助于避免回归。* 一旦某个功能通过测试验证，后续再破坏它就变得更困难。如果你实施的 Bug 修复引入了*回归*（破坏了之前正常工作的功能），当你对新代码运行测试时，问题就会立刻引起你的注意。你将花费更少的时间来修正错误和维护代码。\n\
  \n但请记住，测试就像任何其他代码一样，容易出现 Bug 并且需要维护。要警惕你编写的测试中的逻辑错误，尤其是那些本应失败却通过的测试。\n\n### 何时使用\
  \ Simpletest\n\n最初使用 Simpletest 非常耗时。虽然理想情况下所有代码都应经过功能测试验证，但你很快会发现 Simpletest 在以下场景中能带来最高回报：\n\
  \n*   在广泛使用的模块上，这些模块更容易出现 Bug。\n*   在你预期会长期进行积极开发的模块上。\n*   在对你网站至关重要的模块上。\n*  \
  \ 在需要多个步骤来测试某个预期用例的模块上。\n\n为了获得最有效的测试，不要局限于正常的工作流程。务必也要测试当用户尝试执行不被允许的操作时会发生什么（例如，一个测试可以验证匿名用户无法创建内容）。别忘了：测试的质量完全取决于你如何编写。\n\
  \n### 什么是测试驱动开发（TDD）？\n\n测试驱动开发将自动化测试推向了合乎逻辑的下一步。在 TDD 项目中：\n\n*   你模块的当前版本不应包含任何失败的测试（因此也不应包含任何不成熟的功能）。\n\
  *   测试应与你的代码并行（甚至*先于*代码）定义。这让你在编码时能够专注于满足测试的要求。\n*   在纯 TDD 模型中，你模块的当前版本甚至不应包含任何未经测试验证的功能。\n\
  \n你越是将这些概念应用于你的代码，Bug 就越难潜入。以下是针对特定任务的基本 TDD 工作流程：\n\n*   添加一个会失败的测试，证明你的 Bug 存在或你的功能尚未实现。\n\
  *   修改模块（包括其测试），直到测试通过。\n*   一旦你的测试通过，并且你已验证了修改有效，那么工作就完成了。\n\n当然，通过测试并不能保证你的代码质量高！你的测试和模块代码仍然需要认真编写。\n\
  \n### Simpletest 的工作原理\n\n在 Drupal 中，任何定义了用户界面的模块都可以（并且应该！）定义一个或多个功能测试。然后，你可以在任何启用了\
  \ Simpletest 的 Drupal 站点上运行这些测试（参见“设置与运行测试”部分）。但在大多数情况下，测试只会在你的开发站点上运行；一旦你的模块稳定下来，它们将在生产站点上存在，但测试会被忽略。\n\
  \n这些测试定义在哪里？Drupal 模块是至少包含两个文件的文件夹：`mymodule.info` 和 `mymodule.module`。（有关开发模块的更多信息，请参见第\
  \ 18 章。）测试定义在另一个文件 `mymodule.test` 中。例如，你的测试文件可能位于 `sites/all/modules/mymodule/mymodule.test`。\n\
  \n![images](img/square.jpg) **注意** 在 Drupal 7 中，包含类的文件必须在 `.info` 文件中显式引用。因此，除了创建\
  \ `.test` 文件外，你还需要在 `.info` 文件中添加一行：`files[] = mymodule.test`。\n\n稍后你将在“.test 文件剖析”部分更详细地了解具体细节；你还可以在\
  \ `dgd7.org/167` 以及本书的页面 [`www.apress.com`](http://www.apress.com) 上找到本章的所有代码。基本上，每个测试定义了模块应该*在一个全新的\
  \ Drupal 安装环境（而非你当前的站点）*中执行的特定操作。如果某个测试依赖于某些已存在的内容或用户，这些应在测试本身中创建（你将在本章后面看到如何操作）。\n\
  \n一旦测试存在，你就可以通过 Simpletest 模块运行它（参见“设置与运行测试”部分）。即使运行一个基本的测试也可能需要几分钟时间（你甚至可能认为站点卡住了；其实没有）。这是因为\
  \ Simpletest 会为每个测试创建一个全新的临时 Drupal 站点，然后在测试完成后将其删除。\n\n![images](img/square.jpg)\
  \ **注意** 重要的是要理解，每个测试在运行时，会完全忽略你当前站点数据库中的任何内容或其他测试中的数据。这是为了避免测试被外部数据“污染”。尽管目前正在努力实现在现有站点的克隆（而非全新安装）上运行测试（参见\
  \ `drupal.org/node/666956` 和 `drupal.org/project/simpletest_clone`），但这种功能目前尚未准备就绪。\n\
  \n对于每个测试，Simpletest 会通过安装所有数据库表来创建一个新站点；在每个测试结束时，这些表会被丢弃。Simpletest 使用的数据库与你启用了\
  \ Simpletest 模块的开发 Drupal 站点使用的数据库相同，具有相同的用户名和密码；为了避免命名冲突，每个临时表都会使用一个随机的唯一前缀创建。\n\
  \n![images](img/square.jpg) **注意** 我不建议在安装你的开发站点（即你启用 Simpletest 的那个站点）时使用表前缀。但是如果必须使用，请保持前缀简短。Simpletest\
  \ 会在每个临时表名前添加自己的前缀再加上你的前缀，如果表名变得过长，将会导致错误。表名的最大长度因系统而异，但我曾在使用超过六个字符的前缀时遇到问题。如果可以的话，完全避免使用前缀。\n\
  \n\n\n### 设置与运行测试\n\n在 Drupal 7 之前，用户需要下载并安装 `Simpletest` 模块，然后在执行测试前对核心进行修补。而在\
  \ Drupal 7 中，`Simpletest` 已成为 Drupal 核心的正式成员，因此你只需在任意 Drupal 7 网站上启用它，即可开始测试，无需对服务器进行任何繁琐配置。\n\
  \n由于你将测试的是*模块*而非*网站*，且运行测试会消耗大量处理器资源，因此不应在生产环境的网站上运行测试。最好建立一个专用的 Drupal 站点（例如在你的笔记本电脑上），专门用于开发和测试。你将在此开发模块、启用\
  \ `Simpletest` 并运行测试。用于测试的临时 Drupal 站点会与这个开发站点使用同一个数据库。请勿在生产站点上启用 `Simpletest`。\n\
  \n![images](img/square.jpg) **注意** 虽然 `Simpletest` 模块的机器名为 `simpletest`，但其人类可读名称是\
  \ Testing。因此，如果你通过 `admin/modules` 的网页界面启用该模块（参见图 23–1），请寻找 Testing 而非 Simpletest。如果你是通过命令行使用\
  \ `Drush` 启用模块（参见第 26 章），请使用 `drush en simpletest`。\n\n![images](img/2301.jpg)\n\
  \n***图 23–1.** 启用 Testing 模块*\n\n让我们从运行一个 Drupal 核心自带的测试开始：核心博客模块中包含的功能测试。安装一个新的\
  \ Drupal 7 站点，启用 Testing 模块，然后进入配置 ![images](img/U001.jpg) 开发 ![images](img/U001.jpg)\
  \ Testing 页面。在这里，你会看到所有拥有关联自动化测试的模块（即使它们未处于激活状态）（参见图 23–1）。勾选博客复选框，然后点击运行测试按钮。\n\
  \n运行博客测试需要几分钟时间（你的网站并未冻结，请耐心等待），因为它会在一个虚拟浏览器中安装一个全新的 Drupal 网站、创建一些用户和内容，并确保一切按预期运行。当你盯着进度条时，所有这些操作都在后台完成。\n\
  \n如果你展开结果页面中的结果区域，会看到大约 250 个绿色显示的测试以及若干条*详细信息*。点击任意一条详细信息，可以看到临时测试网站在测试特定阶段时的快照。这不是截图，而是测试机器人在特定时间点看到的实际\
  \ HTML 代码。当你的模块中出现测试失败时，这将是一个无价的工具——你可以精确地看到在何时出了什么问题。\n\n![images](img/square.jpg)\
  \ **注意** 在配置 ![images](img/U001.jpg) 开发 ![images](img/U001.jpg) Testing ![images](img/U001.jpg)\
  \ 设置（`admin/config/development/testing/settings`）的 `Simpletest` 设置页面中，“运行测试时提供详细信息”选项在\
  \ Drupal 7 中默认应为开启状态。如果你正在开发一个测试并反复运行它，并且期望 HTML 快照有所差异，由于这些详细快照的存储方式，你的浏览器可能会显示缓存的版本。如果看到过时的快照，只需刷新浏览器即可。\n\
  \n### `.test` 文件的结构分析\n\n审视现有的 `.test` 文件（例如 `modules/node/node.test`）可能会很快让人不知所措——它们使用的函数和面向对象结构可能对某些\
  \ Drupal 开发者来说不太熟悉，且看起来非常复杂。为了让你对 `.test` 文件的结构有个基本概念，清单 23–1 提供了其最基本的骨架。测试代码应放入一个具有\
  \ `.test` 扩展名的特殊文件中，该文件应放置在模块目录内，与 `.module` 和 `.info` 文件同级。然后，你需要在 `.info` 文件中添加一行引用你的\
  \ `.test` 文件（参见本章前面的“`Simpletest` 工作原理”部分）。\n\n***清单 23–1.** `.test` 文件的结构*\n\n\
  ```\n<?php\n/**\n * @file\n * 在此描述你的文件。\n */\n\n/**\n * 以下类是一个测试用例。测试用例拥有名称和描述，\n\
  \ * 并且会显示在 Simpletest 用户界面中。它们可以包含任意数量的测试，\n * 这些测试共享相同的设置过程。\n * 当你通过 Simpletest\
  \ 运行一个测试用例时，该用例中的每个测试\n * 都会执行以下步骤：创建一个新的临时 Drupal 站点，\n * 运行通用的设置代码，运行测试本身，然后销毁临时\
  \ Drupal 站点。\n * 一个 .test 文件中可以包含多个测试用例类。\n */\n\nclass MyModuleTestCase extends\
  \ DrupalWebTestCase {\n\n  /**\n   * 此测试用例的信息。\n   */\n  public static function\
  \ getInfo() {\n    return array(\n      'name' => '测试用例的一行描述',\n      'description'\
  \ => t('测试用例的更长描述。'),\n      'group' => 'mymodule',\n    );\n  }\n\n  /*\n    测试用例内所有测试的通用设置。\n\
  \  */\n  public function setUp() {\n    // 使用默认核心模块、mymodule 及其依赖项设置新站点。\n    parent::setUp('mymodule');\n\
  \    // 创建一个具有所需权限的新用户；然后登录。\n    $admin = $this->drupalCreateUser(array('权限一',\
  \ '权限二'));\n    $this->drupalLogin($admin);\n  }\n\n  /*\n    测试——通过函数名以 'test'\
  \ 开头来识别。\n    对于每个测试，Simpletest 会创建一个全新的 Drupal 安装，\n    运行通用的 setUp() 函数，然后执行此代码。\n\
  \  */\n  public function testMainTest() {\n    // 你的测试代码写在这里。注意此时\n    // setUp()\
  \ 已经运行过，因此如果在 setUp() 函数中\n    // 你已作为特定用户登录，则当前仍处于登录状态。\n  }\n}\n```\n\n如果你熟悉面向对象编程，会注意到你刚刚定义了一个新类，其中包含了测试用例的信息。一个测试文件可以包含任意数量的测试用例类，而每个测试用例类又可以包含任意数量的测试。测试用例中的每个测试函数*必须以小写的\
  \ \"test\" 开头*。这是 `Simpletest` 将其识别为实际测试的依据。\n\n例如，如果你的测试文件包含三个测试用例，每个用例有三个测试函数，那么将创建并销毁九个新的临时\
  \ Drupal 站点。如果你在多个模块上运行多个测试用例，那么在结果出来之前，你甚至有时间去慢跑一圈。\n\n\n\n#### 编写你的第一个测试\n\n运行现有的测试固然不错，但真正的乐趣在于编写和运行你自己的测试。\n\
  \n你首先要编写一个模块，该模块在一个自定义区块中显示“超过 25 名活跃用户！”。然后，你将编写一个测试来确保它能正常工作。该区块应仅当在上个月有超过 25\
  \ 名用户至少创作了一个节点时才渲染。\n\n如果你希望这段代码能直接运行，请将你的模块命名为`mymodule`。（关于编写自定义模块，请参见第 18 章。）首先，在你的\
  \ Drupal 7 站点中，在`sites/all/modules`下创建目录`mymodule`。将代码清单 23-2 中的代码放在新文件`sites/all/modules/mymodule/mymodule.module`中（请注意，你可以在配套网站`dgd7.org/167`以及本书的页面[`www.apress.com`](http://www.apress.com)上找到这段代码）。\n\
  \n***代码清单 23-2.** `mymodule.module`*\n\n```\n<?php\n/**\n * @file\n * 本文件定义了一个区块，如果过去\
  \ 30 天内有超过 25 名用户创建了文章，\n * 则显示 t('Over 25 active users!')。\n */\n\n/**\n * 实现 hook_block_info()。\n\
  \ */\nfunction mymodule_block_info() {\n  $blocks[0]['info'] = t('Number of users');\n\
  \  return $blocks;\n}\n\n/**\n * 实现 hook_block_view()。\n */\nfunction mymodule_block_view($delta\
  \ = '') {\n  if ($delta == 0 && mymodule_active_users() >= 25) {\n    $block['subject']\
  \ = t('Number of users');\n    $block['content'] = t('Over 25 active users!');\n\
  \    return $block;\n  }\n}\n\n/**\n * mymodule_active_users()。\n * 返回活跃用户的数量，活跃用户定义为在过去\
  \ 30 天内发布过节点的用户。\n * @return\n *   活跃用户的数量（见上文）。\n */\nfunction mymodule_active_users()\
  \ {\n\n  return db_query('SELECT COUNT(DISTINCT uid) FROM {node} WHERE\n  :time\
  \ - created < :threshold', array(\n    ':time' => REQUEST_TIME,\n    ':threshold'\
  \ => variable_get('mymodule_threshold', 60*60*24*30),\n    ))\n    ->fetchField();}\n\
  ```\n\n基本上，你定义了一个区块，仅当函数`mymodule_active_users()`返回 25 或更多时，它才显示“Over 25 active\
  \ users!”。函数`mymodule_active_users()`统计有多少用户作为节点作者，这些节点创建时间在一个月以内。\n\n如果没有 Simpletest\
  \ 来测试这个模块，你将不得不创建 25 个用户并为每个用户创建一篇帖子，这相当麻烦。而这正是编写功能测试的绝佳时机！创建测试文件`sites/all/modules/mymodule/mymodule.test`，并将代码清单\
  \ 23-3 中的代码填入其中，这就是你的测试代码。\n\n***代码清单 23-3.** `mymodule.test`*\n\n```\n<?php\n/**\n\
  \ * @file\n * 本文件包含了对 mymodule 功能的测试，\n * mymodule 是一个旨在演示 Simpletest 的测试模块。\n */\n\
  \n/**\n * 该类对应一组测试（称为一个测试用例）。\n * 复杂的模块会有多个这样的测试用例。在同一测试用例中，\n * 所有测试都会执行相同的初始设置。\n\
  \ */\n\nclass MyModuleTestCase extends DrupalWebTestCase {\n\n  /**\n   * 此测试用例的信息。\n\
  \   */\n  public static function getInfo() {\n    return array(\n      'name' =>\
  \ 'mymodule 功能',\n      'description' => t('测试 mymodule 的功能'),\n      'group' =>\
  \ 'mymodule',\n    );\n  }\n\n  /*\n   测试用例内所有测试的共同初始设置。\n  */\n  public function\
  \ setUp() {\n    // 使用默认核心模块、mymodule 及其依赖项建立一个新站点。\n    parent::setUp('mymodule');\n\
  \    // 创建一个具有所需权限的新用户，然后登录。\n    $admin = $this->drupalCreateUser(array('administer\
  \ blocks', 'create blog\n      content', 'administer nodes'));\n    $this->drupalLogin($admin);\n\
  \n    // 进入区块管理页面，将你的区块区域设置为 sidebar_first，\n    // 以确保运行时 Simpletest 能看到它。因为涉及填写表单，所以使用了\n\
  \    // drupalPost()。参见《Drupal 7 权威指南》（dgd7.org）\n    // 第 23 章中的“Simpletest 与表单”部分。\n\
  \    $this->drupalPost('admin/structure/block', array('blocks[mymodule_0]\n    \
  \  [region]' => 'sidebar_first'), t('Save blocks'));\n  }\n\n  /*\n   测试——因其以 'test'\
  \ 开头而可被识别。对于每个测试，\n   Simpletest 都会创建一个全新的 Drupal 安装，运行公共的 setUp() 函数，\n   然后执行这段代码。\n\
  \  */\n  public function testMainTest() {\n    // 注意此时 setUp() 函数已执行完毕。\n    $this->assertNoText(t('Over\
  \ 25 active users!'), t('确保区块尚未可见，因为尚未创建任何内容。'));\n\n    // 创建 25 个用户，并为每个用户创建一篇博客文章。\n\
  \    for ($i = 0; $i < 25; $i++) {\n      // 每个用户都有创建博客文章的权限。\n      $user = $this->drupalCreateUser(array('create\
  \ blog content'));\n\n      // 注意我们仍然以主（管理员）用户身份登录（参见 setUp() 部分）。\n      // 我们将访问博客创建页面，设置一个随机标题，并确保作者名称\n\
  \      // 设置为我们刚刚创建的用户的名称，然后点击保存。\n      $this->drupalPost('node/add/blog', array('title'\
  \ =>\n        $this->randomName(32), 'name' => $user->name), t('Save'));\n    }\n\
  \n    $this->assertText(t('Over 25 active users!'), t('确保区块现已可见，因为我们刚刚创建了 25 个用户并为每个用户创建了一篇博客文章。'));\n\
  \  }\n}\n```\n\n最后，创建文件`sites/all/modules/mymodule/mymodule.info`，如代码清单 23-4 所示。\n\
  \n***代码清单 23-4.** `mymodule.info`*\n\n```\nname = My Module\ndescription = Displays\
  \ t('over 25 active users') if 25 users or more have posted at least one\nnode in\
  \ the last month. This module was created to demo simpletest as part of the book\n\
  definitivedrupal.org.\ndependencies[] = blog\nfiles[] = mymodule.test\n\ncore =\
  \ 7.x\n```\n\n\n\n### 运行你的第一个测试\n\n恭喜，你已经成功构建了第一个测试！现在就来运行它吧。在你的 Drupal 7 站点上，启用\
  \ `Simpletest`。在 配置 → 开发 → 测试（参见 图 23–2）的测试列表中，你应该能看到你模块的测试用例（如果看不到，请清空缓存），然后就可以运行你的测试了！\n\
  \n> **注意：** 如果 `Simpletest` 已经启用，而你正在添加新的测试，你可能不会在这个列表中看到它们。在这种情况下，你或许需要访问 系统 →\
  \ 性能 并点击 **清空所有缓存** 来清理缓存。\n\n![图 23–2. 配置 → 开发 → 测试 下的可用测试列表](img/2302.jpg)\n\n\
  在测试结果页面（参见 图 23–3），你可以点击查看详细消息，这些消息会展示 `Simpletest` 在创建 25 个用户、为每个用户发布一篇博客文章，并确认（断言）文本“超过\
  \ 25 名活跃用户！”确实出现在临时 Drupal 站点上时，所存储的一张张快照。\n\n这里面涉及了很多内容。如果你回头查看 代码清单 23–3 中的代码，你会发现你的测试中包含了许多断言，例如\
  \ `assertText()`，它用于确保某些文本出现在当前页面上（参见“Simpletest API 与延伸阅读”部分），以及像 `drupalPost()`\
  \ 这样的操作，用于填写表单（参见“Simpletest 与表单”部分），但这里并没有 189 个断言！那么，为什么这里会有 189 项检查呢？对于你编写的每个函数调用，`Simpletest`\
  \ 都会运行许多后台步骤和检查；每项检查都会记录在测试结果页面上。\n\n现在，为了更真实地感受 `Simpletest`，尝试制造一个错误：在你的 `.module`\
  \ 文件（而不是 `.test` 文件）中，将所有 `25` 实例替换为 `50`，然后重新运行测试。注意观察结果页面如何让你精准定位到失败之处。\n\n> **练习：**\
  \ 细心的读者可能已经注意到“超过 25 名活跃用户！”模块中有一个小异常：当用户数量恰好为 25 时，该区块也会显示。要修复此问题，请修改你的测试，断言当用户数为\
  \ 25 时文本不出现，而当用户数为 26 时文本出现。然后，修正模块代码本身，直到你的新测试通过。这就是实践中的测试驱动开发！\n\n![图 23–3. 测试结果页面上的详细消息](img/2303.jpg)\n\
  \n### Simpletest 与表单\n\n代码清单 23–3 中的测试需要填写不少表单，以验证模块的功能。例如，如果你希望 `Simpletest` “看到”一个区块的内容，你需要在测试或\
  \ `setUp()` 函数中，将你的区块分配到一个区域，否则在运行时，`Simpletest` 将无法看到它。\n\n在 `Simpletest` 中将区块分配到某个区域，涉及模拟人类用户的操作。请记住，`Simpletest`\
  \ 对你当前站点的配置一无所知。你需要转到区块配置页面并填写表单。在 `Simpletest` 中，使用 `drupalPost()` 函数来填写表单。在 代码清单\
  \ 23–3 中，你看到了下面这一行代码：\n\n```\n$this->drupalPost('admin/structure/block', array('blocks[mymodule_0][region]'\
  \ => 'sidebar_first'), t('Save blocks'));\n```\n\n这行代码模拟了访问区块配置页面，将模块的区域设置为左侧边栏，然后提交表单的过程。以下是决定在此函数中编写什么内容的步骤：\n\
  \n1.  首先，你需要导航到要在测试中包含的表单。在本例中，是 `http://example.com/#overlay=admin/structure/block`（将\
  \ `example.com` 替换为你实际的域名）。记下此 URL 中的 Drupal 路径；在本例中是 `admin/structure/block`。\n\
  2.  在表单上，对于每个你想修改的表单字段，使用诸如 Firefox 的 Firebug 等工具，在页面的 HTML 源代码中找出表单输入元素的 `name`\
  \ 属性值。就你的模块而言，你要寻找的 HTML 是 `<select name=\"blocks[mymodule_0][region]\" ...>`，因此该字段的名称是\
  \ `blocks[mymodule_0][region]`，如 图 23–4 所示。\n3.  然后，你需要找到该表单元素所需的值；在本例中是 `sidebar_first`（同样，参见\
  \ 图 23–4）。\n4.  最后，你需要将提交按钮的名称嵌入到 Drupal 的 `t()` 函数中；在本例中是 `t('Save blocks')`，如\
  \ 图 23–4 所示。\n\n![图 23–4. 确定表单字段的名称](img/2304.jpg)\n\n有了这些信息，你就可以构建一个函数调用，告诉 `Simpletest`\
  \ 转到区块页面，并将你的区块移动到 `sidebar_first` 区域，如下所示：\n\n```\n$this->drupalPost('admin/structure/block',\
  \ array('blocks[mymodule_0][region]' => 'sidebar_first'), t('Save blocks'));\n```\n\
  \n类似地，要在测试中创建一个节点，你需要模拟填写节点创建表单。以下是来自 代码清单 23–3 的另一行代码：\n\n```\n$this->drupalPost('node/add/blog',\
  \ array('title' => $this->randomName(32), 'name' => $user->name), t('Save'));\n\
  ```\n\n它访问博客节点创建页面，插入一个随机名称作为标题，将作者的 `name` 设置为指定的用户名，然后点击**保存**。为了更好地理解这行代码，在你的\
  \ Drupal 站点上，确保博客模块已启用，转到**添加内容** → **博客条目** (`node/add/blog`)，然后使用 Firefox 的 Firebug\
  \ 检查表单，看看代码操作了哪些字段（`'title'` 和 `'name'`）。\n\n\n\n### Simpletest API 与延伸阅读\n\n为了充分利用\
  \ Simpletest，复习面向对象的 PHP 技能会很有帮助（尽管并非必要）。你还需要熟悉 Simpletest 的 API，即测试中可用的函数。你可以在代码清单\
  \ 23–3 中看到 Simpletest 的一些函数；欢迎使用本章中的任何代码作为你项目的基础。\n\n下面列出了一些常用函数。因为你的测试编写在类中，所以每次调用前别忘了加上\
  \ `$this->`（如代码清单 23–3 所示）。\n\n*   `drupalGet('path')` 将 Simpletest 指向所提供的路径。\n\
  *   `drupalPost('path', array('input1' => 'value1', 'input2' => 'value2'), t('Button\
  \ Name'))` 将 Simpletest 指向所提供的路径，用提供的值填写表单，然后点击指定按钮（参见“Simpletest 与表单”一节）。\n*  \
  \ `assertText('text')` 确保当前页面上存在某些文本。\n*   `assertNoText('text')` 确保当前页面上*不*存在某些文本。\n\
  *   `assertRaw('html')` 确保当前页面的源代码中存在某些 HTML。\n*   `assertNoRaw('html')` 确保当前页面的源代码中*不*存在某些\
  \ HTML。\n*   `$user = drupalCreateUser(array('permission 1', 'permission 2'))` 创建一个具有指定权限的用户对象。\n\
  *   `drupalLogin($user)` 使用通过 `drupalCreateUser()` 创建的 `user` 对象登录。\n*   `randomName()`\
  \ 生成一个随机字符串，这对于创建临时节点和用户非常有用。\n*   `verbose($text)` 在测试输出中显示一些文本，有助于调试测试。\n\n更多\
  \ Simpletest 资源：\n\n*   完整的 Simpletest 函数列表可在 `api.drupal.org/DrupalWebTestCase`\
  \ 找到。\n*   查看 Drupal 核心模块的现有测试，了解测试的编写方式。在 Drupal 7 中，大多数核心模块都包含测试文件，例如 `modules/contact/contact.test`\
  \ 或 `modules/node/node.test`。\n*   查看 `modules/simpletest/drupal_web_test_case.php`，了解所有\
  \ Simpletest 函数的源代码。\n*   浏览 `drupal.org/simpletest` 上的 Simpletest 手册。\n*   安装并检查\
  \ `drupal.org/project/examples`，这是一个包含更多注释示例代码的模块。\n\n### 向 Drupal.org 提交补丁\n\n\
  你经常会（有时甚至一天几次！）在 Drupal 核心或贡献模块中发现错误，或者想到一个希望看到的有用新功能。由于 Drupal 是开源软件，你可以（并且应该）通过问题（参见第\
  \ 38 章）在 `drupal.org` 上贡献你的想法，在那里你可以描述问题，如果你有相关技术能力，还可以提交补丁。\n\n补丁是使用 Simpletest\
  \ 的绝佳场合。因为你的补丁改变了模块的工作方式，自动化测试可以很好地展示你的代码实际做了什么。如本章引言所述，如果你正在修补核心，包含一个功能测试几乎是必须的。\n\
  \n与其简单地修复错误或添加功能然后向 `drupal.org` 提交补丁，为什么不将测试驱动开发整合到你的工作流程中呢？以下是具体步骤：\n\n1.  首先，如果你要修补的模块中还没有\
  \ `.test` 文件，请先添加一个。\n2.  添加一个会失败的测试。\n3.  修改代码（以及测试），直到测试通过。\n4.  创建你的补丁。\n5. \
  \ 将其提交至 `drupal.org` 上项目的问题队列。\n\n### 总结\n\n现在，你应该已经掌握了所有工具，可以为你的模块和补丁添加测试了。开始在关键任务和广泛使用的模块中，针对难以测试的用例使用测试。需要记住的一些关键点：\n\
  \n*   从设计上看，**Drupal 更倾向于使用功能测试而非单元测试**。这是由于 Drupal 的编写方式决定的，它主要作为一个面向最终用户体验的内容管理系统。\n\
  *   功能测试**测试用户界面以及你的网站与虚构人类用户之间的交互**。\n*   测试的目的是**验证模块，而非网站**。运行每个测试时，你网站上的所有内容（以及其它测试中的内容）都会被忽略，从而将测试与外部污染隔离开来。需要用户、节点或其它任何东西来运行测试吗？你必须在测试本身中定义它们。\n\
  *   你编写的每个功能测试（包含在 `test...()` 函数中）将创建一个**全新的、隔离的、临时的、功能完整的 Drupal 网站**用于运行；一旦测试结束，这个临时网站将被销毁。你永远无法直接访问这些临时网站；所有操作都必须通过测试文件中的代码来完成。\n\
  *   确保在 Simpletest 的设置页面（`admin/config/development/testing/settings`）上勾选了“运行测试时提供详细输出信息”，以便你能够准确定位问题出在哪里（问题总会出现的！）。\n\
  *   自动化测试现已**紧密集成到 Drupal 核心开发的工作流程中**，并正在用于贡献模块。\n\n![images](img/square.jpg) **提示**\
  \ 请登录 `dgd7.org/test` 查看更多笔记和资源。\n\n## 第 24 章\n\n![images](img/squ.jpg)\n\n\n\n"
- "# 编写一个主要模块\n\n作者：Benjamin Melançon\n\n> *“你需要我，我也需要你 / 没有了彼此，人们什么都做不了。”*\n\n——艾瑞莎·弗兰克林（《思考》）\n\
  \n“模块”的字典定义是“多个不同但又相互关联的部分之一，可用于构建更复杂的结构。”这恰好描述了如何用 Drupal 构建复杂的网站：一个模块接一个模块。（你以为\
  \ Drupal 中有哪个东西的命名是明智的吗？）\n\n模块，就其定义而言，从来不会独立存在，而是与其他模块共同构成一个运行的整体。Drupal 的模块化特性使得分别编写和维护的项目能够扩展\
  \ Drupal 的功能。\n\n![images](img/square.jpg) **注意** 模块从来不会独立存在这一事实，根据 Drupal 协会法律顾问的解释，具有法律含义。Drupal\
  \ 是根据 GNU 通用公共许可证（GPL）授权的自由软件。因为 Drupal 模块在定义上属于衍生作品，我们制作和分发的任何模块都必须允许他人查看、复制和修改（即修改他们自己的副本！）。为自己或单个客户构建的模块不被视为已分发，但值得注意的是，这种共享与协作的精神——以及其带来的各种实际益处——是有法律框架支持的。\n\
  \n在本章使用的术语中，基础模块是指扩展 Drupal 的模块，而主要模块则是指本身旨在被扩展的模块。主要模块是模块化的（准备被修改或扩展），是 Drupal\
  \ 模块化特性的一种映射。按照这个定义，LoginToboggan (`drupal.org/project/logintoboggan`) 是一个基础模块，因为它改变了\
  \ Drupal 的工作方式；而 Advanced help (`drupal.org/project/advanced_help`) 是一个主要模块，因为它为其他模块提供了接入点。对于后一类模块，更常见的术语是\
  \ API 模块，但在本章中，这个术语特指纯 API 模块。\n\n一个主要模块拥有供其他模块使用的 API。回想一下，API 代表应用程序编程接口。它是代码之间进行沟通的方式（当它们遵循规范并通过官方渠道时）。钩子的调用和实现（例如第\
  \ 19 章中描述的那些），加上我们模块可用的实用函数，共同构成了 Drupal 的 API。\n\n我们将在本章开始构建的模块将允许其他模块扩展它，就像它扩展\
  \ Drupal 7 一样。该模块名为 Form messages，其目标是实现表单元素的即时内联验证。（最初命名为 AJAX form messages，但在开发过程中发现仅使用\
  \ AJAX 调用并非最佳方案，因此重新命名。）它将修改表单，使其能够显示由 API 和配套用户界面提供的内联通知和错误信息。其他模块将能够使用 Form messages\
  \ API 来提供错误消息和内联验证例程。因此，这个模块将同时拥有输入和输出的 API：利用 Drupal 的 API 在 Drupal 基础上构建（与每个模块一样），并定义自己的\
  \ API 以便其他模块在此基础上构建。我们不会在本章中完成这个模块，甚至不会接近完成（尽管相关工作和文档将在 `dgd7.org/strategy` 上继续）。相反，我们将为一个主要模块奠定基础。\n\
  \n本章有两个主要目标：\n\n*   介绍一种模块开发策略（以及大量技巧），帮助你为构建任何提供 API 的模块做好准备。\n*   涵盖 Drupal 7\
  \ 开发中核心的一些概念：实体和字段。\n\n### 如何不构建模块\n\n这一节并非一个最坏情况下的模块制作灾难故事（尽管负面例子非常有趣且富有启发性——关于一个跨越四个\
  \ Drupal 版本却依然适用的经典讽刺文章，请参阅 Nick Lewis 的《通往 Drupal 地狱之路》，`drupal.org/node/77487`）。不，本节的前提比那更简单：最好的模块是你无需构建的那个。\n\
  \n当你着手构建一个模块时，你需要尽职尽责地搜索是否有现成的模块能满足你的需求。你需要确保自己没有重复他人的工作。如果在搜索了 `drupal.org` 和万维网之后，你还没有找到能实现你目标的现有模块，那么请访问\
  \ `groups.drupal.org`（Drupalistas 常简称为 g.d.o）并加入“贡献模块创意”小组，`groups.drupal.org/contributed-module-ideas`。在这里你可以发布讨论（地址为\
  \ `groups.drupal.org/node/add/story?gids[]=5445`）——顺便提一句，你可以从这个 URL 看出，g.d.o 上讨论的机器名称是\
  \ story，而贡献模块创意小组的节点 ID 是 5445。如果你没有设置通知，请记得经常回来看你的帖子！也可以去 IRC 上询问，包括在 `#drupal-contribute`\
  \ 频道，了解你所针对的问题领域存在哪些模块。\n\n![images](img/square.jpg) **提示** 如果你发现类似的项目已经开发完成或正在进行中，请尽可能与其他开发者合作。模块重复不仅浪费你作为开发者的时间，还会让用户和贡献者更难选择使用什么或把精力投入何处。更多信息请参见\
  \ `drupal.org/node/23789`。\n\n针对 Form Messages 模块，我搜索了 *Drupal AJAX form messages*、*drupal\
  \ AJAX form validation* 和 *drupal inline form validation* 以及其他变体，都没有找到类似的模块或项目。我在贡献模块创意小组中发布了该模块的目标，并交叉发布到了表单\
  \ API 和可用性小组（参见 `groups.drupal.org/node/113564` 上的帖子）。\n\n最后一次尝试是在 `#drupal-contribute`\
  \ 中提问：“在 Drupal 中，对于填写表单时提供即时内联反馈方面，已经完成了哪些工作（如果有的话）？（理想情况包括节点表单上的字段组合。）”你当然可以提出比这更好的问题，但请记住一条经验法则：任何可以用“是”或“否”来回答的问题都不是你能提出的最佳问题。（更多\
  \ IRC 技巧和礼仪，请参见第 9 章）。在 IRC 上提问就像在黑暗中开枪——即使有人知道答案，他们也必须在线、看到问题，并且处于足够清醒的精神状态来构思回答。对于一个足够重大到可以成为一个主要模块，却还没有人着手研究的话题，这种提问更像是大海捞针。但这并不意味着它不值得去做。\n\
  \n仅仅是提问这个行为——即使没有人加入你一起集思广益——也能帮助你更好地理解自己试图做什么。你甚至可能开始回答自己的问题。在提问的过程中我想到，Drupal\
  \ 核心中有一个地方可以在你填写表单时提供即时反馈：密码强度指示器。有一个核心模型可以遵循，这是非常好的事情。\n\n之后，在构建模块的过程中，请向那些表示过兴趣的人（或任何可能感兴趣的人）报告你的进展。你的项目页面和问题队列是公开陈述计划、跟踪实现目标功能的进度以及与他人协作的好地方。关于后一点，不要指望在你有用的东西很久以前就有人参与。关于如何在\
  \ `drupal.org` 上设置沙盒项目，请参见第 37 章。\n\n\n\n### 了解 Drupal 提供的工具\n\n在任何项目中，充分掌握你所能使用的工具，都会让你拥有更好的开端（并最终取得更好的成果）。第\
  \ 21 章介绍了 Drupal 中一些常用的 API，实际上还有更多。\n\n> *“如果你试图用‘虫眼视角’（与鸟瞰视角相对）来摸索 Drupal，可能会浪费掉一整个漫长周末。”*\
  \  \n> ——杰夫·伊顿\n\n第 34 章将提供这种“虫眼视角”的一部分。你可以通过设置调试器，观察 Drupal 在执行不同操作时如何一步步遍历其代码，来继续深入探索。\n\
  \n了解 Drupal 提供的能力，有助于判断你是否正试图让 Drupal 做它并不擅长的事情。这是任何项目的第一步：评估潜在工具。就像使用 Drupal 做事有多种方法一样，不使用\
  \ Drupal 也有很多途径。当然，如果涉及内容、用户、权限、在网站上展示内容等诸多方面，你可能确实需要 Drupal。\n\nDrupal 的核心本质是一个\
  \ API 集合。Drupal 架构师杰夫·伊顿强调的并非 Drupal 提供钩子的模块，而是首先关注那些驻留在 `includes` 目录中的所有实用功能。Drupal\
  \ 的 `include` 文件定义了用于处理以下事务的函数：\n\n- 菜单（路由）\n- 数据库抽象层\n- 会话管理\n- 缓存\n- 文件存储与流包装器\n\
  - 本地化与语言\n- 主题（渲染）\n- 表单与表单处理\n- 日期处理\n- 图片处理\n- 分页与表格排序\n- 批处理\n- 令牌\n- 电子邮件\n\
  - 实体\n- 模块系统\n- XMLRPC\n- AJAX\n- Unicode 及其他通用工具\n- 更新\n- ……等等\n\n没有人能自动记住所有这些辅助库（顺便说一句，`includes/graph.inc`\
  \ 提供了一个函数，用于对有向无环图进行深度优先搜索），更不用说全部掌握它们的用法了。但它们是我们的基础工具箱，在我们开始启用或下载模块之前就始终存在。当然，Drupal\
  \ 的核心模块提供了额外的关键功能，例如用户处理和输入过滤。贡献模块可以提供自己的实用函数和 API，有些模块甚至*仅仅*是为其他模块提供工具。`CTools`\
  \ 和 `VotingAPI` 就是纯粹的 API 模块。\n\n### 你的模块应该提供 API 吗？\n\n通常来说，你制作的任何模块都应该为那些可能想要与你的模块协作或在其基础上构建的模块提供一个\
  \ API。同时，一个设计良好的 API 通常很难做到；随着其他模块尝试使用它，往往需要对其进行修订或扩展。\n\n如果你的模块很简单，并且已充分使用了 Drupal\
  \ 的 API，那么它就不需要创建自己的 API。然而，如果你的模块为设置创建了独立的用户界面，那么它至少应该始终为这些设置提供一个配套的 API。\n\n####\
  \ 保持 API 与 UI 分离\n\n模块中通过提交表单（用户界面）完成的任何操作，也应该能够通过一行代码实现。事实上，处理表单的提交函数应始终使用 API\
  \ 函数来保存更改。\n\n如果在提交函数中直接进行数据库查询，那你就做错了。在表单提交函数中，你绝不应看到 `db_insert()`、`db_update()`、`db_delete()`、任何\
  \ `db_` 开头的函数，或者 `drupal_write_record()`。这意味着，保存、更改或删除表单所影响的信息只能通过用户界面完成——或者通过重新创建这些函数、伪造表单提交来实现。这会使其他模块更难、更丑陋地与你的模块所提供的服务和信息进行交互。（在表单验证中修改数据库则更糟糕。）相反，表单提交函数应将表单的数据传递给一个\
  \ API 函数，该函数与表单提交流程清晰解耦。（遗憾的是，Drupal 核心在这方面尚未形成一致的模型。）\n\n保持 API 与 UI 分离的终极体现，是将用户界面放在项目中一个独立的模块中，该模块可以关闭。Drupal\
  \ 核心的字段模块由字段 UI 模块作为补充，后者可以禁用。视图模块同样也有一个可以禁用的视图 UI 模块。\n\n#### 使用 API 隐藏复杂性\n\n\
  其他模块基于你的模块构建的好处在于，该模块的作者无需考虑你的模块所做的所有事情。对于那些其全部意义就在于提供通用功能的模块（即 API 模块）来说，这一点尤为突出。杰夫·伊顿在\
  \ DrupalCon DC 大会上讲述了 `VotingAPI` 模块（`drupal.org/project/votingapi`）的故事。当时他正在开发自己早期的较大型网站之一，需要投票功能。他找到了一些很酷的投票模块，但它们之间无法协同工作。“于是，我选了那个拥有最漂亮\
  \ Flash 组件的模块，然后毫不客气地掏空了它的内核，”他说。\n\n`VotingAPI` 就此诞生，它包含两个用于获取和设置投票的函数。在询问其他维护投票模块的人“能否毫无理由地让我的模块成为你的依赖项？”之后，有一个人接受了他的提议。他立刻不得不增加了三个函数，以满足该模块更精细的需求。\n\
  \n“我们第一次总是会搞错，”伊顿说道。第二次也是，第三次也是。经验法则是，API 需要至少经过三个实现案例（即它们被用于完成特定任务的场景）的测试，你才能期望它们具有通用性。\n\
  \n当你的 API 能够处理三种不同的用例时，它很可能已经隐藏了大量的复杂性。\n\n![images](img/square.jpg) **提示** 雇佣型模块开发——受雇开发模块——可以非常有趣，尤其是与好的客户合作时，因为需求已经为你明确和规划好了。即使需求再好，一个模块（如同一个网站）也会在构建和根据实际需求测试的过程中不断演变。当你试图开发一个对许多人都有用的模块时，请将客户的规范视为*众多*用例之一——并且不要指望你的所有开发时间都能得到报酬。制作一个通用的模块总是比一次性开发更费力，但从长远来看，你、你的客户以及社区都能从中受益。\n\
  \n### 让你的模块更模块化\n\n为其核心功能提供 API 是让其他模块可扩展你的模块的最重要方式，但并非唯一方式。\n\n如同任何大型模块一样，让“表单消息”模块模块化有很多种方法。几乎所有方法的共同思路，就是将功能分离成封装好的片段，使你的模块在内部与其自身的\
  \ API 协同工作。当你代码的某些部分通过通道与代码的其他部分通信时，这些相同的通道也同样适用于其他模块中的代码。\n\n\n\n#### 释放模块中钩子的力量\n\
  \n正如你的模块会使用 Drupal 提供的钩子来改变其行为（例如使用`hook_menu()`在某个 URL 显示页面或执行操作），也很可能使用其他贡献模块提供的钩子（例如使用`hook_views_default()`提供默认视图），你的模块也可以提供钩子供其他模块实现。\n\
  \n表单消息（Form Messages）的主要 API 将是为模块提供定义消息的能力。这可能表现为定义机制，让模块能够以`hook_default_views()`允许模块提供默认视图的相同方式，来提供默认消息。表单消息的这个基础钩子将在本章的在线配套资源`dgd7.org/strategy`中介绍。需要注意，在定义钩子时，你应该在随模块一同提供的`modulename.api.php`文件中记录每个钩子的示例实现。\n\
  \n除了定义完整的钩子，还有更轻量级的方式让其他模块接入你的模块。每当你的模块收集数据数组时，都可以给其他模块操作这些数据的机会。最简单的方式就是使用令人愉悦的`drupal_alter()`函数。通常，模块会先定义自己的钩子让其他模块提供信息，然后使用`drupal_alter()`创建一个修改钩子，在所有数据收集完成后允许其他模块进行修改。\n\
  \n![images](img/square.jpg) **注意** 在现有模块中添加一行`drupal_alter()`语句的补丁，通常是让你在其他人的模块中实现所需功能的最简单方式。添加一个满足他人需求且得到模块维护者认可的重大功能可能遥不可及，但说服维护者提交一个让你能基于自己模块功能进行构建的改动，则应该更容易实现。\n\
  \n当然，我们也有极具说服力的、彻底自私的理由来开放模块，允许大众参与干预。精心放置的钩子调用能让其他人替我们完成艰苦的工作。我们的模块越是以这种方式构建，就越能像\
  \ Jeff Eaton 那样（停顿一下，扶正他想象中的领带）说：“解决那个问题不是我的事；我只维护 API。”\n\n在构建纯 API 模块时，专注于维护 API\
  \ 并使其能够应对众多使用场景——但不在你的模块中解决它们——这一点尤为重要。Jeff Eaton 在结束他的 API 模块演讲时敦促我们：“保持专注——把一件事真正做好。Drupal\
  \ 正朝着协同工作的方向发展；关键在于让它们协同得非常好。”这就是著名的 Unix 哲学。Unix 管道发明者、Unix 传统奠基人之一 Doug McIlroy\
  \ 这样总结：“编写只做一件事且做到极致的程序。编写能协同工作的程序。”\n\n![images](img/square.jpg) **提示** 在项目初期，尽早开始与你所在领域正在开展工作的其他人交流。\n\
  \n#### 渐进增强：在启用时利用其他模块\n\n如果你的模块目的是扩展另一个模块，或需要调用其函数，你就必须将其列为依赖项。但大多数情况下，你的模块可以被其他模块增强，或者你的模块可以通过提供更多选择或功能来增强其他模块。例如，如果你的模块以任何方式存储数据，你可能希望将这些数据暴露给\
  \ Views 模块（通常通过使用 Drupal 的 Field API 即可免费获得此功能）。\n\n尽可能让这些模块依赖成为可选。你不希望强迫用户除了安装你的模块外还要安装半打模块。相反，检查你要使用的特定函数是否存在，如果不存在则优雅降级。在此语境下，优雅降级意味着你的模块会失去一些额外功能，但不会崩溃，并且能继续提供基础功能。你的目标应当是把模块构建成具有条件性增强，而非依赖关系。\n\
  \n许多优秀的模块都设计为能够利用其他模块提供的功能。这最好被理解为渐进增强而非优雅降级，因为缺失的功能没有变通方案，只是在启用支持模块时简单地增加功能。\n\n\
  例如，Drupal 核心的菜单模块与区块模块集成，但并不要求依赖它。在`hook_help()`的实现中（该函数将当前页面的路径作为参数来执行相应操作），包含以下代码：\n\
  \n```\n  if ($path == 'admin/structure/menu' && module_exists('block')) {\n    return\
  \ '<p>' . t('每个菜单都有一个对应的区块，可在<a href=\"@blocks\">区块管理页面</a>上进行管理。', array('@blocks'\
  \ => url('admin/structure/block'))) . '</p>';\n  }\n```\n\n关键部分是`module_exists('block')`。只要区块模块启用，菜单模块就会将其每个菜单作为区块提供。只要帮助模块启用，你就能在菜单管理页面顶部看到这一提示。这两个利用其他模块的例子都是渐进增强的体现。\n\
  \n![images](img/square.jpg) **注意** 为什么有人不启用帮助模块？为什么有人不启用区块模块？模块作者无权评判站点构建者的选择。就区块模块而言，事实上它还没有（完全）达到某些\
  \ Drupal 站点所要求的强大和灵活程度。有些开发者转而使用面板模块（其自身包含调用区块的代码），其他人则使用上下文模块。面板模块和上下文模块都体现了 Drupal\
  \ 的模块化特性——允许替换核心功能——并提醒我们，若非绝对必要，永远不要让我们的模块依赖另一个模块。\n\n使用 Drupal 的钩子系统是一个模块对另一个模块正在执行的操作做出反应的最简单方式。\n\
  \n你可以提供默认视图并将数据暴露给 Views 模块。你可以为 PathAuto 和动态文本区域提供令牌，也可以提供 Drush 命令。你可以通过实现`hook_help()`（另一个由模块提供、但任何模块都不必实现的钩子）来提供基本的\
  \ Drupal 核心帮助。你还可以通过调用高级帮助模块的钩子来提供高级帮助文档页面；这些页面仅当高级帮助模块启用时才会被使用。\n\n\n\n### 测试环境入门\n\
  \n启动一个主要模块时，为其搭建一个全新的测试环境是必要的。获取一份 Drupal 副本，以你正在开发的项目命名安装目录，并通过命令行进行安装。更多关于 Drush\
  \ 的内容（正是它让这一切变得简单），请参阅第 2 章和第 26 章。以下是使用 `drush site-install`（`si`）命令创建测试站点的命令行步骤，并以我们正在开发的模块命名该站点。\n\
  \n![images](img/square.jpg) **注意** 关于命名——这是开始编写模块时首先要做的事情之一。模块名称，就目录和代码而言，必须仅包含小写字母、数字和下划线，并且必须以字母开头。建议名称具有描述性而非简短，如果是名词，则使用单数形式（以便与类和数据库表的推荐命名实践兼容）。我将模块命名为\
  \ `formmsgs`，同时违反了这两条建议，实属惭愧。不过，我并不为在模块名称中避免使用下划线而道歉；这是基于我对命名空间冲突的担忧（将模块命名为 `form_messages`\
  \ 并实现 `hook_help()` 意味着，如果存在一个名为 `form` 的模块实现了潜在的 `hook_messages_help()`，则会因函数名重复而导致致命错误）。\n\
  \n```\ncd ~/workspace\ncd formmsgs\ndrush dl drupal --drupal-project-rename=formmsgs\n\
  drush si --db-url=mysql://root:rootpass@localhost/formmsgs\n```\n\n默认情况下，`drush\
  \ site-install` 将使用标准安装配置文件，并赋予超级用户（用户 ID 1）用户名 `admin` 和密码 `admin`。\n\n![images](img/square.jpg)\
  \ **提示** 你可以进一步自动化这些步骤。关于自动化创建测试站点及其 Drupal 安装的示例，请参见 `dgd7.org/sh`。\n\n接下来，为新模块创建一个目录；对于测试站点来说，`sites/default`\
  \ 目录下即可。（如果 `sites/default` 中尚不存在 `modules` 目录，则 `-p` 标志会告诉 `mkdir` 先创建它，再创建 `formmsgs`\
  \ 目录。）同时，立即为模块启动一个 Git 仓库，如下所示：\n\n```\nmkdir -p sites/default/modules/formmsgs\n\
  cd sites/default/modules/formmsgs\ngit init\n```\n\n在添加和编辑文件时，通过使用 `git add .`（用于添加新文件和已修改文件，句点表示添加所有可用的内容）和\
  \ `git commit` 命令，让 Git 记录你的所有更改。\n\n#### 借用一些代码来起步\n\n我通过从 Unique fields 模块借用代码来开始我的\
  \ `.info` 文件，因为我预计会与该模块紧密合作（或者至少从中学习很多），所以我可以同时进行学习和借鉴。\n\n```\ndrush dl unique_field\n\
  cp ../../../all/modules/unique_field/unique_field.info formmsgs.info\ngvim formmsgs.info\n\
  ```\n\n修改其中的内容。Info 文件很简单，不会有太多重复内容。但从模板开始是很好的做法，如果这个模板恰好也是你感兴趣的模块，那就更棒了。复制整个 `.module`\
  \ 文件不是一个好主意，但查看示例甚至复制其中的部分内容则可以很好地工作。\n\n```\nname = AJAX form messages\ndescription\
  \ = \"[formmsgs] Provides immediate, in-form validation.\"\ncore = 7.x\n```\n\n\
  ![images](img/square.jpg) **注意** 在描述中包含模块机器名是一个惯例（即使只有我偏爱这样做），这有助于用户在模块管理页面上搜索到该模块。\n\
  \n#### 在 Drupal.org 的沙盒中分享你的代码\n\n我目前只有一个 `.info` 文件，但养成尽早且频繁地提交和分享的习惯是非常好的（参见清单\
  \ 24–1）。分享项目的命令在第 38 章中讨论，并在你通过 `drupal.org/node/add/project-project` 创建项目后提供给你。\n\
  \n***清单 24–1.** 开始在你的 Drupal.org 上分享代码*\n\n```\ngit add .\ngit commit -m \"Initial\
  \ commit for AJAX form messages module; the .info file.\"\ngit remote add origin\
  \ mlncn@git.drupal.org:sandbox/mlncn/910490.git\ngit push origin master\ngit checkout\
  \ -b 7.x-1.x\ngit push origin 7.x-1.x\n```\n\n清单 24–1 中针对你项目定制的步骤，可以在你项目的 Git 说明选项卡中找到。对于\
  \ Form Messages 模块，这是 `drupal.org/node/910490/git-instructions`，你的完整项目或沙盒项目的说明可以在相同的路径下找到（将\
  \ `910490` 替换为你项目的节点 ID）。\n\n![images](img/square.jpg) **提示** 幸运的是，分享是双向的。关于代码的最佳实践，请参考核心模块以及被广泛开发和使用的模块，例如\
  \ Views、Token、Administration Menu、Date、Webform、Devel、Voting API 等（包括本书中涉及的其他模块，如第\
  \ 25 章中的 Commerce 和第 31 章中的 Apache Solr）。然而要知道，随着你学到更多知识，你可能需要走自己的路并进行重大的修改。关于这一点，也请前往\
  \ `dgd7.org/strategy` 订阅 Form Messages 模块代码和方法的更新。\n\n### 规划你的方法\n\n我一直说我会提供一个 API，但这意味着什么？这意味着更多——在某些情况下，它意味着不同的事情——而不仅仅是简单地在另一个模块中拥有用户界面。将某物视为\
  \ API 的一种方式是：你的模块什么也不做。它仅仅是存在。Form Messages 的 API 将完全基于其他模块告诉它要做的事情，来处理与表单的交互。\n\
  \n这意味着我必须将显示消息所需的内容提炼为其基本组成部分。你不能假设你的模块有任何方法可以自行知道何时或以何种方式应该做某事。\n\n那么，以下是 Form\
  \ Messages 模块必须向与之配合的模块提出的一些问题。为你自己的模块提出这些问题，将告诉你 API 模块必须存储和处理哪些数据，以及它如何与这些其他模块交互——简而言之，它需要什么样的\
  \ API。\n\n-  表单上的什么元素会触发消息评估？\n-  什么决定消息是否会被显示，以及它需要哪些信息？\n-  消息说了什么？\n-  触发器在表单提交时（正常验证）运行，还是仅用于内联\
  \ AJAX 验证？\n\n概述你的应用程序必须知道什么，对于定义它需要哪些 API 函数（以及它必须存储的数据，在“定义你的数据模型”部分中讨论）至关重要。然而，回答这类问题也有助于你弄清楚应用程序必须做什么，并且在规划\
  \ API 的每个细节之前，先让某些东西工作起来绝对是值得的。\n\n#### 概述一个 API\n\nAJAX Form Messages 的核心想要表达的是：“我在一个表单上。当每个元素发生事情时，你想让我做什么？”\n\
  \nAPI 的核心必须是一个钩子或其他方式，供模块（包括通过 UI 模块的用户）注册关于消息的所有信息。（出于性能考虑，这可能不应在加载表单时进行。）我将深入探讨必须注册哪些信息的细节，并扩展“定义你的数据模型”部分中提出的问题。\n\
  \n一旦处理好了存储和获取这些信息，并且创建了模块修改这些信息的方式，基本 API 就完成了。甚至另一个模块也可以访问这些信息，并取代 AJAX Form Messages\
  \ 与表单交互的实现。\n\nAPI 的其他方面可能包括一种让模块影响输出默认值（例如消息放置的位置）的方式，但大多数其他潜在的 API 功能将是关于可以定义的消息信息以及使这些信息可修改的辅助功能。\n\
  \n\n\n### 深入实践\n\n如果你觉得自己的问题开始进入理论范畴，那么就该动手编写能产生实际结果的代码了——*即使你明知未来会为此引入 API*。过早抽象出\
  \ API 可能适得其反。不过，正如前文所述，*首先*提出 API 需要回答的那类问题，确实能帮助你立刻写出更好的代码，即便你在第一版迭代中跳过了某些 API\
  \ 的实现。\n\n以 AJAX 表单消息为例，你需要将所有信息集中存储在一个中心位置，而不是每次显示表单时都去轮询所有模块。但处理这个问题会妨碍你理解触发器与消息本身的工作机制。而通过聚焦\
  \ API 所揭示的问题与答案，已经为你提供了大量可供尝试的思路与方向。\n\n例如，触发错误或其他消息的必须是一个类似于验证函数的功能。理想情况下，你可以复用验证函数来判断是否应显示错误消息。然而，验证函数通常接收整个表单，而我这里讨论的是\
  \ AJAX 请求——它可能在同一个表单上多次触发，且必须保证速度。效率至关重要。那么，需要向评估函数发送哪些信息呢？\n\n最简便的方式当然是传递整个表单，但或许可以让它既能接收一个表单（可以只包含你关心的部分，但依然能被任何常规且不过度严格的验证函数处理），也能接收单个具体元素。经过研究，日期验证函数\
  \ `date_validate()`（参见 `api.drupal.org/date_validate`）显然期望接收一个表单元素，而非整个表单（尽管其参数名为“`$form`”）。\n\
  \n![images](img/square.jpg) **注意** 通过选择使用 FormAPI，我们已经确保自己不会仅局限于节点（内容）表单——至少在最基础的\
  \ API 层面不会如此。\n\n### 研究表单元素\n\nAJAX 表单消息将在用户输入时监听表单元素，然后向这些表单元素发回消息。它将提供一个结构，用于存储一个函数，该函数用于检查用户输入内容并决定返回何种消息。这意味着它需要一种可靠的方法来在表单内部及跨表单时识别这些元素——因此你必须仔细研究表单的结构以及构成表单的元素。这种方法已在第\
  \ 19 章中使用过，当时通过实现表单钩子来查看网站表单的结构。\n\n```\n/**\n * 实现 hook_form_alter()。\n */\nfunction\
  \ formmsgs_form_alter(&$form, &$form_state, $form_id) {\n  debug($form, $form_id,\
  \ TRUE);\n}\n```\n\n将表单 ID 作为 `debug()` 的第二个参数，是一个巧妙的小技巧，可以精确显示你正在处理的是哪个表单。第三个参数\
  \ `TRUE` 是一个值得养成的良好习惯，这样 `debug()` 会使用一种不那么美观但更健壮（更不容易崩溃）的函数来打印输出。\n\n![images](img/square.jpg)\
  \ **陷阱** 如果你的 `debug()` 语句什么也没打印，请检查管理界面中的日志和错误设置：管理 ![Image](img/U001.jpg) 配置 ![Image](img/U001.jpg)\
  \ 开发 ![Image](img/U001.jpg) 日志和错误（`admin/config/development/logging`）。要通过添加 `$conf['error_level']\
  \ = 2;` 到本地的 `settings.php` 文件来始终显示此类消息。通过在 `settings.php` 中添加四行代码来显示所有错误，具体方法如本书前文及\
  \ `dgd7.org/err` 所述。\n\n**代码清单 24–2.** 从 `node/add/article` 页面打印表单变量的示例\n\n```\n\
  \  'title' =>\n  array (\n    '#type' => 'textfield',\n    '#title' => '标题',\n \
  \   '#required' => true,\n    '#default_value' => NULL,\n    '#maxlength' => 255,\n\
  \    '#weight' => -5,\n  ),\n```\n\n所有表单元素均由一个数组定义。代码清单 24–2 中的标题元素是 `$form` 数组的直接子元素，但它也可能嵌套在一个组中。其名称\
  \ 'title' 是所示数组的键。它的位置（嵌套层级）和名称（'title'）共同构成了该表单上的唯一标识，但在另一个表单上可能被用于完全不同的元素。因此，你用来定位表单元素的工具并不精确。\n\
  \n表单元素的位置有些混乱。（甚至连“表单元素位置”这个说法都很别扭。）你必须决定：要么尝试找到即使已被移动到字段集分组内的表单元素，要么要求实现表单消息钩子的代码精确指出表单元素在表单数组中的位置。更便捷地找到无论被移动到何处的表单元素的方法是通过\
  \ `form_set_error()`（`api.drupal.org/form_set_error`），但它比 `form_error()`（`api.drupal.org/form_error`）更慢。至少为了简化起步，你将要求提供完整的位置信息。\n\
  \n不过你有点操之过急了。在弄清楚如何存储表单元素标识之前，你应该先确保能用一个测试用的表单元素来完成你需要做的事情。\n\n![images](img/square.jpg)\
  \ **注意** 研究用户编辑页面中密码强度检查所使用的 JavaScript，你会发现它根本没有使用 AJAX，而是直接在 JavaScript 中完成整个密码强度检查。这暗示了你的\
  \ API 可能具备另一种灵活性：你可以不亲自处理 JavaScript，而是允许模块定义自定义的 JavaScript。因此，它们可能根本不提供一个通过 AJAX\
  \ 调用的函数。（我是通过实现 `hook_form_alter()` 查看表单结构，发现 `'pass'` 表单元素被定义为 `#type 'password_confirm'`，然后搜索\
  \ `'password_confirm'` 找到用户密码 JavaScript 的。`password_confirm` 表单类型由 `includes/form.inc`\
  \ 中的函数 `form_process_password_confirm()` 展开，该函数会分别向第一个和第二个密码字段添加类 `'password-field'`\
  \ 和 `'password-confirm'`。搜索这两个类中的任意一个，我便找到了 JavaScript 文件 `modules/user/user.js`。或许有更直接的查找方法，但永远不要畏惧探索！）\n\
  \n\n\n### 概念验证\n\n现在来证明你可以创建一个表单元素，当用户在元素中输入内容时，根据 Drupal 中的函数显示一条消息。但让我们稍稍提高一点难度；来尝试运行一个验证函数。\n\
  \nDrupal 如何将验证函数分配给特定表单元素的方式，在 `api.drupal.org/api/drupal/developer--topics--forms_api_reference.html/7#element_validate`（这个超长的网址已链接自\
  \ `dgd7.org/strategy`）上的表单 API 文档中有所描述。这会是一个完美的锚点，用于通过通用的 `hook_form_alter()` 实现为元素添加\
  \ AJAX 回调。\n\n在 Drupal 核心模块中搜索 `'element_validate'`（例如在 Drupal 根目录下的命令行中运行 `grep\
  \ -nHR 'element_validate' modules/`）会找到一个值得尝试的示例。在 `modules/image/image.admin.inc`\
  \ 文件的第 77 行，`element_validate` 属性被设置为使用 `image_style_name_validate()` 函数。\n\n访问用于添加图片样式的管理页面（`admin/config/media/image-styles/add`），并在你的\
  \ `hook_form_alter()` 实现中加入 `debug($form, $form_id);`，你可以看到这个元素（即这个内联验证候选对象）的结构。\n\
  \n```\n  'name' =>\n  array (\n    '#type' => 'textfield',\n    '#size' => '64',\n\
  \    '#title' => '样式名称',\n    '#default_value' => '',\n    '#description' => '名称用于生成图片的\
  \ URL。请仅使用小写\n字母数字字符、下划线 (_) 和短横线 (-)。',\n    '#element_validate' =>\n    array\
  \ (\n      0 => 'image_style_name_validate',\n    ),\n    '#required' => true,\n\
  \  ),\n```\n\n编写一个名为 AJAX 表单消息的模块时，离不开大量的异步 JavaScript，但本章仅涵盖基础知识。关于 JavaScript\
  \ 的更多内容，请参见关于 jQuery 的 第 17 章，以及本章的在线后续内容（`dgd7.org/strategy`），对我而言这个后续内容的学习曲线肯定会非常陡峭。\n\
  \n![images](img/square.jpg) **提示** 如果你的模块编写了一组可以被视为一个软件包的 JavaScript 和/或 CSS 文件，请通过实现\
  \ `hook_library()` 将其作为库提供给其他模块，并通过使用 `#attached['library']` 或 `drupal_add_library()`\
  \ 将其包含到你自己的页面中。更多信息请参见 `api.drupal.org/hook_library` 和 `drupal.org/node/756722`。\n\
  \n直接借鉴开发者示例项目（`drupal.org/project/examples`）中优秀的 AJAX 模块，你可以使用 `hook_form_alter()`\
  \ 为 `'name'` 表单元素添加一个 AJAX 回调。Drupal 表单 API 文档中关于 AJAX 的示例似乎都没有将表单文本字段中的文本输入作为触发事件，但文档确实链接到了\
  \ `api.jquery.com/category/events`，那里有多个选项，其中包括 `keyup()`。\n\n```\n/**\n * 实现 hook_form_alter()。\n\
  \ */\nfunction formmsgs_form_alter(&$form, &$form_state, $form_id) {\n  if ($form_id\
  \ == 'image_style_add_form') {\n    $form['name']['#ajax'] = array(\n      'callback'\
  \ => 'formmsgs_image_style_name',\n      'event' => 'keyup',\n      'wrapper' =>\
  \ 'formmsgs-image-style-name',\n    );\n    $form['name']['#suffix'] = '<div id=\"\
  formmsgs-image-style-name\">默认消息。</div>';\n  }\n}\n```\n\n请记住，这完全是概念验证，并且硬编码到了特定的表单和元素，与我们计划构建的\
  \ API 相去甚远。它允许你测试你的 AJAX 回调是否确实被调用，而无需担心失败可能出在其他地方。\n\n```\n/**\n * 测试回调函数。\n */\n\
  function formmsgs_image_style_name() {\n  return '瞬间变化。';\n}\n```\n\n成功了！当你在名称表单字段中开始输入任何内容时，表单下方的“默认消息。”文本会变为“瞬间变化。”。\n\
  \n![images](img/square.jpg) **注意** 当返回一个直接的字符串并使用默认的 'replace' 方法时，与 'wrapper' 指令匹配的整个占位符元素都会被替换。这包括，例如，你匹配的那个包含\
  \ ID 的 div。这意味着，除非你的返回文本再次包含该包装元素和 ID，否则 AJAX 将无法再次找到它并替换或更改任何内容。接下来使用的 AJAX 命令参考自示例项目（`drupal.org/project/examples`），并在\
  \ `api.drupal.org/api/group/ajax_commands/7` 中有文档说明，它提供了更强大的功能。\n\n你可以独立地检查可以处理哪些信息。下面是同一个回调函数，但这次包含了传递给它的两个变量：表单数组和表单状态数组：\n\
  \n```\nfunction formmsgs_image_style_name($form, $form_state) {\n  die(var_export($form,TRUE));\n\
  }\n```\n\n通过这种方式，你可以看到通过 AJAX 传递给回调函数的变量。完整输出请参见 `dgd7.org/273`；其中最重要的是我们拥有了 name\
  \ 元素的当前值——也就是你刚刚输入的内容。\n\n```\nfunction formmsgs_image_style_name($form, $form_state)\
  \ {\n  image_style_name_validate($form['name']);\n  $message = form_get_error($form['name']);\n\
  \  if (!$message) {\n    $message = \"默认消息。\";\n  }\n  $commands = array();\n  $commands[]\
  \ = ajax_command_html('#formmsgs-image-style-name', $message);\n  return array('#type'\
  \ => 'ajax', '#commands' => $commands);\n}\n```\n\n这将文本“默认消息”替换为“样式名称中请仅使用小写字母数字字符、下划线\
  \ (_) 和短横线 (-)”，如图 24-1 所示。\n\n![images](img/2401.jpg)\n\n***图 24-1**. 通过 AJAX 在表单上立即显示图片样式名称的验证错误消息。*\n\
  \n这看起来令人印象深刻且相当简洁——运行验证函数，获取错误，并使用 AJAX `html` 命令返回它——但实际上它几乎无法正常工作。不过，作为使用普通验证函数的概念验证内联验证函数，它已经完成了任务。每次都会正确返回“请仅使用小写字母数字…”消息，或者什么都不返回。不幸的是，当用户正在输入时，它会导致文本区域失去焦点。此外，它传递了整个\
  \ `form` 和 `form_state` 变量，而没有将其限制在需要的部分，这对于每次按键验证来说开销太大了。实际上，很明显，像这样的允许字符的内联验证（与防止重名不同，后者需要检查数据库）应该仅使用\
  \ jQuery 来完成，而无需对 Drupal 进行 AJAX 调用。\n\n请记住，这只是一个概念验证。除了在输入时因为延迟而丢失的字符、不必要的进度提示器以及源自\
  \ Drupal 便捷的 `#ajax` 属性的其他问题（你可以使用 `#path` 属性代替 `#callback` 属性来获得更多控制权）之外，你还对 Drupal\
  \ 现有的验证函数和 `form_get_error()` 做了可能无法长期稳定工作的不恰当处理。但概念已经被证实了！你可以在解决性能和实现细节的同时，继续建立一个\
  \ API。\n\n\n\n### 定义你的数据模型\n\n为了让表单消息实现内联验证，它需要获取应显示的消息内容、触发显示的条件以及更多相关信息。这是 API\
  \ 的一部分，应被视为如此，但你也同时将其视为你想要存储的数据。常规的表单验证本身并不需要数据模型，但如果你打算允许人们通过用户界面来定义消息和模块，那么你就需要一个两者交汇的数据模型。\n\
  \n正是在这里，你需要深入探讨 AJAX 表单消息需要确切了解哪些信息，并全面细致地思考其需求。每条消息可应用于多个表单——例如，具有相同字段的节点表单，或者搜索块表单与主搜索表单。目前看来，让每个表单消息从一个单一表单元素的主视角出发是合理的，即使有多个字段与验证相关。\n\
  \n像这样逐一攻克问题后，你会得出一个初步的待存储数据列表。每条消息和评估规则的组合需要提供以下内容：\n\n*   一个或多个表单 ID，或一个用于匹配表单\
  \ ID 的模式。\n*   可选的进一步条件逻辑，用于决定是否应用评估和消息。（这通常是必需的，因为仅凭表单 ID 不够；例如，所有内容类型都使用相同的节点表单。）\n\
  *   触发器/接收器表单元素。这是用户输入或点击以触发消息的位置，同时也是接收消息——即消息应显示的位置。也许触发器/接收器也可以是多重值的，例如两个电话号码字段应该接收相同的验证和消息。\n\
  *   可选的相关表单元素。这允许内联验证考虑到其他表单字段中输入的值，例如要求在一个词汇表中的选择与另一个词汇表中的选择形成唯一组合。\n*   一个要执行的评估函数。它至少接收一个值：触发器/接收器中的值，以及一个包含其他表单元素值的数组（若指定了其他元素）。第三个参数也是可选的，即一个上下文数组，例如用于存储用户\
  \ ID。如果提供了上下文，它将是一个回调函数数组，用于创建一个带键值的数组。\n*   当评估函数返回一个命中结果（任何严格不等于`false`的值，`===\
  \ FALSE`）时显示的一条静态消息。\n*   一个消息回调函数——可选，用于替代上述字段中设置的消息，以便你可以随意设置消息内容，但 AJAX 表单消息\
  \ API 无需关心。此回调函数将接收评估函数的结果以及评估函数被提供的任何数据。\n*   这是一个允许表单提交的警告，还是一个将被添加到表单验证例程中的错误？（或者是一个已应用于表单验证例程的错误，这远比依赖一个名为“表单消息”的模块来为你做表单验证要好得多。）\n\
  *   一个可选的在默认状态下显示的消息。\n*   一个可选的为成功选择或输入提供的消息。\n\n其余的事情将由表单消息模块处理。嗯，一旦它被编码完成。\n\n\
  消息将始终在触发错误的表单元素处显示。除非触控板输入方式允许某些不合常规的三指操作，否则任何时候只有一个表单元素真正处于活动状态：即正在输入或选择值的那一个。可以将这视为简化代码的一种合理化解释，但用户界面应该只在你输入文本或进行选择的地方显示变化，而不是在表单的其他位置。\n\
  \n#### 如何存储数据以及如何在用户界面中编辑它\n\n> *“理论上，理论和实践是统一的。实际上，它们并非如此。”*\n>\n> ——尤吉·贝拉\n\n\
  数据的存储和在用户界面中的编辑应该是两个独立的问题。它们确实应该如此。定义数据模型。定义其存储方式。在没有用户界面的情况下使其正常工作。然后在此基础上构建用户界面。\n\
  \n但是，复用 Drupal 提供的工具这一实际问题会改变方法。将复杂的配置对象（比如上一节中概述的）视为带有字段的实体是有意义的。这在 Drupal 中存在争议。我个人非常喜欢最终拥有一个能够追踪谁在何时做了什么的管理界面——借助表单消息实体的修订功能，这很容易实现。\n\
  \n当你想要一个用户界面能够完美地与代码中捕获的相同信息协同工作时，你就需要配置是可导出的，这意味着如果使用实体，就需要以 CTools 风格使实体可导出。一方面，这听起来庞大而令人畏惧。另一方面，这正是\
  \ Drupal 发展的自然趋势，可能已经有其他疯狂的人在致力于做同样的事情。虽然不容易找到，但不知疲倦的 Wolfgang Ziegler (fago) 已经记录了他的\
  \ Entity API 模块，用于创建可导出的实体，其目的正是为了存储配置。这份文档位于 `drupal.org/node/1021526`。(不幸的是，那种导出实体的方法与\
  \ CTools 方法是分离的，两者尚未发展出集成的方法。)\n\n再次强调，使用实体存储配置是有争议的。接下来的章节也作为对实体的介绍，无论你将它们用于什么目的！请注意，我这里所说的导出并非指导出实体类型定义（这些本来就在代码中），而是指导出实体字段中存储的内容。这就是为什么这种方法存在争议；许多人认为字段中的数据永远是数据，而非配置。在创建可导出实体之前，有没有办法使用基于代码的表单消息定义？也许有，但这似乎需要在\
  \ Drupal 本身能提供存储机制的情况下，自己编码一个存储机制。\n\n理想情况下，它应该是一个 JSON 导出，因为 JSON 允许安全地复制粘贴以进行导入。允许人们粘贴\
  \ PHP 代码是无法保证安全的，并且 CTools 计划切换到 JSON。根据对使用 Entity API 的 Profile2 和 Message 模块的实践，它们确实会导出为\
  \ JSON。\n\n同样理想的是，如果永远不需要用户界面，该导出应仅存在于代码中。在这一点上，不幸的是，Entity API 总是自动导入到数据库中，而不是在运行时从代码中读取。但总体权衡之下，使用\
  \ Entity API 模块的可导出实体相当符合你的偏好。\n\n此外，你还能使用`entityFieldQuery()`，这是所有 Drupal 7 先行开发者都在热议的功能。显示实体应使用`EntityFieldQuery`\
  \ (`api.drupal.org/EntityFieldQuery`) 或 Views——避免创建你自己的查询和显示系统。请参阅 `dgd7.org/entities`\
  \ 查看示例。\n\n![images](img/square.jpg) **提示** 让你的模块可导出。与良好 API 密切相关的是让模块的配置**可导出**。目前，在\
  \ Drupal 中辅助配置导出主要有两种方法：对于实体，使用 Entity API；对于任何可以放入数据库表中的内容，使用 CTools。可导出性的首要规则是不依赖数字键，这两种解决方案都解决了这个问题。CTools\
  \ 更常见且测试更充分，其用法在 Views 和 Panels 等模块中通过示例有详尽的文档说明。\n\n### 提供一种新的实体类型\n\n尽管可导出实体并非得到所有\
  \ Drupal 开发者的普遍认可，但我们还是继续创建这样一个实体，因为它似乎非常适合我们的用例。\n\n虽然实体对 Drupal 7 来说是新的，但创建它们并非未知领域。整个节点系统现在都基于实体，评论、术语、词汇表、文件和用户也是如此。贡献模块可以并且确实定义了自己的实体类型，你的模块也可以。\n\
  \n\n\n#### 何时创建实体类型\n\n创建实体类型最普遍的原因是为了拥有自己的字段化实体。在创建新实体之前，应始终尝试使用字段扩展现有实体。但是，不要将节点用于非内容（non-content）的任何事情——这通常是创建自己实体的最佳时机。Commerce\
  \ 模块（参见第 25 章）将实体用于产品等，因为产品具有与内容不同的需求。就产品而言，它们尤其需要许多子类型，而将这些子类型用作内容类型最多只能算是一种滥用。\n\
  \n#### 如何创建实体类型\n\n实体类型通过实现 `hook_entity_info()` 来声明。请参阅（像往常一样）优秀的 Examples 项目（位于\
  \ `drupal.org/project/examples`）、`api.drupal.org/hook_entity_info`；并查阅在线教程和示例的最新列表，请访问\
  \ `dgd7.org/entities`。\n\n`AJAX Form Messages` 选择使用实体来存储配置（我是否提过这有争议？），部分原因是 Entity\
  \ API（`drupal.org/project/entity`）提供的导出能力，这是一个贡献模块，它为核心实体增加了许多功能。这意味着你的实体定义将与仅基于核心的实现略有不同，尤其是在你利用\
  \ Entity API 提供的能力时。你可以按照贡献的 Entity API 的在线文档来创建可导出的实体，地址为 `drupal.org/node/1021526`。\n\
  \n使用 Entity API 的第一步（如同依赖任何模块一样）是将其声明为依赖项——很容易忘记后面再做这件事，而当你的用户在尝试启用你的模块时，该模块破坏了他们的网站，他们可不会感谢你。\n\
  \n`name = AJAX 表单消息 API`\n`description = \"[formmsgs] 提供表单内即时验证要求的通知。\"`\n`package\
  \ = AJAX 表单消息`\n`core = 7.x`\n`dependencies[] = entity`\n\n在这个 `.info` 文件中，还有一些其他事项需要注意。因为主模块旨在成为一个\
  \ API 模块，并附带一个 UI 和几个可选的支持模块（可能还有更多单独贡献的模块），所以你需要在名称中包含 API，并为其指定一个包指令，这将使所有属于 \"\
  AJAX Form Messages\" 包（package）的模块在模块管理页面（`admin/modules`）上被分组在一起。\n\n在定义实体时，下一步可以在你的\
  \ `.install` 文件中进行。每个实体都需要一个数据库表来保存其基本信息。这包括一个整数序列 ID 列（或者字段，如列表 24-3 的模式定义中所称），这是任何实体所必需的；以及机器可读的名称列，这对于实体可导出至关重要。\n\
  \n**列表 24–3**。在表单消息模块的 `formmsgs.install` 文件中实现 `hook_schema()`\n\n```\n<?php\n\n\
  /**\n * @file\n * AJAX 表单消息的数据库模式、安装和卸载函数。\n *\n * 此处定义了实体基础表。\n */\n\n/**\n * 实现\
  \ hook_schema()。\n */\nfunction formmsgs_schema() {\n  $schema = array();\n  $schema['formmsgs']\
  \ = array(\n    'description' => '存储所有 formmsgs 实体的信息。',\n    'fields' => array(\n\
  \      'fmid' => array(\n        'type' => 'serial',\n        'not null' => TRUE,\n\
  \        'description' => '主键：唯一的表单消息 ID。',\n      ),\n      'name' => array(\n\
  \        'description' => '表单消息的机器可读名称。',\n        'type' => 'varchar',\n      \
  \  'length' => 32,\n        'not null' => TRUE,\n      ),\n      'label' => array(\n\
  \        'description' => '此表单消息的人类可读名称。',\n        'type' => 'varchar',\n     \
  \   'length' => 128,\n        'not null' => TRUE,\n        'default' => '',\n  \
  \    ),\n      'status' => array(\n        'description' => '指示表单消息是否激活的布尔值。',\n\
  \        'type' => 'int',\n        'size' => 'tiny',\n        'not null' => TRUE,\n\
  \        'default' => 1,\n      ),\n    ) + entity_exportable_schema_fields(),\n\
  \    'primary key' => array('fmid'),\n    'unique keys' => array(\n      'name'\
  \ => array('name'),\n    ),\n  );\n  return $schema;\n}\n```\n\n一个值得注意的小技巧是 `+ entity_exportable_schema_fields()`，它使用了\
  \ Entity API 模块提供的一个便捷函数，为实体的表添加了额外的几列。这些列（或字段）用于导出状态和提供模块的名称，Entity API 的导出功能需要它们，但这样可以省去你自己定义它们的麻烦。\n\
  \n\n\n```markdown\n创建新型实体的下一步是在你的模块中实现 `hook_entity_info()`。这一步相当公式化。关键要素是确定在 `hook_schema()`\
  \ 实现中定义的基础表（我们刚才在 `.install` 文件中完成了这一工作）。对于任何内容类实体，一个很好的参考模型是 `modules/node/node.module`\
  \ 中的 `node_entity_info()`，因此可以从该函数以及 `drupal.org/node/878804` 的 Entity API 文档中借鉴一些内容。Entity\
  \ API 特有的部分包括控制器类（将在后续讨论），以及将 `'exportable'` 属性设置为 `TRUE` 的能力。参见清单 24-4。\n\n**清单\
  \ 24-4**。在 `formmsgs.module` 中定义新的表单消息实体\n\n```\n<?php\n\n/**\n * @file\n * 提供表单内的即时验证需求。\n\
  \ */\n\n/**\n * 实现 hook_entity_info()。\n */\nfunction formmsgs_entity_info() {\n\
  \  $return = array(\n    'formmsgs' => array(\n      'label' => t('表单消息'),\n   \
  \   'controller class' => 'EntityAPIController',\n      'entity class' => 'Formmsgs',\n\
  \      'base table' => 'formmsgs',\n      'fieldable' => TRUE,\n      'exportable'\
  \ => TRUE,\n      'entity keys' => array(\n        'id' => 'fmid',\n        'name'\
  \ => 'name',\n        'label' => 'label',\n      ),\n      'access callback' =>\
  \ 'formmsgs_entity_access',\n      'module' => 'formmsgs',\n      'admin ui' =>\
  \ array(\n        'path' => 'admin/structure/formmsgs',\n        'file' => 'formmsgs.admin.inc',\n\
  \      ),\n      'bundle keys' => array(\n        'bundle' => 'name',\n      ),\n\
  \      'bundles' => array(\n        'formmsgs' => array(\n          'label' => t('消息'),\n\
  \        ),\n      ),\n      'view modes' => array(\n        'full' => array(\n\
  \          'label' => t('在表单上'),\n          'custom settings' => FALSE,\n      \
  \  ),\n      ),\n    ),\n  );\n  return $return;\n}\n```\n\n`'controller class'`\
  \ 为 `EntityAPIController`，它能让你的实体利用 Entity API 的功能。定义 `'entity class'` 是该过程所必需的。在上述代码中，实体类是\
  \ `Formmsgs`。这个类需要被定义，我们将在下一节进行。\n\n由于你希望使用 Field API 来收集和存储表单消息的数据，因此将 `'fieldable'`\
  \ 设置为 `TRUE`。这是核心实体的功能，与来自 Entity API 的 `'exportable'` 属性不同。\n\n`'base table'` 必须是\
  \ `hook_schema()` 中定义的表名。实体类型属性 `'label'` 仅为 `'表单消息'`（即如何称呼此类型实体），而在 `'entity keys'`\
  \ 属性中，`'label'` 指的是你的基础表中存储各个表单消息标签的列（也称为 label）。ID（`fmid`）和名称（`name`）列同样在 `'entity\
  \ keys'` 属性中进行匹配。\n\n实体键 `'name'` 是 Entity API 提供的另一特性；它允许表单消息通过机器名称进行导出。在跨部署或跨不同站点时，使用顺序数字\
  \ ID 进行导入和导出效果不佳。\n\n所有与包相关的属性都可以省略，因为 `formmsgs` 实体只有一个包，在没有特别指定的情况下，Drupal 会自动以实体自身名称命名该包。我们有机会定义单个包及其标签，且与这里的所有代码一样，遵循核心、贡献模块和\
  \ `drupal.org` 文档中的示例。本章中的链接（以及更多内容）也可以在 `dgd7.org/entities` 找到。\n\n![images](img/square.jpg)\
  \ **注意** 在创建不借助 Entity API 的实体类型时，你可能需要定义自己的控制器类，例如 `FormmsgsController`，并扩展 Drupal\
  \ 提供的类（如 `DrupalDefaultEntityController`）。在该类中可以包含创建方法以及对继承方法的扩展。不常用的类（例如创建实体时使用的类）应存放在外部文件中，并通过\
  \ `.info` 文件中的 `files[]` 指令引用。这有助于提升未使用操作码缓存的站点性能。在此示例中，Entity API 模块替我们处理了这些。Drupal\
  \ 只会在需要用到 `EntityAPIController` 类时加载其 `includes/entity.controller.inc` 文件。`EntityAPIController`\
  \ 扩展了 `DrupalDefaultEntityController` 并做了大量工作，但如果你需要更多功能，可以创建自己的类来扩展 `EntityAPIController`。\n\
  \n将 `'entity class'` 属性设置为 `Formmsgs` 意味着你必须定义这个类。如果该类不止这几行代码，将其放入 `formmsgs.info`\
  \ 中通过 `files[]` 指令引用的 `include` 文件中会更合理。\n\n```\n/**\n * 用于表单消息实体的类。\n */\nclass\
  \ Formmsgs extends Entity {\n\n  public $label;\n  public $status;\n\n  public function\
  \ __construct($values = array()) {\n    parent:__construct($values, 'formmsgs');\n\
  \  }\n}\n```\n\n这是对 Entity API 的 `Entity` 类的轻量级扩展；主要作用是调用 `Entity` 类的构造函数。它还声明了\
  \ `label` 和 `status` 变量，使它们在创建表单消息时即使为空变量也能无错误地使用。\n\n### 定义实体访问回调函数\n\nEntity API\
  \ 需要一个访问回调函数。在前面的 `hook_entity_info()` 实现的 `'access callback'` 属性中，你将该函数命名为 `formmsgs_entity_access()`。在列出回调函数名称时，省略括号\
  \ `()`。这个访问回调函数改编自 `entity/modules/callbacks.inc` 中的 `entity_metadata_comment_access()`。\n\
  \n```\n/**\n * Entity API 提供的 formmsgs 管理区的访问回调。\n *\n * @TODO 为 Entity API 打补丁，使其接受\
  \ hook_menu 风格的 'access arguments'，\n * 以便在简单的 user_access() 情况下无需此函数。\n */\nfunction\
  \ formmsgs_entity_access($op, $entity = NULL, $account = NULL) {\n  return user_access('administer\
  \ formmsgs');\n}\n```\n\nEntity API 要求提供访问回调，以换取它提供的实体管理和编辑用户界面。正如 `@TODO` 注释所述，当你只想基于简单的用户权限来确定访问时，似乎应该能直接提供权限字符串作为参数，而无需创建自己的访问回调来包装\
  \ `user_access()`。无论如何，为了让访问回调生效并拥有特定于实体的权限，你需要为新实体定义一个或两个权限。\n```\n\n\n### 定义权限\n\
  \n第 21 章建议，若非必要，请避免定义新权限。但如果你的模块实现了新的功能，且站点管理员应能根据用户角色允许或拒绝该功能时，你就需要定义新权限。代码清单 24–5\
  \ 展示了权限的定义过程。\n\n**代码清单 24–5.** 系统模块中 `hook_permission()` 实现的片段\n\n```\n/**\n *\
  \ 实现 hook_permission()。\n */\nfunction system_permission() {\n  return array(\n\
  \    'administer modules' => array(\n      'title' => t('管理模块'),\n    ),\n    'administer\
  \ site configuration' => array(\n      'title' => t('管理站点配置'),\n      'restrict\
  \ access' => TRUE,\n    ),\n// ...\n  );\n}\n```\n\n`'restrict access' => TRUE`\
  \ 指令会指示 Drupal 在权限管理页面的权限名称下方（如果存在描述，则在描述之后）打印一条提示：*警告：仅授予可信角色；此权限具有安全影响。* 它没有其他用途；这只是为模块开发者提供的一种便利，用于以一致的方式提醒管理员不要随意分配某些权限。\n\
  \n如果你想就授予某个权限向管理员发出更精确的警告，可以直接在描述字段中添加消息。核心的筛选器模块对已过滤格式和完整 HTML 格式（以及任何未配置为回退格式的格式）就是这样做的。筛选器模块还会为每种文本格式动态生成一个权限——这很酷，但描述中的自定义警告才是当前主题，此处以粗体强调：\n\
  \n```\n  // 为每种文本格式生成权限。警告管理员：其中任何一种都可能有潜在危险。\n  foreach (filter_formats() as $format)\
  \ {\n    $permission = filter_permission_name($format);\n    if (!empty($permission))\
  \ {\n      // 仅当查看此页面的用户有权访问文本格式配置页面时，才链接到该页面。\n      $format_name_replacement =\
  \ user_access('administer filters') ? l($format->name,\n'admin/config/content/formats/'\
  \ . $format->format) : drupal_placeholder($format->name);\n      $perms[$permission]\
  \ = array(\n        'title' => t(\"使用 !text_format 文本格式\", array('!text_format'\
  \ =>\n$format_name_replacement,)),\n        'description' => drupal_placeholder(t('警告：此权限可能具有安全影响，具体取决于文本格式的配置方式。')),\n\
  \      );\n    }\n  }\n  return $perms;\n```\n\n![images](img/square.jpg) **注意：**\
  \ 筛选器模块的 `hook_permission()` 实现中还有一点酷到值得一提：每种文本格式的标题会链接到其配置页面，但前提是*管理用户*有权配置文本格式。它通过\
  \ `user_access()` 函数进行权限检查，从而增强了其权限定义的可用性！\n\n表单消息模块的 `hook_permissions()` 实现则远没有那么令人兴奋。它确实有一个绕过权限，模仿了唯一字段模块。\n\
  \n```\n/**\n * 实现 hook_permission()。\n */\nfunction formmsgs_permission() {\n  return\
  \ array(\n    'administer formmsgs' => array(\n      'title' => t('管理 AJAX 表单消息'),\n\
  \      'description' => t('允许管理员配置错误和警告消息。'),\n    ),\n    'bypass formmsgs' =>\
  \ array(\n      'title' => t('绕过表单消息错误'),\n      'description' => t('允许用户忽略通过表单消息设置的错误。'),\n\
  \    ),\n  );\n}\n```\n\n### 为实体提供管理界面\n\nEntity API 在提供基于其管理实体的管理用户界面方面投入了大量工作，但一些常规设置仍需你自行完成。之前在代码清单\
  \ 24–4 中，通过 `hook_entity_info()` 定义表单消息实体时，你使用以下代码行定义了管理用户界面路径和一个单独的管理文件：\n\n```\n\
  \       'admin ui' => array(\n'path' => 'admin/structure/formmsgs',\n'file' => 'formmsgs.admin.inc',\n\
  ),\n```\n\n你需要通过在 `formmsgs.admin.inc` 文件中实现几个函数来兑现这一承诺（见代码清单 24–6）。当函数的名称以实体名后跟\
  \ `'_form'` 的形式命名时，Entity API 会自动接管主要的管理表单。（如果你的模块同时定义了一个与模块同名的、基于 Entity API 的增强实体，以及一个旧式的、模块拥有的节点类型，此回调将与节点表单回调冲突——但这种情况不太可能发生。）\n\
  \n**代码清单 24–6.** 在 `formmsgs.admin.inc` 中定义的表单消息实体管理界面\n\n```\n<?php\n/**\n * @file\n\
  \ * 仅在管理页面上需要的表单和函数。\n */\n\n/**\n * 生成表单消息实体的添加/编辑表单。\n *\n * 此表单会被 Entity API\
  \ 模块提供的管理界面自动接管。\n */\nfunction formmsgs_form($form, &$form_state, $formmsg, $op\
  \ = 'edit') {\n\n  if ($op == 'clone') {\n    $formmsg->label .= ' (克隆)';\n    $formmsg->name\
  \ .= '_clone';\n  }\n\n  $form['label'] = array(\n    '#title' => t('标签'),\n   \
  \ '#type' => 'textfield',\n    '#default_value' => $formmsg->label,\n  );\n  //\
  \ 机器可读的表单消息名称。\n  $form['name'] = array(\n    '#type' => 'machine_name',\n    '#default_value'\
  \ => isset($formmsg->name) ? $formmsg->name : '',\n    '#disabled' => ($op === 'edit')\
  \ ? TRUE : FALSE,\n    '#machine_name' => array(\n      'exists' => 'formmsgs_load_by_name',\n\
  \      'source' => array('label'),\n    ),\n    '#description' => t('此表单消息的唯一机器可读名称。只能包含小写字母、数字和下划线。'),\n\
  \  );\n  $form['status'] = array(\n    '#type' => 'checkbox',\n    '#title' => t('启用'),\n\
  \    '#default_value' => $formmsg->status,\n  );\n\n  field_attach_form('formmsgs',\
  \ $formmsg, $form, $form_state);\n\n  $form['actions'] = array('#type' => 'actions');\n\
  \  $form['actions']['submit'] = array(\n    '#type' => 'submit',\n    '#value' =>\
  \ t('保存表单消息'),\n    '#weight' => 50,\n  );\n  return $form;\n}\n\n/**\n * 表单 API\
  \ 提交回调，用于 formmsgs 实体添加/编辑表单。\n */\nfunction formmsgs_form_submit(&$form, &$form_state)\
  \ {\n  $formmsg = entity_ui_form_submit_build_entity($form, $form_state);\n  //\
  \ 保存并返回。\n  $formmsg->save();\n  $form_state['redirect'] = 'admin/structure/formmsgs';\n\
  }\n```\n\n在 `formmsgs_form()` 中有一行非常关键的代码你尚未使用：`field_attach_form()` 函数。它将允许在为表单消息实体定义的字段中，随着标签和机器名称一起填写字段值。你将在下一节中通过编程方式定义字段。\n\
  \n下一个函数 `formmsgs_form_submit()` 是一个简单的表单提交函数实现。借助 Entity API 的辅助函数，你只需在表单消息对象上调用\
  \ `->save()` 方法即可。\n\n然而，即使有了 Entity API 的帮助，仅凭这个表单，你还无法在管理界面中列出和编辑表单消息。你需要先定义一些\
  \ Entity API 依赖的加载函数。代码清单 24–7 中的代码应放入 `formmsgs.module` 文件中，因为它具有更通用的用途，但其直接需求是支持管理操作。\n\
  \n\n\n这些加载函数的模式基于`Profile2`模块（同样由实体 API 的创建者 fago 开发）。其中比较特殊的是`formmsgs_load_by_name()`，它模仿了`profile2_get_types()`，满足了实体\
  \ API 管理界面的一项特殊需求。\n\n另外两个函数直接类比于`node_load()`和`node_load_multiple()`。你会看到，与节点加载函数类似，`formmsgs_load()`通过调用`formmsgs_load_multiple()`来工作。这遵循了加菲尔德定律：*一个是一种特殊情况。*关于\
  \ Larry Garfield（crell）目前提出的八条 API 设计箴言，请参阅我对他的演讲笔记（`data.agaric.com/aphorisms-api-design`）或基于这些笔记的\
  \ DrupalCon 芝加哥录音（或者可以在未来的 DrupalCon 或 Drupal 训练营上听他重新讨论这个主题）。\n\n**Listing 24–7.\
  \ 实体 API 管理界面正常工作所需的实体加载函数（定义在`formmsgs.module`中）**\n\n```\n/**\n * Fetches an array\
  \ of all form messages, keyed by the formmsg machine name.\n *\n * Also used to\
  \ check if machine name is used for an existing form message.\n *\n * @param $name\n\
  \ *   If set, the form message with the given name is returned.\n * @return $formmsgs\n\
  \ *   An array of form messages or, if $name is set, a single one.\n */\nfunction\
  \ formmsgs_load_by_name($name = NULL) {\n  $formmsgs = entity_load('formmsgs', isset($name)\
  \ ? array($name) : FALSE);\n  return isset($name) ? reset($formmsgs) : $formmsgs;\n\
  }\n\n/**\n * Fetch a form message object.\n *\n * @param $fmid\n *   Integer specifying\
  \ the form message id.\n * @param $reset\n *   A boolean indicating that the internal\
  \ cache should be reset.\n * @return\n *   A fully-loaded $formmsg object or FALSE\
  \ if it cannot be loaded.\n *\n * @see formmsgs_load_multiple()\n */\nfunction formmsgs_load($fmid,\
  \ $reset = FALSE) {\n  $formmsg = formmsgs_load_multiple(array($fmid), array(),\
  \ $reset);\n  return reset($formmsg);\n}\n\n/**\n * Load multiple profiles based\
  \ on certain conditions.\n *\n * @param $fmids\n *   An array of form message IDs.\n\
  \ * @param $conditions\n *   An array of conditions to match against the {formmsgs}\
  \ table.\n * @param $reset\n *   A boolean indicating that the internal cache should\
  \ be reset.\n * @return\n *   An array of form message objects, indexed by fmid.\n\
  \ *\n * @see entity_load()\n * @see formmsgs_load()\n */\nfunction formmsgs_load_multiple($fmids\
  \ = array(), $conditions = array(), $reset = FALSE) {\n  return entity_load('formmsgs',\
  \ $fmids, $conditions, $reset);\n}\n```\n\n所有这些加载函数最终都依赖于 Drupal 核心的`entity_load()`函数（参见`api.drupal.org/entity_load`），`EntityAPIController`为其提供了自己的实现。\n\
  \n现在你可以创建、列表、编辑和删除 Form message 实体，但每个实体只包含一个标签、一个机器名和一个状态。要获得你最初选择实体路线时所寻求的全部能力和灵活性，你的模块需要定义\
  \ Drupal 7 字段。\n\n### 以编程方式创建和附加字段\n\n字段可以通过用户界面创建并附加到实体分组（例如内容类型）。这确实是字段的一个关键原因和目的，但它们也可以在代码中定义。在罕见的情况下，使用字段来存储配置信息（这是一个有争议的用例，应该再次指出），`AJAX\
  \ Form Messages`甚至不希望在用户界面中配置这些字段。为了向 Form messages 的用户提供与之前脑力激荡出的数据模型相匹配的所有字段，你绝对需要在代码中创建并附加这些字段。\n\
  \n#### 寻找模型\n\n核心中有几个地方以编程方式将字段附加到内容类型，这与将字段附加到你自己的实体和分组是类似的。Node 模块有一个封装了向内容类型添加`body`字段的函数`node_add_body_field()`，你可以在`modules/node/node.module`或`api.drupal.org/node_add_body_field`中看到它。Standard\
  \ 安装配置文件还附加了一个 Taxonomy 字段，可以在`profiles/standard/standard.profile`中大约第 283 行看到。\n\
  \n对于消息，你需要一个文本字段。要精确查看有哪些文本字段可供使用，请直接查看 Drupal 核心的 Text 模块，它是 Field 模块的子模块，位于`modules/field/modules/text.module`。\n\
  \n```\nfunction text_field_info() {\n  return array(\n    'text' => array(\n   \
  \   'label' => t('Text'),\n      'description' => t('This field stores varchar text\
  \ in the database.'),\n      'settings' => array('max_length' => 255),\n      'instance_settings'\
  \ => array('text_processing' => 0),\n      'default_widget' => 'text_textfield',\n\
  \      'default_formatter' => 'text_default',\n    ),\n    'text_long' => array(\n\
  \      'label' => t('Long text'),\n      'description' => t('This field stores long\
  \ text in the database.'),\n      'instance_settings' => array('text_processing'\
  \ => 0),\n      'default_widget' => 'text_textarea',\n      'default_formatter'\
  \ => 'text_default',\n    ),\n// ...\n  );\n}\n```\n\n`text`字段的最大长度（`max_length`）可能是\
  \ 255 个字符，因此选择`text_long`格式对你有益。然而，这 255 个字符只是一个设置；在创建字段时，它可以被设置为不同的、更大的值。（最长安全值约为\
  \ 50,000 字节，参见`drupal.org/node/1052248`）。\n\n综合起来，要添加一个字段，你回到你的`.install`文件。这是一个两步过程：定义（创建字段）和附加到实体（创建字段实例），这两个步骤可以在`hook_install()`的实现中一起完成。\n\
  \n```\n/**\n * Implements hook_install().\n */\nfunction formmsgs_install() {\n\
  \  // 定义字段。\n  $field = array(\n    'field_name' => 'field_message',\n    'type'\
  \ => 'text_long',\n    'entity_types' => array('formmsgs'),\n    'translatable'\
  \ => TRUE,\n  );\n  $field = field_create_field($field);\n\n  // 附加字段。\n  $instance\
  \ = array(\n    'field_name' => 'field_message',\n    'entity_type' => 'formmsgs',\n\
  \    'label' => t('Message'),\n    'bundle' => 'formmsgs',\n    'description' =>\
  \ t('错误时显示的消息。'),\n    'widget' => array(\n      'type' => 'text_textarea',\n  \
  \    'weight' => -5,\n    ),\n  );\n  field_create_instance($instance);\n}\n```\n\
  \n定义字段的过程很简单：创建一个包含字段信息的数组，然后对该数组调用`field_create_field()`。附加字段的过程类似，它不需要传入你创建的字段；而是使用与你刚刚创建的字段相同的字段名称，并同时提供你正在附加的实体类型名称。然后，它可以选择性地接受实例级别的设置。真正的技巧在于翻阅核心和贡献模块的`.install`文件，以寻找不同字段的示例。如有必要，你也可以定义自己的字段类型。为`AJAX\
  \ Form Messages`创建自定义字段类型将在`dgd7.org/strategy`中进行记录。\n\n![images](img/square.jpg)**注意**\
  \ 请记住，一旦你发布了模块的测试版本（此时用户期望能够安全升级），除了在`hook_install()`中，你还需要在`hook_update_N()`的实现中定义和附加任何新字段。\n\
  \n\n\n### 明确“完成”的定义\n\n> “在水面上行走和根据规范开发软件，如果两者都冻结了，那都很容易。”\n> ——爱德华·V·贝拉德\n\n当然，关于定义“完成”的这一节本应放在开头。（我没有把第\
  \ 10 章关于项目规划与管理的内容写进来是有原因的。）但别让这吓跑你，这里有一些好建议：首先要明确定义目标。\n\n几乎所有项目几乎都可以无限期地延展；你投入的时间越多，想到的酷炫功能就越多。尽早定义能够交付的最低标准有助于保持专注。用你自己的问题队列来提交功能请求，但不要让它们妨碍你完成目标。先交付以满足第一个用例，并尝试安排时间在之后重新审视它。\n\
  \n![images](img/square.jpg) **提示** 你不应该在哪些方面偷工减料？就是保留日后以不同方式处理问题的灵活性。每当关于最佳实现方式的决定最好留到以后再做时，你就要封装功能，定义代码各部分之间的边界和接口。这也意味着要遵守你自己的\
  \ API，而不是为你的代码需求设置特例；你的模块不应享有高于其他模块的特权。编码时要假设你以后无法编辑自己的代码。如果你需要更多灵活性，也要让其他模块能够使用这种灵活性。\n\
  \n当然，在开源项目中，任何人都可以认为项目还不够“完成”，并亲自投入工作。Drupal 社区的一大优势在于，新加入项目的人频繁地做出重大贡献，包括接管现有模块的维护工作。\n\
  \n对于这个模块而言，作为一项案例研究，“完成”被定义为*本书需要出版*。请关注 Form message 模块在 `dgd7.org/strategy` 和\
  \ `drupal.org/project/formmsgs` 上的持续冒险。\n\n## 第六部分\n\n![images](img/squ.jpg)\n\n\
  ## 高级站点构建主题\n\n**第 25 章** 涵盖了构建在线商店的内容，并带你了解从零开始重构 Ubercart（Drupal 6 排名第一的电商套件）为\
  \ Drupal 7 的 Drupal Commerce 的决策过程。本章对任何构建电商网站的人都有价值，同时也会邀请你加入 Commerce 开发者社区。\n\
  \n**第 26 章** 提供了对高级 Drush 用法的深入见解，这将像你初次使用 Drupal 命令行工具 Drush 时一样，彻底改变你的站点开发体验。本章包含让你开始编写自己的\
  \ Drush 脚本和命令的示例。\n\n**第 27 章** 讲解了使用 Drupal 可插拔的缓存和存储机制来扩展到数百万站点用户（不仅仅是访客，这相对容易扩展，而是与站点进行大量交互的用户）的概念和实践。另请参阅附录\
  \ B。\n\n**第 28 章** 给出了将语义网的力量引入 Drupal，反之亦然——让你的网站数据与计算机能理解的精确含义相关联，并连接到互联网上其他数据——的理论和实践。（SEO\
  \ 提示：计算机包括搜索引擎。）\n\n**第 29 章** 带领你了解 Drupal 的路由系统，为模块开发者和站点构建者提供关键背景知识。\n\n**第 30\
  \ 章** 带你参观在页面请求期间 Drupal 内部发生的情况，这是对第 29 章的完美补充，也是真正理解 Drupal 的好方法。\n\n**第 31 章**\
  \ 解释了如何使用和扩展 Solr 模块以获得更强大的搜索能力。在后一种能力中，它提供了一个将 Drupal 与 Web 服务集成并利用面向对象代码的示例。\n\
  \n**第 32 章** 深入探讨了 Drupal 7 中的用户体验改进、其背后的决策，以及如何在你的开发中使用新的最佳实践和一致的界面设计决策。\n\n**第\
  \ 33 章** 处理高级配置和大量粘合代码——实际上，是不惜一切代价——来完成在第 1 章和第 8 章中构建的 DefinitiveDrupal.org 网站。\n\
  \n**第 34 章** 介绍了一些流行的 Drupal 发行版——为特定目的打包的 Drupal 和模块集合，它们正以前所未有的方式传播 Drupal——并向你展示如何使用\
  \ Drupal 的安装配置文件功能制作你自己的发行版。\n\n## 第 25 章\n\n![images](img/squ.jpg)\n\n## Drupal\
  \ Commerce\n\n作者：Ryan Szrama\n\n由于为 Drupal 7 开发的 Drupal Commerce，Drupal 的电子商务功能比以往任何时候都更强大。Drupal\
  \ Commerce 项目由一套核心的 Commerce 模块和一个利用了许多新的 Drupal 7 特性和 API 改进的实现策略组成。本章从 Drupal\
  \ Commerce 的广泛概述开始，突出其关键特性，然后深入审视核心系统、它们的实现方式，以及应如何将它们结合使用。本章还包含为想要在自己的站点上实施 Drupal\
  \ Commerce 的站点构建者和开发者提供的智慧箴言。本章以对项目开发历史、设计理念以及关键 Drupal 7 特性利用的讨论结束。\n\n### Drupal\
  \ Commerce 概述\n\n从很多方面来看，Drupal 都是电子商务网站的理想平台。其核心模块和系统定义了用于将贡献模块深度集成到站点行为中以及与外部\
  \ Web 服务通信的 API。它包含了大量用于内容管理和社区构建的特性，使你能够围绕你的产品和服务建立一个社区，或者通过客户现有的社交网络关系来推广你的品牌。\n\
  \n从 Drupal 4.5 时代起，所有主要的电子商务模块都建立在 Drupal 的基础功能集之上，将其作为电子商务的基础，而不是与外部应用程序集成，Drupal\
  \ Commerce 也不例外。随着 Drupal 的成熟，这个核心功能和主要贡献系统（如 Views）的基础也在不断发展，为构建在其上的模块提供了更大的灵活性和能力。因此，Drupal\
  \ Commerce 是从头开始构建的，采用了围绕 Drupal 7 最新特性和 Drupal 贡献模块（如 Rules 和 Views）最大发展的全新架构。\n\
  \n最终的结果是一个可以从头开始构建以满足你业务需求的电商解决方案，无论业务是大是小。Drupal Commerce 站点受益于 Drupal 的安全性、扩展能力，以及其广泛选择的贡献模块的互操作性。凭借内置在核心本身的内容管理和社交商务工具，Drupal\
  \ 是当今在线企业的一个非常强大的平台，无需与外部电商应用程序集成。\n\n\n\n### 主要特性\n\n核心功能集的范围有意进行了限制，因为 Drupal\
  \ Commerce 的目标是为网站构建者和开发者提供电子商务的构建模块，以便他们能够创建定制化的电子商务解决方案。尽管如此，Commerce 模块仍然包含了电子商务应用所期望的基本功能集。这些功能主要通过某些核心模块对中的用户界面（UI）模块（如\
  \ Product 和 Product UI）以及专注于客户体验的纯 UI 模块（如 Cart 和 Checkout）来实现。\n\n核心功能的基本总结包括：\n\
  \n*   支持任意数量可配置产品图片和数据字段的商品。\n*   动态产品定价，允许基于 UI 的折扣和含税价格显示。\n*   基于 Drupal 7 字段系统的灵活产品展示，强制将产品定义与展示点分离。\n\
  *   “智能”添加到购物车表单，根据其所代表的产品数量和类型以不同方式显示。\n*   购物车系统，包含购物车区块和购物车更新表单，购物车作为特殊订单对象实现。\n\
  *   订单由订单项、客户档案引用和其他元数据组成。\n*   各种类型的订单项，用于描述订单上的项目，如商品、税费、运费等。\n*   各种用户可配置类型的客户档案，允许收集完成或履行订单所需的数据。\n\
  *   灵活的结账表单生成器，支持拖放式用户界面，可实现单页和多页结账。\n*   支付系统，将现场和场外支付解决方案集成到正常结账工作流程中，并允许管理员进行跟踪和手动录入。\n\
  *   完整的订单、客户档案和支付交易日志记录。\n*   支持多币种和多语言商店。\n\n### 深入探索 Drupal Commerce\n\n您可以在本章后续部分以及项目主页\
  \ `drupalcommerce.org` 上了解更多关于 Drupal Commerce 的起源、理念和核心 Drupal 创新。首先深入探究 Commerce\
  \ 模块本身，将为您提供更高级主题的适当背景。因此，本节将介绍如何下载和安装 Commerce 模块，并通过一个简单商店配置的演练，详细检查构成项目核心系统的各种实体和字段。\n\
  \n该项目的源代码托管在两个位置：一个是在 GitHub 上的开发 Git 仓库，它会镜像到 `drupal.org` 上的一个仓库。要快速入门，您可以直接从项目页面\
  \ `drupal.org/project/commerce` 下载最新版本，并将其解压到您网站的模块目录。如果您计划向项目贡献代码，或者想基于最新代码进行开发，您可以克隆\
  \ Git 仓库，并按照 *Code Workflow* 手册（位于 `drupalcommerce.org/development/workflow`）中的说明，从最活跃的开发仓库中拉取代码。\n\
  \n> **提示** Drupal Commerce 项目负责人 Ryan Szrama 维护着最活跃的开发仓库，提交到主项目仓库的大部分代码都源于此。要找到他及其他开发者的活跃仓库，您可以查阅位于\
  \ `drupalcommerce.org/development/workflow/repositories` 的开发者文档。\n\n在启用 Commerce\
  \ 模块之前，您还需要下载并将以下依赖项的最新 Drupal 7 版本解压到您网站的模块目录中：\n\n*   Address Field (`drupal.org/project/addressfield`)\n\
  *   Chaos tools suite (`drupal.org/project/ctools`)\n*   Entity API (`drupal.org/project/entity`)\n\
  *   Rules (`drupal.org/project/rules`)\n*   Views (`drupal.org/project/views`)\n\
  \n有了这些模块后，您就可以开始启用用于构建商店的模块了。如果您是从 Drupal 7 的标准安装开始，那么您应该已经启用了 Commerce 模块所依赖的可选核心\
  \ Drupal 模块：Contextual links 和 Field UI。如果这些模块未启用，您应该在启用从已下载项目中导入的以下依赖模块时启用它们：\n\
  \n*   Address Field\n*   Entity CRUD API\n*   Entity Tokens\n*   Rules\n*   Rules\
  \ UI\n*   Views\n*   Views UI\n*   Chaos tools suite 中列为 Views 模块依赖项的模块\n\n> **提示**\
  \ 虽然不是依赖项，但强烈建议使用 Administration Menu 模块，以便结合核心的 Overlay 模块在 Commerce UI 中导航。您可以从其项目页面\
  \ `drupal.org/project/admin_menu` 下载最新的 Drupal 7 版本。\n\n现在，您已准备好启用 Commerce 模块。虽然模块安装页面上的\
  \ Commerce 字段集是按字母顺序列出模块的，但此处是按依赖关系顺序列出的：\n\n*   *Commerce/Commerce UI* 定义了 Commerce\
  \ 模块通用的特性和 API 函数，例如货币处理和 Field API 辅助函数。\n*   *Price* 定义了一个具有多个显示格式化器的动态价格字段。\n\
  *   *Product/Product UI* 定义了产品实体以及用于创建和管理产品类型及产品的用户界面。\n*   *Physical Product* 定义了用于销售实体产品的字段。\n\
  *   *Line Item/Line Item UI* 定义了订单项实体、用于模块定义订单项类型的 API，以及用于将订单项添加到订单的订单项引用字段。\n\
  *   *Product Reference* 定义了用于在其他实体上展示产品的产品引用字段，以及一个产品订单项类型。\n*   *Product Pricing/Product\
  \ Pricing UI* 实现了基于 Rules 的产品销售价格计算，以实现动态产品定价。\n*   *Tax/Tax UI* 通过 API 和用户界面定义了税费类型，用于定义税率和管理含税价格显示。\n\
  *   *Customer/Customer UI* 定义了客户档案实体、用于创建和管理客户档案类型及档案的用户界面，以及用于将客户信息添加到订单的客户档案引用字段。\n\
  *   *Order/Order UI* 定义了订单实体以及用于创建和管理默认订单类型及订单的用户界面。\n*   *Payment/Payment UI* 定义了支付交易实体以及用于通过结账表单和管理表单接受和管理支付的用户界面。\n\
  *   *Checkout* 定义了一个灵活的结账表单，带有支持单页和多页结账的拖放式结账表单生成器。\n*   *Cart* 定义了特殊的购物车订单状态和用户界面组件，如购物车区块、更新表单以及结账集成。\n\
  \n安装后，其中一些模块将自动创建字段以配置某些实体供使用。例如，当启用 Product Reference 模块时，Line Item 模块会基于 Product\
  \ Reference 对 `hook_commerce_line_item_info()` 的实现，定义一个带有默认价格字段的新订单项类型。本节的剩余部分将检查每个模块定义的系统和特性，并重点介绍需要进一步配置的方面。这些配置任务包括：\n\
  \n*   启用支持的货币并设置默认商店货币。\n*   创建产品类型并添加产品。\n*   创建产品展示节点类型。\n*   启用支付方式。\n*   自定义结账表单。\n\
  *   审查默认 Rules。\n\n> **提示** 由于运行 Drupal Commerce 涉及大量模块，您可以使用 Commerce Kickstart\
  \ 安装配置文件，该配置会在正常的 Drupal 安装过程中自动安装必要的模块。要查找和下载安装配置文件以及寻找创建自己配置文件的资源，请参阅 `drupalcommerce.org/development/installation-profiles`\
  \ 上的文档。\n\n\n\n#### 商务\n\n`Commerce`模块定义了一系列 API 函数，供其他模块用于简化视图和表单 API 的常用功能。虽然随着\
  \ Drupal Commerce 的成熟，这个函数库和通用商店设置库肯定会不断增长，但目前其主要负责的功能是货币定义和格式化。`Commerce`模块根据 ISO\
  \ 4217 标准定义了每一种可能的货币，同时允许通过`hook_commerce_currency_info_alter()`修改货币名称和格式数据。\n\n\
  `Commerce UI`模块定义了一个名为`商店`的顶级管理菜单项，所有其他 UI 模块都将其菜单项放置在该菜单项下，并在`商店`下放置一个`配置`项来容纳商务模块的设置表单。它还在`配置`菜单中添加了一个`货币设置`项，如图\
  \ 25-1 所示。在向网站添加产品之前，您应该为商店选择默认货币，并启用您打算在产品定价中使用的任何其他货币。由商务模块添加到产品、订单项等实体捆绑包中的默认价格字段，在货币选择组件上会使用默认的商店货币，因为这些“锁定”字段的默认值无法通过字段\
  \ UI 进行调整。\n\n![图片](img/2501.jpg)\n\n**图 25-1.** 货币设置表单允许您指定默认的商店货币并启用任何其他货币。\n\n\
  #### 价格\n\n`Price`模块主要定义了可以附加到实体上的价格字段，从而允许输入特定货币的价格。该价格字段为每个价格值存储一个金额和一个 ISO 4217\
  \ 货币代码，并附带两种显示格式化器，可将价格值显示为原始数字或针对指定货币格式化的数字。可以通过图 25-2 所示的两种默认组件之一来输入价格：一个`价格文本字段`组件，允许为特定货币输入价格；以及一个`带货币的价格`组件，允许您在数据输入时从已启用的货币列表中选择一种货币。\n\
  \n![图片](img/2502.jpg)\n\n**图 25-2.** `Price`模块定义了这两种用于输入价格值的标准组件。\n\n虽然`Price`模块本身不会创建任何价格字段，但它确实提供了一个名为`commerce_price_create_instance()`的\
  \ API 函数，Drupal Commerce 中的其他模块使用该函数将其必需的、锁定的价格字段添加到它们的实体捆绑包中。`Product`模块使用此函数为产品类型添加默认价格字段，以确保您创建的每个产品都有一个价格值，如下所示：\n\
  \n```\n/**\n  * 确保基础价格字段存在于产品类型捆绑包中。\n  */\nfunction commerce_product_configure_product_type($type)\
  \ {\n  commerce_price_create_instance('purchase_price', 'commerce_product', $type,\
  \ t('价格'));\n}\n```\n\n如果对`commerce_price_create_instance()`的多次调用使用了相同的第一个参数（代表字段名称），则每个实例将使用相同的字段。对于产品而言，这允许视图和其他函数假设它们可以在所有产品类型的相同字段中找到价格数据。如果没有这种能力，几乎不可能构建可靠的产品目录和多用途的“加入购物车”表单。\n\
  \n此外，使用此函数创建的价格字段是“锁定”的，意味着这些字段的实例无法通过字段 UI 删除或修改。因此，它们在数据输入时默认使用`带货币的价格`组件，因为它使用默认的商店货币，并根据可用货币数量更改其表单元素。虽然该组件也能兼容那些在输入价格后又被禁用的货币，但您应将规划并在输入产品数据之前启用网站将使用的货币视为最佳实践。\n\
  \n#### 动态定价\n\n价格字段有能力使其他模块在显示时动态更改价格的金额和货币。为各种折扣更改价格，以及为含税定价和多货币支持等功能调整价格显示，是许多电子商务网站的主要考量。`Price`模块通过`Product\
  \ Pricing`模块与`规则`的集成交互来满足这些需求，允许您通过`规则 UI`配置价格调整。\n\n仅根据显示点或某组折扣参数来更改价格本身并非难事，但由于使用`规则`进行动态定价需要\
  \ Drupal 加载并执行代码，因此这些数据无法直接在数据库中用于排序或过滤查询结果。换句话说，如果一个视图按价格从低到高对产品进行排序，那么当生成页面时，如果最贵的产品被打折成为列表中最便宜的，排序就会出错。为了避免这个问题，`Price`模块能够预计算并缓存源自独立`规则`的价格，这些规则使用一组一致的参数来产生可预测且可复现的价格调整。\n\
  \n#### 产品\n\n在完成初始商店和货币配置后，下一步将是实施您的网站产品策略。当您开始与产品系统交互时，应该清楚了解您将销售哪些类型的产品以及您的客户将如何为它们付款。`Product`模块利用\
  \ Drupal 7 的实体系统定义了一个新的、可字段化的产品实体，该实体可以拥有任意数量的捆绑包，这些捆绑包被称为产品类型。该实体还定义了多种显示模式，允许您控制每个产品类型上的字段在不同位置的显示方式。\n\
  \n任何模块都可以使用`hook_entity_info()`以相同的方式定义新实体。当您为 Drupal 7 贡献模块或编写自己的模块来扩展 Drupal Commerce\
  \ 时，如果您的代码依赖于一个具有可通过用户界面配置的捆绑包的可显示数据对象，则应考虑使用实体系统。请参阅本章稍后的开发讨论部分，了解讨论实体类型定义的代码示例。\n\
  \n\n\n#### 创建商品类型\n\n除了在代码中定义商品类型外，您还可以使用商品 UI 模块提供的默认界面来添加和配置商品类型。该界面位于“商店”菜单下的“商品”菜单项中。商品主页面是一个视图，以表格形式列出站点上的所有商品，并带有一个“商品类型”选项卡，该选项卡列出所有当前可用的商品类型，并附带一些用于管理这些类型及其字段的管理链接（参见图\
  \ 25-3）。\n\n![images](img/2503.jpg)\n\n**图 25-3。** “商品类型”选项卡允许您在站点上添加和配置商品类型。\n\n\
  虽然商品 UI 模块在安装时会创建一个基础商品类型，但大多数站点都需要定义额外的商品类型，或至少自定义这个基础商品类型。您应该为您销售的、共享一组共同属性或特征的每组商品添加一个独立的商品类型，例如衬衫的尺码或书籍的封面类型。这些属性在各类商品类型上以字段的形式表示，并通过商品类型的“管理字段”链接进行添加。正如后面“购物车”部分所讨论的，“添加到购物车”表单会调整其显示方式，以便根据表单上每个商品所包含的、具有明确选项集的任何必需的单一值字段，来进行商品选择。\n\
  \n请按照以下说明构建一个可能在服装店中使用的 T 恤商品类型：\n\n1.  点击上面显示的“添加商品类型”链接，然后输入 *t-shirt* 作为商品类型名称。请注意，系统会自动为该商品类型创建一个有效的“机器名称”，该名称将在整个代码中用于指代此类型。\n\
  2.  使用“保存并添加字段”按钮提交表单，以创建新的商品类型并重定向到其“管理字段”选项卡。\n3.  将字段表格中的“添加新字段”行拖拽到“标题”行和“价格”行之间的位置。在新字段的“标签”文本框中输入\
  \ *Size*，在其“名称”文本框中输入 *size*。选择“列表（文本）”作为要存储的数据类型，将“小组件”保留为“选择列表”，然后点击“保存”按钮以创建新字段并重定向到其设置表单。\n\
  4.  将字段设置的“允许值”保留为空，因为这些允许值适用于您的“尺码”字段的任何实例，如果您之后决定需要更多选项，将无法更新。使用“保存字段设置”按钮提交表单。\n\
  5.  您现在看到的表单包含特定于 T 恤商品类型上“尺码”字段的设置以及其他通用字段设置。在“T 恤设置”字段集中，选中“标签”文本框下方的“必填”复选框，以要求每个\
  \ T 恤商品都必须有一个尺码值。在“尺码字段设置”字段集中，确保“值的数量”设置为 1，并在“允许值”文本区域中每行输入几个尺码选项。\n6.  使用“保存设置”按钮提交表单，将返回到“管理字段”选项卡，此时该选项卡应类似于图\
  \ 25-4。您可以使用相同的过程添加任何其他需要的字段，包括图像等其他类型的字段。\n\n![images](img/2504.jpg)\n\n**图 25-4。**\
  \ 商品类型的“管理字段”选项卡显示了模块添加的默认字段以及您通过字段 UI 添加的任何其他字段。\n\n#### 添加商品\n\n一旦配置了商品类型，您就可以开始向站点添加商品了。返回到\
  \ *商店* ![图片](img/U001.jpg) *商品* 页面，您可以使用“添加商品”链接来选择商品类型并开始创建商品。当您列出具有单一值字段（如 T 恤商品类型）的商品时，您必须为您打算销售的每个变体添加一个独立的商品。\n\
  \n敏锐的观察者会意识到，对于具有多个属性字段和许多选项的商品类型的商店来说，这将产生多少商品。在 Drupal Commerce 中，您最终可能会创建几个到几十个仅在某个字段值上有所不同的商品。这在很大程度上是由于该项目优先考虑规范化商品数据模型，并且是其强调将\
  \ API 与 UI 分离（后文将讨论）的延伸。\n\nDrupal Commerce 的诞生始于讨论如何更好地定义商品，以改善 Ubercart 商品 API\
  \ 中糟糕的开发体验——这种糟糕体验源于属性数据的不一致、SKU 调整的不可靠性以及作为序列化数组存储的关键数据的不透明性。设计到 Commerce 商品系统中的主要纠正措施是强制定义商品的每一种可能的变体，包括唯一的商品\
  \ ID 和 SKU。这种方法结合了在字段中存储属性数据的方式，使得商品数据更易于处理，并简化了商品创建 API。\n\n![images](img/square.jpg)\
  \ **注意** SKU 代表库存量单位，指的是商家为每种商品变体或可计费实体定义的唯一标识符。SKU 通常包含有意义的缩写商品信息，但也可以只是简单的数值，特别是对于那些不依赖这些数据的商店，或者市场上其他跟踪已售商品的方法占主导地位的情况下。\n\
  \n这种为了简化核心 UI 而专注于 API 和数据模型的转变是有意为之的。商品策略的一个关键部分是在商品系统之上引入易用性层，以简化重复性任务。Drupal\
  \ 的 2010 年谷歌编程之夏项目之一就专注于解决这个问题，从而产生了可从 `drupal.org/project/commerce_bpc` 获得的 Commerce\
  \ 批量商品创建模块。如果您需要一次性创建同一商品的多个变体，该模块允许您通过一个表单来创建它们，您可以在该表单中选择要为其创建商品的属性字段选项，并指定一个基于令牌的模式用于为其生成\
  \ SKU。\n\n至此，您仍然没有将您创建的商品展示给顾客进行购买的方式。商品定义仅存在于后端，并将通过利用商品引用字段的商品展示节点类型在前端进行显示，如“商品引用”部分所述。如前所述，将商品定义与其展示点分离，是\
  \ Drupal Commerce 强调将 API 与默认 UI 分离的延伸。这种分离允许同一商品在多个地方被引用，例如在特定语言的节点上或跨多个域，而无需手动数据同步来确保商品\
  \ SKU、价格和其他信息在所有展示中都保持一致。虽然设置初始商品展示可能需要更多工作，但更大的灵活性绝对物有所值。\n\n最后，使用 Drupal 的实体系统来定义商品，使得模块能够使用特殊字段为不同的商品类型添加功能。物理商品模块正是这样做的，它定义了可用于描述商品尺寸、重量和包装信息的字段。这些数据随后在结账表单中可用，在那里它们可以被汇总，用于计算运费，并收集完成实体商品订单所需的用户额外信息。\n\
  \n\n\n### 订单项\n\nDrupal Commerce 使用 `line items`（订单项）来表示订单上任何有助于计算订单总额或完成订单的内容。该模块定义的\
  \ `line item` 实体是可配置字段的，并且可以配置为任意数量的模块定义包，这些包被称为 `line item types`（订单项类型）。对 `line\
  \ items` 的更改会通过 `line item revisions`（订单项修订）进行追踪，这与节点类似。除了由定义类型的模块添加的特定于 `line item\
  \ type` 的字段之外，每个 `line item` 都包含以下默认属性和字段：\n\n*   标签\n*   标题\n*   显示选项\n*   数量\n\
  *   单价\n*   总价\n\n任何需要在订单上表示其他信息（例如来自优惠券代码的折扣）的模块，都可以使用 `hook_commerce_line_item_info()`\
  \ 以相同的方式定义一个新的 `line item type`。在产品引用模块中可以看到一个示例实现，该模块定义了 `product line item type`，并使用默认的产品引用字段将\
  \ `line item` 与数据库中的实际产品关联起来。有关 `line item type` 数据结构的当前文档，请参阅 *Drupal Commerce\
  \ 规范* 手册中“信息钩子”部分的“订单项”页面，网址为 [`www.drupalcommerce.org/specification`](http://www.drupalcommerce.org/specification)。\n\
  \n![images](img/square.jpg) **提示** 收藏规范手册（`drupalcommerce.org/specification`）并经常查阅，以获取最新的系统概览、钩子说明和\
  \ API 使用策略。\n\n由订单项模块定义的 `line item reference` 字段可以使用其 `line_item_id` 值将任意数量的 `line\
  \ items` 关联到另一个实体。该字段本身除了 ID 之外不存储任何数据，但它附带了一个非常强大的订单项管理器小部件，该小部件允许你通过由表单 API 中新的\
  \ `#ajax` 支持驱动的动态表单来添加、编辑和删除 `line items`（请参阅 图 25-5）。像购物车这样的模块希望通过 API 向订单添加 `line\
  \ items`，它们负责创建 `line items` 并通过调整订单的 `line item reference` 字段的值将它们与订单关联起来。请参考 `commerce_cart.module`\
  \ 中的 `commerce_cart_product_add()` 函数，以了解此过程的示例实现。\n\n![images](img/2505.jpg)\n\n\
  ***图 25-5.** 订单项管理器小部件可用于在订单上添加、编辑和删除订单项。*\n\n`Line items` 可以通过 Views 显示，方法是使用 `line\
  \ item` 关系或参数（例如在购物车区块和订单项视图显示格式化程序中），或者通过 API 基于 `line item type` 的字段显示配置构建内容数组。你可以通过商店\
  \ ![Image](img/U001.jpg) 配置菜单中的订单项选项来访问 `line item types` 列表并管理其字段显示设置。请注意，`line\
  \ item types` 无法通过用户界面添加或编辑，因为它们依赖于模块特定的代码才能有效运行。如果你必须更改另一个模块的 `line item types`，可以使用\
  \ `hook_commerce_line_item_info_alter()` 来实现。\n\n除了产品引用和购物车之外，税收是另一个与 `line item`\
  \ 系统进行大量交互的核心模块。税收模块允许模块通过 `hook_commerce_tax_info()` 定义可能应用于订单中 `line items` 的税率。将征收的税款存储在\
  \ `line items` 中，你可以使用 Views 轻松创建税收报告，并通过引用用于计算 `line item` 价格的特定税率的字段来访问税率信息。\n\
  \n### 产品引用\n\n产品引用模块定义了一个产品引用字段和 `product line item type`，后者使用该字段从 `line item` 引用产品数据。产品引用字段是你用于构建产品展示和“添加到购物车”表单的主要工具。当该字段放置在节点类型上时，产品引用模块会将所引用产品的字段拉取到节点中进行展示，同时使用产品类型和节点类型的字段显示设置来格式化产品字段并将其与节点字段一起排序。产品引用字段可以引用单个或多个产品，并且通过购物车模块提供的“添加到购物车”表单显示格式化程序，可以在节点展示中显示为“添加到购物车”表单。该字段还与\
  \ Views 集成，从展示节点到被引用产品的数据建立关系，用于产品目录 Views 和其他类型的展示。\n\n如你所见，这个字段非常多功能，是 Drupal\
  \ Commerce 产品策略的关键部分。通过将产品字段拉取到节点展示中，可以在单个产品实体上定义和维护图像和价格信息，然后从网站上的任意位置引用它们。对产品的任何更新都将自动出现在任何使用产品引用关系展示该产品的地方。\n\
  \n\n\n#### 构建产品展示节点类型\n\n请按照以下说明为您的网站构建一个基本的产品展示节点类型：\n\n1.  在管理菜单中浏览至 `结构` `![Image](img/U001.jpg)`\
  \ `内容类型`，然后点击 `添加内容类型` 链接。输入 `产品展示` 作为内容类型名称，并根据需要调整垂直选项卡中的设置。\n2.  使用 `保存并添加字段`\
  \ 按钮提交表单，以创建新的内容类型并重定向到其 `管理字段` 选项卡。\n3.  在字段表的 `添加新字段` 行中，输入 `产品` 作为新字段的标签，并在其名称文本框中输入\
  \ `product`。选择 `产品引用`，将小部件保留为 `自动完成文本框`，然后点击 `保存` 按钮创建新字段并重定向到其设置表单。\n4.  保持 “可引用的产品类型”\
  \ 复选框未选中状态，允许该字段引用任何类型的产品。使用 `保存字段设置` 按钮提交表单。\n5.  您现在正在查看一个表单，其中包含 `产品展示` 内容类型上特定于产品字段的设置以及其他通用字段设置。在\
  \ `产品展示设置` 字段集中，勾选 `标签` 文本框下方的 `必填` 复选框，以要求每个 `产品展示` 节点都引用一个产品。在 `产品字段设置` 字段集中，将\
  \ `数值数量` 设置为 `1`，然后使用 `保存设置` 按钮提交表单，返回 `管理字段` 选项卡。\n6.  点击 `管理显示` 选项卡，查看内容类型字段（`正文`\
  \ 和 `产品`）以及引用的产品字段（`产品：尺寸` 和 `产品：价格`）将如何排序和显示。只有 T 恤产品才会有尺寸字段，您无需通过产品展示节点来显示该字段本身。您还需要将节点的产品字段显示为“加入购物车”表单，这需要在字段的\
  \ `格式` 选择框中选择该显示格式器。将您的默认字段显示设置更新为类似于 图 25-6 的样子，并对其他显示模式重复此过程。\n\n![images](img/2506.jpg)\n\
  \n***图 25-6.** 如图所示，字段显示配置隐藏了不必要的字段，并调整了引用产品价格字段的顺序，使其显示在呈现为“加入购物车”表单的产品引用字段上方。*\n\
  \n7.  最后，您应该检查将在节点上下文中显示的产品字段的显示设置。这些设置通过每种产品类型的“管理显示”表单进行配置，这些表单位于 `管理` `![Image](img/U001.jpg)`\
  \ `商店` `![Image](img/U001.jpg)` `产品` `![Image](img/U001.jpg)` `产品类型` 下。产品字段可以在每个节点视图模式中显示不同，因此您可能需要为多个产品视图模式配置字段显示设置。\n\
  \n完成这些步骤后，您将获得一个节点类型，现在可以用于在您的网站上列出待售产品。`自动完成文本框` 小部件会在 `节点编辑` 表单中添加一个文本字段，您可以在其中通过\
  \ SKU 输入产品以从节点引用，并且在数据输入过程中会根据产品 SKU 或标题自动完成。这种类型的节点将显示一个简单的“加入购物车”表单，将引用的产品添加到客户的购物车中。\n\
  \n虽然这种简单的产品展示适合一次销售单个产品，但对于从同一节点销售产品组合来说是不够的。例如，您可能想创建四件 T 恤产品，它们款式或设计相同但尺寸不同。Drupal\
  \ Commerce 的产品数据模型要求将每种尺寸列为单独的产品，但客户只需看到一个单一的产品展示，在其中可以选择合适的尺寸。为了实现这一点，您需要使用一个包含产品引用字段的内容类型，该字段的\
  \ `数值数量` 设置大于 1 或设置为 `无限制`。自动完成文本框的功能相同，但支持以逗号分隔的 SKU 列表，并且“加入购物车”表单将自动调整，以允许客户选择要添加到购物车的合适产品。\n\
  \n在展示节点中包含产品字段是整个系统的关键功能，但这并非没有困难。对于单值产品引用字段，将所引用产品的字段提取到节点中进行显示非常容易，并且很明显，产品的最佳显示数据是存储在产品类型的字段中。最常见的例子是向产品类型添加一个图片字段，并将图片上传到产品本身，以便它们可以轻松地在产品展示节点或其他自定义显示和视图上显示。然而，对于多值产品引用字段，更难确定默认情况下应显示哪个产品的字段，以及某些数据是否应存储在产品上，尽管存在重复的可能性，例如仅作为单独产品列出以适应各种尺寸选项的\
  \ T 恤图片的情况。随着 Drupal Commerce 的成熟，您的方法可能会改变，但目前的最佳策略是将尽可能多的关于产品的原始数据（包括任何相关图片）存储在产品本身的字段中。\n\
  \n\n\n### 客户\n\n`Customer`模块定义了一个客户配置实体以及相关的客户配置引用字段，其工作方式类似于订单项引用字段，用于将客户配置数据与订单关联。客户配置实体支持任意数量的、由模块定义的可字段化包，这些包被称为客户配置类型。对客户配置的更改会通过修订版本进行记录，并且特别注意确保客户配置被复制而非仅仅更新，以保留被先前订单引用的客户配置数据。每个客户配置类型可以拥有自己的一组字段来收集与该配置类型相关的数据，从而允许您在必要时为账单地址和收货地址配置收集不同的信息。像默认的账单信息类型这样的客户配置类型，会使用`地址字段`模块定义的国际地址字段来收集符合国际标准的姓名和地址信息。\n\
  \n客户配置旨在作为从客户处收集完成订单所需信息的主要方法。这些信息与常规的用户账户系统分开维护，以提供几个关键的灵活性点。首先，这种模式允许用户维护每种类型的多个配置，这类似于大多数主要电子商务网站常见的地址簿功能。其次，允许回头客引用以前使用过的配置，仅在信息发生变化时才创建新配置，从而减少数据重复。第三，允许团体购买的店铺可以授予多个用户访问同一客户配置信息的权限，并将创建新配置的能力委托给每个团体的管理员。第四，客户配置数据可以针对匿名用户的订单进行收集和存储，这样如果店铺不希望的话，就无需创建用户账户。如果客户数据直接与用户账户绑定，这种级别的匿名结账是不可能实现的。\n\
  \n客户配置类型通过 `hook_commerce_customer_profile_info()` 由模块定义。与订单项类型一样，模块可以在首次启用这些配置类型时执行配置步骤，以确保存在默认字段。`Customer`模块为每种客户配置类型提供了结账表单集成，为客户提供提供信息的地方，并且它会向订单对象添加客户配置引用字段，为管理员提供添加和编辑配置的位置。与订单项管理器小部件不同，客户配置管理器小部件一次只支持引用单个配置。最后，该模块在“商店”菜单中添加了一个“客户配置”项目，允许您创建、查看、更新和删除客户配置，并有一个单独的选项卡允许您查看所有客户配置类型的列表并管理它们的字段。您添加到客户配置类型的任何字段都将出现在结账表单、订单编辑表单以及客户配置显示页面上。\n\
  \n### 订单\n\n订单系统由订单实体、订单状态和状态信息以及一个旨在帮助您处理订单数据和更新订单的 API 组成。订单实体定义了一个支持对订单数据的任何更改进行修订的单一可字段化包。从营销和安全角度来看，跟踪订单在其整个工作流程中的变化非常重要，这允许管理员跟踪客户在结账前与网站的交互，以及跟踪其他管理员之后对订单所做的更新。因此，特别注意确保订单及其关联的订单项和客户配置也在必要时进行修订。\n\
  \n除了前面提到的订单项和客户配置数据，订单还包含跟踪订单状态、创建和更新时间戳以及所有者信息的元数据。订单状态是订单生命周期中的当前步骤，为管理员提供有关订单已发生什么以及订单处理下一步将是什么的信息。订单状态的范围从与购物车相关和与结账相关的状态，到以完成状态结束的各种结账后状态。它们被组织到称为订单状态的容器中，这些容器代表了订单经历的更大阶段。所有者信息包括创建订单的用户\
  \ ID（无论该订单是通过购物车还是管理表单创建的）以及一个联系电子邮件地址，如果用户已登录，该地址默认为用户的电子邮件，但如果用户在结账表单上以匿名方式提供，则可能不同或由匿名用户提供。\n\
  \n订单管理的默认用户界面是一个视图，该视图列出所有订单，并在“商店”菜单的“订单”项中提供一个订单创建链接，以及在“商店”![图片](img/U001.jpg)“配置”菜单中有一个包含字段管理选项卡的设置区域。默认的订单视图首先显示最近的订单，并显示订单号，该订单号可以是任何字母数字值，即使它默认为订单\
  \ ID，以及包括订单总额和当前状态在内的其他元数据。\n\n虽然默认的订单视图相当基本，但正是在这里，将 Drupal Commerce 的默认 UI 标准化到\
  \ Views 上的决定真正得到了回报。许多店铺需要定制的订单管理界面，以适应其独特的订单工作流程和履行需求。站点构建者可以使用熟悉的 Views 界面和主题系统来定制现有界面，添加额外的排序和过滤选项，并通过各种贡献的\
  \ Views 模块（例如用于批量更新的 Views Bulk Operations）对其进行扩展。\n\n### 支付\n\n`Payment`模块定义了一个支付交易实体，该实体记录任何由模块定义的支付方式的支付尝试，并通过结账流程或订单的支付表单将这些交易与订单关联起来。支付方式由贡献模块为任何给定支付服务提供的每种可能支付方式所定义。如前所述，核心项目中不包含真正的支付方式，以使支付服务集成代码能够独立于核心开发周期而成熟。`Payment`模块确实为常见的支付方式类型提供了可重用的代码，您应该在自己的集成模块中重用这些代码，例如一个标准化的信用卡数据输入表单。\n\
  \n每当进行支付尝试时，都会创建支付交易，记录尝试的时间和细节、支付服务返回的数据以及支付的结果或当前状态。支付交易实体为每个启用的支付方式定义了包，但它不允许向这些包附加字段。对支付交易的更新通过修订版本进行记录，但从支付服务接收的负载数据除外。该数据维护在一个序列化数组中，每个与交易相关的消息都有一个新值，并且仅对支付管理员可见，用于调试目的。\n\
  \n当为订单创建支付交易时，它们会显示在订单的“付款”选项卡页面上的一个付款选项卡中。此选项卡包含一个视图，该视图按时间顺序列出订单的所有交易，其页脚包含待支付的余额以及手动输入付款的表单。在开发和测试期间，您可以利用\
  \ `Payment Method Example` 模块来测试付款的接收和记录，从而产生完全支付的订单，如图 25-7 所示。\n\n![images](img/2507.jpg)\n\
  \n***图 25-7.** 付款按时间顺序列在“付款”选项卡上，您还可以在此找到对付款执行任何必要操作的链接，以及手动向订单添加新付款的表单。*\n\n\n\n\
  #### 启用支付方式\n\n“支付方式示例”模块也可作为开发自定义支付方式模块的模型。定义新的支付方式并非极其复杂的过程，主要涉及实现 `hook_commerce_payment_info()`，并定义用于收集和传递客户信息到支付服务的回调函数。对于需要重定向到第三方网站提交付款详情的支付方式，还有额外的适配措施，以确保这些支付方式能正常融入标准的结账流程。与订单项类型文档类似，请参考\
  \ *Drupal Commerce 规范*手册中“信息钩子”部分的“支付”页面，以获取关于正确集成支付系统的最新信息。\n\n支付模块定义了两个用于在结账表单中处理客户付款的结账窗格。基本的“付款”窗格会在“审核结账”页面向客户展示所有可用的支付方式以供选择，并且会自动更新，以包含收集所选支付方式所需处理流程的附加表单元素。如果选择了站外支付方式，客户将通过“站外支付重定向”结账窗格从付款结账页面被重定向，该窗格也能处理从站外支付服务返回的客户。对于可以直接在您的网站上处理的支付方式，此页面将被跳过。\n\
  \n可用支付方式的列表通过与“规则”模块的集成来确定。每种支付方式都会收到一个默认的规则配置，您必须启用该配置，支付方式才会出现在结账表单中。每种支付方式通常还需要在启用它的规则配置的操作表单中进行额外设置。此外，如有必要，您可以在规则配置中添加客户使用该支付方式时必须满足的任何条件。\n\
  \n![images](img/2508.jpg)\n\n***图 25–8.** 支付方式通过规则配置启用，此处是为示例支付方式进行的配置。*\n\n请按照以下说明，为拥有“管理员”用户角色的用户启用“示例”支付方式，从而得到如图\
  \ 25–8 所示的规则配置：\n\n1.  浏览至“商店”![Image](img/U001.jpg)“配置”菜单中的“支付设置”页面。\n2.  在“禁用的支付规则”表格中，点击“示例”支付规则配置对应的“启用”操作链接，并在后续的表单中确认该操作。\n\
  3.  点击该规则配置的“编辑”操作链接，查看总览表单，其中会列出触发此规则的事件（“为订单选择可用支付方式”）、执行时检查的条件，以及评估成功时要执行的操作。唯一的操作将是“启用支付方式：示例支付”操作。通过“编辑”操作链接查看其配置表单，了解通常应在何处输入支付方式设置。\n\
  4.  返回该规则配置的总览表单，点击“条件”表格底部的“添加条件”链接。选择“用户拥有（若干）角色”这一条件，然后通过“继续”按钮提交表单。\n5.  现在您需要告诉规则引擎应检查哪个用户的哪个角色。在“用户”字段集中，在“数据选择器”文本框中选定或输入\
  \ `site:current-user`。此令牌告诉规则引擎使用当前登录用户来评估此条件。在“角色”字段集中，将“管理员”指定为“值”，然后通过“保存”按钮提交表单。\n\
  6.  您的总览表单现在应类似于图 25–8，这将使得拥有“管理员”角色的用户在结账表单上能够使用“示例”支付方式。\n\n对于您希望在结账表单上启用的任何其他支付方式，都需要重复此过程。不过，管理支付表单不依赖于规则，它会显示管理员可以处理的任何可用支付方式。重定向支付方式通常无法在此工作，因为它们通常依赖于结账特定的信息或客户的用户名和密码。\n\
  \n![images](img/square.jpg) **提示** 大多数主流支付服务都有与之集成的 Drupal Commerce 模块，因此在开发自己的集成模块之前，请先在\
  \ `drupal.org` 上搜索电子商务模块。\n\n\n\n### 结账\n\n结账系统由一个可插拔的结账表单和一个管理端的结账表单构建器组成，后者允许你通过拖拽界面来排序和配置结账表单的组件。结账表单由包含一组模块定义的结账窗格的结账页面构成，这些窗格是用于显示订单详情以及收集客户与支付信息的字段集。\n\
  \n虽然该表单默认采用两步流程，并在独立页面上进行审核与支付，但只需点击几下鼠标，即可配置为单步流程：表单提交时即处理订单，成功时立即重定向至完成页面。这种配置是否适合你的商店，取决于你所使用的支付方式以及商店是否具有可能需要额外结账步骤的业务规则。\n\
  \n![images](img/square.jpg) **提示** 两步流程是默认设置，这样客户可以在提交支付信息之前，先查看其订单的完整详情。出于安全原因，某些支付方式必须在提交表单时立即处理，这意味着支付应在结账完成前的最后一步进行。在决定实施单步结账表单之前，请理解你所用支付方式的限制。\n\
  \n结账表单的目的是收集为正确履行订单所需的任何信息，包括在“支付”部分讨论过的支付处理。随着订单在结账表单中逐步推进，其状态会相应更新以反映当前所在的页面，这让你能够保留订单在结账过程中被放弃时的位置信息。订单上的数据对于挽回这些销售、简化结账流程以提高转化率可能至关重要。\n\
  \n由结账模块和支付模块定义的默认结账页面包括：\n\n*   *结账*：显示购物车内容并收集客户资料信息。\n*   *审核订单*：显示已输入数据的摘要并收集支付详情。\n\
  *   *支付*：是跳转到站外支付方式的转向点；如果不需要则跳过。\n*   *结账完成*：是最终着陆页，显示订单摘要、相关的订单链接以及订单履行信息。\n\n\
  每个页面上出现的结账窗格是完全可定制的，任何没有窗格的页面都将在结账工作流中被跳过。你可以使用此前在《Drupal Commerce 规范》手册中“信息钩子”部分的“结账”页面上描述的钩子，向图\
  \ 25-9 所示的结账表单构建器暴露额外的结账页面和窗格。\n\n![images](img/2509.jpg)\n\n***图 25-9.** 可以使用拖拽式结账表单构建器轻松重新配置结账表单。*\n\
  \n实际上，结账模块并不依赖购物车模块，这意味着你可以启用结账表单，但设计其他方法来根据客户行为创建订单，或者为客户提供链接以访问管理员创建的订单。基本的结账\
  \ URL 实际上由购物车模块定义，作为指向特定订单结账 URL（`checkout/#`）的路由。结账表单不使用 Drupal 的多步表单功能在单一 URL\
  \ 上推进，因此随着客户在表单中推进，当前结账页面实际上会反映在 URL 中。\n\n你大多需要自行配置 Drupal，以提供最佳的结账体验。有许多网站和文章讨论如何优化电子商务网站以提高转化率，而\
  \ Drupal 的灵活性将很好地帮助你优化结账页面。至少，你应该在结账页面上禁用不必要的区块和菜单，并使用主题功能来突出显示客户应使用的按钮，以便访问结账表单并在其中推进流程。\n\
  \n### 购物车\n\n购物车模块启用了一个相当标准的购物车系统，允许客户将产品添加到购物车订单中，然后通过结账表单进行购买。一旦客户将商品添加到购物车，就会创建一个新订单，该订单将一直存在，直到通过结账完成。有一个默认的“购物车”订单状态和订单状态值，但其他状态值也可以告知购物车模块它们是购物车状态，就像表示结账表单中默认的结账和审核步骤的状态值一样。这使得客户可以在实际提交支付之前更新购物车的内容。\n\
  \n购物车通过一个 Drupal 区块表示，如图 25-10 所示，该区块由一个视图组成，列出购物车订单上的订单项，底部有汇总订单项并链接到购物车页面和结账表单的页脚。该区块相当动态，可以通过视图用户界面轻松定制，并使用主题使其与你的网站匹配。购物车页面提供了一个同样通过视图构建的表单，允许用户更新购物车内容并继续结账。\n\
  \n![images](img/2510.jpg)\n\n***图 25-10.** 默认的购物车区块完全可以通过视图用户界面进行配置。*\n\n购物车 API\
  \ 包含用于加载和更新购物车订单的功能，以及一个多功能的“添加到购物车”表单功能。“添加到购物车”表单对产品引用字段的显示格式化程序会将引用的产品 ID 传递给此表单，该表单会检查传入的值以决定如何显示该表单。单个产品表单只会为隐藏表单值中指定的产品显示一个“添加到购物车”按钮，而多个产品表单的外观则会有所不同；它们可能显示为单一选择列表、单选按钮组或复选框组，允许客户根据产品标题选择要添加的产品，或者显示为一组动态生成的小部件，代表被引用产品上的通用属性字段。当客户更新所选的产品或属性时，该表单会使用表单\
  \ API 的 `#ajax` 属性，在将产品添加到购物车之前，相应地更新页面上的元素。\n\n\n\n#### 主要组件概述\n\n关于各系统如何架构，还有更多内容可以阐述，但通过快速审视核心模块，您应能对\
  \ Drupal Commerce 各主要部件如何协同工作有一个功能性的理解。您需要掌握的关键点是，尽管核心模块并未提供一个开箱即用的完整电子商务应用，但必要的系统已经就位，可供其他模块扩展，并在网站构建过程中充实完善，以提供您的网站所需的电子商务体验。\n\
  \n表格 25–1、25–2 和 25–3 总结了主要的 Commerce 组件，具体而言，是之前模块讨论中提到的所有实体和字段。\n\n![images](img/t2501.jpg)\n\
  \n**表 25-2** . Drupal Commerce 核心字段\n\n| **名称** | **小部件** | **显示格式器** |\n| --- |\
  \ --- | --- |\n| 客户资料引用 | 客户资料管理器 | 客户资料显示 |\n| 订单项引用 | 订单项管理器 | 订单项视图 |\n| 价格 |\
  \ 价格文本字段 |  |\n| 带货币的价格 | 原始金额 |  |\n| 格式化金额 |  |  |\n| 产品引用 | 自动补全文本字段 |  |\n|\
  \ 选择列表 |  |  |\n| 复选框/单选按钮 | 添加到购物车表单 |  |\n| SKU（库存量单位） |  |  |\n| 标题 |  |  |\n\
  \n**表 25-3** . 默认订单状态与状态值\n\n| **订单状态** | **订单状态值** |\n| --- | --- |\n| 已取消 | 已取消\
  \ |\n| 购物车 | 购物车 |\n| 结账 | 结账：结账（功能同购物车） |\n| 结账：审核（功能同购物车） |  |\n| 结账：付款 |  |\n\
  | 结账：完成 |  |\n| 待处理 | 待处理（允许访问完成页面） |\n| 处理中（允许访问完成页面） |  |\n| 已完成 | 已完成（允许访问完成页面）\
  \ |\n\n### 实施 Drupal Commerce\n\n通读介绍各系统、实体和字段的讨论后，您应能体会到这种设计电子商务系统方法所提供的强大功能与灵活性。然而，您可能也推测到了，构成\
  \ Drupal Commerce 的松耦合组件需要您付出额外的用心和专业能力，以确保它们得到成功配置。\n\n老话诚然不虚：能力越大，责任越大。现在，您需要确保在使用这些工具时能按预期行事，同时提供满足网站需求和客户期望的电子商务体验。搭建\
  \ Drupal Commerce 站点需要提前进行额外的规划工作，因此本章的最后部分提供了一些技巧，帮助您入门，并减少在开发多个站点时会遇到的一些重复性任务。\n\
  \n由于电子商务只是 Drupal 站点的一部分，您应确保遵循 Drupal 站点构建的最佳实践。提前规划您的内容类型、视图、角色和权限，以确保网站基础稳固且安全。配置\
  \ Commerce 组件只是您常规流程的延伸，除了内容类型之外，还需要您规划产品类型，并专门为商店管理添加角色。\n\n此外，您应采取额外预防措施，以确保 Drupal\
  \ 站点的安全性。计划定期维护以保持 Drupal 和您贡献模块的最新状态；全面测试您的支付系统和结账工作流，以确保支付数据不会泄露，且在支付完成前订单不会被履行。处理站点内信用卡支付时，确保您的结账配置允许包含支付结账窗格的页面在提交时，支付方式模块能够处理支付。您还应利用其他贡献模块来增强安全性，例如使用\
  \ Secure Pages 为您的站点添加 SSL 保护。\n\n最后，从项目伊始，目标就是让站点构建者和开发者能够创建可重用的 Drupal Commerce\
  \ 发行版和针对特定电子商务用例的功能模块。搭建 Drupal Commerce 安装所涉及的工作量，不是您在每个新站点上都愿意重头再来的，这需要您具备大多数新用户难以掌握的\
  \ Drupal 熟练程度。随着 Drupal 的定向发行版越来越流行，加之 `drupal.org` 本身自动安装配置文件打包功能的助力，Drupal Commerce\
  \ 的愿景是看到许多这样的发行版面向电子商务站点，例如：\n\n- 拥有现成产品类型和展示的服装服饰店。\n- 销售用户角色、节点访问权限和其他类型权限的付费内容与会员站点，支持固定费用和定期付款。\n\
  - 非营利组织的外展与捐款收集站点。\n- 基于社区的活动注册与支持站点。\n\n基于这一策略和愿景，Commerce 组件也被设计为可供 Features 和其他支持可导出站点配置的模块使用。此外，为默认用户界面使用视图，为订单工作流自动化使用规则，使得您可以导出您的设置以及\
  \ Commerce 配置。对所有 Commerce 对象标准化使用实体和字段，为导入和导出电子商务数据提供了统一的数据模型。利用所有这些部件来开发可重用站点和定制发行版，需要您进行有意识的规划，但无论是在您自己的站点构建工作流中，还是在社区使用方面，其回报都值得付出这些努力。\n\
  \n### 开发历史\n\nDrupal Commerce 的部分特性，最好从其基于之前 Drupal 电子商务项目的发展历程来理解。Drupal Commerce\
  \ 的功能集和可用性目标源于 Ubercart，其开发哲学受到为 Ubercart 进行开发的社区经验以及 e-Commerce 模块最新版本实施的重大变革的双重影响。然而，Commerce\
  \ 模块的代码和用户界面与之前的项目几乎毫无相似之处，因为这些新模块是专门为 Drupal 7 编写的，遵循本章后面概述的一套严格的开发标准。\n\nCommerce\
  \ 最初从 Ubercart 分离时的主要目标包括：\n\n- 为贡献模块开发者建立一个文档更完善、更易于使用的 API。\n- 将插件模块与核心系统分离，使每组模块能够独立于其他模块的关注点而成熟。\n\
  - 基于 Drupal 7 的实体和字段系统建立数据对象模型，依靠用户界面来减少可能随之而来的重复数据录入。\n- 使用 Drupal 的测试框架为核心模块提供完整的测试覆盖。\n\
  - 利用安装配置文件和如 Features 等模块来提供默认配置，而不是仅关注模块本身的完整用户体验。\n- 提供从 Ubercart 到 Drupal Commerce\
  \ 的迁移路径。由于功能并非一一对应，因此无法从一个模块直接更新到另一个。\n\n自项目启动以来，开发是分阶段完成的，每个系统在开发之前，都会在项目论坛、IRC\
  \ 和实体代码冲刺中进行提议和讨论。要了解更多关于项目的历史，并随时了解开发提案和路线图，请参阅 `drupalcommerce.org` 上的论坛和文档。\n\
  \n\n\n#### 设计理念\n\n初次浏览 Commerce 模块列表时，有两件事可能会引起你的注意，需要稍加解释。首先是大量可用的模块，以及部分模块被拆分为\
  \ API 模块和 UI 模块对。虽然有些用户会因为安装和配置各种模块所需的设置工作而却步，但这种划分是刻意为之的，目的是让同一组模块能够适应更多样化的电子商务网站。随着你的经验增长，你可以为特定网站只启用所需的模块，同时安装配置文件和其他模块可以为常见用例提供默认配置。\n\
  \n例如，通过将默认 UI 与实际定义数据对象和核心 API 的模块分离，网站构建者可以自由地为不适合其网站的 UI 部分提供完整的替代组件。此外，通过将某些系统拆分为其组成部分（例如将购物车和结账流程分离），同一套核心\
  \ Commerce 模块可以用于传统的基于购物车的商店、没有结账流程但使用购物车来提供报价的网站，以及由管理员创建订单并向客户发送结账链接以提供付款的发票网站。\n\
  \n![图片](img/square.jpg) **注意：** 对于 Drupal 6 的大多数用户来说，这种做法应该并不陌生，因为从那时起，Views 和 Rules\
  \ 就已经将它们的默认用户界面分离到单独的模块中。Drupal 7 通过将 Field 系统划分为 Field 和 Field UI 模块，延续了这一做法。\n\
  \n第二件引人注意的事情是，缺少添加常见电子商务功能的模块，例如产品促销工具、折扣和优惠券，以及与第三方支付和履行服务的集成。在 Drupal Commerce\
  \ 最早的规划阶段，项目的目标是在核心项目中只包含那些必要的系统和数据对象，没有它们项目就无法连贯运行，并且这些系统和数据对象是构建和支持所有必要的非核心功能所必需的。这并不意味着核心模块中未包含的功能就不重要，或者不值得特别关注和维护。相反，这是一项架构决策，旨在通过让核心系统能够迭代到新版本而无需首先更新每个插件模块，从而整体上改进开发过程。\n\
  \n一个很好的例子是，核心项目中包含了 Payment 模块，却没有实际集成主要支付服务的模块。在核心项目中包含集成了常见支付服务的模块可能并不方便，但将集成模块的开发与核心项目解耦，可以允许各个项目按照自己的时间表成熟并整合新功能。核心\
  \ Payment 模块可以在不要求先在新系统上测试和更新一批支付模块的情况下进行改进和发布；同时，集成模块也可以自由地响应所集成服务的 API 和功能变化，而无需等待\
  \ Drupal Commerce 的新版本发布。\n\n项目设计理念的最后一个主要点是，依赖于安装配置文件和像 Features 这样的模块，以简化针对各种目标用例启动新\
  \ Drupal Commerce 网站的过程。核心模块不会对使用它们的网站的用例或业务需求做任何假设。相反，它们专注于保持灵活和可扩展，支持可导出的配置，并开发可以嵌入到任何地方的表单，而不是将其限制在默认的\
  \ UI 实现中。该项目的目标是，让发行版能够为利基市场（例如服装店、活动注册网站和非营利组织的捐赠网站）提供开箱即用的体验。\n\n#### 开发标准\n\n\
  除了采用注重模块化和可重复配置的设计理念外，Drupal Commerce 还采用并强制执行了一套严格的开发标准，以简化开发和维护。主要目标是为开发者提供一个文档完善、一致的\
  \ API，以便他们在其贡献的模块和安装配置文件中进行集成。不符合 `drupalcommerce.org/development/standards` 列出的开发标准的补丁将不被接受。\n\
  \n虽然这些标准偶尔会因 Drupal 核心更新和需要采用新标准的问题而发生变化，但当前的标准列表涵盖了以下主题：\n\n- 基于 Drupal 自身编码标准的代码语法和文档。\n\
  - 模块文件和目录结构。\n- 模块 `.info` 文件的包命名。\n- 函数和钩子命名，以避免常见的 PHP 不一致问题，并为钩子提供基于模式的命名空间。\n\
  - 正确使用 Drupal 的测试框架。\n- 使用核心和贡献模块的 API。\n- 采用细粒度的权限和可扩展的访问控制。\n- 本地化和用户界面字符串存储。\n\
  - 模板文件和主题函数。\n- 适当分离核心 API 与默认 UI。\n- 覆盖数据库和内存使用情况的性能考量。\n- 通过实体和字段数据表实现规范化的数据存储。\n\
  \n### 构建于 Drupal 7 之上\n\nCommerce 模块的编写旨在利用 Drupal 7 的许多改进，最显著的是其可字段化的实体系统。它们的灵活性也很大程度上归功于\
  \ Views（提供包括购物车和产品列表在内的显示的查询构建器）和 Rules（用于在结账完成和订单更新等事件发生时执行条件操作的贡献系统）。本书的其余部分旨在涵盖\
  \ Drupal 7 的许多改进，但这里重点强调几个对 Drupal Commerce 具有特殊意义的内容。\n\n#### 核心实体和字段\n\nDrupal\
  \ 7 的标志性新功能是其可字段化实体系统。现在，不再需要将所有内容都设为节点才能从像 Drupal 6 的内容构建工具包这样的模块中受益，这促使了对用户组和电子商务等主要系统的重新思考。贡献模块可以标准化实体系统，以定义新的数据对象，这些对象可以与任意数量的模块定义或用户可配置字段捆绑在一起。\n\
  \n\n\n### 产品实体\n\nDrupal Commerce 全面拥抱了新系统，将所有自定义数据对象定义为可字段化的实体，并根据实体类型灵活使用包（Bundle）和修订。例如，以往\
  \ Drupal 的电商项目依赖节点系统来实现产品，而 Drupal Commerce 则定义了特定的产品实体。该实体拥有多个包，每个包构成一种不同的产品类型，可包含用于描述产品的字段，并支持从“添加到购物车”表单的一组产品中进行选择。\n\
  \n为了定义产品实体，产品模块使用了清单 25–1 中的代码。\n\n**清单 25–1.** 定义产品实体\n\n```\n/**\n  * 实现 hook_entity_info()。\n\
  \  */\nfunction commerce_product_entity_info() {\n  $return = array(\n    'commerce_product'\
  \ => array(\n    'label' => t('Product'),\n    'controller class' => 'CommerceProductEntityController',\n\
  \    'base table' => 'commerce_product',\n    'fieldable' => TRUE,\n    'entity\
  \ keys' => array(\n      'id' => 'product_id',\n      'bundle' => 'type',\n    ),\n\
  \    'bundle keys' => array(\n      'bundle' => 'type',\n    ),\n    'bundles' =>\
  \ array(),\n    'load hook' => 'commerce_product_load',\n    'view modes' => array(\n\
  \      …\n    ),\n    …\n  );\n\n  foreach (commerce_product_type_get_name() as\
  \ $type => $name) {\n    $return['commerce_product']['bundles'][$type] = array(\n\
  \      'label' => $name,\n    );\n  }\n\n  return $return;\n}\n```\n\n请注意，实体数组的结构包括与数据库中产品存储相关的键，以及用于通过保存、加载和删除函数对产品执行\
  \ CRUD 操作的控制器类 `CommerceProductEntityController`。这些值中的任何一个都可以通过 `hook_entity_info_alter()`\
  \ 进行修改，以改变产品数据存储的性质，但在做出此类决定时应谨慎，因为这可能会中断其他模块（如视图模块）利用数据的能力。\n\n上述代码片段中省略的部分处理了产品可用显示模式的定义，以及规则模块用于处理产品实体的各种回调函数的定义。`foreach`\
  \ 循环使用 `commerce_product_type_get_name()` 中的数据填充产品实体的包数组，这是一个 API 函数，它调用 `hook_commerce_product_info()`\
  \ 从已启用的模块中收集关于可用产品类型的信息。\n\n### 订单实体\n\n同样，订单对象被定义为一个实体，允许管理员根据站点的业务需求轻松地向默认订单包添加字段。然后，这些订单利用实体修订功能来跟踪订单数据的所有更改。\n\
  \n当一个实体未被定义支持多个包时，它默认使用单个包，其机器名称与实体本身相同。对于订单，显式定义了单个包，这使得默认行为变得多余，如清单 25–2 所示。\n\
  \n**清单 25–2.** 显式定义单个包\n\n```\n/**\n * 实现 hook_entity_info()。\n */\nfunction commerce_order_entity_info()\
  \ {\n  $return = array(\n    'commerce_order' => array(\n      'label' => t('Order'),\n\
  \      'controller class' => 'CommerceOrderEntityController',\n      'base table'\
  \ => 'commerce_order',\n      'revision table' => 'commerce_order_revision',\n \
  \     'fieldable' => TRUE,\n      'entity keys' => array(\n        'id' => 'order_id',\n\
  \        'bundle' => 'type',\n        'revision' => 'revision_id',\n      ),\n \
  \     'bundle keys' => array(\n      'bundle' => 'type',\n      ),\n      'bundles'\
  \ => array(\n        'commerce_order' => array(\n          'label' => t('Order'),\n\
  \        ),\n      ),\n      'load hook' => 'commerce_order_load',\n      'view\
  \ modes' => array(\n        …\n      ),\n      …\n    ),\n  );\n\n  return $return;\n\
  }\n```\n\n注意，`bundles` 数组仅包含一个包。如果你出于某些原因需要启用多个订单包，则必须使用 `hook_entity_info_alter()`\
  \ 修改此数组。订单模块的初始版本默认使用单个包，但在数据库和 API 层面支持多个包。\n\n如果你遇到需要定义自己可修订实体的情况，可以将订单实体作为模型。请注意，必须同时指定修订表（`revision\
  \ table`）和将订单链接到其当前修订版本的修订键（`revision key`）。你的控制器类必须添加对保存修订的支持，但你可以依赖 Drupal 的默认实体控制器来将修订信息正确加载到对象中。在你的控制器类的保存方法中，应在使用字段附加\
  \ API 添加或更新字段数据之前保存修订版本，以确保其与正确的修订版本一起保存。\n\n本章后面将包含实体及其属性的完整列表。你也可以将 `drupalcommerce.org/specification/entities`\
  \ 加入书签，作为开发期间的参考。\n\n此外，各种 Commerce 模块也利用字段 API 来连接数据对象、向受益于用户可配置显示选项的实体添加数据，以及将“添加到购物车”表单嵌入站点中的任何实体。这些字段的运行方式与\
  \ Drupal 6 中的 CCK 字段非常相似，并将在下文与核心实体一同列出。你也可以将 `drupalcommerce.org/specification/fields`\
  \ 加入书签，作为站点构建期间的参考。\n\n### 表单 API 改进\n\n表单 API 有几项改进，本节将涵盖其中两项。\n\n#### 通过 `#ajax`\
  \ 属性实现的动态表单\n\nCommerce 模块利用的表单 API 最显著的新特性之一是表单元素的 `#ajax` 属性。借助 `#ajax` 属性，无需编写一行\
  \ JavaScript 代码，即可创建表单元素在更改或其他用户交互时自动验证和更新的表单。\n\n在 Commerce 模块中，该功能在几个地方被使用。在订单编辑表单上，订单项表格使用\
  \ `#ajax` 属性，允许你在不刷新页面的情况下添加和更新订单项。客户模块与地址字段模块集成，后者使用此功能提供名称和地址元素，这些元素会自动更新以反映所选国家/地区的格式和词汇。\n\
  \n以下代码展示了使用 `#ajax` 实现动态表单是多么容易。代码取自支付模块的表单元素，当客户选择支付方式选项时，该元素会更新结账表单。完整实现位于 `commerce_payment.checkout_pane.inc`\
  \ 文件中。\n\n```\n// 添加一个单选小部件来指定支付方式。\n$pane_form['payment_method'] = array(\n  '#type'\
  \ => 'radios',\n  '#options' => $options,\n  '#ajax' => array(\n    'callback' =>\
  \ 'commerce_payment_pane_checkout_form_details_refresh',\n    'wrapper' => 'payment-details',\n\
  \  ),\n);\n```\n\n元素指定的 `callback` 函数只需返回表单数组的一部分，该部分应被渲染到由 `wrapper` 值（对应于 HTML\
  \ ID）指定的 DOM 区域中。使用此功能的表单会在 JavaScript 未启用的情况下进行测试，以确保优雅降级，这依赖于表单提交处理程序能够根据用于提交表单的按钮请求重新构建表单的能力。\n\
  \n\n\n#### 自动文件包含\n\nCommerce 模块重度依赖的 Forms API 的另一项创新，是在表单数组中指定 Drupal 在重建表单时应包含哪些文件。这使得模块可以将表单放入包含文件中，当提交处理表单时自动加载这些文件，而无需仅依赖活动菜单项的文件处理器。所有\
  \ Commerce 实体表单都使用了此功能，因此它们可以在默认 UI 模块特定的 URL 上实例化，或由其他贡献模块在必要时调用。实现此功能的代码相当简洁，如下例所示，摘自\
  \ `commerce_product.forms.inc`：\n\n```\nfunction commerce_product_product_form($form,\
  \ &$form_state, $product) {\n  // 确保从缓存重建表单时加载此包含文件。\n  $form_state['build_info']['files']['form']\
  \ = drupal_get_path('module', 'commerce_product')\n    . '/includes/commerce_product.forms.inc';\n\
  \  …\n}\n```\n\nDrupal 7 Forms API 的这两项新特性对 Drupal Commerce 至关重要。第一项使项目能够拥有动态表单，极大改善客户和管理员的用户体验。例如，结账表单可配置为在单页上运行，并能在不支持\
  \ JavaScript 的设备上优雅降级。第二项，由 Commerce 模块定义的表单可嵌入任何位置，完美契合了项目将 API 与 UI 严格分离的理念。\n\
  \n### 贡献模块依赖\n\n作为在 Drupal 7 上从零开始构建 Drupal Commerce 策略的一部分，项目决定充分利用其他主要贡献模块，以避免代码和工作的重复。这包括引入对广泛使用的\
  \ Views 模块、Rules 模块及其依赖项的依赖。\n\nViews 3 驱动了几乎所有 Commerce UI 模块提供的默认用户界面。这意味着每个列表页面、购物车区块以及嵌入其他表单中的某些表格显示，均可通过\
  \ Views UI 进行配置。Commerce 模块重度依赖 Views 3 新的可插件区域处理器功能，完全通过 Views 创建更强大的显示，例如购物车区块和订单上的“付款”标签。这两种显示都在其页脚中使用自定义区域处理器，向\
  \ Views 添加链接和表单。\n\n对 Rules 的依赖同样重要。Entity API 模块（本身是 Rules 2 的依赖项）使得将自定义实体和字段数据暴露给\
  \ Rules 变得简单。Commerce 模块与 Rules 集成，允许管理员通过统一界面配置动态定价、结账表单的某些部分以及订单工作流。最新版的 Rules\
  \ 还使得将 UI 部分嵌入各个位置变得容易，因此 Commerce 模块可以在默认 UI 的适当位置放置过滤后的配置列表。\n\nAddress Field（客户模块的依赖项）也作为一个独立的贡献模块维护。该项目定义了一个字段，允许用户通过根据所选国家更新的动态表单元素集输入姓名和地址信息。其目标是实现\
  \ xNAL 标准中关于姓名和邮政地址的子集，并保持独立性，以便它能独立于核心 Commerce 模块成熟，并允许其他项目或网站使用它。\n\n### 总结\n\
  \nDrupal Commerce 项目仍在成熟发展中，核心代码和贡献模块生态系统中的创新可能会在后续版本中快速变化。请务必关注项目主页（`drupalcommerce.org`）和问题追踪器（`drupal.org/project/issues/commerce`），了解此处概述的系统如何成熟，并寻找您可以贡献文档、测试、代码等的地方。当处理问题或开发扩展\
  \ Drupal Commerce 功能的贡献模块时，您通常也可以在 `irc.freenode.net` 的 `#drupalcommerce` IRC 频道中找到帮助。\n\
  \n"
