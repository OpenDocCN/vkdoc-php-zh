- fmt: "### Notice\n当用户单击浏览按钮时，HTML 会弹出一个熟悉的文件上传窗口。该窗口实际上是通过向用户操作系统发送一个隐藏的*API（应用程序编程接口）调用*来打开的。这保证了用户体验的一致性。此外，仅允许上传\
    \ JPEG 图片的限制是通过 API 调用作为参数传递的，该参数设置为仅显示 JPEG 格式的文件。\n\n### `php.ini`\n我们需要检查或调整`php.ini`文件中的几个设置，以允许并限制文件上传。`php.ini`文件包含所有初始化设置，每当\
    \ PHP 程序被解释时都会访问这些设置。根据您选择安装的 Apache/PHP/MySQL 软件包，该文件的位置会有所不同。但是，它与其他 PHP 文件位于同一位置。如果您安装了\
    \ XAMPP，它位于 XAMPP 文件夹下的 PHP 文件夹中。您可以使用任何文本编辑器（如记事本或 Notepad++）查看和编辑此文件。但是，如果您确实进行了更改，请先制作一个备份副本，以防出错。为了使更改生效，必须停止并重新启动\
    \ Apache 服务器。\n\n> **注意：** 可以通过在一个简单的 PHP 程序中显示（`echo`）PHP 函数`php_ini_loaded_file()`来发现`php.ini`文件的位置。\n\
    \n```\n;;;;;;;;;;;;;;;;\n; File Uploads ;\n;;;;;;;;;;;;;;;;\n; Whether to allow\
    \ HTTP file uploads.\n; http://php.net/file-uploads\nfile_uploads=On\n; Temporary\
    \ directory for HTTP uploaded files (will use system default if not\n; specified).\n\
    ; http://php.net/upload-tmp-dir\nupload_tmp_dir=\"C:\\xampp8.1.1\\tmp\"\n; Maximum\
    \ allowed size for uploaded files.\n; http://php.net/upload-max-filesize\nupload_max_filesize=40M\n\
    ; Maximum number of files that can be uploaded via a single request\nmax_file_uploads=20\n\
    ```\n\n在`php.ini`文件中，我们需要确保`file_upload`设置为`On`。我们还可以指定一个不同的位置来临时保存上传的文件（如果我们选择这样做）。我们可以调整允许上传的最大文件大小以及单个请求中允许上传的最大文件数量。应仔细考虑应使用哪些限制。我们应该始终假设会有人试图通过大量文件上传来淹没我们的服务器，从而使其崩溃。\n\
    \n### `$_FILES`\n当文件上传到 PHP 时，与文件相关的元数据会存储在一个关联数组中。这个超全局数组被命名为`$_FILES`。该数组包含有关上传文件的几个重要方面。\n\
    \n```\nArray (\n[image-data] => Array (\n[name] => alberte-lea.jpg\n[type] =>\
    \ image/jpeg\n[tmp_name] => /Applications/XAMPP/xamppfiles/temp/phpYPcBjK\n[error]\
    \ => 0\n[size] => 119090\n)\n)\n```\n\n`name`和`type`是自解释的。`tmp_name`是文件上传后的临时名称。如果文件太大（根据`php.ini`中的设置），则此项将设置为`\"\
    none\"`。错误代码为`0`或`UPLOAD_ERR_OK`表示文件上传成功。`size`是文件的字节数。其他可能的错误消息如下所列。\n\n```\n\
    UPLOAD_ERR_OK = File uploaded successfully\nUPLOAD_ERR_INI_SIZE = File is too\
    \ big to upload\nUPLOAD_ERR_FORM_SIZE = File is too big to upload\nUPLOAD_ERR_PARTIAL\
    \ = File was only partially uploaded\nUPLOAD_ERR_NO_FILE = No file was uploaded\n\
    UPLOAD_ERR_NO_TMP_DIR = Missing a temporary directory on the server\nUPLOAD_ERR_CANT_WRITE\
    \ = File cannot be saved to disk\nUPLOAD_ERR_EXTENSION = Invalid file extension\n\
    ```\n\n### 安全编程\n黑客可以操纵`$_FILES`关联数组的内容。唯一的例外是`tmp_name`不能被更改。因此，在使用此数组中的信息时，我们需要对其进行验证。\n\
    \n在移动文件之前，我们可以创建一个函数来验证文件及其大小。\n\n```\n<?php\nfunction checkFile($tmpName, $variableName)\
    \ {\n    $valid_File_Types = array('image/jpeg' => 'jpg');\n    $max_Size = 40\
    \ * 1024 * 1024;\n    // 40MB must be the same size or less than the setting in\
    \ php.ini\n    $errorStatus = false;\n    if (!isset($_FILES[$variableName]))\
    \ {\n        // error $_FILE does not exist\n        $errorStatus = true;\n  \
    \  } else {\n        $info = finfo_open(FILEINFO_MIME_TYPE);\n        if (!$info)\
    \ {\n            // error Can't open finfo using mime type\n            $errorStatus\
    \ = true;\n        } else {\n            $mime_type = finfo_file($info, $tmpName);\n\
    \            if (!in_array($mime_type, array_keys($valid_File_Types))) {\n   \
    \             // error invalid file type\n                $errorStatus = true;\n\
    \            } else {\n                if (filesize($_FILES[$variableName]['tmp_name'])\
    \ > $max_Size) {\n                    // error file size too big\n           \
    \         $errorStatus = true;\n                }\n                finfo_close($info);\n\
    \            }\n        }\n    }\n    return $errorStatus;\n}\n// Code below used\
    \ for testing only\n$variableName = 'image-data';\n$tmp = $_FILES['image-data']['tmp_name'];\n\
    if (!checkFile($tmp, $variableName)) {\n    echo \"File is valid\";\n} else {\n\
    \    echo \"Invalid File\";\n}\n?>\n```\n\n**清单 4-12：`checkFile.php`**\n\n哇，很多新代码。但让我们一步一步地分解它，看看发生了什么。\n\
    \n```\n$valid_File_Types = array('image/jpeg' => 'jpg');\n$max_Size = 40 * 1024\
    \ * 1024;\n// 40MB must be the same size or less than the setting in php.ini\n\
    $errorStatus = false;\n```\n\n`$valid_File_Types`是包含我们可接受文件类型的数组。目前，只有一个条目，但我们可以轻松添加其他文件类型。`$max_Size`是我们允许的单个文件的最大大小。这必须等于或小于`php.ini`文件中存储的值。`$errorStatus`被设置为`false`，默认情况下表示我们正在上传的文件没有问题。\n\
    \n```\nif (!isset($_FILES[$variableName])) {\n    // error $_FILE does not exist\n\
    \    $errorStatus = true;\n```\n\n如果从 HTML 表单传递的变量名（`image_data`）在`$_FILES`数组中不存在，我们将错误状态设置为`true`。这可能表明数组被篡改了。\n\
    \n```\n$info = finfo_open(FILEINFO_MIME_TYPE);\nif (!$info) {\n    // error Can't\
    \ open finfo using mime type\n    $errorStatus = true;\n```\n\n如果`$info`未设置，则当我们尝试使用`finfo`查看\
    \ MIME 类型时发生了问题。这并不表示我们上传的文件有问题，而是表明我们遇到了其他问题。\n\n```\n$mime_type = finfo_file($info,\
    \ $tmpName);\nif (!in_array($mime_type, array_keys($valid_File_Types))) {\n  \
    \  // error invalid file type\n    $errorStatus = true;\n```\n\n如果*MIME 类型*（文件后缀）与`$valid_File_Types`数组中的任何一个不匹配，则将错误状态设置为`true`。\n\
    \n```\nif (filesize($_FILES[$variableName]['tmp_name']) > $max_Size) {\n    //\
    \ error file size too big\n    $errorStatus = true;\n```\n\n如果上传的临时文件的大小大于我们允许的最大值，则错误状态设置为`true`。\n\
    \n```\nreturn $errorStatus;\n}\n$variableName = 'image-data';\n$tmp = $_FILES['image-data']['tmp_name'];\n\
    if (!checkFile($tmp, $variableName)) {\n    echo \"File is valid\";\n} else {\n\
    \    echo \"Invalid File\";\n}\n```\n\n> **注意：** 您可以使用`ch4`文件夹下`views`文件夹中的`testUploadForm.php`运行此程序。\n\
    \n错误状态会返回给调用它的程序。在这个测试中，我们在函数下方直接调用了它，并设置了变量名，从当文件通过 HTML 表单上传时创建的`$_FILES`数组中获取了文件的临时名称。然后将此信息传递到函数中。如果函数返回`false`，则表示一切正常。如果返回`true`，则说明有问题。\n\
    \n现在我们有了验证上传文件的能力，我们可以通过将文件从临时位置移动来完成上传过程。\n\n### 使用 PHP 上传文件\n当文件最初被上传时，它会被放置在服务器上的一个临时目录中，并使用一个临时名称，如数组中的`tmp_name`值所示。请记住，这个位置是在`php.ini`文件中确定的，并且可以通过更新`php.ini`并重启\
    \ Apache 来更改。要永久存储文件，我们必须将其从临时位置移动到一个永久位置。"
  raw: "Notice that when the user clicks the browse button, the HTML\nretrieves a\
    \ familiar file upload window. This window is actually called\nusing a hidden\
    \ *API (application programming interface) call* to\nthe user’s operating system.\
    \ This keeps consistency in the user\nexperience. Also, the limitation to only\
    \ allow JPEG images is passed as\na parameter through the API call, which is set\
    \ to the default display of\nthe files available to only JPEG images.\n\nphp.ini\n\
    There are several settings we need to check or adjust within the\n *php.ini file*\n\
    \ to allow and limit file uploads. The php.ini file contains all\ninitialization\
    \ settings that are accessed whenever a PHP program is\ninterpreted. Depending\
    \ on the Apache/PHP/MySQL package you have chosen\nto install, the location of\
    \ this file will vary. However, it is located\nin the same location as other PHP\
    \ files. If you installed XAMPP, it is\nlocated in the PHP folder under the XAMPP\
    \ folder. You can view and edit\nthis file with any text editor (such as Notepad\
    \ or Notepad++). However,\nif you do make changes, first make a backup copy, in\
    \ case you make a\nmistake. In order for the changes to take effect, the Apache\
    \ server must\nbe stopped and restarted again.\n\nNote\n\nThe php function *php_ini_loaded_file()*\
    \ can be displayed\n(echoed) within a simple PHP program to discover the location\
    \ of the\nphp.ini file.\n\n```\n;;;;;;;;;;;;;;;;\n; File Uploads ;\n;;;;;;;;;;;;;;;;\n\
    ; Whether to allow HTTP file uploads.\n; http://php.net/file-uploads\nfile_uploads=On\n\
    ; Temporary directory for HTTP uploaded files (will use system default if not\n\
    ; specified).\n; http://php.net/upload-tmp-dir\nupload_tmp_dir=\"C:\\xampp8.1.1\\\
    tmp\"\n; Maximum allowed size for uploaded files.\n; http://php.net/upload-max-filesize\n\
    upload_max_filesize=40M\n; Maximum number of files that can be uploaded via a\
    \ single request\nmax_file_uploads=20\n```\n\nWithin the php.ini file, we need\
    \ to make sure that file_upload is set\nto On. We can also specify a different\
    \ location to temporarily hold our\nupload files (if we choose). We can adjust\
    \ the maximum file size to be\nuploaded and the maximum number of files that can\
    \ be uploaded in a\nsingle request. Careful thought should be given to what limits\
    \ should be\nused. We should always assume that someone will attempt to bring\
    \ down\nour server by attempting to flood it with a massive amount of file\nuploads.\n\
    \n$_FILES\n\nWhen files are uploaded into PHP, the metadata associated with the\
    \ file\nare stored into an associative array. This superglobal array is named\n\
    \ *$_FILES*\n. The array contains several important aspects about the file\nuploaded.\n\
    \n```\nArray (\n[image-data] => Array (\n[name] => alberte-lea.jpg\n[type] =>\
    \ image/jpeg\n[tmp_name] => /Applications/XAMPP/xamppfiles/temp/phpYPcBjK\n[error]\
    \ => 0\n[size] => 119090\n)\n)\n```\n\nThe name and type are self-explanatory.\
    \ The *tmp_name* is the\ntemporary name of the file after it has been uploaded.\
    \ If the file size\nis too big (according to the settings in php.ini), then this\
    \ will be set\nto “none.” An error code of 0 or UPLOAD_ERR_OK indicates that the\
    \ file\nwas uploaded successfully. The file size is the number of bytes.\nAdditional\
    \ possible error messages are listed in the following.\n\n```\nUPLOAD_ERR_OK =\
    \ File uploaded successfully\nUPLOAD_ERR_INI_SIZE = File is too big to upload\n\
    UPLOAD_ERR_FORM_SIZE = File is too big to upload\nUPLOAD_ERR_PARTIAL = File was\
    \ only partially uploaded\nUPLOAD_ERR_NO_FILE = No file was uploaded\nUPLOAD_ERR_NO_TMP_DIR\
    \ = Missing a temporary directory on the server\nUPLOAD_ERR_CANT_WRITE = File\
    \ cannot be saved to disk\nUPLOAD_ERR_EXTENSION = Invalid file extension\n```\n\
    \nSecure Programming\nHackers can manipulate\n the contents of the $_File associate\
    \ array. The one exception is\nthat the *tmp_name* cannot be changed. Thus, when\
    \ using the\ninformation from this array, we need to validate it.\n\nWe can create\
    \ a function to validate the file and its size before we\nmove it.\n\n```\n 'jpg');\n\
    $max_Size  = 40 * 1024 * 1024;\n//  40MB must be the same size or less than the\
    \ setting in php.ini\n$errorStatus = false;\nif(!isset($_FILES[$variableName])\
    \ ) {\n// error $_FILE does not exist\n$errorStatus = true;\n} else {\n$info =\
    \ finfo_open(FILEINFO_MIME_TYPE);\nif (!$info) {\n// error Can't open finfo using\
    \ mime type\n$errorStatus = true;\n} else {\n$mime_type = finfo_file($info, $tmpName);\n\
    if (!in_array($mime_type, array_keys($valid_File_Types))) {\n// error invalid\
    \ file type\n$errorStatus = true;\n} else {\nif (filesize($_FILES[$variableName]['tmp_name'])\
    \ > $max_Size) {\n// error file size too big\n$errorStatus = true;\n}\nfinfo_close($info);\n\
    }\n}\n}\nreturn $errorStatus;\n}\n// Code below used for testing only\n$variableName\
    \ ='image-data';\n$tmp = $_FILES['image-data']['tmp_name'];\nif ( !checkFile($tmp,\
    \ $variableName))\n{ echo \"File is valid\";}\nelse { echo \"Invalid File\"; }\n\
    ?>\nListing 4-12\ncheckFile.php\n```\n\nWow. A lot of new code. But let’s break\
    \ it down one part at a time to\nsee what is happening.\n\n```\n$valid_File_Types\
    \ =  array('image/jpeg' => 'jpg');\n$max_Size  = 40 * 1024 * 1024;\n//  40MB must\
    \ be the same size or less than the setting in php.ini\n$errorStatus = false;\n\
    ```\n\n$valid_File_Types is an array of our acceptable file types. Currently,\n\
    there is only one entry, but we can easily add additional file types.\n$max_Size\
    \ is our allowable maximum size for an individual file. This\nmust be the same\
    \ or less than the value stored in the php.ini file.\n$errorStatus is set to false,\
    \ which, by default, indicates there are no\nproblems with the file we are uploading.\n\
    \n```\nif(!isset($_FILES[$variableName]) ) {\n// error $_FILE does not exist\n\
    $errorStatus = true;\n```\n\nIf the variable name (image_data) passed from the\
    \ HTML form does not\nexist in the $_FILE array, we set the error status to true.\
    \ This would\nbe a possible indication that someone corrupted the array.\n\n```\n\
    $info = finfo_open(FILEINFO_MIME_TYPE);\nif (!$info) {\n// error Can't open finfo\
    \ using mime type\n$errorStatus = true;\n```\n\nIf $info is not set, something\
    \ happened when we attempted to create the\nability to look at mime types using\
    \ finfo. This is not an indication of\na problem with our uploaded file but is\
    \ an indication we have some other\nproblem.\n\n```\n$mime_type = finfo_file($info,\
    \ $tmpName);\nif (!in_array($mime_type, array_keys($valid_File_Types))) {\n//\
    \ error invalid file type\n$errorStatus = true;\n```\n\nIf the  *mime\ntype* \
    \ (file ending) does not match one in our\n$valid_File_Types array, then we set\
    \ the error status to true.\n\n```\nif (filesize($_FILES[$variableName]['tmp_name'])\
    \ > $max_Size) {\n// error file size too big\n$errorStatus = true;\n```\n\nIf\
    \ the file size of the temporary file uploaded is larger than the\nmaximum we\
    \ are allowing, the error status is set to true.\n\n```\nreturn $errorStatus;\n\
    }\n$variableName ='image-data';\n$tmp = $_FILES['image-data']['tmp_name'];\nif\
    \ ( !checkFile($tmp, $variableName))\n{ echo \"File is valid\";}\nelse { echo\
    \ \"Invalid File\"; }\n```\n\nNote\n\nYou can run this program using testUploadForm.php\
    \ available under the\nviews folder under the ch4 folder.\n\nThe error status\
    \ is returned to whatever program called it. In this\ntest, we called it right\
    \ below the function and set the variable name\nand gathered the temporary name\
    \ of the file from the $_FILES array\ncreated when the file was uploaded from\
    \ the HTML form. This information\nwas then passed into the function. If the function\
    \ returns false,\neverything is OK. If it returns true, we have a problem.\nNow\
    \ that we have an ability to validate our uploaded file, we can\nfinish the process\
    \ by moving the file from the temporary location.\n\nUploading Files with PHP\n\
    \nWhen the file  is\ninitially uploaded, it is placed in a temporary directory\
    \ on the server\nwith a temporary name as shown in the tmp_name value in the array.\n\
    Remember that this location is determined in the php.ini file and can be\nchanged\
    \ by updating the php.ini and restarting Apache. To permanently\nstore the file,\
    \ we must move it from the temporary location to a\npermanent one."
  trans: "好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 注意事项\n当用户单击浏览按钮时，HTML\
