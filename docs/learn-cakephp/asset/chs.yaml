  不要忘记手动向固件中添加记录。由于测试应尽可能快地运行，请尽量只添加足够的记录。请记住：插入和删除测试记录需要时间。记录越多，所需时间就越长，因此只需添加绝对必要的记录。假设在应用程序的某处，我们希望列出所有用户名以给定字母开头的用户。那么我们的模型中会有一个`getUsersByName($ch)`方法来处理此需求。


