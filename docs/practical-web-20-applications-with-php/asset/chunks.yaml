    **I**n Chapter 3we looked closely at the user authentication and authorization
    aspects of the web application. We learned that authentication is when a user
    proves they are who they say they are, while authorization determines what that
    user is and isn’t allowed to do. We created the necessary database tables to hold
    user details as well as the code to manage the database records. We then used
    the Zend_Auth and Zend_Acl components of the Zend Framework to control which areas
    of the web site users can access.


    In this chapter we will build on the code from Chapter 3 by implementing a user
    registration system. Once registered, users will be able to log in and update
    their details. This chapter covers everything related to creating user accounts
    and authenticating (that is, logging in).


    This includes the use of CAPTCHA images as well as allowing users to reset their
    forgotten passwords.


    **Adding User Registration to the Application**


    Implementing a user registration system is a fairly involved process, not only
    because there’s a lot to do in setting up a user account, but also because it’s
    the first real interaction between the web application and the end-user that we’ve
    looked at in this book.


    The process of accepting user registrations will involve the following:


    • Adding navigation so the user can find the registration form


    • Displaying the registration form to the user, including a CAPTCHA image


    • Accepting and validating the submitted details, including checking availability
    of usernames


    • Displaying errors back to the user if something goes wrong


    • Saving the database record, e-mailing the user, and displaying a confirmation
    page if all went well


    We won’t do all of this in exactly this order, but we will build up the registration
    system until it incorporates all of these features.


