  \n**示例 6-6** 具有异常处理功能的 `dog_interface.php` 文件\n\n\n\n\n当将示例 5-12 与示例 6-6 进行比较时，处理异常所需的代码量少于使用`if/else`条件语句。程序的逻辑流程更容易跟踪，因为`else`语句很少。这是因为该应用程序中所有文件抛出的异常都由`dog_interface`中的`catch`块处理。用户错误被抛给一个特殊的`setException`异常。系统错误由`Error`的`catch`块捕获。`error_check_dog_app`方法（在示例\
  \ 5-12 中）已被`setException`类取代。该类中的代码与`error_check_dog_app`中的代码非常相似。`$eMessage`字符串中单个更新消息的显示被移除，因为这个类应对的是用户错误，而不是成功的更新。在代码主体中添加了一条通用的`print`行，以告知用户所有更新均已成功。`try`块已添加到该接口的所有代码周围。这有助于捕获此应用程序任何部分的问题。请注意，如果找不到`dog_container`文件，也会抛出异常。\n\
  \n此应用程序只需要三个`catch`块。`setException catch`块调用`setException`类中的`errorMessage`方法，该方法确定发生了哪些用户错误。然后将信息显示给用户。`Throwable\
  \ catch`块处理所有其他异常。它当前将这些信息显示给用户。然而，`Exception`和`Error`的`catch`块当前向用户提供了过多信息。告知用户应用程序可能遇到的其他问题违反了安全规定。您应该只告诉他们系统当前不可用，并请他们稍后再试。在测试时显示详细错误是可以的，但在实际生产环境中并不好。您将在下一节中解决这个安全漏洞。*有关异常处理的更多信息，请访问*\
  \ [*www.php.net/manual/en/language.errors.php7.php*](http://www.php.net/manual/en/language.errors.php7.php)\
  \ *。*\n\n**实践练习**\n\n1.  检查本节中的代码。是否存在可以将错误检查转换为异常处理的区域？请访问本书网站并下载本节代码。对现有代码进行可能的更改，以使用额外的异常处理。\n\
  \n#### 记录异常\n\n应用程序必须能够将问题发生的情况通知系统分析师。然而，不应向应用程序用户显示关于错误的特定消息。应通知用户系统当前无法操作。应通知系统分析师发生的具体问题。\n\
  \n提供此功能的最简单方法是将错误消息放入日志文件中。PHP 应用程序可以将消息记录到默认的 PHP 错误文件或特定于应用程序的文件中。`php.ini`文件可以被编辑（参见第\
  \ 1 章了解位置）以指定默认错误日志文件的位置和名称。在编辑器中打开`php.ini`文件后，搜索`error_log`。如果该行开头有一个分号，则该位置已被注释掉。只需删除分号并指定一个位置，例如：\n\
  \n```\nerror_log = c:/temp/php_errors.log\n-or-\nerror_log = http://www.asite.com/temp/php_errors.log\n\
  ```\n\n当写入默认错误日志时，PHP 会插入一个*时间戳*以及您提交的错误消息。您的默认时区可能在`php.ini`文件中未正确设置。搜索`date.timezone`。美国大陆的有效时区设置为：\n\
  \n```\ndate.timezone = \"America/New_York\"\ndate.timezone = \"America/Chicago\"\
  \ndate.timezone = \"America/Los_Angeles\"\n所有其他美洲时区请访问：www.php.net/manual/en/timezones.america.php\n\
  全球时区请访问：www.php.net/manual/en/timezones.php\n```\n\nApache 的`httpd`配置文件（参见第 1 章了解位置）可以覆盖`php.ini`文件中的设置。您还应该打开此文件并搜索`date.timezone`。将现有行替换为类似于以下格式的内容：\n\
  \n```\nphp_value date.timezone \"America/New_York\"\n```\n\n一旦您更新并保存了`php.ini`和/或`apache.httpd`文件，您必须重新加载\
  \ Apache 服务器以使更改生效（参见第 1 章）。\n\n**注意**\n\n时区也可以通过程序代码设置。对于 PHP 5.2+，可以使用`datefmt_set_timezone`方法。有关通过程序代码设置时区的更多信息，请访问[`www.php.net/manual/en/datetime.settimezone.php`](http://www.php.net/manual/en/datetime.settimezone.php)。\n\
  \n输入此代码并将其保存在一个测试文件中。在您的环境中测试它。如果您的设置正确，PHP 会在`error_log`参数指定的位置创建错误日志。不要自己创建该文件。PHP\
  \ 不会将信息记录到不是由它创建的日志文件中。发送到您日志文件的消息格式应类似于以下内容：\n\n```\n[25-Jun-2020 17:01:12 America/New_York]\
  \ error message\n```\n\n仅用这简单的一行代码，PHP 就在指定的位置创建了基于文本的文件，并将消息放入文件中。如果您无权访问这些文件，您可以在\
  \ PHP 应用程序中指定一个特定位置来发送您的消息。此功能还允许您设置多个应用程序日志文件。应用程序通常会有信息日志文件、身份验证（登录）日志文件、错误日志文件和安全日志文件。通过分隔每种类型的消息，更容易在日志文件中扫描特定类型的消息。\n\
  \n假设我们想将用户错误记录在一个文件中，而将其他错误记录在另一个文件中。\n\n```\n<?php\nconst USER_ERROR_LOG = 'User_Errors.log';\n\
  const ERROR_LOG = 'Errors.log';\n// sending a user error\nerror_log(\"A user error\"\
  ,3,USER_ERROR_LOG);\n// sending all other errors\nerror_log(\"A general error\"\
  ,3,ERROR_LOG);\n<?\n```\n\n此代码将使用**常量**（`USER_ERROR_LOG`和`ERROR_LOG`）将错误消息导向正确的位置。请注意，使用了第二个参数`3`来告知`error_log`方法将使用不同的位置来记录错误。向您的日志发送消息时，应使用标准格式。该格式应包括时间/日期（如果环境未像前面提到的那样自动包含）、消息类型（如果文件中有多种消息类型）、错误消息以及任何其他相关信息。默认情况下，消息大小限制为\
  \ 120 个字符。但是，这可以在`php.ini`文件中更改。\n\n```\n$date = date('m.d.Y h:i:s');\n// For more\
  \ info on data time format, go to: http://php.net/manual/en/function.date.php\n\
  $errormessage = \"This is the error\";\n$eMessage =  $date . \" | User Error | \"\
  \ . $errormessage . \"\\n\";\nerror_log($eMessage,3,USER_ERROR_LOG);\n```\n\n上述代码将产生：\n\
  \n```\n06.06.2020 03:00:55 | User Error | This is the error\n```\n\n可以使用标准文本编辑器（如\
  \ Notepad++ 或 Notepad）或日志监控软件（我们将在本章后面创建一个日志读取程序）来查看文件内容。\n\n系统会限制日志文件的大小。然而，假设每天记录的日志量不是很大，应用程序可以创建特定于每天的日志文件。\n\
  \n\n\n*   安全与性能——日志文件应存放在与应用不同的文件夹中。该文件夹需要允许应用拥有写入权限，但同时应确保其安全，防止服务器外部的读取或写入访问。只有获得授权的人员才能访问日志。\n\
  \n```\n$USER_ERROR_LOG = \"User_Errors\" . date('mdy') . \".log\";\n$ERROR_LOG =\
  \ \"Errors\" . date('mdy') . \".log\";\n...\nerror_log($eMessage,3,$USER_ERROR_LOG);\n\
  ```\n\n请注意，由于`date`方法可能产生变量输出（不同日期），常量（`USER_ERROR_LOG` 和 `ERROR_LOG`）必须改为变量。其格式会生成类似\
  \ `User_Errors06062020.log` 或 `Errors06062020.log` 的文件名。\n\n当有内容写入日志文件时，PHP 也能很轻松地发送邮件提醒。Web\
  \ 服务器必须包含邮件服务器。你的本地机器可能不具备此功能。然而，通常具备 PHP 功能的网络托管服务提供商会包含邮件服务。要使用此功能，你可以添加一条 `error_log`\
  \ 语句：\n\n*   安全与性能——虽然很想让收到邮件的人员了解应用中发生的具体问题，但请不要这样做。默认情况下，邮件是未加密的。发送包含应用详细信息的未加密邮件，无异于引狼入室，诱使黑客破坏你的应用。不过，你应当在邮件中提供足够的信息（例如日期/时间戳，可能还有错误编号），以便相关人员能够在日志文件中定位错误消息。\n\
  \n```\nerror_log(\"Date/Time: $date - Serious System Problems with Dog Application.\
  \ Check error log for details\", 1, \"noone@helpme.com\", \"Subject: Dog Application\
  \ Error \\nFrom: System Log \" . \"\\r\\n\");\n```\n\n第一个参数指定邮件的内容。第二个参数告知 `error_log`\
  \ 通过邮件发送此信息。第三个参数提供“收件人”邮箱地址。第四个参数是额外的邮件头字段。该字段通常用于包含邮件主题和发件人邮箱地址。“发件人”地址必须包含，否则邮件将无法发送。不过，“发件人”地址不必是一个真实存在的地址。\n\
  \n*关于错误记录的更多信息，请访问* [*www.php.net/manual/en/function.error-log.php*](http://www.php.net/manual/en/function.error-log.php)*。*\n\
  \n在 `Dog` 应用中，我们可以通过调整 `dog_interface` 中的 `catch` 块（来自示例 6-6），来实现记录异常并通过邮件发送重大错误的功能。\n\
  \n```\ngetMessage());\nstring $name_error == 'TRUE' ? $eMessage = '' : $eMessage\
  \ =\n'Name update not successful';\nstring $breed_error == 'TRUE' ? $eMessage .=\
  \ '' : $eMessage .=\n'Breed update not successful';\nstring $color_error == 'TRUE'\
  \ ? $eMessage .= '' : $eMessage .=\n'Color update not successful';\nstring $weight_error\
  \ == 'TRUE' ? $eMessage .= '' : $eMessage .=\n'Weight update not successful';\n\
  string return $eMessage;\n}\n}\nfunction get_properties($lab)\n{\nprint \"Your dog's\
  \ name is \" . $lab->get_dog_name() . \"\";\nprint \"Your dog weights \" . $lab->get_dog_weight()\
  \ . \" lbs. \";\nprint \"Your dog's breed is \" . $lab->get_dog_breed() . \"\";\n\
  print \"Your dog's color is \" . $lab->get_dog_color() . \"\";\n}\n//----------------主代码部分-------------------------------------\n\
  try {\nif ( file_exists(\"e5dog_container.php\"))\n{\nRequire_once(\"e5dog_container.php\"\
  );\n}\nelse\n{\nthrow new Exception(\"Dog container file missing or corrupt\");\n\
  }\nif (isset($_POST['dog_app']))\n{\nif ((isset($_POST['dog_name'])) && (isset($_POST['dog_breed']))\
  \ &&\n(isset($_POST['dog_color'])) && (isset($_POST['dog_weight'])))\n{\n$container\
  \ = new dog_container(filter_var($_POST['dog_app'],\nFILTER_SANITIZE_STRING));\n\
  string $dog_name = filter_var( $_POST['dog_name'],\nFILTER_SANITIZE_STRING);\nstring\
  \ $dog_breed = filter_var( $_POST['dog_breed'],\nFILTER_SANITIZE_STRING);\nstring\
  \ $dog_color = filter_var( $_POST['dog_color'],\nFILTER_SANITIZE_STRING);\nstring\
  \ $dog_weight = filter_var( $_POST['dog_weight'],\nFILTER_SANITIZE_STRING);\n$breedxml\
  \ = $container->get_dog_application(\"breeds\");\n$properties_array = array($dog_name,$dog_breed,$dog_color,\n\
  $dog_weight,$breedxml);\n$lab = $container->create_object($properties_array);\n\
  print \"Updates successful\";\nget_properties($lab);\n}\nelse\n{\nprint \"Missing\
  \ or invalid parameters. Please go back to the dog.html page to enter valid information.\"\
  ;\nprint \"Dog Creation Page\";\n}\n}\nelse // 选择框\n{\n$container = new dog_container(\"\
  selectbox\");\n$properties_array = array(\"selectbox\");\n$lab = $container->create_object($properties_array);\n\
  $container->set_app(\"breeds\");\n$dog_app = $container->get_dog_application(\"\
  breeds\");\n$result = $lab->get_select($dog_app);\nprint $result;\n}\n}\ncatch(setException\
  \ $e)\n{\necho $e->errorMessage(); // 向用户显示\n$date = date('m.d.Y h:i:s');\n$errormessage\
  \ = $e->errorMessage();\n$eMessage =  $date . \" | User Error | \" . $errormessage\
  \ . \"\\n\";\nerror_log($eMessage,3,USER_ERROR_LOG); // 将消息写入用户错误日志文件\n}\ncatch(Throwable\
