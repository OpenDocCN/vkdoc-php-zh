    \ The browser ignores the line breaks in the original text and\n    displays Shakespeare’s\
    \ sonnet as a solid block.\n\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figb_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figb_HTML.jpg)\n\
    \nTip\nIf you see an error message, check that you typed the code correctly\n\
    and that the correct file and folder permissions have been set on a Mac\nor Linux.\n\
    \n1.  PHP has a function called `nl2br()` that converts\n     newline characters\n\
    \    to `<br/>`\n    tags (the trailing slash is for compatibility with XHTML\
    \ and is valid in\n    HTML5). Change the code in `get_contents.php` like\n  \
    \  this (it’s in `get_contents_02.php`):\n\n```\n    nl2br(readfile('C:/private/sonnet.txt'));\n\
    \    ```\n\n2.  Save `get_contents.php` and\n    reload it in your browser. The\
    \ output is still a solid block of text.\n    When you pass one function as an\
    \ argument to another one like this, the\n    result of the inner function is\
    \ normally passed to the outer one,\n    performing both operations in a single\
    \ expression. So, you would expect\n    the file’s contents to be passed to `nl2br()`\
    \ before being\n    displayed in the browser. However, `readfile()` outputs\n\
    \    the file’s contents immediately. By the time it’s finished, there’s\n   \
    \ nothing for `nl2br()` to insert\n    `<br/>`\n    tags into. The text is already\
    \ in the browser.\n\nNote\nWhen two functions are nested like this, the inner\
    \ function is\nexecuted first, and the outer function processes the result. But\
    \ the\nreturn value of the inner function needs to be meaningful as an argument\n\
    to the outer function. The return value of `readfile()` is the\nnumber of bytes\
    \ read from the file. Even if you add `echo` at the beginning\nof the line, all\
    \ you get is 594 added to the end of the text. Nesting\nfunctions doesn’t work\
    \ in this case, but it’s often a very useful\ntechnique, avoiding the need to\
    \ store the result of the inner function\nin a variable before processing it with\
    \ another function.\n\n1.  Instead of `readfile()`, you need\n    to use `file_get_contents()`\n\
    \    to  convert the\n    newline characters to `<br/>` tags.\n    Whereas `readfile()`\
    \ simply\n    outputs the content of a file, `file_get_contents()`\n    returns\
    \ the contents of a file as a single string. It’s up to you to\n    decide what\
    \ to do with it. Amend the code like this (or use `get_contents_03.php`):\n\n\
    ```\n    echo nl2br(file_get_contents('C:/private/sonnet.txt'));\n    ```\n\n\
    2.  Reload the page in a browser. Each line of the sonnet is now on a\n    line\
    \ of its own.\n\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figc_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figc_HTML.jpg)\n\
    \n1.  The advantage of `file_get_contents()`\n    is that you can assign the file\
    \ contents to a variable and process it in\n    some way before deciding what\
    \ to do with it. Change the code in `get_contents.php` like\n    this (or use\
    \ `get_contents_04.php`)\n    and load the page into a browser:\n\n```\n    $sonnet\
    \ = file_get_contents('C:/private/sonnet.txt');\n    // replace new lines with\
    \ spaces\n    $words = str_replace(\"\\r\\n\", ' ', $sonnet);\n    // split into\
    \ an array of words\n    $words = explode(' ', $words);\n    // extract the first\
    \ nine array elements\n    $first_line = array_slice($words, 0, 9);\n    // join\
    \ the first nine elements and display\n    echo implode(' ', $first_line);\n \
    \   ```\n\nThis stores the contents of `sonnet.txt` in a\n    variable called\
    \ `$sonnet`, which is\n    passed to `str_replace()`, which\n    then replaces\
    \ the carriage return and newline characters with a space\n    and stores the\
    \ result as `$words`.\n\nNote\nSee “Using escape sequences inside double quotes”\
    \ in Chapter [4](#332054_4_En_4_Chapter.xhtml) for an explanation of `\"\\r\\\
    n\"`. The text file\nwas created in Windows, so line breaks are represented by\
    \ a carriage\nreturn and newline character. Files created on macOS and Linux use\
    \ only\na newline character (`\"\\n\"`)."
  trans: "\n# 表 7-1 中的两个设置均控制通过 URL（相对于本地文件系统）对文件的访问。第一个设置 `allow_url_fopen` 允许你读取远程文件，但不能将其包含在脚本中。这通常是安全的，因此默认情况下它是启用的。另一方面，`allow_url_include`\
    \ 允许你直接将远程文件包含在脚本中。这是一个重大的安全风险，因此 `allow_url_include` 的默认状态是禁用的。\n\n> **提示** \
    \ \n> 如果你的托管公司已禁用 `allow_url_fopen`，请请求启用它。否则，你将无法使用 PHP 解决方案 7-5。但不要搞混这两个名称：`allow_url_include`\
    \ 在托管环境中应始终关闭。即使 `allow_url_fopen` 在你的网站上被禁用，你仍然可能能够使用客户端 URL 库（cURL）访问有用的外部数据源，例如新闻源和公共\
    \ XML 文档。更多信息请参见 [`www.php.net/manual/en/book.curl.php`](http://www.php.net/manual/en/book.curl.php)。\n\
    \n## 读写文件\n\n读写文件的能力有着广泛的应用。例如，你可以打开另一个网站上的文件，将内容读入服务器内存，使用字符串和 XML 处理函数提取信息，然后将结果写入本地文件。你还可以查询自己服务器上的数据库，并将数据输出为文本或\
    \ CSV（逗号分隔值）文件。你甚至可以生成 Open Document Format 或 Microsoft Excel 电子表格格式的文件。但首先，让我们来看一下基本操作。\n\
    \n> **提示**  \n> 如果你订阅了 LinkedIn Learning 或 [Lynda.​com](http://lynda.com)，你可以通过我的\
    \ *PHP: Exporting Data to Files* 课程学习如何将数据从数据库导出为各种格式，例如 Microsoft Excel 和 Word。\n\
    \n## 单次操作读取文件\n\nPHP 有三个函数可以单次操作读取文本文件的内容：\n\n* `readfile()` 打开一个文件并直接输出其内容。\n\
    * `file_get_contents()` 将文件的全部内容读入一个字符串，但不会直接生成输出。\n* `file()` 将每一行读入一个数组。\n\n\
    ### PHP 解决方案 7-1：获取文本文件的内容\n\n此 PHP 解决方案演示了使用 `readfile()`、`file_get_contents()`\
    \ 和 `file()` 访问文件内容的区别。\n\n1. 将 `sonnet.txt` 复制到你的 `private` 文件夹。该文本文件包含莎士比亚的第\
    \ 116 首十四行诗。\n\n2. 在你的 phpsols `-4e` 站点根目录中创建一个名为 `filesystem` 的新文件夹，然后在新文件夹中创建一个名为\
    \ `get_contents.php` 的 PHP 文件。在 PHP 代码块中插入以下代码（`ch07` 文件夹中的 `get_contents_01.php`\
    \ 显示了嵌入在网页中的代码，但你仅可使用 PHP 代码进行测试）：\n\n   ```\n   readfile('C:/private/sonnet.txt');\n\
    \   ```\n\n   如果你使用的是 Mac，请像这样修改路径名，替换为你自己的 Mac 用户名：\n\n   ```\n   readfile('/Users/username/private/sonnet.txt');\n\
    \   ```\n\n   如果你在 Linux 或远程服务器上测试，请相应修改路径名。\n\n> **注意**  \n> 为简洁起见，本章剩余示例仅显示\
    \ Windows 路径名。\n\n3. 保存 `get_contents.php` 并在浏览器中查看。你应该会看到类似以下截图的内容。浏览器会忽略原始文本中的换行符，并将莎士比亚的十四行诗显示为一个实心文本块。\n\
    \n   ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figb_HTML.jpg](img/332054_4_En_7_Figb_HTML.jpg)\n\
    \n> **提示**  \n> 如果你看到错误消息，请检查代码输入是否正确，以及在 Mac 或 Linux 上是否已设置正确的文件和文件夹权限。\n\n4.\
    \ PHP 有一个名为 `nl2br()` 的函数，它可以将换行符转换为 `<br/>` 标签（末尾的斜杠是为了与 XHTML 兼容，并且在 HTML5 中有效）。像这样更改\
    \ `get_contents.php` 中的代码（代码在 `get_contents_02.php` 中）：\n\n   ```\n   nl2br(readfile('C:/private/sonnet.txt'));\n\
    \   ```\n\n5. 保存 `get_contents.php` 并在浏览器中重新加载。输出仍然是一个实心文本块。当你像这样将一个函数作为参数传递给另一个函数时，内部函数的结果通常会传递给外部函数，从而在单个表达式中执行两个操作。因此，你可能会期望文件内容在显示到浏览器之前被传递给\
    \ `nl2br()`。然而，`readfile()` 会立即输出文件内容。当它执行完毕时，已经没有内容可供 `nl2br()` 插入 `<br/>` 标签了。文本已经输出到了浏览器中。\n\
    \n> **注意**  \n> 当两个函数像这样嵌套时，内部函数先执行，外部函数处理其结果。但内部函数的返回值需要作为参数对外部函数有意义。`readfile()`\
    \ 的返回值是从文件中读取的字节数。即使你在行首添加 `echo`，也只能在文本末尾看到 594 这个数字。在这种情况下，函数嵌套不起作用，但这通常是一个非常实用的技术，可以避免在将内部函数的结果传递给另一个函数处理之前将其存储在变量中。\n\
    \n6. 你需要使用 `file_get_contents()` 来将换行符转换为 `<br/>` 标签，而不是 `readfile()`。`readfile()`\
    \ 只是输出文件内容，而 `file_get_contents()` 则将文件内容作为一个字符串返回。由你来决定如何处理它。像这样修改代码（或使用 `get_contents_03.php`）：\n\
    \n   ```\n   echo nl2br(file_get_contents('C:/private/sonnet.txt'));\n   ```\n\
    \n7. 在浏览器中重新加载页面。现在，十四行诗的每一行都单独成行。\n\n   ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figc_HTML.jpg](img/332054_4_En_7_Figc_HTML.jpg)\n\
    \n8. `file_get_contents()` 的优点在于，你可以将文件内容赋值给一个变量，并以某种方式处理它，然后再决定如何处理。像这样更改 `get_contents.php`\
    \ 中的代码（或使用 `get_contents_04.php`）并将页面加载到浏览器中：\n\n   ```\n   $sonnet = file_get_contents('C:/private/sonnet.txt');\n\
    \   // 将换行符替换为空格\n   $words = str_replace(\"\\r\\n\", ' ', $sonnet);\n   // 拆分为单词数组\n\
    \   $words = explode(' ', $words);\n   // 提取前九个数组元素\n   $first_line = array_slice($words,\
    \ 0, 9);\n   // 连接前九个元素并显示\n   echo implode(' ', $first_line);\n   ```\n\n   这将\
    \ `sonnet.txt` 的内容存储在一个名为 `$sonnet` 的变量中，该变量被传递给 `str_replace()`，后者随后将回车符和换行符替换为一个空格，并将结果存储为\
    \ `$words`。\n\n> **注意**  \n> 有关 `\"\\r\\n\"` 的说明，请参见第 4 章的“在双引号内使用转义序列”。该文本文件是在\
    \ Windows 中创建的，因此换行符由回车符和换行符表示。在 macOS 和 Linux 上创建的文件仅使用换行符（`\"\\n\"`）。\n"
- fmt: "`$words`被传递给`explode()`函数。这个听起来很吓人的名称实际上是把一个字符串“炸开”并转换成数组，使用第一个参数来确定在哪里分割字符串。这里使用空格，因此文本文件的内容被分割成一个单词数组。\n\
    \n单词数组随后被传递给`array_slice()`函数，它从数组中提取从第二个参数指定位置开始的切片。第三个参数指定切片的长度。PHP从0开始计数数组，因此这提取了前九个单词。\n\
    \n最后，`implode()`执行与`explode()`相反的操作，将数组元素连接起来，并在每个元素之间插入第一个参数。结果由`echo`显示，产生如下输出：\n\
    \n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figd_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figd_HTML.jpg)\n\
    \n脚本现在不显示文件的全部内容，而只显示第一行。完整的字符串仍然存储在`$sonnet`中。\n\n1.  然而，如果你想逐行处理每一行，使用`file()`会更简单，它会将文件的每一行读入一个数组。要显示`sonnet.txt`的第一行，前面的代码可以简化为这样（参见`get_contents_05.php`）：\n\
    \n    ```\n    $sonnet = file('C:/private/sonnet.txt');\n    echo $sonnet[0];\n\
    \    ```\n\n2.  实际上，如果你不需要完整的数组，可以通过一种称为数组解引用的技术直接访问单行，即在函数调用后的方括号中添加其索引号。以下代码显示该十四行诗的第11行（参见`get_contents_06.php`）：\n\
    \n    ```\n    echo file('C:/private/sonnet.txt')[10];\n    ```\n\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Fige_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Fige_HTML.jpg)\n\
    \n在我们刚刚探索的三个函数中，`readfile()`可能是最没用的。它只是读取文件的内容并直接将其转储到输出中。你无法操作文件内容或从中提取信息。然而，`readfile()`的一个实际用途是强制下载文件，正如你将在本章后面看到的那样。\n\
    \n另外两个函数`file_get_contents()`和`file()`更有用，因为你可以将内容捕获到一个变量中，以便进行重新格式化或提取信息。唯一的区别在于`file_get_contents()`将内容读入单个字符串，而`file()`生成一个数组，其中每个元素对应文件中的一行。\n\
    \n提示\n`file()`函数会在每个数组元素的末尾保留换行符。如果要去除换行符，请将常量`FILE_IGNORE_NEW_LINES`作为第二个参数传递给该函数。你也可以使用`FILE_SKIP_EMPTY_LINES`作为第二个参数来跳过空行。要同时去除换行符并跳过空行，请用竖线分隔这两个常量，像这样：`FILE_IGNORE_NEW_LINES\
    \ | FILE_SKIP_EMPTY_LINES`。\n\n尽管我们只使用本地文本文件测试了`file_get_contents()`和`file()`，但它们也可以从其他域名的公共文件中检索内容。这使得它们在访问其他网页上的信息时非常有用，尽管提取信息通常需要对字符串函数以及文档对象模型（DOM）所描述的文档逻辑结构有扎实的理解（参见[`www.w3.org/TR/WD-DOM/introduction.html`](http://www.w3.org/TR/WD-DOM/introduction.html)）。`file_get_contents()`和`file()`的缺点是它们会将整个文件读入内存。对于非常大的文件，最好使用一次只处理文件一部分的函数。我们接下来将探讨这些函数。\n\
    \n## 打开和关闭文件以进行读/写操作\n\n我们到目前为止研究的函数都是在一次调用中完成所有操作。然而，PHP也有一组允许你打开文件、读取和/或写入文件，然后关闭文件的函数。该文件可以是本地文件系统中的文件，也可以是不同域名上的公共文件。\n\
    \n以下是用于此类操作的最重要的函数：\n\n*   `fopen()`：打开一个文件\n*   `fgets()`：读取文件内容，通常一次一行\n*  \
    \ `fgetcsv()`：从CSV文件中获取当前行并将其转换为数组\n*   `fread()`：读取指定数量的文件内容\n*   `fwrite()`：写入文件\n\
    *   `feof()`：确定是否已到达文件末尾\n*   `rewind()`：将内部指针移回文件开头\n*   `fseek()`：将内部指针移动到文件中的特定位置\n\
    *   `fclose()`：关闭一个文件\n\n这些函数中的第一个`fopen()`提供了令人眼花缭乱的选择选项，用于指定文件打开后如何使用：`fopen()`有一种只读模式，四种只写模式，和五种读/写模式。之所以有这么多选项，是因为它们让你能够控制是覆盖现有内容还是追加新内容。其他时候，你可能希望PHP在文件不存在时创建它。每种模式都决定了在打开文件时内部指针的放置位置。它就像文字处理器中的光标：当调用`fread()`或`fwrite()`时，PHP从指针当前所在的位置开始读取或写入。\n\
    \n表[7-2](#332054_4_En_7_Chapter.xhtml#Tab2) 引导你了解所有选项。\n\n### 表7-2. 与`fopen()`一起使用的读/写模式\n\
    \n| 类型 | 模式 | 描述 |\n| :--- | :--- | :--- |\n| **只读** | `r` | 内部指针初始放置在文件开头。 |\n\
    | **只写** | `w` | 写入前删除现有数据。如果文件不存在则创建。 |\n| | `a` | 追加模式。新数据添加到末尾。如果文件不存在则创建。\
    \ |\n| | `c` | 保留现有内容，但内部指针放置在文件开头。如果文件不存在则创建。 |\n| | `x` | 仅在文件不存在时创建。如果已存在同名文件则失败。\
    \ |\n| **读/写** | `r+` | 读/写操作可以按任意顺序进行，并从内部指针当时所在的位置开始。指针初始放置在文件开头。文件必须已存在才能使操作成功。\
    \ |\n| | `w+` | 删除现有数据。写入后可以读回数据。如果文件不存在则创建。 |\n| | `a+` | 打开文件准备在文件末尾添加新数据。移动内部指针后也允许读回数据。如果文件不存在则创建。\
    \ |\n| | `c+` | 保留现有内容，内部指针放置在文件开头。如果文件不存在则创建。 |\n| | `x+` | 创建一个新文件，但如果同名文件已存在则失败。写入后可以读回数据。\
    \ |\n\n选择了错误的模式，你可能会删除有价值的数据。你还需要注意内部指针的位置。如果指针位于文件末尾，而你又尝试读取内容，最终将一无所获。另一方面，如果指针位于文件开头，并且你开始写入，你将覆盖等量的现有数据。本章后面的“移动内部指针”会更详细地解释这一点。\n\
    \n使用`fopen()`时，需要向其传递以下两个参数：\n\n*   要打开文件的路径，如果文件在不同域名上则为URL\n*   包含表[7-2](#332054_4_En_7_Chapter.xhtml#Tab2)\
    \ 中列出的一个模式的字符串"
  raw: "Then `$words`\nis passed to the `explode()` function.\n This alarmingly\n\
    named function “blows apart” a string and converts it into an array,\nusing the\
    \ first argument to determine where to break the string. In this\ncase a space\
    \ is used, so the contents of the text file are split into an\narray of words.\n\
    The array of words is then passed to the `array_slice()`\nfunction,  which\ntakes\
    \ a slice out of an array starting from the position specified in\nthe second\
    \ argument. The third argument specifies the length of the\nslice. PHP counts\
    \ arrays from 0, so this extracts the first nine\nwords.\nFinally, `implode()`\
    \ does the\nopposite of `explode()`, joining\nthe elements of an array and inserting\
    \ the first argument between each\none. The result is displayed by `echo`, producing\
    \ the\nfollowing:\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figd_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figd_HTML.jpg)\n\
    \nInstead of displaying the entire contents of the file, the script now\ndisplays\
    \ only the first line. The full string is still stored in `$sonnet`.\n\n1.  However,\
    \ if you want to process each line individually, it’s simpler to\n    use `file()`,\n\
    \    which reads each line of a file into an array. To display the first line\n\
    \    of `sonnet.txt`,\n    the previous code can be simplified to this (see `get_contents_05.php`):\n\
    \n```\n    $sonnet = file('C:/private/sonnet.txt');\n    echo $sonnet[0];\n  \
    \  ```\n\n2.  In fact, if you don’t need the full array, you can access a single\n\
    \    line directly using a technique known as array dereferencing by adding\n\
    \    its index number in square brackets after the call to the function.\n   \
    \  The following\n    code displays the 11th line of the sonnet (see `get_contents_06.php`):\n\
    \n```\n    echo file('C:/private/sonnet.txt')[10];\n    ```\n\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Fige_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Fige_HTML.jpg)\n\
    \nOf the three functions we’ve just explored, `readfile()` is\n    probably the\
    \ least useful. It simply reads the contents of a file and\n    dumps it directly\
    \ into the output. You can’t manipulate the file content\n    or extract information\
    \ from it. However, a practical use of `readfile()` is to\n    force a file to\
    \ be downloaded, as you’ll see later in this chapter.\n\nThe other two functions,\
    \ `file_get_contents()`\n    and `file()`, are\n    more useful because you can\
    \ capture the contents in a variable that is\n    ready for reformatting or extracting\
    \ information. The only difference is\n    that `file_get_contents()`\n    reads\
    \ the contents into a single string, whereas `file()` generates an\n    array\
    \ in which each element corresponds to a line in the file.\n\nTip\nThe `file()`\n\
    function preserves newline characters at the end of each array element.\nIf you\
    \ want to strip the newline characters, pass the constant `FILE_IGNORE_NEW_LINES`\n\
    as the second argument to the function. You can also skip empty lines by\nusing\
    \ `FILE_SKIP_EMPTY_LINES`\nas the second argument. To remove newline characters\
    \ and skip empty\nlines, separate the two constants with a vertical pipe, like\
    \ this: `FILE_IGNORE_NEW_LINES | FILE_SKIP_EMPTY_LINES`.\n\nAlthough we’ve tested\
    \ `file_get_contents()`\nand `file()` only\nwith a local text file, they can also\
    \ retrieve the contents from public\nfiles on other domains. This makes them very\
    \ useful for accessing\ninformation on other web pages, although extracting the\
    \ information\nusually requires a solid understanding of string functions and\
    \ the\nlogical structure of documents as described by the Document Object\nModel\
    \ or DOM (see [`www.w3.org/TR/WD-DOM/introduction.html`](http://www.w3.org/TR/WD-DOM/introduction.html)\
    \ ).\nThe disadvantage of `file_get_contents()`\nand `file()` is\nthat  they read\n\
    the whole file into memory. With very large files, it’s preferable to\nuse functions\
    \ that process only a part of a file at a time. We’ll look\nat those next.\n\n\
    Opening and closing Files for Read/Write\nOperations\nThe functions we have looked\
    \ at so far do everything in a single\npass. However, PHP also has a set of functions\
    \ that allow you to open a\nfile, read it and/or write to it, and then close the\
    \ file. The file can\nbe either on the local file system or a publicly available\
    \ file on a\ndifferent domain.\n\nThe following are the most important functions\
    \ used for this type of\noperation:\n\n*   `fopen()`:\n    Opens a file\n\n* \
    \  `fgets()`:\n    Reads the contents of a file, normally one line at a time\n\
    \n*   `fgetcsv()`: Gets the\n    current line from a CSV file and converts it\
    \ into an array\n\n*   `fread()`:\n    Reads a specified amount of a file\n\n\
    *   `fwrite()`: Writes to a\n    file\n\n*   `feof()`:\n    Determines whether\
    \ the end of the file has been reached\n\n*   `rewind()`: Moves the\n    internal\
    \ pointer back to the top of the file\n\n*   `fseek()`:\n    Moves the internal\
    \ pointer to a specific location in the file\n\n*   `fclose()`: Closes a\n   \
    \ file\n\nThe first of these, `fopen()`, offers a\nbewildering choice of options\
    \ for how the file is to be used once it’s\nopen: `fopen()`\nhas one read-only\
    \ mode, four write-only modes, and five read/write\nmodes. There are so many because\
    \ they give you control over whether to\noverwrite the existing content or append\
    \ new material. At other times,\nyou may want PHP to create a file if it doesn’t\
    \ already exist.\nEach mode determines where to place the internal pointer when\
    \ it\nopens the file. It’s like the cursor in a word processor: PHP starts\nreading\
    \ or writing from wherever the pointer happens to be when you call\n`fread()`\
    \ or\n`fwrite()`.\n\nTable [7-2](#332054_4_En_7_Chapter.xhtml#Tab2) guides you\n\
    through all the options.\n\nTable 7-2.\nRead/write modes used with `fopen()`\n\
    \nType |\n Mode |\n Description |\n\n| --- | --- | --- | --- | --- | --- | ---\
    \ |\n\nRead-only |\n `r` |\n Internal pointer initially placed at the beginning\
    \ of the file. |\n\nWrite-only |\n `w` |\n Existing data deleted before writing.\
    \ Creates a file if it doesn’t already\nexist. |\n\n|\n `a` |\n Append mode. New\
    \ data added at the end. Creates a file if it doesn’t already\nexist. |\n\n|\n\
    \ `c` |\n Existing content is preserved, but the internal pointer is placed at\
    \ the\nbeginning of the file. Creates a file if it doesn’t already\nexist. |\n\
    \n|\n `x` |\n Creates a file only if it doesn’t already exist. Fails if there’s\
    \ already a file\nwith the same name. |\n\nRead/write |\n `r+` |\n Read/write\
    \ operations can take place in either order and begin wherever the\ninternal pointer\
    \ is at the time. Pointer is initially placed at the\nbeginning of the file. File\
    \ must already exist for operation to\nsucceed. |\n\n`w+` |\n Existing data deleted.\
    \ Data can be read back after writing. Creates a file if it\ndoesn’t already exist.\
    \ |\n\n`a+` |\n Opens a file ready to add new data at the end of the file. Also\
    \ permits data to\nbe read back after internal pointer has been moved. Creates\
    \ a file if it\ndoesn’t already exist. |\n\n`c+` |\n Existing content is preserved,\
    \ and the internal pointer is placed at the\nbeginning of the file. Creates a\
    \ new file if it doesn’t already\nexist. |\n\n`x+` |\n Creates a new file, but\
    \ fails if a file of the same name already exists. Data can be read back after\n\
    writing. |\n\nChoose the wrong mode, and you could end up deleting valuable data.\n\
    You also need to be careful about the position of the internal pointer.\nIf the\
    \ pointer is at the end of the file, and you try to read the\ncontents, you end\
    \ up with nothing. On the other hand, if the pointer is\nat the beginning of the\
    \ file, and you start writing, you overwrite the\nequivalent amount of existing\
    \ data. “Moving the internal pointer” later\nin this chapter explains this in\
    \ more detail.\n\nYou work with `fopen()` by passing it\nthe following two arguments:\n\
    \n*   The path to the file you want to open, or URL if the file is on a\n    different\
    \ domain\n\n*   A string containing one of the modes listed in Table [7-2](#332054_4_En_7_Chapter.xhtml#Tab2)"
  trans: "\n`$words`被传递给`explode()`函数。这个听起来很吓人的名称实际上是把一个字符串“炸开”并转换成数组，使用第一个参数来确定在哪里分割字符串。这里使用空格，因此文本文件的内容被分割成一个单词数组。\n\
    \n单词数组随后被传递给`array_slice()`函数，它从数组中提取从第二个参数指定位置开始的切片。第三个参数指定切片的长度。PHP 从 0 开始计数数组，因此这提取了前九个单词。\n\
    \n最后，`implode()`执行与`explode()`相反的操作，将数组元素连接起来，并在每个元素之间插入第一个参数。结果由`echo`显示，产生如下输出：\n\
    \n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figd_HTML.jpg](img/332054_4_En_7_Figd_HTML.jpg)\n\
    \n脚本现在不显示文件的全部内容，而只显示第一行。完整的字符串仍然存储在`$sonnet`中。\n\n1.  然而，如果你想逐行处理每一行，使用`file()`会更简单，它会将文件的每一行读入一个数组。要显示`sonnet.txt`的第一行，前面的代码可以简化为这样（参见`get_contents_05.php`）：\n\
    \n    ```\n    $sonnet = file('C:/private/sonnet.txt');\n    echo $sonnet[0];\n\
    \    ```\n\n2.  实际上，如果你不需要完整的数组，可以通过一种称为数组解引用的技术直接访问单行，即在函数调用后的方括号中添加其索引号。以下代码显示该十四行诗的第\
    \ 11 行（参见`get_contents_06.php`）：\n\n    ```\n    echo file('C:/private/sonnet.txt')[10];\n\
    \    ```\n\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Fige_HTML.jpg](img/332054_4_En_7_Fige_HTML.jpg)\n\
    \n在我们刚刚探索的三个函数中，`readfile()`可能是最没用的。它只是读取文件的内容并直接将其转储到输出中。你无法操作文件内容或从中提取信息。然而，`readfile()`的一个实际用途是强制下载文件，正如你将在本章后面看到的那样。\n\
    \n另外两个函数`file_get_contents()`和`file()`更有用，因为你可以将内容捕获到一个变量中，以便进行重新格式化或提取信息。唯一的区别在于`file_get_contents()`将内容读入单个字符串，而`file()`生成一个数组，其中每个元素对应文件中的一行。\n\
    \n提示\n`file()`函数会在每个数组元素的末尾保留换行符。如果要去除换行符，请将常量`FILE_IGNORE_NEW_LINES`作为第二个参数传递给该函数。你也可以使用`FILE_SKIP_EMPTY_LINES`作为第二个参数来跳过空行。要同时去除换行符并跳过空行，请用竖线分隔这两个常量，像这样：`FILE_IGNORE_NEW_LINES\
    \ | FILE_SKIP_EMPTY_LINES`。\n\n尽管我们只使用本地文本文件测试了`file_get_contents()`和`file()`，但它们也可以从其他域名的公共文件中检索内容。这使得它们在访问其他网页上的信息时非常有用，尽管提取信息通常需要对字符串函数以及文档对象模型（DOM）所描述的文档逻辑结构有扎实的理解（参见[`www.w3.org/TR/WD-DOM/introduction.html`](http://www.w3.org/TR/WD-DOM/introduction.html)）。`file_get_contents()`和`file()`的缺点是它们会将整个文件读入内存。对于非常大的文件，最好使用一次只处理文件一部分的函数。我们接下来将探讨这些函数。\n\
    \n## 打开和关闭文件以进行读/写操作\n\n我们到目前为止研究的函数都是在一次调用中完成所有操作。然而，PHP 也有一组允许你打开文件、读取和/或写入文件，然后关闭文件的函数。该文件可以是本地文件系统中的文件，也可以是不同域名上的公共文件。\n\
    \n以下是用于此类操作的最重要的函数：\n\n*   `fopen()`：打开一个文件\n*   `fgets()`：读取文件内容，通常一次一行\n*  \
    \ `fgetcsv()`：从 CSV 文件中获取当前行并将其转换为数组\n*   `fread()`：读取指定数量的文件内容\n*   `fwrite()`：写入文件\n\
    *   `feof()`：确定是否已到达文件末尾\n*   `rewind()`：将内部指针移回文件开头\n*   `fseek()`：将内部指针移动到文件中的特定位置\n\
    *   `fclose()`：关闭一个文件\n\n这些函数中的第一个`fopen()`提供了令人眼花缭乱的选择选项，用于指定文件打开后如何使用：`fopen()`有一种只读模式，四种只写模式，和五种读/写模式。之所以有这么多选项，是因为它们让你能够控制是覆盖现有内容还是追加新内容。其他时候，你可能希望\
    \ PHP 在文件不存在时创建它。每种模式都决定了在打开文件时内部指针的放置位置。它就像文字处理器中的光标：当调用`fread()`或`fwrite()`时，PHP\
    \ 从指针当前所在的位置开始读取或写入。\n\n表 7-2 引导你了解所有选项。\n\n### 表 7-2. 与`fopen()`一起使用的读/写模式\n\n\
    | 类型 | 模式 | 描述 |\n| :--- | :--- | :--- |\n| **只读** | `r` | 内部指针初始放置在文件开头。 |\n\
    | **只写** | `w` | 写入前删除现有数据。如果文件不存在则创建。 |\n| | `a` | 追加模式。新数据添加到末尾。如果文件不存在则创建。\
    \ |\n| | `c` | 保留现有内容，但内部指针放置在文件开头。如果文件不存在则创建。 |\n| | `x` | 仅在文件不存在时创建。如果已存在同名文件则失败。\
    \ |\n| **读/写** | `r+` | 读/写操作可以按任意顺序进行，并从内部指针当时所在的位置开始。指针初始放置在文件开头。文件必须已存在才能使操作成功。\
    \ |\n| | `w+` | 删除现有数据。写入后可以读回数据。如果文件不存在则创建。 |\n| | `a+` | 打开文件准备在文件末尾添加新数据。移动内部指针后也允许读回数据。如果文件不存在则创建。\
    \ |\n| | `c+` | 保留现有内容，内部指针放置在文件开头。如果文件不存在则创建。 |\n| | `x+` | 创建一个新文件，但如果同名文件已存在则失败。写入后可以读回数据。\
    \ |\n\n选择了错误的模式，你可能会删除有价值的数据。你还需要注意内部指针的位置。如果指针位于文件末尾，而你又尝试读取内容，最终将一无所获。另一方面，如果指针位于文件开头，并且你开始写入，你将覆盖等量的现有数据。本章后面的“移动内部指针”会更详细地解释这一点。\n\
    \n使用`fopen()`时，需要向其传递以下两个参数：\n\n*   要打开文件的路径，如果文件在不同域名上则为 URL\n*   包含表 7-2 中列出的一个模式的字符串\n"
- fmt: "`fopen()` 函数返回一个指向已打开文件的引用，之后可以将其用于其他读取/写入函数。以下是如何以读取模式打开文本文件：\n\n```\n$file\
    \ = fopen('C:/private/sonnet.txt', 'r');\n```\n\n此后，你可以将`$file`作为参数传递给其他函数，例如`fgets()`和`fclose()`。通过一些实际演示，情况会变得更清晰。与其自己构建文件，使用`ch07`文件夹中的文件可能更容易。我将快速介绍每种模式。\n\
    \n注意：Mac 和 Linux 用户需要调整示例文件中`private`文件夹的路径，以匹配其设置。\n\n## 使用`fopen()`读取文件\n\n\
    文件`fopen_read.php`包含以下代码：\n\n```\n// store the pathname of the file\n$filename\
    \ = 'C:/private/sonnet.txt';\n// open the file in read-only mode\n$file = fopen($filename,\
    \ 'r');\n// read the file and store its contents\n$contents = fread($file, filesize($filename));\n\
    // close the file\nfclose($file);\n// display the contents with <br> tags\necho\
    \ nl2br($contents);\n```\n\n如果将其加载到浏览器中，你应该会看到以下输出：\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figf_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figf_HTML.jpg)\n\
    \n结果与在`get_contents_03.php`中使用`file_get_contents()`相同。与`file_get_contents()`不同，`fread()`函数需要知道要读取文件的多少内容。你需要提供第二个参数，指定字节数。如果你只想要一个非常大的文件的前100个左右字符，这会很有用。但是，如果你想要整个文件，则需要将文件的路径名传递给`filesize()`以获取正确的数值。\n\
    \n使用`fopen()`读取文件内容的另一种方法是使用`fgets()`，它一次检索一行。这意味着你需要结合`feof()`使用`while`循环来一直读到文件末尾。`fopen_readloop.php`中的代码如下：\n\
    \n```\n$filename = 'C:/private/sonnet.txt';\n// open the file in read-only mode\n\
    $file = fopen($filename, 'r');\n// create variable to store the contents\n$contents\
    \ = \"\";\n// loop through each line until end of file\nwhile (!feof($file)) {\n\
    // retrieve next line, and add to $contents\n$contents .= fgets($file);\n}\n//\
    \ close the file\nfclose($file);\n// display the contents\necho nl2br($contents);\n\
    ```\n\n`while`循环使用`fgets()`逐一检索文件内容——`!feof($file)`等同于说“直到`$file`的末尾”——并将其存储在`$contents`中。使用`fgets()`与使用`file()`函数非常相似，因为它也是一次处理一行。不同之处在于，一旦找到所需信息，你可以使用`fgets()`跳出循环。如果你处理一个非常大的文件，这是一个显著的优势。`file()`函数会将整个文件加载到一个数组中，这会消耗内存。\n\
    \n## PHP 解决方案 7-2：从 CSV 文件中提取数据\n\n文本文件可以用作平面文件数据库，其中每条记录存储在一行中，字段之间用逗号、制表符或其他分隔符分隔。这种类型的文件称为\
    \ **CSV 文件**。通常，CSV 代表逗号分隔值，但当使用制表符或其他分隔符时，它也可以表示字符分隔值。此 PHP 解决方案演示了如何使用`fopen()`和`fgetcsv()`将\
    \ CSV 文件中的值提取到多维关联数组中。\n\n1.  将`weather.csv`从`ch07`文件夹复制到你的`private`文件夹。该文件包含以下逗号分隔值数据：\n\
    \n```\n    city,temp\n    London,11\n    Paris,10\n    Rome,12\n    Berlin,8\n\
    \    Athens,19\n```\n\n第一行由文件其余数据的标题组成。有五行为数据，每行包含一个城市名称和温度。\n\n注意：当数据存储为逗号分隔值时，逗号后不应有空格。如果添加空格，则它被视为数据字段的第一个字符。CSV\
    \ 文件中的每一行必须具有相同数量的项目。\n\n2.  在`filesystem`文件夹中创建一个名为`getcsv.php`的文件，并使用`fopen()`以读取模式打开`users.csv`：\n\
    \n```\n    $file = fopen('C:/private/weather.csv', 'r');\n```\n\n3.  使用`fgetcsv()`将文件的第一行提取为数组，然后将其分配给一个名为`$titles`的变量：\n\
    \n```\n    $titles = fgetcsv($file);\n```\n\n这将创建`$titles`作为一个包含第一行值（city 和 temp）的数组。\n\
    \n`fgetcsv()`函数需要一个参数，即你已打开文件的引用。它还可以接受最多四个可选参数：\n-   行的最大长度：默认值为 0，表示无限制。\n-\
    \   字段之间的分隔符：默认为逗号。\n-   包围字符：如果字段包含作为数据一部分的分隔符，则必须用引号括起来。双引号是默认值。\n-   转义字符：默认为反斜杠。\n\
    \n我们使用的 CSV 文件不需要设置任何可选参数。\n\n4.  在下一行，初始化一个空数组，用于存放将从 CSV 数据中提取的值：\n\n```\n \
    \   $cities = [];\n```\n\n5.  从一行提取值之后，`fgetcsv()`会移动到下一行。要获取文件中的剩余数据，你需要创建一个循环。添加以下代码：\n\
    \n```\n    while (!feof($file)) {\n    $data = fgetcsv($file);\n    if (empty($data))\
    \ {\n        continue;\n    }\n    $cities[] = array_combine($titles, $data);\n\
    \    }\n```\n\n循环内的代码将 CSV 文件的当前行作为数组分配给`$data`，然后使用`array_combine()`函数生成一个关联数组，并将其添加到`$cities`数组中。此函数需要两个参数，这两个参数必须是具有相同数量元素的数组。这两个数组被合并，结果关联数组的键来自第一个参数，值来自第二个参数。\n\
    \n6.  关闭 CSV 文件：\n\n```\n    fclose($file);\n```\n\n7.  要检查结果，请使用`print_r()`。用`<pre>`标签将其包围，以使输出更易于阅读：\n\
    \n```\n    echo '<pre>';\n    print_r($cities);\n    echo '</pre>';\n```\n\n8.\
    \  保存`getcsv.php`并在浏览器中加载。你应该会看到如图 7-1 所示的结果。\n\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Fig1_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Fig1_HTML.jpg)\n\
    \n图 7-1. CSV 数据已被转换为多维关联数组\n\n9.  这对于`weather.csv`来说效果很好，但脚本可以更健壮。如果`fgetcsv()`遇到空行，它会返回一个包含单个`null`元素的数组，当将其作为参数传递给`array_combine()`时，这会产生错误。通过添加以粗体突出显示的条件语句来修改`while`循环：\n\
    \n```\n    while (!feof($file)) {\n    $data = fgetcsv($file);\n    if (empty($data))\
    \ {\n        continue;\n    }\n    $cities[] = array_combine($titles, $data);\n\
    \    }\n```\n\n条件语句使用`empty()`函数，如果变量不存在或等于`false`，则返回 true。如果存在空行，`continue`关键字会返回到循环顶部，而不执行下一行。\n\
    \n你可以对照`ch07`文件夹中的`getcsv.php`检查你的代码。\n\n## 在 macOS 上创建的 CSV 文件\n\nPHP 通常难以检测在\
    \ Mac 操作系统上创建的 CSV 文件中的行尾。如果`fgetcsv()`无法从 CSV 文件中正确提取数据，请在脚本顶部添加以下代码行：\n\n```\n\
    ini_set('auto_detect_line_endings', true);\n```"
  raw: "The `fopen()`\nfunction returns a reference to the open file, which can then\
    \ be used\nwith the other read/write functions. This is how you would open a text\n\
    file for reading:\n\n```\n$file = fopen('C:/private/sonnet.txt', 'r');\n```\n\n\
    Thereafter, you pass `$file` as the argument\nto other functions, such as `fgets()`\
    \ and `fclose()`. Things\nshould become clearer with a few practical demonstrations.\
    \ Rather than\nbuilding the files yourself, you’ll probably find it easier to\
    \ use the\nfiles in the `ch07` folder. I’ll run\nquickly through each mode.\n\n\
    Note\nMac and Linux users need to adjust the path to the `private` folder in the\n\
    example files to match their setup.\n\nReading a File with fopen()\n\nThe file\
    \ `fopen_read.php`\ncontains the following code:\n\n```\n// store the pathname\
    \ of the file\n$filename = 'C:/private/sonnet.txt';\n// open the file in read-only\
    \ mode\n$file = fopen($filename, 'r');\n// read the file and store its contents\n\
    $contents = fread($file, filesize($filename));\n// close the file\nfclose($file);\n\
    // display the contents with  tags\necho nl2br($contents);\n```\n\nIf you load\
    \ this into a browser, you should see the following\noutput:\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figf_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figf_HTML.jpg)\n\
    The result is identical to using `file_get_contents()`\nin `get_contents_03.php`.\n\
    Unlike `file_get_contents()`,\nthe function `fread()` needs to know\nhow much\
    \ of the file to read. You need to supply a second argument\nindicating the number\
    \ of bytes. This can be useful if you want, say,\nonly the first 100 or so characters\
    \ from a very big file. However, if\nyou want the whole file, you need to pass\
    \ the file’s path name to `filesize()` to get the\ncorrect figure.\n\nThe other\
    \ way to read the contents of a file with `fopen()` is to use\n`fgets()`, which\n\
    retrieves one line at a time. This means you need to use a `while` loop in\ncombination\
    \ with `feof()` to read right\nto the end of the file. The code in `fopen_readloop.php`\n\
    looks like this:\n\n```\n$filename = 'C:/private/sonnet.txt';\n// open the file\
    \ in read-only mode\n$file = fopen($filename, 'r');\n// create variable to store\
    \ the contents\n$contents = \";\n// loop through each line until end of file\n\
    while (!feof($file)) {\n// retrieve next line, and add to $contents\n$contents\
    \ .= fgets($file);\n}\n// close the file\nfclose($file);\n// display the contents\n\
    echo nl2br($contents);\n```\n\nThe `while`\nloop uses `fgets()`  to retrieve the\n\
    contents of the file one line at a time—`!feof($file)` is the\nsame as saying\
    \ “until the end of `$file`”—and stores\nthem in `$contents`.\nUsing `fgets()`\
    \ is very\nsimilar to using the `file()` function in\nthat it handles one line\
    \ at a time. The difference is that you can break\nout of the loop with `fgets()`\
    \ once you have\nfound the information you’re looking for. This is a significant\n\
    advantage if you’re working with a very large file. The `file()` function loads\n\
    the entire file into an array, consuming memory.\n\nPHP Solution 7-2: Extracting\
    \ Data from a CSV\nFile\n\nText files can be used as a flat-file database, where\
    \ each record is\nstored in a single line with a comma, tab, or other delimiter\
    \ between\neach field. This type of file is called a **CSV file**.\nUsually, CSV\
    \ stands for comma-separated values, but it can also mean\ncharacter-separated\
    \ values when a tab or different delimiter is used.\nThis PHP solution shows how\
    \ to extract the values from a CSV file into a\nmultidimensional associative array\
    \ using `fopen()` and `fgetcsv()`.\n\n1.  Copy `weather.csv` from the\n    `ch07`\
    \ folder to\n    your `private`\n    folder. The file contains the following data\
    \ as comma-separated values:\n\n```\n    city,temp\n    London,11\n    Paris,10\n\
    \    Rome,12\n    Berlin,8\n    Athens,19\n    ```\n\nThe first line consists\
    \ of titles for the data in the rest of the\n    file. There are five lines of\
    \ data, each containing the name of a city\n    and a temperature.\n\nCaution\n\
    When storing data as comma-separated values, there should be no space\nafter the\
    \ comma. If you add a space, it’s considered to be the first\ncharacter of a data\
    \ field. Each line in a CSV file must have the same\nnumber of items.\n\n1.  Create\
    \ a file called `getcsv.php` in the\n    `filesystem`\n    folder and use `fopen()`\
    \ to open `users.csv` in read\n    mode:\n\n```\n    $file = fopen('C:/private/weather.csv',\
    \ 'r');\n    ```\n\n2.  Use `fgetcsv()`\n    to extract the first line from the\
    \ file as an array, then assign it to a\n    variable called `$titles`:\n\n```\n\
    \    $titles = fgetcsv($file);\n    ```\n\nThis creates `$titles` as an array\n\
    \    containing the values from the first line (city and temp).\n\nThe `fgetcsv()`\n\
    \    function  requires\n    a single argument, the reference to the file you\
    \ have opened. It also\n    accepts up to four optional arguments:\n\n*   The\
    \ maximum length of the line: The default value is 0, which\n        means no\
    \ limit.\n\n*   The delimiter between fields: Comma is the default.\n\n*   The\
    \ enclosure character: If fields contain the delimiter as part\n        of the\
    \ data, they must be enclosed in quotes. Double quotes are the\n        default.\n\
    \n*   The escape character: The default is a backslash.\n\nThe CSV file that we’re\
    \ using doesn’t require any of the optional\n    arguments to be set.\n\n3.  On\
    \ the next line, initialize an empty array for the values that will\n    be extracted\
    \ from the CSV data:\n\n```\n    $cities = [];\n    ```\n\n4.  After extracting\
    \ values from a line, `fgetcsv()` moves to\n    the next line. To get the remaining\
    \ data from the file, you need to\n    create a loop. Add the following code:\n\
    \n```\n    while (!(feof($file)) {\n    $data = fgetcsv($file);\n    $cities[]\
    \ = array_combine($titles, $data);\n    }\n    ```\n\nThe code inside the loop\
    \ assigns the current line of the CSV file as\n    an array to $data, and then\
    \ uses the `array_combine()`\n    function to generate an associative array, which\
    \ is added to the  `$cities` array. This\n    function requires two arguments,\
    \ both of which must be arrays with the\n    same number of elements. The two\
    \ arrays are merged, drawing the keys for\n    the resulting associative array\
    \ from the first argument and the values\n    from the second one.\n\n5.  Close\
    \ the CSV file:\n\n```\n    fclose($file);\n    ```\n\n6.  To inspect the result,\
    \ use `print_r()`. Surround\n    it with `<pre>` tags to\n    make the output\
    \ easier to read:\n\n```\n    echo '';\n    print_r($cities);\n    echo '';\n\
    \    ```\n\n7.  Save `getcsv.php`\n    and load it in a browser. You should see\
    \ the result shown in Figure\n    [7-1](#332054_4_En_7_Chapter.xhtml#Fig1).\n\n\
    ![../images/332054_4_En_7_Chapter/332054_4_En_7_Fig1_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Fig1_HTML.jpg)\n\
    \nFigure 7-1.\n\nThe CSV data has been converted into a multidimensional associative\n\
    \    array\n\n8.  This works well with `weather.csv`, but the\n    script can\
    \ be made more robust. If `fgetcsv()` encounters\n    a blank line, it returns\
    \ an array containing a single `null` element, which\n    generates an error when\
    \ passed as an argument to `array_combine()`.\n    Amend the `while`\n    loop\
    \ by adding the conditional statement highlighted in bold:\n\n```\n    while (!feof($file))\
    \ {\n    $data = fgetcsv($file);\n    if (empty($data)) {\n    continue;\n   \
    \ }\n    $cities[] = array_combine($titles, $data);\n    }\n    ```\n\nThe conditional\
    \ statement uses the `empty()` function , which returns true if\n    a variable\
    \ doesn’t exist or equates to `false`.  If there’s a blank\n    line, the `continue`\
    \ keyword\n    returns to the top of the loop without executing the next line.\n\
    \nYou can check your code against `getcsv.php` in the\n    `ch07`\n    folder.\n\
    \nCSV Files Created On MacOS\n\nPHP often has difficulty detecting the line endings\
    \ in CSV files created\non Mac operating systems. If `fgetcsv()` fails to\nextract\
    \ data correctly from a CSV file, add the following line of code\nat the top of\
    \ the script:\n\n```\nini_set('auto_detect_line_endings', true);\n```"
  trans: "\n`fopen()` 函数返回一个指向已打开文件的引用，之后可以将其用于其他读取/写入函数。以下是如何以读取模式打开文本文件：\n\n```\n\
    $file = fopen('C:/private/sonnet.txt', 'r');\n```\n\n此后，你可以将 `$file` 作为参数传递给其他函数，例如\
    \ `fgets()` 和 `fclose()`。通过一些实际演示，情况会变得更清晰。与其自己构建文件，使用 `ch07` 文件夹中的文件可能更容易。我将快速介绍每种模式。\n\
    \n注意：Mac 和 Linux 用户需要调整示例文件中 `private` 文件夹的路径，以匹配其设置。\n\n## 使用 `fopen()` 读取文件\n\
    \n文件 `fopen_read.php` 包含以下代码：\n\n```\n// store the pathname of the file\n$filename\
    \ = 'C:/private/sonnet.txt';\n// open the file in read-only mode\n$file = fopen($filename,\
    \ 'r');\n// read the file and store its contents\n$contents = fread($file, filesize($filename));\n\
    // close the file\nfclose($file);\n// display the contents with <br> tags\necho\
    \ nl2br($contents);\n```\n\n如果将其加载到浏览器中，你应该会看到以下输出：\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figf_HTML.jpg](img/332054_4_En_7_Figf_HTML.jpg)\n\
    \n结果与在 `get_contents_03.php` 中使用 `file_get_contents()` 相同。与 `file_get_contents()`\
    \ 不同，`fread()` 函数需要知道要读取文件的多少内容。你需要提供第二个参数，指定字节数。如果你只想要一个非常大的文件的前 100 个左右字符，这会很有用。但是，如果你想要整个文件，则需要将文件的路径名传递给\
    \ `filesize()` 以获取正确的数值。\n\n使用 `fopen()` 读取文件内容的另一种方法是使用 `fgets()`，它一次检索一行。这意味着你需要结合\
    \ `feof()` 使用 `while` 循环来一直读到文件末尾。`fopen_readloop.php` 中的代码如下：\n\n```\n$filename\
    \ = 'C:/private/sonnet.txt';\n// open the file in read-only mode\n$file = fopen($filename,\
    \ 'r');\n// create variable to store the contents\n$contents = \"\";\n// loop\
    \ through each line until end of file\nwhile (!feof($file)) {\n// retrieve next\
    \ line, and add to $contents\n$contents .= fgets($file);\n}\n// close the file\n\
    fclose($file);\n// display the contents\necho nl2br($contents);\n```\n\n`while`\
    \ 循环使用 `fgets()` 逐一检索文件内容——`!feof($file)` 等同于说“直到 `$file` 的末尾”——并将其存储在 `$contents`\
    \ 中。使用 `fgets()` 与使用 `file()` 函数非常相似，因为它也是一次处理一行。不同之处在于，一旦找到所需信息，你可以使用 `fgets()`\
    \ 跳出循环。如果你处理一个非常大的文件，这是一个显著的优势。`file()` 函数会将整个文件加载到一个数组中，这会消耗内存。\n\n## PHP 解决方案\
    \ 7-2：从 CSV 文件中提取数据\n\n文本文件可以用作平面文件数据库，其中每条记录存储在一行中，字段之间用逗号、制表符或其他分隔符分隔。这种类型的文件称为\
    \ **CSV 文件**。通常，CSV 代表逗号分隔值，但当使用制表符或其他分隔符时，它也可以表示字符分隔值。此 PHP 解决方案演示了如何使用 `fopen()`\
    \ 和 `fgetcsv()` 将 CSV 文件中的值提取到多维关联数组中。\n\n1.  将 `weather.csv` 从 `ch07` 文件夹复制到你的\
    \ `private` 文件夹。该文件包含以下逗号分隔值数据：\n\n```\n    city,temp\n    London,11\n    Paris,10\n\
    \    Rome,12\n    Berlin,8\n    Athens,19\n```\n\n第一行由文件其余数据的标题组成。有五行为数据，每行包含一个城市名称和温度。\n\
    \n注意：当数据存储为逗号分隔值时，逗号后不应有空格。如果添加空格，则它被视为数据字段的第一个字符。CSV 文件中的每一行必须具有相同数量的项目。\n\n\
    2.  在 `filesystem` 文件夹中创建一个名为 `getcsv.php` 的文件，并使用 `fopen()` 以读取模式打开 `users.csv`：\n\
    \n```\n    $file = fopen('C:/private/weather.csv', 'r');\n```\n\n3.  使用 `fgetcsv()`\
    \ 将文件的第一行提取为数组，然后将其分配给一个名为 `$titles` 的变量：\n\n```\n    $titles = fgetcsv($file);\n\
    ```\n\n这将创建 `$titles` 作为一个包含第一行值（city 和 temp）的数组。\n\n`fgetcsv()` 函数需要一个参数，即你已打开文件的引用。它还可以接受最多四个可选参数：\n\
    -   行的最大长度：默认值为 0，表示无限制。\n-   字段之间的分隔符：默认为逗号。\n-   包围字符：如果字段包含作为数据一部分的分隔符，则必须用引号括起来。双引号是默认值。\n\
    -   转义字符：默认为反斜杠。\n\n我们使用的 CSV 文件不需要设置任何可选参数。\n\n4.  在下一行，初始化一个空数组，用于存放将从 CSV 数据中提取的值：\n\
    \n```\n    $cities = [];\n```\n\n5.  从一行提取值之后，`fgetcsv()` 会移动到下一行。要获取文件中的剩余数据，你需要创建一个循环。添加以下代码：\n\
    \n```\n    while (!feof($file)) {\n    $data = fgetcsv($file);\n    if (empty($data))\
    \ {\n        continue;\n    }\n    $cities[] = array_combine($titles, $data);\n\
    \    }\n```\n\n循环内的代码将 CSV 文件的当前行作为数组分配给 `$data`，然后使用 `array_combine()` 函数生成一个关联数组，并将其添加到\
    \ `$cities` 数组中。此函数需要两个参数，这两个参数必须是具有相同数量元素的数组。这两个数组被合并，结果关联数组的键来自第一个参数，值来自第二个参数。\n\
    \n6.  关闭 CSV 文件：\n\n```\n    fclose($file);\n```\n\n7.  要检查结果，请使用 `print_r()`。用\
    \ `<pre>` 标签将其包围，以使输出更易于阅读：\n\n```\n    echo '<pre>';\n    print_r($cities);\n\
    \    echo '</pre>';\n```\n\n8.  保存 `getcsv.php` 并在浏览器中加载。你应该会看到如图 7-1 所示的结果。\n\
    \n![../images/332054_4_En_7_Chapter/332054_4_En_7_Fig1_HTML.jpg](img/332054_4_En_7_Fig1_HTML.jpg)\n\
    \n**图 7-1.** CSV 数据已被转换为多维关联数组\n\n9.  这对于 `weather.csv` 来说效果很好，但脚本可以更健壮。如果 `fgetcsv()`\
    \ 遇到空行，它会返回一个包含单个 `null` 元素的数组，当将其作为参数传递给 `array_combine()` 时，这会产生错误。通过添加以粗体突出显示的条件语句来修改\
    \ `while` 循环：\n\n```\n    while (!feof($file)) {\n    $data = fgetcsv($file);\n\
    \    if (empty($data)) {\n        continue;\n    }\n    $cities[] = array_combine($titles,\
    \ $data);\n    }\n```\n\n条件语句使用 `empty()` 函数，如果变量不存在或等于 `false`，则返回 true。如果存在空行，`continue`\
    \ 关键字会返回到循环顶部，而不执行下一行。\n\n你可以对照 `ch07` 文件夹中的 `getcsv.php` 检查你的代码。\n\n## 在 macOS\
    \ 上创建的 CSV 文件\n\nPHP 通常难以检测在 Mac 操作系统上创建的 CSV 文件中的行尾。如果 `fgetcsv()` 无法从 CSV 文件中正确提取数据，请在脚本顶部添加以下代码行：\n\
    \n```\nini_set('auto_detect_line_endings', true);\n```\n"
- fmt: "This has a marginal effect on performance, so it should be used only if Mac\
    \ line endings cause problems with CSV files.\n\n## Replacing Content with `fopen()`\n\
    \nThe first of the write-only modes (`w`) deletes any existing content in a file,\
    \ so it’s useful for working with files that need to be updated frequently. You\
    \ can test the `w` mode with `fopen_write.php`, which has the following PHP code\
    \ above the `DOCTYPE` declaration:\n\n```\nWhen the form in the page is submitted,\
    \ this code writes the value of\n`$_POST['contents']` to\na file called `write.txt`.\
    \ The `fwrite()`\nfunction  takes\ntwo arguments: the reference to the file and\
    \ whatever you want to write\nto it.\n\nNote\nYou may come across `fputs()` instead\
    \ of\n`fwrite()`. The\ntwo functions are identical: `fputs()` is a synonym\nfor\
    \ `fwrite()`.\n\nIf you load `fopen_write.php` into\na browser, type something\
    \ into the text area, and click Write to file,\nPHP creates `write.txt` and inserts\n\
    whatever you typed into the text area. Since this is just a\ndemonstration, I’ve\
    \ omitted any checks to make sure that the file was\nsuccessfully written. Open\
    \ `write.txt` to verify\nthat your text has been inserted. Now, type something\
    \ different into the\ntext area and submit the form again. The original content\
    \ is deleted\nfrom `write.txt`\nand replaced with the new text. The deleted text\
    \ is gone forever.\n```\n\n## Appending Content with `fopen()`\n\nThe append mode\
    \ not only adds new content at the end, preserving any existing content, but it\
    \ can also create a new file if it doesn’t already exist. The code in `fopen_append.php`\
    \ looks like this:\n\n```\n// open the file in append mode\n$file = fopen('C:/private/append.txt',\
    \ 'a');\n// write the contents followed by a new line\nfwrite($file, $_POST['contents']\
    \ . PHP_EOL);\n// close the file\nfclose($file);\n```\n\nNotice that I have concatenated\
    \ `PHP_EOL` after `$_POST['contents']`. This is a PHP constant that represents\
    \ a new line using the correct characters for the operating system. On Windows,\
    \ it inserts a carriage return and newline character, but on Mac and Linux only\
    \ a newline character. If you load `fopen_append.php` into a browser, type some\
    \ text, and submit the form, it creates a file called `append.txt` in the private\
    \ folder and inserts your text. Type something else and submit the form again;\
    \ the new text should be added to the end of the previous text, as shown in the\
    \ following screenshot.  \n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figg_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figg_HTML.jpg)\
    \  \nWe’ll come back to append mode in Chapter [11](#332054_4_En_11_Chapter.xhtml).\n\
    \n## Locking a File before Writing\n\nThe purpose of using `fopen()` with `c`\
    \ mode is to give you the opportunity to lock the file with `flock()` before modifying\
    \ it.\n\nThe `flock()` function takes two arguments: the file reference and a\
    \ constant specifying how the lock should operate. There are three types of operation:\n\
    \n*   `LOCK_SH` acquires a shared lock for reading.\n*   `LOCK_EX` acquires an\
    \ exclusive lock for writing.\n*   `LOCK_UN` releases the lock.\n\nTo lock a file\
    \ before writing to it, open the file in `c` mode and immediately call `flock()`,\
    \ like this:\n\n```\n// open the file in c mode\n$file = fopen('C:/private/lock.txt',\
    \ 'c');\n// acquire an exclusive lock\nflock($file, LOCK_EX);\n```\n\nThis opens\
    \ the file, or creates it if it doesn’t already exist, and places the internal\
    \ pointer at the beginning of the file. This means you need to move the pointer\
    \ to the end of the file or delete the existing content before you can start writing\
    \ with `fwrite()`.\n\nTo move the pointer to the end of the file, use the `fseek()`\
    \ function, like this:\n\n```\n// move to end of file\nfseek($file, 0, SEEK_END);\n\
    ```\n\nAlternatively, delete the existing contents by calling `ftruncate()`:\n\
    \n```\n// delete the existing contents\nftruncate($file, 0);\n```\n\nAfter you\
    \ have finished writing to the file, you must unlock it manually before calling\
    \ `fclose()`:\n\n```\n// unlock the file before closing\nflock($file, LOCK_UN);\n\
    fclose($file);\n```"
