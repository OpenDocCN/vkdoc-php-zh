  \ `_upload()` 方法中，该方法使用了 Zend Framework 的 `Zend_File_Transfer_Adapter_Http` 类。这个类主要负责文件验证和上传，但出于我们的目的，只需要用到其中很小一部分代码。\n\
  \n**注意：** 你可以在 [`framework.zend.com/manual/en/zend.file.transfer.introduction.html`](http://framework.zend.com/manual/en/zend.file.transfer.introduction.html)\
  \ 了解更多关于 Zend Framework 文件传输类的信息。\n\n文件上传后，我们在数据库表中创建一条记录，将其与上传文件的用户关联起来。\n\n在我们修改个人资料页面以显示照片之前，需要看看如何在\
  \ Zend Framework 应用程序中使用外部库。\n\n### 第三方库\n\n在 Zend Framework 应用程序中使用第三方库与使用内置库几乎完全一样。\n\
  \n我们只需添加另一个自动加载器实例（默认 Zend Framework 配置的那个除外），以便在不使用 include 语句的情况下加载类。你可以在修改后的\
  \ `application/Bootstrap.php` 文件中看到这一点，如清单 28-6 所示。\n\n**清单 28-6.** 修改后的 `Bootstrap.php`\
  \ 文件\n\n\n```php\nclass Bootstrap extends Zend_Application_Bootstrap_Bootstrap\n\
  {\n    protected function _initAutoloader()\n    {\n        $autoloader = Zend_Loader_Autoloader::getInstance();\n\
  \        $autoloader->registerNamespace(\"Imagine\");\n    }\n}\n```\n\n我们需要为自动加载器添加`Imagine`的命名空间，这样当应用程序实例化`library/Imagine`目录中的类时，就能识别以`Imagine`为前缀的类。现在我们可以使用`Imagine`类来修改上传的文件，这将在一个新的受保护方法中实现，并通过修改`Users`控制器中的`profileAction()`方法来完成，如列表\
  \ 28-7 所示。\n\n**列表 28-7.** 在`profileAction()`方法中使用`Imagine`\n\n```php\nclass UsersController\
  \ extends Zend_Controller_Action\n{\n    protected function _thumbnail($file)\n\
  \    {\n        $path = dirname(APPLICATION_PATH).\"/public/uploads\";\n       \
  \ $width = 64;\n        $height = 64;\n        $name = $file->name;\n        $filename\
  \ = pathinfo($name, PATHINFO_FILENAME);\n        $extension = pathinfo($name, PATHINFO_EXTENSION);\n\
  \        if ($filename && $extension)\n        {\n            $thumbnail = \"{$filename}-{$width}x{$height}.{$extension}\"\
  ;\n            if (!file_exists(\"{$path}/{$thumbnail}\"))\n            {\n    \
  \            $imagine = new Imagine\\Gd\\Imagine();\n                $size = new\
  \ Imagine\\Image\\Box($width, $height);\n                $mode = Imagine\\Image\\\
  ImageInterface::THUMBNAIL_OUTBOUND;\n\n                $imagine\n              \
  \      ->open(\"{$path}/{$name}\")\n                    ->thumbnail($size, $mode)\n\
  \                    ->save(\"{$path}/{$thumbnail}\");\n            }\n        \
  \    return $thumbnail;\n        }\n    }\n\n    public function profileAction()\n\
  \    {\n        // 检查用户会话\n        $this->_isSecure();\n        // 加载缩略图\n     \
  \   $file = Application_Model_File::first(array(\n            \"user = ?\" => $this->user->id\n\
  \        ));\n        $filename = $this->_thumbnail($file);\n        // 加载视图\n \
  \       $this->view->user = $this->user;\n        $this->view->filename = $filename;\n\
  \    }\n}\n```\n\n> **注意：** 请务必保护好上传目录的安全！\n\n`_thumbnail()`方法类似于我们在 CodeIgniter\
  \ 应用程序中创建的外观类，并且也由 profile action 内部调用。如果缩略图不存在，该方法将生成一个缩略图，并将其返回给`profileAction()`方法，然后该方法将其分配给视图。我们还需要修改`profile.phtml`视图，如列表\
  \ 28-8 所示。\n\n**列表 28-8.** `profile.phtml`视图\n\n```php\n<?php if ($this->filename):\
  \ ?>\n    <img src=\"/uploads/<?php echo $this->filename; ?>\" />\n<?php endif;\
  \ ?>\n<h1><?php echo $this->user->first; ?> <?php echo $this->user->last; ?></h1>\n\
  ```\n\n这是一个个人资料页面！现在我们知道如何利用 Zend Framework 内置库，以及支持命名空间和类自动加载的第三方库。\n\n---\n\n\
  **问题**\n\n1. Zend Framework 的命名空间模式与 PHP 5.3 提供的命名空间模式有哪些区别？\n2. 我们开始使用 Zend Framework\
  \ 时通过命令行界面创建项目，但后续大部分工作都没有借助 CLI。为什么会出现这种情况？\n\n**答案**\n\n1. Zend Framework（1.11）使用下划线作为命名空间分隔符，而\
  \ PHP 5.3 命名空间则使用反斜杠字符分隔。从技术上讲，Zend Framework 的类库并没有命名空间，因为它们都位于全局命名空间中。不过，由于 Zend\
  \ Framework 的类名通常比较冗长，因此不太可能发生冲突。\n2. 虽然 CLI 提供了许多有用的功能，但学习一个框架必须通过手动编码来完成。我们本可以使用\
  \ CLI，但那样的话我们对 Zend Framework 的理解就会少得多。\n\n**练习**\n\n1. 目前无法在`profileAction()`方法之外生成缩略图。尝试创建一个支持此功能的公共动作。\n\
  2. 查看 Zend Framework 附带的许多类库。这些库中包含许多有用的资源，甚至可以在其他框架中一起使用。\n\n---\n\n**第 29 章**\n\
  **Zend Framework：测试**\n\n我们通过探讨如何使用 PHPUnit 在应用程序中运行单元测试，来结束对 Zend Framework 的学习。\n\
  \n**目标**\n\n\n- 需要学习如何安装`PEAR`和`PHPUnit`。\n- 需要学习如何在控制器上创建和运行测试。\n\n#### 安装`PEAR`\n\
  \n`PEAR`是用于可重用`PHP`库的官方分发平台。你可以把它想象成`Homebrew`，只不过它分发的不是与`OS X`兼容的软件包，而是专为`PHP`定制的库。\n\
  \n只需几个步骤即可安装`PEAR`，我们将在下面详细介绍。\n\n##### Windows\n\n- 下载并安装`PHP`后，你必须手动执行批处理文件，例如位于`c:\\\
  php\\go-pear.bat`的文件。安装程序会询问你一些问题，之后`PEAR Package Manager`将安装在你安装时指定的路径中。\n\n- 接下来，你必须将安装路径添加到`PATH`环境变量中。可以手动操作（开始\
  \ > 控制面板 > 系统 > 环境），或者运行（双击）新生成的`PEAR_ENV.reg`（它现在位于`PHP`源目录中）。\n\n- 之后，你可以通过在 Windows\
  \ 命令提示符中运行命令`pear`来访问`PEAR Package Manager`。\n\n- 要更新你的`PEAR`安装，请在浏览器中请求 `http://pear.php.net/go-pear.phar`\
  \ 并将输出保存到本地文件`go-pear.phar`。然后可以运行以下命令行：\n\n```\nphp go-pear.phar\n```\n\n#####\
  \ Unix/Linux/BSD\n\n使用`PHP`时，除非使用了`./configure`选项`--without-pear`，否则`PEAR Package\
  \ Manager`已经安装。\n\n如果使用的是由 Unix/Linux/BSD 发行版提供的`PHP`版本，则可能需要手动安装`PEAR`。在这种情况下，用户应查阅相应发行版的文档。如果你想重新安装`PEAR`，可以使用以下方法：\n\
  \n- `wget http://pear.php.net/go-pear.phar`\n- `php go-pear.phar`\n\n##### Mac OS\
  \ X\n\n在 Mac OS 10.4 及更早版本上，`PEAR Package Manager`已经安装在`/usr/bin/pear`。\n\n如果你使用的是\
  \ Mac OS 10.5（Leopard）并且希望安装新的或重新安装`PEAR Package Manager`，请使用以下命令：\n\n- `wget http://pear.php.net/go-pear.phar`\n\
  - `php -d detect_unicode=0 go-pear.phar`\n\n#### 安装`PHPUnit`\n\n此时安装`PHPUnit`更加简单，因为它只需要以下两个命令：\n\
  \n- `pear config-set auto_discover 1`\n- `pear install pear.phpunit.de/PHPUnit`\n\
  \n### 运行测试\n\n当我们最初设置 Zend Framework 项目时，它通知我们`PHP`包含路径中未找到`PHPUnit`。既然我们已经（通过`PEAR`）安装了`PHPUnit`，就不应再遇到此问题。\n\
  \n导航到 Zend Framework CLI 为我们生成的`tests`目录，并运行以下命令：\n\n- `phpunit`\n\n> **注意**：如果你的\
  \ Zend Framework 库文件位于`libraries`目录内，请务必遵循`phpunit.xml`中的说明。\n\n### 添加测试\n\n添加测试是一个相当直接的过程。我们将向`tests/controllers/IndexControllerTest.php`文件添加四个测试，如清单\
  \ 29-1 所示。\n\n***清单 29-1。*** 添加单元测试\n\n```\nclass IndexControllerTest extends Zend_Test_PHPUnit_ControllerTestCase\n\
