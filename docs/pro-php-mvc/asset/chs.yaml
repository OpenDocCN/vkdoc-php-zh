- "# 第 9 章\n\n### 数据库\n\n大多数大型应用程序都有一个共同点：它们都是为与数据库协同工作而构建的。如果没有数据，世界上所有的计算都毫无意义。想想任何一项运动的规则。规则的存在是为了确保秩序，并判定谁是赢家。如果没有创造比分的球队，规则本身就毫无意义。\n\
  \n同样，除非涉及真实世界的数据，否则业务流程和计算也毫无意义。但为了获取、存储或修改这些数据，我们需要编写代码来连接数据库并执行各种必要的功能。这正是我们现在要创建的代码。\n\
  \n### 目标\n\n- 我们需要构建一组类，以便与数据库进行交互。\n- 这些类应允许我们通过链式方法调用来表达性地构建查询。\n\n### 实现\n\n\
  出于时间考虑，我们将专注于 MySQL 数据库引擎。MySQL 是一个关系型 SQL 数据库引擎。如果你不熟悉 SQL，现在可能是时候补习一下了。请参考清单 9-1\
  \ 中的示例。\n\n***清单 9-1.*** 使用 PHP/MySQL 进行操作\n\n```\n/*\n * 假设有以下数据库表：\n *\n * CREATE\
  \ TABLE 'users' (\n *   'id' int(11) NOT NULL AUTO_INCREMENT,\n *   'first_name'\
  \ varchar(32) DEFAULT NULL,\n *   'last_name' varchar(32) DEFAULT NULL,\n *   'modified'\
  \ datetime DEFAULT NULL,\n *   PRIMARY KEY ('id')\n * ) ENGINE = InnoDB DEFAULT\
  \ CHARSET = utf8 AUTO_INCREMENT = 1 ;\n *\n * CREATE TABLE 'points' (\n *   'id'\
  \ int(11) DEFAULT NULL,\n *   'points' int(11) DEFAULT NULL\n * ) ENGINE = InnoDB\
  \ DEFAULT CHARSET = utf8;\n */\n\n$database = new MySQLi(\n    \"localhost\",\n\
  \    \"prophpmvc\",\n    \"prophpmvc\",\n    \"prophpmvc\",\n);\n\n$rows = array();\n\
  $result = $database->query(\"SELECT first_name, last_name AS surname, points AS\
  \ discount FROM users JOIN points ON users.id = points.id WHERE first_name = 'chris'\
  \ ORDER BY last_name DESC LIMIT 100\");\n\nfor ($i = 0; $i < $result->num_rows;\
  \ $i++)\n{\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\n\n`$rows[]\
  \ = (object) $result->fetch_array(MYSQLI_ASSOC);`\n\n这个示例包含两个部分。第一部分是用于执行 SQL 语句的\
  \ PHP 语句，第二部分则是该 SQL 语句本身。这是一个 PHP 与 MySQL 协同工作的非常基础的示例，但我们还可以更进一步，正如你在清单 9-2 中所见。\n\
  \n**清单 9-2.** 富有表现力的 SQL 生成\n\n```\n$all = $database->query()\n    ->from(\"users\"\
  , array(\n        \"name\",\n        \"surname\" => \"last_name\"\n    ))\n    ->join(\"\
  points\", \"points.user_id = users.id\", array(\n        \"points\" => \"rewards\"\
  \n    ))\n    ->where(\"name = ?\", \"chris\")\n    ->order(\"last_name\", \"desc\"\
  )\n    ->limit(100)\n    ->all();\n```\n\n这段代码展示了我们所追求的那种流畅的查询创建方式。当我们完成本章的学习后，第二个示例应该能够实现与第一个示例完全相同的功能，但它更易于阅读和理解。如果我们把所需的代码构建得足够好，应该还能在不重写任何查询语句的情况下，切换到不同的数据库引擎！\n\
  \n我们构建数据库代码的平台必须足够健壮——它将处理大量数据。在大多数情况下，它需要易于使用，并且必须确保安全。与配置和缓存类似，我们会创建一个数据库工厂类，该类负责加载一个数据库驱动。这些数据库驱动与配置和缓存的驱动略有不同，因为它们被分成了两个部分：连接器和查询器。在深入探讨连接器和查询器之前，让我们先看看清单\
  \ 9-3 中展示的数据库工厂。\n\n**清单 9-3.** 数据库工厂类\n\n```\nnamespace Framework\n{\n    use Framework\\\
  Base as Base;\n    use Framework\\Database as Database;\n    use Framework\\Database\\\
  Exception as Exception;\n\n    class Database extends Base\n    {\n        /**\n\
  \         * @readwrite\n         */\n        protected $_type;\n\n        /**\n\
  \         * @readwrite\n         */\n        protected $_options;\n\n        protected\
  \ function _getExceptionForImplementation($method)\n        {\n            return\
  \ new Exception\\Implementation(\"{$method} method not implemented\");\n       \
  \ }\n\n        public function initialize()\n        {\n            if (!$this->type)\n\
  \            {\n                throw new Exception\\Argument(\"Invalid type\");\n\
  \            }\n\n            switch ($this->type)\n            {\n            \
  \    case \"mysql\":\n                {\n                    return new Database\\\
  Connector\\Mysql($this->options);\n                    break;\n                }\n\
  \                default:\n                {\n                    throw new Exception\\\
  Argument(\"Invalid type\");\n                    break;\n                }\n   \
  \         }\n        }\n    }\n}\n```\n\n我们从 `Database` 工厂类开始我们的数据库工作。它会返回一个 `Database\\\
  Connector` 的子类（在这个例子中是 `Database\\Connector\\Mysql`）。连接器是负责与特定数据库引擎进行实际交互的类。它们执行查询并返回元数据（例如最后插入的\
  \ ID 和受影响的行数）。\n\n查询器负责生成发送给数据库引擎的实际指令，例如针对 `INSERT`、`UPDATE` 和 `DELETE` 的 SQL 查询。\n\
  \n#### 连接器\n\n我们的数据库连接器并不仅限于关系型数据库引擎，但由于本书篇幅有限，我们只会构建 MySQL 连接器/查询器类。我将其他连接器/查询器的创建留作读者练习。\n\
  \n> **注：** 我们并不局限于使用 MySQL 数据库引擎，但我们只会创建适用于 MySQL 数据库服务器的连接器/查询器类。你也可以选择使用 SQL Server（www.microsoft.com/sqlserver）或\
  \ PostgreSQL（www.postgresql.org），但我选择使用 MySQL，因为它免费、易于安装，而且是三者中最流行的一个。\n\n与我们之前配置和缓存驱动继承自一个基础驱动类类似，我们的连接器类将继承自清单\
  \ 9-4 中所示的基础连接器类。\n\n**清单 9-4.** `Database\\Connector` 类\n\n```\nnamespace Framework\\\
  Database\n{\n    use Framework\\Base as Base;\n    use Framework\\Database\\Exception\
  \ as Exception;\n\n    class Connector extends Base\n    {\n        public function\
  \ initialize()\n        {\n            return $this;\n        }\n    }\n}\n```\n\
  \n\n\n`protected function _getExceptionForImplementation($method)`\n\n```\n{\n \
  \   return new Exception\\Implementation(\"{$method} method not implemented\");\n\
  }\n}\n}\n```\n\n`Database\\Connector` 类相当简单。它仅用特定于数据库的变体重写了异常生成方法。具体连接到数据库引擎和/或返回相关查询类实例的实际工作，则由各个供应商特定的连接器类负责。如清单\
  \ 9-5 所示，我们的 MySQL 连接器类做了更多的工作。\n\n**清单 9-5.** `Database\\Connector\\Mysql` 类\n\n\
  ```\nnamespace Framework\\Database\\Connector\n{\n    use Framework\\Database as\
  \ Database;\n    use Framework\\Database\\Exception as Exception;\n\n    class Mysql\
  \ extends Database\\Connector\n    {\n        protected $_service;\n\n        /**\n\
  \         * @readwrite\n         */\n        protected $_host;\n\n        /**\n\
  \         * @readwrite\n         */\n        protected $_username;\n\n        /**\n\
  \         * @readwrite\n         */\n        protected $_password;\n\n        /**\n\
  \         * @readwrite\n         */\n        protected $_schema;\n\n        /**\n\
  \         * @readwrite\n         */\n        protected $_port = \"3306\";\n\n  \
  \      /**\n         * @readwrite\n         */\n        protected $_charset = \"\
  utf8\";\n\n        /**\n         * @readwrite\n         */\n        protected $_engine\
  \ = \"InnoDB\";\n\n        /**\n         * @readwrite\n         */\n        protected\
  \ $_isConnected = false;\n\n        // 检查是否已连接到数据库\n        protected function _isValidService()\n\
  \        {\n            $isEmpty = empty($this->_service);\n            $isInstance\
  \ = $this->_service instanceof \\MySQLi;\n            if ($this->isConnected &&\
  \ $isInstance && !$isEmpty)\n            {\n                return true;\n     \
  \       }\n            return false;\n        }\n\n        // 连接到数据库\n        public\
  \ function connect()\n        {\n            if (!$this->_isValidService())\n  \
  \          {\n                $this->_service = new \\MySQLi(\n                \
  \    $this->_host,\n                    $this->_username,\n                    $this->_password,\n\
  \                    $this->_schema,\n                    $this->_port\n       \
  \         );\n\n                if ($this->_service->connect_error)\n          \
  \      {\n                    throw new Exception\\Service(\"无法连接到服务\");\n     \
  \           }\n                $this->isConnected = true;\n            }\n     \
  \       return $this;\n        }\n\n        // 断开与数据库的连接\n        public function\
  \ disconnect()\n        {\n            if ($this->_isValidService())\n         \
  \   {\n                $this->isConnected = false;\n                $this->_service->close();\n\
  \            }\n            return $this;\n        }\n\n        // 返回相应的查询实例\n \
  \       public function query()\n        {\n            return new Database\\Query\\\
  Mysql(array(\n                \"connector\" => $this\n            ));\n        }\n\
  \n        // 执行提供的 SQL 语句\n        public function execute($sql)\n        {\n  \
  \          if (!$this->_isValidService())\n            {\n                throw\
  \ new Exception\\Service(\"未连接到有效的服务\");\n            }\n            return $this->_service->query($sql);\n\
  \        }\n\n        // 转义提供的值，使其对查询安全\n        public function escape($value)\n\
  \        {\n            if (!$this->_isValidService())\n            {\n        \
  \        throw new Exception\\Service(\"未连接到有效的服务\");\n            }\n         \
  \   return $this->_service->real_escape_string($value);\n        }\n\n        //\
  \ 返回最后插入行的 ID\n        public function getLastInsertId()\n        {\n          \
  \  if (!$this->_isValidService())\n            {\n                throw new Exception\\\
  Service(\"未连接到有效的服务\");\n            }\n            return $this->_service->insert_id;\n\
  \        }\n\n        // 返回上次执行的 SQL 查询所影响的行数\n        public function getAffectedRows()\n\
  \        {\n            if (!$this->_isValidService())\n            {\n        \
  \        throw new Exception\\Service(\"未连接到有效的服务\");\n            }\n         \
  \   return $this->_service->affected_rows;\n        }\n\n        // 返回最近发生的错误\n\
  \        public function getLastError()\n        {\n            if (!$this->_isValidService())\n\
  \            {\n                throw new Exception\\Service(\"未连接到有效的服务\");\n \
  \           }\n            return $this->_service->error;\n        }\n    }\n}\n\
  ```\n\n`Database\\Connector\\Mysql` 类要复杂得多。它定义了一些可适配的属性和方法，用于执行 `MySQLi` 类特定的函数，并返回\
  \ `MySQLi` 类特定的属性。我们希望将这些与外部隔离，使我们的系统基本上是即插即用的。如果为其他数据库引擎构建了连接器，并且它们实现了我们在此处看到的函数，那么我们的系统将无法区分其中的差异。这正是我们的目标。\n\
  \n\n\n"
- "# 注意\n\n**注意** 默认数据库引擎设置为 `InnoDB`，而非 `MyISAM`。这两种数据库存储引擎之间存在若干差异，您在规划应用程序时需要加以考虑。您可以在此处了解更多关于\
  \ `InnoDB` 与 `MyISAM` 差异的信息：[`en.wikipedia.org/wiki/Comparison_of_MySQL_database_engines`](http://www.en.wikipedia.org/wiki/Comparison_of_MySQL_database_engines)。我发现通常选择\
  \ `InnoDB` 更符合需求，这也是将其设为合理默认值的原因。\n\n因此，您会注意到，我们的 MySQL 连接器类虽然允许我们执行 SQL 字符串，并提供最近执行的\
  \ SQL 查询的各种有用信息，但实际上并未编写任何 SQL 语句！\n\n这正是接下来要讨论的 `Query` 类的工作。\n\n#### 查询\n\n在前面的代码清单中，还有一件重要的事情需要注意：`query()`\
  \ 方法返回的是 `Database\\Query\\Mysql` 类的一个实例。我们大部分数据库代码都将编写在该类中。`Query` 类负责编写特定于供应商的数据库代码。就\
  \ MySQL 而言，包括 `UPDATE`、`DELETE` 和 `SELECT` 查询。它从清单 9-6 所示的代码开始，这段代码看起来应该很熟悉。\n\n\
  **清单 9-6.** `Database\\Query` 类\n\n```\nnamespace Framework\\Database\n{\n    use\
  \ Framework\\Base as Base;\n    use Framework\\ArrayMethods as ArrayMethods;\n \
  \   use Framework\\Database\\Exception as Exception;\n\n    class Query extends\
  \ Base\n    {\n        /**\n         * @readwrite\n         */\n        protected\
  \ $_connector;\n\n        /**\n         * @read\n         */\n        protected\
  \ $_from;\n\n        /**\n         * @read\n         */\n        protected $_fields;\n\
  \n        /**\n         * @read\n         */\n        protected $_limit;\n\n   \
  \     /**\n         * @read\n         */\n        protected $_offset;\n\n      \
  \  /**\n         * @read\n         */\n        protected $_order;\n\n        /**\n\
  \         * @read\n         */\n        protected $_direction;\n\n        /**\n\
  \         * @read\n         */\n        protected $_join = array();\n\n        /**\n\
  \         * @read\n         */\n        protected $_where = array();\n\n       \
  \ protected function _getExceptionForImplementation($method)\n        {\n      \
  \      return new Exception\\Implementation(\"{$method} method not implemented\"\
  );\n        }\n    }\n}\n```\n\n在这里，我们可以看到一些可调整的属性以及异常生成方法的重写。这些属性在实际查询生成之前保存查询参数。生成数据库查询的方法会使用这些属性中的数据，因此它们被设置为受保护且大多为只读类型。我们不能让开发者在生成过程中随意修改其内容。正如我们看到的第二个示例，我们应该能够用任何类型的数据替换\
  \ `?` 字符，因此我们还需要一种方法来根据 MySQL 的期望对输入数据进行正确的引用。请看清单 9-7。\n\n**清单 9-7.** `_quote()`\
  \ 方法\n\n```\nnamespace Framework\\Database\n{\n    use Framework\\Base as Base;\n\
  \    use Framework\\ArrayMethods as ArrayMethods;\n    use Framework\\Database\\\
  Exception as Exception;\n\n    class Query extends Base\n    {\n        protected\
  \ function _quote($value)\n        {\n            if (is_string($value))\n     \
  \       {\n                $escaped = $this->connector->escape($value);\n      \
  \          return \"'{$escaped}'\";\n            }\n\n            if (is_array($value))\n\
  \            {\n                $buffer = array();\n                foreach ($value\
  \ as $i)\n                {\n                    array_push($buffer, $this->_quote($i));\n\
  \                }\n                $buffer = join(\", \", $buffer);\n         \
  \       return \"({$buffer})\";\n            }\n\n            if (is_null($value))\n\
  \            {\n                return \"NULL\";\n            }\n\n            if\
  \ (is_bool($value))\n            {\n                return (int) $value;\n     \
  \       }\n\n            return $this->connector->escape($value);\n        }\n \
  \   }\n}\n```\n\n受保护的 `_quote()` 方法用于将传入的 `$value` 包裹在适用的引号中，以便能够以语法正确的形式将其添加到相应的查询中。它包含了处理不同值类型（如字符串、数组和布尔值）的逻辑。我们还需要构建用于修改查询的便捷方法，例如\
  \ `from()`、`limit()` 和 `join()`，如清单 9-8 所示。\n\n**清单 9-8.** Query 的糖方法\n\n```\nnamespace\
  \ Framework\\Database\n{\n    use Framework\\Base as Base;\n    use Framework\\\
  ArrayMethods as ArrayMethods;\n    use Framework\\Database\\Exception as Exception;\n\
  ```\n\n\n```php\nclass Query extends Base\n{\n    public function from($from, $fields\
  \ = array(\"*\"))\n    {\n        if (empty($from))\n        {\n            throw\
  \ new Exception\\Argument(\"无效参数\");\n        }\n        $this->_from = $from;\n\
  \        if ($fields)\n        {\n            $this->_fields[$from] = $fields;\n\
  \        }\n        return $this;\n    }\n\n    public function join($join, $on,\
  \ $fields = array())\n    {\n        if (empty($join))\n        {\n            throw\
  \ new Exception\\Argument(\"无效参数\");\n        }\n        if (empty($on))\n     \
  \   {\n            throw new Exception\\Argument(\"无效参数\");\n        }\n       \
  \ $this->_fields += array($join => $fields);\n        $this->_join[] = \"JOIN {$join}\
  \ ON {$on}\";\n        return $this;\n    }\n\n    public function limit($limit,\
  \ $page = 1)\n    {\n        if (empty($limit))\n        {\n            throw new\
  \ Exception\\Argument(\"无效参数\");\n        }\n        $this->_limit = $limit;\n \
  \       $this->_offset = $limit * ($page - 1);\n        return $this;\n    }\n\n\
  \    public function order($order, $direction = \"asc\")\n    {\n        if (empty($order))\n\
  \        {\n            throw new Exception\\Argument(\"无效参数\");\n        }\n  \
  \      $this->_order = $order;\n        $this->_direction = $direction;\n      \
  \  return $this;\n    }\n\n    public function where()\n    {\n        $arguments\
  \ = func_get_args();\n        if (sizeof($arguments) < 1)\n        {\n         \
  \   throw new Exception\\Argument(\"无效参数\");\n        }\n        $arguments[0] =\
  \ preg_replace(\"#\\?#\", \"%s\", $arguments[0]);\n        foreach (array_slice($arguments,\
  \ 1, null, true) as $i => $parameter)\n        {\n            $arguments[$i] = $this->_quote($arguments[$i]);\n\
  \        }\n        $this->_where[] = call_user_func_array(\"sprintf\", $arguments);\n\
  \        return $this;\n    }\n}\n```\n\n所有这些方法都返回类实例的引用，因此可以链式调用。`from()`方法用于指定要读取或写入数据（对于\
  \ INSERT、UPDATE 和 DELETE 操作而言）的表。它还接受第二个参数，用于指定你要查询的字段。虽然可以指定这些字段，但即使你希望执行数据修改查询，当它们不适用于所请求的查询时也会被忽略。\n\
  \n`join()`方法用于指定跨表的连接。它只允许自然连接（NATURAL JOIN），这在大多数情况下已经足够。我们再次强调，只关心简洁的代码，能在大多数情况下满足需求即可。如果我们需要复杂的查询，直接编写纯\
  \ SQL 语句，甚至创建存储过程或视图来处理可能更为合适。\n\n`join()`方法的第二个参数是连接所依赖的字段。最后一个（可选）参数与`from()`方法的第二个参数类似，允许你指定从被连接表中返回的字段。稍后我们将看到的`_buildSelect()`方法能够处理`$fields`参数，无论是简单的字段名，还是带别名的字段名。这些方法足够智能，可以区分`$fields\
  \ = array('field1')`和`$fields = array('field1' => 'alias1')`之间的差异。\n\n`where()`方法是这些方法中最棘手的，因为它允许可变长度的参数。它会接受一个格式为`'foo\
  \ = ? and bar = ? and baz = ?'`的字符串，并接受另外三个参数来替换这些`?`字符。实际上，它是在运行 PHP 的`sprintf`函数，因此我们不需要处理任何标记化操作；但它还会使用我们之前看到的`_quote()`方法对第二、三、四（等）位置传入的值进行转义，从而保护我们的数据库数据免受注入攻击。\n\
  \n`order()`方法用于指定按哪个字段排序以及排序方向。它只处理按单个字段排序，这是为了适应大多数情况；如果第二个（可选）`$direction`参数未指定，则默认排序方向为`asc`。\n\
  \n`limit()`方法用于指定一次返回多少行，以及从哪一页开始显示结果。这比直接提供偏移量稍微方便一些，因为你不必考虑单个行的位置，而是考虑行数的分页（这正是\
  \ SQL 中 LIMIT 语句的典型用途）。`page`参数是可选的。\n\n\n这些方法都接受某种输入，该输入稍后将在 SQL 查询的构建中使用。\n\n\
  它们几乎没有输入验证，可能更需要合适的异常消息，但目前我们不必担心这个问题。这些方法命名的目的是允许流畅的查询创建（适用于我们可能遇到的大多数情况）。当你可以用通俗语言阅读查询时，调试起来会容易得多。\n\
  \n大多数关系型 SQL 查询是 `INSERT`、`UPDATE`、`DELETE` 或 `SELECT` 查询。我们将创建方法来处理这些类型的查询，从 `SELECT`\
  \ 查询开始，如 **清单 9-9** 所示。\n\n**清单 9-9.** `_buildSelect()` 方法\n\n```php\nnamespace\
  \ Framework\\Database\n{\n    use Framework\\Base as Base;\n    use Framework\\\
  ArrayMethods as ArrayMethods;\n    use Framework\\Database\\Exception as Exception;\n\
  \    \n    class Query extends Base\n    {\n        protected function _buildSelect()\n\
  \        {\n            $fields = array();\n            $where = $order = $limit\
  \ = $join = \"\";\n            $template = \"SELECT %s FROM %s %s %s %s %s\";\n\
  \            \n            foreach ($this->fields as $table => $_fields)\n     \
  \       {\n                foreach ($_fields as $field => $alias)\n            \
  \    {\n                    if (is_string($field))\n                    {\n    \
  \                    $fields[] = \"{$field} AS {$alias}\";\n                   \
  \ }\n                    else\n                    {\n                        $fields[]\
  \ = $alias;\n                    }\n                }\n            }\n         \
  \   \n            $fields = join(\", \", $fields);\n            \n            $_join\
  \ = $this->join;\n            if (!empty($_join))\n            {\n             \
  \   $join = join(\" \", $_join);\n            }\n            \n            $_where\
  \ = $this->where;\n            if (!empty($_where))\n            {\n           \
  \     $joined = join(\" AND \", $_where);\n                $where = \"WHERE {$joined}\"\
  ;\n            }\n            \n            $_order = $this->order;\n          \
  \  if (!empty($_order))\n            {\n                $_direction = $this->direction;\n\
  \                $order = \"ORDER BY {$_order} {$_direction}\";\n            }\n\
  \            \n            $_limit = $this->limit;\n            if (!empty($_limit))\n\
  \            {\n                $_offset = $this->offset;\n                if ($_offset)\n\
  \                {\n                    $limit = \"LIMIT {$_limit}, {$_offset}\"\
  ;\n                }\n                else\n                {\n                \
  \    $limit = \"LIMIT {$_limit}\";\n                }\n            }\n         \
  \   \n            return sprintf($template, $fields, $this->from, $join, $where,\
  \ $order, $limit);\n        }\n    }\n}\n```\n\n这个方法是查询类的核心——特别是 `all()`、`first()`\
  \ 和 `count()` 方法。它考虑了之前我们看到的那些受保护属性中存储的所有数据，并从零开始构建一个兼容 MySQL 的 SQL 查询。它声明了 `SELECT`\
  \ 语句的模板，然后遍历所有存储的字段（来自 `from()` 和 `join()` 方法），并决定是否对它们进行别名处理。通过将它们连接成一个逗号分隔的字符串来整理它们。类似地，它还连接了\
  \ `$_join` 和 `$_where` 属性。接着，它创建格式正确的 `ORDER BY` 和 `LIMIT` 子句，最后通过 `sprintf` 执行所有操作，生成一个有效的\
  \ SQL 查询。\n\n构建 `INSERT`、`UPDATE` 和 `DELETE` 查询的方法比 `_buildSelect()` 方法简单一些。请看 **清单\
  \ 9-10**。\n\n**清单 9-10.** `_buildInsert()`、`_buildUpdate()` 和 `_buildDelete()` 方法\n\
  \n```php\nnamespace Framework\\Database\n{\n    use Framework\\Base as Base;\n \
  \   use Framework\\ArrayMethods as ArrayMethods;\n    use Framework\\Database\\\
  Exception as Exception;\n    \n    class Query extends Base\n    {\n        protected\
  \ function _buildInsert($data)\n        {\n            $fields = array();\n    \
  \        $values = array();\n            $template = \"INSERT INTO '%s' ('%s') VALUES\
  \ (%s)\";\n            \n            foreach ($data as $field => $value)\n     \
  \       {\n                $fields[] = $field;\n                $values[] = $this->_quote($value);\n\
  \            }\n            \n            $fields = join(\"', '\", $fields);\n \
  \           $values = join(\", \", $values);\n            \n            return sprintf($template,\
  \ $this->from, $fields, $values);\n        }\n        \n        protected function\
  \ _buildUpdate($data)\n        {\n            $parts = array();\n            $where\
  \ = $limit = \"\";\n            $template = \"UPDATE %s SET %s %s %s\";\n      \
  \      \n            foreach ($data as $field => $value)\n            {\n      \
  \          $parts[] = \"{$field} = \".$this->_quote($value);\n            }\n  \
  \          \n            $parts = join(\", \", $parts);\n            \n        \
  \    $_where = $this->where;\n            if (!empty($_where))\n            {\n\
  \                $joined = join(\", \", $_where);\n                $where = \"WHERE\
  \ {$joined}\";\n            }\n            \n            $_limit = $this->limit;\n\
  \            if (!empty($_limit))\n            {\n                $_offset = $this->offset;\n\
  \                $limit = \"LIMIT {$_limit} {$_offset}\";\n            }\n     \
  \       \n            return sprintf($template, $this->from, $parts, $where, $limit);\n\
  \        }\n        \n        protected function _buildDelete()\n        {\n   \
  \         $where = $limit = \"\";\n            $template = \"DELETE FROM %s %s %s\"\
  ;\n            \n            $_where = $this->where;\n            if (!empty($_where))\n\
  \            {\n                // 此处代码不完整，原文已截断\n            }\n        }\n   \
  \ }\n}\n```\n\n\n\n```php\n$joined = join(\", \", $_where);\n\n$where = \"WHERE\
  \ {$joined}\";\n\n}\n\n$_limit = $this->limit;\n\nif (!empty($_limit))\n\n{\n\n\
  $_offset = $this->offset;\n\n$limit = \"LIMIT {$_limit} {$_offset}\";\n\n}\n\nreturn\
  \ sprintf($template, $this->from, $where, $limit);\n```\n\n相比之下，`_buildInsert()`、`_buildUpdate()`\
  \ 和 `_buildDelete()` 方法较为简单。它们同样用于构建 SQL 查询，但目的不同，且使用不同的数据。\n\n`_buildInsert()`\
  \ 方法定义了有效 `INSERT` 查询的模板，然后将传入的 `$data` 拆分为两个数组：`$fields` 和 `$values`。接着合并这些数组，最后通过\
  \ `sprintf` 处理结果。\n\n`_buildUpdate()` 方法的功能大体相同，只是它将字段和值合并为一个数组（这与 MySQL `UPDATE`\
  \ 查询的格式一致）。此外，它还需要额外处理 `WHERE` 子句，因为大多数更新操作针对的是特定的数据库行集合。如果 `UPDATE` 查询未能指定有效的 `WHERE`\
  \ 子句，将导致表中所有行都被更新为相同的数据。\n\n它还会考虑 `LIMIT` 子句，从而可以将更新限制在匹配 `WHERE` 子句的有限记录数量内。为防止\
  \ `WHERE` 子句缺失或筛选的行数超出预期，对表更新设置一个限制总是好的做法。\n\n`_buildDelete()` 方法执行 `_buildUpdate()`\
  \ 方法的所有功能，但不执行 `_buildInsert()` 方法的任何功能。这是因为除了 `WHERE` 子句的目标之外，无需考虑任何行数据。同样建议在删除行时始终使用\
  \ `LIMIT` 子句，以免删除的行数超出预期。\n\n这四种方法完成了大部分所需工作，但我们可以通过清单 9-11 所示的方法简化它们的使用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 9 章 ■ 数据库\n\n### 清单 9-11 便捷方法\n\n```php\nnamespace Framework\\Database\n\
  {\n    use Framework\\Base as Base;\n    use Framework\\ArrayMethods as ArrayMethods;\n\
  \    use Framework\\Database\\Exception as Exception;\n\n    class Query extends\
  \ Base\n    {\n        public function save($data)\n        {\n            $isInsert\
  \ = sizeof($this->_where) == 0;\n\n            if ($isInsert)\n            {\n \
  \               $sql = $this->_buildInsert($data);\n            }\n            else\n\
  \            {\n                $sql = $this->_buildUpdate($data);\n           \
  \ }\n\n            $result = $this->_connector->execute($sql);\n\n            if\
  \ ($result === false)\n            {\n                throw new Exception\\Sql();\n\
  \            }\n\n            if ($isInsert)\n            {\n                return\
  \ $this->_connector->lastInsertId;\n            }\n\n            return 0;\n   \
  \     }\n\n        public function delete()\n        {\n            $sql = $this->_buildDelete();\n\
  \            $result = $this->_connector->execute($sql);\n\n            if ($result\
  \ === false)\n            {\n                throw new Exception\\Sql();\n     \
  \       }\n\n            return $this->_connector->affectedRows;\n        }\n  \
  \  }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 9 章 ■ 数据库\n\
  \n`save()` 方法通过检查是否对此查询对象调用了 `where()` 方法，来判断需要哪种类型的查询。如果调用了，则假定该方法是用于指定行 ID（或其他行特定条件），并相应调用\
  \ `_buildUpdate()` 方法。如果 `INSERT`/`UPDATE` 查询执行失败，将抛出 `Database\\Exception\\Sql`\
  \ 异常。若查询成功执行且为 `INSERT` 查询，则返回最后插入的 ID。如果执行的是 `UPDATE` 查询，则返回 `0`（以此表示操作成功）。\n\n\
  > **注意：** 我们不会通过 `save()` 方法返回受影响的行数或布尔值——因为这些值会使该函数的结果产生歧义。你可以通过调用数据库连接器的 `getAffectedRows()`\
  \ 方法，获取 `UPDATE` 查询的受影响行数。\n\n`delete()` 方法只需调用 `_buildDelete()` 方法并执行其结果。如果查询无法执行，则抛出\
  \ `Database\\Exception\\Sql` 异常；否则返回受影响的行数。我们还需要最后三个公共方法，它们分别返回匹配查询的所有行、匹配查询的第一行，以及查询将返回的总行数。清单\
  \ 9-12 和 9-13 演示了这一点。\n\n\n\n"
