- fmt: "# Iterating over Files and Directories\n\nIterating over files and directories\
    \ can be done with the functions `opendir()`, `readdir()`, and `closedir()` that\
    \ work in a procedural setting. Would it be possible to do the same with an object-oriented\
    \ approach?\n\n## Solution\n\nSome of the built-in functions will also return\
    \ objects. One example of this is the `dir()` function that will return an instance\
    \ of the built-in `Directory()` class. It takes a directory path as the first\
    \ parameter. This class provides methods for `read()` and `close()`.\n\n## How\
    \ It Works\n\nThe next example shows how to use these functions to iterate over\
    \ a directory and output the name and type of all the files.\n\n```php\n<?php\n\
    // 2_26.php\n\n$path = \"./\";\n\n// Open a known directory, and proceed to read\
    \ its contents\nif (is_dir($path)) {\n    if ($dh = opendir($path)) {\n      \
    \  while (($file = readdir($dh)) !== false) {\n            echo \"filename: $file\
    \ : filetype: \" . filetype($path . $file) . \"\\n\";\n        }\n        closedir($dh);\n\
    \    }\n}\n```\n\nThe same code written with the use of the object-oriented interface\
    \ and the `Directory` class could look like this.\n\n```php\n<?php\n// 2_27.php\n\
    \n$path = \"./\";\n\n// Open a known directory, and proceed to read its contents\n\
    if (is_dir($path)) {\n    $dir = dir($path);\n    while (($file = $dir->read())\
    \ !== false) {\n        echo \"filename: $file : filetype: \" . filetype($path\
    \ . $file) . \"\\n\";\n    }\n    $dir->close();\n}\n```\n\nThe `dir()` function\
    \ sets the two public properties, `path` and `handle`, so the same functionality\
    \ can be obtained by creating an instance of the `Directory` class and setting\
    \ the property values manually.\n\n```php\n<?php\n// 2_28.php\n\n$path = \"./\"\
    ;\n\n// Open a known directory, and proceed to read its contents\nif (is_dir($path))\
    \ {\n    $dir = new Directory();\n    $dir->path = $path;\n    $dir->handle =\
    \ opendir($path);\n    while (($file = $dir->read()) !== false) {\n        echo\
    \ \"filename: $file : filetype: \" . filetype($path . $file) . \"\\n\";\n    }\n\
    \    $dir->close();\n}\n```\n\nFinally, there is a predefined class `Exception`\
    \ that’s used with handling of runtime errors through the `try`, `catch`, `finally`\
    \ pattern that will be discussed in a later chapter.\n\n# Recipe 2-19: Writing\
    \ Reusable Code\n\n## Problem\n\nPHP only allows extending classes from a single\
    \ base class. It does allow the use of interface classes but that requires the\
    \ user to type the functionality of each interface each time it’s used.\n\nWhen\
    \ working with classes and objects, it’s often needed to have the exact same functionality\
    \ in multiple classes. This can be private methods to perform validation or public\
    \ methods that provide access to private members, etc. In many cases, this is\
    \ handled by creating the methods in the base class, but when the classes are\
    \ derived from different base classes, that’s not possible.\n\n## Solution\n\n\
    PHP version 5.4 and newer supports the use of traits to handle this situation.\
    \ Traits are named code blocks that can be reused in many different classes. The\
    \ code block is written and maintained in one place and used in many places. Making\
    \ a change will affect all places where it is used.\n\n## How It Works\n\nThe\
    \ definition of a trait works almost as a class definition. The keyword `trait`\
    \ is used along with a name and a set of member variables and/or functions.\n\n\
    The following example shows how a trait can be used to define protected variables\
    \ that are used in a single class.\n\n```php\n<?php\n// 2_29.php\n\ntrait A {\n\
    \    protected $var;\n}\n\nclass B {\n    use A;\n\n    function Get() {\n   \
    \     return $this->var;\n    }\n\n    function Set($var) {\n        $this->var\
    \ = $var;\n    }\n}\n\n$o = new B();\n$o->Set(15);\necho $o->Get();\n```\n\nIn\
    \ this example, there is only a single variable and a single class that uses the\
    \ trait, but in the case of multiple variables and many classes using the same\
    \ set of variables, this would save some typing and it would make code maintenance\
    \ easier.\n\nThe real save comes when the trait also includes functions, as in\
    \ the next example where the `Get()` and `Set()` functions are moved to the trait\
    \ and the trait is used in two different classes.\n\n```php\n<?php\n// 2_30.php\n\
    \ntrait A {\n    protected $var;\n\n    function Get() {\n        return $this->var;\n\
    \    }\n\n    function Set($var) {\n        $this->var = $var;\n    }\n}\n\nclass\
    \ B {\n    use A;\n}\n\nclass C {\n    use A;\n}\n\n$o = new B();\n$o->Set(15);\n\
    echo $o->Get();\n```"
  raw: 'Iterating over files and directories can be done with the functions opendir()
    , readdir() , and closedir() that works in a procedural setting. Would it be possible
    to do the same with an object-oriented approach?


    Solution


    Some of the built-in functions will also return objects. One example of this is
    the dir() function that will return an instance of the built-in Directory() class.
    It takes a directory path as the first parameter. This class provides methods
    for read() and close() .


    How it Works


    The next example shows how to use these functions to iterate over a directory
    and output the name and type of all the files.


    <?php


    // 2_26.php


    $path = "./";


    // Open a known directory, and proceed to read its contents


    if (is_dir($path)) {


    if ($dh = opendir($path)) {


    while (($file = readdir($dh)) !== false) {


    echo "filename: $file : filetype: " . filetype($path . $file) . "\n";


    }


    closedir($dh);


    }


    }


    The same code written with the use of the object-oriented interface and the Directory
    class could look like this.


    <?php


    // 2_27.php


    $path = "./";


    // Open a known directory, and proceed to read its contents


    if (is_dir($path)) {


    $dir = dir($path);


    while (($file = $dir->read()) !== false) {


    echo "filename: $file : filetype: " . filetype($path . $file) . "\n";


    }


    $dir->close();


    }


    The dir() function sets the two public properties, path and handle, so the same
    functionality can be obtained by creating an instance of the Directory class and
    setting the property values manually.


    CHAPTER 2 ■ CLASSES AND OBJECTS


    <?php


    // 2_28.php


    $path = "./";


    // Open a known directory, and proceed to read its contents


    if (is_dir($path)) {


    $dir = new Directory();


    $dir->path = $path;


    $dir->handle = opendir($path);


    while (($file = $dir->read()) !== false) {


    echo "filename: $file : filetype: " . filetype($path . $file) . "\n";


    }


    $dir->close();


    }


    Finally there is a predefined class Exception that’s used with handling of runtime
    errors through the try, catch, finally pattern that will be discussed in a later
    chapter.


    Recipe 2-19\. Writing Reusable Code


    Problem


    PHP only allows extending classes from a single base class. It does allow the
    use of interface classes but that requires the user to type the functionality
    of each interface each time it’s used.


    When working with classes and objects it’s often needed to have the exact same
    functionality in multiple classes. This can be private methods to perform validation
    or public methods that provide access to private members etc. In many cases this
    is handled by creating the methods in the base class but when the classes are
    derived from different base classes that’s not possible.


    Solution


    PHP version 5.4 and newer supports the use of traits to handle this situation.
    Traits are named code blocks that can be reused in many different classes. The
    code block is written and maintained in one place and used in many places. Making
    a change will affect all places where it is used.


    How it Works


    The definition of a trait works almost as a class definition. The keyword trait
    is used along with a name and a set of member variables and/or functions.


    The following example shows how a trait can be used to define protected variables
    that are used in a single class.


    <?php


    // 2_29.php


    trait A {


    protected $var;


    }


    CHAPTER 2 ■ CLASSES AND OBJECTS


    class B {


    use A;


    function Get() {


    return $this->var;


    }


    function Set($var) {


    $this->var = $var;


    }


    }


    $o = new B();


    $o->Set(15);


    echo $o->Get();


    In this example there is only a single variable and a single class that uses the
    trait, but in the case of multiple variables and many classes using the same set
    of variables this would save some typing and it would make code maintenance easier.


    The real save comes when the trait also include functions as in the next example
    where the Get() and Set() functions are moved to the trait and the trait is used
    in two different classes.


    <?php


    // 2_30.php


    trait A {


    protected $var;


    function Get() {


    return $this->var;


    }


    function Set($var) {


    $this->var = $var;


    }


    }


    class B {


    use A;


    }


    class C {


    use A;


    }


    $o = new B();


    $o->Set(15);


    echo $o->Get();'
  trans: "\n# 遍历文件和目录\n\n遍历文件和目录可以通过函数 `opendir()`、`readdir()` 和 `closedir()` 以过程式方式完成。能否用面向对象的方法实现相同的功能呢？\n\
    \n## 解决方案\n\n部分内置函数也会返回对象。例如，`dir()` 函数会返回内置类 `Directory()` 的一个实例。它接受目录路径作为第一个参数。该类提供了\
    \ `read()` 和 `close()` 方法。\n\n## 运行原理\n\n下面的示例展示了如何使用这些函数遍历目录，并输出所有文件的名称和类型。\n\
    \n```php\n<?php\n// 2_26.php\n\n$path = \"./\";\n\n// 打开已知目录，并继续读取其内容\nif (is_dir($path))\
    \ {\n    if ($dh = opendir($path)) {\n        while (($file = readdir($dh)) !==\
    \ false) {\n            echo \"filename: $file : filetype: \" . filetype($path\
    \ . $file) . \"\\n\";\n        }\n        closedir($dh);\n    }\n}\n```\n\n使用面向对象接口和\
    \ `Directory` 类编写的相同代码可能如下所示。\n\n```php\n<?php\n// 2_27.php\n\n$path = \"./\"\
    ;\n\n// 打开已知目录，并继续读取其内容\nif (is_dir($path)) {\n    $dir = dir($path);\n    while\
    \ (($file = $dir->read()) !== false) {\n        echo \"filename: $file : filetype:\
    \ \" . filetype($path . $file) . \"\\n\";\n    }\n    $dir->close();\n}\n```\n\
    \n`dir()` 函数会设置两个公共属性 `path` 和 `handle`，因此可以通过创建 `Directory` 类的实例并手动设置属性值来实现相同的功能。\n\
    \n```php\n<?php\n// 2_28.php\n\n$path = \"./\";\n\n// 打开已知目录，并继续读取其内容\nif (is_dir($path))\
    \ {\n    $dir = new Directory();\n    $dir->path = $path;\n    $dir->handle =\
    \ opendir($path);\n    while (($file = $dir->read()) !== false) {\n        echo\
