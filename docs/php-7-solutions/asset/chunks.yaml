    \ ', '_', $file['name']);\n    if ($nospaces != $file['name']) {\n        $this->newName\
    \ = $nospaces;\n    }\n}\n```\n\nThe method begins by setting the `$newName` property\
    \ to `null` (in other words, no value). The class will eventually be capable of\
    \ handling multiple file uploads. Consequently, the property needs to be reset\
    \ each time.\n\nThen, the `str_replace()` function replaces spaces in the filename\
    \ with underscores and assigns the result to `$nospaces`. The `str_replace()`\
    \ function was described in PHP Solution 5-4.\n\nThe value of `$nospaces` is compared\
    \ with `$file['name']`. If they’re not the same, `$nospaces` is assigned as the\
    \ value of the `$newName` property.\n\nThat deals with spaces in filenames. Before\
    \ handling duplicate filenames, let’s fix the code that moves the uploaded file\
