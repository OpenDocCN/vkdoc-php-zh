    \n[Epilog ue](#index_split_000.html#p99)\n\n## Preamble\n\n### Welcome!\n\nSo\
    \ you want to learn quickly how to program in PHP? This book is the right choice.\
    \ You will learn within easy-to-understand chapters the basics of developing dynamic\
    \ websites in PHP. It places special emphasis on full code examples which run\
    \ independently of each other.\n\nIt begins with setting up the development environment\
    \ on your computer. Immediately after you write your first PHP script and execute\
    \ it in your newly installed server. Then you will learn how you can query information\
    \ and control the program sequence in order to create dynamic websites. You also\
    \ learn how you can save the information in databases or files, and read again.\n\
    \nFinally, you will get a short introduction to more advanced topics such as writing\
    \ clean and safe program code.\n\nYou will not become a professional web developer\
    \ by reading only this book, but you will get very good fundamentals and a guide\
    \ in programming your first dynamic websites.\n\n### Prerequisites\n\nThere is\
    \ no special knowledge necessary. If you want to learn programming in PHP, I assume\
    \ that you know how to install applications on your computer.\n\nSome knowledge\
    \ of HTML to format texts cannot harm but is not mandatory and it will be the\
    \ main HTML code explained in the appropriate places.\n\nOn hardware you need\
    \ is a computer with monitor, mouse and keyboard. Since we program websites, of\
    \ course an internet connection helps to get the needed software and more tutorials,\
    \ but isn’t needed during development, as we install our own little server. You\
    \ only need to download some (free) software from the Internet, more on that later.\n\
    \nYou are free, what operating system you use for development. The book will show\
    \ you how to do the installation of a PHP server with MySQL support on Windows,\
    \ Linux and MacOS and it will give you some examples of modern text editors.\n\
    \n## Day 1\n\n### PHP – DEFINITION AND HISTORY\n\nPHP is a scripting language\
    \ that is used primarily to develop dynamic webpages. PHP scripts are executed\
    \ directly on the server and not in the browser of a visitor.\n\nPHP was developed\
    \ in 1995 by Rasmus Lerdorf. His goal was to create a simple replacement for the\
    \ collection of useful Perl scripts. This is how Personal Home Page Tools came\
    \ into being. Soon after, he recreated the tool collection in the programming\
    \ language C.\n\nToday, PHP is still developed in C, a very powerful programming\
    \ language. It was soon followed by the first version, PHP / FI (Form Interpreter).\n\
    \nIn 1998, Andi Gutmans and Zeev Suraski, in cooperation with Lerdorf, created\
    \ PHP 3 from scratch to make it ready for use, particularly in the booming e-commerce\
    \ business. Gutmans and Suraski founded the company Zend Technologies Ltd., which\
    \ contributed the main parts of PHP 4.\n\nIn 2004, PHP5 introduced enhanced support\
    \ for object-oriented programming and greatly increased the speed of the PHP interpreter.\n\
    \nEleven years later, in 2015, PHP 7 was released. It is powered by a new engine\
    \ with a fast speed. PHP 6 was skipped because projects planned to carry out the\
    \ program were never finished and so the developers focused on a completely new\
    \ core engine. Most scripts execute twice as fast as in PHP 5.x. The majority\
    \ of old PHP 5 scripts only need small changes to run in PHP 7. Scripts in this\
    \ book are all updated to be fully compatible.\n\n### Setting up the development\
    \ environment (Windows, Linux or Mac OS)\n\n#### Windows\n\nOn Windows, the prefabricated\
    \ server packages make it extremely easy to install the server. For the development,\
    \ I prefer the package of Xampp (`www.apachefriends.org`).\n\nDownload the installer\
    \ for Windows and run the installation. I recommend to keep `C:/xampp/` as the\
    \ default folder path. If you install the package under `C:/Programs/XAMPP/`,\
    \ the server may make problems because the necessary file permissions are not\
    \ set correctly."
