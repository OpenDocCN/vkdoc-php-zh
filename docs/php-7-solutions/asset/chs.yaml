- '# PHP 如何使页面动态化


  PHP 最初被设计为嵌入到网页的 HTML 中，并且至今仍常以这种方式使用。例如，要在版权声明中显示当前年份，你可以将其放在页脚中：


  ```

  &copy;  PHP 7 解决方案

  ```


  在启用了 PHP 的 Web 服务器上，`<?php` 和 `?>` 标签之间的代码会被自动处理并像这样显示年份：


  ![images/332054_4_En_1_Chapter/332054_4_En_1_Figa_HTML.jpg](img/332054_4_En_1_Figa_HTML.jpg)


  这只是一个简单的例子，但它说明了使用 PHP 的一些优势：


  * 任何在元旦午夜钟声敲响后访问你网站的人都会看到正确的年份。

  * 日期由 Web 服务器计算，因此即使用户计算机的时钟设置不正确，也不会受到影响。


  虽然像这样将 PHP 代码嵌入 HTML 很方便，但它是重复性的，并且可能导致错误。它还可能使你的网页难以维护，尤其是当你开始使用更复杂的 PHP 代码时。因此，常见的做法是将大量动态代码存储在单独的文件中，然后使用
  PHP 从不同的组件构建你的页面。这些单独的文件——或者通常被称为*包含文件*——可以只包含 PHP、只包含 HTML，或者两者都包含。


  举一个简单的例子，你可以将网站的导航菜单放在一个包含文件中，并使用 PHP 将其包含在每个页面中。每当需要更改菜单时，你只需编辑这个包含文件，更改就会自动反映在每个包含该菜单的页面中。想象一下，对于一个拥有几十个页面的网站来说，这能节省多少时间！


  对于普通的 HTML 页面，内容由 Web 开发人员在设计时固定并上传到 Web 服务器。当有人访问该页面时，Web 服务器只是发送 HTML 和其他资源，例如图片和样式表。这是一个简单的事务——请求来自浏览器，固定的内容由服务器发回。当你使用
  PHP 构建网页时，情况要复杂得多。图 1-1 展示了这个过程。


  ![images/332054_4_En_1_Chapter/332054_4_En_1_Fig1_HTML.png](img/332054_4_En_1_Fig1_HTML.png)


  图 1-1. Web 服务器响应请求动态构建每个 PHP 页面


  当访问一个由 PHP 驱动的网站时，会触发以下一系列事件：


  1. 浏览器向 Web 服务器发送请求。

  2. Web 服务器将请求交给嵌入在服务器中的 PHP 引擎。

  3. PHP 引擎处理代码。在许多情况下，它可能在构建页面之前还会查询数据库。

  4. 服务器将完成的页面发送回浏览器。


  这个过程通常只需要几分之一秒，因此 PHP 网站的访问者不太可能注意到任何延迟。由于每个页面都是单独构建的，PHP 网站可以响应用户输入，在用户登录时显示不同的内容，或显示数据库搜索的结果。


  ## 创建能够自主思考的页面


  PHP 是一种服务器端语言。PHP 代码保留在 Web 服务器上。经过处理后，服务器只发送脚本的输出。通常，输出是 HTML，但 PHP 也可用于生成其他 Web
  语言，例如 `JSON`（JavaScript 对象表示法）或 `XML`（可扩展标记语言）。


  PHP 使你能够将基于条件判断的逻辑引入网页。一些决策是利用 PHP 从服务器收集的信息做出的：日期、时间、星期几、页面 URL 中的信息等等。如果是星期三，它将显示星期三的电视节目表。在其他时候，决策基于用户输入，PHP
  从在线表单中提取这些输入。如果你已在某个网站注册，它将显示个性化信息——诸如此类。


  '
- '# PHP 使用和学习的难度如何？


  PHP 并非高深莫测，但也不要期望在 5 分钟内成为专家。对新手来说，最大的冲击或许是 PHP 对错误的容忍度远低于浏览器对 HTML 的容忍度。如果你在 HTML
  中省略了一个结束标签，大多数浏览器仍然会渲染页面。但如果你在 PHP 中省略了一个结束引号、分号或大括号，你会得到一个毫不妥协的错误消息，如图 1-2 所示。这不仅适用于
  PHP，也影响所有编程语言，例如 JavaScript 和 `C#`。


  ![images/332054_4_En_1_Chapter/332054_4_En_1_Fig2_HTML.jpg](img/332054_4_En_1_Fig2_HTML.jpg)


  图 1-2. 像 PHP 这样的服务器端语言对大多数编码错误是零容忍的


  如果你是那种使用 Adobe Dreamweaver 这样的可视化设计工具，并且从不查看底层代码的 Web 设计师或开发者，那么是时候重新思考你的方法了。将 PHP
  与结构不良的 HTML 混合很可能会导致问题。PHP 使用循环来执行重复性任务，例如显示数据库搜索结果。循环会重复执行同一段代码——通常是 PHP 和 HTML
  的混合——直到所有结果都显示完毕。如果你将循环放在错误的位置，或者你的 HTML 结构糟糕，你的页面很可能会像纸牌屋一样坍塌。


  如果你还没有养成这种习惯，那么使用万维网联盟（`W3C`）的标记验证服务（`http://validator.w3.org/unicorn`）检查你的页面是一个好主意。


  #### 注意

  `W3C` 是制定 HTML 和 CSS 等标准以确保 Web 长期发展的国际组织。它由万维网的发明者蒂姆·伯纳斯-李领导。要了解 `W3C` 的使命，请参阅
  `www.w3.org/Consortium/mission`。




  ### 我能直接复制粘贴代码吗？


  复制本书中的代码完全没问题，这正是代码存在的意义。我将本书设计为一系列实践项目，每个项目都会解释代码的作用和存在理由。即使你无法完全理解所有工作原理，这也能让你建立足够的信心，知道哪些代码可以按需修改，哪些部分最好保持原样。但要想充分利用本书，你需要开始动手尝试这些工具，然后摸索出自己的解决方案。


  `PHP` 就像一个功能强大的工具箱。它拥有数千个内置函数，可以执行各种任务，例如将文本转换为大写、从大图中生成缩略图，或者连接数据库等。真正的强大之处在于以不同方式组合这些函数，并加入你自己的条件逻辑。


  ### PHP 有多安全？


  `PHP` 就像你家中的电或厨房刀具：正确使用非常安全；不负责任地使用则可能造成巨大伤害。本书第一版的创作灵感之一，源于当时一系列利用邮件脚本漏洞将网站变成垃圾邮件中继的攻击事件。解决方法其实很简单（你将在第
  6 章学到），但即便多年后，我仍看到有人使用同样的不安全技术，让网站暴露在攻击之下。


  `PHP` 并不危险，也并非所有人使用它都需要成为安全专家。重要的是要理解 `PHP` 安全的基本原则：*在处理用户输入前始终进行检查*。你会发现这贯穿了本书的始终。大多数安全风险只需极少的努力就能消除。


  保护自己的最佳方式，就是理解你所使用的代码。


  ## 编写 PHP 需要什么软件？


  严格来说，编写 `PHP` 脚本不需要任何特殊软件。`PHP` 代码是纯文本，可以在任何文本编辑器中创建，比如 Windows 上的 `Notepad` 或 macOS
  上的 `TextEdit`。话虽如此，如果你使用一款具有加速开发流程功能的程序，你的工作会轻松得多。市面上有许多选择——既有免费的，也有付费的。


  ### 选择 PHP 编辑器时需要注意什么


  如果代码中存在错误，你的页面很可能无法加载到浏览器，你只会看到一条错误信息。你应该选择一款具备以下功能的脚本编辑器：


  - **PHP 语法检查**：过去这只有昂贵的专用程序才具备，但现在许多免费程序也提供了此功能。语法检查器会在你输入时监控代码并高亮显示错误，从而节省大量时间和挫败感。


  - **PHP 语法着色**：代码会根据其作用以不同颜色高亮显示。如果你的代码呈现了意外的颜色，这通常是个明确的出错信号。


  - **PHP 代码提示**：`PHP` 有太多内置函数，即使是有经验的用户也难以记住所有用法。许多脚本编辑器会自动显示工具提示，提醒你某段特定代码的用法。


  - **行号显示**：快速定位特定行能让故障排查简单得多。


  - **"括号匹配"功能**：圆括号 `()`、方括号 `[]` 和花括号 `{}` 必须始终成对出现。很容易忘记关闭其中一对。所有优秀的脚本编辑器都能帮助找到匹配的括号。


  你目前用于构建网页的程序可能已经具备了上述部分或全部功能。即使你不打算大量进行 `PHP` 开发，如果你的网页开发程序不支持语法检查，也应该考虑使用专用的脚本编辑器。以下专用的脚本编辑器拥有所有基本功能，如语法检查和代码提示。这个列表并非详尽无遗，而是基于个人经验推荐。


  - **PhpStorm** (`www.jetbrains.com/phpstorm/`)：虽然这是一款专用的 `PHP` 编辑程序，但它对 `HTML`、`CSS`
  和 `JavaScript` 也有出色的支持。它目前是我最喜爱的 `PHP` 开发程序。采用年度订阅制。如果你在订阅至少 12 个月后取消，你将获得一个旧版本的永久许可证。


  - **Visual Studio Code** (`https://code.visualstudio.com/`)：微软出品的一款优秀代码编辑器，不仅可在
  Windows 上运行，也支持 macOS 和 Linux。它是免费的，并内置了对 `PHP` 的支持。


  - **Sublime Text** (`www.sublimetext.com/`)：如果你是 `Sublime Text` 的粉丝，它有用于 `PHP` 语法着色、语法检查和文档的插件。可免费试用，但持续使用应购买相对便宜的许可证。


  - **Zend Studio** (`www.zend.com/en/products/studio/`)：如果你认真对待 `PHP` 开发，`Zend Studio`
  是功能最全面的 `PHP` 集成开发环境（`IDE`）。它由 Zend 公司创建，该公司的核心成员正是 `PHP` 开发的主要贡献者。`Zend Studio`
  可运行于 Windows、macOS 和 Linux。个人与商业用途有不同的定价。


  - **PHP Development Tools** (`www.eclipse.org/pdt/`)：`PDT` 是 `Zend Studio` 的精简版，优点是免费。它运行在
  `Eclipse` 上，这是一个支持多种计算机语言的开源 `IDE`。如果你曾使用过 `Eclipse` 处理其他语言，应该会发现它相对易用。`PDT` 可运行于
  Windows、macOS 和 Linux，既可以作为 `Eclipse` 插件安装，也可以作为一键安装包（自动安装 `Eclipse` 和 `PDT` 插件）使用。


  ## 那么，让我们开始吧…


  本章仅简要介绍了 `PHP` 能为你的网站添加哪些动态功能，以及你需要哪些软件来实现。使用 `PHP` 的第一步是搭建测试环境。下一章将介绍 Windows 和
  macOS 所需的内容。


  '
- '# 2. 准备使用 PHP 工作


  既然你已决定使用 `PHP` 来丰富网页，就需要确保拥有完成本书后续内容所需的一切。虽然你可以在远程服务器上测试所有内容，但在本地计算机上测试 `PHP` 页面通常更方便。所有需要安装的软件都是免费的。在本章中，我将介绍
  Windows 和 macOS 上的各种选项。Linux 系统通常会默认安装所需的组件。


  本章涵盖：


  - 检查你的网站是否支持 `PHP`

  - 理解为何不应再使用 `PHP` 5

  - 决定是否创建本地测试环境

  - 在 Windows 和 macOS 中使用现成的集成包

  - 决定存储 `PHP` 文件的位置

  - 检查本地和远程服务器上的 `PHP` 配置




  '
- "# 检查您的网站是否支持 PHP\n\n判断网站是否支持 PHP 最简单的方法是咨询您的托管公司。另一种方法是将一个 PHP 页面上传到您的网站，看看它是否能正常运行。即使您知道网站支持\
  \ PHP，也请执行以下测试来确认正在运行的版本：\n\n1.  打开脚本编辑器，在空白页面中输入以下代码：\n\n    `<?php echo phpversion();`\n\
  \n2.  将文件保存为 `phpversion.php`。务必确保您的操作系统不会在 `.php` 后添加 `.txt` 文件扩展名。如果您在 Mac 上使用\
  \ TextEdit，请确保它不会以多信息文本格式 (RTF) 保存文件。如果您有任何疑问，请使用本书附赠文件 `ch02` 文件夹中的 `phpversion.php`。\n\
  \n3.  将 `phpversion.php` 像上传 HTML 页面一样上传到您的网站，然后在浏览器中输入该 URL。假设您将文件上传到网站的顶级目录，URL\
  \ 将类似于 [`www.example.com/phpversion.php`](http://www.example.com/phpversion.php)。\n\
  \n    如果您在屏幕上看到像 7.2.0 这样的三位数字，那么恭喜：PHP 已启用。该数字告诉您服务器上运行的 PHP 版本。*本书假定您运行的是 PHP\
  \ 7.2.0 或更高版本。*\n\n4.  如果您收到类似“Parse error”的消息，这意味着支持 PHP，但您在文件中输入代码时出现了错误。请改用 `ch02`\
  \ 文件夹中的版本。\n\n5.  如果您只看到原始代码，则表示不支持 PHP。\n\n如果您的服务器运行的 PHP 版本低于 7.2.0，请联系您的托管商并告知他们您需要最新的稳定版\
  \ PHP。如果托管商拒绝，是时候更换托管公司了。\n\n## 为什么不应再使用 PHP 5\n\nPHP 版本由三个用点分隔的数字组成。第一个数字是主版本号；第二个是分支版本号；最后一个是修订版本号。主版本会引入可能破坏现有网站的显著更改，包括移除过时的特性。分支版本会引入新功能；但分支版本极不可能破坏与同一主版本的兼容性。修订版本包含针对错误和安全问题的修复。\n\
  \n当 PHP 5 于 2004 年发布时，开发团队仍在为 PHP 4 持续发布安全更新。这不仅延迟了对 PHP 5 的采用，也减缓了对这个新主版本的重要改进。政策的改变促使\
  \ PHP 每年发布一个新的分支版本。每个分支版本会获得两年的主动支持，用于修复错误和安全问题，随后再获得一年的关键安全修复支持。此后便不再提供支持。\n\n\
  PHP 5 的最终版本（5.6）获得了近两年半的额外支持；但其生命周期已于 2018 年 12 月 31 日结束。使用 PHP 5 会使您的网站和宝贵数据面临风险，因为安全漏洞将无法得到修复。此外，您也无法获得\
  \ PHP 7 新功能的优势，更不用说它的速度是 PHP 5 的两倍。对 PHP 7.0 的所有支持以及 PHP 7.1 的主动支持在本书出版前已经结束。这就是本书要求最低使用\
  \ PHP 7.2 的原因。尽管本书中的大部分代码可以在旧版 PHP 上运行，但有些则不能。\n\n## 决定在何处测试页面\n\n与普通网页不同，您不能直接在\
  \ Windows 文件资源管理器或 Mac 的 Finder 中双击 PHP 页面并在浏览器中查看。它们需要通过支持 PHP 的 Web 服务器进行解析或处理。如果您的托管公司支持\
  \ PHP，您可以上传文件到您的网站并在那里进行测试。但是，每次进行更改时都需要上传文件。在早期阶段，您可能会发现由于代码中的一些小错误，需要经常这样做。随着经验的增长，您仍然需要频繁上传文件，因为您会想尝试不同的想法。\n\
  \n如果您想立即开始使用 PHP，完全可以将您自己的网站用作测试平台。然而，您很快就会发现需要一个本地的 PHP 测试环境。本章的其余部分将向您展示如何做到这一点，并提供适用于\
  \ Windows 和 macOS 的说明。\n\n## 本地测试环境所需的组件\n\n要在本地计算机上测试 PHP 页面，您需要安装以下组件：\n\n-  \
  \ Web 服务器，这是一种用于显示网页的软件，而非独立的计算机\n-   PHP\n-   MySQL 或 MariaDB 数据库，以及 phpMyAdmin，一个用于管理数据库的基于\
  \ Web 的前端界面\n\n"
- '# 提示

  MariaDB ([`https://mariadb.org/`](https://mariadb.org/)) 是社区开发的 MySQL 即用替代品。本书中的代码与
  MySQL 和 MariaDB 完全兼容。


  您所需的所有软件都是免费的。您唯一需要付出的成本是下载必要文件所需的时间，当然，还有确保一切设置正确所需的时间。在大多数情况下，您应该能在不到一个小时内完成设置并运行，很可能时间更短。只要您的计算机至少有
  1GB 的可用磁盘空间，您就应该能够安装所有软件——即使是配置一般的计算机也可以。


  '
- "# 提示\n如果您的本地计算机上已经有一个 PHP 7 测试环境，则无需重新安装。只需查看本章末尾标题为“检查您的 PHP 设置”的章节即可。\n\n###\
  \ 单个程序还是集成包？\n\n多年来，我一直主张分别安装 PHP 测试环境的每个组件，而不是使用一次性安装 Apache、PHP、MySQL 和 phpMyAdmin\
  \ 的软件包。我的建议是基于早期一些集成包的不可靠质量，它们安装容易但几乎无法卸载或升级。然而，目前可用的集成包非常出色，我现在毫不犹豫地推荐它们。\n\n在我的计算机上，我使用\
  \ XAMPP 用于 Windows ([`www.apachefriends.org/index.html`](http://www.apachefriends.org/index.html))\
  \ 和 MAMP 用于 macOS ([`www.mamp.info/en/`](http://www.mamp.info/en/))。还有其他可用的软件包；选择哪个并不重要。\n\
  \n## Windows 系统上的设置\n\n在继续之前，请确保您以管理员身份登录。\n\n### 让 Windows 显示文件扩展名\n\n默认情况下，大多数\
  \ Windows 计算机会隐藏常见的三或四个字符的文件扩展名，例如 `.doc` 或 `.html`，因此在对话框和 Windows 文件资源管理器中，您只会看到\
  \ `thisfile` 而不是 `thisfile.doc` 或 `thisfile.html`。\n\n请按照以下说明在 Windows 10 和 8 中启用文件扩展名的显示：\n\
  \n1.  打开文件资源管理器。\n2.  选择“视图”以展开文件资源管理器窗口顶部的功能区。\n3.  选中“文件扩展名”复选框。\n\n显示文件扩展名更安全——您可以识别出病毒编写者是否将\
  \ `.exe` 或 `.scr` 可执行文件附加到了一个看似无害的文档上。\n\n### 选择 Web 服务器\n\n大多数 PHP 安装都运行在 Apache\
  \ Web 服务器上。两者都是开源的，并且能很好地协同工作。然而，Windows 有自己的 Web 服务器：Internet 信息服务 (IIS)，它也支持 PHP。微软已与\
  \ PHP 开发团队密切合作，将 PHP 在 IIS 上的性能提升到与 Apache 大致相同的水平。那么，您应该选择哪一个呢？\n\n除非您需要 IIS 用于\
  \ ASP 或 ASP.NET，否则我建议您按照下一节所述，使用 XAMPP 或其他集成包安装 Apache。如果您需要使用 IIS，安装 PHP 最便捷的方法是使用\
  \ Microsoft Web 平台安装程序 (Web PI)，您可以从 [`www.microsoft.com/web/downloads/platform.aspx`](http://www.microsoft.com/web/downloads/platform.aspx)\
  \ 下载。\n\n\n\n### 在 Windows 上安装集成环境包\n\n目前有三大主流集成环境包，可在 Windows 系统中一键安装 Apache、PHP、MySQL\
  \ 或 MariaDB、phpMyAdmin 及其他多种工具：XAMPP（[`www.apachefriends.org/index.html`](http://www.apachefriends.org/index.html)）、WampServer（[`www.wampserver.com/en/`](http://www.wampserver.com/en/)）和\
  \ EasyPHP（[`www.easyphp.org`](http://www.easyphp.org)）。安装过程通常只需几分钟。安装完成后，可能需要根据本章后续内容调整一些设置。\n\
  \n由于印刷书籍的时效性，各版本会随时间变化，因此我不详述安装过程。每个集成环境包在其官方网站上都有安装说明。\n\n## 在 macOS 上进行设置\n\n\
  macOS 系统预装了 Apache Web 服务器和 PHP，但默认并未启用。我建议不使用预装版本，而是安装 MAMP，它能一键安装 Apache、PHP、MySQL、phpMyAdmin\
  \ 及其他多种工具。\n\n为避免与预装的 Apache 和 PHP 发生冲突，MAMP 将所有应用程序安装在硬盘上的专用文件夹中。这样，如果你决定不再使用 MAMP，只需将\
  \ MAMP 文件夹拖入废纸篓即可轻松卸载所有内容。\n\n### 安装 MAMP\n\n开始前，请确保你以管理员权限登录到计算机。\n\n1.  访问 [`www.mamp.info/en/downloads/`](http://www.mamp.info/en/downloads/)\
  \ 并选择 MAMP & MAMP PRO 的下载链接。这将下载一个包含免费版和付费版 MAMP 的磁盘映像。\n2.  下载完成后，启动磁盘映像。你将看到一份许可协议。必须点击“同意”才能继续装载磁盘映像。\n\
  3.  按照屏幕上的说明进行操作。\n4.  确认 MAMP 已安装在你的 `Applications` 文件夹中。\n\n#### 注意\n\nMAMP 会自动将免费版和付费版分别安装到名为\
  \ `MAMP` 和 `MAMP PRO` 的独立文件夹中。付费版可以更方便地配置 PHP 和操作虚拟主机，但免费版完全够用，尤其适合初学者。如果你想删除 `MAMP\
  \ PRO` 文件夹，请勿直接将其拖入废纸篓。请打开该文件夹，双击 `MAMP PRO` 卸载图标。付费版需要这两个文件夹才能运行。\n\n### 测试与配置\
  \ MAMP\n\n默认情况下，MAMP 会为 Apache 和 MySQL 使用非标准端口。除非你同时运行了多个 Apache 或 MySQL 实例，否则请按照以下步骤更改端口设置：\n\
  \n1.  双击 `Applications/MAMP` 中的 MAMP 图标。如果弹出提示面板，邀请你通过 MAMP Cloud Functions 在多台\
  \ Mac 上访问数据，请点击左上角的“关闭”按钮关闭面板。MAMP Cloud Functions 是一项付费服务，本书不需要使用。你可以点击“了解更多”按钮获取详细信息。这里还有一个复选框，可以防止每次启动\
  \ MAMP 时都显示该面板。\n2.  在 MAMP 控制面板中点击“启动服务器”（见图 2-1）。Apache Server 和 MySQL Server\
  \ 旁边应亮起绿色小灯，表示它们正在运行。你的默认浏览器也应启动并显示 MAMP 欢迎页面。\n    \n    ![../images/332054_4_En_2_Chapter/332054_4_En_2_Fig1_HTML.jpg](img/332054_4_En_2_Fig1_HTML.jpg)\n\
  \    \n    图 2-1. 在 MAMP 控制面板中启动服务器\n    \n3.  如果浏览器没有自动启动，请在 MAMP 控制面板中点击“打开 WebStart\
  \ 页面”。\n4.  检查浏览器地址栏中的 URL。它以 `localhost:8888` 开头。其中的 `:8888` 表示 Apache 正在非标准端口\
  \ 8888 上监听请求。\n5.  最小化浏览器，在 MAMP 控制面板的任意位置单击，使其成为活动应用。\n6.  转到屏幕顶部的 MAMP 主菜单，选择“偏好设置”（或使用键盘快捷键\
  \ Cmd+,）。\n7.  在打开的窗口顶部选择“端口”。它显示 Apache 和 MySQL 分别运行在端口 8888 和 8889 上（见图 2-2）。\n\
  \    \n    ![../images/332054_4_En_2_Chapter/332054_4_En_2_Fig2_HTML.jpg](img/332054_4_En_2_Fig2_HTML.jpg)\n\
  \    \n    图 2-2. 更改 Apache 和 MySQL 端口\n    \n8.  如图 2-2 所示，点击“将 Web 和 MySQL 端口设置为\
