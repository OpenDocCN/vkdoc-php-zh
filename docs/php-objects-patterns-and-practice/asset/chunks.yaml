- fmt: "# Creating Identity Objects and Query Factories\n\nI begin by creating the\
    \ `IdentityObject`. Calling `field()` causes a `Field` object to be created and\
    \ assigned as the `$currentfield` property. Notice that `field()` returns a reference\
    \ to the `identity` object. This allows us to hang more method calls off the back\
    \ of the call to `field()`. The comparison methods `eq()`, `gt()`, and so forth\
    \ each call `operator()`. This checks that there is a current `Field` object to\
    \ work with; and if so, it passes along the operator symbol and the provided value.\
    \ Once again, `eq()` returns an object reference, so that I can add new tests\
    \ or call `add()` again to begin work with a new field.\n\nNotice the way that\
    \ the client code is almost sentence-like: field `\"name\"` equals `\"The Good\
    \ Show\"` and field `\"start\"` is greater than the current time, but less than\
    \ a day away.\n\nOf course, by losing those hard-coded methods, I also lose some\
    \ safety. This is what the `$enforce` array is designed for. Subclasses can invoke\
    \ the base class with a set of constraints:\n\n```\n// listing 13.40\nclass EventIdentityObject\
    \ extends IdentityObject\n{\n    public function __construct(string $field = null)\n\
    \    {\n        parent::__construct(\n            $field,\n            ['name',\
    \ 'id', 'start', 'duration', 'space']\n        );\n    }\n}\n```\n\nThe `EventIdentityObject`\
    \ class now enforces a set of fields. Here’s what happens if I try to work with\
    \ a random field name:\n\n```\nPHP Fatal error:  Uncaught exception 'Exception'\
    \ with message 'banana not a legal field (name, id, start, duration, space)'...\n\
    ```\n\n## Consequences\n\nIdentity objects allow client coders to define search\
    \ criteria without reference to a database query. They also save you from having\
    \ to build special query methods for the various kinds of find operations your\
    \ user might need.\n\nPart of the point of an identity object is to shield users\
    \ from the details of the database. It’s important, therefore, that if you build\
    \ an automated solution like the fluent interface in the preceding example, the\
    \ labels you use should refer explicitly to your domain objects and not to the\
    \ underlying column names. Where these differ, you should construct a mechanism\
    \ for aliasing between them.\n\nWhere you use specialized entity objects, one\
    \ for each domain object, it is useful to use an abstract factory (like `PersistenceFactory`\
    \ described in the previous section) to serve them up along with other domain\
    \ object related objects.\n\nNow that I can represent search criteria, I can use\
    \ this to build the query itself.\n\n# The Selection Factory and Update Factory\
    \ Patterns\n\nI have already pried a few responsibilities from the `Mapper` classes.\
    \ With these patterns in place, a `Mapper` does not need to create objects or\
    \ collections. With query criteria handled by Identity Objects, it must no longer\
    \ manage multiple variations on the `find()` method. The next stage is to remove\
    \ responsibility for query creation.\n\n## The Problem\n\nAny system that speaks\
    \ to a database must generate queries, but the system itself is organized around\
    \ domain objects and business rules rather than the database. Many of the patterns\
    \ in this chapter can be said to bridge the gap between the tabular database and\
    \ the more organic, treelike structures of the domain. There is, however, a moment\
    \ of translation—the point at which domain data is transformed into a form that\
    \ a database can understand. It is at this point that the true decoupling takes\
    \ place.\n\n## Implementation\n\nOf course, you have seen some of this functionality\
    \ before in the Data Mapper pattern. In this specialization, though, I can benefit\
    \ from the additional functionality afforded by the identity object pattern. This\
    \ will tend to make query generation more dynamic, simply because the potential\
    \ number of variations is so high.\n\nFigure [13-9](#A314621_5_En_13_Chapter.html#Fig9)\
    \ shows my simple selection and update factories.\n\n![A314621_5_En_13_Fig9_HTML.gif](A314621_5_En_13_Fig9_HTML.gif)\n\
    \n**Figure 13-9.** Selection and update factories\n\nSelection and update factories\
    \ are, once again, typically organized so that they parallel the domain objects\
    \ in a system (possibly mediated via identity objects). Because of this, they\
    \ are also candidates for my `PersistenceFactory`: the Abstract Factory I maintain\
    \ as a one-stop shop for domain object persistence tools. Here is an implementation\
    \ of a base class for update factories:\n\n```\n// listing 13.41\nabstract class\
    \ UpdateFactory\n{\n    abstract public function newUpdate(DomainObject $obj):\
    \ array;\n\n    protected function buildStatement(string $table, array $fields,\
    \ array $conditions = null): array\n    {\n        $terms = array();\n       \
    \ if (! is_null($conditions)) {\n            $query  = \"UPDATE {$table} SET \"\
    ;\n            $query .= implode(\" = ?,\", array_keys($fields)) . \" = ?\";\n\
    \            $terms  = array_values($fields);\n            $cond   = [];\n   \
    \         $query .= \" WHERE \";\n            foreach ($conditions as $key =>\
    \ $val) {\n                $cond[] = \"$key = ?\";\n                $terms[] =\
    \ $val;\n            }\n            $query .= implode(\" AND \", $cond);\n   \
    \     } else {\n            $query  = \"INSERT INTO {$table} (\";\n          \
    \  $query .= implode(\",\", array_keys($fields));\n            $query .= \") VALUES\
    \ (\";\n            foreach ($fields as $name => $value) {\n                $terms[]\
    \ = $value;\n                $qs[] = '?';\n            }\n            $query .=\
    \ implode(\",\", $qs);\n            $query .= \")\";\n        }\n        return\
    \ array($query, $terms);\n    }\n}\n```\n\nIn interface terms, the only thing\
    \ that this class does is define the `newUpdate()` method. This will return an\
