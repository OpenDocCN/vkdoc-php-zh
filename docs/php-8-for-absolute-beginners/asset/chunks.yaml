    \ file contains only the $page variable seen in Listing [2-6](#323857_3_En_2_Chapter.xhtml#PC10).\
    \ The other two variables and the echo statement will exist in the newindex.php\
    \ file."
  trans: "\n### 安全编程\n\n错误信息有时会显示部分代码，试图帮助我们确定如何修复语法问题。例如，错误可能显示数据库的位置甚至访问数据库所需的用户\
    \ ID 和密码。如果显示的是\"暂时不可用\"消息而非系统崩溃的错误提示，用户更有可能再次访问我们的网站。\n\n> **注意：**  \n> 默认情况下，PHP\
    \ 的安装文件会将所有错误的显示设置为开启。在生产环境中，我们需要通过在 `php.ini` 配置文件中修改设置来关闭此参数。\n\n如果你在无法访问 `php.ini`\
    \ 文件的环境下创建程序，错误的显示可能已被关闭。在这种情况下，你可以在脚本开头添加以下两行 PHP 代码来显示所有错误信息。\n\n```php\nerror_reporting(\
    \ E_ALL );\nini_set( \"display_errors\", 1 );\n```\n\n本书中展示的所有示例程序都不会包含这些语句，因为我们假设你是在可以显示所有错误的测试环境中编写代码。\n\
    \n> **提示：**  \n> 学习在 LAMP、WAMP 或 MAMP 栈中创建的*日志文件*的位置。有时，这些文件中可能会列出一些与程序代码无直接关联的错误。如果你的程序无法执行且似乎没有产生错误，那么实际错误可能就存在于某个日志文件中。\n\
    \n让我们制造一个错误。\n\n```\n清单 2-4\ntest4.php\n```\n\n你看到错误了吗？PHP 可能不会显示错误，但确实存在问题。这里只有一个字符串分隔符（双引号）。要编写有效的\
    \ PHP 代码，我们必须将字符串包裹在字符串分隔符中。在上述示例中，由于缺少结束分隔符，PHP 无法确定输出的结束位置。如果我们运行这段代码，可能会在浏览器中看到如下错误信息。\n\
    \n![](img/323857_3_En_2_Fig4_HTML.jpg)\n\n此窗口描述了在个人主页测试中发生的错误：解析错误、语法错误、意外的文件结束，以及期待变量。\n\
    \n**图 2-4** – test4.php 错误\n\n错误消息虽然友好，但并非总是如你所愿那般精确。当 PHP 无法处理代码时，就会触发错误。上述消息并未明确指出代码中缺少双引号。PHP\
    \ 会对问题可能的原因进行有根据的猜测。在这个例子中，PHP 在第 6 行遇到了\"意外的文件结束\"。但等等，错误出现在第 4 行，而不是第 6 行！为什么它没能指出正确的行号？请记住，起始分隔符表示字符串的开始；解释器会假定双引号之后的所有内容都是一个字符串，直到找到另一个双引号为止。然而，它再也没有找到另一个双引号。于是它假设剩下的代码（包括\
    \ `?>`）都是字符串的一部分。因此，它会抱怨在字符串完成之前程序就过早结束了。\n\n> **提示：**  \n> 在处理错误消息时，如果你在消息指示的行中没有发现错误，请检查该行上方的一行或多行。你很可能忘记包含一个双引号或分号。\n\
    \n**练习：** 回到本章前面介绍过的示例程序。调整这些程序，删除或修改代码以引发错误。运行程序，观察会显示哪些错误消息。在学习 PHP 的过程中，你甚至可以将错误消息和可能的问题列表保存在一个文本文件中，以便参考。熟悉最常见的错误及可能的解决方案将大大缩短你的程序调试时间。\n\
    \n如果你遇到无法理解的错误消息，请上网搜索解释。像 [`www.stackoverflow.com`](http://www.stackoverflow.com)\
    \ 这样的网站很可能有你特定错误消息的解释。世界上总有人遇到过与你程序产生的相同错误。有许多免费的网站和博客可以帮助你找到解决方案。\n\n## 使用 PHP\
    \ 创建 HTML5 页面\n\nPHP 是创建动态 HTML 页面的绝佳语言。只需一点点 PHP 代码，我们就可以在内存中创建一个包含可变内容的有效的 HTML5\
    \ 页面，并通过 PHP 将生成的页面输出到浏览器。\n\n### HTML 回顾\n\nHTML 需要一些标签才能正确格式化。HTML5 中提供了额外的标签，以便以更符合逻辑的设计组织信息。\n\
    \n```html\n<!DOCTYPE html>\n<html>\n  <head>\n    <title>页面标题</title>\n  </head>\n\
    \  <body>\n    <p>页面主体</p>\n  </body>\n</html>\n```\n\n所有 HTML 代码都必须位于开始标签（`<html>`）和结束标签（`</html>`）之间。在开始标签之后，应包含一个头部区域（`<head></head>`），用于提供页面标题（`<title></title>`）和其他页面信息。用于显示网页内容实际\
    \ HTML 标签则放置在主体标签（`<body></body>`）之间。`<p></p>` 标签将以段落形式显示字符串。\n\n有关这些 HTML 标签的更多详细信息，请访问免费在线教程网站，如\
    \ [w3schools.com](http://w3schools.com) 。\n\n我们将使用这种基本的 HTML 结构来创建一个个人作品集网站的基本骨架。让我们创建\
    \ `index.php`，代码如清单 2-5 所示。\n\n```php\n<?php\n$title = \"Hello World\";\n$content\
    \ = \"<h1>Hello World</h1>\";\n$page = \"\n<!DOCTYPE html>\n<html>\n  <head>\n\
    \    <title>$title</title>\n  </head>\n  <body>\n    $content\n  </body>\n</html>\n\
    \";\necho $page;\n?>\n清单 2-5\nindex.php\n```\n\n这个 `index.php` 程序包含了三个变量：`$title`、`$content`\
    \ 和 `$page`。前两个变量设置了 `$page` 中提供的 HTML 的信息。唯一一条向浏览器发送信息的实际指令是最后的 `echo` 语句。该语句发送\
    \ `$page` 中的所有 HTML 标签供浏览器解释，产生如图 2-5a 所示的输出。\n\n![](img/323857_3_En_2_Fig6_HTML.jpg)\n\
    \n此图像显示了超文本标记语言的源代码，揭示了一个结构良好的页面，包含 head、title、meta 和 body 等步骤。\n\n**图 2-5b**\
    \ – index.php 源代码\n\n![](img/323857_3_En_2_Fig5_HTML.jpg)\n\n此窗口表示执行 index 中代码的结果，输出为\
    \ Hello World。\n\n**图 2-5a** – index.php 输出\n\n当我们查看浏览器生成的*源代码*（图 2-5b）时，我们看到了一个结构良好的\
    \ HTML5 页面，包含标题和一级标题。检查 PHP 生成的 HTML 页面的源代码是一个好习惯。任何 HTML 错误通常都会在浏览器的源代码视图中高亮显示。\n\
    \n### 包含简单的页面模板\n\n使用 PHP 创建有效的 HTML5 页面是一个非常非常常见的任务。让我们尝试以更易于在其他项目中重用的方式创建相同的输出。如果你能在其他项目中重用代码，就能更快、更高效地开发解决方案。我们将把\
    \ HTML5 页面模板保存在一个单独的文件中。\n\n我们将在现有的 PHP 项目中创建一个名为 `templates` 的新文件夹。PHP 文件 `page.php`\
    \ 将放置在 `templates` 文件夹中，包含清单 2-6 所示的代码。\n\n```php\n<?php\n$page = \"\n<!DOCTYPE\
    \ html>\n<html>\n  <head>\n    <title>$title</title>\n  </head>\n  <body>\n  \
    \  $content\n  </body>\n</html>\n\";\n?>\n清单 2-6\npage.php\n```\n\n`page.php`\
    \ 文件仅包含清单 2-6 中所示的 `$page` 变量。另外两个变量和 `echo` 语句将存在于 `newindex.php` 文件中。\n"
- fmt: '### Including the Template


    Our template is our first entry into our library. A *library* is a set of existing
    code that can be reused in other programs. To use the template in the `newindex.php`
    file, we will need to pull it into the program. PHP provides four instructions
    that can access information from a library.


    - `include`: This instruction attempts to insert the code from a library file
    from within the calling program. If the library file does not exist, the command
    will not raise an error. If an attempt to insert the same library file occurs
    more than once in the program, the instruction will not raise an error.

    - `include_once`: This instruction will attempt to insert the library file code.
    If the library file does not exist, it will not raise an error. However, if the
    same program attempts to insert the same library file more than once, it will
    not include it again.

    - `require`: When an attempt is made to include a nonexisting library file, this
    instruction will raise an error. However, if more than one attempt is made in
    the same program to include the same library file, it will not raise an error.

    - `require_once`: Attempting to use a nonexisting library file or attempting to
    use an existing library file more than once in the same program, it will not include
    it again.


    Our program will not work properly if the `page.php` file does not exist. Logically,
    we will use either the `require` or `require_once` instruction because the contents
    are required. Since our program is short, we don’t need to be concerned about
    an attempt to use the `page.php` file more than once. It would be harmless, anyway,
    because the library file would just reset the `$page` variable to the same contents
    we are already using. We can safely use the `require` command.


    ### Secure Programming


    As we are learning the basics of PHP, we should always attempt to create *secure
    programs*. The programmer should take the time to select the most secure option
    when including library files. There is always a chance that the file might be
    missing. Will a missing library file make the program inoperable? If so, use one
    of the `require` instructions. Otherwise, use one of the `include` instructions.
    If including the library file more than once in a program will cause potential
    harm to the outcome of the program, use one of the commands with the `once` option.
    Currently, with our programming skills, any error raised will be displayed in
    the browser. This example would not be considered safe for a live site. We will
    learn how to handle errors in a more professional manner in a later chapter.


    Why not just use `require_once` or `require` for every attempt to pull in a library
    file?


    The answer is efficiency. Using `require_once` causes multiple checking for an
    existing file and for the use of the file used more than once. If this is not
    required, we are adding unnecessary commands into our program. Always keep an
    eye out for efficiency, as we want to develop programs that execute correctly
    as quickly as possible.


    ```

    Hello World";

    //indicate the relative path to the file to include

    require "templates/page.php";

    echo $page;

    ?>

    Listing 2-7

    newindex.php

    ```


    The `newindex.php` file is now a very short program. The program now sets the
    `$title` and `$content` variables, pulls in the code from the `page.php` file,
    and echoes out its contents. The output of the preceding code will be identical
    to that from the previous program. There are no functional changes, but there
    are some aesthetic changes in code architecture. A reusable *page template* is
    now kept in a separate file. We’re really splitting different parts of the code
    into different files. The result is that more of the code becomes readily reusable
    in other projects. This process of separating different parts is also known as
    *separation of concerns*.


    ### Commenting Your Code


    You should always place *comments* (nonexecutable text) in your programs. Such
    comments should remind you what the code does and why. In the real world, you
    will be creating hundreds of programs. If changes need to be made to an existing
    program, comments can help the programmer quickly determine the logical design.
    Even if you created the program years ago, you would appreciate the reminder of
    how the program is designed. Many companies also require comments which include
    a description of what the program will accomplish, a list of the inputs and outputs,
    the creator, and information on any changes to the program since its first release.


    **Note**


    We are using a limited number of comments in this book to reduce the number of
    printed pages. This is not to be construed as an indication that comments are
    not important. They are very important!'
