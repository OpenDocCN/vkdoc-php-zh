    \n```php\n    pubDate);\n    echo $date->format('M j, Y, g:ia'); ?>\n```\n\n这将日期重新格式化为：\n\
    \n![../images/332054_4_En_7_Chapter/332054_4_En_7_Fign_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Fign_HTML.jpg)\n\
    \n有关神秘的 PHP 日期格式化字符串，请参阅第[16](#332054_4_En_16_Chapter.xhtml)章。\n\n8. 看起来好多了，但时间仍然以\
    \ GMT（伦敦时间）显示。如果网站的大多数访客居住在美国东海岸，你可能希望显示当地时间。使用`DateTime`对象可以轻松实现。使用`setTimezone()`方法切换到纽约时间。你甚至可以根据夏令时是否生效，自动显示\
    \ EDT（东部夏令时）或 EST（东部标准时间）。修改代码如下：\n\n```php\n    pubDate);\n    $date->setTimezone(new\
    \ DateTimeZone('America/New_York'));\n    $offset = $date->getOffset();\n    $timezone\
    \ = ($offset == -14400) ? ' EDT' : ' EST';\n    echo $date->format('M j, Y, g:ia')\
    \ . $timezone; ?>\n```\n\n要创建`DateTimeZone`对象，请将[`www.php.net/manual/en/timezones.php`](http://www.php.net/manual/en/timezones.php)列出的一个时区作为参数传递给它。这是唯一需要`DateTimeZone`对象的地方，因此它被直接创建为`setTimezone()`方法的参数。\n\
    \n虽然没有专门的方法来判断夏令时是否生效，但`getOffset()`方法会返回时间与协调世界时（UTC）相差的秒数。以下代码决定显示 EDT 还是 EST：\n\
    \n```php\n    $timezone = ($offset == -14400) ? ' EDT' : ' EST';\n```\n\n这里使用`$offset`的值结合三元运算符。在夏季，纽约比\
    \ UTC 晚4小时（`-14400`秒）。因此，如果`$offset`等于`-14400`，条件为`true`，则将 EDT 赋值给`$timezone`。否则，使用\
    \ EST。\n\n最后，将`$timezone`的值拼接到格式化时间之后。`$timezone`使用的字符串前面有一个空格，用于分隔时区和时间。加载页面时，时间会调整为美国东海岸时间，如下所示：\n\
    \n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figo_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figo_HTML.jpg)\n\
    \n9. 现在页面只需要用 CSS 进行美化。图[7-6](#332054_4_En_7_Chapter.xhtml#Fig6)展示了使用`styles`文件夹中`newsfeed.css`样式化后的完整新闻订阅。\n\
    \n![../images/332054_4_En_7_Chapter/332054_4_En_7_Fig6_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Fig6_HTML.jpg)\n\
    \n**图 7-6.** 实时新闻订阅只需要十几行 PHP 代码\n\n> **提示**\n> 如果你订阅了 LinkedIn Learning 或 [Lynda.​com](http://lynda.com)，可以在我的课程《学习标准\
    \ PHP 库》和《学习 PHP SimpleXML》中了解更多关于 SPL 和 SimpleXML 的知识。\n\n虽然我为这个 PHP 解决方案使用了\
    \ BBC 新闻订阅，但它应该适用于任何 RSS 2.0 订阅。例如，你可以在本地使用[`http://rss.cnn.com/rss/edition.rss`](http://rss.cnn.com/rss/edition.rss)进行测试。在公共网站中使用\
    \ CNN 新闻订阅需要获得 CNN 的许可。在将订阅集成到网站之前，请务必与版权所有者核实条款和条件。\n\n---\n\n**创建下载链接**\n\n\
    一个经常在在线论坛出现的问题是：“如何创建一个指向图像（或 PDF 文件）的链接，以提示用户下载它？”快速解决方案是将文件转换为压缩格式，例如 ZIP。这通常会导致更小的下载量，但缺点是没有经验的用户可能不知道如何解压文件，或者他们可能使用的是不包含解压工具的旧操作系统。使用\
    \ PHP 文件系统函数，可以轻松创建一个自动提示用户下载原始格式文件的链接。\n\n**PHP 解决方案 7-6：提示用户下载图像**\n\n这个 PHP\
    \ 解决方案发送必要的 HTTP 头，并使用`readfile()`以二进制流的形式输出文件内容，强制浏览器下载它。\n\n1. 在`filesystem`文件夹中创建一个名为`download.php`的\
    \ PHP 文件。完整列表在下一步中给出。你也可以在`ch07`文件夹的`download.php`中找到它。\n\n2. 删除脚本编辑器创建的任何默认代码，并插入以下代码：\n\
    \n```php\n    <?php\n    // define error page\n    $error = 'http://localhost/phpsols-4e/error.php';\n\
    \    // define the path to the download folder\n    $filepath = 'C:/xampp/htdocs/phpsols-4e/images/';\n\
    \    $getfile = NULL;\n    // block any attempt to explore the filesystem\n  \
    \  if (isset($_GET['file']) && basename($_GET['file']) == $_GET['file']) {\n \
    \   $getfile = $_GET['file'];\n    } else {\n    header(\"Location: $error\");\n\
    \    exit;\n    }\n    if ($getfile) {\n    $path = $filepath . $getfile;\n  \
    \  // check that it exists and is readable\n    if (file_exists($path) && is_readable($path))\
    \ {\n    // send the appropriate headers\n    header('Content-Type: application/octet-stream');\n\
    \    header('Content-Length: '. filesize($path));\n    header('Content-Disposition:\
    \ attachment; filename=' . $getfile);\n    header('Content-Transfer-Encoding:\
    \ binary');\n    // output the file content\n    readfile($path);\n    } else\
    \ {\n    header(\"Location: $error\");\n    }\n    }\n    ```\n\n此脚本中唯一需要更改的两行已用粗体标出。第一行定义了`$error`，这是一个包含错误页面\
    \ URL 的变量。需要更改的第二行定义了存储下载文件的文件夹路径。\n\n脚本的工作原理是从附加到 URL 的查询字符串中获取要下载的文件名，并将其保存为`$getfile`。由于查询字符串很容易被篡改，因此`$getfile`最初设置为`NULL`。如果不这样做，可能会让恶意用户访问服务器上的任何文件。\n\
    \n开头的条件语句使用`basename()`来确保攻击者无法从文件结构的其他部分请求文件（例如存储密码的文件）。如第[5](#332054_4_En_5_Chapter.xhtml)章所述，`basename()`提取路径中的文件名部分，因此如果`basename($_GET['file'])`与`$_GET['file']`不同，你就知道有人试图探测你的服务器。然后，你可以使用`header()`函数将用户重定向到错误页面，从而阻止脚本继续执行。\n\
    \n在检查请求的文件存在且可读之后，脚本发送适当的 HTTP 头，并使用`readfile()`将文件发送到输出缓冲区。如果找不到文件，则用户会被重定向到错误页面。\n\
    \n3. 通过创建另一个页面来测试脚本；添加几个指向`download.php`的链接。在每个链接的末尾添加一个查询字符串，格式为`file=`后跟要下载的文件名。你可以在`ch07`文件夹中找到名为`getdownloads.php`的页面，其中包含以下两个链接：\n\
    \n```php\n    Download fountains image\n    Download monk image\n```"
  raw: "7.  To format the date and time in a more user-friendly way, pass `$item->pubDate`\
    \ to\n    the `DateTime`\n    class constructor, then use the `DateTime format()`\n\
    \    method  to display\n    it. Change the code in the `foreach` loop, like\n\
    \    this:\n\n```\n    pubDate);\n    echo $date->format('M j, Y, g:ia'); ?>\n\
    \    ```\n\nThis reformats the date as follows:\n\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Fign_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Fign_HTML.jpg)\n\
    \nThe mysterious PHP formatting strings for dates are explained in\n    Chapter\
    \ [16](#332054_4_En_16_Chapter.xhtml).\n\n8.  That looks a lot better, but the\
    \ time is still expressed in GMT (London\n    time). If most of your site’s visitors\
    \ live on the East Coast of the\n    United States, you probably want to show\
    \ the local time. That’s no\n    problem with a `DateTime` object. Use\n    the\
    \ `setTimezone()` method\n    to change to New York time.  You can even automate\n\
    \    the display of EDT (Eastern Daylight Time) or EST (Eastern Standard\n   \
    \ Time) depending on whether daylight saving time is in operation. Amend\n   \
    \ the code like this:\n\n```\n    pubDate);\n    $date->setTimezone(new DateTimeZone('America/New_York'));\n\
    \    $offset = $date->getOffset();\n    $timezone = ($offset == -14400) ? ' EDT'\
    \ : ' EST';\n    echo $date->format('M j, Y, g:ia') . $timezone; ?>\n    ```\n\
    \nTo create a `DateTimeZone` object,\n    pass to it as an argument one of the\
    \ time zones listed at [`www.php.net/manual/en/timezones.php`](http://www.php.net/manual/en/timezones.php)\
    \ . This is the only place that the `DateTimeZone` object\n    is needed, so it\
    \ has been created directly as the argument to the `setTimezone()`\n    method.\n\
    \nThere isn’t a dedicated method that tells you whether daylight saving\n    time\
    \ is in operation, but the `getOffset()`\n    method  returns\n    the number\
    \ of seconds the time is offset from Coordinated Universal Time\n    (UTC). The\
    \ following line determines whether to display EDT or EST:\n\n```\n    $timezone\
    \ = ($offset == -14400) ? ' EDT' : ' EST';\n    ```\n\nThis uses the value of\
    \ `$offset` with the\n    ternary operator. In summer, New York is 4 hours behind\
    \ UTC (`−`14440 seconds). So,\n    if `$offset` is\n    `−`14400, the\n    condition\
    \ equates to `true`, and EDT is\n    assigned to `$timezone`. Otherwise,\n   \
    \ EST is used.\n\nFinally, the value of `$timezone` is\n    concatenated to the\
    \ formatted time. The string used for `$timezone` has a\n    leading space to\
    \ separate the time zone from the time. When the page is\n    loaded, the time\
    \ is adjusted to the East Coast of the United States,\n    like this:\n\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figo_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figo_HTML.jpg)\n\
    \n9.  All the page needs now is smartening up with CSS. Figure [7-6](#332054_4_En_7_Chapter.xhtml#Fig6)\
    \ shows the\n    finished news feed styled with `newsfeed.css` in the\n    `styles`\
    \ folder.\n\n![../images/332054_4_En_7_Chapter/332054_4_En_7_Fig6_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Fig6_HTML.jpg)\n\
    \nFigure 7-6.\n\nThe live news feed requires only a dozen lines of PHP code\n\n\
    Tip\nIf you have a subscription to LinkedIn Learning or [Lynda.​com](http://lynda.com),\
    \ you can learn more about\nSPL and SimpleXML in my courses *Learning the Standard\
    \ PHP\nLibrary* and *Learning PHP SimpleXML*.\n\nAlthough I have used the BBC\
    \ news feed for this PHP solution, it\nshould work with any RSS 2.0 feed. For\
    \ example, you can try it locally\nwith [`http://rss.cnn.com/rss/edition.rss`](http://rss.cnn.com/rss/edition.rss)\
    \ . Using a CNN news feed in a public web site requires\npermission from CNN.\
    \ Always check with the copyright holder for terms\nand conditions before incorporating\
    \ a feed into a web site.\n\nCreating a Download Link\nA question that crops up\
    \ regularly in online forums is “How do I\ncreate a link to an image (or PDF file)\
    \ that prompts the user to\ndownload it?” The quick solution is to convert the\
    \ file into a\ncompressed format, such as ZIP. This frequently results in a smaller\n\
    download, but the downside is that inexperienced users may not know how\nto unzip\
    \ the file, or they may be using an older operating system that\ndoesn’t include\
    \ an extraction facility. With PHP file system functions,\nit’s easy to create\
    \ a link that automatically prompts the user to\ndownload a file in its original\
    \ format.\n\nPHP Solution 7-6: Prompting a User to download an\nimage\n\nThis\
    \ PHP solution sends the necessary HTTP headers and uses `readfile()`  to output\
    \ the contents\nof a file as a binary stream, forcing the browser to download\
    \ it.\n\n1.  Create a PHP file called `download.php` in the\n    `filesystem`\n\
    \    folder. The full listing is given in the next step. You can also find it\n\
    \    in `download.php`\n    in the `ch07`\n    folder.\n\n2.  Remove any default\
    \ code created by your script editor and insert the\n    following code:\n\n```\n\
    \    <?php\n    // define error page\n    $error = 'http://localhost/phpsols-4e/error.php';\n\
    \    // define the path to the download folder\n    $filepath = 'C:/xampp/htdocs/phpsols-4e/images/';\n\
    \    $getfile = NULL;\n    // block any attempt to explore the filesystem\n  \
    \  if (isset($_GET['file']) && basename($_GET['file']) == $_GET['file']) {\n \
    \   $getfile = $_GET['file'];\n    } else {\n    header(\"Location: $error\");\n\
    \    exit;\n    }\n    if ($getfile) {\n    $path = $filepath . $getfile;\n  \
    \  // check that it exists and is readable\n    if (file_exists($path) && is_readable($path))\
    \ {\n    // send the appropriate headers\n    header('Content-Type: application/octet-stream');\n\
    \    header('Content-Length: '. filesize($path));\n    header('Content-Disposition:\
    \ attachment; filename=' . $getfile);\n    header('Content-Transfer-Encoding:\
    \ binary');\n    // output the file content\n    readfile($path);\n    } else\
    \ {\n    header(\"Location: $error\");\n    }\n    }\n    ```\n\nThe only two\
    \ lines that you need to change in this script are\n    highlighted in bold type.\
    \ The first defines `$error`, a variable\n    that contains the URL of your error\
    \ page. The second line that needs to\n    be changed defines the path to the\
    \ folder where the download file is\n    stored.\n\nThe script works by taking\
    \ the name of the file to be downloaded from\n    a query string appended to the\
    \ URL and saving it as `$getfile`. Because\n    query strings can be easily tampered\
    \ with, `$getfile` is initially\n    set to `NULL`. If\n    you fail to do this,\
    \ you could give a malicious user access to any file\n    on your server.\n\n\
    The opening conditional statement uses `basename()` to make\n    sure that an\
    \ attacker cannot request a file, such as one that stores\n    passwords, from\
    \ another part of your file structure. As explained in\n    Chapter [5](#332054_4_En_5_Chapter.xhtml),\
    \ `basename()` extracts\n    the filename component of a path, so if `basename($_GET['file'])`\n\
    \    is different from `$_GET['file']`, you\n    know there’s an attempt to probe\
    \ your server. You can then stop the\n    script from going any further by using\
    \ the `header()`\n    function  to\n    redirect the user to the error page.\n\
    \nAfter checking that the requested file exists and is readable, the\n    script\
    \ sends the appropriate HTTP headers and uses `readfile()` to send\n    the file\
    \ to the output buffer. If the file can’t be found, the user is\n    redirected\
    \ to the error page.\n\n3.  Test the script by creating another page; add a couple\
    \ of links to `download.php`. Add a\n    query string at the end of each link\
    \ with `file=` followed by the\n    name of a file to be downloaded. You’ll find\
    \ a page called `getdownloads.php` in\n    the `ch07` folder\n    that contains\
    \ the following two links:\n\n```\n    Download fountains image\n    Download\
    \ monk image\n    ```"
