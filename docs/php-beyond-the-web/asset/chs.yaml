  \ |\n\n### 5.6 Windows 对话框\n\n一个有用的 Pecl 包允许你从 PHP 访问 Win32 API。该 API 提供了创建常见 Win32\
  \ 对话框的途径。我们将在第 8 章进一步研究这个库，届时会探讨如何利用它与 Windows 注册表进行交互。\n\n| ![](img/image00249.gif)\
