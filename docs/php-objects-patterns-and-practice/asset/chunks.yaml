- fmt: '# Patterns and Design Principles


    Patterns have grooves and curves that fit one another. Certain patterns slot together
    with a satisfying click. Solving a problem using a pattern will inevitably have
    ramifications. These consequences can become the conditions that suggest complementary
    patterns. It is important, of course, to be careful that you are addressing real
    needs and problems when you choose related patterns, and not just building elegant
    but useless towers of interlocking code. It is tempting to build the programming
    equivalent of an architectural folly.


    ## A Common Vocabulary


    Patterns are a means of developing a common vocabulary for describing problems
    and solutions. Naming is important—it stands in for describing, and therefore
    lets us cover lots of ground very quickly. Naming, of course, also obscures meaning
    for those who do not yet share the vocabulary, which is one reason why patterns
    can be so infuriating at times.


    ## Patterns Promote Design


    As discussed in the next section, patterns can encourage good design when used
    properly. There is an important caveat, of course. Patterns are not fairy dust.


    ## Patterns and Principles of Design


    Design patterns are, by their nature, concerned with good design. Used well, they
    can help you build loosely coupled and flexible code. Pattern critics have a point,
    though, when they say that patterns can be overused by the newly infected. Because
    pattern implementations form pretty and elegant structures, it can be tempting
    to forget that good design always lies in fitness for purpose. Remember that patterns
    exist to address problems.


    When I first started working with patterns, I found myself creating `AbstractFactory`
    all over my code. I needed to generate objects, and `AbstractFactory` certainly
    helped me to do that.


    In fact, though, I was thinking lazily and making unnecessary work for myself.
    The sets of objects I needed to produce were indeed related, but they did not
    yet have alternative implementations. The classic `AbstractFactory` pattern is
    ideal for situations in which you have alternative sets of objects to generate
    according to circumstance. To make `AbstractFactory` work, you need to create
    factory classes for each type of object and a class to serve up the factory class.
    It’s exhausting just describing the process.


    My code would have been much cleaner had I created a basic factory class, only
    refactoring to implement `AbstractFactory` if I found myself needing to generate
    a parallel set of objects.


    The fact that you are using patterns does not guarantee good design. When developing,
    it is a good idea to bear in mind two expressions of the same principle: KISS
    (“Keep it simple, stupid”) and “Do the simplest thing that works.” eXtreme programmers
    also give us another, related, acronym: YAGNI. “You aren’t going to need it,”
    meaning that you should not implement a feature unless it is truly required.


    With the warnings out of the way, I can resume my tone of breathless enthusiasm.
    As I laid out in Chapter [9](#A314621_5_En_9_Chapter.html), patterns tend to embody
    a set of principles that can be generalized and applied to all code.


    ### Favor Composition over Inheritance


    Inheritance relationships are powerful. We use inheritance to support runtime
    class switching (polymorphism), which lies at the heart of many of the patterns
    and techniques I explored in this book. By relying solely on inheritance in design,
    though, you can produce inflexible structures that are prone to duplication.


    ### Avoid Tight Coupling


    I have already talked about this issue in this chapter, but it is worth mentioning
    here for the sake of completeness. You can never escape the fact that change in
    one component may require changes in other parts of your project. You can, however,
    minimize this by avoiding both duplication (typified in our examples by parallel
    conditionals) and the overuse of global variables (or Singletons). You should
    also minimize the use of concrete subclasses when abstract types can be used to
    promote polymorphism. This last point leads us to another principle.


    ### Code to an Interface, Not an Implementation


    Design your software components with clearly defined public interfaces that make
    the responsibility of each transparent. If you define your interface in an abstract
    superclass and have client classes demand and work with this abstract type, you
    then decouple clients from specific implementations.


    Having said that, remember the YAGNI principle. If you start out with the need
    for only one implementation for a type, there is no immediate reason to create
    an abstract superclass. You can just as well define a clear interface in a single
    concrete class. As soon as you find that your single implementation is trying
    to do more than one thing at the same time, you can redesignate your concrete
    class as the abstract parent of two subclasses. Client code will be none the wiser,
    as it continues to work with a single type.


    A classic sign that you may need to split an implementation and hide the resultant
    classes behind an abstract parent is the emergence of conditional statements in
    the implementation.


    ### Encapsulate the Concept that Varies


    If you find that you are drowning in subclasses, it may be that you should be
    extracting the reason for all this subclassing into its own type. This is particularly
    the case if the reason is to achieve an end that is incidental to your type’s
    main purpose.


    Given a type `UpdatableThing`, for example, you may find yourself creating `FtpUpdatableThing`,
    `HttpUpdatableThing`, and `FileSystemUpdatableThing` subtypes. The responsibility
    of your type, though, is to be a thing that is updatable—the mechanism for storage
    and retrieval is incidental to this purpose. `Ftp`, `Http`, and `FileSystem` are
    the things that vary here, and they belong in their own type—let’s call it `UpdateMechanism`.
    `UpdateMechanism` will have subclasses for the different implementations. You
    can then add as many update mechanisms as you want without disturbing the `UpdatableThing`
    type, which remains focused on its core responsibility.


    Notice also that I have replaced a static compile-time structure with a dynamic
    runtime arrangement here, bringing us (as if by accident) back to our first principle:
    “Favor composition over inheritance.”


    ## Practice


    The issues that I covered in this section of the book (and introduced in Chapter
    [14](#A314621_5_En_14_Chapter.html)) are often ignored by texts and coders alike.
    In my own life as a programmer, I discovered that these tools and techniques were
    at least as relevant to the success of a project as design. There is little doubt
    that issues such as documentation and automated build are less revelatory in nature
    than wonders such as the `Composite` pattern.


    > **Note:** Let’s just remind ourselves of the beauty of `Composite`: a simple
    inheritance tree whose objects can be joined at runtime to form structures that
    are also trees, but are orders of magnitude more flexible and complex. Multiple
    objects share a single interface by which they are presented to the outside world.
    The interplay between simple and complex, multiple and singular, has got to get
    your pulse racing—that’s not just software design, it’s poetry.'
