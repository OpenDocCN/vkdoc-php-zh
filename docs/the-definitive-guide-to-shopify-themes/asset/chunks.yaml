  trans: '

    #### 添加运费计算器


    在购物车页面的基本功能就绪后，我们可以在“继续结账”按钮上方添加一条提示，旨在降低顾客在结账过程中遇到意外情况的风险。由于加载运费需要一些动态 JavaScript，我们可以先实现一个默认的纯
    HTML 备用方案——如代码清单 7-2 和图 7-3 所示，显示一条静态提示。在代码清单 7-2 中，代码清单 7-1 中的表格底部已被更新，加入了一条静态运费信息。包含该信息的元素被赋予了
    `id` 属性，以便我们后续引用并动态更新它。


    ![A437216_1_En_7_Fig3_HTML.jpg](img/A437216_1_En_7_Fig3_HTML.jpg)


    **图 7-3** 购物车表格中显示的备用运费信息


    ```

    ...

    {{ cart.total_price | money }}

    Shipping and taxes calculated during checkout

    ...

    代码清单 7-2

    更新后的代码清单 7-1 中的表格底部包含静态运费信息

    ```


    有了这个备用方案后，我们现在来实现一些 JavaScript 代码，使用 Shopify 的 Ajax API 获取运费估算并显示给顾客。为了准确估算运费，我们需要知道发货目的地（国家、州和邮政编码）——这些信息通常在购物车步骤中并不具备。


    出于示例主题的考虑，我们将保持简单，仅为已知收货地址的已登录顾客获取并显示更准确的运费估算。在其他情况下，我们不会执行任何动态更新，而是显示备用信息。在实际场景中，你可以扩展即将实现的代码，通过
    JavaScript 地理定位 API 获取陌生顾客的位置，或根据其 IP 地址进行近似定位，也可以直接通过一个表单请求其详细地址。


    实现此功能需要对三个主题文件进行修改：


    1.  首先，我们需要在 `assets/theme.js.liquid` 中添加一个新的 `fetchShippingRateEstimate` JavaScript
    方法。该方法需要接收已登录顾客的地址以及用于渲染运费估算信息的目标元素的选择器。然后，它会向 Shopify 的运费 API 发出 Ajax 调用并渲染结果。此方法见代码清单
    7-3。

    2.  由于任何已登录顾客的详细信息仅在核心 Liquid 模板中可用，而非资产文件，因此我们需要在 `templates/cart.liquid` 中将顾客详情传递给新编写的
    `fetchShippingRateEstimate` 方法。如代码清单 7-4 所示，这里使用了笔者称之为“捕获 JS”的模式，具体解释见随后的提示。

    3.  最后，为了让“捕获 JS”模式生效，我们需要在 `layout/theme.liquid` 的底部、所有其他 JavaScript 代码之下添加一行代码。如代码清单
    7-5 所示。


    **提示**


    良好的实践要求将 JavaScript 加载并初始化在 `theme.liquid` 所有页面的底部，因为顶部加载 JavaScript 是导致页面加载缓慢和加载时间过长的主要原因之一。然而，有时你可能希望只在特定页面上加载或执行某些
    JavaScript 代码——这里对 `fetchShippingRateEstimates` 的初始化调用就是一个很好的例子。


    在这些情况下，我使用捕获 JS 技术：在 Liquid 模板中使用 `{% capture %}` 标签，将任何页面特定的 JavaScript 存储到名为
    `captured_js` 的变量中。只要确保将 `captured_js` 之前的内容与新捕获的内容一同输出，就可以在页面上多次使用此方法（参见代码清单
    7-4）。然后，你的 `theme.liquid` 模板可以在页面最底部输出捕获的内容，确保所有 JavaScript 库在执行前都已加载完毕。


    请注意，代码清单 7-3 将此方法暴露在 window 对象的全局作用域中——在生产主题中，你可能需要为其设置命名空间（例如 `window.ExampleTheme.fetchShippingRateEstimate`）。


    ```

    ...

    window.fetchShippingRateEstimate = function(target, shipping_address) {

    if(!shipping_address) return;

    $.ajax({

    url: ''/cart/shipping_rates.json'',

    data: $.serialize({ shipping_address: shipping_address }),

    success: function(shipping_rates) {

    if(shipping_rates.length === 0) return;

    var shipping_rate = shipping_rates[0];

    $(target).html(

    '''' +

    shipping_rate.name + '' ($'' + shipping_rate.price + '') 发往 '' +

    shipping_address.city + '', '' + shipping_address.province +

    ''''

    );

    }

    });

    };

    ...

    代码清单 7-3

    添加到 theme.js.liquid 中的 fetchShippingRateEstimate 方法

    ```


    请注意，代码清单 7-4 使用了方便的 Liquid `| json` 过滤器，它可以将 Liquid 变量（例如顾客的默认地址）转换为 JSON 对象，以便在
    JavaScript 中使用。


    ```

    ...

    {%- capture captured_js -%}

    {{- captured_js -}}


    fetchShippingRateEstimate(''#cart-shipping'', {{ customer.default_address | json
    }});


    {%- endcapture -%}

    代码清单 7-4

    cart.liquid 底部执行的“捕获 JS”模式

    ```


    ```

    ...

    {{- ''theme.js'' | asset_url | script_tag -}}

    {{- captured_js -}}


    代码清单 7-5

    theme.liquid 底部新增内容——输出 captured_js Liquid 变量

    ```


    图 7-4 展示了购物车页面在获取运费后的效果。


    ![A437216_1_En_7_Fig4_HTML.jpg](img/A437216_1_En_7_Fig4_HTML.jpg)


    **图 7-4** 如果拥有已知地址的顾客已登录，购物车页面现在会为其所在地获取运费估算，并提供更具体的运费信息

