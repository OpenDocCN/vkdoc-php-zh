- fmt: "# We do not assume that the inspector property is set\n\nWe do not assume\
    \ that the `inspector` property is set. This will often occur when the subclass\
    \ does not currently call its parent `__construct()` method. An error description\
    \ is given to this effect. We do assume that any accessor method calls that reach\
    \ our `__call()` method probably refer to defined, non-public properties, belonging\
    \ to the subclass. We assume they will follow the format of `setProperty()`/`getProperty()`,\
    \ so we strip out the `get/set` parts and append an underscore to the remaining\
    \ string.\n\nThis will effectively transform calls for `setColor()`/`getColor()`\
    \ to `_color`. If such a property does not exist in the subclass, we throw an\
    \ exception. If the method called was a getter, we determine (via the metadata)\
    \ whether reading the property is permissible. This will be the case if it has\
    \ either `@read` or `@readwrite` flags. Should it be permissible to read the property,\
    \ the property’s value will be returned.\n\nIf the method called was a setter,\
    \ we determine whether writing the property is permissible. This will be the case\
    \ if it has either `@write` or `@readwrite` flags. Should it be permissible to\
    \ write the property, the property’s value will be set to the value of the first\
    \ argument. You might be wondering what these exceptions look like, since we are\
    \ only throwing the results of more methods.\n\nIf we create classes that inherit\
    \ from this `Base` class, we can start to use getters/setters in a straightforward\
    \ manner, simply by setting `@read`/`@write`/`@readwrite` flags within the metadata\
    \ of our subclasses. Sure, there was a whole bunch of code that went into the\
    \ actual `Base` class, and we need not create it if we only intend to use it once\
    \ or twice.\n\nWe will, however, inherit from the `Base` class in almost every\
    \ other class in our framework, so it’s a good investment! Now, instead of writing\
    \ our own accessor methods in each class we need them, we can inherit from the\
    \ `Base` class, and have all the hard work done automatically.\n\n## Transparent\
    \ Getters/Setters\n\nAt the beginning of the chapter, we contrasted the use of\
    \ public properties to using getters/setters. What if we could use protected properties\
    \ as if they were public and still have the added data security of using getters/setters?\
    \ Well we can, using the two magic methods shown in Listing 3-10.\n\n***Listing\
    \ 3-10.*** The `__get()`/`__set()` Magic Methods\n\n```\npublic function __get($name)\n\
    {\n    $function = \"get\".ucfirst($name);\n    return $this->$function();\n}\n\
    \npublic function __set($name, $value)\n{\n    $function = \"set\".ucfirst($name);\n\
    \    return $this->$function($value);\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 3 ■ BASE CLASS\n\nAt first glance, these methods don’t really do\
    \ much. The `__get()` method accepts an argument that represents the name of the\
    \ property being set. In the case of `$obj->property`, the argument will be `property`.\n\
    \nOur `__get()` method then converts this to `getProperty`, which matches the\
    \ pattern we defined in the `__call()` method. What this means is that `$obj->property`\
    \ will first try to set a public property with the same name, then go to `__get()`,\
    \ then try to call the public method `setProperty()`, then go to `__call()`, and\
    \ finally set the protected `$_property`.\n\nThe `__set()` method works similarly,\
    \ except that it accepts a second argument, which defines the value to be set.\
    \ It might be a little easier to see what’s going on if you look at the diagram\
    \ shown in Figure 3-1.\n\n**`$obj->property = \"foo\";`**\n\n| Does `public $property`\
    \ exist? | |\n| --- | --- |\n| **Yes** | set `$property` to `\"foo\"` |\n| **No**\
    \ | go to `__set(\"property\", \"foo\")` → go to `setProperty(\"foo\")` |\n\n\
    | Does `setProperty(...)` exist? | |\n| --- | --- |\n| **Yes** | execute `setProperty(\"\
    foo\")` |\n| **No** | go to `__call(\"setProperty\", array(\"foo\"))` |\n\n| Does\
    \ `protected $_property` exist? | |\n| --- | --- |\n| **Yes** | does `$_property`\
    \ have `@write/@readwrite`? |\n| | **Yes** → set `$_property` to `\"foo\"` |\n\
    | | **No** → raise exception |\n| **No** | raise exception |\n\n***Figure 3-1.**\
    \ Magic methods*\n\nThe full `Base` class looks like that shown in Listing 3-11.\n\
    \n***Listing 3-11.*** The Base Class\n\n```\nnamespace Framework\n{\n    use Framework\\\
    Inspector as Inspector;\n```"
