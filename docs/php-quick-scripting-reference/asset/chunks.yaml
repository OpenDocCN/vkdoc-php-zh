    When a request is made for the PHP web page, the script is parsed on the server\
    \ and sent to the browser as only HTML. If the source code for the website is\
    \ viewed, it will not show any of the server-side code that generated the page,\
    \ only the HTML output.\n\n## Compile and Parse\n\nPHP is an interpreted language,\
    \ not a compiled language. Every time a visitor arrives at a PHP website, the\
    \ PHP engine compiles the code and parses it into HTML, which is then sent to\
    \ the visitor. The main advantage of this is that the code can be changed easily\
    \ without having to recompile and redeploy the website. The main disadvantage\
    \ is that compiling the code at run-time requires more server resources.\n\nFor\
    \ a small website, a lack of server resources is seldom an issue. The time it\
    \ takes to compile the PHP script is also miniscule compared with other factors,\
    \ such as the time required to execute database queries. However, for a large\
    \ web application with lots of traffic, the server load from compiling PHP files\
    \ is likely to be significant. For such a site, the script compilation overhead\
    \ can be removed by precompiling the PHP code. This can be done, for example,\
    \ with `eAccelerator`, which caches PHP scripts in their compiled state.\n\nA\
    \ website that only serves static content (same to all visitors) has another possibility,\
    \ which is to cache the fully generated HTML pages. This provides all the maintenance\
    \ benefits of having a dynamic site, with the speed of a static site. One such\
    \ caching tool is the `W3 Total Cache` plugin for the WordPress CMS.\n\n## Comments\n\
    \nComments are used to insert notes into the code and will have no effect on the\
    \ parsing of the script. PHP has the two standard C++ notations for single-line\
    \ (`//`) and multi-line (`/* */`) comments. The Perl comment notation (`#`) may\
    \ also be used to make single-line comments.\n\n```\n<?php\n  // single-line comment\n\
    \  #  single-line comment\n  /* multi-line\n     comment */\n?>\n```\n\nAs in\
    \ HTML, whitespace characters – such as spaces, tabs, and comments – are generally\
