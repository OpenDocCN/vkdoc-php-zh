    \ `include/app_top.php` 文件中：\n\n```php\n<?php\n\n// 引入实用工具文件\n\nrequire_once 'include/config.php';\n\
    \nrequire_once BUSINESS_DIR . 'error_handler.php';\n\n// 设置错误处理器\n\nErrorHandler::SetHandler();\n\
