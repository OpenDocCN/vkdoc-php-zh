  trans: '

    # 安全与错误消息


    在使用 PHP 和数据库开发网站时，显示错误消息至关重要，以便在出现问题时调试代码。然而，原始错误消息在正式运行的网站中显得不够专业，还可能向潜在攻击者透露数据库结构的相关信息。因此，在将脚本部署到互联网之前，你应该用自定义的中性消息替换数据库生成的错误消息，例如“抱歉，数据库暂时不可用。”


    ## 章节回顾


    通过数据库进行内容管理涉及插入、选择、更新和删除记录。每条记录的主键在更新和删除过程中起着至关重要的作用。大多数情况下，当记录首次创建时，主键的生成由数据库自动处理。此后，查找记录的主键只需通过
    `SELECT` 查询即可实现，无论是通过显示所有记录列表，还是通过搜索你知道的关于该记录的信息（如标题或文章中的词语）。


    `MySQLi` 和 `PDO` 预处理语句通过消除确保引号和控制字符正确转义的需求，使数据库查询更加安全。如果在脚本运行过程中需要使用不同变量重复执行同一查询，它们还能加速应用程序的运行。脚本只需用占位符验证一次
    SQL 语句，无需每次都进行验证。


    尽管本章重点介绍内容管理，但相同的基本技术适用于大多数与数据库的交互。当然，SQL 和 PHP 的内容远不止于此。在下一章中，我将讨论一些最常见的问题，例如仅显示长文本字段的第一句左右内容以及处理日期。然后在第
    15 章中，我们将探索如何操作数据库中的多个表。


    # 14. 格式化文本与日期


    上一章还有一些未完成的工作。第 13 章中的图 13-1 显示了 `blog` 表中的内容，每篇文章仅显示前两句话，并提供一个链接指向文章剩余部分。但我没有向你展示具体实现方法。有多种方式可以从长文本的开头提取较短的文本片段。有些方法相当粗糙，通常会在末尾留下一个不完整的单词。在本章中，你将学习如何提取完整的句子。


    另一项未完成的工作是：`blog_list_mysqli.php` 和 `blog_list_pdo.php` 中的完整文章列表以原始状态显示了 MySQL
    时间戳，这显得不够优雅。你需要重新格式化日期，使其对用户更友好。处理日期可能非常令人头疼，因为 MySQL 和 MariaDB 存储日期的方式与 PHP 完全不同。本章将引导你穿越
    PHP/MySQL 环境下存储和显示日期的雷区。你还将学习 PHP 的日期和时间功能，这些功能让复杂的日期计算（例如查找每个月的第二个星期二）变得轻而易举。


    在本章中，你将了解以下内容：


    - 提取较长文本项的第一部分

    - 在 SQL 查询中使用别名

    - 将从数据库检索的文本显示为段落

    - 使用 MySQL 格式化日期

    - 基于时间条件选择记录

    - 使用 PHP 的 `DateTime`、`DateTimeZone`、`DateInterval` 和 `DatePeriod` 类


    ## 显示文本摘要


    有许多方法可以从较长的文本中提取前几行或前几个字符。有时你只需要前 20 或 30 个字符来识别一项内容。其他时候，最好显示完整的句子或段落。


    ### 提取固定数量的字符


    你可以使用 PHP 的 `substr()` 函数或 SQL 查询中的 `LEFT()` 函数从文本项的开头提取固定数量的字符。


    #### 使用 PHP 的 `substr()` 函数


    `substr()` 函数从较长的字符串中提取子字符串。它接受三个参数：要从中提取子字符串的字符串、起始位置（从 0 开始计数）以及要提取的字符数。以下代码显示
    `$row[''article'']` 的前 100 个字符：


    ```

    echo substr($row[''article''], 0, 100);

    ```


    原始字符串保持不变。如果省略第三个参数，`substr()` 将提取从起始位置到字符串末尾的所有内容。这仅在起始点不为 0 时才有意义。


    #### 在 SQL 查询中使用 `LEFT()` 函数


    `LEFT()` 函数从列的开头提取字符。它接受两个参数：列名和要提取的字符数。以下语句从 `blog` 表的 `article` 列中检索 `article_id`、`title`
    和前 100 个字符：


    ```

    SELECT article_id, title, LEFT(article, 100)

    FROM blog ORDER BY created DESC

    ```


    每当你在 SQL 查询中像这样使用函数时，结果集中的列名将不再是 `article`，而是变为 `LEFT(article, 100)`。因此，最好使用 `AS`
    关键字为受影响的列分配别名。你可以将列的原始名称重新分配为别名，或者像下面的例子一样使用描述性名称（代码位于 `ch14` 文件夹中的 `blog_left_mysqli.php`
    和 `blog_left_pdo.php`）：


    ```

    SELECT article_id, title, LEFT(article, 100) AS first100

    FROM blog ORDER BY created DESC

    ```


    如果你将每条记录处理为 `$row`，则摘要内容位于 `$row[''first100'']` 中。要同时检索前 100 个字符和完整文章，只需像下面这样在查询中同时包含两者：


    ```

    SELECT article_id, title, LEFT(article, 100) AS first100, article

    FROM blog ORDER BY created DESC

    ```


    如图 14-1 所示，提取固定数量的字符会产生粗糙的结果。


    ![A978-1-4842-0635-5_14_Fig1_HTML.jpg](img/A978-1-4842-0635-5_14_Fig1_HTML.jpg)


    图 14-1. 从文章中选取前 100 个字符会将许多单词截断


    ### 在完整单词处结束摘要


    要在完整单词处结束摘要，你需要找到最后一个空格，并用其来确定子字符串的长度。因此，如果你希望摘要最多为 100 个字符，首先使用前述任一方法，并将结果存储在
    `$extract` 中。然后，你可以使用 PHP 字符串函数 `strrpos()` 和 `substr()` 来找到最后一个空格，并像这样结束摘要（代码位于
    `blog_word_mysqli.php` 和 `blog_word_pdo.php`）：


    ```

    $extract = $row[''first100''];

    // 查找摘要中最后一个空格的位置

    $lastSpace = strrpos($extract, '' '');

    // 使用 $lastSpace 设置新摘要的长度并添加 ...

    echo substr($extract, 0, $lastSpace) . ''... '';

    ```


    这样会产生如图 14-2 所示的更优雅的结果。它使用了 `strrpos()`，该函数用于查找一个字符或子字符串在另一个字符串中的最后一个位置。由于你要查找的是空格，第二个参数是一对引号，中间包含一个空格。结果存储在
    `$lastSpace` 中，并将其作为第三个参数传递给 `substr()`，从而在完整单词处结束摘要。最后，添加一个包含三个点和空格的字符串，并通过连接运算符（句点或点）将两者连接起来。


    ![A978-1-4842-0635-5_14_Fig2_HTML.jpg](img/A978-1-4842-0635-5_14_Fig2_HTML.jpg)


    图 14-2. 在完整单词处结束摘要会产生更优雅的结果


    **注意：** 不要混淆 `strrpos()`（获取字符或子字符串的最后一个位置）与 `strpos()`（获取第一个位置）。多出的“r”代表“反向”——`strrpos()`
    从字符串末尾开始搜索。

