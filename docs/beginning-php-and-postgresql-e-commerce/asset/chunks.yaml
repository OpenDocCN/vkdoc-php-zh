    or WinRar (`http://www.rarlabs.com`). Open the archive, and copy the contents
    of the `Smarty-2.X.Y/libs` directory from the archive to the folder you created
    earlier (`hatshop/libs/smarty`). You only need to copy the contents of the mentioned
    `libs` folder, nothing more.


    **3.** To operate correctly, Smarty needs three folders, which you need to create:
    `templates`, `templates_c`, and `configs`. Create a folder named `presentation`
    inside the `hatshop` directory, and in this folder create two folders named `templates`
    and `templates_c`. The `presentation` folder will contain all the presentation
    files.


    **4.** Create a folder named `include` in the `hatshop` folder. This will have
