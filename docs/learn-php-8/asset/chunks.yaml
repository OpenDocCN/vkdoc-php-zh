- fmt: 'Example [7-2](#394210_2_En_7_Chapter.xhtml#PC14) tests some of the possible
    scenarios of using the `dog_data` class. Notice the last line of code calls the
    destructor (to save the data). This is accomplished by setting the pointer to
    the object (`$tester`) to `NULL`, which releases the object. This will inform
    the garbage collector of the operating system that the object should be removed
    from memory. This will cause the destructor to execute, which will update the
    XML file and remove the object from the memory of the server.


    ## JSON Data


    Let us take a second to back up and look at the ability to read and write JSON
    data. Using the example code shown in this chapter, only the constructor and destructor
    will need to be adjusted when you use other forms of data besides XML. Accessing
    and using JSON data is even easier than using XML data.


    ```

    ...

    $json = file_get_contents($this->dog_data_JSON);

    $this->dogs_array = json_decode($json,TRUE);

    if ($this->dogs_array === null && json_last_error() !== JSON_ERROR_NONE)

    {

    throw new Exception("JSON error: " . json_last_error_msg());

    }

    ...

    ```


    In the constructor, after the `if else` structure that retrieves the location
    of the data from the `dog_application.xml` file, the multiple lines accessing
    and formatting the XML data can be replaced by the lines shown previously. The
    `json_decode` method (as shown previously) will attempt to format the data from
    the text file into the associate array format. If the data is not a valid JSON
    format, an exception is thrown passing the error message. Since the `Exception`
    class is used, the `dog_interface` program would log this information in the error
    log, email the support personnel, and display a general message to the users.


    ```

    $json = json_encode($this->dogs_array);

    file_put_contents($this->dog_data_JSON,$json);

    ```


    The complete code for the destructor requires only two lines. The `json_encode`
    method will convert the associate array data into JSON format. The `file_put_contents`
    method will then save the information to the proper location of the JSON file
    (`$this->dog_data_JSON`). No changes are required to any of the other methods
    in `dog_data`.


    ## MySQL and NoSQL Data with MySQL 8+


    This is a good time to give a brief example of adjustments we can make to the
    constructor and destructor methods to access and update database information.
    The current version of MySQL allows both the creation of MySQL and NoSQL data.


    *For information on installing the latest version of MySQL, visit* [*https://dev.mysql.com/doc/refman/8.0/en/installing.html*](https://dev.mysql.com/doc/refman/8.0/en/installing.html)*.*


    Whenever external data storage techniques are used, all security measures should
    be implemented to completely protect all data. All database systems include data
    security tools to validate information before it is stored.


    *For information on securing data within* *MySQL database structures* *, visit*
    [*https://dev.mysql.com/doc/refman/8.0/en/security.html*](https://dev.mysql.com/doc/refman/8.0/en/security.html)*.*


    ```

    $mysqli =mysqli_connect($server, $db_username, $db_password, $database);

    if (mysqli_connect_errno())

    {

    throw new Exception("MySQL connection error: " . mysqli_connect_error());

    }

    $sql="SELECT * FROM Dogs";

    $result=mysqli_query($con,$sql);

    If($result===null)

    {

    throw new Exception("No records retrieved from Database");

    }

    $this->dogs_array = mysqli_fetch_assoc($result);

    mysqli_free_result($result);

    mysqli_close($con);

    ```


    Most of the code required for the constructor method is associated to connecting,
    retrieving, and disconnecting from the database. The `mysqli_connect` method uses
    the server location (`$server`), database user ID (`$db_username`), database password
    (`$db_password`), and database name (`$database`) to connect to the database.
    If `mysqli_connect_errno` contains any errors, an `Exception` is thrown describing
    the error. If there are no errors, a SQL SELECT statement (`$sql`) is used to
    retrieve all the records from the `Dogs` table in the database. If no records
    are retrieved, another exception is thrown. If records are retrieved, the `mysqli_fetch_assoc`
    method will convert the data into an associate array. The `mysqli_free_result`
    statement releases the data from `$result`. The `mysqli_close` method closes access
    to the database.


    The destructor takes a little more coding. However, the looping is similar to
    saving the XML data.


    ```

    $mysqli = new mysqli($server, $db_username, $db_password, $database);

    if ($mysqli->connect_errno)

    {

    throw new Exception("MySQL connection error:" . $mysqli->connect_error);

    }

    If( (!$mysqli->query("DROP TABLE IF EXISTS Dogs") ||

    (!$mysqli->query("CREATE TABLE IF NOT EXISTS Dogs (dog_id CHAR(4), dog_name CHAR(20),
    dog_weight CHAR(3), dog_color CHAR(15), dog_breed CHAR(35)") )

    {

    throw new Exception("Dog table can''t be created or deleted. Error: " .

    $mysqli->error);

    }

    foreach ($this->dogs_array as $dogs=>$dogs_value) {

    foreach ($dogs_value as $dog => $dog_value)

    {

    $dog_id = $dog_value["dog_id"];

    $dog_name = $dog_value["dog_name"];

    $dog_weight = $dog_value["dog_weight"];

    $dog_color = $dog_value["dog_color"];

    $dog_breed = $dog_value["dog_breed"];

    If(!$mysqli->query("INSERT INTO Dogs(dog_id, dog_name,

    dog_weight, dog_color, dog_breed)

    VALUES (''$dog_id'', ''$dog_name'', ''$dog_weight'', ''$dog_color'', ''$dog_breed'')"))

    {

    throw new Exception("Dog Table Insert Error: " . $mysqli->error);

    }

    }

    }

    ...

    ```


    The destructor method attempts to connect to the database. If the connection is
    successful, the method removes any preexisting `Dogs` table and creates a new
    one with the required fields. (Note: It would probably be better to rename the
    old one and create a new one.) If the old table can be removed and the new table
    created, then the method attempts to insert rows into the table. The SQL `INSERT`
    statement places the values from `$dog_name`, `$dog_weight`, `$dog_color`, and
    `$dog_breed` into a row in the table. The `foreach` loops retrieve each row from
    the associate array to be placed into the table. If any of the inserts are not
    successful, an exception is thrown.


    *For information on creating and using MySQL Data Stores to save* *NoSQL data*
    *, visit* [*https://dev.mysql.com/doc/refman/8.0/en/document-store.html*](https://dev.mysql.com/doc/refman/8.0/en/document-store.html)*.*


    *   *Programming note—The Apache server must be properly configured, and MySQL
    must be properly installed to run this (or a similar) database example.* `$server`
    *must be set to the URL, “localhost”, or “127.0.0.1”.* `$db_username` *must be
    set to the user ID name to access the database (''root''* *if a user ID has not
    been configured).* `$db_password` *must be set to the database password (or* `''''`
    *if there is no password).* `$database` *must be set to the database name. There
    is a large variety of ways to access and manipulate databases in the* *PHP language*
    *.*


