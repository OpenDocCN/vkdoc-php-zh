    # 注意


    `phpMyAdmin` 的发布周期较为频繁，用户界面时常会出现细微变化，偶尔也会有较大改动。以下说明及配套截图基于 `phpMyAdmin 4.8.5`
    版本。虽然您所使用的版本可能与之存在差异，但基本操作流程应大致相同。


    1. 启动 `phpMyAdmin`，在主窗口顶部选择 `数据库` 选项卡。


    2. 在 `创建数据库` 下方的第一个字段中输入新数据库的名称（`phpsols`）。字段右侧的下拉菜单用于设置数据库的**排序规则**。排序规则决定了数据的排序方式。如下方截图所示，我安装环境中的默认设置为
    `latin1_swedish_ci`。这反映了 MySQL 的瑞典血统。英语使用相同的排序顺序。其中的 `ci` 表示排序不区分大小写。如果您使用的语言并非英语、瑞典语或芬兰语，请从下拉菜单中选择
    `utf8mb4_unicode_ci`。此选项几乎支持所有人类语言，并能避免多字节字符引发的问题。然后点击 `创建`。


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figa_HTML.jpg](img/332054_4_En_12_Figa_HTML.jpg)


    3. 屏幕上会短暂闪现在线确认数据库已创建成功的提示，随后出现的页面会引导您创建数据表：


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figb_HTML.jpg](img/332054_4_En_12_Figb_HTML.jpg)


    4. 在新数据库中创建数据表之前，建议先为其创建用户帐户。请保持 `phpMyAdmin` 处于打开状态，因为您将在下一节中继续使用它。


    ## 创建特定于数据库的用户帐户


    新安装的 MySQL 通常只有一个注册用户——名为 “root” 的超级用户帐户，它拥有对一切内容的完全控制权。（XAMPP 还会创建一个名为 “pma”
    的用户帐户，`phpMyAdmin` 会使用它来启用本书未涉及的高级功能。）root 用户*绝不应*用于除顶级管理（例如创建和删除数据库、创建用户帐户、导出和导入数据）之外的任何其他操作。每个独立的数据库都应至少拥有一个——最好是两个——权限有限的专用用户帐户。


    当您将数据库部署上线时，应授予用户所需的最少权限，并且不要给予更多。有四个重要的权限——均以对应的 SQL 命令命名：


    * `SELECT`：从数据库表中检索记录

    * `INSERT`：向数据库中插入记录

    * `UPDATE`：更改现有记录

    * `DELETE`：删除记录（但不删除数据表或数据库，后者对应的命令是 `DROP`）


    大多数情况下，访问者只需检索信息，因此 `psread` 用户帐户将仅拥有 `SELECT` 权限，属于只读帐户。然而，对于用户注册或站点管理，您则需要全部四个权限。这些权限将授予
    `pswrite` 帐户。


    ## 授予用户权限


    1. 在 `phpMyAdmin` 中，点击屏幕左上角的小房子图标返回主屏幕。然后点击 `用户帐户` 选项卡（在旧版 `phpMyAdmin` 中，它被称为
    `用户`）。


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figc_HTML.jpg](img/332054_4_En_12_Figc_HTML.jpg)


    2. 在 `用户帐户概览` 页面上，点击页面中部的 `添加用户帐户` 链接。


    3. 在打开的页面中，于 `用户名` 字段中输入 `pswrite`（或您想要创建的用户帐户名称）。从 `主机名` 下拉菜单中选择 `本地`。这会在旁边的字段中自动填入
    `localhost`。选择此选项允许 `pswrite` 用户仅从同一台计算机连接到 MySQL。然后在 `密码` 字段中输入密码，并在 `重新输入` 字段中再次输入以确认。

    '
- fmt: '**Note** In the example files for this book, I’ve used `0Ch@Nom1$u` as the
    password. MySQL passwords are case-sensitive.


    3.  Beneath the `Login Information` table are sections labeled `Database for user
    account` and `Global privileges`. Ignore both of them. Scroll down to the bottom
    of the page and click the `Go` button.


    4.  This presents you with confirmation that the user has been created and offers
    options to edit the user’s privileges. Click the `Database` button above `Edit
    privileges`:


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figd_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figd_HTML.jpg)


    1.  Under `Database-specific privileges`, select `phpsols` from the list (if necessary,
    activate the drop-down menu labeled `Add privileges on the following database(s))`
    and click `Go`.


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Fige_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Fige_HTML.jpg)


    Note MySQL has three default databases: `information_schema`, a read-only, virtual
    database that contains details of all other databases on the same server; `mysql`,
    which contains details of all user accounts and privileges; and `test`, which
    is empty. You should never edit the `mysql` database directly unless you’re sure
    what you’re doing.


    1.  The next screen allows you to set the privileges for this user on just the
    `phpsols` database. You want `pswrite` to have all four privileges listed earlier,
    so click the check boxes next to `SELECT`, `INSERT`, `UPDATE`, and `DELETE`.


    If you hover your mouse pointer over each option, phpMyAdmin displays a tooltip
    describing the option’s use, as shown. After selecting the four privileges, click
    `Go`.


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figf_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figf_HTML.jpg)


    Caution Many screens in phpMyAdmin have more than one `Go` button. Always click
    the button at the foot of or alongside the section with the options you want to
    set.


    1.  phpMyAdmin presents you with confirmation that the privileges have been updated
    for the `pswrite` user account; the page displays the `Database-specific privileges`
    table again, in case you need to change anything. Click the `User accounts` tab
    at the top of the page to return to the `User accounts overview`.


    2.  Click `Add user account` and repeat steps 3 through 8 to create a second user
    account called `psread`. This user will have much more restricted privileges,
    so when you get to step 7, check only the `SELECT` option. The password used for
    `psread` in the example files is `K1yoMizu^dera`.


    ## Creating a Database Table


    Now that you have a database and dedicated user accounts, you can begin creating
    tables. Let’s begin by creating a table to hold the details of images, as shown
    in Figure [12-1](#332054_4_En_12_Chapter.xhtml#Fig1) at the beginning of this
    chapter. Before you can start entering data, you need to define the table structure.
    This involves deciding the following:


    *   The name of the table

    *   How many columns it will have

    *   The name of each column

    *   What type of data will be stored in each column

    *   Whether the column must always have data in each field

    *   Which column contains the table’s primary key


    If you look at Figure [12-1](#332054_4_En_12_Chapter.xhtml#Fig1), you can see
    that the table contains three columns: `image_id` (primary key), `filename`, and
    `caption`. Because it contains details of images, that’s a good name to use for
    the table. There’s not much point in storing a filename without a caption, so
    every column must contain data. Great! Apart from the data type, all the decisions
    have been made. I’ll explain the data types as we go along.


    ### Defining the Images Table


    These instructions show how to define a table in phpMyAdmin. If you prefer to
    use Navicat or a different UI for MySQL, use the settings in Table [12-1](#332054_4_En_12_Chapter.xhtml#Tab1).


    **Table 12-1.** Settings for the `images` table'
