    Types of Filtering


    There are two ways we can filter out HTML tags from submitted data:


    • Define a *white list* of tags that users are allowed to use. We then strip out
    every other tag.


    • Define a *black list* of tags that are not allowed to be used. We then strip
    out only these tags and allow the rest.


    Whether you use a white list or a black list comes down to personal preference
    and how the system will be used in the future. I prefer the white list in this
    situation, since there are so many HTML tags and a white list allows you to fully
    control what can be used. For example, if a browser introduced a new tag called
    <doSomethingMalicious> (as an extreme example), a white list would automatically
    prevent the use of this, while a black list would allow it until we added it to
    the list.


    This is the white list of tags and attributes we will use:


    • Allow the <a>, <img>, <b>, <strong>, <em>, <i>, <ul>, <li>, <ol>, <p>, and <br>
    tags.


    • For the <a> tag, allow the href, target, and name attributes.


    • For the <img> tag, allow the src and alt attributes.


    This automatically rules out the use of any event attributes in tags (such as
    onmouseover or onclick).


    You could potentially choose to allow the style attribute, since you might not
    care how users choose to manipulate the styles and colors. However, if you’re
    going to display posts from a number of different users on a single page, you
    will want to be a bit fussier about how they are displayed.


    Implementing the cleanHtml() Method


    Now that we have defined which tags and attributes are acceptable, we must implement
    the cleanHtml() method in FormProcessor_BlogPost, which we created in Listing
    7-17.


    Thankfully, the Zend_Filter component of the Zend Framework provides a filter
    called Zend_Filter_StripTags, which gives us some flexibility in setting our tag
    and attribute requirements. We can either pass an array of allowed tags and an
    array of allowed attributes, or we can pass a single array where the key is the
    allowed tag and the element is an array of allowed attributes for that tag.


    Note, though, that there is a special case we must deal with: the href attribute
    value for hyperlinks. Browsers will execute inline JavaScript code if it begins
    with javascript:. The simplest test case for this is to create a link as follows:


    <a href="javascript:alert(''Oh no!'')">Open alert box</a> To deal with this special
    case, we will simply replace any occurrences of javascript: that occur within
    any tags. This can be achieved easily using preg_replace().


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch07CMP2 11/13/07 8:06 PM Page 246


    **246**


    C H A P T E R 7 ■ B U I L D I N G T H E B L O G G I N G S YS T E M


    ■**Caution** Be aware of tags similar to <a> that aren’t in our white list, such
    as <area> (used in image maps), which also define an href attribute. Web browsers
    will also allow JavaScript to be embedded using javascript: so you must also filter
    these tags if you decide to use them.


    Listing 7-21 shows the code for cleanHtml(), which defines the list of allowed
    tags and attributes we covered above, and then filters the passed-in HTML and
    returns it to be inserted into the database. The highlighted code should be included
    in the BlogPost.php file in the


    ./include/FormProcessor directory.


    **Listing 7-21.** *Using Zend_Filter_StripTags to Clean Submitted HTML (BlogPost.php)*


    <?php


    class FormProcessor_BlogPost extends FormProcessor


    {


    **static $tags = array(**


    **''a'' => array(''href'', ''target'', ''name''),**


    **''img'' => array(''src'', ''alt''),**


    **''b'' => array(),**


    **''strong'' => array(),**


    **''em'' => array(),**


    **''i'' => array(),**


    **''ul'' => array(),**


    **''li'' => array(),**


    **''ol'' => array(),**


    **''p'' => array(),**


    **''br'' => array()**


    **);**


    // ... other code


    protected function cleanHtml($html)


    {


    **$chain = new Zend_Filter();**


    **$chain->addFilter(new Zend_Filter_StripTags(self::$tags));**


    **$chain->addFilter(new Zend_Filter_StringTrim());**


    **$html = $chain->filter($html);**


    **$tmp = $html;**


    **while (1) {**


    **// Try and replace an occurrence of javascript:**


    **$html = preg_replace(''/(<[^>]*)javascript:([^>]*>)/i'',**


    **''$1$2'',**


    **$html);**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch07CMP2 11/13/07 8:06 PM Page 247


    C H A P T E R 7 ■ B U I L D I N G T H E B L O G G I N G S YS T E M


    **247**


    **// If nothing changed this iteration then break the loop**


    **if ($html == $tmp)**


    **break;**


    **$tmp = $html;**


    **}**


    return $html;


    }


    }


    ?>


    The regular expression in Listing 7-21 looks for an occurrence of the string javascript:
    within the < and > characters (thereby allowing the term to be written in the
    normal blog post text). Whatever is matched before javascript: in the string is
    held in $1 for the replacement, and the text afterwards is held in $2.


    Because this pattern only replaces one instance of javascript: at a time, we need
    to keep looping until all instances have been found. We do this by checking whether
    the string returned from preg_replace() is different from the one returned on
    the previous call. If these strings are the same, all instances of javascript:
    have been removed.


    Consider a string such as the following:


    <a href="javascript:alert(''Oh no!'')">javascript: is bad!</a> After this string
    is processed by preg_replace(), it becomes


    <a href="alert(''Oh no!'')">javascript: is bad!</a>


    This version of the string is perfectly safe and won’t result in any JavaScript
    being executed when the link is clicked (the link however, is invalid, and will
    likely result in an error).


