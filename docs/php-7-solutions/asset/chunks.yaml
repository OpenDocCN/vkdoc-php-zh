- fmt: '# Caution


    **Caution**: MySQL timestamps use the same format as `DATETIME`, meaning they
    are incompatible with Unix and PHP timestamps, which are based on the number of
    seconds since January 1, 1970. Don’t mix them.


    ## Storing Predefined Lists


    MySQL lets you store two types of predefined lists that could be regarded as the
    database equivalents of radio button and check-box states:


    - `ENUM`: This column type stores a single choice from a predefined list, such
    as "yes, no, don’t know" or "100–110 V, 220–240 V." The maximum number of items
    that can be stored in the predefined list is a mind-boggling 65,535—some radio
    button group!


    - `SET`: This column type stores zero or more choices from a predefined list.
    The list can hold a maximum of 64 choices.


    While `ENUM` is quite useful, `SET` tends to be less so, mainly because it violates
    the principle of storing only one piece of information in each field. The type
    of situation in which it can be useful is when recording optional extras on a
    car or multiple choices in a survey.


    ## Storing Binary Data


    Storing binary data, such as images, isn’t a good idea. It bloats your database,
    and you can’t display images directly from a database. However, the following
    column types are designed for binary data:


    - `TINYBLOB`: Up to 255 bytes

    - `BLOB`: Up to 64 KB

    - `MEDIUMBLOB`: Up to 16 MB

    - `LONGBLOB`: Up to 4 GB


    With such whimsical names, it’s a bit of a letdown to discover that `BLOB` stands
    for **binary large object**.


    ## Chapter Review


    Much of this chapter has been devoted to theory, explaining the basic principles
    of good database design. Instead of putting all the information you want to store
    in a single, large table like a spreadsheet, you need to plan the structure of
    your database carefully, moving repetitive information into separate tables. As
    long as you give each record in a table a unique identifier—its primary key—you
    can keep track of information and link it to related records in other tables through
    the use of foreign keys. The concept of using foreign keys can be difficult to
    understand at the outset, but it should become clearer by the end of this book.


    You have also learned how to create MySQL user accounts with limited privileges,
    as well as how to define a table and import and export data using an SQL file.
    In the next chapter, you’ll use PHP to connect to the `phpsols` database in order
    to display the data stored in the `images` table.


    ---


    # 13. Connecting to a Database with PHP and SQL


    PHP 7 offers two ways to connect to and interact with a MySQL database: MySQL
    Improved (`MySQLi`) and PHP Data Objects (`PDO`). Which one you choose is an important
    decision, because they use incompatible code. You can’t mix them in the same database
    connection. It’s also important not to confuse `MySQLi` with the original MySQL
    extension, which is no longer supported in PHP 7. In most cases, the only difference
    in the names of `MySQLi` functions is the addition of the letter *I* (e.g., `mysqli_query()`
    instead of `mysql_query()`). However, the order of arguments is usually different,
    so converting an old script involves more than just inserting an *I* into the
    function name.


    As its name suggests, `MySQLi` is designed specifically to work with MySQL. It’s
    also fully compatible with MariaDB. `PDO`, on the other hand, is database system-neutral.
    In theory, at least, you can switch your web site from MySQL to Microsoft SQL
    Server or a different database system by changing only a couple of lines of PHP
    code. In practice, you normally need to rewrite at least some of your SQL queries
    because each database vendor adds custom functions on top of the standard SQL.


    My personal preference is to use `PDO`; but for the sake of completeness, the
    remaining chapters cover both `MySQLi` and `PDO`. If you want to concentrate on
    only one of them, just ignore the sections that relate to the other. Although
    you use PHP to connect to the database and store any results, the database queries
    need to be written in SQL. This chapter teaches you the basics of retrieving information
    stored in a table.


    In this chapter, we’ll cover the following:


    - Connecting to MySQL and MariaDB with `MySQLi` and `PDO`

    - Counting the number of records in a table

    - Using `SELECT` queries to retrieve data and display it in a web page

    - Keeping data secure with prepared statements and other techniques


    ## Checking Your Remote Server Setup


    `XAMPP` and `MAMP` support both `MySQLi` and `PDO`, but you need to check the
    PHP configuration of your remote server to verify the degree of support it offers.
    Run `phpinfo()` on your remote server, scroll down the configuration page, and
    look for the following sections. They’re listed alphabetically, so you’ll need
    to scroll down a long way to find them.


    ![images/332054_4_En_13_Chapter/332054_4_En_13_Figa_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figa_HTML.jpg)


    All hosting companies should have the first section (`mysqli`). If only `mysql`
    (without the final *I*) is listed, you’re on a server that’s dangerously out of
    date. Get your hosting company to move you to a server running an up-to-date version
    of PHP 7.x as soon as possible (you can check which versions of PHP are currently
    supported at [https://php.net/supported-versions.php](https://php.net/supported-versions.php)).
    If you plan to use `PDO`, you not only need to check that `PDO` is enabled, but
    you must also make sure that `pdo_mysql` is listed. `PDO` requires a different
    driver for each type of database.


    ## How PHP Communicates with a Database


    Regardless of whether you use `MySQLi` or `PDO`, the process always follows this
    sequence:


    1. Connect to the database using the hostname, username, password, and database
    name.

    2. Prepare an SQL query.

    3. Execute the query and save the result.

    4. Extract the data from the result (usually with a loop).'
