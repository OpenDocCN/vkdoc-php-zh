  \ 网站投票示例\n\n```php\n<?php\nsetTitle(\"PHP/MySQL 网站投票示例\");\n$pageData->setContent(\"\
  目前一切正常！\");\n$pageData->appendContent(\"...此处放置内容。\");\nrequire \"views/page.php\"\
  ;\necho $page;\n?>\n```\n\n**列表 6-1** `index.php`\n\n此 `index` 程序仅对先前见过的原始 `privateindex`\
