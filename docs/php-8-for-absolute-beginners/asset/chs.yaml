  3.  更新博客应用程序，使其能够删除系统中未使用的管理员用户 ID。\n4.  更新博客应用程序的管理员用户验证系统，将登录尝试次数限制为四次。四次之后，系统应在十分钟内拒绝来自同一用户\
  \ ID 的所有尝试。这可以通过创建另一个会话变量来实现，该变量在四次尝试失败后记录上次尝试时间。十分钟后清除该变量。这是 IT 行业中常见的授权要求。\n\n"
- "# 10. 数据仪表盘与游戏\n\n## 目标\n\n完成本章后，你将能够：\n\n*   将数据从一种数据类型转换为另一种数据类型\n*   使用 PHP\
  \ 函数 `json_encode()` 创建 JSON 数据\n*   使用 PHP 函数 `fputcsv()` 创建 CSV 数据\n*   使用 SQL\
  \ 语句确定数据库名称、表名和列名\n*   使用 SQL 语句判断某列的值是否为数字\n*   将数据库表转换为 PHP 数组\n*   使用 PHP 函数\
  \ `fopen()` 读写文件\n*   使用 PHP 函数 `fgetcsv()` 将 CSV 文件转换为数组\n*   使用 PHP 函数 `file_get_contents()`\
  \ 一次性检索文件的所有内容\n*   使用 PHP 函数 `json_decode()` 将 JSON 文件转换为数组\n*   使用开源类 `SIMPLEXLSX`\
  \ 从 Microsoft Excel 电子表格中读取数据到数组\n*   使用 PHP 函数 `explode()` 根据分隔符将字符串拆分为数组\n*  \
  \ 使用 PHP 函数 `is_numeric()` 判断一个值是否包含数字\n*   使用 PHP 函数 `is_string()` 判断一个值是否为字符串\n\
  *   使用 PHP `continue` 语句跳过循环的一次迭代\n*   根据 PHP 数组创建 *Google 数据表*（Google Data Table）\n\
  *   使用 JavaScript 和 *Google 图表库*（Google Charts Library）创建数据仪表盘\n*   使用二维数组创建跳棋游戏的逻辑\n\
  *   使用 `switch` 控制结构根据单个变量确定多种结果\n\n在这最后一章中，我们将探讨 PHP 除控制标准网站交互性之外还能完成的其他任务。尽管 PHP\
  \ 并非以*数据分析*和游戏开发工具而闻名，但我们将证明它完全可以用于此目的。让我们先简要了解一下数据分析，并探索如何显示仪表盘及相关图表。\n\n\n\n##\
  \ 设置数据仪表盘\n\n*数据挖掘*和*数据收集*对于中型和大型企业都至关重要。快速分析数据的能力能对任何公司的利润产生重大影响。公司必须能够利用现有信息（如销售数据）来确定最佳策略，从而获得成功。数据可以从多种来源收集，包括内部、外部（竞争对手）、环境（某个地区经济状况）以及通过政府渠道。合并和对比这些信息的能力至关重要。\n\
  \nPython 编程语言的流行，部分归因于该语言中可用于高效处理和显示数据的库的数量。然而，其他语言也可以使用一些技术来实现类似的目标。其中一个工具是 *Google\
  \ Charts*。\n\n`Google Charts` 是专门设计用来与 HTML5 网页交互的 JavaScript 类。这为图表与 PHP 交互提供了天然的能力，因为\
  \ PHP、HTML 和 JavaScript 协同工作得很好。图表从*数据表*（特殊类型的数组）中检索信息。因此，任何能够将数据显示到数组中的数据源都可以作为\
  \ `Google Chart` 的提供者。\n\n我们将构建一个*数据仪表盘*来显示我们的图表。数据仪表盘就是一个以多种格式显示数据的屏幕（网页）。Google\
  \ 提供了超过 30 种不同类型的*图表*，可以放置在仪表盘中。为了演示使用不同数据源的能力，我们的示例将允许用户决定信息的来源。我们将通过允许从数据库表、*JSON\
  \ 文件*、*CSV 文件*或 *Microsoft Excel 工作表*中拉取数据来展示这一能力。然后，这些信息将在仪表盘内的多个图表中显示。\n\n在开始任务之前，让我们讨论一些流程。`Google\
  \ Dashboard` 是使用 `google.visualization.Dashboard Classes` 定义的。`Dashboard` 实例使用一个包含待显示数据的数据表，并将这些数据分发给属于该仪表盘的所有图表。*控件*为用户提供了与数据交互以及更改图表中使用数据子集的能力。这些控件是常见的组件，如选择器、滑块和自动完成器，用户可以轻松操作它们。\n\
  \n现在我们大致了解了仪表盘中可以包含什么，让我们看看实现目标所需的步骤。\n\n- *HTML 仪表盘骨架*：我们将设计一个 HTML 框架，用于定位和容纳要在仪表盘中显示的图表。\n\
  - *库文件*：我们必须加载两个 Google 库（一个 *Google AJAX API* 和一个 *Google Visualization Control\
  \ Package*）来访问仪表盘和图表。\n- *数据*：我们将从多个来源检索数据，允许用户选择在仪表盘内显示结果时要使用的数据源。选定的数据将被放入一个二维数组中，该数组将被转换为`Google\
  \ Data Table`，以便仪表盘内的图表轻松使用。\n- *仪表盘*：我们将使用 *Google Dashboard 类*，通过创建它的一个实例（对象）并传递一个对\
  \ HTML 中仪表盘位置（div 标签位置）的引用来实现。\n- *控件/图表*：我们将创建供用户操作的控件，以及将在仪表盘内显示数据的图表。\n- *依赖关系*：我们将把仪表盘和图表绑定在一起，当用户操作控件时，显示的数据会自动更新。\n\
  - *显示仪表盘*：我们将绘制仪表盘并将数据传递给仪表盘，数据随后会在图表中显示。\n- *编程*：最后，我们将包含额外的编程代码，以便在用户操作控件时更新仪表盘内的图表。\n\
  \n首先，我们需要开发能够检索信息的程序，这取决于用户选择的数据类型。请记住，成功开发程序的关键是不要重复造轮子。我们将使用一些现有的开源代码，使我们的程序尽可能可靠和简单。\n\
  \n### 收集 Microsoft Excel、CSV、JSON 和数据库数据\n\n本章附带的代码包含几个数据文件（`data.csv`、`data.json`\
  \ 和 `datatest.xlsx`）。提供的 Excel 电子表格用于设计我们测试所用的数据格式和内容。CSV 文件、JSON 文件和数据库表是通过提取电子表格数据并针对每种数据类型重新格式化而创建的。虽然这些程序不会在生产中使用，但它们为我们提供了如何从\
  \ Excel 电子表格中检索信息并将其重新格式化为其他数据格式的示例。\n\n```\nrows();\n$file = fopen(\"data.csv\"\
  ,\"w\");\nforeach ($values as $value) {\nfputcsv($file, $value);\n}\necho \"data.csv\
  \ created\";\nfclose($file);\n} else {\necho SimpleXLSX::parseError();\n}\n?>\n\
  清单 10-1\ncreateCSV.php\n```\n\n使用 PHP 访问 Microsoft Excel 数据的一种流行方法是使用 GitHub 上提供的开源\
  \ *SimpleXLSX 类*：[`https://github.com/shuchkin/simplexlsx`](https://github.com/shuchkin/simplexlsx)。\n\
  \n可以从提供的链接下载此类，并在解压缩后将其放置在 `ch10` 文件夹中。在网页位置和类本身的注释中都提供了代码示例。为方便起见，这些文件已包含在出版商网站的\
  \ `ch10` 文件夹中。\n\n```\nuse Shuchkin\\SimpleXLSX;\n```\n\n该类包含一个*命名空间*（这将确保它不会与其他现有类冲突）。`use`\
  \ 语句声明，所使用的任何类或函数都将通过命名空间（`Shuchkin`）和类名（`SimpleXLSX`）进行访问。\n\n```\nrequire_once\
  \ __DIR__.'/simplexlsx-master/src/SimpleXLSX.php';\n```\n\n`require_once` 语句包含了一个\
  \ PHP 常量 `__DIR__`，它返回当前目录位置。因此，该类是从当前目录下的 `simplexlsx_master` 源代码（`src`）目录中导入的。\n\
  \n```\nif ( $xlsx = SimpleXLSX::parse('testdata.xlsx') ) {\n$values = $xlsx->rows();\n\
  ```\n\n`SimpleXLSX` 类的 `parse()` 方法将从 Excel 电子表格中检索所有数据。这些数据包含的内容不仅仅是单元格中的值。由于我们只使用存储在单元格中的值，我们可以使用\
  \ `SimpleXLSX` 函数 `rows()` 来检索所有行的数据。该函数创建一个仅包含数据的二维数组，我们将其命名为 `$values`。\n\n```\n\
  $file = fopen(\"data.csv\",\"w\");\nforeach ($values as $value) {\nfputcsv($file,\
  \ $value);\n}\necho \"data.csv created\";\nfclose($file);\n```\n\n使用 PHP 函数 `fopen()`，我们可以创建一个新文件（`data.csv`）并声明我们要写入（`w`）该文件。`foreach`\
  \ 循环现在将遍历 `$values` 数组中的每个数据项。PHP 函数 `fputcsv()` 将以逗号分隔的格式将信息传递到文件中。最后，一旦所有信息都写入完毕，使用\
  \ `fclose()` 关闭文件。我们仅用了几行代码就改变了数据的格式！\n\n**注意**\n\n访问 [`www.php.net/manual/en/function.fopen.php`](https://www.php.net/manual/en/function.fopen.php)\
  \ 获取关于 `fopen()` 的更多信息。访问 [`www.php.net/manual/en/function.fputcsv.php`](https://www.php.net/manual/en/function.fputcsv.php)\
  \ 获取关于 `fputcsv()` 的更多信息。\n\n```\nrows());\nfile_put_contents(\"data.json\", $netJSON);\n\
  echo \"data.json created\";\n} else {\necho SimpleXLSX::parseError();\n}\n?>\n清单\
