    implement this as a separate componentized template named departments_list made
    up of two files: the Smarty design template (templates/departments_list.tpl) and
    the Smarty plugin file (smarty_plugins/function.load_departments_list.php). An
    additional helper class called DepartmentsList will also be used. You’ll then
    just include this componentized template in the main Smarty template (templates/index.tpl).


    **Using Smarty Plugins**


    The Smarty plugin is the Smarty technology we’ll use to implement the logic behind
    Smarty design template files (with the .tpl extension). This is not the only way
    to store the logic behind a Smarty design template, but it’s the way the Smarty
    documentation recommends at http://smarty.php.net/manual/en/tips.componentized.templates.php.


    For the departments list, the Smarty plugin file is function.load_departments_list.php,
    which contains the smarty_function_load_departments_list function that loads the
    list of departments from the database. The list is loaded into Smarty variables
    that are read from the Smarty design template file (departments_list.tpl) that
    generates the HTML output.


    Smarty plugin files and functions must follow strict naming conventions to be
    located by Smarty. Smarty plugin files must be named as type.name.php (in our
    case, function.


    load_departments_list.php), and the functions inside them must be named as smarty_type_name
    (in our case, smarty_function_load_departments_list). The official page for Smarty
    plugins naming conventions is http://smarty.php.net/manual/en/plugins.naming.'
  trans: "\n默认情况下，如果你没有向 `trigger_error` 指定要生成的错误类型，会生成一条 `E_USER_NOTICE` 消息，这不会干扰请求的正常执行（错误最终会被记录，但后续执行会正常继续）。\n\
    \n`DatabaseHandler` 类中的功能旨在供其他业务层类（例如 `Catalog`）使用。目前，`Catalog` 只包含一个方法：`GetDepartments`。\n\
    \n```\n// 用于读取产品目录信息的业务层类\nclass Catalog\n{\n    // 检索所有部门\n    public static\
    \ function GetDepartments()\n    {\n        // 构建 SQL 查询\n        $sql = 'SELECT\
    \ * FROM catalog_get_departments_list();';\n\n        // 使用 PDO 特定功能预处理语句\n  \
    \      $result = DatabaseHandler::Prepare($sql);\n\n        // 执行查询并返回结果\n   \
    \     return DatabaseHandler::GetAll($result);\n    }\n}\n```\n\n由于它依赖于你已经包含在\
    \ `DatabaseHandler` 类和已有数据库函数中的功能，`Catalog` 中的代码非常简单明了。`GetDepartments` 方法将从表示层调用，表示层会向访问者显示返回的数据。它首先准备\
    \ SQL 查询（你之前已经了解了准备 SQL 语句的优势），然后调用相应的 `DatabaseHandler` 方法来执行查询。在这个例子中，我们调用 `GetAll`\
    \ 来检索部门列表。\n\n目前，数据库连接在 `index.php` 开始处理时打开，并在结束时关闭。在此文件的一次迭代中发生的所有数据库操作都将通过此连接完成。\n\
    \n## 显示部门列表\n\n既然其他层已经就绪，你所要做的就是创建表示层部分——这是我们从一开始就瞄准的最终目标。如本章开头所示，当站点在浏览器中加载时，部门列表需要看起来像图\
    \ 3-14。\n\n**图 3-14.** *带有动态生成部门列表的 HatShop*\n\n你将其实现为一个名为 `departments_list`\
    \ 的独立组件化模板，由两个文件组成：Smarty 设计模板（`templates/departments_list.tpl`）和 Smarty 插件文件（`smarty_plugins/function.load_departments_list.php`）。还将使用一个名为\
    \ `DepartmentsList` 的附加辅助类。然后，你只需将此组件化模板包含到主 Smarty 模板（`templates/index.tpl`）中即可。\n\
    \n### 使用 Smarty 插件\n\nSmarty 插件是我们用来实现 Smarty 设计模板文件（扩展名为 `.tpl`）背后逻辑的 Smarty\
    \ 技术。这不是存储 Smarty 设计模板背后逻辑的唯一方法，但这是 Smarty 文档在 <http://smarty.php.net/manual/en/tips.componentized.templates.php>\
    \ 推荐的方式。\n\n对于部门列表，Smarty 插件文件是 `function.load_departments_list.php`，其中包含 `smarty_function_load_departments_list`\
    \ 函数，该函数从数据库加载部门列表。该列表被加载到 Smarty 变量中，这些变量由生成 HTML 输出的 Smarty 设计模板文件（`departments_list.tpl`）读取。\n\
    \nSmarty 插件文件和函数必须遵循严格的命名约定，以便 Smarty 能够定位它们。Smarty 插件文件必须命名为 `type.name.php`（在我们的例子中是\
    \ `function.load_departments_list.php`），并且其中的函数必须命名为 `smarty_type_name`（在我们的例子中是\
    \ `smarty_function_load_departments_list`）。Smarty 插件命名约定的官方页面是 <http://smarty.php.net/manual/en/plugins.naming>。\n"
- fmt: "`conventions.php`。您可以在 http://smarty.php.net/manual/en/plugins.php 了解更多关于\
    \ Smarty 插件的信息。\n\n将 Smarty 插件文件放置到位后，您可以在 Smarty 设计模板文件（`departments_list.tpl`）中通过如下一行代码引用它：\n\
    \n```\n{load_departments_list assign=\"departments_list\"}\n```\n\n在遵守正确命名约定的前提下，这一行代码足以让\
    \ Smarty 加载插件文件并执行加载部门列表的函数。之后，Smarty 设计模板文件可以像这样访问由插件函数填充的变量：\n\n```\n{$departments_list->mDepartments[i].name}\n\
    ```\n\n在实际编写组件化模板之前，您还需要了解一个小细节。\n\n**练习：创建 departments_list 组件化模板**\n\n1. 打开\
    \ `hatshop` 文件夹中的 `hatshop.css` 文件，并添加以下代码清单所示的样式。\n\n这些样式定义了部门名称在部门列表中不同状态下的外观：未选中、鼠标悬停（未选中）以及选中时。\n\
    \n```css\n.left_box p\n{\n    color: #ffffff;\n    font-family: arial, tahoma,\
    \ verdana;\n    font-size: 12px;\n    font-weight: bold;\n    margin: 0px 0px\
    \ 5px 0px;\n    padding: 2px 0px 2px 12px;\n}\n\n#departments_box\n{\n    position:\
    \ relative;\n    border: 1px solid #30b86e;\n}\n\n#departments_box p\n{\n    background:\
    \ #30b86e;\n}\n\na\n{\n    color: #a6a6a6;\n    font-family: verdana, arial, tahoma;\n\
    \    font-size: 10px;\n    font-weight: bold;\n    line-height: 20px;\n    text-decoration:\
    \ none;\n}\n\na:hover\n{\n    color: #000000;\n}\n\na.selected\n{\n    color:\
    \ #000000;\n    text-decoration: underline;\n}\n\nol\n{\n    list-style-type:\
    \ none;\n    margin: 0px 5px;\n    padding: 0px;\n}\n```\n\n2. 编辑 `presentation/page.php`\
    \ 文件，并向 `page` 类的构造函数中添加以下两行代码。这两行代码配置了 Smarty 使用的插件文件夹。第一个用于内部 Smarty 插件，第二个指定了您将创建的、用于存放为\
    \ HatShop 编写的插件的 `smarty_plugins` 文件夹。\n\n```php\n/* Class that extends Smarty,\
    \ used to process and display Smarty files */\nclass Page extends Smarty\n{\n\
    \    // Class constructor\n    public function __construct()\n    {\n        //\
    \ Call Smarty's constructor\n        parent::Smarty();\n\n        // Change the\
    \ default template directories\n        $this->template_dir = TEMPLATE_DIR;\n\
    \        $this->compile_dir = COMPILE_DIR;\n        $this->config_dir = CONFIG_DIR;\n\
    \n        $this->plugins_dir[0] = SMARTY_DIR . 'plugins';\n        $this->plugins_dir[1]\
    \ = PRESENTATION_DIR . 'smarty_plugins';\n    }\n}\n```\n\n3. 现在，为 `departments_list`\
    \ 组件化模板创建 Smarty 模板文件。在 `presentation/templates/departments_list.tpl` 中写入以下代码：\n\
    \n```smarty\n{* departments_list.tpl *}\n{load_departments_list assign=\"departments_list\"\
    }\n\n{* Start departments list *}\n<div class=\"left_box\" id=\"departments_box\"\
    >\n<p>Choose a Department</p>\n<ol>\n\n{* Loop through the list of departments\
    \ *}\n{section name=i loop=$departments_list->mDepartments}\n{assign var=selected_d\
    \ value=\"\"}\n\n{* Verify if the department is selected to decide what CSS style\
    \ to use *}\n{if ($departments_list->mSelectedDepartment ==\n$departments_list->mDepartments[i].department_id)}\n\
    {assign var=selected_d value=\"class=\\\"selected\\\"\"}\n{/if}\n\n<li>\n{* Generate\
    \ a link for a new department in the list *}\n<a {$selected_d}\nhref=\"{$departments_list->mDepartments[i].link|escape:\"\
    html\"}\">\n» {$departments_list->mDepartments[i].name}\n</a>\n</li>\n{/section}\n\
    \n</ol>\n</div>\n{* End departments list *}\n```\n\n4. 在 `presentation` 文件夹中创建一个名为\
    \ `smarty_plugins` 的文件夹。这将存放 Smarty 插件文件。\n\n5. 在 `smarty_plugins` 文件夹中，创建一个名为\
    \ `function.load_departments_list.php` 的文件，并添加以下代码：\n\n```php\n<?php\n// Plugin\
    \ functions inside plugin files must be named: smarty_type_name\nfunction smarty_function_load_departments_list($params,\
    \ $smarty)\n{\n    // Create DepartmentsList object\n    $departments_list = new\
    \ DepartmentsList();\n    $departments_list->init();\n\n    // Assign template\
    \ variable\n    $smarty->assign($params['assign'], $departments_list);\n}\n\n\
    // Manages the departments list\nclass DepartmentsList\n{\n    /* Public variables\
    \ available in departments_list.tpl Smarty template */\n    public $mDepartments;\n\
    \    public $mSelectedDepartment;\n\n    // Constructor reads query string parameter\n\
    \    public function __construct()\n    {\n        /* If DepartmentID exists in\
    \ the query string, we're visiting a department */\n        if (isset ($_GET['DepartmentID']))\n\
    \            $this->mSelectedDepartment = (int)$_GET['DepartmentID'];\n      \
    \  else\n            $this->mSelectedDepartment = -1;\n    }\n\n    /* Calls business\
    \ tier method to read departments list and create their links */\n    public function\
    \ init()\n    {\n        // Get the list of departments from the business tier\n\
    \        $this->mDepartments = Catalog::GetDepartments();\n\n        // Create\
    \ the department links\n        for ($i = 0; $i < count($this->mDepartments);\
    \ $i++)\n            $this->mDepartments[$i]['link'] =\n                'index.php?DepartmentID='\
    \ .\n                $this->mDepartments[$i]['department_id'];\n    }\n}\n?>\n\
    ```\n\n6. 修改 `include/app_top.php` 文件，包含对 `Catalog` 业务层类的引用：\n\n```php\n<?php\n\
    // Include utility files\nrequire_once 'include/config.php';\nrequire_once BUSINESS_DIR\
    \ . 'error_handler.php';\n\n// Sets the error handler\nErrorHandler::SetHandler();\n\
    \n// Load the page template\nrequire_once PRESENTATION_DIR . 'page.php';\n\n//\
    \ Load the database handler\nrequire_once BUSINESS_DIR . 'database_handler.php';\n\
    \n// Load Business Tier\nrequire_once BUSINESS_DIR . 'catalog.php';\n?>\n```\n\
    \n7. 在 `presentation/templates/index.tpl` 中进行以下修改，以加载新创建的 `departments_list` 组件化模板。查找以下代码：\n\
    \n```html\n<div class=\"left_box\">\nPlace list of departments here\n</div>\n\
    ```\n\n并将其替换为：\n\n```smarty\n{include file=\"departments_list.tpl\"}\n```\n\n\
    8. 通过访问 `http://localhost/hatshop/index.php`（参见图 3-14），在您喜欢的浏览器中检查工作结果。点击部门或将鼠标悬停在链接上，看看会发生什么。\n\
    \n> **注意** 如果没有获得预期的输出，请确保机器配置正确，并且所有必需的 PHP 模块（如 PDO）均已成功加载。许多错误会记录在 Apache 错误日志文件中（默认路径为\
    \ `Apache2/logs/error.log`）。\n\n**工作原理：departments_list Smarty 模板**\n\n如果页面从一开始就按预期工作，那么您无疑是一位幸运的程序员！大多数情况下，错误是由于拼写错误引起的，因此请注意检查！数据库访问问题也很常见，请确保像第\
    \ 2 章所示那样正确配置了 `hatshop` 数据库和 `hatshopadmin` 用户。无论如何，我们很幸运拥有良好的错误报告机制，如果出现问题，它会显示详细的错误报告。\n\
    \n图 3-15 显示了我错误地输入 `config.php` 中的数据库密码时收到的错误消息。\n\n**图 3-15.** *第 2 章中编写的错误处理代码有助于调试。*"
