    \ constant (optional)\n\nOnce you have created a `DatePeriod` object, you can\
    \ display the recurring dates in a `foreach` loop using the `DateTime::format()`\
    \ method.\n\nThe code in `date_interval_04.php` displays the second Tuesday of\
    \ each month in 2015:\n\n```\n$start = new DateTime('12/31/2014');\n$interval\
    \ = DateInterval::createFromDateString('second Tuesday of next month');\n$period\
    \ = new DatePeriod($start, $interval, 12, DatePeriod::EXCLUDE_START_DATE);\nforeach\
    \ ($period as $date) {\n    echo $date->format('l, F jS, Y') . '<br>';\n}\n```\n\
    \nIt produces the output shown in Figure [14-11](#A978-1-4842-0635-5_14_Chapter.html#Fig11).\n\
    \n![A978-1-4842-0635-5_14_Fig11_HTML.jpg](A978-1-4842-0635-5_14_Fig11_HTML.jpg)\n\
