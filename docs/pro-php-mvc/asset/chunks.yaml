    **Chapter 5**


    **Caching**


    Often, when dealing with large amounts of data, we run into performance bottlenecks.
    These can happen for any number of reasons, and can mostly be avoided by good
    *caching*. If you are wondering what I mean by *caching*, we’ll look at an example
    in a moment.


    Goals


    • We should identify the need for using caching, in the first place. We will not
    be able to realize the full potential of caching unless we understand the problems
    that it solves.


    • We need to learn how to access *Memcached* servers, which we will use to store
    cached data. This requires us writing the classes to interact with a Memcached
    server.


    Performance Bottlenecks


    Imagine a social network, where any user can have a number of friends. If a list
    of these friends were to be displayed on a web page, with all their relevant details,
    that page would have to make a database call to retrieve the friend records from
    the database. Now imagine that list of friends was shown on every page on the
    web site.


    Now we’re talking about at least one database query for each page of the web site.
    Factor in thousands of users, who also have their friends lists displayed, and
    what you get is a lot of data.


    In any application where growth or demand exceeds resources, this kind of data
    requirement can easily bring the application to its knees. So how could we employ
    caching to ease the stress on the database?


    We could easily cache the list of friends, the very first time it is retrieved
    form the database. This means the web site will not need to make frequent, repeated
    requests for the same data. Instead of fetching the same data from the database
    every time we needed it, we could first check whether the data is stored in the
    cache.


