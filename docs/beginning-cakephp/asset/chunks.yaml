- fmt: "# 第6章 自定义视图\n\n**注意** *模型函数*（无论是在模型类中编写的函数，还是存储在模型文件中的自定义函数）与其他函数（例如控制器动作）之间的区别在于，它们始终通过模型执行。这意味着，要启动一个模型函数，必须始终通过模型类来执行。在本例中，`Post`模型保存数据，因此模型函数的名称为`$this->Post->save()`，而不仅仅是`$this->save()`。其他模型函数（如`read()`和`find()`）也将始终通过指定的模型以类似方式运行。因此，语法为`$this`后跟模型，后跟函数，函数的参数放在括号中。\n\
    \n`create()`函数在表中插入一条新记录。由于此模型函数来自指定的模型，它将插入到该模型中。在清单6-3的第3行，`create()`函数是从`Post`模型调用的，因此新行将插入到`posts`表中。在`create()`函数之后立即运行`save()`函数将把传递给保存的任何内容传播到新行中。清单6-3中的第4行发送了预先格式化的`$this->data`数组。`save()`函数已经构建为可以解析并保存该数组，因此无需其他数据处理。\n\
    \n简而言之，添加新记录的第一步是使用`create()`模型函数创建新行，第二步是通过`save()`模型函数传递`$this->data`来保存它。烘焙的`Add`动作不仅通过检查过程中的错误来保存数据。您可以通过在`beforeSave()`模型动作中输入逻辑来拦截`save`函数。如果此动作返回`false`，则在控制器中（例如清单6-3中的第4行），`save()`模型函数也会返回`false`。然后，控制器可以使用`Session`组件显示错误消息，或执行其他操作来响应模型中失败的保存。\n\
    \n通过设置模型ID变量来保存特定ID的表单数据，如下例所示：\n\n```\n$this->Post->id = $id;\n$this->Post->save($this->data);\n\
    ```\n\n这通常仅在更新记录时需要。创建新记录时，请使用`create()`模型函数。\n\n## 为编辑或更新填充表单字段\n\n表单提交序列还可能包括编辑数据库中的记录或之前保存的数据。在这种情况下，控制器需要比`Add`动作包含更多的操作。打开`app/controllers/posts_controller.php`文件并滚动到`Edit`动作。它应包含类似于清单6-5的代码。\n\
    \n**清单6-5.** Posts控制器中的Edit动作\n\n```php\nfunction edit($id = null) {\n    if (!$id\
    \ && empty($this->data)) {\n        $this->Session->setFlash(__('Invalid Post',\
    \ true));\n        $this->redirect(array('action'=>'index'));\n    }\n    if (!empty($this->data))\
    \ {\n        if ($this->Post->save($this->data)) {\n            $this->Session->setFlash(__('The\
    \ Post has been saved', true));\n            $this->redirect(array('action'=>'index'));\n\
    \        } else {\n            $this->Session->setFlash(__('The Post could not\
    \ be saved. Please try again.', true));\n        }\n    }\n    if (empty($this->data))\
    \ {\n        $this->data = $this->Post->read(null, $id);\n    }\n    $tags = $this->Post->Tag->find('list');\n\
    \    $users = $this->Post->User->find('list');\n    $this->set(compact('tags','users'));\n\
    }\n```\n\n这个动作大致是`Add`和`View`动作的组合。编辑既需要一个简单的页面请求（要编辑的记录或数据源），也需要一个表单提交过程，这些都包含在烘焙的`Edit`动作中。该动作执行三个逻辑测试。\n\
    \n第一，用户是否只提供了一个记录ID？第二，用户是否提供了任何表单数据？第三，用户是否既未提供表单提交也未提供记录ID？这些测试可以在三段代码中找到，分别是第2-5行、第6-13行和第14-16行。\n\
    \n注意，在第15行，`$this->data`等于`read()`模型动作的结果。换句话说，`read()`函数的结果遵循与控制器中表单提交相同的格式化规则。无论方向如何——是从数据库读取记录并在视图中提供，还是将表单数据从视图发送到控制器——Cake都会以相同的方式格式化数组。\n\
    \n## 异步序列\n\n当用户通过网页发出请求，而服务器无需退出或刷新当前页面即可响应时，就会发生异步过程。换句话说，从用户的角度来看，请求由服务器在后台处理，不会干扰当前显示。通常，服务器只会更新特定的HTML元素，而不是整个网页。近年来，随着企业级网站更好地利用JavaScript和XML，异步HTTP请求变得越来越流行。大多数开发人员将任何异步服务器响应称为*Ajax*操作，尽管Ajax最初是“异步JavaScript和XML”的缩写。\n\
    \n最近，出现了几个开源Ajax框架，使异步操作更易于管理。Cake附带了一个`Ajax`助手，旨在促进异步用户序列。使用此类工具，无需重新加载整个网页即可与服务器交互，从未如此简单。简单的页面请求和表单提交序列可以在Cake中异步工作，但必须使用JavaScript方法来实现正确的HTTP响应。\n\
    \n要使Ajax正常工作，必须通过JavaScript操纵浏览器的默认行为。例如，当单击链接或表单按钮时，浏览器会自动同步发送HTTP请求，并等待服务器返回新的网页。此行为被JavaScript抑制；此示例中的表单按钮使用JavaScript发送HTTP请求，而无需浏览器刷新或等待新页面。JavaScript还负责接收服务器的响应，并确定在何处显示用户请求的结果。由于Ajax依赖于JavaScript，因此Cake中的异步序列始于视图文件。\n\
    \n在视图中，发送或接收Ajax请求的任何HTML元素都必须包含正确的JavaScript代码。如果使用Ajax框架，布局通常会包含指向该框架库的链接。例如，Ajax链接可能使用`onClick`\
    \ HTML属性，并包含遵循该框架方法的JavaScript代码，而不是使用同步的`href`属性。无论Ajax框架如何准备和处理异步过程，其使用的URL通常都会遵循Cake使用的模式。在视图文件中，Ajax表单或链接因此将指向控制器，就像同步表单和链接一样。\n\
    \n然而，控制器确实需要执行略微不同的操作才能使Ajax在Cake中工作。假设所有JavaScript都已就位，可以向Cake控制器发送异步请求。从这个意义上说，控制器的行为将与以典型方式发出请求时相同。但默认情况下，Cake会根据正在运行的动作渲染相应的视图文件。`render()`函数可以拦截默认的视图渲染，并告诉Cake它必须异步运行。\n\
    \n只需将`render()`函数放在动作中，通常在此处允许控制器终止并输出视图。确保在函数中包含`ajax`参数，以便Cake知道异步渲染视图：\n\n\
    ```\n$this->render('add','ajax');\n```"
  raw: 'C H A P T E R 6 ■ C U S TO M I Z I N G V I E W S


    ■**Note** The distinction between a *model function*—either a function written
    in the model class or a customized function stored in the model file—and other
    functions (such as controller actions, for instance) is that they are always executed
    through the model. This means that to launch a model function, you must always
    do so through the model class. In this case, the Post model saves the data, so
    the model functions have names like $this->Post->save(), not just $this->save().
    Other model functions such as read() and find() will always be run similarly,
    through a specified model. Hence, the syntax goes $this followed by the model,
    followed by the function, with the function’s parameters housed in the parentheses.


    The create() function inserts a new record into the table. Because this model
    function flows from a specified model, it will insert into said model. In line
    3 of Listing 6-3, the create() function is being called from the Post model, so
    the new row will be inserted in the posts table. Running the save() function immediately
    following the create() function will propagate whatever is passed for saving to
    the new row. Line 4 in Listing 6-3 sends the preformatted $this->data array. The
    save() function is already built to parse and save the array, so no other data
    handling is needed.


    In short, the first step for adding a new record is to create a new row with the
    create() model function, and the second step is to save $this->data by passing
    it through the save() model function. The baked Add action goes beyond just saving
    the data by checking for an error in the process. You could intercept the save
    function by entering some logic in the beforeSave() model action. If this action
    returns false, then in the controller (line 4 in Listing 6-3, for example) the
    save() model function also returns false. The controller can then use the Session
    component to display an error message or perform other operations in response
    to a failed save in the model.


    Saving form data for a specific ID is done by setting the model ID variable, as
    in the following example:


    $this->Post->id = $id;


    $this->Post->save($this->data);


    This is usually necessary only for updating a record. When creating a new record,
    use the create() model function.


    **Filling Form Fields for Editing or Updating**


    The form submission sequence may also include editing records in the database
    or previously saved data. In this instance, the controller will need to include
    a few more operations than the Add action does. Open the app/controllers/posts_controller.php
    file and scroll to the Edit action. It should include code similar to Listing
    6-5.


    09775ch06final 7/1/08 9:44 PM Page 79


    C H A P T E R 6 ■ C U S TO M I Z I N G V I E W S


    **79**


    **Listing 6-5.** *The Edit Action in the Posts Controller*


    function edit($id = null) {


    if (!$id && empty($this->data)) {


    $this->Session->setFlash(__(''Invalid Post'', true));


    $this->redirect(array(''action''=>''index''));


    }


    if (!empty($this->data)) {


    if ($this->Post->save($this->data)) {


    $this->Session->setFlash(__(''The Post has been saved'', true)); 9


    $this->redirect(array(''action''=>''index''));


    } else {


    11 $this->Session->setFlash(__(''The Post could not be saved. ➥


    Please try again.'', true));


    }


    }


    if (empty($this->data)) {


    $this->data = $this->Post->read(null, $id);


    }


    $tags = $this->Post->Tag->find(''list'');


    $users = $this->Post->User->find(''list'');


    $this->set(compact(''tags'',''users''));


    20 }


    This action is more or less the combination of the Add and View actions. Editing
    requires both a simple page request (the record or data source to be edited) and
    a form submission process, which is included in the baked Edit action. The action
    performs three logic tests.


    First, has the user supplied a record ID alone? Second, has the user provided
    any form data?


    Third, has the user provided neither a form submission nor a record ID? These
    tests are found in three chunks of code, namely, lines 2–5, 6–13, and 14–16.


    Notice that on line 15, $this->data is equal to the result of the read() model
    action. In other words, the read() function result follows the same formatting
    rules as form submissions in the controller. Going in both directions, either
    reading a database record and making it available in the view or sending form
    data from the view to the controller, Cake will format the arrays in the same
    manner.


    **An Asynchronous Sequence**


    Asynchronous processes occur when the user makes a request through a web page
    and the server responds without exiting or refreshing the current page. In other
    words, from the user’s perspective, the request is processed by the server in
    the background without any interference with the current display. Usually, a specific
    HTML element is updated by the server instead of the whole web page. Asynchronous
    HTTP requests have become popular in recent years as enterprise-level web sites
    have made better use of JavaScript and XML. Most developers refer to any asynchronous
    server responses as *Ajax* operations, even though Ajax started as an acronym
    meaning Asynchronous JavaScript And XML.


    09775ch06final 7/1/08 9:44 PM Page 80


    **80**


    C H A P T E R 6 ■ C U S TO M I Z I N G V I E W S


    Recently, several open source Ajax frameworks have appeared, making asynchronous
    operations easier to manage. Cake comes with an Ajax helper designed to facilitate
    asynchronous user sequences. With tools such as these, working with the server
    without reloading the entire web page has never been easier. The simple page request
    and form submission sequences can be made to work asynchronously in Cake, but
    JavaScript methods must be used to accomplish the correct HTTP response.


    For Ajax to work, the default behavior of the web browser must be manipulated
    by JavaScript. For example, when clicking a link or a form button, the web browser
    automatically sends an HTTP request synchronously and waits for a new web page
    to be returned by the server. This behavior is suppressed by JavaScript; the form
    button in this example uses JavaScript to send the HTTP request without the browser
    refreshing or waiting for a new page. JavaScript also handles receiving the server’s
    response and determines where to display the outcome of the user’s request. Because
    Ajax relies on JavaScript, the asynchronous sequence in Cake begins with the view
    file.


    In the view, whichever HTML elements send or receive Ajax requests must include
    the correct JavaScript code. If you use an Ajax framework, then the layout will
    generally include the links to the framework’s libraries. An Ajax link, for instance,
    might use the onClick HTML


    attribute with JavaScript code that follows the framework’s methods rather than
    use the synchronous href attribute. However the Ajax framework prepares and handles
    asynchronous processes, the URLs it uses will generally follow the pattern used
    by Cake. In the view file, the Ajax forms or links will consequently point to
    a controller just like synchronous forms and links.


    The controller, however, does need to perform a slightly different operation for
    Ajax to work in Cake. Assume that all the JavaScript is in place to send an asynchronous
    request to a Cake controller. In this sense, the controller will behave the same
    as if the request were made in a typical fashion. By default, however, Cake will
    render the corresponding view file, depending on which action is being run. The
    render() function makes it possible to intercept the default view render and tell
    Cake that it must behave asynchronously.


    Simply put the render() function in the action where you would normally allow
    the controller to terminate and output the view. Be sure to include the Ajax parameter
    in the function so that Cake knows to render the view asynchronously:


    $this->render(''add'',''ajax'');'
