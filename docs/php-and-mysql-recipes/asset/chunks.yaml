    ### 配方 14-2：生成 XML 响应


    #### 问题


    上一个配方专注于将 XML 文档解析成 PHP 可用的结构，并可以通过已知路径或遍历 SimpleXMLElement 对象访问元素。当 PHP 脚本消费已经处于
    XML 格式的数据时，这非常有用。当服务器需要生成 XML 响应供其他客户端消费时，我们需要一套工具来将 PHP 数组和其他值转换为 XML 文档。


    #### 解决方案


    仍然可以使用 SimpleXMLElement 类，但这次不是从 XML 文档开始，而是从一个空的 SimpleXMLElement 实例开始。然后我们可以使用
    `addChild()` 和 `addAttribute()` 方法构建 XML 对象，最后使用 `asXML()` 方法将对象转换为 XML 字符串。


    #### 工作原理


    本示例从一个行星列表开始。每个行星都有若干参数，描述其与太阳的距离、行星类型、卫星数量和平均表面温度。


    ```php

    <?php


    // 14_6.php


    $planets = [


    ''mercury'' => [


    ''type'' => ''rock'',


    ''dist'' => 0.39,


    ''moons'' => 0,


    ''temp'' => 452


    ],


    ''venus'' => [


    ''type'' => ''rock'',


    ''dist'' => 0.723,


    ''moons'' => 0,


    ''temp'' => 726


    ],


    ''earth'' => [


    ''type'' => ''rock'',


    ''dist'' => 1,


    ''moons'' => 1,


    ''temp'' => 285


    ],


    ''mars'' => [


    ''type'' => ''rock'',


    ''dist'' => 1.524,


    ''moons'' => 2,


    ''temp'' => 240


    ],


    ''jupiter'' => [


    ''type'' => ''gas'',


    ''dist'' => 5.203,


    ''moons'' => 67,


    ''temp'' => 120


    ],


    ''saturn'' => [


    ''type'' => ''gas'',


    ''dist'' => 9.539,


    ''moons'' => 62,


    ''temp'' => 88


    ],


    ''uranus'' => [


    ''type'' => ''gas'',


    ''dist'' => 19.18,


    ''moons'' => 27,


    ''temp'' => 59


    ],


    ''neptune'' => [


    ''type'' => ''gas'',


    ''dist'' => 30.06,


    ''moons'' => 13,


    ''temp'' => 48


    ],


    ''plutu'' => [


    ''type'' => ''rock'',


    ''dist'' => 39,53,


    ''moons'' => 4,


    ''temp'' => 37


    ],


    ];

    ```


    第 14 章 ■ XML、RSS、WDDX 和 SOAP


    ```php

    $base = "<?xml version=\"1.0\" ?><planets></planets>"; $xml = new SimpleXMLElement($base);


    foreach($planets as $name => $data) {


    $p = $xml->addChild(''planet'');


    $p->addAttribute(''name'', $name);


    $a = $p->addChild(''dist'');


    $a->addAttribute(''value'', $data[''dist'']);


    $a->addAttribute(''unit'', ''AU'');


    $p->addChild(''moons'', $data[''moons'']);


    $a = $p->addChild(''temp'');


    $a->addAttribute(''value'', $data[''temp'']);


    $a->addAttribute(''unit'', ''kelvin'');


    }


    header("Content-Type: text/xml");


    echo $xml->asXML();

    ```


    `asXML()` 方法接受一个可选的文件名参数。如果传入文件名，该方法会将 XML 结构保存到文件中。如果不传参数，该方法仅返回 XML 结构作为字符串，该字符串可以发送给客户端。'
