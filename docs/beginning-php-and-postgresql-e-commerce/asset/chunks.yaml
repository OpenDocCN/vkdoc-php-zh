    **Exercise: Preparing the hatshop Virtual Folder on Unix Systems**


    **1.** Create a new folder named `hatshop`, which will be used for all the work
    you’ll do in this book. You might find it easiest to create it in your home directory
    (in which case the complete path to your `hatshop` folder will be something like
    `/home/username/hatshop`), but because we’ll use relative paths in the project,
    feel free to create it in any location.


    **2.** The default place used by Apache to serve client requests from is usually
    something like `/usr/local/apache2/htdocs/`. This location is defined by the `DocumentRoot`
    directive in the Apache configuration file, whose complete path is usually `/usr/local/apache/conf/httpd.conf`.
    Because we want to use our folder instead of the default folder mentioned by `DocumentRoot`,
    we need to create a virtual folder named `hatshop` that points to the `hatshop`
    physical folder you created in step 1. Open the Apache configuration file (`httpd.conf`),
    find the `Aliases` section, and add the following lines:


    ```apacheconf

    <IfModule alias_module>

    # ...

    Alias /hatshop/ "/home/username/hatshop/"

    Alias /hatshop "/home/username/hatshop"

    </IfModule>


    <Directory "/home/username/hatshop">

    Allow from all

    </Directory>

    ```


    After adding these lines, a request for `http://localhost/hatshop` or `http://localhost/hatshop/`
    will result in the application in the `hatshop` folder (if it existed) being executed.


    **3.** Create a file named `test.php` in the `hatshop` folder, with the following
    line inside:


    ```php

    <?php phpinfo(); ?>

    ```


    **4.** Restart the Apache web server, and load `http://localhost/hatshop/test.php`
    (or `http://localhost:8080/hatshop/test.php` if Apache works on port 8080) in
    a web browser.


