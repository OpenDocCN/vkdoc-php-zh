    Recipe 6-10\. Displaying HTML Entities


    Problem


    When strings are used to store HTML code and you want to display the code instead
    of having the browser render the code, you will need to convert certain characters
    to HTML entities.


    Solution


    The simple way to handle this is to use str_replace() to replace < with &lt; and
    > with &gt;. That would require two function calls. Instead we can use htmlspecialchars()
    . This function will convert & , '' , " , < and > to the corresponding HTML entities.
    The string might contain other substrings that have associated named entities.
    In order to convert all of these you must use the htmlentities() function.


    Both functions take the string to convert as the first parameter followed by three
    optional parameters that define how the substitutions are made. Please see the
    PHP manual for details on these parameters at


    [http://php.net/manual/en/function.htmlentities.php .](http://php.net/manual/en/function.htmlentities.php)


    How it Works


    Whenever your web site allows a user to input text values that are stored in a
    database and later presented back to the same or a different user, you might want
    to prevent the users from entering HTML that is then parsed by the browser and
    rendered as HTML instead of what the user actually entered. If you have a comments
    section on your blog page, a user might enter an image tag in the comment and
    if you don''t do anything to the input the image will show up as part of the comment
    when it''s shown to users as the image tag can reference any url on the server
    or any other server connected to the Internet.


    You can call htmlentities() either before inserting the value into the database
    or before showing it to the user, but don’t call it both times.


    <?php


    // 6_22.php


    $input = ''This is my comment <img src="https://example.com/image.jpg" />''; echo
    htmlentities($input);


    CHAPTER 6 ■ STRINGS


    The raw output of this script will show the following:


    This is my comment &lt;img src=&quot;https://example.com/image.jpg&quot; /&gt;
    When this is sent to a browser it will be shown as text and not be interpreted
    as an image tag. Converting the string back to a valid HTML string can be done
    with the html_entity_decode() function.


    If you run this script on the command line the output will look like this: This
    is my comment &lt;img src=&quot;https://example.com/image.jpg&quot; /&gt; If you
    look at this output in the browser it will look exactly as the user typed it and
    the image will not be shown.


    If no preventions are taken the user could insert script tags that could execute
    JavaScript or load script files from other sites. In this next example we use
    the strip_tags() function to remove all tags from the input.


    <?php


    // 6_23.php


    $input = <<<HEREDOC


    Comment


    <script src="https://example.com/script.js"></script>


    <script>


    MyFunction();


    </script>


    <img src="https://example.com/image.jpg" />


    This is my opinion about that!


    HEREDOC;


    $i = strip_tags($input);


    echo $i;


    Although all tags are removed the function will preserve anything between the
    tags and the browser will be able to render the output as plain text. The output
    will look like this: Comment


    MyFunction();


    This is my opinion about that!


    Note that all the line breaks are preserved as it''s only the tag portion of the
    string that is removed. You might still want to run htmlentities() on the string
    before sending it to the browser in order not to create an invalid HTML.


    CHAPTER 6 ■ STRINGS


    Recipe 6-11\. Generating Hash Values for Files


    Problem


    When creating an asset management system where files of different types and sizes
    are stored on a file system and you want to make sure all the files are unique,
    you could use the file name as the key. That would however allow the user to just
    rename a file and store it again and you would end up saving the same file twice.


    Solution


    The solution is to generate a hash of the content of the file. There are a number
    of different functions to do this. The simplest (and probably oldest) is the md5()
    function that returns a string of 32 bytes based on the content of the string
    or file if you use md5_file() . A more comprehensive hashing algorithm is available
    through sha1() and sha1_file() . These functions produce a string of 40 bytes.
    As of version 5.1.2 of PHP


    includes the hash extension by default. This extension provides a long list of
    hashing algorithms from md2, md5, sha1, sha256, sha512, and many more.


    How it Works


    Before the hash extension was introduced PHP used discreet functions like md5()
    and sha1() to generate hashed, but with the hash() function it''s possible to
    generate a number of different hash values with a single function. The hash()
    and hash_file() functions take two or three parameters. The first is the name
    of the hashing algorithm and the second is the string or file to create the hash
    from and the last optional parameter specifies if the function returns binary
    data or lowercase hexits to represent the data.'
