    #### Special Cases: True, False, and Null


    Although text should be enclosed in quotes, three special cases—`true`, `false`,
    and `null`—should never be enclosed in quotes unless you want to treat them as
    genuine text (or strings). The first two mean what you would expect; the last
    one, `null`, means “nothing” or “no value.”


    Note


    Technically speaking, `true` and `false` are Boolean values. This name comes from
    nineteenth-century mathematician George Boole, who devised a system of logical
    operations that subsequently became the basis of much modern-day computing. It’s
