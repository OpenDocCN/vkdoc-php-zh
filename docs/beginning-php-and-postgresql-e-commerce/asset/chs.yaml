  \ HatShop 的搜索功能。该搜索机制与现有的网站结构以及第 4 章中构建的分页功能实现了很好的集成。本章学到的、最有趣的新知识点是关于如何使用 PostgreSQL\
  \ 执行全文搜索。这也是业务层首次拥有独立功能，而不仅仅是简单地在数据层和表示层之间传递数据。\n\n在第 6 章中，你将学习如何使用 PayPal 销售产品。\n\
