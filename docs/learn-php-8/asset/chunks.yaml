    \ file\n\n![../images/394210_2_En_6_Chapter/394210_2_En_6_Fig2_HTML.jpg](images/394210_2_En_6_Chapter/394210_2_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2 The `readerrorlog.php` file with user errors\n\nIn Example 6-8, the\
    \ `displayRecords` method contains most of the same code previously shown. Extra\
    \ CSS code has been added to make the display a little more professional. Also,\
    \ an HTML `href` link has been included with each record displayed. The link recalls\
    \ the program, passing the record number that the user wants to delete. The set\
    \ of code in the “main section” (the first lines of code that execute) creates\
    \ a constant `ERROR_LOG` to define the location and name of the log file. The\
    \ file is opened and loaded into the array in the same manner as shown previously.\n\
    \nOnce the array is loaded, the program checks to see if it has been called by\
    \ one of the delete links for each record. If a value has been passed via HTTP\
    \ `GET`, the program then calls the `deleteRecord` method. Once the `deleteRecord`\
    \ method is complete, the program calls the `saveChanges` method. Whether or not\
    \ a value has been passed into the program, it executes the last statement, which\
    \ calls the `displayRecords` method.\n\n- **Program note**—The header line of\
    \ the `deleteRecords` method (`function deleteRecord($recordNumber, &$row_Count,\
    \ &$error_Array)`) uses by reference, instead of by value, to allow `$row_Count`\
    \ and `$error_Array` to be updated in the method. By default, parameters passed\
    \ into a method cannot be changed by the method (by value). The `&` indicates\
    \ that the parameter is passed by reference. This allows the value to be changed.\
    \ `deleteRecords` can adjust the count of the number of rows in the array (`$row_Count`)\
    \ and the information in the array itself (`$error_Array`).\n- By value passes\
    \ the contents (data) that are contained in the parameter into the method. By\
    \ reference passes the memory address of the parameter into the method, which\
    \ allows the method to change the value of the parameter in memory.\n\nThe `deleteRecords`\
    \ method accepts the record number to be deleted as one of its parameters. Any\
    \ position in the array above this record number is unchanged. Any position below\
    \ this record must be shifted up one position. For example, if an array has ten\
    \ positions (0–9) and the fifth position (4) is to be deleted, then positions\
    \ 5–9 must now become positions 4–8. In the following example, position `$J+1`\
    \ is placed into position J for any record after the `$recordNumber` to be deleted:\n\
    \n![../images/394210_2_En_6_Chapter/394210_2_En_6_Figa_HTML.jpg](images/394210_2_En_6_Chapter/394210_2_En_6_Figa_HTML.jpg)\n\
    \nThe last position in the array is no longer needed. The last position of the\
    \ array is released (using `unset`). This will inform the operating system that\
    \ the space in memory is no longer needed. The operating system will call its\
    \ garbage collector to free up the memory location. We will discover an easier\
    \ way to accomplish this task when we discuss associative arrays in a later chapter.\
    \ Once the array has been reconfigured, the `saveChanges` method is called to\
    \ replace the records in the log file. The code shown is very similar to previous\
    \ examples in this chapter, with one exception. The `fopen` method uses the parameter\
    \ `\"w\"`. The `\"w\"` parameter will erase anything that is already in the file\
    \ and replace it with what is currently being written to the file. In this example\
    \ the file will be updated (replaced) with the new set of records that excludes\
    \ the record that was deleted. The `displayRecords` method is called anytime the\
    \ program is called (with or without a record being deleted). This method displays\
    \ the contents of the log file.\n\n- **Programming note**—Programs that retrieve\
    \ data that will be used throughout the program usually retrieve the information\
    \ in the initial stages of the code and place it in a data structure (array, list,\
    \ or dataset). As the data is updated in the program, the information in the data\
    \ structure is updated. When the data processing has been completed, the information\
    \ is then returned to the original location (text file or database). Updating\
    \ the text file or database is usually completed as one of the final stages of\
    \ the program. The process of a user logging out of a program would provide an\
    \ event to indicate that the updated data should be saved.\n\n## Do It\n\n1. Download\
    \ the code for Example 6-8 from the book’s web site. Add a `try` catch block to\
    \ handle any unexpected problems (such as a nonexistent log file). Test and save\
    \ your changes.\n\n2. Adjust the Example 6-8 code from either #1 or the book’s\
    \ web site to allow the users to select which log file to read. The program should\
    \ allow the users to select either the user log file or the general system log\
    \ file. Test and save your changes.\n\n## Chapter Terms\n\n| Errors | Exceptions\
    \ |\n| --- | --- |\n| `try/catch` Block | `$e->getMessage();` |\n| `switch` Statement\
    \ | Embedded `if` Statement |\n| Default Code | `extends` |\n| Exception Class\
    \ | Inheritance |\n| Child Class | Parent Class |\n| `trigger_error` | Hierarchy\
    \ of Exception Handling |\n| Raising (Throwing) an Exception | Catching an Exception\
    \ |\n| Attitude of the Code | Push the Errors |\n| Pull the Errors | Log File\
    \ |\n| Default PHP Error File | `error_log` |\n| `Timestamp` | `date.timezone`\
    \ |\n| Application Log Files | Constants |\n| Email Alerts | `display_errors`\
    \ |\n| Text File | Sequential File |\n| `Fopen` | `fwrite` |\n| `Pointer` | `fclose`\
    \ |\n| `Fgets` | `while` Loop |\n| `Feof` | `! operator` |\n| `EngineException`\
    \ | `explode` |\n| Two-Dimensional Array | Row |\n| Column | Subscript |\n| Dynamic\
    \ Arrays | First Row of an Array |\n| `print_f` | increment |\n| decrement | `for`\
    \ Loop |\n| HTML HREF | `unset` |\n\n## Chapter Questions and Projects\n\n###\
    \ Multiple Choice\n\n1. Which of the following is true about PHP program errors?\n\
    \   1. They are used for all exceptional situations before PHP 5.0.\n   2. They\
    \ are handled by the operating system.\n   3. They might be displayed to the users.\n\
    \   4. All of these.\n\n2. Which of the following is true about PHP program exceptions?\n\
    \   1. They are used for all exceptional situations after PHP 5.0.\n   2. They\
    \ can be handled by the operating system.\n   3. They might be displayed to the\
    \ users.\n   4. All of these.\n\n3. The `try/catch` block is used to do which\
    \ of the following?\n   1. Capture all errors\n   2. Capture only known errors\n\
    \   3. Capture all exceptions\n   4. Capture only known exceptions\n\n4. Inheritance\
    \ does which of the following?\n   1. Is part of object-oriented programming"
