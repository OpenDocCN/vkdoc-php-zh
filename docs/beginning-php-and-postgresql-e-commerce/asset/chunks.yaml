    A P P E N D I X A ■ I N S TA L L I N G A PA C H E , P H P, A N D P O S T G R E
    S Q L


    To enable SSL, you’ll need to install an SSL certificate into Apache. If you host
    your application with a hosting company that offers SSL, you can do all testing
    on your development machine with a “fake” SSL certificate that you generate on
    your own. You can do this by making yourself a certificate authority. To generate
    your own certificate, you should follow some of the excellent tutorials you can
    find on the Internet, such as the one at http://www.linux.com/howtos/SSL-Certificates-HOWTO/index.shtml
    (you can also find many more using a simple web search). Otherwise, if you want
    to install an SSL certificate for production, you’ll need to get a “real” SSL
    certificate from a certification authority such as VeriSign, as explained in Chapter
    7.


    Make any changes you need in the httpd.conf configuration file, and then start
    your Apache server with


    /usr/local/apache2/bin/apachectl start


    ■**Note** If you get errors such as “module access_module is built in and can’t
    be loaded,” try to comment out the LoadModule line from the httpd.conf that corresponds
    to the module that generated the error.


    An even better method is to try to comment out every module that you don’t need.


    Now load http://localhost/ in your browser to make sure your Apache Web Server
    is up and running, and then browse to https://localhost/ to test that you can
    also access Apache through SSL.


    **Installing PostgreSQL 8**


    Follow these steps to install PostgreSQL on your system: **1.** Download the PostgreSQL
    source code from http://www.postgresql.org/ftp/source/.


    For the purposes of this installation guide, we’re using postgresql-8.1.5.tar.gz,
    but you should download the latest available version instead.


    **2.** Unpack the archive with a command such as the following: tar -zxvf postgresql-8.1.5.tar.gz


    **3.** Change context to the postgresq-8.1.5 folder: cd postgresql-8.1.5


    **4.** Execute the following command to prepare PostgreSQL to install to /usr/local/pgsql:


    ./configure --prefix=/usr/local/pgsql


    **5.** Make sure you’re logged in as root (use the su command if necessary), and
    execute: make install


