- fmt: "- **SELinux**: Security-Enhanced Linux is an operating mode where the Linux\
    \ kernel gives very fine-grained access control to programs, limiting what each\
    \ program and user can do significantly more than normal. SELinux can provide\
    \ a lot of risk mitigation, but it is fairly complex to set up, and it is easy\
    \ to accidentally block your own applications from doing what they need to do.\
    \ We have disabled SELinux in this book because of the amount of configuration\
    \ issues it entails.\n\n- **FirewallD**: This is the standard firewall administration\
    \ application used in this book.\n\n- **AuditD**: This program looks for and logs\
    \ suspicious activity by application programs.\n\n- **Remote Syslog**: This is\
    \ not a program, but the system logger can be configured to log to a remote server,\
    \ so that intruders cannot cover their tracks by modifying log files.\n\n## 13.7\
    \ Application Security\n\nThe hardest thing to secure is the application itself.\
    \ Realistically, I can’t offer a whole lot of tips without writing another book.\
    \ Nonetheless, the most important things to remember are:\n\n1. Code defensively.\n\
    2. Verify every piece of data from the user.\n3. Properly escape everything sent\
    \ to the user.\n4. Always double-check the privilege of a user before performing\
    \ an operation or showing data. Make sure that simply knowing a URL or a parameter\
    \ doesn’t automatically give a user undue power.\n5. Be very careful about anything\
    \ that is sent to an external command or program. Double-check that you have properly\
    \ escaped or filtered everything.\n6. Always imagine what would happen for every\
    \ piece of data and every request if someone were maliciously manipulating it.\n\
    7. Always try to code using \"best practices\" (e.g., [`https://phptherightway.com/`](https://phptherightway.com/)).\
    \ Using best practices when coding can save you from security problems that other\
    \ people introduce, including those that you accidentally introduce yourself later\
    \ down the line as your application grows and turns what is currently safe code\
    \ into unsafe code due to changes elsewhere in the codebase.\n\nAlso be sure to\
    \ check the list of common vulnerabilities at [`www.owasp.org`](http://www.owasp.org).\n\
    \nThere are many other things that you can and should do to secure your server\
    \ and your application, but hopefully this has given you a starting list of things\
    \ to be thinking about. PHP sometimes gets an unwarranted bad reputation for security\
    \ problems. However, the reason for it is not the language, but rather that it\
    \ is often the first language learned by newer web programmers who have less security\
    \ experience. A few resources to help you get started in this direction include:\n\
    \n1. ***Securing PHP Apps* by Ben Edmunds**: This is a short and to-the-point\
    \ guide to secure practices in PHP.\n2. ***Pro PHP Security* by Chris Snyder,\
    \ Thomas Myer, and Michael Southwell**: This is a more comprehensive guide to\
    \ security and security principles with a PHP focus. It is an older book, but\
    \ the core security principles have not changed.\n3. ***Mastering Linux Security\
    \ and Hardening* by Donald Tevault**: Writing secure PHP code won’t help you if\
    \ your server isn’t configured properly.\n4. ***Practical Information Security\
    \ Management* by Tony Campbell**: This book will help you understand at a higher\
    \ level what is being secured, what is being protected, how to manage tradeoffs,\
    \ and what the ultimate goals of security are.\n\nThe most important thing, however,\
    \ is to always be thinking about how your application could be abused and always\
    \ be learning new ways to proactively guard against those things.\n\n## Index\n\
    \n### A\n\nAccess Key ID  \nActive health checks  \nAjax techniques  \nAmazon\
    \ lightsail  \navailability zones  \ndatacenters  \ninitial dashboard  \ninstance,\
    \ creation  \nLinode  \nnode, creation  \nnode dashboard  \nAmazonS3FullAccess\
    \  \nAmazon Web Services (AWS)  \nApacheBench  \nApplication security  \nApplication-Specific\
    \ commands  \nAvailability zones  \nAWS Configuration  \n\n### B"
