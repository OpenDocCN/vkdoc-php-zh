    \n**This book is dedicated to:**  \nMy mother, Mrs. Nita Harwani. My mother is\
    \ next to God for me. Whatever I am today is because of the moral values taught\
    \ by her. And Vladimir Kosma Zworykin, Philo Taylor Farnsworth, and John Logie\
    \ Baird—the inventors of the modern television, commonly referred to as the TV.\
    \ TV, as we all know, is the most relaxing and entertaining device of today. After\
    \ a long, tiring day at work, I enjoy sitting in front of the TV and watching\
    \ my favorite shows.\n\n## Introduction\n\nIn this book, you will learn to develop\
    \ an e-commerce site. Electronic commerce, also known as e-commerce, involves\
    \ purchasing and selling products or services through computers and smart phones\
    \ using the Internet. Today, almost all businesses need an e-commerce site to\
    \ sell their products or services and to show their global presence. Hence, most\
    \ companies show their presence on the Internet by developing e-commerce sites.\n\
    \nThe e-commerce site that you will be learning to develop in this book will be\
    \ able to sell almost anything, including books, smart phones, laptops, etc. The\
    \ site will display different product categories via a drop-down menu along with\
    \ a search box at the top. Users can select the products and can pay online. The\
    \ site will store all the products, orders, and customer information in a database.\n\
    \nThe book addresses newbie developers who don’t have a lot of experience developing\
    \ web sites. The book teaches you how to display and sell your products and services\
    \ online. It explains different database tables that will be required for keeping\
    \ site and customer information. The book explains and takes you through the different\
    \ stages of developing an e-commerce site. For example, you’ll learn to develop\
    \ different web pages for displaying products, implement a search facility to\
    \ enable customers to search for products quickly, develop drop-down menus to\
    \ link different pages of the site, apply authentication checks to customers who\
    \ are signing in, and associate with payment gateways to accept payments from\
    \ your customers. The book will be very beneficial for developers and instructors\
    \ too, who want to learn or teach web site development."
