    Benefits


    You might be asking yourself what the benefits are to swapping out one template
    language for another. PHP is, after all, only a template language. We haven’t
    even removed all of the PHP artifacts—the need for $ symbols and a strict syntax—so
    what have we really gained?


    At the end of the day, we could have spent a lot more time on a simple template
    dialect. We could even have made our templates look and feel like regular HTML.
    What we have ended up with is something that is much simpler to understand and
    learn than regular PHP.


    You want to be able to hand your code over to the average front-end tech/designer
    and have them immediately be able to see and understand what is going on, without
    a lot of experience in PHP. Our template dialect/parser helps us achieve that
    goal.


