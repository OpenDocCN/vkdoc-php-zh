  \ CSS 文件。你也可以修改 HTML 文件中的链接标签，使其指向 `ajaxdemomobile.css` 文件而不是 `ajaxdemo.css` 文件。然后尝试缩小浏览器窗口的大小，以模拟智能手机屏幕。\n\
  \nPHP、HTML、JavaScript、CSS 和动态网页\n\n作为 PHP 程序容器（主机）的最后一个例子，我们来考虑一下浏览器。正如你在本章中所见，你可以使用\
  \ HTML 文件来调用我们的 PHP 程序（在前一个演示中点击按钮）。正如第 1 章所述，这将导致 PHP 程序执行，并将结果返回给浏览器。你也可以让 PHP\
  \ 程序返回 HTML 代码。\n\n```\n<?php\nprint \"<html><body>\";\nprint \"<h1>我的程序</h1>\"\
  ;\nprint \"<p>世界你好</p>\";\nprint \"</body></html>\";\n?>\n示例 2-5\n由 PHP 程序创建的动态\
  \ HTML 页面\n```\n\n\n\n你可以将一个完整的 HTML 页面（甚至包含 JavaScript 和链接）返回给请求执行 PHP 程序的设备（浏览器）。示例\
  \ 2-5 展示了一段在 PHP 代码中创建完整动态 HTML 页面的方法。生成的输出甚至可以包含 CSS 文件的链接，以及用于格式化的内嵌 CSS 标签。不过，我强烈建议你谨慎使用那些依赖容器特定尺寸的内嵌\
  \ CSS 标签。作为开发者，你无法预知哪种设备会显示结果（PC、智能手机、平板还是 iPad）。更好的做法是提供多个 CSS 文件（如前文所示），以便根据不同设备对输出结果进行格式化。\n\
  \n在前面的示例中，我们将初始界面（HTML 和 JavaScript）与 PHP 程序分离开来。实际上，你可以将 HTML（用于显示初始网页）和 PHP 代码放在同一个文件中。\n\
  \n你可以创建一个 PHP 文件，用于判断用户之前是否请求过该页面。如果用户从未请求过，或者浏览器会话已超时，那么 PHP 程序可以显示一个用于用户交互（例如点击按钮）的初始\
  \ HTML 页面。然后，同一个程序可以再次调用自身，以判断按钮是否被点击，并返回相应的响应。\n\n我们来看一个不同版本的`Hello World`程序来实现这一功能。\n\
  \n- *如需深入了解 PHP `if` 语句的演示，请查看 PHP 手册*：[www.php.net/manual/en/control-structures.if.php](http://www.php.net/manual/en/control-structures.if.php)*。*\n\
  \n```\n Hello World \";\n}\nelse\n{\nprint \"PHP Example\";\nprint \"\";\nprint\
  \ \"\";\nprint \"\";\nprint \"\";\n}\n?>\n示例 2-6\ncallmyself.php 文件\n```\n\n该程序包含一个简单的`if`条件语句，用于判断用户是否点击了提交按钮。\n\
  \n`if`语句的格式如下：\n\n```\nif (条件语句)\n{\n// 如果条件语句为真，则执行的代码\n}\nelse\n{\n// 如果条件语句为假，则执行的代码\n\
  }\n```\n\n条件语句通常比较两个值，判断它们是否相同或不同，或者调用一个返回`true`或`false`值的方法。稍后我们会讨论返回值的方法。现在，先来看一个第一种类型的简单示例。\n\
  \n条件语句使用比较运算符（`==`、`<`、`>`、`<=` 和 `>=`）来判断语句是`true`还是`false`。\n\n```\nIf ( a > b)\n\
  {\nprint \"这是 A！\";\n}\nelse\n{\nprint \"这是 B！\";\n}\n```\n\n在这个示例中，比较了变量`a`和`b`中的值。如果`a`大于`b`，则显示“这是\
  \ A！”。否则，显示“这是 B！”。PHP 在判断可能有必要时，会进行一些类型转换。例如，假设`a = \"5\"`，而`b = 6`。PHP 会将`a`中的字符串\
  \ 5 转换为数字 5，以便进行比较。许多语言不会这样做，如果你试图比较字符串和数字，它们会显示错误。如果你不希望进行这种转换，可以使用一些特殊的比较运算符。例如，你可以使用三个等号（`a\
  \ === b`）来判断两个值是否绝对相等，而不是使用两个等号。我们将在第 3 章中更详细地讨论比较运算符。\n\n- *安全性与性能* — *尽可能使用* `===`\
  \ *代替* `==`。这将确保你得到完全符合预期的结果。\n\n在示例 2-6 中，`if`语句调用了一个方法（`isset`）。`$_POST`尝试从 HTML\
  \ 表单中检索属性（`'submitbutton'`）及其值（`\"查找 Hello World！\"`），该表单使用了 HTTP POST 方法来传递信息（你也可以使用`$_GET`和\
  \ HTTP GET）。`isset`方法会根据`$_POST`能否检索到该属性（及其内容），向`if`语句返回`false`或`true`。这个`true`或`false`结果将决定`if`语句执行哪段代码块。\n\
  \n正如第 1 章所述，HTML 表单中的对象（例如按钮）会根据对象的名称以及该对象 value 语句中包含的内容，生成一个属性与值的组合。这对于已被指定名称（`id`）和值（如示例\
  \ 2-6 所示）的提交按钮也同样适用。\n\n当程序首次被浏览器调用时，按钮尚未被点击。因此，没有创建`submitbutton`变量。`isset`方法返回`false`。程序跳转到`else`部分，执行用于显示\
  \ HTML 表单和提交按钮的`print`语句（如图 2-3 所示）。\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig3_HTML.jpg](img/394210_2_En_2_Fig3_HTML.jpg)\n\
  \n**图 2-3** 按钮点击前的 callmyself.php\n\n当用户点击按钮时，程序会调用自身（查看`form`标签中的`action`参数）。这次，由于用户点击了按钮，因此存在一个`submitbutton`属性及变量值（`'查找\
  \ Hello World！'`）。程序判断该变量“已设置”（包含一个值），并返回`true`。于是，`if`语句执行`if`和`else`语句之间的那一行代码。随后显示`Hello\
  \ World`。这个 PHP 程序处理了应用程序的所有功能，而未使用任何现有的静态 HTML 页面。\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig4_HTML.jpg](img/394210_2_En_2_Fig4_HTML.jpg)\n\
  \n**图 2-4** 按钮点击后的 callmyself.php\n\n这种技术的优点在于所有代码都可以包含在一个文件中。因此，所有更改都在一个地方完成。这种技术的缺点也在于所有代码都在一个文件中。代码越复杂，就越容易变得“混乱”。整理代码的一种方法是把代码移到其他\
  \ PHP 库所包含的函数中（我们稍后会讨论这一点）。另一个缺点是，在不能影响用户的前提下更改文件名。如果你将文件名更改为`mynewprogram.php`，则需要通知所有用户新的名称（以及可能更改的位置）。之前使用\
  \ AJAX 的示例允许你在 HTML 代码页面中更改文件名，但不需要更改用户请求的 HTML 页面的实际名称。\n\n#### 动手实践\n\n1. 在 Apress\
  \ 网站上找到`callmyself.php`文件。将文件下载到你的 Apache `projects`文件夹中。修改并添加`print`语句，以显示你的完整姓名、学期和专业。测试你的程序。你的程序是否成功运行？如果没有，原因是什么？\n\
  \n\n\n### PHP 三层架构\n\n本章大部分内容都在探讨能够\"托管\"PHP 应用程序的各种平台（或容器）。我们发现，PHP 几乎可以在任何容器（个人电脑、智能手机/移动设备或浏览器）中显示其输出内容。PHP\
  \ 能够轻松地与 JavaScript、HTML 和 CSS 交互，正是这种灵活性的体现。如今，几乎所有平台都能与互联网交互（而那些目前尚不能交互的平台，未来也将具备此能力）。任何能与互联网交互的平台，也都能与\
  \ PHP 应用程序交互。\n\n这种界面上的独立性（或者说灵活性）表明了界面的平台或主机与应用程序的其他\"层\"（部分）之间存在逻辑上的分离。这引出了对三层架构和\
  \ PHP 应用程序逻辑设计的探讨。应用程序规模越大，就越可能需要将其拆分为模块。此外，这些模块很可能驻留在不同的服务器（或 Web 服务器）上。大型应用程序通常需要多名程序员同时编写代码。这些程序员甚至可能使用不同的语言来创建程序模块。\n\
  \n构建大型应用程序与组装汽车并没有太大区别。汽车的各个组件（车身、车轮、电子设备和发动机）都是先单独组装好的。每个组装完成的组件随后被放置到汽车底盘内。然后，组件之间通过软管、电线和皮带相互连接。组装完成后，汽车的所有组件协同工作。如果某个组件发生故障，可以将其更换，而无需更换或更改汽车上的任何其他组件。\n\
  \n模块化（或组件化）编程的理念基于这样一种方法：将代码块单独创建，然后与其他模块组合，从而构建出一个可正常运行的应用程序。这些模块可以被修改或替换，而无需更改其他模块。这种方法已经存在了一段时间。即使在今天，许多程序也并非模块化的，因为小型程序即使不拆分为模块也能高效运行。然而，随着这些应用扩展为更大的应用程序，它们会变得难以更新或维护。一次更改需要更新整个应用程序，而不仅仅是某个模块。在某个节点上，一个未经模块化设计而在不断扩展的应用程序，必须为了更好的可维护性和可靠性而从头开始重新设计成模块化结构。\n\
  \n如第 1 章所述，搜索引擎能够在用户 PC 的浏览器上显示网页界面。用户输入搜索请求后，信息会通过互联网传输到一台远程服务器（我们不知道它在哪里），该服务器执行一个搜索应用程序（我们不知道它是用什么编程语言创建的）。然后，该应用程序在数据库中（我们不知道它使用的是什么数据库管理系统，也不知道它位于何处）搜索所请求的信息。结果被发送回应用程序，应用程序再将信息（通过\
  \ Web 服务器）发送回用户 PC 上的浏览器。\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig5_HTML.jpg](img/394210_2_En_2_Fig5_HTML.jpg)\n\
  \n**图 2-5** 三层模块化应用程序设计\n\n此过程中的信息流动使得这类 Web 应用程序的设计自然而然地划分为（至少）三层（模块）：**界面层、业务规则层和数据层**。将代码划分为不同层的一个优点是能够实现层在多个应用程序中的复用。例如，我们的搜索引擎可以在多个设备上使用相同的业务规则层和数据层，同时使用不同的界面（PC\
  \ 应用程序或智能手机应用程序）。不同的层也可以独立更新，而不会影响其他层。智能手机应用程序界面可以更新以利用最新操作系统的新功能，而无需更改业务规则层或数据层。也可以更新业务规则层内的代码以修复逻辑错误，而无需更改界面层或数据层。让我们来看看每一层的典型职责。\n\
  \n- **模块化三层应用程序** – 设计、编程——三层设计提供了创建可分离为界面层、业务规则层和数据层的程序的能力。界面层包含所有与向用户显示信息相关的图形和程序代码。业务规则层不包含界面。但是，它处理从界面层提交的任何信息，然后可以将信息提交给数据层进行存储。数据层是应用程序的主要存储位置，可能涉及使用数据库。每个层都可以独立地更改和构建（编译），而不会影响其他层。\n\
  \n#### 动手实践\n\n1.  模块化设计的三个层分别是什么名称？\n2.  模块化设计与设计建筑物有何相似之处？\n3.  模块化编程如何使编码更高效？\n\
  \n#### 界面层\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig6_HTML.jpg](img/394210_2_En_2_Fig6_HTML.jpg)\n\
  \n**图 2-6** 界面层\n\n界面层（IT）负责显示信息，并允许用户与应用程序交互。大多数界面提供图形用户界面（GUI），它为用户提供了一种查看信息和与应用程序交互的友好方式。GUI\
  \ 界面提供常见的对象，包括文本框和按钮，这有助于用户快速适应新的应用程序。此外，通常还会包含图片、图像、图标、视频和声音以保持用户的兴趣。菜单和其他导航对象也常被包含在内，以帮助用户成功地在应用程序中导航。\n\
  \n- **对象** – 对象是已经编译好供应用程序使用的代码块。对象包含方法和属性。方法（或函数）是完成某项任务的代码块（例如，将项目放入列表框中）。属性（或变量）是可以更改的对象特征（例如，背景颜色）。对象通常经过充分测试且没有错误。通过重用现有对象，程序员可以更快地创建更可靠的程序。\n\
  \n该层将使用对象（如标签和图片框）或脚本代码（如本章中的 `ajaxdemo.html` 示例）来显示信息。该层还通过交互式对象（如文本框和按钮）接收来自用户的信息。静态信息可以来自该层内部（通过菜单、徽标或页脚）。动态信息通常由业务规则层提供给该层（例如本章中\
  \ `myfirstprogram.php` 的输出）。\n\n\n\n##### 界面层中的代码部分\n\n界面层中可能存在一些代码（后续章节会展示），这些代码负责准备要发送给其他层的信息。例如，用于验证用户是否已输入所有必要信息或正确信息（如年龄文本框中的数字字符）的`JavaScript`代码是可接受的。此外，可能还有代码负责将从业务规则层接收的信息（例如将数字转换为文本格式）进行预处理，以便在界面中显示。\n\
  \n- **验证/验证码** — 验证码用于校验信息。这些代码将接收到的信息与预期的标准格式进行比对。例如，代码可以验证电子邮件地址是否同时包含`@`和`.`（句点）。如果信息包含这两个符号，则可视为“有效”（尽管我们仍不确定该邮箱地址是否真实存在）。如果缺少任一符号，则代码判定为无效。无效信息通常会导致程序向用户显示错误消息，要求重新输入有效信息。\n\
  \n界面层通常提供能够响应用户交互（如点击提交按钮）的代码，这通常被称为*用户事件*。还可能存在代码，用于处理用户提供的信息，以便供其他层使用（例如将用户输入的文本转换为数字格式，供业务规则层进行计算）。\n\
  \n- **事件 — 事件驱动型语言**（如`PHP`）可以在事件发生时执行代码块。事件既可以是用户的操作（如点击按钮），也可以由操作系统触发。程序提供监听代码来“侦听”事件。当事件发生时，代码会提供一个事件方法，然后该方法被执行。\n\
  \n程序根据是否提供监听代码来选择要监听的事件。\n\n界面层不应直接与数据库管理系统或数据库本身交互。如果这样做，该层将被锁定在特定的数据库位置和实际数据库设计中。该层不应（除显示目的外）操作数据。任何与应用程序本身相关的记账、数学计算或数据处理都应在业务规则层完成。\n\
  \n##### 界面层中的该做与不该做\n\n| 该做 | 不该做 |\n| --- | --- |\n| 格式化数据以用于显示 | 从数据库访问数据 |\n\
  | 验证用户信息的正确性 | 计算结果 |\n| 响应用户事件 | 处理信息 |\n| 处理意外情况（异常） | 验证用户 ID 和密码 |\n| 为业务规则层格式化数据\
  \ |  |\n\n- **数据库管理系统（DBMS）** — 数据库管理系统是一种允许用户或应用程序创建和定义数据库的软件。它还提供了在数据库中插入、更新或删除信息的能力。\n\
  \n#### 动手实践\n\n1.  列举三个应包含在界面层中的项目示例。\n2.  列举三个不应包含在界面层中的项目示例。\n3.  界面层中可以包含一些程序代码吗？如果可以，这些代码提供了哪些任务功能？\n\
  \n### 业务规则层\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig7_HTML.jpg](img/394210_2_En_2_Fig7_HTML.jpg)\n\
  \n**图 2-7** 业务规则层\n\n业务规则层处理从界面层和数据层接收的所有信息与数据。该层还会返回界面层请求的信息（例如返回`\"Hello World\"\
  `），并将信息提交给数据层进行存储。大部分实际编程代码都包含在这一层中。\n\n业务规则层的代码通常使一个应用程序与其他应用程序真正区别开来。如果某个应用程序拥有版权，其独特创意的算法很可能隐藏在该层中。例如，网络搜索引擎之间的许多差异以及信息最终如何显示的机制，都嵌入在业务规则层中。\n\
  \n与可能包含浏览器中代码的界面层不同，业务层的所有编码都是使用服务器上的程序（例如`PHP`）完成的。驻留在服务器上的脚本和编程代码由服务器本身保护，用户无法访问。业务层代码也可以驻留在应用服务器上（作为服务）或网络服务器上（作为网络服务）。服务器通过不允许用户直接访问，来确保该层中代码的安全。\n\
  \n- **服务器/应用服务器/网络服务器** — 服务器连接到网络，为网络（或互联网）上的任何节点（机器）提供服务。一台服务器可以提供不止一种服务（通信、安全和/或存储），也可以提供特定服务。应用服务器承载可供网络（或互联网）上用户访问的应用程序。网络服务器托管网页和网络应用程序。它们通常暴露在公司的外部访问中。\n\
  - **服务** — 服务是驻留在计算机或服务器内存中、响应其他应用程序请求的应用程序。服务可以在计算机或服务器启动时自动加载到内存中，也可以根据需要手动启动和停止。服务没有图形用户界面。业务规则层可以作为一项或多项服务驻留在计算机或服务器上。\n\
  \n在应用程序各层之间传递的信息可能会受到黑客的篡改；因此，该层可能包含类似于界面层中的代码，用于验证接收数据的有效性和正确格式。\n\n从该层传递到其他层的信息可以格式化为易于接收的形式。例如，一个*数据集*（类似于表格或电子表格）可以返回给界面层，以便在网页上的表格或列表框中显示。数据集也可以发送到数据层，以便插入到数据库中。\n\
  \n- **数据集** — *数据集*是一种可以容纳多个数据表的结构。数据表类似于数据库中的表（包含行、列和数据）或电子表格。数据集通常用于在层之间和方法之间传递信息。\n\
  \n业务规则层向请求信息的各层返回数值。该层不提供任何图形用户界面或任何形式的表单。不需要界面，因为该层在任何时候都不与用户直接接触。所有与业务规则层的通信都通过界面层或数据层处理。与界面层类似，业务规则层不直接更新数据库中的存储信息。所有存储更新都在数据层进行。\n\
  \n##### 业务规则层中的该做与不该做\n\n| 该做 | 不该做 |\n| --- | --- |\n| 操作数据 | 显示信息 |\n| 格式化数据 |\
  \ 将数据保存到辅助存储设备 |\n| 将数据存储在内存中 | 显示错误消息 |\n| 抛出异常 |  |\n| 验证数据 |  |\n\n#### 动手实践\n\
  \n1.  业务规则层代码可以完成哪些与界面层代码相似的任务？为什么这些代码可能在这两个层中重复出现？\n2.  业务规则层如何传递和接收数据（信息）？\n\n\
  \n\n##### 3. 为什么业务规则层必须通过接口层间接与用户交互以提供信息？\n\n### 数据层\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig8_HTML.jpg](img/394210_2_En_2_Fig8_HTML.jpg)\n\
  \n**图 2-8**  \n数据层\n\n数据层的主要功能是将信息存储到辅助设备上，或向业务规则层返回数据。数据可以（并且通常）通过数据库管理系统（如 MySQL\
  \ 或 MariaDB）存储在数据库中。该层与业务规则层进行交互，因为在数据显示之前可能需要对数据进行处理，例如生成报告。数据从该层返回时，会采用业务规则层（及编程语言）能够接受的格式。常见格式包括\
  \ `JSON`、`XML`、`SOAP` 和数据集。\n\n- `JSON`——*JavaScript 对象表示法*是一种与 `XML` 类似的格式，用于存储和交换数据。`JSON`\
  \ 可以在编辑器或浏览器中查看。它最常用于在层之间传递数据。\n- `XML`——*可扩展标记语言*是一种与 `HTML` 类似的标记语言，用于存储和描述数据。`XML`\
  \ 也可用于在层之间传输数据。\n- `SOAP`——*简单对象访问协议*用于与 Web 服务交换数据。它与 `HTTP`（超文本传输协议）和 `SMTP`（简单邮件传输协议）协同工作，为应用程序和\
  \ Web 服务之间提供通信。\n- *Web 服务*——一种没有界面的应用程序，可被调用来处理信息。Web 服务可以在 Web 服务器上远程提供业务层和/或数据层的功能。*Web\
  \ 服务描述语言*（`WSDL`）用于描述对 Web 服务的调用，以及 Web 服务所接受和返回信息的格式。`WSDL` 与 `XML` 类似。\n\n数据层的验证在数据库管理系统和/或通过程序代码完成。该层的验证是在更新数据库之前确保数据可靠且准确的最后机会。在存储前捕获验证问题，远比无效信息被记录后再处理要容易得多。\n\
  \n数据存储可以是本地的，也可以是远程的。移动设备可以将数据限制存储在本地数据库（如智能手机）中，但也可以使用 `WSDL`（Web 服务）在远程服务器或云端（如\
  \ Microsoft Azure）存储和检索信息。此外，许多应用程序会通过 Cookie 在本地保存少量信息，或将大量信息存储在远程数据库中。\n\n- *Microsoft\
  \ Azure*——Microsoft Azure 是一个云平台，提供数据服务、应用程序服务和网络服务。Visual Studio 应用程序可以上传到 Microsoft\
  \ Azure 云端并进行安全保护。\n\n数据层使用 `SQL` 语句（`INSERT`、`DELETE`、`UPDATE` 和 `SELECT`）来检索和更新数据库中的信息。然而，更改信息的实际请求来自业务规则层。例如，用户在\
  \ Web 应用程序中请求更改地址时，必须先通过接口层输入更改内容，在业务规则层格式化更新请求，然后在数据层更改数据库中的信息。\n\n| 应该做 | 不应该做\
  \ |\n| --- | --- |\n| 将数据保存到辅助设备 | 操作数据 |\n| 更新辅助设备上的数据 | 显示错误消息 |\n| 引发异常 | 显示信息\
  \ |\n| 验证数据 |  |\n\n#### 动手实践\n\n1. 为什么数据层在将信息存入数据库之前必须再次进行验证？\n2. 数据层中可以存在什么类型的代码（如果有的话）？\n\
  3. `SQL` 用于什么目的？\n\n\n\n#### 融会贯通\n\n程序开发生命周期（`PDLC`）引导我们完成应用开发的整体设计与创建过程。应用开发成功的关键在于，在开始编码和开发之前，对系统布局进行合理规划。这样做可以减少可能出现的错误和问题的数量。许多项目可能会陷入开发者因前期规划不足而无法摆脱的\"\
  困境\"。不同的作者和讲师对规划过程所需时间的估算各不相同，因为这取决于个人情况。技能更娴熟或经验更丰富的人可能比不那么自信的人所做的规划要少。然而，每个人至少都会规划出所需的模块以及模块之间流动的数据类型，即使只是在草稿纸上完成。另一个关键点在于，要在编码和开发过程中不断修正你的计划。当你开始编码时，你会发现自己\"\
  没想到\"某些情况。这时应立即返回并调整你的计划。你越常这样做，就越不可能陷入找不到解决办法的\"困境\"。\n\n在`PDLC`过程中，始终要邀请用户参与，并组建一支强大的专家团队。请记住，你开发这个项目是为了让你的客户满意。你或许自认为拥有终极的设计和解决方案。然而，如果用户不认同你，那一切都没有意义。有时你确实需要调整自己的思路，使其与客户更加一致。在行业工作中，我记得在我的工作组内曾开发过一个重大的变更管理系统（我很庆幸自己没有参与这个项目）。设计人员和编码人员创建了一个非常花哨且昂贵的系统，但一旦在数据中心实施后，却几乎无人使用。为什么？数据中心的工作人员并不想要一个花哨的系统；他们想要一个能快速完成所需任务的简单系统。尽管原始项目耗时六个月才完成，但一名数据中心员工利用自己的几个周末时间创建了另一个能满足他们需求的系统。那个系统后来被投入使用，并沿用了许多年。\n\
  \n通常，`PDLC`被定义为五个步骤：规划与信息收集、分析、设计、实施和评估。在规划与信息收集步骤中，需要汇集项目及项目团队的所有需求。同时还会创建初步文档，以回答以下问题：\"\
  我们试图完成什么？\"、\"我们将如何完成它？\"以及\"我们将使用什么团队？\"。在分析步骤中，需要确定项目的可行性。文档会回答以下问题：\"我们能否利用现有团队和资源完成项目？\"\
  、\"还需要收集哪些额外资源？\"以及\"能否在给定的时间框架和预算内完成项目？\"如果项目通过了分析步骤（许多项目未能通过），那么实际设计就开始了。在设计阶段，采用自上而下的方法，首先着眼于所需的整体模块以及模块之间的数据流。随着所需方法的确定、平台的选择、通信工具的整合以及信息存储的设计，会逐步添加更多细节。\n\
  \n在详细设计创建并获批后，项目进入开发和测试阶段。将进行单元测试（单个模块）和完整的应用程序测试。测试成功完成后，项目便可进入实施步骤。在实施过程中，必须决定如何安装项目以及何时安装。实施完成后，应用程序便\"\
  上线\"了。但仍应持续进行评估，以确定效率需求、安全问题、逻辑问题以及可能对项目进行的整体增强。最终，大多数项目将返回该流程的第一步，以开发新版本。\n\n本节假设规划与信息收集以及分析步骤已成功完成，这将使你进入设计步骤。我们将大致探讨确定应用程序各层中应发生何种类型活动的过程。我们还将研究可能在层之间流动的数据或信息类型。在后续章节中，我们将通过确定所需的方法类型以及必须流入和流出这些方法的信息和数据，来完善这一分析。我们还将研究为这些方法创建的实际活动和代码。\n\
  \n最好的学习方式是边做边学，因此让我们来看一个案例问题，并由此展开。\n\n\n#### 案例研究\n\n**公司**：原子鱼苗孵化有限公司  \n**项目**：现场销售订单与佣金申请系统\
  \  \n**范围**：本系统需支持多种设备（移动端和 PC 端），方便现场销售代理、经理和薪酬人员轻松获取所需信息。系统将接收销售代理输入的信息，用于计算客户的采购成本、销售经理的销售业绩以及薪酬部门的佣金。项目第一阶段是开发该应用程序，用于接收销售代理信息、显示采购成本、计算佣金，并将信息存储到`MySQL`数据库中。平台测试成功后，将迁移至公司云平台并确保其安全性。\
  \  \n**输入（来自销售代理）**：销售代理编号、客户编号、订单编号、物品编号、数量及特殊需求  \n**输出**：（未来阶段可能确定更多信息）  \n**存储至数据库**：除销售代理输入的信息外，还包括：佣金、销售总额\n\
  \n目标是确定每一层中将要处理的信息类型、流程以及层与层之间的数据流。一旦确定，这些信息可用于开发一个通用的、空的层级结构，最终用于承载整个项目。\n\n#####\
  \ 接口层\n\n公司要求系统支持多种设备访问。因此，我们必须考虑到除了笔记本电脑和 PC 之外，移动设备（平板电脑和智能手机）也将用于信息的输入和输出。我们可能决定为每种设备类型创建多个接口。通过三层设计，你可以设计一个系统，在共享业务规则层和数据层内容的同时，实现这种灵活性。\n\
  \n作为设计师和/或程序员，你必须确定将要输入的信息类型：多个字段（销售代理编号、客户编号、订单编号、物品编号和数量）都表明输入的是数字。你需要确定这些字段的大小，并验证只输入了数字信息。`金额`字段是唯一可能用于未来计算的字段。因此，所有其他字段可以保持文本格式。`金额`字段在将信息传递给业务规则层之前，需要转换为`Integer`（整数）格式。`特殊需求`字段是一个较大的字段，可以接受字母数字字符。数据库目前还不存在，因此我们必须根据公司政策或/和当前使用的纸质表单来确定字段大小。经过审查，已确定客户和销售代理的编号为\
  \ 8 个字符。订单编号和物品编号为 6 个字符。\n\n收集这些信息后，你现在可以设计接口层的顶层视图，如图 2-9 所示。\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig9_HTML.jpg](img/394210_2_En_2_Fig9_HTML.jpg)\n\
  \n图 2-9  \n原子鱼苗孵化有限公司销售与订单应用接口\n\n带有`+`的字段可由销售代理多次使用以输入所有信息。当创建实际数据集和数据表时，必须为这些条目提供多个列。\n\
  \n此外，还会存在一个（未图示的）额外表单，用于显示订单结果。此表单将显示所购物品的摘要和总成本。所有信息均可由销售代理输入、提交，并暂存于接口层（一个 cookie？），直到销售代理指示订单完成。然后，信息可被传输到业务规则层进行处理。之后，业务规则层可将信息返回，显示在第二个表单中。第二个表单可包含一个“批准”（或取消）按钮。一旦“批准”，信息便可传递到数据层进行存储。\n\
  \n### 业务规则层\n\n业务规则层将包含两个处理流程。一个流程将在销售代理点击“订单完成”按钮后，接收完整的订单（数据集/数据表）并计算总销售成本。然后，它会将此信息的摘要返回到第二个表单。另一个流程将在代理点击“批准”按钮时执行。该流程随后会计算佣金并创建一个数据集（现包含额外字段），以便传递到数据层。该信息随后将被传递以进行存储。\n\
  \n此外，为确保订单数据有效，需要一些方法来验证从接口层接收到的字段。传输的所有数据的安全性至关重要。任何在层之间移动的数据在处理前都必须通过安全验证。业务规则层的顶层视图如图\
  \ 2-10 所示。\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig10_HTML.jpg](img/394210_2_En_2_Fig10_HTML.jpg)\n\
  \n图 2-10  \n原子销售与订单应用业务规则层\n\n### 数据层\n\n在这种情形下，数据层仅用于存储由业务规则层提供的信息。该层将验证接收到的信息并将其存储到数据库中，如图\
  \ 2-11 所示。\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig11_HTML.jpg](img/394210_2_En_2_Fig11_HTML.jpg)\n\
  \n图 2-11  \n原子销售与订单应用数据层\n\n有许多工具可帮助完成设计过程。关键因素是设计者要在过程中包含所有重要信息。作为该示例的另一种做法，你可以将数据集的描述移出各层，放置在各层之间的数据流中，如图\
  \ 2-12 所示。\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig13a_HTML.jpg](img/394210_2_En_2_Fig13a_HTML.jpg)![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig13b_HTML.jpg](img/394210_2_En_2_Fig13b_HTML.jpg)\n\
  \n图 2-13  \n原子销售与订单应用三层模型\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig12_HTML.jpg](img/394210_2_En_2_Fig12_HTML.jpg)\n\
  \n图 2-12  \n替代三层模型\n\n##### 动手练习\n\n1.  在什么时候必须将数字转换为数字形式（例如`Integer`）以便存储在数据库中？\n\
  2.  为什么使用数据集在层之间传递信息？\n3.  案例示例中遗漏或忽略了哪些内容？\n\n#### MVC 与依赖注入\n\nMVC（模型-视图-控制器）是一种设计模式，软件工程师（包括\
  \ PHP 应用程序设计师）使用它通过控制器在视图和模型之间进行通信。*控制器*是一种软件，负责将用户的任何输入传输给模型。MVC 设计可以被认为是循环的，因为模型、控制器和视图之间能够相互通信。标准的三层模型是线性的：接口层要接收信息或向数据层传递信息，必须通过业务规则层。市场上有许多工具（如\
  \ Ruby on Rails）可以帮助软件工程师设计 MVC 应用程序。\n\n- 访问 [`rubyonrails.org/`](https://rubyonrails.org/)\
  \ 查看 MVC 应用程序的示例。\n\n\n\nMVC 与基于组件的设计均可运用**依赖注入**。依赖注入允许程序（客户端）在使用某段代码（如一个类）时，无需了解该代码的具体实现。这使得各模块能够独立开发、更新、测试并实现可复用性。这类似于汽车点火装置与起动机的通信方式：点火装置几乎不了解起动机组件及其运作原理，甚至不知道起动机的品牌，它只需向起动机发送信号（电流）指令其工作。若更换了起动机，只要它在接收信号后仍能正常运转，点火装置就不会察觉也不受该变更的影响。\n\
