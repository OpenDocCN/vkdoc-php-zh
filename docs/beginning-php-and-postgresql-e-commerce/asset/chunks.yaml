  trans: "\n■**提示** 您将在开发的第三阶段（从第 12 章开始）创建自己完整的订单处理系统，届时将处理信用卡交易。\n\n当您在第九章实现 PayPal\
    \ 单次购买功能时，将使用如下代码片段来创建 PayPal 单次购买页面的 URL：\n\n```php\n// 计算购物车总金额\n\n$this->mTotalAmount\
    \ = ShoppingCart::GetTotalAmount();\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH06.qxd 10/31/06 10:06 PM 第 198 页\n\n**198**  \n第 6 章 ■ 使用 PayPal 接收付款\n\
    \n```php\n// 如果点击了“下单”按钮...\n\nif(isset ($_POST['place_order']))\n{\n    // 创建订单并获取订单\
    \ ID\n\n    $order_id = ShoppingCart::CreateOrder();\n\n    // 此处将包含 PayPal 链接\n\
    \n    $redirect =\n    'https://www.paypal.com/xclick/business=youremail@example.com'\
    \ .\n    '&item_name=HatShop 订单 ' . $order_id .\n    '&item_number=' . $order_id\
    \ .\n    '&amount=' . $this->mTotalAmount .\n    '&currency=USD&return=www.example.com'\
    \ .\n    '&cancel_return=www.example.com';\n\n    // 重定向至支付页面\n\n    header('Location:\
    \ ' . $redirect);\n    exit;\n}\n```\n\n您将在第 9 章学习如何使用此功能。\n\n## 本章小结\n\n在本章中，您了解了如何将\
    \ PayPal 集成到电子商务网站中——这是许多小企业选择的简单支付解决方案，这样他们就不必自行处理信用卡或支付信息。\n\n首先，我们列出了一些 PayPal\
    \ 的替代方案，然后引导您创建新的 PayPal 账户。接着我们介绍了如何在开发的第一和第二阶段集成 PayPal，首先讨论了购物车和自定义结账机制，然后介绍了如何将访问者直接引导至支付页面。\n\
    \n下一章，我们将继续探讨 HatShop 的目录管理页面。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n648XCH07a.qxd 10/25/06 10:56 PM 第 199 页\n\n## 第七章\n\n# 目录管理\n\n**在**前面的章节中，您操作的是数据库中已存在的目录信息。您可能已经手动插入了一些记录，或者从本书附带的源代码中下载了部门、分类和产品信息。\n\
    \n显然，这两种方法对于真实的网站来说都是不可接受的，因此您需要编写一些代码来轻松管理网店数据。也就是说，在发布网站之前需要处理的最后一个细节是创建其管理界面。虽然访问者永远不会看到这部分内容，但它对于向客户交付高质量的网站至关重要。\n\
    \n在本章中，您将实现一个目录管理页面。通过此功能，您将完成网站开发的第一阶段！由于此页面可以有多种实现方式，因此需要与客户进行认真讨论，以确定所需的具体功能列表。在我们的案例中，目录管理页面应允许客户执行以下操作：\n\
    \n- 添加和删除部门\n- 修改现有部门信息（名称、描述）\n- 查看属于某个部门的分类列表\n- 管理部门分类\n- 编辑现有分类信息（名称、描述）\n\
    - 查看特定分类中的产品列表\n- 编辑产品详细信息\n- 将现有产品分配到其他分类（一个产品可以属于多个分类），或将其移至另一个分类\n- 查看与某个部门关联的分类\n\
    - 从分类中移除产品\n- 从目录中删除产品\n\n为了确保敏感页面（例如网站的管理部分）的安全，您还需要执行以下操作：\n\n- 实现一个登录表单，管理员需要提供用户名和密码。\n\
    - 学习如何使用 SSL 保护登录表单和管理页面。\n\n**199**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00176.png)\n\n648XCH07a.qxd 10/25/06 10:56 PM 第 200 页\n\n**200**  \n\
    第 7 章 ■ 目录管理\n"
- fmt: '# Previewing the Catalog Administration Page


    Although the long list of objectives might look intimidating at first, they will
    be easy to implement. We have already covered most of the theory in the previous
    chapters, but you’ll still learn quite a bit in this chapter.


    The first step toward creating the catalog administration page is to create a
    login mechanism, which will be implemented as a simple login page that you can
    see in Figure 7-1.


    **Figure 7-1.** *The HatShop login page*


    Next, you build the site administration part of the site by creating its main
    page (`admin.php`), its associated Smarty template (`admin.tpl`), a main menu
    template (`admin_menu.tpl`) used to navigate through different sections of administration
    that we’ll develop in the next chapters, a componentized template to manage the
    authentication (`admin_login`), and four componentized templates for catalog administration
    (`admin_departments`, `admin_categories`, `admin_products`, and `admin_product`).


    After logging in, the administrator is presented with the list of departments
    (generated by the `admin_departments` Smarty template, which is loaded from the
    main admin page, `admin.php`), as shown in Figure 7-2.


    The functionality you’ll implement for departments is much the same as you’ll
    see for categories and products. More specifically, the administrator can:


    - Edit the department’s name or description by clicking the **Edit** button.

    - Edit the categories for a specific department by clicking the **Edit Categories**
    button.

    - Completely remove a department from the database by clicking the **Delete**
    button (this works only if the department has no related categories).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00143.png)


    ![](images/00087.png)


    648XCH07a.qxd 10/25/06 10:56 PM Page 201


    **C H A P T E R 7 ■ C ATA L O G A D M I N I S T R AT I O N**


    **201**


    **Figure 7-2.** *The HatShop departments admin page*


    When clicking the **Edit** button, the corresponding row from the table enters
    edit mode, and its fields become editable, as shown in Figure 7-3. Also, as you
    can see, instead of the **Edit** button, you get **Update** and **Cancel** buttons.
    Clicking **Update** updates the database with the changes, whereas clicking **Cancel**
    simply quits edit mode.


    **Figure 7-3.** *Editing department information*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00078.png)


    648XCH07a.qxd 10/25/06 10:56 PM Page 202


    **202**


    **C H A P T E R 7 ■ C ATA L O G A D M I N I S T R AT I O N**


    The administrator can add new departments by entering the new department’s name
    and description in the text boxes below the table, and then clicking the **Add**
    button.


    When the administrator clicks the **Edit Categories** button, the `admin.php`
    page is reloaded but with an additional parameter in the query string: `DepartmentID`.
    This parameter tells `admin.php` to load the `admin_categories` Smarty template,
    which lets the administrator edit the categories that belong to the selected department
    (see Figure 7-4).


    **Figure 7-4.** *The HatShop categories admin page*


    This page works similarly to the one for editing departments. You also get a link
    (back to departments...) that redirects back to the department’s administration
    page.


    The navigation logic among the department, category, and product administration
    pages is done using query string parameters. As you can see in Figure 7-4, when
    a department is selected, its ID is appended to the query string.


    You already implemented this kind of functionality in the `index.php` page. There
    you decided which componentized template to load (at runtime) by analyzing the
    query string parameters.


    We’ll discuss more about `admin.php` and its templates later, while you’re building
    them.


    For now, let’s start by dealing with the security mechanism.


    # Setting Up the Catalog Administration Page


    The catalog administration part of the site will consist of the `admin.php` page
    and a number of other PHP files and Smarty templates. You’ll build each of these
    components one at a time.'
