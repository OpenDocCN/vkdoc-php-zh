  trans: '

    原来，对象的 `$code` 字段是私有的，因此不能在类代码之外直接对其进行操作。但你可以通过公共方法来访问该字段。具体来说，可以使用公共方法来读取字段的值以及为字段赋值。


    ## 特殊方法


    有一组方法用于解决“特殊”任务。这些方法的名称以双下划线开头。接下来我们将探讨它们。


    > **注意：** 你可能已经猜到，`__construct()` 和 `__destruct()` 方法（构造方法和析构方法）也是特殊方法。


    我们先从 `__toString()` 方法开始。每当一个对象出现在本应是字符串的位置时，该方法就会被自动调用。例如，当对象使用点运算符与字符串进行拼接时，或者当对象作为参数传递给
    `print()` 函数或 `echo` 语句时。我们来看一下清单 7-8 中的示例。


    ```php

    <?php

    class MyClass{

    public $name;

    public $code;

    function __construct($name,$code){

    $this->name=$name;

    $this->code=$code;

    }

    // __toString() 方法：

    public function __toString(){

    $txt="对象的字段：\n";

    $txt.="字段 \$name = $this->name\n";

    $txt.="字段 \$code = $this->code\n";

    return $txt;

    }

    }

    // 创建该类的对象：

    $obj=new MyClass("Object",123);

    // 显式调用 __toString() 方法：

    echo "显式调用 __toString() 方法：\n";

    echo $obj->__toString();

    // 隐式调用 __toString() 方法：

    echo "隐式调用 __toString() 方法：\n";

    echo $obj;

    $text=$obj."程序结束";

    print($text);

    ?>

    ```


    程序执行结果如下。


    ```

    程序的输出（来自清单 7-8）

    显式调用 __toString() 方法：

    对象的字段：

    字段 $name = Object

    字段 $code = 123

    隐式调用 __toString() 方法：

    对象的字段：

    字段 $name = Object

    字段 $code = 123

    对象的字段：

    字段 $name = Object

    字段 $code = 123

    程序结束

    ```


    该程序描述了 `MyClass` 类，它有两个字段（`$name` 和 `$code`）。该类还有一个带有两个参数的构造方法，用于定义字段的值。此外，它还描述了
    `__toString()` 方法。该方法没有参数，并返回一个字符串作为结果。该字符串通过几个步骤形成，包含了对象字段值的信息。


    基于 `MyClass` 类，创建了 `$obj` 对象。在 `$obj->__toString()` 语句中，像普通方法一样显式调用了 `__toString()`
    方法。但是，当执行 `echo $obj` 指令时，`__toString()` 方法会从 `$obj` 对象中自动调用，并且该方法的结果会替换对该对象的引用。当执行
    `$text=$obj."程序结束"` 命令时，该方法也会被隐式调用。在这里，你将对象与一个字符串进行拼接。该操作执行如下：从 `$obj` 对象调用 `__toString()`
    方法，然后将该方法返回的字符串结果与第二个字符串操作数进行拼接。


    > **PHP 8 标准：** 在 PHP 8 中，如果某个类中声明了 `__toString()` 方法，那么该类会自动实现 `Stringable` 接口。接口将在后面讨论。


    让我们再来探讨另外三个特殊方法：`__set()`、`__get()` 和 `__call()`。它们在引用类的成员时使用。也就是说，如果调用了不存在的对象方法，则会调用
    `__call()` 方法。


    **详细信息**


    如果从一个对象调用某个方法，而该对象没有这个方法，那么会从该对象自动调用 `__call()` 方法。`__call()` 方法的第一个参数是不存在的方法的名称。`__call()`
    方法的第二个参数是一个数组，其元素是传递给该不存在方法的参数。


    清单 7-9 是一个使用 `__call()` 方法的示例。


    ```php

    <?php

    class MyClass{

    function show($txt){

    echo $txt,"\n";

    }

    function __call($name,$args){

    if(strlen($name)>5){

    echo "参数个数：",sizeof($args),"\n";

    echo "方法 $name() 不存在！\n";

    }else{

    for($k=0;$k<sizeof($args);$k++){

    echo "[",($k+1),"] ",$args[$k],"\n";

    }

    }

    }

    }

    $obj=new MyClass();

    // 调用已存在的方法：

    $obj->show("MyClass 类");

    // 调用不存在的方法：

    $obj->display("Alpha");

    $obj->hello("Bravo","Charlie","Delta");

    ?>

    ```


    以下是程序执行的结果。


    ```

    程序的输出（来自清单 7-9）

    MyClass 类

    参数个数：1

    方法 display() 不存在！

    [1] Bravo

    [2] Charlie

    [3] Delta

    ```


    该程序使用了 `MyClass` 类，该类描述了一个带有一个参数的普通 `show()` 方法。当调用该方法时，会显示传递给该方法的参数值。需要使用该方法来表明
    `__call()` 方法的存在不会影响类中普通方法的操作。


    特殊方法 `__call()` 声明了两个参数。第一个参数 `$name` 表示从对象调用的、但该对象不存在的方法的名称。第二个参数 `$args` 是一个数组，包含传递给这个不存在的被调用方法的参数。


    在方法体中，使用了一个条件语句来测试 `strlen($name)>5` 这个条件。如果被调用（不存在）的方法的名称由超过五个字符组成，则该条件为真。如果为真，则
    `echo "参数个数：",sizeof($args),"\n"` 会显示一条消息，告知传递给该方法的参数数量。`echo "方法 $name() 不存在！\n"`
    则会显示一条表明该方法不存在的消息。


    如果 `strlen($name)>5` 条件为假，并且被调用方法的名称不超过 `5` 个字符，则会启动一个循环语句，遍历 `$args` 数组（传递给不存在方法的参数）的元素并显示它们的值。


    **详细信息**


    `sizeof()` 函数用于计算数组的大小。字符串的长度使用 `strlen()` 函数计算。


    基于 `MyClass` 类，创建了 `$obj` 对象。如果从该对象调用已存在的 `show()` 方法，一切都会正常进行，没有意外。


    `$obj->display("Alpha")` 命令从 `$obj` 对象调用了一个不存在的 `display()` 方法，参数为 `"Alpha"`。该方法的名称由超过五个字符组成。因此，当自动调用
    `__call()` 方法时，它会显示一条消息指出该方法不存在，并且还包含传递给该方法的参数数量信息（在这种情况下，有一个参数）。


    另一个不存在的方法由 `$obj->hello("Bravo","Charlie","Delta")` 指令调用。方法名称现在有五个字符长，因此自动调用的
    `__call()` 方法会显示传递给 `hello()` 方法的参数列表。


    当访问不存在的对象字段时，`__set()` 和 `__get()` 方法会被自动调用。具体来说，如果尝试给不存在的字段赋值，则会调用 `__set()`
    方法。`__set()` 方法的参数是被赋值的字段名称和赋值的值本身。


    **详细信息**


