  \n**图 16-18** UserController 已创建\n\n它创建了两个文件：\n\n```\nsrc/Controller/UserController.php\n\
  templates/user/index.xhtml.twig\n```\n\n让我们查看 `src/Controller/UserController.php`\
  \ 的内容：\n\n```php\nrender('user/index.xhtml.twig', [\n'controller_name' => 'UserController',\n\
  ]);\n}\n}\n```\n\n将路由从 `/user` 修改为 `/register`，并在浏览器中重新加载 `http://localhost:8000/register`：\n\
  \n```php\nclass UserController extends AbstractController\n{\n#[Route('/register',\
  \ name: 'app_user')]\n```\n\n代码的输出如图 16-19 所示。\n\n![Figure 16-19](img/514068_1_En_16_Fig19_HTML.png)\n\
  \n**图 16-19** UserController 代码输出\n\n检查上述代码，如果未提及 `GET` 或 `POST` 方法，则默认为 `GET` 请求，`/register`\
  \ 是 `GET` 请求的相对 URI 路径。当控制器拦截到对 `/register` 路径的 `GET` 请求时，它会通过调用 `render` 函数返回 `user/index.xhtml.twig`\
  \ 页面。稍后您将开发注册表单。现在，让我们为注册成功页面创建一个示例视图页面，并为接受注册提交的表单提交请求创建另一个路由。请参阅 `templates/user/registration_success.xhtml.twig`\
  \ 中的注册成功页面：您已成功注册！\n\n使用以下代码更新 `src/Controller/UserController.php` 中的 `GET` 路由，以添加\
  \ POST 请求处理程序：\n\n```php\n....\nuse Symfony\\Component\\HttpFoundation\\Request;\n\
  ....\n#[Route('/register', name: 'app_user', methods: ['GET', 'POST'])]\npublic\
  \ function index(Request $request): Response\n{\nif ($request->isMethod('POST')\
  \ {\nreturn $this->render('user/registration_success.xhtml.twig', [\n'controller_name'\
  \ => 'UserController',\n]);\n}\n...\n// Previous code for GET response\n}\n```\n\
  \n上述路由现在处理对 `/register` 路由的 `GET` 和 `POST` 请求，当向 `/register` 路径发送 `POST` 请求时，它返回注册成功页面。您已省略数据处理，稍后将完成。\n\
  \n要测试此更改，请使用 `curl` 命令打开终端，或使用 Postman。Postman 是一个用于运行 API 请求的 UI 界面。有关安装和使用的更多文档，请访问\
  \ [`https://learning.postman.com/docs/getting-started/introduction/`](https://learning.postman.com/docs/getting-started/introduction/)。\n\
  \n`curl` 请求命令如下：\n\n```bash\ncurl --location --request POST 'http://localhost:8000/register'\n\
  ```\n\n此命令的输出如图 16-20 所示。\n\n![Figure 16-20](img/514068_1_En_16_Fig20_HTML.jpg)\n\
  \n**图 16-20** Register 命令输出\n\nPostman 请求如图 16-21 所示。\n\n![Figure 16-21](img/514068_1_En_16_Fig21_HTML.png)\n\
  \n**图 16-21** Postman 工具中的 Register 命令输出\n\n### 注册视图表单\n\nSymfony 的 Twig 模板引擎提供了许多内置功能，可根据需要加载、循环、解析数据和使用内置函数。您将学习如何创建一个接受几个字段输入并将其提交到\
  \ `/register POST` 路由的表单。\n\n要添加表单功能，请通过运行以下命令安装包含此功能的包：\n\n```bash\ncomposer require\
  \ symfony/form\n```\n\nSymfony 允许您通过 `FormBuilder` 方法初始化表单，并将字段与实体关联，而无需显式管理大量验证。\n\
  \n第一个更改是在 `index` 方法内部创建 User 实体的实例：\n\n```php\n...\nuse App\\Entity\\User;\n...\n\
  public function register(Request $request, ManagerRegistry $doctrine): Response\n\
  {\n$user = new User();\n...\n```\n\n现在，您将使用表单构建器方法构建表单，并将其绑定到 `$user` 实例：\n\n```php\n\
  $form = $this->createFormBuilder($user) // 将 $user 绑定到 $form 实例\n// 将实体名称字段关联到 $form\
  \ 并显示为文本类型字段\n->add('name', TextType::class)\n// 将实体电子邮件字段关联到 $form 并显示为电子邮件类型字段\n\
  ->add('email', TextType::class)\n// 将实体密码字段关联到 $form 并显示为密码类型字段\n->add('password',\
  \ PasswordType::class)\n// 最后添加一个提交按钮\n->add('save', SubmitType::class, ['label'\
  \ => 'Register'])\n->getForm();\n```\n\n一旦表单构建器实例创建完成，您需要将 `$form` 关联并传递到视图层，即 `user/index.xhtml.twig`。通过使用以下内容更新\
  \ `index` 渲染调用来完成此操作：\n\n```php\nreturn $this->renderForm('user/index.xhtml.twig',\
  \ [\n'form' => $form,\n]);\n```\n\n开始对 `user/index.xhtml.twig` 中的视图文件进行更改，将所有内容替换为以下代码以使用创建的表单：\n\
  \n```twig\n{% extends 'base.xhtml.twig' %}\n{% block title %}Registration Page!{%\
  \ endblock %}\n{% block body %}\n{{ form(form) }}\n{% endblock %}\n```\n\n在此代码中，您已将标题和块主体替换为对\
  \ `form(form)` 的简单调用，该调用会加载传入的表单。这将创建一个包含三个字段和一个用于 XSS 防护的 csrf 令牌的基本表单 HTML 元素，如开发工具检查图\
  \ 16-22 所示。\n\n![Figure 16-22](img/514068_1_En_16_Fig22_HTML.png)\n\n**图 16-22**\
  \ 基本注册视图表单示例\n\n最终的控制器代码应如下所示：\n\n```php\ncreateFormBuilder($user)\n->add('name',\
  \ TextType::class)\n->add('email', EmailType::class)\n->add('password', PasswordType::class)\n\
  ->add('save', SubmitType::class, ['label' => 'Register'])\n->getForm();\nif ($request->isMethod('POST'))\
  \ {\nreturn $this->render('user/registration_success.xhtml.twig', [\n'controller_name'\
  \ => 'UserController',\n]);\n}\nreturn $this->renderForm('user/index.xhtml.twig',\
  \ [\n'form' => $form,\n]);\n}\n}\n```\n\n尝试使用一些示例值填写字段详细信息，然后单击 Register 按钮，以查看表单的\
  \ `POST` 提交请求的实际效果。\n\n提交后，它将显示如图 16-23 所示的输出。\n\n![Figure 16-23](img/514068_1_En_16_Fig23_HTML.jpg)\n\
  \n**图 16-23** 基本注册视图表单网页输出\n\n## 在数据库中存储用户数据\n\n您已经设置了视图和控制器，但尚未对数据进行任何操作。其中一个重要部分是解析\
  \ `POST` 请求提交的数据，进行验证，然后保存到数据库。\n\n现在您已经能够将数据发布到路由端点，您可以解析不同的值。这些值作为 Request 对象的一部分可用，并可用于与表单实体关联。让我们在实践中看看。在\
  \ `$form` 实例化之后，对 `index` 方法进行以下更改：\n\n```php\n...\n$form->handleRequest($request);\n\
  ...\n```\n\n现在有了上述更改，已与您的 User 实体关联的 `$form` 将拥有填充到各自字段的提交值，并可用于获取设置为这些值的 User 实体：\n\
  \n```php\n$user = $form->getData();\n```\n\n\n\n在获取表单数据之前，你需要验证一切是否正常，并且需要将 `isMethod()`\
  \ 函数调用检查替换为表单提供的一个便捷方法，用来检查表单是否已提交，以确认这是一个 POST 请求：\n\n```\nif ($form->isSubmitted()\
  \ && $form->isValid()) {\n$user = $form->getData();\n```\n\n现在，通过 Doctrine EntityManager\
  \ 将数据保存到数据库。在保存之前，出于安全考虑，你需要对密码进行加密。添加 `ManagerRegistry` 和 `UserPasswordHasherInterface`\
  \ 的命名空间，并将它们作为参数传递给 `index()`，这样 Symfony 就能通过依赖注入来实例化它们并传递给该函数。\n\n```\nuse Doctrine\\\
  Persistence\\ManagerRegistry;\nuse Symfony\\Component\\PasswordHasher\\Hasher\\\
  UserPasswordHasherInterface;\n...\npublic function index(\nRequest $request,\nManagerRegistry\
  \ $doctrine,\nUserPasswordHasherInterface $passwordHasher,\n): Response\n{\n...\n\
  $user->setPassword(\n$passwordHasher->hashPassword($user, $user->getPassword())\n\
  );\n$entityManager = $doctrine->getManager();\n$entityManager->persist($user);\n\
  $entityManager->flush();\n```\n\n这将把用户详细信息保存到 `user` 表中，并向用户返回注册成功模板。请注意，这里使用了哈希助手对密码进行单向哈希处理，以便密码以加密格式存储在数据库中，确保安全性。\n\
  \n现在，整个代码应该如下所示：\n\n```\ncreateFormBuilder($user)\n->add('name', TextType::class)\n\
  ->add('email', EmailType::class)\n->add('password', PasswordType::class)\n->add('save',\
  \ SubmitType::class, ['label' => 'Register'])\n->getForm();\n$form->handleRequest($request);\n\
  if ($form->isSubmitted() && $form->isValid()) {\n$user = $form->getData();\n$user->setPassword($passwordHasher->hashPassword($user,\
  \ $user->getPassword()));\n$entityManager = $doctrine->getManager();\n$entityManager->persist($user);\n\
  $entityManager->flush();\nreturn $this->render('user/registration_success.xhtml.twig',\
  \ [\n'controller_name' => 'UserController',\n]);\n}\nreturn $this->renderForm('user/index.xhtml.twig',\
  \ [\n'form' => $form,\n]);\n}\n}\n```\n\n现在让我们也检查一下数据库，确认用户详细信息已存储为加密密码，如图 16-24\
  \ 所示。\n\n![](img/514068_1_En_16_Fig24_HTML.png)\n\n图 16-24：检查包含加密密码的数据库\n\n## 总结\n\
  \n在本章中，你了解了开始使用 Symfony 的基本要素。你设置并配置了一个数据库，并添加了数据。你还学习了 Symfony 的一些主要特性。不过，在 Composer\
  \ 资源库中还有更多实用的特性和大量软件包等待你去发现。这是本书的最后一章。你已经掌握了 PHP 8 的基础知识！\n\n"
