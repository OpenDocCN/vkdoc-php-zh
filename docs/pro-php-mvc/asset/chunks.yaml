    supports namespaces. You can download version 2.0 from [http://packages.zendframework.com.](http://packages.zendframework.com)
    Be warned that it appears to differ significantly in terms of installation and
    use from the current version of Zend as used in this chapter.


    Getting Set Up


    Generating a functional application with Zend Framework is rather simple. The
    archives you can download all include a build script that will construct the recommended
    directory structure and even provide sample controllers, views, and configurations
    for your application. The steps we need to follow to begin building the sample
    application are as follows:


