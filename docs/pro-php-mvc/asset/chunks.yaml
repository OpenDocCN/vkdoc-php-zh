    **Chapter 26**


    **Zend Framework: Bootstrapping**


    The makers and maintainers of PHP, as the name suggests, maintain Zend Framework.
    It is the only framework (of the three we are focusing on) where the application
    architecture isn’t already created by the framework’s download archive. This is
    due to a design goal of Zend Framework, which is to be a “use-at-will” architecture
    of loosely coupled components.


