    \ Imagine 类。最后，在用于打开和保存缩略图的字符串方面存在一些小的差异。\n\n所有这些都体现在`profile()`操作和`profile.ctp`视图模板中，如代码清单\
    \ 32-9 和 32-10 所示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n###\
    \ 第 32 章 ■ CakePHP：扩展\n\n**代码清单 32-9** `~/app/Controller/UsersController.php`（摘录）\n\
    \n```php\nclass UsersController extends AppController\n{\n    public function\
    \ profile()\n    {\n        $this->_isSecure();\n        if (sizeof($this->user[\"\
    Photo\"]))\n        {\n            $this->set(\"photo\", $this->_thumbnail($this->user[\"\
    Photo\"][0]));\n        }\n        $this->set(\"user\", $this->user);\n    }\n\
    }\n```\n\n**代码清单 32-10** `~/app/View/Users/profile.ctp`\n\n```php\n<?php if ($photo):\
    \ ?>\n<img src=\"/uploads/<?php echo $photo; ?>\" />\n<?php endif; ?>\n<h1><?php\
    \ echo $user[\"User\"][\"first\"]; ?> <?php echo $user[\"User\"][\"last\"]; ?></h1>\n\
    ```\n\n这是一个个人资料页面！\n\n我们现在知道如何使用内置的 CakePHP 集合，以及如何包含第三方（供应商）库。\n\n### 问题\n\n\
    1.  CakePHP 提供了第一个处理关系的 ORM 库（在我们迄今为止构建/使用的所有框架中）。这个概念有哪些优点和缺点？\n2.  与之前的章节相比，我们在本章中生成表单的方式大不相同。这如何体现好处和坏处？\n\
    \n### 答案\n\n1.  在任何 ORM 中，关系都是一个难以正确处理的问题。我们在本章中创建的关系易于设置，但在很大程度上依赖于命名约定。我们无需做任何工作即可检索相关照片，这大大减轻了我们的工作量。这也需要对\
    \ CakePHP 中关系的工作原理有基本了解。\n2.  CakePHP 并不是我们用来支持自动表单生成的唯一框架。Zend Framework 也支持此类功能；然而，两个框架都需要深入了解如何定义这些表单以及如何使用它们各种功能。与任何自动生成的代码一样，即使是很小的更改也需要大量了解自动完成的操作。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n### 第 32 章 ■ CakePHP：扩展\n\
    \n### 练习\n\n1.  在本章中，我们选择使用`Vendor`目录作为 Imagine 库的存放位置。对于计划在其他项目中重用的第三方代码，使用插件要好得多，但这也需要大量代码。尝试将我们基于供应商的\
    \ Imagine 代码转换为插件。\n2.  CakePHP 的 ORM 库还支持通过在主数据对象上调用`saveAll()`方法来创建多个数据库记录。尝试将照片和用户的单独`save()`调用合并起来。\n\
    \n> **注意** 您可以在此处了解有关创建相关记录的这种方法的更多信息：[`book.cakephp.org/2.0/`](http://book.cakephp.org/2.0/en/models/saving-your-data.html#model-saveall-array-data-null-array-options-array)\n\
    > [en/models/saving-your-data.html#model-saveall-array-data-null-array-options-array](http://book.cakephp.org/2.0/en/models/saving-your-data.html#model-saveall-array-data-null-array-options-array)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 33 章\n## CakePHP：测试\n\
    \n与我们在 Zend Framework 中进行的测试类似，CakePHP 的单元测试依赖于 PHPUnit，这使得我们在 CakePHP 中的收尾工作变得容易。\n\
    \n### 目标\n\n*   我们需要学习如何创建并对控制器运行测试。\n\n### 测试\n\n我们可以创建一些简单的测试来验证 CakePHP 控制器的功能。\n"
- fmt: "因为CakePHP中我们编写的大部分代码都与控制器相关，所以我们只针对`UsersController`中的部分操作编写测试。\n\nCakePHP单元测试需要放置在`~/app/Test/`目录下，我们创建的第一组测试如清单33-1所示。\n\
    \n**清单33-1.** `~/app/Test/Controller/UsersControllerTest.php`（摘录）\n```php\nclass\
    \ UsersControllerTest extends ControllerTestCase\n{\n\n    public function testRegisterGet()\n\
    \    {\n        $result = $this->testAction(\"/register\", array(\n          \
    \  \"method\" => \"get\",\n            \"return\" => \"contents\"\n        ));\n\
    \        $this->assertContains(\"data[User][first]\", $result);\n        $this->assertContains(\"\
    data[User][last]\", $result);\n        $this->assertContains(\"data[User][email]\"\
    , $result);\n        $this->assertContains(\"data[User][password]\", $result);\n\
    \        $this->assertContains(\"data[User][photo]\", $result);\n    }\n\n   \
    \ public function testLoginGet()\n    {\n        $result = $this->testAction(\"\
    /login\", array(\n            \"method\" => \"get\",\n            \"return\" =>\
    \ \"contents\"\n        ));\n        $this->assertContains(\"data[User][email]\"\
    , $result);\n        $this->assertContains(\"data[User][password]\", $result);\n\
    \    }\n\n    public function testLogoutGet()\n    {\n        $result = $this->testAction(\"\
    /logout\", array(\n            \"method\" => \"get\",\n            \"return\"\
    \ => \"contents\"\n        ));\n    }\n\n    public function testProfileGet()\n\
    \    {\n        $result = $this->testAction(\"/profile\", array(\n           \
    \ \"method\" => \"get\",\n            \"return\" => \"contents\"\n        ));\n\
    \    }\n\n}\n```\n\n这里展示的测试仅检查操作能否无错调用，以及注册和登录视图模板是否包含各种表单字段。`assert*()`方法与我们在测试Zend\
    \ Framework和PHPUnit时看到的完全相同，因为它们都由PHPUnit库提供。\n\n> **注意** CakePHP也支持集合的测试，详见：\n\
    > [http://book.cakephp.org/2.0/en/development/testing.html#testing-components](http://book.cakephp.org/2.0/en/development/testing.html#testing-components)\n\
    \n我们需要设置的第二类测试用于检查POST请求的响应，如清单33-2所示。\n\n**清单33-2.** `~/app/Test/Controller/UsersControllerTest.php`（摘录）\n\
    ```php\nclass UsersControllerTest extends ControllerTestCase\n{\n\n    public\
    \ function testLoginPost()\n    {\n        $result = $this->testAction(\"/login\"\
    , array(\n            \"method\" => \"post\",\n            \"return\" => \"contents\"\
    ,\n            \"data\" => array(\n                \"User\" => array(\n      \
    \              \"email\" => \"cgpitt@gmail.com\",\n                    \"password\"\
    \ => \"chris\"\n                )\n            )\n        ));\n        $this->assertEquals(true,\
    \ isset($this->headers[\"Location\"]));\n        if (isset($this->headers[\"Location\"\
    ]))\n        {\n            $this->assertContains(\"/profile\", );\n        }\n\
    \    }\n\n}\n```\n\n这个测试首先向`login()`操作提交一些数据，然后检查表单是否重定向到了个人资料页面。你的数据显然需要反映本地数据库中注册用户账户的详细信息，但逻辑保持不变。\n\
    \n归根结底，为应用程序编写的测试越多，在后续需要修改或扩展时，应用程序的表现就会越好。本章中我们编写的测试数量有限，但至此你应该已经理解测试的工作原理，并且明白由开发者决定编写多少测试以及覆盖哪些功能。\n\
    \n> **注意** 你可以在此处了解更多关于CakePHP中PHPUnit测试的信息：\n> [http://book.cakephp.org/2.0/en/development/testing.html](http://book.cakephp.org/2.0/en/development/testing.html)\n\
    \n## 问题\n\n1. Zend Framework和CakePHP都使用了相同的单元测试库PHPUnit。为什么这是一个好主意？\n2. 从技术上讲，是否可以测试诸如登录会话管理和设置页面更新之类的功能？\n\
    \n## 答案\n\n1. 许多框架使用PHPUnit的好处是，无论开发者使用哪种框架，都可以用相同的方式编写单元测试。这在节省学习新测试框架的时间上具有明显优势，同时也帮助相互竞争的多个框架了解其竞争对手正在测试什么。\n\
    2. 从技术上讲，通过一系列连续的请求，可以建立成功的登录，然后进行基于会话的进一步交互。本章中我们选择不深入探讨，因为这种持续请求测试很快会暴露出代码库之间的细微差异。诸如路由差异或拼写差异这类简单问题，都可能决定单元测试的成败。\n\
    \n## 练习\n\n1. 在本章中，我们仅创建了五个单元测试，但还有很多改进空间。尝试创建至少总共十个单元测试，覆盖示例应用程序的大部分功能。\n2. 我们简要讨论了测试基于会话的交互，但尚未为此编写任何测试。尝试创建一个或两个依赖于成功登录的测试。\n\
    \n---\n\n## 附录A\n## 设置Web服务器\n\n在本章中，我们将学习如何在Windows、Linux和OS X中安装和配置Web服务器。\n\
    \n### 目标\n\n- 安装Apache 2.2+、MySQL 5+和PHP 5.3+。\n- 安装Memcached。\n- 运行单元测试以确保一切正常。\n\
    \n### Windows\n\n在本节中，我们将介绍在Windows 7中的安装过程。这些软件包的安装通常被称为WAMP（**W**indows **A**pache\
    \ **M**ySQL **P**HP）。让我们开始吧。\n\n#### 步骤1\n\n访问[http://www.wampserver.com/en/download.php](http://www.wampserver.com/en/download.php)并下载最适合你系统的版本。如果你使用的是64位PC，则需要64位安装程序。如果不确定，请坚持使用32位安装程序，它应该能在64位和32位PC上运行。下载安装程序后，启动它并开始完成步骤，如图A-1所示。\n\
    \n![Image 3](index-436_1.png)\n![Image 4](index-436_2.png)\n\n**图A-1.** 使用WAMP安装程序进行设置\n\
    \n你可以将WAMP安装到其推荐的默认`c:\\wamp`目录。你也可以使用其推荐的默认SMTP和电子邮件设置，如果以后需要，可以更改。在某个时刻，它会要求你选择默认浏览器。由于我安装了Google\
    \ Chrome，我希望将其设为默认浏览器。找到该可执行文件的最快方法是右键单击Google Chrome快捷方式图标，然后选择“属性”>“快捷方式”。复制整个“目标”值，并将其粘贴到“文件名”框中。如图A-2和图A-3所示。\n\
    \n**图A-2.** 选择默认浏览器\n\n![Image 5](index-437_1.png)\n\n**图A-3.** 获取Google Chrome的路径\n\
    \n完成WAMP安装后，你将在系统托盘中看到一个新图标。左键单击此图标，你将看到一个弹出菜单。单击“localhost”。\n\n> **注意** 你不必使用Google\
    \ Chrome。你可以以同样的方式选择任何其他浏览器。\n\n#### 讨厌的Skype！\n\n每次在同时运行Skype的Windows系统上安装WAMP时，我反复遇到的一个问题是Apache无法加载。这是由于浏览器和Skype的工作方式所致。\n\
    \n长期以来，Web服务器默认在端口80上提供内容。同样，浏览器从域名的端口80请求网站。你可以轻松更改这些设置，但它们是标准。因此，端口80是一个常用端口。路由器和安全软件通常保持此端口开放以发送/接收数据，因为它们假设这里只会有HTTP流量。"
  raw: 'Because the majority of code we have written in CakePHP concerns the controller,
    we will only write tests for some of the actions in the UsersController.


    CakePHP unit tests need to be placed n the ~/app/Test/ directory, and the first
    set of tests that we will create are shown in Listing 33-1.


    ***Listing 33-1.*** ~/app/Test/Controller/UsersControllerTest.php (Extract) class
    UsersControllerTest extends ControllerTestCase


    {


    public function testRegisterGet()


    {


    $result = $this->testAction("/register", array(


    "method" => "get",


    "return" => "contents"


    ));


    $this->assertContains("data[User][first]", $result);


    $this->assertContains("data[User][last]", $result);


    $this->assertContains("data[User][email]", $result);


    $this->assertContains("data[User][password]", $result);


    $this->assertContains("data[User][photo]", $result);


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 33 ■ Cakephp: testing


    public function testLoginGet()


    {


    $result = $this->testAction("/login", array(


    "method" => "get",


    "return" => "contents"


    ));


    $this->assertContains("data[User][email]", $result);


    $this->assertContains("data[User][password]", $result);


    }


    public function testLogoutGet()


    {


    $result = $this->testAction("/logout", array(


    "method" => "get",


    "return" => "contents"


    ));


    }


    public function testProfileGet()


    {


    $result = $this->testAction("/profile", array(


    "method" => "get",


    "return" => "contents"


    ));


    }


    }


    The tests shown here simply check that the actions can be called without raising
    errors, and that the register and login view templates contain various form fields.
    The assert*() methods are exactly the same as we saw when testing with Zend Framework
    and PHPUnit, since they are all provided by the PHPUnit library.


    ■ **Note** Cakephp also supports the testing of Collections, which is outlined
    here:


    [http://book.cakephp.org/2.0/en/development/testing.html#testing-components](http://book.cakephp.org/2.0/en/development/testing.html#testing-components)


    The second kind of test we need to set up checks the response of post requests,
    as shown in Listing 33-2.


    ***Listing 33-2.*** ~/app/Test/Controller/UsersControllerTest.php (Extract) Class
    UsersControllerTest Extends ControllerTestCase


    {


    public function testLoginPost()


    {


    $result = $this->testAction("/login", array(


    "method" => "post",


    "return" => "contents",


    "data" => array(


    "User" => array(


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 33 ■ Cakephp: testing


    "email" => "cgpitt@gmail.com",


    "password" => "chris"


    )


    )


    ));


    $this->assertEquals(true, isset($this->headers["Location"]));


    if (isset($this->headers["Location"]))


    {


    $this->assertContains("/profile", );


    }


    }


    }


    This test begins by posting some data to the login() action and checks to see
    that the form then redirects to the profile page. Your data will obviously need
    to reflect the details of a user account registered in your local database, but
    the logic remains the same.


    At the end of the day, the more tests you write for your applications, the better
    they will be when the time comes to change or extend them. We wrote a paltry amount
    of tests in this chapter, but by now you should understand how they work and that
    it is up to the developer when deciding just how many tests to write and what
    functionality to cover.


    ■ **Note** You can learn more about phpUnit tests in Cakephp here:


    [http://book.cakephp.org/2.0/en/development/testing.html](http://book.cakephp.org/2.0/en/development/testing.html)


    Questions


    1\. Both Zend Framework and CakePHP use the same unit-testing library PHPUnit.
    Why is this a good idea?


    2\. Is it technically possible to test things like login session management and
    settings page updates?


    Answers


    1\. The benefit of many frameworks using PHPUnit is that developers can write
    unit tests in the same way, no matter the framework they are using. This has obvious
    benefits in time saved learning new testing frameworks, and also helps multiple
    competing frameworks know what their competition is testing for.


    2\. It is technically possible, while requiring a long chain of requests, to establish
    a successful login, followed by further session-based interaction. We have chosen
    not to go so in-depth in this chapter, as this kind of sustained request testing
    quickly shows subtle differences in the makeup of my codebase versus your codebase.
    Things as simple as route differences or as small as spelling differences can
    make or break unit tests.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter 33 ■ Cakephp: testing


    Exercises


    1\. In this chapter, we created a mere five unit tests, but there is much room
    for improvement. Try to create at least ten unit tests in total, which cover the
    majority of your sample application’s functionality.


    2\. We have spoken briefly about testing session-based interaction, but haven’t
    written any tests for it. Try to create a test or two that depend on a successful
    login.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Appendix A**


    **Setting Up a Web Server**


    In this chapter, we will learn how to install and configure a web server in Windows,
    Linux, and OS X.


    Goals


    • Install Apache 2.2+, MySQL 5+, and PHP 5.3+.


    • Install Memcached.


    • Run our unit tests to ensure everything is working as it should.


    Windows


    In this section, we will cover the installation process in Windows 7. The installation
    of these software packages is commonly known as WAMP (**W**indows **A**pache **M**ySQL
    **P**HP). Let’s get started.


    Step 1


    Go t[o http://www.wampserver.com/en/download.php and do](http://www.wampserver.com/en/download.php)wnload
    the version most applicable to your system. If you are running a 64-bit PC, then
    you will want the 64-bit installer. If you are unsure, stick with the 32-bit installer,
    which should work on both 64-bit and 32-bit PCs. After you have downloaded the
    installer, start it up, and start completing the steps, as shown in Figure [A-1](#index_split_007.html#p436).


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 3](index-436_1.png)


    ![Image 4](index-436_2.png)


    appendix a ■ Setting Up a Web Server


    ***Figure A-1.** Setting up with the WAMP installer*


    You can install WAMP to the default c:\wamp directory, which it suggests. You
    can also use the default SMTP


    and e-mail settings it suggests, which you can change later if you need to. At
    some point, it will ask you to choose your default browser. Since I have Google
    Chrome installed, I want to use that as my default. The quickest way to find that
    executable is to right-click the Google Chrome shortcut icon and select Properties
    ➤ Shortcut. Then copy the whole Target value and paste it into the File name box.
    This is demonstrated in Figures [A-2](#index_split_007.html#p436) [and A-3.](#index_split_007.html#p437)


    ***Figure A-2.** Choosing the default browser*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 5](index-437_1.png)


    appendix a ■ Setting Up a Web Server


    ***Figure A-3.** Getting the path to Google Chrome*


    After you have completed the installation of WAMP, you will see a new icon in
    your system tray. If you left-click on this icon, you will see a pop-up menu.
    Click localhost.


    ■ **Note** You don’t have to use google Chrome. You can target any other browser
    in the same manner.


    Naughty Skype!


    A recurring problem I have encountered each time I installed WAMP on a Windows
    system, which also happened to be running Skype, was that Apache would not load.
    This is due to how browsers and Skype work.


    It has long been standard for web servers to serve their content at port 80\.
    Likewise, browsers request the web site from port 80, on a domain. You can easily
    change these, but they are the standards. Port 80 is, therefore, a popular port.
    Routers and security software frequently leave this port open for sending/receiving
    data, as they assume only HTTP traffic will happen here.'
