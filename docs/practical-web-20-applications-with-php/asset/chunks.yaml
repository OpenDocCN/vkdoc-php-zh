    ■**Note** The actual HTML tags we used in this example are not important—it’s
    the names of the classes and where the classes are applied that is important.


    Although many more options are available in the hCard microformat, this is still
    a complete and working example. The code begins by using the vcard class on the
    root element of the contact details (that is, the element that wraps the contact
    information). This is to indicate the remainder of the details are contained within
    this element.


    Next we use the fn property, which is the only required property of hCard. This
    stands for formatted name and usually contains the person’s first and last name.
    Following this, we specify the email and phone properties accordingly. Note that
    we applied the email property to a hyperlink. There is no required order for these
    parameters; you could list the value for fn last if you wanted.


    ■**Caution** If you choose to include your e-mail address in a published hCard,
    you are making it easy for the e-mail address to be spammed, since the e-mail
    value must comply with §3.3.2 of RFC 2426 (available


    [from http://www.ietf.org/rfc/rfc2426.txt). Unless your hCard is](http://www.ietf.org/rfc/rfc2426.txt)
    available only to trusted users, a better option may be not to include the e-mail
    address at all.


    **Why Use Microformats?**


    It may seem as though from the previous example that we’re not actually doing
    anything differently than what we would normally. Indeed, this is true, except
    by using microformats we are forced to name particular elements in a certain way.
    This provides a uniformity between all sites that use microformats.


    It is fair to say that an extremely large majority of web users will have no idea
    you are using microformats, because currently it doesn’t actually change their
    experience in any way.


    However, if you make a conscious effort to use microformats wherever you can,
    already you are forcing yourself to write clean and consistent code.


    Although I am only speculating, I believe as the uptake of microformats continues
    and its popularity amongst web developers increases, it will become a crucial
    and widely used tool by end users, just as the popularity of RSS and Atom feeds
    has grown in the past few years.


    All major browsers now have built-in web feed readers (Microsoft has put an emphasis
    on web feeds with the release of Internet Explorer 7 and Windows Vista in the
    past year). It is highly possible that in upcoming releases of web browsers that
    microformat readers will be integrated.


