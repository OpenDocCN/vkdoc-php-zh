    动手实践


    1.  将从本书网站获取的上述三个文件复制到你的项目文件夹中（即你在 Apache 中运行项目的位置）。运行 HTML 程序。测试成功了吗？如果没有，原因是什么？


    2.  更改你的 `.js` 文件的名称，并修改 HTML 文件中的链接标签以反映新的文件名。测试你的 HTML 程序。测试成功了吗？如果没有，原因是什么？


    3.  更改你的 PHP 程序的名称。修改 `.js` 文件以反映 PHP 程序的新名称。测试你的 HTML 程序。测试成功了吗？如果没有，原因是什么？


    PHP、AJAX 和 CSS——智能手机 Web 应用程序


    至此，你应该开始发现创建 PHP 应用程序的灵活性和强大功能。你可能有点失望，因为我们没有详细讨论智能手机的应用程序开发。目前，PHP 通常不用于创建智能手机应用程序。然而，随着
    PHP 8 效率和速度的提高，或许将来某一天会实现。但有时，我们确实希望让智能手机能够通过其浏览器访问 Web 应用程序。只需对之前的演示进行少量修改，我们就能提供这种能力。这为你提供了一个适用于任何包含浏览器的设备（无论大小）的应用程序。


    你可以在不调整 HTML（除添加一个链接外）、JavaScript 或 PHP 代码的情况下进行此更改。你可以调整 `ajaxdemo` 网页，使其能够在智能手机或其他移动设备上使用
    CSS 正确格式化。在这个例子中，你只需要修改 HTML 文件来检测显示屏幕的尺寸（界面）。然后，CSS 可用于更改图形以适配合适的屏幕尺寸。


    如果 PHP 文件包含大量 HTML（和/或其他 CSS 代码），我们可能还需要调整 PHP 文件。然而，我们应该始终考虑让 CSS 来格式化整体输出（而不是
    PHP 文件）。这将允许你在多个容器（主机）中使用相同的代码。


    你可以在 `ajaxdemo.html` 文件中原始 CSS 文件链接的下方添加以下几行代码：


    注意


    新的完整 HTML 文件位于 Apress 网站上。


    这两行代码将尝试确定显示屏的尺寸，并为任何 480 像素或更小的屏幕使用新的 CSS 文件。该演示程序本身就能适配大多数移动设备。不过，我们还是对它进行一些调整，以移除部分间距、内边距和外边距。


    注意


    你也可以针对多种设备尺寸使用 CSS3 Flexbox 属性。由于使用该属性需要对 CSS 有更深入的了解，因此我们坚持使用“旧式”方法。你可以通过以下 w3schools
    链接找到有关 CSS3 Flexbox 的更多信息：[`www.w3schools.com/css/css2_flexbox.asp`](http://www.w3schools.com/css/css2_flexbox.asp)。


    ```

    body { background-color: #000000;

    font-family: Arial, Verdana, sans-serif; margin: 0; }

    #wrapper { margin: 0 auto;

    width: 100%;

    margin: 0;

    min-width: 0px;

    background-color: #cc0000;

    color: #000066; }

    #header { background-color: #ff0000;

    color: #00005D;

    font-size: 100%;

    padding: 0.5px; }

    h1 { margin: 0px; }

    #content { background-color: #ffffff;

    color: #000000;

    padding: 0.5px;

    overflow: auto; }

    #footer { font-size: 80%;

    text-align: left;

    padding: 0px;

    background-color: #0000FF;

    color: #ffffff;

    clear: both;}

    h2 { color: #000000;

    font-family: Arial, sans-serif;

    margin: 0px; }

    #floatright { float: none;

    margin: 0px; }

    示例 2-4

    ajaxdemomobile.css 文件

    ```


    将示例 2-4 与示例 2-3 进行比较。示例 2-4 中的代码并不完美，但它让你了解了可以在原始 CSS 文件中进行哪些调整以适配移动设备显示。此示例将外边距和内边距缩小到零或几乎为零。这大大减少了在较小移动设备显示屏上浪费的空间。


    动手实践


    1.  在 Apress 网站上找到新的 HTML 文件和 CSS 文件。如果你有 Web 主机提供商，请将这些文件（以及 `.js` 文件）上传到主机上。尝试从你的智能手机访问
    HTML 页面。测试成功了吗？如果没有，原因是什么？页面在你的手机上格式正确吗？如果没有，你认为需要调整什么？


    注意


    如果你没有互联网上的主机网站，你也可以通过下载网上免费的移动模拟器之一来测试这个 CSS 文件。你也可以修改 HTML 文件中的链接标签，使其指向 `ajaxdemomobile.css`
    文件而不是 `ajaxdemo.css` 文件。然后尝试缩小浏览器窗口的大小，以模拟智能手机屏幕。


    PHP、HTML、JavaScript、CSS 和动态网页


    作为 PHP 程序容器（主机）的最后一个例子，我们来考虑一下浏览器。正如你在本章中所见，你可以使用 HTML 文件来调用我们的 PHP 程序（在前一个演示中点击按钮）。正如第
    1 章所述，这将导致 PHP 程序执行，并将结果返回给浏览器。你也可以让 PHP 程序返回 HTML 代码。


    ```

    <?php

    print "<html><body>";

    print "<h1>我的程序</h1>";

    print "<p>世界你好</p>";

    print "</body></html>";

    ?>

    示例 2-5

    由 PHP 程序创建的动态 HTML 页面

    ```

