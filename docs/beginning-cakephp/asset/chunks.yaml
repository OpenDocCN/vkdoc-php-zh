- fmt: "# Chapter 4: Naming Files and Designing the Database\n\nTo build this relationship\
    \ into the models, first create the `Post` model as `app/models/post.php`. Listing\
    \ 4-4 contains the model’s code to assign it a “belongs to” relationship with\
    \ the `User` model.\n\n**Listing 4-4.** The `Post` Model\n\n```\n1 <?\n2 class\
    \ Post extends AppModel {\n3   var $name = 'Post';\n4   var $belongsTo = array('User');\n\
    5 }\n6 ?>\n```\n\nLine 4 of Listing 4-4 shows how to enter a “belongs to” relationship\
    \ in Cake. You do this by assigning an array of models that are part of the relationship\
    \ to the current model. The class object variable Cake uses to build “belongs\
    \ to” relationships is the `var $belongsTo` attribute.\n\nIn any Cake application,\
    \ “belongs to” relationships are made by following the code on line 4. You can\
    \ add relationships by including them in the array syntax.\n\n## `className` Parameter\n\
    \nA possible key to be included with the `$belongsTo` settings is `className`.\
    \ Simply put, `className` is the model to which the current model belongs. In\
    \ this case, it would be set to `User`, meaning the class name of the users table’s\
    \ model. If you decide to abandon Cake’s model naming conventions or if there\
    \ is a complex reason for naming a model other than the standard Cake convention,\
    \ then you will need to specify the name in this setting; otherwise, Cake will\
    \ not be able to link the association on its own.\n\n## `foreignKey` Parameter\n\
    \nThis key sets the foreign key found in the related model. This setting is useful\
    \ for specifying multiple “belongs to” relationships.\n\n## `conditions` Parameter\n\
    \nThis key contains a SQL string that filters related model records. Generally,\
    \ it will contain an equals/not-equals SQL statement for a field (for example,\
    \ `Post.published = 1`).\n\n## `fields` Parameter\n\nBy default, Cake will return\
    \ all fields from the associated table. In this case, all fields from the `User`\
    \ record, which is associated with the current post, will be fetched and made\
    \ available to the `Post` model. You can limit this by using the `fields` key.\n\
    \nYou can set these keys to your own values by assigning them as an array to each\
    \ item in the `$belongsTo` array. Listing 4-5 shows the `Post` “belongs to” relationship\
    \ with all keys displayed.\n\n**Listing 4-5.** BelongsTo Keys Are Assigned to\
    \ the `Post::User` Relationship\n\n```\nvar $belongsTo = array(\n  'User'=>array(\n\
    \    'className'=>'User',\n    'foreignKey'=>'user_id',\n    'conditions'=>null,\n\
    \    'fields'=>null\n  )\n);\n```\n\n## “Has One”\n\nEach relationship with association\
    \ mapping must be specified in both directions. In other words, just saying that\
    \ posts belong to users is not enough. You must also specify in the `User` model\
    \ how users are associated to any other table. In this case, a user will “have\
    \ many” posts.\n\nThree relationships are possible — “has one,” “has many,” and\
    \ “has and belongs to many.” First I’ll discuss the “has one” association.\n\n\
    This relationship is exactly a one-to-one relationship. In applications that assign\
    \ profiles to users, such as social networking web sites, the “has one” relationship\
    \ is used. Each user has one profile, and one profile belongs to just one user.\n\
    \nTo establish the “has one” relationship, you set the `$hasOne` attribute like\
    \ you did with `$belongsTo` in the `Post` model (see Listing 4-6).\n\n**Listing\
    \ 4-6.** The `$hasOne` Attribute String That Sets a “Has One” Relationship in\
    \ the `User` Model\n\n```\nvar $hasOne = array('Post');\n```\n\n### `className`\
    \ Parameter\n\nFor a “has one” relationship, `className` should always be set\
    \ to the model that contains the `belongsTo` attribute pointing to the current\
    \ model.\n\n### `foreignKey`, `conditions`, and `fields` Parameters\n\nThese are\
    \ similar to the “belongs to” `foreignKey`, `conditions`, and `fields` parameters.\
    \ Set them to add more specific control to the “has one” relationship.\n\n###\
    \ `dependent` Parameter\n\nWhen deleting records in a “has one” relationship,\
    \ you may want both sides of the association to be deleted. For example, when\
    \ a user has one profile and the user is deleted, you may want the associated\
    \ profile to be deleted also. In these cases, the `dependent` key allows you to\
    \ do this easily. By default, it is set to `false`. Set `dependent` to `true`\
    \ to delete records in both tables when the delete action is run through the associated\
    \ model.\n\nIn the blog you are building, you have no need of a “has one” relationship.\
    \ We will make use of another important relationship in Cake: “has many.”\n\n\
    ## “Has Many”\n\nYou’ve created the `Post` model; it’s time to make the `User`\
    \ model. Create the `User` model in the `app/models` directory and work in the\
    \ code shown in Listing 4-7.\n\n**Listing 4-7.** The `User` Model\n\n```\n1 <?\n\
    2 class User extends AppModel {\n3   var $name = 'User';\n4   var $hasMany = array('Post');\n\
    5 }\n6 ?>\n```\n\nFor your blog, each user will have many posts. Even if a user\
    \ enters only one post, you would still want the relationship to be capable of\
    \ saving more than one post per user. By telling the `User` model that multiple\
    \ post records are associated with it, and by completing the relationship in the\
    \ `Post` model with the `belongsTo` attribute, Cake can now link the two together.\n\
    \nFor more control, you may want to enter more parameters for the “has many” relationship.\n\
    \n### `className`, `foreignKey`, `conditions`, and `fields` Parameters\n\nThese\
    \ parameters specify the same things as described in the “belongs to” relationship\
    \ earlier.\n\n### `dependent` Parameter\n\nThis setting behaves similarly to how\
    \ it is described for the “has one” relationship. In the “has many” relationship,\
    \ setting `dependent` to `true` will work recursively. In other words, if you\
    \ set the `$hasMany` attribute in the `User` model to `dependent=>true`, then\
    \ whenever a user is deleted, *all* posts ever assigned to that user will be deleted\
    \ as well.\n\n### `order` Parameter\n\nYou can control the sorting order of the\
    \ associated records by entering SQL syntax in this parameter. For example, in\
    \ the `User` model, you could set `order` to `Post.datetime ASC`, and it would\
    \ order all associated posts by their date and time in ascending order.\n\n###\
    \ `limit` Parameter\n\nSome database requests may return a substantial number\
    \ of associated records. You may want to limit the number of returned records\
    \ to cut down on server load time. You can do this by setting this parameter to\
    \ a value representing the maximum number of associated records Cake will fetch\
    \ from the database.\n\n### `finderQuery` Parameter\n\nTo produce even more customized\
    \ results, you may enter a SQL string in the `finderQuery` key, and it will run\
    \ when the associated records are queried. You really should need to use this\
    \ option only if your application requires a high level of database customization.\
    \ Most of the time, you will be able to work just fine using Cake’s built-in model\
    \ functions.\n\nThe “has many” relationship is extremely useful for helping to\
    \ design effective databases. If you know that you intend to put a select menu\
    \ in your application for a series of options that will be stored in the database,\
    \ the “has many” relationship can help you do so without writing a static list\
    \ in HTML. Instead, you could build a table to store those options and associate\
    \ them through the models using a “has many” relationship. Then, no matter what\
    \ may happen with feature creep or with adding or deleting options from the list,\
    \ you can rest assured the application isn’t broken and can handle the changes.\
    \ It’s built on a database, not on static forms, meaning that the application\
    \ is dynamic and can change easily.\n\n## Testing the Associations"
