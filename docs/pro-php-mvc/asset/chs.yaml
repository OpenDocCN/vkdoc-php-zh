  \ `Application_Model_User`类（续）\n\n```\nclass Application_Model_User\n{\n    public\
  \ function save()\n    {\n        // initialize data\n        $data = array(\n \
  \           \"first\" => $this->first,\n            \"last\" => $this->last,\n \
  \           \"email\" => $this->email,\n            \"password\" => $this->password,\n\
