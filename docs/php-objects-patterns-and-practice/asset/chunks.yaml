    : \"0.6.*\",\n\"ext-xml\": \"*\"\n}\n}\n```\n\nNow, when we run `composer install`,\n\
    PHPUnit and all sorts of dependent packages are downloaded and\ninstalled:\n\n\
    ```\n$ composer install\nLoading composer repositories with package information\n\
    Updating dependencies (including require-dev)\n- Installing abraham/twitteroauth\
    \ (0.6.4)\nLoading from cache\n- Installing symfony/yaml (v3.1.3)\nDownloading:\
    \ 100%\n- Installing sebastian/version (2.0.0)\nDownloading: 100%\n....\n- Installing\
    \ phpspec/prophecy (v1.6.1)\nDownloading: 100%\n- Installing myclabs/deep-copy\
    \ (1.5.1)\nLoading from cache\n- Installing phpunit/phpunit (5.5.0)\nDownloading:\
    \ 100%\nsebastian/global-state suggests installing ext-uopz (*)\nphpunit/phpunit-mock-objects\
