  \ $entry\n// $entry 将是一个包含 entry_id、title 和 intro 属性的 StdClass 对象\nwhile ( $entry\
  \ = $entries->fetchObject() ) {\n$href  = \"index.php?page=blog&id=$entry->entry_id\"\
  ;\n// 为每个条目创建一个 \n$info .= \"\n$entry->title\n$entry->intro\n阅读更多\n\n\";\n}\n//\
  \ 结束 \n$info .= \"\";\n?>\n清单 7-16\nlist-entries-html.php\n```\n\n```\n$entriesFound\
  \ = isset( $entries );\nif ( $entriesFound === false ) {\ntrigger_error( 'views/list-entries-html.php\
  \ 需要 $entries' );\n}\n```\n\n`$entries`将包含数据库中的博客条目。如果缺少该变量，则会触发错误以指示问题。在实际生产环境中，这需要替换为一条告知用户当前没有博客的提示信息。\n\
  \n```\nwhile ( $entry = $entries->fetchObject() ) {\n$href  = \"index.php?page=blog&id=$entry->entry_id\"\
  ;\n// 为每个条目创建一个 \n$info .= \"\n$entry->title\n$entry->intro\n阅读更多\n\n\";\n}\n```\n\
  \n`while`循环首先尝试获取下一个对象（数据库表中的条目）并将其放入`$entry`中。`while`循环将成功的获取视为`true`状态。如果获取不成功（没有更多记录），则会向`$entry`放入一个`false`值，循环将停止。只要状态为`true`，循环就会根据`blog_entry`数据库表中的行数动态创建`<li>`元素。如果数据库里有一条博客条目，就会有一个`<li>`。如果数据库里有十条博客条目，就会有十个`<li>`元素。\n\
