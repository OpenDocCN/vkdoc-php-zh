  raw: 'Zend Framework was arguably the first framework to be built for PHP. Its corporate
    sponsor, Zend Technologies, has a long history with the PHP language itself; its
    founders include two of the original authors of PHP, Andi Gutmans and Zeev Suraski.
    Much of what has made PHP


    one of the most popular web programming languages started with Zend Technologies
    and its contributions to the language. That being said, no wonder Zend Framework
    has had early success and continues to be a major player in the PHP frameworks
    market.


    In terms of community support, Zend Framework has probably the largest online
    following of any of the PHP frameworks. Its documentation is extensive and thorough,
    and unofficial blogs and forums make it possible to get online support for just
    about any question. Code submissions to the core are passed through rigorous testing
    methods, which makes Zend Framework an incredibly robust framework. However, Zend
    Framework is much more of a large set of libraries than a lightweight MVC framework.
    For instance, its main library folder is almost 16MB, more than three times the
    size of Cake’s libraries. Getting Zend Framework off the ground requires much
    more customization and configuration, whereas Cake has adopted more of the “convention
    over configuration” paradigm. You could likely use Zend Framework with just about
    any PHP project, which I demonstrate in Chapter 12 when explaining how to use
    Zend libraries in Cake, but the trade-off is that you’ll have to write or at least
    configure much of what Cake does automatically with its dispatcher methods.


    Zend Framework has no single development paradigm like Cake, CodeIgniter, and
    Symfony, and that appeals to many developers. Patterns like MVC are therefore
    possible in Zend Framework, but these require you to manually write configuration
    methods, which are automatically built into Cake and other frameworks. Cake is
    certainly ahead of Zend Framework in how the framework cuts down the amount of
    code needed to extend it. Learning Zend Framework is generally more time-consuming
    than learning Cake, mostly because of the design of the framework. Getting an
    MVC variant of Zend Framework off the ground is usually more difficult for a beginner
    than Symfony, not to mention Cake.


    True, Zend Framework is more well known than Cake in most PHP circles; it’s the
    veteran on the team, if you will. But Cake is proving to be more like the rising
    star that moves faster and is strategically sounder. Given Cake’s effective implementation
    of the MVC structure and its structural design, it will likely continue to attract
    former Zend Framework developers and remain the top player in the PHP frameworks
    arena.


    09775appBfinal 7/1/08 9:35 PM Page 294


