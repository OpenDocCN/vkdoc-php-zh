  raw: '### Implementation


    Rather than use only inheritance to solve the problem of varying functionality,
    the `Decorator` pattern uses composition and delegation . In essence, `Decorator`
    classes hold an instance of another class of their own type. A `Decorator` will
    implement an operation so that it calls the same operation on the object to which
    it has a reference before (or after) performing its own actions. In this way,
    it is possible to build a pipeline of `Decorator` objects at runtime.


    Let’s rewrite our game example to illustrate this:


    ```

    abstract class Tile

    {

    abstract public function getWealthFactor(): int;

    }

    class Plains extends Tile

    {

    private $wealthfactor = 2;

    public function getWealthFactor(): int

    {

    return $this->wealthfactor;

    }

    }

    // listing 10.22

    abstract class TileDecorator extends Tile

    {

    protected $tile;

    public function __construct(Tile $tile)

    {

    $this->tile = $tile;

    }

    }

    ```


    Here, I have declared `Tile` and `Plains` classes as before, but I have also introduced
    a new class: `TileDecorator`. This does not implement `getWealthFactor()`, so
    it must be declared abstract. I define a constructor that requires a `Tile` object,
    which it stores in a property called `$tile`. I make this property `protected`
    so that child classes can gain access to it. Now I’ll redefine the `Pollution`
    and `Diamond` classes :


    ```

    // listing 10.23

    class DiamondDecorator extends TileDecorator

    {

    public function getWealthFactor(): int

    {

    return $this->tile->getWealthFactor() + 2;

    }

    }

    // listing 10.24

    class PollutionDecorator extends TileDecorator

    {

    public function getWealthFactor(): int

    {

    return $this->tile->getWealthFactor() - 4;

    }

    }

    ```


    Each of these classes extends `TileDecorator`. This means that they have a reference
    to a `Tile` object. When `getWealthFactor()` is invoked, each of these classes
    invokes the same method on its `Tile` reference before making its own adjustment.


    By using composition and delegation like this, you make it easy to combine objects
    at runtime. Because all the objects in the pattern extend `Tile`, the client does
    not need to know which combination it is working with. It can be sure that a `getWealthFactor()`
    method is available for any `Tile` object, whether it is decorating another behind
    the scenes or not:


    ```

    // listing 10.25

    $tile = new Plains();

    print $tile->getWealthFactor(); // 2

    ```


    `Plains` is a component. It simply returns 2:


    ```

    // listing 10.26

    $tile = new DiamondDecorator(new Plains());

    print $tile->getWealthFactor(); // 4

    ```


    `DiamondDecorator` has a reference to a `Plains` object. It invokes `getWealthFactor()`
    before adding its own weighting of 2:


    ```

    // listing 10.27

    $tile = new PollutionDecorator(new DiamondDecorator(new Plains()));

    print $tile->getWealthFactor(); // 0

    ```


    `PollutionDecorator` has a reference to a `DiamondDecorator` object, which has
    its own `Tile` reference.


    You can see the class diagram for this example in Figure [10-5](#A314621_5_En_10_Chapter.html#Fig5).


    ![A314621_5_En_10_Fig5_HTML.gif](A314621_5_En_10_Fig5_HTML.gif)


    Figure 10-5.


    The Decorator pattern


    This model is very extensible. You can add new decorators and components very
    easily. With lots of decorators, you can build very flexible structures at runtime.
    The component class, `Plains` in this case, can be significantly modified in many
    ways without the need to build the totality of the modifications into the class
    hierarchy. In plain English, this means you can have a polluted `Plains` object
    that has diamonds, without having to create a `PollutedDiamondPlains` object.


    The `Decorator` pattern builds up pipelines that are very useful for creating
    filters. The `java.io` package makes great use of decorator classes. The client
    coder can combine decorator objects with core components to add filtering, buffering,
    compression, and so on to core methods like `read()`. My web request example can
    also be developed into a configurable pipeline. Here’s a simple implementation
    that uses the `Decorator` pattern:


    ```

    // listing 10.28

    class RequestHelper

    {

    }

    // listing 10.29

    abstract class ProcessRequest

    {

    abstract public function process(RequestHelper $req);

    }

    // listing 10.30

    class MainProcess extends ProcessRequest

    {

    public function process(RequestHelper $req)

    {

    print __CLASS__ . ": doing something useful with request\n";

    }

    }

    // listing 10.31

    abstract class DecorateProcess extends ProcessRequest

    {

    protected $processrequest;

    public function __construct(ProcessRequest $pr)

    {

    $this->processrequest = $pr;

    }

    }

    ```


    As before, we define an abstract superclass (`ProcessRequest`), a concrete component
    (`MainProcess`), and an abstract decorator (`DecorateProcess`). `MainProcess::process()`
    does nothing but report that it has been called. `DecorateProcess` stores a `ProcessRequest`
    object on behalf of its children. Here are some simple concrete decorator classes:


    ```

    // listing 10.32

    class LogRequest extends DecorateProcess

    {

    public function process(RequestHelper $req)

    {

    print __CLASS__ . ": logging request\n";

    $this->processrequest->process($req);

    }

    }

    // listing 10.33

    class AuthenticateRequest extends DecorateProcess

    {

    public function process(RequestHelper $req)

    {

    print __CLASS__ . ": authenticating request\n";

    $this->processrequest->process($req);

    }

    }

    // listing 10.34

    class StructureRequest extends DecorateProcess

    {

    public function process(RequestHelper $req)

    {

    print __CLASS__ . ": structuring request data\n";

    $this->processrequest->process($req);

    }

    }

    ```


    Each `process()` method outputs a message before calling the referenced `ProcessRequest`
    object’s own `process()` method. You can now combine objects instantiated from
    these classes at runtime to build filters that perform different actions on a
    request, and in different orders. Here’s some code to combine objects from all
    these concrete classes into a single filter:


    ```

    // listing 10.35

    $process = new AuthenticateRequest(new StructureRequest(

    new LogRequest(

    new MainProcess()

    )

    ));

    $process->process(new RequestHelper());

    ```


    This code gives the following output:


    ```

    popp\ch10\batch07\AuthenticateRequest: authenticating request

    popp\ch10\batch07\StructureRequest: structuring request data

    popp\ch10\batch07\LogRequest: logging request

    popp\ch10\batch07\MainProcess: doing something useful with request

    ```


    Note


    This example is, in fact, also an instance of an enterprise pattern called Intercepting
    Filter. Intercepting Filter is described in Core J2EE Patterns: Best Practices
    and Design Strategies (Prentice Hall, 2001) by Alur et al.


    ### Consequences


    Like the `Composite` pattern, `Decorator` can be confusing. It is important to
    remember that both composition and inheritance are coming into play at the same
    time. So `LogRequest` inherits its interface from `ProcessRequest`, but it is
    acting as a wrapper around another `ProcessRequest` object.


    Because a decorator object forms a wrapper around a child object, it helps to
    keep the interface as sparse as possible. If you build a heavily featured base
    class, then decorators are forced to delegate to all public methods in their contained
    object. This can be done in the abstract decorator class, but it still introduces
    the kind of coupling that can lead to bugs.


    Some programmers create decorators that do not share a common type with the objects
    they modify. As long as they fulfill the same interface as these objects, this
    strategy can work well. You get the benefit of being able to use the built-in
    interceptor methods to automate delegation (implementing `__call()` to catch calls
    to nonexistent methods and invoking the same method on the child object automatically).
    However, by doing this, you also lose the safety afforded by class type checking.
    In our examples so far, client code can demand a `Tile` or a `ProcessRequest`
    object in its argument list and be certain of its interface, whether or not the
    object in question is heavily decorated.'
  trans: "\n### 实现\n\n`Decorator`模式并未单纯依赖继承来解决功能变化问题，而是采用了**组合与委托**的方式。本质上，`Decorator`类持有自身类型的另一个类的实例。`Decorator`会实现一个操作，以便在自身执行操作之前（或之后）调用其所引用的对象的相同操作。通过这种方式，可以在运行时构建一个`Decorator`对象的管道。\n\
    \n让我们重写游戏示例来说明这一点：\n\n```  \nabstract class Tile  \n{  \n    abstract public function\
    \ getWealthFactor(): int;  \n}  \n\nclass Plains extends Tile  \n{  \n    private\
    \ $wealthfactor = 2;  \n\n    public function getWealthFactor(): int  \n    {\
    \  \n        return $this->wealthfactor;  \n    }  \n}  \n\n// 代码清单 10.22  \n\
    abstract class TileDecorator extends Tile  \n{  \n    protected $tile;  \n\n \
    \   public function __construct(Tile $tile)  \n    {  \n        $this->tile =\
    \ $tile;  \n    }  \n}  \n```  \n\n这里，我声明了与之前相同的 `Tile` 和 `Plains` 类，但引入了一个新类\
    \ `TileDecorator`。它没有实现 `getWealthFactor()`，因此必须声明为抽象类。我定义了一个构造函数，它需要一个 `Tile`\
    \ 对象，并将其存储在一个名为 `$tile` 的属性中。我将此属性设为 `protected`，以便子类能够访问它。现在，我将重新定义 `Pollution`\
    \ 和 `Diamond` 类：\n\n```  \n// 代码清单 10.23  \nclass DiamondDecorator extends TileDecorator\
    \  \n{  \n    public function getWealthFactor(): int  \n    {  \n        return\
    \ $this->tile->getWealthFactor() + 2;  \n    }  \n}  \n\n// 代码清单 10.24  \nclass\
    \ PollutionDecorator extends TileDecorator  \n{  \n    public function getWealthFactor():\
    \ int  \n    {  \n        return $this->tile->getWealthFactor() - 4;  \n    }\
    \  \n}  \n```  \n\n这两个类都继承了 `TileDecorator`。这意味着它们持有对一个 `Tile` 对象的引用。当 `getWealthFactor()`\
    \ 被调用时，每个类在作出自身调整之前，都会调用其 `Tile` 引用上的相同方法。\n\n通过这样使用组合与委托，您可以在运行时轻松组合对象。由于该模式中的所有对象都继承了\
    \ `Tile`，客户端无需知道它正在处理哪种组合。它可以确信任何 `Tile` 对象（无论它是否在幕后装饰着另一个对象）都可调用 `getWealthFactor()`\
    \ 方法：\n\n```  \n// 代码清单 10.25  \n$tile = new Plains();  \nprint $tile->getWealthFactor();\
    \ // 2  \n```  \n\n`Plains` 是一个组件。它简单地返回 2：\n\n```  \n// 代码清单 10.26  \n$tile =\
    \ new DiamondDecorator(new Plains());  \nprint $tile->getWealthFactor(); // 4\
    \  \n```  \n\n`DiamondDecorator` 持有对 `Plains` 对象的引用。它在添加自己的权重 2 之前调用了 `getWealthFactor()`：\n\
    \n```  \n// 代码清单 10.27  \n$tile = new PollutionDecorator(new DiamondDecorator(new\
    \ Plains()));  \nprint $tile->getWealthFactor(); // 0  \n```  \n\n`PollutionDecorator`\
    \ 持有对 `DiamondDecorator` 对象的引用，而后者拥有自己的 `Tile` 引用。\n\n您可以在图 10-5 中看到此示例的类图。\n\n\
    ![A314621_5_En_10_Fig5_HTML.gif](img/A314621_5_En_10_Fig5_HTML.gif)  \n\n图 10-5.\
    \ Decorator 模式\n\n这个模型扩展性很强。您可以非常容易地添加新的装饰器和组件。使用大量装饰器，您可以在运行时构建非常灵活的结构。组件类（此例中为\
    \ `Plains`）可以通过多种方式被显著修改，而无需将全部的修改内容构建到类层次结构中。用通俗的话说，这意味着您可以有一个被污染且含有钻石的 `Plains`\
    \ 对象，而无需创建一个 `PollutedDiamondPlains` 对象。\n\n`Decorator` 模式构建的管道对于创建过滤器非常有用。`java.io`\
    \ 包就大量使用了装饰器类。客户端程序员可以将装饰器对象与核心组件结合，为核心方法（如 `read()`）添加过滤、缓冲、压缩等功能。我的 Web 请求示例也可以发展成一个可配置的管道。这是一个使用\
    \ `Decorator` 模式的简单实现：\n\n```  \n// 代码清单 10.28  \nclass RequestHelper  \n{  \n\
    }  \n\n// 代码清单 10.29  \nabstract class ProcessRequest  \n{  \n    abstract public\
    \ function process(RequestHelper $req);  \n}  \n\n// 代码清单 10.30  \nclass MainProcess\
    \ extends ProcessRequest  \n{  \n    public function process(RequestHelper $req)\
    \  \n    {  \n        print __CLASS__ . \": doing something useful with request\\\
    n\";  \n    }  \n}  \n\n// 代码清单 10.31  \nabstract class DecorateProcess extends\
    \ ProcessRequest  \n{  \n    protected $processrequest;  \n\n    public function\
    \ __construct(ProcessRequest $pr)  \n    {  \n        $this->processrequest =\
    \ $pr;  \n    }  \n}  \n```  \n\n与之前一样，我们定义了一个抽象超类（`ProcessRequest`）、一个具体组件（`MainProcess`）和一个抽象装饰器（`DecorateProcess`）。`MainProcess::process()`\
    \ 仅报告它已被调用。`DecorateProcess` 代表其子类存储一个 `ProcessRequest` 对象。以下是一些具体的装饰器类：\n\n```\
    \  \n// 代码清单 10.32  \nclass LogRequest extends DecorateProcess  \n{  \n    public\
    \ function process(RequestHelper $req)  \n    {  \n        print __CLASS__ . \"\
    : logging request\\n\";  \n        $this->processrequest->process($req);  \n \
    \   }  \n}  \n\n// 代码清单 10.33  \nclass AuthenticateRequest extends DecorateProcess\
    \  \n{  \n    public function process(RequestHelper $req)  \n    {  \n       \
    \ print __CLASS__ . \": authenticating request\\n\";  \n        $this->processrequest->process($req);\
    \  \n    }  \n}  \n\n// 代码清单 10.34  \nclass StructureRequest extends DecorateProcess\
    \  \n{  \n    public function process(RequestHelper $req)  \n    {  \n       \
    \ print __CLASS__ . \": structuring request data\\n\";  \n        $this->processrequest->process($req);\
    \  \n    }  \n}  \n```  \n\n每个 `process()` 方法在调用所引用的 `ProcessRequest` 对象的 `process()`\
    \ 方法之前，都会输出一条消息。现在，您可以在运行时组合从这些类实例化的对象，以构建在请求上执行不同操作且顺序各异的过滤器。以下是一些代码，将所有具体类中的对象组合成一个过滤器：\n\
    \n```  \n// 代码清单 10.35  \n$process = new AuthenticateRequest(new StructureRequest(\
    \  \n    new LogRequest(  \n        new MainProcess()  \n    )  \n));  \n$process->process(new\
    \ RequestHelper());  \n```  \n\n这段代码输出如下内容：\n\n```  \npopp\\ch10\\batch07\\AuthenticateRequest:\
    \ authenticating request  \npopp\\ch10\\batch07\\StructureRequest: structuring\
    \ request data  \npopp\\ch10\\batch07\\LogRequest: logging request  \npopp\\ch10\\\
    batch07\\MainProcess: doing something useful with request  \n```  \n\n**注意**\n\
    \n事实上，这个示例也是一个名为“拦截过滤器”的企业模式实例。拦截过滤器在 Alur 等人所著的 *Core J2EE Patterns: Best Practices\
    \ and Design Strategies* (Prentice Hall, 2001) 一书中有详细描述。\n\n### 结果\n\n与 `Composite`\
    \ 模式类似，`Decorator` 也可能令人困惑。重要的是要记住，组合与继承在此同时发挥作用。因此，`LogRequest` 从 `ProcessRequest`\
    \ 继承了其接口，但它作为另一个 `ProcessRequest` 对象的包装器来运作。\n\n由于装饰器对象构成了对子对象的包装，因此保持接口尽可能精简是有益的。如果您构建了一个功能丰富的基类，那么装饰器就必须将委托应用于其包含对象的所有公共方法。这可以在抽象装饰器类中完成，但它仍然会引入一种可能导致错误的耦合。\n\
    \n一些程序员创建的装饰器与它们所修改的对象并不共享同一类型。只要它们满足这些对象的相同接口，这种策略就能很好地工作。您将能够利用内置的拦截器方法来自动化委托（通过实现\
    \ `__call()` 来捕获对不存在方法的调用，并自动调用子对象上的相同方法）。然而，这样做也会失去类类型检查所带来的安全性。在我们迄今为止的示例中，客户端代码可以在其参数列表中要求一个\
    \ `Tile` 或 `ProcessRequest` 对象，并且无论该对象是否被大量装饰，都能确信其接口的存在。\n"
- fmt: "# The Facade Pattern\n\nYou may have had occasion to stitch third-party systems\
    \ into your own projects in the past. Whether or not the code is object oriented,\
    \ it will often be daunting, large, and complex. Your own code, too, may become\
    \ a challenge to the client programmer who needs only to access a few features.\
    \ The `Facade` pattern is a way of providing a simple, clear interface to complex\
    \ systems.\n\n## The Problem\n\nSystems tend to evolve large amounts of code that\
    \ is really only useful within the system itself. Just as classes define clear\
    \ public interfaces and hide their guts away from the rest of the world, so should\
    \ well-designed systems. However, it is not always clear which parts of a system\
    \ are designed to be used by client code and which are best hidden.\n\nAs you\
    \ work with subsystems (like web forums or gallery applications), you may find\
    \ yourself making calls deep into the logic of the code. If the subsystem code\
    \ is subject to change over time, and your code interacts with it at many different\
    \ points, you may find yourself with a serious maintenance problem as the subsystem\
    \ evolves.\n\nSimilarly, when you build your own systems, it is a good idea to\
    \ organize distinct parts into separate tiers. Typically, you may have a tier\
    \ responsible for application logic, another for database interaction, another\
    \ for presentation, and so on. You should aspire to keep these tiers as independent\
    \ of one another as you can, so that a change in one area of your project will\
    \ have minimal repercussions elsewhere. If code from one tier is tightly integrated\
    \ into code from another, then this objective is hard to meet.\n\nHere is some\
    \ deliberately confusing procedural code that makes a song-and-dance routine of\
    \ the simple process of getting log information from a file and turning it into\
    \ object data:\n\n```\n// listing 10.36\nfunction getProductFileLines($file)\n\
    {\n    return file($file);\n}\nfunction getProductObjectFromId($id, $productname)\n\
    {\n    // some kind of database lookup\n    return new Product($id, $productname);\n\
    }\nfunction getNameFromLine($line)\n{\n    if (preg_match(\"/.*-(.*)\\s\\d+/\"\
    , $line, $array)) {\n        return str_replace('_', ' ', $array[1]);\n    }\n\
    \    return '';\n}\nfunction getIDFromLine($line)\n{\n    if (preg_match(\"/^(\\\
    d{1,3})-/\", $line, $array)) {\n        return $array[1];\n    }\n    return -1;\n\
    }\nclass Product\n{\n    public $id;\n    public $name;\n    public function __construct($id,\
    \ $name)\n    {\n        $this->id = $id;\n        $this->name = $name;\n    }\n\
    }\n```\n\nLet's imagine that the internals of this code are more complicated than\
    \ they actually are, and that I am stuck with using it rather than rewriting it\
    \ from scratch. For example, assume I have to turn a file that contains lines\
    \ like these into an array of objects:\n\n```\n234-ladies_jumper 55\n532-gents_hat\
    \ 44\n```\n\nTo do so, I must call all of these functions (note that, for the\
    \ sake of brevity, I don't extract the final number, which represents a price):\n\
    \n```\n// listing 10.37\n$lines = getProductFileLines(__DIR__ . '/test2.txt');\n\
    $objects = [];\nforeach ($lines as $line) {\n    $id = getIDFromLine($line);\n\
    \    $name = getNameFromLine($line);\n    $objects[$id] = getProductObjectFromID($id,\
    \ $name);\n}\n```\n\nIf I call these functions directly like this throughout my\
    \ project, my code will become tightly wound into the subsystem it is using. This\
    \ could cause problems if the subsystem changes, or if I decide to switch it out\
    \ entirely. I really need to introduce a gateway between the system and the rest\
    \ of our code.\n\n## Implementation\n\nHere is a simple class that provides an\
    \ interface to the procedural code you encountered in the previous section:\n\n\
    ```\n// listing 10.38\nclass ProductFacade\n{\n    private $products = [];\n \
    \   public function __construct(string $file)\n    {\n        $this->file = $file;\n\
    \        $this->compile();\n    }\n    private function compile()\n    {\n   \
    \     $lines = getProductFileLines($this->file);\n        foreach ($lines as $line)\
    \ {\n            $id = getIDFromLine($line);\n            $name = getNameFromLine($line);\n\
    \            $this->products[$id] = getProductObjectFromID($id, $name);\n    \
    \    }\n    }\n    public function getProducts(): array\n    {\n        return\
    \ $this->products;\n    }\n    public function getProduct(string $id): \\Product\n\
    \    {\n        if (isset($this->products[$id])) {\n            return $this->products[$id];\n\
    \        }\n        return null;\n    }\n}\n```\n\nFrom the point of view of the\
    \ client code, access to `Product` objects from a log file is much simplified:\n\
    \n```\n// listing 10.39\n$facade = new ProductFacade(__DIR__ . '/test2.txt');\n\
    $object = $facade->getProduct(\"234\");\n```\n\n### Consequences\n\nA `Facade`\
    \ is really a very simple concept. It is just a matter of creating a single point\
    \ of entry for a tier or subsystem. This has a number of benefits. It helps to\
    \ decouple distinct areas in a project from one another. It is useful and convenient\
    \ for client coders to have access to simple methods that achieve clear ends.\
    \ It reduces errors by focusing the use of a subsystem in one place; changes to\
    \ the subsystem should cause failure in a predictable location. Errors are also\
    \ minimized by `Facade` classes in complex subsystems where client code might\
    \ otherwise use internal functions incorrectly.\n\nDespite the simplicity of the\
    \ `Facade` pattern, it is all too easy to forget to use it, especially if you\
    \ are familiar with the subsystem you are working with. There is a balance to\
    \ be struck, of course. On the one hand, the benefit of creating simple interfaces\
    \ to complex systems should be clear. On the other hand, one could abstract systems\
    \ with reckless abandon, and then abstract the abstractions. If you are making\
    \ significant simplifications for the clear benefit of client code, and/or shielding\
    \ it from systems that might change, then you are probably right to implement\
    \ the `Facade` pattern.\n\n## Summary\n\nIn this chapter, I looked at a few of\
    \ the ways that classes and objects can be organized in a system. In particular,\
    \ I focused on the principle that composition can be used to engender flexibility\
    \ where inheritance fails. In both the `Composite` and `Decorator` patterns, inheritance\
    \ is used to promote composition and to define a common interface that provides\
    \ guarantees for client code.\n\nYou also saw delegation used effectively in these\
    \ patterns. Finally, I looked at the simple but powerful `Facade` pattern. `Facade`\
    \ is one of those patterns that many people have been using for years without\
    \ having a name to give it. `Facade` lets you provide a clean point of entry to\
    \ a tier or subsystem. In PHP, the `Facade` pattern is also used to create object\
    \ wrappers that encapsulate blocks of procedural code.\n\n# 11. Performing and\
    \ Representing Tasks\n\nIn this chapter, we get active. I look at patterns that\
    \ help you to get things done, whether interpreting a mini-language or encapsulating\
    \ an algorithm.\n\nThis chapter will walk you through several patterns:\n\n- \
    \  The Interpreter pattern: Building a mini-language interpreter that can be used\
    \ to create scriptable applications\n-   The Strategy pattern: Identifying algorithms\
    \ in a system and encapsulating them into their own types\n-   The Observer pattern:\
    \ Creating hooks for alerting disparate objects about system events\n-   The Visitor\
    \ pattern: Applying an operation to all the nodes in a tree of objects\n-   The\
    \ Command pattern: Creating command objects that can be saved and passed around\n\
    -   The Null Object pattern: Using non-operational objects in place of null values.\n\
    \n## The Interpreter Pattern\n\nLanguages are written in other languages (at least\
    \ at first). PHP itself, for example, is written in C. By the same token, odd\
    \ as it may sound, you can define and run your own languages using PHP. Of course,\
    \ any language you might create will be slow and somewhat limited. Nonetheless,\
    \ mini-languages can be very useful, as you will see in this chapter."
  raw: '## The Facade Pattern


    You may have had occasion to stitch third-party systems into your own projects
    in the past. Whether or not the code is object oriented, it will often be daunting,
    large, and complex. Your own code, too, may become a challenge to the client programmer
    who needs only to access a few features. The `Facade` pattern is a way of providing
    a simple, clear interface to complex systems.


    ### The Problem


    Systems tend to evolve large amounts of code that is really only useful within
    the system itself. Just as classes define clear public interfaces and hide their
    guts away from the rest of the world, so should well-designed systems. However,
    it is not always clear which parts of a system are designed to be used by client
    code and which are best hidden.


    As you work with subsystems (like web forums or gallery applications), you may
    find yourself making calls deep into the logic of the code. If the subsystem code
    is subject to change over time, and your code interacts with it at many different
    points, you may find yourself with a serious maintenance problem as the subsystem
    evolves.


    Similarly, when you build your own systems, it is a good idea to organize distinct
    parts into separate tiers. Typically, you may have a tier responsible for application
    logic, another for database interaction, another for presentation, and so on.
    You should aspire to keep these tiers as independent of one another as you can,
    so that a change in one area of your project will have minimal repercussions elsewhere.
    If code from one tier is tightly integrated into code from another, then this
    objective is hard to meet.


    Here is some deliberately confusing procedural code that makes a song-and-dance
    routine of the simple process of getting log information from a file and turning
    it into object data:


    ```

    // listing 10.36

    function getProductFileLines($file)

    {

    return file($file);

    }

    function getProductObjectFromId($id, $productname)

    {

    // some kind of database lookup

    return new Product($id, $productname);

    }

    function getNameFromLine($line)

    {

    if (preg_match("/.*-(.*)\s\d+/", $line, $array)) {

    return str_replace(''_'', '' '', $array[1]);

    }

    return '''';

    }

    function getIDFromLine($line)

    {

    if (preg_match("/^(\d{1,3})-/", $line, $array)) {

    return $array[1];

    }

    return -1;

    }

    class Product

    {

    public $id;

    public $name;

    public function __construct($id, $name)

    {

    $this->id = $id;

    $this->name = $name;

    }

    }

    ```


    Let’s imagine that the internals of this code are more complicated than they actually
    are, and that I am stuck with using it rather than rewriting it from scratch.
    For example, assume I have to turn a file that contains lines like these into
    an array of objects:


    ```

    234-ladies_jumper 55

    532-gents_hat 44

    ```


    To do so, I must call all of these functions (note that, for the sake of brevity,
    I don’t extract the final number, which represents a price):


    ```

    // listing 10.37

    $lines = getProductFileLines(__DIR__ . ''/test2.txt'');

    $objects = [];

    foreach ($lines as $line) {

    $id = getIDFromLine($line);

    $name = getNameFromLine($line);

    $objects[$id] = getProductObjectFromID($id, $name);

    }

    ```


    If I call these functions directly like this throughout my project, my code will
    become tightly wound into the subsystem it is using. This could cause problems
    if the subsystem changes, or if I decide to switch it out entirely. I really need
    to introduce a gateway between the system and the rest of our code.


    ### Implementation


    Here is a simple class that provides an interface to the procedural code you encountered
    in the previous section:


    ```

    // listing 10.38

    class ProductFacade

    {

    private $products = [];

    public function __construct(string $file)

    {

    $this->file = $file;

    $this->compile();

    }

    private function compile()

    {

    $lines = getProductFileLines($this->file);

    foreach ($lines as $line) {

    $id = getIDFromLine($line);

    $name = getNameFromLine($line);

    $this->products[$id] = getProductObjectFromID($id, $name);

    }

    }

    public function getProducts(): array

    {

    return $this->products;

    }

    public function getProduct(string $id): \Product

    {

    if (isset($this->products[$id])) {

    return $this->products[$id];

    }

    return null;

    }

    }

    ```


    From the point of view of the client code, access to `Product` objects from a
    log file is much simplified:


    ```

    // listing 10.39

    $facade = new ProductFacade(__DIR__ . ''/test2.txt'');

    $object = $facade->getProduct("234");

    ```


    ### Consequences


    A `Facade` is really a very simple concept. It is just a matter of creating a
    single point of entry for a tier or subsystem. This has a number of benefits.
    It helps to decouple distinct areas in a project from one another. It is useful
    and convenient for client coders to have access to simple methods that achieve
    clear ends. It reduces errors by focusing the use of a subsystem in one place;
    changes to the subsystem should cause failure in a predictable location. Errors
    are also minimized by `Facade` classes in complex subsystems where client code
    might otherwise use internal functions incorrectly.


    Despite the simplicity of the `Facade` pattern, it is all too easy to forget to
    use it, especially if you are familiar with the subsystem you are working with.
    There is a balance to be struck, of course. On the one hand, the benefit of creating
    simple interfaces to complex systems should be clear. On the other hand, one could
    abstract systems with reckless abandon, and then abstract the abstractions. If
    you are making significant simplifications for the clear benefit of client code,
    and/or shielding it from systems that might change, then you are probably right
    to implement the `Facade` pattern.


    ## Summary


    In this chapter, I looked at a few of the ways that classes and objects can be
    organized in a system. In particular, I focused on the principle that composition
    can be used to engender flexibility where inheritance fails. In both the `Composite`
    and `Decorator` patterns, inheritance is used to promote composition and to define
    a common interface that provides guarantees for client code.


    You also saw delegation used effectively in these patterns. Finally, I looked
    at the simple but powerful `Facade` pattern. `Facade` is one of those patterns
    that many people have been using for years without having a name to give it. `Facade`
    lets you provide a clean point of entry to a tier or subsystem. In PHP, the `Facade`
    pattern is also used to create object wrappers that encapsulate blocks of procedural
    code.


    # 11. Performing and Representing Tasks


    In this chapter, we get active. I look at patterns that help you to get things
    done, whether interpreting a mini-language or encapsulating an algorithm.


    This chapter will walk you through several patterns:


    *   The Interpreter pattern : Building a mini-language interpreter that can be
    used to create scriptable applications

    *   The Strategy pattern : Identifying algorithms in a system and encapsulating
    them into their own types

    *   The Observer pattern : Creating hooks for alerting disparate objects about
    system events

    *   The Visitor pattern : Applying an operation to all the nodes in a tree of
    objects

    *   The Command pattern : Creating command objects that can be saved and passed
    around

    *   The Null Object pattern : Using non-operational objects in place of null values.


    ## The Interpreter Pattern


    Languages are written in other languages (at least at first). PHP itself, for
    example, is written in C. By the same token, odd as it may sound, you can define
    and run your own languages using PHP. Of course, any language you might create
    will be slow and somewhat limited. Nonetheless, mini-languages can be very useful,
    as you will see in this chapter.'
  trans: "\n# 外观模式\n\n你可能曾需要将第三方系统整合到自己的项目中。无论这些代码是否采用面向对象设计，它们往往都庞大、复杂且令人望而生畏。即使是你自己的代码，对于只需要使用其中少数功能的客户端程序员来说，也可能变成一项挑战。`Facade`模式正是为复杂系统提供简单清晰接口的一种方式。\n\
    \n## 问题所在\n\n系统往往会演化出大量仅对系统本身有用的代码。正如类需要定义清晰的公共接口并将内部实现对外隐藏一样，设计良好的系统也应如此。然而，我们并不总能明确判断系统的哪些部分是为客户端代码设计，哪些部分最好隐藏起来。\n\
    \n当处理子系统（如网络论坛或图库应用程序）时，你可能会发现自己的代码需要深入调用系统逻辑。如果子系统代码随时间变化，而你的代码在多个不同点与其交互，那么随着子系统的演进，你将面临严重的维护问题。\n\
    \n同样，在构建自己的系统时，最好将不同部分组织成独立的层级。通常，你可能有一个负责应用逻辑的层，另一个负责数据库交互，还有一个负责表现层等。你应该尽可能保持这些层的相互独立，这样项目中某一区域的变化对其他区域的影响才能最小化。如果某一层的代码与另一层紧密耦合，那么这一目标就难以实现。\n\
    \n下面是一段故意写得令人困惑的过程式代码，它将从文件获取日志信息并转换为对象数据的简单过程变得异常复杂：\n\n```\n// 代码清单 10.36\n\
    function getProductFileLines($file)\n{\n    return file($file);\n}\nfunction getProductObjectFromId($id,\
    \ $productname)\n{\n    // 某种数据库查询\n    return new Product($id, $productname);\n\
    }\nfunction getNameFromLine($line)\n{\n    if (preg_match(\"/.*-(.*)\\s\\d+/\"\
    , $line, $array)) {\n        return str_replace('_', ' ', $array[1]);\n    }\n\
    \    return '';\n}\nfunction getIDFromLine($line)\n{\n    if (preg_match(\"/^(\\\
    d{1,3})-/\", $line, $array)) {\n        return $array[1];\n    }\n    return -1;\n\
    }\nclass Product\n{\n    public $id;\n    public $name;\n    public function __construct($id,\
    \ $name)\n    {\n        $this->id = $id;\n        $this->name = $name;\n    }\n\
    }\n```\n\n假设这些代码的内部实现远比实际复杂，而且我不得不使用它，而非从头重写。例如，假设我需将包含如下格式行的文件转换为对象数组：\n\n```\n\
    234-ladies_jumper 55\n532-gents_hat 44\n```\n\n为此，我必须调用所有这些函数（请注意，为简洁起见，我并未提取最后的数字，它代表价格）：\n\
    \n```\n// 代码清单 10.37\n$lines = getProductFileLines(__DIR__ . '/test2.txt');\n\
    $objects = [];\nforeach ($lines as $line) {\n    $id = getIDFromLine($line);\n\
    \    $name = getNameFromLine($line);\n    $objects[$id] = getProductObjectFromID($id,\
    \ $name);\n}\n```\n\n如果在整个项目中像这样直接调用这些函数，我的代码就会与所使用的子系统紧密耦合。如果子系统发生变化，或者我决定完全替换它，就会引发问题。我真正需要的是在系统与其余代码之间引入一个网关。\n\
    \n## 实现\n\n下面是一个简单的类，它为你在上一节中看到的过程式代码提供了一个接口：\n\n```\n// 代码清单 10.38\nclass ProductFacade\n\
    {\n    private $products = [];\n    public function __construct(string $file)\n\
    \    {\n        $this->file = $file;\n        $this->compile();\n    }\n    private\
    \ function compile()\n    {\n        $lines = getProductFileLines($this->file);\n\
    \        foreach ($lines as $line) {\n            $id = getIDFromLine($line);\n\
    \            $name = getNameFromLine($line);\n            $this->products[$id]\
    \ = getProductObjectFromID($id, $name);\n        }\n    }\n    public function\
    \ getProducts(): array\n    {\n        return $this->products;\n    }\n    public\
    \ function getProduct(string $id): \\Product\n    {\n        if (isset($this->products[$id]))\
    \ {\n            return $this->products[$id];\n        }\n        return null;\n\
    \    }\n}\n```\n\n从客户端代码的角度看，从日志文件获取`Product`对象的过程大大简化了：\n\n```\n// 代码清单 10.39\n\
    $facade = new ProductFacade(__DIR__ . '/test2.txt');\n$object = $facade->getProduct(\"\
    234\");\n```\n\n### 影响\n\n`Facade`实际上是一个很简单的概念。它只是为某个层或子系统创建一个单一入口点。这带来了诸多好处：有助于将项目中不同区域相互解耦；为客户端程序员提供实现清晰目标的简单方法既实用又便利；通过将子系统的使用集中在一个地方来减少错误——子系统变更时，故障将出现在可预测的位置。在复杂子系统中，客户端代码可能错误地使用内部函数，而`Facade`类也能将此类错误最小化。\n\
    \n尽管`Facade`模式很简单，但人们很容易忘记使用它，尤其是当你对所使用的子系统很熟悉时。当然，这需要权衡。一方面，为复杂系统创建简单接口的好处显而易见。另一方面，人们可能会不加区分地抽象系统，然后再抽象这些抽象层。如果你为了客户端代码的明确利益进行了显著的简化，并且/或者保护它免受可能变更的系统的影响，那么实现`Facade`模式很可能是正确的选择。\n\
    \n## 总结\n\n在本章中，我探讨了在系统中组织类和对象的几种方式。我特别关注了这样一个原则：当继承失败时，组合可用于生成灵活性。在`Composite`和`Decorator`模式中，都使用了继承来促进组合，并定义了一个为客户端代码提供保证的通用接口。\n\
    \n你还看到了委托在这些模式中的有效运用。最后，我介绍了简单但强大的`Facade`模式。`Facade`是许多人多年来一直在使用却没有给它命名的模式之一。`Facade`让你能够为一个层或子系统提供一个清晰的入口点。在\
    \ PHP 中，`Facade`模式也用于创建封装过程式代码块的对象包装器。\n\n# 11. 执行与表达任务\n\n在本章中，我们将活跃起来。我将介绍帮助你完成任务的模式，无论是解释小语言还是封装算法。\n\
    \n本章将带你了解以下几种模式：\n\n-   **解释器模式**：构建一个可用于创建可脚本化应用程序的小型语言解释器\n-   **策略模式**：识别系统中的算法并将其封装到各自的类型中\n\
    -   **观察者模式**：创建用于向多个对象通知系统事件的钩子\n-   **访问者模式**：将操作应用于对象树中的所有节点\n-   **命令模式**：创建可保存和传递的命令对象\n\
    -   **空对象模式**：使用无操作对象代替空值。\n\n## 解释器模式\n\n语言是由其他语言编写的（至少最初是这样）。例如，PHP 本身是用 C 语言编写的。同理，虽然听起来有些奇怪，但你可以使用\
    \ PHP 定义并运行自己的语言。当然，你创建的任何语言都会比较慢，且有一定局限性。尽管如此，小型语言仍然非常有用，正如你将在本章中看到的那样。\n"
- fmt: '### The Problem


    When you create web (or command-line) interfaces in PHP, you give the user access
    to functionality. The trade-off in interface design is between power and ease-of-use.
    As a rule, the more power you give your user, the more cluttered and confusing
    your interface becomes. Good interface design can help a lot here, of course.
    But if 90 percent of users are using the same 30 percent of your features, the
    costs of piling on the functionality may outweigh the benefits. You may wish to
    consider simplifying your system for most users. But what of the power users,
    that ten percent who use your system’s advanced features? Perhaps you can accommodate
    them in a different way. By offering such users a domain language (often called
    a DSL —Domain Specific Language ), you might actually extend the power of your
    application.


    Of course, you have a programming language at hand right away. It’s called PHP.
    Here’s how you could allow your users to script your system:


    ```

    $form_input = $_REQUEST[''form_input''];

    // contains: "print file_get_contents(''/etc/passwd'');"

    eval($form_input);

    ```


    This approach to making an application scriptable is clearly insane. Just in case
    the reasons are not blatantly obvious, they boil down to two issues: security
    and complexity. The security issue is well addressed in the example. By allowing
    users to execute PHP via your script, you are effectively giving them access to
    the server the script runs on. The complexity issue is just as big a drawback.
    No matter how clear your code is, the average user is unlikely to extend it easily
    and certainly not from the browser window.


    A mini-language, though, can address both these problems. You can design flexibility
    into the language, reduce the possibility that the user can do damage, and keep
    things focused.


    Imagine an application for authoring quizzes. Producers design questions and establish
    rules for marking the answers submitted by contestants. It is a requirement that
    quizzes must be marked without human intervention, even though some answers can
    be typed into a text field by users.


    Here’s a Question:


    ```

    How many members in the Design Patterns gang?

    ```


    You can accept “four” or “4” as correct answers. You might create a web interface
    that allows a producer to use a regular `Expression` for marking responses:


    ```

    ^4|four$

    ```


    Most producers are not hired for their knowledge of regular expressions, however.
    To make everyone’s life easier, you might implement a more user-friendly mechanism
    for marking responses:


    ```

    $input equals "4" or $input equals "four"

    ```


    You propose a language that supports variables, an operator called `equals`, and
    Boolean logic (`or` and `and`). Programmers love naming things, so let’s call
    it MarkLogic. It should be easy to extend, as you envisage lots of requests for
    richer features. Let’s leave aside the issue of parsing input for now and concentrate
    on a mechanism for plugging these elements together at runtime to produce an answer.
    This, as you might expect, is where the Interpreter pattern comes in.


    ### Implementation


    A language is made up of expressions (that is, things that resolve to a value).
    As you can see in Table 11-1, even a tiny language like MarkLogic needs to keep
    track of a lot of elements.


    **Table 11-1. Elements of the MarkLogic Grammar**


    | Description | EBNF Name | Class Name | Example |

    | --- | --- | --- | --- |

    | Variable | `variable` | `VariableExpression` | `$input` |

    | String literal | `<stringLiteral>` | `LiteralExpression` | `"four"` |

    | Boolean and | `andExpr` | `BooleanAndExpression` | `$input equals ''4'' and
    $other equals ''6''` |

    | Boolean or | `orExpr` | `BooleanOrExpression` | `$input equals ''4'' or $other
    equals ''6''` |

    | Equality test | `eqExpr` | `EqualsExpression` | `$input equals ''4''` |


    Table 11-1 lists EBNF names. So what is EBNF all about? It’s a notation that you
    can use to describe a language grammar. EBNF stands for Extended Backus-Naur Form.
    It consists of a series of lines (called productions), each one consisting of
    a name and a description that takes the form of references to other productions
    and to terminals (that is, elements that are not themselves made up of references
    to other productions). Here is one way of describing my grammar using EBNF:


    ```

    expr     = operand { orExpr | andExpr }

    operand  = ( ''('' expr '')'' | ? string literal ? | variable ) { eqExpr }

    orExpr   = ''or'' operand

    andExpr  = ''and'' operand

    eqExpr   = ''equals'' operand

    variable = ''$'' , ? word ?

    ```


    Some symbols have special meanings (that should be familiar from regular `Expression`
    notation): `|` means or, for example. You can group elements using brackets. So
    in the example, an `Expression` (`expr`) consists of an `operand` followed by
    zero or more of either `orExpr` or `andExpr`. An `operand` can be a bracketed
    `Expression`, a quoted string (I have omitted the production for this), or a `variable`
    followed by zero or more instances of `eqExpr`. Once you get the hang of referring
    from one production to another, EBNF becomes quite easy to read.


    In Figure 11-1, I represent the elements of my grammar as classes.


    ![A314621_5_En_11_Fig1_HTML.gif](A314621_5_En_11_Fig1_HTML.gif)


    **Figure 11-1. The Interpreter classes that make up the MarkLogic language**


    As you can see, `BooleanAndExpression` and its siblings inherit from `OperatorExpression`.
    This is because these classes all perform their operations upon other `Expression`
    objects. `VariableExpression` and `LiteralExpression` work directly with values.


    All `Expression` objects implement an `interpret()` method that is defined in
    the abstract base class, `Expression`. The `interpret()` method expects an `InterpreterContext`
    object that is used as a shared data store. Each `Expression` object can store
    data in the `InterpreterContext` object. The `InterpreterContext` will then be
    passed along to other `Expression` objects. So that data can be retrieved easily
    from the `InterpreterContext`, the `Expression` base class implements a `getKey()`
    method that returns a unique handle. Let’s see how this works in practice with
    an implementation of `Expression`:'
