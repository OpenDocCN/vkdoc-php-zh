  -   Technorati\n-   Yahoo!\n\n您可以将博客发展出各种功能，从在 Amazon 上自动检查标题到从 Flickr 获取图片。但是，最直接且可能是博客最重要的基本功能是垃圾信息检查。由于博客提供了一个用户可以输入自己评论的场所，因此您的博客就有可能被垃圾信息轰炸，尤其是在博客变得广为人知之后。多亏了\
