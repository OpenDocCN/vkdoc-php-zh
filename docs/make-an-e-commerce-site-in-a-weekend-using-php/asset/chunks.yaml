- fmt: '`onsubmit="return validate(this);"` invokes the `validate()` function found
    in the JavaScript file and carries `this` (the current form as an argument) so
    that all of its fields can be validated in the `validate` function. Also, the
    form will be submitted and will navigate to the `addcustomer.php` script only
    if the `validate` function returns `true`. If the function returns `false` (if
    any of the fields fail in validation), form submission will not take place. Instead,
    an error will be displayed and the user will be prompted to validate the field.


    `<span id="emailmsg"></span>` defines a location with an ID and an `emailmsg`
    that will be used to display error messages if the user enters the wrong e-mail
    address in the e-mail address box. Similarly, the locations are defined with IDs
    `passwdmsg`, `repasswdmsg`, and `usrmsg` for the consecutive boxes to display
    error messages if the password, re-type password, and complete name boxes do not
    validate.


    The JavaScript file, `checkform.js`, applies validation checks on the sign-up
    form, `validatesignup.php`. It’s shown in Listing [2-11](#A978-1-4842-1672-9_2_Chapter.html#FPar13).


    ## Listing 2-11. JavaScript File (checkform.js)


    ```

    function validate(userForm) {


    div=document.getElementById("emailmsg"); // #1


    div.style.color="red";                   // #2


    if(div.hasChildNodes())                  // #3


    {


    div.removeChild(div.firstChild);     // #4


    }


    regex=/(^\w+\@\w+\.\w+)/;                // #5


    match=regex.exec(userForm.emailaddress.value);


    if(!match)


    {


    div.appendChild(document.createTextNode("Invalid Email"));   // #6


    userForm.emailaddress.focus();       // #7


    return false;                        // #8


    }


    div=document.getElementById("passwdmsg");


    div.style.color="red";


    if(div.hasChildNodes())


    {


    div.removeChild(div.firstChild);


    }


    if(userForm.password.value.length <=5)  // #9


    {


    div.appendChild(document.createTextNode("The password should be of at least size
    6"));


    userForm.password.focus();


    return false;


    }


    div=document.getElementById("repasswdmsg");


    div.style.color="red";


    if(div.hasChildNodes())


    {


    div.removeChild(div.firstChild);


    }


    if(userForm.password.value != userForm.repassword.value) // #10


    {


    div.appendChild(document.createTextNode("The two passwords don’t match"));


    userForm.password.focus();


    return false;


    }


    var div=document.getElementById("usrmsg");


    div.style.color="red";


    if(div.hasChildNodes())


    {


    div.removeChild(div.firstChild);


    }


    if(userForm.complete_name.value.length ==0) // #11


    {


    div.appendChild(document.createTextNode("Name cannot be blank"));


    userForm.complete_name.focus();


    return false;


    }


    return true;


    }

    ```


    When the Submit button is clicked, the `validate()` method is invoked. It checks
    whether the data is entered correctly in the respective text boxes. The `document.getElementById()`
    method is used for searching a web form for an object with the specified ID. The
    object placed anywhere on the form with the given ID is searched by this method.
    Statement #1 searches an element on the web form with an ID of `emailmsg` and
    assigns it to the object called `div` (it can be any name). Statement #2 sets
    the content that will be displayed at the location designated by the `emailmsg`
    ID to be red.


    The `hasChildNodes()` method in statement #3 checks if a message has already been
    displayed at the `emailmsg` ID location. If an error message has already been
    displayed, it is removed via the `removeChild()` method in statement #4. The regular
    expression in statement #5 checks for a valid e-mail address. If the user enters
    an invalid e-mail address, the `appendChild()` method is used in statement #6
    to display the error message, `"Invalid Email"` at the `emailmsg` ID location,
    as shown in Figure [2-6](#A978-1-4842-1672-9_2_Chapter.html#Fig6). The `appendChild()`
    method is for attaching the given node to the document. Remember, a node never
    appears in the browser window until and unless it is attached to the document
    using the `appendChild()` method. The child node can be attached to any element.


    ![A978-1-4842-1672-9_2_Fig6_HTML.jpg](A978-1-4842-1672-9_2_Fig6_HTML.jpg)


    **Figure 2-6.** Invalid e-mail error message appears upon entering an invalid
    email address


    Because an invalid e-mail address has been entered, the user is asked to re-enter
    it by making the cursor stand at the e-mail address box via the `focus()` method
    applied on it through statement #7. Statement #8 returns `false` so that the form
    cannot be submitted. The form can be successfully submitted only when the `validate()`
    method returns `true` and that is possible only when data is entered correctly
    in all the desired fields.


    Statement #9 ensures that the length of the password entered is not less than
    five. Statement #10 ensures that the passwords entered in the Password and ReType
    Password text boxes are exactly the same. If these passwords don’t match, the
    `"The two passwords don’t match"` error message is displayed at the location that
    is represented by the `repasswdmsg` ID (see Figure [2-7](#A978-1-4842-1672-9_2_Chapter.html#Fig7)).


    ![A978-1-4842-1672-9_2_Fig7_HTML.jpg](A978-1-4842-1672-9_2_Fig7_HTML.jpg)


    **Figure 2-7.** The two password don’t match error message appears if the two
    passwords don’t match


    Statement #11 ensures that the user does not leave the complete name text box
    blank. If any of the validation checks fail, the `validate()` method returns `false`.
    If the desired text boxes pass through different validation checks successfully,
    the validation method returns `true`, consequently the form is submitted and the
    data entered is transferred to the `addcustomer.php` script for saving into the
    database table.


    In order to save data into the MySQL server’s database table through PHP, you
    need to understand how the connection is established between PHP and MySQL. You
    learn how that is done next.


    ## Code for Connecting PHP with MySQL


    To connect with a MySQL server, you need to execute the `mysqli_connect()` method
    with a valid username and password. The syntax for establishing a connection is:


    ```

    $variable = mysqli_connect("localhost", $user, $password, $database) or die ("Error
    Message.");

    ```


    **Note:** PHP and MySQL version 5 support is no longer bundled with the standard
    PHP distribution, hence you need to explicitly configure PHP to take advantage
    of this extension.


    In the previous syntax, `localhost` signifies that MySQL server is installed on
    the local machine but this string is replaced by the IP address of the server
    or server name in case you are connecting to a remote server. The `$user` and
    `$password` contain the valid user ID and password supplied by the administrator.
    The variable `$database` represents the database that you want to connect to and
    execute the SQL statements on it for inserting or fetching the desired information.
    The keyword `die` is for printing error messages if any of the information is
    wrong. The following example connects the root user to the `shopping` database:


    ```

    $connect = mysqli_connect("localhost", "root", "gold", "shopping") or die ("Please,
    check the server connection.");

    ```


    This statement, if successful, returns an object that represents the connection
    to a MySQL server and the specified database.'
