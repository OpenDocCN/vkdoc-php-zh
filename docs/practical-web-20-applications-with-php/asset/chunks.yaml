    If we determine that the login attempt was successful, we perform three actions:
    **1\. Record the successful login attempt.** When a user successfully logs in,
    we want to make a note of this in the application log file. To do so, we will
    add a utility function to DatabaseObject_User called loginSuccess(). This function
    will also update the ts_last_login field in the user table to record the timestamp
    of the user’s most recent login. We will look at the loginSuccess() function shortly.
    This function must be called after a user record has been loaded in DatabaseObject_User.


    **2\. Update the identity data stored in session to include all of the values
    in the corresponding database row for this user.** By default, only the supplied
    username will be stored as the identity; however, since we want to display other
    user details (such as their name or e-mail address) we need to update the stored
    identity to include those other details:


    • We can retrieve the data we want to save as the identity by using the


    createAuthIdentity() method in DatabaseObject_User. This function returns a generic
    PHP object holding the user’s details.


    • The storage object returned from Zend_Auth’s getStorage() method has a method
    called write(), which we can use to overwrite the existing identity with the data
    returned from createAuthIdentity().


    **3\. Redirect the user to their previously requested page.** This is achieved
    simply by calling the _redirect() method with the $redirect variable as its only
    argument.


    Alternatively, if the login attempt failed, the code will continue on. At this
    point, we call the LoginFailure() method from the DatabaseObject_User class to
    write this failed attempt to the log file. We will look at this method shortly.


    We then write a message to the $errors array and continue on to display the template.


    As mentioned in Chapter 3, we can determine the exact reason why the login attempt
    failed, and we will record this reason in the log file. However, this isn’t information
    that should be provided to the user.


