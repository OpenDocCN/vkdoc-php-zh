    admin_departments\"}\n    \n    <span class=\"admin_page_text\">Edit the departments\
    \ of HatShop:</span>\n    \n    <br /><br />\n    \n    {if $admin_departments->mErrorMessage\
    \ neq \"\"}\n    <span class=\"admin_error_text\">\n    ```\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \    \n    648XCH07a.qxd 10/25/06 10:56 PM Page 217\n    \n    C H A P T E R 7\
    \ ■ C ATA L O G A D M I N I S T R AT I O N\n    \n    **217**\n    \n    ```\n\
    \    {$admin_departments->mErrorMessage}<br /><br />\n    \n    </span>\n    {/if}\n\
    \    \n    <form method=\"post\"\n          action=\"{$admin_departments->mAdminDepartmentsTarget|prepare_link:\"\
    https\"}\">\n    \n    {if $admin_departments->mDepartmentsCount eq 0}\n    <strong>There\
    \ are no departments in your database!</strong><br />\n    {else}\n    <table>\n\
    \    <tr>\n      <th>Department Name</th>\n      <th>Department Description</th>\n\
    \      <th> </th>\n    </tr>\n    {section name=cDepartments loop=$admin_departments->mDepartments}\n\
    \    {if $admin_departments->mEditItem ==\n         $admin_departments->mDepartments[cDepartments].department_id}\n\
    \    <tr>\n      <td width=\"122\">\n        <input type=\"text\" name=\"name\"\
    \n               value=\"{$admin_departments->mDepartments[cDepartments].name}\"\
    \ />\n      </td>\n      <td>\n        {strip}\n        <textarea name=\"description\"\
    \ rows=\"3\" cols=\"42\">\n          {$admin_departments->mDepartments[cDepartments].description}\n\
    \        </textarea>\n        {/strip}\n      </td>\n      <td align=\"right\"\
    \ width=\"280\">\n        <input type=\"submit\"\n               name=\"submit_edit_categ_{\n\
    \                     $admin_departments->mDepartments[cDepartments].department_id}\"\
    \n               value=\"Edit Categories\" />\n        <input type=\"submit\"\n\
    \               name=\"submit_update_dep_{\n                     $admin_departments->mDepartments[cDepartments].department_id}\"\
    \n               value=\"Update\" />\n        <input type=\"submit\" name=\"cancel\"\
    \ value=\"Cancel\" />\n        <input type=\"submit\"\n               name=\"\
    submit_delete_dep_{\n                     $admin_departments->mDepartments[cDepartments].department_id}\"\
    \n               value=\"Delete\" />\n      </td>\n    </tr>\n    {else}\n   \
    \ <tr>\n    ```\n    [www.it-ebooks.info](http://www.it-ebooks.info/)\n    \n\
    \    648XCH07a.qxd 10/25/06 10:56 PM Page 218\n    \n    **218**\n    \n    C\
    \ H A P T E R 7 ■ C ATA L O G A D M I N I S T R AT I O N\n    \n    ```\n    \
    \  <td width=\"122\">\n        {$admin_departments->mDepartments[cDepartments].name}\n\
    \      </td>\n      <td>{$admin_departments->mDepartments[cDepartments].description}</td>\n\
    \      <td align=\"right\" width=\"280\">\n        <input type=\"submit\"\n  \
    \  ```"
