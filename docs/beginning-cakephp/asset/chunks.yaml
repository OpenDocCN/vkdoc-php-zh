- fmt: '[the localhost is accessed by typing `http://localhost:8888` or some other
    address,](http://localhost:8888) make sure you substitute my instructions with
    the appropriate settings. You should be versed in localhost setups before launching
    Cake, especially since so many variations of localhost setups exist that I won’t
    discuss in detail here.


    ## Permissions Error


    There may not be the necessary file permissions in place. If this error occurs,
    you may see a blank screen or a 403 error. The 403 HTTP server error occurs when
    the server denies access to whatever is being requested by the user. Several settings,
    file permissions, or PHP configuration bugs could trigger the 403 error. To fix
    this, set the `first_app` folder permissions to 0755 with `chmod` in the command
    line, or use your operating system to give read, write, and execute permissions
    to the user and read and execute permissions to the group: `chmod -R 0755 /path/to/cakephp/folder`


    Refresh the `first_app` URL; if you see the screenshot shown in Figure 2-2, the
    problem is fixed.


    ## Using the Command-Line Interface


    Whether you are working in Windows, Mac OS, or Linux, the command line will be
    necessary later to take full advantage of Cake’s features. Mac and Linux users
    should have no problem running the command line because it is built into these
    respective operating systems. Like the web server setup, running the command line
    can take on multiple configurations that would be too exhaustive to cover here.
    Be sure to get the command line working in such a way that you can run standard
    Unix commands. Mac users should run the Terminal application to run their commands.
    Linux users will undoubtedly be familiar with the Linux console to run shell commands.
    Windows users may need to install a command-line interface (CLI) to run all the
    necessary Unix commands. [I recommend using Cygwin (www.cygwin.com) or MinGW (](http://www.cygwin.com)[www.mingw.org)
    to](http://www.mingw.org) launch the command line in a Windows environment.


    ## Apache AllowOverride Error


    This error occurs when you see the content, but it doesn’t appear like Figure
    2-2; no color, no styles, no layout, and no font changes appear—it’s just black
    text on a white background. If you continue with the rest of the tutorials here,
    you’ll be able to see Cake running, but some things will not work properly or
    you may notice inconsistencies when you begin to expand your Cake application,
    especially with the scaffolding and the styles. This is a little more complicated
    to fix than the permissions error, but it’s not really difficult.


    You’ll need to find the `httpd.conf` file in your localhost setup. It’s usually
    stored in a folder named `conf`, `bin`, `lib`, or `var`. You can edit the `httpd.conf`
    file with any plain-text editor.


    Search for a chunk of code that looks something like this in the `httpd.conf`
    file:

    ```

    1 <Directory />

    2 Options Indexes FollowSymLinks

    3 AllowOverride None

    4 </Directory>

    ```

    Don’t let line 1 throw you off. The slash after `Directory` is referring to the
    root folder. If you need to apply these changes to the specific Cake application
    folder, then add the path to Cake rather than the root folder:

    ```

    <Directory /path/to/cake>

    ```

    Change line 3 from `AllowOverride None` to `AllowOverride All`, and restart Apache.
    If you see the regular Cake welcome screen (shown earlier in Figure 2-2) once
    you launch the `first_app` URL, the problem is fixed.


    ![Image 15](index-35_1.jpg)


    ## Running the Setup Routines


    Every time you install a Cake application on your localhost, you’ll follow these
    routine procedures:


    1. Prepare the `tmp` folder.

    2. Change the `Security.salt` value in `app/config/core.php`.

    3. Enter MySQL database connection settings.

    4. Design your database schema (unless you are using an existing schema).'
