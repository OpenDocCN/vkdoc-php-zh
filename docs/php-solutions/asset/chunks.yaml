    declaration, create a conditional statement to include `connection.php` and create
    a read-only connection when the search form is submitted. The code looks like
    this:  


    `if (isset($_GET[''go''])) {`


    `require_once ''../includes/connection.php'';`


    `$conn = dbConnect(''read'');`


    `}`


    Next, add the SQL query inside the conditional statement. The query needs to name
    the three columns you want to retrieve from the `images` table. Use a question
    mark as the placeholder for the search term, like this:  


