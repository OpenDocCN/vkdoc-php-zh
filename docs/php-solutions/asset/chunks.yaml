  trans: '

    # PHP 快速入门清单


    本章包含大量信息，不可能一次消化完。但希望前半部分已经让你对 PHP 的运行机制有了一个宏观的了解。后半部分则补充了许多关键细节，你可以在学习本书的过程中随时查阅。以下是部分要点回顾：


    -   始终为 PHP 页面使用正确的文件扩展名，通常是 `.php`。

    -   将所有 PHP 代码括在正确的标签内：`<?php` 和 `?>`。

    -   避免使用短标签 `<?` 作为开始标记。使用 `<?php` 更为可靠。

    -   建议在仅包含 PHP 代码的文件中省略 PHP 结束标签。

    -   PHP 变量以 `$` 开头，后面跟一个字母或下划线。

    -   选择有意义的变量名，并记住它们**区分大小写**。

    -   使用注释来提醒自己脚本的功能。

    -   记住，数字不需要引号，但字符串（文本）需要。

    -   可以使用单引号或双引号，但必须配对使用。

    -   使用反斜杠来转义字符串内部的同类引号。

    -   要将相关项存储在一起，请使用数组。

    -   使用条件语句（例如 `if` 和 `if . . . else`）进行决策。

    -   使用循环简化重复性任务。

    -   使用函数执行预设任务。

    -   使用 `echo` 或 `print` 显示 PHP 输出。

    -   使用 `print_r()` 检查数组的内容。

    -   对于大多数错误消息，从指示的位置向前回溯。

    -   保持微笑——并记住，PHP 并不难。


    # 4. 使用包含文件轻松减轻工作量


    能够将一个文件的内容包含在另一个文件中，是 PHP 最强大的特性之一，也是最容易实现的功能之一。


    网站中的大多数页面都共享通用元素，例如页眉、页脚和导航菜单。你可以通过更改外部样式表中的样式规则来改变这些元素在整个站点中的外观。但是，CSS 更改页面元素内容的能力有限。如果你想在菜单中添加一个新项目，你需要编辑显示该菜单的每一个页面的
    HTML。像 Dreamweaver 这样的网页制作工具具有模板系统，可以自动更新所有连接到主文件的页面，但你仍然需要将所有文件上传到远程服务器。


    使用 PHP 则无需如此，它支持服务器端包含（SSI）。服务器端包含是一个外部文件，其中包含你想要合并到多个页面中的动态代码或 HTML（或两者）。PHP
    将内容合并到服务器上的每个网页中。由于每个页面都使用相同的外部文件，你可以通过编辑和上传单个文件来更新菜单或其他通用元素——这大大节省了时间。


    在学习本章的过程中，你将了解 PHP 包含的工作原理、PHP 在哪里查找包含文件，以及如何在找不到包含文件时防止出现错误消息。此外，你还会学习使用 PHP
    实现一些酷炫的技巧，例如创建随机图像生成器。


    本章涵盖以下主题：


    -   理解不同的包含命令

    -   告诉 PHP 在哪里找到你的包含文件

    -   为通用页面元素使用 PHP 包含

    -   保护包含文件中的敏感信息

    -   自动化“你在这里”的菜单链接

    -   从文件名生成页面标题

    -   自动更新版权声明

    -   显示带有标题的随机图像

    -   处理包含文件的错误

    -   更改你的 Web 服务器的 `include_path`


    图 4-1 展示了页面的四个元素如何通过 PHP 的包含文件魔法而受益。


    ![A978-1-4842-0635-5_4_Fig1_HTML.jpg](img/A978-1-4842-0635-5_4_Fig1_HTML.jpg)


    图 4-1. 识别可通过 PHP 改进的静态网页元素


    菜单和版权声明出现在每个页面上。通过将它们转换为包含文件，你只需更改一个页面即可使更改在整个站点中传播。借助 PHP 的条件逻辑，你还可以让菜单显示正确的样式，以指示访问者当前所在的页面。类似的
    PHP 魔法可以自动更改版权声明中的日期和页面标题中的文本。PHP 还可以通过显示随机图像和标题来增加多样性。图像不必是相同大小；PHP 函数会在 `<img>`
    标签中插入正确的 `width` 和 `height` 属性。


    ## 从外部文件包含代码


    从其他文件包含代码的能力是 PHP 的核心部分。所需要做的就是使用一个 PHP 包含命令，并告诉服务器在哪里找到该文件。


    ### 介绍 PHP 包含命令


    PHP 有四个可用于从外部文件包含代码的命令，即：


    -   `include`

    -   `include_once`

    -   `require`

    -   `require_once`


    它们的基本功能相同，那为什么要有四个呢？根本区别在于，即使外部文件缺失，`include` 也会尝试继续处理脚本，而 `require` 则带有强制性的意味：如果文件缺失，PHP
    引擎会停止处理并抛出一个致命错误。实际上，这意味着如果你的页面即使没有外部文件的内容也能保持可用，就应该使用 `include`。如果页面依赖于外部文件，则使用
    `require`。


    另外两个命令 `include_once` 和 `require_once` 工作方式相同，但它们能防止同一个文件在页面中被包含多次。这在包含定义了函数或类的文件时尤其重要。在脚本中多次尝试定义一个函数或类会触发致命错误。因此，使用
    `include_once` 或 `require_once` 可以确保函数和类只被定义一次，即使脚本试图多次包含外部文件（例如当命令位于条件语句中时）也是如此。


    提示


    对于非关键任务的外部文件使用 `include`，对于定义了函数和类的文件使用 `require_once`。


    ### PHP 查找包含文件的位置


    要包含一个外部文件，请使用四个包含命令之一，后跟文件路径（字符串形式）——换句话说，文件路径必须放在引号中（单引号或双引号都可以）。文件路径可以是绝对路径，也可以是相对于当前文档的路径。例如，以下任何一项都可以正常工作（只要目标文件存在）：


    `include ''includes/menu.php'';`


    `include ''C:/xampp/htdocs/phpsols/includes/menu.php'';`


    `include ''/Applications/MAMP/htdocs/phpsols/includes/menu.php'';`


    注意


    PHP 在 Windows 文件路径中接受正斜杠。


    你可以选择性地对包含命令使用括号，因此以下写法也有效：


    `include(''includes/menu.php'');`


    `include(''C:/xampp/htdocs/phpsols/includes/menu.php'');`


    `include(''/Applications/MAMP/htdocs/phpsols/includes/menu.php'');`


    当使用相对文件路径时，建议使用 `./` 来表示路径从当前文件夹开始。因此，将第一个示例重写如下会更高效：


    `include ''./includes/menu.php''; // 路径从当前文件夹开始`


    什么是不行的？使用相对于站点根目录的文件路径，如下所示：


    `include ''/includes/menu.php''; // 这样不行`


    PHP 还会在 PHP 配置中定义的 `include_path` 中查找。我将在本章后面回到这个话题。在此之前，让我们将 PHP 包含付诸实践。

    '
- fmt: '# PHP Solution 4-1: Moving the Menu and Footer to Include Files


    Let’s convert the page shown in Figure [4-1](#A978-1-4842-0635-5_4_Chapter.html#Fig1)
    to use include files. Because the menu and footer appear on every page of the
    Japan Journey site, they’re prime candidates for include files. Listing 4-1 shows
    the code for the body of the page with the menu and footer highlighted in bold.


    **Listing 4-1.** The static version of `index.php`


    ```

    <header>

    <h1>Japan Journey</h1>

    </header>

    <div id="wrapper">

    <ul id="nav">

    <li><a href="index.php" id="here">Home</a></li>

    <li><a href="blog.php">Journal</a></li>

    <li><a href="gallery.php">Gallery</a></li>

    <li><a href="contact.php">Contact</a></li>

    </ul>

    <main>

    <h2>A journey through Japan with PHP</h2>

    <p>One of the benefits of using PHP . . .</p>

    <figure>

    <img src="images/water_basin.jpg" alt="Water basin at Ryoanji temple"

    width="350" height="237">

    <figcaption>Water basin at Ryoanji temple</figcaption>

    </figure>

    <p>Ut enim ad minim veniam, quis nostrud . . .</p>

    <p>Eu fugiat nulla pariatur. Ut labore et dolore . . .</p>

    <p>Sed do eiusmod tempor incididunt ullamco . . .</p>

    </main>

    <footer>

    <p>&copy; 2006&ndash;2014 David Powers</p>

    </footer>

    </div>

    ```


    Copy `index_01.php` from the `ch04` folder to the `phpsols` site root and rename
    it `index.php`. If you are using a program like Dreamweaver that offers to update
    the page links, don’t update them. The relative links in the download file are
    correct. Check that the CSS and images are displaying properly by loading `index.php`
    into a browser. It should look the same as Figure [4-1](#A978-1-4842-0635-5_4_Chapter.html#Fig1).


    Copy `blog.php`, `gallery.php`, and `contact.php` from the `ch04` folder to your
    site root folder. These pages won’t display correctly in a browser yet because
    the necessary include files still haven’t been created. That’ll soon change.


    In `index.php`, highlight the `nav` unordered list as shown in bold in Listing
    4-1, then cut (Ctrl+X/Cmd+X) it to your computer clipboard.


    Create a new file called `menu.php` in the `includes` folder. Remove any code
    inserted by your editing program; the file must be completely blank.


    Paste (Ctrl+V/Cmd+V) the code from your clipboard into `menu.php` and save the
    file. The contents of `menu.php` should look like this:


    ```

    <ul id="nav">

    <li><a href="index.php" id="here">Home</a></li>

    <li><a href="blog.php">Journal</a></li>

    <li><a href="gallery.php">Gallery</a></li>

    <li><a href="contact.php">Contact</a></li>

    </ul>

    ```


    Don’t worry that your new file doesn’t have a `DOCTYPE` declaration or any `<html>`,
    `<head>`, or `<body>` tags. The other pages that include the contents of this
    file will supply those elements.


    Open `index.php` and insert the following in the space left by the `nav` unordered
    list:


    ```

    <?php require ''./includes/menu.php''; ?>

    ```


    This uses a document-relative path to `menu.php`. Using `./` at the beginning
    of the path is more efficient because it explicitly indicates that the path starts
    in the current folder.


    > **Tip:** I’m using the `require` command because the navigation menu is mission
    critical. Without it, there would be no way to navigate around the site.


    Save `index.php` and load the page into a browser. It should look exactly the
    same as before. Although the menu and the rest of the page are coming from different
    files, PHP merges them before sending any output to the browser.


    > **Note:** Don’t forget that PHP code needs to be processed by a web server.
    If you have stored your files in a subfolder of your server’s document root called
    `phpsols`, you should access `index.php` using the URL `http://localhost/phpsols/index.php`.
    See “Where to locate your PHP files (Windows & Mac)” in [Chapter 2](#A978-1-4842-0635-5_2_Chapter.html)
    if you need help finding the server’s document root.


    Do the same with the `footer`. Cut the lines highlighted in bold in Listing 4-1
    and paste them into a blank file called `footer.php` in the `includes` folder.
    Then insert the command to include the new file in the gap left by the `<footer>`:


    ```

    <?php include ''./includes/footer.php''; ?>

    ```


    This time, I’ve used `include` rather than `require`. The `<footer>` is an important
    part of the page, but the site remains usable if the include file can’t be found.


    Save all pages and reload `index.php` in your browser. Again, it should look identical
    to the original page. If you navigate to other pages in the site, the menu and
    footer should appear on every page. The code in the include files is now serving
    all pages.


    To prove that the menu is being drawn from a single file, change the text in the
    Journal link in `menu.php`, like this:


    ```

    <li><a href="blog.php">Blog</a></li>

    ```


    Save `menu.php` and reload the site. The change is reflected on all pages. You
    can check your code against `index_02.php`, `menu_01.php`, and `footer_01.php`
    in the `ch04` folder.


    As Figure [4-2](#A978-1-4842-0635-5_4_Chapter.html#Fig2) shows, there’s a problem
    with the code at the moment. Even when you navigate away from the home page, the
    style that indicates which page you’re on doesn’t change (it’s controlled by the
    `here` ID in the `<a>` tag).


    ![A978-1-4842-0635-5_4_Fig2_HTML.jpg](A978-1-4842-0635-5_4_Fig2_HTML.jpg)


    **Figure 4-2.** The current page indicator still points to the Home page


    Fortunately, that’s easily fixed with a little PHP conditional logic. Before doing
    so, let’s take a look at how the web server and the PHP engine handle include
    files.


    ## Choosing the Right Filename Extension for Includes


    As you have just seen, an include file can contain raw HTML. When the PHP engine
    encounters an include command, it stops processing PHP at the beginning of the
    external file and resumes again at the end. If you want the external file to use
    PHP code, the code must be enclosed in PHP tags. Because the external file is
    processed as part of the PHP file that includes it, an include file can have any
    filename extension.


    Some developers use `.inc` as the filename extension to make it clear that the
    file is intended to be included in another file. However, most servers treat `.inc`
    files as plain text. This poses a security risk if the file contains sensitive
    information, such as the username and password to your database. If the file is
    stored within your website’s root folder, anyone who discovers the name of the
    file can simply type the URL in a browser address bar, and the browser will obligingly
    display all your secret details!


    On the other hand, any file with a `.php` extension is automatically sent to the
    PHP engine for parsing before it’s sent to the browser. As long as your secret
    information is inside a PHP code block and in a file with a `.php` extension,
    it won’t be exposed. That’s why some developers use `.inc.php` as a double extension
    for PHP includes. The `.inc` part reminds you that it’s an include file, but servers
    are only interested in the `.php` on the end, which ensures that all PHP code
    is correctly parsed.


    For a long time, I followed the convention of using `.inc.php` for include files.
    But since I store all my include files in a separate folder called `includes`,
    I’ve decided that the double extension is superfluous. I now use just `.php`.


    Which naming convention you choose is up to you, but using `.inc` on its own is
    the least secure.'
