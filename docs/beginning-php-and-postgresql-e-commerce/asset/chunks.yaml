    \n尽管所有模板引擎都遵循相同的基本原则，但我们选择在本书的 PHP 电子商务项目中使用 Smarty，因为它具有良好的性能表现、强大的功能（如模板编译和缓存）以及在业界的广泛认可。\n\
    \n## 使用 PostgreSQL 存储网站数据\n\n访问者在浏览网站时看到的大部分数据都将从关系型数据库中检索。关系型数据库管理系统（`RDBMS`）是一种复杂的软件程序，其目的是尽可能快速、可靠地存储、管理和检索数据。对于\
    \ HatShop 网站来说，它将存储所有关于产品、部门、用户、购物车等的数据。\n\n有许多 `RDBMS` 可供你与 PHP 配合使用，包括 `PostgreSQL`、`MySQL`、`Oracle`\
    \ 等。PostgreSQL 可以说是世界上最先进的开源数据库，它是一个免费、快速且可靠的数据库。另一个重要的优势是，许多网站托管提供商都提供对 PostgreSQL\
    \ 数据库的访问，这让你刚创建好的电子商务网站上线时更加轻松。在开发 HatShop 电子商务网站时，我们将使用 PostgreSQL 作为后端数据库。\n\
    \n用于与关系型数据库通信的语言是 SQL（结构化查询语言）。然而，每个数据库引擎都识别该语言的特定方言。如果你决定使用不同于 PostgreSQL 的 `RDBMS`，你可能需要更新某些\
