    # 总结


    - 函数是一个可以通过名称调用的命名代码块。函数声明以 `function` 关键字开头，后跟函数的参数（在圆括号内）。然后，命令被包含在花括号中。当函数被调用时，这些命令会被执行。

    - 函数可以返回一个结果。函数的返回值在 `return` 指令之后指定，该指令会终止函数的执行。

    - 对于函数，你可以显式指定参数的类型和结果的类型。

    - 默认情况下，函数的参数是通过值传递的（会创建作为函数参数指定的变量的副本）。要通过引用传递参数，在函数声明中，需要在相应参数名称前加上 `&` 引用符号。

    - 参数可以有默认值（通过在函数声明中参数名称后使用赋值运算符指定）。如果在调用函数时没有为参数指定值，则会使用默认值。

    - 你可以创建具有任意数量参数的函数。在这种情况下，整个参数集被标识为一个参数，在函数声明中该参数前加有省略号。该参数被视为一个数组。

    - 当函数调用自身时（但通常使用不同的参数），可以使用递归来定义函数。

    - 函数（语法结构）`eval()` 允许你执行作为参数传递给该函数的字符串中的命令。

    - 可以创建没有名称的匿名函数。匿名函数被赋值给一个变量；之后，可以像调用函数一样调用该变量。

    - 从 PHP 8 开始，在调用函数时可以按名称传递参数。在这种情况下，你需要指定参数的名称（不带 `$` 符号），并在调用函数时用冒号分隔指定参数的值。


    # 有用的技巧和操作


    > *模仿是最真诚的抄袭形式。*

    > —*《家有阿福》*（电视剧）


    本章讨论在日常实践中至关重要且有用的话题。


    ## 常量


    常量与变量有根本的不同，在于常量的值不能被更改。`define()` 函数（更准确地说，是一种语法结构）通常用于向程序添加常量。该函数的第一个参数是一个包含常量名称的字符串。第二个参数指定常量的值。常量名称的开头不使用
    `$` 符号。按照普遍接受的约定，常量名称由大写字母组成（也就是说，这不是必须的，但出于良好的编程习惯应当如此）。例如，命令 `define("PI",3.141592)`
    定义了值为 `3.141592` 的常量 `PI`。执行该命令后，常量 `PI` 的值就不能再更改了。


    常量在创建后不能被删除。要检查一个常量是否存在，可以使用 `defined()` 函数，其参数是一个包含常量名称的字符串；例如，`defined("PI")`。结果根据该常量是否被定义，返回
    `true` 或 `false`。


    还有一种向程序添加常量的方法。在这种情况下，使用关键字 `const`，其后指定常量的名称（名称开头不带 `$` 符号），并通过赋值运算符指定常量的值。例如，值为
    `10` 的常量 `TEN` 可以通过命令 `const TEN=10` 来定义。


    这两种创建常量的方法之间的根本区别在于，由 `define()` 函数定义的常量是在运行时创建的。相反，使用 `const` 语句创建的常量是在编译时创建的。这种情况会产生一些后果。例如，使用
    `const` 语句创建常量的命令不能放在条件语句中，但使用 `define()` 函数则可以。另一方面，`define()` 函数不能在类和接口（将在本书后续章节中讨论）中用于创建常量字段；在这种情况下，需要使用基于
    `const` 语句的表达式。


    清单 6-3 展示了一个使用常量的简单示例。


    ```

    清单 6-3

    常量

    ```


    以下是程序执行的结果。


    ```

    程序的输出（来自清单 6-3）

    数字 PI = 3.141592

    sin(PI/6) = 0.49999990566244

    ONE = 1

    TWO = 2

    THREE = 3

    ```


    该程序使用 `define("PI",3.141592)` 语句定义了 `PI` 常量，之后检查了它的值并计算了 `sin(PI/6)` 表达式。


    > **注意：** 在 PHP 中，存在内置的 `pi()` 函数，调用该函数时会返回“圆周率”的值。


    另外三个常量是使用命令 `const ONE=1`、`const TWO=2` 和 `const THREE=ONE+TWO` 创建的。在最后一个例子中，`THREE`
    常量的值被计算为 `ONE` 和 `TWO` 常量的和。


    | 详细信息 |

    | --- |

    | 在 PHP 中，一些内置常量允许我们获取关于工作文档和程序组件的重要信息。例如，使用 `__LINE__` 常量，你可以获取文件中的当前行号。`__FILE__`
    常量允许你获取文件名，`__DIR__` 常量的值是文件所在目录的名称，而函数（在其中请求该常量）的名称可以使用 `__FUNCTION__` 常量获取。所有这些（以及一些其他）常量的名称都以双下划线开头和结尾。
    |

