- fmt: '# Using Variables to Represent Changing Values


    The code in Figure [3-1](#A978-1-4842-0635-5_3_Chapter.html#Fig1) probably looks
    like an awfully long-winded way to display a range of years. Surely it’s much
    simpler to just type out the actual dates? Yes, it is, but the PHP solution saves
    you time in the long run. Instead of your needing to update the copyright statement
    every year, the PHP code does it automatically. You write the code once and forget
    it. What’s more, as you’ll see in the next chapter, if you store the code in an
    external file, any changes to the external file are reflected on every page of
    your site.


    This ability to display the year automatically relies on two key aspects of PHP:
    variables and functions. As the name suggests, functions do things; they perform
    preset tasks, such as getting the current date and converting it into human-readable
    form. I’ll cover functions a little later, so let’s work on variables first. The
    script in Figure [3-1](#A978-1-4842-0635-5_3_Chapter.html#Fig1) contains two variables:
    `$startYear` and `$thisYear`.


    **Tip**


    A variable is simply a name that you give to something that may change or that
    you don’t know in advance. Variables in PHP always begin with `$` (a dollar sign).


    Although the concept of variables sounds abstract, we use variables all the time
    in everyday life. When you meet somebody for the first time, one of the first
    things you ask is “What’s your name?” It doesn’t matter whether the person you’ve
    just met is Tom, Dick, or Harry, the word “name” remains constant. Similarly,
    with your bank account, money goes in and out all of the time (mostly out, it
    seems), but as Figure [3-2](#A978-1-4842-0635-5_3_Chapter.html#Fig2) shows, it
    doesn’t matter whether you’re scraping the bottom of the barrel or as rich as
    Croesus, the amount available is always referred to as the balance.


    ![A978-1-4842-0635-5_3_Fig2_HTML.jpg](A978-1-4842-0635-5_3_Fig2_HTML.jpg)


    Figure 3-2. The balance on your bank statement is an everyday example of a variable—the
    name stays the same, even though the value may change from day to day


    So, “name” and “balance” are everyday variables. Just put a dollar sign in front
    of them and you have two ready-made PHP variables, like this:


    `$name`


    `$balance`


    Simple.


    ## Naming Variables


    You can choose just about anything you like as the name for a variable, as long
    as you keep the following rules in mind:


    - Variables always begin with a dollar sign (`$`).

    - The first character after the dollar sign cannot be a number.

    - No spaces or punctuation marks are allowed, except for the underscore (`_`).

    - Variable names are case-sensitive: `$startYear` and `$startyear` are not the
    same.


    When choosing names for variables, it makes sense to choose something that tells
    you what it’s for. The variables you’ve seen so far—`$startYear`, `$thisYear`,
    `$name`, and `$balance`—are good examples. Because you can’t use spaces in variable
    names, it’s a good idea to capitalize the first letter of the second or subsequent
    words when combining them (sometimes called camel case). Alternatively, you can
    use an underscore (`$start_year`, `$this_year`, etc.).


    Technically speaking, you can use an underscore as the first character after the
    dollar sign, but it’s not recommended. PHP predefined variables (e.g., the superglobal
    arrays described a little later in this chapter) begin with an underscore, so
    there’s a danger that you may accidentally choose the same name and cause problems
    for your script.


    Don’t try to save time by using really short variables. Using `$sy`, `$ty`, `$n`,
    and `$b` instead of the more descriptive ones makes code harder to understand—and
    that makes it hard to write. More important, it makes errors more difficult to
    spot. As always, there are exceptions to a rule. By convention, `$i`, `$j`, and
    `$k` are frequently used to keep count of the number of times a loop has run,
    and `$e` is used in error checking. You’ll see examples of these later in this
    chapter.


    **Caution**


    Although you have considerable freedom in the choice of variable names, you can’t
    use `$this`, because it has a special meaning in PHP object-oriented programming.
    It’s also advisable to avoid using any of the keywords listed at [`http://php.net/manual/en/reserved.php`](http://php.net/manual/en/reserved.php).


    ## Assigning Values to Variables


    Variables get their values from a variety of sources, including the following:


    - User input through online forms

    - A database

    - An external source, such as a news feed or XML file

    - The result of a calculation

    - Direct inclusion in the PHP code


    Wherever the value comes from, it’s always assigned with an equal sign (`=`),
    like this:


    `$variable = value;`


    The variable goes on the left of the equal sign, and the value goes on the right.
    Because it assigns a value, the equal sign is called the assignment operator.


    **Caution**


    Familiarity with the equal sign from childhood makes it difficult to get out of
    the habit of thinking that it means “is equal to.” However, PHP uses two equal
    signs (`==`) to signify equality. This is a major cause of beginner mistakes,
    and it often catches more experienced developers, too. The difference between
    `=` and `==` is covered in more detail later in this chapter.


    ## Ending Commands With a Semicolon


    PHP is written as a series of commands or statements. Each statement normally
    tells the PHP engine to perform a particular action, and it must always be followed
    by a semicolon, like this:


    ```

    <?php

    do this;

    now do something else;

    ?>

    ```


    As with all rules, there is an exception: you can omit the semicolon if there’s
    only one statement in the code block. However, don’t do it. Unlike JavaScript,
    PHP won’t automatically assume there should be a semicolon at the end of a line
    if you leave it out. This has a nice side effect: you can spread long statements
    over several lines and lay out your code for ease of reading. PHP, like HTML,
    ignores whitespace in code. Instead, it relies on semicolons to indicate where
    one command ends and the next one begins.


    **Tip**


    Using a semicolon at the end of a PHP statement (or command) is always right.
    A missing semicolon will bring your script to a grinding halt.


    ## Commenting Scripts


    PHP treats everything between the opening and closing PHP tags as statements to
    be executed unless you tell it not to do so by marking a section of code as a
    comment. The following three reasons explain why you may want to do this:


    - To insert a reminder of what the script does

    - To insert a placeholder for code to be added later

    - To disable a section of code temporarily


    When a script is fresh in your mind, it may seem unnecessary to insert anything
    that isn’t going to be processed. However, if you need to revise the script several
    months later, you’ll find comments much easier to read than trying to follow the
    code on its own. Comments are also vital when you’re working in a team. They help
    your colleagues understand what the code is intended to do.


    During testing, it’s often useful to prevent a line of code, or even a whole section,
    from running. PHP ignores anything marked as a comment, so this is a useful way
    of turning on and off code.


    There are three ways of adding comments: two for single-line comments and one
    for comments that stretch over several lines.'
