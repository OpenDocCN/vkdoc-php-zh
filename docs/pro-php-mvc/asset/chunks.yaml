  trans: "\n# 第 13 章：引导启动\n\n**注意：** 根据缓存驱动的不同，`Cache::initialize()` 和 `Cache->connect()`\
    \ 之间也可能存在同样的区别。对于 Memcached 而言，虽然没有用户凭据，但涉及地址和端口，因此可能出现缓存实例有效，但无法连接到有效服务器的情况。当工厂类执行失败时，请始终参考生成的异常类型——它们很可能属于\
    \ `Database/Exception/Service` 或 `Cache/Exception/Service` 类型，这表示实例有效，但无法连接到所需的服务器/服务。\n\
    \n## 控制器\n\n引导启动谜题的最后一块，严格来说并不属于引导启动或我们的框架范畴。它实际上是关于每个控制器将如何渲染视图。让我澄清一下：这部分代码既属于应用代码，也属于框架代码。\n\
    \n回顾我们框架的三个目标，第二个目标是创建一个易于使用、且对我们将要创建的应用做出最少假设的框架。然而，有时这两个陈述会相互矛盾。视图渲染就是一个非常实际的例子。\n\
    \n我们可以假设应用的所有动作都会引发响应。此外，这种响应应该以能够传达给应用用户的形式呈现。它可以是 HTML、JavaScript（JSON）、XML\
    \ 等形式。关键在于，所有（或几乎所有）动作都需要输出，且这些输出很可能以视图的形式出现。\n\n因此，MVC 范式是框架的绝佳选择。我们期望有大量控制器/动作，每个都需要大量的视图渲染操作。虽然我们在此处实现了良好的分离，但也存在大量重复行为。如果每个动作都需要输出到视图，我们要么需要在每个动作（方法）的主体中渲染视图，要么需要将其挂接到框架执行的某个公共点上，使其成为标准行为。\n\
    \n此时，我们可以选择创建一个特定于应用的 `Controller` 子类，应用中所有控制器都将继承其视图渲染行为；或者我们也可以决定将这种常见行为整合到默认的\
    \ `Controller` 类中。我认为，现阶段最佳做法就是直接修改 `Controller` 类。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**注意：** 我们将在后续章节中学习如何扩展框架类，但现在你只需跟着我一起扩展默认的 `Controller` 类。\n\n## 视图\n\n在开始修改\
    \ `Controller` 类之前，我们必须先创建一个用于处理（和渲染）视图的类。为保持该类简洁，我们假设它处理的是类似于我们已构建的模板解析器之类的类；也就是说，一个包含\
    \ `parse()` 和 `process()` 方法，且外观如清单 13-5 所示的类。\n\n***清单 13-5.*** 视图类\n\n```\n\
    namespace Framework\n\n{\n\nuse Framework\\Base as Base;\n\nuse Framework\\Template\
