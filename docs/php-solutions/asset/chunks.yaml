    Although most of the code in this book will run correctly on older versions of
    PHP, you may get unexpected results if you use a server that still relies on those
    features. The most important changes that affect the code in this book are the
    removal of safe mode and magic quotes.


    Safe mode is often used in shared hosting environments. Among its effects, safe
    mode restricts where include files can be located and which files can be read
    from and written to. With the removal of safe mode in PHP 5.4, these restrictions
    no longer apply.


    Magic quotes were a misguided attempt to make PHP safer for inexperienced developers
    by inserting backslashes before quotes in user-submitted data. The idea was to
    prevent a malicious attack known as SQL injection. Unfortunately, magic quotes
    caused more problems than they solved, often leaving text peppered with unwanted
    backslashes. If you run the code in this book on PHP 5.3 or earlier, you’ll get
    unwanted backslashes if magic quotes haven’t been disabled.


    The code in this book also uses simplified syntax for arrays, which won’t work
    in older versions of PHP.


    The most important reason for not using an old version of PHP is security. When
    vulnerabilities are discovered, security updates are made only to the current
    and two previous versions. At the time of this writing, the current version is
    PHP 5.6\. That means PHP 5.4 and 5.5 will benefit from any security updates. But
    as soon as the next version comes out, PHP 5.4 will cease being patched for security
    threats. Using an up-to-date version of PHP isn’t simply a matter of gaining access
    to the latest features; it helps protect your website and valuable data from malicious
    attacks.


    ### Deciding Where to Test Your Pages


    Unlike ordinary webpages, you can’t just double-click PHP pages in Windows File
    Explorer or Finder on a Mac and view them in your browser. They need to be parsed,
    or processed, through a web server that supports PHP. If your hosting company
    supports PHP, you can upload your files to your website and test them there. However,
    you need to upload the file every time you make a change. In the early days, you’ll
    probably find you have to do this often because of some minor mistake in your
    code. As you become more experienced, you’ll still need to upload files frequently
    because you’ll want to experiment with different ideas.


    If you want to get working with PHP straight away, by all means use your own website
    as a test bed. However, you’ll soon discover the need for a local PHP test environment.
    The rest of this chapter is devoted to showing you how to do this, with instructions
    for both Windows and Mac OS X.


    ## What You Need for a Local Test Environment


    To test PHP pages on your local computer, you need to install the following:


    *   A web server: this is a piece of software that displays webpages, not a separate
    computer

    *   PHP

    *   MySQL and a web-based front end for MySQL called phpMyAdmin, which are required
    in order to work with a database


    Tip


    Some Linux distributions install MariaDB ( [`https://mariadb.org/`](https://mariadb.org/)
    ) as a drop-in replacement for MySQL. The code in this book is fully compatible
    with MariaDB.


    All the software you need is free. The only cost to you is the time it takes to
    download the necessary files, plus, of course, the time to make sure everything
    is set up correctly. In most cases, you should be up and running in less than
    an hour, probably considerably less. As long as you have at least 1GB of free
    disk space, you should be able to install all the software on your computer—even
    one with modest specifications.


    Tip


    If you already have a PHP test environment on your local computer, there’s no
    need to reinstall. Just check the section at the end of this chapter titled “Checking
    Your PHP Settings”.'
