- fmt: "注意，第一个名字“Joe Smith”后面列出了一个尾随空格。这是因为没有办法明确判断这个空格是属于名字，还是名字和电子邮件地址之间的可选空格。电子邮件地址，尤其是RFC822地址，非常复杂，要将所有可能的选项都考虑进一个正则表达式中，会产生一个非常长的模式。更高效且更易读的做法可能是，编写一个只匹配允许组合的子集的正则表达式。关于文档和动态环境下的模式测试，可以在[http://regexr.com/](http://regexr.com/)找到一个很好的参考。\n\
    \n## Recipe 9-3. String Replacement\n\n### Problem\n\n在Recipe 9-1中展示了如何使用`preg_replace()`根据模式查找字符串，并将该字符串的所有实例替换为新的静态字符串。如果需要保留匹配子字符串的一部分，该如何使用这种方法？换句话说，替换函数如何在字符串中创建新值时使用找到的部分内容？\n\
    \n### Solution\n\n解决方案是使用子模式和特殊的占位符来替换值。\n\n子模式根据它们在模式中出现的顺序进行编号。第一个括号表示第一个子模式的开始，它将被引用为索引1。这与`preg_match()`和`preg_match_all()`函数返回的数组中的编号方式一致。子模式可以包含在其他子模式内部，编号遵循模式中左括号的位置顺序。\n\
    \n当替换字符串时，特定的子模式通过转义字符后跟子模式的索引来引用。如果替换字符串以双引号字符串提供，则反斜杠必须转义。否则，字符串会尝试使用转义版本的索引。\n\
    \nPCRE 替换函数名为`preg_replace()`，它接受三个参数。第一个是用于匹配主题字符串部分内容的正则表达式模式，第二个参数是替换字符串，第三个参数是执行替换操作的主题字符串。这与`str_replace()`函数类似。\n\
    \n### How it Works\n\nHTML文档包含图像和其他资源，这些通常通过`src`属性和相对URL引用。当HTML文档作为对Web服务器请求的响应发送时，这种方式有效；但如果相同的HTML文档嵌入到电子邮件中，则需要完整的URL，以便电子邮件客户端能够渲染图像。\n\
    \n如果所有相对URL都是已知的，使用`str_replace()`函数替换它们很容易，但在大多数情况下，确切的URL是未知的。唯一已知的是模式`src=\"\
    /some/path/image.\"`。这可以转化为正则表达式`/src=\"[^\"]*\"/`。这个表达式中不包含任何子模式，因此为了能够识别URL部分，通过在`[^\"\
    ]*`周围加上括号`()`来引入一个子模式。最终的模式变为`/src=\"([^\"]*)\"/`。子模式中的字符类将匹配除了预期结束`src`属性的双引号之外的任何字符。\n\
    \n```php\n<?php\n// 9_10.php\n\n$html = <<<HEREDOC\n<img src=\"/images/logo.png\"\
    \ />\n<img alt=\"Photo\" src=\"/images/photo.jpg\" />\nHEREDOC;\n\n$body = preg_replace('/src=\"\
    ([^\"]*)\"/mi',\n    'src=\"http://mydomain.com\\1\"', $html);\n\necho $body;\n\
    ```\n\n在这个例子中，模式和替换字符串被创建为单引号字符串。如果使用双引号字符串，模式看起来会略有不同，因为双引号和转义字符都必须被转义。\n\n```php\n\
    $body = preg_replace(\"/src=\\\"([^\\\"]*)\\\"/mi\",\n    \"src=\\\"http://mydomain.com\\\
    \\1\\\"\", $html);\n```\n\n此脚本将输出重新格式化后的HTML，如下所示：\n\n```\n<img src=\"http://mydomain.com/images/logo.png\"\
    \ />\n<img alt=\"Photo\" src=\"http://mydomain.com/images/photo.jpg\" />\n```\n\
    \n在这个例子中，假设所有URL相对于文档根目录都是绝对的（以斜杠开头），并且没有URL是完整的。为了处理URL可能的各种编写方式，我们可以使用`preg_match_all()`函数来识别所有可能需要替换的位置，然后遍历所有匹配项并逐一替换。\n\
    \n```php\n<?php\n// 9_11.php\n\n$html = <<<HEREDOC\n<img src=\"/images/logo.png\"\
    \ />\n<img src=\"background.png\" />\n<img alt=\"Photo\" src=\"/images/photo.jpg\"\
    \ />\n<img src=\"http://example.com/images/photo.jpg\" />\nHEREDOC;\n\nif (preg_match_all('/src=\"\
    ([^\"]*)\"/mi', $html, $matches)) {\n    foreach ($matches[0] as $i => $str) {\n\
    \        if ($matches[1][$i][0] == \"/\") {\n            $html = str_replace($str,\n\
    \                \"src=\\\"http://mydomain.com{$matches[1][$i]}\\\"\", $html);\n\
    \        }\n        else if (substr($matches[1][$i], 0, 7) == \"http://\" ||\n\
    \                 substr($matches[1][$i], 0, 8) == \"https://\") {\n         \
    \   // Do nothing the URL is complete.\n        }\n        else {\n          \
    \  $dir = dirname($_SERVER['REQUEST_URI']);\n            $html = str_replace($str,\n\
    \                \"src=\\\"http://mydomain.com/{$dir}/{$matches[1][$i]}\\\"\"\
    , $html);\n        }\n    }\n}\n\necho $html;\n```\n\n`$matches`数组将包含两个元素（数组）。第一个将包含对完整模式的匹配项，第二个（索引1）将包含对第一个子模式的匹配项。两个数组中的元素数量相同。循环遍历第一个数组，并使用索引（`$i`）来引用第二个数组中对应的元素。\n\
    \n在上面的例子中，HTML包含了四个使用不同方式编写的URL的图像。第一个URL相对于文档根目录是绝对的。只需为其添加域名即可。第二个URL相对于当前脚本的执行路径。在这种情况下，需要添加域名和文件的路径。第三个URL也是相对于文档根目录的绝对路径。第四个，也就是最后一个URL，是一个指向不同网站的完整URL，因此无需对其进行任何操作。\n\
    \n当脚本从一个名为`folder`的目录执行时，输出将如下所示：\n\n```\n<img src=\"http://mydomain.com/images/logo.png\"\
    \ />\n<img src=\"http://mydomain.com/folder/background.png\" />\n<img alt=\"Photo\"\
    \ src=\"http://mydomain.com/images/photo.jpg\" />\n<img src=\"http://example.com/images/photo.jpg\"\
    \ />\n```\n\n## Variables\n\n变量用于临时将数据存储在内存中。变量只在PHP脚本运行时存在。它们通过美元符号后跟一个名称来标识。变量名可以以字母（a-z或A-Z）或下划线开头。之后的任何字符可以是数字、字母或任何从127到255（0x7f\
    \ – 0xff）的ASCII字符。名称的字符数没有限制。\n\n变量名是大小写敏感的，因此`$var`、`$Var`和`$VAR`将是三个不同的变量。\n\
    \nPHP是一种松散类型的语言，变量可以根据计算或操作的结果改变类型。如果整数值增加到超过最大值，它将被转换为浮点值。如果整数用作字符串操作的一部分，它将被转换为字符串。\n\
    \n使用美元符号来指定变量，这使得变量和函数可以使用相同的名称，例如内置函数`date()`和变量`$date`。语句`$date = date('c');`将生成一个根据ISO\
    \ 8601标准格式化的当前日期字符串。\n\nPHP有一组预定义变量，这些变量根据PHP的版本、Web服务器的类型、配置、HTTP请求的类型等因素而可用。这些预定义变量的完整列表可以在在线PHP手册中找到：[http://php.net/manual/en/reserved.variables.php](http://php.net/manual/en/reserved.variables.php)。这些变量通常包含有关环境、传递给脚本的参数等信息。"
  raw: 'Note that the first name ‘Joe Smith’ is listed with a trailing space. That
    happens because there is no clear way to determine if the space belongs to the
    name or is the optional space between the name and the e-mail address. E-mail
    addresses, and especially RFC822 addresses, are very complex and to take all the
    possible options into account in one single regular expression would create a
    very long pattern. It is most likely more efficient and readable to make a regular
    expression that matches only a subset of the allowed combinations. A good reference
    to documentation and to test patterns in a dynamic environment can be found at
    [http://regexr.com/](http://regexr.com/) .


    Recipe 9-3\. String Replacement


    Problem


    In Recipe 9-1 it was shown how to use preg_replace() to find a string from a pattern
    and replace all instances of that string with a new static string. How can this
    be used if part of the matching substring should be retained? In other words,
    how can the replace function use some of the content found when creating new values
    in the string?


    Solution


    The solution is to use subpatterns and special placeholders that will be used
    to substitute the values.


    Subpatterns are numbered based on the order they show up in the pattern. The first
    parenthesis will indicate the start of the first subpattern and it will be referenced
    with the index 1\. This is inline with the numbering within the arrays returned
    from preg_match() and preg_match_all() functions. Subpatterns can be contained
    within other subpatterns and the numbering follows the order in which the opening
    parenthesis for the pattern is located in the pattern.


    CHAPTER 9 ■ REGULAR EXPRESSIONS


    A specific subpattern is referenced with the escape character followed by the
    index of the subpattern, when replacing strings. If the replacement string is
    provided as a double quoted string the backslash must be escaped. Otherwise the
    string will try to use an escaped version of the index.


    The PCRE replace function is called preg_replace() and it takes three parameters.
    The first is the regular expression pattern that is used to match sections of
    the subject string, the second parameter is the replacement string, and finally
    the third parameter is the subject string where the replacements are performed.
    This is similar to the str_replace() function.


    How it Works


    HTML documents contain images and other resources that are often referenced with
    a src attribute and a relative URL. This works well when the HTML document is
    sent as a response to a request to the web server, but if the same HTML document
    is embedded in an e-mail, fully qualified URL’s are needed for the e-mail client
    to be able to render the images.


    If all the relative URL’s are known it’s easy to replace them using the str_replace()
    function but in most cases the exact URL’s are unknown. The only thing that is
    known is the pattern src=“/some/path/


    image.” This can be turned into a regular expression /src=“[^”]*”/. This expression
    does not contain any subpatterns so in order to be able to identify the URL portion
    a subpattern is introduced by adding () around [^”]*. The final pattern becomes
    /src=“([^”]*)”/. The character class in the subpattern will match any character
    except the double quote that is expected to end the src attribute.


    <?php


    // 9_10.php


    $html = <<<HEREDOC


    <img src="/images/logo.png" />


    <img alt="Photo" src="/images/photo.jpg" />


    HEREDOC;


    $body = preg_replace(''/src="([^"]*)"/mi'',


    ''src="http://mydomain.com\1"'', $html);


    echo $body;


    In this case the pattern and replacement string is created as single quoted strings.
    If double quoted strings were used the patterns would look slightly different
    as both the double quotes and the escape characters would have to be escaped.


    $body = preg_replace("/src=\"([^\"]*)\"/mi",


    "src=\http://mydomain.com\\1\", $html);


    This script will output the reformatted html that looks like this:


    <img src="http://mydomain.com/images/logo.png" />


    <img alt="Photo" src="http://mydomain.com/images/photo.jpg" /> In this example
    it’s assumed all URL’s are absolute with regards to the document root (starts
    with a slash) and no URL’s are fully qualified. To handle the various ways URL’s
    can be written we can use the preg_match_all() function to identify all the places
    that potentially needs replacement and loop over all the matches and replace them
    one at the time.


    CHAPTER 9 ■ REGULAR EXPRESSIONS


    <?php


    // 9_11.php


    $html = <<<HEREDOC


    <img src="/images/logo.png" />


    <img src="background.png" />


    <img alt="Photo" src="/images/photo.jpg" />


    <img src="http://example.com/images/photo.jpg" />


    HEREDOC;


    if (preg_match_all(''/src="([^"]*)"/mi'', $html, $matches)) {


    foreach ($matches[0] as $i => $str) {


    if ($matches[1][$i][0] == "/") {


    $html = str_replace($str,


    "src=\"http\"//mydomain.com{$matches[1][$i]}\"", $html);


    }


    else if (substr($matches[1][$i], 0, 7) == "http://" ||


    substr($matches[1][$i], 0, 8) == "https://") {


    // Do nothing the URL is complete.


    }


    else {


    $dir = dirname($_SERVER[''REQUEST_URI'']);


    $html = str_replace($str,


    "src=\"http\"//mydomain.com/{$dir }/{$matches[1][$i]}\"", $html);


    }


    }


    }


    echo $html;


    The $matches array will have two elements (arrays). The first will contain the
    matches to the full pattern and the second (index 1) will contain the matches
    to the first subpattern. There will be the same number of elements in both arrays.
    The loop iterates over the first array and the index ($i) is used to reference
    corresponding elements in the second array.


    In the example above the HTML contains four images with URL’s written in different
    ways. The first URL


    is absolute from the document root. Only the domain name should be added to this
    one. The second URL


    is relative to where the current script is executed from. In this case the domain
    and the path to the file are added. The third URL is also absolute to the document
    root and the fourth and last URL is an absolute URL


    to a different web site so no need to do anything with this one.


    When the script is executed from a directory called folder the output will look
    like this:


    <img src="http"//mydomain.com/images/logo.png" />


    <img src="http"//mydomain.com/folder/background.png" />


    <img alt="Photo" src="http"//mydomain.com/images/photo.jpg" />


    <img src="http://example.com/images/photo.jpg" />


    **CHAPTER 10**


    **Variables**


    Variables are used to store data temporarily in memory. Variables only exist as
    long as the PHP script is running. They are identified with a dollar sign followed
    by a name. The name of a variable can begin with a letter (a-z or A-Z) or an underscore.
    Any of the following characters can be a number, a letter, or any ASCII character
    from 127 to 255 (0x7f – 0xff ). There is no restriction on the number of characters
    in the name.


    Variable names are case sensitive so $var , $Var , and $VAR will be three different
    variables.


    PHP is a loosely typed language where variables can change type depending on the
    result of a calculation or operation. If an integer value is increased above the
    maximum size it will be converted to a floating point value. If an integer is
    used as part of a string operation it will be converted to a string.


    The use of the dollar sign to designate variables makes it possible to use the
    same name for variables and functions like in the case with the built-in function
    date() and the variable $date . The statement $date = date(''c''); will generate
    a string with the current date formatted according to the ISO 8601 standard.


    PHP has a set of predefined variables that will be available based on the version
    of PHP, the type of web server, the configuration, the type of HTTP request, and
    other factors. A full list of these predefined variables can be found in the online
    PHP man[ual: http://php.net/manual/en/reserved.variables.php .](http://php.net/manual/en/reserved.variables.php)
    These variables typically contain information about the environment, parameters
    passed to the script, etc.'
