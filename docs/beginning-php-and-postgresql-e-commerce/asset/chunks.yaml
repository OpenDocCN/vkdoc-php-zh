    C H A P T E R 4 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I I **How
    It Works: Populating the categories Table**


    Adding data to your table should be a trivial task, given that you know the data
    that needs to be inserted. As pointed out earlier, you can find the SQL scripts
    in the book’s code in the Source Code/Download section of the Apress web site
    (http://www.apress.com).


    Note how we escaped the special characters in the category descriptions, such
    as the single quotes, which need to be doubled, so PostgreSQL will know to interpret
    that as a quote to be added to the description, instead of a string termination
    character.


    When manually adding values to fields whose values would otherwise be generated
    by sequences, you need to manually update the sequence because the sequences are
    separate database objects that aren’t automatically updated if they aren’t used
    to generate data. If you don’t change the sequence, it would probably end up generating
    values that have already been added to the database, and some or all of your INSERT
    commands would end up throwing errors.


    **Adding Products**


    You’ll now go through the same steps as earlier, but this time, you’ll create
    a bit more complicated table: product. The product table has the fields shown
    in Table 4-3.


    **Table 4-3.** *Designing the* product *Table* **Field Name**


    **Data Type**


    **Description**


    product_id


    SERIAL


    An integer that represents the unique ID for the


    category. It is the primary key of the table.


    name


    VARCHAR(50)


    Stores the product name. It doesn’t allow NULLs.


    description


    VARCHAR(1000)


    Stores the category description. It allows NULLs.


    price


    NUMERIC(10,2)


    Stores the product price.


    discounted_price


    NUMERIC(10,2)


    Stores the discounted product price. Will store 0.00 in case the product doesn’t
    have a current discount price.


    image


    VARCHAR(150)


    Stores the name of the product’s picture file (or


    eventually the complete path), which gets displayed


    on the product details page. You could keep the


    picture directly in the table, but in most cases, it’s


    much more efficient to store the picture files in the file system and have only
    their names stored into the


    database. If you have a high-traffic web site, you might even want to have the
    image files placed in a separate


    physical location (for example, another hard disk) to


    increase site performance.


    thumbnail


    VARCHAR(150)


    Stores the name of the product’s thumbnail picture.


    This image gets displayed in product lists when


    browsing the catalog.


    display


    INTEGER


    Stores a value specifying in what areas of the catalog


    this product should be displayed. The possible values


    are 0 (default; the product shows only in the page of


    the category it’s a part of ), 1 (the product is also featured on the front catalog
    page), 2 (the product is also


