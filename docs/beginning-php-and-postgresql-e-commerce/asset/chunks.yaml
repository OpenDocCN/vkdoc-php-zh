    So, let’s start with a little bit of theory, after which you’ll create the department
    data table and the rest of the required components:


    **Understanding Data Tables**


    This section provides a quick database lesson covering the essential information
    you need to know to design simple data tables. We’ll briefly discuss the main
    parts that make up a database table:


    • Primary keys


    • PostgreSQL data types


    • UNIQUE columns


    • NOT NULL columns and default values


    • Serial columns and sequences


    • Indexes


    ■**Note** If you have enough experience with PostgreSQL, you might want to skip
