    \n`<h2>Contact Us </h2>`\n\n```\n<?php if ( ($_POST && $suspect) || ($_POST &&\
    \ isset($errors['mailfail'])) ) { ?>\n<p class=\"warning\">Sorry, your mail could\
    \ not be sent. . . .\n```\n\n原始条件和新的条件都已用括号括起来，因此每一对被当作一个整体来处理。如果表单已提交且发现了可疑短语，或者表单已提交且设置了`$errors['mailfail']`，则会显示消息未发送的警告。\n\
    \n删除`contact.php`底部显示消息体和头部信息的代码块（包括`<pre>`标签）。\n\n在本地测试这很可能会导致显示感谢页面，但电子邮件永远不会到达。这是因为大多数测试环境没有MTA。即使你设置了一个，大多数邮件服务器也会拒绝来自未识别来源的邮件。将`contact.php`和所有相关文件（包括`processmail.php`和`thank_you.php`）上传到你的远程服务器，并在那里测试联系表单。不要忘记`processmail.php`需要放在名为`includes`的子文件夹中。\n\
    \n你可以对照`ch05`文件夹中的`contact_07.php`和`includes/processmail_05.php`来检查你的代码。\n\n####\
    \ 故障排除：`mail()`\n\n理解`mail()`不是一个电子邮件程序这一点很重要。PHP的责任在其将地址、主题、消息和头部信息传递给MTA后就结束了。它无法得知电子邮件是否送达了预期目的地。通常情况下，电子邮件会即刻到达，但网络拥塞可能会导致延迟数小时甚至一两天。\n\
    \n如果你从`contact.php`发送消息后被重定向到感谢页面，但收件箱中什么也没有收到，请检查以下内容：\n\n*   消息是否被垃圾邮件过滤器拦截了？\n\
    *   你是否检查了`$to`中存储的目标地址？尝试使用另一个电子邮件地址，看看是否有区别。\n*   你在`From`头中是否使用了真实地址？使用虚假或无效的地址很可能会导致邮件被拒绝。请使用与你的Web服务器属于同一域的有效地址。\n\
    *   向你的托管公司咨询，看看`mail()`的第五个参数是否是必需的。如果是，它通常应该是一个由`-f`后跟你的电子邮件地址组成的字符串。例如，`david@example.com`变成`'-fdavid@example.com'`。\n\
    \n如果你仍然没有收到来自`contact.php`的消息，请创建一个包含以下脚本的文件：\n\n```\n<?php\nini_set('display_errors',\
