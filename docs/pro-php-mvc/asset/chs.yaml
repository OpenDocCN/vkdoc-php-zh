  \ ?>\n</table>\n```\n\n### 问题\n\n1. CakePHP 对应用程序的命名约定和默认配置做了大量假设，从而可以用极少的代码实现非常多的功能。这种应用开发方法有哪些优点和缺点？\n\
  2. CakePHP 与 Zend Framework 一样，为其模板文件使用了自定义文件扩展名。这可能会给我们的应用程序带来哪些安全错误？\n\n### 答案\n\
  \n1. CakePHP 约定优于配置的方法意味着我们可以用极少的代码完成很多工作。它的好处在于，开发者无需重复执行每个应用程序中常见的任务，就能快速构建原型。然而，这也要求开发者必须先学习这些约定，才能高效地使用该框架。\n\
  2. 包含 PHP 代码但扩展名不是 `.php` 的文件，可能会被负责提供文件的网络服务器解读为纯文本文件或纯 HTML 文件。建议将所有包含 PHP 代码的文件都使用\
  \ `.php` 扩展名，或者至少确保每个可网络访问的文件夹在提供包含 PHP 代码的文件时，都使用 PHP 的 MIME 类型。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 31 章 ■ CakePHP：MVC\n\n### 练习\n\n1. CakePHP 的 ORM 系统功能强大且富有表现力，我们在此仅使用了其中的一小部分。请查阅文档并尝试扩展\
  \ `search()` 操作。\n2. CakePHP 包含一个与我们这里创建的登录系统截然不同的认证库。请研究一下它，并尝试将其与我们的登录系统集成。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 32 章 CakePHP：扩展\n\n对 CakePHP\
  \ 核心功能的扩展有多种形式。它们可以是组件、助手、行为或任务（所有这些都被统称为集合）。\n\n无论你是需要 CakePHP 捆绑的库，还是打算使用自己的（第三方）库，你都需要利用所有集合共享的统一\
  \ API，来加载、卸载、启用、禁用或调用它们的功能。\n\n### 目标\n\n- 我们需要学习如何使用 CakePHP 的内置功能。\n- 我们需要学习如何在\
  \ CakePHP 应用程序中引入我们自己的（第三方）功能。\n\n### 文件上传\n\nCakePHP 有自己的内置库来处理文件和文件夹。这个库处理了创建和移动文件的所有麻烦事，所以我们不需要自己做这些工作。\n\
  \n在接受任何文件上传之前，我们需要创建用于存储文件引用的数据库表。这遵循了之前框架和应用程序中设定的可预测模式，如**清单 32-1** 所示。\n\n***清单\
  \ 32-1.*** `photos` 表\n\n```sql\nCREATE TABLE 'photos' (\n    'name' varchar(255)\
  \ DEFAULT NULL,\n```\n\n\n\n```sql\n`mime` varchar(32) DEFAULT NULL,\n`size` int(11)\
  \ DEFAULT NULL,\n`width` int(11) DEFAULT NULL,\n`height` int(11) DEFAULT NULL,\n\
  `user_id` int(11) DEFAULT NULL,\n`id` int(11) NOT NULL AUTO_INCREMENT,\n`live` tinyint(4)\
  \ DEFAULT NULL,\n`deleted` tinyint(4) DEFAULT NULL,\n`created` datetime DEFAULT\
  \ NULL,\n`modified` datetime DEFAULT NULL,\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 32 章 ■ Cakephp：扩展\n\n```sql\nPRIMARY KEY (`id`),\nKEY `live` (`live`),\n\
  KEY `deleted` (`deleted`)\n) ENGINE=InnoDB DEFAULT CHARSET=utf8 ;\n```\n\n这张表与我们之前创建的文件表有所不同；主要区别在于，现在表名变为\
  \ `photos`（这是遵循 CakePHP 的命名规范），并且出于相同原因，`user` 字段变为了 `user_id`。创建好数据库表后，我们就可以来看一下\
  \ `Photo` 模型，如代码清单 32-2 所示。\n\n**代码清单 32-2.** `~/app/Model/Photo.php`\n\n```php\n\
  class Photo extends AppModel\n{\n    public $belongsTo = \"User\";\n}\n```\n\n`Photo`\
  \ 模型引入了一个我们之前未曾见过的新概念：关联关系。CakePHP 的 ORM 模型提供了数据库对象之间多种类型的关联关系，而 `$belongsTo` 表示每个\
  \ `Photo` 对象都属于一个单一的 `User` 对象。\n\n为了巩固这两种数据类型之间的这种连接，我们还需要修改 `User` 模型，如代码清单 32-3\
  \ 所示。\n\n**代码清单 32-3.** `~/app/Model/User.php`（已修改）\n\n```php\nclass User extends\
  \ AppModel\n{\n    public $hasMany = \"Photo\";\n}\n```\n\n（在修改后的 `User` 模型中展示的）对应的关联关系类型是\
