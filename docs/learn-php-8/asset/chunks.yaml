    \n*   Pass simple arrays into methods (functions)\n\nSecured User Interaction\n\
    In Chapter [2](#394210_2_En_2_Chapter.xhtml), the `Hello World` examples\nincluded\
    \ user interaction (clicking a Submit button) to call a PHP program. This chapter\n\
    will use the HTML web form to accept information from the user and then\npass\
    \ this information to a PHP program.\n\n*Do not trust your users!* You must be\
    \ prepared for any type of\ninformation your users will enter into a web form.\
    \ You must also make\nsure that you validate and secure information every time\
    \ before\naccepting it into your programs. You must remember that users may elect\n\
    to not allow JavaScript to run in their browsers. Therefore, your\nprogram cannot\
    \ be dependent on JavaScript code for\nverification of input. You must be able\
    \ to handle these scenarios:\n\n1.  If the user is using an HTML5-capable browser,\
    \ you can verify all\n    input using HTML5 and/or JavaScript before sending it\
    \ to the PHP program\n    on the web server. This will reduce the passing of information\
    \ between\n    the client machine and the server. Information will not be passed\
    \ until\n    it has been verified.\n\n2.  If the user is using a browser that\
    \ does not have HTML5 capability,\n    the user input can still be verified by\
    \ the PHP program on the web\n    server.\n\nIt is preferable to handle the initial\
    \ verification using the first\nmethod. This would verify the correct information\
    \ most of the time\nbefore sending it to the server. Method #2 will cause more\
    \ server calls\nbecause the information must be sent to the server for verification,\
    \ and\nthen any error messages must be sent back to the browser for the user to\n\
    correct.\nEven if you verify the information using method #1, when the PHP\nprograms\
    \ receive the information on the web server, data must again be\nevaluated. Even\
    \ though the user may have sent valid information, packet\nsniffing programs can\
    \ change valid information into harmful\ninformation.\n\nHTML5 Form Validation\n\
    \nWhen building an HTML5 form, you can validate\ninformation entered in by the\
    \ user. As already stated, this will reduce\nthe amount of traffic between the\
