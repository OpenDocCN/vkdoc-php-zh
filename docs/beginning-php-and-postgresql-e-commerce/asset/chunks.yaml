    \ war\":\nSELECT rank(search_vector, to_tsquery('yankee | war')) as rank, product_id,\
    \ name FROM product\nWHERE search_vector @@ to_tsquery('yankee | war')\nORDER\
    \ BY rank DESC;\n```\n\nThis time, the results will come ordered. You can also\
    \ see the search rankings. The products that have matches in the `name` have significantly\
    \ higher ranks.\n\n**Table 5-4.** *Search Results Ordered by Rank*\n\n| rank \
    \    | product_id | name                         |\n|----------|------------|------------------------------|\n\
