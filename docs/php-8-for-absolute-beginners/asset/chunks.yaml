    ## HTTP 是无状态的


    超文本传输协议（HTTP）是互联网上大量数据通信的基础。它是*无状态的*，这意味着它将每个新请求视为一个独立的事务。在实际应用中，这意味着每次新请求时，所有的
    PHP 变量和对象都会从头开始创建。


    这给我们带来了一些影响。当我们提交登录表单时，就是发起了一个 HTTP 请求。PHP 会运行，`$admin` 对象会记住我们已登录。如果我们尝试点击一个条目，这将发起一个新的
    HTTP 请求，因此会创建一个新的 `$admin` 对象。PHP 不会记住我们刚刚登录过，因为新的 HTTP 请求被视为一个独立的、分离的事务。之前的 HTTP
    请求被完全遗忘。


    ## 超全局变量：$_SESSION


    这种无状态的 HTTP 对我们的登录功能来说是个坏消息。无论我们登录多少次，PHP 都会在每个新请求中将其忘记。这非常不实用，当然，也有解决方案：在请求之间形成持久状态。我们需要一种方法强制
    PHP 记住某个特定用户已登录。PHP 的 `session` 可以完成这个任务。


    当 PHP 会话启动时，访问用户的浏览器会被分配一个唯一的识别号：一个*会话 ID*。服务器会在服务器端（默认情况下）创建一个小的临时文件。我们应用程序需要在请求之间记住的任何信息都可以存储在这个文件中。PHP
    会话的持续时间可以在 `php.ini` 文件中配置。


    > **注意**：更多信息请阅读 [`www.php.net/manual/en/intro.session.php`](http://www.php.net/manual/en/intro.session.php)。


    PHP 提供了一个超全局变量来创建会话。现在，是时候认识一下 `$_SESSION` 了。


    ## 使用会话保持状态


    要使用会话，我们必须启动一个会话。有了会话之后，我们可以创建一个*会话变量*，这是一个值具有*状态性*的变量，意味着它的值可以在 HTTP 请求之间持久存在。


    让我们使用一个会话变量来记住我们的登录状态。


    ```

    <?php

    //用于 models/Admin_User.class.php 的完整代码

