    **453**


    **Listing 12-27.** *Generating a List of Tags Based on a Partial Search Term (BlogPost.php)*


    <?php


    class DatabaseObject_BlogPost extends DatabaseObject


    {


    // ... other code


    **public static function GetTagSuggestions($db, $partialTag, $limit = 0)**


    **{**


    **$partialTag = trim($partialTag);**


    **if (strlen($partialTag) == 0)**


    **return array();**


    **$select = $db->select();**


    **$select->distinct();**


    **$select->from(array(''t'' => ''blog_posts_tags''), ''lower(tag)'')**


    **->joinInner(array(''p'' => ''blog_posts''),**


    **''t.post_id = p.post_id'',**


    **array())**


    **->where(''lower(t.tag) like lower(?)'', $partialTag . ''%'')**


    **->where(''p.status = ?'', self::STATUS_LIVE)**


    **->order(''lower(t.tag)'');**


    **if ($limit > 0)**


    **$select->limit($limit);**


    **return $db->fetchCol($select);**


    **}**


    // ... other code


    }


    ?>


    The returned data is an array with no more than $limit elements (unless the value
    of $limit is 0, in which case all found tags are returned).


