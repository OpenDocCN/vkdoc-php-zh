    `set()` 方法的描述中，`parent::set($args[0])` 命令调用了从父类继承的 `set()` 方法的版本。这里使用了一条通用规则，即如果要访问父类方法，应该在其前面加上
    `parent` 关键字和双冒号（`::`）。特别地，`parent::set($args[0])` 语句意味着，当从 `Bravo` 类的对象调用 `set()`
    方法时，必须首先调用父类（即 `Alpha` 类）中该方法的版本。该版本方法（来自 `Alpha` 类）的第一个参数由传递给 `set()` 方法（来自 `Bravo`
    类）的第一个参数定义。结果，`$number` 字段被赋值。为了给 `$symbol` 字段赋值，使用 `$this->symbol=$args[1]` 命令，根据该命令，第二个参数决定了传递给
    `set()` 方法的字段的值。为了覆盖 `show()` 方法，使用了以下命令。首先，`echo "-----------------\n"` 语句显示一条“装饰性”线条，纯粹为了美观，用以分隔
    `show()` 方法的不同调用结果。`parent::show()` 命令调用了 `Alpha` 父类中 `show()` 方法的版本，之后 `echo
    "The class Bravo\n"` 命令显示一条消息，然后显示 `$symbol` 字段的值（通过 `echo "字段 \$symbol: ",$this->symbol,"\n"`
    命令）。`$A=new Alpha` 命令创建基于 `Alpha` 类的 `$A` 对象。该对象的 `set()` 和 `show()` 方法按照 `Alpha`
    类中的描述执行。`Bravo` 子类的 `$B` 对象是通过 `$B=new Bravo` 命令创建的。你可以直接验证，对于该对象，`show()` 和 `set()`
    方法的执行方式不同（与 `$A` 对象相比），即根据它们在 `Bravo` 类中被覆盖的方式执行。


    > **注意**: 你可以通过使用 `final` 关键字声明方法来禁用方法覆盖。


