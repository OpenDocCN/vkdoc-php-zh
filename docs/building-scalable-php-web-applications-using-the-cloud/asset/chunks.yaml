    在处理签名 URL 时，需要注意它们如何与缓存交互。在本例中，`single.php`没有被缓存，因此无需担心。然而，如果它被缓存了，重要的是要确保 URL
    的过期时间远大于渲染后的代码可能在缓存中停留的时间。


    例如，如果 URL 仅有效 30 秒，但缓存能持续一小时，那么，在最初的 30 秒结束后，在接下来的一小时里，用户将获得他们无法使用的 URL。在问题开始出现时（或者，最好是之前）请牢记这一点。


