- fmt: '# The Home Page


    As I suggested in the previous chapter, I feel that clients often focus too much
    on getting every little detail right on the home page at the expense of other
    steps in the customer journey. However, the importance of a carefully designed
    home page shouldn’t be understated—it’s just that an obsession with pixel perfection
    shouldn’t lead you to ignore the primary goals of the page itself.


    ## Design Goals for Home Pages


    When designing your home pages, you should try to achieve three primary goals:


    * Convey to customers what the brand is

    * Convey to customers what the store offers

    * Convey to customers what to do next


    ### Conveying the Brand


    “Brand personality,” “corporate identity,” “lifestyle brand.” Whatever market-y
    term you’d like to use, it is important that a home page instantly conveys to
    visitors the nature of the store.


    Users have strong expectations about how online stores in different verticals
    should look. While this doesn’t mean that you should out-and-out copy the design
    of competitors and never innovate, it is worth paying attention to the conventions
    of the market—like common terminology, categorizations, and stylistic elements—to
    avoid innovating yourself out of conversions. Simply put, skateboard brands shouldn’t
    look like Walmart.


    The best way to get across your message is to combine a simple description of
    what the store does with some suitable imagery. (Yes, it sounds stupidly simple.
    Yet, you’d be surprised at how difficult many stores find this.) You can see the
    extremes of home pages that do and don’t achieve this in Figure [6-1](#A437216_1_En_6_Chapter.html#Fig1).


    ![A437216_1_En_6_Fig1_HTML.jpg](A437216_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Brooklinen’s home page (left) makes it clear what their product range is all about,
    while the Clove Club wins the enigmatic category at the expense of conversion


    ### Conveying Your Product Range


    Christian Holst of the Baymard Institute describes the litmus test for Ecommerce
    home pages as:


    > Does a quick glance over your home page adequately convey your store’s product
    diversity? If not, first-time visitors may be drawing false conclusions about
    the scope of your site’s product catalog.


    In short, if your store sells a wide range of products, but only a small fraction
    of them or a single product range is highlighted on your home page, customers
    may assume you don’t sell what they’re after and leave the site. The best way
    to convey your products will depend on the range on offer. If the store is more
    of a “product” company, selling a single line of products (e.g., Apple), then
    it may be sufficient to simply highlight a few of the store’s most popular or
    new items. Conversely, if the store has more of a “retailer” approach and sells
    many different lines of products (e.g., Walmart), then it will be more likely
    to highlight and promote entire categories or product lines on the home page (see
    Figure [6-2](#A437216_1_En_6_Chapter.html#Fig2)).


    ![A437216_1_En_6_Fig2_HTML.jpg](A437216_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    The home pages of Apple (a “product” company) and Walmart (a “retail” company)


    Note the difference in focus between the two stores—Apple focuses on highlighting
    a key product and links directly to it, while Walmart displays links to entire
    categories directly from the home page.


    ### Clear Next Actions


    One of the biggest sins an Ecommerce store designer can commit is leaving a visitor
    to a site uncertain about what action to take to get them closer to a purchase.


    Having conveyed a sense of who the brand is and what products are on offer, the
    next task is to make sure that potential customers have a clear path to being
    able to browse through the store’s categories and/or drill down on specific products.
    As with the way you choose to display the product range, how your design achieves
    this will likely be dependent on the number of categories and products on offer.


    “Product” companies can potentially feature their entire range at different points
    on the home page and link directly to the individual product pages in each case.
    Calls to action can be more specific (“Read more about the new MacBook Air”).


    “Retail” companies should instead feature key categories on the home page, encouraging
    users to click through and browse their entire range to increase the chances of
    finding what they’re after. Stores with large ranges should design their home
    pages to place more emphasis on navigation elements and search functionality—recall
    the discussion of these elements in Chapter [4](#A437216_1_En_4_Chapter.html).


    ## Implementing a Home Page


    As the design goals suggest, your home page often needs a high degree of flexibility
    to account for the different types of merchants using your themes, and to allow
    for the display of different types of content not directly linked to products
    or collections (for example, blog articles). Even when you’re designing a theme
    for one specific merchant, their needs and campaigns will change over time, demanding
    a way to customize home page content.


    Thankfully, Shopify provides a feature called dynamic sections for the home page
    of its sites, which allows you to design a variety of key components that merchants
    can then select from and configure to match their own use case. The following
    section walks through how we can create three different types of dynamic sections
    in our example theme—a “hero image,” a “featured products” block, and a “featured
    collections” block (see Figure [6-3](#A437216_1_En_6_Chapter.html#Fig3)). A storeowner
    using this theme would then be able to add, configure, and rearrange these sections
    on their home page as desired to meet the design goals listed at the top of this
    chapter.


    ![A437216_1_En_6_Fig3_HTML.jpg](A437216_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    A mockup showing the three key home page sections we’ll be implementing—a “hero
    image,” a featured products block, and a featured collections block


    ### Getting Started with Home Page Sections


    Shopify uses the file `template/index.liquid` to render a store’s home page. As
    with other templates, the HTML generated from `index.liquid` will be rendered
    inside `layout/theme.liquid`. Traditionally, the index template would be implemented
    the same as any other page template, with the HTML and Liquid desired for the
    home page added directly in `index.liquid`.


    However, the introduction of dynamic sections on the home page of a theme means
    that most of the code used to render home page content will appear in independently-defined
    sections. Much like the `{{ content_for_layout }}` tag in `layout/theme.liquid`
    will be replaced with page content for the current theme, so too will a `{{ content_for_index
    }}` tag in `templates/index.liquid` be replaced with the dynamically-generated
    section content configured by the storeowner.


    Because for now it’s good enough having all the home page content managed in sections,
    we can update the contents of `templates/index.liquid` to simply contain Listing
    [6-1](#A437216_1_En_6_Chapter.html#Par23).


    ```

    {{ content_for_index }}


    Listing 6-1

    Simple Contents of templates/index.liquid to Enable Dynamic Section Rendering
    on the Home Page

    ```'
