    **74**


    C H A P T E R 3 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I **How
    It Works: Creating PostgreSQL Data Tables**


    You have just created your first database table! You also set a primary key, set
    a serial column, and filled the table with some data.


    As you can see, as soon as you have a clear idea about the structure of a table,
    it’s relatively easy to use pgAdmin III to create it into your database. Let’s
    move on!


    **Communicating with the Database**


    Now that you have a table filled with data, let’s do something useful with it!
    The ultimate goal with this table is to get the list of department names from
    a PHP page and populate the Smarty template with that list.


    To get data from a database, you first need to know how to communicate with the
    database. Relational databases understand dialects and variants of **SQL**. The
    usual way of communicating with PostgreSQL is to write an SQL command, send it
    to the PostgreSQL


    server, and get the results back.


    In practice, as you’ll see later, we prefer to centralize the data access code
    using PostgreSQL **functions**, but before you can learn about them, you need
    to know the basics of SQL.


    **The Structured Query Language (SQL)**'
  trans: "\n# 索引\n\n索引与 PostgreSQL 性能调优有关，因此我们在此仅作简要介绍。\n\n`索引` 是旨在提升数据库操作整体速度的数据库对象。索引基于这样一个假设：绝大部分数据库操作都是读取操作。索引能提升搜索操作的速度，但会降低插入、删除和更新操作的速度。通常，使用索引的好处远大于其弊端。\n\
    \n你可以在一个表上创建一个或多个索引，每个索引针对一列或一组列。当表在特定列上建有索引时，其行会根据该列的值和索引类型被索引或进行物理排列。这使得对该列的搜索操作非常迅速。例如，如果对\
    \ `department_id` 建立了索引，然后你搜索 ID 值为 934 的部门，那么搜索会执行得非常快。\n\n索引的弊端在于，它们可能会拖慢添加新行或更新现有行的数据库操作，因为每次执行这些操作时，都必须更新索引（或重新排列表行）。\n\
    \n关于索引，你应记住以下几点：\n\n- 索引能极大地加快数据库的搜索操作，但会降低更改数据库的操作（删除、更新和插入操作）的速度。\n- 索引过多可能会降低数据库的整体性能。一般规则是，在\
    \ `WHERE`、`ORDER BY` 和 `GROUP BY` 子句中频繁使用，或用于表连接的列上设置索引。\n- 默认情况下，系统会自动在主键表列上创建唯一索引。\n\
    \n你可以使用专用工具在压力条件下测试数据库在有特定索引和没有特定索引情况下的性能；事实上，一个严谨的数据库管理员在决定最有效的索引组合之前，会想要运行一些此类测试。\n\
    \n# 创建 `department` 表\n\n你在第 2 章中创建了 `hatshop` 数据库。在接下来的练习中，你将使用 pgAdmin III 向其中添加\
    \ `department` 表。或者，你可以使用源代码/下载中的 SQL 脚本创建并填充 `department` 表（你也可以通过 pgAdmin III\
    \ 执行它们）。\n\n> **注意** 与其他数据库服务器不同，PostgreSQL 仍然允许你在添加新行时，如果需要，手动为自动编号字段指定值。\n\n\
    > **注意** 你可以在本书的源代码/下载部分找到数据库创建脚本，该部分位于 Apress 网站 (http://www.apress.com)。你也可以在作者的个人网站\
    \ http://www.cristiandarie.ro 和 http://www.emilianbalanescu.ro 上找到这些文件。\n\n##\
    \ 练习：创建 `department` 表\n\n1. 启动 pgAdmin III，并使用 `hatshopadmin` 用户名登录你的数据库服务器，就像你在第\
    \ 2 章最后一个练习中所做的那样。\n\n2. 展开 `hatshop` 数据库节点，展开 `Schemas`，展开 `public`，然后选择 `Tables`\
    \ 节点。右键单击此节点，并从上下文菜单中选择**新建表**。\n\n3. 在**名称**文本框中输入 **department**，然后单击**列**选项卡。\n\
    \n4. 在**列**窗口中，单击**添加**。按照图 3-10 所示填写详细信息，然后单击**确定**。\n\n   **图 3-10.** *添加 `department_id`\
    \ 字段*\n\n5. 再次单击**添加**以添加 `name` 字段，如图 3-11 所示。\n\n   **图 3-11.** *添加 `name` 字段*\n\
    \n6. 再次单击**添加**以添加 `description` 字段。这应该也是一个 `varchar` 字段，最大长度为 1000。让**非 NULL**\
    \ 复选框保持未选中状态，然后单击**确定**。\n\n7. 创建表的最后一步是指定一个主键。单击**约束**选项卡，确保组合框中选中了**主键**，然后单击**添加**。\n\
    \n8. 为键名输入 **pk_department**，然后切换到**列**选项卡，并将 **department_id** 添加到列表中。单击**确定**关闭对话框。\n\
    \n9. 再次单击**确定**以创建表。你的新表现在应该出现在数据库的**表**列表中（参见图 3-12）。如你所见，除了你的新表之外，还有一些 PostgreSQL\
    \ 默认创建的表——忽略它们是安全的。如果你从列表中选择 `department` 表，pgAdmin III 将显示创建你刚刚通过可视化界面构建的结构的\
    \ SQL 代码。你可以检查在你的计算机上是否看到相同的代码，以确保你已正确完成了练习的步骤。\n\n   **图 3-12.** *pgAdmin III\
    \ 中的 `department` 表*\n\n   > **注意** 你将在后续章节中学习更多关于 SQL 的知识，但现在只需知道 SQL 是一种可用于与数据库交互、创建数据表、从这些表中读取数据等的语言就足够了。\n\
    \n10. 让我们用一些示例数据填充该表。右键单击 `department` 表，然后选择**查看数据**。\n\n11. 使用显示的表单，添加表 3-2\
    \ 中提到的记录。\n\n    **表 3-2.** *`department` 表的三个记录*\n\n    | `department_id` | `name`\
    \          | `description`                                                   \
    \                                |\n    |-----------------|-----------------|-------------------------------------------------------------------------------------------------|\n\
    \    | Holiday         | 用我们特别的季节性帽子系列为假期做准备！                                \
    \                              |                                             \
    \                                                    |\n    | Caps and Berets\
    \ | 适合工作和化装派对的完美帽子！                                                          \
    \         |                                                                  \
    \                               |\n    | Costume Hats    | 为你的新戏服找到相配的帽子！    \
    \                                                                 |          \
    \                                                                            \
    \           |\n\n    > **注意** 由于你已经设置了序列，最好让它生成部门 ID，而不是自己输入值。你只需输入名称和描述。如果你手动写入\
    \ `department_id` 值而不是让序列生成它，你还需要更新序列，因为这不会自动发生。如果你不更新序列，它将生成数据库中已存在的值。\n\n##\
    \ 工作原理：创建 PostgreSQL 数据表\n\n你已经创建了你的第一个数据库表！你还设置了主键、设置了自增列，并用一些数据填充了该表。\n\n正如你所看到的，一旦你对表的结构有了清晰的概念，使用\
    \ pgAdmin III 在你的数据库中创建它就相对容易了。让我们继续！\n\n# 与数据库通信\n\n既然你已经有了一个填充了数据的表，那就让它发挥一些作用吧！这个表的最终目标是从\
    \ PHP 页面获取部门名称列表，并用该列表填充 Smarty 模板。\n\n要从数据库获取数据，首先需要知道如何与数据库通信。关系型数据库理解 SQL 的各种方言和变体。与\
    \ PostgreSQL 通信的常见方式是编写一条 SQL 命令，将其发送给 PostgreSQL 服务器，然后获取返回结果。\n\n在实践中，正如你稍后将看到的，我们更倾向于使用\
    \ PostgreSQL 函数集中数据访问代码，但在你了解它们之前，你需要知道 SQL 的基础知识。\n\n## 结构化查询语言 (SQL)\n"
- fmt: 'SQL is the language used to communicate with modern Relational Database Management
    Systems (RDBMS). However, we haven’t seen a database system yet that supports
    exactly the SQL 99 and SQL 2003 standards. This means that in many cases, the
    SQL code that works with one database will not work with the other. Currently,
    PostgreSQL supports most of SQL 92 and SQL 99.


    The most commonly used SQL commands are `SELECT`, `INSERT`, `UPDATE`, and `DELETE`.
    These commands allow you to perform the most basic operations on the database.


    The basic syntax of these commands is very simple, as you’ll see in the following
    pages.


    However, keep in mind that SQL is a very flexible and powerful language that can
    be used to create much more complicated and powerful queries than what you see
    here. You’ll learn more while building the web site, but for now let’s take a
    quick look at the basic syntax. For more details about any of these commands,
    you can always refer to the official documentation at


    - <http://www.postgresql.org/docs/current/interactive/sql-select.html>

    - <http://www.postgresql.org/docs/current/interactive/sql-insert.html>

    - <http://www.postgresql.org/docs/current/interactive/sql-update.html>

    - <http://www.postgresql.org/docs/current/interactive/sql-delete.html>


    ### SELECT


    The `SELECT` statement is used to query the database and retrieve selected data
    that match the criteria you specify. Its basic structure is


    ```

    SELECT <column list>

    [FROM <table name(s)>]

    [WHERE <restrictive condition(s)>]

    ```


    > **Note:** In this book, the SQL commands and queries appear in uppercase for
    consistency and clarity although SQL is not case sensitive. The `WHERE` and `FROM`
    clauses appear in brackets because they are optional.


    The following command returns the name of the department that has the `department_id`
    of 1. In your case, the returned value is Holiday, but you would receive no results
    if there was no department with an ID of 1.


    ```

    SELECT name FROM department WHERE department_id = 1;

    ```


    > **Tip:** You can easily test these queries to make sure they actually work by
    using the Query tool, accessible from the Tools menu of pgAdmin III.


    If you want more columns to be returned, you simply list them, separated by commas.


    Alternatively, you can use `*`, which means “all columns.” However, for performance
    reasons, if you need only certain columns, you should list them separately instead
    of asking for them all.


    Using `*` is not advisable even if at a particular moment you do want all the
    columns for a query because in future you may add even more columns to the table,
    and your query would end up asking for more data than is needed. Finally, using
    `*` doesn’t guarantee the order in which the columns are returned, as one may
    change the order of the columns in a table (although this is not likely to happen).
    For these reasons, we don’t use `*` in this book.


    With your current `department` table, the following two statements return the
    same results:


    ```

    SELECT department_id, name, description

    FROM department

    WHERE department_id = 1;

    SELECT * FROM department WHERE department_id = 1;

    ```


    > **Tip:** You can split an SQL query on more lines, if you prefer—PostgreSQL
    won’t mind.


    If you don’t want to place any condition on the query, simply remove the `WHERE`
    clause, and you’ll get all the rows. The following `SELECT` statement returns
    all rows and all columns from the `product` table:


    ```

    SELECT * FROM product;

    ```


    > **Tip:** If you are impatient and can’t wait until later in the chapter, you
    can test the SQL queries right now by using the pgAdmin III tool! After connecting
    to the `hatshop` database, choose Tools ➤ Query tool. This will open a window
    where you can type and execute SQL queries on your database. Be careful, though,
    because in the rest of the book we’ll assume the data in your `department` table
    is the same as shown previously in the chapter.


    Unless a sorting order is specified, the order in which the rows are returned
    by a `SELECT` clause can’t be determined. Moreover, executing the same query twice
    could generate different results! To sort the results, you use `ORDER BY`. The
    following query will return the list of departments sorted alphabetically by the
    department name:


    ```

    SELECT department_id, name, description

    FROM department

    ORDER BY department_id;

    ```


    ### INSERT


    The `INSERT` statement is used to insert a row of data into the table. Its syntax
    is as follows:


    ```

    INSERT INTO <table name> [(column list)] VALUES (column values)

    ```


    > **Tip:** Although the column list is optional (in case you don’t include it,
    column values are assigned to columns in the order in which they appear in the
    table’s definition), you should always include it. This ensures that changing
    the table definition doesn’t break the existing `INSERT` statements.


    The following `INSERT` statement adds a department named Seasonal Hats Department
    to the `department` table:


    ```

    INSERT INTO department (name) VALUES (''Seasonal Hats Department'');

    ```


    No value was specified for the `description` field because it was marked to allow
    `NULL`s in the `department` table. This is why you can omit specifying a value,
    if you want to. Also, you’re allowed to omit specifying a department ID because
    the `department_id` column was created with the `serial` option, which means the
    database takes care of automatically generating a value for it when adding new
    records. However, you’re allowed to manually specify a value, if you prefer.


    > **Tip:** Because `department_id` is the primary key column, trying to add more
    records with the same ID would cause the database to generate an error. The database
    doesn’t permit having duplicate values in the primary key field.


    When letting PostgreSQL generate values for `serial` columns, you can obtain the
    last generated value using the `currval` function. Here’s an example of how this
    works:


    ```

    INSERT INTO department (name) VALUES (''Some New Department'');

    SELECT currval(''department_department_id_seq'');

    ```


    > **Tip:** In PostgreSQL, “`;`” is the delimiter between SQL commands.


    ### UPDATE


    The `UPDATE` statement is used to modify existing data and has the following syntax:


    ```

    UPDATE <table name>

    SET <column name> = <new value> [, <column name> = <new value> ... ]

    [WHERE <restrictive condition>]

    ```


    The following query changes the name of the department with the ID of 43 to “Cool
    Department.” If there were more departments with that ID, all of them would have
    been modified, but because `department_id` is the primary key, you can’t have
    more departments with the same ID.


    ```

    UPDATE department SET name=''Cool Department'' WHERE department_id = 43;

    ```


    Be careful with the `UPDATE` statement because it makes it easy to mess up an
    entire table. If the `WHERE` clause is omitted, the change is applied to every
    record of the table, which you usually don’t want to happen. PostgreSQL will be
    happy to change all of your records; even if all departments in the table would
    have the same name and description, they would still be perceived as different
    entities because they have different `department_id` values.


    ### DELETE


    The syntax of the `DELETE` command is actually very simple:


    ```

    DELETE FROM <table name>

    [WHERE <restrictive condition>]

    ```


    Most of the time, you’ll want to use the `WHERE` clause to delete a single row:


    ```

    DELETE FROM department WHERE department_id = 43;

    ```'
