  trans: "\n# 总结\n\n本章探讨了 PHP 应用程序开发的基本安全标准和最佳实践。首先重点介绍了 OWASP Top Ten，该标准列出了最关键的\
    \ Web 应用程序安全风险，例如注入攻击和跨站脚本（XSS）。本章强调了安全编码实践，以及通过彻底的代码审查及早发现漏洞的重要性。讨论了安全认证与授权机制，如密码哈希和会话管理，以保护用户数据并确保正确的访问控制。本章还涵盖了安全测试与漏洞评估，包括静态测试和动态测试，以识别和减轻潜在威胁。最后，讨论了安全部署和\
    \ DevOps 考量，例如使用基础设施即代码（IaC）、持续集成/持续部署（CI/CD）和机密管理。通过遵循这些实践，开发者可以显著增强其 PHP 应用程序的安全性和弹性，保护其免受恶意攻击，并确保符合行业法规。\n\
    \n# 协议安全\n\n在本章中，我们将深入探讨 PHP 应用程序中常用通信协议的关键安全方面。理解和实施健壮的协议安全措施对于保护敏感数据、确保用户与系统之间的安全交互至关重要。我们将涵盖：使用\
    \ SSL/TLS 和 HTTPS 保护 HTTP 通信的基础知识、安全管理用户输入和数据传输、使用 OAuth、JWT 和最佳实践保护 API 通信，以及为电子邮件通信实施传输层安全（TLS）。掌握这些主题对于旨在构建弹性且安全的\
    \ PHP 应用程序、防范当今数字环境中常见威胁和漏洞的开发者来说至关重要。\n\n## 保护 HTTP 通信：SSL/TLS 和 HTTPS\n\n超文本传输协议（HTTP）是互联网上数据通信的支柱，它能够在\
    \ Web 服务器和客户端（如 Web 浏览器）之间传输文本、链接、图像和其他多媒体内容。HTTP 采用客户端-服务器模型运行，其中客户端（通常是 Web\
    \ 浏览器）请求资源，服务器提供所请求的信息。每个 HTTP 请求都是独立的，不携带关于先前请求的任何信息，因此它属于无状态协议。虽然这简化了协议，但通常需要诸如\
    \ cookies 之类的额外机制来在多个请求之间维护用户状态。\n\n在 HTTP 中，每个请求-响应周期都是独立的，一旦响应被发送，连接即被关闭，除非明确保持活动状态。HTTP\
    \ 使用多种请求方法，即所谓的 HTTP 动词，每种方法都有特定用途：`GET` 用于检索数据，`POST` 用于提交数据进行处理，`PUT` 用于更新资源，`DELETE`\
    \ 用于删除资源。Web 上的资源由统一资源标识符（URI）标识，通常表示为统一资源定位符（URL），它包括协议（例如 `http://`）、域名、路径和可选的查询参数。\n\
    \nHTTP 请求和响应都包含标头，这些标头提供附加信息，例如内容类型、内容长度和缓存指令。HTTP 响应带有状态码，指示请求的结果，例如 `200 OK`\
    \ 表示成功，`404 Not Found` 表示未找到资源，`500 Internal Server Error` 表示服务器端错误。HTTP 经历了多个版本的演变，其中\
    \ HTTP/1.1 和 HTTP/2 使用最广泛，每个版本都带来了性能和安全性方面的改进。\n\nHTTP 的安全性通过 HTTPS（超文本传输安全协议）得到增强，该协议使用传输层安全（TLS）或其前身安全套接字层（SSL）增加了加密层。这确保客户端和服务器之间交换的数据被加密，从而显著提高安全性。理解\
    \ HTTP 的这些方面对于开发安全的 Web 应用程序至关重要，因为它实现了客户端和服务器之间高效且安全的数据通信。\n\n在 PHP 应用程序的上下文中，通过\
    \ Web 建立 HTTP 连接的过程涉及几个步骤。让我们分解这个过程：\n\n![](img/609480_1_En_6_Fig1_HTML.jpg)\n\
    \n图 6-1 HTTP 连接工作流程生命周期\n\n1.  **客户端请求**：用户与 Web 浏览器或其他客户端应用程序交互，该应用程序向 Web 服务器发送\
    \ HTTP 请求。通常，通过在浏览器地址栏中输入 URL、单击链接或提交表单来发起请求。\n\n2.  **DNS 解析**：如果 URL 包含域名（例如\
    \ `www.example.com`），客户端需要使用域名系统（DNS）将此域名解析为 IP 地址。客户端向 DNS 服务器发送 DNS 查询，以获取与该域名关联的\
    \ IP 地址。\n\n3.  **建立 TCP 连接**：客户端与服务器建立传输控制协议（TCP）连接。这涉及三次握手：\n    *   **SYN（同步）**：客户端向服务器发送一个\
    \ `SYN` 包，请求建立连接。\n    *   **SYN-ACK（同步-确认）**：服务器以一个 `SYN-ACK` 包响应，表示收到请求并准备建立连接。\n\
    \    *   **ACK（确认）**：客户端向服务器发送一个 `ACK` 包，确认连接建立。\n\n4.  **HTTP 请求**：一旦 TCP 连接建立，客户端向服务器发送\
    \ HTTP 请求。请求包括 HTTP 方法（`GET`、`POST` 等）、请求的资源（在 URL 中指定）、标头以及任何适用的数据（例如表单提交）等详细信息。\n\
    \n5.  **服务器端处理（PHP）**：在服务器端，如果请求的资源是一个 PHP 脚本，服务器的 PHP 解释器会处理该脚本。PHP 脚本通常嵌入在 HTML\
    \ 中，并根据请求的参数生成动态内容。\n\n6.  **HTTP 响应**：服务器生成 HTTP 响应，包括状态码、标头和实际内容。内容可能是 HTML、JSON、图像或任何其他数据类型，具体取决于请求的性质。\n\
    \n7.  **关闭 TCP 连接（可选）**：TCP 连接可能会保持打开状态以处理其他请求（如果客户端支持，则复用同一连接），或者在响应发送后关闭，这取决于服务器配置以及是否存在\
    \ HTTP keep-alive 标头等因素。\n\n8.  **客户端渲染**：客户端（Web 浏览器）接收 HTTP 响应。如果响应包含 HTML 内容，浏览器会渲染页面，执行任何嵌入的\
    \ JavaScript，并显示 HTML 中引用的图像和其他资源。\n\n上述步骤序列会在用户与 Web 应用程序的每次交互中重复。PHP 的动态特性允许生成个性化和特定上下文的内容，从而增强了\
    \ Web 应用程序的交互性和响应能力。\n"
- fmt: "### HTTPS\n\n![](images/609480_1_En_6_Chapter/609480_1_En_6_Fig2_HTML.jpg)\n\
    \n**Figure 6-2** HTTPS Connection Workflow Lifecycle\n\nEstablishing an HTTPS\
    \ (Hypertext Transfer Protocol Secure) connection involves additional security\
    \ measures compared to HTTP. In the context of a PHP application, the process\
    \ involves securing the communication between the client and server using encryption.\
    \ Let’s discuss an overview of how an HTTPS connection is established in the context\
    \ of a PHP app, highlighting the differences from HTTP:\n\n1. **Client Request**:\
    \ When a user accesses a PHP application over HTTPS, the client (web browser)\
    \ initiates a secure connection by sending a request to the server using the HTTPS\
    \ protocol.\n\n2. **Server Certificate**: The server hosting the PHP application\
    \ needs to have an SSL/TLS certificate. This certificate is a digital document\
    \ that verifies the authenticity of the server to the client and facilitates the\
    \ encryption of data between them. The certificate is typically obtained from\
    \ a trusted Certificate Authority (CA).\n\n3. **SSL/TLS Handshake**: The SSL/TLS\
    \ handshake is a process that occurs at the beginning of an HTTPS connection.\
    \ During the handshake:\n   * The server sends its SSL/TLS certificate to the\
    \ client.\n   * The client verifies the certificate’s authenticity using the CA’s\
    \ public key.\n   * The client and server negotiate the encryption algorithms\
    \ and generate shared session keys.\n\n4. **Encryption**: Once the SSL/TLS handshake\
    \ is complete, the actual data exchanged between the client and server is encrypted.\
    \ This ensures that even if intercepted during transit, the data remains unreadable\
    \ without the proper decryption keys.\n\n5. **Secure Data Transfer**: The PHP\
    \ application processes the client’s request and generates a response. This response\
    \ is sent back to the client over the encrypted HTTPS connection, ensuring the\
    \ confidentiality and integrity of the data during transit.\n\nNow, let’s review\
    \ the key differences between HTTP and HTTPS. The most significant difference\
    \ lies in encryption: data exchanged between the client and server in HTTP is\
    \ transmitted in plain text, meaning it can be easily read if intercepted. In\
    \ contrast, HTTPS encrypts the data, providing a layer of security that protects\
    \ sensitive information, such as login credentials or personal details, from being\
    \ intercepted and misused.\n\nAdditionally, HTTP and HTTPS use different URL schemes\
    \ and port numbers. URLs for HTTP connections begin with `http://`, while URLs\
    \ for HTTPS connections start with `https://`, indicating the connection is secured\
    \ using SSL/TLS encryption. HTTP typically uses port `80` for communication, whereas\
    \ HTTPS uses port `443` for secure communication. Understanding these differences\
    \ is crucial for ensuring the security of web applications and the data they handle.\n\
    \nHTTPS adds a layer of security by encrypting the data exchanged between the\
    \ client and server. This encryption is crucial for protecting sensitive information\
    \ and ensuring the privacy and integrity of the communication. The use of SSL/TLS\
    \ certificates, the SSL/TLS handshake, and encrypted data transfer are key components\
    \ of establishing a secure HTTPS connection in a PHP application.\n\nSSL (Secure\
    \ Sockets Layer) and TLS (Transport Layer Security) are cryptographic protocols\
    \ designed to secure communication over a computer network, especially on the\
    \ Internet. They are commonly used to establish a secure connection between a\
    \ web browser and a web server, ensuring that the data exchanged between them\
    \ is encrypted and protected from eavesdropping, tampering, or forgery.\n\n###\
    \ SSL (Secure Sockets Layer) and TLS (Transport Layer Security)\n\n#### SSL (Secure\
    \ Sockets Layer)\n\nSSL, developed by Netscape in the mid-1990s, was designed\
    \ to provide secure communication over the nascent World Wide Web. Despite its\
    \ initial promise, SSL underwent several iterations due to security vulnerabilities.\
    \ SSL 1.0 was never publicly released because of these flaws. SSL 2.0, the first\
    \ public release, also had significant security issues. SSL 3.0, released in 1996,\
    \ addressed many of these vulnerabilities and became widely adopted.\n\nSSL offers\
    \ several key features that revolutionized web security. It provides encryption\
    \ to protect the confidentiality of data during transit, ensuring that intercepted\
    \ data cannot be easily read. SSL also supports server authentication, which helps\
    \ verify the identity of the server to the client, preventing man-in-the-middle\
    \ attacks. Additionally, SSL ensures data integrity, making sure that the data\
    \ has not been tampered with during transmission. While SSL was widely used, it\
    \ has been largely replaced by its more secure successor, TLS.\n\n#### TLS (Transport\
    \ Layer Security)\n\nTLS was introduced as an improved and more secure successor\
    \ to SSL, building upon the foundation laid by its predecessor. The first version,\
    \ TLS 1.0, released in 1999, was similar to SSL 3.0 but included several enhancements.\
    \ Subsequent versions, TLS 1.1 (2006) and TLS 1.2 (2008), introduced additional\
    \ security features and improvements. The latest version, TLS 1.3, released in\
    \ 2018, offers even greater security and performance.\n\nTLS incorporates several\
    \ advanced features to enhance security. TLS 1.2 and 1.3 support forward secrecy,\
    \ ensuring that even if a server’s private key is compromised, past communications\
    \ remain secure. TLS also addresses known vulnerabilities present in earlier versions\
    \ of SSL, reducing the risk of security breaches. Furthermore, TLS 1.3 introduces\
    \ a more efficient and secure handshake process, improving both security and performance.\
    \ Understanding the evolution and features of SSL and TLS is crucial for ensuring\
    \ secure communication in today’s web applications."
