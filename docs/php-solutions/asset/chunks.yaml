- fmt: "```markdown\n* 三个新的条件语句各自仅在等效的公有方法在 `check()` 方法之前被调用时才会执行。每个条件语句都将一个正则表达式存储为\
    \ `$pattern`，然后使用 `preg_match()` 或 `preg_match_all()` 来测试密码。\n* 如果 `$mixedCase`\
    \ 属性被设置为 `true`，则正则表达式和密码会被传递给 `preg_match()`，以查找密码中任意位置是否存在至少一个小写字母和一个大写字母。\n\
    * `$minimumNumbers` 和 `$minimumSymbols` 属性默认设置为 0。如果它们被重新设置为一个正数，则正则表达式和密码会被传递给\
    \ `preg_match_all()` 函数，以查找正则表达式匹配的次数。该函数需要三个参数：正则表达式、待搜索的字符串以及一个用于存储匹配结果的变量；它返回找到的匹配次数。在这种情况下，你只关心匹配的次数，存储匹配结果的变量被丢弃。\n\
    * 最后一个条件语句中可怕的 `$pattern` 实际上是通过将单引号字符串与双引号字符串拼接而成的正则表达式。这样做是为了在允许的符号中同时包含单引号和双引号。我已经包含了英语键盘上的大多数非字母数字符号。如果你想添加其他符号，请将它们放在最后一个右方括号之前，如下所示：\n\
    \n``` \n$pattern = \"/[-!$%^&*(){}<>[\\]'\" . '\"|#@:;.,?+=_\\/\\∼` £ `]/';\n\
    ```\n\n保存 `CheckPassword.php`，并通过在 `register.php` 中调用新方法来测试更新后的类。例如，以下代码要求密码至少包含十个字符、至少一个大写字母和一个小写字母、两个数字以及一个非字母数字符号：\n\
    \n``` \n$checkPwd = new CheckPassword($password, 10);\n$checkPwd->requireMixedCase();\n\
    $checkPwd->requireNumbers(2);\n$checkPwd->requireSymbols();\n$passwordOK = $checkPwd->check();\n\
    ```\n\n* 调用新方法的顺序无关紧要，只要它们在构造函数之后、`check()` 方法调用之前即可。使用各种组合可以强制执行不同强度的密码。\n* 如有必要，请对照\
    \ `ch09` 文件夹中的 `register_03.php` 和 `ch09/PhpSolutions/Authenticate` 文件夹中的 `CheckPassword_02.php`\
    \ 检查你的代码。\n\n在为本章编写代码时，我最初将密码检查器设计为一个函数。函数内部的 basic 代码是相同的，但我决定将其转换为一个类，以使其更灵活且更易于使用。函数的问题在于它需要大量参数来设置不同的选项，并且很难记住参数的顺序。此外，处理结果也存在困难。如果没有错误，函数返回\
    \ `true`；但如果发现任何错误，它返回错误消息数组。由于 PHP 将包含元素的数组视为隐式的 `true`，这意味着必须使用全等运算符（三个等号——见表\
    \ 3-5）来检查结果是否为布尔值 `true`。\n\n将代码转换为类消除了这些问题。用于设置选项的公有方法具有直观的名称，并且可以按任意顺序设置，或者根本不设置。并且结果始终是布尔值\
    \ `true` 或 `false`，因为有一个单独的方法来检索错误消息数组。这需要编写更多代码，但改进是值得的。\n\n### PHP 解决方案 9-7：创建基于文件的用户注册系统\n\
    \n此 PHP 解决方案创建了一个简单的用户注册系统，该系统使用 `password_hash()` 函数对密码进行加密。它使用 PHP 解决方案 9-6\
    \ 中的 `CheckPassword` 类来强制实施最低强度要求。进一步的检查确保用户名包含最少数量的字符，并且用户在第二个字段中正确重新输入了密码。\n\
    \n用户凭据存储在一个纯文本文件中，该文件必须位于 Web 服务器的文档根目录之外。这些说明假定你已经设置了一个 PHP 具有写入权限的 `private`\
    \ 文件夹，如[第 7 章](#A978-1-4842-0635-5_7_Chapter.html) 所述。还假定你熟悉该章中的“使用 `fopen()`\
    \ 追加内容”部分。\n\n继续使用前面 PHP 解决方案中的文件。或者，使用 `ch09` 文件夹中的 `register_03.php` 和 `ch09/PhpSolutions/Authenticate`\
    \ 文件夹中的 `CheckPassword_02.php`。\n\n注意\n\nPHP 解决方案 9-7 和 9-8 中使用的密码哈希函数至少需要 PHP\
    \ 5.5。有关如何获取 `password_compat` 库的详细信息，请参阅本章前面的“在较旧版本的 PHP 中启用密码哈希”。\n\n在 `includes`\
    \ 文件夹中创建一个名为 `register_user_csv.php` 的文件，并剥离脚本编辑器插入的任何 HTML。 当使用命名空间类时，导入语句必须与使用该类位于同一文件中，即使它是一个包含文件也是如此。从\
    \ `register.php` 顶部剪切以下行，并将其粘贴到 `register_user_csv.php` 中。\n\n``` \nuse PhpSolutions\\\
    Authenticate\\CheckPassword;\n```\n\n从 `register.php` 中剪贴以下代码，并将其粘贴到 `register_user_csv.php`\
    \ 中的导入语句之后（你的密码强度设置不同也没关系）：\n\n``` \nrequire_once '../PhpSolutions/Authenticate/CheckPassword.php';\n\
    $checkPwd = new CheckPassword($password, 10);\n$checkPwd->requireMixedCase();\n\
    $checkPwd->requireNumbers(2);\n$checkPwd->requireSymbols();\n$passwordOK = $checkPwd->check();\n\
    if ($passwordOK) {\n    $result = array('Password OK');\n} else {\n    $result\
    \ = $checkPwd->getErrors();\n}\n```\n\n在 `register.php` 中 `DOCTYPE` 声明上方的脚本末尾，创建一个用于存储用户凭据的文本文件位置的变量；并包含\
    \ `register_user_csv.php`。 `register.php` 顶部 PHP 块中的代码现在应如下所示：\n\n``` \nif (isset($_POST['register']))\
    \ {\n    $username = trim($_POST['username']);\n    $password = trim($_POST['pwd']);\n\
    \    $retyped = trim($_POST['conf_pwd']);\n    $userfile = 'C:/private/encrypted.csv';\n\
    \    require_once '../includes/register_user_csv.php';\n}\n```\n\n在 `register_user_csv.php`\
    \ 中，粘贴你在步骤 3 中从 `register.php` 剪切的代码，并修改包含类定义的命令，如下所示：\n\n*   用于存储用户凭据的 CSV 文件尚不存在。它将在第一个用户注册时自动创建。如有必要，请修改\
    \ `private` 文件夹的路径以匹配你自己的设置。\n\n``` \nrequire_once __DIR__ . '/../PhpSolutions/Authenticate/CheckPassword.php';\n\
    ```\n\n在包含命令之后立即插入以粗体突出显示的代码：\n\n*   你需要调整相对路径，因为 `register_user_csv.php` 也是一个包含文件（请参阅[第\
    \ 4 章](#A978-1-4842-0635-5_4_Chapter.html) 中的“嵌套包含文件”）。\n\n``` \nrequire_once\
    \ __DIR__ . '/../PhpSolutions/Authenticate/CheckPassword.php';\n$usernameMinChars\
    \ = 6;\n$errors = [];\nif (strlen($username) < $usernameMinChars) {\n    $errors[]\
    \ = \"Username must be at least $usernameMinChars characters.\";\n}\nif (preg_match('/\\\
    s/', $username)) {\n    $errors[] = 'Username should not contain spaces.';\n}\n\
    $checkPwd = new CheckPassword($password, 10);\n```\n\n像这样修改 `register_user_csv.php`\
    \ 底部的代码：\n```"
  raw: '*   Each of the three new conditional statements is run only if the equivalent
    public method is called before the `check()` method. Each one stores a regular
    expression as `$pattern` and then uses `preg_match()` or `preg_match_all()` to
    test the password.

    *   If the `$mixedCase` property is set to `true`, the regular expression and
    password are passed to `preg_match()` to look for at least one lowercase letter
    and one uppercase letter in any position in the password.

    *   The `$minimumNumbers` and `$minimumSymbols` properties are set to 0 by default.
    If they’re reset to a positive number, the regular expression and password are
    passed to the `preg_match_all()` function to find how many times the regex matches.
    The function requires three arguments: the regex, the string to be searched, and
    a variable to store the matches; it returns the number of matches found. In this
    case, all you’re interested in is the number of matches. The variable that stores
    the matches is discarded.

    *   The horrendous `$pattern` in the last conditional statement is actually a
    regex created by concatenating a single-quoted string to a double-quoted one.
    This is necessary to include single and double quotation marks in the permitted
