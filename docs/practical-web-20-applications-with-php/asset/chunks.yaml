    Additionally, you can search for phrases by surrounding the query in quotes. So
    if you knew a post existed with a title of Holiday Photos, you could use the following
    search to the find the post:


    title:"Holiday Photos"


    The most important thing when you consider these different types of searches is
    that you let users know how to use the search tool. You should typically have
    some brief instructions on the search page to let them know how to do things such
    as searching based on tags.


    **Adding Autocompletion to the Search Tool**


    We have just finished creating an interface to the indexes we created earlier
    in the chapter, meaning users can now search for content from each of the users
    in our web application. The solution we created does not require the user to have
    any JavaScript capabilities, since all functionality is performed on the server
    side. We will now extend this search tool to use Ajax to help the user choose
    a search term.


    This feature is based on the Google Suggest tool, which y[ou can find at http://www.](http://www)


    google.com/webhp?complete=1\. Google Suggest allows users to search on Google
    just as they would normally, except when they begin to type a search term, an
    Ajax request is performed in the background to find the most relevant searches
    beginning with those characters they have already typed. The results are returned
    in real time, allowing the user either to finish typing what they’ve already started
    or to select one of the found terms (either with their arrow keys or with their
    mouse).


    **Providing Search Suggestions**


    To make suggestions to users as to what they should search for, we need some data
    to generate these suggestions. We’ll use the tags that users have assigned to
    their blog posts as suggestions.


    Thus, if they begin to type the term *MySQL*, when they have typed my, the following
    SQL


    query would be used to find suggestions for them:


    SELECT DISTINCT tag


    FROM blog_posts_tags


    WHERE tag LIKE ''my%''


    ORDER BY lower(tag)


    We want to provide suggestions based on tags only for live posts; thus, we must
    check that the tag found from blog_posts_tags belongs to a live post. To do this,
    we use an SQL join against the blog_posts table.


    To get a list of suggestions for partial search string, we will add a new method
    called GetTagSuggestions() in the BlogPost.php file (in ./include/DatabaseObject).
    Listing 12-27


    shows this method. It takes the partial tag as its second argument (after the
    database connection), while the optional third argument specifies the number of
    the tags to return.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


