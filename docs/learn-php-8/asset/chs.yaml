- "# 接口、平台与三层架构编程\n\n*截至 2013 年 1 月，PHP 已安装在超过 2.4 亿个网站上（占抽样网站的 39%），以及 210 万个 Web\
  \ 服务器上。*\n\n—Ide, Andy (2013-01-31)。《PHP 持续增长》\n\n## 章节目标/学生学习成果\n\n完成本章学习后，学生将能够\n\
  \n*   列举能够托管 PHP 程序的平台或容器的示例\n*   使用 PHP 创建一个简单的动态 Web 应用程序\n*   解释三层架构设计并确定每层包含的内容\n\
  *   设计一个三层架构应用程序\n*   解释程序开发生命周期 (PDLC) 的每个步骤\n*   定义并解释 MVC 和依赖注入\n\n### PHP 平台\n\
  \nPHP 是一种强大的语言，因为它几乎可以适用于任何硬件或软件平台。它与 HTML、CSS 和 JavaScript 轻松交互的能力，使得 PHP 应用程序能够在任何可以托管浏览器的系统上运行。越来越多的应用程序现在使用浏览器作为应用程序的主要接口工具进行创建。这使得应用程序可以在个人电脑、互联网乃至智能手机上运行，而无需在设备上安装实际应用程序（或其他软件）。它还允许用户在切换设备时体验到相同的应用程序“感觉”。随着基于云技术的引入，用户不再被束缚于认为他们使用的软件必须驻留在自己的设备上。\n\
  \n\n\n### PHP、AJAX 与 CSS——Web 应用程序\n\n`PHP` 和 `AJAX`（异步 JavaScript 和 XML）能够很好地协同工作。`AJAX`\
  \ 提供了在不重新加载整个页面的情况下动态更改网页部分内容的能力。大多数网页都有相对于用户交互保持不变的静态区域（菜单、页眉和页脚）。当用户与页面交互（点击按钮）时，这些网页区域无需发生变化。`AJAX`\
  \ 可以让您开发一个容器（在以下示例中，容器位于 `div` 标签之间），用于显示托管在 web 服务器上的程序输出，而不会干扰整个网页。这样一来，当用户交互（点击按钮）的结果仍在处理中时，用户就可以先查看网页上的内容（菜单、页眉和页脚）。如果程序因某种原因运行缓慢、挂起或丢失，页面的其余部分仍能正常工作。您在显示某个页面时可能遇到过这种情况：因为要一次性加载大量信息（大量广告）而导致页面挂起，并且页面无法正常运行，因为它必须完全加载后才能使用。\n\
  \n`AJAX` 还允许您在不对网页造成干扰的情况下，修改 web 服务器上 `PHP` 应用程序的内容。这样您就可以在用户不知情的情况下更新应用程序代码。\n\
  \n让我们来看一个示例。\n\n```\nfunction getXMLHttp(){\nvar xmlHttp;\ntry\n{\nxmlHttp = new\
  \ XMLHttpRequest();\n}\ncatch(e)\n{\n// 对于老旧的 Internet Explorer 用户，实现方式与其他浏览器不同\n\
  try\n{\nxmlHttp = new ActiveXObject(\"Msxml2.XMLHTTP\");\n}\ncatch(e)\n{\ntry\n\
  {\nxmlHttp = new ActiveXObject(\"Microsoft.XMLHTTP\");\n}\ncatch(e)\n{\nalert(\"\
  浏览器版本太老？请立即升级，以便使用 AJAX！\")\nreturn false;\n}\n}\n}\nreturn xmlHttp;\n}\nfunction\
  \ AjaxRequest()\n{\nvar xmlHttp = getXMLHttp();\nxmlHttp.onreadystatechange = function()\n\
  {\nif(xmlHttp.readyState == 4)\n{\nHandleResponse(xmlHttp.responseText);\n}\n}\n\
  xmlHttp.open(\"GET\", \"myfirstprogram.php\", true);\n// 将名称替换为任何 PHP 程序\nxmlHttp.send(null);\n\
  }\nfunction HandleResponse(response)\n{\ndocument.getElementById('AjaxResponse').innerHTML\
  \ = response;\n}\n示例 2-1\nAJAX_Example_JavaScript.js\n```\n\n> **注意：** 代码示例文件包含在\
  \ Apress 网站上。您可以直接复制并使用这些示例，无需任何修改。我们已尽一切努力确保本书中展示的代码是正确的。印刷错误可能会影响所展示的代码（例如大小写被调整，括号被替换为尖括号）。网站上提供的所有代码均功能正常。\n\
  \n- **JavaScript** — 一种脚本语言，使网页能够实现交互。使用 JavaScript，网页可以对用户在文本框中输入信息和/或点击按钮做出反应。如果您需要复习\
  \ JavaScript 或需要更多示例，请查看 YouTube 上提供的众多免费 JavaScript AJAX 视频。\n\n如果您不了解 JavaScript，不必过于纠结于该程序的细节。让我们只看几个关键点。`AJAX`\
  \ 使用 HTTP GET 来请求一个程序，类似于浏览器请求一个页面。在这个示例中，`XMLHttpRequest` 类（存在于 JavaScript 库中）的一个实例被命名为\
  \ `XmlHttp`。然后使用该对象打开对 `myfirstprogram.php` 的请求（就像打开一根管道）。接着，该对象的 `send` 方法发送请求（将水推入管道）。如果文件内容被正确返回，文件的输出将被放置在\
  \ HTML 网页上 ID 为 `AjaxResponse` 的 `div` 标签之间。如果浏览器无法处理 AJAX 通信，则会显示一个警告框，建议用户升级浏览器。尽管不太可能有人还在使用无法解释\
  \ AJAX 代码的浏览器，但您仍然应该处理所有可能性。\n\n```\nPHP Ajax 演示\n\nPHP Ajax 演示\n\n\"注意了！！\"\n下方的文字将被替换为来自\
  \ 'myfirstprogram.php' 文件的 \"Hello World\"，通过 AJAX 获取。\nAJAX 演示\n\n注意... 当您点击按钮时，只有这一部分会发生变化。\n\
  \n版权所有 & copy; 2020 小海浪 – Steve Prettyman\n\n示例 2-2\najaxdemo.html\n```\n\n要使用此脚本，请修改\
  \ `xmlHttp.open` 语句，选择您要执行的文件（而不是 `myfirstprogram.php`）。修改 `document.getElementById`\
  \ 这一行，使其包含您想在 HTML 文件中用于承载输出的 `div` 标签的 ID（而不是 `AjaxResponse`）（请参见下一个示例中的 HTML 代码）。\n\
  \n- **HTML** — 超文本标记语言，是一种用于格式化网页布局的标记语言。HTML 由浏览器解释，然后向用户显示结果。\n- 如需更深入地了解 HTML，请访问\
  \ w3schools 网站：[www.w3schools.com/html/default.asp](http://www.w3schools.com/html/default.asp)。\n\
  \n如果您对 HTML 了解不多，也不必担心。您只需关注本示例中的几行代码即可。首先，在代码顶部附近，一个 link 标签引入了 `ajaxdemo.css`\
  \ 文件。这个 CSS 文件能让您看到一个带有一些图形细节的页面。它使您可以演示页面更新时，CSS 文件中的图形不会重新粘贴或闪烁。在这行代码下方，script\
  \ type 标签加载了示例 2-1 中的 JavaScript 文件。如果您给自己的文件起了不同的名字，则需要调整这行代码中的文件名。如果您的文件不在同一个文件夹中，您应该在文件名前加上文件夹名称。\n\
  \n在 HTML body 部分的中间，input type 标签创建了一个按钮，点击该按钮将调用 `AjaxRequest` 函数（包含在 JavaScript\
  \ 文件中）。这将导致示例 2-1 中的所有 JavaScript 代码被执行。我们需要关注的最后一行是 `<div id=\"AjaxResponse\">`\
  \ 标签。`id` 属性中的值（`AjaxResponse`）必须与 JavaScript 代码中 `getElementById` 使用的对象名称完全一致。假设它们匹配正确，一旦点击按钮，JavaScript\
  \ 代码将请求 `myfirstprogram.php` 文件，并在 ID 为 `AjaxResponse` 的 `div` 标签之间显示结果。\n\n```\n\
  body { background-color: #000000;\nfont-family: Arial, Verdana, sans-serif; }\n\
  #wrapper { margin: 0 auto;\nwidth: 85%;\nmin-width: 800px;\nbackground-color: #cc0000;\n\
  color: #000066; }\n#header { background-color: #ff0000;\ncolor: #00005D; }\nh1 {\
  \ margin-bottom: 10px; }\n#content { background-color: #ffffff;\ncolor: #000000;\n\
  padding: 10px 20px;\noverflow: auto; }\n#footer { font-size: 80%;\ntext-align: center;\n\
  padding: 5px;\nbackground-color: #0000FF;\ncolor: #ffffff;\nclear: both;}\nh2 {\
  \ color: #000000;\nfont-family: Arial, sans-serif; }\n#floatright { float: right;\n\
  margin: 10px; }\n示例 2-3\najaxdemo.css\n```\n\n为了内容的完整性，这里也展示了 CSS 文件。如果您不了解 CSS，也不必担心。该文件只是为了让演示中的网站看起来漂亮一些。如果您要使用此文件，请确保将其保存为扩展名为\
  \ `.css` 的文件。此外，如果您要更改文件名，请确保同时修改（HTML 文件中的）link 标签里的文件名，使其完全一致。如有必要，请确保包含任何文件夹名称。\n\
  \n- **CSS** — 层叠样式表（CSS）与 HTML 配合使用，以在网页上显示图形。CSS 描述了页面的布局、颜色、文本字体、背景图像以及其他网页特性。如需更深入地了解\
  \ CSS，请访问 w3schools 网站：[www.w3schools.com/css/default.asp](http://www.w3schools.com/css/default.asp)。\n\
  \n\n\n请仔细检查这三个文件（`.js`、`.css` 和 `.html`），确保文件名与调用它们的链接完全一致（一字不差）。如果所有文件都正确链接，`ajaxdemo.html`\
  \ 文件将首先显示，如图 2-1 所示。\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig1_HTML.jpg](img/394210_2_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1\n`ajaxdemo.html`\n\n如果你的代码无法运行，请仔细检查文件名（确保它们没有 `.txt` 后缀）。如果你看到的是空白页面，则说明存在问题。请检查代码中是否有多余字符。是否遗漏了\
  \ `;`、`{`、`(` 或其他代码符号？如果收到错误消息，请将其粘贴到浏览器中，寻找可能的解决方案。如果没有看到错误消息，请查看 Apache 和 PHP\
  \ 的日志（参见第 1 章）以确定其他可能的问题。\n\n如果没有语法错误（或文件名/位置错误），当用户点击按钮时，页面将使用 AJAX 请求 `myfirstprogram.php`\
  \ 文件，并会在 `div` 标签之间显示程序执行的结果。在本例中，将显示 `Hello World`。\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig2_HTML.jpg](img/394210_2_En_2_Fig2_HTML.jpg)\n\
  \n图 2-2\nAJAX 请求后的 `ajaxdemo.html` 文件\n\n动手实践\n\n1.  将从本书网站获取的上述三个文件复制到你的项目文件夹中（即你在\
  \ Apache 中运行项目的位置）。运行 HTML 程序。测试成功了吗？如果没有，原因是什么？\n\n2.  更改你的 `.js` 文件的名称，并修改 HTML\
  \ 文件中的链接标签以反映新的文件名。测试你的 HTML 程序。测试成功了吗？如果没有，原因是什么？\n\n3.  更改你的 PHP 程序的名称。修改 `.js`\
  \ 文件以反映 PHP 程序的新名称。测试你的 HTML 程序。测试成功了吗？如果没有，原因是什么？\n\nPHP、AJAX 和 CSS——智能手机 Web 应用程序\n\
  \n至此，你应该开始发现创建 PHP 应用程序的灵活性和强大功能。你可能有点失望，因为我们没有详细讨论智能手机的应用程序开发。目前，PHP 通常不用于创建智能手机应用程序。然而，随着\
  \ PHP 8 效率和速度的提高，或许将来某一天会实现。但有时，我们确实希望让智能手机能够通过其浏览器访问 Web 应用程序。只需对之前的演示进行少量修改，我们就能提供这种能力。这为你提供了一个适用于任何包含浏览器的设备（无论大小）的应用程序。\n\
  \n你可以在不调整 HTML（除添加一个链接外）、JavaScript 或 PHP 代码的情况下进行此更改。你可以调整 `ajaxdemo` 网页，使其能够在智能手机或其他移动设备上使用\
  \ CSS 正确格式化。在这个例子中，你只需要修改 HTML 文件来检测显示屏幕的尺寸（界面）。然后，CSS 可用于更改图形以适配合适的屏幕尺寸。\n\n如果\
  \ PHP 文件包含大量 HTML（和/或其他 CSS 代码），我们可能还需要调整 PHP 文件。然而，我们应该始终考虑让 CSS 来格式化整体输出（而不是 PHP\
  \ 文件）。这将允许你在多个容器（主机）中使用相同的代码。\n\n你可以在 `ajaxdemo.html` 文件中原始 CSS 文件链接的下方添加以下几行代码：\n\
