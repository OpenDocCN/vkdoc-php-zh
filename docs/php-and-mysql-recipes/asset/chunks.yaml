    # 配方 14-3. 通过 RSS 共享数据


    ## 问题


    前面的示例使用了相对静态的数据。短期内预计不会在我们的太阳系中发现新的行星，尽管与太阳的距离和表面温度在变化，但这些数值的变化频率远不如新闻博客的头条。此外，示例中使用了有效的
    XML 格式的行星列表和数据，但如果缺少关于内容的额外信息，消费者将无法使用这些数据。如何共享易于被多个客户端消费的数据呢？


    ## 解决方案


    使用 XML 是朝着正确方向迈出的一步。为 XML 添加预定义的模式（Schema）使得各种客户端都能消费这些数据。关于如何使用 XML 有很多标准，有的用于特定目的（如新闻摘要），有的用于更通用的场景。其中一种称为
    **Rich Site Summary（丰富站点摘要）** 或 **Really Simple Syndication（真正简易聚合）**，简称 RSS。所使用的模式（Schema）有多个变体，但最流行的两个称为
    RSS 2.0 和 Atom 1.0。


    这两种模式提供了几乎相同的值，但使用了不同的标签名称。许多浏览器和电子邮件客户端都支持 RSS 格式，同时也有许多专门的阅读器应用可用。由于 RSS 格式的流行度下降，其中一些应用已经停止维护。


    ## 工作原理


    RSS 源（feed）的顶层元素是 `<rss></rss>`，通常带有 `version` 属性。

    '
