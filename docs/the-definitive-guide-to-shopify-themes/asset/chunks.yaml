    or CDN configuration are out of your hands. Fortunately, Shopify does a pretty
    good job of optimizing these things on their end, so we generally don’t have to
    worry about them and can instead focus on the things that are under our control.


    In the following sections, I’ve provided a list of the key metrics I look at when
    trying to improve my Shopify themes, along with a list of the techniques I use
    to try to improve those metrics. Many of these will be familiar to experienced
    web developers (Shopify themes are just HTML, CSS, and JavaScript at the end of
    the day after all), but some are Shopify-specific either in concept or execution.


    The final part of this chapter focuses on each of these listed techniques in detail
    and walks through how to implement them.


    #### Key Metric 1: Page Weight


    Page weight indicates how many bytes need to be transferred to the browser to
    display your site. You should be looking at two numbers here: the number of bytes
    transferred when the page first loads (before the browser has cached anything)
    and the number of bytes after caching.


    Even if your site is pretty image-heavy, you should be able to deliver a usable
    page to a customer with a few hundred kilobytes or less. Using some of the techniques
    described in this lesson, you can do this and then pull in larger assets (like
    high-resolution images) later as needed.


    Optimization techniques that focus on reducing page weight include:


    *   Image optimization

    *   Asset minification

    *   Lazy loading

    *   Page simplification


    #### Key Metric 2: Number of HTTP Requests


    Every HTTP request your browser makes for an asset requires a round trip from
    the browser to the server and back again, along with all of the overhead that
    implies.


    Methods focused on improving the efficiency of the requests your page makes are:


    *   Asset concatenation

    *   Cookieless CDN domains (handled by Shopify)

    *   CDN hostname distribution (not handled by Shopify, but there’s not too much
    we can do about it if we still want to leverage Shopify’s comprehensive CDN)

    *   Intelligent asset loading

    *   Page simplification


    #### Key Metric 3: Time to Load


    The term “time to load” is a bit imprecise, as “load” in the context of web performance
    can mean a few different things. It could mean:


    *   The time taken for the browser to load your initial HTML and start rendering
    the page (“time to render”)

    *   The time taken for the browser to visually display the page to the user (“time
    to visual completion”)

    *   The time taken for the entire page, including assets, to load, render, and
    execute (“time to load”)


    From the perspective of user experience, the “time to visual completion” is the
    most important interpretation, as it’s what makes a site “feel” fast. Unfortunately,
    it’s also the most difficult to measure with automated tools (although SpeedIndex,
    a metric developed by Google and thoroughly analyzed in `WebPageTest.org`’s report,
    does a pretty good job).


    The good news is that the optimization techniques for all types of page load have
    some overlap, so efforts towards optimizing your initial time to render will help
    improve your other metrics as well. In some cases, you may wish to prioritize
    one type of load time over another—this is most commonly seen in techniques that
    attempt to get the page to an initial “visually complete” stage as fast as possible,
    then complete the load of additional assets.


    An example of this would be the use of progressive JPEGs, which render a low-quality
    “first pass” image that is subsequently replaced with one of a higher quality
    as the page continues to load. The effect is that the user feels like the page
    loads much quicker, even if the overall number of bytes transferred to the user
    is increased, as we need to send the data for multiple versions of the image at
    different quality levels.


    ## Performance Optimization Techniques


    Having identified the metrics we consider most important, we’ll now get to the
    meat and potatoes of the chapter: identifying what you can actually do as a theme
    developer to improve those numbers.'
  trans: "\n#### WebPageTest.org\n\n这是我最喜欢的性能测试工具，没有之一。与之前的方案不同，它并非浏览器插件——你只需访问 [`http://www.webpagetest.org`](http://www.webpagetest.org)\
    \ 并输入待测页面的 URL 即可。\n\n如图 10-3 所示，这是一款比 `PageSpeed` 或 `YSlow` 强大得多的工具，允许你在运行测试时指定大量变量（浏览器、地理位置、连接类型与速度、用户代理字符串……不胜枚举）。它还支持将测试过程录制成视频、模拟页面加载过程中特定域名失效的情况，并为你提供详尽的页面加载“瀑布流”时间线。\n\
    \n![A437216_1_En_10_Fig3_HTML.jpg](img/A437216_1_En_10_Fig3_HTML.jpg)  \n图 10-3\
    \  \n`WebPageTest.org` 或许不是外观最漂亮的工具，但它提供了大量实用细节。\n\n另一个出色的附加功能是网站的“成本分析”，它能根据移动用户所在国家的平均移动数据资费，估算出用户加载你的网站需要支付多少费用。这对于那些身处数据流量和\
    \ Wi-Fi 资源丰富国家的人来说，是一个很好的提醒。\n\n`WebPageTest.org` 是本文提及的唯一一个能分析网站 `SpeedIndex`³\
    \ 的工具，该指标用于衡量页面可见部分呈现给用户的速度（通常这比整体页面加载时间重要得多）。\n\n#### 该用哪个工具？\n\n除非你非常渴望深入性能优化的细枝末节，否则我建议暂时坚持使用\
    \ `PageSpeed Insights` 和 `YSlow` 提供的更简单报告和分析。它们能帮你找出主题中 90% 的性能问题，并指出哪些优化能带来最大收益。\n\
    \n一旦你处理完了这些“低垂的果实”，再转向 `WebPageTest` 的详细报告，它会帮你识别出那些“百分之一”的细节问题。对于销量庞大的网站，投入时间优化这些问题往往物有所值。\n\
    \n如果你想将性能测试整合到开发工作流中，可以看看 `grunt-perfbudget` 这个 Grunt 插件。⁴ 它由 Tim Kadlec 编写，他在他的博客上（[`https://timkadlec.com`](https://timkadlec.com)）提供了大量关于为网站设定“性能预算”的资料。\n\
    \n### 主题性能指标\n\n能够获取所有这些性能信息当然很好，但问题是：我们该如何利用它们？首先，最好清楚哪些事情需要担心，哪些可以安全地忽略。\n\n\
    对于 Shopify 主题而言，任何需要服务器或 CDN 配置的性能优化都不在你的掌控范围内。幸运的是，Shopify 在这方面做得相当不错，因此我们通常不必为此操心，而可以专注于我们力所能及的事情。\n\
    \n在接下来的章节里，我会列出在尝试优化 Shopify 主题时关注的关键指标，以及我用来改进这些指标的技术列表。对于经验丰富的 Web 开发者来说，其中许多技术都很熟悉（毕竟，Shopify\
    \ 主题归根结底只是 HTML、CSS 和 JavaScript），但有些技术在概念或实现上是 Shopify 特有的。\n\n本章的最后部分将详细阐述这些技术，并逐步讲解如何实施它们。\n\
    \n#### 关键指标 1：页面重量\n\n页面重量指的是将你的网站显示在浏览器中需要传输的字节数。你需要关注两个数字：页面首次加载时（浏览器缓存任何内容之前）传输的字节数，以及缓存后传输的字节数。\n\
    \n即使你的网站图片很多，你也应该能够用几百 KB 甚至更少的字节，向顾客呈现一个可用的页面。利用本课程中描述的一些技术，你可以做到这一点，然后根据需要稍后加载更大的资源（例如高分辨率图片）。\n\
    \n侧重于减少页面权重的优化技术包括：\n\n*   图片优化\n*   资源压缩\n*   懒加载\n*   页面精简\n\n#### 关键指标 2：HTTP\
    \ 请求次数\n\n浏览器为获取一个资源而发起的每一次 HTTP 请求，都需要浏览器与服务器之间进行一次往返，并伴随由此产生的所有开销。\n\n专注于提高页面请求效率的方法有：\n\
    \n*   资源合并\n*   无 Cookie 的 CDN 域名（由 Shopify 处理）\n*   CDN 主机名分发（不由 Shopify 处理，但如果我们仍想利用\
    \ Shopify 全面的 CDN，我们能做的也有限）\n*   智能资源加载\n*   页面精简\n\n#### 关键指标 3：加载时间\n\n“加载时间”这个术语有点不精确，因为在\
    \ Web 性能的上下文中，“加载”可以指代几种不同的情况。它可能意味着：\n\n*   浏览器加载初始 HTML 并开始渲染页面所花费的时间（“渲染时间”）\n\
    *   浏览器在视觉上向用户呈现页面所花费的时间（“视觉完成时间”）\n*   整个页面（包括所有资源）加载、渲染和执行所花费的时间（“加载时间”）\n\n\
    从用户体验的角度来看，“视觉完成时间”是最重要的解释，因为它能让网站感觉“更快”。不幸的是，它也是最难以通过自动化工具衡量的（尽管 `SpeedIndex`——这个由\
    \ Google 开发并在 `WebPageTest.org` 的报告中得到详尽分析的指标——在这方面做得相当不错）。\n\n好消息是，针对所有类型页面加载的优化技术存在一些重叠，因此，你为优化初始渲染时间所做的努力也将有助于改善其他指标。在某些情况下，你可能希望优先考虑某一种加载时间——这最常见于那些试图尽快让页面达到初始“视觉完成”阶段，然后再完成额外资源加载的技术中。\n\
    \n一个例子是使用渐进式 JPEG。它会先渲染一个低质量的“首遍”图像，随后随着页面继续加载，该图像会被更高质量的版本替换。其效果是，用户感觉页面加载速度快得多，即使传输给用户的字节总数增加了，因为我们需要发送多个不同质量级别的图像版本的数据。\n\
    \n## 性能优化技术\n\n在确定了我们认为最重要的指标之后，现在我们来谈谈本章的核心内容：作为主题开发者，你实际上可以做些什么来改善这些数字。\n"
- fmt: "### Technique 1: Page Simplification\n\nYou know the old saying, “less is\
    \ more”? Well, in the case of web performance, it rings true. The “less” of your\
    \ theme there is—the fewer the images, requests, and page elements—the faster\
    \ your page will load and display.\n\nSounds sensible and straightforward, right?\
    \ I agree, but it never seems to quite make it into those “Five ways to speed\
    \ up your site and improve your sex life” lists on the Internet.\n\nPerhaps the\
    \ reason for its absence is that it’s not always an easy, “quick win”. Unlike\
    \ some of the techniques we’ll be looking at in a bit, taking the time to look\
    \ through your hard work for things to rip out is difficult, both time-wise and\
    \ emotionally. But, just like authoring good writing, authoring performant Shopify\
    \ themes require ruthless editing.\n\nThe great thing about this technique is\
    \ that you get some side benefits beyond the performance implications. Just like\
    \ editing your writing makes things much easier for readers, editing your Shopify\
    \ themes also makes things clearer and easier for your customers, as well as improving\
    \ your life as a developer by reducing your maintenance burden. It’s a real win-win-win!\n\
    \nIf you’re looking for ideas on the sort of things you can do to “edit down”\
    \ your Shopify theme, here are some:\n\n* Refactor CSS: It’s easy to build up\
    \ technical debt in your CSS files over the course of a site’s development. Refactoring\
    \ and simplifying your CSS will not only save on stylesheet size, but also make\
    \ the site more maintainable and consistent for visitors.\n* Kill carousels: Carousels\
    \ are not only horrid for usability, they often load lots of high-resolution images.\
    \ Do your users and your site’s performance a favor by replacing the carousel\
    \ with a single (optimized) image.\n* Replace background images with CSS: CSS\
    \ can do some pretty awesome stuff these days. If you’re currently using tiled\
    \ images for background images, consider replacing them with a CSS background.\
    \ You’d be surprised at what you can do.\n\n### Technique 2: Image Optimization\n\
    \nThis is the first thing almost every page load optimization article will suggest.\
    \ That’s not a coincidence—images make up the largest percentage of the weight\
    \ of most sites, and you can get some big wins with very little effort.\n\n####\
    \ Image Optimization Basics\n\nHere’s the crazy simple way to trim down your theme\
    \ in less than 50 seconds:\n\n1. Download `ImageOptim` from [https://imageoptim.com](https://imageoptim.com)\
    \ and open it.  \n2. Drag your theme’s `assets` folder into the application. \
    \ \n3. Wait to see how much space you just saved (see Figure [10-4](#A437216_1_En_10_Chapter.html#Fig4)).\
    \  \n\n   ![A437216_1_En_10_Fig4_HTML.jpg](A437216_1_En_10_Fig4_HTML.jpg)\n\n\
    \   **Figure 10-4** ImageOptim doing its thing  \n\nIt really is that simple!\n\
    \nAs I was writing this, I ran the `assets` folder of a theme I’ve been working\
    \ on through `ImageOptim` just to get some screenshots. I’ve run this theme through\
    \ `ImageOptim` before, but I still saved 200KB of page weight from five seconds\
    \ of work. Not bad!\n\nAnother tool worth checking out is `JPEGMini` ([http://www.jpegmini.com](http://www.jpegmini.com)).\
    \ Unlike `ImageOptim`, it only handles JPEGs (who would have guessed), but it\
    \ does apply some more advanced algorithms and can cut down those files even more.\
    \ For those of you who aren’t Mac users (sorry, I don’t get out of my bubble all\
    \ that often), `Kraken` ([https://kraken.io](https://kraken.io)) is a great alternative.\n\
    \n#### Automating Image Optimization\n\nOnce you’ve seen the benefits of image\
    \ optimization in action, you’re likely going to want to use it all the time.\
    \ That’s when having a Grunt-based workflow like the ones described in Chapter\
    \ [2](#A437216_1_En_2_Chapter.html) come in handy.\n\nUsing a Grunt plugin like\
    \ `grunt-contrib-imagemin` (which is built with the same libraries used by the\
    \ `ImageOptim` program), we can ask Grunt to automatically optimize all of our\
    \ images whenever we deploy a theme. You can look back to the examples in Chapter\
    \ [2](#A437216_1_En_2_Chapter.html) to see how this is implemented.\n\n#### Pushing\
    \ Boundaries with Lossy Image Optimization\n\nThese optimization methods are “lossless”—that\
    \ is, they reduce file size without any degradation in image quality. That sounds\
    \ reasonable, but often we can achieve pretty spectacular reductions in file size\
    \ with minor reductions in quality—some of which are going to be invisible to\
    \ the end users.\n\nLet’s take JPEG images first.\n\nIf you’re familiar with Photoshop’s\
    \ Save for Web functionality, you’ll be aware that you have the option of selecting\
    \ the quality of the final image. By default, this sits at 60—but the reality\
    \ is that you can often drop that quality setting down to as low as 25 without\
    \ ending up with a dog’s breakfast. This is especially true if you’re dealing\
    \ with `@2x` or `@3x` images for high-resolution displays.\n\nIf you don’t believe\
    \ me, check out the scaling examples at [https://retinafy.me/examples/jpeg-scaling.html](https://retinafy.me/examples/jpeg-scaling.html)\
    \ from Thomas Fuchs’s excellent book *Retinafy Me*, which covers the process of\
    \ creating high-resolution images in lots of helpful detail.\n\nWe can also perform\
    \ lossy optimization on PNGs, thanks to a tool called `ImageAlpha` (developed\
    \ by the same wonderful team behind `ImageOptim` and available at [https://pngmini.com](https://pngmini.com)).\n\
    \nSimilar to `ImageOptim`, `ImageAlpha` enables you to drop a particular PNG file\
    \ into this application, select a quality level (for PNGs, determined by the number\
    \ of colors available), preview the results, and save an optimized version, as\
    \ seen in Figure [10-5](#A437216_1_En_10_Chapter.html#Fig5).\n\n![A437216_1_En_10_Fig5_HTML.jpg](A437216_1_En_10_Fig5_HTML.jpg)\n\
    \n**Figure 10-5** Using ImageAlpha is a hoot\n\nThe results can be impressive,\
    \ as you can see in the before/after shot in Figure [10-6](#A437216_1_En_10_Chapter.html#Fig6).\n\
    \n![A437216_1_En_10_Fig6_HTML.jpg](A437216_1_En_10_Fig6_HTML.jpg)\n\n**Figure\
    \ 10-6** Before (above line, 224KB) and after (below, 34KB) ImageAlpha (Image\
    \ courtesy of [http://pngmini.com](http://pngmini.com))\n\nUnlike lossless optimization,\
    \ lossy optimization is not something I recommend automating, as you often need\
    \ to run your eye over the results to make sure the optimization hasn’t gone too\
    \ far and verify that everything “looks right.”"
