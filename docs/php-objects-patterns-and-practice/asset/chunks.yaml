    \ 中提取出 `createObject()` 方法，并将其放置在平行层级结构中的单独类里。图 13-6 展示了这些新类。\n\n![A314621_5_En_13_Fig6_HTML.gif](img/A314621_5_En_13_Fig6_HTML.gif)\n\
    \n图 13-6. 领域对象工厂类\n\n领域对象工厂类承担单一的核心职责，因此它们往往比较简单：\n\n```php\n// 清单 13.31\nabstract\
    \ class DomainObjectFactory\n{\n    abstract public function createObject(array\
    \ $row): DomainObject;\n}\n```\n\n以下是一个具体实现：\n\n```php\n// 清单 13.32\nclass VenueObjectFactory\
    \ extends DomainObjectFactory\n{\n    public function createObject(array $row):\
    \ DomainObject\n    {\n        $obj = new Venue((int)$row['id'], $row['name']);\n\
    \        return $obj;\n    }\n}\n```\n\n当然，你可能还想缓存对象，以防止重复并减少不必要的数据库查询，就像我在 `Mapper`\
    \ 类中所做的那样。你可以将 `addToMap()` 和 `getFromMap()` 方法移到这里，或者在 `ObjectWatcher` 与你的 `createObject()`\
    \ 方法之间建立观察者关系。具体细节由你决定。请记住，防止领域对象的克隆在你的系统中泛滥，是你的责任！\n\n### 影响\n\n领域对象工厂将数据库行数据与对象字段数据解耦。你可以在\
    \ `createObject()` 方法中进行任意数量的调整。这一过程对客户端是透明的，客户端的职责是提供原始数据。\n\n通过将此功能从 `Mapper`\
    \ 类中分离出来，它便可供其他组件使用。例如，这是一个经过修改的 `Collection` 实现：\n\n```php\n// 清单 13.33\nabstract\
    \ class Collection implements \\Iterator\n{\n    protected $dofact = null;\n \
    \   protected $total = 0;\n    protected $raw = [];\n    private $result;\n  \
    \  private $pointer = 0;\n    private $objects = [];\n\n    // Collection\n  \
    \  public function __construct(array $raw = [], DomainObjectFactory $dofact =\
    \ null)\n    {\n        if (count($raw) && ! is_null($dofact)) {\n           \
    \ $this->raw = $raw;\n            $this->total = count($raw);\n        }\n   \
    \     $this->dofact = $dofact;\n    }\n\n    // ...\n```\n\n`DomainObjectFactory`\
    \ 可用于按需生成对象：\n\n```php\n// 清单 13.34\nprivate function getRow(int $num)\n{\n  \
    \  // ...\n    if (isset($this->raw[$num])) {\n        $this->objects[$num] =\
    \ $this->dofact->createObject($this->raw[$num]);\n        return $this->objects[$num];\n\
    \    }\n}\n```\n\n由于领域对象工厂与数据库解耦，它们可以更有效地用于测试。例如，我可以创建一个模拟的 `DomainObjectFactory`\
    \ 来测试 `Collection` 代码。这比模拟整个 `Mapper` 对象要容易得多（你可以在第 18 章中了解更多关于模拟对象与桩对象的内容）。\n\
    \n将单体组件分解为可组合部件的一个普遍影响是类的不可避免的激增。由此可能带来的混淆不容低估。即使每个组件及其与同级组件的关系都逻辑清晰、定义明确，我仍然常常觉得梳理包含数十个名称相似组件的包颇具挑战。\n\
    \n情况在好转之前还会变得更糟。我已经看到 Data Mapper 中出现了另一条断层线。`Mapper::getCollection()` 方法虽然方便，但其他类可能也希望获取某个领域类型的\
    \ `Collection` 对象，而无需通过面向数据库的类。因此，我有两个相关的抽象组件：`Collection` 和 `DomainObjectFactory`。根据我正在处理的领域对象，我将需要一组不同的具体实现：例如\
    \ `VenueCollection` 和 `VenueObjectFactory`，或者 `SpaceCollection` 和 `SpaceObjectFactory`。这个问题自然地将我们引向了抽象工厂模式。图\
    \ 13-7 展示了 `PersistenceFactory` 类。我将用它来组织构成接下来几个模式的各种组件。\n\n![A314621_5_En_13_Fig7_HTML.gif](img/A314621_5_En_13_Fig7_HTML.gif)\n\
    \n图 13-7. 使用抽象工厂模式来组织相关组件\n\n## 标识对象\n\n这里介绍的映射器实现在定位领域对象方面存在一定的僵化性。查找单个对象没有问题，查找所有相关的领域对象也同样容易。然而，介于两者之间的任何情况，都需要你添加专门的方法来构建查询（`EventMapper::findBySpaceId()`\
    \ 就是一个例子）。\n\n标识对象（Alur 等人也称之为数据传输对象）封装了查询条件，从而将系统与数据库语法解耦。\n\n### 问题\n\n很难预先知道你或其他客户端开发者需要从数据库中搜索什么。领域对象越复杂，查询中可能需要使用的筛选条件就越多。你可以通过逐个案例地向\
    \ `Mapper` 类添加更多方法来在一定程度上解决这个问题。当然，这不太灵活，并且可能涉及重复工作，因为你需要在单个 `Mapper` 类内部以及整个系统的映射器之间，编写许多相似但又有细微差别的查询。\n\
    \n标识对象以这样一种方式封装了数据库查询的条件方面，使得不同的组合可以在运行时进行合并。例如，给定一个名为 `Person` 的领域对象，客户端可以调用标识对象上的方法来指定：男性、年龄在\
    \ 30 岁以上 40 岁以下、身高不足 6 英尺。该类应设计为允许灵活组合条件（也许你对目标的身高不感兴趣，或者你想要移除年龄下限）。标识对象在一定程度上限制了客户端开发者的选择。如果你尚未编写代码来容纳\
    \ `income` 字段，那么在不做调整的情况下，它就无法被纳入查询。然而，应用不同条件组合的能力确实在灵活性方面向前迈进了一步。让我们看看这是如何实现的。\n"
- fmt: '### Implementation


    An identity object will typically consist of a set of methods you can call to
    build query criteria. Having set the object’s state, you can pass it on to a method
    responsible for constructing the SQL statement.


    Figure [13-8](#A314621_5_En_13_Chapter.html#Fig8) shows a typical set of `IdentityObject`
    classes.


    ![A314621_5_En_13_Fig8_HTML.gif](A314621_5_En_13_Fig8_HTML.gif)


    Figure 13-8. Managing query criteria with identity objects


    You can use a base class to manage common operations and to ensure that your criteria
    objects share a type. Here’s an implementation that is simpler even than the classes
    shown in Figure [13-8](#A314621_5_En_13_Chapter.html#Fig8):


    ```php

    // listing 13.35

    class IdentityObject

    {

    private $name = null;

    public function setName(string $name)

    {

    $this->name = $name;

    }

    public function getName(): string

    {

    return $this->name;

    }

    }

    // listing 13.36

    class EventIdentityObject extends IdentityObject

    {

    private $start = null;

    private $minstart = null;

    public function setMinimumStart(int $minstart)

    {

    $this->minstart = $minstart;

    }

    public function getMinimumStart()

    {

    return $this->minstart;

    }

    public function setStart(int $start)

    {

    $this->start = $start;

    }

    public function getStart()

    {

    return $this->start;

    }

    }

    ```


    Nothing’s too taxing here. The classes simply store the data provided and give
    it up on request. Here’s some code that might use `SpaceIdentityObject` to build
    a `WHERE` clause:


    ```php

    $idobj = new EventIdentityObject();

    $idobj->setMinimumStart(time());

    $idobj->setName("A Fine Show");

    $comps = [];

    $name = $idobj->getName();

    if (! is_null($name)) {

    $comps[] = "name = ''{$name}''";

    }

    $minstart = $idobj->getMinimumStart();

    if (! is_null($minstart)) {

    $comps[] = "start > {$minstart}";

    }

    $start = $idobj->getStart();

    if (! is_null($start)) {

    $comps[] = "start = ''{$start}''";

    }

    $clause = " WHERE " . implode(" and ", $comps);

    print "{$clause}\n";

    ```


    This model will work well enough, but it does not suit my lazy soul. For a large
    domain object, the sheer number of getters and setters you would have to build
    is daunting. Then, following this model, you’d have to write code to output each
    condition in the `WHERE` clause. I couldn’t even be bothered to handle all cases
    in my example code (no `setMaximumStart()` method for me), so imagine my joy at
    building identity objects in the real world.


    Luckily, there are various strategies you can deploy to automate both the gathering
    of data and the generation of SQL. In the past, for example, I have populated
    associative arrays of field names in the base class. These were themselves indexed
    by comparison types: greater than, equal, less than, or equal to. The child classes
    provide convenience methods for adding this data to the underlying structure.
    The SQL builder can then loop through the structure to build its query dynamically.
    I’m sure implementing such a system is just a matter of coloring in, so I’m going
    to look at a variation on it here.


    I will use a fluent interface. That is a class whose setter methods return object
    instances, allowing your users to chain objects together in fluid, language-like
    way. This will satisfy my laziness, but still, I hope, give the client coder a
    flexible way of defining criteria.


    I start by creating `woo\mapper\Field`, a class designed to hold comparison data
    for each field that will end up in the `WHERE` clause:


    ```php

    // listing 13.37

    class Field

    {

    protected $name = null;

    protected $operator = null;

    protected $comps = [];

    protected $incomplete = false;

    // sets up the field name (age, for example)

    public function __construct(string  $name)

    {

    $this->name = $name;

    }

    // add the operator and the value for the test

    // (> 40, for example) and add to the $comps property

    public function addTest(string $operator, $value)

    {

    $this->comps[] = [

    ''name'' => $this->name,

    ''operator'' => $operator,

    ''value'' => $value

    ];

    }

    // comps is an array so that we can test one field in more than one way

    public function getComps(): array

    {

    return $this->comps;

    }

    // if $comps does not contain elements, then we have

    // comparison data and this field is not ready to be used in

    // a query

    public function isIncomplete(): bool

    {

    return empty($this->comps);

    }

    }

    ```


    This simple class accepts and stores a field name. Through the `addTest()` method,
    the class builds an array of `operator` and `value` elements. This allows us to
    maintain more than one comparison test for a single field. Now, here’s the new
    `IdentityObject` class:


    ```php

    // listing 13.38

    class IdentityObject

    {

    protected $currentfield = null;

    protected $fields = [];

    private $enforce = [];

    // an identity object can start off empty, or with a field

    public function __construct(string $field = null, array $enforce = null)

    {

    if (! is_null($enforce)) {

    $this->enforce = $enforce;

    }

    if (! is_null($field)) {

    $this->field($field);

    }

    }

    // field names to which this is constrained

    public function getObjectFields()

    {

    return $this->enforce;

    }

    // kick off a new field.

    // will throw an error if a current field is not complete

    // (ie age rather than age > 40)

    // this method returns a reference to the current object

    // allowing for fluent syntax

    public function field(string $fieldname): self

    {

    if (! $this->isVoid() && $this->currentfield->isIncomplete()) {

    throw new \Exception("Incomplete field");

    }

    $this->enforceField($fieldname);

    if (isset($this->fields[$fieldname])) {

    $this->currentfield=$this->fields[$fieldname];

    } else {

    $this->currentfield = new Field($fieldname);

    $this->fields[$fieldname]=$this->currentfield;

    }

    return $this;

    }

    // does the identity object have any fields yet

    public function isVoid(): bool

    {

    return empty($this->fields);

    }

    // is the given fieldname legal?

    public function enforceField(string $fieldname)

    {

    if (! in_array($fieldname, $this->enforce) && ! empty($this->enforce) ) {

    $forcelist = implode('', '', $this->enforce);

    throw new \Exception("{$fieldname} not a legal field ($forcelist)");

    }

    }

    // add an equality operator to the current field

    // ie ''age'' becomes age=40

    // returns a reference to the current object (via operator())

    public function eq($value): self

    {

    return $this->operator("=", $value);

    }

    // less than

    public function lt($value): self

    {

    return $this->operator("<", $value);

    }

    // greater than

    public function gt($value): self

    {

    return $this->operator(">", $value);

    }

    // does the work for the operator methods

    // gets the current field and adds the operator and test value

    // to it

    private function operator(string $symbol, $value): self

    {

    if ($this->isVoid()) {

    throw new \Exception("no object field defined");

    }

    $this->currentfield->addTest($symbol, $value);

    return $this;

    }

    // return all comparisons built up so far in an associative array

    public function getComps(): array

    {

    $ret = [];

    foreach ($this->fields as $field) {

    $ret = array_merge($ret, $field->getComps());

    }

    return $ret;

    }

    }

    ```


    The easiest way to work out what’s going on here is to start with some client
    code and work backward:


    ```php

    // listing 13.39

    $idobj = new IdentityObject();

    $idobj->field("name")

    ->eq("The Good Show")

    ->field("start")

    ->gt(time())

    ->lt(time() + (24 * 60 * 60));

    ```'
