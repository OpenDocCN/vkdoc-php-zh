    ### 使用`PHP Substr()`函数


    `substr()`函数从较长的字符串中提取一个子串。它接受三个参数：要从中提取子串的字符串、起始点（从 0 开始计数）以及要提取的字符数。以下代码显示`$row[''article'']`的前
    100 个字符：


