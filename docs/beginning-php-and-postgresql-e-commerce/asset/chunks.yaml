    \ AND product_id = inProductId;\nEND;\n$$;\n```\n\nThe `shopping_cart_remove_product`\
    \ function removes a product from the shopping cart when a visitor clicks the\
    \ Remove button for one of the products in the shopping cart.\n\n**6.** Use the\
    \ query tool to execute this code, which creates the `cart_product` type and `shopping_cart_get_products`\
    \ functions in your hatshop database:\n\n```sql\n-- Create cart_product type\n\
    CREATE TYPE cart_product AS\n(\n  product_id INTEGER,\n  name VARCHAR(50),\n \
    \ price NUMERIC(10, 2),\n  quantity INTEGER,\n  subtotal NUMERIC(10, 2)\n);\n\n\
    -- Create shopping_cart_get_products function\nCREATE FUNCTION shopping_cart_get_products(CHAR(32))\n\
    RETURNS SETOF cart_product LANGUAGE plpgsql AS $$\nDECLARE\n  inCartId ALIAS FOR\
