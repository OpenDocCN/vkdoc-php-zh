    ```


    该程序修改了用于计算数的幂的`power()`函数。在新版本中，第一个函数参数`$x`被声明为`float`类型（实数），第二个参数`$n`为`int`类型（整数），函数的结果为`string`类型（文本）的值。


    函数体中只有两个命令。第一个是`for`循环语句的调用。在该语句的第一个块中，执行`$s=1`和`$k=1`命令，将`$s`和`$k`变量设置为初始值`1`。循环语句在`$k<=$n`条件为真时执行。每次循环执行两个命令：`$s*=$x`和`$k++`。这两个命令都放在循环语句的第三个块中，因此循环语句的主体为空（根本没有命令）。你以分号结束调用循环语句的指令，因为循环语句后面的命令不属于它。


    函数的结果由`"The number $x in the power $n: ".$s."\n"`语句返回。因此，结果是一个由字符串片段组合而成的字符串，包含有关计算结果的信息。'
  raw: 'The `power()` function is designed to raise a number to a power. The function
    has two arguments, separated by a comma in the function description. The first
    argument `$x`, is the number to be raised to a power, and the power is determined
    by the second argument `$n`.


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Figf_HTML.jpg)An information icon
    with the letter ''i''.Note


    Even though the name of the second argument `$n` of the `power()` function is
    the same as the name of the argument of the `factorial()` function, there is nothing
    in common between these arguments. The same remark applies to the local variable
    `$s` used in the body of the `power()` function.


    In the `power()` function, the local variable `$s` is initialized with the initial
    value `1`. After that, the `$s*=$x` command is executed in the loop statement,
    which multiplies the current value of the `$s` variable by the first argument
    `$x` of the `power()` function. The number of cycles is determined by the second
    argument `$n`. As a result, the `$s` variable contains the value of `$x` in the
    power `$n`. The `return $s` statement returns the result of the function.


    Another function used in the program is named `test()`. It is designed to check
    the number passed as an argument (denoted as `$number`) to see if it is even or
    odd. If the number is even, the function returns the `"even"` string as a result,
    and if the number is odd, the `"odd"` string is the result of the function.


    The core of the function code is a conditional statement, which checks the `$number%2==0`
    condition (the remainder of dividing the `$number` argument by `2` is `0`). If
    the condition is true, then the result is returned by the `return "even"` command.
    Otherwise, the result is returned by `return "odd"`.


    You use two variables to test how the functions operate: `$z` with the value `2`
    and `$num` with the value `10`. Using the `$res=power($z,$num)` command, you call
    the `power()` function with arguments `$z` and `$num`, and you store the result,
    returned by the function, to the `$res` variable. That is the value of the `$z`
    variable in the power determined by the `$num` variable.


    The factorial of the number saved in the `$num` variable is calculated by the
    `factorial($num)` instruction.


    Finally, the program uses expressions like `"The number $num is ".test($num)."\n"`.
    That is the string obtained by concatenating the `"The number $num is "`, `test($num)`,
    and `"\n"` strings. The dot is used as a concatenation operator, and the second
    of the strings to be concatenated (the `test($num)` instruction) is the result
    returned by the `test()` function.


    | Details |

    | --- |

    | The PHP interpreter generates a special intermediate bytecode based on the source
    code. This process is called translation. After the code is translated, the code
    execution begins. In PHP, the translation and the code execution are separated.
    Because of that, functions do not have to be declared before they are called.
    In other words, you can first place a function call instruction in a program and
    only after that describe the function. However, such a style should not be overused,
    especially in the practical use of PHP codes, since that can increase the probability
    of error raising. |


    ## The Type of Arguments and Result


    When describing functions in the examples, it is assumed that the values passed
    to the functions belonged to a specific type. It was essential and accounted for
    when processing the arguments. However, there is no guarantee that when a function
    is called, a value of the correct type is passed to it as an argument. A similar
    situation is with the result type returned by a function.


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Figg_HTML.jpg)An information icon
    with the letter ''i''.Note


    The fact that the type of the arguments or the type of the result is not explicitly
    specified is not always a disadvantage; rather, it is on the contrary. There are
    often situations when you need to create a function whose argument could be values
    of different types. But there are also opposite situations when you must pass
    a value of a strictly defined type to a function. It all depends on the specifics
    of the problem being solved.


    Of course, you can add some code to the function to check the passed arguments’
    type. But that is not always convenient. Fortunately, there is an easier way to
    “restrict” the range of allowed types for arguments. Namely, you can explicitly
    specify the type of the arguments and the result of the function in the function
    description. That could be done quite simply. For arguments, the type is specified
    before the argument name in the function description, and the function result
    type is specified, separated by a colon, after the closing parenthesis. The function
    description template, in that case, is as follows.


    ```

    function name(type argument, type argument,...): type{

    // commands

    }

    ```


    An error arises with such a function description if you call it and pass an argument
    of a different type than the one specified in the function description.


    | Details |

    | --- |

    | PHP has a system for catching and handling exceptions (errors) of various types.
    That system allows you to create programs that operate efficiently even if errors
    arise. Catching exceptions is discussed later. |


    Listing [5-3](#613529_1_En_5_Chapter.xhtml#PC7) uses functions with explicit type
    specifications for their arguments and results.


    ```

    Listing 5-3

    Type of Arguments and Results

    ```


    The result of the program execution is as follows.


    ```

    The output of the program (from Listing 5-3)

    The number 3 in the power 4: 81

    The number 1.5 in the power 2: 2.25

    The number 2 in the power 10: 1024

    ```


    This program modifies the `power()` function designed to calculate a number in
    a power. In the new version, the first function argument `$x` is declared to be
    of the `float` type (a real number), the second argument `$n` is of the `int`
    type (an integer), and the result of the function is a value of the `string` type
    (text).


    There are only two commands in the body of the function. The first one is a call
    of the `for` loop statement. In the first block of that statement, the `$s=1`
    and `$k=1` commands are executed, which set the `$s` and `$k` variables to the
    initial value `1`. The loop statement is executed while the `$k<=$n` condition
    is true. Two commands, `$s*=$x` and `$k++`, are executed for each loop. Both commands
    are placed in the third block of the loop statement, so the body of the loop statement
    is empty (there are no commands at all). You end the instruction that calls the
    loop statement with a semicolon since the command following the loop statement
    does not belong to it.


    The result of the function is returned by the `"The number $x in the power $n:
    ".$s."\n"` statement. Thus, the result is a string formed by combining string
    fragments and contains information about the results of calculations.'
