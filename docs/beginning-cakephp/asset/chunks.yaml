    ## About the Author


    **David Golding** began developing web sites in 1999 and first started using CakePHP
    on a bet he couldn’t complete a web application in five minutes. Golding has a
    degree in European Studies from Brigham Young University and currently works in
    technology consulting and freelance web development. He lives with his wife, Camille,
    and his son, Kenny, in southern California and spends his free time playing golf
    and studying history. His musings can be found at [www.davidgolding.net](http://www.davidgolding.net).


