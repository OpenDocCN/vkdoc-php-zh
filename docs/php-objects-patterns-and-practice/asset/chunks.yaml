    ## 静态方法与属性


    前一章的所有示例都涉及对象操作。我将类描述为生成对象的模板，而对象则是类的活动实例——即调用其方法、访问其属性的实体。我曾暗示，在面向对象编程中，实际工作是由类的实例完成的。毕竟，类仅仅是对象的模板。


    事实上，情况并非如此简单。你可以在类的上下文（而非对象的上下文）中访问方法和属性。这类方法和属性是“静态的”，必须使用 `static` 关键字来声明：


    ```

    // 列表 04.01

    class StaticExample

    {

    static public $aNum = 0;

    public static function sayHello()

    {

    print "hello";

    }

    }

    ```


    静态方法就是具有类作用域的函数。它们自身不能访问类中的任何普通属性，因为这些属性属于某个对象；然而，它们可以访问静态属性。如果你修改了一个静态属性，该类的所有实例都能访问到这个新值。


    由于你通过类（而非实例）来访问静态元素，因此你不需要引用对象的变量。相反，你将类名与 `::` 结合使用，如下例所示：


    ```

    print StaticExample::$aNum;

    StaticExample::sayHello();

    ```


    这个语法应该在前一章中见过。我曾使用 `::` 结合 `parent` 来访问一个被覆盖的方法。现在和当时一样，我访问的是类数据而非对象数据。类代码可以使用
    `parent` 关键字来访问超类，而无需使用其类名。若要在同一个类（而非子类）中访问静态方法或属性，我会使用 `self` 关键字。`self` 对于类而言，就如同
    `$this` 伪变量对于对象。因此，从 `StaticExample` 类外部，我使用其类名访问 `$aNum` 属性：


    ```

    StaticExample::$aNum;

    ```


    在 `StaticExample` 类内部，我可以使用 `self` 关键字：


    ```

    // 列表 04.02

    class StaticExample

    {

    static public $aNum = 0;

    public static function sayHello()

    {

    self::$aNum++;

    print "hello (".self::$aNum.")\n";

    }

    }

    ```


    **注意**


    使用 `parent` 进行方法调用，是唯一应该对非静态方法使用静态引用的情形。


    除非你在访问一个被覆盖的方法，否则你只应使用 `::` 来访问那些被明确声明为静态的方法或属性。


    然而，在文档中，你常常会看到使用静态语法来指代某个方法或属性。这并不意味着该条目一定是静态的，而只是表示它属于某个特定的类。例如，`ShopProductWriter`
    类的 `write()` 方法可能被引用为 `ShopProductWriter::write()`，即便 `write()` 方法并非静态。当需要这种精确的层级指代时，你会在本文中看到这种语法。


    根据定义，静态方法和属性是在类上调用，而非在对象上。因此，它们常被称为类变量和类属性。由于这种面向类的特性，你不能在静态方法内部使用 `$this` 伪变量。


    那么，为什么要使用静态方法或属性呢？静态元素具有一些有用的特性。首先，它们可以在脚本的任何位置使用（假设你可以访问该类）。这意味着你无需将类的实例在对象间传递，或者更糟糕地，将实例存储在全局变量中，就能访问其功能。其次，静态属性对类的每个实例都可用，因此你可以设置希望该类型的所有成员都能访问的值。最后，你无需实例化对象即可访问静态属性或方法，这可以避免你仅仅为了使用一个简单函数就去实例化一个对象。


    为了说明这一点，我将为 `ShopProduct` 类构建一个静态方法，用于自动化 `ShopProduct` 对象的实例化过程。使用 SQLite，我可能会定义一个如下的
    `products` 表：


    ```

    CREATE TABLE products (

    id INTEGER PRIMARY KEY AUTOINCREMENT,

    type TEXT,

    firstname TEXT,

    mainname TEXT,

    title TEXT,

    price float,

    numpages int,

    playlength int,

    discount int )

    ```


    现在，我想构建一个 `getInstance()` 方法，该方法接收一个行 ID 和一个 `PDO` 对象，利用它们获取数据库行，然后返回一个 `ShopProduct`
    对象。我可以将这些方法添加到我在前一章创建的 `ShopProduct` 类中。你可能知道，PDO 代表 PHP 数据对象。`PDO` 类为不同的数据库应用程序提供了一个通用接口：


    ```

    // 列表 04.03

    // ShopProduct 类...

    private $id = 0;

    // ...

    public function setID(int $id)

    {

    $this->id = $id;

    }

    // ...

    public static function getInstance(int $id, \PDO $pdo): ShopProduct

    {

    $stmt = $pdo->prepare("select * from products where id=?");

    $result = $stmt->execute([$id]);

    $row = $stmt->fetch();

    if (empty($row)) {

    return null;

    }

    if ($row[''type''] == "book") {

    $product = new BookProduct(

    $row[''title''],

    $row[''firstname''],

    $row[''mainname''],

    (float) $row[''price''],

    (int) $row[''numpages'']

    );

    } elseif ($row[''type''] == "cd") {

    $product = new CdProduct(

    $row[''title''],

    $row[''firstname''],

    $row[''mainname''],

    (float) $row[''price''],

    (int) $row[''playlength'']

    );

    } else {

    $firstname = (is_null($row[''firstname''])) ? "" : $row[''firstname''];

    $product = new ShopProduct(

    $row[''title''],

    $firstname,

    $row[''mainname''],

    (float) $row[''price'']

    );

    }

    $product->setId((int) $row[''id'']);

    $product->setDiscount((int) $row[''discount'']);

    return $product;

    }

    ```


    如你所见，`getInstance()` 方法返回一个 `ShopProduct` 对象，并且能够根据类型标志智能地确定应该实例化哪个具体的子类。为了保持示例简洁，我省略了所有错误处理。在真实的版本中，例如，我不会轻信所提供的
    `PDO` 对象已初始化并连接到正确的数据库。实际上，我可能会用一个类来封装 `PDO`，以确保这种行为。关于面向对象编程和数据库的更多内容，你可以在第 13
    章中阅读。


    这个方法在类的上下文比在对象的上下文中更有用。它让你可以轻松地将来自数据库的原始数据转换为一个对象，而无需一开始就有一个 `ShopProduct` 对象。该方法不使用任何实例属性或方法，因此没有理由不将其声明为
    `static`。给定一个有效的 `PDO` 对象，我可以在应用程序的任何位置调用此方法：


    ```

    $dsn = "sqlite:/".__DIR__."/products.db";

    $pdo = new \PDO($dsn, null, null);

    $pdo->setAttribute(\PDO::ATTR_ERRMODE, \PDO::ERRMODE_EXCEPTION);

    $obj = ShopProduct::getInstance(1, $pdo);

    ```


    这类方法充当“工厂”，因为它们接收原始材料（如行数据或配置信息）并用它们来生成对象。“工厂”这一术语用于指代设计用来生成对象实例的代码。你将在未来的章节中再次遇到工厂示例。


    当然，从某些方面来看，这个示例在解决问题的同时也带来了不少问题。尽管我让 `ShopProduct::getInstance()` 方法无需 `ShopProduct`
    实例即可在系统中的任何位置访问，但我同时也要求客户端代码提供一个 `PDO` 对象。这个对象从哪里来呢？而且，父类对其子类拥有如此深入的了解，这真的是一个好实践吗？（提示：不，不是。）这类问题——到哪里获取关键对象和值，以及类之间应该相互了解多少——在面向对象编程中非常常见。我将在第
    9 章探讨各种处理对象生成的方法。

    '
- fmt: '# Constant Properties


    Some properties should not be changed. The Answer to Life, the Universe, and Everything
    is 42, and you want it to stay that way. Error and status flags will often be
    hard-coded into your classes. Although they should be publicly and statically
    available, client code should not be able to change them.


    PHP allows you to define constant properties within a class. Like global constants,
    class constants cannot be changed once they are set. A constant property is declared
    with the `const` keyword. Constants are not prefixed with a dollar sign like regular
    properties. By convention, they are often named using only uppercase characters:


    ```

    // listing 04.04

    class ShopProduct

    {

    const AVAILABLE      = 0;

    const OUT_OF_STOCK   = 1;

    // ...

    ```


    Constant properties can contain only primitive values. You cannot assign an object
    to a constant. Like static properties, constant properties are accessed through
    the class and not an instance. Just as you define a constant without a dollar
    sign, no leading symbol is required when you refer to one:


    ```

    print ShopProduct::AVAILABLE;

    ```


    Attempting to set a value on a constant once it has been declared will cause a
    parse error.


    You should use constants when your property needs to be available across all instances
    of a class, as well as when the property value needs to be fixed and unchanging.


    # Abstract Classes


    An abstract class cannot be instantiated. Instead it defines (and, optionally,
    partially implements) the interface for any class that might extend it.


    You define an abstract class with the `abstract` keyword. Here I redefine the
    `ShopProductWriter` class I created in the previous chapter, this time as an abstract
    class:


    ```

    // listing 04.05

    abstract class ShopProductWriter

    {

    protected $products = [];

    public function addProduct(ShopProduct $shopProduct)

    {

    $this->products[] = $shopProduct;

    }

    }

    ```


    You can create methods and properties as normal, but any attempt to instantiate
    an abstract object in this way will cause an error:


    ```

    $writer = new ShopProductWriter();

    ```


    You can see the error in this output:


    ```

    Error: Cannot instantiate abstract class popp\ch04\batch03\ShopProductWriter

    ```


    In most cases, an abstract class will contain at least one abstract method. These
    are declared, once again, with the `abstract` keyword. An abstract method cannot
    have an implementation. You declare it in the normal way, but end the declaration
    with a semicolon rather than a method body. Here I add an abstract `write()` method
    to the `ShopProductWriter` class:


    ```

    abstract class ShopProductWriter

    {

    protected $products = [];

    public function addProduct(ShopProduct $shopProduct)

    {

    $this->products[]=$shopProduct;

    }

    abstract public function write();

    }

    ```


    In creating an abstract method, you ensure that an implementation will be available
    in all concrete child classes, but you leave the details of that implementation
    undefined.


    Assume I were to create a class derived from `ShopProductWriter` that does not
    implement the `write()` method, as in this example:


    ```

    class ErroredWriter extends ShopProductWriter

    {

    }

    ```


    I would face the following error:


    ```

    PHP Fatal error:  Class ErroredWriter contains 1 abstract method and

    must therefore be declared abstract or implement the remaining methods

    (ShopProductWriter::write) in...

    ```


    So any class that extends an abstract class must implement all abstract methods
    or itself be declared abstract. An extending class is responsible for more than
    simply implementing an abstract method. In doing so, it must reproduce the method
    signature. This means that the access control of the implementing method cannot
    be stricter than that of the abstract method. The implementing method should also
    require the same number of arguments as the abstract method, reproducing any class
    type hinting.


    Here are two implementations of `ShopProductWriter`:


    ```

    // listing 04.06

    class XmlProductWriter extends ShopProductWriter

    {

    public function write()

    {

    $writer = new \XMLWriter();

    $writer->openMemory();

    $writer->startDocument(''1.0'', ''UTF-8'');

    $writer->startElement("products");

    foreach ($this->products as $shopProduct) {

    $writer->startElement("product");

    $writer->writeAttribute("title", $shopProduct->getTitle());

    $writer->startElement("summary");

    $writer->text($shopProduct->getSummaryLine());

    $writer->endElement(); // summary

    $writer->endElement(); // product

    }

    $writer->endElement(); // products

    $writer->endDocument();

    print $writer->flush();

    }

    }

    // listing 04.07

    class TextProductWriter extends ShopProductWriter

    {

    public function write()

    {

    $str = "PRODUCTS:\n";

    foreach ($this->products as $shopProduct) {

    $str .= $shopProduct->getSummaryLine()."\n";

    }

    print $str;

    }

    }

    ```


    I create two classes, each with its own implementation of the `write()` method.
    The first outputs XML and the second outputs text. A method that requires a `ShopProductWriter`
    object will not know which of these two classes it is receiving, but it can be
    absolutely certain that a `write()` method is implemented. Note that I don’t test
    the type of `$products` before treating it as an array. This is because this property
    is initialized as an empty array in the `ShopProductWriter`.'
