    # 额外的 HTML 输入安全


    从本章到目前为止开发的代码中可以看出，每当在 HTML 表单上使用文本框时，必须在多个区域包含额外的代码来验证用户输入的内容。当你需要允许用户在输入内容上有灵活性（例如包含姓名和地址的表单）时，文本框是必需的。但是，当你希望将用户的响应限制在特定的可能值列表（例如州的两字母缩写）时，可以使用其他表单对象。这将提供更有效的数据，因为用户将无法输入拼写错误或无效数据。


