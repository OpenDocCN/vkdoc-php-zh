- fmt: "```php\n($value == 'Male' || $value == 'Female') ?\n    $this->dog_gender\
    \ = $value : $error_message = FALSE;\n```\n\n2.  Go to `php.net` and search for\
    \ a method that will allow the checking of any case of `\"Male\"` or `\"Female\"\
    ` from #1. Update the conditional statement to allow any version (`Male`, `MALE`,\
    \ `male`, `Female`, `FEMALE`, `female`, and so on). Hint: The characters in `$value`\
    \ can be changed to all uppercase or all lowercase using the `strtoupper` or `strtolower`\
    \ methods. Then check the string as all uppercase (`MALE`, `FEMALE`) or all lowercase\
    \ (`male`, `female`) characters.\n\n## Get Methods\n\nIn our previous examples,\
    \ we created a `get_properties` method that returned multiple properties at the\
    \ same time. This is a valid and useful method. However, it is common to have\
    \ a `get` method to match each `set` method. This provides both `write` (`set`\
    \ method) and `read` (`get` method) capabilities for the properties in a method.\
    \ In some situations, you may want to only provide a `get` method without a set\
    \ method (making the property read-only). We could (although rarely done) provide\
    \ a `set` method without a `get` method (making the property write-only).\n\n\
    `Get` methods are actually much easier to code than `set` methods. No verification\
    \ of data is necessary because you are reading the data and not updating it.\n\
    \n```php\nfunction get_dog_name() : string\n{\nreturn $this->dog_name;\n}\n```\n\
    \nAll that is necessary in the `get` method is the `return` statement, which returns\
    \ the value in the property without the user of the object having direct access\
    \ to the property.\n\n```php\ndog_name = $value : $error_message = FALSE;\nreturn\
    \ $error_message;\n}\nfunction set_dog_weight(int $value) : bool\n{\nbool $error_message\
    \ = TRUE;\n(ctype_digit($value) && ($value > 0 && $value < 120)) ? $this->dog_weight\
    \ = $value : $error_message = FALSE;\nreturn $error_message;\n}\nfunction set_dog_breed(string\
    \ $value) : bool\n{\nbool $error_message = TRUE;\n(ctype_alpha($value) && strlen($value)\
    \ <= 20) ? $this->dog_breed = $value : $error_message = FALSE;\nreturn $error_message;\n\
    }\nfunction set_dog_color(string $value) : bool\n{\nbool $error_message = TRUE;\n\
    (ctype_alpha($value) && strlen($value) <= 15) ? $this->dog_color = $value : $error_message\
    \ = FALSE;\nreturn $error_message;\n}\n// -----------------------------Get Methods\
    \ -------------------------------\nfunction get_dog_name() : string\n{\nreturn\
    \ $this->dog_name;\n}\nfunction get_dog_weight() : string\n{\nreturn $this->dog_weight;\n\
    }\nfunction get_dog_breed() : string\n{\nreturn $this->dog_breed;\n}\nfunction\
    \ get_dog_color() : string\n{\nreturn $this->dog_color;\n}\nfunction get_properties()\
    \ : string\n{\nreturn \"$this->dog_weight,$this->dog_breed,$this->dog_color.\"\
    ;\n}\n}\n?>\nExample 4-10\nDog class with set and get methods—dog.php\n```\n\n\
    The code is lengthy. However, as pointed out previously, like the `set` methods,\
    \ the `get` methods are very similar to each other. Once you have created one\
    \ successful `get` method, you can copy and paste it to create the other methods.\
    \ All that needs to change for each `get` method is the name of the method and\
    \ the property being returned.\n\n```php\nset_dog_name('Fred');\nprint $dog_error_message\
    \ == TRUE ? 'Name update successful' :\n'Name update not successful';\nbool $dog_error_message\
    \ = $lab->set_dog_weight(50);\nprint $dog_error_message == TRUE ? 'Weight update\
    \ successful' : '\nWeight update not successful';\nbool $dog_error_message = $lab->set_dog_breed('Lab');\n\
    print $dog_error_message == TRUE ? 'Breed update successful' :\n'Breed update\
    \ not successful';\nbool $dog_error_message = $lab->set_dog_color('Yellow');\n\
    print $dog_error_message == TRUE ? 'Color update successful' :\n'Color update\
    \ not successful';\n// ------------------------------Get Properties--------------------------\n\
    print $lab->get_dog_name() . \"<br/>\";\nprint $lab->get_dog_weight() . \"<br/>\"\
    ;\nprint $lab->get_dog_breed() . \"<br/>\";\nprint $lab->get_dog_color() . \"\
    <br/>\";\n$dog_properties = $lab->get_properties();\nlist($dog_weight, $dog_breed,\
    \ $dog_color) = explode(',', $dog_properties);\nprint \"Dog weight is $dog_weight.\
    \ Dog breed is $dog_breed.\nDog color is $dog_color.\";\n?>\nExample 4-11\nThe\
    \ lab.php program using set and get methods\n```\n\nWhen viewing the code in Example\
    \ [4-11](#394210_2_En_4_Chapter.xhtml#PC32), note that the `print` statements\
    \ call the `get` methods (`print $lab->get_dog_name() . \"<br/>\";`). The order\
    \ of operations, which will be discussed in more detail in a later chapter, causes\
    \ the method (`get_dog_name()`) to be executed first, even though normally a line\
    \ of code would execute from left to right. The method returns the value in `dog_name`\
    \ (the string `\"Fred\"`). The string is placed in the same location in which\
    \ the method call was located. After the `get` method executes, the code line\
    \ is now\n\n```\nprint \"Fred\" . \"<br/>\";\n```\n\nThen the code line executes\
    \ from left to right, producing the output\n\n*Programming note—Unlike properties,\
    \ methods must NOT be included in quotes (`\"\"` or `''`). The string must be\
    \ broken apart and concatenated using the `'.'`, as shown in the example. If a\
    \ method is included IN quotes, PHP will throw an exception.*\n\n```\nFred \n\
