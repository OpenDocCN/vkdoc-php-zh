- '# 引言




  '
- '# 欢迎阅读《*Beginning PHP and PostgreSQL E-Commerce: From Novice to Professional*》


  互联网零售业的爆炸式增长，正在鼓励更多中小型企业考虑建立电子商务网站的优势。尽管在线零售有着显著且明显的优势，但在开发零售网站时，您也可能遇到许多隐藏的陷阱。本书为您提供了一份实用、循序渐进地建立电子商务网站的指南。本书将引导您完成设计和构建过程的每一步，让您能够快速、轻松地构建高质量、可扩展的电子商务网站。


  通过本书的学习，您将掌握所有必要的技能，让您的业务上线并面向全球受众。我们通过贯穿全书的一个案例研究来呈现这些信息，随着您在书中知识的增长，案例的复杂性也会逐步提升。


  该案例研究分为三个阶段。第一阶段侧重于以低成本尽快让网站上线运行。虽然功能尚不完善，但在此阶段结束时，您的网站将能够接受 PayPal 付款，使您能够立即开始创收。


  第二阶段侧重于通过改善购物体验来提高收入。在本阶段，您将学习如何通过实施产品推荐来主动鼓励客户购买更多商品。我们还将通过开发和集成自定义购物车功能，为处理信用卡交易奠定基础。


  在第三阶段，我们将向您展示如何通过自动化和简化订单处理与管理，以及自行处理信用卡交易来降低成本，从而提高利润率。您还将学习如何通过 Web 服务集成外部功能，以及如何通过添加产品评论功能来改善客户的购物体验。


  ## 本书读者对象


  《*Beginning PHP and PostgreSQL E-Commerce: From Novice to Professional*》面向那些寻求教程式方法，以构建一个从设计到部署的完整电子商务网站的开发者。不过，前提是您已具备使用
  PHP 和 PostgreSQL 构建网站的一些基础知识。由 W. Jason Gilmore 和 Robert Treat 合著的《*Beginning PHP
  and PostgreSQL 8: From Novice to Professional*》（Apress，2006）可以为您提供这些基础知识。


  对于喜欢通过实例学习，并希望亲身体验 PHP 5 开发技术的 PHP 4 开发者来说，本书也极具价值。


  xvii


