- fmt: "# The PHP Community and Its Alternatives\n\n- The PHP community is agile,\
    \ many useful helper libraries or new versions of the existing libraries are being\
    \ developed (such as those you can find in the `PEAR` repository or at [http://www.phpclasses.org](http://www.phpclasses.org)),\
    \ and new features are added frequently.\n- PHP works very well on a variety of\
    \ web servers and operating systems (Unix-like platforms, Windows, Mac OS X).\n\
    \nHowever, PHP is not the only server-side scripting language around for creating\
    \ dynamic web pages. Among its most popular competitors are `JSP` (Java Server\
    \ Pages), `Perl`, `ColdFusion`, and `ASP.NET`. Among these technologies are many\
    \ differences but also some fundamental similarities. For example, pages written\
    \ with any of these technologies are composed of basic HTML, which draws the static\
    \ part of the page (the template), and code that generates the dynamic part.\n\
    \n> **Note:** You might want to check out *Beginning ASP.NET 2.0 E-Commerce in\
    \ C# 2005* (Apress, 2005), which explains how to build e-commerce web sites with\
    \ `ASP.NET 2.0`, `C#`, and `SQL Server 2005`.\n\n## Using Smarty to Separate Layout\
    \ from Code\n\nBecause PHP is simple and easy to start with, it has always been\
    \ tempting to start coding without properly designing an architecture and framework\
    \ that would be beneficial in the long run.\n\nWhat makes things even worse is\
    \ that the straightforward method of building PHP pages is to mix PHP instructions\
    \ with HTML because PHP doesn't have by default an obvious technique of separating\
    \ the PHP code from the HTML layout information.\n\nMixing the PHP logic with\
    \ HTML has two important disadvantages:\n\n- This technique often leads to long,\
    \ complicated, and hard-to-manage code. Maybe you have seen those kilometric source\
    \ files with an unpleasant mixture of PHP and HTML, which are hard to read and\
    \ impossible to understand after a week.\n- These mixed files are the subject\
    \ of both designers’ and programmers’ work, which complicates the collaboration\
    \ more than necessary. This also increases the chances of the designer creating\
    \ bugs in the code logic while working on cosmetic changes.\n\nThese kinds of\
    \ problems led to the development of template engines, which offer frameworks\
    \ separating the presentation logic from the static HTML layout. `Smarty` ([http://smarty.php.net](http://smarty.php.net))\
    \ is the most popular and powerful template engine for PHP. Its main purpose is\
    \ to offer you a simple way to separate application logic (PHP code) from its\
    \ presentation code (HTML).\n\nThis separation permits the programmer and the\
    \ template designer to work independently on the same application. The programmer\
    \ can change the PHP logic without needing to change the template files, and the\
    \ designer can change the templates without caring how the code that makes them\
    \ alive works.\n\nFigure 2-4 shows the relationship between the Smarty Design\
    \ Template file and its Smarty plugin file.\n\n### Smarty Componentized Template\n\
    \n**Smarty Design Template**  \n(`.tpl` file containing HTML and Smarty Tags)\n\
    - Assign variables used in the template:\n  - (`$variable1`)\n  - (`$variable2`)\n\
    \  - ...\n  - (`$variableN`)\n\n**Smarty Plugin File**  \n(`.php` file containing\
    \ presentation tier logic)\n\n**Figure 2-4.** *Smarty Componentized Template*\n\
    \nThe Smarty Design Template (a `.tpl` file containing the HTML layout and Smarty-specific\
    \ tags and code) and its Smarty plugin file (a `.php` file containing the associated\
    \ code for the template) form a **Smarty Componentized Template**. You’ll learn\
    \ more about how Smarty works while you’re building the e-commerce web site. For\
    \ a comprehensive Smarty tutorial, read *Smarty PHP Template Programming and Applications*\
    \ (Packt, 2006).\n\n> **Note:** Adding Smarty or another template engine to a\
    \ web application's architecture adds some initial coding effort and also implies\
    \ a learning curve. However, you should try it anyway because the advantages of\
    \ using such a modern development technique will prove to be significant later\
    \ in the process.\n\n### What About the Alternatives?\n\nSmarty is not the only\
    \ template engine available for PHP. Other popular template engines are:\n\n-\
    \ `Yapter` ([http://yapter.sourceforge.net/](http://yapter.sourceforge.net/))\n\
    - `EasyTemplate` ([http://www.onlinetools.org/tools/easytemplate/index.php](http://www.onlinetools.org/tools/easytemplate/index.php))\n\
    - `phpLib` ([http://phplib.sourceforge.net/](http://phplib.sourceforge.net/))\n\
    - `TemplatePower` ([http://templatepower.codocad.com/](http://templatepower.codocad.com/))\n\
    \nAlthough all template engines follow the same basic principles, we chose to\
    \ use Smarty in the PHP e-commerce project for this book because of its very good\
    \ performance results, powerful features (such as template compilation and caching),\
    \ and wide acceptance in the industry.\n\n## Using PostgreSQL to Store Web Site\
    \ Data\n\nMost of the data your visitors will see while browsing the web site\
    \ will be retrieved from a relational database. A Relational Database Management\
    \ System (`RDBMS`) is a complex software program, the purpose of which is to store,\
    \ manage, and retrieve data as quickly and reliably as possible. For the HatShop\
    \ web site, it will store all data regarding the products, departments, users,\
    \ shopping carts, and so on.\n\nMany `RDBMSs` are available for you to use with\
    \ PHP, including `PostgreSQL`, `MySQL`, `Oracle`, and so on. PostgreSQL is arguably\
    \ the world's most advanced open source database, and it's a free, fast, and reliable\
    \ database. Another important advantage is that many web hosting providers offer\
    \ access to a PostgreSQL database, which makes your life easier when going live\
    \ with your newly created e-commerce web site. We'll use PostgreSQL as the backend\
    \ database when developing the HatShop e-commerce web site.\n\nThe language used\
    \ to communicate with a relational database is SQL (Structured Query Language).\
    \ However, each database engine recognizes a particular dialect of this language.\
    \ If you decide to use a different `RDBMS` than PostgreSQL, you'll probably need\
    \ to update some of the SQL queries.\n\n### Getting in Touch with PostgreSQL\n\
    \nYou talk with the database server by formulating an SQL query, sending it to\
    \ the database engine, and retrieving the results. The SQL query can say anything\
    \ related to the web site data, or its data structures, such as “give me the list\
    \ of departments,” “remove product no. 223,” “create a data table,” or “search\
    \ the catalog for yellow hats.”\n\nNo matter what the SQL query says, we need\
    \ a way to send it to PostgreSQL. PostgreSQL ships with a simple, text-based interface\
    \ (named `\"psql\"`) that permits executing SQL queries and getting back the results.\
    \ The command-line interface isn't particularly easy to use, but it is functional.\
    \ However, there are alternatives.\n\nSeveral free, third-party database administration\
    \ tools allow you to manipulate data structures and execute SQL queries via an\
    \ easy-to-use graphical interface. In this book, we'll show you how to use `pgAdmin\
    \ III`, which is an admin tool that ships together with PostgreSQL.\n\nApart from\
    \ needing to interact with PostgreSQL with a direct interface to its engine, you\
    \ also need to learn how to access PostgreSQL programmatically, from PHP code.\
    \ This requirement is obvious, because the e-commerce web site will need to query\
    \ the database to retrieve catalog information (departments, categories, products,\
    \ and so on) when building pages for the visitors.\n\nAs for querying PostgreSQL\
    \ databases through PHP code, the tool you'll rely on here is `PDO` (PHP Data\
    \ Objects).\n\n### Implementing Database Integration Using PDO\n\n**`PDO` (PHP\
    \ Data Objects)** is a native data-access abstraction library that ships with\
    \ PHP 5.1"
