    ## 超全局变量（Superglobals）


    如本章所示，PHP 内置了若干关联数组，用于为 PHP 脚本提供外部数据。这些数组被称为超全局变量，因为它们可在所有作用域中自动生效。PHP 共有九个超全局变量，表
