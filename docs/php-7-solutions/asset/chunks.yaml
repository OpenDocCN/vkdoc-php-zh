    \ to `dbConnect()`.\n\n2.  Submit the query by adding the following code before\
    \ the closing PHP\n    tag.\n\nFor MySQLi, use this:\n\n```\n    $result = $conn->query($sql);\n\
    \    if (!$result) {\n    $error = $conn->error;\n    }\n    ```\n\nFor PDO, use\
    \ this:\n\n```\n    $result = $conn->query($sql);\n    $error = $conn->errorInfo()[2];\n\
    \    ```\n\n3.  Add a conditional statement just before the table to display any\
    \ error\n    message, and wrap the table in the `else` block. The code\n    before\
    \ the table looks like this:\n\n```\n    $error\";\n    } else { ?>\n    ```\n\
    \nThe closing curly brace goes in a separate PHP block after the\n    closing\
    \ `</table>`\n    tag.\n\n4.  You now need to enclose the second table row in\
    \ a loop and retrieve\n    each record from the result set. The following code\
    \ goes between the\n    closing `</tr>` tag of\n    the first row and the opening\
    \ `<tr>` tag of the\n    second row.\n\nFor MySQLi, use this:\n\n```\n    fetch_assoc())\
    \ { ?>\n\n```\n\nFor PDO, use this:\n\n```\n    fetch()) { ?>\n\n```\n\nThis is\
    \ the same as in the previous chapter, so it should need no\n    explanation.\n\
    \n5.  Display the `created` and `title` fields for the\n    current record in\
    \ the first two cells of the second row, like this:\n\nThe `created`\n    column\
    \ stores a `TIMESTAMP` data type,\n    which is a fixed format, so it doesn’t\
    \ need sanitizing. But the `title` column is\n    text-related, so it needs to\
    \ be passed to the `safe()` function\n    defined in Chapter [13](#332054_4_En_13_Chapter.xhtml).\n\
    \n6.  In the next two cells, add the query string and value of the `article_id`\
    \ field for\n    the current record to both URLs, as follows (although the links\
    \ are\n    different, the highlighted code is the same for the PDO version):\n\
    \n```\n    \"\n    >EDIT\n    \"\n    >DELETE\n    ```\n\nWhat you’re doing here\
    \ is adding `?article_id=` to the\n    URL and then using PHP to display the value\
    \ of `$row['article_id']`.\n    The `article_id`\n    column stores only integers,\
    \ so the value doesn’t need to be sanitized.\n    It’s important that you don’t\
    \ leave any spaces that might break the URL\n    or the query string. After the\
    \ PHP has been processed, the opening `<a>` tag should\n    look like this when\
    \ viewing the page’s source code in a browser\n    (although the number will vary\
    \ according to the record):\n\n7.  Finally, close the loop surrounding the second\
    \ table row with a curly\n    brace, like this:\n\n8.  Save `blog_list_mysqli.php`\n\
    \    or `blog_list_pdo.php` and\n    load the page into a browser. Assuming that\
    \ you loaded the contents of\n    `blog.sql` into\n    the `phpsols`\n    database\
    \ earlier, you should see a list of four items, as shown in\n    Figure [15-2](#332054_4_En_15_Chapter.xhtml#Fig2).\
    \ You can now\n    test `blog_insert_mysqli.php`\n    or `blog_insert_pdo.php`.\n\
    \    After inserting an item, you should be returned to the appropriate\n    version\
    \ of `blog_list.php`, and\n    the date and time of creation, together with the\
    \ title of the new item,\n    should be displayed at the top of the list. Check\
    \ your code against\n    `blog_list_mysqli_02.php`\n    or `blog_list_pdo_02.php`\n\
    \    in the `ch15`\n    folder if you encounter any problems."
  trans: "\n4. 下一步是初始化预处理语句，并将变量中的值绑定到占位符——这一过程称为**绑定参数**。添加以下代码：\n\n```\n// 准备语句\n\
    $stmt = $conn->prepare($sql);\n// 绑定参数并执行语句\n$stmt->bindParam(':title', $_POST['title'],\
    \ PDO::PARAM_STR);\n$stmt->bindParam(':article', $_POST['article'], PDO::PARAM_STR);\n\
    // 执行并获取受影响的行数\n$stmt->execute();\n$OK = $stmt->rowCount();\n```\n\n首先，将 SQL 查询传递给数据库连接对象（`$conn`）的\
    \ `prepare()` 方法，并将语句的引用存储为变量（`$stmt`）。\n\n接着，将变量中的值绑定到预处理语句中的占位符，然后 `execute()`\
    \ 方法执行查询。\n\n当与 `INSERT`、`UPDATE` 或 `DELETE` 查询一起使用时，PDO 的 `rowCount()` 方法会报告查询影响的行数。如果记录插入成功，`$OK`\
    \ 的值为 `1`，PHP 将其视为 `true`。否则，值为 `0`，被视为 `false`。\n\n5. 最后，将页面重定向到现有记录列表，或显示错误信息。在上一步之后添加以下代码：\n\
    \n```\n// 如果成功则重定向，否则显示错误\nif ($OK) {\n    header('Location: http://localhost/phpsols-4e/admin/blog_list_pdo.php');\n\
    \    exit;\n} else {\n    $error = $stmt->errorInfo()[2];\n}\n}\n?>\n```\n\n如果存在错误信息，它会被存储在由\
    \ `$stmt->errorInfo()` 返回的数组的第三个元素中，并通过数组解引用进行访问。\n\n6. 在页面的主体中添加一个 PHP 代码块，用于显示任何错误信息：\n\
    \n```\n<?php\nif (isset($error)) {\n    echo \"<p>错误：$error</p>\";\n}\n?>\n```\n\
    \n完整的代码位于 `ch15` 文件夹中的 `blog_insert_pdo_02.php` 文件中。\n\n至此，插入页面已完成，但在测试之前，请先创建接下来要描述的\
    \ `blog_list_pdo.php`。\n\n### 链接到更新和删除页面\n\n在更新或删除记录之前，需要先找到其主键。一个实用的方法是查询数据库，选择所有记录。你可以利用此查询结果显示所有记录的列表，并附带指向更新和删除页面的链接。通过在每个链接的查询字符串中添加\
    \ `article_id` 的值，你可以自动识别要更新或删除的记录。如图 15-2 所示，浏览器状态栏（左下角）中显示的 URL 将文章 `Trainee\
    \ Geishas Go Shopping` 的 `article_id` 标识为 2。\n\n![../images/332054_4_En_15_Chapter/332054_4_En_15_Fig2_HTML.jpg](img/332054_4_En_15_Fig2_HTML.jpg)\n\
    \n**图 15-2.** 编辑和删除链接的查询字符串中包含记录的主键\n\n更新页面利用此信息显示正确的记录以供更新。删除链接中也会向删除页面传递相同的信息。\n\
    \n要创建这样的列表，你需要从一个包含两行以及所需列数（再加上两列用于编辑和删除链接）的 HTML 表格开始。第一行用于列标题。第二行包裹在一个 PHP 循环中，用于显示所有结果。`ch15`\
    \ 文件夹中 `blog_list_mysqli_01.php` 的表格如下所示（`blog_list_pdo_01.php` 中的版本相同，只是最后两个表格单元格中的链接指向的是\
    \ PDO 版本的更新和删除页面）：\n\n```\n<table>\n  <tr>\n    <th>创建日期</th>\n    <th>标题</th>\n\
    \    <th>&nbsp;</th>\n    <th>&nbsp;</th>\n  </tr>\n  <tr>\n    <td>编辑</td>\n\
    \    <td>删除</td>\n  </tr>\n</table>\n```\n\n### PHP 解决方案 15-3：创建指向更新和删除页面的链接\n\
    \n本 PHP 解决方案展示了如何通过显示所有记录的列表并链接到更新和删除页面，来创建管理 `blog` 表中记录的页面。MySQLi 和 PDO 版本之间只有细微差别，因此本说明将同时涵盖两者。\n\
    \n将 `blog_list_mysqli_01.php` 或 `blog_list_pdo_01.php` 复制到 `admin` 文件夹，并根据你计划使用的连接方式，将其保存为\
    \ `blog_list_mysqli.php` 或 `blog_list_pdo.php`。不同版本会链接到相应的插入、更新和删除文件。\n\n1. 你需要连接到数据库并创建\
    \ SQL 查询。在 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码：\n\n```\nrequire_once '../includes/connection.php';\n\
    require_once '../includes/utility_funcs.php';\n// 创建数据库连接\n$conn = dbConnect('read');\n\
    $sql = 'SELECT * FROM blog ORDER BY created DESC';\n```\n\n如果你使用 PDO，请将 `'pdo'`\
    \ 作为第二个参数添加到 `dbConnect()` 中。\n\n2. 在结束 PHP 标签之前添加以下代码来提交查询。\n\n对于 MySQLi，使用以下代码：\n\
    \n```\n$result = $conn->query($sql);\nif (!$result) {\n    $error = $conn->error;\n\
    }\n```\n\n对于 PDO，使用以下代码：\n\n```\n$result = $conn->query($sql);\n$error = $conn->errorInfo()[2];\n\
    ```\n\n3. 在表格之前添加一个条件语句来显示任何错误信息，并将表格包裹在 `else` 代码块中。表格前的代码如下所示：\n\n```\n<?php\n\
    if (isset($error)) {\n    echo \"<p>$error</p>\";\n} else { ?>\n```\n\n闭合的大括号应放在\
    \ `</table>` 标签之后的独立 PHP 代码块中。\n\n4. 现在，你需要将第二行表格包裹在一个循环中，并从结果集中检索每条记录。以下代码位于第一行的结束\
    \ `</tr>` 标签和第二行的开始 `<tr>` 标签之间。\n\n对于 MySQLi，使用以下代码：\n\n```\n<?php while ($row\
    \ = $result->fetch_assoc()) { ?>\n```\n\n对于 PDO，使用以下代码：\n\n```\n<?php while ($row\
    \ = $result->fetch()) { ?>\n```\n\n这与前一章中的内容相同，因此无需解释。\n\n5. 在第二行的前两个单元格中显示当前记录的\
    \ `created` 和 `title` 字段，如下所示：\n\n```\n<td><?= $row['created'] ?></td>\n<td><?=\
    \ safe($row['title']) ?></td>\n```\n\n`created` 列存储的是 `TIMESTAMP` 数据类型，这是一种固定格式，因此不需要过滤。但是\
    \ `title` 列是文本相关的，因此需要传递给第 13 章中定义的 `safe()` 函数。\n\n6. 在接下来的两个单元格中，将当前记录的 `article_id`\
    \ 字段的查询字符串和值添加到两个 URL 中，如下所示（尽管链接不同，但高亮显示的代码对于 PDO 版本是相同的）：\n\n```\n<td><a href=\"\
    blog_update_mysqli.php?article_id=<?= $row['article_id'] ?>\">编辑</a></td>\n<td><a\
    \ href=\"blog_delete_mysqli.php?article_id=<?= $row['article_id'] ?>\">删除</a></td>\n\
    ```\n\n这里所做的是在 URL 后添加 `?article_id=`，然后使用 PHP 显示 `$row['article_id']` 的值。`article_id`\
    \ 列只存储整数，因此该值不需要过滤。重要的是不要留下任何可能破坏 URL 或查询字符串的空格。PHP 处理完成后，在浏览器中查看页面源代码时，开始的 `<a>`\
    \ 标签应如下所示（尽管数字会根据记录而变化）：\n\n```\n<a href=\"blog_update_mysqli.php?article_id=2\"\
    >编辑</a>\n```\n\n7. 最后，用大括号闭合包围第二行表格行的循环，如下所示：\n\n```\n<?php } ?>\n```\n\n8. 保存\
    \ `blog_list_mysqli.php` 或 `blog_list_pdo.php`，并将页面加载到浏览器中。假设你之前已将 `blog.sql`\
    \ 的内容加载到 `phpsols` 数据库中，你应该会看到如图 15-2 所示的四个项目列表。现在你可以测试 `blog_insert_mysqli.php`\
    \ 或 `blog_insert_pdo.php`。插入项目后，你应被重定向回相应版本的 `blog_list.php`，并且新项目的创建日期和时间以及标题应显示在列表顶部。如果遇到任何问题，请将你的代码与\
    \ `ch15` 文件夹中的 `blog_list_mysqli_02.php` 或 `blog_list_pdo_02.php` 进行核对。\n"
- fmt: "**Tip** This code assumes that there will always be some records in the table.\
    \ As an exercise, use the technique in PHP Solution 13-2 (MySQLi) or 13-4 (PDO)\
    \ to count the number of results, and use a conditional statement to display a\
    \ message if no records are found. The solution is in `blog_list_norec_mysqli.php`\
    \ and `blog_list_norec_pdo.php`.\n\n## Updating Records\n\nAn update page needs\
    \ to perform two separate processes, as follows:\n\n1. Retrieve the selected record,\
    \ and display it ready for editing\n2. Update the edited record in the database\n\
    \nThe first stage uses the `$_GET` superglobal array to retrieve the primary key\
    \ from the URL, and then uses it to select and display the record in the update\
    \ form, as shown in Figure 15-3.\n\n![../images/332054_4_En_15_Chapter/332054_4_En_15_Fig3_HTML.jpg](images/332054_4_En_15_Chapter/332054_4_En_15_Fig3_HTML.jpg)\n\
    \n**Figure 15-3.** The primary key keeps track of a record during the update process\n\
    \nThe primary key is stored in a hidden field in the update form. After you have\
    \ edited the record in the update page, you submit the form using the `post` method\
    \ to pass all the details, including the primary key, to an `UPDATE` command.\n\
    \nThe basic syntax of the SQL `UPDATE` command looks like this:\n\n```\nUPDATE\
    \ table_name SET column_name = value, column_name = value\nWHERE condition\n```\n\
    \nThe condition when updating a specific record is the primary key. So, when updating\
    \ `article_id 3` in the `blog` table, the basic `UPDATE` query looks like this:\n\
    \n```\nUPDATE blog SET title = value, article = value\nWHERE article_id = 3\n\
    ```\n\nAlthough the basic principle is the same for both MySQLi and PDO, the code\
    \ differs sufficiently to warrant separate instructions.\n\n### PHP Solution 15-4:\
    \ Updating a Record with MySQLi\n\nThis PHP solution shows how to load an existing\
    \ record into the update form and then send the edited details to the database\
    \ for updating using MySQLi. To load the record, you need to have created the\
    \ management page that lists all records, as described in PHP Solution 15-3.\n\
    \n1. Copy `blog_update_mysqli_01.php` from the `ch15` folder and save it in the\
    \ `admin` folder as `blog_update_mysqli.php`.\n\n2. The first stage involves retrieving\
    \ the details of the record that you want to update. Put the following code in\
    \ a PHP block above the `DOCTYPE` declaration:\n\n```\n    require_once '../includes/connection.php';\n\
    \    require_once '../includes/utility_funcs.php';\n    // initialize flags\n\
    \    $OK = false;\n    $done = false;\n    // create database connection\n   \
    \ $conn = dbConnect('write');\n    // initialize statement\n    $stmt = $conn->stmt_init();\n\
    \    // get details of selected record\n    if (isset($_GET['article_id']) &&\
    \ !$_POST) {\n    // prepare SQL query\n    $sql = 'SELECT article_id, title,\
    \ article\n    FROM blog WHERE article_id = ?';\n    if ($stmt->prepare($sql))\
    \ {\n    // bind the query parameter\n    $stmt->bind_param('i', $_GET['article_id']);\n\
    \    // execute the query, and fetch the result\n    $OK = $stmt->execute();\n\
    \    // bind the results to variables\n    $stmt->bind_result($article_id, $title,\
    \ $article);\n    $stmt->fetch();\n    }\n    }\n    // redirect if $_GET['article_id']\
    \ not defined\n    if (!isset($_GET['article_id'])) {\n    $url = 'http://localhost/phpsols-4e/admin/blog_list_mysqli.php';\n\
    \    header(\"Location: $url\");\n    exit;\n    }\n    // get error message if\
    \ query fails\n    if (isset($stmt) && !$OK && !$done) {\n    $error = $stmt->error;\n\
    \    }\n```\n\nAlthough this is very similar to the code used for the insert page,\
    \ the first few lines are *outside* the conditional statements. Both stages of\
    \ the update process require the database connection and a prepared statement,\
    \ so this avoids the need to duplicate the same code later. Two flags are initialized:\
    \ `$OK` to check the success of retrieving the record and `$done` to check whether\
    \ the update succeeds.\n\nThe first conditional statement makes sure that `$_GET['article_id']`\
    \ exists and that the `$_POST` array is empty. So the code inside the braces is\
    \ executed only when the query string is set, but the form hasn’t been submitted.\n\
    \nYou prepare the `SELECT` query in the same way as for an `INSERT` command, using\
    \ a question mark as a placeholder for the variable. However, note that instead\
    \ of using an asterisk to retrieve all columns, the query specifies three columns\
    \ by name like this:\n\n```\n$sql = 'SELECT article_id, title, article\nFROM blog\
    \ WHERE article_id = ?';\n```\n\nThis is because a MySQLi prepared statement lets\
    \ you bind the result of a `SELECT` query to variables, and to be able to do this,\
    \ you must specify the column names and the order you want them to be in.\n\n\
    First, you need to initialize the prepared statement and bind `$_GET['article_id']`\
    \ to the query with `$stmt->bind_param()`. Because the value of `article_id` must\
    \ be an integer, you pass `'i'` as the first argument.\n\nThe code executes the\
    \ query and then binds the result to variables in the same order as the columns\
    \ specified in the `SELECT` query before fetching the result.\n\nThe next conditional\
    \ statement redirects the page to `blog_list_mysqli.php` if `$_GET['article_id']`\
    \ hasn’t been defined. This prevents anyone from trying to load the update page\
    \ directly in a browser. The redirect location has been assigned to a variable\
    \ because a query string will be added to it later if the update is successful.\n\
    \nThe final conditional statement stores an error message if the prepared statement\
    \ has been created but both `$OK` and `$done` remain `false`. You haven’t added\
    \ the update script yet, but if the record is retrieved or updated successfully,\
    \ one of them will be switched to `true`. So if both remain `false`, you know\
    \ there was something wrong with one of the SQL queries.\n\n3. Now that you have\
    \ retrieved the contents of the record, you need to display them in the update\
    \ form. If the prepared statement succeeded, `$article_id` should contain the\
    \ primary key of the record to be updated, because it’s one of the variables you\
    \ bound to the result set with the `bind_result()` method.\n\nHowever, if there’s\
    \ an error, you need to display the message onscreen. But if someone alters the\
    \ query string to an invalid number, `$article_id` will be set to `0`, so there\
    \ is no point in displaying the update form. Add the following conditional statements\
    \ immediately before the opening `<form>` tag:\n\n```\n<?php if (isset($error))\
    \ {\n    echo \"<p>Error: $error</p>\";\n} ?>\n<?php if($article_id == 0) { ?>\n\
    \    <p>Invalid request: record does not exist.</p>\n    <p><a href=\"blog_list_mysqli.php\"\
    >List all entries</a></p>\n<?php } else { ?>\n```\n\nThe first conditional statement\
    \ displays any error message reported by the MySQLi prepared statement. The second\
    \ wraps the update form in an `else` block, so the form will be hidden if `$article_id`\
    \ is `0`.\n\n4. Add the closing curly brace of the `else` block immediately after\
    \ the closing `</form>` tag, like this:\n\n```\n<?php } ?>\n```\n\n5. If `$article_id`\
    \ is not `0`, you know that `$title` and `$article` also contain valid values\
    \ and can be displayed in the update form without further testing. However, you\
    \ need to pass text values to `safe()` to avoid problems with quotes and executable\
    \ code. Display `$title` in the `value` attribute of the `title` input field like\
    \ this:\n\n```\n<input type=\"text\" name=\"title\" value=\"<?= safe($title) ?>\"\
    >\n```\n\n6. Do the same for the `article` text area. Because text areas don’t\
    \ have a value attribute, the code goes between the opening and closing `<textarea>`\
    \ tags like this:\n\n```\n<textarea name=\"article\" cols=\"60\" rows=\"10\"><?=\
    \ safe($article) ?></textarea>\n```\n\nMake sure there is no space between the\
    \ opening and closing PHP and `<textarea>` tags. Otherwise, you’ll get unwanted\
    \ spaces in your updated record."
