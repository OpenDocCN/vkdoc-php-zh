    \ S3\nFile Permissions\nIn addition to signed URLs, it is also possible to allow\
    \ access to S3 files\nthrough granting public access to the files. This works,\
    \ but it isn’t\nthe best approach to sharing files. The problem is that if you\
    \ just\nprovide a publicly shared URL for people to access, then this URL could\n\
    be shared around, and people could just use your S3 resources for their\nown purposes,\
    \ bypassing your web application altogether. This means that\nyou might wind up\
    \ paying to be someone else’s file server.\nEven if you don’t implement careful\
    \ controls over file access in your\napplication immediately, forcing everyone\
    \ to use signed URLs controlled\nby your application to access S3 objects (as\
    \ we have shown here) means\nthat when you are ready to implement access controls,\
    \ everything is\nready to do so. At minimum, it prevents the simple sharing of\
    \ S3 URLs\npublicly on the Internet which use your AWS account resources for large\n\
    file downloads.\n\nIf you really prefer doing this over signed URLs, you can manage\
    \ this by\nfirst enabling public access on the bucket itself and then setting\n\
    individual files to be readable by everyone. It also means that you will\nneed\
    \ to set permissions on newly uploaded files. You can do this on the\n`aws s3\
    \ cp`\ncommand  by adding\nthe following flag to the end of the command (the URL\
    \ should be on the\nsame line as the rest of the line, with no space after either\
    \ equal\nsign):\n\n```\n--grants read=uri=http://acs.amazonaws.com/groups/global/AllUsers\n\
    ```\n\nHowever, this only works if the bucket itself has been configured to\n\
    allow public access.\n\n10. Hosting with AWS"
  trans: '

    1.  创建一些通用函数来获取 AWS 配置信息。

    2.  允许表单包含图像字段。

    3.  在创建留言条目时检查图像上传。

    4.  将图像传输到 S3。

    5.  在查看留言条目时为图像创建签名的 S3 URL。


    第一步是在`common.php`中创建一些用于处理 AWS 凭据和配置的辅助函数。图 9-6 展示了这些函数。记得将`BUCKET`、`ACCESSKEY`和`SECRETKEY`替换为你自己的值。


    ![../images/487291_1_En_9_Chapter/487291_1_En_9_Fig6_HTML.png](img/487291_1_En_9_Fig6_HTML.png)


    **图 9-6** 为 AWS 配置对`common.php`的补充


    函数`getAWSCredentials()`将返回一个凭据字符串，该字符串可在命令字符串前设置环境变量。


    下一步是在`new.php`的表单中添加图像字段。这分为两个部分。首先，我们必须修改`<form>`标签以允许文件上传。为此，请将属性`enctype="multipart/form-data"`添加到`<form>`标签中。没有它，文件输入标签将无法真正上传文件。


    接下来，我们需要添加一个文件上传字段。在提交按钮之前，添加以下代码行：


    ```

    Image (JPEG)

    ```


    现在你的表单已配置为支持文件上传。接下来，我们将配置`create.php`以接受文件上传。


    ![../images/487291_1_En_9_Chapter/487291_1_En_9_Fig7_HTML.png](img/487291_1_En_9_Fig7_HTML.png)


    **图 9-7** 对`create.php`的修改以检测文件上传


    我们需要修改两个部分。首先，将`$has_img = false;`这一行替换为图 9-7 中的代码。这段代码检测文件是否已上传，如果已上传，则确保数据库更新以反映这一点。其次，在`$stmt->execute();`这一行之后立即添加图
    9-8 中的代码。这是实际将文件传输到 S3 的代码。


    ![../images/487291_1_En_9_Chapter/487291_1_En_9_Fig8_HTML.png](img/487291_1_En_9_Fig8_HTML.png)


    **图 9-8** 对`create.php`的修改以将文件传输到 S3


    现在，我们只需要提供一种方法来查看图像，当你点击留言条目时。为此，我们需要修改`single.php`。只需在`getFooter()`这一行之前添加图 9-9
    中的代码。


    ![../images/487291_1_En_9_Chapter/487291_1_En_9_Fig9_HTML.png](img/487291_1_En_9_Fig9_HTML.png)


    **图 9-9** 对`single.php`的修改以显示图像


    这段代码将为上传请求一个签名的 URL，然后将其放入图像标签中以便查看。


    请注意，对于实际应用，我们需要验证上传的文件确实是 JPEG 文件。否则，任何人都可以上传任意内容，黑客可以轻易地将系统滥用为免费文件共享站点，或用于其他恶意目的。此外，你可能还需要一个管理功能来验证上传的图像是否合适。否则，有人可能会轻易地将你的留言板变成色情共享站点。这些超出了我们简单示例应用的范围，但它们是值得记住的好点。


    还要记住，你不仅要为存储空间付费，还要为进出 S3 的所有流量使用带宽付费。疏于警惕可能会导致高昂的成本。


    现在，你需要在`template_node`上测试你的新代码，当它正常运行时，按照第 6.3 节所述，通过重新映像服务器将其部署到你的云集群中。


    现在试试你的应用程序——它通过 Amazon S3 拥有了无限的文件存储空间！


    请注意，还有一个用于 PHP 的 AWS 库，其中包含 S3 功能。在这里，我们使用了命令行，因为我们在前一节已经学习了该工具。AWS PHP 库的信息可在[`https://docs.aws.amazon.com/sdk-for-php/`](https://docs.aws.amazon.com/sdk-for-php/)中获取。


    ![../images/487291_1_En_9_Chapter/487291_1_En_9_Figb_HTML.jpg](img/487291_1_En_9_Figb_HTML.jpg)
    **关于 S3 签名过期的说明**


    在处理签名 URL 时，需要注意它们如何与缓存交互。在本例中，`single.php`没有被缓存，因此无需担心。然而，如果它被缓存了，重要的是要确保 URL
    的过期时间远大于渲染后的代码可能在缓存中停留的时间。


    例如，如果 URL 仅有效 30 秒，但缓存能持续一小时，那么，在最初的 30 秒结束后，在接下来的一小时里，用户将获得他们无法使用的 URL。在问题开始出现时（或者，最好是之前）请牢记这一点。


    ![../images/487291_1_En_9_Chapter/487291_1_En_9_Figc_HTML.jpg](img/487291_1_En_9_Figc_HTML.jpg)
    **S3 文件权限**


    除了签名 URL，还可以通过授予文件公共访问权限来允许访问 S3 文件。这可行，但这并不是共享文件的最佳方法。问题是，如果你只提供一个公开共享的 URL 供人们访问，那么这个
    URL 可能会被四处传播，人们可以直接使用你的 S3 资源用于自己的目的，完全绕过你的 Web 应用程序。这意味着你最终可能会为别人的文件服务器买单。


    即使你没有立即在应用程序中实施对文件访问的严格控制，强制所有人使用由你的应用程序控制的签名 URL 来访问 S3 对象（正如我们这里所示），意味着当你准备好实施访问控制时，一切都已就绪。至少，这可以防止在互联网上公开共享
    S3 URL，而使用你的 AWS 账户资源进行大量文件下载。


    如果你真的更喜欢使用此方法而非签名 URL，你可以通过首先在存储桶本身上启用公共访问，然后设置单个文件为所有人可读来管理。这也意味着你需要为新上传的文件设置权限。你可以在`aws
    s3 cp`命令中通过将以下标志添加到命令末尾来完成（URL 应与命令行的其余部分在同一行，等号后无空格）：


    ```

    --grants read=uri=http://acs.amazonaws.com/groups/global/AllUsers

    ```


    然而，这仅在存储桶本身已配置为允许公共访问时才有效。


    10. 使用 AWS 托管

