  和 `145` 实际上都是参数，并不代表服务器文档结构中的某个位置。信不信由你，Apache 有能力解决这两个难题，它采用了一种鲜为人知的特性，叫做 *回头查找*（lookback），来识别预期的目标。让我们看一个演示该特性如何运作的例子。


  假设 Apache 接收到一个对上述用户友好网址的请求，但这个网址在物理上并不存在。当启用回头查找功能后，Apache 在发现该位置没有索引文件时，会开始沿着网址反向“回头查找”，搜索一个合适的目标。于是，Apache
  接下来会查找名为 `145` 的文件。由于没有找到该文件，它会接着检查下面的网址，并重复同样的过程：


  `http://www.example.com/articles/php/`


  假设在这个位置也找不到合适的匹配项，Apache 接着会检查：`http://www.example.com/articles/`


