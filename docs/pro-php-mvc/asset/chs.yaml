  \n### 模板\n\n测试我们创建的模板解析器，实际上就是测试各个独立的模板标签。这是因为模板解析器虽然是一段复杂的代码，但它执行的任务相对简单。\n\n我们需要测试每个常见的模板标签，确保它们在提供数据时都能返回正确的输出。\n\
  \n### 覆盖率\n\n我们应该创建覆盖以下需求的测试：\n\n-   可以创建`Template`类。\n-   `Template`类可以解析 echo\
