    surely follow.


    Lack of documentation makes the code hard to read, and lack of testing allows
    obscure bugs to go undiscovered until deployment. The changing nature of a client’s
    business often means that code evolves away from its original purpose until it
    is performing tasks for which it is fundamentally unsuited. Because such code
    has often evolved as a seething, intermingled lump, it is hard, if not impossible,
    to switch out and rewrite parts of it to suit the new purpose.


    Now, none of this is bad news if you are a freelance PHP consultant. Assessing
    and fixing a system like this can fund expensive espresso drinks and DVD box sets
    for six months or more. More seriously, though, problems of this sort can mean
    the difference between a business’s success or failure.'
  trans: "\n# 第一部分  \n对象\n\n# 1. PHP：设计与管理\n\n电子补充材料 本章在线版本（doi:[10.1007/978-1-4842-1996-6_1](http://dx.doi.org/10.1007/978-1-4842-1996-6_1)）包含补充材料，仅供授权用户使用。\n\
    \n2004 年 7 月，PHP 5.0 发布。该版本引入了一系列重大改进，其中首要的便是对面向对象编程的显著增强支持。这激发了 PHP 社区对对象与设计的浓厚兴趣。事实上，这一过程早在版本\
    \ 4 首次让面向对象编程在 PHP 中成为现实时便已开始。\n\n本章将探讨使用对象编程所能解决的一些需求，并简要总结模式及相关实践演变过程中的一些方面。\n\
    \n同时，我还会概述本书涵盖的主题。\n\n我将讨论以下内容：\n\n- 灾难的演变：一个项目如何走向失败。\n- 设计与 PHP：面向对象设计技术如何在\
    \ PHP 社区扎根。\n- 本书的核心：对象、模式、实践。\n\n## 问题所在\n\n问题在于 PHP 实在太过易用。它会诱使你尝试自己的想法，并用良好的结果让你沾沾自喜。你将大量代码直接写入网页，因为\
    \ PHP 正是为此而设计的。你把实用函数（如数据库访问代码）添加到可从各页面引用的文件中，不知不觉间，一个可运行的 Web 应用便诞生了。\n\n然而，你正一步步走向毁灭。当然，你并未察觉，因为你的网站看起来棒极了。它性能优越，客户满意，用户也乐于消费。\n\
    \n当你回头修改代码以开启新阶段时，麻烦便接踵而至。如今你拥有更大的团队、更多的用户和更充裕的预算，但毫无预兆地，一切开始出问题——仿佛你的项目中了毒。\n\
    \n新程序员艰难地理解着那些对你而言已是本能的代码，尽管这些代码可能因曲折复杂而略显古怪。她达到团队完全战斗力所需的时间比你预想的更长。\n\n一次预计一日的简单修改，最终却花了三天，因为你发现必须更新\
    \ 20 多个网页。\n\n某位开发者将他自己的文件版本覆盖了你早些时候对该代码所做的重要修改。这个失误直到三天后才被发现，而此时你已修改了本地副本。又花了一天时间收拾残局，同时导致另一位处理该文件的开发者被迫停滞。\n\
    \n由于应用广受欢迎，你需要将代码迁移至新服务器。项目必须手动安装，却发现文件路径、数据库名称和密码被硬编码在许多源文件中。迁移期间你不得不暂停工作，因为不想覆盖迁移所需的配置更改。预计两小时的工作最终变成了八小时，因为有人用了\
    \ Apache 模块 `ModRewrite` 做了些“巧妙”处理，而应用现在必须依赖该模块才能正常运行。\n\n第二阶段终于上线。一切顺利了一天半。就在你准备离开办公室时，第一个错误报告出现了。几分钟后客户打来电话投诉。她的报告与第一个类似，但进一步检查发现，这是另一个导致相似行为的错误。你回忆起阶段初那个简单的修改，却导致项目后续部分必须进行大量改动。\n\
    \n你意识到并非所有必要的修改都已到位——要么是起初被遗漏了，要么是相关文件在合并冲突中被覆盖了。你匆忙修改以修复错误。匆忙之中你来不及测试这些修改，但不过是复制粘贴的简单操作，能出什么问题呢？\n\
    \n次日清晨你到办公室时，发现购物车模块整夜宕机。你昨晚最后时刻的修改遗漏了一个前导引号，导致代码无法运行。当然，当你熟睡时，其他时区的潜在客户正精神抖擞地准备在你的商店消费。你修复了问题，安抚了客户，然后召集团队开始新一天的“救火”。\n\
    \n这个关于编程者的日常故事或许有些夸张，但我曾亲眼目睹这些事反复发生。许多 PHP 项目从小规模起步，最终演变成难以控制的庞然大物。\n\n由于表现层也包含应用逻辑，重复代码很早就开始蔓延——数据库查询、身份验证检查、表单处理等等，不断从一页复制到另一页。每当某段代码需要修改时，所有存在该代码的地方都必须同步更新，否则必然导致错误。\n\
    \n缺乏文档使代码难以阅读，而缺乏测试则让隐蔽的错误直到部署后才被发现。客户业务性质的变化常常导致代码偏离最初的设计目标，最终执行起根本不适合的任务。由于这类代码通常已演变成一团交织混乱的整体，即使并非不可能，也很难抽离并重写部分代码来适应新目标。\n\
    \n现在，如果你是一名自由 PHP 顾问，这些都不是坏消息。评估和修复这样的系统足以支撑六个月的昂贵意式浓缩咖啡和 DVD 套装。但更严重的是，这类问题往往决定着一个企业的成败。\n"
- fmt: '# PHP and Other Languages


    PHP’s phenomenal popularity meant that its boundaries were tested early and hard.
    As you will see in the next chapter, PHP started life as a set of macros for managing
    personal home pages. With the advent of PHP 3 and, to a greater extent, PHP 4,
    the language rapidly became the successful power behind large enterprise websites.
    In many ways, however, the legacy of PHP’s beginnings carried through into script
    design and project management. In some quarters, PHP retained an unfair reputation
    as a hobbyist language, best suited for presentation tasks.


    About this time (around the turn of the millennium), new ideas were gaining currency
    in other coding communities. An interest in object-oriented design galvanized
    the Java community. Since Java is an object-oriented language, you may think that
    this is a redundancy. Java provides a grain that is easier to work with than against,
    of course, but using classes and objects does not in itself determine a particular
    design approach.


    The concept of the design pattern as a way of describing a problem, together with
    the essence of its solution, was first discussed in the 1970s. Perhaps aptly,
    the idea originated in the field of architecture, not computer science. By the
    early 1990s, object-oriented programmers were using the same technique to name
    and describe problems of software design. The seminal book on design patterns,
    *Design Patterns: Elements of Reusable Object-Oriented Software* (Addison-Wesley
    Professional, 1995) by Erich Gamma, Richard Helm, Ralph Johnson, and John Vlissides
    (henceforth referred to in this book by their affectionate nickname, the Gang
    of Four), is still indispensable today. The patterns it contains are a required
    first step for anyone starting out in this field, which is why most of the patterns
    in this book are drawn from it.


    The Java language itself deployed many core patterns in its API but it wasn’t
    until the late 1990s that design patterns seeped into the consciousness of the
    coding community at large. Patterns quickly infected the computer sections of
    Main Street bookstores, and the first flame wars began on mailing lists and in
    forums.


    Whether you think that patterns are a powerful way of communicating craft knowledge
    or largely hot air (and, given the title of this book, you can probably guess
    where I stand on that issue), it is hard to deny that the emphasis on software
    design they have encouraged is beneficial in itself.


    Related topics also grew in prominence. Among them was eXtreme Programming (XP),
    championed by Kent Beck. XP is an approach to projects that encourages flexible,
    design-oriented, highly focused planning and execution.


    Prominent among XP’s principles is an insistence that testing is crucial to a
    project’s success. Tests should be automated, run often, and preferably designed
    before their target code is written.


    XP also dictates that projects should be broken down into small (very small) iterations.
    Both code and requirements should be scrutinized at all times. Architecture and
    design should be a shared and constant issue, leading to the frequent revision
    of code.


    If XP was the militant wing of the design movement, then the moderate tendency
    is well represented by one of the best books about programming that I have ever
    read: *The Pragmatic Programmer: From Journeyman to Master* by Andrew Hunt and
    David Thomas (Addison-Wesley Professional, 1999).


    XP was deemed a tad cultish by some, but it grew out of two decades of object-oriented
    practice at the highest level, and its principles were widely cannibalized. In
    particular, code revision, known as refactoring, was taken up as a powerful adjunct
    to patterns. Refactoring has evolved since the 1980s, but it was codified in Martin
    Fowler’s catalog of refactorings, *Refactoring: Improving the Design of Existing
    Code* (Addison-Wesley Professional), which was published in 1999 and defined the
    field.


    Testing, too, became a hot issue with the rise to prominence of XP and patterns.
    The importance of automated tests was further underlined by the release of the
    powerful `JUnit` test platform, which became a key weapon in the Java programmer’s
    armory. A landmark article on the subject, “Test Infected: Programmers Love Writing
    Tests” by Kent Beck and Erich Gamma ( [`http://junit.sourceforge.net/doc/testinfected/testing.htm`](http://junit.sourceforge.net/doc/testinfected/testing.htm)
    ), gives an excellent introduction to the topic and remains hugely influential.


    PHP 4 was released at about this time, bringing with it improvements in efficiency
    and, crucially, enhanced support for objects. These enhancements made fully object-oriented
    projects a possibility. Programmers embraced this feature, somewhat to the surprise
    of Zend founders Zeev Suraski and Andi Gutmans, who had joined Rasmus Lerdorf
    to manage PHP development. As you shall see in the next chapter, PHP’s object
    support was by no means perfect. But with discipline and careful use of syntax,
    one could really begin to think in objects and PHP at the same time.


    Nevertheless, design disasters such as the one depicted at the start of this chapter
    remained common. Design culture was some way off, and almost nonexistent in books
    about PHP. Online, however, the interest was clear. Leon Atkinson wrote a piece
    about PHP and patterns for Zend in 2001, and Harry Fuecks launched his journal
    at [`www.phppatterns.com`](http://www.phppatterns.com) (now defunct) in 2002.
    Pattern-based framework projects such as `BinaryCloud` began to emerge, as well
    as tools for automated testing and documentation.


    The release of the first PHP 5 beta in 2003 ensured the future of PHP as a language
    for object-oriented programming. The Zend 2 Engine provided greatly improved object
    support. Equally important, it sent a signal that objects and object-oriented
    design were now central to the PHP project.


    Over the years, PHP 5 has continued to evolve and improve, incorporating important
    new features such as namespaces and closures. During this time, it has secured
    its reputation as the best choice for server-side web programming.


    PHP 7, released in December 2015, represents a continuation of this trend. In
    particular it provides support for scalar and return type declarations—two features
    that many developers (together with previous editions of this book) have been
    clamoring for over the years. If you don’t know what that means or why it''s important,
    read on!


    ## About This Book


    This book does not attempt to break new ground in the field of object-oriented
    design; in that respect, it perches precariously on the shoulders of giants. Instead,
    I examine, in the context of PHP, some well-established design principles and
    some key patterns (particularly those inscribed in *Design Patterns*, the classic
    Gang of Four book). Finally, I move beyond the strict limits of code to look at
    tools and techniques that can help to ensure the success of a project. Aside from
    this introduction and a brief conclusion, the book is divided into three main
    parts: objects, patterns, and practice.'
