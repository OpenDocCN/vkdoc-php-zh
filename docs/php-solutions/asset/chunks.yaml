  trans: "\n### PHP 解决方案 9-10：使用会话实现多页表单\n\n在本 PHP 解决方案中，您将构建一个用于多页表单的脚本，该脚本从 `$_POST`\
    \ 数组收集数据并将其分配给会话变量。如果用户尝试先访问表单的其他部分，该脚本会自动将用户重定向到表单的第一页。\n\n将 `ch09` 文件夹中的 `multiple_01.php`、`multiple_02.php`、`multiple_03.php`\
    \ 和 `multiple_04.php` 复制到 `sessions` 文件夹。前三页包含询问用户姓名、年龄和地址的简单表单。每个 `<form>` 标签的\
    \ `action` 属性为空，因此表单是自处理的，但它们尚不包含任何处理脚本。最后一页将最终显示前三页的数据。\n\n在 `multiple_01.php`\
    \ 的 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码：\n\n```\nif (isset($_POST['next'])) {\n   \
    \ session_start();\n    // 设置一个变量来控制对其他页面的访问\n    $_SESSION['formStarted'] = true;\n\
    \    // 设置必填字段\n    $required = 'first_name';\n    $firstPage = 'multiple_01.php';\n\
    \    $nextPage = 'multiple_02.php';\n    $submit = 'next';\n    require_once '../includes/multiform.php';\n\
    }\n```\n\n在 `includes` 文件夹中创建一个名为 `multiform.php` 的文件。删除所有 HTML 标记并插入以下代码：\n\n\
    * 提交按钮的 `name` 属性是 `next`，因此此代码块仅在表单已提交时运行。它启动会话并创建一个将用于控制对其他表单页面访问的会话变量。\n* 接下来是四个变量，将由处理多页表单的脚本使用：\n\
    \    * `$required`：当前页面中必填字段的 `name` 属性数组。如果只有一个必填字段，则可以使用字符串代替数组。如果没有必填字段，则可以省略。\n\
    \    * `$firstPage`：表单第一页的文件名\n    * `$nextPage`：表单下一页的文件名\n    * `$submit`：当前页面中提交按钮的名称\n\
    * 最后，代码包含了处理多页表单的脚本。\n\n```\n<?php\nif (!isset($_SESSION)) {\n    session_start();\n\
    }\n$filename = basename($_SERVER['SCRIPT_FILENAME']);\n$current = 'http://' .\
    \ $_SERVER['HTTP_HOST'] . $_SERVER['PHP_SELF'];\n```\n\n现在您已经获取了当前文件的名称及其 URL，可以使用\
    \ `str_replace()` 创建第一页和下一页的 URL，如下所示：\n\n* 多页表单的每一页都需要调用 `session_start()`，但在同一页上调用两次会产生错误，因此条件语句首先检查\
    \ `$_SESSION` 超全局变量是否可访问。如果不可访问，则启动该页面的会话。\n* 在条件语句之后，`$_SERVER['SCRIPT_FILENAME']`\
    \ 被传递给 `basename()` 函数以提取当前页面的文件名。这与您在 PHP 解决方案 4-3 中使用的技术相同。\n* `$_SERVER['SCRIPT_FILENAME']`\
    \ 包含父文件的路径，因此当此脚本包含在 `multiple_01.php` 中时，`$filename` 的值将是 `multiple_01.php`，而不是\
    \ `multiform.php`。\n* 下一行从字符串 `http://` 以及 `$_SERVER['HTTP_HOST']`（包含当前域名）和 `$_SERVER['PHP_SELF']`（包含当前文件除去域名后的路径）的值构建当前页面的\
    \ URL。如果您在本地测试，当您加载多页表单的第一页时，`$current` 将是 `http://localhost/phpsols/sessions/multiple_01.php`。\n\
    \n```\n$redirectFirst = str_replace($filename, $firstPage, $current);\n$redirectNext\
    \ = str_replace($filename, $nextPage, $current);\n```\n\n为防止用户不从头开始就访问多页表单，添加一个检查\
    \ `$filename` 值的条件语句。如果它不同于第一页，并且 `$_SESSION['formStarted']` 尚未创建，则 `header()`\
    \ 函数将重定向到第一页，如下所示：\n\n* `str_replace()` 的第一个参数是您要替换的字符串，第二个参数是替换字符串，第三个参数是目标字符串。在步骤\
    \ 2 中，您将 `$firstPage` 设置为 `multiple_01.php`，将 `$nextPage` 设置为 `multiple_02.php`。因此，`$redirectFirst`\
    \ 变为 `http://localhost/phpsols/sessions/multiple_01.php`，`$redirectNext` 变为 `http://localhost/phpsols/sessions/multiple_02.php`。\n\
    \n```\nif ($filename != $firstPage && !isset($_SESSION['formStarted'])) {\n  \
    \  header(\"Location: $redirectFirst\");\n    exit;\n}\n```\n\n脚本的其余部分遍历 `$_POST`\
    \ 数组，检查哪些必填字段为空，并将它们添加到 `$missing` 数组。如果没有缺失项，`header()` 函数会将用户重定向到多页表单的下一页。`multiform.php`\
    \ 的完整脚本如下所示：\n\n```\n<?php\nif (!isset($_SESSION)) {\n    session_start();\n}\n\
    $filename = basename($_SERVER['SCRIPT_FILENAME']);\n$current = 'http://' . $_SERVER['HTTP_HOST']\
    \ . $_SERVER['PHP_SELF'];\n$redirectFirst = str_replace($filename, $firstPage,\
    \ $current);\n$redirectNext = str_replace($filename, $nextPage, $current);\nif\
    \ ($filename != $firstPage && !isset($_SESSION['formStarted'])) {\n    header(\"\
    Location: $redirectFirst\");\n    exit;\n}\nif (isset($_POST[$submit])) {\n  \
    \  // 创建空数组用于存储任何缺失的字段\n    $missing = [];\n    // 如果未设置 $required 则创建数组\n   \
    \ if (!isset($required)) {\n        $required = [];\n    } else {\n        //\
    \ 使用类型转换运算符将单个字符串转换为数组\n        $required = (array) $required;\n    }\n    //\
    \ 处理 $_POST 变量并将它们保存到 $_SESSION 数组中\n    foreach ($_POST as $key => $value) {\n\
    \        // 跳过提交按钮\n        if ($key == $submit) continue;\n        // 分配给临时变量，如果不是数组则去除空白\n\
    \        $temp = is_array($value) ? $value : trim($value);\n        // 如果为空且是必填字段，则添加到\
    \ $missing 数组中\n        if (empty($temp) && in_array($key, $required)) {\n   \
    \         $missing[] = $key;\n        } else {\n            // 否则，分配给与 $key 同名的变量\n\
    \            $_SESSION[$key] = $temp;\n        }\n    }\n    // 如果没有必填字段缺失，则重定向到下一页\n\
    \    if (!$missing) {\n        header(\"Location: $redirectNext\");\n        exit;\n\
    \    }\n}\n```\n\n在 `multiple_02.php` 的 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码：\n\n> **注意：**\
    \ 此代码与第 5 章中用于处理反馈表单的代码非常相似，因此内联注释应足以解释其工作原理。包裹新代码的条件语句使用 `$_POST[$submit]` 来检查表单是否已提交。我使用变量而不是硬编码提交按钮的名称，以使代码更加灵活。尽管此脚本仅在表单提交后才包含在第一页中，但它直接包含在其他页面中，因此有必要在此处添加条件语句。\
    \  \n> 提交按钮的名称和值始终包含在 `$_POST` 数组中，因此 `foreach` 循环使用 `continue` 关键字，当键与提交按钮的名称相同时跳过当前项。这避免了将不需要的值添加到\
    \ `$_SESSION` 数组中。有关 `continue` 的描述，请参阅第 3 章的“跳出循环”。\n\n```\n$firstPage = 'multiple_01.php';\n\
    $nextPage = 'multiple_03.php';\n$submit = 'next';\nrequire_once '../includes/multiform.php';\n\
    ```\n\n在 `multiple_03.php` 中，在 `DOCTYPE` 声明上方的 PHP 代码块中添加以下内容：\n"
