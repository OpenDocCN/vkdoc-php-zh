    Styling the Page Header


    In Figure 6-2, there was a logo displayed in a header block that hasn’t appeared
    in subsequent figures. To include this logo, we must set the background to use
    an image in the CSS. This allows us to include other code in #header as we need.
    For instance, when we implement printer-friendly styles later in this chapter,
    we will include a printer-friendly logo in this area, since CSS backgrounds typically
    aren’t included when people print web pages.


    Here is the code used to style the #header div:


    #header {


    background : url(../images/logo.gif) no-repeat 5px center #f22;


    height : 45px;


    border-bottom : 1px solid #922;


    }


    We first set the background properties. The path used in url() is relative to
    the CSS file, not to the HTML document that loads the CSS file. By using no-repeat,
    we tell the browser to include the background image only once. The image is also
    positioned 5 pixels from the left of the div and centered vertically. Finally,
    the background color is set to a shade of red (to match the background color of
    logo.gif).


    Next, we set the height of the div to 45 pixels, which is slightly taller than
    the image. Since


    #header is empty, we must give it a height so the browser will make it big enough
    for the background image to appear.


    Finally, we add a dark red border to the bottom of the div. We will also be using
    this color when we join the navigation to the header.


    Styling the Tabbed Navigation Bar


    The navigation bar consists of horizontal tabs created as an unordered list. In
    order to make the unordered list horizontal, we set the display property of list
    items (<li>) to be inline. Additionally, we need to consider browser defaults
    for unordered lists: Internet Explorer uses a margin, and Firefox uses padding
    on the left of each element. We remove this by setting both the padding and margin
    to 0\. Additionally, each list item will display a bullet point, which we can
    remove by using list-style : none.


    ■**Tip** A useful way to deal with browsers that have different default styles
    is to use a “reset” style sheet.


    This is an extra style sheet that you load in your pages to give all elements
    the same style across all browsers (where relevant). The Yahoo Developer Network
    provides a reset style sheet that you can use ([http://developer.yahoo.com/yui/reset](http://developer.yahoo.com/yui/reset)),
    although Eric Meyer has developed his own, which he based on Yahoo’s. You can
    find his latest reset style sheet at [http://meyerweb.com/eric/thoughts/](http://meyerweb.com/eric/thoughts)


    2007/05/01/reset-reloaded, or his original article at [http://meyerweb.com/eric/thoughts/2007/](http://meyerweb.com/eric/thoughts/2007)


    04/12/reset-styles. One thing to be aware of is that using an extra style sheet
    may result in extra page-load time. You may prefer to just include your own reset
    styles as you need them to keep your CSS file smaller.


