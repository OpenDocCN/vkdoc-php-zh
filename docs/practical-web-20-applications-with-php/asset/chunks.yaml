    that these rules aren’t hard and fast—you can adapt them as you please.


    **2.** Check whether or not the generated URL already exists for this user. If
    it doesn’t, proceed to step 4.


    **3.** If the URL already exists, create a unique one by appending a number to
    the end of the string. So if went-to-the-movies already existed, we would make
    the URL went-to-the-movies-2\. If this alternate URL already existed, we would
    use went-to-the-movies-3.


