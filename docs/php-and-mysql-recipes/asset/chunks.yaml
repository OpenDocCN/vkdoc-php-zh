- fmt: 'PHP is a loosely typed scripting language. There is no need to declare variables
    before using them and variables can change types as the content changes. As a
    scripting language there is no need to compile or otherwise process the code before
    execution. When the interpreter is instructed to execute a script it will load
    the content of the file, perform the compilation, and execute the code if no compilation
    errors are found. Various forms of caching can bypass the compilation stage and
    move directly to execution.


    # Chapter 1: Installation and Configuration


    It has been about 10 years since *PHP 5 Recipes – A Problem-Solution Approach*
    was published and PHP, and web technology in general, has come a long way since
    then. It''s time to update some of the recipes.


    The example code in this book is designed to work with the current versions (PHP
    5.6 and PHP 7) but in many cases the examples will work with older versions of
    PHP 5. PHP 7 is still fairly new and many site owners have not yet upgraded. For
    the most part PHP 7 is compatible with PHP 5.6 but it does include a few new features
    and a couple of backwards compatibility issues. Not all extensions have been updated
    to work with the new Zend Engine (the internal workings of PHP).


    It is highly recommended to use the very latest version of PHP. This will ensure
    the best performance and security, and it will provide access to the latest features.


    PHP was designed as a scripting language for generating dynamic web content in
    the form of responses to requests from a client (usually a browser) to a web server
    using the HTTP protocol. The browser is no longer the only type of client for
    these scripts. In a world where more and more data is accessed through web services
    that return JSON, XML, or other structured formats, we are seeing clients being
    anything: from applications on a smart phone, other applications, and even servers
    talking to other servers to exchange data.


    ## Recipe 1-1\. Installing PHP


    ### Problem


    PHP is an open source scripting language that has been ported to many different
    platforms. It can run on anything from a Raspberry PI to a big IBM mainframe.
    Installing PHP used to require the user to compile the interpreter from source
    code, but today many operating systems provide packages that make it easy to install.
    No matter which operating system and web server you choose to use, the problem
    is the same: how do I get the web server to execute a script and return the response?


    ### Solution


    The number of supported operating systems, web servers, and server API''s is quite
    large and the number of different combinations is even bigger. Most of the web
    servers on the Internet that use PHP as a scripting language are running some
    form of Linux and some are running Windows. When it comes to development environments
    there are Windows, Mac OSX, and Linux systems that are common. In addition to
    this there are at least three types of web servers: Apache, Nginx, and Internet
    Information Server (IIS) on Windows.


    **Electronic supplementary material** The online version of this chapter ([doi:
    10.1007/978-1-4842-0605-8_1](http://dx.doi.org/10.1007/978-1-4842-0605-8_1)) contains
    supplementary material, which is available to authorized users.


    © Frank M. Kromann 2016


    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_1


    The common problem that all these configurations is solving is the injecting of
    a script parser into the web server so requests for certain files will result
    in invoking of a script and returning the output generated by the script. Other
    types of requests to the web server such as static HTML, images, JavaScript, and
    CSS files, etc., are handled by the web server directly as the server will resolve
    the request to a file on the file system and return the file unchanged to the
    requester.


    The usual configuration is to tell the web server that files with a certain file
    extension (`.php`) are to be interpreted by PHP. When a request comes in for such
    a file the web server will pass the request to PHP and wait for the output.


    ### How it Works


    With the large number of possible combinations of operating systems, web servers,
    and ways to link PHP to the web server, I have chosen a few combinations that
    are described in the following few examples. The first example covers how to install
    Apache and PHP on a clean CentOS 7 operating system using the package management
    tool `yum`. A later example will show how to do the same on Windows.


    The package manager `yum` is used to install, update, or remove packages from
    the CentOS repository. It can also be used to list the available packages. It
    is always a good idea to make sure the system is fully up to date before installing
    new packages. This is done by running the following command:


    ```

    yum update

    ```


    This will ensure all kernel and application packages are updated to the latest
    version. After installing a new kernel the system must be rebooted.


    The name of the apache package is called `httpd`, so to list all the packages
    related to the Apache web server we could issue the following command.'
