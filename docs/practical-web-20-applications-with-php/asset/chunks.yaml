    presence of an identity in the session is what determines whether or not a user
    is logged in, all we need to do is clear that identity to log them out.


    To do this, we simply use the clearIdentity() method of the instance of Zend_Auth.
    We can then redirect the user somewhere else, so they can continue to use the
    site if they please.


