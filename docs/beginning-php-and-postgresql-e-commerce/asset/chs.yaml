- "# 第 9 章 处理客户订单\n\n那个按钮看起来相当普通，但老实说，它是本章的核心。尽管如此，按钮背后隐藏着许多逻辑，所以让我们讨论一下当客户点击该按钮时应该发生什么。请记住，在这个阶段，我们并不关心是谁下的订单，但我们确实希望将关于所订购产品的信息存储在数据库中。\n\
  \n基本上，当客户点击“提交订单”按钮时，需要发生两件事：\n\n* 首先，订单必须存储在数据库中的某个位置。这意味着您必须将购物车中的产品保存到一个名为`HatShop\
  \ Order ***nnn***`的订单中，并清空购物车。\n* 其次，客户会被重定向到一个 PayPal 支付页面，客户在该页面上支付订单所需的金额。您可以在图\
  \ 9-2 中看到 PayPal 支付页面。\n\n**图 9-2.** *PayPal 支付页面*\n\n> **注意** 对于第二个开发阶段，我们仍然不自行处理付款，而是使用第三方支付处理器。现在我们不再需要\
  \ PayPal 购物车，因为我们在上一章中实现了自己的购物车。相反，我们将使用 PayPal 的单品购买选项，该选项将访问者直接重定向到支付页面。\n\n使用第三方支付处理器时出现的一个问题是，客户可能会在结账页面改变主意并取消订单。这可能导致订单已保存到数据库中（订单在页面重定向到支付页面之前已保存），但付款未完成。显然，我们需要一个付款确认系统，以及一个能够存储每个订单状态信息的数据库结构。\n\
  \n您将实现的确认系统很简单。每个支付处理器，包括 PayPal，都可以被指示在处理付款后发送确认消息。我们将允许站点管理员在管理页面中手动检查哪些订单已付款。这些订单被称为已验证订单。您将在本章后面看到如何在站点的订单管理部分管理它们。\n\
  \n> **注意** PayPal 及其竞争对手提供自动化系统，当付款完成或取消时通知您的网站。然而，本书不深入探讨这些支付系统的具体细节——您需要自行研究并学习所选公司的文档。PayPal\
  \ 即时付款通知文档包含在订单管理集成指南中，可从`https://www.paypal.com/en_US/pdf/PP_OrderManagement_IntegrationGuide.pdf`下载。\n\
  \n现在您已经了解了如何处理那个“提交订单”按钮，接下来的主要问题是：哪些订单信息需要存储在数据库中，以及如何存储。正如您在前几章中所见，决定如何存储信息有助于您更好地理解整个系统的工作方式。\n\
  \n## 在数据库中存储订单\n\n需要存储两种订单信息：\n\n* 关于订单的通用详细信息，例如订单创建日期；产品是否已发货以及何时发货；订单是已验证、已完成还是已取消；以及其他一些细节。\n\
  * 属于该订单的产品及其数量。\n\n在本章后面创建的订单管理页面中，您将能够查看和修改通用订单信息。\n\n## 创建新的数据表\n\n由于所存储信息的性质，您需要两个数据表：`orders`和`order_detail`。`orders`表存储关于整个订单的信息，而`order_detail`包含属于每个订单的产品。\n\
  \n\n\n## 第 9 章：处理客户订单\n\n## `orders` 表和 `order_detail` 表\n\n**提示：** 到目前为止，我们一直保持表名使用单数形式（`shopping_cart`、`department`\
  \ 等）的命名规范。然而，此处我们对 `orders` 表做了例外处理，因为 `order` 同时也是 SQL 关键字。为方便本书撰写，我们更倾向于打破命名规范以避免编写\
  \ SQL 代码时产生混淆。一般来说，将 SQL 关键字用作对象名称并非良好实践。\n\n这两个表通过 `order_id` 字段上的 `FOREIGN KEY`\
  \ 约束实现了一对多关系。一对多关系是 `orders` 表与 `order_detail` 表之间常见的实现方式。`order_detail` 表包含属于同一订单的多条记录。你可以回顾第\
  \ 4 章，其中对表关系进行了更详细的说明。\n\n你将在以下练习中实现这两个表。\n\n### 练习：向数据库添加 `orders` 和 `order_detail`\
  \ 表\n\n1. 加载 pgAdmin III，并连接到 `hatshop` 数据库。\n\n2. 点击 **工具** ➤ **查询工具**（或点击工具栏上的\
  \ **SQL** 按钮）。此时应会出现一个新的查询窗口。\n\n3. 使用查询工具执行以下代码，该代码将在你的 `hatshop` 数据库中创建 `orders`\
  \ 表：\n\n   ```sql\n   -- 创建 orders 表\n   CREATE TABLE orders\n   (\n       order_id\
  \ SERIAL NOT NULL,\n       total_amount NUMERIC(10,2) NOT NULL DEFAULT 0.00,\n \
  \      created_on TIMESTAMP NOT NULL,\n       shipped_on TIMESTAMP,\n       status\
  \ INTEGER NOT NULL DEFAULT 0,\n       comments VARCHAR(255),\n       customer_name\
  \ VARCHAR(50),\n       shipping_address VARCHAR(255),\n       customer_email VARCHAR(50),\n\
  \       CONSTRAINT pk_order_id PRIMARY KEY (order_id)\n   );\n   ```\n\n4. 使用查询工具执行以下代码，该代码将在你的\
  \ `hatshop` 数据库中创建 `order_detail` 表：\n\n   ```sql\n   -- 创建 order_detail 表\n   CREATE\
  \ TABLE order_detail\n   (\n       order_id INTEGER NOT NULL,\n       product_id\
  \ INTEGER NOT NULL,\n       product_name VARCHAR(50) NOT NULL,\n       quantity\
  \ INTEGER NOT NULL,\n       unit_cost NUMERIC(10, 2) NOT NULL,\n       CONSTRAINT\
  \ pk_order_id_product_id PRIMARY KEY (order_id, product_id),\n       CONSTRAINT\
  \ fk_order_id FOREIGN KEY (order_id) REFERENCES orders (order_id)\n       ON UPDATE\
  \ RESTRICT ON DELETE RESTRICT\n   );\n   ```\n\n## 工作原理：数据表\n\n既然你已经创建了这两个表，让我们更仔细地看看它们的结构和关系。\n\
  \n### `orders` 表\n\n`orders` 表包含两类信息：订单本身的数据（前六个字段）和创建该订单的客户数据（最后三个字段）。\n\n另一种方案是将客户信息存储在一个名为\
  \ `customer` 的独立表中，并在 `orders` 表中仅存储 `customer_id` 值。不过，存储客户数据并非当前开发阶段的目标之一。在这个阶段，我们倾向于保持简单，因为谁下的订单并不重要，重要的是哪些产品已被售出。你将在第\
  \ 11 章中处理创建独立的 `customer` 表。\n\n像 PayPal 这样的第三方支付处理商会存储并管理完整的客户信息，因此无需在你的数据库中也存储这些信息。我们添加了\
  \ `customer_name`、`shipping_address` 和 `customer_email` 字段作为可选字段，如果管理员能够方便地掌握这些信息以便处理特定（或全部）订单，则可以自行填写。\n\
  \n字段名称本身已不言自明。`order_id` 是表的主键。`total_amount` 存储订单总金额。`created_on` 和 `shipped_on`\
  \ 指定了订单创建和发货的时间（如果订单尚未发货，后者支持 NULL 值）。\n\n`status` 字段包含一个整数，可具有以下值：\n\n- **0：**\
  \ 订单已提交。这是购物车中点击 **提交订单** 按钮后订单的初始状态。\n\n\n\n• 1：订单已验证。管理员在确认付款后，将订单标记为`verified`。\n\
  \n• 2：订单已`completed`。管理员在产品发货后将订单标记为`completed`。同时，`shipped_on`字段也会被填充。\n\n• 3：订单已`canceled`。通常，如果订单已下达（通过点击`Place\
  \ Order`按钮），但付款未处理，或出现其他需要取消订单的情况，管理员会将订单标记为`canceled`。\n\n> **注意** PayPal 可以通过`Instant\
  \ Payment Notification`功能自动通知您的网站付款已完成。使用此功能可以使网站管理员的工作更轻松，因为他/她无需手动检查已收到付款的订单；但是在\
  \ HatShop 中我们不会使用此功能，因为它过于特定于 PayPal。请查阅您所选支付提供商的文档，了解他们为您准备了哪些特定功能。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00153.png)\n\n`648XCH09.qxd 11/17/06 3:39 PM Page 308`\n\n**308**\n\n\
  ## 第 9 章 ■ 处理客户订单\n\n### order_detail 表\n\n让我们看看`order_detail`表中包含哪些信息。请看图 9-3，了解一些典型的`order_detail`记录。\n\
  \n**图 9-3.** *`order_detail`表中的示例数据* `order_detail`中的每条记录都代表一个订购的产品，该产品属于由`order_id`指定的订单。\n\
  \n主键由`order_id`和`product_id`共同组成，因为在同一订单中，特定产品只能被订购一次。`quantity`字段包含订购数量，因此在同一订单中多次记录同一个`product_id`是没有意义的。\n\
  \n您可能会好奇，为什么`product_id`、`price`和产品名称会被记录在`order_detail`表中，特别是当您拥有产品 ID 时，可以从`product`表中获取所有产品详细信息，而无需重复存储任何信息。\n\
  \n我们选择在`order_detail`表中重复产品数据（产品名称和价格），以防止产品信息发生变化；产品可能会从数据库中删除，其名称和价格也可能改变，但这不应影响订单数据。\n\
  \n我们存储`product_id`，因为除了它是唯一以编程方式链接回原始产品信息（如果产品仍然存在）的方法之外，`product_id`还用于创建`order_detail`的主键。\n\
  \n`product_id`在这里非常有用，因为它在`order_detail`的组合主键中出现，既省去了添加另一个主键字段的必要，又确保同一订单中不会出现同一个产品多次。\n\
  \n### 实现数据层\n\n在此阶段，您需要在`hatshop`数据库中添加两个额外的数据层函数。最重要的是`shopping_cart_create_order`，它从购物车中获取产品并据此创建订单。另一个函数是`shopping_cart_empty`，它在订单下达后清空访客的购物车。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`648XCH09.qxd 11/17/06 3:39\
  \ PM Page 309`\n\n**309**\n\n在接下来的练习中，我们将实现这些函数，从`shopping_cart_empty`开始，因为它是在`shopping_cart_create_order`中调用的。\n\
  \n#### 练习：实现函数\n\n1. 加载 `pgAdmin III`，并连接到 `hatshop` 数据库。\n\n2. 点击 `Tools` ➤ `Query\
  \ tool`（或点击工具栏上的 `SQL` 按钮）。将出现一个新的查询窗口。\n\n3. 使用查询工具执行以下代码，该代码将在您的 `hatshop` 数据库中创建\
  \ `shopping_cart_empty` 函数：\n\n```sql\n-- 创建 shopping_cart_empty 函数\n\nCREATE FUNCTION\
  \ shopping_cart_empty(CHAR(32))\n\nRETURNS VOID LANGUAGE plpgsql AS $$\n\nDECLARE\n\
  \ninCartId ALIAS FOR $1;\n\nBEGIN\n\nDELETE FROM shopping_cart WHERE cart_id = inCartId;\n\
  \nEND;\n\n$$;\n```\n\n\n\n当客户下订单时，`shopping_cart_create_order` 会调用 `shopping_cart_empty`\
  \ 从客户的购物车中删除产品。\n\n**4.** 使用查询工具执行此代码，该代码在 `hatshop` 数据库中创建 `shopping_cart_create_order`\
  \ 函数：\n\n```sql\n-- 创建 shopping_cart_create_order 函数\n\nCREATE FUNCTION shopping_cart_create_order(CHAR(32))\n\
  \nRETURNS INTEGER LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninCartId ALIAS FOR $1;\n\n\
  outOrderId INTEGER;\n\ncartItem cart_product;\n\norderTotalAmount NUMERIC(10, 2);\n\
  \nBEGIN\n\n-- 向 orders 表中插入一条新记录\n\nINSERT INTO orders (created_on) VALUES (NOW());\n\
  \n-- 获取新订单 ID\n\nSELECT INTO outOrderId\n\ncurrval('orders_order_id_seq');\n\norderTotalAmount\
  \ := 0;\n\n-- 在 order_detail 表中插入订单详情\n\nFOR cartItem IN\n\nSELECT p.product_id,\
  \ p.name,\n\nCOALESCE(NULLIF(p.discounted_price, 0), p.price) AS price, sc.quantity,\n\
  \nCOALESCE(NULLIF(p.discounted_price, 0), p.price) * sc.quantity AS subtotal\n\n\
  FROM shopping_cart sc\n\nINNER JOIN product p\n\nON sc.product_id = p.product_id\n\
  \nWHERE sc.cart_id = inCartId AND sc.buy_now\n\nLOOP\n\nINSERT INTO order_detail\
  \ (order_id, product_id, product_name, quantity, unit_cost)\n\nVALUES (outOrderId,\
  \ cartItem.product_id, cartItem.name, cartItem.quantity, cartItem.price);\n\norderTotalAmount\
  \ := orderTotalAmount + cartItem.subtotal; END LOOP;\n\n-- 保存订单总金额\n\nUPDATE orders\n\
  \nSET total_amount = orderTotalAmount\n\nWHERE order_id = outOrderId;\n\n-- 清空购物车\n\
  \nPERFORM shopping_cart_empty(inCartId);\n\n-- 返回订单 ID\n\nRETURN outOrderId;\n\n\
  END;\n\n$$;\n```\n\n当客户决定购买购物车中的产品并点击“下订单”按钮时，会调用此函数。\n\n`shopping_cart_create_order`\
  \ 的作用是根据客户购物车中的产品创建新订单。这意味着要向 `orders` 表添加一条新记录，并向 `order_detail` 表添加多条记录（每个产品对应一条记录）。\n\
  \n**工作原理：实现函数**\n\n`shopping_cart_create_order` 的第一步涉及在 `orders` 表中创建新记录。您需要在一开始就执行此操作，以查明为新订单生成了哪个\
  \ `order_id`。请记住，`order_id` 字段是一个 `INTEGER` 列，具有关联的序列（`orders_order_id_seq`），由数据库自动生成，因此您需要在向\
  \ `orders` 插入记录后检索其值：\n\n```sql\n-- 向 orders 表中插入一条新记录\nINSERT INTO orders (created_on)\
  \ VALUES (NOW());\n\n-- 获取新订单 ID\nSELECT INTO outOrderId\ncurrval('orders_order_id_seq');\n\
  ```\n\n这是提取新生成的 ID 的基本机制。在 `INSERT` 语句之后，您将 `currval` 返回的值保存到一个变量中。您必须在插入新行后立即执行此操作，因为在下一次成功插入操作后，`currval`\
  \ 返回的值会递增。`currval` 返回序列的当前值，该值等于最后插入的 `order_id`。\n\n使用 `outOrderId` 变量，您通过从 `product`\
  \ 和 `shopping_cart` 表中收集信息来添加 `order_detail` 记录。您从 `shopping_cart` 中获取产品列表及其数量，从\
  \ `product` 中获取它们的名称和价格，并将这些记录逐一保存到 `order_detail` 表中。\n\n```sql\n-- 在 order_detail\
  \ 表中插入订单详情\nFOR cartItem IN\nSELECT p.product_id, p.name,\nCOALESCE(NULLIF(p.discounted_price,\
  \ 0), p.price) AS price, sc.quantity,\nCOALESCE(NULLIF(p.discounted_price, 0), p.price)\
  \ * sc.quantity AS subtotal\nFROM shopping_cart sc\nINNER JOIN product p\nON sc.product_id\
  \ = p.product_id\nWHERE sc.cart_id = inCartId AND sc.buy_now\nLOOP\nINSERT INTO\
  \ order_detail (order_id, product_id, product_name, quantity, unit_cost)\n```\n\n\
  \n\n`VALUES (outOrderId, cartItem.product_id, cartItem.name, cartItem.quantity,\
  \ cartItem.price);`\n\n`orderTotalAmount := orderTotalAmount + cartItem.subtotal;`\
  \ `END LOOP;`\n\n> **提示** 在关联 `product` 和 `shopping_cart` 表时，你可以从 `product` 表中获取\
  \ `product_id`，但也可以从 `shopping_cart` 表中获取；由于表连接是基于 `product_id` 列进行的，因此结果相同。\n\n\
  在保存商品时，该函数还会通过将每个商品的价格乘以其数量，再加到 `orderTotalAmount` 上，来计算订单总金额。此值随后会作为订单的 `total_amount`\
  \ 进行保存：\n\n```sql\n-- 保存订单总金额\nUPDATE orders\nSET total_amount = orderTotalAmount\n\
  WHERE order_id = outOrderId;\n```\n\n最后，该函数通过调用 `shopping_cart_empty` 函数清空访客的购物车，并返回订单\
  \ ID：\n\n```sql\n-- 清空购物车\nPERFORM shopping_cart_empty(inCartId);\n\n-- 返回订单 ID\n\
  RETURN outOrderId;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
