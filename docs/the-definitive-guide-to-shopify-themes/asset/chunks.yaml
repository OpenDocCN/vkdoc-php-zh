    \ product_1_score = -1 -%}\n{%- assign product_2_score = -1 -%}\n{%- assign product_3_score\
    \ = -1 -%}\n{%- assign product_4_score = -1 -%}\n{%- for current_product in collections.all.products\
    \ -%}\n{%- unless current_product.id == product.id -%}\n{%- assign current_product_score\
    \ = 0 -%}\n{%- for tag in product.tags -%}\n{%- for related-tag in current_product.tags\
    \ -%}\n{%- if tag == related-tag -%}\n{%- assign current_product_score = current_product_score\
    \ | plus: 1 -%}\n{%- endif -%}\n{%- endfor -%}\n{%- endfor -%}\n{%- if current_product_score\
    \ > product_1_score -%}\n{%- assign product_1_score = current_product_score -%}\n\
    {%- assign product_1_handle = current_product.handle -%}\n{%- elsif current_product_score\
    \ > product_2_score -%}\n{%- assign product_2_score = current_product_score -%}\n\
    {%- assign product_2_handle = current_product.handle -%}\n{%- elsif current_product_score\
    \ > product_3_score -%}\n{%- assign product_3_score = current_product_score -%}\n\
    {%- assign product_3_handle = current_product.handle -%}\n{%- elsif current_product_score\
    \ > product_4_score -%}\n{%- assign product_4_score = current_product_score -%}\n\
    {%- assign product_4_handle = current_product.handle -%}\n{%- endif -%}\n{%- endunless\
    \ -%}\n{%- endfor -%}\n\n{%- for related-product in collections.all.products -%}\n\
    {%- if related-product.handle == product_1_handle or related-product.handle ==\
    \ product_2_handle or related-product.handle == product_3_handle or related-product.handle\
    \ == product_4_handle -%}\n\n{%- include 'product' with related-product -%}\n\n\
    {%- endif -%}\n{%- endfor -%}\n\n清单 3-3\n一个与清单 3-2 功能相同，但更具可维护性的 Liquid 代码片段\n\
    ```\n\n良好的文档化工作也不仅限于代码层面。其他一些有用的做法包括：\n\n-   在你的源代码的 `README` 文件中记录主题的概念和架构。\n\
    -   为其他人编写一份“入门指南”，提供设置开发环境的分步说明，讲解主题中的任何非标准方面，并突出显示任何“陷阱”。\n-   为客户和商店所有者提供一份“内容管理指南”，说明如何在不依赖开发人员的情况下管理其\
