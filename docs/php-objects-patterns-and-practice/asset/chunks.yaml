- fmt: "#### Constructors and Inheritance\n\nWhen you define a constructor in a child\
    \ class, you become responsible for passing any arguments on to the parent. If\
    \ you fail to do this, you can end up with a partially constructed object.\n\n\
    To invoke a method in a parent class, you must first find a way of referring to\
    \ the class itself: a handle. PHP provides us with the `parent` keyword for this\
    \ purpose.\n\nTo refer to a method in the context of a class rather than an object,\
    \ you use `::` rather than `->`:\n\n```\nparent::__construct()\n```\n\nThe preceding\
    \ means, “Invoke the `__construct()` method of the parent class.” Here I amend\
    \ my example so that each class handles only the data that is appropriate to it:\n\
    \n```\n// listing 03.39\nclass ShopProduct\n{\npublic $title;\npublic $producerMainName;\n\
    public $producerFirstName;\npublic $price;\nfunction __construct(\n$title,\n$firstName,\n\
    $mainName,\n$price\n) {\n$this->title             = $title;\n$this->producerFirstName\
    \ = $firstName;\n$this->producerMainName  = $mainName;\n$this->price         \
    \    = $price;\n}\nfunction getProducer()\n{\nreturn $this->producerFirstName\
    \ . \" \"\n. $this->producerMainName;\n}\nfunction getSummaryLine()\n{\n$base\
    \  = \"{$this->title} ( {$this->producerMainName}, \";\n$base .= \"{$this->producerFirstName}\
    \ )\";\nreturn $base;\n}\n}\n// listing 03.40\nclass BookProduct extends ShopProduct\n\
    {\npublic $numPages;\npublic function __construct(\nstring $title,\nstring $firstName,\n\
    string $mainName,\nfloat  $price,\nint    $numPages\n) {\nparent::__construct(\n\
    $title,\n$firstName,\n$mainName,\n$price\n);\n$this->numPages = $numPages;\n}\n\
    public function getNumberOfPages()\n{\nreturn $this->numPages;\n}\npublic function\
    \ getSummaryLine()\n{\n$base  = \"{$this->title} ( $this->producerMainName, \"\
    ;\n$base .= \"$this->producerFirstName )\";\n$base .= \": page count - {$this->numPages}\"\
    ;\nreturn $base;\n}\n}\n// listing 03.41\nclass CdProduct extends ShopProduct\n\
    {\npublic $playLength;\npublic function __construct(\nstring $title,\nstring $firstName,\n\
    string $mainName,\nfloat  $price,\nint    $playLength\n) {\nparent::__construct(\n\
    $title,\n$firstName,\n$mainName,\n$price\n);\n$this->playLength = $playLength;\n\
    }\npublic function getPlayLength()\n{\nreturn $this->playLength;\n}\npublic function\
    \ getSummaryLine()\n{\n$base  = \"{$this->title} ( {$this->producerMainName},\
    \ \";\n$base .= \"{$this->producerFirstName} )\";\n$base .= \": playing time -\
    \ {$this->playLength}\";\nreturn $base;\n}\n}\n```\n\nEach child class invokes\
    \ the constructor of its parent before setting its own properties. The base class\
    \ now knows only about its own data. Child classes are generally specializations\
    \ of their parents. As a rule of thumb, you should avoid giving parent classes\
    \ any special knowledge about their children.\n\n**Note**  \nPrior to PHP 5, constructors\
    \ took on the name of the enclosing class. The new unified constructors use the\
    \ name `__construct()`. Using the old syntax, a call to a parent constructor would\
    \ tie you to that particular class: `parent::ShopProduct();`. The old constructor\
    \ syntax was deprecated in PHP 7.0 and should not be used.\n\n#### Invoking an\
    \ Overridden Method\n\nThe `parent` keyword can be used with any method that overrides\
    \ its counterpart in a parent class. When you override a method, you may not wish\
    \ to obliterate the functionality of the parent, but rather to extend it. You\
    \ can achieve this by calling the parent class’s method in the current object’s\
    \ context. If you look again at the `getSummaryLine()` method implementations,\
    \ you will see that they duplicate a lot of code. It would be better to use rather\
    \ than reproduce the functionality already developed in the `ShopProduct` class:\n\
    \n```\n// listing 03.42\n// ShopProduct class...\nfunction getSummaryLine()\n\
    {\n$base  = \"{$this->title} ( {$this->producerMainName}, \";\n$base .= \"{$this->producerFirstName}\
    \ )\";\nreturn $base;\n}\n// listing 03.43\n// BookProduct class...\npublic function\
    \ getSummaryLine()\n{\n$base  = parent::getSummaryLine();\n$base .= \": page count\
    \ - $this->numPages\";\nreturn $base;\n}\n```\n\nI set up the core functionality\
    \ for the `getSummaryLine()` method in the `ShopProduct` base class. Rather than\
    \ reproduce this in the `CdProduct` and `BookProduct` subclasses, I simply call\
    \ the parent method before proceeding to add more data to the summary string.\n\
    \nNow that you have seen the basics of inheritance, I will reexamine property\
    \ and method visibility in light of the full picture.\n\n### Public, Private,\
    \ and Protected: Managing Access to Your Classes\n\nSo far, I have declared all\
    \ properties `public`. Public access is the default setting for methods and for\
    \ properties if you use the old `var` keyword in your property declaration.\n\n\
    Elements in your classes can be declared `public`, `private`, or `protected`:\n\
    \n- Public properties and methods can be accessed from any context.\n- A private\
    \ method or property can only be accessed from within the enclosing class. Even\
    \ subclasses have no access.\n- A protected method or property can only be accessed\
    \ from within either the enclosing class or from a subclass. No external code\
    \ is granted access.\n\nSo how is this useful to us? Visibility keywords allow\
    \ you to expose only those aspects of a class that are required by a client. This\
    \ sets a clear interface for your object.\n\nBy preventing a client from accessing\
    \ certain properties, access control can also help prevent bugs in your code.\
    \ Imagine, for example, that you want to allow `ShopProduct` objects to support\
    \ a discount. You could add a `$discount` property and a `setDiscount()` method:\n\
    \n```\n// listing 03.44\n// ShopProduct class\npublic $discount = 0;\n//...\n\
    public function setDiscount(int $num)\n{\n$this->discount = $num;\n}\n```\n\n\
    Armed with a mechanism for setting a discount, you can create a `getPrice()` method\
    \ that takes account of the discount that has been applied:\n\n```\npublic function\
    \ getPrice()\n{\nreturn ($this->price - $this->discount);\n}\n```\n\nAt this point,\
    \ you have a problem. You only want to expose the adjusted price to the world,\
    \ but a client can easily bypass the `getPrice()` method and access the `$price`\
    \ property:\n\n```\nprint \"The price is {$product1->price}\\n\";\n```\n\nThis\
    \ will print the raw price and not the discount-adjusted price you wish to present.\
    \ You can put a stop to this straight away by making the `$price` property private.\
    \ This will prevent direct access, forcing clients to use the `getPrice()` method.\
    \ Any attempt from outside the `ShopProduct` class to access the `$price` property\
    \ will fail. As far as the wider world is concerned, this property has ceased\
    \ to exist.\n\nSetting properties to `private` can be an overzealous strategy.\
    \ A `private` property cannot be accessed by a child class. Imagine that our business\
    \ rules state that books alone should be ineligible for discounts. You could override\
    \ the `getPrice()` method so that it returns the `$price` property, applying no\
    \ discount:\n\n```\n// listing 03.45\n// BookProduct\npublic function getPrice()\n\
    {\nreturn $this->price;\n}\n```\n\nAs the private `$price` property is declared\
    \ in the `ShopProduct` class and not `BookProduct`, the attempt to access it here\
    \ will fail. The solution to this problem is to declare `$price` protected, thereby\
    \ granting access to descendant classes. Remember that a protected property or\
    \ method cannot be accessed from outside the class hierarchy in which it was declared.\
    \ It can only be accessed from within its originating class or from within children\
    \ of the originating class.\n\nAs a general rule, err on the side of privacy.\
    \ Make properties private or protected at first and relax your restriction only\
    \ as needed. Many (if not most) methods in your classes will be public, but once\
    \ again, if in doubt, lock it down. A method that provides local functionality\
    \ for other methods in your class has no relevance to your class’s users. Make\
    \ it `private` or `protected`."
