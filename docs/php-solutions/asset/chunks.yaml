- fmt: "### Inserting a Foreign Key in a Table\n\nThe basic principle behind inserting\
    \ a foreign key in another table is quite simple: you query the database to find\
    \ the primary key of the record that you want to link to the other table. You\
    \ can then use an `INSERT` or `UPDATE` query to add the foreign key to the target\
    \ record.\n\nTo demonstrate the basic principle, you'll adapt the update form\
    \ from [Chapter 13](#A978-1-4842-0635-5_13_Chapter.html) to add a drop-down menu\
    \ that lists images already registered in the `images` table (see Figure [15-4](#A978-1-4842-0635-5_15_Chapter.html#Fig4)).\n\
    \n![A978-1-4842-0635-5_15_Fig4_HTML.jpg](A978-1-4842-0635-5_15_Fig4_HTML.jpg)\n\
    \n**Figure 15-4.** A dynamically generated drop-down menu inserts the appropriate\
    \ foreign key\n\nThe menu is dynamically generated by a loop that displays the\
    \ results of a `SELECT` query. Each image's primary key is stored in the `value`\
    \ attribute of the `<option>` tag. When the form is submitted, the selected value\
    \ is incorporated into the `UPDATE` query as the foreign key.\n\n#### PHP Solution\
    \ 15-2: Adding the Image Foreign Key (MySQLi)\n\nThis PHP solution shows how to\
    \ update records in the `blog` table by adding the primary key of a selected image\
    \ as a foreign key. It adapts `admin/blog_update_mysqli.php` from [Chapter 13](#A978-1-4842-0635-5_13_Chapter.html).\
    \ Use the version that you created in [Chapter 13](#A978-1-4842-0635-5_13_Chapter.html).\
    \ Alternatively, copy `blog_update_mysqli_03.php` from the `ch13` folder to the\
    \ `admin` folder and remove `_03` from the filename.\n\nThe existing `SELECT`\
    \ query that retrieves details of the article to be updated needs to be amended\
    \ so that it includes the foreign key, `image_id`, and the result needs to be\
    \ bound to a new result variable, `$image_id`. You then need to run a second `SELECT`\
    \ query to get the details of the `images` table. Before you can do so, you need\
    \ to free the database resources by calling the prepared statement's `free_result()`\
    \ method. Add the following code highlighted in bold to the existing script:\n\
    \n```\nif (isset($_GET['article_id']) && !$_POST) {\n\n    // prepare SQL query\n\
    \    $sql = 'SELECT article_id, image_id, title, article FROM blog\n         \
    \   WHERE article_id = ?';\n\n    if ($stmt->prepare($sql)) {\n        // bind\
    \ the query parameter\n        $stmt->bind_param('i', $_GET['article_id']);\n\n\
    \        // execute the query\n        $OK = $stmt->execute();\n\n        // bind\
    \ the results to variables and fetch\n        $stmt->bind_result($article_id,\
    \ $image_id, $title, $article);\n        $stmt->fetch();\n\n        // free the\
    \ database resources for the second query\n        $stmt->free_result();\n   \
    \ }\n}\n```\n\nYou can free the result immediately after calling the `fetch()`\
    \ method because there's only one record in the result set, and the value in each\
    \ column has been bound to a variable.\n\nInside the form, you need to display\
    \ the filenames stored in the `images` table. Since the second `SELECT` statement\
    \ doesn't rely on external data, it's simpler to use the `query()` method instead\
    \ of a prepared statement. Add the following code after the `article` text area\
    \ (it's all new code, but the PHP sections are highlighted in bold for ease of\
    \ reference):\n\n```\n<p>\n    <label for=\"image_id\">Uploaded image:</label>\n\
    \    <select name=\"image_id\" id=\"image_id\">\n        <option value=\"\">Select\
    \ image</option>\n        <?php\n        // get the list images\n        $getImages\
    \ = 'SELECT image_id, filename\n                      FROM images ORDER BY filename';\n\
    \        $images = $conn->query($getImages);\n        while ($row = $images->fetch_assoc())\
    \ {\n        ?>\n        <option value=\"<?= $row['image_id']; ?>\"\n        \
    \    <?php\n            if ($row['image_id'] == $image_id) {\n               \
    \ echo 'selected';\n            }\n            ?>>  <?= $row['filename']; ?></option>\n\
    \        <?php } ?>\n    </select>\n</p>\n```\n\nThe first `<option>` tag is hard-coded\
    \ with the label `Select image`, and its `value` is set to an empty string. The\
    \ remaining `<option>` tags are populated by a `while` loop that extracts each\
    \ record to an array called `$row`.\n\nA conditional statement checks whether\
    \ the current `image_id` is the same as the one already stored in the `articles`\
    \ table. If it is, `selected` is inserted into the `<option>` tag so that it displays\
    \ the correct value in the drop-down menu.\n\nMake sure you don't omit the third\
    \ character in the following line:\n\n```\n?>>  <?= $row['filename']; ?></option>\n\
    ```\n\nIt's the closing angle bracket of the `<option>` tag, sandwiched between\
    \ two PHP tags.\n\nSave the page and load it into a browser. You should be automatically\
    \ redirected to `blog_list_mysqli.php`. Select one of the EDIT links and make\
    \ sure that your page looks like Figure [15-4](#A978-1-4842-0635-5_15_Chapter.html#Fig4).\
    \ Check the browser source-code view to verify that the `value` attributes of\
    \ the `<option>` tags contain the primary key of each image.\n\n**Tip:** If the\
    \ `<select>` menu doesn't list the images, there's almost certainly an error with\
    \ the `SELECT` query in step 2. Add `echo $conn->error;` immediately after the\
    \ call to the `query()` method, and reload the page. You'll need to view the browser\
    \ source code to see the error message. If the message is \"Commands out of sync;\
    \ you can't run this command now,\" the problem lies with failing to free the\
    \ database resources with `free_result()` in step 1.\n\nThe final stage is to\
    \ add the `image_id` to the `UPDATE` query. Because some blog entries might not\
    \ be associated with an image, you need to create alternative prepared statements,\
    \ like this:\n\n```\n// if form has been submitted, update record\nif (isset($_POST['update']))\
    \ {\n    // prepare update query\n    if (!empty($_POST['image_id'])) {\n    \
    \    $sql = 'UPDATE blog SET image_id = ?, title = ?, article = ?\n          \
    \      WHERE article_id = ?';\n        if ($stmt->prepare($sql)) {\n         \
    \   $stmt->bind_param('issi', $_POST['image_id'], $_POST['title'],\n         \
    \                     $_POST['article'], $_POST['article_id']);\n            $done\
    \ = $stmt->execute();\n        }\n    } else {\n        $sql = 'UPDATE blog SET\
    \ image_id = NULL, title = ?, article = ?\n                WHERE article_id =\
    \ ?';\n        if ($stmt->prepare($sql)) {\n            $stmt->bind_param('ssi',\
    \ $_POST['title'], $_POST['article'],\n                              $_POST['article_id']);\n\
    \            $done = $stmt->execute();\n        }\n    }\n}\n```\n\nIf `$_POST['image_id']`\
    \ has a value, you add it to the SQL as the first parameter with a placeholder\
    \ question mark. Since it must be an integer, you add `i` to the beginning of\
    \ the first argument of `bind_param()`.\n\nHowever, if `$_POST['image_id']` doesn't\
    \ contain a value, you need to create a different prepared statement to set the\
    \ value of `image_id` to `NULL` in the SQL query. Because it has an explicit value,\
    \ you don't add it to `bind_param()`.\n\nTest the page again, select a filename\
    \ from the drop-down menu, and click `Update Entry`. You can verify whether the\
    \ foreign key has been inserted into the `articles` table by refreshing `Browse`\
    \ in phpMyAdmin or by selecting the same article for updating. This time, the\
    \ correct filename should be displayed in the drop-down menu.\n\nCheck your code\
    \ against `blog_update_mysqli_04.php` in the `ch15` folder, if necessary."
