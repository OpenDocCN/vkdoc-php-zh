  return $row->num;\n```\n\n```php\npublic static function all($where = null, $fields\
  \ = null, $order = null,\n    $direction = \"asc\", $limit = null, $page = null)\n\
  {\n    $user = new self();\n    $table = $user->getTable();\n    $adapter = $table->getAdapter();\n\
  \    $query = $adapter->select();\n\n    // 选择字段\n    if ($fields)\n    {\n    \
  \    $query->from(\"user\", $fields);\n    }\n\n    // 缩小搜索范围\n    if (is_array($where))\n\
  \    {\n        foreach ($where as $key => $value)\n        {\n            $query->where($key,\
  \ $value);\n        }\n    }\n\n    // 排序结果\n    if ($order)\n    {\n        $query->order(\"\
  {$order} {$direction}\");\n    }\n\n    // 限制结果\n    if ($limit && $page)\n    {\n\
  \        $offset = ($page - 1) * $limit;\n        $query->limit($limit, $offset);\n\
  \    }\n\n    // 获取用户\n    $users = array();\n    $rows = $adapter->fetchAll($query);\n\
  \    foreach ($rows as $row)\n    {\n        // 创建并填充用户\n        $user = new self();\n\
  \        $user->_populate($row->toArray());\n        // 将用户添加至集合\n        array_push($users,\
  \ $user);\n    }\n\n    return $users;\n}\n```\n\n其余方法与之前为 CodeIgniter 创建的数据访问/修改方法非常相似。实际上，它们唯一的不同在于从用户表中返回行或向用户表中保存新行所用的方式。\n\
  \n### 控制器\n\n有了 `User` 模型之后，我们就可以开始编写 `UsersController` 控制器，如清单 27-10 所示。\n\n**清单\
  \ 27-10.** `application/controllers/UsersController.php`（摘录）\n\n```php\nclass UsersController\
  \ extends Zend_Controller_Action\n{\n    public $user;\n\n    public static function\
