    CHAPTER 16 ■ USING MYSQL DATABASES


    There are a couple of different functions that can fetch data from a result set.
    The one used here is fetch_assoc() . It will return an associative array for each
    row. That’s why each of the elements in the inner arrays have keys that match
    the column names for each of the columns selected. In this case the query uses


