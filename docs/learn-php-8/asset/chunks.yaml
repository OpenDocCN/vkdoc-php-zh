- fmt: '要了解其他`ctype`函数，请访问[`www.php.net/manual/en/book.ctype.php`](http://www.php.net/manual/en/book.ctype.php)。


    如果`$value`属性仅包含字母字符且长度小于21个字符，则`$dog_name`属性会更新为传入的值。如果存在非字母字符或字符串长度超过20个字符，则`$error_message`会更新为布尔值`FALSE`（表示更新未发生）。最后，`$error_message`中的值（`TRUE`或`FALSE`）会被返回给调用程序。


    *安全与性能 — 这个过程现在可能有点令人困惑。然而，创建安全的程序非常重要。每当应用程序或对象从外部来源（如另一个程序或用户）接收信息时，都必须对信息进行验证。这种验证应包括对接收信息大小的限制以及其他约束。通过互联网传输的数据（例如从用户的浏览器到Web服务器）可能被拦截和篡改。在服务器上的应用程序中使用这些信息之前，对其进行验证至关重要。验证可以在浏览器中（通过JavaScript）进行，以确保用户输入了正确的信息。但是，如前所述，数据包嗅探程序可以拦截这些信息，并在Web服务器上的应用程序接收之前对其进行篡改。*


    在查看代码更改之前，还有最后一点说明。下表总结了第[3](#394210_2_En_3_Chapter.xhtml)章中介绍的比较运算符。


    ```

    操作                    结果 – 如果...则返回 TRUE

    $a == $b                $a 和 $b 忽略大小写时相等

    $a === $b               $a 和 $b 大小写相同时相等

    $a != $b, $a <> $b      $a 和 $b 忽略大小写时不相等

    $a !== $b               $a 和 $b 不相等或大小写不同

    $a < $b                 $a 小于 $b

    $a > $b                 $a 大于 $b

    $a <= $b                $a 小于或等于 $b

    $a >= $b                $a 大于或等于 $b

    $a <=> $b               $a 小于 $b 时返回 -1，等于时返回 0，大于时返回 1

    ```


    此外，空合并运算符（Null Coalesce Operator）可用于在三元运算中使用某个值之前，检查该值是否“已设置”（即包含内容）。


    ```php

    $dog_name = $value ?? ''No Name'';

    ```


    在此示例中，如果`value`中存在内容，则将其放入`$dog_name`。如果`value`未设置，则将`No Name`放入`$dog_name`。


    让我们更新`Dog`类，以包含所有必要的`set`方法。


    *程序设计建议 — 在编码和测试程序时，请先只编写一个`set`方法。然后测试该方法以纠正错误。当您成功完成一个`set`方法后，将其复制并粘贴到代码中，并进行必要的修改。不要试图在测试之前完整地编写一个程序。应逐个片段地编写程序，然后进行测试。尽管您可能认为这会减慢编码速度，但实际上并非如此。通过每次对程序进行小规模添加时捕获错误，更容易找到它们。如果您试图编写一个完整的程序，可能会遇到大量错误，并花费大量时间尝试查找每个错误。如果您在查找错误时遇到困难，请注释掉（使用`//`）程序中的新代码行并重新测试。如果一切正常，则逐渐（一次几行）从代码行中移除注释行（`//`）并重新测试。这个过程应该有助于您找到可能导致问题的代码行。*


    *安全与性能 — 在实时环境中，程序员不应向用户显示导致更新失败的具体细节。提供过多信息可能会让黑客知道可以更改什么来使用无效信息成功更新属性。应将导致更新失败的详细信息传递到服务器上的安全日志文件中。*


    ```php

    $dog_name = $value ?: $error_message = FALSE;

    return $error_message;

    }

    function set_dog_weight(int $value) : bool

    {

    bool $error_message = TRUE;

    (ctype_digit($value) && ($value > 0 && $value < 1001)) ? $this->dog_weight = $value
    : $error_message = FALSE;

    return $error_message;

    }

    function set_dog_breed(string $value) : bool

    {

    bool $error_message = TRUE;

    (ctype_alpha($value) && strlen($value) < 21) ? $this->dog_breed = $value : $error_message
    = FALSE;

    return $error_message;

    }

    function set_dog_color(string $value) : bool

    {

    bool $error_message = TRUE;

    (ctype_alpha($value) && strlen($value) < 21) ? $this->dog_color = $value : $error_message
    = FALSE;

    return $error_message;

    }

    function get_properties() : string

    {

    return "$this->dog_weight,$this->dog_breed,$this->dog_color.";

    }

    }

