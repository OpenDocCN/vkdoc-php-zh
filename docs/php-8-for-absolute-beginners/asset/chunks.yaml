    \ = $this->db->prepare($updateSQL);\n$updateStatement->execute();\n}\n}\n?>\n\
    Listing 6-16\nFinalPoll.class.php\n```\n\nThe new method `updatePoll()` is\nsimilar\
    \ to the `getPollData` method.\nHowever, if the user submitted a *yes*, we format\
    \ an SQL string\nthat can update the `yes` attribute in the\npoll table. If the\
    \ user submitted a *no*, we format a different\nSQL string to update the `no`\
    \ attribute. Notice\nthat the yes or no values are incremented by one to add the\
    \ user’s\nchoice into the proper location in the database table. Whichever SQL\n\
    string is created, it is stored in a variable called `$updateSQL`. Once the\n\
    `$updateSQL`\nstring is created, we again use the PDO method `prepare()` to convert\n\
    the SQL string to a `PDOStatement` object,\nwhich is stored in the variable `$updateStatement`.\
    \ We\nthen call `execute()` to update\nthe poll table.\n\nSecure Programming\n\
    We should always be aware that a hacker can attempt to use *SQL\nInjection* to\
    \ corrupt our tables and databases. SQL Injection  is an\nattempt to insert SQL\
    \ statements into a program’s use of SQL to insert\nor update data in the database.\
    \ In future chapters, we will use prepared\nstatements to create our SQL commands,\
    \ which will reduce the possibility\nof successful injection. We will also validate\
    \ the data before making\nany updates to the database. In the previous example,\
    \ we did not use any\ninformation gathered from the user to format the SQL statement.\
    \ Thus,\nthe SQL statement created was secure and resistant to SQL Injection.\n\
    \nResponding to User Input\n\nControllers are responsible for dealing with user\
    \ interactions . So,\nthe `poll controller` is the right place to intercept user\
    \ input from the\npoll form. There are a couple of things to add to the script.\n\
    \n```\nupdatePoll( $input );\n}\n$pollData = $poll->getPollData();\ninclude_once\
    \ \"views/completepoll-html.php\";\n?>\nListing 6-17\ncompletepoll.php\n```\n\n\
    ```\n//check if form was submitted\n$isPollSubmitted = isset( $_POST['user-input']\
    \ );\n//if it was just submitted...\nif ( $isPollSubmitted ) {\n```\n\nWe will\
    \ use the `isset` method to\ndetermine if the user has chosen to give their opinion\
    \ in the survey. If\nthey have, we will update the results.\n\n```\n//get input\
    \ received from form\n$input = $_POST['user-input'];\n//...update model\n$poll->updatePoll(\
    \ $input );\n}\n```\n\nIf they did, we will retrieve the value selected and place\
    \ it into `$input`. Then we will\npass that value to the `updatePoll` method,\n\
    which will make the changes to the database table.\n\n```\n$pollData = $poll->getPollData();\n\
    include_once \"views/completepoll-html.php\";\n```\n\nWhether or not the user\
    \ provides their opinion, the program will get\nthe current poll results and display\
    \ them by calling the HTML page.\n\nNote\n\nA minor change has occurred to the\
    \ index (controller) program to call\n`completepoll.php`. You\ncan view this change\
    \ in the files downloaded from the publisher’s\nwebsite.\n\nTo see the results,\
    \ run `completepollindex.php`\nin the browser.\n\n![](images/323857_3_En_6_Chapter/323857_3_En_6_Fig13_HTML.jpg)\n\
    \nAn application output (completepollindex.php) shows P H P and Poll\nresults:\
    \ 2 said YES, and 0 said NO.\n\nFigure 6-13\nOutput from completepollindex.php\n\
    \nWe now have a completely functional poll site!\nThere is one weakness to this\
    \ final version. Can you see it? Once the\nuser has entered their opinion, the\
    \ program allows them to enter it\nagain. How can this be corrected? We can change\
    \ the output to only\ndisplay the question the first time the page is shown. Once\
    \ the opinion\nhas been given, then we can display the page that does not ask\
    \ the\nquestion again, but does display the results. We can change the results\n\
    to use `finalpoll-html.php`\nwhich was created earlier. This will require just\
    \ a change to the\ninclude statement discussed earlier.\n**Exercise**: Adjust\
    \ the final poll project to accept\nmore than one input from the user. Adjust\
    \ the controller, model, and\nview to request, store, and display this information.\n\
    \nSummary\nIn this chapter, we’ve learned the basics of SQL statements, as well\n\
    as how to interact with a database using PHP. We learned how MVC\nprovides a logical\
    \ structure to creating programs which require data and\ninterfaces. In the next\
    \ chapters, we’ll learn how to build a blog with a\nbasic entry manager that will\
    \ allow us to create, modify, and delete\nentries, as well as display them on\
    \ a public page.\n\nProjects\n1. The power of MVC design is the ability to change\
    \ the model or view\nwith little or no changes to the other components of the\
    \ project. Review\nthe PHP documentation ( [`www.php.net/manual/en/function.file.php`](http://www.php.net/manual/en/function.file.php)\
    \ ) on reading and writing to files. Change the model\ncode from the examples\
    \ to read and store the poll information into a\nfile, instead of a database.\
    \ You should be able to make these changes\nwithin very minimal changes to the\
    \ controller or the viewer. Most of\nyour changes should occur within the model.\n\
    2. Visit [ `www.w3schools.in/laravel-tutorial/`\n](http://www.w3schools.in/laravel-tutorial/)\
    \ and discover how Laravel can help create robust\ndata-driven web applications\
    \ using PHP and other tools.\n\n7. Building the Basic Blog\nSystem\n\nObjectives\n\
    \nAfter completing this chapter, you will be able to\n\n*   Create a view, containing\
    \ an HTML form to accept a new blog\n    entry\n\n*   Create a controller, to\
    \ handle input from the form\n\n*   Create a model, to save and retrieve any entry\
    \ using a database\n    table\n\n*   Design and create a MySQL/MariaDB database\
    \ with a table\n\n*   Use a design pattern for the front controller\n\n*   Use\
    \ the table data gateway design pattern for database\n    access\n\n*   Use a\
    \ while loop to iterate through a data set\n\nIn this chapter, we will begin to\
    \ build our blog system . We will start by\ncreating an entry manager (front controller).\
    \ We will create two front\npages for the blog system, one for the administrator\
    \ and one for the\nuser. By the end of the chapter, the basic blog system will\
    \ be able to\nsave new blogs and display all entries stored within a database.\
    \ Along\nthe way, we will use the concepts and topics we have previously covered:\n\
    database design, SQL, and MVC. We will also learn new techniques\nincluding design\
    \ practices and prepared SQL statements.\n\nCreating the blog_entry Database Table\n\
    \nOne of the most important steps with any new application is the planning\nof\
    \ the tables that will hold data . This has an\nenormous impact on the ease of\
    \ scaling  the application\nlater. *Scaling* is the expansion of an application\
    \ to manage\nmore information and/or users, and it can be a tremendous pain, if\
    \ we do\nnot look ahead when starting a new project. At first, the blog needs\
    \ to\nstore several types of entry information to function, including the\nfollowing:\n\
    \n*   Unique ID\n\n*   Entry title\n\n*   Entry text\n\n*   Date created\n\nThe\
    \ first step is to determine the types of fields for the entries\ntable."
  trans: "\n# 创建了一个用于获取客户意见的表单。\n\n一旦客户点击提交按钮进行回复，该回复将通过 `post` 方法传递到索引（控制器）。\n\n\
    ## 根据表单输入更新数据库表\n\n完成站点投票示例还需要最后一步。我们需要检索用户通过表单提交的任何输入，并用接收到的输入更新投票表。如果网站访问者提交了\
    \ `no`，我们将增加投票数据库表中 `no` 属性的值。\n\n所有数据交互都是模型的任务。让我们用一个更新数据库表的方法来更新投票模型类。\n\n```\n\
    db property\n$this->db = $dbConnection;\n}\npublic function getPollData() {\n\
    $sql = \"SELECT poll_question, yes, no FROM poll WHERE poll_id = 1\";\n$statement\
    \ = $this->db->prepare($sql);\n$statement->execute();\n$pollData = $statement->fetchObject();\n\
    return $pollData;\n}\npublic function updatePoll ( $input ) {\nif ( $input ===\
    \ \"yes\" ) {\n$updateSQL = \"UPDATE poll SET yes = yes+1 WHERE poll_id = 1\"\
    ;\n} else if ( $input === \"no\" ) {\n$updateSQL = \"UPDATE poll SET no = no+1\
    \ WHERE poll_id = 1\";\n}\n$updateStatement = $this->db->prepare($updateSQL);\n\
    $updateStatement->execute();\n}\n}\n?>\n```\n\n新方法 `updatePoll()` 与 `getPollData`\
    \ 方法类似。但是，如果用户提交了 `yes`，我们将格式化一个 SQL 字符串来更新投票表中的 `yes` 属性。如果用户提交了 `no`，我们将格式化另一个\
    \ SQL 字符串来更新 `no` 属性。注意，yes 或 no 的值会增加 1，以便将用户的选择添加到数据库表中的正确位置。无论创建哪个 SQL 字符串，它都会被存储在一个名为\
    \ `$updateSQL` 的变量中。一旦 `$updateSQL` 字符串创建完成，我们再次使用 PDO 方法 `prepare()` 将 SQL 字符串转换为\
    \ `PDOStatement` 对象，并将其存储在变量 `$updateStatement` 中。然后我们调用 `execute()` 来更新投票表。\n\
    \n### 安全编程\n\n我们应当时刻警惕黑客可能试图利用 *SQL 注入* 来破坏我们的表和数据库。SQL 注入是一种尝试将 SQL 语句插入到程序使用\
    \ SQL 进行插入或更新数据库数据中的行为。在未来的章节中，我们将使用预编译语句来创建我们的 SQL 命令，这将降低注入成功的可能性。我们还会在对数据库进行任何更新之前验证数据。在前面的例子中，我们没有使用任何从用户那里收集的信息来格式化\
    \ SQL 语句。因此，创建的 SQL 语句是安全的，能够抵御 SQL 注入。\n\n## 响应用户输入\n\n控制器负责处理用户交互。因此，`投票控制器`\
    \ 是拦截来自投票表单的用户输入的正确位置。需要向脚本中添加几项内容。\n\n```\nupdatePoll( $input );\n}\n$pollData\
    \ = $poll->getPollData();\ninclude_once \"views/completepoll-html.php\";\n?>\n\
    ```\n\n```\n//检查表单是否已提交\n$isPollSubmitted = isset( $_POST['user-input'] );\n//如果刚刚提交...\n\
    if ( $isPollSubmitted ) {\n```\n\n我们将使用 `isset` 方法来判断用户是否已选择在调查中发表意见。如果他们选择了，我们将更新结果。\n\
    \n```\n//获取从表单接收的输入\n$input = $_POST['user-input'];\n//...更新模型\n$poll->updatePoll(\
    \ $input );\n}\n```\n\n如果他们确实提交了，我们将检索选定的值并将其放入 `$input` 中。然后我们将该值传递给 `updatePoll`\
    \ 方法，该方法将对数据库表进行更改。\n\n```\n$pollData = $poll->getPollData();\ninclude_once \"\
    views/completepoll-html.php\";\n```\n\n无论用户是否提供了意见，程序都将获取当前的投票结果，并通过调用 HTML 页面来显示它们。\n\
    \n**注意**：索引（控制器）程序发生了一个小改动，用于调用 `completepoll.php`。您可以在从出版商网站下载的文件中查看到此更改。\n\n\
    要查看结果，请在浏览器中运行 `completepollindex.php`。\n\n![一个应用程序输出（completepollindex.php）显示\
    \ PHP 和投票结果：2 人回答是，0 人回答否。](img/323857_3_En_6_Fig13_HTML.jpg)  \n**图 6-13** 来自\
    \ completepollindex.php 的输出\n\n我们现在有一个功能完备的投票网站！这个最终版本有一个弱点。您能看出来吗？一旦用户输入了他们的意见，程序允许他们再次输入。如何纠正这个问题？我们可以更改输出，使其仅在页面首次显示时显示问题。一旦意见被提交，我们就可以显示不再询问问题但显示结果的页面。我们可以修改结果，使其使用之前创建的\
    \ `finalpoll-html.php`。这只需要更改前面讨论过的 include 语句。\n\n**练习**：调整最终的投票项目，以接受用户的多个输入。调整控制器、模型和视图来请求、存储和显示这些信息。\n\
    \n## 总结\n\n在本章中，我们学习了 SQL 语句的基础知识，以及如何使用 PHP 与数据库交互。我们学习了 MVC 如何为创建需要数据和界面的程序提供逻辑结构。在接下来的章节中，我们将学习如何构建一个带有基本条目管理器的博客，该管理器允许我们创建、修改和删除条目，并在公共页面上显示它们。\n\
    \n## 项目\n\n1.  MVC 设计的力量在于，能够在很少或不需要更改项目其他组件的情况下更改模型或视图。查看 PHP 文档 ([`www.php.net/manual/en/function.file.php`](http://www.php.net/manual/en/function.file.php))\
    \ 关于文件读写的内容。更改示例中的模型代码，以将投票信息读取并存储到文件中，而不是数据库中。您应该能够在几乎无需修改控制器或查看器的情况下进行这些更改。大部分更改应发生在模型内部。\n\
    2.  访问 [`www.w3schools.in/laravel-tutorial/`](http://www.w3schools.in/laravel-tutorial/)\
    \ 并了解 Laravel 如何帮助使用 PHP 和其他工具创建健壮的、数据驱动的 Web 应用程序。\n\n# 7. 构建基本博客系统\n\n## 目标\n\
    \n完成本章后，您将能够：\n\n- 创建一个包含 HTML 表单的视图，用于接受新的博客条目\n- 创建一个控制器，用于处理来自表单的输入\n- 创建一个模型，用于使用数据库表保存和检索任何条目\n\
    - 设计并创建一个包含表的 MySQL/MariaDB 数据库\n- 为前端控制器使用设计模式\n- 为数据库访问使用表数据网关设计模式\n- 使用 `while`\
    \ 循环遍历数据集\n\n在本章中，我们将开始构建我们的博客系统。我们将从创建一个条目管理器（前端控制器）开始。我们将为博客系统创建两个首页，一个用于管理员，一个用于用户。到本章结束时，基本博客系统将能够保存新博客并显示存储在数据库中的所有条目。在此过程中，我们将使用之前介绍过的概念和主题：数据库设计、SQL\
    \ 和 MVC。我们还将学习新技术，包括设计实践和预编译 SQL 语句。\n\n### 创建 blog_entry 数据库表\n\n任何新应用程序最重要的步骤之一是规划用于保存数据的表。这对以后应用程序扩展的难易程度有着巨大的影响。*扩展*是指应用程序为管理更多信息和/或用户而进行的扩展，如果在开始新项目时没有长远考虑，这可能会非常痛苦。起初，博客需要存储几种类型的条目信息才能运行，包括以下内容：\n\
    \n- 唯一 ID\n- 条目标题\n- 条目文本\n- 创建日期\n\n第一步是确定条目表的字段类型。\n"
- fmt: '# 数据库表单设计


    - `entry_id`：唯一标识条目的数字。这将是一个正整数，并且该数字自动递增以确保唯一性。`entry_id`将是该表的主键。


    - `title`：相对较短的字母数字字符串。我们将字符串限制为150个字符。


    - `entry_text`：长度不确定的字母数字字符串。我们不会限制此字段的长度（在合理范围内）。


    - `date_created`：在条目首次创建时自动生成的时间戳。我们将使用此字段对条目进行按时间排序，并让用户知道条目的原始发布时间。


    现在我们已经确定了所需的字段，是时候创建数据库了。使用我们在前一章学到的技术，让我们开始吧。请记住，Apache和MySQL/MariaDB都需要运行才能使我们的应用程序正常工作。


    ```sql

    CREATE DATABASE simple_blog

    ```


    我们可以将上述代码输入到phpMyAdmin的SQL窗口中，或者使用phpMyAdmin的“数据库”菜单项创建数据库。


    下一步是创建`entries`表。请记住从phpMyAdmin控制面板左侧的菜单中选择`simple_blog`数据库。


    ```sql

    CREATE TABLE blog_entry (

    entry_id INT NOT NULL AUTO_INCREMENT,

    title VARCHAR( 150 ),

    entry_text TEXT,

    date_created TIMESTAMP DEFAULT CURRENT_TIMESTAMP,

    PRIMARY KEY ( entry_id )

    )

    ```


    我们可以在SQL窗口中输入上述代码。或者，在选择数据库后，使用phpMyAdmin提供的创建表文本框。如果选择使用文本框输入值，请确保输入的所有信息与上述代码中提供的信息一致。


    `title`属性有一个新的数据类型：`VARCHAR(150)`。因此，任何标题都必须包含可变长度的`CHAR`acter。博客条目标题可以是0到150个字符之间的字符串。如果我们插入一个长度为151个字符的标题，则只有前150个字符会保存到`blog_entry`表中。数据库确保我们输入的值在保存之前是有效的。


    `date_created`属性也声明了一个新的数据类型：`TIMESTAMP`。`TIMESTAMP`保存关于某一时刻的精确信息。它存储*年*、*月*、*日*、*时*、*分*和*秒*，格式为YYYY-MM-DD
    HH:MM:SS。


    我们已经讨论过在MySQL表中使用默认值。这里，它再次用于`date_created`属性。当第一次插入新条目时，MySQL/MariaDB将根据服务器时钟自动存储当前的`TIMESTAMP`。服务器时钟将基于服务器所在的时区。


    # 规划PHP脚本


    我们的下一个逻辑步骤是创建一个博客条目编辑器，以便我们可以创建新的博客条目。此博客条目编辑器仅供博客作者使用。普通网站访问者无法创建新条目。普通网站访问者应只能查看博客条目，不能编辑现有条目或创建新条目。


    处理此类任务的一种方法是创建两个主要的站点入口：`index.php`（供普通访问者使用）和`admin.php`。在MVC术语中，`index.php`和`admin.php`都将是*前端控制器*。在后面的章节中，我们将学习如何使用登录来限制对`admin.php`的访问。


    管理页面将列出所有博客条目，并提供对条目编辑器的访问，以创建新条目以及编辑或删除现有条目。这将需要单独的视图：一个用于列出所有条目，另一个用于显示编辑器。


    程序`admin.php`将显示一个HTML5页面。它将允许管理员决定是显示编辑器还是列出所有条目。图[7-1]使用MVC架构开发了博客管理模块的概要示意图。


    ![图7-1：责任分配](images/323857_3_En_7_Chapter/323857_3_En_7_Fig1_HTML.png)


    图表反映了前端控制器的职责，主要分为三个部分：模型、视图和控制器。


    **图7-1** 责任分配


    请注意，每个视图都有一个对应的控制器。条目模型显示所有条目并保存任何新条目。


    # 管理视图：创建管理博客站点


    让我们创建一个名为`ch7`的新文件夹，并在`ch7`文件夹内创建一个`blog`文件夹。在`blog`文件夹内，我们还将创建另外四个文件夹：`models`、`views`、`controllers`和`CSS`。


    我们现在可以将`ch4`中`template`文件夹中的`page.php`程序复制到`blog`下的`views`文件夹中。我们还可以将`ch4 classes`文件夹中的`Page_Data.class.php`程序复制到`models`文件夹中。我们将创建一个空白样式表（稍后编写代码），并将其放置在`CSS`文件夹中，命名为`blog.css`。当然，我们可以从出版商的网站下载本章的文件。


    现在是时候创建`admin.php`的测试版本（我们的前端控制器）了，以验证一切是否正常协同工作。


    ```php

    <?php

    $pageData = new Page_Data();

    $pageData->setTitle("PHP/MySQL blog demo");

    $pageData->setCss("");

    $pageData->setContent("YES!");

    include_once "views/page.php";

    echo $page;

    ?>

    ```


    **清单7-1** `admin.php`


    > **注意**：如果您从`ch4`文件夹复制了`Page_Data.class.php`，则需要调整使用`if`语句进行的验证，以允许传入此清单以及本章后续清单中的值。如果您没有看到预期的结果，请检查此文件中的安全限制。出版商网站上的`Page_Data.class.php`文件已经包含了所需的调整。


    这段代码看起来应该很熟悉，因为它类似于我们在前几章中创建的基本前端控制器。唯一的补充是包含的样式表。


    测试此程序时，一切都应正常运行；我们应该得到一个格式良好的HTML5页面，其中`<title>`为“PHP/MySQL blog demo”，并且一个`<h1>`元素愉快地显示“YES！”在浏览器中看到“YES”是项目设置正确的视觉确认。如果我们查看源代码，我们还会看到用于访问CSS样式表的HTML链接已正确定位在标题部分。


    # 创建管理员条目管理器导航


    条目管理器（前端控制器）将有两个视图：一个用于列出所有条目，另一个用于显示条目编辑器。让我们创建一个导航来访问这些视图。


    但首先，我们可以预料到，在完成之前，这个项目将包含许多PHP文件。让我们创建一些文件夹，将与管理模块相关的脚本分组在一起。我们将在现有的`views`文件夹中创建一个名为`admin`的文件夹。我们将在此文件夹中放置管理导航的第一个版本。


    ```php

    <?php

    $nav = "<h1>Blog Admin</h1>

    <a href=''admin.php''>All entries</a>

    <a href=''admin.php?editor''>Editor</a>

    ";

    ?>

    ```


    **清单7-2** `admin-navigation.php`


    我们可以看到条目管理器导航与我们之前创建的导航非常相似。


    管理导航是一个*静态视图*，意味着脚本中没有动态或数据库驱动的信息。我们不需要为导航创建模型，因为所有内容都是硬编码的。我们需要一个控制器来在需要加载导航时加载它。导航将一直加载并显示。我们将从一个新版本的前端控制器来控制这一点。


    ```php

    <?php

    include_once "models/Page_Data.class.php";

    $pageData = new Page_Data();

    $pageData->setTitle("PHP/MySQL blog demo");

    $pageData->setCss("");

    include_once "views/admin/admin-navigation.php";

    $pageData->setContent($nav . "YES!");

    include_once "views/page.php";

    echo $page;

    ?>

    ```


    **清单7-3** `adminWithNavigation.php`


    程序只做了三个小调整。导航程序已包含在代码的顶部。`$nav`变量已被添加到传递给`setContent`方法的字符串中。导航程序也已调整，以调用此新版本的管理页面。


    ![图7-2：管理员导航页面](images/323857_3_En_7_Chapter/323857_3_En_7_Fig2_HTML.jpg)'
