- fmt: "# Handling Multiple-Choice Form Elements\n\nThe form in `contact.php` uses\
    \ only text input fields and a text area. To work successfully with forms, you\
    \ also need to know how to handle multiple-choice elements, namely:\n\n- Radio\
    \ buttons\n- Check boxes\n- Drop-down option menus\n- Multiple-choice lists\n\n\
    The principle behind them is the same as the text input fields you have been working\
    \ with: the `name` attribute of the form element is used as the key in the `$_POST`\
    \ array. However, there are some important differences:\n\n- Check-box groups\
    \ and multiple-choice lists store selected values as an array, so you need to\
    \ add an empty pair of square brackets at the end of the `name` attribute for\
    \ these types of input. For example, for a check-box group called `interests`,\
    \ the `name` attribute in each `<input>` tag should be `name=\"interests[]\"`.\
    \ If you omit the square brackets, only the last item selected is transmitted\
    \ through the `$_POST` array.\n- The values of selected items in a check-box group\
    \ or multiple-choice list are transmitted as a subarray of the `$_POST` array.\
    \ The code in PHP Solution 5-5 automatically converts these subarrays to comma-separated\
    \ strings. However, when using a form for other purposes, you need to extract\
    \ the values from the subarrays. You’ll see how to do so in later chapters.\n\
    - Radio buttons, check boxes, and multiple-choice lists are not included in the\
    \ `$_POST` array if no value is selected. Consequently, it’s vital to use `isset()`\
    \ to check for their existence before attempting to access their values when processing\
    \ the form.\n\nThe remaining PHP solutions in this chapter show how to handle\
    \ multiple-choice form elements. Rather than go through each step in detail, I’ll\
    \ just highlight the important points. Bear the following points in mind when\
    \ working through the rest of this chapter:\n\n- Processing these elements relies\
    \ on the code in `processmail.php`.\n- You must add the `name` attribute of each\
    \ element to the `$expected` array for it to be added to the message body.\n-\
    \ To make a field required, add its `name` attribute to the `$required` array.\n\
    - If a field that’s not required is left blank, the code in `processmail.php`\
    \ sets its value to “Not selected.”\n\nFigure 5-7 shows `contact.php` with each\
    \ type of input added to the original design.\n\n![A978-1-4842-0635-5_5_Fig7_HTML.jpg](A978-1-4842-0635-5_5_Fig7_HTML.jpg)\n\
    \n*Figure 5-7. The feedback form with examples of multiple-choice form elements*\n\
    \n> **Tip:** HTML5 adds many new types of form input. They all use the `name`\
    \ attribute and send values as text or as a subarray of the `$_POST` array, so\
    \ you should be able to adapt the code accordingly.\n\n## PHP Solution 5-6: Handling\
    \ Radio-Button Groups\n\nRadio-button groups let you pick only one value. Although\
    \ it’s common to set a default value in the HTML markup, it’s not obligatory.\
    \ This PHP solution shows how to handle both scenarios.\n\nThe simple way to deal\
    \ with radio buttons is to make one of them the default. The radio group is always\
    \ included in the `$_POST` array because a value is always selected.\n\nThe code\
    \ for a radio group with a default value looks like this (the `name` attributes\
    \ and PHP code are highlighted in bold):\n\n```\n<fieldset id=\"subscribe\">\n\
    \  <h2>Subscribe to newsletter?</h2>\n  <p>\n    <input name=\"subscribe\" type=\"\
    radio\" value=\"Yes\" id=\"subscribe-yes\"\n    <?php\n    if ($_POST && $_POST['subscribe']\
    \ == 'Yes') {\n      echo 'checked';\n    } ?> >\n    <label for=\"subscribe-yes\"\
    >Yes</label>\n\n    <input name=\"subscribe\" type=\"radio\" value=\"No\" id=\"\
    subscribe-no\"\n    <?php\n    if (!$_POST || $_POST['subscribe'] == 'No') {\n\
    \      echo 'checked';\n    } ?> >\n    <label for=\"subscribe-no\">No</label>\n\
    \  </p>\n</fieldset>\n```\n\nAll members of the radio group share the same `name`\
    \ attribute. Because only one value can be selected, the `name` attribute does\
    \ not end with a pair of empty brackets.\n\nThe conditional statement related\
    \ to the Yes button checks `$_POST` to see if the form has been submitted. If\
    \ it has and the value of `$_POST['subscribe']` is “Yes,” the `checked` attribute\
    \ is added to the `<input>` tag.\n\nIn the No button, the conditional statement\
    \ uses `||` (or). The first condition is `!$_POST`, which is `true` when the form\
    \ hasn’t been submitted. If `true`, the `checked` attribute is added as the default\
    \ value when the page first loads. If `false`, it means the form has been submitted,\
    \ so the value of `$_POST['subscribe']` is checked.\n\nWhen a radio button doesn’t\
    \ have a default value, it’s not included in the `$_POST` array, so it isn’t detected\
    \ by the loop in `processmail.php` that builds the `$missing` array. To ensure\
    \ that the radio button element is included in the `$_POST` array, you need to\
    \ test for its existence after the form has been submitted. If it isn’t included,\
    \ you need to set its value to an empty string, like this:\n\n```\n$required =\
    \ ['name', 'comments', 'email', 'subscribe'];\n// set default values for variables\
    \ that might not exist\nif (!isset($_POST['subscribe'])) {\n  $_POST['subscribe']\
    \ = '';\n}\n```\n\nIf the radio-button group is required but not selected, you\
    \ need to display an error message when the form reloads. You also need to change\
    \ the conditional statements in the `<input>` tags to reflect the different behavior.\n\
    \nThe following listing shows the `subscribe` radio-button group from `contact_08.php`,\
    \ with all the PHP code highlighted in bold:\n\n```\n<fieldset id=\"subscribe\"\
    >\n  <h2>Subscribe to newsletter?\n    <?php if ($missing && in_array('subscribe',\
    \ $missing)) { ?>\n      <span class=\"warning\">Please make a selection</span>\n\
    \    <?php } ?>\n  </h2>\n  <p>\n    <input name=\"subscribe\" type=\"radio\"\
    \ value=\"Yes\" id=\"subscribe-yes\"\n    <?php\n    if ($_POST && $_POST['subscribe']\
    \ == 'Yes') {\n      echo 'checked';\n    } ?> >\n    <label for=\"subscribe-yes\"\
    >Yes</label>\n\n    <input name=\"subscribe\" type=\"radio\" value=\"No\" id=\"\
    subscribe-no\"\n    <?php\n    if ($_POST && $_POST['subscribe'] == 'No') {\n\
    \      echo 'checked';\n    } ?> >\n    <label for=\"subscribe-no\">No</label>\n\
    \  </p>\n</fieldset>\n```\n\nThe conditional statement that controls the warning\
    \ message in the `<h2>` tag uses the same technique as for the text input fields.\
    \ The message is displayed if the radio group is a required item and it’s in the\
    \ `$missing` array.\n\nThe conditional statement surrounding the `checked` attribute\
    \ is the same in both radio buttons. It checks if the form has been submitted\
    \ and displays the `checked` attribute only if the value in `$_POST['subscribe']`\
    \ matches."
  raw: '## Handling Multiple-Choice Form Elements


    The form in `contact.php` uses only text input fields and a text area. To work
    successfully with forms, you also need to know how to handle multiple-choice elements,
    namely:


    *   Radio buttons

    *   Check boxes

    *   Drop-down option menus

    *   Multiple-choice lists


    The principle behind them is the same as the text input fields you have been working
    with: the `name` attribute of the form element is used as the key in the `$_POST`
    array. However, there are some important differences:


    *   Check-box groups and multiple-choice lists store selected values as an array,
    so you need to add an empty pair of square brackets at the end of the `name` attribute
    for these types of input. For example, for a check-box group called `interests`,
    the `name` attribute in each `<input>` tag should be `name="interests[]"`. If
    you omit the square brackets, only the last item selected is transmitted through
    the `$_POST` array.

    *   The values of selected items in a check-box group or multiple-choice list
    are transmitted as a subarray of the `$_POST` array. The code in PHP Solution
    5-5 automatically converts these subarrays to comma-separated strings. However,
    when using a form for other purposes, you need to extract the values from the
    subarrays. You’ll see how to do so in later chapters.

    *   Radio buttons, check boxes, and multiple-choice lists are not included in
    the `$_POST` array if no value is selected. Consequently, it’s vital to use `isset()`to
    check for their existence before attempting to access their values when processing
    the form.


    The remaining PHP solutions in this chapter show how to handle multiple-choice
    form elements. Rather than go through each step in detail, I’ll just highlight
    the important points. Bear the following points in mind when working through the
    rest of this chapter:


    *   Processing these elements relies on the code in `processmail.php`.

    *   You must add the `name` attribute of each element to the `$expected` array
    for it to be added to the message body.

    *   To make a field required, add its `name` attribute to the `$required` array.

    *   If a field that’s not required is left blank, the code in `processmail.php`
    sets its value to “Not selected.”


    Figure [5-7](#A978-1-4842-0635-5_5_Chapter.html#Fig7) shows `contact.php` with
    each type of input added to the original design.


    ![A978-1-4842-0635-5_5_Fig7_HTML.jpg](A978-1-4842-0635-5_5_Fig7_HTML.jpg)


    Figure 5-7.


    The feedback form with examples of multiple-choice form elements Tip


    HTML5 adds many new types of form input. They all use the `name` attribute and
    send values as text or as a subarray of the `$_POST` array, so you should be able
    to adapt the code accordingly.


    ### PHP Solution 5-6: Handling Radio-Button Groups


    Radio-button groups let you pick only one value. Although it’s common to set a
    default value in the HTML markup, it’s not obligatory. This PHP solution shows
    how to handle both scenarios.


    The simple way to deal with radio buttons is to make one of them the default.
    The radio group is always included in the `$_POST` array because a value is always
    selected.  


    The code for a radio group with a default value looks like this (the `name` attributes
    and PHP code are highlighted in bold):


    `<fieldset id="subscribe">`


    `<h2>Subscribe to newsletter?</h2>`


    `<p>`


    `<input` `name="subscribe"` `type="radio" value="Yes" id="subscribe-yes"`


    `<?php`


    `if ($_POST` `&&` `$_POST[''subscribe''] == ''Yes'') {`


    `echo ''checked'';`


    `} ?>` `>`


    `<label for="subscribe-yes">Yes</label>`


    `<input` `name="subscribe"` `type="radio" value="No" id="subscribe-no"`


    `<?php`


    `if (!$_POST || $_POST[''subscribe''] == ''No'') {`


    `echo ''checked'';`


    `} ?>` `>`


    `<label for="subscribe-no">No</label>`


    `</p>`


    `</fieldset>`


    All members of the radio group share the same `name` attribute. Because only one
    value can be selected, the `name` attribute does not end with a pair of empty
    brackets.


    The conditional statement related to the Yes button checks `$_POST` to see if
    the form has been submitted. If it has and the value of `$_POST[''subscribe'']`
    is “Yes,” the `checked` attribute is added to the `<input>` tag.


    In the No button, the conditional statement uses `||` (or). The first condition
    is `!$_POST`, which is `true` when the form hasn’t been submitted. If `true`,
    the `checked` attribute is added as the default value when the page first loads.
    If `false`, it means the form has been submitted, so the value of `$_POST[''subscribe'']`
    is checked.


    When a radio button doesn’t have a default value, it’s not included in the `$_POST`
    array, so it isn’t detected by the loop in `processmail.php` that builds the `$missing`
    array. To ensure that the radio button element is included in the `$_POST` array,
    you need to test for its existence after the form has been submitted. If it isn’t
    included, you need to set its value to an empty string, like this:  


    `$required = [''name'', ''comments'', ''email''` `, ''subscribe''` `];`


    `// set default values for variables that might not exist`


    `if (!isset($_POST[''subscribe''])) {`


    `$_POST[''subscribe''] = '''';`


    `}`


    If the radio-button group is required but not selected, you need to display an
    error message when the form reloads. You also need to change the conditional statements
    in the `<input>` tags to reflect the different behavior.  


    The following listing shows the `subscribe` radio-button group from `contact_08.php`,
    with all the PHP code highlighted in bold:


    `<fieldset id="subscribe">`


    `<h2>Subscribe to newsletter?`


    `<?php if ($missing` `&&` `in_array(''subscribe'', $missing)) { ?>`


    `<span class="warning">Please make a selection</span>`


    `<?php } ?>`


    `</h2>`


    `<p>`


    `<input name="subscribe" type="radio" value="Yes" id="subscribe-yes"`


    `<?php`


    `if ($_POST` `&&` `$_POST[''subscribe''] == ''Yes'') {`


    `echo ''checked'';`


    `} ?>` `>`


    `<label for="subscribe-yes">Yes</label>`


    `<input name="subscribe" type="radio" value="No" id="subscribe-no"`


    `<?php`


    `if ($_POST` `&&` `$_POST[''subscribe''] == ''No'') {`


    `echo ''checked'';`


    `} ?>` `>`


    `<label for="subscribe-no">No</label>`


    `</p>`


    `</fieldset>`


    The conditional statement that controls the warning message in the `<h2>` tag
    uses the same technique as for the text input fields. The message is displayed
    if the radio group is a required item and it’s in the `$missing` array.


    The conditional statement surrounding the `checked` attribute is the same in both
    radio buttons. It checks if the form has been submitted and displays the checked
    attribute only if the value in `$_POST[''subscribe'']` matches.'
  trans: "\n# 处理多项选择表单元素\n\n`contact.php` 中的表单仅使用了文本输入字段和文本区域。为了成功处理表单，你还需要了解如何处理多项选择元素，即：\n\
    \n- 单选按钮\n- 复选框\n- 下拉选项菜单\n- 多项选择列表\n\n它们背后的原理与你一直使用的文本输入字段相同：表单元素的 `name` 属性作为\
    \ `$_POST` 数组中的键。然而，存在一些重要差异：\n\n- 复选框组和多项选择列表将选中的值存储为数组，因此你需要在 `name` 属性的末尾添加一对空方括号。例如，对于一个名为\
    \ `interests` 的复选框组，每个 `<input>` 标签中的 `name` 属性应为 `name=\"interests[]\"`。如果省略方括号，则只有最后选中的项目会通过\
    \ `$_POST` 数组传递。\n- 复选框组或多项选择列表中选中项目的值会作为 `$_POST` 数组的子数组传递。PHP 解决方案 5-5 中的代码会自动将这些子数组转换为逗号分隔的字符串。但是，当将表单用于其他目的时，你需要从子数组中提取值。你将在后续章节中了解如何操作。\n\
    - 如果未选中任何值，则单选按钮、复选框和多项选择列表不会包含在 `$_POST` 数组中。因此，在处理表单时，在尝试访问它们的值之前，必须使用 `isset()`\
    \ 检查它们是否存在，这一点至关重要。\n\n本章中剩余的 PHP 解决方案展示了如何处理多项选择表单元素。我不会详细讲解每个步骤，而是重点强调关键点。在完成本章剩余部分时，请牢记以下几点：\n\
    \n- 处理这些元素依赖于 `processmail.php` 中的代码。\n- 必须将每个元素的 `name` 属性添加到 `$expected` 数组中，才能将其添加到消息正文中。\n\
    - 若要将字段设为必填项，请将其 `name` 属性添加到 `$required` 数组中。\n- 如果非必填字段留空，`processmail.php`\
    \ 中的代码会将其值设置为“未选择”。\n\n图 5-7 展示了将每种输入类型添加到原始设计后的 `contact.php`。\n\n![A978-1-4842-0635-5_5_Fig7_HTML.jpg](img/A978-1-4842-0635-5_5_Fig7_HTML.jpg)\n\
    \n*图 5-7. 包含多项选择表单元素示例的反馈表单*\n\n> **提示：** HTML5 新增了许多表单输入类型。它们都使用 `name` 属性，并以文本或\
    \ `$_POST` 数组的子数组形式发送值，因此你应该能够相应调整代码。\n\n## PHP 解决方案 5-6：处理单选按钮组\n\n单选按钮组允许你仅选择一个值。虽然在\
    \ HTML 标记中设置默认值很常见，但这不是必须的。本 PHP 解决方案展示了如何处理这两种情况。\n\n处理单选按钮的简单方法是将其中的一个设为默认值。由于始终会选中一个值，因此单选按钮组始终包含在\
    \ `$_POST` 数组中。\n\n带有默认值的单选按钮组代码如下所示（`name` 属性和 PHP 代码以粗体突出显示）：\n\n```\n<fieldset\
    \ id=\"subscribe\">\n  <h2>订阅时事通讯？</h2>\n  <p>\n    <input name=\"subscribe\"\
    \ type=\"radio\" value=\"是\" id=\"subscribe-yes\"\n    <?php\n    if ($_POST &&\
    \ $_POST['subscribe'] == '是') {\n      echo 'checked';\n    } ?> >\n    <label\
    \ for=\"subscribe-yes\">是</label>\n\n    <input name=\"subscribe\" type=\"radio\"\
    \ value=\"否\" id=\"subscribe-no\"\n    <?php\n    if (!$_POST || $_POST['subscribe']\
    \ == '否') {\n      echo 'checked';\n    } ?> >\n    <label for=\"subscribe-no\"\
    >否</label>\n  </p>\n</fieldset>\n```\n\n单选按钮组的所有成员共享相同的 `name` 属性。因为只能选择一个值，所以\
    \ `name` 属性不以一对空方括号结尾。\n\n与“是”按钮相关的条件语句检查 `$_POST` 以查看表单是否已提交。如果已提交且 `$_POST['subscribe']`\
    \ 的值为“是”，则向 `<input>` 标签添加 `checked` 属性。\n\n在“否”按钮中，条件语句使用了 `||`（或）。第一个条件是 `!$_POST`，当表单尚未提交时，该条件为\
    \ `true`。如果为 `true`，则在页面首次加载时将 `checked` 属性作为默认值添加。如果为 `false`，则表示表单已提交，因此会检查\
    \ `$_POST['subscribe']` 的值。\n\n当单选按钮没有默认值时，它不会包含在 `$_POST` 数组中，因此不会被 `processmail.php`\
    \ 中构建 `$missing` 数组的循环检测到。为了确保单选按钮元素包含在 `$_POST` 数组中，你需要在表单提交后测试其是否存在。如果未包含，你需要将其值设置为空字符串，如下所示：\n\
    \n```\n$required = ['name', 'comments', 'email', 'subscribe'];\n// 为可能不存在的变量设置默认值\n\
    if (!isset($_POST['subscribe'])) {\n  $_POST['subscribe'] = '';\n}\n```\n\n如果单选按钮组是必填项但未选择，则在表单重新加载时需要显示错误消息。你还需要更改\
    \ `<input>` 标签中的条件语句以反映不同的行为。\n\n以下清单展示了 `contact_08.php` 中的 `subscribe` 单选按钮组，所有\
    \ PHP 代码以粗体突出显示：\n\n```\n<fieldset id=\"subscribe\">\n  <h2>订阅时事通讯？\n    <?php\
    \ if ($missing && in_array('subscribe', $missing)) { ?>\n      <span class=\"\
    warning\">请做出选择</span>\n    <?php } ?>\n  </h2>\n  <p>\n    <input name=\"subscribe\"\
    \ type=\"radio\" value=\"是\" id=\"subscribe-yes\"\n    <?php\n    if ($_POST &&\
    \ $_POST['subscribe'] == '是') {\n      echo 'checked';\n    } ?> >\n    <label\
    \ for=\"subscribe-yes\">是</label>\n\n    <input name=\"subscribe\" type=\"radio\"\
    \ value=\"否\" id=\"subscribe-no\"\n    <?php\n    if ($_POST && $_POST['subscribe']\
    \ == '否') {\n      echo 'checked';\n    } ?> >\n    <label for=\"subscribe-no\"\
    >否</label>\n  </p>\n</fieldset>\n```\n\n控制 `<h2>` 标签中警告消息的条件语句使用了与文本输入字段相同的技术。如果单选按钮组是必填项且位于\
    \ `$missing` 数组中，则会显示该消息。\n\n两个单选按钮中围绕 `checked` 属性的条件语句相同。它检查表单是否已提交，并且仅当 `$_POST['subscribe']`\
    \ 中的值匹配时才显示 `checked` 属性。\n"
- fmt: "### PHP Solution 5-7: Handling Check-Box Groups\n\nCheck boxes can be used\
    \ individually or in groups. The method of handling them is slightly different.\
    \ This PHP solution shows how to deal with a check-box group called `interests`.\
    \ PHP Solution 5-10 explains how to handle a single check box.\n\nWhen used as\
    \ a group, all check boxes in the group share the same `name` attribute, which\
    \ needs to end with an empty pair of square brackets in order for PHP to transmit\
    \ the selected values as an array. To identify which check boxes have been selected,\
    \ each one needs a unique `value` attribute.\n\nIf no items are selected, the\
    \ check-box group is not included in the `$_POST` array. After the form has been\
    \ submitted, you need to check the `$_POST` array to see if it contains a subarray\
    \ for the check-box group. If it doesn’t, you need to create an empty subarray\
    \ as the default value for the script in `processmail.php`.\n\nTo save space,\
    \ just the first two check boxes of the group are shown. The `name` attribute\
    \ and PHP sections of code are highlighted in bold.\n\n```\n<fieldset id=\"interests\"\
    >\n<h2>Interests in Japan</h2>\n<div>\n<p>\n<input type=\"checkbox\" name=\"interests[]\"\
    \ value=\"Anime/manga\"\nid=\"anime\"\n<?php\nif ($_POST && in_array('Anime/manga',\
    \ $_POST['interests'])) {\necho 'checked';\n} ?>>\n<label for=\"anime\">Anime/manga</label>\n\
    </p>\n<p>\n<input type=\"checkbox\" name=\"interests[]\" value=\"Arts & crafts\"\
    \nid=\"art\"\n<?php\nif ($_POST && in_array('Arts & crafts', $_POST['interests']))\
    \ {\necho 'checked';\n} ?>>\n<label for=\"art\">Arts &amp; crafts</label>\n</p>\n\
    . . .\n</div>\n</fieldset>\n```\n\nEach check box shares the same `name` attribute,\
    \ which ends with an empty pair of square brackets, so the data is treated as\
    \ an array. If you omit the brackets, `$_POST['interests']` contains the value\
    \ of only the first check box selected.\n\n> **Note:** Although the brackets must\
    \ be added to the `name` attribute for multiple selections, the subarray of selected\
    \ values is in `$_POST['interests']`, not `$_POST['interests[]']`.\n\nThe PHP\
    \ code inside each check-box element performs the same role as in the radio-button\
    \ group, wrapping the `checked` attribute in a conditional statement. The first\
    \ condition checks that the form has been submitted. The second condition uses\
    \ the `in_array()` function to check whether the `value` associated with that\
    \ check box is in the `$_POST['interests']` subarray. If it is, it means the check\
    \ box was selected.\n\nAfter the form has been submitted, you need to check for\
    \ the existence of `$_POST['interests']`. If it hasn't been set, you must create\
    \ an empty array as the default value for the rest of the script to process. The\
    \ code follows the same pattern as for the radio group:\n\n```\n$required = ['name',\
    \ 'comments', 'email', 'subscribe', 'interests'];\n// set default values for variables\
    \ that might not exist\nif (!isset($_POST['subscribe'])) {\n    $_POST['subscribe']\
    \ = '';\n}\nif (!isset($_POST['interests'])) {\n    $_POST['interests'] = [];\n\
    }\n```\n\nTo set a minimum number of required check boxes, use the `count()` function\
    \ to confirm the number of values transmitted from the form. If it's less than\
    \ the minimum required, add the group to the `$errors` array, like this:\n\n```\n\
    if (!isset($_POST['interests'])) {\n    $_POST['interests'] = [];\n}\n// minimum\
    \ number of required check boxes\n$minCheckboxes = 2;\nif (count($_POST['interests'])\
    \ < $minCheckboxes) {\n    $errors['interests'] = true;\n}\n```\n\nThe `count()`\
    \ function returns the number of elements in an array, so this creates `$errors['interests']`\
    \ if fewer than two check boxes have been selected. You might be wondering why\
    \ I have used a variable instead of the number like this:\n\n```\nif (count($_POST['interests'])\
    \ < 2) {\n```\n\nThis certainly works and it involves less typing, but `$minCheckboxes`\
    \ can be reused in the error message. Storing the number in a variable means this\
    \ condition and the error message always remain in sync.\n\nThe error message\
    \ in the body of the form looks like this:\n\n```\n<h2>Interests in Japan\n<?php\
    \ if (isset($errors['interests'])) { ?>\n<span class=\"warning\">Please select\
    \ at least <?= $minCheckboxes;?></span>\n<?php } ?>\n</h2>\n```\n\n### PHP Solution\
    \ 5-8: Using a Drop-down Option Menu\n\nDrop-down option menus created with the\
    \ `<select>` tag are similar to radio-button groups in that they normally allow\
    \ the user to pick only one option from several. Where they differ is one item\
    \ is always selected in a drop-down menu, even if it's only the first item inviting\
    \ the user to select one of the others. As a result, the `$_POST` array always\
    \ contains an element referring to a `<select>` menu, whereas a radio-button group\
    \ is ignored unless a default value is preset.\n\nThe following code shows the\
    \ first two items from the drop-down menu in `contact_08.php`, with the PHP code\
    \ highlighted in bold. As with all multiple-choice elements, the PHP code wraps\
    \ the attribute that indicates which item has been chosen. Although this attribute\
    \ is called `checked` in both radio buttons and check boxes, it's called `selected`\
    \ in `<select>` menus and lists. It's important to use the correct attribute to\
    \ redisplay the selection if the form is submitted with required items missing.\
    \ When the page first loads, the `$_POST` array contains no elements, so you can\
    \ select the first `<option>` by testing for `!$_POST`. Once the form is submitted,\
    \ the `$_POST` array always contains an element from a drop-down menu, so you\
    \ don't need to test for its existence.\n\n```\n<p>\n<label for=\"howhear\">How\
    \ did you hear of Japan Journey?</label>\n<select name=\"howhear\" id=\"howhear\"\
    >\n<option value=\"No reply\"\n<?php\nif (!$_POST || $_POST['howhear'] == 'No\
    \ reply') {\necho 'selected';\n} ?>>Select one</option>\n<option value=\"Apress\"\
    \n<?php\nif (isset($_POST && $_POST['howhear'] == 'Apress')) {\necho 'selected';\n\
    } ?>>Apress</option>\n. . .\n</select>\n</p>\n```\n\nEven though an option is\
    \ always selected in a drop-down menu, you might want to force users to make a\
    \ selection other than the default. To do so, add the `name` attribute of the\
    \ `<select>` menu to the `$required` array, then set the `value` attribute and\
    \ the `$_POST` array element for the default option to an empty string, like this:\n\
    \n```\n<option value=\"\"\n<?php\nif (!$_POST || $_POST['howhear'] == '') {\n\
    echo 'selected';\n} ?>>Select one</option>\n```\n\nThe `value` attribute is not\
    \ required in the `<option>` tag, but if you leave it out, the form uses the text\
    \ between the opening and closing tags as the selected value. Therefore, it's\
    \ necessary to set the `value` attribute explicitly to an empty string. Otherwise,\
    \ \"Select one\" is transmitted as the selected value.\n\nThe code that displays\
    \ a warning message if no selection has been made follows a familiar pattern:\n\
    \n```\n<label for=\"select\">How did you hear of Japan Journey?\n<?php if ($missing\
    \ && in_array('howhear', $missing)) { ?>\n<span class=\"warning\">Please make\
    \ a selection</span>\n<?php } ?>\n</label>\n```"
  raw: '### PHP Solution 5-7: Handling Check-Box Groups


    Check boxes can be used individually or in groups. The method of handling them
    is slightly different. This PHP solution shows how to deal with a check-box group
    called `interests`. PHP Solution 5-10 explains how to handle a single check box.


    When used as a group, all check boxes in the group share the same `name` attribute,
    which needs to end with an empty pair of square brackets in order for PHP to transmit
    the selected values as an array. To identify which check boxes have been selected,
    each one needs a unique `value` attribute.


    If no items are selected, the check-box group is not included in the `$_POST`
    array. After the form has been submitted, you need to check the `$_POST` array
    to see if it contains a subarray for the check-box group. If it doesn’t, you need
    to create an empty subarray as the default value for the script in `processmail.php`.


    To save space, just the first two check boxes of the group are shown. The `name`
    attribute and PHP sections of code are highlighted in bold.


    `<fieldset id="interests">`


    `<h2>Interests in Japan</h2>`


    `<div>`


    `<p>`


    `<input type="checkbox"` `name="interests[]"` `value="Anime/manga"`


    `id="anime"`


    `<?php`


    `if ($_POST` `&&` `in_array(''Anime/manga'', $_POST[''interests''])) {`


    `echo ''checked'';`


    `} ?>` `>`


    `<label for="anime">Anime/manga</label>`


    `</p>`


    `<p>`


    `<input type="checkbox"` `name="interests[]"` `value="Arts & crafts"`


    `id="art"`


    `<?php`


    `if ($_POST` `&&` `in_array(''Arts` `&` `crafts'', $_POST[''interests''])) {`


    `echo ''checked'';`


    `} ?>` `>`


    `<label for="art">Arts &amp; crafts</label>`


    `</p>`


    `. . .`


    `</div>`


    `</fieldset>`


    Each check box shares the same `name` attribute, which ends with an empty pair
    of square brackets, so the data is treated as an array. If you omit the brackets,
    `$_POST[''interests'']` contains the value of only the first check box selected.


    Note


    Although the brackets must be added to the `name` attribute for multiple selections,
    the subarray of selected values is in `$_POST[''interests'']`, not `$_POST[''interests[]'']`.


    The PHP code inside each check-box element performs the same role as in the radio-button
    group, wrapping the `checked` attribute in a conditional statement. The first
    condition checks that the form has been submitted. The second condition uses the
    `in_array()` function to check whether the `value` associated with that check
    box is in the `$_POST[''interests'']` subarray. If it is, it means the check box
    was selected.


    After the form has been submitted, you need to check for the existence of `$_POST[''interests'']`.
    If it hasn’t been set, you must create an empty array as the default value for
    the rest of the script to process. The code follows the same pattern as for the
    radio group:


    `$required = [''name'', ''comments'', ''email'', ''subscribe''` `, ''interests''`
    `];`


    `// set default values for variables that might not exist`


    `if (!isset($_POST[''subscribe''])) {`


    `$_POST[''subscribe''] = '''';`


    `}`


    `if (!isset($_POST[''interests''])) {`


    `$_POST[''interests''] = [];`


    `}`


    To set a minimum number of required check boxes, use the `count()` function to
    confirm the number of values transmitted from the form. If it’s less than the
    minimum required, add the group to the `$errors` array, like this:


    `if (!isset($_POST[''interests''])) {`


    `$_POST[''interests''] = [];`


    `}`


    `// minimum number of required check boxes`


    `$minCheckboxes = 2;`


    `if (count($_POST[''interests'']) < $minCheckboxes) {`


    `$errors[''interests''] = true;`


    `}`


    The `count()` function returns the number of elements in an array, so this creates
    `$errors[''interests'']` if fewer than two check boxes have been selected. You
    might be wondering why I have used a variable instead of the number like this:


    `if (count($_POST[''interests'']) <` `2` `) {`


    This certainly works and it involves less typing, but `$minCheckboxes` can be
    reused in the error message. Storing the number in a variable means this condition
    and the error message always remain in sync.


    The error message in the body of the form looks like this:


    `<h2>Interests in Japan`


    `<?php if (isset($errors[''interests''])) { ?>`


    `<span class="warning">Please select at least <?= $minCheckboxes;?></span>`


    `<?php } ?>`


    `</h2>`


    ### PHP Solution 5-8: Using a Drop-down Option Menu


    Drop-down option menus created with the `<select>` tag are similar to radio-button
    groups in that they normally allow the user to pick only one option from several.
    Where they differ is one item is always selected in a drop-down menu, even if
    it’s only the first item inviting the user to select one of the others. As a result,
    the `$_POST` array always contains an element referring to a `<select>` menu,
    whereas a radio-button group is ignored unless a default value is preset.


    The following code shows the first two items from the drop-down menu in `contact_08.php`,
    with the PHP code highlighted in bold. As with all multiple-choice elements, the
    PHP code wraps the attribute that indicates which item has been chosen. Although
    this attribute is called `checked` in both radio buttons and check boxes, it’s
    called `selected` in `<select>` menus and lists. It’s important to use the correct
    attribute to redisplay the selection if the form is submitted with required items
    missing. When the page first loads, the `$_POST` array contains no elements, so
    you can select the first `<option>` by testing for `!$_POST`. Once the form is
    submitted, the `$_POST` array always contains an element from a drop-down menu,
    so you don’t need to test for its existence.  


    `<p>`


    `<label for="howhear">How did you hear of Japan Journey?</label>`


    `<select name="howhear" id="howhear">`


    `<option value="No reply"`


    `<?php`


    `if (!$_POST || $_POST[''howhear''] == ''No reply'') {`


    `echo ''selected'';`


    `} ?>` `>Select one</option>`


    `<option value="Apress"`


    `<?php`


    `if (isset($_POST` `&&` `$_POST[''howhear''] == ''Apress'') {`


    `echo ''selected'';`


    `} ?>` `>Apress</option>`


    `. . .`


    `</select>`


    `</p>`


    Even though an option is always selected in a drop-down menu, you might want to
    force users to make a selection other than the default. To do so, add the `name`
    attribute of the `<select>` menu to the `$required` array, then set the `value`
    attribute and the `$_POST` array element for the default option to an empty string,
    like this:  


    `<option` `value=""`


    `<?php`


    `if (!$_POST ||` `$_POST[''howhear''] == ''''` `) {`


    `echo ''selected'';`


    `} ?>>Select one</option>`


    The `value` attribute is not required in the `<option>` tag, but if you leave
    it out, the form uses the text between the opening and closing tags as the selected
    value. Therefore, it’s necessary to set the `value` attribute explicitly to an
    empty string. Otherwise, “Select one” is transmitted as the selected value.


    The code that displays a warning message if no selection has been made follows
    a familiar pattern:  


    `<label for="select">How did you hear of Japan Journey?`


    `<?php if ($missing` `&&` `in_array(''howhear'', $missing)) { ?>`


    `<span class="warning">Please make a selection</span>`


    `<?php } ?>`


    `</label>`'
  trans: "\n### PHP 解决方案 5-7：处理复选框组\n\n复选框可以单独使用，也可以成组使用。处理它们的方法略有不同。本 PHP 解决方案将说明如何处理名为\
    \ `interests` 的复选框组。PHP 解决方案 5-10 则介绍如何处理单个复选框。\n\n当作为一组使用时，组内所有复选框共享同一个 `name`\
    \ 属性，该属性需要以一对空的方括号结尾，以便 PHP 将选中的值作为数组传输。为了识别哪些复选框被选中，每个复选框需要一个唯一的 `value` 属性。\n\
    \n如果没有选中任何项目，则该复选框组不会包含在 `$_POST` 数组中。表单提交后，你需要检查 `$_POST` 数组，看它是否包含针对该复选框组的子数组。如果不包含，你需要创建一个空的子数组，作为\
    \ `processmail.php` 中脚本的默认值。\n\n为节省篇幅，仅展示该组中的前两个复选框。`name` 属性和 PHP 代码段以粗体突出显示。\n\
    \n```\n<fieldset id=\"interests\">\n<h2>对日本的兴趣</h2>\n<div>\n<p>\n<input type=\"\
    checkbox\" name=\"interests[]\" value=\"Anime/manga\"\nid=\"anime\"\n<?php\nif\
    \ ($_POST && in_array('Anime/manga', $_POST['interests'])) {\necho 'checked';\n\
    } ?>>\n<label for=\"anime\">动漫/漫画</label>\n</p>\n<p>\n<input type=\"checkbox\"\
    \ name=\"interests[]\" value=\"Arts & crafts\"\nid=\"art\"\n<?php\nif ($_POST\
    \ && in_array('Arts & crafts', $_POST['interests'])) {\necho 'checked';\n} ?>>\n\
    <label for=\"art\">艺术与手工艺</label>\n</p>\n. . .\n</div>\n</fieldset>\n```\n\n每个复选框共享相同的\
    \ `name` 属性，该属性以一对空的方括号结尾，因此数据被当作数组处理。如果省略方括号，`$_POST['interests']` 将仅包含被选中的第一个复选框的值。\n\
    \n> **注：** 虽然为了实现多选必须在 `name` 属性中添加方括号，但选中值的子数组位于 `$_POST['interests']` 中，而不是\
    \ `$_POST['interests[]']`。\n\n每个复选框元素内的 PHP 代码与单选按钮组中的代码功能相同，都是将 `checked` 属性包裹在条件语句中。第一个条件检查表单是否已提交。第二个条件使用\
    \ `in_array()` 函数检查与该复选框关联的 `value` 是否存在于 `$_POST['interests']` 子数组中。如果存在，则表示该复选框被选中。\n\
    \n表单提交后，你需要检查 `$_POST['interests']` 是否存在。如果它尚未设置，你必须创建一个空数组作为脚本其余部分处理的默认值。其代码模式与单选按钮组相同：\n\
    \n```\n$required = ['name', 'comments', 'email', 'subscribe', 'interests'];\n\
    // 为可能不存在的变量设置默认值\nif (!isset($_POST['subscribe'])) {\n    $_POST['subscribe']\
    \ = '';\n}\nif (!isset($_POST['interests'])) {\n    $_POST['interests'] = [];\n\
    }\n```\n\n要设置最少数量的必选复选框，请使用 `count()` 函数确认从表单传输过来的值的数量。如果数量少于最低要求，则将该组添加到 `$errors`\
    \ 数组中，如下所示：\n\n```\nif (!isset($_POST['interests'])) {\n    $_POST['interests']\
    \ = [];\n}\n// 最少需要的复选框数量\n$minCheckboxes = 2;\nif (count($_POST['interests'])\
    \ < $minCheckboxes) {\n    $errors['interests'] = true;\n}\n```\n\n`count()` 函数返回数组中的元素数量，因此，如果选中的复选框少于两个，则会创建\
    \ `$errors['interests']`。你可能想知道为什么我使用变量而不是直接使用数字，如下所示：\n\n```\nif (count($_POST['interests'])\
    \ < 2) {\n```\n\n这样做当然可以，而且输入更少，但 `$minCheckboxes` 可以在错误消息中重复使用。将数量存储在变量中意味着此条件和错误消息始终保持同步。\n\
    \n表单正文中的错误消息如下所示：\n\n```\n<h2>对日本的兴趣\n<?php if (isset($errors['interests'])) {\
    \ ?>\n<span class=\"warning\">请至少选择 <?= $minCheckboxes;?> 项</span>\n<?php } ?>\n\
    </h2>\n```\n\n### PHP 解决方案 5-8：使用下拉选项菜单\n\n使用 `<select>` 标签创建的下拉选项菜单与单选按钮组类似，通常都允许用户从几个选项中选择一个。它们的不同之处在于，下拉菜单中总是会选中一个项目，即使它只是提示用户选择其他选项的第一个项目。因此，`$_POST`\
    \ 数组始终包含一个引用 `<select>` 菜单的元素，而单选按钮组则会被忽略，除非预设了默认值。\n\n以下代码显示了 `contact_08.php`\
    \ 中下拉菜单的前两个项目，PHP 代码以粗体突出显示。与所有多项选择元素一样，PHP 代码包裹了指示哪个项目被选中的属性。虽然此属性在单选按钮和复选框中都称为\
    \ `checked`，但在 `<select>` 菜单和列表中称为 `selected`。如果表单因缺少必填项而重新提交，使用正确的属性来重新显示所选项非常重要。当页面首次加载时，`$_POST`\
    \ 数组不包含任何元素，因此你可以通过测试 `!$_POST` 来选择第一个 `<option>`。一旦表单提交，`$_POST` 数组始终包含来自下拉菜单的元素，因此你无需测试其是否存在。\n\
    \n```\n<p>\n<label for=\"howhear\">您是如何了解到 Japan Journey 的？</label>\n<select name=\"\
    howhear\" id=\"howhear\">\n<option value=\"No reply\"\n<?php\nif (!$_POST || $_POST['howhear']\
    \ == 'No reply') {\necho 'selected';\n} ?>>请选择</option>\n<option value=\"Apress\"\
    \n<?php\nif (isset($_POST && $_POST['howhear'] == 'Apress')) {\necho 'selected';\n\
    } ?>>Apress</option>\n. . .\n</select>\n</p>\n```\n\n尽管下拉菜单中总有一个选项被选中，但你可能会强制用户做出除默认选项之外的选择。为此，请将\
    \ `<select>` 菜单的 `name` 属性添加到 `$required` 数组中，然后将默认选项的 `value` 属性和 `$_POST` 数组元素设置为空字符串，如下所示：\n\
    \n```\n<option value=\"\"\n<?php\nif (!$_POST || $_POST['howhear'] == '') {\n\
    echo 'selected';\n} ?>>请选择</option>\n```\n\n在 `<option>` 标签中，`value` 属性不是必需的，但如果你省略它，表单将使用开始和结束标签之间的文本作为选中的值。因此，有必要将\
    \ `value` 属性显式设置为空字符串。否则，\"请选择\" 将作为选中的值传输。\n\n如果未做出选择，显示警告消息的代码遵循熟悉的模式：\n\n```\n\
    <label for=\"select\">您是如何了解到 Japan Journey 的？\n<?php if ($missing && in_array('howhear',\
    \ $missing)) { ?>\n<span class=\"warning\">请做出选择</span>\n<?php } ?>\n</label>\n\
    ```\n"
- fmt: "### PHP Solution 5-9: Handling a Multiple-choice List\n\nMultiple-choice lists\
    \ are similar to check-box groups: they allow the user to choose zero or more\
    \ items, so the result is stored in an array. If no items are selected, the multiple-choice\
    \ list is not included in the `$_POST` array, so you need to add an empty subarray\
    \ in the same way as with a check-box group.\n\nThe following code shows the first\
    \ two items from the multiple-choice list in `contact_08.php`, with the `name`\
    \ attribute and PHP code highlighted in bold. The square brackets appended to\
    \ the `name` attribute ensure that it stores the results as an array. The code\
    \ works in an identical way to the check-box group in PHP Solution 5-7.\n\n```\n\
    <p>\n<label for=\"characteristics\">What characteristics do you associate with\
    \ Japan?</label>\n<select name=\"characteristics[]\" size=\"6\" multiple=\"multiple\"\
    \ id=\"characteristics\">\n<option value=\"Dynamic\"\n<?php\nif ($_POST && in_array('Dynamic',\
    \ $_POST['characteristics'])) {\n    echo 'selected';\n} ?>\n>Dynamic</option>\n\
    <option value=\"Honest\"\n<?php\nif ($_POST && in_array('Honest', $_POST['characteristics']))\
    \ {\n    echo 'selected';\n} ?>\n>Honest</option>\n. . .\n</select>\n</p>\n```\n\
    \nIn the code that processes the message, set a default value for a multiple-choice\
    \ list in the same way as for an array of check boxes:\n\n```\nif (!isset($_POST['interests']))\
    \ {\n    $_POST['interests'] = [];\n}\nif (!isset($_POST['characteristics']))\
    \ {\n    $_POST['characteristics'] = [];\n}\n```\n\nTo make a multiple-choice\
    \ list required and to set a minimum number of choices, use the same technique\
    \ used for a check-box group in PHP Solution 5-7.\n\n### PHP Solution 5-10: Handling\
    \ a Single Check Box\n\nThe way you handle a single check box is slightly different\
    \ from a check-box group. With an individual check box, you don’t append square\
    \ brackets to the `name` attribute because it doesn’t need to be processed as\
    \ an array. Also, the `value` attribute is optional. If you don’t set the `value`\
    \ attribute, it defaults to “On” if the check box is selected. However, if the\
    \ check box isn’t selected, its name isn’t included in the `$_POST` array, so\
    \ you need to test for its existence.\n\nThis PHP solution shows how to add a\
    \ single check box that seeks confirmation that the site’s terms have been accepted.\
    \ It assumes that selecting the check box is required.\n\nThe following code shows\
    \ the single check box, with the `name` attribute and PHP code highlighted in\
    \ bold.\n\n```\n<p>\n<input type=\"checkbox\" name=\"terms\" value=\"accepted\"\
    \ id=\"terms\"\n<?php\nif ($_POST && !isset($errors['terms'])) {\n    echo 'checked';\n\
    } ?>\n>\n<label for=\"terms\">I accept the terms of using this website\n<?php\
    \ if (isset($errors['terms'])) { ?>\n<span class=\"warning\">Please select the\
    \ check box</span>\n<?php } ?>\n</label>\n</p>\n```\n\nThe PHP block inside the\
    \ `<input>` element inserts the `checked` attribute only if the `$_POST` array\
    \ contains values and `$errors['terms']` hasn’t been set. This ensures that the\
    \ check box is not selected when the page first loads. It also remains unchecked\
    \ if the user submitted the form without confirming acceptance of the terms.\n\
    \nThe second PHP block displays an error message alongside the label if `$errors['terms']`\
    \ has been set.\n\nIn addition to adding terms to the `$expected` and `$required`\
    \ arrays, you need to set a default value for `$_POST['terms']`; then set `$errors['terms']`\
    \ in the code that processes the data when the form is submitted:\n\n```\nif (!isset($_POST['characteristics']))\
    \ {\n    $_POST['characteristics'] = [];\n}\nif (!isset($_POST['terms'])) {\n\
    \    $_POST['terms'] = '';\n    $errors['terms'] = true;\n}\n```\n\nYou need to\
    \ create `$errors['terms']` only if the check box is required. For an optional\
    \ check box, just set the value to an empty string if it’s not included in the\
    \ `$_POST` array.\n\n## Chapter Review\n\nA lot of work has gone into building\
    \ `processmail.php`, but the beauty of this script is that it works with any form.\
    \ The only parts that need changing are the `$expected` and `$required` arrays\
    \ and details specific to the form, such as the destination address, headers,\
    \ and default values for multiple-choice elements that won’t be included in the\
    \ `$_POST` array if no value is selected.\n\nI’ve avoided talking about HTML email\
    \ because the `mail()` function handles only plain-text email. The PHP online\
    \ manual at `www.php.net/manual/en/function.mail.php` shows a way of sending HTML\
    \ mail by adding an additional header. However, it’s not a good idea, as HTML\
    \ mail should always contain an alternative text version for email programs that\
    \ don’t accept HTML. If you want to send HTML mail or attachments, try PHPMailer\
    \ (`https://github.com/Synchro/PHPMailer/`).\n\nAs you’ll see in later chapters,\
    \ online forms lie at the heart of just about everything you do with PHP. They’re\
    \ the gateway between the browser and the web server. You’ll come back time and\
    \ again to the techniques that you have learned in this chapter.\n\n# 6. Uploading\
    \ Files\n\nPHP’s ability to handle forms isn’t restricted to text. It can also\
    \ be used to upload files to a server. For instance, you could build a real estate\
    \ website for clients to upload pictures of their properties or a site for all\
    \ your friends and relatives to upload their holiday photos. However, just because\
    \ you can do it, doesn’t necessarily mean that you should. Allowing others to\
    \ upload material to your website could expose you to all sorts of problems. You\
    \ need to make sure that images are the right size, that they’re of suitable quality,\
    \ and that they don’t contain any illegal material. You also need to ensure that\
    \ uploads don’t contain malicious scripts. In other words, you need to protect\
    \ your website just as carefully as your own computer.\n\nPHP makes it relatively\
    \ simple to restrict the type and size of files accepted. What it cannot do is\
    \ check the suitability of the content. Think carefully about security measures,\
    \ such as restricting uploads to registered and trusted users by placing the upload\
    \ form in a password-protected area.\n\nUntil you learn how to restrict access\
    \ to pages with PHP in Chapters 9 and 17, use the PHP solutions in this chapter\
    \ only in a password-protected directory if deployed on a public website. Most\
    \ hosting companies provide simple password protection through the site’s control\
    \ panel.\n\nThe first part of this chapter is devoted to understanding the mechanics\
    \ of file uploads, which will make it easier to understand the code that follows.\
    \ This is a fairly intense chapter, not a collection of quick solutions. But by\
    \ the end of the chapter, you will have built a PHP class capable of handling\
    \ single and multiple file uploads. You can then use the class in any form by\
    \ writing only a few lines of code.\n\nYou’ll learn about the following:\n\n-\
    \ Understanding the `$_FILES` array\n- Restricting the size and type of uploads\n\
    - Preventing files from being overwritten\n- Handling multiple uploads\n\n## How\
    \ PHP Handles File Uploads\n\nThe term upload means moving a file from one computer\
    \ to another, but as far as PHP is concerned, all that’s happening is that a file\
    \ is being moved from one location to another. This means you can test all the\
    \ scripts in this chapter on your local computer without the need to upload files\
    \ to a remote server.\n\nPHP supports file uploads by default, but hosting companies\
    \ can restrict the size of uploads or disable them altogether. Before going any\
    \ further, it’s a good idea to check the settings on your remote server."
  raw: '### PHP Solution 5-9: Handling a Multiple-choice List


    Multiple-choice lists are similar to check-box groups: they allow the user to
    choose zero or more items, so the result is stored in an array. If no items are
    selected, the multiple-choice list is not included in the `$_POST` array, so you
    need to add an empty subarray in the same way as with a check-box group.


    The following code shows the first two items from the multiple-choice list in
    `contact_08.php`, with the `name` attribute and PHP code highlighted in bold.
    The square brackets appended to the `name` attribute ensure that it stores the
    results as an array. The code works in an identical way to the check-box group
    in PHP Solution 5-7.  


    `<p>`


    `<label for="characteristics">What characteristics do you associate` `with`


    `Japan?</label>`


    `<select name="` `characteristics[]` `" size="6" multiple="multiple"`


    `id="characteristics">`


    `<option value="Dynamic"`


    `<?php`


    `if ($_POST` `&&` `in_array(''Dynamic'', $_POST[''characteristics''])) {`


    `echo ''selected'';`


    `} ?>` `>Dynamic</option>`


    `<option value="Honest"`


    `<?php`


    `if ($_POST` `&&` `in_array(''Honest'', $_POST[''characteristics''])) {`


    `echo ''selected'';`


    `} ?>` `>Honest</option>`


    `. . .`


    `</select>`


    `</p>`


    In the code that processes the message, set a default value for a multiple-choice
    list in the same way as for an array of check boxes:  


    `if (!isset($_POST[''interests''])) {`


    `$_POST[''interests''] = [];`


    `}`


    `if (!isset($_POST[''characteristics''])) {`


    `$_POST[''characteristics''] = [];`


    `}`


    To make a multiple-choice list required and to set a minimum number of choices,
    use the same technique used for a check-box group in PHP Solution 5-7.


    ### PHP Solution 5-10: Handling a Single Check Box


    The way you handle a single check box is slightly different from a check-box group.
    With an individual check box, you don’t append square brackets to the `name` attribute
    because it doesn’t need to be processed as an array. Also, the `value` attribute
    is optional. If you don’t set the `value` attribute, it defaults to “On” if the
    check box is selected. However, if the check box isn’t selected, its name isn’t
    included in the `$_POST` array, so you need to test for its existence.


    This PHP solution shows how to add a single check box that seeks confirmation
    that the site’s terms have been accepted. It assumes that selecting the check
    box is required.


    The following code shows the single check box, with the name attribute and PHP
    code highlighted in bold.  


    `<p>`


    `<input type="checkbox" name="` `terms` `" value="accepted" id="terms"`


    `<?php`


    `if ($_POST` `&&` `!isset($errors[''terms''])) {`


    `echo ''checked'';`


    `} ?>` `>`


    `<label for="terms">I accept the terms of using this website`


    `<?php if (isset($errors[''terms''])) { ?>`


    `<span class="warning">Please select the check box</span>`


    `<?php } ?>` `</label>`


    `</p>`


    The PHP block inside the `<input>` element inserts the `checked` attribute only
    if the `$_` `POST`array contains values and `$errors[''terms'']` hasn’t been set.
    This ensures that the check box is not selected when the page first loads. It
    also remains unchecked if the user submitted the form without confirming acceptance
    of the terms.


    The second PHP block displays an error message alongside the label if `$errors[''terms'']`
    has been set.


    In addition to adding terms to the `$expected` and `$required` arrays, you need
    to set a default value for `$_POST[''terms'']`; then set `$errors[''terms'']`
    in the code that processes the data when the form is submitted:  


    `if (!isset($_POST[''characteristics''])) {`


    `$_POST[''characteristics''] = [];`


    `}`


    `if (!isset($_POST[''terms''])) {`


    `$_POST[''terms''] = '''';`


    `$errors[''terms''] = true;`


    `}`


    You need to create `$errors[''terms'']` only if the check box is required. For
    an optional check box, just set the value to an empty string if it’s not included
    in the `$_POST` array.


    ## Chapter Review


    A lot of work has gone into building `processmail.php`, but the beauty of this
    script is that it works with any form. The only parts that need changing are the
    `$expected` and `$required` arrays and details specific to the form, such as the
    destination address, headers, and default values for multiple-choice elements
    that won’t be included in the `$_POST` array if no value is selected.


    I’ve avoided talking about HTML email because the `mail()` function handles only
    plain-text email. The PHP online manual at [`www.php.net/manual/en/function.mail.php`](http://www.php.net/manual/en/function.mail.php)
    shows a way of sending HTML mail by adding an additional header. However, it’s
    not a good idea, as HTML mail should always contain an alternative text version
    for email programs that don’t accept HTML. If you want to send HTML mail or attachments,
    try PHPMailer ( [`https://github.com/Synchro/PHPMailer/`](https://github.com/Synchro/PHPMailer/)
    ).


    As you’ll see in later chapters, online forms lie at the heart of just about everything
    you do with PHP. They’re the gateway between the browser and the web server. You’ll
    come back time and again to the techniques that you have learned in this chapter.


    # 6. Uploading Files


    PHP’s ability to handle forms isn’t restricted to text. It can also be used to
    upload files to a server. For instance, you could build a real estate website
    for clients to upload pictures of their properties or a site for all your friends
    and relatives to upload their holiday photos. However, just because you can do
    it, doesn’t necessarily mean that you should. Allowing others to upload material
    to your website could expose you to all sorts of problems. You need to make sure
    that images are the right size, that they’re of suitable quality, and that they
    don’t contain any illegal material. You also need to ensure that uploads don’t
    contain malicious scripts. In other words, you need to protect your website just
    as carefully as your own computer.


    PHP makes it relatively simple to restrict the type and size of files accepted.
    What it cannot do is check the suitability of the content. Think carefully about
    security measures, such as restricting uploads to registered and trusted users
    by placing the upload form in a password-protected area.


    Until you learn how to restrict access to pages with PHP in [Chapters 9](#A978-1-4842-0635-5_9_Chapter.html)
    and [17](#A978-1-4842-0635-5_17_Chapter.html), use the PHP solutions in this chapter
    only in a password-protected directory if deployed on a public website. Most hosting
    companies provide simple password protection through the site’s control panel.


    The first part of this chapter is devoted to understanding the mechanics of file
    uploads, which will make it easier to understand the code that follows. This is
    a fairly intense chapter, not a collection of quick solutions. But by the end
    of the chapter, you will have built a PHP class capable of handling single and
    multiple file uploads. You can then use the class in any form by writing only
    a few lines of code.


    You’ll learn about the following:


    *   Understanding the `$_FILES` array

    *   Restricting the size and type of uploads

    *   Preventing files from being overwritten

    *   Handling multiple uploads


    ## How PHP Handles File Uploads


    The term upload means moving a file from one computer to another, but as far as
    PHP is concerned, all that’s happening is that a file is being moved from one
    location to another. This means you can test all the scripts in this chapter on
    your local computer without the need to upload files to a remote server.


    PHP supports file uploads by default, but hosting companies can restrict the size
    of uploads or disable them altogether. Before going any further, it’s a good idea
    to check the settings on your remote server.'
