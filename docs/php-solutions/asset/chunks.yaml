    \ PHP date and time functions. MySQL’s date and time functions also make it easy\
    \ to format dates and execute queries based on temporal criteria.\n\nPerhaps the\
    \ biggest problem with dates is deciding whether to use SQL or PHP to handle the\
    \ formatting and/or calculations. A useful feature of the PHP `DateTime` class\
    \ is that the constructor accepts a date stored in the ISO format, so you can\
    \ use an unformatted date or timestamp from your database to create `DateTime`\
