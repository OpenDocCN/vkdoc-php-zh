  raw: '### Apache and What It Does


    Apache hosts just under 40% of all websites that exist as of the release of this
    book. Apache is an open source server that runs on virtually all available operating
    systems. Apache is a community-driven project, with many developers contributing
    to its progress. Apache’s open source roots also means that the software is available
    free of charge, which probably contributes heavily to Apache’s overwhelming popularity
    relative to its competitors.


    On the Apache HTTP Server Project website ( [`http://httpd.apache.org`](http://httpd.apache.org)
    ), Apache HTTP Server is described as “an effort to develop and maintain an open-source
    HTTP server for modern operating systems including UNIX and Windows NT. The goal
    of this project is to provide a secure, efficient, and extensible server that
    provides HTTP services in sync with the current HTTP standards.” The Apache Project
    provides billions of free lines of open source code for anyone to use.


    As with all web servers, Apache accepts an *HTTP request* and serves an *HTTP
    response*. When you enter a URL ( [`www.apress.com`](http://www.apress.com) )
    into your browser, the browser transforms the information into an HTTP request.
    This information is sent to the web server (Apache). The server determines what
    has been requested (access to the Apress website). It then creates an HTTP response
    which includes the information requested (the main page for Apress) and sends
    that information back to the browser. While the server is creating the response,
    the web server sends any noncompiled PHP code to the PHP processor to be interpreted.
    All the PHP code is then executed, and the results are included in the response
    along with any HTML, CSS, or JavaScript. Along with displaying the results of
    the PHP code, the user’s browser will interpret the HTML, CSS, and JavaScript
    code to format the web page requested within the browser.


    ### Storing Info with MySQL/MariaDB


    MySQL and MariaDB are relational database management systems (*RDBMS*) . Essentially,
    this means that they allow users to store information in a table-based structure,
    using rows and columns to organize different pieces of data. There are many other
    relational database management systems and *nonrelational systems* (such as *NoSQL
    databases* ). Since MySQL/MariaDB is one of the most popular RDBMS systems, many
    examples in this book rely on them to store relational data.


    Now that we are familiar with the tools that we need, let’s get the ball rolling
    by installing these tools.


    **Exercise**: Before starting the installation process, visit the PHP (php.org),
    Apache (apache.org), and MySQL (mysql.com) websites. What are the current stable
    releases of each? When determining which software package to install, look for
    one that has the most recent versions available.


    ## Installing PHP, Apache, and MySQL/MariaDB


    One of the biggest hurdles for new programmers is starting. In the past, before
    you could write your first line of PHP, you had to download Apache , PHP , and
    MySQL/MariaDB , separately, then fight through installation instructions that
    are full of technical jargon you might not understand yet. This experience left
    many developers feeling unsure of themselves, doubting whether they’ve installed
    the required software correctly. Just trying to get each tool to communicate with
    the other was a major hassle requiring changing settings within the setup files
    that you had little knowledge or understanding about what the files accomplished.


    This hurdle kept many new programmers from learning programming for months, even
    though they desperately wanted to move beyond plain ole HTML. It took many unsuccessful
    attempts to install PHP before being able to run the first command successfully.


    Fortunately, the development community has responded to the frustration of beginning
    developers with many software packages that take all the pain out of setting up
    your development environment, whether you create applications for Windows, Mac,
    or Linux machines. These options include all-in-one solutions for setting up Apache,
    MySQL, and PHP. We refer to these packages as *LAMP* (Linux, Apache, MySQL/MariaDB,
    PHP), *WAMP* (Windows, Apache, MySQL/MariaDB, PHP), and *MAMP* (MacOS, Apache,
    MySQL/MariaDB, PHP) stacks.


    As of the end of 2021, some of the most popular and best packages included


    *   *AMPPS*: Provides LAMP, WAMP, and MAMP versions – [`www.ampps.com`](http://www.ampps.com)


    *   *WAMPSERVER*: Provides only a WAMP version – [`www.wampserver.com`](http://www.wampserver.com)


    *   *XAMPP*: Provides LAMP, WAMP, and MAMP versions – [`www.apachefriends.org`](http://www.apachefriends.org)


    *   *Neard*: Provides a WAMP-only version – [`www.neard.io`](http://www.neard.io)


    *   *WAMP.NET*: Provides a WAMP-only version – [`www.wamp.net`](http://www.wamp.net)


    *   *EasyPHP*: Provides only a WAMP version – [`www.easyphp.org`](http://www.easyphp.org)


    **Exercise**: Go to each of the preceding websites and explore what is included
    in each package. Many of these packages have additional tools to assist in program
    development. Compare the versions of PHP, Apache, and MySQL/MariaDB provided with
    each package. Currently is one more up to date than another? Does one package
    interest you more than another? In this book, we will use XAMPP. But you may find
    that one of the other packages meets your needs better. You will find videos on
    YouTube which will demonstrate the installation process for each package. We recommend
    installing XAMPP for now, but after you gain experience, make your own decision
    as to the package that is best for you.


    It would be redundant to demonstrate how to install each of the most popular stacks
    available. Therefore, we will show the installation process for the package we
    used to create the examples in this book. The author’s personal choice for PHP
    code creation and testing is XAMPP, which is one of the most common all-in-one
    free solutions; it has been available for many years. XAMPP is used by thousands
    of programmers across the globe to create dynamic PHP programs. XAMPP has earned
    an almost perfect five-star rating from its users for ease of use and reliability.
    It’s a good choice for beginning programmers.


    Note


    Most Linux distributions ship with one flavor or another of the LAMP stack bundled
    in by default. Certain versions of Mac OS X also have PHP and Apache installed
    by default.


    ### Installing XAMPP


    Enough background. You’re now ready to install XAMPP on your development machine.
    This process should take just a few minutes and, hopefully, is completely painless.


    Note


    New versions of XAMPP are released frequently. If you discover that the current
    version of XAMPP has major differences than the version shown in the following,
    don’t panic. You can discover the current installation process from the videos
    located on the XAMPP website and from YouTube. When searching YouTube, be sure
    to include the XAMPP release number, such as “Installing XAMPP 8.1.1.” Make sure
    to also check the creation date of the video to make sure it was created recently.'
  trans: '

    ### Apache 及其功能


    截至本书发布时，`Apache` 托管了将近 40% 的现有网站。`Apache` 是一款开源服务器，几乎能在所有主流操作系统上运行。`Apache` 是一个社区驱动的项目，众多开发者为其进步贡献力量。`Apache`
    的开源性质也意味着该软件是免费提供的，这很大程度上促成了`Apache` 相对于其竞争对手的压倒性普及。


    在 Apache HTTP 服务器项目网站（`http://httpd.apache.org`）上，`Apache HTTP Server` 被描述为“一项为现代操作系统（包括
    UNIX 和 Windows NT）开发和维护开源 HTTP 服务器的努力。该项目的目标是提供一个安全、高效且可扩展的服务器，能够根据当前的 HTTP 标准提供
    HTTP 服务。”Apache 项目提供了数十亿行免费的开源代码供任何人使用。


    与所有 Web 服务器一样，`Apache` 接收 *HTTP 请求* 并返回 *HTTP 响应*。当你在浏览器中输入一个 URL（`www.apress.com`）时，浏览器会将这些信息转换为一个
    HTTP 请求。该信息被发送到 Web 服务器（`Apache`）。服务器确定所请求的内容（访问 Apress 网站）。然后，它会创建一个 HTTP 响应，其中包含所请求的信息（Apress
    的主页），并将该信息发送回浏览器。在服务器创建响应的过程中，Web 服务器会将任何非编译的 PHP 代码发送给 PHP 处理器进行解释。所有 PHP 代码随后被执行，其结果连同任何
    `HTML`、`CSS` 或 `JavaScript` 一起包含在响应中。用户的浏览器除了显示 PHP 代码的结果外，还会解释 `HTML`、`CSS` 和
    `JavaScript` 代码，以在浏览器中格式化所请求的网页。


    ### 使用 MySQL/MariaDB 存储信息


    `MySQL` 和 `MariaDB` 是关系型数据库管理系统 (*RDBMS*)。本质上，这意味着它们允许用户使用基于表格的结构存储信息，利用行和列来组织不同的数据片段。还有许多其他关系型数据库管理系统和*非关系型系统*（例如
    *NoSQL 数据库*）。由于 `MySQL`/`MariaDB` 是最流行的 RDBMS 系统之一，本书中的许多示例都依赖它们来存储关系型数据。


    现在我们已经熟悉了所需的工具，让我们开始安装这些工具，正式启动吧。


    **练习**：在开始安装过程之前，请访问 PHP（`php.org`）、Apache（`apache.org`）和 MySQL（`mysql.com`）网站。每个软件当前最新的稳定版本是什么？在决定安装哪个软件包时，请寻找提供最新版本的软件包。


    ## 安装 PHP、Apache 和 MySQL/MariaDB


    对于新程序员来说，最大的障碍之一就是如何开始。在过去，在你编写第一行 PHP 代码之前，你必须分别下载 `Apache`、`PHP` 和 `MySQL`/`MariaDB`，然后艰难地阅读充斥着你可能还不理解的技术术语的安装说明。这种经历让许多开发者对自己产生怀疑，不确定是否正确安装了所需的软件。仅仅让每个工具相互通信就是一个大麻烦，需要在配置文件中修改设置，而你却对这些文件的功能知之甚少或根本不了解。


    这个障碍曾使许多新程序员数月之久无法开始学习编程，即使他们迫切希望超越普通的 `HTML`。在能够成功运行第一个命令之前，他们往往要经历无数次失败的 PHP
    安装尝试。


    幸运的是，开发社区已经回应了初学者的挫败感，提供了许多软件包，可以消除搭建开发环境的所有痛苦，无论你是为 Windows、Mac 还是 Linux 机器创建应用程序。这些选项包括用于搭建
    Apache、MySQL 和 PHP 的一体化解决方案。我们将这些软件包称为 *LAMP*（Linux、Apache、MySQL/MariaDB、PHP）、*WAMP*（Windows、Apache、MySQL/MariaDB、PHP）和
    *MAMP*（macOS、Apache、MySQL/MariaDB、PHP）技术栈。


    截至 2021 年底，最流行和最好的软件包包括：


    *   *AMPPS*：提供 LAMP、WAMP 和 MAMP 版本 – `www.ampps.com`

    *   *WAMPSERVER*：仅提供 WAMP 版本 – `www.wampserver.com`

    *   *XAMPP*：提供 LAMP、WAMP 和 MAMP 版本 – `www.apachefriends.org`

    *   *Neard*：仅提供 WAMP 版本 – `www.neard.io`

    *   *WAMP.NET*：仅提供 WAMP 版本 – `www.wamp.net`

    *   *EasyPHP*：仅提供 WAMP 版本 – `www.easyphp.org`


    **练习**：请访问上述每个网站，探索每个软件包包含的内容。这些软件包中的许多都附带有助于程序开发的额外工具。比较每个软件包提供的 `PHP`、`Apache`
    和 `MySQL`/`MariaDB` 版本。目前哪一个比其他更新？有没有哪个软件包比另一个更吸引你？在本书中，我们将使用 `XAMPP`。但你可能会发现其他某个软件包更能满足你的需求。你可以在
    YouTube 上找到演示每个软件包安装过程的视频。我们建议你现在安装 `XAMPP`，但获得经验后，请自行决定最适合你的软件包。


    演示如何安装每个最流行的技术栈是多余的。因此，我们将展示本书中用于创建示例的软件包的安装过程。作者个人选择用于 PHP 代码创建和测试的是 `XAMPP`，这是最常见的一体化免费解决方案之一；它已经存在多年了。全球有成千上万的程序员使用
    `XAMPP` 来创建动态 PHP 程序。`XAMPP` 凭借其易用性和可靠性，赢得了用户几乎完美的五星评价。对于初学程序员来说，这是一个不错的选择。


    **注意**：大多数 Linux 发行版默认捆绑了某种类型的 LAMP 技术栈。某些版本的 Mac OS X 也默认安装了 `PHP` 和 `Apache`。


    ### 安装 XAMPP


    背景知识已经足够。你现在可以准备在你的开发机器上安装 `XAMPP` 了。这个过程只需几分钟，希望是完全无痛的。


    **注意**：`XAMPP` 的新版本会频繁发布。如果你发现当前版本的 `XAMPP` 与下面所示的版本有重大差异，请不要惊慌。你可以从 XAMPP 网站和
    YouTube 上的视频了解当前的安装过程。在 YouTube 上搜索时，请确保包含 `XAMPP` 的版本号，例如“Installing XAMPP 8.1.1”。同时务必检查视频的创建日期，以确保它是最近制作的。

    '
- fmt: '### Step 1: Download XAMPP


    In this demonstration, we will install a Windows version of XAMPP. The process
    is similar for other operating systems. If you are confused on how to install
    XAMPP for your operating system, search YouTube for a related video.


    Your first task is to obtain a copy of the XAMPP software. Head over to the XAMPP
    site (`www.apachefriends.org`). Then click “Download” on the menu. Select the
    newest stable version for your operating system by clicking the Download button
    to the right of the version. These steps and the examples in this book are created
    using version 8.1.1 for Windows.


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig2_HTML.jpg)


    This window represents the different versions that are available in XAMPP with
    download options for Windows, Linux, and OS X.


    **Figure 1-2** XAMPP versions


    After clicking the button, you may be asked if you want to open or save the installation
    file. Select “save” as shown in Figure 1-3.


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig3_HTML.jpg)


    This dialer shows when we are starting to download the XAMPP version in our system,
    for where we want to save this file or open this file.


    **Figure 1-3** Saving installation file


    After clicking the OK button, the installation program will be downloaded to your
    computer. Depending on the browser you are using, you will need to access the
    downloaded file. In Firefox, you can find the downloaded file by clicking the
    download arrow at the upper right corner of the browser. Once you find the installation
    file, click the file to begin the installation process.


    ### Step 2: Follow the Instructions


    In the Windows environment, the operating system may ask if you want to allow
    this application to make changes. Answer “yes.” You may also get a warning about
    an Active User Account Control (UAC) on your system. You can choose to turn off
    this security feature on your machine, or (better choice), as the warning states,
    install XAMPP in a different location, other than “Program Files.”


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig4_HTML.jpg)


    A warning message is shown when we start downloading XAMPP, it may vary based
    on which browser we are using to download this one.


    **Figure 1-4** UAC warning message


    After clicking OK for the warning message, or OK on the initial window, you should
    now see a screen similar to Figure 1-5.


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig5_HTML.jpg)


    The initial setup screen is opened after we are clicking an OK button for the
    warning message, here we can see the next and cancel options for setup.


    **Figure 1-5** Initial setup screen


    **Note:** All screenshots used in this book were taken on a computer running Windows
    10. Your installation might differ slightly, if you use a different operating
    system. XAMPP for Windows offers additional options, such as the ability to install
    FileZilla (an FTP server) as one of its services. This is unnecessary and will
    consume computer resources, even when they are not being used, so it’s probably
    best to leave these services off. Additionally, Windows users should select to
    install XAMPP in the `c:\xampp` directory for the sake of following this book’s
    examples more easily.


    Click the Next button to move to the next screen (see Figure 1-6), to choose which
    components to install. Let’s just go with the default selections to make life
    easier. This will install some tools we will not use in this book. However, they
    are very useful in program development. The XAMPP installer will guide you through
    the installation process.


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig6_HTML.jpg)


    After clicking next in the setup dialer, we can select what the components need
    to be installed based on our requirements.


    **Figure 1-6** Select components to install


    Leave the default location, as shown in the following, for the creation of the
    XAMPP files. If you already have a previous version of XAMPP, you can change this
    location. Just remember that the examples in this book assume the files are located
    at `C:\xampp`.


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig7_HTML.jpg)


    A dialer shows the location where we want to save this downloaded file in our
    system, we can choose where ever we want it.


    **Figure 1-7** Installation folder


    Pick your language of choice.


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig8_HTML.jpg)


    Once we are given next after choosing a location, we can select in which language
    want to communicate with the XAMPP control panel.


    **Figure 1-8** Language of choice


    Uncheck the “Learn More” selection, to save time and space. You can install one
    or more of these tools at any time.


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig9_HTML.jpg)


    Once click on next after selecting language we can see this dialer, here we have
    an option to learn more about Bitnami if required.


    **Figure 1-9** Learn more about Bitnami


    Click next in the screen shown in Figure 1-10.


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig10_HTML.jpg)


    This dialer gives us the last chance for us whether we want to install or not
    required to install XAMPP in our system.


    **Figure 1-10** Ready to install


    Finally, the installation begins!


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig11_HTML.jpg)


    Once XAMPP is started installing in our system this dialer starts indicating till
    how much installation process is pending in our system.


    **Figure 1-11** The installation begins


    The installation is complete! Click finish.


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig12_HTML.jpg)


    After completing the installation process in system this dialer represents we
    have to click on finish, and also we can select the control panel here.


    **Figure 1-12** Installation complete


    ### Step 3: Test XAMPP to Ensure Proper Installation


    So far, we’ve used the XAMPP wizard to install Apache, PHP, and MySQL. The next
    step is to activate Apache, so we can write some PHP.'
