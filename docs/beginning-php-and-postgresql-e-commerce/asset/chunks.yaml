    \n// Load the page template\n\nrequire_once PRESENTATION_DIR . 'page.php';\n\n\
    // Load the database handler\n\nrequire_once BUSINESS_DIR . 'database_handler.php';\n\
    \n?>\n```\n\n**11.** Create a new file named `hatshop/include/app_bottom.php`,\
    \ and add the following in it:\n\n```php\n<?php\n\nDatabaseHandler::Close();\n\
    \n?>\n```\n\n**12.** This file must be included at the end of the main page `index.php`\
    \ to close the connection. Modify your `index.php` file as follows:\n\n```php\n\
    <?php\n\n// Load Smarty library and config files\n\nrequire_once 'include/app_top.php';\n\
    \n// Load Smarty template file\n\n$page = new Page();\n\n// Display the page\n\
    \n$page->display('index.tpl');\n\n// Load app_bottom which closes the database\
    \ connection require_once 'include/app_bottom.php';\n\n?>\n```\n\n## How It Works:\
    \ The Business Tier Code\n\nAfter adding the database connection data to `config.php`,\
    \ you created the `DatabaseHandler` class. This class contains a number of wrapper\
    \ methods that access PDO functions and provide the functionality needed for the\
    \ rest of the business tier methods.\n\nThe `DatabaseHandler` class has a **private\
    \ constructor**, meaning that it can’t be instantiated; you can’t create `DatabaseHandler`\
    \ objects, but you can execute the **static methods** for the class. Static class\
    \ members and methods, as opposed to instance members and methods, are called\
    \ directly using the class name, instead of an object of the class. For example,\
    \ this is how you would call the instance method `myMethod` of a hypothetical\
    \ class named `MyClass`:\n\n```php\n$myObject = new MyClass;\n\n$myObject->myMethod();\n\
    ```\n\nIf `myMethod` was a static method, you would call it like this: `MyClass::MyMethod();`\n\
    \n> **Note:** Static members are OOP-specific features that aren’t supported by\
    \ PHP 4 and older versions.\n\nYou can find a very good introduction to the OOP\
    \ features in PHP 5 at `http://php.net/manual/en/language.oop5.php`.\n\nThe database\
    \ functions themselves have a standard structure, taking advantage of the fact\
    \ that PDO has been configured to throw exceptions. Let’s take a closer look at\
    \ the `GetRow` method.\n\n```php\n// Wrapper method for PDOStatement::fetch\n\n\
    public static function GetRow($statementHandler, $params = null, $fetchStyle =\
    \ PDO::FETCH_ASSOC)\n\n{\n\n    // Initialize the return value to null\n\n   \
    \ $result = null;\n\n    // Try executing the prepared statement received as parameter\
    \ try\n\n    {\n\n        self::Execute($statementHandler, $params);\n\n     \
    \   $result = $statementHandler->fetch($fetchStyle);\n\n    }\n\n    catch(PDOException\
    \ $e)\n\n    {\n\n        // Close the database handler and trigger an error\n\
    \n        self::Close();\n\n        trigger_error($e->getMessage(), E_USER_ERROR);\n\
    \n    }\n\n    // Return the query results\n\n    return $result;\n\n}\n```\n\n\
    This method generates an error (using the `trigger_error` function) if the database\
    \ command didn’t execute successfully. The error is captured by the error-handling\
    \ mechanism you implemented in Chapter 2.\n\nBecause of the way you implemented\
    \ the error-handling code in Chapter 2, generating an `E_USER_ERROR` error freezes\
    \ the execution of the request, eventually logging and/or emailing the error data,\
    \ and showing the visitor a nice “Please come back later” message (if there is\
    \ such thing as a nice “Please come back later” message, anyway).\n\nNote that\
    \ before the error is generated, we also close the database connection to ensure\
    \ that we’re not leaving any database resources occupied by the script."
