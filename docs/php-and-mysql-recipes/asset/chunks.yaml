    ## CHAPTER 13 ■ CREATING AND USING FORMS


    It is not necessary to use the jQuery library or the Bootstrap framework but it
    makes the forms look a bit better than plain HTML forms.


    The jQuery library is a de facto standard for interacting with the DOM from JavaScript.
    It allows easy access to elements by using a selector syntax that’s close to that
    of CSS.


    The Bootstrap framework is responsive and will cause the content to have a similar
    look and feel on mobile and laptop/desktop devices. As a growing portion of web
    requests is done from mobile devices it is highly recommended to create content
    that is responsive so it can adjust to the device. In fact many search engines
    will penalize content that is not mobile friendly in the search results.


    After showing the collected data to the user the script will insert the values
    in a database using the `mysqli` extension. In this example the object- oriented
    style is used. The string values are escaped before they are used in the database
    query and the `cnt` value is cast to an integer to avoid errors if the value should
    be missing or contain a string value.


    ### Recipe 13-2. Default Values


    #### Problem


    The forms used in the previous examples have all been empty when first loaded.
    There are a couple of use cases for adding default content to a form. One is to
    fill the form with common values or select the most common value of drop-down
    lists, etc. The other is to allow the user to edit a record that was previously
    submitted and saved on the server.


    #### Solution


    Setting the default value for an `input` tag depends on the type of input. For
    a text input the value is set with the `value` attribute.


    ```

    <input type="text" name="name" value="Some default value" />

    ```


    For check boxes and radio buttons the attribute `checked` it used to indicate
    if the value is checked. For radio button where only one value can be selected
    it’s only the last element with the attribute `checked` that will be selected.
    Adding the attribute `checked` to the first value of the no/yes example from above
    will change the behavior of the form. In the original example none of the values
    were selected when the form was first loaded but by setting the `checked` on the
    No value this radio button will be selected when the form is loaded.


    ```

    <input type="radio" name="agree" value="0" checked />No

    <input type="radio" name="agree" value="1" />Yes

    ```


    For check boxes where multiple values can be selected at once the same system
    can be used.


    ```

    <input type="checkbox" name="skill[]" value="1" checked />PHP

    <input type="checkbox" name="skill[]" value="2" checked />JavaScript

    <input type="checkbox" name="skill[]" value="4" />C/C++

    <input type="checkbox" name="skill[]" value="8" />Java

    ```


    In this example the first two values will be preselected when the form is loaded.


    Finally for the drop-down list the use of the attribute `selected` on the `option`
    that should be the default value will cause the drop-down to preselect that value.
    For a `select` with a single value it is possible to set the `selected` attribute
    on multiple values but only the last value with the attribute will be the selected
    option. If it’s a multiselect list all options with the `selected` attribute will
    show as selected.


    In the next example the state California will be the default value in the drop-down.


    ```

    <select name="state">

    <option value="AL">Alabama</option>

    <option value="AK">Alaska</option>

    <option value="AZ">Arizona</option>

    <option value="AR">Arkansas</option>

    <option value="CA" selected>California</option>

    ...

    <option value="WY">Wyoming</option>

    </state>

    ```'
