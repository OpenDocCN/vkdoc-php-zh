    \ application\n\n*   Explain each step of the program development life cycle\n\
    \    (PDLC)\n\n*   Define and explain MVC and dependency injection\n\nPHP Platforms\n\
    PHP is a powerful language because it can be adapted for use on\nalmost any hardware\
    \ or software platform. The ease at which it\ninterfaces with HTML, CSS, and JavaScript\
    \ provides the ability for PHP\napplications to run on any system that can host\
