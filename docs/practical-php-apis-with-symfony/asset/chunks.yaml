    If we take a look to the **ApiOperationHandler performOperation** method, it checks
    the “validateByRole” value. If it is true, it assigns an array for the “$validationGroups"
    variable which holds the group names (which match the user roles). Otherwise,
    it assigns null. Then, the "$validationGroups” variable is passed to the **deserializeAndValidate**
    method as the third parameter.


    ### Conclusion


    We have explored how to use symfony validation groups to validate a subset of
    the operation input properties based on the authenticated user roles. This offers
    us the flexibility to enforce different validation rules tailored to the specific
