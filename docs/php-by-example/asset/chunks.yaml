    **Figure 12-6** The form with the filled field before submitting data


    After pressing the `Submit` button, you see the result shown in Figure [12-7](#613529_1_En_12_Chapter.xhtml#Fig7).


    ![](images/613529_1_En_12_Chapter/613529_1_En_12_Fig7_HTML.jpg)


    A screenshot of the welcome web page. It reads the title welcome. It reads we
    are happy to greet you, mickey mouse, exclamatory mark, It is a great honor for
    us.


    **Figure 12-7** The result of clicking the `Submit` button in the case of the
    filled field


    Thus, after pressing the `Submit` button, a greeting appears. If the field was
    empty when submitting the form data, the name `Mister X` is displayed in the greeting.
    If the field was filled in, the greeting displays the name specified in this field.
    Now, let’s turn to the program code. You start with the contents of the `index.html`
    file.


    ```

    Greetings


    Introduce yourself

    What is your name?


    Submit

    ```


    In addition to the standard HTML elements already familiar to us, the document
    contains a form block marked with the `<form>` and `</form>` tags. Inside the
    form, there are two elements. That is an input field and a button. The input field
    is created as an `<input>` element.


    ### The HTML Basics


    It can be understood that you deal with a text field due to the `type` attribute
    whose value is `"text"`.


    A button is created using the `<button>` and `</button>` tags. The text between
    these tags is the name of the button.


    It is crucial here which attributes are specified for the form and the input field.
    In particular, you use three attributes for the form. The `method` attribute is
    set to `"post"`. It defines how the form data is submitted.


    **Details**


    | --- | --- | --- |


    There are two methods for submitting form data: GET and POST. The difference is
    in the way the data is transmitted. In general terms, the GET method transfers
    data without encoding. An example of transferring data using the GET method has
    already been given in the example with processing parameters passed in the request
    in the address bar. The POST method transfers data more safely. In this example,
    you use it to transfer data to the server.


    The `target` attribute with the value `"_self"` means that the response sent by
    the server is displayed in the same window where the form was displayed.


