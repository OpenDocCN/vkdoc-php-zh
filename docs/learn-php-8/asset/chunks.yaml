    \ `$newupstring` value\ncan also be changed to\n\n```\n$newupstring = ',{\"userid\"\
    :\"' . $userid . '\",\"password\":\"' . $password . '\"}\\n]}';\n```"
  trans: "\n# 注册\n\n除了授权用户登录外，大多数系统还允许用户自行创建用户 ID 和密码。默认情况下，自行创建的 ID 会被赋予最低优先级。管理员此后可以登录并提升该\
    \ ID 的权限等级。部分网站允许未注册用户（未登录的用户）。未注册用户应仅被授予对非特权信息的只读访问权限。未注册用户的安全风险要大得多，因为在发生安全漏洞时很难确定其身份。PHP\
    \ 提供了使用 `$_SERVER['REMOTE_ADDR']` 获取用户 IP 地址的能力。这可能会提供一定的追踪用户能力。然而，许多用户使用免费的公共接入点，这些接入点会生成随机\
    \ IP 地址。如果使用了这类接入点之一，追踪他们将变得更加困难。\n\n此外，为用户提供创建用户 ID 和密码的机会，使得程序能够收集额外信息（例如姓名和电子邮件），这些信息有助于安全防护，并能方便地向网站用户推广该网站。对于已经熟悉该网站的客户，销售网站所提供的产品或服务的成功率会高得多。为了鼓励用户创建用户\
    \ ID 和密码，网站应为他们提供一些访客无法获得的益处（例如访问服务台）。\n\n*注册页面* 在许多方面的工作方式与登录页面类似。但是，任何输入的有效用户\
    \ ID 或密码都将被存储（而非进行比较）。由于应用程序将更新有效 ID 列表，因此应用程序必须在更新之前验证信息。你可以使用之前在验证 `dog` 类属性时使用过的一些技术。首先，当用户输入用户\
    \ ID 和密码（必须通过之前展示的 HTML5 验证）时，这些信息会被传递到一个 PHP 程序。即使它被认为在会话中是安全的，但信息会从 HTML 表单传输到\
    \ PHP 代码。应该再次对信息进行验证。\n\n```\nif ((isset($_POST['username'])) || (isset($_POST['password'])))\n\
    {\n$userid = $_POST['username'];\n$password = $_POST['password'];\nif (!(preg_match(\"\
    /^.*(?=.{8,})(?=.*\\d)(?=.*[a-z])(?=.*[A-Z]).*$/\", $password)) || (!(strlen($userid)\
    \ >= 8)))\n{\nthrow new Exception(\"Invalid Userid and/or Password Format\");\n\
    }\nelse\n```\n\n这个 `if` 语句使用 PHP 函数 `preg_match` 来判断密码格式是否包含一个大写字母、一个小写字母、一个数字，并且至少八个字符。注意，正则表达式格式与\
    \ HTML5 代码中使用的格式相同（表达式的顺序有所改变，但包含的信息相同）。PHP 的 `strlen` 方法还会检查用户 ID，以确定其包含八个或更多字符。\n\
    \n如果任一验证未通过，程序会抛出一个 `Exception`。如果两者都通过，则执行 `else` 部分的语句来对密码进行哈希处理并存储信息。\n\n```\n\
    $password = password_hash($password, PASSWORD_DEFAULT);\n$input = file_get_contents($dog_data_xml);\n\
    $find = \"\";\n$newupstring = \"\\n\" . $userid . \"\\n\" . $password;\n$newupstring\
    \ .= \"\\n\\n\";\n$find = preg_quote($find,'/');\n$output = preg_replace(\"/^$find(\\\
    n|\\$)/m\",\"\",$input);\n$output = $output . $newupstring;\nfile_put_contents($dog_data_xml,$output);\n\
    $login_string = date('mdYhis') . \" | New Userid | \" . $userid . \"\\n\";\nerror_log($login_string,3,$user_log_file);\n\
    header(\"Location: e7login.php\");\n```\n\n在将密码插入 XML 文件之前，必须对其进行加密（哈希处理）。PHP\
    \ 方法 `password_hash` 会将密码转换为前面展示过的格式。`file_get_contents` 将 XML 用户 ID/密码文件的内容转储到\
    \ `$input` 中。`preg_quote` 会在 `$find` 中的任何特殊字符（例如 `/users` 中包含的反斜杠）旁边放置反斜杠，以防止\
    \ PHP 将这些字符解释为正则表达式的一部分。`preg_replace` 将使用正则表达式 `/^$find(\\n|\\$)/m` 来搜索带有或不带有末尾\
    \ `\\n` 的 `</users>`。由于文件中的记录由换行符界定，这将确保你能找到位于文件行末或文件行内的 `</users>`。当在文件（文件内容位于\
    \ `$input` 中）中找到 `</users>` 时，它会被替换为 `\"\"`（空字符串）。`preg_replace` 也会尝试在第二参数（当前\
    \ `\"\"` 所在位置）中存在的任何字符串中放置反斜杠。如果将 `$newupstring` 放入该参数，则加密后的密码会被 `preg_replace`\
    \ 修改。即使输入的用户输入正确，这也会导致密码验证失败。因此，`$newupstring`（新用户信息）的内容会被追加到 `$output` 中。然后使用\
    \ `$output` 字符串替换用户 ID/密码 XML 文件的所有内容。一旦信息成功保存，用户日志会被更新以记录新用户 ID 的创建，并且用户会被重定向到登录屏幕，以便使用新的用户\
    \ ID 和密码登录应用程序。\n\n或者，也可以使用之前将文件加载到关联数组、更新关联数组、然后将关联数组加载回 XML 文件的过程。但是，这需要更多代码，且没有必要，因为该过程在应用程序中只使用一次。该程序不会多次尝试用同一个用户更新用户\
    \ ID 和密码文件。\n\n```\n= 8)))\n{\nthrow new Exception(\"Invalid Userid and/or Password\
    \ Format\");\n}\nelse\n{\nLibxml_use_internal_errors(true);\n$xmlDoc = new DOMDocument();\n\
    if ( file_exists(\"e7dog_applications.xml\") )\n{\n$xmlDoc->load( 'e7dog_applications.xml'\
    \ );\n$searchNode = $xmlDoc->getElementsByTagName( \"type\" );\nforeach( $searchNode\
    \ as $searchNode )\n{\n$valueID = $searchNode->getAttribute('ID');\nif($valueID\
    \ == \"UIDPASS\")\n{\n$xmlLocation = $searchNode->getElementsByTagName ( \"location\"\
    \ );\n$dog_data_xml =\n$xmlLocation->item(0)->nodeValue;\nbreak;\n}\n}\n}\nelse\n\
    {\nthrow new Exception(\"Dog applications xml file missing or corrupt\");\n}\n\
    }\n$password = password_hash($password, PASSWORD_DEFAULT);\n$input = file_get_contents($dog_data_xml);\n\
    $find = \"\";\n$newupstring = \"\\n\" . $userid . \"\\n\" . $password . \"\\n\\\
    n\";\n$find_q = preg_quote($find,'/');\n$output = preg_replace(\"/^$find_q(\\\
    n|\\$)/m\",$newupstring,$input);\nfile_put_contents($dog_data_xml,$output);\n\
    $login_string = date('mdYhis') . \" | New Userid | \" . $userid . \"\\n\";\nerror_log($login_string,3,$user_log_file);\n\
    header(\"Location: e7login.php\");\n} } }\ncatch(Exception $e) { echo $e->getMessage();\
    \ }\n?>\n\n用户 ID 必须包含八个或更多字符。\n密码必须包含至少一个数字、一个大写字母和一个小写字母，并且总共至少 8 个字符。\n用户名：\
    \ \n密码：\n\n**示例 8-3**  \n`registration.php` 文件\n\n## JSON 数据\n\nJSON 数据只需要进行少许修改。\n\
    \n```\n{\"user\":\n[\n{\"userid\":\"Fredfred\",\"password\":\"$2y$10$VosI32FejL.bOMaCjGbBp.Jre6Ipa.tLYQrVqj9kiVpef5zZ25qQK\"\
    },\n{\"userid\":\"Petepete\",\"password\":\"$2y$10$FdbXxIVXmVOHtaBNxB8vzupRBJFCqUyOTJXrlpNdrL0HKQ\\\
    /.uJ.FHO\"}\n] }\n```\n\n数据以组合 `]}` 结尾，该组合不会出现在其他地方。`$find` 可以设置为此值（`$set = \"\
    ]}\";`）。`$newupstring` 的值也可以改为：\n\n```\n$newupstring = ',{\"userid\":\"' . $userid\
    \ . '\",\"password\":\"' . $password . '\"}\\n]}';\n```\n"
- fmt: 'These two changes (along with the previous changes) would update a JSON file
    with a new user ID/password combination.


    ## MySQL Data


    MySQL would require a few more changes. After the password is hashed using `password_hash`,
    the database can be opened, the record inserted, and then the database can be
    closed.


    ```

    $password = password_hash($password, PASSWORD_DEFAULT);

    $mysqli =mysqli_connect($server, $db_username, $db_password, $database);

    if (mysqli_connect_errno())

    {

    throw new Exception("MySQL connection error: " . mysqli_connect_error());

    }

    $sql="INSERT INTO Users (userid, password) VALUES(''" . $userid . "'',''" . $password
    . "'');";

    $result=mysqli_query($con,$sql);

    If($result===null)

    {

    throw new Exception("Userid/Password not added to Database");

    }

    mysqli_close($con);

    $login_string = date(''mdYhis'') . " | New Userid | " . $userid . "\n";

    error_log($login_string,3,$user_log_file);

    header("Location: e7login.php");

    ```


    ## Logging In


    In addition to providing the users with the ability to create their own user IDs
    and passwords, an application should also provide them the ability to change their
    passwords. The ability to provide a date limit to expire passwords is very beneficial
    to increase security. Every time the user logs on, a comparison can be made on
    this value. If the current date is more than `xx` days older than the date saved,
    the user would be required to change the password.


    Since password sniffer programs will try to guess passwords, it is also a good
    idea to limit to the number of attempts to sign in with the right user ID and
    password combination. This would reduce the chances that a password sniffing program
    could generate the correct combination. It is important not to allow a valid sign-in
    for a period of time after the maximum number of attempts have been made. Even
    though this is frustrating to the user, it reduces the chances that a password
    sniffing program would discover the right combination. If the program does not
    know that the attempts have timed out, it will receive invalid user ID/password
    messages, even if it guessed the right combination during the `timeout` period.
    These adjustments will require additional fields to the user ID/password file
    (or database).


    ```

    Fredfred

    $2y$10$VosI32FejL.bOMaCjGbBp.Jre6Ipa.tLYQrVqj9kiVpef5zZ25qQK

    2015-09-03


    Poppoppop

    $2y$10$C1jXhTl0myamuLKhZxK5m.4X4TVcdeFbeLSBIA7l4fx6tUnC8vrg6

    2015-06-04

    ```


    The `$newupstring` can be adjusted in the `registration.php` program (Example
    [8-3](#394210_2_En_8_Chapter.xhtml#PC17)) to add the authentication fields.


    ```

    $newupstring = "\n" . $userid . "\n" . $hashed_password . "\n";

    $newupstring .= "" . date(''Y-m-d'', strtotime(''+30 days'')) . "\n";

    $newupstring .= "0\n" . date(''mdYhis'') . "\n";

    $newupstring .= "" . date(''mdYhis'') . "\n\n";

    ```


    The PHP method `strtotime` will parse any standard date and time format and attempt
    to convert it to the UNIX date time format (which PHP uses). In this example,
    the method provides the ability to add 30 days to the current date, which in turn
    will be used to determine if a password has expired. Alternatively, an expired
    date (such as the day before the current date) could be placed in this field when
    user IDs are created in bulk (such as populating student IDs in a course management
    system). This would force the users to change the password the first time they
    sign into the system. The expire date is stored in `datestamp` for use when the
    user logs in to the system. The `attempts` tag, in the example, will record how
    many times the user tries to sign in with a bad user ID password combination (reset
    to zero when a valid login occurs). If the date and time in `lastattempt` are
    in five minutes, and the value of attempts is `3` or greater, the user must wait
    until more than five minutes has expired since the last attempt to log in. As
    with most login systems, even if the user logs in with valid information, the
    last invalid login must be five or more minutes ago. The last valid login date
    and time is also recorded in the `validattempt` tags. Although this is not used
    for authentication in this example, it is important to keep track of all valid
    logins.


    To keep the code as simple as possible in the main section of the program, the
    code that looks up the location of the user ID and password file has been moved
    to the method `retrieve_useridpasswordfile`. Saving the data in the XML file has
    also been moved to the method `saveupfile`. No changes (except for the addition
    of more XML tags as mentioned previously) have occurred in the code for these
    methods.'
