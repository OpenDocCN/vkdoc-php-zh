  document.getElementById('dog_weight').value = obj.dogs[index].dog_weight;\n```\n\
  \nHTML 列表框包含文本和值。文本是用户看到的内容；值代表其含义。这与 PHP 关联数组——键（索引）和值——非常相似。`if` 语句检查 dogs 数组以确定其当前值。如果值为\
  \ `-1`，表示用户未选择任何内容，或者他们选择了“新建”。JavaScript 中的 `!` 符号与 PHP 中的 `!` 符号作用相同。该符号会改变 `if`\
  \ 部分的判断逻辑，使其在 `'dogs'` 的值不等于 `-1` 时执行。因此，如果用户从 dogs 列表框中选择了某只狗，这段代码就会执行。\n\n列表框的\
  \ `selectedIndex` 属性指示用户选择的索引。然而，HTML 列表框的编号是从 1 开始的。而 JavaScript 数组和 JSON 对象的索引是从\
  \ 0 开始的。这导致 `selectedIndex` 比在 JavaScript 数组或 JSON 对象中的位置多 1。示例中的代码减去了 1 以平衡这个关系。这个值被存入变量\
  \ `index` 中。它也被保存在同名（`index`）的隐藏属性（在 HTML 表单上）中。由于 `index` 是一个属性而不是 `div` 标签，因此必须使用\
  \ JavaScript 的 `value` 属性来设置 `index` 的值。\n\n`obj` 是在进行 AJAX 调用时创建的 JSON 对象（包含所有狗）。从\
  \ JSON 对象中检索信息的方式与从 PHP 关联数组中检索信息的方式非常相似。`obj` 对象类似于前几章中展示的多维 dogs 数组。顶层数组是 dogs\
  \ “数组”。在 dogs 数组中，是每只单独的狗的“数组”。这些数组没有关联的键名，但有数字索引。每个狗的数组包含单独的字段（`dog_name`、`dog_color`、`dog_breed`\
  \ 和 `dog_weight`）。在前一行代码中设置的 `index` 属性包含了用户选择的狗的索引。它将用于从 `obj` 中提取所选狗的信息并填充表单对象。由于我们知道要检索的数据的确切位置（在\
  \ `index` 中），因此不需要循环。\n\n`obj.dogs[index].dog_name` 使用 JSON 对象名 (`obj`)、顶层数组名 (`dogs`)、所需狗数组的编号\
  \ (`index`) 和所需字段的名称 (`dog_name`) 来访问所需信息。再次强调，此格式类似于从 PHP 关联数组中提取信息。`dog_name`\
  \ 和 `dog_weight` 值使用这种点符号格式从 `obj` JSON 对象中提取信息，并将其放置在 HTML 表单上相应的文本框中。\n\n```\n\
  dog_color = obj.dogs[index].dog_color;\nif(dog_color == \"Brown\")\n{\ncolorbuttons[0].checked\
