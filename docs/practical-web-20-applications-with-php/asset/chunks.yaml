    Creating the GetPosts() Function


    Now that we have a good idea of how _GetBaseQuery() and GetPostsCount() work,
    we can write the GetPosts() function. The idea in this function is to build the
    query with _GetBaseQuery() and then add the required fields to select.


    The other important task we do here and not in _GetBaseQuery() is to set the offset,
    limit, and ordering options. Since these options don’t apply to GetPostsCount(),
    they must be done here instead of in _GetBaseQuery().


    I have split this function up into three parts so we can easily dissect it. Listing
    8-3 shows the first part of the function.


