  \n现在，让我们使用用户 ID 和密码进行*身份验证*，以限制对博客管理模块的访问。我们需要两个*视图*：一个登录表单和一个退出登录表单。我们还需要一个*控制器*来处理来自这两个视图的用户交互，以及一个*模型*来实际执行登录和退出操作。该模型还应当记住一个状态：它需要记住用户是否已登录。\n\
  \n## 创建登录表单\n\n我们将从登录表单开始。我们的目标是创建一个系统，用户必须提供有效的用户 ID 和匹配的密码才能访问博客管理模块。因此，我们需要一个用户\
  \ ID 字段和一个密码字段。\n\n```\n登录以访问受限制区域\n用户 ID\n密码\n\n\";\n?>\n代码清单 9-20\nlogin-form-html.php\n\
  ```\n\n只需一个非常简单直接的表单即可。我们也可以创建一个简单的控制器来测试逻辑。\n\n```\n代码清单 9-21\nlogin.php\n```\n\
  \n管理导航中没有为登录提供菜单项，这也不应有。我们希望登录表单作为管理模块前端控制器的默认视图显示。只有当用户通过身份验证并登录后，才允许其看到博客管理模块。\n\
  \n## 对未授权用户隐藏控件\n\n非常重要的一点是，登录功能必须对未授权用户隐藏系统的某些部分。到目前为止，任何访问前端管理控制器的用户都可以轻易访问管理模块。我们将通过进行以下修改来解决这个问题：\n\
