    # Recipe 5-7. The `DateTime` Class


    ## Problem


    When integer values are used to represent a timestamp as a number of seconds since
    the reference time, the range of the dates that can be handled is determined by
    allowed values in an integer variable. On a 32-bit system where an integer is
    a 4-byte value, a timestamp can range from 1901-12-13 20:45:51 to 2038-01-19 03:14:08
    in UTC (roughly plus and minus 68 years). How can date and time values beyond
    this range be represented in PHP?


    ## Solution


    On a 64-bit system, where integers are 8-byte values, the timestamp range is between
    -292277022657-01-28 08:29:52 and 292277026596-12-04 15:30:07 UTC (roughly plus
    and minus 29 billion years).


    Changing the operating system from 32-bit to 64-bit might not always be an option,
    so for that PHP provides a built-in class called `DateTime()` that allows the
    same date ranges as on a 64-bit system. The `DateTime()` class was introduced
    as experimental with version 5.1 and has been included since version 5.2 of PHP.


    ## How it Works


    Instantiating an object from the `DateTime()` class can be done without parameters.
    This will create an object with the current time and the current time zone. The
    date and time can be printed with the use of the same formatting strings as the
    `date()` function uses.


    ```php

    // 5_13.php

    $d = new DateTime();

    echo $d->format("M d Y h:i:s a") . "\n";

    ```


    Which will generate output that looks like this:


    `Mar 29 2015 11:18:36 am`


    If you want the date/time object to contain a specific date and time value rather
    than the current time, you can pass the value as the first argument when the object
    is instantiated. The format of the date/time value must follow a specific format.
    The full list of supported formats can be found here: [http://php.net/manual/en/datetime.formats.php](http://php.net/manual/en/datetime.formats.php).


    Creating a date/time object with a specific date would look like what is shown
    in the next example:


    ```php

    // 5_14.php

    $d = new DateTime("2010-10-31 13:15:00");

    echo $d->format("M d Y h:i:s a P") . "\n";

    ```


    The first parameter contains both a date part and a time part, and the output
    will show the date and time according to the format string provided:


    `Oct 31 2010 01:15:00 pm -07:00`


    If the date string you pass is from a different time zone, you can use the second
    optional parameter to create the date/time object in a different time zone. When
    a time zone parameter is used, the date/time object will remember that value and
    use it for all calculations including presentations. If we change the code to
    include a time zone, the output will be the same with the exception of the GMT
    offset.


    ```php

    // 5_15.php

    $tz = new DateTimeZone("Europe/Copenhagen");

    $d = new DateTime("2010-10-31 13:15:00", $tz);

    echo $d->format("M d Y h:i:s a P") . "\n";

    ```


    Note that the time zone is passed as an object instantiated from the `DateTimeZone()`
    class. The output will look like this:


    `Oct 31 2010 01:15:00 pm +01:00`


    The date/time string passed as the first parameter is parsed the same way as the
    `strtotime()` function. That means you can parse relative dates when you are instantiating
    the object, as shown in the next example where two objects are created. The first
    one uses the current date and time, and the second one calculates a date/time
    that is two months into the future and at the same time specifies the exact time
    to 12:00.


    ```php

    // 5_16.php

    $d = new DateTime();

    echo $d->format("M d Y h:i:s a P") . "\n";


    // Noon in 2 months

    $d = new DateTime("+2 months 12:00");

    echo $d->format("M d Y h:i:s a P") . "\n";

    ```


    It is a little before noon local time at the time this script was executed, so
    the two times are close but on dates that are two months apart.


    `Mar 29 2015 11:39:46 am -07:00`


    `May 29 2015 12:00:00 pm -07:00`


    Changing the date, time, or time zone after you have created the object is possible
    with a number of methods on the `DateTime()` object.


    Setting a specific date or time can be done with `DateTime::modify()`. This method
    takes a string parameter that works the same as the parameter used in the constructor.
    You can either change the date/time to a new explicit value, or you can modify
    it relatively.


    In the next example, the date/time value is instantiated to the current time and
    then altered with the `modify()` method to a specific date, then changed relatively
    to a date that’s two months ahead, and finally to a date 2000 years ago.


    ```php

    // 5_17.php

    date_default_timezone_set(''America/Los_Angeles'');

    $d = new DateTime();

    echo $d->format("M d Y h:i:s a P") . "\n";


    $d->modify("2010-10-31");

    echo $d->format("M d Y h:i:s a P") . "\n";


    // Noon 2 months later

    $d->modify("+2 months 12:00");

    echo $d->format("M d Y h:i:s a P") . "\n";


    $d->modify("-2000 years");

    echo $d->format("M d Y h:i:s a P") . "\n";

    ```


    The resulting output shows a change in the GMT offset corresponding to dates where
    there is no daylight savings time. The first date is because it falls in the wintertime,
    and the second one because daylight savings time didn’t exist 2000 years ago.


    `Mar 29 2015 11:56:05 am -07:00`


    `Oct 31 2010 11:56:05 am -07:00`


    `Dec 31 2010 12:00:00 pm -08:00`


    `Dec 31 0010 12:00:00 pm -08:00`


    Although this code was executed on a 64-bit system, it would produce the same
    result on a 32-bit platform.


    Another way to work with relative time is to use the `add()` or `sub()` methods
    of the `DateTime()` object. These methods take a single parameter that is an object
    of the class `DateInterval()`. The `DateInterval()` constructor uses a string
    to define the length of the period by specifying a number of years (`Y`), months
    (`M`), weeks (`W`), days (`D`), hours (`H`), minutes (`M`), and seconds (`S`).
    Note that `M` is used for both months and minutes. This is possible because of
    two extra letters `P` and `T` that designate the period (`P`) and the time (`T`)
    portion of the interval. To create a time interval of 2 years, 3 months, 5 days,
    and 10 hours, you would use the string `''P2Y3M5DT10H''`.


    ```php

    // 5_18.php

    date_default_timezone_set(''America/Los_Angeles'');

    $d = new DateTime("Oct 10 1980");

    echo $d->format("M d Y h:i:s a P") . "\n";


    $i = new DateInterval(''P2Y3M5DT10H'');

    $d->add($i);

    echo $d->format("M d Y h:i:s a P") . "\n";

    ```


    And the output will look like this, where the GMT offset changes because the date
    moves from a period with daylight savings time to a period without:


    `Oct 10 1980 12:00:00 am -07:00`


    `Jan 15 1983 10:00:00 am -08:00`


    The `DateInterval()` class is also used when it comes to differences between dates.


    ```php

    // 5_19.php

    // User 1 creates a date

    $d1 = new DateTime("Oct 10 1980");

    $d2 = new DateTime("March 15 1990");

    $i = $d1->diff($d2);

    echo $i->format("%Y %M %D %H:%I:%S") . "\n";

    ```


    In this example we have two date and time objects roughly 10 years apart. The
    output of the script shows `09 05 05 00:00:00`, which according to the format
    indicates 9 years, 5 months, and 5 days. There is no time difference, so the two
    objects have the same time of day.


    In the example from earlier where a user enters a date according to a local time
    zone and another user views the date according to his or her time zone, this can
    be handled by changing the time zone on the date/time object.


    ```php

    // 5_20.php

    // User 1 creates a date

    $tz = new DateTimeZone("Europe/Copenhagen");

    $d = new DateTime("Oct 10 1980", $tz);

    echo $d->format("M d Y h:i:s a P") . "\n";


    // User 2 in Los Angeles

    $tz = new DateTimeZone("America/Los_Angeles");

    $d->setTimezone($tz);

    echo $d->format("M d Y h:i:s a P") . "\n";

    ```


    The code shows the same flaw as before where dates, stored as a timestamp, will
    look like two different dates, caused by the difference in time zone offset.


    `Oct 10 1980 12:00:00 am +01:00`


    `Oct 09 1980 04:00:00 pm -07:00`'
