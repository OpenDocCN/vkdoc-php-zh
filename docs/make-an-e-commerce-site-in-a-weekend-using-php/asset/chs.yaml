  \ |\n\n别担心；你不必手动创建这些数据库表和 `shopping` 数据库。我在本书中提供了一个名为 `creatingtables.sql` 的 SQL\
  \ 脚本。该 SQL 脚本如代码清单 1-1 所示。\n\n**代码清单 1-1.** SQL 脚本 `creatingtables.sql`\n\n```\n\
  create database shopping;\n\nuse shopping;\n\ncreate table products (\nitem_code\
  \ varchar(20) not null,\nitem_name varchar(150) not null,\nbrand_name varchar(50)\
  \ not null,\nmodel_number varchar(30) not null,\nweight varchar(20),\ndimension\
  \ varchar(50),\ndescription text,\ncategory varchar(50),\nquantity SMALLINT not\
  \ null,\nprice DECIMAL(7,2),\nimagename varchar(50)\n);\n\ncreate table productfeatures\
  \ (\nitem_code varchar(20) not null,\nfeature1 varchar(255),\nfeature2 varchar(255),\n\
  feature3 varchar(255),\nfeature4 varchar(255),\nfeature5 varchar(255),\nfeature6\
  \ varchar(255)\n);\n\ncreate table cart (\ncart_sess char(50) not null,\ncart_itemcode\
  \ varchar(20) not null,\ncart_quantity SMALLINT not null,\ncart_item_name varchar(100),\n\
  ```\n\n\n```sql\ncart_price DECIMAL(7,2)\n);\ncreate table customers (\nemail_address\
  \ varchar(50) not null,\npassword varchar(50) not null,\ncomplete_name varchar(50),\n\
  address_line1 varchar(255),\naddress_line2 varchar(255),\ncity varchar(50),\nstate\
  \ varchar(50),\nzipcode varchar(10),\ncountry varchar(50),\ncellphone_no varchar(15),\n\
  primary key(email_address)\n);\ncreate table orders (\norder_no int(6) not null\
  \ auto_increment,\norder_date date,\nemail_address varchar(50),\ncustomer_name varchar(50),\n\
  shipping_address_line1 varchar(255),\nshipping_address_line2 varchar(255),\nshipping_city\
  \ varchar(50),\nshipping_state varchar(50),\nshipping_country varchar(50),\nshipping_zipcode\
  \ varchar(10),\nprimary key (order_no)\n);\ncreate table orders_details (\norder_no\
  \ int(6) not null,\nitem_code varchar(20) not null,\nitem_name varchar(100) not\
  \ null,\nquantity SMALLINT not null,\nprice DECIMAL(7,2)\n);\ncreate table payment_details\
  \ (\norder_no int(6) not null,\norder_date date,\namount_paid DECIMAL(7,2),\nemail_address\
  \ varchar(50),\ncustomer_name varchar(50),\npayment_type varchar(20),\nname_on_card\
  \ varchar(30),\ncard_number varchar(20),\nexpiration_date varchar(10)\n);\n```\n\
  \n你只需运行此脚本即可创建数据库和数据表。请按照以下步骤操作。\n\n#### 运行 MySQL 脚本的步骤\n\n要运行 SQL 脚本，需要打开 MySQL\
  \ 控制台。因此，请点击任务栏中的 WampServer 图标，然后从弹出的菜单中选择 `MySQL`->`MySQL 控制台` 选项。\n\n系统会提示你输入用户\
  \ `root` 的密码。输入密码后，你将在 MySQL 控制台窗口中看到 `mysql>` 提示符，如图 1-27 所示。\n\n![A978-1-4842-1672-9_1_Fig27_HTML.jpg](img/A978-1-4842-1672-9_1_Fig27_HTML.jpg)\n\
  \n图 1-27. 用于运行 SQL 命令/脚本的 MySQL 控制台窗口\n\n要执行 SQL 脚本，你需要使用 `source` 命令。`source` 命令的语法是：\n\
  \n`source [路径] sqlscript.sql`\n\n假设 `creatingtables.sql` 文件位于 `D:` 盘，你可以使用以下命令执行它：\n\
  \n`source D:\\\\creatingtables.sql`\n\n`creatingtables.sql` 文件中的 SQL 命令将被执行，并创建\
  \ `shopping` 数据库以及前面讨论过的数据表。每成功执行一条 SQL 命令，都会得到 `Query OK` 的输出，如图 1-28 所示。\n\n*\
  \   执行 `show databases` 命令会显示 MySQL 服务器中现有的数据库。`shopping` 数据库的出现确认了 `shopping` 数据库已成功创建。\n\
  *   `use` 命令使指定的数据库成为活动或当前数据库。`use shopping` SQL 命令使 `shopping` 数据库变为活动状态。\n*  \
  \ 执行 `show tables` 命令会显示当前活动数据库中存在的所有数据表。你可以看到所有七张数据库表都已成功创建在 `shopping` 数据库中。\n\
  \n![A978-1-4842-1672-9_1_Fig28_HTML.jpg](img/A978-1-4842-1672-9_1_Fig28_HTML.jpg)\n\
  \n图 1-28. 执行用于创建 shopping 数据库及其数据表的 SQL 脚本\n\n成功创建数据库及其数据表后，你需要在 `products` 和 `productsfeatures`\
  \ 表中填充一些测试商品信息。为此，你需要执行本书提供的另一个 SQL 脚本，名为 `insertingrows.sql`。执行过程与 `creatingtables.sql`\
  \ 脚本完全相同。\n\n## 章节总结\n\n在本章中，你学习了最终完成的电子商务网站将呈现的样子。同时，你也了解了如何安装创建和测试本网站所需的 WampServer。你还学习了如何通过\
  \ phpMyAdmin 软件工具配置 MySQL 服务器。最后，你了解了为本网站保存商品、订单和客户信息所需的各种数据表的数据库结构。\n\n在下一章中，你将学习如何编写你的第一个\
  \ PHP 脚本。同时，你还将学习如何将信息从一个 PHP 脚本传递到另一个。利用这些知识，你将学习创建一个用于创建新用户帐户的登录表单。\n\n"
- "# 2. PHP 与 MySQL\n\n**电子补充材料**：本章的在线版本 (doi:10.1007/978-1-4842-1672-9_2) 包含补充材料，仅供授权用户使用。\n\
  \n你将使用 PHP 和 MySQL 来开发这个电子商务网站。问题是为什么选择 PHP 和 MySQL？答案非常简单。PHP 和 MySQL 的组合使 Web\
  \ 开发任务变得相当容易。这里列出了它们的一些特点：\n\n*   两者都是开源技术，并在 GPL（通用公共许可证）下提供。因此，使用这种组合开发 Web 应用程序的成本相当低。\n\
  *   PHP 是一种强大的语言，并且可以非常容易地连接 MySQL 服务器，这使得该组合在 Web 开发中很受欢迎。\n*   该组合可以成功地在 UNIX\
  \ 和 Windows 平台上使用。\n*   该组合的性能非常高。用 PHP 编写的用于从 MySQL 插入和获取信息的代码非常高效。\n*   PHP 和\
  \ MySQL 受到开发社区的广泛支持，因此你能获得定期的更新。\n\n在本章中，你将学习以下内容：\n\n*   编写你的第一个 PHP 脚本\n*   在\
  \ PHP 中使用变量，创建 `echo` 语句，以及拼接字符串\n*   使用 HTTP 方法传输数据——GET 和 POST\n*   使用 `$_GET`、`$_POST`\
  \ 和 `$_REQUEST` 数组将信息从一个脚本传递到另一个脚本\n*   创建一个登录表单\n*   应用验证检查\n*   编写用于连接 PHP 与 MySQL\
  \ 的代码\n*   通过 PHP 执行 SQL 命令，在数据库表中存储信息，以及从数据库访问信息\n*   实现身份验证\n\n\n## 编写你的第一个 PHP\
  \ 脚本\n\n一个 PHP 文件通常包含 HTML 标签以及内嵌其中的一些 PHP 脚本代码。清单 2-1 展示了一个显示 PHP 配置信息的最简 PHP 脚本。在学习如何运行此脚本之前，你应当先快速了解该脚本中使用的\
  \ `phpinfo()` 函数。\n\n`phpinfo()` 函数用于显示 PHP 的配置信息，其显示的信息包括以下几个方面：\n\n* PHP 编译选项\n\
  * PHP 版本\n* 服务器信息和环境\n* PHP 环境\n* 不同配置选项的值\n* PHP 许可证\n\n**清单 2-1. 用于显示 PHP 配置信息的\
  \ PHP 脚本 (phpdetails.php)**\n\n```\n<?php\n        phpinfo();\n?>\n```\n\n要运行此 PHP\
  \ 脚本，请按以下步骤操作：\n\n使用任意编辑器输入此脚本，并将其以 `phpdetails.php` 为文件名，保存在 `wamp` 目录下的 `www`\
  \ 子文件夹中。例如，如果 WampServer 安装在 `C:` 盘，则将此脚本保存在 `C:\\wamp\\www` 文件夹中。请确保 WampServer\
  \ 正在运行，即其任务栏图标为绿色。如果没有运行，请单击其图标，并从弹出的菜单中选择“**启动所有服务**”。\n\nWampServer 启动后，打开浏览器并访问以下地址：`http://localhost/phpdetails.php`。你将看到如图\
  \ 2-1 所示的输出。\n\n![A978-1-4842-1672-9_2_Fig1_HTML.jpg](img/A978-1-4842-1672-9_2_Fig1_HTML.jpg)\n\
  \n**图 2-1. 显示 PHP 配置信息的 PHP 脚本**\n\n接下来，清单 2-2 展示了一个在输出中显示两行文本的非常基础的示例。\n\n**清单\
  \ 2-2. 简单的 PHP 脚本 (phpscript1.php)**\n\n```\n<html>\n    <head>\n    </head>\n \
  \   <body>\n        <h1>宾图在线集市</h1>\n        <?php\n            echo '<b>欢迎光临我们的商店</b>';\n\
  \        ?>\n    </body>\n</html>\n```\n\n同样，将此脚本以 `phpscript1.php` 为文件名，保存在 `wamp`\
  \ 目录下的 `www` 子文件夹中。确保 WampServer 正在运行，然后打开浏览器并访问以下地址：`http://localhost/phpscript1.php`。你将得到如图\
  \ 2-2 所示的输出。\n\n![A978-1-4842-1672-9_2_Fig2_HTML.jpg](img/A978-1-4842-1672-9_2_Fig2_HTML.jpg)\n\
  \n**图 2-2. 显示欢迎信息的 PHP 脚本**\n\n在清单 2-1 所示的代码中，你可以看到 PHP 脚本可以简单地通过起始 PHP 标签 `<?php`\
  \ 和结束 PHP 标签 `?>` 嵌入到 HTML 中。\n\n当 Web 服务器发现 PHP 脚本时，它会调用 PHP 引擎并将脚本传递给它。PHP 引擎会解释\
  \ `<?php` 和 `?>` 标签之间的语句，生成相应的 HTML 代码，并将其传递回 Web 服务器。然后，Web 服务器将 HTML 文档发送到客户端浏览器进行显示。\n\
  \nPHP 脚本块可以放置在文档中的任意位置，并且每条语句都必须以分号结束。分号作为分隔符，用于区分不同的语句。\n\n为了存储值和文本，你需要使用变量。因此，接下来我们将讨论变量。\n\
  \n### 在 PHP 中使用变量\n\n变量可用于存储用户输入的数据，或存储常量数值或文本。变量的值通过赋值操作符 (`=`) 进行赋值。PHP 中的所有变量都以美元符号\
  \ (`$`) 开头。清单 2-3 中的脚本 `phpscript2.php` 演示了如何在 PHP 中定义和使用变量。\n\n**清单 2-3. 演示变量使用的\
  \ PHP 脚本 (phpscript2.php)**\n\n```\n<html>\n    <body>\n        <?php\n        \
  \    $name=\"John\";\n            echo \"欢迎 $name <br/>\";\n            $a=10;\n\
  \            $b=20;\n            echo \"$a 加上 $b 的和为 \";\n            echo $a+$b;\n\
  \        ?>\n    </body>\n</html>\n```\n\n**输出**\n\n```\n欢迎 John\n10 加上 20 的和为 30\n\
  ```\n\nPHP 脚本中最常用的语句是 `echo`。接下来将介绍它。\n\n### echo 语句\n\n`echo` 语句用于在 HTML 代码中的当前位置，将输出显示在客户端的浏览器上。输出可以使用单引号、双引号或不加引号来显示：\n\
  \n* **单引号**——用于显示不包含任何变量或数组的消息。示例：`echo '欢迎光临我们的商店';`\n* **不加引号**——要显示分配给变量的值/文本，无需使用引号。例如，以下代码行显示分配给变量\
  \ `msg` 的文本：\n  ```\n  $msg = '欢迎光临我们的商店';\n  echo $msg;\n  ```\n* **双引号**——用于在字符串内显示分配给变量的值/文本。示例：`$msg\
  \ = '欢迎光临我们的商店';` `echo \"您好！$msg\";`\n\n### 字符串拼接\n\n要拼接两个或多个字符串变量，请使用点 (`.`) 操作符。清单\
  \ 2-4 中的脚本 `phpscript3.php` 展示了如何拼接两个字符串。\n\n**清单 2-4. 演示字符串拼接的 PHP 脚本 (phpscript3.php)**\n\
  \n```\n<html>\n    <body>\n        <?php\n            $a=\"John\";\n           \
  \ echo \"您好 $a!\" . \" 欢迎光临我们的商店\";\n        ?>\n    </body>\n</html>\n```\n\n**输出：**\n\
  \n```\n您好 John! 欢迎光临我们的商店\n```\n\n在此脚本中，你可以看到第一个字符串 `\"您好 John!\"` 通过在其间使用点操作符 (`.`)，与另一个字符串\
  \ `\"欢迎光临我们的商店\"` 拼接在一起。\n\n> **注意**：在 PHP 中，使用 `//` 进行单行注释。对于跨越多行的注释，请将其包含在一对 `/*`\
  \ 和 `*/` 符号之间。\n\n## 用于数据传输的 HTTP 方法\n\n在开发应用程序时，你可能会遇到这样的情况：希望用户在一个 Web 表单中输入的数据被提交到另一个表单以进行进一步处理或操作。从一个\
  \ Web 表单传递到另一个表单的信息通常通过两种 HTTP 请求方法进行，即 GET 和 POST。\n\n### GET 方法\n\n这是传递数据的默认方法，被认为安全性较低，因为它会显示在浏览器的地址栏中。当你在浏览器的地址栏中看到类似这样的内容：\n\
  \n`display.php?name=john&email_add=john@yahoo.com`\n\n意味着数据正在使用 GET 方法传递给 `display.php`\
  \ 脚本。所传递的数据包含两个变量——`name` 和 `email_add`。通过 GET 方法传递的数据对所有人可见，并且会存储在浏览器的历史记录/日志中，因此安全性较低。所以，GET\
  \ 方法通常用于传递非重要的数据。\n\nGET 方法仅支持 ASCII 字符，因此你无法使用此方法传递二进制信息。此外，通过此方法传递的信息量有限，最大为 2KB。某些服务器能处理高达\
  \ 64KB。\n\n当使用 HTTP GET 方法时，前一个表单的数据被存储在一个名为 `$_GET` 的数组中。数据以键值对（变量名和值）的形式传递。\n\n\
  ### POST 方法\n\n在这种方法中，传递的信息更为安全，因为它不会显示在浏览器的地址栏中。以下是 POST 方法的一些特点：\n\n* 数据通过安全的\
  \ HTTP 协议直接在套接字连接上传递，因此数据是安全的。\n* POST 方法变量不会显示在 URL 中。同时，POST 请求不会保留在浏览器历史记录中。\n\
  * 对发送数据的大小没有限制。\n* 可以发送二进制数据或 ASCII 信息。\n* 当使用 POST 方法时，当前表单的数据被收集在 `$_POST` 数组中。\n\
  \n\n\n## 在脚本之间传递信息\n\n为了理解通过 GET 和 POST 方法传递数据的概念，你将创建一个表单，要求用户输入姓名和电子邮件地址，如图 2-3\
  \ 所示。\n\n![A978-1-4842-1672-9_2_Fig3_HTML.jpg](img/A978-1-4842-1672-9_2_Fig3_HTML.jpg)\n\
  \n图 2-3. 提示输入姓名和电子邮件地址的表单\n\n要创建这样的表单，请创建一个名为 `userinfo.php` 的 PHP 脚本，其代码如代码清单 2-5\
  \ 所示。\n\n代码清单 2-5. 用于输入姓名和电子邮件地址的表单 (`userinfo.php`)\n\n```\n<html>\n    <head>\n\
  \    </head>\n    <body>\n        <form action=\"display.php\" method=\"Get\">\n\
  \            Name: <input type=\"text\" name=\"name\" /><br/><br/>\n           \
  \ Email address: <input type=\"text\" name=\"email_add\" /><br/><br/>\n        \
  \    <input type=\"submit\" value=\"Submit\" />\n        </form>\n    </body>\n\
  </html>\n```\n\n该表单有两个输入框，分别名为 `name` 和 `email_add`。表单的 `action` 指向一个 PHP 文件 `display.php`。用于传递数据（`name`\
  \ 和 `email_add`）的 HTTP 方法是 GET。\n\n要在脚本之间传递信息，有三个作为数据载体的数组：`$_GET`、`$_POST` 和 `$_REQUEST`。接下来你将逐一了解这些数组是如何用于传输数据的。\n\
  \n### 使用 `$_GET` 数组\n\n`$_GET` 数组用于存储先前表单通过 HTTP GET 方法发送的数据。先前表单发送的数据以键值对的形式呈现：变量名和对应的值。\n\
  \n请参考代码清单 2-2 中所示的表单。当用户点击其中的“提交”按钮时，浏览器地址栏中的 URL 将显示如下：\n\n`http://localhost/display.php?name=john&email_add=john@yahoo.com`\n\
  \n你可以看到，该 URL 显示了所有正在传递的信息。目标 PHP 脚本 `display.php` 现在可以通过代码从 `$_GET` 数组中提取数据，如代码清单\
  \ 2-6 所示。\n\n代码清单 2-6. 从 `$_GET` 数组访问信息的表单 (`display.php`)\n\n```\n<html>\n    <head>\n\
  \    </head>\n    <body>\n        Welcome <?php echo $_GET[\"name\"]; ?>.<br>\n\
  \        Your email address is <?php echo $_GET[\"email_add\"]; ?>\n    </body>\n\
  </html>\n```\n\n这段代码通过 `$_GET` 数组访问由 `userinfo.php` 传递的姓名和电子邮件地址，并将它们显示在屏幕上，如图 2-4\
  \ 所示。\n\n![A978-1-4842-1672-9_2_Fig4_HTML.jpg](img/A978-1-4842-1672-9_2_Fig4_HTML.jpg)\n\
  \n图 2-4. 在另一个表单上显示的用户姓名和电子邮件地址\n\n### 使用 `$_POST` 数组\n\n`$_POST` 数组用于收集通过 HTTP POST\
  \ 方法从表单发送的值。要使用 POST 方法传递数据，你只需将在代码清单 2-2 所示的 `userinfo.php` 脚本中，表单的 `method` 属性中的\
  \ GET 替换为 POST 即可。\n\n如前所述，在 POST 方法中，`$_POST` 数组收集表单中的值。这也意味着当用户点击“提交”按钮时，`$_POST[\"\
  name\"]` 和 `$_POST[\"email_add\"]` 变量将自动填充他们在两个输入框中输入的数据。\n\n要在目标 PHP 脚本 `display.php`\
  \ 中显示姓名和电子邮件地址，你需要将 `$_GET` 数组替换为 `$_POST` 数组，如代码清单 2-7 所示。\n\n代码清单 2-7. 从 `$_POST`\
  \ 数组访问信息的表单 (`display.php`)\n\n```\n<html>\n    <head>\n    </head>\n    <body>\n\
  \        Welcome <?php echo $_POST[\"name\"]; ?>.<br>\n        Your email address\
  \ is <?php echo $_POST[\"email_add\"]; ?>\n    </body>\n</html>\n```\n\n除了 `$_GET`\
  \ 和 `$_POST` 之外，还有一个用于存储当前表单信息的数组，它叫做 `$_REQUEST`。\n\n### 使用 `$_REQUEST` 数组\n\n\
  `$_REQUEST` 数组包含 `$_GET` 和 `$_POST` 的内容。也就是说，它用于收集通过 GET 或 POST 方法发送数据的表单中的信息。\n\
  \n因此，如果你不确定源 PHP 脚本使用了哪种 HTTP 方法，明智的做法是使用 `$_REQUEST` 数组来访问信息。要在 `display.php` 脚本中通过\
  \ `$_REQUEST` 数组显示姓名和电子邮件地址，只需将（代码清单 2-7 中的）`$_POST` 替换为 `$_REQUEST`，如代码清单 2-8 所示。\n\
  \n代码清单 2-8. 从 `$_REQUEST` 数组访问信息的表单 (`display.php`)\n\n```\n<html>\n    <head>\n\
  \    </head>\n    <body>\n        Welcome <?php echo $_REQUEST[\"name\"]; ?>.<br\
  \ />\n        Your email address is <?php echo $_REQUEST[\"email_add\"]; ?>\n  \
  \  </body>\n</html>\n```\n\n现在你已经了解了表单的创建方式以及可用的 HTTP 方法。一个表单的信息也可以传递到另一个表单。接下来，你将利用目前已掌握的知识，创建一个允许用户在网站上注册的注册表单。\n\
  \n\n\n## 创建注册表单\n\n注册表单允许用户在您的网站上注册。注册表单通常提示用户输入电子邮件地址、密码、全名、地址、手机号码等信息。这些信息随后会存储在数据库中，以备将来使用。\n\
  \n一旦用户的数据存储在数据库中，他们无需重新输入。成功登录后，这些信息将自动获取。PHP 脚本 `signup.php` 如清单 2-9 所示。\n\n**清单\
  \ 2-9.** 用于创建新账户的注册表单 (`signup.php`)\n\n```html\n<html>\n<head>\n</head>\n<body>\n\
  \    <form action=\"addcustomer.php\" method=\"post\">\n        <table border=\"\
  0\" cellspacing=\"1\" cellpadding=\"3\">\n            <tr><td colspan=\"2\" align=\"\
  center\">请输入您的信息</td></tr>\n            <tr><td>电子邮件地址：</td><td><input size=\"20\"\
