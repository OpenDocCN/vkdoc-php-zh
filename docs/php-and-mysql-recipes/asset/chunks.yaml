    ## 方案 3-5：使用十六进制数


    ### 问题描述


    以二进制方式使用整数来表示标志很方便，但编写由 0 和 1 组成的长数字不利于可读性。


    ### 解决方案


    使用十六进制（基数为 16）系统可以有所帮助。十六进制数中的每个数字代表值的 4 位。在 32 位系统上，整数可以用 8 位数字表示，在 64 位系统上，整数可以用
