  raw: 'Continuing from before, the simple “Hello World” PHP web document should look
    like this.


    ```

    <html>

     <head><title>PHP Test</title></head>

     <body>

      <?php echo "Hello World"; ?>

     </body>

    </html>

    ```


    To view this PHP file parsed into HTML, save it to the web server''s htdocs folder
    (the server''s root directory) with a name such as “mypage.php”. Then point your
    browser to its path, which is “`http://localhost/mypage.php`” for a local web
    server.


    When a request is made for the PHP web page the script is parsed on the server
    and sent to the browser as only HTML. If the source code for the website is viewed
    it will not show any of the server-side code that generated the page, only the
    HTML output.


    Compile and parse


    PHP is an interpreted language, not a compiled language. Every time a visitor
    arrives at a PHP website the PHP engine compiles the code and parses it into HTML
    which is then sent to the visitor. The main advantage of this is that the code
    can be changed easily without having to recompile and redeploy the website. The
    main disadvantage is that compiling the code at run-time requires more server
    resources.


    For a small website a lack of server resources is seldom an issue. The time it
    takes to compile the PHP script is also miniscule compared with other factors,
    such as the time required to execute database queries. However, for a large web
    application with lots of traffic the server load from compiling PHP files is likely
    to be significant. For such a site the script compilation overhead can be removed
    by precompiling the PHP code. This can be done for example with eAccelerator,[³](#9781430262831_Ch01.xhtml#Fn3)
      which caches PHP scripts in their compiled state.


    A website that only serves static content (same to all visitors) has another possibility,
    which is to cache the fully generated HTML pages. This provides all the maintenance
    benefits of having a dynamic site, with the speed of a static site. One such caching
    tool is the W3 Total Cache[⁴](#9781430262831_Ch01.xhtml#Fn4) plugin for the WordPress
    CMS.


    Comments


    Comments are used to insert notes into the code and will have no effect on the
    parsing of the script. PHP has the two standard C++ notations for single-line
    (`//`) and multi-line (`/* */`) comments. The Perl comment notation (`#`) may
    also be used to make single-line comments.


    ```

    <?php

      // single-line comment

      #  single-line comment

      /* multi-line

         comment */

    ?>

    ```


    As in HTML, whitespace characters – such as spaces, tabs and comments – are generally
    ignored by the PHP engine. This allows you a lot of freedom in how to format your
    code.


    [¹](#9781430262831_Ch01.xhtml#_Fn1)`http://www.php.net/manual/en/configuration.file.php`


    [²](#9781430262831_Ch01.xhtml#_Fn2)`http://www.apachefriends.org/en/xampp.html`


    [³](#9781430262831_Ch01.xhtml#_Fn3)`http://www.eaccelerator.net`


    [⁴](#9781430262831_Ch01.xhtml#_Fn4)`http://wordpress.org/extend/plugins/w3-total-cache`


    CHAPTER 2


    ![image](images/frontdot.jpg)


    Variables


    Variables are used for storing data, such as numbers or strings, so that they
    can be used multiple times in a script.


    Defining variables


    A variable starts with a dollar sign (`$`) followed by an *identifier* , which
    is the name of the variable. A common naming convention for variables is to have
    each word initially capitalized, except for the first one.


    ```

    $myVar;

    ```


    A value can be assigned to a variable by using the equals sign, or assignment
    operator (`=`). The variable then becomes *defined* or *initialized* .


    ```

    $myVar = 10;

    ```


    Once a variable has been defined it can be used by referencing the variable’s
    name. For example, the value of the variable can be printed to the web page by
    using `echo` followed by the variable’s name.


    ```

    echo $myVar; // "10"

    ```


    Keep in mind that variable names are case sensitive. Names in PHP can include
    underscore characters and numbers, but they cannot start with a number. They also
    cannot contain spaces or special characters, and must not be a reserved keyword.


    Data types


    PHP is a loosely typed language. This means that the type of data that a variable
    can store is not specified. Instead, a variable’s data type will change automatically
    to be able to hold the value it is assigned.


    ```

    $myVar = 1;   // int type

    $myVar = 1.5; // float type

    ```


    Furthermore, the value of a variable will be evaluated differently depending on
    the context in which it is used.


    ```

    // Float type evaluated as string type

    echo $myVar; // "1.5"

    ```


    Because of these implicit type conversions, knowing the underlying type of a variable
    is not always necessary. Nevertheless, it is important to have an understanding
    of the data types PHP works with in the background. These nine types are listed
    in the table below.


    | Data Type | Category | Description |

    | --- | --- | --- |

    | int | Scalar | Integer |

    | float | Scalar | Floating-point number |

    | bool | Scalar | Boolean value |

    | string | Scalar | Series of characters |

    | array | Composite | Collection of values |

    | object | Composite | User-defined data type |

    | resource | Special | External resource |

    | callable | Special | Function or method |

    | null | Special | No value |


    Integer type


    An integer is a whole number. They can be specified in decimal (base 10), hexadecimal
    (base 16), octal (base 8) or binary (base 2) notation. Hexadecimal numbers are
    preceded with a “0x”, octal with “0” and binary numbers with “0b”.


    ```

    $myInt = 1234; // decimal number

    $myInt = 0b10; // binary number (2 decimal)

    $myInt = 0123; // octal number (83 decimal)

    $myInt = 0x1A; // hexadecimal number (26 decimal)

    ```


    Integers in PHP are always signed and can therefore store both positive and negative
    values. The size of an integer depends on the system word size, so on a 32-bit
    system the largest storable value is 2^(^32-1). If PHP encounters a larger value
    it will be interpreted as a float instead.


    Floating-point type


    The float or floating-point type can store real numbers. These can be assigned
    using either decimal or exponential notation.


    ```

    $myFloat = 1.234;

    $myFloat = 3e2; // 3*10^2 = 300

    ```


    The precision of a float is platform dependent. Commonly the 64-bit IEEE format
    is used, which can hold approximately 14 decimal digits and a maximum decimal
    value of 1.8x10^(308).


    Bool type


    The bool type can store a Boolean value, which is a value that can only be either
    true or false. These values are specified with the `true` and `false` keywords.


    ```

    $myBool = true;

    ```


    Null type


    The case-insensitive constant `null` is used to represent a variable with no value.
    Such a variable is considered to be of the special null data type.


    ```

    $myNull = null; // variable is set to null

    ```


    Just as with other values, the value null will evaluate differently depending
    on the context in which the variable is used. If evaluated as a bool it becomes
    false, as a number it becomes zero (`0`), and as a string it becomes an empty
    string (`""`).


    ```

    $myInt = $myNull + 0;      // numeric context (0)

    $myBool = $myNull == true; // bool context    (false)

    echo $myNull;              // string context  ("")

    ```


    Default values


    In PHP it is possible to use variables that have not been assigned a value. Such
    undefined variables will then automatically be created with the value null.


    ```

    echo $myUndefined; // variable is set to null

    ```


    Although this behavior is allowed, it is a good coding practice to define variables
    before they are used, even if the variables are just set to null. As a reminder
    for this, PHP will issue an error notice when undefined variables are used. Depending
    on the PHP error reporting settings, this message may or may not be displayed.


    ```

    Notice: Undefined variable: myUndefined in

    C:\xampp\htdocs\mypage.php on line 10

    ```


    CHAPTER 3


    ![image](images/frontdot.jpg)


    Operators


    Operators are used to operate on values. They can be grouped into five types:
    arithmetic, assignment, comparison, logical and bitwise operators.


    Arithmetic operators'
