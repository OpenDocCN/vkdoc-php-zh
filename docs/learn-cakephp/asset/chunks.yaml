- fmt: '# Step #1: Write Test


    Write a unit test for your nonexistent code. As you write the test—and before
    you actually write any code—consider all the possible inputs, errors, and outputs.
    This step adds an extra, abstract—but important—layer.


    The first time you run your unit test, it will fail. It should fail, because the
    code you’re testing doesn’t yet exist.


    By the one-test method, you produce one or more assertions based on possible inputs
    or errors.


    Most of the time, I start by writing model tests. I create a test method that
    calls one of the corresponding model’s methods (for example, `getUserComments()`),
    even if it does not exist at the moment. I know what to expect as a result, so
    I make the assertion. That means that I have to decide the type of the value returned
    by the method.


    # Step #2: Write Code


    Now that you’ve written the test, you can start writing the code. In this step,
    I create the model class’s `getUserComments()` method. When I think it is OK,
    I simply run the test and see if it fails or not.


    Your code is ready when all of your tests pass.


    While writing code, perhaps it is best to follow the principles described in Chapter
    [3](#A337704_2_En_3_Chapter.html).


    # Step #3: Refactor


    Once all your tests pass successfully, you can start to refactor your code, cleaning
    up unnecessary variables, function calls, etc.


    This is an important part. While we are considering small code fractions and are
    in the right mindset to understand their problems and solutions to them, this
    is the best time to rethink solutions and keep them as simple as possible.


    # Step #4: Test Again


    Now rerun your tests. If one or more tests doesn’t pass, you have introduced a
    new bug during refactoring. If all your tests pass, your code is probably OK.
    But don’t forget arguments #1 and #6 from Chapter [2](#A337704_2_En_2_Chapter.html).


    # Step #5: Write Code for New Features


    This step requires that you restart the same process, but with another task. Don’t
    forget to thoroughly test this part too. Changes you’ve made anywhere in your
    code could also affect this part and vice versa. This means that working on something
    can initiate a bug or break a test somewhere else.


    ## Summary


    In this chapter, you learned what test-driven development is and how it is connected
    to unit testing. I listed a few of the main PHP tools that facilitate TDD. Of
    these, PHPUnit is the most important to us, as it is integrated into CakePHP.
    I then went through the development cycle of TDD, in CakePHP and in general.


    # 5. Development Cycle


    ![A337704_2_En_5_Figa_HTML.jpg](A337704_2_En_5_Figa_HTML.jpg)


    The great cycle of life


    There are quite a few development models. In my opinion, choosing the right one
    can be an important part of the development process, especially when taste and
    practice really differ. There are also different ways to work with web and desktop
    applications. All of us have our favorite practices. Let me share mine with you.
    It is Agile Software Development.


    ## Agile


    Agile Software Development is a set of [software development](https://en.wikipedia.org/wiki/Software_development)
    principles whereby requirements and solutions result from team collaboration.
    It promotes adaptive planning, evolutionary development, early delivery, and continuous
    improvement, and it encourages rapid and flexible response to change.


    The Agile Manifesto ( [`http://agilemanifesto.org/`](http://agilemanifesto.org/)
    ) is short and simple.


    ### The Agile Manifesto


    “We are uncovering better ways of developing software by doing it and helping
    others do it. Through this work we have come to value:


    1.  Individuals and interactions over processes and tools

    2.  Working software over comprehensive documentation

    3.  Customer collaboration over contract negotiation

    4.  Responding to change over following a plan


    That is, while there is value in the items on the right, we value the items on
    the left more.”


    ### 12 Principles Behind the Manifesto


    There are 12 principles behind the Agile Manifesto.


    1.  The highest priority is to satisfy the customer through early and continuous
    delivery of valuable software.

    2.  Changing requirements are welcome, even late in development. Agile processes
    harness change for the customer’s competitive advantage.

    3.  Working software is delivered frequently, from a couple of weeks to a couple
    of months, with a preference toward the shorter timescale.

    4.  Businesspeople and developers must work together daily throughout the project.

    5.  Projects are built by motivated individuals. Give them the environment and
    support their needs, and trust them to get the job done.

    6.  The most efficient and effective method of conveying information to and within
    a development team is face-to-face conversation.

    7.  Working software is the primary measure of progress.

    8.  Agile processes promote sustainable development. The sponsors, developers,
    and users should be able to maintain a constant pace indefinitely.

    9.  Continuous attention to technical excellence and good design enhances agility.

    10.  Simplicity—the art of maximizing the amount of work not done—is essential.

    11.  The best architectures, requirements, and designs emerge from self-organizing
    teams.

    12.  At regular intervals, the team reflects on how to become more effective,
    then tunes and adjusts its behavior accordingly.


    ### How CakePHP Supports Agile Development


    As you can see, some of the preceding principles require a particular mindset,
    a way of thinking, and some of them actually require some technical support.


    Baking is a good way to get something viewable in a short time. So it helps to
    adhere to principles 1, 4, and 7.


    Thanks to CakePHP’s MVC pattern and the wonderful new ORM introduced in CakePHP3,
    late changes are easy at least for models. Even in late phases it is easy to handle
    database table or field changes. So it meets principles 2 and 7.


    Regular delivery (principle 3) is more likely a habit or a workflow organization
    question than a technical matter. Still, because of the two previously mentioned
    points, Cake gives us some help to achieve this.


    TDD helps you to adhere to principles 9 and 10.


    ## The Agile Roadmap to Value


    Any project requires some steps or stages. With Agile, it is the Roadmap to Value
    that provides the high-level overview of the project. The roadmap has seven stages.


    ### Product Vision


    At stage 1, the product owner outlines the product vision: a definition of the
    project, how it will serve the user’s (or company’s) goals, and who the target
    users are.


    An example: For people who want a simple and easy blog, the `cakeBlog` is a blog
    engine that provides minimal features concentrated on blogging. Unlike other engines
    with too many features, our software is for real dummies.


    By my estimate, 90–95% of the time, a customer doesn’t really know what he or
    she wants. He/She has some idea, but it’s very far from being specific. That’s
    OK; it’s not a problem—remember principle 2.


    ### Product Roadmap


    The product owner creates a product roadmap at stage 2. It is a high-level view
    of the product requirements, with roughly estimated schedules of when these requirements
    will be developed.


    ### Release Plan


    At stage 3, the product owner creates a release plan, what is actually a timetable
    of releases of working software. It will have many releases, with the highest
    priority features launching first.


    ### Sprint Planning


    Sprints are iterations in which the software is created. At stage 4, the team
    plan sprints. Sprint planning happens at the start of each sprint, where the team
    decides what requirements should be included in this sprint.'
