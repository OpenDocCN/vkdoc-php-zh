    **大卫·戈尔丁**（David Golding）于 1999 年开始开发网站，最初打赌无法在五分钟内完成一个 Web 应用程序，于是第一次使用了 CakePHP。戈尔丁拥有杨百翰大学欧洲研究学位，目前从事技术咨询和自由职业网页开发。他与妻子卡米尔（Camille）、儿子肯尼（Kenny）居住在南加州，闲暇时喜欢打高尔夫和研究历史。他的博客文章可在[www.davidgolding.net](http://www.davidgolding.net)找到。


    ---


    ## 关于技术审校


    **理查德·K·米勒**（Richard K. Miller）是犹他州某非营利基金会的执行副总裁。他毕业于杨百翰大学，拥有商业管理学士学位，但自 10 岁开始编程起就对技术产生了兴趣。他的经验涵盖网页编程、网络营销以及博客、播客、社交网络和在线视频等新媒体策略。他是多个
    MediaWiki 扩展和 WordPress 插件的开发者，包括广泛使用的《What Would Seth Godin Do》插件。


    ---


    ## 致谢


    我深深感谢为本书做出贡献的所有人，尤其因为 CakePHP 是一个不断完善的框架，其在线社区也在持续壮大。克里斯·尼尔森（Chris Nielsen）和本杰明·斯旺森（Benjamin
    Swanson）指导我选择 Web 框架以及如何构建更健壮的网站，对此我深表感激。杨百翰大学的史蒂文·伯顿（Steven Burton）、朱莉·克洛沃德（Julie
    Cloward）和理查德·库拉塔（Richard Culatta）为我提供了探索 Web 开发并教授他人的机会与支持；你们的言传身教也提升了我的个人技能，我将永远感恩。斯宾塞·弗卢曼（Spencer
    Fluhman）在诸多方面给予了我卓越的指导与建议；感谢您的专业建议与支持。理查德·米勒（Richard Miller）的技术专长与审校让本书更加扎实，更不用说那些帮助收紧细节的专业技能。我要感谢
    Cake 软件基金会及其他敬业的 Cake 开发者，他们不仅提供了卓越的框架，还花费时间精心设计了一套有效的 Web 开发范式。费利克斯·盖森多夫（Felix
    Geisendörfer）、丹尼尔·霍夫施泰特（Daniel Hofstetter）、汤姆·奥赖利（Tom O''Reilly）和加勒特·J·伍德沃思（Garrett
    J. Woodworth）提供了大量有助于本书撰写的示例和文档，特别值得感谢。最重要的是，Apress 出版社的工作人员表现卓越；感谢你们将本书提升到了新的高度。


    ---


    # 第 1 章：引言


    程序员使用框架已有多年历史，不过将框架用于 Web 开发是近期才兴起的。在任何项目（无论是否与 Web 相关）中使用框架的主要优势，可能源于“控制反转”的概念。许多程序以代码控制一切的方式运行。换句话说，代码决定了某个操作应在何时出现、如何处理用户响应等。


    试想一下，如果这种控制顺序被反转会怎样？程序不再包含一系列操作的脚本或库，而是由一系列对象构成——这些对象在你扩展它们之前无法执行任何操作（尽管它们可能包含大量可用的工具）。这样一来，框架会调用你，而不是你去调用框架。


    例如，假设你想在网站中安装一个投票程序。你浏览互联网，找到了一些声称能实现该功能的 PHP 脚本。在配置一些独特设置后，你将其中一个脚本上传到服务器并启动程序。程序运行正常，但如果你想做任何修改，就必须进入脚本，找到要更改的操作位置，然后手动进行调整。脚本掌控着控制流——程序运行时所有操作都会被执行，而若你想控制程序，就必须修改脚本。


    相比之下，框架的控制流是反转的。要在框架中创建一个投票应用，你只需向框架添加处理投票的对象。框架会自动整合多个资源来实现投票流程，而你需要拦截这些资源或对其进行扩展以添加自己的功能。像脚本示例中的库一样，库会自行运行，任何修改都必须直接修改代码。框架则不同——在你扩展或添加功能之前，它无法真正为你执行任何操作。你无需直接修改框架的代码；相反，框架会采纳你的扩展，并用它们替代自身的库。

    '
- fmt: '# CakePHP 入门指南


    ## 引言


    `CakePHP`（简称 `Cake`）是一个框架，而非一组库，尽管它包含了许多像库一样简化 Web 开发的函数和方法。因此，`Cake` 等待您扩展其对象并添加您自己的自定义资源。使用
    `Cake`，逐个编写每个脚本函数的日子已经一去不复返。相反，开发者现在使用一套专为 Web 开发设计的脚本、库和约定的捆绑包。


    ## 从新手到专业人士


    本指南面向 `CakePHP` 的初学者。无论您对 `PHP` 脚本语言是否有丰富经验，在 `Cake` 中工作都需要一些您可能从未尝试过的新方法。如果您不了解什么是“has-and-belongs-to-many”关系，不知道如何构建自己的类对象，或者不知道如何解析数组，那么本书是您入门
    `Cake` 的完美起点。


    大多数现有的在线资源需要读者具备一定的 Web 开发背景知识，才能掌握如何在 `Cake` 中安装和工作。如果您像我刚开始使用 `Cake` 时一样，您可能只想要一些从头开始的教程和代码示例，这些示例能让您快速上手并引导您掌握更高级的技术。事实上，在论坛或聊天室提问时，许多初学者很少从专家那里得到帮助，或者得到令人困惑的指引。简单的问题可能只得到“哦，只需阅读在线手册和
    API”这样的回复。有时新手需要一种非常简单的软件入门方法，而本指南正是为此而编写的。随着您开始掌握 `Cake`，本指南还将提供提示和参考，帮助您快速为项目添加更多功能并捕获错误。


    本书将从展示如何在服务器和您自己的计算机上安装 `Cake` 开始，并提供详细的代码示例和可视化截图，逐步引导您完成整个过程。在第 2 章中，我将展示如何构建一个简单的
    `Cake` 应用程序。您将熟悉模型-视图-控制器（`MVC`）结构，以及如何有效地组织您的 `Cake` 应用程序。在第二部分中，您将使用 `Cake`
    构建更全面的 Web 应用程序，探索 `Cake` 内置的助手，包括 `Ajax` 助手，并使用更高级的功能。到本书结束时，您将能够创建自己的助手、插件和其他有用的功能，从而减少运行应用程序所需的总代码量，并且您还将拥有足够坚实的基础，可以自行尝试其他高级功能。


    ## 为什么选择 Cake？


    自从 `Ruby on Rails` 成为一种流行的 Web 框架以来，开发者团队一直在为各种语言创建 `Rails` 的克隆或类 `Rails` 框架：`Python`
    的 `TurboGears`；`PHP` 的 `Zend`、`Symfony` 等；`Perl` 的 `Catalyst`；等等。面对如此多的选择，为何要为您的
    Web 项目选择 `CakePHP`？


    ### 它是 PHP！


    许多 Web 开发者抱怨切换到 `Ruby on Rails`，仅仅是因为该框架构建在 `Ruby` 语言之上。他们说，`PHP` 是支持更广泛的 Web
    编程语言之一，并且是大多数 Web 服务提供商的标准配置，那么为什么要放弃它而选择 `Ruby` 呢？对于那些在 `PHP` 上学习 Web 开发或已将 `PHP`
    作为主要开发工具的人来说，放弃 `PHP` 而选择其他语言似乎令人生畏或耗时。对于公司而言，切换到另一种语言可能需要重新分配资源、更换 Web 服务提供商或重新配置昂贵的服务器。无论如何，离开
    `PHP` 转向另一个开发框架可能是昂贵且耗时的。有了 `Cake`，您可以在不学习另一种语言的情况下享受基于框架的开发的好处。


    使用某些 `PHP` 框架的一个困难在于它们与 `PHP 4` 和 `PHP 5` 的兼容性。例如，`Symfony` 需要 `PHP 5`，并且不向后兼容
    `PHP 4`。另一方面，`Cake` 兼容 `PHP` 的这两个版本，这对于许多拥有可追溯到几年前长期项目的开发者来说是一个必要的功能。


    许多 `PHP` 开发者忽视了框架的好处，只是寻找预制的函数或类作为脚本的包含文件使用，或者像使用 `Perl` 那样，拉入一些在服务器上消耗大量时间且提供很少自定义功能的模块。然而，`Cake`
    在其范围内是完全面向对象的。它提供了可以根据您的喜好实现和修改的对象，而不仅仅是某些给您很少控制的模块或包含文件集合。


    ### 快速开发


    启动一个 Web 项目可能既繁琐又技术要求高，尤其是在使用较旧的开发方法时。然而，`Cake` 使得构建 Web 应用程序的初始步骤变得容易。`Cake`
    不是从命令行运行安装脚本，而是预先打包成一个文件夹，您只需将其放到服务器上即可运行。


    一旦您开始在框架上进行构建，命令行就会派上用场。稍后，我将讨论 `Cake` 的脚手架特性，这些特性可以减少日常开发任务。使用 `Cake`，在应用程序中早期创建用户流变得简单，并且可以改善与客户的沟通。在某些情况下，应用程序的初步运行可以在几分钟内完成，让客户了解项目的架构。


    一旦项目充实并启动，得益于 `Cake`，站点维护也得到了改进。由于其层次结构和组织性，以及其有效限制冗余的能力，`Cake` 帮助开发者动态调整 Web
    应用程序。`Cake` 还支持测试数据库和 `URL` 路由，用于在线上环境中测试新功能或 Web 应用程序版本。


    ### 模型-视图-控制器


    `Cake` 为您的 Web 应用程序强制执行 `MVC` 结构。基本上，它有效地将典型操作分离到特定区域：`Model` 负责所有数据库交互，`View`
    负责所有输出和显示，`Controller` 负责所有输入和程序流程的命令/脚本。典型的 `PHP` 应用程序将这三个功能混合在同一个代码中，使得维护和调试变得困难。


    以下是 `PHP` 脚本的典型流程（见图 1-1）：


    1.  客户端通过输入 `URL` 或点击某种链接向 `PHP` 脚本发送请求。

    2.  脚本处理数据，然后直接将数据库请求发送到数据库。

    3.  脚本接收任何数据库输出并处理数据。

    4.  脚本生成输出并将其转发到客户端的浏览器。


    ![Image 6](index-26_1.jpg)


    ![Image 7](index-26_2.jpg)


    **图 1-1。** *PHP 脚本的典型流程*


    简而言之，一切都在一个 `PHP` 脚本中。通过使用 `include()` 函数，开发者将通用函数剥离到其他外部文件中，从而可以减少冗余。最复杂的 `PHP`
    应用程序使用可以在应用程序中任何位置调用并根据传递给它们的变量和设置进行修改的对象。开发者在使用对象和类时，可以以多种方式构建应用程序。'
  raw: 'CakePHP (or, for short, Cake) is a framework, not a set of libraries, even
    though it contains dozens of functions and methods that simplify web development
    much like libraries do. As such, Cake waits on you to extend its objects and add
    your own customized resources. With Cake, gone are the days of individually scripting
    each and every function. Instead, developers are using a bundled package of scripts,
    libraries, and conventions that are designed specifically for web development.


    **1**


    09775ch01final 7/1/08 9:37 PM Page 2


    **2**


    C H A P T E R 1 ■ I N T R O D U C T I O N


    **From Novice to Professional**


    This guide is for beginners to CakePHP. Whether or not you have much experience
    with the PHP scripting language, working in Cake will require some new methods
    you may or may not have tried before. If you don’t know what a “has-and-belongs-to-many”
    relationship is, don’t know how to build your own class object, or don’t know
    how to parse an array, then this book is a perfect place to start when getting
    into Cake.


    Most of the available online resources require some sort of prior knowledge of
    web development to get a grasp on how to install and work in Cake. If you’re like
    me when I started using Cake, you probably just want a handful of tutorials with
    code samples from square one that can get you up and running quickly and lead
    you in the right direction for more advanced techniques. In fact, when asking
    a question on forums or chat rooms, many beginners get little help or confusing
    leads from the experts. Simple questions can get a response like “Well, just read
    the online manual and API.” Sometimes novices need a very simple approach to the
    software, and this guide is just that. As you begin to master Cake, this guide
    will also provide tips and a reference for helping you quickly add more features
    to your projects and catch errors.


    This book will start by showing how to install Cake on a server and your own computer
    and will provide some detailed code samples and visual snapshots to walk you through
    the process. In Chapter 2, I’ll show how to build a simple Cake application. You’ll
    get used to the Model-View-Controller (MVC) structure and how to organize your
    Cake applications effectively. In Part 2, you’ll build more extensive web applications
    in Cake, and you’ll explore Cake’s built-in helpers, including the Ajax helper,
    and work with more advanced features. By the end of the book, you will be able
    to create your own helpers, plugins, and other useful features that will reduce
    the overall amount of code to run your applications, and you’ll also have a solid
    enough foundation to try other advanced features on your own.


    **Why Cake?**


    Ever since Ruby on Rails became a popular web-based framework, teams of developers
    have been creating clones of Rails or Rails-like frameworks for various languages:
    TurboGears for Python; Zend, Symfony, and many others for PHP; Catalyst for Perl;
    and on and on. With so many options out there, why choose CakePHP for your web
    project?


    **It’s PHP!**


    Many web developers complain about switching to Ruby on Rails simply because the
    framework is built on the Ruby language. PHP, they say, is one of the more widely
    supported web programming languages and is standard with most web services providers,
    so why give that up for Ruby? For those who learned web development on PHP or
    those who have made PHP


    their primary development tool, the idea of ditching PHP for something else may
    seem daunting or time-consuming. For companies, switching to another language
    can require reallocating resources, changing web service providers, or reworking
    an expensive server configuration. Whatever the case, leaving PHP for another
    development framework can be costly and time-consuming. With Cake, you can enjoy
    the benefits of framework-based development without learning another language.


    09775ch01final 7/1/08 9:37 PM Page 3


    C H A P T E R 1 ■ I N T R O D U C T I O N


    **3**


    One of the difficulties in using some PHP frameworks has been their compatibility
    with PHP 4 and 5\. Symfony, for example, requires PHP 5 and is not backward compatible
    with PHP


    4\. Cake, on the other hand, is compatible with both versions of PHP, a necessary
    feature for many developers with long-term projects that go back a couple of years.


    Many PHP developers overlook the benefits of a framework and simply look for premade
    functions or classes to be used as includes in their scripts or, as with Perl,
    pullin modules that chew up lots of time on the server and provide little customization.
    Cake, however, is thoroughly object-oriented in its scope. It supplies objects
    that can be implemented and modified to your liking and is not just some module
    or set of includes that give you little control.


    **Rapid Development**


    Getting a web project off the ground can be cumbersome and technically demanding,
    especially when using older methods of development. Cake, however, makes the initial
    steps of building a web application easy. Rather than run installation scripts
    from the command line, Cake comes prepackaged as a folder you simply drop onto
    a server and is ready to run.


    The command line does come in handy once you begin building onto the framework.


    Later, I’ll discuss Cake’s scaffolding features that cut down on routine development
    tasks.


    With Cake, creating user flows in the application early on is simple and can improve
    communication with clients. In some cases, a run-through of the application can
    be developed in minutes, allowing the client to get an idea of the project’s architecture.


    Once a project is fleshed out and launched, site maintenance is also improved
    thanks to Cake. Because of its hierarchy and organization, as well as its effectiveness
    at limiting redundancy, Cake helps developers adjust a web application on the
    fly. Cake also supports test databases and URL routes for testing new features
    or versions of web applications on the live setup.


    **Model-View-Controller**


    Cake enforces an MVC structure for your web applications. Basically, it effectively
    separates typical operations into specific areas: models for all your database
    interaction, views for all your output and displays, and controllers for all your
    commands/scripts for input and program flow. The typical PHP application mixes
    each of these three functions in the same code, making it difficult to maintain
    and debug.


    This is the typical flow for PHP scripting (see Figure 1-1):


    **1.** The client sends a request to a PHP script by typing a URL or clicking
    a link of some kind.


    **2.** The script processes the data and then sends the database requests directly
    to the database.


    **3.** The script receives any database output and processes the data.


    **4.** The script generates output and forwards it to the client’s browser.


    ![Image 6](index-26_1.jpg)


    ![Image 7](index-26_2.jpg)


    09775ch01final 7/1/08 9:37 PM Page 4


    **4**


    C H A P T E R 1 ■ I N T R O D U C T I O N


    **Figure 1-1.** *The typical flow for PHP scripting*


    In short, everything is contained in one PHP script. By using the include() function,
    developers strip out common functions into other external files, which makes it
    possible to reduce redundancy. The most complex PHP applications use objects that
    can be called anywhere in the application and modified depending on the variables
    and settings passed to them. Developers, when using objects and classes, can structure
    the application in numer-ous ways.'
