    PRIMARY KEY (ìd`)


    );


    Next, create the Comment model with the code shown in Listing 8-2.


    **Listing 8-2.** *The* Comment *Model*


    <?


    class Comment extends AppModel {


    var $name = ''Comment'';


    var $belongsTo = array(''Post'');


    }


    ?>


