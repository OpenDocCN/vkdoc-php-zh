    \ | Generates an XML document header |\n| `$xml->serialize()` | Converts a model\
    \ result set, or a Cake-formatted array, into XML |\n\n## Creating Custom Helpers\
    \  \n\nAn important key to creating the best web applications is making sure the\
    \ front end of the program is crisp and well organized. In this regard, helpers\
    \ are invaluable. The HTML and Form helpers slash the time required to produce\
