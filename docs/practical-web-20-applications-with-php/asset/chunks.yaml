    Including Additional Data in the Side Column Sometimes


    In certain instances you will want different combinations of data included in
    the side columns. For example, you might want to show the blog summary and the
    authentication data in the same column—but only on a particular page.


    To achieve this, you would make a new template that outputs this data accordingly
    and then pass this new template in as the value to $leftcolumn or $rightcolumn.


    The recommended way to do this is to not include multiple content boxes in a single
    template but to keep them all in separate templates and then to create an additional
    wrapper template to bring them together.


    For example, you might store the monthly blog summary in blog-summary-box.tpl,
    and you might keep authentication data in authentication-box.tpl. You would then
    create another template called some-template.tpl that might look as follows:


    {include file=''blog-summary-box.tpl''}


    {include file=''authentication-box.tpl''}


    You would then use some-template.tpl as the value for $leftcolumn. To keep the
    code relatively simple, I have chosen not to break up the templates to this degree.


    **Ajaxing the Blog Monthly Summary**


    In the previous section, we wrote code to output blog posts in the blog manager
    for the selected month, with a list of all months that have posts in the side
    column. The way it works now is that if a month is clicked by the user, the page
    reloads, displaying the posts from that month.


    We’ll now enhance this system. Instead of reloading the page for the newly selected
    month, we’ll make the blog manager index page fetch the posts in the background
    using Ajax and then display them on the page.


    This code will still be accessible for non-JavaScript users, because the solution
    we have already implemented does not rely on JavaScript. This new functionality
    will be built on top of the existing functionality, meaning those who use it will
    have an improved experience but those who don’t will not suffer.


    The only other consideration we must make is that we’re also listing the monthly
    summary on the edit and preview pages. If one of the months is clicked from these
    pages, we will not use Ajax to fetch the new page content but instead navigate
    normally to the page as we would without this Ajax functionality.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch08CMP2 11/11/07 12:35 PM Page 284


    **284**


    C H A P T E R 8 ■ E X T E N D I N G T H E B L O G M A N A G E R


    **Creating the Ajax Request Output**


    Before we add any JavaScript code, we will create the necessary changes to generate
    the Ajax request data. We can reuse the indexAction() method from BlogmanagerController.php
    without any changes to code. All we need to do is to change its corresponding
    template so the page header and footer aren’t included when the controller action
    is requested via Ajax.


    To help with this, we’ll make a minor addition to the CustomControllerAction class.


    In Chapter 6 we discussed how the isXmlHttpRequest() method worked with the Zend_


    Controller_Request_Http class. This method is a simple way to determine whether
    the current request was initiated using XMLHttpRequest. We’ll assign the value
    of this function call to all templates.


    Listing 8-16 shows the changes we make to the CustomControllerAction.php file
    in the


    ./include directory.


    **Listing 8-16.** *Adding Ajax Request Detection to Templates (CustomControllerAction.php)*


    <?php


    class CustomControllerAction extends Zend_Controller_Action


    {


    // ... other code


    public function postDispatch()


    {


    // ... other code


    **$this->view->isXmlHttpRequest = $this->getRequest()->isXmlHttpRequest();**


    }


    // ... other code


    }


    ?>


    Next we modify the template for the BlogmanagerController’s indexAction() method.
    All we do in this template now is check the value of the $isXmlHttpRequest variable
    that is automatically assigned. If this value is false, then the template will
    generate output as previously, whereas if it’s true, then we won’t include the
    page header and footer.


    Listing 8-17 shows the changes we make to the index.tpl file in ./templates/blogmanager.


    **Listing 8-17.** *Altering the Output for Ajax Requests (index.tpl)*


    **{if $isXmlHttpRequest}**


    **{include file=''blogmanager/lib/month-preview.tpl''**


    **month=$month**


    **posts=$recentPosts}**


    **{else}**


    {include file=''header.tpl'' section=''blogmanager''}


    {if $totalPosts == 1}


    <p>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch08CMP2 11/11/07 12:35 PM Page 285


    C H A P T E R 8 ■ E X T E N D I N G T H E B L O G M A N A G E R


    **285**


    There is currently 1 post in your blog.


    </p>


    {else}


    <p>


    There are currently {$totalPosts} posts in your blog.


    </p>


    {/if}


    <form method="get" action="{geturl controller=''blogmanager'' action=''edit''}">


    <div class="submit">


    <input type="submit" value="Create new blog post" />


    </div>


    </form>


    <div id="month-preview">


    {include file=''blogmanager/lib/month-preview.tpl''


    month=$month


    posts=$recentPosts}


    </div>


    {include file=''footer.tpl''


    leftcolumn=''blogmanager/lib/left-column.tpl''}


    **{/if}**


    **The BlogMonthlySummary JavaScript Class**


    To initiate the background HTTP request to fetch the monthly summary data (using
    XMLHttpRequest), we need to attach some JavaScript code to each of the links in
    the month listing. To do this, we’ll create a JavaScript class called BlogMonthlySummary.


    This class will be loaded and instantiated automatically when we include the leftcolumn.tpl
    template we created earlier this chapter, as you will see shortly.


    Using some of the Prototype techniques you learned in Chapter 5, we can create
    a class to encapsulate all the functionality we need. The general algorithm for
    this class is as follows: **1.** Check for the existence of the link container
    (where the month links are listed) and the content container (where the blog posts
    are listed). If either one doesn’t exist, stop execution (meaning clicking the
    month links will just load the respective page as normal).


    **2.** Observe the click event for each of the links found in the link container.


    **3.** When a link is clicked, initiate an Ajax request using the Ajax.Updater
    class. This class is built on top of the Ajax.Request class and is used specifically
    to update an element with the results from XMLHttpRequest.


    **4.** Cancel the click event so the browser doesn’t follow the link href. We
    use the Event.stop() method in the event handler to achieve this.


    Listing 8-18 shows the contents of the BlogMonthlySummary.class.js file, which
    we store in the ./htdocs/js directory.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch08CMP2 11/11/07 12:35 PM Page 286


    **286**


    C H A P T E R 8 ■ E X T E N D I N G T H E B L O G M A N A G E R


    **Listing 8-18.** *The BlogMonthlySummary JavaScript Class (BlogMonthlySummary.class.js)*
    BlogMonthlySummary = Class.create();


    BlogMonthlySummary.prototype = {


    container : null,


    linkContainer : null,


    initialize : function(container, linkContainer)


    {


    this.container = $(container);


    this.linkContainer = $(linkContainer);


    if (!this.container || !this.linkContainer)


    return;


    this.linkContainer.getElementsBySelector(''a'').each(function(link) {


    link.observe(''click'', this.onLinkClick.bindAsEventListener(this));


    }.bind(this));


    },


    onLinkClick : function(e)


    {


    var link = Event.element(e);


    var options = {


    };


    new Ajax.Updater(this.container,


    link.href,


    options);


    Event.stop(e);


    }


    };


    After creating the class using Prototype’s Class.create() function, we define
    the constructor for the class (the initialize() method), which accepts the content
    container as the first argument and the link container as the second argument.


    If both of these containers are found to exist, the code continues to add the
    click event handler to each of the links. This results in the onLinkClick() method
    being called if any of the links are clicked.


    ■**Note** Chapter 6 discusses the Prototype event handling mechanism. You’ll also
    see how the bind() and bindAsEventListener() functions work in that chapter.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch08CMP2 11/11/07 12:35 PM Page 287


    C H A P T E R 8 ■ E X T E N D I N G T H E B L O G M A N A G E R


    **287**


    We begin the onLinkClick() method by determining exactly which link was clicked.
    This is achieved by calling the Event.element() function with the event object
    passed to onLinkClick().


    We will use the href attribute of the link as the URL to pass to Ajax.Updater.


    Currently there are no extra options we need to pass to this Ajax request; however,
    we still define the options hash since we will be using it later in this chapter.


    The onLinkClick() method concludes by calling Event.stop(). This is to ensure
    the browser doesn’t follow the link, thereby defeating the point of using Ajax.


    **Installing the BlogMonthlySummary Class**


    Now we must update the left-column.tpl template to load and instantiate the BlogMonthlySummary
    JavaScript class.


    Listing 8-19 shows the updated version of left-column.tpl, which now loads and
    instantiates this JavaScript class. Once you reload your page, clicking these
    links while on the blog manager index will refresh the middle container without
    reloading the whole page!


    **Listing 8-19.** *Instantiating the BlogMonthlySummary Class (left-container.tpl)*


    {get_monthly_blog_summary user_id=$identity->user_id assign=summary}


    {if $summary|@count > 0}


    <div id="preview-months" class="box">


    <h3>Your Blog Archive</h3>


    <ul>


    {foreach from=$summary key=month item=numPosts}


    <li>


    <a href="{geturl controller=''blogmanager''}?month={$month}">


    {$month|date_format:''%B %Y''}


    </a>


    ({$numPosts} post{if $numPosts != 1}s{/if})


    </li>


    {/foreach}


    </ul>


    </div>


    **<script type="text/javascript" src="/js/BlogMonthlySummary.class.js"></script>**


    **<script type="text/javascript">**


    **new BlogMonthlySummary(''month-preview'', ''preview-months'');**


    **</script>**


    {/if}


    **Notifying the User About the Content Update**


    Although the code we have just implemented works well and updates the page as
    it should, the only problem with it is that it doesn’t give any feedback to the
    user. To fix this, we will use the messages container we created in Chapter 7
    to notify the user that new content is being loaded.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch08CMP2 11/11/07 12:35 PM Page 288


    **288**


    C H A P T E R 8 ■ E X T E N D I N G T H E B L O G M A N A G E R


    In this section, we will create two new functions: message_write(), which we use
    to write a new message to the message container (and then make the container appear
    if hidden), and message_clear(), which hides the message container.


    We will then update the BlogMonthlySummary JavaScript class to use these functions
    so the user knows when page content has been updated.


    Managing Message Containers


    The first thing we need to do is to create a new setting for the settings hash
    in the scripts.js file. When we implement the message_clear() function next, we’ll
    add a delay so the message is cleared only after the specified interval. This
    ensures the user has time to read the message before it disappears.


    Listing 8-20 shows the messages_hide_delay setting we add to scripts.js in ./htdocs/js.


    This value is the number of seconds before the message container is hidden.


    **Listing 8-20.** *Adding the Delay Setting to the Application JavaScript Settings
    (scripts.js)* var settings = {


    **messages : ''messages'',**


    **messages_hide_delay : 0.5**


    };


    Next we define the message_write() and message_clear() functions, which can go
    after the Event.observe() call in the scripts.js file. Listing 8-21 shows these
    functions.


    **Listing 8-21.** *Setting and Clearing Site Status Messages (scripts.js)* **function
    message_write(message)**


    **{**


    **var messages = $(settings.messages);**


    **if (!messages)**


    **return;**


    **if (message.length == 0) {**


    **messages.hide();**


    **return;**


    **}**


    **messages.update(message);**


    **messages.show();**


    **new Effect.Highlight(messages);**


    **}**


    **function message_clear()**


    **{**


    **setTimeout("message_write('''')", settings.messages_hide_delay * 1000);**


    **}**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch08CMP2 11/11/07 12:35 PM Page 289


    C H A P T E R 8 ■ E X T E N D I N G T H E B L O G M A N A G E R


    **289**


    The message_write() function works by first checking the length of the message
    to show.


    If it is an empty string, the messages container is hidden. If the string isn’t
    empty, then the content of the container is updated to show the message. Finally,
    the container is shown, and the Scriptaculous highlight effect is once again applied.


    The message_clear() function simply calls the message_write() function with an
    empty string after the specified delay time. Note that to be consistent with Scriptaculous,
    I specified the delay time in seconds, while setTimeout() accepts milliseconds
    (1/1000th of a second).


    This is why we multiply the value by 1,000.


    Updating the Messages Container with BlogMonthlySummary


    Finally, we must modify the BlogMonthlySummary JavaScript class to use the message_write()
    and message_clear() functions.


    We’ll call message_write() in the link click event handler (onLinkClick()), and
    we will then call message_clear() once the Ajax request has completed. We do this
    by calling message_clear() in the onSuccess callback option for Ajax.Updater.


    Listing 8-22 shows the new version of the onLinkClick() event handler in


    BlogMonthlySummary.class.js (in the./htdocs/js directory).


    **Listing 8-22.** *Updating the Message Container When Loading Blog Posts* *(BlogMonthlySummary.class.js)*


    BlogMonthlySummary = Class.create();


    BlogMonthlySummary.prototype = {


    // ... other code


    onLinkClick : function(e)


    {


    var link = Event.element(e);


    var options = {


    **onComplete : message_clear**


    };


    **message_write(''Loading blog posts...'');**


    new Ajax.Updater(this.container,


    link.href,


    options);


    Event.stop(e);


    }


    };


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 29](index-312_1.jpg)


    9063Ch08CMP2 11/11/07 12:35 PM Page 290


    **290**


    C H A P T E R 8 ■ E X T E N D I N G T H E B L O G M A N A G E R


    In Figure 8-2 you can see how the blog manager index page now looks after an archive
    link in the left column has been clicked. Note the status message at the top of
    the right of the picture, while at the bottom Firebug shows that a background
    request is running.


    **Figure 8-2.** *The blog manager index when an archive link is clicked* We have
    now completed the Ajax functionality on the blog manager monthly summary page.
    The way we have implemented it works very well, because of the following reasons:


    • **It is easy to maintain.** We are using the same Smarty template for both the
    non-Ajax and Ajax versions, meaning to change the layout we need to modify only
    this one file.


    • **The code is clean.** There is almost no clutter in our HTML code for the extensive
    JavaScript code that is used. The only code is a single call to instantiate the
    BlogMonthlySummary class.


    • **The page is accessible.** If the user doesn’t have a JavaScript-enabled browser
    (or disables JavaScript), they are not restricted from using this section in any
    way. It is simply enhanced for users who do use JavaScript.


    • **The page is scalable.** An alternative method to loading the posts by Ajax
    would be to preload them and place them in hidden containers on the page. This
    works fine for a small number of posts, but once you hit a larger number, the
    page takes much longer to load and uses more memory on your computer.


    • **It tells the users what is happening.** By adding the message container, the
    user knows that something is happening when they click an archive link, even though
    the browser doesn’t start to load another page.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch08CMP2 11/11/07 12:35 PM Page 291


    C H A P T E R 8 ■ E X T E N D I N G T H E B L O G M A N A G E R


    **291**


    **• The code is cross-browser compatible.** Because we used the Prototype library,
    we were easily able to make code that works across all major browsers. Using Prototype
    cuts down on development time, because only a single solution needs to be implemented—


    not one for each browser.


    **Integrating a WYSIWYG Editor**


    The final step in implementing the blog management tools we created in Chapter
    7 and this chapter is to add “what you see is what you get” functionality. This
    allows users to easily format their blog posts without requiring any real knowledge
    of HTML.


    The WYSIWYG editor we will be using is called FCKeditor, named so after its creator,
    Frederico Caldeira Knabben. It is a very powerful and lightweight editor, and
    it doesn’t require installation of any programs on the client’s computer (aside
    from their web browser, that is).


    More important, it is highly customizable. These are some of the customization
    features it contains:


    • It is easy to change the toolbar buttons available to users.


    • Custom plug-ins can be written, allowing the developer to create their own toolbar
    buttons.


    • It contains a built-in file browser that allows users to upload files to the
    server in real-time. Additionally, it allows custom-made *connectors*, which are
    scripts written in a server-side language (such as PHP) that handle uploads through
    the file browser. The connector can save the file wherever or however it needs
    to, and it can send back the list of files to the FCKeditor file browser as required.


    • The editor can be reskinned. In other words, the color scheme and look and feel
    of the buttons can be changed.


    • It provides the ability to define custom templates that can be easily inserted
    into the editor (not to be confused with the Smarty templates in our application).


    Figure 8-3 shows the default layout of FCKeditor, with all the toolbar buttons.


    Other features that make FCKeditor a popular choice for content management systems
    include the following:


    • It generates valid XHTML code (subject to how the user chooses to manipulate
    the HTML).


    • Users can paste in content from Microsoft Word, which will automatically be
    cleaned up by the editor.


    • It is cross-browser compatible. Currently it is not compatible with Safari because
    of some restrictions in that browser, but it works on other major browsers. Mac
    OS users can use Firefox as an alternative. Users of Safari are shown a plain
    textarea instead of the editor.


    In the following sections, we will download, install, and integrate FCKeditor
    into our web application. We will make some basic customizations to the editor,
    including restricting the toolbar buttons so only the HTML tags listed earlier
    this chapter will be generated.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 30](index-314_1.jpg)


    9063Ch08CMP2 11/11/07 12:35 PM Page 292


    **292**


    C H A P T E R 8 ■ E X T E N D I N G T H E B L O G M A N A G E R


    **Figure 8-3.** *An example of editing content in FCKeditor*


    Additionally, we will develop a Smarty plug-in that allows us to easily load the
    WYSIWYG


    in our templates when required.


    **Downloading and Installing FCKeditor**


    At time of writing, the current version of FCKeditor is version 2.4.3\. This can
    be downloaded fr[om http://www.fckeditor.net/download.](http://www.fckeditor.net/download)
    We will be storing the code in the ./htdocs/js directory, just as we did with
    Prototype and Scriptaculous.


    Once you have the FCKeditor_2.4.3.tar.gz file, extract it to that directory. I
    have assumed you downloaded the file to /var/www/phpweb20/htdocs/js.'
  trans: "\n`pear install Text_Password`\n\n`Text_CAPTCHA` 还需要一个 TrueType 字体，以便将字母写入\
    \ `CAPTCHA` 图像。只要字符易于阅读，任何字体都可以。我在本书中使用的字体文件是 Vera 的粗体版本（`VeraBD.ttf`），可从 Gnome\
    \ 网站（[`www.gnome.org/fonts/`](http://www.gnome.org/fonts/)）获取。我选择这种字体是因为其许可条款允许自由分发。该字体应存储在应用程序数据目录中（`/var/www/phpweb20/data/VeraBD.ttf`）。\n\
    \n## 生成 CAPTCHA 图像\n\n为了在我们的应用程序中添加 CAPTCHA 功能，我们需要创建一个新的控制器动作，负责输出图像。CAPTCHA\
    \ 并非用户注册所特有，因此我们将此控制器命名为 `utility`，因为我们可能稍后添加其他实用工具动作。\n\n清单 4-13 展示了 `UtilityController.php`\
    \ 的内容，我们将把它存储在 `./include/Controllers` 中。目前只有一个动作，负责生成并输出图像。\n\n**清单 4-13.** *使用\
    \ `Text_CAPTCHA` 生成 CAPTCHA 图像 (`UtilityController.php`)*\n\n```php\n<?php\n\n\
    class UtilityController extends CustomControllerAction\n\n{\n\n    public function\
    \ captchaAction()\n\n    {\n\n        $captcha = Text_CAPTCHA::factory('Image');\n\
    \n        $opts = array('font_size' => 20,\n\n            'font_path' => Zend_Registry::get('config')->paths->data,\n\
    \n            'font_file' => 'VeraBd.ttf');\n\n        $captcha->init(120, 60,\
    \ null, $opts);\n\n        // 禁用自动渲染，因为我们正在输出图像\n\n        $this->_helper->viewRenderer->setNoRender();\n\
    \n        header('Content-type: image/png');\n\n        echo $captcha->getCAPTCHAAsPng();\n\
    \n    }\n\n}\n\n?>\n```\n\n> **重要** 在清单 4-13 中，我们必须禁用 `Zend_Controller_Front`\
    \ 将执行的模板自动渲染。如果我们不包含对 `setNoRender()` 的调用，`captchaAction()` 将尝试渲染属于 `./templates/utility/captcha.tpl`\
    \ 的模板。由于 `captchaAction()` 方法输出生成的 CAPTCHA 图像，因此不存在此类模板。\n\n为了使用 `Text_CAPTCHA`，我们首先调用\
    \ `factory()` 方法来使用 Image 驱动。然后，我们创建一个选项数组来指定将使用的字体的属性。如前所述，TrueType 字体存储在应用程序数据目录中，因此我们使用应用程序配置来告知\
    \ `Text_CAPTCHA` 这个目录。\n\n接下来，我们调用 `init()` 方法，该方法指定高度、宽度和 CAPTCHA 短语，以及字体选项。在此代码中，我们将\
    \ `null` 作为第三个参数传递，这意味着短语将由 `Text_Password` 随机生成。\n\n> **提示** 您可能更倾向于将清单 4-13\
    \ 中的一些“魔法值”（如字体名称和大小）存储在应用程序设置（`./settings.ini`）中。\n\n最后，我们使用 `getCAPTCHAAsPng()`\
    \ 方法将图像发送到浏览器。我们还必须向浏览器发送正确的 `Content-type` 标头，以便浏览器知道将数据解释为图像。\n\n目前，我们还不能在注册表单中使用此代码，因为\
    \ `FormProcessor_UserRegistration` 需要知道 CAPTCHA 短语，以便确定用户是否输入正确。我们必须修改 `captchaAction()`，以便它生成一个新短语并将其写入会话。在后续对\
    \ `captchaAction()` 的请求中，我们检查会话中是否存在该短语。如果该值存在，我们将使用该值生成图像，而不是生成新图像。\n\n> **注意**\
    \ 我们实现 CAPTCHA 图像的方式是，如果用户输入短语错误，他们会再次看到相同的 CAPTCHA 图像。另一种做法是，每次用户输入错误时都生成一个新短语。在此实现中需要记住的重要事情是，在短语成功输入后将其清除。我们稍后将介绍这一点。\n\
    \n清单 4-14 显示了 `captchaAction()` 的修改版本，现在它会检查现有短语，然后将图像中使用的短语写回会话。\n\n**清单 4-14.**\
    \ *将会话中的 CAPTCHA 短语存储起来以便重用 (`UtilityController.php`)*\n\n```php\n<?php\n\nclass\
    \ UtilityController extends CustomControllerAction\n\n{\n\n    public function\
    \ captchaAction()\n\n    {\n\n        **$session = new Zend_Session_Namespace('captcha');**\n\
    \n        **// 检查会话中是否已有短语**\n\n        **$phrase = null;**\n\n        **if (isset($session->phrase)\
    \ && strlen($session->phrase) > 0)** \n\n            **$phrase = $session->phrase;**\n\
    \n        // 生成 CAPTCHA\n\n        $captcha = Text_CAPTCHA::factory('Image');\n\
    \n        $opts = array('font_size' => 20,\n\n            'font_path' => Zend_Registry::get('config')->paths->data,\n\
    \n            'font_file' => 'VeraBd.ttf');\n\n        **$captcha->init(120, 60,\
    \ $phrase, $opts);**\n\n        **// 将短语写入会话**\n\n        **$session->phrase =\
    \ $captcha->getPhrase();**\n\n        // 禁用自动渲染，因为我们正在输出图像\n\n        $this->_helper->viewRenderer->setNoRender();\n\
    \n        header('Content-type: image/png');\n\n        echo $captcha->getCAPTCHAAsPng();\n\
    \n    }\n\n}\n\n?>\n```\n\n您现在可以通过访问 `http://phpweb20/utility/captcha` 直接在浏览器中查看生成的\
    \ CAPTCHA 图像（这就是我生成图 4-2 的方式）。与我们迄今为止实现的所有其他返回 HTML 代码的控制器动作不同，此动作返回图像数据（以及相应的标头，以便浏览器知道如何显示数据）。\n\
    \n## 将 CAPTCHA 图像添加到注册表单\n\n集成 CAPTCHA 测试的下一步是在注册表单上显示图像。为此，我们只需使用 HTML `<img>`\
    \ 标签来显示图像，并添加一个文本输入框，以便用户输入短语。\n\n清单 4-15 显示了我们需要添加到本章前面创建的 `register.tpl` 表单（位于\
    \ `./templates/account` 中）的相关 HTML 代码。CAPTCHA 图像的惯例是将它们添加到表单的末尾，提交按钮的上方。\n\n**清单\
    \ 4-15.** *在注册表单上显示 CAPTCHA 图像 (`register.tpl`)*\n\n```smarty\n{include file='header.tpl'}\n\
    \n<form method=\"post\" action=\"/account/register\">\n\n<fieldset>\n\n<legend>创建账户</legend>\n\
    \n<!--\n\n// 其他表单字段\n\n-->\n\n**<div class=\"captcha\">**\n\n**<img src=\"/utility/captcha\"\
    \ alt=\"CAPTCHA 图像\" />**\n\n**</div>**\n\n**<div class=\"row\" id=\"form_captcha_container\"\
    >**\n\n**<label for=\"form_captcha\">输入上方短语：</label>**\n\n**<input type=\"text\"\
    \ id=\"form_captcha\"**\n\n**name=\"captcha\" value=\"{$fp->captcha|escape}\"\
    \ />**\n\n**{include file='lib/error.tpl' error=$fp->getError('captcha')}**\n\n\
    **</div>**\n\n<div class=\"submit\">\n\n<input type=\"submit\" value=\"注册\" />\n\
    \n</div>\n\n</fieldset>\n\n</form>\n\n{include file='footer.tpl'}\n```\n\n此代码中需要注意的一点是，我们仍然在此表单中预填充\
    \ `captcha` 字段。这样用户只需成功输入一次即可。例如，如果他们输入了无效的电子邮件地址但 CAPTCHA 短语有效，则在修正电子邮件地址后，他们不必重新输入\
    \ CAPTCHA 短语。图 4-3 显示了带有 CAPTCHA 图像和相应文本输入字段的注册表单。\n\n## 验证 CAPTCHA 短语\n\n最后，我们必须检查提交的\
    \ CAPTCHA 短语是否与会话数据中存储的短语匹配。为此，我们需要在 `FormProcessor_UserRegistration` 的 `process()`\
    \ 方法中添加一个新的检查。我们还需要在表单完成后清除保存的短语。这样，下次用户尝试执行任何需要 CAPTCHA 认证的操作时，就会生成一个新的短语。\n\n\
    清单 4-16 显示了对 `FormProcessor_UserRegistration` 的添加内容，用于检查有效短语并在完成后清除短语。\n\n**清单\
    \ 4-16.** *验证提交的 CAPTCHA 短语 (`UserRegistration.php`)*\n\n```php\n<?php\n\nclass\
    \ FormProcessor_UserRegistration extends FormProcessor\n\n{\n\n    // ... 其他代码\n\
    \n    public function process(Zend_Controller_Request_Abstract $request)\n\n \
    \   {\n\n        **// 验证 CAPTCHA 短语**\n\n        **$session = new Zend_Session_Namespace('captcha');**\n\
    \n        **$this->captcha = $this->sanitize($request->getPost('captcha'));**\n\
    \n        **if ($this->captcha != $session->phrase)**\n\n            **$this->addError('captcha',\
    \ '请输入正确的短语');**\n\n        // 如果没有错误发生，则保存用户\n\n        if (!$this->hasError())\
    \ {\n\n            $this->user->save();\n\n            **unset($session->phrase);**\n\
    \n        }\n\n        // 如果没有错误发生，则返回 true\n\n        return !$this->hasError();\n\
    \n    }\n\n}\n\n?>\n```\n\n# 添加电子邮件功能\n\n我们必须添加到用户注册系统的最后一个功能是，向新注册用户发送一封确认其账户的电子邮件，以及他们随机生成的密码，以便他们能够登录。通过电子邮件向他们发送密码是验证其电子邮件地址的简单方法。\n\
    \n为了从我们的应用程序发送电子邮件，我们将使用 Zend Framework 的 `Zend_Mail` 组件。我们也可以使用 PHP 的 `mail()`\
    \ 函数，但通过使用像这样的类（甚至是 PEAR 的 `Mail_Mime`），我们可以做更多的事情，例如附加文件（包括图像）和发送 HTML 电子邮件。本书中我们不会涉及这些，但如果您将来想添加此类功能，关键代码已经就位。\n\
    \n清单 4-17 展示了使用 `Zend_Mail` 的基本示例。此脚本向通过 `addTo()` 调用指定的地址发送一封电子邮件。您可以使用此脚本确保您的邮件服务器能够正确发送电子邮件（记得将收件人地址更新为您自己的地址）。\n\
    \n**清单 4-17.** *使用 `Zend_Mail` 发送电子邮件的示例 (`listing-4-17.php`)*\n\n```php\n<?php\n\
    \nrequire_once('Zend/Loader.php');\n\nZend_Loader::registerAutoload();\n\n$mail\
    \ = new Zend_Mail();\n\n$mail->setBodyText('电子邮件正文');\n\n$mail->setFrom('from@example.com');\n\
    \n$mail->addTo('to@example.com');\n\n$mail->setSubject('电子邮件主题');\n\n$mail->send();\n\
    \n?>\n```\n\n在我们让用户注册系统发送电子邮件之前，我们必须首先向 `DatabaseObject_User` 添加用于向用户发送电子邮件的功能——这也将使我们能够轻松地向用户发送其他电子邮件消息（例如重置忘记密码的说明）。\n\
    \n我们将像输出网站 HTML 一样，使用 Smarty 作为电子邮件模板。我们的电子邮件模板将结构化，使得模板的第一行是电子邮件的主题，而文件的其余部分构成电子邮件的正文。\n\
    \n清单 4-18 显示了 `sendEmail()` 函数，我们将把它添加到 `DatabaseObject_User` 类中。它接受模板的文件名作为参数，并通过\
    \ Smarty 进行处理，然后使用 `Zend_Mail` 将生成的电子邮件正文发送给用户。\n\n**清单 4-18.** *用于向用户发送电子邮件的辅助函数\
    \ (`User.php`)*\n\n```php\n<?php\n\nclass DatabaseObject_User extends DatabaseObject\n\
    \n{\n\n    // ... 其他代码\n\n    **public function sendEmail($tpl)**\n\n    **{**\n\
    \n        **$templater = new Templater();**\n\n        **$templater->user = $this;**\n\
    \n        **// 获取电子邮件正文**\n\n        **$body = $templater->render('email/' . $tpl);**\n\
    \n        **// 从第一行提取主题**\n\n        **list($subject, $body) = preg_split('/\\\
    r|\\n/', $body, 2);**\n\n        **// 现在设置并发送电子邮件**\n\n        **$mail = new Zend_Mail();**\n\
    \n        **// 在 'to' 字段中设置收件人地址和用户的全名**\n\n        **$mail->addTo($this->profile->email,**\n\
    \n            **trim($this->profile->first_name . ' ' .**\n\n                **$this->profile->last_name));**\n\
    \n        **// 从配置中获取管理员的 'from' 详细信息**\n\n        **$mail->setFrom(Zend_Registry::get('config')->email->from->email,**\
    \ \n\n            **Zend_Registry::get('config')->email->from->name);**\n\n  \
    \      **// 设置主题和正文并发送邮件**\n\n        **$mail->setSubject(trim($subject));**\n\
    \n        **$mail->setBodyText(trim($body));**\n\n        **$mail->send();**\n\
    \n    **}**\n\n    // ... 其他代码\n\n}\n\n?>\n```\n\n在此代码中，我们首先实例化 `Templater` 类，并将\
    \ `$this` 赋值给它，这样我们就可以从通过 `$tpl` 参数传入的电子邮件模板中访问所有用户详细信息（包括个人资料）。\n\n接下来，我们使用 `render()`\
    \ 方法来检索模板输出。在这个函数中，我们希望返回字符串，这样我们就可以提取主题，然后通过电子邮件发送。此外，此代码强制所有电子邮件模板位于模板目录内的 `email`\
    \ 目录中（`./templates/email`）。\n\n对 `preg_split()` 的调用是我们用来提取主题的方法。使用的正则表达式简单地查找换行符（`\\\
    n`）或回车符（`\\r`）进行分割。第三个参数（数字 `2`）将字符串最多分割成两个项目。\n\n此代码中另一个需要注意的重要事项是我们如何设置发件人电子邮件地址和姓名：我们在应用程序设置文件（`settings.ini`）中添加了两个新值。清单\
    \ 4-19 显示了 `settings.ini` 的更新版本。这些值有些通用；您可以根据自己的需求进行设置。\n\n**清单 4-19.** *包含系统管理员联系方式的更新后应用程序设置\
    \ (`settings.ini`)*\n\n```ini\n[development]\n\ndatabase.type = pdo_mysql\n\n\
    database.hostname = localhost\n\ndatabase.username = phpweb20\n\ndatabase.password\
    \ = myPassword\n\ndatabase.database = phpweb20\n\npaths.base = /var/www/phpweb20\n\
    \npaths.data = /var/www/phpweb20/data\n\npaths.templates = /var/www/phpweb20/templates\n\
    \nlogging.file = /var/www/phpweb20/data/logs/debug.log\n\n**email.from.name =\
    \ \"系统管理员\"**\n\n**email.from.email = \"noreply@localhost\"**\n```\n\n现在，我们可以更新\
    \ `DatabaseObject_User` 中的 `postInsert()` 方法，以向用户发送欢迎电子邮件。您可能还记得第 3 章，这个回调方法是在使用\
    \ `DatabaseObject` 的 `save()` 方法成功将新记录插入数据库后执行的。\n\n清单 4-20 显示了 `postInsert()`\
    \ 的更新版本，它将在用户个人资料保存后使用 `user-register.tpl` 发送一封电子邮件。\n\n**清单 4-20.** *在添加新用户时添加对\
    \ `sendEmail()` 的自动调用 (`User.php`)*\n\n```php\n<?php\n\nclass DatabaseObject_User\
    \ extends DatabaseObject\n\n{\n\n    // ... 其他代码\n\n    protected function postInsert()\n\
    \n    {\n\n        $this->profile->setUserId($this->getId());\n\n        $this->profile->save(false);\n\
    \n        **$this->sendEmail('user-register.tpl');**\n\n        return true;\n\
    \n    }\n\n    // ... 其他代码\n\n}\n\n?>\n```\n\n剩下要做的就是创建电子邮件模板，并使新密码在该模板中可用。当我们最初创建\
    \ `DatabaseObject_User` 时，我们使用 `uniqid()` 函数生成随机密码。现在我们将更新此功能，使用我们为 CAPTCHA 实现安装的\
    \ PEAR `Text_Password` 类来生成更好的密码。此外，由于密码使用 MD5 存储在数据库中，因此我们必须记录加密前的密码，以便将其包含在电子邮件模板中。\n\
    \n我们将通过将生成的密码作为属性存储在当前 `DatabaseObject_User` 对象中来实现这一点，以便模板可以访问它。我们还需要在类的顶部初始化此属性。清单\
    \ 4-21 显示了 `DatabaseObject_User` 的 `preInsert()` 回调的更改，以及新属性 `$_newPassword` 的初始化。此属性必须是公共的，以便模板可以访问其值。\n\
    \n**清单 4-21.** *使用 `Text_Password` 创建可发音的密码 (`User.php`)*\n\n```php\n<?php\n\n\
    class DatabaseObject_User extends DatabaseObject\n\n{\n\n    // ... 其他代码\n\n \
    \   **public $_newPassword = null;**\n\n    // ... 其他代码\n\n    protected function\
    \ preInsert()\n\n    {\n\n        **$this->_newPassword = Text_Password::create(8);**\n\
    \n        **$this->password = $this->_newPassword;**\n\n        return true;\n\
    \n    }\n\n    // ... 其他代码\n\n}\n\n?>\n```\n\n最后，我们可以创建 `user-register.tpl` 模板。如前所述，该文件的第一行将用作电子邮件的主题。这非常有用，因为它允许我们在电子邮件主题和正文中包含模板逻辑。我们将在电子邮件主题中包含用户的名字。\n\
    \n清单 4-22 显示了 `user-register.tpl` 的内容，该文件存储在 `./templates/email` 中。您可能希望自定义此模板以满足您自己的需求。\n\
    \n**清单 4-22.** *新用户注册时使用的电子邮件模板 (`user-register.tpl`)*\n\n```smarty\n{$user->profile->first_name}，感谢您的注册\n\
    \n尊敬的 {$user->profile->first_name}，\n\n感谢您的注册。您的登录详细信息如下：\n\n[登录网址：http://phpweb20/account/login](http://phpweb20/account/login)\n\
    \n用户名：{$user->username}\n\n密码：{$user->_newPassword}\n\n此致\n\n网站管理员\n```\n\n图 4-4\
    \ 显示了用户在收到电子邮件时可能看到的样子。希望用户的电子邮件客户端能使登录网址可点击。您可以选择使用 HTML 电子邮件，但如果电子邮件客户端无法自动突出显示纯文本电子邮件中的链接，它可能也无法渲染\
    \ HTML 电子邮件。\n\n# 实现账户登录和注销\n\n既然用户有了在系统上注册的方法，我们必须允许他们登录到自己的账户。我们通过向账户控制器添加一个新的动作来实现这一点，我们将其称为\
    \ `login`。\n\n在第 3 章中，我们学习了如何使用 `Zend_Auth` 进行身份验证（参见清单 3-5）。现在我们将实现此功能。\n\n登录动作的基本算法如下：\n\
    \n**1.** 显示登录表单。\n**2.** 如果用户提交表单，尝试使用 `Zend_Auth` 对其进行身份验证。\n**3.** 如果他们成功通过身份验证，将其身份写入会话，并将其重定向到他们的账户主页（或他们最初请求的受保护页面）。\n\
    **4.** 如果他们的身份验证尝试不成功，再次显示登录表单，指示发生了错误。\n\n除此之外，我们还希望利用我们的日志记录功能。我们将为成功和不成功的登录尝试都记录一条日志条目。\n\
    \n## 创建登录模板\n\n在我们于账户控制器中实现登录动作之前，我们先快速看一下登录表单。清单 4-23 显示了 `login.tpl` 模板，我们将把它存储在\
    \ `./templates/account` 中。\n\n**清单 4-23.** *账户登录表单 (`login.tpl`)*\n\n```smarty\n\
    {include file='header.tpl'}\n\n<form method=\"post\" action=\"/account/login\"\
    >\n\n<fieldset>\n\n<input type=\"hidden\" name=\"redirect\" value=\"{$redirect|escape}\"\
    \ />\n\n<legend>登录您的账户</legend>\n\n<div class=\"row\" id=\"form_username_container\"\
    >\n\n<label for=\"form_username\">用户名：</label>\n\n<input type=\"text\" id=\"form_username\"\
    \n\nname=\"username\" value=\"{$username|escape}\" />\n\n{include file='lib/error.tpl'\
    \ error=$errors.username}\n\n</div>\n\n<div class=\"row\" id=\"form_password_container\"\
    >\n\n<label for=\"form_password\">密码：</label>\n\n<input type=\"password\" id=\"\
    form_password\"\n\nname=\"password\" value=\"\" />\n\n{include file='lib/error.tpl'\
    \ error=$errors.password}\n\n</div>\n\n<div class=\"submit\">\n\n<input type=\"\
    submit\" value=\"登录\" />\n\n</div>\n\n</fieldset>\n\n</form>\n\n{include file='footer.tpl'}\n\
    ```\n\n此表单在结构上与注册表单非常相似，只是它只包含用户名和密码的输入字段。此外，我们对密码字段使用 `password` 类型，而不是 `text`\
    \ 类型。此模板还依赖于一个名为 `$errors` 的数组的存在，该数组由登录动作生成。\n\n此表单还包含一个名为 `redirect` 的隐藏表单变量。此字段的值指示用户成功登录后将前往的相对页面\
    \ URL。这是必要的，因为有时用户会直接前往一个需要身份验证的页面，但他们尚未通过身份验证。如果用户被自动重定向到他们的账户主页，他们将不得不再次导航回他们最初想要的页面，这会让他们感到烦恼。我们将在登录动作中设置\
    \ `$redirect` 的值。\n\n图 4-5 显示了登录表单。同样，它很简洁，但我们将在第 6 章中进行改进。\n\n## 添加账户控制器登录动作\n\
    \n现在我们需要向账户控制器添加 `loginAction()` 方法。这是我们迄今为止创建的最复杂的动作处理程序，尽管它所做的只是执行“实现账户登录和注销”部分开头列出的四个要点。\n\
    \n清单 4-24 显示了 `loginAction()` 的代码，它属于 `AccountController.php` 文件。\n\n**清单 4-24.**\
    \ *处理用户登录尝试 (`AccountController.php`)*\n\n```php\n<?php\n\nclass AccountController\
    \ extends CustomControllerAction\n\n{\n\n    // ... 其他代码\n\n    **public function\
    \ loginAction()**\n\n    **{**\n\n        **// 如果用户已登录，则将其发送到其账户主页**\n\n     \
    \   **$auth = Zend_Auth::getInstance();**\n\n        **if ($auth->hasIdentity())**\n\
    \n            **$this->_redirect('/account');**\n\n        **$request = $this->getRequest();**\n\
    \n        **// 确定用户最初尝试请求的页面**\n\n        **$redirect = $request->getPost('redirect');**\n\
    \n        **if (strlen($redirect) == 0)**\n\n            **$redirect = $request->getServer('REQUEST_URI');**\n\
    \n        **if (strlen($redirect) == 0)**\n\n            **$redirect = '/account';**\n\
    \n        **// 初始化错误**\n\n        **$errors = array();**\n\n        **// 如果请求方法是\
    \ post，则处理登录**\n\n        **if ($request->isPost()) {**\n\n            **// 从表单获取登录详细信息并验证它们**\n\
    \n            **$username = $request->getPost('username');**\n\n            **$password\
    \ = $request->getPost('password');**\n\n            **if (strlen($username) ==\
    \ 0)**\n\n                **$errors['username'] = '必填字段不能为空';**\n\n          \
    \  **if (strlen($password) == 0)**\n\n                **$errors['password'] =\
    \ '必填字段不能为空';**\n\n            **if (count($errors) == 0) {**\n\n            \
    \    **// 设置认证适配器**\n\n                **$adapter = new Zend_Auth_Adapter_DbTable($this->db,**\n\
    \n                    **'users',**\n\n                    **'username',**\n\n\
    \                    **'password',**\n\n                    **'md5(?)');**\n\n\
    \                **$adapter->setIdentity($username);**\n\n                **$adapter->setCredential($password);**\n\
    \n                **// 尝试对用户进行身份验证**\n\n                **$result = $auth->authenticate($adapter);**\n\
    \n                **if ($result->isValid()) {**\n\n                    **$user\
    \ = new DatabaseObject_User($this->db);**\n\n                    **$user->load($adapter->getResultRowObject()->user_id);**\n\
    \n                    **// 记录登录尝试**\n\n                    **$user->loginSuccess();**\n\
    \n                    **// 创建身份数据并将其写入会话**\n\n                    **$identity\
    \ = $user->createAuthIdentity();**\n\n                    **$auth->getStorage()->write($identity);**\n\
    \n                    **// 将用户发送到他们最初请求的页面**\n\n                    **$this->_redirect($redirect);**\n\
    \n                **}**\n\n                **// 记录失败的登录尝试**\n\n              \
    \  **DatabaseObject_User::LoginFailure($username,**\n\n                    **$result->getCode());**\n\
    \n                **$errors['username'] = '您的登录详细信息无效';**\n\n            **}**\n\
    \n        **}**\n\n        **$this->view->errors = $errors;**\n\n        **$this->view->redirect\
    \ = $redirect;**\n\n    **}**\n\n}\n\n?>\n```\n\n这个函数做的第一件事是检查用户是否已经通过身份验证。如果是，他们将被重定向回他们的账户主页。\n\
    \n接下来，我们尝试确定他们最初试图访问的页面。如果他们提交了登录表单，此值将在 `redirect` 表单值中。如果没有，我们只需使用 `$_SERVER['REQUEST_URI']`\
    \ 值来确定他们来自哪里。如果我们仍然无法确定他们来自哪里，我们就使用他们的账户主页作为默认目的地。我们尚未创建显示其账户主页的动作；我们将在本章后面的“实现账户管理”部分中进行。\n\
    \n> **注意** 由于 ACL 管理器将请求转发给了登录处理程序（而不是使用 HTTP 重定向），服务器变量 `REQUEST_URI` 将包含最初请求的位置。如果使用重定向来显示登录表单，您可以改用\
    \ `HTTP_REFERER` 值。\n\n然后我们定义一个空数组来保存错误消息。这里这样做的目的是，无论是否发生登录尝试，都可以将其分配给模板。\n\n\
    接下来，我们通过检查 `$request` 对象的 `isPost()` 方法（我们在处理用户注册时也做过类似操作）来检查登录表单是否已提交。如果已提交，我们从请求数据中检索提交的用户名和密码值。如果其中任何一个为空，我们设置相应的错误消息，并继续显示登录模板。\n\
    \n一旦我们确定用户名和密码都已提交，我们就尝试对用户进行身份验证。此代码与清单 3-4 的代码非常相似。\n\n如果我们确定登录尝试成功，我们将执行三个操作：\n\
    \n**1. 记录成功的登录尝试。** 当用户成功登录时，我们希望将此记录到应用程序日志文件中。为此，我们将向 `DatabaseObject_User`\
    \ 添加一个名为 `loginSuccess()` 的实用函数。此函数还将更新用户表中的 `ts_last_login` 字段，以记录用户最近一次登录的时间戳。我们稍后将查看\
    \ `loginSuccess()` 函数。此函数必须在 `DatabaseObject_User` 中加载用户记录后调用。\n\n**2. 更新存储在会话中的身份数据，以包含该用户对应数据库行中的所有值。**\
    \ 默认情况下，只有提供的用户名会作为身份存储；然而，由于我们想要显示其他用户详细信息（例如他们的姓名或电子邮件地址），我们需要更新存储的身份以包含这些其他详细信息：\n\
    \    * 我们可以通过使用 `DatabaseObject_User` 中的 `createAuthIdentity()` 方法来检索我们想要保存为身份的数据。此函数返回一个包含用户详细信息的通用\
    \ PHP 对象。\n    * 从 `Zend_Auth` 的 `getStorage()` 方法返回的存储对象有一个名为 `write()` 的方法，我们可以使用它来用\
    \ `createAuthIdentity()` 返回的数据覆盖现有身份。\n\n**3. 将用户重定向到他们之前请求的页面。** 这通过使用单个参数 `$redirect`\
    \ 变量调用 `_redirect()` 方法来实现。\n\n或者，如果登录尝试失败，代码将继续执行。此时，我们调用 `DatabaseObject_User`\
    \ 类中的 `LoginFailure()` 方法，将此次失败的尝试写入日志文件。我们稍后将查看此方法。\n\n然后，我们向 `$errors` 数组写入一条消息，并继续显示模板。如第\
    \ 3 章所述，我们可以确定登录尝试失败的确切原因，并将此原因记录在日志文件中。但是，这些信息不应提供给用户。\n\n> **注意** 在您添加下一节中的函数之前，如果您尝试登录，将会出现\
    \ PHP 错误。\n\n## 记录成功和失败的登录尝试\n\n为了记录成功和失败的登录尝试，我们将在 `DatabaseObject_User` 中实现两个实用函数：`loginSuccess()`\
    \ 和 `LoginFailure()`。\n\n清单 4-25 显示了这些函数在 `DatabaseObject_User` 类（`User.php`）中的样子。请注意，`LoginFailure()`\
    \ 是一个静态方法，而 `loginSuccess()` 必须在加载用户记录后调用。我还包含了上一节中描述的 `createAuthIdentity()`\
    \ 方法。\n\n**清单 4-25.** *通过将登录尝试写入应用程序日志来审计它们 (`User.php`)*\n\n```php\n<?php\n\n\
    class DatabaseObject_User extends DatabaseObject\n\n{\n\n    // ... 其他代码\n\n \
    \   public function createAuthIdentity()\n\n    {\n\n        $identity = new stdClass;\n\
    \n        $identity->user_id = $this->getId();\n\n        $identity->username\
    \ = $this->username;\n\n        $identity->user_type = $this->user_type;\n\n \
    \       $identity->first_name = $this->profile->first_name;\n\n        $identity->last_name\
    \ = $this->profile->last_name;\n\n        $identity->email = $this->profile->email;\n\
    \n        return $identity;\n\n    }\n\n    public function loginSuccess()\n\n\
    \    {\n\n        $this->ts_last_login = time();\n\n        $this->save();\n\n\
    \        $message = sprintf('来自 %s 的成功登录尝试，用户 %s',\n\n            $_SERVER['REMOTE_ADDR'],\n\
    \n            $this->username);\n\n        $logger = Zend_Registry::get('logger');\n\
    \n        $logger->notice($message);\n\n    }\n\n    static public function LoginFailure($username,\
    \ $code = '')\n\n    {\n\n        switch ($code) {\n\n            case Zend_Auth_Result::FAILURE_IDENTITY_NOT_FOUND:\n\
    \n                $reason = '未知用户名';\n\n                break;\n\n           \
    \ case Zend_Auth_Result::FAILURE_IDENTITY_AMBIGUOUS:\n\n                $reason\
    \ = '找到多个此用户名的用户';\n\n                break;\n\n            case Zend_Auth_Result::FAILURE_CREDENTIAL_INVALID:\n\
    \n                $reason = '密码无效';\n\n                break;\n\n            default:\n\
    \n                $reason = '';\n\n        }\n\n        $message = sprintf('来自\
    \ %s 的失败登录尝试，用户 %s',\n\n            $_SERVER['REMOTE_ADDR'],\n\n            $username);\n\
    \n        if (strlen($reason) > 0)\n\n            $message .= sprintf(' (%s)',\
    \ $reason);\n\n        $logger = Zend_Registry::get('logger');\n\n        $logger->warn($message);\n\
    \n    }\n\n    // ... 其他代码\n\n}\n\n?>\n```\n\n我们在 `LoginSuccess()` 中做的第一件事是更新\
    \ `users` 表，将刚刚登录的用户的 `ts_last_login` 字段设置为当前日期和时间。正是出于这个原因（更新数据库），我们将数据库连接作为第一个参数传递。\n\
    \n然后我们从应用程序注册表中获取 `$logger` 对象，以便我们编写一条消息，指示给定用户刚刚登录。我们还包含用户的 IP 地址。\n\n`LoginFailure()`\
    \ 与 `loginSuccess()` 基本相同，只是我们不进行任何数据库更新。此外，该函数接受登录尝试期间生成的错误代码（在清单 4-24 中使用认证结果对象的\
    \ `getCode()` 方法检索），我们使用该代码生成要写入日志的额外信息。我们以警告级别记录此消息，因为它比成功登录更重要。\n\n请注意，如果您现在尝试登录，您将被重定向到账户主页（`http://phpweb20/account`），我们稍后将创建该主页。\n\
    \n> **提示** 您希望使用不同的优先级级别分别跟踪失败登录和成功登录的原因是，成功登录通常表示“正常运行”，而失败登录可能表示有人试图未经授权访问账户。能够轻松地按消息类型过滤日志，有助于您识别已经发生或正在发生的潜在问题。在第\
    \ 14 章中，我们将学习如何利用这个日志文件。\n\n## 让用户注销账户\n\n让用户可以选择注销其账户非常重要，因为他们可能希望确保在他们结束会话后，没有人能够（恶意或其他方式）使用他们的账户。\n\
    \n使用 `Zend_Auth` 注销用户非常简单。由于会话中存在身份是决定用户是否登录的关键，因此我们只需清除该身份即可将其注销。\n\n为此，我们只需使用\
    \ `Zend_Auth` 实例的 `clearIdentity()` 方法。然后，我们可以将用户重定向到其他地方，以便他们可以根据需要继续使用站点。我只是选择将他们重定向回登录页面。\n\
    \n清单 4-26 显示了用于清除用户身份数据的 `logoutAction()` 方法。用户可以通过访问 `http://phpweb20/account/logout`\
    \ 来注销。\n\n**清单 4-26.** *注销用户并将其重定向回登录页面 (`AccountController.php`)*\n\n```php\n\
    <?php\n\nclass AccountController extends CustomControllerAction\n\n{\n\n    //\
    \ ... 其他代码\n\n    **public function logoutAction()**\n\n    **{**\n\n        **Zend_Auth::getInstance()->clearIdentity();**\n\
    \n        **$this->_redirect('/account/login');**\n\n    **}**\n\n}\n\n?>\n```\n\
    \n> **注意** 在清单 4-26 中，您也可以使用 `_forward('login')` 代替 `_redirect('/account/login')`。但是，如果您将请求转发到登录页面，`loginAction()`\
    \ 中的 `$redirect` 变量将被设置为在用户登录后立即加载注销页面（`/account/logout`）——除非他们首先手动键入不同的 URL，否则他们将永远无法登录其账户！\n\
    \n## 处理忘记的密码\n\n既然我们已经添加了登录功能，我们还必须允许忘记密码的用户访问其账户。因为我们将用户密码存储为实际密码的 MD5 哈希值，所以我们无法将旧密码发送给他们。相反，当他们填写密码获取表单时，我们将生成一个新密码并将其发送给他们。\n\
    \n我们不能自动假设填写密码获取表单的人就是账户持有人，因此我们不会在验证其身份之前更新实际的账户密码。我们通过在发送的电子邮件中提供一个链接来确认密码更改，从而实现这一点。这样做还有一个额外的好处，即允许他们在填写表单后、点击确认链接前，回忆起旧密码。\n\
    \n实现密码获取功能的基本算法如下：\n\n**1.** 向用户显示一个表单，要求他们输入用户名。\n**2.** 如果找到了提供的用户名，则生成一个新密码并将其写入其个人资料，然后向与该账户关联的地址发送一封电子邮件，通知他们新密码。\n\
    **3.** 如果未找到提供的用户名，则向用户显示一条错误消息。\n\n为了避免处理应用程序权限问题，我们将在新的密码获取控制器动作中处理三个不同的操作：\n\
    \n**1.** 显示并处理用户表单。\n**2.** 显示确认消息。\n**3.** 当点击密码更新确认链接时，更新用户账户，并向用户指示已发生此操作。\n\
    \n### 重置用户密码\n\n在我们实现密码获取所需的应用程序逻辑之前，让我们先创建我们将使用的网页模板。清单 4-27 显示了 `fetchpassword.tpl`\
    \ 的内容，我们将把它存储在账户模板目录中。此模板处理前面概述的三种情况。\n\n**清单 4-27**"
