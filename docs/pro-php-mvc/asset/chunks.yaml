- fmt: "These tests resemble those we created for the cache driver, but they are targeted\
    \ at an instance of the `MySQL` driver. The `connect()` / `disconnect()` methods\
    \ are simple, and we have seen their like before. The `escape()` method, however,\
    \ is new. When dealing with databases, we need to protect the information they\
    \ hold, from SQL injection attacks. SQL injection (and often just bad data) is\
    \ the number-one cause of application instability and security breaches.\n\nThese\
    \ problems occur, most often, when data does not conform to the correct data type,\
    \ or attempts to perform a database query from within the body of another. We\
    \ can avoid this by escaping the parameters we pass the database, within queries.\
    \ That is the purpose of the `escape()` method.\n\nNext, we need to test whether\
    \ the driver (connector) is capable of executing SQL queries, and whether it can\
    \ return the correct metadata after executing those queries. Listing 11-9 shows\
    \ how we do this.\n\n**Listing 11-9.** Executing SQL and Returning Metadata\n\n\
    ```\nFramework\\Test::add(\n\n    function() use ($options)\n\n    {\n\n     \
    \   $database = new Framework\\Database($options);\n\n        $database = $database->initialize();\n\
    \n        $database = $database->connect();\n\n        $database->execute(\"\n\
    \n            SOME INVALID SQL\n\n        \");\n\n        return (bool) $database->lastError;\n\
    \n    },\n\n    \"Database\\Connector\\Mysql returns last error\",\n\n    \"Database\\\
    Connector\\Mysql\"\n\n);\n\nFramework\\Test::add(\n\n    function() use ($options)\n\
    \n    {\n\n        $database = new Framework\\Database($options);\n\n        $database\
    \ = $database->initialize();\n\n        $database = $database->connect();\n\n\
    \        $database->execute(\"\n\n            DROP TABLE IF EXISTS 'tests';\n\n\
    \        \");\n\n        $database->execute(\"\n\n            CREATE TABLE 'tests'\
    \ (\n\n                'id' int(11) NOT NULL AUTO_INCREMENT,\n\n             \
    \   'number' int(11) NOT NULL,\n\n                'text' varchar(255) NOT NULL,\n\
    \n                'boolean' tinyint(4) NOT NULL,\n\n                PRIMARY KEY\
    \ ('id')\n\n            ) ENGINE=InnoDB DEFAULT CHARSET=utf8;\n\n        \");\n\
    \n        return !$database->lastError;\n\n    },\n\n    \"Database\\Connector\\\
    Mysql executes queries\",\n\n    \"Database\\Connector\\Mysql\"\n\n);\n\nFramework\\\
    Test::add(\n\n    function() use ($options)\n\n    {\n\n        $database = new\
    \ Framework\\Database($options);\n\n        $database = $database->initialize();\n\
    \n        $database = $database->connect();\n\n        for ($i = 0; $i < 4; $i++)\n\
    \n        {\n\n            $database->execute(\"\n\n                INSERT INTO\
    \ 'tests' ('number', 'text', 'boolean') VALUES\n\n                ('1337', 'text',\
    \ '0');\n\n            \");\n\n        }\n\n        return $database->lastInsertId;\n\
    \n    },\n\n    \"Database\\Connector\\Mysql returns last inserted ID\",\n\n \
    \   \"Database\\Connector\\Mysql\"\n\n);\n\nFramework\\Test::add(\n\n    function()\
    \ use ($options)\n\n    {\n\n        $database = new Framework\\Database($options);\n\
    \n        $database = $database->initialize();\n\n        $database = $database->connect();\n\
    \n        $database->execute(\"\n\n            UPDATE 'tests' SET 'number' = 1338;\n\
    \n        \");\n\n        return $database->affectedRows;\n\n    },\n\n    \"\
    Database\\Connector\\Mysql returns affected rows\",\n\n    \"Database\\Connector\\\
    Mysql\"\n\n);\n```\n\nThe first two tests drop and create a testing table, and\
    \ then insert some rows. These are basic SQL commands, and the tests are comparably\
    \ simple. The third test checks whether the last inserted ID is returned, and\
    \ the fourth checks whether the last error message is returned.\n\nBecause we\
    \ are working with both connectors and queries, we need to check the associations\
    \ between the two, as shown in Listing 11-10.\n\n**Listing 11-10.** Returning\
    \ a Query with the Correct References\n\n```\nFramework\\Test::add(\n\n    function()\
    \ use ($options)\n\n    {\n\n        $database = new Framework\\Database($options);\n\
    \n        $database = $database->initialize();\n\n        $database = $database->connect();\n\
    \n        $query = $database->query();\n\n        return ($query instanceof Framework\\\
    Database\\Query\\Mysql);\n\n    },\n\n    \"Database\\Connector\\Mysql returns\
    \ instance of Database\\Query\\Mysql\",\n\n    \"Database\\Query\\Mysql\"\n\n\
    );\n\nFramework\\Test::add(\n\n    function() use ($options)\n\n    {\n\n    \
    \    $database = new Framework\\Database($options);\n\n        $database = $database->initialize();\n\
    \n        $database = $database->connect();\n\n        $query = $database->query();\n\
    \n        return ($query->connector instanceof\n\n            Framework\\Database\\\
    Connector\\Mysql);\n\n    },\n\n    \"Database\\Query\\Mysql references connector\"\
    ,\n\n    \"Database\\Query\\Mysql\"\n\n);\n```"
