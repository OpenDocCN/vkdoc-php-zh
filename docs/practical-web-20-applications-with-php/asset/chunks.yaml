    **3.** When defining the class’s prototype object, implement the class constructor.
    The name of the constructor is initialize(), which can take any number of arguments
    (just as when writing any other JavaScript function).


    For example, to create a simple class called Book, which takes a title as its
    first argument, the following code could be used:


    Book = Class.create();


    Book.prototype = {


    initialize : function(title)


    {


    this.title = title;


    }


    };


    You can implement your own functions as required. For example, you could make
    a function that returns the book title as follows:


    Book = Class.create();


    Book.prototype = {


    initialize : function(title)


    {


    this.title = title;


    },


    getTitle : function()


    {


    return this.title;


    }


    };


    var book = new Book(''Practical PHP Web 2.0 Applications'');


    alert(book.getTitle());


    ■**Tip** Since each function is an element of the class’s prototype object, they
    must be separated by commas. Forgetting the comma is a very common cause of syntax
    errors when developing classes in JavaScript.


