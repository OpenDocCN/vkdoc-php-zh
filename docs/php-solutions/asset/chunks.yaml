  trans: "\n# PHP 解决方案 15-4：构建详情页面\n\n本 PHP 解决方案演示了如何关联 `blog` 和 `images` 表，以显示所选文章及其关联图片。MySQLi\
    \ 和 PDO 的代码几乎相同，因此本解决方案将同时涵盖两者。\n\n将 `ch15` 文件夹中的 `details_01.php` 复制到 `phpsols`\
    \ 站点根目录，并将其重命名为 `details.php`。如果编辑环境提示您更新链接，**请勿**更新。确保 `footer.php` 和 `menu.php`\
    \ 位于 `includes` 文件夹中，然后在浏览器中加载该页面。它应如图 15-5 所示。\n\n![A978-1-4842-0635-5_15_Fig5_HTML.jpg](img/A978-1-4842-0635-5_15_Fig5_HTML.jpg)\n\
    \n图 15-5。\n\n详情页面包含占位图片和文本。在浏览器中加载 `blog_list_mysqli.php` 或 `blog_list_pdo.php`，并通过分配如下所示的图片文件名来更新以下三篇文章：\n\
    \n- Basin of Contentment：`basin.jpg`\n- Tiny Restaurants Crowded Together：`menu.jpg`\n\
    - Trainee Geishas Go Shopping：`maiko.jpg`\n\n导航到 phpMyAdmin 中的 `blog` 表，点击 `浏览`\
    \ 选项卡，检查外键是否已注册。至少应有一篇文章的 `image_id` 值为 `NULL`，如图 15-6 所示。\n\n![A978-1-4842-0635-5_15_Fig6_HTML.jpg](img/A978-1-4842-0635-5_15_Fig6_HTML.jpg)\n\
    \n图 15-6。\n\n未关联图片的文章的外键被设置为 `NULL`。在 `details.php` 中，包含上一章的 `utility_funcs.php`（如有必要，将其从\
    \ `ch14` 文件夹复制到 `includes` 文件夹）。然后包含数据库连接文件，创建一个只读连接，并在 `DOCTYPE` 声明之前的 PHP 代码块中准备\
    \ SQL 查询，如下所示：\n\n```php\nrequire_once './includes/utility_funcs.php';\nrequire_once\
    \ './includes/connection.php';\n// 连接到数据库\n$conn = dbConnect('read');  // 如有必要添加\
    \ 'pdo'\n// 检查查询字符串中的 article_id\nif (isset($_GET['article_id']) && is_numeric($_GET['article_id']))\
    \ {\n    $article_id = (int) $_GET['article_id'];\n} else {\n    $article_id =\
    \ 0;\n}\n$sql = \"SELECT title, article,DATE_FORMAT(updated, '%W, %M %D, %Y')\
    \ AS updated,\n        filename, caption\n        FROM blog INNER JOIN images\
    \ USING (image_id)\n        WHERE blog.article_id = $article_id\";\n$result =\
    \ $conn->query($sql);\n$row = $result->fetch_assoc();  // 对于 PDO 使用 $result->fetch();\n\
    ```\n\n该代码检查 `URL` 查询字符串中的 `article_id`。如果存在且为数字，则使用 `(int)` 类型转换运算符将其赋值给 `$article_id`，以确保它是一个整数。否则，`$article_id`\
    \ 被设置为 `0`。您也可以选择一个默认文章，但暂时将其保留为 `0`，因为我想说明一个重要的点。\n\n`SELECT` 查询从 `blog` 表中检索\
    \ `title`、`article` 和 `updated` 列，并从 `images` 表中检索 `filename` 和 `caption` 列。`updated`\
    \ 的值使用 `DATE_FORMAT()` 函数和别名进行格式化，如 第 14 章 所述。由于只检索一条记录，使用原始列名作为别名不会导致排序问题。\n\n\
    表通过 `INNER JOIN` 和一个 `USING` 子句连接，该子句匹配两个表中 `image_id` 列的值。`WHERE` 子句选择由 `$article_id`\
    \ 标识的文章。由于已经检查了 `$article_id` 的数据类型，因此在查询中使用是安全的。无需使用预处理语句。\n\n请注意，查询被包裹在双引号中，以便解释\
    \ `$article_id` 的值。为避免与外部引号冲突，传递给 `DATE_FORMAT()` 参数的格式字符串使用了单引号。\n\n其余代码在页面主体中显示\
    \ SQL 查询的结果。像这样替换 `<h2>` 标签中的占位文本：\n\n```php\n<h2>\n<?php if ($row) {\n    echo\
    \ $row['title'];\n} else {\n    echo '未找到记录';\n}\n?>\n</h2>\n```\n\n如果 `SELECT`\
    \ 查询未找到结果，`$row` 将为空，PHP 会将其解释为 `false`。因此，这会显示标题，如果结果集为空，则显示“未找到记录”。\n\n像这样替换占位日期：\n\
    \n```php\n<p><?php if ($row) { echo $row['updated']; } ?></p>\n```\n\n紧接着日期段落的是一个包含占位图片的\
    \ `<figure>` 元素。并非所有文章都关联了图片，因此 `<figure>` 需要包裹在一个条件语句中，该语句同时检查 `$row['filename']`\
    \ 是否包含值。像这样修改 `<figure>`：\n\n```php\n<?php\nif ($row && !empty($row['filename']))\
    \ {\n    $filename = \"images/{$row['filename']}\";\n    $imageSize = getimagesize($filename)[3];\n\
    ?>\n<figure>\n    <img src=\"<?= $filename; ?>\" alt=\"<?= $row['caption']; ?>\"\
    \ <?= $imageSize;?>>\n</figure>\n<?php } ?>\n```\n\n这段代码使用了 第 12 章 中描述的内容，因此不再赘述。\n\
    \n最后，您需要显示文章。删除占位文本的段落，并在上一步骤最后一个代码块末尾的右花括号与闭合 PHP 标签之间添加以下代码：\n\n```php\n<?php\
    \ }\nif ($row) { echo convertToParas($row['article']); }\n?>\n```\n\n这使用了 `utility_funcs.php`\
    \ 中的 `convertToParas()` 函数，将博客条目包裹在 `<p>` 标签中，并用闭合和开放标签替换换行符序列（参见 第 14 章 中的“显示段落”）。\n\
    \n保存页面并在浏览器中加载 `blog.php`。点击一个已通过外键分配了图片的文章的“更多”链接。您应该会看到 `details.php` 显示了完整的文章和图片，布局如图\
    \ 15-7 所示。\n\n如有必要，请使用 `ch15` 文件夹中的 `details_mysqli_01.php` 或 `details_pdo_01.php`\
    \ 检查您的代码。\n\n![A978-1-4842-0635-5_15_Fig7_HTML.jpg](img/A978-1-4842-0635-5_15_Fig7_HTML.jpg)\n\
    \n图 15-7。\n\n详情页面从一个表中提取文章，从另一个表中提取图片。点击返回 `blog.php` 的链接并测试其他项目。每个关联了图片的文章都应正确显示。点击未关联图片的文章的“更多”链接。这次您应该会看到如图\
    \ 15-8 所示的结果。\n\n![A978-1-4842-0635-5_15_Fig8_HTML.jpg](img/A978-1-4842-0635-5_15_Fig8_HTML.jpg)\n\
    \n图 15-8。\n\n缺少关联图片导致 `SELECT` 查询失败。\n\n您知道该文章在数据库中，否则前两句不会显示在 `blog.php` 中。要理解这种突然的“消失”，请参考图\
    \ 15-6。未关联图片的记录的 `image_id` 值为 `NULL`。由于 `images` 表中的所有记录都有主键，`USING` 子句找不到匹配项。下一节将解释如何处理这种情况。\n"
- fmt: "### Finding Records that don’t have a Matching Foreign Key\n\nTake the `SELECT`\
    \ query from PHP Solution 15-4 and remove the condition that searches for a specific\
    \ article, which leaves this:\n\n```\nSELECT title, article, DATE_FORMAT(updated,\
    \ '%W, %M %D, %Y') AS updated, filename, caption\nFROM blog INNER JOIN images\
    \ USING (image_id)\n```\n\nIf you run this query in the SQL tab of phpMyAdmin,\
    \ it produces the result shown in Figure [15-9](#A978-1-4842-0635-5_15_Chapter.html#Fig9).\n\
    \n![A978-1-4842-0635-5_15_Fig9_HTML.jpg](A978-1-4842-0635-5_15_Fig9_HTML.jpg)\n\
    \n**Figure 15-9.** `INNER JOIN` finds only records that have a match in both tables\n\
    \nWith `INNER JOIN`, the `SELECT` query succeeds in finding only those records\
    \ where there’s a complete match. One of the articles doesn’t have an image associated\
    \ with it, so value of `image_id` in the `articles` table is `NULL`, which doesn’t\
    \ match anything in the `images` table.\n\nIn this type of situation, you need\
    \ to use `LEFT JOIN` instead of `INNER JOIN`. With `LEFT JOIN`, the result includes\
    \ records that have a match in the left table, but not in the right one. Left\
    \ and right refer to the order in which you perform the join. Rewrite the `SELECT`\
    \ query like this:\n\n```\nSELECT title, article, DATE_FORMAT(updated, '%W, %M\
    \ %D, %Y') AS updated, filename, caption\nFROM blog LEFT JOIN images USING (image_id)\n\
    ```\n\nWhen you run it in phpMyAdmin, you get all four articles, as shown in Figure\
    \ [15-10](#A978-1-4842-0635-5_15_Chapter.html#Fig10).\n\n![A978-1-4842-0635-5_15_Fig10_HTML.jpg](A978-1-4842-0635-5_15_Fig10_HTML.jpg)\n\
    \n**Figure 15-10.** `LEFT JOIN` includes records that don't have a match in the\
    \ right table\n\nAs you can see, the empty fields from the right table (`images`)\
    \ are displayed as `NULL`.\n\nIf the column names are not the same in both tables,\
    \ use `ON` like this:\n\n```\nFROM table_1 LEFT JOIN table_2 ON table_1.col_name\
    \ = table_2.col_name\n```\n\nSo, now you can rewrite the SQL query in `details.php`\
    \ like this:\n\n```\n$sql = \"SELECT title, article, DATE_FORMAT(updated, '%W,\
    \ %M %D, %Y') AS updated,\nfilename, caption\nFROM blog LEFT JOIN images USING\
    \ (image_id)\nWHERE blog.article_id = $article_id\";\n```\n\nIf you click the\
    \ `More` link to view the article that doesn’t have an associated image, you should\
    \ now see the article correctly displayed as shown in Figure [15-11](#A978-1-4842-0635-5_15_Chapter.html#Fig11).\
    \ The other articles should still display correctly, too. The finished code can\
    \ be found in `details_mysqli_02.php` and `details_pdo_02.php`.\n\n![A978-1-4842-0635-5_15_Fig11_HTML.jpg](A978-1-4842-0635-5_15_Fig11_HTML.jpg)\n\
    \n**Figure 15-11.** `LEFT JOIN` also retrieves articles that don't have a matching\
    \ foreign key\n\n### Creating an Intelligent Link\n\nThe link at the bottom of\
    \ `details.php` goes straight back to `blog.php`. That’s fine with only four items\
    \ in the `blog` table, but once you start getting more records in a database,\
    \ you need to build a navigation system, as I showed you in [Chapter 12](#A978-1-4842-0635-5_12_Chapter.html).\
    \ The problem with a navigation system is that you need a way to return visitors\
    \ to the same point in the result set that they came from.\n\n#### PHP Solution\
    \ 15-5: Returning to the Same Point in a Navigation System\n\nThis PHP solution\
    \ checks whether the visitor arrived from an internal or an external link. If\
    \ the referring page was within the same site, the link returns the visitor to\
    \ the same place. If the referring page was an external site, or if the server\
    \ doesn’t support the necessary superglobal variables, the script substitutes\
    \ a standard link. It is shown here in the context of `details.php`, but it can\
    \ be used on any page.\n\nThe code is not database-dependent, so it’s identical\
    \ for both MySQLi and PDO.\n\nLocate the back link in the main body of `details.php`.\
    \ It looks like this:\n\n```\n<p><a href=\"blog.php\">Back to the blog</a></p>\n\
    ```\n\nPlace your cursor immediately to the right of the first quotation mark,\
    \ and insert the following code highlighted in bold:\n\n```\n<p><a href=\"\n<?php\n\
    // check that browser supports $_SERVER variables\nif (isset($_SERVER['HTTP_REFERER'])\
    \ && isset($_SERVER['HTTP_HOST'])) {\n    $url = parse_url($_SERVER['HTTP_REFERER']);\n\
    \    // find if visitor was referred from a different domain\n    if ($url['host']\
    \ == $_SERVER['HTTP_HOST']) {\n        // if same domain, use referring URL\n\
    \        echo $_SERVER['HTTP_REFERER'];\n    }\n} else {\n    // otherwise, send\
    \ to main page\n    echo 'blog.php';\n} ?>\">Back to the blog</a></p>\n```\n\n\
    `$_SERVER['HTTP_REFERER']` and `$_SERVER['HTTP_HOST']` are superglobal variables\
    \ that contain the URL of the referring page and the current hostname. You need\
    \ to check their existence with `isset()` because not all servers support them.\
    \ Also, the browser might block the URL of the referring page.\n\nThe `parse_url()`\
    \ function creates an array containing each part of a URL, so `$url['host']` contains\
    \ the hostname. If it matches `$_SERVER['HTTP_HOST']`, you know that the visitor\
    \ was referred by an internal link, so the full URL of the internal link is inserted\
    \ in the `href` attribute. This includes any query string, so the link sends the\
    \ visitor back to the same position in a navigation system. Otherwise, an ordinary\
    \ link is created to the target page.\n\nThe finished code is in `details_mysqli_03.php`\
    \ and `details_pdo_3.php` in the `ch15` folder.\n\n## Chapter Review\n\nRetrieving\
    \ information stored in multiple tables is relatively simple with `INNER JOIN`\
    \ and `LEFT JOIN`. The key to working successfully with multiple tables lies in\
    \ structuring the relationship between them so that complex relationships can\
    \ always be resolved as `1:1`, if necessary through a cross-reference (or linking)\
    \ table. The next chapter continues the exploration of working with multiple tables,\
    \ showing you how to deal with foreign-key relationships when inserting, updating,\
    \ and deleting records.\n\n# 16. Managing Multiple Database Tables\n\nThe previous\
    \ chapter showed you how to use `INNER JOIN` and `LEFT JOIN` to retrieve information\
    \ stored in multiple tables. You also learned how to link existing tables by adding\
    \ an extra column to the child table and updating each record individually to\
    \ insert a foreign key. However, most of the time you’ll want to insert data simultaneously\
    \ in both tables. That presents a challenge, because `INSERT` commands can operate\
    \ on only one table at a time. You need to handle the insert operations in the\
    \ correct sequence, starting with the parent table, so that you can get the new\
    \ record’s primary key and insert it in the child table at the same time as other\
    \ details. Similar considerations also need to be taken into account when updating\
    \ and deleting records. The code involved isn’t difficult, but you need to keep\
    \ the sequence of events clearly in mind as you build the scripts.\n\nThis chapter\
    \ guides you through the process of inserting new articles in the `blog` table,\
    \ optionally selecting a related image or uploading a new one, and assigning the\
    \ article to one or more categories, all in a single operation. Then you’ll build\
    \ the scripts to update and delete articles without destroying the referential\
    \ integrity of related tables.\n\nYou’ll also learn about foreign-key constraints,\
    \ which control what happens if you try to delete records that still have a foreign-key\
    \ relationship in another table. Not all databases support foreign-key constraints,\
    \ so it’s important to check whether your remote server does. This chapter also\
    \ explains what measures you can take to preserve the integrity of your data if\
    \ your server doesn’t support foreign-key constraints.\n\nIn particular, you’ll\
    \ learn about the following:\n\n- Inserting, updating, and deleting records in\
    \ related tables\n- Finding the primary key of a record immediately after it has\
    \ been created\n- Converting a table’s storage engine\n- Establishing foreign-key\
    \ constraints between InnoDB tables"
