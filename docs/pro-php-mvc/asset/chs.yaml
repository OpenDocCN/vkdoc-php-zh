  \    </tr>\n    {/foreach}\n</table>\n```\n\n此时，如果您尚未登录，您应该会看到一个错误。这是因为我们还没有通过检查是否存在有效用户会话来保护操作。如果您想知道如何轻松实现这一点，您应该回顾一下我们创建`Inspector`类（在第\
  \ 3 章中）以及我们实例化控制器（在第 7 章中）的时候。\n\n让我们看一下保护操作所需的代码，如清单 17-10 所示。\n\n**清单 17-10.**\
  \ `application/controllers/users.php`（摘录）\n\n```php\n/**\n * @before _secure\n */\n\
  public function friend($id)\n{\n    // friend code\n}\n\n/**\n * @before _secure\n\
  \ */\npublic function unfriend($id)\n{\n    // unfriend code\n}\n\n/**\n * @protected\n\
