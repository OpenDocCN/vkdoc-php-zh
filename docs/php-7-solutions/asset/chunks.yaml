    echo $number . '' '';

    }

    ```


    This produces the series of numbers shown in the following

    screenshot:

    ![../images/332054_4_En_4_Chapter/332054_4_En_4_Figk_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figk_HTML.jpg)

    For this trivial example, it would be simpler to create an array of

    the values and use that directly in a loop. The major advantage of

    generators is that they use considerably less memory than arrays for a

    large number of values. In Chapter [9](#332054_4_En_9_Chapter.xhtml), you’ll see
    a practical example of

    a generator to process the contents of a file.


    Passing by reference—Changing the value of an argument


    Although functions don’t normally change the value of variables passed

    to them as arguments, there are occasions when you do want to change the

    original value rather than capture a return value. To do so, when

    defining the function, you prefix the parameter you want to change with

    an ampersand, like this:


    ```

    function doubleIt(&$number) {

    $number *= 2;

    }

    ```


    Notice that this version of the `doubleIt()`

    function  doesn’t

    `echo` the value

    of `$number`, nor

    does it return the value of the calculation. Because the parameter

    between the parentheses is prefixed by an ampersand, the original value

    of a variable passed as an argument to the function will be changed.

    This is known as **passing by reference**.


    The following code (found in `functions_07.php`)

    demonstrates the effect:


    ```

    $num = 4;

    echo ''$num is: '' . $num . '''';

    doubleIt($num);

    echo ''$num is now: '' . $num;

    ```


    ![../images/332054_4_En_4_Chapter/332054_4_En_4_Figl_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figl_HTML.jpg)

    The ampersand is used only in the function definition, not when the

    function is invoked.

    Generally speaking, it’s not a good idea to use functions to change

    the original values of variables passed to them as arguments because

    there can be unexpected consequences if the variable is used elsewhere

    in a script. However, there are situations in which it makes a lot of

    sense to do this. For example, the built-in array-sorting functions use

    pass by reference to affect the original array.


    Note

    Objects are always passed by reference, even if the function

    definition doesn’t prefix the parameter with an ampersand. This also

    applies to iterators and generators, which implement built-in PHP

    classes.


    Functions that accept a variable number of

    arguments


    PHP 5.6 introduced the rather inelegantly named  **splat

    operator**  that allows you to define a function that

    accepts an arbitrary number of arguments. It consists of three dots or

    periods preceding the last (or only) parameter in the function

    signature. The splat operator converts the values passed to the function

    into an array, which can then be used inside the function. The code in

    `functions_08.php`

    contains the following trivial example:


    ```

    function addEm(...$nums) {

    return array_sum($nums);

    }

    $total = addEm(1, 2, 3, 4, 5);

    echo ''$total is '' . $total;

    ```


    The comma-separated numbers passed to the function are converted to

    an array, and then passed to the built-in `array_sum()`

    function  that

    adds up all the values in an array. The following screenshot shows the

    output:

    ![../images/332054_4_En_4_Chapter/332054_4_En_4_Figm_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figm_HTML.jpg)'
  trans: "```php\nfunction doubleIt($number) {\n$number *= 2;\necho 'Inside the function,\
    \ $number is ' . $number . '';  // 数字已加倍\n}\n$number = 4;\ndoubleIt($number);\n\
    echo 'Outside the function $number is still ' . $number;   // 未加倍\n```\n\n前四行定义了一个名为\
    \ `doubleIt()` 的函数，它接收一个数字，将其加倍，并在屏幕上显示。脚本的其余部分将值 4 赋给 `$number`，然后将 `$number`\
    \ 作为参数传递给 `doubleIt()`。该函数处理 `$number` 并显示 8。函数结束后，`echo` 在屏幕上显示 `$number`。此时，它的值是\
    \ 4 而不是 8，如下面的截图所示：\n\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figi_HTML.jpg](img/332054_4_En_4_Figi_HTML.jpg)\n\
    \n这表明主脚本中的 `$number` 与函数内部同名变量完全无关。这被称为变量的**作用域**。即使变量值在函数内部发生变化，除非该值通过引用传递给函数（如本章后文所述），否则外部同名的变量不会受到影响。\n\
    \n> **提示**  \n> 尽管不总是可行，但应避免在脚本其余部分使用与函数内部相同的变量名。这能使代码更易于理解和调试。\n\nPHP 超全局变量（[`www.php.net/manual/en/language.variables.superglobals.php`](http://www.php.net/manual/en/language.variables.superglobals.php)），例如\
    \ `$_POST` 和 `$_GET`，不受变量作用域影响。它们始终可用，因此被称为超全局变量。\n\n## 从函数返回值\n\n让函数更改作为参数传递给它的变量值的方法不止一种，但最重要的方法是使用\
    \ `return` 关键字，并将结果赋给同一个变量或另一个变量。这可以通过修改 `doubleIt()` 函数来演示，如下所示（代码位于 `functions_06.php`）：\n\
    \n```php\nfunction doubleIt($number) {\nreturn $number *= 2;\n}\n$num = 4;\n$doubled\
    \ = doubleIt($num);\necho '$num is: ' . $num . '';  // 保持不变\necho '$doubled is:\
    \ ' . $doubled;   // 原始数字加倍\n```\n\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figj_HTML.jpg](img/332054_4_En_4_Figj_HTML.jpg)\n\
    \n这次，我使用了不同的变量名以避免混淆。我还将 `doubleIt($num)` 的结果赋给了一个新变量。这样做的好处是，原始值和计算结果现在都可用。你并不总是需要保留原始值，但有时它非常有用。函数并不总是需要返回值。`return`\
    \ 关键字可以单独使用以停止任何进一步的处理。\n\n## 生成器——一种持续产出的特殊函数\n\n当函数遇到 `return` 时，它会立即终止并返回一个值或什么都不返回。生成器是\
    \ PHP 5.5 引入的特殊函数，它们创建简单的迭代器，可以在循环内使用以生成一系列值。它们不使用 `return` 关键字，而是使用 `yield`。这使得生成器可以一次生成一个值，并跟踪序列中的下一个值，直到再次被调用或值耗尽为止。\n\
    \n生成器可以使用内部循环来生成它产出的值，也可以有一系列 `yield` 语句。`generator.php` 中的简单示例同时使用了这两种技术，如下所示：\n\
    \n```php\nfunction counter($num) {\n$i = 1;\nwhile ($i < $num) {\nyield $i++;\n\
    }\nyield $i;\nyield $i + 10;\nyield $i + 20;\n}\n```\n\n`counter()` 生成器接受一个参数\
    \ `$num`。它将计数器 `$i` 初始化为 1，然后使用一个循环，该循环在 `$i` 小于 `$num` 时持续运行。循环产出 `$i` 并将其递增\
    \ 1。循环结束后，一系列 `yield` 语句再产出三个值。\n\n通过将生成器赋值给一个变量来初始化它后，你可以在 `foreach` 循环中使用它，如下所示：\n\
    \n```php\n$numbers = counter(5);\nforeach ($numbers as $number) {\necho $number\
    \ . ' ';\n}\n```\n\n这将生成如下截图所示的一系列数字：\n\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figk_HTML.jpg](img/332054_4_En_4_Figk_HTML.jpg)\n\
    \n对于这个简单的例子，创建一个值数组并直接在循环中使用会更简单。生成器的主要优势在于，对于大量值，它们消耗的内存远少于数组。在第 9 章中，你将看到一个使用生成器处理文件内容的实际示例。\n\
    \n## 通过引用传递——改变参数的值\n\n尽管函数通常不会改变作为参数传递给它们的变量的值，但有些情况下你确实想改变原始值，而不是捕获返回值。为此，在定义函数时，需要在要更改的参数前加上\
    \ & 符号，如下所示：\n\n```php\nfunction doubleIt(&$number) {\n$number *= 2;\n}\n```\n\
    \n请注意，这个版本的 `doubleIt()` 函数既没有 `echo` `$number` 的值，也没有返回计算结果。由于括号内的参数前面有 & 符号，因此作为参数传递给函数的变量的原始值将被更改。这被称为**通过引用传递**。\n\
    \n以下代码（位于 `functions_07.php`）演示了其效果：\n\n```php\n$num = 4;\necho '$num is: ' .\
    \ $num . '';\ndoubleIt($num);\necho '$num is now: ' . $num;\n```\n\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figl_HTML.jpg](img/332054_4_En_4_Figl_HTML.jpg)\n\
    \n& 符号仅在函数定义中使用，在调用函数时不使用。一般来说，不建议使用函数来更改作为参数传递给它们的变量的原始值，因为如果该变量在脚本的其他地方被使用，可能会产生意外后果。然而，在某些情况下这样做非常有意义。例如，内置的数组排序函数使用通过引用传递来影响原始数组。\n\
    \n> **注意**  \n> 对象始终通过引用传递，即使函数定义中没有在参数前加 & 符号也是如此。这也适用于实现内置 PHP 类的迭代器和生成器。\n\n\
    ## 接受可变数量参数的函数\n\nPHP 5.6 引入了命名不太优雅的 **splat 运算符**，它允许你定义接受任意数量参数的函数。它由三个点（或句点）组成，位于函数签名中最后一个（或唯一一个）参数之前。splat\
    \ 运算符将传递给函数的值转换为数组，然后可以在函数内部使用该数组。`functions_08.php` 中的代码包含以下简单示例：\n\n```php\n\
    function addEm(...$nums) {\nreturn array_sum($nums);\n}\n$total = addEm(1, 2,\
    \ 3, 4, 5);\necho '$total is ' . $total;\n```\n\n传递给函数的逗号分隔的数字被转换为数组，然后传递到内置的\
    \ `array_sum()` 函数中，该函数对数组中的所有值求和。以下截图显示了输出结果：\n\n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figm_HTML.jpg](img/332054_4_En_4_Figm_HTML.jpg)\n\
    ```"
- fmt: "# Where to Locate Custom-Built Functions\n\nIf your custom-built function\
    \ is found on the same page it’s being used, it doesn’t matter where you declare\
    \ the function; it can be either before or after it’s used. It’s a good idea,\
    \ however, to store functions together, either at the top or the bottom of a page.\
    \ This makes them easier to find and maintain.\n\nFunctions used in more than\
    \ one page are best stored in an external file that is included in each page.\
    \ Including external files with `include` and `require` is covered in detail in\
    \ the next chapter. When functions are in external files, you must include the\
    \ external file *before* calling any of its functions.\n\n# Understanding PHP\
    \ Classes and Objects\n\nClasses are the fundamental building blocks of **object-oriented\
    \ programming** (OOP), an approach to programming that’s designed to make code\
    \ reusable and easier to maintain. PHP has extensive support for OOP, and new\
    \ features are frequently implemented in an object-oriented manner.\n\nAn **object**\
    \ is a sophisticated data type that can store and manipulate values. A **class**\
    \ is the code that defines an object’s features and can be regarded as a blueprint\
    \ for making objects. Among PHP’s many built-in classes, two of particular interest\
    \ are the `DateTime` and `DateTimeZone` classes, which deal with dates and time\
    \ zones.\n\nTo create an object, you use the `new` keyword with the class name\
    \ like this:\n\n```\n$now = new DateTime();\n```\n\nThis creates an **instance**\
    \ of the `DateTime` class and stores it in a `DateTime` object called `$now` that\
    \ is aware not only of the date and time it was created but also of the time zone\
    \ used by the web server. Most classes have properties and methods, which are\
    \ like variables and functions, except that they’re related to a particular instance\
    \ of a class. For example, you can use the `DateTime` class’s methods to change\
    \ certain values, such as the month, year, or time zone. A `DateTime` object is\
    \ also capable of performing date calculations, which are much more complicated\
    \ using ordinary functions.\n\nYou access an object’s properties and methods using\
    \ the `->` operator (a hyphen followed by a greater than symbol). To reset the\
    \ time zone of a `DateTime` object, pass a `DateTimeZone` object as an argument\
    \ to the `setTimezone()` method like this:\n\n```\n$westcoast = new DateTimeZone('America/Los_Angeles');\n\
    $now->setTimezone($westcoast);\n```\n\nThis resets `$now` to the current date\
    \ and time in Los Angeles, regardless of where the web server is located, automatically\
    \ making any adjustments for daylight saving time.\n\nYou access an object’s properties\
    \ using the `->` operator in the same way:\n\n```\n$someObject->propertyName\n\
    ```\n\n> **Tip**  \n> The concepts of objects, properties, and methods can be\
    \ difficult to grasp. All you need to know is how to instantiate objects with\
    \ the `new` keyword and how to access properties and methods with the `->` operator.\n\
    \n# Optionally Specifying Data Types for Classes and Functions\n\nAs PHP has matured,\
    \ many developers have sought greater control over the data types used and returned\
    \ by classes and functions. This sparked fierce controversy among the community\
    \ because PHP’s weak data typing has been one of the main reasons for its success—not\
    \ having to worry about data types makes the language a lot easier for beginners\
    \ to learn. The compromise was to introduce optional **type declarations** (in\
    \ PHP 5, they were known as type hints).\n\nTo specify that an argument must be\
    \ of a specific type, precede the parameter in the function signature with one\
    \ of the types listed in Table [4-8].\n\n**Table 4-8. Type declarations**\n\n\
    | Type | Description | Minimum PHP version |\n| --- | --- | --- |\n| Class/interface\
    \ name | Must be an instance of the given class or interface | 5.0 |\n| `self`\
    \ | Must be an instance of the same class | 5.0 |\n| `array` | Must be an array\
    \ | 5.1 |\n| `callable` | Must be a valid callable function | 5.4 |\n| `bool`\
    \ | Must be a Boolean value | 7.0 |\n| `float` | Must be a floating-point number\
    \ | 7.0 |\n| `int` | Must be an integer | 7.0 |\n| `string` | Must be a string\
    \ | 7.0 |\n| `iterable` | Must be an array or implement the `Traversable` interface\
    \ | 7.1 |\n| `object` | Must be an object | 7.2 |\n\n> **Note**  \n> An **interface**\
    \ specifies which methods a class must implement.\n\nType declarations for classes,\
    \ interfaces, arrays, callable functions, and objects enforce the use of the correct\
    \ data type by throwing an error if a different type is used. However, `bool`,\
    \ `float`, `int`, and `string` type declarations behave differently. Instead of\
    \ throwing an error, they silently convert the argument to the specified data\
    \ type. The code in `functions_09.php` adapts the `doubleIt()` function from “Returning\
    \ values from functions” earlier in this chapter by adding a type declaration\
    \ like this:\n\n```\nfunction doubleIt(int $number) {\nreturn $number *= 2;\n\
    }\n```\n\nThe following screenshot shows what happens when the value passed to\
    \ the function is 4.9:  \n![../images/332054_4_En_4_Chapter/332054_4_En_4_Fign_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Fign_HTML.jpg)\n\
    \nThe number is converted to an integer before it’s processed. It’s not even rounded\
    \ to the closest integer. The decimal fraction is simply stripped off.\n\n> **Tip**\
    \  \n> You can change the behavior of `bool`, `float`, `int`, and `string` type\
    \ declarations by enabling strict typing in each script. However, the implementation\
    \ of strict typing can be confusing. My personal recommendation is to use type\
    \ declarations only for classes, interfaces, and arrays. You can learn how to\
    \ enable strict typing in the PHP documentation at [`www.php.net/manual/en/functions.arguments.php`](http://www.php.net/manual/en/functions.arguments.php).\n\
    \nPHP 7 also introduced return type declarations to specify the data type that\
    \ a function returns. The available types are the same as listed in Table [4-8]\
    \ with the addition of `void` in PHP 7.1. The return type declaration consists\
    \ of a colon and type between the closing parenthesis and opening curly brace\
    \ in the function signature. The example in `functions_10.php` adapts the `doubleIt()`\
    \ function like this:\n\n```\nfunction doubleIt(int $number) : float {\nreturn\
    \ $number *= 2;\n}\n```\n\nI’ve deliberately chosen this illogical example to\
    \ demonstrate that setting `float` as the return type silently converts the value\
    \ returned by the function to a floating-point number. But it doesn’t override\
    \ the type declaration for the parameter. Passing 4.9 as the argument to the function\
    \ still returns 8; but `var_dump()` reveals that PHP treats it as a floating-point\
    \ number, as the following screenshot shows:  \n![../images/332054_4_En_4_Chapter/332054_4_En_4_Figo_HTML.jpg](images/332054_4_En_4_Chapter/332054_4_En_4_Figo_HTML.jpg)\n\
    \nUsing `bool`, `int`, and `string` as return type declarations also performs\
    \ silent data type conversion unless strict typing is enabled. Other return type\
    \ declarations throw errors if the function returns the wrong data type.\n\n>\
    \ **Note**  \n> To maintain both your sanity and mine, the code in this book uses\
    \ type declarations sparingly and only in situations where there is a genuine\
    \ benefit to doing so, for example, to check that the correct data type has been\
    \ passed to a function.\n\n# Handling Errors and Exceptions\n\nPHP 7 changes the\
    \ way that it reports most errors by **throwing an exception**—or generating a\
    \ special type of object that contains details of what caused the error and where\
    \ it arose. If you’ve used PHP 5, the only difference you’ll probably notice is\
    \ that the wording of error messages or the type of error is different. However,\
    \ there’s a subtle difference between exceptions thrown as a result of internal\
    \ errors, such as a parse error or a missing include file, and those thrown by\
    \ a script."
