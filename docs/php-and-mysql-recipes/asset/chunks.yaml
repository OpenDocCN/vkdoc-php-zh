    Recipe 2-20\. Avoiding Name Collisions


    Problem


    A common problem for authors of libraries that are included in other projects
    is collisions of names . It is not possible to define a function or class more
    than once with the same name. Early on, adding prefixes to the function and class
    names solved this problem, but that often creates a less readable code base.


