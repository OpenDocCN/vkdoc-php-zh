  \ 15-2 所示的四个项目列表。现在你可以测试 `blog_insert_mysqli.php` 或 `blog_insert_pdo.php`。插入项目后，你应被重定向回相应版本的\
  \ `blog_list.php`，并且新项目的创建日期和时间以及标题应显示在列表顶部。如果遇到任何问题，请将你的代码与 `ch15` 文件夹中的 `blog_list_mysqli_02.php`\
  \ 或 `blog_list_pdo_02.php` 进行核对。\n\n\n\n**提示** 此代码假设表中始终存在记录。作为练习，请使用 PHP 解决方案 13-2（MySQLi）或\
  \ 13-4（PDO）中的技术统计结果数量，并使用条件语句在未找到记录时显示消息。解决方案位于 `blog_list_norec_mysqli.php` 和 `blog_list_norec_pdo.php`\
  \ 中。\n\n## 更新记录\n\n更新页面需要执行两个独立的流程，如下所示：\n\n1.  检索选定的记录，并将其显示以供编辑\n2.  在数据库中更新已编辑的记录\n\
  \n第一阶段使用 `$_GET` 超全局数组从 URL 中检索主键，然后使用它在更新表单中选择并显示记录，如图 15-3 所示。\n\n![../images/332054_4_En_15_Chapter/332054_4_En_15_Fig3_HTML.jpg](img/332054_4_En_15_Fig3_HTML.jpg)\n\
  \n**图 15-3.** 在更新过程中，主键用于跟踪记录\n\n主键存储在更新表单的隐藏字段中。在更新页面中编辑记录后，使用 `post` 方法提交表单，将所有详细信息（包括主键）传递给\
  \ `UPDATE` 命令。\n\nSQL `UPDATE` 命令的基本语法如下所示：\n\n```\nUPDATE table_name SET column_name\
  \ = value, column_name = value\nWHERE condition\n```\n\n更新特定记录时的条件是主键。因此，在 `blog`\
  \ 表中更新 `article_id 3` 时，基本的 `UPDATE` 查询如下所示：\n\n```\nUPDATE blog SET title = value,\
  \ article = value\nWHERE article_id = 3\n```\n\n尽管 MySQLi 和 PDO 的基本原理相同，但它们的代码差异很大，因此需要分别说明。\n\
  \n### PHP 解决方案 15-4：使用 MySQLi 更新记录\n\n此 PHP 解决方案演示如何将现有记录加载到更新表单中，然后将编辑后的详细信息发送到数据库，以便使用\
  \ MySQLi 进行更新。要加载记录，您需要按照 PHP 解决方案 15-3 中的描述创建列出所有记录的管理页面。\n\n1.  从 `ch15` 文件夹复制\
  \ `blog_update_mysqli_01.php`，并将其保存到 `admin` 文件夹中，命名为 `blog_update_mysqli.php`。\n\
  \n2.  第一阶段涉及检索要更新的记录的详细信息。将以下代码放在 `DOCTYPE` 声明上方的 PHP 块中：\n\n```\n    require_once\
  \ '../includes/connection.php';\n    require_once '../includes/utility_funcs.php';\n\
  \    // 初始化标志\n    $OK = false;\n    $done = false;\n    // 创建数据库连接\n    $conn =\
  \ dbConnect('write');\n    // 初始化语句\n    $stmt = $conn->stmt_init();\n    // 获取选定记录的详细信息\n\
  \    if (isset($_GET['article_id']) && !$_POST) {\n    // 准备 SQL 查询\n    $sql =\
  \ 'SELECT article_id, title, article\n    FROM blog WHERE article_id = ?';\n   \
  \ if ($stmt->prepare($sql)) {\n    // 绑定查询参数\n    $stmt->bind_param('i', $_GET['article_id']);\n\
  \    // 执行查询并获取结果\n    $OK = $stmt->execute();\n    // 将结果绑定到变量\n    $stmt->bind_result($article_id,\
  \ $title, $article);\n    $stmt->fetch();\n    }\n    }\n    // 如果未定义 $_GET['article_id']，则重定向\n\
  \    if (!isset($_GET['article_id'])) {\n    $url = 'http://localhost/phpsols-4e/admin/blog_list_mysqli.php';\n\
  \    header(\"Location: $url\");\n    exit;\n    }\n    // 如果查询失败，则获取错误消息\n    if\
  \ (isset($stmt) && !$OK && !$done) {\n    $error = $stmt->error;\n    }\n```\n\n\
  虽然这与用于插入页面的代码非常相似，但前几行位于条件语句*之外*。更新过程的两个阶段都需要数据库连接和预处理语句，因此这避免了稍后重复相同代码。初始化了两个标志：`$OK`\
  \ 用于检查检索记录是否成功，`$done` 用于检查更新是否成功。\n\n第一个条件语句确保 `$_GET['article_id']` 存在且 `$_POST`\
  \ 数组为空。因此，仅当设置了查询字符串但表单尚未提交时，才会执行花括号内的代码。\n\n以与 `INSERT` 命令相同的方式准备 `SELECT` 查询，使用问号作为变量的占位符。但是，请注意，查询没有使用星号检索所有列，而是按名称指定了三列，如下所示：\n\
  \n```\n$sql = 'SELECT article_id, title, article\nFROM blog WHERE article_id = ?';\n\
  ```\n\n这是因为 MySQLi 预处理语句允许您将 `SELECT` 查询的结果绑定到变量，要能够做到这一点，您必须指定列名及其所需顺序。\n\n首先，您需要初始化预处理语句，并使用\
  \ `$stmt->bind_param()` 将 `$_GET['article_id']` 绑定到查询。由于 `article_id` 的值必须是整数，因此您将\
  \ `'i'` 作为第一个参数传递。\n\n该代码执行查询，然后在获取结果之前，将结果绑定到与 `SELECT` 查询中指定的列顺序相同的变量。\n\n如果 `$_GET['article_id']`\
  \ 未定义，下一个条件语句会将页面重定向到 `blog_list_mysqli.php`。这可以防止任何人在浏览器中直接加载更新页面。重定向位置已分配给一个变量，因为如果更新成功，稍后会将查询字符串添加到该变量。\n\
  \n最后一个条件语句会在已创建预处理语句但 `$OK` 和 `$done` 仍为 `false` 时存储错误消息。您尚未添加更新脚本，但如果记录检索或更新成功，其中一个将切换为\
  \ `true`。因此，如果两者都保持 `false`，您就知道其中一个 SQL 查询出了问题。\n\n3.  现在您已经检索到记录的内容，需要在更新表单中显示它们。如果预处理语句成功，`$article_id`\
  \ 应包含要更新记录的主键，因为它是您使用 `bind_result()` 方法绑定到结果集的变量之一。\n\n但是，如果出现错误，您需要在屏幕上显示消息。但如果有人将查询字符串更改为无效数字，`$article_id`\
  \ 将设置为 `0`，因此显示更新表单就没有意义了。在开始 `<form>` 标签之前立即添加以下条件语句：\n\n```\n<?php if (isset($error))\
  \ {\n    echo \"<p>Error: $error</p>\";\n} ?>\n<?php if($article_id == 0) { ?>\n\
  \    <p>Invalid request: record does not exist.</p>\n    <p><a href=\"blog_list_mysqli.php\"\
  >List all entries</a></p>\n<?php } else { ?>\n```\n\n第一个条件语句显示 MySQLi 预处理语句报告的任何错误消息。第二个条件语句将更新表单包装在\
  \ `else` 块中，因此如果 `$article_id` 为 `0`，表单将被隐藏。\n\n4.  在结束 `</form>` 标签之后立即添加 `else`\
  \ 块的右花括号，如下所示：\n\n```\n<?php } ?>\n```\n\n5.  如果 `$article_id` 不是 `0`，您就知道 `$title`\
  \ 和 `$article` 也包含有效值，并且可以在更新表单中显示，无需进一步测试。但是，您需要将文本值传递给 `safe()` 以避免引号和可执行代码带来的问题。像这样在\
  \ `title` 输入字段的 `value` 属性中显示 `$title`：\n\n```\n<input type=\"text\" name=\"title\"\
  \ value=\"<?= safe($title) ?>\">\n```\n\n6.  对 `article` 文本区域执行相同操作。由于文本区域没有 `value`\
  \ 属性，因此代码如下所示放在开始和结束 `<textarea>` 标签之间：\n\n```\n<textarea name=\"article\" cols=\"\
  60\" rows=\"10\"><?= safe($article) ?></textarea>\n```\n\n确保开始和结束 PHP 标签与 `<textarea>`\
  \ 标签之间没有空格。否则，在更新的记录中将会出现不需要的空格。\n\n\n\n# 排版后的内容\n\n7.  `UPDATE`命令需要知道要更改记录的主键。你需要将主键存储在一个隐藏字段中，这样它就会随其他详细信息一起在`$_POST`数组中被提交。由于隐藏字段不会在屏幕上显示，以下代码可以放在表单内的任何位置：\n\
  \n```\n\">\n```\n\n8.  保存更新页面，并通过在浏览器中加载`blog_list_mysqli.php`并进行测试，选择其中一条记录的`EDIT`链接。记录的详细信息应显示在表单字段中，如图\
  \ 15-3 所示。\n\n`Update Entry`按钮目前还没有任何功能。只需确保一切显示正确，并确认主键已注册在隐藏字段中。如有必要，你可以对照`blog_update_mysqli_02.php`检查代码。\n\
  \n9.  提交按钮的`name`属性是`update`，因此所有更新处理代码都需要放在一个检查`$_POST`数组中是否存在`update`的条件语句中。将以下加粗的代码放在步骤\
  \ 1 中重定向页面的代码上方：\n\n```\n$stmt->fetch();\n}\n}\n// if form has been submitted, update\
  \ record\nif (isset($_POST ['update'])) {\n// prepare update query\n$sql = 'UPDATE\
  \ blog SET title = ?, article = ?\nWHERE article_id = ?';\nif ($stmt->prepare($sql))\
  \ {\n$stmt->bind_param('ssi', $_POST['title'], $_POST['article'],\n$_POST['article_id']);\n\
  $done = $stmt->execute();\n}\n}\n// redirect page on success or if $_GET['article_id'])\
  \ not defined\nif ($done || !isset($_GET['article_id'])) {\n$url = 'http://localhost/phpsols-4e/admin/blog_list_mysqli.php';\n\
  if ($done) {\n$url .= '?updated=true';\n}\nheader(\"Location: $url\");\nexit;\n\
  }\n```\n\n`UPDATE`查询是使用问号占位符准备的，这些占位符用于从变量中提供值。准备好的语句已在条件语句之外的代码中初始化，因此你可以将 SQL\
  \ 传递给`prepare()`方法，并使用`$stmt->bind_param()`绑定变量。前两个变量是字符串，第三个是整数，因此第一个参数是`'ssi'`。\n\
  \n如果`UPDATE`查询成功，`execute()`方法返回`true`，重置`$done`的值。与`INSERT`查询不同，使用`affected_rows`属性意义不大，因为如果用户在不做任何更改的情况下点击`Update\
  \ Entry`按钮，它会返回`0`，所以我们在此不使用它。你需要将`$done ||`添加到重定向脚本的条件中。这确保了页面在更新成功或有人试图直接访问页面时被重定向。\n\
  \n如果更新成功，一个查询字符串会被附加到重定向位置。\n\n10. 编辑`blog_list_mysqli.php`中表格上方的 PHP 块，以显示记录已更新的消息，如下所示：\n\
  \n```\n$error\";\n} else {\nif (isset($_GET['updated'])) {\necho 'Record updated';\n\
  }\n?>\n```\n\n这个条件语句嵌套在现有的`else`块中；它不是`elseif`语句。因此，在记录更新后，它会与数据库记录表格一起显示。\n\n11.\
  \ 保存`blog_update_mysqli.php`并通过加载`blog_list_mysqli.php`进行测试，选择一个`EDIT`链接，并对显示的记录进行更改。当你点击`Update\
  \ Entry`时，页面应被重定向回`blog_list_mysqli.php`，并且“Record updated”应出现在列表上方。你可以通过再次点击同一个`EDIT`链接来验证你的更改是否已生效。如有必要，请对照`blog_update_mysqli_03.php`和`blog_list_mysqli_03.php`检查代码。\n\
  \n## PHP 解决方案 15-5：使用 PDO 更新记录\n\n此 PHP 解决方案展示了如何将现有记录加载到更新表单中，然后使用 PDO 将编辑后的详细信息发送到数据库进行更新。要加载记录，你需要创建列出所有记录的管理页面，如\
  \ PHP 解决方案 15-3 所述。\n\n1.  从`ch15`文件夹复制`blog_update_pdo_01.php`，并将其保存到`admin`文件夹中，命名为`blog_update_pdo.php`。\n\
  \n2.  第一阶段涉及检索要更新的记录的详细信息。将以下代码放在`DOCTYPE`声明上方的 PHP 块中：\n\n```\nrequire_once '../includes/connection.php';\n\
  require_once '../includes/utility_funcs.php';\n// initialize flags\n$OK = false;\n\
  $done = false;\n// create database connection\n$conn = dbConnect('write', 'pdo');\n\
  // get details of selected record\nif (isset($_GET['article_id']) && !$_POST) {\n\
  // prepare SQL query\n$sql = 'SELECT article_id, title, article FROM blog\nWHERE\
  \ article_id = ?';\n$stmt = $conn->prepare($sql);\n// pass the placeholder value\
  \ to execute() as a single-element array\n$OK = $stmt->execute([$_GET['article_id']]);\n\
  // bind the results\n$stmt->bindColumn(1, $article_id);\n$stmt->bindColumn(2, $title);\n\
  $stmt->bindColumn(3, $article);\n$stmt->fetch();\n}\n// redirect if $_GET['article_id']\
  \ not defined\nif (!isset($_GET['article_id'])) {\n$url = 'http://localhost/phpsols-4e/admin/blog_list_pdo.php';\n\
  header(\"Location: $url\");\nexit;\n}\nif (isset($stmt)) {\n// get error message\
  \ (will be null if no error)\n$error = $stmt->errorInfo()[2];\n}\n```\n\n虽然这与插入页面使用的代码非常相似，但前几行*位于*第一个条件语句*之外*。更新过程的两个阶段都需要数据库连接，因此这避免了以后重复相同代码的需要。初始化了两个标志：`$OK`用于检查检索记录是否成功，`$done`用于检查更新是否成功。\n\
  \n第一个条件语句检查`$_GET ['article_id']`是否存在以及`$_POST`数组是否为空。这确保了仅当设置了查询字符串但表单尚未提交时，才执行其中的代码。\n\
  \n在准备插入表单的 SQL 查询时，你使用了命名占位符来表示变量。这次，让我们像这样使用问号：\n\n```\n$sql = 'SELECT article_id,\
  \ title, article FROM blog\nWHERE article_id = ?';\n```\n\n只有一个变量需要绑定到匿名占位符，因此将其作为单元素数组直接传递给`execute()`方法，如下所示：\n\
  \n```\n$OK = $stmt->execute([$_GET['article_id']]);\n```\n\n### 注意事项\n\n此代码使用了数组简写语法，因此`$_GET['article_id']`被包裹在一对方括号中。不要忘记数组的右方括号。\n\
  \n然后，结果通过`bindColumn()`方法绑定到`$article_id`、`$title`和`$article`。这次，我使用了数字（从 1 开始计数）来指示每个变量要绑定到哪一列。\n\
  \n结果中只有一条记录需要获取，因此立即调用`fetch()`方法。\n\n下一个条件语句在未定义`$_GET['article_id']`时将页面重定向到`blog_list_pdo.php`。这防止了任何人尝试在浏览器中直接加载更新页面。重定向位置已分配给一个变量，因为稍后如果更新成功，将向其中添加查询字符串。\n\
  \n最后一个条件语句从准备好的语句中检索任何错误消息。它独立于准备好的语句代码的其余部分，因为它也将用于稍后添加的第二个准备好的语句。\n\n\n\n3.  既然你已经检索到了记录的内容，就需要在更新表单中显示它们。如果预处理语句成功执行，`$article_id`\
  \ 应包含待更新记录的主键，因为你使用 `bindColumn()` 方法将其作为绑定到结果集的变量之一。\n\n然而，如果出现错误，你需要在屏幕上显示该消息。但如果有人将查询字符串修改为无效数字，`$article_id`\
  \ 将被设为 `0`，此时显示更新表单就没有意义了。请在开头的 `<form>` 标签之前立即添加以下条件语句：\n\n```\n    List all entries\
  \ \n    Error: $error\";\n    }\n    if($article_id == 0) { ?>\n    Invalid request:\
  \ record does not exist.\n\n```\n\n第一个条件语句用于显示 PDO 预处理语句报告的任何错误消息。第二个条件语句将更新表单包裹在\
  \ `else` 代码块中，这样如果 `$article_id` 为 `0`，表单将隐藏。\n\n4. 在结尾的 `</form>` 标签之后立即添加 `else`\
