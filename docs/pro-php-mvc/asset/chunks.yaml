    ## Introduction


    ### Who This Book Is For


    This book is for new and old developers alike. It’s designed in such a way that
    the basics are first explained and then advanced topics are covered. This means
    that more experienced developers might find certain sections (such as those explaining
    design patterns) to be old hat. If this is you, feel at liberty to skip ahead
    to the more challenging stuff.


    If you are new to object-oriented programming, framework building, or PHP in general,
    I would recommend reading everything and taking breaks between reading to recap
    what you have learned by coding something.


    ### What This Book Won’t Teach You


    This book won’t teach you PHP. It assumes you have basic knowledge of PHP and
    are at least comfortable with building PHP web sites. If you are new to PHP or
    have never even used it, may I suggest that you take a look at *Beginning PHP
    5 and MySQL* by W. Jason Gilmore (Apress, 2010) (www.apress.com/9781893115514),
    as it will give you an excellent understanding of PHP.


    This book will not teach you how to be a CodeIgniter, Zend Framework, or CakePHP
    expert. While these frameworks are discussed and used in the course of this book,
    the purpose of their use is to illustrate the differences between their approaches
    and the approach we take when building our own framework.


    Consequently, there are a variety of ways in which they could be used more efficiently
    or in a style recommended by their respective communities and documentation. The
    purpose of their use here is purely illustrative.


    ### What This Book Will Teach You


    If you are curious about learning how to better develop using object-oriented
    programming, or by building frameworks, or by designing clear and consistent APIs,
    then you will enjoy this book.


    If you are curious about what goes into the making of popular MVC frameworks (such
    as those demonstrated in the later chapters) or why they have chosen certain paths
    of development, then you will enjoy this book.


    If you want to become a better programmer, then it is my hope that you will find
    this book invaluable.


    ### Source Code


    Every line of code in this book is mirrored by the code contained within the archives
    (which can be downloaded from the companion site).


    While great effort has been made to ensure that the code is syntactically sound
    (and will therefore run directly in your code editor), there might be times when
    dependencies are omitted to aid in shortening some of the longer code listings.
    When this is the case, you can be assured that the code omitted is already that
    which has been explained and created in previous chapters or on previous pages
    within the same chapter.


    When in doubt, or if you are having problems executing source code, refer to the
    source code archives.


    ---


    ## Chapter 1: Introduction to MVC


    Software development is not a new idea. Ada Lovelace is said to have written the
    first computer program in the mid-nineteenth century for the Analytical Engine,
    the first mechanical computer prototyped by Charles Babbage.


    Much time has passed since then, and software development has grown into what
    is arguably one of the largest contributors to the development of our species.


    Designing good software is hard. It involves taking into consideration all aspects
    of the application you need to build, and is complicated further by the need to
    be specific enough to your current requirements to get the job done, while being
    generic enough to address future problems. Many experienced developers have had
    these problems and, over time, common patterns have emerged that assist in solving
    them.


    Christopher Alexander, a structural architect, first described patterns in such
    a way that they can be applied to software development. He said, “Each pattern
    describes a problem which occurs over and over again in our environment, and then
    describes the core of the solution to that problem, in such a way that you can
    use this solution a million times over, without ever doing it the same way twice.”
    He might have been talking about houses or cities, but his words capture the essence
    of what we intend to do when considering how we can build a solid, secure, and
    reusable framework for web applications.


    ### What Is MVC?


    MVC (Model-View-Controller) is a software design pattern built around the interconnection
    of three main component types, in a programming language such as PHP, often with
    a strong focus on object-oriented programming (OOP) software paradigms. The three
    component types are loosely termed models, views, and controllers. Let’s talk
    about them individually and then see how they fit together.


    The model is where all the business logic of an application is kept. Business
    logic can be anything specific to how an application stores data, or uses third-party
    services, in order to fulfill its business requirements. If the application should
    access information in a database, the code to do that would be kept in the model.
    If it needed, for example, to fetch stock data or tweet about a new product, that
    code would also be kept in the model.


    The view is where all of the user interface elements of our application are kept.
    This can include our HTML markup, CSS style sheets, and JavaScript files. Anything
    a user sees or interacts with can be kept in a view, and sometimes what the user
    sees is actually a combination of many different views in the same request.'
