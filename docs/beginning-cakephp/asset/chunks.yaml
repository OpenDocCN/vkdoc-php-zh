- fmt: '# 路由动态变更


    请求将被路由器动态地指向这里：


    `/articles/25`


    请记住，要使反向路由在整个应用程序中正常工作，您需要始终如一地使用详细链接。


    ## 管理路由


    许多应用程序需要某种管理区域，以便通过用户界面管理网站功能。创建完全不同的控制器来管理这些管理功能会违反 Cake 的约定。但在构建应用程序时，如何区分前端用户和站点管理员呢？路由器可以为您动态管理管理路由，这意味着您可以使某些操作仅对管理员可用，而
    URL 仍遵循 Cake 的标准结构。


    与其像这样构建自己的控制器来管理管理员操作：`posts_admin_controller.php`


    不如将以下所有链接指向 `Posts` 控制器：


    `http://localhost/blog/admin/posts`


    首先，您必须选择一个管理前缀，然后相应地命名您的操作和视图文件。


    ---


    ## 选择管理前缀


    管理前缀可以是您喜欢的任意一个单词。大多数人使用 `admin`（如之前的示例），但您也可以将其设为 `webmaster` 或 `superuser`。管理路由必须在核心配置中启用，并且前缀也必须在那里提供。打开
    `app/config/core.php` 文件，向下滚动到管理路由首选项：


    `Configure::write(''Routing.admin'', ''admin'');`


    在第 69 行附近，您会看到该首选项被注释掉了；取消注释以激活管理路由。请注意，默认情况下，前缀设置为 `admin`。您可以在此处输入任何符合标准 HTTP
    URL 语法的字符串作为前缀。路由器会将该前缀映射到相应的管理操作。


    ## 链接管理操作和视图


    一旦在核心配置中定义了前缀，您就可以开始创建管理员操作。这些操作可以出现在任何控制器中；它们只需要以包含前缀的方式命名。假设您希望将 `Posts` 控制器中的
    `Edit` 和 `Add` 操作改为通过管理路由访问。您需要将控制器中的操作分别重命名为 `admin_edit` 和 `admin_add`。


    前缀通过下划线附加到操作名称上。因此，如果前缀在核心配置中被定义为 `superuser`，那么这些 `Edit` 和 `Add` 操作需要将 `superuser`
    前缀添加到名称中：


    ```

    function superuser_edit($id=null) { …

    ```


    当某些操作被改为通过管理路由访问时，这些操作的视图也需要重命名。视图文件需要与对应的操作链接起来。因此，`admin_edit` 操作需要将其视图文件命名为
    `admin_edit.ctp`。


    这些管理操作在 URL 中不是通过下划线调用的。例如，执行 `Admin Edit` 操作不是通过键入：


    `http://localhost/blog/posts/admin_edit/16`


    而是通过在控制器名称前使用管理前缀：


    `http://localhost/blog/admin/posts/edit/16`


    若要限制这些管理路由，必须构建一个身份验证系统来检查用户与数据库的匹配情况并授予其权限。至少通过这种路由机制，您可以创建必要的路径来区分管理员和前端用户。


    ## 生成管理路由


    `Bake` 脚本自动化了构建管理路由的过程。在使用 `Bake` 创建控制器或视图并启用“交互式构建”功能时，您可以输入选项来构建带有管理路由的操作和视图。换句话说，只需在
    `Bake` 询问您是否需要管理路由时告知它管理前缀是什么，它不仅会构建典型的 CRUD 操作和视图，还会在操作名称和视图文件中添加管理前缀。'
  raw: 'will be dynamically changed by the router to point here:


    /articles/25


    Remember that for reverse routing to work across the whole application, you will
    need to use verbose linking consistently.


    **Admin Routing**


    Many applications require some kind of administrative area to manage web site
    functions with a user interface. Making entirely different controllers to manage
    these administrative features would contravene Cake’s conventions. But how do
    you distinguish between front-end users and site administrators in building the
    application? The router can dynamically manage admin routing for you, which means
    you can make some actions available only to an administrator while the URLs still
    follow the Cake standard structure.


    Rather than build your own controller to manage administrator actions, like so:
    posts_admin_controller.php


    you can point all links to the following to the Posts controller:


    [http://localhost/blog/admin/posts](http://localhost/blog/admin/posts)


    First you must choose an admin prefix and then name your actions and view files
    accordingly.


    09775ch10final 7/1/08 9:50 PM Page 179


    C H A P T E R 1 0 ■ R O U T E S


    **179**


    **Choosing an Admin Prefix**


    The admin prefix can be any one word you like. Most use admin (as in the previous
    example), but you could make it webmaster or superuser if you like. The admin
    routing must be turned on in the core configuration, and the prefix must also
    be provided there. Open the app/


    config/core.php file, and scroll down to the admin routing preference: Configure::write(''Routing.admin'',
    ''admin'');


    Around line 69, you should see the preference, commented out; uncomment it to
    activate admin routing. Notice that by default, the prefix is set to admin. You
    can enter any string here that meets standard HTTP URL syntax as a prefix. The
    router will map this prefix to the appropriate admin actions.


    **Linking Admin Actions and Views**


    Once the prefix is defined in the core configuration, you can begin to create
    administrator actions. These actions may appear in any controller; they only need
    to be named with the prefix included. Suppose you wanted to change the Edit and
    Add actions in your Posts controller to be accessible via an admin route. You
    would need to rename the actions in the controller to admin_edit and admin_add,
    respectively.


    The prefix is attached to the name of the action with an underscore. So, if the
    prefix were defined in the core configuration as superuser, then these Edit and
    Add actions would need to have the superuser prefix added to the name:


    function superuser_edit($id=null) { …


    When some actions are changed to be accessed through the admin route, these actions’
    views will need to be renamed as well. The view files need to be named to link
    with the corresponding actions. So, the admin_edit action will need its view file
    to be named admin_edit.ctp.


    These admin actions are not called in the URL with the underscore. For example,
    the Admin Edit action is not executed by typing this:


    [http://localhost/blog/posts/admin_edit/16](http://localhost/blog/posts/admin_edit/16)


    but by using the admin prefix before the controller name:


    [http://localhost/blog/admin/posts/edit/16](http://localhost/blog/admin/posts/edit/16)


    To restrict these admin routes, an authentication system must be built to check
    users against the database and grant them privileges. At least with this routing
    mechanism you can create the necessary paths to differentiate between administrators
    and front-end users.


    **Baking Admin Routes**


    The Bake script automates the process of building admin routes. When creating
    controllers or views with Bake and using the “build interactively” feature, you
    can enter options to build the actions and views with admin routing. In other
    words, simply tell Bake when it asks if you want admin routing what the admin
    prefix is, and it will not only build the typical CRUD


    actions and views but will do so with the admin prefix added to action names and
    view files.


