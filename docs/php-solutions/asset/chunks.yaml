    \ `true`。因此，如果两者都保持 `false`，你就知道其中一个 SQL 查询出现了问题。\n\n现在你已经检索到记录的内容，需要在更新表单中显示它们。如果预处理语句执行成功，`$article_id`\
    \ 应包含要更新记录的主键，因为它是你使用 `bindColumn()` 方法绑定到结果集的变量之一。\n"
- fmt: "However, if there’s an error you need to display that message onscreen. But\
    \ if someone alters the query string to an invalid number, `$article_id` will\
    \ be set to `0`, so there is no point in displaying the update form. Add the following\
    \ conditional statements immediately before the opening `<form>` tag:\n\n```\n\
    <p><a href=\"blog_list_pdo.php\">List all entries </a></p>\n\n<?php if (isset($error))\
    \ {\necho \"<p class='warning'>Error: $error</p>\";\n}\nif($article_id == 0) {\
    \ ?>\n<p class=\"warning\">Invalid request: record does not exist.</p>\n<?php\
    \ } else { ?>\n<form name=\"form1\" method=\"post\" action=\"\">\n```\n\nThe first\
    \ conditional statement displays any error message reported by the PDO prepared\
    \ statement. The second wraps the update form in an `else` block, so the form\
    \ will be hidden if `$article_id` is `0`.\n\nAdd the closing curly brace of the\
    \ `else` block immediately after the closing `</form>` tag, like this:\n\n```\n\
    </form>\n<?php } ?>\n</body>\n```\n\nIf `$article_id` is not `0`, you know that\
    \ `$title` and `$article` also exist and can be displayed in the update form without\
    \ further testing. However, you need to pass text values to `htmlentities()` to\
    \ avoid problems with displaying quotes. Display `$title` in the `value` attribute\
    \ of the `title` input field like this:\n\n```\n<input name=\"title\" type=\"\
    text\" id=\"title\" value=\"<?= htmlentities($title); ?>\" >\n```\n\nDo the same\
    \ for the `article` text area. Because text areas don’t have a `value` attribute,\
    \ the code goes between the opening and closing `<textarea>` tags like this:\n\
    \n```\n<textarea name=\"article\" id=\"article\"><?= htmlentities($article);?></textarea>\n\
    ```\n\nMake sure there is no space between the opening and closing PHP and `<textarea>`\
    \ tags. Otherwise, you will get unwanted spaces in your updated record.\n\nThe\
    \ `UPDATE` command needs to know the primary key of the record you want to change.\
    \ You need to store the primary key in a hidden field so that it is submitted\
    \ in the `$_POST` array with the other details. Because hidden fields are not\
    \ displayed onscreen, the following code can go anywhere inside the form:\n\n\
    ```\n<input name=\"article_id\" type=\"hidden\" value=\"<?= $article_id; ?>\"\
    >\n```\n\nSave the update page and test it by loading `blog_list_pdo.php` into\
    \ a browser and selecting the `EDIT` link for one of the records. The contents\
    \ of the record should be displayed in the form fields, as shown in Figure [13-3](#A978-1-4842-0635-5_13_Chapter.html#Fig3).\n\
    \nThe `Update Entry` button doesn’t do anything yet. Just make sure that everything\
    \ is displayed correctly, and confirm that the primary key is registered in the\
    \ hidden field. You can check your code, if necessary, against `blog_update_pdo_02.php`.\n\
    \nThe `name` attribute of the submit button is `update`, so all the update processing\
    \ code needs to go in a conditional statement that checks for the presence of\
    \ `update` in the `$_POST` array. Place the following code, highlighted in bold,\
    \ immediately above the code in step 1 that redirects the page:\n\n```\n$stmt->fetch();\n\
    }\n// if form has been submitted, update record\nif (isset($_POST['update']))\
    \ {\n// prepare update query\n$sql = 'UPDATE blog SET title = ?, article = ?\n\
    WHERE article_id = ?';\n$stmt = $conn->prepare($sql);\n// execute query by passing\
    \ array of variables\n$done = $stmt->execute([$_POST['title'], $_POST['article'],\n\
    $_POST['article_id']]);\n}\n// redirect page on success or $_GET['article_id']\
    \ not defined\nif ($done || !isset($_GET['article_id'])) {\n```\n\nAgain, the\
    \ SQL query is prepared using question marks as placeholders for values to be\
    \ derived from variables. This time, there are three placeholders, so the corresponding\
    \ variables need to be passed as an array to the `execute()` method. Needless\
    \ to say, the array must be in the same order as the placeholders.\n\nIf the `UPDATE`\
    \ query succeeds, the `execute()` method returns `true`, resetting the value of\
    \ `$done`. You can’t use the `rowCount()` method here to get the number of affected\
    \ rows because it returns `0` if the `Update Entry` button is clicked without\
    \ making any changes. You’ll notice we have added `$done ||` to the condition\
    \ in the redirect script. This ensures the page is redirected if either the update\
    \ succeeds or someone tries to access the page directly.\n\nSave `blog_update_pdo.php`\
    \ and test it by loading `blog_list_pdo.php`, selecting one of the `EDIT` links,\
    \ and making changes to the record that is displayed. When you click `Update Entry`\
    \ you should be taken back to `blog_list_pdo.php`. You can verify that your changes\
    \ were made by clicking the same `EDIT` link again. Check your code, if necessary,\
    \ against `blog_update_pdo_03.php`.\n\n### Deleting Records\n\nDeleting a record\
    \ in a database is similar to updating one. The basic `DELETE` command looks like\
    \ this:\n\n`DELETE FROM table_name WHERE condition`\n\nWhat makes the `DELETE`\
    \ command potentially dangerous is that it is final. Once you have deleted a record,\
    \ there’s no going back—it’s gone forever. There’s no Recycle Bin or Trash to\
    \ fish it out from. Even worse, the `WHERE` clause is optional. If you omit it,\
    \ every single record in the table is irrevocably sent into cyber-oblivion. Consequently,\
    \ it’s a good idea to display details of the record to be deleted and ask the\
    \ user to confirm or cancel the process (see Figure [13-4](#A978-1-4842-0635-5_13_Chapter.html#Fig4)).\n\
    \n![A978-1-4842-0635-5_13_Fig4_HTML.jpg](A978-1-4842-0635-5_13_Fig4_HTML.jpg)\n\
    \nFigure 13-4. Deleting a record is irreversible, so get confirmation before going\
    \ ahead\n\nBuilding and scripting the delete page is almost identical to the update\
    \ page, so I won’t give step-by-step instructions. However, here are the main\
    \ points:\n\n-   Retrieve the details of the selected record.\n-   Display sufficient\
    \ details, such as the title, for the user to confirm that the correct record\
    \ has been selected.\n-   Give the `Confirm Deletion` and `Cancel` buttons different\
    \ `name` attributes, and use each `name` attribute with `isset()` to control the\
    \ action taken.\n-   Instead of wrapping the entire form in the `else` block,\
    \ use conditional statements to hide the `Confirm Deletion` button and the hidden\
    \ field.\n\nThe code that performs the deletion for each method follows.\n\nFor\
    \ MySQLi:\n\n```\nif (isset($_POST['delete'])) {\n    $sql = 'DELETE FROM blog\
    \ WHERE article_id = ?';\n    if ($stmt->prepare($sql)) {\n        $stmt->bind_param('i',\
    \ $_POST['article_id']);\n        $stmt->execute();\n        if ($stmt->affected_rows\
    \ > 0) {\n            $deleted = true;\n        } else {\n            $error =\
    \ 'There was a problem deleting the record.';\n        }\n    }\n}\n```\n\nFor\
    \ PDO:\n\n```\nif (isset($_POST['delete'])) {\n    $sql = 'DELETE FROM blog WHERE\
    \ article_id = ?';\n    $stmt = $conn->prepare($sql);\n    $stmt->execute([$_POST['article_id']]);\n\
    \    // get number of affected rows\n    $deleted = $stmt->rowCount();\n    if\
    \ (!$deleted) {\n        $error = 'There was a problem deleting the record.';\n\
    \    }\n}\n```\n\nYou can find the finished code in `blog_delete_mysqli.php` and\
    \ `blog_delete_pdo.php` in the `ch13` folder. To test the delete script, copy\
    \ the appropriate file to the `admin` folder.\n\n## Reviewing the Four Essential\
    \ SQL Commands\n\nNow that you have seen `SELECT`, `INSERT`, `UPDATE`, and `DELETE`\
    \ in action, let’s review the basic syntax for MySQL and MariaDB. This is not\
    \ an exhaustive listing, but it concentrates on the most important options, including\
    \ some that have not yet been covered.\n\nI have used the same typographic conventions\
    \ as the MySQL online manual at [`http://dev.mysql.com/doc/refman/5.6/en`](http://dev.mysql.com/doc/refman/5.6/en)\
    \ (which you may also want to consult).\n\n-   Anything in uppercase is an SQL\
    \ command.\n-   Expressions in square brackets are optional.\n-   Lowercase italics\
    \ represent variable input.\n-   A vertical pipe (`|`) separates alternatives.\n\
    \nAlthough some expressions are optional, they must appear in the order listed.\
    \ For example, in a `SELECT` query, `WHERE`, `ORDER BY`, and `LIMIT` are all optional,\
    \ but `LIMIT` can never come before `WHERE` or `ORDER BY`."
