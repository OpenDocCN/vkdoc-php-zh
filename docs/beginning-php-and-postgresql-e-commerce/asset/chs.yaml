  \n如你所知，我们的产品目录每页会显示固定数量的产品。当某个目录页包含的产品数量超过设定值时，我们会显示导航控件，让浏览者可以在产品的子页面间前后翻页。你可以在第\
  \ 3 章的图 3-2 中看到这些导航控件，或者在本章后面的图 4-11 中看到。\n\n在显示导航控件时，你需要计算指定目录页的产品子页面数量；为此，我们创建了\
  \ `HowManyPages` 辅助方法。\n\n该方法接收一个用于统计目录页产品总数的 SELECT 查询（`$countSql`）作为参数，并返回子页面数量。实现方式很简单：将产品总数除以每个子页面显示的产品数量；后者的数值可通过\
  \ `include/config.php` 中的 `PRODUCTS_PER_PAGE` 常量进行配置。\n\n为提升浏览者在子页面间前后翻页时的性能，我们在首次计算出子页面数量后，将其保存到浏览者的会话中。这样，在单次访问同一目录页时，作为参数传入的\
  \ SQL 查询就无需重复执行。\n\n该方法会被其他数据层方法（`GetProductsInCategory`、`GetProductsOnDepartment`、`GetProductsOnCatalog`）调用，我们接下来会介绍这些方法。\n\
  \n将 `HowManyPages` 添加到 `Catalog` 类中。\n\n```php\n/* 计算通过 $countSql 查询返回的产品数量能够填充多少页\
  \ */\nprivate static function HowManyPages($countSql, $countSqlParams)\n{\n    //\
  \ 为 SQL 查询创建哈希值\n    $queryHashCode = md5($countSql . var_export($countSqlParams,\
  \ true));\n\n    // 验证缓存中是否已有查询结果\n    if (isset ($_SESSION['last_count_hash'])\
  \ &&\n        isset ($_SESSION['how_many_pages']) &&\n        $_SESSION['last_count_hash']\
  \ === $queryHashCode)\n    {\n        // 检索缓存的值\n        $how_many_pages = $_SESSION['how_many_pages'];\n\
  \    }\n    else\n    {\n        // 执行查询\n        $prepared = DatabaseHandler::Prepare($countSql);\n\
  \        $items_count = DatabaseHandler::GetOne($prepared, $countSqlParams);\n\n\
  \        // 计算页数\n        $how_many_pages = ceil($items_count / PRODUCTS_PER_PAGE);\n\
  \n        // 将查询及其计数结果保存到会话中\n        $_SESSION['last_count_hash'] = $queryHashCode;\n\
  \        $_SESSION['how_many_pages'] = $how_many_pages;\n    }\n\n    // 返回页数\n\
  \    return $how_many_pages;\n}\n```\n\n我们来分析一下这个函数如何执行其任务。\n\n该方法是私有的，因为你不会从其他类中访问它——它是\
  \ `Catalog` 中其他方法的辅助方法。\n\n该方法会验证前一次调用是否针对相同的 SELECT 查询。如果是，则返回前一次调用缓存的结果。这个小技巧可以提升浏览者在同一产品列表的子页面间浏览时的性能，因为数据库中的实际计数只执行一次。\n\
  \n```php\n// 为 SQL 查询创建哈希值\n$queryHashCode = md5($countSql . var_export($countSqlParams,\
  \ true));\n\n// 验证缓存中是否已有查询结果\nif (isset ($_SESSION['last_count_hash']) &&\n   \
  \ isset ($_SESSION['how_many_pages']) &&\n    $_SESSION['last_count_hash'] === $queryHashCode)\n\
  {\n    // 检索缓存的值\n    $how_many_pages = $_SESSION['how_many_pages'];\n}\n```\n\n\
  与所接收查询和参数关联的页数，会保存在当前浏览者会话中名为 `how_many_pages` 的变量里。如果不满足条件，即查询结果未被缓存，我们会计算页数并将其保存到会话中：\n\
  \n```php\nelse\n{\n    // 执行查询\n    $prepared = DatabaseHandler::Prepare($countSql);\n\
  \    $items_count = DatabaseHandler::GetOne($prepared, $countSqlParams);\n\n   \
  \ // 计算页数\n    $how_many_pages = ceil($items_count / PRODUCTS_PER_PAGE);\n\n   \
  \ // 将查询及其计数结果保存到会话中\n    $_SESSION['last_count_hash'] = $queryHashCode;\n    $_SESSION['how_many_pages']\
  \ = $how_many_pages;\n}\n```\n\n最后，无论页数是从会话中获取还是由数据库计算得出，都会返回给调用函数：\n\n```php\n\
  // 返回页数\nreturn $how_many_pages;\n```\n\n## GetProductsInCategory\n\n`GetProductsInCategory`\
  \ 返回属于特定分类的产品列表。将以下方法添加到 `business/catalog.php` 中的 `Catalog` 类中：\n\n```php\n// 检索属于某个分类的产品列表\n\
  public static function GetProductsInCategory(\n    $categoryId, $pageNo, &$rHowManyPages)\n\
  {\n    // 返回分类中产品数量的查询\n    $sql = 'SELECT catalog_count_products_in_category(:category_id);';\n\
  \    $params = array (':category_id' => $categoryId);\n\n    // 计算显示产品所需的页数\n  \
  \  $rHowManyPages = Catalog::HowManyPages($sql, $params);\n\n    // 计算起始项\n    $start_item\
  \ = ($pageNo - 1) * PRODUCTS_PER_PAGE;\n\n    // 检索产品列表\n    $sql = 'SELECT *\n\
  \            FROM catalog_get_products_in_category(\n                :category_id,\
  \ :short_product_description_length,\n                :products_per_page, :start_item);';\n\
  \    $params = array (\n        ':category_id' => $categoryId,\n        ':short_product_description_length'\
  \ => SHORT_PRODUCT_DESCRIPTION_LENGTH,\n        ':products_per_page' => PRODUCTS_PER_PAGE,\n\
  \        ':start_item' => $start_item);\n\n    $result = DatabaseHandler::Prepare($sql);\n\
  \n    // 执行查询并返回结果\n    return DatabaseHandler::GetAll($result, $params);\n}\n```\n\
  \n该函数有两个用途：\n\n- 计算产品的子页面数量，并通过 `&$rHowManyPages` 参数返回该数值。为此，会使用你之前添加的 `HowManyPages`\
  \ 方法。用于获取产品总数的 SQL 查询，会调用你之前添加到数据库的 `catalog_count_products_in_category` 数据库函数。\n\
  - 返回指定分类中的产品列表。\n\n\n\n■**注意** 函数参数前的与符号（`&`）表示该参数通过引用传递。当变量通过引用传递时，传递的是变量的别名，而不是创建该值的新副本。这样，当变量通过引用传递且被调用函数更改其值时，其新值也会反映在调用函数中。通过引用传递是接收被调用函数返回值的另一种方法，当需要从被调用函数获取多个返回值时尤其有用。`CreateSubpageQuery`\
  \ 通过其返回值返回 `SELECT` 查询的文本，并通过通过引用传递的 `$rHowManyPages` 参数返回子页面总数。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
