    Handling the Geocoder Response with createPoint()


    We now handle the response from the geocoder’s getLocations() function. This returns
    JSON


    data containing details about the geocoder request, such as the request status
    and all the matching locations.


    ■**Note** The data returned from this function is structured similarly to if you
    use the geocoder web service mentioned earlier this chapter. You can find an example
    of the data returned at [http://www.google.com/](http://www.google.com)


    apis/maps/documentation/services.html#Geocoding_Direct.


    The first thing we do now is to check the status of the request. The data is held
    in a variable called locations (the name of the function’s only argument), so
    the status value can be found in locations.Status.code. Listing 13-39 shows the
    different status codes. If at least one location is successfully found, the status
    value will equal G_GEO_SUCCESS.


    Just to demonstrate how to handle these errors, I’ve included a switch statement
    that handles and describes each of the different errors that can occur. The error
    message is then written to the status box at the top of the column on the right.


    Listing 13-39 shows the code we use to handle the different status codes that
    are returned.


    Note that if the request isn’t successful, we simply return from the function
    after writing the status message, since the code following this is only for requests
    that have at least one returned location.


    **Listing 13-39.** *Handling the Different Status Codes That Can Be Returned*
