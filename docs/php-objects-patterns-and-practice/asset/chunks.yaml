  trans: '

    # 解析配置文件


    得益于 SimpleXML 扩展，我们无需执行任何实际的解析工作——这已由该扩展代为处理。剩下要做的只是遍历 SimpleXML 数据结构，构建我们自己的数据。以下是名为
    `ViewComponentCompiler` 的类，它正是执行此操作的：


    ```php

    // 代码清单 12.21

    class ViewComponentCompiler

    {

    private static $defaultcmd = DefaultCommand::class;

    public function parseFile($file)

    {

    $options = \simplexml:load_file($file);

    return $this->parse($options);

    }

    public function parse(\SimpleXMLElement $options): Conf

    {

    $conf = new Conf();

    foreach ($options->control->command as $command) {

    $path = (string)$command[''path''];

    $cmdstr = (string)$command[''class''];

    $path = (empty($path)) ? "/" : $path;

    $cmdstr = (empty($cmdstr)) ? self::$defaultcmd : $cmdstr;

    $pathobj = new ComponentDescriptor($path, $cmdstr);

    $this->processView($pathobj, 0, $command);

    if (isset($command->status) && isset($command->status[''value''])) {

    foreach ($command->status as $statusel) {

    $status = (string)$statusel[''value''];

    $statusval = constant(Command::class . "::" . $status);

    if (is_null($statusval)) {

    throw new AppException("未知状态: {$status}");

    }

    $this->processView($pathobj, $statusval, $statusel);

    }

    }

    $conf->set($path, $pathobj);

    }

    return $conf;

    }

    public function processView(ComponentDescriptor $pathobj, int $statusval, \SimpleXMLElement
    $el)

    {

    if (isset($el->view) && isset($el->view[''name''])) {

    $pathobj->setView($statusval, new TemplateViewComponent((string)$el->view[''name'']));

    }

    if (isset($el->forward) && isset($el->forward[''path''])) {

    $pathobj->setView($statusval, new ForwardViewComponent((string)$el->forward[''path'']));

    }

    }

    }

    ```


    这里的实际操作发生在 `parse()` 方法中，该方法接收一个用于遍历的 `SimpleXMLElement` 对象。首先，我实例化一个 `Conf` 对象（请记住，这只是一个对数组的包装）。然后，我遍历
    XML 中的命令元素。对于每个命令，我提取 `path` 和 `class` 属性的值，并将这些数据传递给 `ComponentDescriptor` 对象的构造函数。该对象将管理与一个
    `command` 元素相关的信息包——你很快会看到这个类。


    接着，我调用一个名为 `processView()` 的私有方法，向它传递 `ComponentDescriptor` 对象、一个值为零的整数（因为我们在处理默认状态），以及对当前
    XML 元素（即当前为 `command`）的引用。根据在 XML 片段中找到的内容，`processView()` 会创建一个 `TemplateViewComponent`
    或 `ForwardViewComponent`，并将其传递给 `ComponentDescriptor::setView()`。当然，它也可能不匹配任何内容而根本不进行调用——但这可能是不明智的。或许在一个更完整的实现中，我们会将其视为一个错误条件。


    回到 `parse()` 方法中，我开始处理 `status` 属性。我再次调用 `processView()`——但这次传入的整数对应于 `status`
    元素的 `value` 属性中的字符串。换句话说，字符串 `CMD_OK` 变为 1，`CMD_ERROR` 变为 2，以此类推。PHP 的 `constant()`
    方法提供了一种简洁的方式来进行这种转换。因此，这次我向 `processView()` 传递一个非零整数，以及 `status` XML 元素。


    `processView()` 再次用找到的任何 `ViewComponent` 对象填充 `ComponentDescriptor`。


    最后，我将 `ComponentDescriptor` 对象存储在 `Conf` 对象中，以命令组件的 `path` 值作为索引。


    循环完成后，我返回 `Conf` 对象。


    你可能需要再读一遍才能跟上这个流程；但本质上，这个过程非常简单：`ViewComponentCompiler` 构建一个由 `ComponentDescriptor`
    对象组成的数组（如前所述，包装在 `Conf` 对象中）。每个 `ComponentDescriptor` 对象维护关于一个路径和一个 `Command`
    类的信息，以及一个按状态值索引的 `ViewComponent` 对象数组（0 表示默认视图）。


    尽管有这些繁琐的工作，但重要的是要记住，高层过程相当简单。我们正在构建潜在请求与命令及视图之间的关系。图 12-6 展示了这个初始化过程。


    ![A314621_5_En_12_Fig6_HTML.gif](img/A314621_5_En_12_Fig6_HTML.gif)


    **图 12-6.** 编译命令和视图

