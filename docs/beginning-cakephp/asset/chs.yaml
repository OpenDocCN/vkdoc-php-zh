  \ => Test Event 2\n            [date] => 2009-01-01 01:00:00\n            [details]\
  \ => Happy New Year\n    )\n);\n```\n\n简而言之，`Set::extract()` 通过重新格式化数组来清理数组。在 Calendar\
  \ 插件中，这种调用 `Set::extract()` 的方法使得遍历 `$events` 数组更加容易。最重要的是，请注意 `Set::extract()`\
  \ 在你的 Cake 应用或插件中是可用的，并且可以帮助清理嵌套数组。或者，在许多情况下，你将需要编写自己的循环来筛选嵌套数组。\n\n第 2 行还使用了一些\
