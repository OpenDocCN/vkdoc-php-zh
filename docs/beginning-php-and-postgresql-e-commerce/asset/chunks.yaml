- fmt: '**Serving customers**: Will customers require additional help with products
    that they buy from you? Do you need to offer warranties, service contracts, or
    other support services?


    **Bringing customers back**: How will you entice customers back to the site? Are
    they likely to only visit the site to make a purchase, or will there be e-window
    shoppers?


    Are your products consumables, and can you predict when your customers will need
    something new?


    After you’ve answered these questions, you can start designing your site, knowing
    that you’re designing for your customers—not just doing what seems like a good
    idea at the time.


    Determining the answers to these questions will also help ensure that your design
    covers all the important areas, without massive omissions that will be a nightmare
    to fix later.


    The example site presented in this book has taken a deliberate generic approach
    to show you the most common e-commerce techniques. To really lift yourself above
    the competition, however, you don’t need fancy features or Flash movies—you just
    need to understand, attract, and serve your customers better than anybody else.
    Think about this before you launch into designing and building the site itself.


    **Risks and Threats**


    All this might make it sound as if your e-commerce business can’t possibly fail.
    Well, it’s time to take a cold shower and realize that even the best-laid plans
    often go wrong. Some risks are particularly relevant to e-commerce companies,
    such as


    - Hacking

    - Credit card scams

    - Hardware failures

    - Unreliable shipping services

    - Software errors

    - Changing laws


    You can’t get rid of these risks, but you can try to understand them and defend
    yourself from them. The software developed in this book goes some way to meeting
    these issues, but many of the risks have little to do with the site itself.


    An important way to defend your site from many risks is to maintain backups. You
    already know backups are important. But if you’re anything like me, when it gets
    to the end of the day, saving five minutes and going home earlier seems even more
    important. When you have a live web site, this simply isn’t an option.


    We haven’t talked much about the legal side of e-commerce in this book because
    we are programmers, not lawyers. However if you are setting up an e-commerce site
    that goes much beyond an online garage sale, you’ll need to look into these issues
    before putting your business online.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH01.qxd 10/4/06 6:16 PM Page 7


    C H AP T E R 1 ■ S TA RT IN G AN E - CO MM E R CE SI T E


    **7**


    While we’re on the subject of risks and threats, one issue that can really damage
    your e-commerce site is unreliable order fulfillment. This is a programming book,
    which focuses on offering products to customers and communicating their orders
    to the site’s owner. An essential part of the processes is delivering the products,
    and to do this, you need a good logistics network set up before launching your
    shop. If your store doesn’t deliver the goods, customers won’t come back or refer
    their friends.


    **Tip** Webmonkey provides an excellent general e-commerce tutorial, which covers
    taxation, shipping, and many of the issues you’ll face when designing your site,
    at `http://www.webmonkey.com/webmonkey/e-business/building/tutorials/tutorial3.html`.
    Check this out before you start designing your site.


    **Designing for Business**


    Building an e-commerce site requires a significant investment. If you design the
    site in phases, you can reduce the initial investment and therefore cut your losses
    if the idea proves unsuccessful. You can use the results from an early phase to
    assess whether it’s worthwhile to add extra features, and even use revenue from
    the site to fund future development. If nothing else, planning to build the site
    in phases means that you can get your site online and receiving orders much earlier
    than if you build every possible feature into the first release.


    Even after you’ve completed your initial planned phases, things might not end
    there. Whenever planning a large software project, it’s important to design in
    a way that makes unplanned future growth easy. In Chapter 2, where we’ll start
    dealing with the technical details of building e-commerce sites, you’ll learn
    how to design the web site architecture to allow for long-term development flexibility.


    If you’re building sites for clients, they will like to think their options are
    open. Planning the site, or any other software, in phases will help your clients
    feel comfortable doing business with you. They will be able to see that you are
    getting the job done and can decide to end the project at the end of any phase
    if they feel—for whatever reason—that they don’t want to continue to invest in
    development.


    **Phase I: Getting a Site Up**


    Chapters 2 through 7 concentrate on establishing the basic framework for the site
    and putting a product catalog online. We’ll start by putting together the basic
    site architecture and deciding how the different parts of the application will
    work together. We’ll then build the product catalog into this architecture. You’ll
    learn how to


    - Design a database for storing the product catalog, containing departments, categories,
    and products

    - Write the `SQL` (Structured Query Language) and `PHP` (Hypertext Preprocessor)
    code for accessing that data and making the product catalog functional

    - Provide a product search engine


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH01.qxd 10/4/06 6:16 PM Page 8


    **8**


    CH A P TE R 1 ■ S TA RTI NG A N E - CO MME R CE SI TE


    - Receive payments through PayPal Website Payments Standard

    - Give the site’s administrators a private section of the site where they can
    administer the catalog online


    After you’ve built this catalog, you’ll see how to offer the products for sale
    by integrating it with PayPal’s shopping cart and order-processing system, which
    will handle credit card transactions for you and email you with details of orders.
    These orders will be processed manually, but in the early stages of an e-commerce
    site, the time you lose processing orders will be less than the time it would
    have taken to develop an automated system.


    **Phase II: Creating Your Own Shopping Cart**


    Using PayPal’s shopping cart is okay and really easy, but it does mean you miss
    out on a lot of advantages. For example, you can''t control the look and feel
    of PayPal’s shopping cart, whereas if you use your own, you can make it an integral
    part of the site. This is a significant advantage, but it’s superficial compared
    to some of the others. For example, with your own shopping cart, you can store
    complete orders in the database as part of the order process and then use that
    data to learn about the customers. With additional work, you also can use the
    shopping basket and checkout as a platform for selling more products. How often
    have you been tempted by impulse purchases near the checkout of your local store?
    Well, impulse shopping also works with e-commerce. Having your own shopping cart
    and checkout gives you the option of offering low-cost special offers from the
    shopping cart at checkout. You can even analyze the contents of the cart and make
    suggestions based on this.


    Chapters 8 through 10 show you how to


    - Build your own shopping cart

    - Pass a complete order through to PayPal for credit card processing

    - Create an orders administration page

    - Implement a product recommendations system


    Once again, at the end of Phase II, our site will be fully operational. If you
    want, you can leave it as it is or add features within the existing PayPal-based
    payment system. But when the site gets serious, you’ll want to start processing
    orders and credit cards yourself. This is the part where things get complicated,
    and you need to be serious and careful about your site’s security.


    **Phase III: Processing Orders and Adding Features**'
