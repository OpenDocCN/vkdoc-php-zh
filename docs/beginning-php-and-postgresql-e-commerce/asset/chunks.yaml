    \n648XCH05.qxd 10/31/06 10:04 PM 第 169 页\n\n# 第 5 章\n\n# 搜索产品目录\n\n**“你**在找什么？”\
    \ 无论在实体店还是电商商店中，这个问题都最常被问到。与其他优质的网络商店一样，你的 HatShop 也将允许访客搜索产品目录。\n\n你将看到，通过将新组件集成到现有架构中，为运行中的网站添加新功能是多么简单。\n\
    \n在本章中，你将：\n\n- 分析搜索产品目录的各种方式。\n- 实现一个与 PostgreSQL 配合使用的自定义搜索引擎。\n- 编写搜索功能的数据层和业务层。\n\
    - 使用 Smarty 组件化模板构建产品目录搜索功能的用户界面。\n\n**选择如何搜索产品目录**\n\n与往常一样，在开始编码之前，你需要思考几件事。在设计新功能时，你应该始终从最终用户的角度来分析该功能。\n\
    \n在视觉部分，你将使用一个文本框，访客可以在其中输入一个或多个词语进行搜索。在 HatShop 中，访客输入的词语将在产品描述和名称中\n"
