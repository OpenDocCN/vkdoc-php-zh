    \ Adobe Photoshop）来生成缩略图，因为这样可以更好地控制质量。但是，如果你希望允许注册用户上传图片，同时确保它们不超过最大尺寸，那么使用 PHP\
    \ 自动生成缩略图就非常有用了。你可以只保存调整大小后的副本，也可以同时保存原图和副本。\n\n在上一章中，你构建了一个处理文件上传的 PHP 类。本章将创建两个类：一个用于生成缩略图，另一个用于将上传和调整图片大小合并为一步操作。第二个类并非从零开始构建，而是基于第\
    \ 9 章的 `Upload` 类。使用类的一大优势在于它们是**可扩展的**——基于另一个类的类可以继承其父类的功能。构建用于上传图片和生成缩略图的类需要大量代码。但是，一旦定义了这些类，使用它们只需要几行脚本。如果你赶时间，或者编写大量代码让你冷汗直冒，可以直接使用现成的类。稍后再回来学习代码的工作原理。它使用了大量在其它场景下也很有用的基础\
