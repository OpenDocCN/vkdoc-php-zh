  \ `Name` 和 `E-mail` 字段为必填项，因此不能为空。当你在一个或两个字段为空的情况下尝试提交表单时，将会收到如图 9-3 所示的错误消息。\n\n\
  ![](img/514068_1_En_9_Fig3_HTML.jpg)\n\n**图 9-3** 提交时带有空字段的 PHP 表单网页\n\n让我们更新该 PHP\
  \ 示例，使其能够验证 `Name` 字段输入的值（必须仅包含字母和空白字符），并验证 `E-mail` 值的格式必须包含 `@` 和 `.` 字符。以下是更新后的代码：\n\
  \n`Chapter9/form-action.php`\n\n```\n.error {color: #FF0000;}\n\nPHP Form Validation\n\
  * required field\n\nName: \n*\n\nE-mail: \n*\n\n```\n\n重新运行你的 PHP 文件。现在，如果在 `Name`\
  \ 字段中输入一些特殊字符，或者输入没有 `@` 或 `.` 字符的 `E-mail` 值，将会出现字符不被允许或邮箱格式无效的错误消息。见图 9-4。\n\n\
  ![](img/514068_1_En_9_Fig4_HTML.png)\n\n**图 9-4** 提交时带有无效值的 PHP 表单网页\n\n当你分析代码时，会发现为了验证\
  \ `Name` 值，你使用了 PHP 正则表达式函数 `preg_match()`（稍后本章将详细介绍），如果在该字符串中找到该模式，则返回 `1`，否则返回\
  \ `0`。因此，在你的 PHP 代码中，你将函数定义为 `preg_match(\"/^[a-zA-Z-' ]*$/\",$name)`，从而强制输入的值仅包含字母和空白字符。否则，代码将产生一条错误消息：“Error:\
  \ Only letters and whitespace allowed!”。为了验证 `E-mail` 值，你使用了名为 `filter_var()` 的\
  \ PHP 函数，该函数使用指定的过滤器过滤变量，并利用了 PHP 预定义的过滤器常量 `FILTER_VALIDATE_EMAIL`，该常量会将值验证为有效的邮箱地址格式。如果你没有输入\
  \ `@` 或 `.`，代码将产生错误：“Error: Invalid email format!”。现在让我们学习如何使用 PHP 正则表达式。\n\n##\
  \ PHP 正则表达式\n\n正如我们在本章引言中所说，正则表达式只是一个构成搜索模式的字符序列。正则表达式通常被称为**正则**，默认情况下是区分大小写的。\n\
  \n总的来说，一个正则表达式可以是一个单一的字符，也可以是由多个字符组成的更复杂的模式。例如，它们主要在你需要执行文本搜索、执行文本替换操作或将字符串拆分为多个块时使用。正则表达式使用算术运算符（`+`,\
  \ `-`, `^`）来创建复杂的表达式。\n\n考虑在以下情况下使用正则表达式：\n\n- 你需要在代码中验证某个特定的文本字符串。\n- 你需要分析并在某个字符串中搜索模式，或者修改一个文本字符串。\n\
  - 你需要搜索特殊的关键词。\n- 你需要协助进行用户输入验证测试、验证浏览器检测、垃圾邮件过滤、密码强度检查等。\n\nPHP 正则表达式的语法如下所示：\n\
  \n```\n$pattern = \"/mas[si]mo/i\";\n$text = \"My name is Massimo.\";\n```\n\n其中：\n\
  \n- `/` 是定界符。\n- `mas[si]mo` 是你正在搜索的模式。\n- `i` 是一个可以在正则表达式中使用的特殊字符的示例（在这种情况下，它强制进行不区分大小写的搜索）。\n\
  - `[si]`：这个方括号定义了在特定模式中可能或不可能搜索哪个字符（在这种情况下，意味着匹配一个字符 `s` 或 `i`）。\n- `@Text` 是你将搜索模式的给定字符串。\n\
  \n在正则表达式中，定界符可以是任何字符，但不能是字母、数字、反斜杠或空格。\n\n### 正则表达式修饰符\n\n正则表达式使用名为修饰符的特殊字符来定义搜索的执行方式。它们包括：\n\
  \n- `i`：当你需要进行不区分大小写的模式搜索时使用\n- `m`：当你需要使用模式在字符串的开头或结尾进行多行搜索以进行匹配时使用\n- `u`：当你需要启用对\
  \ UTF-8 编码模式的正确匹配时使用\n\n### 正则表达式元字符\n\n正则表达式语法包括使用具有某些特殊含义的特殊字符，也称为元字符：\n\n- `\\\
  ` 是一个通用转义字符，有几种用途。\n- `^` 表示断言主题的开始（或在多行模式下的行首）。\n- `$` 表示断言主题的结束或终止换行符之前（或在多行模式下的行尾）。\n\
  - `.` 表示匹配除换行符以外的任何字符（默认情况下）。\n- `[` 表示开始字符类定义。\n- `]` 表示结束字符类定义。\n- `|` 表示替代分支的开始。\n\
  - `(` 表示开始一个子模式。\n- `)` 表示结束一个子模式。\n- `?` 扩展了 `(` 的含义，也表示 0 或 1 量词，还使贪婪量词变得懒惰（参见重复）。\n\
  - `*` 用于 0 个或多个量词。\n- `+` 用于 1 个或多个量词。\n- `{` 是开始最小/最大量词。\n- `}` 是结束最小/最大量词。\n\n\
  ### 正则表达式方括号\n\n在正则表达式中，括起一组字符的方括号称为字符类。因此 `[abcdef]` 将匹配你指定字符列表中的单个字符。在这个正则表达式示例中，`[abcdef]`\
  \ 只会匹配 `a`, `b`, `c`, `d`, `e`, 或 `f` 这些字符，而不会匹配其他任何字符。\n\n以下是方括号在正则表达式中的使用方式：\n\
  \n- `[abc]` 表示匹配方括号中选项的一个字符。\n- `[^abc]` 表示匹配任何**不在**方括号中的字符。\n- `[0-9]` 表示匹配 `0`\
  \ 到 `9` 范围内的一个字符。\n\n### 正则表达式量词\n\n正则表达式还包含所谓的量词，用于指定一个字符或一组字符在正则表达式中可以重复的特定次数。以下是一些示例：\n\
  \n- `a+` 匹配任何包含至少一个字符 `a` 的字符串。\n- `a*` 匹配任何包含零个或多个字符 `a` 的字符串。\n- `a{x}` 匹配任何包含字符\
  \ `a` 恰好 `x` 次的字符串。\n- `a{2}` 匹配任何包含字符 `a` 恰好两次的字符串。\n- `a{x,y}` 匹配任何包含 `a` 介于 `x`\
  \ 和 `y` 次之间的字符串。\n\n最后，PHP 正则表达式通过括号使用分组来为整个模式应用量词。\n\n#### 正则表达式函数\n\n现在让我们看一下用于\
  \ PHP 的主要正则表达式函数：\n\n- `preg_match()` 如果在该字符串中找到该模式则返回 `1`，否则返回 `0`。\n- `preg_match_all()`\
  \ 返回该模式在字符串中被找到的次数，如果失败则返回 `false`。\n- `preg_replace()` 返回一个新字符串，其中匹配的模式已被另一个字符串替换；否则，返回主题字符串不变，如果发生错误则返回\
  \ `null`。\n\n让我们开始你的第一个使用 `preg_match()` 的 PHP 正则表达式示例，如果在该字符串中找到该模式则返回 `1`，否则返回\
  \ `0`。代码如下：\n\nChapter 9 (regexpress1.php)\n\n```\nThe output of this code is **Match\
  \ was found!** because\n“Massimo” is in the text and the `i` means\ncase-insensitive,\
  \ which means “Massimo” and “Massimo” are the same.\nRemoving the `i` from the pattern\
  \ means a match\nwill be not found because regular expressions are by default\n\
  case-sensitive.\nLet’s have the same example but using some squared brackets.\n\n\
  `Chapter 9/regexpress2.php`\n```\n\n\n\n```  \n该代码的输出结果为 `Match was found!`，因为文本中包含\
  \ \"Massimo\"，而 `i` 表示不区分大小写，但在此例中，所需字符之一 `s` 正好位于 `[trgs]` 方括号内，这意味着匹配方括号选项中的任一字符。由于\
  \ `s` 在方括号中，因此模式匹配成功。  \n\n以下是使用元字符 `$` 的示例，该字符表示在字符串末尾查找匹配：  \n\n`Chapter9/regexpress3.php`\
  \  \n\n```  \n该代码的输出结果为 `Match was found!`，因为模式 \"imo\" 在文本 \"Massimo\" 的末尾被找到。\
  \  \n```  \n\n让我们创建一个包含分组和量词的正则表达式示例。你希望在一个字符串中搜索恰好出现两次字母 \"co\" 的匹配项。  \n\n`Chapter9/regexpress4.php`\
  \  \n\n```  \n该代码的输出结果为 `Match was found!`，因为模式 \"co\" 在文本 \"I love coconut.\" 中恰好出现了两次。\
  \  \n```  \n\n让我们创建一个使用 `preg_match_all()` 的新 PHP 正则表达式示例，该函数将返回模式在字符串中被找到的次数。 \
  \ \n\n`Chapter9/regexpress5.php`  \n\n```  \n该代码的输出结果为 `2`，因为模式 \"na\" 被找到了两次：分别出现在单词\
  \ \"name\" 和 \"Naples\" 中，这是因为你添加了 `I` 标志，所以不区分大小写。  \n```  \n\n最后，让我们创建一个使用 `preg_replace()`\
  \ 的新 PHP 正则表达式示例，该函数返回一个新字符串，其中匹配的模式被替换为另一个字符串。  \n\n`Chapter9/regexpress6.php`\
  \  \n\n```  \n该代码的输出结果为 `“My favorite color is blue!”`，因为模式 \"red\" 在文本中被找到，并被替换为新文本\
  \ \"blue\"。由于添加了 `i` 标志，因此不区分大小写。  \n```  \n\n## 总结  \n\n在本章中，你首先学习了 PHP 正确的异常处理方式，以及如何使用\
  \ `try`、`throw` 和 `catch` 方法来处理异常。接着，你了解了如何使用 PHP 在将客户端 HTML 表单值发送到服务器之前对其进行验证。最后，你学习了\
  \ PHP 正则表达式，该技术在当前应用程序编程中几乎无处不在，它允许你在给定字符串中搜索特定的字符模式。  \n\n在下一章中，你将看到 PHP 和 MySQL\
  \ 如何协同工作，并学习如何创建 MySQL 数据库、表，以及如何使用 PHP 编程代码来处理它们。  \n\n"
- "# 10. PHP 与 MySQL 协同工作  \n\n到目前为止，你已经看到 PHP 功能强大且易于操作和显示数据。那么这些数据从何而来？PHP 可以使用两种类型的数据：静态数据和动态数据。我们可以将静态数据视为不变的数据，而动态数据则是可变化的数据。这种动态数据存储在数据库中。简单来说，数据库是一种结构化的数据组织方式。可以把它想象成一个包含多个电子表格的文件夹。然而，数据库的关键在于，我们可以根据已建立的结构轻松地搜索或查询数据库。这些查询可以从简单的“显示所有用户的名字”，到复杂的“显示所有在星期二下午\
  \ 2 点后注册的用户的名字”。查询的复杂性源于 MySQL 中的 SQL（结构化查询语言）。一旦理解了这种语言，就可以在 PHP 中采用类似填词游戏的方式来使用它。我们只需将特定的单词和短语替换为\
  \ PHP 变量，从而动态地影响查询结果。  \n\n当然，本章将从基础开始，让 PHP 能够与 MySQL 进行通信。  \n\n本章包含以下部分：  \n\n\
  * PHP 与 MySQL 的通信  \n* MySQLi 的优势  \n* PHP 与数据库的连接  \n\n## PHP 与 MySQL 的通信  \n\n\
  正如你之前所见，PHP 需要 Web 服务器才能在 Web 上运行。MySQL 也是如此。运行和维护数据库需要一个数据库服务器（DB）。在你的 Docker 开发环境中，这已经配置好了。使用\
  \ Docker，你可以在宿主机（你正在使用的实际物理机器）上随时输入 `docker ps` 来查看正在运行的 Docker 容器，如图 10-1 所示。\n\
  \n\n\n### 运行中的 Docker 容器\n\n![Figure 10-1](img/514068_1_En_10_Fig1_HTML.png)\n\n\
  最上方一行是 `mysql:8.0` 的**镜像**，最右侧是容器名称 `mysql-db`。为了让 PHP 能够使用 MySQL，你首先需要连接到数据库。PHP\
  \ 提供了两种不同的方法：通过 `MySQLi` 和 `PDO` API。以下是两种方法的代码示例。\n\n### PHP 通过 MySQLi 方法通信\n\n\
  ```\n$mysqli = new mysqli(\"db.mysite.com\", \"user\", \"password\", \"database\"\
  );\n$result = $mysqli->query(\"SELECT 'message' AS theMessage FROM 'messages'\"\
  );\n$row = $result->fetch_assoc();\necho $row['theMessage'];\n```\n\n暂时不深入细节，至少在这些示例的上下文中，我们不妨对其进行分解，看看你正在做什么以及为什么这样做。\n\
  \n在第一个 `MySQLi` 示例中，应该有一些一眼就能认出的醒目元素。\n\n```\n$mysqli = new mysqli(\"db.mysite.com\"\
  , \"user\", \"password\", \"database\");\n```\n\n你有一个 `$mysqli`，这是一个 PHP 变量，被设置为带有若干参数的\
  \ `new mysqli`。由此可以推断，`mysqli` 是一个类，而 `$mysqli` 在创建后将会成为一个对象。暂且不需要用谷歌搜索答案，看看你是否能推断出这些类构造函数的参数含义。第一个参数是\
  \ `\"db.mysite.com\"`。子域名中的 `db` 代表数据库，因此合乎逻辑的猜测是，第一个参数就是数据库服务器。接下来的几个参数很直观：`\"\
  user\"` 是用户名，`\"password\"` 是你通过 PHP 连接时所用用户的密码。最后一个参数 `\"database\"` 自然就是数据库的名称了。要创建一个有效的\
  \ `MySQLi` 连接，这四个参数是必需的。它们可以直接输入，就像此示例中那样；或者你也可以使用变量，例如 `$dbServer`、`$dbUser`、`$dbPass`\
  \ 和 `$dbName`，并将它们存储在一个单独的文件中，以便自己管理。在 PHP 应用中，后一种情况很常见。\n\n下一行代码是：\n\n```\n$result\
  \ = $mysqli->query(\"SELECT 'message' AS theMessage FROM 'messages'\");\n```\n\n\
  这将 `$result` 设置为 `$mysqli` 对象的 `query` 方法执行后的结果。你看到的语法形式是 `$mysqli->query`。传入的属性组成了你希望发送给\
  \ MySQL 的实际查询语句。关于这些查询，我们稍后再详谈。\n\n再下一行是：\n\n```\n$row = $result->fetch_assoc();\n\
  ```\n\n这行代码将 `$row` 变量设置为 `$result` 对象在运行 `fetch_assoc()` 方法后的值。执行查询后，你可以一次性从服务器获取所有结果，也可以逐行获取。为了节省服务器资源，你希望一次性获取所有数据。这样一来，你可以用\
  \ PHP 按需消费和解析数据，而无需不必要地打扰数据库服务器。`fetch_assoc()` 方法是 MySQL 可用方法集合中的一个。这些方法包括：\n\n\
  - `mysqli_fetch_assoc()` - 将结果行作为关联数组获取。\n- `mysqli_fetch_array()` - 将结果行作为关联数组、数值数组或两者兼有地获取。\n\
  - `mysqli_fetch_row()` - 将结果行作为枚举数组获取。\n- `mysqli_fetch_object()` - 将结果集的当前行作为对象返回。\n\
  \n在我们的示例中，`$row` 是一个包含关联值（即数组的键值）的数组。这不同于带有数字键的传统数组：\n\n```\n$row['firstname'] vs\
  \ $row[0]\n```\n\n`firstname` 是关联键值，用于关联数据库中的 `firstname` 列。现在，变量 `$row` 被设置为包含从数据库查询到的数据的一个或多个行。\n\
  \n下一行是：\n\n```\necho $row['_message'];\n```\n\n这里使用 `echo` 来输出变量 `$row` 经过 `htmlentities`\
  \ PHP 函数处理后的结果，具体是数组中 `['_message']` 标识符对应的数据。这正是你查询的具体数据。\n\n### PHP 通过 PDO 方法通信\n\
  \n现在我们来看看 `PDO` 版本有何不同。\n\n```\n$pdo = new PDO('mysql:host=localhost;dbname=myDatabase',\
  \ 'user', 'password');\n$statement = $pdo->query(\"SELECT 'message' AS theMessage\
  \ FROM 'messages'\");\n$row = $statement->fetch(PDO::FETCH_ASSOC);\necho $row['theMessage'];\n\
  ```\n\n第一行是：\n\n```\n$pdo = new PDO('mysql:host=localhost;dbname=myDatabase', 'user',\
  \ 'password');\n```\n\n这里你从 `PDO` 类创建了一个名为 `$pdo` 的新对象，其构造函数传入的参数结构与之前的类似，用于传递数据库主机、数据库名、用户名和密码。\n\
  \n下一行是：\n\n```\n$statement = $pdo->query(\"SELECT 'message' AS theMessage FROM 'messages'\"\
  );\n```\n\n这里你以类似的方式，通过 `$pdo` 对象的 `query` 方法设置了 `$statement`。再下一行是：\n\n```\n$row\
  \ = $statement->fetch(PDO::FETCH_ASSOC);\n```\n\n与 `MySQLi` 类似，数据被获取到一个关联数组中。\n\n\
  最后一行是：\n\n```\necho $row['_message'];\n```\n\n它简单地输出来自数据库的结果数据。\n\n那么现在你已经知道如何以**两种**不同的方式连接\
  \ MySQL 了，该用哪一种呢？实际上，这两种方式在性能上**并没有**太大的差别。PHP.net 的文档指出：“性能差异低至 0.1%。”以下是 `MySQLi`\
  \ 和 `PDO` 之间的一些关键优势。\n\n#### MySQLi 的优势\n\n- 异步查询\n- 能够获取受影响行的更多信息\n- 正确的数据库关闭方法\n\
  - 一次性执行多条查询\n- 持久连接自动清理\n\n#### PDO 的优势\n\n- 有用的获取模式\n- 允许直接在 execute 中传递变量和值\n\
  - 能够自动检测变量类型\n- 预处理语句可选择自动缓冲结果\n- 命名参数\n\n真正的区别在于使用 MySQL 或 MariaDB 之外的数据库系统时。`PDO`\
  \ 支持 12 种数据库类型，而 `MySQLi` 只处理 MySQL 特有的功能。由于你使用的是 MySQL 8.0，并且只想使用这些函数，因此你使用 `MySQLi`。\n\
  \n### PHP 连接数据库\n\n现在让我们创建一个连接并测试你的数据库。首先，访问 `http://localhost/chapter4/seedDB.php`。你看到下面这些内容了吗？\n\
  \n**警告**  \n`mysqli::__construct(): (HY000/2002): No such file or directory in /var/www/chapter4/seedDB.php\
  \ on line 4`\n\n`Fatal error: Uncaught Error: mysqli object is already closed in\
  \ /var/www/chapter4/seedDB.php:6 Stack trace: #0 /var/www/chapter4/seedDB.php(6):\
  \ mysqli->query('Select * from u...') #1 {main} thrown in /var/www/chapter4/seedDB.php\
  \ on line 6`\n\n嗯，一定是某些地方配置不正确。错误信息指出 `seedDB.php` 的第四行有问题。我们去看看。\n\n第四行是 `$mysqli\
  \ = new mysqli` 这一行。在我看来这行没问题，所以问题一定出在 `mysqli` 构造函数中使用的变量上。正如你在第三行看到的，这些变量是从 `db.php`\
  \ 文件中读取的。我们打开那个文件。\n\n啊哈！看这里！在第二行，`$DB_HOST` 被设置为 `''`，而不是一个实际的主机名。如果你还记得，你的主机名应该是\
  \ `db`。让我们把空字符串替换成 `db`。\n\n好了。如果你保存文件并重新加载 `http://localhost/chapter4/seedDB.php`，你应该会看到一些更好的结果。\n\
  \n```\nCreating table \"USERS\"...\nSeeing Users into table..1..2..3\nUsers added\n\
  1 - tom - hanks - 2021-06-25 17:58:42\n2 - billy - mitchell - 2021-06-25 17:58:42\n\
  3 - mega - man - 2021-06-25 17:58:42\n```\n\n\n```markdown\n\n当你开发应用程序时，手头有一些虚拟数据以便适当测试代码是很好的做法。获取数据（虚拟数据或生产环境中的实际数据）并将其填充到数据库中的过程称为*数据填充*（seeding）。此处你正在填充数据库`beginningPGP`，特别是`users`表，填充了三行用户信息。在这个案例中，你使用了一个包含数据的简单`.sql`文件。在像\
  \ Laravel 这样的大型框架中，这是通过迁移和一个名为`artisan`的程序完成的。这不仅让你能用数据填充数据库，还能让你的开发团队通过允许像在`git`（版本控制）中访问代码一样访问这些迁移，从而在数据方面保持一致。运行此页面后，请按刷新。会发生什么？代码首先检查表是否存在，如果已存在，则不会填充用户信息。让我们编写一些代码来显示这个表中的用户。\n\
  \n打开`chapter4`文件夹中的`showUsers.php`。\n\n```php\n<?php\nrequire 'db.php';\n\n$mysqli\
  \ = new mysqli($DB_HOST, $DB_USER, $DB_PASS, $DB_DATABASE);\n$query = \"SELECT *\
  \ FROM users\";\n\n$result = $mysqli->query($query);\nif ($result) {\n    echo 'Users\
  \ in Database';\n    while ($row = $result->fetch_assoc()) {\n        echo \"Name:\
  \ {$row['first_name']} {$row['last_name']} = Created: {$row['created']} \";\n  \
  \  }\n} else {\n    echo \"No Results. Have you run SeedDB?\";\n}\n?>\n```\n\n让我们逐行分析这段代码。\n\
  \n这是 PHP 文件的标准开头。你首先需要加载`db.php`文件。记住，这会为你的数据库主机、用户名、密码和数据库名称设置变量。\n\n```php\n$mysqli\
  \ = new mysqli($DB_HOST, $DB_USER, $DB_PASS, $DB_DATABASE);\n$query = \"SELECT *\
  \ FROM users\";\n\n$result = $mysqli->query($query);\n```\n\n在这里，你使用`$mysqli`对象及其`query`方法将查询提交给数据库。结果将被设置为变量`$result`。\n\
  \n```php\nif ($result) {\n    echo 'Users in Database';\n    while ($row = $result->fetch_assoc())\
  \ {\n        echo \"Name: {$row['first_name']} {$row['last_name']} = Created: {$row['created']}\
  \ \";\n    }\n} else {\n    echo \"No Results. Have you run SeedDB?\";\n}\n```\n\
  \n这段代码看起来可能很复杂，但你只是在执行一些（对人类来说）非常基本的逻辑。在编程语言中，这种“对人类显而易见”的逻辑需要精确的逻辑处理，以确保你考虑到所有情况并避免错误。`if\
  \ ($result)` 是 PHP 在检查`$result`是否计算为任何“真值”（truthy value）。这可以是：\n\n*   布尔值`TRUE`\n\
  *   非空值\n*   非`NULL`值\n*   非零数字\n\n你基本上是在询问是否找到并返回了任何有用的数据。你将在下面几行处理未返回任何数据的情况。首先，让我们处理已有的数据。\n\
  \n```php\n    echo 'Users in Database';\n    while ($row = $result->fetch_assoc())\
  \ {\n        echo \"Name: {$row['first_name']} {$row['last_name']} = Created: {$row['created']}\
  \ \";\n    }\n```\n\n这里，你使用 HTML 的`<h1>`标签为页面输出一个标题。然后你开始一个`while`循环，PHP 会从头到尾循环，直到满足指定条件。你可以将其理解为“当交通灯是绿色时，继续开车”或“当意大利面没煮熟时，继续煮”。一旦这两个条件中的任何一个发生变化（交通灯变红或意大利面煮熟），循环就会停止。在你的代码中，你是在说“当`$row`等于从数据库作为关联数组获取的数据时，运行循环”。你的循环很简单，它一次一行地从数据库输出结果。一旦`$row`不再等于来自数据库的数据，或者数据库完成数据返回，这个循环就会停止。\n\
  \n```php\n} else {\n    echo \"No Results. Have you run SeedDB?\";\n}\n```\n\n这个`else`对应于上面的`if\
  \ ($results)`。这是当`$result`返回为空时发生的情况。当这种情况发生时，你想向用户返回一些有用的错误信息，而不是标准的 MySQL 或 PHP\
  \ 错误。攻击者可能会利用这些类型的错误来对付你。这里你向用户输出提示，可能数据库是空的，他们可能需要运行你之前运行的`seedDB`文件，以便将数据放入数据库。\n\
  \n这里你看到了使用 MySQLi（相对于 PDO）将 PHP 连接到数据库，产生了一个名为`$mysqli`的数据库对象。你想要从数据库的`users`表中选择所有内容，因此你使用了查询`SELECT\
  \ * FROM users`。`SELECT`告诉 MySQL 你正在请求数据。`*`表示所有内容。`FROM`告诉 MySQL 你希望从哪里获取这些数据，预期下一个词会给出位置。最后，`users`是你要从中获取数据的表。这是你可以在\
  \ MySQL 中执行的最通用的查询之一。让我们稍微修改一下。如果你想按姓氏字母顺序检索名称列表该怎么办？修改查询并运行：\n\n```php\n$query\
  \ = \"SELECT * FROM users ORDER by last_name ASC\"\n```\n\n这段代码也可以在`showUsers2.php`中找到。\n\
  \n这个查询看起来与第一个非常相似，但添加了一些修饰符。在`users`之后，你添加了`ORDER`，它告诉 MySQL 你希望以有序的方式返回数据。此时，你还没有告诉\
  \ MySQL 其他任何信息。要使 MySQL 能够对这些结果排序，你需要两个因素。首先，你需要告诉 MySQL 你想要对哪一列数据进行排序。目前，你有`id`、`first_name`、`last_name`和`created`。在你的查询中，你使用了`ORDERED\
  \ by last_name`，这满足了第一个要求，但现在你需要告诉 MySQL 排序顺序。有两个主要选项：升序（ASC）或降序（DESC）。在处理像姓氏这样的字符串时，升序是\
  \ A-Z，因为`a`的数值小于`z`，所以这被认为是升序。反之是`DESC`，即 Z-A。如果你现在运行这段代码，你应该会看到如下输出：\n\n```\nUsers\
  \ in Database\nName: tom hanks = Created: 2021-06-28 14:17:45\nName: mega man =\
  \ Created: 2021-06-28 14:17:45\nName: billy mitchell = Created: 2021-06-28 14:17:45\n\
  ```\n\n另一个有用的查询修饰符是`LIMIT`。例如，假设这个数据库中有成千上万的用户，但你只想要按分数排序的前三名。这个查询看起来像下面这样（也可以在`showUSers3.php`中找到）：\n\
  \n```php\n$query = \"SELECT * FROM users ORDER by score DESC LIMIT 3\";\n```\n\n\
  到目前为止，你已经通过`SELECT`查询从数据库中读取了数据。在网站后端使用数据库的目的是为了既能读取数据也能存储数据。这就是照片如何出现在 Instagram\
  \ 上，以及推文如何进入推特世界的方式。用户可以将他们的推文（数据）发送到数据库，在那里它被存储在一个表中，并为其关联的列分配特定的值。让我们向数据库添加另一个用户，你将看到这是如何工作的。你将使用\
  \ PHP MySQL 预处理语句。使用预处理语句的好处是双重的：\n\n1.  在多次查询迭代中，尽管查询运行了多次，但解析时间减少了，因此结果是查询以高效率执行。\n\
  2.  PHP MySQL 预处理语句对于防止 SQL 注入非常有用。\n\n打开`addUser.php`，让我们分解它。\n\n```php\n<?php\n\
  require 'db.php';\n\n$mysqli = new mysqli($DB_HOST, $DB_USER, $DB_PASS, $DB_DATABASE);\n\
  $query = $mysqli->prepare(\"INSERT INTO users (first_name, last_name, age, score)\
  \ values (?,?,?,?)\");\n$query->bind_param(\"ssii\",$firstName, $lastName, $age,\
  \ $score);\n$firstName = \"Freddy\";\n$lastName = \"Krueger\";\n$age = 40;\n$score\
  \ = 301;\n$query->execute();\n$mysqli->close();\n?>\n```\n\n前几行在这一点上应该看起来很熟悉。这就是你引入存储在`db.php`中的数据库变量，并从`mysqli`类创建一个名为`$mysqli`的对象的地方。\n\
  \n```\n\n\n```php\n$query = $mysqli->prepare(\"INSERT INTO users (first_name, last_name,\
  \ age, score) values (?,?,?,?)\");\n```\n\n这一行看起来熟悉但大不相同。这是你的 `INSERT` 查询，你正在创建它以便用作预处理语句。\n\
  \n```\n$query = $mysqli->prepare\n```\n\n这里你创建了一个名为 `$query` 的变量，它是从 `$mysqli` 对象调用\
  \ `prepare` 方法得到的结果。`prepare` 方法接收你希望在 MySQL 中运行的查询，但允许你绑定参数，从而减少服务器带宽占用，因为每次只发送参数，而不是整个查询。该查询使用了动词\
  \ `INSERT`，其结构如下：\n\n```\nINSERT INTO (column1, column2, column3, ...) VALUES (Value1,\
  \ value2, value3, ...);\n```\n\n你使用 `users` 表的列结构来插入 `first_name`、`last_name`、`age`\
  \ 和 `score` 的值。但值在哪里？只有问号（`?`）。这就是绑定元素。MySQL 会识别这些问号，并为后续需要赋值的指定数量参数预留空间；在你的代码中，这发生在下一行。\n\
  \n```\n$query->bind_param(\"ssii\",$firstName, $lastName, $age, $score);\n```\n\n\
  这段代码使用了你之前创建的 `$query` 对象，这次你调用了 `bind_param` 方法，它接收两组参数。在你的示例中，第一组参数（`\"ssii\"\
  `）是你所绑定参数的类型列表。你使用的 `\"ssii\"` 代表“字符串、字符串、整数、整数”，分别对应 `first_name`、`last_name`、`age`、`score`。MySQL\
  \ 支持四种类型：\n\n- `i`：整数（例如 `1`、`199`、`4421`）\n- `d`：双精度浮点数（例如用 `1.0e6` 表示一百万）\n- `s`：字符串（例如\
  \ `\"pants\"`、`\"Bananas\"`）\n- `b`：BLOB（二进制大对象，是一种可变长度的二进制字符串，最长可达 2,147,483,647\
  \ 个字符）\n\n既然你已经告诉了 MySQL 期望的参数类型，接下来就列出你将使用的变量。\n\n```php\n$firstName = \"Freddy\"\
  ;\n$lastName = \"Krueger\";\n$age = 40;\n$score = 301;\n```\n\n现在，你为之前已告知 MySQL\
  \ 将在查询中使用的变量赋值：两个字符串和两个整数，与你用 `\"ssii\"` 声明的一致。\n\n```php\n$query->execute();\n\
  $mysqli->close();\n```\n\n最后，你通过调用 `$query` 对象的 `execute` 方法来执行查询，然后关闭与 MySQL 的连接。访问\
  \ `http://localhost/chapter4/addUser.php`，再返回 `http://localhost/chapter4/showUser.php`\
  \ 查看结果。你应该会在表中看到一个新增用户。如果你多次刷新 `addUser`，表格中会多次添加用户。现在你已经掌握了一些与 MySQL 交互的基本技巧，下一章你将更深入地学习更复杂的查询、数据组织以及\
  \ MySQL 的特性。\n\n## 总结\n\n在本章中，你学习了使用 PHP 和 MySQL 的基础知识。首先，你学习了如何使用 `MySQLi` 和 `PDO`\
  \ 这两种方法连接数据库。你了解了使用一种方法相对于另一种方法的优势。最后，你探索了连接数据库并展示其中用户所需的代码。在下一章中，你将学习更多关于 MySQL\
  \ 数据库表中可使用的数据类型，如 `CHAR` 和 `VARCHAR`，以及如何在查询中定义多重依赖关系。\n\n"
- "# 11. 数据\n\n到目前为止，你已经使用 MySQL 存储了一个简单的用户表，其中包含几个列。这对于一些快速示例来说很有用，但如果是具有多重依赖关系的更复杂查询呢？在本章中，让我们规划一些可用于营地注册/管理数据库的数据。\n\
  \n本章包含以下部分。\n\n- 规划新数据库\n- 创建新数据库\n\n### 规划新数据库\n\n当数据库在充分考虑数据和表格的情况下组织良好时，其效果最佳。以下是规划数据库时需要考虑的几点：\n\
  \n1. **始终使用正确的数据类型。**\n\n   MySQL 的最佳实践之一是根据信息的性质或内在特性来使用数据类型。使用不必要的数据类型可能会占用更多空间或导致错误。\n\
  \n   例如，使用 `VARCHAR (20)` 而不是 `DATETIME` 数据类型来存储日期时间值，会导致日期时间相关计算出现错误。此外，无效信息也可能混入其中，最终引发错误。\n\
  \n2. **优先使用 CHAR (1) 而非 VARCHAR (1)。**\n\n   `VARCHAR (1)` 需要额外字节来存储数据，因此如果你的字符串是单个字符，最好使用\
  \ `CHAR (1)`。\n\n3. **仅使用 CHAR 数据类型存储固定长度的信息。**\n\n   例如，如果信息长度小于 1,000，使用 `CHAR(1000)`\
  \ 而非 `VARCHAR(1000)` 会占用更多空间。\n\n4. **尽量避免使用地区性日期格式。**\n\n   当使用 `DATETIME` 或 `DATE`\
  \ 数据类型时，始终使用 `YYYY-MM-DD` 日期格式或适用于你 SQL 引擎的 ISO 日期格式。像 `DD-MM-YYYY` 或 `MM-DD-YYYY`\
  \ 这样的地区性格式将无法正确存储，导致错误和困扰。\n\n5. **为关键列创建索引。**\n\n   为了使查询快速返回结果，建议为 `JOIN` 条件中使用的列创建索引。\n\
  \n   如果你使用涉及多个表的 `UPDATE` 语句，请为所有用于连接表的列创建索引。\n\n6. **不要对索引列使用函数。**\n\n   这正是索引的目的。试图通过使用函数来复制索引过程，会使情况过于复杂，从而拖慢整个过程。\n\
  \n   例如，假设你需要获取营员名字开头两个字符为 `GE` 的信息。请使用以下语句：\n\n   ```sql\n   SELECT firstname FROM\
  \ campers WHERE firstname like 'GE%'\n   ```\n\n   并且，不要编写：\n\n   ```sql\n   SELECT\
  \ firstname FROM campers WHERE left (firstname,2)='GE'\n   ```\n\n   第一个示例利用了索引，因此响应时间更快。\n\
  \n7. **仅在必要时使用 ORDER BY 子句。**\n\n   让 PHP 来排序你的数据，而不是 MySQL。使用 MySQL，你可以为返回的数据设置排序方式，例如\
  \ `ASC` 表示升序，`DESC` 表示降序。这可能会导致查询花费额外的时间，而这些工作完全可以由 PHP 甚至前端的 JavaScript 来完成。\n\n\
  8. **选择合适的数据引擎。**\n\n   如果你开发的是一个读取数据频率高于写入数据频率的应用程序（例如搜索引擎），请选择 `MyISAM` 存储引擎。\n\
  \n   选择错误的存储引擎会影响性能。可供你选择的存储引擎包括 `MyISAM`（MySQL 默认的存储引擎）和 `InnoDB`（MySQL 内置的另一种引擎，专为高性能数据库设计）。这两种引擎的主要区别之一是表锁定与行级锁定。表锁定是指当表中的某个或多个单元格需要更新或删除时，锁定整个表的技术。表锁定是默认存储引擎\
  \ `MyISAM` 采用的默认方法。行级锁定是指在修改或删除表中某个有效范围内的单元格时，锁定该范围内行数据的技术。行级锁定是 `InnoDB` 存储引擎使用的方法，专为高性能数据库设计。\n\
  \n9. **在必要时使用 EXISTS 子句。**\n\n   当你只需要检查数据是否存在时，请使用 MySQL 的 `EXISTS` 函数，而不是发起整个查询来评估返回数据。例如，使用：\n\
  \n   ```sql\n   IF EXISTS(SELECT * from Table WHERE col='foo')\n   ```\n\n   不要使用：\n\
  \n10. **使用 EXPLAIN 分析你的 SELECT 查询。**\n\n    ```sql\n    IF (SELECT count(*) from\
  \ Table WHERE col='foo')>0\n    ```\n\n    MySQL 提供了 `EXPLAIN` 功能，用于显示 MySQL 如何执行查询的过程，例如\n\
  \n\n\n```sql\nmysql> EXPLAIN ANALYZE SELECT * FROM SALES;\n+----------------------------------------------------+\n\
  | EXPLAIN                                            |\n+----------------------------------------------------+\n\
  | –> Table scan on SALES (cost=0.35 rows=1) (actual time=0.070..0.070 rows=0 loops=1)\
  \                    |\n+----------------------------------------------------+\n\
  1 row in set (4.15 sec)\n```\n\n### 创建新数据库\n\n结合目前学到的所有知识，让我们创建具有以下结构的新数据库：\n\n\
  - **表名：** `Campers`\n- **列：** `ID`、`First Name`、`Last Name`、`Age`、`Camp ID`、`Created`\n\
  - **表名：** `Camps`\n- **列：** `ID`、`Name`、`Size`、`Created`\n- **表名：** `Registered`\n\
  - **列：** `ID`、`Camper ID`、`Camp ID`、`Registered`、`Paid`、`Created`\n\n这是一个供营地用于跟踪露营者、营地和注册信息的基本数据库设计。为了在你的项目中正确使用它，你需要设置并创建这些表，用数据填充它们，并通过表关系使用\
  \ PHP 进行管理。虽然有几种管理 MySQL 的前端 GUI 方法，但目前你不会使用其中任何一种。我们将带你通过 MySQL 的命令行界面 (CLI) 完成后续步骤。首先，打开命令提示符（Windows）或终端（Mac\
  \ OS, Linux）并运行：\n\n```\ndocker ps\n```\n\n还记得这个命令吗？此命令显示所有正在运行的容器。如果没有显示任何内容，那么你可能没有为本书运行\
  \ Docker。请回到本书的第一章，确保 Docker 正在运行并且 `docker-compose up` 已经执行。\n\n如果一切运行正常，你应该会看到类似于以下的内容：\n\
  \n```\ndocker ps\nCONTAINER ID   IMAGE                          COMMAND     CREATED\
  \         STATUS      PORTS                                                  NAMES\n\
  d5d98b7de503   beginning-php8-and-mysql_app   \"docker-php-entrypoi…\"   2 days\
  \ ago      Up 2 days   9000/tcp                                               php-app\n\
  63715c3c4f52   nginx:alpine                   \"/docker-entrypoint.…\"   2 days\
  \ ago      Up 2 days   0.0.0.0:80->80/tcp, :::80->80/tcp                      php-nginx\n\
  21f2a4b87b7b   mysql:8.0                      \"docker-entrypoint.s…\"   2 days\
  \ ago      Up 2 days   0.0.0.0:3306->3306/tcp, :::3306->3306/tcp, 33060/tcp   mysql-db\n\
  ```\n\n你可以看到你的 MySQL 容器名为 `mysql-db`，使用 Docker 你可以像连接服务器一样连接到这个容器。\n\n```\ndocker\
  \ exec -ti mysql-db bash\n```\n\n该命令告诉 Docker 你想执行一个名为 `-ti` 的命令来创建一个伪 TTY。这基本上允许你将终端用作此容器的接口，而\
  \ `i` 代表交互模式，意味着你想将这个容器当作一个实时系统来使用。下一个属性是 `mysql-db`，这是你要连接的容器名称，最后你想运行 bash。Bash\
  \ 是 Unix/Linux 系统的一个 shell，允许你访问文件系统和运行脚本。按下回车后，你就“进入”了 MySQL 容器。连接后，你需要运行以下命令：\n\
  \n```\nmysql -uroot -ppass\n```\n\n这将使用用户名 `root` 和密码 `pass` 连接到 MySQL。通常不鼓励这样做，但在封闭网络环境和开发环境中可以允许这种随意性。\n\
  \n连接到 MySQL 后，你需要了解并做的第一件事是列出数据库。\n\n```\nshow databases;\n```\n\n注意，所有 MySQL 命令都以分号结尾。如果你输入一个命令并按回车但没有加分号，命令行只会换行并等待你输入更多内容或输入分号。你可以只输入一个分号然后按回车来继续执行你的命令。\n\
  \n在这个列表中，你应该会看到 `beginningPHP`。输入：\n\n```\nuse beginningPHP;\n```\n\n然后输入：\n\n```\n\
  show tables;\n```\n\n这个命令会显示当前数据库中可用的表。应该有一个 `users` 表。这没问题，我们暂时先把它放一边。让我们开始为你的露营数据创建表。\n\
  \n在 `chapter5` 目录下有一个名为 `campers.sql` 的文件。\n\n```\ncreate table IF NOT EXISTS campers(\n\
  id INT NOT NULL AUTO_INCREMENT,\nfirst_name VARCHAR(100) NOT NULL,\nlast_name VARCHAR(40)\
  \ NOT NULL,\nage INT NOT NULL,\ncampId INT default 0,\ncreated DATETIME NOT NULL\
  \ ON UPDATE CURRENT_TIMESTAMP default current_timestamp,\nPRIMARY KEY ( id )\n);\n\
  ```\n\n复制这段代码，粘贴到 MySQL 命令行中并按下回车。然后再次输入 `show tables;`。\n\n```\nmysql> show tables;\n\
  +------------------------+\n| Tables_in_beginningPHP |\n+------------------------+\n\
  | campers                |\n| users                  |\n+------------------------+\n\
  2 rows in set (0.00 sec)\n```\n\n现在数据库中有了一个 `campers` 表。要查看表结构，请输入：\n\n```\ndesc\
  \ campers;\n```\n\n`Desc` 是 Describe 的缩写，它会显示表的布局。现在让我们创建用于存储营地信息的表。查看 `chapter5`\
  \ 目录中的 `camps.sql` 文件。\n\n```\ncreate table IF NOT EXISTS camps(\nid INT NOT NULL\
  \ AUTO_INCREMENT,\ncamp_name VARCHAR(100) NOT NULL,\nsize INT NOT NULL,\ncreated\
  \ DATETIME NOT NULL ON UPDATE CURRENT_TIMESTAMP default current_timestamp,\nPRIMARY\
  \ KEY ( id )\n);\n```\n\n复制这段代码，粘贴到 MySQL 命令行中并按下回车。\n\n现在输入 `show tables;` 并查看结果：\n\
  \n```\nshow tables;\n+------------------------+\n| Tables_in_beginningPHP |\n+------------------------+\n\
  | campers                |\n| camps                  |\n+------------------------+\n\
  2 rows in set (0.03 sec)\n```\n\n最后，让我们创建一个用于存储已注册露营者的表。按照上述步骤处理 `registered.sql`。打开\
  \ `registered.sql`。复制代码，粘贴到 MySQL 命令行中并按下回车。输入 `show tables;` 并查看结果。现在你已经有了数据，让我们接下来看看如何利用关系查询为你的应用创建简单和复杂的查询。\n\
  \n## 总结\n\n在本章中，你学习了哪些数据类型可以在 MySQL 数据库表中使用，例如 `CHAR` 或 `VARCHAR`，以及如何在查询中定义多个依赖关系。在下一章中，你将把所有学到的知识整合到一个示例网站中，以创建、读取、更新和删除数据（也称为\
  \ CRUD）。你将学习一个基本的 CRUD 网站如何成为企业或组织内管理信息的标准方式。\n\n"
- "# 12. 带数据库的网站\n\n在本章中，你将把所有学到的知识整合到一个示例网站中。这个网站将允许你创建、读取、更新和删除（即 CRUD）。一个基本的 CRUD\
  \ 网站是企业或组织内管理信息的标准方式。仔细想想，几乎所有应用程序都可以归结为 CRUD。Facebook 允许你创建帖子、读取帖子、更新帖子或你的个人资料，以及删除信息。这种功能是大多数网站寻求的基本交互方式，但你的想象力是无限的，可以在此基础上进行拓展。\n\
  \n本章将涵盖以下内容：\n\n- PHP CRUD `GET` 方法及示例函数：`deleteBook`、`showEditBook`、`showAddBook`\
  \ 和 `showBooks`\n- PHP CRUD `POST` 方法及示例：`bookToUpdate` 和 `bookToAdd`\n\n在这个例子中，你将创建基本的\
  \ CRUD 供你进行审查和扩展。此 CRUD 同时使用了 `POST` 和 `GET` 方法以及 MySQL PDO 参数绑定。这是朝着开发更动态、更高级的应用程序迈出的很好的一步。\n\
  \n让我们直接进入 `chapter12` 链接中的 `home.php` 文件。\n\n```php\n\n```\n\n这些第一行代码声明了一些全局变量。\n\
  \n```html\nHome\nAdd\n```\n\n这部分为应用创建了头部和导航。目前，这些链接是静态的，但可以通过例如从数据库读取菜单项来使其动态化。\n\
  \n\n\n```php\ntry {\n    $conn = new PDO($dsn, $user, $pass);\n    echo '数据库连接成功';\n\
  \    echo '';\n} catch (\\Throwable $t) {\n    echo '错误：' . $t->getMessage();\n\
  \    echo '';\n}\n```\n\n这是您的基本数据库连接块。在这里，您尝试使用凭据进行连接，并在出现任何问题时返回错误。您将在接下来的几个函数中使用`$conn`变量。由于该变量存在于新函数的作用域之外，您需要在那些函数中使用`global\
  \ $conn`。\n\n```php\nfunction deleteBook($theBook) {\n    global $conn;\n    $sql\
  \ = \"delete FROM `books` WHERE `id`=$theBook\";\n    $result = $conn->query($sql);\n\
  \    echo \"书籍已删除\";\n}\n```\n\n此函数`deleteBook`接收传入的变量`$theBook`，并通过特定的数据库查询定位数据库项。该函数随后返回\"\
  书籍已删除。\"。此函数可以通过多种方式改进：\n\n- 变量清理以防止 SQL 注入攻击\n- 验证要删除的项目是否存在\n- 检查 MySQL 错误并显示它们\n\
  \n```php\nfunction showEditBook($theBook) {\n    global $conn;\n    $sql = \"SELECT\
  \ * FROM `books` WHERE `id`=$theBook\";\n    $result = $conn->query($sql);\n   \
  \ foreach($result as $row) {\n        $addForm = '';\n        $addForm .= '标题';\n\
  \        $addForm .= '作者';\n        $addForm .= '分类';\n        $addForm .= 'ISBN';\n\
  \        $addForm .= '';\n        $addForm .= '';\n        $addForm .= '';\n   \
  \     echo $addForm;\n    }\n}\n```\n\n函数`showEditBook`根据书籍 ID（`$theBook`）显示编辑书籍表单。通过此表单，您可以通过`POST`将其提交回`home.php`。使用此表单，您可以添加验证以确保值已正确填写并能够添加到数据库中。隐藏字段作为指示器，告知`home.php`如何处理表单提交。您将在稍后更新书籍的函数中处理这部分。\n\
  \n```php\nfunction showAddBook() {\n    $addForm = '';\n    $addForm .= '标题';\n\
  \    $addForm .= '作者';\n    $addForm .= '分类';\n    $addForm .= 'ISBN';\n    $addForm\
  \ .= '';\n    $addForm .= '';\n    $addForm .= '';\n    echo $addForm;\n}\n```\n\
  \n函数`showAddBook`显示添加书籍表单。同样，这里使用隐藏字段通过`POST`通知`home.php`您想要执行的操作。\n\n```php\nfunction\
  \ showBooks() {\n    global $conn;\n    $sql = \"SELECT * FROM `books` WHERE `id`\"\
  ;\n    $result = $conn->query($sql);\n    if ($result !== false) {\n        $rowCount\
  \ = $result->rowCount();\n        echo \"书籍数量：$rowCount\";\n    }\n    foreach($result\
  \ as $row) {\n        echo $row['id'].' - '. $row['title'] .' - '. $row['author']\
  \ .' - '. $row['category'] .' - '. $row['isbn'] .'  [  编辑  删除 ]';\n    }\n}\n```\n\
  \n函数`showBooks`是页面的默认显示功能。它显示数据库中所有书籍及其编辑和删除链接。\n\n```php\nif (isset($_GET['q']))\
  \ {\n    if ($_GET['q'] == 'add') {\n        echo \"添加书籍\";\n        showAddBook();\n\
  \    }\n    if ($_GET['q'] == 'edit') {\n        $theBook = $_GET['book'];\n   \
  \     echo \"编辑书籍\";\n        showEditBook($theBook);\n    }\n    if ($_GET['q']\
  \ == 'delete') {\n        $theBook = $_GET['book'];\n        echo \"删除书籍\";\n  \
  \      deleteBook($theBook);\n    }\n}\n```\n\n以上是用于通过`GET`确定要执行何种操作的逻辑。请记住，`GET`变量是在\
  \ URL 中使用的变量。您在 URL 中使用`q`作为分配给操作（add, edit, delete）的变量。\n\n```php\nif (isset($_POST['bookToUpdate']))\
  \ {\n    global $conn;\n    $sql = \"update books set title=?, author=?, category=?,\
  \ isbn=? where id=?\";\n    if ($stmt = $conn->prepare($sql)) {\n        $stmt->bindParam(1,$_POST['title']);\n\
  \        $stmt->bindParam(2,$_POST['author']);\n        $stmt->bindParam(3,$_POST['category']);\n\
  \        $stmt->bindParam(4,$_POST['isbn']);\n        $stmt->bindParam(5,$_POST['bookToUpdate']);\n\
  \        if($stmt->execute()) {\n            echo \"书籍 \". $_POST['title'] .\" 已添加\"\
  ;\n        }\n    } else {\n        echo \"错误：\" . $sql . \"\" . $conn->error;\n\
  \        echo \"预处理语句错误：\".$stmt->error();\n    }\n}\n```\n\n上述`if`语句检查是否正在调用变量`bookToUpdate`。如果设置了此变量，则您将尝试更新一本书。您使用\
  \ PDO（如第[10]章所述）来准备一条语句，以确保防止 SQL 注入并指定变量。一旦`$stmt`执行成功，您将返回书名和\"已添加\"；否则，返回错误。这可以通过以下方式改进：\n\
  \n- 清理`POST`数据\n- 验证数据库中的项目是否可更新\n\n```php\nif (isset($_POST['bookToAdd'])) {\n\
  \    global $conn;\n    $sql = \"insert into books (title, author, category, isbn)\
  \ VALUES (?,?,?,?)\";\n    if ($stmt = $conn->prepare($sql)) {\n        $stmt->bindParam(1,$_POST['title']);\n\
  \        $stmt->bindParam(2,$_POST['author']);\n        $stmt->bindParam(3,$_POST['category']);\n\
  \        $stmt->bindParam(4,$_POST['isbn']);\n        if($stmt->execute()) {\n \
  \           echo \"新书籍已添加\";\n        }\n    }\n}\n```\n\n这个`if`语句检查`POST`变量`bookToAdd`。如果找到，则创建并执行\
  \ SQL 查询。这可以通过以下方式改进：\n\n- 清理`POST`数据\n- 验证项目是否已存在于数据库中\n- 所有值都已填写\n\n```php\nshowBooks();\n\
  ```\n\n这是此页面的默认视图，显示可用书籍列表：\n\n```php\n?>\n```\n\n结合上述改进，尝试将其转换为返回 JSON 数据的 API。输出不应返回\
  \ HTML，而应类似于以下伪代码：\n\n```php\n$sql = \"SELECT * FROM `books` WHERE `id`\";\n$result\
  \ = $conn->query($sql);\nif ($result !== false) {\n    $rowCount = $result->rowCount();\n\
  \    $output[] =  \"书籍数量：$rowCount\";\n}\nforeach($result as $row) {\n    $output[]\
  \ = \"标题：\". $row['title'];\n    $output[] = \"作者：\". $row['author'];\n    $output[]\
  \ = \"分类：\". $row['category'];\n    $output[] = \"ISBN：\". $row['isbn'];\n    $output\
  \ = json_encode($output);\n    Return $output;\n}\n```\n\n## 总结\n\n在本章中，您结合了迄今为止学到的所有内容，构建了一个示例网站。您学习了如何构建此网站以执行创建、读取、更新和删除（即\
  \ CRUD）操作，并将其与`POST`和`GET`方法以及 MySQL PDO 参数绑定结合使用。在下一章中，您将学习框架，这些框架使用了许多最佳实践和设计模式，以便开发人员能够快速使用它们来解决问题。\n\
  \n"
- "# 13. 框架介绍\n\n在学习了前面章节如何构建网站之后，本章将重点介绍编程开发框架。您将了解它们是什么以及何时使用它们。\n\n本章包括以下部分：\n\n\
  - 框架介绍\n- 框架的优缺点\n- MVC 模式\n- 框架的不同层次\n- 不同类型的框架\n- PHP 标准建议（PSR）介绍\n- PHP 框架\n\n\
  \n\n## 框架简介\n\n到目前为止，你已经构建了一个应用的不同层级：用于解析值并显示视图页面的 UI 组件、连接数据库并获取数据、对用户进行身份验证以及维护会话。如果你留意观察，会发现这些上下文区域是基于不同用例，在每个项目或应用中都会用到的可复用结构和元素。它们具有结构性价值，但在帮助开发者和团队开发新功能与业务逻辑方面，并不能增加额外价值。认识到这些常见结构元素的重复性后，许多聪明人认为可以将它们开发并打包在一起，使这些结构能够相互对接并被复用。本质上，他们创建了一个**框架**，这是一种支持性结构，能帮助你快速开始开发应用，从而交付业务价值，而无需将时间花费在开发会话层、数据库连接层，然后再开发安全组件上。\n\
  \n框架运用了大量最佳实践和设计模式，使开发者能够快速使用它们来解决问题。既然如此，你是否应该为自己的用例构建一个框架？这可能没有必要，因为如今所有框架都提供了一种安装你可能需要但框架内尚未包含的任何包的方式。它们还允许你通过扩展框架或插件系统来构建自定义层。如果它们是开源的，当有需要时，你可以进行分支（fork）操作，并利用现有框架的基础进行扩展构建。\n\
  \n## 框架的优缺点\n\n框架有很多优点，但也并非没有缺点。在本节中，你将探讨其优缺点。\n\n### 使用框架的优点\n\n使用框架有许多益处：\n\n\
  1. **加速应用开发**\n\n   框架帮助你专注于处理新功能/需求，而不是构建可复用的模式以及测试框架、身份验证和授权流程。这节省了大量时间，因为无需再去构建一个安全、标准的代码库基础，而框架已经提供了这一点。\n\
  \n2. **简化应用维护**\n\n   由于核心基础由框架团队维护，开发团队可以轻松维护应用功能，并定期升级核心框架。\n\n3. **解耦模式**\n\n\
  \   框架预先加载了多种模式，这些模式类似于解耦的系统设计，例如在各种消息队列平台之上提供一个消息队列抽象层，从而提供了先进且本需由开发者自行开发的编码结构。\n\
  \n4. **更新补丁**\n\n   框架由大量的内部以及基于社区的开源开发者、QA 工程师和其他聪明人共同构建和维护，他们负责处理变更、升级包、在相关时集成新功能，以及修补安全问题。凭借这样一个社区团队的知识，只需通过版本升级就能轻松获得这些变更。\n\
  \n5. **任务自动化**\n\n   框架提供了命令行工具，用于为新功能（如单元测试用例或具有标准结构的控制器）创建基础代码，然后你可以根据应用的具体需求对其进行修改。这使得快速构建原型和组件变得非常容易。\n\
  \n### 使用框架的缺点\n\n如前所述，框架确实存在一些潜在缺点：\n\n1. **应用性能受到影响。**\n\n   框架包含了大量用于基础结构的代码，这有助于快速启动你的项目。另一方面，这会带来性能损失，因为许多组件可能不适用于你的项目，但在打包和运行时仍会被加载。\n\
  \n2. **缺乏支持或活跃开发**\n\n\n\n\n一个框架可能当前正处于活跃的开发周期中，但未来情况可能会发生变化。因此，审视框架团队、开发工作及其相关活动的历史与当前模式至关重要。\n\
  \n#### 3. 学习曲线\n\n学习框架既有趣又充满挑战。有些框架非常直观，而另一些则在开始前需要大量配置工作。由于拥有众多基础和高级组件及概念，学习一个框架需要开发团队投入大量时间。\n\
  \n### MVC 模式\n\n`MVC` 代表模型（Model）、视图（View）和控制器（Controller）模式。这是一种非常实用且高效的设计模式，许多框架都利用它来实现关注点分离。在之前的章节中，你将代码分为了用户界面、路由、处理和业务逻辑层。同样，框架也将代码分离到这些逻辑结构中，并通过许多标准化、演进和安全的实践，允许它们之间进行集成和控制流。\n\
  \n如图 13-1 所示，当 PHP 服务器收到任何请求时，它首先到达控制器，控制器通常是负责定义 `GET`、`POST` 及其他基于 REST 动词的 API\
  \ 端点的路由层。各个端点的控制器函数接收请求，然后调用模型层来获取数据，或在从其他服务获取数据后执行业务逻辑。控制器收到这些数据后，将其发送到视图层，视图层包含你的\
  \ UI 代码，并根据发送过来的模型数据生成动态 UI。视图层处理完毕后，结果会作为响应发送回浏览器或用户。\n\n![](img/514068_1_En_13_Fig1_HTML.png)\n\
  \n**图 13-1** 模型-视图-控制器架构\n\n### 框架的不同层级\n\n1.  **MVC 层**  \n    所有主流框架都使用某种变体的 `MVC`\
  \ 模式作为核心结构组件来管理请求和控制流。\n\n2.  **依赖注入**  \n    由于存在许多核心组件，例如认证/授权/实体访问，通过动态注入而非在每次使用这些实体/组件的文件中进行初始化，来实现对这些组件访问的集中式逻辑变得至关重要，从而实现了复用和可管理性。\n\
  \n3.  **认证/授权**  \n    认证/授权允许开发者通过标准化实践来验证用户并实现授权，并且在许多情况下，还允许集成到 Active Directory\
  \ 和其他第三方服务中。\n\n4.  **会话管理**  \n    会话管理有助于在用户登录后对其进行验证。在许多情况下，这是通过使用 `JWT` 和其他标准的基于令牌的认证来实现的。\n\
  \n5.  **数据库库**  \n    框架提供的数据库库可以连接到多种数据库。\n\n6.  **测试框架**  \n    框架还提供测试框架，用于编写单元测试、功能测试和集成测试。这些测试有助于模拟和存根内部组件，从而让开发者能够实践基于\
  \ TDD 的设计开发。\n\n7.  **包管理**  \n    `Composer` 是库管理的核心，它允许跨框架重用许多标准库，从而有助于实现框架之间的互操作性。\n\
  \n8.  **其他**  \n    还有许多其他组件，如防护栏、消息队列管理和缓存，它们都是核心组件的一部分。\n\n### 不同类型的框架\n\n下面我们快速浏览一些可供\
  \ PHP 开发者使用的不同框架。\n\n基于用例分类：\n\n1.  **基于 REST API 的框架**  \n    如今许多后端应用只提供一个 RESTful\
  \ 接口，供基于 React、Angular 或其他前端库/框架构建的前端应用访问。因此，许多框架都提供了开箱即用的解决方案来创建 REST API 后端。 \
  \ \n    示例：`Lumen`， `Silex`， `Slim`， `Guzzle`， `Symfony`\n\n2.  **基于全栈的框架**\n\n\n\
  \n\n## PHP 框架与标准\n\n这些框架集成了部分 UI 组件，使你能够在平台内直接开发 UI 代码。\n\n例如：Laravel、CakePHP、CodeIgniter、Laminas\n\
  \n基于初始打包的组件：\n\n### 微框架\n\n这些框架为你提供最基本的起点和指导方针。它们非常轻量。你可以根据具体用例选择不同的包和设计模式。这需要你付出额外的努力并具备相应的知识来构建这些模式。\n\
  \n例如：Slim\n\n### 全栈框架\n\n这些框架功能强大。在很多情况下，你可能并不需要某些包，但它们在部署应用时仍会被包含在内。缺点是框架体积庞大，但对于团队使用既定的模式和风格来说很有帮助。\n\
  \n例如：Laravel\n\n### Composer 的作用\n\n随着众多框架的出现，集成不同 API 所需的第三方库也日益增多。这些库可以通过扩展并遵循框架特定的方法集成到框架中。这可能会相当繁琐，因为你需要深入了解框架内部机制以及外部\
  \ API。此外，在此过程中你还必须处理标准、最佳实践和安全问题。而这并非开发者的核心职责。因此，PHP 引入了一个包管理器，用于安装由社区和第三方供应商创建的第三方包和库。借助它，开发者可以重用这些库，并在源团队发布更新时及时获取。这有助于在不同框架中使用版本化的库。\n\
  \n链接：[`https://getcomposer.org/`](https://getcomposer.org/)\n\n安装 Composer 非常简单。只需在\
  \ [`https://getcomposer.org/download/`](https://getcomposer.org/download/) 执行这几条命令即可。\n\
  \n所有 PHP 框架都使用 Composer 管理内部依赖。因此，它们都预先打包了 Composer 配置，并且可以进行扩展。\n\n使用 Composer\
  \ 时，会生成一个 `composer.json` 文件，该文件以 JSON 格式存储所有已安装的包及其对应版本。\n\n### PHP 标准建议 (PSR)\
  \ 介绍\n\n随着众多 PHP 框架的出现以及 Composer 用于包管理，为了简化开发者使用不同框架的流程并实现互操作性，需要制定一个所有框架都应遵循的共同标准。这促成了\
  \ PHP 标准建议 (PSR) 的诞生，它是由 PHP 框架互操作性小组 (PHP-FIG) 发布的 PHP 规范，旨在实现 PHP 编程概念的标准化。\n\n\
  其目标是实现组件和包之间的互操作性。PHP-FIG 由多位 PHP 框架创始人共同建立。其核心理念是“通过协作和标准推动 PHP 向前发展”。\n\n完整的标准列表可在\
  \ [`www.php-fig.org/psr/#numerical-index`](http://www.php-fig.org/psr/#numerical-index)\
  \ 找到。其中一些已弃用，一些处于草案状态。当前活跃的标准可在 [`www.php-fig.org/psr/#index-by-status`](http://www.php-fig.org/psr/#index-by-status)\
  \ 找到。\n\n以下是 PSR 的几个主要领域：\n\n#### 自动加载\n\n自动加载通过将命名空间解析到对应的文件系统路径，帮助加载类和库。\n\n相关\
  \ PSR：PSR-4 改进版自动加载\n\n#### 接口\n\n接口有助于在可共享的代码结构之间建立契约。\n\n相关 PSR：\n\n- PSR-3：日志记录器接口\n\
  - PSR-6：缓存接口\n- PSR-11：容器接口\n- PSR-13：超媒体链接\n- PSR-14：事件调度器\n- PSR-16：简单缓存\n\n####\
  \ HTTP\n\n一种基于标准的方法，用于处理 HTTP 请求和响应。\n\n相关 PSR：\n\n- PSR-7：HTTP 消息接口\n- PSR-15：HTTP\
  \ 处理器\n- PSR-17：HTTP 工厂\n- PSR-18：HTTP 客户端\n\n\n\n#### 编码风格\n\n旨在减少认知摩擦并提升可读性的编码规范。\n\
  \n## 相关 PSR 标准\n\n- `PER 编码风格`\n- `PSR-1：基础编码标准`\n- `PSR-12：扩展编码风格指南`\n\n## PHP\
  \ 框架\n\n以下是一些流行且广泛使用的 PHP 框架。你将在后续章节中使用其中的几个。\n\n- Laravel, [`https://laravel.com/`](https://laravel.com/)\n\
  - [Codeigniter](https://www.codeigniter.com/), [`www.codeigniter.com/`](http://www.codeigniter.com/)\n\
  - [Symfony](https://symfony.com/), [`https://symfony.com/`](https://symfony.com/)\n\
  - [Cakephp](https://cakephp.org/), [`https://cakephp.org/`](https://cakephp.org/)\n\
  - [Laminas](https://getlaminas.org/), [`https://getlaminas.org/`](https://getlaminas.org/)\n\
  \n## 如何选择框架\n\n面对众多可用的框架，可能会感到有些困惑。如何选择合适的框架？以下几点值得考虑：\n\n1. **应用/业务用例的兼容性**  \n\
  \   存在多种应用场景，每个应用的需求都独具特色。有些应用更侧重于内容管理。例如，管理团队博客时，WordPress 可能更合适。而在另一种情况下，团队可能需要构建一个\
  \ RESTful 应用，此时 Lumen 或类似的框架或许更有帮助。\n\n2. **开发者的技能组合**  \n   开发团队的核心技能组合也起着关键作用。如果团队已经熟悉某个特定框架或某个框架特有的设计模式，那么复用现有技能集将非常容易。\n\
  \n3. **学习曲线**  \n   项目的时间线在选择框架时扮演着重要角色。选择一个具有合适学习曲线的框架，以便你能快速开始构建项目。\n\n4. **文档质量**\
  \  \n   文档至关重要。一个缺乏良好文档的框架，如同在没有地图的森林中徘徊。优秀的文档能让开发者充满信心地快速进行试验，并随后深入探索。\n\n5. **测试框架**\
  \  \n   一个框架应集成本身可用于编写集成测试、功能测试和单元测试的测试框架。许多框架提供了便捷的测试集成方式，并有助于模拟框架的内部功能，以便轻松快速地运行单元测试。\n\
  \n6. **社区支持**  \n   在 Stack Overflow 等不同论坛上，来自内部、外部和开源社区的活跃支持与问题解答，是衡量框架用户群体活跃度以及开发者能否获得帮助的良好指标，这有助于增强开发团队的信心。\n\
  \n7. **持续发布与开发**  \n   一个积极开发、并定期进行安全更新和错误修复的框架，能增强人们对该产品未来能得到长期支持的信心。\n\n8. **许可证**\
  \  \n   仔细审查框架在代码共享、编辑、开源性质以及生产使用方面的许可证细节是至关重要的。\n\n9. **可定制性与可扩展性**  \n   框架根据应用需求定制和扩展核心功能以支持独特扩展的能力非常重要。\n\
  \n10. **约定优于配置 vs. 定制化**  \n    在“约定优于配置”和“定制化”之间总需要做出选择。有些框架严格遵守约定的规则，旨在简化设置并帮助项目快速启动；而另一些框架则选择更开放的结构，允许你根据自己的喜好和应用结构进行定制。\n\
  \n11. **IDE 支持**  \n    如今，许多流行的 IDE 都至关重要，它们应支持通过快捷键生成代码片段，而非复制粘贴，以此来提高开发者的生产效率。\n\
  \n12. **博客与教程**  \n    许多框架会提供自家的博客和教程，以利用核心开源社区团队的专业知识。它们还会通过新闻频道、公告和邮件列表等方式，定期发布新资源、新功能和新用例。\n\
  \n13. **测试覆盖率**  \n    验证核心框架是否拥有完整的测试覆盖率非常重要。这体现了核心团队遵循 TDD（测试驱动开发）实践的重要性，同时也是衡量核心框架质量的一个指标。\n\
  \n## 总结\n\n在本章中，你了解了为什么框架是软件开发生命周期中的重要组成部分。它们允许开发者复用框架的现有组件，快速开始构建新功能和进行创新，从而使开发者的工作更加轻松、更具趣味性。你探索了选择框架为何至关重要，必须综合考虑多个关键点以及待构建的应用本身。\n\
  \n在下一章中，你将重点关注 Laravel PHP 框架，这是一个非常流行的、易于使用且语法优雅的 Web 应用框架。\n\n## Laravel 简介\n\n\
  近来，随着开发者使用各种开发工具，Web 应用和网站的构建变得越来越简单。让我们探索一下，当构建新的 Web 项目和应用程序时，哪个 PHP 框架能为 Web\
  \ 开发者提供最好的支持。\n\n在本章中，你将重点关注 Laravel PHP 框架。这是一个非常流行的 Web 应用框架，它易于使用且提供了优雅的语法。它能帮助你处理诸如快速路由引擎、实时事件广播、独立于数据库的架构迁移等常见任务。\n\
  \n本章包含以下小节：\n\n- Laravel 简介\n- 安装 Laravel\n- 数据库设置与配置\n- 数据库迁移\n- 控制器路由\n- 注册视图表单\n\
  - 将用户数据存储到数据库\n\n## Laravel 简介\n\nLaravel 是一个基于 MVC 设计模式的现代 PHP 框架。官网上的描述最能说明其特点：*“Laravel\
  \ 是一个具有表现力、优雅语法的 Web 应用程序框架。我们已经为你打好了基础——让你能够自由创造，无需为琐事操心。”*\n\n## 安装 Laravel\n\n\
  安装 Laravel 有多种方法。你可以在[`https://laravel.com/docs/9.x/installation#your-first-laravel-project`](https://laravel.com/docs/9.x/installation#your-first-laravel-project)找到相关说明。\n\
  \n你将按照最简单的方法来启动并运行。请确保在继续操作前已安装以下必备工具：\n\n- `PHP`\n- `Composer`\n\n要启动一个名为 `blog-app`\
  \ 的新项目，请运行以下命令：\n\n```\ncomposer create-project laravel/laravel blog-app\n```\n\n\
  项目结构如图 14-1 所示（不含 `.git` 目录）。\n\n![](img/514068_1_En_14_Fig1_HTML.jpg)\n\n**图 14-1**\
  \ Laravel 项目目录结构\n\n让我们探索一下目录的常见部分。\n\n项目创建完成后，使用以下命令启动它：\n\n```\ncd blog-app\n\
  php artisan serve\n```\n\n现在，你可以通过 `http://localhost:8000` 访问该应用，如图 14-2 所示。\n\n\
  ![](img/514068_1_En_14_Fig2_HTML.png)\n\n**图 14-2** Laravel 主网页\n\n这应该能确认 Laravel\
  \ 已成功安装和设置。\n\n\n#### 数据库设置与配置\n\n你将在构建博客应用的一个子模块——用户注册功能的过程中，了解 Laravel 的各种组件。在此过程中，你将看到\
  \ Laravel 如何简化此类应用的构建流程。\n\n任何应用的核心都是数据，你需要一个数据库来存储与用户相关的数据。在逐步推进不同步骤时，你将采用递增方式创建数据表。在前面的章节中，你通过\
  \ phpMyAdmin 界面手动创建了数据库和数据表。这种方式在演示项目中通常可行，但在生产项目中，建议通过迁移（migrations）来维护数据库和数据表——这些迁移内容存储在文件中，并可提交到诸如\
  \ `git` 之类的源代码管理系统。这有助于实现可重复的数据结构，便于其他团队成员快速上手并搭建项目，同时也能为开发、预发和生产等不同运行环境创建对应的数据库环境。另一个好处是，通过版本化的数据库及数据表结构，你可以理解并维护变更历史，便于审计等其他目的。\n\
  \n在开始设置 Laravel 的迁移功能之前，必须先配置数据库连接参数。这些参数可以在 `config/database.php` 文件中找到。我们来查看一下这个文件的内容。\n\
  \n```\n'default' => env('DB_CONNECTION', 'mysql'),\n```\n\n默认连接使用 `mysql` 适配器，这符合你的环境配置。查看\
  \ `connections` 部分，你可以看到针对 `mysql` 连接的具体配置。\n\n```\n'connections' => [\n'sqlite'\
  \ => [\n...\n],\n'mysql' => [\n'driver' => 'mysql',\n'url' => env('DATABASE_URL'),\n\
  'host' => env('DB_HOST', '127.0.0.1'),\n'port' => env('DB_PORT', '3306'),\n'database'\
  \ => env('DB_DATABASE', ''),\n'username' => env('DB_USERNAME', 'root'),\n'password'\
  \ => env('DB_PASSWORD', ),\n'unix_socket' => env('DB_SOCKET', ''),\n'charset' =>\
  \ 'utf8mb4',\n'collation' => 'utf8mb4_unicode_ci',\n'prefix' => '',\n'prefix_indexes'\
  \ => true,\n'strict' => true,\n'engine' => null,\n'options' => extension_loaded('pdo_mysql')\
  \ ? array_filter([\nPDO::MYSQL_ATTR_SSL_CA => env('MYSQL_ATTR_SSL_CA'),\n]) : [],\n\
  ],\n```\n\n`url`、`host` 和 `port` 的值取自 `.env` 环境文件。这是一种良好实践，而不是在源代码管理中硬编码敏感值。要设置正确的值，请打开项目根目录下的\
  \ `.env` 文件。你将看到以下内容：\n\n```\nDB_CONNECTION=mysql\nDB_HOST=127.0.0.1\nDB_PORT=3306\n\
  DB_DATABASE=laravel\nDB_USERNAME=root\nDB_PASSWORD=\n```\n\n更新后，请务必通过运行以下命令清除缓存并更新配置缓存：\n\
  \n```\nphp artisan cache:clear\nphp artisan config:cache\n```\n\n输出结果如图 14-3 所示。\n\
  \n![](img/514068_1_En_14_Fig3_HTML.jpg)\n\n图 14-3 Laravel 缓存清理命令输出\n\n将 `DB_DATABASE`\
  \ 替换为你博客数据库的名称，并根据你的 MySQL 设置配置 `DB_USERNAME` 和 `DB_PASSWORD`。\n\n#### 数据库迁移\n\n\
  Laravel 提供了一个创建迁移的命令：\n\n```\nphp artisan make:migration \n```\n\n你将创建一个名为 `users`\
  \ 的数据表来存储用户数据。运行以下命令来完成此操作：\n\n```\nphp artisan make:migration create_users_table\
  \ --create=users --table=users\n```\n\n输出结果如图 14-4 所示。\n\n![](img/514068_1_En_14_Fig4_HTML.jpg)\n\
  \n图 14-4 Laravel 数据库表创建\n\n`create` 和 `table` 选项分别表示在数据库中创建表以及指定表名。\n\n运行 `git status`\
  \ 后，你会看到在 `database/migrations/2022_07_31_095213_create_users_table.php` 位置创建了一个新文件。你的文件名可能与之类似，只是前缀不同（因为它会附加一个时间戳值）。这并不会在数据库中立即创建表。我们来查看一下这个文件的内容。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n```php\n2022_07_31_095213_create_users_table.php\n\
  use Illuminate\\Database\\Migrations\\Migration;\nuse Illuminate\\Database\\Schema\\\
  Blueprint;\nuse Illuminate\\Support\\Facades\\Schema;\nreturn new class extends\
  \ Migration\n{\n/**\n* 运行数据库迁移。\n*\n* @return void\n*/\npublic function up()\n{\n\
  Schema::create('users', function (Blueprint $table) {\n$table->id();\n$table->timestamps();\n\
  });\n}\n/**\n* 回滚数据库迁移。\n*\n* @return void\n*/\npublic function down()\n{\nSchema::dropIfExists('users');\n\
  }\n};\n```\n\n从这个默认模板中，你可以看到两个名为 `up` 和 `down` 的函数。`up` 用于执行迁移中的当前更改，而 `down` 用于撤销这些更改。在\
  \ `up` 函数内部，你可以看到 `create` 调用包含了两个字段： `id` 和 `timestamps`。让我们执行迁移，看看数据库中反映出的变化。运行以下命令前，请确保删除\
  \ `database/migrations` 目录中可能随初始设置附带的所有现有迁移文件。同时，确保你的 `vendor/laravel/sanctum/database/migrations`\
  \ 目录也是空的。\n\n```\nphp artisan migrate\n```\n\n输出结果如图 14-5 所示。\n\n![](img/514068_1_En_14_Fig5_HTML.jpg)\n\
  \n图 14-5 Laravel 迁移输出\n\n在 phpMyAdmin 中刷新你的数据表，会显示两个表，如图 14-6 所示。\n\n![](img/514068_1_En_14_Fig6_HTML.jpg)\n\
  \n图 14-6 Laravel 数据表刷新输出\n\n`migrations` 表是 Laravel 专用的表，用于跟踪迁移更改。图 14-7 快速展示了 `migrations`\
  \ 表的结构，其中指定了你刚才执行的一次迁移。\n\n![](img/514068_1_En_14_Fig7_HTML.jpg)\n\n图 14-7 数据表列表\n\
  \n查看图 14-8 所示的 `users` 表结构，你会发现它有一个主键 id 和两个时间戳字段。你可能还需要一些其他字段，比如 name、email 和 password。你将在下一节中添加它们。\n\
  \n![](img/514068_1_En_14_Fig8_HTML.jpg)\n\n图 14-8 Laravel 数据表结构\n\n创建一个新的迁移文件，具体操作如下：\n\
  \n```\nphp artisan make:migration update_users_table --table=users\n```\n\n输出结果如图\
  \ 14-9 所示。\n\n![](img/514068_1_En_14_Fig9_HTML.jpg)\n\n图 14-9 新迁移文件\n\n在 `database/migrations`\
  \ 目录中打开这个新迁移文件，其内容如下所示：\n\n```php\n<?php\nuse Illuminate\\Database\\Migrations\\\
  Migration;\nuse Illuminate\\Database\\Schema\\Blueprint;\nuse Illuminate\\Support\\\
  Facades\\Schema;\nreturn new class extends Migration\n{\n/**\n* 运行数据库迁移。\n*\n* @return\
  \ void\n*/\npublic function up()\n{\nSchema::table('users', function (Blueprint\
  \ $table) {\n//\n});\n}\n/**\n* 回滚数据库迁移。\n*\n* @return void\n*/\npublic function\
  \ down()\n{\nSchema::table('users', function (Blueprint $table) {\n//\n});\n}\n\
  };\n```\n\n让我们更新 `up` 方法，以包含你希望在此次迁移中进行的更改，并更新 `down` 方法以包含反向更改，以便在回滚时删除这些更改：\n\n\
  ```php\n/**\n* 运行数据库迁移。\n*\n* @return void\n*/\npublic function up()\n{\nSchema::table('users',\
  \ function (Blueprint $table) {\n$table->string('name');\n$table->string('email');\n\
  $table->string('password');\n});\n}\npublic function down()\n{\nSchema::table('users',\
  \ function (Blueprint $table) {\n$table->dropColumn('name');\n$table->dropColumn('email');\n\
  $table->dropColumn('password');\n});\n}\n```\n\n现在运行迁移：\n\n```\nphp artisan migrate\n\
  ```\n\n输出结果如图 14-10 所示。\n\n![](img/514068_1_En_14_Fig10_HTML.jpg)\n\n图 14-10 Laravel\
  \ 迁移输出\n\n重新查看数据表结构，你会发现更改已经生效。见图 14-11。\n\n![](img/514068_1_En_14_Fig11_HTML.jpg)\n\
  \n图 14-11 数据表结构中的变更\n\n由于 `users` 表已经设置好，你现在可以创建用户注册功能了。从功能上来说，它将包含三个子功能：\n\n1.\
  \  用于加载注册视图表单和接收表单提交请求的控制器路由\n2.  注册视图表单\n3.  在数据库中存储用户数据\n\n#### 控制器路由\n\n当你访问\
  \ `http://localhost:8000/register` 时，会得到图 14-12 所示的页面，这是一个 404 未找到页面，因为你的控制器中还没有这个\
  \ URL 的路由。\n\n![](img/514068_1_En_14_Fig12_HTML.png)\n\n图 14-12 Laravel 未找到页面\n\n\
  打开 `routes/web.php` 文件，你会看到以下内容：\n\n```php\n<?php\nuse Illuminate\\Support\\Facades\\\
  Route;\n/*\n|--------------------------------------------------------------------------\n\
  | Web 路由\n|--------------------------------------------------------------------------\n\
  |\n| 这里是你可以为应用程序注册 Web 路由的地方。这些路由由 RouteServiceProvider\n| 在一个包含 \"web\" 中间件组的组中加载。现在，开始创造一些了不起的东西吧！\n\
  |\n*/\nRoute::get('/', function () {\nreturn view('welcome');\n});\n```\n\n让我们在\
  \ `resources/views/` 目录下创建一个名为 `register.blade.php` 的示例视图页面，并首先将它的内容设置如下：\n\n```\n\
  注册页面\n```\n\n为了加载这个页面，请在 `routes/web.php` 文件中为 `/register` 路径添加一个路由，具体操作如下：\n\n\
  ```php\nRoute::get('/register', function () {\nreturn view('register');\n});\n```\n\
  \n分析这段代码，很明显，`get` 指定了 REST API 的动词，而 `/register` 是 GET 请求的相对 URI 路径。当控制器拦截到对 `/register`\
  \ 路径的 GET 请求时，它将通过调用 `view('register')` 返回 `register.blade.php` 页面。\n\n保存文件，然后访问\
  \ `http://localhost:8000/register`，你应该会看到图 14-13 所示的输出。\n\n![](img/514068_1_En_14_Fig13_HTML.jpg)\n\
  \n图 14-13 注册页面\n\n你将在后续章节中开发注册表单。现在，让我们为注册成功页面创建一个示例视图页面，并为接收注册提交的表单提交请求创建另一个路由。\n\
  \n注册成功页面位于 `resources/views/registration_success.blade.php`。\n\n```\n您已成功注册！\n```\n\
  \n以下代码应添加到 `routes/web.php` 中：\n\n```php\nRoute::post('/register', function () {\n\
  return view('registration_success');\n});\n```\n\n上面的路由是用于发送到 `/register` 路径的 POST\
  \ 路由请求，它会返回 `registration_success` 页面。你将在稍后处理数据。要测试此更改，请打开终端使用 `curl` 命令，或者使用 Postman。Postman\
  \ 是一个用于运行 API 请求的 UI 界面。有关其安装和使用的更多文档，请访问 `https://learning.postman.com/docs/getting-started/introduction/`。\n\
  \n`curl` 请求：\n\n```\ncurl --location --request POST 'http://localhost:8000/register'\n\
  ```\n\n输出结果如图 14-14 所示。\n\n![](img/514068_1_En_14_Fig14_HTML.jpg)\n\n图 14-14 `curl`\
  \ 请求命令输出\n\nPostman 请求如图 14-15 所示。\n\n![](img/514068_1_En_14_Fig15_HTML.png)\n\n\
  图 14-15 Postman 请求输出\n\n输出应该会加载 419 | 页面已过期。这是一种安全机制，需要提供一个 csrf 令牌。当你构建注册表单时，我们将深入探讨更多细节。此输出应至少验证了你为注册功能设置的\
  \ POST 路由是正常工作的。\n\n\n\n### 注册视图表单\n\nLaravel 的 Blade 模板引擎提供了许多内置功能，可用于按需加载、循环、解析数据以及使用内置函数。您将学习如何创建一个表单，该表单可输入几个字段并将它们提交到您的\
  \ `/register` POST 路由。\n\n要添加表单功能，请通过运行以下命令安装包含此功能的软件包：\n\n```\ncomposer require\
  \ laravelcollective/html\n```\n\n您需要对 `resources/view/registration_success.blade.php`\
  \ 视图文件进行如下修改：\n\n```\nRegistration Page\n{{ Form::open(array('url' => 'register'))\
  \ }}\n// 表单字段\n{{ Form::close() }}\n```\n\n这将创建一个基本的 HTML 表单元素，其表单操作 URL 设置为 `/register`\
  \ 路由，并包含一个用于跨站脚本攻击 (XSS) 保护的 CSRF 令牌，您可以从图 14-16 的开发工具检查中看到。\n\n![](img/514068_1_En_14_Fig16_HTML.png)\n\
  \n图 14-16 更新后的注册页面\n\n接下来，让我们添加用户在注册时应填写的几个字段。\n\n1.  姓名字段\n\n    ```\n    {{ Form::label('name',\
  \ 'Name'); }}\n    {{ Form::text('name'); }}\n    ```\n\n2.  电子邮箱字段\n\n    ```\n\
  \    {{ Form::label('email', 'Email'); }}\n    {{ Form::email('email', $value =\
  \ null, $attributes = array()); }}\n    ```\n\n3.  密码字段\n\n    ```\n    {{ Form::label('password',\
  \ 'Password'); }}\n    {{ Form::password('password'); }}\n    ```\n\n4.  提交按钮\n\n\
  \    ```\n    {{ Form::submit('Register'); }}\n    ```\n\n这些字段元素应添加在 `Form::open`\
  \ 和 `Form::close` 调用之间。\n\n最终的视图页面代码应如下所示：\n\n```\nRegistration Page\n\n{{ Form::open(array('url'\
  \ => 'register')) }}\n{{ Form::label('name', 'Name'); }}\n{{ Form::text('name');\
  \ }}\n\n{{ Form::label('email', 'Email'); }}\n{{ Form::email('email', $value = null,\
  \ $attributes = array()); }}\n\n{{ Form::label('password', 'Password'); }}\n{{ Form::password('password');\
  \ }}\n\n{{ Form::submit('Register'); }}\n{{ Form::close() }}\n```\n\n重新加载页面应显示如图\
  \ 14-17 所示的输出。\n\n![](img/514068_1_En_14_Fig17_HTML.png)\n\n图 14-17 刷新后的注册页面\n\n\
  尝试用一些示例值填写字段详情，然后单击“注册”按钮，即可查看表单 POST 提交请求的实际情况。提交后，页面将类似于图 14-18。\n\n![](img/514068_1_En_14_Fig18_HTML.jpg)\n\
  \n图 14-18 注册成功页面\n\n### 将用户数据存储到数据库\n\n您已经设置了视图和控制器，但尚未对这些数据进行任何处理。其中一个重要部分是解析通过\
  \ POST 请求提交的数据，对其进行验证，然后保存到数据库。为简单起见，您将仅解析数据并将其保存到数据库。请注意，在处理用户提交的数据之前，验证非常重要。\n\
  \n现在您已经能够将数据发布到路由端点，接下来将解析这些不同的值。这些值作为传递给路由方法的 Request 对象的一部分提供。我们来看一下实际应用。对 `routes/web.php`\
  \ 中的 POST 路由方法进行如下修改：\n\n```\nuse Illuminate\\Http\\Request;\n....\nRoute::post('/register',\
  \ function (Request $request) {\nreturn view('registration_success');\n});\n```\n\
  \n可以通过访问 `$request` 对象的属性来获取不同的值。例如，要获取电子邮箱的值，请使用 `$request->email`。现在您知道如何解析不同的\
  \ POST 参数了，因此可以继续使用这些值将其保存到数据库中。\n\nLaravel 使用 Eloquent，这是一个对象关系映射器 (ORM)，它使得与数据库的交互变得非常灵活。使用这种方法，每个表都有一个对应的模型用于与该表进行交互。\n\
  \n```\nEloquent 参考：https://laravel.com/docs/9.x/eloquent\nORM：https://en.wikipedia.org/wiki/Object%E2%80%93relational_mapping\n\
  ```\n\n让我们使用以下命令为您的 `user` 表创建一个模型，位置在 `app/Models/User.php`：\n\n```\nphp artisan\
  \ make:model User\n```\n\n\n\n输出如图 14-19 所示。\n\n![](img/514068_1_En_14_Fig19_HTML.png)\n\
  \n图 14-19\n模型创建输出\n\n如果你希望同时创建迁移文件，请添加 `--migration` 选项。\n\n```\nphp artisan make:model\
  \ User --migration\n```\n\n这会在 `app/Models/User.php` 路径下创建一个包含以下默认模板的文件：\n\n```\n\
  <?php\nnamespace App\\Models;\nuse Illuminate\\Database\\Eloquent\\Factories\\HasFactory;\n\
  use Illuminate\\Database\\Eloquent\\Model;\nclass User extends Model\n{\nuse HasFactory;\n\
  }\n```\n\n若要添加更多字段，例如 `name`、`email` 和 `password`，请在类主体中添加以下代码：\n\n```\n/**\n* 可批量赋值的属性。\n\
  *\n* @var array\n*/\nprotected $fillable = [\n'name',\n'email',\n'password',\n];\n\
  /**\n* 序列化时应隐藏的属性。\n*\n* @var array\n*/\nprotected $hidden = [\n'password',\n];\n\
  ```\n\n现在你的 `User` 模型已准备就绪。要在控制器中使用 `User` 模型，请更新 `routes/web.php` 文件，并添加以下命名空间声明来引入\
  \ `User` 模型：\n\n```\nuse App\\Models\\User;\n....\nRoute::post('/register', function\
  \ (Request $request) {\nUser::create([\n'name' => $request->name,\n'email' => $request->email,\n\
  'password' => Hash::make($request->password)\n]);\nreturn view('registration_success');\n\
  });\n```\n\n这会将用户详情保存在 `user` 表中，并向用户返回注册成功模板。请注意，你正在使用 `Hash` 辅助函数对密码进行单向哈希处理，以便密码以加密格式存储在数据库中，确保安全。输出如图\
  \ 14-20 所示。\n\n![](img/514068_1_En_14_Fig20_HTML.jpg)\n\n图 14-20\n更新后的注册输出\n\n我们再来检查一下数据库中以加密密码形式存储的用户详情，如图\
  \ 14-21 所示。\n\n![](img/514068_1_En_14_Fig21_HTML.png)\n\n图 14-21\nLaravel 数据库加密密码\n\
  \n## 总结\n\n在本章中，你了解了开始使用 Laravel 所需的基本要素。你探索了 Laravel 的一些主要特性，但总体而言，还有许多你会觉得实用的功能，以及\
  \ Composer 仓库中存在的丰富包资源。在查看 Composer 库或创建自定义库之前，请始终查阅 Laravel 的文档，看是否有现成的组件、辅助函数或库能帮助你完成任务。这将在开发和维护方面为你节省大量时间。Laravel\
  \ 在持续改进，因此请随时关注 Laravel 新闻、邮件列表和简报，以保持与时俱进。\n\n在下一章中，你将专注于另一个 PHP 框架——Symfony，这是一个非常流行的\
  \ PHP 框架，已被数千个 Web 应用程序所采用。\n\n"
- '# 15. Symfony 入门


  在前几章中，你学习了如何使用 Laravel（一种与 PHP 配合使用的 Web 应用程序框架）。在本章中，你将重点关注 Symfony，这是一个非常流行的 PHP
  框架，已被用于开发网站和应用程序，其中包括大量可重用的 PHP 组件。


  本章包含以下部分：


  * Symfony 简介

  * 安装 Symfony

  * 创建 Symfony 应用程序


  ## Symfony 简介


  Symfony 是一个使用标准可重用组件构建的全栈框架。它是一个项目，你可以选择使用其部分组件，也可以使用全栈。它由 Fabien Potencier 于 2005
  年创建，并由 SensioLabs 赞助。用 Symfony 自己的话来说，“Symfony 是一组 PHP 组件、一个 Web 应用程序框架、一种哲学和一个社区——所有这一切和谐共处”（`https://symfony.com/what-is-symfony`）。


  深入剖析这个总结：

  一个 PHP 框架：


  如你所知，框架是一个可供构建的基础模板。它包含：


  1. 一个工具箱




  ## Symfony 框架概述


  这是一组可在安全、验证、处理、会话管理等不同情境中复用的组件。这些基础元素让我们的工作变得更加轻松。


  ### 做事流程


  有些框架足够灵活，可根据你的意愿拥有不同的结构、命名约定和控制流程；而有些框架则采用约定俗成的方式。Symfony 属于后者。理解这些约定需要一些初始学习，但一旦掌握，它们在使用现有组件、维护这些组件以及通过命令行工具等自动化工具轻松创建类似结构方面，都能让我们的工作更轻松。


  ### 一种理念


  Symfony 诞生于 SensioLabs 网络创作者们的想象力。它*由*网络创作者*为*创作者而创建。这些创作者理解开发人员在创建网络应用时的需求。Symfony
  采用开源许可发布，这使得开放社区能够对其进行贡献、改进和复用，从而汇集了顶尖人才的智慧。


  ### 一个社区


  Symfony *由*社区支持*并*为社区做出贡献。Symfony 的社区支持包括 GitHub、Slack 聊天以及 SesioLabs。


  ### Symfony 的特性


  Symfony 包含许多区别于其他框架的关键特性。它是一个非常灵活且基于 PHP 的框架，这对 PHP 网络开发者来说非常重要。它易于定制，既支持全栈式也支持积木式构建。最后，它非常稳定且可持续。


  ![](img/514068_1_En_15_Fig1_HTML.jpg)


  图 15-1 分析器工具集


  #### 1. 用于 Web 项目的 PHP 框架


  Symfony 能帮助你快速创建和维护 PHP 网络应用。它还可以帮你避免重复的编码任务，并管理代码控制和版本控制。


  #### 2. 易于使用


  Symfony 非常易于使用，因为它能灵活满足任何开发者的需求，并且易于上手。它附带大量文档，并得到强大的专业社区支持。对于初学者来说，它也非常容易使用，因为它包含了内嵌的最佳实践。


  #### 3. 稳定可靠


  Symfony 的发布节奏确保了所有版本的小版本之间的兼容性，并为所有主要 Symfony 版本提供三年支持。这提供了一种稳定且可持续的模式，值得信赖。


  #### 4. 可扩展


  Symfony 的核心组成部分是可复用的组件，这些组件可以用于其他项目或框架。这使得 Symfony 非常灵活，并且能够通过更改框架的核心行为进行扩展。与此同时，Symfony
  利用 `Composer` 集成了不断增长的开源软件包列表，从而使开发者能够轻松地丰富其生态系统。


  #### 5. 高性能


  在性能方面，快速是每个人的追求，但很难实现。Symfony 从一开始就以性能为核心，旨在实现高速运行。


  #### 6. 依赖注入


  依赖注入是一个核心概念。它允许你在运行时实例化和使用不同的组件。Symfony 利用它提供了一种集中化的方式，用于在你的应用中初始化和提供不同的对象，从而实现简单性和模块化。


  #### 7. 模块化组件


  Symfony 提供了许多开箱即用的模块化组件，用于管理安全、会话、ORM 功能、表单以及模板引擎，这些组件只需很少的精力就能集成并适配到 Symonfy 中使用。


  #### 8. 分析器工具


  分析器工具是每个网页的一部分，并显示在你所有页面的底部。它在多种情境下提供配置信息，这些情境将在后续章节中讨论。这是每个开发者工具箱中非常重要的工具。请参见图
  15-1。




  在图 15-1 中，你可以看到一个包含摘要统计信息的工具栏。这是 Symfony 在调试模式下显示的开发工具栏，它为每个独特的页面包含了许多详细信息。图 15-2
  显示了控制器路由、API 响应状态、请求时间、内存使用、表单错误和错误日志。


  ![图 15-2 分析器工具集组件：状态、时间、内存使用、错误和日志](img/514068_1_En_15_Fig2_HTML.png)


  其他信息包括：


  *   翻译信息

  *   安全信息

  *   Twig/模板调用

  *   服务器信息

  *   Symfony 配置信息


  点击其中任何一个都可以让你进一步深入查看详细信息。例如，图 15-3 显示，点击请求面板会揭示与请求相关的更多详细信息。


  ![图 15-3 请求面板](img/514068_1_En_15_Fig3_HTML.png)


  在左侧面板中，你还可以访问与当前正在访问的页面相关的更多细节部分。


  ##### 1. 命令行工具


  Symfony 的 `cli` 和 `bin` 命令允许你创建许多初学者模板，如控制器、实体模型和迁移，而无需深入研究它们。在接下来的章节和下一章中，你将看到它们是多么有用，从而使开发体验变得愉快。


  ##### 2. 文档与支持


  Symfony 的文档无与伦比，涵盖了从入门指南、安装和教程到特定 API 文档的所有细节。开源社区随时准备在 Stack Overflow 平台和其他论坛上回答问题并提供支持。如果你更喜欢阅读书籍并想详细了解，他们有一本在线书籍
  [`https://symfony.com/book`](https://symfony.com/book) 供你参考。他们还通过认证辅导、SensioLabs
  University 电子学习平台和视频教程提供 Symfony 培训。Symfony 还提供了一项认证，该认证广受重视，是一项值得取得的成就。


  ## 安装 Symfony


  安装 Symfony 有多种方式。请参考 [`https://symfony.com/doc/current/setup.xhtml`](https://symfony.com/doc/current/setup.xhtml)。


  你将按照最简单的方法来启动和运行。请确保在继续之前已安装以下先决条件：


  *   PHP 8.1 或更高版本

  *   PHP 扩展：`Ctype`、`iconv`、`PCRE`、`Session`、`SimpleXML` 和 `Tokenizer`。这些扩展在 PHP
  8 安装中默认已安装。

  *   `Composer` 工具，用于安装 Symfony 和依赖包


  在下一章创建基本的 Symfony 项目之前，让我们先安装 Symfony CLI，它对于许多任务非常有用。根据操作系统的不同，有不同的安装方式；请参阅 [`https://symfony.com/download`](https://symfony.com/download)。


  在 Ubuntu/Debian 系统中，可以通过以下命令运行：


  ```bash

  curl -1sLf ''https://dl.cloudsmith.io/public/symfony/stable/setup.deb.sh'' | sudo
  -E bash

  sudo apt install symfony-cli

  ```


  Symfony 安装的结果如图 15-4 所示。


  ![图 15-4 安装 Symfony](img/514068_1_En_15_Fig4_HTML.png)


  一旦安装了 Symfony CLI，你可以使用它通过运行以下命令来验证你的系统是否满足 Symfony 应用程序的所有要求：


  ```bash

  symfony check:requirements

  ```


  如果一切顺利，你应该会得到类似于图 15-5 的输出。


  ![图 15-5 Symfony 安装验证](img/514068_1_En_15_Fig5_HTML.png)


  现在 Symfony 已安装，让我们创建你的第一个应用程序。


  ## 创建一个 Symfony 应用程序


  要启动一个名为 `blog-app` 的新项目，请运行以下命令：




  ```bash

  composer create-project symfony/skeleton:"6.1.*" basic-starter-app

  cd basic-starter-app

  composer require webapp

  ```


  ## 基础 Symfony 应用结构分析


  每个安装的 Symfony 应用都附带一个极其基础的目录结构，其中包含可复用组件。基础目录结构如图 15-6 所示。


