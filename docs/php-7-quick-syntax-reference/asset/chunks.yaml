    ```


    The mechanism of accessing code entities via strings and string variables also
    works for members of a class or an instance.


    ```php

    class MyClass

    {

    public $myProperty = 10;

    }

    $obj = new MyClass();

    echo $obj->{''myProperty''}; // "10"

    ```


    ## 29. Error Handling


    An error is a mistake in the code that the developer needs to fix. When an error
    occurs in PHP, the default behavior is to display the error message in the browser.
    This message includes the file name, line number, and error description in order
    to help the developer correct the problem.


    While compile and parse errors are typically easy to detect and fix, run-time
    errors can be harder to find because they may only occur in certain situations
    and for reasons beyond the developer''s control. Consider the following code that
    attempts to open a file for reading using the `fopen` function.


    ```php

    $handle = fopen(''myfile.txt'', ''r'');

    ```


    It relies on the assumption that the requested file will always be there. If,
    for any reason, the file is not there or is otherwise inaccessible, the function
    will generate an error.


    ```

    Warning: fopen(myfile.txt):

    failed to open stream: No such file or directory in C:\xampp\htdocs\mypage.php
    on line 2

    ```


    Once an error has been detected, it should be corrected, even if it only occurs
    in exceptional situations.


    ### Correcting Errors


    There are two ways to correct this error. The first way is to check to make sure
    that the file can be read before attempting to open it. PHP conveniently provides
    the `is_readable` function for this task, which returns `true` if the specified
    file exists and is readable.


    ```php

    if (is_readable(''myfile.txt''))

    $handle = fopen(''myfile.txt'', ''r'');

    ```


    The second way is to use the error control operator (`@`). When prepended to an
    expression, this operator suppresses any error messages that might be generated
    by that expression. Either way works to remove the warning.


    ```php

    $handle = @fopen(''myfile.txt'', ''r'');

    ```


    To determine if the file was opened successfully, the return value needs to be
    examined. Looking at the documentation,[¹](#A317139_2_En_29_Chapter.html#Fn1)
    you can find that `fopen` returns `false` on error.


    ```php

    if ($handle === false)

    {

    echo ''File not found.'';

    }

    ```


    If this is not the case, then the content of the file can be read with the `fread`
    function. This function reads the number of bytes specified in the second argument
    from the file handler given in the first argument.


    ```php

    else

    {

    // Read the content of the whole file

    $content = fread($handle, filesize(''myfile.txt''));

    // Close the file handler

    fclose($handle);

    }

    ```


    Once the file handler is no longer needed, it is good practice to close it with
    `fclose`; although PHP also automatically closes the file after the script has
    finished.


    ### Error Levels


    PHP provides several built-in constants for describing different error levels.
    Table [29-1](#A317139_2_En_29_Chapter.html#Tab1) includes some of the more important
    ones.


    **Table 29-1.** Error Levels


    | Name | Description |

    | --- | --- |

    | `E_ERROR` | Fatal run-time error. Execution is halted. |

    | `E_WARNING` | Non-fatal run-time error. |

    | `E_NOTICE` | Run-time notice about possible error. |

    | `E_USER_ERROR` | Fatal user-generated error. |

    | `E_USER_WARNING` | Non-fatal user-generated warning. |

    | `E_USER_NOTICE` | User-generated notice. |

    | `E_COMPILE_ERROR` | Fatal compile-time error. |

    | `E_PARSE` | Compile-time parsing error. |

    | `E_STRICT` | Suggested change to ensure forward compatibility. |

    | `E_ALL` | All errors, except `E_STRICT` prior to PHP 5.4. |


    The first three of these levels represent run-time errors generated by the PHP
    engine. The following are some examples of operations that trigger these errors.'
