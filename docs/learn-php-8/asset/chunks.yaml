    \ your file as a `.php` file and not as\n    `.txt`. Try Save\n    As again and\
    \ renaming the file (make sure file type is either All Files\n    or `php`).\n\
    \n5.  Check for typos in your actual program code. Did you remember the\n    semicolon\
    \ (`;)`?\n    Fix any and resave. You might need to stop and start the server\
    \ if it\n    does not see the changes for some reason. You can go to the log files\n\
    \    and look at the PHP log files to see any errors that might exist in your\n\
    \    code.\n\n6.  Go to the Apache log files (see directions in previous common\n\
    \    problems) to look for errors. If you cannot correct them, copy the\n    errors,\
    \ and paste them in a search engine to see what others have found\n    as solutions.\n\
    \nThe actual program code is displayed not the results of executing the\ncode:\n\
    \n1.  Make sure you saved your file as a `.php` file and not as\n    `.txt`. Try\
    \ Save\n    As again and renaming the file (make sure file type is either All\
    \ Files\n    or `php`).\n\n2.  Your Apache server or PHP might not be started\
    \ or is hung. Stop and\n    start Apache again.\n\n3.  Did you forget or have\
    \ a typo in the `<?php` or `?>` lines?\n\n4.  Go to the Apache log files (see\
    \ directions in previous common\n    problems) to find the errors. If you cannot\
    \ correct them, copy the\n    errors, and paste them in a search engine to see\
    \ what others have found\n    as solutions.\n\nFor any other errors, copy and\
    \ paste them into a web search engine to\nsee what others have discovered as a\
    \ solution.\n\nDo It\n\n1.  If you have not already tested your environment, do\
    \ so. Did the test\n    work? What problems, if any, did you have? How did you\
    \ solve those\n    problems?\n\nAlias (Working) Directories\nIt is common practice\
    \ in the real world to create *alias*\ndirectories in web servers. Alias directories\
    \ are “fake” locations of\nfiles that trick the user of your web site into believing\
    \ a file is in\none location when it is in another.\n\nWhy would you use an alias\
    \ directory? As web sites grow, the locations\nof files on servers may have to\
    \ change. By using an alias, the user of\nyour web site will not know that the\
    \ actual location of the file has\nchanged. The alias gives you the ability to\
    \ store your files in any\nlocation on your computer (server). If you are not\
    \ using an alias, all\nyour files must be stored in the default location. The\
    \ default\nlocations are\n\n*   *EasyPHP*`: C:\\Program Files (x86)\\EasyPHP-Devserver-xxxx\\\
    eds-www`\n\n*   `(replace xxxx with your current version of the development server)`\n\
    \n*   *XAMPP*`: C:\\xampp\\htdocs\\`\n\nYou might want to consider creating an\
    \ alias directory, especially if\nyou want to locate your files on a jump drive.\
    \ In this book, we assume\nthat files are located under the default locations\
    \ in a `projects` folder.\n\n*   *EasyPHP*`: C:\\Program Files (x86)\\EasyPHP-Devserver-xxxx\\\
    eds-www\\projects`\n\n*   *XAMPP*`: C:\\xampp\\htdocs\\projects`\n\nThis will\
    \ allow us to test programs using the same URL whether we are\nusing easyPHP or\
    \ XAMPP.\n\n```\nhttp://127.0.0.1/projects/myfirstprogram.php\n```\n\nIf you do\
    \ create an alias directory, just remember to replace `projects` with\nwhatever\
    \ alias\nname you are using.\nIn easyPHP, alias directories can be created from\
    \ the Dashboard\nscreen. Go to the system tray (bottom right of your screen),\
    \ right-click\nthe easyPHP icon, and select Dashboard. In the middle of the screen,\n\
    locate Working Directory, and then click the Add Working Directory to\nthe right.\
    \ Click and follow the directions. The system will create the\ndirectory if it\
    \ does not already exist.\n\nIn XAMPP, it takes a little more work. Open the system\
    \ panel by\ndouble-clicking the icon. Then click the Config button to the right\
    \ of\nApache. Select the `httpd-xampp` \nconfiguration file from the list. Save\
    \ a backup copy of the file before\nmaking changes. Choose Edit and then Find\
    \ from your text editor menu.\nSearch for the string `\"<IfModule alias_module>\"\
    `. Do not change anything that is already listed\nin this section. However, you\
    \ can add locations (using the following\ncode) for your executable files. Once\
    \ you have entered the required\nlines, stop, and start Apache to help it find\
    \ the new changes.\n\n```\nAlias /myfiles \"C:/Temp\"\n\nOptions Indexes FollowSymLinks\
    \ MultiViews ExecCGI\nAllowOverride All\nRequire all granted\n\n```\n\nNote\n\n\
    This directory setting allows complete read and write capability to\nthe directory.\
    \ We will discuss options to secure the directory for\n“live” sites in a later\
    \ chapter.\n\nThis listing would allow any PHP files in the `C:/Temp` directory\
    \ to\nexecute in Apache when the user enters `myfiles` as a\ndirectory name in\
    \ the URL line. The directory settings shown do not\nprovide much security. However,\
    \ this is just for testing on a test\nmachine. If you are in a live environment,\
    \ you would need to tighten the\nsecurity settings under the `directory` tag.\
    \ To\nexecute the files within this directory, you would enter the URL `http://127.0.0.1/myfiles`\n\
    in a browser. If you do not include a file name, Apache will try to find\nan `index.html`\n\
    or `index.php`\nfile . If neither\nexists, Apache will list the files in the directory,\
    \ with the current\nsettings. This allows easy access to files for testing. However,\
    \ it is\nnot a good idea in a live environment. You can request a file that is\n\
    not the index file by adding the file name `http://127.0.0.1/myfiles/myfirstprogram.php`.\n\
    Remember to include the port number if you had to change it: `http://127.0.0.1:8080/myfiles/myfirstprogram.php`.\n\
    Of course, the directory must exist, and the files must be in the\ndirectory before\
    \ you test the URL in a browser.\n\nDo It\n\n1.  Create an alias folder called\
    \ `myfiles` that points\n    to an existing location on your hard drive or flash\
    \ (removable) drive.\n    Place the `hello world` program that you used to test\
    \ your environment in the\n    folder. Try to run the program from the folder\
    \ using the previous\n    instructions. Were you successful? If not, what problems\
    \ did you have?\n    How did you fix those problems?\n\nNotepad++, Editors, and\
    \ Code Testers\nWhen creating PHP code, you do not need to use a specific editor\
    \ or\npurchase an editor. You can create all code within a text editor (even\n\
    in Notepad). However, it does help to have an editor that highlights\n(colors)\
    \ your code to make it easier to discover coding (syntax)\nerrors."
  trans: "\n\n使用\"文件\"菜单中的\"另存为\"选项，将文件类型更改为\"所有文件\"或`php`。输入文件名`myfirstprogram.php`，并将其保存在以下位置之一。\n\
    \n如果你使用的是 `easyPHP`，请将其保存到：\n\n```\nC:\\Program Files (x86)\\EasyPHP-Devserver-xxxx\\\
    eds-www\n```\n\n当然，你需要将版本名称（或程序文件名称）更改为你机器上使用的正确版本（位置）。在此位置下，创建一个名为`projects`的文件夹，然后将文件保存在该文件夹下。\n\
    \n如果你使用的是 `XAMPP`，首先进入`C:\\xampp\\htdocs`，并创建一个名为`projects`的文件夹。然后返回你的文本编辑器，选择\"\
    另存为\"（不要忘记将文件类型更改为\"所有文件\"或`php`），将文件命名为`myfirstprogram.php`，并将其保存到以下位置：\n\n```\n\
    C:\\xampp\\htdocs\\projects\n```\n\n如果你正确地将文件保存在 `easyPHP` 或 `XAMPP` 的位置，你可以尝试通过在浏览器地址栏中输入以下内容来运行你的程序：\n\
    \n```\nhttp://127.0.0.1/projects/myfirstprogram.php\n```\n\n如果你更改了端口，则将第一部分更改为`http://127.0.0.1:8080/`（将`8080`替换为你正在使用的正确端口）。你的程序应显示图\
    \ 1-26 中所示的消息。\n\n### 常见问题\n\n**未显示任何内容，出现 404 错误：**\n\n1.  确保你完全按照所示输入了地址。\n\
    2.  你的服务器可能挂起了。停止并重新启动它。\n3.  确保你将文件放在了正确的位置。\n4.  确保你将文件保存为`.php`文件，而不是`.txt`文件。重新尝试\"\
    另存为\"并重命名文件（确保文件类型是\"所有文件\"或`php`）。\n5.  检查实际程序代码中的拼写错误。你是否记得使用分号（`;`）？修正任何错误并重新保存。如果服务器因某种原因未看到更改，你可能需要停止并重新启动服务器。你可以查看日志文件中的\
    \ PHP 日志文件，以查看代码中可能存在的任何错误。\n6.  查看 Apache 日志文件（参见之前常见问题中的说明）以查找错误。如果你无法修正这些错误，请复制错误信息并将其粘贴到搜索引擎中，看看其他人找到了什么解决方案。\n\
    \n**显示的是实际程序代码，而不是代码执行的结果：**\n\n1.  确保你将文件保存为`.php`文件，而不是`.txt`文件。重新尝试\"另存为\"\
    并重命名文件（确保文件类型是\"所有文件\"或`php`）。\n2.  你的 Apache 服务器或 PHP 可能未启动或已挂起。停止并重新启动 Apache。\n\
    3.  你是否忘记或在`<?php`或`?>`行中有拼写错误？\n4.  查看 Apache 日志文件（参见之前常见问题的说明）以查找错误。如果你无法修正这些错误，请复制错误信息并将其粘贴到搜索引擎中，看看其他人找到了什么解决方案。\n\
    \n**对于任何其他错误，** 请将其复制并粘贴到网络搜索引擎中，查看其他人发现了什么解决方案。\n\n### 动手实践\n\n1.  如果你尚未测试你的环境，请进行测试。测试成功了吗？你遇到了什么问题（如果有的话）？你是如何解决这些问题的？\n\
    \n### 别名（工作）目录\n\n在实际开发中，在 Web 服务器中创建*别名*目录是一种常见做法。别名目录是文件的\"虚假\"位置，它会欺骗你网站的用户，使其相信文件在一个位置，而实际上它在另一个位置。\n\
    \n为什么要使用别名目录？随着网站的发展，服务器上的文件位置可能必须更改。通过使用别名，你网站的用户将不知道文件的实际位置已更改。别名使你能够将文件存储在计算机（服务器）上的任何位置。如果你不使用别名，所有文件都必须存储在默认位置。默认位置是：\n\
    \n*   *EasyPHP*：`C:\\Program Files (x86)\\EasyPHP-Devserver-xxxx\\eds-www`\n \
    \   *   `（将 xxxx 替换为你开发服务器的当前版本）`\n*   *XAMPP*：`C:\\xampp\\htdocs\\`\n\n你可能需要考虑创建一个别名目录，尤其是当你希望将文件定位在\
    \ U 盘上时。在本书中，我们假设文件位于`projects`文件夹下的默认位置。\n\n*   *EasyPHP*：`C:\\Program Files\
    \ (x86)\\EasyPHP-Devserver-xxxx\\eds-www\\projects`\n*   *XAMPP*：`C:\\xampp\\\
    htdocs\\projects`\n\n这将使我们能够使用相同的 URL 测试程序，无论我们使用的是 `easyPHP` 还是 `XAMPP`。\n\n\
    ```\nhttp://127.0.0.1/projects/myfirstprogram.php\n```\n\n如果你确实创建了别名目录，只需记住将`projects`替换为你正在使用的任何别名名称。\n\
    \n在 `easyPHP` 中，可以从 Dashboard 屏幕创建别名目录。转到系统托盘（屏幕右下角），右键单击 `easyPHP` 图标，然后选择 Dashboard。在屏幕中间，找到\"\
    工作目录\"，然后单击右侧的\"添加工作目录\"。单击并按照说明操作。如果该目录尚不存在，系统将创建它。\n\n在 `XAMPP` 中，需要进行更多操作。通过双击图标打开系统面板。然后点击\
    \ Apache 右侧的 Config 按钮。从列表中选择`httpd-xampp`配置文件。在进行更改之前，请保存文件的备份副本。从文本编辑器菜单中选择\"\
    编辑\"，然后选择\"查找\"。搜索字符串`\"<IfModule alias_module>\"`。不要更改此部分中已列出的任何内容。但是，你可以为可执行文件添加位置（使用以下代码）。输入所需行后，停止并重新启动\
    \ Apache 以帮助它找到新的更改。\n\n```\nAlias /myfiles \"C:/Temp\"\n\n<Directory \"C:/Temp\"\
    >\n    Options Indexes FollowSymLinks MultiViews ExecCGI\n    AllowOverride All\n\
    \    Require all granted\n</Directory>\n\n```\n\n注意：\n\n> 此目录设置允许对目录具有完全的读写能力。我们将在后面的章节中讨论保护\"\
    在线\"网站目录安全的选项。\n\n此配置允许当用户在 URL 行中输入`myfiles`作为目录名时，`C:/Temp`目录中的任何 PHP 文件在 Apache\
    \ 中执行。所示的目录设置并未提供太多安全性。但是，这仅用于在测试机上进行测试。如果你处于在线环境，则需要加强`Directory`标签下的安全设置。要执行此目录中的文件，你需要在浏览器中输入\
    \ URL `http://127.0.0.1/myfiles`。如果你不包含文件名，Apache 将尝试查找`index.html`或`index.php`文件。如果两者都不存在，Apache\
    \ 将根据当前设置列出目录中的文件。这便于轻松访问文件进行测试。但是，在在线环境中这不是一个好主意。你可以通过添加文件名`http://127.0.0.1/myfiles/myfirstprogram.php`来请求非索引文件。如果你不得不更改端口号，请记住包含端口号：`http://127.0.0.1:8080/myfiles/myfirstprogram.php`。当然，目录必须存在，并且文件必须在浏览器中测试\
    \ URL 之前位于该目录中。\n\n### 动手实践\n\n1.  创建一个名为`myfiles`的别名文件夹，指向硬盘或闪存（可移动）驱动器上的一个现有位置。将你用于测试环境的`hello\
    \ world`程序放入该文件夹。尝试使用之前的说明从该文件夹运行程序。你成功了吗？如果没成功，你遇到了什么问题？你是如何解决这些问题的？\n\n### Notepad++、编辑器和代码测试器\n\
    \n创建 PHP 代码时，你不需要使用特定的编辑器或购买编辑器。你可以使用任何文本编辑器（甚至记事本）创建所有代码。但是，使用一个能高亮（着色）代码的编辑器确实有助于更容易地发现编码（语法）错误。\n"
- fmt: "# Notepad++\n\nNotepad++ is available for download at [`www.notepad-plus-plus.org`](http://www.notepad-plus-plus.org).\
    \ This editor is basic and easy to use. It can create files in over 20 different\
    \ forms (including PHP). Most of the coding examples provided in this book are\
    \ created with Notepad++. When you are creating a new PHP program in Notepad++,\
    \ you must tell the application the file type. You can do this by choosing the\
    \ Language menu item and then choosing PHP. This will allow the application to\
    \ help you with color-coding and other features.\n\n## Other Editors\n\nThere\
    \ are hundreds of other editors available. I suggest you pick one that you are\
    \ most comfortable using. Pick one that has lots of users and a strong rating.\n\
    \n## Do It\n\n1.  Decide on a text editor that you will use to complete your coding\
    \ while using this book. Download the editor to your PC. Retype your `hello world`\
    \ program in the editor and save the program. Run the program from your browser.\
    \ Why did you choose the editor that you downloaded? What do you like about the\
    \ editor? What do you not like about the editor?\n\n## Chapter Terms\n\n`PHP`\
    \ | `Procedural Language` | Object-Oriented Language | [`www.php.net`](http://www.php.net)\
    \ | `WAMP` | `LAMP` | `MAMP` | `Scripting Language` | `Programming Language` |\
    \ `JavaScript` | `Web Browser` | `Source Code` | `HTML` | `CSS` | `Script Tags`\
    \ | `Web Server` | `print` Function | `Apache` | Apache Software Foundation |\
    \ `SQL` | Database Management System | `Static Page` | `Dynamic Page` | `GET HTTP\
    \ Request` | `MySQL` | `easyPHP (Developer's Version)` | `Port 80` | `httpd.conf`\
    \ | `php.ini` | `XAMPP` | XAMPP Control Panel | `Alias Directories` | `Open Source`\
    \ | `Notepad++` | `Server Stack`\n\n## Chapter Questions and Projects\n\n### Multiple\
    \ Choice\n\n1.  MAMP stands for\n    1.  Mobile Application Motor Processor\n\
    \    2.  My Awesome Mobile Program\n    3.  Apache-MySQL-PHP\n    4.  Modern Application\
    \ Modular Programing\n    5.  None of these\n\n2.  The goals of the Apache Software\
    \ Foundation (ASP) include\n    1.  Coordination of all changes to the Apache\
    \ web server\n    2.  Overseeing the selling of all Apache software\n    3.  Licensing\
    \ all web servers\n    4.  Maintaining membership to open source programming through\
    \ the Apache web server\n\n3.  What scripting languages can be viewed within a\
    \ web browser?\n    1.  Java\n    2.  XML\n    3.  JavaScript\n    4.  PHP\n\n\
    4.  Select the statements that are true about static web pages:\n    1.  They\
    \ are sometimes called flat page/stationary pages.\n    2.  They are generated\
    \ by a web application.\n    3.  Static web pages display the same information\
    \ for all users.\n    4.  All of the above.\n    5.  A and C.\n\n5.  ___________\
    \ is an object-oriented computer programming language commonly used to create\
    \ interactive effects within web browsers.\n    1.  HTML\n    2.  XML\n    3.\
    \  JavaScript\n    4.  PHP\n\n6.  What is the correct way to end a PHP statement?\n\
    \    1.  `;`\n    2.  New line\n    3.  `<!php>`\n    4.  `.`\n\n7.  The configurations\
    \ button on the XAMPP Control Panel allows the user to do what?\n    1.  Install\
    \ XAMPP\n    2.  Select applications to automatically start\n    3.  Manage add-ons\n\
    \    4.  Configure MYSQL\n\n8.  `php.net` provides all of the following except\n\
    \    1.  Information of each latest release\n    2.  PHP language documentation\n\
    \    3.  LAMP, MAMP, and WAMP downloads\n    4.  Contributions to the PHP documentation\n\
    \n9.  Which of the following best describes a scripting language?\n    1.  The\
    \ language is compiled.\n    2.  The program must be compatible with operating\
    \ system and hardware.\n    3.  The first time the code is accessed is when the\
    \ program is first executed.\n    4.  The code is slower than compiled code.\n\
    \n### True/False\n\n1.  The alias directory allows you to save your web page files\
    \ in a directory (folder) of your choice rather than a `www` directory. It allows\
    \ a URL address to point directly to that folder.\n\n2.  A static page is a page\
    \ added to the dryer when drying clothes to prevent static cling.\n\n3.  A client\
    \ browser submits a `GET HTTP` request to the server, and then the server returns\
    \ a response to the client browser.\n\n4.  The (Developer’s Version) of easyPHP\
    \ can be purchased only for one year at a time.\n\n5.  A dynamic web page never\
    \ changes, but a static web page is always changing.\n\n6.  WAMP stands for Windows,\
    \ Apache, MySQL/MariaDB, and PHP.\n\n7.  Apache is an example of a web server.\n\
    \n8.  HTML stands for Hypertext Markup Language.\n\n9.  PHP originally stood for\
    \ Personal Home Page.\n\n10.  A procedural language is a programming language\
    \ that uses classes and objects.\n\n11.  While viewing a web site in a browser,\
    \ you may view the source code, which can show you HTML, JavaScript, and CSS.\
    \ However, PHP code will not be visible.\n\n12.  Java is a procedural programming\
    \ language.\n\n### Short Answer/Essay\n\n1.  Explain the process that occurs when\
    \ a browser requests a static web page.\n\n2.  Explain the process that occurs\
    \ when a browser requests a dynamic web page.\n\n3.  Explain the difference between\
    \ a procedural language and a scripting language.\n\n4.  How would you add access\
    \ to PHP library code to your program?\n\n5.  Why should a beginning programmer\
    \ use WAMP, MAMP, or LAMP instead of installing each application individually?\n\
    \n### Projects\n\n1.  Create a PHP program to display a summary of your work history\
    \ and educational history.\n\n2.  Create a PHP program to display your major and\
    \ the courses required to complete your major.\n\n3.  Create a PHP program to\
    \ display the goals and/or objectives of your college/university.\n\n### Term\
    \ Project\n\n1.  Your supervisor has requested that you design a secure application\
    \ that will keep track of inventory in the warehouse of the ABC Computer Parts\
    \ Corporation. This application will be accessible both within the warehouse itself\
    \ and outside (via the Internet and/or smart phones). What data fields are necessary\
    \ to keep track of this information? What size and data types (string, integer,\
    \ floating point) should define these fields? What other restrictions on input\
    \ (no negative values for item number) should be defined for these fields?\n\n\
    For example, if a Social Security Number (SSN) was a required field:\n\n*   SSN:\
    \ SIZE: Min: 9 characters (string) Max: 9 characters (string) Restrictions: Valid\
    \ SSN format\n\nNotice that it uses characters, not integers, because no calculations\
    \ will be done on the SSN number.\n\n# Interfaces, Platforms, and Three-Tier Programming\n\
    \n*As of January 2013, PHP was installed on more than 240 million web sites (39%\
    \ of those sampled) and 2.1 million web servers.*\n\n—Ide, Andy (2013-01-31).\
    \ “PHP Just Grows and Grows”\n\n## Chapter Objectives/Student Learning Outcomes\n\
    \nAfter completing this chapter, the student will be able to\n\n*   Give examples\
    \ of platforms or containers that can host PHP programs\n*   Create a simple,\
    \ dynamic web application using PHP\n*   Explain three-tier design and determine\
    \ what is contained in each tier\n*   Design a three-tier application\n*   Explain\
    \ each step of the program development life cycle (PDLC)\n*   Define and explain\
    \ MVC and dependency injection\n\n## PHP Platforms\n\nPHP is a powerful language\
    \ because it can be adapted for use on almost any hardware or software platform.\
    \ The ease at which it interfaces with HTML, CSS, and JavaScript provides the\
    \ ability for PHP applications to run on any system that can host a browser. More\
    \ and more applications are now being created using browsers as the main interface\
    \ tool for the application. This allows the application to run on PCs, the Internet,\
    \ and even in smart phones without the requirement of installing the actual application\
    \ (or other software) on the device. It also allows users to experience the same\
    \ “feel” for the application when they switch between devices. With the introduction\
    \ of cloud-based technologies, the user is no longer locked in to believing that\
    \ the software they are using has to reside on their own device."
  raw: "Notepad++\nNotepad++ is\navailable for download at [`www.notepad-plus-plus.org`](http://www.notepad-plus-plus.org).\n\
    This editor is basic and easy to use. It can create files in over 20\ndifferent\
    \ forms (including PHP). Most of the coding examples provided in\nthis book are\
    \ created with Notepad++. When you are creating a new PHP\nprogram in Notepad++,\
