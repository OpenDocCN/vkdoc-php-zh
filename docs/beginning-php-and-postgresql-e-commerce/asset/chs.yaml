  \ $_mUrl;\n    \n    // 将保存要发送到 Authorize.net 的当前请求\n    private $_mRequest;\n \
  \   \n    // 构造函数使用 Authorize.net 的 URL 初始化类\n    public function __construct($url)\n\
  \    {\n        // Authorize.net URL\n        $this->_mUrl = $url;\n    }\n    \n\
