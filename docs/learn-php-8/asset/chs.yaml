  \ `insert`、`delete` 或 `update` 所需的所有信息。希望我们刚才看到的更改相当容易理解。\n\n现在我们来看一些处理这些数据的 JavaScript\
  \ 代码。正如前面提到的，通过 JavaScript 操纵数据是 Web 应用程序中的常见任务。虽然这不是一本 JavaScript 书籍，但任何 Web 应用程序开发人员都熟悉\
  \ JavaScript 是很重要的。我想你会看到 JavaScript 语言的结构与 PHP 语言的结构相似。\n\n首先，我们将查看对 `get_breeds.js`\
  \ 文件（来自第 5 章）的更改。该文件被重命名为 `getlists.js`，以反映它将处理 `getBreeds` 和 `dogs` 列表框。\n\n```\n\
  function HandleResponse(response)\n{\nvar responsevalues = response.split('|');\n\
  document.getElementById('AjaxResponse').innerHTML = responsevalues[0];\ndocument.getElementById('AjaxReturnValue').innerHTML\
  \ = responsevalues[1];\nobj = JSON.parse(responsevalues[2]);\n}\n```\n\n所有代码更改都在\
  \ JavaScript 文件的 `HandleResponse` 方法中。以前，响应属性（传递给该方法）中的值被直接传递到 ID 为 `AjaxResponse`\
  \ 的 `div` 标签中。那时，只返回了品种的列表框代码。现在该方法将接受三种类型的信息（品种列表框、狗狗列表框和狗狗数组）。为了减少对 Web 服务器的调用次数，只发起一次\
  \ AJAX 调用。它将所有信息返回到 `response` 属性中。信息将使用管道符 (`|`) 分隔。稍后我们将看到，这个字符串的形成将在 `dog_interface`\
  \ 程序中进行。\n\n\n\n我们需要以类似于之前使用 PHP `explode` 方法拆分数据的方式，对此处数据进行拆分。在 JavaScript 中，`split`\
  \ 方法会根据所提供的参数 (`|`) 将字符串拆分为一个数组。在本例中，这将创建一个名为 `responsevalues` 的数组。`var` 关键字使此数组成为该方法的局部变量。当方法结束（即遇到\
  \ `}` 符号）时，该数组将不再需要并被销毁。现在，该数组包含三行。第一行 (`[0]`) 包含了 `getBreeds` 列表框的代码。第二行 (`[1]`)\
  \ 包含了 `dogs` 列表框的代码。第三行（我猜你已经猜到了）包含了完整的 dogs 数组。\n\n*安全性与性能——在此应用程序中，狗狗信息并非高度敏感。此外，这些信息会显示给用户。这让用户能够查看并修复任何可能已损坏的数据。对于更敏感的信息，应使用\
  \ `private` 声明数组，以确保数据仅对当前方法（函数）可访问。*\n\n现在，可以使用这些下标（0、1 和 2）来提取数组的每个部分，并将其释放到适当的位置。`responsevalues[0]`\
  \ 被放置到 `AjaxResponse` 中，用于显示 `getBreeds` 列表。`responsevalues[1]` 被放置到 `AjaxReturnValue`\
  \ 中，用于显示 dogs 列表框。由于我们还不知道用户选择了哪只狗，因此 dogs 数组将被放置到一个 JSON 对象 (`obj`) 中。正如我们所见，JSON\
  \ 数据包含命名的索引和值，这与 PHP 中的关联数组非常相似。这里没有使用 `var` 语句，因为此对象必须是公开的，并且可供整个应用程序使用。\n\n如果你还记得前几章的内容，数组不能直接格式化为字符串。数组必须经过序列化。然而，JSON\
  \ 数据也可以用字符串的形式传递。我们很快就会看到，`responsevalues[3]` 中的“数组”已经被 `dog_interface` 程序格式化为 JSON\
  \ 数据。JavaScript 的 `JSON.parse` 方法能够检查数据，如果数据有效，则将其转换为 JSON 对象。这与 PHP 的 `json_encode`\
  \ 方法非常相似。现在，让我们看看当用户从 dogs 列表框中选择一只狗时，我们如何填充表单。\n\nJavaScript 方法 `process_select`（当用户从\
  \ dogs 列表中选择后，由 HTML 按钮调用）已被放置在 `lab.php` 文件的代码顶部。它也可以放在自己的 JS 文件中，并像导入 `getlists.js`\
  \ 文件一样被导入。这个新方法使用 `obj`（包含所有狗的 JSON 狗狗对象）中包含的信息，用用户在列表框中选择的狗的信息来填充文本框（`dog_name`\
  \ 和 `dog_weight`）、单选按钮（`dog_color`）和列表框（`dog_breed`）。\n\n```\nfunction process_select()\
  \ {\nvar colorbuttons = document.getElementsByName('dog_color');\n```\n\n首先，使用 JavaScript\
  \ 方法 `getElementsByName`，将来自 HTML 表单的所有单选按钮颜色值提取出来，并放入一个名为 `colorbuttons` 的数组中。`dog_color`（每个单选按钮的名称）被传入该方法。此过程将创建一个与颜色单选按钮下标索引一致的单选按钮数组。例如，数组的\
  \ `0` 位置现在将包含 `brown`，这是 HTML 表单中显示的第一个单选按钮。这样，我们就可以通过引用其位置（例如 `colorbuttons[0]`\
  \ 来设置 `brown`）来设置正确的颜色单选按钮。\n\n```\nif(!(document.getElementById('dogs').value ==\
  \ -1))\n{\nindex = document.getElementById('dogs').selectedIndex -1;\ndocument.getElementById('index').value\
