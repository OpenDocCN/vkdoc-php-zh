  \ PayPal 支付页面，如图 9-2 所示。\n\n## 管理订单\n\n你的访客刚刚下了一个订单。接下来怎么办？\n\n在给访客提供支付商品选项后，你需要确保他们确实得到所支付的商品。帽子商店需要一个精心设计的订单管理页面，管理员可以快速查看待处理订单的状态。\n\
