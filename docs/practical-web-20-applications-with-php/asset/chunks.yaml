    Removing a Blog Post from the Index


    Next we write a function to remove a blog post from the index. In fact, the function
    we have just written includes this as part of it; however, we are going to create
    a stand-alone function to achieve the same thing. This allows us to call it from
    the preDelete() function in DatabaseObject_BlogPost.


    Although duplication in code should typically be avoided, we make an exception
    here because this will reduce the overhead in opening and closing the search index.
    The only real differences between this function and the last is that we don’t
    have a call to addDocument().


