- fmt: "`_secure()`有一个`@protected`标志，它允许`Inspector`类发现该方法，同时禁止通过路由器访问。这意味着`_secure()`虽然不能从路由角度访问，但会在`friend()`和`unfriend()`两个操作之前执行。如果用户会话不存在，用户将被重定向到登录页面。\n\
    \n**注意**：只有当你的应用程序位于`webroot`目录下时，重定向到`/login.html`才有意义。如果它位于其他文件夹中，使用类似`/site/login.html`的路径更为合适。请务必保护`settings`和`profile`操作，因为它们同样需要有效的用户会话。\n\
    \n能够添加好友远不如知道谁是好友重要！此时，我们可以使用`friend`/`unfriend`方法来修改数据库行，但我们还需要能够判断另一个用户是否是当前用户的好友。我们需要在`User`模型中添加一个能够告知我们这一信息的方法。查看清单17-11，了解如何实现这一点。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第17章 ■ 分享\n\n**清单17-11.**\
    \ `isFriend()`/`hasFriend()`方法\n\n```php\npublic function isFriend($id)\n{\n \
    \   $friend = Friend::first(array(\n        \"user\" => $this->getId(),\n    \
    \    \"friend\" => $id\n    ));\n    if ($friend)\n    {\n        return true;\n\
    \    }\n    return false;\n}\n\npublic static function hasFriend($id, $friend)\n\
    {\n    $user = new self(array(\n        \"id\" => $id\n    ));\n    return $user->isFriend($friend);\n\
    }\n```\n\n`isFriend()`方法执行一个简单的数据库查找，以确定两个用户之间是否存在关联记录。`hasFriend()`是同一方法的便捷静态表示。如果我们将它集成到搜索页面中，结果应类似于清单17-12所示。\n\
    \n**清单17-12.** `application/views/users/search.html`（摘录）\n\n```html\n<table>\n\
    <tr>\n<th>Name</th>\n<th>&nbsp;</th>\n</tr>\n{foreach $row in $users}\n<tr>\n\
    <td>{echo $row->first} {echo $row->last}</td>\n<td>\n{if User::hasFriend($user->id,\
    \ $row->id)}\n<a href=\"/unfriend/{echo $row->id}.html\">unfriend</a>\n{/if}\n\
    {else}\n<a href=\"/friend/{echo $row->id}.html\">friend</a>\n{/else}\n</td>\n\
    </tr>\n{/foreach}\n</table>\n```\n\n有了这些新方法，显示正确的链接就变得轻而易举了。它们也完成了本节内容，因为我们现在可以轻松地搜索并添加新好友。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第17章 ■ 分享\n\n**注意**：在添加新链接之前，最好先检查用户之间是否已存在关联。\n\
    \n分享\n\n分享是一件非常重要的事情。可以说，它是人们使用社交网络的首要原因。我们将创建一个让用户分享状态消息的功能。我们甚至允许用户对分享的消息进行评论，并在每个用户的活动信息流中展示所有相关消息。\n\
    \n为了存储消息信息，我们需要创建另一个模型，如清单17-13所示。\n\n**清单17-13.** `Message`模型\n\n```php\nclass\
    \ Message extends Shared\\Model\n{\n    /**\n     * @column\n     * @readwrite\n\
    \     * @type text\n     * @length 256\n     *\n     * @validate required\n  \
    \   * @label body\n     */\n    protected $_body;\n\n    /**\n     * @column\n\
    \     * @readwrite\n     * @type integer\n     */\n    protected $_message;\n\n\
    \    /**\n     * @column\n     * @readwrite\n     * @type integer\n     */\n \
    \   protected $_user;\n}\n```\n\n此消息模型期望的数据库表如清单17-14所示。\n\n**清单17-14.** `message`表\n\
    \n```sql\nCREATE TABLE `message` (\n  `user` int(11) DEFAULT NULL,\n  `message`\
    \ int(11) DEFAULT NULL,\n  `body` text DEFAULT NULL,\n  `id` int(11) NOT NULL\
    \ AUTO_INCREMENT,\n  `live` tinyint(4) DEFAULT NULL,\n  `deleted` tinyint(4) DEFAULT\
    \ NULL,\n  `created` datetime DEFAULT NULL,\n  `modified` datetime DEFAULT NULL,\n\
    \  PRIMARY KEY (`id`),\n  KEY `live` (`live`),\n  KEY `deleted` (`deleted`)\n\
    ) ENGINE=InnoDB DEFAULT CHARSET=utf8\n```\n\n每条消息都有一个正文，属于一个用户，并且可以关联到另一条消息（即之前分享的消息）。创建实际消息非常简单：我们首先需要修改主页，以便向当前用户展示所有相关的、已分享的消息。"
  raw: 'The _secure() has an @protected flag that will allow the Inspector class to
    discover it, while disallowing access through the router. This means that _secure(),
    while not accessible from a routing point of view, will be run before both the
    friend() and unfriend() actions. If the user session is not present, the user
    will be redirected to the login page.


    ■ **Note** it only makes sense to redirect to /login.html if your application
    is in the webroot. if it is within another folder, then a destination such as
    /site/login.html makes more sense. Be sure to secure the settings and profile
    actions, as these should also require a valid user session.


    Being able to make friends isn’t nearly as important as knowing who your friends
    are! At this point, we can use the friend/unfriend methods to modify database
    rows, but we also need to be able to tell whether another user is a friend of
    the current user. What we need to add, to the User model, is a method that will
    tell us this. Take a look at Listing 17–11 to see how we accomplish this.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 17 ■ SHARing


    ***Listing 17–11.*** The isFriend()/hasFriend() Methods


    public function isFriend($id)


    {


    $friend = Friend::first(array(


    "user" => $this->getId(),


    "friend" => $id


    ));


    if ($friend)


    {


    return true;


    }


    return false;


    }


    public static function hasFriend($id, $friend)


    {


    $user = new self(array(


    "id" => $id


    ));


    return $user->isFriend($friend);


    }


    The isFriend() method does a simple database lookup to see where a linking record
    exists between the two users. The hasFriend() method is a convenient, static representation
    of the same method. If we plug this into our search page, it should look something
    like that shown in Listing 17–12.


    ***Listing 17–12.*** application/views/users/search.html (Extract)


    <table>


    <tr>


    <th>Name</th>


    <th>&nbsp;</th>


    </tr>


    {foreach $row in $users}


    <tr>


    <td>{echo $row->first} {echo $row->last}</td>


    <td>


    {if User::hasFriend($user->id, $row->id)}


    <a href="/unfriend/{echo $row->id}.html">unfriend</a>


    {/if}


    {else}


    <a href="/friend/{echo $row->id}.html">friend</a>


    {/else}


    </td>


    </tr>


    {/foreach}


    </table>


    With these new methods, displaying the correct link is an easy task. They also
    complete this section, as we can now easily search for and add new friends.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 17 ■ SHARing


    ■ **Note** it would be a good idea to first check for preexisting links between
    users, before adding new ones.


    Sharing


    Sharing is a pretty huge deal. It is arguably the number-one reason people even
    use social networks in the first place. We are going to be creating a means for
    users to share status messages. We’ll even allow them to comment on shared messages,
    and present all relevant messages in an activity feed for each user.


    In order to store the message information, we need to create another model, as
    shown in Listing 17–13.


    ***Listing 17–13.*** The Message Model


    class Message extends Shared\Model


    {


    /**


    * @column


    * @readwrite


    * @type text


    * @length 256


    *


    * @validate required


    * @label body


    */


    protected $_body;


    /**


    * @column


    * @readwrite


    * @type integer


    */


    protected $_message;


    /**


    * @column


    * @readwrite


    * @type integer


    */


    protected $_user;


    }


    This message model expects the database table shown in Listing 17–14.


    ***Listing 17–14.*** The message table


