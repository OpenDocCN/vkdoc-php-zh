- fmt: "# Chapter 16: Product Reviews\n\nAt this point, you have a complete and functional\
    \ e-commerce web site. However, this doesn’t stop you from adding even more features\
    \ to it, making it more useful and pleasant for visitors.\n\nBy adding a product\
    \ review system to your web site, you increase the chances that visitors will\
    \ get back to your site, either to write a review for a product they bought, or\
    \ to see what other people think about that product.\n\nA review system can also\
    \ help you learn your customers’ tastes, which enables you to improve the product\
    \ recommendations, and even make changes in the web site or the structure of the\
    \ product catalog based on customer feedback.\n\nTo make things easy for both\
    \ you and the customer, you’ll add the list of product reviews and the form to\
    \ add a new product review to the products’ details pages. The form to add a new\
    \ product shows up only for registered users because we decided not to allow anonymous\
    \ reviews (however, you can easily change this if you like). You’ll create the\
    \ code for this new feature in the usual way, starting from the database and finishing\
    \ with the user interface (UI). The final result of your work in this chapter\
    \ will look like Figure 16-1.\n\n![Figure 16-1](images/00044.png)\n\n**Figure\
    \ 16-1.** *The product details page containing product reviews*\n\n## Implementing\
    \ the Data Tier\n\nFor your review system, you have to create a `review` table\
    \ and two data tier functions in your `hatshop` database. The `catalog_get_product_reviews`\
    \ function retrieves the reviews for a specific product, and the `catalog_create_product_review`\
    \ method adds a review to a product.\n\n### Exercise: Adding Support for Customer\
    \ Reviews to the Database\n\n1. Load pgAdmin III, and connect to the `hatshop`\
    \ database.\n2. Click **Tools ➤ Query tool** (or click the SQL button on the toolbar).\
    \ A new query window should appear.\n3. Use the query tool to execute this code,\
    \ which adds the `review` table in your `hatshop` database:\n\n```sql\n-- Create\
    \ review table\nCREATE TABLE review\n(\n  review_id SERIAL NOT NULL,\n  customer_id\
    \ INTEGER NOT NULL,\n  product_id INTEGER NOT NULL,\n  review TEXT NOT NULL,\n\
    \  rating SMALLINT NOT NULL,\n  created_on TIMESTAMP NOT NULL,\n  CONSTRAINT pk_review_id\
    \ PRIMARY KEY (review_id),\n  CONSTRAINT fk_customer_id FOREIGN KEY (customer_id)\n\
    \    REFERENCES customer (customer_id)\n    ON UPDATE RESTRICT ON DELETE RESTRICT,\n\
    \  CONSTRAINT fk_product_id FOREIGN KEY (product_id)\n    REFERENCES product (product_id)\n\
    \    ON UPDATE RESTRICT ON DELETE RESTRICT\n);\n```\n\n4. Execute the following\
    \ code, which creates the `review_info` type and the `catalog_get_product_review`\
    \ function in your `hatshop` database:\n\n```sql\n-- Create review_info type\n\
    CREATE TYPE review_info AS\n(\n  customer_name VARCHAR(50),\n  review TEXT,\n\
    \  rating SMALLINT,\n  created_on TIMESTAMP\n);\n\n-- Create catalog_get_product_reviews\
    \ function\nCREATE FUNCTION catalog_get_product_reviews(INTEGER)\nRETURNS SETOF\
    \ review_info LANGUAGE plpgsql AS $$\nDECLARE\n  inProductId ALIAS FOR $1;\n \
    \ outReviewInfoRow review_info;\nBEGIN\n  FOR outReviewInfoRow IN\n    SELECT\
    \ c.name, r.review, r.rating, r.created_on\n    FROM review r\n    INNER JOIN\
    \ customer c\n      ON c.customer_id = r.customer_id\n    WHERE r.product_id =\
    \ inProductId\n    ORDER BY r.created_on DESC\n  LOOP\n    RETURN NEXT outReviewInfoRow;\n\
    \  END LOOP;\nEND;\n$$;\n```\n\nThe `catalog_get_product_review` function retrieves\
    \ the reviews for the product identified by the `inProductId` parameter. You also\
    \ need the name of the reviewer so we made an `INNER JOIN` with the `customer`\
    \ table.\n\n5. Use the query tool to execute this code, which adds the `catalog_create_product_review`\
    \ function in your `hatshop` database:\n\n```sql\n-- Create catalog_create_product_review\
    \ function\n```"
