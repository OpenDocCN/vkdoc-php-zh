    \n## 技巧 3-12. 处理复数\n\n### 问题\n\nPHP 和许多其他编程语言并不原生支持复数。在计算电子电路的阻抗时，需要使用复数。\n\n\
    ### 解决方案\n\nPHP 不支持运算符重载，也没有对复数的原生支持，但仍然可以创建对象来处理复数运算的各种操作。\n\n### 工作原理\n\n复数包含两个部分，可以表示为一个具有实部和虚部的对象。它们通常写作\
    \ `r + i*j`，其中 `r` 是实部，`j` 是虚部，`i` 是-1 的平方根得到的虚数单位。下面的示例实现了加法和减法，以及一个用于在字符串上下文中处理对象的魔术函数。\n\
    \n```php\n<?php\n// 3_26.php\n\nclass Complex {\n    public $re;\n    public $im;\n\
    \n    function __construct($re, $im) {\n        $this->re = $re;\n        $this->im\
    \ = $im;\n    }\n\n    static function Add(Complex $c1, Complex $c2) {\n     \
    \   return new Complex($c1->re + $c2->re, $c1->im + $c2->im);\n    }\n\n    static\
    \ function Subtract(Complex $c1, Complex $c2) {\n        return new Complex($c1->re\
    \ - $c2->re, $c1->im - $c2->im);\n    }\n\n    function __toString() {\n     \
    \   return $this->re . \" + \" . $this->im . \"i\";\n    }\n}\n\n$c1 = new Complex(1,\
    \ -2);\n$c2 = new Complex(3, 5);\n$c3 = Complex::Add($c1, $c2);\n$c4 = Complex::Subtract($c2,\
    \ $c1);\n\necho \"$c1\\n$c2\\n\";\n```\n\n-1i  \n8i\n\n这是一个简单的复数运算实现，仅实现了加法和减法。如需更完整的实现，请查看\
    \ PEAR 模块 `Math_Complex`，位于 [`pear.php.net/package/Math_Complex/`](http://pear.php.net/package/Math_Complex/)。\n\
    \n## 数学扩展\n\n通过安装 GNU MP (`gmp`) 和/或 Binary Calculator Math (`bcmath`) 扩展，可以处理超出所用\
    \ PHP 版本精度的大数。这些数字将以字符串形式表示。`gmp` 扩展用于任意长度的整数，而 `bcmath` 扩展用于任意精度的数字。\n\n# 第 4\
    \ 章  \n## 处理数组\n\n数组在 PHP 编程中扮演着核心角色。许多函数返回数组，并且数组常用于处理配置。基本数组是一个键值对列表，键可以是整数或字符串，值可以是任何变量类型，包括数组。\n\
    \n## 技巧 4-1. 创建数组\n\n### 问题\n\n在 PHP 中，数组被视为一种基本数据类型。无需调用任何函数或实例化任何对象，即可创建具有数组值的变量。\n\
    \n### 解决方案\n\nPHP 使用语言结构 `array()` 来创建数组。如果将值 `array()` 赋给一个变量，就会创建一个空数组，即没有任何元素的数组。此外，还可以在括号内包含一个以逗号分隔的\
    \ `key => value` 对列表，以创建一个已经包含值的数组。如果定义中省略了键，PHP 将从 0 开始自动分配数值作为键。\n\n如上所述，键可以是整数或字符串。如果使用了其他类型的键，PHP\
    \ 会自动进行类型转换。浮点数和布尔值将被转换为整数。\n\n`null` 值将被转换为空字符串，而有效的数值字符串（如 `\"7\"`）也会被转换为整数。字符串\
    \ `\"07\"` 不会被转换，因为 `07` 不是有效的十进制数。\n\n数组中的键不必都是相同类型。值也是如此。它们可以混合使用，因为数组中的每个元素都像其他变量一样被对待，与其他元素或其他变量没有关联。\n\
    \n从 PHP 5.3 版本开始，可以使用简写语法来创建数组。这是通过方括号 `[]` 实现的，就像在 JavaScript 中一样。\n\n要访问数组中的特定元素，需要知道其键。键值放在变量名后的方括号中，例如\
    \ `$b = $a['key'];`。这将把键 `'key'` 对应的元素值赋给变量 `$b`。如果该数组元素本身也是一个数组，可以通过添加第二组包含键值的方括号来访问该数组中的元素，例如\
    \ `$b = $a['key']['key2'];`。只要元素是数组，就可以重复此操作。\n\n### 工作原理\n\n下面的示例展示了六个不同数组的例子。\n\
    \n```php\n<?php\n// 4_1.php\n\n$a = array();               // 空数组\n$b = [];  \
    \                  // 空数组\n$c = array(1, 2, 3, 4, 5);\n$d = array(5 => 'Orange',\
    \ 'Apple', 'Banana', 'test' => 5);\n$e = array(\n    'host'     => 'localhost',\n\
    \    'database' => 'orders',\n    'user'     => 'root',\n    'password' => 'secret',\n\
    );\n$f = [\n    'host'     => 'localhost',\n    'database' => 'orders',\n    'user'\
    \     => 'root',\n    'password' => 'secret',\n];\n```\n\n前两个数组是空数组，没有任何元素。第三个数组包含五个整数元素，键从\
    \ 0 开始自动分配，到 4 结束。在第四个数组中，键是混合的，第一个键被定义为 5，因此后续的键将自动分配为 6 和 7，最后一个元素的键是字符串值。\n\
    \n最后两个数组是相同的，它们只是分别用短语法和长语法创建的，就像前两个数组一样。\n\n创建数组时，元素按创建顺序存储。如果值是自动分配的，它们将从 0\
    \ 或上一个使用的数值键开始递增。\n\n```php\n<?php\n// 4_2.php\n\n$a = [1, 2, 5=>3, 4, 5, 10 =>\
