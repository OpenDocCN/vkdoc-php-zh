  trans: '表 16-7. `DateInterval` 类使用的 ISO 8601 周期标识符


    | 周期标识符 | 含义                     |

    | :--------- | :----------------------- |

    | `Y`        | 年                       |

    | `M`        | 月                       |

    | `W`        | 周——不能与天数组合       |

    | `D`        | 天——不能与周数组合       |

    | `H`        | 小时                     |

    | `M`        | 分钟                     |

    | `S`        | 秒                       |


    以下示例应阐明如何指定时间间隔：


    ```

    $interval1 = new DateInterval(''P2Y'');           // 2 years

    $interval2 = new DateInterval(''P5W'');           // 5 weeks

    $interval3 = new DateInterval(''P37D'');          // 5 weeks 2 days

    $interval4 = new DateInterval(''PT6H20M'');       // 6 hours 20 minutes

    $interval5 = new DateInterval(''P1Y2DT3H5M50S''); // 1 year 2 days 3 hours 5 min
    50 sec

    ```


    请注意，`$interval3` 需要指定总天数，因为周会自动转换为天，因此在同一个时间间隔定义中不能组合使用 `W` 和 `D`。


    要将 `DateInterval` 对象与 `DateTime` 类的 `add()` 或 `sub()` 方法一起使用，请将该对象作为参数传递。例如，这将为
    2019 年圣诞节的日期增加 12 天：


    ```

    $xmas2019 = new DateTime(''12/25/2019'');

    $interval = new DateInterval(''P12D'');

    $xmas2019->add($interval);

    ```


    如果不需要重复使用此间隔，你可以直接将 `DateInterval` 构造函数作为参数传递给 `add()`，如下所示：


    ```

    $xmas2019 = new DateTime(''12/25/2019'');

    $xmas2019->add(new DateInterval(''P12D''));

    ```


    此计算的结果在 `date_interval_01.php` 中演示，并产生以下输出：

    ![../images/332054_4_En_16_Chapter/332054_4_En_16_Fige_HTML.jpg](img/332054_4_En_16_Fige_HTML.jpg)


    使用表 16-7 中列出的周期标识符的替代方法是使用静态的 `createFromDateString()` 方法，该方法接受一个英文的相对日期字符串作为参数，方式与
    `strtotime()` 相同。使用 `createFromDateString()`，前面的示例可以重写如下（代码在 `date_interval_02.php`
    中）：


    ```

    $xmas2014 = new DateTime(''12/25/2014'');

    $xmas2014->add(DateInterval::createFromDateString(''+12 days''));

    ```


    这会得到完全相同的结果。


    **小心**

    使用 `DateInterval` 加减月份的效果与前面描述的一致。如果结果日期超出了范围，则会增加额外的天数。例如，在 1 月 31 日上加一个月，结果会是
    3 月 3 日或 2 日，具体取决于是否是闰年。要获取该月的最后一天，请使用前面在“使用相对日期处理溢出”中描述的技术。


    ### 使用 `diff()` 方法查找两个日期之间的差异


    要查找两个日期之间的差异，请为两个日期分别创建一个 `DateTime` 对象，然后将第二个对象作为参数传递给第一个对象的 `diff()` 方法。结果将作为一个
    `DateInterval` 对象返回。要从 `DateInterval` 对象中提取结果，你需要使用该对象的 `format()` 方法，该方法使用表 16-8
    中列出的格式字符。这些字符与 `DateTime` 类使用的格式字符不同。幸运的是，其中大部分都很容易记住。


    表 16-8. `DateInterval format()` 方法使用的格式字符


    | 格式字符 | 描述                               | 示例        |

    | :------- | :--------------------------------- | :---------- |

    | `%Y`     | 年，至少两位，必要时前导零         | 12, 01      |

    | `%y`     | 年，无前导零                       | 12, 1       |

    | `%M`     | 月，带前导零                       | 02, 11      |

    | `%m`     | 月，无前导零                       | 2, 11       |

    | `%D`     | 日，带前导零                       | 03, 24      |

    | `%d`     | 日，无前导零                       | 3, 24       |

    | `%a`     | 总天数                             | 15, 231     |

    | `%H`     | 小时，带前导零                     | 03, 23      |

    | `%h`     | 小时，无前导零                     | 3, 23       |

    | `%I`     | 分钟，带前导零                     | 05, 59      |

    | `%i`     | 分钟，无前导零                     | 5, 59       |

    | `%S`     | 秒，带前导零                       | 05, 59      |

    | `%s`     | 秒，无前导零                       | 5, 59       |

    | `%R`     | 负数显示负号，正数显示正号         | -, +        |

    | `%r`     | 负数显示负号，正数不显示符号       | -           |

    | `%%`     | 百分号                             | %           |


    `date_interval_03.php` 中的以下示例展示了如何使用 `diff()` 获取当前日期与美国《独立宣言》签署日期之间的差异，并使用 `format()`
    方法显示结果：


    ```

    diff($independence);

    echo $interval->format(''%Y years %m months %d days''); ?>

    since American Declaration of Independence.

    ```


    如果将 `date_interval_03.php` 加载到浏览器中，您应该会看到类似于以下截图的内容（当然，实际时间段会有所不同）。

    ![../images/332054_4_En_16_Chapter/332054_4_En_16_Figf_HTML.jpg](img/332054_4_En_16_Figf_HTML.jpg)

    格式字符遵循逻辑模式。大写字符始终产生至少两位数字，必要时带有前导零。小写字符没有前导零。


    **小心**

    除了表示总天数的 `%a` 之外，其他格式字符仅表示整个时间间隔的特定部分。例如，如果将格式字符串更改为 `$interval->format(''%m months'')`，它将只显示自上个
    7 月 4 日以来经过的整月数。它不会显示自 1776 年 7 月 4 日以来的总月数。


    ### 使用 `DatePeriod` 类计算重复日期


    由于 `DatePeriod` 类的出现，计算重复日期（例如每个月的第二个星期二）现在变得异常简单。它与 `DateInterval` 协同工作。


    `DatePeriod` 构造函数比较特殊，因为它可以以三种不同的方式接受参数。创建 `DatePeriod` 对象的第一种方法是提供以下参数：


    -   一个表示开始日期的 `DateTime` 对象

    -   一个表示重复间隔的 `DateInterval` 对象

    -   一个表示重复次数的整数

    -   `DatePeriod::EXCLUDE_START_DATE` 常量（可选）


    创建 `DatePeriod` 对象后，您可以在 `foreach` 循环中使用 `DateTime` 的 `format()` 方法来显示重复日期。


    `date_interval_04.php` 中的代码显示 2019 年每个月的第二个星期二：


    ```

    $start = new DateTime(''12/31/2018'');

    $interval = DateInterval::createFromDateString(''second Tuesday of next month'');

    $period = new DatePeriod($start, $interval, 12, DatePeriod::EXCLUDE_START_DATE);

    foreach ($period as $date) {

    echo $date->format(''l, F jS, Y'') . '''';

    }

    ```


    它产生的输出如图 16-11 所示。


    ![../images/332054_4_En_16_Chapter/332054_4_En_16_Fig11_HTML.jpg](img/332054_4_En_16_Fig11_HTML.jpg)


    **图 16-11.** 使用 `DatePeriod` 类计算重复日期异常简单


    PHP 代码的第一行将开始日期设置为 2018 年 12 月 31 日。下一行使用 `DateInterval` 的静态方法 `createFromDateString()`
    将间隔设置为下个月的第二个星期二。这两个值与表示重复次数的整数 12 以及常量 `DatePeriod::EXCLUDE_START_DATE` 一起传递给
    `DatePeriod` 构造函数。该常量的名称不言自明。最后，一个 `foreach` 循环使用 `DateTime` 的 `format()` 方法显示结果日期。


    创建 `DatePeriod` 对象的第二种方法是用一个表示结束日期的 `DateTime` 对象替换第三个参数中的重复次数。`date_interval_05.php`
    中的代码已按如下方式修改：


    ```

    $start = new DateTime(''12/31/2018'');

    $interval = DateInterval::createFromDateString(''second Tuesday of next month'');

    $end = new DateTime(''12/31/2019'');

    $period = new DatePeriod($start, $interval, $end, DatePeriod::EXCLUDE_START_DATE);

    foreach ($period as $date) {

    echo $date->format(''l, F jS, Y'') . '''';

    }

    ```


    这将产生与图 16-11 完全相同的输出。'
- fmt: "你可以使用 ISO 8601 重复时间间隔标准（[`https://en.wikipedia.org/wiki/ISO_8601#Repeating_intervals`](https://en.wikipedia.org/wiki/ISO_8601%2523Repeating_intervals)）来创建一个\
    \ `DatePeriod` 对象。这种方式不太直观，主要是因为需要以正确的格式构造一个字符串，其格式如下：\n\n```\nRn/YYYY-MM-DDTHH:MM:SStz/Pinterval\n\
    ```\n\n`R`*n* 是字母 `R` 后跟重复次数；*tz* 是相对于 UTC 的时区偏移量（或 `Z` 表示 UTC，如以下示例所示）；`P`*interval*\
    \ 使用与 `DateInterval` 类相同的格式。`date_interval_06.php` 中的代码展示了如何使用 ISO 8601 重复间隔的\
    \ `DatePeriod`。代码如下：\n\n```\n$period = new DatePeriod('R4/2019-07-10T00:00:00Z/P10D');\n\
    foreach ($period as $date) {\n    echo $date->format('l, F j, Y') . '';\n}\n```\n\
    \nISO 重复间隔设置了从 2019 年 7 月 10 日 UTC 时间午夜开始、间隔为 10 天的四次重复。重复次数是在原始日期之后进行的，因此上述示例产生了五个日期，如以下输出所示。\n\
    ![../images/332054_4_En_16_Chapter/332054_4_En_16_Figg_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Figg_HTML.jpg)\n\
    \n## Chapter Review\n\n本章的很大一部分内容都致力于介绍 PHP 5 中引入的强大日期和时间类。我没有介绍 `DateTimeImmutable`\
    \ 类，因为除了一个方面之外，它在其他所有方面都与 `DateTime` 相同。`DateTimeImmutable` 对象从不修改自身。相反，它总是返回一个包含修改后值的新对象。如果你有一个不会变化的日期（例如某人的出生日期），这会非常有用。对此类对象使用\
    \ `setDate()` 或 `add()` 方法会返回一个新对象，从而在保留原始细节的同时，为更新后的细节（如入职日期、结婚日期、退休年龄等）提供一个新对象。\n\
    \n你可能并不每天都用到日期和时间相关的类，但它们非常有用。MySQL 的日期和时间函数也使得根据时间条件格式化日期和执行查询变得容易。\n\n日期最大的问题或许在于决定是使用\
    \ SQL 还是 PHP 来处理格式化和/或计算。PHP 的 `DateTime` 类的一个有用特性是，其构造函数接受以 ISO 格式存储的日期，因此你可以使用数据库中未格式化的日期或时间戳来创建\
    \ `DateTime` 对象。但是，除非你需要执行进一步的计算，否则在 `SELECT` 查询中使用 `DATE_FORMAT()` 函数会更高效。\n\n\
    本章还为你提供了三个用于格式化文本和日期的函数。在下一章中，你将学习如何在多个数据库表中存储和检索相关信息。\n\n## 17. 从多个表中提取数据\n\n\
    正如我在第 [13](#332054_4_En_13_Chapter.xhtml) 章中所解释的，关系型数据库的主要优势之一是能够通过使用一个表中的主键作为另一个表中的外键来链接不同表中的数据。`phpsols`\
    \ 数据库有两个表：`images` 和 `blog`。现在是时候添加更多表并进行连接了，这样你就可以为博客条目分配类别，并将图像与单个文章关联起来。\n\n\
    你实际上并不需要物理连接多个表，而是通过 SQL 来实现连接。通常，你可以通过识别主键和外键之间的直接关系来连接表。然而，在某些情况下，关系更为复杂，需要通过第三个表作为另外两个表之间的交叉引用来实现。\n\
    \n在本章中，你将学习如何建立表之间的关系，以及如何将一个表中的主键作为外键插入到另一个表中。尽管从概念上听起来很困难，但实际上相当简单——你使用数据库查询在第一个表中查找主键，保存结果，然后在另一个查询中使用该结果将其插入到第二个表中。\n\
    \n具体来说，你将了解以下内容：\n\n*   理解不同类型的表关系\n*   使用交叉引用表实现多对多关系\n*   修改表结构以添加新列或索引\n* \
    \  将主键作为外键存储在另一个表中\n*   使用 `INNER JOIN` 和 `LEFT JOIN` 链接表\n\n### 理解表关系\n\n最简单的关系类型是**一对一**（通常表示为\
    \ **1:1**）。这种类型的关系常见于包含仅供特定人员查看信息的数据库中。例如，公司通常将员工的薪资和其他机密信息存储在一个表中，该表与更广泛可访问的员工列表分开。将每个员工记录的主键作为外键存储在薪资表中，就在这两个表之间建立了直接关系，从而允许财务部门查看全部信息，同时限制其他人只能查看公共信息。\n\
    \n`phpsols` 数据库中没有任何机密信息，但你可能会在 `images` 表中的单个照片与 `blog` 表中的一篇文章之间创建一对一关系，如图 17-1\
    \ 所示。\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig1_HTML.jpg](images/332054_4_En_17_Chapter/332054_4_En_17_Fig1_HTML.jpg)\n\
    \n**图 17-1.** 一对一关系将一个记录直接链接到另一个记录\n\n这是在两个表之间创建关系的最简单方法，但并不理想。随着更多文章的加入，关系的性质很可能会发生变化。图\
    \ [17-1](#332054_4_En_17_Chapter.xhtml#Fig1) 中与第一篇文章关联的照片显示的是漂浮在水面上的枫叶，因此它可能适合用来图解一篇关于季节变换或秋色的文章。清澈的水、竹制水舀和竹管也暗示了其他可以用这张照片来阐释的主题。因此，你很可能会遇到同一张照片被用于多篇文章的情况，即**一对多**（或\
    \ **1:n**）关系，如图 17-2 所示。\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig2_HTML.jpg](images/332054_4_En_17_Chapter/332054_4_En_17_Fig2_HTML.jpg)\n\
    \n**图 17-2.** 一对多关系将一个记录链接到多个其他记录"
  raw: "You can also create a `DatePeriod` object\nusing the ISO 8601 recurring time-interval\
    \ standard ( [`https://en.wikipedia.org/wiki/ISO_8601#Repeating_intervals`](https://en.wikipedia.org/wiki/ISO_8601%2523Repeating_intervals)\
    \ ). This is not as user-friendly, mainly because of the\nneed to construct a\
    \ string in the correct format, which looks like this:\n\n```\nRn/YYYY-MM-DDTHH:MM:SStz/Pinterval\n\
    ```\n\n`R`*n* is\nthe letter `R`\nfollowed by the number of recurrences; *tz*\
    \ is the time zone\noffset from UTC (or `Z` for UTC, as shown\nin the following\
    \ example); and `P`*interval*\nuses the same format as the `DateInterval` class.\n\
    The code in `date_interval_06.php`\nshows an example of how to use `DatePeriod`\
    \ with an\nISO 8601 recurring interval. It looks like this:\n\n```\n$period =\
    \ new DatePeriod('R4/2019-07-10T00:00:00Z/P10D');\nforeach ($period as $date)\
    \ {\necho $date->format('l, F j, Y') . '';\n}\n```\n\nThe ISO recurring interval\
    \ sets four recurrences from midnight UTC on\nJuly 10, 2019, at an interval of\
    \ 10 days. The recurrences are subsequent\nto the original date, so the preceding\
    \ example produces five dates, as\nshown in the following output.\n![../images/332054_4_En_16_Chapter/332054_4_En_16_Figg_HTML.jpg](images/332054_4_En_16_Chapter/332054_4_En_16_Figg_HTML.jpg)\n\
    \nChapter Review\nA large part of this chapter has been devoted to the powerful\
    \ date\nand time classes introduced in PHP 5\\. I haven’t covered the `DateTimeImmutable`\n\
    class because it’s identical to `DateTime` in every\nrespect except one. A `DateTimeImmutable`\n\
    object never modifies itself. Instead, it always returns a new object\nwith the\
    \ modified values. This can be useful if you have a date, such as\na person’s\
    \ date of birth, which never changes. Using the `setDate()` or `add()` methods\
    \ with\nthis type of object returns a new object, preserving the original\ndetails\
    \ and providing a new object for the updated ones, such as start\nof employment,\
    \ marriage, pensionable age, and so on.\nYou probably don’t need the date- and\
    \ time-related classes every day,\nbut they’re extremely useful. MySQL’s date\
    \ and time functions also make\nit easy to format dates and execute queries based\
    \ on temporal\ncriteria.\nPerhaps the biggest problem with dates is deciding whether\
    \ to use SQL\nor PHP to handle the formatting and/or calculations. A useful feature\
    \ of\nthe PHP `DateTime` class is\nthat the constructor accepts a date stored\
    \ in the ISO format, so you can\nuse an unformatted date or timestamp from your\
    \ database to create `DateTime` objects.\nHowever, unless you need to perform\
    \ further calculations, it’s more\nefficient to use the `DATE_FORMAT()`\nfunction\
    \ as part of a `SELECT` query.\nThis chapter has also provided you with three\
    \ functions for\nformatting text and dates. In the next chapter, you’ll learn\
    \ how to\nstore and retrieve related information in multiple database tables.\n\
    \n17. Pulling Data from Multiple\nTables\n\nAs I explained in Chapter [13](#332054_4_En_13_Chapter.xhtml),\
    \ one of the major strengths of a\nrelational database is the ability to link\
    \ data in different tables by\nusing the primary key from one table as a foreign\
    \ key in another table.\nThe `phpsols`\ndatabase has two tables: `images` and\
    \ `blog` . It’s time to add some\nmore and join them, so that you can assign categories\
    \ to blog entries\nand associate images with individual articles.\nYou don’t physically\
    \ join multiple tables, but rather do so through\nSQL. Often, you can join tables\
    \ by identifying a direct relationship\nbetween primary and\nforeign keys. In\
    \ some cases, though, the relationship is more\ncomplex and needs to go through\
    \ a third table that acts as a\ncross-reference between the other two.\nIn this\
    \ chapter, you’ll learn how to establish the relationship\nbetween tables and\
    \ how to insert the primary key from one table as a\nforeign key in another table.\
    \ Although it sounds difficult conceptually,\nit’s actually quite easy—you use\
    \ a database query to look up the primary\nkey in the first table, save the result,\
    \ and use that result in another\nquery to insert it in the second table.\n\n\
    In particular, you’ll learn about the following:\n\n*   Understanding the different\
    \ types of table relationships\n\n*   Using a cross-reference table for many-to-many\n\
    \    relationships\n\n*   Altering a table’s structure to add new columns or an\n\
    \    index\n\n*   Storing a primary key as a foreign key in another table\n\n\
    *   Linking tables with `INNER JOIN` and `LEFT JOIN`\n\nUnderstanding Table Relationships\n\
    The simplest type of relationship is  **one-to-one**\n (often represented as **1:1**).\
    \ This type of\nrelationship is often found in databases that contain information\
    \ only\ncertain people should see. For example, companies often store details\
    \ of\nemployees’ salaries and other confidential information in a table\nseparate\
    \ from the more widely accessible staff list. Storing the primary\nkey of each\
    \ staff member’s record as a foreign key in the salaries table\nestablishes a\
    \ direct relationship between the tables, allowing the\naccounts department to\
    \ see the full range of information while\nrestricting others to only the public\
    \ information.\n\nThere’s no confidential information in the `phpsols` database,\
    \ but\nyou might create a one-to-one relationship between a single photo in the\n\
    `images` table\nwith an article in the `blog` table, as\nillustrated by Figure\
    \ [17-1](#332054_4_En_17_Chapter.xhtml#Fig1).\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig1_HTML.jpg](images/332054_4_En_17_Chapter/332054_4_En_17_Fig1_HTML.jpg)\n\
    \nFigure 17-1.\nA one-to-one relationship links one record directly with another\n\
    \nThis is the simplest way of creating a relationship between the two\ntables,\
    \ but it’s not ideal. As more articles are added, the nature of\nthe relationship\
    \ is likely to change. The photo associated with the\nfirst article in Figure\
    \ [17-1](#332054_4_En_17_Chapter.xhtml#Fig1) shows maple\nleaves floating on the\
    \ water, so it might be suitable for illustrating\nan article about the changing\
    \ seasons or autumn hues. The crystal-clear\nwater, bamboo water scoop, and bamboo\
    \ pipe also suggest other themes\nthat the photo could be used to illustrate.\
    \ So you could easily end up\nwith the same photo being used for several articles,\
    \ or a  **one-to-many**\n (or **1:n**) relationship, as represented by Figure\n\
    [17-2](#332054_4_En_17_Chapter.xhtml#Fig2).\n\n![../images/332054_4_En_17_Chapter/332054_4_En_17_Fig2_HTML.jpg](images/332054_4_En_17_Chapter/332054_4_En_17_Fig2_HTML.jpg)\n\
    \nFigure 17-2.\nA one-to-many relationship links one record with several others"
