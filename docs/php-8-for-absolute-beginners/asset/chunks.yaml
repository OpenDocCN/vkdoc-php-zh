- fmt: "# Summary\n\nIn this chapter, we learned about operating systems and their\
    \ interactions with programs. We discovered how operating systems make our lives\
    \ easier as program developers. We learned a little bit about PHP, MySQL, and\
    \ Apache. We found out what they are and what role they play in the development\
    \ of dynamic websites. We completed a quick and easy installation of a fully functional\
    \ development environment on our local computer to create a safe and secure place\
    \ to test programs.\n\nIn the next chapter, we’ll learn a small but potent subset\
    \ of PHP, including variables, objects, and some native language constructs and\
    \ statements. Nearly everything you learn will be tested in your new development\
    \ environment, so keep XAMPP’s Apache Server open and running.\n\n## Projects\n\
    \n1. Create a simple PHP program which displays your name, address, and paragraph\
    \ of information about you using the `echo` instruction shown in this chapter.\n\
    2. Create a PHP program which displays HTML code within the `echo` instruction.\
    \ How could this be useful for dynamic websites?\n\n# Understanding PHP: Language\
    \ Basics\n\n## Objectives\n\nAfter completing this chapter, you will be able to:\n\
    \n- Embed PHP in web pages\n- Add comments in code\n- Create and use variables\n\
    - Decipher PHP errors\n- Create an HTML5 template\n- Create and use basic objects\n\
    - Concatenate strings\n- Access URL variables with `$_GET`\n- Declare a class\n\
    - Embed CSS\n\nIn the first chapter, we developed our very first PHP program.\
    \ While it was basic, we were able to test the development environment and even\
    \ display some information. As we stated, PHP is a powerful tool for creating\
    \ dynamic web applications. With this in mind, we will, over the next several\
    \ chapters, develop the skills to create a basic blog. The tools used to develop\
    \ a blog can also be used to create other dynamic sites. One goal of this book\
    \ is to “learn by doing.” Thus, we will use our examples and projects to build\
    \ our knowledge.\n\nAs a stepping stone to blog development, we first need to\
    \ determine how to create a basic dynamic website. In this chapter, we will create\
    \ a simple personal website with dynamic web pages. Along the way, we will learn\
    \ how to create, store, manipulate, and display data using PHP.\n\n**Note**: This\
    \ chapter discusses basic aspects of the PHP language, but not in complete detail.\
    \ Our goal is to develop skills which can help you be productive as quickly as\
    \ possible. For clarification, more examples, or for concept reinforcement, you\
    \ should visit the PHP manual at [`www.php.net`](http://www.php.net) and search\
    \ for additional information. Alternatively, you can search YouTube for demonstration\
    \ videos. Always check the PHP version discussed (PHP 8), as some PHP coding has\
    \ changed over time. Don’t forget to read the comments, because many of your fellow\
    \ programmers offer insight, tips, and even additional functions in their commentary.\n\
    \n## Embedding PHP Scripts\n\nIn Chapter 1, we mentioned that web servers look\
    \ for PHP only in files that end with the `.php` extension. But a `.php` file\
    \ can contain elements that aren’t part of our PHP script, and searching the entire\
    \ file for potential scripts can be confusing and resource intensive. To solve\
    \ this issue, all PHP scripts are provided between *PHP delimiters*. To begin\
    \ a PHP script, we start with the opening delimiter `<?php`. To complete a PHP\
    \ script, we add the closing delimiter `?>`. Anything outside of these delimiters\
    \ will be treated as HTML, CSS, JavaScript, or plain text by the web server.\n\
    \nLet’s look at some examples. First, we want to continue to keep our programs\
    \ organized, so let’s create a new folder, `ch2`, in `/xampp/htdocs/`. Using our\
    \ favorite editor, we will create a new file, `test.php`. Let’s enter the following\
    \ code within the file.\n\n```\nStatic Text\nThis text was generated by PHP!\"\
    ;\n?>\nThis text was not.\nListing 2-1\ntest.php\n```\n\nSave the file and then\
    \ test it by navigating to `http://localhost/ch2/test.php` in a browser.\n\n**Hint**:\
    \ Most PHP code lines require a semicolon at the end to indicate where the line\
    \ ends. Did you remember to include it at the end of the `echo` statement?\n\n\
    If we did not make any typing mistakes, our output should be similar to the following.\n\
    \n![](images/323857_3_En_2_Chapter/323857_3_En_2_Fig1_HTML.jpg)\n\nThis window\
    \ represents the result of executing the code in a test, the file is always saved\
    \ by using PHP format only.\n\n**Figure 2-1: test.php output**\n\nEven in this\
    \ simple program, we can discover several aspects. First, the display included\
    \ both the results of the browser parsing the HTML code and the results of the\
    \ PHP code being interpreted. The results from the PHP code were even displayed\
    \ in the same location (between the HTML results) as existed in the code itself.\
    \ The code inside the PHP delimiters was handled as a PHP script, but the code\
    \ outside was rendered as regular HTML. The PHP interpreter executed the PHP code,\
    \ while the browser executed the remaining code.\n\n### Program Design and Logic\n\
    \nThere is no limit to how many blocks of PHP you can include in a web page. However,\
    \ do not go overboard. All programmers should create clear organized code that\
    \ is as easy as possible to maintain. As a programmer, you will constantly modify\
    \ code. Make your experience easier by keeping the code clean and logical.\n\n\
    The following snippet is completely valid, but is it clean and logical?\n\n```\n\
    This is some text.\";\n?>\nSome of this text is static, \n\"; ?>\nThis text is\
    \ enclosed in paragraph tags that were generated by PHP.\n\"; ?>\nListing 2-2\n\
    test2.php\n```\n\nThe preceding code snippet outputs the following to the browser.\n\
    \n![](images/323857_3_En_2_Chapter/323857_3_En_2_Fig2_HTML.jpg)\n\nThis window\
    \ represents the result of executing the code in test2, the file is always saved\
    \ by using PHP format only.\n\n**Figure 2-2: test2.php output**\n\n### Program\
