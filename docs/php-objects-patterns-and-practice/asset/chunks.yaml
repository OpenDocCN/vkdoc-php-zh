- fmt: "### Sequence Diagrams\n\nA sequence diagram is object-based rather than class-based.\
    \ It is used to model a process in a system step-by-step.\n\nLet’s build up a\
    \ simple diagram, modeling the means by which a `Report` object writes product\
    \ data. A sequence diagram presents the participants of a system from left to\
    \ right (see Figure [6-18](#A314621_5_En_6_Chapter.html#Fig18)).\n\n![A314621_5_En_6_Fig18_HTML.gif](A314621_5_En_6_Fig18_HTML.gif)\n\
    \nFigure 6-18. Objects in a sequence diagram\n\nI have labeled my objects with\
    \ class names alone. If I had more than one instance of the same class working\
    \ independently in my diagram, I would include an object name using the format,\
    \ `label:class` (e.g., `product1:ShopProduct`).\n\nYou show the lifetime of the\
    \ process you are modeling from top to bottom, as in Figure [6-19](#A314621_5_En_6_Chapter.html#Fig19).\n\
    \n![A314621_5_En_6_Fig19_HTML.gif](A314621_5_En_6_Fig19_HTML.gif)\n\nFigure 6-19.\
    \ Object lifelines in a sequence diagram\n\nThe vertical broken lines represent\
    \ the lifetime of the objects in the system. The larger boxes that follow the\
    \ lifelines represent the focus of a process. If you read Figure [6-19](#A314621_5_En_6_Chapter.html#Fig19)\
    \ from top to bottom, you can see how the process moves among objects in the system.\
    \ This is hard to read without showing the messages that are passed between the\
    \ objects. I add these in Figure [6-20](#A314621_5_En_6_Chapter.html#Fig20).\n\
    \n![A314621_5_En_6_Fig20_HTML.gif](A314621_5_En_6_Fig20_HTML.gif)\n\nFigure 6-20.\
    \ The complete sequence diagram\n\nThe arrows represent the messages sent from\
    \ one object to another. Return values are often left implicit (although they\
    \ can be represented by a broken line, passing from the invoked object to the\
    \ message originator). Each message is labeled using the relevant method call.\
    \ You can be quite flexible with your labeling, although there is some syntax.\
    \ Square brackets represent a condition:\n\n```\n[okToPrint]\nwrite()\n```\n\n\
    This snippet means that the `write()` invocation should only be made if the correct\
    \ condition is met. An asterisk is used to indicate a repetition; optionally,\
    \ further clarification can be in square brackets:\n\n```\n*[for each ShopProduct]\n\
    write()\n```\n\nYou can interpret Figure [6-20](#A314621_5_En_6_Chapter.html#Fig20)\
    \ from top to bottom. First, a `Report` object acquires a list of `ShopProduct`\
    \ objects from a `ProductStore` object. It passes these to a `ShopProductWriter`\
    \ object, which stores references to them (though we can only infer this from\
    \ the diagram). The `ShopProductWriter` object calls `ShopProduct::getSummaryLine()`\
    \ for every `ShopProduct` object it references, adding the result to its output.\n\
    \nAs you can see, sequence diagrams can model processes, freezing slices of dynamic\
    \ interaction and presenting them with surprising clarity.\n\n> **Note:**  \n\
    > Look at Figures [6-16](#A314621_5_En_6_Chapter.html#Fig16) and [6-20](#A314621_5_En_6_Chapter.html#Fig20).\
    \ Notice how the class diagram illustrates polymorphism, showing the classes derived\
    \ from `ShopProductWriter` and `ShopProduct`. Now notice how this detail becomes\
    \ transparent when we model the communication among objects. Where possible, we\
    \ want objects to work with the most general types available, so that we can hide\
    \ the details of implementation.\n\n## Summary\n\nIn this chapter, I went beyond\
    \ the nuts and bolts of object-oriented programming to look at some key design\
    \ issues. I examined features such as encapsulation, loose coupling, and cohesion\
    \ that are essential aspects of a flexible and reusable object-oriented system.\
    \ I went on to look at the UML, laying groundwork that will be essential in working\
    \ with patterns later in the book.\n\n# Part II: Patterns\n\n# 7. What Are Design\
    \ Patterns? Why Use Them?\n\nMost problems we encounter as programmers have been\
    \ handled time and again by others in our community. Design patterns can provide\
    \ us with the means to mine that wisdom. Once a pattern becomes a common currency,\
    \ it enriches our language, making it easy to share design ideas and their consequences.\
    \ Design patterns simply distill common problems, define tested solutions, and\
    \ describe likely outcomes. Many books and articles focus on the details of computer\
    \ languages, such as the available functions, classes and methods, and so on.\
    \ Pattern catalogs concentrate instead on how you can move on from these basics\
    \ (the “what”) to an understanding of the problems and potential solutions in\
    \ your projects (the “why” and “how”).\n\nIn this chapter, I introduce you to\
    \ design patterns and look at some of the reasons for their popularity.\n\nThis\
    \ chapter will cover the following:\n\n*   Pattern basics: What are design patterns?\n\
    *   Pattern structure: What are the key elements of a design pattern?\n*   Pattern\
    \ benefits: Why are patterns worth your time?"
  raw: '### Sequence Diagrams


    A sequence diagram is object-based rather than class-based. It is used to model
    a process in a system step-by-step.


    Let’s build up a simple diagram, modeling the means by which a `Report` object
    writes product data. A sequence diagram presents the participants of a system
    from left to right (see Figure [6-18](#A314621_5_En_6_Chapter.html#Fig18)).


    ![A314621_5_En_6_Fig18_HTML.gif](A314621_5_En_6_Fig18_HTML.gif)


    Figure 6-18.


    Objects in a sequence diagram


    I have labeled my objects with class names alone. If I had more than one instance
    of the same class working independently in my diagram, I would include an object
    name using the format, `label:class` (e.g., `product1:ShopProduct`).


    You show the lifetime of the process you are modeling from top to bottom, as in
    Figure [6-19](#A314621_5_En_6_Chapter.html#Fig19).


    ![A314621_5_En_6_Fig19_HTML.gif](A314621_5_En_6_Fig19_HTML.gif)


    Figure 6-19.


    Object lifelines in a sequence diagram


    The vertical broken lines represent the lifetime of the objects in the system.
    The larger boxes that follow the lifelines represent the focus of a process. If
    you read Figure [6-19](#A314621_5_En_6_Chapter.html#Fig19) from top to bottom,
    you can see how the process moves among objects in the system. This is hard to
    read without showing the messages that are passed between the objects. I add these
    in Figure [6-20](#A314621_5_En_6_Chapter.html#Fig20).


    ![A314621_5_En_6_Fig20_HTML.gif](A314621_5_En_6_Fig20_HTML.gif)


    Figure 6-20.


    The complete sequence diagram


    The arrows represent the messages sent from one object to another. Return values
    are often left implicit (although they can be represented by a broken line, passing
    from the invoked object to the message originator). Each message is labeled using
    the relevant method call. You can be quite flexible with your labeling, although
    there is some syntax. Square brackets represent a condition:


    ```

    [okToPrint]

    write()

    ```


    This snippet means that the `write()` invocation should only be made if the correct
    condition is met. An asterisk is used to indicate a repetition; optionally, further
    clarification can be in square brackets:


    ```

    *[for each ShopProduct]

    write()

    ```


    You can interpret Figure [6-20](#A314621_5_En_6_Chapter.html#Fig20) from top to
    bottom. First, a `Report` object acquires a list of `ShopProduct` objects from
    a `ProductStore` object. It passes these to a `ShopProductWriter` object, which
    stores references to them (though we can only infer this from the diagram). The
    `ShopProductWriter` object calls `ShopProduct::getSummaryLine()` for every `ShopProduct`
    object it references, adding the result to its output.


    As you can see, sequence diagrams can model processes, freezing slices of dynamic
    interaction and presenting them with surprising clarity.


    Note


    Look at Figures [6-16](#A314621_5_En_6_Chapter.html#Fig16) and [6-20](#A314621_5_En_6_Chapter.html#Fig20).
    Notice how the class diagram illustrates polymorphism, showing the classes derived
    from `ShopProductWriter` and `ShopProduct`. Now notice how this detail becomes
    transparent when we model the communication among objects. Where possible, we
    want objects to work with the most general types available, so that we can hide
    the details of implementation.


    ## Summary


    In this chapter, I went beyond the nuts and bolts of object-oriented programming
    to look at some key design issues. I examined features such as encapsulation,
    loose coupling, and cohesion that are essential aspects of a flexible and reusable
    object-oriented system. I went on to look at the UML, laying groundwork that will
    be essential in working with patterns later in the book.


    # Part II

    Patterns


    # 7. What Are Design Patterns? Why Use Them?


    Most problems we encounter as programmers have been handled time and again by
    others in our community. Design patterns can provide us with the means to mine
    that wisdom. Once a pattern becomes a common currency, it enriches our language,
    making it easy to share design ideas and their consequences. Design patterns simply
    distill common problems, define tested solutions, and describe likely outcomes.
    Many books and articles focus on the details of computer languages, such as the
    available functions, classes and methods, and so on. Pattern catalogs concentrate
    instead on how you can move on from these basics (the “what”) to an understanding
    of the problems and potential solutions in your projects (the “why” and “how”).


    In this chapter, I introduce you to design patterns and look at some of the reasons
    for their popularity.


    This chapter will cover the following:


    *   Pattern basics: What are design patterns?

    *   Pattern structure: What are the key elements of a design pattern?

    *   Pattern benefits: Why are patterns worth your time?'
  trans: "\n### 顺序图\n\n顺序图基于对象而非类，用于逐步模拟系统中的某个过程。\n\n我们来构建一个简单的图表，模拟 `Report` 对象写入产品数据的方式。顺序图从左到右展示系统的参与者（见图\
    \ 6-18）。\n\n![A314621_5_En_6_Fig18_HTML.gif](img/A314621_5_En_6_Fig18_HTML.gif)\n\
    \n图 6-18. 顺序图中的对象\n\n我仅用类名来标注对象。如果图中同一类有多个独立工作的实例，我会使用 `label:class` 格式（例如 `product1:ShopProduct`）来包含对象名称。\n\
    \n如图 6-19 所示，你所建模过程的生存期从上到下展示。\n\n![A314621_5_En_6_Fig19_HTML.gif](img/A314621_5_En_6_Fig19_HTML.gif)\n\
    \n图 6-19. 顺序图中的对象生命线\n\n垂直虚线代表系统中对象的生存期。紧随生命线的较大方框表示过程的焦点。如果从上到下阅读图 6-19，可以看到过程如何在系统对象间流转。若不显示对象间传递的消息，则难以理解。我在图\
    \ 6-20 中添加了这些消息。\n\n![A314621_5_En_6_Fig20_HTML.gif](img/A314621_5_En_6_Fig20_HTML.gif)\n\
    \n图 6-20. 完整的顺序图\n\n箭头表示从一个对象发送到另一对象的消息。返回值通常隐含不表（尽管可以通过虚线表示，从被调用对象指向消息发起者）。每条消息使用相关的方法调用进行标注。标注方式相当灵活，但有一些语法规则。方括号表示条件：\n\
    \n```\n[okToPrint]\nwrite()\n```\n\n这段代码片段意味着只有在满足正确条件时，才应执行 `write()` 调用。星号用于表示重复；可选地，可在方括号内进一步说明：\n\
    \n```\n*[for each ShopProduct]\nwrite()\n```\n\n你可以从上到下解读图 6-20。首先，`Report` 对象从\
    \ `ProductStore` 对象获取 `ShopProduct` 对象列表。然后将这些对象传递给 `ShopProductWriter` 对象，该对象存储对它们的引用（不过我们只能从图中推断出这一点）。`ShopProductWriter`\
    \ 对象为其引用的每个 `ShopProduct` 对象调用 `ShopProduct::getSummaryLine()`，并将结果添加到输出中。\n\n\
    如你所见，顺序图可以建模过程，冻结动态交互的片段，并以惊人的清晰度呈现它们。\n\n> **注意：**  \n> 观察图 6-16 和 6-20。注意类图如何展示多态性，显示从\
    \ `ShopProductWriter` 和 `ShopProduct` 派生的类。现在注意，当我们对对象间的通信进行建模时，这些细节变得透明。只要可能，我们希望对象与最通用的类型协作，从而隐藏实现细节。\n\
    \n## 总结\n\n本章中，我超越了面向对象编程的具体细节，探讨了一些关键设计问题。我研究了封装、松散耦合和内聚等特性，这些是灵活可复用面向对象系统的基本要素。接着我讲解了\
    \ UML，为本书后续使用设计模式奠定了基础。\n\n# 第二部分：设计模式\n\n# 7. 什么是设计模式？为何使用它们？\n\n我们作为程序员遇到的大多数问题，社区中的其他人已经处理过无数次。设计模式可以为我们提供挖掘这些智慧的手段。一旦模式成为通用术语，它就能丰富我们的语言，使分享设计思想及其后果变得容易。设计模式就是提炼常见问题、定义经过验证的解决方案并描述可能的结果。许多书籍和文章专注于计算机语言的细节（如可用函数、类和方法等）。而模式目录则侧重于如何从这些基础知识（“是什么”）出发，进而理解项目中的问题与潜在解决方案（“为什么”和“如何做”）。\n\
    \n在本章中，我将向您介绍设计模式，并探讨它们广受欢迎的一些原因。\n\n本章将涵盖以下内容：\n\n*   模式基础：什么是设计模式？\n*   模式结构：设计模式的关键要素是什么？\n\
    *   模式优势：为什么模式值得你花时间学习？\n"
- fmt: "# What Are Design Patterns?\n\n> In the world of software, a pattern is a\
    \ tangible manifestation of an organization’s tribal memory. —Grady Booch in Core\
    \ J2EE Patterns [A pattern is] a solution to a problem in a context. —The Gang\
    \ of Four, Design Patterns: Elements of Reusable Object-Oriented Software\n\n\
    As these quotations imply, a design pattern is a problem analyzed with good practice\
    \ for its solution explained.\n\nProblems tend to recur, and as web programmers\
    \ we must solve them time and time again. How should we handle an incoming request?\
    \ How can we translate this data into instructions for our system? How should\
    \ we acquire data? Present results? Over time, we answer these questions with\
    \ a greater or lesser degree of elegance and evolve an informal set of techniques\
    \ that we use and reuse in our projects. These techniques are patterns of design.\n\
    \nDesign patterns inscribe and formalize these problems and solutions, making\
    \ hard-won experience available to the wider programming community. Patterns are\
    \ (or should be) essentially bottom-up and not top-down. They are rooted in practice\
    \ and not theory. That is not to say that there isn’t a strong theoretical element\
    \ to design patterns (as we will see in the next chapter), but patterns are based\
    \ on real-world techniques used by real programmers. Renowned pattern-hatcher\
    \ Martin Fowler says that he discovers patterns, he does not invent them. For\
    \ this reason, many patterns will engender a sense of déjà vu as you recognize\
    \ techniques you have used yourself.\n\nA catalog of patterns is not a cookbook.\
    \ Recipes can be followed slavishly; code can be copied and slotted into a project\
    \ with minor changes. You do not always need even to understand all the code used\
    \ in a recipe. Design patterns inscribe approaches to particular problems. The\
    \ details of implementation may vary enormously according to the wider context.\
    \ This context might include the programming language you are using, the nature\
    \ of your application, the size of your project, and the specifics of the problem.\n\
    \nLet’s say, for example, that your project requires that you create a templating\
    \ system. Given the name of a template file, you must parse it and build a tree\
    \ of objects to represent the tags you encounter.\n\nYou start off with a default\
    \ parser that scans the text for trigger tokens. When it finds a match, it hands\
    \ off responsibility for the hunt to another parser object, which is specialized\
    \ for reading the internals of tags. This continues examining template data until\
    \ it either fails, finishes, or finds another trigger. If it finds a trigger,\
    \ it, too, must hand off responsibility to a specialist—perhaps an argument parser.\
    \ Collectively, these components form what is known as a recursive descent parser.\n\
    \nSo these are your participants: a `MainParser`, a `TagParser`, and an `ArgumentParser`.\
    \ You create a `ParserFactory` class to create and return these objects.\n\nOf\
    \ course, nothing is easy, and you’re informed late in the game that you must\
    \ support more than one syntax in your templates. Now, you need to create a parallel\
    \ set of parsers according to syntax: an `OtherTagParser`, an `OtherArgumentParser`,\
    \ and so on.\n\nThis is your problem: you need to generate a different set of\
    \ objects according to the circumstance, and you want this to be more or less\
    \ transparent to other components in the system. It just so happens that the Gang\
    \ of Four define the following problem in their book’s summary page for the pattern\
    \ Abstract Factory, “Provide an interface for creating families of related or\
    \ dependent objects without specifying their concrete classes.”\n\nThat fits nicely.\
    \ It is the nature of our problem that determines and shapes our use of this pattern.\
    \ There is nothing cut and paste about the solution either, as you can see in\
    \ Chapter [9](#A314621_5_En_9_Chapter.html), in which I cover Abstract Factory.\n\
    \nThe very act of naming a pattern is valuable; it contributes to the kind of\
    \ common vocabulary that has arisen naturally over the years in older crafts and\
    \ professions. Such shorthand greatly aids collaborative design as alternative\
    \ approaches and their various consequences are weighed and tested. When you discuss\
    \ your alternative parser families, for example, you can simply tell colleagues\
    \ that the system creates each set of objects using the Abstract Factory pattern.\
    \ They will nod sagely, either immediately enlightened or making a mental note\
    \ to look it up later. The point is that this bundle of concepts and consequences\
    \ has a handle, which makes for a useful shorthand, as I’ll illustrate later in\
    \ this chapter.\n\nFinally, it is illegal, according to international law, to\
    \ write about patterns without quoting Christopher Alexander, an architecture\
    \ academic whose work heavily influenced the original object-oriented pattern\
    \ advocates. He states in A Pattern Language (Oxford University Press, 1977):\n\
    \n> Each pattern describes a problem which occurs over and over again in our environment,\
    \ and then describes the core of the solution to that problem, in such a way that\
    \ you can use this solution a million times over, without ever doing it the same\
    \ way twice.\n\nIt is significant that this definition (which applies to architectural\
    \ problems and solutions) begins with the problem and its wider setting, and then\
    \ proceeds to a solution. There has been some criticism in recent years that design\
    \ patterns have been overused, especially by inexperienced programmers. This is\
    \ often a sign that solutions have been applied where the problem and context\
    \ are not present. Patterns are more than a particular organization of classes\
    \ and objects, cooperating in a particular way. Patterns are structured to define\
    \ the conditions in which solutions should be applied and to discuss the effects\
    \ of the solution.\n\nIn this book, I will focus on a particularly influential\
    \ strand in the patterns field : the form described in Design Patterns: Elements\
    \ of Reusable Object-Oriented Software by the Gang of Four (Addison-Wesley Professional,\
    \ 1995). It concentrates on patterns in object-oriented software development and\
    \ inscribes some of the classic patterns that are present in most modern object-oriented\
    \ projects.\n\nThe Gang of Four book is important because it inscribes key patterns,\
    \ but also because it describes the design principles that inform and motivate\
    \ these patterns. We will look at some of these principles in the next chapter.\n\
    \n> **Note**  \n> The patterns described by the Gang of Four and in this book\
    \ are really instances of a pattern language. A pattern language is a catalog\
    \ of problems and solutions organized together so that they complement one another,\
    \ forming an interrelated whole. There are pattern languages for other problem\
    \ spaces, such as visual design and project management (and architecture, of course).\
    \ When I discuss design patterns here, I refer to problems and solutions in object-oriented\
    \ software development.\n\n## A Design Pattern Overview\n\nAt heart, a design\
    \ pattern consists of four parts: the name, the problem, the solution, and the\
    \ consequences."
  raw: '## What Are Design Patterns?


    > In the world of software, a pattern is a tangible manifestation of an organization’s
    tribal memory. —Grady Booch in Core J2EE Patterns [A pattern is] a solution to
    a problem in a context. —The Gang of Four, Design Patterns: Elements of Reusable
    Object-Oriented Software


    As these quotations imply, a design pattern is a problem analyzed with good practice
    for its solution explained.


    Problems tend to recur, and as web programmers we must solve them time and time
    again. How should we handle an incoming request? How can we translate this data
    into instructions for our system? How should we acquire data? Present results?
    Over time, we answer these questions with a greater or lesser degree of elegance
    and evolve an informal set of techniques that we use and reuse in our projects.
    These techniques are patterns of design.


    Design patterns inscribe and formalize these problems and solutions, making hard-won
    experience available to the wider programming community. Patterns are (or should
    be) essentially bottom-up and not top-down. They are rooted in practice and not
    theory. That is not to say that there isn’t a strong theoretical element to design
    patterns (as we will see in the next chapter), but patterns are based on real-world
    techniques used by real programmers. Renowned pattern-hatcher Martin Fowler says
    that he discovers patterns, he does not invent them. For this reason, many patterns
    will engender a sense of déjà vu as you recognize techniques you have used yourself.


    A catalog of patterns is not a cookbook. Recipes can be followed slavishly; code
    can be copied and slotted into a project with minor changes. You do not always
    need even to understand all the code used in a recipe. Design patterns inscribe
    approaches to particular problems. The details of implementation may vary enormously
    according to the wider context. This context might include the programming language
    you are using, the nature of your application, the size of your project, and the
    specifics of the problem.


    Let’s say, for example, that your project requires that you create a templating
    system. Given the name of a template file, you must parse it and build a tree
    of objects to represent the tags you encounter.


    You start off with a default parser that scans the text for trigger tokens. When
    it finds a match, it hands off responsibility for the hunt to another parser object,
    which is specialized for reading the internals of tags. This continues examining
    template data until it either fails, finishes, or finds another trigger. If it
    finds a trigger, it, too, must hand off responsibility to a specialist—perhaps
    an argument parser. Collectively, these components form what is known as a recursive
    descent parser.


    So these are your participants: a `MainParser`, a `TagParser`, and an `ArgumentParser`.
    You create a `ParserFactory` class to create and return these objects.


    Of course, nothing is easy, and you’re informed late in the game that you must
    support more than one syntax in your templates. Now, you need to create a parallel
    set of parsers according to syntax: an `OtherTagParser`, an `OtherArgumentParser`,
    and so on.


    This is your problem: you need to generate a different set of objects according
    to the circumstance, and you want this to be more or less transparent to other
    components in the system. It just so happens that the Gang of Four define the
    following problem in their book’s summary page for the pattern Abstract Factory,
    “Provide an interface for creating families of related or dependent objects without
    specifying their concrete classes.”


    That fits nicely. It is the nature of our problem that determines and shapes our
    use of this pattern. There is nothing cut and paste about the solution either,
    as you can see in Chapter [9](#A314621_5_En_9_Chapter.html), in which I cover
    Abstract Factory.


    The very act of naming a pattern is valuable; it contributes to the kind of common
    vocabulary that has arisen naturally over the years in older crafts and professions.
    Such shorthand greatly aids collaborative design as alternative approaches and
    their various consequences are weighed and tested. When you discuss your alternative
    parser families, for example, you can simply tell colleagues that the system creates
    each set of objects using the Abstract Factory pattern. They will nod sagely,
    either immediately enlightened or making a mental note to look it up later. The
    point is that this bundle of concepts and consequences has a handle, which makes
    for a useful shorthand, as I’ll illustrate later in this chapter.


    Finally, it is illegal, according to international law, to write about patterns
    without quoting Christopher Alexander, an architecture academic whose work heavily
    influenced the original object-oriented pattern advocates. He states in A Pattern
    Language (Oxford University Press, 1977):


    > Each pattern describes a problem which occurs over and over again in our environment,
    and then describes the core of the solution to that problem, in such a way that
    you can use this solution a million times over, without ever doing it the same
    way twice.


    It is significant that this definition (which applies to architectural problems
    and solutions) begins with the problem and its wider setting, and then proceeds
    to a solution. There has been some criticism in recent years that design patterns
    have been overused, especially by inexperienced programmers. This is often a sign
    that solutions have been applied where the problem and context are not present.
    Patterns are more than a particular organization of classes and objects, cooperating
    in a particular way. Patterns are structured to define the conditions in which
    solutions should be applied and to discuss the effects of the solution.


    In this book, I will focus on a particularly influential strand in the patterns
    field : the form described in Design Patterns: Elements of Reusable Object-Oriented
    Software by the Gang of Four (Addison-Wesley Professional, 1995). It concentrates
    on patterns in object-oriented software development and inscribes some of the
    classic patterns that are present in most modern object-oriented projects.


    The Gang of Four book is important because it inscribes key patterns, but also
    because it describes the design principles that inform and motivate these patterns.
    We will look at some of these principles in the next chapter.


    Note


    The patterns described by the Gang of Four and in this book are really instances
    of a pattern language. A pattern language is a catalog of problems and solutions
    organized together so that they complement one another, forming an interrelated
    whole. There are pattern languages for other problem spaces, such as visual design
    and project management (and architecture, of course). When I discuss design patterns
    here, I refer to problems and solutions in object-oriented software development.


    ## A Design Pattern Overview


    At heart, a design pattern consists of four parts: the name, the problem, the
    solution, and the consequences.'
  trans: "\n# 什么是设计模式？\n\n> 在软件世界中，模式是组织集体记忆的具体体现。—— Grady Booch，《Core J2EE Patterns》\
    \  \n> [模式是] 在特定背景下对问题的解决方案。——“四人帮”，《设计模式：可复用面向对象软件的基础》\n\n正如这些引文所暗示的，设计模式是一种经过分析的问题，并附有其经过良好实践的解决方案。\n\
    \n问题往往会重复出现，作为 Web 程序员，我们必须一次又一次地解决它们。我们该如何处理传入的请求？如何将这些数据转换为系统的指令？我们应该如何获取数据？呈现结果？随着时间的推移，我们会以不同程度的优雅来回答这些问题，并逐渐形成一套非正式的技术体系，并在项目中反复使用。这些技术就是设计模式。\n\
    \n设计模式记录并形式化了这些问题和解决方案，使来之不易的经验能够为更广泛的编程社区所用。模式本质上是（或者说应该是）自下而上的，而非自上而下的。它们根植于实践，而非理论。这并不意味着设计模式缺乏强大的理论元素（我们将在下一章中看到），但模式是基于真实程序员所使用的真实世界技术的。著名的模式孵化者马丁·福勒曾说，他是发现模式，而非发明模式。因此，许多模式会让你产生似曾相识的感觉，因为你认出了自己曾使用过的技巧。\n\
    \n模式目录并非菜谱。菜谱可以照本宣科；代码可以被复制并稍作修改后插入项目中。你甚至不必完全理解菜谱中使用的所有代码。设计模式记录的是解决特定问题的方法。实现细节可能因更广泛的背景而千差万别，这些背景可能包括你使用的编程语言、应用程序的性质、项目的规模以及问题的具体细节。\n\
    \n举例来说，假设你的项目需要一个模板系统。给定一个模板文件的名字，你必须解析它，并构建一个对象树来表示你遇到的标签。\n\n你从一个默认解析器开始，它扫描文本中的触发标记。当找到匹配项时，它会将搜索任务移交给另一个解析器对象，这个解析器专门用于读取标签的内部结构。这个过程会继续检查模板数据，直到失败、完成或找到另一个触发器。如果找到触发器，它也必须将任务移交给一个专门的对象——也许是一个参数解析器。所有这些组件共同构成了所谓的递归下降解析器。\n\
    \n那么，你的参与者包括：一个 `MainParser`、一个 `TagParser` 和一个 `ArgumentParser`。你创建一个 `ParserFactory`\
    \ 类来创建并返回这些对象。\n\n当然，事情没那么简单。项目后期，你被告知必须支持模板中的多种语法。现在，你需要根据语法创建一组并行的解析器：一个 `OtherTagParser`、一个\
    \ `OtherArgumentParser` 等等。\n\n这就是你的问题：你需要根据情况生成一组不同的对象，并且你希望系统其他组件对此基本上是透明的。恰好，“四人帮”在其书中的“抽象工厂”模式总结页中定义了以下问题：“提供一个创建一系列相关或相互依赖对象的接口，而无需指定它们具体的类。”\n\
    \n这非常契合。正是我们问题的性质决定并塑造了我们对这个模式的使用。解决方案也绝非简单的复制粘贴，正如你将在第 9 章（我将在其中介绍抽象工厂）中看到的那样。\n\
    \n为模式命名这一行为本身就很有价值；它有助于形成一种通用词汇表，这种词汇表在更古老的手艺和职业中早已自然而然地产生。这种速记法极大地促进了协作设计，因为各种替代方案及其不同后果可以得到权衡和测试。例如，当你讨论不同的解析器系列时，你可以简单地告诉同事，系统使用抽象工厂模式创建每组对象。他们会睿智地点点头，要么立刻恍然大悟，要么在心里记下稍后去查阅。关键在于，这组概念和后果有了一个名称，这构成了一个有用的速记法，我将在本章后面说明。\n\
    \n最后，根据国际法，如果不引用克里斯托弗·亚历山大，就撰写关于模式的文章是非法的。他是一位建筑学学者，其工作深刻影响了最初的面向对象模式倡导者。他在《模式语言》（牛津大学出版社，1977）中说道：\n\
    \n> 每一种模式描述了一个在我们环境中反复出现的问题，然后描述了该问题解决方案的核心，这样你就可以无数次地使用这个解决方案，但绝不以相同的方式做两次。\n\
    \n值得注意的是，这个定义（适用于建筑问题和解决方案）从问题及其更广阔的背景开始，然后才转向解决方案。近年来，有一些批评认为设计模式被过度使用了，尤其是在经验不足的程序员手中。这通常表明，在没有问题和背景的情况下，解决方案被应用了。模式不仅仅是特定组织方式的类和对象以特定方式协作。模式的结构旨在定义解决方案的应用条件，并讨论解决方案的效果。\n\
    \n在本书中，我将关注模式领域中一个特别有影响力的流派：“四人帮”在《设计模式：可复用面向对象软件的基础》（Addison-Wesley Professional，1995）中描述的形式。它专注于面向对象软件开发中的模式，并记录了一些存在于大多数现代面向对象项目中的经典模式。\n\
    \n“四人帮”这本书之所以重要，不仅因为它记录了关键的模式，还因为它描述了为这些模式提供信息和动力的设计原则。我们将在下一章中探讨其中一些原则。\n\n>\
    \ **注**  \n> “四人帮”以及本书中描述的模式实际上是模式语言的实例。模式语言是问题和解决方案的目录，它们被组织在一起，彼此互补，形成一个相互关联的整体。还有其他问题领域的模式语言，例如视觉设计、项目管理（当然还有建筑）。当我在本书中讨论设计模式时，我指的是面向对象软件开发中的问题和解决方案。\n\
    \n## 设计模式概览\n\n从本质上讲，设计模式由四个部分组成：名称、问题、解决方案和后果。\n"
- fmt: "### Name\n\nNames matter. They enrich the language of programmers; a few short\
    \ words can stand in for quite complex problems and solutions. They must balance\
    \ brevity and description. The Gang of Four claims, “Finding good names has been\
    \ one of the hardest parts of developing our catalog.”  \nMartin Fowler agrees:\
