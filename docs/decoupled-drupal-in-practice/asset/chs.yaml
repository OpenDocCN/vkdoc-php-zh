  \ `Views` 和 `Views UI`（为 Views 提供用户界面的模块）都已安装并启用。在 Views 中使用 REST 导出还需要启用 `RESTful\
  \ Web Services` 和 `Serialization` 模块。\n\n然后，我们可以导航到 `管理 ➤ 结构 ➤ 视图 ➤ 添加视图` 来创建一个新视图\
  \ (`/admin/structure/views/add`)。你也可以通过创建额外的 REST 导出显示来重用现有的某个包含 Drupal 管理界面特定列表的视图，但在这个示例中，我们将从头到尾搭建一个视图：构建一个按文章标题字母排序的文章列表。在“添加视图”页面（如图\
  \ 11-1 所示），你需要设置一个名称和视图设置，其中包括内容类型和排序条件的配置。\n\n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig1_HTML.jpg](img/468476_1_En_11_Fig1_HTML.jpg)\n\
  \n*图 11-1*\n\n“添加视图”页面允许你创建视图，这些内容列表不仅可作为页面和页面区块公开，还可作为 REST 导出公开\n\n接着，我们需要创建一个\
  \ REST 导出并提供一些初始设置，最重要的是设置一个可访问此视图显示的路径。许多 API 设计者倾向于通过在资源路径前加上 `/api/v1` 来对 API\
  \ 进行版本管理，这表示 API 的第一个版本。这样架构师可以发布 API 的新版本，使得新消费端能够依赖改进后的版本，同时保持依赖旧版本的消费端不受影响。考虑到这种情况，我们将使用\
  \ `api/v1/articles`，如图 11-2 所示。\n\n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig2_HTML.jpg](img/468476_1_En_11_Fig2_HTML.jpg)\n\
  \n*图 11-2*\n\n在将新视图公开为 REST 导出时，你可以设置一个任意路径，通过该路径可访问你创建的由视图生成的 REST API。这有助于为消费端应用程序实现基本的版本控制系统。\n\
  \n点击 `保存并编辑` 将我们带到视图配置界面，该界面允许我们对 REST 导出显示设置各种条件，并为我们提供 API 资源的实时预览（见图 11-3）。\n\
  \n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig3_HTML.jpg](img/468476_1_En_11_Fig3_HTML.jpg)\n\
  \n*图 11-3*\n\n视图 REST 导出的实时预览展示了我们的 REST 资源作为有效负载公开给消费端应用程序时的样子\n\n例如，你可以使用“添加筛选条件”模态框（见图\
  \ 11-4）来方便地根据文章的评论数量、更新日期、作者名称、发布状态或多种其他条件对文章进行排序。\n\n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig4_HTML.jpg](img/468476_1_En_11_Fig4_HTML.jpg)\n\
  \n*图 11-4*\n\n在视图中，我们可以添加筛选条件，这些条件基于内容项所包含的字段决定应如何对其进行排序\n\n让我们来看一个为我们的视图配置添加新筛选条件的实际用例。虽然我们的网站包含的文章可能有图片也可能没有，但我们的消费端应用程序是为一个要求发出的每个内容项都必须包含图片的客户设计的。这意味着我们的\
  \ API 必须只考虑那些包含图片的文章。幸运的是，我们的 `Devel Generate` 命令（见第 7 章）创建了一些包含图片和不包含图片的文章。\n\n\
  由于生成的每张图片也都有一个标题，我们将添加一个筛选条件，确保图片的标题不为空，如图 11-5 所示。\n\n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig5_HTML.jpg](img/468476_1_En_11_Fig5_HTML.jpg)\n\
  \n*图 11-5*\n\n\n\n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig5_HTML.jpg](img/468476_1_En_11_Fig5_HTML.jpg)\
  \  \n图 11-5\n\n在此过滤条件中，我们仅指定包含图片的内容项目纳入 REST 导出显示。\n\n我们的视图配置现在如图 11-6 所示，过滤条件表明我们只希望获得已发布且包含已填写某种标题的图片的文章。\n\
  \n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig6_HTML.jpg](img/468476_1_En_11_Fig6_HTML.jpg)\
  \  \n图 11-6  \n已添加过滤条件的视图配置页面\n\n如果检查界面下方的实时视图预览，我们确实可以看到负载中仅包含带有图片的文章。\n\n```\n\
  ...\n\"field_image\":\n[\n{\n\"target_id\":1\n\"alt\":\"Abbas distineo neo. Importunus\
  \ luctus nutus turpis ullamcorper ymo.\",\n\"title\":\"Abbas magna utrum. Distineo\
  \ gemino interdico lobortis natu nibh nimis similis typicus.\",\n\"width\":481,\n\
  \"height\":563,\n\"target_type\":\"file\",\n\"target_uuid\":\"376df8ce-f1f3-474c-94ae-7f4816be67c6\"\
  ,\n\"url\": \"http:\\/\\/core-rest.dd:8083\\/sites\\/core-rest.dd\\/files\\/2018-03\\\
  /generateImage_dZ02Dw.png\"\n}\n]\n...\n```\n\n现在，我们可以将此内容作为 API 资源正常使用，但并非通过核心\
  \ REST API 的典型方式；保存视图后，我们的 API 将在初始创建视图过程中定义的路径上可用。\n\n客户要求我们不再按文章标题的字母顺序排序，而是改为按图片标题排序。我们可以应用一个新的基于图片标题的升序排序条件，并移除现有的标题排序条件。这就得到了图\
  \ 11-7 中的配置。\n\n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig7_HTML.jpg](img/468476_1_En_11_Fig7_HTML.jpg)\
  \  \n图 11-7  \n在此示例视图配置中，我们将视图限制为仅显示已发布且包含图片的文章，排序依据为文章内图片标题的升序\n\n检查配置下方的实时预览时，我们可以看到，在之前的实体（其图片标题以“Abbas”开头）之后，一个新的实体取代了第二个内容实体。在我们生成的内容中，显示的第二个实体标题为“Laoreet\
  \ Refero”，但其引用的图片标题为“Accumsan augue ….”。\n\n```\n...\n\"field_image\": [\n{\n\"\
  target_id\": 7,\n\"alt\": \"Abico nimis nunc pecus persto suscipere utinam.\",\n\
  \"title\": \"Accumsan augue caecus dolus luctus mauris plaga suscipere valde venio.\"\
  ,\n\"width\": 317,\n\"height\": 128,\n\"target_type\": \"file\",\n\"target_uuid\"\
  : \"63bafb27-944a-4484-a991-f8601b1517c8\",\n\"url\": \"http:\\/\\/core-rest.dd:8083\\\
  /sites\\/core-rest.dd\\/files\\/2018-03\\/generateImage_xC0P2i.gif\"\n}\n]\n...\n\
  ```\n\n这个例子有点刻意，旨在让你熟悉视图配置界面，特别是那些可能仅将 Drupal 用作内容后端、尚未接触过 Drupal 的开发者。不过，我们的内容很少会如此容易处理，通常，我们对内容模型有独特的需求，这迫使我们使用自定义内容类型。\n\
  \n尽管视图的大部分强大功能超出了本概述的范围，但提供视图资源的简单 API 对于只需要只读访问内容的消费者应用来说可能很有价值。然而，在通过 Postman\
  \ 测试视图的 REST 导出之前，我们通过一个自定义内容类型进行更深入的探讨。\n\n## 使用视图 REST 导出的自定义内容类型\n\nDrupal 内容模型强大工具的很大一部分在于能够创建新的自定义内容类型，并为其指定特定字段。这在\
  \ Drupal 中开箱即用，这意味着，与需要自定义插件才能启用此功能的 WordPress 不同，可以根据内容的独特需求，使用诸如产品、常见问题、火车模型、投资组合项目等自定义内容类型来构建任意内容模型和相应的模式。然后，可以根据各种字段类型使用字段自定义这些类型。\n\
  \n在此示例中，我们的基础页面和文章类型已无法满足内容模型的需求。既然我们的客户决定建立一个对全球机场进行编目的旅游网站，我们需要创建一个 API 来提供机场列表，该列表可以通过\
  \ IATA 代码或机场位置进行排序。\n\n我们需要创建一个新的“机场”内容类型，包含以下字段：\n\n*   机场（内容实体）\n    *   名称（字段）\n\
  \    *   IATA 代码（字段）\n    *   位置（字段）\n\n导航至 管理 ➤ 结构 ➤ 内容类型 (`/admin/structure/types/add`)\
  \ 以添加新的内容类型。在图 11-8 中，我们为该内容类型提供了一个名称（“机场”），添加了将用作“添加内容”页面帮助文本的描述，并将默认标题字段标签更改为“名称”，以更好地反映我们内容类型的特性。\n\
  \n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig8_HTML.jpg](img/468476_1_En_11_Fig8_HTML.jpg)\
  \  \n图 11-8  \nDrupal 最强大的功能之一是能够创建具有任意字段的自定义内容类型。在此截图中，我们正在创建一个新的“机场”内容类型。\n\n\
  下一页（如图 11-9 所示）使我们能够向内容类型添加字段或从中移除字段。我们不需要“正文”字段，因此可以将其移除，只关注 IATA 代码字段和位置字段。\n\n\
  ![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig9_HTML.jpg](img/468476_1_En_11_Fig9_HTML.jpg)\
  \  \n图 11-9  \n你可以向自定义内容类型添加各种类型的字段（或复用其他内容类型中已有的字段），并为其提供唯一的标签和机器名称。\n\n对这两个字段都使用纯文本格式器后，最终，我们看到我们的“机场”内容类型除了标题之外还包含两个附加字段：IATA\
  \ 代码和位置（见图 11-10）。\n\n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig10_HTML.jpg](img/468476_1_En_11_Fig10_HTML.jpg)\
  \  \n图 11-10  \n我们完成的“机场”内容类型，包含 IATA 代码和位置字段\n\n现在，我们可以创建一些内容了。添加十个类型为“机场”的内容实体，并填入信息。完成后，我们可以创建视图和相应的\
  \ REST 导出。导航至 管理 ➤ 结构 ➤ 视图 (`/admin/structure/views`) 并单击“添加视图” (`/admin/structure/views/add`)。为视图命名（例如，“Airports”），并确保视图设置显示类型为“机场”的内容，并按标题排序。接下来，确保存在一个\
  \ REST 导出，使我们能够在路径 `api/v1/airports` 上，在消费者应用中定位 API。\n\n你可能已经注意到，我们的视图配置不允许我们指定要包含哪些字段或如何包含它们。这是因为我们使用默认的实体格式器来显示实体，而不是依赖字段格式器。但是，我们可以自定义视图的\
  \ REST 导出，使其在 Drupal 的实体结构中显示单个字段，而不是整个实体（见图 11-11）。\n\n\n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig11_HTML.jpg](img/468476_1_En_11_Fig11_HTML.jpg)\n\
  \n**图 11-11** 默认情况下，视图格式的 REST 导出会使用默认实体数据结构来显示所有字段，正如在 `显示` 字段中看到的 `实体` 值。\n\n\
  相反，我们可以更改格式化程序以显示个别字段，这为我们提供了更大的灵活性。如果我们选择这样做，可以要求视图仅提供包含某个字段的 REST 导出，例如 IATA 代码和位置，而不包含其他任何字段（如标题）。如果你有某些内容包含了希望在后端编辑界面或\
  \ Drupal 站点中公开、但不想在前端消费者应用中显示的字段，这将特别有用。\n\n就我们的目的而言，我们只导出 IATA 代码和 `位置` 字段，将 `标题`\
  \ 字段隐藏，使其仅在 Drupal 站点上浏览内容时可见。我们新配置的视图显示了 IATA 代码和 `位置` 字段，但没有 `标题` 字段——尽管机场仍然按名称排序，正如我们在图\
  \ 11-12 的排序条件中所看到的那样。\n\n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig12_HTML.jpg](img/468476_1_En_11_Fig12_HTML.jpg)\n\
  \n**图 11-12** 相反，通过将 REST 导出设置为显示单独的“字段”，我们可以指定要显示的字段，而不是通常显示所有节点信息。\n\n现在我们有了一个轻量级的\
  \ API 资源，它只提供单个字段数据。图 11-13 中的实时预览显示，将导出的数据限制为仅 IATA 代码和位置，显著减小了负载大小。\n\n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig13_HTML.jpg](img/468476_1_En_11_Fig13_HTML.jpg)\n\
  \n**图 11-13** 将显示内容限制为特定字段，可以改善开发人员构建消费者应用的体验，因为负载更简单且更易于遍历。\n\n以下是图 11-13 中的负载经过格式化后的样子：\n\
  \n```\n[\n{\n\"field_iata_code\": \"AMS\",\n\"field_location\": \"Amsterdam, Netherlands\"\
  \n},\n{\n\"field_iata_code\": \"IST\",\n\"field_location\": \"Istanbul, Turkey\"\
  \n},\n{\n\"field_iata_code\": \"DEN\",\n\"field_location\": \"Denver, CO\"\n},\n\
  {\n\"field_iata_code\": \"GRU\",\n\"field_location\": \"S\\u00e3o Paulo, Brazil\"\
  \n},\n{\n\"field_iata_code\": \"ATL\",\n\"field_location\": \"Atlanta, GA\"\n},\n\
  {\n\"field_iata_code\": \"JFK\",\n\"field_location\": \"New York, NY\"\n},\n{\n\"\
  field_iata_code\": \"LAX\",\n\"field_location\": \"Los Angeles, CA\"\n},\n{\n\"\
  field_iata_code\": \"ORD\",\n\"field_location\": \"Chicago, IL\"\n},\n{\n\"field_iata_code\"\
  : \"JNB\",\n\"field_location\": \"Johannesburg, South Africa\"\n},\n{\n\"field_iata_code\"\
  : \"BKK\",\n\"field_location\": \"Bangkok, Thailand\"\n}\n]\n```\n\n不过，有一个问题让我们稍作停顿。Drupal\
  \ 使用 `field_` 前缀来标识所有不属于其标准核心数据模型的自定义字段。在其他条件不变的情况下，这意味着每个使用此 API 的开发人员都必须了解并根据\
  \ Drupal 提供的命名体系来编写他们的应用程序。幸运的是，Drupal 也允许我们为这些自定义字段名提供别名，从而为字段赋予更易于记忆的名称。单击 `字段`\
  \ 格式化程序旁边的 `设置`，我们就可以为字段设置别名，如图 11-14 所示。\n\n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig14_HTML.jpg](img/468476_1_En_11_Fig14_HTML.jpg)\n\
  \n**图 11-14** 借助视图，我们可以为字段名设置别名，这可以进一步改善消费者应用的开发体验。\n\n现在，对于需要特定字段标签和小负载大小的消费者来说，我们导出的数据看起来更棒了。\n\
  \n```\n[\n{\n\"iata\": \"AMS\",\n\"location\": \"Amsterdam, Netherlands\"\n},\n\
  {\n\"iata\": \"IST\",\n\"location\": \"Istanbul, Turkey\"\n},\n{\n\"iata\": \"DEN\"\
  ,\n\"location\": \"Denver, CO\"\n},\n{\n\"iata\": \"GRU\",\n\"location\": \"S\\\
  u00e3o Paulo, Brazil\"\n},\n{\n\"iata\": \"ATL\",\n\"location\": \"Atlanta, GA\"\
  \n},\n{\n\"iata\": \"JFK\",\n\"location\": \"New York, NY\"\n},\n{\n\"iata\": \"\
  LAX\",\n\"location\": \"Los Angeles, CA\"\n},\n{\n\"iata\": \"ORD\",\n\"location\"\
  : \"Chicago, IL\"\n},\n{\n\"iata\": \"JNB\",\n\"location\": \"Johannesburg, South\
  \ Africa\"\n},\n{\n\"iata\": \"BKK\",\n\"location\": \"Bangkok, Thailand\"\n}\n\
  ]\n```\n\n> **注意：** 本节部分内容受到了 Kevin Blanco 的优秀教程《在 Drupal 8 中构建一个快速的 RESTful 视图》的启发，该教程可在\
  \ [`https://medium.com/kevinblanco-io/build-a-quick-restful-view-in-drupal-8-56203ea63b88`](https://medium.com/kevinblanco-io/build-a-quick-restful-view-in-drupal-8-56203ea63b88)\
  \ 找到。\n\n作为最后一步，如果我们定义了其他序列化格式，还可以让 REST 导出以 JSON 以外的格式提供。例如，在已具备 CSV 序列化器的情况下，我们可以包含通过\
  \ XML 或 CSV 请求数据的能力。在图 11-15 中，我们启用了所有三种可用格式（`hal_json`、`json` 和 `xml`），尽管将所有复选框留空也会使这三种格式都可用。\n\
  \n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig15_HTML.jpg](img/468476_1_En_11_Fig15_HTML.jpg)\n\
  \n**图 11-15** 通过样式选项，我们可以允许消费者以 HAL+JSON、JSON、XML 或我们定义的任何其他序列化格式检索数据。\n\n## 使用核心\
  \ REST 检索视图 REST 导出\n\n在过去的几节中，我们使用了诸如序列化（Serialization）和视图 REST 导出（Views REST exports）等核心\
  \ REST 模块，为我们提供了两个位于 `/api/v1/articles` 和 `/api/v1/airports` 的 API 资源。现在，我们可以像之前那样使用\
  \ Postman，通过对 Drupal 发出 `GET` 请求，来检索这两个视图 REST 导出。\n\n关于视图 REST 导出，有一点很重要：它们的权限是与我们之前操作过的单个实体等典型\
  \ REST 资源权限明确区分开来的。视图 REST 导出不使用 REST 资源插件，这意味着 REST 定义的权限不适用于视图。^(⁵¹)\n\n当我们对 `/api/v1/articles?_format=hal_json`\
  \ 发出 `GET` 请求时，即使没有任何头部信息（此处不需要 `X-CSRF-Token`，因为 `GET` 是安全方法），Drupal 会按照预期返回符合\
  \ HAL 规范的文章实体。使用值 `json` 会给我们提供相关实体的纯表示，`xml` 也是如此，如图 11-16 所示。\n\n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig16_HTML.jpg](img/468476_1_En_11_Fig16_HTML.jpg)\n\
  \n**图 11-16** 我们将视图 REST 导出配置为在请求时提供 XML *响应*，从而成功以 XML 格式检索到了我们的视图。\n\n当我们对 `/api/v1/airports?_format=json`\
  \ 发出 `GET` 请求时，我们会收到我们在配置视图 REST 导出期间刚刚预览过的数据，如图 11-17 所示。还不错！\n\n![../images/468476_1_En_11_Chapter/468476_1_En_11_Fig17_HTML.jpg](img/468476_1_En_11_Fig17_HTML.jpg)\n\
  \n**图 11-17** 之前的操作，例如为字段名添加别名以及通过指定字段来限制显示信息量，最终生成了一个简化的 JSON 负载。\n\n\n\n### 结论\n\
  \n尽管核心 REST 提供了开箱即用的查询和操作单个实体的能力，但对于我们作为架构师和开发人员所面临的用例来说，这有时是不够的。鉴于不安全 HTTP 方法的影响，单独操作实体通常是合理的，但当涉及到只读操作时，单个实体则完全不够。\n\
  \n得益于视图 REST 导出，提供公开内容集合的 API 可以是一个轻松且快速的过程。对于许多只需要检索内容的轻量级应用程序，视图可以成为核心 REST 模块的强大替代方案。然而，视图最初是为\
  \ Drupal 前端提供内容列表而构建的，这意味着其能力存在局限性。\n\n此外，通常会出现这样的情况：你需要一个更健壮、且他人之前使用过的 API 规范，或者你无法为了对公开数据执行复杂操作而配置两个独立的\
  \ API 端点。Drupal 针对这个问题有一个解决方案：JSON API，我们将在后续章节中详细讨论。\n\n脚注 1\n\n"
- '# 12. Drupal 中的 JSON API


  正如我们在第 8 章中所见，JSON API 是核心 REST 的一个强大替代方案，因为它是一个被广泛理解的规范，受益于健壮的关系和查询操作定义方式，并且是 Drupal
  可用的、最稳定的贡献版 Web 服务解决方案之一。尽管 JSON API 计划作为稳定模块包含在 Drupal 8.7.0 的核心中，但对于首要关注稳定性的架构师来说，它可能不那么有吸引力。


  Drupal 对 JSON API 的实现与核心 REST 在几个关键方面存在显著差异。首先，在核心 REST 中修饰每个请求的`_format`查询参数在 JSON
  API 中是不必要的，因为序列化格式被假定为严格的 JSON。其次，资源 URI 的构成与核心 REST 不同，并且与访问 Drupal 站点内容所使用的典型路由有明显区别。


  在本章中，我们将回顾这些差异，以及在 Drupal 中针对 JSON API 成功发起请求以创建、读取、更新和删除内容的流程。


  ### 注意


  关于文件上传功能，请参考 JSON API 文件模块，这是一个贡献版解决方案，超出了本书的范围。JSON API 文件模块可在 Drupal.org 上找到，地址为
  [`https://www.drupal.org/project/jsonapi_file`](https://www.drupal.org/project/jsonapi_file)。相关文档可在
  Drupal.org 上找到，地址为 [`https://www.drupal.org/docs/8/modules/json-api/working-with-files-post`](https://www.drupal.org/docs/8/modules/json-api/working-with-files-post)。


  ## 使用 JSON API 检索资源


  JSON API 规范建议每个请求都应包含一个带有正确 JSON API MIME 类型的`Accept`标头，但 JSON API 模块也接受没有任何请求标头的请求^((52))。


  ```

  Accept: application/vnd.api+json

  ```


  ### 检索单个资源


  检索单个资源需要其标识符，需要注意的是，与核心 REST 不同，该标识符不是我们在核心 REST 中看到的`nid`，而是一个 UUID。要检索单篇文章，我们只需对以下
  URI 发起一个`GET`请求，并将`{{node_uuid}}`替换为相应的 UUID。


  ```

  /jsonapi/node/article/{{node_uuid}}

  ```


  此外，路径中引用的 bundle（例如`article`）必须与所查询实体的 bundle（内容类型）一致，否则将抛出错误。当您发起请求时，随后的响应将包含`200
  OK`的响应码，响应体将包含您所请求节点的 JSON API 对象，包括属性（即字段）、任何可用的关系以及链接关系^((53))。


  ### 注意


  要检索特定节点的 UUID，您可以使用可用的调试工具，例如我们第 7 章安装的 Devel 模块（用于提供自动内容生成）。在 Drupal 中导航到需要识别的节点，从查看选项卡切换到
  Devel 选项卡，UUID 即可在变量部分找到，如图 12-1 所示。或者，您可以启用第 7 和第 10 章中的核心 REST 模块，并针对该实体发起`GET`请求，生成的响应将包含该
  UUID。


  ![`../images/468476_1_En_12_Chapter/468476_1_En_12_Fig1_HTML.jpg`](img/468476_1_En_12_Fig1_HTML.jpg)


  图 12-1


  借助 Devel 模块，您可以内省任何实体并查明其 UUID，以用于检索单个实体


  ### 检索资源集合


  使用 JSON API 而非核心 REST 的最重要动机之一在于，能够通过 JSON API 集合在单个请求中检索多个资源。在 Drupal 8 Core 中，虽然我们可以使用核心
  REST 检索单个实体，但视图 REST 导出（见第 11 章）是开箱即用的、唯一可以用来检索实体集合的方法。而在 JSON API 中，我们只需在`GET`请求中移除
  UUID。发出此请求后，JSON API 会返回一个文章节点集合。


  ```

  /jsonapi/node/article

  ```


  在生成的响应中，我们会找到一个`200 OK`响应码和一个`data`对象，其中包含最多 50 篇文章，并附带一个指向集合中下一页可用文章的链接。


  ##### 对资源集合进行分页


  对资源集合进行分页时的一个最佳实践是使用 JSON API 内置的分页链接，而不是生成定制的分页 URL。从 JSON API 检索到的每个集合都在`links`键下包含以下信息，如表
  12-1 所示。


  表 12-1


  JSON API 分页链接与定义


  | **键** | **页面指示** | **当前页面状态** |

  | --- | --- | --- |

  | `self` | 当前页 | 如果既不存在`prev`也不存在`next`，则只有一页。 |

  | `next` | 下一页 | 如果`next`存在，则还有更多页面。如果`next`不存在，则这是最后一页。 |

  | `prev` | 上一页 | 如果`prev`存在，则当前页不是第一页。 |


  ### 注意


  如果您遇到这样一种情况：页面限制大于响应中出现的资源数量（例如，页面限制为 4，但只出现了 3 个资源），并且还存在`next`链接，这意味着集合中有某个实体出于安全原因未被展示。


  除了分页链接，JSON API 规范还允许某些查询参数对通过 API 检索到的集合进行操作。例如，对以下路径的请求指定了 25 篇文章的限制，响应将包含指向集合中下一页文章的链接。


  ```

  /jsonapi/node/article?page[limit]=25

  ```


  我们可以使用`page[offset]`来检索第二页的 25 篇文章，这样服务器响应中将只包含第 26 到第 50 篇文章。


  ```

  /jsonapi/node/article?page[limit]=25&page[offset]=25

  ```


  ### 注意


  为了避免 DDoS 及类似攻击损害 Drupal 后端的性能，JSON API 模块强制设置了 50 的上限页面限制，以避免对过多资源执行访问检查。这也是无法检索总页数的原因。有关
  Drupal 中 JSON API 分页的更多信息，请参见 [`https://www.drupal.org/docs/8/modules/json-api/pagination`](https://www.drupal.org/docs/8/modules/json-api/pagination)。




  #### 对资源集合进行排序


  我们还可以在请求中通过使用 `sort` 查询参数动态执行排序操作，该参数将属性作为排序结果的依据值。在以下示例中，我们依据 `title` 字段和 `nid`
  标识符对响应中的集合进行排序。


  ```

  /jsonapi/node/article?sort[sort-title][path]=title

  /jsonapi/node/article?sort[sort-nid][path]=nid

  ```


  这些排序方式也有简写形式。


  ```

  /jsonapi/node/article?sort=title

  /jsonapi/node/article?sort=nid

  ```


  我们可以通过提供另一个参数来反转顺序。


  ```

  /jsonapi/node/article

  ?sort[sort-title][path]=title

  &sort[sort-title][direction]=DESC

  /jsonapi/node/article

  ?sort[sort-nid][path]=nid

  &sort[sort-nid][direction]=DESC

  ```


  还有一种简写形式，可以通过在值前添加连字符来利用，这表示升序应被反转，变为降序。


  ```

  /jsonapi/node/article?sort=-title

  /jsonapi/node/article?sort=-nid

  ```


  当用于排序集合的字段中存在可用属性时，我们可以通过添加一个句点 (`.`) 来访问下一级的属性。在以下示例中，我们根据文章作者的姓名对集合进行排序，其中 `sort-author`
  是我们为排序指定的任意名称，用于与其他排序区分。


  ```

  /jsonapi/node/article?sort[sort-author][path]=uid.name

  ```


  此路径的简写形式如下。


  ```

  /jsonapi/node/article?sort=uid.name

  ```


  也可以按多个字段进行排序，这些字段会按照它们被列出的顺序依次考虑。


  ```

  /jsonapi/node/article

  ?sort[sort-title][path]=title

  &sort[sort-title][direction]=DESC

  &sort[sort-author][path]=uid.name

  ```


  在简写形式中，您可以像之前看到的那样反转顺序。^(⁵⁴)


  ```

  /jsonapi/node/article?sort=-title,uid.name

  ```


  ##### 过滤资源集合


  当我们对诸如 `/jsonapi/node/article` 这样的资源集合发出 `GET` 请求时，我们会检索拥有权限访问的每一个资源。然而，消费者应用通常需要符合特定特征集的过滤响应，例如由某位特定作者撰写的所有文章，或超过某个日期的所有文章。


  在 Drupal 的 JSON API 实现中，我们可以使用*过滤器*来指定哪些资源应包含在响应中。使用过滤器的最简单方法是根据字段的值选择特定资源，路径格式如下，其中
  `{field_name}` 和 `{other_field_name}` 是可用于过滤的字段，`{value}` 代表用于过滤的值。


  ```

  /jsonapi/node/article

  ?filter[{field_name}]={value}

  &filter[{other_field_name}]={value}

  ```


  与依赖用户界面来暴露定制化资源的 Views REST 导出（见第 11 章）不同，Drupal 的 JSON API 实现所提供的过滤系统包含两个基本概念：条件和组。在
  JSON API 中，*条件*表示被断言为真的表达式。一个条件表明资源的某方面为真或假，例如：“这篇文章是本周创建的吗？” 当条件对某个资源返回 `FALSE`
  时，JSON API 会将其从集合中排除。


  同时，*组*是由条件中的断言组成的逻辑集合，用于构建更大的条件组。这些条件组可以嵌套，以形成粒度精细的查询。例如，考虑以下示例，它展示了当我们嵌套条件组时建立的树状关系。我们可以很容易地用这种方式表达一个条件层级结构。


  ```

  v( w() && x( y() || z() ) )

  ```


  在此例中，条件 `y()` 和 `z()` 是组 `x()` 的成员，它们之间是 `OR` 关系。条件 `w()` 和 `x()` 是组 `v()` 的成员，它们之间是
  `AND` 关系。图 12-2 将此条件组以树的形式展示出来。


  ![../images/468476_1_En_12_Chapter/468476_1_En_12_Fig2_HTML.jpg](img/468476_1_En_12_Fig2_HTML.jpg)


  图 12-2


  示例条件组以层级树的形式表示


  条件包含三个组成部分：路径、运算符和值。*路径*用于标识特定资源上的具体字段。*运算符*是比较方法，用于验证条件是否满足。*值*是我们需要与资源进行比较的对象。由于
  URL 查询字符串的限制，我们将每个条件表示为一个键值对。^(⁵⁵)


  考虑以下过滤器，我们为其赋予了一个随机标识符。此过滤器查找所有满足用户名字为“Gábor”且无其他条件的资源。请注意在此示例中，特殊字符如 `=`（`%3D`）和
  `á`（`%E1`）是必需的，因为它们在 URL 查询字符串中要使用。


  ```

  /jsonapi/user/user

  ?filter[my-custom-filter][condition][path]=field_first_name

  &filter[my-custom-filter][condition][operator]=%3D

  &filter[my-custom-filter][condition][value]=G%E1bor

  ```


  每个条件或组都必须有一个标识符，我们可以任意定义，以便 JSON API 能成功将其与其他条件和组区分开来。例如，假设我们可能还想按姓氏进行过滤，以便只检索姓氏以字母
  H 开头的资源。为此，我们需要区分我们的条件。


  ```

  /jsonapi/user/user

  ?filter[first-name-filter][condition][path]=field_first_name

  &filter[first-name-filter][condition][operator]=%3D

  &filter[first-name-filter][condition][value]=G%E1bor

  &filter[last-name-filter][condition][path]=field_last_name

  &filter[last-name-filter][condition][operator]=STARTS_WITH

  &filter[last-name-filter][condition][value]=H

  ```


  表 12-2 列出了 Drupal 的 JSON API 实现中所有可用的过滤运算符及其定义。


  表 12-2


  JSON API 过滤运算符及定义


  | **运算符** | **定义** |

  | --- | --- |

  | `=` | 等于 |

  | `<>` | 不等于 |

  | `>` | 大于 |

  | `>=` | 大于或等于 |

  | `<` | 小于 |

  | `<=` | 小于或等于 |

  | `STARTS_WITH` | 以提供的值开头 |

  | `CONTAINS` | 包含提供的值 |

  | `ENDS_WITH` | 以提供的值结尾 |

  | `IN` | 检查提供的值是否存在于数组中 |

  | `NOT_IN` | 检查提供的值是否不存在于数组中 |

  | `BETWEEN` | 检查提供的值是否在某个范围内 |

  | `NOT_BETWEEN` | 检查提供的值是否不在某个范围内 |

  | `IS_NULL` | 是否为空（无需提供值） |

  | `IS_NOT_NULL` | 是否不为空（无需提供值） |




  #### 使用条件组过滤资源集合


  到目前为止，我们已经在查询中应用了两个条件，但尚未将它们组合起来以对应图 12-2 所示的内容。要构建一个*条件组*，我们需要使用 `AND` 或 `OR` 在条件之间创建*连接*。现在，我们可以检查资源集合中用户的姓是否为“Gábor”或“Gabe”。


  要创建条件组，我们定义一个条件组名称，然后通过 `memberOf` 键和该条件组名称将所需的过滤器分配给该组。组也可以有自己的 `memberOf` 键，这意味着我们可以在组内嵌套其他条件组。考虑以下示例，它构建了一个条件组，用于选择名字为
  Gábor 或 Gabe 的用户，并使用了另一个过滤器来选择姓氏以 H 开头的用户。


  ```

  /jsonapi/user/user

  ?filter[g-condition-group][group][conjunction]=OR

  &filter[gabor-filter][condition][path]=field_first_name

  &filter[gabor-filter][condition][operator]=%3D

  &filter[gabor-filter][condition][value]=G%E1bor

  &filter[gabor-filter][condition][memberOf]=g-condition-group

  &filter[gabe-filter][condition][path]=field_last_name

  &filter[gabe-filter][condition][operator]=%3D

  &filter[gabe-filter][condition][value]=Gabe

  &filter[gabe-filter][condition][memberOf]=g-condition-group

  &filter[last-name-filter][condition][path]=field_last_name

  &filter[last-name-filter][condition][operator]=STARTS_WITH

  &filter[last-name-filter][condition][value]=H

  ```


  图 12-3 以层次树的形式展示了这些条件。


  ![../images/468476_1_En_12_Chapter/468476_1_En_12_Fig3_HTML.jpg](img/468476_1_En_12_Fig3_HTML.jpg)


  图 12-3


  JSON API 条件组可以任意嵌套


  条件还包含另一个在路径中体现的强大功能，就像我们在关于排序操作的小节末尾看到的那样。路径提供了一种手段，使我们能够根据相关实体中的值进行过滤，并使用点号（`.`）标记法来遍历这些关系。考虑以下示例，它根据作者姓名的开头部分过滤文章。


  ```

  /jsonapi/node/article

  ?filter[author_name][condition][path]=uid.name

  &filter[author_name][condition][operator]=STARTS_WITH

  &filter[author_name][condition][value]=Angie

  ```


  ### 注意


  如果存在多个相关实体，例如在一个具有多个值的字段中，你也可以使用正整数来指定要定位的相关实体。例如，路径 `related_entity.1.field` 将根据第二个相关资源进行过滤。


  如果某些过滤器的冗长形式令人担忧，那么 JSON API 提供了某些简写形式可以让编写过滤器更高效，这将会让人感到欣慰。例如，以下过滤器可以简化为紧随其后的过滤器，因为当未提供其他运算符时，默认使用等于号（`=`）。


  ```

  /jsonapi/user/user

  ?filter[first-name-filter][condition][path]=field_first_name

  &filter[first-name-filter][condition][operator]=%3D

  &filter[first-name-filter][condition][value]=G%E1bor

  /jsonapi/user/user

  ?filter[first-name-filter][condition][path]=field_first_name

  &filter[first-name-filter][condition][value]=G%E1bor

  ```


  如果不需要多次按同一字段进行过滤，可以将路径用作过滤器的标识符。在以下过滤器中，我们通过用字段名本身替换自定义过滤器名称来减少了 URL 的冗长性。


  ```

  /jsonapi/user/user

  ?filter[first-name-filter][condition][path]=field_first_name

  &filter[first-name-filter][condition][value]=G%E1bor

  /jsonapi/user/user

  ?filter[field_first_name][value]=G%E1bor

  ```


  最后，在这种情况下我们可以完全省略 `value`。


  ```

  /jsonapi/user/user

  ?filter[field_first_name]=G%E1bor

  ```


  ### 注意


  不应将 Drupal 的 JSON API 实现中的过滤器与 Drupal 的访问控制（由用户角色和权限管理）相混淆。最佳实践是始终在后端验证访问权限，而不是依赖于消费者端发来的查询，并提前从响应中过滤掉不可访问的资源。最重要的是，如果发出请求的用户缺少对某个资源的访问权限，JSON
  API 将不会返回该资源。


  ## 常见过滤场景示例


  在本节中，我们将列举一些常见场景并为每个场景提供相应的过滤器。考虑以下示例，它仅获取那些已发布的文章。在以下每个示例中，长格式版本后面都会跟一个简写版本。


  ```

  /jsonapi/node/article

  ?filter[status-filter][condition][path]=status

  &filter[status-filter][condition][value]=1

  /jsonapi/node/article

  ?filter[status][value]=1

  ```


  我们还可以通过定位被引用实体的 UUID 来基于该实体是否存在进行过滤。在此例中，我们定位的是特定用户的文章。


  ```

  /jsonapi/node/article

  ?filter[author-filter][condition][path]=uid.uuid

  &filter[author-filter][condition][value]=360427cb-96be-459f-a0d9-8fe9bc5164a4

  /jsonapi/node/article

  ?filter[uid.uuid][value]=360427cb-96be-459f-a0d9-8fe9bc5164a4

  ```


  我们也可能希望根据用户是否属于用户列表中的某几个用户来过滤文章集合。为此，我们使用 `IN` 过滤器运算符和一种特殊的数组表示法来判断一篇文章是否是由 `admin`
  或 `average_joe` 编写的。


  ```

  /jsonapi/node/article

  ?filter[name-filter][condition][path]=uid.name

  &filter[name-filter][condition][operator]=IN

  &filter[name-filter][condition][value][]=admin

  &filter[name-filter][condition][value][]=average_joe

  ```


  ### 注意


  如需获取此处未涉及的、更复杂的其他示例，请参见 Drupal.org 上的文档，网址为 [`https://www.drupal.org/docs/8/modules/json-api/filtering`](https://www.drupal.org/docs/8/modules/json-api/filtering)。


  ## 检索字段的有限子集


  如果你需要向各种不同的客户端提供内容，包括那些出于性能原因而传输小数据量的消费者，JSON API 模块返回的完整响应往往过于庞大。为了解决这个问题，JSON
  API 规范支持通过查询参数来从资源中检索字段的有限子集，这些参数枚举了我们希望在响应中包含的字段。


  例如，我们可以提供一个 `fields` 查询参数，指示 API 只向我们提供文章的标题、创建时间戳、修改时间戳以及正文内容。


  ```

  /jsonapi/node/article?fields[node--article]=title,created,changed,body

  ```




  ### 使用 JSON API 创建资源


  得益于 JSON API 规范，我们可以通过 API 创建单个资源，但无法像检索集合那样创建多个资源。通过 JSON API 进行资源的更新和删除也是如此。^(⁵⁶)
  有关如何缓解此限制的信息，请参阅第 23 章关于子请求模块的介绍。


  JSON API 要求每个 `POST` 请求都包含以下请求标头，以生成标准响应：


  ```

  Accept: application/vnd.api+json

  Content-Type: application/vnd.api+json

  ```


  要创建文章，我们可以使用相同的 URI（即我们向 Drupal 中的 JSON API 发出 `POST` 请求时用于检索文章集合的 URI）。


  ```

  /jsonapi/node/article

  ```


  正如我们在核心 REST 中创建实体时所看到的，我们需要在请求负载中包含任何必填字段：


  ```

  {

  "data": {

  "type": "node--article",

  "attributes": {

  "title": "My snazzy new article",

  "body": {

  "value": "Hello world! Lorem ipsum dolor sit amet consectetur adipiscing elit",

  "format": "plain_text"

  }

  }

  }

  }

  ```


  通常，在创建实体时，我们可能希望同时包含一个关系，用以标识用户为文章的作者。在以下请求负载中，我们在该 `POST` 请求中包含了一个关系，该关系将实体分配给一个标识符为
  `{{user_uuid}}` 的现有用户。


  ```

  {

  "data": {

  "type": "node--article",

  "attributes": {

  "title": "My snazzy new article",

  "body": {

  "value": "Hello world! Lorem ipsum dolor sit amet consectetur adipiscing elit",

  "format": "plain_text"

  }

  },

  "relationships": {

  "uid": {

  "data": {

  "type": "user--user",

  "id": "{{user_uuid}}"

  }

  }

  }

  }

  }

  ```


  这两个 `POST` 请求在响应中都会返回 `201 Created` 响应码，并且 JSON API 还会在响应正文中向我们展示已创建的实体（包含 Drupal
  生成的 UUID），就像我们将其作为单个资源进行检索一样。图 12-4 展示了 Postman 中的示例响应。


  ![../images/468476_1_En_12_Chapter/468476_1_En_12_Fig4_HTML.jpg](img/468476_1_En_12_Fig4_HTML.jpg)


  图 12-4


  创建文章时，Drupal 的 JSON API 实现在响应体中返回新创建的实体


  ### 注意


  如果遇到 `403 Forbidden` 响应码和一条要求“管理节点”权限的错误消息，你可以为测试目的将该权限分配给匿名用户，但在生产环境中不建议这样做。


  ### 使用 JSON API 更新资源


  `PATCH` 请求也需要 `Accept` 和 `Content-Type` 请求标头。^(⁵⁷)


  ```

  Accept: application/vnd.api+json

  Content-Type: application/vnd.api+json

  ```


  要向 Drupal 发出 `PATCH` 请求以更新实体，我们首先需要确定相关资源的 UUID。


  ```

  /jsonapi/node/article/{{node_uuid}}

  ```


  在请求负载中，与核心 REST 一样，我们只包含希望修改的字段以及相关实体的 UUID。


  ```

  {

  "data": {

  "type": "node--article",

  "id": "{{node_uuid}}",

  "attributes": {

  "title": "My even snazzier new article"

  }

  }

  }

  ```


  `PATCH` 请求也允许我们包含一个指向文章作者的用户关系，我们在请求体中通过其 UUID 来标识作者。以下对象显示了一个关系，该关系将实体链接到由 `{{user_uuid}}`
  标识的现有用户。


  ```

  {

  "data": {

  "type": "node--article",

  "id": "{{node_uuid}}",

  "attributes": {

  "title": "My even snazzier new article"

  },

  "relationships": {

  "uid": {

  "data": {

  "type": "user--user",

  "id": "{{user_uuid}}"

  }

  }

  }

  }

  }

  ```


  每个请求都返回 `200 OK` 响应码，JSON API 响应中包含完整的更新后实体。图 12-5 展示了该请求的结果。


  ![../images/468476_1_En_12_Chapter/468476_1_En_12_Fig5_HTML.jpg](img/468476_1_En_12_Fig5_HTML.jpg)


  图 12-5


  与 `POST` 请求一样，`PATCH` 请求会从 JSON API 获取响应，该响应在响应体中包含更新后的实体


  ### 使用 JSON API 删除资源


  现在我们已经更新了文章，我们也可以删除文章，但只需在 `DELETE` 请求中包含 `Content-Type` 请求标头即可。


  ```

  Content-Type: application/vnd.api+json

  ```


  与核心 REST 一样，与其他不安全的 HTTP 方法不同，我们在发出 `DELETE` 请求时不需要提供任何请求负载。我们所要做的就是使用其 UUID 定位资源，并向该
  URI 发出 `DELETE` 请求。^(⁵⁸)


  ```

  /jsonapi/node/article/{{node_uuid}}

  ```


  此请求返回 `204 No Content` 响应码，响应负载没有任何内容，表明我们的文章已从 Drupal 中删除。图 12-6 展示了 Postman 中的示例响应。


  ![../images/468476_1_En_12_Chapter/468476_1_En_12_Fig6_HTML.jpg](img/468476_1_En_12_Fig6_HTML.jpg)


  图 12-6


  作为对我们 `DELETE` 请求的响应，Drupal 的 JSON API 实现返回一个空的响应体和 `204 No Content` 响应码，证明我们的实体已从
  Drupal 中删除


  ## 总结


  在本章中，我们介绍了在 Drupal 中使用 JSON API 执行基本的 CRUD 操作。尽管 JSON API 是一个复杂且健壮的规范，可以满足各种需求，但多亏了
  JSON API 模块，即使是刚刚接触解耦 Drupal 的从业者也可以轻松使用。虽然其方法在实质上与核心 REST 有很大不同，但许多预期的响应码和响应负载表明两者之间有很高的相似性。


  在下一章中，我们将把注意力转向使用 RELAXed Web Services（遵循 CouchDB 规范的模块）执行 CRUD 操作。我们将涵盖所有相同的操作，包括使用
  RELAXed Web Services 模块创建、检索、更新和删除 Drupal 内容。


