    \ PHP 变量，然后将内容转储到控制台，以便清晰了解响应的样子。以天气 API 为例，JSON 响应的数据如下所示：\n\n```\nstdClass Object\n\
    (\n    [coord] => stdClass Object\n        (\n            [lon] => -118.24\n \
    \           [lat] => 34.05\n        )\n\n    [weather] => Array\n        (\n \
