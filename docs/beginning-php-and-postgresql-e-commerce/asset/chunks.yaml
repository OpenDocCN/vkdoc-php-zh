  trans: "```sql\nWHERE cart_id = inCartId AND product_id = inProductIds[i]; ELSE\n\
    PERFORM shopping_cart_remove_product(inCartId, inProductIds[i]); END IF;\nEND\
    \ LOOP;\nEND;\n$$;\n```\n\n当你想要更新一个或多个现有购物车商品的数量时，可以使用 `shopping_cart_update`\
    \ 函数。当访问者点击“更新”按钮时，会调用此函数。\n\n`shopping_cart_update` 接收两个数组值作为参数：`inProductIds`\
    \ 和 `inQuantities`。\n\n`inQuantities[i]` 的值表示 `inProductIDs[i]` 所指定商品的新数量。\n\n\
    如果 `inQuantities[i]` 为零或负数，`shopping_cart_update` 会从购物车中移除该商品。否则，它会更新购物车中该商品的数量，并同时更新\
    \ `added_on` 字段，以准确反映记录上次被修改的时间。\n\n更新 `added_on` 字段对于管理页面特别有用，因为您需要移除长时间未更新的购物车。\n\
    \n**5.** 使用查询工具执行以下代码，以便在您的 hatshop 数据库中创建 `shopping_cart_remove_product` 函数：\n\
    \n```sql\n-- 创建 shopping_cart_remove_product 函数\nCREATE FUNCTION shopping_cart_remove_product(CHAR(32),\
    \ INTEGER)\nRETURNS VOID LANGUAGE plpgsql AS $$\nDECLARE\n  inCartId ALIAS FOR\
    \ $1;\n  inProductId ALIAS FOR $2;\nBEGIN\n  DELETE FROM shopping_cart\n  WHERE\
    \ cart_id = inCartId AND product_id = inProductId;\nEND;\n$$;\n```\n\n当访问者点击购物车中某个商品的“移除”按钮时，`shopping_cart_remove_product`\
    \ 函数会将该商品从购物车中移除。\n\n**6.** 使用查询工具执行以下代码，以便在您的 hatshop 数据库中创建 `cart_product` 类型和\
    \ `shopping_cart_get_products` 函数：\n\n```sql\n-- 创建 cart_product 类型\nCREATE TYPE\
    \ cart_product AS\n(\n  product_id INTEGER,\n  name VARCHAR(50),\n  price NUMERIC(10,\
    \ 2),\n  quantity INTEGER,\n  subtotal NUMERIC(10, 2)\n);\n\n-- 创建 shopping_cart_get_products\
    \ 函数\nCREATE FUNCTION shopping_cart_get_products(CHAR(32))\nRETURNS SETOF cart_product\
    \ LANGUAGE plpgsql AS $$\nDECLARE\n  inCartId ALIAS FOR $1;\n  outCartProductRow\
    \ cart_product;\nBEGIN\n  FOR outCartProductRow IN\n    SELECT p.product_id, p.name,\n\
    \           COALESCE(NULLIF(p.discounted_price, 0), p.price) AS price, sc.quantity,\n\
    \           COALESCE(NULLIF(p.discounted_price, 0), p.price) * sc.quantity AS\
    \ subtotal\n    FROM shopping_cart sc\n    INNER JOIN product p\n    ON sc.product_id\
    \ = p.product_id\n    WHERE sc.cart_id = inCartId AND buy_now\n  LOOP\n    RETURN\
    \ NEXT outCartProductRow;\n  END LOOP;\nEND;\n$$;\n```\n\n`shopping_cart_get_products`\
    \ 函数返回由 `inCartId` 参数指定的购物车中的商品。由于 `shopping_cart` 表仅存储每个商品的 `product_id`，因此您需要连接\
    \ `shopping_cart` 和 `product` 表来获取所需信息。\n\n请注意，部分商品可能有折扣价格。当商品有折扣价格时（即其 `discounted_price`\
    \ 值不为 0），应使用折扣价格进行计算。否则，应使用其标价。以下表达式在 `discounted_price` 不为 0 时返回该值；否则返回 `price`：\n\
    \n```sql\nCOALESCE(NULLIF(p.discounted_price, 0), p.price)\n```\n\n> **注意：** 这是您第一次使用\
    \ `COALESCE` 和 `NULLIF` 这两个 PostgreSQL 条件表达式，因此我们来了解一下它们的作用。`COALESCE` 可以接受任意数量的参数，并返回第一个不为\
    \ `NULL` 的参数。`NULLIF` 接受两个参数，如果它们相等则返回 `NULL`；否则返回第一个参数。在我们的示例中，我们使用 `NULLIF`\
    \ 来测试 `discounted_price` 是否为 0；如果条件成立，`NULLIF` 返回 `NULL`，那么 `COALESCE` 函数将返回 `p.price`。如果\
    \ `discounted_price` 不为 0，则整个表达式返回 `discounted_price`。\n\n**7.** 使用查询工具执行以下代码，以便在您的\
    \ hatshop 数据库中创建 `cart_saved_product` 类型和 `shopping_cart_get_saved_products` 函数：\n\
    \n```sql\n-- 创建 cart_saved_product 类型\nCREATE TYPE cart_saved_product AS\n(\n\
    \  product_id INTEGER,\n  name VARCHAR(50),\n  price NUMERIC(10, 2)\n);\n\n--\
    \ 创建 shopping_cart_get_saved_products 函数\nCREATE FUNCTION shopping_cart_get_saved_products(CHAR(32))\
    \ RETURNS SETOF cart_saved_product LANGUAGE plpgsql AS $$\nDECLARE\n  inCartId\
    \ ALIAS FOR $1;\n  outCartSavedProductRow cart_saved_product;\nBEGIN\n  FOR outCartSavedProductRow\
    \ IN\n    SELECT p.product_id, p.name,\n           COALESCE(NULLIF(p.discounted_price,\
    \ 0), p.price) AS price\n    FROM shopping_cart sc\n    INNER JOIN product p\n\
    \    ON sc.product_id = p.product_id\n    WHERE sc.cart_id = inCartId AND NOT\
    \ buy_now\n  LOOP\n    RETURN NEXT outCartSavedProductRow;\n  END LOOP;\nEND;\n\
    $$;\n```\n\n`shopping_cart_get_saved_products` 函数返回由 `inCartId` 参数指定的购物车中保存以供稍后购买的商品。\n\
    \n**8.** 使用查询工具执行以下代码，以便在您的 hatshop 数据库中创建 `shopping_cart_get_total_amount` 函数：\n\
    \n```sql\n-- 创建 shopping_cart_get_total_amount 函数\nCREATE FUNCTION shopping_cart_get_total_amount(CHAR(32))\
    \ RETURNS NUMERIC(10, 2) LANGUAGE plpgsql AS $$\nDECLARE\n  inCartId ALIAS FOR\
    \ $1;\n  outTotalAmount NUMERIC(10, 2);\nBEGIN\n  SELECT INTO outTotalAmount\n\
    \         SUM(COALESCE(NULLIF(p.discounted_price, 0), p.price) * sc.quantity)\n\
    \  FROM shopping_cart sc\n  INNER JOIN product p\n  ON sc.product_id = p.product_id\n\
    \  WHERE sc.cart_id = inCartId AND sc.buy_now;\n  RETURN outTotalAmount;\nEND;\n\
    $$;\n```\n\n`shopping_cart_get_total_amount` 函数返回购物车中商品的总价值。在显示购物车总金额时会调用此函数。如果购物车为空，`total_amount`\
    \ 将为 0。\n\n**9.** 使用查询工具执行以下代码，以便在您的 hatshop 数据库中创建 `shopping_cart_save_product_for_later`\
    \ 函数：\n\n```sql\n-- 创建 shopping_cart_save_product_for_later 函数\nCREATE FUNCTION\
    \ shopping_cart_save_product_for_later(CHAR(32), INTEGER) RETURNS VOID LANGUAGE\
    \ plpgsql AS $$\nDECLARE\n  inCartId ALIAS FOR $1;\n  inProductId ALIAS FOR $2;\n\
    BEGIN\n  UPDATE shopping_cart\n  SET buy_now = false, quantity = 1\n  WHERE cart_id\
    \ = inCartId AND product_id = inProductId;\nEND;\n$$;\n```\n\n`shopping_cart_save_product_for_later`\
    \ 函数将购物车中的商品保存到“稍后购买”列表中，以便访问者日后购买（在下单时该商品不会进入结算流程）。这是通过将 `buy_now` 字段的值设置为 `false`\
    \ 来实现的。\n\n**10.** 使用查询工具执行以下代码，以便在您的 hatshop 数据库中创建 `shopping_cart_move_product_to_cart`\
    \ 函数：\n\n```sql\n-- 创建 shopping_cart_move_product_to_cart 函数\nCREATE FUNCTION\
    \ shopping_cart_move_product_to_cart(CHAR(32), INTEGER) RETURNS VOID LANGUAGE\
    \ plpgsql AS $$\nDECLARE\n  inCartId ALIAS FOR $1;\n  inProductId ALIAS FOR $2;\n\
    BEGIN\n  UPDATE shopping_cart\n  SET buy_now = true, added_on = NOW()\n  WHERE\
    \ cart_id = inCartId AND product_id = inProductId;\nEND;\n$$;\n```\n\n`shopping_cart_move_product_to_cart`\
    \ 函数将商品的 `buy_now` 状态设置为 `true`，以便访问者在下单时购买该商品。"
- fmt: "# Implementing the Business Tier\n\nTo implement the business tier, you’ll\
    \ need to create the usual methods that call the data object layer methods you’ve\
    \ just written, and you’ll add some new ones that manage business logic.\n\n##\
    \ Exercise: Implementing the Shopping Cart Business Logic\n\n1. First, add the\
    \ following two lines at the end of your `include/config.php` file. These constants\
    \ are used to differentiate between current shopping cart items and items that\
    \ are saved for later:\n\n```php\n// Shopping cart item types\ndefine('GET_CART_PRODUCTS',\
    \ 1);\ndefine('GET_CART_SAVED_PRODUCTS', 2);\n```\n\n2. Include a reference to\
    \ `shopping_cart.php` in `include/app_top.php`:\n\n```php\n// Load Business Tier\n\
    require_once BUSINESS_DIR . 'catalog.php';\nrequire_once BUSINESS_DIR . 'shopping_cart.php';\n\
    ```\n\n3. Create a new file called `shopping_cart.php` in the `business` folder.\
    \ Add the following code to the file, and then we’ll comment on it in the “How\
    \ It Works” section:\n\n```php\n<?php\n// Business tier class for the shopping\
    \ cart\nclass ShoppingCart\n{\n    // Stores the visitor's Cart ID\n    private\
    \ static $_mCartId;\n\n    // Private constructor to prevent direct creation of\
    \ object\n    private function __construct()\n    {\n    }\n\n    /* This will\
    \ be called by GetCartId to ensure we have the visitor's cart ID in the visitor's\
    \ session in case\n    $_mCartID has no value set */\n    public static function\
    \ SetCartId()\n    {\n        // If the cart ID hasn't already been set ...\n\
    \        if (self::$_mCartId == '')\n        {\n            // If the visitor's\
    \ cart ID is in the session, get it from there\n            if (isset ($_SESSION['cart_id']))\n\
    \            {\n                self::$_mCartId = $_SESSION['cart_id'];\n    \
    \        }\n            // If not, check if the cart ID was saved as a cookie\n\
    \            elseif (isset ($_COOKIE['cart_id']))\n            {\n           \
    \     // Save the cart ID from the cookie\n                self::$_mCartId = $_COOKIE['cart_id'];\n\
    \                $_SESSION['cart_id'] = self::$_mCartId;\n                // Regenerate\
    \ cookie to be valid for 7 days (604800 seconds)\n                setcookie('cart_id',\
    \ self::$_mCartId, time() + 604800);\n            }\n            else\n      \
    \      {\n                /* Generate cart id and save it to the $_mCartId class\
    \ member, the session and a cookie (on subsequent requests $_mCartId will be populated\
    \ from the session) */\n                self::$_mCartId = md5(uniqid(rand(), true));\n\
    \                // Store cart id in session\n                $_SESSION['cart_id']\
    \ = self::$_mCartId;\n                // Cookie will be valid for 7 days (604800\
    \ seconds)\n                setcookie('cart_id', self::$_mCartId, time() + 604800);\n\
    \            }\n        }\n    }\n\n    // Returns the current visitor's cart\
    \ id\n    public static function GetCartId()\n    {\n        // Ensure we have\
    \ a cart id for the current visitor\n        if (!isset (self::$_mCartId))\n \
    \           self::SetCartId();\n        return self::$_mCartId;\n    }\n\n   \
    \ // Adds product to the shopping cart\n    public static function AddProduct($productId)\n\
    \    {\n        // Build the SQL query\n        $sql = 'SELECT shopping_cart_add_product(:cart_id,\
    \ :product_id);';\n        // Build the parameters array\n        $params = array\
    \ (':cart_id' => self::GetCartId(),\n                          ':product_id' =>\
    \ $productId);\n        // Prepare the statement with PDO-specific functionality\n\
    \        $result = DatabaseHandler::Prepare($sql);\n        // Execute the query\n\
    \        return DatabaseHandler::Execute($result, $params);\n    }\n\n    /* Updates\
    \ the shopping cart with new product quantities ($productId and $quantity are\
    \ arrays that contain product ids and their respective quantities) */\n    public\
    \ static function Update($productId, $quantity)\n    {\n        // Build the SQL\
    \ query\n        $sql = 'SELECT shopping_cart_update(:cart_id, :product_id, :quantity);';\n\
    \        // Build the parameters array\n        $params = array (':cart_id' =>\
    \ self::GetCartId(),\n                          ':product_id' => '{' . implode(',\
    \ ', $productId) . '}',\n                          ':quantity' => '{' . implode(',\
    \ ', $quantity) . '}');\n        // Prepare the statement with PDO-specific functionality\n\
    \        $result = DatabaseHandler::Prepare($sql);\n        // Execute the query\n\
    \        return DatabaseHandler::Execute($result, $params);\n    }\n\n    // Removes\
    \ product from shopping cart\n}\n```"
