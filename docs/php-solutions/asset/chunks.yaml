- fmt: "每个标签都从输入字段的`name`属性派生，该属性位于`$expected`数组的当前元素中。`str_replace()`的第一个参数是一个包含下划线和连字符的数组。如果在`name`属性中找到其中任意一个字符，它就会被替换为第二个参数，即一个由单个空格组成的字符串。然后，第一个字母通过`ucfirst()`被设置成大写。\n\
    \n在消息体被合并成单个字符串后，它会被传递给`wordwrap()`函数，以将行长度限制为70个字符。发送电子邮件的代码仍需添加，但出于测试目的，`$mailSent`已被设置为`true`。\n\
    \n保存`processmail.php`。在`contact.php`底部找到以下代码块：\n\n```\n<?php if ($_POST) {print_r($_POST);}\
