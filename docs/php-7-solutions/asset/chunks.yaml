    如果文件大于表单隐藏字段中`MAX_FILE_SIZE`指定的限制，则不会上传任何内容，因此`$_FILES`数组的`type`元素为空。高亮显示的代码添加了一个新条件，仅当`$file[''type'']`不为空时才调用`checkType()`方法。


