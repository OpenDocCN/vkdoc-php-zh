  '
- "# 创建 `authorized_keys` 文件并粘贴用户的公钥：\n```\n$ vi .ssh/authorized_keys\n$ chmod 0700\
  \ .ssh/authorized_keys\n```\n\n> **注意**\n> SSH 访问失败的一个常见原因是创建了权限过于宽松的配置文件。SSH 配置环境应仅对帐户所有者可读和可写。\
  \ Michael Stahnke 所著的《Pro OpenSSH》（Apress，2005 年）对 SSH 有全面的介绍。\n\n### 关闭 `git` 用户的\
  \ Shell 访问\n\n任何服务器的开放程度都不应超过其实际需求。您可能希望允许用户访问 Git 命令，但很可能不希望他们做更多的事情。\n\n你可以通过查看\
  \ `/etc/passwd` 文件来查看 Linux 服务器上某个用户关联的 shell。以下是我远程服务器上 `git` 帐户的相关行：\n\n```\n\
  git:x:1001:1001::/home/git:/bin/bash\n```\n\nGit 提供了一个名为 `git-shell` 的特殊 shell，它只允许用户执行选定的命令。我可以通过编辑\
  \ `/etc/passwd` 来启用此程序用于登录：\n\n```\ngit:x:1001:1001::/home/git:/usr/bin/git-shell\n\
  ```\n\n现在，如果我尝试通过 SSH 登录，系统会提示我并登出：\n\n```\n$ ssh git@poppch17.vagrant.internal\n\
  Last login: Sat Jul 30 11:58:27 2016 from 192.168.33.1\nfatal: What do you think\
  \ I am? A shell?\nConnection to poppch17.vagrant.internal closed.\n```\n\n## 开始一个项目\n\
  \n现在，我已经有了一个远程 Git 服务器，并且可以从我的本地帐户访问它，是时候将我正在开发的工作添加到位于 `/var/git/megaquiz` 的仓库中了。\n\
  \n在开始之前，我会仔细检查我的文件和目录，并删除可能找到的任何临时项目。未做此检查是一个常见的麻烦。需要注意的临时项目包括自动生成的文件，例如 composer\
  \ 包、构建目录、安装程序日志等。\n\n> **注意**\n> 你可以通过在仓库中放置一个名为 `.gitignore` 的文件来指定要忽略的文件和模式。在\
  \ Linux 系统上，`man gitignore` 命令应提供文件名通配符的示例，你可以修改这些示例以排除构建过程、编辑器和 IDE 创建的各种锁文件和临时目录。本文也可在\
  \ [`http://git-scm.com/docs/gitignore`](http://git-scm.com/docs/gitignore) 在线获取。\n\
  \n在进一步操作之前，我应该向 Git 注册我的身份——这有助于追踪仓库中谁做了什么：\n\n```\n$ git config --global user.name\
  \ \"matt z\"\n$ git config --global user.email \"matt@getinstance.com\"\n```\n\n\
  现在我已经建立了个人详细信息，并确保我的项目是干净的，我可以设置它并将其代码推送到服务器：\n\n```\n$ cd megaquiz\n$ git init\n\
  Initialized empty Git repository in /home/mattz/work/megaquiz/.git/\n```\n\n现在是时候添加我的文件了：\n\
  \n```\n$ git add .\n```\n\nGit 现在正在跟踪 `megaquiz` 下的所有文件和目录。被跟踪的文件可以处于三种状态：未修改、已修改或已暂存。你可以通过运行命令\
  \ `git status` 来检查：\n\n```\n$ git status\nOn branch master\nInitial commit\nChanges\
  \ to be committed:\n(use \"git rm --cached ...\" to unstage)\nnew file:   command/Command.php\n\
  new file:   command/CommandContext.php\nnew file:   command/FeedbackCommand.php\n\
  new file:   command/LoginCommand.php\nnew file:   main.php\nnew file:   quizobjects/User.php\n\
  new file:   quiztools/AccessManager.php\nnew file:   quiztools/ReceiverFactory.php\n\
  ```\n\n得益于我之前的 `git add` 命令，我所有的文件都已暂存，准备提交。我现在可以继续执行 `commit` 命令：\n\n```\n$ git\
  \ commit -m 'my first commit'\n[master (root-commit) f147d21] my first commit\n\
  8 files changed, 235 insertions(+)\ncreate mode 100755 command/Command.php\ncreate\
  \ mode 100755 command/CommandContext.php\ncreate mode 100755 command/FeedbackCommand.php\n\
  create mode 100755 command/LoginCommand.php\ncreate mode 100755 main.php\ncreate\
  \ mode 100755 quizobjects/User.php\ncreate mode 100755 quiztools/AccessManager.php\n\
  create mode 100644 quiztools/ReceiverFactory.php\n```\n\n我通过 `-m` 标志添加了一条消息。如果我省略了它，Git\
  \ 将启动一个编辑器，我可以用它来添加我的检入消息。\n\n如果你习惯于 CVS 和 Subversion 等版本控制系统，你可能会认为我们已经完成了。尽管我可以愉快地从这里继续编辑、添加、提交和分支，但如果我想使用中央仓库共享此代码，我还需要考虑一个额外的阶段。正如我们将在本章后面看到的，Git\
  \ 允许我们管理多个项目分支。得益于这个特性，我可以为每个版本维护一个分支，但同时也将我的高风险尖端开发安全地隔离在生产代码之外。当我们开始时，Git 会建立一个名为\
  \ `master` 的单一分支。我可以用命令 `git branch` 确认我的分支状态：\n\n```\n$ git branch -a\n* master\n\
  ```\n\n`-a` 标志指定 Git 应该向我们展示所有分支（默认是省略远程分支）。输出显示了 `master` 分支。\n\n事实上，我还没有做任何事情来关联我的本地仓库和远程服务器。是时候纠正这一点了：\n\
  \n```\n$ git remote add origin git@poppch17.vagrant.internal:/var/git/megaquiz\n\
  ```\n\n考虑到它完成的工作，这个命令出奇地安静。实际上，它相当于告诉 Git “将昵称 `origin` 与给定的服务器位置关联起来。此外，在本地分支 `master`\
  \ 和远程等效分支之间建立一个跟踪关系。”\n\n为了确认所有这些，我向 Git 检查远程句柄 `origin` 是否已建立：\n\n```\n$ git remote\
  \ -v\norigin git@poppch17.vagrant.internal:/var/git/megaquiz (fetch)\norigin git@poppch17.vagrant.internal:/var/git/megaquiz\
  \ (push)\n```\n\n当然，如果你使用了像 GitHub 这样的服务，你会使用与你等效的 `git remote add` 步骤，如图 17-2 所示。对我来说，这看起来像这样：\n\
  \n```\n$ git remote add origin git@github.com:popp5/megaquiz.git\n```\n\n然而，我仍然没有向我的\
  \ Git 服务器发送任何实际文件，所以这是我的下一步：\n\n```\n$ git push origin master\nCounting objects:\
  \ 12, done.\nDelta compression using up to 2 threads.\nCompressing objects: 100%\
  \ (9/9), done.\nWriting objects: 100% (12/12), 2.65 KiB, done.\nTotal 12 (delta\
  \ 1), reused 0 (delta 0)\nTo git@poppch17.vagrant.internal:/var/git/megaquiz\n*\
  \ [new branch]      master -> master\n```\n\n现在我可以再次运行 `git branch` 命令来确认 `master`\
  \ 分支的远程版本已经出现：\n\n```\n$ git branch -a\n* master\nremotes/origin/master\n```\n\n\
  > **注意**\n> 我已经建立了一个所谓的跟踪分支。这是一个与远程分支相关联的本地分支。\n\n## 克隆仓库\n\n为了本章的目的，我虚构了一位名叫 Bob\
  \ 的团队成员。Bob 和我一起在 MegaQuiz 项目上工作。自然，他想要自己的一份代码。我已经将他的公钥添加到了 Git 服务器，所以他可以开始了。在平行的\
  \ GitHub 世界中，我邀请了 Bob 加入我的项目，他已经将自己的公钥添加到了他的帐户。效果是一样的；Bob 可以使用命令 `git clone` 获取仓库：\n\
  \n```\n$ git clone git@github.com:popp5/megaquiz.git\nremote: Counting objects:\
  \ 14, done.\nremote: Compressing objects: 100% (12/12), done.\nremote: Total 14\
  \ (delta 1), reused 14 (delta 1), pack-reused 0\nReceiving objects: 100% (14/14),\
  \ done.\nResolving deltas: 100% (1/1), done.\n```\n\n现在，我们俩都可以在本地进行开发，并在准备好后，互相分享我们的代码。\n\
  \n## 更新与提交\n\nBob 当然是一位出色且有才华的伙伴。除了一点，一个常见且非常烦人的特质：他无法不去动别人的代码。\n\nBob 聪明且好奇，很容易被闪亮的新开发方向所兴奋，并且他非常渴望帮助优化新代码。结果，无论我走到哪里，我似乎都能看到\
  \ Bob 的手笔。Bob 在我的文档中加了东西，他还实现了一个我在喝咖啡时提到的想法。我可能不得不干掉 Bob。然而，在此期间，我必须处理这样一个事实：我正开发的代码需要与\
  \ Bob 的输入合并。\n\n这里有一个名为 `quizobjects/User.php` 的文件。目前，它只包含最简单的骨架：\n\n```\nnamespace\
  \ popp\\ch17\\megaquiz\\quizobjects;\nclass User\n{\n}\n```\n\n我决定添加一些文档。我首先在我的版本文件中添加一个文件注释：\n\
  \n```\nnamespace popp\\ch17\\megaquiz\\quizobjects;\n/**\n* @license   http://www.example.com\
  \ Borsetshire Open License\n* @package  quizobjects\n*/\nclass User\n{\n}\n```\n\
  \n记住文件可以处于三种状态：未修改、已修改和已暂存。`User.php` 文件现在已经从未修改变为已修改。我可以使用 `git status` 命令看到这一点：\n\
  \n```\n$ git status\nOn branch master\nYour branch is up-to-date with 'origin/master'.\n\
  Changes not staged for commit:\n  (use \"git add <file>...\" to update what will\
  \ be committed)\n  (use \"git checkout -- <file>...\" to discard changes in working\
  \ directory)\nmodified:   quizobjects/User.php\nno changes added to commit (use\
  \ \"git add\" and/or \"git commit -a\")\n```\n\n`User.php` 已被修改，但尚未暂存以进行提交。我可以使用\
  \ `git add` 命令更改此状态：\n\n```\n$ git add quizobjects/User.php\n$ git status\nOn branch\
  \ master\nYour branch is up-to-date with 'origin/master'.\nChanges to be committed:\n\
  \  (use \"git reset HEAD <file>...\" to unstage)\nmodified:   quizobjects/User.php\n\
  ```\n\n现在我准备提交：\n\n```\n$ git commit -m'added documentation' quizobjects/User.php\n\
  [master 97472c4] added documentation\n1 file changed, 5 insertions(+)\n```\n\nGit\
  \ 提交只影响我的本地仓库。如果我相信世界已经准备好接受我的更改，我必须将我的代码推送到远程仓库：\n\n```\n$ git push origin master\n\
  Counting objects: 6, done.\nDelta compression using up to 4 threads.\nCompressing\
  \ objects: 100% (5/5), done.\nWriting objects: 100% (6/6), 670 bytes | 0 bytes/s,\
  \ done.\nTotal 6 (delta 2), reused 0 (delta 0)\nTo git@github.com:popp5/megaquiz.git\n\
  \   715fc2f..04d75b4  master -> master\n```\n\n与此同时，Bob 在自己的沙盒中工作，一如既往地热心，并且他创建了一个类注释：\n\
  \n```\nnamespace popp\\ch17\\megaquiz\\quizobjects;\n/**\n* @package  quizobjects\n\
  */\nclass User\n{\n}\n```\n\n现在轮到 Bob 执行 `add`、`commit` 和 `push` 了。因为这部分的添加和提交通常一起运行，Git\
  \ 允许你将它们合并到一个命令中：\n\n```\n$ git commit -a -m'my great documentation'\n[master 161c6c5]\
  \ my great documentation\n1 files changed, 4 insertions(+), 0 deletions(-)\n```\n\
  \n所以我们现在有两个不同的 `User.php` 版本。一个是我刚刚推送到远程仓库的版本，另一个是 Bob 的版本，已提交但尚未推送。让我们看看当 Bob 尝试将他的本地版本推送到远程仓库时会发生什么：\n\
  \n```\n$ git push origin master\nTo git@github.com:popp5/megaquiz.git\n ! [rejected]\
  \        master -> master (non-fast-forward)\nerror: failed to push some refs to\
  \ 'git@github.com:popp5/megaquiz.git'\nTo prevent you from losing history, non-fast-forward\
  \ updates were rejected\nMerge the remote changes before pushing again.  See the\
  \ 'Note about\nfast-forwards' section of 'git push --help' for details.\n```\n\n\
  如你所见，如果有更新需要应用，Git 不会让你推送。Bob 必须首先拉取我的 `User.php` 文件版本：\n\n```\n$ git pull origin\
  \ master\nremote: Counting objects: 6, done.\nremote: Compressing objects: 100%\
  \ (3/3), done.\nremote: Total 6 (delta 2), reused 6 (delta 2), pack-reused 0\nUnpacking\
  \ objects: 100% (6/6), done.\nFrom github.com:popp5/megaquiz\n * branch        \
  \    master     -> FETCH_HEAD\nAuto-merging quizobjects/User.php\nCONFLICT (content):\
  \ Merge conflict in quizobjects/User.php\nAutomatic merge failed; fix conflicts\
  \ and then commit the result.\n```\n\n只要更改不重叠，Git 会乐意地将来自两个源的数据合并到同一个文件中。Git 无法处理影响相同行的更改。它如何决定哪个优先？是仓库覆盖\
  \ Bob 的更改，还是反过来？是让两个更改共存？哪个应该放在前面？Git 别无选择，只能报告冲突，让 Bob 解决问题。\n\n这是 Bob 打开文件时看到的：\n\
  \n```\nnamespace popp\\ch17\\megaquiz\\quizobjects;\n/**\n<<<<<<< HEAD\n* @package\
  \  quizobjects\n=======\n* @license   http://www.example.com Borsetshire Open License\n\
  * @package  quizobjects\n>>>>>>> 04d75b41c8d972438bd803042f1117e12d2869eb\n*/\n\
  class User\n{\n}\n```\n\nGit 包含了 Bob 的注释和冲突的更改，以及告诉他每个部分来源的元数据。冲突信息由一行等号分隔。Bob 的输入由一行小于号后跟\
  \ \"HEAD\" 表示。远程更改包含在分界线的另一侧。\n\n现在 Bob 已经识别出冲突，他可以编辑文件以解决冲突：\n\n```\nnamespace\
  \ popp\\ch17\\megaquiz\\quizobjects;\n/**\n* @license   http://www.example.com Borsetshire\
  \ Open License\n* @package   quizobjects\n*/\nclass User\n{\n}\n```\n\n接下来，Bob 通过暂存文件来解决冲突：\n\
  \n```\n$ git add quizobjects/User.php\n$ git commit -m'documentation merged'\n[master\
  \ 89e5e46] documentation merged\n```\n\n现在，终于，他可以推送到远程仓库了：\n\n```\n$ git push origin\
  \ master\n```\n\n## 添加和删除文件与目录\n\n项目在开发过程中会改变形态。版本控制软件必须考虑到这一点，允许用户添加新文件并删除那些会碍事的无用文件。\n\
  \n### 添加文件\n\n你已经多次看到 `add` 子命令了。我在项目设置期间使用它将我的代码添加到空的 `megaquiz` 仓库，随后，用于暂存文件以进行提交。通过对未跟踪的文件或目录运行\
  \ `git add`，你要求 Git 跟踪它——并将其暂存以进行提交。这里我向项目添加了一个名为 `Question.php` 的文档：\n\n```\n$\
  \ touch quizobjects/Question.php\n$ git add quizobjects/Question.php\n```\n\n在现实场景中，我可能会首先向\
  \ `Question.php` 添加一些内容。这里，我仅限于使用标准的 `touch` 命令创建一个空文件。一旦我添加了一个文档，我仍然必须调用 `commit`\
  \ 子命令来完成添加：\n\n```\n$ git commit -m'initial checkin'\n[master 02cf67c] initial checkin\n\
  1 file changed, 0 insertions(+), 0 deletions(-)\ncreate mode 100644 quizobjects/Question.php\n\
  ```\n\n`Question.php` 现在已经在本地仓库中了。\n\n### 删除文件\n\n如果我发现自己过于草率并且需要删除该文档，那么了解到我可以使用名为\
  \ `rm` 的子命令也就不足为奇了：\n\n```\n$ git rm quizobjects/Question.php\nrm 'quizobjects/Question.php'\n\
  `\n\n同样，需要执行一次 `commit` 来完成这项工作。像往常一样，我可以通过运行 `git status` 来确认：\n\n```\n$ git status\n\
  On branch master\nYour branch is ahead of 'origin/master' by 1 commit.\n  (use \"\
  git push\" to publish your local commits)\nChanges to be committed:\n  (use \"git\
  \ reset HEAD <file>...\" to unstage)\ndeleted:    quizobjects/Question.php\n$ git\
  \ commit -m'removed Question'\n[master fd4d64e] removed Question\n1 file changed,\
  \ 0 insertions(+), 0 deletions(-)\ndelete mode 100644 quizobjects/Question.php\n\
  ```\n\n### 添加目录\n\n你也可以使用 `add` 和 `rm` 来添加和删除目录。假设 Bob 想创建一个新目录：\n\n```\n$ mkdir\
  \ resources\n$ touch resources/blah.gif\n$ git add resources/\n$ git status\nOn\
  \ branch master\nYour branch is ahead of 'origin/master' by 2 commits.\n  (use \"\
  git push\" to publish your local commits)\nChanges to be committed:\n  (use \"git\
  \ reset HEAD <file>...\" to unstage)\nnew file:   resources/blah.gif\n```\n\n注意\
  \ `resources` 的内容是如何自动添加到仓库的。现在 Bob 可以像往常一样提交，然后将全部内容推送到远程仓库。\n\n### 删除目录\n\n正如你所料，你可以使用\
  \ `rm` 子命令来删除目录。然而，在这种情况下，我必须通过向子命令传递 `-r` 标志来告知 Git 我希望它删除目录的内容。在这里，我强烈反对 Bob 添加\
  \ `resources` 目录的决定：\n\n```\n$ git rm -r resources/\nrm 'resources/blah.gif'\n```\n\
  \n## 标记发布版本\n\n一切顺利的话，项目最终会达到一个就绪状态，你会想要发布或部署它。每当你进行发布时，都应该在仓库中留下一个书签，这样你就可以随时重新访问该版本的代码。正如你所料，你可以使用\
  \ `git tag` 命令在代码中创建一个标签：\n\n```\n$ git tag -a 'version1.0' -m 'release 1.0'\n```\n\
  \n你可以通过运行不带参数的 `git tag` 来查看与你的仓库关联的标签：\n\n```\n$ git tag\nversion1.0\n```\n\n到目前为止，我们一直在本地操作。为了将标签放到远程仓库上，我们必须对\
  \ `git push` 子命令使用 `--tags` 标志：\n\n```\n$ git push origin --tags\nCounting objects:\
  \ 1, done.\nWriting objects: 100% (1/1), 168 bytes | 0 bytes/s, done.\nTotal 1 (delta\
  \ 0), reused 0 (delta 0)\nTo git@github.com:popp5/megaquiz.git\n * [new tag]   \
  \      version1.0 -> version1.0\n```\n\n使用 `--tags` 标志会导致所有本地标签被推送到远程仓库。\n\n当然，你在\
  \ GitHub 仓库上执行的任何操作都可以在该网站上被追踪。你可以在图 17-4 中看到我的发布标签。\n\n![A314621_5_En_17_Fig4_HTML.jpg](img/A314621_5_En_17_Fig4_HTML.jpg)\n\
  \n*图 17-4. 在 GitHub 上查看标签*\n\n一旦你可以用标签为代码添加书签，就很自然地会想知道如何重新访问旧版本。然而，要做到这一点，你应该首先花些时间研究分支——这是\
  \ Git 特别擅长的事情。\n\n## 分支项目\n\n一旦我的项目发布，我就可以把它打包收好，然后去做些新的事情，对吧？毕竟，它写得如此优雅，不可能有 bug，更不用说它的规格如此详尽，没有一个用户可能要求任何新功能了！\n\
  \n与此同时，回到现实世界，我必须在至少两个层面上继续使用代码库。大概现在快到收到 bug 报告的时候了，而版本 1.2.0 的功能愿望清单将因对精彩新功能的需求而膨胀。我该如何协调这些力量？我需要修复报告的\
  \ bug，同时我也需要推进主要开发。我可以在开发过程中修复 bug，并在下一个版本稳定后一次性发布所有内容。但是这样一来，用户可能需要等待很长时间才能看到任何问题得到解决。这显然是不可接受的。另一方面，我可以边开发边发布。在这种情况下，我有发布破损代码的风险。显然，我的开发需要两条线索。我将继续向项目的主分支（通常称为主干）添加新的、有风险的功能，但我现在应该为我的新版本创建一个分支，在这个分支上我只能添加错误修复。\n\
  \n> **注意**\n> 这种管理分支的方式绝非唯一的方法。开发者们不断地争论组织分支和管理发布与错误修复的最佳方式。最流行的方法之一是 git-flow（在\
  \ [`http://danielkummer.github.io/git-flow-cheatsheet/`](http://danielkummer.github.io/git-flow-cheatsheet/)\
  \ 上有简洁的描述）。在这种实践中，`master` 是发布分支。新代码放在 `develop` 分支上，并在发布时合并到 `master`。每个活跃的开发单元都有自己的功能分支，在稳定后合并到\
  \ `develop`。\n\n我可以使用 `git checkout` 命令创建并切换到一个新分支。首先，让我们快速查看一下我的分支状态：\n\n```\n\
  $ git branch -a\n* master\nremotes/origin/master\n```\n\n如你所见，我有一个单一的分支：`master`，以及它的远程等效分支。现在，我将创建并切换到一个新分支：\n\
  \n```\n$ git checkout -b megaquiz-branch1.0\nSwitched to a new branch 'megaquiz-branch1.0'\n\
  ```\n\n为了跟踪我对分支的使用，我将使用一个特定的文件作为示例：`command/FeedbackCommand.php`。看来我创建 bug 修复分支的时间刚刚好。用户开始报告他们无法使用系统中的反馈机制。我找到了这个\
  \ bug：\n\n```\n//...\n$result = $msgSystem->despatch($email, $msg, $topic);\nif\
  \ (! $user) {\n$this->context->setError($msgSystem->getError());\n//...\n```\n\n\
  实际上，我应该测试 `$result` 而不是 `$user`。以下是我的编辑：\n\n```\n//...\n$result = $msgSystem->dispatch($email,\
  \ $msg, $topic);\nif (! $result) {\n$this->context->setError($msgSystem->getError());\n\
  //...\n```\n\n因为我在分支 `megaquiz-branch1.0` 上工作，我可以提交这个更改：\n\n```\n$ git add command/FeedbackCommand.php\n\
  $ git commit -m'bugfix'\n[megaquiz-branch1.0 d69dfc1] bugfix\n1 file changed, 1\
  \ insertion(+), 1 deletion(-)\n```\n\n当然，这个提交是本地的。我需要使用 `git push` 命令将这个分支放到远程仓库上：\n\
  \n```\n$ git push origin megaquiz-branch1.0\nCounting objects: 4, done.\nDelta compression\
  \ using up to 4 threads.\nCompressing objects: 100% (4/4), done.\nWriting objects:\
  \ 100% (4/4), 440 bytes | 0 bytes/s, done.\nTotal 4 (delta 2), reused 0 (delta 0)\n\
  To git@github.com:popp5/megaquiz.git\n * [new branch]      megaquiz-branch1.0 ->\
  \ megaquiz-branch1.0\n```\n\n那 Bob 呢？他不可避免地会想要参与进来并修复一些 bug。首先，他调用了 `git pull`，它会友好地告诉他关于新分支（以及我最近的其他活动）的信息：\n\
  \n```\n$ git pull\nremote: Counting objects: 11, done.\nremote: Compressing objects:\
  \ 100% (7/7), done.\nremote: Total 11 (delta 4), reused 11 (delta 4), pack-reused\
  \ 0\nUnpacking objects: 100% (11/11), done.\nFrom github.com:popp5/megaquiz\n  \
  \ f6ab532..cf120a4  master     -> origin/master\n * [new branch]      megaquiz-branch1.0\
  \ -> origin/megaquiz-branch1.0\n * [new tag]         version1.0 -> version1.0\n\
  Updating f6ab532..cf120a4\nFast-forward\n 0 files changed, 0 insertions(+), 0 deletions(-)\n\
  \ delete mode 100644 resources/blah.gif\n```\n\n现在 Bob 可以切换到一个会跟踪远程分支的本地分支了：\n\n\
  ```\n$ git checkout megaquiz-branch1.0\nBranch megaquiz-branch1.0 set up to track\
  \ remote branch megaquiz-branch1.0 from origin.\nSwitched to a new branch 'megaquiz-branch1.0'\n\
  ```\n\nBob 现在可以开始工作了。他可以添加并提交他自己的修复；当他推送时，这些修复将会出现在远程分支上。\n\n与此同时，我想要在主干上添加一些尖端增强功能——也就是我的\
  \ `master` 分支。让我们从我的本地仓库的角度再看一下我的分支状态：\n\n```\n$ git branch -a\n* master\n  megaquiz-branch1.0\n\
  remotes/origin/master\nremotes/origin/megaquiz-branch1.0\n```\n\n我可以通过调用 `git checkout`\
  \ 来切换到一个已有的分支：\n\n```\n$ git checkout master\nSwitched to branch 'master'\nYour\
  \ branch is up-to-date with 'origin/master'.\n```\n\n现在当我查看 `command/FeedbackCommand.php`\
  \ 时，我发现我的 bug 修复神奇地消失了。当然，它仍然存储在 `megaquiz-branch1.0` 下。稍后，我可以将这个修复合并到 `master`\
  \ 分支，所以不用担心。相反，我可以专注于添加新代码：\n\n```\nclass FeedbackCommand extends Command\n{\n \
  \   public function execute(CommandContext $context)\n    {\n        // new development\n\
  \        // goes here\n        $msgSystem = ReceiverFactory::getMessageSystem();\n\
  \        $email = $context->get('email');\n        // ...\n```\n\n我在这里所做的只是添加一个注释来模拟向代码中添加内容。我现在可以提交并推送这个：\n\
  \n```\n$ git commit -am'new development on master'\n$ git push origin master\n```\n\
  \n所以我现在有了并行分支。当然，迟早我会希望我的 master 分支能够受益于我在 `megaquiz-branch1.0` 上提交的 bug 修复。\n\n\
  我可以在命令行上做到这一点，但首先让我们暂停一下，看看 GitHub 和 BitBucket 等类似服务支持的一项功能。拉取请求（通常缩写为 PR）允许我在合并分支之前请求代码审查。所以在\
  \ `megaquiz-branch1.0` 合并到 `master` 之前，我可以请 Bob 检查我的工作。正如你在图 17-5 中看到的，GitHub 检测到了这个分支，并给了我创建拉取请求的机会。\n\
  \n![A314621_5_En_17_Fig5_HTML.jpg](img/A314621_5_En_17_Fig5_HTML.jpg)\n\n*图 17-5.\
  \ GitHub 使创建拉取请求变得容易*\n\n我点击按钮并在提交拉取请求前添加了一条评论。你可以在图 17-6 中看到结果。\n\n![A314621_5_En_17_Fig6_HTML.jpg](img/A314621_5_En_17_Fig6_HTML.jpg)\n\
  \n*图 17-6. 创建拉取请求*\n\n现在 Bob 可以检查我的更改并添加他可能有的任何评论。GitHub 向他精确地显示了更改了什么。你可以在图 17-7\
  \ 中看到 Bob 的评论。\n\n![A314621_5_En_17_Fig7_HTML.jpg](img/A314621_5_En_17_Fig7_HTML.jpg)\n\
  \n*图 17-7. 拉取请求所涵盖的更改*\n\n一旦 Bob 批准了我的拉取请求，我可以直接从浏览器合并，或者我可以返回命令行。这非常简单。Git 提供了一个名为\
  \ `merge` 的子命令：\n\n```\n$ git checkout master\nAlready on 'master'\nYour branch\
  \ is up-to-date with 'origin/master'.\n```\n\n事实上，我已经在 master 分支上了——但确认一下也无妨。现在我来执行实际的合并操作：\n\
  \n```\n$ git merge megaquiz-branch1.0\nAuto-merging command/FeedbackCommand.php\n\
  Merge made by the 'recursive' strategy.\n command/FeedbackCommand.php | 2 +-\n 1\
  \ file changed, 1 insertion(+), 1 deletion(-)\n```\n\n> **注意**\n> 合并还是不合并？这个选择并不总是像看起来那么简单。例如，在某些情况下，你的错误修复可能是一种临时工作，会被主干上更彻底的重构所取代，或者由于规范的变化而不再适用。这必然是一个需要根据判断做出的决定。然而，在我工作过的大多数团队中，都倾向于尽可能地合并到主干，同时将分支上的工作保持在最低限度。对我们来说，新功能通常出现在主干上，并通过“尽早发布，经常发布”的策略快速到达用户手中。\n\
  \n现在，当我查看主干中的 `FeedbackCommand` 版本时，我确认所有更改都已合并：\n\n```\npublic function execute(CommandContext\
  \ $context)\n{\n    // new development\n    // goes here\n    $msgSystem = ReceiverFactory::getMessageSystem();\n\
  \    $email = $context->get('email');\n    $msg = $context->get('pass');\n    $topic\
  \ = $context->get('topic');\n    $result = $msgSystem->despatch($email, $msg, $topic);\n\
  \    if (! $result) {\n        $this->context->setError($msgSystem->getError());\n\
  \        return false;\n    }\n```\n\n`execute()` 方法现在既包含了我模拟的主干开发内容，也包含了 bug 修复。\n\
  \n当我第一次“发布” MegaQuiz 1.0 版本时，我创建了一个分支，这就是我们一直在处理的那个。但请记住，我在那个阶段也创建了一个标签。我当时承诺会向你展示如何访问这个标签。事实上，你已经看到了如何访问。你可以基于该标签创建一个本地分支，方式与\
  \ Bob 建立他的本地版 bug 修复分支完全相同。区别在于这个新分支是全新的。它不跟踪任何现有的远程分支：\n\n```\n$ git checkout -b\
  \ new-version1.0-branch version1.0\nSwitched to a new branch 'new-version1.0-branch'\n\
  ```\n\n但是，我现在有了这个新分支，我可以像你之前看到的那样推送它并分享它。\n\n## 总结\n\nGit 包含了数量庞大的工具，每一个都有令人望而生畏的选项和功能范围。我只能在现有的篇幅内提供一个简短的介绍。尽管如此，即使你只使用我在本章中介绍的功能，你也应该能在自己的工作中看到好处，无论是通过防止数据丢失，还是通过改进协作工作。\n\
  \n在本章中，我们简要介绍了 Git 的基础知识。我简要地看了一下配置，然后导入了一个项目。我检出了、提交了并更新了代码，然后向你展示了如何标记和导出一个版本。我以对分支的简要介绍结束了本章，展示了它们在项目中维护并发开发和错误修复分支方面的实用性。\n\
  \n有一个问题我在一定程度上忽略了。我们确立了开发者应该检出自己项目版本的准则。然而，总的来说，项目是不会原地运行的。为了测试他们的更改，开发者需要在本地部署代码。有时，这就像复制几个目录一样简单。但更常见的是，部署必须处理一系列配置问题。在下一章中，我们将研究一些自动化此过程的技术。\n\
  \n# 18. 使用 PHPUnit 进行测试\n\n系统中每个组件的持续平稳运行都依赖于其同层组件的操作和接口的一致性。因此，从定义上讲，开发会破坏系统。当你改进你的类和包时，你必须记住修改任何与它们一起工作的代码。对于某些更改，这可能会产生连锁反应，影响距离你最初更改的代码很远的组件。敏锐的警惕和对系统依赖关系的百科全书式的了解有助于解决这个问题。当然，尽管这些是优秀的品质，但系统很快就会变得过于复杂，以至于无法轻易预测所有不期望的影响，尤其是因为系统通常结合了多个开发者的工作。为了解决这个问题，定期测试每个组件是一个好主意。当然，这是一个重复且复杂的任务；因此，它非常适合自动化。\n\
  \n在 PHP 程序员可用的测试解决方案中，PHPUnit 可能是最普遍的，当然也是功能最全的工具。在本章中，你将学到以下关于 PHPUnit 的知识：\n\n\
  * **安装：** 使用 PEAR 安装 PHPUnit\n* **编写测试：** 创建测试用例并使用断言方法\n* **处理异常：** 确认失败的策略\n*\
  \ **运行多个测试：** 将测试收集到测试套件中\n* **构建断言逻辑：** 使用约束\n* **模拟组件：** 模拟对象和桩模块\n* **测试 Web\
  \ 应用程序：** 使用和不使用额外工具进行测试\n\n## 功能测试和单元测试\n\n在任何项目中，测试都是必不可少的。即使你没有将这个过程正式化，你必定也发现自己已经形成了一套非正式的操作列表，用它们来全面检验你的系统。这个过程很快就会变得令人厌倦，这可能导致你对项目持一种听天由命的态度。\n\
  \n一种测试方法从项目的接口开始，模拟用户可能使用系统的各种方式。当手动测试时，这可能是你会采用的方式，尽管有各种框架用于自动化这个过程。这些功能测试有时被称为验收测试，因为成功执行的一系列操作可以用作项目阶段签收的标准。使用这种方法，你通常将系统视为一个黑盒——你的测试会刻意忽略那些协作构成被测试系统的隐藏组件。\n\
  \n功能测试从外部进行操作，而单元测试则从内部向外进行。单元测试倾向于关注类，测试方法被分组到测试用例中。每个测试用例对一个类进行严格的检验，检查每个方法是否按预期执行，并且是否按预期失败。目标是尽可能在脱离其更广泛上下文的隔离环境中测试每个组件。这通常会为你提供一个发人深省的结论，让你了解解耦系统各部分的使命是否成功。\n\
  \n测试可以作为构建过程的一部分运行，直接从命令行运行，甚至通过网页运行。在本章中，我将重点介绍命令行。\n\n单元测试是确保系统设计质量的好方法。测试揭示了类和函数的职责。一些程序员甚至提倡测试优先的方法。他们说，你应该在开始编写类之前就编写测试。这确立了类的用途，确保了清晰的接口以及简短、集中的方法。就个人而言，我从未追求过这种纯度的水平——这不符合我的编码风格。尽管如此，我尝试在进行编码的同时编写测试。维护一个测试框架为我提供了重构代码所需的安全感。我可以拆除并替换整个包，因为我知道我很有可能会在系统其他地方捕获到意外的错误。\n\
  \n## 手动测试\n\n在上一节中，我说测试在每个项目中都是必不可少的。我本可以这样说：测试在每个项目中都是不可避免的。我们都会测试。可悲的是，我们经常丢弃这些出色的工作。\n\
  \n那么，让我们创建一些类来测试。这是一个存储和检索用户信息的类。为了演示起见，它生成数组，而不是你通常期望使用的 `User` 对象：\n\n```php\n\
  //\n```\n\n\n### 每个 Vagrant 开发环境都需要一个 box。你可以在 https://atlas.hashicorp.com/search\
  \ 上搜索 box。\n\n`config.vm.box = \"bento/centos-6.7\"`\n\n到目前为止，我只完成了配置生成。接下来，我必须运行至关重要的\
  \ `vagrant up` 命令。如果你经常使用 Vagrant，很快就会发现这个命令非常熟悉。它会通过下载并配置你的新 box（如有必要）来启动 Vagrant\
  \ 会话，然后启动它：\n\n```\n$ vagrant up\n```\n\n由于我是第一次使用 `bento/centos-6.7` 虚拟机运行此命令，Vagrant\
  \ 会先下载 box：\n\n```\nBringing machine 'default' up with 'virtualbox' provider...\n\
  ==> default: Box 'bento/centos-6.7' could not be found. Attempting to find and install...\n\
  default: Box Provider: virtualbox\ndefault: Box Version: >= 0\n==> default: Loading\
  \ metadata for box 'bento/centos-6.7'\ndefault: URL: https://atlas.hashicorp.com/bento/centos-6.7\n\
  ==> default: Adding box 'bento/centos-6.7' (v2.2.7) for provider: virtualbox\ndefault:\
  \ Downloading: https://atlas.hashicorp.com/bento/boxes/centos-6.7/versions/2.2.7/providers/virtualbox.box\n\
  ==> default: Successfully added box 'bento/centos-6.7' (v2.2.7) for 'virtualbox'!\n\
  ```\n\nVagrant 会存储这个 box（如果你运行的是 Linux，则存储在 `~/.vagrant.d/boxes/` 下），这样你就不必在自己的系统上再次下载它——即使你运行多个虚拟机也是如此。然后它会配置并启动虚拟机（过程中会提供大量详细信息）。一旦完成，我可以通过登录到我的新机器来测试它：\n\
  \n```\n$ vagrant ssh\n$ pwd\n/home/vagrant\n$ cat /etc/redhat-release\nCentOS release\
  \ 6.7 (Final)\n```\n\n我们进来了！那么我们得到了什么？嗯，我们拥有了一台某种程度上类似于生产环境的机器。还有别的吗？实际上，还有很多。我之前说过，我希望在本地机器上编辑文件，但在类似生产环境中运行它们。让我们来设置一下。\n\
  \n## 将本地目录挂载到 Vagrant Box 上\n\n我们来整理一些示例文件。我在一个名为 `infrastructure` 的目录中运行了我的第一个\
  \ `vagrant init` 和 `vagrant up` 命令。我将重新启用我在第 18 章中使用的 `webwoo` 项目（这是我为第 12 章开发的系统的一个精简版）。综合来看，我的开发环境看起来像这样：\n\
  \n```\nch20/\ninfrastructure/\nVagrantfile\nwebwoo/\nAddVenue.php\nindex.php\nMain.php\n\
  AddSpace.php\n```\n\n我们的挑战是搭建环境，以便我们可以在本地处理 `webwoo` 文件，但使用 CentOS box 上安装的软件栈透明地运行它们。根据我们的配置，Vagrant\
  \ 会尝试将主机上的目录挂载到 guest box 中。事实上，Vagrant 已经为我们挂载了一个目录。让我们检查一下：\n\n```\n$ vagrant\
  \ ssh\nLast login: Tue Jul  5 15:36:19 2016 from 10.0.2.2\n$ ls -a /vagrant\n. \
  \ ..   .vagrant  Vagrantfile\n```\n\n因此，Vagrant 已将 `infrastructure` 目录挂载为 box 上的\
  \ `/vagrant`。当我们编写脚本来配置 box 时，这会很方便。不过现在，让我们专注于挂载 `webwoo` 目录。我们可以通过编辑 `Vagrantfile`\
  \ 来实现：\n\n```\nconfig.vm.synced_folder \"../webwoo\", \"/var/www/poppch20\"\n```\n\
  \n通过这个指令，我告诉 Vagrant 将 `webwoo` 目录挂载到 guest box 上的 `/var/www/poppch20`。为了使其生效，我需要重新启动\
  \ box。这里有一个新命令（应在主机系统上运行，而不是在虚拟机内部）：\n\n```\n$ vagrant reload\n```\n\n虚拟机关闭并干净地重新启动。Vagrant\
  \ 挂载了 `infrastructure`（`/vagrant`）和 `webwoo`（`/var/www/poppch20`）目录。以下是命令输出的摘录：\n\
  \n```\n==> default: Mounting shared folders...\ndefault: /vagrant => /home/mattz/ch20/infrastructure\n\
  default: /var/www/poppch20 => /home/mattz/ch20/webwoo\n```\n\n我可以快速登录以确认 `/var/www/poppch20`\
  \ 已就位。\n\n\n\n```\n$ vagrant ssh\nLast login: Thu Jul  7 15:25:16 2016 from 10.0.2.2\n\
  $ ls /var/www/poppch20/\nAddSpace.php  AddVenue.php  index.php  Main.php\n```\n\n\
  现在，我可以在本地机器上运行一个惊艳的 IDE，并将改动内容无缝同步到虚拟机中！\n\n当然，将文件放到 CentOS 虚拟机上并不等同于运行系统。典型的 Vagrant\
  \ 盒子预装的内容并不多。设计思路是让开发者根据需求和场景自行定制环境。\n\n下一步就是配置我们的虚拟机。\n\n## 配置（Provisioning）\n\n\
  再次强调，配置过程由 `Vagrantfile` 文档驱动。Vagrant 支持多种用于配置虚拟机的工具，包括 Chef（[`https://www.chef.io/chef/`](https://www.chef.io/chef/)）、Puppet（[`https://puppet.com`](https://puppet.com)）和\
  \ Ansible（[`https://www.ansible.com`](https://www.ansible.com)）。这些工具都值得研究。不过，在本示例中，我将使用传统的\
  \ shell 脚本。\n\n我再次从 `Vagrantfile` 开始：\n\n```\nconfig.vm.provision \"shell\", path:\
  \ \"setup.sh\"\n```\n\n这段代码的含义应该相当清晰。我告诉 Vagrant 使用 shell 脚本来配置虚拟机，并指定 `setup.sh`\
  \ 为要执行的脚本。\n\n当然，shell 脚本的内容取决于你的需求。我将从设置几个变量和安装一些软件包开始：\n\n```\n#!/bin/bash\nVAGRANTDIR=/vagrant\n\
  SERVERDIR=/var/www/poppch20/\nsudo rpm -Uvh https://mirror.webtatic.com/yum/el6/latest.rpm\n\
  sudo yum install -y patch\nsudo yum install -y vim\nsudo yum -q -y install mysql-server\n\
  sudo yum -q -y install httpd;\nsudo yum -q -y install php70w\nsudo yum -q -y install\
  \ php70w-mysql\nsudo yum -q -y install php70w-xml\nsudo yum -q -y install php70w-dom\n\
  ```\n\nPHP 7 在 CentOS 6 上默认不可用。不过，通过安装 `webtatic.com` 提供的 yum 仓库，就可以获取名为 `php70w`\
  \ 的软件包及其一系列相关扩展。我将脚本写入名为 `setup.sh` 的文件中，并将其放置在 `Vagrantfile` 所在的 infrastructure\
  \ 目录中。\n\n现在，如何启动配置过程呢？如果在我运行 `vagrant up` 时，`config.vm.provision` 指令和 `setup.sh`\
  \ 脚本都已经就位，那么配置过程就会自动进行。由于目前并非如此，我需要手动运行它：\n\n```\n$ vagrant provision\n```\n\n当\
  \ `setup.sh` 脚本在 Vagrant 虚拟机内运行时，终端上会输出大量信息。让我们检查一下是否成功了：\n\n```\n$ vagrant ssh\n\
  $ php -v\nPHP 7.0.7 (cli) (built: May 28 2016 08:26:36) ( NTS )\nCopyright (c) 1997-2016\
  \ The PHP Group\nZend Engine v3.0.0, Copyright (c) 1998-2016 Zend Technologies\n\
  ```\n\n## 设置 Web 服务器\n\n当然，即便安装了 MySQL 和 Apache，系统也还不能直接运行。首先，我们应该配置 Apache。最简单的方法是创建一个配置文件，并将其复制到\
  \ Apache 的 `conf.d` 目录中。我们把这个文件命名为 `poppch20.conf`，并放入 infrastructure 目录：\n\n```\n\
  NameVirtualHost *:80\n\nServerAdmin matt@getinstance.com\nDocumentRoot /var/www/poppch20\n\
  ServerName poppch20.vagrant.internal\nErrorLog logs/poppch20-error_log\nCustomLog\
  \ logs/poppch20-access_log common\n\nAllowOverride all\n\n```\n\n稍后我会再回到这个主机名。暂且放下这个诱人的细节，这段配置足以告知\
  \ Apache 关于 `/var/www/poppch20` 目录的信息并设置日志。当然，我还需要更新 `setup.sh`，以便在配置时复制该配置文件：\n\
  \n```\nsudo cp $VAGRANTDIR/poppch20.conf /etc/httpd/conf.d/\nsudo service httpd\
  \ restart\nsudo /sbin/chkconfig httpd on\n```\n\n我将配置文件复制到位，然后重启 Web 服务器以便加载新的配置。我还运行了\
  \ `chkconfig` 来确保服务器在开机时自动启动。\n\n做出这些更改后，我可以重新运行此脚本：\n\n```\n$ vagrant provision\n\
  ```\n\n需要注意的是，我们之前编写的设置脚本中的部分内容也会被重新执行。在创建配置脚本时，必须确保它能够重复执行而不会造成严重问题。幸运的是，Yum 会检测到我指定的软件包已经安装，只会发出无害的抱怨——部分原因是我预先使用了\
  \ `-q` 标志，这会让抱怨信息相对安静。\n\n## 设置 MySQL\n\n对于许多应用程序，你需要确保数据库已创建并准备好接受连接。下面是我对设置脚本的一个简单补充：\n\
  \n```\nsudo service mysqld start\n/usr/bin/mysqladmin -s -u root password 'vagrant'\
  \ || echo \"** unable to create pass - probably already done\"\necho \"CREATE DATABASE\
  \ IF NOT EXISTS poppch20_vagrant\" | mysql -u root -pvagrant\n\n### install data\
  \ here if needed\n#\necho \"GRANT ALL PRIVILEGES  ON poppch20_vagrant.* TO\n'vagrant'@'localhost'\
  \ IDENTIFIED BY 'vagrant'\nWITH GRANT OPTION\" | mysql -u root -pvagrant\necho \"\
  FLUSH PRIVILEGES\" | mysql -u root -pvagrant\nsudo /sbin/chkconfig mysqld on\n```\n\
  \n我启动 MySQL。然后运行 `mysqladmin` 命令来创建 root 密码。由于密码在首次运行后就已经设置，之后运行该命令会失败，因此我使用 `-s`\
  \ 标志来抑制错误信息，并在命令失败时打印一条自定义消息。接着，我创建了一个数据库、一个用户和对应的密码。最后，我运行 `chkconfig` 来确保 MySQL\
  \ 守护进程在开机时自动启动。\n\n完成这些设置后，我可以再次进行配置，然后测试数据库：\n\n```\n$ vagrant provision\n```\n\
  \n\n\n## 大量输出\n```\n$ vagrant ssh\n$ mysql -uvagrant -pvagrant poppch20_vagrant\n\
  欢迎使用 MySQL 监视器。命令以 ; 或 \\g 结束。\n您的 MySQL 连接 ID 是 9\n服务器版本：5.1.73 来源发行版\n版权所有 (c)\
  \ 2000, 2013, Oracle 和/或其关联公司。保留所有权利。\nOracle 是 Oracle 公司和/或其关联公司的注册商标。其他名称可能是其各自所有者的商标。\n\
  输入 'help;' 或 '\\h' 获取帮助。输入 '\\c' 清除当前输入语句。\nmysql>\n```\n\n我们现在已经有一个正在运行的数据库和一个\
  \ Web 服务器。是时候看看代码如何运行了。\n\n## 配置主机名\n\n我们已经多次登录到新的类生产开发环境，因此网络方面基本已经就绪。虽然我已经配置了\
  \ Web 服务器，但尚未使用它。这是因为我们仍然需要为虚拟机配置一个主机名。因此，让我们在 `Vagrantfile` 中添加一个：\n\n```\nconfig.vm.hostname\
  \ = \"poppch20.vagrant.internal\"\nconfig.vm.network :private_network, ip: \"192.168.33.148\"\
  \n```\n\n我虚构了一个主机名，并使用 `config.vm.hostname` 指令将其添加。我还使用 `config.vm.network` 配置了私有网络，并分配了一个静态\
  \ IP 地址。你应该为此使用私有地址空间——一个以 `192.168` 开头且未使用的 IP 地址应该可以正常工作。\n\n由于这是一个虚构的主机名，我们必须配置操作系统来处理名称解析。在类\
  \ Unix 系统上，这意味着要编辑系统文件 `/etc/hosts`。在这种情况下，我会添加以下内容：\n\n```\n192.168.33.148  poppch20.vagrant.internal\n\
  ```\n\n这不算太麻烦，但我们的目标是为团队实现一键安装，因此最好能有一种方法来自动化这一步骤。幸运的是，Vagrant 支持插件，而 `hostmanager`\
  \ 插件恰好满足我们的需求。\n\n你可以使用以下命令查看已安装的插件：\n\n```\n$ vagrant plugin list\nvagrant-login\
  \ (1.0.1, 系统)\nvagrant-share (1.1.5, 系统)\n```\n\n要添加插件，只需运行 `vagrant plugin install`\
  \ 命令：\n\n```\n$ vagrant plugin install vagrant-hostmanager\n正在安装 'vagrant-hostmanager'\
  \ 插件。这可能需要几分钟...\n已安装插件 'vagrant-hostmanager (1.8.2)'！\n```\n\n然后，你可以显式地告诉插件更新 `/etc/hosts`，如下所示：\n\
  \n```\n$ vagrant hostmanager\n[默认] 正在更新 /etc/hosts 文件...\n```\n\n为了使这个过程对团队成员自动生效，我们应在\
  \ `Vagrantfile` 中显式启用 hostmanager：\n\n```\nconfig.hostmanager.enabled = true\n```\n\
  \n完成配置更改后，我们应该运行 `vagrant reload` 来应用它们。然后就是见证真相的时刻！我们的系统能在浏览器中运行吗？如图 20-2 所示，系统应该能正常工作。\n\
  \n![A314621_5_En_20_Fig2_HTML.jpg](img/A314621_5_En_20_Fig2_HTML.jpg)\n\n图 20-2.\
  \ 在 Vagrant 盒子上访问已配置的系统\n\n## 总结\n\n因此，我们从零开始构建了一个完全可用的开发环境。考虑到这花费了一整章的篇幅，如果说 Vagrant\
  \ 快速又简单，似乎有点自欺欺人。对此有两个答案。首先，一旦你这样做过几次，搭建另一个 Vagrant 环境就会变得非常简单——肯定比手动管理多个依赖栈要容易得多。\n\
  \n但更重要的是，真正的速度和效率提升并不在于设置 Vagrant 的那个人。想象一下，一位新开发人员加入你的项目，预计需要花费数天时间进行下载、编辑配置文件以及翻阅\
  \ Wiki。想象一下告诉她：“安装 Vagrant 和 VirtualBox。检出代码。从基础设施目录运行 `vagrant up`。”然后就可以了！将其与你经历或听说过的某些痛苦的上手流程进行比较。\n\
  \n当然，本章仅触及了皮毛。当你需要配置 Vagrant 为你做更多事情时，官方站点 [`www.vagrantup.com`](https://www.vagrantup.com)\
  \ 将为你提供所需的所有支持。\n\n表 20-1 快速回顾了我们在本章中遇到的 Vagrant 命令。\n\n表 20-1. 一些 Vagrant 命令\n\n\
  | 命令 | 描述 |\n| --- | --- |\n| `vagrant up` | 启动虚拟机，如果尚未配置则进行配置 |\n| `vagrant reload`\
  \ | 关闭系统并重新启动 |\n| `vagrant plugin list` | 列出已安装的插件 |\n| `vagrant plugin install\
  \ <plugin-name>` | 安装一个插件 |\n| `vagrant provision` | 再次运行配置步骤（如果你更新了配置脚本，这会很有用）\
  \ |\n| `vagrant halt` | 正常关闭虚拟机 |\n| `vagrant init` | 创建一个新的 `Vagrantfile` 文档 |\n\
  | `vagrant destroy` | 销毁虚拟机。别担心，你总是可以再次运行 `vagrant up` 重新开始！ |\n\n## 小结\n\n在本章中，我介绍了\
  \ Vagrant，这个应用程序能让你在不牺牲创作工具的情况下，在类似生产的开发环境中工作。我涵盖了安装、发行版选择以及初始设置——包括挂载你的开发目录。当我们有一个可以操作的虚拟机后，我接着讲解了配置过程——包括包安装以及数据库和\
  \ Web 服务器配置。最后，我探讨了主机名管理，并向你展示了我们的系统在浏览器中运行的情况！\n\n## 21. 持续集成\n\n在前几章中，你看到了大量旨在支持良好管理项目的工具。单元测试、文档编写、构建和版本控制都非常有用。但是工具，尤其是测试，有时会令人烦恼。\n\
  \n即使你的测试只需要几分钟就能运行完，你也常常因为过于专注于编码而不愿去管它们。不仅如此，你还有客户和同事在等待新功能。继续编码的诱惑始终存在。但缺陷在刚产生时修复要容易得多。这是因为你更有可能知道是哪个更改导致了问题，并且能更好地想出快速修复方案。\n\
  \n在本章中，我将介绍持续集成，这是一种自动化测试和构建的做法，并将你最近几章遇到的各种工具和技术整合在一起。\n\n本章将涵盖以下主题：\n\n- 定义持续集成\n\
  - 为 CI 准备项目\n- 了解 Jenkins：一个 CI 服务器\n- 使用专门插件为 PHP 项目定制 Jenkins\n\n### 什么是持续集成？\n\
  \n在过去糟糕的日子里，集成是你完成有趣工作后才做的事情。它也是你意识到还有多少工作要做的阶段。集成是将项目的所有部分打包成可以发布和部署的包的过程。这不光彩，而且实际上很难。\n\
  \n集成也与质量保证紧密相关。如果产品不适合其用途，你就不能发布它。这意味着需要测试。大量的测试。如果你在集成阶段之前没有进行多少测试，那可能也意味着会出现令人讨厌的意外。很多意外。\n\
  \n你从第 18 章知道，尽早并经常测试是最佳实践。你从第 15 章和 19 章知道，应该从一开始就考虑部署进行设计。我们大多数人都接受这是理想状态，但现实中又有多少次能真正做到呢？\n\
  \n\n\n如果你实践测试导向开发（我更喜欢用这个术语而非测试先行开发，因为它更好地反映了我所见过的多数优秀项目的实际情况），那么编写测试并不像你想象的那么困难。毕竟，你在编码时本来就要编写测试。每当你开发一个组件，你都会创建代码片段，也许是在类文件的底部，这些代码片段实例化对象并调用其方法。如果你收集起这些在开发过程中用来测试组件的、原本会被丢弃的代码片段，你就拥有了一个测试用例。将它们放入一个类中，然后添加到你的测试套件中即可。\n\
  \n奇怪的是，人们往往回避的是运行测试。随着时间的推移，测试运行时间越来越长。与已知问题相关的失败逐渐出现，使得诊断新问题变得困难。此外，你怀疑是别人提交的代码破坏了测试，而你没有时间去处理别人的错误而耽误自己的工作。最好只运行与你工作相关的几个测试，而不是运行整个测试套件。\n\
  \n不运行测试，因此也无法修复测试可能揭示的问题，这使得问题越来越难以解决。查找错误的最大开销通常是诊断，而不是修复。很多时候，修复只需几分钟，而找出测试失败的原因却可能需要几个小时。然而，如果测试在提交后的几分钟或几小时内就失败了，你更有可能知道问题出在哪里。\n\
  \n软件构建也存在类似的问题。如果你不经常安装你的项目，你可能会发现，尽管一切在你的开发机上运行正常，但安装后的实例却会因一个模糊的错误信息而崩溃。两次构建之间的时间间隔越长，失败的原因对你来说就可能越模糊。\n\
  \n通常是一些简单的问题：未声明对系统上某个库的依赖，或者你忘记检入的一些类文件。如果你在场，这些问题很容易修复。但如果构建失败发生在你外出时呢？负责构建和发布项目的团队成员，无论运气多差，都不会了解你的设置，也无法轻易访问那些缺失的文件。\n\
  \n集成问题会随着项目中参与的人数增加而放大。你可能喜欢并尊重团队中的所有成员，但我们都清楚，他们不运行测试的可能性比你大得多。然后他们在周五下午 4 点提交了一周的工作成果，就在你正要宣布项目可以发布的时候。\n\
  \n持续集成（CI）通过自动化构建和测试过程，减少了其中一些问题。\n\nCI 既是一套实践，也是一套工具。作为一种实践，它要求频繁提交项目代码（至少每天一次）。每次提交后，都应该运行测试并构建任何包。你已经看到了一些\
  \ CI 所需的工具，特别是 `PHPUnit` 和 `Phing`。然而，仅有单个工具是不够的。需要一个更高级别的系统来协调和自动化整个过程。\n\n如果没有这个更高级别的系统，即\
  \ CI 服务器，CI 实践很可能就会屈从于我们跳过繁琐工作的自然倾向。毕竟，我们更愿意编写代码。\n\n拥有这样的系统能带来明显的好处。首先，你的项目会频繁地构建和测试。这是\
  \ CI 的最终目标和好处。而由于它是自动化的，还增加了另外两个维度。测试和构建发生在与开发不同的线程中。它在后台运行，不需要你停止工作来运行测试。此外，与测试一样，CI\
  \ 能鼓励良好的设计。为了能在远程位置自动安装，你从一开始就不得不考虑安装的便利性。\n\n我不知道有多少次遇到这样的项目，其安装过程是只有少数开发人员才知道的秘密。“你没设置\
  \ URL 重写？”一位老手带着几乎不加掩饰的轻蔑问道。“说真的，重写规则在 Wiki 里，你知道吧。把它们粘贴到 Apache 配置文件中就行了。”用 CI\
  \ 的思路进行开发意味着让系统更易于测试和安装。这可能意味着前期要做更多工作，但会让我们的后续工作更轻松。轻松得多。\n\n所以，首先，我将打下一些昂贵的基础。事实上，你会发现，在接下来的大部分章节中，你已经遇到了这些准备步骤。\n\
  \n## 为项目准备 CI\n\n首先，当然，我需要一个可以持续集成的项目。我是个懒人，所以我将寻找一些已经编写了测试的代码。最明显的候选者是我在第 18 章中为说明\
  \ `PHPUnit` 而创建的项目。我将它命名为 `userthing`，因为它是一个东西，里面有一个 `User` 对象。\n\n首先，这是我项目目录的分解结构：\n\
  \n```\n$ find src/ test/\nsrc/\nsrc/persist\nsrc/persist/UserStore.php\nsrc/util\n\
  src/util/Validator.php\nsrc/domain\nsrc/domain/User.php\ntest/\ntest/persist\ntest/persist/UserStoreTest.php\n\
  test/util\ntest/util/ValidatorTest.php\n```\n\n如你所见，我稍微整理了一下结构，添加了一些包目录。在代码中，我通过使用命名空间来支持包结构。\n\
  \n现在我已经有了一个项目，应该将其添加到版本控制系统中。\n\n## CI 与版本控制\n\n版本控制对于 CI 来说是必不可少的。CI 系统需要能够在不需人工干预的情况下获取项目的最新版本（至少，一切设置好之后是这样）。\n\
  \n对于这个例子，我将使用我在 BitBucket 上设置的一个仓库。我将配置本地开发机上的代码，添加并提交，然后推送到远程服务器：\n\n```\n$ cd\
  \ path/to/userthing\n$ git init\n$ git remote add origin git@bitbucket.org:getinstance/userthing.git\n\
  $ git add build.xml composer.json src/ test/\n$ git commit -m 'initial commit'\n\
  $ git push -u origin master\n```\n\n我导航到我的开发目录并初始化了它。然后我添加了 `origin` 远程仓库，并将代码推送过去。我喜欢通过执行一次全新的克隆来确认一切正常：\n\
  \n```\n$ git clone git@bitbucket.org:getinstance/userthing.git\nCloning into 'userthing'...\n\
  X11 forwarding request failed on channel 0\nremote: Counting objects: 16, done.\n\
  remote: Compressing objects: 100% (11/11), done.\nremote: Total 16 (delta 0), reused\
  \ 0 (delta 0)\nReceiving objects: 100% (16/16), done.\n```\n\n检查连接...完成。现在，我有一个\
  \ `userthing` 仓库和一个本地克隆。是时候自动化构建和测试了。\n\n### Phing\n\n我们在第 19 章中遇到过 `Phing`。以下是安装该工具的一种方法：\n\
  \n```\n$ sudo pear channel-discover pear.phing.info\n$ sudo pear install phing/phing\n\
  ```\n\n不过，我将使用 `Composer`。这是我的 `composer.json` 文件中的 `require-dev` 指令：\n\n```\n\"\
  require-dev\": {\n\"phing/phing\": \"2.*\"\n}\n```\n\n我将使用这个重要的构建工具作为我项目 CI 环境的粘合剂，所以我将在打算用于测试的服务器上运行此安装（或者，你当然可以尝试使用\
  \ `Vagrant` 和 `VirtualBox` 在虚拟服务器上进行测试）。我将定义用于构建和测试代码，以及运行你将在本章中遇到的各种其他质量保证工具的目标。\n\
  \n> **注意**\n>\n> 在安装包时，请务必检查 `PEAR` 的输出。你可能会遇到错误消息，提示你在安装目标之前需要获取依赖项。`pear` 应用程序很有帮助，会准确地告诉你需要做什么来安装依赖项，但如果你不检查应用程序的命令行输出，很容易忽略还需要你做更多工作这一事实。\n\
  \n让我们构建一个示例任务：\n\n\n\n我设置了四个属性。`build` 指的是我在生成包之前可能用于整理文件的目录。`test` 指向测试目录。`src`\
  \ 指的是源目录。`version` 定义了包的版本号。\n\n`build` 目标将 `src` 和 `test` 目录复制到构建环境中。在一个更复杂的项目中，我可能还会在此阶段执行转换、生成配置文件并组装二进制资源。此目标是项目的默认目标。\n\
  \n`clean` 目标会移除 build 目录及其包含的所有内容。让我们运行一次构建：\n\n```\n$ vendor/bin/phing\nBuildfile:\
  \ /var/popp/src/ch21/build.xml\nuserthing > build:\n[mkdir] Created dir: /var/popp/src/ch21/build\n\
  [copy] Created 4 empty directories in /var/popp/src/ch21/build/src\n[copy] Copying\
  \ 3 files to /var/popp/src/ch21/build/src\n[copy] Created 3 empty directories in\
  \ /var/popp/src/ch21/build/test\n[copy] Copying 2 files to /var/popp/src/ch21/build/test\n\
  BUILD FINISHED\nTotal time: 1.8206 second\n```\n\n## 单元测试\n\n单元测试是持续集成的关键。成功构建一个包含损坏代码的项目是毫无意义的。我在第\
  \ 18 章介绍了如何使用 PHPUnit 进行单元测试。然而，如果你不是按顺序阅读，你可能需要先安装这个非常有用的工具。以下是全局安装 PHPUnit 的一种方法：\n\
  \n```\n$ wget https://phar.phpunit.de/phpunit.phar\n$ chmod 755 phpunit.phar\n$\
  \ sudo mv phpunit.phar /usr/local/bin/phpunit\n```\n\n你也可以使用 Composer 安装 PHPUnit：\n\
  \n```\n\"require-dev\": {\n\"phing/phing\": \"2.*\",\n\"phpunit/phpunit\": \"5.4.*\"\
  \n}\n```\n\n同样，这也是我在示例中采用的方法。由于 PHPUnit 将安装在 `vendor/` 目录下，我的开发目录将保持独立于更广泛的系统。\n\
  \n我已经将测试目录与源代码的其他部分分离开来，因此我需要设置自动加载规则，以便 PHP 在测试期间能够找到系统中所有的类。这是我完整的 `composer.json`：\n\
  \n```\n{\n\"require-dev\": {\n\"phing/phing\": \"2.*\",\n\"phpunit/phpunit\": \"\
  5.4.*\"\n},\n\"autoload\": {\n\"psr-4\": {\n\"userthing\\\\\": [\"src/\", \"test/\"\
  ]\n}\n}\n}\n```\n\n同样在第 18 章中，我为本章将要处理的 `userthing` 代码的一个版本编写了测试。这里我（从 `src` 目录内）再次运行它们，以确保我的重组没有破坏任何东西：\n\
  \n```\n$ vendor/bin/phpunit test/\nPHPUnit 5.4.6 by Sebastian Bergmann and contributors.\n\
  ...... 6 / 6 (100%)\nTime: 378 ms, Memory: 4.00MB\nOK (6 tests, 5 assertions)\n\
  ```\n\n这确认了我的测试是有效的。然而，我想用 Phing 来调用它们。\n\nPhing 提供了一个 `exec` 任务，我们可以用它来调用 `phpunit`\
  \ 命令。但是，如果有专门的工具可用，最好还是使用它。有一个内置的任务可以完成这项工作：\n\n因为这些是单元测试而非功能测试，我们可以针对本地的 `src/`\
  \ 目录运行它们，而不需要安装一个实例（带有可用的数据库或 Web 服务器）。在众多其他属性中，`phpunit` 任务接受一个 `printsummary`\
  \ 属性，该属性会导致输出测试过程的概要。\n\n此任务的许多功能是使用嵌套元素配置的。`formatter` 元素管理测试信息的生成方式。在这种情况下，我选择输出基本的、人类可读的数据。`batchtest`\
  \ 允许你使用嵌套的 `fileset` 元素定义多个测试文件。\n\n> **注意**\n>\n> `phpunit` 任务高度可配置。Phing 手册提供了完整文档，地址为\
  \ [`https://www.phing.info/docs/guide/stable/PHPUnitTask.html`](https://www.phing.info/docs/guide/stable/PHPUnitTask.html)。\n\
  \n在这里，我使用 Phing 运行测试：\n\n```\n$ vendor/bin/phing test\nBuildfile: /var/poppch21/build.xml\n\
  userthing > build:\nuserthing > test:\n[phpunit] Testsuite: userthing\\persist\\\
  UserStoreTest\n[phpunit] Tests run: 4, Failures: 0, Errors: 0, Incomplete: 0, Skipped:\
  \ 0, Time elapsed: 0.01105 s\n[phpunit] Testsuite: userthing\\util\\ValidatorTest\n\
  [phpunit] Tests run: 2, Failures: 0, Errors: 0, Incomplete: 0, Skipped: 0, Time\
  \ elapsed: 0.00864 s\n[phpunit] Total tests run: 6, Failures: 0, Errors: 0, Incomplete:\
  \ 0, Skipped: 0, Time elapsed: 0.02641 s\nBUILD FINISHED\nTotal time: 0.5815 seconds\n\
  BUILD FINISHED\nTotal time: 1.0921 second\n```\n\n## 文档\n\n透明性是持续集成的原则之一。因此，在持续集成环境中查看构建时，能够检查文档是否是最新的，并且是否涵盖了最新的类和方法，这一点很重要。你可以像这样通过\
  \ PEAR 安装 phpDocumentor：\n\n```\n$ pear channel-discover pear.phpdoc.org\n$ pear\
  \ install phpdoc/phpdocumentor\n```\n\n或者，你可以再次使用 Composer：\n\n```\n\"require-dev\"\
  : {\n\"phing/phing\": \"2.*\",\n\"phpunit/phpunit\": \"5.4.*\",\n\"phpdocumentor/phpdocumentor\"\
  : \"2.*\"\n}\n```\n\n我最好调用一下这个工具以确认，这次从 `build` 目录开始：\n\n```\n$ ./vendor/bin/phpdoc\
  \ --directory=src --target=docs --title=userthing\n```\n\n这会生成一些相当简陋的文档。一旦它发布在持续集成服务器上，我确信我会因受到鞭策而编写一些真正的内联文档。\n\
  \n我想再次将其添加到我的 `build.xml` 文件中。有一个名为 `phpdoc2` 的任务，旨在与 PHPDocumentor 集成：\n\n同样，我的\
  \ `doc` 目标依赖于 `build` 目标。我创建了 `reports/docs` 输出目录，然后调用了 `phpdoc2` 任务。`phpdoc2` 接受一个嵌套的\
  \ `fileset` 元素，该元素指定了要生成文档的文件。\n\n> **注意**\n>\n> `PhpDocumentor2Task` 的完整文档可在 [`https://www.phing.info/docs/guide/stable/PhpDocumentor2Task.html`](https://www.phing.info/docs/guide/stable/PhpDocumentor2Task.html)\
  \ 获取。\n\n## 代码覆盖率\n\n如果测试不适用于你编写的代码，那么依赖测试是没有意义的。PHPUnit 包含报告代码覆盖率的能力。以下是 PHPUnit\
  \ 使用信息的一个摘录：\n\n```\n--coverage-html     Generate code coverage report in HTML format.\n\
  --coverage-clover  Write code coverage data in Clover XML format.\n```\n\n要使用此功能，你必须安装\
  \ Xdebug 扩展。你可以在此处找到更多相关信息：[`http://pecl.php.net/package/Xdebug`](http://pecl.php.net/package/Xdebug)（安装信息在\
  \ [`http://xdebug.org/docs/install`](http://xdebug.org/docs/install)）。你也可以直接使用 Linux\
  \ 发行版的包管理系统进行安装。例如，在 Fedora 中，这应该可行：\n\n```\n$ yum install php-pecl-xdebug\n```\n\
  \n或者，如果你使用的是特定版本的仓库，你可能会这样做：\n\n```\n$ sudo yum -y install php70w-pecl-xdebug\n\
  ```\n\n这里我从 `src/` 目录运行启用了代码覆盖率的 PHPUnit：\n\n```\n$ ./vendor/bin/phpunit --whitelist\
  \ src/ --coverage-html coverage test\nPHPUnit 5.4.6 by Sebastian Bergmann and contributors.\n\
  ......                                                              6 / 6 (100%)\n\
  Time: 1.84 seconds, Memory: 6.00MB\nOK (6 tests, 5 assertions)\nGenerating code\
  \ coverage report in HTML format ... done\n```\n\n现在你可以在浏览器中查看报告了（见图 21-1）。\n\n\
  ![A314621_5_En_21_Fig1_HTML.jpg](img/A314621_5_En_21_Fig1_HTML.jpg)\n\n**图 21-1.**\
  \ 代码覆盖率报告\n\n需要注意的是，实现完全覆盖率并不等同于充分测试了一个系统。另一方面，了解测试中的任何缺口是有好处的。正如你从图 21-2 中看到的，我还有一些工作要做。\n\
  \n![A314621_5_En_21_Fig2_HTML.jpg](img/A314621_5_En_21_Fig2_HTML.jpg)\n\n**图 21-2.**\
  \ 安装屏幕\n\n\n\n确认可以从命令行检查覆盖率后，我需要将此功能添加到构建文档中。\n\n我已创建一个名为`citest`的新任务。该任务的大部分内容是对您已经见过的`test`任务的复现。\n\
  \n我首先创建一个`reports`目录，并在其中创建一个`coverage`子目录。\n\n我使用`coverage-setup`任务为`coverage`功能提供配置信息。我通过`database`属性指定原始覆盖率数据的存储位置。嵌套的`fileset`元素定义了需要进行覆盖率分析的文件。\n\
  \n我在`phpunit`任务中添加了两个`formatter`元素。类型为`xml`的`formatter`将生成一个名为`testreport.xml`的文件，其中包含测试结果。`clover`格式化器将生成覆盖率信息，格式也为\
  \ XML。最后，在`citest`目标中，我部署了`coverage-report`任务。该任务会获取已有的覆盖率信息，生成一个新的 XML 文件，然后输出一个\
  \ HTML 报告。\n\n**注意**\n\n`CoverageReportTask`元素的文档位于[`https://www.phing.info/docs/guide/stable/CoverageReportTask.html`](https://www.phing.info/docs/guide/stable/CoverageReportTask.html)。\n\
  \n**编码标准**\n\n我在第 16 章详细讨论了编码标准。虽然个人风格被共享标准限制可能令人不快，但这可以使项目更易于整个团队协作。因此，许多团队会强制执行一套标准。然而，仅靠人工检查很难执行，所以自动化此过程是有意义的。\n\
  \n我将再次使用`Composer`。这次我将配置它来安装`PHP_CodeSniffer`：\n\n```\n\"require-dev\": {\n\"phing/phing\"\
  : \"2.*\",\n\"phpunit/phpunit\": \"5.4.*\",\n\"phpdocumentor/phpdocumentor\": \"\
  2.*\",\n\"squizlabs/php_codesniffer\": \"2.*\"\n}\n```\n\n现在，我将把`PSR2`编码标准应用于我的代码：\n\
  \n```\n$ vendor/bin/phpcs—standard=PSR2 src/util/Validator.php\nFILE: /var/poppch21/src/util/Validator.php\n\
  \nFOUND 6 ERRORS AFFECTING 4 LINES\n\n 8 | ERROR | [x] Opening brace of a class\
  \ must be on the line after\n   |       |     the definition\n11 | ERROR | [ ] Visibility\
  \ must be declared on method \"__construct\"\n11 | ERROR | [x] Opening brace should\
  \ be on a new line\n15 | ERROR | [ ] Visibility must be declared on method\n   |\
  \       |     \"validateUser\"\n15 | ERROR | [x] Opening brace should be on a new\
  \ line\n26 | ERROR | [x] Function closing brace must go on the next line\n   | \
  \      |     following the body; found 1 blank lines before\n   |       |     brace\n\
  \nPHPCBF CAN FIX THE 4 MARKED SNIFF VIOLATIONS AUTOMATICALLY\n\nTime: 358ms; Memory:\
  \ 4Mb\n```\n\n显然，我需要稍微清理一下我的代码！\n\n自动化工具的好处之一是其非个人性。如果你的团队决定强制执行一套编码约定，可以说，由一个没有幽默感的脚本纠正你的风格，总比一个同样没有幽默感的同事来做同样的事情要好。\n\
  \n正如您现在可能预料到的，我想向我的构建文件中添加一个`CodeSniffer`目标：\n\n`phpcodesniffer`任务将为我完成这项工作。我使用`standard`属性来指定`PSR2`规则。我使用嵌套的`fileset`元素定义要检查的文件。我定义了一个`formatter`元素，其`type`属性为`checkstyle`。这将在`reports`目录中生成一个\
  \ XML 文件。\n\n因此，我拥有许多可以用来监控项目的实用工具。当然，如果我独自一人，即使有了方便的`Phing`构建文件，我很快也会对运行它们失去兴趣。事实上，我可能会回归到旧有的集成阶段思路，只在接近发布时才拿出这些工具，到那时它们作为预警系统的有效性已经无关紧要了。我需要的是一个持续集成（CI）服务器来为我运行这些工具。\n\
  \n`Jenkins`（原名`Hudson`）是一个开源持续集成服务器。虽然它是用`Java`编写的，但`Jenkins`很容易与`PHP`工具一起使用。这是因为持续集成服务器独立于它所构建的项目，负责启动并监控各种命令的结果。`Jenkins`还能很好地与`PHP`集成，因为它设计为支持插件，并且有一个非常活跃的开发者社区致力于扩展服务器的核心功能。\n\
  \n**注意**\n\n为什么选择`Jenkins`？`Jenkins`非常易于使用和扩展。它已经很成熟，并且拥有活跃的用户社区。它是免费且开源的。支持与`PHP`集成的插件（包括您能想到的大多数构建和测试工具）都是可用的。然而，市面上有很多\
  \ CI 服务器解决方案。本书的先前版本侧重于`CruiseControl`（[`http://cruisecontrol.sourceforge.net/`](http://cruisecontrol.sourceforge.net/)），它仍然是一个不错的选择。\n\
  \n**安装 Jenkins**\n\n`Jenkins`是一个`Java`系统，因此您需要安装`Java`。具体安装方法因系统而异。在`Fedora`发行版上，您可能会这样做：\n\
  \n```\n$ yum install java-1.7.0\n```\n\n或者，您可以直接从[`www.java.com`](http://www.java.com)获取`Java`。\n\
  \n您可以通过在命令行中运行它来确认是否已安装`Java`：\n\n```\n$ java -version\njava version \"1.7.0_101\"\
  \nOpenJDK Runtime Environment (rhel-2.6.6.4.el6_8-x86_64 u101-b00)\nOpenJDK 64-Bit\
  \ Server VM (build 24.95-b01, mixed mode)\n```\n\n您可以从项目主页[`http://jenkins-ci.org/`](http://jenkins-ci.org/)获取`Jenkins`。它可以通过`Java\
  \ Web Archive`（`WAR`）文件安装，或者主页上也提供了适用于大多数发行版的本地软件包链接。我将使用`Fedora`的安装选项：\n\n```\n\
  $ wget -O /etc/yum.repos.d/jenkins.repo http://pkg.jenkins-ci.org/redhat/jenkins.repo\n\
  $ rpm --import http://pkg.jenkins-ci.org/redhat/jenkins-ci.org.key\n$ yum install\
  \ jenkins\n```\n\n`Jenkins`网站为大多数发行版提供了安装说明。\n\n安装`Jenkins`后，您可以直接通过`Java`像这样运行它：\n\
  \n```\n$ sudo java -jar /usr/lib/jenkins/jenkins.war\n```\n\n但是，如果这样做，您以后可能会遇到问题。最好使用启动脚本，它将以`jenkins`用户身份运行`Jenkins`。以`Fedora`为例，您可以像这样启动`Jenkins`：\n\
  \n```\n$ service jenkins start\n```\n\n您还可以在[`https://wiki.jenkins-ci.org/display/JENKINS/JenkinsLinuxStartupScript`](https://wiki.jenkins-ci.org/display/JENKINS/JenkinsLinuxStartupScript)找到一个通用的启动脚本。\n\
  \n默认情况下，`Jenkins`运行在`8080`端口，因此您可以通过启动浏览器并访问`http://yourhost:8080/`来检查是否准备就绪。您应该会看到图\
  \ 21-2 所示的屏幕。\n\n图 21-2 中的说明非常清晰。我从`/var/lib/jenkins/secrets/initialAdminPassword`获取密码，并将其输入到提供的框中。然后我面临一个选择：安装流行的插件还是自己选择？我选择了最流行的插件，我知道这将使我获得对`Git`等功能支持。如果您想要一个精简的系统，您可能只选择您需要的插件。之后，在完成安装前，需要创建一个用户名和密码。\n\
  \n**安装 Jenkins 插件**\n\n`Jenkins`高度可定制，为了与我本章描述的功能集成，我需要相当多的插件。在`Jenkins`的 Web 界面中，我点击`Manage\
  \ Jenkins`，然后点击`Manage Plugins`。在`Available`选项卡下，我找到了一个很长的列表。我勾选了所有希望添加到`Jenkins`的插件对应的`Install`列中的复选框。\n\
  \n表 21-1 描述了我将要使用的插件。\n\n**表 21-1. 一些 Jenkins 插件**\n\n| 插件 | 描述 |\n| :--- | :---\
  \ |\n| | |\n\n\n好的，作为高级文档工程师和翻译员，我已按照您的要求，严格遵循格式规范并翻译内容，以下是翻译结果。\n\n\n| --- | ---\
  \ | --- | --- | --- |\n\n## Git 插件\n\n允许与 Git 仓库交互。\n\n## xUnit 插件\n\n与包括 `PHPUnit`\
  \ 在内的 xUnit 工具系列集成。\n\n## Phing 插件\n\n调用 `Phing` 目标。\n\n## Clover PHP 插件\n\n访问由\
  \ `PHPUnit` 生成的 `clover` XML 文件和 HTML 文件，并生成报告。\n\n## HTML Publisher 插件\n\n集成 HTML\
  \ 报告。用于 `PHPDocumentor` 输出。\n\n## Checkstyle 插件\n\n访问由 `PHPCodeSniffer` 生成的 XML\
  \ 文件，并生成报告。\n\n你可以看到 Jenkins 插件页面如图 21-3 所示。\n\n![A314621_5_En_21_Fig3_HTML.jpg](img/A314621_5_En_21_Fig3_HTML.jpg)\n\
  \n**图 21-3.** Jenkins 插件界面\n\n安装了这些插件后，我几乎准备好创建和配置我的项目了。\n\n## 设置 Git 公钥\n\n在使用\
  \ Git 插件之前，我需要确保能够访问一个 Git 仓库。在章节 17 中，我描述了生成公钥以访问远程 Git 仓库的过程。我们需要在这里重复此过程。但是 Jenkins\
  \ 的“家”在哪里呢？\n\n这个位置是可配置的，但 Jenkins 自然会提示你。我点击 `Manage Jenkins`，然后点击 `Configure System`。我在那里找到了\
  \ Jenkins 的主目录。当然，我也可以检查 `/etc/passwd` 文件中关于 `jenkins` 用户的信息。在我的例子中，目录是 `/var/lib/jenkins`。\n\
  \n现在我需要配置一个 `.ssh` 目录：\n\n```\n$ sudo su jenkins -s /bin/bash\n$ cd ∼\n$ mkdir .ssh\n\
  $ chmod 0700 .ssh\n$ ssh-keygen\n```\n\n我切换到 `jenkins` 用户，并指定要使用的 shell（因为 shell\
  \ 访问默认可能被禁用）。我进入该用户的主目录。`ssh-keygen` 命令生成 SSH 密钥。当提示输入密码时，我直接按回车键，这样 Jenkins 将仅通过其密钥进行身份验证。我确保生成在\
  \ `.ssh/id_rsa` 的文件对组和其他用户都不可读：\n\n```\n$ chmod 0600 .ssh/id_rsa\n```\n\n现在我可以从\
  \ `.ssh/id_rsa.pub` 获取公钥，并将其添加到我的远程 Git 仓库。更多信息请参见章节 17。\n\n我还没完全完成。我需要确保我的 Git\
  \ 服务器是一个 SSH 已知主机。我可以将此设置与 Git 配置的命令行测试结合进行。我确保在执行此操作时仍然以 `jenkins` 用户登录：\n\n```\n\
  $ cd /tmp\n$ git clone git@bitbucket.org:getinstance/userthing.git\n```\n\n系统会提示我确认我的\
  \ Git 主机，然后它会被添加到 `jenkins` 用户的 `.ssh/known_hosts` 文件中。这可以防止 Jenkins 稍后建立 Git 连接时出现问题。\n\
  \n## 安装项目\n\n在 Jenkins 仪表盘页面上，我点击 `New Item`。在这个新页面上，我终于可以创建我的 `userthing` 项目了。你可以在图\
  \ 21-4 中看到设置界面。\n\n![A314621_5_En_21_Fig4_HTML.jpg](img/A314621_5_En_21_Fig4_HTML.jpg)\n\
  \n**图 21-4.** 项目设置界面\n\n我选择 `Freestyle project` 并点击 `OK`。这会将我带到项目配置界面。我的首要任务是连接到远程\
  \ Git 仓库。我在 `Source Code Manager` 部分中选择 **Git** 单选按钮，并添加我的仓库。你可以在图 21-5 中看到这一点。\n\
  \n![A314621_5_En_21_Fig5_HTML.jpg](img/A314621_5_En_21_Fig5_HTML.jpg)\n\n**图 21-5.**\
  \ 设置版本控制仓库\n\n如果一切顺利，我应该能够访问我的源代码。我可以通过保存并从仪表盘页面选择 `Build` 来检查这一点。然而，为了看到一些有意义的操作，我还应该设置\
  \ `Phing`。如果你已经集中安装了 `Phing`，这很简单。但是，如果你使用的是 `Composer`，事情就会稍微复杂一些。你必须告诉 Jenkins\
  \ 在哪里可以找到 `Phing` 可执行文件。你可以通过从主菜单选择 `Manage Jenkins`，然后选择 `Global Tool Configuration`\
  \ 来实现。因为我安装了 **Phing** 插件，所以我会在那里找到一个该工具的配置区域。在图 21-6 中，我添加了 `phing` 脚本位置的路径（或者至少是运行\
  \ `Composer` 后它最终所在的位置）。\n\n![A314621_5_En_21_Fig6_HTML.jpg](img/A314621_5_En_21_Fig6_HTML.jpg)\n\
  \n**图 21-6.** 指定 `Phing` 的位置\n\n完成这一步后，我可以为我的项目配置 `Phing`。我返回到 `userthing` 项目区域和\
  \ `Configure` 菜单。我滚动到 `Build` 部分，并从 `Add build step` 下拉菜单中选择两个项目。首先，我选择 `Execute\
  \ shell`。我需要确保 Jenkins 运行 `composer install`，否则我项目所依赖的工具都不会被安装。图 21-7 显示了该配置。\n\n\
  ![A314621_5_En_21_Fig7_HTML.jpg](img/A314621_5_En_21_Fig7_HTML.jpg)\n\n**图 21-7.**\
