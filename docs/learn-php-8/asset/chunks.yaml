- fmt: '# Constructor Method


    One difficulty with the previous examples is the amount of calls to `set` routines
    that would be required if we are initially creating an object and populating the
    properties of the object with values. The `Dog` class requires that we call four
    set methods (`set_dog_name`, `set_dog_breed`, `set_dog_color`, and `set_dog_weight`)
    in order to place values in all the properties. We can use a much more efficient
    way of updating all these properties at once. This could reduce the code in the
    `lab.php` file. We could then use the `set` routines in the `Dog` class to make
    any changes (maybe the dog gained some weight) after we have provided initial
    values. The initial values are not default values. We still need default values
    in case the initial values are invalid.


    When an instance of a class (object) is created in memory, the operating system
    executes a **constructor method** that builds the object with any existing properties
    and methods. The system also builds tables in memory to keep track of the location
    of the object and the values that exist in the properties of the object. When
    the object is no longer needed, the operating system’s garbage collector will
    be called by the object’s **destructor method**, which will remove it from memory.


    You can also include a constructor method that will automatically be called when
    the object is placed in memory. When the code line that creates the object (`$lab
    = new Dog;`) is executed, it looks for a constructor method in the object. If
    it exists, the method is executed. You can pass all the initial values for the
    properties into this constructor method via same line that creates the object.


    ```

    $lab = new Dog(''Fred'', ''Lab'', ''Yellow'', 50);

    ```


    This becomes a much more efficient way of providing the initial values from within
    the `lab.php` program.


    The constructor method is a generic format with a function name `__construct`
    (note there are two underscores before the word construct).


    You can use the existing `set` methods in the constructor to update the properties.
    You will need to collect any messages (`TRUE`/`FALSE`) and return them to the
    calling program (`lab.php`). You can use a similar procedure as you initially
    coded with the handling of the `get_properties` method.


    ```

    set_dog_name($value1) == TRUE ? ''TRUE,'' : ''FALSE,'';

    string $breed_error = $this->set_dog_breed($value2) == TRUE ? ''TRUE,'' : ''FALSE,'';

    string $color_error = $this->set_dog_color($value3) == TRUE ? ''TRUE,'' : ''FALSE,'';

    string $weight_error= $this->set_dog_weight($value4) == TRUE ? ''TRUE'' : ''FALSE'';

    $this->error_message = $name_error . $breed_error . $color_error . $weight_error;

    }

    //---------------------------------toString--------------------------------

    public function __toString()

    {

    return $this->error_message;

    }

    //... There are no other code changes to dog.php below this line.

    Example 4-12

    Dog class with constructor—dog.php

    ```


    For more information about the `__construct` method, visit [www.php.net/manual/en/language.oop5.decon.php](http://www.php.net/manual/en/language.oop5.decon.php).


    First, let us discuss the use of the special method called `__toString` (note
    the two underscores) in Example 4-12. Constructor methods are not allowed to return
    information (by default). The `return` statement cannot be used within the constructor.
    In order to return error messages created in the constructor to the calling program
    (`lab.php`), you must trick the program. The `__toString` method allows the programmer
    to decide what will occur if an attempt is made to use the `print` (or `echo`)
    method with the object name (`print $lab;`). This can be overridden by including
    a `__toString` method with a statement that returns a string. You can overcome
    this problem of being able to return the error messages by allowing the value
    in the `$error_message` property to be returned if the `print $lab;` statement
    is executed.


    For more information on the `__toString` method and other magic methods, visit
    [www.php.net/manual/en/language.oop5.magic.php](http://www.php.net/manual/en/language.oop5.magic.php).


    The `TRUE` and `FALSE` constants that are returned by the `set` methods also cause
    a problem because they are constants and not strings. If you attempt to convert
    these constants to a string using a method (such as `strval(TRUE);`), the values
    that they represent (1 for `TRUE`, 0 for `FALSE`) would become a string instead
    of `''TRUE''` or `''FALSE''`. Therefore, they cannot be returned via the `__toString`
    method. To overcome this problem, we create the following code in the constructor
    to do a conversion from `TRUE` to `''TRUE''` or `FALSE` to `''FALSE''`:


    ```

    $name_error = $this->set_dog_name($value1) == TRUE ? ''TRUE,'' : ''FALSE,'';

    ```


    The order of operations will cause the `set_dog_name` method to execute before
    any part of this code. The `set_dog_name` method returns `TRUE` or `FALSE` (constants).
    Assuming that the method returns a `TRUE` after the execution, the code line would
    now be


    ```

    $name_error == TRUE == TRUE ? ''TRUE,'' : ''FALSE,'';

    ```


    The order of operations then requires that the comparison (`TRUE == TRUE`) be
    evaluated. Of course, this evaluates to `TRUE`. The statements between the `?`
    and the `:` are used.


    ```

    $name_error = ''TRUE,'';

    ```


    Thus `$name_error` is set to the string `"TRUE,"`, which is now a string, not
    a constant. Also note that a '','' has been added in preparation for the next
    `''TRUE''` or `''FALSE''` value. Each value passed (except the last value) must
    be separated by a '','' to allow the string to be separated later. The other three
    similar lines are evaluated and also place a `''TRUE,''` or `''FALSE,''` in the
    error message properties (the weight error evaluation does not include a comma
    at the end of the string since it is the last one evaluated).


    The last line of code in the constructor is evaluated.


    ```

    $this->error_message = $name_error . $breed_error . $color_error . $weight_error;

    ```


    This line places the values of each error property into the `error_message` property.
    If all the updates were successful, the `$error_message` property would contain


    ```

    "TRUE,TRUE,TRUE,TRUE"

    ```


    Notice that each item passed includes a '','' for separation except the last item.
    This is necessary to break apart the results of the string.


    ```

    '' :

    ''Name update not successful'';

    print $breed_error == ''TRUE'' ? ''Breed update successful'' :

    ''Breed update not successful'';

    print $color_error == ''TRUE'' ? ''Color update successful'' :

    ''Color update not successful'';

    print $weight_error == ''TRUE'' ? ''Weight update successful'' :

    ''Weight update not successful'';

    // ------------------------------Set Properties--------------------------

    ...There are no other changes to lab.php below this line.

    Example 4-13

    The lab.php file calling a constructor

