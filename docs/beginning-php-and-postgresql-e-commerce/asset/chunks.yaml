    **How It Works: The Shopping Cart Admin Page**


    The hard work of the shopping cart admin page is done by the two functions you’ve
    added to the `hatshop` database: `shopping_cart_count_old_carts` and `shopping_cart_delete_old_carts`.
    They both receive as parameter the number of days that determine when a shopping
    cart is old, and they use the same logic to calculate the shopping cart elements
    that are old and should be removed.


    The age of a shopping cart is given by the age of the most recently added or changed
    item and is calculated using the `GROUP BY` SQL clause. The condition that establishes
    whether a cart should be considered old is the following:

    ```

    WHERE cart_id IN

    (SELECT cart_id

    FROM shopping_cart

    GROUP BY cart_id

    HAVING ((NOW() - (inDays||'' DAYS'')::INTERVAL) >= MAX(added_on)));

    ```


    **Summary**


    In this chapter, you learned how to store the shopping cart information in the
    database, and you learned a few things in the process as well. Probably the most
    interesting was the way you can store the shopping cart ID as a cookie on the
    client because you haven’t done anything similar so far in this book.


