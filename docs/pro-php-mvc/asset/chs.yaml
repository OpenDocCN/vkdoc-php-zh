  \ = \"not redirected\");\n}\n```\n\n`setUp()` 方法仅仅是为将要运行的每个单元测试初始化测试过程。这是自动生成的，无需修改。第一个和第三个测试断言\
  \ `register.phtml` 和 `login.phtml` 视图包含登录和注册所需的所有字段。\n\n第二个和第四个测试实际上向 Zend Framework\
  \ 应用程序发送数据，并检查响应是否符合预期格式。你可能需要修改应用程序，使其按照清单 29-2 所示的方式进行重定向。\n\n**清单 29-2.** Zend\
  \ Framework 方式的重定向\n```php\n// 重定向到个人资料页面\n$this->_helper->redirector->gotoRoute(array(\n\
  \    \"controller\" => \"users\",\n    \"action\" => \"profile\"\n));\n```\n\n**注意**\
  \ 如果你希望下载或了解更多关于 PHPUnit 的信息，可以访问 [`github.com/sebastianbergmann/phpunit`](https://github.com/sebastianbergmann/phpunit)。\n\
  \n### 问题\n\n1. 在本章中，我们了解了一种标准库分发机制 (PEAR)，并使用它安装了一个流行的单元测试框架 (PHPUnit)。使用像 PEAR\
  \ 这样的分发系统有哪些优点和缺点？\n2. 与将测试构建为应用程序本身的一部分相比，使用 PHPUnit 对我们的应用程序进行远程请求有哪些好处？\n\n###\
  \ 答案\n\n1. 分发系统非常有用——本书中我们已经使用过几个了！问题在于每个系统都有自己的学习曲线，并以自己独特的方式给系统增加混乱。理想情况下，我们可以只依赖一个分发系统来为我们安装所有内容，从\
  \ Apache 到 PHP 再到 PHPUnit。\n2. 回想一下我们自己的单元测试库。与 PHPUnit 相比，我们可以看到如何轻松测试高级功能（如注册和登录），而无需任何混乱的数据库或配置代码。Zend\
  \ Framework 为我们设置了单元测试的基础，而所有繁重的工作都由 PHPUnit 完成。\n\n# 第 30 章\n## CakePHP：启动\n\n\
  CakePHP 由开源开发者社区创建并维护，它面向快速应用开发，倾向于**约定优于配置**。\n\n它功能丰富，包括（除其他功能外）一个令人印象深刻的 ORM\
  \ 和一个用于快速创建模型、视图和控制器的命令行界面。\n\n**注意** 你可以从 [`cakephp.org/`](http://cakephp.org/)\
  \ 下载 CakePHP。\n\n### 目标\n\n- 我们需要理解 CakePHP 的理念和优势。\n- 我们需要学习如何为我们的示例应用创建架构要求。\n\
  \n### 为什么选择 CakePHP？\n\nCakePHP 非常流行，因此它拥有一个知识渊博的社区和良好的文档。CakePHP 的重点在于按照约定行事，而不是强迫开发者配置一切。这并不是说它不能配置，而是说在你开始使用\
  \ CakePHP 之前，大部分配置工作已经完成。\n\nCakePHP 的文档相当全面，从简单的 API 文档到常见编程任务的菜谱都有。还有许多流行的截屏视频、书籍资源和活动，旨在为新手和有经验的\
  \ CakePHP 开发者提供教育。\n\n**注意** 你可以在 [`api20.cakephp.org/`](http://api20.cakephp.org/)\
  \ 找到 CakePHP 文档。\n\n### 为什么不选择 CakePHP？\n\nCakePHP 并不适合胆小的人。实际上，后台有很多事情在发生，当需要对\
  \ CakePHP 应用进行简单的配置或行为更改时，很容易迷失方向。\n\n对惯例的高度关注也意味着 CakePHP 对目录结构、文件名和实际代码做出了许多假设。这与我们自己的框架等其他框架并非不同，但我们的假设只有几十个，而\
  \ CakePHP 的整个架构都建立在这些假设之上。它假设你何时想加载模型，也假设你何时想加载助手。\n\n当使用 CakePHP 作为应用的代码库时，似乎几乎没有事情可做，但这正是因为\
  \ CakePHP 已经在做出假设并为你包揽一切。\n\n### 环境搭建\n\n让 CakePHP 运行起来很简单。可下载的归档文件以即用型项目结构组织，你只需使其中的公共文件夹可通过\
  \ Web 访问，即可开始查看你的应用。要让 CakePHP 运行，请下载最新的 CakePHP 稳定版（例如，[`github.com/cakephp/cakephp/zipball/2.1.3`](https://github.com/cakephp/cakephp/zipball/2.1.3)）并将其解压到你认为合适的地方。\n\
  \n你需要配置 Web 服务器指向 `webroot/` 目录，以便生成的启动代码能够执行。\n\n### 路由\n\nCakePHP 的路由只能通过函数调用来定义，这使其与我们迄今为止使用过的所有其他框架不同。理论上，这些函数调用可以在请求分发之前的任何文件中，但通常位于\
  \ `app/Config/routes.php` 文件中。添加路由时，此配置文件应类似于清单 30-1 所示。\n\n**清单 30-1.** 向 CakePHP\
  \ 添加自定义路由\n```php\n/**\n * 这里，我们将 '/'（基础路径）连接到名为 'Pages' 的控制器，\n * 其动作名为 'display'，并传递一个参数来选择要使用的视图文件\n\
  \ * （在本例中为 /app/View/Pages/home.ctp）。. . .\n */\nRouter::connect('/', array('controller'\
  \ => 'pages', 'action' => 'display', 'home'));\n\n/**\n * . . .并连接 'Pages' 控制器的其余\
  \ URL。\n */\nRouter::connect('/pages/*', array('controller' => 'pages', 'action'\
  \ => 'display'));\n\n/**\n * 自定义路由\n */\nRouter::connect('/register', array('controller'\
  \ => 'users', 'action' => 'register'));\nRouter::connect('/login', array('controller'\
  \ => 'users', 'action' => 'login'));\nRouter::connect('/logout', array('controller'\
  \ => 'users', 'action' => 'logout'));\nRouter::connect('/search', array('controller'\
  \ => 'users', 'action' => 'search'));\nRouter::connect('/profile', array('controller'\
  \ => 'users', 'action' => 'profile'));\nRouter::connect('/settings', array('controller'\
  \ => 'users', 'action' => 'settings'));\nRouter::connect('/friend/*', array('controller'\
  \ => 'users', 'action' => 'friend'));\nRouter::connect('/unfriend/*', array('controller'\
  \ => 'users', 'action' => 'unfriend'));\nRouter::connect('/users/edit/*', array('controller'\
  \ => 'users', 'action' => 'edit'));\nRouter::connect('/users/delete/*', array('controller'\
  \ => 'users', 'action' => 'delete'));\nRouter::connect('/users/undelete/*', array('controller'\
  \ => 'users', 'action' => 'undelete'));\n```\n\n\n`Router::connect('/fonts/*', array('controller'\
  \ => 'files', 'action' => 'fonts'));`  \n`Router::connect('/thumbnails/*', array('controller'\
  \ => 'files', 'action' => 'thumbnails'));`  \n`Router::connect('/files/delete/*',\
  \ array('controller' => 'files', 'action' => 'delete'));`  \n`Router::connect('/files/undelete/*',\
  \ array('controller' => 'files', 'action' => 'undelete'));`\n\n```php\n/**\n * 加载所有插件路由。关于如何自定义插件路由的加载方式，\n\
  \ * 请参阅 CakePlugin 的文档。\n */\nCakePlugin::routes();\n\n/**\n * 加载 CakePHP 的默认路由。如果你不想使用内置的默认路由，\n\
  \ * 可以移除这部分代码。\n */\nrequire CAKE . 'Config' . DS . 'routes.php';\n```\n\n前两个路由是系统自动为我们定义的。第一个路由将对\
  \ URL `/` 的请求默认映射到`pages/home`操作。第二个路由用于根据 `pages/display` 操作来显示指定的命名页面。\n\n在一些路由中，我们使用了`*`来指定一个参数将被传递给操作。这个参数无需在参数数组中显式回显，而是会自动作为参数传递给操作。\n\
  \n如果你尝试访问这些新路由中的任何一个，将会看到错误信息。这是因为我们尚未创建相应的控制器、操作等。在第 31 章中，我们将创建使这些路由中的大部分能够正常运作所需的控制器、模型和视图。\n\
  \n> **注意** 关于 CakePHP 路由的更多详细信息，请访问  \n> http://book.cakephp.org/2.0/en/development/routing.html。\n\
  \n### 问题\n\n1. CakePHP 路由器允许非常详细的路由规范。我们如何将这类功能添加到我们框架的`Router`类中？\n2. 与使用配置文件相比，使用函数调用为应用程序添加路由有哪些好处？\n\
  \n### 答案\n\n1. 我们的框架有两种不同类型路由：`Simple` 和 `Regex` 路由子类。为了增强我们路由器的功能，我们只需要创建更详细的 `Route`\
  \ 子类，由它们替我们处理额外的功能。\n2. 函数调用可以让你对路由规范进行更精细的控制。我们可以利用函数调用实现各种酷炫的功能（例如传递回调函数或对象实例），而这些是配置文件无法做到的。\n\
