    }


    Note that in all cases, the data is only accessible when _mIsDecrypted is true;
    otherwise, an exception is thrown.


    Also, note that the data isn’t accessible after encryption—the data used to initialize
    a SecureCard object is only accessible in encrypted form. This is more a use-case
    decision than anything else because this class is only really intended for encryption
    and decryption, not for persistently representing credit card details. After a
    SecureCard instance has been used to encrypt card details, we shouldn’t subsequently
    need access to the unencrypted data, only the encrypted string.


    ■**Note** Before moving on to the client code, it is worth explaining and emphasizing
    one important design consideration that you have probably already noticed. At
    no point are any of the card details validated. In fact, this class will work
    perfectly well with empty strings for any properties. This is so the class can
    remain as versatile as possible. It is more likely that credit card details will
    be validated as part of the UI used to enter them, or even not at all. This isn’t
    at all dangerous—if invalid details are used, then the credit card transaction
    will simply fail, and we handle that using very similar logic to that required
    to deal with lack of funds (that is, we notify the customer of failure and ask
    them to try another card). Of course, there are also simple data-formatting issues
    (dates are usually MM/YY for example), but as noted, these can be dealt with externally
    to the SecureCard class.


    The test page (test_cart.php) for this class simply allows you to see how an encrypted
    card looks. As you can see, quite a lot of data is generated, hence the rather
    large column size in the customer database. You can also see that both encryption
    and decryption are working perfectly, so you can now move on to the customer account
    section of this chapter.


    **Adding Customer Accounts Functionality to**


    **HatShop**


    Before implementing the visual bits of the customer accounts functionality, let’s
    preview what we’re going to do in the final part of this chapter.


    First, we want to have a login form on the front of the site. We also want to
    let users register on the site and edit their profiles. You’ll create a componentized
    template for the login form and place it just on top of the departments list,
    as shown in Figure 11-4.


