    **Notifying the User**


    As the code stands now, the user isn’t informed when a change is made. For example,
    when a post is deleted, the user is simply redirected back to the blog manager
    index page and is not told that the post was actually deleted. While this is not
    a huge problem when sending a post live (or changing it back to draft) due to
    the colored box we use to display the status, it is still good practice to inform
    them of the change that was made. It is also important after updating an existing
    post to notify the user that the changes have been saved.


    To achieve this, we are going to display a message to the user after they arrive
    on the


    “next” page (that is, the page we redirect them to after competing the chosen
    action). One thing to be aware of is that the new page needs to know about the
    status message somehow.


    To do this, we will store the message in the user’s session, and then remove it
    from the session once they have viewed it (to prevent it from continually being
    shown).


    Fortunately, Zend_Controller provides us with functionality to achieve this. The
    FlashMessenger action helper class (in no way related to Adobe’s Flash technology)
    allows us to easily do exactly this. It is instantiated automatically by Zend
    Controller when we try to access it.


    The other change we will make to our code is to assign all messages found in the
    flash messenger object to the template. In the template, we will then check whether
    there are any messages, and if so we can output them accordingly.


