  trans: '

    # 使用 JavaScript 处理数据


    当前的 `lab.php` 文件只允许用户输入将被插入数据存储（`XML`、`JSON` 或 `MySQL`）的狗狗信息。需要修改界面，让用户能够指明他们想要完成的操作（`插入`、`更新`或`删除`）。同时，如果操作涉及更新或删除，还需要允许用户选择一只现有的狗狗。这应该能说明，我们需要一个列表框，其中填充了收容所当前所有狗狗的信息。


    我们将在本章后续部分讨论所需的 PHP 修改。现在，我们先假设 `dog_interface`（接口层）将返回这些信息，这些信息是通过 `dog` 方法（业务规则层）从
    `dog_data`（数据层）检索而来的。我们还将假设将创建与 `dog_breeds` 程序（第 4 章）类似的代码，以生成一个狗狗列表框。


    此外，`lab.php` 需要访问所选特定狗狗的所有信息。代码需要将所有信息放入 `dog_name` 和 `dog_weight` 文本框、`dog_breeds`
    列表框以及 `dog_color` 单选按钮中。我们可以通过两种方式完成此任务。一种是允许用户从列表框中选择狗狗，然后重新调用 `dog_interface`
    程序，向 dog 类请求该特定狗狗的信息，dog 类再向 `dog_data` 类请求信息。然而，这需要在互联网上进行一次额外的、不必要的调用来请求信息。相反，我们可以在用户首次调用
    `lab.php` 界面时，收集所有必要的信息（`dog_breed` 列表框信息、`dogs` 列表框信息以及当前数据存储中所有狗狗的完整信息）。我们可以使用当前的
    JavaScript AJAX 代码，只需稍作修改即可检索所有必要信息。


    在填充表单对象（文本框、列表框和单选按钮）之前，我们必须确保用户指明了所请求的操作类型（至少是插入还是更改/删除）。我们可以通过在选择之前不显示表单对象来实现这一点。我们可以对第
    5 章中使用的 JavaScript 代码和 CSS 代码的组合稍作调整，要求用户在表单显示之前先从一个狗狗列表框中进行选择。


    ## 备注


    我们即将审视的过程是 Web 应用程序中非常常见的做法。许多 Web 应用程序以数组、`JSON` 或 `XML` 格式返回数据。然后，接口（在此例中为 `lab.php`）可以使用
    JavaScript 来检索所需的信息。


    *编程说明——购物车使用类似的技术。当客户选择要购买的商品时，这些商品会被放置在客户端机器上的一个数据对象（很可能是一个 `JSON` 对象）中。当客户开始结账流程时，数据会被传输到服务器。这允许客户进行更改，而不会引起对服务器的额外调用。由于购买信息不被视为安全风险，这通常是一个安全的流程。当然，处理信用卡信息时就不适合采用这种方式。*


    使用图 9-1 所示的格式，用户必须先选择 `新建` 或从列表框中选择一只狗狗才能继续。一旦用户做出选择，就可以显示带有默认值（用于插入操作）或所选狗狗当前值的
    HTML 表单。CSS 代码最初会将按钮（和表单）的显示设置为 `"none"`。JavaScript 代码（我们稍后会看到）会在适当的时候将相应按钮和表单的显示更改为
    `"inline"`。


    ![../images/394210_2_En_9_Chapter/394210_2_En_9_Fig1_HTML.jpg](img/394210_2_En_9_Fig1_HTML.jpg)

    '
- fmt: "# Figure 9-1\nThe `lab.php` file with dogs list box\n\nFigure [9-2](#394210_2_En_9_Chapter.xhtml#Fig2)\
    \ demonstrates the results when the user selects NEW. The same defaults are provided\
    \ as shown in previous chapters. The only visual change is the text of the input\
    \ button. The weakness of this approach occurs when the users do not have JavaScript\
    \ enabled. For this example, if JavaScript is not enabled, we will require that\
    \ all information be entered. We could request the individual dog information\
    \ from the `dog_data` class (via the `Dog` class). While this approach is not\
    \ as efficient as the JavaScript approach we are about to use, it is more customer\
    \ friendly than requiring the entry of all the information.\n\n![../images/394210_2_En_9_Chapter/394210_2_En_9_Fig2_HTML.jpg](images/394210_2_En_9_Chapter/394210_2_En_9_Fig2_HTML.jpg)\n\
    \n# Figure 9-2\nThe `lab.php` file with NEW selected\n\nFigure [9-3](#394210_2_En_9_Chapter.xhtml#Fig3)\
    \ displays the results when an existing dog has been selected. The list box displays\
    \ the dog’s name and its breed (to make it as unique as possible). In addition,\
    \ a dog ID could have also been provided to identify the particular dog. When\
    \ the dog is selected, the dog information (`dog_name`, `dog_color`, `dog_weight`,\
    \ and `dog_breed`) is populated into the form. The users then can update or delete\
    \ the dog information.\n\n![../images/394210_2_En_9_Chapter/394210_2_En_9_Fig3_HTML.jpg](images/394210_2_En_9_Chapter/394210_2_En_9_Fig3_HTML.jpg)\n\
    \n# Figure 9-3\nThe `lab.php` file with a dog selected\n\n> **Note**\n>\n> The\
    \ code provided in this example does not restrict duplicate entries. Thus, in\
    \ a live environment, an additional field (dog ID) will need to be used to make\
    \ the dogs unique.\n\nPreviously when an `insert` occurred, the system would display\
    \ a message to indicate the change was successful. The user was then required\
    \ to reload the `lab.php` file if another change was required. We can fix this\
    \ problem by having the `dog_interface` program set a session property with the\
    \ message to be returned. The `dog_interface` can then call the `lab.php` file,\
    \ which in turn can check to see if there is a message to be displayed.\n\n![../images/394210_2_En_9_Chapter/394210_2_En_9_Fig4_HTML.jpg](images/394210_2_En_9_Chapter/394210_2_En_9_Fig4_HTML.jpg)\n\
    \n# Figure 9-4\nThe `lab.php` file handling message from `dog_interface`\n\nWe\
    \ will use a combination of PHP code, JavaScript code, and CSS code to create\
    \ the desired results. Let us break it down.\n\n```\n<?php\necho \"<h3>\";\necho\
    \ \"Login | Create an account\";\necho \"</h3>\";\n}\nelse if(($_SERVER['HTTP_REFERER']\
    \ ==\n'http://127.0.0.1:8080/mysite/bgchapter8/ExampleFile8/e8login.php') || ($_SERVER['HTTP_REFERER']\
    \ ==\n'http://127.0.0.1:8080/mysite/bgchapter8/ExampleFile8/e8lab.php'))\n{\n\
    if (isset($_SESSION['message'])) {\necho $_SESSION['message'];\n}\nelse {\necho\
    \ \"Welcome back, \" . $_SESSION['username'] . \"\";\n}}\n?>\n```\n\nThe PHP code\
    \ at the top of the lab program will now include an additional check to determine\
    \ if a message has been returned. While the `if` part of the statement will not\
    \ require any changes, the `else` part has a few additional changes. Note that\
    \ the new `if` statement checks to see if the lab program has been called by itself.\
    \ The `$_SERVER['HTTP_REFERER']` method returns `lab.php` as the calling program\
    \ when `dog_interface` uses the `header` method to recall `lab.php`. In addition,\
    \ the same `if` statement also checks to see if `login.php` has called `lab`.\
    \ These are now the only two legitimate calls that can be made to the `lab.php`\
    \ program. Another `if` statement in the `else` block checks to see if a `$_SESSION['message']`\
    \ has been returned by using the `isset` method. If it has been returned, then\
    \ `lab.php` was called by `dog_interface`, because login does not return a `$_SESSION['message']`.\
    \ The lab program now displays the message. If there is no `$_SESSION['message']`,\
    \ the welcome message is displayed.\n\nLet us now jump to the HTML code in `lab.php`.\
    \ Then we will take a look at the CSS and JavaScript code.\n\n```\n<h1>ABC Canine\
    \ Shelter Reservation System</h1>\n\n<script>\nAjaxRequest('e8dog_interface.php');\n\
    </script>\n\nPick the dog name and breed to change from the dropdown box, then\
    \ click the button.For new dog information select 'NEW'.\nSelect 'NEW' or Dog's\
    \ Name/Breed\n\nPlease note the required format of information.\n\nEnter Your\
    \ Dog's Name (max 20 characters, alphabetic) \nSelect Your Dog's Color:\nBrown\n\
    Black\nYellow\nWhite\nMixed\nEnter Your Dog's Weight (numeric only)\n\nSelect\
    \ Your Dog's Breed\n\n```\n\nIn addition to some minor display message changes,\
    \ a new `div` tag with an ID of `AjaxReturnValue` has been created to hold the\
    \ dogs list box (which will provide the user a selection of dogs to choose). An\
    \ HTML button (not a Submit button) follows. When clicked, it will cause a JavaScript\
    \ function (`process_select`) to execute. Another `div` tag has been added which\
    \ contains the HTML form. This form is to be hidden until the user clicks the\
    \ button. CSS code (`#input_form { display:none; }`) is included at the top of\
    \ the program to keep the form from displaying. Additional CSS code also keeps\
    \ the buttons from displaying. At the bottom of the form, a hidden property (`index`)\
    \ has been created to hold the index (from the dogs array) of the dog selected.\
    \ The initial value is set to `-1`. This property will be changed when the user\
    \ selects a dog. The original Submit button is replaced by three Submit buttons\
    \ (one for insert, one for delete, and one for update). Whichever button is clicked\
    \ will cause a property to be created (`insert`, `delete`, or `update`) and set\
    \ to a value. The property name is the ID of the button, and the contents in the\
    \ property are the contents of the `value` attribute of the button selected. This\
    \ will help `dog_interface` determine which type of changes the user is requesting.\
    \ These buttons are also included on the non-JavaScript-enabled form. Remember,\
    \ in this example, non-JavaScript-enabled browsers will require users to enter\
    \ all information needed to successfully accomplish an `insert`, `delete`, or\
    \ `update`. Hopefully, the changes we just looked at are pretty understandable.\n\
    \nWe are now going to look at some JavaScript code to handle this data. As mentioned,\
    \ the manipulation of data by JavaScript is a common task in web applications.\
    \ While this is not a JavaScript book, it is important that any web applications\
    \ developer be familiar with JavaScript. I think you will see that the structure\
    \ of the JavaScript language is similar to the structure of the PHP language.\n\
    \nFirst, we will look at the changes to the `get_breeds.js` file (from Chapter\
    \ [5](#394210_2_En_5_Chapter.xhtml)). The file is renamed to `getlists.js` to\
    \ reflect that it will now handle the `getBreeds` and `dogs` list boxes.\n\n```\n\
    function HandleResponse(response)\n{\nvar responsevalues = response.split('|');\n\
    document.getElementById('AjaxResponse').innerHTML = responsevalues[0];\ndocument.getElementById('AjaxReturnValue').innerHTML\
    \ = responsevalues[1];\nobj = JSON.parse(responsevalues[2]);\n}\n```\n\nAll the\
    \ code changes are in the `HandleResponse` method of the JavaScript file. Previously,\
    \ the values in the response property (passed to the method) were directly passed\
    \ into the `div` tag with the `AjaxResponse` ID. At that point, only the list\
    \ box code for the breeds was returned. Now the method will accept three types\
    \ of information (the breeds list box, the dogs list box, and the dogs array).\
    \ To reduce the number of calls to the web server, one AJAX call is made. It returns\
    \ all the information into the `response` property. The information will be separated\
    \ by using the pipeline (`|`) symbol. Soon we will see that the formation of this\
    \ string will occur in the `dog_interface` program."
