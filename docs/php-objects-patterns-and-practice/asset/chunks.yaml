    \ Archer());\n$main_army->addUnit(new LaserCanonUnit());\n$main_army->addUnit(new\
    \ Cavalry());\n$textdump = new TextDumpArmyVisitor();\n$main_army->accept($textdump);\n\
    print $textdump->getText();\n```\n\n这段代码产生如下输出：\n\n```\nTax levied for popp\\\
    ch11\\batch08\\Army: 1\nTax levied for popp\\ch11\\batch08\\Archer: 2\nTax levied\
    \ for popp\\ch11\\batch08\\LaserCanonUnit: 1\nTax levied for popp\\ch11\\batch08\\\
    Cavalry: 3\nTOTAL: 7\n```\n\n我创建了一个`Army`对象。由于`Army`是组合体，它拥有`addUnit()`方法，我用它来添加更多`Unit`对象。接着我创建了`TextDumpArmyVisitor`对象，并将其传递给`Army::accept()`。`accept()`方法构造了一个方法调用，并调用`TextDumpArmyVisitor::visitArmy()`。在本例中，我没有对`Army`对象做特殊处理，因此调用被传递给了通用的`visit()`方法。`visit()`方法接收到了`Army`对象的引用。它调用其方法（包括新增的`getDepth()`，该方法告诉任何需要了解的对象当前单元在对象层级中的深度），以生成摘要数据。`visitArmy()`调用完成后，`Army::accept()`操作会依次对其子对象调用`accept()`，并将访问者传递下去。这样，`ArmyVisitor`类就访问了树中的所有对象。\n\
    \n仅通过添加几个方法，我就创建了一种机制，可以在不破坏组合类接口、也不需要大量重复遍历代码的情况下，将新功能插入其中。\n\n在游戏中的某些格子上，军队需要缴纳税款。税务官会访问军队，对找到的每个单位征收费用。不同类型的单位税率不同。这正是利用访问者类中专用方法的好时机：\n\
    \n```php\n// listing 11.44\nclass TaxCollectionVisitor extends ArmyVisitor\n{\n\
    \    private $due = 0;\n    private $report = \"\";\n    public function visit(Unit\
    \ $node)\n    {\n        $this->levy($node, 1);\n    }\n    public function visitArcher(Archer\
    \ $node)\n    {\n        $this->levy($node, 2);\n    }\n    public function visitCavalry(Cavalry\
    \ $node)\n    {\n        $this->levy($node, 3);\n    }\n    public function visitTroopCarrierUnit(TroopCarrierUnit\
    \ $node)\n    {\n        $this->levy($node, 5);\n    }\n    private function levy(Unit\
    \ $unit, int $amount)\n    {\n        $this->report .= \"Tax levied for \" . get_class($unit);\n\
    \        $this->report .= \": $amount\\n\";\n        $this->due += $amount;\n\
    \    }\n    public function getReport()\n    {\n        return $this->report;\n\
    \    }\n    public function getTax()\n    {\n        return $this->due;\n    }\n\
    }\n```\n\n在这个简单的例子中，我没有直接使用传递给各个访问方法的`Unit`对象。不过，我确实利用了这些方法的专有特性，根据发起调用的`Unit`对象的具体类型来征收不同的费用。\n\
    \n以下是一些客户端代码：\n\n```php\n// listing 11.45\n$main_army = new Army();\n$main_army->addUnit(new\
    \ Archer());\n$main_army->addUnit(new LaserCanonUnit());\n$main_army->addUnit(new\
    \ Cavalry());\n$taxcollector = new TaxCollectionVisitor();\n$main_army->accept($taxcollector);\n\
    print $taxcollector->getReport();\nprint \"TOTAL: \";\nprint $taxcollector->getTax()\
    \ . \"\\n\";\n```\n\n和之前一样，`TaxCollectionVisitor`对象被传递给`Army`对象的`accept()`方法。同样地，`Army`在对其子对象调用`accept()`之前，会先将自身的引用传递给`visitArmy()`方法。各个组件对访问者执行的操作毫不知情。它们只是配合其公共接口，每个组件都尽职尽责地根据自身类型调用对应的方法。\n\
    \n除了`ArmyVisitor`类中定义的方法外，`TaxCollectionVisitor`还提供了两个汇总方法：`getReport()`和`getTax()`。调用它们将获得你期望的数据：\n\
    \n```\nTax levied for popp\\ch11\\batch08\\Army: 1\nTax levied for popp\\ch11\\\
    batch08\\Archer: 2\nTax levied for popp\\ch11\\batch08\\LaserCanonUnit: 1\nTax\
    \ levied for popp\\ch11\\batch08\\Cavalry: 3\nTOTAL: 7\n```\n\n图 11-7 展示了本例中的参与者。\n\
    \n![A314621_5_En_11_Fig7_HTML.gif](img/A314621_5_En_11_Fig7_HTML.gif)\n\n**图 11-7.**\
    \ 访问者模式\n\n### 访问者模式的问题\n\n访问者模式是另一种兼具简洁与强大的模式。然而，在部署此模式时，仍需注意几点。\n\n首先，尽管访问者模式非常适合组合模式，但它实际上可以用于任何对象集合。例如，你可以将其用于一个列表，其中每个对象都存储着对其兄弟对象的引用。\n\
    \n通过将操作外部化，你可能会冒着破坏封装性的风险。也就是说，为了让访问者能够对访问对象执行有用的操作，你可能需要暴露这些对象的内部细节。例如，你会在第一个访问者示例中看到，为了向`TextDumpArmyVisitor`对象提供信息，我被迫在`Unit`接口中添加了一个额外的方法。之前在观察者模式中，你也曾遇到过这个困境。\n\
    \n由于迭代操作与访问者对象执行的操作是分离的，因此你必须放弃一定程度的控制。例如，你很难创建一个在子节点迭代前后都执行某些操作的`visit()`方法。一个解决方法是把迭代的责任移交给访问者对象。但这样做的麻烦在于，你最终可能会在不同的访问者之间重复实现遍历代码。\n\
    \n默认情况下，我倾向于将遍历逻辑保留在被访问的类内部，但将其外部化也能为你带来一个明显的优势：你可以根据不同的访问者，以不同的方式遍历被访问的类。\n\n\
    ## 命令模式\n\n近年来，我完成的 Web 项目几乎都会用到这个模式。命令对象最初是在图形用户界面设计的背景下提出的，但它同样适用于良好的企业应用设计，有助于分离控制器（请求和调度处理）与领域模型（应用逻辑）层级。简单来说，命令模式让系统组织得更好，也更容易扩展。\n\
    \n### 问题\n\n所有系统都必须决定如何响应用户的请求。在 PHP 中，这种决策过程通常由分散的接触点页面来处理。通过选择一个页面（例如`feedback.php`），用户清楚地表明了她所需的功能和界面。越来越多的\
    \ PHP 开发者倾向于采用单点接触的方法（我将在下一章讨论）。然而，无论是哪种情况，请求的接收者都必须将任务委托给更关注应用逻辑的层级。当用户可以向不同页面发出请求时，这种委托尤为重要。否则，项目中难免会出现重复代码。\n\
    \n那么，假设你的项目有一系列任务需要执行。特别是，系统必须允许某些用户登录，另一些用户提交反馈。你可以创建`login.php`和`feedback.php`页面来处理这些任务，实例化专门的类来完成工作。不幸的是，系统中的用户界面很少能与系统设计要完成的任务完美对应。例如，你可能需要在每个页面上都提供登录和反馈功能。如果页面必须处理许多不同的任务，那么你应该考虑将任务封装起来。这样做可以让你轻松地向系统添加新任务，并在系统的各层之间建立起一道边界。这就引出了命令模式。\n"
- fmt: '### Implementation


    The interface for a command object could not get much simpler. It requires a single
    method: `execute()`.


    In Figure [11-8](#A314621_5_En_11_Chapter.html#Fig8), I have represented `Command`
    as an abstract class. At this level of simplicity, it could be defined instead
    as an interface. I tend to use abstracts for this purpose because I often find
    that the base class can also provide useful common functionality for its derived
    objects.


    ![A314621_5_En_11_Fig8_HTML.gif](A314621_5_En_11_Fig8_HTML.gif)


    Figure 11-8. The Command class


    There are up to three other participants in the Command pattern: the client, which
    instantiates the command object; the invoker, which deploys the object; and the
    receiver on which the command operates.


    The receiver can be given to the command in its constructor by the client, or
    it can be acquired from a factory object of some kind. I like the latter approach,
    keeping the constructor method clear of arguments. All `Command` objects can then
    be instantiated in exactly the same way.


    Here’s the abstract base class:


    ```

    // listing 11.46

    abstract class Command

    {

    abstract public function execute(CommandContext $context): bool;

    }

    ```


    And here’s a concrete `Command` class:


    ```

    // listing 11.47

    class LoginCommand extends Command

    {

    public function execute(CommandContext $context): bool

    {

    $manager = Registry::getAccessManager();

    $user = $context->get(''username'');

    $pass = $context->get(''pass'');

    $user_obj = $manager->login($user, $pass);

    if (is_null($user_obj)) {

    $context->setError($manager->getError());

    return false;

    }

    $context->addParam("user", $user_obj);

    return true;

    }

    }

    ```


    The `LoginCommand` is designed to work with an `AccessManager` object. `AccessManager`
    is an imaginary class that handles the nuts-and-bolts of logging users into the
    system. Notice that the `Command::execute()` method demands a `CommandContext`
    object — this is known as `RequestHelper` in Core J2EE Patterns: Best Practices
    and Design Strategies (Prentice Hall, 2001) by Alur et al. This is a mechanism
    by which request data can be passed to `Command` objects, and by which responses
    can be channeled back to the view layer. Using an object in this way is useful
    because I can pass different parameters to commands without breaking the interface.
    The `CommandContext` is essentially an object wrapper around an associative array
    variable, though it is frequently extended to perform additional helpful tasks.
    Here is a simple `CommandContext` implementation:


    ```

    // listing 11.48

    class CommandContext

    {

    private $params = [];

    private $error = "";

    public function __construct()

    {

    $this->params = $_REQUEST;

    }

    public function addParam(string $key, $val)

    {

    $this->params[$key] = $val;

    }

    public function get(string $key): string

    {

    if (isset($this->params[$key])) {

    return $this->params[$key];

    }

    return null;

    }

    public function setError($error): string

    {

    $this->error = $error;

    }

    public function getError(): string

    {

    return $this->error;

    }

    }

    ```


    So, armed with a `CommandContext` object, the `LoginCommand` can access request
    data: the submitted username and password. I use `Registry`, a simple class with
    static methods for generating common objects, to return the `AccessManager` object
    with which `LoginCommand` needs to work. If `AccessManager` reports an error,
    the command lodges the error message with the `CommandContext` object for use
    by the presentation layer, and returns `false`. If all is well, `LoginCommand`
    simply returns `true`. Note that `Command` objects do not themselves perform much
    logic. They check input, handle error conditions, and cache data, as well as calling
    on other objects to perform operations. If you find that application logic creeps
    into your command classes, it is often a sign that you should consider refactoring.
    Such code invites duplication, as it is inevitably copied and pasted between commands.
    You should at least look at where such functionality belongs. It may be best moved
    down into your business objects, or possibly into a Facade layer. In my example,
    I am still missing the client, the class that generates command objects, and the
    invoker, the class that works with the generated command. The easiest way of selecting
    which command to instantiate in a web project is by using a parameter in the request
    itself. Here is a simplified client:


    ```

    // listing 11.49

    class CommandFactory

    {

    private static $dir = ''commands'';

    public static function getCommand(string $action = ''Default''): Command

    {

    if (preg_match(''/\W/'', $action)) {

    throw new Exception("illegal characters in action");

    }

    $class = __NAMESPACE__ . "\\commands\\" . UCFirst(strtolower($action)) . "Command";

    if (! class_exists($class)) {

    throw new CommandNotFoundException("no ''$class'' class located");

    }

    $cmd = new $class();

    return $cmd;

    }

    }

    ```


    The `CommandFactory` class simply looks for a particular class. A fully qualified
    class name is constructed using the `CommandFactory` class’s own namespace, the
    string `''\commands\''`, and the `CommandContext` object’s `$action` parameter.
    The last item should have been passed to the system from the request. Thanks to
    Composer’s autoload magic, we don’t need to worry about explicitly requiring a
    class. If the class exists, then an object is instantiated and returned to the
    caller. I could add more error checking here, ensuring that the found class belongs
    to the `Command` family, and that the constructor expects no arguments; however,
    this version will do fine for my purposes. The strength of this approach is that
    you can create a discoverable `Command` object with the correct namespace at any
    time, and the system will immediately support it.


    The invoker is now simplicity itself:


    ```

    // listing 11.50

    class Controller

    {

    private $context;

    public function __construct()

    {

    $this->context = new CommandContext();

    }

    public function getContext(): CommandContext

    {

    return $this->context;

    }

    public function process()

    {

    $action = $this->context->get(''action'');

    $action = ( is_null($action) ) ? "default" : $action;

    $cmd = CommandFactory::getCommand($action);

    if (! $cmd->execute($this->context)) {

    // handle failure

    } else {

    // success

    // dispatch view

    }

    }

    }

    ```


    Here is some code to invoke the class:


    ```

    // listing 11.51

    $controller = new Controller();

    $context = $controller->getContext();

    $context->addParam(''action'', ''login'' );

    $context->addParam(''username'', ''bob'' );

    $context->addParam(''pass'', ''tiddles'' );

    $controller->process();

    print $context->getError();

    ```'
