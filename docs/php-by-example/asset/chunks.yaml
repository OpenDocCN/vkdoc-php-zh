    The program creates two multidimensional arrays and displays their contents in
    different modes. The first array is created with the `$A=[[1,2,3,4,5],["A","B","C"],[6,7,8,9]]`
    command. That is an array consisting of three elements: the element `$A[0]` is
    the `[1,2,3,4,5]` array, the element `$A[1]` is the `"A","B","C"]` array, and
    the element `$A[2]` is the `[6,7,8,9]` array. If you specify the second index,
    you get access to an element of the internal array. For example, the `$A[0][1]`
    expression refers to the element with the `1` index in the array, which is the
    element with the `0` index in the `$A` array (the element value is `2`). The `$A[1][2]`
    instruction refers to the element with the `2` index in the array, which is the
    element with index `1` in the `$A` array (the value of the element is `"C"`).


    You did not specify indexes for array elements, so they are determined automatically.
    You can use that fact and enumerate the array elements employing indexes. You
    do that in the nested `for` loop statements. In the outer statement, the loop
    variable `$i` runs from `0` to `count($A)` (the count of elements in the `$A`)
    array minus one. In the inner loop statement, the loop variable `$j` runs from
