    Problem


    The primary direction of content in a web environment is for a client (browser)
    to send a request to a server and retrieve the response in the form of a HTML
    document that then is rendered by the browser. The rendering process might send
    additional requests to the server or other servers to get additional content as
    identified by links in the original document. In this scenario the majority of
    the bites transferred are from the server to the client.


    If you are building an application that requires the users to upload a picture
    or avatar, or you want to build a document library that holds files of many different
    kinds for other users to download you need a way to push files from the client
    to the server.


    Using an FTP or SFTP server can solve this but they usually don’t give you what
    you really need. These servers are simply a gateway to a preconfigured location
    on the file system where the user can create folders and upload files but the
    server does nothing to the files and there is usually no PHP integration. You
    could create a web-based API that would be called by the uploading application
    when the upload to the SFTP


    server is complete but that adds an extra layer of complexity and the user would
    not be able to perform the actions from a browser alsone.


    Solution


    Most modern browsers support multipart/form-data for the POST request and they
    allow you to include an input field of type file. This will instruct the browser
    to read one or more files off the local file system and send them to the server
    with the rest of the POST request. Only files selected by the user can be uploaded.


    If the target for the POST request is a PHP script the data will be available
    in the superglobals $_POST and $_FILES for processing by the script. The files
    will temporarily be stored in a folder specified by upload_dir in php.ini and
    they will be removed from that directory when the PHP request ends. It is up to
    the script to copy or move the file to its final destination.'
  trans: "\n# 食谱 7-12\\. 文件迭代器\n\n## 问题\n\n当要对多个文件执行相同操作时，我们需要一种方法来确定目录中存储了哪些文件，并且需要能够递归遍历目录结构。\n\
    \n## 解决方案\n\n遍历目录中所有文件的简单方法是使用 `glob()` 函数创建一个包含所有匹配特定文件模式的文件的数组，然后使用 `foreach()`\
    \ 或其他循环方法逐个处理这些文件。`glob()` 函数仅在单个目录中查找。要获取子目录中的文件，必须为每个子目录调用 `glob()` 函数。\n\n\
    第二种选择是使用 `opendir()`、`readdir()` 和 `closedir()` 函数，或者使用更面向对象的方法 `dir()`，它会返回内置类\
    \ `Directory` 的一个实例。自 PHP 5.0 起，这些函数已支持 `ftp://` URL 封装器。\n\n另一种选择是使用 SPL 扩展中包含的迭代器类。SPL\
    \ 代表标准 PHP 库，它是一个默认启用的扩展。迭代器类可以直接与 `foreach()` 一起使用，无需在迭代文件之前将文件系统的内容读入内存。\n\n\
    ## 工作原理\n\n接下来的三个示例展示了如何使用上述方法获取目录的内容。\n\n这些脚本将使用脚本所在的同一目录，并打印每个文件的名称，如果是目录则在名称后添加斜杠。\n\
    \n```php\n<?php\n// 7_26.php\n$pattern = \"*\";\n$files = glob($pattern);\nforeach\
    \ ($files as $file) {\n    echo $file;\n    if (is_dir($file)) {\n        echo\
    \ \"/\";\n    }\n    echo \"\\n\";\n}\n```\n\n这种获取目录中文件名的方法适用于文件数量较少且路径较短的情况。如果处理的目录路径很长或包含大量文件，可能会消耗过多内存。\n\
    \n```php\n<?php\n// 7_27.php\n$dir = dir(\".\");\nwhile (($file = $dir->read())\
    \ !== false) {\n    echo $file;\n    if (is_dir($file)) {\n        echo \"/\"\
    ;\n    }\n    echo \"\\n\";\n}\n$dir->close();\n```\n\n在这个示例中，我们任意时刻在内存中只保留目录中的一个元素。另一个区别是，此方法包含\
    \ `'./'` 和 `'../'` 条目。当使用 `glob()` 函数时，这些条目会被自动排除。\n\n若要使用 SPL DirectoryIterator\
    \ 实现类似功能，代码可能如下所示：\n\n```php\n<?php\n// 7_28.php\nforeach (new DirectoryIterator('.')\
    \ as $fileInfo) {\n    if ($fileInfo->isDot()) continue;\n    echo $fileInfo->getFilename();\n\
    \    if ($fileInfo->isDir()) {\n        echo \"/\";\n    }\n    echo \"\\n\";\n\
    }\n```\n\n使用 SPL DirectoryIterator 的一个优点是，尽管行为略有不同，但很容易实现递归。\n\n```php\n<?php\n\
    // 7_29.php\n$iterator = new RecursiveDirectoryIterator('.',\n    FilesystemIterator::CURRENT_AS_FILEINFO);\n\
    foreach (new RecursiveIteratorIterator($iterator) as $fileInfo) {\n    if ($fileInfo->isDot())\
    \ continue;\n    echo $fileInfo->getPathname();\n    if ($fileInfo->isDir()) {\n\
    \        echo \"/\";\n    }\n    echo \"\\n\";\n}\n```\n\n# 食谱 7-13\\. 下载文件\n\n\
    ## 问题\n\nWeb 服务器向浏览器输出的标准内容是某种包含 HTML、JavaScript、CSS 或 JSON 内容的文本文件。Web 服务器也可以返回浏览器支持渲染的其他类型的文件（如图像和视频文件）。但如果文件用于浏览器渲染以外的其他用途，我们需要一种方法来下载内容并将其保存到磁盘，或者让不同类型的客户端来消费它。\n\
    \n## 解决方案\n\n标准的 Web 服务器配置会根据文件扩展名识别文件的 MIME 类型。如果文件位于 Web 服务器可用于提供文件的目录结构中，大多数情况下你可以直接链接到该文件，浏览器会识别出它不知道如何处理该文件，并将其保存到磁盘。\n\
    \n如果文件位于可用目录结构之外，或者需要根据输入参数组装文件，你可以使用 PHP 读取或生成文件，并使用 `header()` 函数指定 `Content-Type`\
    \ 和 `Content-Disposition`，以帮助浏览器按照你的意图处理文件。如果你想下载包含 HTML 或图像的文件，并阻止浏览器显示该文件，这也很有用。这将导致浏览器显示保存文件对话框，而不是直接在浏览器中显示内容。\n\
    \n## 工作原理\n\n如果你的文档中有一个链接指向某张图片，你可以创建如下所示的 HTML：\n\n```html\n<a href=\"myfile.gif\"\
    ><img src=\"myfile.gif\" /></a>\n```\n\n这会显示一张图片并创建一个指向同一文件的链接，因此当用户点击该图片时，浏览器只会将该图片作为浏览器中的唯一内容显示。\n\
    \n如果将该 HTML 修改为如下所示：\n\n```html\n<a href=\"myfile.php\"><img src=\"myfile.gif\"\
    \ /></a>\n```\n\n你将需要编写一个 PHP 脚本来处理渲染并设置头部信息。该脚本可能如下所示：\n\n```php\n<?php\n// 7_30.php\n\
    header(\"Content-Type: image/gif; Content-Disposition: attachment;\");\nreadfile('myfile.gif');\n\
    ```\n\n这将告诉浏览器响应的内容是一个 gif 类型的图像，并指示浏览器打开保存对话框而不是显示文件。你可以添加更复杂的逻辑来处理访问控制、即时生成图像或允许下载任何文件。请务必添加验证检查，以确保文件可以被下载。否则，你可能会让用户下载你的\
    \ PHP 脚本或密码文件。\n\n# 食谱 7-14\\. 上传文件\n\n## 问题\n\n在 Web 环境中，内容的主要流向是客户端（浏览器）向服务器发送请求，并获取以\
    \ HTML 文档形式返回的响应，然后由浏览器渲染。渲染过程可能会向原始服务器或其他服务器发送额外的请求，以获取原始文档中链接标识的其他内容。在这种场景下，传输的大部分字节是从服务器到客户端。\n\
    \n如果你正在构建一个需要用户上传图片或头像的应用程序，或者你想构建一个文档库，其中包含多种类型的文件供其他用户下载，那么你需要一种将文件从客户端推送到服务器的方法。\n\
    \n使用 FTP 或 SFTP 服务器可以解决这个问题，但它们通常无法提供你真正需要的东西。这些服务器只是通向文件系统上预配置位置的网关，用户可以在那里创建文件夹并上传文件，但服务器不对文件进行任何处理，并且通常没有\
    \ PHP 集成。你可以创建一个基于 Web 的 API，当上传到 SFTP 服务器完成时由上传应用程序调用，但这会增加额外的复杂性，并且用户无法仅通过浏览器执行这些操作。\n\
    \n## 解决方案\n\n大多数现代浏览器都支持 `multipart/form-data` 编码类型的 `POST` 请求，并允许你包含一个类型为 `file`\
    \ 的输入字段。这将指示浏览器从本地文件系统中读取一个或多个文件，并将其与 `POST` 请求的其余部分一起发送到服务器。只有用户选择的文件才能被上传。\n\
    \n如果 `POST` 请求的目标是一个 PHP 脚本，数据将在超全局变量 `$_POST` 和 `$_FILES` 中提供，供脚本处理。这些文件将被临时存储在\
    \ `php.ini` 中 `upload_dir` 指定的文件夹中，并在 PHP 请求结束时从该目录中删除。由脚本负责将文件复制或移动到其最终位置。\n"
- fmt: "The most modern browsers also support a JavaScript-based API for Form Data\
    \ that will allow the user to use drag and drop of files from the local file system\
    \ to a specific location in the browser window. This will trigger a JavaScript\
    \ function that can read the file from the file system and create the post request.\
    \ With this model it’s possible to get accurate progress status without a separate\
    \ process sending requests to the server every 500mS. The upload process does\
    \ not have to be associated with a HTML form. This can be used to allow users\
    \ easy access to upload a new profile image with a single drag and drop.\n\n##\
    \ How it Works\n\nThe basic file upload has two components. The first is a HTML\
    \ form with the attribute `enctype` set to `multipart/form-data`. The default\
    \ is `application/x-www-form-urlencoded` and will cause the data to be encoded\
    \ the same way as URL or query string parameters. The HTML form needs at least\
    \ one input field of type file and could look something like this:\n\n```\n<html>\n\
    <body>\n<form method=\"POST\" enctype=\"multipart/form-data\" action=\"/upload.php\"\
    >\n<input type=\"file\" name=\"file\" />\n<button type=\"submit\">Upload</button>\n\
    </form>\n</body>\n</html>\n```\n\nThis will create a form that will allow the\
    \ user to select a file from the local file system and click the submit button\
    \ to send the file to the server. On the server there should be a PHP script to\
    \ receive the file. In this case called `upload.php`. In the example below the\
    \ PHP script simply displays the content of the `$_FILES` variable after the upload.\n\
    \n```\n<?php\n// upload.php\nheader(\"Content-Type: text/plain\");\nprint_r($_FILES);\n\
    ```\n\nAnd the output of this script shows information that looks like this:\n\
    \n```\nArray (\n    [file] => Array\n        (\n            [name] => myfile.gz\n\
    \            [type] => application/x-gzip\n            [tmp_name] => /tmp/php1zqVJF\n\
    \            [error] => 0\n            [size] => 23435\n        )\n)\n```\n\n\
    This array provides meta data and a location for the temporary file that can be\
    \ used for further processing. The file located in `/tmp/php1zqVJF` will be deleted\
    \ automatically when the script ends and it can be copied/moved to the desired\
    \ location is the function `move_uploaded_file()`. This function takes two parameters.\
    \ The first is the path to the temporary file and the second is the path to the\
    \ new location. It is also a good idea to call `is_uploaded_file()` before moving\
    \ the file.\n\n## Recipe 7-15\\. Zipped Files\n\n### Problem\n\nAlthough the upload\
    \ system can be used to select and upload multiple files to a web server it’s\
    \ only possible to download one file per request. If a user wants to download\
    \ all the images in a gallery it can be a slow process to click on the links for\
    \ each image and select where to save the file. It would be great if there were\
    \ a way for the server to receive a single file for upload or to create a single\
    \ file that contains multiple files for download.\n\n### Solution\n\nThe `ZipArchive()`\
    \ class can be used to assemble or disassemble zip files on the server.\n\n###\
    \ How it Works\n\nA simple function to take all files in a directory on the server,\
    \ zip them to a single file and send the content as a response could look like\
    \ this:\n\n```\n<?php\n// 7_31.php\n\nini_set(\"zlib.output_compression\", \"\
    Off\");\n\n$files = glob('.');\n\nif (!empty($files)) {\n    $zip = new ZipArchive();\n\
    \    $tmp_name = tempnam(\"/tmp\", \"zipfile\");\n    $res = $zip->open($tmp_name\
    \ . \".zip\", ZipArchive::CREATE);\n    if ($res === true) {\n        foreach($files\
    \ as $file) {\n            if (is_file($file) || is_link($file)) {\n         \
    \       $zip->addFile($file);\n            }\n        }\n        $zip->close();\n\
    \        if (file_exists($tmp_name . \".zip\")) {\n            $file_name = 'archive.zip';\n\
    \            $file_size = filesize($tmp_name . \".zip\");\n            header('Content-Type:\
    \ application/octet-stream; Content-Disposition: attachment');\n            readfile($tmp_name\
    \ . \".zip\");\n            unlink($tmp_name . \".zip\");\n            unlink($tmp_name);\n\
    \        }\n    }\n}\n```\n\nFirst the output compression is turned off. Having\
    \ this on can cause problems with the downloaded file and it's a zip file so it's\
    \ already compressed.\n\nThen we generate a list of files from the current directory.\
    \ If there are files in the array the temporary archive is created in the `/tmp`\
    \ folder. The zip file can easily be too large to handle in memory so it will\
    \ be created on disk. If the creation is successful the files are added one by\
    \ one, and finally if the zip file still exists we set the headers for downloading\
    \ the file and send the file to the client. Any temporary files are removed at\
    \ the end of the script.\n\nInstead of uploading many individual files it might\
    \ be faster, and fewer clicks in the browser, to zip the files locally, upload\
    \ a single file, and unzip the files on the server so individual files can be\
    \ accessed. The script to perform the unzip function could look something like\
    \ the next example. The script should be called from a form POST request with\
    \ at least one input field of type file, with the name `file`.\n\n```\n<?php\n\
    // 7_32.php\n\n// This script is expecting a POST request from a form with at\n\
    // least one input\n// <input type=\"file\" name=\"file\" />\n\n// This will generate\
    \ the following values in the $_FILES superglobal\n// $_FILES['file']['error']\n\
    // $_FILES['file']['name']\n// $_FILES['file']['tmp_name']\n// $_FILES['file']['type']\n\
    // $_FILES['file']['size']\n\n// Get the file extension from a file name\nfunction\
    \ GetExtension($file_name) {\n    $arrParts = explode(\".\", $file_name);\n  \
    \  if (sizeof($arrParts) > 1) {\n        return strtolower(end($arrParts));\n\
    \    }\n    else {\n        return null;\n    }\n}\n\n$res = false;\n$ext = GetExtension($_FILES['file']['name']);\n\
    if ($ext == \"zip\") {\n    $zip = new ZipArchive();\n    $res = $zip->open($_FILES['file']['tmp_name']);\n\
    }\n\nif ($res === true) {\n    $zip->extractTo('folder');\n    $zip->close();\n\
    }\n```\n\n# CHAPTER 8\n\n# Dynamic Imaging\n\nImages uploaded to a web site might\
    \ not always be usable as is. Images that come directly from a smart phone or\
    \ high-resolution digital camera might have resolution/size that is too high to\
    \ use on a web site. If the image is to be used as a profile image or thumbnail\
    \ it might be a good idea to scale it down or crop a section out in order to get\
    \ rid of irrelevant areas of the image. Scaling and cropping can be done with\
    \ CSS, but that still requires the full image to be downloaded to the client and\
    \ that would be a waste of bandwidth.\n\nUsing the GD extension in PHP makes it\
    \ possible to perform these and many other image manipulation tasks on the server.\
    \ This chapter will demonstrate how to perform these and many other tasks. The\
    \ function names used in the examples are written in so-called camel case where\
    \ the first letter of each word is capitalized. This is done for readability.\
    \ All internal functions in PHP are case insensitive and can be written in any\
    \ way you like, as long as all the letters are in the right order.\n\n## Recipe\
    \ 8-1\\. Creating Images\n\n### Problem\n\nBrowsers can render a number of different\
    \ image formats. These are all binary encodings of pixels and colors with or without\
    \ compression. The most common are GIF, JPEG, and PNG. Although it would be possible\
    \ to build images as a string of bytes according to the specifications of each\
    \ file format, that is not practical and would most likely lead to performance\
    \ problems.\n\n### Solution\n\nThe GD extension for PHP is a wrapper around a\
    \ library called `libgd` as well as a number of other libraries to handle and\
    \ create various image formats and compression. The `libgd` is bundled with PHP\
    \ source code so it is relatively easy to enable the extension. The GD extension\
    \ is also available in most distributions of Linux and it comes as a standard\
    \ dll with the Windows version of PHP.\n\nThere are a couple of functions in the\
    \ GD extensions to create images. This can be done by copying an image that exists\
    \ in the file system with the functions `ImageCreateFromJpeg()`, `ImageCreateFromGif()`,\
    \ `ImageCreateFromPng()`. PHP also supports the formats GD and GD2. These are\
    \ not supported in browsers but can be used as the base format for creating images\
    \ of other types."
