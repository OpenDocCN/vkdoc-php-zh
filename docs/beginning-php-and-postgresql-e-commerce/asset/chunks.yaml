    \    extension=php_pdo_pgsql.dll\n    extension=php_soap.dll\n    ```\n\n5.  同样在\
    \ `php.ini` 中找到以下行：\n\n    ```\n    extension_dir = \"./\"\n    ```\n\n    并将其改为：\n\
    \n    ```\n    extension_dir = \"C:\\PHP\\ext\"\n    ```\n\n6.  将 `libmhash.dll`、`libeay32.dll`、`ssleay32.dll`\
    \ 和 `libmcrypt.dll` 从你的 PHP 文件夹复制到 Windows 的 `System32` 文件夹。\n\n7.  使用任意文本编辑器（甚至记事本）打开\
