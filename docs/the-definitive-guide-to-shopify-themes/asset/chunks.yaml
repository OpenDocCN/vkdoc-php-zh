- fmt: '### Adding a Hero Image Section


    If you recall, you first encountered sections back in Chapter [4](#A437216_1_En_4_Chapter.html)
    when designing and implementing the header and footer elements of your page layout.
    The dynamic sections we’re going to be building for the home page are implemented
    in exactly the same way—the only difference being these new sections will be selected
    and inserted by a storeowner in the Shopify admin, rather than included explicitly
    through the use of a `{% section %}` Liquid tag elsewhere in the theme.


    You can start by adding a section that allows the display of a “hero image,” which
    is a common design element used to grab the attention of someone landing on your
    home page and convey some information about your brand. We’ll also include a tagline
    at the top of the element and a button containing a call to action for the visitor.
    All of these elements (the image in use, the text content, and the destination
    URL) will be configurable by the storeowner.


    We’ll make a first pass at this by creating a new Liquid file in the theme, `sections/hero.liquid`,
    and inserting the contents of Listing [6-2](#A437216_1_En_6_Chapter.html#Par27).


    ```

    {% schema %}

    {

    "name": "Hero image",

    "settings": [

    {

    "id": "image",

    "type": "image_picker",

    "label": "Hero image"

    },

    {

    "id": "title",

    "type": "text",

    "label": "Title"

    },

    {

    "id": "label",

    "type": "text",

    "label": "Button text"

    },

    {

    "id": "href",

    "type": "url",

    "label": "Button link"

    }

    ],

    "presets": [

    {

    "name": "Hero image",

    "category": "Images"

    }

    ]

    }

    {% endschema %}


    {{ section.settings.title | escape }}

    {{ section.settings.label | escape }}


    Listing 6-2

    The Contents of sections/hero.liquid

    ```


    Hopefully, there’s nothing too unfamiliar here. As with the header and footer
    sections, we have a `{% schema %}` tag containing JSON, which is used to define
    the configurable properties of the hero section. Those configurable settings are
    then used at the bottom of the file to output the HTML elements used to render
    a `<div>` element containing the image and text elements.


    If we were to upload this section to the development store and refresh the home
    page, nothing would change. This is because for the hero image to be displayed,
    it needs to be added to the home page in the Customize Theme page of the Shopify
    admin. If you navigate to the theme customizer in the admin (refer to Chapter
    [4](#A437216_1_En_4_Chapter.html) if you’ve forgotten where that is), you’ll see
    that you’ll now have an Add Section option in the Page Content part of the left
    sidebar. Clicking that, you’ll get the option to add a Hero Image section and
    can configure it with an image, text, and links (see Figure [6-4](#A437216_1_En_6_Chapter.html#Fig4)).


    ![A437216_1_En_6_Fig4_HTML.jpg](A437216_1_En_6_Fig4_HTML.jpg)


    Figure 6-4


    The theme customizer in the Shopify admin before configuring and adding a hero
    image section (left) and afterwards (right)


    Unlike the “static” header and footer sections implemented in Chapter [4](#A437216_1_En_4_Chapter.html),
    these dynamic home page sections can be used multiple times and can be configured
    independently or rearranged as needed. Like static sections, they also support
    the use of blocks, meaning we can give storeowners lots of control over the content
    displayed in each section.


    We’ll now add a couple more dynamic sections so that we can implement the home
    page layout sketched out in Figure [6-3](#A437216_1_En_6_Chapter.html#Fig3). First
    off, we’ll add a Featured Products section (see Listing [6-3](#A437216_1_En_6_Chapter.html#Par32)),
    as `sections/featured-products.liquid`. When added to the home page, this section
    will ask storeowners to select a collection from their store, from which the first
    four products in the collection will be displayed. We’ll also add a Featured Collections
    section (see Listing [6-4](#A437216_1_En_6_Chapter.html#Par33)) as `sections/featured-collections.liquid`.
    This will display a list of collections in a similar fashion to the featured products
    section, but instead of displaying a predefined number of collections, we’ll use
    blocks to allow storeowners to select exactly how many collections they want to
    display.


    ```

    {% schema %}

    {

    "name": "Featured products",

    "settings": [

    {

    "id": "title",

    "type": "text",

    "label": "Section title",

    "info": "Defaults to collection title."

    },

    {

    "id": "collection",

    "type": "collection",

    "label": "Collection"

    }

    ],

    "presets": [

    {

    "name": "Featured products",

    "category": "Features"

    }

    ]

    }

    {% endschema %}

    {%- assign collection = collections[section.settings.collection] -%}


    {{ section.settings.title | default: collection.title | escape }}

    {%- for product in collection.products limit: 4 -%}

    {%- include ''product'' with product -%}

    {%- endfor -%}


    Listing 6-3

    Dynamic “Featured Products” Section on the Home Page

    ```


    ```

    {% schema %}

    {

    "name": "Featured collections",

    "max_blocks": 4,

    "settings": [

    {

    "id": "title",

    "type": "text",

    "label": "Section title"

    }

    ],

    "blocks": [

    {

    "type": "collection",

    "name": "Collection",

    "settings": [

    {

    "id": "collection",

    "type": "collection",

    "label": "Collection"

    }

    ]

    }

    ],

    "presets": [

    {

    "name": "Featured collections",

    "category": "Features"

    }

    ]

    }

    {% endschema %}


    {{ section.settings.title | escape }}

    {%- for block in section.blocks -%}

    {%- if block.type == ''collection'' -%}

    {%- include ''collection'' with collections[block.settings.collection] -%}

    {%- endif -%}

    {%- endfor -%}


    Listing 6-4

    Dynamic “Featured Collections” Section on the Home Page

    ```


    With these new sections in place, we get some additional options under Add Section
    in the theme customizer and can configure two additional sections to implement
    the desired layout from Figure [6-3](#A437216_1_En_6_Chapter.html#Fig3), as seen
    in Figure [6-5](#A437216_1_En_6_Chapter.html#Fig5).


    ![A437216_1_En_6_Fig5_HTML.jpg](A437216_1_En_6_Fig5_HTML.jpg)


    Figure 6-5


    Configuration of the featured products section (left) and the featured collections
    section (right) in the Shopify theme customizer


    With just these few simple sections, we’ve given storeowners a lot of control
    over the layout and content shown on their home pages, while ensuring each of
    these individual sections is consistent with the overall theme design. As you
    can see in Figure [6-6](#A437216_1_En_6_Chapter.html#Fig6), storeowners can use
    multiple instances of the one section type to build up a home page that suits
    their brand and product range.


    ![A437216_1_En_6_Fig6_HTML.jpg](A437216_1_En_6_Fig6_HTML.jpg)


    Figure 6-6


    A couple of different possible home page layouts built with the sections we’ve
    just implemented


    ## Collection Pages


    With the product page and home page put together, we can now move to the design
    and implementation of your theme’s collection pages. These pages (also called
    “category pages ”) present a list of all products contained with a particular
    collection, so that a customer can view a large range of products at once before
    drilling down into what they’re interested in.


    All Shopify stores come with a default “All” collection (accessed at `/collections/all`),
    which contains all products listed on the Shopify store’s Online Channel. In addition,
    Shopify provides a Collection Listing page at `/collections` that presents a list
    of all available collections. The collection listing page is rendered using `templates/list-collections.liquid`.


    **Tip**


    In some cases, you may not want the “All” collection to actually list all products
    available for purchase. For example, you may have a range of products with a “hidden”
    product type that should only be accessible to users with access to the product’s
    URL. In these cases, you can override the default “All” collection by creating
    a new collection in the Shopify admin and ensuring it has its collection handle
    set to “all”. You can then configure whatever rules you’d like to apply to the
    default collection, e.g., “Product Type is not Hidden”.'
