    \n```\nThe preceding program will import the addtwo.php file (which contains\n\
    the addtwo function). Once it is imported, it can call the function as\nshown.\n\
    ```\n\n**Caution:** When importing more than one file, you can cause a conflict\
    \ if more than one function imported has the same signature (name and parameters).\n\
    \nThe `include` keyword will search for the file and attempt to include it in\
    \ the program. If the file does not exist, the program will continue. The `include_once`\
    \ keyword is similar to `include`. However, it makes an additional check to discover\
    \ if the file has already been imported. If it has, it ignores the request (does\
    \ not produce an error). `include` would produce errors if the file has already\
    \ been imported.\n\nThe `require` keyword is similar to `include`. However, if\
    \ the file does not exist, an error will be produced. The `require_once` keyword\
    \ is similar to `require` with the additional check to not load the file if it\
    \ has already been loaded.\n\nThe examples shown do not attempt to handle any\
    \ errors. There are multiple possible problems with these examples, if the user\
    \ does not enter what it expected. We can adjust the calling program to handle\
    \ possible problems by adding a `try/catch` structure.\n\n```php\n<?php\ntry {\n\
    \    include \"dividetwo.php\";\n    print dividetwo($first, $second);\n}\ncatch\
    \ (zeroException $e) {\n    print $e->getMessage();\n}\ncatch (Throwable $t) {\n\
    \    print $t->getMessage();\n}\nfinally {\n    Print \"This message is over.\"\
    ;\n}\n?>\n```\n\nIn the preceding example, both the `include` statement and the\
    \ `print` statement are placed in a **try block**. The program will execute statements\
    \ in a `try` block until it runs into a problem. When a problem occurs, it will\
    \ look for a **catch block** to handle the problem. Since the `include` statement\
    \ depends on a file existing external to the program, it is important that the\
    \ program be able to handle the possibility that the file might not exist. This\
    \ example also places the `dividetwo` function within the `try` block. If this\
    \ `dividetwo` function attempts to divide by zero, PHP will raise an exception.\n\
    \nThe code specially captures the `zeroException` exception which would be raised\
    \ by PHP if an attempt were made to divide by zero. If that occurs, the message\
    \ shown in the block would be displayed and the program would shut down properly\
    \ (not crash). Additional `catch` blocks are shown. The `Throwable` catch captures\
    \ all other exceptions caused by the program. If the execution of the code jumps\
    \ the flow into one of these blocks, the standard error message would be displayed,\
    \ and the program will execute the `finally` block. The **finally block** is executed\
    \ even when no exceptions are discovered. It is important to assure that live\
    \ programs do not crash. It is better to capture any problems and then display\
    \ a message to the user requesting that they try using the system again later.\n\
    \n### Do It\n\n1.  Complete the code for the `addtwo` function shown in this section.\
    \ Allow only integers and floating-point numbers. Return the value back to the\
    \ calling program and print the output from the function calling statement.\n\n\
    2.  Create a function which accepts two numbers and a symbol to indicate if the\
    \ user wants to add, subtract, multiply, or divide. Use a `switch` statement to\
    \ determine which operation will take place. Include the call to the function\
    \ in a `try/catch` structure to capture any attempt to divide by zero.\n\n3. \
    \ Complete #2 but place the function in its own file. Import the file with the\
    \ function into a second file. Call the function multiple times with both valid\
    \ and invalid data. The `try/catch` block should catch all invalid data.\n\n##\
    \ Arrays\n\n**Arrays** hold multiple related information in memory. The ability\
    \ to save information in arrays greatly reduces the amount of coding that would\
    \ be necessary to create multiple variables to store information. Arrays also\
    \ provide the ability to easily increase the amount of storage locations when\
    \ needed. In PHP, arrays can be created on the fly, when needed, or formatted\
    \ before actual use. The data type for each individual item in a PHP array is\
    \ determined at the time when a value is stored.\n\nLet us look at an example;\
    \ an array might contain class information such as class number, class name, description,\
    \ room, instructor, and size (number of students).\n\n```php\n$class_array[0]\
    \ = \"CS122\"; // class number\n$class_array[1] = \"Programming Concepts 1\";\
    \ // class name\n$class_array[2] = \"Basic concepts of the PHP language.\"; //\
    \ description\n$class_array[3] = \"B123\"; // room\n$class_array[4] = \"Dr. Abraham\
    \ Excel\"; // instructor\n$class_array[5] = 50; // number of students\n```\n\n\
    This array has been created dynamically (on the fly). All **numerical arrays**\
    \ in PHP begin with a **subscript** (index) of zero. However, when dynamically\
    \ creating an array, you can start at any subscript and even skip positions. Array\
    \ names require the same syntax as variables with the addition of the array subscript\
    \ which is contained in square brackets (`[]`).\n\nWe can also allow PHP to create\
    \ the subscript numbering for us, using the following format:\n\n```php\n$class_array[\
    \ ] = \"CS122\"; // class number\n$class_array[ ] = \"Programming Concepts 1\"\
    ; // class name\n$class_array[ ] = \"Basic concepts of the PHP language.\"; //\
    \ description\n$class_array[ ] = \"B123\"; // room\n$class_array[ ] = \"Dr. Abraham\
    \ Excel\"; // instructor\n$class_array[ ] = 50; // number of students\n```"
