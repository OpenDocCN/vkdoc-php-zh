    你创建了一个非常简单的 `Alpha` 父类。该类只有构造函数和析构函数。当你创建对象时，会显示一条消息，表示已创建 `Alpha` 类的对象。当对象从内存中移除时，会显示一条消息，表示已删除
    `Alpha` 类的对象。`Bravo` 子类是基于 `Alpha` 类创建的。`Bravo` 类的主体是空的。你在其中根本没有描述任何内容（你可以这样做，但为什么这样做是另一个问题）。然后，创建一个基于
    `Bravo` 类的对象。结果，你在输出窗口中看到显示创建和删除 `Alpha` 类对象的消息。这怎么可能？父类的构造函数、父类的析构函数以及其他公有方法都在子类中被继承。在这种情况下，你并没有为
    `Bravo` 子类描述构造函数或析构函数。如果是这样，就会使用从 `Alpha` 父类继承的构造函数和析构函数。另一个重要点是，构造函数可以在子类中被覆盖。如你所知，如果在子类中覆盖普通方法，则必须使用与父类中相同的参数来描述它们。但该规则不适用于构造函数。在子类中，构造函数的参数可能与父类中构造函数的参数不同。


    最后，与常规方法一样，你可以从父类中调用构造函数和析构函数。为此，请使用 `parent` 关键字。即，形式为 `parent::__construct(arguments)`
    的指令表示使用适当的参数调用父类的构造函数。`parent::__destruct()` 语句表示调用父类的析构函数。相应的示例见列表 8-4。


