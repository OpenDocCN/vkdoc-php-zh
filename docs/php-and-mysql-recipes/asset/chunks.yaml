    `zip`  \n`zlib`  \n\n[Zend 模块]\n\n在 Mac OSX 平台上，PHP 是预装的。在我使用的 Mac OSX 版本（El Capitain）上，可以使用与上述相同的命令列出已安装的版本：\n\
    \n```\n$ httpd -v\nServer version: Apache/2.4.16 (Unix)\nServer built:   Jul 31\
    \ 2015 15:53:26\n\n$ php -v\nPHP 5.5.30 (cli) (built: Oct 23 2015 17:21:45)\n\
    Copyright (c) 1997-2015 The PHP Group\nZend Engine v2.5.0, Copyright (c) 1998-2015\
    \ Zend Technologies\n```\n\n默认安装的模块如下：\n\n```\n$ php -m\n[PHP Modules]\nbcmath\n\
    bz2\ncalendar\nCore\nctype\ncurl\ndate\ndba\ndom\nereg\nexif\nfileinfo\nfilter\n\
    ftp\ngd\nhash\niconv\njson\nldap\nlibxml\nmbstring\nmysql\nmysqli\nmysqlnd\nopenssl\n\
    pcre\nPDO\npdo_mysql\npdo_sqlite\nPhar\nposix\nreadline\nReflection\nsession\n\
    shmop\nSimpleXML\nsnmp\nsoap\nsockets\nSPL\nsqlite3\nstandard\nsysvmsg\nsysvsem\n\
    sysvshm\ntidy\ntokenizer\nwddx\nxml\nxmlreader\nxmlrpc\nxmlwriter\nxsl\nzip\n\
    zlib\n[Zend Modules]\n```\n\n在 Windows 上运行 PHP 也几乎同样简单。请注意，PHP 已不再支持较旧版本的 Windows（如\
    \ XP/2003 等）。第一步是安装一个 Web 服务器：IIS 或 Apache。如今，这两者在性能或功能上已没有太大区别。如果你计划在 Windows\
    \ 服务器的 IIS 上部署 PHP 脚本，建议在类似的平台上进行开发。Apache 的部署也同样如此。\n\n当在 Windows 上进行开发而部署到 Linux\
    \ 时，需要注意这两个操作系统之间的几个关键差异。首先，Windows 上的文件名不区分大小写。如果你的脚本引用了一个名为 `MyFile.php` 的文件，但实际文件名是\
    \ `myfile.php`，那么它在 Windows 上可以正常运行，但当你部署到 Linux 平台时就会出错。其次，是目录分隔符的问题。在 Linux\
    \ 和 Unix 环境中是斜杠（`/`），而在 Windows 上是反斜杠（`\\`）。在引用本地文件时，PHP 两种符号都可以使用，但在 URL 中务必始终使用斜杠。建议在\
    \ Windows 上始终使用斜杠作为目录分隔符，因为当它作为双引号字符串的一部分时，无需转义该字符。\n\n![图 5](img/index-43_1.jpg)\n\
    \n要在 Windows 10 系统上安装 Internet 信息服务（IIS 版本 7 或更高版本），请打开控制面板，点击“程序和功能”。在左侧栏中有一个“启用或关闭\
    \ Windows 功能”的链接。点击后会弹出一个包含 Windows 功能的窗口。只需启用 Internet 信息服务的选项，然后点击确定按钮，如下图所示。\n\
    \n请务必展开“万维网服务”文件夹，接着展开“应用程序开发功能”，并选择“CGI”选项。\n\n![图 6](img/index-44_1.jpg)\n\n\
    这将安装 Web 服务器、PHP 所需的 CGI 模块以及管理工具。请注意，计算机上安装的其他进程（如 Skype 和 Plex）可能已在占用默认的 Web\
    \ 端口（80）。如果是这种情况，你可以禁用这些服务，或者为 Web 服务器使用不同的端口。\n\n为你正在开发的每个网站使用不同的端口，可以让你托管多个站点。这也允许在同一个系统上同时使用\
    \ Apache 和 IIS。\n\n可以在同一个服务器上让多个网站共享一个端口。通过为每个网站使用不同的主机名来实现这一点。这些主机名可以在本地的 `hosts`\
    \ 文件中管理。该文件在 Windows 系统中的位置是 `c:\\Windows\\System32\\Drivers\\etc`，在 Mac 或 Linux\
    \ 系统中的位置是 `/etc`。\n"
- fmt: '# The default IIS configuration creates a web server that listens on port
    `80` and uses `%SystemDrive%\inetpub\wwwroot` as the document root. `%SystemDrive%`
    normally resolves to `C:\`. It is not necessary to use this directory structure
    for the web site.


    The next step is to start the web site. In my case I had to use a different port
    as port `80` is used for Skype. Use the `IIS` manager application to make changes
    to the site. The Internet Information Services (IIS) manager can be found in the
    control panel under administrative tools or by typing `IIS` in the search bar.
    The application looks like this:


    ![Image 7](index-45_1.jpg)


    ![Image 8](index-45_2.jpg)


    Right-click on the Default Web Site and select the `Edit Bindings` option and
    double-click on the line to change the configuration. Only the port number is
    changed from `80` to `8080`. It’s also possible to limit the IP address or host
    name, and it’s possible to add additional bindings to bind the same web site to
    different port numbers and/or host names if needed.


    The final step is to start the site. Right-clicking on the Default Web Site in
    the left pane and then the `Manage Website` option to expand the menu and select
    the `Start` option does this.


    The web site can now be accessed from a browser. In this case the URL is `http://localhost:8080`.


    As with the Apache installation on Linux this site only serves static HTML and
    ASP documents if ASP is enabled. There are some additional steps needed to get
    support for PHP.


    This starts by downloading the PHP binary package from [http://windows.php.net/download](http://windows.php.net/download).
    There are a number of different versions to choose from. It is recommended to
    use the latest version, compiled with the latest version of Microsoft Visual Studio.
    That is currently PHP 7.0.5 compiled with Visual Studio 2015 (VC14). Simply download
    the zip file and expand it into `C:\PHP`, or any other folder. This will give
    a directory structure that looks like this:


    ```

    PS C:\PHP> ls


    Directory: C:\PHP


    Mode                LastWriteTime         Length Name

