    require_once BUSINESS_DIR . 'database_handler.php';\n\n?>\n```\n\n**11.** 创建一个名为\
    \ `hatshop/include/app_bottom.php` 的新文件，并在其中添加以下内容：\n\n```php\n<?php\n\nDatabaseHandler::Close();\n\
    \n?>\n```\n\n**12.** 该文件必须包含在主页面 `index.php` 的末尾，以关闭连接。请按如下方式修改你的 `index.php`\
    \ 文件：\n\n```php\n<?php\n\n// 加载 Smarty 库和配置文件\n\nrequire_once 'include/app_top.php';\n\
    \n// 加载 Smarty 模板文件\n\n$page = new Page();\n\n// 显示页面\n\n$page->display('index.tpl');\n\
    \n// 加载 app_bottom，它用于关闭数据库连接 require_once 'include/app_bottom.php';\n\n?>\n```\n\
    \n## 工作原理：业务层代码\n\n在将数据库连接数据添加到 `config.php` 之后，你创建了 `DatabaseHandler` 类。该类包含多个包装方法，这些方法访问\
    \ PDO 函数并为业务层的其他方法提供所需的功能。\n\n`DatabaseHandler` 类有一个**私有构造函数**，这意味着它不能被实例化；你不能创建\
    \ `DatabaseHandler` 对象，但可以执行该类的**静态方法**。与实例成员和方法不同，静态类成员和方法直接使用类名调用，而不是通过类的对象。例如，以下是你调用一个假设名为\
    \ `MyClass` 的类的实例方法 `myMethod` 的方式：\n\n```php\n$myObject = new MyClass;\n\n$myObject->myMethod();\n\
    ```\n\n如果 `myMethod` 是一个静态方法，你可以这样调用它：`MyClass::MyMethod();`\n\n> **注意：** 静态成员是面向对象编程特有的特性，PHP\
    \ 4 及更早版本不支持。\n\n你可以在 `http://php.net/manual/en/language.oop5.php` 找到关于 PHP 5\
    \ 面向对象编程特性的非常好的介绍。\n\n数据库函数本身具有标准结构，利用了 PDO 已配置为抛出异常这一特性。让我们仔细看看 `GetRow` 方法。\n\
    \n```php\n// PDOStatement::fetch 的包装方法\n\npublic static function GetRow($statementHandler,\
    \ $params = null, $fetchStyle = PDO::FETCH_ASSOC)\n\n{\n\n    // 将返回值初始化为 null\n\
    \n    $result = null;\n\n    // 尝试执行接收到的预处理语句 try\n\n    {\n\n        self::Execute($statementHandler,\
    \ $params);\n\n        $result = $statementHandler->fetch($fetchStyle);\n\n  \
    \  }\n\n    catch(PDOException $e)\n\n    {\n\n        // 关闭数据库处理器并触发错误\n\n  \
    \      self::Close();\n\n        trigger_error($e->getMessage(), E_USER_ERROR);\n\
    \n    }\n\n    // 返回查询结果\n\n    return $result;\n\n}\n```\n\n如果数据库命令未成功执行，该方法会生成一个错误（使用\
    \ `trigger_error` 函数）。该错误会被你在第二章中实现的错误处理机制捕获。\n\n由于你在第二章中实现错误处理代码的方式，生成 `E_USER_ERROR`\
    \ 错误会冻结请求的执行，最终记录和/或通过电子邮件发送错误数据，并向访问者显示一条友好的“请稍后再试”消息（如果存在所谓友好的“请稍后再试”消息的话）。\n\
    \n请注意，在生成错误之前，我们还会关闭数据库连接，以确保脚本不会占用任何数据库资源。"
- fmt: "By default, if you don’t specify to `trigger_error` the kind of error to generate,\
    \ an `E_USER_NOTICE` message is generated, which doesn’t interfere with the normal\
    \ execution of the request (the error is eventually logged, but execution continues\
    \ normally afterwards).\n\nThe functionality in the `DatabaseHandler` class is\
    \ meant to be used in the other business tier classes, such as `Catalog`. At this\
    \ moment, `Catalog` contains a single method: `GetDepartments`.\n\n```\n// Business\
    \ tier class for reading product catalog information\nclass Catalog\n{\n    //\
    \ Retrieves all departments\n    public static function GetDepartments()\n   \
    \ {\n        // Build SQL query\n        $sql = 'SELECT * FROM catalog_get_departments_list();';\n\
    \n        // Prepare the statement with PDO-specific functionality\n        $result\
    \ = DatabaseHandler::Prepare($sql);\n\n        // Execute the query and return\
    \ the results\n        return DatabaseHandler::GetAll($result);\n    }\n}\n```\n\
    \nBecause it relies on the functionality you’ve already included in the `DatabaseHandler`\
    \ class and in the database functions in place, the code in `Catalog` is very\
    \ simple and straightforward. The `GetDepartments` method will be called from\
    \ the presentation tier, which will display the returned data to the visitor.\
    \ It starts by preparing the SQL query (you learned earlier about the advantages\
    \ of preparing SQL statements), and then calling the appropriate `DatabaseHandler`\
    \ method to execute the query. In this case, we’re calling `GetAll` to retrieve\
    \ the list of departments.\n\nRight now, the database connection is opened when\
    \ `index.php` starts processing and is closed at the end. All database operations\
    \ that happen in one iteration of this file will be done through this connection.\n\
    \n## Displaying the List of Departments\n\nNow that everything is in place in\
    \ the other tiers, all you have to do is create the presentation tier part—this\
    \ is the final goal that we’ve been aiming toward from the beginning. As shown\
    \ at the beginning of this chapter, the departments list needs to look something\
    \ like Figure 3-14, when the site is loaded in the browser.\n\n**Figure 3-14.**\
    \ *HatShop with a dynamically generated list of departments*\n\nYou implement\
    \ this as a separate componentized template named `departments_list` made up of\
    \ two files: the Smarty design template (`templates/departments_list.tpl`) and\
    \ the Smarty plugin file (`smarty_plugins/function.load_departments_list.php`).\
    \ An additional helper class called `DepartmentsList` will also be used. You’ll\
    \ then just include this componentized template in the main Smarty template (`templates/index.tpl`).\n\
    \n### Using Smarty Plugins\n\nThe Smarty plugin is the Smarty technology we’ll\
    \ use to implement the logic behind Smarty design template files (with the `.tpl`\
    \ extension). This is not the only way to store the logic behind a Smarty design\
