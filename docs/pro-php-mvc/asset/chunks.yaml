  trans: "\n“愿我口中的言语、心里的意念在你面前蒙悦纳，耶和华啊，你是我的磐石，我的救赎主。”（诗篇 14:19，ESV）\n\n我要感谢我的主，赐予我机会与能力来撰写这本书，并使我得以完成它。\n\
    \n我要感谢我的妻子，她为我冲泡了无数杯咖啡，提供了明智的建议和极大的耐心，还有她的鼓励与祈祷。\n\n我要感谢我的父母，他们给予我希望与关爱，以及他们的鼓励与祈祷。\n\
    \n我要感谢我的朋友和导师们，尤其是格兰特和韦恩。\n\n我要感谢 Apress 团队的成员，特别是凯蒂·沙利文；他们不懈努力，将潦草的手稿变成了值得骄傲的作品。\n\
    \n最后，感谢所有帮助过我、但未能在此一一提及的人，“没有人是一座孤岛，可以自全。每个人都是大陆的一片，整体的一部分。”（约翰·多恩，《沉思录第十七篇》）xxiii\n\
