  \ |\n\n### 5.12 本地 Web 服务器和浏览器\n\n在创建本地 PHP 应用时，一种已被采用且取得不同程度成功的通用技术是在每台 PC 上本地部署整个\
  \ Web 栈。这意味着安装一份`PHP`和`Apache`（或`Nginx`，或类似软件）的副本，并通过 Web 浏览器访问本地端口（例如`http://127.0.0.1:80`）上的\
  \ PHP 网页。\n\n优点：\n\n*   可以基本原样重用现有的 Web 代码和 Web 技能\n*   跨平台\n\n缺点：\n\n*   Web 服务器资源开销大\n\
  *   非原生体验\n*   必须进行安全设置以阻止外部访问\n*   如果未针对其所在系统进行适当调优，Web 服务器可能会不稳定\n*   维护开销大\n\
  *   安全漏洞攻击向量较大\n*   使用冗长的 HTTP 协议进行用户界面与后端交互会带来性能损失\n*   与 Web 一样会出现跨浏览器兼容性问题，除非部署或要求特定的浏览器。\n\
  \n总的来说，只要有可能，这绝对是一个应该避免的方式，特别是对于软件的公开分发。如果你有现成的 Web 应用需要在短时间内部署到你负责和控制的本地机器上，那么这种方法可能值得考虑。\n\
  \n如果你打算走这条路，那么考虑部署一个现成的栈“解决方案”是值得的，这些方案已经解决了本地部署 Web 栈所涉及的一些问题。在维基百科上可以找到一个方便的“LAMP”（Linux/Apache/MySQL/PHP|Perl|Python）类型栈列表，同样，也可以在那里找到\
  \ WAMP（Windows/Apache/MySQL/PHP）栈的比较。请记住，虽然该解决方案通常是跨平台的，但根据你的具体目标和应用的复杂程度，Web 栈的设置和微调在不同操作系统之间可能会有很大差异。\n\
  \n| ![](img/image00248.jpeg) | **进一步阅读** 维基百科上 AMP（包括 LAMP 和 WAMP）类型栈的列表 [`en.wikipedia.org/wiki/List_of_Apache%E2%80%93MySQL%E2%80%93PHP_packages`](http://en.wikipedia.org/wiki/List_of_Apache%E2%80%93MySQL%E2%80%93PHP_packages)\
  \ |\n\n### 5.13 PHP 内置的测试服务器\n\n自 v5.4 起，`PHP`配备了一个内置的 Web 服务器，主要用于测试目的。它旨在供单个用户在本地使用，而不是在公共网络上使用，因此缺乏像`Apache`这样功能完备的\
  \ Web 服务器所具备的性能、安全性和资源管理控制，并且无法通过模块等方式进行扩展。尽管如此，对于本地应用来说，像这样轻量级的服务器比上述基于`Apache`的解决方案更有意义，因为这些额外的功能通常不是必需的。话虽如此，它的“缺点”部分仍然有一长串不太理想的地方。\n\
  \n优点：\n\n*   可以基本原样重用现有的 Web 代码和 Web 技能\n*   跨平台\n*   除了`PHP`本身之外，无需部署额外的服务器\n\n\
  缺点：\n\n*   非原生体验\n*   必须进行安全设置以阻止外部访问\n*   `PHP`开发者已明确指出，它专门为测试/开发环境设计。\n*   使用冗长的\
  \ HTTP 协议进行用户界面与后端交互会带来性能损失\n*   与 Web 一样会出现跨浏览器兼容性问题，除非部署或要求特定的浏览器。\n*   并非像`Apache`这样的服务器的所有功能都被包含，因此如果依赖这些功能，可能需要对\
  \ Web 应用进行一些重写。\n\n| ![](img/image00249.gif) | ***PHP 内置 Web 服务器*** |\n|   |   |\n\
