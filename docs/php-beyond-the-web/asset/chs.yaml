  \ |\n\n### 1.7 英语。真正的英语。\n\n简单说明一下：不，那些可不是拼写错误，那是英式英语（你知道的，就是英语的源头），因为您卑微的作者来自大西洋彼岸。接受吧，我们就是拼写不一样。您发现的任何真正的拼写错误都会被当作语言演变的一部分而不予理会，然后趁您不注意时悄悄修正。\n\
  \n## 2. 脱离 Web —— 基础篇\n\n本章概述了使用 PHP 摆脱 Web 束缚的基本步骤。我们将探讨涉及的技术步骤，以及编程实践和侧重点上的差异。\n\
  \n\n\n### 2.1 无 Web 服务器的 PHP\n\n大多数 PHP 程序员都严格在 Web 服务器环境下使用过 PHP。在这种环境中，PHP 作为\
  \ CGI/FastCGI 或服务器模块，由 HTTP 服务器（通常是 Apache、IIS、Nginx 或类似软件）调用和控制。HTTP 服务器接收到对基于\
  \ PHP 的网页的请求后，会调用 PHP 进程执行该请求，这通常会将输出返回给 HTTP 服务器，再由其发送给最终用户。\n\n人们曾多次尝试通过本地安装的\
  \ Web 服务器，用 PHP 创建本地应用程序（桌面应用和脚本系统），并取得了一些成功。然而，对这种基于 Web 的模型用于本地应用，其缺点众多：\n\n-\
  \   就它们在这些场景中提供的价值而言，像 Apache 这样的 Web 服务器往往过于臃肿且消耗大量资源\n-   除非经过妥善锁定，否则本地运行的 Web\
  \ 服务器会为来自外界的恶意访问者提供一个访问你机器的入口点\n-   HTTP 是一种冗长的协议，并且（可以说）非常适合 Web，但对于本地进程间通信来说，它往往过于复杂，并为你的应用程序增加了额外的资源和复杂性开销\n\
  -   你的应用程序界面通常在 Web 浏览器中运行，因此看起来一点也不像本地应用（并且会带来额外的支持/升级麻烦，除非你专门为你的应用安装一个浏览器）\n\n\
  自 PHP 5.4 版本起，它包含了一个内置的 Web 服务器，消除了上述部分问题。然而，该服务器是为本地测试那些设计用于在生产环境中、像 Apache 这样功能完备的\
  \ HTTP 服务器上部署的 PHP 脚本而设计的。对于某些本地应用，特别是当你希望运行某个已存在的 PHP Web 应用的私有实例时，这是一个值得探索的途径。然而，它对于生产级本地应用的稳定性、可靠性和适用性仍有待验证，并且它依然带有\
  \ HTTP 和 Web 浏览器的负担。\n\n自 4.3 版本起，PHP 在内部隐藏了一个解决所有这些问题的“金块”。PHP CLI SAPI（命令行接口服务器应用程序编程接口），其正式名称，本质上就是“独立\
  \ PHP”的繁琐表达。它省去了对 Web 服务器的需求，并提供了一个独立的 PHP 二进制文件供你交互。例如，在 shell 提示符下输入：\n\n```\n\
  ~$ php /home/myfiles/myprogram.php\n```\n\n将简单地执行你的 `myprogram.php` 文件（它的编写方式与其他\
  \ PHP 脚本几乎完全相同），并将任何输出返回给终端（除非你另有指令），而不是发送给 Web 服务器（它根本不存在！）。\n\n通常，直接使用 PHP CLI\
  \ 调用的 PHP 脚本，其行为方式与通过 Web 服务器调用时相同，尽管存在一些差异。例如，你找不到任何 `$_GET` 或 `$_POST` 数组，并且 PHP\
  \ 默认不会发送任何 HTTP 头，因为这些概念在 Web 之外意义不大。像 `max_execution_time` 这样的默认设置会被设置为适合本地使用的合理值（本例中为\
  \ 0，因此你的脚本不会超时），输出缓冲被关闭，并且错误消息以纯文本而非 HTML 格式显示。\n\nPHP CLI SAPI 将是我们在本书大多数示例中使用的，因为它的设计动机与本书完全一致：让\
  \ PHP 超越 Web。下一章将提供如何安装和使用 CLI SAPI 的完整细节。\n\n### 2.2 PHP 版本——你用的是哪个？\n\n自 4.3.0\
  \ 版本起，PHP 就开始支持 CLI SAPI，因此本书中的许多示例可以在其后的任何 PHP 版本上运行。在撰写本文时，PHP 的当前版本是 5.6.5，本书中的代码已在此版本上测试过。如果你发现某个特定函数不存在或未能按预期工作，请查阅该函数的在线\
  \ PHP 手册。手册会指出哪些版本支持哪些函数，并描述新版本带来的任何破坏性变更。\n\n如果你使用的是较旧版本，则有一些非常充分的理由进行升级。\n\n-\
  \   在较新版本中，性能显著提升（相应地，资源占用也减少了）\n-   虽然安全性对于非 Web 应用并非总是至关重要（有关注意事项，请参阅本章后面的安全讨论），但如果你正在处理来自外部的数据，或者你同时也在使用相同版本进行\
  \ Web 开发，那么新版本中的安全增强和安全相关错误修复是必不可少的\n-   现代语言特性可用，这有助于提高你的编码效率，并帮助他人更认真地对待你的代码\n\
  \n与 PHP 的 Web 版本一样，如果你有需要，可以自己编译 CLI SAPI 的版本。如果你希望包含操作系统软件仓库未预打包的扩展、出于性能原因移除非必要代码，或使用\
  \ PHP 支持的任何其他编译时选项，那么学习“自制”版本可能会很有价值。关于编译和安装 PHP 及相关扩展的入门指南，请参见附录 A。\n\n### 2.3\
  \ 几个不使用 PHP 的充分理由\n\n本书专注于用 PHP 完成所有事情，并且对于 90% 的任务，PHP 都能胜任。但在你承诺用 PHP 重写你的世界之前，有几个相关的问题你可能需要在开始之前仔细考虑。\n\
  \n-   **高性能要求**\n\n如果你需要非常高的性能，特别是在有限的硬件上，PHP 可能不适合你。在 PHP 的较新版本中，性能取得了巨大的飞跃，并且在基准测试中经常击败\
  \ Python 和 Ruby on Rails 等语言和框架。然而，PHP 的核心是一种抽象化的脚本语言，对于某些任务，它永远无法达到像 C 这样的低级语言所能获得的性能，后者更接近硬件层面。不过，不要完全否定它处理所有高性能任务的可能性。如果你是从成本角度考虑性能，你可能会发现，通过\
  \ PHP 快速开发所节省的开发人员时间成本，超过了为获得所需性能而投入的额外硬件成本。请查看第 9 章，了解更多关于提升性能的信息，并了解如何从 PHP 与\
  \ C 等语言进行交互，以便你仍然可以获得 PHP 中 RAD（快速应用开发）的一些好处。\n\n-   **不要（非得）重复发明轮子**\n\n你*可以*用\
  \ PHP 编写一个 Web 服务器（示例请参见附录 D），但*现有的*服务器如 Apache 难道不能满足你的需求吗？对于许多或大多数基础设施方面的“痒点”，都存在（用多种不同语言编写的）软件可以满足你的“挠痒”需求。除非你真的需要其他功能，否则编写自己软件所花费的时间通常比学习和部署现有软件的时间要多。当然，对某些人来说，情况正好相反。“因为我能做到”也可以是一个有效的理由，并且编写软件总是一个宝贵的学习经历。\n\
  \n-   **保持源代码封闭**\n\nPHP 是一种脚本语言，这意味着如果你编写软件是为了出售或部署到其他地方，你将向接收者公开你的源代码。许多人（包括本书作者）会认为“开源”，即使是商业上的开源，也是一件好事。但如果这不是你的风格，那么你需要付出更多努力来保护你的代码。网上有可用的源代码混淆器，它们使用各种技巧使你的代码难以（但并非不可能）阅读。此外，现在已有多种\
  \ PHP 编译器可用于生成二进制程序（尽管在语法和扩展覆盖方面存在限制）。但是，主要的 PHP 项目并未表达支持代码隐藏或编译的意图，因此此类方法的长期可行性尚不确定。从中长期来看，闭源软件的商业案例也并非板上钉钉。\n\
  \n\n\n### 2.4 安全性考量\n\n每一位称职的程序员，至少都清楚构建网站和在线应用所涉及的安全问题。你会刻意将自己的代码暴露给公众、全世界，以及所有来访者（无论是善意还是恶意）。PHP\
  \ 早期的一个缺陷是优先考虑易用性而非代码安全性（像`register_globals`这样的遗留功能引发的恐怖故事，只需谷歌搜索一下便能知晓）。随着更新、更安全的默认设置和`register_globals`等功能的弃用，PHP\
  \ 在线上环境比以往任何时候都更安全。尽管大多数安全问题是由程序员而非语言本身引起的，但即便是最新的网络开发者，如今也似乎从一开始就具备了安全意识。\n\n然而，当你踏入离线软件的世界时，情况就截然不同了。通常，我们认为软件仅供受信任的用户使用，仅部署在受信任的机器上，并且完全由良善用户控制。用户不会故意攻击软件或机器，他们使用的是自己的数据，功能也绝对不应受损。在开发桌面应用等软件时，安全性很少被考虑，更不用说在设计时将其作为特性规划出来，因为觉得“没必要”。\n\
  \n但现实并非如此。看看任何软件漏洞邮件列表，比如 BugTraq，你会发现大量桌面应用的漏洞，例如 Adobe Reader、Microsoft Word，甚至像\
  \ GIMP 这样的开源软件。事实上，即使在本地应用中，安全性也很重要，主要有两个原因。第一个是“典型用户”行为的长期问题。这对于从不犯错的聪明技术用户（比如亲爱的读者您）来说不是问题，但对于我们其他人使用的任何软件来说，一次不小心点击可疑邮件就可能导致灾难。第二个原因是，对于大多数机器而言，许多非网络应用并非真正的“离线”。即使桌面应用或系统守护进程本身不与网络、本地网络或其他外部服务交互，其连接的机器也必然插有网线，或激活了\
  \ WiFi/3G/4G 连接。你的软件不会运行在与外界隔绝的舒适小天地里。当然，除非是完美沙盒化的虚拟机。\n\n软件安全性本身就可以写成另一本书（已有不少相关著作，请参考下方的扩展阅读部分），许多原则同样适用于系统软件和网络软件，因此你可以利用现有的基于\
  \ PHP 的网络安全实践知识来指导自己。在规划应用安全措施和监控时，应考虑以下面向用户和系统软件中常见的漏洞类型和攻击向量列表。\n\n- **受损的数据文件**\n\
  \  来自外部来源的受损文件（由用户故意或无意加载）。这些通常是数据文件，尤其危险的是被注册为特定文件类型默认查看器的软件，因为意外和恶意的文件激活更容易发生。\n\
  \n- **被恶意软件利用**\n  恶意软件寻找可被利用的无辜软件来提升权限。像 PHP 代码这样的脚本化软件更容易被恶意软件重写或篡改，而且源码以非编译形式存在可能为恶意软件作者提供便利。\n\
  \n- **用户不当行为**\n  合法用户的不当行为。例如，约翰·史密斯想在其与上司简·多伊共享的业务系统中查看她的文件或浏览历史。\n\n- **权限提升**\n\
  \  类似于合法用户的不当行为，这是合法软件的不当行为，要么意外、要么故意地试图获取并使用其不具备的访问权限。\n\n- **依赖关系漏洞**\n  PHP 的漏洞，以及其他依赖项和相关软件中的漏洞。你的软件当然可能完全不存在安全问题，但它必然依赖其他库、软件和\
  \ PHP 扩展，当然，别忘了还有 PHP 解释器本身。这些都可能包含安全漏洞和攻击向量。\n\n以上列表列出了所有类型软件中常见的安全问题来源，而不仅仅是 PHP。通过在设计阶段规划这些风险，并在部署前进行测试，可以最大限度地降低风险。然后祈祷好运吧……\n\
