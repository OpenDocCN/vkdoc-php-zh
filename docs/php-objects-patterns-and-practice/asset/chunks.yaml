  trans: '

    ### PHP 4 与悄然发生的革命


    如果说 PHP 4 是这门语言的又一次突破性进展，那么其核心变化大多是在表面之下发生的。Zend 引擎（其名称源自 Zeev 和 Andi 的名字）是从零开始编写，为这门语言提供动力的。Zend
    引擎是驱动 PHP 的主要组件之一。任何你可能调用的 PHP 函数，实际上都属于高级扩展层的一部分。这些函数执行它们被命名的繁重工作，例如与数据库 API
    通信或为你处理字符串。在此之下，Zend 引擎管理内存、将控制权委托给其他组件，并把你每天使用的熟悉 PHP 语法翻译成可执行的字节码。正是得益于 Zend
    引擎，我们才拥有了诸如类这样的核心语言特性。


    从客观角度来看，PHP 4 使得覆盖父类方法并从子类中访问它们成为可能，这是一个重大的优势。


    然而，一个主要缺陷依然存在。将一个对象赋值给一个变量、将其传递给函数或从方法中返回它，都会导致创建该对象的一个副本。考虑像这样的赋值：


    ```

    $my_obj = new User(''bob'');

    $other = $my_obj;

    ```


    这会导致存在两个 `User` 对象，而不是两个指向同一个 `User` 对象的引用。在大多数的面向对象语言中，你会期望通过引用而不是值来进行赋值。这意味着你将传递和赋值指向对象的句柄，而不是复制对象本身。这种默认的传值行为导致了许多难以发现的错误，因为程序员会在脚本的一个部分无意中修改对象，却期望这些更改能通过其他地方的引用被看到。在本书中，你将看到许多我维护对同一个对象的多个引用的例子。


    幸运的是，有一种方法可以强制使用传引用，但这意味着需要记住使用一种笨拙的构造方式。


    以下是你通过引用进行赋值的方式：


    ```

    $other =& $my_obj;

    // $other 和 $my_obj 指向同一个对象

    ```


    以下是强制传引用的方式：


    ```

    function setSchool(& $school)

    {

    // $school 现在是对传递进来对象的引用，而非副本

    }

    ```


    以下是通过引用返回的方式：


    ```

    function & getSchool()

    {

    // 返回一个引用而非副本

    return $this->school;

    }

    ```


    尽管这可以正常工作，但很容易忘记添加 & 符号（`&`），而这意味着面向对象代码中很容易潜藏错误。这类错误尤其难以追踪，因为它们很少导致任何报告的错误，只会导致看似合理但行为异常的结果。


    PHP 手册中扩展了对语法（尤其是对象）的覆盖，面向对象编程开始逐渐成为主流。PHP 中的对象并非毫无争议（毫无疑问，当时和现在都是如此），像“我需要对象吗？”这样的帖子在邮件列表中经常成为引战话题。事实上，Zend
    网站既刊登鼓励面向对象编程的文章，也刊发提出警告的文章。尽管存在传引用问题和争议，许多程序员还是继续在他们的代码中大量使用 & 符号。面向对象的 PHP 越来越受欢迎。Zeev
    Suraski 在 DevX.com（ [`http://www.devx.com/webdev/Article/10007/0/page/1`](http://www.devx.com/webdev/Article/10007/0/page/1)
    ）的一篇文章中写道：


    > PHP 历史上最大的转折之一在于，尽管功能非常有限，并且存在一堆问题和局限性，面向对象的 PHP 编程仍然蓬勃发展，并成为日益增长的现成 PHP 应用程序中最流行的范式。这一在很大程度上出乎意料的趋势，让
    PHP 陷入了一种次优的境地。很明显，对象在 PHP 中的行为与其他面向对象语言中的对象不同，而更像是[关联]数组。


    如前一章所述，面向对象设计的兴趣在在线网站和文章中变得显而易见。PHP 的官方软件仓库 PEAR 本身就采用了面向对象编程。事后看来，人们很容易认为 PHP
    采用面向对象支持是对不可抗拒的潮流的勉强让步。重要的是要记住，尽管面向对象编程自 20 世纪 60 年代就已存在，但它真正取得进展是在 20 世纪 90 年代中期。伟大的普及者
    Java 直到 1995 年才发布。而作为过程式语言 C 的超集，C++ 自 1979 年就已存在。经过漫长的演变，可以说它在 20 世纪 90 年代才实现重大飞跃。Perl
    5 于 1994 年发布，这是另一种最初的过程式语言中的革命，使其用户能够以对象的方式思考（尽管有些人认为 Perl 的面向对象支持也感觉像是事后添加的内容）。对于一个小的过程式语言来说，PHP
    发展其对象支持的速度非常快，显示出对用户需求的真正响应能力。


    ### 拥抱变革：PHP 5


    PHP 5 明确表达了对对象和面向对象编程的认可。这并不是说对象是使用 PHP 的唯一方式（顺便说一句，本书也不是这个意思）。然而，对象被视为开发企业系统的强大且重要的手段，并且
    PHP 在其核心设计中完全支持它们。


    可以说，PHP 5 增强功能的一个显著影响是大型互联网公司开始采用这门语言。例如，雅虎和 Facebook 都开始在其平台上广泛使用 PHP。有了版本 5，PHP
    成为了互联网上开发和企业级应用的标准语言之一。


    对象已从事后添加的功能转变为语言的驱动力。也许最重要的变化是默认的传引用行为，它取代了糟糕的对象复制问题。然而，这仅仅是个开始。在本书中，尤其是在本部分中，我们将遇到更多的增强功能，包括私有和受保护的方法与属性、`static`
    关键字、命名空间、类型提示（现在称为类型声明）以及异常。PHP 5 存在了很长一段时间（大约十二年），重要的新功能是逐步发布的。


    例如，PHP 5.3 引入了命名空间。这让你可以为类和函数创建一个命名作用域，这样在包含库和扩展系统时，你就不太可能遇到名称重复的问题。它们还能将你从丑陋但必要的命名约定（例如以下形式）中解救出来：


    ```

    class megaquiz_util_Conf

    {

    }

    ```


    像这样的类名是防止包之间冲突的一种方法，但它们可能导致代码变得冗长繁琐。


    我们还看到了对闭包、生成器、特质以及后期静态绑定的支持。

