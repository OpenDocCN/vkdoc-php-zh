  -   **第 4 周：质量保证（QA），7 月 12 日至 16 日**\n    -   周一：站点地图评审\n    -   开发团队为着陆页准备内容\n\
  \    -   内容类型、角色及 QA\n    -   捐款功能测试\n    -   周四：评审\n-   **第 5 周：内容准备，7 月 19 日至\
  \ 23 日**\n    -   周一：根据现有内容进行网站评审\n    -   内容准备\n    -   内容清单\n    -   周四：评审\n-\
  \   **第 6 周：Beta 版网站，7 月 25 日至 30 日**\n    -   所有内容已就绪，可上线发布\n    -   所有 QA 工作已完成\n\
  \    -   周四（7 月 29 日）网站上线\n-   **第 7 周：上线后支持，8 月 1 日至 7 日**\n    -   与员工一同评审培训录屏\n\
  \    -   支持服务时间\n    -   维护合同讨论\n\n### 估算完成日期\n\n请记住：日历上的日期往往比看起来更近。务必小心；根据过往经验，为自己留出合理的时间。在理想情况下，可能只需不到两周就能交付一个主题完整、内容齐全的网站。但如果项目涉及大量定制开发，或需要从旧系统迁移，则需要更多时间。\n\
  \n开始时，先在纸上梳理整个生命周期。需要进行多少调研？是否需要花费一周时间积极审查旧网站才能全面了解情况？客户是否希望设计非常复杂？要为设计的几次修订预留 30%的额外时间。他们想要的功能是否是你听说过别人已经实现过的？你是否在其他网站上安装过这些模块？如果你不必从头构建模块，那么你的开发时间估算会大大降低，但要为配置留出时间。估算时间是在项目中取得成功、并让所有人对工作进度感到满意的主要部分。\n\
  \n### 如果我什么都不做会怎样？\n\n要勇于在规划过程中提出这个问题。一旦目的明确，也会引出其他可能性。如果你的社区网站没有能引起用户共鸣的内容，会发生什么？他们可能再也不会回来，你的广告收入可能会流失，甚至生意倒闭！这是有可能的，因此你应确保正在为这个项目做最有益的事情，以支持其背后的业务。答案可能是，在`X`条件到位之前，你根本不应该启动这个项目。如果项目从一开始就没设好成功的基础，它就不会成功，随之而来的将是许多尴尬的对话。我保证。\n\
  \n### 风险\n\n项目中的最大风险之一就是旧系统与当前系统的集成/迁移。这个问题通常因为需要在`x`活动、`y`发布事件或`z`节日前紧急完成新网站而变得更加复杂。只要可能，就需要了解这些硬性截止日期并纳入计划中。然而，我们的世界并不完美：各种情况都可能发生，硬性截止日期也不一定能达成。对于这些期限，定义一个最小可行项目对于维持客户关系至关重要。\n\
  \n当每个人都知道最低限度是什么时，他们也就知道了情况可能有多糟糕。但有时这也会产生相反的效果，将项目的交付成果变成一场“逐底竞赛”，不断削减交付物，直到只期望完成最低限度的工作。项目经理的职责是兼顾两个理想目标：既要在销售中描绘出令人惊叹的网站项目，又要拿出能符合客户需求（即使不符合其期望）的极简版本。\n\
  \n### 最小可行项目/产品\n\n这是能实现项目目的的最基本项目。它很可能无法满足所有人对功能或设计（或两者）的期望。对于某些项目，最小可行产品可以是一个域名，配上一个简单的启动页面，包含一个标志和一套配色方案；它就像是“即将上线”页或“在建”图标的一个版本。^(3)\
  \ 也可以是新闻简报注册表或联系表单，让更广泛的受众有机会参与项目，或者是一系列阐述项目使命的静态页面。想象一下，在客户没有参与、开发团队因棘手问题而停滞、或者项目主要利益相关者发生变动时，在某个特定日期必须交付的最低限度是什么。在项目计划中明确这点，有助于设定“必需”与“想要”的期望；这对于奠定期望基础至关重要。在项目开始时定义好这一点，剩下的问题就是能否在此基础上进行扩充，或者根据情况缩减到这一基线。\n\
  \n\n\n### 跟踪承诺事项\n\n项目已设定了预计完成日期，规划好了各个里程碑，也有了明确的截止时间。但还缺少一样东西：跟踪/工单系统。这个系统需要能够设定截止日期，并帮助管理整个团队的责任——包括你，项目经理。它需要能按日期跟踪里程碑和任务，并允许更改任务的状态。如果系统能通过电子邮件或短信提供提醒功能，那也会非常有用。\n\
  \n以下是一些个人偏好的工具：\n\n- Unfuddle\n- Basecamp\n- ManyMoon\n- 5pm\n- LiquidPlanner\n\
  - Teambox\n\n> ³ 我很少推荐使用“正在建设中”图标。这看起来就像是 1998 年打来的电话，想把它的网页要回去。但如果你喜欢那种风格，那当然很好！\n\
  \n请注意，这些都不是基于 Drupal 的任务管理系统。这个列表旨在轻松管理大型和小型项目。一个系统是为了让你安心，并具备同时管理多个项目的能力。当有新事项添加到工单系统中时，参与该项目的整个团队都能看到。任何事项都不会被遗忘在某个电子邮件收件箱里，而且一切行动都有记录可查。\n\
  \n因此，从现在开始，一切都要将这份项目计划付诸行动。我要告诉你一个秘密：你已经完成了大部分困难的工作。构建过程并非一帆风顺，但你现在已经拥有了一张路线图。\n\
  \n你现在是负责的项目经理。你的主要任务是让所有事情井井有条，在正确的时间做正确的事，并确保一切都能按时完成。你也是与对项目成功至关重要的人员进行沟通的主要负责人。这些人可能是组织内赞助这个新网站的人，可能是付钱给你做网站的人，甚至可能是你的父母——如果你正在为父母搭建一个博客的话。你必须能够提出问题而不指望得到答案，并且你必须能够把\
  \ Drupal 的专业术语翻译成人话。运气好的时候，这其实非常有趣。\n\n我将为你描绘一个项目经理顺风顺水的大部分工作场景，这样你就能拥有更多顺利的日子，减少不顺心的日子。\n\
  \n### 超越开发的项目经理任务\n\n项目经理的工作并不在项目计划完成后就结束。你现在负责通过启动会议、设计会议、进度检查会和里程碑收尾会议来推动项目的产出。这就是“项目经理的一天”。\n\
  \n#### 启动会议\n\n这些是介绍团队成员、让整个团队首次见面的会议。了解团队中每个人的角色至关重要，我发现面对面的会议在整个项目生命周期中效果要好得多。这是一个建立关系的阶段，每个人都确保自己谈论的是同一件事。可能会冒出一些大家不理解的专业术语，因此这里有一个快速词汇表，列举了我在项目启动会议中谈论\
  \ Drupal 时经常使用的一些词汇：\n\n- *线框图*：网站外观的非工作原型。它是一个骨架。\n- *视觉稿*：Photoshop 或其他文件，它在线框图的基础上增添了外观和感觉。看起来像一个完整的网站，只是所有功能都不可用。\n\
  - *布局*：信息（图形或其他）在页面上的排列方式。\n- *概念设计*：视觉稿的另一种说法。\n- *主题*：一组用于改变网站外观和感觉的文件。设计就体现在这里。\n\
  - *模块*：可以安装到 Drupal 中的功能片段。它是可互换部件的系统。\n- *功能*：一组用于 Drupal 的文件，它将许多不同模块的功能整合为一个。这有点像在可互换部件之上的可互换引擎。然而，“功能”这个词也用来描述网站的一些简单功能。\n\
  \n针对 Drupal 的设计词汇更棘手，因为设计通常是大多数非技术人员唯一能接触到的网站部分。你能看到它，能描述它，而且看着也舒服。预计启动会议通常会持续一到两个小时。你们将讨论项目计划、时间线和资源，并就任何修改达成一致。\n\
  \n每个人都想得到答案的问题包括：\n\n- 我们要构建什么？\n- 谁会参与其中？\n- 谁负责哪个部分？\n- 项目成本是多少？\n- 什么时候能完成？\n\
  - 额外问题：推动这个项目的动力是什么？\n\n理想情况下，这不会是项目中的所有人第一次思考这些问题，但会议结束时，你们应该对答案达成一致。\n\n#### 探索会议\n\
  \n这些是头脑风暴会议。它们是非结构化的；在这些会议上不会做太多决定，但它们对项目的成功至关重要。记录这些会议的成果很有挑战性，但对设计师来说，当他们整合概念时，这些记录是无价之宝。\n\
  \n以下问题会在这些会议上得到答案：\n\n- 你喜欢哪些其他网站？\n- 它们具有哪些功能？\n- 你不喜欢什么？\n- 你想通过设计传达关于你网站的什么信息？\n\
  - 你在网上看到的哪些例子体现了这一点？\n\n在这里要清楚自己的能力，不要承诺在你第一个 Drupal 网站上就实现 Facebook 最新版的设计。设计很容易让人忘乎所以，所以要小心。如果可能的话，优先考虑功能而非设计。\n\
  \n#### 信息架构/设计会议\n\n这些会议通常涉及线框图或概念设计等可交付成果。参会者包括项目经理、信息架构专家、设计师和客户。会议讨论的是功能以及需要添加、删除或更改的内容。同时也会讨论网站的外观和感觉：是否太亮、太暗、处理方式不对、需要更圆润的边角。这些会议最好简短（30\
  \ 分钟）且频繁（每周两次），直到信息架构专家和设计师完成最终稿。\n\n以下问题会在这些会议上得到答案：\n\n- 所有内容都在它应该在的位置吗？\n- 缺少什么？\n\
  - 在这三个设计方案中，你最喜欢哪些元素？\n- 这是最终设计，还是我们需要再修改一轮？根据估算，我们已经花费了 X 美元在设计阶段。再增加一轮设计将使整个项目的预算增加\
  \ Y 美元。这是你想要做的吗？\n\n预算开始变得紧张就在这里。要密切关注资源情况，并对可用资源保持透明。\n\n#### 开发会议\n\n这些会议通常是项目经理和开发人员之间的内部会议。他们会上说明已完成的工作、剩余的工作以及阻碍进展的问题。在敏捷开发中，这些会议每天举行，并且非常简短——不超过\
  \ 20 分钟。这些开发会议有助于协调开发团队，确保其他人都知道进展顺利，并能共同解决问题。这些会议贯穿项目的整个生命周期。\n\n以下问题会在这些会议上得到答案：\n\
  \n- 我正在做什么？\n- 接下来要做什么？\n- 哪些事情会成为/已经是阻碍？\n\n#### 进度检查\n\n项目经理是穿梭于开发团队和客户之间，确保问题得到解答的人。这需要在开发人员和客户之间进行翻译；内容会根据网站建设所处的阶段而变化。\n\
  \n以下事项会在这些会议中涉及：\n\n- 这是我们正在做的工作。\n- 这是下一步要做的。\n- 我们在哪些方面需要你的帮助？\n- 你的内容准备得怎么样了？\n\
  \n\n\n#### 里程碑结项会议\n\n当一个周期阶段结束时，项目经理、首席开发人员和客户会举行会议，以确保该阶段所需完成的所有工作均已落实，且下一阶段可以启动。如有任何需要调整的地方，应是小范围的改动，否则这也会演变成一次范围变更的讨论。\n\
  \n这些会议涵盖以下内容：\n\n- 这是我们在该项目中关闭的所有任务单。\n- 这是开发站点上的对应位置。\n- 这需要添加到下一阶段，还是已经完成？\n-\
  \ 如果我们更改此项，项目工期将增加 X 时长。这样是否可以，或者需要放弃哪些其他事项来实现这一更改？\n\n#### 上线会议\n\n网站上线前的最后一次会议中，所有开发人员、项目经理和客户齐聚一堂，讨论网站发布前的最终修改。如果沟通一直顺畅，本次会议就不会有重大意外。如果出了差错，这次会议可能会带来令人不快的意外。作为项目经理，你需要将此次会议中的任何需求与功能需求文档进行比对。如果需求未在功能需求文档中体现，就不应纳入本次会议的讨论范畴；而应推迟到未来的工作阶段处理。\n\
  \n这些会议涵盖以下内容：\n\n- 所有事项均按我们此前讨论的完成。\n- 需要做哪些小修改？\n- 我们所有的内容都准确无误地呈现在这里。\n- 我们已在生产站点上测试了工作，准备将此项目上线。\n\
  \n#### 项目后复盘\n\n太好了！网站上线了，大家都很开心，现在团队可以坐下来讨论哪些地方做得好、哪些地方不太顺利、哪些地方可以改进。这通常是一次内部的设计/开发/项目管理会议，因为坦诚的反馈才是本次会议的主要目标。\n\
  \n### 项目经理的其他任务\n\n除了以上所有会议，项目经理还有实际任务需要完成，而不仅仅是跟踪项目进展。项目经理有助于明确正在发生什么以及为什么发生。\n\
  \n#### 创建用户故事\n\n了解项目预期的最佳方法之一是将范围分解为一系列故事。用户应该能够做什么？管理用户应该能够做什么？这些是讲述具体事项的大故事，而不是一系列任务。它们可能在项目全程中不断撰写，而不仅仅在项目开始时。这些故事很容易向整个团队解释每个元素需要实现什么功能。\n\
  \n以下是一些用户故事的结构示例：\n\n- 我想通过[站点的某部分]来[做某事]，以便能够[原因]。示例：我想在我的个人资料中收藏内容，以便将来能再次找到它们。\n\
  - 作为[某个角色]，我想要[某个目标]，以便能够[原因]。示例：作为管理员，我想删除帖子上的评论，以便能够管理网站的用户生成内容。\n\n传统的敏捷工作流程将这些故事写在小型卡片上：故事、某些概念以及确认其可行的验证。这三个要素必须同时存在，这样任何团队成员都能独立完成此任务，而无需依赖另一张卡片完成。这是一个非常理想的状态。但更多时候，团队规模不足以需要这种可互换性，因此这些用户故事作为提醒，表明网站中完整功能应是什么样子。\n\
  \n#### 实施任务与任务工作流\n\n基于用户故事，你需要创建任务。任务是具体的、需要构建/完成/处理的小事项，它们集成到完整的工作流中。大多数任务跟踪系统都支持这一点：任务可以处于不同的工作流状态。\n\
  \n任务最初状态为“新建”，分配给团队成员后变为“已分配”。如果团队成员觉得有足够信息完成任务，可以“接受”该任务。如果团队成员认为需要进一步澄清或不宜立即执行，任务也可以被“拒绝”；此时项目经理与团队成员应和整个开发团队或客户进行讨论。\n\
  \n任务完成后，其状态变为“已解决”，随后由质量保证（QA）团队进行测试，确认其在各种平台上按设计运行。\n\n当无需进一步操作时，任务可以被“关闭”；或者如果\
  \ QA 发现需要修改，也可以“重新打开”任务。QA 可以将错误报告反馈给项目经理和开发团队。\n\n建议使用独立的错误跟踪系统，不与开发工作流混用。实际工作流是相同的，但独立的系统有助于将开发与修复区分开。让客户能够访问错误跟踪系统（而非整个开发任务系统）有助于推动项目进展，因为这样更容易请求并收到有针对性的反馈。\n\
  \n任务并不总是与开发相关。设计任务可以是创建 BeachHouse 的 Photoshop 效果图，或根据已批准的效果图创建 HTML/CSS 布局。项目管理任务可以是制定项目计划，或为“探索”里程碑填充任务。任务被分配到各个里程碑，每个任务的预估时间加总后构成该里程碑的总时间。\n\
  \n#### 构成里程碑的任务\n\n当一个里程碑中的所有任务完成时，站点可由客户和项目经理审核以批准。项目时间表中通常会预留一些时间，用于在会议前进行必要的审核。\n\
  \n让各方了解已完成的工作、正在运行的功能以及剩余待办事项对所有人都有帮助。这些里程碑会议也是审查预算的好时机。可以提出以下问题：\n\n- 基于已完成的工作量，我们的预算情况如何？\n\
  - 项目中还有哪些待完成事项？\n- 我是否有下一阶段的预算？\n- 如果预算不足，可以削减哪些部分来使项目可行，或者如何获得更多预算？\n\n花时间审查并确定下一步行动的优先级，并对项目范围与预算保持坦诚。\n\
  \n这也可能是新增一些原本不在范围内的事项的时机。项目经理的职责是牢记最初商定的范围，管理预算以满足预期，并推动项目完成。在每个里程碑会议之前审查范围是保持项目正常推进的最佳方式，但这并非易事。项目经理需要设定基调；最好的做法是在整个项目中保持一致性。\n\
  \n\n\n### 糟糕的日子\n\n上述所有事件和任务都是项目经理日常工作中的正常部分。当项目中的部分环节出现问题、未能达到客户期望，或者被完全搁置而遗忘时，这便是糟糕的日子。\n\
  \n你是所有这些项目中关系的维护者，虽然确保项目完成是你的职责，但这有时也意味着收起自负，进行艰难的对话。\n\n艰难的对话包括：\n\n* “我需要更多沟通。”\n\
  * “我需要更聚焦的沟通。”\n* “我们已经讨论过那件事，并且说好了就此了结。”\n* “这就是改变方向需要付出的代价。”\n* “我们预算超支了。”\n*\
  \ “我无法实现那个设计。”\n* “我们落后于进度了。”\n\n进行艰难的对话并不愉快，但从长远来看，回避这些对话只会让情况更糟。别让这种事发生在你身上！深呼吸。在必要时愿意进行这些对话。记录你需要做什么、你如何做的以及结果如何。每一次对话都可以通过一种让双方都能获得良好结果的方式来处理。一个好的模板是：\n\
  \n* 发生了什么\n* 承担责任\n* 你的团队承诺在 Y 时间前完成 X 事项\n* 接下来会发生什么\n\n愿意为团队承受一些打击。承诺会被打破。本该进行的测试不会进行。本应交付的设计无法交付。本该添加的内容无法及时准备好。在紧张时刻，邮件的语气会比预期更尖锐。一切都会感觉糟透了。\n\
  \n如果可以，让团队其他成员也参与那些通话/会议。让他们观察你如何处理团队中的失误而不归咎于任何人，你如何承担责任，你如何管理沟通中的断裂，你如何恢复团队信任，以及你如何推动项目向前发展。\n\
  \n最终，最好的项目是那些成员之间理解最深的团队。如果你能将项目目标传达给不同性格的人，你的工作会顺利得多。你还需要识别每个项目中的各种技能水平，包括你自己的技能。你不仅仅是项目经理，你还是协调者、领导者和导师。\n\
  \n祝愉快！\n\n### 进一步资源\n\n*《管理人类》* 作者：Michael Lopp [`http://managinghumans.com`](http://managinghumans.com)\n\
  \n*《推动事情发生》* 作者：Scott Berkun [`www.scottberkun.com/books/making-things-happen/`](http://www.scottberkun.com/books/making-things-happen/)\n\
  \n*《在不完美的世界中变得敏捷》* 作者：Greg Smith\n\n*《来自 Drupal 项目经理的预算管理更多建议》* - `affinitybridge.com/blog/managing-budgets-and-billing-while-practicing-agile-development`\n\
  \n![图片](img/square.jpg) **提示** 前往 `dgd7.org/manage` 获取更多关于规划和运行项目的资源与建议。\n\n"
- "# 第 11 章\n\n![图片](img/squ.jpg)\n\n## 为最终用户和生产团队编写文档\n\n**作者：Dani Nordin**\n\n文档是许多设计师和开发者讨厌做的工作之一，但它很重要——不仅为了接手网站的客户和编辑者的满意度，也为了防止生产团队反复犯同样的错误。\n\
  \n本章将为你概述如何为 Drupal 项目团队创建有效的文档。理想情况下，你将为一个特定网站的最终编辑者和管理员创建文档，同时为生产团队创建内部文档以帮助提高其工作流程效率。我还将讨论\
  \ Drupal 社区成员发现的一些方法，用于为同行 Druapl 开发者创建文档——以及你如何也能做到。\n\n### 什么是好的文档？\n\n虽然没有固定公式适用于好的文档，但在创建文档时有几点需要谨记。好的文档：\n\
  \n* 易于编辑并能随着网站的发展而演进。\n* 格式一致，这样在每次向文档添加内容时不必重新发明轮子（包括截图等可视化内容）。\n* 覆盖用户最常需要处理的事项——最好按照他们需要处理的顺序。\n\
  * 讨论用户可能遇到的常见错误以及如何解决。\n* 用简单的语言编写。\n\n最后一点在创建文档时是最重要的，无论是为客户网站、Drupal 模块或主题，还是为团队内部文档。这并不是说文档中不应该包含代码或技术要求；而是说，重要的是要假设你的最终用户并非像你一样的专家，但如果愿意以他们能理解的方式提供指导，他们愿意*获得*专业知识。\n\
  \n![图片](img/square.jpg) 提示 Claudina Sarahe 编写的特别补充内容涵盖了为不同受众编写文档的最佳实践，以及用于创建和维护文档的工具。请在本章的在线主页\
  \ `dgd7.org/document` 查找该内容及更多信息。\n\n### 让客户尽早参与内容录入\n\n由于内容的策划、创建和录入是任何 Drupal\
  \ 网站的重要组成部分，因此让客户的目标内容团队尽快开始向网站输入内容至关重要。这样做可以实现几个关键目标：\n\n* 让开发团队养成快速迭代原型的习惯。\n\
  * 让客户习惯与 Drupal 界面交互。\n* 有助于在过程中尽早识别需要调整的领域，从而使开发更容易。\n* 让客户了解完整的开发过程。理想情况下，促使他们从对美学的关注（即事物看起来如何）转向对用户体验和功能性问题的关注——直到真正该讨论美学的时候。\n\
  \n最后这一点是让客户尽早参与录入过程的最重要原因。客户在网站规划早期很容易纠结于字体、颜色和图像的选择。为了让设计过程高效运作并产生有效结果，客户和设计师都需要尽早并经常打破这个习惯。\n\
  \n让客户尽早参与内容录入过程的最佳方法是，一旦你有了网站的工作原型，就在受密码保护的 URL 上设置一个预发布服务器（例如，`staging.newsite.com`）。预发布服务器是网站的“开发中”版本；它允许客户和开发团队了解项目的进展，并防止外界看到生产站点（即线上站点）上正在进行的工作。更多信息，请参阅第\
  \ 13 章。\n\n如果你设置了预发布服务器，到网站上线时，客户的内容团队（理想情况下）将拥有足够的 Drupal 网站内容管理经验，以至于成为他们的第二天性。那么为什么还要事后创建文档呢？答案很简单：人员会变动。现在录入内容的人并不一定是唯一负责该网站内容录入的人，直到永远。以\
  \ PDF（或更好的是，网站隐藏区域内的内部 Wiki）形式交付给客户的优质最终用户文档，是建立客户好感的重要方式。它还能防止未来新来的客户编辑打来焦虑的电话。\n\
  \n\n\n\n### 发布后创建最终用户文档\n\n为客户创建有效文档的最佳、也是最简单的方法，是在网站构建过程中，一旦网站的某些区域获得批准，就立即开始编写。尽管每个网站都不同，但应包含的关键区域包括：\n\
  \n-   如何登录网站的信息，包括登录`URL`、用户名和密码。\n-   对管理菜单以及你设置的任何快捷方式的简要概述。\n-   如何添加内容以及如何格式化每种内容类型。虽然为每种内容类型都在文档中包含一条说明可能看起来重复，但养成这个习惯会非常有用——尤其是对于那些技术不太熟练的客户。\n\
  -   如果适用，关于如何创建新用户以及如何为其分配角色的信息。\n-   对菜单系统以及如何添加/删除菜单项的简要概述。\n-   对分类系统以及如何添加/删除术语的简要概述。\n\
  -   对区块系统以及如何添加/删除区块的简要概述。\n\n请注意，最后三项存在一些争议。许多开发人员反对让客户拥有对其网站架构和菜单/区块系统的控制权，而访问区块、菜单等将会赋予这种控制权——这理所应当。然而，经验表明，客户期望并且经常要求这种级别的控制权；毕竟，他们选择像\
  \ Drupal 这样的内容管理系统，部分原因就是希望有能力管理自己的内容，而无需致电他们的网络团队。\n\n因此，在开发过程中创建一些方法，让网站编辑者能够在不破坏网站其他部分的情况下管理菜单项和分类等内容，这一点非常重要。通过使用权限，你可以实现以下目标：\n\
  \n-   允许网站编辑者创建新的分类术语，但不能创建新的词汇表。\n-   允许网站编辑者创建新的菜单项、删除或移动菜单项，但不能创建新的菜单。\n-   允许网站编辑者创建和放置新的区块，但不能更改视图。\n\
  \n在网站制作过程中需要考虑的另一件重要事情是用户将如何向网站输入内容。虽然`WYSIWYG`编辑器（例如你在 Microsoft Word 中用来格式化副本的按钮）在\
  \ Drupal 网站构建者中可能是一个有争议的话题，但可以放心地假设，你构建的几乎任何网站最终都将由非网站构建者来管理。Drupal 网站的内容编辑者通常包括企业主、秘书、实习生和志愿者。有些人可能精通技术，但坚持要求客户学习`HTML`以便在纯文本编辑器中输入内容，这对客户（或你的团队，因为他们将不得不接听困惑的网站编辑者的支持电话）是不公平的。客户期望某种`WYSIWYG`编辑器，而作为网站构建者，提供这种编辑器非常重要。幸运的是，`WYSIWYG`模块（`drupal.org/project/wysiwyg`）支持多种不同的库。有关更多信息，请查看第\
  \ 4 章。\n\n### 优秀客户文档的剖析\n\n优秀的文档应该：\n\n-   使用具备基本技术知识的人易于理解的语言编写。假设他们不懂`HTML`。\n\
  -   当网站部分内容发生变化时，开发团队可以轻松更新。\n-   全面；它涵盖了客户管理团队在管理网站时将要处理的所有事项。\n\n出于这些原因，我使用简单的文字处理程序（如\
  \ Microsoft Word 或 OpenOffice）来创建网站文档。对于文档团队来说，这使他们能够快速创建文档，并在网站发生变化时轻松更新。文件以`PDF`格式交付给客户，这有助于确保内容不会在后续过程中被意外删除。\n\
  \n创建文档的过程同样简单，但对于习惯于埋头于代码的人来说，通常需要稍微转变一下思维方式。基本流程是执行网站编辑者需要做的所有事情——从创建新内容到更改菜单项，再到添加分类术语——并使用屏幕截图记录整个过程。\n\
  \n例如，这是我们在第 1 章和第 8 章中构建的网站的一些文档示例。\n\n**网站文档 :: DGD7.ORG**\n\n![images](img/p224-01.jpg)\n\
  \n![images](img/p225-01.jpg)\n\n### 为开发团队编写文档\n\n虽然客户文档是 Drupal 开发过程中必不可少的一部分，但内部文档对于开发团队的重要性也不容低估。作为聪明人，我们很容易将事情记在脑子里——当只有我们自己接触这些东西时，这很有意义，但当其他人参与进来时，尤其是在较大的项目中，这就会引发问题。\n\
  \n团队文档可以采取多种形式，从内部 Wiki（可以使用 MediaWiki（[`www.mediawiki.org/wiki/MediaWiki`](http://www.mediawiki.org/wiki/MediaWiki)）或直接在\
  \ Drupal 中构建！），到内部网（请查看`openatrium.com`，这是一个基于 Drupal 构建的团队内部网解决方案），再到共享的 Evernote\
  \ 笔记本或充满随机代码片段的 Dropbox 文件夹。在创建文档时，最重要的不仅是考虑你当前的团队，还要考虑你最终希望拥有的团队。团队会成长；老成员离开，新成员加入。拥有良好的内部文档可以使新团队成员快速上手，并有助于避免生产瓶颈。\n\
  \n创建良好内部文档中最重要也最困难的因素是建立一个合乎逻辑的组织结构；将所有内容存储在一个公共位置很重要，为保存的代码片段、博客条目和其他文档添加注释或引用也同样重要。最后，定期检查文档并清除过时或老旧的信息也很重要。Drupal\
  \ 在不断发展，团队开发经验也是如此。文档的目的不是记录你做过的每一件事，而是编译一份团队成员可以相互分享的最佳实践列表。\n\n良好的内部文档应涵盖：\n\n\
  -   团队反复使用的代码片段，并附上用例描述。\n-   特定模块的独特之处以及团队为解决这些问题所做的努力（如果你将代码作为补丁贡献给该模块，那就更完美了！）。\n\
  -   网站启动检查清单，涵盖启动网站时常见的问题（以及如何从中恢复）。\n-   针对常见构建网站的“配方”（特定模块和配置的组合）。\n-   常用文件、模块、网站配置和基础主题的位置（有关主题的更多信息，请参阅第\
  \ 15 章和第 16 章）。\n-   团队共享的编码和开发标准。\n\n组织文档的方式和制作通心粉奶酪的方式一样多种多样。虽然味道可能会因你添加的配料而改变，但关键成分总是不变的：你可以使用任何一种奶酪或任何一种形状的通心粉，但你仍然需要奶酪和通心粉。\n\
  \n\n\n### 为社区编写文档\n\n虽然贡献代码是为 Drupal 社区做贡献的绝佳方式，但贡献高质量的文档可以说更为重要。优秀的文档不仅对当前的 Drupal\
  \ 站点构建者和设计师解决棘手问题至关重要，还能帮助新手站点构建者轻松上手创建 Drupal 站点，从而使社区更加强大。\n\nDrupaller 可以通过多种方式为社区贡献文档。最流行的方法之一是网络播客；例如，Lullabots（`lullabot.com`）提供了许多付费和免费的播客，内容涵盖与\
  \ Drupal 工作相关的概念。Bob Christenson 的 MustardSeed Media 视频播客（`mustardseedmedia.com/podcast`）是熟悉主题化和使用显示模块的绝佳途径。Drupaltherapy（`www.drupaltherapy.com/screencasts`）提供的截屏视频则专注于通过特定模块组合的“配方”来进行站点构建。如果没有像他们这样的人制作帮助我们学习如何使用\
  \ Drupal 的内容，许多聪明而有才华的设计师和开发者就不会成为社区的一员。\n\n因此，如果你正在使用 Drupal 并学到了新东西，请写一篇博客或制作一个截屏视频。如果你发现某个模块存在问题，请在\
  \ `drupal.org` 上的问题队列中提交，或在 Twitter 上提及。如果有天你收到一封感谢你贡献的电子邮件，请不要感到惊讶。\n\n### 知道的越多越好\n\
  \n好的文档不是要为你本已繁忙的日程增加更多工作。它旨在帮助你的客户、你自己以及社区享受你用 Drupal 制作的出色站点。它旨在避免半夜收到客户发来的、因不知如何向站点添加页面而抓狂的邮件。它旨在让下一位\
  \ Drupaller 免于重蹈你为让某个模块或主题正常工作而苦苦挣扎的头痛经历。它旨在分享你在某个站点上学到、却又希望自己能记住的酷炫技巧。好的文档对每个人都有帮助。你越早开始整理，效果就越好。\n\
  \n![images](img/square.jpg) 提示 随着 `dgd7.org` 本身以及其他示范项目（如 `dgd7.org/anjali`）工作的持续进行，文档示例和经验教训将会发布到\
  \ `dgd7.org/document`。\n\n## 第 12 章\n\n![images](img/squ.jpg)\n\n## 开发环境\n\n**作者：Kay\
  \ VanValkenburgh**\n\n请特别关注本章。这个主题可能就像第一次约会就去家得宝一样“迷人”，但本章将让你免于重复造轮子。无论你是否有意，当你启动任何类型的项目时，你都会建立一个开发环境：你选择工具并创建空间，这些空间定义了你的流程，并要么限制、要么推动你的努力。所以，这里是你利用他人错误经验的机会。在本章中，我将探讨高效且相互关联的工具以及适当定义的空间。我将聚焦于几种可能的方法，每种方法都只需要最少的设置和维护。结果将是一个开发环境，它能让你的项目顺利运行，为项目和团队规模及复杂性的变化建立灵活性，并让你将精力集中在可交付成果上，而不是纠结于不完善的设置。\n\
  \n对于没有编程经验、想从最基本的必需品开始的人，请跳转到名为“最基础的开发环境”的章节，了解完成上传和安装站点等基本任务所需的*最简*工具集。你可以从这里开始，随着熟悉程度和需求的增长，再回到本章的其他部分来扩展你的开发环境。简而言之，本章涵盖以下内容：\n\
  \n*   **快速启动**：一个功能完备、预配置好的开发环境，启动即可使用。下载它，添加凭据，添加你的项目，你就能通过一个强大的本地环境开始工作了。（适用于经验丰富的开发人员以及处于开发者职业发展轨道的初学者。）\n\
  *   **向现有开发环境添加关键工具**，以及添加这些工具的理由。（适用于经验丰富的开发人员。）\n*   **注册并配置网站托管账户和域名注册**。（适用于初学者和非编程人员。）\n\
  *   **安装并配置创建和维护简单 Drupal 站点所需的基本图形用户界面（GUI）工具**。（适用于初学者和非编程人员。）\n\n![images](img/square.jpg)\
  \ **注意** 设置开发环境的选择几乎是无限的。本章描述了两种主要方法：在虚拟环境中使用功能完备的 Linux 构建，以及使用 Windows 或 Mac 的原生工具。更多方法请参见\
  \ `dgd7.org/devenv`。\n\n\n\n### 快速入门指南\n\n`Quickstart`（`drupal.org/project/quickstart`）是一个适用于\
  \ Mac 和 Windows 电脑的虚拟设备，只需几步即可启动一个预配置的、以 LAMP 为核心的开发环境。它省去了数小时的工作，为你提供一个经过深思熟虑且全面组装的环境，只需几分钟即可完成设置。与\
  \ `Drubuntu`（一个可在 Ubuntu 上设置预配置开发环境的 `Drush` 脚本；参见附录 G）一样，`Quickstart` 还额外提供了 Drupal\
  \ 特定文档（`drupal.org/node/788080`）、问题队列（`drupal.org/project/issues/quickstart`）和用户组（`groups.drupal.org/quickstart-drupal-development-environment`）——换句话说，它拥有一个不断发展的开发者社区的所有优势，这个社区共享通用工具和代码库。`Quickstart`\
  \ 使用带 Ubuntu 的 `VirtualBox`，并且是完全开源的。\n\n与大多数虚拟化解决方案一样，`Quickstart` 可能面临性能挑战，并且需要大量资源。`Virtual\
  \ Box` 应用程序至少需要 1024MB 内存，而 `Quickstart` 镜像在交付时占用 18GB 硬盘空间，因此请首先检查是否需要腾出空间或安装更多内存。关于性能，各种机器和主机操作系统上的用户都曾抱怨运行缓慢。在一次简单测试中，`Quickstart`\
  \ 在一台仅有 2GB 内存的老式 Intel Core Duo 机器上的 Windows XP Pro 系统中运行完美。然而，一台更新、更强大的机器却出现了性能问题（尽管是轻微的）：在一台配置精良的\
  \ MacBook Pro i7（Snow Leopard，8GB 内存，固态硬盘）上，屏幕刷新过于卡顿，导致鼠标难以使用。调整窗口大小等典型任务需要额外的注意力和耐心。尝试增加基本内存、显存和处理器数量的小规模实验并未消除卡顿现象（有关加快\
  \ `Quickstart` 速度的简要说明，请参见 `drupal.org/node/819720`）。\n\n如果你以前没有使用过组装完善的开发环境，那么为了熟悉它，值得解决性能问题。然后，你可以选择你认为最有价值的组件，并花时间将其安装在你偏好的开发操作系统上。以下是\
  \ `drupal.org` 项目页面（`drupal.org/project/quickstart`）上描述的安装步骤。请注意，安装需要导入一个设备，而不是创建新机器（当\
  \ `VirtualBox` 完成安装后，它会提示你创建新机器；你需要取消该操作并按照这里的说明进行）。\n\n1.  使用 BitTorrent 下载 `Quickstart`\
  \ 0.9.1 虚拟机。（需要客户端？从 [`www.utorrent.com`](http://www.utorrent.com) 获取 `uTorrent`（Windows\
  \ 和 Mac））\n2.  安装 `Virtualbox`（版本 4.0.4+）。\n3.  导入 `Quickstart` 虚拟机。\n    1.  启动\
  \ `Virtualbox`。\n    2.  文件 ![images](img/U001.jpg) 导入虚拟电脑 ![images](img/U001.jpg)\
  \ 选择文件 ![images](img/U001.jpg)（选择已下载的 `ova` 文件）\n    3.  将内存设置为系统内存的 50%（最低 1024MB，最高\
  \ 2048MB）。\n    4.  导入 ![images](img/U001.jpg)（等待导入完成）。\n4.  从列表启动新机器。\n5.  用户名：密码\n\
  \    1.  Unix = `quickstart:quickstart`\n    2.  MySQL = `root:quickstart`\n   \
  \ 3.  Drupal = `admin:admin`\n6.  更新到最新官方版本：`drush`，`drush make`，`drush Quickstart`\
  \ 等。要获取 `drush` 命令的最新更新：\n    1.  `cd ~/quickstart`\n    2.  `git pull`\n    3.\
  \  `bash -x update.sh`\n\n一旦 `Quickstart` 运行起来，打开自述文件（如图 12-1 所示）以获取文档、教程以及一些基于浏览器的开发者工具的链接。值得点击这些链接，并仔细查看页面顶部打开的\
  \ Firefox 工具栏。\n\n![images](img/1201.jpg)\n\n**图 12-1.** 自述文件包含指向文档、教程以及一些基于浏览器的工具的有用链接。\n\
  \n虚拟化还有其他好处。请参阅后面关于浏览器测试的部分，了解虚拟机特别擅长解决的一个挑战。不过，如果你不打算采用虚拟化方案，请继续阅读本章的下一节，其中包含在\
  \ Windows 和 Mac 操作系统上安装几个 Drupal 友好型 IDE 关键组件的说明。\n\n### 增强你现有的开发环境\n\n几乎每个任务都有对应的开发者工具。你执行某个任务的频率越高，“正确”的工具就越有用，你的开发环境也就越个性化。本节将介绍如何设置一些更常用的工具，并探讨促使你将它们纳入自定义开发环境的因素。我将涉及以下几个主要开发需求：\n\
  \n*   在本地托管你的网站。\n*   访问命令行。\n*   处理渲染后的 HTML、CSS 和 JavaScript。\n*   测试浏览器和设备兼容性。\n\
  *   处理 PHP 文件。\n\n#### 在本地托管你的网站\n\n在本地机器上托管你正在开发的网站通常被认为既方便又是一种最佳实践。借助 `Git` 来促进团队开发人员工作的合并，本地开发实例允许每个团队成员使用自己的文件、数据库和服务器软件副本。这种设置让每个团队成员能够更自由地实验，并在上传可能干扰其他团队成员工作的半成品修改之前解决问题。此外，本地开发环境可以随身携带，无论开发人员是否在线，网络中断也不会阻止整个团队的工作（这也是独立开发者也采用此做法的两个原因）。\n\
  \n在 Mac 和 Windows 上本地运行 LAMP 堆栈的几种可靠、全面的解决方案已被打包成经过充分测试的安装包。不同的系统在任务上各有不同的方法和工具；本书专门为四种常见解决方案提供了附录。\n\
  \n*   附录 F 介绍了在 Windows 上使用 WAMP 进行本地托管。\n*   附录 G 介绍了在 Linux 上设置 `Drubuntu`。\n\
  *   附录 H 重点介绍了 Mac 上的 MAMP。\n*   附录 I 重点介绍了 Acquia Dev Desktop，它可在 Windows 和 Mac\
  \ 上运行。\n\nWindows 上的另一个选择是 Microsoft WebMatrix（`microsoft.com/web/drupal`），它可以在\
  \ IIS 上本地设置运行 Drupal。\n\n\n\n#### 访问命令行\n\n在很多人眼中，命令行仿佛是黑暗时代的遗物，一种图形界面出现前用来折磨人的工具。尽管外表不太友好，但命令行却是开发环境中一个重要、高效且强大的组成部分。\n\
  \nMac 和 Linux 系统自带`终端`，这是首选的命令行界面。在 Mac 上打开`终端`，请前往“应用程序”![images](img/U001.jpg)“实用工具”![images](img/U001.jpg)`终端`；在\
  \ Ubuntu 上，请前往“应用程序”![images](img/U001.jpg)“附件”![images](img/U001.jpg)`终端`。\n\n\
  在 Windows 上使用`终端`有几种选择。最常见的是通过虚拟化（例如 Quickstart）托管 Linux，或者安装 Linux 模拟器。`Cygwin`（`cygwin.com/`）在后一种方法中被广泛使用。\n\
  \n要安装`Cygwin`，请遵循以下步骤：\n\n1.  在`cygwin.com/setup.exe`下载安装程序。\n2.  运行`setup.exe`，接受默认设置，并按照屏幕指示操作，直到进入软件包选择界面。\n\
  3.  在软件包选择界面中，找到并启用以下选项（单击某个软件包一次会选择最新版本，再次单击会选择之前的版本，所以请克制住双击的冲动）：\n    1.  在“Shells”类别中，选择“`rxvt`：用于\
  \ X 和 Windows 的 VT102 终端模拟器”。\n    2.  在“Net”类别中，选择“`openssh`：OpenSSH 服务器和客户端程序”。\n\
  \    3.  在“Archive”类别中，选择“`unzip`：Info-ZIP 解压缩工具”。\n    4.  在“Editors”类别中，选择“`nano`：带扩展功能的\
  \ pico 克隆文本编辑器”（你也可以添加`vim`）。\n    5.  在“Web”类别中，选择“`wget`：通过 HTTP 和 FTP 从万维网获取文件的工具”。\n\
  \n![images](img/square.jpg) **注意** `终端`在处理文件和目录名中的空格时，与 Windows 和 Mac 操作系统不同。输入路径时，请使用反斜杠来转义空格，如下所示：\n\
  \n```\n$ cd Documents\\ and\\ Settings\n```\n\n除了输入文件或目录的完整路径外，你还可以将其图标拖放到`终端`窗口中。\n\
  \n当完成`Cygwin`的安装后，启动`Cygwin`程序即可打开`终端`。输入`help`以获取命令行功能列表。有关使用命令行的说明，请参见本书的其他章节。\n\
  \n#### 使用渲染后的 HTML、CSS 和 JavaScript\n\n对前端开发者而言，最有价值的工具是 Firebug 插件（[`http://getfirebug.com/`](http://getfirebug.com/)）。在最基本的实现中，`Firebug`允许\
  \ Web 开发者在页面运行于浏览器中时，检查和试验性地更改其 CSS 及 HTML 的设置。完整功能需要流行的开源 Firefox 网络浏览器，不过也有在其他浏览器中提供部分功能的版本。其他一些浏览器也实现了提供类似功能的自身工具，其中最值得注意的是\
  \ Safari 开发者工具（要使用这些工具，请开启菜单 Safari![images](img/U001.jpg)偏好设置![images](img/U001.jpg)高级中的“开发”菜单）。\n\
  \n![images](img/square.jpg) **注意** 在开始使用`Firebug`之前，请确保在“管理”![images](img/U001.jpg)“配置”![images](img/U001.jpg)“开发”![images](img/U001.jpg)“性能”（`admin/config/development/performance`）中关闭你网站的`CSS`和`JavaScript`聚合功能。\n\
  \n要启用`Firebug`，首先将其添加到 Firefox（使用 Firefox 浏览器访问`getfirebug.com`并点击“安装 Firebug”），然后通过菜单“工具”![images](img/U001.jpg)Firebug![images](img/U001.jpg)“打开\
  \ Firebug”来激活它。默认情况下，`Firebug`打开时，左窗格显示 HTML 视图，右窗格显示与高亮元素关联的样式。样式按优先级顺序列出：列表顶部的样式会覆盖下面列出的样式（请注意，这种显示顺序与\
  \ CSS 样式表相反，非常适合屏幕阅读的目的）。可以通过展开和选择 HTML 元素，或启用检查器缩放工具（Firebug 面板左上角的图标，显示一个鼠标指针和一个矩形）来浏览代码。要使用缩放工具，请点击检查器缩放工具，然后在网页上悬停，直到你想要检查的区域被高亮显示。点击页面，HTML\
  \ 视图将放大到与该高亮区域关联的嵌套 HTML 元素。\n\n一旦定位到你想影响的 HTML 元素，你就可以更改“样式”窗格或“HTML”窗格中显示的值。更改将立即对已加载的页面生效。但是，`Firebug`不会保存这些更改。这些更改仅影响页面的当前加载实例（也就是说，如果你在现有窗口中保留更改后的页面，并在另一个窗口中打开页面的新实例，你会发现所做的更改不会应用于新窗口或新标签页）。\n\
  \n要实现你希望保留的更改，请在文本编辑器中打开相关的 PHP 或 CSS 文档。在开发所需设置时，相应地修改相关的 PHP/CSS 文档。请记住，只修改你自己的自定义主题或模块文件，不要修改核心或贡献代码；有关覆盖渲染后的\
  \ HTML、CSS 和 JavaScript 的正确方法，请参见关于主题化的第 15 章和第 16 章。还要牢记，最佳实践是避免对正在运行的网站代码进行修改；请务必在开发服务器上进行更改，然后酌情部署到预发布和生产服务器。\n\
  \n另外，请查看 Drupal for Firebug 模块，该模块将 Drupal 调试和 SQL 查询信息添加到`Firebug`窗口中（请参考`drupal.org/project/drupalforfirebug`）。\n\
  \n\n\n#### 浏览器与设备兼容性测试\n\n在优化网站主题时，务必在目标受众使用的各类浏览器和设备上对网站进行全面测试。对于外行来说或许难以置信，但在\
  \ Internet Explorer 和 Firefox 这两款主流浏览器中，同一网站的显示效果可能大相径庭。即便在 IE 不同版本之间，显示差异也可能相当严重（IE6\
  \ 在某些市场依然根深蒂固，据报道仍占 IE 整体使用量的 15%以上，尽管 IE9 现已可用）。另外要注意，某些行业（学术界尤为突出）比其它行业更倾向于继续使用旧版浏览器而非升级。随着支持网络功能的移动设备选择日益增多，全面测试网站的挑战也随之加大。\n\
  \n缩小测试范围会很有帮助。首先确定哪些浏览器和设备最为重要。关于当前浏览器市场份额的统计数据有多种来源；`en.wikipedia.org/wiki/Usage_share_of_web_browsers`\
  \ 列出了这类来源的优质参考列表。最终判断应测试哪些浏览器和设备的最佳指标，是专为项目目标受众收集的统计数据。如果你正在处理现有网站，通常可以从主机网站的统计数据中获取此类信息；你也可以在\
  \ Drupal 安装中添加 `Browscap` 模块来捕获浏览器版本信息（`drupal.org/project/browscap`）。在查看历史数据时，请牢记移动互联网使用的快速增长。\n\
  \n即使你已经确定了需要关注的有限浏览器和设备范围，执行测试本身仍可能是一项挑战。对于桌面和笔记本电脑浏览器最系统化的兼容性测试方法是，运行（虚拟）机器来承载每个感兴趣的操作系统与浏览器版本的组合。对于移动设备，设备制造商通常会随开发者工具发布模拟器；请访问其网站获取下载和说明。\n\
  \n并非所有人都能证明投入人力来构建和维护这一系列测试环境是合理的，此时可以借助第三方服务来处理测试。不过，以下是一些针对桌面浏览器版本的潜在捷径：\n\n-\
  \ `Utilu IE Collection` 是一个可下载的合集，包含所有主要版本的 Microsoft Internet Explorer，并设置为可在同一台机器上同时运行；可在\
  \ `utilu.com/IECollection` 找到。\n- Mozilla 在 `releases.mozilla.org/pub/mozilla.org/firefox`\
  \ 维护着一个 Firefox 版本目录。\n- `Multi-Safari` 提供 Apple Safari 的单独立下载，将每个版本的相应 WebKit 框架捆绑到应用程序中（详见网站说明：`michelf.com/multi-safari`）；Apple\
  \ 似乎也保留了旧版本的下载页面，可通过搜索引擎找到。\n- Opera 在 `opera.com/docs/history` 维护着多个可下载的版本。\n-\
  \ Google Chrome 旧版本的资源尚未出现。\n\n在测试浏览器时，请记住目标用户的机器上可能安装了会影响显示和性能的不同插件，更不用说屏幕分辨率和尺寸的影响，以及访问者可以调整窗口大小这一事实（针对后者，请确保在每个测试平台上调整浏览器窗口大小，以验证所有流体或未定义宽度的行为是否符合预期）。\n\
  \n#### 使用 PHP 文件\n\nEclipse 和 Netbeans 是两个非常适合 Drupal 开发需求的开源集成开发环境（IDE）。它们安装和配置迅速，并提供了一种出色的方式来导航和修改你的\
  \ Drupal 模块和主题。从 `eclipse.org/pdt` 获取 Eclipse PDT（PHP 开发工具）；从 `netbeans.org` 获取\
  \ Netbeans。以下是在你的机器上设置 Eclipse PDT 包的基本步骤：\n\n1. 启动 Eclipse。在启动欢迎页面上，选择工作台（Workbench）。\n\
  2. 在“窗口”![images](img/U001.jpg) “首选项”![images](img/U001.jpg) “常规”![images](img/U001.jpg)\
  \ “内容类型”中设置偏好，以识别 Drupal PHP 内容类型；逐个输入以下文档类型，并以点号开头：`.engine`、`.install`、`.inc`、`.module`、`.profile`、`.theme`、`.test`）\n\
  3. 在“窗口”![images](img/U001.jpg) “首选项”![images](img/U001.jpg) “常规”![images](img/U001.jpg)\
  \ “工作空间”中设置文本编码和行分隔符；在窗口底部，使用“文本文件编码”![images](img/U001.jpg) “其他”![images](img/U001.jpg)\
  \ UTF-8 和“新建文本文件行分隔符”![images](img/U001.jpg) “其他”![images](img/U001.jpg) Unix\n\
  4. 在“窗口”![images](img/U001.jpg) “首选项”![images](img/U001.jpg) “常规”![images](img/U001.jpg)\
  \ “编辑器”中设置将制表符转换为两个空格；将“显示的制表符宽度”设为 2，并选择“插入空格代替制表符”。\n\n\n\n### 最基础的开发环境\n\n本部分旨在帮助初学者和非编程人员搭建一套供偶尔使用的工具集。\n\
  \n假设你从未接触过 Drupal，也没有任何编程经验。你听说第一步是要下载一个 Drupal 发行版（请参阅第 34 章），但此刻你还在书店里，手里正拿着这本书。它恰好翻到了这一页。你想知道，当\
  \ Drupal 列入你的计划时，需要哪些必备工具：也就是那套最基本的工具。\n\n以下是简要清单。如今大多数计算机用户已经拥有其中的大部分工具，但如果你是 Web\
  \ 开发的新手，请特别注意清单上最后四项。\n\n*   一台能够连接互联网的计算机。\n*   一个互联网连接。\n*   少量可用磁盘空间（100MB 的空间就能用\
  \ Drupal 做很多事，不过你还需要考虑视频、音频或大型图片等媒体文件的体积）。\n*   一个网页浏览器（强烈推荐使用最新版 Firefox）。\n* \
  \  一个代码或文本编辑器（重要区别：普通的文字处理器不适合此工作）。\n*   一个用于解压 gzip/zip 文件的程序。\n*   要让你的网站上线，你还需要：\n\
  \    *   一个域名（由你的网站托管服务商或域名注册商进行注册和管理）。\n    *   一台具备数据库功能的 Web 服务器（通常是一台远程 Web\
  \ 服务器；Linux 是最常用的操作系统，Apache 是最常用的 Web 服务器，MariaDB/MySQL 是最常用的数据库；系统要求请见 `drupal.org/requirements`）。\n\
  \    *   一种向远程服务器传输文件的方法（Drupal 7 提供了一种通过管理页面添加模块和主题的方法；这要求你的服务器已正确配置 FTP，大多数托管服务器都满足这一条件；你也可以使用称为\
  \ FTP 客户端的软件）。\n\n你入门所需的工具清单简单得惊人。Drupal 和贡献模块将提供你最常使用的工具，尤其是在起步阶段。所有其他你需要的基础工具，以及不少高级工具，都可以作为开源软件获取（无论你使用何种操作系统）。\n\
  \n在本开发环境章节中，这一部分涉及的每个组件都相对容易设置和学习，因此新用户可以将精力集中在攀登 Drupal 的学习曲线上。如果你需要重复执行这些任务，你可能会想为工具箱增加一些复杂性，以换取更高的效率。\n\
  \n你或许还会发现，在找到心仪的工具之前，你会试用几个 FTP 客户端和文本编辑器。可能性很多，尤其是在文本编辑器方面，网络上也有很多关于某些解决方案优于其他方案的讨论。为了简单起见，我只会介绍几个不错且通用的选择。\n\
  \n![images](img/square.jpg) **提示** 将你的生产环境网站托管给专业主机商；自行托管需要相当多的专业知识和时间。在选择主机商时，请务必参考\
  \ `drupal.org/requirements` 上的建议。\n\n### 选择托管服务\n\n在托管配置方面，有很多选择，提供商也数量众多。请参阅 `drupal.org/hosting`；列出的提供商很可能都满足托管\
  \ Drupal 的最低要求。然而，一旦这些要求得到满足，还有几个重要的考虑因素和一些你需要能够完成的简单任务。以下是关于选择及设置托管服务的一些指南。\n\n\
  #### 根据性能和服务需求选择主机\n\n为满足你所需的性能而合理调整托管方案，是重要的第一步。考虑到更换主机，甚至在同一主机商内更换服务器配置可能带来的费用和麻烦，请选择一个能为未来需求增长预留空间的服务。以下是一些常见的托管类别及其大致的性能预期：\n\
  \n*   Drupal 即服务（也称为 Drupal SaaS）提供商提供了价格与性能的吸引力组合；请务必确认你所需的具体功能是否包含在其服务中。\n*  \
  \ 如果你正在创建一个基础的 Drupal 站点，能够接受较慢的页面加载速度，并且预期流量不大（比如同时访问者不超过几十人），那么你可以选择众多现成且价格低廉的共享主机账户。\n\
  *   如果你需要快速的页面加载速度并支持更高流量，性能和预算的最佳平衡点可能是虚拟专用服务器（VPS）。\n*   如果你的网站面向全球受众提供数 GB 的媒体内容，你可能需要内容分发网络（CDN）。\n\
  *   如果你预见到流量会剧烈波动，你将需要一个典型的云托管自伸缩解决方案。\n\n请确保你的托管服务商能提供你无法自行提供的任何服务。有些服务商只提供服务器空间，其余事项则留给你自己处理。你可以通过比较不同提供商的服务列表和报告的正常运行时间来获取更多详细信息。（关于主机的评论网站通常看起来并不可靠）。关键属性包括：\n\
  \n*   一家资金充足、运营良好的公司。\n*   配备完善、软件和设备配置正确且完整的服务器。\n*   7×24 小时的服务器软件与设备监控及问题解决。\n\
  *   主动执行安全与维护任务。\n*   充足的客户支持。\n*   适时获取新的基础设施和专业知识。\n\n除了托管服务，你还需要注册一个域名，并使其传播到域名服务器上。并非所有托管商都提供这些服务。如果你的托管商不提供，你需要向域名注册商注册一个账户。此服务预计每年花费约\
  \ 10 美元（通常托管账户会免费附带此项服务）。负责协调互联网地址的机构 ICANN 也负责认证域名注册商。他们在 `icann.org/en/registrars/accredited-list.html`\
  \ 上维护着一个注册商列表。\n\n一旦你选定了托管商，注册过程通常很快。注册完成后，请注意查收邮件。邮件中将包含下一步操作的重要信息。如果你在注册商处另有独立账户，该邮件还会包含如何将你的新\
  \ URL 指向托管账户的说明（请查找关于域名服务器（DNS）的说明）。\n\n#### FTP 客户端设置\n\nFTP 客户端允许你在本地计算机和远程服务器之间传输文件。在收到托管服务商的确认邮件后，即可开始设置你的\
  \ FTP 客户端。邮件中通常包含访问在线文件所需的 URL、用户名和密码。\n\n一款广受欢迎的独立 FTP 工具是 Cyberduck，它是一个适用于 Mac\
  \ 和 Windows 的强大开源 FTP 客户端（`cyberduck.ch`）。Firefox 插件中一个热门选择是 FireFTP（`fireftp.mozdev.org`）。这些客户端安装后，FTP\
  \ 连接的设置方法类似，并且都提供了多种登录和传输文件的方式。\n\n以下部分将展示如何访问你的远程服务器。\n\n##### 1. 创建包含服务器访问设置的书签\n\
  \n在 Cyberduck 中：通过菜单 书签 ![images](img/U001.jpg) 新建书签 为你的托管账户创建一个书签。\n\n在 FireFTP\
  \ 中：点击窗口左上角的“创建账户”，如图 12–2 所示。\n\n![images](img/1202.jpg)\n\n**图 12–2.** 在 FireFTP\
  \ 中，点击“创建账户”以保存你的 FTP 登录凭据。\n\n务必为书签指定一个清晰的昵称，以便一眼就能看出你连接到了哪里。当你进入文件结构后，各个服务器看起来一模一样，因此昵称通常是你最可靠的标识。最好的昵称应包含项目名称，并指示该服务器托管的是你网站的线上版、预发布版还是开发版。\n\
  \n\n\n##### 2. 选择安全协议\n\n在 `Cyberduck` 中：从`新建书签`窗口顶部的下拉菜单选择安全协议（参见图 12–3）。\n\n在\
  \ `FireFTP` 中：安全设置位于书签窗口的`连接`选项卡下。\n\n如果你的主机提供 `SSH` 服务，你应该能够使用 `SSH` 凭证通过 `SFTP`\
  \ 进行连接。如果它提供 `FTP-SSL` 服务，你应该能够使用 `FTP` 凭证进行连接。如果不清楚如何建立安全的 `FTP` 连接，请联系他们的支持人员。\n\
  \n![images](img/1203.jpg)\n\n***图 12–3.** Cyberduck 连接类型*\n\n![images](img/square.jpg)\
  \ **提示** 大多数主机都提供安全的文件传输方式。传统的 `FTP` 会以明文形式发送你的密码，而广泛可用的软件可以轻松地记录密码，尤其是在共享网络（例如你常去的咖啡馆的无线连接）上。\n\
  \n##### 3. 输入主机提供的登录凭证\n\n在主机发送给你的电子邮件中，你会找到适合你所选连接类型的服务器地址、用户名和密码。这些信息的命名方式可能有所不同。服务器地址可能被称为主机地址或\
  \ `URL`。对于通过 `SSH` 进行的文件传输，电子邮件中可能会使用缩写 `SCP`。无论命名方式如何，你应该能够识别出所需的几项信息：服务器地址通常类似于网站\
  \ `URL`；用户名有时看起来像电子邮件地址；密码通常是字母、数字和符号的组合。\n\n填写这些信息，并注意不要更改窗口中的其他设置，除非你有具体的操作指示。确保`匿名登录`复选框保持未选中状态。请注意，`Cyberduck`\
  \ 在此界面上没有密码字段；一旦你点击连接，它会要求输入密码。\n\n保存这些设置。将来需要连接时，你只需点击书签即可。\n\n##### 4. 建立连接并上传文件\n\
  \n点击书签。你应该会进入一个新界面，显示文件和目录树。你通常会在名为 `public_HTML` 或 `www` 的目录中工作（有时两者都会列出，但指向同一个子目录）。\n\
  \n现在你可以上传文件了。`Cyberduck` 和 `FireFTP` 都允许你从本地目录拖放文件到要加载的远程目录。有关在服务器目录中设置 Drupal 的步骤，请参见第\
  \ 1 章；“实施”部分提供了详细信息。\n\n如果连接失败，请确认你已严格按照主机提供的信息输入了所有凭证。微小的偏差可能难以发现，但几乎总能解释问题所在（检查大写锁定键是否关闭，以及是否按所示输入了大写和小写字母）。安全协议也可能是问题的另一个来源。为了确保凭证输入正确，你也可以尝试不使用安全协议。如果你能通过普通的\
  \ `FTP` 成功连接，但无法使用安全协议连接，请就正确的设置联系你的主机。\n\n##### 5. 基本文本编辑器设置\n\n几乎每个程序员都有自己钟爱的基本文本编辑器，即使他们同时拥有功能完备的集成开发环境（`IDE`）和高端桌面出版工具。一个好的基础文本编辑器就像瑞士军刀一样方便。\n\
  \nWindows 机器的实际标准是 `Notepad++`（`sourceforge.net/projects/notepad-plus`）；Windows\
  \ 系统也自带`记事本`，在紧急情况下足以应付小型的编辑任务。如果你使用`记事本`，请务必使用 `UTF-8` 编码保存文档（参见`保存`对话框中的下拉菜单）。\n\
  \n对于 Mac，一个非常好的选择是 `TextWrangler`（免费但非开源）；Mac 系统也自带 `TextEdit`，可以设置为纯文本模式，并且功能可用。\n\
  \n使用基于 GUI 的文本编辑器的 Linux 用户可以尝试 `gEdit`。\n\n不要尝试使用 Microsoft Word、WordPad 或 OpenDoc\
  \ 等文字处理软件。服务器和浏览器很难轻松处理这些程序的输出。有时你会立即得到关于其缺点的反馈（页面显示不正确或收到错误消息）。最坏的情况下，你在自己的计算机上永远看不到问题，只有你的网站访问者会体验到由此产生的各种问题。\n\
  \n##### 7. 设置你的 FTP 客户端使用你的文本编辑器\n\n有时候，使用本地的文本编辑器修改位于远程开发或暂存服务器上的文件可能是最高效的完成工作的方式（请注意，不建议在生产服务器上这样做）。像\
  \ `Cyberduck` 和 `FireFTP` 这样的 `FTP` 客户端允许你将文件类型（包括图片）与合适的编辑程序关联起来。\n\n对于 `Cyberduck`：前往`编辑`\
  \ ![images](img/U001.jpg) `偏好设置`，点击`编辑器`选项卡，然后从列表中选择要使用的程序。如果程序未列出，请点击`添加程序`。\n\n\
  对于 `FireFTP`：右键单击 `FireFTP` 文件视图区域中的任意文件，选择`打开方式` ![images](img/U001.jpg) `添加程序`。在`扩展名`窗口下，点击`添加`，然后输入一个扩展名，例如\
  \ `.txt`。在扩展名高亮显示时，点击`程序`窗口下的`添加`。点击`浏览`并找到你的程序。输入一个名称（例如 `Notepad++`），然后点击`应用`。\n\
  \n#### 解压归档文件\n\n大多数现代操作系统都自带解压归档文件的工具。如果你在 Windows 上安装了命令行界面（例如本章前面提到的 `Cygwin`），推荐的软件包之一是\
  \ `unzip`。在终端中，命令看起来像 `$ unzip filename`。\n\n如果你没有命令行界面，从 `drupal.org` 下载的归档文件需要有一个与之关联的程序（参见图\
  \ 12–4），你可能需要下载一个。（双击归档文件即可打开；如果无法打开，系统会提示你选择一个程序来打开它）。一个用于解压常见归档类型的流行开源工具是 `7zip`（`sourceforge.net/projects/sevenzip/`）。\n\
  \n![images](img/1204.jpg)\n\n***图 12–4.** 当一个程序与归档文件正确关联时，归档文件通常会显示一个拉链图标。*\n\n\
  #### 服务器端任务与工具\n\n一旦你拥有了上述基本工具，接下来的任务就是设置数据库、上传文件并运行 Drupal 安装程序。本书的引言和第 1 章从总体上描述了这些任务。由于不同的主机提供不同的工具和方法来完成这些任务，我将在这里更详细地介绍几种常见的设置。主机提供的某些工具实际上可能会给\
  \ Drupal 带来关键问题，因此我们将简要探讨一些解决方法。如果你的主机提供一键安装，请跳到“规避一键安装程序”部分。\n\n![images](img/square.jpg)\
  \ **提示** 关于创建数据库的更多细节，请访问 `drupal.org/documentation/install/create-database`。\n\n\
  \n\n##### 使用 phpMyAdmin 设置数据库\n\n设置数据库其实相当简单。如果你的服务器可以直接访问广泛使用的开源数据库管理器 phpMyAdmin\
  \ 的数据库创建功能，那么只需以下几个步骤：\n\n1. 启动 phpMyAdmin，进入“权限”选项卡，点击“添加新用户”。\n2. 输入一个与你的项目和阶段相关的用户名（如果你创建多个数据库，使用易于识别的名称有助于在需要时快速定位）；请记下你使用的名称。\n\
  3. 主机选择“本地”，输入密码（或点击“生成”让系统为你创建一个）；记下密码——当你运行 Drupal 安装程序时，系统会提示你输入用户名和密码。\n4. 在标有“用户的数据库”的框中，选择“创建同名数据库并授予所有权限”，然后点击页面底部的“执行”。\n\
  5. 在左侧边栏中，点击你创建的数据库名称，然后进入“操作”选项卡。\n6. 将排序规则设置为 `utf8_general_ci`，然后点击“执行”。\n7.\
  \ 按照第 1 章所述，上传文件并启动 Drupal 安装程序。\n\n##### 使用向导和手动工具设置数据库\n\n主机提供商通常提供专用的数据库和用户创建工具，并禁用\
  \ phpMyAdmin 中的相关功能。在最好的情况下，主机会提供一个手动表单或向导，其要求的输入与上述步骤相同。\n\n##### 规避一键安装程序\n\n\
  在托管服务器上设置 Drupal 站点的最大陷阱很可能来自一键安装实用程序。如果它们存在，你通常被迫使用它们。不幸的是，它们经常引入完全可以避免的问题，而且这些问题相对难以发现和修复。Fantastico\
  \ 和 SimpleScripts 就是这类广泛使用的工具。它们各有各的问题。更令人困惑的是，手动/向导方法通常与一键安装程序同时可用。当两种方法都可用时，手动/向导方法通常也会导致安装无法正常运行。最佳变通方案似乎是使用一键安装工具。它会建立数据库、用户以及所需的非\
  \ Drupal 文件。然后，你可以删除安装程序创建的 Drupal 文件和表，并继续执行正常安装。\n\n以下是当你被迫使用一键安装实用程序时的变通步骤：\n\
  \n1. 按照主机商的指示安装 Drupal；当它指示你为此版本创建一个新的子目录时，给它一个易于识别的名称（例如 `fantastico-drupal7`）。\n\
  2. 安装完成后，按照一键安装程序的指示启动站点；确保安装运行正常（你将看到第 1 章中所示的前端页面）；如果无法正常运行，请联系主机商寻求支持。\n3. 确认安装正常后，使用你的\
  \ FTP 客户端将你自己的 Drupal 发行版放入另一个目录（例如 `public_HTML`），如第 1 章所述。\n4. 导航到安装脚本创建的子目录（即我在步骤\
  \ 1 中建议命名为 `fantastico-drupal7` 的目录）；在该目录中，导航至 `sites/default/settings.php`；打开该文件；并记下数据库名称、用户名、密码、主机和端口，如图\
  \ 12–5 所示。\n\n    ![images](img/1205.jpg)\n\n    **图 12–5.** 显示连接信息的 `settings.php`\
  \ 文件，运行 Drupal 安装程序时需记下这些信息\n\n5. 接下来，启动 phpMyAdmin，点击左侧边栏中你从 `settings.php` 记下的数据库名称。\n\
  6. 滚动到数据库表列表的底部，点击“全选”；在旁边标有“选中项”的下拉菜单中，选择“删除”，然后确认你的选择。\n7. 点击“操作”选项卡，将排序规则设置为\
  \ `utf8_general_ci`，然后点击“执行”。\n8. 按照本书第 1 章所述启动 Drupal 安装程序，并输入从 `settings.php`\
  \ 中记录的连接信息。\n\n### 总结\n\n在本章中，我们探讨了设置开发环境的几种可能方法。本章的大部分内容聚焦于两种构建高级工具集的方法，这些工具集能显著提高效率，但学习曲线也相对陡峭。本章的最后一部分（你最基础的开发环境）介绍了一种极大简化的设置方案，适合偶尔使用、初学者和非编程人员。我们涵盖了选择、注册和配置虚拟主机账户及域名注册的基础知识。通篇涉及最佳实践以及针对开发和共享虚拟主机已知问题的变通方案。更多与开发环境相关的主题信息，请参阅本书网站\
  \ [`www.dgd7.com`](http://www.dgd7.com)。\n\n"
- "# 第 13 章\n\n![images](img/squ.jpg)\n\n## 上线网站与部署新功能\n\n**作者：Benjamin Melançon 和\
  \ Stefan Freudenberg**\n\n如果只有你能看到，你的 Drupal 网站就没有发挥其最大价值。如果它出了问题而你又无法恢复，那将非常糟糕。如果你需要让网站离线一周来添加复杂的新功能，那也不太好。本章涵盖如何让你的网站上线、如何进行备份，然后浅涉\
  \ Drupal 部署主要功能的新领域。\n\n\n\n### 将网站上线\n\n您的网站值得在互联网上亮相。本节将概述将网站上线（或称“发布”）的步骤，这些通用步骤适用于任何可用的软件环境。我们将逐一解释每个步骤，并提供适用于任何正经配置的命令行操作。如果部署次数超过几次，您会希望将这些步骤自动化。目前\
  \ Drupal 社区对于最佳方式尚未形成共识，但我们仍会提供一些技巧并指向一些最佳实践资源。\n\n将网站从本地计算机或开发服务器迁移到线上 Web 服务器可分为五个步骤：\n\
  \n1. 导出数据库\n2. 将网站代码副本、用户文件及导出的数据库传输至服务器\n3. 在服务器上导入网站数据库\n4. 在服务器上创建或编辑网站的 `settings.php`\
  \ 以配置数据库设置\n5. 将域名的访问流量指向服务器上的网站根目录\n\n这些步骤可在任何平台上通过不同工具完成，例如图形化数据库程序和 SFTP 软件。同样，任何构建工具（如\
  \ `rake` 或 `ant`）均可执行步骤 2 至 4。\n\n![images](img/square.jpg) **提示** 在选择网站托管服务商时，请务必选择允许通过\
  \ SSH 访问主机服务器的服务商。关于推荐的托管商，可参见 `dgd7.org/deploy` 的在线说明与资源。\n\n现在我们来看 Linux、Mac OS\
  \ X 或 Cygwin 环境下的具体命令行步骤。即使您尚未搭建好开发环境，这些步骤也同样适用。在服务器端，命令基于典型的 Debian 或 Ubuntu 系统配置；若您自行搭建服务器，请参考\
  \ `wiki.debian.org/LaMp`。\n\n当您需要管理多个网站时，肯定会希望将流程脚本化。部署脚本通常需要根据您的托管环境、开发工作流和具体需求来定制。（例如，我所在\
  \ Drupal 团队不断演进的最佳实践记录在 `data.agaric.com/deploying-the-agaric-way`）。Aegir（重度依赖 Drush）是一套\
  \ Drupal 部署解决方案（即用 Drupal 来部署 Drupal），拥有庞大、悠久且持续发展的社区。这是一套自由软件托管系统，用于自动化部署和管理网站相关的常见任务。相关信息与下载请访问\
  \ `aegirproject.org`。\n\n![images](img/square.jpg) **提示** 关于 Drush 如何优化部署工作流，请参见第\
  \ 26 章中的“使用远程命令通过 Drush 部署站点”一节。\n\n#### 1. 导出数据库\n\n截至目前，本书一直指导您在本地计算机上安装和运行网站。若要将您添加的任何网站内容配置一并迁移到线上，首先需要导出数据库。\n\
  \n![images](img/square.jpg) **注意** 此第一步仅适用于首次上线操作。在大多数情况下，将开发数据库导出并替换现有线上数据库都是错误的。如果您尚未使用第\
  \ 2 章提及或本章后续描述的工具备份线上站点，这将无异于一场*灾难性*错误。\n\n在以下命令中，核心操作是 `mysqldump`。其余命令仅用于指定数据库的临时存放位置。\n\
  \n当从网站根目录或使用别名运行时，Drush 命令 `drush sql-dump` 可帮您省去查找数据库连接信息的步骤。\n\n```\n##### 切换到项目文件夹\n\
  cd ~/code/dgd7\n##### 如果\"db\"（数据库）目录尚未创建：\nmkdir db\n##### 导出数据库，其中 dgd7 为数据库名称\n\
  mysqldump -udgd7 -pdgd7 dgd7 > db/development.sql\n```\n\n`mysqldump` 命令所使用的选项说明如下：\n\
  \n* `-u` 指定数据库用户名，可紧跟用户名（此处为 `dgd7`）。\n* `-p` 指定数据库密码，可紧跟密码（此处为 `dgd7`）。\n* 单独出现的词（`dgd7`）为数据库名称。您可以从本地网站的\
  \ `settings.php` 文件中获取这些值。\n\n![images](img/square.jpg) **注意** 如需了解更多 `mysqldump`\
  \ 命令的用法，可在类 UNIX 系统（Linux、Mac OS X、Cygwin）的命令行中输入 `man mysqldump`。`man` 是手册（manual）的缩写，可用于获取几乎所有命令的详细信息。\n\
  \n#### 2. 传输至服务器\n\n这一步无需多言：将网站代码、相关用户文件以及导出的数据库从开发环境迁移到线上服务器。远程文件复制程序安全复制（`scp`）即可胜任。\n\
  \n```\nscp -r ~/code/dgd7 username@host.example.com:/var/www/\n```\n\n![images](img/square.jpg)\
  \ **提示** 不要忘记传输 `.htaccess` 文件；作为以点号开头的“隐藏”文件，它很容易被遗漏。\n\n##### 设置文件目录权限\n\n迁移代码库和用户文件后，需要确保用户文件目录具有写入权限。`scp`\
  \ 命令在将网站代码和导出的数据库传输到 `/var/www` 时创建了 `dgd7` 目录，因此登录服务器后，您可以进入该目录方便地访问这些文件。（请注意，这里假设您部署的是以用户\
  \ `www-data` 身份运行的 Apache Web 服务器。）\n\n```\nssh username@host.example.com\ncd /var/www/dgd7\n\
  chown -R www-data:www-data web/sites/default/files\nchown -R www-data:www-data private_files\n\
  ```\n\n后一命令仅适用于创建了私有文件目录的情况，并且应在您选择创建私有文件目录的位置执行（该目录应位于 Web 根目录之外）。\n\n#### 3. 在服务器上创建数据库并导入\n\
  \n在您的主机服务器上，登录系统创建新数据库，并将传输的数据库转储文件导入其中。\n\n![images](img/square.jpg) **注意** 您的主机服务商很可能提供用于创建数据库用户和数据库的控制面板。\n\
  \n我们将数据库用户和数据库本身都命名为项目名称，本例中为 `dgd7`。\n\n```\nssh username@host.example.com\nmysqladmin\
  \ -u root -p create dgd7\nmysql -u root -p -e \"GRANT ALL ON `dgd7`.* TO 'dgd7'@'localhost'\
  \ IDENTIFIED BY 'S3cUr3p4s5w0rD'\"\n```\n\n执行上述两条命令后，系统会提示您输入 MySQL root 密码。最好不要将密码直接写在命令中，否则这个重要密码会保存在服务器\
  \ Shell 命令历史记录里。在本例中，第三条命令为新数据库设置了密码“S3cUr3p4s5w0rD”，您随后将使用该密码、以及数据库用户名和数据库名称来导入数据库。\n\
  \n如果您已按照“设置文件目录权限”一节中的步骤操作，那么您已登录到主机服务器并位于目录 `/var/www/dgd7` 中，因此前面步骤中使用的数据库目录 `db`\
  \ 就在此处。\n\n```\nmysql -h localhost -u dgd7 -pS3cUr3p4s5w0rD dgd7 < db/development.sql\n\
  ```\n\n用于导入数据库的 `mysql` 命令与导出时 `mysqldump` 的参数相同，但多了一项：`-h` 用于指定主机，即数据库所在的服务器。通常数据库会与系统其他组件位于同一台服务器上，因此可以使用\
  \ `localhost`。请注意，尖括号的方向发生了变化——可以将其理解为将数据库文件传入命令中。\n\n\n\n#### 4. 在 `settings.php`\
  \ 中设置数据库\n\n你的 Drupal 站点已基本准备就绪，可以上线。代码已部署到生产服务器上，用户文件也已随同传输，数据库也已加载完毕，现在只需要告知站点数据库的相关信息即可。\n\
  \n你可以手动编辑 `settings.php` 来使用这些值，也可以通过浏览器访问站点来让 Drupal 为你自动设置（前提是 `settings.php`\
  \ 的文件权限允许这样做），例如：\n\n`http://example.com/install.php`\n\n若要手动编辑该文件，可以使用以下命令在 vim\
  \ 中打开它，然后跳转到正确行（约第 181 行）并进入插入模式：\n\n```\nvi sites/default/settings.php\n:181\n\
  i\n```\n\n将相关部分（`$databases = array()` 这一行）修改为类似如下内容：\n\n```\n$databases['default']['default']\
  \ = array(\n  'driver' => 'mysql',\n  'database' => 'dgd7',\n  'username' => 'dgd7',\n\
  \  'password' => 'S3cUr3p4s5w0rD',\n  'host' => 'localhost',\n  'prefix' => '',\n\
  );\n```\n\n![images](img/square.jpg) **提示** 请注意，你定义的数组是两层嵌套的（通常每层都使用键名 'default'）！这并不是\
  \ Drupal 最初提示你的简单 `$databases = array()`；这是一个双重嵌套的数组，你最好从一开始就用 `$databases['default']['default']\
  \ = array( ... );` 这种形式。第一个 default 表示这是默认数据库，而非额外的数据库；第二个 default 表示这是主（master）数据库，而非辅助（slave）数据库。\n\
  \n每个自动化工具都必须执行到目前为止描述的步骤。我们假设你已经有了一个可正常运行的 Web 服务环境，因此初始部署这一节，最后一步是：告知你的 Web 服务软件站点文档根目录的位置。我们不涉及的前提条件包括能够解释或运行\
  \ PHP 的模块（例如，对于 Apache 而言，如 `mod_fcgid` 或 `mod_php`）。\n\n#### 5. 将你域名的传入流量指向服务器上的站点\n\
  \n这一步是将访问你域名的访客引导至你的站点。这意味着需要配置你的 Web 服务器软件（最常见的是 Apache），使其与之前步骤中 Drupal 的对应位置和设置相匹配。不过，在访客能够通过一个公共地址（网站域名）访问你的站点之前，需要满足几个先决条件。\n\
  \n*   首先，你需要一个域名，你可以通过域名注册商购买（完整的注册商列表请参见 `icann.org/en/registrars/accredited-list.html`）。\n\
  *   其次，你需要为你域名的域名系统（DNS）设置，使其指向你控制的名称服务器。你的名称服务器可以由你的注册商、主机提供商或专门的 DNS 服务提供。\n*\
  \   最后，名称服务器需要告知你的域名指向你服务器的互联网协议（IP）地址。\n\n![images](img/square.jpg) **注意** 在告知你的域名使用新的名称服务器后，可能需要长达两天的时间才能完成解析（开始生效）。如果你从同一家公司购买主机服务和域名（不推荐这么做），那么这些步骤可能已经为你完成了。\n\
  \n一旦所有条件都满足，你就可以配置 Web 服务器软件，将对你的域名的传入请求发送到包含站点 Web 根目录的文件夹。在本例中，该文件夹是 `/var/www/dgd7/web`。（Drupal\
  \ 的代码在第 1 章中被放置在了 `dgd7` 目录下的子目录 `web` 中。）\n\n![images](img/square.jpg) **注意** 与你在\
  \ Drupal 中要做的许多事情一样，托管网站有多种方式。即使你的主机使用的是 Apache，它也可能提供了一个图形用户界面或命令行工具来自动化部分或全部即将执行的任务，所以请先寻找简便的解决方案！\n\
  \nApache 是最常用的 Web 服务器；和 Drupal 一样，它也是自由软件。Apache 将访客引向你的网站的一种常见方法是使用虚拟主机配置。这些配置可以写成独立的文件，每个网站一个，并添加到\
  \ `/etc/apache2/sites-available` 目录下（在 Debian 系统中）。你可以创建一个新文件，并使用 Vim 编辑器（参见附录 I）通过命令\
  \ `vi /etc/apache2/sites-available/dgd7`（其中 dgd7 可以是任何便于你识别站点的文件名）开始编辑，并在其中放入类似代码清单\
  \ 13-1 中的内容。\n\n***代码清单 13–1.** 为 definitivedrupal.org 提供的示例 Apache 虚拟主机配置文件*\n\n\
  ```\n<VirtualHost *:80>\n     ServerAdmin webmaster@agaricdesign.com\n     ServerName\
  \ definitivedrupal.org\n     ServerAlias www.definitivedrupal.org dgd7.org www.dgd7.org\
  \ definitivedrupal.mayfirst.org\n     DocumentRoot /var/www/dgd7/web\n     <Directory\
  \ />\n        Options FollowSymlinks\n        AllowOverride None\n     </Directory>\n\
  \     <Directory /var/www/dgd7/web>\n        Options Indexes FollowSymLinks\n  \
  \      AllowOverride All\n        Order allow, deny\n        allow from all\n  \
  \   </Directory>\n</VirtualHost>\n```\n\n可以使用命令 `sudo a2ensite dgd7`（其中 dgd7 是你在\
  \ Apache 的 `sites-available` 目录中创建的文件名）在 Apache 的 `sites-enabled` 目录中创建指向该文件的符号链接。\n\
  \nApache 必须重新加载其虚拟主机配置文件后，这些配置才会生效。这些文件中的任何一个错误都可能导致 Apache 提供的所有网站失效，因此我们强烈建议你先进行测试（此处为第一个命令）：\n\
  \n```\nsudo /usr/sbin/apache2ctl -t\nsudo /etc/init.d/apache2 reload\n```\n\n第二个命令会重新加载你的配置，现在你应该能够通过你的域名看到你的网站了！有关\
  \ Apache 虚拟主机的更多信息，请访问 `apache.org/docs/current/vhosts`。\n\n请注意 `AllowOverride`\
  \ 指令，它允许 Drupal 自带的 `.htaccess` 文件向 Apache 提供 Drupal 正常运行所必需的指令。\n\n![images](img/square.jpg)\
  \ **注意** 你可能已经注意到，在示例 Apache Vhost 文件中列出的一个服务器别名是 `definitivedrupal.mayfirst.org`，它并不是站点的公共域名。这允许你在任何人通过其常用域名访问你的站点*之前*，测试本节中完成的所有配置。这在替换现有站点时尤其有用。这个特定的域名和子域名是由我们的主机提供商\
  \ May First People Link 为每个项目设置的，但你可以自行设置，甚至可以设置一个子域名（如 `livetest.definitivedrupal.org`）指向你的服务器以实现此目的。\n\
  \n你的网站已上线！现在（或者更早！）该考虑备份了，很快就要部署更新和新功能了。\n\n\n\n### 继续操作前，请先备份\n\n*“另一个致命错误是不备份你的网站。”*\n\
  \n*——杰夫·罗宾斯（来自 Lullabot 播客）*\n\n凯伦·史蒂文森立即补充道，每个人都犯过这个错误，而且大多数人都有惨痛的经历。请允许我们帮助你避免这种命运。如果你在这一节中什么也不做，至少设置好第\
  \ 2 章中介绍的`Backup and Migrate`模块（`drupal.org/project/backup_migrate`）。再次强调，如果你没有使用下文描述的基于服务器的备份方案，请在你所有的\
  \ Drupal 站点上设置`Backup and Migrate`模块。将其配置为每日备份，上传到你服务器上的某个位置和/或发送到你的邮箱。\n\n![images](img/square.jpg)\
  \ **提示** 不要跳过这一节。如果你还没有自动化备份，请在继续操作前先备份你的工作——然后设置你的工作环境和服务器，使备份自动化。\n\n如果你正在构建任何你希望再次见到的东西，你需要备份它。如果你不相信这一点，去问任何经历过服务器故障、用户或开发者错误、或遭受过攻击且未备份的网站的开发者。甚至，去问问任何丢失过电脑或硬盘报废的人。\n\
  \n持续备份你的工作对任何网页开发者来说都是一项基本实践。如第 2 章所介绍以及第 14 章所详述的那样，无论你是下载模块来构建网站、编写主题还是编写模块，通过使用版本控制，你都可以高枕无忧，并享受流畅的创作过程。\n\
  \n然而，比你的代码更重要的是，使用你网站的人所创作和放置的文字、图片、故事和事实。这些内容是一种神圣的信任；你能对用户做的最糟糕的事情就是丢失他们所有的数据。而这实际上，是非常糟糕的。不要这样做。\n\
  \n备份数据库和文件。如果你配置了私有文件目录，无论你将私有文件放在哪里，都不要忘记也备份它们。做任何你需要做的事情，以确保所有数据和文件都定期备份，并在本地和另一台电脑上保存。服务器故障、用户或开发者错误、或对你的网站的攻击都可能意味着备份失败会付出极高的代价。\n\
  \n![images](img/square.jpg) **注意** 一个扩展了 Drush 的数据库备份工具是 DGB，即 Drush Git Backup。它提供用于备份\
  \ Drupal 数据库的 Drush 命令，使数据库的每个表都成为一个单独的文件。这种方法更适合将数据库导出添加到版本控制（Git 部分），因为你可以通过 `git\
  \ diff` 命令查看表中的变化（某些表比其他表更有查看价值）。它还改进了 Drush 对 `cache_*` 表的处理，方便地排除了这些表中不需要包含在任何备份中的数据。DGB\
  \ 可在 GitHub 上获取：`github.com/scor/dgb`。\n\n在 `drupal.org/node/22281` 可以查看更多备份网站的选项。接下来，我们将介绍一种经过验证的方法，配合一个便捷的工具\
  \ Backupninja。\n\n### BACKUPNINJA\n\nBackupninja 允许你在 `/etc/backup.d` 中放入简单的配置文件来协调系统备份。它精通多种技艺，包括增量远程文件系统备份和\
  \ MySQL 备份。在使用 Debian 软件包管理工具的系统中，你可以通过执行 `apt-get install backupninja` 来安装它。\n\n\
  ![images](img/square.jpg) **注意** 对于没有 Debian 软件包管理器的 Linux 系统，你可以通过其项目页面 [`https://labs.riseup.net/code/projects/show/backupninja`](https://labs.riseup.net/code/projects/show/backupninja)\
  \ 获取 backupninja。\n\n运行 `man backupninja` 会提供一些基本信息；最值得注意的是，它会提到一个名为 ninjahelper\
  \ 的小程序。它有一个简单的用户界面，当你首次启动时会提供以下两个基本功能：\n\n*   new 用于创建新的备份操作\n*   quit 用于退出 ninjahelper\n\
  \n一个涉及数据库转储、系统配置和远程存储的基本设置，需要创建三个操作：\n\n*   sys\n*   mysql\n*   rdiff（确保包含前面提到的所有相关目录）\n\
  \n最后一个选项需要在远程机器上拥有一个具有 ssh 访问权限的用户帐户。非常有用的 ninjahelper 会创建并复制一个 ssh 公钥，安装所需的软件包，并为你留下一个可用的备份配置。\n\
  \n#### 测试备份\n\n如果你无法恢复数据，那你的网站就没有真正被备份。找到你的备份位置（如果你使用了前面提到的 backupninja 设置，所有配置都将在你的\
  \ `/etc/backup.d` 目录中指定）。\n\n同时决定你需要哪种类型的恢复。如果发生灾难性事件时，你可以在几小时到一天内手动恢复所有内容，那你就只需要知道所有东西在哪里。如果无论发生什么，你都需要非常快速地恢复，那么你需要准备一个随时可用的备份服务器，并编写恢复脚本。\n\
  \n![images](img/square.jpg) **提示** 这与备份完全无关，但另一种会让客户或其他网站用户因数据丢失而恼火的情况是，他们在网站上输入了一篇精彩的论文，结果（网站或他们的浏览器）出了问题。不要在浏览器窗口中直接撰写任何重要的内容，并告诉其他人也避免这样做。在你的文本编辑器或文字处理器（如\
  \ MS Word 或 OpenOffice.org）中编辑你的宝贵作品，然后复制粘贴到表单中。使用像 Firefox 或 Chrome 这样努力保护你数据的浏览器，也能让你省心不少。\n\
  \n当然，你的网站并不是唯一需要备份的东西。正如下一章所述，将你的编码区域包含在你的个人电脑的整体备份中。如果你还没有备份你的个人电脑，现在就是开始的时候了。毕竟，现在不仅仅是珍贵的个人笔记、无可替代的照片和潜在的敲诈材料了；我们说的是真正宝贵的\
  \ Drupal 代码。\n\n\n\n### 暂存与部署\n\n所谓暂存与部署，是指将网站开发的所有工作（包括开发和内容）集中到一个可预览的位置（暂存站点），然后将其迁移到所有人都能完整欣赏的线上网站（部署）的过程。\n\
  \n关键在于：当线上网站每天有用户使用，且可能有多人共同参与开发时，如何实现这一流程。\n\n![images](img/square.jpg) **注意：**\
  \ 将第 6 章中所述的安全措施和错误修复应用到线上站点，是部署中的一个特殊情况，也是本文所述内容中最简单的一种情况；只需更新代码并运行`update.php`（在暂存环境测试后），即可部署这类更新。此流程将在下文说明。\n\
  \nDrupal 的暂存没有标准方法，而是有多种方式。最佳方式取决于网站项目的具体需求。根据我们的经验，最常见的需求是为已上线的网站添加功能。建议采用“一切皆代码”的方法来部署新功能：区分内容与配置，并将配置以代码形式进行版本控制，使其能轻松在不同环境（如本地电脑与暂存/线上环境）之间迁移。\n\
  \n![images](img/square.jpg) **提示：** 在 Drupal 社区中，即使是 Deploy 模块（`drupal.org/project/deploy`）的作者\
  \ Greg Dunlap，也不认为 Drupal 7 中的部署问题已完全解决。他和其他人都认为我们能在 Drupal 8 中解决此问题。Deploy 模块不在此处详述；它尤其适用于需要同时将内容和配置从暂存站点推送至线上站点的情况。对于需要频繁发布内容、在暂存站点预览大量内容后再推送到线上站点的用户而言，Deploy\
  \ 模块至关重要。\n\n##### 方法\n\n本节所述的方法基于以下假设：\n\n- 具备胜任能力的 Drupal 开发者\n- 简洁的发布工作流（关键点：无需对内容进行暂存）\n\
  \n在这种情况下，我们建议采用“一切皆代码”的开发方式，即使用 Features 模块套件来自动化大部分功能开发，将线上数据库视为最终权威，并使所有对数据库的开发影响都可测试、可重演。\n\
  \n在此方法中，线上站点的数据库始终保持权威性、正确性，且无需进行合并。配置所需的数据库更改可以先在暂存站点以可测试的方式重演，然后再应用到线上站点。\n\n\
  如果你已经有一个正在维护的 Drupal 站点，*不需要*回头将现有配置全部迁移到代码中。开发工作将始终基于线上工作数据库的副本进行。这意味着新功能必须通过代码来实现对数据库的所有更改。\n\
  \n和所有重度依赖数据库的应用一样，Drupal 在更新方面也存在一些陷阱。这是一种有利有弊的架构设计。将“一切皆代码”应用于一个核心遵循“一切皆通过 Web\
  \ 操作”哲学的应用中，会面临挑战，但正如你即将看到的，Drupal 社区正在积极应对。\n\n#### 工作流\n\n基于上述方法，一个典型的工作流如下所示：\n\
  \n1.  复制线上数据库，并在本地使用。\n2.  通过代码（模块、主题等）添加功能或更改外观。所有通过点击操作完成的更改必须导出，或以其他方式生成可被代码捕获的形式。\n\
  3.  针对步骤 2 中的代码，使用一份新的线上数据库副本来测试，如果编写了更改数据库的代码，则运行 `update.php`。你可以在暂存服务器上执行此操作，供他人查看和评估。\n\
  4.  在线上站点上，直接应用步骤 3 中测试过的代码更新，并立即运行任何必要的数据库更新。\n\n![images](img/square.jpg) **提示：**\
  \ 为了随时知道自己正在查看的是哪个站点，可以使用环境指示器模块（`drupal.org/project/environment_indicator`）。\n\n\
  所有内容的更改和新增、用户的操作以及用户账号本身，都源自线上站点。所有代码更改（包括通常由站点构建管理员完成并导出为代码的操作）都源自开发站点。数据库和用户文件会在质量保证（QA）、测试或暂存站点上与代码汇合，进行质量保证和测试，然后再一同部署到线上站点。图\
  \ 13-1 展示了这一流程。\n\n![images](img/1301.jpg)\n\n***图 13-1.** “所有配置在代码中，所有内容更改在线上”的代码与数据库/文件流动示意图*\n\
  \n此设置的一个关键在于，本地开发环境可以多次复制（每位开发者一个），而代码和数据流以及工作流程保持不变。这得益于*裸仓库*，它是一个共享仓库，你和其它开发者可以推送和拉取代码更改。暂存和线上站点应仅拉取更改。本章稍后的“将代码更改从开发环境迁移到暂存环境，再到线上环境”一节将对此进行讨论。\n\
  \n还能在线上直接进行配置更改吗？当然可以。这里描述的是推荐的最佳实践，而非一成不变的定律。一种常见的混合方法是：在开发环境中构建内容类型和视图，然后导入到线上环境，但其他许多更改和微调则直接在线上完成。但请注意，线上的配置更改迟早会给你带来麻烦：线上可能出现问题，而你却不知道原因。参与站点维护的人越多，发生这种情况的可能性就越大。如果回滚到前一晚的快照备份的代价越高，这个问题就越严重。另一方面，你越是将所有配置更改都纳入代码，执行效率就会越高；同样地，越多的人采用此方法，社区工具就会越完善。后续的“如何实现‘一切皆代码’”一节将介绍其中一些工具。\n\
  \n#### 将内容从生产环境迁移到开发环境（以及暂存/QA 环境）\n\n“上线你的站点”一节中的相同命令在此同样适用。导出和导入数据库即可。Drush（`drupal.org/project/drush`）能更好地完成这项工作；详见第\
  \ 26 章。别忘了使用`rsync`来传输用户文件。\n\n尽量在你的环境中将此操作整合为一个命令。为减少线上服务器的额外负担，你可能希望自动化夜间数据库导出，或直接使用最近的备份副本，而不是每次同步生产环境到开发和暂存环境时都直接导出线上数据库。关键在于让它足够简单，以便开发者能经常使用。数据库应始终被视为属于线上环境，任何你想保留的更改都必须通过代码来捕获。\n\
  \n![images](img/square.jpg) **注意：** 演示模块（`drupal.org/project/demo`）可以通过重新加载数据库来帮助你测试代码更改的工作流。\n\
  \n\n\n### 将代码变更从开发环境迁移到预发布环境，再到生产环境\n\n你的代码变更不一定要很大——你或许只是简单更新了核心代码或贡献代码（如第 7 章所述）。但首先必须在开发站点上完成。因此，请在本地开发环境中的网站上先下载更新或进行代码变更。然后将这些变更提交到本地仓库，推送变更到共享仓库，再拉取变更到预发布或质量保证站点进行测试。当一切验证通过后，代码变更即可上线。\n\
  \n此场景的关键点是所有环境都指向同一个仓库。该仓库可由 [`http://gitorious.org`](http://gitorious.org) 或 [`http://github.com`](http://github.com)\
  \ 等第三方服务托管，你也可以自行创建并将其放在自己的服务器上。\n\n#### 搭建你自己的中央仓库\n\nGit 是一个分布式版本控制系统，这意味着它不需要中央仓库——无论你将项目带到哪里，它都携带着完整的版本历史记录。\n\
  \n然而，为了将代码从一台服务器推送到另一台服务器，以及为了团队协作，创建一个中央参考点可能非常有价值。\n\n你可以通过对项目仓库（在第 2 章中已建立）进行裸克隆来实现这一点。这里的“裸”指的是仅包含仓库本身——即\
  \ `.git` 目录中那些对人来说毫无意义的文件，而不包含其周围的工作副本。\n\n在本地开发环境中，运行 `git clone --bare` 命令，并将生成的文件夹（带有\
  \ `.git` 后缀，是一个文件夹而非文件）移动到服务器上（该服务器已配置为可通过 `git.example.com` 地址访问，并且存在 `/srv/git`\
  \ 目录）。\n\n```\ngit clone --bare ~/code/dgd7 dgd7.git\nscp -r dgd7.git you@git.example.com:/srv/git/dgd7.git\n\
  ```\n\n你的新中央仓库可能已经准备就绪，但你可以在服务器上额外执行一些操作，以确保它在任何情况下都能正常工作。\n\n```\nssh you@git.example.com\n\
  cd /srv/git/dgd7.git\ngit init --bare --shared\ngit update-server-info\n```\n\n\
  要将这个新的外部仓库与本地计算机上的原始项目关联起来，请执行以下操作：\n\n```\ncd ~/code/dgd7\ngit remote add origin\
  \ git\n```\n\n要在另一台计算机上访问你的项目，包括将其部署到预发布或生产服务器，请执行以下操作：\n\n```\nssh you@test.example.com\n\
  cd /var/www\ngit clone you@git.example.com:/srv/git/dgd7.git dgd7\n```\n\n这将在 `dgd7`\
  \ 文件夹中为你提供一个包含工作副本的仓库。有关如何在服务器上放置裸 Git 仓库的更多信息，请参阅 Pro Git 书籍中的第 4 章.2（[`http://progit.org`](http://progit.org)）。\n\
  \n一切设置完成后，用于将你的变更添加并提交到本地版本控制并推送到共享仓库的命令非常简单。一旦你完成了你认为需要对代码做的任何操作（更多内容将在后续章节中介绍），你就可以像这样将其推送到中央仓库：\n\
  \n```\ngit add -A\ngit commit -m \"将 pathologic 模块更新到最新的安全版本。\"\ngit push\n```\n\
  \n请注意，`git add -A` 会捕获你所做的所有更改（添加、编辑或删除的文件），并准备提交它们。使用 `git status` 查看你准备提交的内容（并在提交前使用\
  \ `git reset` 撤销 `add` 操作）。\n\n这会将你的代码推送到与之关联的远程仓库。如果它关联了多个仓库，你可能需要在 push 命令中指定它（例如，`git\
  \ push origin master`）。\n\n现在，代码已准备好在新的环境中进行测试。首先，从生产站点同步数据库（手动操作，如“将你的网站上线”部分所述，或使用\
  \ Drush），并使用 `rsync` 命令将用户创建的文件也从生产站点同步过来。接下来，将代码变更转移到你的测试站点（仓库的一个克隆和工作副本）。你可以使用类似以下的命令：\n\
  \n```\nssh you@test.example.com\ncd /var/www/dgd7\ngit pull\n```\n\n![images](img/square.jpg)\
  \ **注意** 如本章中的每个步骤一样，你可以在 `data.agaric.com/deploying-the-agaric-way` 查看一个 Drupal\
  \ 工作室实践中（不断演进的）辅助脚本示例。\n\n如果代码变更包含需要运行的数据库更新，请不要忘记访问 `update.php`，例如 [`http://test.example.com/update.php`](http://test.example.com/update.php)。（即使是安全版本，更新核心和贡献代码也可能需要更新数据库中的某些内容，因此如果你不完全确定，请在你的站点上访问\
  \ `update.php` 进行检查。）\n\n当所有内容都检查通过后，你可以像在测试站点上所做的那样，在生产环境上应用代码变更（继续使用源码控制作为部署工具，或使用\
  \ `rsync` 进行上线），并运行 `update.php`。\n\n### 如何实现“一切尽在代码中”\n\n本章概述的方法是将你希望对站点所做的所有变更导出或以其他方式捕获到代码中。这确实需要一些工作——尽管这里提到的工具和技术可以减少工作量——但其好处是巨大的。\n\
  \n- 代码可以进行版本控制，并且存在成熟的方法来使用版本控制工具解决代码不同版本之间的冲突。你可以查看谁在何时做了什么更改。\n- 质量保证环境使你能够精确测试将变更应用到生产环境时会发生什么。\n\
  - 分离配置和内容意味着你的更新不会覆盖生产站点上的用户活动。\n\n简而言之，你应该尽可能将每一条*配置*项都捕获到代码中。在 Drupal 中，有一项运动旨在使配置可导出，并且他们已成功为现代\
  \ Drupal 配置中最重要的元素实现了这一理念：内容类型、字段和视图。可以说，大多数菜单、区块和分类法都可以被视为配置，因此应将其交由代码控制，而非生产站点上的用户界面。Chaos\
  \ Tools 项目（`drupal.org/project/ctools`）为我们带来了*可导出项*的清晰概念，以及帮助其他模块导出其配置的工具。其中大部分功能已由\
  \ Features 项目进一步自动化，这是大多数人将配置纳入代码的最便捷方式，因此将在接下来进行介绍。\n\n\n\n#### 特性\n\n`Features`项目（`drupal.org/project/features`）并非将站点配置放入代码的唯一方法。即使在单个\
  \ Drupal 团队中，有些团队可能只使用更新钩子（下一节介绍），有些则可能使用`Features`模块。然而，业界普遍认为，使 Drupal 配置可导出是稳健部署解决方案的关键部分，而`Features`正在推动这一过程的自动化。\n\
  \n在`Features`世界中，“feature”一词的不同变体具有不同的含义，理解这些区别很重要。本书采用官方定义：\n\n- **Features**：Drupal\
  \ 模块，允许将配置捕获到代码中。\n- **Feature**：一个模块，包含一组执行特定功能的 Drupal 组件。\n- **feature**：你希望网站实现的功能。\n\
  - **features**：你希望网站实现的一组功能。\n\n*“是的，很抱歉。当时这看起来是个好主意。”*\n——Jeff Miccolis，*Development\
  \ Seed，关于 Features 的术语*\n\n用句子说明这些术语：一个`Feature`模块（由`Features`模块创建）通常包含一组紧密相关的`features`。有关从`feature`到`Feature`模块并部署到其他站点的典型工作流程，请参见图\
  \ 13-2。\n\n![images](img/1302.jpg)\n\n***图 13-2.** 从 feature 到 Feature 模块*\n\n对于相对简单的网站，Drupal\
  \ 开发人员可以选择只为整个站点创建一个`Feature`模块。这个单一的站点级更新`Feature`会随着站点一起演变。对于复杂站点，多个开发人员可以使用独立的自定义`Feature`模块。然而，`Features`的真正理想目标是创建一个可共享的`Feature`模块，它封装了可在多个站点上部署的有用功能和配置。有关制作可共享`Feature`的最佳实践，请参阅`Kit`规范（`drupal.org/project/kit`）。\n\
  \n**提示** 与特定功能相关的主要新开发应在专用的自定义模块中进行，或者更好的做法是，在`drupal.org`上贡献一个模块。使用`Features`管理内容类型、视图以及站点特定的其他元素，并不妨碍你将其中可泛化使用的元素通过独立的模块进行导出和存储。你制作的这些额外模块可以依赖并需要使用`Features`，也可以不依赖。无论哪种情况，它们都会被站点级`Feature`模块所依赖，以保持所有组件紧密关联。\n\
  \n`Features`和 Drupal 7 核心在导出内容类型、字段、权限、输入过滤器、菜单项、图像样式和分类法词汇方面表现得相当不错。如有必要，你也可以自己将几乎任何其他内容挂接到`CTools`的可导出框架中。这样，你可以使其他模块或自定义模块的数据库存储配置也变得可导出。（对于贡献模块，请先在其问题队列中查看其他人的进展！）额外的模块可以增强`Features`的导出和恢复能力。特别是，同样需要`CTools`的`Strongarm`模块（`drupal.org/project/strongarm`），可被模块（包括`Features`模块）用来导出和覆盖存储在经常使用且易滥用的*variable*表中的设置。\n\
  \n所有这些让你能够像往常一样通过管理界面配置 Drupal 站点（创建内容类型、使用这些内容类型的视图、这些内容类型中的字段在不同视图和视图模式中使用的图像样式等），然后使用`Features`的\
  \ UI 或`Drush`，将所有配置导出到代码并放入一个`Feature`模块中。\n\n**提示** `Features`模块允许你通过图形用户界面实现自动化处理，而这原本需要大量自定义编码。你在本地进行更改，`Features`会将你的更改导出为代码，放入一个特殊的`Feature`模块中。\n\
  \n指示一个`Feature`使用其在代码中的内容被称为*reverting*一个 feature。从本章工作流程的角度来看，这个说法容易混淆，因为我们实际上是在更新。`Features`之所以称之为*reverting*，是因为使用`Feature`模块的已保存配置会恢复到代码中的状态；但因为你没有在线上站点通过用户界面进行任何更改，这始终导致一次更新，而非你通常理解的“回滚”。\n\
  \n#### 编写更新钩子\n\n这是作为`Features`方法的替代方案提到的，但实际上它们是互补的。导出功能通常仍然不一致且不完整，但你可以通过自己的自定义代码来补充导出功能和`Features`生成的模块。\n\
  \n这种方法的核心思想依然是相同的：所有更改都在模块中编码。你为每次更改编写自己的更新代码。每个影响数据库的新更改都应该放在`hook_update_N()`函数中，并且相同的更改也应放在`hook_install()`或`hook_schema()`中以保持同步。关于更新钩子的基础知识，请参阅`api.drupal.org/hook_update_N`。\n\
  \n**提示** 我们强烈建议，即使你完全使用`features`，也编写一个更新钩子，通过`features_revert()`来触发该 feature。\n\
  \n在更新钩子中，尽量使用 API，而不是直接调用数据库。（但请注意，对于以编程方式创建内容，像`node_save()`这样的 API 函数并不总能完美处理所有内容；有时可能需要伪造一个表单数组并使用`drupal_form_submit()`提交。）\n\
  \n**注意** 任何可以通过提交表单在模块中完成的操作，都应该可以通过一行代码实现。事实上，处理表单的`submit`函数应该始终使用`API`函数来保存更改。不幸的是，Drupal\
  \ 核心尚未达到此目标，因此你有时必须退而求其次，伪造表单并使用`drupal_form_submit()`，而不是使用合适的 API 函数。例如，`node_save()`目前无法接受自由标签的分类法术语，除非在`drupal_form_submit()`的上下文中调用。\n\
  \n依赖关系必须非常小心地按正确顺序处理。请记住，更新代码会为禁用的模块运行，在这种情况下，你必须显式加载此模块中不在其`.install`文件中的任何所需代码。首先，使用`ifmodule_exists()`检查模块是否已启用。\n\
  \n本章不深入探讨使用`Feature`模块或编写更新钩子的细节。后者将在第 24 章模块开发的上下文中介绍。有关更新和资源，请访问`dgd7.org/deploy`；有关使用`Features`和更新钩子为站点添加功能的示例，请关注`dgd7.org/anjali`。\n\
  \n\n\n##### 在生产环境中创建、编辑和审核内容\n\n本章的方法要求所有内容变更都在实时站点上进行，必要时借助 Drupal 作为 CMS 的强大修订审核功能，而不要尝试从预览站点部署内容变更（在此工作流中，预览站点并非用于内容创建或配置，而是用于将生产站点的数据库与开发站点的代码进行联合测试）。\n\
  \n本章讨论的方法将预览内容排除在外。直接在实时站点上操作。使用预览站点来确认将编码化的开发变更应用到生产数据库副本后能按预期运行，然后将代码变更上线并启用功能/运行`update.php`。\n\
  \n针对在实时站点上“预览”内容（在公开前进行创建、编辑或审核），有几种扩展 Drupal 内容管理能力的主内容选项。例如，修订审核模块（`drupal.org/project/revision_moderation`）允许编辑内容，但编辑内容在审核通过前不会公开。（在撰写本文时，该模块正在移植到\
  \ Drupal 7 中。）\n\n另一个保护实时内容免遭破坏的模块是路径重定向模块（`drupal.org/project/path_redirect`）。路径重定向确保即使\
  \ Pathauto 模块因标题变更等原因修改了内容的路径，旧路径仍能重定向到新 URL。\n\n如果您的发布需求要求内容在独立站点上预览，我们再次推荐您使用部署模块（`drupal.org/project/deploy`）。无论如何，如果开发或预览站点已生成或即将生成大量内容，则可能需要使用\
  \ Deploy、Feeds（`drupal.org/project/feeds`）或 Migrate（`drupal.org/project/migrate`）模块。\n\
  \n节点导出模块（`drupal.org/project/node_export`）也可行，它能生成可通过`update.php`在更新钩子中运行的代码，用于导入导出内容。若采用此方式，可使用\
  \ Pathologic 模块（`drupal.org/project/pathologic`）来修正内容中的绝对路径。\n\n##### 需要功能支持的页面或内容区块\n\
  \n包含大量功能的页面和区块可通过`hook_menu()`和回调函数创建，而非以节点形式实现。请参阅`api.drupal.org/hook_menu`和第\
  \ 29 章。\n\n![images](img/square.jpg) **提示** 如果启用了 PHP 过滤器模块，请尝试禁用它。PHP 过滤器模块不应被用于在节点（内容）页面提供功能。从代码质量和部署角度考虑，都应避免这种做法。若要在页面或页面局部放置功能（而非内容），请使用\
  \ Drupal 的`hook_menu()`、`hook_block()`或`hook_page_build()`。\n\n您可以让内容与功能配合存在——即通过代码创建内容——但当内容之间存在关联时（例如主键问题），这种方法会带来麻烦。这是\
  \ Drupal 8 的优先事项，目前正在对通用唯一标识符（UUID）进行大量研究。\n\n#### 开发工作流总结\n\n开发工作流有很多种可能。关键是要保护生产数据并进行测试，同时确保所有协作者理解并遵循相同的方法。一个基本的开发工作流包括：从实时站点拉取内容和用户数据（如果有的话），在本地添加功能和修复错误，将变更后的代码推送到预览站点供他人测试，只有在测试通过后，才能将其推送到实时站点。\n\
  \n- 新功能被添加到现有模块或新模块中。此功能的数据库相关部分通过 Features 模块导出（并提交到模块中），或以更手动的方式编码到模块中。\n- 其他开发者可以从开发者仓库（或中央仓库）拉取代码，在开发环境中通过浏览器运行`update.php`，即可获得一个可运行的站点版本。\n\
  - 在开发过程中，会定期重新导入生产数据库的新副本，但特别需要注意的是：在更新代码并在实时站点上运行`update.php`之前，要先获取一份新副本，并在预览站点上用更新后的代码和运行过的`update.php`进行质量保证，而**不要**进行任何手动配置变更。\n\
  - 如有必要，可为数据库配置的协作创建共享开发环境（在这些变更被导出到代码之前），但预览站点应仅用于质量保证。\n\n![images](img/square.jpg)\
  \ **提示** 使用 Jenkins 持续集成工具（`jenkins-ci.org`）为你的开发设置测试（部分工作可实现自动部署到预览站点）。可参考`groups.drupal.org/node/47686`了解面向\
  \ Drupal 的配置。（注意：Jenkins 在 2011 年之前被称为 Hudson；它依然是同一款软件，但为了保持其作为自由软件项目的独立性而更名。）\n\
  \n### 总结\n\n这只是部署方法之一。“一切皆代码”的理念最受喜欢开发模块的人欢迎，但 Features 项目使其对偏好网站构建者角色的人来说也是一个合理的方法。\n\
  \n![images](img/square.jpg) **注意** 请参阅`dgd7.org/deploy`上的读者评论和更新后的资源链接。要了解代码驱动部署原则的实际应用，请关注`dgd7.org/anjali`上的\
  \ Anjali 项目。\n\n我们鼓励您根据自己站点的需求和团队的工作流来考虑部署方案。您可能会发现此处概述的方法的变体效果最佳，或者您可能发现完全不同的替代方案更可取。这是\
  \ Drupal 领域中充满活力和潜力的领域，参与的人越多，效果就越好。请访问`groups.drupal.org/build-systems-change-management`上的打包与部署小组，关注关于在\
  \ Drupal 7 及更高版本中开发更好部署工具和技术的相关讨论。\n\n## 以人为中心的开发心态\n\n**作者：Károly Négyesi**\n\n\
  本书旨在为您提供理解 Drupal 的工具，帮助您利用它完成卓越的工作，并回馈 Drupal 社区。本章将助您不仅高效工作，更能从中获得乐趣。\n\n### 使用版本控制\n\
  \n简而言之，版本控制会在您每次发出指令时存储文件副本，从而允许后续恢复。当然，它通过仅存储变更来更高效地存储文件。它还提供许多其他功能，但就本节而言，仅“后续恢复”功能至关重要。\n\
  \nDrupal.org 上的代码仓库已迁移到现代的版本控制系统 Git（[`http://git-scm.com`](http://git-scm.com)），我推荐使用它。使用\
  \ Git 跟踪工作非常简便，只需运行一次以下代码片段：\n\n```\ngit init .\ngit add .\ngit commit -m 'Initial\
  \ commit.'\n```\n\n此外，每次保存时，运行`git commit -a -m \"something\"`。“something”是一条消息，内容无关紧要，无需担心。您还可以通过系统命令自动输入日期（`git\
  \ commit -a -m \"'date'\"`），或定义键盘快捷键。重要的是，您可以毫不费力地保留每一次工作修订版本。（毫不费力这一点的重要性将在后文体现。）\n\
  \n在更理想的世界中，操作系统会自动执行此操作；但现实往往并非如此。当您达到一个里程碑时，请撰写有意义的提交消息，以便您希望能与他人共享工作成果。但频繁提交并非为了共享，而是为了确保您可以回退到任何先前的状态。请学习`git\
  \ bisect`以了解如何找到错误发生的修订版本。有关 Git 的更多信息，请参阅第 2 章。\n\n\n\n### 备份\n\n应使用 `mysqldump`（`dev.mysql.com/doc/refman/5.5/en/mysqldump.html`）或备份与迁移项目（`drupal.org/project/backup_migrate`）来生成\
  \ SQL 转储文件。SQL 转储是文本文件，因此您也可以将其提交到 Git 中。实际上，无论您处理的是何种文本文件，都可以将其纳入版本控制！\n\n您的网站可能包含文件，因此也请务必备份它们。Windows\
  \ 和 Mac OS X 有图形界面工具（Windows 备份和 Time Machine）可实现此功能；Linux 则有一些命令行工具（`tar` 和 `rsync`）可供使用。我推荐使用\
  \ r1soft（`r1soft.com`）提供的免费和商业产品。\n\n### 自由实验\n\n即使您从本书中一无所获，也请记住这一点：自由实验。这是成为一名成功网络开发者的关键要素。不要害怕——您不会搞坏任何东西。这正是我不断使用版本控制并定期备份的原因。切勿在生产服务器上工作；搭建开发环境非常重要且并不困难（这也是第\
  \ 12 章的重点）。\n\n我经常在 IRC 或其他论坛上看到有人问“如果……会怎样？”好吧，告诉您一个好消息：不会有什么严重问题！最坏的情况，您会收到一条错误信息。如果收到，请移除过于具体的内容（如\
  \ Drupal 的本地路径），然后将错误信息扔到 Google 中搜索，找出其发生原因。自由实验不仅意味着针对某个问题尝试各种策略，也包括进行网络搜索。\n\n\
  网络搜索只需不到一秒钟，您做得再多也不为过。搜索某个内容，查看结果，基于结果重新组织搜索词，迟早会找到您要找的东西。这是一个迭代过程，掌握它的唯一方法就是大量实验。\n\
  \n这不仅适用于搜索，也适用于一切事物。“终身学习”意味着持续学习。如果您学到的东西现在用不上，将来也可能有用。我的座右铭是“没有学到新东西的一天就是虚度的一天。”\n\
  \n另一方面，不要死记硬背！谷歌能记住的死记硬背的知识比我们能记住的多得多，而且它持续学习的速度远超任何人类。相反，要学习模式；学习对搜索有用的词汇。在这个无所不在的网络搜索时代，“知识”本身的含义正在改变。如果您能熟练运用搜索引擎这一武器，只需在脑中携带必要知识的骨架；血肉则可通过快速搜索来填充。\n\
  \n自由实验是进入“心流”状态的一步。心流是一种奇妙的状态，根据米哈里·契克森米哈赖的说法，在这种状态下，心灵会“完全为了活动本身而投入其中。自我意识消失。时间飞逝。每一个动作、每一个行动、每一个思绪都不可避免地从前一个中衍生出来，就像演奏爵士乐。您的整个身心都参与其中，并且将技能发挥到极致。”进入心流令人愉悦，并能带来卓越的表现。描述这种心理状态的表达包括“沉浸当下”、“进入状态”、“得心应手”和“全神贯注”。\n\
  \n我们并非说您应该始终处于心流状态，也不建议一直努力追求心流（那样反而可能无法达到）。而是说，要安排好事情，让心流得以自然发生。唉，虽然没有简单的配方，但以下几点肯定有帮助：\n\
  \n*   **明确的目标**。如果您在一个定义清晰的项目上工作，这很容易实现。（这也是为什么好的规格说明对成功至关重要！）如果规格说明有问题，将其分解成本身清晰的任务。\n\
  *   **集中注意力**。我建议听音乐来帮助集中注意力。它可以让你进入状态，并掩盖其他干扰性的噪音。\n*   **享受直接即时的反馈**。这就是为什么网络程序员更容易进入心流状态的原因：直接和即时的反馈是我们职业的固有特征。保存代码，在浏览器中按刷新键，然后——哒哒！*即时*在这里很重要；等待代码编译或测试完成不符合这种模式。\n\
  *   **让活动既不太容易也不太困难**。这在工作环境中很难实现。当这种情况发生时，您就自认幸运吧。\n*   **对情境或活动有个人掌控感**。还记得我之前说的把问题分解成任务吗？这样做会给您一种掌控感。不按固定时间表工作也有帮助。\n\
  *   **活动本身就有内在回报，因此行动毫不费力**。您是否曾因为代码运行成功而欣喜若狂？\n\n### 贡献力量\n\n为开源项目做贡献可能不会让您每两周收到一次薪水，但它会以其他方式让您受益。首先，如果您想要金钱，社区就在那里，所以您的专业网络会扩大，从而带来更多工作机会。在\
  \ Drupal 领域尤其如此，对优质工作者的需求远超供应（目前如此，但供需极不平衡，预计这种情况将持续相当长一段时间）。\n\n其次，同行评审为您提供了学习的机会。这是开源为何如此伟大机遇的原因之一——我们一起学习。\n\
  \n第三，我们是社会性动物。归属一个社区并得到同行的赞赏对每个人都很重要。\n\n第四，回顾一下上面的心流清单！在处理自己的问题时，您有明确的目标，所以选择一个可完成的（但仅仅是可完成）任务。当然，您对整个过程拥有完全的个人掌控。\n\
  \n最后，虽然没有薪水可领，但这本身就是一种内在回报。\n\n那么，您该如何贡献力量呢？贡献有多种形式（市场营销、活动组织等），但我想要强调的两种是文档和代码。\n\
  \n文档最好由那些刚刚达到理解某个主题程度的人来撰写。一旦您对某样事物了如指掌，就需要非同寻常的天赋才能回想起初学时难以理解的地方。因此，当您在努力理解某个东西时，把遇到的问题记录下来。最后，写出您学到的答案，您就拥有了一篇手册页面。它可能不够流畅，可能包含不太标准的英语。别担心。清理一篇手册页面比撰写一篇容易得多。\n\
  \n代码贡献通常以编写补丁或审查补丁的形式进行。两者都非常重要。您可以进入任何项目页面，点击“开放问题”链接，然后修复一个现有 bug 或审查一个补丁。有一些优秀的手册页面可以帮助完成这个过程，网址是\
  \ `drupal.org/patch`、`drupal.org/patch/apply` 和 `drupal.org/handbook/git`。\n\n再次强调，不要试图提出完美的解决方案。先做出能用的东西，然后与社区合作。请注意，很多补丁审查很简短，且不太中听；请记住，负面的批评是针对您的代码，而不是您本人！我们爱每一位贡献者。花时间审阅他们的贡献本身就是一种欣赏，因为时间是开源社区最稀缺的资源。\n\
  \n即使您不写代码，也可以对问题队列做出有价值的贡献。您可以打开一个 bug 报告，检查它是否包含足够的信息以供重现。如果没有，将其标记为“需要更多信息”。如果有，尝试重现它。如果无法再重现，将其关闭为“已修复”。我们需要很多人来做这件事，这样那些更熟悉\
  \ Drupal 的人——比如您读完本书、付诸实践并投入时间后——就能专注于解决真正的问题。\n\n关于这一点以及更多为 Drupal 做贡献的方式，请参见第\
  \ 38 章。\n\n![images](img/square.jpg) **提示** 关于从人类思维模式进行开发的更多讨论，请访问 `dgd7.org/think`。\n\
  \n## 第四部分\n\n![images](img/squ.jpg)\n\n\n\n"
- '# 前端开发


  **第 15 章**和**第 16 章**将带你全面了解如何使用 Drupal 的主题系统，以强大且可维护的方式改变网站的外观。


  **第 17 章**将介绍前端开发的另一个关键部分，即通过 JavaScript 提升网站访客体验，特别是功能强大、相对易用甚至有趣的 jQuery 库。


  另请参阅**附录 D**，其中涵盖了为 Drupal 进行设计的相关内容。


  '
- "# 第 15 章\n\n![images](img/squ.jpg)\n\n## 主题制作\n\n**作者：Jacine Luisi**\n\nDrupal\
  \ 的主题层以及使用它的主题，决定了 Drupal 网站的外观与感觉。优秀的主题包含你在任何正规网站上都能找到的所有元素，包括符合标准的 XHTML 标记、CSS\
  \ 和 JavaScript。而将这些元素整合在一起的方式正是 Drupal 主题如此灵活和强大的特别之处。\n\nDrupal 主题可以简单，也可以复杂，完全取决于你的需求。主题对页面的几乎每一个方面都拥有最终决定权和绝对控制权。与\
  \ Drupal 本身一样，主题既灵活又强大。诚然，充分利用 Drupal 的主题层意味着要克服相当陡峭的学习曲线，并且如果对底层机制没有大致了解，很容易在早期就犯错。\n\
  \n在本章中，你将了解 Drupal 主题层的基本方面。你将学习如何以可持续的方式进行自定义和修改，以及常见任务的最佳实践。你将很快走上创建灵活且可持续的自定义\
  \ Drupal 主题的道路！下一章将基于本章内容，介绍 Drupal 主题更高级的复杂细节。\n\n本章及下一章中的一些示例可以在 DGD7 主题中找到。如果你想跟着学习，可以从[`https://github.com/jacine/dgd7`](https://github.com/jacine/dgd7)下载。\n\
  \n### 核心主题目录\n\n刚开始时，人们通常做的第一件事就是导航到核心的`/themes`目录，查看主题文件以了解其总体结构和内容。不幸的是，许多人会犯一个错误，即直接自定义核心主题。请不要犯这个错误！他们通常在不久后就会遇到阻碍并感到沮丧。Drupal\
  \ 拥有庞大且多样化的用户群，核心 Drupal 主题的主要目标是迎合大众需求。\n\n撇开美观不谈，核心主题需要满足许多要求和不同的使用场景。少数主题支持颜色模块，以便网站管理员可以轻松地在用户界面中更改配色方案。这并非坏事；然而，当尝试自定义配色主题时，这很容易变得令人困惑和沮丧，因为\
  \ CSS 是通过程序生成的，并且存储在主题目录之外。核心主题如果用作管理主题也必须能正常运行，并且必须支持双向文本；总的来说，它们不能偏离 Drupal 默认的区域和设置太远。\n\
  \n取悦所有人并不容易，而 Drupal 核心主题正肩负着这一艰巨任务。因此，核心主题远没有它们本可以做到的那样灵活或前沿。大多数情况下，你在创建自定义主题时的目标和方式会截然不同。你将能够专注于编写自己的前端或后端设计代码，自定义标记，决定使用哪些\
  \ CSS 文件（如果有的话），以及其他令人兴奋的决策。\n\n#### 核心主题\n\nDrupal 核心包含四个主题。下面各节将对它们进行介绍。\n\n#####\
  \ Bartik\n\nBartik 是 Drupal 7 新增且受欢迎的主题。安装 Drupal 后，Bartik 被设为面向用户的默认主题。它是一个简洁明了的主题，支持颜色模块，并出色地利用了区域（参见**图\
  \ 15-1**）。除了 Drupal 推荐的默认区域外，Bartik 主题还有七个自定义区域，用于在页脚和子页脚中布置区块。\n\n![images](img/1501.jpg)\n\
  \n***图 15-1.** Bartik 是一个简洁明了的主题。*\n\n##### Garland\n\nGarland 最初作为核心主题亮相于 Drupal\
  \ 5。它是一个更复杂的主题，具有出色的颜色模块支持（参见**图 15-2**）。它包含十五种配色方案，并提供了在固定或流式布局之间切换的选项。\n\n![images](img/1502.jpg)\n\
  \n***图 15-2.** Garland 是一个更复杂的主题，具有出色的颜色模块支持。*\n\n##### Seven\n\n同样是 Drupal 7 新增的，Seven\
  \ 是 Drupal 的默认管理主题。Seven 诞生于 Drupal 7 用户体验项目（[`http://d7ux.org`](http://d7ux.org)），它推动了\
  \ Drupal 用户界面的许多改进。它包含很少的区域，因为其重点是执行管理任务（参见**图 15-3**）。\n\n![images](img/1503.jpg)\n\
  \n***图 15-3.** Seven 是 Drupal 的默认管理主题。*\n\n##### Stark\n\nStark 是一个独特且名副其实的最小化 Drupal\
  \ 主题（参见**图 15-4**）。它的主要目的是暴露 Drupal 的默认 HTML 标记和 CSS。它不提供任何模板文件，除了放置默认侧边栏区域的基本布局样式外，几乎不提供任何\
  \ CSS。不要被它的简单性所迷惑；它实际上非常有用。Stark 是开发者在为其模块编写 CSS 时进行编码的完美主题。它还能帮助主题开发者排查问题，当他们不确定问题是出在自己的主题还是其他模块上时。\n\
  \n![images](img/1504.jpg)\n\n***图 15-4.** Stark 是一个独特且名副其实的最小化 Drupal 主题。*\n\n####\
  \ 主题引擎\n\nDrupal 的主题目录下还有一个引擎目录，其中包含一个名为 PHPTemplate 的主题引擎。主题引擎提供了一种简便的方法，可将可主题化的输出分离到模板文件中，而不是纯\
  \ PHP 代码中。使用 PHPTemplate 引擎的主要好处是简化了逻辑与表现的分离。那些不熟悉 PHP 的人也能完成大量工作，因为他们可以在主要包含标记和打印变量的模板文件中操作。\n\
  \n虽然也可以使用其他主题引擎，如 Smarty、XTemplate 和 PHPTal，但 PHPTemplate 是 Drupal 的默认主题引擎，也是迄今为止\
  \ Drupal 主题（以及许多流行的贡献模块）使用最广泛的主题引擎，因此我们将在本章中介绍它。也可以编写纯 PHP 的 Drupal 主题。关于纯 PHP 主题的示例，请参阅\
  \ Chameleon 主题，网址为[`http://drupal.org/project/chameleon`](http://drupal.org/project/chameleon)。有关可用主题引擎的完整列表，请访问[`http://drupal.org/project/theme+engines`](http://drupal.org/project/theme+engines)。\n\
  \n### 主题管理\n\n主题配置任务位于 Drupal 管理后台的外观部分。在这里，你可以控制诸如启用或禁用哪些主题、应用哪些设置、使用哪种配色方案（如果你的主题支持颜色模块）等项目。\n\
  \n\n\n#### 启用并设置默认主题\n\n在全新安装的 Drupal 7 中，默认主题（Bartik）会出现在“外观”页面的顶部，随后是其他已启用和已禁用的主题（参见图\
  \ 15–5）。什么是默认主题？在 Drupal 中，仅仅启用一个主题是不够的。将一个主题设置为默认主题，才能使其成为前台主题（即网站访问者将看到的主题）。\n\
  \n![images](img/1505.jpg)\n\n**图 15–5.** 默认安装中显示已启用主题的“外观”页面\n\n当你希望网站同时使用多个主题时，启用一个主题但不将其设置为默认主题会很有用。此设置通常在与贡献模块结合使用时更为实用。一个例子是\
  \ SwitchTheme：[`http://drupal.org/project/switchtheme`](http://drupal.org/project/switchtheme)模块，它允许用户通过从已启用主题列表中选择主题名称来更改网站主题。\n\
  \n#### 管理主题\n\n在 Drupal 7 中，Seven 是默认的管理主题。执行所有管理任务时都会使用管理主题，这些任务大多发生在`/admin`路径下。你还可以选择在编辑网站内容时允许使用管理主题。尽管某些主题对\
  \ Drupal 管理界面的支持比其他主题更好，但如有需要，任何 Drupal 主题都可以用作管理主题。\n\n管理主题的配置设置位于`admin/appearance`页面上主题列表的下方。要在\
  \ Drupal 网站的前端和后端使用相同的主题，只需在“管理主题”选项中选择“默认主题”即可。\n\n#### 全局主题设置\n\nDrupal 自带一些可以在管理界面中配置的主题设置。大多数网站身份资产以及一些其他杂项设置都在此处定义。位于`admin/appearance/settings`的“全局设置”页面包含了这些设置。保存全局设置后，这些设置将应用于所有主题。每个主题也有自己的“设置”页面，可通过`admin/appearance`页面上每个已启用主题旁边的“设置”链接访问。当在单个主题的“设置”页面上应用主题设置时，这些设置会覆盖全局设置。以下各节将详细介绍这些设置的具体内容以及你在主题中会发现它们的位置。\n\
  \n这些设置中有相当一部分决定了变量是否被填充，从而是否在模板文件中被打印输出。图 15–6 中展示的设置代表了 Drupal 提供的默认设置。主题可以通过在主题的`.info`文件中定义特性（features）来覆盖这些设置，这将在“定义主题元数据”一节中进一步讨论。在`.info`文件中指定特性时，你需要确保包含所有你想要支持的特性，因为只要指定一个特性就会覆盖\
  \ Drupal 提供的所有默认设置。以下是这些设置在`.info`文件中的快速参考：\n\n```\nfeatures[] = logo\nfeatures[]\
  \ = name\nfeatures[] = slogan\nfeatures[] = favicon\nfeatures[] = main_menu\nfeatures[]\
  \ = secondary_menu\nfeatures[] = node_user_picture\nfeatures[] = comment_user_picture\n\
  features[] = comment_user_verification\n```\n\n![images](img/1506.jpg)\n\n**图 15–6.**\
  \ 全局设置页面\n\n##### 标识\n\n默认情况下，Drupal 会在主题目录的根目录下查找名为`logo.png`的文件。你也可以选择指定一个不同的文件路径作为标识，并能够上传一个标识来使用。当“标识”复选框被选中时，一个名为`$logo`的变量会被填充为标识的路径，该变量将在`page.tpl.php`中可用。如果未选中，则不会打印输出标识。\n\
  \n##### 网站名称和标语\n\n网站名称在安装过程中定义。网站名称和标语都可以在`admin/config/system/site-information`页面上更改。在主题的“设置”页面上，你可以切换它们的可见性。两者在`page.tpl.php`中分别以`$site_name`和`$site_slogan`的形式提供。\n\
  \n##### 快捷图标\n\n快捷图标（也称为网站图标）是出现在大多数浏览器的地址栏、书签和标签页中的小 Drupal 图标。与标识一样，其可见性可以切换，并且可以使用自定义文件。默认文件是`misc/favicon.ico`。\n\
  \n##### 文章和评论中的用户头像\n\n这些设置控制`node.tpl.php`中的`$user_picture`变量和`comment.tpl.php`中的`$picture`变量是否被填充，从而控制查看节点和评论时是否显示头像。\n\
  \n##### 评论中的用户验证状态\n\n此选项会在未经验证账户的用户名旁边显示“（未验证）”。此文本在`template_preprocess_username()`中定义，并在`theme_username()`中以`$variables['extra']`形式打印输出。请参阅“预处理和处理函数”及“主题函数”章节，了解如何更改此设置。\n\
  \n##### 主导航菜单和辅助导航菜单\n\n当“主导航菜单”和“辅助导航菜单”的复选框被选中时，`page.tpl.php`中的`$main_menu`和`$secondary_menu`变量会被填充为包含每个菜单链接的数组。在位于`admin/structure/menu/settings`的菜单设置页面上，你可以为每个变量选择使用哪个菜单。默认情况下，可以在`admin/structure/menu/manage/main-menu`管理的主导航菜单，被用作填充`$main_menu`的源菜单。辅助导航菜单的源菜单默认是用户菜单，可以在`admin/structure/menu/manage/user-menu`管理。\n\
  \n这些是简单的单级菜单，在`page.tpl.php`中使用`theme_links()`函数（本章稍后会介绍）输出。这使得它们在设计复杂的导航样式时难以使用。由于通常需要复杂的导航，许多主题开发者会创建导航区域并使用区块来输出菜单，而不是使用这些菜单。我们强烈推荐\
  \ **菜单区块** 模块（[`http://drupal.org/project/menu_block`](http://drupal.org/project/menu_block)），它允许你非常轻松地完成几乎所有与菜单相关的需求。\n\
  \n##### 自定义主题设置\n\n自定义主题设置与全局主题设置类似，可以由主题和模块提供。在 Garland 主题的`garland.info`文件中可以找到自定义主题设置的一个例子。它创建了一个名为`garland_width`的设置，可以设置为固定宽度或流体宽度。快捷键模块也提供了一个设置，用于显示“添加或移除快捷键链接”，该链接在\
  \ Seven 主题中使用，以提供你在叠加层中标题旁边看到的图标。要了解如何为你的主题创建自定义主题设置，请访问：[`http://drupal.org/node/177868`](http://drupal.org/node/177868)\n\
  \n\n\n#### 安装新主题\n\nDrupal 会扫描其主题目录以查找可用的主题，因此将主题放置在正确的位置以供 Drupal 识别非常重要。你可能还想将主题添加到\
  \ Drupal 的 `/themes` 目录中，但从技术上讲，这被认为是“篡改核心”，应予以避免。下载并解压主题后，请选择以下目录之一来放置主题。使用这些目录之一将有助于确保你对\
  \ Drupal 本身所做的任何更新不会意外覆盖你的主题。\n\n- `sites/all/themes`：当你希望该主题在你的 Drupal 安装中所有站点都可使用时，请使用此目录。\n\
  - `sites/sitename/themes`：当你仅希望该主题在你多站点 Drupal 安装中的特定站点可用时，请使用此目录。\n\n你还可以使用主题安装程序来下载和安装贡献主题，方法是点击**外观**页面顶部的**安装新主题**链接。这将带你进入一个表单，你可以在其中输入项目下载包的\
  \ `.tar.gz` 文件链接，然后点击**安装**。主题安装程序将自动下载你的主题并将其放置在 `sites/all/themes` 目录中。完成后，你可以像往常一样在\
  \ `admin/admin/appearance` 页面上启用该主题。\n\n### 定义主题元数据（`.info` 文件）\n\n`.info` 文件（读作“dot\
  \ info files”）包含有关主题的重要元数据，例如主题名称、它支持的 Drupal 版本，以及主题将包含的样式表和区域等内容。编写 `.info` 文件通常是创建\
  \ Drupal 主题时采取的第一步。\n\n文件名的第一部分是主题的机器可读名称，Drupal 使用它来将有关主题的信息存储在数据库中。不允许使用连字符和其他特殊字符。虽然允许使用下划线，但最佳实践是避免在命名\
  \ `.info` 文件时使用它们。请使用 `themename.info` 而不是 `theme_name.info`。此名称还将用于在实现主题函数覆盖时为函数名称添加前缀。例如，在覆盖\
  \ `theme_menu_link()` 时，名为 `themename_menu_link()` 的函数被认为比 `theme_name_menu_link()`\
  \ 更容易阅读，以便确定正在执行的覆盖操作。\n\n![images](img/square.jpg) **注意**：你的主题（机器）名称必须是唯一的。请勿将主题命名为与任何现有模块相同的名称，因为这可能会导致命名空间问题，并使跟踪\
  \ PHP 错误变得困难。\n\n每个主题都需要在主题的 `.info` 文件中设置一些基本属性。`name`、`core` 和 `engine` 属性是所有\
  \ Drupal 主题的最低要求。以下各节包含每个可用属性的简要说明，后跟语法示例。\n\n![images](img/square.jpg) **提示**：要向\
  \ `.info` 文件添加注释，请在每行的开头添加分号，如下所示：`; 这是一条注释。注释很有用。请善加利用。`\n\n#### 必需属性\n\n> **核心：**\
  \ Drupal 仅在 `core` 设置支持当前主要版本的 Drupal 时才允许启用你的主题。主要版本如 `6.x`、`7.x` 或 `8.x` 等。\n\
  >\n> `core = 7.x`\n>\n> **名称：** 你主题的人类可读名称。它不需要与机器可读名称匹配或相似，因此你可以在此尽情发挥创意。\n>\n\
  > `name = 主题名称`\n\n#### 附加属性\n\n> **基础主题：** Drupal 允许主题之间建立关系。创建子主题可以让你继承基础主题的功能和资源（更多详情将在下一章介绍）。在创建子主题时，你需要指定基础主题。务必在此使用基础主题的机器名称。\n\
  >\n> `base theme = themename`\n>\n> **描述：** 此处应描述主题的基本特性或用途。该描述将显示在 `admin/appearance`\
  \ 页面中，可以包含 HTML。\n>\n> `description = 我主题的描述`\n>\n> **引擎：** 指定主题引擎。PHPTemplate 是默认且最常见的引擎，因此除非你想更改它，否则无需手动设置。其他选项包括\
  \ `smarty` 和用于纯 PHP 主题的 `theme`（示例请参见 [`drupal.org/project/chameleon`](http://drupal.org/project/chameleon)\
  \ 中的 Chameleon）。\n>\n> `engine = phptemplate`\n>\n> **功能：** 设置 `features` 是覆盖 Drupal\
  \ 默认全局主题设置的一种方式。以下是 Drupal 提供的默认主题设置列表。这些设置可以在每个主题的**设置**页面的管理界面中开启或关闭。即使只指定一项，也会禁用\
  \ Drupal 的默认设置并使用你的设置。\n>\n> ```\n> features[] = logo\n> features[] = favicon\n\
  > features[] = name\n> features[] = slogan\n> features[] = node_user_picture\n>\
  \ features[] = comment_user_picture\n> features[] = comment_user_verification\n\
  > features[] = main_menu\n> features[] = secondary_menu\n> ```\n>\n> **PHP：** Drupal\
  \ 7 支持 PHP 版本 5.2.5，默认情况下，你的主题也是如此。你可能永远不需要用到这个属性，但以防你的主题包含仅适用于特定 PHP 版本的代码，你可以在此处指定。\n\
  >\n> `php = 5.3`\n>\n> **区域：** 区域是页面布局中放置内容（区块）的部分。每个条目都以 `regions` 开头，并在方括号中包含区域的系统名称，其值为人类可读名称。例如，`regions[system_name]\
  \ = 人类可读名称`。默认区域如下所示：\n>\n> ```\n> regions[page_top] = 页面顶部\n> regions[header] =\
  \ 页眉\n> regions[highlighted] = 高亮区\n> regions[help] = 帮助\n> regions = 内容\n> regions[sidebar_first]\
  \ = 第一个侧边栏\n> regions[sidebar_second] = 第二个侧边栏\n> regions[footer] = 页脚\n> regions[page_bottom]\
  \ = 页面底部\n> ```\n>\n> **设置：** `settings` 属性保留用于主题中自定义设置的实现。**Garland** 主题为布局类型（固定或流动）提供了一个主题设置，站点管理员可以进行选择。虽然我们不涉及自定义主题设置，但我们强烈建议查看\
  \ Omega ([`drupal.org/project/omega`](http://drupal.org/project/omega)) 和 Fusion\
  \ ([`drupal.org/project/fusion`](http://drupal.org/project/fusion)) 主题，以了解如何使用主题设置。如需更多信息，请访问\
  \ [`drupal.org/node/177868`](http://drupal.org/node/177868)。\n>\n> `settings[garland_width]\
  \ = fluid`\n>\n> **截图：** Drupal 会自动在你的主题目录根目录中查找名为 `screenshot.png` 的文件，因此只有在你想为主题截图使用替代路径或文件名时才需要此行。建议的截图图像尺寸为\
  \ 294 x 219 像素。\n>\n> `screenshot = screenshot.png`\n>\n> **样式表：** 在 Drupal 7 中添加\
  \ CSS 文件有多种选项。对于希望在每个页面上加载的 CSS 文件，你需要通过主题的 `.info` 文件来添加样式表。我将在下一章的**管理 CSS 文件**部分中更详细地介绍这一点。\n\
  >\n> ```\n> stylesheets[screen][] = path/to/screen-stylesheet.css\n> stylesheets[print][]\
  \ = path/to/print-stylesheet.css\n> ```\n>\n> **脚本：** 可以使用 `scripts` 属性在 `.info`\
  \ 文件中定义 JavaScript 文件。与样式表类似，你应仅在此处加载需要在每个页面上加载的 JavaScript 文件。\n>\n> `scripts[]\
  \ = path/to/script.js`\n>\n> **版本：** 对于贡献主题和模块，不建议指定版本。这是因为 `drupal.org` 有一个打包脚本，会在创建版本时自动添加版本信息。不过，如果需要，你可以为自定义主题使用此属性。\n\
  >\n> `version = 7.x-1.1`\n\n\n\n#### 现在，让我们通过查看 DGD7 主题的 `.info` 文件来实际了解这些基础知识，如清单\
  \ 15–1 所示。\n\n***清单 15–1**. DGD7 主题 `.info` 文件的顶部部分*\n\n```\nname = DGD7 Theme\n\
  description = A theme written for The Definitive Guide to Drupal 7 book website.\n\
  core = 7.x\n```\n\n除 `core` 属性外，以上所有内容都可以在 `admin/appearance` 页面的用户界面中看到，如图 15–7\
  \ 所示。这就是开始使用你的主题所需的全部内容。\n\n![images](img/1507.jpg)\n\n***图 15–7**. 主题列表页面 `admin/appearance`\
  \ 上显示的 DGD7 主题。*\n\n**创建你的第一个主题！**\n\n结合你到目前为止所学到的知识，创建一个自定义主题。\n\n1.  首先，在 `sites/all/themes`\
  \ 中创建一个名为 `dgd7` 的新文件夹。\n2.  在 `dgd7` 文件夹内，创建一个名为 `dgd7.info` 的新文件，并在其中添加以下代码：\n\
  \    ```\n    name = DGD7 Theme\n    description = A theme written for The Definitive\
  \ Guide to Drupal 7 book website.\n    core = 7.x\n    ```\n3.  从章节源代码中获取 `screenshot.png`\
  \ 文件，并将其复制到 `dgd7` 目录中。这是一个可选步骤。如果未定义截图，你将看到文字“No screenshot”。\n4.  现在访问 `admin/appearance`\
  \ 并重新加载页面。你应该会在“已禁用主题”下看到此主题。点击“启用并设置为默认”链接，开始在你的网站上使用此主题。\n\n![images](img/square.jpg)\
  \ **提示** 你需要清除网站缓存，以使 `.info` 文件中的更改生效！要清除网站缓存，请访问性能页面 `admin/config/development/performance`。\n\
  \n### 使用区域\n\nDrupal 页面上的大多数内容都在区域内输出。典型的区域包括页眉、页脚、侧边栏和内容（参见图 15–8）；这些区域通常在定义 HTML\
  \ 标记的高级结构方面起着重要作用。每个区域的选项都会出现在 `admin/structure/block` 的区块界面中，允许网站管理员控制并定位其中的区块。\n\
  \n![images](img/1508.jpg)\n\n***图 15–8**. 区块管理页面上显示的 Bartik 主题的区域和区块放置选项*\n\n主题完全掌控着定义和确定打印及样式区域的位置。在\
  \ Bartik 主题中，示例如图 15–9 所示。\n\n![images](img/1509.jpg)\n\n***图 15–9**. 填充了自定义区块的\
  \ Bartik 区域*\n\n此外，主题也可以将区域用于不那么明显的用途，结合 JavaScript 或 jQuery。常见的区域用例包括包含模态或隐藏内容以增强用户界面，或将区块嵌入节点内容中。\n\
  \n#### 默认区域\n\nDrupal 核心默认定义了九个区域供主题以编程方式使用。清单 15–2 中的代码以 `.info` 文件格式复述了默认的核心区域。与大多数主题层实现一样，主题定义区域的原因是他们想要修改或补充默认设置。在主题定义自己的区域之前，Drupal\
  \ 将使用默认区域。这意味着，如果默认区域对你的设计来说已经足够，则无需在主题的 `.info` 文件中定义区域。\n\n***清单 15–2**. Drupal\
  \ 按时间顺序排列的九个预定义主题区域*\n\n```\nregions[page_top] = Page Top\nregions[header] = Header\n\
  regions[highlighted] = Highlighted\nregions[help] = Help\nregions = Content\nregions[sidebar_first]\
  \ = Sidebar First\nregions[sidebar_second] = Sidebar Second\nregions[footer] = Footer\n\
  regions[page_bottom] = Page Bottom\n```\n\n然而，一开始就将此代码包含在主题的 `.info` 文件中是一个好的实践。一旦你在主题中定义了一个区域，它将覆盖核心的默认设置，因此，保留完整的默认列表并注释掉你已禁用的区域（而不是完全删除或省略它们）是跟踪你如何处理这些区域的好方法。你需要其中一些区域，即\
  \ `page_top`、`content` 和 `page_bottom` 区域。这些是必需的，并且必须在每个 Drupal 主题中打印，以维护一个运行正常的网站。清单\
  \ 15–3 展示了如何在 `.info` 文件中组织区域的一个示例，其中考虑了默认设置。\n\n***清单 15–3**. 主题的 `.info` 文件中区域实现示例*\n\
  \n```\n; CORE REGIONS - DISABLED\n;regions[highlighted] = Highlighted\n;regions[help]\
  \ = Help\n;regions[header] = Header\n;regions[footer] = Footer\n\n; CORE REGIONS\
  \ - REQUIRED\nregions[page_top] = Page Top\nregions = Content\nregions[page_bottom]\
  \ = Page Bottom\n\n; CORE REGIONS\nregions[sidebar_first] = Sidebar First\nregions[sidebar_second]\
  \ = Sidebar Second\n\n; CUSTOM REGIONS\nregions[my_custom_region] = My Custom Region\n\
  ```\n\n![images](img/square.jpg) **提示** 如果你好奇 Drupal 在哪里定义了默认区域，请查看 http://api.drupal.org/_system_rebuild_theme_data\
  \ 上的 `_system_rebuild_theme_data()` 函数。\n\n如图 15–10 所示，Drupal 默认区域的预期显示是一个标准的三列布局。灰色区域是必需的，其余的是可选的。`Header`、`sidebar_first`、`sidebar_second`\
  \ 和 `footer` 是布局区域。`page_top` 和 `page_bottom` 是特殊区域；它们将在本章的“隐藏区域”部分讨论。\n\n![images](img/1510.jpg)\n\
  \n***图 15–10**. Drupal 的默认区域布局*\n\n`highlighted` 区域取代了旧的站点使命，后者曾经是一个包含站点使命陈述或简短摘要文本的静态变量，在\
  \ `page.tpl.php` 中手动输出。先前的实现由于一些原因并不理想，但主要是因为其显示仅限于首页。当时认为使用自定义区块来显示此信息是更好的选择，因此创建了\
  \ `highlighted` 区域。\n\n帮助区域曾经也是一个打印错误和状态消息的 `page.tpl.php` 变量。状态消息现在显示在一个名为“系统帮助”的区块中，并且创建了帮助区域来容纳它。但是，系统帮助区块可以很容易地放置在内容区域内，并设置其权重高于主要内容区块以获得相同的效果。\n\
  \n内容区域是 Drupal 7 中新增的。它被引入用来容纳主页内容区块，这个区块有些特殊，因为它可以在不同区域之间移动，但不能被禁用。由于区块模块是可选的，而主页内容区块的内容对于运行\
  \ Drupal 网站至关重要，该区块的内容将始终通过 `page.tpl.php` 中的 `$page['content']` 变量显示。\n\n因此，区块模块的某些功能可能无法如你预期的那样工作。如果你将主页内容区块放置在禁用区域，或者设置区块可见性设置使其从某个页面排除，区块模块的用户界面会让你相信它已被禁用。但是，内容仍然会显示。你还会注意到标记中的变化，这可能会导致不期望的结果，例如内容缺少样式，具体取决于你的\
  \ CSS 是如何编写的。\n\n\n\n#### 隐藏区域\n\n在图 15-8 所示的区块管理页面选项中，`page_top` 和 `page_bottom`\
  \ 区域明显缺失。这两个都是隐藏区域，Drupal 故意将其排除在用户界面之外，以便站点管理员无法交互或控制其内容。隐藏区域的主要作用是作为占位符，模块或主题可以通过结构化方式动态添加标记。主题可使用以下语法在\
  \ `.info` 文件中声明隐藏区域，每个区域单独一行：\n\n```\nregions_hidden[] = the_region_name\n```\n\n\
  `page_top` 和 `page_bottom` 区域都在 `html.tpl.php` 中输出（参见代码清单 15-4），不应被移除或重新排列。例如，工具栏模块利用\
  \ `page_top` 区域添加管理工具栏所需的标记，当用户以站点管理员身份登录时，该工具栏会显示在每个页面的顶部。`page_bottom` 区域的存在是为了让模块添加任何最终的闭合标记，这些标记需要位于页面最底部。以谷歌分析模块为例，它会添加用于加载追踪网站访客活动的\
  \ JavaScript 文件的标记，并且需要最后加载。`page_bottom` 区域取代了先前 Drupal 版本中使用的 `$closure` 变量。\n\
  \n***代码清单 15-4**. `html.tpl.php` 的内容，突出显示 `page_top` 和 `page_bottom` 区域的位置*\n\n\
  ```\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML+RDFa 1.0//EN\"\n  \"http://www.w3.org/MarkUp/DTD/xhtml-rdfa-1.dtd\"\
  >\n<html xml:lang=\"<?php print $language->language; ?>\" version=\"XHTML+RDFa 1.0\"\
  \ dir=\"<?php print $language->dir; ?>\"<?php print $rdf_namespaces; ?>>\n<head\
  \ profile=\"<?php print $grddl_profile; ?>\">\n  <?php print $head; ?>\n  <title><?php\
  \ print $head_title; ?></title>\n  <?php print $styles; ?>\n  <?php print $scripts;\
  \ ?>\n  </head>\n<body class=\"<?php print $classes; ?>\" <?php print $attributes;?>>\n\
  \  <div id=\"skip-link\">\n    <a href=\"#main-content\" class=\"element-invisible\
  \ element-focusable\"><?php print t('Skip to main content'); ?></a>\n  </div>\n\
  \  <?php print $page_top; ?>\n  <?php print $page; ?>\n  <?php print $page_bottom;\
  \ ?>\n</body>\n</html>\n```\n\n![images](img/square.jpg) **提示** Drupal 使用 `hook_system_info_alter()`\
  \ 来声明 `page_top` 和 `page_bottom` 隐藏区域。更多信息请参见 [`api.drupal.org/api/function/system_system_info_alter/7`](http://api.drupal.org/api/function/system_system_info_alter/7)。\n\
  \n#### 模块特定区域\n\n仪表盘模块的“仪表盘主要内容”和“仪表盘侧边栏”区域就是由模块创建的区域示例。这些区域是非传统的，因为它们无法通过区块管理页面管理，并且主题不负责定义或输出它们。仪表盘模块使用\
  \ `hook_system_info_alter()` 以编程方式定义它们，并负责在位于 `/admin` 的管理仪表盘上显示它们。仪表盘模块允许您将可用区块拖放到这些区域，为站点管理员创建仪表盘（参见图\
  \ 15-11）。\n\n![images](img/1511.jpg)\n\n***图 15-11.** 编辑模式下的管理仪表盘*\n\n#### 区域与你的主题\n\
  \n开始处理主题区域需要认真审视设计需求，并为意外情况做好规划。需要考虑许多因素，包括站点管理员将如何使用区块和区域、您拥有哪些类型的内容，以及区域在您的整体布局策略中扮演的角色。如前所述，默认区域是一个很好的起点。我们建议您从在主题的\
  \ `.info` 文件中定义默认区域开始，并在此基础上进行调整，如代码清单 15-5 所示。\n\n***代码清单 15-5**. Drupal 的默认区域*\n\
  \n```\nregions[page_top] = Page Top\nregions[header] = Header\nregions[highlight]\
  \ = Highlight\nregions[help] = Help\nregions = Content\nregions[sidebar_first] =\
  \ Sidebar First\nregions[sidebar_second] = Sidebar Second\nregions[footer] = Footer\n\
  regions[page_bottom] = Page Bottom\n```\n\n![images](img/square.jpg) **提示** 除了在主题的\
  \ `.info` 文件中定义区域外，您还需要在适当的模板文件中输出它。`page_top` 和 `page_bottom` 区域在 `html.tpl.php`\
  \ 模板中输出，其余区域在 `page.tpl.php` 中输出。关于输出区域和模板文件的更多细节将在本章后面讨论。\n\n#### 使用区域 vs. 在模板文件中硬编码变量\n\
  \n在决定是否在主题中使用区域时，考虑每个部分将包含的内容、内容位置变化的可能性以及谁需要能够更改它是很有用的。区块本质上是灵活的，旨在允许站点管理员轻松地移动它们。如果期望区块位于某个特定区域，然后被移动或重新排序，这可能会导致问题。\n\
  \n当独自处理一个站点，或者只有少数受信任的个人控制区块配置时，这可能不是您需要担心的事情。相反，在不太受信任的个人可以访问并可能引发问题的情况下，采取额外措施来识别潜在问题区域并尽你所能预防这些问题是非常值得的。例如，页眉和页脚特别容易出现此类问题。它们通常具有严格定义的设计和匹配的\
  \ CSS。当区块在这些区域内被移动时，尤其是像主导航菜单这样高度样式化的内容，在不当操作下很快就会出现问题。有时，定义一个额外的区域，即使其目的只是为了容纳一个区块，也比将该区块与其他区块一起放在页眉区域更安全。这将有助于确保它始终在正确的位置输出，并减少用户出错的可能性。如果站点管理员不需要控制定位，那么最好在\
  \ `page.tpl.php` 中使用硬编码变量来输出，这样它就不会受到区块界面中操作的影响。\n\n作为一般规则，当内容需要在区块界面中移动或重新排列时，应考虑使用区域。当内容不需要通过区块界面控制，并且将其放在那里存在风险时，考虑在模板文件中硬编码它，这样它就不会受到区块界面中操作的影响。\n\
  \n![images](img/square.jpg) **提示** 位于 `page.tpl.php` 中的主菜单（`$main_menu`）和辅助菜单（`$secondary_menu`）是硬编码变量的示例。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您的要求，对给定的英文文本进行翻译。\n\n\n#### 布局策略\n\n侧边栏的核心默认值（`Sidebar\
  \ First` 和 `Sidebar Second`）旨在借助 body 类处理多种侧边栏组合。`Drupal` 极其灵活，可以随时更改页面。这最终效果如何，取决于主题的灵活性和编码质量。由于\
  \ `Drupal` 仅输出包含内容的区域，因此拥有一个规划良好且灵活的布局非常重要。\n\n例如，假设你有一个两栏布局主题，其中第一栏包含主要内容，而 `Sidebar\
  \ First` 区域只包含一个区块。如果你将该区块的可见性设置为仅在首页显示，那么整个 `Sidebar First` 区域将仅在首页输出，而内页则只会显示主栏。如果你的布局\
  \ CSS 只为每页同时存在这两栏的情况而设计，而没有为单栏和两栏两种情况都包含 CSS，那么你的布局就会出错。虽然区域在任何时候添加或修改起来都相当容易，但在项目初期过度简化布局可能会在后期给你带来额外的\
  \ CSS 工作。无论你的主题有多少个侧边栏，通常最好的做法是考虑到所有可能的侧边栏组合（一栏、两栏或三栏），以避免在后续开发中遇到问题。一种简单且可持续的好方法是使用一个成熟的基主题。\n\
  \n此外，某些类型的内容放在单独的区域中通常效果更好。例如，包含广告的自定义区块以及具有显著不同设计要求的区块，当它们被抽象出来时，编写 CSS 和进行管理通常会更简单。图\
  \ 15–12 展示了添加广告横幅区域和主导航区域可能的样子。\n\n考虑页面将如何构建以及由谁来使用它们也很重要。如果你的网站打算使用区域和区块来实现更复杂的设计，并且你想让网站管理员易于使用，那么预先定义多个区域来布局页面的较小部分可能是有意义的。`Bartik`\
  \ 主题就是一个很好的例子，它包含了七个额外的区域来组织页脚中的区块，如图 15–13 所示。通过定义两个区域（`Footer First` 和 `Footer\
  \ Second`）并使用 CSS 将每个区块向左浮动，也可以实现相同的效果。但 `Bartik` 的实现方式（如代码清单 15–6 所示，并在图 15–13\
  \ 中说明）对于那些不想了解代码内部原理、只想使用该主题的人来说，可以说更容易理解。\n\n![images](img/1512.jpg)\n\n**图 15–12**。自定义广告横幅和导航区域示例\n\
  \n**代码清单 15–6**。`Bartik` 主题 `.info` 文件中定义其七个自定义区域的摘录\n\n```\nregions[triptych_first]\
  \ = Triptych first\nregions[triptych_middle] = Triptych middle\nregions[triptych_last]\
  \ = Triptych last\nregions[footer_firstcolumn] = Footer first column\nregions[footer_secondcolumn]\
  \ = Footer second column\nregions[footer_thirdcolumn] = Footer third column\nregions[footer_fourthcolumn]\
  \ = Footer fourth column\n```\n\n![images](img/1513.jpg)\n\n**图 15–13**。`Bartik`\
  \ 主题中已填充内容的页脚区域\n\n### 创建新区域\n\n创建一个新区域分为两步。使用图 15–12 中的示例，以下是创建新的 `Banner Ad` 和\
  \ `Navigation` 区域的过程。\n\n1.  在 `dgd7.info` 文件中定义区域。首先，在代码清单 15–3 中的默认配置基础上，添加新区域的代码，然后将\
  \ `banner_ad` 和 `navigation` 区域的定义添加到你的 `dgd7.info` 文件中。\n\n    ```\n    ; 默认区域\n\
  \    regions[page_top] = Page Top\n    regions[header] = Header\n    regions[highlight]\
  \ = Highlight\n    regions[help] = Help\n    regions = Content\n    regions[sidebar_first]\
  \ = Sidebar First\n    regions[sidebar_second] = Sidebar Second\n    regions[footer]\
  \ = Footer\n    regions[page_bottom] = Page Bottom\n\n    ; 自定义区域\n    regions[banner_ad]\
  \ = Banner Ad\n    regions[navigation] = Navigation\n    ```\n\n2.  在 `page.tpl.php`\
  \ 模板文件中输出区域。清除站点缓存后，你将能够在 `admin/structure/block` 的区块管理页面上看到并填充这些新区域。为了让它们显示在页面上，你需要在主题中覆盖\
  \ `page.tpl.php` 文件，并输出这些新区域。\n\n    导航到 `modules/system` 目录，复制 `page.tpl.php` 文件，并将其粘贴到你之前创建的\
  \ `sites/all/themes/dgd7` 目录中。\n\n    在主题中打开 `page.tpl.php` 文件，向下滚动到 `<div id=\"\
  page-wrapper\">`，然后将用于输出区域的代码粘贴到它下面、`<div id=\"header\">` 的上面。\n\n    ```\n    <div\
  \ id=\"page-wrapper\"><div id=\"page\">\n        <?php print render($page['banner_ad']);\
  \ ?>\n        <div id=\"header\"><div class=\"section clearfix\">\n    ```\n\n \
  \   移除 `$main_menu` 的默认标记，并用新导航区域的区域代码替换它。\n\n    移除以下代码：\n\n    ```\n    <?php\
  \ if ($main_menu || $secondary_menu): ?>\n          <div id=\"navigation\"><div\
  \ class=\"section\">\n            <?php print theme('links__system_main_menu', array('links'\
  \ => $main_menu,\n    'attributes' => array('id' => 'main-menu', 'class' => array('links',\
  \ 'inline',\n    'clearfix')), 'heading' => t('Main menu'))); ?>\n            <?php\
  \ print theme('links__system_secondary_menu', array('links' =>\n    $secondary_menu,\
  \ 'attributes' => array('id' => 'secondary-menu', 'class' =>\n    array('links',\
  \ 'inline', 'clearfix')), 'heading' => t('Secondary menu'))); ?>\n          </div></div><!--\
  \ /.section, /#navigation -->\n        <?php endif; ?>\n    ```\n\n    替换为以下代码：\n\
  \n    ```\n    <?php print render($page['navigation']); ?>\n    ```\n\n3.  从技术上讲，你已经完成了，但让我们添加一些内容来说明你做了什么。\n\
  \n    为 `Banner Ad` 代码添加一个新的自定义区块。将区块标题命名为“Banner Ad”，并在区块正文中添加以下代码来伪造一个广告横幅的外观（确保选择\
  \ Full HTML 文本格式）。然后，在区域设置中选择 `Banner Ad` 区域，并保存它。\n\n    ```\n    <img style=\"\
  width: 728px; height: 90px; border: solid 1px #000;\" alt=\"728 x 90 Banner Ad\"\
  \ src=\"image.png\" />\n    ```\n\n    返回 `admin/structure/block` 页面。找到 `Main Menu`\
  \ 区块，将其放置在 `Navigation` 区域内，然后点击“保存区块”。\n\n    你已经成功添加并填充了两个新的自定义区域！\n\n\n\n###\
  \ 模板文件\n\nDrupal 核心、其模块以及贡献模块的大部分输出均以模板文件的形式呈现。模板文件由 HTML 标记和 PHP 变量组成。这使得即使对 PHP\
  \ 知之甚少（或完全不懂）的用户也能轻松修改 HTML 代码。\n\n一个简单的模板文件示例是 `user-picture.tpl.php`（参见代码清单 15–7）。该模板位于\
  \ `modules/user` 目录中，其唯一用途是打印网站用户的头像，形式可以是纯图片，也可以是带链接的图片（取决于查看照片的用户是否有权限查看用户个人资料）。它将头像包裹在\
  \ `<div class=\"user-picture\">` 中。无论何时调用 `user_picture` 主题钩子，例如在用户个人资料页面、节点的作者信息以及评论（在启用的情况下）中，都会使用此模板文件。\n\
  \n**代码清单 15–7**。`user-picture.tpl.php` 文件内容\n\n```\n<?php\n// $Id: user-picture.tpl.php,v\
  \ 1.5 2009/08/06 05:05:59 webchick Exp $\n\n/**\n * @file\n * 默认主题实现，用于展示为用户帐户配置的图片。\n\
  \ *\n * 可用变量：\n * - $user_picture: 用户设置或站点默认的图片。将根据查看者\n *   查看用户个人资料页面的权限决定是否添加链接。\n\
  \ * - $account: 帐户信息数组。潜在不安全。使用前务必通过\n *   check_plain() 处理。\n *\n * @see template_preprocess_user_picture()\n\
  \ */\n?>\n<?php if ($user_picture): ?>\n  <div class=\"user-picture\">\n    <?php\
  \ print $user_picture; ?>\n  </div>\n<?php endif; ?>\n```\n\nDrupal 站点上的一个典型页面本质上是一个由嵌套模板文件和主题函数组成的庞大树状结构。如图\
  \ 15–14 所示，这个树从较大的模板（如 `html.tpl.php` 和 `page.tpl.php`）开始，一直延伸到用于打印字段的 `field.tpl.php`。\n\
  \n![images](img/1514.jpg)\n\n**图 15–14**。使用 Bartik 主题的示例首页，突出了主要模板文件和许多自定义区域的使用\n\
  \n### 常用核心模板\n\nDrupal 核心包含超过四十个模板文件，但有六个主要的模板文件（详见表 15–1）负责构成每个页面的大部分内容。在编写 Drupal\
  \ 主题时，这些主要模板文件是您最常使用的，它们能让您完成主题中的大部分繁重工作。\n\n**表 15–1**。常用核心模板文件\n\n| **名称** | **来源**\
  \ | **用途** |\n| --- | --- | --- |\n| `html.tpl.php` | `modules/system` | 打印 HTML\
  \ 文档的结构，包括 `<head>` 标签的内容，例如 `$scripts` 和 `$styles`，以及使用 `$page_top`、`$page` 和 `$page_bottom`\
  \ 区域在内部进行打印的 `<body>` 标签的开闭。除非您需要更改 DOCTYPE，否则可能没有理由覆盖此文件。 |\n| `page.tpl.php` |\
  \ `modules/system` | 打印页面级别的区域以及其他硬编码变量，如 `$logo`、`$site_name`、`$tabs`、`$main_menu`\
  \ 等。通过操作此文件可以完全控制站点布局，并且大多数主题都会提供自己的版本。 |\n| `region.tpl.php` | `modules/system`\
  \ | 打印区域的 HTML 标记。 |\n| `block.tpl.php` | `modules/block` | 打印区块的 HTML 标记。 |\n|\
  \ `node.tpl.php` | `modules/node` | 打印节点的 HTML 标记。 |\n| `comment.tpl.php` | `modules/comment`\
  \ | 打印评论的 HTML 标记。 |\n| `field.tpl.php`* | `modules/field/theme` | 打印字段的 HTML 标记。字段类型非常多，由于此文件需覆盖所有情况，其实现非常通用。如果您对语义化标记有要求，最终可能需要为此模板创建几个版本。\
  \ |\n\n* `field.tpl.php` 仅在主题覆盖时才使用。`modules/field/theme` 中的文件仅作为您工作的基础提供。\n\n###\
  \ 覆盖模板文件\n\nDrupal 核心和贡献模块提供的模板文件代表了原作者或团队选择的默认标记实现，但所有这些模板文件——以及其中打印的标记和变量——都是可以自定义的。在开发主题时，如果您认为默认实现不能满足您的要求，您可以简单地选择覆盖它。Drupal\
  \ 的主题层设计得极其灵活且易于以这种方式操作。\n\nDrupal 站点主题化的美妙之处在于，您可以轻松地进行更改，而无需修改原始模板。覆盖模板文件的过程非常简单：\n\
  \n1. 通过浏览代码或查看 `http://api.drupal.org` 找到原始模板文件。\n2. 将其复制并粘贴到您的主题目录中。\n3. 清除站点缓存并重新加载页面！\n\
  \n完成这三个步骤后，Drupal 将开始使用主题版本的文件，您便可以自由地进行任何您想要的更改。就是这么简单。\n\n![images](img/square.jpg)\
  \ **提示** 确保 Drupal 正在使用您在主题中刚刚覆盖的模板文件的一个快速方法是在模板文件顶部添加文本，例如“Hello World”。如果您重新加载页面后出现该文本，您就可以确定您正在处理正确的文件。\n\
  \n### 全局模板变量\n\n模板文件包含的变量通常比它们实际打印的要多。在某些情况下会多很多。这对于主题开发者来说是一件好事，因为它为操作标记的显示开辟了许多可能性，而无需太多\
  \ PHP 知识。表 1-2 描述了一些在所有模板中都可用的有用变量（属性变量除外；这些变量在“HTML 属性”部分中介绍）。如何识别可用变量将在下一章中详细说明。\n\
  \n**表 15–2**。所有模板中可用的变量\n\n| **变量** | **描述** |\n| --- | --- |\n| `$is_admin` | 辅助变量。如果当前登录用户是管理员，则等于\
  \ `TRUE`，否则等于 `FALSE`。 |\n| `$logged_in` | 辅助变量。如果当前用户已登录，则等于 `TRUE`，否则等于 `FALSE`。使用\
  \ `$user->uid` 来确定此信息，因为匿名用户的用户 ID 始终为 0。 |\n| `$is_front` | 辅助变量。使用 `drupal_is_front_page()`\
  \ 函数判断当前页面是否为站点的首页。在首页上等于 `TRUE`（除非数据库离线），否则等于 `FALSE`。 |\n| `$directory` | 正在使用的模板所在的目录。\
  \ |\n| `$user` | 一个包含当前登录用户帐户信息的对象。可以通过在您正在工作的模板中添加 `global $user;` 行来访问。切勿直接打印其任何属性，因为它包含原始用户数据，因此是不安全的。请改用\
  \ `theme('username');`，例如 `theme('username', array('account' => $user)).` |\n| `$language`\
  \ | 一个包含站点当前使用语言信息的对象，例如 `$language->dir` 包含文本方向，`$language->language` 对于英语包含 `en`。可以通过在您正在工作的模板中添加\
  \ `global $language;` 行来访问。 |\n| `$theme_hook_suggestions` | 一个包含其他可能的主题钩子的数组，这些钩子可用作命名模板文件和主题函数的变体，或用于确定上下文。请参阅“主题钩子建议”部分。\
  \ |\n| `$title_prefix` 和 `$title_suffix` | 包含元素的渲染数组（例如上下文链接），这些元素在模板中的标题前后打印，或者在不存在标题的模板文件的顶部和底部打印。\
  \ |\n\n\n\n### HTML 属性\n在 Drupal 7 中，我们开始将属性存储在数组中。这样做部分原因是出于 RDF 模块的考虑。RDF 模块利用这些变量在预处理阶段附加其数据。另一个原因是允许主题开发者在预处理函数中对其模板文件输出的类进行更多控制。\n\
  \n表 15–3 中描述的每个变量都有数组和字符串两种版本。数组版本的变量名中包含后缀 `_array`，在各种预处理函数（如 `template_preprocess()`\
  \ 和 `template_preprocess_node()` 或 `template_preprocess_block()`）中被赋值。然后，在 `template_process()`\
  \ 阶段，会创建包含这些数组扁平化或字符串版本的新变量，以供模板使用。此过程在图 15–15 中进行了说明。更多详细信息，请参阅本章的“预处理和过程函数”部分。\n\
  \n**表 15–3**。可插入的 HTML 属性\n\n| **变量** | **描述** |\n| --- | --- |\n| `$attributes`\
  \ | 包含模块（主要是 RDF 模块）提供的 HTML 属性，但 class 属性除外（该属性单独处理，见下文）。`$attributes`（在预处理器中作为\
  \ `$attributes_array` 使用）通常保留给顶级 HTML 包装元素，例如 `<body>` 或其他模板文件中最外层的 `<div>`。 |\n\
  | `$classes` | 包含模板的 HTML 类。通常保留给顶级 HTML 包装元素，例如 `<body>` 或其他模板文件中最外层的 `<div>`。\
  \ |\n| `$title_attributes` | 包含模板文件顶级标题（如节点或区块标题）的类，对于节点摘要或区块内容，通常是一个 `<h2>`。 |\n\
  | `$content_attributes` | 包含内容包装器 `<div>` 或模板文章正文的类。这些变量使用方式的示例可以在 `node.tpl.php`\
  \ 文件中找到。 |\n\n![images](img/1515.jpg)\n\n**图 15–15**。来自 `node.tpl.php` 的摘录，展示了如何使用可插入的\
  \ HTML 属性\n\n![images](img/square.jpg) **提示**：如果在你的源代码中看不到这些属性，请务必启用 RDF 模块。\n\n\
  所有核心通用模板都提供了可用变量的详细文档。快速查看位于 `modules/block` 目录下的默认 `block.tpl.php` 模板文件，就会发现该文件的大部分内容实际上就是可用变量的文档。如代码清单\
  \ 15–8 所示，仅通过查看文档和代码，你就能大致了解可以使用哪些变量。\n\n**代码清单 15–8**。默认 `modules/block/block.tpl.php`\
  \ 的源代码，包含变量文档\n\n```\n<?php\n/**\n* @file\n* 显示区块的默认主题实现。\n*\n* 可用变量：\n* - $block->subject:\
  \ 区块标题。\n* - $content: 区块内容。\n* - $block->module: 生成该区块的模块。\n* - $block->delta:\
  \ 区块的唯一 ID，在每个模块内唯一。\n* - $block->region: 嵌入当前区块的区块区域。\n* - $classes: 可用于通过 CSS\
  \ 进行上下文样式化的类字符串。可以通过预处理函数中的变量 $classes_array 进行操作。默认值可以是以下一个或多个：\n*   - block: 当前模板类型，例如“主题钩子”。\n\
  *   - block-[module]: 生成该区块的模块。例如，用户模块负责处理默认的用户导航区块。在这种情况下，类将是 \"block-user\"。\n\
  * - $title_prefix (数组): 一个包含模块填充的额外输出的数组，旨在显示在模板中主标题标签之前。\n* - $title_suffix (数组):\
  \ 一个包含模块填充的额外输出的数组，旨在显示在模板中主标题标签之后。\n*\n* 辅助变量：\n* - $classes_array: HTML 类属性值的数组。它在变量\
  \ $classes 中被扁平化为一个字符串。\n* - $block_zebra: 根据每个区块区域输出 'odd' 和 'even'。\n* - $zebra:\
  \ 与 $block_zebra 输出相同，但独立于任何区块区域。\n* - $block_id: 根据每个区块区域递增的计数器。\n* - $id: 与 $block_id\
  \ 输出相同，但独立于任何区块区域。\n* - $is_front: 当在首页显示时为真。\n* - $logged_in: 当当前用户是已登录成员时为真。\n\
  * - $is_admin: 当当前用户是管理员时为真。\n* - $block_html_id: 一个有效的 HTML ID，保证唯一。\n*\n* @see\
  \ template_preprocess()\n* @see template_preprocess_block()\n* @see template_process()\n\
  */\n?>\n<div id=\"<?php print $block_html_id; ?>\" class=\"<?php print $classes;\
  \ ?>\"<?php print $attributes; ?>>\n  <?php print render($title_prefix); ?>\n<?php\
  \ if ($block->subject): ?>\n  <h2<?php print $title_attributes; ?>><?php print $block->subject\
  \ ?></h2>\n<?php endif;?>\n  <?php print render($title_suffix); ?>\n  <div class=\"\
  content\"<?php print $content_attributes; ?>>\n    <?php print $content ?>\n  </div>\n\
  </div>\n```\n\n文件顶部有一个 `@file` 块，简要描述了文件的作用。下面是一个长长的变量列表，其中一些在模板文件中打印，一些没有。还有指向相关预处理和过程函数的\
  \ `@see` 引用，这些将在下一章中更详细地讨论。\n\n为了直观了解此模板文件生成的内容，请查看 Bartik 主题生成的一个区块。Bartik 不包含\
  \ `block.tpl.php` 文件；它使用区块模块提供的 Drupal 默认模板。创建一个标题为“我的自定义区块”的自定义区块，正文为一些占位文本，并将其放置在\
  \ Bartik 主题的侧边栏第一区域。\n\n![images](img/1516.jpg)\n\n**图 15–16**。使用 Bartik 主题查看时渲染的自定义区块截图以及该区块的配置页面\n\
  \n你的自定义区块（如图 15–16 所示，配合代码清单 15–9 中的 `block.tpl.php` 模板文件）对匿名用户生成的输出显示在代码清单 15–9\
  \ 中。区块标题由 `<?php print $block->subject ?>` 输出，正文由 `<?php print $content ?>` 输出。Drupal\
  \ 只会填充变量并显示查看用户有权访问的内容。\n\n**代码清单 15–9**。注销时标题为“我的自定义区块”的自定义区块的 HTML 输出\n\n\n\n\
  ```\n<div id=\"block-block-1\" class=\"block block-block\">\n  <h2>我的自定义区块</h2>\n\
  \  <div class=\"content\">\n    <p>Enim quam iusto quam iis enim. Molestie at et\
  \ diam ut legere. Feugiat tation facilisis\nquarta soluta quam. Facilisis lectorum\
  \ modo nam modo suscipit.</p>\n  </div>\n</div>\n```\n\n清单 15–10 展示了同一区块在管理员登录状态下所显示的\
  \ HTML。你会注意到代码有所不同。管理员可以访问由上下文链接模块添加的上下文管理链接。这些链接通过`<?php print render($title_prefix);\
  \ ?>`这行代码输出。上下文链接模块还会在外层`<div>`上添加一个类，将其标识为`contextual-links-region`。这种行为并非区块模块或`block.tpl.php`模板文件所特有。`$title_prefix`和`$title_suffix`变量是为了让模块能够在模板文件的标题前后注入内容而创建的，上下文链接模块正是利用了这一点。\n\
  \n**清单 15–10**。以管理员身份登录时，标题为“我的自定义区块”的自定义区块的 HTML 输出，其中高亮显示了`$title_suffix`的输出内容\n\
  \n```\n<div id=\"block-block-1\" class=\"block block-block contextual-links-region\"\
  >\n  <h2>我的自定义区块</h2>\n  <div class=\"contextual-links-wrapper contextual-links-processed\"\
  >\n    <a class=\"contextual-links-trigger\" href=\"#\">配置</a>\n    <ul class=\"\
  contextual-links\">\n      <li class=\"block-configure first last\"><a href=\"/admin/structure/block/manage/block/1/configure?destination=node\"\
  >配置区块</a></li>\n    </ul>\n  </div>\n  <div class=\"content\">\n    <p>Enim quam\
  \ iusto quam iis enim. Molestie at et diam ut legere. Feugiat tation facilisis\n\
  quarta soluta quam. Facilisis lectorum modo nam modo suscipit.</p>\n  </div>\n</div>\n\
  ```\n\n### 主题函数\n\n主题函数的目的与模板文件相同，其目标是以一种可由主题（以及模块）自定义的方式提供 HTML 标记。Drupal 核心中包含了许多主题函数，涵盖从表单元素到菜单项，再到完整的后台页面实现。如需查看\
  \ Drupal 7 中可用的完整主题函数列表，请访问[`http://api.drupal.org/api/group/themeable/7`](http://api.drupal.org/api/group/themeable/7)。\n\
  \n#### 主题函数如何创建\n\nDrupal 核心和模块通常会定义主题函数，但主题也可以定义它们。`hook_theme()`的实现包含了大多数通用主题函数的所有关键信息，包括这些函数接受哪些参数。主题钩子将在本章后面的“主题钩子建议”部分详细讨论，但清单\
  \ 15–11 展示了一个简单的`hook_theme()`实现示例。\n\n**清单 15–11**。`hook_theme()`实现示例\n\n```\n\
  <?php\n/**\n* 实现 hook_theme()。\n*/\nfunction mymodule_theme() {\n  return array(\n\
  \    'my_theme_hook' => array(\n      'variables' => array('parameter' => NULL),\n\
  \    ),\n  );\n}\n?>\n```\n\n`hook_theme()`的实现让 Drupal 知道有哪些主题钩子。一旦 Drupal 知晓，它将搜索一个名为`theme_my_theme_hook()`的主题函数（在本例中），其代码可能如清单\
  \ 15–12 所示。\n\n**清单 15–12**。主题函数实现示例\n\n```\n<?php\nfunction theme_my_theme_hook($variables)\
  \ {\n  $parameter = $variables['parameter'];\n  if (!empty($parameter)) {\n    return\
  \ '<div class=\"my-theme-hook\">' . $parameter . '</div>';\n  }\n}\n?>\n```\n\n\
  #### 调用主题函数\n\n在本章中，我们将主题函数称为`theme_this()`和`theme_that()`。这就是这些函数的名称及其通常的称呼。但是，你绝不应该直接调用主题函数。这样做会破坏\
  \ Drupal 主题层所带来的绝佳功能，例如重写、建议等。请始终使用`theme()`函数来生成主题输出。它会负责将请求路由到适当的主题函数。有关其工作原理的更多信息，请参见[`http://api.drupal.org/api/function/theme/7`](http://api.drupal.org/api/function/theme/7)。\n\
  \n使用`theme_image()`，清单 15–13 和 15–14 分别说明了调用主题函数的正确与错误方式。\n\n**清单 15–13.** 调用主题函数的正确方式\n\
  \n```\n<?php print theme('image', array('path' => 'path/to/image.png', 'alt' =>\
  \ '图像说明')); ?>\n```\n\n**清单 15–14.** 调用主题函数的错误方式\n\n```\n<?php print theme_image(array('path'\
  \ => 'path/to/image.png', 'alt' => '图像说明')); ?>\n```\n\n\n\n### 覆写主题函数\n\n覆写主题函数的方法与覆写模板文件非常相似。主要区别在于，你处理的是函数，且所有被覆写的主题函数都存放在\
  \ `template.php` 中。覆写主题函数的具体步骤如下：\n\n1.  通过浏览 Drupal 的源代码或查阅 [`http://api.drupal.org`](http://api.drupal.org)\
  \ 来找到原始主题函数。\n2.  将其复制并粘贴到你的 `template.php` 文件中。\n3.  将函数名称开头的 `theme_` 修改为 `你的主题名称\
  \ _`。\n4.  保存 `template.php`，清除网站缓存，然后重新加载！\n\n![images](img/square.jpg) **注意：**\
  \ 如果是从零开始创建 `template.php`，请务必在文件顶部加上 `<?php`。同时注意，不要在文件底部添加结束标签。省略 PHP 结束标签可以避免产生不必要的空白字符，这些空白字符可能导致“无法修改头信息”或“头信息已发送”等错误。更多信息，请访问\
  \ [`http://drupal.org/node/1424`](http://drupal.org/node/1424)。\n\n**让我们来覆写一个主题函数**\n\
  \n下面是一个名为 `theme_more_link()` 的主题函数。它用于在区块中打印指向更多内容的链接。要找到这个主题函数的代码，可以查看 [`http://api.drupal.org/api/function/theme_more_link/7`](http://api.drupal.org/api/function/theme_more_link/7)。\n\
  \n1.  将原始主题函数的代码复制并粘贴到 `template.php` 中。\n\n```\n<?php\n/**\n* 为类似区块中使用的\"更多\"链接返回\
  \ HTML。\n*\n* @param $variables\n*   一个包含以下内容的关联数组：\n*   - url: 主页面的 URL。\n*   -\
  \ title: 对链接的描述性动词，例如“阅读更多”。\n*/\nfunction theme_more_link($variables) {\n  return\
  \ '<div class=\"more-link\">' . l(t('More'), $variables['url'], array('attributes'\
  \ => array('title' => $variables['title']))) . '</div>';\n}\n?>\n```\n\n2.  将函数名称的开头改为你的主题名称，保存文件，并清除网站缓存。\n\
  \n```\n<?php\n/**\n* 为类似区块中使用的\"更多\"链接返回 HTML。\n*\n* @param $variables\n*   一个包含以下内容的关联数组：\n\
  *   - url: 主页面的 URL。\n*   - title: 对链接的描述性动词，例如“阅读更多”。\n*/\nfunction dgd7_more_link($variables)\
  \ {\n  return '<div class=\"more-link\">' . l(t('More'), $variables['url'], array('attributes'\
  \ => array('title' => $variables['title']))) . '</div>';\n}\n?>\n```\n\n3.  Drupal\
  \ 现在将使用你自定义版本的主题函数，所以你可以进行修改了！\n\n```\n<?php\n/**\n* 覆写 theme_more_link()。\n*  -\
  \ 将文本从\"More\"改为\"Show me More\"\n*  - 将 class 从\"more-link\"改为\"more\"\n*/\nfunction\
  \ dgd7_more_link($variables) {\n  return '<div class=\"more\">' . l(t('Show me MORE!'),\
  \ $variables['url'], array('attributes' => array('title' => $variables['title'])))\
  \ . '</div>';\n}\n?>\n```\n\n![images](img/square.jpg) **提示：** 在步骤 3 中，你会注意到注释块已修改，用以说明哪个函数被覆写以及做了哪些更改。记录你的代码总是一个好习惯，明确列出覆写主题函数的原因，在未来可以大大节省时间。主题函数会发生变化，有些甚至不止修改几行代码。当升级\
  \ Drupal 主版本（如从 Drupal 7 升级到 Drupal 8）时，这样的注释会让你的工作轻松很多。\n\n### 主题钩子与主题钩子建议\n\n\
  主题函数和模板文件由主题钩子定义。通过利用主题钩子建议，你在特定情况下覆写主题函数或模板文件时将拥有更大的灵活性。本节将介绍这两种方法，它们能极大地增强你自定义主题的能力和可操控性。\n\
  \n#### 什么是主题钩子？\n\n在 Drupal 中，主题钩子指的是通过 `hook_theme()` 特别注册的模板文件和函数。对于非 PHP 开发者来说，这听起来可能有些吓人或过于技术化，但老实说并非如此。你已经了解了模板文件和主题函数，所以从技术上讲，你已经对主题钩子有了相当不错的理解。\n\
  \n核心模块是采用模板文件还是函数来实现，是根据具体情况来决定的，而做出这个决定的标准通常是平衡其在其他模块中复用的可能性、预期变化的频率以及出于性能原因的考虑。模板文件比主题函数执行速度稍慢，因此并非总是最佳选择。像表单输入元素这样较小的标记片段，作为主题函数实现效率更高，而像节点和区块这样较大的代码块，则更适合作为模板文件。\n\
  \n-   主题函数和模板文件都是 Drupal 及其模块生成由标记和变量组成的输出的方式，目的是让你（主题开发者）能够覆写并使其成为你自己的内容。它们完全属于你的领域，你将拥有最终决定权来决定它们的外观。\n\
  -   两者共享完全相同的主题钩子。例如，名为 `node.tpl.php` 的模板文件和名为 `theme_node()` 的函数共享相同的节点主题钩子。区别在于实现方式，因为两者不能同时使用。\n\
  -   两者都可以利用预处理函数，这允许你在渲染前拦截并修改变量。以节点钩子为例，在核心中看起来是 `template_preprocess_node();`，在你的主题中则是\
  \ `yourtheme_preprocess_node()`。\n\n#### 主题钩子建议\n\n模板文件和主题函数的默认实现提供了一组非常通用的标记，虽然足够使用，但在所有情况下并非理想之选。当执行标准覆写时（例如将\
  \ `block.tpl.php` 复制到主题中），所做的更改将在整个站点中每次渲染区块时生效。有时这正是我们想要的结果，但你通常希望对特定区块、特定模块提供的一组区块，甚至特定区域中的一组区块进行修改。\n\
  \n主题钩子允许你通过命名模式在主题中实现针对模板文件和主题函数的目标覆写。选项和命名模式取决于你正在处理的对象类型。在预处理阶段，每个模板被渲染之前，会创建并填充一个名为\
  \ `$theme_hook_suggestions` 的变量，其中包含替代钩子建议。\n\n\n\n#### 建议与模板文件\n\n表 15–1 中列出的所有常见模板文件都可以通过简单修改模板文件名来覆盖，以实现更有针对性的定制。例如，在处理区块时，Drupal\
  \ 在 `template_preprocess_block()` 中提供了列表 15–15 中的建议。\n\n***列表 15–15.** 来自 `template_preprocess_block()`\
  \ 的摘录，其中定义了区块模板文件的模板建议*\n\n```php\n<?php\n  $variables['theme_hook_suggestions'][]\
  \ = 'block__' . $variables['block']->region;\n  $variables['theme_hook_suggestions'][]\
  \ = 'block__' . $variables['block']->module;\n  $variables['theme_hook_suggestions'][]\
  \ = 'block__' . $variables['block']->module . '__' .\n$variables['block']->delta;\n\
  ?>\n```\n\n在决定使用哪个模板时，Drupal 会自动将下划线转换为短横线，并在你的主题中搜索这些模板。这段代码会转换成表 15–4 中所示的建议。\n\
  \n***表 15–4**. 区块的模板建议*\n\n| **建议** | **对应的模板文件** | **描述** |\n| --- | --- | ---\
  \ |\n| `block` | `block.tpl.php` | 默认区块实现。 |\n| `block__REGION` | `block--REGION.tpl.php`\
  \ | `REGION` 被替换为主题区域名称，模板针对该区域中的区块。 |\n| `block__MODULE` | `block--MODULE.tpl.php`\
  \ | `MODULE` 被替换为创建该区块的模块名称。例如，针对自定义区块的模板文件应为 `block--block.tpl.php`，而由菜单模块创建的区块则使用\
  \ `block--menu.tpl.php`。 |\n| `block__MODULE__DELTA` | `block--MODULE--DELTA.tpl.php`\
  \ | `DELTA` 值（在旧版本中曾是数字）是模块定义的区块系统名称。例如，要针对系统模块的导航区块，你可以使用 `block--system--navigation.tpl.php`。在此示例中，“system”是模块，“navigation”是\
  \ delta 值。 |\n\n##### 页面级建议\n\n由于 `html.tpl.php` 和 `page.tpl.php` 作为 Drupal 中最高级别的模板文件具有特殊性质，因此在生成其建议时会受到特别关注。一个名为\
  \ `theme_get_suggestions()` 的函数会基于当前页面的上下文参数自动生成建议。这意味着，如果你愿意，实际上可以为网站上的每个页面提供不同版本的这些模板文件。当然，这是你永远不该考虑去做的事情，但在某些情况下，比如一个非常不同的首页或着陆页，使用不同的\
  \ `page.tpl.php` 是完全合理的。\n\n如前所述，这些文件的主题钩子建议是借助参数生成的。Drupal 中的参数是页面系统路径的组成部分或片段。例如，当查看\
  \ URL [`http://your-site.com/node/1`](http://your-site.com/node/1) 时，第一个参数是“node”，第二个参数是“1”。理解\
  \ Drupal 中的参数是帮助你理解 Drupal 的关键之一。它们在确定上下文方面极其有用，并允许你在主题中执行更高级的操作。\n\n图 15–17 展示了如何利用主题钩子建议和参数，为网站上的几乎任何页面创建独立的\
  \ `page.tpl.php` 和 `html.tpl.php` 模板。\n\n![images](img/1517.jpg)\n\n***图 15–17.**\
  \ 不同类型页面的 `page.tpl.php` 建议*\n\n> **注意：** Drupal 的前台页面默认为“node”，位置在管理 ![images](img/U001.jpg)\
  \ 配置 ![images](img/U001.jpg) 站点信息下。此页面并非典型的节点。它是由节点模块的 `node_page_default()` 函数提供的自定义页面，用于列出标记为“推荐到首页”的帖子。“front”建议特定于前台页面（或首页），无论它是哪种类型的页面。如果你将前台页面更改为其他路径，你将获得额外的建议。\n\
  \n![images](img/square.jpg) **警告：** 图 15–17 列出了你可能在使用视图和面板等贡献模块时会遇到的命名路径示例。这些路径会成为系统路径，并可用作模板建议。然而，尝试使用通过自定义别名（或\
  \ Pathauto 模块）创建的路径（例如为 `node/1` 创建的 `about/team`）来创建模板文件是行不通的。这同样适用于分类、术语和用户资料。使用模板时，始终需要真实的系统路径。\n\
  \n对 `$theme_hook_suggestions` 的一些观察包括：\n\n*   使用下划线而非短横线。\n*   文件扩展名不存在，因为这些钩子可以作为主题函数或模板文件实现。在此阶段，使用模板还是主题函数并不重要。当需要渲染内容时，`theme()`\
  \ 将决定使用哪个，并进行必要的调整。\n*   每个建议都以 `hook__`（双下划线）前缀开头。在列表 15–15 所示的示例中，该钩子是 block。这使得\
  \ Drupal 能够回退到通用的主题钩子（在此例中是 block），并在不存在更具体的模板（如 `block--module.tpl.php`）时使用 `block.tpl.php`。\n\
  \n这些建议出现在 `$theme_hook_suggestions` 变量中的顺序决定了哪个钩子/模板文件将按照 FILO（先进后出）顺序被使用。当需要渲染模板时，将使用最后一条建议，但有一个例外。一个名为\
  \ `$theme_hook_suggestion`（注意是单数，而非复数）的变量也可用。如果它由模块或主题设置，则优先级高于 `$theme_hook_suggestions`\
  \ 中定义的任何内容。\n\n![images](img/square.jpg) **提示：** 在你正在处理的通用模板文件中使用 `dpm()` 函数（由 Devel\
  \ 模块提供）来查看可用的选项。`<?php dpm($theme_hook_suggestions); ?>` 将显示你当前处理页面上可用的选项。\n\n\n\
  \n#### 建议与主题函数\n\n如\"建议与模板文件\"部分所述，`$theme_hook_suggestions`（主题钩子建议）的备选方案通常在该钩子的预处理函数中定义。这种方法效果良好，因为模板文件通常服务于特定目的，例如输出节点或区块等特定实体。然而，主题函数则更具多样性，最终会被用于多种不同类型的输出，如表单元素、字段和渲染元素。模块开发者也可能使用主题函数来创建一次性自定义内容。这使得对诸如`theme_links()`这样广泛使用的函数实现主题函数覆写的吸引力大为降低，因为这可能会在你网站的各个意想不到的地方破坏样式。\n\
  \n幸运的是，许多主题函数也支持主题钩子建议，Drupal 核心已为一些流行的主题函数（如`theme_links()`）实现了建议。对主题函数使用主题钩子建议，仅意味着你可以选择在特定上下文中覆写某个主题函数，而非覆写整个基础主题函数（后者会产生全站影响）。\n\
  \n如前所述，`theme_links()` 是一个很好的例子，说明在覆写主题函数时如何使用主题钩子建议。该主题函数被用于许多地方，例如主导航、节点、评论和上下文链接。请注意，要实现表\
  \ 15-5 中\"主题函数等效项\"列出的函数，你需要在`template.php`中将`THEME`替换为你的主题名称。\n\n**表 15-5**. `theme_links()`\
  \ 的部分模板建议示例\n\n| 建议（Suggestion） | 等效主题函数（Theme Function Equivalent） | 描述（Description）\
  \ |\n| --- | --- | --- |\n| `links` | `THEME_links()` | 默认实现，除非指定了下面更具体的实现，否则它将用于所有实现。\
  \ |\n| `links__node` | `THEME_links__node()` | `theme_links()`的针对性实现，仅适用于节点内部的链接列表。\
  \ |\n| `links__comment` | `THEME_links__comment()` | `theme_links()`的针对性实现，仅适用于评论内部的链接列表。\
  \ |\n| `links__contextual` | `THEME_links__contextual()` | `theme_links()`的针对性实现，仅适用于为上下文链接生成的链接。\
  \ |\n| `links__contextual__node` | `THEME_links__contextual__node()` | `theme_links()`的针对性实现，仅适用于节点内部的上下文链接。\
  \ |\n\n你会在 Drupal 默认的 `page.tpl.php` 文件（位于 `modules/system` 目录）中注意到，主菜单和次菜单都使用建议（suggestion）进行输出。你可能还会注意到，名为\
  \ `theme_links__system_main_menu()` 和 `theme_links__system_secondary_menu()` 的主题函数并不存在，但这没关系。在这种情况下，除非创建了更有针对性的主题函数，否则将使用基础钩子或回退函数\
  \ `theme_links()`（参见清单 15-16）。\n\n**清单 15-16**. `modules/system/page.tpl.php` 节选\n\
  \n```php\n<?php if ($main_menu || $secondary_menu): ?>\n  <div id=\"navigation\"\
  ><div class=\"section\">\n    <?php print theme('links__system_main_menu', array('links'\
  \ => $main_menu, 'attributes'\n=> array('id' => 'main-menu', 'class' => array('links',\
  \ 'inline', 'clearfix')), 'heading' =>\nt('Main menu'))); ?>\n    <?php print theme('links__system_secondary_menu',\
  \ array('links' => $secondary_menu,\n'attributes' => array('id' => 'secondary-menu',\
  \ 'class' => array('links', 'inline',\n'clearfix')), 'heading' => t('Secondary menu')));\
  \ ?>\n  </div></div><!-- /.section, /#navigation -->\n<?php endif; ?>\n```\n\n在这种情况下，主题钩子建议被硬编码到函数参数中。当\
  \ `theme()` 处理此内容时，它会先检查是否存在 `theme_links__system_main_menu()` 的实现。如果找到该函数，则使用它来渲染内容。如果未找到，则使用原始的（或回退的）`theme_links()`\
  \ 代替。`theme()` 会自动处理此过程，并能根据双下划线直接确定基础钩子。\n\n**注意**：需要特别注意的是，**主题钩子建议** 与**主题钩子**并不相同。根据你所学的关于主题钩子建议的知识，自然会认为可以为特定的建议编写预处理函数和处理函数。主题钩子（即默认实现和建议）是在\
  \ `hook_theme()` 的实现中专门注册的。这意味着你可以创建一个名为 `THEME_preprocess_page()` 的预处理函数，但不能使用\
  \ `THEME_preprocess_page__front()`。\n\n### 本章小结\n\n本章涵盖了 Drupal 主题的基础知识，包括如何：\n\n\
  *   定义 `.info` 文件并处理区域。\n*   覆写和创建有针对性的模板文件和主题函数。\n*   理解主题钩子及其建议。\n\n掌握这些知识后，我们将在下一章中探讨一些更高级的主题主题。\n\
  \n## 第 16 章\n\n## 高级主题开发\n\n**作者：Jacine Luisi**\n\nDrupal 主题层最大的优点之一就是它提供了极大的灵活性。在上一章中，你学习了创建主题的基础知识：使用\
  \ `.info` 文件、模板文件和主题函数。在实现更定制的主题时，有时仅靠这些工具是不够的，你需要进行更深入的挖掘。此时，前端开发者与后端开发者之间的界限变得有些模糊，但请继续跟随我们的讲解。\n\
  \n读完本章后，你将了解如何在预处理函数中处理变量、自定义表单以及使用新的渲染 API。我还将详细介绍 CSS 文件处理的细节和子主题的基础知识，并为你提供创建可持续\
  \ Drupal 主题的基本规则。你很快就能化身为主题开发高手。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n### 在主题层中查找可用变量\n\n在主题层工作时，您会发现可用的变量会根据您所处理的实体类型而有所不同。您还会发现各种模板和主题函数并未使用或记录所有可用的变量，因此，您经常需要做的一件事就是将数组的内容打印到屏幕上。\n\
  \n有多种使用 PHP 打印数组的方法。最常见的方法之一是使用 `print_r()` 函数。此外还有 `var_dump()`、`get_defined_vars()`\
  \ 以及 Drupal 自带的 `debug()`。这些函数对于小型数组来说非常棒，但 Drupal 的数组以其庞大而闻名，因此在进行站点前端编码时使用这些函数，至少可以说是令人烦恼的。幸运的是，多亏了\
  \ Devel 模块(`http://drupal.org/project/devel`)和 Krumo 库，打印紧凑且易于阅读的数组变得轻而易举。安装 Devel\
  \ 模块后，您就可以使用 `dpm()` 和 `kpr()` 等函数。\n\n在使用模板和预处理函数时，您通常使用 `dsm()` 或 `dsm()` 来打印\
  \ `$variables`。例如，尝试在您的 `node.tpl.php` 文件顶部添加 `<?php dpm($variables); ?>`。\n\n![images](img/1601.jpg)\n\
  \n**图 16–1.** 在 `node.tpl.php` 中打印 `<?php dpm($variables); ?>` 的结果\n\n在图 16–1 中，您可以看到使用\
  \ `dpm()` 函数打印 `$variables` 数组内容的结果。使用 `dpm()` 的好处在于，数组会通过 `page.tpl.php` 中的 `$messages`\
  \ 变量（系统状态信息所在位置）被整齐地打印出来。如图 16–2 所示，您可以单击标题并逐一展开每个部分的内容。\n\n![images](img/1602.jpg)\n\
  \n**图 16–2.** 使用 `dpm()` 函数打印的已展开数组\n\n在模板文件内部工作时，这些变量可作为顶层变量使用。这是为了方便主题开发者。例如，在模板中，不要打印\
  \ `$variables['status']`，只需打印 `$status` 即可。在函数（如主题函数或预处理函数）内部工作时，请使用 `$variables['status']`。\n\
  \n#### 使用主题开发者模块\n\n当然，当您刚开始使用 Drupal 时，您需要了解代码位于何处以及首先需要覆盖什么。主题开发者模块(`http://drupal.org/project/devel_themer`)是帮助您解决此问题的完美工具。启用后，页面右下角会出现一个复选框。点击后，页面右上角会出现一个半透明的、可调整大小且可拖动的窗口。然后，您可以移动它并点击页面上的任何元素，窗口将填充您所需的所有信息，甚至更多（参见图\
  \ 16–3）。\n\n例如，当点击一个节点时，窗口中会提供以下信息：\n\n-   影响该元素的父函数和模板\n-   模板或主题钩子建议（候选）\n-  \
  \ 正在使用的预处理和处理函数\n-   可用变量的打印输出\n\n![images](img/1603.jpg)\n\n**图 16–3.** 主题开发者窗口显示了与被点击元素（本例中为一个节点）相关的主题信息。\n\
  \n### 预处理函数和处理函数\n\n预处理函数是主题开发者的最佳盟友。在许多用例中，预处理函数都可以让您的工作更轻松、代码更高效、模板文件更清晰整洁。如果您以前从未使用过它们，要么是因为您觉得不需要，要么是害怕深入研究\
  \ PHP，那么您真的错过了很多。我们希望改变这一点。\n\n现在您已经熟悉了模板文件的一般用途，即主要提供标记和打印变量。但是，如果您想更改这些变量或添加自己的变量呢？您的第一反应可能是创建一个模板文件并在其中完成所有操作，但这通常是错误的做法。\n\
  \n预处理函数正是为此目的而设计的。在实现预处理函数或处理函数时，您基本上是在告诉 Drupal：“嘿，等等！在您将这些数据发送出去进行渲染之前，我需要对其做一些修改。”这有点像一篇文章在发布前需要经过编辑的最终审查。根据定义，“预处理”是在模板渲染之前发生的一个处理阶段。“处理”函数是\
  \ Drupal 7 中的新特性，它们服务于相同的目的，唯一的区别在于它们在处理周期中运行得较晚（在预处理之后）。\n\nDrupal 如何使用预处理函数和处理函数的一个很好的例子是\
  \ `$classes_array` 和 `$classes` 变量。在清单 16–1 的 `template_preprocess()` 中，这是 Drupal\
  \ 默认的预处理实现，并且是第一个被调用的预处理函数，`$classes_array` 变量被初始化；请参阅 `http://api.drupal.org/api/function/template_preprocess/7`。\n\
  \n**清单 16–1**. 来自定义 `$classes_array` 的 `template_preprocess()` 的摘录\n\n```php\n<?php\n\
  function template_preprocess(&$variables, $hook) {\n  // 为当前钩子初始化 HTML 类属性。\n  $variables['classes_array']\
  \ = array(drupal_html_class($hook));\n}\n?>\n```\n\n第一步提供了一个指示正在使用的钩子的类。例如，如果这个预处理函数是为一个节点调用的，这段代码会将\
  \ `node` 类添加到该数组中。此函数运行后，所有模块和主题也有机会运行它们自己的版本，并添加或更改任何变量。接下来是 Node 模块，它实现了 `template_preprocess_node()`；请参阅\
  \ `http://api.drupal.org/api/function/template_preprocess_node/7`。如清单 16–2 所示，有相当多的类被添加到此数组中。\n\
  \n**清单 16–2**. 来自将额外类添加到 `$classes_array` 变量的 `template_preprocess_node()` 的摘录\n\
  \n```php\n<?php\nfunction template_preprocess_node(&$variables) {\n  // 收集节点类。\n\
  \  $variables['classes_array'][] = drupal_html_class('node-' . $node->type);\n \
  \ if ($variables['promote']) {\n    $variables['classes_array'][] = 'node-promoted';\n\
  \  }\n  if ($variables['sticky']) {\n    $variables['classes_array'][] = 'node-sticky';\n\
  \  }\n  if (!$variables['status']) {\n    $variables['classes_array'][] = 'node-unpublished';\n\
  \  }\n  if ($variables['teaser']) {\n    $variables['classes_array'][] = 'node-teaser';\n\
  \  }\n  if (isset($variables['preview'])) {\n    $variables['classes_array'][] =\
  \ 'node-preview';\n  }\n}\n?>\n```\n\n同样，在 `template_preprocess_node()` 运行之后，所有模块和主题都有机会实现自己的版本，进行他们想要的任何更改或添加。一旦所有预处理函数完成，处理函数就有了机会。在\
  \ Drupal 核心中，节点只有两个处理实现：`template_process()`（默认实现）和 `rdf_process()`（RDF 模块的实现）。\n\
  \n\n\n在`template_process()`中，当所有模块和主题都有机会修改后，会创建一个名为`$classes`的新变量。它包含`$classes_array`中所有类名的字符串版本。`$classes`变量被打印在`node.tpl.php`模板文件中包装器`<div>`的\
  \ class 属性中。如清单 16–3 所示。\n\n**清单 16–3**. 来自`template_process()`的摘录，其中`$classes`由`$classes_array`变量创建\n\
  \n```\n<?php\nfunction template_process(&$variables, $hook) {\n  // Flatten out\
  \ classes.\n  $variables['classes'] = implode(' ', $variables['classes_array']);\n\
  }\n?>\n```\n\n清单 16–1 到 16–3 展示了 Drupal 通过预处理函数和过程函数提供的一些灵活性和强大功能，以及这些函数的执行顺序。最重要的是要理解，在主题层，你可以对这些变量拥有最终决定权。只需在主题中实现预处理函数和过程函数，你就可以轻松地添加、修改和移除任何你想要的变量；这将在后续页面中更详细地介绍。\n\
  \n使用预处理函数的一大优势是，它们允许你将大部分逻辑保留在模板文件之外。这使得模板文件更清晰、更容易理解，同时主题也更高效，更易于长期维护、管理和扩展。你可以进行许多更改，例如影响类和修改现有变量，这些都不需要对模板文件进行任何更改——只需几行简单的代码即可。\n\
  \n### 实现预处理和过程钩子\n\n预处理函数通过创建一个按特定方式命名的函数来实现。清单 16–4 展示了这种命名约定的示例。\n\n**清单 16–4**.\
  \ 预处理和过程钩子的命名约定\n\n```\n<?php\n/**\n * Implements template_preprocess_THEMEHOOK().\n\
  \ */\nfunction HOOK_preprocess_THEMEHOOK(&$variables) {\n   // Changes go here.\n\
  }\n\n/**\n * Implements template_process_THEMEHOOK().\n */\nfunction HOOK_process_THEMEHOOK(&$variables)\
  \ {\n   // Changes go here.\n}\n?>\n```\n\n在命名这些函数时，需要考虑四点：\n\n1.  默认实现（通常由模块创建）的钩子是`template`。在所有其他实现中，`HOOK`被替换为实现它的模块或主题的系统名。\n\
  2.  你想要影响流程的哪个阶段？有两个选项：预处理（首先运行）或过程（在所有预处理函数执行完毕后运行）。\n3.  主题钩子与`hook_theme()`中定义的主题钩子相匹配，最终通过主题函数或模板文件输出。\n\
  4.  `&$variables`参数包含渲染它的主题函数或模板文件所需的数据。由于预处理函数在模板渲染之前运行，你可以对其内容进行各种更改和添加。\n\n![images](img/square.jpg)\
  \ **注意**：默认情况下，只有那些在`hook_theme()`中明确定义的主题钩子才能使用预处理钩子。例如，`hook_preprocess_node()`完全没问题，但`hook_preprocess_node__article()`则不会生效。这是因为`node__article`是一个主题钩子建议，它是主题钩子的一个变体，但并非真正的主题钩子。\n\
  \n#### 默认实现\n\n清单 16–5 展示了默认主题钩子的预处理实现的样子，以`template_preprocess_node()`为例，它为`node.tpl.php`模板文件创建变量。此函数存在于`node.module`中，同时还有`hook_theme()`的实现`node_theme()`，它在其中将“`node`”定义为主题钩子。\n\
  \n**清单 16–5**. 预处理和过程钩子默认实现的命名约定\n\n```\n<?php\nfunction template_preprocess_node(&$variables)\
  \ {\n   // Changes go here.\n   // See http://api.drupal.org/api/function/template_preprocess_node/7\
  \ for contents.\n}\n\nfunction template_process_node(&$variables) {\n   // Changes\
  \ go here.\n   // See http://api.drupal.org/api/function/template_process_node/7\
  \ for contents.\n}\n?>\n```\n\n![images](img/square.jpg) **提示**：浏览[`http://api.drupal.org`](http://api.drupal.org)并查看默认实现是学习变量如何创建的好方法。\n\
  \n#### 主题和模块实现\n\n模块和主题都能够以相同的方式使用预处理函数，并且一个给定的主题钩子可以有多个来自模块和主题的预处理实现。这引入了发生冲突的可能性，因此牢记这一点并了解这些函数的运行顺序非常重要。来自模块的预处理实现先运行，主题的实现最后运行。当处理基础主题和子主题时，基础主题先运行，子主题最后运行。记住这一点的一个好方法是，活动主题总是胜出。\n\
  \n由 Drupal 核心和模块实现的预处理函数位于各种文件中，例如`modulename.module`或`theme.inc`等，而由主题实现的预处理函数始终位于`template.php`中。\n\
  \n例如，为一个名为“`dgd7`”的主题实现一个用于节点主题钩子的预处理函数。如清单 16–6 所示，你只需在`template.php`中放置一个函数，以主题名（实现钩子）开头，后跟`_preprocess_`和主题钩子（本例中为`node`）。最后，通过引用传递`&$variables`参数（`$`前的`&`表示通过引用传递的变量）。\n\
  \n**清单 16–6.** 在主题中实现`template_preprocess_node()`\n\n```\n<?php\n/**\n * Implements\
  \ template_process_node().\n */\nfunction dgd7_preprocess_node(&$variables) {\n\
  \  // Changes go here.\n}\n```\n\n只需要清单 16–6 中的代码，再加上一次快速的缓存清除，Drupal 即可识别你的预处理函数并在渲染节点之前运行它。现在，有趣的部分可以开始了！\n\
  \n### 查找`$variables`的内容\n\n`$variables`数组的内容因每个主题钩子而异；即使同一主题钩子的内容也会根据其他因素（如视图模式或用户角色）而变化。\n\
  \n创建函数后，首先要做的是打印数组并找出里面有哪些你可以操作的内容。如“在主题层查找可用变量”部分所述，使用`dpm()`函数是一个很好的方法，如清单 16–7\
  \ 所示。\n\n**清单 16–7.** 将变量打印到屏幕以进行调试\n\n```\n<?php\n/**\n * Implements template_preprocess_node().\n\
  \ */\nfunction dgd7_preprocess_node(&$variables) {\n  dpm($variables);\n}\n?>\n\
  ```\n\n![images](img/square.jpg) **注意**：调试函数应仅在开发期间临时使用。\n\n#### 实战中的预处理函数\n\n使用预处理函数可以更改的东西太多了，我们无法一一详述。既然你已经设置好了预处理函数，并且知道如何查看现有变量，那么你已经具备了开始进行一些更改的知识。让我们直接开始，通过几个如何使用预处理函数的实用示例来实践。\n\
  \n\n\n### 为模板包装器添加类\n\n在 [`definitivedrupal.org`](http://definitivedrupal.org) 的\
  \ DGD7 主题中，页眉、侧边栏和页脚区域为黑色，而内容区域为白色。为了更轻松地设置这些区域内容的样式，你可以为区域包装器添加几个辅助类。为此，你需要在你的\
  \ `template.php` 文件中为区域主题钩子实现一个预处理函数；参见清单 16-8。\n\n***清单 16-8.** 在 `template_preprocess_region()`\
  \ 中使用 `$classes_array` 变量向区域包装器 `<div>` 添加类*\n\n```php\n<?php\n/**\n * 实现 template_preprocess_region()。\n\
  \ */\nfunction dgd7_preprocess_region(&$variables) {\n  $region = $variables['region'];\n\
  \  // 侧边栏和内容区域需要好的类来设置样式。你不应该使用像 #main 或 #main-wrapper 这样的 ID 来设置内容样式。\n  if (in_array($region,\
  \ array('sidebar_first', 'sidebar_second', 'content'))) {\n    $variables['classes_array'][]\
  \ = 'main';\n  }\n  // 向某些区域添加 \"clearfix\" 类，以清除其中的浮动元素。\n  if (in_array($region,\
  \ array('footer', 'help', 'highlight'))) {\n    $variables['classes_array'][] =\
  \ 'clearfix';\n  }\n  // 向较暗的区域添加 \"outer\" 类。\n  if (in_array($region, array('header',\
  \ 'footer', 'sidebar_first', 'sidebar_second'))) {\n    $variables['classes_array'][]\
  \ = 'outer';\n  }\n}\n?>\n```\n\n`$variables['classes_array']` 在处理阶段会变成 `$class`，而在预处理过程中添加的类会自动随之修改。因此，你只需如此，就能为区域包装器\
  \ `<div>` 添加一个类。\n\n在模板文件中采用替代方法则更加冗长。需要向每个受影响的模板文件中添加逻辑，这意味着即使你不需要改动标记，也必须覆盖文件。如果你有多个区域模板文件，则需要手动对所有文件进行更改，这显然效率低下，如清单\
  \ 16-9 所示。\n\n***清单 16-9.** 在预处理函数中添加类可以显著提高 CSS 代码的效率。*\n\n```css\n/* 使用默认提供的类和\
  \ ID。 */\n#header fieldset,\n#footer fieldset,\n.sidebar fieldset {\n  border-color:\
  \ #333;\n}\n\n/* 使用[清单 16-8]中添加的类，效率更高。 */\n.outer fieldset {\n  border-color: #333;\n\
  }\n```\n\n![](img/square.jpg) **提示** 此示例更改了区域模板的类，但这种技术可以应用于任何主要模板，包括在其各自的预处理函数中的\
  \ `html.tpl.php`、`block.tpl.php`、`node.tpl.php` 和 `comment.tpl.php`。\n\n### 修改节点\n\
  \n清单 16-10 演示了三个修改：\n\n1.  Drupal 的页面标题在 `page.tpl.php` 中输出。当节点标题在 `node.tpl.php`\
  \ 文件中输出时，通常是因为它正处于摘要模式下查看，因此，节点标题默认使用 `<h2>` 标记。通常，节点正文内的内容也包含一个或多个 `<h2>` 标签。向节点标题添加一个单独使用的类可以使样式设置更容易。清单\
  \ 16-10 利用 `$title_attributes_array` 添加一个 `node-title` 类，以帮助简化样式设置。\n2.  当查看一个节点，且其评论表单直接位于节点链接下方时，再显示一个\
  \ \"添加新评论\" 链接意义不大。在清单 16-10 中，通过使用 `hide()` 函数（本章后面将详细介绍），在评论表单位于下方时隐藏评论链接。\n3.\
  \  设计通常要求在查看节点的摘要与完整页面时有所不同。清单 16-10 演示了使用 `$variables['teaser']` 在摘要模式下抑制 `$submitted`\
  \ 信息的显示，并将节点标题截断为 70 个字符。\n\n***清单 16-10.** 演示在预处理过程中修改节点内容的显示*\n\n```php\n<?php\n\
  /**\n * 实现 template_preprocess_node()。\n */\nfunction dgd7_preprocess_node(&$variables)\
  \ {\n  // 为包含摘要节点标题的 <h2> 提供一个更好的类。\n  $variables['title_attributes_array']['class'][]\
  \ = 'node-title';\n\n  // 当评论表单位于链接下方时，移除 \"添加新评论\" 链接。\n  if (!empty($variables['content']['comments']['comment_form']))\
  \ {\n    hide($variables['content']['links']['comment']);\n  }\n\n  // 在摘要模式下进行一些更改。\n\
  \  if ($variables['teaser']) {\n    // 不显示作者或日期信息。\n    $variables['display_submitted']\
  \ = FALSE;\n    // 修剪节点标题并追加省略号。\n    $variables['title'] = truncate_utf8($variables['title'],\
  \ 70, TRUE, TRUE);\n  }\n}\n?>\n```\n\n### 在用户照片下方添加更改照片链接\n\n你可能已经注意到，`$variables`\
  \ 数组中提供了许多变量。这些变量可以用来非常方便地创建新变量。你知道编辑用户个人资料页面的路径是 `user/UID/edit`，因此你可以利用 `$variables`\
  \ 中的信息来判断查看页面的用户是否为账户持有人。一旦确定，你可以通过实现 `template_preprocess_user_picture()` 轻松创建一个包含链接的变量，以便用户在其照片出现的任何位置编辑照片，如清单\
  \ 16-11 所示。完成后，你就可以在相应的模板 `user-picture.tpl.php` 中输出它，如清单 16-12 所示。\n\n***清单 16-11.**\
  \ 通过实现 `template_preprocess_user_picture()` 为 `user-picture.tpl.php` 创建自定义变量。*\n\
  \n```php\n<?php\n/**\n * 实现 template_preprocess_user_picture()。\n * - 添加 \"更改照片\"\
  \ 链接，位于用户图像下方。\n */\nfunction dgd7_preprocess_user_picture(&$vars) {\n  // 创建一个空字符串变量，以防止在尝试输出变量时出现\
  \ PHP 通知\n  $vars['edit_picture'] = '';\n  // account 对象包含正在处理的用户照片的信息。将其与代表当前登录用户\n\
  \  // 的 user 对象的用户 ID 进行比较。\n  if ($vars['account']->uid == $vars['user']->uid)\
  \ {\n    // 创建一个包含指向用户个人资料链接的变量，并带有一个类 \"change-user-picture\"\n    // 以便使用 CSS\
  \ 设置样式。\n    $vars['edit_picture'] = l('更改照片', 'user/' . $vars['account']->uid .\
  \ '/edit',\narray(\n      'fragment' => 'edit-picture',\n      'attributes' => array('class'\
  \ => array('change-user-picture')),\n      )\n    );\n  }\n}\n?>\n```\n\n***清单 16-12.**\
  \ 将自定义变量输出到你已复制到主题中以进行覆盖的 `user-picture.tpl.php` 文件中*\n\n```php\n<?php if ($user_picture):\
  \ ?>\n  <div class=\"user-picture\">\n    <?php print $user_picture; ?>\n    <?php\
  \ print $edit_picture; ?>\n  </div>\n<?php endif; ?>\n```\n\n### 使用渲染 API\n\n\n\n\
  #### 什么是渲染数组？\n\n模板文件中的许多变量都很直观，但您可能会注意到，有些变量会与名为`render()`的函数一同输出。渲染数组是结构化数组，包含嵌套数据以及\
  \ Drupal 通过其渲染 API 将其转换为 HTML 所需的其他信息。在模板文件中，渲染数组的变量通常很容易识别，因为它们使用`render()`函数进行输出。\n\
  \n在`page.tpl.php`中，您会注意到所有区域都使用`render()`函数输出。每个区域都是嵌套在`$page`数组中的一个元素（另一个数组）。清单\
  \ 16-13 中的代码就是渲染每个区域所需的全部内容。每次`render()`调用都会返回渲染数组所有内容的完整格式化 HTML。\n\n***清单 16–13.**\
  \ 在 `page.tpl.php` 中使用 `render()` 函数输出区域*\n\n```php\n<?php print render($page['sidebar_first']);\
  \ ?>\n```\n\n在 Drupal 的早期版本中，您只需包含`<?php print $sidebar_first; ?>`，它包含一个可直接输出的完整格式化\
  \ HTML 字符串。这样做当然可行，但灵活性不足。坦白说，在那个阶段，面对一大块 HTML 标记，您能做的事情非常有限。\n\n在 Drupal 7 中，这些变量以结构良好的数组形式发送到模板。您得到的不是一堆\
  \ HTML 标记，而是一个包含其中内容各种信息的数组，甚至深入到其中特定链接的属性。这使得定位数组中的特定内容变得异常简单，并能在其首次渲染前的最后一刻进行任何您想要的修改。\n\
  \n要查看此数组中的内容，请使用 Devel 模块提供的`dpm()`函数，在`page.tpl.php`中打印它：`<?php dpm($page['sidebar_first']);\
  \ ?>`。如图 16-4 所示，此数组内有两个顶级渲染元素：搜索表单区块和导航区块，它们当前正在第一个侧边栏中输出。\n\n![图片](img/1604.jpg)\n\
  \n***图 16–4.** 使用 `dpm()` 从 `page.tpl.php` 打印出的 `$page['sidebar_first']` 渲染数组内容*\n\
  \n#### 识别渲染元素\n\n识别数组是否为渲染元素的一个简单方法是查看是否存在属性。渲染元素始终是数组，并且始终包含以井号（#）开头的属性。在图 16-4\
  \ 中，您可以立即判断出`$page['sidebar_first']`是一个渲染元素，因为它包含几个属性：`#sorted`、`#theme_wrappers`和`#region`。这些属性由`drupal_render()`使用，当调用`drupal_render()`时，它会根据这些属性决定如何渲染输出。有关`drupal_render()`的详细信息，请参见[`http://api.drupal.org/api/function/render/7`](http://api.drupal.org/api/function/render/7)。\n\
  \n作为主题开发者，您通常不会深入探究那些更偏向开发者使用的属性，但有一些属性将有助于您理解这些数组的含义。这些属性在表 16-1 中进行了描述。\n\n***表\
  \ 16–1.** 有用的渲染元素属性*\n\n| **属性** | **描述** |\n| --- | --- |\n| `#theme` | 指定主题钩子，可以是渲染元素时使用的函数或模板。\
  \ |\n| `#theme_wrappers` | 一个包含主题钩子的数组，用于包裹元素已渲染的子元素。例如，在为主题化区块时，`#theme`属性会是`block`，而`#theme_wrappers`属性会包含`region`。这确保了在区块渲染后，其子元素也会通过区域模板进行处理。\
  \ |\n| `#type` | 将被渲染的元素类型。元素类型的默认属性在`hook_element_info()`实现中定义。 |\n| `#prefix`\
  \ & `#suffix` | 包含标记的字符串，分别放置在渲染元素之前（前缀）或之后（后缀）。 |\n| `#weight` | 用于对元素进行排序的数字，决定其输出顺序。\
  \ |\n| `#sorted` | 一个布尔值（`TRUE`或 `FALSE`），用于指示子元素是否已排序。例如，它与`#weight`属性结合使用，对区域中的区块进行排序。当通过`hook_page_alter()`在主题中重新排序区块时，如果您需要将某个区块移动到已排序元素之外的任何其他位置，除了指定`#weight`外，还需要指定`#sorted\
  \ => FALSE`以触发新的排序。 |\n| `#attached` | `#attached`属性用于指定在渲染元素时加载相应的 CSS、JavaScript\
  \ 或库。 |\n\n*有关更多信息，请参阅文档：[`api.drupal.org/api/function/drupal_render/7`](http://api.drupal.org/api/function/drupal_render/7)*\n\
  \n#### 操作渲染元素的输出\n\n如前所述，使用结构化数组比使用一堆 HTML 要灵活得多。这使得您可以轻松地只做您想要的修改，无论大小，而无需从头重写代码。\n\
  \n使用渲染数组生成标记以及使用 alter 钩子的概念，对于 Drupal 主题开发者来说是完全陌生的。这跟您习惯的方式截然不同，不过在积极意义上，它需要一段时间的适应。在很多方面，对于一次性实现来说，它比创建模板和主题函数更简单。前端开发人员在使用渲染\
  \ API 时遇到的最大问题是：\n\n1.  以不同的方式思考如何生成标记。\n2.  弄清楚如何修改渲染数组的内容。\n3.  习惯于实现 alter 钩子。\n\
  \n与主题钩子不同，渲染数组是使用 alter 钩子进行修改的，而不是预处理函数和模板。起初这可能会令人困惑，因为渲染数组与主题钩子相似，它们的目标都是最终生成\
  \ HTML 标记，并且它们使用模板和主题函数来实现这一点。对于渲染数组，`#theme`属性（允许您定义应使用哪个主题函数或模板来渲染元素）只是众多可用属性之一，并且可以随时更改。通常，您会使用模板和主题函数来修改标记本身，并使用\
  \ alter 钩子在元素渲染前修改其内容、结构或位置。\n\n以下章节包含一些您可以使用渲染数组进行操作的示例。\n\n\n\n##### 即时生成新内容\n\
  \n生成新内容就像向页面数组添加新元素一样简单。列表清单 16–14 展示了如何在主题的 `template.php` 文件中通过实现 `hook_page_alter()`\
  \ 钩子，向原有的 `Highlighted` 区域添加一个名为 `\"new_stuff\"` 的新元素。\n\n**列表清单 16–14**. 向高亮区域添加新元素\n\
  \n```php\n<?php\n/**\n* 实现 hook_page_alter() 钩子。\n*/\nfunction mytheme_page_alter(&$page)\
  \ {\n  $page['highlighted']['new_stuff'] = array(\n    '#type' => 'container',\n\
  \    '#attributes' => array('class' => 'my-container'),\n  );\n  $page['highlighted']['new_stuff']['heading']\
  \ = array(\n    '#type' => 'html_tag',\n    '#tag' => 'h2',\n    '#value' => t('Heading'),\n\
  \    '#attributes' => array('id' => 'my-heading'),\n  );\n  $page['highlighted']['new_stuff']['list']\
  \ = array(\n    '#theme' => 'item_list',\n    '#items' => array(\n      'First item',\n\
  \      'Second item',\n      'Third item',\n    ),\n  );\n}\n```\n\n你首先将新元素命名为 `\"\
  new_stuff\"`，将其 `#type` 设置为 `container`，并定义了一个类属性 `my-container`。请注意，`container`\
  \ 是一个在 `system_element_info()` 中定义的元素，它默认使用 `theme_container()` 主题函数作为主题包装器。这意味着该元素的子元素（标题和列表）将通过\
  \ `theme_container()` 进行处理。生成的标记如列表清单 16–15 所示。\n\n**列表清单 16–15.** `theme_container()`\
  \ 为 `$page['highlighted']['new_stuff']` 生成的输出\n\n```html\n<div class=\"my-container\"\
  >\n  ...\n</div>\n```\n\n然后，你添加了一个名为 `\"heading\"` 的子元素，并将其 `#type` 元素属性指定为 `html_tag`。这会导致该元素在渲染时使用\
  \ `theme_html_tag()`。你还指定了 `#tag`、`#value` 和 `#attributes` 属性。这些是 `theme_html_tag()`\
  \ 函数的参数，详见 [`http://api.drupal.org/api/function/theme_html_tag/7`](http://api.drupal.org/api/function/theme_html_tag/7)。生成的标记如列表清单\
  \ 16–16 所示。\n\n**列表清单 16–16**. `theme_html_tag()` 为 `$page['highlighted']['new_stuff']['heading']`\
  \ 生成的输出\n\n```html\n<h2 id=\"my-heading\">Heading</h2>\n```\n\n最后，你添加了一个名为 `\"list\"\
  ` 的子元素。此处你将 `#theme` 属性指定为 `item_list`，并包含了一个包含 `#items` 的数组，`#items` 是 `theme_item_list()`\
  \ 的必需参数。生成的标记如列表清单 16–17 所示。\n\n**列表清单 16–17**. `theme_item_list()` 为 `$page['highlighted']['new_stuff']['list']`\
  \ 生成的输出\n\n```html\n<div class=\"item-list\">\n  <ul>\n    <li class=\"first\">First\
  \ item</li>\n    <li>Second item</li>\n    <li class=\"last\">Third item</li>\n\
  \  </ul>\n</div>\n```\n\n当 `Highlighted` 区域被渲染时，列表清单 16–14 中的代码会产生如列表清单 16–18 所示的最终结果。\n\
  \n**列表清单 16–18**. 列表清单 16–14 的最终渲染结果\n\n```html\n<div class=\"my-container\">\n\
  \  <h2 id=\"my-heading\">Heading</h2>\n  <div class=\"item-list\">\n    <ul>\n \
  \     <li class=\"first\">First item</li>\n      <li>Second item</li>\n      <li\
  \ class=\"last\">Third item</li>\n    </ul>\n  </div>\n</div>\n```\n\n![images](img/square.jpg)\
  \ **警告** 上述示例旨在说明如何使用渲染 API 生成内容。不过，值得注意的是，不应滥用此方法将页面上的每一段 HTML 都作为独立元素输出，因为这可能会严重影响性能。对于少量的标记，例如标题，更推荐使用\
  \ `markup` `#type` 而非 `html_tag`，因为后者需要调用 `theme_html_tag()` 主题函数来确定输出。\n\n#####\
  \ 将内容从一个区域移动到另一个区域\n\n在 `hook_page_alter()` 的实现中，你可以随意移动各区域的内容。列表清单 16–19 中包含了简单的几行代码，用于将整个第一侧边栏的内容移动到第二侧边栏。这样，在完整节点页面上，布局会从左侧边栏布局变为右侧边栏布局。在列表清单\
  \ 16–19 中，你还将面包屑导航移动到了底部页脚区域。\n\n**列表清单 16–19**. 将 `sidebar_first` 区域重定位到 `sidebar_second`，并将面包屑导航添加到页脚区域的新元素中\n\
  \n```php\n<?php\n/**\n* 实现 hook_page_alter() 钩子。\n*/\nfunction dgd7_page_alter(&$page)\
  \ {\n  // 检查当前是否正在查看完整的节点页面。\n  if (node_is_page(menu_get_object())) {\n    // 将\
  \ sidebar_first 的内容赋值给 sidebar_second。\n    $page['sidebar_second'] = $page['sidebar_first'];\n\
  \    // 取消设置 sidebar_first。\n    unset($page['sidebar_first']);\n  }\n\n  // 将面包屑导航添加到页脚区域底部。\n\
  $page['footer']['breadcrumbs'] = array(\n    '#type' => 'container',\n    '#attributes'\
  \ => array('class' => array('breadcrumb-wrapper', 'clearfix')),\n    '#weight' =>\
  \ 10,\n  );\n  $page['footer']['breadcrumbs']['breadcrumb'] = array(\n    '#theme'\
  \ => 'breadcrumb',\n    '#breadcrumb' => drupal_get_breadcrumb(),\n  );\n  // 触发区域内容重新排序。\n\
  \  $page['footer']['#sorted'] = FALSE;\n}\n```\n\n##### 修改渲染数组中的内容\n\n修改渲染数组的内容以改变实际内容的零散部分，这会进入一个非常模糊的领域。可以说，像这样的修改应该放在模块中。在进行此类修改时，关键要问自己：当你正在开发的主题未激活时，你所做的修改是否仍应适用？列表清单\
  \ 16–20 将用户个人资料页面上的“查看”和“编辑”标签分别改为“个人资料”和“编辑个人资料”。\n\n**列表清单 16–20**. 实现 `hook_menu_local_tasks_alter()`\
  \ 以更改用户个人资料页面上的标签名称\n\n```php\n<?php\n/**\n* 实现 hook_menu_local_tasks_alter() 钩子。\n\
  */\nfunction dgd7_menu_local_tasks_alter(&$data, $router_item, $root_path) {\n \
  \ if ($root_path == 'user/%') {\n    // 将第一个标签的标题从 'View' 改为 'Profile'。\n    if\
  \ ($data['tabs'][0]['output'][0]['#link']['title'] == t('View')) {\n      $data['tabs'][0]['output'][0]['#link']['title']\
  \ = t('Profile');\n    }\n    // 将第二个标签的标题从 'Edit' 改为 'Edit profile'。\n    if ($data['tabs'][0]['output'][1]['#link']['title']\
  \ == t('Edit')) {\n      $data['tabs'][0]['output'][1]['#link']['title'] = t('Edit\
  \ profile');\n    }\n  }\n}\n```\n\n### 核心模板中值得关注的渲染数组\n\n核心模板中散落着不少值得关注的渲染数组变量。`hook_page_alter()`\
  \ 包含整个页面，因此始终可以用来修改任何内容。但是，由于其他模块可以移动内容，找到特定的修改目标并非总是易事，因此建议使用更具体的修改钩子。表 16–2 是一个快速参考，列出了重要的渲染数组。这绝非完整列表，但它涵盖了相当多的内容，并能为你提供思路，让你了解如何着手查找编辑这些内容的位置。\n\
  \n![images](img/t1602.jpg)\n\n![images](img/t1602a.jpg)\n\n\n\n### 介绍 `render()`、`hide()`\
  \ 和 `show()`\n\nDrupal 7 最佳的新主题功能之一，是在模板中有选择地渲染内容片段。如前面章节所述，某些变量（渲染数组）的内容会以结构化的数组形式（而非\
  \ HTML 片段）发送到模板中。这对主题层来说是个非常棒的消息。\n\n要理解这到底有多棒，你需要回顾一下历史。在 Drupal 的早期版本中，为包含字段的复杂节点制作主题并非易事。字段被混杂在\
  \ `$content` 变量中，虽然可以单独打印和操作它们，但存在一些问题。你必须非常小心地正确清理变量，而且一旦决定拆分 `$content` 变量，就需要完全重建它。这种做法不具备前瞻性，因为新增字段通常需要回到模板文件并打印新字段。\n\
  \n在 Drupal 7 中，这些问题得到了优雅的解决。你现在能够非常轻松地使用三个新函数 `render()`、`hide()` 和 `show()` 来渲染单个内容片段，例如字段。它们可以在主题函数、模板文件以及预处理和过程处理函数中使用。这三个函数都接受一个参数，即你想要定位的元素（或子元素）。\n\
  \n-   `hide()`：通过欺骗 `drupal_render()` 使其认为元素已被打印，从而隐藏一个渲染元素或其部分。使用示例：`<?php hide($element['something']);\
  \ ?>`\n-   `show()`：与 `hide()` 相反。它可以用于撤销之前应用的 `hide()` 状态。使用示例：`<?php show($element['something']);\
  \ ?>`\n-   `render()`：将渲染数组转换为 HTML 标记。它返回 HTML，因此在模板中应与 `print` 一起使用。使用示例：`<?php\
  \ print render($element); ?>`\n\n为了演示这些函数的实际应用，请查看 `node.tpl.php`（参见清单 16–21）。\n\
  \n**清单 16–21**. 默认 `node.tpl.php` 模板的摘录\n\n```\n<div id=\"node-<?php print $node->nid;\
  \ ?>\" class=\"<?php print $classes; ?> clearfix\"<?php print\n$attributes; ?>>\n\
  \  <?php print $user_picture; ?>\n  <?php print render($title_prefix); ?>\n  <?php\
  \ if (!$page): ?>\n    <h2<?php print $title_attributes; ?>><a href=\"<?php print\
  \ $node_url; ?>\"><?php print $title; ?></a></h2>\n  <?php endif; ?>\n  <?php print\
  \ render($title_suffix); ?>\n  <?php if ($display_submitted): ?>\n    <div class=\"\
  submitted\">\n      <?php print $submitted; ?>\n    </div>\n  <?php endif; ?>\n\
  \  <div class=\"content\"<?php print $content_attributes; ?>>\n    <?php\n     \
  \ // 现在隐藏评论和链接，以便稍后渲染。\n      hide($content['comments']);\n      hide($content['links']);\n\
  \      print render($content);\n    ?>\n  </div>\n  <?php print render($content['links']);\
  \ ?>\n  <?php print render($content['comments']); ?>\n</div>\n```\n\n如清单 16–21 所示，该模板开箱即用，已经同时使用了\
  \ `render()` 和 `hide()` 函数。这个节点模板中有三个渲染数组：`$title_prefix`、`$title_suffix` 和 `$content`。在\
  \ `<div class=\"content\">` 包装器内部，使用 `hide()` 隐藏了 `$content['links']` 和 `$content['comments']`，然后直接渲染了\
  \ `$content`。\n\n隐藏评论和链接的原因是，将它们从 `$content` 变量中分离出来，使它们能够放置在 `<div class=\"content\"\
  >` 包装器之外。随后，这两个项目再通过 `render()` 分别进行渲染。\n\n当然，乐趣不仅仅停留在顶级变量上。这些函数可以深入处理数组的任何层级。只要你传入一个正确的渲染元素（参见“渲染\
  \ API”部分），就能通过这些函数对其进行操作。\n\n举个例子，假设你想在查看包含评论表单的节点时，隐藏“添加新评论”链接。你可以简单地检查表单是否存在于你的数组中，然后隐藏那个特定的链接组（评论）。清单\
  \ 16–22 中的代码演示了如何做到这一点。\n\n**清单 16–22**. 当评论表单存在时隐藏“添加新评论”链接\n\n```\n<?php\n// 当评论表单存在时，隐藏“添加新评论”链接。\n\
  if (!empty($vars['content']['comments']['comment_form'])) {\n  hide($vars['content']['links']['comment']);\n\
  }\n// 之后再打印渲染后的链接。\nprint render($content['links']);\n```\n\n由于 `show()` 函数会重置打印状态但不会打印任何内容，因此它有助于撤销之前应用的\
  \ `hide()` 状态。在大多数情况下，你可能只需使用 `render()`，因为它允许你根据需要多次打印该元素，如清单 16–23 所示。\n\n**清单\
  \ 16–23**. 当评论表单存在时隐藏“添加新评论”链接，但如果满足其他条件则再次显示它\n\n```\n<?php\n// 当评论表单存在时，隐藏“添加新评论”链接。\n\
  if (!empty($content['comments']['comment_form'])) {\n  hide($content['links']['comment']);\n\
  \  if ($some_exception) {\n    show($content['links']['comment']);\n  }\n}\n// 之后再打印渲染后的链接。\n\
  print render($content['links']);\n```\n\n![images](img/square.jpg) **提示** 对于复杂的模板，这些代码在模板文件中会变得非常混乱。在这种情况下，最好在预处理或过程处理函数中执行这些操作，以使你的模板保持整洁并更易于管理。\n\
  \n### 表单主题化\n\n表单主题化与处理通常的模板文件或主题函数略有不同。表单标记是使用 Drupal 的表单 API 生成的。这使得模块构建表单变得非常容易，并保证了生成元素之间的一致性。虽然表单主题化的过程与大多数前端开发人员习惯的方式大相径庭，但我们认为你会开始欣赏\
  \ Drupal 表单主题化的一致性和灵活性。\n\nDrupal 的一个著名特点是能够以多种不同方式完成同一项任务。虽然 Drupal 的所有表单都没有附带模板文件，但它们可以很容易地被设置为使用模板文件。表单也可以使用预处理函数、过程处理函数和修改钩子。那么，如何决定何时使用哪一种呢？本节将解释表单是如何生成的，并会提供几个使用每种方法的示例。\n\
  \n\n\n### 表单标记的生成方式\n\n表单由模块生成。代码清单 16–24 中展示的简单函数即是生成表单标记所需的全部内容。看起来非常简单，对吧？确实如此。当然，要让表单具备功能性，还需要更多处理步骤，例如验证表单和保存提交的值，但这些在主题层中并不是你需要关心的。对你而言重要的是表单的结构，以及它如何从\
  \ `$form` 数组转换为实际的标记。\n\n**代码清单 16–24**。一个简单的取消订阅表单\n\n```php\n<?php\nfunction exampleform_unsubscribe(&$form,\
  \ $form_state) {\n  $form['email'] = array(\n    '#type' => 'textfield',\n    '#title'\
  \ => t('E-mail address'),\n    '#required' => TRUE,\n  );\n  $form['submit'] = array(\n\
  \    '#type' => 'submit',\n    '#value' => t('Remove me!'),\n  );\n  return $form;\n\
  }\n```\n\n在代码清单 16–24 中，你定义了一个非常简单的表单，包含两个元素：一个用于输入电子邮件地址的文本字段和一个提交按钮。渲染后，结果如图 16–5\
  \ 所示。生成的标记见代码清单 16–25。\n\n![images](img/1605.jpg)\n\n**图 16–5**。基于代码清单 16–24 代码渲染的表单\n\
  \n**代码清单 16–25**。Drupal 为代码清单 16–24 中 `exampleform_unsubscribe()` 表单生成的标记\n\n```html\n\
  <form action=\"/example/unsubscribe\" method=\"post\" id=\"exampleform-unsubscribe\"\
  \ accept-\ncharset=\"UTF-8\">\n  <div>\n    <div class=\"form-item form-type-textfield\
  \ form-item-email\">\n      <label for=\"edit-email\">E-mail address\n        <span\
  \ class=\"form-required\" title=\"This field is required.\">*</span>\n      </label>\n\
  \      <input type=\"text\" id=\"edit-email\" name=\"email\" value=\"\" size=\"\
  60\" maxlength=\"128\" class=\"form-text required\" />\n    </div>\n    <input type=\"\
  submit\" id=\"edit-submit\" name=\"op\" value=\"Remove me!\" class=\"form-submit\"\
  \ />\n    <input type=\"hidden\" name=\"form_build_id\" value=\"form-jKkl1KLWJLnv0hM4DSVd8-\n\
  40boTgBQAzWWhUn44c15Q\" />\n    <input type=\"hidden\" name=\"form_token\" value=\"\
  LB07DqsDXK9idWdOHLxUen7jKxm52JqTyHiR7-pNumA\"\n/>\n    <input type=\"hidden\" name=\"\
  form_id\" value=\"exampleform_unsubscribe\" />\n  </div>\n</form>\n```\n\n#### 表单\
  \ API 元素与默认属性\n\n在 `exampleform_unsubscribe()` 表单中，你定义了两个表单元素：电子邮件地址元素和提交元素。电子邮件元素的\
  \ `#type` 属性是 `textfield`，它提供了一个单行文本输入框。提交元素的 `#type` 是 `submit`，对应于表单 API 中的 `<input\
  \ type=\"submit\" />`。\n\n如果仔细观察代码清单 16–25 中生成的标记，你会发现你仅为每个元素设置了两个属性，但生成的标记中却包含了一些额外的属性。这是因为\
  \ Drupal 为每个元素分配了一组默认属性。在这个例子中，你使用了 `form`、`textfield` 和 `submit` 元素，它们在 `system_element_info()`\
  \ 中已有定义，如代码清单 16–26 所示。当处理表单时，Drupal 会将表单中定义的属性与默认属性合并。\n\n**代码清单 16–26**。`system_element_info()`\
  \ 中为 `textfield` 和 `submit` 元素定义的默认属性\n\n```php\n<?php\n$types['form'] = array(\n\
  \  '#method' => 'post',\n  '#action' => request_uri(),\n  '#theme_wrappers' => array('form'),\n\
  );\n$types['textfield'] = array(\n  '#input' => TRUE,\n  '#size' => 60,\n  '#maxlength'\
  \ => 128,\n  '#autocomplete_path' => FALSE,\n  '#process' => array('ajax_process_form'),\n\
  \  '#theme' => 'textfield',\n  '#theme_wrappers' => array('form_element'),\n);\n\
  $types['submit'] = array(\n  '#input' => TRUE,\n  '#name' => 'op',\n  '#button_type'\
  \ => 'submit',\n  '#executes_submit_callback' => TRUE,\n  '#limit_validation_errors'\
  \ => FALSE,\n  '#process' => array('ajax_process_form'),\n  '#theme_wrappers' =>\
  \ array('button'),\n);\n```\n\n![images](img/square.jpg) **提示** 此表单只涉及了少数几个表单元素，但\
  \ Drupal 拥有许多元素。如需查阅通过表单 API 可用的完整元素列表及其默认属性，请参见 [`http://api.drupal.org/api/file/developer/topics/forms_api_reference.html/7`](http://api.drupal.org/api/file/developer/topics/forms_api_reference.html/7)。\n\
  \n#### 表单元素的渲染\n\n元素属性包含了渲染它们所需的关键信息。在这些属性中，有两个在主题层中非常重要：`#theme` 和 `#theme_wrappers`。当渲染表单时，这些属性告诉\
  \ Drupal 使用哪些主题函数。此外，还可以使用 `#pre_render` 属性来定义应在渲染之前执行的函数。\n\n*   `#theme`：指定渲染该元素时要使用的主题函数。\n\
  *   `#theme_wrappers`：指定用于包裹该元素已渲染子元素的一个或多个主题函数。\n\n为了说明这个过程，我们使用前面表单中的 `$form['email']`\
  \ 字段来逐步演示：\n\n1.  调用 `theme('textfield', array('element' => $form['email']))`。这会生成以下标记：`<input\
  \ type=\"text\" id=\"edit-email\" name=\"email\" value=\"\" size=\"60\" maxlength=\"\
  128\" class=\"form-text required\" />`\n2.  调用 `theme('form_element', array('element'\
  \ => $form['email']))`。这会生成以下标记：\n    ```html\n    <div class=\"form-item form-type-textfield\
  \ form-item-email\">\n      <label for=\"edit-email\">E-mail address\n        <span\
  \ class=\"form-required\" title=\"This field is required.\">*</span>\n      </label>\n\
  \      <input type=\"text\" id=\"edit-email\" name=\"email\" value=\"\" size=\"\
  60\" maxlength=\"128\" class=\"form-text required\" />\n      <!-- 渲染文本字段的结果 -->\n\
  \    </div>\n    ```\n3.  最后，在所有表单元素渲染完成后，表单本身会通过 `theme_form()` 进行处理，该函数在表单元素的\
  \ `#theme_wrappers` 中指定。`theme_form()` 函数负责生成表单标记的其余部分，包括隐藏元素 `form_build_id`、`form_token`\
  \ 和 `form_id`。\n\n![images](img/square.jpg) **警告** 如之前所述，切勿使用 `theme_` 直接调用主题函数，同样地，在\
  \ `#theme` 和 `#theme_wrappers` 中填入主题函数时也不带 `theme_` 前缀。\n\n### 主题化表单的第一步\n\n####\
  \ 查找表单 ID\n\n在你开始任何操作之前，需要找到正在处理的表单的 ID。它在每个表单的标记中出现在以下两个位置：\n\n1.  表单底部附近有一个名为\
  \ `form_id` 的隐藏字段，其中包含你要找的内容。`<input type=\"hidden\" name=\"form_id\" value=\"exampleform_unsubscribe\"\
  \ />`\n2.  尽管不能直接复制粘贴使用，因为 `<form>` 的 ID 属性中单词之间使用短横线（-）而非下划线（_）分隔，但它也包含表单 ID。`<form\
  \ id=\"exampleform-unsubscribe\">`\n\n每个表单 ID 都有一个对应的函数，该函数遵循 Drupal 模块命名约定。在此示例中，`exampleform`\
  \ 是模块名称，`unsubscribe` 是该模块为表单指定的名称。\n\n在进行主题化时，有时查看原始表单和代码注释会有所帮助。你通常可以在创建该表单的模块的\
  \ `.module` 文件中找到生成表单的原始函数。如果你发现表单不在 `.module` 文件中，那么它肯定在模块内的某个地方，但你可能需要四处查找。有时开发者会出于组织结构和代码效率的考虑使用\
  \ `.inc` 文件。\n\n\n\n### 实现 `hook_theme()`\n\n为了能在表单中使用模板文件、预处理函数或处理函数，首先需要将表单 ID\
  \ 注册为主题钩子。这一步是必要的，这样 Drupal 才能识别该主题钩子。Drupal 核心已为某些表单（主要是使用表格的管理表单）注册了主题钩子，但你可能仍需要手动完成这一操作。\n\
  \n在你的主题的`template.php`文件中，创建一个`hook_theme()`的实现，并将主题名称替换钩子前缀。举个例子，当联系人模块启用时，你需要为位于`/contact`的联系表单（其表单\
  \ ID 为`contact_site_form`）设置主题。在实现中，将表单 ID 作为键，并将渲染元素指定为`form`，如清单 16–27 所示。对于使用渲染\
  \ API 生成标记（例如表单）的主题钩子，`render element`键是必需的。其值表示保存可渲染元素的变量名称，在本例中为`form`。\n\n***清单\
  \ 16–27**：将`contact_site_form()`主题钩子定义为渲染元素“form”的`hook_theme()`实现*\n\n```\n<?php\n\
  /**\n * Implements hook_theme().\n */\nfunction THEMENAME_theme() {\n  return array(\n\
  \    // 将表单 ID 定义为主题钩子。\n    'contact_site_form' => array(\n      // 指定 'form' 作为渲染元素。\n\
  \      'render element' => 'form',\n    ),\n  );\n}\n```\n\n完成上述操作并清除缓存后，你就可以为该表单创建主题函数，并使用预处理函数和处理函数了。这些将在本章后续内容中介绍。\n\
  \n![images](img/square.jpg) **提示**：注册主题钩子时，如果不确定如何填写，可以查看一些默认实现。在本例中，你处理的是一个表单，因此快速查阅[`http://api.drupal.org/api/function/drupal_common_theme/7`](http://api.drupal.org/api/function/drupal_common_theme/7)\
  \ 可以找到原始表单主题钩子的默认值，而这正是你需要的。\n\n### 使用主题函数为表单设置主题\n\n选择使用主题函数还是模板文件，是个人或团队偏好的问题。如果你熟悉\
  \ PHP，可能会倾向于使用主题函数；如果不熟悉，则可能更喜欢模板文件（下一节将介绍）。\n\n如前所述，你需要一个`hook_theme()`的实现，且不包含模板或路径索引，如清单\
  \ 16–28 所示。完成此操作后，`hook_contact_site_form()`成为一个官方的主题钩子，可以像其他任何主题函数一样被覆盖。即使`theme_contact_site_form()`函数本身并不存在，你仍然可以像覆盖其他主题函数一样命名它：`THEMENAME_contact_site_form()`。\n\
  \n***清单 16–28**：使用主题函数为表单设置主题所需的基本代码*\n\n```\n<?php\n/**\n * Implements hook_theme().\n\
  \ */\nfunction dgd7_theme() {\n  return array(\n    'contact_site_form' => array(\n\
  \      'render element' => 'form',\n    ),\n  );\n}\n\n/**\n * Implements theme_forms_contact_site_form().\n\
  \ */\nfunction dgd7_contact_site_form($variables) {\n  // 渲染表单的所有元素。\n  return drupal_render_children($variables['form']);\n\
  }\n```\n\n### 必须使用 `drupal_render_children()`！\n\n`drupal_render_children()`负责渲染表单的所有子元素。仅此函数就能产生\
  \ Drupal 在没有你的主题函数时本应提供的完全相同代码，这使得清单 16–28 中的函数本身毫无用处。但值得强调的是，**始终**在函数底部使用`drupal_render_children($variables['form'])`非常重要。\n\
  \n即使你对添加到表单的每个元素都调用了`render()`，Drupal 也会添加一些用于标识表单的重要隐藏元素，这些元素也需要被渲染。因此，在主题函数末尾调用`drupal_render_children($form)`是强制性的。这不会重新打印`$form['foo']`，因为`drupal_render()`知道它已经打印过了。此外，它还能处理其他模块添加的任何额外元素。\n\
  \n### 在主题函数中操作表单元素\n\n既然已经了解了基础，现在让我们对标记做一些更改。与任何主题函数一样，该函数返回的代码将直接插入页面标记中。由于表单是渲染元素，你需要渲染它们。清单\
  \ 16–29 中的代码执行了以下操作：\n\n1.  更改“姓名”和“邮件”元素的标签。\n2.  单独渲染“姓名”和“邮件”元素。\n3.  将标记和单独渲染的元素放入一个名为`$output`的变量中。\n\
  4.  在主题函数的底部，将`drupal_render_children($form)`包含到`$output`中。\n5.  最后，返回`$output`。\n\
  \n***清单 16–29**：实现`theme_contact_site_form()`*\n\n```\n<?php\n/**\n * Implements\
  \ theme_contact_site_form().\n */\nfunction dgd7_contact_site_form($variables) {\n\
  \n  // 隐藏“主题”字段。它不是必填项。\n  hide($variables['form']['subject']);\n\n  // 更改“姓名”和“邮件”文本字段的标签。\n\
  \  $variables['form']['name']['#title'] = t('Name');\n  $variables['form']['mail']['#title']\
  \ = t('E-mail');\n\n  // 以任何你喜欢的方式创建输出。\n  $output = '<div class=\"something\">';\n\
  \  $output .= '<p class=\"note\">'. t(\"We'd love hear from you. Expect to hear\
  \ back from us in 1-2 business days.\") .'</p>';\n  $output .= render($variables['form']['name']);\n\
  \  $output .= render($variables['form']['mail']);\n  $output .= '</div>';\n\n  //\
  \ 确保包含剩余表单元素的渲染版本。\n  $output .= drupal_render_children($variables['form']);\n\n\
  \  // 返回输出。\n  return $output;\n}\n```\n\n表单及其内容是渲染元素，因此你可以使用`hide()`、`show()`和`render()`函数来操作表单的元素。在主题函数中使用`hide()`或对表单数组进行更改时，需要确保在尝试渲染之前完成这些操作。还有很多其他可能实现的操作，我们无法在此一一列举，但以下是一些快速示例，展示了可以做什么：\n\
  \n*   调整元素的`#weight`属性以改变它们的打印顺序。以下代码会导致“消息”元素打印在表单顶部：\n    ```\n    $variables['form']['message']['#weight]\
  \ = -10;\n    $variables['form']['message']['#sorted] = FALSE;\n    ```\n*   通过设置元素的`#description`属性，在元素下方添加描述，如下所示：\n\
  \    ```\n    $variables['form']['mail']['#description'] = t(\" We won't share your\
  \ e-mail with anyone. \");\n    ```\n*   设置表单元素的默认值，例如默认勾选“给自己发送副本”复选框，方法是将`#checked`属性设置为`TRUE`，如下所示：\n\
  \    ```\n    $variables['form']['copy']['#checked'] = TRUE;\n    ```\n*   取消设置`#theme_wrappers`属性，以移除标签和包装`<div>`，并完全按照你的意愿重新创建标记，如下所示：\n\
  \    ```\n    unset($variables['form']['mail']['#theme_wrappers]);\n    ```\n* \
  \  更高级的更改包括使用`theme_table()`函数使表单以表格形式显示。\n*   等等！\n\n![images](img/square.jpg)\
  \ **提示**：使用主题函数在性能上略优于模板，但差异非常微小。在决定使用模板文件还是主题函数时，不需要担心性能问题。\n\n\n\n#### 使用模板文件为表单设置主题\n\
  \n根据你已经学到的知识，为表单创建模板文件出奇地简单。正如“表单主题化的第一步”部分所述，你需要打开 `template.php` 并实现一个 `hook_theme()`\
  \ 函数。除了定义渲染元素之外，你还需要额外添加两项内容，如清单 16–30 所示：\n\n1. 一个 `path` 键（可选），其中包含模板文件在你主题中的路径。\n\
  2. 一个 `template` 键，其中包含模板文件的名称（不含 `.tpl.php` 后缀）。\n\n![ images](img/square.jpg)\
  \ **注意** 以这种方式定义的模板文件不会被自动发现。如果省略了路径，Drupal 只会到主题的根目录中寻找你的模板文件。只有当你的模板文件位于主题的子目录中时，才需要指定模板目录的路径。\n\
  \n***清单 16–30**。 为表单使用模板而实现的 `hook_theme()` 函数*\n\n```\n<?php\n/**\n * 实现 hook_theme()。\n\
  \ */\nfunction mytheme_theme() {\n  return array(\n    'contact_site_form' => array(\n\
  \      'render element' => 'form',\n      'path' =>  drupal_get_path('theme', 'mytheme')\
  \ . '/templates',\n      'template' => 'contact-site-form',\n    ),\n  );\n}\n```\n\
  \n创建了清单 16–30 中所示的 `hook_theme()` 函数后，你需要创建模板文件。在本例中，该文件位于你主题的 templates 目录内：\n\n\
  `sites/all/themes/mytheme/templates/contact-site-form.tpl.php`。\n\n完成后，只需清除缓存，Drupal\
  \ 就会开始使用你的模板文件。\n\n如果你的文件最初是空的，你会得到一个空白页面，而表单原本应该在那里。你首先应该做的是在模板文件中添加这行代码：`<?php\
  \ print drupal_render_children($form); ?>`。这将恢复整个表单，即使你可能不想保留表单中的所有内容，也必须在表单底部打印这些内容，以确保一切正常运作，正如我们在“必须使用\
  \ `drupal_render_children()！`”部分中详细说明的那样。\n\n#### 在模板文件中操作表单元素\n\n为了详细讨论这个话题，我们使用“在主题函数中操作表单元素”部分中的例子。清单\
  \ 16–31 中的代码代表了完成以下任务的结果：\n\n1.  更改用户名和邮件元素的标签。\n2.  单独渲染用户名和邮件元素。\n3.  按照你的需求排列标记语言和单独渲染的元素。\n\
  4.  最后，在模板底部打印 `drupal_render_children($form)`。\n\n***清单 16–31**。 联系表单的 `contact-site-form.tpl.php`\
  \ 实现*\n\n```\n<?php // 更改\"name\"和\"mail\"文本字段的标签。\n$form['name']['#title'] = t('名称');\n\
  $form['mail']['#title'] = t('电子邮箱');\n?>\n\n<?php // 单独渲染\"name\"和\"mail\"元素并添加标记。\
  \ ?>\n<div class=\"name-and-email\">\n  <p><?php print t(\"我们很期待收到您的来信。预计 1-2 个工作日内回复。\"\
  ) ?></p>\n  <?php print render($form['name']); ?>\n  <?php print render($form['mail']);\
  \ ?>\n</div>\n\n<?php // 确保渲染其余的表单项。 ?>\n<?php print drupal_render_children($form);\
  \ ?>\n```\n\n虽然存在细微差别，但大体上是相同的（并且使用了更少的 PHP）。所有适用于主题函数的可能性也同样适用于模板文件。变量本身略有不同。在主题函数和预处理函数中，`name`\
  \ 元素位于 `$variables['form']['name']`。而在模板文件中，同一个变量则是 `$form['name']`。这样做特意是为了让模板作者更容易处理\
  \ Drupal 庞大的数组结构。\n\n![ images](img/square.jpg) **注意** 请确保不要隐藏或省略必填的表单元素。在 Drupal\
  \ 中，呈现层与表单处理是完全分离的。Drupal 会期望这些元素存在，如果它们没有被填充，表单将无法提交。这类更改应在 `hook_form_alter()`\
  \ 实现中进行，并使用 `#access` 属性。更多信息请参见“使用 Alter 钩子修改表单”部分和第 22 章。\n\n#### 使用预处理函数让模板更简洁\n\
  \n在我们使用模板文件为表单设置主题的例子中，模板相当混乱。一个干净模板文件的定义是几乎不包含任何逻辑，只打印变量，偶尔可能有一个 IF 语句。如果你对模板文件的外观不满意，这正是使用预处理函数的绝佳时机。为了使其真正干净，你需要在预处理函数中执行以下操作：\n\
  \n-   对表单数组执行所有修改。\n-   创建所有新变量。\n-   单独渲染每个字段，并为模板提供简单的变量。\n\n当然，这并不是你希望对你网站上的每个表单都做的事情。然而，对于你想要额外精心处理的、面向用户的高度样式化的表单（例如登录、注册和联系表单），这是非常有用且便捷的。这个过程非常简单，如清单\
  \ 16–32 中使用联系表单所示。\n\n***清单 16–32.** 使用预处理函数为模板完成繁重工作*\n\n```\n<?php\n/**\n * 实现\
  \ hook_preprocess_contact_site_form()。\n */\nfunction mytheme_preprocess_contact_site_form(&$variables)\
  \ {\n  // 缩短表单变量名以便于访问。\n  $form = $variables['form'];\n\n  // 更改'mail'和'name'元素的标签。\n\
  \  $form['name']['#title'] = t('名称');\n  $form['mail']['#title'] = t('电子邮箱');\n\n\
  \  // 为你的提示信息创建一个新变量。\n  $variables['note'] = t(\"我们很期待收到您的来信。预计 1-2 个工作日内回复。\"\
  );\n\n  // 为各个元素创建变量。\n  $variables['name'] = render($form['name']);\n  $variables['email']\
  \ = render($form['mail']);\n  $variables['subject'] = render($form['subject']);\n\
  \  $variables['message'] = render($form['message']);\n  $variables['copy'] = render($form['copy']);\n\
  \n  // 确保打印其余已渲染的表单项。\n  $variables['children'] = drupal_render_children($form);\n\
  }\n```\n\n因为你已经在预处理函数中完成了所有工作，清单 16–33 中的模板文件就变得非常清晰整洁。添加标记和类、移动元素都变得轻而易举，而且一眼就能看出这个模板文件的功能。\n\
  \n***清单 16–33**。 预处理函数可以为联系表单提供一个简洁、最小的模板。*\n\n```\n<p class=\"note\"><?php print\
  \ $note; ?></p>\n<p><span class=\"form-required\">*</span><?php print t(\"表示必填字段。\"\
  ); ?></p>\n<ol>\n  <li><?php print $name; ?></li>\n  <li><?php print $email; ?></li>\n\
  \  <li><?php print $subject; ?></li>\n  <li><?php print $message; ?></li>\n  <li><?php\
  \ print $copy; ?></li>\n</ol>\n<?php print $children; ?>\n```\n\n\n好的，作为高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，精确地将以下英文文本翻译成中文。\n\
  \n\n#### 使用 Alter 钩子修改表单\n\n主题使用 alter 钩子的能力是 Drupal 7 的新特性。当您希望对标记本身有大量控制时，模板非常有用，但在很多情况下，简单地使用\
  \ `hook_form_alter()` 可以大大简化工作，尤其是当您对 Drupal 的默认表单标记感到满意，或者结合您可以通过主题函数在全局范围内进行的更改时。使用\
  \ alter 钩子非常适合进行快速更改，例如：\n\n*   简单更改表单标签、描述和其他属性。\n*   使用 `#weight` 属性更改表单元素的打印顺序。\n\
  *   将几个元素包裹在 `<div>` 或 `<fieldset>` 中。\n*   隐藏或移除不必要的表单元素。\n*   向表单添加一些标记。\n\n这也可以说是更简单的，因为过程中涉及的步骤更少。您不需要实现\
  \ `hook_theme()`。您还可以完全控制元素。在主题函数中能做的更改有一定的局限性，因为那时已经处于过程的后期。\n\n从技术上讲，有两个钩子可供您使用。\n\
  \n*   `hook_form_alter()`：针对所有表单运行。\n*   `hook_form_FORM_ID_alter()`：针对特定的表单 ID\
  \ 运行。\n\n一直使用 `hook_form_alter()` 而不是 `hook_form_FORM_ID_alter()` 是有原因的，但这些原因主要适用于模块开发者需要执行的任务。除非您特别针对多个表单做相同的处理，如\
  \ 清单 16–34 所示，否则最好使用 `hook_form_FORM_ID_alter()`，如 清单 16–35 所示。\n\n**清单 16–34.**\
  \ 针对所有或多个表单的 `hook_form_alter()` 实现\n\n```\n<?php\n/**\n* Implements hook_form_alter().\n\
  */\nfunction mytheme_form_alter(&$form, &$form_state, $form_id) {\n  // Changes\
  \ made in here affect ALL forms.\n  if (!empty($form['title']) && $form['title']['#type']\
  \ == 'textfield') {\n    $form['title']['#size'] = 40;\n  }\n}\n```\n\n**清单 16–35.**\
  \ 针对特定表单的 `hook_form_FORM_ID_alter()` 实现\n\n```\n<?php\n/**\n* Implements hook_form_FORM_ID_alter().\n\
  */\nfunction mytheme_form_contact_site_form_alter(&$form, &$form_state) {\n  //\
  \ Add a #markup element containing your note and make it display at the top.\n \
  \ $form['note']['#markup'] = t(\"We'd love hear from you. Expect to hear back from\
  \ us in 1-2 business days.\");\n  $form['note']['#weight'] = -1;\n\n  // Change\
  \ labels for the 'mail' and 'name' elements.\n  $form['name']['#title'] = t('Name');\n\
  \  $form['mail']['#title'] = t('E-mail');\n\n  // Hide the subject field and give\
  \ it a standard subject for value.\n  $form['subject']['#type'] = 'hidden';\n  $form['subject']['#value']\
  \ = t('Contact Form Submission');\n}\n```\n\n### 管理 CSS 文件\n\n每个优秀的 Drupal 主题都需要一两张样式表，或者十张！在您开始设计主题之前，可能会被\
  \ Drupal 加载的大量 CSS 文件数量打个措手不及。作为一个模块化的框架，Drupal 对 CSS 样式表和 JavaScript 文件也采用了同样的方法。CSS\
  \ 和 JavaScript 文件由各个模块分别提供——有时每个模块会提供几个文件。这样做是有意为之，原因如下：\n\n*   更易于阅读并理解代码的用途及其所属模块。\n\
  *   允许 Drupal 仅加载当前页面所需的代码。\n*   便于 Drupal 维护这些文件及其内容。\n\n也就是说，在 Drupal 的主题层，您可以完全控制所有样式表和脚本。实际上，您可以对它们做任何想做的事。如果您决定不加载模块中的任何样式表，您可以将它们全部移除。如果您对某些文件不满意，可以通过删除或覆盖它们并在主题内更改其内容来单独覆盖它们。如果您愿意，甚至可以更改文件的加载顺序。本节将向您展示如何完成所有这些操作。\n\
  \n#### 聚合与压缩\n\n如前所述，Drupal 有很多样式表。当然，出于性能考虑，您希望尽可能减少在线网站上的文件数量，因此 Drupal 有一种处理方式。在开发过程中，处理\
  \ 10 到 40 个 CSS 文件是常态，如果您工作在显示从右到左文本的语言的网站上，文件数量甚至更多。在 `admin/config/development/performance`\
  \ 的性能设置部分，有聚合和压缩 CSS 与 JavaScript 文件的选项。开启后，Drupal 会尽可能地将文件压缩并合并到尽量少的自动生成文件中。这也有效地绕过了\
  \ Internet Explorer 的 31 个样式表限制 bug。Drupal 以两种方式聚合文件：它为会在每个页面加载的文件创建一个按站点聚合的文件，并为其余根据页面条件加载的文件创建按页面聚合的文件。对于\
  \ CSS 文件，它会进一步按媒体类型进行聚合。为了保持正确性，如果 CSS 和 JavaScript 文件的内容发生更改，当站点缓存被清除时，Drupal 将重新生成这些文件的聚合版本，并赋予它们不同的名称。强烈建议在所有在线站点上启用\
  \ CSS 文件的聚合和压缩，这将大大加快页面加载速度。这个过程非常有效，允许主题制作者和开发者继续以模块化方式开发网站，而无需担心 CSS 文件的数量。\n\n\
  ![images](img/square.jpg) **注意：** 不要在 Drupal 内部手动使用 `@import` 指令加载 CSS 文件。这样做会导致性能问题，并且当与\
  \ `<link>` 方式引入的样式表结合时，可能会产生聚合问题，还会导致这些文件被排除在覆盖功能之外。\n\n#### 模式与命名约定\n\n在您的主题中，您可以随意命名\
  \ CSS 文件。许多主题倾向于创建一个名为“css”的目录，并在其中放置几个样式表。创建一个 `layout.css` 用于页面布局样式，和 `style.css`\
  \ 用于其余样式，这是非常常见的。有些主题，比如 Zen，则更进一步，使用了近 30 个样式表。如何组织您的 CSS 完全取决于您。主题可以使用多少个样式表没有限制。大多数前端开发者都有自己的工作方式，Drupal\
  \ 很乐意遵从。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 核心与模块\
  \ CSS 文件\n\n大多数提供 CSS 的模块通常会在模块目录的根目录中包含一个名为 `module-name.css` 的文件。有些模块会有几个 CSS\
  \ 文件，而更好的模块会为用于样式化管理界面的任何 CSS 创建一个单独的文件。模块的 CSS 文件数量或组织结构没有限制，但通常建议开发者保持克制，尽可能少地对元素进行样式化。\n\
  \n另外值得一提的是，Drupal 的系统模块位于 `modules/system` 中，它包含了不少 CSS 文件，这些文件似乎都堆放在那里，因为没有更好的地方放置它们。表\
  \ 16-3 对每个文件进行了简要说明，以便您了解它们的用途，并决定是否在您的主题中保留它们。\n\n**表 16-3.** 系统模块的 CSS 文件（不包括\
  \ RTL 版本）\n\n| **CSS 文件** | **用途** | **加载时机…** |\n| --- | --- | --- |\n| `system.base.css`\
  \ | 包含某些功能严重依赖的 CSS，例如可折叠字段集、自动补全字段、可调整大小的文本区域和进度条。 | 每个页面。 |\n| `system.theme.css`\
  \ | 包含许多通用 HTML 和 Drupal 元素的通用样式。 | 每个页面。 |\n| `system.menus.css` | 包含菜单树列表、选项卡和节点链接的默认样式。\
  \ | 每个页面。 |\n| `system.messages.css` | 包含错误、警告和状态消息的默认样式。 | 每个页面。 |\n| `system.admin.css`\
  \ | 包含 Drupal 管理页面所需的样式。 | 管理页面。 |\n| `system.maintenance.css` | 包含安装、维护和更新任务的样式。\
  \ | 维护页面。 |\n\n### 双向文本支持\n\nDrupal 为人称道的一点是其出色的语言支持。这包括对双向文本的支持。虽然大多数语言在屏幕上从左到右（LTR）显示文本，但某些语言，如阿拉伯语和希伯来语，则在屏幕上从右到左（RTL）显示文本。浏览器通过读取\
  \ `<html>` 标签中定义的 `dir` 属性并使用用户代理 CSS 文件来处理大部分所需的样式差异，但很多时候，CSS 中的浮点、文本对齐和内边距需要特别处理，尤其是当您运营一个多语言网站时。\n\
  \nDrupal 基于 CSS 文件命名约定自动处理 RTL 样式表。如果您有一个名为 `style.css` 的样式表，其中包含站点 LTR 版本的 CSS，您可以简单地创建另一个名为\
  \ `style-rtl.css` 的文件，其中包含修复 RTL 版本显示所需的调整。Drupal 会在需要时自动加载它，并直接放在原始文件之后，这样可以使用相同的选择器，并且\
  \ RTL 样式会利用原生的 CSS 级联特性覆盖 LTR 样式。在为同时支持 LTR 和 RTL 显示的网站编写 CSS 时，习惯做法是先为 LTR 版本编写\
  \ CSS，同时通过注释记录哪些属性需要更改。这是 Drupal 为核心和贡献模块的 CSS 文件采用的一项编码标准。列表 16-36 展示了一个示例。\n\n\
  **列表 16-36.** 标注了 LTR 属性和 RTL 版本的 CSS 示例\n\n```\n// 在 style.css 中:\n// .my-selector\
  \ 将内容向左浮动，这是 LTR 特有的，因此添加了一个内联注释来注明这一点。\n.my-selector {\n  border: solid 1px #ccc;\n\
  \  float: left; /* LTR */\n}\n\n// 在 style-rtl.css 中:\n// .my-selector 的 RTL 版本需要被覆盖，并且向右浮动而不是向左。\n\
  .my-selector {\n  float: right;\n}\n```\n\n### 添加、移除和替换 CSS 文件\n\n在 Drupal 主题中有三种操作\
  \ CSS 文件的方法。本节将解释每种实现选项是什么、每种方法的原因，以及何时使用某些方法比其他方法更有利。\n\n#### 通过 `.info` 文件的“快速而粗糙”的样式表\n\
  \n通过主题的 `.info` 文件添加样式表是向主题添加 CSS 文件最简便的方法；参见列表 16-37 和列表 16-38。然而，在某些情况下这种方法也有一些缺点。\n\
  \n1.  您在 `.info` 文件中定义的任何样式表都将在每个页面上加载。\n2.  您无法完全使用 `drupal_add_css()` 提供的功能。例如，您无法在\
  \ `.info` 文件中为 Internet Explorer 添加条件样式表，或更改某个模块 CSS 文件的权重。\n\n**列表 16-37.** 添加样式表的\
  \ `.info` 语法\n\n```\nstylesheets[CSS 媒体类型][] = path/to/file.css\n```\n\n**列表 16-38.**\
  \ 典型的 `.info` 样式表定义示例\n\n```\nstylesheets[all][] = css/layout.css\nstylesheets[all][]\
  \ = css/style.css\nstylesheets[print][] = css/print.css\n```\n\n> **注意：** 也可以通过在\
  \ `.info` 文件中为某个文件创建一个条目（就像要覆盖它一样），但实际上不将该文件包含在主题目录中，从而移除样式表。但是，存在一个 bug，可能导致这些样式表在执行\
  \ AJAX 渲染时重新出现。为了安全起见，最好在 `hook_css_alter()` 中移除样式表；这将在本节后面解释。\n\n#### 使用 `drupal_add_css()`\
  \ 有条件地加载样式表\n\n`drupal_add_css()` 是模块和主题通过 PHP 代码添加 CSS 文件的主要函数。一些主题在它们的 `template.php`\
  \ 文件中使用它，通常是在预处理函数中。与在 `.info` 文件中定义 CSS 文件相比，在主题层使用 `drupal_add_css()` 的一个优点是，可以根据特定条件或上下文有条件地加载文件。例如，您可能想要创建一个仅在网站首页加载的特殊\
  \ CSS 文件。在主题的 `template.php` 中，您可以在 `template_preprocess_html()` 中实现，如列表 16-39 所示。\n\
  \n**列表 16-39.** 添加一个仅在首页加载的样式表\n\n```php\n<?php\nfunction mytheme_preprocess_html(&$variables)\
  \ {\n  // 添加一个仅在首页打印的样式表。\n  if ($variables['is_front']) {\n    drupal_add_css(path_to_theme()\
  \ . '/css/homepage.css', array('weight' => CSS_THEME));\n  }\n}\n```\n\n在 Drupal\
  \ 中使用 `drupal_add_css()` 向页面添加 CSS 有许多不同的选项，其中一些包括：\n\n-   将类型指定为“inline”，以便在 `<head>`\
  \ 内直接打印一段 CSS 代码块，而不是添加一个 CSS 文件。\n-   使用常量如 `CSS_SYSTEM`（顶部）、`CSS_DEFAULT`（中间）和\
  \ `CSS_THEME`（底部）来指定文件的组，以确定文件应出现的位置。\n-   指定文件的权重来控制它在组内加载的顺序。\n-   添加条件样式表以便为不同浏览器提供不同文件。\n\
  -   添加外部托管的 CSS 文件。\n-   强制某个 CSS 文件不被合并和压缩。\n\n\n\n#### 为 Internet Explorer 添加条件样式表\n\
  \n根据撰写本文时的维基百科数据显示，约 43%的用户使用 Internet Explorer 访问网页。虽然不同数据来源的统计结果存在差异，但对许多开发者而言，支持旧版\
  \ IE 仍是现实需求。当需要编写针对 IE 的 CSS 时，使用条件样式表被认为是最佳实践。\n\nDrupal 7 的一项重要新特性是可以通过 `drupal_add_css()`\
  \ 添加条件样式表。实际上，Drupal 所有三个核心主题都在 `template_preprocess_html()` 中实现了这一功能。之所以在 `template.php`\
  \ 中处理，是因为 `.info` 文件对 `drupal_add_css()` 的支持非常有限。清单 16-40 和 清单 16-41 以 Seven 主题的代码为例展示了具体实现方式。\n\
  \n**清单 16-40** Seven 主题片段：在 `template_preprocess_html()` 中使用 `drupal_add_css()`\
  \ 为 IE 添加条件样式表\n\n```\n<?php\nfunction seven_preprocess_html(&$vars) {\n// 为 IE8\
  \ 及以下版本添加条件 CSS。\n  drupal_add_css(path_to_theme() . '/ie.css', array('group' =>\
  \ CSS_THEME, 'browsers' => array('IE' => 'lte IE 8', '!IE' => FALSE), 'preprocess'\
  \ => FALSE));\n  // 为 IE6 添加条件 CSS。\n  drupal_add_css(path_to_theme() . '/ie9781430231356.css',\
  \ array('group' => CSS_THEME, 'browsers' => array('IE' => 'lt IE 7', '!IE' => FALSE),\
  \ 'preprocess' => FALSE));\n}\n```\n\n**清单 16-41** 添加 IE 条件样式表后生成的 HTML 源码\n\n```\n\
  <!--[if lte IE 8]>\n<link type=\"text/css\" rel=\"stylesheet\" href=\"http://drupal-7/themes/seven/ie.css?l40z2j\"\
  \ media=\"all\" />\n<![endif]-->\n\n<!--[if lt IE 7]>\n<link type=\"text/css\" rel=\"\
  stylesheet\" href=\"http://drupal-7/themes/seven/ie9781430231356.css?l40z2j\" media=\"\
  all\" />\n<![endif]-->\n```\n\n清单 16-40 和 清单 16-41 中的代码为您提供了两个仅针对 Internet Explorer\
  \ 加载的条件样式表。第一个样式表适用于 IE8 及以下版本，第二个样式表适用于 IE7 之前的版本。\n\n#### 使用 `hook_css_alter()`\
  \ 完全控制样式表\n\nDrupal 核心和模块通过 `drupal_add_css()` 函数逐一添加 CSS 文件。在 `template_process_html()`\
  \ 执行过程中，会创建名为 `$styles` 的变量，该变量包含为每个页面指定的所有样式表的完整 HTML 输出。此变量最终在 `html.tpl.php`\
  \ 模板文件的 `<head>` 标签内输出，如清单 16-42 所示。\n\n**清单 16-42** `$styles` 变量在 `template_process_html()`\
  \ 中创建，供 `html.tpl.php` 使用\n\n```\n<?php\n/**\n* 实现 template_process_hmtl()。\n*/\n\
  function template_process_html(&$variables) {\n  ...\n  $variables['styles'] = drupal_get_css();\n\
  \  ...\n}\n```\n\n在调用 `drupal_get_css()` 过程中，Drupal 会收集所有先前添加的 CSS 文件，并通过调用 `drupal_alter('css',\
  \ $css)` 为模块或主题提供修改机会。此时，Drupal 会查找模块和主题中符合 `hook_css_alter()` 命名模式的函数，函数名中的 \"\
  hook\" 会被实际实现它的模块或主题名替换。此函数允许对 CSS 文件的所有方面进行最精细的控制。\n\nLocale 模块是展示模块为何需实现 `hook_css_alter()`\
  \ 的典型案例。该模块会检查语言方向是否为从右到左（RTL），如果是，则查找相应的 RTL 版本 CSS 文件并将其添加到页面中。\n\n在主题中，实现 `hook_css_alter()`\
  \ 的主要目的是移除或覆盖模块提供的 CSS 文件。在 Seven 主题的 `template.php` 文件底部可以找到相关示例（见清单 16-43）。Seven\
  \ 主题选择使用自己的版本覆盖核心提供的 `vertical-tabs.css` 样式表。\n\n**清单 16-43** Seven 主题的 `hook_css_alter()`\
  \ 实现\n\n```\n<?php\n/**\n * 实现 hook_css_alter()。\n */\nfunction seven_css_alter(&$css)\
  \ {\n  // 使用 Seven 的垂直选项卡样式替换默认样式。\n  if (isset($css['misc/vertical-tabs.css']))\
  \ {\n    $css['misc/vertical-tabs.css']['data'] = drupal_get_path('theme', 'seven')\
  \ . '/vertical-tabs.css';\n  }\n  // 使用 Seven 的 jQuery UI 主题样式替换默认样式。\n  if (isset($css['misc/ui/jquery.ui.theme.css']))\
  \ {\n    $css['misc/ui/jquery.ui.theme.css']['data'] = drupal_get_path('theme',\
  \ 'seven') . '/jquery.ui.theme.css';\n  }\n}\n```\n\n![images](img/square.jpg) **注意**\
  \ 在 `.info` 文件中覆盖模块的 CSS 文件（创建同名 CSS 文件条目）虽然可行，但效率并非最优。在 `.info` 文件中定义的样式表会在每个页面加载，而不会考虑实际是否需要。而使用\
  \ `hook_css_alter()` 则不同，它在替换文件之前会确保目标文件已设置为加载状态。\n\n#### 在主题中管理样式表\n\n在本节中，您已学习多种在\
  \ Drupal 主题层操作 CSS 文件的方法。下面将通过实际案例再次梳理操作步骤。\n\n**练习 A：在 .info 文件中为所有页面定义样式表**\n\n\
  1.  在主题目录 `sites/all/themes/mytheme` 中新建名为 `css` 的子文件夹（此步可选，但有助于主题文件组织）。\n2.  在\
  \ `css` 目录中创建 `style.css` 和 `print.css` 两个文件。\n3.  打开 `sites/all/themes/mytheme/mytheme.info`\
  \ 文件，添加以下两行代码定义样式表，使 Drupal 知晓需加载它们：`stylesheets[all][] = css/style.css` `stylesheets[print][]\
  \ = css/print.css`\n4.  访问 `admin/config/development/performance` 清除网站缓存。返回网站前端页面后，您会发现两个文件均已成功加载。\n\
  \n**练习 B：使用 `drupal_add_css()` 为 IE 添加条件样式表**\n\n\n\n1.  在`css`目录内创建一个名为`ie.css`的文件。\n\
  2.  如果尚未创建，在主题根目录创建一个名为`template.php`的文件，并确保在文件顶部包含`<?php`。\n3.  使用以下代码实现`template_preprocess_html()`并通过`drupal_add_css()`加载\
  \ IE 样式表：\n```\n<?php\n/**\n* Implements of template_preprocess_html().\n*/\nfunction\
  \ mytheme_preprocess_html(&$vars) {\n  // Add conditional stylesheet that targets\
  \ Internet Explorer 8 and below.\n  drupal_add_css(path_to_theme() . '/css/ie.css',\
  \ array('weight' => CSS_THEME, 'browsers' => array('IE' => 'lte IE 8', '!IE' =>\
  \ FALSE), 'preprocess' => FALSE));\n}\n```\n\n**练习 C：使用`drupal_add_css()`为主页添加自定义样式表**\n\
  \n你需要使用已存在的`$is_front`变量来检测是否正在显示主页，然后添加`homepage.css`样式表。将此代码直接添加到你在练习 B 中添加的条件样式表代码上方。\n\
  \n```\n<?php\n// Add a stylesheet that prints only on the homepage.\nif ($variables['is_front'])\
  \ {\n  drupal_add_css(path_to_theme() . '/css/homepage.css', array('weight' => CSS_THEME));\n\
  }\n```\n\n**练习 D：使用`hook_css_alter()`覆盖并移除模块 CSS 文件**\n\n要实现`hook_css_alter()`，你需要在`template.php`文件中创建一个名为`mytheme_css_alter()`的函数。通过引用传递的`$css`参数以数组格式包含所有样式表，你可以对其进行任意操作。以下代码展示了如何移除`node.css`文件（如果它被设置为加载）。\n\
  \n```\n<?php\nfunction mythemename_css_alter(&$css) {\n  // Remove the node.css\
  \ file.\n  if (isset($css['modules/node.css'])) {\n    unset($css['modules/node.css']);\n\
  \  }\n}\n```\n\n### 使用基础主题和子主题\n\n很可能你有自己固定的做事方式。你可能倾向于在所有主题中以类似的方式构建标记。你可能经常覆盖某些主题函数，或者有自己独特的表单样式风格，或者你可能倾向于在布局中使用特定的网格框架。这些都是利用\
  \ Drupal 的基础主题和子主题功能的好理由。\n\n子主题与其基础（父）主题有特殊的关系。它们从父主题继承模板文件和资源。这使得它们成为简化主题工作流、创建自己的\
  \ Drupal 主题“框架”或“重置”的绝佳工具。当然，你也可以使用现有的基础主题。Drupal 提供了相当多的基础主题，我们将在本节稍后部分详细介绍。\n\n\
  #### 创建子主题\n\n从特性上讲，基础主题和子主题都是普通的 Drupal 主题，任何主题都可以作为基础主题。创建子主题的过程非常直接。\n\n1.  首先创建一个新主题的骨架。为其创建一个目录，并创建包含至少`name`和`core`属性的`.info`文件。\n\
  2.  在`.info`文件中，添加“base theme”属性，其中包含你想用作基础的主题名称，如下所示：`base theme=basethemename`\n\
  3.  如果基础主题在`.info`文件中定义了区域和/或功能，你需要在子主题中复制这些内容。\n\n对于基本的 Drupal 主题，创建子主题只需这三步。完成这些后，你就可以在`admin/appearance`页面启用该主题。同样值得注意的是，你使用的基础主题无需在\
  \ UI 中启用即可正常运行。\n\n![images](img/square.jpg) **注意** 大多数流行的贡献基础主题需要更多配置。像 Zen、Omega\
  \ 和 Fusion 这样的主题带有一个 starterkit 或 starter 目录，你可以复制并使用它来开始你的子主题。请务必参考每个主题的`README.txt`文件以获取完整的开始使用说明，因为每个主题都不同。\n\
  \n#### 继承及其工作原理\n\n你已经知道 Drupal 在其模块中提供了大量标记，这些标记以模板、主题函数或渲染 API 的形式出现。在 Drupal\
  \ 主题中，你有机会覆盖并接管这种行为。所以，从技术上讲，你首先是继承了它。使用子主题允许你在这个流程中再增加一步。当使用父主题时，所有资源——包括模板文件、CSS\
  \ 文件、JavaScript 文件、主题函数以及`template.php`中的几乎所有内容——都会被继承。\n\n在基础主题中定义的 CSS、JavaScript、模板文件和主题函数将自动对子主题可用。子主题无需做任何事即可实现这一点。预处理和处理函数将为基础主题和子主题同时运行，因此它们可以同时、无问题地在两个主题中使用。当然，子主题可以覆盖基础主题所做的任何事情。\n\
  \n有些事情并非如此。区域不会被继承，功能和主题设置也不会被继承。为了使它们正常工作，你必须将信息从基础主题复制到子主题的`.info`文件中。表 16–4 显示了哪些资源是自动继承的，哪些不是。\n\
  \n***表 16–4**。从基础主题到子主题的资源继承*\n\n| **资源** | **是否自动继承？** |\n| --- | --- |\n| CSS\
  \ 文件 | 是 |\n| JavaScript 文件 | 是 |\n| 模板文件 | 是 |\n| 主题截图 | 是 |\n| 区域 | 否 |\n| 主题设置\
  \ | 否 |\n\n#### 找到一个好的基础主题\n\n在 [`http://drupal.org/project/Themes`](http://drupal.org/project/Themes)\
  \ 上有数千个贡献主题。不幸的是，Drupal 主题以丑陋著称。虽然这有一定道理，但其中也有许多精品；你只需要知道要找什么。`drupal.org`上的主题根据项目使用统计数据按人气排序，因此很容易看出哪些主题最受欢迎。然而，人气并不总是最佳衡量标准。在评估贡献的\
  \ Drupal 主题时，你需要了解几件事。\n\n*   *类型：* `drupal.org`上的所有主题都被归为一个未分类的列表中。正如你在 [`http://drupal.org/project/themes`](http://drupal.org/project/themes)\
  \ 上看到的，首页上的大部分主题都是基础主题。虽然任何主题在技术上都可以用作基础主题，但阅读项目信息以了解预期功能很重要。如果你没有按照维护者的预期方式使用主题，他们帮助你解决问题的意愿会大大降低。\n\
  *   *维护和开发状态：* 每个项目都有维护状态和开发状态，可以在项目页面上查看。这些信息能让你很好地了解模块的支持情况。如果项目有“积极维护”的维护状态和“积极开发中”的开发状态，那么模块开发者很可能有意修复\
  \ bug，并愿意接受在问题队列中提出的功能请求。\n*   *使用统计：* 在每个项目页面上，“项目信息”部分包含了报告的安装数量和一个名为“查看使用统计”的链接，该链接显示了一个长期的数据图表和表格，以及数据随时间的变化。使用统计可以很好地指示一个主题是否经过了充分测试。如果很多人使用它，或者它显示出稳定的增长，那么它很可能是一个更好的主题。\n\
  *   *问题队列：* 大多数项目都有问题队列，用户可以在其中报告 bug 和请求功能。阅读问题队列是衡量项目社区参与度的好方法。这也是了解主题可能存在的 bug\
  \ 以及社区和维护者对这些问题响应速度的好方法。\n\n\n\n### 热门基础主题\n\n`drupal.org` 上经验丰富的主题开发者提供了许多优秀的主题。可用的基础主题或“入门”主题的完整列表，请访问\
  \ [`http://drupal.org/node/323993`](http://drupal.org/node/323993)。以下是一些最流行的 Drupal\
  \ 7 基础主题：\n\n> *Zen:* [`http://drupal.org/project/zen`](http://drupal.org/project/zen)\n\
  > \n> *Fusion:* [`http://drupal.org/project/fusion`](http://drupal.org/project/fusion)\n\
  > \n> *AdaptiveTheme:* [`http://drupal.org/project/adaptivetheme`](http://drupal.org/project/adaptivetheme)\n\
  > \n> *Genesis:* [`http://drupal.org/project/genesis`](http://drupal.org/project/genesis)\n\
  > \n> *Basic:* [`http://drupal.org/project/basic`](http://drupal.org/project/basic)\n\
  > \n> *Blueprint:* [`http://drupal.org/project/blueprint`](http://drupal.org/project/blueprint)\n\
  > \n> *NineSixty:* [`http://drupal.org/project/ninesixty`](http://drupal.org/project/ninesixty)\n\
  > \n> *Omega:* [`http://drupal.org/project/omega`](http://drupal.org/project/omega)\n\
  > \n> *Mothership:* [`http://drupal.org/project/mothership`](http://drupal.org/project/mothership)\n\
  \n### 创建自己的基础主题的提示\n\n- **不要过度设计：** 在基础主题中，切忌做过多的预设。问问自己，你所做的改动能否适用于任何项目。如果答案是否定的或不确定，那么它很可能不应该包含在你的基础主题中。\n\
  - **参考贡献主题：** 查看其他贡献主题的做法是最好的学习方式之一。你很有可能会从每个主题中找到一些你喜欢和不喜欢的部分。不要害怕混合搭配。\n- **提供布局和其它结构元素的样式：**\
  \ 处理在每个项目中都一致要做的事情。例如，标准化字体大小、提供 CSS 重置，并确保设置好通用的内边距和外边距，以防止区块和节点堆叠在一起。\n- **使用多个\
  \ CSS 文件：** 合并与压缩会自动处理这些文件的整合，所以不必担心使用多个 CSS 文件。这将允许你在子主题中轻松选择想要和不想要的部分。\n\n###\
  \ 可持续性与最佳实践\n\nDrupal 包含许多许多模板文件。对于前端开发者来说，这是掌握 Drupal 主题并将其转变为你所需的模样的最强大工具之一。然而，权力越大，责任越大。由于处理模板文件非常容易，因此这也是一个容易陷入困境的领域。\n\
  \n大多数前端开发者在处理 Drupal 的标记时都会感到一些挫败感。因为修改它相对容易，所以直接动手修改往往是第一反应。请抵制住这种冲动。虽然你无疑会感受到掌控一切的力量，但修改过多的模板文件通常是错误的方法。仅仅因为你可以修改，并不总是意味着你应该这样做。\n\
  \n#### 从一个好的基础开始\n\n确保最小化模板覆盖的一个好方法是，以一种足够灵活以适应大多数情况的方式来定义你的标记。可以把主要的模板文件（例如 `node.tpl.php`、`views-view.tpl.php`\
  \ 和 `block.tpl.php`）视为有两个用途。第一是提供一个容器，第二是实际的内容，其中可以包含任意数量的不同元素。Drupal 在这方面做得相当不错，但总有改进的空间，并且你的需求可能会因网站的设计而异。\n\
  \n例如，查看 `代码清单 16-44` 中显示的 `block.tpl.php` 文件的内容，该文件由 Drupal 的区块模块提供，可在 `modules/block/block.tpl.php`\
  \ 中找到。大多数区块，即使是其他模块生成的区块，也会使用此模板文件来输出其内容。区块内可能有一个菜单、自定义区块中的几个段落、加载广告的一段 JavaScript\
  \ 代码片段、一个投票、一个用户列表，以及许多其他可能性。\n\n**代码清单 16-44**。默认的 `block.tpl.php` 实现\n\n```php\n\
  <div id=\"<?php print $block_html_id; ?>\" class=\"<?php print $classes; ?>\"<?php\
  \ print $attributes; ?>>\n  <?php print render($title_prefix); ?>\n  <?php if ($block->subject):\
  \ ?>\n   <h2<?php print $title_attributes; ?>><?php print $block->subject ?></h2>\n\
  \  <?php endif;?>\n  <?php print render($title_suffix); ?>\n  <div class=\"content\"\
  <?php print $content_attributes; ?>>\n   <?php print $content; ?>\n  </div>\n</div>\n\
  ```\n\n![images](img/square.jpg) **提示** Bartik 主题使用了 Drupal 默认的 `block.tpl.php`\
  \ 模板文件。这很容易判断，因为 Bartik 主题的目录中没有包含 `block.tpl.php` 文件。\n\n以一个简单的自定义区块为例，代码清单 16-44\
  \ 中的模板代码会转换为 代码清单 16-45 中的输出。\n\n**代码清单 16-45**。使用默认 `block.tpl.php` 实现的区块输出\n\n\
  ```html\n<div id=\"block-block-1\" class=\"block block-block first last odd\">\n\
  \  <h2>Block title</h2>\n  <div class=\"content\">\n    <p>Block content.</p>\n\
  \  </div>\n</div>\n```\n\n生成的代码非常简洁。在大多数情况下，创建自定义主题时，你通常不希望这些区块看起来都一样，因此你会使用 CSS\
  \ 来给它们不同的样式。可能一眼看不出来，但默认的 `block.tpl.php` 实现确实存在一些需要注意的潜在问题区域。某些设计方面需要更灵活的标记。以下是一些例子：\n\
  \n- **网格：** 你可能会选择使用 CSS 网格框架在区域内排列区块。这将阻止你直接将左右内边距添加到 `.block` 类上。\n- **背景图片：**\
  \ 你的设计可能需要添加多个背景图片来实现一个与内容无关的区块样式。听起来很简单，对吧？顶部和可平铺的背景图片可以在 `.block` 中声明，但底部背景图片在哪里定义呢？一旦你向\
  \ `.block` 类本身添加了内边距，你就无法再将第二张背景图片放在现有的 `.content` 类上了。\n\n前面的例子只是你在编写 Drupal 主题时可能遇到问题的冰山一角。你可能会倾向于采用极简的标记方法，并随着问题的出现再逐个解决，但我们建议你到此为止！如前所述，这些主要的模板文件需要容纳多种类型的内容。你不想仅仅为了修改结构方面的问题，就为每种不同的类型创建一个新的模板文件。创建可靠且灵活的默认值，并处理出现的异常情况，这不仅更容易编码，而且更具可持续性。\n\
  \n通过将结构与内容分离，可以相当容易地实现这一点。如代码清单 16-46 所示，只需添加 `<div class=\"inner\">` 来包裹内容，就可以在潜在问题出现之前解决它们。在网格的例子中，内边距可以应用于\
  \ `<div class=\"inner\">`。至于背景图片，顶部背景图片可以应用于 `.block`，底部背景图片可以应用于 `.block .inner`，反之亦然。\n\
  \n**代码清单 16-46**。包含更灵活容器结构的修改版 `block.tpl.php`\n\n```php\n<div id=\"<?php print\
  \ $block_html_id; ?>\" class=\"<?php print $classes; ?>\"<?php print\n$attributes;\
  \ ?>>\n  <div class=\"inner\">\n    <?php print render($title_prefix); ?>\n    <?php\
  \ if ($block->subject): ?>\n      <h2<?php print $title_attributes; ?>><?php print\
  \ $block->subject ?></h2>\n    <?php endif;?>\n    <?php print render($title_suffix);\
  \ ?>\n    <div class=\"content\"<?php print $content_attributes; ?>>\n      <?php\
  \ print $content; ?>\n    </div>\n  </div>\n</div>\n```\n\n\n\n#### 有目的地覆写模板文件\n\
  \n虽然核心模板文件在主要发行版周期内变化较少，但每个 Drupal 主要版本更新时，模板文件通常会发生大规模改动，而贡献模块更是持续变动。模板文件随时可能变化，有时甚至是剧烈变化。这些变化背后可能存在多种原因：模块开发者可能决定采用不同方法，可能新增功能或安全更新，也可能完全没有充分理由。关键在于，一旦你将模板文件添加到自己的主题中进行覆写，就需要负责维护它。如果覆写的模板文件过多，很容易变得难以控制。\n\
  \n另一个需要牢记的是，Drupal 是一个框架。使用 Drupal 的核心思想就是利用其模块化特性。主题中包含过多模板文件可能会从根本上破坏这种模块化；一旦发生这种情况，维护你的主题可能比维护整个\
  \ Drupal 系统及所有自定义模块加起来还要麻烦。避免这个问题的关键是克制地使用覆写，并充分利用 Drupal 提供的众多工具。\n\n仅仅像清单 16–46\
  \ 中那样添加 `<div class=\"inner\">`，就能在很大程度上帮你省去创建额外模板文件的需求。以下提示将帮助你在处理 Drupal 主题的模板时避免陷入困境：\n\
  \n-   **为多数情况构建结构。** 尽可能使用预处理函数，探索分开处理特殊情况的方法。\n-   **利用主题钩子建议。** 当标记差异需要时，使用 `node--article.tpl.php`\
  \ 来样式化文章节点，并使用 `theme_links__node()` 只针对节点链接。\n-   **将 CSS 类视为数组。** 如果你只需要一个类，就不要创建新的模板文件。例如，区块标题默认以简单的\
  \ `<h2>` 标签输出。即使只对 `.block h2` 应用最少的 CSS，你也会面临影响可能出现在 `<div class=\"content\">`\
  \ 内部的 `<h2>` 标签的风险。为标题添加一个类来作为样式目标，这样可以避免这些问题。\n\n#### 善用默认 CSS 类\n\n如果没有充分理由，不要随意移除或更改\
  \ CSS 类。请仔细考虑。虽然许多前端开发者和网页设计师看到 Drupal 提供的众多 CSS 类会感到震惊，但这种看似疯狂的做法实则有其目的。这些类（尤其是\
  \ body 类）不仅提供了有用的信息，帮助你理清是什么生成了标记，以及某个 `<div>` 内容可能具有什么特性，而且它们的设计目的是让你能够在 CSS 中完成大部分主题开发工作。\n\
  \n请记住，尤其是在使用贡献模块时，你需要在未来某个时间点更新或升级你的网站，而且你无法控制模板以及模板内部所应用的类可能发生的变化。同样重要的是，模块可能依赖某些类以及一些\
  \ CSS 文件（例如 `system.base.css`）的正常加载才能正常运行。当然，你可以尝试管理这些事情，但根据经验，这很容易变成令人沮丧的浪费时间。我们并非说没有改进空间，也不是说你不应该按照自己的想法编写网站代码。我们只是想让你意识到，将标记剥离到极致所带来的某些风险。\n\
  \n#### 我的改动应该放在模块里吗？\n\n随着 Drupal 每个新版本的发布，主题层变得越来越强大。随着 Render API 的出现以及在主题中使用\
  \ alter 钩子的能力，Drupal 7 拥有了前所未有的强大功能。尽管 Drupal 主题功能强大，但仍有许多事情不适合放在主题层。当你埋头编写优秀的 Drupal\
  \ 主题时，要不断问自己这些问题：\n\n-   你要实现的目标是否需要 SQL 查询？这些绝对不应该出现在主题中。没有例外。\n-   你的任务实现起来是否特别困难？你是否在完全重建数据？\n\
  -   你的改动是否确实是与主题相关的？例如，如果你在修改表单标签和描述，那么禁用了你的主题后，这些改动是否应该仍然可用？\n\n如果以上任何一个问题的答案是肯定的，那么你的改动应该放在模块中。\n\
  \n### 总结\n\n在本章中，我们进一步介绍了多种方法，让你能够随心所欲地掌控 Drupal 主题。我们涵盖了创建真正出色且可持续的主题所需了解的几乎所有内容，包括如何：\n\
  \n-   查找主题层中可用的变量。\n-   理解并使用预处理和处理函数。\n-   使用和修改渲染数组的内容。\n-   使用模板、主题函数和 alter\
  \ 钩子来主题化表单。\n-   在主题中管理 CSS 和 JavaScript 文件。\n-   使用基础主题和子主题。\n\n一开始，Drupal 的主题层可能会让你感到不知所措。但请记住，你的主题可以像你需要的或想要的那样简单或复杂。我们希望你能利用这些知识来创建出色的\
  \ Drupal 主题，并回馈社区。\n\n## 第 17 章\n\njQuery\n\n**由 Jake Strawn 编写，Dmitri Gaskin 提供意见**\n\
  \n自 Drupal 5 以来，jQuery 已成为 Drupal 不可或缺的一部分。管理区域的许多界面都使用 jQuery 来增强用户体验，Drupal 7\
  \ 也不例外，它继续改进开发者和主题开发者实现高级 JavaScript 功能的能力。\n\nDrupal 7 目前内置了 jQuery 1.4.4，并且核心现在也内置了\
  \ jQuery UI 1.8 (`jqueryui.com`)，支持高级用户界面元素/小部件和效果。\n\n### 实现 jQuery 和 JavaScript\n\
  \n第一部分将介绍如何为你自己的 Drupal 7 项目添加自定义 JavaScript/jQuery 功能。\n\n我将介绍一些基本知识，包括如何在主题或模块中包含新的\
  \ JavaScript 文件、添加整个 JavaScript 库、覆写已包含的 JavaScript 和/或 jQuery、使用 Drupal Behaviors，最后，确保你的\
  \ jQuery/JavaScript 能够优雅降级，以照顾那些无法使用或选择不查看 JavaScript 功能的用户。\n\n#### 包含 JavaScript\n\
  \n主题和模块开发者可以根据所实现代码的需求，通过多种方式添加 JavaScript 和 jQuery 功能。第一部分将介绍如何为你的网站添加基础的 JavaScript，并涵盖各种方法和使用场景。在某些情况下，你可能希望\
  \ JavaScript 代码添加到网站的每个页面；在其他情况下，如果满足特定条件，仅需将其包含在单个页面上。\n\n\n\n##### 在 .info 文件中添加\
  \ JavaScript\n\n主题和模块能够非常容易地在 .info 文件中包含 JavaScript 文件，如列表 17-1 和 17-2 所示。与使用`stylesheets[all]\
  \ = file.css`添加样式表的方式相同，JavaScript 文件可以通过简单地使用`scripts[] = file.js`来添加。\n\n**列表\
  \ 17-1.** 在主题的 .info 文件中添加 JavaScript\n\n```\nname  = Gamma\ndescription = Omega\
  \ Sub-Theme starter kit\nscreenshot = screenshot.png\ncore = 7.x\nbase theme = omega\n\
  \nstylesheets[all][] = css/text.css\nstylesheets[all][] = css/regions.css\nstylesheets[all][]\
  \ = css/gamma.css\nstylesheets[all][] = css/dark.css\n\nscripts[] = js/gamma.js\n\
  ```\n\n任何以这种方式包含的脚本都会在使用该主题的每个页面上自动加载。因此，如果你使用这种方法，当你使用 Seven 作为管理主题时，你的 JavaScript\
  \ 将不会应用于站点的管理部分。\n\n`gamma.js`在列表 17-1 中的位置是相对于主题或模块的根路径的。因此，由于该主题的 .info 文件很可能位于`/sites/all/themes/gamma/gamma.info`中，你尝试在此加载的\
  \ JavaScript 文件应位于`/sites/all/themes/gamma/js/gamma.js`。\n\n**列表 17-2.** 在模块的 .info\
  \ 文件中添加 JavaScript\n\n```\nname = DGD7 Test Module\ndescription = An example module\n\
  core = 7.x\n\nfiles[] = dgd7_test.module\n\nscripts[] = dgd7_test.js\n```\n\n在模块的\
  \ .info 文件中添加 JavaScript 将确保该文件在每次页面加载时都被包含。\n\n##### `drupal_add_js()`\n\n主题也可以在`template.php`中使用`drupal_add_js()`来添加\
  \ JavaScript 文件。如果你只希望在特定条件下（而不是每个页面）包含你的 JavaScript，这是首选方法。模块也使用`drupal_add_js()`来包含与其输出功能或呈现相关的任何\
  \ JavaScript 文件。\n\n以下`drupal_add_js()`的示例可以放置在你的主题或模块中，但请记住，在主题中声明的任何对`drupal_add_js()`的调用，只会在使用该主题的页面上存在。如果你需要一个\
  \ JavaScript 文件包含在每个页面（包括管理页面）上（可能是为了操作节点表单），你将需要在模块中使用`drupal_add_js()`或将其添加到模块的\
  \ .info 文件中（如前所述），以便它出现在任何页面上，无论渲染页面使用的是哪个主题。有关此函数的完整文档，请访问[`http://api.drupal.org/drupal_add_js`](http://api.drupal.org/drupal_add_js)。\n\
  \n因此，要从本地文件系统添加一个 JavaScript 文件，请使用以下代码：\n\n```\ndrupal_add_js('misc/machine-name.js');\n\
  drupal_add_js(drupal_get_path('module', 'example') . '/example.js');\ndrupal_add_js(drupal_get_path('theme',\
  \ 'omega') . '/js/example.js');\n```\n\n仅使用一个参数时，Drupal 默认你包含的 JavaScript 是 `'file'`\
  \ 类型。在第一行中，使用相对路径到文件`misc/machine-name.js`是可以的，因为`machine-name.js`（一个处理为通用文本输入创建系统名称的\
  \ JavaScript 包含文件，例如将空格替换为破折号或下划线，将所有文本转换为小写等）包含在 Drupal 核心中，不太可能移动。然而，如果你要包含一个位于模块或主题目录中的\
  \ JavaScript 文件，最佳实践是使用`drupal_get_path()`来正确找到模块或主题的位置，然后附加 JavaScript 文件在目录中存储的位置。使用`drupal_get_path()`非常重要，因为如果你在名为\
  \ example 的模块中使用文件`example.js`，该路径可能是多个位置中的任何一个，包括：\n\n- `sites/all/modules/example/example.js`\n\
  - `sites/default/modules/example/example.js`\n- `sites/example.com/modules/contrib/example/example.js`\n\
  \n考虑到存储有效模块的这些潜在位置，调用`drupal_add_js(drupal_get_path('module', 'example') . '/example.js');`将确保无论模块存储在哪里，`example.js`文件都会被加载。\n\
  \n在 Drupal 的早期版本中，无法使用`drupal_add_js()`从远程服务器添加 JavaScript 包含文件，但现在在 Drupal 7 中已经可以实现。这是一种很好的方法，可以从其他位置添加\
  \ JavaScript 代码——如果你正在运行许多需要相同 JS 功能的站点，这是一个非常常见需求。以前，这必须通过服务器上的符号链接创造性地完成，以将相对路径正确映射到该位置，或者通过管理多个相同\
  \ JavaScript 包含文件的副本。以下代码展示了现在添加远程 JavaScript 文件有多么简单：\n\n```\ndrupal_add_js('http://example.com/example.js',\
  \ 'external');\n```\n\n此外，还可以快速添加一行或两行内联 JavaScript（而不是创建一个全新的 .js 文件），并通过将代码直接添加到页面来实现。以下代码展示了如何通过\
  \ `drupal_add_js()` 的 `inline` 属性快速向页面添加一个弹窗：\n\n```\ndrupal_add_js('jQuery(document).ready(function\
  \ () { alert(\"Drupal Love!\"); });', 'inline');\ndrupal_add_js('jQuery(document).ready(function\
  \ () { alert(\"Drupal Love!\"); });',\n  array('type' => 'inline', 'scope' => 'footer',\
  \ 'weight' => 5),\n);\n```\n\n此方法应仅用于无法从文件执行的 JavaScript。在添加内联代码时，请确保你未依赖`$()`作为\
  \ jQuery 函数。jQuery 的正确命名空间将确保在使用`$()`时，另一个 JavaScript 库不会与 jQuery 冲突。为了确保你的 JavaScript/jQuery\
  \ 片段在使用内联 JavaScript 时按预期工作，请将你的代码包装在`(function ($) { $('div').addClass('page-div')})(jQuery);`中。\n\
  \n另请注意，此方法并非仅将 `'inline'` 作为第二个参数传递，而是使用选项数组来进一步控制 JavaScript 如何添加到页面。通过使用 `'scope'\
  \ => 'footer'` 设置，你告诉 Drupal 在页面末尾的 `$page_bottom` 区域渲染 JavaScript，使其恰好出现在 `</body>`\
  \ 之前。此外，你告诉 Drupal 你希望此 JavaScript 包含文件的权重比正常情况稍重，以确保如果在 `'footer'` 范围内声明了其他项目，此代码将在任何权重大于\
  \ 5 的项目之后渲染。\n\n\n\n##### `drupal_add_js()` 中的权重与分组\n\nDrupal 7 中 `drupal_add_js()`\
  \ 的几个出色新特性是 `$options` 中的权重（`weight`）和分组（`group`）选项。过去，使用此函数添加 JavaScript 时，其顺序取决于页面构建过程中调用它的次序。\n\
  \n权重和分组选项允许您以任何方式重新排序 JavaScript 的引入顺序；因此，如果在页面构建后期设置了某些条件，您可以使用 `drupal_add_js()`\
  \ 让一个新文件在页面源码顺序中提前出现（甚至第一个出现）。反过来，您也可以让一个提前引入的文件通过设置更高的权重，使其成为源码中绝对最后一个被引入的项目。\n\
  \nDrupal 页面渲染中 JavaScript 的排序遵循以下规则：\n\n*   首先按**作用域（scope）**排序：`'header'` 最先，`'footer'`\
  \ 最后，其他自定义主题提供的作用域则根据主题决定，排在两者之间。\n*   然后按**分组（group）**排序。\n*   再按 `'every_page'`\
  \ 标志排序，`TRUE` 优先于 `FALSE`。\n*   接着按**权重（weight）**排序。\n*   最后按 JavaScript **被添加的顺序**排序。例如，在其他条件相同的情况下，在页面请求中较晚调用\
  \ `drupal_add_js()` 添加的 JavaScript，会排在较早调用 `drupal_add_js()` 添加的 JavaScript 之后。\n\
  \n##### `drupal_add_js()` 中的权重示例\n\n通过权重，Drupal 可以按逻辑顺序放置 JavaScript 引入文件。正如 jQuery\
  \ 库（`jquery.js`）被提前添加以便其他文件可以依赖它一样，您也可以为自己的 JavaScript 添加权重，因为您的某些代码也可能需要提前包含在页面中，以便其他引入文件或内联\
  \ JavaScript 可以基于它进行构建。\n\n以下代码未声明权重；项目按作用域、分组、`every_page` 标志，然后按调用顺序排序：\n\n`drupal_add_js('misc/machine-name.js');`\n\
  \n在以下代码中，将权重设置为 `-10` 会将文件放置在默认作用域（`header`）及其关联分组的更靠前位置：\n\n`drupal_add_js('misc/machine-name.js',`\n\
  `  array('type' => 'file', 'weight' => -10),`\n`);`\n\n在以下代码中，将作用域设置为 `'footer'`\
  \ 会确保该文件在文档末尾的 `</body>` 标签之前被引入：\n\n`drupal_add_js('misc/machine-name.js',`\n`\
  \  array('type' => 'file', 'scope' => 'footer', 'weight' => 5),`\n`);`\n\n#####\
  \ `drupal_add_js()` 中的分组示例\n\n除了简单地给 JavaScript 添加权重外，您现在还可以将它们声明到默认分组中（参见**清单 17-3**）。`JS_LIBRARY`\
  \ 包含核心 Drupal 引入文件，如 `drupal.js`、`jquery.js` 以及其他高级 JavaScript 文件。`JS_DEFAULT` 是模块中引入的\
  \ JavaScript 默认所在的分组。`JS_THEME` 是主题层引入文件默认所在的分组。\n\n能够重新对 JavaScript 文件进行分组是很好的；在某些情况下，您可能需要通过主题引入一个\
  \ JavaScript 文件，并将其与其它 `JS_LIBRARY` 功能一起放置在非常高的层级。\n\n**清单 17-3. 默认分组：`JS_LIBRARY`、`JS_DEFAULT`（模块\
  \ JS）和 `JS_THEME`（主题 JS）**\n\n```php\ndrupal_add_js('misc/machine-name.js',\n  array('type'\
  \ => 'file', 'scope' => 'header', 'weight' => -15, 'group' => JS_LIBRARY),\n);\n\
  drupal_add_js('misc/machine-name.js',\n  array('type' => 'file', 'scope' => 'header',\
  \ 'weight' => -15, 'group' => JS_DEFAULT),\n);\ndrupal_add_js('misc/machine-name.js',\n\
  \  array('type' => 'file', 'scope' => 'header', 'weight' => -15, 'group' => JS_THEME),\n\
  );\n```\n\n分组按您在清单 17-3 中看到的顺序进行声明。\n\n*   `JS_LIBRARY` 引入的文件（如核心 jQuery 库）需要最先声明，以便其他文件和库可以使用它们。\n\
  *   `JS_DEFAULT` 是在模块层使用 `drupal_add_js()` 时的默认值。\n*   `JS_THEME` 是在主题层（`template.php`）使用\
  \ `drupal_add_js()` 时的默认值。\n\n使用 `drupal_add_js()`，您还可以获得许多其他选项，用于高级放置、分组、排序以及缓存/聚合控制。您可以在\
  \ [`http://api.drupal.org/drupal_add_js`](http://api.drupal.org/drupal_add_js) 的\
  \ `drupal_add_js()` API 页面上找到更多详细信息。\n\n#### JavaScript 库\n\nJavaScript 及其众多强大的库曾经被诟病为“需要在\
  \ Internet Explorer 中关闭的东西”，但如今它们已复兴，并普遍存在于您每天依赖的大部分网站中。Facebook、Twitter、纽约时报，甚至\
  \ Drupal.org 网站都严重依赖 JavaScript 库来提供增强的功能和更清晰的界面。\n\njQuery 是一个跨浏览器的 JavaScript\
  \ 库，而市面上还有成千上万个其他库。并非所有的库都像 jQuery 那样复杂，但它们的共同点是致力于为您的网页提供一定水平的功能或交互性。\n\njQuery\
  \ 是一个默认已经包含在 Drupal 中的库，并且随时可用。本节将讨论如何将其他 JavaScript 库添加到您的站点和/或模块中。\n\n![images](img/square.jpg)\
  \ **注意**：Drupal 7 提供了更灵活的 jQuery 和 JavaScript 支持。\n\n\n\n##### `hook_library()`\n\
  \n在你的站点添加或定义自定义 JavaScript 库时，你首先会接触到并爱上的第一个 Drupal 函数就是 `hook_library()`。添加一个库可以简单地将你自己的自定义代码实现为一个库，或者包含一个来自网络的现成库。`hook_library()`\
  \ 注册与你的模块关联的 JavaScript/CSS 库。这个钩子始终位于你自定义的 `.module` 文件或模块的相应包含文件中。\n\n要真正理解基础知识，你可以查看\
  \ [`http://api.drupal.org/hook_library`](http://api.drupal.org/hook_library) 上的文档。\n\
  \n每个库的定义包含以下项目：\n\n- **标题：** 库的人类可读名称\n- **网站：** 库网站的 URL\n- **版本：** 指定库版本的字符串\n\
  - **Js：** JavaScript 元素数组\n    - JavaScript 文件的路径 => `array()`\n- **CSS：** CSS 元素数组\n\
  \    - CSS 文件的路径 => `array()`\n    - 类型 = 文件/外部/等\n    - 媒体 = 屏幕/打印/全部\n    - 类型和媒体选项请参见\
  \ `drupal_add_css()`\n- **依赖项：** 此库所依赖的库数组\n    - 使用 `drupal_add_library()` 的格式，这将在下一节关于包含已定义\
  \ JavaScript 库的内容中定义\n\n清单 17–4 展示了 `hook_library()` 可用的基本元素，你将看到如何快速为你的模块添加一个健壮的库，以实现从简单功能到全面界面改造的任何功能，这取决于你库中包含的代码及其实现方式。\n\
  \n**清单 17–4.** `hook_library()` 可用的基本元素\n\n```\nfunctionhook_library() {\n  // 库一。\n\
  \  $libraries['library-1'] = array(\n  'title' =>'Library One',\n  'website' =>'http://example.com/library-1',\n\
  \  'version' =>'1.2',\n  'js' =>array(\n   drupal_get_path('module', 'my_module')\
  \ . '/library-1.js' =>array(),\n  ),\n  'css' =>array(\n   drupal_get_path('module',\
  \ 'my_module') . '/library-9781430231356.css' =>array(\n    'type' =>'file',\n \
  \   'media' =>'screen',\n   ),\n  ),\n  );\n     return $libraries;\n}\n```\n\n\
  清单 17–5 将你的库定义为两个 JavaScript 文件（`js-file-one.js` 和 `js-file-two.js`）和一个 CSS 文件（`css-file-one.css`），并声明你的库在没有系统模块提供的默认\
  \ jQuery UI 核心和自动完成库时将无法运行。\n\n**清单 17–5.** 定义你的库\n\n```\nfunctionmymodule_library()\
  \ {\n  $libraries['my-first-library'] = array(\n    'title' =>'我的第一个 JavaScript\
  \ 库',\n    'website' =>'http://himerus.com',\n    'version' =>'1.0.1',\n    'js'\
  \ =>array(\n      drupal_get_path('module', 'mymodule') . '/js-file-one.js' =>array(),\n\
  \      drupal_get_path('module', 'mymodule') . '/js-file-two.js' =>array(),\n  \
  \  ),\n    'css' =>array(\n      drupal_get_path('module', 'mymodule') . '/css-file-one.css'\
  \ =>array(\n        'type' =>'file',\n        'media' =>'all',\n      ),\n    ),\n\
  \    'dependencies' =>array(\n      array('system', 'ui'), // 需要核心 ui 库\n      \
  \         array('system', ' ui.autocomplete'), // 需要自动完成库\n    ),\n  );\n     return\
  \ $libraries;\n}\n```\n\n你可以看到，使用 `hook_library()` 实际实现一个新库相当容易。此过程的实际工作在于构建你的 JavaScript\
  \ 代码（假设它是自定义的）。库的实际定义和包含非常简单。\n\n##### `drupal_add_library()`\n\n现在你已经定义了自定义库，可以通过多种方式快速将其添加到你的站点。我将在这里概述几个示例，但实际上有数十种方法可以包含你的库并在特定位置调用它。\n\
  \n过去，包含必要的 JavaScript 和 CSS 以提供某些功能需要多次调用 `drupal_add_js()` 和 `drupal_add_css()`。现在，使用之前\
  \ `hook_library()` 中的示例，你可以通过一次调用 `drupal_add_library()` 快速加载所有 JavaScript、CSS 及它可能依赖的其他库，如清单\
  \ 17–6 所示。\n\n**清单 17–6.** Drupal 6 和 Drupal 7 中包含库的比较\n\n*Drupal 6*\n\n```\n//\
  \ 添加所需的依赖项\ndrupal_add_js('misc/autocomplete.js');\n// 添加相关的 JS 文件\ndrupal_add_js(drupal_get_path('module',\
  \ 'mymodule') . '/file1.js');\ndrupal_add_js(drupal_get_path('module', 'mymodule')\
  \ . '/file2.js');\n// 添加相关的 CSS 文件\ndrupal_add_css(drupal_get_path('module', 'mymodule')\
  \ . '/file9781430231356.css');\ndrupal_add_css(drupal_get_path('module', 'mymodule')\
  \ . '/file9781430231356.css');\n```\n\n*Drupal 7*\n\n```\n// 添加我的库及其所有依赖项\ndrupal_add_library('mymodule',\
  \ 'mylibrary', TRUE);\n```\n\n`drupal_add_library()` 函数接受三个参数：模块名称（`$module`）、库名称（`$name`）以及一个布尔标志（`$every_page`），用于定义是否在每个页面上包含它。如果该标志设置为\
  \ FALSE，则该库的 JavaScript 和 CSS 无法聚合——Drupal 通过将多个可缓存的 JS/CSS 文件合并为单个文件在页面加载时呈现——因此，在可能的情况下，最好将其设置为\
  \ TRUE。`$every_page` 标志设置为 FALSE 的主要情况是对于仅在单个表单或单个页面上需要 JavaScript 库的模块或实现。\n\n\
  Drupal 6 和 Drupal 7 所需的工作量差异巨大，如清单 17–7 所示。现在，你无需声明一长串文件来包含适当的 JavaScript/CSS 和必需的依赖项，而是可以在\
  \ `hook_library()` 中定义你的需求，告诉 Drupal 在添加你的文件之前，应包含 X 个 JavaScript 文件、Y 个 CSS 文件以及\
  \ Z 个依赖项。`drupal_add_library()` 具有 TRUE 或 FALSE 的返回值。如果函数正确返回且所有文件和依赖项都已正确包含，则返回\
  \ TRUE；如果某个项目未能找到或加载，则返回 FALSE。\n\n#### 覆盖 JavaScript\n\n你已经学习了如何通过标准调用 `drupal_add_js()`\
  \ 实现 JavaScript，如何一次性使用 `drupal_add_library()` 添加整个库，以及如何使用 `hook_library()` 实现你自己的库，但乐趣还未结束。现在，你拥有了像\
  \ Drupal 其他 API 中看到的那样，在将这些元素输出到页面之前修改其中一些元素的能力。这允许你操作要包含的 JavaScript 文件，或通过你自己的模块动态地完全更改库的定义。\n\
  \n\n\n##### `hook_js_alter()`\n\n在 Drupal 的早期版本中，修改输出到页面的脚本既繁琐又缺乏优雅性。jQuery Update\
  \ 模块使用了一种方法，在 `hook_preprocess_page()` 中扫描 `$variables['scripts']` 来查找需要替换的项目，分配新的替换内容，然后取消设置原始内容。这种方法虽然可行，但对于一个可以更好处理的问题来说，这实在是一个相当混乱的解决方案。\n\
  \n在 Drupal 7 中，你现在拥有了非常实用的 `hook_js_alter()` 函数。对于那些熟悉 `hook_form_alter()`、`hook_menu_alter()`\
  \ 等函数的开发者来说，这很容易理解。`hook_js_alter()` 函数在主题层和模块层都可用，因此你可以在你的 `.module` 文件中包含 `mymodule_js_alter()`\
  \ 函数，或者在主题的 `template.php` 文件中包含 `mytheme_js_alter()` 函数。使用 `hook_js_alter()` 时，你将要创建的函数开头如下所示：\n\
  \n```\nfunction mymodule_js_alter(&$JavaScript) {\n  $search = drupal_get_path('module',\
  \ 'some_module') . '/some-file.js';\n  if(array_key_exists($search)) {\n    // 重置此项的权重，使其在源代码中显示更靠前\n\
  \    $JavaScript[$search]['weight'] = -100;\n  }\n}\n```\n\n更改已包含的 JavaScript 文件的权重就像上面展示的那样简单。考虑到这一点，你可以轻松替换一个\
  \ JavaScript 文件的所有设置，甚至可以替换文件本身。你还可以重置你在此章中学到的关于 `drupal_add_js()` 的任何属性。例如，当你希望将包含的\
  \ jQuery 核心版本替换为未随 Drupal 核心打包的更新版本时，这会非常方便。你只需在你的模块或主题中使用 `hook_js_alter()`，并将默认的\
  \ `jquery.js` 文件替换为你选择的文件即可。\n\n以下代码示例展示了更改 `toolbar.js` 文件权重的过程，该文件由 Drupal 7 中的工具栏模块提供。如果其他一些\
  \ JavaScript 存在冲突，并且需要将此文件更早地添加到页面源代码中，可以如此轻松地实现。请注意，这适用于 Drupal 中包含的**任何** JavaScript。\n\
  \n```\nfunction mymodule_js_alter(&$JavaScript) {\n  $search = drupal_get_path('module',\
  \ 'toolbar') . '/toolbar.js';\n  if(array_key_exists($search)) {\n    $JavaScript[$search]['weight']\
  \ = -100;\n  }\n}\n```\n\n##### `hook_library_alter()`\n\n既然你已经了解了如何修改单个 JavaScript\
  \ 文件，本节将展示如何通过使用 `hook_library_alter()` 来操作由 `hook_library()` 定义的整个 JavaScript 库。\n\
  \nAPI 文档（[`http://api.drupal.org/hook_library_alter`](http://api.drupal.org/hook_library_alter)）提供了一个很好的使用示例。如果\
  \ `hook_library()` 定义的文件版本号小于 2，清单 17–7 中的代码会替换该 JavaScript 文件。\n\n**清单 17–7.**\
  \ 替换由 `hook_library()` 定义的 JavaScript 文件\n\n```\nfunction hook_library_alter(&$libraries,\
  \ $module) {\n  // 将 Farbtastic 更新至 2.0 版本。\n  if ($module == 'system' && isset($libraries['farbtastic']))\
  \ {\n    // 验证现有版本是否旧于我们要更新到的版本。\n    if (version_compare($libraries['farbtastic']['version'],\
  \ '2.0', '<')) {\n      // 将现有的 Farbtastic 更新至 2.0 版本。\n      $libraries['farbtastic']['version']\
  \ = '2.0';\n      $libraries['farbtastic']['js'] = array(\n        drupal_get_path('module',\
  \ 'farbtastic_update') . '/farbtastic-2.0.js' => array(),\n      );\n    }\n  }\n\
  }\n```\n\n清单 17–7 展示了 `hook_library_alter()` 的两个参数：`$libraries`，一个包含的库的数组，键名为 `hook_library()`\
  \ 中声明的库的系统名称；以及 `$module`，实现该库的模块的名称。使用这个钩子时应该小心谨慎，或者至少需要来自你母亲的严厉警告。如果你要更新某个库（例如\
  \ jQuery 或 清单 17–7 中的 Farbtastic）的版本，另一个依赖该库的模块可能依赖于特定版本，因此你的更新可能会对你站点中其他项目的功能产生不利影响。\n\
  \n话虽如此，这其中存在许多可能性，甚至包括核心贡献者在将 `hook_library()`、`hook_library_alter()` 和 `hook_js_alter()`\
  \ 集成到 Drupal 7 核心时可能无法想象到的功能。无论如何，Drupal 中的这种新灵活性为模块开发者和主题开发者提供了一种更强大的方法，可以向项目添加和操作\
  \ JavaScript/jQuery 功能。\n\n### Drupal Behaviors\n\nDrupal Behaviors 提供了一些很棒的好处，使得用\
  \ JavaScript 和 jQuery 增强模块变得更加简单。`Drupal.behaviors` 是 Drupal 对象的一个属性，如下所示：\n\n```\n\
  var Drupal = Drupal || { 'settings': {}, 'behaviors': {}, 'locale': {} };\n```\n\
  \n在 Drupal 7 中，JavaScript behaviors 现在是带有两个方法（`attach` 和 `detach`）的对象。引入 `Drupal.detachBehaviors()`\
  \ 是为了允许 AJAX 元素在页面元素被处理或移除之前移除附加的元素。\n\n#### Attaching Behaviors\n\n与其使用传统的 `$(document).ready()`\
  \ 方法来确保你的代码在 DOM 加载完所有对象后执行，不如使用 behaviors 以 Drupal 的方式定义你的 jQuery 代码，这能让你的代码在页面初始加载时正确地交互。它也处理了当\
  \ AJAX 或其他方法稍后向 DOM 添加对象时的情况，只需调用 `Drupal.attachBehaviors()` 就能将你的 behaviors 附加到新的\
  \ DOM 对象上。在 `drupal.js` 中定义，添加到 `Drupal.behaviors` 对象的任何属性都会在调用 `Drupal.attachBehaviors`\
  \ 时被自动调用，如下所示：\n\n```\nDrupal.attachBehaviors = function (context, settings) {\n\
  \  context = context || document;\n  settings = settings || Drupal.settings;\n \
  \ // 执行所有 behaviors。\n  $.each(Drupal.behaviors, function () {\n    if ($.isFunction(this.attach))\
  \ {\n      this.attach(context, settings);\n    }\n  });\n};\n```\n\n下一个方法在页面加载时按预期工作，使用\
  \ `$(document).ready()` 向页面上的所有 H3 元素添加一个新的 CSS 类（`custom-css-class`）。在大多数情况下没问题，但这只会影响页面首次加载时以及第一次调用\
  \ `Drupal.attachBehaviors` 时加载到 DOM 中的 H3 元素。\n\n```\n$(document).ready(function(){\n\
  \  // 作用于所有 h3 元素并为它们添加一个自定义类\n  $('h3').addClass('custom-css-class');\n});\n```\n\
  \n以下代码演示了在 Drupal 7 中的正确用法，使用 `Drupal.behaviors` 的 `attach` 方法来定义你的自定义代码。现在，只要有新元素被添加到\
  \ DOM 并触发了 `Drupal.attachBehaviors()`，你的代码就会应用到这些新元素上。\n\n```\nDrupal.behaviors.myModuleHeaders\
  \ = {\n  attach: function(context, settings) {\n    // 作用于所有 h3 元素并为它们添加一个自定义类\n\
  \    $('h3').addClass('custom-css-class');\n  }\n};\n```\n\n\n\n#### 解绑行为\n\nDrupal\
  \ 7 新增了 `Drupal.detachBehaviors` 方法。在之前的版本中，无法移除通过 `Drupal.attachBehaviors` 附加的行为。当你的\
  \ JavaScript 代码将自身附加到不会在页面重新加载前持续存在的元素上时，这个方法会很有用。一个典型的例子是，在模态窗口中加载的 WYSIWYG 编辑器，用于编辑或保存新内容；提交后，模态窗口关闭，DOM\
  \ 中可能会残留一些不再相关的额外行为。\n\n在你的模块行为中提供解绑方法是可选的。到目前为止，除了在 `modules/file/file.js` 中的用法之外，很少见到解绑方法的示例。`file.js`\
  \ 的第 49 行演示了如何为上传文件的链接附加和解绑行为：\n\n```\n/**\n * 为托管文件元素中的链接附加行为。\n */\nDrupal.behaviors.filePreviewLinks\
  \ = {\n  attach: function (context) {\n    $('div.form-managed-file .file a, .file-widget\
  \ .file a',\ncontext).bind('click',Drupal.file.openInNewWindow);\n  },\n  detach:\
  \ function (context){\n    $('div.form-managed-file .file a, .file-widget .file\
  \ a', context).unbind('click',\nDrupal.file.openInNewWindow);\n  }\n};\n```\n\n\
  ### 优雅地降级 JavaScript/jQuery\n\n在 Web 应用中使用 JavaScript/jQuery 功能时，一个问题是用户可能出于各种原因（偏好、残障等）在浏览器中禁用了\
  \ JavaScript。过去那种建议用户出于安全原因关闭 JavaScript 的时代早已过去。事实上，我们日常访问的大多数网站都严重依赖于 JavaScript、jQuery\
  \ 及类似库的使用。所以，问题不在于那些主动选择关闭这些功能的用户，而在于那些一开始就没有选择去查看它们的用户。\n\n如今用户禁用 JavaScript 的更常见原因是那些依赖屏幕阅读器访问互联网内容的盲人或视力受损用户。使用屏幕阅读器技术的网站访问者，应该与视力正常的用户拥有同等与网站互动的能力。对我们许多人来说，测试这类可访问性可能很困难，但\
  \ Drupal 一直在持续推动，以确保一切（核心代码和贡献代码）尽可能易于访问；感谢 Drupal 中许多视力受损的贡献者，整个社区对这些问题的认识和体谅程度已大大提高。\n\
  \n在设计用户界面和交互时，至关重要的是功能能在未启用 JavaScript 的情况下正常工作，而当启用了 JavaScript 时，你的功能只是通过它得到了增强。\n\
  \nDrupal 核心在未启用 JavaScript 时已非常易于访问，而对于我们这些拥有 JavaScript 能力的用户来说，体验则大大提升。Drupal\
  \ 核心中一个很好的例子是权重属性，它允许你通过拖放来重新排序菜单项（参见图 17-1）。同样的方法也应用于 Drupal 中权重的各种使用场景，包括分类术语权重、区域内的区块位置、内容类型上的字段排序等更多领域。\n\
  \n作为一条简单规则，确保你的 JavaScript 能优雅降级并为没有 JavaScript 能力的用户正常工作的最佳实践是：仅在应用在没有 JavaScript\
  \ 的情况下按预期工作后，再构建你的 JavaScript 增强功能（参见图 17-2）。\n\n![images](img/1701.jpg)\n\n**图\
  \ 17-1.** 启用 JavaScript 时的菜单链接，使用 tabledrag 进行菜单项重新排序\n\n![images](img/1702.jpg)\n\
  \n**图 17-2.** 禁用 JavaScript 时的菜单链接，使用标准选择菜单选项进行菜单项重新排序\n\n##### jQuery UI\n\njQuery\
  \ UI ([`http://jqueryui.com`](http://jqueryui.com)) 提供了底层交互和动画的抽象；高级、可主题化的小部件；以及高级效果。它们构建在你可用于构建高度交互式\
  \ Web 应用的 jQuery JavaScript 库之上。\n\n#### Drupal 核心中的 jQuery UI\n\n在 Drupal 5 和 Drupal\
  \ 6 中，要轻松包含 jQuery UI 交互，你需要借助 Drupal 的 jQuery UI 模块 ([`http://drupal.org/project/jquery_ui`](http://drupal.org/project/jquery_ui))。在\
  \ Drupal 7 中，jQuery UI 1.7 已包含在核心中，使得模块和主题开发者可以轻松访问高级、增强的界面，而无需额外模块或手动在网站/项目中实现\
  \ jQuery UI 代码。\n\n要开始实现 jQuery UI 功能，请参考本章前面讨论过的 `drupal_add_library()` 函数。你可以快速包含开始构建增强功能所需的\
  \ jQuery UI 相关部分。\n\n##### Drupal 核心中的 jQuery UI 元素\n\n本节中的示例直接取自 [`www.jqueryui.com`](http://www.jqueryui.com)\
  \ 提供的文档，仅添加了在 Drupal 7 中实现的相关 PHP 代码，以及通过 `Drupal.Behaviors` 声明功能的适当 JavaScript。更多示例和用法可查阅\
  \ jQuery UI 文档。\n\n###### accordion\n\n让我们从 accordion 开始。以下是包含 accordion 库的 PHP\
  \ 代码：\n\n```\ndrupal_add_library('system', 'ui.accordion');\n```\n\n以下是创建 `Drupal.behavior`\
  \ 来实现 accordion 的 JavaScript 代码：\n\n```\nDrupal.behaviors.myModuleAccordions = {\n\
  \  attach: function(context, settings) {\n    // 为所有包含在 class 为 accordion 的 div\
  \ 中的 h3 元素添加 accordion\n    $('.accordion').accordion();\n  }\n};\n```\n\n最后，以下是\
  \ accordion 的 HTML 示例（如图 17-3 所示）：\n\n```\n<div class=\"accordion\">\n  <h3><a href=\"\
  #\">标题 1</a></h3>\n  <div><p>Lorem Ipsum dolor sit amet. Lorem Ipsum dolor sit amet</p></div>\n\
  \  <h3><a href=\"#\">标题 2</a></h3>\n  <div><p>Lorem Ipsum dolor sit amet. Lorem\
  \ Ipsum dolor sit amet</p></div>\n  <h3><a href=\"#\">标题 3</a></h3>\n  <div><p>Lorem\
  \ Ipsum dolor sit amet. Lorem Ipsum dolor sit amet</p></div>\n</div>\n```\n\n![images](img/1703.jpg)\n\
  \n**图 17-3.** 运行中的 Accordion\n\n###### datepicker\n\n现在让我们看看 datepicker。以下是包含 datepicker\
  \ 库的 PHP 代码：\n\n```\ndrupal_add_library('system', 'ui.datepicker');\n```\n\n以下是创建\
  \ `Drupal.behavior` 来实现 datepicker 的 JavaScript 代码：\n\n```\nDrupal.behaviors.myModuleDatepicker\
  \ = {\n  attach: function(context, settings) {\n    // 为所有 class 为 datepicker 的输入框添加\
  \ jQuery UI datepicker\n    $('.datepicker').datepicker();\n  }\n};\n```\n\n以下是\
  \ datepicker 的 HTML 示例。你可以在图 17-4 中看到结果：\n\n```\n<p><label for=\"custom-datepicker\"\
  >日期:</label><input id=\"custom-datepicker\"\nclass=\"datepicker\" type=\"text\"\
  ></p>\n```\n\n![images](img/1704.jpg)\n\n**图 17-4.** 运行中的 Datepicker\n\n###### dialog\n\
  \n接下来是 dialog。以下是包含 dialog 库的 PHP 代码：\n\n```\ndrupal_add_library('system', 'ui.dialog');\n\
  ```\n\n以下是创建 `Drupal.behavior` 来实现 dialog 的 JavaScript 代码：\n\n```\nDrupal.behaviors.myModuleDialog\
  \ = {\n  attach: function(context, settings) {\n    // 为所有 id 为 dialog 的元素添加 jQuery\
  \ UI dialog\n    $('.dialog').dialog();\n  }\n};\n```\n\n以下是 dialog 的 HTML 示例，其结果显示在图\
  \ 17-5 中：\n\n```\n<div class=\"dialog\" title=\"基础对话框\">\n  <p>这是用于显示信息的默认对话框。该对话框窗口可以通过\
  \ 'x' 图标移动、调整大小和关闭。</p>\n</div>\n```\n\n![images](img/1705.jpg)\n\n**图 17-5.** 运行中的\
  \ Dialog\n\n\n\n##### `draggable`\n\n下一个示例是一个可拖动的元素，你可以在屏幕上拖动它。这是引入可拖动库的 PHP 代码：\n\
  ```\ndrupal_add_library('system', 'ui.dialog);\n```\n这是为可拖动元素创建 `Drupal.behavior`\
  \ 的 JavaScript 代码：\n```\nDrupal.behaviors.myModuleDraggable = {\n  attach: function(context,\
  \ settings) {\n    // 将所有 class 为 draggable 的元素设置为可拖动的……呃……可拖动\n    $('.draggable).draggable();\n\
  \  }\n};\n```\n这是一个可拖动元素的 HTML 示例；你可以在图 17-6 中看到结果：\n```\n<div class=\"draggable\
  \ ui-widget-content\">\n  <p>拖动我</p>\n</div>\n```\n![images](img/1706.jpg)\n\n**图\
  \ 17-6.** 操作中的可拖动元素\n\n##### `droppable`\n\n没有可放置目标的可拖动元素算什么？以下是包含可放置库的 PHP 代码：\n\
  ```\ndrupal_add_library('system', 'ui.dialog);\n```\n以下是为可放置元素创建 `Drupal.behavior`\
  \ 的 JavaScript 代码：\n```\nDrupal.behaviors.myModuleDroppable = {\n  attach: function(context,\
  \ settings) {\n    // 将所有 id 为 droppable 的元素设置为可放置的……额……可放置\n    $( \".droppable\"\
  \ ).droppable({\n      drop: function( event, ui ) {\n        $( this )\n      \
  \    .addClass( \"ui-state-highlight\" )\n          .find( \"p\" )\n          .html(\
  \ \"已放置!\" );\n      }\n    });\n  }\n};\n```\n以下代码是可放置元素的 HTML 示例。图 17-7 和图 17-8\
  \ 展示了可放置操作前后的对比。\n```\n<div class=\"draggable ui-widget-content\">\n  <p>将我拖到目标上</p>\n\
  </div>\n<div class=\"droppable ui-widget-header\">\n  <p>放置在此处</p>\n</div>\n```\n\
  ![images](img/1707.jpg)\n\n**图 17-7.** 将可拖动元素放入之前的可放置区域\n\n![images](img/1708.jpg)\n\
  \n**图 17-8.** 将可拖动元素放入之后的可放置区域\n\n##### `progressbar`\n\n在任何 Web 应用中，总会有需要显示进度的时候，下面我们来看看如何实现。这是包含进度条库的\
  \ PHP 代码：\n```\ndrupal_add_library('system', 'ui.progressbar);\n```\n这是为进度条创建 `Drupal.behavior`\
  \ 的 JavaScript 代码：\n```\nfunction dgd7progressbarUpdate(){\n    var progress;\n\
  \    progress = $(\"#progressbar\").progressbar(\"value\");\n    if (progress <\
  \ 100) {\n      $(\".progressbar\").progressbar(\"value\", progress + 5);\n    \
  \  setTimeout(dgd7progressbarUpdate, 500);\n    }\n  }\n  Drupal.behaviors.dgd7progressbar\
  \ = {\n    attach: function(context, settings) {\n      $(\".progressbar\").progressbar({\
  \ value: 1 });\n      setTimeout(dgd7progressbarUpdate, 500);\n    }\n  };\n```\n\
  这是一个可拖放元素的 HTML 示例，结果如图 17-9 所示：\n```\n<div class=\"progressbar\"></div>\n```\n\
  ![images](img/1709.jpg)\n\n**图 17-9.** 操作中的进度条\n\n##### `resizeable`\n\n下一个示例展示了如何在屏幕上放置一个可调整大小的元素。这是包含可调整大小库的\
  \ PHP 代码：\n```\ndrupal_add_library('system', 'ui.resizable);\n```\n这是为可调整大小元素创建\
  \ `Drupal.behavior` 的 JavaScript 代码：\n```\nDrupal.behaviors.dgd7resizable = {\n\
  \    attach: function(context, settings) {\n      $('.resizable').resizable();\n\
  \    }\n  };\n```\n这是一个可调整大小元素的 HTML 示例，其结果可以在图 17-10 中看到：\n```\n<div class=\"resizable\
  \ ui-widget-content\">\n  <h3 class=\"ui-widget-header\">可调整大小</h3>\n</div>\n```\n\
  ![images](img/1710.jpg)\n\n**图 17-10.** 可调整大小的元素\n\n##### `selectable`\n\nWeb 应用经常需要收集用户输入，因此你可以使用可选中元素来代替常规列表。这是包含可选库的\
  \ PHP 代码：\n```\ndrupal_add_library('system', 'ui.selectable);\n```\n这是为可选中元素创建 `Drupal.behavior`\
  \ 的 JavaScript 代码：\n```\nDrupal.behaviors.dgd7selectable = {\n    attach: function(context,\
  \ settings) {\n      $('.selectable).selectable();\n    }\n  };\n```\n这是一个可选中元素的\
  \ HTML 示例，其结果可以在图 17-11 中看到：\n```\n<ol class=\"selectable\">\n  <li class=\"ui-widget-content\"\
  >项目 1</li>\n  <li class=\"ui-widget-content\">项目 2</li>\n  <li class=\"ui-widget-content\"\
  >项目 3</li>\n  <li class=\"ui-widget-content\">项目 4</li>\n  <li class=\"ui-widget-content\"\
  >项目 5</li>\n  <li class=\"ui-widget-content\">项目 6</li>\n  <li class=\"ui-widget-content\"\
  >项目 7</li>\n</ol>\n```\n![images](img/1711.jpg)\n\n**图 17-11.** 可选中元素\n\n##### `slider`\n\
  \n滑块元素为页面添加了一个滑块，以便你可以收集更精细的值。这是包含滑块库的 PHP 代码：\n```\ndrupal_add_library('system',\
  \ 'ui.slider);\n```\n这是为滑块创建 `Drupal.behavior` 的 JavaScript 代码：\n```\nDrupal.behaviors.dgd7slider\
  \ = {\n    attach: function(context, settings) {\n      $('.slider).slider();\n\
  \    }\n  };\n```\n这是一个可排序元素的 HTML 示例；你可以在图 17-12 中看到结果：\n```\n<div class=\"slider\"\
