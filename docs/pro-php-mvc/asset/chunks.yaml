    ) ENGINE=InnoDB DEFAULT CHARSET=utf8


    Each message has a body, belongs to a user, and can be related to another message
    (which was shared earlier). Creating the actual messages is pretty easy: we first
    need to modify the home page to present all relevant, shared messages to the current
    user.'
