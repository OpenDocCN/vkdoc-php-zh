    \n#### PHP 方案 15-5：返回导航系统中的同一位置\n\n此 PHP 方案检查访客是从内部链接还是外部链接到达的。如果来源页面位于同一站点内，该链接会将访客返回到同一位置。如果来源页面是外部站点，或者服务器不支持必要的超全局变量，脚本将替换为标准链接。此处以\
