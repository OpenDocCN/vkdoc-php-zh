- fmt: '### `session.use_strict_mode`


    By enabling strict mode, we can ensure that session data is not shared between
    HTTP and HTTPS, enhancing protection against session hijacking and data leakage.
    Think of it as using different keys for different doors, ensuring that a key for
    a less secure door (HTTP) can’t open a more secure one (HTTPS).


    ### `session.use_cookies` and `session.use_only_cookies`


    By enabling the use of cookies for session management, we can ensure more secure
    handling of sessions compared to URL-based sessions. Using only cookies ensures
    sessions can’t be manipulated through other means. It’s like storing a key in
    a secure, hidden place (cookie) rather than carrying it openly (URL).


    ### `session.cookie_lifetime`


    Setting a short session cookie lifetime reduces the window of opportunity for
    attackers to hijack sessions if they manage to steal a session ID. This is like
    setting an expiration date on a passkey to ensure it can’t be used indefinitely
    if stolen.


    ## Additional Security Measures


    ### `session.cache_expire`


    We can prevent the storage of potentially sensitive session data for extended
    periods by setting a reasonable cache expiration time. Think of it as regularly
    updating the security codes to ensure old ones can’t be used.


    ### `session.sid_length`


    Increasing the session ID length to 256 characters enhances security by making
    it more difficult for attackers to guess valid session IDs. It’s like using a
    long, complex password instead of a short, simple one.


    ### `session.sid_bits_per_character`


    By using 6 bits per character for session IDs in PHP 7.2 and later, we can increase
    the complexity of session IDs, improving security. This is akin to making each
    character in a password more complex, making it harder to guess.


    ### `session.hash_function` and `session.hash_bits_per_character`


    In PHP 7.0–7.1, configuring the hash function and bits per character for session
    ID generation can enhance the security of the session ID generation algorithm.
    It’s like choosing a more advanced encryption method to ensure better protection
    of keys.


    By configuring these PHP session settings according to best practices, we can
    significantly reduce the risk of session hijacking, session fixation, and cross-site
    scripting attacks. This helps enhance the overall security of our application
    and protects sensitive user data.


    Example:


    ```php

    session.cookie_secure = 1

    session.cookie_httponly = 1

    ```


    ### Access Controls (`open_basedir`, `disable_functions`)


    PHP allows you to restrict file and function access. `open_basedir` can limit
    the directories where PHP scripts can read or write files, and `disable_functions`
    can prevent the execution of potentially dangerous functions.


    ![](images/609480_1_En_2_Chapter/609480_1_En_2_Figd_HTML.jpg)


    Let’s examine each of the PHP configuration settings we’ve provided in the context
    of security implications.


    ### `enable_dl = Off`


    We should set `enable_dl` to “Off” generally, and this is considered a good security
    practice. By doing so, we reduce the risk of arbitrary code execution through
    untrusted extensions.


    By disabling dynamic loading of extensions at runtime, we prevent potential security
    risks associated with malicious users uploading or loading their own extensions,
    which may contain harmful code.


    Imagine your website is a secure facility, and extensions are like tools that
    workers can bring in. Allowing dynamic loading of extensions (tools) is like letting
    anyone bring their own tools, which could be dangerous. By setting `enable_dl`
    to “Off,” we ensure that only pre-approved, secure tools (extensions) are used
    within the facility.


    ### `disable_functions = `


    This setting allows us to specify a list of PHP functions that are prohibited
    from being executed. We’ve listed several functions that can be used for executing
    system commands or potentially compromising the server. The listed functions are
    `system`, `exec`, `shell_exec`, `passthru`, `phpinfo`, `show_source`, `highlight_file`,
    `popen`, `proc_open`, `fopen_with_path`, `dbmopen`, `dbase_open`, `putenv`, `move_uploaded_file`,
    `chdir`, `mkdir`, `rmdir`, `chmod`, `rename`, `filepro`, `filepro_rowcount`, `filepro_retrieve`,
    and `posix_mkfifo`.


    By disabling these functions, we can prevent the execution of potentially dangerous
    operations. For example, disabling functions like `system`, `exec`, and `shell_exec`
    helps protect against command injection vulnerabilities. Disabling `move_uploaded_file`
    can prevent unauthorized file uploads or the overwriting of important files. However,
    it’s important to use this setting judiciously as it can impact the functionality
    of our application. We should have a clear understanding of the implications before
    disabling any functions.


    Imagine your website is a secure lab. Allowing dangerous functions like `system`
    and `exec` is akin to allowing potentially harmful chemicals into the lab without
    restrictions. By disabling these functions, we ensure that only safe, controlled
    substances are used, protecting the lab from accidental or intentional harm. Similarly,
    disabling `move_uploaded_file` is like ensuring only authorized personnel can
    move and handle important documents to prevent misplacement or unauthorized changes.


    ### `disable_classes = ...`


    This setting allows us to specify a list of PHP classes that are prohibited from
    being instantiated. It’s similar in concept to `disable_functions` but for classes
    instead of functions.


    The security implications of disabling specific classes depend on the context
    and the purpose of our application. By restricting the use of certain classes
    that might pose a security risk if abused, we can enhance the security of our
    application. However, we should be cautious when using this setting, as it may
    impact the functionality of our application or libraries that rely on these classes.


    Imagine your website is a secure factory, and classes are like specialized machines
    that workers can use. Allowing any machine to be used without restriction could
    lead to misuse or accidents. By disabling specific machines (classes) that are
    deemed dangerous or unnecessary for the workers, we can ensure a safer working
    environment. However, it’s important to ensure that essential operations are not
    disrupted by these restrictions.


    Example:


    ```php

    open_basedir = /var/www/html

    disable_functions = exec, shell_exec, system

    ```


    ## Other PHP General Settings


    Some other general settings which are important to configure for the security
    of your PHP setup are shared below.


    ![](images/609480_1_En_2_Chapter/609480_1_En_2_Fige_HTML.jpg)


    Let’s discuss each of the PHP configuration settings in the description above
    in the context of their security implications.


    ### `doc_root` and `open_basedir`


    `doc_root` sets the document root directory where PHP scripts are allowed to access
    files, while `open_basedir` restricts PHP scripts to operate within specific directories.


    These settings help contain PHP scripts within a specific directory structure,
    reducing the risk of unauthorized file access. If not configured properly, it’s
    possible for an attacker to use directory traversal attacks to access sensitive
    files or execute arbitrary code on the server. Properly setting `open_basedir`
    can prevent scripts from accessing system files or directories outside the designated
    paths, enhancing security.


    Imagine your website is a large office building. The `doc_root` setting is like
    defining which areas of the building employees can work in. Without these restrictions,
    employees might wander into sensitive areas (like the server room) that they shouldn’t
    access. Setting `open_basedir` is like placing security guards at the doors of
    restricted areas, ensuring that employees only operate within their designated
    zones.'
