    With all of that in mind, take a look at the CSS required to utilize these custom
    fonts, as shown in Listing 19-1.


    ***Listing 19-1.*** CSS Custom Font Declarations


    ```

    @font-face

    {

    font-family: "LuxiSans";

    src: url("/fonts/LuxiSans.eot");

    src: url("/fonts/LuxiSans.eot?#iefix") format("embedded-opentype"), url("/fonts/LuxiSans.woff")
    format("woff"),

    url("/fonts/LuxiSans.ttf") format("truetype"),

    url("/fonts/LuxiSans.svg#LuxiSans") format("svg");

    font-style: normal;

    }

    ```


    While this is easy enough hard-code, for a handful of fonts, it is not very extensible.
    For a start, each font would require an additional 10 lines of CSS, not to mention
    each font variant (bold, oblique/italic, etc.). This is further complicated by
    the fact that certain browsers (such as Internet Explorer) have a hard time dealing
    with multiple `src` values, leaving this approach a little unstable.


    What we really want is for the application to detect which browser we are using,
    and return CSS only for the relevant file type. For this to happen, we need to
    a) be able to register multiple font types/variants, b) detect the browser type,
    and c) serve only the applicable font formats.


    ## Building the Proxy


    We begin by adding a `fonts` directory, containing two PHP class files, to the
    `application/libraries` directory.


    The first, `application/libraries/fonts/types.php` contains some constants, which
    represent different format types. You can see this file in Listing 19-2.


    ***Listing 19-2.*** `application/libraries/fonts/types.php`


    ```

    namespace Fonts

    {

    class Types

    {

    const OTF = "opentype";

    const TTF = "truetype";

    const EOT = "eot";

    }

    }

    ```


    The second class is a little trickier. It begins with the code shown in Listing
    19-3, which is used for adding font formats/variants to the proxy.


    ***Listing 19-3.*** `application/libraries/fonts/proxy.php` (Extract)


    ```

    namespace Fonts

    {

    use Fonts\Types as Types;

    class Proxy

    {

    protected $_fonts = array();

    [www.it-ebooks.info](http://www.it-ebooks.info/)

    CHAPTER 19 ■ ExTEnding

    public function addFont($key, $type, $file)

    {

    if (!isset($this- >_fonts[$type]))

    {

    $this- >_fonts[$type] = array();

    }

    $this- >_fonts[$type][$key] = $file;

    return $this;

    }

    public function addFontTypes($key, $types)

    {

    foreach ($types as $type = > $file)

    {

    $this- > addFont($key, $type, $file);

    }

    return $this;

    }

    public function removeFont($key, $type)

    {

    if (isset($this- >_fonts[$type][$key]))

    {

    unset($this- >_fonts[$type][$key]);

    }

    return $this;

    }

    public function getFont($key, $type)

    {

    if (isset($this- >_fonts[$type][$key]))

    {

    return $this- >_fonts[$type][$key];

    }

    return null;

    }

    }

    }

    ```


    The `addFont()` method adds a single font to the protected `$_fonts` array. Similarly,
    the `addFontTypes()` method adds an array of font types for each font face. The
    `getFont()` method returns a named font from the `$_fonts` array, and the `deleteFont()`
    method removes a named font from the `$_fonts` array.


    These methods don’t really do anything useful. For us to know which fonts to serve,
    we need to know which browser is trying to load them. That’s where the next method
    fits in, as demonstrated in Listing 19-4.


    ***Listing 19-4.*** `application/libraries/fonts/proxy.php` (Extract)


    ```

    namespace Fonts

    {

    use Fonts\Types as Types;

    [www.it-ebooks.info](http://www.it-ebooks.info/)

    CHAPTER 19 ■ ExTEnding

    class Proxy

    {

    public function sniff($agent)

    {

    $browser = "#(opera|ie|firefox|chrome|version)[\s\/:]([\w\d\.]+)?.*?

    (safari|version[\s\/:]([\w\d\.]+)|$)#i";

    $platform = "#(ipod|iphone|ipad|webos|android|win|mac|linux)#i";

    if (preg_match($browser, $agent, $browsers))

    {

    if (preg_match($platform, $agent, $platforms))

    {

    $platform = $platforms[1];

    }

    else

    {

    $platform = "other";

    }

    return array(

    "browser" = > (strtolower($browsers[1]) == "version") ? 

    strtolower($browsers[3]) : strtolower($browsers[1]),

    "version" = > (float) (strtolower($browsers[1]) == "opera") ? 

    strtolower($browsers[4]) : strtolower($browsers[2]),

    "platform" = > strtolower($platform)

    );

    }

    return false;

    }

    }

    }

