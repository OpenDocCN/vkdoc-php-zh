  $limit = $this->limit;

  $offset = $this->offset;

  $fields = $this->fields;


  $this->_fields = array($this->from => array("COUNT(1)" => "rows"));

  $this->limit(1);


  $row = $this->first();


  $this->_fields = $fields;


  if ($fields)

