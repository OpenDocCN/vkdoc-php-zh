- "# 第 14 章 ■ 注册与登录\n\n驱动程序类使用 PHP 内置的 `$_SESSION` 数组，该数组包含会话数据的键值对。可以使用 `set()` 方法存储会话值。可以使用\
  \ `get()` 方法检索它们，并使用 `erase()` 方法移除它们。由于社交网络的核心是用户账户，因此与用户会话紧密相关，我们将其添加到引导文件 `index.php`\
  \ 中是有道理的。\n\n### 登录\n\n登录的工作方式与注册类似，都包含一个 HTML 表单和一个用于处理会话创建的特殊操作。第一步是创建登录模板，如**代码清单\
  \ 14-11** 所示。\n\n***代码清单 14-11.*** `application/views/users/login.html`\n\n```html\n\
  <h1>登录</h1>\n<form method=\"post\">\n    <ol>\n        <li>\n            <label>\n\
  \                电子邮件：\n                <input type=\"text\" name=\"email\" />\n\
  \                {if isset($email_error)}\n                {echo $email_error}\n\
  \                {/if}\n            </label>\n        </li>\n        <li>\n    \
  \        <label>\n                密码：\n                <input type=\"password\"\
  \ name=\"password\" />\n                {if isset($password_error)}\n          \
  \      {echo $password_error}\n                {/if}\n            </label>\n   \
  \     </li>\n        <li>\n            <input type=\"submit\" name=\"login\" value=\"\
  登录\" />\n        </li>\n    </ol>\n</form>\n```\n\n登录表单非常简单。它只有两个字段，用于输入电子邮件地址和密码，我们将在\
  \ `Users->login()` 操作中使用它们，如**代码清单 14-12** 所示。\n\n***代码清单 14-12.*** `Users->login()`\
  \ 操作\n\n```php\npublic function login()\n{\n    if (RequestMethods::post(\"login\"\
  ))\n    {\n        $email = RequestMethods::post(\"email\");\n        $password\
  \ = RequestMethods::post(\"password\");\n\n        $view = $this->getActionView();\n\
  \        $error = false;\n\n        if (empty($email))\n        {\n            $view->set(\"\
  email_error\", \"未提供电子邮件\");\n            $error = true;\n        }\n\n        if\
  \ (empty($password))\n        {\n```\n\n\n```php\n$view->set(\"password_error\"\
  , \"Password not provided\");\n$error = true;\n}\n\nif (!$error)\n{\n    $user =\
  \ User::first(array(\n        \"email = ?\" => $email,\n        \"password = ?\"\
  \ => $password,\n        \"live = ?\" => true,\n        \"deleted = ?\" => false\n\
  \    ));\n\n    if (!empty($user))\n    {\n        echo \"success!\";\n    }\n \
  \   else\n    {\n        echo \"error!\";\n    }\n    exit();\n}\n```\n\n`login()`\
  \ 操作首先获取提交的表单值，并确保它们已提供。其处理方式与 `register()` 操作相同。如果字段已提供，我们使用 `User::first()` 模型方法来返回第一个匹配的数据库行。如果找到了与提供的电子邮件和密码字段匹配的行，则输出“success！”，否则输出“error！”。\n\
  \n你可能已经注意到，我们的示例缺少两个非常重要的内容：用户的会话仍然必须创建，而且我们需要此操作根据用户登录成功与否来执行不同的操作。\n\n让我们首先专注于\
  \ `login()` 操作在用户成功登录时应执行的操作。一种选择是在模板中向用户显示一条消息，告知他们已成功登录。不过，这种方式的用户体验并不友好。它不会鼓励用户跳转到其他页面或执行任何其他操作。更好的做法是将他们重定向到其个人资料页面。为此，我们需要为他们创建一个基本的个人资料页面，如清单\
  \ 14-13 所示。\n\n**清单 14-13.** `application/views/users/profile.html`\n\n```html\n\
  <h1>{echo $user->first} {echo $user->last}</h1>\n<p>This is a profile page!</p>\n\
  ```\n\n这是个人资料页面的最基本形式。它显示用户的名和姓，以及关于页面用途的简短描述。如果你一直跟着我的思路走，可能会好奇为什么名和姓没有显示出来（在 `h1`\
  \ 标签中）。原因是我们尚未创建用户会话并将其分配给模板。\n\n让我们通过添加 `Users->profile()` 操作来实现这一点，如清单 14-14 所示。\n\
  \n**清单 14-14.** `Users->profile()` 操作\n\n```php\npublic function profile()\n{\n\
  \    $session = Registry::get(\"session\");\n    $user = unserialize($session->get(\"\
  user\", null));\n\n    if (empty($user))\n    {\n        $user = new StdClass();\n\
  \        $user->first = \"Mr.\";\n        $user->last = \"Smith\";\n    }\n\n  \
  \  $this->getActionView()->set(\"user\", $user);\n}\n```\n\n`profile` 方法从注册表中获取\
  \ `Session` 实例（`use` 语句允许我使用 `Framework\\Registry` 的别名）。然后，从会话中获取键为 `\"user\"` 的值，并将其反序列化。如果不存在\
  \ `$user`，则创建一个默认的 `$user` 对象，最后将 `$user` 对象分配给模板。由于我们尚未将用户行分配给会话，你应该会看到 `Mr. Smith`（在\
  \ `h1` 标签中）。\n\n让我们将用户行分配给会话，并完成这一部分。我们将修改 `login()` 操作，使其类似于清单 14-15 所示。\n\n**清单\
  \ 14-15.** 修改后的 `login()` 操作片段\n\n```php\nif (!$error)\n{\n    $user = User::first(array(\n\
  \        \"email = ?\" => $email,\n        \"password = ?\" => $password,\n    \
  \    \"live = ?\" => true,\n        \"deleted = ?\" => false\n    ));\n\n    if\
  \ (!empty($user))\n    {\n        $session = Registry::get(\"session\");\n     \
  \   $session->set(\"user\", serialize($user));\n        header(\"Location: /users/profile.html\"\
  );\n        exit();\n    }\n    else\n    {\n        $view->set(\"password_error\"\
  , \"Email address and/or password are incorrect\");\n    }\n}\n```\n\n如果找到了用户行，则将该行对象序列化为原始对象的字符串表示形式。然后将其存储在会话中，并将用户重定向到\
  \ `/users/profile.html` 控制器/操作。当用户到达目标页面后，`profile()` 操作将能够检索用户对象，并在个人资料页面上显示正确的信息。\n\
  \n\n\n至此，我们已完成本章设定的所有目标。现在，你应该拥有一个功能完备的注册与登录系统，它能够创建数据库记录并将数据保存到会话中。虽然系统还有很多可以打磨的地方（我们将在后续章节中逐步完善），但无论如何，这已是一项相当不错的成就！\n\
  \n> **注意：** PHP 的 `serialize()`/`unserialize()` 方法可用于将多种 PHP 数据类型转换为其字符串表示形式。这在将对象（内存中）转换为易于存储的格式时最为有用。我们将用户对象的字符串表示形式保存到会话中，因为这样更容易想象将此类数据保存到任何类型的会话提供程序。对于服务器端会话而言，这并非严格必需，但会话管理越具有可移植性，开发和利用其他会话驱动就越容易。要具备前瞻性思维！\n\
