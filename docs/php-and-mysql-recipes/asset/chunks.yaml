    请注意，这里的宽度和高度超过了图像本身的宽高。这些宽度和高度代表的是椭圆（如果从 0 度绘制到 360 度）的大小。


    最后一个名为 `style` 的参数决定了对象的绘制方式。这是一个位图值，有四种不同的选项。`IMG_ARC_PIE` 会绘制一个圆形的弧，而 `IMG_ARC_CHORD`
    则会在起始角度和终止角度之间用一条直线连接。这两个值是互斥的。最后两个选项是 `IMG_ARC_NOFILL`（仅绘制轮廓）和 `IMG_ARC_EDGED`（将起始和终止角度上的点与中心点连接起来）。


