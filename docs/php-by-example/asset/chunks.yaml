    have the keys `"Red"`, `"Yellow"`, and `"Green"`, and the values are `100`, `200`,
    and `300`, respectively.


    The `$B=array(100=>"One hundred",200=>"Two hundred",300=>"Three hundred")` command
    creates the `$B` array with three elements. Elements have the integer indexes
    `100`, `200`, and `300`. Their values are `"One hundred"`, `"Two hundred"`, and
