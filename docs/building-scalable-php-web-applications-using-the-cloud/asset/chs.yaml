  \ 缓存调试技巧\n\n缓存虽然好处巨大，但也带来了自身的一系列问题。为了更好地调试网页，最好始终准备一组参数，你可以将其传给应用程序以关闭缓存。例如，在我自己的许多应用程序中，在\
  \ URL 中传入 `no_cache=1` 就会关闭缓存。这通常是问题上报时我首先检查的地方。\n\n以下是可能遇到缓存问题的一些迹象，以及相应的处理方法：\n\
  \n- **问题**：即使数据库中有新内容，你的应用程序仍输出旧内容。\n  \n  **诊断**：缓存中保留了过期的内容。\n  \n  **解决方案**：让内容更快过期，或者提供额外的缓存键信息，以便缓存知晓何时需要新数据。\n\
  \n- **问题**：你的应用程序根据参数输出了不恰当的数据。\n  \n  **诊断**：这通常发生在缓存键不够具体时。例如，如果内容以错误的语言输出，那可能意味着你需要将当前语言作为缓存键的一部分。\n\
  \  \n  **解决方案**：在缓存键中添加更多参数，确保真正用唯一键标识每一份独特内容；或者你也可以决定此内容过于特殊，不宜缓存。\n\n- **问题**：同一页面每次刷新时输出不同内容。\n\
  \  \n  **诊断**：每台服务器上的缓存内容因访问时间不同而异。\n  \n  **解决方案**：有几种方法可以解决。你可以 (a) 减少过期时间，(b)\
  \ 增加负载均衡器的“粘性”，确保同一个人始终访问同一台服务器（从而命中同一个缓存），(c) 使用全局（或同步）缓存代替本地缓存，以及 (d) 添加额外的缓存键参数，更好地协调用户从缓存中获取的数据。\n\
  \n- **问题**：缓存并没有像你想象的那样加速应用程序。\n  \n  **诊断**：要么从未命中缓存，要么没有缓存正确的内容。\n  \n  **解决方案**：由于出错的方式有很多，修复方法也很多。这通常发生在每个用户访问不同数据集时，导致没有任何数据能从缓存中取出。可以通过增大缓存容量和/或智能预加载可能被访问的数据到缓存中来修复。你可能还需要延长数据的过期时间。不过，问题也可能出在你需要对数据做大量后处理，这比实际查询耗时更久。\n\
  \n"
- '# 7. 数据库复制


  有些内容根本无法缓存。临时查询、实时变化的数据、以及访问模式分布在大量不相关页面上的网站，都很难通过缓存来优化。对于此类工作负载，你可以部署更大的数据库服务器，但最终连这些服务器也会达到极限。


  因此，许多应用架构都采用数据库复制，即使用多个数据库服务器来处理请求。


  ## 7.1 数据库复制的类型


  根据需求不同，数据库复制有多种类型。基本的复制类型包括：


  - **故障转移复制**：在这种配置中，复制服务器不承担负载，但它们确保如果主数据库服务器宕机，有一个包含最新数据的数据库可以立即接管。


  - **主/副本复制**：在这种配置中，主数据库是唯一具有读写权限的数据库。副本服务器在主数据库记录数据时（或稍后）接收数据，但它们是主数据库的只读副本。所有更新都发往主数据库，但查询可以发送到主数据库或任何副本服务器。这也被称为“主/从复制”，其中副本数据库被视为“从数据库”。


  - **多主复制**：在这种配置中，所有数据库都被视为同等的“主”数据库，可以在其中任何一个上执行写入操作。任何数据库上的写入操作随后会与集群中的其余部分同步。


  本章将重点介绍主/副本复制，因为它最容易实现，实际遇到的问题最少，且性价比最高。多主复制很少使用，因为配置、维护和保持高效都很困难，并且很少有数据库支持。即使支持，多主复制也常常引入新的、难以解决的问题，例如数据冲突（即当两个不同服务器上提交了冲突的数据时）。因此，为了保持简洁，本书将聚焦于主/副本配置。


  图 7-1 展示了一个典型主/副本架构的概念视图。



  ## 7.2 复制 PostgreSQL 数据库


  PostgreSQL 的复制系统多年来在功能和易用性上都有了长足的进步。虽然使用起来并不*困难*，但还是需要一些解释才能理解。


  PostgreSQL 内置的复制系统使用一种称为日志流的技术进行复制。为了保证数据一致性，PostgreSQL 会创建所谓的预写式日志（WAL）。基本上，PostgreSQL
  会将*即将*执行的更改写入 WAL，然后再实际执行这些更改。这意味着，如果数据库服务器在更新过程中断电，它会有正在执行的操作记录，并且可以在重新启动后简单地完成该操作。


  ![../images/487291_1_En_7_Chapter/487291_1_En_7_Fig1_HTML.jpg](img/487291_1_En_7_Fig1_HTML.jpg)


  **图 7-1** 主/副本数据库架构图


  有趣的是，这正是复制服务器也需要了解的信息。因此，为了实现数据库复制，PostgreSQL 只需将 WAL 文件传输到复制服务器，复制服务器同样会实施这些更改。这种复制方式称为
  WAL 流。


  要在我们的集群中实现这一点，我们需要配置主数据库以接收复制连接。以 root 用户身份登录 `dbmaster`，编辑文件 `/var/lib/pgsql/data/postgresql.conf`，并设置以下参数：


  ```

  wal_level = hot_standby

  wal_keep_segments = 32

  max_wal_senders = 4

  hot_standby = on

  ```


  如果你使用的是更高版本的 PostgreSQL（9.4 或更高版本），还需要设置：


  ```

  max_replication_slots = 4

  ```


  但是，此设置会破坏我们本书所使用的 CentOS 7.2 自带的 PostgreSQL 版本。


  这些配置更改实现了以下几项功能：


  *   `wal_level` 调整 PostgreSQL 的“预写式日志”（即 WAL），使其保留足够的详细信息，以便发送副本服务器所需的所有数据。

  *   `wal_keep_segments` 在 WAL 使用后保留足够数量的数据段，以便副本服务器如果落后了仍然可以获取数据。我们将其设置为 32，这是一个相当保守的设置。这允许新的副本服务器有充足的时间完全同步，并防止轻微的网络故障和速度减慢导致服务器失去同步。

  *   `max_wal_senders` 应至少设置为副本服务器数量加二（如果决定安装更新的 PostgreSQL，可能需要将 `max_replication_slots`
  设置为相同的值）。

  *   `hot_standby = on` 允许副本服务器响应查询。


  接下来，我们需要在 PostgreSQL 数据库中创建一个复制用户。输入 `psql -U postgres` 访问数据库，然后输入以下内容创建用于复制的用户
  `replicator`（全部在一行内）：


  ```

  CREATE ROLE replicator WITH REPLICATION

  PASSWORD ''mypassword'' LOGIN;

  ```


  然后输入 `\q` 退出。


  接下来，我们需要授予远程服务器打开到此服务器的复制连接的权限。将以下行添加到 `/var/lib/pgsql/data/pg_hba.conf` 文件中：


  ```

  host replication replicator all md5

  ```


  现在，我们需要重启数据库使新设置生效：


  ```

  systemctl restart postgresql

  ```


  我们的服务器现在已完全准备好开始接收复制请求。现在我们可以设置副本服务器了。


  为了设置 PostgreSQL 副本服务器，我们首先需要做的是通过标准流程复制我们的模板节点，为其创建一个新的 Linode 节点来运行。在本练习中，将新节点命名为
  `dbreplica`。你还需要为此机器添加一个私有 IP 地址并记下来（在本书的其余部分，我们将称其为 `DB.REPLICA.PRIVATE.IP`）。


  现在，启动 `dbreplica` 并以 `root` 身份登录。


  如果你已按照说明操作，此机器上应该没有运行 PostgreSQL。但如果正在运行，你可以使用 `systemctl stop postgresql` 将其关闭。PostgreSQL
  关闭后，我们需要清理现有的 PostgreSQL 安装。使用以下命令执行此操作：


  ```

  rm -rf /var/lib/pgsql/data/*

  ```


  现在，我们需要从主系统请求一个初始二进制备份，作为复制的起点。这可以通过 `pg_basebackup` 命令完成。要生成此初始备份起点，首先像这样切换到 postgres
  用户：


  ```

  su - postgres

  ```


  接下来，发出以下命令（全部在一行内）：


  ```

  pg_basebackup -x -U replicator -h DB.MASTER.PRIVATE.IP

  -D /var/lib/pgsql/data

  ```


  它会要求你输入密码，然后它会从主数据库复制整个 PostgreSQL 实例，包括配置文件。接下来，此步骤完成后，你需要调整配置文件。我们在第 5 章中设置的 `postgresql.conf`
  文件包含一个命令 `listen_addresses`，其中包含了服务器的私有 IP 地址。不幸的是，由于这是从主数据库复制的，它当前拥有主数据库的私有 IP
  地址。要解决这个问题，只需打开 `/var/lib/pgsql/data/postgresql.conf` 并将 `listen_addresses` 配置更改为：


  ```

  listen_addresses = ''localhost,DB.REPLICA.PRIVATE.IP''

  ```


  成功完成此操作后，你需要告诉 PostgreSQL 该服务器将用作热备服务器。


  这是通过在启动时让服务器进入“持续恢复模式”来完成的。为此，我们创建文件 `/var/lib/pgsql/data/recovery.conf`，内容如下（最后两行应在同一行输入）：


  ```

  standby_mode = ''on''

  primary_conninfo = ''host=DB.MASTER.PRIVATE.IP port=5432

  user=replicator password=mypassword''

  ```


  一切就绪后，你需要像这样退出并返回 root 用户：


  ```

  exit

  ```


  现在你再次成为 root 用户，我们需要重新启动 PostgreSQL 数据库，并确保它在重启时能自动启动：


  ```

  systemctl start postgresql

  systemctl enable postgresql

  ```


  我们还需要确保防火墙中有一个开放端口以接收数据库连接：


  ```

  firewall-cmd --add-service postgresql

  firewall-cmd --add-service postgresql --permanent

  ```


  至此，你的系统已作为副本服务器启动并运行！


  要验证这一点，请运行以下命令，它将列出你所有正在运行的 PostgreSQL 进程：


  ```

  ps afxw|grep postgres

  ```


  列表中的进程之一应在输出中包含单词 `recovering` 或 `startup`。这意味着数据库已启动、处于活动状态，并从主服务器的 WAL 日志中获取数据。


  你还可以检查日志文件，这些文件位于目录 `/var/lib/pgsql/data/pg_log`。日志文件的末尾应显示类似“database system is
  ready to accept read only connections”和“streaming replication successfully connected
  to primary”的信息。


  ### 关于 PostgreSQL 复制的一些说明


  PostgreSQL 的实现被称为“实例”，并且可以包含任意数量的数据库。如果你按照本书的说明操作，你的 PostgreSQL 实例只包含一个数据库（实际上是三个，因为
  PostgreSQL 总是附带安装一对模板数据库，`template0` 和 `template1`）。使用 `createdb` 命令行程序或在运行 `psql`
  时发出 `create database` 指令来创建一个新数据库是非常容易的。


  无论如何，请记住，由于 PostgreSQL WAL 文件是一个系统级别的特性（即 WAL 文件由整个数据库实例共享），PostgreSQL 流复制会复制整个
  PostgreSQL 实例，而不仅仅是单个数据库。




  ## 7.3 配置应用程序以利用主/副本复制


  应用程序本身已构建为能够利用只读副本。如果你还记得，我们实际上有*两个*连接函数：`getReadWriteConnection()` 和 `getReadOnlyConnection()`。目前，它们都指向同一台服务器。要使用我们新的只读副本，我们只需更改
  `getReadOnlyConnection()` 函数中的连接信息，它将把所有只读连接转移到副本服务器上。


  我们只需要将 `getReadOnlyConnection()` 函数中的 `host` 参数更改为指向 `DB.REPLICA.PRIVATE.IP`。


  完成此操作后，我们只需重新部署代码。和往常一样，我们可以通过部署到 `template_node` 然后从中重新创建 `webnode` 服务器，或者单独部署到每台服务器来实现。


  ## 7.4 添加更多 PostgreSQL 副本服务器


  如果分离单个副本服务器未能提供你所需的性能提升，你实际上可以根据需要拥有任意数量的副本服务器。你可以通过复制模板节点并重复第 7.2 节中的步骤，或者直接复制副本服务器来实现这一点。


  复制副本服务器并不像复制 Web 节点那样自动化，但它可以省去一些步骤。为此，你首先需要在当前的 `dbreplica` 节点上启用备份，然后从 `dbreplica`
  的备份中创建新的副本实例。创建每个副本实例后，你需要通过 `ssh` 登录到新的副本服务器，并将 `/var/lib/pgsql/data/postgresql.conf`
  中的 `listen_addresses` 值设置为其自身的私有 IP 地址，因为默认情况下它会设置为 `dbreplica` 的地址。完成此操作后，你需要使用
  `systemctl restart postgresql` 重启 PostgreSQL。


  创建了多个数据库副本后，你需要修改代码以利用这些数据库。如果我们能为副本数据库创建一个负载均衡器，然后将所有应用程序代码指向该负载均衡器，那将非常理想。遗憾的是，Linode
  目前无法创建*内部*负载均衡器（即仅接受私有网络请求的负载均衡器），因此我们必须提供自己的负载分配机制。我们将在应用程序代码中通过随机选择服务器来模拟此功能。由于我们没有负载均衡器，我们必须在应用程序代码中硬编码服务器列表，并且添加新的副本服务器也需要修改应用程序代码并重新将代码推送至所有
  Web 服务器。


  为了理解应用程序代码将如何修改，假设我们现在有三个副本服务器，其私有 IP 地址分别为 `DB.REPLICA.PRIVATE.IP`、`DB.REPLICA2.PRIVATE.IP`
  和 `DB.REPLICA3.PRIVATE.IP`。为了让我们的只读连接在这些服务器之间循环，我们将根据图 7-2 重写 `getReadOnlyConnection()`
  函数。


  一旦这段代码部署到我们的集群中，所有只读请求将像图 7-3 所示那样在多个副本服务器之间进行负载均衡。这意味着我们唯一的瓶颈将是读写数据库请求。大多数应用程序仍然以只读请求为主，因此读写请求存在瓶颈通常不会造成问题。


  ![../images/487291_1_En_7_Chapter/487291_1_En_7_Fig3_HTML.jpg](img/487291_1_En_7_Fig3_HTML.jpg)


  图 7-3


  多副本数据库配置示意图


