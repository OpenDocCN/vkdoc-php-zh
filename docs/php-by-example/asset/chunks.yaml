  trans: "\n# 类的内容\n\n但关键问题依然存在：类中可以描述什么？简而言之，你可以在类中描述方法和字段。字段本质上是变量。与普通变量不同，字段是在类中描述的。无需给它们赋值，只需在类中声明它们的存在即可。方法与函数相同。但与函数不同的是，方法是在类中描述的。\n\
    \n> **注意**  \n> 字段有时也被称为属性或特性。类的字段和方法被称为类的成员。\n\n以下是一个仅包含单个字段的简单类示例。\n\n```\n\
    class MyClass{\npublic $number;\n}\n```\n\n该类只包含一条 `public $number` 语句，这表示该类描述了一个名为\
    \ `$number` 的字段。`public` 关键字被称为*访问级别说明符*，表示该字段是公有的。字段的“公有性”反过来允许你不仅在类内部访问该字段，还能在类外部访问它。\n\
    \n> **注意**  \n> 除了 `public` 访问级别说明符，还可以使用 `private`（私有字段）和 `protected`（受保护字段）关键字。访问级别说明符如何影响字段属性将在后文讨论。\n\
    \n因此，存在一个包含单个 `$number` 字段的 `MyClass` 类。这意味着什么？这意味着如果基于 `MyClass` 类创建一个对象，该对象就拥有\
    \ `$number` 字段。\n\n| 详细信息 |\n| --- |\n| 字段就像一个变量。如果把对象想象成一个容器，那么对象的字段就是放入该容器的变量。如果有多个基于同一个类创建的对象，它们拥有相同的字段集合。然而，这些是不同的变量，因为每个对象都有自己的字段。因此，在引用对象字段时，仅指定字段名是不够的。还必须指定该字段所属的对象。\
    \ |\n\n要基于某个类创建对象，请使用 `new` 指令，后跟作为创建对象基础的类名。对该对象的引用会被写入到一个与该对象关联的变量（对象变量）中。创建对象的语句模板如下所示。\n\
    \n```\n$variable=new ClassName;\n```\n\n例如，如果要创建一个 `MyClass` 类的对象，相应的命令可能如下所示。\n\
    \n```\n$obj=new MyClass;\n```\n\n该命令创建一个 `MyClass` 类的对象，并且对该创建对象的引用被写入到 `$obj`\
    \ 变量中。如果需要访问该对象，请使用 `$obj` 变量。\n\n> **PHP 8 标准**  \n> 在 PHP 8 中，你可以使用 `$obj::class`\
    \ 语句来获取创建 `$obj` 对象所基于的类的名称。在之前的 PHP 版本中，使用 `get_class()` 函数来实现此目的，相应的命令形式为 `get_class($obj)`。\n\
    \n但对象主要体现在其字段和方法上。因此，对对象的访问就是对其字段和方法的访问。为此，请在对象变量后面加上箭头 `->`，然后放置不带 `$` 符号的字段名。在这种情况下，你可以使用\
    \ `$obj->number` 指令访问 `$obj` 对象的 `$number` 字段。\n\n清单 7-1 是一个程序，其中描述了一个类，基于该类创建了一个对象，然后对该对象字段执行了一些操作。\n\
    \n```\n<?php\n// 类描述：\nclass MyClass{\npublic $number;\n}\n// 创建对象：\n$obj=new\
    \ MyClass;\n// 给字段赋值：\n$obj->number=123;\n// 显示字段：\necho \"字段 \\$number: $obj->number\\\
    n\";\n// 字段的新值：\n$obj->number=321;\n// 显示字段：\necho \"字段 \\$number: $obj->number\\\
    n\";\n?>\n清单 7-1\n创建对象\n```\n\n以下是程序执行的结果。\n\n```\n程序输出（来自清单 7-1）\n字段 $number:\
    \ 123\n字段 $number: 321\n```\n\n程序从描述 `MyClass` 类开始。基于该类，`$obj=new MyClass` 指令创建了\
    \ `$obj` 对象。它拥有 `$number` 字段，使用 `$obj->number=123` 语句为其赋值为 `123`。然后，使用 `echo \"\
    字段 \\$number: $obj->number\\n\"` 语句显示 `$obj` 对象的 `$number` 字段。\n\n> **注意**  \n\
    > 在双引号字符串字面量中，会显示 `$obj->number` 指令的值。\n\n之后，`$obj->number=321` 命令将新值 `321` 赋给\
    \ `$obj` 对象的 `$number` 字段。检查结果显示该字段值已更改。\n\n| 详细信息 |\n| --- |\n| 在 `MyClass` 类的\
    \ `$number` 字段描述中使用的 `public` 访问级别说明符，使得可以在 `MyClass` 代码外部以 `$obj->number` 格式访问该字段。\
    \ |\n\n## 方法\n\n如前所述，除了在类中描述字段，你还可以在其中描述方法。方法的描述方式与函数相同，但仅在类体内。方法的主要特点与其调用方式有关。调用函数时，必须指定函数名及其参数列表。调用方法时，需要指定调用该方法的对象。该方法可以访问类中描述的所有字段和方法。\n\
    \n> **注意**  \n> 此处我们讨论的是普通（非静态）字段和方法。除了普通类成员，还存在静态成员。对它们的操作有其自身特点，将在后文讨论。\n\n\
    清单 7-2 是对前一个示例的小修改。现在，`MyClass` 类除了 `$number` 字段外，还包含两个方法。\n\n```\n<?php\n// 类描述：\n\
    class MyClass{\npublic $number;\n// 显示字段的方法：\nfunction show(){\nprint(\"字段 \\\
    $number: $this->number\\n\");\n}\n// 给字段赋值的方法：\nfunction set($n){\n$this->number=$n;\n\
    }\n}\n// 创建对象：\n$A=new MyClass;\n$B=new MyClass;\n// 给字段赋值：\n$A->set(100);\n$B->set(200);\n\
    // 显示字段：\n$A->show();\n$B->show();\n?>\n清单 7-2\n使用方法\n```\n\n以下是程序执行的结果。\n\n```\n\
    程序输出（来自清单 7-2）\n字段 $number: 100\n字段 $number: 200\n```\n\n主要变化与 `MyClass` 代码有关。除了\
    \ `$number` 字段，该类还包含了 `show()` 和 `set()` 方法。`show()` 方法没有参数，允许显示调用该方法的对象的 `$number`\
    \ 字段。`set()` 方法为调用该方法的对象的 `$number` 字段赋值。该方法的参数（名为 `$n`）决定了赋给 `$number` 字段的值。\n\
    \n在描述这些方法时，你会面临一个关键问题。即，方法是从对象调用的。这意味着，要调用方法，必须指定方法名和调用该方法的对象。而该方法反过来要访问对象的 `$number`\
    \ 字段。访问字段时，必须指定（拥有该字段的）对象。但在描述方法时，对象尚不存在。换句话说，你需要以某种方式指代调用该方法的对象。这就是 `$this` 标识符的用途。在方法代码内部使用时，`$this`\
    \ 指令指代调用该方法的对象。因此，例如，`$this->number` 命令是对调用该方法的对象的 `$number` 字段的引用。\n\n具体来说，在\
    \ `show()` 方法体中，使用 `print(\"字段 \\$number: $this->number\\n\")` 语句，它显示调用该方法的对象的\
    \ `$number` 字段。在 `set()` 方法体中，`$this->number=$n` 语句将方法的参数 `$n` 赋给 `$number` 字段。\n\
    \n在程序中，创建了两个 `MyClass` 类的对象 `$A` 和 `$B`。为此，分别使用了 `$A=new MyClass` 和 `$B=new MyClass`\
    \ 命令。每个对象都有 `$number` 字段，但尽管名称相同，这些是不同的字段：一个属于 `$A` 对象，另一个属于 `$B` 对象。使用 `set()`\
    \ 和 `show()` 方法对字段进行操作。`$A->set(100)` 指令将 `100` 赋给 `$A` 的 `$number` 字段，`$B->set(200)`\
    \ 指令将 `200` 赋给 `$B` 的 `$number` 字段。之后，使用 `$A->show()` 命令显示 `$A` 对象的 `$number`\
    \ 字段，并使用 `$B->show()` 命令显示 `$B` 对象的 `$number` 字段。\n\n| 详细信息 |\n| --- |\n| 有趣的是，当尝试给对象中不存在的字段赋值时，该字段会出现（所谓的动态属性）。例如，如果\
    \ `$obj` 对象没有 `$name` 字段，那么在执行 `$obj->name=\"php\"` 命令后，`$obj` 对象会获得值为 `\"php\"\
    ` 的 `$name` 字段。然而，自 PHP 8.2 起，这种用法已被弃用。如果仍然想使用它，应该在类描述之前加上 `#[\\AllowDynamicProperties]`\
    \ 注解。可以使用 `unset()` 函数从对象中删除一个字段。例如，要从 `$obj` 对象中删除 `$name` 字段，`unset($obj->name)`\
    \ 指令可能会有用。另外值得一提的是，方法和字段一样，可以使用 `public`、`private` 和 `protected` 访问级别说明符来描述。如果方法在描述时没有访问级别说明符（如前面的示例所示），那么该方法默认为公有方法。良好的实践是显式为公有方法指定\
    \ public 访问级别。不过，为了演示 PHP 的灵活性和强大功能，某些方法将使用默认的（公有）访问级别（即不使用 `public` 关键字）。此外，你可以在类描述中为字段赋值。在这种情况下，当基于该类创建对象时，对象的相应字段将具有在类中赋给该字段的值。\
    \ |\n\n> **PHP 8 标准**  \n> 在 PHP 8 版本中，访问对象字段和方法时，可以使用 `?->` 指令代替 `->`。例如，可以使用\
    \ `$object?->method` 表达式代替 `$object->method` 表达式。前一个选项更安全，因为如果 `$object` 变量的值是空的\
    \ `null` 引用，则不会发生致命错误。\n\n## 构造函数与析构函数\n\n在示例中，你基于类创建了对象，然后为对象的字段赋值。如果对象很多，并且它们有很多字段，那么这个过程可能会变得繁琐。因此，建议将其自动化。在这方面，两个特殊方法可能会很有用：*构造函数*和*析构函数*。\n\
    \n构造函数是在创建对象时自动调用的方法。构造函数的名称是 `__construct()`（名称以双下划线开头）。构造函数可以接受参数。通常，构造函数包含为字段赋值或执行其他操作的命令。\n\
    \n| 详细信息 |\n| --- |\n| 如果构造函数有参数，那么这些参数必须在创建对象时指定。构造函数的参数在基于 `new` 指令创建对象的命令中，类名后面的括号内指定。\
    \ |\n\n析构函数是在从内存中移除对象时自动调用的方法。析构函数的名称是 `__destruct()`，并且它没有参数。清单 7-3 说明了如何使用构造函数和析构函数。\n\
    \n```\n<?php\n// 类描述：\nclass MyClass{\npublic $code;\n// 构造函数：\nfunction __construct($code){\n\
    $this->code=$code;\necho \"对象已创建：\",$this->code,\"\\n\";\n}\n```"
