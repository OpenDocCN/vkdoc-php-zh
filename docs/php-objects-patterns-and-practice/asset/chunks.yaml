    At this point, I have only gotten as far as generating configuration. Next, I
    must run the all-important `vagrant up` command. If you work with Vagrant often,
    you will soon find this command very familiar. It kicks off your Vagrant session
    by downloading and provisioning your new box (if necessary), then booting it:


    ```

    $ vagrant up

    ```


    Because I am running this command for the first time with the `bento/centos-6.7`
    virtual machine, Vagrant starts by downloading the box:


    ```

    Bringing machine ''default'' up with ''virtualbox'' provider...

    ==> default: Box ''bento/centos-6.7'' could not be found. Attempting to find and
    install...

    default: Box Provider: virtualbox

    default: Box Version: >= 0

    ==> default: Loading metadata for box ''bento/centos-6.7''

    default: URL: https://atlas.hashicorp.com/bento/centos-6.7

    ==> default: Adding box ''bento/centos-6.7'' (v2.2.7) for provider: virtualbox

    default: Downloading: https://atlas.hashicorp.com/bento/boxes/centos-6.7/versions/2.2.7/providers/virtualbox.box

    ==> default: Successfully added box ''bento/centos-6.7'' (v2.2.7) for ''virtualbox''!

    ```


    Vagrant stores the box (under `~/.vagrant.d/boxes/` if you are running Linux)
    so that you won’t have to download it again on your system—even if you run multiple
    virtual machines. Then it configures and boots the machine (it provides lots of
    detail as it does so). Once it has finished running, I can test it out by logging
    in to my new machine:


    ```

    $ vagrant ssh

    $ pwd

    /home/vagrant

    $ cat /etc/redhat-release

    CentOS release 6.7 (Final)

    ```


    We’re in! So what have we won? Well, we have access to a machine that somewhat
    resembles our production environment. Anything else? Quite a lot, in fact. I said
    earlier that I would like to edit files on my local machine but run them in a
    production-like space. Let’s set that up.


    ## Mounting Local Directories on the Vagrant Box


    Let’s put some sample files together. I ran my first `vagrant init` and `vagrant
    up` commands in a directory I named `infrastructure`. I will resurrect the `webwoo`
    project I used in Chapter [18](#A314621_5_En_18_Chapter.html) (a cut down version
    of the system I developed for Chapter [12](#A314621_5_En_12_Chapter.html)). Putting
    all that together, my development environment looks a little like this:


    ```

    ch20/

    infrastructure/

    Vagrantfile

    webwoo/

    AddVenue.php

    index.php

    Main.php

    AddSpace.php

    ```


    Our challenge is to set up the environment so that we can work with `webwoo` files
    locally, but run them transparently using a stack installed on the CentOS box.
    Depending upon our configuration, Vagrant will attempt to mount directories on
    the host machine within the guest box. In fact, Vagrant has already mounted one
    directory for us. Let’s check it out:


    ```

    $ vagrant ssh

    Last login: Tue Jul  5 15:36:19 2016 from 10.0.2.2

    $ ls -a /vagrant

    .  ..   .vagrant  Vagrantfile

    ```


    So Vagrant has mounted the `infrastructure` directory as `/vagrant` on the box.
    That will come in handy when we write a script to provision the box. For now,
    though, let’s focus on mounting the `webwoo` directory. We can do this by editing
    `Vagrantfile`:


    ```

    config.vm.synced_folder "../webwoo", "/var/www/poppch20"

    ```


    So with this directive, I am telling Vagrant to mount the `webwoo` directory on
    the guest box at `/var/www/poppch20`. In order to see that in effect, I need to
    reboot the box. There’s a new command for this (which should be run on the host
    system and not within the virtual machine):


    ```

    $ vagrant reload

    ```


    The virtual machine shuts down and reboots cleanly. Vagrant mounts the `infrastructure`
    (`/vagrant`) and `webwoo` (`/var/www/poppch20`) directories. Here’s an extract
    from the command’s output:


    ```

    ==> default: Mounting shared folders...

    default: /vagrant => /home/mattz/ch20/infrastructure

    default: /var/www/poppch20 => /home/mattz/ch20/webwoo

    ```


    I can log in quickly to confirm that `/var/www/poppch20` is in place.'
