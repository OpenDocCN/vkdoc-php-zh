- fmt: 'We then modify the `index.php` bootstrap to read and use these values. These
    values don’t have to be specified: if they are not included in the configuration,
    we will use a default settings file of `settings.ini` and a default configuration
    section of `production`.


    > **Note** Typically you won’t need to change the filename of the settings file,
    but having the ability to do so can be useful. For example, if you wanted to run
    two separate web sites from the same code base, you can use a separate settings
    file for each site and then specify in the web server configuration for each site
    which file to use.


    As mentioned earlier, the `SetEnv` directive is used in Apache to set an environment
    variable. The first value for this directive is the name of the environment variable,
    while the second value is the value. The values we will use are as follows:


    ```

    SetEnv APP_CONFIG_FILE "settings.ini"

    SetEnv APP_CONFIG_SECTION "development"

    ```


    > **Note** We will use an `APP_CONFIG_SECTION` value of `development` (rather
    than `production`), because I’m treating this section as though we’re developing
    the application. Once you deploy it (using the instructions later in this chapter),
    you would then either set this value to `production` or omit it completely (since
    we will use `production` as the default).


    These values can then be accessed from any of your PHP scripts in the `$_SERVER`
    variable.


    For example, to retrieve the config filename, you can use `$_SERVER[''APP_CONFIG_FILE'']`.


    Listing 14-20 shows the changes we make to the web server configuration we created
    in Chapter 2 (Listing 2-1). These changes go in the `/var/www/phpweb20/httpd.conf`
    file. You will need to restart your web server for these values to take effect.


    **Listing 14-20.** *Setting the Settings Filename and Section in the Apache Configuration
    (`httpd.conf`)*


    ```

    <VirtualHost 192.168.0.80>

    ServerName phpweb20

    DocumentRoot /var/www/phpweb20/htdocs

    <Directory /var/www/phpweb20/htdocs>

    AllowOverride All

    Options All

    </Directory>

    php_value include_path .:/var/www/phpweb20/include:/usr/local/lib/pear


    php_value magic_quotes_gpc off

    php_value register_globals off


    SetEnv APP_CONFIG_FILE "settings.ini"

    SetEnv APP_CONFIG_SECTION "development"

    </VirtualHost>

    ```


    The next step is to update the application bootstrap file to use these values.
    Listing 14-21 shows the changes we make to the `./htdocs/index.php` file so the
    configuration filename and section are no longer hard-coded.


    **Listing 14-21.** *Using the Apache Environment Variables to Determine the Configuration
    (`index.php`)*


    ```php

    <?php

    require_once(''Zend/Loader.php'');

    Zend_Loader::registerAutoload();


    // setup the application logger

    $logger=new Zend Log(new Zend Log Writer Null());

    try {

    $writer = new EmailLogger($ SERVER[''SERVER ADMIN'']);

    $writer->addFilter(new Zend Log Filter Priority(Zend Log::CRIT));

    $logger->addWriter($writer);


    // load the application configuration

    $configFile = '''';

    if (isset($_SERVER[''APP_CONFIG_FILE'']))

    $configFile = basename($_SERVER[''APP_CONFIG_FILE'']);

    if (strlen($configFile) == 0)

    $configFile = ''settings.ini'';


    $configSection = '''';

    if (isset($_SERVER[''APP_CONFIG_SECTION'']))

    $configSection = basename($_SERVER[''APP_CONFIG_SECTION'']);

    if (strlen($configSection) == 0)

    $configSection = ''production'';


    $config = new Zend_Config_Ini(''../'' . $configFile, $configSection);

    Zend_Registry::set(''config'', $config);


    // ... other code

    ```


    These changes begin by trying to read the `APP_CONFIG_FILE` section from the server
    variables. If no value was found (or the value was empty), the default value of
    `settings.ini` is used. We then do the same thing to determine which configuration
    section to use (using `APP_CONFIG_SECTION` instead). Finally, we use these values
    when instantiating `Zend_Config_Ini`.


    > **Note** This code forces the settings file to be in the application root directory
    (`/var/www/phpweb20`) by using `basename()`. If you wanted the ability to store
    the file elsewhere on your system, you could modify this code to allow full paths
    in the `APP_CONFIG_FILE` setting.


    ## Deploying Application Files with Rsync


    To help with deploying application files (both the initial deployment and also
    for subsequent updates), you can use the `rsync` program. `Rsync` is a tool used
    to synchronize files and directories between two locations. Although programs
    such as FTP and SFTP can be useful, they are cumbersome to use to deploy updates
    (since files may span many directories).


    `Rsync` works by determining the differences between Copy A (in our case, the
    copy on the development server) and Copy B (the copy on the production server)
    and then applying those differences to Copy B. By transmitting only the differences
    between the copies, the amount of data to be transmitted is minimized.


    The fact that `rsync` can be used over an SSH connection makes it a very good
    way to synchronize the two copies of code. Note, however, that `rsync` must be
    installed on both servers (as well as SSH if that is being used).


    If you don’t already have `rsync` on your servers, it can be downloaded from [http://rsync.samba.org](http://rsync.samba.org).
    It is required on each server on which you want to synchronize files.


    Let’s now look at an example of using `rsync`. Assuming both servers have `rsync`
    installed, you can pull the files from development to production (by running `rsync`
    on the production server), or you can push the files from development to production
    (by running `rsync` on the development server).


    If you wanted to deploy the application onto a fictional production server at
    `production.example.com`, you would issue the following command:


    ```

    # rsync -rlptzv -e ssh /var/www/phpweb20 myUsername@production.example.com:/var/www

    ```


    The arguments used in this command are as follows:


    - `-r`: Copy files recursively (that is, copy all directories and subdirectories).

    - `-l`: Copy symbolic links.

    - `-p`: Preserve file and directory permissions.

    - `-t`: Preserve times on files.

    - `-z`: Compress data during the transfer.

    - `-v`: Verbose output during execution.

    - `-e`: Specify which shell to use as the transport. In this case we use `ssh`.


    The next argument indicates the master copy of the files being synchronized, while
    the final argument is the copy that is being updated. In this case we are copying
    from the development server, so we can use a local path. If we were running `rsync`
    from production, then we would use a URL in this argument and a local path on
    the production server as the final argument.


    The first time you run this command, all of the application files will be copied,
    while subsequent times only changed files will be copied. You can see this easily
    by running the command twice initially—the second time nothing will be copied.


    > **Note** You can also use the `-n` argument for a preview of which files will
    be transferred without actually performing the transfer.


    ## Backup and Restore


    The next aspect of application management we’ll look at is the backup and restore
    of data on the production server. In the following sections we will look at how
    to back up the MySQL database used in our application, as well as how to restore
    it again if required. The PHP code we have developed doesn’t need to be backed
    up from the production server since it is only a copy of the development code
    (assuming you back up your local development code or use version control already).'
