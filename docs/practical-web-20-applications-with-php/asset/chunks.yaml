    **Creating a Virtual Host in Windows**


    Creating a virtual host in Windows is similar to the process in the previous section,
    except that the paths must be adjusted. Note also that the PHP include_path directive
    uses a semicolon as the separator rather than a colon, since a colon is used to
    indicate a drive label.


    Listing 2-2 shows the Windows equivalent of Listing 2-1\. Once again, you will
    need to include it in the main web server configuration file, typically found
    in C:\Program Files\Apache Software Foundation\Apache2.2\conf\httpd.conf on Windows.


    **Listing 2-2.** *Web Server Configuration for Apache on Windows (httpd.conf )*


    <VirtualHost *:80>


    ServerName phpweb20


    DocumentRoot "c:/www/phpweb20/htdocs"


    <Directory "c:/www/phpweb20/htdocs">


    AllowOverride None


    Options All


    </Directory>


    php_value include_path ".;c:/www/phpweb20/include;c:/program files/php/pear"


    php_value magic_quotes_gpc off


    php_value register_globals off


    </VirtualHost>


    **Restarting Your Web Server**


    After making changes to your web server configuration, you must restart your web
    server. In Linux, the typical way to do this is with the following command:


    # apachectl restart


    In Windows, you can restart Apache by going to Control Panel ➤ Administrative
    Tools ➤


    Services and selecting restart on the Apache2 service.


    Once your server has been restarted, you should be able to access [http://phpweb20](http://phpweb20)


    directly in your browser (or by entering the server IP address directly, although
    if you’re using a name-based virtual host system as described previously, this
    will not show files from the application directory).


    **Setting Up the Database**


    The next thing we need to do is create the MySQL database that we will be using
    in the web application. We will call this database phpweb20, and we will create
    a user called phpweb20 to access this database.


