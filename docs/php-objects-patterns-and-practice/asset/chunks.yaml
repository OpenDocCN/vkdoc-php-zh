- fmt: '### Consequences


    So, now we’ve seen two options for object creation. The `AppConfig` class was
    an instance of Service Locator (i.e., a class with the ability to find components
    or services on behalf of its client). Using dependency injection certainly makes
    for more elegant client code. The `AppointmentMaker2` class is blissfully unaware
    of strategies for object creation. It simply does its job. This is the ideal for
    a class, of course. We want to design classes that can focus on their responsibilities,
    isolated as far as possible from the wider system. However, this purity does come
    at a price. The object assembler component hides a lot of magic. We must treat
    it as a black box and trust it to conjure up objects on our behalf. This is fine,
    so long as the magic works. Unexpected behavior can be hard to debug.


    The Service Locator pattern, on the other hand, is simpler, though it embeds your
    components into a wider system. It is not the case that, used well, a Service
    Locator makes testing harder. Nor does it make a system inflexible. A Service
    Locator can be configured to serve up arbitrary components for testing or according
    to configuration. But a hard-coded call to a service locator makes a component
    dependent upon it. Because the call is made from within the body of a method,
    the relationship between the client and the target component (which is provided
    by the Service Locator) is also somewhat obscured. This relationship is made explicit
    in the Dependency Injection example because it is declared in the constructor
    method’s signature.


    So, which approach should we choose? To some extent it’s a matter of preference.
    For my own part, I tend to prefer to start with the simplest solution, and then
    to refactor to greater complexity, if needed. For that reason, I usually opt for
    Service Locator. I can create a Registry class in a few lines of code, and increase
    its flexibility according to the requirements. My components are a little more
    knowing than I would like, but since I rarely move classes from one system to
    another, I have not suffered too much from the embedding effect. When I have moved
    a system-based class into a standalone library, I have not found it particularly
    hard to refactor the Service Locator dependency away.


    Dependency Injection offers purity, but it requires another kind of embedding.
    You must buy in to the magic of the assembler. If you are already working within
    a framework which offers this functionality, there is no reason not to avail yourself
    of it. The Symfony `DependencyInjection` component, for example, provides a hybrid
    solution of Service Locator (known as the “service container”) and Dependency
    Injection. The service container manages the instantiation of objects according
    to the configuration (or code, if you prefer) and provides a simple interface
    for clients to obtain those objects. The service container even allows the use
    of factories for object creation. On the other hand, if you are rolling your own,
    or using components from various frameworks, you may wish to keep things simple
    at the cost of some elegance.


    ## Summary


    This chapter covered some of the tricks that you can use to generate objects.
    I began by examining the Singleton pattern, which provides global access to a
    single instance. Next, I looked at the Factory Method pattern, which applies the
    principle of polymorphism to object generation. And I combined Factory Method
    with the Abstract Factory pattern to generate creator classes that instantiate
    sets of related objects. I also looked at the Prototype pattern and saw how object
    cloning can allow composition to be used in object generation. Finally, I examined
    two strategies for object creation: Service Locator and Dependency Injection.


    # 10. Patterns for Flexible Object Programming


    With strategies for generating objects covered, we’re free now to look at some
    strategies for structuring classes and objects. I will focus in particular on
    the principle that composition provides greater flexibility than inheritance.
    The patterns I examine in this chapter are once again drawn from the Gang of Four
    catalog.


    This chapter will cover a trio of patterns:


    *   The Composite pattern: Composing structures in which groups of objects can
    be used as if they were individual objects

    *   The Decorator pattern: A flexible mechanism for combining objects at runtime
    to extend functionality

    *   The Facade pattern: Creating a simple interface to complex or variable systems


    ## Structuring Classes to Allow Flexible Objects


    Way back in Chapter 4, I said that beginners often confuse objects and classes.
    This was only half true. In fact, most of the rest of us occasionally scratch
    our heads over UML class diagrams, attempting to reconcile the static inheritance
    structures they show with the dynamic object relationships their objects will
    enter into off the page.


    Remember the pattern principle, “Favor composition over inheritance”? This principle
    distills this tension between the organization of classes and objects. In order
    to build flexibility into our projects, we structure our classes so that their
    objects can be composed into useful structures at runtime.


    This is a common theme running through the first two patterns of this chapter.
    Inheritance is an important feature in both, but part of its importance lies in
    providing the mechanism by which composition can be used to represent structures
    and extend functionality.


    ## The Composite Pattern


    The Composite pattern is perhaps the most extreme example of inheritance deployed
    in the service of composition. It is a simple and yet breathtakingly elegant design.
    It is also fantastically useful. Be warned, though; it is so neat, you might be
    tempted to overuse this strategy.


    The Composite pattern is a simple way of aggregating and then managing groups
    of similar objects so that an individual object is indistinguishable to a client
    from a collection of objects. The pattern is, in fact, very simple, but it is
    also often confusing. One reason for this is the similarity in structure of the
    classes in the pattern to the organization of its objects. Inheritance hierarchies
    are trees, beginning with the super class at the root, and branching out into
    specialized subclasses. The inheritance tree of classes laid down by the Composite
    pattern is designed to allow the easy generation and traversal of a tree of objects.


    If you are not already familiar with this pattern, you have every right to feel
    confused at this point. Let’s try an analogy to illustrate the way that single
    entities can be treated in the same way as collections of things. Given broadly
    irreducible ingredients such as cereals and meat (or soya if you prefer), we can
    make a food product—a sausage, for example. We then act on the result as a single
    entity. Just as we eat, cook, buy, or sell meat, we can eat, cook, buy, or sell
    the sausage that the meat in part composes. We might take the sausage and combine
    it with the other composite ingredients to make a pie, thereby rolling a composite
    into a larger composite. We behave in the same way to the collection as we do
    to the parts. The Composite pattern helps us to model this relationship between
    collections and components in our code.'
