    \ 5-6 所示。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig6_HTML.jpg](img/332054_4_En_5_Fig6_HTML.jpg)\n\
    \n**图 5-6.** 一旦提取出文件名，你就可以动态生成页面标题。\n\n3.  如果你希望从文件名派生的标题部分首字母大写呢？PHP 有一个名为 `ucfirst()`\
    \ 的简洁小函数，它正好能做到这一点（`uc` 代表“大写”）。在第 2 步的代码中添加另一行，如下所示：\n\n```\n<?php\n$title =\
    \ basename($_SERVER['SCRIPT_FILENAME'], '.php');\n$title = ucfirst($title);\n\
    ```\n\n如果你是编程新手，这可能会让你感到困惑，所以让我们来看看这里发生了什么。PHP 标签之后的第一行代码获取文件名，去除末尾的 `.php`，并将其存储为\
    \ `$title`。下一行将 `$title` 的值传递给 `ucfirst()` 以将首字母大写，并将结果存回 `$title`。因此，如果文件名是 `contact.php`，`$title`\
    \ 最初为 `contact`，但在下一行结束时，它变成了 `Contact`。\n\n**提示**\n你可以将两行代码合并为一行来缩短代码，如下所示：`$title\
    \ = ucfirst(basename($_SERVER['SCRIPT_FILENAME'], '.php'));`。像这样嵌套函数时，PHP 会先处理最内层的函数，并将结果传递给外层函数。这使你的代码更短，但不太容易阅读。\n\
    \n1.  这种技术的一个缺点是文件名只能包含一个单词——至少应该如此。URL 中不允许有空格，这就是为什么一些网页设计软件或浏览器会用 `%20` 替换空格，这在\
    \ URL 中看起来丑陋且不专业。你可以通过使用下划线来解决这个问题。\n\n将 `contact.php` 的文件名更改为 `contact_us.php`。\n\
    \n2.  按如下所示修改 `title.php` 中的代码：\n\n```\n<?php\n$title = basename($_SERVER['SCRIPT_FILENAME'],\
    \ '.php');\n$title = str_replace('_', ' ', $title);\n$title = ucwords($title);\n\
    ```\n\n中间一行使用了一个名为 `str_replace()` 的函数来查找每个下划线并将其替换为空格。该函数接受三个参数：你想要替换的字符、替换字符以及你想要更改的字符串。\n\
    \n**提示**\n你也可以使用 `str_replace()` 并通过将空字符串（一对中间没有任何内容的引号）作为第二个参数来移除字符。这会将第一个参数中的字符串替换为空，从而有效地将其移除。\n\
    \n最后一行代码没有使用 `ucfirst()`，而是使用了相关的函数 `ucwords()`，该函数使每个单词的首字母大写。\n\n1.  保存 `title.php`，并在浏览器中加载重命名后的\
    \ `contact_us.php`。图 5-7 显示了结果。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig7_HTML.jpg](img/332054_4_En_5_Fig7_HTML.jpg)\n\
    \n**图 5-7.** 下划线已被移除，并且两个单词的首字母都已大写。\n\n2.  将文件名改回 `contact.php`，并在浏览器中重新加载该文件。`title.php`\
    \ 中的脚本仍然有效。没有下划线需要替换，因此 `str_replace()` 保持 `$title` 的值不变，并且 `ucwords()` 将首字母转换为大写，即使只有一个单词也是如此。\n\
    \n3.  对 `index.php`、`blog.php` 和 `gallery.php` 重复步骤 3 和 4。\n\n4.  Japan Journey\
    \ 网站的主页名为 `index.php`。如图 5-8 所示，将当前解决方案应用于此页面似乎不太合适。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig8_HTML.jpg](img/332054_4_En_5_Fig8_HTML.jpg)\n\
    \n**图 5-8.** 从 `index.php` 生成页面标题会产生不理想的结果。\n\n有两种解决方案：要么不对此类页面应用此技术，要么使用条件语句（`if`\
    \ 语句）来处理特殊情况。例如，要显示 Home 而不是 Index，请按如下所示修改 `title.php` 中的代码：\n\n```\n<?php\n\
    $title = basename($_SERVER['SCRIPT_FILENAME'], '.php');\n$title = str_replace('_',\
    \ ' ', $title);\nif ($title == 'index') {\n    $title = 'home';\n}\n$title = ucwords($title);\n\
    ```\n"
- fmt: '# PHP 条件语句与变量处理


    条件语句的第一行使用两个等号检查`$title`的值。下一行使用单个等号将新值赋给`$title`。如果页面被调用的名称不是`index.php`，则花括号内的行将被忽略，`$title`保持其原始值。


    ## 提示

    PHP 是区分大小写的，因此此解决方案仅在"index"全部为小写时有效。要进行不区分大小写的比较，请将前面代码的第四行修改为：`if (strtolower($title)
    == ''index'') {`。函数`strtolower()`将字符串转换为小写——因此得名——并常用于进行不区分大小写的比较。转换为小写不是永久性的，因为`strtolower($title)`没有赋值给变量；它仅用于进行比较。要永久更改，需要将结果赋值回变量，就像最后一行中`ucwords($title)`被赋值回`$title`一样。要将字符串转换为大写，请使用`strtoupper()`。


    1.  保存`title.php`并在浏览器中重新加载`index.php`。页面标题现在看起来更自然，如图[5-9](#332054_4_En_5_Chapter.xhtml#Fig9)所示。


    ![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig9_HTML.jpg](images/332054_4_En_5_Chapter/332054_4_En_5_Fig9_HTML.jpg)


    **图 5-9.** 条件语句将`index.php`上的标题更改为`Home`


    2.  导航回`contact.php`，您会看到页面标题仍然从页面名称正确派生。


