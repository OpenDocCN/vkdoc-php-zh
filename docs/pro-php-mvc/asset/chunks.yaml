    injection attacks. SQL injection (and often just bad data) is the number-one cause
    of application instability and security breaches.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 11 ■ TEsTing


    These problems occur, most often, when data does not conform to the correct data
    type, or attempts to perform a database query from within the body of another.
    We can avoid this by escaping the parameters we pass the database, within queries.
    That is the purpose of the escape() method.


    Next, we need to test whether the driver (connector) is capable of executing SQL
    queries, and whether if can return the correct metadata after executing those
    queries. Listing 11-9 shows how we do this.


    ***Listing 11-9.*** Executing SQL and Returning Metadata


