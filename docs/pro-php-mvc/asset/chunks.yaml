    \ \"thumbnails\"\n)\n```\n\n路由配置完成后，就可以创建（并使用）`thumbnails()` 动作，如清单 19-11 所示。\n\
    \n**清单 19-11.** `thumbnails()` 动作\n\n```php\nuse Shared\\Controller as Controller;\n\
    use Fonts\\Proxy as Proxy;\nuse Fonts\\Types as Types;\n\nclass Files extends\
    \ Controller\n{\n    public function thumbnails($id)\n    {\n        $path = APP_PATH.\"\
    /public/uploads\";\n        $file = File::first(array(\n            \"id = ?\"\
    \ => $id\n        ));\n        if ($file)\n        {\n            $width = 64;\n\
    \            $height = 64;\n            $name = $file->name;\n            $filename\
    \ = pathinfo($name, PATHINFO_FILENAME);\n            $extension = pathinfo($name,\
    \ PATHINFO_EXTENSION);\n            if ($filename && $extension)\n           \
    \ {\n                $thumbnail = \"{$filename}-{$width}x{$height}.{$extension}\"\
    ;\n                if (!file_exists(\"{$path}/{$thumbnail}\"))\n             \
    \   {\n                    $imagine = new Imagine\\Gd\\Imagine();\n          \
    \          $size = new Imagine\\Image\\Box($width, $height);\n               \
    \     $mode = Imagine\\Image\\ImageInterface::THUMBNAIL_OUTBOUND;\n          \
    \          $imagine\n                        ->open(\"{$path}/{$name}\")\n   \
    \                     ->thumbnail($size, $mode)\n                        ->save(\"\
    {$path}/{$thumbnail}\");\n                }\n                header(\"Location:\
    \ /uploads/{$thumbnail}\");\n                exit();\n            }\n        \
    \    header(\"Location: /uploads/{$name}\");\n            exit();\n        }\n\
    \    }\n}\n```\n\n`thumbnails()` 动作首先尝试查找与提供的 `$id` 匹配的 `File` 数据库行。如果没有找到匹配行，则不返回缩略图。接着，它将\
    \ `$file->name` 拆分为 `$filename` 和 `$extension`。这是为了构建缩略图文件名。\n\n如果缩略图已存在，浏览器将直接重定向到该文件，避免执行后续代码。\n\
    \n如果缩略图不存在，我们创建一个新的 `Imagine\\Gd\\Imagine` 实例，并使用它：a) 打开上传的照片，b) 将照片调整为 `$width`\
    \ 和 `$height` 大小的缩略图，c) 保存缩略图文件。\n\n**注意：** 你可以通过以下网址获取更多关于如何使用这些方法/属性的详细信息：\n\
    [`imagine.readthedocs.org/en/latest/index.html`](http://imagine.readthedocs.org/en/latest/index.html)\n\
    \n唯一剩下的工作就是修改 `search.html` 和 `profile.html` 模板，以使用新的缩略图文件。清单 19-12 展示了我们如何实现这一点。\n\
    \n**清单 19-12.** `application/views/users/profile.html`（摘录）\n\n```html\n{script\
    \ $file = $user->file}\n{if $file} <img src=\"/thumbnails/{echo $file->id}\" />{/if}\n\
    ```\n\n现在，我们知道了如何构建自己的可复用应用程序库，以及如何将第三方库集成到我们的应用程序中。\n\n## 观察者模式\n\n在第 1 章中，我们了解了框架中使用的一些设计模式。在本章中，我们将看到另一个模式的运作，特别是观察者模式。观察者模式的简要总结是：接收者等待某些状态发生变化（事件），而发送者通知接收者（发出事件）状态的变化。\n\
    \n## 同步性\n\n现代编程语言（及平台）之间存在许多差异。最近备受关注的一个区别是，现代平台对代码的同步执行（有时是线程式）和异步执行（有时是多线程或非线程式）所做的区分。\n\
    \n同步语言/平台是指代码以线性方式执行的语言/平台，每条语句在执行下一条语句之前必须完成。请参考清单 19-13 中的示例。\n"
- fmt: "# Listing 19-13: Synchronous Apache/PHP Execution\n\n```\necho \"opening file...\"\
    ;\n\n$contents = file_get_contents(\"/path/to/some/file.txt\");\n\necho \"got\
    \ contents: \" . $contents;\n```\n\nThe first statement will be executed almost\
    \ immediately. The implications are clear and simple: output the contents of a\
    \ string. The second statement, on the other hand, is a little trickier. It requires\
    \ that the server open a file and assign the contents of the file to a variable.\
    \ In programming terms, this is referred to as a *bottleneck*. The server must\
    \ halt execution while it locates the file. It must open the file and read the\
    \ contents before execution can resume.\n\nThis has two implications:\n- The second\
    \ `echo` statement does not execute until the second is complete.\n- All code\
    \ execution, in PHP/Apache, will behave similarly.\n\nNow, let’s consider asynchronous\
    \ languages/platforms such as JavaScript/Node.JS. Asynchronous languages/platforms\
    \ are those in which code is also executed in a linear manner, but where execution\
    \ can be suspended (to be continued at a later time, after a state change). In\
    \ other words, the server will continue execution until a point at which it reaches\
    \ a potential bottleneck. It will move on to other processing until it needs to\
    \ return to the current “request.” Consider the example shown in Listing 19-14.\n\
    \n## Listing 19-14: Asynchronous Node.JS/JavaScript Execution\n\n```\nvar fs =\
    \ require(\"fs\");\n\nconsole.log(\"opening file...\");\n\nfs.readFile(\"/path/to/some/file.txt\"\
    , function(error, data)\n{\n    if (!error)\n    {\n        console.log(\"got\
    \ contents: \" + data);\n    }\n});\n```\n\nThis example does basically the same\
    \ thing as the previous one, but with one major difference. We begin by outputting\
    \ the contents of a string, and even request that the server read the contents\
    \ of a file. We also provide a function (or callback) that the server should execute\
    \ after it resumes. The second output statement (`console.log`) still waits for\
    \ the file to be read, but execution is not halted while the server fetches the\
    \ file. This means the server can continue to process other requests until this\
    \ one can resume (after the file is read).\n\n**Note**: I am very careful to specify\
    \ not only the language but also the “server” on which these languages run. This\
    \ is because other “servers” exist that can blur the line between synchronous/asynchronous.\
    \ There is `nginx` (for PHP) and it is even possible to create JavaScript (at\
    \ least on the client side) that blocks/halts execution. The important thing is\
    \ to understand the difference.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 19: Extending\n\nHow does this understanding help us? For a start,\
    \ it will help to explain why things freeze while PHP is executing blocking code.\
    \ Blocking code can be anything as simple as a loop or anything as complicated\
    \ as connecting to a TCP server. While it is possible to simulate asynchronous\
    \ execution of PHP code, it will always be synchronous, no matter how swiftly\
    \ executed or how many requests are served in parallel.\n\nIn languages like JavaScript,\
    \ this is overcome by passing functions (or callbacks) that will be executed when\
    \ the intensive operations are completed. PHP 5.3 also supports callbacks, but\
    \ they aren’t nearly as useful, considering the language itself is not built to\
    \ be nonblocking.\n\nSo if callbacks aren’t useful to us as a means of avoiding\
    \ blocking code, then why should we use them at all?\n\nOne remaining use is to\
    \ observe state changes, and to notify listeners of these events. You can imagine\
    \ how this might be useful. Take a look at the demonstration in Listing 19-15.\n\
    \n## Listing 19-15: Listening for New States\n\n```\naddEvent(\"the.state.changed\"\
    , function($message) {\n    echo \"state changed to: \" . $message;\n});\n\nfireEvent(\"\
    the.state.changed\", array(\"new state\"));\nfireEvent(\"the.state.changed\",\
    \ array(\"another new state\"));\n```\n\nWe are dealing with a big framework,\
    \ and possibly even a big application. There might be times when it is essential\
    \ that we know when states change, and this is a perfect opportunity for us to\
    \ use the Observer pattern.\n\n```\nCode\n```"
  raw: '***Listing 19-13.*** Synchronous Apache/PHP Execution


    echo "opening file...";


    $contents = file_get_contents("/path/to/some/file.txt");


    echo "got contents: " . $contents;


    The first statement will be executed almost immediately. The implications are
    clear and simple: output the contents of a string. The second statement, on the
    other hand, is a little trickier. It requires that the server open a file and
    assign the contents of the file to a variable. In programming terms, this is referred
    to as a *bottleneck*. The server must halt execution while it locates the file.
    It must open the file and read the contents before execution can resume.


    This has two implications:


    • The second echo statement does not execute until the second is complete.


    • All code execution, in PHP/Apache, will behave similarly.


    Now, let’s consider asynchronous languages/platforms such as JavaScript/Node.JS.
    Asynchronous languages/platforms are those in which code is also executed in a
    linear manner, but where execution can be suspended (to be continued at a later
    time, after a state change). In other words, the server will continue execution
    until a point at which it reaches a potential bottleneck. It will move on to other
    processing until it needs to return to the current “request.” Consider the example
    shown in Listing 19-14.


    ***Listing 19-14.*** Asynchronous Node.JS/JavaScript Execution


    var fs = require("fs");


    console.log("opening file...");


    fs.readFile("/path/to/some/file.txt", function(error, data)


    {


    if (!error)


    {


    console.log("got contents: " + data);


    }


    });


    This example does basically the same thing as the previous one, but with one major
    difference. We begin by outputting the contents of a string, and even request
    that the server read the contents of a file. We also provide a function (or callback)
    that the server should execute after it resumes. The second output statement (console.log)
    still waits for the file to be read, but execution is not halted while the server
    fetches the file. This means the server can continue to process other requests
    until this one can resume (after the file is read).


    ■ **Note** i am very careful to specify not only the language but also the “server”
    on which these languages run. This is because other “servers” exist that can blur
    the line between synchronous/asynchronous. There is nginx (for PHP) and it is
    even possible to create JavaScript (at least on the client side) that blocks/halts
    execution. The important thing is to understand the difference.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 19 ■ ExTEnding


    How does this understanding help us? For a start, it will help to explain why
    things freeze while PHP is executing blocking code. Blocking code can be anything
    as simple as a loop or anything as complicated as connecting to a TCP server.
    While it is possible to simulate asynchronous execution of PHP code, it will always
    be synchronous, no matter how swiftly executed or how many requests are served
    in parallel.


    In languages like JavaScript, this is overcome by passing functions (or callbacks)
    that will be executed when the intensive operations are completed. PHP 5.3 also
    supports callbacks, but they aren’t nearly as useful, considering the language
    itself is not built to be nonblocking.


    So if callbacks aren’t useful to us as a means of avoiding blocking code, then
    why should we use them at all?


    One remaining use is to observe state changes, and to notify listeners of these
    events. You can imagine how this might be useful. Take a look at the demonstration
    in Listing 19-15.


    ***Listing 19-15.*** Listening for New States


    addEvent("the.state.changed", function($message) {


    echo "state changed to: " . $message;


    });


    fireEvent("the.state.changed", array("new state"));


    fireEvent("the.state.changed", array("another new state"));


    We are dealing with a big framework, and possibly even a big application. There
    might be times when it is essential that we know when states change, and this
    is a perfect opportunity for us to use the Observer pattern.


