- fmt: '# Managing Customer Details


    So far in this book you’ve built a basic, but functional site, and integrated
    it with `PayPal` for accepting payments and confirming orders. In this section
    of the book, you’ll take things a little further. By cutting out `PayPal` from
    your ordering process, you can obtain much better control—as well as reduce overhead
    costs. It isn’t as complicated as you might think, but we do have to be careful
    to do things right.


    In this chapter, we’ll be laying the groundwork for this by implementing a customer
    account system.


    To make e-commerce sites more user friendly, you usually store details such as
    credit card numbers in a database, so that users don’t have to retype this information
    each time they place an order. The customer account system you’ll implement will
    store this information and include all of the web pages required for the entry
    of such details.


    As well as implementing these web pages, we’ll need to take several other factors
    into account. First, simply placing credit card numbers, expiry dates, and other
    important information into a database in plain text isn’t ideal because it raises
    the possibility that this data could be stolen should the server be compromised.
    This could occur remotely or be perpetrated by individuals within our organization.
    In addition to enforcing a prohibitively restrictive access policy to such data,
    it can be a lot easier simply to encrypt sensitive information and retrieve it
    programmatically when required. We’ll create a security library to ease this functionality.


    Secondly, secure communications are important because you’ll be capturing sensitive
    information such as credit card details via the web. We can’t just put a form
    up for people to access via `HTTP` and allow them to send it to us because the
    information could be intercepted. Instead, we’ll use `SSL` over `HTTPS` connections.
    You’ll take the `HatShop` application to the point where you can move on and implement
    your own back-end order pipeline in the next chapter.


    In this chapter, you’ll learn how to:


    - Store customer accounts

    - Implement the security classes

    - Add customer accounts functionality to `HatShop`

    - Create the checkout page


    ## Storing Customer Accounts


    You can handle customer account functionality in web sites in many ways. In general,
    however, the methods share the following features:


    - Customers log in to access secured areas of the web site.

    - Once logged in, the web application remembers the customer until the customer
    logs out (either manually via a Log Out link, or automatically if the session
    times out or a server error occurs).

    - All secure pages in a web application need to check whether a customer is logged
    in before allowing access.


    First, let’s look at the general implementation details for the `HatShop` e-commerce
    site.


    ### The HatShop Customer Account Scheme


    One simple way to determine whether a customer is logged in is to store the customer
    ID in the session state. You can then verify whether a value is present at the
    start of the secured pages, and warn the user if not. The login form itself can
    then authenticate the user and store a value in the session state if successful,
    ready for later retrieval. To log a user out, you simply remove the ID from the
    session state.


    To log in, a customer needs to supply a username (we’ll use the customer’s email
    address here because it is guaranteed to be unique) and a password. Sending this
    information over the Internet is a sensitive issue because third parties can eavesdrop
    and capture it. Later in this chapter, we’ll look at how to enable secure communications
    over the Internet. For now, though, we’ll concentrate on the authentication side
    of things, which is unaffected by the type of connection used to transmit the
    email address and password of the customer.'
