    Solution


    The simplest form of a function is defined with the keyword function followed
    by a function name and a set of parentheses and a set of curly brackets for the
    function definition.


    function DeleteRows() {}


    Function names are case insensitive. A function that is declared as MyFunc() can
    be called as myfunc(); or MYFUNC(); but it is recommended to use the same case
    as used in the function definition. To make this function do something we need
