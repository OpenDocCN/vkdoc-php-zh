    Privacy) family of software (for more information, see http://www.pgp.com) and
    GnuPG (http://www.gnupg.org).


    Two of the more commonly used asymmetric algorithms are DSA (Digital Signature
    Algorithm) and RSA (Rivest-Shamir-Adleman, from the names of its inventors, Ronald
    Rivest, Adi Shamir, and Leonard Adleman). Of these, DSA can only be used to “sign”
    data so that its authenticity can be verified, whereas RSA is more versatile (although
    slower than DSA when used to generate digital signatures). DSA is the current
    standard for digital authentication used by the U.S. government. Both the DSA
    and the RSA asymmetric algorithms are implemented in the PGP family of software
    (PGP and GnuPG).


    Some popular symmetric algorithms found in the mcrypt library are DES (Data Encryption
    Standard), Triple DES (3DES), RC2 (Ron’s Code, or Rivest’s Cipher, depending on
    who you ask, also from Ronald Rivest), and Rijndael (from the names of its inventors,
    Joan Daemen and Vincent Rijmen).


    **DES AND RIJNDAEL**


    DES has been the standard for some time now, although this is gradually changing.
    It uses a 64-bit key, however, in practice only 56 of these bits are used (8 bits
    are “parity” bits), which are not strong enough to avoid being broken using today’s
    computers.


    Both Triple DES and RC2 are variations of DES. Triple DES effectively encrypts
    data using three separate DES encryptions with three keys totaling 168 bits when
    parity bits are subtracted. The RC2 variant can have key lengths up to 128 bits
    (longer keys are also possible using RC3, RC4, and so on), so it can be made weaker
    or stronger than DES depending on the key size.


    Rijndael is a completely separate encryption method and has now been accepted
    as the new AES


    (Advanced Encryption Standard) standard (several competing algorithms were considered
    before Rijndael was chosen). This standard is intended to replace DES and is gradually
    becoming the most used (and secure) symmetric encryption algorithm.


    The tasks associated with encrypting and decrypting data are a little more involved
    than hashing. The mcrypt functions are optimized to work with raw data, so you
    have some work to do with data conversion. You also have to define both a key
    and an initialization vector (IV) to perform encryption and decryption. The IV
    is required due to the nature of encryption: the


