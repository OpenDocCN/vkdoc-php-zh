  \n# 第 11 章 测试\n\n到目前为止，我们已经编写了大量代码。这是一个成就，但如果我们的代码需要更改，它很快就会变成一种负担。对于像完整的 MVC 框架这样复杂的事物，您可以预期会有大量相互关联的代码。代码之间的关联性越强，即使我们的框架通过\
  \ MVC 实现了分离，代码更改破坏其他代码的可能性就越大。\n\n想象一下，我们想要向 `Model` 类添加几个 ORM 方法。它们可能需要更改我们已经创建的方法，并可能微妙地改变已建立的功能。通常，这会导致应用程序中出现意外的故障。\n\
  \n或者想象一下，我们需要添加额外的配置或缓存驱动。理想的做法是，能够以一致的方式比较现有驱动和新驱动的功能，并且这种方式可以在未来添加更多驱动时重复使用。\n\
  \n解决方案是提供一组可重用的测试，可以定期运行这些测试，以确保我们的类继续以可预测的方式运行。\n\n### 目标\n\n*   我们需要构建一个简单的测试类。\n\
  *   我们需要设置覆盖我们已经创建的类的测试。\n\n### 单元测试\n\n单元测试是将一个大系统分解为可以与系统其余部分隔离测试的小部分的过程。测试一个完整的用户驱动的\
  \ Web 应用程序很困难，但测试单个数据库命令或评估单个模板标签则很容易。\n\n单元测试，顾名思义，是一项永无止境的任务。编写的代码越多，就应该编写越多的单元测试。当你发现某个功能尚未被测试覆盖时，你应该创建该测试用例以便覆盖它。\n\
  \n### 测试类\n\n在我们开始为代码库编写测试之前，需要创建一个简单的类来帮助组织测试并评估结果。清单 11-1 展示了这个 `Test` 类。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 11 章 测试\n\n***清单 11-1.***\
  \ `Test` 类\n\n```\nnamespace Framework\n{\n\nclass Test\n{\n\nprivate static $_tests\
  \ = array();\n\npublic static function add($callback, $title = \"Unnamed Test\"\
  , $set = \"General\")\n{\n\nself::$_tests[] = array(\n\"set\" => $set,\n\"title\"\
  \ => $title,\n\"callback\" => $callback\n);\n\n}\n\npublic static function run($before\
  \ = null, $after = null)\n{\n\nif ($before)\n{\n\n$before($this->_tests);\n\n}\n\
  ```\n\n```\n\n\n```php\n$passed = array();\n\n$failed = array();\n\n$exceptions\
  \ = array();\n\nforeach (self::$_tests as $test) {\n    try {\n        $result =\
  \ call_user_func($test[\"callback\"]);\n\n        if ($result) {\n            $passed[]\
  \ = array(\n                \"set\"   => $test[\"set\"],\n                \"title\"\
  \ => $test[\"title\"]\n            );\n        } else {\n            $failed[] =\
  \ array(\n                \"set\"   => $test[\"set\"],\n                \"title\"\
  \ => $test[\"title\"]\n            );\n        }\n    } catch (\\Exception $e) {\n\
  \        $exceptions[] = array(\n            \"set\"   => $test[\"set\"],\n    \
  \        \"title\" => $test[\"title\"],\n            \"type\"  => get_class($e)\n\
  \        );\n    }\n}\n\nif ($after) {\n    $after($this->_tests);\n}\n\nreturn\
  \ array(\n    \"passed\"     => $passed,\n    \"failed\"     => $failed,\n    \"\
  exceptions\" => $exceptions\n);\n```\n\n这个类就是我们编写单元测试所需的一切。`add()` 方法接受一个 `$callback`（回调函数）、一个\
  \ `$title`（描述该测试）以及一个 `$set`（描述该测试所属的测试组）。这些测试存储在一个内部的 `$_tests` 数组中。\n\n`run()`\
  \ 方法会遍历这些测试并执行它们。如果测试通过，它会被添加到一个已通过测试的数组中。如果失败，它则会被添加到一个失败测试的数组中。如果在任一测试过程中发生了异常，该测试的标题/组/异常类型将被添加到一个异常数组中。当\
  \ `run()` 方法结束时，会返回这三个数组。`$before` 和 `$after` 参数指向可选提供的回调函数，它们将分别在测试之前和之后运行。\n\n\
  ### 缓存\n\n我们将首先测试 Cache 类。我们需要测试工厂功能，确保返回的是 `Memcached` 缓存驱动的一个有效实例。我们需要测试该驱动能否连接并断开与\
  \ Memcached 服务器的连接。\n\n如果可以，我们将检查该驱动能否成功将数据发送到服务器，然后再将其读取回来。\n\n我们还需要测试数据是否会在一定时间后过期，最后测试该驱动能否从\
  \ Memcached 服务器擦除之前存储的数据。\n\n### 测试覆盖范围\n\n我们应该创建覆盖以下需求的测试：\n\n-   `Cache` 工厂类可以被创建。\n\
