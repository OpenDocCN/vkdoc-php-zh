  \ |\n| `shell` | 依赖注入 |\n\n## 本章问题与项目\n\n### 选择题\n\n1. 以下哪项描述了类型转换？\n   1. 在 PHP\
  \ 中很少需要。\n   2. 它存在于大多数语言中。\n   3. 序列化数据需要它。\n   4. 以上所有选项。\n\n2. 以下哪项描述了关联数组？\n\
  \   1. 它具有键值关系（key->value）。\n   2. 它使用数字下标。\n   3. 它没有索引。\n   4. A 和 B。\n\n3. 以下哪项是换行符？\n\
  \   1. &\n   2. .\n   3. ;\n   4. 以上都不是\n\n4. 以下哪项描述了 JSON 数据？\n   1. 它的格式与数组类似。\n\
  \   2. 它不能仅与 JavaScript 一起使用。\n   3. 它比使用 XML 数据需要更多的编码。\n   4. 它比 XML 数据更安全。\n\n\
  5. 以下哪项描述了`unlink`？\n   1. 它可以用来释放数组的一个参数。\n   2. 它可以用来删除文件或目录。\n   3. 它可以用来拆分数组。\n\
  \   4. 以上都不是。\n\n6. 以下哪项描述了多态性？\n   1. 包含和保护应用程序的容器\n   2. 将多种数据类型传递给相同方法签名的能力\n\
  \   3. 使用父类方法和属性的能力\n   4. 以上都不是\n\n7. 以下哪项描述了`rand`？\n   1. 它可以用来生成随机数。\n   2.\
