    **catalog_get_department_details**


    The catalog_get_category_details function returns the name and description for
    a given department whose ID is received as parameter. This is needed when the
    user selects a department in the product catalog, and the database must be queried
    to find out the name and the description of the particular department.


    The return data is packaged into an object of the type department_details. Next
    is the SQL code that creates the catalog_get_department_details function and the
    department_details type:


    -- Create department_details type


    CREATE TYPE department_details AS


    (


    name VARCHAR(50),


    description VARCHAR(1000)


    );


    -- Create catalog_get_department_details function


    CREATE FUNCTION catalog_get_department_details(INTEGER) RETURNS department_details
    LANGUAGE plpgsql AS $$


    DECLARE


    inDepartmentId ALIAS FOR $1;


    outDepartmentDetailsRow department_details;


    BEGIN


    SELECT INTO outDepartmentDetailsRow


    name, description


    FROM department


    WHERE department_id = inDepartmentId;


    RETURN outDepartmentDetailsRow;


    END;


    $$;


    The WHERE clause (WHERE department_id = inDepartmentId) is used to request the
    details of a specific department.


