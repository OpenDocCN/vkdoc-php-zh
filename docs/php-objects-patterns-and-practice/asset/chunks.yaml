    # 大量输出

    ```

    $ vagrant ssh

    $ mysql -uvagrant -pvagrant poppch20_vagrant

    欢迎使用 MySQL 监视器。命令以 ; 或 \g 结束。

    您的 MySQL 连接 ID 是 9

    服务器版本：5.1.73 来源发行版

    版权所有 (c) 2000, 2013, Oracle 和/或其关联公司。保留所有权利。

    Oracle 是 Oracle 公司和/或其关联公司的注册商标。其他名称可能是其各自所有者的商标。

    输入 ''help;'' 或 ''\h'' 获取帮助。输入 ''\c'' 清除当前输入语句。

    mysql>

    ```


    我们现在已经有一个正在运行的数据库和一个 Web 服务器。是时候看看代码如何运行了。


    ## 配置主机名


    我们已经多次登录到新的类生产开发环境，因此网络方面基本已经就绪。虽然我已经配置了 Web 服务器，但尚未使用它。这是因为我们仍然需要为虚拟机配置一个主机名。因此，让我们在
    `Vagrantfile` 中添加一个：


    ```

    config.vm.hostname = "poppch20.vagrant.internal"

    config.vm.network :private_network, ip: "192.168.33.148"

    ```


    我虚构了一个主机名，并使用 `config.vm.hostname` 指令将其添加。我还使用 `config.vm.network` 配置了私有网络，并分配了一个静态
    IP 地址。你应该为此使用私有地址空间——一个以 `192.168` 开头且未使用的 IP 地址应该可以正常工作。


    由于这是一个虚构的主机名，我们必须配置操作系统来处理名称解析。在类 Unix 系统上，这意味着要编辑系统文件 `/etc/hosts`。在这种情况下，我会添加以下内容：


    ```

    192.168.33.148  poppch20.vagrant.internal

    ```


    这不算太麻烦，但我们的目标是为团队实现一键安装，因此最好能有一种方法来自动化这一步骤。幸运的是，Vagrant 支持插件，而 `hostmanager` 插件恰好满足我们的需求。


    你可以使用以下命令查看已安装的插件：


    ```

    $ vagrant plugin list

    vagrant-login (1.0.1, 系统)

    vagrant-share (1.1.5, 系统)

    ```


    要添加插件，只需运行 `vagrant plugin install` 命令：


    ```

    $ vagrant plugin install vagrant-hostmanager

    正在安装 ''vagrant-hostmanager'' 插件。这可能需要几分钟...

    已安装插件 ''vagrant-hostmanager (1.8.2)''！

    ```


    然后，你可以显式地告诉插件更新 `/etc/hosts`，如下所示：


    ```

    $ vagrant hostmanager

    [默认] 正在更新 /etc/hosts 文件...

    ```


    为了使这个过程对团队成员自动生效，我们应在 `Vagrantfile` 中显式启用 hostmanager：


    ```

    config.hostmanager.enabled = true

    ```


    完成配置更改后，我们应该运行 `vagrant reload` 来应用它们。然后就是见证真相的时刻！我们的系统能在浏览器中运行吗？如图 20-2 所示，系统应该能正常工作。


    ![A314621_5_En_20_Fig2_HTML.jpg](img/A314621_5_En_20_Fig2_HTML.jpg)


    图 20-2. 在 Vagrant 盒子上访问已配置的系统


    ## 总结


    因此，我们从零开始构建了一个完全可用的开发环境。考虑到这花费了一整章的篇幅，如果说 Vagrant 快速又简单，似乎有点自欺欺人。对此有两个答案。首先，一旦你这样做过几次，搭建另一个
    Vagrant 环境就会变得非常简单——肯定比手动管理多个依赖栈要容易得多。


    但更重要的是，真正的速度和效率提升并不在于设置 Vagrant 的那个人。想象一下，一位新开发人员加入你的项目，预计需要花费数天时间进行下载、编辑配置文件以及翻阅
    Wiki。想象一下告诉她：“安装 Vagrant 和 VirtualBox。检出代码。从基础设施目录运行 `vagrant up`。”然后就可以了！将其与你经历或听说过的某些痛苦的上手流程进行比较。


    当然，本章仅触及了皮毛。当你需要配置 Vagrant 为你做更多事情时，官方站点 [`www.vagrantup.com`](https://www.vagrantup.com)
    将为你提供所需的所有支持。


    表 20-1 快速回顾了我们在本章中遇到的 Vagrant 命令。


    表 20-1. 一些 Vagrant 命令


    | 命令 | 描述 |

    | --- | --- |

    | `vagrant up` | 启动虚拟机，如果尚未配置则进行配置 |

    | `vagrant reload` | 关闭系统并重新启动 |

    | `vagrant plugin list` | 列出已安装的插件 |

    | `vagrant plugin install <plugin-name>` | 安装一个插件 |

    | `vagrant provision` | 再次运行配置步骤（如果你更新了配置脚本，这会很有用） |

    | `vagrant halt` | 正常关闭虚拟机 |

    | `vagrant init` | 创建一个新的 `Vagrantfile` 文档 |

    | `vagrant destroy` | 销毁虚拟机。别担心，你总是可以再次运行 `vagrant up` 重新开始！ |


    ## 小结


    在本章中，我介绍了 Vagrant，这个应用程序能让你在不牺牲创作工具的情况下，在类似生产的开发环境中工作。我涵盖了安装、发行版选择以及初始设置——包括挂载你的开发目录。当我们有一个可以操作的虚拟机后，我接着讲解了配置过程——包括包安装以及数据库和
    Web 服务器配置。最后，我探讨了主机名管理，并向你展示了我们的系统在浏览器中运行的情况！


    ## 21. 持续集成


    在前几章中，你看到了大量旨在支持良好管理项目的工具。单元测试、文档编写、构建和版本控制都非常有用。但是工具，尤其是测试，有时会令人烦恼。


    即使你的测试只需要几分钟就能运行完，你也常常因为过于专注于编码而不愿去管它们。不仅如此，你还有客户和同事在等待新功能。继续编码的诱惑始终存在。但缺陷在刚产生时修复要容易得多。这是因为你更有可能知道是哪个更改导致了问题，并且能更好地想出快速修复方案。


    在本章中，我将介绍持续集成，这是一种自动化测试和构建的做法，并将你最近几章遇到的各种工具和技术整合在一起。


    本章将涵盖以下主题：


    - 定义持续集成

    - 为 CI 准备项目

    - 了解 Jenkins：一个 CI 服务器

    - 使用专门插件为 PHP 项目定制 Jenkins


    ### 什么是持续集成？


    在过去糟糕的日子里，集成是你完成有趣工作后才做的事情。它也是你意识到还有多少工作要做的阶段。集成是将项目的所有部分打包成可以发布和部署的包的过程。这不光彩，而且实际上很难。


    集成也与质量保证紧密相关。如果产品不适合其用途，你就不能发布它。这意味着需要测试。大量的测试。如果你在集成阶段之前没有进行多少测试，那可能也意味着会出现令人讨厌的意外。很多意外。


    你从第 18 章知道，尽早并经常测试是最佳实践。你从第 15 章和 19 章知道，应该从一开始就考虑部署进行设计。我们大多数人都接受这是理想状态，但现实中又有多少次能真正做到呢？

    '
- fmt: '如果你实践测试导向开发（我更喜欢用这个术语而非测试先行开发，因为它更好地反映了我所见过的多数优秀项目的实际情况），那么编写测试并不像你想象的那么困难。毕竟，你在编码时本来就要编写测试。每当你开发一个组件，你都会创建代码片段，也许是在类文件的底部，这些代码片段实例化对象并调用其方法。如果你收集起这些在开发过程中用来测试组件的、原本会被丢弃的代码片段，你就拥有了一个测试用例。将它们放入一个类中，然后添加到你的测试套件中即可。


    奇怪的是，人们往往回避的是运行测试。随着时间的推移，测试运行时间越来越长。与已知问题相关的失败逐渐出现，使得诊断新问题变得困难。此外，你怀疑是别人提交的代码破坏了测试，而你没有时间去处理别人的错误而耽误自己的工作。最好只运行与你工作相关的几个测试，而不是运行整个测试套件。


    不运行测试，因此也无法修复测试可能揭示的问题，这使得问题越来越难以解决。查找错误的最大开销通常是诊断，而不是修复。很多时候，修复只需几分钟，而找出测试失败的原因却可能需要几个小时。然而，如果测试在提交后的几分钟或几小时内就失败了，你更有可能知道问题出在哪里。


    软件构建也存在类似的问题。如果你不经常安装你的项目，你可能会发现，尽管一切在你的开发机上运行正常，但安装后的实例却会因一个模糊的错误信息而崩溃。两次构建之间的时间间隔越长，失败的原因对你来说就可能越模糊。


    通常是一些简单的问题：未声明对系统上某个库的依赖，或者你忘记检入的一些类文件。如果你在场，这些问题很容易修复。但如果构建失败发生在你外出时呢？负责构建和发布项目的团队成员，无论运气多差，都不会了解你的设置，也无法轻易访问那些缺失的文件。


    集成问题会随着项目中参与的人数增加而放大。你可能喜欢并尊重团队中的所有成员，但我们都清楚，他们不运行测试的可能性比你大得多。然后他们在周五下午4点提交了一周的工作成果，就在你正要宣布项目可以发布的时候。


    持续集成（CI）通过自动化构建和测试过程，减少了其中一些问题。


    CI 既是一套实践，也是一套工具。作为一种实践，它要求频繁提交项目代码（至少每天一次）。每次提交后，都应该运行测试并构建任何包。你已经看到了一些 CI 所需的工具，特别是
    `PHPUnit` 和 `Phing`。然而，仅有单个工具是不够的。需要一个更高级别的系统来协调和自动化整个过程。


    如果没有这个更高级别的系统，即 CI 服务器，CI 实践很可能就会屈从于我们跳过繁琐工作的自然倾向。毕竟，我们更愿意编写代码。


    拥有这样的系统能带来明显的好处。首先，你的项目会频繁地构建和测试。这是 CI 的最终目标和好处。而由于它是自动化的，还增加了另外两个维度。测试和构建发生在与开发不同的线程中。它在后台运行，不需要你停止工作来运行测试。此外，与测试一样，CI
    能鼓励良好的设计。为了能在远程位置自动安装，你从一开始就不得不考虑安装的便利性。


    我不知道有多少次遇到这样的项目，其安装过程是只有少数开发人员才知道的秘密。“你没设置 URL 重写？”一位老手带着几乎不加掩饰的轻蔑问道。“说真的，重写规则在
    Wiki 里，你知道吧。把它们粘贴到 Apache 配置文件中就行了。”用 CI 的思路进行开发意味着让系统更易于测试和安装。这可能意味着前期要做更多工作，但会让我们的后续工作更轻松。轻松得多。


    所以，首先，我将打下一些昂贵的基础。事实上，你会发现，在接下来的大部分章节中，你已经遇到了这些准备步骤。


    ## 为项目准备 CI


    首先，当然，我需要一个可以持续集成的项目。我是个懒人，所以我将寻找一些已经编写了测试的代码。最明显的候选者是我在[第18章](#A314621_5_En_18_Chapter.html)中为说明
    `PHPUnit` 而创建的项目。我将它命名为 `userthing`，因为它是一个东西，里面有一个 `User` 对象。


    首先，这是我项目目录的分解结构：


    ```

    $ find src/ test/

    src/

    src/persist

    src/persist/UserStore.php

    src/util

    src/util/Validator.php

    src/domain

    src/domain/User.php

    test/

    test/persist

    test/persist/UserStoreTest.php

    test/util

    test/util/ValidatorTest.php

    ```


    如你所见，我稍微整理了一下结构，添加了一些包目录。在代码中，我通过使用命名空间来支持包结构。


    现在我已经有了一个项目，应该将其添加到版本控制系统中。


    ## CI 与版本控制


    版本控制对于 CI 来说是必不可少的。CI 系统需要能够在不需人工干预的情况下获取项目的最新版本（至少，一切设置好之后是这样）。


    对于这个例子，我将使用我在 BitBucket 上设置的一个仓库。我将配置本地开发机上的代码，添加并提交，然后推送到远程服务器：


    ```

    $ cd path/to/userthing

    $ git init

    $ git remote add origin git@bitbucket.org:getinstance/userthing.git

    $ git add build.xml composer.json src/ test/

    $ git commit -m ''initial commit''

    $ git push -u origin master

    ```


    我导航到我的开发目录并初始化了它。然后我添加了 `origin` 远程仓库，并将代码推送过去。我喜欢通过执行一次全新的克隆来确认一切正常：


    ```

    $ git clone git@bitbucket.org:getinstance/userthing.git

    Cloning into ''userthing''...

    X11 forwarding request failed on channel 0

    remote: Counting objects: 16, done.

    remote: Compressing objects: 100% (11/11), done.

    remote: Total 16 (delta 0), reused 0 (delta 0)

    Receiving objects: 100% (16/16), done.

    ```


    检查连接...完成。现在，我有一个 `userthing` 仓库和一个本地克隆。是时候自动化构建和测试了。


    ## Phing


    我们在[第19章](#A314621_5_En_19_Chapter.html)中遇到过 `Phing`。以下是安装该工具的一种方法：


    ```

    $ sudo pear channel-discover pear.phing.info

    $ sudo pear install phing/phing

    ```


    不过，我将使用 `Composer`。这是我的 `composer.json` 文件中的 `require-dev` 指令：


    ```

    "require-dev": {

    "phing/phing": "2.*"

    }

    ```


    我将使用这个重要的构建工具作为我项目 CI 环境的粘合剂，所以我将在打算用于测试的服务器上运行此安装（或者，你当然可以尝试使用 `Vagrant` 和 `VirtualBox`
    在虚拟服务器上进行测试）。我将定义用于构建和测试代码，以及运行你将在本章中遇到的各种其他质量保证工具的目标。


    > **注意**

    >

    > 在安装包时，请务必检查 `PEAR` 的输出。你可能会遇到错误消息，提示你在安装目标之前需要获取依赖项。`pear` 应用程序很有帮助，会准确地告诉你需要做什么来安装依赖项，但如果你不检查应用程序的命令行输出，很容易忽略还需要你做更多工作这一事实。


    让我们构建一个示例任务：'
  raw: 'If you practice test-oriented development (a term I prefer to test-first

    development, because it better reflects the reality of most good

    projects I’ve seen), then the writing of tests is less hard than you

    might think. After all, you write tests as you code anyway. Every time

    you develop a component, you create code fragments, perhaps at the

    bottom of the class file, that instantiate objects and call their

    methods. If you gather up those throwaway scraps of code, written to put

    your component through its paces during development, you’ve got yourself

    a test case. Stick them into a class and add them to your suite.


    Oddly, it’s often the running of

    tests that people avoid. Over time, tests take longer to run. Failures

    related to known issues creep in, making it hard to diagnose new

    problems. Also, you suspect someone else committed code that broke the

    tests, and you don’t have time to hold up your own work while you fix

    issues that are someone else’s fault. Better to run a couple of tests

    related to your work than the whole suite.


    Failing to run tests, and therefore to fix the problems that they could

    reveal, makes issues harder and harder to address. The biggest overhead

    in hunting for bugs is usually the diagnosis and not the cure. Very

    often, a fix can be applied in a matter of minutes, set against perhaps

    hours searching for the reason a test failed. If a test fails within

    minutes or hours of a commit, however, you’re more likely to know where

    to look for the problem.


    Software build suffers from a similar problem. If you don’t install your

    project often, you’re likely to find that, although everything runs fine

    on your development box, an installed instance falls over with an

    obscure error message. The longer you’ve gone between builds, the more

    obscure the reason for the failure will likely be to you.


    It’s often something simple: an undeclared dependency upon a library on

    your system, or some class files you failed to check in. These are easy

    to fix if you’re on hand. But what if a build failure occurs when you’re

    out the office? Whichever unlucky team member gets the job of building

    and releasing the project won’t know about your setup and won’t have

    easy access to those missing files.


    Integration issues are magnified by the number of people involved in a

    project. You may like and respect all of your team members, but we all

    know that they are much more likely than you are to leave tests unrun.

    And then they commit a week’s work of development at 4 p.m. on Friday,

    just as you’re about to declare the project good-to-go for a release.


    Continuous Integration (CI) reduces some of these problems by automating

    the build and test process.


    CI is both a set of practices and tools. As a practice, it requires

    frequent commits of project code (at least daily). With each commit,

    tests should be run and any packages should be built. You’ve already

    seen some of the tools required for CI, in particular PHPUnit and Phing.

    Individual tools aren’t enough, however. A higher-level system is

    required to coordinate and automate the process.


    Without the higher system, a CI server, it’s likely that the practice of

    CI will simply succumb to our natural tendency to skip the chores. After

    all, we’d rather be coding.


    Having a system like this in place offers clear benefits. First, your

    project gets built and tested frequently. That’s the ultimate aim and

    good of CI. That it’s automated, however, adds two further dimensions.

    The test and build happens in a different thread to that of development.

    It happens behind the scenes and doesn’t require that you stop work to

    run tests. Also, as with testing, CI encourages good design. In order

    for it to be possible to automate installation in a remote location,

    you’re forced to consider ease of installation from the start.


    I don’t know how many times I’ve come across projects where the

    installation procedure was an arcane secret known only to a few

    developers. “You mean you didn’t set up the URL rewriting?” asks one old

    hand with barely concealed contempt. “Honestly, the rewrite rules are in the Wiki,
    you know. Just paste

    them into the Apache config file.” Developing with CI in mind means

    making systems easier to test and install. This might mean a little more

    work up front, but it makes our lives easier down the line. Much easier.


    So, to start off, I’m going to lay down some of that expensive

    groundwork. In fact, you’ll find that in most of the sections to come,

    you’ve encountered these preparatory steps already.


    Preparing a Project for CI


    First of all, of course, I need a project to integrate continuously.

    Now, I’m a lazy soul, so I’ll look for some code that comes with tests

    already written. The obvious candidate is the project I created in

    Chapter [18](#A314621_5_En_18_Chapter.html) to illustrate PHPUnit. I’m going

    to name it `userthing`, because

    it’s a thing, with a `User` object in it.


    First of all, here is a breakdown of my project directory:


    ```

    $ find src/ test/

    src/

    src/persist

    src/persist/UserStore.php

    src/util

    src/util/Validator.php

    src/domain

    src/domain/User.php

    test/

    test/persist

    test/persist/UserStoreTest.php

    test/util

    test/util/ValidatorTest.php

    ```


    As you can see, I’ve tidied up the structure a little, adding some

    package directories. Within the code, I’ve supported the package

    structure with the use of namespaces.


    Now that I have a project, I should add it to a version-control system.


    CI and Version Control


    Version control is essential for CI. A CI system needs to acquire the

    most recent version of a project without human intervention (at least

    once things have been set up).


    For this example, I’ll use a repository I set up on BitBucket. I’ll

    configure code on my local development machine, add and commit it, and

    then push to the remote server:


    ```

    $ cd path/to/userthing

    $ git init

    $ git remote add origin git@bitbucket.org:getinstance/userthing.git

    $ git add build.xml composer.json src/ test/

    $ git commit -m ''initial commit''

    $ git push -u origin master

    ```


    I navigated to my development directory and initialized it. Then I added

    the `origin`

    remote, to which I pushed the code. I like to confirm that everything is

    working by performing a fresh clone:


    ```

    $ git clone git@bitbucket.org:getinstance/userthing.git

    Cloning into ''userthing''...

    X11 forwarding request failed on channel 0

    remote: Counting objects: 16, done.

    remote: Compressing objects: 100% (11/11), done.

    remote: Total 16 (delta 0), reused 0 (delta 0)

    Receiving objects: 100% (16/16), done.

    ```


    Checking connectivity… done. Now I have a `userthing` repository

    and a local `clone.Time` to

    automate build and test.


    Phing


    We encountered Phing in Chapter [19](#A314621_5_En_19_Chapter.html). Here is one
    way to install the

    tool:


    ```

    $ sudo pear channel-discover pear.phing.info

    $ sudo pear install phing/phing

    ```


    I’ll use Composer for this, however. Here’s the `require-dev` directive

    in my `composer.json` file:


    ```

    "require-dev": {

    "phing/phing": "2.*"

    }

    ```


    I will be using this essential build tool as the glue for my project’s

    CI environment, so I run this install on the server I intend to use for

    testing (or, of course, you could try this out on virtual server using

    Vagrant and VirtualBox). I will define targets for building and testing

    the code and for running the various other quality assurance tools you

    will meet in this chapter.


    Note


    Be sure to check the output of PEAR when installing a package. You may

    encounter error messages that prompt you to acquire dependencies before

    your target can be installed. The `pear` application is

    helpful and will tell you exactly what you need to do in order to

    install dependencies, but it is easy to miss the fact that more work is

    required on your part if you don’t check the application’s command-line

    output.


