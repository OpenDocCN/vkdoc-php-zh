  \n            )\n        );\n        return (stristr($html, \"您的账户已创建！\"));\n  \
  \  },\n    \"注册表单创建用户\",\n    \"功能/用户\"\n);\n\nFramework\\Test::add(\n    function()\
  \ use ($post)\n    {\n        $html = $post(\n            \"login.html\",\n    \
  \        array(\n                \"email\" => \"info@example.com\",\n          \
