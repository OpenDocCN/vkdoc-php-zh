    \ programmers may want to do some testing on their servers for\n    time costs.*\n\
    \n*For more information on hashing visit* [*www.php.net/manual/en/function.password-hash.php*](http://www.php.net/manual/en/function.password-hash.php)*.*\n\
    \n*   *Programming note—You cannot do a simple comparison with the\n    hashed\
    \ password created by PHP’s* *password_hash*\n    *method*\n    *. The hash produced\
    \ includes the encryption type and the\n    hashed password. Since PHP 7.0.0,\
    \ this method uses a default salt\n    setting and does not allow other salt options.*\n\
    \nYou only need to replace one line of code in the example to verify the\npassword.\
    \ You can replace\n\n```\n$valid = ((in_array($userid, $valid_userids)) && ($password\
    \ == $valid_useridpasswords[$userid]));\n```\n\nwith\n\n```\n$valid =( (in_array($userid,\
    \ $valid_userids)) && (password_verify($password,\n$valid_useridpasswords[$userid]));\n\
    ```\n\nIf you placed the hashed password in the `$valid_useridpasswords`\narray,\
    \ the validation technique would not require any other changes. The\nPHP `password_verify`\n\
    method  will hash\nthe password provided by the user and compare it to the existing\n\
    password. If they match, it will return `TRUE`."
  trans: '

    假设我们已经将输入的信息与有效的用户 ID 和密码列表进行了验证（我们很快会探讨这一过程），那么我们可以将有效的用户 ID 和密码信息存入会话变量。之后，可以使用
    PHP 的`header`方法将应用程序重定向到下一个要执行的程序（`lab.php`）。只要`lab.php`包含了`session_start`方法（如前所示），它就能访问这些会话变量。


    ```

    用户名：

    密码：

    ```


    整合这些部分需要一个`if`语句来判断用户是否已输入用户 ID 和密码。如果用户尚未输入，则显示用于请求输入的 HTML 代码。如果信息已经输入（并且通过所示的
    HTML5 模式表达式验证为有效），则执行语句的`else`部分（将值存入会话变量并调用`lab.php`程序）。这为我们提供了接受用户 ID 和密码、验证其存在性、并在验证通过后调用接口层程序的基本框架。当然，在调用程序之前，我们需要对用户
    ID 和密码进行身份验证。


    *如果用户未输入用户 ID/密码或输入的并非有效用户 ID/密码，可能会产生未经授权的头部消息。这将自动导致系统请求用户输入用户 ID/密码。这种技术相当直接。然而，过去曾有报告称某些浏览器无法正常使用此技术。此外，自行设计技术可以让您制作的登录屏幕与网站其他部分保持一致的风格。*


    ```

    header(''WWW-Authenticate: Basic realm="ABC Canine"'');

    header(''HTTP/1.0 401 Unauthorized'');

    ```


    *关于验证用户 ID 和密码的其他方法的更多信息，请访问* [www.php.net/manual/en/features.http-auth.php](http://www.php.net/manual/en/features.http-auth.php)*.*


    ```

    $valid_useridpasswords = array("sjohnson" => " working");

    $valid_userids = array_keys($valid_useridpasswords);

    $userid = $_SESSION[''username''];

    $password = $_SESSION[''password''];

    $valid = (in_array($userid, $valid_userids)) && ($password == $valid_useridpasswords[$userid]);

    If($valid) { header("Location: http://www.asite.com/lab.php");}

    ```


    有几种方法可以对用户 ID 和密码进行身份验证。如果您创建的系统不需要用户 ID 和密码进行更改，您可以使用数组。在前面的例子中，`$valid_useridpasswords`关联数组包含了有效用户
    ID 和密码的组合。PHP 方法`array_keys`将所有键（在此例中为用户 ID）放入一个单独的数组（`$valid_userids`）中。在会话变量被存入`$userid`和`$password`之后，使用
    PHP 的`in_array`方法来判断用户 ID 和密码的组合是否正确。`in_array`用于判断用户 ID 是否存在于数组中。然后，使用用户 ID 作为下标从`valid_useridpasswords`数组中取出密码，并与`$password`中的值进行比较。如果用户
    ID 存在且密码相同，则一切有效。`$valid`将为`TRUE`。如果其中任何一个（或两者）无效，`$valid`将为`FALSE`。如果`$valid`为`TRUE`，应用程序将重定向到`lab.php`程序。


    从技术上讲，会话中的属性是受保护的，无法从会话外部进行任何访问。然而，过去曾有报道称黑客程序突破了这种安全性并访问了会话信息。在此例中，如果用户 ID 和密码存储在会话变量中并通过互联网传递给另一个程序，黑客可能获取到这些信息。


    如果用户 ID 和密码存储在外部文件或数据库中，这些信息也会在程序外部传输。一旦这些信息驻留在文件或数据库中，程序将不再能控制它们的安全性。这可能让黑客有机会访问这些信息。如前所述，安全性需要程序员、数据管理员和网络管理员共同努力。


    通常的做法是对密码进行哈希处理，以降低黑客发现身份验证信息（或任何其他安全信息）的机会。自 PHP 5.5 起，可以使用`password_hash`方法来保护密码安全。


    *编程注意事项——在存储密码的哈希版本时应谨慎。哈希结果的大小会随着新哈希版本的推出而增加。255 个字符的大小很可能在多年内都足够使用。此哈希所需的毫秒数会随着加密的大小和类型而增加。高级程序员可能希望在自己的服务器上测试时间成本。*


    *有关哈希处理的更多信息，请访问* [www.php.net/manual/en/function.password-hash.php](http://www.php.net/manual/en/function.password-hash.php)*.*


    *编程注意事项——您不能简单地将由 PHP 的`password_hash`方法创建的哈希密码进行直接比较。生成的哈希包含加密类型和哈希后的密码。自 PHP
    7.0.0 起，此方法使用默认的盐值设置，并且不允许其他盐值选项。*


    您只需替换示例中的一行代码即可验证密码。您可以将


    ```

    $valid = ((in_array($userid, $valid_userids)) && ($password == $valid_useridpasswords[$userid]));

    ```


    替换为


    ```

    $valid =( (in_array($userid, $valid_userids)) && (password_verify($password,

    $valid_useridpasswords[$userid]));

    ```


    如果您将哈希后的密码放入`$valid_useridpasswords`数组中，则验证技术无需任何其他更改。PHP 的`password_verify`方法将对用户提供的密码进行哈希处理，并与现有密码进行比较。如果匹配，则返回`TRUE`。

    '
- fmt: "当使用 XML 或 JSON 文件时，可以使用与第 [7](#394210_2_En_7_Chapter.xhtml) 章中`dogdata.php`程序构造器相同的逻辑来检索有效的用户\
    \ ID 和密码信息。唯一需要修改的是确定用户 ID 和密码文件位置的`if`语句，以及构造器中的最后一行，将生成的数组放入`$valid_useridpasswords`而非`dogs_array`。\n\
    \n```\nFredfred\n$2y$10$VosI32FejL.bOMaCjGbBp.Jre6Ipa.tLYQrVqj9kiVpef5zZ25qQK\n\
    \nPetepete\n$2y$10$FdbXxIVXmVOHtaBNxB8vzupRBJFCqUyOTJXrlpNdrL0HKQ/U.jFHO\n```\n\
    \n假设 XML 的格式与狗数据 XML 文件（如前所示）类似，则可以使用类似的逻辑来检索信息。\n\n```\n$valid_useridpasswords\
    \ = json_decode($json,TRUE);\n$userid = $_POST['username'];\n$password = $_POST['password'];\n\
    foreach($valid_useridpasswords as $users)\n{\nforeach($users as $user)\n{\n$hash\
    \ = $user['password'];\nif((in_array($userid, $user)) && (password_verify($password,$hash)))\n\
    {\n$_SESSION['username'] = $userid;\n$_SESSION['password'] = $hash;\nheader(\"\
    Location: lab.php\");\n}\n}\n}\n```\n\n使用`json_decode`方法创建的数组与从`dog_data` XML\
    \ 文件创建的数组格式类似。它需要两个`foreach`循环，一个用于遍历“users”数组，另一个用于遍历“user”数组。然后可以使用`in_array`方法判断用户\
    \ ID 是否存在于 user 数组中。如果存在，则使用 PHP 方法`password_verify`将密码与哈希密码进行比较。此方法使用哈希密码的第一部分来检索关于哈希技术和盐值的信息。盐值是一个自动生成的值，用于生成哈希密码。如果密码匹配，则将用户\
    \ ID 和哈希密码（`$hash`）保存为会话变量。然后调用主程序（参见示例 [8-1](#394210_2_En_8_Chapter.xhtml#PC2)）。\n\
    \n> **注意**：在 PHP 5.5 中，可以调整盐值。在 PHP 7 中，此选项已被弃用，因为它被认为是不必要的系统资源使用。\n\n```\nload(\
    \ 'e7dog_applications.xml' );\n$searchNode = $xmlDoc->getElementsByTagName( \"\
    type\" );\nforeach( $searchNode as $searchNode )\n{\n$valueID = $searchNode->getAttribute('ID');\n\
    if($valueID == \"UIDPASS\")\n// changed value to UIDPASS\n{\n$xmlLocation =\n\
    $searchNode->getElementsByTagName( \"location\" );\n// change $this->dog_data_xml\
    \ to dog_data_xml\n$dog_data_xml =\n$xmlLocation->item(0)->nodeValue;\nbreak;\n\
    }\n}\n}\nelse\n{\nthrow new Exception(\"Dog applications xml file missing or corrupt\"\
    );\n}\n$xmlfile = file_get_contents($dog_data_xml);\n$xmlstring = simplexml_load_string($xmlfile);\n\
    if ($xmlstring === false) {\n$errorString = \"Failed loading XML: \";\nforeach(libxml:get_errors()\
    \ as $error) {\n$errorString .= $error->message . \" \" ;  }\nthrow new Exception($errorString);\
    \ }\n$json = json_encode($xmlstring);\n// changed array name to $valid_useridpasswords\n\
    $valid_useridpasswords = json_decode($json,TRUE);\n// ...... code to verify userid\
    \ and password ....\n$userid = $_POST['username'];\n$password = $_POST['password'];\n\
    foreach($valid_useridpasswords as $users) {\nforeach($users as $user) {\n$hash\
    \ = $user['password'];\nif((in_array($userid, $user)) && (password_verify($password,$hash)))\
    \ {\n$_SESSION['username'] = $userid;\n$_SESSION['password'] = $password;\n$login_string\
    \ = date('mdYhis') .\n\" | Login | \" . $userid . \"\\n\";\nerror_log($login_string,3,$user_log_file);\n\
    header(\"Location: e7lab.php\");\n} }  } }\n}\ncatch(Exception $e)\n{\necho $e->getMessage();\n\
    }\n// code below executes if the user has not logged in or if it is an invalid\
    \ login.\n?>\n\nUserid must contain eight or more characters.\nPassword must contain\
    \ at least one number, one uppercase and lowercase letter, and at least 8 total\
    \ characters.\nUsername: \nPassword:\n\nExample 8-2\nThe login.php file with XML\
    \ user ID/password verification\n```\n\n除了提到的代码外，示例 [8-2](#394210_2_En_8_Chapter.xhtml#PC12)\
    \ 还包含一个`try catch`块来捕获抛出的异常，并调用用户日志文件记录成功登录系统的信息。\n\n### JSON 数据\n\n要使用 JSON 数据代替\
    \ XML 数据，示例 [8-2](#394210_2_En_8_Chapter.xhtml#PC12) 只需包含第 [7](#394210_2_En_7_Chapter.xhtml)\
    \ 章所示的变化。`userid`和`password`的 JSON 数据也需要按如下格式进行格式化。\n\n```\n{\"user\":\n[\n{\"\
    userid\":\"Fredfred\",\"password\":\"$2y$10$VosI32FejL.bOMaCjGbBp.Jre6Ipa.tLYQrVqj9kiVpef5zZ25qQK\"\
    },\n{\"userid\":\"Petepete\",\"password\":\"$2y$10$FdbXxIVXmVOHtaBNxB8vzupRBJFCqUyOTJXrlpNdrL0HKQ\\\
    /U.jFHO\"}\n] }\n```\n\n### MySQL 数据\n\n更常见且通常更安全的方式是在数据库中存储用户 ID 和密码信息。数据库可以使用用户\
    \ ID 和密码进行保护，还可以包含对信息的访问级别（只读、读写）。即使有这种级别的安全性，密码仍然应该被加密。\n\n需要对第 [7](#394210_2_En_7_Chapter.xhtml)\
    \ 章中的 MySQL 构造器示例进行极少的改动即可完成身份验证。\n\n```\n$mysqli =mysqli_connect($server, $db_username,\
    \ $db_password, $database);\nif (mysqli_connect_errno())\n{\nthrow new Exception(\"\
    MySQL connection error: \" . mysqli_connect_error());\n}\n$sql=\"SELECT * FROM\
    \ Users\"; // Change the table used\n$result=mysqli_query($con,$sql);\nIf($result===null)\n\
    {\nthrow new Exception(\"No records retrieved from Database\");\n}\n$valid_useridpasswords\
    \ = mysqli_fetch_assoc($result); // change the array used\nmysqli_free_result($result);\n\
    mysqli_close($con);\n```\n\n此示例代码将从数据库的表（`Users`）中提取信息，并将其放入关联数组（通过`mysqli_fetch_assoc`方法）。如果表中的字段与\
    \ XML 文件中的标签名称（`userid`和`password`）相同，则构建的关联数组将类似于使用示例 [8-2](#394210_2_En_8_Chapter.xhtml#PC12)\
    \ 中的代码构建的数组。所有之前的代码`\"// ...... code to verify userid and password ....\"`都被此处展示的代码替换。这些语句下方的代码无需调整。\n\
    \n### 动手实践\n\n1.  创建一个转换程序，使用 PHP 方法`password_hash`（参见[`www.php.net/manual/en/function.password-hash.php`](http://www.php.net/manual/en/function.password-hash.php)）来确定密码的哈希版本。\n\
    \n2.  下载本节中的示例文件。向`uidpass`文件中添加可用于访问权限（只读或读写）和级别（用户或管理员）的 XML 记录。测试以验证新的`uidpass`文件能正确与现有代码协同工作。进行任何必要的代码更改以使其兼容。\n\
    \n3.  下载本节中的示例文件。向程序中添加代码，将使用错误密码登录的尝试次数限制为三次。记录任何无效的登录尝试（三次尝试后），并将其写入用户日志。"
  raw: "When using XML or JSON files, you can use the same logic used in the\nconstructor\
    \ for the `dogdata.php` program\nfrom Chapter [7](#394210_2_En_7_Chapter.xhtml),\
    \ to retrieve the valid user ID and\npassword information. The only changes needed\
    \ are to the `if` statement , which determines the\nlocation of the user ID and\
    \ password file, and to the last line in the\nconstructor to place the array produced\
    \ to `$valid_useridpasswords`\ninstead of `dogs_array`.\n\n```\n\nFredfred\n$2y$10$VosI32FejL.bOMaCjGbBp.Jre6Ipa.tLYQrVqj9kiVpef5zZ25qQK\n\
    \nPetepete\n$2y$10$FdbXxIVXmVOHtaBNxB8vzupRBJFCqUyOTJXrlpNdrL0HKQ/U.jFHO\n\n```\n\
    \nAssuming the XML\nis in a similar format as the dog data XML file (as shown),\
    \ you can use\nsimilar logic to retrieve the information.\n\n```\n$valid_useridpasswords\
    \ = json_decode($json,TRUE);\n$userid = $_POST['username'];\n$password = $_POST['password'];\n\
    foreach($valid_useridpasswords as $users)\n{\nforeach($users as $user)\n{\n$hash\
    \ = $user['password'];\nif((in_array($userid, $user)) && (password_verify($password,$hash)))\n\
    {\n$_SESSION['username'] = $userid;\n$_SESSION['password'] = $hash;\nheader(\"\
    Location: lab.php\");\n}\n}\n}\n```\n\nThe array created using the `json_decode`\n\
    method  is in a\nsimilar format to the array created from the `dog_data` XML file.\
    \ It\nrequires two `foreach` loops, one to\nloop through the “users” array and\
    \ the other to loop through the “user”\narrays. The `in_array` method can\nthen\
    \ be used to determine if the user ID exists in the user array. If it\ndoes, the\
    \ password is compared to the hashed password using the PHP\nmethod password_verify.\
    \ This method uses the first part of the hashed\npassword to retrieve the information\
    \ on the hash technique and the salt\nvalue. The salt value is an automatically\
    \ generated value that is used\nto produce the hashed\npassword. If the passwords\
    \ match, the user ID and hashed password\n(`$hash`) are\nsaved as session variables.\
    \ The main program is then called (see Example\n[8-1](#394210_2_En_8_Chapter.xhtml#PC2)).\n\
    \nNote\n\nIn PHP 5.5, you could adjust the salt value. In PHP 7, this option\n\
    was depreciated as it was deemed an unnecessary use of system\nresources.\n\n\
    ```\nload( 'e7dog_applications.xml' );\n$searchNode = $xmlDoc->getElementsByTagName(\
    \ \"type\" );\nforeach( $searchNode as $searchNode )\n{\n$valueID = $searchNode->getAttribute('ID');\n\
    if($valueID == \"UIDPASS\")\n// changed value to UIDPASS\n{\n$xmlLocation =\n\
    $searchNode->getElementsByTagName( \"location\" );\n// change $this->dog_data_xml\
    \ to dog_data_xml\n$dog_data_xml =\n$xmlLocation->item(0)->nodeValue;\nbreak;\n\
    }\n}\n}\nelse\n{\nthrow new Exception(\"Dog applications xml file missing or corrupt\"\
    );\n}\n$xmlfile = file_get_contents($dog_data_xml);\n$xmlstring = simplexml_load_string($xmlfile);\n\
    if ($xmlstring === false) {\n$errorString = \"Failed loading XML: \";\nforeach(libxml:get_errors()\
    \ as $error) {\n$errorString .= $error->message . \" \" ;  }\nthrow new Exception($errorString);\
    \ }\n$json = json_encode($xmlstring);\n// changed array name to $valid_useridpasswords\n\
    $valid_useridpasswords = json_decode($json,TRUE);\n// ...... code to verify userid\
    \ and password ....\n$userid = $_POST['username'];\n$password = $_POST['password'];\n\
    foreach($valid_useridpasswords as $users) {\nforeach($users as $user) {\n$hash\
    \ = $user['password'];\nif((in_array($userid, $user)) && (password_verify($password,$hash)))\
    \ {\n$_SESSION['username'] = $userid;\n$_SESSION['password'] = $password;\n$login_string\
    \ = date('mdYhis') .\n\" | Login | \" . $userid . \"\\n\";\nerror_log($login_string,3,$user_log_file);\n\
    header(\"Location: e7lab.php\");\n} }  } }\n}\ncatch(Exception $e)\n{\necho $e->getMessage();\n\
    }\n// code below executes if the user has not logged in or if it is an invalid\
    \ login.\n?>\n\nUserid must contain eight or more characters.\nPassword must contain\
    \ at least one number, one uppercase and lowercase letter, and at least 8 total\
    \ characters.\nUsername: \nPassword:\n\nExample 8-2\nThe login.php file with XML\
    \ user ID/password verification\n```\n\nIn addition to the code mentioned, Example\
    \ [8-2](#394210_2_En_8_Chapter.xhtml#PC12) also includes a\n`try catch` block\n\
    to catch the exceptions thrown and a call to a user log file to record\nsuccessful\
    \ logs into the system.\n\nJSON Data\n\nTo use JSON data\ninstead of XML data,\
    \ Example [8-2](#394210_2_En_8_Chapter.xhtml#PC12) would only need\nto include\
    \ the changes shown in Chapter [7](#394210_2_En_7_Chapter.xhtml). The `userid`\
    \ and `password` JSON data\nwould also need to be formatted as shown.\n\n```\n\
    {\"user\":\n[\n{\"userid\":\"Fredfred\",\"password\":\"$2y$10$VosI32FejL.bOMaCjGbBp.Jre6Ipa.tLYQrVqj9kiVpef5zZ25qQK\"\
    },\n{\"userid\":\"Petepete\",\"password\":\"$2y$10$FdbXxIVXmVOHtaBNxB8vzupRBJFCqUyOTJXrlpNdrL0HKQ\\\
    /U.jFHO\"}\n] }\n```\n\nMySQL Data\nIt is more common and usually more secure\
    \ to store user ID and\npassword information in a database. Databases can be secured\
    \ using user\nIDs and passwords, which can also include levels of access (read-only,\n\
    read, and write) to the information. Even with this level of security,\nthe password\
    \ should still be encrypted.\n\nVery few minor changes are needed to the MySQL\
    \ constructor\nexample from Chapter [7](#394210_2_En_7_Chapter.xhtml) to accomplish\
    \ authentication.\n\n```\n$mysqli =mysqli_connect($server, $db_username, $db_password,\
    \ $database);\nif (mysqli_connect_errno())\n{\nthrow new Exception(\"MySQL connection\
    \ error: \" . mysqli_connect_error());\n}\n$sql=\"SELECT * FROM Users\"; // Change\
    \ the table used\n$result=mysqli_query($con,$sql);\nIf($result===null)\n{\nthrow\
    \ new Exception(\"No records retrieved from Database\");\n}\n$valid_useridpasswords\
    \ = mysqli_fetch_assoc($result); // change the array used\nmysqli_free_result($result);\n\
    mysqli_close($con);\n```\n\nThis example code will pull the information from a\
    \ table in the\ndatabase (`Users`) and place the\ninformation in an associate\
    \ array (via the `mysqli_fetch_assoc`\nmethod). If the fields in the table are\
    \ the same as the tag names from\nthe XML file (`userid` and `password`), the\n\
    associate array built will be similar to the array built using the code\nfrom\
    \ Example [8-2](#394210_2_En_8_Chapter.xhtml#PC12). All previous\ncode `\"// ......\
    \ code to verify userid and password ....\"` is replaced by the code shown\nhere.\
    \ No code below the statements should need adjusting.\n\nDo It\n\n1.  Create a\
    \ conversion program to determine the hashed version of a\n    password using\
    \ the PHP method `password_hash` (see\n    [`www.php.net/manual/en/function.password-hash.php`](http://www.php.net/manual/en/function.password-hash.php)).\n\
    \n2.  Download the example files from this section. Add XML records to the\n \
    \   `uidpass` file\n    that could be used for access permissions (read-only or\
    \ read/write) and\n    levels (user or administrator). Test to verify that the\
    \ new `uidpass` file works\n    correctly with the existing code. Make any necessary\
    \ code changes to\n    make it compatible.\n\n3.  Download the example files from\
    \ this section. Add code to the program\n    to limit attempts to log in with\
    \ a bad password to three. Record any\n    invalid attempt to log in (after three\
    \ tries) in the user log."
  trans: "\n当使用 XML 或 JSON 文件时，可以使用与第 7 章中`dogdata.php`程序构造器相同的逻辑来检索有效的用户 ID 和密码信息。唯一需要修改的是确定用户\
    \ ID 和密码文件位置的`if`语句，以及构造器中的最后一行，将生成的数组放入`$valid_useridpasswords`而非`dogs_array`。\n\
    \n```\nFredfred\n$2y$10$VosI32FejL.bOMaCjGbBp.Jre6Ipa.tLYQrVqj9kiVpef5zZ25qQK\n\
    \nPetepete\n$2y$10$FdbXxIVXmVOHtaBNxB8vzupRBJFCqUyOTJXrlpNdrL0HKQ/U.jFHO\n```\n\
    \n假设 XML 的格式与狗数据 XML 文件（如前所示）类似，则可以使用类似的逻辑来检索信息。\n\n```\n$valid_useridpasswords\
    \ = json_decode($json,TRUE);\n$userid = $_POST['username'];\n$password = $_POST['password'];\n\
    foreach($valid_useridpasswords as $users)\n{\nforeach($users as $user)\n{\n$hash\
    \ = $user['password'];\nif((in_array($userid, $user)) && (password_verify($password,$hash)))\n\
    {\n$_SESSION['username'] = $userid;\n$_SESSION['password'] = $hash;\nheader(\"\
    Location: lab.php\");\n}\n}\n}\n```\n\n使用`json_decode`方法创建的数组与从`dog_data` XML\
    \ 文件创建的数组格式类似。它需要两个`foreach`循环，一个用于遍历“users”数组，另一个用于遍历“user”数组。然后可以使用`in_array`方法判断用户\
    \ ID 是否存在于 user 数组中。如果存在，则使用 PHP 方法`password_verify`将密码与哈希密码进行比较。此方法使用哈希密码的第一部分来检索关于哈希技术和盐值的信息。盐值是一个自动生成的值，用于生成哈希密码。如果密码匹配，则将用户\
    \ ID 和哈希密码（`$hash`）保存为会话变量。然后调用主程序（参见示例 8-1）。\n\n> **注意**：在 PHP 5.5 中，可以调整盐值。在\
    \ PHP 7 中，此选项已被弃用，因为它被认为是不必要的系统资源使用。\n\n```\nload( 'e7dog_applications.xml' );\n\
    $searchNode = $xmlDoc->getElementsByTagName( \"type\" );\nforeach( $searchNode\
    \ as $searchNode )\n{\n$valueID = $searchNode->getAttribute('ID');\nif($valueID\
    \ == \"UIDPASS\")\n// changed value to UIDPASS\n{\n$xmlLocation =\n$searchNode->getElementsByTagName(\
    \ \"location\" );\n// change $this->dog_data_xml to dog_data_xml\n$dog_data_xml\
    \ =\n$xmlLocation->item(0)->nodeValue;\nbreak;\n}\n}\n}\nelse\n{\nthrow new Exception(\"\
    Dog applications xml file missing or corrupt\");\n}\n$xmlfile = file_get_contents($dog_data_xml);\n\
    $xmlstring = simplexml_load_string($xmlfile);\nif ($xmlstring === false) {\n$errorString\
    \ = \"Failed loading XML: \";\nforeach(libxml:get_errors() as $error) {\n$errorString\
    \ .= $error->message . \" \" ;  }\nthrow new Exception($errorString); }\n$json\
    \ = json_encode($xmlstring);\n// changed array name to $valid_useridpasswords\n\
    $valid_useridpasswords = json_decode($json,TRUE);\n// ...... code to verify userid\
    \ and password ....\n$userid = $_POST['username'];\n$password = $_POST['password'];\n\
    foreach($valid_useridpasswords as $users) {\nforeach($users as $user) {\n$hash\
    \ = $user['password'];\nif((in_array($userid, $user)) && (password_verify($password,$hash)))\
    \ {\n$_SESSION['username'] = $userid;\n$_SESSION['password'] = $password;\n$login_string\
    \ = date('mdYhis') .\n\" | Login | \" . $userid . \"\\n\";\nerror_log($login_string,3,$user_log_file);\n\
    header(\"Location: e7lab.php\");\n} }  } }\n}\ncatch(Exception $e)\n{\necho $e->getMessage();\n\
    }\n// code below executes if the user has not logged in or if it is an invalid\
    \ login.\n?>\n\n用户 ID 必须包含八个或更多字符。\n密码必须包含至少一个数字、一个大写字母和一个小写字母，并且总长度至少为 8 个字符。\n\
    用户名： \n密码：\n\n示例 8-2\n包含 XML 用户 ID/密码验证的 login.php 文件\n```\n\n除了提到的代码外，示例 8-2\
    \ 还包含一个`try catch`块来捕获抛出的异常，并调用用户日志文件记录成功登录系统的信息。\n\n### JSON 数据\n\n要使用 JSON 数据代替\
    \ XML 数据，示例 8-2 只需包含第 7 章所示的变化。`userid`和`password`的 JSON 数据也需要按如下格式进行格式化。\n\n\
    ```\n{\"user\":\n[\n{\"userid\":\"Fredfred\",\"password\":\"$2y$10$VosI32FejL.bOMaCjGbBp.Jre6Ipa.tLYQrVqj9kiVpef5zZ25qQK\"\
    },\n{\"userid\":\"Petepete\",\"password\":\"$2y$10$FdbXxIVXmVOHtaBNxB8vzupRBJFCqUyOTJXrlpNdrL0HKQ\\\
    /U.jFHO\"}\n] }\n```\n\n### MySQL 数据\n\n更常见且通常更安全的方式是在数据库中存储用户 ID 和密码信息。数据库可以使用用户\
    \ ID 和密码进行保护，还可以包含对信息的访问级别（只读、读写）。即使有这种级别的安全性，密码仍然应该被加密。\n\n需要对第 7 章中的 MySQL 构造器示例进行极少的改动即可完成身份验证。\n\
    \n```\n$mysqli =mysqli_connect($server, $db_username, $db_password, $database);\n\
    if (mysqli_connect_errno())\n{\nthrow new Exception(\"MySQL connection error:\
    \ \" . mysqli_connect_error());\n}\n$sql=\"SELECT * FROM Users\"; // Change the\
    \ table used\n$result=mysqli_query($con,$sql);\nIf($result===null)\n{\nthrow new\
    \ Exception(\"No records retrieved from Database\");\n}\n$valid_useridpasswords\
    \ = mysqli_fetch_assoc($result); // change the array used\nmysqli_free_result($result);\n\
    mysqli_close($con);\n```\n\n此示例代码将从数据库的表（`Users`）中提取信息，并将其放入关联数组（通过`mysqli_fetch_assoc`方法）。如果表中的字段与\
    \ XML 文件中的标签名称（`userid`和`password`）相同，则构建的关联数组将类似于使用示例 8-2 中的代码构建的数组。所有之前的代码`\"\
    // ...... code to verify userid and password ....\"`都被此处展示的代码替换。这些语句下方的代码无需调整。\n\
    \n### 动手实践\n\n1.  创建一个转换程序，使用 PHP 方法`password_hash`（参见[`www.php.net/manual/en/function.password-hash.php`](http://www.php.net/manual/en/function.password-hash.php)）来确定密码的哈希版本。\n\
    \n2.  下载本节中的示例文件。向`uidpass`文件中添加可用于访问权限（只读或读写）和级别（用户或管理员）的 XML 记录。测试以验证新的`uidpass`文件能正确与现有代码协同工作。进行任何必要的代码更改以使其兼容。\n\
    \n3.  下载本节中的示例文件。向程序中添加代码，将使用错误密码登录的尝试次数限制为三次。记录任何无效的登录尝试（三次尝试后），并将其写入用户日志。\n"
- fmt: "# Registration\n\nIn addition to authorizing user logons, most systems allow\
    \ the users to create their own user IDs and passwords. By default, the self-created\
    \ IDs are given the lowest priorities. An administrator can then go in and increase\
    \ the level of privileges once the ID has been created. Some sites allow nonregistered\
    \ users (users who are not logged in). Nonregistered users should only be given\
    \ read-only access to nonprivileged information. Nonregistered users are much\
    \ more of a security risk because it would be difficult to determine their identity\
    \ during a security breach. PHP provides the ability to retrieve the user’s IP\
    \ address using `$_SERVER['REMOTE_ADDR']`. This might provide some ability to\
    \ trace the user. However, many users use free public access points, which generate\
    \ random IP addresses. If one of these points is used, it will be much more difficult\
    \ to track them down.\n\nIn addition, providing the opportunity for users to create\
    \ user IDs and passwords allows the program to gather additional information (such\
    \ as name and email) that can help with security and also provide easy ability\
    \ to promote the web site to users of the site. The success rate of selling what\
    \ is offered on the site will be much higher to customers who are already familiar\
    \ with the site. To encourage users to create user IDs and passwords, the site\
    \ should offer them some benefit (such as access to the help desk) that is not\
    \ available to visitors.\n\nThe *registration page* will, in many ways, work similarly\
    \ to the login page. However, any valid user ID or password entered will be stored\
    \ (instead of compared). Because the application will be updating the list of\
    \ valid IDs, the application must validate the information before it is updated.\
    \ You can use some of the techniques that you used previously when validating\
    \ the `dog` class properties. First, as the user enters a user ID and password\
    \ (which must pass the HTML5 validation shown previously), it is passed to a PHP\
    \ program. Even though it is considered to be secure inside a session, the information\
    \ will travel from the HTML form to the PHP code. The information should be validated\
    \ again.\n\n```\nif ((isset($_POST['username'])) || (isset($_POST['password'])))\n\
    {\n$userid = $_POST['username'];\n$password = $_POST['password'];\nif (!(preg_match(\"\
    /^.*(?=.{8,})(?=.*\\d)(?=.*[a-z])(?=.*[A-Z]).*$/\", $password)) || (!(strlen($userid)\
    \ >= 8)))\n{\nthrow new Exception(\"Invalid Userid and/or Password Format\");\n\
    }\nelse\n```\n\nThis `if` statement uses the PHP function `preg_match` to determine\
    \ if the format of the password contains one uppercase letter, one lowercase letter,\
    \ one number, and at least eight characters. Notice that the regular expression\
    \ format is the same as used with the HTML5 code (the order of the expression\
    \ has changed, but it still contains the same information). The PHP `strlen` method\
    \ also checks the user ID to determine that it has eight or more characters.\n\
    \nIf either validation does not pass, the program raises an `Exception`. If both\
    \ pass, the `else` part of the statement executes to hash the password and store\
    \ the information.\n\n```\n$password = password_hash($password, PASSWORD_DEFAULT);\n\
    $input = file_get_contents($dog_data_xml);\n$find = \"\";\n$newupstring = \"\\\
    n\" . $userid . \"\\n\" . $password;\n$newupstring .= \"\\n\\n\";\n$find = preg_quote($find,'/');\n\
    $output = preg_replace(\"/^$find(\\n|\\$)/m\",\"\",$input);\n$output = $output\
    \ . $newupstring;\nfile_put_contents($dog_data_xml,$output);\n$login_string =\
    \ date('mdYhis') . \" | New Userid | \" . $userid . \"\\n\";\nerror_log($login_string,3,$user_log_file);\n\
    header(\"Location: e7login.php\");\n```\n\nBefore inserting the password into\
    \ the XML file, it must be encrypted (hashed). The PHP method `password_hash`\
    \ will convert the password to the format shown previously. `file_get_contents`\
    \ dumps the contents of the XML user ID/password file into `$input`. `preg_quote`\
    \ will place backslashes next to any special characters in `$find` (such as the\
    \ backslash contained in `/users`) to keep PHP from trying to interpret those\
    \ characters as part of a regular expression. `preg_replace` will use the regular\
    \ expression `/^$find(\\n|\\$)/m` to search for `</users>` with and without (`\\\
    n`) at the end. Since records in files are determined by the newline character,\
    \ this will ensure that you find `</users>` at either the end of a line in the\
    \ file or as part of a line in the file. When `</users>` is found in the file\
    \ (the contents of the file are in `$input`), it is replaced by `\"\"` (empty\
    \ string). `preg_replace` will also attempt to place backslashes in any string\
    \ existing in the second parameter (where the `\"\"` is currently located). If\
    \ the `$newupstring` is placed in that parameter, the encrypted password would\
    \ be modified by `preg_replace`. This would cause the passwords to not verify,\
    \ even if the one entered by the user is correct. Therefore, the contents of `$newupstring`\
    \ (the new user info) are appended to `$output`. The `$output` string is then\
    \ used to replace all contents of the user ID/password XML file. Once this information\
    \ has been saved successfully, the user log is updated to indicate the creation\
    \ of a new user ID, and the user is redirected to the login screen to sign into\
    \ the application with the new user ID and password.\n\nAlternatively, the previous\
    \ process of loading the file into an associative array, updating the associative\
    \ array, and then loading the associative array back into the XML file could have\
    \ been used. However, it would have taken more code and is unnecessary because\
    \ this process is only used once in the application. The program will not make\
    \ multiple attempts to update the user ID and password file with the same user.\n\
    \n```\n= 8)))\n{\nthrow new Exception(\"Invalid Userid and/or Password Format\"\
    );\n}\nelse\n{\nLibxml_use_internal_errors(true);\n$xmlDoc = new DOMDocument();\n\
    if ( file_exists(\"e7dog_applications.xml\") )\n{\n$xmlDoc->load( 'e7dog_applications.xml'\
    \ );\n$searchNode = $xmlDoc->getElementsByTagName( \"type\" );\nforeach( $searchNode\
    \ as $searchNode )\n{\n$valueID = $searchNode->getAttribute('ID');\nif($valueID\
    \ == \"UIDPASS\")\n{\n$xmlLocation = $searchNode->getElementsByTagName ( \"location\"\
    \ );\n$dog_data_xml =\n$xmlLocation->item(0)->nodeValue;\nbreak;\n}\n}\n}\nelse\n\
    {\nthrow new Exception(\"Dog applications xml file missing or corrupt\");\n}\n\
    }\n$password = password_hash($password, PASSWORD_DEFAULT);\n$input = file_get_contents($dog_data_xml);\n\
    $find = \"\";\n$newupstring = \"\\n\" . $userid . \"\\n\" . $password . \"\\n\\\
    n\";\n$find_q = preg_quote($find,'/');\n$output = preg_replace(\"/^$find_q(\\\
    n|\\$)/m\",$newupstring,$input);\nfile_put_contents($dog_data_xml,$output);\n\
    $login_string = date('mdYhis') . \" | New Userid | \" . $userid . \"\\n\";\nerror_log($login_string,3,$user_log_file);\n\
    header(\"Location: e7login.php\");\n} } }\ncatch(Exception $e) { echo $e->getMessage();\
    \ }\n?>\n\nUserid must contain eight or more characters.\nPassword must contain\
    \ at least one number, one uppercase and lowercase letter, and at least 8 total\
    \ characters.\nUsername: \nPassword:\n\n**Example 8-3**  \nThe `registration.php`\
    \ file\n\n## JSON Data\n\nJSON data would require just a couple of slight changes.\n\
    \n```\n{\"user\":\n[\n{\"userid\":\"Fredfred\",\"password\":\"$2y$10$VosI32FejL.bOMaCjGbBp.Jre6Ipa.tLYQrVqj9kiVpef5zZ25qQK\"\
    },\n{\"userid\":\"Petepete\",\"password\":\"$2y$10$FdbXxIVXmVOHtaBNxB8vzupRBJFCqUyOTJXrlpNdrL0HKQ\\\
    /.uJ.FHO\"}\n] }\n```\n\nThe data ends with a combination of `]}`, which does\
    \ not occur anywhere else. `$find` can be set to this value (`$set = \"]}\";`).\
    \ The `$newupstring` value can also be changed to:\n\n```\n$newupstring = ',{\"\
    userid\":\"' . $userid . '\",\"password\":\"' . $password . '\"}\\n]}';\n```"
