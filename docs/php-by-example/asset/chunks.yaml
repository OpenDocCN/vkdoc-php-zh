- fmt: 'The basic settings (including how to respond to scripting errors) are contained
    in the `php.ini` initialization file, which is read when the PHP server starts
    up. To manage the mode of error monitoring, you can use the `error_reporting()`
    function. Its argument is a constant defining the error messages to be displayed.
    For example, the `E_ERROR` constant corresponds to the mode of monitoring the
    fatal errors leading to the termination of the program execution. The `E_WARNING`
    constant means the mode in which the non-critical warnings are monitored. The
    `E_ALL` constant specifies the mode of monitoring almost all errors (the maximum
    control mode).


    In practice, you can use the `set_exception_handler()` function to handle exceptions.
    As an argument, it takes the function’s name that is called if an unhandled exception
    occurs during the code execution. The code stops executing after executing the
    function passed to the `set_exception_handler()` function. A small example is
    shown in Listing [10-8](#613529_1_En_10_Chapter.xhtml#PC23).


    ```

    Listing 10-8

    The Function for Handling Exceptions

    ```


    The following is the program’s output.


    ```

    The output of the program (from Listing 10-8)

    An error is about to occur...

    There was an error!

    ```


    In this case, you describe the `handler()` function, and the name of the function
    (as a string) is passed as an argument to the `set_exception_handler()` function.
    So when an exception is thrown with the `throw new Exception()` statement, the
    `handler()` function is automatically called. That terminates the execution of
    the program.


    A circular icon reads a letter i at the center. Note: There are other functions
    useful when dealing with errors and exceptions. For example, you can use the `set_error_handler()`
    function to define error handlers. You can throw errors using the `trigger_error()`
    function. And the list is not complete. Another interesting feature is related
    to the error message disable `@` operator. The operator is placed before some
    expression, and if an error occurs during the execution of the expression, then
    the corresponding message is not displayed.


    ![](images/613529_1_En_10_Chapter/613529_1_En_10_Figi_HTML.gif) A bell icon. **The
    PHP 8 Standard** Since PHP 8, the `@` operator doesn’t hide fatal errors.


    ## Summary


    *   You can use the `try-catch-finally` construction to handle exceptions. The
    controlled code is placed in the `try` block. If an exception is thrown while
    executing that code, it can be handled in the `catch` block. The commands in the
    optional `finally` block are always executed.

    *   To handle different exceptions, multiple `catch` blocks can be used. For each
    block, you specify the exception class to be handled.

    *   Exceptions can be thrown artificially. To do that, use the `throw` instruction
    followed by the object of the exception.

    *   You can create custom exception classes. Such classes inherit the `Exception`
    class. The built-in exception classes implement the `Throwable` interface.

    *   The `try-catch-finally` constructions can be nested, and exceptions can be
    rethrown. In that case, the object of the thrown exception is used multiple times.

    *   Special functions and utilities allow you to set the error control mode. Among
    them are the error message disable `@` operator, the `error_reporting()` function
    (defines the error control mode), the `set_exception_handler()` and `set_error_handler()`
    functions (define an error handler), and the `trigger_error()` function (throws
    an error).


    ## 11. Generators and Iterators


    *Oh, I understand. Nobody on this planet ever says what they mean.* —*ALF* (TV
    series)


    In this chapter, you become familiar with generators and iterators. An iterator
    is a special object that allows you to iterate over a collection. A generator
    is a particular iterator. So, in any case, you deal with iterating over collections.
    Let’s start with the more straightforward issue: the generator.'
