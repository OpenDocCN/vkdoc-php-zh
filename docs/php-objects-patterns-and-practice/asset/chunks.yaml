    to look at a variation on it here.


    I will use a fluent interface. That is a class whose setter methods return object
    instances, allowing your users to chain objects together in fluid, language-like
    way. This will satisfy my laziness, but still, I hope, give the client coder a
    flexible way of defining criteria.


    I start by creating `woo\mapper\Field`, a class designed to hold comparison data
    for each field that will end up in the `WHERE` clause :


    ```

    // listing 13.37

    class Field

    {

    protected $name = null;

    protected $operator = null;

    protected $comps = [];

    protected $incomplete = false;

    // sets up the field name (age, for example)

    public function __construct(string  $name)

    {

    $this->name = $name;

    }

    // add the operator and the value for the test

    // (> 40, for example) and add to the $comps property

    public function addTest(string $operator, $value)

    {

    $this->comps[] = [

    ''name'' => $this->name,

    ''operator'' => $operator,

    ''value'' => $value

    ];

    }

    // comps is an array so that we can test one field in more than one way

    public function getComps(): array

    {

    return $this->comps;

    }

    // if $comps does not contain elements, then we have

    // comparison data and this field is not ready to be used in

    // a query

    public function isIncomplete(): bool

    {

    return empty($this->comps);

    }

    }

    ```


    This simple class accepts and stores a field name. Through the `addTest()` method
    , the class builds an array of `operator` and `value` elements. This allows us
    to maintain more than one comparison test for a single field. Now, here’s the
    new `IdentityObject` class :


    ```

    // listing 13.38

    class IdentityObject

    {

    protected $currentfield = null;

    protected $fields = [];

    private $enforce = [];

    // an identity object can start off empty, or with a field

    public function __construct(string $field = null, array $enforce = null)

    {

    if (! is_null($enforce)) {

    $this->enforce = $enforce;

    }

    if (! is_null($field)) {

    $this->field($field);

    }

    }

    // field names to which this is constrained

    public function getObjectFields()

    {

    return $this->enforce;

    }

    // kick off a new field.

    // will throw an error if a current field is not complete

    // (ie age rather than age > 40)

    // this method returns a reference to the current object

    // allowing for fluent syntax

    public function field(string $fieldname): self

    {

    if (! $this->isVoid() && $this->currentfield->isIncomplete()) {

    throw new \Exception("Incomplete field");

    }

    $this->enforceField($fieldname);

    if (isset($this->fields[$fieldname])) {

    $this->currentfield=$this->fields[$fieldname];

    } else {

    $this->currentfield = new Field($fieldname);

    $this->fields[$fieldname]=$this->currentfield;

    }

    return $this;

    }

    // does the identity object have any fields yet

    public function isVoid(): bool

    {

    return empty($this->fields);

    }

    // is the given fieldname legal?

    public function enforceField(string $fieldname)

    {

    if (! in_array($fieldname, $this->enforce) && ! empty($this->enforce) ) {

    $forcelist = implode('', '', $this->enforce);

    throw new \Exception("{$fieldname} not a legal field ($forcelist)");

    }

    }

    // add an equality operator to the current field

    // ie ''age'' becomes age=40

    // returns a reference to the current object (via operator())

    public function eq($value): self

    {

    return $this->operator("=", $value);

    }

    // less than

    public function lt($value): self

    {

    return $this->operator("operator(">", $value);

    }

    // does the work for the operator methods

    // gets the current field and adds the operator and test value

    // to it

    private function operator(string $symbol, $value): self

    {

    if ($this->isVoid()) {

    throw new \Exception("no object field defined");

    }

    $this->currentfield->addTest($symbol, $value);

    return $this;

    }

    // return all comparisons built up so far in an associative array

    public function getComps(): array

    {

    $ret = [];

    foreach ($this->fields as $field) {

    $ret = array_merge($ret, $field->getComps());

    }

    return $ret;

    }

    }

    ```


    The easiest way to work out what’s going on here is to start with some client
    code and work backward:


    ```

    // listing 13.39

    $idobj = new IdentityObject();

    $idobj->field("name")

    ->eq("The Good Show")

    ->field("start")

    ->gt(time())

    ->lt(time() + (24 * 60 * 60));

    ```'
