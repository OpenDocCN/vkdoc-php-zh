  trans: '

    # 使用示例文件


    本书所需的所有文件均可从 Apress 网站下载，网址为 [`www.apress.com/9781484206362`](http://www.apress.com/9781484206362)。请确保选择《PHP
    解决方案：动态网页设计轻松入门（第三版）》的下载链接。该版本的代码与前两版有所不同。


    请按照第 2 章所述，搭建 PHP 开发环境。解压文件，将 `phpsols` 文件夹及其所有内容复制到 Web 服务器的文档根目录下。各章节的代码位于以章节名称命名的文件夹中：`ch01`、`ch02`，依此类推。请遵循每个
    PHP 解决方案中的说明，将相关文件复制到网站根目录或指定的工作文件夹中。


    当某一页面在章节内经历多次修改时，我会对不同的版本进行编号，例如：`index_01.php`、`index_02.php` 等。复制带有编号的文件时，请移除文件名中的下划线和编号，因此
    `index_01.php` 应变为 `index.php`。如果你使用像 Dreamweaver 这类在移动文件时会提示更新链接的程序，请不要更新它们。文件中的链接设计为在目标文件夹中时能正确关联相应的图片和样式表。我这样做是为了让你能使用文件比较工具，将自己的文件与我的文件进行比对。


    如果你没有文件比较工具，我强烈建议你安装一个。它能在你试图找出自己版本与我的版本之间的差异时，为你省去数小时的挠头苦思。在数十行代码中，一个遗漏的分号或拼错的变量可能很难被发现。Windows
    用户可从 [`http://winmerge.org/`](http://winmerge.org/) 免费下载 WinMerge。我使用的是 Beyond
    Compare（[`www.scootersoftware.com`](http://www.scootersoftware.com/)），该工具现已支持
    Windows、Mac OS X 和 Linux 平台。它虽非免费，但功能卓越且价格合理。Mac 上的 BBEdit 内置了文件比较工具。或者，你也可以使用
    TextWrangler 中的文件比较功能，该软件可从 [`www.barebones.com/products/textwrangler/`](http://www.barebones.com/products/textwrangler/)
    免费下载。


    # 排版约定


    为使本书尽可能清晰易懂，全书采用以下文本约定：


    * 重要的单词或概念通常在首次出现时以**粗体**突出显示。

    * 代码以`等宽字体`呈现。

    * 新增或更改的代码通常以**粗体**`等宽字体`呈现。

    * 伪代码和变量输入以*斜体*`等宽字体`书写。

    * 菜单命令以“菜单 ➤ 子菜单 ➤ 子菜单”的形式书写。

    * 当我想提请你的注意时，会像这样突出显示：


    啊哈，别说我没警告过你。


    # 致谢


    撰写《PHP 解决方案》的初衷源于 Chris Mills，他是我在 Apress/friends of ED 共事多年的编辑，现任 Mozilla 公司高级技术文档撰写人，也是
    Web 标准的热情倡导者。Chris 希望摒弃那种孤立解决方案的“菜谱式”编写模式，因为这种模式让读者对所涉及技术的实际用途知之甚少。本书能出版至第三版，足以证明当初这个想法是多么出色。谢谢你，Chris。


    担任第二版和第三版编辑的 Ben Renow-Clarke 是 Chris 的继任者，他效仿 Chris，给予我充分的自由来按照自己的想法雕琢本书，但他总是能设身处地站在读者的角度，当某个解释不够清晰或某个章节结构混乱时，及时将我的思路引导到正确的方向。


    我也非常感谢我的技术审阅者们：第一版的 Samuel Wright，第二版的 Kristian Besley 和 Jason Nadon，以及本版的 Paul
    Milbourne。每个版本都建立在前一版本的基础之上，因此前一版本审阅者的想法和建议在本版中得以延续。


    若无 Apress 出版链中每一位成员的勤勉协助，要完成这样一本书是不可能的。我在此向他们所有人表示感谢。


    最重要的是，我要感谢众多读者，是你们让本书取得了如此成功。欢迎加入俱乐部。我希望你们喜欢本书，并发现它在使用 PHP 构建动态网站时卓有成效。

    '
