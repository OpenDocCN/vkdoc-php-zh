  \    isbn varchar(9) NOT NULL UNIQUE,\n    author varchar(50) NOT NULL,\n    title\
  \ varchar(45) NOT NULL,\n    description varchar(300) NOT NULL,\n    CONSTRAINT\
  \ books_pk PRIMARY KEY(book_id)\n);\n```\n\n请注意，在实际实现中会存在一个类似的 `author` 表映射，但此处将其省略，因为它与当前讨论无关。\n\
  \n除了上述用户友好的 URL 之外，你还希望在页面顶部提供一个导航路径，以便用户轻松识别当前站点位置，并能方便地导航回站点目录树的上层。预期目标是创建一个类似于以下内容的导航路径：\n\
  \n`首页 > 开源 > PHP 5 与 PostgreSQL 8 入门`\n\n`代码清单 13-3` 展示了修改后的 `create_crumbs()` 函数，此版本能够解析\
  \ URL 并基于检索到的表数据构建前述导航路径。\n\n**代码清单 13-3.** *修订后的 `create_crumbs()` 函数*\n\n```php\n\
  <?php\n// 修订后的 create_crumbs() 函数。注意此版本更为简单，\n// 因为它专门针对图书目录的使用场景进行了定制。\nfunction\
  \ create_crumbs($siteURL, $categoryID, $categoryName, $title) {\n    $crumb = \"\
  <a href = \\\"$siteURL\\\">首页</a> &gt;\n    <a href = \\\"$siteURL/category/$categoryID/\\\
  \">\n    $categoryName</a> &gt; $title\";\n    print $crumb;\n} # 结束 create_crumbs\
  \ 定义\n\n$siteURL = \"http://www.example.com\";\n$conn=pg_connect(\"host=localhost\
  \ dbname=corporate\n    user=jason password=secret\");\n// 假设这将以用户友好的 URL 中解析出来\n\
  $isbn = \"1590595475\";\n$query = \"SELECT b.category_id, c.name, b.isbn, b.author,\
  \ b.title, b.description FROM books b, categories c\n    WHERE b.isbn = $isbn AND\
  \ b.category_id = c.category_id\";\n$result = pg_exec($conn, $query);\n$row = pg_fetch_assoc($result);\n\
  // 检索查询值\n$categoryID = $row[\"category_id\"];\n$categoryName = $row[\"name\"];\n\
  $isbn = $row[\"isbn\"];\n$authorID = $row[\"author\"];\n$title = $row[\"title\"\
  ];\n// 执行函数\ncreate_crumbs($siteURL, $categoryID, $categoryName, $title);\n?>\n\
  ```\n\n#### 创建自定义错误处理器\n\n对于用户来说，偶然访问到一个已被移动或移除的网页，却只看到令人沮丧的“HTTP 404 – 文件未找到”消息，这相当令人恼火。话虽如此，站点维护者应采取一切必要措施，确保不会出现“链接失效”的情况。然而，有时这难以轻易避免，尤其是在进行重大的站点迁移或更新时。\n\
  \n幸运的是，Apache 提供了一个配置指令，使得可以将所有以特定服务器错误（例如 404、403 和 500）结束的请求转发到一个预定的页面。\n\n这个名为\
  \ `ErrorDocument` 的指令可以放置在 `httpd.conf` 的主配置容器中，也可以放置在虚拟主机、目录和 `.htaccess` 容器中（当然，需要适当的权限）。例如，你可以将所有\
  \ 404 错误指向位于特定上下文基础目录中的名为 `error.html` 的文档，如下所示：\n\n```\nErrorDocument 404 /error.html\n\
  ```\n\n\n\n"
- "# 将 404 错误指向自定义错误页面\n\n将 404 错误指向自定义页面非常有用，因为它可以向用户提供关于页面被删除原因的更多信息、与网站升级进度相关的更新，甚至提供一个搜索界面。结合\
  \ PHP 使用，这样的页面还能尝试识别用户试图访问的页面，并将其相应地转发；向网站管理员发送邮件，告知她已发生错误；创建自定义错误日志；或者执行你希望的任何其他操作。本节将演示如何使用\
  \ PHP 收集与缺失文件相关的一些统计信息，并将这些信息通过邮件发送给网站管理员。希望这个示例能为你提供一些思路，帮助你开始创建适合自己特定需求的自定义 404\
  \ 处理程序。\n\n> **注意：** 本章描述的某些概念已由 Apache Web 服务器的 URL 重写功能高效地处理。然而，请记住，许多读者使用共享服务器来托管网站，因此无法奢求对其\
  \ Web 服务器的行为拥有如此强大的控制权。尽管如此，此处描述的概念旨在鼓励读者在并非所有工具都可用的情况下，考虑替代解决方案。\n\n##### 创建自定义\
  \ 404 错误处理程序\n\n在本示例中，你将创建一个脚本，该脚本会向网站管理员发送一封包含错误详细报告的电邮，并显示一条请求用户谅解的消息。首先，创建一个`.htaccess`文件，将\
  \ 404 错误重定向到自定义脚本：\n\n```\nErrorDocument 404 /www/htdocs/errormessage.html\n```\n\
  \n如果你希望此行为在整个网站中生效，请将其放置在网站根目录。如果你不熟悉`.htaccess`文件，请参阅 Apache 文档以获取更多信息。\n\n接下来，创建通过邮件通知网站管理员并显示适当消息的错误处理脚本。该脚本如清单\
  \ 13-4 所示。\n\n**清单 13-4.** *邮件通知与简单消息显示*\n\n```php\n<?php\n\n// 服务器\n\n$servername\
  \ = $_SERVER['SERVER_NAME'];\n\n$recipient = \"webmaster@example.com\";\n\n$subject\
  \ = \"检测到 404 错误: \".$_SERVER['PHP_SELF']; \n$timestamp = date( \"F d, Y G:i:s\"\
  , time() );\n\n$referrer = $_SERVER['HTTP_REFERER'];\n\n$ip = $_SERVER['REMOTE_ADDR'];\n\
  \n$redirect = $_SERVER['REQUEST_URI'];\n\n$body = <<< body\n\n在 $timestamp 检测到 404\
  \ 错误。\n\n服务器: $servername\n\n缺失页面: $redirect\n\n来源文档: $referrer\n\n用户 IP 地址: $ip\n\
  \nbody;\n\nmail($recipient, $subject, $body, \"From: administrator\\r\\n\");\n\n\
  ?>\n\n<h3>文件未找到</h3>\n\n<p>\n\n请谅解，我们的网站当前正在进行维护。\n\n因此，您可能会偶尔遇到访问文档和/或服务的困难。\n\n\
  网站管理员已收到关于此事的详细事件日志邮件。\n\n</p>\n\n谢谢，<br />\n\n网站团队\n```\n\n当然，如果你的网站特别庞大，你可能需要考虑将错误信息写入日志文件或数据库，而不是通过电子邮件发送。\n\
  \n### 总结\n\nWeb 的一大优势是它使我们能够轻松地不仅传播，而且编译和汇总用户信息。然而，作为开发者，这意味着我们必须花费大量时间构建和维护众多用户界面，其中许多是复杂的\
  \ HTML 表单。本章描述的概念应该能帮助你减少一点这方面的时间。\n\n此外，本章提供了一些常见策略，用于在使用你的应用程序时改善整体用户体验。虽然这不是一份详尽的清单，但本章所呈现的内容或许能作为一个跳板，促使你进行进一步的实验，并帮助你减少在\
  \ Web 开发中最耗时的方面之一——改善用户体验——上所投入的时间。\n\n下一章将向你展示如何通过强制用户在进入前提供用户名和密码来保护网站的敏感区域。\n\
  \n"
- '# 第 14 章


  ## 身份验证


  **身**份验证是当今 Web 应用程序中的常见做法。这不仅出于安全相关的原因，还为了根据用户偏好和类型提供个性化功能。通常，系统会提示用户输入用户名和密码，这两者的组合构成了该用户的唯一标识值。在本章中，你将学习如何使用
  PHP 内置的身份验证功能来提示并验证这些信息。


  具体来说，本章将学习以下内容：


  - 基本的基于 HTTP 的身份验证概念

  - PHP 的身份验证变量，即`$_SERVER[''PHP_AUTH_USER'']`和`$_SERVER[''PHP_AUTH_PW'']`

  - 常用于实现身份验证程序的几个 PHP 函数

  - 三种常见的身份验证方法：将登录对（用户名和密码）硬编码到脚本中、基于文件的身份验证以及基于数据库的身份验证

  - 使用用户 IP 地址进一步限制身份验证凭据

  - 利用 PEAR 的`Auth_HTTP`包

  - 使用`CrackLib`扩展测试密码的可猜测性

  - 使用一次性 URL 恢复丢失的密码


  ### HTTP 身份验证概念


  HTTP 协议提供了一种相当简单但有效的用户身份验证手段，服务器用其来质询资源请求，客户端（浏览器）用其来提供与身份验证过程相关的信息。一个典型的身份验证过程如下：


  1. 客户端请求一个受限资源。

  2. 服务器以 401（未授权访问）响应消息来回应此请求。

  3. 客户端（浏览器）识别出 401 响应，并弹出一个类似图 14-1 所示的身份验证提示窗口。大多数现代浏览器都能理解 HTTP 身份验证并提供相应的功能，包括
  Internet Explorer、Netscape Navigator、Mozilla 和 Opera。

  4. 如果用户提供了正确的凭据（用户名和密码），它们会被发送回服务器进行验证。随后用户被允许访问该资源。但是，如果用户提供了错误或空白的凭据，则访问被拒绝。

  5. 如果用户验证通过，浏览器将身份验证信息存储在其身份验证缓存中。此缓存信息会保留在浏览器中，直到缓存被清除，或直到另一个 401 服务器响应被发送到浏览器。


  **图 14-1.** *身份验证提示*


  你应该理解，尽管 HTTP 身份验证有效地控制了对受限资源的访问，但它并未保护身份验证信息传输的通道。也就是说，一个位置合适的攻击者可以轻易地嗅探或监控服务器与客户端之间发生的所有流量。提供的用户名和密码都包含在此流量中，且均未加密。因此，要消除通过此类方法被入侵的可能性，你需要实现一个安全的通信通道，通常通过使用安全套接字层（SSL）来实现。所有主流
  Web 服务器都支持 SSL，包括 Apache 和微软 Internet 信息服务（IIS）。


  ### PHP 身份验证




  '
- "# 将用户身份验证集成到 Web 应用中\n\n将用户身份验证直接集成到 Web 应用程序逻辑中既方便又灵活；方便之处在于它整合了原本需要一定程度进程间通信的操作，而灵活之处在于集成的身份验证为与应用程序的其他组件（例如内容个性化和用户权限指定）集成提供了一种更简单的方法。在本章的剩余部分，我们将研究\
  \ PHP 内置的身份验证功能，并演示几种你可以立即开始集成到应用程序中的身份验证方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 第 14 章：身份验证\n\n#### 身份验证变量\n\nPHP 使用两个预定义变量来验证用户身份：`$_SERVER['PHP_AUTH_USER']`\
  \ 和 `$_SERVER['PHP_AUTH_PW']`。这些变量分别保存身份验证所需的两个组件，即用户名和密码。它们的用法将在以下示例中变得清晰。然而，目前在使用这些预定义变量时，有两个重要的注意事项需要牢记：\n\
  \n- 每个受限页面开始时都必须验证这两个变量。你可以通过包装每个受限页面轻松实现这一点，这意味着将身份验证代码放在一个单独的文件中，然后使用 `REQUIRE()`\
  \ 函数将该文件包含到受限页面中。\n- 这些变量在 PHP 的 CGI 版本中无法正常工作，在 Microsoft IIS 上也无法正常工作。请参阅关于 PHP\
  \ 身份验证和 IIS 的补充说明。\n\n##### PHP 身份验证和 IIS\n\n如果你正在将 IIS 与 PHP 的 ISAPI 模块结合使用，并且希望使用\
  \ PHP 的 HTTP 身份验证功能，则需要对本章提供的示例进行小幅修改。在使用 IIS 时，用户名和密码变量仍然对 PHP 可用，但不是通过 `$_SERVER['PHP_AUTH_USER']`\
  \ 和 `$_SERVER['PHP_AUTH_PW']`。相反，这些值必须从另一个服务器全局变量 `$_SERVER['HTTP_AUTHORIZATION']`\
  \ 中解析出来。因此，例如，你需要像这样解析这些变量：\n\n```\nlist($user, $pswd) = explode(':', base64_decode(substr($_SERVER['HTTP_AUTHORIZATION'],\
  \ 6)));\n```\n\n#### 有用的函数\n\n通过 PHP 处理身份验证时，通常使用两个标准函数：`header()` 和 `isset()`。本节将介绍这两个函数。\n\
  \n##### `header()`\n\n`void header(string *string* [, boolean *replace* [, int *http_response_code*]])`\n\
  \n`header()` 函数向浏览器发送原始的 HTTP 标头。`string` 参数指定发送给浏览器的标头信息。可选的 `replace` 参数决定此信息是替换还是附加到先前发送的标头。最后，可选的\
  \ `http_response_code` 参数定义了一个伴随标头信息的特定响应代码。请注意，你可以将此代码包含在 `string` 中，稍后将演示这一点。应用于用户身份验证时，此函数对于向浏览器发送\
  \ WWW 身份验证标头非常有用，从而显示弹出式身份验证提示。如果提交了不正确的身份验证凭据，它也可用于向用户发送 401 标头消息。示例如下：\n\n```php\n\
  <?php\nheader('WWW-Authenticate: Basic Realm=\"Book Projects\"');\nheader(\"HTTP/1.1\
  \ 401 Unauthorized\");\n...\n?>\n```\n\n请注意，除非启用了输出缓冲，否则这些命令必须在返回任何输出之前执行。忽略此规则将导致服务器错误，因为这违反了\
  \ HTTP 规范。\n\n##### `isset()`\n\n`boolean isset(mixed *var* [, mixed *var* [,...]])`\n\
  \n`isset()` 函数判断一个变量是否已被赋值。如果变量包含值，则返回 `TRUE`；否则返回 `FALSE`。应用于用户身份验证时，`isset()`\
  \ 函数可用于判断 `$_SERVER['PHP_AUTH_USER']` 和 `$_SERVER['PHP_AUTH_PW']` 变量是否已正确设置。清单 14-1\
  \ 提供了一个使用示例。\n\n**清单 14-1.** *使用 `isset()` 验证变量是否包含值*\n\n```php\n<?php\nif (isset($_SERVER['PHP_AUTH_USER'])\
  \ and isset($_SERVER['PHP_AUTH_PW'])) {\n    // 执行额外的身份验证任务\n} else {\n    echo\
  \ \"<p>请输入用户名和密码！</p>\";\n}\n?>\n```\n\n#### 身份验证方法\n\n有多种方法可以通过 PHP 脚本实现身份验证。当需要调用此类功能时，你应该考虑每种方法的范围和复杂性。具体来说，本节讨论了将登录信息对硬编码到脚本中、使用基于文件的身份验证、使用基于\
  \ IP 的身份验证、使用 PEAR 的 HTTP 身份验证功能以及使用基于数据库的身份验证。\n\n##### 硬编码身份验证\n\n限制资源访问的最简单方法是将用户名和密码直接硬编码到脚本中。清单\
  \ 14-2 提供了一个如何实现此操作的示例。\n\n**清单 14-2.** *针对硬编码登录信息对进行身份验证*\n\n```php\nif (($_SERVER['PHP_AUTH_USER']\
  \ != 'specialuser') ||\n    ($_SERVER['PHP_AUTH_PW'] != 'secretpassword')) {\n \
  \   header('WWW-Authenticate: Basic Realm=\"Secret Stash\"');\n    header('HTTP/1.0\
  \ 401 Unauthorized');\n    print('你必须提供正确的凭据！');\n    exit;\n}\n```\n\n此示例中的逻辑非常简单。如果\
  \ `$_SERVER['PHP_AUTH_USER']` 和 `$_SERVER['PHP_AUTH_PW']` 分别设置为 \"specialuser\"\
  \ 和 \"secretpassword\"，则代码块不会执行，并且该块之后的任何内容都会执行。否则，系统会提示用户输入用户名和密码，直到提供正确的信息或由于多次身份验证失败而显示\
  \ 401 Unauthorized 消息。\n\n尽管使用硬编码的身份验证信息对配置起来非常快速且简单，但它有几个缺点。首先，就目前的代码而言，所有需要访问该资源的用户都必须使用相同的身份验证信息对。通常，在现实场景中，每个用户都必须被唯一标识，以便可以提供用户特定的偏好或资源。尽管你可以通过添加额外的逻辑来允许多个登录信息对，但生成的代码会非常笨拙。其次，更改用户名或密码只能通过进入代码并手动修改来完成。接下来的两种方法可以满足这一需求。\n\
  \n##### 基于文件的身份验证\n\n通常你需要为每个用户提供一个唯一的登录信息对，从而可以记录用户特定的登录时间、移动和操作。你可以使用文本文件轻松实现这一点，该文件非常类似于通常用于存储\
  \ Unix 用户信息的文件（`/etc/passwd`）。清单 14-3 提供了这样一个文件。每行包含一个用户名和一个加密的密码对，这两个元素用冒号（`:`）分隔。\n\
  \n**清单 14-3.** *包含加密密码的 `authenticationFile.txt` 文件*\n\n```\njason:60d99e58d66a5e0f4f89ec3ddd1d9a80\n\
  donald:d5fc4b0e45c8f9a333c0056492c191cf\nmickey:bc180dbc583491c00f8a1cd134f7517b\n\
  ```\n\n关于 `authenticationFile.txt` 的一个关键安全考虑因素是，此文件应存储在服务器文档根目录之外。如果不是，攻击者可能通过暴力猜测发现该文件，从而泄露一半的登录组合。此外，尽管你可以选择跳过密码加密并以纯文本格式存储，但强烈不鼓励这种做法，因为如果文件权限配置不正确，有权访问服务器的用户可能能够查看登录信息。\n\
  \n\n\n## 第 14 章：身份验证\n\n用于解析此文件并根据给定的登录对验证用户身份的 PHP 脚本，仅比用于根据硬编码验证对进行身份验证的脚本稍微复杂一些。区别在于，该脚本还必须将文本文件读入一个数组，然后遍历该数组以查找匹配项。这涉及到使用几个函数，包括以下内容：\n\
  \n- `file(string filename)`：`file()` 函数将文件读入一个数组，数组的每个元素对应文件中的一行。\n- `explode(string\
  \ separator, string string [, int limit])`：`explode()` 函数将一个字符串分割成一系列子字符串，每个字符串的边界由特定的分隔符确定。\n\
  - `md5(string str)`：`md5()` 函数使用 RSA Data Security Inc. 的 MD5 消息摘要算法（http://www.rsa.com）计算字符串的\
  \ MD5 哈希值。\n\n**注意：** 尽管它们在功能上相似，但你应该使用 `explode()` 而不是 `split()`，因为 `split()` 调用了\
  \ PHP 的正则表达式解析引擎，速度稍慢。\n\n清单 14-4 展示了一个 PHP 脚本，它能够解析 `authenticationFile.txt`，并可能将用户的输入与登录对匹配。\n\
  \n**清单 14-4.** *针对平面文件登录存储库验证用户*\n\n```php\n<?php\n\n// 预设身份验证状态为 false\n\n$authorized\
  \ = FALSE;\n\nif (isset($_SERVER['PHP_AUTH_USER']) && isset($_SERVER['PHP_AUTH_PW']))\
  \ {\n\n    // 将身份验证文件读入一个数组\n\n    $authFile = file(\"/usr/local/lib/php/site/authenticate.txt\"\
  );\n\n    // 遍历文件中的每一行，搜索身份验证匹配项\n    foreach ($authFile as $login) {\n\n      \
  \  list($username, $password) = explode(\":\", $login);\n\n        // 从密码中移除换行符\n\
  \n        $password = trim($password);\n\n        if (($username == $_SERVER['PHP_AUTH_USER'])\
  \ &&\n            ($password == md5($_SERVER['PHP_AUTH_PW']))) {\n\n           \
  \ $authorized = TRUE;\n\n            break;\n\n        }\n\n    }\n\n}\n\n// 如果未授权，则显示身份验证提示或\
  \ 401 错误\n\nif (! $authorized) {\n\n    header('WWW-Authenticate: Basic Realm=\"\
  Secret Stash\"');\n    header('HTTP/1.0 401 Unauthorized');\n\n    print('你必须提供正确的凭据！');\n\
  \n    exit;\n\n}\n\n// 受限制的内容放在这里...\n\n?>\n```\n\n尽管基于文件的身份验证系统对于相对较小且静态的身份验证列表效果很好，但当你处理大量用户、用户被频繁添加、删除和修改，或者需要将身份验证方案集成到更大的信息基础设施中时（例如，集成到预先存在的用户表中），这种策略可能变得有些不方便。这些需求通过实现基于数据库的解决方案可以更好地满足。下一节将演示这样一个解决方案，使用\
  \ PostgreSQL 数据库来存储身份验证对。\n\n##### 基于数据库的身份验证\n\n在本章讨论的所有各种身份验证方法中，实现基于数据库的解决方案是最强大的方法，因为它不仅增强了管理便利性和可伸缩性，而且可以集成到更大的数据库基础设施中。出于本示例的目的，我们将数据存储限制为四个字段——一个主键、用户的全名、一个用户名和一个密码。这些列被放入一个我们称之为\
  \ `userauth` 的表中，如清单 14-5 所示。\n\n**注意：** 如果你不熟悉 PostgreSQL 服务器，并对以下示例中的语法感到困惑，请考虑复习第\
  \ 30 章中的内容。\n\n**清单 14-5.** *一个用户身份验证表*\n\n```sql\ncreate table userauth (\n\n \
  \   rowid serial,\n\n    commonname varchar(35) not null,\n\n    username varchar(8)\
  \ not null,\n\n    pswd varchar(32) not null,\n\n    CONSTRAINT userauth_id PRIMARY\
  \ KEY(rowid)\n\n);\n```\n\n清单 14-6 展示了用于根据存储在 `userauth` 表中的信息验证用户提供的用户名和密码的代码。\n\
  \n**清单 14-6.** *针对 PostgreSQL 表验证用户*\n\n```php\n<?php\n\n/* 因为身份验证提示需要被调用两次，\n\n\
  \   所以将其嵌入到一个函数中。\n\n*/\n\nfunction authenticate_user() {\n\n    header('WWW-Authenticate:\
  \ Basic realm=\"Secret Stash\"');\n    header(\"HTTP/1.0 401 Unauthorized\");\n\n\
  \    exit;\n\n}\n\n/* 如果 $_SERVER['PHP_AUTH_USER'] 为空，则用户尚未被提示输入身份验证信息。\n\n*/\n\n\
  if (! isset($_SERVER['PHP_AUTH_USER'])) {\n\n    authenticate_user();\n\n} else\
  \ {\n\n    // 连接到 PostgreSQL 数据库\n\n    $conn = pg_connect(\"host=localhost dbname=corporate\n\
  \n                        user=authentication password=secret\")\n             \
  \           or die(pg_last_error($conn));\n\n    // 创建并执行选择查询\n\n    $query = \"\
  SELECT username, pswd FROM userauth\n              WHERE username='$_SERVER[PHP_AUTH_USER]'\
  \ AND\n              pswd=md5('$_SERVER[PHP_AUTH_PW]')\";\n\n    $result = pg_query($conn,\
  \ $query);\n\n    // 如果没有找到任何内容，则重新提示用户输入登录信息\n    if (pg_num_rows($result) == 0)\
  \ {\n\n        authenticate_user();\n\n    } else {\n\n        echo \"欢迎访问秘密档案库！\"\
  ;\n\n    }\n\n}\n\n?>\n```\n\n尽管 PostgreSQL 身份验证比前两种方法更强大，但实现起来其实非常简单。只需使用输入的用户名和密码作为查询条件，对\
  \ `userauth` 表执行一个选择查询即可。当然，这种解决方案并不依赖于特定使用 PostgreSQL 数据库；任何关系型数据库都可以替代它。\n\n#####\
  \ 基于 IP 的身份验证\n\n有时你需要更高级别的访问限制来确保用户的有效性。当然，用户名/密码组合并非万无一失；这些信息可以透露给其他人，或者从用户那里窃取。它也可能通过推断或暴力破解被猜到，尤其是在用户选择了较差的登录组合的情况下，这种情况仍然相当普遍。\n\
  \n为了解决这个问题，进一步加强身份验证有效性的一种有效方法是，不仅要求有效的用户名/密码登录对，还要求特定的 IP 地址。为此，你只需稍微修改上一节中使用的\
  \ `userauth` 表，并对清单 14-6 中使用的查询进行微小修改。首先是表，如清单 14-7 所示。\n\n**清单 14-7.** *重新审视 userauth\
  \ 表*\n\n```sql\ncreate table userauth (\n\n    rowid serial,\n\n    commonname varchar(35)\
  \ not null,\n\n    username varchar(8) not null,\n\n    pswd varchar(32) not null,\n\
  \n    ipaddress varchar(15) not null,\n\n    CONSTRAINT userauth_id PRIMARY KEY(rowid)\n\
  \n);\n```\n\n用于验证用户名/密码和 IP 地址的代码如清单 14-8 所示。\n\n**清单 14-8.** *使用登录对和 IP 地址进行身份验证*\n\
  \n```php\n<?php\n\nfunction authenticate_user() {\n\n    header('WWW-Authenticate:\
  \ Basic realm=\"Secret Stash\"');\n    header(\"HTTP/1.0 401 Unauthorized\");\n\n\
  \    exit;\n\n}\n\nif(! isset($_SERVER['PHP_AUTH_USER'])) {\n\n    authenticate_user();\n\
  \n} else {\n\n    // 连接到 PostgreSQL 数据库\n\n    $conn = pg_connect(\"host=localhost\
  \ dbname=corporate\n\n                        user=authentication password=secret\"\
  )\n                        or die(pg_last_error($conn));\n\n    // 创建并执行选择查询\n\n\
  \    $query = \"SELECT username, pswd FROM userauth\n              WHERE username='$_SERVER[PHP_AUTH_USER]'\
  \ AND\n              pswd=MD5('$_SERVER[PHP_AUTH_PW]') AND\n              ipaddress='$_SERVER[REMOTE_ADDR]'\"\
  ;\n\n    $result = pg_query($conn, $query);\n\n    // 如果没有找到任何内容，则重新提示用户输入登录信息\n\
  \    if (pg_num_rows($result) == 0) {\n\n        authenticate_user();\n\n    } else\
  \ {\n\n        echo \"欢迎访问秘密档案库！\";\n\n    }\n\n}\n\n?>\n```\n\n\n\n尽管这一额外的安全层效果不错，但你需要明白它并非万无一失。IP\
  \ 欺骗（即诱骗网络，使其误以为流量来自某个特定 IP 地址）这一手段，长期以来一直是精明攻击者的惯用工具。\n\n因此，如果攻击者获取了用户的用户名和密码，他们就有可能绕过你基于\
  \ IP 的安全障碍。\n\n#### 利用 `PEAR: Auth_HTTP`\n\n虽然前面讨论的认证方法已经足够好用，但将一些实现细节封装在类中总是更令人愉悦。PEAR\
  \ 类 `Auth_HTTP` 很好地满足了这一需求，它利用 Apache 的认证机制和提示（见图 14-1）生成相同的提示，但使用 PHP 来管理认证信息。`Auth_HTTP`\
  \ 封装了用户认证中许多琐碎的方面，通过一个便捷的接口将我们所需的信息和功能暴露出来。此外，由于它继承自 `Auth` 类，`Auth_HTTP` 还提供了广泛的认证存储机制，其中包括\
  \ DB 数据库抽象包、LDAP、POP3、IMAP、RADIUS 和 SAMBA。在本节中，我们将演示如何利用 `Auth_HTTP` 将用户认证信息存储在平面文件中。\n\
  \n##### 安装 `Auth_HTTP`\n\n要利用 `Auth_HTTP` 的功能，你需要从 PEAR 安装它。因此，启动 PEAR 并传入以下参数：\n\
  \n```\n%>pear install -o auth_http\n```\n\n由于 `auth_http` 依赖于另一个包（`Auth`），你至少应传入\
  \ `-o` 选项，该选项将安装这个必需的包。执行此命令后，你将看到类似下面的输出：\n\n```\ndownloading Auth_HTTP-2.1.6.tgz\
  \ ...\nStarting to download Auth_HTTP-2.1.6.tgz (9,327 bytes)\n.....done: 9,327\
  \ bytes\ndownloading Auth-1.2.3.tgz ...\nStarting to download Auth-1.2.3.tgz (24,040\
  \ bytes)\n...done: 24,040 bytes\n```\n\n```\nskipping Package 'auth' optional dependency\
  \ 'File_Passwd'\nskipping Package 'auth' optional dependency 'Net_POP3'\nskipping\
  \ Package 'auth' optional dependency 'DB'\nskipping Package 'auth' optional dependency\
  \ 'MDB'\nskipping Package 'auth' optional dependency 'Auth_RADIUS'\nskipping Package\
  \ 'auth' optional dependency 'File_SMBPasswd'\nOptional dependencies:\npackage 'File_Passwd'\
  \ version >= 0.9.5 is recommended to utilize some features.\npackage 'Net_POP3'\
  \ version >= 1.3 is recommended to utilize some features.\npackage 'MDB' is recommended\
  \ to utilize some features.\npackage 'Auth_RADIUS' is recommended to utilize some\
  \ features.\npackage 'File_SMBPasswd' is recommended to utilize some features.\n\
  install ok: Auth 1.2.3\ninstall ok: Auth_HTTP 2.1.6\n%>\n```\n\n安装完成后，你就可以开始利用 `Auth_HTTP`\
  \ 的功能了。为了演示，我们将考虑如何针对 PostgreSQL 数据库进行认证。\n\n##### 针对 PostgreSQL 数据库进行认证\n\n由于 `Auth_HTTP`\
  \ 是 `Auth` 包的子类，它继承了 `Auth` 的所有功能。而 `Auth` 是 `DB` 包的子类，因此 `Auth_HTTP` 可以利用这个流行的数据库抽象层将认证信息存储在数据库表中。为了存储信息，我们将使用一个与本章前面使用的完全相同的表：\n\
  \n```sql\ncreate table userauth (\nrowid serial,\ncommonname varchar(35) not null,\n\
  username varchar(8) not null,\npswd varchar(32) not null,\nCONSTRAINT userauth_id\
  \ PRIMARY KEY(rowid)\n);\n```\n\n接下来，我们需要创建一个脚本，调用 `Auth_HTTP` 并告知它引用一个 PostgreSQL\
  \ 数据库。该脚本如清单 14-9 所示。\n\n**清单 14-9.** *使用 Auth_HTTP 验证用户凭据*\n\n```php\n<?php\nrequire_once(\"\
  Auth/HTTP.php\");\n\n// 指定认证凭据、表名、\n// 用户名和密码列、密码加密类型、\n// 以及用于检索其他字段的查询参数\n$dblogin\
  \ = array (\n'dsn' => \"pgsql://corpweb:secret@localhost/corporate\",\n'table' =>\
  \ \"userauth\",\n'usernamecol' => \"username\",\n'passwordcol' => \"pswd\",\n'cryptType'\
  \ => \"md5\"\n'db_fields' => \"*\"\n);\n\n// 实例化 Auth_HTTP\n$auth = new Auth_HTTP(\"\
  DB\", $dblogin) or die(\"blah\");\n\n// 开始认证过程\n$auth->start();\n\n// 认证失败时提供的消息\n\
  $auth->setCancelText('认证凭据不被接受！');\n\n// 检查凭据。如果不存在，则提示输入\nif($auth->getAuth())\n\
  {\necho \"欢迎, $auth->commonname<br />\";\n}\n?>\n```\n\n执行清单 14-9 中的代码，并传入与 `userauth`\
  \ 表中信息匹配的数据，用户就能进入受限区域。否则，用户将收到 `setCancelText()` 中提供的错误消息。\n\n代码中的注释应该足以引导你理解代码含义，也许除了\
  \ `$dblogin` 数组之外。这个数组与数据源类型的声明一起被传入 `Auth_HTTP` 的构造方法。有关可接受的数据源类型列表，请参阅 `http://pear.php.net/package/Auth_HTTP`\
  \ 上的 `Auth_HTTP` 文档。该数组的第一个元素 `dsn` 代表数据源名称（DSN）。DSN 必须采用以下格式：\n\n```\n数据源标题:用户名:密码@主机名/数据库\n\
  ```\n\n因此，我们使用以下 DSN 登录 PostgreSQL 数据库：`pgsql://corpweb:secret@localhost/corporate`\n\
  \n如果是 MySQL 数据库，且其他条件相同，则 `数据源标题` 应设置为 `mysql`。有关可接受的 `数据源标题` 值的完整列表，请参阅 `http://pear.php.net/package/DB`\
  \ 上的 `DB` 文档。\n\n接下来的三个元素，即 `table`、`usernamecol` 和 `passwordcol`，分别代表存储认证信息的表、存储用户名的列名和存储密码的列名。\n\
  \n`cryptType` 元素指定密码是以明文形式还是以 MD5 哈希值的形式存储在数据库中。如果是明文存储，`cryptType` 应设置为 `none`；而如果是\
  \ MD5 哈希值存储，则应设置为 `md5`。\n\n最后，`db_fields` 元素提供了用于检索其他表信息（例如 `commonname` 字段）的查询参数。\n\
  \n`Auth_HTTP`、其父类 `Auth` 以及 `DB` 数据库抽象类为用户提供了一组强大的功能，能够完成原本繁琐的任务。务必花时间访问 PEAR 网站，了解更多关于这些包的信息。\n\
  \n#### 用户登录管理\n\n当你在应用程序中集成用户登录时，提供可靠的认证机制只是整个图景的一部分。如何确保用户选择了一个可靠的密码，其复杂度足以让攻击者无法将其作为可能的攻击途径？此外，你如何处理用户忘记密码这一不可避免的事件？本节将详细讨论这两个主题。\n\
  \n##### 密码设定\n\n密码通常是在某种用户注册过程中设定的，通常是在用户注册成为网站会员时。除了提供各种信息（例如用户的姓名和电子邮件地址）外，用户通常还会被提示设定一个用户名和密码，以便以后登录网站。你将创建一个此类注册过程的工作示例，并使用以下表来存储用户数据：\n\
  \n```sql\ncreate table userauth (\nrowid serial,\ncommonname varchar(35) not null,\n\
  email varchar(55) not null,\nusername varchar(8) not null,\npswd varchar(32) not\
  \ null,\nCONSTRAINT userauth_id PRIMARY KEY(rowid)\n);\n```\n\n\n\n"
- "# 清单 14-10\n\n`清单 14-10`提供了注册代码。为了节省篇幅，我们省略了注册表单的 HTML 代码，因为你现在应该已经对这种语法相当熟悉了。如图\
  \ 14-2 所示的这个表单存储在名为`registration.html`的文件中，并通过`file_get_contents()`函数显示。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![图 15](img/index-357_1.png)\n\n**338**\n\n第 14 章 ■ 身份验证\n\n**图 14-2.** *注册表单*\n\
  \n用户提供必要的输入并提交表单数据。随后脚本会确认密码和密码验证字符串是否匹配，如果不匹配则显示错误信息。\n\n如果密码验证通过，则会建立与 PostgreSQL\
  \ 服务器的连接，并执行相应的插入查询。\n\n**清单 14-10.** *用户注册（registration.php）*\n\n```php\n<?php\n\
  \n/*\n用户是否提交了数据？\n如果没有，则显示注册表单。\n*/\n\nif (! isset($_POST['submitbutton'])) {\n\n\
  echo file_get_contents(\"/templates/registration.html\");\n\n/* 表单数据已提交。 */\n\n\
  } else {\n\n$conn=pg_connect(\"host=localhost dbname=corporate\nuser=corpweb password=secret\"\
  )\nor die(pg_last_error($conn));\n\n/* 确保密码与密码验证器匹配。 */\n\nif ($_POST['pswd'] !=\
  \ $_POST['pswdagain']) {\n\necho \"<p>密码不匹配。请返回并重试。</p>\";\n\n/* 密码匹配，尝试将信息插入到 userauth\
  \ 表中。 */\n\n} else {\n\ntry {\n\n$query = \"INSERT INTO userauth (commonname, email,\
  \ username, pswd) VALUES ('$_POST[name]', '$_POST[email]',\n'$_POST[username]',\
  \ md5('$_POST[pswd]'));\n$result = pg_query($query);\n\nif (! $result) {\n\nthrow\
  \ new Exception(\n\"遇到注册问题！\"\n);\n\n} else {\n\necho \"<p>注册成功！</p>\";\n}\n\n}\
  \ catch(Exception $e) {\n\necho \"<p>\".$e->getMessage().\"</p>\";\n} #endCatch\n\
  }\n}\n?>\n```\n\n这里提供的注册脚本仅用于演示目的；如果你希望在关键任务应用程序中使用此类脚本，则需要包含额外的错误检查机制。以下只是需要验证的几项内容：\n\
  \n• 所有字段均已填写。\n• 电子邮件地址有效。这一点很重要，因为电子邮件地址很可能是密码恢复等事宜的主要沟通途径（下一节将讨论此主题）。\n• 密码和密码验证字符串匹配（上述示例已完成）。\n\
  • 数据库中尚不存在该用户。\n• 没有潜在恶意代码被插入到字段中。此问题将在第 21 章详细讨论。\n• 密码长度足够且密码语法正确。仅由字母或数字组成的较短密码，在遭遇持续尝试时，更有可能被破解。\n\
  \n##### 使用 CrackLib 库测试密码可猜测性\n\n由于害怕忘记密码，用户往往会选择容易记住的内容，例如他们狗狗的名字、母亲的 maiden name（娘家姓），甚至自己的名字或年龄。讽刺的是，这种做法通常并不能帮助用户记住密码，更糟糕的是，它为攻击者提供了一条侵入本应受限制系统的捷径，要么通过研究用户背景并尝试各种密码直到找到正确的，要么通过暴力破解反复尝试来识别密码。\n\
  \n无论哪种情况，密码通常都会被破解，因为用户选择了一个易于猜测的密码，这不仅可能导致用户个人数据泄露，还可能危及系统本身。\n\n通过将无约束的密码创建过程转变为自动化的密码审批程序，可以相当简单地降低引入此类易猜测密码的可能性。PHP\
  \ 通过 Alec Muffett（http://www.crypticide.org/users/alecm/）创建的 CrackLib 库为此提供了绝佳的手段。CrackLib\
  \ 旨在通过设定某些基准来测试密码的强度，从而判断其可猜测性，这些基准包括：\n\n• **长度：** 密码必须长于四个字符。\n• **大小写：** 密码不能全是小写字母。\n\
  • **区分度：** 密码必须包含足够的字符差异。此外，密码不能为空。\n• **常见性：** 密码不能基于字典中的单词。此外，密码不能基于字典中单词的反写。本小节将稍后进一步讨论字典。\n\
  • **标准编号：** 由于 CrackLib 的作者是英国人，他认为检查类似于国家保险号码（NI 号码）的模式是个好主意。NI 号码在英国用于税务目的，类似于美国使用的社会安全号码（SSN）。巧合的是，这两个号码都是九位字符，如果用户愚蠢到使用如此敏感的身份标识作为密码，该机制可以有效阻止其使用。\n\
  \n###### 安装 PHP 的 CrackLib 扩展\n\n要使用 CrackLib 扩展，首先需要下载并安装 CrackLib 库，可从 http://www.crypticide.org/users/alecm/\
  \ 获取。如果你运行的是 Linux/Unix 变体，它可能已经安装，因为 CrackLib 通常与这些操作系统捆绑在一起。完整的安装说明可在 CrackLib\
  \ tar 包中的 README 文件中找到。\n\nPHP 的 CrackLib 扩展自 5.0.0 版本起已从 PHP 中分离，并移至 PHP 扩展社区库（PECL），这是一个\
  \ PHP 扩展的存储库。因此，要使用 CrackLib，你需要从 PECL 下载并安装 crack 扩展。本书不涵盖 PECL 的内容，因此如果你想利用 CrackLib，请查阅\
  \ PECL 网站 http://pecl.php.net 上的扩展安装说明。\n\n安装 CrackLib 后，你需要确保`php.ini`中的`crack.default_dictionary`指令指向一个密码字典。这类字典在互联网上比比皆是，搜索一下就能找到许多结果。本小节稍后你将了解更多关于各类可供使用字典的信息。\n\
  \n###### 使用 CrackLib 扩展\n\n使用 PHP 的 CrackLib 扩展相当简单。清单 14-11 提供了一个完整的使用示例。\n\n**清单\
  \ 14-11.** *使用 PHP 的 CrackLib 扩展*\n\n```php\n<?php\n\n$pswd = \"567hejk39\";\n\n\
  /* 打开字典。请注意字典文件名不包含扩展名。 */\n\n$dictionary = crack_opendict('/usr/lib/cracklib_dict');\n\
  \n// 检查密码的可猜测性\n$check = crack_check($dictionary, $pswd);\n\n// 获取结果\necho crack_getlastmessage();\n\
  \n// 关闭字典\ncrack_closedict($dictionary);\n?>\n```\n\n在这个特定示例中，`crack_getlastmessage()`返回字符串“strong\
  \ password”，因为由`$pswd`表示的密码足够难以猜测。然而，如果密码较弱，可能会返回多种不同的消息之一。表 14-1 提供了一些其他密码，以及将它们传递给`crack_check()`后的结果。\n\
  \n**表 14-1.** *密码候选及 `crack_check()` 函数的响应*\n\n| **密码** | **响应** |\n|--------------|--------------|\n\
  | `mary` | 太短 |\n| `it’s WAY too short` | 过于简单/系统化 |\n| `street` | 未包含足够的**不同**字符\
  \ |\n\n通过编写简短的条件语句，你可以基于 CrackLib 返回的信息创建用户友好、详细的响应。当然，如果响应是“strong password”（强密码），\n\
  \n\n\n你可以允许用户选择的密码生效。\n\n##### 字典\n\n`Listing 14-11`使用了`cracklib_dict.pwd`字典，该字典由\
  \ CrackLib 在安装过程中生成。注意，在示例中，引用该文件时未包含扩展名`.pwd`。这似乎是 PHP 引用此文件时的一个特有问题，未来可能会发生变化，使得扩展名也成为必需。\n\
  \n你也可以自由使用其他字典，互联网上有大量免费字典可用。此外，你几乎可以找到针对每种口语的字典。牛津大学的 FTP 站点（`ftp.ox.ac.uk`）上有一个特别完整的字典仓库。除了大量语言字典外，该站点还提供许多有趣的专业字典，包括一个包含许多《星际迷航》剧情摘要关键词的字典。无论如何，无论你决定使用哪个字典，只需将其位置分配给`crack.default_dictionary`指令，或通过`crack_opencict()`打开它。\n\
  \n##### 一次性 URL 与密码恢复\n\n就像太阳升起一样确定，你的应用用户总会忘记密码。我们所有人都曾因忘记此类信息而感到内疚，而这并不完全是我们的错。花点时间列出你经常使用的所有登录组合；我猜你至少有\
  \ 12 种组合。\n\n电子邮件、工作站、服务器、银行账户、公用事业、在线购物、证券和抵押贷款经纪……如今我们几乎用密码管理一切。由于你的应用显然会为用户列表再添加一对登录信息，因此当用户忘记密码时，应提供一个简单、自动化的机制来检索或重置密码。根据登录所保护材料的敏感性，检索密码可能需要打电话或通过邮政服务发送密码。一如既往，在设计可能被入侵者利用的机制时要谨慎。本节探讨一种此类机制，称为一次性\
  \ URL。\n\n一次性 URL 通常提供给用户，以确保在没有其他认证机制可用时，或用户认为认证对于手头任务过于繁琐时的唯一性。例如，假设你维护一份新闻通讯订阅者列表，并想知道哪些订阅者以及有多少订阅者在实际阅读每月的每一期。\n\
  \n仅仅将新闻通讯嵌入电子邮件中是不够的，因为你永远不知道有多少订阅者只是从收件箱中删除邮件而不看内容。相反，你可以为他们提供一个指向新闻通讯的一次性 URL，其中一个可能如下所示：\n\
  \n`http://www.example.com/newsletter/0503.php?id=9b758e7f08a2165d664c2684fddbcde2`\n\
  \n为了准确知道哪些用户对该期新闻通讯感兴趣，每个用户都被分配了一个类似上述 URL 中所示的唯一 ID 参数，并存储在某个订阅者表中。这些值通常是伪随机的，使用\
  \ PHP 的`md5()`和`uniqid()`函数生成，如下所示：\n\n```\n$id = md5(uniqid(rand(),1));\n```\n\n\
  订阅者表可能类似于以下内容：\n\n```sql\nCREATE TABLE subscriber (\n    rowid serial,\n    email\
  \ varchar(55) not null,\n    uniqueid varchar(32) not null,\n    readNewsletter\
  \ char,\n    CONSTRAINT subscriber_id PRIMARY KEY(rowid)\n);\n```\n\n当用户点击此链接进入新闻通讯时，在显示新闻通讯之前可能会执行一个类似于以下内容的函数：\n\
  \n```php\nfunction read_newsletter($id) {\n    $query = \"UPDATE subscriber SET\
  \ readNewsletter='Y' WHERE uniqueid='$id'\";\n    return pg_query($query);\n}\n\
  ```\n\n\n\n结果就是，你将确切知晓有多少订阅者对这份简报感兴趣，因为他们都主动点击了链接。\n\n同样的概念也可以应用于密码恢复。为了说明如何实现，请考虑修改后的\
  \ `userauth` 表，如代码清单 14-12 所示。\n\n**代码清单 14-12.** *修改后的 `userauth` 表*\n\n```\ncreate\
  \ table userauth (\n\nrowid serial,\n\ncommonname varchar(35) not null,\n\nusername\
  \ varchar(8) not null,\n\npswd varchar(32) not null,\n\nuniqueidentifier varchar(32)\
  \ not null,\n\nCONSTRAINT userauth_id PRIMARY KEY(rowid)\n\n);\n```\n\n假设该表中的某个用户忘记了密码，于是他点击了登录提示附近常见的“忘记密码？”链接。用户会进入一个页面，要求他输入电子邮件地址。输入地址并提交表单后，会执行一个类似于代码清单\
  \ 14-13 所示的脚本。\n\n**代码清单 14-13.** *一次性 URL 生成器*\n\n```\n<?php\n\n// 创建唯一标识符\n\n\
  $id = md5(uniqid(rand(),1));\n\n// 将用户的唯一标识符字段设置为唯一 ID\n\n$query = \"UPDATE userauth\
  \ SET uniqueidentifier='$id' WHERE email=$_POST[email]\"; $result = pg_query($query);\n\
  \n$email = <<< email\n\n亲爱的用户，\n\n请点击以下链接重置您的密码：\n\nhttp://www.example.com/users/lostpassword.php?id=$id\n\
  \nemail;\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**344**\n\n第 14\
  \ 章 认证\n\n// 通过电子邮件向用户发送密码重置选项\n\nmail($_POST['email'],\"密码恢复\",\"$email\",\"发件人：services@example.com\"\
  ); echo \"<p>重置密码的说明已发送至 $_POST[email]</p>\";\n\n?>\n```\n\n当用户收到这封电子邮件并点击链接后，他会被引导至代码清单\
  \ 14-14 中所示的脚本 `lostpassword.php`。\n\n**代码清单 14-14.** *重置用户密码*\n\n```\n<?php\n\n\
  // 创建一个长度为五个字符的伪随机密码\n\n$pswd = substr(md5(uniqid(rand(),1),5));\n\n// 使用新密码更新 userauth\
  \ 表\n\n$query = \"UPDATE userauth SET pswd='$pswd' WHERE uniqueidentifier=$_GET[id]\"\
  ; $result = pg_query($query);\n\n// 向用户显示新密码\n\necho \"<p>您的密码已重置为 $pswd。请登录并将密码更改为您喜欢的密码。</p>\"\
  ;\n\n?>\n```\n\n当然，这只是众多恢复机制中的一种。例如，你可以使用类似的脚本为用户提供一个重置自己密码的表单。\n\n### 本章小结\n\n\
  本章介绍了 PHP 的认证功能，这些特性几乎肯定会被整合到你未来的许多应用程序中。除了讨论围绕该功能的基本概念外，我们还研究了几种常见的认证方法，包括：针对硬编码值的认证、基于文件的认证、基于数据库的认证、基于\
  \ IP 的认证，以及使用 PEAR 的 HTTP 认证功能。我们还探讨了如何通过 PHP 的 CrackLib 扩展来降低密码的可猜测性。最后，我们讨论了使用一次性\
  \ URL 进行密码恢复的方法。\n\n下一章将讨论另一组常用的 PHP 功能——通过浏览器处理文件上传。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- '# 处理文件上传


  尽管大多数人倾向于将互联网仅等同于网页，但 HTTP 协议实际上促进了任何类型文件的传输，例如 Microsoft Office 文档、PDF、可执行文件、MPEG、压缩文件以及各种其他文件类型。虽然从历史上看，FTP
  一直是向服务器上传文件的标准方式，但通过基于 Web 的界面进行此类文件传输正变得越来越普遍。在本章中，你将全面了解 PHP 的文件上传处理能力。具体来说，本章主题包括：


  - PHP 的文件上传配置指令

  - 用于处理文件上传数据的 PHP `$_FILES` 超全局数组

  - PHP 内置的文件上传函数：`is_uploaded_file()` 和 `move_uploaded_file()`




  '
- "# 上传脚本可能返回值的概述\n\n一如既往，本章提供了大量真实案例，助您深入理解这一主题。\n\n### 通过 HTTP 协议上传文件\n\n通过网页浏览器上传文件的方式于\
  \ 1995 年 11 月正式规范化，当时施乐公司的埃内斯托·内贝尔与拉里·马辛特在 RFC 1867《HTML 中基于表单的文件上传》（http://www.ietf.org/rfc/rfc1867.txt）中提出了标准化方案。这份备忘录不仅奠定了\
  \ HTML 支持文件上传所需改进的基础（随后被纳入 HTML 3.0），还定义了一种新的互联网媒体类型：`multipart/form-data`。\n\n\
  之所以需要这种新媒体类型，是因为用于编码“普通”表单值的标准类型 `application/x-www-form-urlencoded` 在处理大量二进制数据（如通过此类表单接口上传的数据）时效率过低。以下是一个文件上传表单的示例，图\
  \ 15-1 展示了其对应的输出截图：\n\n```html\n<form action=\"uploadmanager.html\" enctype=\"multipart/form-data\"\
  \ method=\"post\">\n  姓名：<br />\n  <input type=\"text\" name=\"name\" value=\"\"\
  \ /><br />\n  电子邮件：<br />\n  <input type=\"text\" name=\"email\" value=\"\" /><br\
  \ />\n  作业：<br />\n  <input type=\"file\" name=\"homework\" value=\"\" /><br />\n\
  \  <p><input type=\"submit\" name=\"submit\" value=\"提交作业\" /></p>\n</form>\n```\n\
  \n**图 15-1.** *包含“文件”输入类型标签的 HTML 表单*\n\n需要注意的是，该表单仅实现了部分预期功能；虽然 `file` 输入类型及其他上传相关属性规范了文件通过\
  \ HTML 页面发送至服务器的方式，但并未提供确定文件到达服务器后如何处理的能力。\n\n接收并后续处理上传文件的功能由上传处理器实现，该处理器可通过服务器进程或具备处理能力的服务端语言（如\
  \ Perl、Java、PHP）创建。本章剩余部分将专门探讨上传流程的这一方面。\n\n### 使用 PHP 处理上传\n\n通过 PHP 成功管理文件上传，是多项配置指令、`$_FILES`\
  \ 超全局变量以及正确编码的 Web 表单协同作用的结果。后续章节将分别介绍这三个主题，并辅以多个示例。\n\n#### PHP 的文件上传/资源指令\n\n\
  多项配置指令可用于精细调整 PHP 的文件上传功能。这些指令决定了 PHP 是否支持文件上传、允许上传的最大文件大小、脚本允许分配的最大内存，以及其他关键资源基准。本节将介绍这些指令。\n\
  \n##### `file_uploads`（布尔型）\n- **作用域：** `PHP_INI_SYSTEM`；**默认值：** `1`\n\n`file_uploads`\
  \ 指令决定服务器上的 PHP 脚本是否接受文件上传。\n\n##### `max_execution_time`（整型）\n- **作用域：** `PHP_INI_ALL`；**默认值：**\
  \ `30`\n\n`max_execution_time` 指令决定 PHP 脚本在触发致命错误前允许执行的最长时间（秒）。\n\n##### `memory_limit`（整型）M\n\
  - **作用域：** `PHP_INI_ALL`；**默认值：** `8M`\n\n`memory_limit` 指令设定了脚本允许分配的最大内存量（以兆字节为单位）。注意：该设置必须使用整数后跟\
  \ `M` 的形式才能生效。这有助于防止失控脚本占用服务器内存，甚至在某些情况下导致服务器崩溃。此指令仅在编译时设置了 `--enable-memory-limit`\
  \ 标志时生效。\n\n##### `upload_max_filesize`（整型）M\n- **作用域：** `PHP_INI_SYSTEM`；**默认值：**\
  \ `2M`\n\n\n\n`upload_max_filesize`指令决定了上传文件的最大大小（以兆字节为单位）。该指令应小于`post_max_size`（下一节之后会介绍），因为它仅适用于通过文件输入类型传递的信息，而不适用于通过`POST`实例传递的所有信息。与`memory_limit`类似，请注意整数值后面必须跟`M`。\n\
  \n`upload_tmp_dir`（字符串）\n\n作用域：`PHP_INI_SYSTEM`；默认值：`Null`\n\n由于上传的文件必须成功传输到服务器后才能开始后续处理，因此需要为这些文件指定一个临时存储区域，作为它们在移动到最终位置之前的临时存放位置。该位置通过`upload_tmp_dir`指令指定。例如，假设您想将上传的文件临时存储在`/tmp/phpuploads/`目录中，则应使用以下配置：`upload_tmp_dir\
  \ = \"/tmp/phpuploads/\"`\n\n请记住，此目录必须对拥有服务器进程的用户可写。\n\n因此，如果用户`nobody`拥有`Apache`进程，那么用户`nobody`应该是临时上传目录的所有者，或者是拥有该目录的组的成员。如果未这样做，则用户`nobody`将无法将文件写入该目录，除非为目录分配了全局写入权限。\n\
  \n`post_max_size`（整数）`M`\n\n作用域：`PHP_INI_SYSTEM`；默认值：`8M`\n\n`post_max_size`指令决定了通过`POST`方法可以接受的信息的最大允许大小（以兆字节为单位）。根据经验，此指令设置应大于`upload_max_filesize`，以考虑除上传文件之外可能传递的任何其他表单字段。与`memory_limit`和`upload_max_filesize`类似，请注意整数值后面必须跟`M`。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**348**\n\n第 15 章 ■ 处理文件上传\n\
  \n**$_FILES 数组**\n\n`$_FILES`超全局变量很特殊，因为它是预定义的`EGCPFS`（环境`Environment`、获取`GET`、\
  \ Cookie `Cookie`、放置`PUT`、文件`Files`、服务器`Server`）超全局数组中唯一一个二维的数组。其目的是存储与通过`PHP`脚本上传到服务器的文件（或多个文件）相关的各种信息。该数组总共提供五个项目，每个项目将在本节中介绍。\n\
  \n■**注意** 本节介绍的每个项目都引用了`userfile`。这仅仅是分配给文件上传表单元素名称的占位符。因此，此值可能会根据您选择的名称分配而改变。\n\
  \n`$_FILES['userfile']['error']`\n\n`$_FILES['userfile']['error']`数组值提供了与上传尝试结果相关的重要信息。总共有五种可能的返回值，一种表示成功，另外四种表示尝试中出现的特定错误。每个返回值的名称和含义将在后面的“上传错误消息”部分中介绍。\n\
  \n`$_FILES['userfile']['name']`\n\n`$_FILES['userfile']['name']`变量指定了文件在客户端机器上声明的原始名称，包括扩展名。因此，如果您浏览并选择了一个名为`vacation.jpg`的文件并通过表单上传，此变量将被赋值为`vacation.jpg`。\n\
  \n`$_FILES['userfile']['size']`\n\n`$_FILES['userfile']['size']`变量指定了从客户端机器上传的文件的大小（以字节为单位）。因此，对于`vacation.jpg`文件，此变量可能被赋值为`5253`或大约`5KB`。\n\
  \n`$_FILES['userfile']['tmp_name']`\n\n`$_FILES['userfile']['tmp_name']`变量指定了文件上传到服务器后分配给的临时名称。这是文件存储在临时目录（由`PHP`指令`upload_tmp_dir`指定）时所使用的名称。\n\
  \n`$_FILES['userfile']['type']`\n\n`$_FILES['userfile']['type']`变量指定了从客户端机器上传的文件的`MIME`类型。因此，对于`vacation.jpg`文件，此变量将被赋值为`image/jpeg`。如果上传的是`PDF`文件，则会赋值为`application/pdf`。\n\
  \n由于此变量有时会产生意外结果，您应该自己在脚本中显式验证它。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 15 章 ■ 处理文件上传\n\n**349**\n\n**PHP 的文件上传函数**\n\n除了通过`PHP`的文件系统库提供的众多文件处理函数（更多信息请参见第\
  \ 10 章）之外，`PHP`还提供了两个专门用于辅助文件上传过程的函数：`is_uploaded_file()`和`move_uploaded_file()`。本节将介绍每个函数。\n\
  \n`is_uploaded_file()`\n\n`boolean is_uploaded_file(string *filename*)`\n\n`is_uploaded_file()`函数确定由输入参数`filename`指定的文件是否使用`POST`方法上传。此函数旨在防止潜在攻击者操纵不应通过相关脚本交互的文件。例如，考虑一个场景：上传的文件可以立即通过公共站点存储库查看。假设攻击者希望提供一个比老套的课堂笔记更有趣的文件供其查看，比如`/etc/passwd`。因此，攻击者并没有像预期的那样导航到课堂笔记文件，而是直接在表单的文件上传字段中输入了`/etc/passwd`。\n\
  \n现在考虑以下`uploadmanager.php`脚本：\n\n```php\n<?php\n\ncopy($_FILES['classnotes']['tmp_name'],\n\
  \n\"/www/htdocs/classnotes/\".basename($classnotes));\n\n?>\n```\n\n这个编写不佳的示例的结果是，`/etc/passwd`文件被复制到了一个可公开访问的目录中。（继续，试试看。很吓人，对吧？）为了避免这样的问题，请使用`is_uploaded_file()`函数来确保表单字段（在本例中为`classnotes`）所标识的文件确实是通过表单上传的文件。以下是`uploadmanager.php`代码的改进和修订版本：\n\
  \n```php\n<?php\n\nif (is_uploaded_file($_FILES['classnotes']['tmp_name'])) {\n\n\
  copy($_FILES['classnotes']['tmp_name'],\n\n\"/www/htdocs/classnotes/\".$_FILES['classnotes']['name']);\n\
  \n} else {\n\necho \"<p>Potential script abuse attempt detected.</p>\";\n\n}\n\n\
  ?>\n```\n\n在修订后的脚本中，`is_uploaded_file()`检查`$_FILES['classnotes']['tmp_name']`标识的文件是否确实已上传。如果答案是肯定的，则将该文件复制到所需的目标位置。否则，将显示一条适当的错误消息。\n\
  \n`move_uploaded_file()`\n\n`boolean move_uploaded_file(string *filename*, string\
