    If you want to change the site title, all you have to do is edit site.conf.'
  trans: "\n# 主网页结构\n\n主网页包含三个主要区域。在后续章节中，你将用组件化模板填充两个表格单元格——一个用于部门列表，一个用于页面内容。\n\n\
    请注意左侧的部门列表、顶部的页眉，以及填充了首页信息的内容单元格。如前所述，这个内容单元格是浏览网站时唯一会变化的区域；无论访问哪个页面，其他两个单元格的外观都完全相同。这种实现方式既简化了程序员的工作，又能保持网站外观的一致性。\n\
    \n## 理解 Smarty 模板\n\n在继续之前，理解 Smarty 模板的工作原理非常重要。一切从 `index.php` 开始，因此你需要仔细查看它。以下是相关代码：\n\
    \n```php\n<?php\n\n// 加载 Smarty 库和配置文件\n\nrequire_once 'include/app_top.php';\n\
    \n// 加载 Smarty 模板文件\n\n$page = new Page();\n\n// 显示页面\n\n$page->display('index.tpl');\n\
    \n?>\n```\n\n目前，这个文件的功能非常简单。首先，它加载设置了全局变量的 `app_top.php`，然后加载 Smarty 模板文件——当客户端请求\
    \ `index.php` 时，该文件将生成实际的 HTML 内容。\n\n## 创建和配置 Smarty 页面\n\n创建和配置 Smarty 页面的标准方法如下列代码片段所示：\n\
    \n```php\n<?php\n\n// 加载 Smarty 库\n\nrequire_once SMARTY_DIR . 'Smarty.class.php';\n\
    \n// 创建一个 Smarty 类的新实例\n\n$smarty = new Smarty();\n\n$smarty->template_dir = TEMPLATE_DIR;\n\
    \n$smarty->compile_dir = COMPILE_DIR;\n\n$smarty->config_dir = CONFIG_DIR;\n\n\
    ?>\n```\n\n### Page 类\n\n在 HatShop 中，我们创建了一个继承自 `Smarty` 的 `Page` 类，其构造函数中包含初始化过程。这使\
    \ Smarty 模板的使用更加简便。以下是 `Page` 类的代码：\n\n```php\nclass Page extends Smarty\n{\n\n\
    \    // 类构造函数\n\n    public function __construct()\n    {\n\n        // 调用 Smarty\
    \ 的构造函数\n\n        parent::Smarty();\n\n        // 更改默认模板目录\n\n        $this->template_dir\
    \ = TEMPLATE_DIR;\n\n        $this->compile_dir = COMPILE_DIR;\n\n        $this->config_dir\
    \ = CONFIG_DIR;\n\n    }\n\n}\n```\n\n> **注意：** 构造函数的概念是面向对象编程术语中专用的。类的构造函数是一种特殊方法，当创建该类实例时会自动执行。在\
    \ PHP 中，类的构造函数被称为 `__construct()`。将这段代码写在 `Page` 类的构造函数中，可以确保在创建 `Page` 的新实例时自动执行。\n\
    \n## Smarty 模板文件\n\nSmarty 模板文件（`index.tpl`）除了少数细节外，包含的是简单的 HTML 代码。这些细节值得分析。在\
    \ `index.tpl` 中，HTML 代码开始之前，会加载配置文件 `site.conf`。\n\n```\n{* smarty *}\n{config_load\
    \ file=\"site.conf\"}\n```\n\n> **提示：** Smarty 注释用 `{*` 和 `*}` 标记括起来。\n\n### 站点配置变量\n\
    \n目前，`site.conf` 文件中设置的唯一变量是 `site_title`，它包含网站的名称。该变量的值用于在 HTML 代码中生成页面标题：\n\n\
    ```html\n<!DOCTYPE html PUBLIC \"-//W3C//DTD XHTML 1.1//EN\"\n\"http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd\"\
    >\n<html>\n<head>\n<title>{#site_title#}</title>\n<link href=\"hatshop.css\" type=\"\
    text/css\" rel=\"stylesheet\" />\n</head>\n```\n\n从配置文件加载的变量通过用井号（`#`）括起来引用，或者使用\
    \ Smarty 变量 `$smarty.config`，如下所示：\n\n```html\n<head>\n<title>{$smarty.config.site_title}</title>\n\
    </head>\n```\n\n我们使用 `{config_load file=\"site.conf\"}` 加载了 `site.conf` 配置文件，并通过\
    \ `{#site_title#}` 访问了 `site_title` 变量——当你需要获取站点标题时即可使用此方式。\n\n如果需要更改站点标题，只需编辑\
    \ `site.conf` 文件即可。\n"
- fmt: "Finally, it’s important to notice how to include a Smarty template in another\
    \ Smarty template. `index.tpl` references `header.tpl`, which will also be reused\
    \ in a number of other pages:\n\n```html\n<body>\n\n<div>\n\n<div class=\"left_box\"\
    >\n\nPlace list of departments here\n\n</div>\n\n{include file=\"header.tpl\"\
    }\n\n<div id=\"content\">\n\nPlace contents here\n\n</div>\n\n</div>\n\n</body>\n\
    \n</html>\n```\n\nLast, it’s worth noting that we’re using CSS (Cascading Style\
    \ Sheets). CSS allows setting formatting options in a centralized document that\
    \ is referenced from HTML files. If the job is done right, and CSS is used consistently\
    \ in a web site, CSS will allow you to make visual changes to the entire site\
    \ (or parts of the site) with very little effort, just by editing the CSS file.\
    \ There are many books and tutorials on CSS, including the free ones you can find\
    \ at [http://www.w3.org/Style/CSS/](http://www.w3.org/Style/CSS/) and [http://www.w3schools.com/css/default.asp](http://www.w3schools.com/css/default.asp).\
    \ Many useful CSS-related resources can be found at [http://www.csszengarden.com/](http://www.csszengarden.com/).\
    \ Using CSS is highly recommended because of the significant benefits it brings.\
    \ You’ll see much more action with CSS in Chapter 3.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Handling and Reporting Errors\n\nAlthough the code will be written to run\
    \ without any unpleasant surprises, there’s always a possibility that something\
    \ might go wrong when processing client requests. The best strategy to deal with\
    \ these unexpected problems is to find a centralized way to handle these errors\
    \ and perform certain actions when they do happen.\n\nPHP is known for its confusing\
    \ error messages. If you’ve worked with other programming languages, you probably\
    \ appreciate the information you can get from displaying the stack trace when\
    \ you have an error. Tracing information is not displayed by default when you\
    \ have a PHP error, so you’ll want to change this behavior. In the development\
    \ stage, tracing information will help you debug the application, and in a release\
    \ version, the error message must be reported to the site administrator. Another\
    \ problem is the tricky `E_WARNING` error message type because it’s hard to tell\
    \ whether it’s fatal or not for the application.\n\n> **Tip** If you don't remember\
    \ or don’t know what a PHP error message looks like, try adding the following\
    \ line in your `include/app_top.php` file:\n> \n> `require_once 'inexistent_file.php';`\n\
    > \n> Load the web site in your favorite browser, and notice the error message\
    \ you get. If you do this test, make sure to remove the problematic line afterwards!\n\
    \nIn the context of a live web application, errors can happen unexpectedly for\
    \ various reasons, such as software failures (operating system or database server\
    \ crashes, viruses, and so on) and hardware failures. It’s important to be able\
    \ to log these errors and eventually inform the web site administrator (perhaps\
    \ by sending an email message), so the error can be taken care of as fast as possible.\n\
    \nFor these reasons, we’ll start establishing an efficient error-handling and\
    \ reporting strategy. You’ll create a class named `ErrorHandler` that will manage\
    \ the error handling. In this class, you’ll create a static user-defined error\
    \ handler method named `Handler`, which will get executed anytime a PHP error\
    \ happens during runtime. In PHP, you define a custom error handler using the\
    \ `set_error_handler()` function.\n\n> **Caution** As you’ll see, the second parameter\
    \ of `set_error_handler()` is used to specify the error types that the specified\
    \ handler function should handle. However, this second parameter is supported\
    \ only since PHP 5\\. Read more details at [http://www.php.net/set_error_handler](http://www.php.net/set_error_handler).\
    \ You can also find more info about PHP errors and logging in the PHP manual at\
    \ [http://www.php.net/manual/en/ref.errorfunc.php](http://www.php.net/manual/en/ref.errorfunc.php).\n\
    \nSerious error types (`E_ERROR`, `E_PARSE`, `E_CORE_ERROR`, `E_CORE_WARNING`,\
    \ `E_COMPILE_ERROR`, and `E_COMPILE_WARNING`) cannot be intercepted and handled\
    \ by `ErrorHandler::Handler`, but the other types of PHP errors (`E_WARNING` for\
    \ example) can be."
