  \ –R www-data:www-data *`\n\n接下来，输入 `vim /etc/apache2/sites-enabled/000-default`，并将显示\
  \ `DocumentRoot` 的行更改为应用程序目录 `public` 文件夹的正确路径。我的路径是 `/var/www/public`，因此配置文件中的那一行应改为\
