    ### 使用反射 API


    掌握了反射 API 的基础知识后，你现在可以实际运用这个 API 了。


    设想你正在创建一个能够动态调用 `Module` 对象的类。也就是说，它可以接受由第三方编写的插件，这些插件能够轻松集成到应用程序中，而无需任何硬编码。为了实现这一点，你可以在
    `Module` 接口或抽象基类中定义一个 `execute()` 方法，强制所有子类实现该方法。你可以允许系统用户在一个外部 XML 配置文件中列出 `Module`
    类。你的系统可以利用这些信息，在依次调用每个 `Module` 对象的 `execute()` 方法之前，先将它们聚合起来。


    然而，如果每个 `Module` 需要不同的信息来完成其工作，会发生什么呢？在这种情况下，XML 文件可以为每个 `Module` 提供属性键和值，而每个
    `Module` 的创建者可以为每个属性名提供相应的 setter 方法。基于这个前提，你的代码需要确保为正确的属性名调用正确的 setter 方法。


    以下是 `Module` 接口和几个实现类的基础代码：


    ```

    // listing 05.46

    class Person

    {

    public $name;

    public function __construct(string $name)

    {

    $this->name = $name;

    }

    }

    // listing 05.47

    interface Module

    {

    public function execute();

    }

    // listing 05.48

    class FtpModule implements Module

    {

    public function setHost($host)

    {

    print "FtpModule::setHost(): $host\n";

    }

    public function setUser($user)

    {

    print "FtpModule::setUser(): $user\n";

    }

    public function execute()

    {

    // do things

    }

    }

    // listing 05.49

    class PersonModule implements Module

    {

    public function setPerson(Person $person)

    {

    print "PersonModule::setPerson(): {$person->name}\n";

    }

    public function execute()

    {

    // do things

    }

    }

    ```


    在这里，`PersonModule` 和 `FtpModule` 都提供了 `execute()` 方法的空实现。每个类也实现了 setter 方法，这些方法除了报告自己被调用外，不做任何事情。系统规定了所有
    setter 方法必须期望一个单一参数：或者是一个字符串，或者是一个可以通过单个字符串参数实例化的对象。`PersonModule::setPerson()`
    方法需要一个 `Person` 对象，因此我在示例中包含了一个 `Person` 类。


    为了与 `PersonModule` 和 `FtpModule` 配合工作，下一步是创建一个 `ModuleRunner` 类。它将使用一个以模块名索引的多维数组来表示
    XML 文件中提供的配置信息。以下是相关代码：


    ```

    // listing 05.50

    class ModuleRunner

    {

    private $configData = [

    "popp\\ch05\\batch08\\PersonModule" => [''person'' => ''bob''],

    "popp\\ch05\\batch08\\FtpModule"    => [

    ''host'' => ''example.com'',

    ''user'' => ''anon''

    ]

    ];

    private $modules = [];

    // ...

    }

    ```


    `ModuleRunner::$configData` 属性包含了对两个 `Module` 类的引用。对于每个模块元素，代码维护了一个包含一组属性的子数组。`ModuleRunner`
    的 `init()` 方法负责创建正确的 `Module` 对象，如下所示：


    ```

    // listing 05.51

    // class ModuleRunner

    public function init()

    {

    $interface = new \ReflectionClass(''popp\\ch05\\batch08\\Module'');

    foreach ($this->configData as $modulename => $params) {

    $module_class = new \ReflectionClass($modulename);

    if (! $module_class->isSubclassOf($interface)) {

    throw new Exception("unknown module type: $modulename");

    }

    $module = $module_class->newInstance();

    foreach ($module_class->getMethods() as $method) {

    $this->handleMethod($module, $method, $params);

    // 我们将在后续的代码清单中介绍 handleMethod()！

    }

    array_push($this->modules, $module);

    }

    }

    // listing 05.52

    $test = new ModuleRunner();

    $test->init();

    ```


    `init()` 方法遍历 `ModuleRunner::$configData` 数组，对于每个模块元素，它尝试创建一个 `ReflectionClass`
    对象。当以不存在的类名调用 `ReflectionClass` 的构造函数时，会生成一个异常，所以在实际场景中，这里应该包含更多的错误处理。我使用 `ReflectionClass::isSubclassOf()`
    方法来确保该模块类属于 `Module` 类型。


    在调用每个 `Module` 的 `execute()` 方法之前，必须先创建一个实例。这就是 `ReflectionClass::newInstance()`
    的用途。该方法接受任意数量的参数，并将其传递给相关类的构造函数。如果一切正常，它会返回该类的一个实例（对于生产代码，务必进行防御性编程：在创建实例之前，检查每个
    `Module` 对象的构造函数是否需要参数）。


    `ReflectionClass::getMethods()` 返回该类所有可用的 `ReflectionMethod` 对象数组。对于数组中的每个元素，代码调用
    `ModuleRunner::handleMethod()` 方法。然后，它将一个 `Module` 实例、`ReflectionMethod` 对象以及一个要关联到该
    `Module` 的属性数组传递给它。`handleMethod()` 验证并调用 `Module` 对象的 setter 方法：


    ```

    // listing 05.53

    // class ModuleRunner

    public function handleMethod(Module $module, \ReflectionMethod $method, $params)

    {

    $name = $method->getName();

    $args = $method->getParameters();

    if (count($args) != 1 || substr($name, 0, 3) != "set") {

    return false;

    }

    $property = strtolower(substr($name, 3));

    if (! isset($params[$property])) {

    return false;

    }

    $arg_class = $args[0]->getClass();

    if (empty($arg_class)) {

    $method->invoke($module, $params[$property]);

    } else {

    $method->invoke(

    $module,

    $arg_class->newInstance($params[$property])

    );

    }

    }

    ```


    `handleMethod()` 首先检查该方法是否是有效的 setter。在代码中，一个有效的 setter 方法必须命名为 `setXXXX()`，并且必须声明一个且仅一个参数。


    假设参数检查通过，代码接着从方法名中提取属性名：移除方法名开头的 `set`，并将得到的子串转换为小写字符。该字符串用于测试 `$params` 数组参数。这个数组包含了用户提供的、需要关联到该
    `Module` 对象的属性。如果 `$params` 数组中不包含该属性，代码放弃并返回 `false`。


    如果从模块方法中提取的属性名与 `$params` 数组中的某个元素匹配，就可以继续调用正确的 setter 方法。为此，代码必须检查 setter 方法的第一个（也是唯一一个）必需参数的类型。`ReflectionParameter::getClass()`
    方法提供了这个信息。如果该方法返回一个空值，则 setter 期望某种基本类型；否则，它期望一个对象。


    要调用这个 setter 方法，我需要一个新的反射 API 方法。`ReflectionMethod::invoke()` 需要一个对象（如果是静态方法则为
    `null`）以及任意数量的方法参数，这些参数将传递给它所代表的方法。如果提供的对象与其方法不匹配，`ReflectionMethod::invoke()`
    会抛出一个异常。我通过两种方式之一调用这个方法。如果 setter 方法不要求对象参数，我就用用户提供的属性字符串调用 `ReflectionMethod::invoke()`。如果方法需要一个对象，我则使用属性字符串实例化一个正确类型的对象，然后将其传递给
    setter。


    该示例假设所需的对象可以通过向其构造函数传递单个字符串参数来实例化。当然，最好在调用 `ReflectionClass::newInstance()` 之前检查这一点。


    当 `ModuleRunner::init()` 方法执行完毕时，该对象拥有了一系列 `Module` 对象的存储，所有这些对象都已用数据初始化完毕。现在可以为该类添加一个方法，该方法遍历这些
    `Module` 对象，并对每个对象调用 `execute()`。

