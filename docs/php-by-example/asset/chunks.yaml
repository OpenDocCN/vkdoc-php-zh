    \n12. 使用PHP\n\n*为什么你必须不必要地复杂化一切？*\n\n*—* ALF（电视剧）\n\n与大多数其他流行语言不同，PHP并不“独立”使用。它“在上下文中”使用。PHP是为创建Web程序或脚本而开发的。因此，PHP是为Web编程而设计的。接下来，让我们看一些简单的任务和情况，解释PHP代码如何在Web开发中使用。\n\
