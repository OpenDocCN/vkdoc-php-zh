- fmt: "### Adding an Upsell Offer\n\nThe final addition to the cart page will be\
    \ a simple upsell offer, based on the current contents of the cart. To drive this\
    \ functionality, we’ll use the following approach:\n\n1. We will introduce a new\
    \ “upsell” metafield that can be applied to our products (refer to the section\
    \ “Managing Additional Information with Metafields” in Chapter [5](#A437216_1_En_5_Chapter.html)\
    \ for a refresher on how this works).\n2. On the cart page, we will iterate through\
    \ each item in the cart to see if it has an upsell metafield set, and if it points\
    \ to a product that’s not already in the cart. If so, we’ll display an image of\
    \ the upsell product along with a button to allow customers to add it to the cart.\n\
    \nFor this approach to work, we need to add a `cart-upsell.liquid` snippet (see\
    \ Listing [7-6](#A437216_1_En_7_Chapter.html#Par45)) and include it at the bottom\
    \ of the existing `cart.liquid` template. It contains Liquid logic to iterate\
    \ through the current cart and look for a product that’s designated as an upsell\
    \ but isn’t already in the cart. As soon as a valid upsell is found, we break\
    \ out of the loop, so a maximum of one offer will be displayed at a time.\n\n\
    ```\n{%- assign upsell_product = nil -%}\n{%- for item in cart.items -%}\n{%-\
    \ assign upsell_product_handle = item.product.metafields.theme.upsell_product_handle\
    \ -%}\n{%- if upsell_product_handle == blank -%}\n{%- next -%}\n{%- endif -%}\n\
    {%- assign already_in_cart = false -%}\n{%- for upsell_item in cart.items -%}\n\
    {%- if upsell_product_handle == upsell_item.handle -%}\n{%- assign already_in_cart\
    \ = true -%}\n{%- endif -%}\n{%- endfor -%}\n{%- unless already_in_cart -%}\n\
    {%- assign upsell_product = all_products[upsell_product_handle] -%}\n{%- break\
    \ -%}\n{%- endunless -%}\n{%- endfor -%}\n{%- if upsell_product -%}\n\nSpecial\
    \ offer: add a {{ upsell_product.title }} to your cart for only {{ upsell_product.variants.first.price\
    \ | money }}\n\n{%- endif -%}\nListing 7-6\nThe cart-upsell.liquid File\n```\n\
    \nWith this final addition, the cart page is complete and should look like Figure\
    \ [7-5](#A437216_1_En_7_Chapter.html#Fig5).\n\n![A437216_1_En_7_Fig5_HTML.jpg](A437216_1_En_7_Fig5_HTML.jpg)\n\
    \nFigure 7-5  \nThe cart page, complete with cart table, shipping estimates, and\
    \ an upsell offer\n\n## The Checkout\n\nOnce a customer clicks the Proceed to\
    \ Checkout button, they are taken away from the theme’s cart page and to the Shopify\
    \ checkout, where they’ll be asked to enter shipping and payment information to\
    \ complete their order. For security reasons, the layout and Liquid templates\
    \ used in the checkout aren’t exposed to theme developers in the same way as other\
    \ page templates. Instead, merchants have access to several predefined settings\
    \ in the Themes section of the Shopify Admin, allowing them to customize header\
    \ images and colors to match the rest of their store (see Figure [7-6](#A437216_1_En_7_Chapter.html#Fig6)).\n\
    \n![A437216_1_En_7_Fig6_HTML.jpg](A437216_1_En_7_Fig6_HTML.jpg)\n\nFigure 7-6\
    \  \nMerchants can select from a limited range of options in the Shopify Admin\
    \ to customize their checkout to match their theme\n\nThe lack of customizability\
    \ of Shopify’s checkout is often cited as a major drawback of the platform. It\
    \ certainly can be limiting—for example, it’s not possible to change the ordering\
    \ of form elements during checkout, capture additional information from customers,\
    \ or use a custom font. The trade-off for this is having a secure, robust checkout\
    \ experience that’s being tweaked and optimized on an ongoing basis by Shopify—in\
    \ my opinion, a net win for stores despite the limitations.\n\nWithin the scope\
    \ of what’s possible when it comes to the Shopify checkout, I think the most important\
    \ thing to bear in mind is to reinforce trust in the store’s brand and in the\
    \ checkout process itself. The fonts, colors, and header images in the checkout\
    \ should be selected to closely match the main store theme, so that customers\
    \ don’t feel they’re “jumping” to another site.\n\n**Sidenote**\n\nHistorically,\
    \ customers would be taken from a Shopify store to a different domain name (`checkout.shopify.com`)\
    \ during the checkout process, leading to a concern from merchants that this could\
    \ affect conversions. Today, Shopify checkouts are hosted on the same domain as\
    \ the rest of the store—but interestingly, during the testing for this change\
    \ the Checkout team found no difference in conversion rates with or without the\
    \ changed domain name.\n\n### Customizing the Checkout with Shopify Plus\n\nStores\
    \ using the Shopify Plus enterprise platform (as opposed to the “regular” Shopify\
    \ product) have a much higher degree of flexibility when it comes to the checkout\
    \ templates. Plus stores are able to add custom Liquid, CSS, and JavaScript to\
    \ the checkout, although control of the layout and checkout steps remains with\
    \ Shopify. These customizations need to be implemented on a store-by-store basis,\
    \ as you’re unable to ship a custom `checkout.liquid` in a theme for general use\
    \ (in any case, checkout customizations tend to be quite store-specific).\n\n\
    While it’s unlikely much of your early theme work will deal with Shopify Plus\
    \ stores, at least in the first instance, it’s good to have some checkout customization\
    \ knowledge in your toolbelt. To help with this, we’ll look at a simple but common\
    \ checkout customization in our example theme by adding a store pickup selector."
  raw: '#### Adding an Upsell Offer


    The final addition to the cart page will be a simple upsell offer , based on the
    current contents of the cart. To drive this functionality, we’ll use the following
    approach:


    1.  We will introduce a new “upsell” metafield that can be applied to our products
    (refer to the section “Managing Additional Information with Metafields” in Chapter
    [5](#A437216_1_En_5_Chapter.html) for a refresher on how this works).  

    2.  On the cart page, we will iterate through each item in the cart to see if
    it has an upsell metafield set, and if it points to a product that’s not already
    in the cart. If so, we’ll display an image of the upsell product along with a
    button to allow customers to add it to the cart.  


    For this approach to work, we need to add a `cart-upsell.liquid` snippet (see
    Listing [7-6](#A437216_1_En_7_Chapter.html#Par45)) and include it at the bottom
    of the existing `cart.liquid` template. It contains Liquid logic to iterate through
    the current cart and look for a product that’s designated as an upsell but isn’t
    already in the cart. As soon as a valid upsell is found, we break out of the loop,
    so a maximum of one offer will be displayed at a time.


    ```

    {%- assign upsell_product = nil -%}

    {%- for item in cart.items -%}

    {%- assign upsell_product_handle = item.product.metafields.theme.upsell_product_handle
    -%}

    {%- if upsell_product_handle == blank -%}

    {%- next -%}

    {%- endif -%}

    {%- assign already_in_cart = false -%}

    {%- for upsell_item in cart.items -%}

    {%- if upsell_product_handle == upsell_item.handle -%}

    {%- assign already_in_cart = true -%}

    {%- endif -%}

    {%- endfor -%}

    {%- unless already_in_cart -%}

    {%- assign upsell_product = all_products[upsell_product_handle] -%}

    {%- break -%}

    {%- endunless -%}

    {%- endfor -%}

    {%- if upsell_product -%}


    Special offer: add a {{ upsell_product.title }} to your cart for only {{ upsell_product.variants.first.price
    | money }}


    {%- endif -%}

    Listing 7-6

    The cart-upsell.liquid File

    ```


    With this final addition, the cart page is complete and should look like Figure
    [7-5](#A437216_1_En_7_Chapter.html#Fig5) .


    ![A437216_1_En_7_Fig5_HTML.jpg](A437216_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    The cart page, complete with cart table, shipping estimates, and an upsell offer


    ## The Checkout


    Once a customer clicks the Proceed to Checkout button, they are taken away from
    the theme’s cart page and to the Shopify checkout, where they’ll be asked to enter
    shipping and payment information to complete their order. For security reasons,
    the layout and Liquid templates used in the checkout aren’t exposed to theme developers
    in the same way as other page templates. Instead, merchants have access to several
    predefined settings in the Themes section of the Shopify Admin, allowing them
    to customize header images and colors to match the rest of their store (see Figure
    [7-6](#A437216_1_En_7_Chapter.html#Fig6)).


    ![A437216_1_En_7_Fig6_HTML.jpg](A437216_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Merchants can select from a limited range of options in the Shopify Admin to customize
    their checkout to match their theme


    The lack of customizability of Shopify’s checkout is often cited as a major drawback
    of the platform. It certainly can be limiting—for example, it’s not possible to
    change the ordering of form elements during checkout, capture additional information
    from customers, or use a custom font. The trade-off for this is having a secure,
    robust checkout experience that’s being tweaked and optimized on an ongoing basis
    by Shopify—in my opinion, a net win for stores despite the limitations.


    Within the scope of what’s possible when it comes to the Shopify checkout, I think
    the most important thing to bear in mind is to reinforce trust in the store’s
    brand and in the checkout process itself. The fonts, colors, and header images
    in the checkout should be selected to closely match the main store theme, so that
    customers don’t feel they’re “jumping” to another site.


    Sidenote


    Historically, customers would be taken from a Shopify store to a different domain
    name (`checkout.shopify.com`) during the checkout process, leading to a concern
    from merchants that this could affect conversions. Today, Shopify checkouts are
    hosted on the same domain as the rest of the store—but interestingly, during the
    testing for this change the Checkout team found no difference in conversion rates
    with or without the changed domain name.


    ### Customizing the Checkout with Shopify Plus


    Stores using the Shopify Plus enterprise platform (as opposed to the “regular”
    Shopify product) have a much higher degree of flexibility when it comes to the
    checkout templates. Plus stores are able to add custom Liquid, CSS, and JavaScript
    to the checkout, although control of the layout and checkout steps remains with
    Shopify. These customizations need to be implemented on a store-by-store basis,
    as you’re unable to ship a custom `checkout.liquid` in a theme for general use
    (in any case, checkout customizations tend to be quite store-specific).


    While it’s unlikely much of your early theme work will deal with Shopify Plus
    stores, at least in the first instance, it’s good to have some checkout customization
    knowledge in your toolbelt. To help with this, we’ll look at a simple but common
    checkout customization in our example theme by adding a store pickup selector
    .'
  trans: "\n### 添加追加销售优惠\n\n购物车页面的最后一项功能，将是一个基于购物车当前内容的简单追加销售优惠。为了实现此功能，我们将采用以下方法：\n\
    \n1.  我们将引入一个新的“追加销售”元字段，它可以应用于我们的产品（关于其工作原理，请参阅第 5 章“使用元字段管理附加信息”一节）。\n2.  在购物车页面上，我们将遍历购物车中的每一项，检查它是否设置了追加销售元字段，并且该字段指向的商品是否尚未在购物车中。如果是，我们将显示追加销售商品的图片以及一个按钮，让顾客可以将其添加到购物车。\n\
    \n为了使这种方法生效，我们需要添加一个 `cart-upsell.liquid` 代码片段（参见代码清单 7-6），并将其包含在现有 `cart.liquid`\
    \ 模板的底部。它包含 Liquid 逻辑，用于遍历当前购物车，查找被指定为追加销售但尚未在购物车中的商品。一旦找到有效的追加销售商品，我们就跳出循环，因此每次最多只会显示一个优惠。\n\
    \n```\n{%- assign upsell_product = nil -%}\n{%- for item in cart.items -%}\n{%-\
    \ assign upsell_product_handle = item.product.metafields.theme.upsell_product_handle\
    \ -%}\n{%- if upsell_product_handle == blank -%}\n{%- next -%}\n{%- endif -%}\n\
    {%- assign already_in_cart = false -%}\n{%- for upsell_item in cart.items -%}\n\
    {%- if upsell_product_handle == upsell_item.handle -%}\n{%- assign already_in_cart\
    \ = true -%}\n{%- endif -%}\n{%- endfor -%}\n{%- unless already_in_cart -%}\n\
    {%- assign upsell_product = all_products[upsell_product_handle] -%}\n{%- break\
    \ -%}\n{%- endunless -%}\n{%- endfor -%}\n{%- if upsell_product -%}\n\nSpecial\
    \ offer: add a {{ upsell_product.title }} to your cart for only {{ upsell_product.variants.first.price\
    \ | money }}\n\n{%- endif -%}\n代码清单 7-6\ncart-upsell.liquid 文件\n```\n\n完成这最后一项添加后，购物车页面就完成了，应该如图\
    \ 7-5 所示。\n\n![A437216_1_En_7_Fig5_HTML.jpg](img/A437216_1_En_7_Fig5_HTML.jpg)\n\
    \n图 7-5  \n完整的购物车页面，包含购物车表格、运费估算和追加销售优惠\n\n## 结账流程\n\n一旦顾客点击“继续结账”按钮，他们就会离开主题的购物车页面，进入\
    \ Shopify 的结账流程，系统会要求他们输入配送和付款信息以完成订单。出于安全原因，结账流程中使用的布局和 Liquid 模板与其它页面模板不同，不会以相同的方式向主题开发者开放。取而代之的是，商户可以在\
    \ Shopify 管理后台的“主题”部分访问多个预定义设置，允许他们自定义标题图片和颜色，以匹配其店铺的其他部分（参见图 7-6）。\n\n![A437216_1_En_7_Fig6_HTML.jpg](img/A437216_1_En_7_Fig6_HTML.jpg)\n\
    \n图 7-6  \n商户可以在 Shopify 管理后台选择有限的选项来自定义其结账流程以匹配主题\n\nShopify 结账流程缺乏可定制性，常被认为是该平台的一个主要缺点。这确实可能带来限制——例如，无法更改结账时表单元素的顺序、无法从顾客那里获取额外信息，或无法使用自定义字体。但作为交换，你获得的是一个安全、稳健的结账体验，并且\
    \ Shopify 会持续对其进行调整和优化——在我看来，尽管存在局限性，这对店铺来说总体上仍然是赢家。\n\n在 Shopify 结账流程可能的范围内，我认为需要牢记的最重要一点是增强对店铺品牌以及结账流程本身的信任。应选择与主商店主题紧密匹配的字体、颜色和标题图片，这样顾客就不会感觉他们“跳转”到了另一个网站。\n\
    \n**旁注**\n\n历史上，顾客在结账过程中会从 Shopify 店铺被引导到一个不同的域名 (`checkout.shopify.com`)，这让商户担心这可能会影响转化率。如今，Shopify\
    \ 的结账流程与店铺其他部分托管在同一个域名下——但有趣的是，在为此更改进行的测试中，结账团队发现无论域名是否更改，转化率都没有差异。\n\n### 使用\
    \ Shopify Plus 自定义结账流程\n\n使用 Shopify Plus 企业平台（相对于“常规”Shopify 产品）的店铺，在处理结账模板时拥有更高的灵活性。Plus\
    \ 店铺可以为结账流程添加自定义的 Liquid、CSS 和 JavaScript，尽管布局和结账步骤的控制权仍由 Shopify 掌握。这些自定义需要针对每个店铺单独实施，因为你无法在主题中提供通用的自定义\
    \ `checkout.liquid` 模板（无论如何，结账自定义往往具有很强的店铺特异性）。\n\n虽然你早期的主题工作不太可能涉及 Shopify Plus\
    \ 店铺，但掌握一些结账自定义知识作为储备还是有益的。为此，我们将在示例主题中通过添加一个简单的门店自提选择器，来探讨一个常见但简单的结账自定义。\n"
- fmt: "#### Adding a Store Pickup Selector in the Checkout\n\nIt’s quite common to\
    \ offer a “local pickup” shipping option to customers who live in the same country\
    \ or state as a merchant’s physical retail outlets. This is usually done by adding\
    \ a Store Pickup option in Shopify’s shipping settings, restricted to a specific\
    \ geographical location (see Figure [7-7](#A437216_1_En_7_Chapter.html#Fig7)).\n\
    \n![A437216_1_En_7_Fig7_HTML.jpg](A437216_1_En_7_Fig7_HTML.jpg)\n\nFigure 7-7\n\
    \nA store pickup shipping option as configured in the Shopify Admin (left); and\
    \ the resulting shipping options presented to a customer during checkout (right)\n\
    \nWhile this approach works for simple use cases, a merchant with multiple pickup\
    \ locations can run into complications. Let’s assume that your example store has\
    \ multiple physical locations in several major Australian cities—Melbourne, Sydney,\
    \ and Brisbane. While we could create a separate shipping option for each pickup\
    \ location and restrict them by state, we would start to overwhelm the customer\
