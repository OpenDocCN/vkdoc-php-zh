    Recipe 10-14\. Iterating Over Array Values


    Problem


    Working with arrays often requires the program to perform the same action for
    each row in the array.


    Fetching a result set from a database query and turning it into a HTML structure
    for presentation is an example of this.


    Solution


    There are a number of ways to access elements in an array. If the elements are
    indexed with integers and the starting value is known a for( ;; ) or while() loop
    could be used. If there are holes in the index or string values are used as the
    keys it''s possible to use each() or foreach() language constructs to iterate
    over the array.


    CHAPTER 10 ■ VARIABLES


    How it Works


    The each() construct takes an array as the parameter and returns the element at
    the current internal index pointer. It will also increment the internal index
    pointer to the next element. This is useful when iterating over the elements of
    an array.


    <?php


    // 10_34.php


    $a = [10, 15, 20, 25];


    while ($b = each($a)) {


    echo $b . "\n";


    }


    This can be written a bit cleaner with the use of the foreach() construct :


    <?php


    // 10_35.php


    $a = [10, 15, 20, 25];


    foreach($a as $b) {


    echo $b . "\n";


    }


    It is not necessary to call the reset() function on the array if the same array
    is used in multiple foreach() statements. With each() it is necessary to use reset()
    between multiple iterations.


    There are a couple of other language constructs to be aware of. These do not have
    anything to do with variables but they are important for the program flow.


    The construct include() will include the contents of the file specified if the
    file exists; otherwise a warning message will be printed. The require() statement
    works like include() but it will throw a fatal error and stop execution if the
    file is missing. Both of these are useful when the code base is growing and it
    is necessary to use the same code in multiple scripts. A variant of these constructs
    called include_once() and require_once() will not throw errors if the same file
    is included more than once; it will simply be skipped as the file is already loaded.
    In general it is recommended to write code that includes files only once and only
    includes files that are actually used. This will give the best performance.


    Recipe 10-15\. Generating Output


    Problem


    Generating output is a key functionality of PHP as it is most commonly used to
    generate HTML (or other web-related documents) dynamically based on database queries
    and other resources.


    Solution


    PHP implements a couple of language constructs: echo() , print(), and die() .
    The first two have to do with output alone and the last function will print the
    content of the parameter passed and then stop script execution.


    Although the language constructs all look like functions they can be used both
    with and without the parentheses.


    CHAPTER 10 ■ VARIABLES


    How it Works


    Writing echo "a"; and echo("a"); will give the same result. In addition echo can
    handle any number of parameters separated by commas, without concatenating them
    to a single string first.


    <?php


    // 2_36.php


    $a = ''value 1'';


    $b = ''value 2'';


    //This will output $a and $b


    echo $a, $b, "\n";


    // This will concatenate $a and $b and output the result


    print $a . $b . "\n";


    **CHAPTER 11**


    **Functions**


    Functions are a way to structure code that is used several times into a convenient
