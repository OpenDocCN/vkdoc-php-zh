- fmt: "```php\nfunction myFunc($x) { $x .= ' World'; }\n\n$x = 'Hello';\nmyFunc($x);\
    \ // value of x is passed\necho $x;    // \"Hello\"\n```\n\nTo allow a function\
    \ to modify an argument it must be passed by reference. This is done by adding\
    \ an ampersand before the parameter’s name in the function definition.\n\n```php\n\
    function myFunc(&$x) { $x .= ' World'; }\n\n$x = 'Hello';\nmyFunc($x); // reference\
    \ to x is passed\necho $x;    // \"Hello World\"\n```\n\nObject variables are\
    \ also by default passed by value. However, what is actually passed is a pointer\
    \ to the object data, not the data itself. Therefore, changes to the object’s\
    \ members will affect the original object, but replacing the object variable with\
    \ the assignment operator will only create a local variable.\n\n```php\nclass\
    \ MyClass { public $x = 1; }\n\nfunction modifyVal($o)\n{\n  $o->x = 5;\n  $o\
    \ = new MyClass(); // new local object\n}\n\n$o = new MyClass();\nmodifyVal($o);\
    \        // pointer to object is passed\necho $o->x;           // \"5\"\n```\n\
    \nIn contrast, when an object variable is passed by reference it is not only possible\
    \ to change its properties, but also to replace the entire object and have the\
    \ change propagate back to the original object variable.\n\n```php\nclass MyClass\
    \ { public $x = 1; }\n\nfunction modifyRef(&$o)\n{\n  $o->x = 5;\n  $o = new MyClass();\
    \ // new object\n}\n\n$o = new MyClass();\nmodifyRef($o);        // reference\
    \ to object is passed\necho $o->x;           // \"1\"\n```\n\n## Return by reference\n\
    \nA variable can be assigned a reference from a function by having that function\
    \ return by reference. The syntax for returning a reference is to place the ampersand\
    \ before the function name. In contrast to pass by reference, the ampersand is\
    \ also used when calling the function in order to bind the reference.\n\n```php\n\
    class MyClass\n{\n  public $val = 10;\n\n  function &getVal()\n  {\n    return\
    \ $this->val;\n  }\n}\n\n$obj = new MyClass();\n$myVal = &$obj->getVal();\n```\n\
    \nBear in mind that references should not be used merely for performance reasons,\
    \ as the PHP engine will take care of such optimizations on its own. Only use\
    \ references when you have a need for reference-type behavior.\n\n# CHAPTER 28\n\
    \n![image](images/frontdot.jpg)\n\n# Advanced Variables\n\nIn addition to being\
    \ a container for data, PHP variables have some other features that will be examined\
    \ in this chapter. These are features that are not commonly used but are good\
    \ to know about.\n\n## Curly syntax\n\nA variable name can be explicitly specified\
    \ by enclosing it in curly brackets. This is known as curly or complex syntax.\
    \ To illustrate, the following code will output the variable even though it appears\
    \ in the middle of a word.\n\n```php\n$fruit = 'Apple';\necho \"Two {$fruit}s\"\
    ; // \"Two Apples\"\n```\n\nMore importantly, the curly syntax is useful for forming\
    \ variable names out of expressions. Consider the following code which uses the\
    \ curly syntax to construct names for three variables.\n\n```php\nfor ($i = 1;\
    \ $i <= 3; $i++)\n  ${'x'.$i} = $i;\n\necho \"$x1 $x2 $x3\"; // \"1 2 3\"\n```\n\
    \nThe curly syntax is required here because the expression needs to be evaluated\
    \ in order to form a valid variable name. If the expression has only a single\
    \ variable the curly brackets are not needed.\n\n```php\nfor ($i = 'a'; $i <=\
    \ 'c'; $i++)\n  $$i = $i;\n\necho \"$a $b $c\"; // \"a b c\"\n```\n\nThis syntax\
    \ is known as a variable variable in PHP.\n\n## Variable variable names\n\nA variable\
    \ variable is a variable whose name can be changed through code. As an example,\
    \ consider the following regular variable.\n\n```php\n$a = 'foo';\n```\n\nThis\
    \ variable’s value can be used as a variable name, by placing an additional dollar\
    \ sign before it.\n\n```php\n$$a = 'bar';\n```\n\nThe value of `$a`, which is\
    \ `\"foo\"`, now becomes an alternative name for the variable `$$a`.\n\n```php\n\
    echo $foo; // \"bar\"\necho $$a;  // \"bar\"\n```\n\nAn example usage for this\
    \ would be to generate variables from an array.\n\n```php\n$arr = array('a' =>\
    \ 'Foo', 'b' => 'Bar');\n\nforeach ($arr as $key => $value)\n{\n  $$key = $value;\n\
    }\n\necho \"$a $b\"; // \"Foo Bar\"\n```\n\n## Variable function names\n\nBy placing\
    \ parentheses after a variable its value will be evaluated as the name for a function."
