  trans: "\n许多组织通过记录程序的创建者、创建时间以及发生的任何变更来跟踪程序中的变更管理。注释还可以提供程序的输入输出列表以及程序本身的描述。此外，程序中创建的函数（方法或过程）也应提供类似的描述。\n\
    \n## PHP 函数\n\n所有可执行代码的语句末尾都必须包含一个分号。作为标准，建议任何文本字符串（例如前面的 `Hello World`）都应包含在双引号中。PHP\
    \ 确实允许某些例外情况（例如在某些情况下使用单引号），但只要你保持一致，就很少会遇到问题。使用 `echo` 展示了调用 PHP 函数的能力。\n\n除前面展示的\
    \ `echo` 语句外，PHP 还提供了大量其他函数（代码块）。这些函数包含了经过充分测试、高效且安全的代码。明智的程序员会尽可能使用现有函数来节省时间，并减少编程错误和潜在的安全漏洞。\n\
    \n在创建自己的 PHP 函数时，函数名应以小写字母开头。后续单词可以大写首字母，例如 `myFunction`。一些程序员也会在单词之间使用下划线。在下面的例子中，字符串\
    \ “Hello World” 被传递到一个名为 `myFunction` 的函数中。本书将探讨大量 PHP 函数。在本章稍后部分，我们将看到更多关于程序员如何创建自己函数的示例。\n\
    \n## 变量\n\n变量在内存中临时存储信息。正如我们所看到的，PHP 不要求你在使用变量时声明数据类型。然而，当有机会时，你应该考虑定义数据类型，因为这会通过限制可存储的信息类型来增强安全性。\n\
    \n> **注意**\n> 数据类型描述了你计划存储的数据，例如字符串（文本）、整数（整型数）或浮点数（小数）。操作系统利用这些信息来确定存储该信息所需的空间大小。\n\
    \n在许多情况下，我们可以选择声明数据类型。当我们希望限制存储在内存中的数据类型时，声明数据类型是一个好主意。请记住，除非你阻止，否则 PHP 会进行*数据类型转换*（例如将字符串\
    \ `\"10\"` 转换为数值 `10`）。让我们看看在 PHP 中声明变量的标准方式。\n\n在 PHP 中，我们通常不需要在使用变量之前单独声明它。声明变量或函数时，开发者可以使用多种风格。最常见的是驼峰命名法。在驼峰命名法中，第一个单词小写，其余单词首字母大写，例如\
    \ `addIt`。不过，其他风格也是可接受的，例如：\n\n```\n$first_number = 0;\n$second_Number = 1;\n\
    $number1 = 12;\n```\n\n关键在于，无论你选择何种风格，都应在代码中保持一致。哪种格式更好其实并没有什么优势。尽管很多程序员会很乐意告诉你他们的看法！依我之见，你应该使用有意义的名称，例如\
    \ `total_Sales`。也有人会在名称中加入数据类型，例如 `int_Total_Sales`。在大型程序中，采用良好的命名约定将使跟踪变量使用情况变得容易得多。\n\
    \n> **注意**\n> 变量名必须以 `$` 作为第一个字符，并跟随其他字母数字字符来完成命名。你也可以包含下划线（`_`）。但是，不允许使用其他特殊符号或空格。\n\
    \n在下面的例子中，变量 (`$result`) 将保存由名为 `addIt` 的函数返回的任何内容。由于我们没有声明数据类型，该变量可以保存数值结果、字符串结果或其他可能的格式。作为程序员，我们可能希望拥有这种灵活性。例如，如果函数能够产生结果，我们就返回结果；如果无法返回结果，我们可以返回一个字符串（`\"\
    Invalid Result\"`），或者返回 `NULL`（表示无结果，与返回零不同）。\n\n由于此函数接受两个参数（`12`，`13`），我们假设它会将数字相加并返回结果。然后，`echo`\
    \ 语句将显示变量中包含的内容。\n\n如果我们没有声明数据类型来限制传递给函数的内容（见下文），那么当传递其他类型的信息时，以下示例也可能产生正确的结果。然而，当传递了非预期的信息时，函数内部可能会有某些代码无法正确执行。一个好的程序员始终会编写代码，避免因无效数据被保存或传递给函数而引发的任何潜在错误情况。必须考虑每一种情况，即使是程序员认为不合逻辑或几乎不可能发生的情况也不例外。\n\
    \n如果我们想限制接受或使用的信息，我们可以声明数据类型。我们稍后将探讨几个例子。就目前而言，默认情况下，请记住，变量的数据类型是在变量首次被使用时确定的。\n\
    \n- **V-1**：数据类型为字符串（字符）。\n  ```\n  $myValue = \"Help\";\n  ```\n\n- **V-2**：数据类型设置为整数（整型数）。\n\
    \  ```\n  $myValue = 123;\n  ```\n\n- **V-3**：两个整数相加产生一个整数，然后存储到变量中。\n  ```\n\
    \  $myValue = 123 + 456;\n  结果：$myValue 现在包含 579\n  ```\n\n- **V-4**：两个*浮点数*相加产生一个浮点数，存储到变量中。\n\
    \  ```\n  $myValue = 123.123 + 123.456;\n  结果：$myValue 现在包含 246.579\n  ```\n\n\
    - **V-5**：一个浮点数加上一个整数将产生一个浮点数。\n  ```\n  $myValue = 123.233 + 12;\n  结果：$myValue\
    \ 现在包含 135.233\n  ```\n\n- **V-6**：尝试将一个数字与一个字符串数字相加，如果该字符串可以转换为数字，则会成功。将数值相加会产生类似于前面示例的结果。\n\
    \  ```\n  $myValue = 123 + \"456\";\n  结果：$myValue 现在包含 579\n  ```\n\n*字符串连接符*\
    \ (`.`) 可用于将两个字符串合并在一起。然后，结果可以放入变量中（你猜对了，现在它包含一个字符串）。在下面的例子中，现有的两个字符串合并在一起，创建一个存储在\
    \ `$myValue` 中的新字符串。\n\n```\n$myValue = \"Help\" . \" me!\";\n结果：$myValue 现在包含\
    \ \"Help me!\"\n```\n\n- **C-1**：当合并一个字符串和一个整数时，PHP 会将整数转换为字符串（`123`），以便将其与另一个字符串（`Help`）连接起来，生成一个字符串\
    \ `\"Help 123\"`，该字符串将被放入变量中。\n  ```\n  $myValue = \"Help \" . 123;\n  结果：$myValue\
    \ 现在包含 \"Help 123\"\n  ```\n\n- **C-2**：当尝试合并一个字符串和两个值（在此情况下，这两个值是要相加的）时，PHP 会先进行计算，然后将结果转换为字符串。\n\
    \  ```\n  $num1 = 1;\n  $num2 = 2;\n  $myValue = \"Help \" . $num1 + $num2;\n\
    \  结果：$myValue 现在包含 \"Help 3\"\n  ```\n\n让我们看看如何使用数据类型提示来限制我们的数据类型。\n\n在之前的例子中，函数将\
    \ `$value` 限制为仅能包含布尔（true/false）类型的值。同时，它也将返回值限制为布尔类型。\n\n> **注意**\n> `true` 不是字符串，而是一个布尔值。因此，它不需要引号。\n"
- fmt: "Both of the preceding statements could be valid when calling the `myFunction`\
    \ function. If there is no value passed, then the variable `$value` is set to\
    \ the *default value*, which is `null`. `Null` indicates that the variable is\
    \ empty. However, we could also pass a Boolean value (`true`) which would be used\
    \ instead of `null`.\n\nArithmetic operations work in a similar way to mathematics.\
    \ The exception is that the calculation is done on the right side of the assignment\
    \ operator (right side of the `=` sign) and the result is placed into the variable,\
    \ function, or other object on the left side of the expression. PHP already includes\
    \ many functions to produce results seen on a calculator.\n\n> **Note**  \n> For\
    \ more information on available math functions, visit [`www.php.net/manual/en/ref.math.php`](http://www.php.net/manual/en/ref.math.php).\n\
    \nPHP allows you to use parentheses `()` to change the order in which values are\
    \ calculated. Otherwise, for numerical values, the language usually follows a\
    \ mathematical *order of operations*. This order is similar to normal mathematics\
    \ but does have a few differences. We will see some of these as we explore the\
    \ remainder of the book.\n\n> **Note**  \n> For more information on order of operations,\
    \ visit [`www.php.net/manual/en/language.operators.precedence.php`](http://www.php.net/manual/en/language.operators.precedence.php).\n\
    \nLet us look at some examples.  \nThe assignment operator (`=`) will take the\
    \ value from the right side of the expression (`1`) and place it into the variable\
    \ (`$my_num`) on the left side of the expression. If the variable does not exist,\
    \ it will be created in memory.\n\n```\n$my_num = 1;\n```\n\nBoth the following\
    \ statements add the value on the right side of the expression (`$my_num`) to\
    \ the content that exists in the variable (`$value`) on the left side of the expression.\
    \ If the variable has not existed before, zero will be added to the value on the\
    \ right side and the result is placed into the variable (`$value`). If a string\
    \ exists in the variable, an attempt will be made to convert it to a number before\
    \ adding it.\n\n```\n$value += $my_num;\n$value = $value + $my_num;\n```\n\nThe\
    \ following example is similar to the previous example, except the value on the\
    \ right side is subtracted from the value contained in the variable. If the variable\
    \ did not previously exist, the value on the right side (`$my_num`) is subtracted\
    \ from `0`. If a string exists in the variable, an attempt will be made to convert\
    \ it to a number.\n\n```\n$value -= $my_num;\n$value = $value - $my_num;\n```\n\
    \nThe following example is similar to the previous example, except the value is\
    \ multiplied instead of subtracted. If the variable did not previously exist,\
    \ the value on the right side (`$my_num`) is multiplied by `0`. If a string exists\
    \ in the variable, an attempt will be made to convert it to a number.\n\n```\n\
    $value *= $my_num;\n$value = $value * $my_num;\n```\n\nThe following example is\
    \ similar to the previous example, except the value from the right side (`$my_num`)\
    \ is divided into the value contained in the variable. The division will return\
    \ a floating-point number, unless both values were integers and divided evenly\
    \ (without any decimal places). If a string exists in the variable, an attempt\
    \ will be made to convert it to a number.\n\n> **Note**  \n> If the variable `$my_num`\
    \ does not exist, it will be set to `0`. This would cause the throwing of an exception\
    \ because you cannot divide by zero! The function `fdiv()` will return `INF` (infinity),\
    \ `-INF` (negative infinity), or `NAN` (not a number), instead of throwing an\
    \ exception, when dividing by zero.\n\n```\n$value /= $my_num;\n$value = $value\
    \ / $my_num;\n```\n\nThe following example is similar to the previous one, except\
    \ the remainder of the division is placed into the variable. If a string exists\
    \ in the variable, an attempt will be made to convert it to a number.\n\n```\n\
    $value %= $my_num;\n$value = $value % $my_num;\n```\n\nThe following statement\
    \ will raise `$value` to the power contained in `$my_num` and place the result\
    \ back into `$value`.\n\n```\n$value = $value ** $my_num;\n```"
