    Search


    Adding the search page is going to be quite a bit easier after the work we have
    just done. We already have a login page, and we can now use the partial template
    rendering we just added to the extended template implementation.


    The goal is simple: we should add consistent navigation to the application, which
    will allow logged in users to get to logout/settings/profile, and logged out users
    to get to login/register/search. We start by generating the navigation links in
    a new view file, as shown in Listing 15-13.


