    \ 函数去除首尾空白，并将其重新赋值给 `$value`。去除首尾空白可以防止有人通过多次按空格键来绕过必填字段的填写。\n\n> **注意**\n> 当前表单只有文本输入字段，但后续会扩展为包含\
    \ `<select>` 和复选框元素，这些元素会以数组形式提交数据。之所以需要检查当前元素的值是否为数组，是因为将数组传递给 `trim()` 函数会触发错误。\n\
    \n下一个条件语句检查当前键是否不在 `$expected` 数组中。如果不在，`continue` 关键字会强制循环停止处理当前元素并跳转到下一个元素。因此，所有不在\
    \ `$expected` 数组中的项都会被忽略。\n\n接下来，我们检查当前数组键是否在 `$required` 数组中，并且它是否没有值。如果条件为真，则该键被添加到\
    \ `$missing` 数组中，并动态创建一个基于该键名的变量，其值设置为空字符串。请注意，在下面这行代码中，`$$key` 以两个美元符号开头：\n\n\
    ```\n$$key = \"\";\n```\n\n这意味着它是一个可变变量（参见第[4]章中的“动态创建新变量”）。因此，如果 `$key` 的值是“name”，那么\
    \ `$$key` 就变成了 `$name`。同样，`continue` 会使循环进入下一个元素。\n\n但是，如果一直执行到循环的最后一行，我们就知道正在处理一个需要被处理的元素，因此会基于该键名动态创建一个变量，并将当前值赋给它。\n\
    \n1.  保存 `processmail.php`。稍后你还会向其中添加更多代码，但现在我们先转向 `contact.php` 的主体部分。表单起始标签中的\
    \ `action` 属性是空的。为本地测试目的，只需将其值设置为当前页面的名称：\n\n2.  如果有任何字段缺失，你需要显示一条警告。在页面内容的顶部，`<h2>`\
    \ 标题和第一个段落之间添加一个条件语句，如下所示：\n\n    ```\n    Contact us\n\n    Please fix the item(s)\
    \ indicated.\n\n    Ut enim ad minim veniam . . . \n    ```\n\n    这会检查 `$missing`\
    \ 和 `$errors`，你在步骤 1 中将它们初始化为空数组。如第[4]章中的“PHP 中的真值判断”所述，空数组被视为 `false`，因此当页面首次加载时，条件语句内部的段落不会显示。然而，如果表单提交时某个必填字段未被填写，其名称会被添加到\
    \ `$missing` 数组中。包含至少一个元素的数组被视为 `true`。`||` 表示“或”，因此如果某个必填字段留空或发现错误，这个警告段落将会显示。（`$errors`\
    \ 数组将在 PHP 解决方案 6-4 中发挥作用。）\n\n3.  为了确保到目前为止一切正常，保存 `contact.php` 并在浏览器中正常加载它（不要点击刷新按钮）。警告消息不会显示。在不填写任何字段的情况下点击“发送消息”。现在你应该能看到关于缺失项目的消息，如下图所示。\n\
    \n    ![../images/332054_4_En_6_Chapter/332054_4_En_6_Fige_HTML.jpg](img/332054_4_En_6_Fige_HTML.jpg)\n\
    \    ![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig5_HTML.jpg](img/332054_4_En_6_Fig5_HTML.jpg)\n\
    \    **图 6-5.** 通过验证用户输入，你可以显示关于必填字段的警告。\n\n1.  为了在每个缺失的必填字段旁边显示合适的消息，使用一个 PHP\
    \ 条件语句在 `<label>` 标签内插入一个 `<span>`，如下所示：\n\n    ```\n    Name:\n\n    Please enter\
    \ your name\n\n    ```\n\n    该条件使用 `in_array()` 函数来检查 `$missing` 数组是否包含值 `name`。如果包含，则显示\
    \ `<span>`。`$missing` 在脚本顶部被定义为一个空数组，因此当页面首次加载时，该 span 不会显示。\n\n2.  为 `email`\
    \ 和 `comments` 字段插入类似的警告，如下所示：\n\n    ```\n    Email:\n\n    Please enter your\
    \ email address\n\n    Comments:\n\n    Please enter your comments\n\n    ```\n\
    \n    PHP 代码是相同的，区别仅在于你在 `$missing` 数组中查找的值。该值与表单元素的 `name` 属性相同。\n\n3.  保存 `contact.php`\
    \ 并再次测试页面，首先在所有字段中不输入任何内容。表单标签应该如图 6-5 所示。\n\n    尽管你为 `email` 字段的 `<label>` 添加了警告，但它没有显示，因为\
    \ `email` 尚未被添加到 `$required` 数组中。因此，`processmail.php` 中的代码不会将其添加到 `$missing` 数组中。\n\
    \n1.  将 `email` 添加到 `comments.php` 顶部代码块中的 `$required` 数组里，如下所示：\n\n    ```\n\
    \    $required = ['name', 'comments', 'email'];\n    ```\n\n2.  在不填写任何字段的情况下再次点击“发送消息”。这次，每个标签旁边都会显示警告消息。\n\
    \n3.  在“姓名”字段中键入你的名字。在“电子邮件”和“评论”字段中，仅多次按空格键，然后点击“发送消息”。“姓名”字段旁边的警告消息消失了，但另外两个警告消息仍然保留。`processmail.php`\
    \ 中的代码会去除文本字段的空白，因此它会拒绝通过输入一系列空格来绕过必填字段的尝试。\n\n如果遇到任何问题，请将你的代码与 `ch06` 文件夹中的 `contact_03.php`\
    \ 和 `includes/processmail_01.php` 进行对比。\n\n更改必填字段所需做的全部工作就是修改 `$required` 数组中的名称，并在表单内相应输入元素的\
    \ `<label>` 标签中添加合适的提示。这很容易完成，因为你总是使用表单输入元素的 `name` 属性。\n"
- fmt: "# Preserving user input when a form is incomplete\n\nImagine you have spent\
    \ 10 minutes filling in a form. You click the Submit button, and back comes the\
    \ response that a required field is missing. It’s infuriating if you have to fill\
    \ in every field all over again. Since the content of each field is in the `$_POST`\
    \ array, it’s easy to redisplay it when an error occurs.\n\n## PHP Solution 6-3:\
    \ Creating Sticky Form Fields\n\nThis PHP solution shows how to use a conditional\
    \ statement to extract the user’s input from the `$_POST` array and redisplay\
    \ it in text input fields and text areas.\n\nContinue working with the same files\
    \ as before. Alternatively, use `contact_03.php` and `includes/processmail_01.php`\
    \ from the `ch06` folder.\n\n1. When the page first loads, you don’t want anything\
    \ to appear in the input fields, but you *do* want to redisplay the content if\
    \ a required field is missing or there’s an error. That’s the key: if the `$missing`\
    \ or `$errors` arrays contain any values, the content of each field should be\
    \ redisplayed. You set default text for a text input field with the `value` attribute\
    \ of the `<input>` tag, so amend the `<input>` tag for `name` like this:\n\n```\n\
    >\n```\n\nThe line inside the curly braces contains a combination of quotes and\
    \ periods that might confuse you. The first thing to realize is that there’s only\
    \ one semicolon—right at the end—so the `echo` command applies to the whole line.\
    \ As explained in Chapter [3](#332054_4_En_3_Chapter.xhtml), a period is called\
    \ the concatenation operator, which joins strings and variables. You can break\
    \ down the rest of the line into three sections, as follows:\n\n- `'value=\"'\
    \ .`\n- `htmlentities($name)`\n- `. '\"'`\n\nThe first section outputs `value=\"\
    ` as text and uses the concatenation operator to join it to the next section,\
    \ which passes `$name` to a function called `htmlentities()`. I’ll explain why\
    \ that’s necessary in a moment, but the third section uses the concatenation operator\
    \ again to join the final output, which consists solely of a double quote. So,\
    \ if `$missing` or `$errors` contain any values, and `$_POST['name']` contains\
    \ `Joe`, you’ll end up with this inside the `<input>` tag:\n\n```\n<input type=\"\
    text\" name=\"name\" value=\"Joe\" />\n```\n\nThe `$name` variable contains the\
    \ original user input, which was transmitted through the `$_POST` array. The `foreach`\
    \ loop that you created in `processmail.php` in PHP Solution 6-2 processes the\
    \ `$_POST` array and assigns each element to a variable with the same name. This\
    \ allows you to access `$_POST['name']` simply as `$name`.\n\nSo, why do we need\
    \ the `htmlentities()` function? As the function name suggests, it converts certain\
    \ characters to their equivalent HTML character entities. The one you’re concerned\
    \ with here is the double quote. Let’s say Eric “Slowhand” Clapton decides to\
    \ send feedback through the form. If you use `$name` on its own, Figure 6-6 shows\
    \ what happens when a required field is omitted and you don’t use `htmlentities()`.\n\
    \n![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig6_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Fig6_HTML.jpg)\n\
    \n**Figure 6-6.** Quotes need special treatment before form fields can be redisplayed\n\
    \nPassing the content of the `$_POST` array element to the `htmlentities()`, however,\
    \ converts the double quotes in the middle of the string to `&quot;`. And, as\
    \ Figure 6-7 shows, the content is no longer truncated.\n\n![../images/332054_4_En_6_Chapter/332054_4_En_6_Fig7_HTML.jpg](images/332054_4_En_6_Chapter/332054_4_En_6_Fig7_HTML.jpg)\n\
    \n**Figure 6-7.** Passing the value to `htmlentities()` before it’s displayed\
    \ solves the problem\n\nWhat’s cool about this is that the character entity `&quot;`\
    \ is converted back to double quotes when the form is resubmitted. As a result,\
    \ there’s no need for further conversion before the email can be sent.\n\n> **Note**\
    \  \n> If `htmlentities()` corrupts your text, you can set the encoding directly\
    \ within a script by passing the second and third optional arguments to the function.\
    \ For example, to set the encoding to Simplified Chinese, use `htmlentities($name,\
    \ ENT_COMPAT, 'GB2312')`. For details, see the documentation at [`www.php.net/manual/en/function.htmlentities.php`](http://www.php.net/manual/en/function.htmlentities.php).\n\
    \n2. Edit the `email` field the same way, using `$email` instead of `$name`.\n\
    \n3. The `comments` text area needs to be handled slightly differently because\
    \ `<textarea>` tags don’t have a `value` attribute. You must place the PHP block\
    \ between the opening and closing tags of the text area, like this (new code is\
    \ shown in bold):\n\n```\n<textarea name=\"comments\" id=\"comments\"><?php echo\
    \ htmlentities($comments); ?></textarea>\n```\n\nIt’s important to position the\
    \ opening and closing PHP tags right up against the `<textarea>` tags. If you\
    \ don’t, you’ll get unwanted whitespace inside the text area.\n\n4. Save `contact.php`\
    \ and test the page in a browser. If any required fields are omitted, the form\
    \ displays the original content along with any error messages.\n\nYou can check\
    \ your code with `contact_04.php` in the `ch06` folder.\n\n> **Caution**  \n>\
    \ Using this technique prevents a form’s reset button from resetting any fields\
    \ that have been changed by the PHP script because it explicitly sets the `value`\
    \ attribute of each field.\n\n## Filtering Out Potential Attacks\n\nA particularly\
    \ nasty exploit known as **email header injection** seeks to turn online forms\
    \ into spam relays. The attacker tries to trick your script into sending HTML\
    \ email with copies to many people. This is possible if you incorporate unfiltered\
    \ user input in the additional headers that can be passed as the fourth argument\
    \ to the `mail()` function. It’s common to add the user’s email address as a `Reply-to`\
    \ header. If you detect spaces, new lines, carriage returns, or any of the strings\
    \ “Content-type:”, “Cc:”, or “Bcc:” in the submitted value, you’re the target\
    \ of an attack, so you should block the message.\n\n### PHP Solution 6-4: Blocking\
    \ email addresses that Contain Suspect Content\n\nThis PHP solution checks the\
    \ user’s email address input for suspect content. If it’s detected, a Boolean\
    \ variable is set to `true`. This will be used later to prevent the email from\
    \ being sent.\n\nContinue working with the same page as before. Alternatively,\
    \ use `contact_04.php` and `includes/processmail_01.php` from the `ch06` folder.\n\
    \n1. To detect the suspect phrases, we’ll use a search pattern or **regular expression**.\
    \ Add the following code at the top of `processmail.php` before the existing `foreach`\
    \ loop:\n\n```\n// pattern to locate suspect phrases\n$pattern = '/[\\s\\r\\n]|Content-Type:|Bcc:|Cc:/i';\n\
    foreach ($_POST as $key => $value) {\n```\n\nThe string assigned to `$pattern`\
    \ will be used to perform a case-insensitive search for any of the following:\
    \ a space, carriage return, newline feed, “Content-Type:”, “Bcc:”, or “Cc:”. It’s\
    \ written in a format called Perl-compatible regular expression (PCRE). The search\
    \ pattern is enclosed in a pair of forward slashes, and the `i` after the final\
    \ slash makes the pattern case-insensitive.\n\n> **Tip**  \n> Regular expressions\
    \ are an extremely powerful tool for matching text patterns. Admittedly, they’re\
    \ not easy to learn; but it’s an essential skill if you’re serious about working\
    \ with programming languages such as PHP and JavaScript. Take a look at *Introducing\
    \ Regular Expressions* by Jörg Krause (Apress, 2017, ISBN 978-1-4842-2508-0).\
    \ It’s aimed primarily at JavaScript developers, but there are only minor differences\
    \ of implementation between JavaScript and PHP. The basic syntax is identical.\n\
    \n2. You can now use the PCRE stored in `$pattern` to detect any suspect user\
    \ input in the submitted email address. Add the following code immediately after\
    \ the `$pattern` variable from step 1:"
