    \ `$_POST` 数组中，因此你需要像处理复选框组一样，添加一个空子数组。\n\n以下代码展示了 `contact_08.php` 中多选列表的前两个项目，其中\
    \ `name` 属性和 PHP 代码已加粗高亮。`name` 属性后附加的方括号确保其结果以数组形式存储。该代码的工作方式与 PHP 方案 5-7 中的复选框组完全相同。\n\
    \n```\n<p>\n<label for=\"characteristics\">您认为日本具有哪些特征？</label>\n<select name=\"\
    characteristics[]\" size=\"6\" multiple=\"multiple\" id=\"characteristics\">\n\
    <option value=\"Dynamic\"\n<?php\nif ($_POST && in_array('Dynamic', $_POST['characteristics']))\
    \ {\n    echo 'selected';\n} ?>\n>充满活力</option>\n<option value=\"Honest\"\n<?php\n\
    if ($_POST && in_array('Honest', $_POST['characteristics'])) {\n    echo 'selected';\n\
    } ?>\n>诚实守信</option>\n. . .\n</select>\n</p>\n```\n\n在处理消息的代码中，为多选列表设置默认值的方式与处理复选框数组相同：\n\
    \n```\nif (!isset($_POST['interests'])) {\n    $_POST['interests'] = [];\n}\n\
    if (!isset($_POST['characteristics'])) {\n    $_POST['characteristics'] = [];\n\
    }\n```\n\n要将多选列表设为必填项并设置最小选择数量，请使用 PHP 方案 5-7 中用于复选框组的相同技术。\n\n### PHP 方案 5-10：处理单个复选框\n\
    \n处理单个复选框的方式与处理复选框组略有不同。对于单个复选框，你不需要在 `name` 属性后附加方括号，因为它无需作为数组处理。此外，`value` 属性是可选的。如果你不设置\
    \ `value` 属性，当复选框被选中时，其值默认为“On”。然而，如果复选框未被选中，其名称就不会包含在 `$_POST` 数组中，因此你需要测试其是否存在。\n\
    \n此 PHP 方案演示了如何添加一个用于确认用户是否已接受网站条款的单个复选框。它假定必须选中该复选框。\n\n以下代码展示了单个复选框，其中 `name`\
    \ 属性和 PHP 代码已加粗高亮。\n\n```\n<p>\n<input type=\"checkbox\" name=\"terms\" value=\"\
    accepted\" id=\"terms\"\n<?php\nif ($_POST && !isset($errors['terms'])) {\n  \
    \  echo 'checked';\n} ?>\n>\n<label for=\"terms\">我接受使用本网站的条款\n<?php if (isset($errors['terms']))\
    \ { ?>\n<span class=\"warning\">请选择该复选框</span>\n<?php } ?>\n</label>\n</p>\n```\n\
    \n`<input>` 元素内的 PHP 代码块仅在 `$_POST` 数组包含值且 `$errors['terms']` 尚未设置时，才插入 `checked`\
    \ 属性。这确保了页面首次加载时复选框不会被选中。如果用户提交表单时未确认接受条款，复选框也会保持未选中状态。\n\n如果设置了 `$errors['terms']`，第二个\
    \ PHP 代码块会在标签旁边显示错误消息。\n\n除了将 `terms` 添加到 `$expected` 和 `$required` 数组之外，你还需要为\
    \ `$_POST['terms']` 设置一个默认值；然后在提交表单时处理数据的代码中设置 `$errors['terms']`：\n\n```\nif\
    \ (!isset($_POST['characteristics'])) {\n    $_POST['characteristics'] = [];\n\
    }\nif (!isset($_POST['terms'])) {\n    $_POST['terms'] = '';\n    $errors['terms']\
    \ = true;\n}\n```\n\n仅当复选框为必填项时，你才需要创建 `$errors['terms']`。对于可选的复选框，如果它不包含在 `$_POST`\
    \ 数组中，只需将其值设置为空字符串即可。\n\n## 本章回顾\n\n构建 `processmail.php` 投入了大量工作，但该脚本的妙处在于它适用于任何表单。唯一需要更改的部分是\
    \ `$expected` 和 `$required` 数组，以及与表单相关的细节，例如目标地址、邮件头和为那些未选择值就不会包含在 `$_POST` 数组中的多选元素设置的默认值。\n\
    \n我避免讨论 HTML 电子邮件，因为 `mail()` 函数只处理纯文本电子邮件。`www.php.net/manual/en/function.mail.php`\
    \ 上的 PHP 在线手册展示了通过添加额外邮件头发送 HTML 邮件的方法。然而，这不是一个好主意，因为 HTML 邮件应始终为不接受 HTML 的电子邮件程序提供纯文本替代版本。如果你想发送\
    \ HTML 邮件或附件，请尝试使用 PHPMailer (`https://github.com/Synchro/PHPMailer/`)。\n\n正如你将在后续章节中看到的，在线表单几乎是你用\
    \ PHP 做所有事情的核心。它们是浏览器和 Web 服务器之间的网关。你会反复用到本章学到的技术。\n\n# 6. 上传文件\n\nPHP 处理表单的能力不仅限于文本。它还可以用于将文件上传到服务器。例如，你可以构建一个房地产网站，供客户上传其房产图片；或者一个供所有亲朋好友上传假期照片的网站。然而，仅仅因为你可以这样做，并不一定意味着你应该这样做。允许他人向你的网站上传材料可能会使你面临各种问题。你需要确保图片尺寸正确、质量合适，并且不包含任何非法内容。你还需要确保上传的文件不包含恶意脚本。换句话说，你需要像保护自己的计算机一样仔细保护你的网站。\n\
    \nPHP 使得限制接受的文件类型和大小相对简单。但它无法检查内容的合适性。请仔细考虑安全措施，例如通过将上传表单放置在受密码保护的区域，将上传权限限制给已注册和受信任的用户。\n\
    \n在你学习如何使用 PHP（在第 9 章和第 17 章）限制对页面的访问之前，如果在公共网站上部署，请仅在本章中的受密码保护目录中使用 PHP 解决方案。大多数托管公司通过网站的控制面板提供简单的密码保护。\n\
    \n本章的第一部分致力于理解文件上传的机制，这将使你更容易理解后续的代码。这是一章内容相当丰富的章节，而不是快速解决方案的集合。但到本章结束时，你将构建一个能够处理单个和多个文件上传的\
    \ PHP 类。然后，你只需编写几行代码，就可以在任何表单中使用该类。\n\n你将学习以下内容：\n\n- 理解 `$_FILES` 数组\n- 限制上传的大小和类型\n\
    - 防止文件被覆盖\n- 处理多个上传\n\n## PHP 如何处理文件上传\n\n术语“上传”意味着将文件从一台计算机移动到另一台计算机，但就 PHP 而言，所发生的一切只是将文件从一个位置移动到另一个位置。这意味着你可以在本地计算机上测试本章中的所有脚本，而无需将文件上传到远程服务器。\n\
    \nPHP 默认支持文件上传，但托管公司可能限制上传的大小或完全禁用上传。在进一步操作之前，最好检查一下远程服务器上的设置。\n"
- fmt: "### Checking whether your server supports uploads\n\nAll the information you\
    \ need is displayed in the main PHP configuration page that you can display by\
    \ running `phpinfo()` on your remote server, as described in [Chapter 2](#A978-1-4842-0635-5_2_Chapter.html).\
    \ Scroll down until you find `file_uploads` in the Core section.\n\nIf the Local\
    \ Value is On, you’re ready to go, but you should also check the other configuration\
    \ settings listed in Table [6-1](#A978-1-4842-0635-5_6_Chapter.html#Tab1).\n\n\
    **Table 6-1.** PHP configuration settings that affect file uploads\n\n| Directive\
    \ | Default value | Description |\n| --- | --- | --- |\n| `max_execution_time`\
    \ | 30 | The maximum number of seconds that a PHP script can run. If the script\
    \ takes longer, PHP generates a fatal error. |\n| `max_file_uploads` | 20 | The\
    \ maximum number of files that can be uploaded simultaneously. If the limit is\
    \ exceeded, excess files are silently ignored. |\n| `max_input_time` | 60 | The\
    \ maximum number of seconds that a PHP script is allowed to parse the `$_POST`\
    \ and `$_GET` arrays and file uploads. Very large uploads are likely to run out\
    \ of time. |\n| `post_max_size` | 8M | The maximum permitted size of all `$_POST`\
    \ data, including file uploads. Although the default is 8 MB, hosting companies\
    \ may impose a smaller limit. |\n| `upload_tmp_dir` |   | This is where PHP stores\
    \ uploaded files until your script moves them to a permanent location. If no value\
    \ is defined in `php.ini`, PHP uses the system default temporary directory (`C:\\\
    Windows\\Temp` or `/tmp` on Mac/Linux). |\n| `upload_max_filesize` | 2M | The\
    \ maximum permitted size of a single upload file. Although the default is 2 MB,\
    \ hosting companies may impose a smaller limit. A number on its own indicates\
    \ the number of bytes permitted. A number followed by K indicates the number of\
    \ kilobytes permitted. |\n\nAs of PHP 5.6, PHP can handle uploads of individual\
    \ files larger than 2 gigabytes, but the actual limits are determined by the settings\
    \ in Table [6-1](#A978-1-4842-0635-5_6_Chapter.html#Tab1). The default 8 MB value\
    \ of `post_max_size` includes the content of the `$_POST` array, so the total\
    \ size of files that can be uploaded simultaneously on a typical server is less\
    \ than 8 MB, with no single file greater than 2 MB. The server administrator can\
    \ change these defaults, so it’s important to check the limits set by your hosting\
    \ company. If you exceed those limits, an otherwise perfect script will fail.\n\
    \nIf the Local Value of `file_uploads` is Off, uploads have been disabled. There\
    \ is nothing you can do about it, other than ask your hosting company if it offers\
    \ a package with file uploading enabled. Your only alternatives are to move to\
    \ a different host or to use a different solution, such as uploading files by\
    \ FTP.\n\n**Tip**\n\nAfter using `phpinfo()` to check your remote server’s settings,\
    \ it’s a good idea to remove the script or put it in a password-protected directory.\n\
    \n### Adding a file upload field to a form\n\nAdding a file upload field to an\
    \ HTML form is easy. Just add `enctype=\"multipart/form-data\"` to the opening\
    \ `<form>` tag and set the `type` attribute of an `<input>` element to `file`.\
    \ The following code is a simple example of an upload form (it’s in `file_upload_01.php`\
    \ in the `ch06` folder):\n\n```html\n<form action=\"\" method=\"post\" enctype=\"\
    multipart/form-data\" id=\"uploadImage\">\n  <p>\n    <label for=\"image\">Upload\
    \ image:</label>\n    <input type=\"file\" name=\"image\" id=\"image\">\n  </p>\n\
    \  <p>\n    <input type=\"submit\" name=\"upload\" id=\"upload\" value=\"Upload\"\
    >\n  </p>\n</form>\n```\n\nAlthough this is standard HTML, how it’s rendered in\
    \ a webpage depends on the browser (see Figure [6-1](#A978-1-4842-0635-5_6_Chapter.html#Fig1)).\
    \ Most modern browsers display a Choose File or Browse button with a status message\
    \ or the name of the selected file on the right. Internet Explorer displays a\
    \ text input field with a Browse button on the right. Recent versions of Internet\
    \ Explorer make it read-only and launch a file-selection panel as soon as you\
    \ click inside the field. These differences don’t affect the operation of an upload\
    \ form, but you need to take them into account when designing the layout.\n\n\
    ![A978-1-4842-0635-5_6_Fig1_HTML.jpg](A978-1-4842-0635-5_6_Fig1_HTML.jpg)\n\n\
    **Figure 6-1.** The look of a file input field depends on the browser\n\n### Understanding\
    \ the `$_FILES` array\n\nWhat confuses many people is that their file seems to\
    \ vanish after it has been uploaded. This is because you can’t refer to an uploaded\
    \ file in the `$_POST` array in the same way you do with text input. PHP transmits\
    \ the details of uploaded files in a separate superglobal array called, not unreasonably,\
    \ `$_FILES`. Moreover, files are uploaded to a temporary folder and are deleted\
    \ unless you explicitly move them to the desired location. Although this sounds\
    \ like a nuisance, it’s done for a very good reason: you can subject the file\
    \ to security checks before accepting the upload.\n\n#### Inspecting the `$_FILES`\
    \ array\n\nThe best way to understand how the `$_FILES` array works is to see\
    \ it in action. If you have installed a local test environment, you can test everything\
    \ on your computer. It works in exactly the same way as uploading a file to a\
    \ remote server.\n\nCreate a new folder called `uploads` in the `phpsols` site\
    \ root. Create a new PHP file called `file_upload.php` in the `uploads` folder\
    \ and insert the code from the previous section. Alternatively, copy `file_upload_01.php`\
    \ from the `ch06` folder and rename the file `file_upload.php`. Insert the following\
    \ code right after the closing `</form>` tag (it’s also in `file_upload_02.php`):\n\
    \n```php\n</form>\n\n<pre>\n<?php\nif (isset($_POST['upload'])) {\n    print_r($_FILES);\n\
    }\n?>\n</pre>\n\n</body>\n```\n\nThis uses `isset()` to check whether the `$_POST`\
    \ array contains `upload`, the `name` attribute of the Submit button. If it does,\
    \ you know the form has been submitted, so you can use `print_r()` to inspect\
    \ the `$_FILES` array. The `<pre>` tags make the output easier to read.\n\nSave\
    \ `file_upload.php` and load it into a browser. Click the Browse (or Choose File)\
    \ button and select a file on your hard disk. Click Open (or Choose on a Mac)\
    \ to close the file selection dialog box, and then click Upload. You should see\
    \ something similar to Figure [6-2](#A978-1-4842-0635-5_6_Chapter.html#Fig2).\n\
    \nYou can see that the `$_FILES` array is actually a multidimensional array—an\
    \ array of arrays. The top-level array contains just one element, which gets its\
    \ key (or index) from the `name` attribute of the file input field, in this case,\
    \ `image`.\n\n![A978-1-4842-0635-5_6_Fig2_HTML.jpg](A978-1-4842-0635-5_6_Fig2_HTML.jpg)\n\
    \n**Figure 6-2.** The `$_FILES` array contains the details of an uploaded file\n\
    \nThe `image` element contains another array (or subarray) that consists of five\
    \ elements, namely:\n\n*   `name`: The original name of the uploaded file\n* \
    \  `type`: The uploaded file’s MIME type\n*   `tmp_name`: The location of the\
    \ uploaded file\n*   `error`: An integer indicating the status of the upload\n\
    *   `size`: The size of the uploaded file in bytes\n\nDon’t waste time searching\
    \ for the temporary file indicated by `tmp_name`: it won’t be there. If you don’t\
    \ save it immediately, PHP discards it.\n\nClick Upload without selecting a file.\
    \ The `$_FILES` array should look like Figure [6-3](#A978-1-4842-0635-5_6_Chapter.html#Fig3).\n\
    \n![A978-1-4842-0635-5_6_Fig3_HTML.jpg](A978-1-4842-0635-5_6_Fig3_HTML.jpg)\n\n\
    **Figure 6-3.** The `$_FILES` array still exists when no file is uploaded\n\n\
    An error level of 4 indicates that no file was uploaded; 0 means the upload succeeded.\
    \ Table [6-2](#A978-1-4842-0635-5_6_Chapter.html#Tab2) later in this chapter lists\
    \ all the error codes.\n\nSelect a program file and click the Upload button. In\
    \ many cases, the form will happily try to upload the program and will display\
    \ its type as `application/zip`, `application/octet-stream`, or something similar.\
    \ This is a warning that it’s important to check the MIME type of uploaded files."
  raw: '### Checking whether your server supports uploads


    All the information you need is displayed in the main PHP configuration page that
    you can display by running `phpinfo()` on your remote server, as described in
    [Chapter 2](#A978-1-4842-0635-5_2_Chapter.html). Scroll down until you find `file_uploads`
    in the Core section.


    If the Local Value is On, you’re ready to go, but you should also check the other
    configuration settings listed in Table [6-1](#A978-1-4842-0635-5_6_Chapter.html#Tab1).


    Table 6-1.


    PHP configuration settings that affect file uploads


    | Directive | Default value | Description |

    | --- | --- | --- |

    | `max_execution_time` | 30 | The maximum number of seconds that a PHP script
    can run. If the script takes longer, PHP generates a fatal error. |

    | `max_file_uploads` | 20 | The maximum number of files that can be uploaded simultaneously.
    If the limit is exceeded, excess files are silently ignored. |

    | `max_input_time` | 60 | The maximum number of seconds that a PHP script is allowed
    to parse the `$_POST` and `$_GET` arrays and file uploads. Very large uploads
    are likely to run out of time. |

    | `post_max_size` | 8M | The maximum permitted size of all `$_POST` data, including
    file uploads. Although the default is 8 MB, hosting companies may impose a smaller
    limit. |

    | `upload_tmp_dir` |   | This is where PHP stores uploaded files until your script
    moves them to a permanent location. If no value is defined in `php.ini`, PHP uses
    the system default temporary directory (`C:\Windows\Temp` or `/tmp` on Mac/Linux).
    |

    | `upload_max_filesize` | 2M | The maximum permitted size of a single upload file.
    Although the default is 2 MB, hosting companies may impose a smaller limit. A
    number on its own indicates the number of bytes permitted. A number followed by
    K indicates the number of kilobytes permitted. |


    As of PHP 5.6, PHP can handle uploads of individual files larger than 2 gigabytes,
    but the actual limits are determined by the settings in Table [6-1](#A978-1-4842-0635-5_6_Chapter.html#Tab1).
    The default 8 MB value of `post_max_size` includes the content of the `$_POST`
    array, so the total size of files that can be uploaded simultaneously on a typical
    server is less than 8 MB, with no single file greater than 2 MB. The server administrator
    can change these defaults, so it’s important to check the limits set by your hosting
    company. If you exceed those limits, an otherwise perfect script will fail.


    If the Local Value of `file_uploads` is Off, uploads have been disabled. There
    is nothing you can do about it, other than ask your hosting company if it offers
    a package with file uploading enabled. Your only alternatives are to move to a
    different host or to use a different solution, such as uploading files by FTP.


    Tip


    After using `phpinfo()` to check your remote server’s settings, it’s a good idea
    to remove the script or put it in a password-protected directory.


    ### Adding a file upload field to a form


    Adding a file upload field to an HTML form is easy. Just add `enctype="multipart/form-data"`
    to the opening `<form>` tag and set the `type` attribute of an `<input>` element
    to `file`. The following code is a simple example of an upload form (it’s in `file_upload_01.php`
    in the `ch06` folder):


    `<form action="" method="post" enctype="multipart/form-data" id="uploadImage">`


    `<p>`


    `<label for="image">Upload image:</label>`


    `<input type="file" name="image" id="image">`


    `</p>`


    `<p>`


    `<input type="submit" name="upload" id="upload" value="Upload">`


    `</p>`


    `</form>`


    Although this is standard HTML, how it’s rendered in a webpage depends on the
    browser (see Figure [6-1](#A978-1-4842-0635-5_6_Chapter.html#Fig1)). Most modern
    browsers display a Choose File or Browse button with a status message or the name
    of the selected file on the right. Internet Explorer displays a text input field
    with a Browse button on the right. Recent versions of Internet Explorer make it
    read-only and launch a file-selection panel as soon as you click inside the field.
    These differences don’t affect the operation of an upload form, but you need to
    take them into account when designing the layout.


    ![A978-1-4842-0635-5_6_Fig1_HTML.jpg](A978-1-4842-0635-5_6_Fig1_HTML.jpg)


    Figure 6-1.


    The look of a file input field depends on the browser


    ### Understanding the $_FILES array


    What confuses many people is that their file seems to vanish after it has been
    uploaded. This is because you can’t refer to an uploaded file in the `$_POST`
    array in the same way you do with text input. PHP transmits the details of uploaded
    files in a separate superglobal array called, not unreasonably, `$_FILES`. Moreover,
    files are uploaded to a temporary folder and are deleted unless you explicitly
    move them to the desired location. Although this sounds like a nuisance, it’s
    done for a very good reason: you can subject the file to security checks before
    accepting the upload.


    #### Inspecting the $_FILES array


    The best way to understand how the `$_FILES` array works is to see it in action.
    If you have installed a local test environment, you can test everything on your
    computer. It works in exactly the same way as uploading a file to a remote server.


    Create a new folder called `uploads` in the `phpsols` site root. Create a new
    PHP file called `file_upload.php` in the `uploads` folder and insert the code
    from the previous section. Alternatively, copy `file_upload_01.php` from the `ch06`
    folder and rename the file `file_upload.php`.   Insert the following code right
    after the closing `</form>` tag (it’s also in `file_upload_02.php`):  


    `</form>`


    `<pre>`


    `<?php`


    `if (isset($_POST[''upload''])) {`


    `print_r($_FILES);`


    `}`


    `?>`


    `</pre>`


    `</body>`


    This uses `isset()`to check whether the `$_POST` array contains `upload`, the
    `name` attribute of the Submit button. If it does, you know the form has been
    submitted, so you can use `print_r()` to inspect the `$_FILES` array. The `<pre>`
    tags make the output easier to read.


    Save `file_upload.php` and load it into a browser.   Click the Browse (or Choose
    File) button and select a file on your hard disk. Click Open (or Choose on a Mac)
    to close the file selection dialog box, and then click Upload. You should see
    something similar to Figure [6-2](#A978-1-4842-0635-5_6_Chapter.html#Fig2).  


    You can see that the `$_FILES` array is actually a multidimensional array—an array
    of arrays. The top-level array contains just one element, which gets its key (or
    index) from the `name` attribute of the file input field, in this case, `image`.


    ![A978-1-4842-0635-5_6_Fig2_HTML.jpg](A978-1-4842-0635-5_6_Fig2_HTML.jpg)


    Figure 6-2.


    The $_FILES array contains the details of an uploaded file


    The `image` element contains another array (or subarray) that consists of five
    elements, namely:


    *   `name`: The original name of the uploaded file

    *   `type`: The uploaded file’s MIME type

    *   `tmp_name`: The location of the uploaded file

    *   `error`: An integer indicating the status of the upload

    *   `size`: The size of the uploaded file in bytes


    Don’t waste time searching for the temporary file indicated by `tmp_name`: it
    won’t be there. If you don’t save it immediately, PHP discards it.


    Click Upload without selecting a file. The `$_FILES` array should look like Figure
    [6-3](#A978-1-4842-0635-5_6_Chapter.html#Fig3).  


    ![A978-1-4842-0635-5_6_Fig3_HTML.jpg](A978-1-4842-0635-5_6_Fig3_HTML.jpg)


    Figure 6-3.


    The $_FILES array still exists when no file is uploaded


    An error level of 4 indicates that no file was uploaded; 0 means the upload succeeded.
    Table [6-2](#A978-1-4842-0635-5_6_Chapter.html#Tab2) later in this chapter lists
    all the error codes.


    Select a program file and click the Upload button. In many cases, the form will
    happily try to upload the program and will display its type as application/zip,
    application/octet-stream, or something similar. This is a warning that it’s important
    to check the MIME type of uploaded files.'
  trans: "\n### 检查服务器是否支持文件上传\n\n所有你需要的信息都显示在 PHP 的主要配置页面中，你可以通过在远程服务器上运行 `phpinfo()`\
    \ 来显示该页面，如第 2 章所述。向下滚动，直到在 Core 部分找到 `file_uploads`。\n\n如果本地值（Local Value）为 On，你就可以开始了，但你也应该检查表\
    \ 6-1 中列出的其他配置设置。\n\n**表 6-1.** 影响文件上传的 PHP 配置设置\n\n| 指令 | 默认值 | 描述 |\n| --- |\
    \ --- | --- |\n| `max_execution_time` | 30 | PHP 脚本可以运行的最大秒数。如果脚本运行时间更长，PHP 会生成一个致命错误。\
    \ |\n| `max_file_uploads` | 20 | 可以同时上传的最大文件数量。如果超过此限制，多余的文件会被静默忽略。 |\n| `max_input_time`\
    \ | 60 | PHP 脚本被允许解析 `$_POST` 和 `$_GET` 数组以及文件上传的最大秒数。非常大的上传可能会超时。 |\n| `post_max_size`\
    \ | 8M | 所有 `$_POST` 数据（包括文件上传）允许的最大大小。虽然默认值是 8 MB，但托管公司可能会设置更小的限制。 |\n| `upload_tmp_dir`\
    \ |   | PHP 在此处存储上传的文件，直到你的脚本将它们移动到永久位置。如果在 `php.ini` 中未定义任何值，PHP 将使用系统的默认临时目录（在\
    \ Mac/Linux 上为 `C:\\Windows\\Temp` 或 `/tmp`）。 |\n| `upload_max_filesize` | 2M\
    \ | 单个上传文件允许的最大大小。虽然默认值是 2 MB，但托管公司可能会设置更小的限制。单独的数字表示允许的字节数。后跟 K 的数字表示允许的千字节数。\
    \ |\n\n从 PHP 5.6 开始，PHP 可以处理大于 2 GB 的单个文件上传，但实际限制由表 6-1 中的设置决定。`post_max_size`\
    \ 的默认值 8 MB 包含了 `$_POST` 数组的内容，因此典型服务器上可以同时上传的文件总大小小于 8 MB，且没有单个文件大于 2 MB。服务器管理员可以更改这些默认值，因此检查托管公司设置的限制很重要。如果你超过这些限制，一个原本完美无缺的脚本将会失败。\n\
    \n如果 `file_uploads` 的本地值为 Off，则上传功能已被禁用。对此你无能为力，只能询问你的托管公司是否提供启用了文件上传的套餐。你唯一的选择是迁移到其他主机，或使用不同的解决方案，例如通过\
    \ FTP 上传文件。\n\n**提示**\n\n使用 `phpinfo()` 检查远程服务器的设置后，最好删除该脚本或将其放入受密码保护的目录中。\n\n\
    ### 向表单添加文件上传字段\n\n向 HTML 表单添加文件上传字段很容易。只需在开始的 `<form>` 标签中添加 `enctype=\"multipart/form-data\"\
    `，并将 `<input>` 元素的 `type` 属性设置为 `file`。以下代码是一个简单的上传表单示例（它位于 `ch06` 文件夹中的 `file_upload_01.php`\
    \ 文件中）：\n\n```html\n<form action=\"\" method=\"post\" enctype=\"multipart/form-data\"\
    \ id=\"uploadImage\">\n  <p>\n    <label for=\"image\">上传图片：</label>\n    <input\
    \ type=\"file\" name=\"image\" id=\"image\">\n  </p>\n  <p>\n    <input type=\"\
    submit\" name=\"upload\" id=\"upload\" value=\"上传\">\n  </p>\n</form>\n```\n\n\
    尽管这是标准的 HTML，但它在网页中的呈现方式取决于浏览器（见图 6-1）。大多数现代浏览器会显示一个“选择文件”或“浏览”按钮，右侧显示状态消息或所选文件的名称。Internet\
    \ Explorer 会显示一个文本输入字段，右侧有一个“浏览”按钮。较新版本的 Internet Explorer 使其成为只读字段，一旦你点击字段内部，就会启动文件选择面板。这些差异不会影响上传表单的操作，但在设计布局时需要考虑它们。\n\
    \n![A978-1-4842-0635-5_6_Fig1_HTML.jpg](img/A978-1-4842-0635-5_6_Fig1_HTML.jpg)\n\
    \n**图 6-1.** 文件输入字段的外观因浏览器而异\n\n### 理解 `$_FILES` 数组\n\n令许多人困惑的是，他们的文件在上传后似乎消失了。这是因为你不能像处理文本输入那样，在\
    \ `$_POST` 数组中引用上传的文件。PHP 在一个独立的超全局数组（恰当地命名为 `$_FILES`）中传输上传文件的详细信息。此外，文件会上传到临时文件夹，除非你显式地将它们移动到所需位置，否则会被删除。虽然这听起来很麻烦，但这样做是有充分理由的：你可以在接受上传之前对文件进行安全检查。\n\
    \n#### 检查 `$_FILES` 数组\n\n理解 `$_FILES` 数组工作原理的最佳方式是实际查看它的运作。如果你已经安装了本地测试环境，可以在自己的电脑上测试所有功能。它的工作方式与将文件上传到远程服务器完全相同。\n\
    \n在 `phpsols` 站点根目录中创建一个名为 `uploads` 的新文件夹。在 `uploads` 文件夹中创建一个名为 `file_upload.php`\
    \ 的新 PHP 文件，并插入上一节的代码。或者，从 `ch06` 文件夹复制 `file_upload_01.php` 并将文件重命名为 `file_upload.php`。在结束的\
    \ `</form>` 标签之后立即插入以下代码（它也在 `file_upload_02.php` 中）：\n\n```php\n</form>\n\n<pre>\n\
    <?php\nif (isset($_POST['upload'])) {\n    print_r($_FILES);\n}\n?>\n</pre>\n\n\
    </body>\n```\n\n这段代码使用 `isset()` 来检查 `$_POST` 数组是否包含 `upload`（即提交按钮的 `name` 属性）。如果包含，你就知道表单已提交，因此可以使用\
    \ `print_r()` 来检查 `$_FILES` 数组。`<pre>` 标签使输出更易于阅读。\n\n保存 `file_upload.php` 并在浏览器中加载它。点击“浏览”（或“选择文件”）按钮，并在硬盘上选择一个文件。点击“打开”（在\
    \ Mac 上为“选择”）关闭文件选择对话框，然后点击“上传”。你应看到类似图 6-2 的内容。\n\n你可以看到 `$_FILES` 数组实际上是一个多维数组——数组的数组。顶层数组只包含一个元素，该元素的键（或索引）来自文件输入字段的\
    \ `name` 属性，在本例中是 `image`。\n\n![A978-1-4842-0635-5_6_Fig2_HTML.jpg](img/A978-1-4842-0635-5_6_Fig2_HTML.jpg)\n\
    \n**图 6-2.** `$_FILES` 数组包含上传文件的详细信息\n\n`image` 元素包含另一个数组（或子数组），由五个元素组成，分别是：\n\
    \n*   `name`：上传文件的原始名称\n*   `type`：上传文件的 MIME 类型\n*   `tmp_name`：上传文件的位置\n*  \
    \ `error`：一个整数，表示上传状态\n*   `size`：上传文件的大小，以字节为单位\n\n不要浪费时间搜索 `tmp_name` 指示的临时文件：它将不复存在。如果你不立即保存它，PHP\
    \ 会将其丢弃。\n\n不选择文件就点击上传。`$_FILES` 数组应如图 6-3 所示。\n\n![A978-1-4842-0635-5_6_Fig3_HTML.jpg](img/A978-1-4842-0635-5_6_Fig3_HTML.jpg)\n\
    \n**图 6-3.** 当没有文件上传时，`$_FILES` 数组仍然存在\n\n错误级别为 4 表示未上传文件；0 表示上传成功。本章后面的表 6-2\
    \ 列出了所有错误代码。\n\n选择一个程序文件并点击上传按钮。在很多情况下，表单会尝试上传该程序，并将其类型显示为 `application/zip`、`application/octet-stream`\
    \ 或类似内容。这是一个警告，表明检查上传文件的 MIME 类型非常重要。\n"
- fmt: "### Establishing an upload directory\n\nAnother source of confusion is the\
    \ question of permissions. An upload script that works perfectly locally may confront\
    \ you with a message like this when you transfer it to your remote server:\n\n\
    ```\nWarning: move_uploaded_file(/home/user/htdocs/testarea/kinkakuji.jpg)\n[function.move-uploaded-file]:\
    \ failed to open stream: Permission denied in\n/home/user/htdocs/testarea/upload_test.php\
    \ on line 3\n```\n\nWhy is permission denied? Most hosting companies use Linux\
    \ servers, which impose strict rules about the ownership of files and directories.\
    \ In most cases, PHP doesn’t run in your name, but as the web server—usually `nobody`\
    \ or `apache`. Unless PHP has been configured to run in your name, you need to\
    \ give global access (`chmod 777`) to every directory to which you want to upload\
    \ files.\n\nSince 777 is the least secure setting, begin by testing uploads with\
    \ a setting of 700. If that doesn’t work, try 770, and use 777 only as a last\
    \ resort. The upload directory doesn’t need to be within your site root. If your\
    \ hosting company gives you a private directory outside the site root, create\
    \ a subdirectory for uploads inside the private one. Alternatively, create a directory\
    \ inside your site root, but don’t link to it from any webpages. Give it an innocuous\
    \ name, such as `lastyear`.\n\n#### Creating an upload folder for local testing\
    \ on Windows\n\nFor the following exercises, I suggest you create a folder called\
    \ `upload_test` at the top level of the C drive. There are no permissions issues\
    \ on Windows, so that’s all that you need to do.\n\n#### Creating an upload folder\
    \ for local testing on Mac OS X\n\nMac users might need to do a little more preparation\
    \ because file permissions are similar to Linux. Create a folder called `upload_test`\
    \ in your home folder and follow the instructions in PHP Solution 6-1.\n\nIf everything\
    \ goes smoothly, you won’t need to do anything extra. But if you get a warning\
    \ that PHP “failed to open stream,” change the permissions for the `upload_test`\
    \ folder like this:\n\nSelect `upload_test` in the Mac Finder and select File\
    \ ➤ Get Info (Cmd-I) to open its info panel. In Sharing & Permissions click the\
    \ padlock icon at the bottom right to unlock the settings, then change the setting\
    \ for everyone from Read only to Read & Write, as shown in the following screenshot.\n\
    \n![A978-1-4842-0635-5_6_Figa_HTML.jpg](A978-1-4842-0635-5_6_Figa_HTML.jpg)\n\n\
    Click the padlock icon again to preserve the new settings and close the info panel.\
    \ You should now be able to use the `upload_test` folder to continue with the\
    \ rest of the chapter.\n\n## Uploading Files\n\nBefore building the file upload\
    \ class it’s a good idea to create a simple file upload script to make sure that\
    \ your system handles uploads correctly.\n\n### Moving the temporary file to the\
    \ upload folder\n\nThe temporary version of an uploaded file has only a fleeting\
    \ existence. If you don’t do anything with the file, it’s discarded immediately.\
    \ You need to tell PHP where to move it and what to call it. You do this with\
    \ the `move_uploaded_file()` function, which takes the following two arguments:\n\
    \n- The name of the temporary file\n- The full path name of the file’s new location,\
    \ including the filename itself\n\nObtaining the name of the temporary file itself\
    \ is easy: it’s stored in the `$_FILES` array as `tmp_name`. Because the second\
    \ argument requires a full path name, it gives you the opportunity to rename the\
    \ file. For the moment, let’s keep things simple and use the original filename,\
    \ which is stored in the `$_FILES` array as `name`.\n\n#### PHP Solution 6-1:\
    \ Creating a basic file upload script\n\nContinue working with the same file as\
    \ in the previous exercise. Alternatively, use `file_upload_03.php` from the `ch06`\
    \ folder. The final script for this PHP solution is in `file_upload_04.php`.\n\
    \nIf you are using the file from the previous exercise, delete the code highlighted\
    \ in bold between the closing `</form>` and `</body>` tags:\n\n```\n</form>\n\
    <pre>\n<?php\nif (isset($_POST['upload'])) {\n  print_r($_FILES);\n}\n?>\n</pre>\n\
    </body>\n```\n\nIn addition to the automatic limits set in the PHP configuration\
    \ (see Table 6-1), you can specify a maximum size for an upload file in your HTML\
    \ form. Add the following line highlighted in bold immediately before the file\
    \ input field:\n\n```\n<label for=\"image\">Upload image:</label>\n<input type=\"\
    hidden\" name=\"MAX_FILE_SIZE\" value=\"<?= $max; ?>\">\n<input type=\"file\"\
    \ name=\"image\" id=\"image\">\n```\n\nThis is a hidden form field, so it won’t\
    \ be displayed onscreen. However, it’s vital to place it before the file input\
    \ field, otherwise it won’t work. The `name` attribute, `MAX_FILE_SIZE`, is fixed\
    \ and case-sensitive. The `value` attribute sets the maximum size of the upload\
    \ file in bytes.\n\nInstead of specifying a numeric value, I have used a variable\
    \ called `$max`. This value will also be used in the server-side validation of\
    \ the file upload, so it makes sense to define it once, avoiding the possibility\
    \ of changing it in one place but forgetting to change it elsewhere.\n\nDefine\
    \ the value of `$max` in a PHP block above the `DOCTYPE` declaration, like this:\n\
    \n```\n<?php\n// set the maximum upload size in bytes\n$max = 51200;\n?>\n<!DOCTYPE\
    \ HTML>\n```\n\nThis sets the maximum upload size to 50 KB (51,200 bytes).\n\n\
    The code that moves the uploaded file from its temporary location to its permanent\
    \ one needs to be run after the form has been submitted. Insert the following\
    \ code in the PHP block you have just created at the top of the page:\n\n```\n\
    $max = 51200;\nif (isset($_POST['upload'])) {\n  // define the path to the upload\
    \ folder\n  $destination = '/path/to/upload_test/';\n  // move the file to the\
    \ upload folder and rename it\n  move_uploaded_file($_FILES['image']['tmp_name'],\n\
    \                     $destination . $_FILES['image']['name']);\n}\n?>\n```\n\n\
    Although the code is quite short, there’s a lot going on. The conditional statement\
    \ executes the code only if the Upload button has been clicked by checking to\
    \ see if its key is in the `$_POST` array.\n\nThe value of `$destination` depends\
    \ on your operating system and the location of the `upload_test` folder.\n\n-\
    \ If you are using Windows and you created the `upload_test` folder at the top\
    \ level of the C drive, it should look like this:\n\n```\n$destination = 'C:/upload_test/';\n\
    ```\n\nNote that I have used forward slashes instead of the Windows convention\
    \ of backslashes. You can use either, but if you use backslashes, the final one\
    \ needs to be escaped by another backslash, like this (otherwise the backslash\
    \ escapes the quote):\n\n```\n$destination = 'C:\\upload_test\\\\';\n```\n\n-\
    \ On a Mac, if you created the `upload_test` folder in your home folder, it should\
    \ look like this (replace username with your Mac username):\n\n```\n$destination\
    \ = '/Users/username/upload_test/';\n```\n\n- On a remote server, you need the\
    \ fully qualified file path as the second argument. On Linux, it will probably\
    \ be something like this:\n\n```\n$destination = '/home/user/private/upload_test/';\n\
    ```\n\nThe final line inside the `if` statement moves the file with the `move_uploaded_file()`\
    \ function. The function takes two arguments: the name of the temporary file and\
    \ the full path to where the file is to be saved.\n\n`$_FILES` is a multidimensional\
    \ array that takes its name from the file input field. So, `$_FILES ['image']['tmp_name']`\
    \ is the temporary file, and `$_FILES['image']['name']` contains the name of the\
    \ original file. The second argument, `$destination . $_FILES['image']['name']`,\
    \ stores the uploaded file under its original name inside the upload folder.\n\
    \n**Caution**"
  raw: '### Establishing an upload directory


    Another source of confusion is the question of permissions. An upload script that
    works perfectly locally may confront you with a message like this when you transfer
    it to your remote server:


    `Warning: move_uploaded_file(/home/user/htdocs/testarea/kinkakuji.jpg)`


    `[function.move-uploaded-file]: failed to open stream: Permission denied in`


    `/home/user/htdocs/testarea/upload_test.php on line 3`


    Why is permission denied? Most hosting companies use Linux servers, which impose
    strict rules about the ownership of files and directories. In most cases, PHP
    doesn’t run in your name, but as the web server—usually `nobody` or `apache`.
    Unless PHP has been configured to run in your name, you need to give global access
    (`chmod 777`) to every directory to which you want to upload files.


    Since 777 is the least secure setting, begin by testing uploads with a setting
    of 700\. If that doesn’t work, try 770, and use 777 only as a last resort. The
    upload directory doesn’t need to be within your site root. If your hosting company
    gives you a private directory outside the site root, create a subdirectory for
    uploads inside the private one. Alternatively, create a directory inside your
    site root, but don’t link to it from any webpages. Give it an innocuous name,
    such as `lastyear`.


    #### Creating an upload folder for local testing on Windows


    For the following exercises, I suggest you create a folder called `upload_test`
    at the top level of the C drive. There are no permissions issues on Windows, so
    that’s all that you need to do.


    #### Creating an upload folder for local testing on Mac OS X


    Mac users might need to do a little more preparation because file permissions
    are similar to Linux. Create a folder called `upload_test` in your home folder
    and follow the instructions in PHP Solution 6-1.


    If everything goes smoothly, you won’t need to do anything extra. But if you get
    a warning that PHP “failed to open stream,” change the permissions for the `upload_test`
    folder like this:


    Select `upload_test` in the Mac Finder and select File ➤ Get Info (Cmd-I) to open
    its info panel.   In Sharing & Permissions click the padlock icon at the bottom
    right to unlock the settings, then change the setting for everyone from Read only
    to Read & Write, as shown in the following screenshot.  


    ![A978-1-4842-0635-5_6_Figa_HTML.jpg](A978-1-4842-0635-5_6_Figa_HTML.jpg)


    Click the padlock icon again to preserve the new settings and close the info panel.
    You should now be able to use the `upload_test` folder to continue with the rest
    of the chapter.


    ## Uploading Files


    Before building the file upload class it’s a good idea to create a simple file
    upload script to make sure that your system handles uploads correctly.


    ### Moving the temporary file to the upload folder


    The temporary version of an uploaded file has only a fleeting existence. If you
    don’t do anything with the file, it’s discarded immediately. You need to tell
    PHP where to move it and what to call it. You do this with the `move_uploaded_file()`
    function, which takes the following two arguments:


    *   The name of the temporary file

    *   The full path name of the file’s new location, including the filename itself


    Obtaining the name of the temporary file itself is easy: it’s stored in the `$_FILES`
    array as `tmp_name`. Because the second argument requires a full path name, it
    gives you the opportunity to rename the file. For the moment, let’s keep things
    simple and use the original filename, which is stored in the `$_FILES` array as
    `name`.


    #### PHP Solution 6-1: Creating a basic file upload script


    Continue working with the same file as in the previous exercise. Alternatively,
    use `file_upload_03.php` from the `ch06` folder. The final script for this PHP
    solution is in `file_upload_04.php`.


    If you are using the file from the previous exercise, delete the code highlighted
    in bold between the closing `</form>` and `</body>` tags:


    `</form>`


    `<pre>`


    `<?php`


    `if (isset($_POST[''upload''])) {`


    `print_r($_FILES);`


    `}`


    `?>`


    `</pre>`


    `</body>`


    In addition to the automatic limits set in the PHP configuration (see Table [6-1](#A978-1-4842-0635-5_6_Chapter.html#Tab1)),
    you can specify a maximum size for an upload file in your HTML form. Add the following
    line highlighted in bold immediately before the file input field:


    `<label for="image">Upload image:</label>`


    `<input type="hidden" name="MAX_FILE_SIZE" value="<?= $max; ?>">`


    `<input type="file" name="image" id="image">`


    This is a hidden form field, so it won’t be displayed onscreen. However, it’s
    vital to place it before the file input field, otherwise it won’t work. The `name`
    attribute, `MAX_FILE_SIZE`, is fixed and case-sensitive. The `value` attribute
    sets the maximum size of the upload file in bytes.


    Instead of specifying a numeric value, I have used a variable called `$max`. This
    value will also be used in the server-side validation of the file upload, so it
    makes sense to define it once, avoiding the possibility of changing it in one
    place but forgetting to change it elsewhere.


    Define the value of `$max` in a PHP block above the `DOCTYPE` declaration, like
    this:


    `<?php`


    `// set the maximum upload size in bytes`


    `$max = 51200;`


    `?>`


    `<!DOCTYPE HTML>`


    This sets the maximum upload size to 50 KB (51,200 bytes).


    The code that moves the uploaded file from its temporary location to its permanent
    one needs to be run after the form has been submitted. Insert the following code
    in the PHP block you have just created at the top of the page:


    `$max = 51200;`


    `if (isset($_POST[''upload''])) {`


    `// define the path to the upload folder`


    `$destination = ''/` `path` `/` `to` `/upload_test/'';`


    `// move the file to the upload folder and rename it`


    `move_uploaded_file($_FILES[''image''][''tmp_name''],`


    `$destination . $_FILES[''image''][''name'']);`


    `}`


    `?>`


    Although the code is quite short, there’s a lot going on. The conditional statement
    executes the code only if the Upload button has been clicked by checking to see
    if its key is in the `$_POST` array.


    The value of `$destination` depends on your operating system and the location
    of the `upload_test` folder.


    *   If you are using Windows and you created the `upload_test` folder at the top
    level of the C drive, it should look like this:


    `$destination = ''C:/upload_test/'';`


    Note that I have used forward slashes instead of the Windows convention of backslashes.
    You can use either, but if you use backslashes, the final one needs to be escaped
    by another backslash, like this (otherwise the backslash escapes the quote):


    `$destination = ''C:\upload_test\\'';`


    *   On a Mac, if you created the `upload_test` folder in your home folder, it
    should look like this (replace username with your Mac username):


    `$destination = ''/Users/` `username` `/upload_test/'';`


    *   On a remote server, you need the fully qualified file path as the second argument.
    On Linux, it will probably be something like this:


    `$destination = ''/home/user/private/upload_test/'';`


    The final line inside the `if` statement moves the file with the `move_uploaded_file()`
    function. The function takes two arguments: the name of the temporary file and
    the full path to where the file is to be saved.


    `$_FILES` is a multidimensional array that takes its name from the file input
    field. So, `$_FILES [''image''][''tmp_name'']` is the temporary file, and `$_FILES[''image''][''name'']`
    contains the name of the original file. The second argument, `$destination . $_FILES[''image''][''name'']`,
    stores the uploaded file under its original name inside the upload folder.


    Caution'
  trans: "\n### 建立上传目录\n\n另一个容易混淆的问题是权限问题。一个在本地运行完美的上传脚本，当你将其传输到远程服务器时，可能会遇到类似如下的报错信息：\n\
    \n```\nWarning: move_uploaded_file(/home/user/htdocs/testarea/kinkakuji.jpg)\n\
    [function.move-uploaded-file]: failed to open stream: Permission denied in\n/home/user/htdocs/testarea/upload_test.php\
    \ on line 3\n```\n\n为什么会被拒绝权限？多数主机服务商使用 Linux 服务器，这类系统对文件和目录的所有权有严格规定。大多数情况下，PHP\
    \ 并非以你的用户名运行，而是作为 Web 服务器用户——通常是 `nobody` 或 `apache`。除非 PHP 已被配置为以你的用户名运行，否则你需要为每个想上传文件的目录授予全局访问权限（`chmod\
    \ 777`）。\n\n由于 777 是最不安全的设置，请先从 700 权限开始测试上传。如果不行，再尝试 770，只有在万不得已时才使用 777。上传目录不必位于你的网站根目录内。如果你的主机服务商在网站根目录外提供了私人目录，请在该私人目录中为上传文件创建子目录。或者，你可以在网站根目录内创建一个目录，但不要在任何网页中链接到它。给它起一个无害的名称，例如\
    \ `lastyear`。\n\n#### 在 Windows 上创建用于本地测试的上传文件夹\n\n在接下来的练习中，我建议你在 C 盘根目录下创建一个名为\
    \ `upload_test` 的文件夹。Windows 系统没有权限问题，所以只需这样做即可。\n\n#### 在 Mac OS X 上创建用于本地测试的上传文件夹\n\
    \nMac 用户可能需要多做一点准备工作，因为文件权限与 Linux 类似。在你的主文件夹中创建一个名为 `upload_test` 的文件夹，并按照 PHP\
    \ 方案 6-1 中的说明进行操作。\n\n如果一切顺利，你无需额外操作。但如果你收到 PHP“failed to open stream”的警告，请按如下方式更改\
    \ `upload_test` 文件夹的权限：\n\n在 Mac Finder 中选择 `upload_test`，然后选择 文件 ➤ 显示简介（Cmd-I）打开其信息面板。在“共享与权限”中，点击右下角的挂锁图标解锁设置，然后将“everyone”的权限从“只读”更改为“读与写”，如下方截图所示。\n\
    \n![A978-1-4842-0635-5_6_Figa_HTML.jpg](img/A978-1-4842-0635-5_6_Figa_HTML.jpg)\n\
    \n再次点击挂锁图标以保存新设置，然后关闭信息面板。现在你应该能够使用 `upload_test` 文件夹继续本章剩余的内容。\n\n## 上传文件\n\n\
    在构建文件上传类之前，最好先创建一个简单的文件上传脚本，以确保你的系统能正确处理上传。\n\n### 将临时文件移动到上传文件夹\n\n上传文件的临时版本存在时间极短。如果你不对文件进行任何操作，它会被立即丢弃。你需要告诉\
    \ PHP 将其移动到哪里，以及将其命名为什么。这可以通过 `move_uploaded_file()` 函数来实现，该函数接受以下两个参数：\n\n- 临时文件的名称\n\
    - 文件新位置的完整路径，包括文件名本身\n\n获取临时文件的名称很简单：它存储在 `$_FILES` 数组中，键名为 `tmp_name`。由于第二个参数需要完整路径，这为你提供了重命名文件的机会。现在，我们保持简单，使用原始文件名，它存储在\
    \ `$_FILES` 数组中，键名为 `name`。\n\n#### PHP 方案 6-1：创建基础文件上传脚本\n\n继续使用上一个练习中的同一个文件。或者，使用\
    \ `ch06` 文件夹中的 `file_upload_03.php`。本 PHP 方案的最终脚本位于 `file_upload_04.php`。\n\n\
    如果你使用的是上一个练习中的文件，请删除 `</form>` 和 `</body>` 标签之间加粗显示的代码：\n\n```\n</form>\n<pre>\n\
    <?php\nif (isset($_POST['upload'])) {\n  print_r($_FILES);\n}\n?>\n</pre>\n</body>\n\
    ```\n\n除了 PHP 配置中设置的内置限制（见表 6-1），你还可以在 HTML 表单中指定上传文件的最大大小。在文件输入字段之前立即添加以下加粗显示的行：\n\
    \n```\n<label for=\"image\">上传图片：</label>\n<input type=\"hidden\" name=\"MAX_FILE_SIZE\"\
    \ value=\"<?= $max; ?>\">\n<input type=\"file\" name=\"image\" id=\"image\">\n\
    ```\n\n这是一个隐藏表单字段，因此不会在屏幕上显示。但是，必须将其放在文件输入字段之前，否则它将无法工作。`name` 属性 `MAX_FILE_SIZE`\
    \ 是固定的，并且区分大小写。`value` 属性以字节为单位设置上传文件的最大大小。\n\n我没有直接指定数值，而是使用了一个名为 `$max` 的变量。该值也将在服务器端文件上传验证中使用，因此只需定义一次是有意义的，这样可以避免在一个地方更改它而忘记在其他地方更改的可能性。\n\
    \n在 `DOCTYPE` 声明上方的 PHP 代码块中定义 `$max` 的值，如下所示：\n\n```\n<?php\n// 设置最大上传大小（以字节为单位）\n\
    $max = 51200;\n?>\n<!DOCTYPE HTML>\n```\n\n这将最大上传大小设置为 50 KB（51,200 字节）。\n\n将上传文件从其临时位置移动到永久位置的代码需要在表单提交后运行。在你刚刚在页面顶部创建的\
    \ PHP 代码块中插入以下代码：\n\n```\n$max = 51200;\nif (isset($_POST['upload'])) {\n  //\
    \ 定义上传文件夹的路径\n  $destination = '/path/to/upload_test/';\n  // 将文件移动到上传文件夹并重命名\n\
    \  move_uploaded_file($_FILES['image']['tmp_name'],\n                     $destination\
    \ . $_FILES['image']['name']);\n}\n?>\n```\n\n虽然代码很短，但包含了很多操作。条件语句通过检查“上传”按钮的键是否存在于\
    \ `$_POST` 数组中，来确保仅在点击该按钮时才执行代码。\n\n`$destination` 的值取决于你的操作系统和 `upload_test`\
    \ 文件夹的位置。\n\n- 如果你使用的是 Windows，并且在 C 盘根目录创建了 `upload_test` 文件夹，则应如下所示：\n\n```\n\
    $destination = 'C:/upload_test/';\n```\n\n请注意，我使用的是正斜杠，而不是 Windows 约定使用的反斜杠。你可以使用任意一种，但如果使用反斜杠，最后一个反斜杠需要用另一个反斜杠进行转义，如下所示（否则反斜杠会转义引号）：\n\
    \n```\n$destination = 'C:\\upload_test\\\\';\n```\n\n- 在 Mac 上，如果你在主文件夹中创建了 `upload_test`\
    \ 文件夹，则应如下所示（将 username 替换为你的 Mac 用户名）：\n\n```\n$destination = '/Users/username/upload_test/';\n\
    ```\n\n- 在远程服务器上，你需要将完全限定的文件路径作为第二个参数。在 Linux 上，可能如下所示：\n\n```\n$destination =\
    \ '/home/user/private/upload_test/';\n```\n\n`if` 语句内的最后一行使用 `move_uploaded_file()`\
    \ 函数移动文件。该函数接受两个参数：临时文件的名称和文件将要保存到的完整路径。\n\n`$_FILES` 是一个多维数组，其名称来自文件输入字段。因此，`$_FILES['image']['tmp_name']`\
    \ 是临时文件，`$_FILES['image']['name']` 包含原始文件的名称。第二个参数 `$destination . $_FILES['image']['name']`\
    \ 将上传的文件以其原始名称存储在上传文件夹中。\n\n**警告**\n"
- fmt: "\n\n你可能遇到过使用`copy()`而非`move_uploaded_file()`的脚本。如果没有其他检查机制，`copy()`会让你的网站面临严重的安全风险。例如，恶意用户可能试图欺骗你的脚本，让它复制本不应有权访问的文件（如密码文件）。请始终使用`move_uploaded_file()`；它安全得多。\n\
    \n保存`file_upload.php`，并在浏览器中加载它。点击“浏览”或“选择文件”按钮，从`phpsols`站点的`images`文件夹中选择一个文件。如果你从其他位置选择文件，请确保其大小小于50KB。点击“打开”（Mac上为“选择”）以在表单中显示文件名。在显示文件输入字段的浏览器中，你可能无法看到完整路径。这是一个外观问题，留待你自己通过CSS解决。点击“上传”按钮。如果在本地测试，表单输入字段应该几乎立即清空。导航到`upload_test`文件夹，确认你选择的图片副本已存在。如果不在，请对照`file_upload_04.php`检查你的代码。另外，检查上传文件夹是否已设置正确的权限（如有必要）。\
    \  \n\n注意：下载文件使用`C:/upload_test/`。请根据你的环境进行调整。\n\n如果没有收到错误信息但找不到文件，请确保图片没有超过`upload_max_filesize`（参见表[6-1](#A978-1-4842-0635-5_6_Chapter.html#Tab1)）。同时检查你是否遗漏了`$destination`末尾的尾部斜杠。你可能会在`upload_test`文件夹中找不到`myfile.jpg`，而是在磁盘结构中高一级的位置发现`upload_testmyfile.jpg`。\n\
    \n将`$max`的值改为`3000`，保存`file_upload.php`，然后通过选择一个大于2.9KB的文件（`images`文件夹中的任何文件都可以）再次测试。点击“上传”按钮并检查`upload_test`文件夹。该文件应该不在那里。\
    \  \n\n如果你有实验兴趣，请将`MAX_FILE_SIZE`隐藏字段移到文件输入字段下方，然后再次尝试。请确保你选择的文件与步骤6中使用的文件不同，因为`move_uploaded_file()`会覆盖同名的现有文件。稍后你将学习如何为文件赋予唯一名称。\n\
    \n这次，文件应被复制到你的上传文件夹中。在继续之前，将隐藏字段移回其原始位置。\n\n使用`MAX_FILE_SIZE`的好处是，如果文件大于规定值，PHP会放弃上传，从而避免因文件过大而产生不必要的延迟。不幸的是，用户可以通过伪造隐藏字段提交的值来绕过这一限制，因此本章剩余部分将要开发的脚本也会在服务器端检查文件大小。\n\
    \n## 创建PHP文件上传类\n\n正如你刚刚所见，上传文件只需几行代码，但这本身并不足以使任务完成。你需要通过执行以下步骤来提高过程的安全性：\n\n\
    *   检查错误级别。\n*   在服务器端验证文件是否超过最大允许大小。\n*   检查文件类型是否可接受。\n*   从文件名中移除空格。\n*   重命名与现有文件同名的文件以防止覆盖。\n\
    *   自动处理多个文件上传。\n*   告知用户结果。\n\n每次上传文件时都需要执行这些步骤，因此构建一个易于重用的脚本很有意义。这就是我选择使用自定义类的原因。构建PHP类通常被视为高级主题，但不要因此望而却步。\n\
    \n类是一组旨在协同工作的函数的集合。这虽然是一种过度简化，但足以让你理解基本概念。类中的每个函数通常应专注于单一任务，因此你将构建独立的函数来实现前面列表中概述的步骤。代码还应该是通用的，不能局限于特定的网页。一旦构建了类，你就可以在任何表单中重用。尽管类定义很长，但使用该类只需编写几行代码。\n\
    \n如果你赶时间，完成的类位于`ch06/PhpSolutions`文件夹中。即使你不亲手构建脚本，也请通读说明，以便清楚地了解其工作原理。\n\n###\
    \ 定义PHP类\n\n定义PHP类非常简单。使用`class`关键字，后跟类名，然后将类的所有代码放在一对花括号之间。按照惯例，类名以大写字母开头，并存储在与其同名的单独文件中。\n\
    \n#### 使用命名空间避免命名冲突\n\n如果你编写自己的脚本，通常不必担心命名冲突。我们将要创建一个用于上传文件的类，因此`Upload`或`FileUpload`似乎是合乎逻辑的名称。但一旦你开始使用他人（包括本书）编写的脚本和类，就可能存在多个类具有相同名称的风险。\n\
    \n避免使用常见名称冲突的原始策略是将类定义存储在描述其功能的文件夹结构中，并为顶级文件夹赋予一个基于域名或公司名称的唯一名称。然后，类名通过使用下划线代替斜杠，从文件夹结构中创建出来。这经常导致笨拙的类名，例如`Zend_File_Transfer_Adapter_Http`。\n\
    \n注意：将类定义存储在基于类名和命名空间的文件和文件夹中，可以方便地使用自动加载脚本自动加载类。我们不会使用自动加载器，因为在上传表单所在的文件中只需要包含一个类定义。自动加载器主要在处理多个类时派上用场。\n\
    \nPHP 5.3引入了一种使用命名空间的更简洁系统。PHP命名空间仍然基于文件夹结构，但它们使用反斜杠代替下划线。命名空间也单独声明，允许你使用简单的类名。\n\
    \n我们将要构建的类名为`Upload`，但为了避免命名冲突，它将在名为`PhpSolutions\\File`的命名空间中创建。\n\n使用`namespace`关键字在文件顶部声明命名空间，后跟命名空间，如下所示：\n\
    \n`namespace PhpSolutions\\File;`\n\n注意：PHP在所有操作系统上都使用反斜杠作为命名空间分隔符。不要试图在Linux或Mac\
    \ OS X上将其改为正斜杠。\n\n因此，如果我们在此命名空间中创建一个名为`Upload`的类，其完全限定名称为`PhpSolutions\\File\\\
    Upload`。表面上看，这似乎很难说是进步。该类仍然有一个使用反斜杠代替下划线的笨拙名称。区别在于，你可以导入一个带命名空间的类并使用较短的名称。\n\n\
    #### 导入带命名空间的类\n\n为避免每次引用带命名空间的类时都必须使用其完全限定名称，你可以在脚本开头使用`use`关键字导入该类，如下所示：\n\n\
    `use PhpSolutions\\File\\Upload;`\n\n导入类之后，你就可以将其引用为`Upload`，而不是使用完全限定名称。导入带命名空间的类与包含它不同。它仅仅是一个声明，表明你想使用该类的较短名称。事实上，你可以使用`as`关键字为导入的类分配别名，如下所示：\n\
    \n`use PhpSolutions\\File\\Upload as FileUploader;`\n\n然后该类可以被称为`FileUploader`。使用别名主要在大型应用程序中两个不同框架的类同名时有用。\n\
    \n注意：你仍需单独包含类定义。事实上，在加载类定义之前导入带命名空间的类是很常见的，因为`use`关键字必须在脚本的顶层声明。它不能嵌套在条件语句内部。\n\
    \n"
  raw: 'You may come across scripts that use `copy()` instead of `move_uploaded_file()`.
    Without other checks in place, `copy()` can expose your website to serious security
    risks. For example, a malicious user could try to trick your script into copying
    files that it should not have access to, such as password files. Always use `move_uploaded_file()`;
    it’s much more secure.


    Save `file_upload.php`, and load it into your browser. Click the Browse or Choose
    File button and select a file from the `images` folder in the `phpsols` site.
    If you choose one from elsewhere, make sure it’s less than 50 KB. Click Open (Choose
    on a Mac) to display the filename in the form. In browsers that display a file
    input field, you might not be able to see the full path. That’s a cosmetic matter
    that I’ll leave you to sort out yourself with CSS. Click the Upload button. If
    you’re testing locally, the form input field should clear almost instantly.  
    Navigate to the `upload_test` folder and confirm that a copy of the image you
    selected is there. If it isn’t, check your code against `file_upload_04.php`.
    Also check that the correct permissions have been set on the upload folder, if
    necessary.   Note


    The download files use `C:/upload_test/`. Adjust this to your own setup.


    If you get no error messages and cannot find the file, make sure that the image
    didn’t exceed `upload_max_filesize` (see Table [6-1](#A978-1-4842-0635-5_6_Chapter.html#Tab1)).
    Also check that you didn’t leave the trailing slash off the end of `$destination`.
    Instead of `myfile.jpg` in the `upload_test` folder, you may find `upload_testmyfile.jpg`
    one level higher in your disk structure.


    Change the value of `$max` to `3000`, save `file_upload.php`, and test it again
    by selecting a file bigger than 2.9 KB to upload (any file in the images folder
    will do). Click the Upload button and check the `upload_test` folder. The file
    shouldn’t be there.   If you’re in the mood for experimentation, move the `MAX_FILE_SIZE`
    hidden field below the file input field, and try it again. Make sure you choose
    a different file from the one you used in step 6, because `move_uploaded_file()`
    overwrites existing files of the same name. You’ll learn later how to give files
    unique names.


    This time the file should be copied to your upload folder. Move the hidden field
    back to its original position before continuing.


    The advantage of using `MAX_FILE_SIZE` is that PHP abandons the upload if the
    file is bigger than the stipulated value, avoiding unnecessary delays if the file
    is too big. Unfortunately, users can get around this restriction by faking the
    value submitted by the hidden field, so the script you’ll develop in the rest
    of this chapter will check the size on the server side, too.


    ## Creating a PHP File Upload Class


    As you have just seen, it takes just a few lines of code to upload a file, but
    this is not enough on its own to call the job complete. You need to make the process
    more secure by implementing the following steps:


    *   Check the error level.

    *   Verify on the server that the file doesn’t exceed the maximum permitted size.

    *   Check that the file is of an acceptable type.

    *   Remove spaces from the filename.

    *   Rename files that have the same name as an existing one to prevent overwriting.

    *   Handle multiple file uploads automatically.

    *   Inform the user of the outcome.


    You need to implement these steps every time you want to upload files, so it makes
    sense to build a script that can be easily reused. That’s why I have chosen to
    use a custom class. Building PHP classes is generally regarded as an advanced
    subject, but don’t let that put you off.


    A class is a collection of functions designed to work together. That’s an oversimplification,
    but it’s sufficiently accurate to give you the basic idea. Each function inside
    a class should normally focus on a single task, so you’ll build separate functions
    to implement the steps outlined in the previous list. The code should also be
    generic so it isn’t tied to a specific webpage. Once you have built the class,
    you can reuse it in any form. Although the class definition is long, using the
    class involves writing only a few lines of code.


    If you’re in a hurry, the finished class is in the ch06/PhpSolutions folder. Even
    if you don’t build the script yourself, read through the descriptions so you have
    a clear understanding of how it works.


    ### Defining a PHP class


    Defining a PHP class is very easy. You use the `class` keyword followed by the
    class name and then put all the code for the class between a pair of curly braces.
    By convention, class names begin with an uppercase letter and are stored in a
    separate file with the same name as the class.


    #### Using a namespace to avoid naming conflicts


    If you’re writing your own scripts, you rarely need to worry about naming conflicts.
    We’re going to create a class to upload files, so `Upload` or `FileUpload` seems
    like a logical name. But once you start using scripts and classes created by others
    (including those in this book), there’s a danger of multiple classes having the
    same name.


    The original strategy to avoid conflicts with common names was to store class
    definitions in a folder structure that described their functionality, and to give
    the top-level folder a unique name based on a domain or company name. The class
    name was then created from the folder structure using underscores instead of slashes.
    This frequently led to unwieldy class names such as `Zend_File_Transfer_Adapter_Http`.


    Note


    Storing class definitions in files and folders based on the class name and namespace
    makes it easy to load classes automatically using an autoloader script. We won’t
    be using an autoloader because there’s only one class definition to include in
    the file that contains the upload form. An autoloader mainly comes in handy when
    working with multiple classes.


    PHP 5.3 introduced a less cumbersome system using namespaces. PHP namespaces are
    still based on the folder structure, but they use backslashes instead of underscores.
    The namespace is also declared separately, allowing you to use simple class names.


    The class we’re going to build is called `Upload`, but to avoid naming conflicts,
    it will be created in a namespace called `PhpSolutions\File`.


    You declare a namespace at the top of a file using the `namespace` keyword followed
    by the namespace like this:


    `namespace PhpSolutions\File;`


    Caution


    PHP uses a backslash as the namespace separator on all operating systems. Don’t
    be tempted to change it to forward slashes on Linux or Mac OS X.


    So, if we create a class called `Upload` in this namespace, its fully qualified
    name is `PhpSolutions\File\Upload`. On the face of it, this hardly seems like
    progress. The class still has an unwieldy name that uses backslashes instead of
    underscores. The difference is that you can import a namespaced class and use
    a shorter name.


    #### Importing a namespaced class


    To avoid having to use the fully qualified name every time you refer to a namespaced
    class, you can import the class at the start of a script with the `use` keyword
    like this:


    `use PhpSolutions\File\Upload;`


    After importing the class, you can then refer to it as `Upload` rather than using
    the fully qualified name. Importing a namespaced class is not the same as including
    it. It’s simply a declaration that you want to use the class with a shorter name.
    In fact, you can assign an alias to the imported class with the `as` keyword,
    like this:


    `use PhpSolutions\File\Upload as FileUploader;`


    The class can then be referred to as `FileUploader`. Using an alias is mainly
    useful in large applications where two classes from different frameworks have
    the same name.


    Caution


    You still need to include the class definition separately. In fact, it’s common
    to import a namespaced class before the class definition is loaded, because the
    `use` keyword must be declared at the top level of a script. It cannot be nested
    inside a conditional statement.'
  trans: '


    你可能遇到过使用`copy()`而非`move_uploaded_file()`的脚本。如果没有其他检查机制，`copy()`会让你的网站面临严重的安全风险。例如，恶意用户可能试图欺骗你的脚本，让它复制本不应有权访问的文件（如密码文件）。请始终使用`move_uploaded_file()`；它安全得多。


    保存`file_upload.php`，并在浏览器中加载它。点击“浏览”或“选择文件”按钮，从`phpsols`站点的`images`文件夹中选择一个文件。如果你从其他位置选择文件，请确保其大小小于
    50KB。点击“打开”（Mac 上为“选择”）以在表单中显示文件名。在显示文件输入字段的浏览器中，你可能无法看到完整路径。这是一个外观问题，留待你自己通过
    CSS 解决。点击“上传”按钮。如果在本地测试，表单输入字段应该几乎立即清空。导航到`upload_test`文件夹，确认你选择的图片副本已存在。如果不在，请对照`file_upload_04.php`检查你的代码。另外，检查上传文件夹是否已设置正确的权限（如有必要）。


    注意：下载文件使用`C:/upload_test/`。请根据你的环境进行调整。


    如果没有收到错误信息但找不到文件，请确保图片没有超过`upload_max_filesize`（参见表 6-1）。同时检查你是否遗漏了`$destination`末尾的尾部斜杠。你可能会在`upload_test`文件夹中找不到`myfile.jpg`，而是在磁盘结构中高一级的位置发现`upload_testmyfile.jpg`。


    将`$max`的值改为`3000`，保存`file_upload.php`，然后通过选择一个大于 2.9KB 的文件（`images`文件夹中的任何文件都可以）再次测试。点击“上传”按钮并检查`upload_test`文件夹。该文件应该不在那里。


    如果你有实验兴趣，请将`MAX_FILE_SIZE`隐藏字段移到文件输入字段下方，然后再次尝试。请确保你选择的文件与步骤 6 中使用的文件不同，因为`move_uploaded_file()`会覆盖同名的现有文件。稍后你将学习如何为文件赋予唯一名称。


    这次，文件应被复制到你的上传文件夹中。在继续之前，将隐藏字段移回其原始位置。


    使用`MAX_FILE_SIZE`的好处是，如果文件大于规定值，PHP 会放弃上传，从而避免因文件过大而产生不必要的延迟。不幸的是，用户可以通过伪造隐藏字段提交的值来绕过这一限制，因此本章剩余部分将要开发的脚本也会在服务器端检查文件大小。


    ## 创建 PHP 文件上传类


    正如你刚刚所见，上传文件只需几行代码，但这本身并不足以使任务完成。你需要通过执行以下步骤来提高过程的安全性：


    *   检查错误级别。

    *   在服务器端验证文件是否超过最大允许大小。

    *   检查文件类型是否可接受。

    *   从文件名中移除空格。

    *   重命名与现有文件同名的文件以防止覆盖。

    *   自动处理多个文件上传。

    *   告知用户结果。


    每次上传文件时都需要执行这些步骤，因此构建一个易于重用的脚本很有意义。这就是我选择使用自定义类的原因。构建 PHP 类通常被视为高级主题，但不要因此望而却步。


    类是一组旨在协同工作的函数的集合。这虽然是一种过度简化，但足以让你理解基本概念。类中的每个函数通常应专注于单一任务，因此你将构建独立的函数来实现前面列表中概述的步骤。代码还应该是通用的，不能局限于特定的网页。一旦构建了类，你就可以在任何表单中重用。尽管类定义很长，但使用该类只需编写几行代码。


    如果你赶时间，完成的类位于`ch06/PhpSolutions`文件夹中。即使你不亲手构建脚本，也请通读说明，以便清楚地了解其工作原理。


    ### 定义 PHP 类


    定义 PHP 类非常简单。使用`class`关键字，后跟类名，然后将类的所有代码放在一对花括号之间。按照惯例，类名以大写字母开头，并存储在与其同名的单独文件中。


    #### 使用命名空间避免命名冲突


    如果你编写自己的脚本，通常不必担心命名冲突。我们将要创建一个用于上传文件的类，因此`Upload`或`FileUpload`似乎是合乎逻辑的名称。但一旦你开始使用他人（包括本书）编写的脚本和类，就可能存在多个类具有相同名称的风险。


    避免使用常见名称冲突的原始策略是将类定义存储在描述其功能的文件夹结构中，并为顶级文件夹赋予一个基于域名或公司名称的唯一名称。然后，类名通过使用下划线代替斜杠，从文件夹结构中创建出来。这经常导致笨拙的类名，例如`Zend_File_Transfer_Adapter_Http`。


    注意：将类定义存储在基于类名和命名空间的文件和文件夹中，可以方便地使用自动加载脚本自动加载类。我们不会使用自动加载器，因为在上传表单所在的文件中只需要包含一个类定义。自动加载器主要在处理多个类时派上用场。


    PHP 5.3 引入了一种使用命名空间的更简洁系统。PHP 命名空间仍然基于文件夹结构，但它们使用反斜杠代替下划线。命名空间也单独声明，允许你使用简单的类名。


    我们将要构建的类名为`Upload`，但为了避免命名冲突，它将在名为`PhpSolutions\File`的命名空间中创建。


    使用`namespace`关键字在文件顶部声明命名空间，后跟命名空间，如下所示：


    `namespace PhpSolutions\File;`


    注意：PHP 在所有操作系统上都使用反斜杠作为命名空间分隔符。不要试图在 Linux 或 Mac OS X 上将其改为正斜杠。


    因此，如果我们在此命名空间中创建一个名为`Upload`的类，其完全限定名称为`PhpSolutions\File\Upload`。表面上看，这似乎很难说是进步。该类仍然有一个使用反斜杠代替下划线的笨拙名称。区别在于，你可以导入一个带命名空间的类并使用较短的名称。


    #### 导入带命名空间的类


    为避免每次引用带命名空间的类时都必须使用其完全限定名称，你可以在脚本开头使用`use`关键字导入该类，如下所示：


    `use PhpSolutions\File\Upload;`


    导入类之后，你就可以将其引用为`Upload`，而不是使用完全限定名称。导入带命名空间的类与包含它不同。它仅仅是一个声明，表明你想使用该类的较短名称。事实上，你可以使用`as`关键字为导入的类分配别名，如下所示：


    `use PhpSolutions\File\Upload as FileUploader;`


    然后该类可以被称为`FileUploader`。使用别名主要在大型应用程序中两个不同框架的类同名时有用。


    注意：你仍需单独包含类定义。事实上，在加载类定义之前导入带命名空间的类是很常见的，因为`use`关键字必须在脚本的顶层声明。它不能嵌套在条件语句内部。


