    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**实现订单处理功能的骨架**\n\n**练习：实现订单处理功能的骨架**\n\
    \n1. 加载`pgAdmin III`，并连接到`hatshop`数据库。\n\n2. 点击**工具** ➤ **查询工具**（或点击工具栏上的 SQL\
    \ 按钮）。此时会打开一个新的查询窗口。\n\n3. 使用查询工具执行以下代码，在`hatshop`数据库中创建审计表：\n\n    ```sql\n \
    \   -- Create audit table\n\n    CREATE TABLE audit\n    (\n       audit_id SERIAL\
    \ NOT NULL,\n       order_id INTEGER NOT NULL,\n       created_on TIMESTAMP NOT\
    \ NULL,\n       message TEXT NOT NULL,\n       message_number INTEGER NOT NULL,\n\
    \       CONSTRAINT pk_audit_id PRIMARY KEY (audit_id),\n       CONSTRAINT fk_order_id\
    \ FOREIGN KEY (order_id)\n          REFERENCES orders (order_id)\n          ON\
    \ UPDATE RESTRICT ON DELETE RESTRICT\n    );\n    ```\n\n4. 使用查询工具执行以下代码，在`hatshop`数据库中创建`orders_create_audit`函数：\n\
    \n    ```sql\n    -- Create orders_create_audit function\n\n    CREATE FUNCTION\
    \ orders_create_audit(INTEGER, TEXT, INTEGER) RETURNS VOID LANGUAGE plpgsql AS\
    \ $$\n    DECLARE\n         inOrderId ALIAS FOR $1;\n         inMessage ALIAS\
    \ FOR $2;\n         inMessageNumber ALIAS FOR $3;\n    BEGIN\n         INSERT\
    \ INTO audit (order_id, created_on, message, message_number)\n              VALUES\
    \ (inOrderId, NOW(), inMessage, inMessageNumber);\n    END;\n    $$;\n    ```\n\
    \n5. 转到业务层，将以下方法添加到`business/orders.php`中的`Orders`类：\n\n    ```php\n    // Creates\
    \ audit record\n\n    public static function CreateAudit($orderId, $message, $messageNumber)\n\
    \    {\n        // Build the SQL query\n        $sql = 'SELECT orders_create_audit(:order_id,\
    \ :message,\n                  :message_number);';\n        // Build the parameters\
    \ array\n        $params = array (':order_id' => $orderId,\n                 \
    \        ':message' => $message,\n                         ':message_number' =>\
    \ $messageNumber);\n\n        // Prepare the statement with PDO-specific functionality\n\
    \        $result = DatabaseHandler::Prepare($sql);\n\n        // Execute the query\n\
    \        return DatabaseHandler::Execute($result, $params);\n    }\n    ```\n\n\
    6. 在`business`目录中添加一个名为`order_processor.php`的新文件，内容如下：\n\n    ```php\n    <?php\n\
