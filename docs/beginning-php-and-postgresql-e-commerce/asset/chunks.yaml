    Installing Smarty implies simply copying the Smarty PHP classes to your project’s
    folder. Many web-hosting companies provide these classes for you, but it’s better
    to have your own installation for two reasons:


    - It’s always preferable to make your project independent of the server’s settings,
    when possible.

    - Even if the hosting system has Smarty installed, that company’s version might
    be changed in time, perhaps without notice, possibly affecting your web site’s
    functionality.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    You’ll install Smarty into a subfolder of the `hatshop` folder named `libs` in
    the following exercise. The steps should work the same no matter what operating
    system you’re running on.


