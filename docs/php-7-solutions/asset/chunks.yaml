    \ The other place to check is, of course, your PHP configuration. The class depends\
    \ on the GD extension being enabled. Although GD is widely supported, it’s not\
    \ always on by default.\n\n## Resizing an Image Automatically on Upload\n\nNow\
    \ that you have a class that creates a thumbnail from a larger image, it’s relatively\
    \ simple to adapt the `Upload` class from Chapter 9 to generate a thumbnail from\
    \ an uploaded image—in fact, not only from a single image but also from multiple\
    \ images.\n\nInstead of changing the code in the `Upload` class, it’s more efficient\
    \ to extend the class and create a subclass. You then have the choice of using\
    \ the original class to perform uploads of any type of file or the subclass to\
    \ create thumbnail images on upload. The subclass also needs to provide the option\
    \ to save or discard the larger image after the thumbnail has been created.\n\n\
    Before diving into the code, let’s take a quick look at how you create a subclass.\n\
    \n### Extending a class\n\nWe saw an example of extending a built-in class, `RecursiveIteratorIterator`,\
    \ in PHP Solution 8-8 “Building nested lists automatically.” The advantage of\
    \ extending a class is that the new **subclass** or **child class** inherits all\
    \ the features of its parent, including both properties and methods, but can adapt\
    \ (or **override**) some of them and acquire new ones of its own. This simplifies\
    \ the process of creating a class to perform a more specialized task.\n\nThe `Upload`\
    \ class you created in Chapter 9 performs basic file uploads. In this chapter,\
    \ you’ll extend it to create a child class called `ThumbnailUpload` that uses\
    \ the basic upload features of its parent but adds specialized features that create\
    \ thumbnail images. The subclass will be created in the `PhpSolutions/Image` folder,\
    \ so it will use `PhpSolutions\\Image` as its namespace.\n\nLike all children,\
    \ a child class often needs to borrow from its parent. This frequently happens\
    \ when you override a method in the child class but need to use the original version\
    \ as well. To refer to the parent version, you prefix it with the `parent` keyword\
    \ followed by two colons, like this:\n\n```\nparent::originalMethod();\n```\n\n\
    You’ll see how this works in PHP Solution 10-5, because the child class defines\
    \ its own constructor to add an extra argument but also needs to use the parent\
    \ constructor.\n\nLet’s create a class capable of uploading images and generating\
    \ thumbnails at the same time.\n\n### PHP Solution 10-5: Creating the ThumbnailUpload\
    \ class\n\nThis PHP solution extends the `Upload` class from Chapter 9 and uses\
    \ it in conjunction with the `Thumbnail` class to upload and resize images. It\
    \ demonstrates how to create a child class and override parent methods. To create\
    \ the child class, you need `Upload.php` from Chapter 9 and `Thumbnail.php` from\
    \ this chapter. There’s a copy of these files in the `ch09/PhpSolutions/File`\
    \ and `ch10/PhpSolutions/Image` folders, respectively.\n\n1. Create a new file\
    \ called `ThumbnailUpload.php` in the `PhpSolutions/Image` folder. It will contain\
    \ only PHP code, so strip out any HTML inserted by your script editor and add\
    \ the following code:\n\n```php\n<?php\nnamespace PhpSolutions\\Image;\nuse PhpSolutions\\\
    File\\Upload;\nrequire_once __DIR__ . '/../File/Upload.php';\nrequire_once 'Thumbnail.php';\n\
    class ThumbnailUpload extends Upload {\n}\n```"
