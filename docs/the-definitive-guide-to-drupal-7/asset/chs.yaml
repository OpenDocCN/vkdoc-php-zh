  ## 在 Ubuntu 上安装 Drupal


  **作者：本杰明·梅兰松（Benjamin Melançon）**


  在 Linux 环境中开发网站意味着你使用的所有工具（像 Drupal 本身一样）默认都是开源免费软件。也许对你更重要的是，Drupal 所依赖的服务器、编程语言和数据库在
  Linux 上设置和运行起来更容易。


  我强烈建议你在 Linux 环境中开发网站，还有一个额外原因：你的 Drupal 站点很可能托管在运行 Linux 的服务器上。虽然我们衷心支持各种版本的 GNU-Linux，但如果你运行的不是流行的
  Ubuntu 版本，我会假定你已经有经验了。本附录将重点介绍如何在 Ubuntu 中设置 Drupal。


  ![images](img/square.jpg) **提示** 如果你目前没有运行 Linux，并且还不想为了开发或只是运行本地网站而切换主操作系统，你可以在虚拟机中运行
  Linux。


  在开始设置你的开发环境时，最重要的素质就是耐心。前期需要花些时间让一切正常运转，但这会为你以后节省大量时间。


  ### 在 Windows 或 Mac OS X 上运行 Ubuntu


  要在一台运行其他操作系统的计算机上使用 Linux——例如你使用的是 Mac OS X 或 Windows 个人电脑——你可以在虚拟机中非常高效地运行 Linux。近年来，虚拟机的功能已经变得相当完善。


  下载你选择的虚拟机软件。开源软件 VirtualBox 对 Windows 或 Mac 是免费的（参见 `virtualbox.org`）。专有软件 VMWare（包括用于在
  Mac OS X 上运行 Linux 的 VMWare Fusion）也相当实惠。


  同时下载当前 Ubuntu 版本的磁盘映像（访问 `ubuntu.com/download`，选择“下载并安装”）。


  一旦虚拟机软件和 Ubuntu 磁盘映像都下载到你的电脑上，请按照你的虚拟机软件的说明来安装操作系统。最重要的事情是告诉虚拟机你的磁盘映像在电脑上的位置（并且它需要保持在这个位置）。对于其他配置，接受默认设置即可。


  ![images](img/square.jpg) **注意** 如果使用 VirtualBox，你可以不必下载 Ubuntu 磁盘映像，而是直接获取一个已为
  Drupal 开发配置好 Ubuntu 的 VirtualBox 设备：`drupal.org/project/quickstart`。Quickstart 提供了一个类似于下一节描述的
  Drubuntu 的环境，但它与 Drubuntu 不兼容——你必须二选一。




  ### 使用 Drubuntu 为 Drupal 开发定制 Ubuntu 系统


  `Drubuntu` 为单个开发者搭建 Drupal 开发环境，包含 LAMP 栈（Linux、Apache、MySQL、PHP）、Eclipse 集成开发环境、Firefox
  开发者工具、Git、Drush 等。`Drubuntu` 还包含其自有的 Drush 脚本，用于添加和删除本地站点。


  ![images](img/square.jpg) **提示** 为 Drupal 开发而搭建的 Ubuntu 环境领域正在快速改善。请参阅 `dgd7.org/ubuntu`
  获取最新推荐。


  获取安装 `Drubuntu` 的最新说明，请访问其项目页面 `drupal.org/project/drubuntu`。它提供了一种无需事先下载即可引导安装的方法，即直接从仓库中获取
  `drubuntu-bootstrap.sh` shell 脚本。当然，你也可以从其项目页面 (`./drubuntu/drubuntu-bootstrap.sh`)
  下载 `Drubuntu` 并运行。


  输入你的密码，并根据提示输入 **y** 表示同意（系统通常会提示你可能需要输入密码，但有时并不需要），然后耐心等待它安装一个庞大的开发环境，其中包含许多你每天都会使用的工具。


  #### 创建 MySQL 根密码


  `Drubuntu` 没有为你设置的一个功能是设置 MySQL 根密码，而你可以自行设置，使你的开发环境更加便捷。


  `mysqladmin -u root password 你的密码`


  然后将该密码添加到 MySQL 配置文件中，这样你就不必每次都输入了。使用 Vim 等文本编辑器打开或创建该文件。


  `vi ~/.my.cnf`


  添加以下内容：


  ```

  [client]

  user=root

  pass=你的密码

  ```


  #### 安装 Drupal


  `Drubuntu` 的主要价值在于为你安装 LAMP、Git、Drush 等工具。你不需要使用其特殊工具（例如 `drubuntu-site-add` Drush
  命令），事实上，本指南中也不会用到。肯定有人会制作出最终的 Drush 命令来启动新站点，而大多数开发者都有自己的 shell 脚本——但这些脚本通常与并非通用的仓库或服务器实践绑定。你可以在
  `dgd7.org/sh` 查看用于许多用途的辅助 shell 脚本示例，包括像清单 G-1 所示用一条命令设置新站点。


  当一个项目相关的所有内容都放在一处时，就很容易一起纳入版本控制（参见第 2 章）。因此，我建议你创建一个文件夹作为项目文件夹，并将 Drupal 放在该文件夹的子文件夹中（例如，命名为
  `drupal` 或 `web`）。在 Web 根目录之上设置项目文件夹，可以让你将不应放在公共 Web 根目录（即 Drupal 的 `index.php`
  所在目录）中的材料与项目放在一起。好的做法是为项目（本例中为 **dgd7**）创建一个目录，并将 Drupal 核心放入 Web 根目录（`dgd7/web`）的一个子目录中，我将其称为
  Drupal 根目录。


  将 Drupal 核心副本放置到该目录后，进入你的 Drupal 根目录，创建 `sites/default/default.settings.php` 文件的副本，在复制时将其重命名为
  `sites/default/settings.php`，并更改文件目录的权限以使其可写。


  ***清单 G-1.** 下载 Drupal 并准备运行 Web 安装器的非 Drush 命令行步骤。将 `drupal-7.1` 替换为 Drupal 的当前稳定版本；例如
  `drupal-7.4`。*


  ```

  wget http://ftp.drupal.org/files/projects/drupal-7.1.tar.gz

  tar -xzf drupal-7.1.tar.gz

  mkdir -p ~/code/dgd7

  mv drupal-7.1 ~/dgd7/web

  cd ~/code/dgd7/web

  cp sites/default/default.settings.php sites/default/settings.php

  chmod -R o+w sites/default

  ```


  ![images](img/square.jpg) **提示** 前五个步骤可以使用 Drush 更快地完成：`cd ~/code; mkdir dgd7; cd
  dgd7; drush dl drupal --drupal-project-rename=web; cd web`。


  `Drubuntu` 将 Apache 配置为自动将放在 `~/workspace` 目录中的任何目录作为网站提供服务。也就是说，如果你创建一个目录 `~/workspace/dgd7`
  并在其中放入一个 `index.html` 文件，你可以在浏览器中访问 `dgd7.localhost`，你将看到该 `index.html` 文件以网页形式呈现。由于
  Drupal 运行在其项目目录的子目录中，请将完整的项目目录放在你自己的 `~/code` 目录中，并从 workspace 目录创建一个指向项目 Web 根目录的*符号链接*，如下所示：


  `ln -s /home/ben/code/dgd7/web /home/ben/workspace/dgd7`


  在创建不会成为项目（或者不遵循将 Web 根目录作为子目录包含在项目仓库中的方法）的测试站点时，你可以直接在 `Drubuntu` 的 workspace 目录中创建项目，并跳过符号链接步骤。


  #### 创建数据库


  Drupal 将信息存储在数据库中。有关你网站的所有信息都存储在此数据库中，根据信息类型（例如文章、评论和用户）整齐地划分到不同的表中。使用命令行为你的新 Drupal
  网站创建 MySQL（参见清单 G-2）或 MariaDB 数据库既快速又简单，但你也可以使用 phpMyAdmin 等应用程序或 Web 应用程序。如果使用
  phpMyAdmin，你可以通过转到“权限” ![images](img/U001.jpg) “添加新用户”，然后在“用户数据库”下选择“创建与用户名同名的数据库并授予所有权限”来同时快速创建数据库和用户。


  ***清单 G-2.** 在 MySQL 中创建数据库的命令行说明。如果你尚未按照“创建 MySQL 根密码”中所述创建 `.my.cnf` 文件，则第一行必须为
  `mysql -u root -p 密码`。*


  ```

  $ mysql

  mysql> CREATE DATABASE 数据库名;

  mysql> GRANT ALL PRIVILEGES ON 数据库名.* TO "用户名"@"localhost" IDENTIFIED BY "密码";

  mysql> FLUSH PRIVILEGES;

  mysql> EXIT;

  ```


  用你自己的值替换斜体部分。对于数据库名称，你可以保持简单，将其命名为 `dgd7`，并且为了更简单，也可以将数据库用户命名为 `dgd7`。主机名在本例中为 `localhost`，并且由于在你自己的计算机上安全性不是问题，请继续也将密码设置为
  `dgd7`。


  ![images](img/square.jpg) **提示** 请参阅 `dgd7.org/sh` 获取用于自动化创建数据库以及我刚刚涵盖的所有其他操作的 shell
  脚本。安装一个站点时影响不大，但当你安装很多站点时，时间累积起来就很重要了，并且养成创建新测试站点的习惯会有所帮助。




