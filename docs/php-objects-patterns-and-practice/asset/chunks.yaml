  trans: '

    ## 推向极致：服务定位器


    我承诺本章将处理对象创建的逻辑，摒弃许多面向对象示例中那种偷偷摸摸的推诿责任。然而，这里的一些模式巧妙地避开了对象创建中决策的部分，即便没有避开创建本身。


    `单例`模式是无辜的。对象创建的逻辑是内置且明确的。`抽象工厂`模式将产品族的创建分组到不同的具体创建者中。但我们如何决定使用哪个具体创建者呢？`原型`模式向我们提出了类似的问题。这两种模式都处理对象的创建，但它们推迟了应该创建哪个对象或哪组对象的决策。


    系统选择的特定具体创建者通常根据某种配置开关的值来决定。这可能位于数据库、配置文件或服务器文件（如 Apache 的目录级配置文件，通常称为`.htaccess`）中，甚至可能硬编码为
    PHP 变量或属性。由于 PHP 应用程序必须为每个请求重新配置，你需要脚本初始化尽可能无痛。因此，我经常选择在 PHP 代码中硬编码配置标志。这可以手动完成，也可以通过编写自动生成类文件的脚本来完成。下面是一个包含日历协议类型标志的简单类：


    ```

    // listing 09.35

    class Settings

    {

    static $COMMSTYPE = ''Bloggs'';

    }

    ```


    现在有了一个标志（尽管不优雅），我可以创建一个使用它来决定在请求时提供哪个`CommsManager`的类。通常会看到`单例`与`抽象工厂`模式结合使用，所以让我们这样做：


    ```

    // listing 09.36

    class AppConfig

    {

    private static $instance;

    private $commsManager;

    private function __construct()

    {

    // 只会运行一次

    $this->init();

    }

    private function init()

    {

    switch (Settings::$COMMSTYPE) {

    case ''Mega'':

    $this->commsManager = new MegaCommsManager();

    break;

    default:

    $this->commsManager = new BloggsCommsManager();

    }

    }

    public static function getInstance(): AppConfig

    {

    if (empty(self::$instance)) {

    self::$instance = new self();

    }

    return self::$instance;

    }

    public function getCommsManager(): CommsManager

    {

    return $this->commsManager;

    }

    }

    ```


    `AppConfig`类是一个标准的`单例`。因此，我可以在系统的任何地方获取一个`AppConfig`实例，并且始终会得到同一个实例。`init()`方法由类的构造函数调用，因此在进程中只运行一次。它测试`Settings::$COMMSTYPE`属性，并根据其值实例化一个具体的`CommsManager`对象。现在我的脚本可以获取一个`CommsManager`对象并与之协作，无需了解其具体实现或它生成的具体类：


    ```

    $commsMgr = AppConfig::getInstance()->getCommsManager();

    $commsMgr->getApptEncoder()->encode();

    ```


    因为`AppConfig`为我们管理了查找和创建组件的工作，它是所谓服务定位器模式的一个实例。这很简洁（我们将在第 12 章更详细地再次看到它），但它确实引入了一种比直接实例化更良性的依赖关系。任何使用其服务的类都必须显式调用这个大型对象，从而将它们绑定到更广泛的系统。因此，有些人更喜欢另一种方法。


    ## 辉煌的隔离：依赖注入


    在上一节中，我使用了一个工厂内的标志和条件语句来决定提供两个`CommsManager`类中的哪一个。这个解决方案并不像它本可以的那样灵活。可提供的类被硬编码在一个单一的定位器中，通过条件语句内置了两个组件的选择。不过，这种不灵活是我演示代码的一个方面，而不是服务定位器本身的问题。我可以使用任意数量的策略来为客户端代码定位、实例化和返回对象。然而，服务定位器经常受到质疑的真正原因是，组件必须显式调用定位器。这感觉有点全局化。而面向对象开发者有理由对所有全局的东西持怀疑态度。


    ### 问题


    每当你使用`new`操作符时，你就在该范围内关闭了多态的可能性。想象一个方法，它部署了一个硬编码的`BloggsApptEncoder`对象，例如：


    ```

    // listing 09.37

    class AppointmentMaker

    {

    public function makeAppointment()

    {

    $encoder = new BloggsApptEncoder();

    return $encoder->encode();

    }

    }

    ```


    这也许能满足我们初始的需求，但它不允许任何其他`ApptEncoder`实现在运行时被切换进来。这限制了该类可以被使用的方式，并且使得该类更难测试。本章大部分内容正是针对这种不灵活性。但正如我在上一节中指出的，我忽略了一个事实：即使我们使用`原型`或`抽象工厂`模式，实例化也必须在某个地方发生。这里又是一个创建`原型`对象的代码片段：


    ```

    // listing 09.32

    $factory = new TerrainFactory(

    new EarthSea(),

    new EarthPlains(),

    new EarthForest()

    );

    ```


    这里调用的`原型` `TerrainFactory`类朝着正确的方向迈出了一步——它需要通用类型：`Sea`、`Plains`和`Forest`。该类将决定提供哪些实现的责任留给了客户端代码。但这要如何实现呢？

    '
- fmt: '### Implementation


    Much of our code calls out to factories. As we have seen, this model is known
    as the Service Locator pattern. A method delegates responsibility to a provider
    which it trusts to find and serve up an instance of the desired type. The Prototype
    example inverts this; it simply expects the instantiating code to provide implementations
    at call time. There’s no magic here—it’s simply a matter of requiring types in
    a constructor’s signature, instead of creating them directly within the method.
    A variation on this is to provide setter methods, so that clients can pass in
    objects before invoking a method that uses them.


    So let’s fix up `AppointmentMaker` in this way:


    ```

    // listing 09.38

    class AppointmentMaker2

    {

    private $encoder;

    public function __construct(ApptEncoder $encoder) {

    $this->encoder = $encoder;

    }

    public function makeAppointment()

    {

    return $this->encoder->encode();

    }

    }

    ```


    `AppointmentMaker2` has given up control—it no longer creates the `BloggsApptEncoder`,
    and we have gained flexibility. What about the logic for the actual creation of
    objects, though? Where do the dreaded `new` statements live? We need an assembler
    component to take on the job. Typically, this approach uses a configuration file
    to figure out which implementations should be instantiated. There are tools to
    help us with this, but this book is all about doing it ourselves, so let’s build
    a very naive implementation. I’ll start with a crude XML format which describes
    the relationships between classes in our system and the concrete types that should
    be passed to their constructors:


    I’ve described two classes from this chapter: `TerrainFactory` and `AppointmentMaker2`.
    I want `TerrainFactory` to be instantiated with an `EarthSea` object, a `MarsPlains`
    object, and an `EarthForest` object. I would also like `AppointmentMaker2` to
    be passed a `BloggsApptEncoder` object.


    Here’s a very simple assembler class that reads this configuration data and instantiates
    objects on demand:


    ```

    // listing 09.39

    class ObjectAssembler

    {

    private $components = [];

    public function __construct(string $conf)

    {

    $this->configure($conf);

    }

    private function configure(string $conf)

    {

    $data = simplexml:load_file($conf);

    foreach ($data->class as $class) {

    $args = [];

    $name = (string)$class[''name''];

    foreach ($class->arg as $arg) {

    $argclass = (string)$arg[''inst''];

    $args[(int)$arg[''num'']] = $argclass;

    }

    ksort($args);

    $this->components[$name] = function () use ($name, $args) {

    $expandedargs = [];

    foreach ($args as $arg) {

    $expandedargs[] = new $arg();

    }

    $rclass = new \ReflectionClass($name);

    return $rclass->newInstanceArgs($expandedargs);

    };

    }

    }

    public function getComponent(string $class)

    {

    if (! isset($this->components[$class])) {

    throw new \Exception("unknown component ''$class''");

    }

    $ret = $this->components[$class]();

    return $ret;

    }

    }

    ```


    This is pretty crude, and it is a little dense at first reading, so let’s work
    through it briefly. Most of the real action takes place in `configure()`. The
    method accepts a path which is passed on from the constructor. It uses the `simplexml`
    extension to parse the configuration XML. In a real project, of course, we’d add
    more error handling here and throughout. For now, I’m pretty trusting of the XML
    I’m parsing. For every `<class>` element, I extract the fully qualified class
    name and store it in the `$name` variable. Then I acquire all the `<arg>` subelements,
    all of which have their own class names. I store the arguments in an array named
    `$args`, ordered according to the XML `num` argument. I pack all of this in an
    anonymous function which I store in the `$components` property. This function,
    which instantiates a requested class and all its required objects, is only invoked
    when `getComponent()` is called with the correct class name. In this way the `ObjectAssembler`
    can maintain a pretty small footprint. Note the use of a closure here. The anonymous
    function has access to the `$name` and `$args` variables declared in the scope
    of its creation, thanks to the `use` keyword.


    Of course, this is really toy code. In addition to improved error checking, a
    robust implementation would need to handle the possibility that the objects to
    be injected into a component might themselves require arguments. We might also
    want to address issues around caching. For example, should a contained object
    be instantiated for every call, or only once?


    **Note**


    If you are considering building a Dependency Injection assembler/container, you
    should look at a couple of options: Pimple (notwithstanding its unpleasant name)
    and Symfony DI. You can find out more about Pimple at [`http://pimple.sensiolabs.org/`](http://pimple.sensiolabs.org/);
    you can learn more about the Symfony DI component at [`http://symfony.com/doc/current/components/dependency_injection/introduction.html`](http://symfony.com/doc/current/components/dependency_injection/introduction.html).


    Nevertheless, we can now maintain the flexibility of our components and handle
    instantiation dynamically. Let’s try out the `ObjectAssembler`:


    ```

    // listing 09.40

    $assembler = new ObjectAssembler("src/ch09/batch14/objects.xml");

    $apptmaker = $assembler->getComponent("\\popp\\ch09\\batch14\\AppointmentMaker2");

    $out = $apptmaker->makeAppointment();

    print $out;

    ```


    Once we have an `ObjectAssembler`, object acquisition takes up a single statement.
    The `AppointmentMaker2` class is free of its previous hard-coded dependency on
    an `ApptEncoder` instance. A developer can now use the configuration file to control
    what classes are used at runtime, as well as to test `AppointmentMaker2` in isolation
    from the wider system.'
