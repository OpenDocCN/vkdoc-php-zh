    Recipe 7-11\. Stream Context


    Problem


    Working with streams of different types might require options and parameters that
    can’t be passed in a generic way to the fopen() function. These options and parameters
    can be used to control how the stream reacts to various requests.


    Solution


    With the function stream_context_create() it’s possible to create a context resuest
    that can be used as an optional parameter to most of the file handling functions.
    To create a stream context you must pass one or two associative arrays to the
    function. The first array will hold the options and the second optional array
    will be the parameters. The second params parameter is not widely used but can
    be used to set a notification callback function that can be used for things progress
    indication.


    How it Works


    By default when the function file_get_contents() is used to retrieve content with
    the http protocol the request will be created as a GET request where all the parameters
    are passed on as part of the URL. If you want to pass parameters as header values
    or you want to send a POST request you can use stream_contect_


    create() to generate these parameters in a form that can be passed to the third
    argument for file_get_


    contents() . The next example shows how to create a script that can generate a
    form post to a URL (the url in the example is fake but everything else works).
    The script starts with a function that generates the payload or body of the POST
    request. The function html_build_form() takes two parameters. The first is the
    string to use as a boundary between each of the variables in the post. and the
    second is an associative array of key and value pairs to submit to the server.


    After the function the data is populated. This could be with input from a user
    or a query from a database. In the last section of the script the stream context
    is created from an array of options and the request is sent. Although the file_get_contents()
    is used it will actually start by sending all the data to the server and then
    retrieve the response for the request. The server might do a redirect after the
    post if that is the case it will be handled by the request. There is no need for
    additional code to handle that. If the response is a file not found (404), access
    denied (403), or any other status the script should handle that.


    CHAPTER 7 ■ FILES AND DIRECTORIES


    <?php


    // 7_25.php


    function http_build_form($mime_boundary, $data) {


    $eol = "\r\n";


    $form_data = '''';


    if (is_array($data)) {


    foreach ($data as $name => $value) {


    if (is_array($value)) {


    foreach($value as $val) {


    $form_data .= ''--'' . $mime_boundary . $eol .


    "Content-Disposition: form-data; name=\"{$name}[]\"" .


    $eol . $eol . $val . $eol;


    }


    }


    else {


    $form_data .= ''--'' . $mime_boundary . $eol .


    "Content-Disposition: form-data; name=\"{$name}\"" .


    $eol . $eol . $value . $eol;


    }


    }


    }


    $form_data .= "--" . $mime_boundary . "--" . $eol . $eol; return $form_data;


    }


    $data = [


    ''name'' => ''Donald Duck'',


    ''phone'' => ''555 555 1234''


    ];


    $url = http://example.com/form;


    $mime_boundary = md5(time());


    $content = http_build_form($mime_boundary, $data);


    $options = array(''http'' =>


    array(


    ''method'' => ''POST'',


    ''header'' => ''Content-Type: multipart/form-data; boundary='' .


    $mime_boundary,


    ''content'' => $content


    )


    );


    $context = stream_context_create($options);


    $response = file_get_contents($url, FILE_TEXT, $context);


    var_dump($response);


    CHAPTER 7 ■ FILES AND DIRECTORIES'
  trans: "\n大多数网络服务或 API 都需要将认证信息和其他参数传递给服务器，以便获取数据。也有一些 API 可以在无需认证的情况下使用，就像这里用到的这个，它会直接返回网络服务器所看到的你电脑的公网\
    \ IP 地址。\n\n```php\n<?php\n\n// 7_24.php\n\n$data = json_decode(file_get_contents(\"\
    http://jsonip.com\")); print_r($data);\n```\n\n## 第 7 章 ■ 文件与目录\n\n此示例的输出是来自 API\
    \ 的响应。在这个例子中，响应是一个包含三个属性的对象。\n\n```\nstdClass Object\n(\n    [ip] => 180.190.203.15\n\
    \    [about] => /about\n    [Pro!] => http://getjsonip.com\n)\n```\n\n### 7-11.\
    \ 流上下文\n\n**问题**\n\n处理不同类型的流时，可能需要一些无法以通用方式传递给 `fopen()` 函数的选项和参数。这些选项和参数可以用来控制流如何响应各种请求。\n\
    \n**解决方案**\n\n使用 `stream_context_create()` 函数可以创建一个上下文资源，这个资源可以作为可选参数用于大多数文件处理函数。要创建流上下文，必须向该函数传递一个或两个关联数组。第一个数组包含选项，第二个可选数组则是参数。第二个\
    \ `params` 参数使用并不广泛，但可用于设置一个通知回调函数，该函数可用来实现进度指示等功能。\n\n**工作原理**\n\n默认情况下，当使用 `file_get_contents()`\
    \ 函数通过 HTTP 协议获取内容时，请求会以 GET 请求的形式创建，所有参数都作为 URL 的一部分传递。如果你想将参数作为头部值传递，或者想发送 POST\
    \ 请求，则可以使用 `stream_context_create()` 来生成这些参数，使其能够作为第三个参数传递给 `file_get_contents()`。下面的示例展示了如何创建一个脚本，该脚本能够向一个\
    \ URL 生成表单 POST 请求（示例中的 URL 是虚构的，但其他部分都是可运行的）。脚本从一个函数开始，该函数用于生成 POST 请求的负载或主体。`http_build_form()`\
    \ 函数接收两个参数：第一个是用于分隔 POST 中每个变量的边界字符串，第二个是要提交给服务器的键值对关联数组。\n\n在函数之后，数据被填充。这些数据可能来自用户的输入或数据库的查询。在脚本的最后一部分，根据一个选项数组创建了流上下文，并发送了请求。虽然使用了\
    \ `file_get_contents()`，但它实际上会先将所有数据发送到服务器，然后获取该请求的响应。服务器在 POST 之后可能会进行重定向；如果是这种情况，请求会自动处理，无需编写额外的代码来处理。如果响应是文件未找到\
    \ (404)、访问被拒绝 (403) 或任何其他状态，脚本应自行处理。\n\n## 第 7 章 ■ 文件与目录\n\n```php\n<?php\n\n\
    // 7_25.php\n\nfunction http_build_form($mime_boundary, $data) {\n    $eol = \"\
    \\r\\n\";\n    $form_data = '';\n\n    if (is_array($data)) {\n        foreach\
    \ ($data as $name => $value) {\n            if (is_array($value)) {\n        \
    \        foreach($value as $val) {\n                    $form_data .= '--' . $mime_boundary\
    \ . $eol .\n                        \"Content-Disposition: form-data; name=\\\"\
    {$name}[]\\\"\" .\n                        $eol . $eol . $val . $eol;\n      \
    \          }\n            } else {\n                $form_data .= '--' . $mime_boundary\
    \ . $eol .\n                    \"Content-Disposition: form-data; name=\\\"{$name}\\\
    \"\" .\n                    $eol . $eol . $value . $eol;\n            }\n    \
    \    }\n    }\n\n    $form_data .= \"--\" . $mime_boundary . \"--\" . $eol . $eol;\n\
    \    return $form_data;\n}\n\n$data = [\n    'name' => 'Donald Duck',\n    'phone'\
    \ => '555 555 1234'\n];\n\n$url = 'http://example.com/form';\n$mime_boundary =\
    \ md5(time());\n$content = http_build_form($mime_boundary, $data);\n\n$options\
    \ = array('http' =>\n    array(\n        'method' => 'POST',\n        'header'\
    \ => 'Content-Type: multipart/form-data; boundary=' .\n            $mime_boundary,\n\
    \        'content' => $content\n    )\n);\n\n$context = stream_context_create($options);\n\
    $response = file_get_contents($url, FILE_TEXT, $context);\nvar_dump($response);\n\
    ```\n\n## 第 7 章 ■ 文件与目录\n"
- fmt: "# Recipe 7-12\\. File Iterators\n\n## Problem\n\nWhen the same action is going\
    \ to be performed on multiple files we need a way to figure out which files are\
    \ stored in a directory and we need ways to traverse recursively through the directory\
    \ structure.\n\n## Solution\n\nThe simple way to iterate over all the files in\
    \ a directory is to use the `glob()` function to create an array of all the files\
    \ that matches a specific file pattern and then use `foreach()` or one of the\
    \ other looping methods to step through all the files. The `glob()` function looks\
    \ in a single directory. In order to get files from subdirectories you must call\
    \ the `glob()` function for each of them.\n\nA second option is to use the `opendir()`,\
    \ `readdir()`, and `closedir()` functions or the more object oriented approach\
    \ with `dir()` that returns an instance of the built-in class `Directory`. Since\
    \ PHP 5.0 these functions have supported the `ftp://` URL wrapper.\n\nAnother\
    \ option is to use one of the iterator classes that are included with the SPL\
    \ extension. SPL stands for Standard PHP Library and it’s an extension that is\
    \ enabled by default. The iterator classes can be used directly with `foreach()`\
    \ and there is no need to read the contents of the file system into memory before\
    \ iterating over the files.\n\n## How it Works\n\nThe next three examples show\
    \ how to get the contents of a directory using the methods described above.\n\n\
    The scripts will use the same directory as the script is located in and will print\
    \ the name of each file and add a slash to the name if it's a directory.\n\n```php\n\
    <?php\n// 7_26.php\n$pattern = \"*\";\n$files = glob($pattern);\nforeach ($files\
    \ as $file) {\n    echo $file;\n    if (is_dir($file)) {\n        echo \"/\";\n\
    \    }\n    echo \"\\n\";\n}\n```\n\nThis method of getting the names of files\
    \ in a directory works well for small number of files and for short paths. If\
    \ you are looking at a directory with a long path or with many files it can consume\
    \ too much memory.\n\n```php\n<?php\n// 7_27.php\n$dir = dir(\".\");\nwhile (($file\
    \ = $dir->read()) !== false) {\n    echo $file;\n    if (is_dir($file)) {\n  \
    \      echo \"/\";\n    }\n    echo \"\\n\";\n}\n$dir->close();\n```\n\nIn this\
    \ example we only have one element of the directory in memory at any given time.\
    \ Another difference is that this method includes entries for `'./'` and `'../'`.\
    \ These are automatically excluded when the `glob()` function is used.\n\nTo do\
    \ a similar thing with the SPL DirectoryIterators the code could look like this:\n\
    \n```php\n<?php\n// 7_28.php\nforeach (new DirectoryIterator('.') as $fileInfo)\
    \ {\n    if ($fileInfo->isDot()) continue;\n    echo $fileInfo->getFilename();\n\
    \    if ($fileInfo->isDir()) {\n        echo \"/\";\n    }\n    echo \"\\n\";\n\
    }\n```\n\nOne advantage of using the SPL DirectoryIterator is it's very easy to\
    \ make recursive although the behavior is slightly different.\n\n```php\n<?php\n\
    // 7_29.php\n$iterator = new RecursiveDirectoryIterator('.',\n    FilesystemIterator::CURRENT_AS_FILEINFO);\n\
    foreach (new RecursiveIteratorIterator($iterator) as $fileInfo) {\n    if ($fileInfo->isDot())\
    \ continue;\n    echo $fileInfo->getPathname();\n    if ($fileInfo->isDir()) {\n\
    \        echo \"/\";\n    }\n    echo \"\\n\";\n}\n```\n\n# Recipe 7-13\\. Download\
    \ Files\n\n## Problem\n\nThe standard output from a web server to a browser is\
    \ some form of text file that contains HTML, JavaScript, CSS, or JSON content.\
    \ The web server can also return other types of files that are supported by the\
    \ browser for rendering (image and video files). But if the files are intended\
    \ for other use than rendering in the browser, we need a way to download the content\
    \ and save it to disk or have a different type of client consume it.\n\n## Solution\n\
    \nThe standard web server configuration will know the mime type of a file based\
    \ on its file extension. If the file is located in the directory structure available\
    \ for the web server to serve files on you can in most cases simply link to the\
    \ file directly and the browser will know that it doesn't know how to handle the\
    \ file and it will save it to disk.\n\nIf the file is located outside of the available\
    \ directory structure or the file has to be assembled based on input parameters\
    \ you can use PHP to read or generate the file and use the `header()` function\
    \ to specify `Content-Type` and `Content-Disposition` in order to help the browser\
    \ handle the file as you intend. This is also useful if you want to download a\
    \ file that contains HTML or an image and you want to prevent the browser from\
    \ showing the file. This will cause the browser to show the save file dialog instead\
    \ of just showing the content in the browser.\n\n## How it Works\n\nIf you have\
    \ a link in your document that goes to an image you would create some HTML that\
    \ looks like this:\n\n```html\n<a href=\"myfile.gif\"><img src=\"myfile.gif\"\
    \ /></a>\n```\n\nThis will show an image and create a link to the same file so\
    \ when the user clicks on the image the browser will simply show the image as\
    \ the only content in the browser.\n\nIf you change the HTML to look like this:\n\
    \n```html\n<a href=\"myfile.php\"><img src=\"myfile.gif\" /></a>\n```\n\nYou will\
    \ need a PHP script to handle the rendering and also to set the headers. The script\
    \ could look something like this:\n\n```php\n<?php\n// 7_30.php\nheader(\"Content-Type:\
    \ image/gif; Content-Disposition: attachment;\");\nreadfile('myfile.gif');\n```\n\
    \nThis will tell the browser that the content of the response will be an image\
    \ of type gif and it will also instruct the browser to open the save dialog rather\
    \ than displaying the file. You can add more complicated logic to handle access\
    \ control and generate the image on the fly or allow download of any file. Be\
    \ sure to add a check to validate that the file can be downloaded. If not you\
    \ might end up allowing users to download your PHP scripts or password files.\n\
    \n# Recipe 7-14\\. Upload Files\n\n## Problem\n\nThe primary direction of content\
    \ in a web environment is for a client (browser) to send a request to a server\
    \ and retrieve the response in the form of an HTML document that then is rendered\
    \ by the browser. The rendering process might send additional requests to the\
    \ server or other servers to get additional content as identified by links in\
    \ the original document. In this scenario the majority of the bytes transferred\
    \ are from the server to the client.\n\nIf you are building an application that\
    \ requires the users to upload a picture or avatar, or you want to build a document\
    \ library that holds files of many different kinds for other users to download\
    \ you need a way to push files from the client to the server.\n\nUsing an FTP\
    \ or SFTP server can solve this but they usually don't give you what you really\
    \ need. These servers are simply a gateway to a preconfigured location on the\
    \ file system where the user can create folders and upload files but the server\
    \ does nothing to the files and there is usually no PHP integration. You could\
    \ create a web-based API that would be called by the uploading application when\
    \ the upload to the SFTP server is complete but that adds an extra layer of complexity\
    \ and the user would not be able to perform the actions from a browser alone.\n\
    \n## Solution\n\nMost modern browsers support `multipart/form-data` for the `POST`\
    \ request and they allow you to include an input field of type `file`. This will\
    \ instruct the browser to read one or more files off the local file system and\
    \ send them to the server with the rest of the `POST` request. Only files selected\
    \ by the user can be uploaded.\n\nIf the target for the `POST` request is a PHP\
    \ script the data will be available in the superglobals `$_POST` and `$_FILES`\
    \ for processing by the script. The files will temporarily be stored in a folder\
    \ specified by `upload_dir` in `php.ini` and they will be removed from that directory\
    \ when the PHP request ends. It is up to the script to copy or move the file to\
    \ its final destination."
