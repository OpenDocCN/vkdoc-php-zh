    \ useful with request  \n```  \n\n**Note**  \n\nThis example is, in fact, also\
    \ an instance of an enterprise pattern called Intercepting Filter. Intercepting\
    \ Filter is described in *Core J2EE Patterns: Best Practices and Design Strategies*\
    \ (Prentice Hall, 2001) by Alur et al.  \n\n### Consequences  \n\nLike the `Composite`\
    \ pattern, `Decorator` can be confusing. It is important to remember that both\
    \ composition and inheritance are coming into play at the same time. So `LogRequest`\
    \ inherits its interface from `ProcessRequest`, but it is acting as a wrapper\
    \ around another `ProcessRequest` object.  \n\nBecause a decorator object forms\
