    \ visit [http://php.net/manual/en/language.oop5.basic.php](http://php.net/manual/en/language.oop5.basic.php).\n\
    \nNow that we have the code needed to produce an output, we need to add a method\
    \ in the class to execute the `print` line. All \"actions\" that take place in\
    \ a class must be included in a **method**. Methods are created in a similar style\
    \ as classes (except they are actually contained within the classes). Methods\
    \ are declared using the keyword `function` followed by a method name and `()`.\
    \ It is common practice for method names to be lowercase, although PHP will accept\
    \ uppercase characters. The underscore (`_`) can also be included at the beginning\
    \ or within the method name. All code with a method is contained within `{}`.\n\
    \n- **Program design recommendation**—As seen in Example [4-4](#394210_2_En_4_Chapter.xhtml#PC8),\
    \ it becomes much more important to be aware of the proper use of the opening\
    \ and closing brackets (`{` and `}`). For every open bracket, there must be a\
    \ closing bracket. Editors (discussed in Chapter [1](#394210_2_En_1_Chapter.xhtml))\
    \ can help color code everything to make it easier to see all your brackets. Also,\
    \ indenting (as seen in Example [4-4](#394210_2_En_4_Chapter.xhtml#PC8)) can help\
    \ visually line up the brackets. The PHP engine ignores extra spacing (called\
    \ **whitespace**). So, the programmer can make the code more visually pleasing\
    \ and easier to debug.\n\n```php\ndog_weight. Dog breed is\n$this->dog_breed.\
    \ Dog color is $this->dog_color.\";\n}\n}\n?>\nExample 4-4\nBasic class structure\
    \ with properties and a method in dog.php file\n```\n\nThis class now has the\
    \ ability to perform an action (via the `display_properties` method). So, we can\
    \ finally test its functionality. In order to do so, the code from Example [4-4](#394210_2_En_4_Chapter.xhtml#PC8)\
    \ must be placed in the `dog.php` file (same as the class name) in the same location\
    \ as the program that will use it.\n\nWe now need to create a program that will\
    \ pull in this library of code (via the `require_once` statement). The program\
    \ will then need to make an instance of the class (`Dog`). Finally, the program\
    \ will need to call the method (`display_properties`) to display the contents\
    \ of the properties.\n\n- **Program design recommendation**—PHP will allow the\
    \ `include`, `include_once`, `require`, and `require_once` statements to be used\
    \ anywhere in your program code. This could cause potential issues if it is used\
    \ in the incorrect location or used more than once. It is strongly recommended\
    \ that these statements be included together as close to the top of your code\
    \ as possible for easy review to determine if libraries have already been installed.\
    \ In PHP 8 we can preload these files into the memory of the server. We will demonstrate\
    \ this ability in a later chapter.\n\n- **Security and reliability**—PHP has several\
    \ methods available to pull libraries into PHP programs. The `include` method\
    \ will attempt to pull in a library. However, if the library does not exist, the\
    \ program will continue to run (or display a warning). The `include` method also\
    \ does not concern itself with the possibility that the library might already\
    \ have been attached to the code. It is possible that a large program might accidentally\
    \ try to pull in the same library more than once (which would throw an exception\
    \ in the program due to duplicate method and/or class names). The `include_once`\
    \ method eliminates the possibility of attempting to pull in a library more than\
    \ once. If the library has already been included, the statement will not execute.\
    \ The `require` method does not allow the program to continue running if the library\
    \ cannot be found. However, like the `include` method, it could attempt to pull\
    \ in the same library more than once. The `require_once` method solves these potential\
    \ problems by only including the library if it has not already been installed.\n\
    \nWe briefly looked at the `require` statement in the previous chapter. However,\
    \ it is worth reviewing its use here because we will now be using it throughout\
    \ the remainder of the book. The format of the `require_once` statement is simple.\
    \ The keyword `require_once` is followed with the library name (`dog.php`). The\
    \ statement should be included near the top of your code and before you make an\
    \ actual instance of the class (`Dog`).\n\n```php\nrequire_once(\"dog.php\");\n\
    ```\n\n*You can include path names within a `require_once` statement. However,\
    \ it is recommended that you do not include absolute paths. For more information,\
    \ visit [www.php.net/manual/en/function.require-once.php](http://www.php.net/manual/en/function.require-once.php).*\n\
    \nTo create an instance of a class, a property is created that \"points\" to the\
