    # `if` 条件语句


    `if` 条件语句允许你根据某个条件执行不同的命令块。该条件语句有两种语法形式。通常使用以下选项。


    ```

    if(condition){

    # 命令

    }

    else{

    # 命令

    }

    ```


    `if` 关键字后跟圆括号中的条件。然后，在花括号中放入命令。在命令块之后，放置 `else` 关键字，其后跟花括号中的其他命令。


    我们来讨论一下条件语句是如何执行的。首先，检查 `if` 关键字后面的条件。如果条件为真，则执行条件后面的命令。如果条件为假，则执行 `else` 关键字后面的命令块。


    `else` 块是可选的。可以省略不使用。在这种情况下，条件语句的语法如下所示。


    ```

    if(condition){

    # 命令

    }

    ```


    如果不使用 `else` 块，条件语句也会执行。首先检查条件；如果为真，则执行条件后面的命令。如果条件为假，则什么也不发生，并开始执行条件语句之后的指令。


    > **注意：** 如果 `if` 块或 `else` 块只包含单个命令，可以省略花括号。但是，省略花括号会降低代码的可读性并导致错误。因此，始终使用花括号是合理的。


    描述条件语句的另一种方式是不使用花括号，而是在条件后使用冒号、`else` 关键字，并在整个结构末尾使用 `endif` 语句（后跟分号）。在这种情况下，条件语句的通用语法如下所示。


    ```

    if(condition):

    # 命令

    else:

    # 命令

    endif;

    ```


    与之前的情况一样，`else` 块可以省略。如果省略，则按照以下模式声明条件语句。


    ```

    if(condition):

    # 命令

    endif;

    ```


    清单 3-1 展示了一个使用条件语句的小示例。


    > **注意：** 我们继续在不考虑自动类型转换的情况下检查条件语句的执行。换句话说，假设用户在程序提示时输入了正确的值。程序中各种“特殊”情况不予跟踪或处理。


    这个程序很简单。用户在其中输入一个数字，程序检查这个数字是否可以被另一个已知数字整除。


    ```

    清单 3-1

    条件语句

    ```


    程序执行的结果如下所示（用户输入的数字以粗体显示）。


    ```

    程序的输出（来自清单 3-1）

    请输入一个整数：5

    数字 5 不能被 3 整除

    ```


    也可能有其他结果。


    ```

    程序的输出（来自清单 3-1）

    请输入一个整数：15

    数字 15 可以被 3 整除

    ```


    在条件语句中，检查 `$number%$A==0` 条件，如果 `$number` 变量（由用户输入）的值除以 `$A` 变量（在程序中显式指定）的值没有余数，则该条件为真。


    | 详细信息 |

    | --- |

    | 使用 `$number=(integer)trim(fgets(STDIN))` 命令读取 `$number` 变量的值。变量的值由 `(integer)trim(fgets(STDIN))`
    表达式确定。`fgets()` 函数从标准输入（`STDIN` 标识符）读取一行。这意味着用户输入的值被读取为一个字符串。`trim()` 函数会移除该字符串的前导和尾随空格及转义序列。`(integer)`
    指令将数字的文本表示形式转换为整数。 |

