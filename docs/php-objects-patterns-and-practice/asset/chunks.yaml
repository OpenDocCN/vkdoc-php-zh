    ## 附录 B：一个简单的解析器


    第 11 章讨论的解释器模式并未涵盖解析。没有解析器的解释器是非常不完整的，除非你说服用户编写 PHP 代码来调用该解释器！有一些第三方解析器可用于配合解释器模式，这在实际项目中可能是最佳选择。然而，本附录介绍了一个简单的面向对象解析器，旨在配合第
    11 章中构建的 MarkLogic 解释器一起工作。请注意，这些示例仅用于概念验证，不适合在实际场景中使用。


    **注意**


    该解析器代码的接口和整体结构基于 Steven Metsker 的《用 Java 构建解析器》（Addison-Wesley Professional, 2001）。然而，极度简化的实现责任在我，任何错误都应归咎于我。Steven
    慷慨允许我使用他最初的概念。


    ### 扫描器


    要解析一条语句，首先必须将其分解为一组单词和字符（称为词法单元）。以下类使用多个正则表达式来定义词法单元。它还提供了一个便捷的结果栈，我将在本节后面使用它。以下是
    `Scanner` 类：

    '
