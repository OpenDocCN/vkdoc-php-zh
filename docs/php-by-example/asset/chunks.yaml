- fmt: '# The Argument Value by Default


    You can set default values for the arguments of a function. The default value
    is used when calling the function if you do not specify a value for such an argument.


    To set a default value for an argument, you put the assignment operator and that
    default value after the argument name in the function declaration. The arguments
    with default values must be placed at the end of the arguments list in the function
    declaration.


    > **Note:** In other words, arguments without default values are described first,
    followed by those with default values.


    Listing [5-6](#613529_1_En_5_Chapter.xhtml#PC13) is a program with functions whose
    arguments (some or all) have values by default.


    ```

    Listing 5-6

    The Argument Values by Default

    ```


    The following is the program''s output.


    ```

    The output of the program (from Listing 5-6)

    The first argument: Alpha

    The second argument: Bravo

    The first argument: A

    The second argument: Bravo

    The first argument: A

    The second argument: B

    The first number: 100

    The second number: 200

    The third number: 300

    The first number: 1

    The second number: 2

    The third number: 300

    The first number: 1

    The second number: 2

    The third number: 3

    ```


    The program uses two functions: `show()` with two arguments and `display()` with
    three arguments. Both arguments of the `show()` function have values by default.
    The last two arguments have default values in the `display()` function. You call
    these functions and pass them a different count of arguments each time.


    When the `show()` command is executed, the default values are used for both arguments
    to the `show()` function. In other words, the command is executed as if the first
    argument were `"Alpha"` and if the second argument were `"Bravo"`.


    The `show("A")` command means that the value `"A"` is used for the first argument,
    and the default value `"Bravo"` is used for the second argument. Finally, the
    `show("A","B")` statement means that the value `"A"` is passed as the first argument,
    and the value `"B"` is passed as the second argument to the function.


    A similar situation takes place for the `display()` function. The only difference
    is that since there is no default value for the first argument, the first argument
    must always be specified. So, when you run the `display(100)` command, the values
    of the arguments are `100`, `200`, and `300`, respectively. The `display(1,2)`
    command means that the first argument''s value is `1`, the second argument is
    `2`, and the third is the default value `300`. When executing the `display(1,2,3)`
    command, all function arguments are explicitly specified and have the values `1`,
    `2`, and `3`.


    # An Arbitrary Number of Arguments


    The peculiarity of PHP is that you can pass more arguments than specified in the
    function declaration without any tragic consequences when calling a function.
    For example, if a function is described with two arguments, and when you call
    the function, you pass five arguments, then the last three arguments are ignored.


    That peculiarity of functions can be used to create ones with an arbitrary number
    of arguments. This means the situation when a function can be called with any
    number of arguments, and all those arguments are processed in the function.


    > **Note:** You are dealing with default values for function arguments. That makes
    it possible to specify a different number of arguments when calling a function
    (less than indicated in the function description). But in that case, the number
    of processed arguments is limited to those specified in the function description.
    Contrary to that, you want all arguments to be processed, no matter how many you
    pass to the function when called.


    It is also worth mentioning that there are several modes of declaring a function
    with an arbitrary number of arguments. You would name one as "old" and the other
    as "new" (it''s available since PHP 5.6). Let''s explore both.


    To process the arguments passed to a function, they need to be accessed somehow.
    Moreover, you want to process arguments not mentioned in the list of arguments
    in its declaration. You can get a list of the arguments passed to the function
    using the `func_get_args()` function. The `func_get_args()` function has no arguments,
    and it returns a list (array) of arguments passed to the function in whose body
    the `func_get_args()` function is called.


    | Details |

    | --- |

    | The functions `func_num_args()` and `func_get_arg()` can also be useful. The
    first of these functions returns the count of passed arguments (meaning the arguments
    of the function in whose body `func_num_args()` is called). The second one returns
    the value of the argument (of the function in which the `func_get_arg()` function
    is called) with a specific index (the argument of the `func_get_arg()` function).
    |


    Listing [5-7](#613529_1_En_5_Chapter.xhtml#PC15) is a program that uses functions
    that accept an arbitrary number of arguments.


    ```

    Listing 5-7

    An Arbitrary Number of Arguments

    ```


    The result of the program execution is as follows.


    ```

    The output of the program (from Listing 5-7)

    [1] The sum: 20

    [2] The sum: 0

    [3] The sum: 25

    Arguments at all: 7

    Arguments of the type integer: 3

    Arguments at all: 1

    The search is over

    Arguments at all: 7

    Arguments of the type string: 2

    ```


    Two functions are declared in the program. The `sum()` function is declared without
    arguments, while the `count_type()` function has one argument. But in fact, the
    code of the functions provides the processing of all arguments passed to the functions.


    > **Note:** The `sum()` function can be called with an arbitrary number of arguments,
    including none. At least one argument must be passed when calling the `count_type()`
    function.'
