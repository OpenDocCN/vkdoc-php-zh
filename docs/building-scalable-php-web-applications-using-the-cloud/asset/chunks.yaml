  trans: '

    # 2.3 Docker


    在当今备受瞩目的技术领域中，`Docker` 是一项新兴技术。`Docker` 应用介于 `IaaS` 和 `PaaS` 之间。本质上，一个 `Docker`
    镜像包含运行应用程序所需的所有程序的完整安装。


    它们可以像 `PaaS` 一样被管理、部署和扩展：你只需告诉服务你需要运行多少个实例，它就会负责将你的镜像部署到正确的位置；但与此同时，你拥有比 `PaaS`
    大得多的控制权，这一点又类似于 `IaaS`。


    `Docker` 的一个有趣特性是能够将不同的服务“链接”在一起。本质上，你为 `Docker` 容器提供或需要的不同类型的服务命名，然后可以使用这些名称告诉你的服务如何找到彼此。不过，这通常只是在应用程序初始设置阶段才会遇到的问题，之后，无论你是手动链接应用组件，还是使用某种高级工具进行链接，区别都不大。


    `Docker` 本身是一项技术，而非供应商。有许多供应商允许你部署 `Docker` 应用，包括负责 `Docker` 技术的公司 `Docker Inc.`。


    ## 2.4 为什么选择 IaaS


    本书将重点放在 `IaaS` 云模型上，原因如下。首先，`IaaS` 非常灵活。无论你想要运行何种类型的工作负载，也无论你想要在什么平台上运行，`IaaS`
    都只是为你提供裸服务器。如何使用它们完全由你决定。这也意味着你不会被锁定在特定供应商的系统中。


    其次，`IaaS` 的运行方式相当可预测。虽然存在差异，但大多数 `IaaS` 供应商的运营模式都非常相似：你选择一种机器规格，指定你需要的配置，然后按下按钮即可。这些服务的质量、成本和灵活性可能存在很大差异，但其基本操作模式都相当类似。


    对于 `PaaS` 来说，你的选择则受限得多。首先，你只能使用供应商提供的平台。如果你使用 `Ruby on Rails` 编程，那么你只能使用 `Ruby
    on Rails PaaS`。虽然大多数 `PaaS` 供应商已经开放了他们的系统以支持数量众多的不同应用服务器，但限制依然存在。其次，你必须按照他们的平台配置方式编写代码。这通常意味着很少或没有本地文件存储、只能连接特定类型的数据库、只允许某些特定的平台选项或扩展，并且对服务器的配置方式几乎没有灵活性。有时候这没问题，但有时候这又过于束缚。


    此外，`PaaS` 通常过于不透明。访问服务器日志通常很困难，而调试特定于服务器的故障几乎不可能。有时 `PaaS` 供应商会提供一些工具来帮助，但它们完全无法与直接在出问题的机器上进行调试相比。这种不透明性有时会导致灾难性的后果。例如，如果你购买了一个
    `PaaS` 数据库系统，而不幸你的数据库损坏了，你的选择将极其有限。你基本上只能打电话给公司求助。有些公司在这方面响应非常迅速，但这仍然让我感到非常不安。


    同时请记住，为了让 `PaaS` 系统正常工作，他们必须不断升级他们的系统。事实上，这正是你付钱请他们做的事情。然而，无法保证他们明天所做的升级不会意外地破坏你的应用。也许这个升级是必要的，但这不是你能决定的。


    类似地，使用 `PaaS` 供应商意味着你必须按照*他们的*时间表进行升级。如果他们决定弃用其基础设施的某一部分，你就必须重写代码来适应。如果他们决定你使用的某个软件版本过时了，你就必须重写代码以使用新版本。简而言之，`PaaS`
    意味着你失去了对技术的控制权，而 `IaaS` 则意味着你拥有完全的控制权。虽然使用 `PaaS` 可以省去某些麻烦，但这些节省通常会被其引入的新麻烦所抵消。


    最后，`PaaS` 通常非常昂贵。例如，在 `Heroku`（一个常见的 `Ruby on Rails PaaS` 供应商）上，四个 CPU 核心每月花费
    `$100` 美元。而在 `Linode` 上，一台四核机器的成本仅为每月 `$40` 美元，并且 `Linode` 的机器速度更快。我发现，大多数 `PaaS`
    供应商的收费是同等性能的优秀 `IaaS` 供应商的三倍左右。`PaaS` 供应商为你做得更多，但这只有在你的开发团队没有任何系统管理经验时才值得，而且你通常会为了跟上
    `PaaS` 平台的更新而付出同样的代价。


    如果你的组织具备设置和维护服务器的技能（本书提供了一个学习如何做到这一点的良好开端），那么 `IaaS` 当前是利用云技术最简便、最灵活、最快且成本最低的方式，并且它不会将你锁定在特定供应商上。如果你真的决定想使用类似
    `PaaS` 的系统，只需知道有许多开源的 `PaaS` 系统可以运行在你的 `IaaS` 服务器之上。

    '
- fmt: '### 2.5 Choosing an IaaS Vendor


    There are many considerations that go into choosing an IaaS service or vendor.
    The most important consideration is the reliability of the service. It doesn’t
    help to have a magnificent web application if the service is down. It doesn’t
    make your company money in the long term if you can’t get to your data. Therefore,
    the reliability of the service should have significant impact on your decisions.


    This also extends into their ability to resolve tickets. Every service will have
    problems at some time or another. If a company cannot respond to or resolve tickets
    in a timely manner, then you shouldn’t have production systems sitting on them.


    The next main factor is the price/performance ratio. Many of the early cloud infrastructure
    companies placed an extremely high value on the flexibility of cloud computing,
    with the result that nearly every cloud solution was at a horrendously high cost.
    Amazon Web Services (AWS) has a cloud computing service known as EC2 that is a
    great example of this. As mentioned earlier, a Linode 4-core machine with 8GB
    RAM is $40/month. A similarly specified machine on EC2 (the `c5.xlarge` machine)
    is $122/month. Historically, EC2 has tended to be much slower than Linode even
    on the same specs. In the early days of cloud computing, EC2 was one of the only
    big players in the field, and to get the flexibility, they made you pay a high
    price. Personally, at the price EC2 is asking for, I would prefer to go outside
    of the cloud and do a traditional hosting setup where I lease physical servers.
    For me, the flexibility isn’t worth the price that AWS requires.


    On the other side of the scale, there are cloud services whose prices are impossibly
    good. That is, you can recognize from the price that there is no way that they
    can deliver reliable long-term service at that price. Either the company will
    go out of business, the company will have to raise prices, or the service will
    eventually be oversubscribed and degrade to the point of unusability. A great
    example is CloudAtCost (`www.cloudatcost.com`). With CloudAtCost, you pay a one-time
    fee and get to keep the server *forever*. For instance, for $70, you get 2 CPU
    cores and 1GB of RAM. But that is *not* a monthly cost. That is a *one-time-only*
    cost! As I said, it is an unbelievably good price. They do charge a $9 yearly
    account maintenance price, but that is the same cost no matter how many servers
    you have (it was probably instituted so they could shut off servers that were
    no longer maintained).


    There are some things that such a service might be good for. If you wanted a development
    server, for example, it doesn’t matter if the network goes down every once in
    a while, or that the technicians aren’t quick to answer. And, if one day they
    shut their doors, you aren’t out a whole lot. But I certainly wouldn’t bet my
    business on such a service. If you want to see other services that are at impossibly
    cheap prices, see `www.lowendbox.com`.


    The final factor is flexibility. It is one thing to be able to point and click
    to set up a new machine, but what if you couldn’t store disk images and had to
    rebuild a machine every time you launched one? This would be a painstaking process,
    and you would lose one of the main benefits of cloud computing. This area is one
    in which AWS shines. AWS consists of not only its cloud computing services (EC2),
    AWS also provides configuration, control, and automation into nearly every aspect
    of cloud infrastructures. AWS provides scalable storage solutions, video transcoding
    services, scalable databases, message queueing services, and search services.
    This gives your cluster an external monitoring service which automatically spawns
    new servers to handle the load as it increases, and removes servers from your
    cluster and powers them down as the load on your network decreases. In other words,
    the extra services that come with AWS are nearly limitless.


    At the end of the day, however, the flexibility of AWS is outweighed by the terrible
    price/performance ratio of EC2. Thankfully, however, AWS’s better services (such
    as S3 and CloudFront) can be used individually, even if you use another provider
    as your primary IaaS vendor. We will discuss how to do that in later chapters.


    If you haven’t already guessed, my preference for a cloud vendor is Linode (`www.linode.com`).
    Their price/performance ratio is unbeatable. The reason for this is threefold.
    First, the equipment is newer. Second, they only use SSD drives (i.e., solid state—no
    spinning disks), which are generally an order of magnitude faster than regular
    disks. This is probably one of the most important aspects to Linode’s performance.
    Third, they have implemented controls to prevent “noisy neighbors.”


    A noisy neighbor is a virtual machine that is on the same physical server as your
    machine, but is using all of the I/O resources of the computer. On IaaS platforms,
    you don’t get to choose (or even know) who else is sharing the same physical hardware.
    Therefore, using a service that prevents resource hogging is very important. Linode
    has implemented a number of controls to prevent any individual virtual machine
    from overusing resources. This is good not only for the performance of your own
    virtual server but also because it means that you don’t have to worry yourself
    about being a bad neighbor to someone else!


    While Linode does not have the flexibility of AWS, the flexibility is hardly missed.
    Most of the important things that you want to do with AWS are extremely simple
    with Linode, and the added features of AWS make AWS’s learning curve steep and
    confusing. By the time someone spends the extra money to get the flexibility in
    AWS (for instance, creating a system to automatically boot new machines in response
    to load), they could have spent the same money in Linode giving their cluster
    enough capacity so that it won’t matter.


    There are other services similar to Linode—DigitalOcean is often considered a
    comparable service at a comparable price. However, my experiences with Linode
    have been sufficiently positive that I haven’t felt the need to research them
    all. Linode provides what I need, has an easy-to-use interface, and does it at
    a great price. Therefore, this book will focus on developing cloud applications
    on Linode.


    When choosing a vendor, it is also important to read their terms of service carefully
    to make sure that your intended use is compatible. Not only are some workloads
    not allowed on certain services (i.e., some services prohibit mass e-mail marketing),
    many services have limits on how fast you are allowed to scale your network. This
    is mostly for abuse prevention, but it is important to find out about ahead of
    time. In any case, you may want to reach out to potential cloud vendors and make
    sure that your planned usage matches their service guidelines before settling
    on one.'
