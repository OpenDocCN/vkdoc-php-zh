- fmt: "# 排版后的文档\n\nThis program needs security questions in case the user forgets\
    \ his password.\n\nAdditional fields are needed, such as name, email, and address.\n\
    \n## `login.php`\n\nThis program needs to be able to create a temporary password\
    \ for users who forget their passwords but remember answers to their security\
    \ questions.\n\n## Overall\n\n- You need to consider moving more program (file)\
    \ names to XML files for easier version changes.\n- You need to consider adding\
    \ levels of access and approval for new user IDs.\n\nOnce the system is stable\
    \ and prepared for live mode, you could consider preloading the main files. This\
    \ ability was implemented in PHP 7.4 and will increase the speed of the application.\
    \ In order to preload, you will need to create a separate PHP program which is\
    \ run every time the server is reloaded. Also, any preloaded files can only be\
    \ changed when the server is rebooted. Thus, only stable files should be preloaded.\
    \ Preloading greatly reduces the necessity of PHP code recompilation. The first\
    \ time the files are used, they are compiled. They then stay in compiled format\
    \ in the memory of the server for all other usage. Files that are not preloaded\
    \ are compiled each time they are loaded into the server memory.\n\nFor examples\
    \ and more descriptions of preloading PHP files, visit [https://wiki.php.net/rfc/preload](https://wiki.php.net/rfc/preload).\n\
    \n## Chapter Terms\n\n`$_SERVER['HTTP_REFERER']` | HTML button | `split` | `var`\
    \ | JSON object | `JSON.parse` | `getElementsByName` | HTML list boxes | `selectedIndex`\
    \ | `value` | dot notation format | `checked` property | `is_bool` | `img` | `float:\
    \ top` | `text-align: center` | Four-Tier Application\n\n## Chapter Questions\
    \ and Projects\n\n### Multiple Choice\n\n1. Which JavaScript method accomplishes\
    \ a similar task as the PHP method `explode`?\n   1. `explode`\n   2. `slice`\n\
    \   3. `split`\n   4. None of these\n\n2. Which JavaScript method accomplishes\
    \ a similar task as the PHP method `json_decode`?\n   1. `JSON.scan`\n   2. `JSON.parse`\n\
