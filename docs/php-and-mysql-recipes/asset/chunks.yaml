    \n### 解决方案\n\n可以定义无需使用超全局变量或 `global` 关键字就能全局访问的值。这是通过定义常量来实现的。常量的命名规则与变量相同，但变量名前没有美元符号，并且它们只能通过\
    \ `define()` 函数来定义，或者由 PHP 内部函数或扩展来定义。通常，常量会全部使用大写字母书写，但这并非强制要求。\n\n### 工作原理\n\
    \n下一个示例在全局作用域中定义了 `MY_CONSTANT`，并在 `MyFunc()` 函数内部用它来执行简单的乘法运算。\n\n```php\n<?php\n\
    \n// 10_15.php\n\ndefine('MY_CONSTANT', 12);\n\nfunction MyFunc($v) {\n\nreturn\
    \ $v * MY_CONSTANT;\n\n}\n\necho MyFunc(2);\n```\n\n常量可以在全局作用域、函数内部或作为类的成员方法中定义。无论在哪里定义，它们都将是全局可用的。\n\
    \n为了避免警告，在尝试使用常量之前，可能需要检查该常量是否已定义。这可以通过 `defined()` 函数实现。该函数接受一个字符串形式的常量名作为参数，并返回\
    \ `true` 或 `false`。该函数的使用方式如下：`if (defined('MY_CONSTANT')) { ... }`。使用常量本身（而非其名称的字符串值）作为参数传递，仍然会导致运行时警告，除非该常量保存的是字符串值。在这种情况下，当常量值不匹配已定义的常量时，函数可能会返回\
    \ `false`。\n\n如果脚本不再需要某些常量，或者需要将它们更改为不同的值，也可以移除它们。这可以通过 `undefine()` 函数实现，该函数同样接受一个包含常量名称的字符串作为参数。\n\
    \nPHP 自带了许多预定义常量：最常见的可能是布尔值 `TRUE` 和 `FALSE`，但也定义了用于标识 PHP 版本（`PHP_VERSION`）和圆周率（`M_PI`）的常量。此外，在任何时候，加载的扩展都可能定义常量。这些常量通常以扩展名作为前缀，并用作该扩展内各种函数的标志或参数。此类扩展特定常量的示例包括\
    \ `MYSQL_ASSOC`、`MYSQL_NUM` 和 `MYSQL_BOTH`。这些常量用于告诉扩展的 `mysql_fetch_row()` 函数如何返回数组。\n"
- fmt: "常量有助于提高代码的可读性。预定义的常量列表可以在此处找到：\n\n[http://php.net/manual/en/reserved.constants.php](http://php.net/manual/en/reserved.constants.php)\
    \ 。\n\n食谱 10-9. 可变变量（`Variable Variables`）\n\n问题\n\n有时需要以编程方式使用一个变量的值来查找另一个变量的内容，这非常有用。\n\
    \n解决方案\n\nPHP 拥有可变变量的概念，允许基于包含字符串值的其他变量的内容来定义和使用变量。只要该变量的内容遵循变量命名规则，此方法即可生效。\n\
    \n工作原理\n\n可变变量通过在普通变量前添加一个额外的美元符号来定义。\n\n```php\n<?php\n\n// 10_16.php\n\n$var\
    \ = \"abc\";\n\n$$var = 6;\n\necho $var . \"\\n\";\n\necho $abc . \"\\n\";\n```\n\
    \n在这个例子中，基于变量`$var`的内容创建了一个变量`$abc`。`$var`前的两个美元符号会获取`$var`的值（`\"abc\"`），并将其转换为`$abc`。值`6`将被赋给`$abc`，而不是`$var`，如以下输出所示：\n\
    \n```\nabc\n6\n```\n\n只要遵循变量命名约定，此模式可以重复使用。\n\n```php\n<?php\n\n// 10_17.php\n\
    \n$var = \"abc\";\n\n$$var = \"def\";\n\n$$$var = \"ghi\";\n\n$$$$var = 6;\n\n\
    echo $ghi;\n```\n\n可变变量的一个更有用的示例是使用逻辑来计算用于特定操作的变量名称。\n\n```php\n<?php\n\n// 10_18.php\n\
    \n$us = \"m/d/Y\";\n\n$eu = \"d-m-Y\";\n\n$format = \"us\";\n\necho date($$format);\n\
    ```\n\n定义一个包含可能值的数组，然后计算要使用的索引，可以实现类似的结果。\n\n```php\n<?php\n\n// 10_19.php\n\n\
    $format = array(\n\n    'us' => 'm/d/Y',\n\n    'eu' => 'd-m-Y',\n\n);\n\necho\
    \ date($format['us']);\n```\n\n超全局变量不能用作可变变量。\n\n食谱 10-10. 比较变量（`Comparing Variables`）\n\
    \n问题\n\n由于 PHP 的松散类型特性，比较两个变量可能会产生意外结果。\n\n解决方案\n\n可以使用下表中列出的多个运算符来比较变量。PHP 的松散类型特性提供了一种按值或按值和类型比较变量的方式。\n\
    \n***表 10-1.** 比较运算符*\n\n| **运算符** | **含义** | **描述** |\n| --- | --- | --- |\n\
    | `==` | 等于 | 如果两个值相同则为真 |\n| `!=` | 不等于 | 如果两个值不同则为真 |\n| `<>` | 不等于 | 如果两个值不同则为真\
    \ |\n| `===` | 全等 | 如果类型和值都相同则为真 |\n| `!==` | 不全等 | 如果类型或值不同则为真 |\n| `>` | 大于\
    \ | 如果左侧大于右侧则为真 |\n| `<` | 小于 | 如果左侧小于右侧则为真 |\n| `>=` | 大于或等于 | 如果左侧大于或等于右侧则为真\
    \ |\n| `<=` | 小于或等于 | 如果左侧小于或等于右侧则为真 |\n| `<=>` | 太空船运算符 | 如果左侧更大、两个值相等或右侧更大，则返回\
    \ -1、0 或 1。这是 PHP 7 中的新特性。 |\n\n工作原理\n\n比较整数`7`与字符串`\"7\"`会根据所选的比较方法得出两种不同的结果。使用松散比较方法，`7\
    \ == \"7\"`将返回`true`，而严格比较`7 === \"7\"`将返回`false`。这是因为松散比较会先将两侧之一转换为与另一侧相同的类型。一侧如何转换的规则取决于两侧变量的类型。如果一侧是`NULL`，另一侧是字符串，则在比较两个值之前，`NULL`值将被转换为空字符串`\"\
    \"`。如果一侧是布尔值，则另一侧会在比较之前转换为布尔值。如果一侧是数字，另一侧是字符串或资源，则字符串和资源会在比较之前转换为数字。在带有数值的字符串情况下，字符串也会在比较值之前转换为数字。\n\
    \n数组基本上是根据每个对象中的元素数量进行比较，或者如果两个对象的所有键都相同，则逐值比较数组。"
  raw: 'Constants are useful to make the code more readable. A list of predefined
    constants can be found here:


    [http://php.net/manual/en/reserved.constants.php](http://php.net/manual/en/reserved.constants.php)
    .


    Recipe 10-9\. Variable Variables


    Problem


    It can be useful to programmatically use the value of one variable to find the
    content of a different variable.


    Solution


    PHP has a concept of variable variables that allows defining and using variables
    based on the content of other variables that contain a string value. This works
    as long as the content of the variable follows the rules for naming of variables.


    How it Works


    A variable variable is defined by adding an extra dollar sign in front of a regular
    variable.


    <?php


    // 10_16.php


    $var = "abc";


    $$var = 6;


    echo $var . "\n";


    echo $abc . "\n";


    In this example a variable $abc is created based on the content of the variable
    $var . The two dollar signs in front of var takes the value of $var ( "abc" )
    and turns it into $abc . The value 6 will be assigned to $abc and not to $var
    as shown in the following output:


    abc


    CHAPTER 10 ■ VARIABLES


    This pattern can be repeated as long as the variable naming convention is followed.


    <?php


    // 10_17.php


    $var = "abc";


    $$var = "def";


    $$$var = "ghi";


    $$$$var = 6;


    echo $ghi;


    A more useful example of variable variables is to use logic to calculate the name
    of a variable to use for a certain operation.


    <?php


    // 10_18.php


    $us = "m/d/Y";


    $eu = "d-m-Y";


    $format = "us";


    echo date($$format);


    Defining an array with the possible values and then calculating the index to use
    can achieve a similar result.


    <?php


    // 10_19.php


    $format = array(


    ''us'' => ''m/d/Y'',


    ''eu'' => ''d-m-Y'',


    );


    echo date($format[''us'']);


    Super globals cannot be used as variable variables.


    Recipe 10-10\. Comparing Variables


    Problem


    With the loosely typed nature of PHP, comparing two variables can yield unexpected
    results.


    Solution


    Comparing variables can be done with a number of operators as listed in Ta[ble
    10-1](#index_split_004.html#p252) below. The loosely typed nature of PHP provides
    a way to compare variables by value or by value and type.


    CHAPTER 10 ■ VARIABLES


    ***Table 10-1.** Comparison operators*


    **Operator**


    **Meaning**


    **Description**


    ==


    Equal


    True if both values are the same


    !=


    Not equal


    True if both values are different


    <>


    Not equal


    True if both values are different


    ===


    Identical


    True if type and values are the same


    !==


    Not identical


    True if type or value are different


    >


    Greater than


    True if left side is greater than the right side


    <


    Less than


    True if the left side is less than the right side


    >=


    Greater than or equal


    True if left side is greater than or equal to the right side


    <=


    Less than or equal


    True if the left side is less than or equal to the right side


    <=>


    "Spaceship"


    Returns -1, 0, or 1 if the left side is greater, the two values are


    equal, or the right side is greater. This is new in PHP 7.


    How it Works


    Comparing the integer 7 to the string "7" will give two different results depending
    on the method of comparison selected. Using the loose compare method, 7 == "7"
    will give a true and the strict compare 7


    === "7" will give false. This is because the loose compare will first convert
    one of the two sides to the same type as the other side. The rules for how one
    side is converted depend on the types of the variables on either side. If one
    side is NULL and the other is a string the NULL value will be converted to the
    empty string


    "" before the two values are compared. If one side is a Boolean the other side
    will be converted to Boolean before comparing. If one side is a number and the
    other is a string or resource, the string and resources are converted to numbers
    before comparison. In the case of strings with numerical values the strings will
    also be converted to numbers before comparing the values.


    Arrays are basically compared on the number of elements in each object or if all
    the keys of the two objects are the same, the arrays are compared value by value.'
