    `Log in`. You should be redirected immediately to `menu.php`, and the link to
    `secretpage.php` should also work.  


    *   This now also rejects a visitor if `$_SESSION[''authenticated'']` has the
    wrong value.


    Tip


    The login might fail if you create your own version of `users.csv` on Mac OS X.
    If that happens, add the following line at the top of `authenticate.php`, as described
    in “CSV files created on Mac OS” in [Chapter 7](#A978-1-4842-0635-5_7_Chapter.html):


    `ini_set(''auto_detect_line_endings'', true);`


    All you need to do to protect any page on your site is to add the eight lines
    of code in step 2 above the `DOCTYPE` declaration.


    ### PHP Solution 9-5: Creating a Reusable Logout Button


    As well as logging in to a site, users should be able to log out. This PHP solution
    shows how to create a logout button that can be inserted in any page.


