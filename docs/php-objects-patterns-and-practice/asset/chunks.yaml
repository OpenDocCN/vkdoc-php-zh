  trans: "\nComposer 被设计为支持语义化版本号。本质上，这涉及用三个由点分隔的数字来定义包版本：主版本号、次版本号和补丁版本号。如果你修复了一个错误，没有添加任何功能，并且没有破坏向后兼容性，你应该增加补丁版本号。如果你添加了新功能，但没有破坏向后兼容性，你应该增加中间的次版本号。如果你的新版本破坏了向后兼容性（换句话说，如果突然切换到这个新版本会导致客户端代码出现问题），那么你应该增加第一个主版本号。\n\
    \n> **注意**\n> 你可以在 [`https://semver.org`](https://semver.org) 阅读更多关于语义化版本约定的内容。\n\
    \n在 `composer.json` 文件中指定版本时，你应该牢记这一点：如果你的范围或通配符过于宽松，你可能会发现系统在更新时出现问题。\n\n表 16-1\
    \ 展示了部分可以用 Composer 指定版本的方式。\n\n**表 16-1. Composer 和包版本**\n\n| 类型 | 示例 | 说明 |\n\
    | :--- | :--- | :--- |\n| 精确版本 | `1.2.2` | 仅安装给定的版本 |\n| 通配符 | `1.2.*` | 安装指定数字的精确版本，但寻找与通配符匹配的最新可用版本\
    \ |\n| 范围 | `1.0.0 - 1.1.7` | 安装一个不低于第一个数字且不高于最后一个数字的版本 |\n| 比较 | `>1.2.0 <=1.2.2`\
    \ | 使用 `<`、`<=`、`>` 和 `>=` 来指定复杂的范围。你可以用空格（等同于“且”）或 `\\|\\|`（指定“或”）组合这些指令。 |\n\
    | 波浪号（主版本） | `~1.3` | 给定的数字是最小值，并且指定的最后一个数字可以增加。所以对于 `~1.3`，`1.3` 是最小值，并且不能匹配\
    \ `2.0.0` 或更高版本 |\n| 脱字符 | `¹.3` | 将匹配到下一个破坏性变更之前（但不包括该变更）。因此，虽然 `~1.3.1` 不会匹配\
    \ 1.4 及更高版本，但 `¹.3.1` 将匹配从 1.3.1 到 2.0.0 之前（不包括 2.0.0）的所有版本。这通常是最有用的快捷方式 |\n\n\
    ### `require-dev`\n\n很多时候，你在开发过程中需要一些在生产环境下不必要的包。例如，你希望本地运行测试，但你的公开网站上不太可能需要 PHPUnit。\n\
    \nComposer 通过支持单独的 `require-dev` 元素来解决这个问题。你可以像在 `require` 元素中一样，在这里添加包：\n\n```json\n\
    {\n  \"require-dev\": {\n    \"phpunit/phpunit\": \"*\"\n  },\n  \"require\":\
    \ {\n    \"abraham/twitteroauth\": \"0.6.*\",\n    \"ext-xml\": \"*\"\n  }\n}\n\
    ```\n\n现在，当我们运行 `composer install` 时，PHPUnit 和各种依赖包会被下载并安装：\n\n```\n$ composer\
    \ install\nLoading composer repositories with package information\nUpdating dependencies\
    \ (including require-dev)\n- Installing abraham/twitteroauth (0.6.4)\nLoading\
    \ from cache\n- Installing symfony/yaml (v3.1.3)\nDownloading: 100%\n- Installing\
    \ sebastian/version (2.0.0)\nDownloading: 100%\n....\n- Installing phpspec/prophecy\
    \ (v1.6.1)\nDownloading: 100%\n- Installing myclabs/deep-copy (1.5.1)\nLoading\
    \ from cache\n- Installing phpunit/phpunit (5.5.0)\nDownloading: 100%\nsebastian/global-state\
    \ suggests installing ext-uopz (*)\nphpunit/phpunit-mock-objects suggests installing\
    \ ext-soap (*)\nphpunit/php-code-coverage suggests installing ext-xdebug (>=2.4.0)\n\
    phpunit/phpunit suggests installing phpunit/php-invoker (~1.1)\nWriting lock file\n\
    Generating autoload files\n```\n\n然而，如果你是在生产环境下安装，你可以向 `composer install` 传递 `--no-dev`\
    \ 标志，Composer 将只下载在 `require` 元素中指定的包：\n\n```\n$ composer install --no-dev\nLoading\
    \ composer repositories with package information\nUpdating dependencies\n- Installing\
    \ abraham/twitteroauth (0.6.4)\nLoading from cache\nWriting lock file\nGenerating\
    \ autoload files\n```\n\n> **注意**\n> 当你运行 `composer install` 命令时，Composer 会创建一个名为\
    \ `composer.lock` 的文件。这会记录你在 `vendor/` 目录下安装的每个文件的精确版本。如果你在 `composer.json` 旁边有一个\
    \ `composer.lock` 文件的情况下运行 `composer install`，Composer 将会获取它记录的包版本（如果这些版本不存在的话）。这很有用，因为你可以将\
    \ `composer.lock` 文件提交到你的版本控制仓库，从而确保你的团队将下载你所安装的所有包的相同版本。如果你需要覆盖 `composer.lock`，无论是为了获取包的最新版本，还是因为你更改了\
    \ `composer.json`，你都应该运行 `composer update` 来覆盖这个锁定文件。\n\n### Composer 和自动加载\n\n\
    我们在第 15 章已经详细介绍了自动加载。但为了完整起见，值得在这里简要回顾一下。Composer 会生成一个名为 `autoload.php` 的文件，该文件负责处理它下载的包的类加载。你也可以通过引入\
    \ `autoload.php`（通常使用 `require_once()`）来为你自己的代码利用此功能。完成此操作后，只要你的目录和文件名与你的命名空间和类名一致，你在系统中声明的任何类在代码中被访问时都会自动找到。\n\
    \n换句话说，一个名为 `popp5/megaquiz/command/CommandContext` 的类必须放在 `popp5/megaquiz/command/`\
    \ 目录下的 `CommandContext.php` 文件中。\n\n如果你想进行一些调整（比如省略一个或两个冗余的前导目录，或者向搜索路径中添加一个测试目录），那么你可以使用\
    \ `autoload` 元素将命名空间映射到你的文件结构，如下所示：\n\n```json\n\"autoload\": {\n  \"psr-4\":\
    \ {\n    \"popp5\\\\megaquiz\\\\\": [\"src\", \"test\"]\n  }\n}\n```\n\n现在，只要包含了\
    \ `autoload.php`，我的类就很容易被发现。得益于我的 `autoload` 配置，`popp5/megaquiz/command/CommandContext`\
    \ 类现在可以在 `src/command/CommandContext.php` 中找到。不仅如此，因为我引用了多个目标（`test` 以及 `src`），我还可以在\
    \ `test/` 目录下创建属于 `popp5\\megaquiz\\` 命名空间的测试类。\n\n请参阅第 15 章的“PSR-4 自动加载”部分，以了解一个更深入的示例。\n\
    \n### 创建你自己的包\n\n如果你过去使用过 PEAR，你可能会期望在这里看到关于创建包的部分涉及一个全新的包文件。实际上，我们在本章中一直在创建一个包。我们只需要添加一些更多信息，然后找到一种方式让我们的代码对其他人可用。\n\
    \n#### 添加包信息\n\n要创建一个可用的包，你实际上不需要添加太多信息，但你绝对需要一个 `name`，这样你的包才能被找到。我还将包含 `description`\
    \ 和 `authors` 元素，以及创建一个名为 `megaquiz` 的虚构产品，你会在其他章节偶尔看到它：\n\n```json\n\"name\"\
    : \"popp5/megaquiz\",\n\"description\": \"一个真正宏大的测验\",\n\"authors\": [\n  {\n\
    \    \"name\": \"马特·赞斯特拉\",\n    \"email\": \"matt@getinstance.com\"\n  }\n],\n\
    ```\n\n这些字段大部分应该是不言自明的。唯一可能例外的是那个前导的命名空间——这里指的是 `popp5`——它与实际的包名之间用一个正斜杠分隔。这被称为供应商名称。正如你所料，当你的包被安装时，供应商名称会成为\
    \ `vendor/` 下的一个顶级目录。这通常是包所有者在 Github 或 Bitbucket 中使用的组织名称。\n\n完成所有这些设置后，你就可以将你的包提交到你选择的版本控制托管服务了。如果你不确定这涉及什么，你可以在第\
    \ 17 章中了解更多关于这个主题的内容。\n"
- fmt: 'Composer supports a `version` field, but it is considered better practice
    to use a tag in Git to track your package’s version. Composer will automatically
    recognize this.


    Remember that you should not push the `vendor` directory (at least not usually—there
    are some arguable exceptions to that rule). However, it is often a good idea to
    track the generated `composer.lock` file alongside `composer.json`.


    ## Platform Packages


    Although you cannot use Composer to install system-wide packages, you can specify
    system-wide requirements, so that your package will only install in a system which
    is ready for it.


    A platform package is specified with a single key, though in a couple of cases
    the key is further broken down by type, using a dash. I list the available types
    in Table [16-2](#A314621_5_En_16_Chapter.html#Tab2).


    **Table 16-2.** Platform Packages


    | Type | Example | Description |

    | --- | --- | --- |

    | PHP | `"php": "7.*"` | The PHP version |

    | Extension | `"ext-xml": ">2"` | The PHP extension |

    | Library | `"lib-iconv": "∼2"` | A system library used by PHP |

    | HHVM | `"hhvm": "∼2"` | An HHVM version (HHVM is a virtual machine that supports
    an extended version of PHP) |


    Let’s try it out:


    ```json

    {

    "require": {

    "abraham/twitteroauth": "0.6.*",

    "ext-xml": "*",

    "ext-gd": "*"

    }

    }

    ```


    In the preceding code, I specify that my package requires the `xml` and `gd` extensions.
    Now it’s time to run `update`:


    ```

    $ composer update

    Loading composer repositories with package information

    Updating dependencies (including require-dev)

    Your requirements could not be resolved to an installable set of packages.

    Problem 1

    - The requested PHP extension ext-gd * is missing from your system. Install or
    enable PHP''s gd extension.

    ```


    It looks as though I was set up for XML; however, GD, an image manipulation package,
    is not installed on my system, so Composer throws an error.


    ## Distribution Through Packagist


    If you’ve been working through this chapter, you might have wondered where the
    packages we have been installing actually come from. It feels a lot like magic,
    but (as you might expect) there is a package repository behind the scenes. It
    is called Packagist, and it can be found at [https://packagist.org](https://packagist.org).
    So long as your code can be found in a public git repository, it can be made available
    through Packagist.


    Let’s give it a shot. I have pushed my `megaquiz` project to Github, so now I
    need to tell Packagist about my repository. Once I have signed up, I simply add
    the URL of my repository. You can see this in Figure [16-1](#A314621_5_En_16_Chapter.html#Fig1).


    ![A314621_5_En_16_Fig1_HTML.jpg](A314621_5_En_16_Fig1_HTML.jpg)


    **Figure 16-1.** Adding a package to Packagist


    Once I’ve added `megaquiz`, Packagist locates the repository, checks the `composer.json`
    file, and displays a control panel. You can see that in Figure [16-2](#A314621_5_En_16_Chapter.html#Fig2).


    ![A314621_5_En_16_Fig2_HTML.jpg](A314621_5_En_16_Fig2_HTML.jpg)


    **Figure 16-2.** The package control panel


    Packagist tells me that I have not set license information. I can fix this at
    any time by adding a `license` element to the `composer.json` file:


    ```json

    "license": "Apache-2.0",

    ```


    Packagist has also failed to find any version information. I’ll fix this by adding
    a tag to the Github repository:


    ```

    $ git tag -a ''1.0.1'' -m ''1.0.1''

    $ git push –tags

    ```


    > **Note:** If you think I’m cheating by skimming over this Git stuff, you’re
    right. I cover both Git and Github in some detail in Chapter [17](#A314621_5_En_17_Chapter.html).


    Now Packagist knows about my version number. You can confirm that in Figure [16-3](#A314621_5_En_16_Chapter.html#Fig3).


    ![A314621_5_En_16_Fig3_HTML.jpg](A314621_5_En_16_Fig3_HTML.jpg)


    **Figure 16-3.** Packagist knows the version


    Now, anyone can include `megaquiz` from another package. Here is a minimal `composer.json`
    file:


    ```json

    {

    "require": {

    "popp5/megaquiz": "*"

    }

    }

    ```


    I specify the vendor name and the package name. Riskily, I am happy to accept
    any version at all. Let’s go ahead and install:


    ```

    $ composer install

    Loading composer repositories with package information

    Installing dependencies (including require-dev)

    - Installing abraham/twitteroauth (0.6.4)

    Loading from cache

    - Installing popp5/megaquiz (1.0.1)

    Downloading: 100%

    Writing lock file

    Generating autoload files

    ```


    Notice that the dependencies I specified when I set up `megaquiz` are also downloaded.


    ### Keeping it private


    Of course, you don’t always want to publish your code to the world. Sometimes
    you need to share only with a smaller set of authorized users.


    Here is a private package named `getinstance/api_util` that I use for internal
    projects:


    ```json

    {

    "name": "getinstance/api_util",

    "description": "core getinstance api code",

    "authors": [

    {

    "name": "matt zandstra",

    "email": "matt@getinstance.com"

    }

    ],

    "require": {

    "silex/silex": "∼1.3",

    "bshaffer/oauth2-server-php": "∼1.8"

    },

    "require-dev": {

    "phpunit/phpunit": "∼4.3.0"

    },

    "autoload": {

    "psr-4": {

    "getinstance\\api_util\\": ["src" , "test/functional"]

    }

    }

    }

    ```


    This is hosted in a private Bitbucket repository, so it’s not available via Packagist.
    So how would I include it in a project? I simply need to tell Composer where to
    look. I can do this by creating or adding to the `repositories` element:


    ```json

    {

    "repositories": [

    {

    "type": "vcs",

    "url": "git@bitbucket.org:getinstance/api_util.git"

    }

    ],

    "require": {

    "popp5/megaquiz": "*",

    "getinstance/api_util": "v1.0.3"

    }

    }

    ```


    So now, so long as I have access to `getinstance/api_util`, I can install both
    my private package and `megaquiz` at once:


    ```

    $ composer install

    Loading composer repositories with package information

    Installing dependencies (including require-dev)

    - Installing abraham/twitteroauth (0.6.4)

    Loading from cache

    - Installing popp5/megaquiz (1.0.1)

    Loading from cache

    ...

    - Installing silex/silex (v1.3.5)

    Loading from cache

    - Installing getinstance/api_util (v1.0.3)

    Cloning 3cf2988875b824936e6421d0810ceea90b76d139

    ...

    Writing lock file

    Generating autoload files

    ```


    ## Summary


    You should leave this chapter with a sense of how easy it is to leverage Composer
    packages to add power to your projects. Through the `composer.json` file, you
    can also make your code accessible to other users, whether publicly by using Packagist
    or by specifying your own repository. This approach automates dependency downloads
    for your users and allows third-party packages to use yours without the need for
    bundling.


    # 17. Version Control with Git


    All disasters have their tipping point, the moment at which order finally breaks
    down and events simply spiral out of control. Do you ever find yourself in projects
    like that? Are you able to spot that crucial moment?


    Perhaps it’s when you make “just a couple of changes” and find that you have brought
    everything crashing down around you (and, even worse, you’re not quite sure how
    to get back to the point of stability you have just destroyed). It could be when
    you realize that three members of your team have been working on the same set
    of classes and merrily saving over each other’s work. Or perhaps it’s when you
    discover that a bug fix that you have implemented twice has somehow disappeared
    from the codebase yet again. Wouldn’t it be nice if there were a tool to help
    you manage collaborative working, allowing you to take snapshots of your projects,
    roll them back if necessary, and then to merge multiple strands of development?
    In this chapter, we look at Git, a tool that does all that, and more.


    This chapter will cover the following aspects of working with Git:


    *   **Basic configuration:** Exploring some tips for setting up Git

    *   **Importing:** Starting a new project

    *   **Committing changes:** Saving your work to the repository

    *   **Updating:** Merging other people’s work with your own

    *   **Branching:** Maintaining parallel strands of development


    ## Why Use Version Control?'
