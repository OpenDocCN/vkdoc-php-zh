    ## 总结


    本章探讨了为什么性能既是主题开发中最重要却又最常被忽视的方面之一。本章深入分析了提升主题性能的动机，并讨论了需要跟踪的关键指标以及用于跟踪这些指标的工具。


    在理解了需要改进的方向之后，你将学习一系列具体的策略和技术，以确保主题快速加载并提供响应迅速的客户体验。


    脚注 1


    他们在 2009 年 Velocity 大会上提交的报告可在[`http://velocityconf.com/velocity2009/public/schedule/detail/8523`](http://velocityconf.com/velocity2009/public/schedule/detail/8523)找到。


    2


    [`http://www.stevesouders.com/blog/2013/05/09/how-fast-are-we-going-now/`](http://www.stevesouders.com/blog/2013/05/09/how-fast-are-we-going-now/)


    3


    [`https://sites.google.com/a/webpagetest.org/docs/using-webpagetest/metrics/speed-index`](https://sites.google.com/a/webpagetest.org/docs/using-webpagetest/metrics/speed-index)


    4


    [`https://github.com/tkadlec/grunt-perfbudget`](https://github.com/tkadlec/grunt-perfbudget)


    # 11. 协作式主题开发


    最后一章将介绍一些策略和工具，帮助你更轻松地与他人协作构建 Shopify 主题。同时，还将讨论如何以专业的方式部署主题，以降低因故障、冲突或错误导致客户使用的主题出现问题（如停机）的风险。


    最后，我将通过讨论如何充分利用 Shopify 生态系统来提升你对平台的理解，并在合作伙伴社区中建立更深的联系，以此结束本书的主要部分。


    ## 关于主题协作


    前面的章节涵盖了 Shopify 主题的核心组件，讨论了构建主题的不同方法，并逐步讲解了一个示例主题的开发过程。这些讨论基于两个假设——我们的团队规模为一人，且代码直接上传到正在使用的
    Shopify 网站。


    在现实世界中，情况往往并非如此——主题可能由多个开发者、设计师和内容编辑组成的团队共同构建。此外，当你的主题被商家“投入生产环境”使用时，拥有专业的部署流程对于降低代码引入错误导致商店收入损失的风险至关重要。


    即使你是一名独立开发者，并且预计这种情况不会改变，遵循我们即将概述的实践方法，不仅能让单人工作流程更顺畅，也能让接手项目的开发者（或者你在休假数月后重新回到主题开发时）享受到流畅、清晰的流程带来的好处。


    ### 使用版本控制的协作工作流程


    回顾一下第 2 章，其中讨论了如何使用 Git 将主题文件纳入版本控制——如果你计划与他人合作开发主题，这至关重要。简单回顾一下：


    - 版本控制提供了一种跟踪主题文件变更的方法，并提供了一种简单的方法来从意外覆盖或删除的文件中恢复。

    - 它提供了一种记录谁对主题进行了特定更改的方法，并允许多个开发者在“合并”更改之前同时处理一个项目。

    - 你可以使用功能分支和多个预览主题来独立于线上主题开发新代码和主题功能。


    要将其转变为现代化的协作开发工作流程，我们只需添加几个要素：


    - 一个集中式服务器（或去中心化流程），允许多个开发者推送自己的更改并获取他人的更改。

    - 一个用于组织待办事项及负责人系统的任务管理系统。

    - 一个在更改合并到主代码库之前进行审查的流程。


    这方面的工作流程和开发者数量一样多，因此我不打算列出所有。相反，这里描述的是我们公司用于管理此过程的典型工作流程（我们使用 GitHub 作为中央代码仓库，用于列出和跟踪问题，以及审查和合并更改）：


    - 在 GitHub 上创建新的代码仓库，并为相关团队成员授予代码访问权限。如果我们要从头开始构建主题，有人会使用 `Slate` 或我们自己的主题框架在本地创建初始文件集。如果我们要处理现有主题，我们会使用
    `Slate`、`Theme Kit` 或 Shopify 的 `.zip` 导出功能获取当前文件集，并将其提交到仓库作为起点。

    - 每位团队成员在我们正在处理的商店上创建自己未发布的“预览主题”，以确保所做的任何更改不会影响线上网站或其他开发者，但仍能利用“真实”的商店数据。

    - 我们确定需要完成的工作，并将其分解为小的、独立的特性，作为“议题”添加到 GitHub 中。通过将这些议题分配给不同的团队成员来分担工作。

    - 在处理新议题时，开发者会创建一个特定于该议题的新“功能分支”，并在其上工作，代码更改会自动更新个人预览主题。

    - 对更改满意后，开发者会创建一个 GitHub 拉取请求，要求将更改合并到仓库的“主”分支。另一名团队成员（通常是项目的技术负责人）被指派审查更改（见图
    11-1）。在给出反馈并进行任何必要的更改后，更改将被合并到仓库的“主”分支，然后流程重复处理下一个议题。


    ![A437216_1_En_11_Fig1_HTML.jpg](img/A437216_1_En_11_Fig1_HTML.jpg)


    图 11-1 在 GitHub 上进行的主题代码审查


    使用这样的流程，并且仅将“主”分支部署到 Shopify 商店已发布的主题上，可以确保开发者不会意外覆盖或重复彼此的工作。在将更改合并到“主”分支之前进行代码审查，也能确保所有更改都经过另一个人检查。

    '
- fmt: '### Collaborative Deployment Processes


    Once we have a system in place for assigning tasks, working on them independently,
    and then reviewing and merging changes, the next question is how can we roll out
    that consolidated version of the theme. Before discussing that, let’s review the
    processes you’ve learned about so far.


    Early in Chapter [2](#A437216_1_En_2_Chapter.html), when you saw how to move theme
    development to a local machine, the deployment workflow looked like something
    in Figure [11-2](#A437216_1_En_11_Chapter.html#Fig2). Changes made locally were
    being uploaded directly to the Shopify store’s published theme via `Theme Kit`
    or `Slate`.


    ![A437216_1_En_11_Fig2_HTML.jpg](A437216_1_En_11_Fig2_HTML.jpg)


    **Figure 11-2** The early deployment workflow, with changes being uploaded directly
    to the published theme


    As also discussed in Chapter [2](#A437216_1_En_2_Chapter.html), this sort of workflow
    has some issues:


    *   Having changes made locally uploaded instantly into production makes it easy
    to introduce errors that affect real customers. There’s no quality control mechanism
    like testing or code review between the developer and the production code.

    *   If multiple developers are working on a theme, it’s easy to accidentally overwrite
    each other’s changes but difficult to roll back to a known point in time.

    *   It becomes difficult or impossible to know what state the live theme is in.


    Figure [11-3](#A437216_1_En_11_Chapter.html#Fig3) describes an improvement over
    this. Here, the Shopify store has multiple themes in play—a “development” theme
    (if you have multiple people working on the theme, then you’ll likely have at
    least one theme per developer) and a “live” theme. It still uses `Theme Kit` or
    `Slate` to automatically upload changes to the development theme as we make them
    locally, but because this theme isn’t published, the real-time changes won’t affect
    real customers.


    ![A437216_1_En_11_Fig3_HTML.jpg](A437216_1_En_11_Fig3_HTML.jpg)


    **Figure 11-3** A slightly improved deployment workflow, with separate development
    and live themes


    Using this workflow, once a developer is happy with the state of the development
    theme (and they have pulled in any changes from other developers), the developer
    can “deploy” the final theme state by pointing `Theme Kit` or `Slate` at the live
    version of the theme and running a full upload from the command line with `theme
    replace`.


    This improvement avoids the biggest problem—accidentally making a change that
    ends up affecting customers—but we still run the risk of overwriting other’s code,
    have no proper QA process, and can’t tell what state a theme is in.


    We can improve this further by adding an intermediate step between the code on
    our local development machine and the production version of our theme—a central
    repository—as shown in Figure [11-4](#A437216_1_En_11_Chapter.html#Fig4).


    ![A437216_1_En_11_Fig4_HTML.jpg](A437216_1_En_11_Fig4_HTML.jpg)


    **Figure 11-4** Adding a code repository between the local development machine
    and the production version of the code


    By adding this step, we enforce a rule that only code from the central repository
    and on a specific version control branch (`master` or perhaps `production`) can
    be deployed to the live theme. This ensures that all changes go through a quality
    assurance process, such as code review and perhaps some automated testing, before
    being merged to the main branch and rolled out into production.


    To facilitate the deployment of your theme code out to the live theme, it’s necessary
    to use some form of deployment service. Your options here will vary, depending
    on the service you’re using to host your repository and what integrations are
    available. A common choice in the Shopify world (and the choice I’m most familiar
    with) is DeployBot (see [`https://deploybot.com`](https://deploybot.com)). `DeployBot`,
    shown in Figure [11-5](#A437216_1_En_11_Chapter.html#Fig5), has native support
    for connecting to a specific Shopify theme and deploying code to it from a variety
    of version control sources (such as GitHub).


    ![A437216_1_En_11_Fig5_HTML.jpg](A437216_1_En_11_Fig5_HTML.jpg)


    **Figure 11-5** A DeployBot configuration screen linking a single GitHub repository
    to two production versions of a Shopify theme (one for retail and one for wholesale)


    Deployment services like `DeployBot` can be configured to deploy your theme code
    to a Shopify store either manually (triggered by logging in and clicking a button),
    or automatically (triggered by simply pushing or merging code to a specific branch
    of your theme repository).


    The process you choose may vary from project to project, but I commonly set up
    two deployment triggers—one to automatically deploy all changes to the `master`
    branch of a repository to a `staging` version of the theme, and then one that
    must be triggered manually to roll out the final changes to the production store
    (see Figure [11-6](#A437216_1_En_11_Chapter.html#Fig6)).


    ![A437216_1_En_11_Fig6_HTML.jpg](A437216_1_En_11_Fig6_HTML.jpg)


    **Figure 11-6** A production-ready deployment workflow, including automated and
    manual deployment triggers and multiple Shopify stores


    As you’ll see, Figure [11-6](#A437216_1_En_11_Chapter.html#Fig6) also shows the
    separation of the live theme from the staging and development themes by placing
    them on separate Shopify stores. This is often a good practice to further reduce
    the risks of your development workflow accidentally affecting real customers,
    as well as allowing you to separate test data (such as orders, products, and customers)
    from `production` data.


    In some real-world scenarios, your workflow may be even more complex, with many
    more Shopify stores, each containing live or staging themes. This may occur when
    you’re using a single codebase to drive many different `variants` of a Shopify
    store (for example, retail/wholesale variants for a single brand, or variants
    targeted at different locales). In situations like this, having an automated deploy
    service becomes essential to avoid inconsistent theme states and to properly manage
    your development processes.


    #### Cloning Shopify Stores


    Some of the more `advanced` deployment scenarios I mentioned involve creating
    one or more `development` Shopify stores to allow for experimentation without
    affecting live store data. Generally, it’s a good idea to keep the product, collection,
    page, and theme data on your production stores as up to date with the real store
    as possible, so that you’re developing in a more `realistic` environment.


    Shopify does enable you to export and import product and theme data (although
    keeping your theme up to date should be the responsibility of developers and your
    deployment service), but unfortunately there’s no built-in way to automate this
    or to import/export other data like page, collection, and blog content.


    Aside from a periodic manual synchronization process, there are a couple of options.
    The first is to install one of the many `store sync` applications available in
    the Shopify App store. Depending on the type and quantity of data you need to
    synchronize, using one or more of these apps can be an easy way to keep your development
    stores up to date.


    The second option (and my own preferred method) is to use the freely available
    `Quickshot` tool (see [`https://quickshot.readme.io`](https://quickshot.readme.io)).
    While this tool was originally built to synchronize theme data from a local machine
    to a Shopify store (similar to the functionality now provided by `Slate`, discussed
    in Chapter [2](#A437216_1_En_2_Chapter.html)), it also contains tools to synchronize
    product, collection, blog, and page data.'
  raw: '### Collaborative Deployment Processes


    Once we have a system in place for assigning tasks, working on them independently,
    and then reviewing and merging changes, the next question is how can we roll out
    that consolidated version of the theme. Before discussing that, let’s review the
    processes you’ve learned about so far.


    Early in Chapter [2](#A437216_1_En_2_Chapter.html), when you saw how to move theme
    development to a local machine, the deployment workflow looked like something
    in Figure [11-2](#A437216_1_En_11_Chapter.html#Fig2). Changes made locally were
    being uploaded directly to the Shopify store’s published theme via Theme Kit or
    Slate .


    ![A437216_1_En_11_Fig2_HTML.jpg](A437216_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    The early deployment workflow, with changes being uploaded directly to the published
    theme


    As also discussed in Chapter [2](#A437216_1_En_2_Chapter.html), this sort of workflow
    has some issues:


    *   Having changes made locally uploaded instantly into production makes it easy
    to introduce errors that affect real customers. There’s no quality control mechanism
    like testing or code review between the developer and the production code.

    *   If multiple developers are working on a theme, it’s easy to accidentally overwrite
    each other’s changes but difficult to roll back to a known point in time .

    *   It becomes difficult or impossible to know what state the live theme is in.


    Figure [11-3](#A437216_1_En_11_Chapter.html#Fig3) describes an improvement over
    this. Here, the Shopify store has multiple themes in play—a “development” theme
    (if you have multiple people working on the theme, then you’ll likely have at
    least one theme per developer) and a “live” theme. It still uses Theme Kit or
    Slate to automatically upload changes to the development theme as we make them
    locally, but because this theme isn’t published, the real-time changes won’t affect
    real customers.


    ![A437216_1_En_11_Fig3_HTML.jpg](A437216_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    A slightly improved deployment workflow, with separate development and live themes


    Using this workflow, once a developer is happy with the state of the development
    theme (and they have pulled in any changes from other developers), the developer
    can “deploy” the final theme state by pointing Theme Kit or Slate at the live
    version of the theme and running a full upload from the command line with `theme
    replace`.


    This improvement avoids the biggest problem—accidentally making a change that
    ends up affecting customers—but we still run the risk of overwriting other’s code,
    have no proper QA process, and can’t tell what state a theme is in .


    We can improve this further by adding an intermediate step between the code on
    our local development machine and the production version of our theme—a central
    repository—as shown in Figure [11-4](#A437216_1_En_11_Chapter.html#Fig4).


    ![A437216_1_En_11_Fig4_HTML.jpg](A437216_1_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Adding a code repository between the local development machine and the production
    version of the code


    By adding this step, we enforce a rule that only code from the central repository
    and on a specific version control branch (“master” or perhaps “production”) can
    be deployed to the live theme. This ensures that all changes go through a quality
    assurance process, such as code review and perhaps some automated testing, before
    being merged to the main branch and rolled out into production.


    To facilitate the deployment of your theme code out to the live theme, it’s necessary
    to use some form of deployment service. Your options here will vary, depending
    on the service you’re using to host your repository and what integrations are
    available. A common choice in the Shopify world (and the choice I’m most familiar
    with) is DeployBot (see [`https://deploybot.com`](https://deploybot.com) ). DeployBot
    , shown in Figure [11-5](#A437216_1_En_11_Chapter.html#Fig5), has native support
    for connecting to a specific Shopify theme and deploying code to it from a variety
    of version control sources (such as GitHub).


    ![A437216_1_En_11_Fig5_HTML.jpg](A437216_1_En_11_Fig5_HTML.jpg)


    Figure 11-5


    A DeployBot configuration screen linking a single GitHub repository to two production
    versions of a Shopify theme (one for retail and one for wholesale)


    Deployment services like DeployBot can be configured to deploy your theme code
    to a Shopify store either manually (triggered by logging in and clicking a button),
    or automatically (triggered by simply pushing or merging code to a specific branch
    of your theme repository).


    The process you choose may vary from project to project, but I commonly set up
    two deployment triggers—one to automatically deploy all changes to the “master”
    branch of a repository to a “staging” version of the theme, and then one that
    must be triggered manually to roll out the final changes to the production store
    (see Figure [11-6](#A437216_1_En_11_Chapter.html#Fig6)).


    ![A437216_1_En_11_Fig6_HTML.jpg](A437216_1_En_11_Fig6_HTML.jpg)


    Figure 11-6


    A production-ready deployment workflow, including automated and manual deployment
    triggers and multiple Shopify stores


    As you’ll see, Figure [11-6](#A437216_1_En_11_Chapter.html#Fig6) also shows the
    separation of the live theme from the staging and development themes by placing
    them on separate Shopify stores. This is often a good practice to further reduce
    the risks of your development workflow accidentally affecting real customers,
    as well as allowing you to separate test data (such as orders, products, and customers)
    from “production” data.


    In some real-world scenarios, your workflow may be even more complex, with many
    more Shopify stores, each containing live or staging themes. This may occur when
    you’re using a single codebase to drive many different “variants” of a Shopify
    store (for example, retail/wholesale variants for a single brand, or variants
    targeted at different locales). In situations like this, having an automated deploy
    service becomes essential to avoid inconsistent theme states and to properly manage
    your development processes.


    #### Cloning Shopify Stores


    Some of the more “advanced” deployment scenarios I mentioned involve creating
    one or more “development” Shopify stores to allow for experimentation without
    affecting live store data. Generally, it’s a good idea to keep the product, collection,
    page, and theme data on your production stores as up to date with the real store
    as possible, so that you’re developing in a more “realistic” environment.


    Shopify does enable you to export and import product and theme data (although
    keeping your theme up to date should be the responsibility of developers and your
    deployment service), but unfortunately there’s no built-in way to automate this
    or to import/export other data like page, collection, and blog content.


    Aside from a periodic manual synchronization process, there are a couple of options.
    The first is to install one of the many “store sync” applications available in
    the Shopify App store. Depending on the type and quantity of data you need to
    synchronize, using one or more of these apps can be an easy way to keep your development
    stores up to date.


    The second option (and my own preferred method) is to use the freely available
    Quickshot tool (see [`https://quickshot.readme.io`](https://quickshot.readme.io)
    ). While this tool was originally built to synchronize theme data from a local
    machine to a Shopify store (similar to the functionality now provided by Slate,
    discussed in Chapter [2](#A437216_1_En_2_Chapter.html)), it also contains tools
    to synchronize product, collection, blog, and page data.'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将给定的英文文本翻译成中文。



    ### 协作部署流程


    一旦我们建立了一个用于分配任务、独立处理任务、然后审查和合并变更的系统，下一个问题就是如何推出该主题的整合版本。在讨论这个问题之前，让我们回顾一下您目前所学到的流程。


    早先在第 2 章中，当您了解了如何将主题开发迁移到本地机器时，部署工作流程如图 11-2 所示。在本地进行的更改通过 `Theme Kit` 或 `Slate`
    直接上传到 Shopify 商店的已发布主题。


    ![A437216_1_En_11_Fig2_HTML.jpg](img/A437216_1_En_11_Fig2_HTML.jpg)


    **图 11-2** 早期的部署工作流程，更改直接上传到已发布主题


    正如第 2 章 中也讨论过的，这种工作流程存在一些问题：


    *   在本地进行的更改会立即上传到生产环境，这很容易引入影响真实客户的错误。在开发者和生产代码之间，没有像测试或代码审查这样的质量控制机制。

    *   如果多个开发人员在一个主题上工作，很容易意外覆盖彼此的更改，但很难回滚到某个已知的时间点。

    *   很难或不可能知道线上主题处于什么状态。


    图 11-3 描述了对此的改进。在这里，Shopify 商店拥有多个主题在运行——一个“开发”主题（如果有多人处理该主题，那么很可能每个开发人员至少有一个主题）和一个“上线”主题。它仍然使用
    `Theme Kit` 或 `Slate` 在我们本地进行更改时自动将更改上传到开发主题，但由于此主题未发布，这些实时更改不会影响真实客户。


    ![A437216_1_En_11_Fig3_HTML.jpg](img/A437216_1_En_11_Fig3_HTML.jpg)


    **图 11-3** 稍作改进的部署工作流程，区分了开发和上线主题


    使用此工作流程，一旦开发者对开发主题的状态感到满意（并且他们已经拉取了其他开发者的更改），开发者可以通过将 `Theme Kit` 或 `Slate` 指向主题的上线版本，并从命令行使用
    `theme replace` 运行完整上传，来“部署”最终的主题状态。


    这种改进避免了最大的问题——意外做出影响客户的更改——但我们仍然存在覆盖他人代码的风险，没有合适的 QA 流程，也无法判断主题处于什么状态。


    我们可以通过在本地开发机器上的代码与主题的生产版本之间添加一个中间步骤——一个中央代码仓库——来进一步改进这一点，如图 11-4 所示。


    ![A437216_1_En_11_Fig4_HTML.jpg](img/A437216_1_En_11_Fig4_HTML.jpg)


    **图 11-4** 在本地开发机器和代码的生产版本之间添加一个代码仓库


    通过添加此步骤，我们强制执行一条规则：只有来自中央代码仓库并且位于特定版本控制分支（`master` 或可能是 `production`）上的代码才能部署到上线主题。这确保了所有更改在合并到主分支并推出到生产环境之前，都经过了质量保证流程，例如代码审查和可能的自动化测试。


    为了将您的主题代码部署到上线主题，有必要使用某种形式的部署服务。您的选择会有所不同，具体取决于您用于托管代码仓库的服务以及可用的集成。在 Shopify 领域中一个常见的选择（也是我最熟悉的选择）是
    DeployBot（请参阅 [`https://deploybot.com`](https://deploybot.com)）。`DeployBot`，如图
    11-5 所示，原生支持连接到特定的 Shopify 主题，并从各种版本控制源（例如 GitHub）向其部署代码。


    ![A437216_1_En_11_Fig5_HTML.jpg](img/A437216_1_En_11_Fig5_HTML.jpg)


    **图 11-5** 一个 DeployBot 配置界面，将一个 GitHub 仓库链接到 Shopify 主题的两个生产版本（一个用于零售，一个用于批发）


    像 `DeployBot` 这样的部署服务可以配置为手动部署（通过登录并点击按钮触发）或自动部署（通过简单地将代码推送或合并到主题仓库的特定分支来触发）您的主题代码到
    Shopify 商店。


    您选择的流程可能因项目而异，但我通常会设置两个部署触发器——一个用于自动将仓库 `master` 分支的所有更改部署到主题的 `staging`（预发布）版本，另一个必须手动触发以将最终更改推送到生产商店（见图
    11-6）。


    ![A437216_1_En_11_Fig6_HTML.jpg](img/A437216_1_En_11_Fig6_HTML.jpg)


    **图 11-6** 一个可用于生产环境的部署工作流程，包括自动和手动部署触发器以及多个 Shopify 商店


    如您所见，图 11-6 还通过将上线主题、预发布主题和开发主题放置在不同的 Shopify 商店上来显示它们的分离。这通常是一个好做法，可以进一步降低您的开发工作流程意外影响真实客户的风险，并且允许您将测试数据（如订单、产品和客户）与
    `production`（生产）数据分开。


    在一些真实场景中，您的工作流程可能更加复杂，涉及更多的 Shopify 商店，每个商店都包含上线或预发布主题。当您使用单一代码库驱动 Shopify 商店的许多不同
    `variants`（变体）时（例如，单个品牌的零售/批发变体，或针对不同地区的变体），就可能会出现这种情况。在这种情况下，拥有自动部署服务对于避免主题状态不一致和正确管理您的开发流程至关重要。


    #### 克隆 Shopify 商店


    我提到的一些更`高级的`部署场景涉及创建一个或多个`开发型` Shopify 商店，以便在不影响线上商店数据的情况下进行实验。通常，最好让生产商店上的产品、产品系列、页面和主题数据尽可能与真实商店保持同步，这样您就能在更`真实`的环境中进行开发。


    Shopify 确实允许您导出和导入产品和主题数据（尽管保持主题最新应该是开发者和您的部署服务的责任），但遗憾的是，没有内置的方法可以自动化此过程，也无法导入/导出其他数据，如页面、产品系列和博客内容。


    除了定期的手动同步过程之外，还有几个选择。第一个是安装 Shopify 应用商店中众多`商店同步`应用之一。根据您需要同步的数据类型和数量，使用一个或多个此类应用可以成为保持开发商店数据最新的简单方法。


    第二个选择（也是我更喜欢的方法）是使用免费提供的 `Quickshot` 工具（请参阅 [`https://quickshot.readme.io`](https://quickshot.readme.io)）。虽然此工具最初是为了将主题数据从本地机器同步到
    Shopify 商店而构建的（类似于第 2 章中讨论的 `Slate` 现在提供的功能），但它也包含用于同步产品、产品系列、博客和页面数据的工具。

