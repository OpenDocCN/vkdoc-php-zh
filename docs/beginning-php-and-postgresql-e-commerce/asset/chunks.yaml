    \ status = inStatus\n      ORDER BY created_on DESC\n    LOOP\n      RETURN NEXT\
    \ outOrderShortDetailsRow;\n    END LOOP;\n  END;\n$$;\n```\n\n此函数用于返回其状态值与`inStatus`参数指定值相匹配的订单。\n\
