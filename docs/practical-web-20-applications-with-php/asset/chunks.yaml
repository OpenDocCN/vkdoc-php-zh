    **Uploading Files**


    Traditionally speaking, HTTP hasn’t been a very good method for uploading files
    over the Internet. There are several reasons for this:


    • **Unreliable.** If a file upload doesn’t complete, it is not possible to resume
    the upload, meaning large files may never be uploaded. Additionally, some browsers
    may decide after a prolonged period of time that an error has occurred, typically
    resulting in an error message being displayed to the user.


    • **Restrictive.** While a file is being uploaded, the user cannot navigate away
    from the page they are uploading to without interrupting the upload.


    • **Cumbersome.** Due to security concerns, the capabilities of file-upload forms
    are somewhat restricted. For instance, very few styles can usually be applied
    to file inputs.


    Additionally, file inputs allow only single selections, meaning a user cannot
    choose multiple files at once—if the form allows multiple file inputs, the files
    must be chosen one at a time.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch11CMP2 11/15/07 8:13 AM Page 375


    C H A P T E R 1 1 ■ A DY N A M I C I M A G E G A L L E RY


    **375**


    • **Uninformative.** There is no built-in way in HTTP to notify the user of the
    status of their upload. This means there is no easy way to know how much of the
    upload is complete, or how much longer it will take.


    Thankfully the increased speeds of Internet connections over recent years have
    alleviated some of these problems; however, since HTTP hasn’t changed, these issues
    still exist.


    In our web application, we will only be uploading images (not other file types,
    such as PDF files). Compared to other types of files, images are small. For instance,
    using the Photoshop “Save for Web” tool to save a 1024 ✕ 768 pixel JPEG photo
    will typically result in a file under 100KB.


    In this section, we will create an image-upload form in our web application, as
    well as a new form processor to deal with this upload.


    **Setting the Form Encoding**


    To upload files over HTTP, a traditional HTML form is used (that is, using <form>
    tags), but you must add one extra attribute to this tag: the enctype attribute.
    This notifies the web server what kind of data the web browser is trying to send.


    Normally you don’t need to specify this attribute. If it is not specified, the
    default value of enctype is application/x-www-form-urlencoded. In other words,
    the following two lines of HTML are equivalent:


    <form method="post" action="...">


    <form method="post" action="..." enctype="application/x-www-form-urlencoded">
    This indicates to the web server that the browser is sending URL-encoded form
    data using the HTTP POST method.


    In order to have the web server recognize uploaded image files, we must specify
    the enctype as multipart/form-data. In other words, the form will probably be
    sending multiple types of data: normal URL-encoded form data as well as binary
    data (such as an image).


