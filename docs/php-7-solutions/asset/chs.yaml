  \ {\n```\n\n调用这些新方法的顺序无关紧要，只要它们在构造函数之后、在调用`check()`方法之前即可。使用不同的组合来强制实施不同的密码强度。\n\
  \n如有必要，请对照`ch11`文件夹中的`register_03.php`以及`ch11/PhpSolutions/Authenticate`文件夹中的`CheckPassword_02.php`检查你的代码。\n\
  \n在开发本章代码时，我最初将密码检查器设计为一个函数。函数内部的代码基本相同，但我决定将其转换为一个类，以使其更灵活且更易于使用。这个函数的问题在于它需要大量参数来设置不同的选项，而且很难记住参数顺序。此外，处理结果也很困难。如果没有错误，函数返回`true`；但如果发现任何错误，它会返回错误消息数组。由于\
  \ PHP 将包含元素的数组隐式视为`true`，这意味着必须使用恒等运算符（三个等号——参见表 4-6）来检查结果是否为布尔值`true`。将代码转换为类消除了这些问题。用于设置选项的公有方法具有直观的名称，并且可以按任意顺序设置——也可以完全不设置。并且结果始终是布尔值`true`或`false`，因为有一个单独的方法来检索错误消息数组。虽然这涉及编写更多代码，但这些改进使其物有所值。\n\
  \n## PHP 方案 11-4：创建基于文件的用户注册系统\n\n此 PHP 方案创建了一个简单的用户注册系统，该系统使用`password_hash()`函数对密码进行哈希处理。它使用\
