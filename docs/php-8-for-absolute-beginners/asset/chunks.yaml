- fmt: "Many organizations keep track of change management within a program by providing\
    \ details on who created the program, when it was created, and any changes that\
    \ have occurred. Comments can also provide a list of the inputs and outputs of\
    \ the program and a description of the program itself. Additionally, similar descriptions\
    \ are provided for functions (methods or procedures) which have been created within\
    \ the program.\n\n## PHP Functions\n\nAll executable code must include a semicolon\
    \ at the end of the statement. As a standard, adopt the policy that any text strings\
    \ (such as the preceding `Hello World`) should be included in double quotes. PHP\
    \ does allow some exceptions to the rule (such as using single quotes in some\
    \ instances), but you will seldom run into a problem if you are consistent in\
    \ providing them. The use of `echo` demonstrates the ability to use a PHP function.\n\
    \nPHP provides a large number of other functions (blocks of code), besides the\
    \ `echo` statement shown in the preceding. The functions contain well-tested,\
    \ efficient, secure code. Whenever possible, a smart programmer will use existing\
    \ functions to save time and to reduce programming errors and possible security\
    \ vulnerabilities.\n\nWhen creating your own PHP functions, they should begin\
    \ with a lowercase letter. Additional words can be started with an uppercase letter,\
    \ such as `myFunction`. Some programmers also use underscores between the words.\
    \ In the following example, the string “Hello World” is passed into a function\
    \ named `myFunction`. We will explore a lot of PHP functions throughout this book.\
    \ Later in this chapter, we will see additional examples on how a programmer can\
    \ create their own functions.\n\n## Variables\n\nVariables temporarily store information\
    \ in memory. As we have seen, PHP does not require you to declare a data type\
    \ when using a variable. However, when the opportunity is available, you should\
    \ consider defining the data type, as this will increase security by restricting\
    \ the type of information that can be stored.\n\n> **Note**\n> A data type describes\
    \ the data that you plan on storing, such as strings (text), integers (whole numbers),\
    \ or floating-point numbers (decimals). This information is used by the operating\
    \ system to determine the amount of space required to store the information.\n\
    \nWe have the option to declare data types in many situations. It is a good idea\
    \ to declare data types when we want to limit the type of data to be stored in\
    \ memory. Remember, PHP will do *data type conversion* (such as converting a string\
    \ `\"10\"` to a numeric `10`) unless you stop it. Let us look at the standard\
    \ way to declare variables in PHP.\n\nIn PHP, we usually do not need to declare\
    \ a variable separately before using it. When declaring variables or functions,\
    \ the developer can use many styles. The most common is the camel case. In camel\
    \ case, the first word is lowercase, and the remaining words have a capitalized\
    \ first letter, such as `addIt`. However, other styles are acceptable, such as:\n\
    \n```\n$first_number = 0;\n$second_Number = 1;\n$number1 = 12;\n```\n\nThe key\
    \ is to be consistent within your code with whatever style you choose. There is\
    \ really no advantage as to which format is better. Although plenty of programmers\
    \ will be happy to tell you their opinion! In my opinion, you should use meaningful\
    \ names such as `total_Sales`. Some also include the data type in the name, such\
    \ as `int_Total_Sales`. In large programs, it will be much easier to keep track\
    \ of variable usage with a good naming convention.\n\n> **Note**\n> Variables\
    \ must always include the `$` as the first character and other alphanumeric characters\
    \ to complete the name. You can also include the underscore (`_`). However, no\
    \ other special symbols or spaces are allowed.\n\nIn the following example, a\
    \ variable (`$result`) will hold whatever is returned by a function called `addIt`.\
    \ Since we have not declared a data type, this variable could hold a numerical\
    \ result, a string result, or some other possible format. As a programmer, we\
    \ might want this flexibility. For example, if the function is able to produce\
    \ a result, we return the result. If it is not able to return a result, we can\
    \ return a string (`\"Invalid Result\"`) or we could pass back `NULL` (which indicates\
    \ no result, different from passing a zero).\n\nSince this function accepts two\
    \ parameters (`12`, `13`), we assume it will add the numbers together and return\
    \ the result. The `echo` statement will then display whatever is contained in\
    \ the variable.\n\nIf we have not declared data types to limit what is passed\
    \ into the function (see in the following), then it is possible that the following\
    \ examples will also produce good results with other types of information passed.\
    \ However, there could be something within the function that will not properly\
    \ execute when information that is not expected is passed. A good programmer always\
    \ creates code that avoids any possible error situation caused by invalid data\
    \ being saved or passed into a function. Every situation must be considered, even\
    \ one the programmer may consider illogical or next to impossible.\n\nIf we want\
    \ to restrict what information to accept or use, we could declare data types.\
    \ We will explore a few examples soon. For now, by default, remember, the data\
    \ type of a variable is determined the first time a variable is used.\n\n- **V-1**:\
    \ The data type is string (characters).\n  ```\n  $myValue = \"Help\";\n  ```\n\
    \n- **V-2**: The data type is set to an integer (whole numbers).\n  ```\n  $myValue\
    \ = 123;\n  ```\n\n- **V-3**: Two integers added together produce an integer which\
    \ is then stored into the variable.\n  ```\n  $myValue = 123 + 456;\n  Result:\
    \ $myValue now contains 579\n  ```\n\n- **V-4**: Two *floating-point numbers*\
    \ added together produce a floating-point number stored in the variable.\n  ```\n\
    \  $myValue = 123.123 + 123.456;\n  Result: $myValue now contains 246.579\n  ```\n\
    \n- **V-5**: A floating-point number added to an integer will produce a floating-point\
    \ number.\n  ```\n  $myValue = 123.233 + 12;\n  Result: $myValue now contains\
    \ 135.233\n  ```\n\n- **V-6**: An attempt to add a number to a string number will\
    \ be successful, if the string can be converted to a number. Adding the values\
    \ together will produce results similar to the preceding examples.\n  ```\n  $myValue\
    \ = 123 + \"456\";\n  Result: $myValue now contains 579\n  ```\n\nThe *string\
    \ concatenation character* (`.`) can be used to merge the two strings together.\
    \ The result then can be placed in the variable (which you guessed it now contains\
    \ a string). In the following example, the existing two strings are merged together\
    \ to create a new string stored in `$myValue`.\n\n```\n$myValue = \"Help\" . \"\
    \ me!\";\nResult: $myValue now contains \"Help me!\"\n```\n\n- **C-1**: When merging\
    \ a string and integer, PHP will convert the integer to a string (`123`) to allow\
    \ it to be concatenated with the other string (`Help`) to produce a string `\"\
    Help 123\"` which will be placed into the variable.\n  ```\n  $myValue = \"Help\
    \ \" . 123;\n  Result: $myValue now contains \"Help 123\"\n  ```\n\n- **C-2**:\
    \ When a merger is attempted with a string and two values (which in this case\
    \ are to be added together), PHP will first do the calculation and then convert\
    \ the result to a string.\n  ```\n  $num1 = 1;\n  $num2 = 2;\n  $myValue = \"\
    Help \" . $num1 + $num2;\n  Result: $myValue now contains \"Help 3\"\n  ```\n\n\
    Let’s take a look at restricting our data types with data type hints.\n\nIn the\
    \ preceding example, the function limits `$value` to only contain Boolean (true/false)\
    \ type values. It also limits the value returned to be Boolean.\n\n> **Note**\n\
    > `true` is not a string, it is a Boolean value. Thus, it does not require quotes."
