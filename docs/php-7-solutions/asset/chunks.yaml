  raw: "To bind the results, you must name each column specifically in the `SELECT`\
    \ query. List\nthe variables you want to use in the same order and pass them as\n\
    arguments to `bind_result()`. For\nexample, let’s say your SQL looks like this:\n\
    \n```\n$sql = 'SELECT image_id, filename, caption FROM images WHERE caption LIKE\
    \ ?';\n```\n\nTo bind the results of the query, use this code:\n\n```\n$stmt->bind_result($image_id,\
    \ $filename, $caption);\n```\n\nThis allows you to access the results directly\
    \ as `$image_id`, `$filename`, and `$caption`.\n\nStore the result (optional)\n\
    \nWhen you use a prepared statement for a `SELECT` query, the\nresults are unbuffered.\
    \ This means that they remain on the database\nserver until you fetch them. This\
    \ has the advantage of requiring less\nmemory, particularly if the result set\
    \ contains a large number of rows.\nHowever, unbuffered results impose the following\
    \ restrictions:\n\n*   Once the results are fetched, they’re no longer stored\
    \ in memory.\n    Consequently, you can’t use the same result set more than once.\n\
    \n*   You can’t run another query on the same database connection until\n    all\
    \ of the results have been fetched or cleared.\n\n*   You can’t use the `num_rows`\
    \ property to\n    find out how many rows are in the result set.\n\n*   You can’t\
    \ use `data_seek()` to move\n    to a specific row in the result set.\n\nTo avoid\
    \ these restrictions, you can optionally store the result set\nusing the statement’s\
    \ `store_result()`\nmethod . However,\nif you simply want to display the result\
    \ immediately without reusing\nlater, there’s no need to store it first.\n\nNote\n\
    To clear an unbuffered result, call the statement’s `free_result()`\nmethod.\n\
    \nFetch the result\n\nTo loop through the results of a `SELECT` query that has\n\
    been executed with a prepared statement, use the `fetch()` method . If you have\
    \ bound\nthe results to variables, do it like this:\n\n```\nwhile ($stmt->fetch())\
    \ {\n// display the bound variables for each row\n}\n```\n\nIf you haven’t bound\
    \ the results to variables, use `$row = $stmt->fetch()` and access each variable\
    \ as `$row['column_name']`.\n\nClose the statement\nWhen you have finished with\
    \ a prepared statement, the `close()` method frees\nthe memory used.\n\nPHP Solution\
    \ 13-7: Using a MySQLi Prepared Statement\nin a search\n\nThis PHP solution shows\
    \ how to use a MySQLi prepared statement with a\n`SELECT` query;\nit also demonstrates\
    \ binding the result to named variables.\n\n1.  Copy `mysqli_prepared_01.php`\n\
    \    from the `ch13`\n    folder and save it in the `mysqli` folder as\n    `mysqli_prepared.php`.\n\
    \    The file contains a search form and a table for displaying the\n    results.\n\
    \n2.  In a PHP code block above the `DOCTYPE` declaration,\n    create a conditional\
    \ statement to include `connection.php` and\n    `utility_funcs.php`,\n    and\
    \ create a read-only connection when the search form is submitted. The\n    code\
    \ looks like this:\n\n```\n    if (isset($_GET['go'])) {\n    require_once '../includes/connection.php';\n\
    \    require_once '../includes/utility_funcs.php';\n    $conn = dbConnect('read');\n\
    \    }\n    ```\n\n3.  Next, add the SQL query inside the conditional statement.\
    \ The query\n    needs to name the three columns you want to retrieve from the\
    \ `images` table. Use a\n    question mark as the placeholder for the search term,\
    \ like this:\n\n```\n    $sql = 'SELECT image_id, filename, caption FROM images\n\
    \    WHERE caption LIKE ?';\n    ```\n\n4.  Before passing the user-submitted\
    \ search term to the `bind_param()` method,\n    you need to add the wildcard\
    \ characters to it and assign it to a new\n    variable, like this:\n\n```\n \
    \   $searchterm = '%'. $_GET['search'] .'%';\n    ```\n\n5.  You can now create\
    \ the prepared statement. The finished code in the PHP\n    block above the `DOCTYPE`\
    \ declaration\n    looks like this:\n\n```\n    if (isset($_GET['go'])) {\n  \
    \  require_once '../includes/connection.inc.php';\n    $conn = dbConnect('read');\n\
    \    $sql = 'SELECT image_id, filename, caption FROM images\n    WHERE caption\
    \ LIKE ?';\n    $searchterm = '%'. $_GET['search'] .'%';\n    $stmt = $conn->stmt_init();\n\
    \    if ($stmt->prepare($sql)) {\n    $stmt->bind_param('s', $searchterm);\n \
    \   $stmt->execute();\n    $stmt->bind_result($image_id, $filename, $caption);\n\
    \    $stmt->store_result();\n    $numRows = $stmt->num_rows;\n    } else {\n \
    \   $error = $stmt->error;\n    }\n    }\n    ```\n\nThis initializes the prepared\
    \ statement and assigns it to `$stmt`. The SQL query\n    is then passed to the\
    \ `prepare()` method , which checks the\n    validity of the query’s syntax. If\
    \ there’s a problem with the syntax,\n    the `else` block\n    assigns the error\
    \ message to `$error`. If there are\n    no mistakes in the syntax, the rest of\
    \ the script inside the conditional\n    statement is executed.\n\nThe first line\
    \ inside the conditional statement binds `$searchterm` to the\n    `SELECT` query,\n\
    \    replacing the question mark placeholder. The first argument tells the\n \
    \   prepared statement to treat it as a string.\n\nAfter the prepared statement\
    \ is executed, the next line binds the\n    results of the `SELECT` query to `$image_id`,\
    \ `$filename`, and `$caption`. These need\n    to be in the same order as in the\
    \ query. I have named the variables\n    after the columns they represent, but\
    \ you can use any variables you\n    want.\n\nThen the result is stored. Note\
    \ that you store the result simply by\n    calling the statement object’s `store_result()`\n\
    \    method . Unlike\n    using `query()`,\n    you don’t assign the return value\
    \ of `store_result()` to a\n    variable. If you do, it’s simply `true` or `false`,\
    \ depending on\n    whether the result was stored successfully.\n\nFinally, the\
    \ number of rows retrieved by the query is obtained from\n    the statement object’s\
    \ `num_rows` property and\n    stored in `$numRows`.\n\n6.  Add a conditional\
    \ statement after the opening `<body>` tag to\n    display the error message if\
    \ a problem has occurred:\n\n```\n    $error\";\n    }\n    ?>\n    ```\n\n7.\
    \  Add the following code after the search form to display the result:\n\n```\n\
    \    Number of results for :\n\nimage_id\n    filename\n    caption\n\nfetch())\
    \ { ?>\n\n```\n\nThe first conditional statement is wrapped around the paragraph\
    \ and\n    table, preventing them from being displayed if `$numRows` doesn’t\n\
    \    exist, which happens when the page is first loaded. If the form has been\n\
    \    submitted, `$numRows` will have\n    been set, so the search term is redisplayed,\
    \ and the value of `$numRows` reports the\n    number of matches.\n\nIf the query\
    \ returns no results, `$numRows` is 0, which\n    is treated as `false`, so the\
    \ table\n    is not displayed. If `$numRows` contains\n    anything other than\
    \ 0, the table is displayed. The `while` loop that\n    displays the results \
    \ calls the `fetch()` method on the\n    prepared statement. There’s no need to\
    \ store the current record as `$row`, because the\n    values from each column\
    \ have been bound to `$image_id`, `$filename`, and `$caption`.\n\n8.  Save the\
    \ page and load it into a browser. Enter some text in the\n    search field and\
    \ click `Search`. The number of\n    results is displayed together with any captions\
    \ that contain the search\n    term, as shown in the following screenshot:\n\n\
    ![../images/332054_4_En_13_Chapter/332054_4_En_13_Figo_HTML.jpg](images/332054_4_En_13_Chapter/332054_4_En_13_Figo_HTML.jpg)\n\
    You can compare your code with `mysqli_prepared_02.php`\nin the `ch13`\nfolder.\n\
    \nEmbedding variables in PDO Prepared Statements\nPDO prepared statements offer\
    \ the choice of anonymous and named\nplaceholders.\n\nUsing Anonymous Placeholders\n\
    \nAnonymous\nplaceholders use question marks in exactly the same way as\nMySQLi:\n\
    \n```\n$sql = 'SELECT image_id, filename, caption FROM images WHERE caption LIKE\
    \ ?';\n```\n\nUsing Named Placeholders\n\nNamed\nplaceholders begin with a colon,\
    \ like this:"
