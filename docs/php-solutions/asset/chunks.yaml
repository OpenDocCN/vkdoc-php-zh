    Chapter 9 (sessions), Chapter 10 (data types in MySQL/MariaDB), Chapter 11 (PHP
    prepared statements), Chapter 13 (the four essential SQL commands), and Chapter
    14 (working with dates and times).


    So, how easy is easy? I have done my best to ease your path, but there is no magic
    potion. It requires some effort on your part. Don’t attempt to do everything at
    once. Add dynamic features to your site a few at a time. Get to understand how
    they work, and your efforts will be amply rewarded. Adding PHP and MySQL/MariaDB
    to your skills will enable you to build websites that offer much richer content
    and an interactive user experience.'
  trans: "  \n大卫·鲍尔斯（David Powers）撰写了一系列极为成功的网络开发书籍和视频培训课程，尤其专注于 PHP 和网络标准，包括 lynda.com\
    \ 在线培训库中的《PHP 入门》与《PHP 代码诊所》。作为一名专业作家，他涉足电子媒体领域已超过 40 年，最初在 BBC 广播和电视台工作，近年则专注于互联网领域。他清晰的写作风格不仅在英语世界备受推崇——他的多部著作已被翻译成西班牙语、波兰语、中文等多种语言。大卫原本对计算机只有轻微兴趣，但这一切在\
    \ 1987 年几乎一夜之间转变为热忱：当时他被派驻日本担任 BBC 驻东京记者。由于楼道里没有企业 IT 部门，他被迫自学如何亲手修理所有设备。在不摆弄电脑内部构造的时候，他便为\
    \ BBC 电视和广播报道日本泡沫经济的兴起与崩溃。离开 BBC 独立工作后，他曾参与多个项目，包括为一家国际咨询公司的日本客户开发在线双语经济政治分析数据库。此外，他还在牛津布鲁克斯大学教授研究生级别的网络媒体课程。\n\
    \n不敲键盘写书或构思 PHP 及其他编程语言的新用法时，大卫最爱去他钟爱的寿司餐厅。他还翻译过多部日本戏剧。\n\n## 关于技术审校者\n\n保罗·米尔本（Paul\
    \ Milbourne）已在华盛顿-巴尔的摩大都会区担任软件开发人员超过十年。他的职业旅程让他有机会与华盛顿红皮队、巴尔的摩乌鸦队、Zynga 游戏公司等众多客户合作。\n\
    \n大多数情况下，保罗凭借处理突发问题和应对边缘案例而成就了体面的事业。这段经历使他通过多个行业和平台接触到开发的方方面面。\n\n保罗还曾是一名厨师，一位热忱的音乐家，同时也是一名活跃的视觉艺术家。\n\
    \n# 引言\n\n当《PHP 解决方案》第一版出版时，我曾担心副标题“动态网页设计轻而易举”显得过于雄心勃勃。即便是第三版，我仍然有些不安，担心不切实际地提高读者的期望。PHP\
    \ 并不难，但也不像速成蛋糕粉那样：加水搅拌即可。每个网站都各不相同，因此不可能抓来一个脚本，粘贴到网页中就指望它能运行。我的目标是帮助那些对编程所知甚少甚至一无所知的网页设计师，让他们获得信心，能够深入代码并根据自身需求进行调整。\n\
    \n事实上，这本书自 2006 年首次出版以来一直广受欢迎，这表明许多读者接受了这一挑战。波士顿 PHP 社区的成员便大量参与其中：他们将第二版作为三系列\
    \ PHP Percolate（面向初学者的虚拟自学小组）的教材。数百人报名每周研读一章。这套方法对他们有效，因此我希望它同样对你也有效。\n\n## 新版内容\n\
    \n来自 PHP Percolate 参与者及其他读者的一个宝贵反馈是：当我粗略讲解某段高级代码，仅解释其功能而非运作原理时，会令他们感到失望。这个遗漏在本版中已得到纠正。偶尔，我会指出你可能想跳过详细解释，但如果你对某种技术的工作原理感到好奇，相关内容就在那里。因此，第\
    \ 3 章的参考部分已扩展，涵盖了诸如可变变量等深奥内容。不，这不是笔误；“可变变量”是 PHP 中的一个真实概念，而且相当实用。\n\n本版内容已更新至\
    \ 2014 年 8 月发布的 PHP 5.6。由于主机服务商通常升级其所提供 PHP 版本的速度较慢，我已将本书代码的最低版本设为 PHP 5.4。PHP\
    \ 5.4 做出了一些重要变更，引入了简化的数组语法，并移除了对安全模式和“魔术引号”的支持。除了更新代码，我还逐行修订了每一章，澄清了解释。同时，我消除了一些错误——希望没有引入新的错误。\n\
    \n最大的变化在于第 6 章和第 8 章中用于上传文件和创建图像缩略图的自定义类。它们现在使用命名空间来避免与其他第三方代码的命名冲突。更重要的是，类定义已被大规模重写以提高效率。另一个重要变化是在第\
    \ 9 章和第 17 章中使用新的密码哈希函数。这些函数直到 PHP 5.5 才引入，但你可以在 PHP 5.4 中通过将`password_compat`库包含在脚本中来模拟它们。关于如何获取该库（仅由一个文件组成）的详细信息，请参见第\
    \ 9 章。\n\n有关数据库操作的章节已重新组织，使其更易理解。我还加强了对预处理语句的解释，同时使用了 MySQL 改进版（MySQLi）和数据库无关的\
    \ PHP 数据对象（PDO）。某些 Linux 发行版现已安装 MariaDB 作为 MySQL 的直接替代品。为避免不必要地重复，我通常只提及 MySQL，但本书中的所有\
    \ PHP 解决方案同样适用于 MariaDB。\n\n## 本书的组织结构\n\n每一章都会引导你完成一个项目中的一系列阶段，每个阶段都建立在前一个阶段的基础之上。通过逐章学习，你将全面了解各部分如何整合在一起。之后，你可以参考个别阶段来重温某项特定技术。虽然本书并非参考手册，但第\
    \ 3 章是 PHP 语法入门，某些章节也包含简短参考部分——尤其是第 7 章（文件读写）、第 9 章（会话）、第 10 章（MySQL/MariaDB 数据类型）、第\
    \ 11 章（PHP 预处理语句）、第 13 章（四个基本 SQL 命令）以及第 14 章（处理日期和时间）。\n\n那么，“简单”到底有多简单？我已尽力为你铺平道路，但并没有神奇药水。这需要你付出一些努力。不要试图一次性完成所有内容。循序渐进地为你的网站添加动态功能。理解它们如何运作，你的努力将获得丰厚回报。将\
    \ PHP 和 MySQL/MariaDB 加入你的技能库，将使你能够构建提供更丰富内容和交互式用户体验的网站。  \n"
- fmt: '# Using the Example Files


    All the files necessary for working through this book can be downloaded from the
    Apress website at [`www.apress.com/9781484206362`](http://www.apress.com/9781484206362).
    Make sure you select the download link for *PHP Solutions: Dynamic Web Design
    Made Easy, Third Edition*. The code is different from the first two editions.


    Set up a PHP development environment, as described in Chapter 2. Unzip the files
    and copy the `phpsols` folder and all its contents into your web server’s document
    root. The code for each chapter is in a folder named after the chapter: `ch01`,
    `ch02`, and so on. Follow the instructions in each PHP solution, and copy the
    relevant files to the site root or the work folder indicated.


    Where a page undergoes several changes during a chapter, I have numbered the different
    versions like this: `index_01.php`, `index_02.php`, and so on. When copying a
    file that has a number, remove the underscore and number from the filename, so
    `index_01.php` becomes `index.php`. If you are using a program like Dreamweaver
    that prompts you to update links when moving files from one folder to another,
    do not update them. The links in the files are designed to pick up the right images
    and style sheets when located in the target folder. I have done this so you can
    use a file comparison utility to check your files against mine.


    If you don’t have a file comparison utility, I strongly urge you to install one.
    It will save you hours of head scratching when trying to spot the difference between
    your version and mine. A missing semicolon or mistyped variable can be hard to
    spot in dozens of lines of code. Windows users can download WinMerge for free
    from [`http://winmerge.org/`](http://winmerge.org/). I use Beyond Compare ([`www.scootersoftware.com`](http://www.scootersoftware.com/)),
    which is now available for Windows, Mac OS X, and Linux. It’s not free but is
    excellent and reasonably priced. BBEdit on a Mac includes a file comparison utility.
    Alternatively, use the file comparison feature in TextWrangler, which can be downloaded
    free from [`www.barebones.com/products/textwrangler/`](http://www.barebones.com/products/textwrangler/).


    # Layout Conventions


    To keep this book as clear and easy to follow as possible, the following text
    conventions are used throughout:


    * Important words or concepts are normally highlighted on the first appearance
    in bold type.

    * Code is presented in `fixed-width font`.

    * New or changed code is normally presented in **bold** `fixed-width font`.

    * Pseudo-code and variable input are written in *italic* `fixed-width font`.

    * Menu commands are written in the form Menu ➤ Submenu ➤ Submenu.

    * Where I want to draw your attention to something, I’ve highlighted it, like
    this:


    Ahem, don’t say I didn’t warn you.


    # Acknowledgments


    The original idea to write *PHP Solutions* came from Chris Mills, my editor for
    many years at Apress/friends of ED, who’s now a Senior Technical Writer at Mozilla
    Corporation and a passionate advocate of web standards. Chris wanted to move away
    from the cookbook formula of isolated solutions that left the reader with little
    or no idea about the practical use of a particular technique. The fact that this
    book is now in its third edition proves what a great idea it was. Thanks, Chris.


    Chris’s successor as editor of the second and third editions, Ben Renow-Clarke,
    followed his example by giving me free rein to shape the book according to my
    own ideas, but always putting himself in the position of the reader, nudging me
    in the right direction when an explanation wasn’t clear enough or a chapter was
    badly organized.


    I’m also grateful to my technical reviewers: Samuel Wright for the first edition,
    Kristian Besley and Jason Nadon for the second edition, and Paul Milbourne for
    this edition. Each edition has built on the previous one, so ideas and suggestions
    made by reviewers of previous editions live on in this one.


    Producing a book like this would be impossible without the diligent help of everyone
    in the production chain at Apress. My thanks go to them all.


    Most of all, my thanks go to the readers who have made this book such a success.
    Welcome to the club. I hope you enjoy this book and find it useful in building
    dynamic websites with PHP.'
