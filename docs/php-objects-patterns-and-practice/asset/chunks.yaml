- fmt: '### The Problem


    Think back to the Composite example from the previous chapter. For a game, I created
    an army of components such that the whole and its parts can be treated interchangeably.
    You saw that operations can be built into components. Typically, leaf objects
    perform an operation and composite objects call on their children to perform the
    operation:


    ```

    // listing 11.35

    class Army extends CompositeUnit

    {

    public function bombardStrength(): int

    {

    $strength = 0;

    foreach ($this->units() as $unit) {

    $strength += $unit->bombardStrength();

    }

    return $strength;

    }

    }

    // listing 11.36

    class LaserCanonUnit extends Unit

    {

    public function bombardStrength(): int

    {

    return 44;

    }

    }

    ```


    Where this operation is integral to the responsibility of the composite class,
    there is no problem. There are more peripheral tasks, however, that may not sit
    so happily on the interface.


    Here’s an operation that dumps textual information about leaf nodes. It could
    be added to the abstract `Unit` class:


    ```

    // listing 11.37

    abstract class Unit

    {

    // ...

    public function textDump($num = 0): string

    {

    $txtout = "";

    $pad = 4*$num;

    $txtout .= sprintf("%{$pad}s", "");

    $txtout .= get_class($this).": ";

    $txtout .= "bombard: ".$this->bombardStrength()."\n";

    return $txtout;

    }

    // ...

    }

    ```


    This method can then be overridden in the `CompositeUnit` class:


    ```

    // listing 11.38

    abstract class CompositeUnit extends Unit

    {

    // ...

    public function textDump($num = 0): string

    {

    $txtout = parent::textDump($num);

    foreach ($this->units as $unit) {

    $txtout .= $unit->textDump($num + 1);

    }

    return $txtout;

    }

    }

    ```


    I could go on to create methods for counting the number of units in the tree,
    for saving components to a database, and for calculating the food units consumed
    by an army.


    Why would I want to include these methods in the composite’s interface? There
    is only one really compelling answer. I include these disparate operations here
    because this is where an operation can gain easy access to related nodes in the
    composite structure.


    Although it is true that ease of traversal is part of the Composite pattern, it
    does not follow that every operation that needs to traverse the tree should therefore
    claim a place in the Composite’s interface.


    So these are the forces at work: I want to take full advantage of the easy traversal
    afforded by my object structure, but I want to do this without bloating the interface.


    ### Implementation


    I’ll begin with the interfaces. In the abstract `Unit` class, I define an `accept()`
    method:


    ```

    // listing 11.39

    abstract class Unit

    {

    // ...

    public function accept(ArmyVisitor $visitor)

    {

    $refthis = new \ReflectionClass(get_class($this));

    $method = "visit".$refthis->getShortName();

    $visitor->$method($this);

    }

    protected function setDepth($depth)

    {

    $this->depth=$depth;

    }

    public function getDepth()

    {

    return $this->depth;

    }

    }

    ```


    As you can see, the `accept()` method expects an `ArmyVisitor` object to be passed
    to it. PHP allows you dynamically to define the method on the `ArmyVisitor` you
    wish to call, so I construct a method name based on the name of the current class
    and `invoke that` method on the provided `ArmyVisitor` object. If the current
    class is `Army`, then I invoke `ArmyVisitor::visitArmy()`. If the current class
    is `TroopCarrier`, then I invoke `ArmyVisitor::visitTroopCarrier()`. And so on.
    This saves me from implementing `accept()` on every leaf node in my class hierarchy.
    While I was in the area, I also added two methods of convenience: `getDepth()`
    and `setDepth()`. These can be used to store and retrieve the depth of a unit
    in a tree. `setDepth()` is invoked by the unit’s parent when it adds it to the
    tree from `CompositeUnit::addUnit()`:


    ```

    // listing 11.40

    abstract class CompositeUnit extends Unit

    {

    // ...

    public function addUnit(Unit $unit)

    {

    foreach ($this->units as $thisunit) {

    if ($unit === $thisunit) {

    return;

    }

    }

    $unit->setDepth($this->depth+1);

    $this->units[] = $unit;

    }

    public function accept(ArmyVisitor $visitor)

    {

    parent::accept($visitor);

    foreach ($this->units as $thisunit) {

    $thisunit->accept($visitor);

    }

    }

    }

    ```


    I included an `accept()` method in this fragment. This calls `Unit::accept()`
    to invoke the relevant `visit()` method on the provided `ArmyVisitor` object.
    Then it loops through any child objects calling `accept()`. In fact, because `accept()`
    overrides its parent operation, the `accept()` method allows me to do two things:


    - Invoke the correct visitor method for the current component

    - Pass the visitor object to all the current element children via the `accept()`
    method (assuming the current component is composite)


    I have yet to define the interface for `ArmyVisitor`. The `accept()` methods should
    give you some clue. The visitor class will define `accept()` methods for each
    of the concrete classes in the class hierarchy. This allows me to provide different
    functionality for different objects. In my version of this class, I also define
    a default `visit()` method that is automatically called if implementing classes
    choose not to provide specific handling for particular `Unit` classes:


    ```

    // listing 11.41

    abstract class ArmyVisitor

    {

    abstract public function visit(Unit $node);

    public function visitArcher(Archer $node)

    {

    $this->visit($node);

    }

    public function visitCavalry(Cavalry $node)

    {

    $this->visit($node);

    }

    public function visitLaserCanonUnit(LaserCanonUnit $node)

    {

    $this->visit($node);

    }

    public function visitTroopCarrierUnit(TroopCarrierUnit $node)

    {

    $this->visit($node);

    }

    public function visitArmy(Army $node)

    {

    $this->visit($node);

    }

    }

    ```


    So now it’s just a matter of providing implementations of `ArmyVisitor`, and I
    am ready to go. Here is the simple text dump code reimplemented as an `ArmyVisitor`
    object:


    ```

    // listing 11.42

    class TextDumpArmyVisitor extends ArmyVisitor

    {

    private $text = "";

    public function visit(Unit $node)

    {

    $txt = "";

    $pad = 4*$node->getDepth();

    $txt .= sprintf("%{$pad}s", "");

    $txt .= get_class($node).": ";

    $txt .= "bombard: ".$node->bombardStrength()."\n";

    $this->text .= $txt;

    }

    public function getText()

    {

    return $this->text;

    }

    }

    ```


    Let’s look at some client code, and then walk through the whole process:'
