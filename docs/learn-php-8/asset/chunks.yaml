  trans: "\n# 接口层、业务规则层和数据层\n\n接口层包含`lab.html`文件和`dog_interface.php`程序。业务规则层包括`dog.php`类和`get_breeds`类。`dog_data`类位于数据层。来自`dog_interface`程序与业务规则层通信的任何请求都由`dog_container`类处理。来自业务规则层与数据层通信的任何请求也由`dog_container`类处理。对数据层的访问只能通过业务规则层进行。对接口层的访问也只能通过业务规则层进行。\n\
    \n接口层不知道业务规则层中任何类或方法的位置/名称。这些信息通过使用`dog_container`来发现。业务规则层不知道数据层中任何类或方法的位置/名称。这些信息也通过使用`dog_container`来发现。这使得每一层完全独立，从而允许在一层中进行更改而不需要在其他两层中进行更改。\n\
    \n## 动手实践\n\n1. 从本章下载`dog`应用程序的所有文件。调整`dog_application` XML 文件中的文件名，以了解应用程序如何处理丢失的文件。应用程序是否正确处理了这些问题？调整`dog_data`\
    \ XML 文件以包含格式错误的 XML 数据。运行应用程序。它是否正确处理了这些问题？清空`dog_data` XML 文件（除了`dogs`和`dog`标签）。运行应用程序。它是否正确处理了这种情况？对于任何导致应用程序报错而不是引发异常的情况，尝试调整代码以预测问题并引发异常。\n\
    \n## 本章术语\n\n| 数据层 | `file_get_contents` |\n| --- | --- |\n| `SimpleXML`数据模型 |\
    \ `simplexml:load_string` |\n| 类型转换 | JSON 数据 |\n| JSON 方法 | 关联数组 |\n| `json_encode`\
    \ | `json_decode` |\n| 关键字 | `new line character` |\n| `file_put_contents` | `libxml:user_internal_errors(true)`\
    \ |\n| `libxml:get_errors` | `Count` |\n| `$this` | `Unset` |\n| 动态数组 | 释放对象 |\n\
    | `mysqli_connect` | `mysqli_connect_errno` |\n| `mysqli_fetch_assoc` | `mysqli_free_result`\
    \ |\n| `mysqli_close` | `SQL SELECT` |\n| `SQL INSERT` | 多态性 |\n| 变更日志文件 | `Serialize`\
    \ |\n| `Unserialize` | 备份与恢复 |\n| `preg_replace` | 正则表达式 |\n| `glob` | 嵌入式 if\
    \ then else |\n| `SQL UPDATE` | SQL 脚本文件/日志 |\n| `SQL WHERE` | `Rand` |\n| 严格搜索\
    \ | `Unlink` |\n| `shell` | 依赖注入 |\n\n## 本章问题与项目\n\n### 选择题\n\n1. 以下哪项描述了类型转换？\n\
    \   1. 在 PHP 中很少需要。\n   2. 它存在于大多数语言中。\n   3. 序列化数据需要它。\n   4. 以上所有选项。\n\n2. 以下哪项描述了关联数组？\n\
    \   1. 它具有键值关系（key->value）。\n   2. 它使用数字下标。\n   3. 它没有索引。\n   4. A 和 B。\n\n3.\
    \ 以下哪项是换行符？\n   1. &\n   2. .\n   3. ;\n   4. 以上都不是\n\n4. 以下哪项描述了 JSON 数据？\n \
    \  1. 它的格式与数组类似。\n   2. 它不能仅与 JavaScript 一起使用。\n   3. 它比使用 XML 数据需要更多的编码。\n  \
    \ 4. 它比 XML 数据更安全。\n\n5. 以下哪项描述了`unlink`？\n   1. 它可以用来释放数组的一个参数。\n   2. 它可以用来删除文件或目录。\n\
    \   3. 它可以用来拆分数组。\n   4. 以上都不是。\n\n6. 以下哪项描述了多态性？\n   1. 包含和保护应用程序的容器\n   2. 将多种数据类型传递给相同方法签名的能力\n\
    \   3. 使用父类方法和属性的能力\n   4. 以上都不是\n\n7. 以下哪项描述了`rand`？\n   1. 它可以用来生成随机数。\n   2.\
    \ 第一个参数是起始数字。\n   3. 第二个参数是结束数字。\n   4. 以上所有选项。\n\n8. 当使用`in_array`时，`strict`搜索执行以下哪项操作？\n\
    \   1. 它比较数据类型。\n   2. 它是第三个参数（设置为`true`）。\n   3. 在搜索关联数组时应使用它。\n   4. 以上所有选项。\n\
    \n9. 以下哪项描述了`shell`方法？\n   1. 它不包含数据。\n   2. 它没有签名。\n   3. 它包含 JSON 数据。\n   4.\
    \ 以上所有选项。\n\n10. 数据层执行以下哪项操作？\n    1. 更新数据\n    2. 返回数据\n    3. 过滤数据\n    4. 以上所有选项\n\
    \n### 判断题\n\n1. 日志文件对于成功恢复信息很重要。\n2. 数据被序列化以将数据类型转换为字符串。\n3. 更新完成后，所有数据备份副本都可以销毁。\n\
    4. 依赖注入对于保持各层（接口层、业务规则层和数据层）相互独立是必要的。\n5. SQL 脚本文件会更新所有记录，包括那些未更改的记录。\n\n### 简答题/论述题\n\
    \n1. 解释用于纠正已损坏数据文件的过程。\n2. 为什么存储在数据库中的数据通常比存储在文本文件中的数据更安全？\n3. 比较和对比用于更新 XML 数据的方法与用于更新\
    \ MySQL 数据的方法。哪一种更高效？为什么？\n4. 在更新数据时，何时应向系统管理员发送电子邮件？这封电子邮件应包含什么？不应包含什么？为什么？\n\
    5. 系统管理员如何确定哪个数据文件是最后一个未损坏的版本？\n\n### 项目\n\n1. 调整第 4 章项目#1 或#2 中的代码，以包含备份和恢复功能。\n\
    2. 为你之前完成的某个项目创建一个完整的存储系统（XML 或 JSON 格式）以及一个备份和恢复系统。该系统应包含用户限制恢复文件数量的功能、调整选定文件内容（更新、插入和删除）的功能，以及针对最新有效数据执行该文件的功能。当过程完成时，任何损坏的文件应自动删除。系统还应保留自己的日志文件以指示何时发生更改。\n\
    \n### 学期项目\n\n1. 更新 ABC 计算机零件库存程序，以包含数据存储（XML 或 JSON 格式）以及完整的备份和恢复功能。应用程序应包含一个变更日志以指示任何数据更改。应包含额外的支持程序，以便轻松恢复任何损坏的数据。你的完整应用程序应使用类似于本章示例所示的逻辑。\n\
    \n# 8. 身份验证\n\n*（致 Lisa）你拥有可以走得很远的智慧和才华，当你做到的时候，我会在那里向你借钱。*\n\n—巴特·辛普森\n\n## 本章目标/学生学习成果\n\
    \n完成本章后，学生将能够：\n\n*   定义会话并解释它们如何用于身份验证\n*   创建一个对用户登录进行身份验证的 PHP 程序\n*   创建一个注册用户的\
    \ PHP 程序\n*   创建一个允许用户更改密码的 PHP 程序\n*   创建一个记录无效登录尝试的 PHP 程序\n*   创建一个使用当前密码哈希技术的\
    \ PHP 程序\n"
- fmt: '# Verification and Sessions


    No discussion of security would be complete without including user ID/password
    authentication. The current version of PHP includes many techniques to assist
    developers in validating users. This chapter looks at one of the more simplistic
    methods.


    Due to the nature of immediate verification of login credentials, the authentication
    process directly accesses the data source for validation (it does not pass through
    the business rules tier). Thus, the authentication process is considered a separate
    tier that is placed on top of the application to provide access. As you will see,
    only minor changes need to occur in the interface tier programs to restrict access.
    Most of the coding needed is placed in the authentication tier.


    In addition to authentication, levels of access can also be determined during
    the sign-in process. Not every user needs full access to an application. Some
    users may only need read access, some may need write access to only the information
    that pertains to them, and some (administrators) may need full access to the complete
    application. Each part of the application needs to be able to determine the correct
    level of access without requesting additional information from the user (beyond
    the original login to the application).


    One login process must allow the users to verify all portions of the application.
    Each portion of the application needs access to common properties (such as user
    ID and password) that have been set by the authentication tier for verification
    of valid access and valid levels of access. PHP provides the ability to store
    information for an application in server memory by declaring a *session*. A session
    is considered to include the complete interaction of the user with the application
    (such as the complete processes of transferring money from a saving account to
    a checking account). A session can be established as soon as the user signs into
    the application. The session can be closed after the user logs out of the system
    (or the application times out or is closed). When a session is closed, all properties
    stored in the memory of the server are removed by the garbage collector.


    While the session is active, properties can be stored and shared throughout the
    application. Using this process, the user ID and password can be stored in session
    properties. Each part of the application can then verify that the user has logged
    in by determining if there are values in the `userid` and `password` properties.


    Before you look at the login authentication process, let us look at how to determine
    if a user has logged into the system. The examples in this chapter do not include
    verifications of security access levels. However, the process to determine these
    levels would use similar code as shown in these examples.


    *   *Programming note—The `session_start` method call must be the first statement
    at the top of the code. There must be no spaces or code between the `<?php` tag
    and `session_start`. The `session_start` method produces an HTML header that would
    not be formed correctly if any code exists before the method call.*


    ```

    <?php

    session_start();

    if (!isset($_SESSION[''username'']) || !isset($_SESSION[''password''])) {

    echo "<a href=''login.php''>Login</a> | <a href=''register.php''>Create an account</a>";

    }

    else {

    echo "Welcome back, " . $_SESSION[''username''] . "";

    }

    ?>

    ```


    Each program in the interface tier (that the user can access) would include code
    similar to the previous example. The `session_start` method, in this example,
    lets the operating system know that this program is part of an existing session
    (which is declared in the authentication tier). Each session is identified by
    the system using a uniquely generated ID. As long as the user (or system) has
    not closed the session, the session ID will be attached to any program, called
    by the user, which includes the `session_start` method. This allows the program
    to access all properties related to the current session.


    The PHP `isset` method (in an `if` statement) can determine if values exist in
    the `username` and `password` properties. If values do not exist, it indicates
    that the user has not been authenticated. Session properties are retrieved (and
    set) using `$_SESSION`. In the previous example, if either of the properties is
    not set, the user is provided links to the login page (`login.php`) or the register
    page (`register.php`). If both properties are set, the user is welcomed to the
    system. The user has no choice but to log in to access the program.


    ```

    <?php

    session_start();

    if (!isset($_SESSION[''username'']) || !isset($_SESSION[''password''])) {

    echo "<a href=''login.php''>Login</a> | <a href=''register.php''>Create an account</a>";

    echo "</nav>";

    }

    else

    {

    echo "Welcome back, " . $_SESSION[''username''] . "";

    ?>


    <h1>Dog Object</h1>

    <h2>Dog Object Creator</h2>

    <p>Please complete ALL fields. Please note the required format of information.</p>

    <form>

    <p>Enter Your Dog''s Name (max 20 characters, alphabetic) <input type=''text''
    name=''dog_name''></p>

    <p>Select Your Dog''s Color:

    <select name=''dog_color''>

    <option value=''Brown''>Brown</option>

    <option value=''Black''>Black</option>

    <option value=''Yellow''>Yellow</option>

    <option value=''White''>White</option>

    <option value=''Mixed''>Mixed</option>

    </select>

    </p>

    <p>Enter Your Dog''s Weight (numeric only) <input type=''text'' name=''dog_weight''></p>

    <p><input type=''button'' value=''Create Your Dog'' onclick=''AjaxRequest("e5dog_interface.php");''></p>

    <p>Select Your Dog''s Breed</p>

    </form>


    <?php

    }

    ?>

    ```


    **Example 8-1** — The `lab.php` file with user ID/password verification


    In Example 8-1, the verification code is placed at the top of the program. The
    `else` statement must include all the code to execute if the user is signed into
    the system. Since the code for this program is HTML (and CSS) code, the `if` statement
    must be wrapped around the existing code. The closing bracket(s) of the `else`
    statement is shifted to the bottom of the code (after all HTML tags). PHP allows
    you to close your PHP code (via `?>`) and reopen your PHP code (via `<?php`) as
    many times as required. In this example, the PHP code is closed at the top of
    the program (in the `else` statement) just before the closing bracket. The PHP
    code is then reopened at the bottom of the code to include a single closing bracket,
    which closes the PHP `else` statement. This wraps the `else` statement around
    all the existing code. The users can now only access this section of the code
    if they are logged in.


    Since PHP code is now included in the `lab` program, the file ending must be changed
    from `.html` to `.php`. Otherwise, the server would not execute the PHP code.


    Now let us look at how you can populate the session properties by creating a login
    program. First, let us look at the HTML to request information from the users.


    ```

    <form action="login.php" method="post">

    Username: <input type="text" name="username" pattern=".{8,}" title="Eight or more
    characters">

    Password: <input type="password" name="password" pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
    title="Must contain at least one number and one uppercase and lowercase letter,
    and at least 8 or more characters">

    <input type="submit" value="Login">

    </form>

    ```


    HTML5 does not include a minimum length parameter. However, the `pattern` parameter
    can be used (with regular expressions) to establish a minimum size. In the `username`
    tag in the previous example, the pattern `".{8,}"` requires at least eight characters
    be entered by the users. For password security, a more complicated pattern is
    needed. In the password example, in addition to the minimum requirement of eight
    characters, at least one number (`?=.*\d`), one uppercase letter (`?=.*[A-Z]`),
    and one lowercase letter (`?=.*[a-z]`) are required.


    *   *Security and performance—The HTML filtering provided is used to inform the
    users of any typos that may have occurred. In the login process, you are not storing
    information; you are comparing information to what has already been stored. You
    do not have to be concerned with any possible harmful information being passed
    into the text boxes. Any harmful information would not match the valid information
    that is stored. The user would receive an invalid user ID/password message.*


    ```

    // validate process not shown

    $_SESSION[''username''] = $_POST[''username''];

    $_SESSION[''password''] = $_POST[''password''];

    // Redirect the user to the home page

    header("Location: http://www.asite.com/lab.php");

    ```'
