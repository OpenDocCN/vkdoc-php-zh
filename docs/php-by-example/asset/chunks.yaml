- fmt: '# Including a File in the Program


    Often, there is a need to include some code from another file into a program.
    Next, let’s examine a small example that shows (at an elementary level) how that
    could be done. The main idea is as follows. You describe some function in a file
    and then call it in another. Namely, you create a file called `show.php` with
    the following code.


    Let’s create a file (see Listing [6-11](#613529_1_En_6_Chapter.xhtml#PC24)) in
    the same folder that contains the `show.php` file with the `show()` function code.


    ```

    Listing 6-11

    Including a File in the Program

    ```


    The output of the program is as follows.


    ```

    The output of the program (from Listing 6-11)

    The argument - 123

    ```


    The code begins with the `require_once ''show.php''` command, which imports the
    contents of the `show.php` file into the program. Then, you create the `$val`
    variable and pass it to the `show()` function as an argument. The function is
    called, and a corresponding message appears in the output area.


    ## Summary


    - References provide alternative access to variables. When creating a reference
    to a variable, the variable name preceded by the `&` instruction is assigned to
    the reference. That kind of reference is called the hard one.

    - When using a soft reference, some variable is assigned a string with the name
    of another variable (without the `$` symbol). Adding a second `$` character to
    the name of the first variable allows access to the variable, whose name contains
    the string assigned to the first variable.

    - In addition to variables, you can use constants. The value of a constant cannot
    be changed after the first assignment. Constants can be created using the `define()`
    function or the `const` statement. The `$` symbol is not used in the constant
    names.

    - Functions can use global variables. These are variables that are also available
    outside the scope of the function. In the body of a function, global variables
    are declared using the `global` statement.

    - Functions can use static variables. (The `static` keyword to declare such a
    variable was used.) A static variable is created and gets its initial value the
    first time the function is called. After the function is terminated, the static
    variable is not removed from memory, and the next time the function is called,
    that variable is used again.

    - In some cases, a multiline string is used. If so, a variable is assigned an
    expression that begins with the `<<<` instruction followed by some label. The
    text is entered without quotes in multiple lines. The expression ends with the
    same label and a semicolon. That is the equivalent of a string in double quotes.
    If the first occurrence of the label is enclosed in single quotes, you get an
    analog of a string enclosed in single quotes.

    - A set of functions is designed for working with files. The `fopen()` function
    is used to open a file. The first argument specifies the full path to the file,
    and the second argument specifies the access mode. When the file has been handled,
    it is closed using the `fclose()` function.

    - To import the contents of a file, the `require_once` instruction is added to
    the program, after which you put the string with the name of the imported file.


    # 7. Classes and Objects


    *—As you may have gathered, I’m in big trouble.*

    *—You’re always in trouble.*

    —*ALF* (TV series)


    This chapter discusses how the principles of object-oriented programming (OOP
    for short) are implemented in PHP. Let’s start by introducing the concept of *classes*
    and *objects*. That is the cornerstone of the OOP paradigm, and how the main conceptual
    points are learned will largely determine the success of using the broad features
    of PHP to create OOP projects.


    ## The OOP Principles


    The study of the OOP principles often begins with their enumeration: *encapsulation*,
    *polymorphism*, and *inheritance*. That may sound a little bit scary. However,
    not everything is as scary as it seems at first glance. To understand the concept
    of OOP, it makes sense to clarify what it is and why you need it to create programs.
    The OOP paradigm must imply a certain way of organizing a program. In other words,
    OOP is about how to organize a program. And here, an analogy would help us.


    Let’s say there is a small café with a kitchen, and you need to organize the work
    in the kitchen. The kitchen receives orders from visitors and prepares dishes
    following those orders. If the cafe is not very large and there are not many visitors,
    you need a chef to manage the process for the successful operation of the kitchen.
    You also need to have several assistant chefs. Each assistant chef is responsible
    for preparing a specific dish or dishes. For example, one chef specializes in
    meat dishes, another in fish dishes, the next one prepares salads, someone specializes
    in desserts, and so on. One or more refrigerators can be used to store food, and
    all chefs store products there and use those products to prepare meals. All chefs
    have access to all refrigerators. The distribution of tasks to the assistant chefs
    is the responsibility of the main chef. The main chef also controls the contents
    of the refrigerators: are there all the products, and are their quantities sufficient?


    > **Note:** Even if, in reality, the work of a kitchen is organized differently,
    it does not matter. The example is illustrative; you just need to explain the
    difference in approaches, but not to organize the work of a real kitchen.


    Let’s compare how a kitchen works to how a program works. Assistant chefs are
    analogous to functions, and food stored in the refrigerator is analogous to data.
    The overall goal is to “connect” the data and the “functionality” associated with
    processing that data. In “culinary” language, that means you need to define for
    each assistant chef the functional responsibilities and the products they can
    use in their work.


    Let’s say you make everything right, and the kitchen operates like a clock. What
    can break the situation? One of the main reasons is the expansion of the “enterprise.”
    In a programming language, an increase in the amount of code. Imagine that there
    are a lot of visitors, and the kitchen is huge—lots of assistant chefs, lots of
    refrigerators. Unavoidably, problems will arise due to someone incorrectly taking
    an order, collecting another chef’s products, or dropping out of the process.
    That is a pure scaling problem. It can be solved by changing the structure of
    production. Namely, let’s divide the kitchen into departments. Each department
    has its own specialization. Products in each department are stored in separate
    refrigerators. Each department has its own main chef. That may increase staff
    and overall costs, but it makes the kitchen more reliable since some problems
    are automatically removed due to how the production is organized. For example,
    if the refrigerator is located in the fish department, no one from the meat department
    can access it.


    What is important in this new model? The important thing is that you use a system
    of departments that interact with each other. Previously, in the original scheme,
    individual assistant chefs interacted with each other. As part of the new approach,
    the chefs also interact with each other within the department. At the next level,
    there is an interaction between departments. You can do the same with the program.
    Namely, you can organize it as an interaction of some blocks which contain the
    data and which can process that data. Such blocks are called *objects*. The scheme
    itself describes the paradigm of object-oriented programming (OOP).'
