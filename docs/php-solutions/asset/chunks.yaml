- fmt: '### Linking tables with primary and foreign keys


    Unlike a spreadsheet, most databases store data in several smaller tables, rather
    than in one huge table. This prevents duplication and inconsistency. Let’s say
    you’re building a database of your favorite quotations. Instead of typing out
    the name of the author each time, it’s more efficient to put the authors’ names
    in a separate table, and store a reference to an author’s primary key with each
    quotation. As you can see in Figure [10-3](#A978-1-4842-0635-5_10_Chapter.html#Fig3),
    every record in the left-hand table identified by `author_id 32` is a quotation
    from William Shakespeare.


    ![A978-1-4842-0635-5_10_Fig3_HTML.jpg](A978-1-4842-0635-5_10_Fig3_HTML.jpg)


    Figure 10-3. Foreign keys are used to link information stored in separate tables


    Because the name is stored in only one place, it guarantees that it’s always spelled
    correctly. And if you do make a spelling mistake, just a single correction is
    all that’s needed to ensure that the change is reflected throughout the database.


    Storing a primary key from one table within another table is known as creating
    a foreign key. Using foreign keys to link information in different tables is one
    of the most powerful aspects of a relational database. It can also be difficult
    to grasp in the early stages, so we’ll work with single tables until [Chapters
    15](#A978-1-4842-0635-5_15_Chapter.html) and [16](#A978-1-4842-0635-5_16_Chapter.html),
    which cover foreign keys in detail. In the meantime, bear the following points
    in mind:


    * When used as the primary key of a table, the value must be unique within the
    column. So each `author_id` in the table on the right of Figure [10-3](#A978-1-4842-0635-5_10_Chapter.html#Fig3)
    is used only once.

    * When used as a foreign key, there can be multiple references to the same value.
    So `32` appears several times in the `author_id` column in the table on the left.


    **Tip**


    As long as `author_id` remains unique in the table where it’s the primary key,
    you know that it always refers to the same person.


    ### Breaking down information into small chunks


    You may have noticed that the table on the right in Figure [10-3](#A978-1-4842-0635-5_10_Chapter.html#Fig3)
    has separate columns for each author’s first name and family name. This is an
    important principle of a relational database: break down complex information into
    its component parts, and store each part separately.


    It’s not always easy to decide how far to go with this process. In addition to
    first and last name, you might want separate columns for title (Mr., Mrs., Ms.,
    Dr., and so on) and for middle names or initials. Addresses are best broken down
    into street, town, county, state, zip code, and so on. Although it may be a nuisance
    to break down information into small chunks, you can always use SQL and/or PHP
    to join them together again. However, once you have more than a handful of records,
    it’s a major undertaking to try to separate complex information that is stored
    in a single field.


    ### Checkpoints for good database design


    There is no right way to design a database—each one is different. However, the
    following guidelines should point you in the right direction:


    * Give each record in a table a unique identifier (primary key).

    * Put each group of associated data in a table of its own.

    * Cross-reference related information by using the primary key from one table
    as the foreign key in other tables.

    * Store only one item of information in each field.

    * Stay DRY (don’t repeat yourself).


    In the early stages you are likely to make design mistakes that you later come
    to regret. Try to anticipate future needs, and make your table structure flexible.
    You can add new tables at any time to respond to new requirements.


    That’s enough theory for the moment. Let’s move on to something more practical
    by building a database for the Japan Journey website from [Chapters 4](#A978-1-4842-0635-5_4_Chapter.html)
    and [5](#A978-1-4842-0635-5_5_Chapter.html).


    ## Using a Graphical Interface


    The traditional way to interact with MySQL databases is through a Command Prompt
    window or Terminal. But it’s a lot easier to use a third-party graphic interface,
    such as phpMyAdmin, a browser-based front end to MySQL (see Figure [10-4](#A978-1-4842-0635-5_10_Chapter.html#Fig4)).


    ![A978-1-4842-0635-5_10_Fig4_HTML.jpg](A978-1-4842-0635-5_10_Fig4_HTML.jpg)


    Figure 10-4. phpMyAdmin is a free graphical interface to MySQL that runs in your
    browser


    Because phpMyAdmin ([`www.phpmyadmin.net`](http://www.phpmyadmin.net/)) is installed
    automatically with XAMPP, MAMP, and most other free all-in-one packages, it’s
    the UI chosen for this book. It’s easy to use and has all the basic functionality
    required for setting up and administering MySQL databases. It works on Windows,
    Mac OS X, and Linux. Many hosting companies provide it as the standard interface
    to MySQL.


    If you work with databases on a regular basis, you may want to eventually explore
    the other graphical interfaces. One that’s worthy of note is Navicat ([`www.navicat.com`](http://www.navicat.com/)),
    a paid-for product available for Windows, Mac OS X, and Linux. The Navicat Cloud
    service also lets you administer databases from an iPhone or iPad. Navicat is
    particularly popular among web developers because it’s capable of performing scheduled
    backups of databases from a remote server to your local computer. It also helps
    you build SQL queries in a visual and intuitive manner (see Figure [10-5](#A978-1-4842-0635-5_10_Chapter.html#Fig5)).


    ![A978-1-4842-0635-5_10_Fig5_HTML.jpg](A978-1-4842-0635-5_10_Fig5_HTML.jpg)


    Figure 10-5. Navicat is one of the most popular graphical UIs for MySQL


    **Note**


    There are separate versions of Navicat for MySQL and MariaDB, but the MySQL version
    also supports MariaDB.


    ### Launching phpMyAdmin


    If you’re running XAMPP on Windows, there are three ways to launch phpMyAdmin:


    * Enter `http://localhost/phpMyAdmin/` in the browser address bar.

    * Click the MySQL Admin button in the XAMPP Control Panel.

    * Click the phpMyAdmin link under Tools in the XAMPP administration page (`http://localhost/xampp/`).


    If you installed MAMP on Mac OS X, click the phpMyAdmin tab in the menu at the
    top of the MAMP start page (click Open start page in the MAMP control widget).


    If you installed phpMyAdmin manually or are using a different all-in-one package,
    follow the package’s instructions or enter the appropriate address in your browser
    address bar (normally `http://localhost/phpmyadmin/`).


    **Tip**


    If you get a message saying that the server is not responding or that the socket
    is not correctly configured, make sure that the MySQL server is running.


    If you installed XAMPP, you might be presented with a screen asking for a username
    and password. If so, log into phpMyAdmin as the root superuser. Enter `root` as
    the username and use the password you created for root when setting up XAMPP.


    ## Setting Up the phpsols Database


    In a local testing environment, there’s no limit to the number of databases that
    you can create in MySQL, and you can call them whatever you like. I am going to
    assume that you are working in a local testing environment and so will show you
    how to set up a database called `phpsols`, together with two user accounts called
    `psread` and `pswrite`.


    **Note**


    On shared hosting, you may be limited to just one database set up by the hosting
    company. If you’re testing on a remote server and don’t have the freedom to set
    up a new database and user accounts, substitute the name and username allocated
    by your hosting company for `phpsols` and `pswrite`, respectively.'
