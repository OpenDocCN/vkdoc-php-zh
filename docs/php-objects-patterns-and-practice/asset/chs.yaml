  \ Andi Gutmans。`PHP 3` 是对 `PHP/FI 2.0` 的完全重写，但对象并未被视为新语法中必要的一部分。\n\n据 Zeev Suraski\
  \ 称，对类的支持几乎是作为事后补充才加入的（准确地说，是在 1997 年 8 月 27 日）。类和对象实际上只是定义和访问关联数组的另一种方式。\n\n当然，方法和继承的加入使得类不仅仅是美化了的关联数组，但你能对类进行的操作仍然存在严重限制。特别是，你无法访问父类中被覆盖的方法（如果你还不明白这意味着什么，不必担心；我会在后面解释）。下一节中我将探讨的另一个不利因素是，`PHP`\
  \ 脚本中对象传递方式的低效。\n\n对象在当时只是一个边缘问题，这一点在官方文档中它们缺乏突出地位得到了强调。手册只用了一句话和一个代码示例来介绍对象。该示例并未说明继承或属性。\n\
  \n\n\n### PHP 4 与悄然发生的革命\n\n如果说 PHP 4 是这门语言的又一次突破性进展，那么其核心变化大多是在表面之下发生的。Zend 引擎（其名称源自\
  \ Zeev 和 Andi 的名字）是从零开始编写，为这门语言提供动力的。Zend 引擎是驱动 PHP 的主要组件之一。任何你可能调用的 PHP 函数，实际上都属于高级扩展层的一部分。这些函数执行它们被命名的繁重工作，例如与数据库\
  \ API 通信或为你处理字符串。在此之下，Zend 引擎管理内存、将控制权委托给其他组件，并把你每天使用的熟悉 PHP 语法翻译成可执行的字节码。正是得益于\
  \ Zend 引擎，我们才拥有了诸如类这样的核心语言特性。\n\n从客观角度来看，PHP 4 使得覆盖父类方法并从子类中访问它们成为可能，这是一个重大的优势。\n\
  \n然而，一个主要缺陷依然存在。将一个对象赋值给一个变量、将其传递给函数或从方法中返回它，都会导致创建该对象的一个副本。考虑像这样的赋值：\n\n```\n$my_obj\
  \ = new User('bob');\n$other = $my_obj;\n```\n\n这会导致存在两个 `User` 对象，而不是两个指向同一个 `User`\
  \ 对象的引用。在大多数的面向对象语言中，你会期望通过引用而不是值来进行赋值。这意味着你将传递和赋值指向对象的句柄，而不是复制对象本身。这种默认的传值行为导致了许多难以发现的错误，因为程序员会在脚本的一个部分无意中修改对象，却期望这些更改能通过其他地方的引用被看到。在本书中，你将看到许多我维护对同一个对象的多个引用的例子。\n\
  \n幸运的是，有一种方法可以强制使用传引用，但这意味着需要记住使用一种笨拙的构造方式。\n\n以下是你通过引用进行赋值的方式：\n\n```\n$other =&\
  \ $my_obj;\n// $other 和 $my_obj 指向同一个对象\n```\n\n以下是强制传引用的方式：\n\n```\nfunction setSchool(&\
  \ $school)\n{\n// $school 现在是对传递进来对象的引用，而非副本\n}\n```\n\n以下是通过引用返回的方式：\n\n```\nfunction\
  \ & getSchool()\n{\n// 返回一个引用而非副本\nreturn $this->school;\n}\n```\n\n尽管这可以正常工作，但很容易忘记添加\
  \ & 符号（`&`），而这意味着面向对象代码中很容易潜藏错误。这类错误尤其难以追踪，因为它们很少导致任何报告的错误，只会导致看似合理但行为异常的结果。\n\n\
  PHP 手册中扩展了对语法（尤其是对象）的覆盖，面向对象编程开始逐渐成为主流。PHP 中的对象并非毫无争议（毫无疑问，当时和现在都是如此），像“我需要对象吗？”这样的帖子在邮件列表中经常成为引战话题。事实上，Zend\
  \ 网站既刊登鼓励面向对象编程的文章，也刊发提出警告的文章。尽管存在传引用问题和争议，许多程序员还是继续在他们的代码中大量使用 & 符号。面向对象的 PHP 越来越受欢迎。Zeev\
  \ Suraski 在 DevX.com（ [`http://www.devx.com/webdev/Article/10007/0/page/1`](http://www.devx.com/webdev/Article/10007/0/page/1)\
  \ ）的一篇文章中写道：\n\n> PHP 历史上最大的转折之一在于，尽管功能非常有限，并且存在一堆问题和局限性，面向对象的 PHP 编程仍然蓬勃发展，并成为日益增长的现成\
  \ PHP 应用程序中最流行的范式。这一在很大程度上出乎意料的趋势，让 PHP 陷入了一种次优的境地。很明显，对象在 PHP 中的行为与其他面向对象语言中的对象不同，而更像是[关联]数组。\n\
  \n如前一章所述，面向对象设计的兴趣在在线网站和文章中变得显而易见。PHP 的官方软件仓库 PEAR 本身就采用了面向对象编程。事后看来，人们很容易认为 PHP\
  \ 采用面向对象支持是对不可抗拒的潮流的勉强让步。重要的是要记住，尽管面向对象编程自 20 世纪 60 年代就已存在，但它真正取得进展是在 20 世纪 90 年代中期。伟大的普及者\
  \ Java 直到 1995 年才发布。而作为过程式语言 C 的超集，C++ 自 1979 年就已存在。经过漫长的演变，可以说它在 20 世纪 90 年代才实现重大飞跃。Perl\
  \ 5 于 1994 年发布，这是另一种最初的过程式语言中的革命，使其用户能够以对象的方式思考（尽管有些人认为 Perl 的面向对象支持也感觉像是事后添加的内容）。对于一个小的过程式语言来说，PHP\
  \ 发展其对象支持的速度非常快，显示出对用户需求的真正响应能力。\n\n### 拥抱变革：PHP 5\n\nPHP 5 明确表达了对对象和面向对象编程的认可。这并不是说对象是使用\
  \ PHP 的唯一方式（顺便说一句，本书也不是这个意思）。然而，对象被视为开发企业系统的强大且重要的手段，并且 PHP 在其核心设计中完全支持它们。\n\n可以说，PHP\
  \ 5 增强功能的一个显著影响是大型互联网公司开始采用这门语言。例如，雅虎和 Facebook 都开始在其平台上广泛使用 PHP。有了版本 5，PHP 成为了互联网上开发和企业级应用的标准语言之一。\n\
  \n对象已从事后添加的功能转变为语言的驱动力。也许最重要的变化是默认的传引用行为，它取代了糟糕的对象复制问题。然而，这仅仅是个开始。在本书中，尤其是在本部分中，我们将遇到更多的增强功能，包括私有和受保护的方法与属性、`static`\
  \ 关键字、命名空间、类型提示（现在称为类型声明）以及异常。PHP 5 存在了很长一段时间（大约十二年），重要的新功能是逐步发布的。\n\n例如，PHP 5.3\
  \ 引入了命名空间。这让你可以为类和函数创建一个命名作用域，这样在包含库和扩展系统时，你就不太可能遇到名称重复的问题。它们还能将你从丑陋但必要的命名约定（例如以下形式）中解救出来：\n\
  \n```\nclass megaquiz_util_Conf\n{\n}\n```\n\n像这样的类名是防止包之间冲突的一种方法，但它们可能导致代码变得冗长繁琐。\n\
  \n我们还看到了对闭包、生成器、特质以及后期静态绑定的支持。\n\n\n\n```markdown\n### PHP 7：缩小差距\n\n程序员是一个要求苛刻的群体。对于许多设计模式的爱好者来说，PHP\
  \ 仍然缺少两个关键特性：标量类型声明和强制返回类型。在 PHP 5 中，可以强制指定传递给函数或方法的参数类型，但仅限于要求传入对象、数组或可调用代码（后来才支持）。标量值（如整型、字符串和浮点数）完全无法被强制指定。此外，如果你想声明方法或函数的返回类型，那也完全是异想天开。\n\
  \n你将看到，面向对象设计通常使用方法声明作为一种契约。方法要求特定的输入，并相应承诺返回特定类型的数据。在许多情况下，PHP 5 程序员不得不依赖注释、约定和手动类型检查来维护此类契约。开发者与评论者经常对此颇有微词。以下是本书前一版中的一段引文：\n\
  \n> ……仍然没有承诺支持提示返回类型。这将允许你在方法或函数的声明中指定其返回的对象类型，并由 PHP 引擎强制执行。提示返回类型将进一步改善 PHP 对模式原则（例如“针对接口编程，而非针对实现”）的支持。我希望有一天能修订本书来涵盖这个特性！\n\
  \n我很高兴地写道，这一天终于来临了！PHP 7 引入了标量类型声明（以前称为类型提示）和返回类型声明，你将在本版中看到它们被广泛使用。\n\nPHP 7 还提供了其他锦上添花的功能，包括匿名类和一些命名空间增强。\n\
  \n## 倡导与不可知论：对象的争论\n\n对象和面向对象设计似乎总能激起热情两极分化的争论。许多优秀的程序员多年来不使用对象也写出了优秀的代码，PHP 仍然是过程化\
  \ Web 编程的绝佳平台。\n\n本书自然通篇展现出面向对象的倾向，这种倾向反映了我被对象“感染”的观点。因为本书是对对象的颂扬，也是对面向对象设计的介绍，所以重点毫不掩饰地放在面向对象上，这也是不可避免的。然而，本书的任何内容都无意暗示对象是使用\
  \ PHP 成功编码的唯一正确途径。\n\n开发者是否选择将 PHP 作为面向对象语言来使用，曾经纯粹是个人偏好问题。这种说法在一定程度上仍然成立：人们可以使用函数和全局代码创建完全可接受的工作系统。一些出色的工具（例如\
  \ WordPress）在其底层架构中仍然是过程化的（尽管如今它们也可能大量使用对象）。然而，作为一名 PHP 程序员，如果不使用和理解 PHP 对对象的支持，工作将变得越来越困难，尤其是因为你在项目中可能依赖的第三方库本身很可能就是面向对象的。\n\
  \n尽管如此，在阅读时，还是值得记住著名的 Perl 格言：“条条大路通罗马。” 这对于较小的脚本尤其如此，在这种情况下，快速得到可运行的示例比构建一个能够良好扩展至更大系统的结构更为重要（这类临时项目通常被称为“尖峰”）。\n\
  \n代码是一种灵活的媒介。关键在于，要知道你的快速概念验证何时正成为更大项目的根基，并在代码的庞大重量替你做出持久的设计决策之前及时叫停。现在你已经决定为你不断增长的项目采用面向设计的方法，我希望本书能为你开始构建面向对象架构提供所需的帮助。\n\
  \n## 小结\n\n这一简短的章节将对象置于它们在 PHP 语言中的上下文环境中。PHP 的未来在很大程度上与面向对象设计紧密相连。在接下来的几章中，我将介绍\
  \ PHP 当前对对象特性的支持情况，并引入一些设计问题。\n\n# 3. 对象基础\n\n对象和类是本书的核心，并且自十多年前 PHP 5 引入以来，它们也一直是\
  \ PHP 的核心。在本章中，我通过探讨 PHP 的核心面向对象特性，为更深入地介绍对象和设计奠定基础。如果你不熟悉面向对象编程，请仔细阅读本章。\n\n本章将涵盖以下主题：\n\
  \n- 类和对象：声明类与实例化对象\n- 构造方法：自动化对象的设置\n- 基本类型与类类型：为什么类型很重要\n- 继承：为什么需要继承以及如何使用它\n\
  - 可见性：精简你的对象接口，保护你的方法和属性免受干扰\n\n## 类和对象\n\n理解面向对象编程的第一个障碍是类与对象之间奇妙而特殊的关系。对许多人来说，正是这种关系代表了第一次启示，第一次面向对象的兴奋感。所以，让我们不要在基础上吝啬笔墨。\n\
  \n### 第一个类\n\n类通常用对象来描述。这很有趣，因为对象又通常用类来描述。这种循环性可能会让面向对象编程的第一步变得艰难。因为是类塑造了对象，所以我们应该从定义类开始。\n\
  \n简而言之，类是用来生成一个或多个对象的代码模板。你可以使用 `class` 关键字和任意的类名来声明类。类名可以是数字和字母的任意组合，但不得以数字开头。与类关联的代码必须用大括号括起来。这里我将这些元素组合起来构建一个类：\n\
  \n```\n// 代码清单 03.01\nclass ShopProduct\n{\n// 类主体\n}\n```\n\n示例中的 `ShopProduct`\
  \ 类已经是一个合法的类，尽管它目前还不太有用。然而，我已经做了一件相当重要的事情：我定义了一个类型；也就是说，我创建了一个可以在脚本中使用的数据类别。随着你阅读本章，这种能力的重要性将变得更加清晰。\n\
  ```\n\n\n### 第一个（或两个）对象\n\n如果说类是生成对象的模板，那么对象就是根据类中定义的模板结构化的数据。对象被称为其类的实例，其类型由该类定义。\n\
  \n我将使用 `ShopProduct` 类作为模具来生成 `ShopProduct` 对象。为此，我需要使用 `new` 运算符。`new` 运算符与类名配合使用，示例如下：\n\
  \n```\n// listing 03.02\n$product1 = new ShopProduct();\n$product2 = new ShopProduct();\n\
  ```\n\n`new` 运算符以类名作为唯一操作数，并返回该类的一个实例；在我们的示例中，它生成了一个 `ShopProduct` 对象。\n\n我已经使用\
  \ `ShopProduct` 类作为模板生成了两个 `ShopProduct` 对象。虽然它们在功能上完全相同（即都是空的），但 `$product1` 和\
  \ `$product2` 是由同一个类生成的同一类型的**不同**对象。\n\n如果你还不理解，可以试试这个类比。想象一台制造塑料鸭子的机器，其中的模具就是类。我们的对象就是这台机器生成的鸭子。生成的物品类型由压制它的模具决定。这些鸭子在外观上完全相同，但它们是不同的实体。换句话说，它们是同一类型的不同实例。这些鸭子甚至可能有各自的序列号来证明其身份。在\
  \ PHP 脚本中创建的每个对象也都有自己唯一的标识符。（请注意，该标识符在对象的生命周期内是唯一的；也就是说，PHP 会重用标识符，即使在同一进程内也是如此。）我可以通过打印\
  \ `$product1` 和 `$product2` 对象来演示这一点：\n\n```\n// listing 03.03\nvar_dump($product1);\n\
  var_dump($product2);\n```\n\n执行这些函数会产生以下输出：\n\n```\nobject(popp\\ch03\\batch01\\\
  ShopProduct)#235 (0) {\n}\nobject(popp\\ch03\\batch01\\ShopProduct)#234 (0) {\n\
  }\n```\n\n**注意：** 在旧版 PHP 中（直至 5.1 版本），你可以直接打印对象。这会将该对象强制转换为包含对象 ID 的字符串。从 PHP 5.2\
  \ 开始，该语言不再支持这种魔法，任何将对象当作字符串处理的尝试都会导致错误，除非在对象的类中定义了一个名为 `__toString()` 的方法。我将在本章后面介绍方法，并在第\
  \ 4 章“高级特性”中介绍 `__toString()`。\n\n通过将对象传递给 `var_dump()`，我可以提取有用信息，包括每个对象在井号后的内部标识符。\n\
  \n为了让这些对象更有趣，我可以修改 `ShopProduct` 类，使其支持称为属性的特殊数据字段。\n\n## 在类中设置属性\n\n类可以定义称为属性的特殊变量。属性（也称为成员变量）保存的数据可以在不同对象之间变化。因此，以\
  \ `ShopProduct` 对象为例，你可能希望操作标题和价格等字段。\n\n类中的属性看起来与标准变量相似，不同之处在于声明属性时，必须在属性变量前加上一个可见性关键字。这可以是\
  \ `public`、`protected` 或 `private`，它决定了该属性可以被访问的作用域。\n\n**注意：** 作用域指的是变量有意义（它同样适用于方法，我将在本章后面介绍）的函数或类上下文。因此，在函数内定义的变量存在于局部作用域，而在函数外定义的变量存在于全局作用域。一个经验法则是，你无法访问比当前作用域更局部的数据。所以，如果你在函数内部定义了一个变量，之后无法从函数外部访问它。对象比这更具渗透性，某些对象变量有时可以从其他上下文访问。正如你将看到的，哪些变量可以被访问以及从什么上下文访问，由\
  \ `public`、`protected` 和 `private` 关键字决定。\n\n我将在本章后面重新讨论这些关键字和可见性问题。现在，我使用 `public`\
  \ 关键字声明一些属性：\n\n```\n// listing 03.04\nclass ShopProduct\n{\npublic $title = \"\
  default product\";\npublic $producerMainName = \"main name\";\npublic $producerFirstName\
  \ = \"first name\";\npublic $price  = 0;\n}\n```\n\n如你所见，我设置了四个属性，并为每个属性分配了默认值。任何从\
  \ `ShopProduct` 类实例化的对象现在都将预先填充默认数据。每个属性声明中的 `public` 关键字确保我可以从对象上下文外部访问该属性。\n\n\
  你可以使用字符 `'->'`（对象运算符）结合对象变量和属性名称，逐个对象地访问属性变量，示例如下：\n\n```\n// listing 03.05\n$product1\
  \ = new ShopProduct();\nprint $product1->title;\ndefault product\n```\n\n由于这些属性被定义为\
  \ `public`，你可以像读取它们一样为它们赋值，从而替换类中设置的任何默认值：\n\n```\n// listing 03.06\n$product1 =\
  \ new ShopProduct();\n$product2 = new ShopProduct();\n$product1->title=\"My Antonia\"\
  ;\n$product2->title=\"Catch 22\";\n```\n\n通过在 `ShopProduct` 类中声明并设置 `$title` 属性，我确保了所有\
  \ `ShopProduct` 对象在首次创建时都具有该属性。这意味着使用该类的代码可以基于这一假设来操作 `ShopProduct` 对象。不过，由于我可以重置它，`$title`\
  \ 的值可能因对象而异。\n\n**注意：** 使用类、函数或方法的代码通常被称为该类、函数或方法的**客户端**或**客户端代码**。在接下来的章节中，你会经常看到这个术语。\n\
  \n事实上，PHP 并不强制我们在类中声明所有属性。你可以动态地向对象添加属性，示例如下：\n\n```\n// listing 03.07\n$product1->arbitraryAddition\
  \ = \"treehouse\";\n```\n\n然而，这种为对象分配属性的方法并不被认为是面向对象编程中的良好实践。\n\n为什么动态设置属性是不良实践？当你创建一个类时，你定义了一个类型。你告知世界，你的类（以及从它实例化的任何对象）由一组特定的字段和函数组成。如果你的\
  \ `ShopProduct` 类定义了 `$title` 属性，那么任何处理 `ShopProduct` 对象的代码都可以基于以下假设继续操作：`$title`\
  \ 属性将可用。但动态设置的属性则无法提供任何保证。\n\n\n\n在现阶段，我的对象仍然有些笨重。当需要处理对象的属性时，我必须从对象外部进行操作。我通过访问对象来设置和获取属性信息。在多个对象上设置多个属性很快就会变得繁琐：\n\
  \n```\n// listing 03.08\n$product1 = new ShopProduct();\n$product1->title = \"My\
  \ Antonia\";\n$product1->producerMainName  = \"Cather\";\n$product1->producerFirstName\
  \ = \"Willa\";\n$product1->price = 5.99;\n```\n\n我再次操作`ShopProduct`类，逐一覆盖所有默认属性值，直到设置完所有产品详细信息。现在我已经设置了一些数据，也可以访问它们：\n\
  \n```\n// listing 03.09\nprint \"author: {$product1->producerFirstName} \"\n. \"\
  {$product1->producerMainName}\\n\";\n```\n\n这会输出以下内容：\n\n```\nauthor: Willa Cather\n\
  ```\n\n这种设置属性值的方法存在许多问题。由于 PHP 允许您动态设置属性，因此如果拼写错误或忘记某个属性名，您将不会收到警告。例如，假设我想输入这一行：\n\
  \n```\n$product1->producerMainName  = \"Cather\";\n```\n\n不幸的是，我错误地输入成了这样：\n\n```\n\
  $product1->producerSecondName  = \"Cather\";\n```\n\n对于 PHP 引擎而言，这段代码完全合法，且不会发出警告。然而，当我打印作者姓名时，将得到意想不到的结果。\n\
  \n另一个问题是，我的类过于宽松。我并未强制要求设置标题、价格或生产者名称。客户端代码可以确信这些属性存在，但很可能经常遇到默认值。理想情况下，我希望鼓励任何实例化`ShopProduct`对象的人设置有意义的属性值。\n\
  \n最后，我需要费很大周折才能完成一项我可能经常需要做的事情。正如我们所见，打印完整的作者姓名是一个繁琐的过程。\n\n让对象替我处理这类繁琐工作会更好。\n\n\
  所有这些问题都可以通过为`ShopProduct`对象提供一组自己的函数来解决，这些函数可以在对象上下文内部操作属性数据。\n\n## 使用方法\n\n正如属性允许您的对象存储数据一样，方法允许您的对象执行任务。方法是在类内部声明的特殊函数。正如您所料，方法声明类似于函数声明。`function`关键字位于方法名称之前，后面跟着括号中可选的参数变量列表。方法体由大括号括起来：\n\
  \n```\npublic function myMethod($argument, $another)\n{\n// ...\n}\n```\n\n与函数不同，方法必须在类的主体中声明。它们还可以接受许多限定符，包括可见性关键字。与属性一样，方法可以声明为`public`、`protected`或`private`。通过将方法声明为`public`，您可以确保它可以从当前对象外部调用。如果方法声明中省略了可见性关键字，方法将被隐式声明为`public`。然而，良好的实践是对所有方法明确声明可见性（我将在本章后面回到方法修饰符）。\n\
  \n```\n// listing 03.10\nclass ShopProduct\n{\npublic $title = \"default product\"\
  ;\npublic $producerMainName = \"main name\";\npublic $producerFirstName = \"first\
  \ name\";\npublic $price = 0;\npublic function getProducer()\n{\nreturn $this->producerFirstName\
  \ . \" \"\n. $this->producerMainName;\n}\n}\n```\n\n在大多数情况下，您将使用对象变量结合对象运算符`->`和方法名称来调用方法。在方法调用中必须使用括号，就像调用函数一样（即使您没有向方法传递任何参数）：\n\
  \n```\n// listing 03.11\n$product1 = new ShopProduct();\n$product1->title = \"My\
  \ Antonia\";\n$product1->producerMainName  = \"Cather\";\n$product1->producerFirstName\
  \ = \"Willa\";\n$product1->price = 5.99;\nprint \"author: {$product1->getProducer()}\\\
  n\";\n```\n\n这会输出以下内容：\n\n```\nauthor: Willa Cather\n```\n\n我向`ShopProduct`类添加了`getProducer()`方法。请注意，我将`getProducer()`声明为`public`，这意味着它可以从类外部调用。\n\
  \n我在这个方法的主体中引入了一个特性。`$this`伪变量是类引用对象实例的机制。如果您觉得这个概念难以理解，可以尝试将`$this`替换为短语“当前实例”。考虑以下语句：\n\
  \n```\n$this->producerFirstName\n```\n\n这相当于：\n\n```\n当前实例的$producerFirstName 属性\n\
  ```\n\n因此，`getProducer()`方法组合并返回`$producerFirstName`和`$producerMainName`属性，使我免于每次需要引用完整的生产者名称时都要执行此任务。\n\
  \n这稍微改进了这个类。不过，我仍然受困于大量的不必要灵活性。我依赖客户端程序员来更改`ShopProduct`对象的属性，使其脱离默认值。这在两个方面存在问题。首先，正确初始化一个`ShopProduct`对象需要五行代码，没有程序员会为此感谢你。其次，我无法确保在初始化`ShopProduct`对象时设置任何属性。我需要的是一种在从类实例化对象时自动调用的方法。\n\
  \n\n\n### 创建构造方法\n\n构造方法会在对象被创建时自动调用。你可以用它进行初始化设置，确保关键属性被赋值，并完成必要的准备工作。\n\n**注意**\n\
  \n在 PHP 5 之前的版本中，构造方法以它所属的类名来命名。因此 `ShopProduct` 类会使用 `ShopProduct()` 方法作为其构造方法。但这种方式并非在所有情况下都适用，并已在\
  \ PHP 7 中被弃用。请将你的构造方法命名为 `__construct()`。\n\n请注意方法名以两个下划线字符开头。在 PHP 类中，其他许多特殊方法也沿用这种命名约定。下面我为\
  \ `ShopProduct` 类定义一个构造方法：\n\n```\n// listing 03.12\nclass ShopProduct\n{\npublic\
  \ $title;\npublic $producerMainName;\npublic $producerFirstName;\npublic $price\
  \ = 0;\npublic function __construct(\n$title,\n$firstName,\n$mainName,\n$price\n\
  ) {\n$this->title = $title;\n$this->producerFirstName = $firstName;\n$this->producerMainName\
  \ = $mainName;\n$this->price = $price;\n}\npublic function getProducer()\n{\nreturn\
  \ $this->producerFirstName . \" \"\n. $this->producerMainName;\n}\n}\n```\n\n我再次将功能整合到类中，从而减少使用该类的代码中的重复劳动。当使用\
  \ `new` 运算符创建对象时，`__construct()` 方法会被自动调用：\n\n```\n// listing 03.13\n$product1 =\
  \ new ShopProduct(\n\"My Antonia\",\n\"Willa\",\n\"Cather\",\n5.99\n);\nprint \"\
  author: {$product1->getProducer()}\\n\";\n```\n\n输出结果如下：\n\n```\nauthor: Willa Cather\n\
  ```\n\n传入的所有参数都会被传递给构造方法。因此在示例中，我将标题、名、姓和产品价格传递给了构造方法。构造方法使用伪变量 `$this` 为对象的每个属性赋值。\n\
  \n**注意**\n\n现在 `ShopProduct` 对象的实例化变得更简单、更安全。实例化和初始化只需一条语句即可完成。任何使用 `ShopProduct`\
  \ 对象的代码都可以合理确信其所有属性都已初始化完毕。\n\n这种可预测性是面向对象编程的重要方面。你应该设计类，让对象的使用者能够确信其特性。确保对象安全的一种方法是让对象属性中保存的数据类型可预测。例如，可以确保\
  \ `$name` 属性始终由字符数据组成。但如果属性数据是从类外部传入的，如何实现这一点呢？在下一节中，我将探讨一种在方法声明中强制对象类型的机制。\n\n\
  ### 参数与类型\n\n类型决定了数据在脚本中的管理方式。例如，使用 `string` 类型显示字符数据，并使用字符串函数操作这些数据。整型用于数学表达式，布尔型用于测试表达式，以此类推。这些类别被称为原始类型。但从更高层面来说，类定义了一种类型。因此，`ShopProduct`\
  \ 对象既属于原始类型 `object`，也属于 `ShopProduct` 类类型。在本节中，我将探讨这两种类型与类方法的关系。\n\n方法和函数定义并不强制要求参数必须是特定类型。这既是优点也是缺点。参数可以是任何类型这一事实带来了灵活性。你可以构建能够智能响应不同数据类型的方法，根据变化的情况定制功能。但当方法体期望参数是某种类型却接收到另一种类型时，这种灵活性也会导致代码中出现歧义。\n\
  \n### 原始类型\n\nPHP 是一种弱类型语言。这意味着变量不需要声明为持有特定的数据类型。变量 `$number` 在同一作用域内既可以存储值 `2`，也可以存储字符串\
  \ `\"two\"`。在 C 或 Java 等强类型语言中，必须在赋值前声明变量的类型，并且值必须是指定的类型。\n\n但这并不意味着 PHP 没有类型概念。可以赋给变量的每个值都有类型。你可以使用\
  \ PHP 的类型检查函数之一来确定变量值的类型。表 3-1 列出了 PHP 中识别的原始类型及其对应的检测函数。每个函数接受一个变量或值，如果该参数属于相关类型，则返回\
  \ `true`。\n\n**表 3-1. PHP 中的原始类型及检测函数**\n\n| 类型检测函数 | 类型 | 描述 |\n| --- | --- | ---\
  \ |\n| `is_bool()` | 布尔型 | 两个特殊值之一：`true` 或 `false` |\n| `is_integer()` | 整型 | 整数。`is_int()`\
  \ 和 `is_long()` 的别名 |\n| `is_double()` | 浮点型 | 浮点数（带小数点的数字）。`is_float()` 的别名 |\n\
  | `is_string()` | 字符串型 | 字符数据 |\n| `is_object()` | 对象型 | 对象 |\n| `is_array()` |\
  \ 数组型 | 数组 |\n| `is_resource()` | 资源型 | 用于标识和处理外部资源（如数据库或文件）的句柄 |\n| `is_null()`\
  \ | NULL 型 | 未赋值的值 |\n\n在处理方法和函数参数时，检查变量的类型可能尤为重要。\n\n\n\n#### 原始类型至关重要：一个示例\n\n\
  你需要密切关注代码中的类型。以下是一个你可能遇到的类型相关问题的示例。\n\n假设你正在从 XML 文件中提取配置设置。`<resolvedomains>` XML\
  \ 元素告知应用程序是否应尝试将 IP 地址解析为域名，这是一个有用但相对耗时的过程。以下是示例 XML：\n\n```\n<resolvedomains>false</resolvedomains>\n\
  ```\n\n应用程序提取出字符串 `\"false\"`，并将其作为标志传递给一个名为 `outputAddresses()` 的方法，该方法用于显示 IP\
  \ 地址数据。以下是 `outputAddresses()` 的代码：\n\n```\n// listing 03.15\nclass AddressManager\n\
  {\nprivate $addresses = [\"209.131.36.159\", \"216.58.213.174\"];\npublic function\
  \ outputAddresses($resolve)\n{\nforeach ($this->addresses as $address) {\nprint\
  \ $address;\nif ($resolve) {\nprint \" (\".gethostbyaddr($address).\")\";\n}\nprint\
  \ \"\\n\";\n}\n}\n}\n```\n\n当然，`AddressManager` 类还有改进空间。例如，将 IP 地址硬编码到类中并不是很有用。不过，`outputAddresses()`\
  \ 方法会遍历 `$addresses` 数组属性并打印每个元素。如果 `$resolve` 参数变量本身解析为 `true`，该方法会同时输出域名和 IP 地址。\n\
  \n以下是结合 `AddressManager` 类使用 `settings` XML 配置元素的一种方法。看看你是否能发现其中的缺陷：\n\n```\n//\
  \ listing 03.16\n$settings = simplexml:load_file(__DIR__.\"/resolve.xml\");\n$manager\
  \ = new AddressManager();\n$manager->outputAddresses((string)$settings->resolvedomains);\n\
  ```\n\n这段代码片段使用 `SimpleXML` API 来获取 `resolvedomains` 元素的值。在此示例中，我知道该值是文本元素 `\"false\"\
  `，并且按照 `SimpleXML` 文档的建议，我将其强制转换为字符串。\n\n这段代码的行为可能与你预期的不同。将字符串 `\"false\"` 传递给 `outputAddresses()`\
  \ 方法时，我误解了该方法对参数所做的隐式假设。该方法期望的是一个布尔值（即 `true` 或 `false`）。实际上，在测试中，字符串 `\"false\"\
  ` 会被解析为 `true`。这是因为 PHP 在测试上下文中会友好地将非空字符串值强制转换为布尔值 `true`。考虑以下代码：\n\n```\nif ( \"\
  false\" ) {\n// ...\n}\n```\n\n它实际上等同于以下代码：\n\n```\nif ( true ) {\n// ...\n}\n```\n\
  \n有几种方法可以解决这个问题。\n\n你可以让 `outputAddresses()` 方法更宽容一些，使其能够识别字符串并应用一些基本规则将其转换为等价的布尔值：\n\
  \n```\n// listing 03.17\npublic function outputAddresses($resolve)\n{\nif (is_string($resolve))\
  \ {\n$resolve =\n(preg_match(\"/^(false|no|off)$/i\", $resolve) ) ? false : true;\n\
  }\n// ...\n}\n```\n\n然而，出于良好的设计原因，通常应该避免采用这种方法。一般来说，为方法或函数提供一个清晰严格的接口，比提供一个模糊宽容的接口更好。模糊且宽容的函数和方法可能会引起混淆，从而滋生错误。\n\
  \n你可以采用另一种方法：保持 `outputAddresses()` 方法不变，并添加一条注释，明确说明 `$resolve` 参数应包含布尔值。这种方法本质上是告诉程序员仔细阅读细则，否则后果自负：\n\
  \n```\n/**\n* Outputs the list of addresses.\n* If $resolve is true then each address\
  \ will be resolved\n* @param    $resolve    boolean    Resolve the address?\n*/\n\
  function outputAddresses($resolve)\n{\n// ...\n}\n```\n\n这是一种合理的方法，前提是你的客户端程序员能够勤于阅读文档。\n\
  \n最后，你可以让 `outputAddresses()` 方法严格要求 `$resolve` 参数中准备接收的数据类型。对于像布尔值这样的原始类型，在 PHP\
  \ 7 发布之前，只有一种方法可以做到这一点。你必须编写代码来检查传入的数据，并在数据不符合所需类型时采取某些操作：\n\n```\nfunction outputAddresses($resolve)\n\
  {\nif (! is_bool($resolve)) {\n// do something drastic\n}\n//...\n}\n```\n\n这种方法可用于强制客户端代码在\
  \ `$resolve` 参数中提供正确的数据类型，或发出警告。\n\n注意\n\n在下一节“接受提示：对象类型”中，我将描述一种更好的方法来限制传递给方法和函数的参数类型。\n\
  \n代表客户端转换字符串参数会很友好，但可能会带来其他问题。通过提供转换机制，你是在臆测客户端的上下文和意图。另一方面，通过强制使用布尔数据类型，你让客户端自行决定是否将字符串映射为布尔值，并确定哪些词应映射为\
  \ `true` 或 `false`。同时，`outputAddresses()` 方法则专注于其设计的任务。这种有意识地忽略更广泛上下文、专注于执行特定任务的理念，是面向对象编程中的一个重要原则，我将在本书中反复提及。\n\
  \n事实上，处理参数类型的策略将取决于可能存在的错误严重程度以及灵活性的好处。根据上下文的不同，PHP 会为你强制转换大多数原始值。例如，当在数学表达式中使用时，字符串中的数字会被转换为其整数或浮点数等价形式。因此，你的代码可能天生对类型错误具有容忍度。然而，如果你期望方法参数是一个数组，就需要更加小心。将非数组值传递给\
  \ PHP 的数组函数不会产生有用的结果，并可能导致方法中发生一连串错误。\n\n因此，你很可能需要在类型检查、类型转换以及依赖良好清晰的文档之间取得平衡（无论你决定做什么，你都应该提供文档）。\n\
  \n无论你如何处理这类问题，有一件事是确定的——类型至关重要。PHP 是弱类型语言，这一点使得类型问题更加重要。你不能依赖编译器来防止与类型相关的错误；你必须考虑当意外类型进入参数时可能产生的影响。你不能指望客户端程序员能猜到你的想法，你应该始终考虑你的方法将如何处理传入的垃圾数据。\n\
  \n\n\n### 善用提示：对象类型\n\n正如参数变量可以包含任何基本类型一样，默认情况下它也可以包含任何类型的对象。这种灵活性有其用途，但在方法定义的上下文中可能会带来问题。\n\
  \n假设有一个方法被设计用来处理 `ShopProduct` 对象：\n\n```\n// listing 03.18\nclass ShopProductWriter\n\
  {\npublic function write($shopProduct)\n{\n$str  = $shopProduct->title . \": \"\n\
  . $shopProduct->getProducer()\n. \" (\" . $shopProduct->price . \")\\n\";\nprint\
  \ $str;\n}\n}\n```\n\n你可以这样测试这个类：\n\n```\n// listing 03.19\n$product1 = new ShopProduct(\"\
  My Antonia\", \"Willa\", \"Cather\", 5.99);\n$writer = new ShopProductWriter();\n\
  $writer->write($product1);\n```\n\n输出结果如下：\n\n```\nMy Antonia: Willa Cather (5.99)\n\
  ```\n\n`ShopProductWriter` 类包含一个方法 `write()`。`write()` 方法接受一个 `ShopProduct` 对象，并使用其属性和方法来构造并打印摘要字符串。我使用参数变量名\
  \ `$shopProduct` 来暗示该方法期望一个 `ShopProduct` 对象，但并未强制执行此规则。这意味着我可能会传入一个意外的对象或基本类型，并且直到我开始尝试使用\
  \ `$shopProduct` 参数时才会发现问题。到那时，我的代码可能已经基于“已传入一个真正的 `ShopProduct` 对象”这个假设执行了操作。\n\
  \n**注意**\n\n你可能会好奇为什么我不直接把 `write()` 方法添加到 `ShopProduct` 中。原因在于职责划分。`ShopProduct`\
  \ 类负责管理产品数据，而 `ShopProductWriter` 负责输出数据。随着你阅读本章，你会开始理解这种分工为何有用。\n\n为了解决这个问题，PHP\
  \ 5 引入了类类型声明（当时称为类型提示）。要为方法参数添加类类型声明，只需将类名放在需要约束的方法参数前面即可。因此，我可以这样修改 `write()` 方法：\n\
  \n```\n// listing 03.20\npublic function write(ShopProduct $shopProduct)\n{\n//\
  \ ...\n}\n```\n\n现在，只有当 `$shopProduct` 参数包含 `ShopProduct` 类型的对象时，`write()` 方法才会接受它。以下代码片段尝试使用一个无效的对象调用\
  \ `write()`：\n\n```\n// listing 03.21\nclass Wrong\n{\n}\n$writer = new ShopProductWriter();\n\
  $writer->write(new Wrong());\n```\n\n由于 `write()` 方法包含类类型声明，传入一个 `Wrong` 对象会导致致命错误。\n\
  \n```\nTypeError: Argument 1 passed to ShopProductWriter::write() must be an instance\
  \ of ShopProduct, instance of Wrong given, called in Runner.php on ...\n```\n\n\
  这让我无需在使用参数前测试其类型，同时也使方法签名对客户端开发者更加清晰。她可以一目了然地看到 `write()` 方法的要求，并且不必担心由于类型错误而导致的某些难以发现的\
  \ bug，因为声明是严格强制执行的。\n\n尽管这种自动类型检查是防止错误的好方法，但重要的是要理解类型声明是在运行时检查的。这意味着类声明只有在不期望的对象被传递给方法时才会报告错误。如果对\
  \ `write()` 的调用嵌在仅在圣诞节早上运行的某个条件子句中，而你没有仔细检查代码，那么你可能就得在节日里加班了。\n\n借助标量类型声明，我可以为 `ShopProduct`\
  \ 类添加一些约束：\n\n```\n// listing 03.22\nclass ShopProduct\n{\npublic $title;\npublic\
  \ $producerMainName;\npublic $producerFirstName;\npublic $price = 0;\npublic function\
  \ __construct(\nstring $title,\nstring $firstName,\nstring $mainName,\nfloat $price\n\
  ) {\n$this->title = $title;\n$this->producerFirstName = $firstName;\n$this->producerMainName\
  \ = $mainName;\n$this->price = $price;\n}\n// ...\n}\n```\n\n通过这种方式加固构造函数，我可以确保\
  \ `$title`、`$firstName`、`$mainName` 参数始终包含字符串数据，而 `$price` 包含浮点数。我可以通过传入错误信息来实例化\
  \ `ShopProduct` 来演示这一点：\n\n```\n// listing 03.23\n// 会失败\n$product = new ShopProduct(\"\
  title\", \"first\", \"main\", []);\n```\n\n我尝试实例化一个 `ShopProduct` 对象。我向构造函数传递了三个字符串，但在最后一步失败了——我传入了一个空数组，而不是所需的浮点数。感谢类型声明，PHP\
  \ 不会允许我这样做：\n\n```\nTypeError: Argument 4 passed to ShopProduct::__construct() must\
  \ be of the type float, array given, called in...\n```\n\n默认情况下，PHP 会尽可能将参数隐式转换为所需类型。这是我们之前遇到的“安全性与灵活性之间的权衡”的一个例子。例如，新的\
  \ `ShopProduct` 类实现会悄悄地将字符串转换为浮点数。因此，以下实例化不会失败：\n\n```\n// listing 03.24\n$product\
  \ = new ShopProduct(\"title\", \"first\", \"main\", \"4.22\");\n```\n\n在幕后，字符串 `\"\
  4.22\"` 变成了浮点数 `4.22`。\n\n到目前为止，这一切都很有用。但回想一下我们在 `AddressManager` 类中遇到的问题。字符串 `\"\
  false\"` 被静默地解析为布尔值 `true`。默认情况下，如果我在 `AddressManager::outputAddresses()` 方法中使用\
  \ `bool` 类型声明，这种情况仍然会发生，如下所示：\n\n```\n// listing 03.25\npublic function outputAddresses(bool\
  \ $resolve)\n{\n// ...\n}\n```\n\n现在考虑一个传入字符串的调用：\n\n```\n// listing 03.26\n$manager->outputAddresses(\"\
  false\");\n```\n\n由于隐式转换，这个调用在功能上与传入布尔值 `true` 的调用完全相同。\n\n你可以使标量类型声明变为严格的，尽管这需要逐文件进行。在这里，我开启了严格类型声明，并再次使用字符串调用\
  \ `outputAddresses()`：\n\n```\n// listing 03.27\ndeclare(strict_types=1);\n$manager->outputAddresses(\"\
  false\");\n```\n\n因为我声明了严格类型，这个调用会抛出一个 `TypeError`：\n\n```\nTypeError: Argument\
  \ 1 passed to AddressManager::outputAddresses() must be of the type boolean, string\
  \ given, called in ...\n```\n\n**注意**\n\n`strict_types` 声明应用于发起调用的文件，而不是函数或方法所在的文件。因此，由客户端代码来决定是否强制严格检查。\n\
  \n你可能需要让参数成为可选的，但如果有值传入，仍需约束其类型。你可以通过提供默认值来实现这一点：\n\n```\n// listing 03.28\nclass\
  \ ConfReader\n{\npublic function getValues(array $default = null)\n{\n$values =\
  \ [];\n// 执行一些操作来获取值\n// 合并提供的默认值（它始终是一个数组）\n$values = array_merge($default, $values);\n\
  return $values;\n}\n}\n```\n\n在表 3-2 中，我列出了 PHP 支持的类型声明。\n\n**表 3-2. 类型声明**\n\n\
  | 类型声明 | 起始版本 | 描述 |\n| --- | --- | --- |\n| `array` | 5.1 | 数组。默认值可以为 `null` 或一个数组\
  \ |\n| `int` | 7.0 | 整数。默认值可以为 `null` 或一个整数 |\n| `float` | 7.0 | 浮点数（带小数点的数字）。即使启用了严格模式，也会接受整数。默认值可以为\
  \ `null`、一个浮点数或一个整数 |\n| `callable` | 5.4 | 可调用的代码（如匿名函数）。默认值可以为 `null` |\n| `bool`\
  \ | 7.0 | 布尔值。默认值可以为 `null` 或一个布尔值 |\n| `string` | 5.0 | 字符数据。默认值可以为 `null` 或一个字符串\
  \ |\n| `self` | 5.0 | 对包含类的引用 |\n| `[a class type]` | 5.0 | 类或接口的类型。默认值可以为 `null`\
  \ |\n\n\n\n## 关于类类型声明的说明\n\n在介绍类类型声明时，我暗示了类型和类是等同的概念。然而，两者之间存在一个关键区别。当你定义一个类时，同时也定义了一个类型，但一个类型可以描述整个类家族。将不同类归入同一类型的机制称为**继承**。我将在下一节讨论继承。\n\
  \n### 继承\n\n继承是一种允许一个或多个类从基类派生出来的机制。\n\n继承自另一个类的类被称为该类的子类。这种关系通常用父与子来描述。子类继承自父类并继承父类的特性。这些特性包括属性和方法。子类通常会在父类（也称为超类）提供的功能基础上添加新功能；因此，子类也被称为扩展了其父类。\n\
  \n在深入探讨继承的语法之前，我先分析一下继承能帮你解决什么问题。\n\n### 继承问题\n\n再看一下`ShopProduct`类。目前，它非常通用，可以处理各种类型的产品：\n\
  \n```\n// listing 03.29\n$product1 = new ShopProduct(\"我的安冬妮亚\", \"薇拉\", \"凯瑟\"\
  , 5.99);\n$product2 = new ShopProduct(\n\"冷港巷的放逐\",\n\"乐队\",\n\"阿拉巴马 3 号\",\n10.99\n\
  );\nprint \"作者: \" . $product1->getProducer() . \"\\n\";\nprint \"艺人: \" . $product2->getProducer()\
  \ . \"\\n\";\n```\n\n输出结果如下：\n\n```\n作者: 薇拉·凯瑟\n艺人: 乐队·阿拉巴马 3 号\n```\n\n将作者名分为两部分来处理，对于书籍和\
  \ CD 都适用。我希望能够按`阿拉巴马 3 号`和`凯瑟`进行排序，而不是按`乐队`和`薇拉`。懒惰是一种优秀的设计策略，因此现阶段无需担心使用`ShopProduct`处理多种产品的问题。\n\
  \n但如果我为示例添加一些新需求，事情很快就会变得更复杂。例如，假设你需要表示书籍和 CD 各自特有的数据。对于 CD，必须存储总播放时长；对于书籍，需要存储总页数。虽然还可能存在其他差异，但这足以说明问题。\n\
  \n如何扩展我的示例来适应这些变化呢？有两个方法立即浮现在眼前。第一，我可以把所有数据都塞进`ShopProduct`类。第二，我可以将`ShopProduct`拆分成两个独立的类。\n\
  \n我们先来看第一种方法。这里，我将 CD 和书籍相关的数据合并到一个类中：\n\n```\n// listing 03.30\nclass ShopProduct\n\
  {\n    public $numPages;\n    public $playLength;\n    public $title;\n    public\
  \ $producerMainName;\n    public $producerFirstName;\n    public $price;\n\n   \
  \ public function __construct(\n        string $title,\n        string $firstName,\n\
  \        string $mainName,\n        float $price,\n        int $numPages = 0,\n\
  \        int $playLength = 0\n    ) {\n        $this->title             = $title;\n\
  \        $this->producerFirstName = $firstName;\n        $this->producerMainName\
  \  = $mainName;\n        $this->price             = $price;\n        $this->numPages\
  \          = $numPages;\n        $this->playLength        = $playLength;\n    }\n\
  \n    public function getNumberOfPages()\n    {\n        return $this->numPages;\n\
  \    }\n\n    public function getPlayLength()\n    {\n        return $this->playLength;\n\
  \    }\n\n    public function getProducer()\n    {\n        return $this->producerFirstName\
  \ . \" \"\n            . $this->producerMainName;\n    }\n}\n```\n\n我为`$numPages`和`$playLength`属性提供了方法访问，以说明这里存在的不同需求。从这个类实例化出的对象会包含一个冗余的方法；对于\
  \ CD，实例化时必须使用一个不必要的构造参数：CD 会存储与书籍页数相关的信息和功能，而书籍则会支持播放时长数据。也许你现在还能忍受这种情况。但如果我添加更多产品类型，每种类型都有自己特有的方法，然后再为每种类型添加更多的方法，会发生什么？我们的类会变得越来越复杂，难以管理。\n\
  \n因此，将本不该放在一起的字段强制塞入一个类，会导致对象臃肿，包含冗余的属性和方法。\n\n问题并不仅限于数据层面，功能方面也会遇到困难。考虑一个汇总产品信息的方法。销售部门要求为发票提供一个清晰的摘要行。他们希望我能为\
  \ CD 包含播放时长，为书籍包含页数，因此我必须为每种类型提供不同的实现。我可以尝试使用一个标志来跟踪对象的格式。示例如下：\n\n```\n// listing\
  \ 03.31\npublic function getSummaryLine()\n{\n    $base  = \"{$this->title} ( {$this->producerMainName},\
  \ \";\n    $base .= \"{$this->producerFirstName} )\";\n    if ($this->type == 'book')\
  \ {\n        $base .= \": 页数 - {$this->numPages}\";\n    } elseif ($this->type ==\
  \ 'cd') {\n        $base .= \": 播放时间 - {$this->playLength}\";\n    }\n    return\
  \ $base;\n}\n```\n\n\n\n为了设置`$type`属性，我可以测试传递给构造函数的`$numPages`参数。然而，`ShopProduct`类又一次变得比必要的更复杂。随着我为不同格式添加更多差异或添加新格式，这些功能上的差异将变得更加难以管理。也许我应该尝试另一种方法来解决这个问题。\n\
  \n由于`ShopProduct`开始感觉像是一个类里包含了两个类，我可以接受这一点并创建两种类型而不是一种。下面是我的实现方式：\n\n```php\n//\
  \ listing 03.32\nclass CdProduct\n{\npublic $playLength;\npublic $title;\npublic\
  \ $producerMainName;\npublic $producerFirstName;\npublic $price;\npublic function\
  \ __construct(\nstring $title,\nstring $firstName,\nstring $mainName,\nfloat  $price,\n\
  int    $playLength\n) {\n$this->title             = $title;\n$this->producerFirstName\
  \ = $firstName;\n$this->producerMainName  = $mainName;\n$this->price           \
  \  = $price;\n$this->playLength        = $playLength;\n}\npublic function getPlayLength()\n\
  {\nreturn $this->playLength;\n}\npublic function getSummaryLine()\n{\n$base  = \"\
  {$this->title} ( {$this->producerMainName}, \";\n$base .= \"{$this->producerFirstName}\
  \ )\";\n$base .= \": playing time - {$this->playLength}\";\nreturn $base;\n}\npublic\
  \ function getProducer()\n{\nreturn $this->producerFirstName . \" \"\n. $this->producerMainName;\n\
  }\n}\n// listing 03.33\nclass BookProduct\n{\npublic $numPages;\npublic $title;\n\
  public $producerMainName;\npublic $producerFirstName;\npublic $price;\npublic function\
  \ __construct(\nstring $title,\nstring $firstName,\nstring $mainName,\nfloat  $price,\n\
  int    $numPages\n) {\n$this->title             = $title;\n$this->producerFirstName\
  \ = $firstName;\n$this->producerMainName  = $mainName;\n$this->price           \
  \  = $price;\n$this->numPages          = $numPages;\n}\npublic function getNumberOfPages()\n\
  {\nreturn $this->numPages;\n}\npublic function getSummaryLine()\n{\n$base  = \"\
  {$this->title} ( {$this->producerMainName}, \";\n$base .= \"{$this->producerFirstName}\
  \ )\";\n$base .= \": page count - {$this->numPages}\";\nreturn $base;\n}\npublic\
  \ function getProducer()\n{\nreturn $this->producerFirstName . \" \"\n. $this->producerMainName;\n\
  }\n}\n```\n\n我解决了复杂性问题，但付出了代价。现在我可以为每种格式创建`getSummaryLine()`方法，而无需测试标志。两个类都不维护与其不相关的字段或方法。\n\
  \n代价在于重复。`getProducerName()`方法在每个类中完全相同。每个构造函数都以相同的方式设置多个相同的属性。这是你应该训练自己嗅探到的另一种不良气味。\n\
  \n如果我希望`getProducer()`方法在每个类中的行为完全相同，那么我对一个实现所做的任何更改都需要对另一个做出同样的更改。如果不小心，这两个类很快就会失去同步。\n\
  \n即使我有信心维护这种重复，我的担忧也还没有结束。现在我有两个类型而不是一个。\n\n还记得`ShopProductWriter`类吗？它的`write()`方法被设计为处理单一类型：`ShopProduct`。我该如何修改它以使其像以前一样工作？我可以从方法签名中删除类类型声明，但这样我就只能寄希望于`write()`被传入一个正确类型的对象。我可以在方法体内添加自己的类型检查代码：\n\
  \n```php\n// listing 03.34\nclass ShopProductWriter\n{\npublic function write($shopProduct)\n\
  {\nif (\n! ($shopProduct instanceof CdProduct)  &&\n! ($shopProduct instanceof BookProduct)\n\
  ) {\ndie(\"wrong type supplied\");\n}\n$str  = \"{$shopProduct->title}: \"\n. $shopProduct->getProducer()\n\
  . \" ({$shopProduct->price})\\n\";\nprint $str;\n}\n}\n```\n\n注意示例中的`instanceof`运算符；如果左侧操作数的对象是右侧操作数所代表的类型，则`instanceof`解析为`true`。\n\
  \n再一次，我被迫加入了一层新的复杂性。我不仅需要在`write()`方法中针对两种类型测试`$shopProduct`参数，还必须相信每种类型会继续支持与另一种类型相同的字段和方法。当我简单地要求一个单一类型时，一切都要整洁得多，因为我可以使用类类型声明，并且可以确信`ShopProduct`类支持特定的接口。\n\
  \n`ShopProduct`类的 CD 和图书方面似乎不能很好地协同工作，但又似乎不能分开。我希望将图书和 CD 作为单一类型来处理，同时为每种格式提供独立的实现。我想在一个地方提供通用功能以避免重复，但同时允许每种格式以不同的方式处理某些方法调用。我需要使用继承。\n\
  \n\n\n## 使用继承\n\n构建继承树的第一步，是找出基类中不兼容或需要差异化处理的元素。\n\n我知道 `getPlayLength()` 和 `getNumberOfPages()`\
  \ 方法并不属于同一类别。同时，我也需要为 `getSummaryLine()` 方法创建不同的实现。让我们利用这些差异，作为两个派生类的基础：\n\n```php\n\
  // listing 03.35\nclass ShopProduct\n{\npublic $numPages;\npublic $playLength;\n\
  public $title;\npublic $producerMainName;\npublic $producerFirstName;\npublic $price;\n\
  public function __construct(\nstring $title,\nstring $firstName,\nstring $mainName,\n\
  float  $price,\nint    $numPages = 0,\nint    $playLength = 0\n) {\n$this->title\
  \             = $title;\n$this->producerFirstName = $firstName;\n$this->producerMainName\
  \  = $mainName;\n$this->price             = $price;\n$this->numPages          =\
  \ $numPages;\n$this->playLength        = $playLength;\n}\npublic function getProducer()\n\
  {\nreturn $this->producerFirstName . \" \"\n. $this->producerMainName;\n}\npublic\
  \ function getSummaryLine()\n{\n$base  = \"{$this->title} ( {$this->producerMainName},\
  \ \";\n$base .= \"{$this->producerFirstName} )\";\nreturn $base;\n}\n}\n// listing\
  \ 03.36\nclass CdProduct extends ShopProduct\n{\npublic function getPlayLength()\n\
  {\nreturn $this->playLength;\n}\npublic function getSummaryLine()\n{\n$base  = \"\
  {$this->title} ( {$this->producerMainName}, \";\n$base .= \"{$this->producerFirstName}\
  \ )\";\n$base .= \": playing time - {$this->playLength}\";\nreturn $base;\n}\n}\n\
  // listing 03.37\nclass BookProduct extends ShopProduct\n{\npublic function getNumberOfPages()\n\
  {\nreturn $this->numPages;\n}\npublic function getSummaryLine()\n{\n$base  = \"\
  {$this->title} ( {$this->producerMainName}, \";\n$base .= \"{$this->producerFirstName}\
  \ )\";\n$base .= \": page count - {$this->numPages}\";\nreturn $base;\n}\n}\n```\n\
  \n要创建子类，你必须在类声明中使用 `extends` 关键字。在示例中，我创建了两个新类：`BookProduct` 和 `CdProduct`。两者都继承了\
  \ `ShopProduct` 类。\n\n由于派生类没有定义构造函数，因此在实例化时会自动调用父类的构造函数。子类继承了对父类所有公有（public）和保护（protected）方法的访问权限（但不包括私有方法或属性）。这意味着你可以对\
  \ `CdProduct` 类的实例化对象调用 `getProducer()` 方法，即使 `getProducer()` 是在 `ShopProduct` 类中定义的：\n\
  \n```php\n// listing 03.38\n$product2 = new CdProduct(\n\"Exile on Coldharbour Lane\"\
  ,\n\"The\",\n\"Alabama 3\",\n10.99,\n0,\n60.33\n);\nprint \"artist: {$product2->getProducer()}\\\
  n\";\n```\n\n因此，两个子类都继承了共同父类的行为。你可以将 `BookProduct` 对象当作 `ShopProduct` 对象来处理。你可以将\
  \ `BookProduct` 或 `CdProduct` 对象传递给 `ShopProductWriter` 类的 `write()` 方法，一切都会按预期运行。\n\
  \n注意，`CdProduct` 和 `BookProduct` 类都重写了 `getSummaryLine()` 方法，各自提供了自己的实现。派生类不仅可以扩展，还可以改变父类的功能。\n\
  \n父类中该方法的实现可能看起来有些多余，因为它被两个子类都重写了。然而，它提供了新子类可能使用的基本功能。该方法的存在也为客户端代码提供保证：所有 `ShopProduct`\
  \ 对象都会提供一个 `getSummaryLine()` 方法。稍后你将看到，如何在不提供任何实现的情况下，在基类中做出这种承诺。每个 `ShopProduct`\
  \ 的子类都继承其父类的属性。`BookProduct` 和 `CdProduct` 都在各自的 `getSummaryLine()` 版本中访问了 `$title`\
  \ 属性。\n\n继承这个概念一开始可能难以掌握。通过定义一个扩展另一个类的类，你可以确保由此实例化的对象同时具备子类和父类的特性。另一种思考方式是将其视为“查找”过程。当我调用\
  \ `$product2->getProducer()` 时，在 `CdProduct` 类中找不到该方法，因此调用会回退到 `ShopProduct` 中的默认实现。而当我调用\
  \ `$product2->getSummaryLine()` 时，则会在 `CdProduct` 类中找到 `getSummaryLine()` 方法并直接调用。\n\
  \n属性访问也是同样的道理。当我在 `BookProduct` 类的 `getSummaryLine()` 方法中访问 `$title` 时，在 `BookProduct`\
  \ 类中找不到该属性，而是从父类 `ShopProduct` 中获取。`$title` 属性同样适用于两个子类，因此它属于父类。\n\n不过，快速查看 `ShopProduct`\
  \ 的构造函数会发现，我仍在基类中管理本应由子类处理的数据。`BookProduct` 类应处理 `$numPages` 参数和属性，而 `CdProduct`\
  \ 类应处理 `$playLength` 参数和属性。为此，我将在每个子类中定义构造函数方法。\n\n\n\n#### 构造函数与继承\n\n在子类中定义构造函数时，你需负责将所有参数传递给父类。若未能如此，可能会导致生成一个部分初始化的对象。\n\
  \n要调用父类中的方法，首先需要找到一种方式来引用类本身：这需要一个“句柄”。PHP 为我们提供了 `parent` 关键字来实现这一目的。\n\n要引用类上下文中的方法（而非对象上下文），应使用\
  \ `::` 而非 `->`：\n\n```\nparent::__construct()\n```\n\n上述代码的含义是：“调用父类的 `__construct()`\
  \ 方法”。现在，我修改示例，使每个类只处理与其自身相关的数据：\n\n```\n// 代码清单 03.39\nclass ShopProduct\n{\npublic\
  \ $title;\npublic $producerMainName;\npublic $producerFirstName;\npublic $price;\n\
  function __construct(\n$title,\n$firstName,\n$mainName,\n$price\n) {\n$this->title\
  \             = $title;\n$this->producerFirstName = $firstName;\n$this->producerMainName\
  \  = $mainName;\n$this->price             = $price;\n}\nfunction getProducer()\n\
  {\nreturn $this->producerFirstName . \" \"\n. $this->producerMainName;\n}\nfunction\
  \ getSummaryLine()\n{\n$base  = \"{$this->title} ( {$this->producerMainName}, \"\
  ;\n$base .= \"{$this->producerFirstName} )\";\nreturn $base;\n}\n}\n// 代码清单 03.40\n\
  class BookProduct extends ShopProduct\n{\npublic $numPages;\npublic function __construct(\n\
  string $title,\nstring $firstName,\nstring $mainName,\nfloat  $price,\nint    $numPages\n\
  ) {\nparent::__construct(\n$title,\n$firstName,\n$mainName,\n$price\n);\n$this->numPages\
  \ = $numPages;\n}\npublic function getNumberOfPages()\n{\nreturn $this->numPages;\n\
  }\npublic function getSummaryLine()\n{\n$base  = \"{$this->title} ( $this->producerMainName,\
  \ \";\n$base .= \"$this->producerFirstName )\";\n$base .= \": page count - {$this->numPages}\"\
  ;\nreturn $base;\n}\n}\n// 代码清单 03.41\nclass CdProduct extends ShopProduct\n{\n\
  public $playLength;\npublic function __construct(\nstring $title,\nstring $firstName,\n\
  string $mainName,\nfloat  $price,\nint    $playLength\n) {\nparent::__construct(\n\
  $title,\n$firstName,\n$mainName,\n$price\n);\n$this->playLength = $playLength;\n\
  }\npublic function getPlayLength()\n{\nreturn $this->playLength;\n}\npublic function\
  \ getSummaryLine()\n{\n$base  = \"{$this->title} ( {$this->producerMainName}, \"\
  ;\n$base .= \"{$this->producerFirstName} )\";\n$base .= \": playing time - {$this->playLength}\"\
  ;\nreturn $base;\n}\n}\n```\n\n每个子类在设置自身属性之前，都会调用其父类的构造函数。基类现在只知道自身的数据。子类通常是其父类的特化。作为一条经验法则，应避免赋予父类任何关于其子类的特殊知识。\n\
  \n**注意**  \n在 PHP 5 之前，构造函数采用所在类的名称。新的统一构造函数使用名称 `__construct()`。使用旧语法时，对父类构造函数的调用会将你绑定到特定类：`parent::ShopProduct();`。旧的构造函数语法已在\
  \ PHP 7.0 中弃用，不应再使用。\n\n#### 调用被重写的方法\n\n`parent` 关键字可用于任何覆盖了父类中对应方法的方法。当重写一个方法时，你可能不希望完全取代父类的功能，而是想对其进行扩展。你可以通过在当前对象的上下文中调用父类的方法来实现这一点。如果你再次查看\
  \ `getSummaryLine()` 方法的实现，会发现它们重复了大量代码。更好的做法是利用（而非重新实现）`ShopProduct` 类中已有的功能：\n\
  \n```\n// 代码清单 03.42\n// ShopProduct 类...\nfunction getSummaryLine()\n{\n$base \
  \ = \"{$this->title} ( {$this->producerMainName}, \";\n$base .= \"{$this->producerFirstName}\
  \ )\";\nreturn $base;\n}\n// 代码清单 03.43\n// BookProduct 类...\npublic function getSummaryLine()\n\
  {\n$base  = parent::getSummaryLine();\n$base .= \": page count - $this->numPages\"\
  ;\nreturn $base;\n}\n```\n\n我在 `ShopProduct` 基类中设置了 `getSummaryLine()` 方法的核心功能。与其在\
  \ `CdProduct` 和 `BookProduct` 子类中重复此代码，我只需在向摘要字符串添加更多数据之前，调用父类的方法即可。\n\n现在你已经了解了继承的基础知识，我将结合整个图景，重新审视属性和方法的可见性。\n\
  \n### 公有、私有与受保护：管理类的访问权限\n\n到目前为止，我已将所有属性声明为 `public`。如果你在属性声明中使用旧的 `var` 关键字，那么\
  \ `public` 访问权限是方法和属性的默认设置。\n\n类中的元素可以声明为 `public`、`private` 或 `protected`：\n\n\
  - 公有属性和方法可以从任何上下文中访问。\n- 私有方法或属性只能在其所属类内部访问。即使是子类也无权访问。\n- 受保护的方法或属性只能在其所属类或其子类内部访问。外部代码一律无权访问。\n\
  \n那么这对我们有何用处？可见性关键字允许你只公开客户端所需的那些类方面。这为你的对象设定了一个清晰的接口。\n\n通过阻止客户端访问某些属性，访问控制还有助于防止代码中的错误。例如，假设你想允许\
  \ `ShopProduct` 对象支持折扣。你可以添加一个 `$discount` 属性和一个 `setDiscount()` 方法：\n\n```\n//\
  \ 代码清单 03.44\n// ShopProduct 类\npublic $discount = 0;\n//...\npublic function setDiscount(int\
  \ $num)\n{\n$this->discount = $num;\n}\n```\n\n有了设置折扣的机制，你可以创建一个考虑已应用折扣的 `getPrice()`\
  \ 方法：\n\n```\npublic function getPrice()\n{\nreturn ($this->price - $this->discount);\n\
  }\n```\n\n此时，你遇到了一个问题。你只想向外部暴露调整后的价格，但客户端可以轻易绕过 `getPrice()` 方法，直接访问 `$price` 属性：\n\
  \n```\nprint \"The price is {$product1->price}\\n\";\n```\n\n这将打印原始价格，而非你希望呈现的折后价。你可以通过将\
  \ `$price` 属性设为 private 来立即阻止这种情况。这将阻止直接访问，强制客户端使用 `getPrice()` 方法。任何从 `ShopProduct`\
  \ 类外部访问 `$price` 属性的尝试都会失败。对于外部世界而言，此属性已不复存在。\n\n将属性设置为 `private` 可能是一种过激的策略。`private`\
  \ 属性无法被子类访问。假设我们的业务规则规定只有书籍不应享受折扣。你可以重写 `getPrice()` 方法，使其返回 `$price` 属性而不应用任何折扣：\n\
  \n```\n// 代码清单 03.45\n// BookProduct\npublic function getPrice()\n{\nreturn $this->price;\n\
  }\n```\n\n由于私有属性 `$price` 是在 `ShopProduct` 类中声明的，而非 `BookProduct`，因此在此处访问它的尝试会失败。解决此问题的方法是将\
  \ `$price` 声明为 protected，从而授予子类访问权限。请记住，受保护的属性或方法不能在其声明的类层次结构之外被访问。它只能从其原始类或其子类内部访问。\n\
  \n作为一般规则，应倾向于私有化。起初将属性设为 private 或 protected，然后仅在必要时放宽限制。类中的许多（若非大多数）方法都应是 public\
  \ 的，但同样，如有疑问，就将其锁定。为类中其他方法提供局部功能的方法与类的用户无关。请将其设为 `private` 或 `protected`。\n\n\n\n\
  ### 访问器方法\n\n即使客户程序员需要处理类持有的值，通常也应该拒绝直接访问属性，转而提供用于传递所需值的方法。这类方法被称为访问器，包括 getter\
  \ 和 setter。\n\n您已经看到了访问器方法带来的一个好处。您可以使用访问器根据情况过滤属性值，就像 `getPrice()` 方法所演示的那样。\n\n\
  您还可以使用 setter 方法来强制属性类型。类型声明可用于约束方法参数，但属性可以包含任何类型的数据。还记得使用 `ShopProduct` 对象输出列表数据的\
  \ `ShopProductWriter` 类吗？我可以进一步开发它，使其能够一次写入任意数量的 `ShopProduct` 对象：\n\n```\n// listing\
  \ 03.46\nclass ShopProductWriter\n{\npublic $products = [];\npublic function addProduct(ShopProduct\
  \ $shopProduct)\n{\n$this->products[] = $shopProduct;\n}\npublic function write()\n\
  {\n$str =  \"\";\nforeach ($this->products as $shopProduct) {\n$str .= \"{$shopProduct->title}:\
  \ \";\n$str .= $shopProduct->getProducer();\n$str .= \" ({$shopProduct->getPrice()})\\\
  n\";\n}\nprint $str;\n}\n}\n```\n\n`ShopProductWriter` 类现在更加实用了。它可以容纳多个 `ShopProduct`\
  \ 对象，并一次性为它们全部写入数据。不过，我必须信任我的客户程序员能够尊重该类的设计意图。尽管我提供了一个 `addProduct()` 方法，但我并没有阻止程序员直接操作\
  \ `$products` 属性。有人不仅可能向 `$products` 数组属性中添加错误类型的对象，甚至可能覆盖整个数组并将其替换为一个原始类型的值。我可以通过将\
  \ `$products` 属性设为私有来防止这种情况：\n\n```\nclass ShopProductWriter {\nprivate $products\
  \ = [];\n//...\n```\n\n现在，外部代码已经无法破坏 `$products` 属性了。所有访问都必须通过 `addProduct()` 方法进行，而我在方法声明中使用的类类型声明确保了只有\
  \ `ShopProduct` 对象才能被添加到该数组属性中。\n\n### ShopProduct 类\n\n让我们通过修改 `ShopProduct` 类及其子类以锁定访问控制来结束本章：\n\
  \n```\n// listing 03.48\nclass ShopProduct\n{\nprivate   $title;\nprivate   $producerMainName;\n\
  private   $producerFirstName;\nprotected $price;\nprivate   $discount = 0;\npublic\
  \ function __construct(\nstring $title,\nstring $firstName,\nstring $mainName,\n\
  float  $price\n) {\n$this->title             = $title;\n$this->producerFirstName\
  \ = $firstName;\n$this->producerMainName  = $mainName;\n$this->price           \
  \  = $price;\n}\npublic function getProducerFirstName()\n{\nreturn $this->producerFirstName;\n\
  }\npublic function getProducerMainName()\n{\nreturn $this->producerMainName;\n}\n\
  public function setDiscount($num)\n{\n$this->discount = $num;\n}\npublic function\
  \ getDiscount()\n{\nreturn $this->discount;\n}\npublic function getTitle()\n{\n\
  return $this->title;\n}\npublic function getPrice()\n{\nreturn ($this->price - $this->discount);\n\
  }\npublic function getProducer()\n{\nreturn $this->producerFirstName . ” ”\n. $this->producerMainName;\n\
  }\npublic function getSummaryLine()\n{\n$base  = \"{$this->title} ( {$this->producerMainName},\
  \ \";\n$base .= \"{$this->producerFirstName} )\";\nreturn $base;\n}\n}\n// listing\
  \ 03.49\nclass CdProduct extends ShopProduct\n{\nprivate $playLength;\npublic function\
  \ __construct(\nstring $title,\nstring $firstName,\nstring $mainName,\nfloat  $price,\n\
  int    $playLength\n) {\nparent::__construct(\n$title,\n$firstName,\n$mainName,\n\
  $price\n);\n$this->playLength = $playLength;\n}\npublic function getPlayLength()\n\
  {\nreturn $this->playLength;\n}\npublic function getSummaryLine()\n{\n$base  = \"\
  {$this->title} ( {$this->producerMainName}, \";\n$base .= \"{$this->producerFirstName}\
  \ )\";\n$base .= \": playing time - {$this->playLength}\";\nreturn $base;\n}\n}\n\
  // listing 03.50\nclass BookProduct extends ShopProduct\n{\nprivate $numPages;\n\
  public function __construct(\nstring $title,\nstring $firstName,\nstring $mainName,\n\
  float  $price,\nint    $numPages\n) {\nparent::__construct(\n$title,\n$firstName,\n\
  $mainName,\n$price\n);\n$this->numPages = $numPages;\n}\npublic function getNumberOfPages()\n\
  {\nreturn $this->numPages;\n}\npublic function getSummaryLine()\n{\n$base  = parent::getSummaryLine();\n\
  $base .= \": page count - $this->numPages\";\nreturn $base;\n}\npublic function\
  \ getPrice()\n{\nreturn $this->price;\n}\n}\n```\n\n这个版本的 `ShopProduct` 家族并没有什么实质性的新内容。所有属性要么是\
  \ `private`（私有）或 `protected`（受保护）的，并且我添加了许多访问器方法来完善它。\n\n## 总结\n\n本章涵盖了广泛的内容，将一个类从空实现带入了功能完备的继承层次结构。您接触了一些设计问题，特别是与类型和继承相关的问题。您了解了\
  \ PHP 对可见性的支持并探索了它的一些用途。在下一章中，我将向您展示更多 PHP 的面向对象特性。\n\n"
- "# 4. 高级特性\n\n您已经了解了类类型提示和访问控制如何让您更好地控制类的接口。在本章中，我将深入探讨 PHP 的面向对象特性。\n\n本章将涵盖以下几个主题：\n\
  \n- 静态方法和属性：通过类而不是对象访问数据和功能\n- 抽象类和接口：将设计与实现分离\n- 特性：在类层次结构之间共享实现\n- 错误处理：引入异常\n\
  - final 类和方法：限制继承\n- 拦截器方法：自动化委托\n- 析构方法：清理您的对象\n- 克隆对象：制作对象副本\n- 将对象解析为字符串：创建摘要方法\n\
  - 回调：使用匿名函数和类为组件添加功能\n\n\n\n## 静态方法与属性\n\n前一章的所有示例都涉及对象操作。我将类描述为生成对象的模板，而对象则是类的活动实例——即调用其方法、访问其属性的实体。我曾暗示，在面向对象编程中，实际工作是由类的实例完成的。毕竟，类仅仅是对象的模板。\n\
  \n事实上，情况并非如此简单。你可以在类的上下文（而非对象的上下文）中访问方法和属性。这类方法和属性是“静态的”，必须使用 `static` 关键字来声明：\n\
  \n```\n// 列表 04.01\nclass StaticExample\n{\nstatic public $aNum = 0;\npublic static\
  \ function sayHello()\n{\nprint \"hello\";\n}\n}\n```\n\n静态方法就是具有类作用域的函数。它们自身不能访问类中的任何普通属性，因为这些属性属于某个对象；然而，它们可以访问静态属性。如果你修改了一个静态属性，该类的所有实例都能访问到这个新值。\n\
  \n由于你通过类（而非实例）来访问静态元素，因此你不需要引用对象的变量。相反，你将类名与 `::` 结合使用，如下例所示：\n\n```\nprint StaticExample::$aNum;\n\
  StaticExample::sayHello();\n```\n\n这个语法应该在前一章中见过。我曾使用 `::` 结合 `parent` 来访问一个被覆盖的方法。现在和当时一样，我访问的是类数据而非对象数据。类代码可以使用\
  \ `parent` 关键字来访问超类，而无需使用其类名。若要在同一个类（而非子类）中访问静态方法或属性，我会使用 `self` 关键字。`self` 对于类而言，就如同\
  \ `$this` 伪变量对于对象。因此，从 `StaticExample` 类外部，我使用其类名访问 `$aNum` 属性：\n\n```\nStaticExample::$aNum;\n\
  ```\n\n在 `StaticExample` 类内部，我可以使用 `self` 关键字：\n\n```\n// 列表 04.02\nclass StaticExample\n\
  {\nstatic public $aNum = 0;\npublic static function sayHello()\n{\nself::$aNum++;\n\
  print \"hello (\".self::$aNum.\")\\n\";\n}\n}\n```\n\n**注意**\n\n使用 `parent` 进行方法调用，是唯一应该对非静态方法使用静态引用的情形。\n\
  \n除非你在访问一个被覆盖的方法，否则你只应使用 `::` 来访问那些被明确声明为静态的方法或属性。\n\n然而，在文档中，你常常会看到使用静态语法来指代某个方法或属性。这并不意味着该条目一定是静态的，而只是表示它属于某个特定的类。例如，`ShopProductWriter`\
  \ 类的 `write()` 方法可能被引用为 `ShopProductWriter::write()`，即便 `write()` 方法并非静态。当需要这种精确的层级指代时，你会在本文中看到这种语法。\n\
  \n根据定义，静态方法和属性是在类上调用，而非在对象上。因此，它们常被称为类变量和类属性。由于这种面向类的特性，你不能在静态方法内部使用 `$this` 伪变量。\n\
  \n那么，为什么要使用静态方法或属性呢？静态元素具有一些有用的特性。首先，它们可以在脚本的任何位置使用（假设你可以访问该类）。这意味着你无需将类的实例在对象间传递，或者更糟糕地，将实例存储在全局变量中，就能访问其功能。其次，静态属性对类的每个实例都可用，因此你可以设置希望该类型的所有成员都能访问的值。最后，你无需实例化对象即可访问静态属性或方法，这可以避免你仅仅为了使用一个简单函数就去实例化一个对象。\n\
  \n为了说明这一点，我将为 `ShopProduct` 类构建一个静态方法，用于自动化 `ShopProduct` 对象的实例化过程。使用 SQLite，我可能会定义一个如下的\
  \ `products` 表：\n\n```\nCREATE TABLE products (\nid INTEGER PRIMARY KEY AUTOINCREMENT,\n\
  type TEXT,\nfirstname TEXT,\nmainname TEXT,\ntitle TEXT,\nprice float,\nnumpages\
  \ int,\nplaylength int,\ndiscount int )\n```\n\n现在，我想构建一个 `getInstance()` 方法，该方法接收一个行\
  \ ID 和一个 `PDO` 对象，利用它们获取数据库行，然后返回一个 `ShopProduct` 对象。我可以将这些方法添加到我在前一章创建的 `ShopProduct`\
  \ 类中。你可能知道，PDO 代表 PHP 数据对象。`PDO` 类为不同的数据库应用程序提供了一个通用接口：\n\n```\n// 列表 04.03\n//\
  \ ShopProduct 类...\nprivate $id = 0;\n// ...\npublic function setID(int $id)\n{\n\
  $this->id = $id;\n}\n// ...\npublic static function getInstance(int $id, \\PDO $pdo):\
  \ ShopProduct\n{\n$stmt = $pdo->prepare(\"select * from products where id=?\");\n\
  $result = $stmt->execute([$id]);\n$row = $stmt->fetch();\nif (empty($row)) {\nreturn\
  \ null;\n}\nif ($row['type'] == \"book\") {\n$product = new BookProduct(\n$row['title'],\n\
  $row['firstname'],\n$row['mainname'],\n(float) $row['price'],\n(int) $row['numpages']\n\
  );\n} elseif ($row['type'] == \"cd\") {\n$product = new CdProduct(\n$row['title'],\n\
  $row['firstname'],\n$row['mainname'],\n(float) $row['price'],\n(int) $row['playlength']\n\
  );\n} else {\n$firstname = (is_null($row['firstname'])) ? \"\" : $row['firstname'];\n\
  $product = new ShopProduct(\n$row['title'],\n$firstname,\n$row['mainname'],\n(float)\
  \ $row['price']\n);\n}\n$product->setId((int) $row['id']);\n$product->setDiscount((int)\
  \ $row['discount']);\nreturn $product;\n}\n```\n\n如你所见，`getInstance()` 方法返回一个 `ShopProduct`\
  \ 对象，并且能够根据类型标志智能地确定应该实例化哪个具体的子类。为了保持示例简洁，我省略了所有错误处理。在真实的版本中，例如，我不会轻信所提供的 `PDO`\
  \ 对象已初始化并连接到正确的数据库。实际上，我可能会用一个类来封装 `PDO`，以确保这种行为。关于面向对象编程和数据库的更多内容，你可以在第 13 章中阅读。\n\
  \n这个方法在类的上下文比在对象的上下文中更有用。它让你可以轻松地将来自数据库的原始数据转换为一个对象，而无需一开始就有一个 `ShopProduct` 对象。该方法不使用任何实例属性或方法，因此没有理由不将其声明为\
  \ `static`。给定一个有效的 `PDO` 对象，我可以在应用程序的任何位置调用此方法：\n\n```\n$dsn = \"sqlite:/\".__DIR__.\"\
  /products.db\";\n$pdo = new \\PDO($dsn, null, null);\n$pdo->setAttribute(\\PDO::ATTR_ERRMODE,\
  \ \\PDO::ERRMODE_EXCEPTION);\n$obj = ShopProduct::getInstance(1, $pdo);\n```\n\n\
  这类方法充当“工厂”，因为它们接收原始材料（如行数据或配置信息）并用它们来生成对象。“工厂”这一术语用于指代设计用来生成对象实例的代码。你将在未来的章节中再次遇到工厂示例。\n\
  \n当然，从某些方面来看，这个示例在解决问题的同时也带来了不少问题。尽管我让 `ShopProduct::getInstance()` 方法无需 `ShopProduct`\
  \ 实例即可在系统中的任何位置访问，但我同时也要求客户端代码提供一个 `PDO` 对象。这个对象从哪里来呢？而且，父类对其子类拥有如此深入的了解，这真的是一个好实践吗？（提示：不，不是。）这类问题——到哪里获取关键对象和值，以及类之间应该相互了解多少——在面向对象编程中非常常见。我将在第\
  \ 9 章探讨各种处理对象生成的方法。\n\n\n\n### 常量属性\n\n有些属性不应被更改。生命、宇宙以及万事万物的答案是 42，而你希望它保持不变。错误和状态标志通常会硬编码到你的类中。尽管它们应该被公开且静态地访问，但客户端代码不应能够修改它们。\n\
  \nPHP 允许你在类中定义常量属性。与全局常量一样，类常量一旦设置便无法更改。常量属性使用`const`关键字声明。常量与普通属性不同，它们不以美元符号为前缀。按照惯例，它们通常仅使用大写字母命名：\n\
  \n```\n// listing 04.04\nclass ShopProduct\n{\nconst AVAILABLE      = 0;\nconst\
  \ OUT_OF_STOCK   = 1;\n// ...\n```\n\n常量属性只能包含原始值。你不能将对象赋值给常量。与静态属性一样，常量属性通过类而非实例来访问。就像定义常量时不带美元符号一样，引用常量时也不需要前导符号：\n\
  \n```\nprint ShopProduct::AVAILABLE;\n```\n\n一旦声明常量后尝试为其设置值将会导致解析错误。\n\n当你的属性需要在类的所有实例中可用，并且属性值需要固定不变时，你应该使用常量。\n\
  \n### 抽象类\n\n抽象类不能被实例化。相反，它定义（并且可选地部分实现）了任何可能扩展它的类的接口。\n\n你使用`abstract`关键字来定义抽象类。这里我重新定义上一章创建的`ShopProductWriter`类，这次将其作为抽象类：\n\
  \n```\n// listing 04.05\nabstract class ShopProductWriter\n{\nprotected $products\
  \ = [];\npublic function addProduct(ShopProduct $shopProduct)\n{\n$this->products[]\
  \ = $shopProduct;\n}\n}\n```\n\n你可以像平常一样创建方法和属性，但任何尝试以这种方式实例化抽象对象的做法都将导致错误：\n\n\
  ```\n$writer = new ShopProductWriter();\n```\n\n你可以在以下输出中看到错误：\n\n```\nError: Cannot\
  \ instantiate abstract class popp\\ch04\\batch03\\ShopProductWriter\n```\n\n在大多数情况下，抽象类将至少包含一个抽象方法。这些方法同样使用`abstract`关键字声明。抽象方法不能有实现。你以正常方式声明它，但以分号而不是方法体结束声明。这里我向`ShopProductWriter`类添加一个抽象的`write()`方法：\n\
  \n```\nabstract class ShopProductWriter\n{\nprotected $products = [];\npublic function\
  \ addProduct(ShopProduct $shopProduct)\n{\n$this->products[]=$shopProduct;\n}\n\
  abstract public function write();\n}\n```\n\n通过创建抽象方法，你确保了所有具体的子类都将提供一个实现，但将该实现的细节留待未定义。\n\
  \n假设我创建一个派生自`ShopProductWriter`的类，但未实现`write()`方法，如下例所示：\n\n```\nclass ErroredWriter\
  \ extends ShopProductWriter\n{\n}\n```\n\n我将面临以下错误：\n\n```\nPHP Fatal error:  Class\
  \ ErroredWriter contains 1 abstract method and\nmust therefore be declared abstract\
  \ or implement the remaining methods\n(ShopProductWriter::write) in...\n```\n\n\
  因此，任何扩展抽象类的类必须实现所有抽象方法，或者自身被声明为抽象类。扩展类不仅负责实现抽象方法，还必须在实现时重现方法签名。这意味着实现方法的访问控制不能比抽象方法更严格。实现方法还应要求与抽象方法相同数量的参数，并重现任何类类型提示。\n\
  \n以下是`ShopProductWriter`的两个实现：\n\n```\n// listing 04.06\nclass XmlProductWriter\
  \ extends ShopProductWriter\n{\npublic function write()\n{\n$writer = new \\XMLWriter();\n\
  $writer->openMemory();\n$writer->startDocument('1.0', 'UTF-8');\n$writer->startElement(\"\
  products\");\nforeach ($this->products as $shopProduct) {\n$writer->startElement(\"\
  product\");\n$writer->writeAttribute(\"title\", $shopProduct->getTitle());\n$writer->startElement(\"\
  summary\");\n$writer->text($shopProduct->getSummaryLine());\n$writer->endElement();\
  \ // summary\n$writer->endElement(); // product\n}\n$writer->endElement(); // products\n\
  $writer->endDocument();\nprint $writer->flush();\n}\n}\n// listing 04.07\nclass\
  \ TextProductWriter extends ShopProductWriter\n{\npublic function write()\n{\n$str\
  \ = \"PRODUCTS:\\n\";\nforeach ($this->products as $shopProduct) {\n$str .= $shopProduct->getSummaryLine().\"\
  \\n\";\n}\nprint $str;\n}\n}\n```\n\n我创建了两个类，每个都有自己的`write()`方法实现。第一个输出 XML，第二个输出文本。一个需要`ShopProductWriter`对象的方法不会知道它接收的是这两个类中的哪一个，但它可以绝对确定`write()`方法已被实现。请注意，我在将`$products`作为数组处理之前并未测试其类型。这是因为在`ShopProductWriter`中，该属性被初始化为一个空数组。\n\
  \n\n\n### 接口\n\n尽管抽象类允许你提供一定程度的实现，但接口是纯粹的模板。接口只能定义功能，绝不能实现它。接口使用 `interface` 关键字声明。它可以包含属性和方法声明，但不能包含方法体。\n\
  \n以下是一个接口示例：\n\n```\n// listing 04.08\ninterface Chargeable\n{\npublic function\
  \ getPrice(): float;\n}\n```\n\n如你所见，接口看起来非常像类。任何包含该接口的类都必须实现其定义的所有方法，否则必须声明为抽象类。\n\
  \n类可以在其声明中使用 `implements` 关键字实现接口。完成此操作后，实现接口的过程与扩展一个仅包含抽象方法的抽象类相同。现在我将让 `ShopProduct`\
  \ 类实现 `Chargeable`：\n\n```\n// listing 04.09\nclass ShopProduct implements Chargeable\n\
  {\n// ...\nprotected $price;\n// ...\npublic function getPrice(): float\n{\nreturn\
  \ $this->price;\n}\n// ...\n}\n```\n\n`ShopProduct` 已经有一个 `getPrice()` 方法，那么实现 `Chargeable`\
  \ 接口有什么用呢？答案再次与类型有关。实现类会同时获得它所继承的父类类型和它所实现的接口类型。\n\n这意味着 `CdProduct` 类属于以下类型：\n\n\
  ```\nCdProduct\nShopProduct\nChargeable\n```\n\n这一点可以被客户端代码利用。了解对象的类型就是了解其能力。请考虑以下方法：\n\
  \n```\npublic function cdInfo(CdProduct $prod)\n{\n// ...\n}\n```\n\n该方法知道 `$prod`\
  \ 对象除了拥有 `ShopProduct` 类和 `Chargeable` 接口中定义的所有方法外，还有一个 `getPlayLength()` 方法。\n\n\
  如果传递同一个对象，该方法知道 `$prod` 支持 `ShopProduct` 中的所有方法：\n\n```\npublic function addProduct(ShopProduct\
  \ $prod)\n{\n// ...\n}\n```\n\n然而，未经进一步测试，该方法对 `getPlayLength()` 方法一无所知。\n\n同样，传递同一个\
  \ `CdProduct` 对象，该方法对 `ShopProduct` 或 `CdProduct` 类型完全不知晓：\n\n```\npublic function\
  \ addChargeableItem(Chargeable $item)\n{\n//...\n}\n```\n\n但该方法只关心 `$item` 参数是否包含一个\
  \ `getPrice()` 方法。\n\n因为任何类都可以实现接口（实际上，一个类可以实现任意数量的接口），所以接口可以有效地将原本无关的类型连接起来。我可以定义一个全新的类来实现\
  \ `Chargeable`：\n\n```\nclass Shipping implements Chargeable\n{\npublic function\
  \ getPrice(): float\n{\n//...\n}\n}\n```\n\n我可以将一个 `Shipping` 对象传递给 `addChargeableItem`\
  \ 方法，就像传递一个 `ShopProduct` 对象一样。\n\n对于处理 `Chargeable` 对象的客户端来说，重要的是它可以调用 `getPrice()`\
  \ 方法。任何其他可用的方法，无论是通过对象自身的类、父类还是其他接口，都与其他类型相关联。这些与客户端无关。\n\n一个类既可以扩展一个父类，也可以实现任意数量的接口。`extends`\
  \ 子句应位于 `implements` 子句之前：\n\n```\nclass Consultancy extends TimedService implements\
  \ Bookable, Chargeable\n{\n// ...\n}\n```\n\n请注意，`Consultancy` 类实现了多个接口。多个接口排列在\
  \ `implements` 关键字之后，用逗号分隔。\n\nPHP 只支持单一父类继承，因此 `extends` 关键字后只能跟一个类名。\n\n## 特质\n\
  \n如我们所见，接口帮助你管理这样一个事实：与 Java 一样，PHP 不支持多重继承。换句话说，PHP 中的类只能扩展一个父类。但是，你可以让一个类承诺实现任意数量的接口；每实现一个接口，该类就获得相应的类型。\n\
  \n因此，接口提供了类型，但不提供实现。但是，如果你想在继承层次结构之间共享实现呢？PHP 5.4 引入了特质，这正好解决了这个问题。\n\n特质是一种类似类的结构，它本身不能被实例化，但可以被合并到类中。特质中定义的任何方法都会成为使用它的类的一部分。特质会改变类的结构，但不会改变其类型。可以把特质看作是类的“包含文件”。\n\
  \n让我们看看特质为什么会有用。\n\n### 特质要解决的问题\n\n这是 `ShopProduct` 类的一个版本，其中包含一个 `calculateTax()`\
  \ 方法：\n\n```\n// listing 04.10\nclass ShopProduct\n{\nprivate $taxrate = 17;\n//\
  \ ...\npublic function calculateTax(float $price): float\n{\nreturn (($this->taxrate\
  \ / 100) * $price);\n}\n}\n// listing 04.11\n$p = new ShopProduct(\"Fine Soap\"\
  , \"\", \"Bob's Bathroom\", 1.33);\nprint $p->calculateTax(100) . \"\\n\";\n```\n\
  \n`calculateTax()` 方法接受一个 `$price` 参数，并基于私有的 `$taxrate` 属性计算销售税金额。\n\n当然，子类可以访问\
  \ `calculateTax()`。但完全不同的类层次结构呢？想象一个名为 `UtilityService` 的类，它继承自另一个类 `Service`。如果\
  \ `UtilityService` 需要使用相同的例程，我可能会发现自己需要完整地重复编写 `calculateTax()`：\n\n```\nabstract\
  \ class Service\n{\n// 面向服务的功能\n}\nclass UtilityService extends Service\n{\nprivate\
  \ $taxrate = 17;\nfunction calculateTax(float $price): float\n{\nreturn ( ( $this->taxrate/100\
  \ ) * $price );\n}\n}\n$u = new UtilityService();\nprint $u->calculateTax(100).\"\
  \\n\";\n```\n\n### 定义和使用特质\n\n我将在本书中介绍的面向对象设计核心目标之一是消除重复。正如你在第 11 章中看到的，解决这种重复的一种方法是将其提取到可重用的策略类中。特质提供了另一种方法——也许不够优雅，但肯定有效。\n\
  \n这里我声明一个定义 `calculateTax()` 方法的单一特质，然后将其同时包含在 `ShopProduct` 和 `UtilityService`\
  \ 中：\n\n```\n// listing 04.12\ntrait PriceUtilities\n{\nprivate $taxrate = 17;\n\
  public function calculateTax(float $price): float\n{\nreturn (($this->taxrate /\
  \ 100) * $price);\n}\n// 其他实用功能\n}\n// listing 04.13\nclass ShopProduct\n{\nuse\
  \ PriceUtilities;\n}\n// listing 04.14\nabstract class Service\n{\n// 面向服务的功能\n\
  }\n// listing 04.15\nclass UtilityService extends Service\n{\nuse PriceUtilities;\n\
  }\n// listing 04.16\n$p = new ShopProduct();\nprint $p->calculateTax(100) . \"\\\
  n\";\n$u = new UtilityService();\nprint $u->calculateTax(100) . \"\\n\";\n```\n\n\
  我使用 `trait` 关键字声明了 `PriceUtilities` 特质。特质的主体看起来与类的主体非常相似。它只是花括号内的一组方法和属性。一旦声明完成，我就可以在我的类中访问\
  \ `PriceUtilities` 特质。我通过 `use` 关键字后跟要合并的特质名称来实现这一点。因此，在一个地方声明并实现了 `calculateTax()`\
  \ 方法后，我便将其包含到 `ShopProduct` 和 `UtilityService` 这两个类中。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n### 使用多个 Trait\n\n你可以在一个类中包含多个 Trait，方法是在 `use` 关键字后列出每个 Trait，并用逗号分隔。在本例中，我定义并应用了一个新的\
  \ Trait `IdentityTrait`，同时保留了原有的 `PriceUtilities` Trait：\n\n```\n// listing 04.17\n\
  trait IdentityTrait\n{\npublic function generateId(): string\n{\nreturn uniqid();\n\
  }\n}\n// listing 04.18\nclass ShopProduct\n{\nuse PriceUtilities, IdentityTrait;\n\
  }\n// listing 04.19\n$p = new ShopProduct();\nprint $p->calculateTax(100) . \"\\\
  n\";\nprint $p->generateId() . \"\\n\";\n```\n\n通过使用 `use` 关键字同时应用 `PriceUtilities`\
  \ 和 `IdentityTrait`，我使得 `calculateTax()` 和 `generateId()` 方法对 `ShopProduct` 类可用。这意味着该类提供了\
  \ `calculateTax()` 和 `generateId()` 两个方法。\n\n**注意**\n\n`IdentityTrait` 提供了 `generateId()`\
  \ 方法。实际上，数据库通常会为对象生成标识符，但为了测试目的，你可能会切换为本地实现。你可以在第 12 章（涵盖了标识映射模式）了解更多关于对象、数据库和唯一标识符的信息。你可以在第\
  \ 18 章了解更多关于测试和模拟（mocking）的内容。\n\n### 结合 Trait 和接口\n\n尽管 Trait 非常有用，但它们并不会改变应用它们的类的类型。因此，当你将\
  \ `IdentityTrait` 应用到多个类时，这些类不会共享一个可用于方法签名中类型提示的类型。\n\n幸运的是，Trait 能与接口很好地协同工作。我可以定义一个要求包含\
  \ `generateId()` 方法的接口，然后声明 `ShopProduct` 实现该接口：\n\n```\n// listing 04.20\ninterface\
  \ IdentityObject\n{\npublic function generateId(): string;\n}\n// listing 04.21\n\
  trait IdentityTrait\n{\npublic function generateId(): string\n{\nreturn uniqid();\n\
  }\n}\n// listing 04.22\nclass ShopProduct implements IdentityObject\n{\nuse PriceUtilities,\
  \ IdentityTrait;\n}\n```\n\n和之前一样，`ShopProduct` 使用了 `IdentityTrait`。然而，此时通过它导入的方法\
  \ `generateId()` 也履行了对 `IdentityObject` 接口的承诺。这意味着我们可以将 `ShopProduct` 对象传递给那些使用类型提示来要求\
  \ `IdentityObject` 实例的方法和函数，如下所示：\n\n```\n// listing 04.23\npublic static function\
  \ storeIdentityObject(IdentityObject $idobj)\n{\n// do something with the IdentityObject\n\
  }\n// listing 04.24\n$p = new ShopProduct();\nself::storeIdentityObject($p);\nprint\
  \ $p->calculateTax(100) . \"\\n\";\nprint $p->generateId() . \"\\n\";\n```\n\n###\
  \ 使用 `insteadof` 管理方法名冲突\n\n组合 Trait 的能力是一个很好的特性，但冲突迟早是不可避免的。例如，考虑一下如果我使用了两个都提供\
  \ `calculateTax()` 方法的 Trait 会发生什么：\n\n```\n// listing 04.25\ntrait TaxTools\n{\n\
  function calculateTax(float $price): float\n{\nreturn 222;\n}\n}\n// listing 04.26\n\
  trait PriceUtilities\n{\nprivate $taxrate = 17;\npublic function calculateTax(float\
  \ $price): float\n{\nreturn (($this->taxrate / 100) * $price);\n}\n// other utilities\n\
  }\n// listing 04.27\nclass UtilityService extends Service\n{\nuse PriceUtilities,\
  \ TaxTools;\n}\n// listing 04.28\n$u = new UtilityService();\nprint $u->calculateTax(100)\
  \ . \"\\n\";\n```\n\n因为我包含了两个都含有 `calculateTax()` 方法的 Trait，PHP 无法确定哪个应该覆盖另一个。结果是产生一个致命错误：\n\
  \n```\nPHP Fatal error:  Trait method calculateTax has not been applied, because\
  \ there\nare collisions with other trait methods on...\n```\n\n为了解决这个问题，我可以使用 `insteadof`\
  \ 关键字。方法如下：\n\n```\n// listing 04.29\nclass UtilityService extends Service\n{\n\
  use PriceUtilities, TaxTools {\nTaxTools::calculateTax insteadof PriceUtilities;\n\
  }\n}\n// listing 04.30\n$u = new UtilityService();\nprint $u->calculateTax(100)\
  \ . \"\\n\";\n```\n\n为了对 `use` 语句应用进一步的指令，我首先必须添加一个主体。我通过使用花括号 `{}` 来实现这一点。在这个块内，我使用\
  \ `insteadof` 操作符。它的左侧需要一个完整的方法引用（即，通过作用域解析操作符分隔的 Trait 和方法名）。在右侧，`insteadof` 需要提供其等效方法应被覆盖的\
  \ Trait 名称：\n\n```\nTaxTools::calculateTax insteadof PriceUtilities;\n```\n\n前面的代码片段意思是：“使用\
  \ `TaxTools` 的 `calculateTax()` 方法，而不是 `PriceUtilities` 中的同名方法。”\n\n所以，当我运行这段代码时，会得到我植入到\
  \ `TaxTools::calculateTax()` 中的模拟输出：\n\n```\n\n```\n\n### 为被覆盖的 Trait 方法设置别名\n\n\
  我们已经看到，你可以使用 `insteadof` 来消除方法歧义。但是，如果你想随后访问被覆盖的方法，该怎么办？`as` 操作符允许你为 Trait 方法设置别名。同样，`as`\
  \ 操作符的左侧需要一个方法的完整引用。在操作符的右侧，你应该放置别名的名称。例如，这里我使用新名称 `basicTax()` 恢复了 `PriceUtilities`\
  \ Trait 的 `calculateTax()` 方法：\n\n```\n// listing 04.31\nclass UtilityService extends\
  \ Service\n{\nuse PriceUtilities, TaxTools {\nTaxTools::calculateTax insteadof PriceUtilities;\n\
  PriceUtilities::calculateTax as basicTax;\n}\n}\n// listing 04.32\n$u = new UtilityService();\n\
  print $u->calculateTax(100) . \"\\n\";\nprint $u->basicTax(100) . \"\\n\";\n```\n\
  \n这将产生以下输出：\n\n```\n\n```\n\n因此，`PriceUtilities::calculateTax()` 已作为 `UtilityService`\
  \ 类的一部分，以名称 `basicTax()` 重新启用。\n\n**注意**\n\n当在 Trait 之间发生方法名冲突时，仅仅在 `use` 块中为其中一个方法名设置别名是不够的。你必须首先使用\
  \ `insteadof` 操作符确定哪个方法覆盖另一个。然后，你可以使用 `as` 操作符为被丢弃的方法分配一个新名称。\n\n顺便提一下，即使没有名称冲突，你也可以使用方法名别名。例如，你可能想要使用一个\
  \ Trait 的方法来实现父类或接口中声明的抽象方法签名。\n\n### 在 Trait 中使用静态方法\n\n到目前为止，你看到的大多数示例都可以使用静态方法，因为它们不存储实例数据。在\
  \ Trait 中放置静态方法并不复杂。这里我修改了 `PriceUtilities::$taxrate` 属性和 `PriceUtilities::calculateTax()`\
  \ 方法，使其变为静态：\n\n```\n// listing 04.33\ntrait PriceUtilities\n{\nprivate static $taxrate\
  \ = 17;\npublic static function calculateTax(float $price): float\n{\nreturn ((self::$taxrate\
  \ / 100) * $price);\n}\n// other utilities\n}\n// listing 04.34\nclass UtilityService\
  \ extends Service\n{\nuse PriceUtilities;\n}\n// listing 04.35\n$u = new UtilityService();\n\
  print $u::calculateTax(100) . \"\\n\";\n```\n\n正如你所料，此脚本输出如下：\n\n```\n\n```\n\n\
  所以，静态方法在 Trait 中声明，并通过宿主类按常规方式访问。\n\n\n\n### 访问宿主类的属性\n\n你可能认为，就 trait 而言，静态方法确实是唯一可行的方式。即使那些没有声明为静态的\
  \ trait 方法，本质上也是静态的，对吧？嗯，实际上这么想是错误的——你可以访问宿主类中的属性和方法：\n\n```\n// listing 04.36\n\
  trait PriceUtilities\n{\nfunction calculateTax(float $price): float\n{\n// 这样设计好吗？\n\
  return (($this->taxrate / 100) * $price);\n}\n// 其他工具方法\n}\n// listing 04.37\nclass\
  \ UtilityService extends Service\n{\npublic $taxrate = 17;\nuse PriceUtilities;\n\
  }\n// listing 04.38\n$u = new UtilityService();\nprint $u->calculateTax(100) . \"\
  \\n\";\n```\n\n在上面的代码中，我修改了 `PriceUtilities` trait，使其能够访问宿主类中的一个属性。如果你认为这是一个糟糕的设计，那么你是对的。这是一个非常糟糕的设计。虽然\
  \ trait 访问其宿主类设置的数据很有用，但并没有任何东西要求 `UtilityService` 类必须提供一个 `$taxrate` 属性。请记住，trait\
  \ 应该能被许多不同的类使用。有什么保证，或者说有多大可能性，所有宿主类都会声明一个 `$taxrate` 呢？\n\n另一方面，如果能建立一个约定，本质上说“如果你使用这个\
  \ trait，那么你必须为其提供某些资源”，那将非常棒。\n\n事实上，你可以精确地实现这种效果。Trait 支持抽象方法。\n\n### 在 Trait 中定义抽象方法\n\
  \n你可以在 trait 中定义抽象方法，就像在类中定义一样。当一个类使用了某个 trait，它就有义务实现该 trait 中声明的所有抽象方法。\n\n有了这个知识，我可以重新实现之前的例子，使得\
  \ trait 强制使用它的类提供税率信息：\n\n```\n// listing 04.39\ntrait PriceUtilities\n{\nfunction\
  \ calculateTax(float $price): float\n{\n// 更好的设计……我们知道 getTaxRate() 已经被实现了\nreturn\
  \ (($this->getTaxRate() / 100) * $price);\n}\nabstract function getTaxRate(): float;\n\
  // 其他工具方法\n}\n// listing 04.40\nclass UtilityService extends Service\n{\nuse PriceUtilities;\n\
  public function getTaxRate(): float\n{\nreturn 17;\n}\n}\n// listing 04.41\n$u =\
  \ new UtilityService();\nprint $u->calculateTax(100) . \"\\n\";\n```\n\n通过在 `PriceUtilities`\
  \ trait 中声明一个抽象的 `getTaxRate()` 方法，我强制 `UtilityService` 类提供一个实现。当然，由于 PHP 不约束返回类型，`UtilityService::calculateTax()`\
  \ 方法不能绝对确定它能从 `getTaxRate()` 得到一个合理的值。你可以通过编写各种检查例程来在一定程度上克服这个问题，但这偏离了重点。通过要求实现一个或两个方法，向客户端程序员发出她应该提供某些信息的信号，这很可能已经足够了。\n\
  \n### 更改 Trait 方法的访问权限\n\n当然，你可以将 trait 方法声明为 `public`、`private` 或 `protected`。但是，你也可以在使用该\
  \ trait 的类内部更改此访问权限。你已经看到 `as` 运算符可以用来为方法起别名。如果你在此运算符的右侧使用访问修饰符，它将更改方法的访问级别，而不是其名称。\n\
  \n例如，假设你希望只在 `UtilityService` 内部使用 `calculateTax()`，而不让实现代码访问它。以下是你需要如何更改 `use`\
  \ 语句：\n\n```\n// listing 04.42\ntrait PriceUtilities\n{\npublic function calculateTax(float\
  \ $price): float\n{\nreturn (($this->getTaxRate() / 100) * $price);\n}\npublic abstract\
  \ function getTaxRate(): float;\n// 其他工具方法\n}\n// listing 04.43\nclass UtilityService\
  \ extends Service\n{\nuse PriceUtilities {\nPriceUtilities::calculateTax as private;\n\
  }\nprivate $price;\npublic function __construct(float $price)\n{\n$this->price =\
  \ $price;\n}\npublic function getTaxRate(): float\n{\nreturn 17;\n}\npublic function\
  \ getFinalPrice(): float\n{\nreturn ($this->price + $this->calculateTax($this->price));\n\
  }\n}\n// listing 04.44\n$u = new UtilityService(100);\nprint $u->getFinalPrice()\
  \ . \"\\n\";\n```\n\n我将 `as` 运算符与 `private` 关键字结合使用，以便将 `calculateTax()` 设置为私有访问。这意味着我可以从\
  \ `getFinalPrice()` 方法内部访问它。以下是从外部尝试访问 `calculateTax()` 的代码：\n\n```\n$u = new UtilityService(100);\n\
  print $u->calculateTax().\"\\n\";\n```\n\n不幸的是，这段代码会产生一个错误：\n\n```\nError: Call\
  \ to private method popp\\ch04\\batch06_9\\UtilityService::calculateTax() from context\
  \ ...\n```\n\n\n\n## 后期静态绑定：`static`关键字\n\n既然你已经了解了抽象类、特质和接口，是时候短暂回顾一下静态方法了。你知道静态方法可以用作工厂，一种生成其所属类实例的方式。如果你和我一样是个懒惰的程序员，你可能会对下面这个例子中的重复代码感到厌烦：\n\
  \n```\n// listing 04.45\nabstract class DomainObject\n{\n}\n// listing 04.46\nclass\
  \ User extends DomainObject\n{\npublic static function create(): User\n{\nreturn\
  \ new User();\n}\n}\n// listing 04.47\nclass Document extends DomainObject\n{\n\
  public static function create(): Document\n{\nreturn new Document();\n}\n}\n```\n\
  \n我创建了一个名为 `DomainObject` 的超类。当然，在实际项目中，它会包含其子类共有的功能。然后我创建了两个子类：`User` 和 `Document`。我希望我的具体类拥有静态的\
  \ `create()` 方法。\n\n既然构造函数已经能完成创建对象的工作，为什么还要使用静态工厂方法呢？在第 12 章，我将描述一种名为“标识映射”的模式。只有当具有相同区分特征的对象尚未被管理时，标识映射组件才会生成并管理新对象；如果目标对象已存在，则返回该对象。像\
  \ `create()` 这样的工厂方法会是此类组件的一个良好客户。\n\n这段代码运行良好，但存在着令人厌烦的重复。我不希望为我创建的每个 `DomainObject`\
  \ 子类都编写这样的模板代码。因此，我尝试将 `create()` 方法上移到超类：\n\n```\n// listing 04.48\nabstract class\
  \ DomainObject\n{\npublic static function create(): DomainObject\n{\nreturn new\
  \ self();\n}\n}\n// listing 04.49\nclass User extends DomainObject\n{\n}\n// listing\
  \ 04.50\nclass Document extends DomainObject\n{\n}\n// listing 04.51\nDocument::create();\n\
  ```\n\n嗯，这看起来很简洁。我现在把通用代码放在了同一个地方，并且使用了 `self` 来引用当前类。但我对 `self` 关键字做了一个假设。实际上，它对于类的作用方式与\
  \ `$this` 对于对象的作用方式并不完全相同。`self` 并不指代调用时的上下文；它指代的是定义时的上下文。因此，如果我运行前面的例子，我会得到如下结果：\n\
  \n```\nError: Cannot instantiate abstract class popp\\ch04\\batch06\\DomainObject\n\
  ```\n\n所以 `self` 解析为 `DomainObject`，即定义 `create()` 方法的地方，而不是 `Document`，即调用该方法时的类。在\
  \ PHP 5.3 之前，这是一个严重的限制，催生了许多相当笨拙的解决方案。PHP 5.3 引入了一个名为“后期静态绑定”的概念。这一特性最明显的体现就是 `static`\
  \ 关键字。`static` 与 `self` 类似，区别在于它指代的是调用时的类，而不是定义时的类。在这种情况下，这意味着调用 `Document::create()`\
  \ 会生成一个新的 `Document` 对象，而不会试图去实例化一个 `DomainObject` 对象——那注定会失败。\n\n所以现在我可以利用静态上下文中的继承关系了：\n\
  \n```\nabstract class DomainObject\n{\npublic static function create(): DomainObject\n\
  {\nreturn new static();\n}\n}\nclass User extends DomainObject\n{\n}\nclass Document\
  \ extends DomainObject\n{\n}\nprint_r(Document::create());\nDocument Object\n(\n\
  )\n```\n\n`static` 关键字不仅可用于实例化。与 `self` 和 `parent` 一样，`static` 也可以用作静态方法调用的标识符，即使是在非静态上下文中也是如此。假设我想为我的\
  \ `DomainObject` 类引入“分组”的概念。默认情况下，在我的新分类中，所有类都属于“default”类别，但我希望能为继承体系中的某些分支覆盖这一设置：\n\
  \n```\n// listing 04.52\nabstract class DomainObject\n{\nprivate $group;\npublic\
  \ function __construct()\n{\n$this->group = static::getGroup();\n}\npublic static\
  \ function create(): DomainObject\n{\nreturn new static();\n}\npublic static function\
  \ getGroup(): string\n{\nreturn \"default\";\n}\n}\n// listing 04.53\nclass User\
  \ extends DomainObject\n{\n}\n// listing 04.54\nclass Document extends DomainObject\n\
  {\npublic static function getGroup(): string\n{\nreturn \"document\";\n}\n}\n//\
  \ listing 04.55\nclass SpreadSheet extends Document\n{\n}\n// listing 04.56\nprint_r(User::create());\n\
  print_r(SpreadSheet::create());\n```\n\n我在 `DomainObject` 类中引入了一个构造函数。它使用 `static`\
  \ 关键字来调用一个静态方法：`getGroup()`。`DomainObject` 提供了默认实现，但 `Document` 覆盖了它。我还创建了一个新类 `SpreadSheet`，它继承自\
  \ `Document`。以下是输出结果：\n\n```\npopp\\ch04\\batch07\\User Object\n(\n[group:popp\\\
  ch04\\batch07\\DomainObject:private] => default\n)\npopp\\ch04\\batch07\\SpreadSheet\
  \ Object\n(\n[group:popp\\ch04\\batch07\\DomainObject:private] => document\n)\n\
  ```\n\n对于 `User` 类，不需要做什么巧妙的事。`DomainObject` 构造函数调用了 `getGroup()` 并且在其自身找到了该方法。然而，对于\
  \ `SpreadSheet`，查找是从被调用的类 `SpreadSheet` 本身开始的。它没有提供实现，因此调用了 `Document` 类中的 `getGroup()`\
  \ 方法。在 PHP 5.3 和后期静态绑定出现之前，我在这里会被迫使用 `self` 关键字，那只能在 `DomainObject` 类中查找 `getGroup()`。\n\
  \n\n\n## 处理错误\n\n总会有意外发生。文件放错位置、数据库服务器未初始化、URL 变更、XML 文件损坏、权限设置不当、磁盘配额超限……诸如此类的问题层出不穷。在预见各种问题的过程中，一个简单的方法有时会因自身庞大的错误处理代码而难以维系。\n\
  \n以下是一个简单的 `Conf` 类，用于在 XML 配置文件中存储、检索和设置数据：\n\n```\n// listing 04.57\nclass Conf\n\
  {\nprivate $file;\nprivate $xml;\nprivate $lastmatch;\npublic function __construct(string\
  \ $file)\n{\n$this->file = $file;\n$this->xml = simplexml:load_file($file);\n}\n\
  public function write()\n{\nfile_put_contents($this->file, $this->xml->asXML());\n\
  }\npublic function get(string $str)\n{\n$matches = $this->xml->xpath(\"/conf/item[@name=\\\
  \"$str\\\"]\");\nif (count($matches)) {\n$this->lastmatch = $matches[0];\nreturn\
  \ (string)$matches[0];\n}\nreturn null;\n}\npublic function set(string $key, string\
  \ $value)\n{\nif (! is_null($this->get($key))) {\n$this->lastmatch[0]=$value;\n\
  return;\n}\n$conf = $this->xml->conf;\n$this->xml->addChild('item', $value)->addAttribute('name',\
  \ $key);\n}\n}\n```\n\n`Conf` 类使用 `SimpleXml` 扩展来访问键值对。它设计处理的格式如下：\n\n```\n<conf>\n\
  <item name=\"user\">bob</item>\n<item name=\"pass\">newpass</item>\n<item name=\"\
  host\">localhost</item>\n</conf>\n```\n\n`Conf` 类的构造函数接受一个文件路径，并将其传递给 `simplexml:load_file()`。它将生成的\
  \ `SimpleXmlElement` 对象存储在一个名为 `$xml` 的属性中。`get()` 方法使用 XPath 定位具有给定 `name` 属性的\
  \ `item` 元素，并返回其值。`set()` 方法要么修改现有项的值，要么创建一个新项。最后，`write()` 方法将新的配置数据保存回文件。\n\n\
  和许多示例代码一样，`Conf` 类被高度简化了。特别是，它没有处理文件不存在或不可写入的策略。它在预期上也过于乐观，假设 XML 文档格式良好且包含预期的元素。\n\
  \n检测这些错误条件相对简单，但我仍然需要决定当它们发生时如何应对。通常有两种选择。\n\n第一种，我可以终止执行。这很简单但也很极端。如此一来，我这个简陋的类就要承担起拖垮整个脚本的责任。尽管像\
  \ `__construct()` 和 `write()` 这样的方法很适合检测错误，但它们并不掌握决定如何处理错误所需的信息。\n\n因此，与其在类中处理错误，不如返回某种错误标志。这可以是布尔值或整数值，例如\
  \ `0` 或 `-1`。有些类还会设置错误字符串或标志，以便客户端代码在失败后可以请求更多信息。\n\n许多 PEAR 包通过返回一个错误对象（`PEAR_Error`\
  \ 类的实例）来结合这两种方法，该对象既作为错误已发生的通知，又包含错误消息。这种方法现已弃用，但仍有大量类未升级，主要原因在于客户端代码通常依赖于旧的行为。\n\
  \n这里的问题在于，你会污染你的返回值。每次调用容易出错的方法时，你都不得不依赖客户端程序员来检查返回类型。这很有风险。不要信任任何人！\n\n当你将错误值返回给调用代码时，并不能保证客户端比你的方法更擅长决定如何处理该错误。如果是这样，问题就会再次出现。客户端方法将不得不决定如何响应错误条件，甚至可能实现不同的错误报告策略。\n\
  \n### 异常\n\nPHP 5 为 PHP 引入了异常，这是一种处理错误情况的截然不同的方式。注意，这是针对 PHP 而言的不同。如果你有 Java 或 C++\
  \ 经验，你会觉得它们似曾相识。异常解决了本节至今提出的所有问题。\n\n异常是一个特殊的对象，由内置的 `Exception` 类（或其派生类）实例化。`Exception`\
  \ 类型的对象旨在保存和报告错误信息。\n\n`Exception` 类的构造函数接受两个可选参数：一个消息字符串和一个错误代码。该类提供了一些用于分析错误条件的有用方法。这些方法在表\
  \ 4-1 中描述。\n\n表 4-1. Exception 类的公有方法\n\n| 方法 | 描述 |\n| --- | --- |\n| `getMessage()`\
  \ | 获取传递给构造函数的消息字符串 |\n| `getCode()` | 获取传递给构造函数的代码整数 |\n| `getFile()` | 获取生成异常的文件\
  \ |\n| `getLine()` | 获取生成异常的行号 |\n| `getPrevious()` | 获取嵌套的 Exception 对象 |\n| `getTrace()`\
  \ | 获取一个多维数组，追踪导致异常的方法调用，包括方法、类、文件和参数数据 |\n| `getTraceAsString()` | 获取 `getTrace()`\
  \ 返回数据的字符串版本 |\n| `__toString()` | 当 `Exception` 对象在字符串上下文中使用时自动调用。返回描述异常细节的字符串\
  \ |\n\n`Exception` 类在提供错误通知和调试信息方面非常有用（`getTrace()` 和 `getTraceAsString()` 方法在这方面尤其有帮助）。实际上，它与前面讨论的\
  \ `PEAR_Error` 类几乎相同。不过，异常的意义远不止它包含的信息。\n\n### 抛出异常\n\n`throw` 关键字与 `Exception`\
  \ 对象结合使用。它会停止当前方法的执行，并将处理错误的职责交还给调用代码。下面我修改 `__construct()` 方法以使用 `throw` 语句：\n\n\
  ```\n// listing 04.58\npublic function __construct(string $file)\n{\n$this->file\
  \ = $file;\nif (! file_exists($file)) {\nthrow new \\Exception(\"file '$file' does\
  \ not exist\");\n}\n$this->xml = simplexml:load_file($file);\n}\n```\n\n`write()`\
  \ 方法可以使用类似的结构：\n\n```\n// listing 04.59\npublic function write()\n{\nif (! is_writeable($this->file))\
  \ {\nthrow new \\Exception(\"file '{$this->file}' is not writeable\");\n}\nfile_put_contents($this->file,\
  \ $this->xml->asXML());\n}\n```\n\n现在，`__construct()` 和 `write()` 方法可以在执行工作时仔细检查文件错误，但它们让更适合此目的的代码来决定如何响应检测到的任何错误。\n\
  \n那么客户端代码如何知道在异常抛出时如何处理呢？当你调用一个可能抛出异常的方法时，可以将调用包裹在 `try` 子句中。`try` 子句由 `try` 关键字后跟花括号组成。`try`\
  \ 子句后面必须至少跟一个 `catch` 子句，你可以在其中处理任何错误，如下所示：\n\n```\n// listing 04.60\ntry {\n$conf\
  \ = new Conf(__DIR__ . \"/conf01.xml\");\nprint \"user: \" . $conf->get('user')\
  \ . \"\\n\";\nprint \"host: \" . $conf->get('host') . \"\\n\";\n$conf->set(\"pass\"\
  , \"newpass\");\n$conf->write();\n} catch (\\Exception $e) {\ndie($e->__toString());\n\
  }\n```\n\n如你所见，`catch` 子句表面上类似于方法声明。当异常被抛出时，调用作用域中的 `catch` 子句就会被调用。`Exception`\
  \ 对象会自动作为参数变量传入。\n\n就像在抛出异常的方法中执行会停止一样，在 `try` 子句中也是如此——控制权会直接传递给 `catch` 子句。\n\n\
  \n\n#### 异常类的子类化\n\n你可以像创建任何用户自定义类一样，创建继承 `Exception` 类的子类。这么做通常有两个原因：首先，你可以扩展该类的功能；其次，派生类所定义的新类类型本身有助于错误处理。\n\
  \n事实上，你可以为一条 `try` 语句定义任意数量的 `catch` 子句。具体调用哪个 `catch` 子句，取决于抛出的异常类型以及参数列表中的类类型提示。以下是一些继承\
  \ `Exception` 的简单类：\n\n```php\n// listing 04.61\nclass XmlException extends \\Exception\n\
  {\nprivate $error;\npublic function __construct(\\LibXmlError $error)\n{\n$shortfile\
  \ = basename($error->file);\n$msg = \"[{$shortfile}, line {$error->line}, col {$error->column}]\
  \ {$error->message}\";\n$this->error = $error;\nparent::__construct($msg, $error->code);\n\
  }\npublic function getLibXmlError()\n{\nreturn $this->error;\n}\n}\n// listing 04.62\n\
  class FileException extends \\Exception\n{\n}\n// listing 04.63\nclass ConfException\
  \ extends \\Exception\n{\n}\n```\n\n当 `SimpleXml` 遇到损坏的 XML 文件时，会在后台生成 `LibXmlError`\
  \ 类。它包含 `$message` 和 `$code` 属性，与 `Exception` 类类似。我利用这种相似性，在 `XmlException` 类中使用了\
  \ `LibXmlError` 对象。`FileException` 和 `ConfException` 类仅作为 `Exception` 的子类，并未添加额外功能。现在，我可以在代码中使用这些类，并修改\
  \ `__construct()` 和 `write()` 方法：\n\n```php\n// listing 04.64\n// Conf 类...\nfunction\
  \ __construct(string $file)\n{\n$this->file = $file;\nif (! file_exists($file))\
  \ {\nthrow new FileException(\"文件 '$file' 不存在\");\n}\n$this->xml = simplexml:load_file($file,\
  \ null, LIBXML_NOERROR);\nif (! is_object($this->xml)) {\nthrow new XmlException(libxml:get_last_error());\n\
  }\n$matches = $this->xml->xpath(\"/conf\");\nif (! count($matches)) {\nthrow new\
  \ ConfException(\"找不到根元素: conf\");\n}\n}\nfunction write()\n{\nif (! is_writeable($this->file))\
  \ {\nthrow new FileException(\"文件 '{$this->file}' 不可写入\");\n}\nfile_put_contents($this->file,\
  \ $this->xml->asXML());\n}\n```\n\n根据遇到的错误类型，`__construct()` 会抛出 `XmlException`、`FileException`\
  \ 或 `ConfException` 中的一种。请注意，我将选项标志 `LIBXML_NOERROR` 传递给了 `simplexml:load_file()`。这会抑制警告信息，让我可以在事后使用\
  \ `XmlException` 类自行处理这些错误。如果遇到格式错误的 XML 文件，由于 `simplexml:load_file()` 不会返回对象，我知道发生了错误。随后就可以通过\
  \ `libxml:get_last_error()` 访问该错误。\n\n如果 `$file` 属性指向一个不可写入的实体，`write()` 方法会抛出一个\
  \ `FileException`。\n\n因此，我已经确定 `__construct()` 可能会抛出三种可能的异常之一。那么如何利用这一点呢？以下是实例化\
  \ `Conf` 对象的代码：\n\n```php\n// listing 04.65\npublic static function init()\n{\n\
  try {\n$conf = new Conf(__DIR__.\"/conf.broken.xml\");\nprint \"用户: \" . $conf->get('user')\
  \ . \"\\n\";\nprint \"主机: \" . $conf->get('host') . \"\\n\";\n$conf->set(\"pass\"\
  , \"newpass\");\n$conf->write();\n} catch (FileException $e) {\n// 权限问题或文件不存在\n\
  } catch (XmlException $e) {\n// XML 格式错误\n} catch (ConfException $e) {\n// 错误的 XML\
  \ 文件类型\n} catch (\\Exception $e) {\n// 兜底：不应被调用\n}\n}\n```\n\n我为每种类型都提供了一个 `catch`\
  \ 子句。具体执行哪个子句取决于抛出的异常类型。第一个匹配的子句将被执行，因此请记住将最通用的类型放在最后，最具体的类型放在最前。例如，如果你将 `Exception`\
  \ 的 `catch` 子句放在 `XmlException` 和 `ConfException` 的子句之前，那么后两者将永远不会被执行。这是因为这两个类都属于\
  \ `Exception` 类型，因此会先匹配第一个子句。\n\n第一个 `catch` 子句（`FileException`）在配置文件出现问题时被调用（例如文件不存在或不可写入）。第二个子句（`XmlException`）在解析\
  \ XML 文件出错时被调用（例如，某个元素未闭合）。第三个子句（`ConfException`）在有效的 XML 文件不包含预期的根 `conf` 元素时被调用。最后一个子句（`Exception`）不应被触发，因为我的方法只生成三种已明确处理的异常。提供一个这样的“兜底”子句通常是个好主意，以防在开发过程中向代码中添加了新的异常类型。\n\
  \n**注意**：如果你确实提供了一个“兜底”的 catch 子句，应确保在大多数情况下确实对异常进行了处理——静默失败可能导致难以诊断的 bug。\n\n这些细粒度的\
  \ `catch` 子句的好处在于，它们允许你对不同的错误应用不同的恢复或失败机制。例如，你可以决定终止执行、记录错误并继续运行，或者明确地重新抛出错误：\n\n\
  ```php\ntry {\n//...\n} catch ( FileException $e ) {\nthrow $e;\n}\n```\n\n另一个可以使用的技巧是抛出一个包装当前异常的新异常。这允许你声明对该错误的所有权并添加自己的上下文信息，同时保留所捕获异常封装的数据。你可以在第\
  \ 15 章中阅读更多关于此技术的内容。\n\n那么，如果异常没有被客户端代码捕获会发生什么？它会被隐式地重新抛出，让客户端自身的调用代码有机会捕获它。这个过程会持续下去，直到异常被捕获，或者直到它无法再被抛出。此时，就会发生一个致命错误。如果在我的示例中我没有捕获其中一个异常，会发生以下情况：\n\
  \n```\nPHP 致命错误： 未捕获的异常 'FileException'，消息为\n'文件 'nonexistent/not_there.xml' 不存在'，位于\
  \ ...\n```\n\n因此，当你抛出异常时，你强制客户端承担起处理它的责任。这并非推卸责任。当方法检测到错误，但没有足够的上下文信息来智能地处理它时，就应该抛出异常。我示例中的\
  \ `write()` 方法知道何时写入会失败，也知道失败的原因，但它不知道该如何处理。这正是理想的状态。如果我让 `Conf` 类比现在了解更多的信息，它就会失去焦点，变得不易复用。\n\
  \n\n\n### 使用 finally 处理 try/catch 之后的清理工作\n\n异常对代码流程的影响可能导致意外问题。例如，当`try`子句中产生异常后，清理代码或其他必要的维护工作可能无法执行。如你所见，如果`try`子句中产生了异常，程序流程会直接跳转到相应的`catch`子句。用于关闭数据库连接或文件句柄的代码可能不会被调用，状态信息也可能无法更新。\n\
  \n例如，假设`Runner::init()`会记录其操作日志。它会记录初始化过程的开始、遇到的任何错误，以及初始化过程的结束。这里提供一个典型的简化示例：\n\
  \n```php\n// listing 04.66\npublic static function init()\n{\n    try {\n      \
  \  $fh = fopen(__DIR__ . \"/log.txt\", \"a\");\n        fputs($fh, \"start\\n\"\
  );\n        $conf = new Conf(dirname(__FILE__) . \"/conf.broken.xml\");\n      \
  \  print \"user: \" . $conf->get('user') . \"\\n\";\n        print \"host: \" .\
  \ $conf->get('host') . \"\\n\";\n        $conf->set(\"pass\", \"newpass\");\n  \
  \      $conf->write();\n        fputs($fh, \"end\\n\");\n        fclose($fh);\n\
  \    } catch (FileException $e) {\n        // 权限问题或文件不存在\n        fputs($fh, \"\
  file exception\\n\");\n        throw $e;\n    } catch (XmlException $e) {\n    \
  \    fputs($fh, \"xml exception\\n\");\n        // XML 格式错误\n    } catch (ConfException\
  \ $e) {\n        fputs($fh, \"conf exception\\n\");\n        // XML 文件类型错误\n   \
  \ } catch (\\Exception $e) {\n        fputs($fh, \"general exception\\n\");\n  \
  \      // 兜底处理：不应被调用\n    }\n}\n```\n\n我打开了一个文件`log.txt`，向其中写入内容，然后调用配置代码。如果在此过程中遇到异常，我会在相应的`catch`子句中记录这一事实。最后，通过在`try`子句末尾写入日志并关闭文件句柄来结束该子句。\n\
  \n当然，如果遇到异常，最后这一步将永远不会执行。程序流程直接跳转到相应的`catch`块，而`try`子句的其余部分永远不会运行。以下是当产生文件异常时的日志输出：\n\
  \n```\nstart\nfile exception\n```\n\n如你所见，日志记录开始了，文件异常也被记录，但记录结束的代码部分从未执行，因此日志中没有更新相应的结束信息。\n\
  \n你可能会认为解决方案是将最后的日志记录步骤完全放在`try`/`catch`块之外。但这并不能可靠地工作。如果产生的异常被捕获，并且`try`块允许继续执行，那么程序流程会转移到`try`/`catch`结构之外。然而，`catch`子句可能会重新抛出异常，或者完全结束脚本执行。\n\
  \n为了帮助程序员处理这类问题，PHP 5.5 引入了一个新的子句：`finally`。如果你熟悉 Java，很可能以前见过这个子句。虽然`catch`子句仅在匹配的异常被抛出时有条件地运行，但`finally`子句总是会运行，无论`try`块中是否产生异常。\n\
  \n我可以通过将日志写入和关闭代码移到`finally`子句中来修复这个问题：\n\n```php\npublic static function init()\n\
  {\n    $fh = fopen(__DIR__ . \"/log.txt\", \"a\");\n    try {\n        fputs($fh,\
  \ \"start\\n\");\n        $conf = new Conf(dirname(__FILE__) . \"/conf.broken.xml\"\
  );\n        print \"user: \" . $conf->get('user') . \"\\n\";\n        print \"host:\
  \ \" . $conf->get('host') . \"\\n\";\n        $conf->set(\"pass\", \"newpass\");\n\
  \        $conf->write();\n    } catch (FileException $e) {\n        // 权限问题或文件不存在\n\
  \        fputs($fh, \"file exception\\n\");\n    } catch (XmlException $e) {\n \
  \       fputs($fh, \"xml exception\\n\");\n        // XML 格式错误\n    } catch (ConfException\
  \ $e) {\n        fputs($fh, \"conf exception\\n\");\n        // XML 文件类型错误\n   \
  \ } catch (Exception $e) {\n        fputs($fh, \"general exception\\n\");\n    \
  \    // 兜底处理：不应被调用\n    } finally {\n        fputs($fh, \"end\\n\");\n        fclose($fh);\n\
  \    }\n}\n```\n\n由于日志写入和`fclose()`调用被封装在`finally`子句中，即使捕获到`FileException`并重新抛出异常，这些语句也会被执行。\n\
  \n以下是当产生`FileException`时的日志文本：\n\n```\nstart\nfile exception\nend\n```\n\n**注意：**\
  \  \n如果调用的`catch`子句重新抛出异常或返回值，`finally`子句仍会执行。但是，在`try`或`catch`块中调用`die()`或`exit()`会结束脚本执行，此时`finally`子句将不会运行。\n\
  \n---\n\n### final 类和方法\n\n继承允许在类层次结构中实现极大的灵活性。你可以重写一个类或方法，使得客户端方法中的调用根据传入的类实例不同而产生截然不同的效果。然而，有时一个类或方法应该保持固定不变。如果你已经为你的类或方法实现了最终的功能，并且认为重写只会破坏工作的完美性，那么你可能需要使用`final`关键字。\n\
  \n`final`阻止了继承。被声明为`final`的类不能被子类化。相对不那么严格的是，被声明为`final`的方法不能被重写。\n\n下面是一个`final`类的例子：\n\
  \n```php\n// listing 04.67\nfinal class Checkout\n{\n    // ...\n}\n```\n\n下面是对`Checkout`类进行子类化的尝试：\n\
  \n```php\n// listing 04.68\nclass IllegalCheckout extends Checkout\n{\n    // ...\n\
  }\n```\n\n这会产生一个错误：\n\n```\nPHP Fatal error:  Class IllegalCheckout may not inherit\
  \ from final class (Checkout) in ....\n```\n\n我可以稍微放宽限制，在`Checkout`中声明一个方法为`final`，而不是整个类。`final`关键字应放在其他修饰符（如`protected`或`static`）之前，像这样：\n\
  \n```php\n// listing 04.69\nclass Checkout\n{\n    final public function totalize()\n\
  \    {\n        // 计算账单\n    }\n}\n```\n\n现在我可以子类化`Checkout`，但任何重写`totalize()`的尝试都会导致致命错误：\n\
  \n```php\n// listing 04.70\nclass IllegalCheckout extends Checkout\n{\n    final\
  \ public function totalize()\n    {\n        // 更改账单计算\n    }\n}\n```\n\n```\nPHP\
  \ Fatal error:  Cannot override final method popp\\ch04\\batch14\\Checkout::totalize()\
  \ ...\n```\n\n良好的面向对象代码倾向于强调定义明确的接口。然而，在接口背后，实现往往会有所不同。不同的类或类的组合遵循共同的接口，但在不同情况下行为不同。通过将类或方法声明为`final`，你限制了这种灵活性。在某些情况下，这样做是可取的，本书后面会介绍一些这样的场景。但是，在声明某物为`final`之前，你应该仔细考虑。真的没有任何情况下重写会有用吗？当然，你以后可以改变主意，但如果你分发一个供他人使用的库，这可能就不那么容易了。请谨慎使用`final`。\n\
  \n\n\n## 内部错误类\n\n回溯到异常机制首次引入时，`try` 和 `catch` 主要应用于 PHP 代码而非核心引擎。内部生成的错误保留了自身的逻辑。如果你希望以与代码生成异常相同的方式来管理核心错误，这可能会变得混乱。PHP\
  \ 7 通过引入 `Error` 类开始着手解决这个问题。该类实现了 `Throwable`——与 `Exception` 类实现的相同的内置接口，因此它可以被同等对待。这也意味着表\
  \ 4-1 中描述的方法得以遵循。`Error` 类针对单个错误类型有子类化。以下是你如何捕获由 `eval` 语句生成的解析错误：\n\n```php\ntry\
  \ {\n    eval(\"illegal code\");\n} catch (\\Error $e) {\n    print get_class($e)\
  \ . \"\\n\";\n} catch (\\Exception $e) {\n    // 对 Exception 进行处理\n}\n```\n\n输出如下：\n\
  \n```\nParseError\n```\n\n因此，你可以通过在 `catch` 子句中指定 `Error` 超类或指定更具体的子类来匹配某些类型的内部错误。表\
  \ 4-2 显示了当前的 `Error` 子类。\n\n**表 4-2.** PHP 7 引入的内置错误类\n\n| 错误                  |\
  \ 描述                                                                 |\n|-----------------------|----------------------------------------------------------------------|\n\
  | `ArithmeticError`     | 针对与数学相关的错误抛出，特别是那些与位运算相关的错误                  |\n| `AssertionError`\
  \      | 当 `assert()` 语言结构（用于调试）失败时抛出                           |\n| `DivisionByZeroError`\
  \ | 当尝试将数字除以零时抛出                                               |\n| `ParseError`\
  \          | 当运行时代码解析 PHP（例如使用 `eval()`）失败时抛出                     |\n| `TypeError`\
  \           | 当向方法传递错误类型的参数、方法返回错误类型的值，或向方法传递错误数量的参数时抛出 |\n\n> **注意**  \n> 在撰写本文时，调用\
  \ `Error::getMessage()` 会失败并报错，尽管该方法已在 `Throwable` 接口中声明。很可能在你阅读本文时此问题已得到修复。\n\n\
  ## 使用拦截器\n\nPHP 提供了内置的拦截器方法，可以拦截发送给未定义方法和属性的消息。这也被称为重载（overloading），但由于该术语在 Java\
  \ 和 C++ 中含义完全不同，我认为最好用“拦截”来描述。\n\nPHP 支持三种内置的拦截器方法。与 `__construct()` 类似，这些方法会在满足适当条件时自动为你调用。表\
  \ 4-3 描述了这些方法。\n\n**表 4-3.** 拦截器方法\n\n| 方法                                    |\
  \ 描述                                               |\n|-----------------------------------------|----------------------------------------------------|\n\
  | `__get($property)`                      | 当访问未定义属性时被调用                       \
  \      |\n| `__set($property, $value)`              | 当为未定义属性赋值时被调用            \
  \               |\n| `__isset($property)`                    | 当对未定义属性调用 `isset()`\
  \ 时被调用                |\n| `__unset($property)`                    | 当对未定义属性调用 `unset()`\
  \ 时被调用                |\n| `__call($method, $arg_array)`           | 当调用未定义的非静态方法时被调用\
  \                     |\n| `__callStatic($method, $arg_array)`     | 当调用未定义的静态方法时被调用\
  \                       |\n\n`__get()` 和 `__set()` 方法旨在用于处理类（或其父类）中未声明的属性。\n\n`__get()`\
  \ 在客户端代码尝试读取未声明的属性时被调用。它会自动调用，并接收一个包含客户端试图访问的属性名称的单一字符串参数。无论你从 `__get()` 方法返回什么，都会作为该目标属性的值发送回客户端。以下是一个快速示例：\n\
  \n```php\n// 代码清单 04.71\nclass Person\n{\n    public function __get(string $property)\n\
  \    {\n        $method = \"get{$property}\";\n        if (method_exists($this,\
  \ $method)) {\n            return $this->$method();\n        }\n    }\n\n    public\
  \ function getName(): string\n    {\n        return \"Bob\";\n    }\n\n    public\
  \ function getAge(): int\n    {\n        return 44;\n    }\n}\n```\n\n当客户端尝试访问未定义的属性时，`__get()`\
  \ 方法将被调用。我实现了 `__get()` 方法来接收属性名称并构造一个新的字符串，前缀以 \"get\"。我将此字符串传递给名为 `method_exists()`\
  \ 的函数，该函数接收一个对象和方法名称，并测试方法是否存在。如果方法确实存在，我就调用它并将其返回值传递给客户端。假设客户端请求 `$name` 属性：\n\n\
  ```php\n$p = new Person();\nprint $p->name;\n```\n\n在这种情况下，后台会调用 `getName()` 方法：\n\
  \n```\nBob\n```\n\n如果方法不存在，我将不执行任何操作。用户试图访问的属性将解析为 NULL。\n\n`__isset()` 方法的工作方式与\
  \ `__get()` 类似。它在客户端对未定义属性调用 `isset()` 后被调用。以下是我如何扩展 `Person` 类：\n\n```php\n// 代码清单\
  \ 04.72\npublic function __isset(string $property)\n{\n    $method = \"get{$property}\"\
  ;\n    return (method_exists($this, $method));\n}\n```\n\n现在，谨慎的用户可以在处理属性之前对其进行测试：\n\
  \n```php\nif (isset($p->name)) {\n    print $p->name;\n}\n```\n\n`__set()` 方法在客户端代码尝试为未定义属性赋值时被调用。它接收两个参数：属性名称和客户端尝试设置的值。然后你可以决定如何处理这些参数。此处我进一步修改了\
  \ `Person` 类：\n\n```php\n// 代码清单 04.73\nclass Person\n{\n    private $myname;\n\
  \    private $myage;\n\n    public function __set(string $property, string $value)\n\
  \    {\n        $method = \"set{$property}\";\n        if (method_exists($this,\
  \ $method)) {\n            return $this->$method($value);\n        }\n    }\n\n\
  \    public function setName(string $name)\n    {\n        $this->myname = $name;\n\
  \        if (!is_null($name)) {\n            $this->myname = strtoupper($this->myname);\n\
  \        }\n    }\n\n    public function setAge(int $age)\n    {\n        $this->myage\
  \ = $age;\n    }\n}\n```\n\n\n\n在本例中，我将使用“setter”方法而非“getter”。如果用户尝试给一个未定义的属性赋值，则`__set()`方法会被调用，并传入属性名和所赋的值。我会测试是否存在相应的方法，若存在则调用它。通过这种方式，我可以过滤所赋的值。\n\
  \n> **注意**  \n> 请记住，PHP 文档中的方法和属性通常以静态术语提及，以便将其与所属类关联。因此，你可能会讨论`Person::$name`属性，即便该属性并未声明为`static`，且实际上是通过对象来访问的。\n\
  \n所以，如果我创建了一个`Person`对象，然后尝试设置一个名为`Person::$name`的属性，由于此类未定义`$name`属性，`__set()`方法会被调用。该方法会接收到字符串`\"\
  name\"`和客户端所赋的值。如何使用这个值则取决于`__set()`的实现。在这个例子中，我根据属性参数和字符串`\"set\"`组合构造了一个方法名。`setName()`方法被找到并成功调用。该方法会转换传入的值，并将其存储到一个真实的属性中：\n\
  \n```\n$p = new Person();\n$p->name = \"bob\";\n// $myname 属性变为 'BOB'\n```\n\n正如你所料，`__unset()`与`__set()`相对应。当对未定义的属性调用`unset()`时，`__unset()`会被调用，并传入该属性的名称。然后你可以利用这些信息做任何处理。本例将`null`传递给一个方法，该方法通过`__set()`中使用的相同技术解析得到：\n\
  \n```\n// listing 04.74\npublic function __unset(string $property)\n{\n$method =\
  \ \"set{$property}\";\nif (method_exists($this, $method)) {\n$this->$method(null);\n\
  }\n}\n```\n\n`__call()`方法可能是所有拦截器方法中最有用的一个。当客户端代码调用一个未定义的方法时，它会被调用。`__call()`会接收到方法名和一个包含所有客户端传入参数的数组。你从`__call()`方法返回的任何值都会作为被调用方法的返回值返回给客户端。\n\
  \n`__call()`方法对委托非常有用。委托是一种机制，通过它一个对象将方法调用传递给第二个对象。它类似于继承，子类会将方法调用传递给父类的实现。但继承中父类与子类的关系是固定的，而委托能够在运行时切换接收对象，因此比继承更灵活。通过一个例子可以稍微澄清一下。下面是一个简单的类，用于格式化来自`Person`类的信息：\n\
  \n```\n// listing 04.75\nclass PersonWriter\n{\npublic function writeName(Person\
  \ $p)\n{\nprint $p->getName() . \"\\n\";\n}\npublic function writeAge(Person $p)\n\
  {\nprint $p->getAge() . \"\\n\";\n}\n}\n```\n\n当然，我可以通过继承此类，以不同方式输出`Person`数据。下面是一个`Person`类的实现，它同时使用了`PersonWriter`对象和`__call()`方法：\n\
  \n```\n// listing 04.76\nclass Person\n{\nprivate $writer;\npublic function __construct(PersonWriter\
  \ $writer)\n{\n$this->writer = $writer;\n}\npublic function __call(string $method,\
  \ array $args)\n{\nif (method_exists($this->writer, $method)) {\nreturn $this->writer->$method($this);\n\
  }\n}\npublic function getName(): string\n{\nreturn \"Bob\";\n}\npublic function\
  \ getAge(): int\n{\nreturn 44;\n}\n}\n```\n\n这里的`Person`类要求构造函数参数为一个`PersonWriter`对象，并将其存储在一个属性变量中。在`__call()`方法中，我使用传入的`$method`参数，检查是否在我存储的`PersonWriter`对象中存在同名方法。如果找到这样的方法，我将方法调用委托给`PersonWriter`对象，并将当前实例（通过伪变量`$this`）传递给它。思考一下，如果客户端对`Person`进行如下调用会发生什么：\n\
  \n```\n$person = new Person(new PersonWriter());\n$person->writeName();\n```\n\n\
  在这种情况下，`__call()`方法被调用。我在`PersonWriter`对象中找到名为`writeName()`的方法并调用它。这省去了我手动调用委托方法的麻烦，比如这样：\n\
  \n```\nfunction writeName() {\n$this->writer->writeName($this);\n}\n```\n\n`Person`类神奇地获得了两个新方法。虽然自动化委托可以节省大量工作，但也可能带来清晰度上的代价。如果你过度依赖委托，你向外界呈现的是一个动态接口，它抵制反射（运行时检查类结构的能力），并且对客户端程序员来说，一眼看过去并不总是清晰易懂。这是因为委托类与其目标对象之间的交互逻辑可能很隐晦——它深埋在如`__call()`这样的方法中，而不是像类似关系那样通过继承关系或方法类型提示提前显现出来。拦截器方法有其用武之地，但应谨慎使用，并且依赖这些方法的类应非常清晰地记录这一事实。\n\
  \n我将在本书后面继续讨论委托和反射这两个主题。\n\n`__get()`和`__set()`拦截器方法也可用于管理复合属性。这对客户端程序员来说可能是一种便利。例如，设想一个`Address`类，它管理门牌号和街道名称。最终这些对象数据将被写入数据库字段，因此将门牌号和街道名称分开是合理的。但如果门牌号和街道名称通常以未区分的整体形式获取，那么你可能希望为类的用户提供帮助。下面是一个管理复合属性`Address::$streetaddress`的类：\n\
  \n```\n// listing 04.77\nclass Address\n{\nprivate $number;\nprivate $street;\n\
  public function __construct(string $maybenumber, string $maybestreet = null)\n{\n\
  if (is_null($maybestreet)) {\n$this->streetaddress = $maybenumber;\n} else {\n$this->number\
  \ = $maybenumber;\n$this->street = $maybestreet;\n}\n}\npublic function __set(string\
  \ $property, string $value)\n{\nif ($property === \"streetaddress\") {\nif (preg_match(\"\
  /^(\\d+.*?)[\\s,]+(.+)$/\", $value, $matches)) {\n$this->number = $matches[1];\n\
  $this->street = $matches[2];\n} else {\nthrow new \\Exception(\"unable to parse\
  \ street address: '{$value}'\");\n}\n}\n}\npublic function __get(string $property)\n\
  {\nif ($property === \"streetaddress\") {\nreturn $this->number . \" \" . $this->street;\n\
  }\n}\n}\n// listing 04.78\n$address = new Address(\"441b Bakers Street\");\nprint\
  \ \"street address: {$address->streetaddress}\\n\";\n$address = new Address(\"15\"\
  , \"Albert Mews\");\nprint \"street address: {$address->streetaddress}\\n\";\n$address->streetaddress\
  \ = \"34, West 24th Avenue\";\nprint \"street address: {$address->streetaddress}\\\
  n\";\n```\n\n当用户尝试设置（不存在的）`Address::$streetaddress`属性时，拦截器方法`__call()`被调用。在那里，我测试属性名为`streetaddress`。在设置`$number`和`$street`属性之前，我必须首先确保提供的值可以解析，并继续提取字段。在这个例子中，我设置了简单的规则。如果一个地址以数字开头，并且在第二部分之前有空格或逗号，则可以被解析。借助于反向引用，如果检查通过，我已经在`$matches`数组中获得了所需的数据，并将值赋给`$number`和`$street`属性。如果解析失败，则抛出一个异常。因此，当诸如`441b\
  \ Bakers Street`的字符串被赋值给`Address::$streetaddress`时，实际被填充的是`$number`和`$street`属性。我可以通过`print_r()`来演示这一点：\n\
  \n```\n$address = new Address(\"441b Bakers Street\");\nprint_r($address);\nAddress\
  \ Object\n(\n[number:Address:private] => 441b\n[street:Address:private] => Bakers\
  \ Street\n)\n```\n\n\n\n"
- '# 高级文档工程师排版结果


  `__get()` 方法当然更加直接。每当访问 `Address::$streetaddress` 属性时，就会调用 `__get()`。在我对这个拦截器的实现中，我测试了
  `streetaddress`，如果找到匹配项，则返回 `$number` 和 `$street` 属性的拼接结果。


  ## 定义析构函数方法


  你已经看到，当对象被实例化时，`__construct()` 方法会自动调用。PHP 5 还引入了 `__destruct()` 方法。该方法在对象被垃圾回收之前被调用；也就是说，在它被从内存中清除之前。你可以使用此方法来执行任何必要的最终清理工作。


  例如，想象一个类在收到命令时将自身保存到数据库。我可以使用 `__destruct()` 方法来确保实例在删除时保存其数据：


  ```

  // listing 04.79

  class Person

  {

  protected $name;

  private   $age;

  private   $id;

  public function __construct(string $name, int $age)

  {

  $this->name = $name;

  $this->age  = $age;

  }

  public function setId(int $id)

  {

  $this->id = $id;

  }

  public function __destruct()

  {

  if (! empty($this->id)) {

  // 保存 Person 数据

  print "saving person\n";

  }

  }

  }

  ```


  每当一个 `Person` 对象从内存中移除时，就会调用 `__destruct()` 方法。这发生在你对该对象调用 `unset()` 函数时，或者进程中不再存在对该对象的引用时。因此，如果我创建并销毁一个
  `Person` 对象，你可以看到 `__destruct()` 方法发挥作用：


  ```

  // listing 04.80

  $person = new Person("bob", 44);

  $person->setId(343);

  unset($person);

  // 输出：

  // saving person

  ```


  尽管这样的技巧很有趣，但值得提醒一句注意。`__call()`、`__destruct()` 及其同僚有时被称为**魔术方法**。如果你读过奇幻小说就会知道，魔法并不总是一件好事。魔法是任意且不可预测的。魔法会破坏规则。魔法会带来隐藏的成本。


  例如，对于 `__destruct()`，你最终可能会给使用者带来意想不到的麻烦。想想 `Person` 类——它在 `__destruct()` 方法中执行数据库写入。现在想象一个新手开发人员随意地测试
  `Person` 类。他没有注意到 `__destruct()` 方法，并开始实例化一组 `Person` 对象。他向构造函数传递值，将 CEO 的秘密且略带粗俗的昵称赋给
  `$name` 属性，然后将 `$age` 设置为 150。他运行了几次测试脚本，尝试了各种奇特的名称和年龄组合。


  第二天早上，他的经理让他去会议室解释为什么数据库里包含侮辱性的 `Person` 数据。教训是什么？不要相信魔法。


  ## 使用 `__clone()` 复制对象


  在 PHP 4 中，复制对象只是从一个变量赋值给另一个变量的事情：


  ```

  class CopyMe

  {

  }

  $first = new CopyMe();

  $second = $first;

  // PHP 4：$second 和 $first 是两个不同的对象

  // PHP 5+：$second 和 $first 引用同一个对象

  ```


  这个“简单的事情”是许多 bug 的根源，因为在赋值变量、调用方法和返回对象时，会意外地产生对象副本。更糟糕的是，没有办法测试两个变量是否引用同一个对象。相等性测试只能告诉你所有字段是否相同（`==`）或者两个变量是否都是对象（`===`），但不能判断它们是否指向同一个对象。


  在 PHP 中，对象始终通过引用分配和传递。这意味着当之前的示例在 PHP 5 中运行时，`$first` 和 `$second` 包含对同一个对象的引用，而不是两个副本。虽然在处理对象时这通常是你要的，但有时你需要获取对象的副本而不是对象的引用。


  PHP 专门为此提供了 `clone` 关键字。`clone` 作用于对象实例，生成一个按值复制的副本：


  ```

  class CopyMe

  {

  }

  $first  = new CopyMe();

  $second = clone $first;

  // PHP 5+：$second 和 $first 是两个不同的对象

  ```


  围绕对象复制的问题才刚刚开始。考虑我在上一节中实现的 `Person` 类。`Person` 对象的默认副本将包含标识符（`$id` 属性），在完整的实现中，我将使用它来定位数据库中的正确行。如果我允许复制此属性，客户端程序员最终可能会得到两个指向同一数据源的不同对象，这很可能不是她在复制时想要的。一个对象中的更新会影响另一个对象，反之亦然。


  幸运的是，你可以控制在对象上调用 `clone` 时复制什么内容。你可以通过实现一个名为 `__clone()` 的特殊方法来做到这一点（注意其前导双下划线，这是内置方法的特征）。当对对象调用
  `clone` 关键字时，`__clone()` 会自动被调用。


  当你实现 `__clone()` 时，理解该方法的运行上下文很重要。`__clone()` 在复制的对象上运行，而不是在原始对象上运行。这里我将 `__clone()`
  添加到 `Person` 类的另一个版本中：


  ```

  // listing 04.81

  class Person

  {

  private $name;

  private $age;

  private $id;

  public function __construct(string $name, int $age)

  {

  $this->name = $name;

  $this->age = $age;

  }

  public function setId(int $id)

  {

  $this->id = $id;

  }

  public function __clone()

  {

  $this->id = 0;

  }

  }

  ```


  当对一个 `Person` 对象调用 `clone` 时，会创建一个新的浅副本，并调用其 `__clone()` 方法。这意味着我在 `__clone()` 中做的任何事情都会覆盖我已经创建的默认副本。在这种情况下，我确保复制的对象的
  `$id` 属性被设置为零：


  ```

  // listing 04.82

  $person = new Person("bob", 44);

  $person->setId(343);

  $person2 = clone $person;

  // $person2：

  //     name：bob

  //     age：44

  //     id：0

  ```


  浅副本确保原始属性从旧对象复制到新对象。不过，对象属性是通过引用复制的，这可能不是你在克隆对象时想要或期望的。假设我给 `Person` 对象一个 `Account`
  对象属性。该对象持有一个余额，我希望将其复制到克隆的对象。但我不希望两个 `Person` 对象都持有对同一个账户的引用：


  ```

  // listing 04.83

  class Account

  {

  public $balance;

  public function __construct(float $balance)

  {

  $this->balance = $balance;

  }

  }

  // listing 04.84

  class Person

  {

  private $name;

  private $age;

  private $id;

  public  $account;

  public function __construct(string $name, int $age, Account $account)

  {

  $this->name = $name;

  $this->age  = $age;

  $this->account = $account;

  }

  public function setId(int $id)

  {

  $this->id = $id;

  }

  public function __clone()

  {

  $this->id   = 0;

  }

  }

  // listing 04.85

  $person = new Person("bob", 44, new Account(200));

  $person->setId(343);

  $person2 = clone $person;

  // 给 $person 加点钱

  $person->account->balance += 10;

  // $person2 也能看到这笔入账

  print $person2->account->balance;

  ```


  这将输出以下结果：


  ```


  ```


  `$person` 持有一个对 `Account` 对象的引用，为了简洁起见，我将其保持为公开可访问（如你所知，通常我会限制对属性的访问，必要时提供访问方法）。当创建克隆时，它持有对
  `$person` 引用的同一个 `Account` 对象的引用。我通过向 `$person` 对象的 `Account` 中加钱，并通过 `$person2`
  确认余额增加来演示这一点。


  如果我不希望对象属性在克隆操作后共享，那么我需要自己在 `__clone()` 方法中显式地克隆它：


  ```

  function __clone()

  {

  $this->id   = 0;

  $this->account = clone $this->account;

  }

  ```




  ## 为对象定义字符串值


  PHP 5 引入的另一个受 Java 启发的特性是 `__toString()` 方法。在 PHP 5.2 之前，当你打印一个对象时，它会解析成类似这样的字符串：


  ```

  // 清单 04.86

  class StringThing

  {

  }

  // 清单 04.87

  $st = new StringThing();

  print $st;

  对象 id #1

  ```


  自 PHP 5.2 起，这段代码会产生类似这样的错误：


  ```

  Object of class popp\ch04\batch22\StringThing could not be converted to string ...

  ```


  通过实现 `__toString()` 方法，你可以控制对象在被打印时的表现形式。`__toString()` 应编写为返回一个字符串值。当你的对象被传递给 `print`
  或 `echo` 时，该方法会被自动调用，并替换其返回值。这里我为一个极简的 `Person` 类添加了 `__toString()` 版本：


  ```

  // 清单 04.88

  class Person

  {

  function getName(): string

  {

  return "Bob";

  }

  function getAge(): int

  {

  return 44;

  }

  function __toString(): string

  {

  $desc  = $this->getName() . " (年龄 ";

  $desc .= $this->getAge() . ")";

  return $desc;

  }

  }

  ```


  现在当我打印一个 `Person` 对象时，对象会解析为：


  ```

  $person = new Person();

  print $person;

  Bob (年龄 44)

  ```


  `__toString()` 方法对于日志记录和错误报告特别有用，对于主要任务是传达信息的类也同样如此。例如，`Exception` 类在其 `__toString()`
  方法中总结异常数据。


  ## 回调、匿名函数和闭包


  虽然严格来说并非面向对象的特性，但匿名函数在这里值得一提，因为你在使用回调的面向对象应用程序中可能会遇到它们。


  首先，这里有几个类：


  ```

  // 清单 04.89

  class Product {

  public $name;

  public $price;

  public function __construct(string $name, float $price)

  {

  $this->name = $name;

  $this->price = $price;

  }

  }

  class ProcessSale

  {

  private $callbacks;

  public function registerCallback(callable $callback)

  {

  if (! is_callable($callback)) {

  throw new Exception("回调不可调用");

  }

  $this->callbacks[] = $callback;

  }

  public function sale(Product $product)

  {

  print "{$product->name}: 处理中 \n";

  foreach ($this->callbacks as $callback) {

  call_user_func($callback, $product);

  }

  }

  }

  ```


  这段代码旨在运行我的各种回调。它包含两个类：`Product` 和 `ProcessSale`。`Product` 仅存储 `$name` 和 `$price`
  属性。为简洁起见，我将它们设为公有。请记住，在实际应用中，你可能希望将属性设为私有或受保护，并提供访问器方法。`ProcessSale` 包含两个方法。


  第一个方法 `registerCallback()` 接受一个无类型提示的标量，对其进行检查，并将其添加到回调数组中。这个检查使用的是名为 `is_callable()`
  的内置函数，它确保我收到的任何内容都可以被 `call_user_func()` 或 `array_walk()` 等函数调用。


  第二个方法 `sale()` 接受一个 `Product` 对象，输出一条关于它的消息，然后遍历 `$callback` 数组属性。它将每个元素传递给 `call_user_func()`，后者调用该代码，并向其传递一个产品引用。以下所有示例都将与此框架配合使用。


  为什么回调很有用？它们允许你在运行时将功能插入到与组件核心任务没有直接关系的组件中。通过使组件具备回调感知能力，你就能让他人在你还未了解的上下文中扩展你的代码。


  例如，假设未来某个 `ProcessSale` 的用户想要创建一个销售日志。如果该用户能够访问这个类，她可能会直接将日志代码添加到 `sale()` 方法中。不过，这并不总是一个好主意。如果她不是提供
  `ProcessSale` 的软件包的维护者，那么下次软件包升级时，她的修改就会被覆盖。即使她是该组件的维护者，向 `sale()` 方法添加许多附带任务也会开始掩盖其核心职责，并可能降低它在不同项目中的可用性。我将在下一节中再次讨论这些主题。


  不过幸运的是，我让 `ProcessSale` 具备了回调感知能力。这里我创建一个模拟日志记录的回调：


  ```

  // 清单 04.90

  $logger = create_function(

  ''$product'',

  ''print "    记录日志 ({$product->name})\n";''

  );

  $processor = new ProcessSale();

  $processor->registerCallback($logger);

  $processor->sale(new Product("鞋子", 6));

  print "\n";

  $processor->sale(new Product("咖啡", 6));

  ```


  我使用 `create_function()` 来构建我的回调。如你所见，它接受两个字符串参数：第一个是参数列表；第二个是函数体。结果通常被称为匿名函数，因为它不像标准函数那样以命名方式定义。相反，它可以存储在变量中，并作为参数传递给函数和方法。这正是我所做的：将函数存储在
  `$logger` 变量中，并将其传递给 `ProcessSale::registerCallback()`。最后，我创建了几个产品并将它们传递给 `sale()`
  方法。你已经看到那里发生了什么。销售被处理（实际上只是打印了一条关于产品的简单消息），并且所有回调都被执行。以下是代码运行结果：


  ```

  鞋子: 处理中

  记录日志 (鞋子)

  咖啡: 处理中

  记录日志 (咖啡)

  ```



  再看一下那个`create_function()`的例子。是不是看起来很丑陋？将设计用于执行的代码放在字符串中总是一件痛苦的事情。你需要转义变量和引号，而且，如果回调函数变得稍微复杂一点，就会非常难以阅读。难道就没有一种更优雅的方式来创建匿名函数吗？实际上，从
  PHP 5.3 开始，就有了一种更好的方法。你可以简单地在一条语句中声明并赋值一个函数。下面是使用新语法重写的上一个例子：


  ```

  // listing 04.91

  $logger2 = function ($product) {

  print "    logging ({$product->name})\n";

  };

  $processor = new ProcessSale();

  $processor->registerCallback($logger2);

  $processor->sale(new Product("shoes", 6));

  print "\n";

  $processor->sale(new Product("coffee", 6));

  ```


  这里唯一的区别在于匿名函数的创建方式。如你所见，它整洁了许多。我只是内联地使用了`function`关键字，并且没有函数名。注意，因为这是一个内联语句，所以需要在代码块末尾加上分号。这里的输出与上一个例子相同。


  当然，回调不一定是匿名的。你可以使用函数名，甚至是对象引用和方法作为回调。下面我就这样做：


  ```

  // listing 04.92

  class Mailer

  {

  public function doMail(Product $product)

  {

  print "    mailing ({$product->name})\n";

  }

  }

  // listing 04.93

  $processor = new ProcessSale();

  $processor->registerCallback([new Mailer(), "doMail"]);

  $processor->sale(new Product("shoes", 6));

  print "\n";

  $processor->sale(new Product("coffee", 6));

  ```


  我创建了一个类：`Mailer`。它的唯一方法`doMail()`接受一个`Product`对象并输出一条关于它的消息。当我调用`registerCallback()`时，我传入了一个数组。第一个元素是一个`Mailer`对象，第二个是一个与我想调用的方法名匹配的字符串。记住，`registerCallback()`会检查其参数是否可调用。`is_callable()`足够智能，可以测试这种数组。一个有效的回调数组形式应该将对象作为第一个元素，将方法名作为第二个元素。我在这里通过了测试，以下是输出：


  ```

  shoes: processing

  mailing (shoes)

  coffee: processing

  mailing (coffee)

  ```


  你可以让一个方法返回一个匿名函数——像这样：


  ```

  // listing 04.94

  class Totalizer

  {

  public static function warnAmount()

  {

  return function (Product $product) {

  if ($product->price > 5) {

  print "    reached high price: {$product->price}\n";

  }

  };

  }

  }

  // listing 04.95

  $processor = new ProcessSale();

  $processor->registerCallback(Totalizer::warnAmount());

  // ...

  ```


  除了使用`warnAmount()`方法作为匿名函数的工厂带来的便利之外，我这里并没有太多有趣的地方。但这种结构允许我做更多的事情，而不仅仅是生成一个匿名函数。它让我能够利用闭包。新式的匿名函数可以引用在匿名函数父作用域中声明的变量。这个概念有时难以理解。就好像匿名函数一直记得它被创建时的上下文。想象一下，我希望`Totalizer::warnAmount()`做两件事。首先，我希望它接受一个任意的目标金额。其次，我希望它在产品销售时持续统计价格总和。当总额超过目标金额时，该函数将执行一个操作（在这种情况下，你大概猜到了，它只是简单地写一条消息）。


  我可以使用`use`子句让我的匿名函数跟踪其外部作用域的变量：


  ```

  // listing 04.96

  class Totalizer2

  {

  public static function warnAmount($amt)

  {

  $count=0;

  return function ($product) use ($amt, &$count) {

  $count += $product->price;

  print "   count: $count\n";

  if ($count > $amt) {

  print "   high price reached: {$count}\n";

  }

  };

  }

  }

  // listing 04.97

  $processor = new ProcessSale();

  $processor->registerCallback(Totalizer2::warnAmount(8));

  $processor->sale(new Product("shoes", 6));

  print "\n";

  $processor->sale(new Product("coffee", 6));

  ```


  由`Totalizer2::warnAmount()`返回的匿名函数在其`use`子句中指定了两个变量。第一个是`$amt`。这是`warnAmount()`接受的参数。第二个闭包变量是`$count`。`$count`在`warnAmount()`的函数体中声明并初始化为零。注意，我在`use`子句中的`$count`变量前加了一个与号（`&`）。这意味着在匿名函数中，这个变量将通过引用而不是值来访问。在匿名函数体中，我将产品价格累加到`$count`，然后将新的总额与`$amt`进行比较。如果达到了目标值，我就输出一条通知。


  以下是实际代码的输出：


  ```

  shoes: processing

  count: 6

  coffee: processing

  count: 12

  high price reached: 12

  ```


  这表明回调函数在两次调用之间保持了`$count`的跟踪。`$count`和`$amt`都与该函数保持关联，因为它们存在于函数声明的上下文中，并且在它的`use`子句中指定了。


  ### 匿名类


  从 PHP 7 开始，你可以声明匿名类以及匿名函数。当你需要从一个很小的类创建并派生一个实例时，这些特别有用。当涉及的类很简单且特定于局部上下文时，这尤其有用。


  让我们回到`PersonWriter`的例子。这次我将首先创建一个接口：


  ```

  // listing 04.98

  interface PersonWriter

  {

  public function write(Person $person);

  }

  ```


  现在，这是一个可以使用`PersonWriter`对象的`Person`类版本：


  ```

  // listing 04.99

  class Person

  {

  public function output(PersonWriter $writer)

  {

  $writer->write($this);

  }

  public function getName(): string

  {

  return "Bob";

  }

  public function getAge(): int

  {

  return 44;

  }

  }

  ```


  `output()`方法接受一个`PersonWriter`实例，然后将当前类的一个实例传递给它的`write()`方法。这样，`Person`类就与写入器的实现很好地隔离开了。


  转到客户端代码，如果我们需要一个写入器来打印`Person`对象的姓名和年龄值，我们可能会按照常规方式创建一个类。但这是一个如此简单的实现，我们可以同时创建一个类并将其传递给`Person`：


  ```

  // listing 04.100

  $person = new Person();

  $person->output(

  new class implements PersonWriter {

  public function write(Person $person)

  {

  print $person->getName(). " " . $person->getAge() . "\n";

  }

  }

  );

  ```


  如你所见，你可以使用关键字`new class`声明一个匿名类。然后，在创建类体之前，你可以根据需要添加任何`extends`和`implements`子句。


  匿名类不支持闭包。换句话说，在更广泛作用域中声明的变量不能在类内部访问。但是，你可以将值传递给匿名类的构造函数。让我们创建一个稍微复杂一点的`PersonWriter`：


  ```

  // listing 04.101

  $person = new Person();

  $person->output(

  new class("/tmp/persondump") implements PersonWriter {

  private $path;

  public function __construct(string $path)

  {

  $this->path = $path;

  }

  public function write(Person $person)

  {

  file_put_contents($this->path, $person->getName(). " " . $person->getAge() . "\n");

  }

  }

  );

  ```


  我向构造函数传递了一个路径参数。这个值被存储在`$path`属性中，并最终被`write()`方法使用。


  当然，如果你的匿名类开始变得庞大和复杂，那么在一个类文件中创建一个有名字的类就更有意义了。如果你发现自己不止在一个地方重复使用同一个匿名类，这一点尤其正确。




  ## 总结


  在本章中，我们深入探讨了 PHP 的高级面向对象特性。随着你研读本书，其中一些特性会逐渐变得熟悉。尤其是，我会频繁地回到抽象类、异常和静态方法这些主题上。


  在下一章中，我将暂离内置的对象特性，转而介绍那些旨在帮助你处理对象的类和函数。


  '
- "# 5. 对象工具\n\n正如我们所见，PHP 通过类和方法等语言结构支持面向对象编程。该语言还通过专门设计用于处理对象的函数和类提供了更广泛的支持。\n\n\
  在本章中，我们将探讨一些可用于组织、测试和操作对象及类的工具和技术。\n\n本章将涵盖以下工具和技术：\n\n- **命名空间**：将你的代码组织成离散的、类似包的结构\n\
  - **包含路径**：为你的库代码设置可访问的中心位置\n- **类与对象函数**：用于测试对象、类、属性和方法的函数\n- **反射 API**：一套功能强大的内置类，可在运行时提供对类信息的空前访问\n\
  \n## PHP 与包\n\n包是一组相关的类，通常以某种方式组合在一起。包可用于将系统的各个部分相互分离。一些编程语言正式支持包，并为它们提供不同的命名空间。PHP\
  \ 本身没有包的概念，但从 PHP 5.3 开始，它引入了命名空间。我将在下一节介绍这个特性。我还会简要介绍组织类以形成类似包结构的旧方法。\n\n### PHP\
  \ 包与命名空间\n\n尽管 PHP 本身不直接支持包的概念，但开发者传统上使用命名方案和文件系统来将他们的代码组织成类似包的结构。\n\n在 PHP 5.3\
  \ 之前，开发者被迫在全局上下文中为文件命名。换句话说，如果你将一个类命名为 `ShoppingBasket`，它就会立即在整个系统中可用。这引发了两个主要问题。首先，也是最严重的，是命名冲突的可能性。你可能认为这不太可能。毕竟，你只需要记住给所有的类起一个唯一的名称，对吧？问题在于，我们都越来越依赖库代码。当然，这是一件好事，因为它促进了代码复用。但假设你的项目是这样做的：\n\
  \n```\n// 清单 05.01\nrequire_once __DIR__ . \"/../useful/Outputter.php\";\nclass\
  \ Outputter\n{\n// 输出数据\n}\n```\n\n现在假设你包含了位于 `useful/Outputter.php` 的文件：\n\n```\n\
  // 清单 05.02\nclass Outputter\n{\n//\n}\n```\n\n那么，你可以猜到会发生什么，对吧？这是会发生的：\n\n```\n\
  PHP Fatal error:  Cannot declare class Outputter because the name is already in\
  \ use in /var/popp/src/ch05/batch01/useful/Outputter.php on line 4\n```\n\n早在引入命名空间之前，就有了针对这个问题的传统变通方法。答案是在类名前面加上包名，这样就能保证类名的唯一性：\n\
  \n```\n// 清单 05.03\n// my/Outputer.php\nrequire_once __DIR__ . \"/../useful/Outputter.php\"\
  ;\nclass my_Outputter\n{\n// 输出数据\n}\n// 清单 05.04\n// useful/Outputter.php\nclass\
  \ useful_Outputter\n{\n//\n}\n```\n\n这里的问题是，随着项目变得越来越复杂，类名变得越来越长。这本身不算一个巨大的问题，但它导致了代码可读性问题，并使你在工作时更难记住所有的类名。大量累积的编码时间就这样浪费在了输入错误上。\n\
  \n如果你在维护遗留代码，你可能仍然会看到遵循此约定的代码。因此，我将在本章稍后部分简要回到处理包的旧方法。\n\n#### 命名空间的救赎\n\nPHP 5.3\
  \ 引入了命名空间。本质上，命名空间是一个容器，你可以在其中放置你的类、函数和变量。在命名空间内，你可以不加限定地访问这些条目。从外部来看，你必须导入命名空间或引用它，才能访问它所包含的条目。\n\
  \n感到困惑吗？举个例子应该会有帮助。这里我用命名空间重写了前面的例子：\n\n```\n// 清单 05.05\nnamespace my;\nrequire_once\
  \ __DIR__ . \"/../useful/Outputter.php\";\nclass Outputter\n{\n// 输出数据\n}\n// 清单\
  \ 05.06\nnamespace useful;\nclass Outputter\n{\n//\n}\n```\n\n注意 `namespace` 关键字。正如你所料，这个关键字用于建立命名空间。如果你使用了这个特性，那么命名空间声明必须是该文件中的第一条语句。我创建了两个命名空间：`my`\
  \ 和 `useful`。然而，通常你会想要更深的命名空间。你会从一个组织或项目标识符开始。然后，你会想通过包来进一步限定它。PHP 允许你声明嵌套命名空间。为此，你只需使用反斜杠字符来分隔每一级：\n\
  \n```\n// 清单 05.07\nnamespace popp\\ch05\\batch04\\util;\nclass Debug\n{\npublic\
  \ static function helloWorld()\n{\nprint \"hello from Debug\\n\";\n}\n}\n```\n\n\
  你通常会使用与产品或组织相关的名称来定义一个库。例如，我可能会使用我的一个域名：`getinstance.com`。因为域名对其所有者是唯一的，这是 Java\
  \ 开发者通常用于其包名的技巧。他们会反转域名，使其从最通用到最具体。或者，我也可以使用我为本书中的代码示例选择的命名空间：`popp`，表示书名。一旦我确定了我的库，我可能会继续定义包。在这种情况下，我使用章节号，然后是一个编号的批处理。这使我可以将示例组组织到离散的容器中。因此，在本章的这一点上，我位于\
  \ `popp\\ch05\\batch04`。最后，我可以按类别进一步组织代码。我选择了 `util`。\n\n那么我该如何调用这个方法呢？实际上，这取决于你从哪里发起调用。如果你在命名空间内部调用该方法，你可以直接调用它：\n\
  \n```\nDebug::helloWorld() ;\n```\n\n这被称为非限定名称。因为我已经在 `popp\\ch05\\batch04\\util`\
  \ 命名空间中了，所以我不必在类名前面添加任何路径。如果我是在命名空间上下文之外访问该类，我可以这样做：\n\n```\n\\popp\\ch05\\batch04\\\
  Debug::helloworld();\n```\n\n对于以下代码，我会得到什么输出呢？\n\n```\nnamespace main;\npopp\\ch05\\\
  batch04\\Debug::helloworld();\n```\n\n这是一个陷阱问题。实际上，这是我的输出：\n\n```\nPHP Fatal error:\
  \  Class 'popp\\ch05\\batch04\\Debug' not found in...\n```\n\n这是因为我在使用相对命名空间。PHP\
  \ 在命名空间 `main` 下查找 `popp\\ch05\\batch04\\util`，但没有找到。正如你可以通过使用分隔符来创建绝对的 URL 和文件路径一样，命名空间也是如此。这个版本的例子修复了之前的错误：\n\
  \n```\nnamespace main;\n\\popp\\ch05\\batch04\\Debug::helloworld();\n```\n\n前导的反斜杠告诉\
  \ PHP 从根命名空间开始搜索，而不是从当前命名空间开始。\n\n但是，命名空间不应该是为了帮助你减少输入吗？`Debug` 类的声明当然更短了，但是那些调用和旧的命名约定一样冗长。你可以通过\
  \ `use` 关键字来解决这个问题。它允许你在当前命名空间中为其他命名空间设置别名。这里有一个例子：\n\n```\nnamespace main;\nuse\
  \ popp\\ch05\\batch04\\util;\nutil\\Debug::helloWorld();\n```\n\n\n好的，作为高级文档工程师和翻译员，我将严格按照您的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n`popp\\ch05\\batch04\\util`命名空间被导入，并隐式别名为`util`。请注意，我并没有以反斜杠开头。`use`的参数是从全局空间搜索的，而不是从当前命名空间。如果我不想引用任何命名空间，我可以直接导入`Debug`类：\n\
  \n```\nnamespace main;\nuse popp\\ch05\\batch04\\util\\Debug;\nDebug::helloWorld();\n\
  ```\n\n这是最常用的约定。但如果调用命名空间中已经存在一个`Debug`类会怎样？下面是这样一个类：\n\n```\n// listing 05.08\n\
  namespace popp\\ch05\\batch04;\nclass Debug\n{\n    public static function helloWorld()\n\
  \    {\n        print \"hello from popp\\\\ch05\\\\batch04\\\\Debug\\n\";\n    }\n\
  }\n```\n\n以下是来自`popp\\ch05\\batch04`命名空间的一些调用代码，它引用了两个`Debug`类：\n\n```\nnamespace\
  \ popp\\ch05\\batch04;\nuse popp\\ch05\\batch04\\util\\Debug;\nuse popp\\ch05\\\
  batch04\\Debug;\nDebug::helloWorld();\n```\n\n正如您所料，这会导致一个致命错误：\n\n```\nPHP Fatal\
  \ error:  Cannot use popp\\ch05\\batch04\\Debug as Debug because the name is already\
  \ in use in...\n```\n\n所以，我似乎又回到了原点，遇到了类名冲突的问题。幸运的是，这个问题有解决办法。我可以显式地指定别名：\n\n```\n\
  namespace main;\nuse popp\\ch05\\batch04\\Debug as coreDebug;\ncoreDebug::helloWorld();\n\
  ```\n\n通过使用`use`的`as`子句，我能够将`Debug`别名改为`coreDebug`。\n\n如果你在某个命名空间中编写代码，并希望访问位于全局（非命名空间）空间中的类，你只需在类名前面加一个反斜杠。下面是一个在全局空间中声明的类：\n\
  \n```\n// listing 05.09\nclass Lister\n{\n    public static function helloWorld()\n\
  \    {\n        print \"hello from global\\n\";\n    }\n}\n```\n\n以下是一些带命名空间的代码：\n\
  \n```\n// listing 05.10\nnamespace popp\\ch05\\batch04\\util;\nclass Lister\n{\n\
  \    public static function helloWorld()\n    {\n        print \"hello from \" .\
  \ __NAMESPACE__ . \"\\n\";\n    }\n}\n// listing 05.11\nnamespace popp\\ch05\\batch04;\n\
  Lister::helloWorld();  // access local\n\\Lister::helloWorld(); // access global\n\
  ```\n\n命名空间代码声明了自己的`Lister`类。同一命名空间中的客户端代码使用非限定名称来访问本地版本。用单个反斜杠限定的名称用于访问全局空间中的类。\n\
  \n以下是前面代码片段的输出：\n\n```\nhello from popp\\ch05\\batch04\\util\nhello from global\n\
  ```\n\n这很值得展示，因为它演示了`__NAMESPACE__`常量的操作。它会输出当前命名空间，并且在调试中很有用。\n\n你可以使用你已经见过的语法在同一个文件中声明多个命名空间。你也可以使用另一种语法，该语法将大括号与`namespace`关键字一起使用：\n\
  \n```\n// listing 05.12\nnamespace com\\getinstance\\util {\n    class Debug\n \
  \   {\n        public static function helloWorld()\n        {\n            print\
  \ \"hello from Debug\\n\";\n        }\n    }\n}\nnamespace other {\n    \\com\\\
  getinstance\\util\\Debug::helloWorld();\n}\n```\n\n如果你必须在同一个文件中组合多个命名空间，那么这是推荐的做法。然而，通常的最佳实践是按文件定义命名空间。\n\
  \n注意\n\n你不能在同一个文件中同时使用大括号和行内命名空间语法。你必须选择一种并全程使用它。\n\n### 使用文件系统模拟包\n\n无论你使用哪个版本的\
  \ PHP，你都应该使用文件系统来组织类，这提供了一种包结构。例如，你可以创建`util`和`business`目录，并使用`require_once()`语句包含类文件，如下所示：\n\
  \n```\nrequire_once('business/Customer.php');\nrequire_once('util/WebTools.php');\n\
  ```\n\n你也可以使用`include_once()`，效果相同。`include()`和`require()`语句之间唯一的区别在于它们对错误的处理方式。使用`require()`调用的文件在遇到错误时会导致整个进程崩溃。通过`include()`调用遇到的相同错误只会生成一个警告并结束被包含文件的执行，让调用代码继续运行。这使得`require()`和`require_once()`成为包含库文件的安全选择，而`include()`和`include_once()`则适用于模板等操作。\n\
  \n注意\n\n`require()`和`require_once()`实际上是语句，而不是函数。这意味着在使用它们时可以省略括号。就个人而言，我仍然喜欢使用括号，但如果你也这样做，就要准备好忍受那些急于指出你错误的人的说教。\n\
  \n图 5-1 从 Nautilus 文件管理器的角度展示了`util`和`business`包。\n\n![A314621_5_En_5_Fig1_HTML.jpg](img/A314621_5_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1.\n\n使用文件系统组织的 PHP 包\n\n注意\n\n`require_once()`接受一个文件的路径，并将其包含进来，在当前脚本中进行评估。只有当其目标尚未在其他地方被包含时，该函数才会纳入它。这种一次性方法在访问库代码时特别有用，因为它可以防止类或函数的意外重复定义。当同一个文件在单个进程中被脚本的不同部分使用`require()`或`include()`等函数包含时，就可能发生这种重复定义。\n\
  \n习惯上，推荐使用`require()`和`require_once()`，而不是类似的`include()`和`include_once()`函数。这是因为在通过`require()`函数访问的文件中遇到致命错误会使整个脚本崩溃。而通过`include()`函数访问的文件中遇到的相同错误会导致被包含文件停止执行，但只会在调用脚本中生成一个警告。前者更激烈的行为更为安全。\n\
  \n与`require()`相比，使用`require_once()`会带来一些性能开销。如果你需要为系统榨取每一毫秒的性能，你可能需要考虑改用`require()`。像通常情况一样，这是效率与便利性之间的权衡。\n\
  \n就 PHP 而言，这种结构并没有什么特别之处。你只是将库脚本放置在不同的目录中。它确实有助于清晰的组织，并且可以与命名空间或命名约定并行使用。\n\n###\
  \ PEAR 风格的命名\n\n在命名空间引入之前，开发人员被迫依靠约定来避免类名冲突。正如我们所见，最常见的就是由 PEAR 开发者维护的伪命名空间。\n\n\
  注意\n\nPEAR 代表 PHP 扩展与应用库（PHP Extension and Application Repository）。它是一个官方维护的包和工具档案库，用于扩展\
  \ PHP 的功能。核心 PEAR 包包含在 PHP 发行版中，其他包则可以通过一个简单的命令行工具添加。你可以在 [`http://pear.php.net`](http://pear.php.net)\
  \ 浏览 PEAR 包。\n\nPEAR 使用文件系统来定义其包，正如我所描述的那样。在引入命名空间之前，每个类都根据其包路径进行命名，每个目录名用下划线字符分隔。\n\
  \n例如，PEAR 包含一个名为`XML`的包，它有一个`RPC`子包。`RPC`包包含一个名为`Server.php`的文件。`Server.php`中定义的类并不像你预期的那样叫做`Server`。没有命名空间，这个类迟早会与\
  \ PEAR 项目或用户代码中其他地方的另一个`Server`类发生冲突。相反，这个类被命名为`XML_RPC_Server`。这种方法导致类名不够美观。然而，它确实使代码易于阅读，因为类名总是描述其自身的上下文。\n\
  \n\n\n### 包含路径\n\n在组织组件时，需要牢记两个视角。第一个视角已经讨论过，即文件和目录在文件系统中的存放位置。但还应考虑组件之间的互相访问方式。到目前为止，本节对包含路径的问题只是浅尝辄止。当包含一个文件时，可以使用当前工作目录的相对路径或文件系统上的绝对路径来引用它。\n\
  \n**注意：** 理解包含路径的工作方式以及引入文件所涉及的问题固然重要，但同样要记住，许多现代系统不再在类级别依赖 `require` 语句。相反，它们结合使用了自动加载和命名空间。我将在下面介绍自动加载，然后在第\
  \ 15 章和第 16 章中更详细地探讨实用的自动加载建议和工具。\n\n到目前为止，你看到的示例偶尔会指定请求文件与被请求文件之间的固定关系：\n\n```\n\
  require_once(__DIR__ . '/../useful/Outputter.php');\n```\n\n这种写法虽然可以正常工作，但硬编码了文件之间的关系。调用类所在的目录旁必须始终存在一个\
  \ `useful` 目录。\n\n最糟糕的做法或许是曲折的相对路径：\n\n```\nrequire_once('../../projectlib/business/User.php');\n\
  ```\n\n这样做是有问题的，因为此处指定的路径并非相对于包含此 `require_once` 语句的文件，而是相对于已配置的调用上下文（通常（但并非总是）是当前工作目录）。像这样的路径是制造混乱的根源（根据我的经验，这几乎总是一个信号，表明系统在其他方面也需要大幅改进）。\n\
  \n当然，你也可以使用绝对路径：\n\n```\nrequire_once('/home/john/projectlib/business/User.php');\n\
  ```\n\n这在单个实例上可以工作——但它很脆弱。通过如此详细地指定路径，你将库文件冻结在特定的上下文中。每当将项目安装到新服务器时，所有 `require`\
  \ 语句都需要修改以适应新的文件路径。这使得库难以迁移，并且如果不复制副本，项目之间共享库也不现实。在这两种情况下，你都会在众多附加目录中丢失包的概念。这到底是\
  \ `business` 包，还是 `projectlib/business` 包？\n\n如果必须手动在代码中包含文件，最简洁的方法是将调用代码与库解耦：\n\
  \n```\nbusiness/User.php\n```\n\n上述代码片段可以从系统上的任何位置引用。你可以通过包含路径来实现这一点。包含路径是一个目录列表，当试图引入文件时，PHP\
  \ 会搜索这些目录。你可以通过修改 `include_path` 指令来向此列表添加目录。`include_path` 通常在 PHP 的中央配置文件 `php.ini`\
  \ 中设置。它定义了一个目录列表，在类 Unix 系统上用冒号分隔，在 Windows 系统上用分号分隔：\n\n```\ninclude_path = \"\
  .:/usr/local/lib/php-libraries\"\n```\n\n如果你使用 Apache，还可以在服务器应用程序的配置文件（通常称为 `httpd.conf`）或按目录的\
  \ Apache 配置文件（通常称为 `.htaccess`）中使用以下语法设置 `include_path`：\n\n```\nphp_value  include_path\
  \  value    .:/usr/local/lib/php-libraries\n```\n\n**注意：** `.htaccess` 文件在某些托管公司提供的网络空间中特别有用，这些公司对服务器环境的访问权限非常有限。\n\
  \n当你对当前工作目录中不存在的非绝对路径使用像 `fopen()` 或 `require()` 这样的文件系统函数时，会自动搜索包含路径中的目录，从列表中的第一个目录开始（对于\
  \ `fopen()`，你必须在参数列表中包含一个标志才能启用此功能）。当找到目标文件时，搜索结束，并且文件函数完成任务。\n\n因此，通过将包目录放在包含目录中，你只需在\
  \ `require()` 语句中引用包和文件即可：\n\n```\nrequire_once(\"business/User.php\");\n```\n\n\
  你可能需要将一个目录添加到 `include_path`，以便维护自己的库目录。为此，可以编辑 `php.ini` 文件（请记住，对于 PHP 服务器模块，你需要重启服务器才能使更改生效）。\n\
  \n如果你没有操作 `php.ini` 文件所需的权限，可以使用 `set_include_path()` 函数从脚本内部设置包含路径。`set_include_path()`\
  \ 接受一个包含路径（如同在 `php.ini` 中出现的那样），并且仅更改当前进程的 `include_path` 设置。`php.ini` 文件可能已经为\
  \ `include_path` 定义了一个有用的值，因此与其覆盖它，不如使用 `get_include_path()` 函数访问它，并附加你自己的目录。以下是将目录添加到当前包含路径的方法：\n\
  \n```\nset_include_path(get_include_path() . PATH_SEPARATOR . \"/home/john/phplib/\"\
  );\n```\n\n`PATH_SEPARATOR` 常量在 Unix 系统上解析为冒号，在 Windows 平台上解析为分号。因此，出于可移植性的原因，使用它被认为是最佳实践。\n\
  \n\n\n### 自动加载\n\n虽然在引入路径中使用 `require_once` 很简洁，但许多开发者已经彻底摆脱了高层次的 require 语句，转而依赖自动加载。\n\
  \n为此，你应该组织好你的类，让每个类都位于独立的文件中。每个类文件应与其所包含的类名保持固定关系，因此你可以在名为 `ShopProduct.php` 的文件中定义一个\
  \ `ShopProduct` 类，并根据类命名空间的元素使用相应的目录。\n\nPHP 5 引入了自动加载功能，以帮助自动引入类文件。默认支持相当基础，但仍然有用。它可以通过调用不带参数的\
  \ `spl_autoload_register()` 函数来启用。如果以这种方式启用了自动加载功能，那么当尝试实例化一个未知类时，一个名为 `spl_autoload()`\
  \ 的特殊函数将被调用。`spl_autoload()` 函数将接收类名，并尝试使用该类名（转换为小写）以及文件扩展名（默认为 `php` 或 `inc`）来引入相应的类文件。\n\
  \n下面是一个简单的例子：\n\n```\nspl_autoload_register();\n$writer = new Writer();\n```\n\n\
  假设我还没有引入包含 `Writer` 对象的文件，这个实例化看起来注定会失败。然而，因为我设置了自动加载，PHP 将尝试引入名为 `writer.php` 或\
  \ `writer.inc` 的文件，然后再次尝试实例化。如果这些文件之一存在，并且包含一个名为 `Writer` 的类，那么一切都会正常。\n\n这种默认行为支持命名空间，用目录名替换每个包：\n\
  \n```\nspl_autoload_register();\n$writer = new util\\Writer();\n```\n\n上述代码将在名为\
  \ `util` 的目录中查找名为 `writer.php`（注意使用小写名称）的文件。\n\n如果我不巧以区分大小写的方式命名了类文件呢？也就是说，如果我保留了类名中的大写字母，那么默认实现将无法找到它。\n\
  \n幸运的是，我可以注册自己的自定义函数来处理不同的约定集。为了利用这一点，我必须将自定义函数的引用传递给 `spl_autoload_register()`。我的自动加载函数应接受一个参数。然后，当\
  \ PHP 引擎遇到尝试实例化未知类时，它将调用此函数，并将未知类名作为字符串传递给它。自动加载函数负责定义定位并引入缺失类文件的策略。一旦自动加载函数被调用，PHP\
  \ 将再次尝试实例化该类。\n\n下面是一个简单的自动加载函数，以及一个要加载的类：\n\n```\n// listing 05.13\nclass Blah\n\
  {\npublic function wave()\n{\nprint \"saying hi from root\";\n}\n}\n// listing 05.14\n\
  $basic = function ($classname) {\n$file = __DIR__ . \"/\" . \"{$classname}.php\"\
  ;\nif (file_exists($file)) {\nrequire_once($file);\n}\n};\n\\spl_autoload_register($basic);\n\
  $blah = new Blah();\n$blah->wave();\n```\n\n初始实例化 `Blah` 失败后，PHP 引擎将发现我已经用 `spl_register_function()`\
  \ 注册了一个自动加载函数，并将字符串 `\"Blah\"` 传递给它。我的实现只是尝试引入 `Blah.php` 文件。当然，这仅在文件与声明自动加载函数的文件位于同一目录时才能生效。在实际示例中，我必须将包含路径配置与自动加载逻辑结合起来（这正是\
  \ Composer 自动加载实现所做的）。\n\n如果我想提供旧式的支持，我可能会自动化 PEAR 包的引入：\n\n```\n// listing 05.15\n\
  class util_Blah\n{\npublic function wave()\n{\nprint \"saying hi from underscore\
  \ file\";\n}\n}\n// listing 05.16\n$underscores = function ($classname) {\n$path\
  \ = str_replace('_', DIRECTORY_SEPARATOR, $classname);\n$path = __DIR__ . \"/$path\"\
  ;\nif (file_exists(\"{$path}.php\")) {\nrequire_once(\"{$path}.php\");\n}\n};\n\\\
  spl_autoload_register($underscores);\n$blah = new util_Blah();\n$blah->wave();\n\
  ```\n\n如你所见，自动加载函数匹配提供的 `$classname` 中的下划线，并将每个下划线替换为 `DIRECTORY_SEPARATOR` 字符（Unix\
  \ 系统上为 `/`）。我尝试引入类文件（`util/Blah.php`）。如果类文件存在，并且其中包含的类正确命名，则对象应无错误地实例化。当然，这确实要求程序员遵守命名约定，禁止在类名中使用下划线字符，除非用于分隔包。\n\
  \n命名空间呢？我们已经看到默认的自动加载功能支持命名空间。但如果我们覆盖了默认设置，就需要自己提供命名空间支持。这只需匹配并替换反斜杠字符：\n\n```\n\
  // listing 05.17\nnamespace util;\nclass LocalPath\n{\npublic function wave()\n\
  {\nprint \"hello from \".get_class();\n}\n}\n// listing 05.18\n$namespaces = function\
  \ ($path) {\nif (preg_match('/\\\\\\\\/', $path)) {\n$path = str_replace('\\\\',\
  \ DIRECTORY_SEPARATOR, $path);\n}\nif (file_exists(\"{$path}.php\")) {\nrequire_once(\"\
  {$path}.php\");\n}\n};\n\\spl_autoload_register($namespaces);\n$obj = new util\\\
  LocalPath();\n$obj->wave();\n```\n\n传递给自动加载函数的值始终规范化为完全限定名称，没有前导反斜杠，因此在实例化时无需担心别名或相对命名空间。\n\
  \n如果我想同时支持 PEAR 风格的类名和命名空间呢？我可以将自动加载实现合并到一个自定义函数中。或者，我可以利用 `spl_autoload_register()`\
  \ 会堆叠其自动加载函数这一特性：\n\n```\n// listing 05.19\n\\spl_autoload_register($namespaces);\n\
  \\spl_autoload_register($underscores);\n$blah = new util_Blah();\n$blah->wave();\n\
  $obj = new util\\LocalPath();\n$obj->wave();\n```\n\n当遇到未知类时，PHP 引擎将依次调用自动加载函数，直到实例化成功或所有选项都已用尽。\n\
  \n显然，这种堆叠方式会有一定开销，那么 PHP 为什么支持它呢？在实际项目中，你可能会将命名空间和下划线策略合并到一个函数中。然而，大型系统和第三方库中的组件可能需要注册自己的自动加载机制。堆叠允许系统的多个部分独立注册自动加载策略，而不会相互覆盖。事实上，一个只需要短暂自动加载机制的库，可以在完成后将自定义自动加载函数的名称（如果是匿名函数，则传递其引用）传递给\
  \ `spl_autoload_unregister()`，以清理自身！\n\n**注意**\n\nPHP 支持 `__autoload()`，这是一种功能较弱的自动文件包含管理机制。如果你提供了\
  \ `__autoload()` 函数的实现，PHP 在找不到类时会调用你的函数。然而，由于这种方法只支持单个自动加载函数且无法堆叠，它可能会在未来的 PHP\
  \ 版本中被弃用。更多详情请参见 [`www.php.net/spl_autoload_register`](http://www.php.net/spl_autoload_register)。\n\
  \n\n\n### 类与对象函数\n\nPHP 提供了一组强大的函数，用于测试类和对象。这有什么用处呢？毕竟，你在脚本中使用的大多数类很可能都是你自己编写的。\n\
  \n实际上，在运行时，你并不总是了解正在使用的类。例如，你可能设计了一个系统，使其能够透明地与第三方附加类一起工作。在这种情况下，你通常只会根据一个类名来实例化对象。PHP\
  \ 允许你使用字符串来动态引用类，就像这样：\n\n```\n// 代码清单 05.20\nnamespace tasks;\nclass Task\n{\n\
  public function doSpeak()\n{\nprint \"hello\\n\";\n}\n}\n// 代码清单 05.21\n$classname\
  \ = \"Task\";\nrequire_once(\"tasks/{$classname}.php\");\n$classname = \"tasks\\\
  \\$classname\";\n$myObj = new $classname();\n$myObj->doSpeak();\n```\n\n这个脚本可能从配置文件中获取我赋给\
  \ `$classname` 的字符串，或者通过将 Web 请求与目录内容进行比较来获取。然后你可以使用这个字符串来加载类文件并实例化一个对象。请注意，我在这个代码片段中构建了一个命名空间限定。\n\
  \n通常，当你希望系统能够运行用户创建的插件时，你会做类似的事情。在实际项目中做如此冒险的事情之前，你必须检查该类是否存在，它是否具有你期望的方法，等等。\n\n\
  **注意**\n\n即使有安全保障措施，你也应该对动态安装第三方插件代码保持极度谨慎。你绝不应该自动运行用户上传的代码。任何这样安装的插件通常会以与核心代码相同的权限执行，因此恶意的插件作者可能会对你的系统造成严重破坏。\n\
  \n这并不是说插件不是一个好主意。允许第三方开发者增强核心系统可以提供极大的灵活性。为了确保更高的安全性，你可以支持一个用于插件的目录，但要求代码文件由系统管理员安装，可以直接安装，也可以在受密码保护的管理环境中安装。管理员在安装前应亲自检查插件代码，或者从信誉良好的仓库获取插件。这就是流行的博客平台\
  \ WordPress 处理插件的方式。\n\n一些类函数已被功能更强大的 Reflection API 取代，我将在本章后面介绍。然而，这些函数由于其简单易用，在某些情况下仍然是首选。\n\
  \n### 查找类\n\n`class_exists()` 函数接受一个表示待检查类的字符串，如果类存在则返回布尔值 `true`，否则返回 `false`。\n\
  \n使用这个函数，我可以让前面的代码片段更安全一些：\n\n```\n// 代码清单 05.22\n$base = __DIR__;\n$classname =\
  \ \"Task\";\n$path = \"{$base}/tasks/{$classname}.php\";\nif (! file_exists($path))\
  \ {\nthrow new \\Exception(\"No such file as {$path}\");\n}\nrequire_once($path);\n\
  $qclassname = \"tasks\\\\$classname\";\nif (! class_exists($qclassname)) {\nthrow\
  \ new Exception(\"No such class as $qclassname\");\n}\n$myObj = new $qclassname();\n\
  $myObj->doSpeak();\n```\n\n当然，你无法确定所涉及的类是否不需要构造函数参数。要达到那种安全级别，你必须求助于本章后面介绍的 Reflection\
  \ API。尽管如此，`class_exists()` 确实允许你在使用某个类之前检查它是否存在。\n\n**注意**\n\n请记住，如前所述，你应该始终警惕任何来自外部的数据。在使用之前，要先对其测试和处理。对于文件路径，你应该转义或移除点和目录分隔符，以防止不道德的用户更改目录并包含意外的文件。然而，当我描述构建易于扩展系统的方法时，这些技术通常针对的是部署的所有者（以及其隐含的写入权限），而不是其外部用户。\n\
  \n你还可以使用 `get_declared_classes()` 函数获取脚本进程中定义的所有类的数组：\n\n```\nprint_r(get_declared_classes());\n\
  ```\n\n这将列出用户定义的类以及内置类。请记住，它只返回函数调用时已声明的类。你稍后可能会运行 `require()` 或 `require_once()`，从而增加脚本中的类的数量。\n\
  \n### 了解对象或类\n\n如你所知，你可以使用类类型提示来约束方法参数的对象类型。但即使有这个工具，你也不一定能确定对象的类型。\n\n有许多基本工具可用于检查对象的类型。首先，你可以使用\
  \ `get_class()` 函数检查对象的类。该函数接受任何对象作为参数，并返回其类名作为字符串：\n\n```\n// 代码清单 05.23\n$product\
  \ = self::getProduct();\nif (get_class($product) === 'popp\\ch05\\batch05\\CdProduct')\
  \ {\nprint \"\\$product is a CdProduct object\\n\";\n}\n```\n\n在这个代码片段中，我从 `getProduct()`\
  \ 函数中获取了一些东西。为了完全确定它是一个 `CdProduct` 对象，我使用了 `get_class()` 方法。\n\n**注意**\n\n我在第 3\
  \ 章中介绍了 `CdProduct` 和 `BookProduct` 类。\n\n这是 `getProduct()` 函数：\n\n```\n// 代码清单\
  \ 05.24\npublic static function getProduct()\n{\nreturn new CdProduct(\n\"Exile\
  \ on Coldharbour Lane\",\n\"The\",\n\"Alabama 3\",\n10.99,\n60.33\n);\n}\n```\n\n\
  `getProduct()` 只是实例化并返回一个 `CdProduct` 对象。我将在本节中充分利用这个函数。\n\n`get_class()` 是一个非常具体的工具。你通常需要更一般性地确认类的类型。你可能想知道一个对象是否属于\
  \ `ShopProduct` 家族，但你不关心它的实际类是 `BookProduct` 还是 `CdProduct`。为此，PHP 提供了 `instanceof`\
  \ 操作符。\n\n**注意**\n\nPHP 4 不支持 `instanceof`。它提供的是 `is_a()` 函数，该函数在 PHP 5.0 中被弃用，但在\
  \ PHP 5.3 中恢复使用。\n\n`instanceof` 操作符使用两个操作数：要测试的对象位于关键字左侧，类名或接口名位于右侧。如果对象是给定类型的实例，则解析为\
  \ `true`：\n\n```\n// 代码清单 05.25\n$product = self::getProduct();\nif ($product instanceof\
  \ \\popp\\ch05\\batch05\\CdProduct) {\nprint \"\\$product is an instance of CdProduct\\\
  n\";\n}\n```\n\n### 获取类的完全限定字符串引用\n\n命名空间清理了面向对象 PHP 中许多丑陋之处。我们不再需要容忍长得离谱的类名，或冒着命名冲突的风险（遗留代码除外）。另一方面，由于别名和相对命名空间引用的存在，解析某些类路径以使其完全限定可能是一件繁琐的事情。\n\
  \n以下是一些难以解析的类名示例：\n\n```\nnamespace mypackage;\nuse util as u;\nuse util\\db\\Querier\
  \ as q;\nclass Local {}\n// 解析这些：\n// 别名化命名空间\n//  u\\Writer;\n// 别名化类\n//  q;\n\
  // 在本地上下文中引用的类\n//  Local\n```\n\n弄清楚这些类引用如何解析并不太难，但编写代码来涵盖所有可能性会很麻烦。例如，对于 `u\\\
  Writer`，自动解析器需要知道 `u` 是 `util` 的别名，而不是一个独立的命名空间。PHP 5.5 引入了 `ClassName::class` 语法，非常有帮助。换句话说，给定一个类引用，你可以附加作用域解析操作符和\
  \ `class` 关键字来获取完全限定的类名：\n\n```\nprint u\\Writer::class . \"\\n\";\nprint q::class\
  \ . \"\\n\";\nprint Local::class . \"\\n\";\n```\n\n前面的代码片段输出如下：\n\n```\nutil\\\
  Writer\nutil\\db\\Querier\nmypackage\\Local\n```\n\n\n\n### 了解方法\n\n你可以使用 `get_class_methods()`\
  \ 函数获取一个类中所有方法的列表。该函数需要传入一个类名，并返回一个包含该类所有方法名称的数组：\n\n```\nprint_r(get_class_methods('\\\
  \\popp\\\\ch04\\\\batch02\\\\BookProduct'));\n```\n\n假设 `BookProduct` 类存在，你可能会看到类似如下的输出：\n\
  \n```\nArray\n(\n[0] => __construct\n[1] => getNumberOfPages\n[2] => getSummaryLine\n\
  [3] => getPrice\n[4] => setID\n[5] => getProducerFirstName\n[6] => getProducerMainName\n\
  [7] => setDiscount\n[8] => getDiscount\n[9] => getTitle\n[10] => getProducer\n[11]\
  \ => getInstance\n)\n```\n\n在示例中，我将一个类名传递给 `get_class_methods()`，并使用 `print_r()`\
  \ 函数打印返回的数组。我也可以将一个对象传递给 `get_class_methods()`，得到的结果相同。返回的列表中只会包含公共方法的名称。\n\n正如你所看到的，你可以将方法名存储在一个字符串变量中，并配合对象动态调用它，如下所示：\n\
  \n```\n// listing 05.26\n$product = self::getProduct(); // 获取一个对象\n$method = \"\
  getTitle\";          // 定义一个方法名\nprint $product->$method();     // 调用该方法\n```\n\n\
  当然，这可能存在风险。如果该方法不存在会怎样？正如你所料，脚本会报错并失败。你已经遇到过一种测试方法是否存在的方式：\n\n```\nif (in_array($method,\
  \ get_class_methods($product))) {\nprint $product->$method(); // 调用该方法\n}\n```\n\
  \n在调用方法之前，我检查了该方法名是否存在于 `get_class_methods()` 返回的数组中。PHP 为此提供了更专门的工具。你可以通过两个函数在一定程度上检查方法名：`is_callable()`\
  \ 和 `method_exists()`。`is_callable()` 是两者中更复杂的一个。它接受一个代表函数名的字符串变量作为第一个参数，如果该函数存在且可调用，则返回\
  \ `true`。要对方法应用同样的测试，你需要传入一个数组来代替函数名。该数组必须包含一个对象或类名作为第一个元素，以及要检查的方法名作为第二个元素。如果该方法在类中存在，该函数将返回\
  \ `true`：\n\n```\n// listing 05.27\nif (in_array($method, get_class_methods($product)))\
  \ {\nprint $product->$method(); // 调用该方法\n}\n```\n\n`is_callable()` 可选地接受第二个参数，一个布尔值。如果将其设置为\
  \ `true`，该函数将仅检查给定方法或函数名的语法，而不检查其实际是否存在。\n\n`method_exists()` 函数需要一个对象（或一个类名）和一个方法名，如果给定方法在该对象的类中存在，则返回\
  \ `true`：\n\n```\n// listing 05.28\nif (method_exists($product, $method)) {\nprint\
  \ $product->$method(); // 调用该方法\n}\n```\n\n**警告**\n\n请记住，方法存在并不意味着它可调用。对于 `private`\
  \ 和 `protected` 方法，以及 `public` 方法，`method_exists()` 都会返回 `true`。\n\n### 了解属性\n\n\
  正如你可以查询类的方法，你也可以查询它的字段。`get_class_vars()` 函数需要一个类名，并返回一个关联数组。返回的数组以字段名作为键，以字段值作为值。让我们将此测试应用于\
  \ `CdProduct` 对象。为了便于说明，我们向该类添加一个公共属性 `CdProduct::$coverUrl`：\n\n```\nprint_r(get_class_vars('\\\
  \\popp\\\\ch05\\\\batch05\\\\CdProduct'));\n```\n\n仅显示公共属性：\n\n```\nArray\n(\n[coverUrl]\
  \ => cover url\n)\n```\n\n### 了解继承\n\n类函数也允许我们绘制继承关系图。例如，我们可以使用 `get_parent_class()`\
  \ 查找一个类的父类。该函数需要一个对象或一个类名，并返回超类的名称（如果有的话）。如果没有这样的类——即我们测试的类没有父类 ——则该函数返回 `false`。\n\
  \n```\nprint get_parent_class('\\\\popp\\\\ch04\\\\batch02\\\\BookProduct');\n```\n\
  \n如你所料，这将产生父类：`ShopProduct`。\n\n我们还可以使用 `is_subclass_of()` 函数测试一个类是否是另一个类的子类。该函数需要一个子对象（或类名）以及父类的名称。如果第二个参数是第一个参数的超类，则该函数返回\
  \ `true`：\n\n```\n// listing 05.29\n$product = self::getBookProduct(); // 获取一个对象\n\
  if (is_subclass_of($product, '\\\\popp\\\\ch04\\\\batch02\\\\ShopProduct')) {\n\
  print \"BookProduct is a subclass of ShopProduct\\n\";\n}\n```\n\n`is_subclass_of()`\
  \ 只能告诉你类的继承关系。它不会告诉你一个类是否实现了某个接口。为此，你应该使用 `instanceof` 运算符。或者，你可以使用 SPL（标准 PHP 库）中的一个函数。`class_implements()`\
  \ 接受一个类名或对象引用，并返回一个接口名称数组：\n\n```\n// listing 05.30\nif (in_array('someInterface',\
  \ class_implements($product))) {\nprint \"BookProduct is an interface of someInterface\\\
  n\";\n}\n```\n\n\n\n### 方法调用\n\n之前你已经见过一个使用字符串动态调用方法的例子：\n\n```\n$product = getProduct();\
  \   // 获取一个对象\n$method = \"getTitle\";      // 定义一个方法名\nprint $product->$method();\
  \ // 调用方法\n```\n\nPHP 也提供了 `call_user_func()` 方法来实现同样的目的。`call_user_func()` 既可以调用方法，也可以调用函数。调用函数时，它只需要一个字符串作为第一个参数：\n\
  \n```\n$returnVal = call_user_func(\"myFunction\");\n```\n\n调用方法时，它需要一个数组。数组的第一个元素应该是一个对象，第二个元素是要调用的方法名：\n\
  \n```\n$returnVal = call_user_func([$myObj, \"methodName\"]);\n```\n\n你可以将目标方法或函数所需的任何参数作为额外的参数传递给\
  \ `call_user_func()`，就像这样：\n\n```\n// listing 05.31\n$product = self::getBookProduct();\
  \ // 获取一个 BookProduct 对象\ncall_user_func([$product, 'setDiscount'], 20);\n```\n\n\
  当然，这种动态调用等同于下面这个写法：\n\n```\n$product->setDiscount(20);\n```\n\n`call_user_func()`\
  \ 方法并不会给你的编程生活带来翻天覆地的变化，因为你完全可以直接用一个字符串来代替方法名，就像这样：\n\n```\n$method = \"setDiscount\"\
  ;\n$product->$method(20);\n```\n\n不过，更令人印象深刻的是与之相关的 `call_user_func_array()` 函数。在选择目标方法或函数方面，它的工作方式与\
  \ `call_user_func()` 相同。但关键在于，它接受目标方法所需的任何参数，且这些参数以数组形式提供。\n\n注意\n\n注意——使用 `call_user_func()`\
  \ 传递给函数或方法的参数不是通过引用传递的。\n\n那么为什么这很有用呢？有时你会以数组形式获得参数。除非你事先知道要处理的参数数量，否则很难将它们传递出去。在第四章中，我介绍了可用于创建委托类的拦截器方法。下面是一个\
  \ `__call()` 方法的简单示例：\n\n```\n// listing 05.32\npublic function __call($method,\
  \ $args)\n{\nif (method_exists($this->thirdpartyShop, $method)) {\nreturn $this->thirdpartyShop->$method();\n\
  }\n}\n```\n\n如你所见，当客户端代码调用一个未定义的方法时，`__call()` 方法就会被调用。在这个例子中，我在一个名为 `$thirdpartyShop`\
  \ 的属性中维护了一个对象。如果我在存储的对象中找到了一个与 `$method` 参数匹配的方法，就调用它。我乐观地假设目标方法不需要任何参数，而这正是问题开始的地方。当我编写\
  \ `__call()` 方法时，我无法判断每次调用时 `$args` 数组的大小。如果我直接将 `$args` 传递给委托方法，我传递的将是一个单一的数组参数，而不是它可能期望的多个独立参数。`call_user_func_array()`\
  \ 完美地解决了这个问题：\n\n```\n// listing 05.33\npublic function __call($method, $args)\n\
  {\nif (method_exists($this->thirdpartyShop, $method)) {\nreturn call_user_func_array(\n\
  [\n$this->thirdpartyShop,\n$method\n],\n$args\n);\n}\n}\n```\n\n### 反射 API\n\nPHP\
  \ 的反射 API 之于 PHP，就如同 `java.lang.reflect` 包之于 Java。它由一系列用于分析属性、方法和类的内置类组成。它在某些方面与现有的对象函数（如\
  \ `get_class_vars()`）类似，但更灵活，并且能提供更详细的信息。它还被设计为能与 PHP 的面向对象特性（如访问控制、接口和抽象类）协同工作，而在这方面，较旧且功能更有限的类函数则无法做到。\n\
  \n### 入门指南\n\n反射 API 不仅可用于检查类。例如，`ReflectionFunction` 类提供有关给定函数的信息，`ReflectionExtension`\
  \ 则能揭示编译到语言中的扩展的相关信息。表 5-1 列出了该 API 中的一些类。\n\n表 5-1. 反射 API 中的部分类\n\n| 类 | 描述 |\n\
  | --- | --- |\n| `Reflection` | 提供一个用于汇总类信息的静态 `export()` 方法 |\n| `ReflectionClass`\
  \ | 类信息和工具 |\n| `ReflectionMethod` | 类方法信息和工具 |\n| `ReflectionParameter` | 方法参数信息\
  \ |\n| `ReflectionProperty` | 类属性信息 |\n| `ReflectionFunction` | 函数信息和工具 |\n| `ReflectionExtension`\
  \ | PHP 扩展信息 |\n| `ReflectionException` | 一个错误类 |\n| `ReflectionZendExtension` |\
  \ PHP Zend 扩展信息 |\n\n总的来说，反射 API 中的这些类提供了前所未有的运行时能力，让你能够访问脚本中对象、函数和扩展的相关信息。\n\n\
  反射 API 的强大功能和广泛范围意味着，你通常应该优先使用它，而不是那些类和对象函数。你很快就会发现自己少不了它，尤其是在测试类时。例如，你可能想生成类图或文档，或者你可能想将对象信息保存到数据库，检查对象的访问器（getter\
  \ 和 setter）方法以提取字段名。根据命名方案在模块类中调用方法，这也是反射的另一个用途。\n\n\n\n### 是时候撸起袖子大干一场了\n\n你已经见过一些用于检查类属性的函数。这些函数虽然有用，但往往功能有限。这里有一个能胜任这项工作的工具。`ReflectionClass`\
  \ 提供了多种方法，可以揭示指定类的几乎所有信息，无论是用户自定义类还是内部类。`ReflectionClass` 的构造函数接受一个类名、接口名（或对象实例）作为其唯一参数：\n\
  \n```\n// listing 05.34\n$prodclass = new \\ReflectionClass('popp\\\\ch04\\\\batch02\\\
  \\CdProduct');\n\\Reflection::export($prodclass);\n```\n\n一旦创建了 `ReflectionClass`\
  \ 对象，你就可以使用 `Reflection` 实用类来转储关于 `CdProduct` 的信息。`Reflection` 有一个静态方法 `export()`，它可以格式化并转储由\
  \ `Reflection` 对象（严格来说，是实现 `Reflector` 接口的类的任何实例）管理的数据。以下是对 `Reflection::export()`\
  \ 调用所生成输出的节选：\n\n```\nClass [  class popp\\ch04\\batch02\\CdProduct extends popp\\\
  ch04\\batch02\\ShopProduct ] {\n@@ /var/popp/src/ch04/batch02/CdProduct.php 6-37\n\
  - Constants [2] {\nConstant [ integer AVAILABLE ] { 0 }\nConstant [ integer OUT_OF_STOCK\
  \ ] { 1 }\n}\n- Static properties [0] {\n}\n- Static methods [1] {\nMethod [  static\
  \ public method getInstance ] {\n@@ /var/popp/src/ch04/batch02/ShopProduct.php 93\
  \ - 130\n- Parameters [2] {\nParameter #0 [  integer $id ]\nParameter #1 [  PDO\
  \ $pdo ]\n}\n- Return [ popp\\ch04\\batch02\\ShopProduct ]\n}\n}\n- Properties [3]\
  \ {\nProperty [  private $playLength ]\nProperty [  public $status ]\nProperty [\
  \  protected $price ]\n}\n- Methods [11] {\nMethod [  public method __construct\
  \ ] {\n@@ /var/popp/src/ch04/batch02/CdProduct.php 10 - 24\n- Parameters [5] {\n\
  Parameter #0 [  string $title ]\nParameter #1 [  string $firstName ]\nParameter\
  \ #2 [  string $mainName ]\nParameter #3 [  float $price ]\nParameter #4 [  integer\
  \ $playLength ]\n}\n}\n...\n}\n```\n\n正如你所见，`Reflection::export()` 提供了对类信息的非凡访问能力。`Reflection::export()`\
  \ 几乎汇总了 `CdProduct` 每个方面的信息，包括属性和方法的访问控制状态、每个方法所需的参数，以及每个方法在脚本文件中的位置。将其与更成熟的调试函数进行对比。`var_dump()`\
  \ 函数是一个通用的数据汇总工具。在提取摘要之前，你必须先实例化一个对象，即便如此，它提供的信息也远不及 `Reflection::export()` 的详细程度：\n\
  \n```\n// listing 05.35\n$cd = new CdProduct(\"cd1\", \"bob\", \"bobbleson\", 4,\
  \ 50);\nvar_dump($cd);\n```\n\n这是输出结果：\n\n```\nobject(popp\\ch04\\batch02\\CdProduct)#17\
  \ (8) {\n[\"playLength\":\"popp\\ch04\\batch02\\CdProduct\":private]=>\nint(50)\n\
  [\"status\"]=>\nNULL\n[\"title\":\"popp\\ch04\\batch02\\ShopProduct\":private]=>\n\
  string(3) \"cd1\"\n[\"producerMainName\":\"popp\\ch04\\batch02\\ShopProduct\":private]=>\n\
  string(9) \"bobbleson\"\n[\"producerFirstName\":\"popp\\ch04\\batch02\\ShopProduct\"\
  :private]=>\nstring(3) \"bob\"\n[\"price\":protected]=>\nfloat(4)\n[\"discount\"\
  :\"popp\\ch04\\batch02\\ShopProduct\":private]=>\nint(0)\n[\"id\":\"popp\\ch04\\\
  batch02\\ShopProduct\":private]=>\nint(0)\n}\n```\n\n`var_dump()` 及其近亲 `print_r()`\
  \ 是暴露脚本数据的极其便捷的工具。不过，对于类和函数，反射 API 将事情提升到了一个全新的水平。\n\n### 检查一个类\n\n`Reflection::export()`\
  \ 方法可以为调试提供大量有用的信息，但我们也可以以更专门化的方式来使用反射 API。让我们直接使用 `Reflection` 类。\n\n你已经看到了如何实例化一个\
  \ `ReflectionClass` 对象：\n\n```\n$prodclass = new \\ReflectionClass('popp\\\\ch04\\\
  \\batch02\\\\CdProduct');\n```\n\n接下来，我将在脚本中使用 `ReflectionClass` 对象来调查 `CdProduct`。它是什么类型的类？可以创建它的实例吗？以下是一个解答这些问题的函数：\n\
  \n```\n// listing 05.36\n// class ClassInfo\npublic static function getData(\\ReflectionClass\
  \ $class)\n{\n$details = \"\";\n$name = $class->getName();\nif ($class->isUserDefined())\
  \ {\n$details .= \"$name is user defined\\n\";\n}\nif ($class->isInternal()) {\n\
  $details .= \"$name is built-in\\n\";\n}\nif ($class->isInterface()) {\n$details\
  \ .= \"$name is interface\\n\";\n}\nif ($class->isAbstract()) {\n$details .= \"\
  $name is an abstract class\\n\";\n}\nif ($class->isFinal()) {\n$details .= \"$name\
  \ is a final class\\n\";\n}\nif ($class->isInstantiable()) {\n$details .= \"$name\
  \ can be instantiated\\n\";\n} else {\n$details .= \"$name can not be instantiated\\\
  n\";\n}\nif ($class->isCloneable()) {\n$details .= \"$name can be cloned\\n\";\n\
  } else {\n$details .= \"$name can not be cloned\\n\";\n}\nreturn $details;\n}\n\
  // listing 05.37\n$prodclass = new \\ReflectionClass('popp\\\\ch04\\\\batch02\\\\\
  CdProduct');\nprint ClassInfo::getData($prodclass);\n```\n\n我创建了一个 `ReflectionClass`\
  \ 对象，通过将 `CdProduct` 类名传递给 `ReflectionClass` 的构造函数，并将其赋值给变量 `$prodclass`。然后将 `$prodclass`\
  \ 传递给名为 `ClassInfo::classData()` 的方法，该方法演示了一些可用于查询类的方法。\n\n这些方法应该不言自明，但这里还是简要介绍一下其中的一些：\n\
  \n*   `ReflectionClass::getName()` 返回正在检查的类的名称。\n*   如果该类是在 PHP 代码中声明的，则 `ReflectionClass::isUserDefined()`\
  \ 方法返回 `true`；如果该类是内置的，则 `ReflectionClass::isInternal()` 返回 `true`。\n*   你可以使用 `ReflectionClass::isAbstract()`\
  \ 测试一个类是否是抽象的，以及使用 `ReflectionClass::isInterface()` 测试它是否是一个接口。\n*   如果你想获取该类的一个实例，可以使用\
  \ `ReflectionClass::isInstantiable()` 来测试其可行性。\n*   你可以使用 `ReflectionClass::isCloneable()`\
  \ 方法检查一个类是否可被克隆。\n*   你甚至可以检查用户自定义类的源代码。`ReflectionClass` 对象提供了对其类文件的文件名以及该类在文件中的起始行和结束行的访问。\n\
  \n以下是一个快速但简陋的方法，它使用 `ReflectionClass` 来访问一个类的源代码：\n\n```\n// listing 05.38\nclass\
  \ ReflectionUtil\n{\npublic static function getClassSource(\\ReflectionClass $class):\
  \ string\n{\n$path  = $class->getFileName();\n$lines = file($path);\n$from  = $class->getStartLine();\n\
  $to    = $class->getEndLine();\n$len   = $to - $from + 1;\nreturn implode(array_slice($lines,\
  \ $from - 1, $len));\n}\n}\n// listing 05.39\nprint ReflectionUtil::getClassSource(\n\
  new \\ReflectionClass('popp\\\\ch04\\\\batch02\\\\CdProduct')\n);\n```\n\n`ReflectionUtil`\
  \ 是一个简单的类，只有一个静态方法 `ReflectionUtil::getClassSource()`。该方法接受一个 `ReflectionClass`\
  \ 对象作为其唯一参数，并返回所引用类的源代码。`ReflectionClass::getFileName()` 以绝对路径的形式提供类文件的路径，因此代码应该能够直接打开它。`file()`\
  \ 获取文件中所有行的数组。`ReflectionClass::getStartLine()` 提供类的起始行；`ReflectionClass::getEndLine()`\
  \ 找到最后一行。接下来，只需使用 `array_slice()` 提取感兴趣的行即可。\n\n为简洁起见，此代码省略了错误处理。在实际应用中，你需要检查参数和返回码。\n\
  \n\n\n### 检查方法\n\n正如使用 `ReflectionClass` 检查类一样，`ReflectionMethod` 对象用于检查方法。\n\n\
  你可以通过两种方式获取 `ReflectionMethod`。首先，你可以从 `ReflectionClass::getMethods()` 获取一个 `ReflectionMethod`\
  \ 对象数组。其次，如果你需要处理特定方法，`ReflectionClass::getMethod()` 接受一个方法名称并返回相应的 `ReflectionMethod`\
  \ 对象。\n\n在此，我们使用 `ReflectionClass::getMethods()` 来全面演示 `ReflectionMethod` 类的功能：\n\
  \n```\n// listing 05.40\n$prodclass = new \\ReflectionClass('popp\\\\ch04\\\\batch02\\\
  \\CdProduct');\n$methods = $prodclass->getMethods();\nforeach ($methods as $method)\
  \ {\nprint ClassInfo::methodData($method);\nprint \"\\n----\\n\";\n}\n// listing\
  \ 05.41\n// class ClassInfo\npublic static function methodData(\\ReflectionMethod\
  \ $method)\n{\n$details = \"\";\n$name = $method->getName();\nif ($method->isUserDefined())\
  \ {\n$details .= \"$name is user defined\\n\";\n}\nif ($method->isInternal()) {\n\
  $details .= \"$name is built-in\\n\";\n}\nif ($method->isAbstract()) {\n$details\
  \ .= \"$name is abstract\\n\";\n}\nif ($method->isPublic()) {\n$details .= \"$name\
  \ is public\\n\";\n}\nif ($method->isProtected()) {\n$details .= \"$name is protected\\\
  n\";\n}\nif ($method->isPrivate()) {\n$details .= \"$name is private\\n\";\n}\n\
  if ($method->isStatic()) {\n$details .= \"$name is static\\n\";\n}\nif ($method->isFinal())\
  \ {\n$details .= \"$name is final\\n\";\n}\nif ($method->isConstructor()) {\n$details\
  \ .= \"$name is the constructor\\n\";\n}\nif ($method->returnsReference()) {\n$details\
  \ .= \"$name returns a reference (as opposed to a value)\\n\";\n}\nreturn $details;\n\
  }\n```\n\n这段代码使用 `ReflectionClass::getMethods()` 获取一个 `ReflectionMethod` 对象数组，然后遍历该数组，将每个对象传递给\
  \ `methodData()`。\n\n`methodData()` 中使用的方法名称反映了它们的意图：代码检查方法是否为用户定义、内置、抽象、公开、受保护、静态或\
  \ final。你还可以检查该方法是否是其类的构造函数，以及它是否返回引用。\n\n有一点需要注意：如果被测试的方法只是返回一个对象，`ReflectionMethod::returnsReference()`\
  \ 不会返回 `true`，即使在 PHP 5 中对象是通过引用传递和赋值的。相反，只有当被测试的方法被显式声明为返回引用时（通过在方法名称前放置一个 `&`\
  \ 符号），`ReflectionMethod::returnsReference()` 才会返回 `true`。\n\n如你所料，你可以使用与之前处理 `ReflectionClass`\
  \ 类似的技术来访问方法的源代码：\n\n```\n// listing 05.42\n// class ReflectionUtil\npublic static\
  \ function getMethodSource(\\ReflectionMethod $method): string\n{\n$path  = $method->getFileName();\n\
  $lines = @file($path);\n$from  = $method->getStartLine();\n$to    = $method->getEndLine();\n\
  $len   = $to - $from + 1;\nreturn implode(array_slice($lines, $from - 1, $len));\n\
  }\n// listing 05.43\n$class = new \\ReflectionClass('popp\\\\ch04\\\\batch02\\\\\
  CdProduct');\n$method = $class->getMethod('getSummaryLine');\nprint ReflectionUtil::getMethodSource($method);\n\
  ```\n\n因为 `ReflectionMethod` 为我们提供了 `getFileName()`、`getStartLine()` 和 `getEndLine()`\
  \ 方法，所以提取方法的源代码变得非常简单。\n\n### 检查方法参数\n\n现在方法签名可以约束对象参数的类型，因此检查方法签名中声明的参数的能力变得非常有用。Reflection\
  \ API 为此目的提供了 `ReflectionParameter` 类。要获取 `ReflectionParameter` 对象，你需要借助 `ReflectionMethod`\
  \ 对象。`ReflectionMethod::getParameters()` 方法返回一个 `ReflectionParameter` 对象数组。\n\n\
  `ReflectionParameter` 可以告诉你参数的名称，以及变量是否通过引用传递（即在方法声明中带有前置的 `&`）。它还可以告诉你通过参数类型提示所要求的类，以及该方法是否接受该参数的\
  \ `null` 值。\n\n以下是一些 `ReflectionParameter` 方法的使用示例：\n\n```\n// listing 05.44\n$class\
  \ = new \\ReflectionClass('popp\\\\ch04\\\\batch02\\\\CdProduct');\n$method = $class->getMethod(\"\
  __construct\");\n$params = $method->getParameters();\nforeach ($params as $param)\
  \ {\nprint ClassInfo::argData($param) . \"\\n\";\n}\n// listing 05.45\n// class\
  \ ClassInfo\npublic function argData(\\ReflectionParameter $arg)\n{\n$details =\
  \ \"\";\n$declaringclass = $arg->getDeclaringClass();\n$name  = $arg->getName();\n\
  $class = $arg->getClass();\n$position = $arg->getPosition();\n$details .= \"\\$$name\
  \ has position $position\\n\";\nif (! empty($class)) {\n$classname = $class->getName();\n\
  $details .= \"\\$$name must be a $classname object\\n\";\n}\nif ($arg->isPassedByReference())\
  \ {\n$details .= \"\\$$name is passed by reference\\n\";\n}\nif ($arg->isDefaultValueAvailable())\
  \ {\n$def = $arg->getDefaultValue();\n$details .= \"\\$$name has default: $def\\\
  n\";\n}\nif ($arg->allowsNull()) {\n$details .= \"\\$$name can be null\\n\";\n}\n\
  return $details;\n}\n```\n\n通过使用 `ReflectionClass::getMethod()` 方法，代码获取了一个 `ReflectionMethod`\
  \ 对象。然后它使用 `ReflectionMethod::getParameters()` 获取一个 `ReflectionParameter` 对象数组。`argData()`\
  \ 函数使用传入的 `ReflectionParameter` 对象来获取有关参数的信息。\n\n首先，它使用 `ReflectionParameter::getName()`\
  \ 获取参数的变量名。如果提供了类型提示，`ReflectionParameter::getClass()` 方法会返回一个 `ReflectionClass`\
  \ 对象。代码使用 `isPassedByReference()` 检查参数是否为引用；最后，它查找默认值的可用性，并将其添加到返回字符串中。\n\n\n\n\
  ### 使用反射 API\n\n掌握了反射 API 的基础知识后，你现在可以实际运用这个 API 了。\n\n设想你正在创建一个能够动态调用 `Module`\
  \ 对象的类。也就是说，它可以接受由第三方编写的插件，这些插件能够轻松集成到应用程序中，而无需任何硬编码。为了实现这一点，你可以在 `Module` 接口或抽象基类中定义一个\
  \ `execute()` 方法，强制所有子类实现该方法。你可以允许系统用户在一个外部 XML 配置文件中列出 `Module` 类。你的系统可以利用这些信息，在依次调用每个\
  \ `Module` 对象的 `execute()` 方法之前，先将它们聚合起来。\n\n然而，如果每个 `Module` 需要不同的信息来完成其工作，会发生什么呢？在这种情况下，XML\
  \ 文件可以为每个 `Module` 提供属性键和值，而每个 `Module` 的创建者可以为每个属性名提供相应的 setter 方法。基于这个前提，你的代码需要确保为正确的属性名调用正确的\
  \ setter 方法。\n\n以下是 `Module` 接口和几个实现类的基础代码：\n\n```\n// listing 05.46\nclass Person\n\
  {\npublic $name;\npublic function __construct(string $name)\n{\n$this->name = $name;\n\
  }\n}\n// listing 05.47\ninterface Module\n{\npublic function execute();\n}\n// listing\
  \ 05.48\nclass FtpModule implements Module\n{\npublic function setHost($host)\n\
  {\nprint \"FtpModule::setHost(): $host\\n\";\n}\npublic function setUser($user)\n\
  {\nprint \"FtpModule::setUser(): $user\\n\";\n}\npublic function execute()\n{\n\
  // do things\n}\n}\n// listing 05.49\nclass PersonModule implements Module\n{\n\
  public function setPerson(Person $person)\n{\nprint \"PersonModule::setPerson():\
  \ {$person->name}\\n\";\n}\npublic function execute()\n{\n// do things\n}\n}\n```\n\
  \n在这里，`PersonModule` 和 `FtpModule` 都提供了 `execute()` 方法的空实现。每个类也实现了 setter 方法，这些方法除了报告自己被调用外，不做任何事情。系统规定了所有\
  \ setter 方法必须期望一个单一参数：或者是一个字符串，或者是一个可以通过单个字符串参数实例化的对象。`PersonModule::setPerson()`\
  \ 方法需要一个 `Person` 对象，因此我在示例中包含了一个 `Person` 类。\n\n为了与 `PersonModule` 和 `FtpModule`\
  \ 配合工作，下一步是创建一个 `ModuleRunner` 类。它将使用一个以模块名索引的多维数组来表示 XML 文件中提供的配置信息。以下是相关代码：\n\n\
  ```\n// listing 05.50\nclass ModuleRunner\n{\nprivate $configData = [\n\"popp\\\\\
  ch05\\\\batch08\\\\PersonModule\" => ['person' => 'bob'],\n\"popp\\\\ch05\\\\batch08\\\
  \\FtpModule\"    => [\n'host' => 'example.com',\n'user' => 'anon'\n]\n];\nprivate\
  \ $modules = [];\n// ...\n}\n```\n\n`ModuleRunner::$configData` 属性包含了对两个 `Module`\
  \ 类的引用。对于每个模块元素，代码维护了一个包含一组属性的子数组。`ModuleRunner` 的 `init()` 方法负责创建正确的 `Module` 对象，如下所示：\n\
  \n```\n// listing 05.51\n// class ModuleRunner\npublic function init()\n{\n$interface\
  \ = new \\ReflectionClass('popp\\\\ch05\\\\batch08\\\\Module');\nforeach ($this->configData\
  \ as $modulename => $params) {\n$module_class = new \\ReflectionClass($modulename);\n\
  if (! $module_class->isSubclassOf($interface)) {\nthrow new Exception(\"unknown\
  \ module type: $modulename\");\n}\n$module = $module_class->newInstance();\nforeach\
  \ ($module_class->getMethods() as $method) {\n$this->handleMethod($module, $method,\
  \ $params);\n// 我们将在后续的代码清单中介绍 handleMethod()！\n}\narray_push($this->modules, $module);\n\
  }\n}\n// listing 05.52\n$test = new ModuleRunner();\n$test->init();\n```\n\n`init()`\
  \ 方法遍历 `ModuleRunner::$configData` 数组，对于每个模块元素，它尝试创建一个 `ReflectionClass` 对象。当以不存在的类名调用\
  \ `ReflectionClass` 的构造函数时，会生成一个异常，所以在实际场景中，这里应该包含更多的错误处理。我使用 `ReflectionClass::isSubclassOf()`\
  \ 方法来确保该模块类属于 `Module` 类型。\n\n在调用每个 `Module` 的 `execute()` 方法之前，必须先创建一个实例。这就是 `ReflectionClass::newInstance()`\
  \ 的用途。该方法接受任意数量的参数，并将其传递给相关类的构造函数。如果一切正常，它会返回该类的一个实例（对于生产代码，务必进行防御性编程：在创建实例之前，检查每个\
  \ `Module` 对象的构造函数是否需要参数）。\n\n`ReflectionClass::getMethods()` 返回该类所有可用的 `ReflectionMethod`\
  \ 对象数组。对于数组中的每个元素，代码调用 `ModuleRunner::handleMethod()` 方法。然后，它将一个 `Module` 实例、`ReflectionMethod`\
  \ 对象以及一个要关联到该 `Module` 的属性数组传递给它。`handleMethod()` 验证并调用 `Module` 对象的 setter 方法：\n\
  \n```\n// listing 05.53\n// class ModuleRunner\npublic function handleMethod(Module\
  \ $module, \\ReflectionMethod $method, $params)\n{\n$name = $method->getName();\n\
  $args = $method->getParameters();\nif (count($args) != 1 || substr($name, 0, 3)\
  \ != \"set\") {\nreturn false;\n}\n$property = strtolower(substr($name, 3));\nif\
  \ (! isset($params[$property])) {\nreturn false;\n}\n$arg_class = $args[0]->getClass();\n\
  if (empty($arg_class)) {\n$method->invoke($module, $params[$property]);\n} else\
  \ {\n$method->invoke(\n$module,\n$arg_class->newInstance($params[$property])\n);\n\
  }\n}\n```\n\n`handleMethod()` 首先检查该方法是否是有效的 setter。在代码中，一个有效的 setter 方法必须命名为 `setXXXX()`，并且必须声明一个且仅一个参数。\n\
  \n假设参数检查通过，代码接着从方法名中提取属性名：移除方法名开头的 `set`，并将得到的子串转换为小写字符。该字符串用于测试 `$params` 数组参数。这个数组包含了用户提供的、需要关联到该\
  \ `Module` 对象的属性。如果 `$params` 数组中不包含该属性，代码放弃并返回 `false`。\n\n如果从模块方法中提取的属性名与 `$params`\
  \ 数组中的某个元素匹配，就可以继续调用正确的 setter 方法。为此，代码必须检查 setter 方法的第一个（也是唯一一个）必需参数的类型。`ReflectionParameter::getClass()`\
  \ 方法提供了这个信息。如果该方法返回一个空值，则 setter 期望某种基本类型；否则，它期望一个对象。\n\n要调用这个 setter 方法，我需要一个新的反射\
  \ API 方法。`ReflectionMethod::invoke()` 需要一个对象（如果是静态方法则为 `null`）以及任意数量的方法参数，这些参数将传递给它所代表的方法。如果提供的对象与其方法不匹配，`ReflectionMethod::invoke()`\
  \ 会抛出一个异常。我通过两种方式之一调用这个方法。如果 setter 方法不要求对象参数，我就用用户提供的属性字符串调用 `ReflectionMethod::invoke()`。如果方法需要一个对象，我则使用属性字符串实例化一个正确类型的对象，然后将其传递给\
  \ setter。\n\n该示例假设所需的对象可以通过向其构造函数传递单个字符串参数来实例化。当然，最好在调用 `ReflectionClass::newInstance()`\
  \ 之前检查这一点。\n\n当 `ModuleRunner::init()` 方法执行完毕时，该对象拥有了一系列 `Module` 对象的存储，所有这些对象都已用数据初始化完毕。现在可以为该类添加一个方法，该方法遍历这些\
  \ `Module` 对象，并对每个对象调用 `execute()`。\n\n\n\n## 摘要\n\n本章介绍了可用于管理库和类的部分技术与工具。我探讨了 PHP\
  \ 的命名空间特性。你会发现，通过组合包含路径、命名空间、自动加载和文件系统，我们可以为类提供灵活的组织方式。\n\n我们还研究了 PHP 的对象和类函数，接着通过强大的反射\
  \ API 将内容提升到更高层次。最后，我们使用`Reflection`类构建了一个简单示例，用以说明反射功能的一种潜在用途。\n\n"
- "# 第 6 章 对象与设计\n\n现在我们已经详细了解了 PHP 对象支持的机制，接下来将暂离细节，思考如何最好地运用之前学到的工具。本章将介绍一些与对象和设计相关的问题，同时还会讨论\
  \ UML——一种用于描述面向对象系统的强大图形化语言。\n\n本章涵盖以下主题：\n\n- 设计基础：我所指的设计含义，以及面向对象设计与过程式代码的区别\n\
  - 类的作用域：如何决定类中应包含的内容\n- 封装：在类接口背后隐藏实现与数据\n- 多态：通过通用超类型实现运行时对专用子类型的透明替换\n- UML：使用图表描述面向对象架构\n\
  \n## 定义代码设计\n\n代码设计的一个含义涉及系统的定义：即确定系统的需求、范围与目标。系统需要做什么？为谁做？系统的输出是什么？是否满足既定需求？在更微观的层面上，设计可以理解为定义系统参与者并组织其关系的过程。本章关注的是第二层含义：类与对象的定义及配置。\n\
  \n那么什么是参与者？面向对象系统由类组成。确定这些参与者的性质至关重要。类由方法构成（部分情况下），因此在定义类时，必须决定哪些方法应归为一组。但正如你将看到的，类常常通过继承关系组合以符合通用接口。正是这些接口（即类型）应成为设计系统的首要切入点。\n\
  \n你还可以为类定义其他关系：创建由其他类型组成的类、或管理其他类型实例列表的类，以及设计单纯使用其他对象的类。这种组合或使用关系的潜力内置于类中（例如通过方法签名中的类型声明），但实际的对象关系在运行时建立，这能增强设计的灵活性。本章将展示如何对这些关系建模，并在全书后续内容中进一步探讨。\n\
  \n作为设计过程的一部分，你必须判断某个操作应属于当前类型，还是属于该类型使用的另一个类。处处都是选择，这些决定可能导向清晰优雅的设计，也可能让你陷入妥协的困境。\n\
  \n本章将探讨可能影响部分选择的一些问题。\n\n## 面向对象与过程式编程\n\n面向对象设计与传统过程式代码有何不同？人们容易认为主要区别在于面向对象代码包含对象。这种说法既不准确也无益处。在\
  \ PHP 中，你经常能发现过程式代码使用对象，也可能遇到包含大段过程式代码的类。类的存在并不能保证面向对象设计——即使在强制大多数操作在类内部完成的 Java\
  \ 语言中也是如此。\n\n面向对象与过程式代码的一个核心区别在于责任分配方式。过程式代码呈现为一系列顺序命令和方法调用，控制代码往往承担处理不同情况的责任。这种自上而下的控制可能导致项目中出现重复代码和依赖关系。面向对象代码则试图通过将任务处理责任从客户端代码转移到系统对象中，来最小化这些依赖。\n\
  \n本节将构建一个简单问题，分别用面向对象和过程式代码分析以说明这些要点。我的项目是快速构建一个读写配置文件的工具。为聚焦代码结构，示例中将省略实现细节。\n\n\
  我将从过程式方案入手。首先处理这种格式的文本：\n\n```\nkey:value\n```\n\n为此仅需两个函数：\n\n```php\n// listing\
  \ 06.01\nfunction readParams(string $source): array\n{\n    $params = [];\n    //\
  \ 从$source 读取文本参数\n    return $params;\n}\nfunction writeParams(array $params, string\
  \ $source)\n{\n    // 将文本参数写入$source\n}\n```\n\n`readParams`函数需要源文件名。它尝试打开文件并逐行读取，寻找键值对，同时构建关联数组，最终将数组返回控制代码。`writeParams`接受关联数组和源文件路径，遍历关联数组并将每个键值对写入文件。以下是使用这些函数的客户端代码：\n\
  \n```php\n// listing 06.02\n$file = __DIR__ . \"/params.txt\";\n$params = [\n  \
  \  \"key1\" => \"val1\",\n    \"key2\" => \"val2\",\n    \"key3\" => \"val3\",\n\
  ];\nwriteParams($params, $file);\n$output = readParams($file);\nprint_r($output);\n\
  ```\n\n这段代码相对简洁且易于维护。调用`writeParams()`创建`param.txt`并写入类似以下内容：\n\n```\nkey1:val1\n\
  key2:val2\nkey3:val3\n```\n\n`readParams()`函数解析相同格式。\n\n在实际项目中，需求范围常常会增长和演变。我们通过引入新需求来模拟这种变化：现在代码必须处理如下\
  \ XML 结构：\n\n```xml\n<params>\n    <param>\n        <key>my key</key>\n        <val>my\
  \ val</val>\n    </param>\n</params>\n```\n\n如果参数文件以`.xml`结尾，则应使用 XML 模式读取。虽然实现并不困难，但这将增加代码维护难度。现阶段我有两个选择：在控制代码中检查文件扩展名，或在读写函数内部进行判断。此处采用后者：\n\
  \n```php\n// listing 06.03\nfunction readParams(string $source): array\n{\n    $params\
  \ = [];\n    if (preg_match(\"/\\.xml$/i\", $source)) {\n        // 从$source 读取\
  \ XML 参数\n    } else {\n        // 从$source 读取文本参数\n    }\n    return $params;\n\
  }\nfunction writeParams(array $params, string $source)\n{\n    if (preg_match(\"\
  /\\.xml$/i\", $source)) {\n        // 将 XML 参数写入$source\n    } else {\n        //\
  \ 将文本参数写入$source\n    }\n}\n```\n\n> 注意\n\n\n\n示例代码总是需要在清晰表达意图与保持实用性之间艰难平衡。为了阐明核心观点，往往需要牺牲错误检查和实际适用性。换句话说，这里的示例旨在展示设计和重复性问题，而非演示解析和写入文件数据的最佳实践。因此，我会省略与当前问题无关的实现细节。\n\
  \n如你所见，每个函数中我都不得不对 XML 扩展名进行检测。正是这种重复性可能在未来引发问题。如果要求我增加另一种参数格式，我必须确保 `readParams()`\
  \ 和 `writeParams()` 这两个函数彼此保持一致。\n\n现在，我将通过一些简单的类来处理相同的问题。首先，我创建一个抽象基类来定义该类型的接口：\n\
  \n```\n// listing 06.04\nabstract class ParamHandler\n{\n    protected $source;\n\
  \    protected $params = [];\n    public function __construct(string $source)\n\
  \    {\n        $this->source = $source;\n    }\n    public function addParam(string\
  \ $key, string $val)\n    {\n        $this->params[$key] = $val;\n    }\n    public\
  \ function getAllParams(): array\n    {\n        return $this->params;\n    }\n\
  \    public static function getInstance(string $filename): ParamHandler\n    {\n\
  \        if (preg_match(\"/\\.xml$/i\", $filename)) {\n            return new XmlParamHandler($filename);\n\
  \        }\n        return new TextParamHandler($filename);\n    }\n    abstract\
  \ public function write(): bool;\n    abstract public function read(): bool;\n}\n\
  ```\n\n我定义了 `addParam()` 方法，允许用户向受保护的 `$params` 属性添加参数，并通过 `getAllParams()` 方法提供对该数组副本的访问。\n\
  \n我还创建了一个静态方法 `getInstance()`，用于检测文件扩展名，并根据结果返回特定的子类。关键在于，我定义了两个抽象方法 `read()` 和\
  \ `write()`，确保任何子类都会支持这个接口。\n\n> **注意**\n>\n> 在父类中放置用于生成子对象的静态方法确实很方便。然而，这种设计决策也有其后果。`ParamHandler`\
  \ 类型现在基本上被限制为只能与这个中心条件语句中的具体类协作。如果需要处理另一种格式该怎么办？当然，如果你是 `ParamHandler` 的维护者，你可以随时修改\
  \ `getInstance()` 方法。但如果你是一名客户端程序员，修改这个库类可能就没那么容易了（实际上修改并不难，问题在于每次重新安装包含该类的包时，你都必须重新应用你的补丁）。我将在第\
  \ 9 章讨论对象创建的相关问题。\n\n现在，我将定义子类，同样省略实现细节以保持示例简洁：\n\n```\n// listing 06.05\nclass\
  \ XmlParamHandler extends ParamHandler\n{\n    public function write(): bool\n \
  \   {\n        // 写入 XML\n        // 使用 $this->params\n    }\n    public function\
  \ read(): bool\n    {\n        // 读取 XML\n        // 并填充 $this->params\n    }\n\
  }\n// listing 06.06\nclass TextParamHandler extends ParamHandler\n{\n    public\
  \ function write(): bool\n    {\n        // 写入文本\n        // 使用 $this->params\n\
  \    }\n    public function read(): bool\n    {\n        // 读取文本\n        // 并填充\
  \ $this->params\n    }\n}\n```\n\n这些类仅提供了 `write()` 和 `read()` 方法的实现。每个类将根据对应的格式进行写入和读取操作。\n\
  \n客户端代码将根据文件扩展名完全透明地写入文本和 XML 两种格式：\n\n```\n// listing 06.07\n$test = ParamHandler::getInstance(__DIR__\
  \ . \"/params.xml\");\n$test->addParam(\"key1\", \"val1\");\n$test->addParam(\"\
  key2\", \"val2\");\n$test->addParam(\"key3\", \"val3\");\n$test->write(); // 以 XML\
  \ 格式写入\n```\n\n我们也可以从任一文件格式读取：\n\n```\n// listing 06.08\n$test = ParamHandler::getInstance(__DIR__\
  \ . \"/params.txt\");\n$test->read(); // 以文本格式读取\n$params = $test->getAllParams();\n\
  print_r($params);\n```\n\n那么，我们可以从这两种方法中学到什么？\n\n### 职责\n\n在过程式示例中，控制代码负责决定格式——而且不止一次，而是两次。条件代码确实被整理到函数中，但这只是掩盖了单一流程的事实，流程在运行过程中做出决策。对\
  \ `readParams()` 和 `writeParams()` 的调用发生在不同的上下文中，因此我们被迫在每个函数中重复文件扩展名检测（或对该检测进行变体处理）。\n\
  \n在面向对象的版本中，这种关于文件格式的选择是在静态方法 `getInstance()` 中做出的，它只检测一次文件扩展名，然后提供正确的子类。客户端代码不承担任何实现职责。它使用提供的对象，但不知道也不关心它属于哪个特定的子类。它只知道自己在操作一个\
  \ `ParamHandler` 对象，并且该对象会支持 `write()` 和 `read()` 方法。过程式代码忙于处理细节，而面向对象代码仅与接口协作，不关心实现细节。由于实现职责由对象而非客户端代码承担，因此可以轻松透明地切换对新格式的支持。\n\
  \n### 内聚性\n\n内聚性指的是相邻近的代码过程之间的关联程度。理想情况下，你应该创建共享清晰职责的组件。如果相关例程分散在代码各处，你会发现维护它们更加困难，因为你需要四处查找才能进行修改。\n\
  \n我们的 `ParamHandler` 类将相关过程收集到一个共同的上下文中。用于处理 XML 的方法共享一个上下文，它们可以在此共享数据，并且在必要时，一个方法的变更可以轻松地反映在另一个方法中（例如，如果你需要更改一个\
  \ XML 元素名称）。因此可以说 `ParamHandler` 类具有高内聚性。\n\n另一方面，过程式示例将相关过程分离。用于处理 XML 的代码分散在各个函数中。\n\
  \n### 耦合性\n\n当系统代码中离散的部分紧密地相互绑定，以至于一个部分的变更必然导致其他部分的变更时，就会发生紧耦合。紧耦合绝非过程式代码的专属问题，尽管这类代码的顺序性本质使其更容易出现此问题。\n\
  \n你可以在过程式示例中看到这种耦合。`writeParams()` 和 `readParams()` 函数对文件扩展名执行相同的检测，以决定它们应如何处理数据。你对其中一个函数所做的任何逻辑更改，都必须在另一个函数中实现。例如，如果你添加一种新格式，就必须使这两个函数保持一致，以便它们以相同的方式实现新的文件扩展名检测。随着你添加更多与参数相关的函数，这个问题只会变得更糟。\n\
  \n面向对象的示例将各个子类相互解耦，并将它们与客户端代码解耦。如果你需要添加一种新的参数格式，只需创建一个新的子类，并修改静态方法 `getInstance()`\
  \ 中的单一检测点即可。\n\n\n\n### 正交性\n\n将职责明确且独立于更大系统的组件进行巧妙组合，有时被称为正交性。Andrew Hunt 和 David\
  \ Thomas 在其著作《*程序员修炼之道：从小工到专家*》（Addison-Wesley Professional, 1999）中讨论了这一主题。\n\n\
  人们认为，正交性促进了复用，因为组件可以插入新系统而无需任何特殊配置。此类组件将具有清晰的输入和输出，独立于任何更大的上下文。正交代码使变更更容易，因为修改实现的影响将局限于正在更改的组件。最后，正交代码更安全。错误的影响应限制在有限范围内。高度相互依赖的代码中的错误很容易在更大的系统中引发连锁反应。\n\
  \n在类的上下文中，松耦合和高内聚并非自动实现。毕竟，我们完全可以将整个过程性示例嵌入一个错误设计的类中。那么，我们如何在代码中实现这种平衡呢？我通常从思考系统中应该存在哪些类开始。\n\
  \n### 选择你的类\n\n定义类的边界可能出乎意料地困难，尤其是当它们会随着你构建的任何系统而演化时。\n\n当你对现实世界进行建模时，这似乎很简单。面向对象系统通常包含真实事物的软件表示——`Person`、`Invoice`\
  \ 和 `Shop` 类比比皆是。这似乎表明，定义类就是找出系统中的事物，然后通过方法赋予它们行为能力。这不是一个糟糕的起点，但它确实有其风险。如果你将类视为一个名词，即一系列动词的主语，那么随着持续的开发和需求变化要求它做越来越多的事情，你可能会发现它变得臃肿不堪。\n\
  \n让我们考虑一下我们在第 3 章中创建的 `ShopProduct` 示例。我们的系统存在是为了向客户提供产品，因此定义 `ShopProduct` 类是一个显而易见的选择。但这是我们需要做的唯一决定吗？我们提供了诸如\
  \ `getTitle()` 和 `getPrice()` 这样的方法来访问产品数据。当要求我们提供一种机制来输出用于发票和送货单的摘要信息时，定义一个 `write()`\
  \ 方法似乎是合理的。当客户要求我们以不同格式提供产品摘要时，我们再次审视我们的类。我们因此在 `write()` 方法之外，又多创建了 `writeXML()`\
  \ 和 `writeHTML()` 方法。或者，我们向 `write()` 添加条件代码，以便根据选项标志输出不同格式。\n\n无论哪种方式，问题在于 `ShopProduct`\
  \ 类现在试图做太多事情。它正在努力管理显示策略以及管理产品数据。\n\n你应该如何考虑定义类？最好的方法是将类视为具有一个主要职责，并尽可能使该职责单一且专注。将这个职责用语言表述出来。有人说，你应该能够在\
  \ 25 个或更少的单词内描述一个类的职责，并且很少使用“和”或“或”这样的词。如果你的句子变得太长或陷入从句的泥潭，那么可能是时候考虑根据你描述的一些职责来定义新的类了。\n\
  \n因此，`ShopProduct` 类负责管理产品数据。如果我们添加用于写入不同格式的方法，我们就开始增加一个新的职责领域：产品显示。正如你在第 3 章中看到的，我们实际上根据这些不同的职责定义了两个类型。`ShopProduct`\
  \ 类型仍然负责产品数据，而 `ShopProductWriter` 类型则承担了显示产品信息的职责。各个子类细化了这些职责。\n\n> **注意：** 几乎没有完全死板的设计规则。例如，你有时会看到在原本不相关的类中编写保存对象数据的代码。尽管这似乎违反了类应具有单一职责的规则，但这可能是该功能最方便的位置，因为方法必须能够完全访问实例的字段。使用本地方法进行持久化还可以避免我们创建与可保存类平行的持久化类层次结构，从而引入不可避免的耦合。我们将在第\
  \ 12 章中讨论其他对象持久化策略。避免对设计规则的宗教式遵守；它们不能替代在解决问题之前进行分析。努力理解规则背后的逻辑，并优先考虑该逻辑，而不是规则本身。\n\
  \n### 多态性\n\n多态性，或称类切换，是面向对象系统的一个常见特性。你在本书中已经多次遇到它。\n\n多态性是在公共接口背后维护多个实现。这听起来很复杂，但实际上，你现在应该对此非常熟悉。对多态性的需求通常由代码中大量的条件语句所预示。\n\
  \n当我第一次在第 3 章中创建 `ShopProduct` 类时，我尝试使用一个单一的类来管理书籍和 CD 的功能，此外还有通用产品。为了提供摘要信息，我依赖一个条件语句：\n\
  \n```\n// listing 03.31\npublic function getSummaryLine()\n{\n$base  = \"{$this->title}\
  \ ( {$this->producerMainName}, \";\n$base .= \"{$this->producerFirstName} )\";\n\
  if ($this->type == 'book') {\n$base .= \": page count - {$this->numPages}\";\n}\
  \ elseif ($this->type == 'cd') {\n$base .= \": playing time - {$this->playLength}\"\
  ;\n}\nreturn $base;\n}\n```\n\n这些语句暗示了两个子类的形状：`CdProduct` 和 `BookProduct`。\n\n同理，我过程式参数示例中的条件语句包含了我最终实现的面向对象结构的种子。我在脚本的两个部分重复了相同的条件：\n\
  \n```\n// listing 06.03\nfunction readParams(string $source): array\n{\n$params\
  \ = [];\nif (preg_match(\"/\\.xml$/i\", $source)) {\n// read XML parameters from\
  \ $source\n} else {\n// read text parameters from $source\n}\nreturn $params;\n\
  }\nfunction writeParams(array $params, string $source)\n{\nif (preg_match(\"/\\\
  .xml$/i\", $source)) {\n// write XML parameters to $source\n} else {\n// write text\
  \ parameters to $source\n}\n}\n```\n\n每个子句都暗示了我最终产生的其中一个子类：`XmlParamHandler` 和 `TextParamHandler`。这些子类扩展了抽象基类\
  \ `ParamHandler` 的 `write()` 和 `read()` 方法：\n\n```\n// listing 06.09\n// could return\
  \ XmlParamHandler or TextParamHandler\n$test = ParamHandler::getInstance($file);\n\
  $test->read();  // could be XmlParamHandler::read() or TextParamHandler::read()\n\
  $test->addParam(\"newkey1\", \"newval1\");\n$test->write(); // could be XmlParamHandler::write()\
  \ or TextParamHandler::write()\n```\n\n值得注意的是，多态性并没有消除条件语句。像 `ParamHandler::getInstance()`\
  \ 这样的方法通常会根据 `switch` 或 `if` 语句来决定返回哪些对象。不过，这些方法倾向于将条件代码集中到一处。\n\n正如你所看到的，PHP 强制执行由抽象类定义的接口。这很有用，因为我们可以确保一个具体的子类将支持与抽象父类定义的完全相同的方法签名。这包括类型声明和访问控制。因此，客户端代码可以互换地处理公共超类的所有子类（只要它仅依赖于父类中定义的功能）。\n\
  \n\n\n### 封装\n\n封装简单来说就是向客户端隐藏数据和功能。同样，这也是一个关键的面向对象概念。\n\n在最简单的层面上，通过将属性声明为 `private`\
  \ 或 `protected`，你就实现了数据的封装。通过向客户端代码隐藏属性，你强制定义了一个接口，并防止对象数据被意外破坏。\n\n多态性则体现了另一种封装。通过将不同的实现置于一个公共接口之后，你向客户端隐藏了这些底层策略。这意味着，在此接口背后所做的任何更改，对整个系统来说都是透明的。你可以添加新类或修改类中的代码而不会引发错误。重要的是接口，而不是其底层的运行机制。这些机制保持得越独立，修改或修复在项目中产生连锁反应的几率就越小。\n\
  \n从某种意义上说，封装是面向对象编程的关键。你的目标应该是让每个部分都尽可能独立于同级部分。类和方法应接收执行其指定任务所必需的信息量，这些任务的范围应有限且清晰界定。\n\
  \n`private`、`protected` 和 `public` 关键字的使用简化了封装。不过，封装也是一种思维状态。PHP 4 并未提供对隐藏数据的正式支持。私有性必须通过文档和命名约定来表明。例如，下划线是标识私有属性的一种常见方式：\n\
  \n```\nvar $_touchezpas;\n```\n\n当然，代码必须被仔细检查，因为私有性并未被严格执行。但有趣的是，错误却很少发生，因为代码的结构和风格已经清楚地表明了哪些属性希望被“单独留下”。\n\
  \n同理，即使在 PHP 5 问世之后，我们也可以打破规则，通过使用 `instanceof` 运算符来发现我们在类切换上下文中使用的对象的确切子类型：\n\n\
  ```\nfunction workWithProducts(ShopProduct $prod)\n{\nif ($prod instanceof CdProduct)\
  \ {\n// 执行 CD 相关操作\n} else if ($prod instanceof BookProduct) {\n// 执行图书相关操作\n}\n\
  }\n```\n\n你可能有充分的理由这样做，但总体来说，这带有一种略显不确定的味道。通过查询示例中的特定子类型，我正在建立一个依赖关系。尽管子类型的细节被多态性所隐藏，但本来完全有可能改变\
  \ `ShopProduct` 的继承层次结构而不会产生不良影响。然而这段代码终结了这种可能性。现在，如果我需要合理化 `CdProduct` 和 `BookProduct`\
  \ 类，我可能会在 `workWithProducts()` 方法中产生意想不到的副作用。\n\n从这个例子中可以得出两个教训。首先，封装有助于你创建正交的代码。其次，封装的可执行程度并非关键。封装是一种类及其客户端都应遵守的技术。\n\
  \n## 忘记如何实现\n\n如果你和我一样，一提到问题就会让思维飞速运转，寻找可能提供解决方案的机制。你可能会挑选能解决问题的函数，重新审视巧妙的**正则表达式**，追踪\
  \ Composer 包。你可能在某个旧项目中有一段可复用的代码，做了些类似的事情。在设计阶段，暂时将所有这些抛诸脑后，你将会受益匪浅。清空你的头脑，不要去想过程和机制。\n\
  \n只思考你系统中的关键参与者：它所需要的**类型**以及它们的**接口**。当然，你对过程的了解会为你的思考提供信息。一个打开文件的类需要一个路径，数据库代码需要管理表名和密码，等等。但请让你的代码中的结构和关系来引导你。你会发现，实现会很容易地落在一个定义良好的接口之后。这样，你就拥有了灵活性，可以在需要时切换、改进或扩展一个实现，而不会影响整个系统。\n\
  \n为了强调接口，要**从抽象基类**而非具体子类的角度思考。例如，在我的参数获取代码中，接口是设计中最重要的方面。我需要一个能读写**名称/值对**的类型。这个类型的核心在于它的职责，而不是实际的持久化介质或存储和检索数据的方式。我围绕抽象的\
  \ `ParamHandler` 类来设计系统，只在后期才添加用于实际读写参数的具体策略。通过这种方式，我从一开始就在我的系统中构建了多态性和封装性。这种结构天生适合类切换。\n\
  \n话虽如此，我当然从一开始就知道会有 `ParamHandler` 的文本和 XML 实现，这无疑影响了我的接口。在设计接口时，总是需要进行一定量的脑力权衡。\n\
  \n在 **《设计模式：可复用面向对象软件的基础》** (Addison-Wesley Professional, 1995) 中，四人组用一句话总结了这个原则：“针对接口编程，而非针对实现编程。”\
  \ 这是一条值得加入你程序员手册的好原则。\n\n## 四个路标\n\n很少有人能在设计阶段就做到绝对正确。我们大多数人都会随着需求的变化或对问题本质理解的加深而修改代码。\n\
  \n在修改代码时，它很容易失控。这里添加一个方法，那里添加一个新类，你的系统会逐渐开始退化。你已经看到，你的代码可以指明自我改进的方向。代码中的这些指向性特征有时被称为**代码坏味**——即代码中的一些特征，它们可能暗示特定的修复方法，或者至少提醒你重新审视你的设计。在本节中，我将把已经提出的一些观点提炼为你在编码时应留意的四个信号。\n\
  \n### 代码重复\n\n重复是代码中的大敌之一。如果你在写一个例程时有一种奇怪的似曾相识感，那么很可能你遇到了问题。\n\n检查一下你系统中重复的实例。也许它们本应归在一起。重复通常意味着紧耦合。如果你更改了一个例程中某些基础性的东西，那么类似的例程是否需要修改？如果是这样，它们很可能属于同一个类。\n\
  \n### 知道太多的类\n\n在方法之间传递参数可能会很麻烦。为什么不直接用全局变量来减轻这种痛苦呢？使用全局变量，每个人都能访问数据。\n\n全局变量有它们的位置，但确实需要对其保持一定的怀疑态度。顺便说一句，这种怀疑程度是相当高的。通过使用全局变量，或者让一个类对其更广泛的领域拥有任何了解，你就把它锚定在了其上下文中，从而降低了它的可复用性，并使其依赖于自身无法控制的代码。请记住，你希望解耦你的类和例程，而不是创建相互依赖。尽量限制一个类对其上下文的了解。我将在本书后面探讨一些实现此目的的策略。\n\
  \n### 万事通\n\n你的类是否试图同时做太多事情？如果是这样，看看你是否能列出这个类的职责。你可能会发现其中一项职责本身就可以构成一个好类的基础。\n\n\
  如果你创建子类，不改变一个过度热心的类可能会导致特定的问题。你通过子类扩展的是哪个职责？如果你需要为一个以上的职责创建子类，你会怎么做？你很可能会最终得到太多的子类，或者过度依赖条件代码。\n\
  \n\n\n### 条件语句\n\n在项目中，你完全有理由使用 `if` 和 `switch` 语句。不过，有时候这类结构也可能是在呼唤多态性。\n\n如果你发现自己在类中频繁测试某些条件，尤其是当这些测试在多个方法中都出现时，这可能是你的一个类应该拆分成两个或更多类的信号。要看看条件代码的结构是否暗示了那些可以表达为类的职责。这些新类应当实现一个共享的抽象基类。这样一来，你很可能还需要解决如何将正确的类传递给客户端代码的问题。我将在第\
  \ 9 章中介绍一些用于创建对象的模式。\n\n### UML\n\n在本书中，到目前为止，我一直让代码自己说话，并使用简短的示例来说明继承和多态等概念。\n\n\
  这样做很有用，因为 PHP 是我们共同的语言：如果你读到这里，说明这门语言是我们共通的。然而，随着我们的示例在规模和复杂性上不断增长，仅用代码来阐述设计的宏观视野就变得有些荒谬了。仅凭几行代码很难看清全貌。\n\
  \nUML 代表统一建模语言（Unified Modeling Language）。通常，在使用这些首字母缩写时，会与定冠词“the”连用。它不仅仅是一种统一的建模语言，它就是统一建模语言。\n\
  \n也许这种权威性的口吻源于这门语言形成的过程。根据 Martin Fowler（《UML Distilled》，Addison-Wesley Professional，1999）的说法，UML\
  \ 是在面向对象设计社区的权威和精英们经历了多年智力与官僚层面的争论之后，才最终成为标准的。\n\n这场争论的成果是一种用于描述面向对象系统的强大图形语法。在本节中，我们只会触及皮毛，但你会很快发现，一点点\
  \ UML（抱歉，是一点点 the UML）就能发挥巨大作用。\n\n尤其是类图，它能够描述结构和模式，使得它们的含义一目了然。这种清晰的呈现方式在代码片段和要点列表中通常很难找到。\n\
  \n### 类图\n\n虽然类图只是 UML 的一个方面，但它们或许是最普遍使用的。由于它们在描述面向对象关系方面特别有用，我将在本书中主要使用它们。\n\n\
  #### 表示类\n\n正如你所料，类是类图的主要组成部分。一个类由一个带有名称的方框表示（见图 6-1）。\n\n![A314621_5_En_6_Fig1_HTML.gif](img/A314621_5_En_6_Fig1_HTML.gif)\n\
  \n图 6-1. 一个类\n\n该类被分为三个部分，名称显示在第一部分。当我们只提供类名而不提供更多信息时，这些分割线是可选的。在设计类图时，我们可能会发现图\
  \ 6-1 中的详细程度对于某些类来说已经足够。我们没有义务去表示每一个字段和方法，甚至也不需要在类图中画出每一个类。\n\n抽象类通过将类名设为斜体（见图 6-2）或在类名后添加\
  \ `{abstract}`（见图 6-3）来表示。第一种方法在两者中更为常见，但第二种方法在做笔记时更有用。\n\n![A314621_5_En_6_Fig3_HTML.gif](img/A314621_5_En_6_Fig3_HTML.gif)\n\
  \n图 6-3. 使用约束定义的抽象类\n\n![A314621_5_En_6_Fig2_HTML.gif](img/A314621_5_En_6_Fig2_HTML.gif)\n\
  \n图 6-2. 一个抽象类\n\n注意：`{abstract}` 这种语法是约束的一个例子。约束在类图中用于描述特定元素应如何使用。大括号内的文本没有特殊结构；它只是简要说明可能适用于该元素的任何条件。\n\
  \n接口的定义方式与类相同，但接口必须包含一个构造型（即 UML 的一种扩展），如图 6-4 所示。\n\n![A314621_5_En_6_Fig4_HTML.gif](img/A314621_5_En_6_Fig4_HTML.gif)\n\
  \n图 6-4. 一个接口\n\n### 属性\n\n广义上讲，属性描述了一个类的特性。属性列在类名正下方的部分中（见图 6-5）。\n\n![A314621_5_En_6_Fig5_HTML.gif](img/A314621_5_En_6_Fig5_HTML.gif)\n\
  \n图 6-5. 一个属性\n\n让我们仔细看看示例中的这个属性。开头的符号代表该属性的可见性级别，或称访问控制。表 6-1 显示了可用的三种符号。\n\n表\
  \ 6-1. 可见性符号\n\n| 符号 | 可见性 | 说明 |\n| --- | --- | --- |\n| + | 公共（Public） | 对所有代码可用\
  \ |\n| - | 私有（Private） | 仅对当前类可用 |\n| # | 受保护（Protected） | 仅对当前类及其子类可用 |\n\n可见性符号后面跟着属性的名称。在这个例子中，我描述的是\
  \ `ShopProduct::$price` 属性。冒号用于分隔属性名称与其类型（以及可选的默认值）。\n\n再次提醒，你只需要包含为了清晰起见所必需的详细信息。\n\
  \n#### 操作\n\n操作描述方法；或者更准确地说，它们描述可以在类的实例上调用的方法。图 6-6 显示了 `ShopProduct` 类中的两个操作。\n\
  \n![A314621_5_En_6_Fig6_HTML.gif](img/A314621_5_En_6_Fig6_HTML.gif)\n\n图 6-6. 操作\n\
  \n正如你所见，操作使用的语法与属性类似。可见性符号位于方法名之前。参数列表括在圆括号中。如果有返回类型，则用冒号分隔。参数之间用逗号分隔，并遵循属性语法，即参数名称与其类型之间用冒号分隔。\n\
  \n不出所料，这种语法相对灵活。你可以省略可见性标志和返回类型。参数通常仅由其类型表示，因为参数名称通常并不重要。\n\n#### 描述继承与实现\n\nUML\
  \ 将继承关系描述为泛化（generalization）。这种关系由一条从子类指向其父类的线表示。这条线末端带有一个空心闭合箭头。\n\n图 6-7 显示了 `ShopProduct`\
  \ 类与其子类之间的关系。\n\n![A314621_5_En_6_Fig7_HTML.gif](img/A314621_5_En_6_Fig7_HTML.gif)\n\
  \n图 6-7. 描述继承\n\nUML 将接口与实现它的类之间的关系描述为实现（realization）。因此，如果 `ShopProduct` 类实现了 `Chargeable`\
  \ 接口，我们可以将其添加到我们的类图中，如图 6-8 所示。\n\n![A314621_5_En_6_Fig8_HTML.gif](img/A314621_5_En_6_Fig8_HTML.gif)\n\
  \n图 6-8. 描述接口实现\n\n\n\n##### 关联\n\n继承只是面向对象系统中众多关系中的一种。当一个类属性被声明用于持有另一个类实例（或多个实例）的引用时，就产生了关联。\n\
  \n在图 6-9 中，我们建模了两个类，并在它们之间创建了一个关联。\n\n![A314621_5_En_6_Fig9_HTML.gif](img/A314621_5_En_6_Fig9_HTML.gif)\n\
  \n图 6-9. 类关联\n\n在此阶段，我们对于这种关系的本质还比较模糊。我们只指定了一个`Teacher`对象将持有一个或多个`Pupil`对象的引用，反之亦然。这种关系可能是双向的，也可能不是。\n\
  \n你可以使用箭头来描述关联的方向。如果`Teacher`类拥有一个`Pupil`类的实例，而反过来不成立，那么你应该将关联设为从`Teacher`类指向`Pupil`类的箭头。这种称为单向关联的关系，如图\
  \ 6-10 所示。\n\n![A314621_5_En_6_Fig10_HTML.gif](img/A314621_5_En_6_Fig10_HTML.gif)\n\
  \n图 6-10. 单向关联\n\n如果每个类都持有对方的引用，你可以使用双箭头来描述双向关系，如图 6-11 所示。\n\n![A314621_5_En_6_Fig11_HTML.gif](img/A314621_5_En_6_Fig11_HTML.gif)\n\
  \n图 6-11. 双向关联\n\n你还可以在关联中指定一个类所引用的另一个类的实例数量。做法是在每个类旁边放置一个数字或范围。你也可以使用星号（`*`）来表示任意数量。在图\
  \ 6-12 中，可以有一个`Teacher`对象和零个或多个`Pupil`对象。\n\n![A314621_5_En_6_Fig12_HTML.gif](img/A314621_5_En_6_Fig12_HTML.gif)\n\
  \n图 6-12. 定义关联的多重性\n\n在图 6-13 中，关联中可以有一个`Teacher`对象和五到十个`Pupil`对象。\n\n![A314621_5_En_6_Fig13_HTML.gif](img/A314621_5_En_6_Fig13_HTML.gif)\n\
  \n图 6-13. 定义关联的多重性\n\n##### 聚合与组合\n\n聚合和组合与关联类似。它们都描述了一种情况，即一个类持有一个或多个其他类实例的永久引用。不过，在聚合和组合中，被引用的实例构成了引用对象的内在组成部分。\n\
  \n就聚合而言，被包含的对象是容器对象的核心部分，但它们同时也可以被其他对象所包含。聚合关系用一条以空心菱形开头的线来表示。\n\n在图 6-14 中，我定义了两个类：`SchoolClass`和`Pupil`。`SchoolClass`类聚合了`Pupil`。\n\
  \n![A314621_5_En_6_Fig14_HTML.gif](img/A314621_5_En_6_Fig14_HTML.gif)\n\n图 6-14.\
  \ 聚合\n\n学生组成了一个班级，但同一个`Pupil`对象可以同时被不同的`SchoolClass`实例引用。如果我解散了一个班级，我不一定会删除该学生，因为他可能还参加了其他班级。\n\
  \n组合则代表了一种比这更强的关系。在组合中，被包含的对象只能被其容器引用。当容器被删除时，它也应该被删除。组合关系的表示方式与聚合关系相同，只是菱形应该是实心的（见图\
  \ 6-15）。\n\n![A314621_5_En_6_Fig15_HTML.gif](img/A314621_5_En_6_Fig15_HTML.gif)\n\
  \n图 6-15. 组合\n\n一个`Person`类持有一个`SocialSecurityData`对象的引用。被包含的实例只能属于包含它的`Person`对象。\n\
  \n##### 描述使用关系\n\n使用关系在 UML 中被描述为依赖关系。它是本节讨论的关系中最短暂的一种，因为它并不描述类之间的永久性链接。\n\n被使用的类可以作为参数传递，或者作为方法调用的结果而被获取。\n\
  \n图 6-16 中的`Report`类使用了一个`ShopProductWriter`对象。使用关系由连接两者的虚线和开口箭头表示。然而，它并不像`ShopProductWriter`对象维护一个`ShopProduct`对象数组那样，将这个引用作为属性来维持。\n\
  \n![A314621_5_En_6_Fig16_HTML.gif](img/A314621_5_En_6_Fig16_HTML.gif)\n\n图 6-16.\
  \ 依赖关系\n\n##### 使用注释\n\n类图可以捕捉系统的结构，但它们无法提供过程感。图 6-16 告诉了我们系统中的类。从图 6-16 中，你知道了`Report`对象使用了一个`ShopProductWriter`，但你不知道其具体机制。在图\
  \ 6-17 中，我使用注释来稍微澄清一下情况。\n\n![A314621_5_En_6_Fig17_HTML.gif](img/A314621_5_En_6_Fig17_HTML.gif)\n\
  \n图 6-17. 使用注释澄清依赖关系\n\n如你所见，注释由一个带有折角的方框组成。里面通常会包含一些伪代码片段。\n\n这澄清了图 6-16；现在你可以看到`Report`对象使用`ShopProductWriter`来输出产品数据。这算不上什么惊人的发现，但使用关系并非总是如此显而易见。在某些情况下，即便是注释也可能无法提供足够的信息。幸运的是，你可以对系统中对象的交互以及类的结构进行建模。\n\
  \n\n\n### 顺序图\n\n顺序图基于对象而非类，用于逐步模拟系统中的某个过程。\n\n我们来构建一个简单的图表，模拟 `Report` 对象写入产品数据的方式。顺序图从左到右展示系统的参与者（见图\
  \ 6-18）。\n\n![A314621_5_En_6_Fig18_HTML.gif](img/A314621_5_En_6_Fig18_HTML.gif)\n\
  \n图 6-18. 顺序图中的对象\n\n我仅用类名来标注对象。如果图中同一类有多个独立工作的实例，我会使用 `label:class` 格式（例如 `product1:ShopProduct`）来包含对象名称。\n\
  \n如图 6-19 所示，你所建模过程的生存期从上到下展示。\n\n![A314621_5_En_6_Fig19_HTML.gif](img/A314621_5_En_6_Fig19_HTML.gif)\n\
  \n图 6-19. 顺序图中的对象生命线\n\n垂直虚线代表系统中对象的生存期。紧随生命线的较大方框表示过程的焦点。如果从上到下阅读图 6-19，可以看到过程如何在系统对象间流转。若不显示对象间传递的消息，则难以理解。我在图\
  \ 6-20 中添加了这些消息。\n\n![A314621_5_En_6_Fig20_HTML.gif](img/A314621_5_En_6_Fig20_HTML.gif)\n\
  \n图 6-20. 完整的顺序图\n\n箭头表示从一个对象发送到另一对象的消息。返回值通常隐含不表（尽管可以通过虚线表示，从被调用对象指向消息发起者）。每条消息使用相关的方法调用进行标注。标注方式相当灵活，但有一些语法规则。方括号表示条件：\n\
  \n```\n[okToPrint]\nwrite()\n```\n\n这段代码片段意味着只有在满足正确条件时，才应执行 `write()` 调用。星号用于表示重复；可选地，可在方括号内进一步说明：\n\
  \n```\n*[for each ShopProduct]\nwrite()\n```\n\n你可以从上到下解读图 6-20。首先，`Report` 对象从\
  \ `ProductStore` 对象获取 `ShopProduct` 对象列表。然后将这些对象传递给 `ShopProductWriter` 对象，该对象存储对它们的引用（不过我们只能从图中推断出这一点）。`ShopProductWriter`\
  \ 对象为其引用的每个 `ShopProduct` 对象调用 `ShopProduct::getSummaryLine()`，并将结果添加到输出中。\n\n如你所见，顺序图可以建模过程，冻结动态交互的片段，并以惊人的清晰度呈现它们。\n\
  \n> **注意：**  \n> 观察图 6-16 和 6-20。注意类图如何展示多态性，显示从 `ShopProductWriter` 和 `ShopProduct`\
  \ 派生的类。现在注意，当我们对对象间的通信进行建模时，这些细节变得透明。只要可能，我们希望对象与最通用的类型协作，从而隐藏实现细节。\n\n## 总结\n\n\
  本章中，我超越了面向对象编程的具体细节，探讨了一些关键设计问题。我研究了封装、松散耦合和内聚等特性，这些是灵活可复用面向对象系统的基本要素。接着我讲解了 UML，为本书后续使用设计模式奠定了基础。\n\
  \n"
- '# 第二部分：设计模式


  '
- "# 7. 什么是设计模式？为何使用它们？\n\n我们作为程序员遇到的大多数问题，社区中的其他人已经处理过无数次。设计模式可以为我们提供挖掘这些智慧的手段。一旦模式成为通用术语，它就能丰富我们的语言，使分享设计思想及其后果变得容易。设计模式就是提炼常见问题、定义经过验证的解决方案并描述可能的结果。许多书籍和文章专注于计算机语言的细节（如可用函数、类和方法等）。而模式目录则侧重于如何从这些基础知识（“是什么”）出发，进而理解项目中的问题与潜在解决方案（“为什么”和“如何做”）。\n\
  \n在本章中，我将向您介绍设计模式，并探讨它们广受欢迎的一些原因。\n\n本章将涵盖以下内容：\n\n*   模式基础：什么是设计模式？\n*   模式结构：设计模式的关键要素是什么？\n\
  *   模式优势：为什么模式值得你花时间学习？\n\n\n\n## 什么是设计模式？\n\n> 在软件世界中，模式是组织集体记忆的具体体现。—— Grady Booch，《Core\
  \ J2EE Patterns》  \n> [模式是] 在特定背景下对问题的解决方案。——“四人帮”，《设计模式：可复用面向对象软件的基础》\n\n正如这些引文所暗示的，设计模式是一种经过分析的问题，并附有其经过良好实践的解决方案。\n\
  \n问题往往会重复出现，作为 Web 程序员，我们必须一次又一次地解决它们。我们该如何处理传入的请求？如何将这些数据转换为系统的指令？我们应该如何获取数据？呈现结果？随着时间的推移，我们会以不同程度的优雅来回答这些问题，并逐渐形成一套非正式的技术体系，并在项目中反复使用。这些技术就是设计模式。\n\
  \n设计模式记录并形式化了这些问题和解决方案，使来之不易的经验能够为更广泛的编程社区所用。模式本质上是（或者说应该是）自下而上的，而非自上而下的。它们根植于实践，而非理论。这并不意味着设计模式缺乏强大的理论元素（我们将在下一章中看到），但模式是基于真实程序员所使用的真实世界技术的。著名的模式孵化者马丁·福勒曾说，他是发现模式，而非发明模式。因此，许多模式会让你产生似曾相识的感觉，因为你认出了自己曾使用过的技巧。\n\
  \n模式目录并非菜谱。菜谱可以照本宣科；代码可以被复制并稍作修改后插入项目中。你甚至不必完全理解菜谱中使用的所有代码。设计模式记录的是解决特定问题的方法。实现细节可能因更广泛的背景而千差万别，这些背景可能包括你使用的编程语言、应用程序的性质、项目的规模以及问题的具体细节。\n\
  \n举例来说，假设你的项目需要一个模板系统。给定一个模板文件的名字，你必须解析它，并构建一个对象树来表示你遇到的标签。\n\n你从一个默认解析器开始，它扫描文本中的触发标记。当找到匹配项时，它会将搜索任务移交给另一个解析器对象，这个解析器专门用于读取标签的内部结构。这个过程会继续检查模板数据，直到失败、完成或找到另一个触发器。如果找到触发器，它也必须将任务移交给一个专门的对象——也许是一个参数解析器。所有这些组件共同构成了所谓的递归下降解析器。\n\
  \n那么，你的参与者包括：一个 `MainParser`、一个 `TagParser` 和一个 `ArgumentParser`。你创建一个 `ParserFactory`\
  \ 类来创建并返回这些对象。\n\n当然，事情没那么简单。项目后期，你被告知必须支持模板中的多种语法。现在，你需要根据语法创建一组并行的解析器：一个 `OtherTagParser`、一个\
  \ `OtherArgumentParser` 等等。\n\n这就是你的问题：你需要根据情况生成一组不同的对象，并且你希望系统其他组件对此基本上是透明的。恰好，“四人帮”在其书中的“抽象工厂”模式总结页中定义了以下问题：“提供一个创建一系列相关或相互依赖对象的接口，而无需指定它们具体的类。”\n\
  \n这非常契合。正是我们问题的性质决定并塑造了我们对这个模式的使用。解决方案也绝非简单的复制粘贴，正如你将在第 9 章（我将在其中介绍抽象工厂）中看到的那样。\n\
  \n为模式命名这一行为本身就很有价值；它有助于形成一种通用词汇表，这种词汇表在更古老的手艺和职业中早已自然而然地产生。这种速记法极大地促进了协作设计，因为各种替代方案及其不同后果可以得到权衡和测试。例如，当你讨论不同的解析器系列时，你可以简单地告诉同事，系统使用抽象工厂模式创建每组对象。他们会睿智地点点头，要么立刻恍然大悟，要么在心里记下稍后去查阅。关键在于，这组概念和后果有了一个名称，这构成了一个有用的速记法，我将在本章后面说明。\n\
  \n最后，根据国际法，如果不引用克里斯托弗·亚历山大，就撰写关于模式的文章是非法的。他是一位建筑学学者，其工作深刻影响了最初的面向对象模式倡导者。他在《模式语言》（牛津大学出版社，1977）中说道：\n\
  \n> 每一种模式描述了一个在我们环境中反复出现的问题，然后描述了该问题解决方案的核心，这样你就可以无数次地使用这个解决方案，但绝不以相同的方式做两次。\n\n\
  值得注意的是，这个定义（适用于建筑问题和解决方案）从问题及其更广阔的背景开始，然后才转向解决方案。近年来，有一些批评认为设计模式被过度使用了，尤其是在经验不足的程序员手中。这通常表明，在没有问题和背景的情况下，解决方案被应用了。模式不仅仅是特定组织方式的类和对象以特定方式协作。模式的结构旨在定义解决方案的应用条件，并讨论解决方案的效果。\n\
  \n在本书中，我将关注模式领域中一个特别有影响力的流派：“四人帮”在《设计模式：可复用面向对象软件的基础》（Addison-Wesley Professional，1995）中描述的形式。它专注于面向对象软件开发中的模式，并记录了一些存在于大多数现代面向对象项目中的经典模式。\n\
  \n“四人帮”这本书之所以重要，不仅因为它记录了关键的模式，还因为它描述了为这些模式提供信息和动力的设计原则。我们将在下一章中探讨其中一些原则。\n\n> **注**\
  \  \n> “四人帮”以及本书中描述的模式实际上是模式语言的实例。模式语言是问题和解决方案的目录，它们被组织在一起，彼此互补，形成一个相互关联的整体。还有其他问题领域的模式语言，例如视觉设计、项目管理（当然还有建筑）。当我在本书中讨论设计模式时，我指的是面向对象软件开发中的问题和解决方案。\n\
  \n### 设计模式概览\n\n从本质上讲，设计模式由四个部分组成：名称、问题、解决方案和后果。\n\n\n\n#### 命名\n\n命名至关重要。它们丰富了程序员的语言；短短几个词就能代表相当复杂的问题和解决方案。\n\
  \n命名必须在简洁与描述性之间取得平衡。四人帮（Gang of Four）声称：“找出好名字一直是开发我们目录时最困难的部分之一。”马丁·福勒（Martin Fowler）对此表示赞同：“模式名称至关重要，因为模式的其中一个目的是创造一种词汇表，让开发者能够更有效地沟通”（*《企业应用架构模式》*，Addison-Wesley\
  \ Professional，2002 年）。\n在*《企业应用架构模式》*中，马丁·福勒完善了一种我最初在迪帕克·阿卢尔（Deepak Alur）、丹·马尔克斯（Dan\
  \ Malks）和约翰·克鲁皮（John Crupi）合著的*《Core J2EE Patterns》*（Prentice Hall，2001 年）中遇到的数据库访问模式。福勒定义了两种模式来描述对旧有模式的专门化。他方法的逻辑显然正确（一种新模式对领域对象建模，而另一种对数据库表建模，这是早期作品中模糊不清的区别）。尽管如此，我很难训练自己用新模式的术语进行思考。在设计会议和文档中，我使用原模式名称如此之久，以至于它已经成为了我语言的一部分。\n\
  \n### 问题\n\n无论解决方案多么优雅（有些确实非常优雅），问题及其上下文都是模式的根基。识别问题比应用模式目录中的任何一个解决方案都要困难。这也是某些模式解决方案可能被误用或滥用的原因之一。\n\
  模式会极其细致地描述问题空间。问题会先被简要描述，然后结合上下文，通常附带一个典型示例和一张或多张图表。问题被分解为其具体细节和多种表现形式。任何有助于识别问题的警示信号都会被描述出来。\n\
  \n#### 解决方案\n\n解决方案起初会与问题一同被概述。它也会被详细描述，通常使用 UML 类图和交互图。模式通常会包含一个代码示例。\n尽管可能会呈现代码，但解决方案绝非可复制粘贴之物。模式描述的是解决问题的一种方法。其实现可能有数百种细微差别。想想播种粮食作物的说明。如果你盲目地遵循一系列步骤，到了收获季节很可能就会挨饿。更有用的是一种基于模式的方法，它涵盖了可能适用的各种条件。解决问题的基本方案（让作物生长）总是相同的（准备土壤、播种、灌溉、收获作物），但你实际采取的步骤将取决于各种因素，例如你的土壤类型、地理位置、土地朝向、当地害虫等等。\n\
  马丁·福勒将模式中的解决方案称为“半成品”。也就是说，程序员必须理解概念并自行完成它。\n\n### 后果\n\n你所做的每一个设计决策都会产生更广泛的影响。当然，这应包括令人满意地解决所讨论的问题。一个解决方案一旦被部署，可能非常适合与其他模式协同工作。也可能存在需要注意的风险。\n\
  \n## 四人帮（Gang of Four）格式\n\n在我写作时，面前的书桌上放着五本模式目录。快速浏览每本目录中的模式，确认它们没有使用相同的结构。有些是正式的；有些是细粒度的，包含许多子章节；另一些则是散漫的讨论式。\n\
  有几种定义良好的模式结构，包括克里斯托弗·亚历山大（Christopher Alexander）开发的原始形式（亚历山大形式），以及波特兰模式知识库（Portland\
  \ Pattern Repository）偏爱的叙述式方法（波特兰形式）。由于四人帮的书极具影响力，并且我们将涵盖他们描述的许多模式，让我们检视一下他们在模式中包含的几个部分：\n\
  \n- **意图（Intent）**：对模式目的的简要陈述。你应该能够一眼看出模式的要点。\n- **动机（Motivation）**：描述的问题，通常以一个典型场景的形式呈现。这种铁事式的方法有助于使模式易于理解。\n\
  - **适用性（Applicability）**：审视你可能应用该模式的不同情景。虽然动机描述了一个典型问题，但本节定义了特定情景，并权衡了解决方案在每个情景中的优点。\n\
  - **结构/交互（Structure/Interaction）**：这些部分可能包含描述解决方案中类与对象间关系的 UML 类图和交互图。\n- **实现（Implementation）**：本节着眼于解决方案的细节。它审视了应用该技术时可能出现的任何问题，并提供了部署技巧。\n\
  - **示例代码（Sample Code）**：我总是直接跳到这一部分。我发现一个简单的代码示例往往能提供进入一个模式的途径。示例通常被精简至最基本部分，以揭示解决方案的本质。它可以是任何面向对象语言。当然，在本书中，它将始终是\
  \ PHP。\n- **已知应用（Known Uses）**：这些描述出现该模式（问题、上下文和解决方案）的真实系统。有人说，要使一个模式真正有效，它必须至少在三个公开可用的环境中被发现。这有时被称为“三条原则”。\n\
  - **相关模式（Related Patterns）**：一些模式隐含着其他模式。在应用一个解决方案时，你可以创建另一个解决方案变得有用的上下文。本节审视这些协同效应。它还可能讨论与问题或解决方案有相似之处的模式，以及任何先例（即，在其他地方定义的、当前模式所依赖的模式）。\n\
  \n## 为什么使用设计模式？\n\n那么模式能带来什么好处呢？既然模式是定义好的问题和描述好的解决方案，答案应该是显而易见的。模式可以帮助你解决常见问题。当然，模式的意义不止于此。\n\
  \n### 设计模式定义一个问题\n\n有多少次你到达项目的一个阶段，却发现无路可进？在重新开始之前，你很可能需要先退后几步。\n通过定义常见问题，模式可以帮助你改进设计。有时，解决问题第一步就是认识到你遇到了问题。\n\
  \n### 设计模式定义一个解决方案\n\n在定义并识别出问题（并确保它是正确的问题）之后，模式能为你提供一个解决方案，并附带对其使用后果的分析。尽管模式并不能免除你考虑设计决策影响的责任，但至少你可以确信你正在使用一种经过检验的技术。\n\
  \n### 设计模式与语言无关\n\n模式用面向对象的术语定义对象和解决方案。这意味着许多模式同等适用于多种语言。当我刚开始使用模式时，我阅读的是 C++和 Smalltalk\
  \ 的代码示例，然后在我的 Java 解决方案中进行部署。其他人则会根据对模式的适用性或后果进行调整，但依然保持有效。无论哪种情况，模式都可以在你切换语言时提供帮助。同样，一个基于良好面向对象设计原则构建的应用程序，在不同语言之间移植也相对容易（尽管总是存在一些需要解决的问题）。\n\
  \n\n\n### 模式定义了一种词汇表\n\n通过为开发者提供技术的名称，模式使沟通更加丰富。想象一次设计会议。我已经描述了我的 `Abstract Factory`\
  \ 解决方案，现在需要说明管理系统编译数据的策略。我向鲍勃描述我的计划：\n\n-   我：我正考虑使用 `Composite`。\n-   鲍勃：我觉得你还没想清楚。\n\
  \n好吧，鲍勃不同意我的看法。他向来如此。但他明白我在说什么，因此也知道我的想法为什么糟糕。让我们在没有设计词汇的情况下重新演绎这个场景：\n\n-   我：我打算使用一个共享相同类型的对象树。该类型的接口将提供用于添加自身类型的子对象的方法。通过这种方式，我们可以在运行时构建出实现对象的复杂组合。\n\
  -   鲍勃：啊？\n\n模式，或者说它们所描述的技术，往往是相互协作的。例如，`Composite` 模式倾向于与 `Visitor` 模式协同工作：\n\n\
  -   我：然后我们可以使用 `Visitor` 来汇总数据。\n-   鲍勃：你没抓住重点。\n\n忽略鲍勃。我就不描述这种没有模式时的曲折版本了；我将在第\
  \ 10 章 介绍 `Composite`，在第 11 章 介绍 `Visitor`。\n\n关键在于，即使没有模式语言，我们仍然会使用这些技术。它们先于其命名和组织而存在。即使模式不存在，它们也终究会自行演化。任何被充分使用的工具最终都会获得一个名称。\n\
  \n### 模式是经过考验的\n\n因此，如果模式记录了良好实践，那么命名是否就是模式目录中唯一真正原创的东西？从某种意义上说，这似乎是事实。模式代表了面向对象环境中的最佳实践。对于某些经验丰富的程序员来说，这似乎只是对显而易见之事的重新包装。对于其他人来说，模式提供了一条接触问题和解决方案的途径，否则我们只能通过艰难的方式去发现它们。\n\
  \n模式让设计变得平易近人。随着越来越多特定领域的模式目录出现，即使是经验丰富的人在涉足其领域的新方面时也能从中受益。例如，GUI 程序员可以快速了解企业编程中的常见问题和解决方案。Web\
  \ 程序员可以快速制定策略，避免平板电脑和智能手机项目中潜藏的陷阱。\n\n### 模式是为协作而设计的\n\n就其本质而言，模式应该是可生成和可组合的。这意味着你应该能够应用一个模式，从而创造出适合应用另一个模式的条件。换句话说，使用一个模式时，你可能会发现其他门路为你敞开。\n\
  \n模式目录的设计通常都会考虑到这种协作，而模式组合的可能性也总是记录在模式本身。\n\n### 设计模式提升良好设计\n\n设计模式展示并应用了面向对象设计的原则。因此，研究设计模式不仅仅能让你获得特定上下文中的解决方案，你还能对组合对象和类以实现目标的方式产生新的视角。\n\
  \n### 设计模式被流行框架所使用\n\n本书主要讨论从头开始设计。这里涵盖的模式和原则应能使你根据项目需求设计自己的核心框架。然而，懒惰也是一种美德，你或许希望使用像\
  \ `Zend`、`Laravel` 或 `Symfony` 这样的框架（或者你可能会接手已经使用这些框架的代码）。深入理解核心设计模式将有助于你在使用这些框架\
  \ API 时更好地开展工作。\n\n## PHP 与设计模式\n\n本章几乎没有特定于 `PHP` 的内容，这在某种程度上是这个话题的特点。许多模式适用于多种支持对象的语言，几乎没有或根本不存在实现问题。\n\
  \n当然，情况并非总是如此。有些企业级模式在那些应用进程能在服务器请求之间持续运行的语言中效果很好。`PHP` 并非如此。每次请求都会启动一次新的脚本执行。这意味着某些模式需要更谨慎地对待。例如，`Front\
  \ Controller` 通常需要一些显著初始化时间。如果在应用程序启动时只进行一次初始化，这没问题，但每次请求都必须初始化时，就成问题了。这并非说我们不能使用该模式；我过去曾部署过它并取得了非常好的效果。我们只是必须确保在讨论该模式时考虑到与\
  \ PHP 相关的问题。`PHP` 构成了本书所讨论所有模式的上下文。\n\n我在本节前面提到了支持对象的语言。你可以完全不定义任何类就用 `PHP` 编写代码。然而，除少数几个显著的例外情况外，对象和面向对象设计是大多数\
  \ `PHP` 项目和库的核心。\n\n## 总结\n\n在本章中，我介绍了设计模式，向您展示了它们的结构（使用\"四人帮\"的形式），并提出了一些在脚本中使用设计模式的原因。\n\
  \n重要的是要记住，设计模式不是像组件一样拼凑起来就能构建项目的即插即用解决方案。它们是针对常见问题的建议性方法。这些解决方案体现了一些关键的设计原则。这些原则正是我们将在下一章中要探讨的内容。\n\
  \n"
- "# 8. 一些模式原则\n\n尽管设计模式只是描述问题的解决方案，但它们往往强调那些能促进可重用性和灵活性的解决方案。为了实现这一点，它们展现了一些关键的面向对象设计原则。我们将在本章中见到其中一些原则，并在本书后续部分进行更详细探讨。\n\
  \n本章将涵盖以下主题：\n\n-   组合：如何使用对象聚合实现比单纯继承更大的灵活性\n-   解耦：如何降低系统中元素之间的依赖关系\n-   接口的力量：模式与多态性\n\
  -   模式分类：本书将涵盖的模式类型\n\n\n## 模式启示录\n\n我最初是在 Java 语言中使用对象。可以想见，某些概念花了些时间才真正理解。不过一旦开窍，进展就快得像顿悟一般。继承和封装的美妙深深震撼了我。我能感受到这是定义和构建系统的一种不同方式。我理解了多态——处理一种类型并在运行时切换实现。当时在我看来，这种理解能解决大部分设计问题，帮助我设计出优美而雅致的系统。\n\
  \n当时桌面上所有书籍都聚焦于语言特性以及 Java 程序员可用的众多 API。除了对多态的简要定义外，几乎没有探讨设计策略的内容。\n\n仅凭语言特性并不能催生面向对象设计。尽管我的项目满足了功能需求，但继承、封装和多态看似许诺的那种设计却始终与我失之交臂。\n\
  \n当我想为每种可能情况都构建新类时，我的继承层次变得又宽又深。我的系统结构使得在层级间传递消息变得困难，要么让中间类过度了解周边环境，要么将它们绑定到应用程序中使其无法在新的上下文中使用。\n\
  \n直到我发现了《设计模式：可复用面向对象软件的基础》（Addison-Wesley Professional，1995 年）——也就是著名的\"四人帮\"（GoF）著作——我才意识到自己错过了整个设计维度。那时我虽然已经自己发现了某些核心模式，但其他模式还是帮助我形成了全新的思维方式。\n\
  \n我发现自己在设计中过度偏重继承，试图在类中构建过多功能。但在面向对象系统中，功能还能放在哪里呢？\n\n我在组合中找到了答案。软件组件可以通过在运行时组合灵活关系的对象来定义。四人帮将此提炼为一条原则：\"\
  优先使用组合而非继承\"。这些模式描述了在运行时组合对象的方式，能达到仅靠继承树无法企及的灵活性。\n\n### 组合与继承\n\n继承是为应对变化场景或上下文而设计的强大方式。但它可能限制灵活性，特别是当类承担多重职责时。\n\
  \n### 问题所在\n\n如你所知，子类会继承父类的方法和属性（只要它们是受保护或公开元素）。你可以利用这一点来设计提供特定功能的子类。\n\n图 8-1 展示了使用\
  \ UML 的简单示例。\n\n![A314621_5_En_8_Fig1_HTML.gif](img/A314621_5_En_8_Fig1_HTML.gif)\n\
  \n图 8-1.  \n一个父类与两个子类\n\n图 8-1 中的抽象`Lesson`类对大学课程进行建模。它定义了抽象的`cost()`和`chargeType()`方法。图示展示了两个实现类：`FixedPriceLesson`和`TimedPriceLesson`，它们为课程提供不同的计费机制。\n\
  \n使用这种继承方案，我可以在课程实现之间切换。客户端代码只需知道它处理的是`Lesson`对象，因此费用细节是透明的。\n\n但如果引入一组新的特化呢？我需要处理讲座和研讨会。由于它们在组织报名和课程资料方面方式不同，因此需要单独的类。现在我的设计面临两种力量：既要处理定价策略，又要区分讲座和研讨会。\n\
  \n图 8-2 展示了一种简单粗暴的解决方案。\n\n![A314621_5_En_8_Fig2_HTML.gif](img/A314621_5_En_8_Fig2_HTML.gif)\n\
  \n图 8-2.  \n糟糕的继承结构\n\n图 8-2 展示了明显有缺陷的层次结构。我再也无法通过继承树来管理定价机制，而无需重复大量功能。定价策略在`Lecture`和`Seminar`类族中镜像存在。\n\
  \n此时，我可能会考虑在`Lesson`超类中使用条件语句，消除这些令人遗憾的重复。本质上，我将定价逻辑完全移出继承树，将其上提至超类。这与通常的重构方向相反——通常你会用多态替换条件语句。以下是修改后的`Lesson`类：\n\
  \n```\n// 代码清单 08.01\nabstract class Lesson\n{\nprotected $duration;\nconst    \
  \ FIXED = 1;\nconst     TIMED = 2;\nprivate   $costtype;\n\npublic function __construct(int\
  \ $duration, int $costtype = 1)\n{\n$this->duration = $duration;\n$this->costtype\
  \ = $costtype;\n}\n\npublic function cost(): int\n{\nswitch ($this->costtype) {\n\
  case self::TIMED:\nreturn (5 * $this->duration);\nbreak;\ncase self::FIXED:\nreturn\
  \ 30;\nbreak;\ndefault:\n$this->costtype = self::FIXED;\nreturn 30;\n}\n}\n\npublic\
  \ function chargeType(): string\n{\nswitch ($this->costtype) {\ncase self::TIMED:\n\
  return \"hourly rate\";\nbreak;\ncase self::FIXED:\nreturn \"fixed rate\";\nbreak;\n\
  default:\n$this->costtype = self::FIXED;\nreturn \"fixed rate\";\n}\n}\n\n// 更多课程方法...\n\
  }\n\n// 代码清单 08.02\nclass Lecture extends Lesson\n{\n// 讲座特定实现...\n}\n\n// 代码清单\
  \ 08.03\nclass Seminar extends Lesson\n{\n// 研讨会特定实现...\n}\n```\n\n以下是我使用这些类的方式：\n\
  \n```\n// 代码清单 08.04\n$lecture = new Lecture(5, Lesson::FIXED);\nprint \"{$lecture->cost()}\
  \ ({$lecture->chargeType()})\\n\";\n$seminar = new Seminar(3, Lesson::TIMED);\n\
  print \"{$seminar->cost()} ({$seminar->chargeType()})\\n\";\n```\n\n输出如下：\n\n```\n\
  30 (fixed rate)\n15 (hourly rate)\n```\n\n你可以在图 8-3 中看到新的类图。\n\n![A314621_5_En_8_Fig3_HTML.gif](img/A314621_5_En_8_Fig3_HTML.gif)\n\
  \n图 8-3.  \n通过从子类中移除费用计算来改进的继承层次\n\n我让类结构变得更容易管理，但付出了代价。在这段代码中使用条件语句是一种倒退。通常你会尝试用多态替换条件语句，而这里我反其道而行之。如你所见，这迫使我在`chargeType()`和`cost()`方法中重复了相同的条件语句。\n\
  \n我似乎注定了要重复代码。\n\n\n\n#### 使用组合\n\n我可以运用策略模式通过组合来摆脱困境。策略模式用于将一组算法转移到独立的类型中。通过移动成本计算，我可以简化`Lesson`类型。如图\
  \ 8-4 所示。\n\n![A314621_5_En_8_Fig4_HTML.gif](img/A314621_5_En_8_Fig4_HTML.gif)\n\
  \n图 8-4. 将算法移入独立类型\n\n我创建了一个抽象类`CostStrategy`，它定义了抽象方法`cost()`和`chargeType()`。`cost()`方法需要接收一个`Lesson`实例，并据此生成成本数据。我为`CostStrategy`提供了两个实现。`Lesson`对象仅与`CostStrategy`类型交互，而非其具体实现，因此我随时可以通过继承`CostStrategy`来添加新的成本算法，而无需对任何`Lesson`类进行任何修改。\n\
  \n以下是图 8-4 中所示的新`Lesson`类的简化版本：\n\n```php\n// 清单 08.05\nabstract class Lesson\n\
  {\n    private $duration;\n    private $costStrategy;\n    public function __construct(int\
  \ $duration, CostStrategy $strategy)\n    {\n        $this->duration = $duration;\n\
  \        $this->costStrategy = $strategy;\n    }\n    public function cost(): int\n\
  \    {\n        return $this->costStrategy->cost($this);\n    }\n    public function\
  \ chargeType(): string\n    {\n        return $this->costStrategy->chargeType();\n\
  \    }\n    public function getDuration(): int\n    {\n        return $this->duration;\n\
  \    }\n    // 更多课程方法...\n}\n// 清单 08.06\nclass Lecture extends Lesson\n{\n    //\
  \ Lecture 特有的实现 ...\n}\n// 清单 08.07\nclass Seminar extends Lesson\n{\n    // Seminar\
  \ 特有的实现 ...\n}\n```\n\n`Lesson`类需要接收一个`CostStrategy`对象并将其存储为属性。`Lesson::cost()`方法直接调用`CostStrategy::cost()`。同样地，`Lesson::chargeType()`调用`CostStrategy::chargeType()`。这种为了完成请求而显式调用另一个对象方法的行为被称为委托。在我的示例中，`CostStrategy`对象是`Lesson`的委托对象。`Lesson`类卸下了成本计算的责任，并将其传递给一个`CostStrategy`实现。以下代码即体现了委托行为：\n\
  \n```php\npublic function cost(): int\n{\n    return $this->costStrategy->cost($this);\n\
  }\n```\n\n以下是`CostStrategy`类及其子类的实现：\n\n```php\n// 清单 08.08\nabstract class CostStrategy\n\
  {\n    abstract public function cost(Lesson $lesson): int;\n    abstract public\
  \ function chargeType(): string;\n}\n// 清单 08.09\nclass TimedCostStrategy extends\
  \ CostStrategy\n{\n    public function cost(Lesson $lesson): int\n    {\n      \
  \  return ($lesson->getDuration() * 5);\n    }\n    public function chargeType():\
  \ string\n    {\n        return \"按小时收费\";\n    }\n}\n// 清单 08.10\nclass FixedCostStrategy\
  \ extends CostStrategy\n{\n    public function cost(Lesson $lesson): int\n    {\n\
  \        return 30;\n    }\n    public function chargeType(): string\n    {\n  \
  \      return \"固定收费\";\n    }\n}\n```\n\n我可以在运行时通过向任何`Lesson`对象传递不同的`CostStrategy`对象来改变其计算成本的方式。这种方法使代码变得高度灵活。与其静态地将功能构建到代码结构中，不如动态地组合和重组对象：\n\
  \n```php\n// 清单 08.11\n$lessons[] = new Seminar(4, new TimedCostStrategy());\n$lessons[]\
  \ = new Lecture(4, new FixedCostStrategy());\nforeach ($lessons as $lesson) {\n\
  \    print \"课程费用 {$lesson->cost()}. \";\n    print \"收费类型: {$lesson->chargeType()}\\\
  n\";\n}\n课程费用 20. 收费类型: 按小时收费\n课程费用 30. 收费类型: 固定收费\n```\n\n如你所见，这种结构的一个效果是，我聚焦了各个类的职责。`CostStrategy`对象仅负责计算成本，而`Lesson`对象负责管理课程数据。\n\
  \n因此，组合可以使你的代码更加灵活，因为对象可以以你仅靠继承层次结构所无法预见的多种方式组合起来，动态地处理任务。不过，这可能会对可读性造成一定影响。由于组合往往会产生更多类型，且关系不像继承关系那样具有可预测的固定性，因此消化系统中的关系可能会稍微困难一些。\n\
  \n## 解耦\n\n你在第 6 章中看到，构建独立的组件是合理的。一个高度相互依赖的类组成的系统将难以维护。在一处进行更改可能需要在系统中级联进行一系列相关更改。\n\
  \n### 问题\n\n可重用性是面向对象设计的关键目标之一，而紧耦合则是其敌人。当你发现对系统某个组件的更改导致大量其他位置的更改时，你就可以诊断出紧耦合。你应该致力于创建独立的组件，以便在不产生意外连锁反应的情况下进行更改。当你更改一个组件时，其独立程度与你的更改导致系统其他部分失败的可能性相关。\n\
  \n你可以在图 8-2 中看到紧耦合的示例。由于成本逻辑在`Lecture`和`Seminar`类型之间是镜像的，因此对`TimedPriceLecture`的更改将需要对`TimedPriceSeminar`中的相同逻辑进行并行更改。如果只更新了一个类而另一个未更新，就会破坏系统——而\
  \ PHP 引擎不会发出任何警告。我使用条件语句的第一个解决方案在`cost()`和`chargeType()`方法之间产生了类似的依赖关系。\n\n通过应用策略模式，我将成本算法提炼到`CostStrategy`类型中，将它们置于一个公共接口之后，并且每个算法只实现一次。\n\
  \n另一种耦合发生在系统的许多类被显式嵌入到某个平台或环境中时。例如，假设你正在构建一个与 MySQL 数据库配合使用的系统。你可能会使用`mysqli::query()`等方法与数据库服务器通信。\n\
  \n如果你需要将系统部署在不支持 MySQL 的服务器上，你可能需要将整个项目转换为使用 SQLite。不过，你将被迫在整个代码中进行更改，并且面临维护应用程序的两个并行版本的前景。\n\
  \n这里的问题不在于系统对外部平台的依赖。这种依赖是不可避免的。你需要使用与数据库通信的代码。问题在于此类代码遍布整个项目。与数据库通信并不是系统中大多数类的主要职责，因此最佳策略是将此类代码提取出来，并将其分组到公共接口之后。通过这种方式，你可以提升类的独立性。同时，通过将网关代码集中在一个地方，可以更容易地切换到新平台，而不会影响到你的整个系统。这种将实现隐藏在清晰接口背后的过程被称为封装。Doctrine\
  \ 数据库库通过`DBAL`（数据库抽象层）项目解决了这个问题。它为多个数据库提供统一的访问入口。\n\n`DriverManager`类提供了一个名为`getConnection()`的静态方法，该方法接受一个参数数组。根据该数组的构成，它会返回`Doctrine\\\
  DBAL\\Driver`接口的特定实现。你可以在图 8-5 中看到类结构。\n\n![A314621_5_En_8_Fig5_HTML.gif](img/A314621_5_En_8_Fig5_HTML.gif)\n\
  \n图 8-5. DBAL 包将客户端代码与数据库对象解耦\n\n因此，`DBAL`包让你可以将应用程序代码与数据库平台的细节解耦。你应该能够使用 MySQL、SQLite、MSSQL\
  \ 等运行单个系统，而无需更改任何代码（当然，配置参数除外）。\n\n\n\n### 降低耦合度\n\n为了灵活处理数据库代码，应将应用程序逻辑与所使用数据库平台的特性解耦。在自己的项目中，你会看到很多进行这种组件分离的机会。\n\
  \n例如，假设`Lesson`系统必须包含一个注册组件，用于向系统添加新课程。作为注册流程的一部分，当添加课程时，应通知管理员。系统用户无法就应通过邮件还是短信发送此通知达成一致。事实上，他们争论不休，以至于你怀疑他们将来可能想切换为新的通信方式。更麻烦的是，他们希望所有事情都能收到通知，因此对一处通知方式的更改将意味着许多其他地方也要进行类似的修改。\n\
  \n如果你硬编码了对`Mailer`类或`Texter`类的调用，那么你的系统就与特定的通知模式紧密耦合，就像通过使用专用的数据库 API 而与某个数据库平台紧密耦合一样。\n\
  \n以下是将通知程序的实现细节对使用它的系统隐藏的代码：\n\n```\n// 清单 08.12\nclass RegistrationMgr\n{\npublic\
  \ function register(Lesson $lesson)\n{\n// 处理此 Lesson\n// 现在通知相关人员\n$notifier =\
  \ Notifier::getNotifier();\n$notifier->inform(\"新课程：费用 ({$lesson->cost()})\");\n\
  }\n}\n// 清单 08.13\nabstract class Notifier\n{\npublic static function getNotifier():\
  \ Notifier\n{\n// 根据配置或其他逻辑获取具体类\nif (rand(1, 2) === 1) {\nreturn new MailNotifier();\n\
  } else {\nreturn new TextNotifier();\n}\n}\nabstract public function inform($message);\n\
  }\n// 清单 08.14\nclass MailNotifier extends Notifier\n{\npublic function inform($message)\n\
  {\nprint \"邮件通知：{$message}\\n\";\n}\n}\n// 清单 08.15\nclass TextNotifier extends\
  \ Notifier\n{\npublic function inform($message)\n{\nprint \"短信通知：{$message}\\n\"\
  ;\n}\n}\n```\n\n我创建了`RegistrationMgr`，作为通知程序（Notifier）类的一个示例客户端。`Notifier`类是抽象类，但它实现了一个静态方法`getNotifier()`，该方法会获取一个具体的`Notifier`对象（`TextNotifier`或`MailNotifier`）。在真实项目中，选择哪个`Notifier`将由灵活的机制（例如配置文件）决定。这里我偷了个懒，随机选择。`MailNotifier`和`TextNotifier`所做的只是打印出传递给它们的消息以及一个标识符，以显示哪个被调用了。\n\
  \n请注意，关于应该使用哪个具体`Notifier`的知识如何集中在了`Notifier::getNotifier()`方法中。我可以从系统中的数百个不同位置发送通知消息，而对通知程序的更改只需在一个方法中进行。\n\
  \n以下调用`RegistrationMgr`的代码：\n\n```\n// 清单 08.16\n$lessons1 = new Seminar(4, new\
  \ TimedCostStrategy());\n$lessons2 = new Lecture(4, new FixedCostStrategy());\n\
  $mgr = new RegistrationMgr();\n$mgr->register($lessons1);\n$mgr->register($lessons2);\n\
  ```\n\n以下是典型运行的输出：\n\n```\n短信通知：新课程：费用 (20)\n邮件通知：新课程：费用 (30)\n```\n\n图 8-6 展示了这些类。\n\
  \n![A314621_5_En_8_Fig6_HTML.gif](img/A314621_5_En_8_Fig6_HTML.gif)\n\n**图 8-6.**\
  \  \n`Notifier` 类将客户端代码与 `Notifier` 的实现分离开来\n\n请注意，图 8-6 中的结构与图 8-5 中由 Doctrine\
  \ 组件形成的结构有多么相似。\n\n## 面向接口编程，而非面向实现编程\n\n这一原则是本书贯穿始终的主题之一。你在第 6 章（以及上一节）中看到，可以将不同的实现隐藏在超类定义的公共接口之后。然后，客户端代码可以要求超类类型的对象，而非实现类的对象，无需关心它实际获取的是哪个具体实现。\n\
  \n像我从 `Lesson::cost()` 和 `Lesson::chargeType()` 中剔除的那些平行条件语句，通常表明需要用到多态性。它们使得代码难以维护，因为对一个条件表达式的更改必然导致其姊妹条件表达式的相应更改。条件语句有时被称为实现了“模拟继承”。\n\
  \n通过将费用算法放在实现 `CostStrategy` 的独立类中，我消除了重复。这也使得未来如果需要添加新的费用策略时更加容易。\n\n从客户端代码的角度来看，在方法的参数中要求抽象类型或通用类型通常是个好主意。如果要求更具体的类型，可能会限制代码在运行时的灵活性。\n\
  \n当然，话虽如此，你在参数提示中选择的通用程度取决于判断。选择过于通用，你的方法可能会变得不够安全。如果你需要子类型的特定功能，那么接受一个装备不同的兄弟类进入方法可能会有风险。\n\
  \n然而，如果参数提示的选择过于受限，你就会失去多态性的好处。看看这个从 `Lesson` 类修改而来的片段：\n\n```\n// 清单 08.17\npublic\
  \ function __construct(int $duration, FixedCostStrategy $strategy)\n{\n$this->duration\
  \ = $duration;\n$this->costStrategy = $strategy;\n}\n```\n\n此示例中的设计决策引发了两个问题。首先，`Lesson`\
  \ 对象现在绑定到了特定的费用策略，这限制了我组合动态组件的能力。其次，显式引用 `FixedPriceStrategy` 类迫使我维护该特定实现。\n\n通过要求一个公共接口，我可以将\
  \ `Lesson` 对象与任何 `CostStrategy` 实现组合：\n\n```\n// 清单 08.18\npublic function __construct(int\
  \ $duration, CostStrategy $strategy)\n{\n$this->duration = $duration;\n$this->costStrategy\
  \ = $strategy;\n}\n```\n\n换句话说，我将 `Lesson` 类与费用计算的细节解耦了。重要的是接口以及所提供对象会遵守该接口的保证。\n\
  \n当然，面向接口编程通常只是推迟了如何实例化对象的问题。当我说一个 `Lesson` 对象可以在运行时与任何 `CostStrategy` 接口组合时，这引出了一个问题：“但是\
  \ `CostStrategy` 对象从何而来？”\n\n当你创建一个抽象超类时，总是存在如何实例化其子类的问题。你根据什么条件选择哪个子类？这在四人组（Gang\
  \ of Four）模式目录中自成一体，我将在下一章进一步探讨这个主题。\n\n\n\n## 变化的概念\n\n一旦设计决策被做出，解释起来很容易，但如何决定从哪里开始呢？\n\
  \n四人帮建议“封装变化的概念”。以我的课程示例来说，变化的概念是成本算法。成本计算不仅是示例中两种可能的策略之一，而且显然是一个有待扩展的候选：特价优惠、留学生费用、首单折扣——各种可能性层出不穷。\n\
  \n我很快确定，为这种变化创建子类是不合适的，于是求助于条件语句。通过将变化因素纳入同一个类，我强调了它适合被封装。\n\n四人帮建议你主动在类中寻找变化元素，并评估它们是否适合被封装成新的类型。一个可疑条件中的每个分支都可以被提取出来，形成一个继承自共同抽象父类的类。这个新类型随后可以被它被提取出来的类（或那些类）所使用。这会带来以下效果：\n\
  \n- 集中职责\n- 通过组合提升灵活性\n- 使继承层次结构更加紧凑和专注\n- 减少重复\n\n那么，如何发现变化？一个标志是继承的误用。这可能包括根据多股力量同时部署继承（例如，讲座/研讨会\
  \ 和 固定/按时间计费 成本）。也可能包括为某个算法创建子类，而该算法对于该类型的核心职责来说是次要的。另一个适合封装的变化标志，正如你所见，是条件表达式。\n\
  \n## 模式病\n\n有一个问题没有对应的模式，那就是模式的不必要或不恰当使用。这使模式在某些圈子里名声不佳。由于模式解决方案很简洁，人们很容易在认为合适的地方应用它们，无论它们是否真正满足需求。\n\
  \n极限编程方法论提供了两个可能适用于此的原则。第一个是“你并不需要它”（常缩写为 YAGNI）。这通常应用于应用程序特性，但对模式也同样适用。\n\n当我在\
  \ PHP 中构建大型环境时，我倾向于将应用程序分层，将应用逻辑与表示层和持久化层分离。我会将各种核心模式和企业模式相互结合使用。\n\n然而，当我被要求为一个小型企业网站构建一个反馈表单时，我可能仅仅在单个页面脚本中使用过程式代码。我并不需要极大的灵活性；我不会在初始版本的基础上进行大量扩展。我不需要使用那些针对大型系统问题的模式。相反，我应用第二个\
  \ XP 原则：“做最简单可行的事情。”\n\n当你使用模式目录时，解决方案的结构和过程会印在脑海中，并通过代码示例得到巩固。不过，在应用一个模式之前，要密切关注“问题”或“何时使用”部分，然后阅读该模式的副作用。在某些上下文中，治疗方法可能比疾病本身更糟糕。\n\
  \n## 这些模式\n\n本书并非模式目录。尽管如此，在接下来的章节中，我将介绍当前正在使用的一些关键模式，提供 PHP 实现，并在 PHP 编程的广泛背景下讨论它们。\n\
  \n所描述的模式将来自一些关键目录，包括《设计模式：可复用面向对象软件的基础》、Martin Fowler 的《企业应用架构模式》（Addison-Wesley\
  \ Professional, 2002）以及 Alur 等人合著的《Core J2EE 模式：最佳实践和设计策略》（Prentice Hall, 2001）。我以四人帮的分类作为起点，将模式分为以下五大类。\n\
  \n### 生成对象的模式\n\n这些模式与对象的实例化有关。鉴于“针对接口编程”这一原则，这是一个重要的类别。如果你在设计中使用抽象父类，那么你必须制定从具体子类实例化对象的策略。正是这些对象会在你的系统中被传递。\n\
  \n### 组织对象和类的模式\n\n这些模式帮助你组织对象的组合关系。更简单地说，这些模式展示了如何组合对象和类。\n\n### 面向任务的模式\n\n这些模式描述了类和对象为达成目标而协作的机制。\n\
  \n### 企业模式\n\n我研究了一些描述典型互联网编程问题及解决方案的模式。这些模式主要借鉴自《企业应用架构模式》和《Core J2EE 模式：最佳实践和设计策略》，涉及表示层和应用逻辑层。\n\
  \n### 数据库模式\n\n考察有助于存储和检索数据，以及在数据库之间和从数据库映射对象的模式。\n\n## 总结\n\n在本章中，我审视了支撑许多设计模式的一些原则。我探讨了如何使用组合在运行时实现对象的组合与重组，从而产生比仅使用继承更灵活的结构。我还向你介绍了解耦，即将软件组件从其上下文中提取出来，使其更具通用性的实践。最后，我重申了接口作为将客户端与实现细节解耦手段的重要性。\n\
  \n在接下来的章节中，我将详细研究一些设计模式。\n\n"
- "# 9. 生成对象\n\n创建对象是一项复杂的工作。因此，许多面向对象的设计都处理漂亮、干净的抽象类，利用多态性（在运行时切换具体实现）所提供的惊人灵活性。然而，为了实现这种灵活性，我必须设计对象生成的策略。这就是本章要探讨的主题。\n\
  \n本章将涵盖以下模式：\n\n- 单例模式：一个特殊的类，它生成且仅生成一个对象实例\n- 工厂方法模式：构建创建者类的继承层次结构\n- 抽象工厂模式：将功能相关的产品族创建过程分组\n\
  - 原型模式：使用 `clone` 生成对象\n- 服务定位器模式：向你的系统请求对象\n- 依赖注入模式：让你的系统为你提供对象\n\n\n\n## 对象生成中的问题与解决方案\n\
  \n对象创建可能是面向对象设计中的薄弱环节。在上一章中，你看到了一个原则：“针对接口编程，而非针对实现”。为此，我们鼓励你在类中使用抽象超类型。这能使代码更灵活，允许你在运行时使用从不同具体子类实例化的对象。这带来一个副作用，即对象实例化被推迟了。\n\
  \n下面是一个类，它接收一个名称字符串并实例化一个特定对象：\n\n```\n// 清单 09.01\nabstract class Employee\n{\n\
  \    protected $name;\n    public function __construct(string $name)\n    {\n  \
  \      $this->name = $name;\n    }\n    abstract public function fire();\n}\n//\
  \ 清单 09.02\nclass Minion extends Employee\n{\n    public function fire()\n    {\n\
  \        print \"{$this->name}: I'll clear my desk\\n\";\n    }\n}\n// 清单 09.03\n\
  class NastyBoss\n{\n    private $employees = [];\n    public function addEmployee(string\
  \ $employeeName)\n    {\n        $this->employees[] = new Minion($employeeName);\n\
  \    }\n    public function projectFails()\n    {\n        if (count($this->employees)\
  \ > 0) {\n            $emp = array_pop($this->employees);\n            $emp->fire();\n\
  \        }\n    }\n}\n// 清单 09.04\n$boss = new NastyBoss();\n$boss->addEmployee(\"\
  harry\");\n$boss->addEmployee(\"bob\");\n$boss->addEmployee(\"mary\");\n$boss->projectFails();\n\
  mary: I'll clear my desk\n```\n\n如你所见，我定义了一个抽象基类 `Employee`，以及一个被压迫的实现类 `Minion`。给定一个名称字符串，`NastyBoss::addEmployee()`\
  \ 方法会实例化一个新的 `Minion` 对象。每当一个 `NastyBoss` 对象遇到麻烦时（通过 `NastyBoss::projectFails()`\
  \ 方法），它就会找一个 `Minion` 来解雇。\n\n通过在 `NastyBoss` 类中直接实例化 `Minion` 对象，我们限制了灵活性。如果一个\
  \ `NastyBoss` 对象能与任何 `Employee` 类型的实例协作，我们就可以让代码在运行时随着更多 `Employee` 特化类的加入而适应变化。你应该已经对图\
  \ 9-1 中的多态性感到熟悉。\n\n![A314621_5_En_9_Fig1_HTML.gif](img/A314621_5_En_9_Fig1_HTML.gif)\n\
  \n**图 9-1.** 使用抽象类型实现多态\n\n如果 `NastyBoss` 类不实例化 `Minion` 对象，这些对象从何而来？作者们常常通过限定方法声明中的参数类型，然后巧妙地省略测试环境之外的实例化过程来回避这个问题：\n\
  \n```\n// 清单 09.05\nclass NastyBoss\n{\n    private $employees = [];\n    public\
  \ function addEmployee(Employee $employee)\n    {\n        $this->employees[] =\
  \ $employee;\n    }\n    public function projectFails()\n    {\n        if (count($this->employees))\
  \ {\n            $emp = array_pop($this->employees);\n            $emp->fire();\n\
  \        }\n    }\n}\n// 清单 09.06\n// new Employee class...\nclass CluedUp extends\
  \ Employee\n{\n    public function fire()\n    {\n        print \"{$this->name}:\
  \ I'll call my lawyer\\n\";\n    }\n}\n// 清单 09.07\n$boss = new NastyBoss();\n$boss->addEmployee(new\
  \ Minion(\"harry\"));\n$boss->addEmployee(new CluedUp(\"bob\"));\n$boss->addEmployee(new\
  \ Minion(\"mary\"));\n$boss->projectFails();\n$boss->projectFails();\n$boss->projectFails();\n\
  mary: I'll clear my desk\nbob: I'll call my lawyer\nharry: I'll clear my desk\n\
  ```\n\n尽管这个版本的 `NastyBoss` 类与 `Employee` 类型协作，并因此受益于多态，我仍然没有定义对象创建的策略。实例化对象是件麻烦事，但又不得不做。本章将介绍与具体类协作的类和对象，从而让其他类无需处理这些问题。\n\
  \n如果存在一条原则，那就是“委托对象实例化”。在前面的例子中，我通过要求将 `Employee` 对象传递给 `NastyBoss::addEmployee()`\
  \ 方法隐式地实现了这一点。然而，我同样可以将此职责委托给一个单独的类或方法，由其负责生成 `Employee` 对象。这里我为 `Employee` 类添加了一个静态方法，实现了对象创建的策略：\n\
  \n```\n// 清单 09.08\nabstract class Employee\n{\n    protected $name;\n    private\
  \ static $types = ['Minion', 'CluedUp', 'WellConnected'];\n    public static function\
  \ recruit(string $name)\n    {\n        $num = rand(1, count(self::$types)) - 1;\n\
  \        $class = __NAMESPACE__ . \"\\\\\".self::$types[$num];\n        return new\
  \ $class($name);\n    }\n    public function __construct(string $name)\n    {\n\
  \        $this->name = $name;\n    }\n    abstract public function fire();\n}\n\
  // 清单 09.09\n// new Employee class...\nclass WellConnected extends Employee\n{\n\
  \    public function fire()\n    {\n        print \"{$this->name}: I'll call my\
  \ dad\\n\";\n    }\n}\n```\n\n如你所见，这个方法接收一个名称字符串，并随机实例化一个特定的 `Employee` 子类型。现在，我可以将实例化的细节委托给\
  \ `Employee` 类的 `recruit()` 方法：\n\n```\n// 清单 09.10\n$boss = new NastyBoss();\n\
  $boss->addEmployee(Employee::recruit(\"harry\"));\n$boss->addEmployee(Employee::recruit(\"\
  bob\"));\n$boss->addEmployee(Employee::recruit(\"mary\"));\n```\n\n你在第 4 章中已经见过这样一个简单的例子。我在\
  \ `ShopProduct` 类中放置了一个名为 `getInstance()` 的静态方法。\n\n> **注意：** 本章中我会频繁使用“工厂”这个词。工厂是一个负责生成对象的类或方法。\n\
  \n`getInstance()` 负责根据数据库查询生成正确的 `ShopProduct` 子类。因此，`ShopProduct` 类扮演了双重角色。它定义了\
  \ `ShopProduct` 类型，同时也充当了具体 `ShopProduct` 对象的工厂：\n\n```\npublic static function\
  \ getInstance(int $id, PDO $pdo): ShopProduct\n{\n    $stmt = $pdo->prepare(\"select\
  \ * from products where id=?\");\n    $result = $stmt->execute([$id]);\n    $row\
  \ = $stmt->fetch();\n    if (empty($row)) {\n        return null;\n    }\n    if\
  \ ($row['type'] == \"book\") {\n        // instantiate a BookProduct object\n  \
  \  } elseif ($row['type'] == \"cd\") {\n        // instantiate a CdProduct object\n\
  \    } else {\n        // instantiate a ShopProduct object\n    }\n    $product->setId($row['id']);\n\
  \    $product->setDiscount($row['discount']);\n    return $product;\n}\n```\n\n\
  `getInstance()` 方法使用一个大型的 `if/else` 语句来决定实例化哪个子类。这样的条件判断在工厂代码中很常见。尽管你应该尝试从项目中移除大型条件语句，但这样做通常会将条件判断推回到对象生成的那一刻。这通常不是一个严重的问题，因为通过将决策回推至此，你从代码中消除了并行的条件语句。\n\
  \n因此，在本章中，我将探讨一些用于生成对象的经典“四人帮”设计模式。\n\n\n\n### 单例模式\n\n全局变量是面向对象程序员最头疼的问题之一。其缘由你现在应该已经很熟悉了。全局变量会将类与其上下文环境绑定，从而破坏封装性（关于这一点，请参考第\
  \ 6 章“对象与设计”和第 8 章“一些模式原则”）。如果一个类依赖于全局变量，那么在不首先确保新应用程序也定义了相同全局变量的前提下，它几乎无法从一个应用程序中提取出来并在另一个应用程序中使用。\n\
  \n尽管这本身并不可取，但全局变量的无保护特性可能是一个更严重的问题。一旦你开始依赖全局变量，你的某个库声明的一个全局变量与别处声明的另一个全局变量发生冲突，可能只是时间问题。你已经知道，如果不使用命名空间，PHP\
  \ 很容易发生类名冲突。但全局变量的冲突要糟糕得多。当全局变量冲突时，PHP 不会给你任何警告。你最先察觉到问题将是在你的脚本开始出现异常行为时。更糟糕的是，在你的开发环境中你可能根本注意不到任何问题。然而，通过使用全局变量，你可能会让你的用户在尝试将你的库与其他库一同部署时，暴露在新的、有趣的冲突面前。\n\
  \n尽管如此，全局变量仍然是一种诱惑。这是因为，有时全局访问所带来的固有弊端，似乎也值得付出代价，以便让你所有的类都能访问到一个对象。\n\n正如我提到的，命名空间对此提供了一些保护。你至少可以将变量限定在一个包的作用域内，这意味着第三方库与你的系统发生冲突的可能性更低。即便如此，在命名空间内部仍然存在冲突的风险。\n\
  \n### 问题\n\n设计良好的系统通常通过方法调用来传递对象实例。每个类都保持其相对于更广泛上下文的独立性，并通过清晰的通信线路与系统的其他部分协作。然而，有时你会发现，这迫使你将某些类用作传递它们并不关心的对象的管道，从而以良好设计的名义引入了依赖关系。\n\
  \n想象一个保存应用程序级别信息的 `Preferences` 类。我们可能会使用一个 `Preferences` 对象来存储诸如 DSN 字符串（数据源名称包含数据库的表和用户信息）、URL\
  \ 根目录、文件路径等数据。这类信息会因不同的安装环境而异。该对象也可以被用作一个公告板，系统内其他不相关的对象可以在此设置或检索消息。\n\n将一个 `Preferences`\
  \ 对象从一个对象传递到另一个对象并不总是一个好主意。许多本来不使用该对象的类可能被迫接受它，仅仅是为了能将这个对象传递给它们协作的对象。这不过是另一种耦合。\n\
  \n你还需要确保系统中的所有对象都在使用同一个 `Preferences` 对象。你不希望一些对象在一个对象上设置值，而其他对象却从一个完全不同的对象上读取值。\n\
  \n让我们提炼一下这个问题中的核心要素：\n\n*   系统中的任何对象都应该能够访问到一个 `Preferences` 对象。\n*   `Preferences`\
  \ 对象不应存储在可能被覆盖的全局变量中。\n*   系统中应该只有一个 `Preferences` 对象在起作用。这意味着对象 Y 可以在这个 `Preferences`\
  \ 对象中设置一个属性，而对象 Z 可以检索到同一个属性，且两者无需直接通信（假设两者都能访问到这个 `Preferences` 对象）。\n\n### 实现\n\
  \n为了解决这个问题，我可以从控制对象的实例化入手。这里，我创建了一个无法从自身外部实例化的类。这听起来可能有些困难，但其实只需定义一个私有构造函数即可：\n\n\
  ```\nclass Preferences\n{\nprivate $props = [];\nprivate function __construct()\n\
  {\n}\npublic function setProperty(string $key, string $val)\n{\n$this->props[$key]\
  \ = $val;\n}\npublic function getProperty(string $key): string\n{\nreturn $this->props[$key];\n\
  }\n}\n```\n\n当然，此时 `Preferences` 类完全无法使用。我将访问限制发挥到了荒谬的程度。因为构造函数被声明为 `private`，没有任何客户端代码能从中实例化一个对象。因此\
  \ `setProperty()` 和 `getProperty()` 方法成了摆设。\n\n我可以使用一个静态方法和一个静态属性来协调对象的实例化：\n\n\
  ```\n// listing 09.11\nclass Preferences\n{\nprivate $props = [];\nprivate static\
  \ $instance;\nprivate function __construct()\n{\n}\npublic static function getInstance()\n\
  {\nif (empty(self::$instance)) {\nself::$instance = new Preferences();\n}\nreturn\
  \ self::$instance;\n}\npublic function setProperty(string $key, string $val)\n{\n\
  $this->props[$key] = $val;\n}\npublic function getProperty(string $key): string\n\
  {\nreturn $this->props[$key];\n}\n}\n```\n\n`$instance` 属性是私有且静态的，所以无法从类外部访问。但 `getInstance()`\
  \ 方法可以访问它。由于 `getInstance()` 是公有且静态的，它可以通过该类从脚本的任何地方被调用：\n\n```\n// listing 09.12\n\
  $pref = Preferences::getInstance();\n$pref->setProperty(\"name\", \"matt\");\nunset($pref);\
  \ // 移除引用\n$pref2 = Preferences::getInstance();\nprint $pref2->getProperty(\"name\"\
  ) .\"\\n\"; // 演示值并未丢失\n```\n\n输出结果是我们最初添加到 `Preferences` 对象的唯一值，它可以通过另一个独立的访问点获取：\n\
  \n```\nmatt\n```\n\n静态方法无法访问对象属性，因为根据定义，它是在类上下文中而非对象上下文中调用的。但它可以访问静态属性。当 `getInstance()`\
  \ 被调用时，我检查 `Preferences::$instance` 属性。如果它为空，我就创建一个 `Preferences` 类的实例并将其存储在属性中。然后我将该实例返回给调用代码。因为静态方法\
  \ `getInstance()` 是 `Preferences` 类的一部分，尽管构造函数是私有的，我仍然可以毫无问题地实例化一个 `Preferences`\
  \ 对象。\n\n图 9-2 展示了单例模式。\n\n![A314621_5_En_9_Fig2_HTML.gif](img/A314621_5_En_9_Fig2_HTML.gif)\n\
  \n**图 9-2.** 单例模式示例\n\n### 结果\n\n那么，单例方法与使用全局变量相比如何呢？首先，坏消息是：单例和全局变量都容易被滥用。由于单例可以从系统的任何地方访问，它们可能会创建难以调试的依赖关系。改变一个单例，使用它的类就可能受到影响。依赖关系本身并不是问题。毕竟，每当我们声明一个方法需要特定类型的参数时，我们就在创建依赖关系。问题在于，单例的全局性使得程序员可以绕过由类接口定义的通信线路。当使用单例时，依赖关系隐藏在方法内部，并未在其签名中声明。这会增加追踪系统内部关系的难度。因此，单例类应该谨慎且有节制地使用。\n\
  \n尽管如此，我认为适度使用单例模式可以改善系统的设计，让你免于在系统中不必要地传递对象而带来的各种别扭。\n\n在面向对象的上下文中，单例模式代表了对全局变量的一种改进。你不能用错误类型的数据覆盖一个单例。\n\
  \n\n\n## 工厂方法模式\n\n面向对象设计强调抽象类而非具体实现。也就是说，它侧重于泛化而非特化。当你的代码聚焦于抽象类型时，`工厂方法`模式解决了如何创建对象实例的问题。答案是什么？让专门的类来处理实例化。\n\
  \n### 问题\n\n设想一个个人日程管理项目，它管理`Appointment`对象以及其他对象类型。你的业务团队与另一家公司建立了合作关系，你必须使用一种名为\
  \ BloggsCal 的格式与其通信日程数据。不过，业务团队警告你，随着时间的推移，你可能还会遇到更多格式。\n\n仅停留在接口层面，你可以立即识别出两个参与者。你需要一个数据编码器，将你的`Appointment`对象转换为专有格式。我们称这个类为`ApptEncoder`。你需要一个管理器类，用于获取编码器，并可能与其协作与第三方通信。你可以称之为`CommsManager`。使用该模式的术语，`CommsManager`是创建者，而`ApptEncoder`是产品。你可以在图\
  \ 9-3 中看到这种结构。\n\n![A314621_5_En_9_Fig3_HTML.gif](img/A314621_5_En_9_Fig3_HTML.gif)\n\
  \n图 9-3. 抽象创建者和产品类\n\n然而，你如何获得一个具体的`ApptEncoder`对象呢？\n\n你可以要求将`ApptEncoder`传递给`CommsManager`，但这只是推迟了你的问题，而你希望责任到此为止。这里我直接在`CommsManager`类中实例化了一个`BloggsApptEncoder`对象：\n\
  \n```\n// listing 09.13\nabstract class ApptEncoder\n{\nabstract public function\
  \ encode(): string;\n}\n// listing 09.14\nclass BloggsApptEncoder extends ApptEncoder\n\
  {\npublic function encode(): string\n{\nreturn \"Appointment data encoded in BloggsCal\
  \ format\\n\";\n}\n}\n// listing 09.15\nclass MegaApptEncoder extends ApptEncoder\n\
  {\npublic function encode(): string\n{\nreturn \"Appointment data encoded in MegaCal\
  \ format\\n\";\n}\n}\n// listing 09.16\nclass CommsManager\n{\npublic function getApptEncoder():\
  \ ApptEncoder\n{\nreturn new BloggsApptEncoder();\n}\n}\n```\n\n`CommsManager`类负责生成`BloggsApptEncoder`对象。当企业忠诚的潮汐不可避免地转变，我们被要求将系统转换为支持一种名为\
  \ MegaCal 的新格式时，我们可以简单地在`CommsManager::getApptEncoder()`方法中添加一个条件判断。毕竟，这是我们过去使用的策略。让我们构建一个新的`CommsManager`实现，它同时处理\
  \ BloggsCal 和 MegaCal 格式：\n\n```\n// listing 09.17\nclass CommsManager\n{\nconst\
  \ BLOGGS = 1;\nconst MEGA = 2;\nprivate $mode;\npublic function __construct(int\
  \ $mode)\n{\n$this->mode = $mode;\n}\npublic function getApptEncoder(): ApptEncoder\n\
  {\nswitch ($this->mode) {\ncase (self::MEGA):\nreturn new MegaApptEncoder();\ndefault:\n\
  return new BloggsApptEncoder();\n}\n}\n}\n// listing 09.18\n$man = new CommsManager(CommsManager::MEGA);\n\
  print (get_class($man->getApptEncoder())) . \"\\n\";\n$man = new CommsManager(CommsManager::BLOGGS);\n\
  print (get_class($man->getApptEncoder())) . \"\\n\";\n```\n\n我使用常量标志来定义脚本可能运行的两种模式：`MEGA`和`BLOGGS`。我在`getApptEncoder()`方法中使用`switch`语句来测试`$mode`属性，并实例化`ApptEncoder`的适当实现。\n\
  \n这种方法几乎没有问题。条件语句有时被认为是糟糕的\"代码坏味道\"，但对象创建在某个时刻通常需要条件判断。如果你发现代码中出现了重复的条件语句，就不应该那么乐观了。`CommsManager`类提供了通信日历数据的功能。想象一下，你使用的协议要求你提供页眉和页脚数据来界定每个日程。我可以扩展前面的例子来支持`getHeaderText()`方法：\n\
  \n```\n// listing 09.19\nclass CommsManager\n{\nconst BLOGGS = 1;\nconst MEGA =\
  \ 2;\nprivate $mode;\npublic function __construct(int $mode)\n{\n$this->mode = $mode;\n\
  }\npublic function getApptEncoder(): ApptEncoder\n{\nswitch ($this->mode) {\ncase\
  \ (self::MEGA):\nreturn new MegaApptEncoder();\ndefault:\nreturn new BloggsApptEncoder();\n\
  }\n}\npublic function getHeaderText(): string\n{\nswitch ($this->mode) {\ncase (self::MEGA):\n\
  return \"MegaCal header\\n\";\ndefault:\nreturn \"BloggsCal header\\n\";\n}\n}\n\
  }\n```\n\n如你所见，支持页眉输出的需求迫使我复制了协议条件测试。随着我添加新协议，这将变得笨重不堪，尤其是如果我还要添加`getFooterText()`方法。\n\
  \n那么，让我们总结一下目前的问题：\n\n-   在运行时之前，我不知道需要生成哪种类型的对象（`BloggsApptEncoder`或`MegaApptEncoder`）\n\
  -   我需要能够相对容易地添加新的产品类型（支持 SyncML 只是一笔新业务交易的距离！）\n-   每个产品类型都与一个需要其他定制化操作的上下文相关联（例如，`getHeaderText()`、`getFooterText()`）\n\
  \n此外，我使用了条件语句，而你已经看到，这些语句自然可以被多态取代。工厂方法模式使你能够使用继承和多态来封装具体产品的创建。换句话说，你为每个协议创建一个`CommsManager`子类，每个子类都实现`getApptEncoder()`方法。\n\
  \n### 实现\n\n工厂方法模式将创建者类与它们设计要生成的产品类分离开来。创建者是一个工厂类，它定义了一种生成产品对象的方法。如果没有提供默认实现，则由创建者的子类来执行实例化。通常，每个创建者子类实例化一个并行的产品子类。\n\
  \n我可以将`CommsManager`重新定义为抽象类。这样，我就保持了一个灵活的父类，并将所有特定于协议的代码放在具体子类中。你可以在图 9-4 中看到这种变化。\n\
  \n![A314621_5_En_9_Fig4_HTML.gif](img/A314621_5_En_9_Fig4_HTML.gif)\n\n图 9-4. 具体创建者和产品类\n\
  \n以下是一些简化的代码：\n\n```\n// listing 09.20\nabstract class ApptEncoder\n{\nabstract\
  \ public function encode(): string;\n}\n// listing 09.21\nclass BloggsApptEncoder\
  \ extends ApptEncoder\n{\npublic function encode(): string\n{\nreturn \"Appointment\
  \ data encode in BloggsCal format\\n\";\n}\n}\n// listing 09.22\nabstract class\
  \ CommsManager\n{\nabstract public function getHeaderText(): string;\nabstract public\
  \ function getApptEncoder(): ApptEncoder;\nabstract public function getFooterText():\
  \ string;\n}\n// listing 09.23\nclass BloggsCommsManager extends CommsManager\n\
  {\npublic function getHeaderText(): string\n{\nreturn \"BloggsCal header\\n\";\n\
  }\npublic function getApptEncoder(): ApptEncoder\n{\nreturn new BloggsApptEncoder();\n\
  }\npublic function getFooterText(): string\n{\nreturn \"BloggsCal footer\\n\";\n\
  }\n}\n// listing 09.24\n$mgr = new BloggsCommsManager();\nprint $mgr->getHeaderText();\n\
  print $mgr->getApptEncoder()->encode();\nprint $mgr->getFooterText();\nBloggsCal\
  \ header\nAppointment data encode in BloggsCal format\nBloggsCal footer\n```\n\n\
  因此，当我需要实现 MegaCal 时，支持它只需为我的抽象类编写一个新的实现。图 9-5 显示了 MegaCal 类。\n\n![A314621_5_En_9_Fig5_HTML.gif](img/A314621_5_En_9_Fig5_HTML.gif)\n\
  \n图 9-5. 扩展设计以支持新协议\n\n\n\n### 后果\n\n请注意，创建者类与产品层次结构是相互对应的。这是工厂方法模式的一个常见后果，一些人将其视为一种特殊的代码重复而对此并不认同。另一个问题是，该模式可能会鼓励不必要的子类化。如果你子类化一个创建者的唯一理由是部署工厂方法模式，那么你可能需要重新考虑（这就是为什么我在示例中引入了页眉和页脚的约束）。\n\
  \n我的示例中只关注了日程安排。如果我将它扩展到包含待办事项和联系人，就会面临一个新的问题。我需要一个能够一次性处理一组相关实现的结构。工厂方法模式常常与抽象工厂模式一起使用，你将在下一节中看到这一点。\n\
  \n## 抽象工厂模式\n\n在大型应用中，你可能需要能够生成相关类集合的工厂。抽象工厂模式解决了这个问题。\n\n### 问题\n\n让我们再看一下日程组织器示例。我管理着两种编码格式：`BloggsCal`\
  \ 和 `MegaCal`。我可以水平扩展这个结构，增加更多的编码格式，但我该如何垂直扩展，为不同类型的 PIM 对象添加编码器呢？事实上，我已经在朝着这个模式努力了。\n\
  \n在图 9-6 中，你可以看到我将要处理的并行族。它们是日程安排（`Appt`）、待办事项（`Ttd`）和联系人（`Contact`）。\n\n![A314621_5_En_9_Fig6_HTML.gif](img/A314621_5_En_9_Fig6_HTML.gif)\n\
  \n图 9-6. 三个产品族\n\n`BloggsCal` 类彼此之间没有继承关系（尽管它们可以实现一个通用接口），但它们在功能上是并行的。如果系统当前正在使用\
  \ `BloggsTtdEncoder`，那么它也应该使用 `BloggsContactEncoder`。\n\n为了了解如何强制实现这一点，你可以从接口开始，就像我在工厂方法模式中所做的那样（见图\
  \ 9-7）。\n\n![A314621_5_En_9_Fig7_HTML.gif](img/A314621_5_En_9_Fig7_HTML.gif)\n\n\
  图 9-7. 一个抽象创建者及其抽象产品\n\n### 实现\n\n抽象的 `CommsManager` 类定义了生成三个产品（`ApptEncoder`、`TtdEncoder`\
  \ 和 `ContactEncoder`）的接口。你需要实现一个具体的创建者，以便为特定族实际生成具体的产品。我在图 9-8 中针对 `BloggsCal` 格式说明了这一点。\n\
  \n![A314621_5_En_9_Fig8_HTML.gif](img/A314621_5_En_9_Fig8_HTML.gif)\n\n图 9-8. 添加一个具体的创建者和一些具体的产品\n\
  \n以下是 `CommsManager` 和 `BloggsCommsManager` 的代码版本：\n\n```\n// 清单 09.25\nabstract\
  \ class CommsManager\n{\nabstract public function getHeaderText(): string;\nabstract\
  \ public function getApptEncoder(): ApptEncoder;\nabstract public function getTtdEncoder():\
  \ TtdEncoder;\nabstract public function getContactEncoder(): ContactEncoder;\nabstract\
  \ public function getFooterText(): string;\n}\n// 清单 09.26\nclass BloggsCommsManager\
  \ extends CommsManager\n{\npublic function getHeaderText(): string\n{\nreturn \"\
  BloggsCal header\\n\";\n}\npublic function getApptEncoder(): ApptEncoder\n{\nreturn\
  \ new BloggsApptEncoder();\n}\npublic function getTtdEncoder(): TtdEncoder\n{\n\
  return new BloggsTtdEncoder();\n}\npublic function getContactEncoder(): ContactEncoder\n\
  {\nreturn new BloggsContactEncoder();\n}\npublic function getFooterText(): string\n\
  {\nreturn \"BloggsCal footer\\n\";\n}\n}\n```\n\n请注意，我在这个示例中使用了工厂方法模式。`getContactEncoder()`\
  \ 在 `CommsManager` 中是抽象的，并在 `BloggsCommsManager` 中被实现。设计模式通常以这种方式协同工作，一种模式创造出的上下文有利于另一种模式的应用。在图\
  \ 9-9 中，我添加了对 `MegaCal` 格式的支持。\n\n![A314621_5_En_9_Fig9_HTML.gif](img/A314621_5_En_9_Fig9_HTML.gif)\n\
  \n图 9-9. 添加具体的创建者和一些具体的产品\n\n### 后果\n\n那么，让我们看看这种模式带来了什么好处：\n\n*   首先，我将系统与实现细节解耦了。在我的示例中，我可以添加或移除任意数量的编码格式，而不会引起连锁反应。\n\
  *   我强制将系统中功能相关的元素进行分组。因此，通过使用 `BloggsCommsManager`，我保证了只会使用与 `BloggsCal` 相关的类。\n\
  *   添加新产品可能会很麻烦。我不仅需要创建新产品的具体实现，还必须修改抽象的创建者及其每一个具体实现者来支持它。\n\n抽象工厂模式的许多实现都使用了工厂方法模式。这可能是因为大多数示例都是用\
  \ Java 或 C++ 编写的。然而，PHP 不必强制为方法规定返回类型（尽管现在它可以做到了），这为我们提供了一些可以利用的灵活性。\n\n与其为每个工厂方法创建单独的方法，不如创建一个单一的\
  \ `make()` 方法，它使用一个标志参数来决定返回哪个对象：\n\n```\n// 清单 09.27\ninterface Encoder\n{\npublic\
  \ function encode(): string;\n}\n// 清单 09.28\nabstract class CommsManager\n{\nconst\
  \ APPT    = 1;\nconst TTD     = 2;\nconst CONTACT = 3;\nabstract public function\
  \ getHeaderText(): string;\nabstract public function make(int $flag_int): Encoder;\n\
  abstract public function getFooterText(): string;\n}\n// 清单 09.29\nclass BloggsCommsManager\
  \ extends CommsManager\n{\npublic function getHeaderText(): string\n{\nreturn \"\
  BloggsCal header\\n\";\n}\npublic function make(int $flag_int): Encoder\n{\nswitch\
  \ ($flag_int) {\ncase self::APPT:\nreturn new BloggsApptEncoder();\ncase self::CONTACT:\n\
  return new BloggsContactEncoder();\ncase self::TTD:\nreturn new BloggsTtdEncoder();\n\
  }\n}\npublic function getFooterText(): string\n{\nreturn \"BloggsCal footer\\n\"\
  ;\n}\n}\n```\n\n如你所见，我使得类接口更加紧凑。不过，为此我付出了相当大的代价。在使用工厂方法时，我定义了一个清晰的接口，并强制所有具体的工厂对象都遵守它。而在使用单一的\
  \ `make()` 方法时，我必须记住在所有具体的创建者中支持所有产品对象。我同时还引入了并行的条件判断，因为每个具体的创建者都必须实现相同的标志测试。客户端类无法确定具体的创建者是否生成了所有产品，因为\
  \ `make()` 的内部实现在每种情况下都是可选择的。\n\n另一方面，我可以构建更灵活的创建者。基类创建者可以提供一个 `make()` 方法，保证每个产品族都有一个默认的实现。具体的子类可以有选择地修改这种行为。具体的创建者类可以在提供自己的实现之后，再调用默认的\
  \ `make()` 方法。\n\n你将在下一节看到抽象工厂模式的另一种变体。\n\n### 原型模式\n\n并行继承层次结构的出现可能是工厂方法模式的一个问题。这是一种让某些程序员感到不适的耦合。每次你添加一个产品族，都不得不创建一个关联的具体创建者（例如，`BloggsCal`\
  \ 编码器由 `BloggsCommsManager` 匹配）。在一个增长迅速、包含众多产品的系统中，维护这种关系很快就会变得令人厌烦。\n\n避免这种依赖关系的一种方法是使用\
  \ PHP 的 `clone` 关键字来复制现有的具体产品。这样，具体产品类本身就成为了它们自己生成的基础。这就是原型模式。它允许你用组合替代继承。这反过来又促进了运行时灵活性，并减少了你必须创建的类的数量。\n\
  \n\n\n### 问题\n\n想象一下，一款类似《文明》风格的网页游戏，其中的单位在由方块组成的网格上行动。每个方块可以代表海洋、平原或森林。地形类型会限制占据该方块单位的移动和战斗能力。你可能会有一个\
  \ `TerrainFactory` 对象，用于提供 `Sea`、`Forest` 和 `Plains` 对象。你决定允许用户在不同环境间进行选择，因此 `Sea`\
  \ 对象是一个抽象超类，由 `MarsSea` 和 `EarthSea` 实现。`Forest` 和 `Plains` 对象也以类似方式实现。这里的逻辑关系很自然地导向了抽象工厂模式。你拥有不同的产品层级结构（`Sea`、`Plains`、`Forests`），并且存在跨越继承关系的强大家族关联（`Earth`、`Mars`）。图\
  \ 9-10 展示了一个类图，说明了如何应用抽象工厂模式和工厂方法模式来操作这些产品。\n\n![A314621_5_En_9_Fig10_HTML.gif](img/A314621_5_En_9_Fig10_HTML.gif)\n\
  \n图 9-10. 使用抽象工厂方法处理地形\n\n如你所见，我依靠继承来对工厂将要生成的产品进行地形族群分组。这是一个可行的方案，但它需要庞大的继承层级结构，并且相对缺乏灵活性。当你不想使用平行的继承层级，且需要最大化运行时灵活性时，可以在抽象工厂模式的基础上使用原型模式进行强大的变体应用。\n\
  \n### 实现\n\n当你使用抽象工厂/工厂方法模式时，必须在某个时间点决定使用哪个具体创建者，可能需要通过检查某种偏好标志来实现。既然无论如何都必须这么做，为什么不直接创建一个存储具体产品的工厂类，并在初始化时填充这些产品呢？这样你可以减少几个类，并且正如你将看到的，还能获得其他好处。以下是一些在工厂中使用原型模式的简单代码：\n\
  \n```\nclass Sea\n{\n}\nclass EarthSea extends Sea\n{\n}\nclass MarsSea extends\
  \ Sea\n{\n}\nclass Plains\n{\n}\nclass EarthPlains extends Plains\n{\n}\nclass MarsPlains\
  \ extends Plains\n{\n}\nclass Forest\n{\n}\nclass EarthForest extends Forest\n{\n\
  }\nclass MarsForest extends Forest\n{\n}\n```\n\n```\nclass TerrainFactory\n{\n\
  \    private $sea;\n    private $forest;\n    private $plains;\n    public function\
  \ __construct(Sea $sea, Plains $plains, Forest $forest)\n    {\n        $this->sea\
  \ = $sea;\n        $this->plains = $plains;\n        $this->forest = $forest;\n\
  \    }\n    public function getSea(): Sea\n    {\n        return clone $this->sea;\n\
  \    }\n    public function getPlains(): Plains\n    {\n        return clone $this->plains;\n\
  \    }\n    public function getForest(): Forest\n    {\n        return clone $this->forest;\n\
  \    }\n}\n```\n\n```\n$factory = new TerrainFactory(\n    new EarthSea(),\n   \
  \ new EarthPlains(),\n    new EarthForest()\n);\nprint_r($factory->getSea());\n\
  print_r($factory->getPlains());\nprint_r($factory->getForest());\n```\n\n```\npopp\\\
  ch09\\batch11\\EarthSea Object\n(\n)\npopp\\ch09\\batch11\\EarthPlains Object\n\
  (\n)\npopp\\ch09\\batch11\\EarthForest Object\n(\n)\n```\n\n如你所见，我向一个具体的 `TerrainFactory`\
  \ 对象中加载了产品对象的实例。当客户端调用 `getSea()` 时，我返回的是初始化时缓存的那个 `Sea` 对象的克隆。这种结构带来了额外的灵活性。想在一个新星球上玩游戏，这个星球有类似地球的海洋和森林，但平原像火星？无需编写新的创建者类——只需更改添加到\
  \ `TerrainFactory` 的类组合即可：\n\n```\n$factory = new TerrainFactory(\n    new EarthSea(),\n\
  \    new MarsPlains(),\n    new EarthForest()\n);\n```\n\n因此，原型模式让你能够利用组合带来的灵活性。但我们得到的还不止这些。因为你在运行时存储和克隆对象，所以在生成新产品时，你会复制对象的状态。想象一下，`Sea`\
  \ 对象有一个 `$navigability` 属性。该属性影响海洋方块从船只中消耗的移动能量，并且可以调整以改变游戏的难度级别：\n\n```\nclass\
  \ Sea\n{\n    private $navigability = 0;\n    public function __construct(int $navigability)\n\
  \    {\n        $this->navigability = $navigability;\n    }\n}\n```\n\n现在，当我初始化\
  \ `TerrainFactory` 对象时，我可以添加一个带有可航行性修饰符的 `Sea` 对象。随后，这个修饰符将对 `TerrainFactory` 提供的所有\
  \ `Sea` 对象生效：\n\n```\n$factory = new TerrainFactory(\n    new EarthSea(-1),\n  \
  \  new EarthPlains(),\n    new EarthForest()\n);\n```\n\n当你想要生成的对象由其他对象组成时，这种灵活性也显而易见。\n\
  \n注意\n\n我在第 4 章中介绍了对象克隆。`clone` 关键字会生成它所应用对象的浅拷贝。这意味着产品对象将拥有与源对象相同的属性。如果源对象的任何属性是对象，那么这些属性将不会被复制到产品中。相反，产品将引用相同的对象属性。你需要通过实现一个\
  \ `__clone()` 方法来更改此默认行为，并以任何其他方式自定义对象复制。当使用 `clone` 关键字时，该方法会被自动调用。\n\n也许所有 `Sea`\
  \ 对象都可以包含 `Resource` 对象（`FishResource`, `OilResource` 等）。根据某个偏好标志，我们可能默认给所有 `Sea`\
  \ 对象一个 `FishResource`。请记住，如果你的产品引用了其他对象，你应该实现一个 `__clone()` 方法来确保进行深拷贝：\n\n```\n\
  class Contained\n{\n}\nclass Container\n{\n    public $contained;\n    function\
  \ __construct()\n    {\n        $this->contained = new Contained();\n    }\n   \
  \ function __clone()\n    {\n        // 确保克隆后的对象持有的是\n        // self::$contained\
  \ 的克隆，而不是\n        // 对它的引用\n        $this->contained = clone $this->contained;\n\
  \    }\n}\n```\n\n\n\n## 推向极致：服务定位器\n\n我承诺本章将处理对象创建的逻辑，摒弃许多面向对象示例中那种偷偷摸摸的推诿责任。然而，这里的一些模式巧妙地避开了对象创建中决策的部分，即便没有避开创建本身。\n\
  \n`单例`模式是无辜的。对象创建的逻辑是内置且明确的。`抽象工厂`模式将产品族的创建分组到不同的具体创建者中。但我们如何决定使用哪个具体创建者呢？`原型`模式向我们提出了类似的问题。这两种模式都处理对象的创建，但它们推迟了应该创建哪个对象或哪组对象的决策。\n\
  \n系统选择的特定具体创建者通常根据某种配置开关的值来决定。这可能位于数据库、配置文件或服务器文件（如 Apache 的目录级配置文件，通常称为`.htaccess`）中，甚至可能硬编码为\
  \ PHP 变量或属性。由于 PHP 应用程序必须为每个请求重新配置，你需要脚本初始化尽可能无痛。因此，我经常选择在 PHP 代码中硬编码配置标志。这可以手动完成，也可以通过编写自动生成类文件的脚本来完成。下面是一个包含日历协议类型标志的简单类：\n\
  \n```\n// listing 09.35\nclass Settings\n{\nstatic $COMMSTYPE = 'Bloggs';\n}\n```\n\
  \n现在有了一个标志（尽管不优雅），我可以创建一个使用它来决定在请求时提供哪个`CommsManager`的类。通常会看到`单例`与`抽象工厂`模式结合使用，所以让我们这样做：\n\
  \n```\n// listing 09.36\nclass AppConfig\n{\nprivate static $instance;\nprivate\
  \ $commsManager;\nprivate function __construct()\n{\n// 只会运行一次\n$this->init();\n\
  }\nprivate function init()\n{\nswitch (Settings::$COMMSTYPE) {\ncase 'Mega':\n$this->commsManager\
  \ = new MegaCommsManager();\nbreak;\ndefault:\n$this->commsManager = new BloggsCommsManager();\n\
  }\n}\npublic static function getInstance(): AppConfig\n{\nif (empty(self::$instance))\
  \ {\nself::$instance = new self();\n}\nreturn self::$instance;\n}\npublic function\
  \ getCommsManager(): CommsManager\n{\nreturn $this->commsManager;\n}\n}\n```\n\n\
  `AppConfig`类是一个标准的`单例`。因此，我可以在系统的任何地方获取一个`AppConfig`实例，并且始终会得到同一个实例。`init()`方法由类的构造函数调用，因此在进程中只运行一次。它测试`Settings::$COMMSTYPE`属性，并根据其值实例化一个具体的`CommsManager`对象。现在我的脚本可以获取一个`CommsManager`对象并与之协作，无需了解其具体实现或它生成的具体类：\n\
  \n```\n$commsMgr = AppConfig::getInstance()->getCommsManager();\n$commsMgr->getApptEncoder()->encode();\n\
  ```\n\n因为`AppConfig`为我们管理了查找和创建组件的工作，它是所谓服务定位器模式的一个实例。这很简洁（我们将在第 12 章更详细地再次看到它），但它确实引入了一种比直接实例化更良性的依赖关系。任何使用其服务的类都必须显式调用这个大型对象，从而将它们绑定到更广泛的系统。因此，有些人更喜欢另一种方法。\n\
  \n## 辉煌的隔离：依赖注入\n\n在上一节中，我使用了一个工厂内的标志和条件语句来决定提供两个`CommsManager`类中的哪一个。这个解决方案并不像它本可以的那样灵活。可提供的类被硬编码在一个单一的定位器中，通过条件语句内置了两个组件的选择。不过，这种不灵活是我演示代码的一个方面，而不是服务定位器本身的问题。我可以使用任意数量的策略来为客户端代码定位、实例化和返回对象。然而，服务定位器经常受到质疑的真正原因是，组件必须显式调用定位器。这感觉有点全局化。而面向对象开发者有理由对所有全局的东西持怀疑态度。\n\
  \n### 问题\n\n每当你使用`new`操作符时，你就在该范围内关闭了多态的可能性。想象一个方法，它部署了一个硬编码的`BloggsApptEncoder`对象，例如：\n\
  \n```\n// listing 09.37\nclass AppointmentMaker\n{\npublic function makeAppointment()\n\
  {\n$encoder = new BloggsApptEncoder();\nreturn $encoder->encode();\n}\n}\n```\n\n\
  这也许能满足我们初始的需求，但它不允许任何其他`ApptEncoder`实现在运行时被切换进来。这限制了该类可以被使用的方式，并且使得该类更难测试。本章大部分内容正是针对这种不灵活性。但正如我在上一节中指出的，我忽略了一个事实：即使我们使用`原型`或`抽象工厂`模式，实例化也必须在某个地方发生。这里又是一个创建`原型`对象的代码片段：\n\
  \n```\n// listing 09.32\n$factory = new TerrainFactory(\nnew EarthSea(),\nnew EarthPlains(),\n\
  new EarthForest()\n);\n```\n\n这里调用的`原型` `TerrainFactory`类朝着正确的方向迈出了一步——它需要通用类型：`Sea`、`Plains`和`Forest`。该类将决定提供哪些实现的责任留给了客户端代码。但这要如何实现呢？\n\
  \n\n\n### 实现\n\n我们的许多代码都调用了工厂类。正如我们所见，这种模式被称为**服务定位器**模式。一个方法将责任委托给它所信任的提供者，由该提供者查找并提供所需类型的实例。而\
  \ Prototype（原型）示例则反转了这种模式：它只是期望实例化代码在调用时提供具体的实现。这里并没有什么神奇之处——它仅仅是要求构造函数的签名中包含类型参数，而不是在方法内部直接创建它们。另一种变体是提供\
  \ setter 方法，以便客户端可以在调用使用这些对象的方法之前，将它们传入。\n\n因此，让我们按照这种方式来修改 `AppointmentMaker`：\n\
  \n```\n// 清单 09.38\nclass AppointmentMaker2\n{\nprivate $encoder;\npublic function\
  \ __construct(ApptEncoder $encoder) {\n$this->encoder = $encoder;\n}\npublic function\
  \ makeAppointment()\n{\nreturn $this->encoder->encode();\n}\n}\n```\n\n`AppointmentMaker2`\
  \ 已经放弃了控制权——它不再创建 `BloggsApptEncoder`，而我们则获得了灵活性。但是，实际创建对象的逻辑呢？那些令人畏惧的 `new` 语句又该放在哪里？我们需要一个装配器组件来承担这项工作。通常，这种方法会使用一个配置文件来确定应该实例化哪些实现。有一些工具可以帮助我们完成这项工作，但本书的核心精神是“自己动手做”，所以让我们构建一个非常简单的实现。我将从一个粗粒度的\
  \ XML 格式开始，它描述了系统中类之间的关系，以及应该传递给它们构造函数的具体类型：\n\n在本章中，我描述了两个类：`TerrainFactory` 和\
  \ `AppointmentMaker2`。我希望 `TerrainFactory` 能够通过一个 `EarthSea` 对象、一个 `MarsPlains`\
  \ 对象和一个 `EarthForest` 对象来实例化。同时，我也希望 `AppointmentMaker2` 能够接收一个 `BloggsApptEncoder`\
  \ 对象。\n\n下面是一个极其简单的装配器类，它读取这个配置数据，并按需实例化对象：\n\n```\n// 清单 09.39\nclass ObjectAssembler\n\
  {\nprivate $components = [];\npublic function __construct(string $conf)\n{\n$this->configure($conf);\n\
  }\nprivate function configure(string $conf)\n{\n$data = simplexml:load_file($conf);\n\
  foreach ($data->class as $class) {\n$args = [];\n$name = (string)$class['name'];\n\
  foreach ($class->arg as $arg) {\n$argclass = (string)$arg['inst'];\n$args[(int)$arg['num']]\
  \ = $argclass;\n}\nksort($args);\n$this->components[$name] = function () use ($name,\
  \ $args) {\n$expandedargs = [];\nforeach ($args as $arg) {\n$expandedargs[] = new\
  \ $arg();\n}\n$rclass = new \\ReflectionClass($name);\nreturn $rclass->newInstanceArgs($expandedargs);\n\
  };\n}\n}\npublic function getComponent(string $class)\n{\nif (! isset($this->components[$class]))\
  \ {\nthrow new \\Exception(\"unknown component '$class'\");\n}\n$ret = $this->components[$class]();\n\
  return $ret;\n}\n}\n```\n\n这段代码相当简陋，初次阅读时可能会觉得有点难懂，所以让我们简要地梳理一下。大部分实际工作发生在 `configure()`\
  \ 方法中。该方法接收一个路径，该路径由构造函数传递而来。它使用 `simplexml` 扩展来解析配置 XML。当然，在实际项目中，我们会在此处以及整个代码中添加更多的错误处理。目前，我对正在解析的\
  \ XML 相当信任。对于每个 `<class>` 元素，我提取出完全限定的类名，并将其存储在 `$name` 变量中。然后，我获取所有 `<arg>` 子元素，这些子元素都拥有自己的类名。我将这些参数存储在一个名为\
  \ `$args` 的数组中，并根据 XML 的 `num` 参数进行排序。我将所有这些打包到一个匿名函数中，并将其存储在 `$components` 属性中。这个函数负责实例化所请求的类及其所有必需的对象，并且仅在调用\
  \ `getComponent()` 并传入正确的类名时才会被调用。通过这种方式，`ObjectAssembler` 可以保持非常小的内存占用。注意这里使用了闭包。得益于\
  \ `use` 关键字，这个匿名函数可以访问在其创建作用域中声明的 `$name` 和 `$args` 变量。\n\n当然，这确实只是玩具代码。除了改进的错误检查之外，一个健壮的实现还需要处理这样一种可能性：即要注入到组件中的对象本身也可能需要参数。我们可能还需要解决与缓存相关的问题。例如，每次调用都应实例化一个新对象，还是只实例化一次？\n\
  \n**注意**\n\n如果你正在考虑构建一个依赖注入装配器/容器，你应该看看几个可选方案：Pimple（尽管它的名字不太讨喜）和 Symfony DI。你可以在\
  \ [`http://pimple.sensiolabs.org/`](http://pimple.sensiolabs.org/) 上找到关于 Pimple\
  \ 的更多信息；你可以在 [`http://symfony.com/doc/current/components/dependency_injection/introduction.html`](http://symfony.com/doc/current/components/dependency_injection/introduction.html)\
  \ 上了解更多关于 Symfony DI 组件的信息。\n\n尽管如此，我们现在可以保持组件的灵活性，并动态处理实例化。让我们来试一下 `ObjectAssembler`：\n\
  \n```\n// 清单 09.40\n$assembler = new ObjectAssembler(\"src/ch09/batch14/objects.xml\"\
  );\n$apptmaker = $assembler->getComponent(\"\\\\popp\\\\ch09\\\\batch14\\\\AppointmentMaker2\"\
  );\n$out = $apptmaker->makeAppointment();\nprint $out;\n```\n\n一旦我们有了一个 `ObjectAssembler`，获取对象就只需要一条语句。`AppointmentMaker2`\
  \ 类摆脱了之前对 `ApptEncoder` 实例的硬编码依赖。开发人员现在可以使用配置文件来控制运行时使用哪些类，并且在脱离更大系统的情况下独立测试 `AppointmentMaker2`。\n\
  \n\n\n### 后果\n\n至此，我们已经看到了两种创建对象的方式。`AppConfig` 类是服务定位器的一个实例（即，一个能够代表其客户端查找组件或服务的类）。使用依赖注入无疑能使客户端代码更加优雅。`AppointmentMaker2`\
  \ 类完全无需关心对象创建的策略，它只专注于完成自己的本职工作。这当然是类的理想状态。我们希望设计的类能专注于自身职责，尽可能与更广泛的系统隔离。然而，这种纯粹性是有代价的。对象装配器组件隐藏了大量“魔法”。我们必须把它视为一个黑盒，并相信它能为我们凭空创建出对象。只要魔法有效，这倒也无妨。但一旦出现意外行为，调试起来就会非常困难。\n\
  \n相比之下，服务定位器模式更简单，尽管它会把你的组件嵌入到一个更广泛的系统中。如果使用得当，服务定位器并不会让测试变得更困难，也不会使系统变得僵化。可以配置一个服务定位器，使其提供任意组件用于测试或根据配置运行。但是，对服务定位器的硬编码调用会使组件依赖于它。由于调用发生在方法体内部，客户端与目标组件（由服务定位器提供）之间的关系也变得有些模糊。这种关系在依赖注入的例子中是显式的，因为它声明在构造方法的签名中。\n\
  \n那么，我们应该选择哪种方式呢？在某种程度上，这取决于个人偏好。就我个人而言，我倾向于从最简单的解决方案开始，然后根据需要重构为更复杂的方案。因此，我通常选择服务定位器。我可以用几行代码创建一个注册表类，然后根据需求提高它的灵活性。我的组件会比我希望的知道得更多一些，但由于我很少将类从一个系统移至另一个系统，所以并没有因这种“嵌入效应”而遭受太多困扰。当我确实需要将一个基于系统的类移入独立的库时，我发现移除对服务定位器的依赖进行重构也并非特别困难。\n\
  \n依赖注入提供了纯粹性，但它需要另一种形式的“嵌入”。你必须接受装配器的“魔法”。如果你已经在一个提供此功能的框架内工作，那么没有理由不利用它。例如，Symfony\
  \ 的 `DependencyInjection` 组件就提供了服务定位器（称为“服务容器”）和依赖注入的混合解决方案。服务容器根据配置（或代码，如果你愿意）管理对象的实例化，并为客户端提供一个简单的接口来获取这些对象。服务容器甚至允许使用工厂来创建对象。另一方面，如果你是自己搭建框架，或者使用来自不同框架的组件，你可能会希望保持简单，牺牲一些优雅性。\n\
  \n## 总结\n\n本章涵盖了可用于生成对象的一些技巧。我首先研究了单例模式，它提供对单个实例的全局访问。接着，我探讨了工厂方法模式，该模式将多态性原则应用于对象生成。我将工厂方法与抽象工厂模式结合，以创建能够实例化一组相关对象的创建者类。我还研究了原型模式，并了解了对象克隆如何允许在对象生成中使用组合。最后，我探讨了两种对象创建策略：服务定位器和依赖注入。\n\
  \n"
- "# 10. 灵活对象编程的模式\n\n在介绍了生成对象的策略之后，我们现在可以自由地探讨一些用于组织类和对象的策略。我将特别关注一个原则：组合比继承能提供更大的灵活性。本章讨论的模式同样源自“四人组”的经典目录。\n\
  \n本章将涵盖三个模式：\n\n*   组合模式：组合结构，使得一组对象可以像单个对象一样被使用。\n*   装饰器模式：一种灵活的机制，可以在运行时组合对象以扩展功能。\n\
  *   外观模式：为复杂或多变的系统创建简单的接口。\n\n## 组织类以实现灵活的对象\n\n早在第 4 章，我曾说过初学者经常混淆对象和类。这其实只说对了一半。事实上，我们中大多数人也偶尔会在\
  \ UML 类图前挠头，试图调和图中展示的静态继承结构与对象之间在“图表之外”将要形成的动态关系。\n\n还记得模式原则“优先使用组合而非继承”吗？这个原则提炼了类与对象组织方式之间的张力。为了在我们的项目中构建灵活性，我们如此组织类，使得它们的对象可以在运行时通过组合形成有用的结构。\n\
  \n这是贯穿本章前两个模式的一个共同主题。继承在这两个模式中都很重要，但其重要性部分在于它提供了一种机制，通过这种机制，组合可以用来表示结构和扩展功能。\n\n\
  ## 组合模式\n\n组合模式也许是利用继承来服务于组合的最极端的例子。它既简单又令人惊叹地优雅，而且极其有用。但需要提醒的是：它太完美了，你可能会忍不住过度使用这个策略。\n\
  \n组合模式是一种聚合并管理一组相似对象的简单方法，使得单个对象和对象集合对客户端来说是无法区分的。实际上，这个模式非常简单，但也常常让人感到困惑。原因之一在于模式中类的结构与其对象的组织结构之间的相似性。继承层次结构是树状的，从根节点的超类开始，分支成专门化的子类。组合模式所奠定的类继承树，旨在方便地生成和遍历对象树。\n\
  \n如果你还不熟悉这个模式，现在感到困惑是完全正常的。让我们用一个类比来说明，单个实体如何能与事物集合以相同的方式被对待。给定大致上不可再分的原料，比如谷物和肉类（或者大豆，如果你喜欢），我们可以制作一种食品——例如，香肠。然后我们将结果作为一个单一实体来对待。就像我们吃、烹饪、购买或出售肉类一样，我们也可以吃、烹饪、购买或出售由肉类部分组成的香肠。我们可以把香肠和其他复合配料组合成一个馅饼，从而将一个复合体融入一个更大的复合体中。我们对集合的行为方式与对其组成部分的行为方式相同。组合模式帮助我们代码中模拟这种集合与组件之间的关系。\n\
  \n\n\n### 问题\n\n管理对象组可能是一项相当复杂的任务，尤其是当这些对象本身还可能包含自己的子对象时。这类问题在编码中非常常见。想想发票，其中包含汇总了额外产品或服务的明细项，或者待办事项列表，其中的项目本身又包含多个子任务。在内容管理中，我们离不开由章节、页面、文章或媒体组件构成的树状结构。从外部管理这些结构很快就会变得令人望而生畏。\n\
  \n让我们回到之前的一个场景。我正在设计一个基于名为《文明》的游戏系统。玩家可以在构成地图的数百个方格上移动单位。单个棋子可以组合成一个群体，进行移动、战斗和防御。这里我定义了几种单位类型：\n\
  \n```\n// 代码清单 10.01\nabstract class Unit\n{\nabstract public function bombardStrength():\
  \ int;\n}\nclass Archer extends Unit\n{\npublic function bombardStrength(): int\n\
  {\nreturn 4;\n}\n}\nclass LaserCannonUnit extends Unit\n{\npublic function bombardStrength():\
  \ int\n{\nreturn 44;\n}\n}\n```\n\n`Unit` 类定义了一个抽象方法 `bombardStrength()`，用于设置单位轰击相邻方格的攻击强度。我在\
  \ `Archer` 和 `LaserCannonUnit` 类中都实现了该方法。这些类还会包含关于移动和防御能力的信息，不过我会保持简单。我可以定义一个单独的类来将单位组合在一起，就像这样：\n\
  \n```\n// 代码清单 10.02\nclass Army\n{\nprivate $units = [];\npublic function addUnit(Unit\
  \ $unit)\n{\narray_push($this->units, $unit);\n}\npublic function bombardStrength():\
  \ int\n{\n$ret = 0;\nforeach ($this->units as $unit) {\n$ret += $unit->bombardStrength();\n\
  }\nreturn $ret;\n}\n}\n// 代码清单 10.03\n$unit1 = new Archer();\n$unit2 = new LaserCannonUnit();\n\
  $army = new Army();\n$army->addUnit($unit1);\n$army->addUnit($unit2);\nprint $army->bombardStrength();\n\
  ```\n\n`Army` 类有一个 `addUnit()` 方法，该方法接受一个 `Unit` 对象。`Unit` 对象被存储在一个名为 `$units` 的数组属性中。我在\
  \ `bombardStrength()` 方法中计算军队的总攻击强度。该方法只是遍历所有聚合的 `Unit` 对象，并调用每个对象的 `bombardStrength()`\
  \ 方法。\n\n只要问题保持这么简单，这个模型就是完全可以接受的。但如果我要添加一些新的需求呢？假设一个军队应该能够与其他军队合并。每个军队应该保留其自身的标识，以便日后能够从整体中分离出来。大公的英勇部队今天可能与索姆斯将军对敌人暴露侧翼的进攻有共同的目标，但一场国内叛乱随时可能让他的军队匆忙班师回朝。出于这个原因，我不能简单地将每个军队的单位都倒入一个新的部队中。\n\
  \n我可以修改 `Army` 类，使其除了接受 `Unit` 对象外，也接受 `Army` 对象：\n\n```\n// 代码清单 10.04\npublic\
  \ function addArmy(Army $army)\n{\narray_push($this->armies, $army);\n}\n```\n\n\
  然后我需要修改 `bombardStrength()` 方法，使其同时遍历所有军队和单位：\n\n```\n// 代码清单 10.05\npublic function\
  \ bombardStrength(): int\n{\n$ret = 0;\nforeach ($this->units as $unit) {\n$ret\
  \ += $unit->bombardStrength();\n}\nforeach ($this->armies as $army) {\n$ret += $army->bombardStrength();\n\
  }\nreturn $ret;\n}\n```\n\n目前这种额外的复杂性还不算太成问题。但请记住，我需要在诸如 `defensiveStrength()`、`movementRange()`\
  \ 等方法中也做类似的事情。我的游戏将功能丰富。业务部门已经在要求一种能容纳最多十个单位的运兵车，以提升它们在某些地形上的移动范围。显然，运兵车与军队类似，因为它也包含单位。它也有自己的特性。我可以进一步修改\
  \ `Army` 类来处理 `TroopCarrier` 对象，但我知道未来还会有更多单位组合的需求。很明显，我需要一个更灵活的模型。\n\n让我们重新审视一下我一直在构建的模型。我创建的所有类都有一个共同需求：`bombardStrength()`\
  \ 方法。实际上，客户端不需要区分军队、单位或运兵车。它们在功能上是相同的。它们都需要移动、攻击和防御。那些包含其他对象的对象需要提供添加和移除它们的方法。这些相似之处引导我们得出一个不可避免的结论：由于容器对象与其所包含的对象共享接口，它们自然适合归属于同一个类型家族。\n\
  \n\n\n### 实现\n\n组合模式定义了一个单一的继承层次结构，其中包含两组截然不同的职责。我们已经在示例中看到了这两者。模式中的类必须将支持一组通用操作作为其主要职责。对我们来说，这意味着\
  \ `bombardStrength()` 方法。类还必须支持用于添加和移除子对象的方法。\n\n图 10-1 展示了一个类图，说明了应用于我们问题的组合模式。\n\
  \n![A314621_5_En_10_Fig1_HTML.gif](img/A314621_5_En_10_Fig1_HTML.gif)\n\n**图 10-1.**\
  \ 组合模式\n\n正如你所见，该模型中的所有单元都继承自 `Unit` 类。因此，客户端可以确信，任何 `Unit` 对象都会支持 `bombardStrength()`\
  \ 方法。所以，一个 `Army` 对象可以像对待一个 `Archer` 对象一样被处理。\n\n`Army` 和 `TroopCarrier` 类是组合体：它们被设计用来容纳\
  \ `Unit` 对象。`Archer` 和 `LaserCannon` 类是叶子节点，设计用于支持单元操作，但不包含其他 `Unit` 对象。实际上，关于叶子节点是否应该像组合体一样遵循相同的接口（就像图\
  \ 10-1 中那样）存在一个问题。图中展示了 `TroopCarrier` 和 `Army` 聚合其他单元，尽管叶子类也被约束要实现 `addUnit()`。我稍后将回到这个问题。以下是抽象的\
  \ `Unit` 类：\n\n```\n// listing 10.06\nabstract class Unit\n{\nabstract public function\
  \ addUnit(Unit $unit);\nabstract public function removeUnit(Unit $unit);\nabstract\
  \ public function bombardStrength(): int;\n}\n```\n\n如你所见，我在此为基础功能定义了所有 `Unit` 对象。现在，让我们看看一个组合对象如何实现这些抽象方法：\n\
  \n```\n// listing 10.07\nclass Army extends Unit\n{\nprivate $units = [];\npublic\
  \ function addUnit(Unit $unit)\n{\nif (in_array($unit, $this->units, true)) {\n\
  return;\n}\n$this->units[] = $unit;\n}\npublic function removeUnit(Unit $unit)\n\
  {\n$idx = array_search($unit, $this->units, true);\nif (is_int($idx)) {\narray_splice($this->units,\
  \ $idx, 1, []);\n}\n}\npublic function bombardStrength(): int\n{\n$ret = 0;\nforeach\
  \ ($this->units as $unit) {\n$ret += $unit->bombardStrength();\n}\nreturn $ret;\n\
  }\n}\n```\n\n`addUnit()` 方法在将同一个 `Unit` 对象存储到私有属性 `$units` 数组之前，会检查是否已经添加过它。`removeUnit()`\
  \ 使用类似的检查来从该属性中移除给定的 `Unit` 对象。\n\n因此，`Army` 对象可以存储任何类型的 `Unit` 对象，包括其他 `Army` 对象，或者像\
  \ `Archer` 或 `LaserCannonUnit` 这样的叶子节点。因为所有单元都保证支持 `bombardStrength()` 方法，所以我们的\
  \ `Army::bombardStrength()` 方法简单地遍历所有存储在 `$units` 属性中的子 `Unit` 对象，并在每个对象上调用相同的方法。\n\
  \n组合模式的一个问题是添加和移除功能的实现。经典模式将 `add()` 和 `remove()` 方法放在抽象超类中。这确保了模式中的所有类共享一个公共接口。然而，正如你在此所见，这也意味着叶子类必须提供实现：\n\
  \n```\n// listing 10.08\nclass UnitException extends \\Exception\n{\n}\n// listing\
  \ 10.09\nclass Archer extends Unit\n{\npublic function addUnit(Unit $unit)\n{\n\
  throw new UnitException(get_class($this) . \" is a leaf\");\n}\npublic function\
  \ removeUnit(Unit $unit)\n{\nthrow new UnitException(get_class($this) . \" is a\
  \ leaf\");\n}\npublic function bombardStrength(): int\n{\nreturn 4;\n}\n}\n```\n\
  \n我不想让 `Archer` 对象有可能添加一个 `Unit` 对象，所以如果调用了 `addUnit()` 或 `removeUnit()` 方法，我会抛出异常。我需要为所有叶子对象都这样做，因此或许可以通过在\
  \ `Unit` 中用像前面示例那样的默认实现来替换抽象的 `addUnit()/removeUnit()` 方法，从而改进我的设计：\n\n```\n// listing\
  \ 10.10\nabstract class Unit\n{\npublic function addUnit(Unit $unit)\n{\nthrow new\
  \ UnitException(get_class($this) . \" is a leaf\");\n}\npublic function removeUnit(Unit\
  \ $unit)\n{\nthrow new UnitException(get_class($this) . \" is a leaf\");\n}\nabstract\
  \ public function bombardStrength(): int;\n}\n// listing 10.11\nclass Archer extends\
  \ Unit\n{\npublic function bombardStrength(): int\n{\nreturn 4;\n}\n}\n```\n\n这消除了叶子类中的重复代码，但缺点是，在编译时，组合体不会被强制要求提供\
  \ `addUnit()` 和 `removeUnit()` 的实现，这可能会在后续引发问题。\n\n我将在下一节更详细地探讨组合模式带来的一些问题。在结束本节之前，我们来审视一下它的一些优点：\n\
  \n*   **灵活性**：因为组合模式中的所有内容都共享一个公共超类型，所以非常容易在设计添加新的组合体或叶子节点对象，而无需更改程序的更广泛上下文。\n*\
  \   **简单性**：使用组合结构的客户端拥有一个直接的接口。客户端无需区分由其他对象组成的对象和叶子节点对象（除了添加新组件时）。对 `Army::bombardStrength()`\
  \ 的调用可能会在幕后引发一连串的委托调用；但对于客户端来说，这个过程和结果与调用 `Archer::bombardStrength()` 所关联的过程和结果完全相同。\n\
  *   **隐式影响范围**：组合模式中的对象被组织成一棵树。每个组合体都持有对其子对象的引用。因此，对树特定部分的操作可能会产生广泛的影响。我们可能将一个 `Army`\
  \ 对象从其父 `Army` 中移除，并添加到另一个 `Army` 中。这个简单的操作作用于一个对象，但它会改变该 `Army` 对象所引用的 `Unit` 对象及其自身子对象的状态。\n\
  *   **显式影响范围**：树结构易于遍历。可以对它们进行迭代以获取信息或执行转换。我们将在下一章讨论访问者模式时研究一个特别强大的技术。\n\n通常，你只有从客户端的角度才能真正看到模式的好处，所以这里有几个军队的例子：\n\
  \n```\n// listing 10.12\n// create an army\n$main_army = new Army();\n// add some\
  \ units\n$main_army->addUnit(new Archer());\n$main_army->addUnit(new LaserCannonUnit());\n\
  // create a new army\n$sub_army = new Army();\n// add some units\n$sub_army->addUnit(new\
  \ Archer());\n$sub_army->addUnit(new Archer());\n$sub_army->addUnit(new Archer());\n\
  // add the second army to the first\n$main_army->addUnit($sub_army);\n// all the\
  \ calculations handled behind the scenes\nprint \"attacking with strength: {$main_army->bombardStrength()}\\\
  n\";\n```\n\n我创建了一个新的 `Army` 对象，并添加了一些原始的 `Unit` 对象。我对第二个 `Army` 对象重复了同样的过程，然后将其添加到第一个\
  \ `Army` 对象中。当我在第一个 `Army` 对象上调用 `Unit::bombardStrength()` 时，我所构建的结构的全部复杂性都被完全隐藏起来了。\n\
  \n\n\n### 后果\n\n如果你和我一样，在看到 `Archer` 类的代码片段时，心里应该已经敲响了警钟。为什么我们非得在那些根本不需要支持 `addUnit()`\
  \ 和 `removeUnit()` 方法的叶子类中保留这些冗余的方法呢？答案在于 `Unit` 类型透明性。\n\n如果客户端接收到一个 `Unit` 对象，它会知道\
  \ `addUnit()` 方法肯定存在。组合模式的原则——原始（叶子）类与组合类拥有相同的接口——得到了贯彻。但这实际上帮不了你太多，因为你仍然不知道对遇到的任何一个\
  \ `Unit` 对象调用 `addUnit()` 方法是否安全。\n\n如果我将这些 add/remove 方法下移到仅适用于组合类的地方，那么当将 `Unit`\
  \ 对象传递给某个方法时，就会面临一个问题：我默认不知道它是否支持 `addUnit()`。尽管如此，在叶子类中留下这些“陷阱”方法让我感到很不舒服。这没有增加任何价值，反而混淆了系统的设计，因为接口实际上虚报了自身的功能。\n\
  \n将组合类拆分到它们自己的 `CompositeUnit` 子类型中很容易实现。首先，我从 `Unit` 中移除 add/remove 行为：\n\n```\n\
  // 清单 10.13\nabstract class Unit\n{\npublic function getComposite()\n{\nreturn null;\n\
  }\nabstract public function bombardStrength(): int;\n}\n```\n\n注意新增的 `getComposite()`\
  \ 方法。稍后我会回头讨论它。现在，我需要一个新的抽象类来容纳 `addUnit()` 和 `removeUnit()`。我甚至可以提供默认实现：\n\n```\n\
  // 清单 10.14\nabstract class CompositeUnit extends Unit\n{\nprivate $units = [];\n\
  public function getComposite(): CompositeUnit\n{\nreturn $this;\n}\npublic function\
  \ addUnit(Unit $unit)\n{\nif (in_array($unit, $this->units, true)) {\nreturn;\n\
  }\n$this->units[] = $unit;\n}\npublic function removeUnit(Unit $unit)\n{\n$idx =\
  \ array_search($unit, $this->units, true);\nif (is_int($idx)) {\narray_splice($this->units,\
  \ $idx, 1, []);\n}\n}\npublic function getUnits(): array\n{\nreturn $this->units;\n\
  }\n}\n```\n\n`CompositeUnit` 类被声明为抽象类，尽管它本身并没有声明任何抽象方法。不过，它确实扩展了 `Unit`，并且没有实现抽象的\
  \ `bombardStrength()` 方法。`Army`（以及任何其他组合类）现在可以扩展 `CompositeUnit`。我示例中的类现在组织方式如图\
  \ 10-2 所示。\n\n![A314621_5_En_10_Fig2_HTML.gif](img/A314621_5_En_10_Fig2_HTML.gif)\n\
  \n图 10-2. 将 add/remove 方法移出基类\n\n叶子类中那些恼人且无用的 add/remove 方法实现已经消失了，但客户端在使用 `addUnit()`\
  \ 之前，仍然必须检查它是否拥有一个 `CompositeUnit` 对象。\n\n这就是 `getComposite()` 方法发挥作用的地方。默认情况下，此方法返回\
  \ null 值。只有在 `CompositeUnit` 类中，它才返回 `CompositeUnit` 对象。因此，如果此方法调用返回了一个对象，我们就应该能够在该对象上调用\
  \ `addUnit()`。下面是一个使用此技术的客户端：\n\n```\n// 清单 10.15\nclass UnitScript\n{\npublic static\
  \ function joinExisting(\nUnit $newUnit,\nUnit $occupyingUnit\n): CompositeUnit\
  \ {\n$comp = $occupyingUnit->getComposite();\nif (! is_null($comp)) {\n$comp->addUnit($newUnit);\n\
  } else {\n$comp = new Army();\n$comp->addUnit($occupyingUnit);\n$comp->addUnit($newUnit);\n\
  }\nreturn $comp;\n}\n}\n```\n\n`joinExisting()` 方法接受两个 `Unit` 对象。第一个是某区块上的新来者，第二个是先前占用者。如果第二个\
  \ `Unit` 是一个 `CompositeUnit`，那么第一个将尝试加入它。如果不是，则会创建一个新的 `Army` 来容纳这两个单位。我一开始无法知道\
  \ `$occupyingUnit` 参数是否包含一个 `CompositeUnit`。不过，调用 `getComposite()` 可以解决这个问题。如果 `getComposite()`\
  \ 返回一个对象，我可以直接将新的 `Unit` 对象添加进去。如果不返回，我会创建新的 `Army` 对象并将两者都添加进去。\n\n我可以通过让 `Unit::getComposite()`\
  \ 方法返回一个预先填充了当前 `Unit` 的 `Army` 对象来进一步简化这个模型。或者，我可以回到之前的模型（该模型在结构上不区分组合对象和叶子对象），并让\
  \ `Unit::addUnit()` 做同样的事情：创建一个 `Army` 对象并将两个 `Unit` 对象都添加进去。这很简洁，但它预先假定你提前知道你想用来聚合单位的组合类型。你的业务逻辑将决定你在设计\
  \ `getComposite()` 和 `addUnit()` 等方法时能做出何种假设。\n\n这些曲折迂回的做法，体现了组合模式的一个缺点。简单性是通过确保所有类都派生自一个公共基类来实现的。这种简单性的好处有时是以牺牲类型安全为代价的。你的模型变得越复杂，你可能需要进行的**手动**类型检查就越多。假设我有一个\
  \ `Cavalry` 对象。如果游戏规则规定你不能把马放上运兵车，我就无法用组合模式自动强制执行这条规则：\n\n```\n// 清单 10.16\nclass\
  \ TroopCarrier extends CompositeUnit\n{\npublic function addUnit(Unit $unit)\n{\n\
  if ($unit instanceof Cavalry) {\nthrow new UnitException(\"不能把马弄上运兵车\");\n}\nparent::addUnit($unit);\n\
  }\npublic function bombardStrength(): int\n{\nreturn 0;\n}\n}\n```\n\n我被迫使用 `instanceof`\
  \ 运算符来测试传递给 `addUnit()` 的对象的类型。如果你有太多这种特殊情况，该模式的缺点就开始超过其优点。当大多数组件可以互换时，组合模式效果最佳。\n\
  \n另一个需要牢记的问题是一些组合操作的代价。`Army::bombardStrength()` 方法很典型，它会沿着树向下级联调用相同的方法。对于一个拥有大量子部队的大型树来说，单个调用可能会在幕后引发雪崩。`bombardStrength()`\
  \ 本身开销不大，但如果某些叶子执行了复杂的计算来得出其返回值，会发生什么情况？解决这个问题的一种方法是在父对象中缓存此类方法调用的结果，以便后续调用开销更小。不过，你需要小心，确保缓存的值不会过时。你应该设计策略，在树结构上发生任何操作时清除所有缓存。这可能要求你给子对象提供对其父对象的引用。\n\
  \n最后，关于持久化的一点说明。组合模式很优雅，但它不适合直接存储在关系型数据库中。这是因为，默认情况下，你只能通过引用的级联来访问整个结构。要以自然的方式从数据库构建组合结构，你必须执行多次昂贵的查询。你可以通过为整个树分配一个\
  \ ID 来解决这个问题，这样所有组件都可以一次性从数据库中取出。然而，在获取所有对象之后，你仍然需要重新创建父/子引用关系，而这些关系本身也必须存储在数据库中。这并不困难，但有些混乱。\n\
  \n尽管组合模式与关系型数据库配合起来不太自然，但它非常适合存储在 XML 中。这是因为 XML 元素本身通常由子元素树组成。\n\n\n\n### 组合模式小结\n\
  \n因此，当你需要以对待个体的方式来对待一组事物时，组合模式就非常有用，无论是因为这个集合本质上就像是一个组件（例如军队和弓箭手），还是因为上下文赋予了集合与组件相同的特征（例如发票中的行项目）。组合以树状结构组织，因此对整体的操作可以影响部分，而部分的数据也可以通过整体透明地获取。组合模式使得此类操作和查询对客户端透明。树结构易于遍历（我们将在下一章看到）。向组合结构中添加新的组件类型也很容易。\n\
  \n在缺点方面，组合模式依赖于其各部分之间的相似性。一旦我们引入复杂的规则，规定哪个组合对象可以包含哪组组件，我们的代码就会变得难以管理。组合模式不太适合存储在关系数据库中，但非常适合\
  \ XML 持久化。\n\n## 装饰器模式\n\n组合模式帮助我们创建聚合组件的灵活表示，而装饰器模式则使用类似的结构来帮助我们修改具体组件的功能。同样，这种模式的关键在于运行时组合的重要性。继承是一种在父类特性基础上进行构建的简洁方法。但这种简洁性可能会导致你将变化硬编码到继承层次结构中，从而常常导致不灵活。\n\
  \n### 问题\n\n将所有功能都构建到继承结构中会导致系统中的类数量激增。更糟糕的是，当你试图将类似的修改应用于继承树的不同分支时，你很可能会看到重复代码的出现。\n\
  \n让我们回到游戏示例。这里，我定义了一个 `Tile` 类和一个派生类型：\n\n```\n// 代码清单 10.17\nabstract class Tile\n\
  {\nabstract public function getWealthFactor(): int;\n}\n// 代码清单 10.18\nclass Plains\
  \ extends Tile\n{\nprivate $wealthfactor = 2;\npublic function getWealthFactor():\
  \ int\n{\nreturn $this->wealthfactor;\n}\n}\n```\n\n一个瓷砖代表一个地块，我的单位可能会出现在其上。每个瓷砖都有某些特性。在这个例子中，我定义了一个\
  \ `getWealthFactor()` 方法，它会影响某个地块如果被玩家拥有所能产生的收入。如你所见，`Plains` 对象的财富因子为 2。显然，瓷砖还管理其他数据。它们可能还持有图像信息的引用，以便能够绘制棋盘。再次强调，这里我会保持简单。\n\
  \n我需要修改 `Plains` 对象的行为，以处理自然资源和人为破坏的影响。我希望模拟景观中钻石的出现以及污染造成的损害。一种方法是从 `Plains` 对象继承：\n\
  \n```\n// 代码清单 10.19\nclass DiamondPlains extends Plains\n{\npublic function getWealthFactor():\
  \ int\n{\nreturn parent::getWealthFactor() + 2;\n}\n}\n// 代码清单 10.20\nclass PollutedPlains\
  \ extends Plains\n{\npublic function getWealthFactor(): int\n{\nreturn parent::getWealthFactor()\
  \ - 4;\n}\n}\n```\n\n我现在可以非常轻松地获取一个被污染的瓷砖：\n\n```\n// 代码清单 10.21\n$tile = new PollutedPlains();\n\
  print $tile->getWealthFactor();\n```\n\n你可以在图 10-3 中看到这个例子的类图。\n\n![A314621_5_En_10_Fig3_HTML.gif](img/A314621_5_En_10_Fig3_HTML.gif)\n\
  \n图 10-3. 在继承树中构建变化\n\n这种结构显然不灵活。我可以得到带有钻石的平原。我也可以得到被污染的平原。但是我能同时得到两者吗？显然不能，除非我愿意制造\
  \ `PollutedDiamondPlains` 这种可怕的东西。当我引入 `Forest` 类时，情况只会变得更糟，因为 `Forest` 也可以有钻石和污染。\n\
  \n当然，这是一个极端的例子，但道理是清楚的。完全依赖继承来定义功能会导致大量类出现，并容易产生重复。\n\n现在让我们看一个更常见的例子。严肃的 Web 应用程序在发起任务以形成响应之前，通常需要对请求执行一系列操作。例如，你可能需要验证用户身份，并记录请求。也许你应该处理请求，从原始输入中构建数据结构。最后，你必须执行核心处理。你会遇到同样的问题。\n\
  \n你可以通过派生的 `LogRequest` 类、`StructureRequest` 类和 `AuthenticateRequest` 类中的额外处理来扩展基础\
  \ `ProcessRequest` 类的功能。你可以在图 10-4 中看到这个类层次结构。\n\n![A314621_5_En_10_Fig4_HTML.gif](img/A314621_5_En_10_Fig4_HTML.gif)\n\
  \n图 10-4. 更多硬编码的变化\n\n但是，当需要执行日志记录和身份验证，而不需要数据准备时，会发生什么？你需要创建一个 `LogAndAuthenticateProcessor`\
  \ 类吗？显然，是时候寻找一个更灵活的解决方案了。\n\n\n\n### 实现\n\n`Decorator`模式并未单纯依赖继承来解决功能变化问题，而是采用了**组合与委托**的方式。本质上，`Decorator`类持有自身类型的另一个类的实例。`Decorator`会实现一个操作，以便在自身执行操作之前（或之后）调用其所引用的对象的相同操作。通过这种方式，可以在运行时构建一个`Decorator`对象的管道。\n\
  \n让我们重写游戏示例来说明这一点：\n\n```  \nabstract class Tile  \n{  \n    abstract public function\
  \ getWealthFactor(): int;  \n}  \n\nclass Plains extends Tile  \n{  \n    private\
  \ $wealthfactor = 2;  \n\n    public function getWealthFactor(): int  \n    {  \n\
  \        return $this->wealthfactor;  \n    }  \n}  \n\n// 代码清单 10.22  \nabstract\
  \ class TileDecorator extends Tile  \n{  \n    protected $tile;  \n\n    public\
  \ function __construct(Tile $tile)  \n    {  \n        $this->tile = $tile;  \n\
  \    }  \n}  \n```  \n\n这里，我声明了与之前相同的 `Tile` 和 `Plains` 类，但引入了一个新类 `TileDecorator`。它没有实现\
  \ `getWealthFactor()`，因此必须声明为抽象类。我定义了一个构造函数，它需要一个 `Tile` 对象，并将其存储在一个名为 `$tile` 的属性中。我将此属性设为\
  \ `protected`，以便子类能够访问它。现在，我将重新定义 `Pollution` 和 `Diamond` 类：\n\n```  \n// 代码清单 10.23\
  \  \nclass DiamondDecorator extends TileDecorator  \n{  \n    public function getWealthFactor():\
  \ int  \n    {  \n        return $this->tile->getWealthFactor() + 2;  \n    }  \n\
  }  \n\n// 代码清单 10.24  \nclass PollutionDecorator extends TileDecorator  \n{  \n\
  \    public function getWealthFactor(): int  \n    {  \n        return $this->tile->getWealthFactor()\
  \ - 4;  \n    }  \n}  \n```  \n\n这两个类都继承了 `TileDecorator`。这意味着它们持有对一个 `Tile` 对象的引用。当\
  \ `getWealthFactor()` 被调用时，每个类在作出自身调整之前，都会调用其 `Tile` 引用上的相同方法。\n\n通过这样使用组合与委托，您可以在运行时轻松组合对象。由于该模式中的所有对象都继承了\
  \ `Tile`，客户端无需知道它正在处理哪种组合。它可以确信任何 `Tile` 对象（无论它是否在幕后装饰着另一个对象）都可调用 `getWealthFactor()`\
  \ 方法：\n\n```  \n// 代码清单 10.25  \n$tile = new Plains();  \nprint $tile->getWealthFactor();\
  \ // 2  \n```  \n\n`Plains` 是一个组件。它简单地返回 2：\n\n```  \n// 代码清单 10.26  \n$tile = new\
  \ DiamondDecorator(new Plains());  \nprint $tile->getWealthFactor(); // 4  \n```\
  \  \n\n`DiamondDecorator` 持有对 `Plains` 对象的引用。它在添加自己的权重 2 之前调用了 `getWealthFactor()`：\n\
  \n```  \n// 代码清单 10.27  \n$tile = new PollutionDecorator(new DiamondDecorator(new\
  \ Plains()));  \nprint $tile->getWealthFactor(); // 0  \n```  \n\n`PollutionDecorator`\
  \ 持有对 `DiamondDecorator` 对象的引用，而后者拥有自己的 `Tile` 引用。\n\n您可以在图 10-5 中看到此示例的类图。\n\n\
  ![A314621_5_En_10_Fig5_HTML.gif](img/A314621_5_En_10_Fig5_HTML.gif)  \n\n图 10-5.\
  \ Decorator 模式\n\n这个模型扩展性很强。您可以非常容易地添加新的装饰器和组件。使用大量装饰器，您可以在运行时构建非常灵活的结构。组件类（此例中为\
  \ `Plains`）可以通过多种方式被显著修改，而无需将全部的修改内容构建到类层次结构中。用通俗的话说，这意味着您可以有一个被污染且含有钻石的 `Plains`\
  \ 对象，而无需创建一个 `PollutedDiamondPlains` 对象。\n\n`Decorator` 模式构建的管道对于创建过滤器非常有用。`java.io`\
  \ 包就大量使用了装饰器类。客户端程序员可以将装饰器对象与核心组件结合，为核心方法（如 `read()`）添加过滤、缓冲、压缩等功能。我的 Web 请求示例也可以发展成一个可配置的管道。这是一个使用\
  \ `Decorator` 模式的简单实现：\n\n```  \n// 代码清单 10.28  \nclass RequestHelper  \n{  \n}\
  \  \n\n// 代码清单 10.29  \nabstract class ProcessRequest  \n{  \n    abstract public\
  \ function process(RequestHelper $req);  \n}  \n\n// 代码清单 10.30  \nclass MainProcess\
  \ extends ProcessRequest  \n{  \n    public function process(RequestHelper $req)\
  \  \n    {  \n        print __CLASS__ . \": doing something useful with request\\\
  n\";  \n    }  \n}  \n\n// 代码清单 10.31  \nabstract class DecorateProcess extends\
  \ ProcessRequest  \n{  \n    protected $processrequest;  \n\n    public function\
  \ __construct(ProcessRequest $pr)  \n    {  \n        $this->processrequest = $pr;\
  \  \n    }  \n}  \n```  \n\n与之前一样，我们定义了一个抽象超类（`ProcessRequest`）、一个具体组件（`MainProcess`）和一个抽象装饰器（`DecorateProcess`）。`MainProcess::process()`\
  \ 仅报告它已被调用。`DecorateProcess` 代表其子类存储一个 `ProcessRequest` 对象。以下是一些具体的装饰器类：\n\n```\
  \  \n// 代码清单 10.32  \nclass LogRequest extends DecorateProcess  \n{  \n    public\
  \ function process(RequestHelper $req)  \n    {  \n        print __CLASS__ . \"\
  : logging request\\n\";  \n        $this->processrequest->process($req);  \n   \
  \ }  \n}  \n\n// 代码清单 10.33  \nclass AuthenticateRequest extends DecorateProcess\
  \  \n{  \n    public function process(RequestHelper $req)  \n    {  \n        print\
  \ __CLASS__ . \": authenticating request\\n\";  \n        $this->processrequest->process($req);\
  \  \n    }  \n}  \n\n// 代码清单 10.34  \nclass StructureRequest extends DecorateProcess\
  \  \n{  \n    public function process(RequestHelper $req)  \n    {  \n        print\
  \ __CLASS__ . \": structuring request data\\n\";  \n        $this->processrequest->process($req);\
  \  \n    }  \n}  \n```  \n\n每个 `process()` 方法在调用所引用的 `ProcessRequest` 对象的 `process()`\
  \ 方法之前，都会输出一条消息。现在，您可以在运行时组合从这些类实例化的对象，以构建在请求上执行不同操作且顺序各异的过滤器。以下是一些代码，将所有具体类中的对象组合成一个过滤器：\n\
  \n```  \n// 代码清单 10.35  \n$process = new AuthenticateRequest(new StructureRequest(\
  \  \n    new LogRequest(  \n        new MainProcess()  \n    )  \n));  \n$process->process(new\
  \ RequestHelper());  \n```  \n\n这段代码输出如下内容：\n\n```  \npopp\\ch10\\batch07\\AuthenticateRequest:\
  \ authenticating request  \npopp\\ch10\\batch07\\StructureRequest: structuring request\
  \ data  \npopp\\ch10\\batch07\\LogRequest: logging request  \npopp\\ch10\\batch07\\\
  MainProcess: doing something useful with request  \n```  \n\n**注意**\n\n事实上，这个示例也是一个名为“拦截过滤器”的企业模式实例。拦截过滤器在\
  \ Alur 等人所著的 *Core J2EE Patterns: Best Practices and Design Strategies* (Prentice\
  \ Hall, 2001) 一书中有详细描述。\n\n### 结果\n\n与 `Composite` 模式类似，`Decorator` 也可能令人困惑。重要的是要记住，组合与继承在此同时发挥作用。因此，`LogRequest`\
  \ 从 `ProcessRequest` 继承了其接口，但它作为另一个 `ProcessRequest` 对象的包装器来运作。\n\n由于装饰器对象构成了对子对象的包装，因此保持接口尽可能精简是有益的。如果您构建了一个功能丰富的基类，那么装饰器就必须将委托应用于其包含对象的所有公共方法。这可以在抽象装饰器类中完成，但它仍然会引入一种可能导致错误的耦合。\n\
  \n一些程序员创建的装饰器与它们所修改的对象并不共享同一类型。只要它们满足这些对象的相同接口，这种策略就能很好地工作。您将能够利用内置的拦截器方法来自动化委托（通过实现\
  \ `__call()` 来捕获对不存在方法的调用，并自动调用子对象上的相同方法）。然而，这样做也会失去类类型检查所带来的安全性。在我们迄今为止的示例中，客户端代码可以在其参数列表中要求一个\
  \ `Tile` 或 `ProcessRequest` 对象，并且无论该对象是否被大量装饰，都能确信其接口的存在。\n\n\n\n## 外观模式\n\n你可能曾需要将第三方系统整合到自己的项目中。无论这些代码是否采用面向对象设计，它们往往都庞大、复杂且令人望而生畏。即使是你自己的代码，对于只需要使用其中少数功能的客户端程序员来说，也可能变成一项挑战。`Facade`模式正是为复杂系统提供简单清晰接口的一种方式。\n\
  \n### 问题所在\n\n系统往往会演化出大量仅对系统本身有用的代码。正如类需要定义清晰的公共接口并将内部实现对外隐藏一样，设计良好的系统也应如此。然而，我们并不总能明确判断系统的哪些部分是为客户端代码设计，哪些部分最好隐藏起来。\n\
  \n当处理子系统（如网络论坛或图库应用程序）时，你可能会发现自己的代码需要深入调用系统逻辑。如果子系统代码随时间变化，而你的代码在多个不同点与其交互，那么随着子系统的演进，你将面临严重的维护问题。\n\
  \n同样，在构建自己的系统时，最好将不同部分组织成独立的层级。通常，你可能有一个负责应用逻辑的层，另一个负责数据库交互，还有一个负责表现层等。你应该尽可能保持这些层的相互独立，这样项目中某一区域的变化对其他区域的影响才能最小化。如果某一层的代码与另一层紧密耦合，那么这一目标就难以实现。\n\
  \n下面是一段故意写得令人困惑的过程式代码，它将从文件获取日志信息并转换为对象数据的简单过程变得异常复杂：\n\n```\n// 代码清单 10.36\nfunction\
  \ getProductFileLines($file)\n{\n    return file($file);\n}\nfunction getProductObjectFromId($id,\
  \ $productname)\n{\n    // 某种数据库查询\n    return new Product($id, $productname);\n\
  }\nfunction getNameFromLine($line)\n{\n    if (preg_match(\"/.*-(.*)\\s\\d+/\",\
  \ $line, $array)) {\n        return str_replace('_', ' ', $array[1]);\n    }\n \
  \   return '';\n}\nfunction getIDFromLine($line)\n{\n    if (preg_match(\"/^(\\\
  d{1,3})-/\", $line, $array)) {\n        return $array[1];\n    }\n    return -1;\n\
  }\nclass Product\n{\n    public $id;\n    public $name;\n    public function __construct($id,\
  \ $name)\n    {\n        $this->id = $id;\n        $this->name = $name;\n    }\n\
  }\n```\n\n假设这些代码的内部实现远比实际复杂，而且我不得不使用它，而非从头重写。例如，假设我需将包含如下格式行的文件转换为对象数组：\n\n```\n\
  234-ladies_jumper 55\n532-gents_hat 44\n```\n\n为此，我必须调用所有这些函数（请注意，为简洁起见，我并未提取最后的数字，它代表价格）：\n\
  \n```\n// 代码清单 10.37\n$lines = getProductFileLines(__DIR__ . '/test2.txt');\n$objects\
  \ = [];\nforeach ($lines as $line) {\n    $id = getIDFromLine($line);\n    $name\
  \ = getNameFromLine($line);\n    $objects[$id] = getProductObjectFromID($id, $name);\n\
  }\n```\n\n如果在整个项目中像这样直接调用这些函数，我的代码就会与所使用的子系统紧密耦合。如果子系统发生变化，或者我决定完全替换它，就会引发问题。我真正需要的是在系统与其余代码之间引入一个网关。\n\
  \n### 实现\n\n下面是一个简单的类，它为你在上一节中看到的过程式代码提供了一个接口：\n\n```\n// 代码清单 10.38\nclass ProductFacade\n\
  {\n    private $products = [];\n    public function __construct(string $file)\n\
  \    {\n        $this->file = $file;\n        $this->compile();\n    }\n    private\
  \ function compile()\n    {\n        $lines = getProductFileLines($this->file);\n\
  \        foreach ($lines as $line) {\n            $id = getIDFromLine($line);\n\
  \            $name = getNameFromLine($line);\n            $this->products[$id] =\
  \ getProductObjectFromID($id, $name);\n        }\n    }\n    public function getProducts():\
  \ array\n    {\n        return $this->products;\n    }\n    public function getProduct(string\
  \ $id): \\Product\n    {\n        if (isset($this->products[$id])) {\n         \
  \   return $this->products[$id];\n        }\n        return null;\n    }\n}\n```\n\
  \n从客户端代码的角度看，从日志文件获取`Product`对象的过程大大简化了：\n\n```\n// 代码清单 10.39\n$facade = new ProductFacade(__DIR__\
  \ . '/test2.txt');\n$object = $facade->getProduct(\"234\");\n```\n\n### 影响\n\n`Facade`实际上是一个很简单的概念。它只是为某个层或子系统创建一个单一入口点。这带来了诸多好处：有助于将项目中不同区域相互解耦；为客户端程序员提供实现清晰目标的简单方法既实用又便利；通过将子系统的使用集中在一个地方来减少错误——子系统变更时，故障将出现在可预测的位置。在复杂子系统中，客户端代码可能错误地使用内部函数，而`Facade`类也能将此类错误最小化。\n\
  \n尽管`Facade`模式很简单，但人们很容易忘记使用它，尤其是当你对所使用的子系统很熟悉时。当然，这需要权衡。一方面，为复杂系统创建简单接口的好处显而易见。另一方面，人们可能会不加区分地抽象系统，然后再抽象这些抽象层。如果你为了客户端代码的明确利益进行了显著的简化，并且/或者保护它免受可能变更的系统的影响，那么实现`Facade`模式很可能是正确的选择。\n\
  \n## 总结\n\n在本章中，我探讨了在系统中组织类和对象的几种方式。我特别关注了这样一个原则：当继承失败时，组合可用于生成灵活性。在`Composite`和`Decorator`模式中，都使用了继承来促进组合，并定义了一个为客户端代码提供保证的通用接口。\n\
  \n你还看到了委托在这些模式中的有效运用。最后，我介绍了简单但强大的`Facade`模式。`Facade`是许多人多年来一直在使用却没有给它命名的模式之一。`Facade`让你能够为一个层或子系统提供一个清晰的入口点。在\
  \ PHP 中，`Facade`模式也用于创建封装过程式代码块的对象包装器。\n\n"
- "# 11. 执行与表达任务\n\n在本章中，我们将活跃起来。我将介绍帮助你完成任务的模式，无论是解释小语言还是封装算法。\n\n本章将带你了解以下几种模式：\n\
  \n-   **解释器模式**：构建一个可用于创建可脚本化应用程序的小型语言解释器\n-   **策略模式**：识别系统中的算法并将其封装到各自的类型中\n-\
  \   **观察者模式**：创建用于向多个对象通知系统事件的钩子\n-   **访问者模式**：将操作应用于对象树中的所有节点\n-   **命令模式**：创建可保存和传递的命令对象\n\
  -   **空对象模式**：使用无操作对象代替空值。\n\n### 解释器模式\n\n语言是由其他语言编写的（至少最初是这样）。例如，PHP 本身是用 C 语言编写的。同理，虽然听起来有些奇怪，但你可以使用\
  \ PHP 定义并运行自己的语言。当然，你创建的任何语言都会比较慢，且有一定局限性。尽管如此，小型语言仍然非常有用，正如你将在本章中看到的那样。\n\n\n\n\
  ### 问题\n\n当您用 PHP 创建 Web（或命令行）界面时，您赋予了用户访问功能的权利。界面设计需要在功能强大与易于使用之间做出权衡。通常情况下，您赋予用户的功能越多，界面就会变得越杂乱和令人困惑。当然，优秀的界面设计对此大有裨益。但如果\
  \ 90%的用户只使用您 30%的功能，那么堆砌功能所带来的成本可能就会超过其收益。您可能希望为大多数用户简化您的系统。但那些高级用户——占总用户 10%却使用您系统高级功能的那群人——又该怎么办？或许您可以用一种不同的方式来满足他们的需求。通过向这类用户提供一种领域语言（通常称为\
  \ DSL——领域特定语言），您实际上可以扩展应用程序的功能。\n\n当然，您手中恰好就有一种编程语言——那就是 PHP。以下展示了如何让用户为您的系统编写脚本：\n\
  \n```\n$form_input = $_REQUEST['form_input'];\n// 包含: \"print file_get_contents('/etc/passwd');\"\
  \neval($form_input);\n```\n\n这种让应用程序具备脚本能力的方法显然是疯狂的。万一原因不够明显，它们归结为两个问题：**安全性**和**复杂性**。安全性问题在示例中已得到充分体现。通过允许用户通过您的脚本来执行\
  \ PHP，您实际上是让他们能够访问运行该脚本的服务器。复杂性问题同样是一个巨大的缺陷。无论您的代码多么清晰，普通用户都不太可能轻易地扩展它，更不用说在浏览器窗口中操作了。\n\
  \n不过，一种迷你语言可以同时解决这两个问题。您可以在语言中设计灵活性，降低用户可能造成破坏的可能性，并使功能保持专注。\n\n设想一个用于创建测验的应用程序。制作人设计问题并制定规则，用于评判参赛者提交的答案。要求是测验必须能在无人干预的情况下自动评分，即使某些答案是由用户输入到文本字段中的。\n\
  \n这是一个问题：\n\n```\n设计模式小组有多少成员？\n```\n\n您可以接受“four”或“4”作为正确答案。您可能会创建一个 Web 界面，允许制作人使用正则\
  \ `Expression` 来评判回答：\n\n```\n⁴|four$\n```\n\n然而，大多数制作人并非因精通正则表达式而被聘用。为了让每个人的生活更轻松，您可能会实现一种更用户友好的评判机制：\n\
  \n```\n$input equals \"4\" or $input equals \"four\"\n```\n\n您提出一种支持变量、名为 `equals`\
  \ 的操作符以及布尔逻辑（`or` 和 `and`）的语言。程序员喜欢给东西命名，所以我们可以称它为 MarkLogic。它应该易于扩展，因为您预见到会有大量关于更丰富功能的请求。让我们暂时将解析输入的细节放在一边，专注于一种在运行时将这些元素组合在一起以产生答案的机制。正如您所料，这就是**解释器模式**发挥作用的地方。\n\
  \n### 实现\n\n语言由表达式（即，能解析为一个值的对象）组成。如表 11-1 所示，即使是像 MarkLogic 这样的小型语言也需要跟踪大量元素。\n\
  \n**表 11-1。MarkLogic 语法的元素**\n\n| 描述 | EBNF 名称 | 类名 | 示例 |\n| --- | --- | --- |\
  \ --- |\n| 变量 | `variable` | `VariableExpression` | `$input` |\n| 字符串字面量 | `<stringLiteral>`\
  \ | `LiteralExpression` | `\"four\"` |\n| 布尔与 | `andExpr` | `BooleanAndExpression`\
  \ | `$input equals '4' and $other equals '6'` |\n| 布尔或 | `orExpr` | `BooleanOrExpression`\
  \ | `$input equals '4' or $other equals '6'` |\n| 相等性测试 | `eqExpr` | `EqualsExpression`\
  \ | `$input equals '4'` |\n\n表 11-1 列出了 EBNF 名称。那么 EBNF 到底是关于什么的？它是一种可以用来描述语言语法的记法。EBNF\
  \ 代表**扩展巴科斯-瑙尔范式**。它由一系列行（称为产生式）组成，每一行包含一个名称和一个描述，该描述采用引用其他产生式和终止符（即，不由其他产生式引用构成元素）的形式。以下是一种使用\
  \ EBNF 描述我语法的方法：\n\n```\nexpr     = operand { orExpr | andExpr }\noperand  = ( '('\
  \ expr ')' | ? string literal ? | variable ) { eqExpr }\norExpr   = 'or' operand\n\
  andExpr  = 'and' operand\neqExpr   = 'equals' operand\nvariable = '$' , ? word ?\n\
  ```\n\n某些符号具有特殊含义（这应该与正则 `Expression` 记法类似）：例如，`|` 表示或。您可以使用括号对元素进行分组。因此，在示例中，一个表达式（`expr`）由一个操作数（`operand`）后跟零个或多个\
  \ `orExpr` 或 `andExpr` 组成。一个操作数可以是括号内的表达式、带引号的字符串（我省略了它的产生式）、或者一个变量后跟零个或多个 `eqExpr`\
  \ 实例。一旦您掌握了从一个产生式引用到另一个产生式的窍门，EBNF 就变得相当容易阅读。\n\n在图 11-1 中，我将语法元素表示为类。\n\n![A314621_5_En_11_Fig1_HTML.gif](img/A314621_5_En_11_Fig1_HTML.gif)\n\
  \n**图 11-1。组成 MarkLogic 语言的解释器类**\n\n如您所见，`BooleanAndExpression` 及其同级类继承自 `OperatorExpression`。这是因为这些类都对其他的\
  \ `Expression` 对象执行操作。`VariableExpression` 和 `LiteralExpression` 则直接处理值。\n\n所有 `Expression`\
  \ 对象都实现了一个 `interpret()` 方法，该方法定义在抽象基类 `Expression` 中。`interpret()` 方法期望一个 `InterpreterContext`\
  \ 对象，该对象用作共享数据存储。每个 `Expression` 对象都可以将数据存储在 `InterpreterContext` 对象中。然后 `InterpreterContext`\
  \ 会被传递给其他 `Expression` 对象。为了能够轻松地从 `InterpreterContext` 中检索数据，`Expression` 基类实现了一个\
  \ `getKey()` 方法，该方法返回一个唯一的句柄。让我们通过一个 `Expression` 的实现来看看这在实践中是如何工作的：\n\n\n好的，作为一名高级文档工程师和翻译员，我将按照您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n```php\n// 列表 11.01\nabstract class Expression\n{\nprivate static $keycount\
  \ = 0;\nprivate $key;\nabstract public function interpret(InterpreterContext $context);\n\
  public function getKey()\n{\nif (! isset($this->key)) {\nself::$keycount++;\n$this->key\
  \ = self::$keycount;\n}\nreturn $this->key;\n}\n}\n// 列表 11.02\nclass LiteralExpression\
  \ extends Expression\n{\nprivate $value;\npublic function __construct($value)\n\
  {\n$this->value = $value;\n}\npublic function interpret(InterpreterContext $context)\n\
  {\n$context->replace($this, $this->value);\n}\n}\n// 列表 11.03\nclass InterpreterContext\n\
  {\nprivate $expressionstore = [];\npublic function replace(Expression $exp, $value)\n\
  {\n$this->expressionstore[$exp->getKey()] = $value;\n}\npublic function lookup(Expression\
  \ $exp)\n{\nreturn $this->expressionstore[$exp->getKey()];\n}\n}\n// 列表 11.04\n\
  $context = new InterpreterContext();\n$literal = new LiteralExpression('four');\n\
  $literal->interpret($context);\nprint $context->lookup($literal) . \"\\n\";\n```\n\
  \n输出结果如下：\n\n```\nfour\n```\n\n我将从 `InterpreterContext` 类开始讲解。正如你所见，它实际上只是一个关联数组\
  \ `$expressionstore` 的前端，我用它来存储数据。`replace()` 方法接受一个 `Expression` 对象作为键，以及任意类型的值，然后将这对键值对添加到\
  \ `$expressionstore` 中。它还提供了一个用于检索数据的 `lookup()` 方法。\n\n`Expression` 类定义了抽象的 `interpret()`\
  \ 方法和一个具体的 `getKey()` 方法，后者使用静态计数器值来生成、存储并返回一个标识符。`InterpreterContext::lookup()`\
  \ 和 `InterpreterContext::replace()` 方法使用该标识符来索引数据。\n\n`LiteralExpression` 类定义了一个接受值参数的构造函数。`interpret()`\
  \ 方法需要一个 `InterpreterContext` 对象。我简单地调用了 `replace()`，使用 `getKey()` 来定义检索的键，并使用 `$value`\
  \ 属性。在检查其他 `Expression` 类时，这将成为一个熟悉的模式。`interpret()` 方法总是将其结果写入到 `InterpreterContext`\
  \ 对象中。\n\n我还包含了一些客户端代码，实例化了一个 `InterpreterContext` 对象和一个 `LiteralExpression` 对象（其值为\
  \ `\"four\"`）。我将 `InterpreterContext` 对象传递给 `LiteralExpression::interpret()`。`interpret()`\
  \ 方法将键/值对存储在 `InterpreterContext` 中，然后我通过调用 `lookup()` 从中检索值。\n\n这是剩下的终端类。`VariableExpression`\
  \ 稍微复杂一些：\n\n```php\n// 列表 11.05\nclass VariableExpression extends Expression\n\
  {\nprivate $name;\nprivate $val;\npublic function __construct($name, $val = null)\n\
  {\n$this->name = $name;\n$this->val = $val;\n}\npublic function interpret(InterpreterContext\
  \ $context)\n{\nif (! is_null($this->val)) {\n$context->replace($this, $this->val);\n\
  $this->val = null;\n}\n}\npublic function setValue($value)\n{\n$this->val = $value;\n\
  }\npublic function getKey()\n{\nreturn $this->name;\n}\n}\n// 列表 11.06\n$context\
  \ = new InterpreterContext();\n$myvar = new VariableExpression('input', 'four');\n\
  $myvar->interpret($context);\nprint $context->lookup($myvar) . \"\\n\";\n// 输出:\
  \ four\n$newvar = new VariableExpression('input');\n$newvar->interpret($context);\n\
  print $context->lookup($newvar) . \"\\n\";\n// 输出: four\n$myvar->setValue(\"five\"\
  );\n$myvar->interpret($context);\nprint $context->lookup($myvar) . \"\\n\";\n//\
  \ 输出: five\nprint $context->lookup($newvar) . \"\\n\";\n// 输出: five\n```\n\n`VariableExpression`\
  \ 类接受 name 和 value 两个参数，并将它们存储在属性变量中。我提供了 `setValue()` 方法，以便客户端代码可以随时更改该值。\n\n`interpret()`\
  \ 方法会检查 `$val` 属性是否具有非空值。如果 `$val` 属性有值，则将其设置到 `InterpreterContext` 中。然后我将 `$val`\
  \ 属性设置为 `null`。这是为了防止在另一个同名的 `VariableExpression` 实例更改了 `InterpreterContext` 对象中的值后，`interpret()`\
  \ 被再次调用。这是一个相当有限的变量，只接受字符串值。如果你打算扩展你的语言，你应该考虑让它与其他 `Expression` 对象一起工作，以便能够包含测试和操作的结果。不过，就目前而言，`VariableExpression`\
  \ 可以完成我需要的工作。请注意，我重写了 `getKey()` 方法，以便变量值链接到变量名，而不是一个任意的静态 ID。\n\n语言中的运算符表达式都与另外两个\
  \ `Expression` 对象一起工作以完成其任务。因此，让它们扩展一个公共的超类是合理的。下面是 `OperatorExpression` 类：\n\n\
  ```php\n// 列表 11.07\nabstract class OperatorExpression extends Expression\n{\nprotected\
  \ $l_op;\nprotected $r_op;\npublic function __construct(Expression $l_op, Expression\
  \ $r_op)\n{\n$this->l_op = $l_op;\n$this->r_op = $r_op;\n}\npublic function interpret(InterpreterContext\
  \ $context)\n{\n$this->l_op->interpret($context);\n$this->r_op->interpret($context);\n\
  $result_l = $context->lookup($this->l_op);\n$result_r = $context->lookup($this->r_op);\n\
  $this->doInterpret($context, $result_l, $result_r);\n}\nabstract protected function\
  \ doInterpret(\nInterpreterContext $context,\n$result_l,\n$result_r\n);\n}\n```\n\
  \n`OperatorExpression` 是一个抽象类。它实现了 `interpret()`，但也定义了抽象的 `doInterpret()` 方法。构造函数需要两个\
  \ `Expression` 对象 `$l_op` 和 `$r_op`，并将它们存储在属性中。\n\n`interpret()` 方法首先在其两个操作数属性上调用\
  \ `interpret()`（如果你读过前一章，可能会注意到我在这里创建了一个组合模式的实例）。操作数执行完毕后，`interpret()` 仍需要获取由此产生的值。它通过对每个属性调用\
  \ `InterpreterContext::lookup()` 来实现这一点。然后它调用 `doInterpret()`，将如何处理这些操作结果的决定权交给子类。\n\
  \n> **注**  \n> `doInterpret()` 是模板方法模式的一个实例。在这种模式中，父类既定义又调用一个抽象方法，将具体实现留给子类去提供。这可以简化具体类的开发，因为共享功能由超类处理，而子类则可以专注于清晰、明确的目标。\n\
  \n下面是 `EqualsExpression` 类，它测试两个 `Expression` 对象的相等性：\n\n```php\n// 列表 11.08\nclass\
  \ EqualsExpression extends OperatorExpression\n{\nprotected function doInterpret(\n\
  InterpreterContext $context,\n$result_l,\n$result_r\n) {\n$context->replace($this,\
  \ $result_l == $result_r);\n}\n}\n```\n\n`EqualsExpression` 只实现了 `doInterpret()`\
  \ 方法，它测试由 `interpret()` 方法传递给它的操作数结果的相等性，并将结果放入 `InterpreterContext` 对象中。\n\n为了结束\
  \ `Expression` 类的介绍，这里给出 `BooleanOrExpression` 和 `BooleanAndExpression`：\n\n```php\n\
  // 列表 11.09\nclass BooleanOrExpression extends OperatorExpression\n{\nprotected\
  \ function doInterpret(\nInterpreterContext $context,\n$result_l,\n$result_r\n)\
  \ {\n$context->replace($this, $result_l || $result_r);\n}\n}\n// 列表 11.10\nclass\
  \ BooleanAndExpression extends OperatorExpression\n{\nprotected function doInterpret(\n\
  InterpreterContext $context,\n$result_l,\n$result_r\n) {\n$context->replace($this,\
  \ $result_l && $result_r);\n}\n}\n```\n\n\n\n`BooleanOrExpression`类并不是测试相等性，而是应用逻辑`or`运算，并通过`InterpreterContext::replace()`方法存储结果。`BooleanAndExpression`类则应用逻辑`and`运算。\n\
  \n现在我已有足够的代码来执行之前引用的迷你语言片段。再次展示如下：\n\n```\n$input equals \"4\" or $input equals\
  \ \"four\"\n```\n\n以下是我使用`Expression`类构建此语句的方式：\n\n```\n// listing 11.11\n$context\
  \ = new InterpreterContext();\n$input = new VariableExpression('input');\n$statement\
  \ = new BooleanOrExpression(\nnew EqualsExpression($input, new LiteralExpression('four')),\n\
  new EqualsExpression($input, new LiteralExpression('4'))\n);\n```\n\n我实例化了一个名为`\"\
  input\"`的变量，但暂未为其提供值。随后创建了一个`BooleanOrExpression`对象，它将比较两个`EqualsExpression`对象的结果。第一个`EqualsExpression`对象将存储在`$input`中的`VariableExpression`对象与包含字符串`\"\
  four\"`的`LiteralExpression`进行比较；第二个`EqualsExpression`将`$input`与包含字符串`\"4\"`的`LiteralExpression`对象进行比较。\n\
  \n现在语句已准备就绪，我可以为输入变量提供一个值并运行代码：\n\n```\n// listing 11.12\nforeach ([\"four\", \"\
  4\", \"52\"] as $val) {\n    $input->setValue($val);\n    print \"$val:\\n\";\n\
  \    $statement->interpret($context);\n    if ($context->lookup($statement)) {\n\
  \        print \"top marks\\n\\n\";\n    } else {\n        print \"dunce hat on\\\
  n\\n\";\n    }\n}\n```\n\n实际上，我使用三个不同的值运行了三次代码。第一次循环，我将临时变量`$val`设置为`\"four\"`，并通过其`setValue()`方法将其赋值给输入的`VariableExpression`对象。然后我在最顶层的`Expression`对象（即包含语句中所有其他表达式引用的`BooleanOrExpression`对象）上调用`interpret()`方法。以下是此调用的内部步骤分解：\n\
  \n*   `$statement`在其`$l_op`属性（第一个`EqualsExpression`对象）上调用`interpret()`。\n*   第一个`EqualsExpression`对象在其`$l_op`属性（当前设置为`\"\
  four\"`的输入`VariableExpression`对象的引用）上调用`interpret()`。\n*   输入`VariableExpression`对象通过调用`InterpreterContext::replace()`将其当前值写入提供的`InterpreterContext`对象。\n\
  *   第一个`EqualsExpression`对象在其`$r_op`属性（一个负责值为`\"four\"`的`LiteralExpression`对象）上调用`interpret()`。\n\
  *   `LiteralExpression`对象向`InterpreterContext`注册其键和值。\n*   第一个`EqualsExpression`对象从`InterpreterContext`对象中检索`$l_op`（`\"\
  four\"`）和`$r_op`（`\"four\"`）的值。\n*   第一个`EqualsExpression`对象比较这两个值是否相等，然后将结果（`true`）及其键注册到`InterpreterContext`对象。\n\
  *   返回树顶，`$statement`对象（`BooleanOrExpression`）在其`$r_op`属性上调用`interpret()`。此属性以与`$l_op`属性相同的方式解析为一个值（本例中为`false`）。\n\
  *   `$statement`对象从`InterpreterContext`对象检索其每个操作数的值，并使用`||`进行比较。由于它比较的是`true`和`false`，因此结果为`true`。此最终结果存储在`InterpreterContext`对象中。\n\
  \n这仅仅是循环第一次迭代的全部过程。最终输出如下：\n\n```\nfour:\ntop marks\n4:\ntop marks\n52:\ndunce hat\
  \ on\n```\n\n您可能需要反复阅读本节内容几次，直到理解其过程。对象树与类树之间的经典问题可能会让您感到困惑。`Expression`类按继承层次结构排列，而`Expression`对象则在运行时组合成一个树。在回读代码时，请牢记这一区别。\n\
  \n图 11-2 展示了该示例的完整类图。\n\n![A314621_5_En_11_Fig2_HTML.gif](img/A314621_5_En_11_Fig2_HTML.gif)\n\
  \n图 11-2.\n\n部署的解释器模式\n\n### 解释器模式问题\n\n一旦你为解释器模式实现设置了核心类，扩展就变得容易了。代价是最终可能会创建大量的类。因此，解释器模式最适合应用于规模相对较小的语言。如果你需要一个完整的编程语言，最好寻找第三方工具来使用。\n\
  \n由于解释器类经常执行非常相似的任务，值得密切关注你创建的类，以便提取重复的部分。\n\n许多初次接触解释器模式的人，在最初的兴奋之后，会失望地发现它并不处理解析问题。这意味着你无法立即为用户提供一个友好易用的语言。第\
  \ 24 章包含一些粗略的代码，用于说明解析迷你语言的一种策略。\n\n## 策略模式\n\n类经常试图做太多事情。这可以理解：你创建一个执行几个相关操作的类；在编码过程中，其中一些操作需要根据情况而变化。同时，你的类需要被拆分成子类。在你意识到之前，你的设计就被竞争力量拉扯得四分五裂了。\n\
  \n### 问题\n\n由于我最近构建了一个标记语言，我继续使用测验示例。测验需要问题，所以你构建了一个`Question`类，并给它一个`mark()`方法。一切顺利，直到你需要支持不同的评分机制。\n\
  \n假设您被要求支持简单的 MarkLogic 语言，通过直接匹配和正则`Expression`进行评分。你的第一反应可能是为这些差异创建子类，如图 11-3\
  \ 所示。\n\n![A314621_5_En_11_Fig3_HTML.gif](img/A314621_5_En_11_Fig3_HTML.gif)\n\n\
  图 11-3.\n\n根据评分策略定义子类\n\n只要评分是类中唯一变化的方面，这种方法就会很有效。但想象一下，你被要求支持不同类型的问题：基于文本的问题和支持富媒体的问题。当涉及到在一个继承树中整合这些力量时，这就给你带来了问题，如图\
  \ 11-4 所示。\n\n![A314621_5_En_11_Fig4_HTML.gif](img/A314621_5_En_11_Fig4_HTML.gif)\n\
  \n图 11-4.\n\n根据两种力量定义子类\n\n不仅继承层次结构中的类数量激增，还必然引入了重复。你的评分逻辑在继承层次结构的每个分支上都被重复了。\n\n\
  每当你发现自己在继承树（无论是通过子类化还是重复的条件语句）的兄弟节点之间重复一个算法时，考虑将这些行为抽象成它们自己的类型。\n\n\n\n### 实现\n\n\
  与所有最佳模式一样，策略模式简单而强大。当类必须支持一个接口的多种实现时（例如，多种评分机制），最佳方法通常是提取这些实现并将其放入它们自己的类型中，而不是扩展原始类来处理它们。\n\
  \n因此，在示例中，你的评分方法可能会放在一个 `Marker` 类型中。图 11-5 展示了新的结构。\n\n![A314621_5_En_11_Fig5_HTML.gif](img/A314621_5_En_11_Fig5_HTML.gif)\n\
  \n图 11-5. 将算法提取到它们自己的类型中\n\n还记得四人组原则“优先使用组合而非继承”吗？这是一个极好的例子。通过定义和封装评分算法，你减少了子类化的需求并增加了灵活性。你可以随时添加新的评分策略，而完全无需修改\
  \ `Question` 类。所有 `Question` 类只知道它们拥有一个可用的 `Marker` 实例，并且该实例由其接口保证支持 `mark()` 方法。实现的细节完全是别人的问题。\n\
  \n以下是 `Question` 类呈现为代码的形式：\n\n```\n// 清单 11.13\nabstract class Question\n{\nprotected\
  \ $prompt;\nprotected $marker;\npublic function __construct(string $prompt, Marker\
  \ $marker)\n{\n$this->prompt = $prompt;\n$this->marker = $marker;\n}\npublic function\
  \ mark(string $response): bool\n{\nreturn $this->marker->mark($response);\n}\n}\n\
  // 清单 11.14\nclass TextQuestion extends Question\n{\n// 处理文本问题的特定操作\n}\n// 清单 11.15\n\
  class AVQuestion extends Question\n{\n// 处理视听问题的特定操作\n}\n```\n\n如你所见，我将 `TextQuestion`\
  \ 和 `AVQuestion` 之间差异的具体性质留给你想象。`Question` 基类提供了所有实际功能，存储了一个提示属性和一个 `Marker` 对象。当使用最终用户的响应调用\
  \ `Question::mark()` 方法时，该方法只是将问题处理委托给它的 `Marker` 对象。\n\n现在是定义一些简单的 `Marker` 对象的时候了：\n\
  \n```\n// 清单 11.16\nabstract class Marker\n{\nprotected $test;\npublic function\
  \ __construct(string $test)\n{\n$this->test = $test;\n}\nabstract public function\
  \ mark(string $response): bool;\n}\n// 清单 11.17\nclass MarkLogicMarker extends Marker\n\
  {\nprivate $engine;\npublic function __construct(string $test)\n{\nparent::__construct($test);\n\
  $this->engine = new MarkParse($test);\n}\npublic function mark(string $response):\
  \ bool\n{\nreturn $this->engine->evaluate($response);\n}\n}\n// 清单 11.18\nclass\
  \ MatchMarker extends Marker\n{\npublic function mark(string $response): bool\n\
  {\nreturn ($this->test == $response);\n}\n}\n// 清单 11.19\nclass RegexpMarker extends\
  \ Marker\n{\npublic function mark(string $response): bool\n{\nreturn (preg_match(\"\
  $this->test\", $response) === 1);\n}\n}\n```\n\n对于 `Marker` 类本身，应该没什么特别令人惊讶的地方。注意，`MarkParse`\
  \ 对象设计用于配合第 24 章开发的简单解析器。这里的关键在于我定义的结构，而非策略本身的细节。我可以将 `RegexpMarker` 替换为 `MatchMarker`，而对\
  \ `Question` 类没有任何影响。\n\n当然，你仍然必须决定选择具体 `Marker` 对象的方法。我见过两种实际应用中的解决方案。第一种，生产者使用单选按钮来选择首选的评分策略。第二种，利用评分条件本身的结构；也就是说，匹配语句保持明文形式：\n\
  \n```\nfive\n```\n\nMarkLogic 语句前面加一个冒号：\n\n```\n:$input equals 'five'\n```\n\n\
  而正则表达式使用正斜杠：\n\n```\n/f.ve/\n```\n\n下面是一些用来测试这些类的代码：\n\n```\n// 清单 11.20\n$markers\
  \ = [\nnew RegexpMarker(\"/f.ve/\"),\nnew MatchMarker(\"five\"),\nnew MarkLogicMarker('$input\
  \ equals \"five\"')\n];\nforeach ($markers as $marker) {\nprint get_class($marker).\"\
  \\n\";\n$question = new TextQuestion(\"how many beans make five\", $marker);\nforeach\
  \ ([\"five\", \"four\"] as $response) {\nprint \"    response: $response: \";\n\
  if ($question->mark($response)) {\nprint \"well done\\n\";\n} else {\nprint \"never\
  \ mind\\n\";\n}\n}\n}\n```\n\n我构造了三个策略对象，依次使用每个对象来构造一个 `TextQuestion` 对象。接着用两个示例响应来测试\
  \ `TextQuestion` 对象。\n\n以下是输出结果（包含命名空间）：\n\n```\npopp\\ch11\\batch02\\RegexpMarker\n\
  response: five: well done\nresponse: four: never mind\npopp\\ch11\\batch02\\MatchMarker\n\
  response: five: well done\nresponse: four: never mind\npopp\\ch11\\batch02\\MarkLogicMarker\n\
  response: five: well done\nresponse: five: never mind\n```\n\n在这个例子中，我通过 `mark()`\
  \ 方法将特定数据（`$response` 变量）从客户端传递给策略对象。有时，你可能会遇到这样的情况：在调用策略对象的操作时，并不总是能事先知道它需要多少信息。你可以通过将客户端实例本身传递给策略，来委托其决定获取哪些数据。然后，策略可以查询客户端，以便构建它所需的数据。\n\
  \n\n### 观察者模式\n\n我曾在之前描述过“正交性”这一美德。作为程序员，我们的目标之一应该是构建那些在修改或移动时对其他组件影响最小的组件。如果每次对一个组件的修改都导致代码库中其他地方产生连锁反应，那么开发任务很快就会变成一个不断产生和消灭\
  \ Bug 的螺旋。\n\n当然，正交性往往只是一个梦想。系统中的各个元素必须包含对其他元素的嵌入式引用。不过，你可以采用多种策略来最小化这种依赖。你们已经看到过多态的各种例子，在这些例子中，客户端理解一个组件的接口，但实际的组件可能在运行时发生变化。\n\
  \n在某些情况下，你可能希望在这样的组件之间实现比这更大的分离。考虑一个负责处理用户访问系统的类：\n\n```\n// 清单 11.21\nclass Login\n\
  {\n    const LOGIN_USER_UNKNOWN = 1;\n    const LOGIN_WRONG_PASS = 2;\n    const\
  \ LOGIN_ACCESS = 3;\n    private $status = [];\n    public function handleLogin(string\
  \ $user, string $pass, string $ip): bool\n    {\n        $isvalid=false;\n     \
  \   switch (rand(1, 3)) {\n            case 1:\n                $this->setStatus(self::LOGIN_ACCESS,\
  \ $user, $ip);\n                $isvalid = true;\n                break;\n     \
  \       case 2:\n                $this->setStatus(self::LOGIN_WRONG_PASS, $user,\
  \ $ip);\n                $isvalid = false;\n                break;\n           \
  \ case 3:\n                $this->setStatus(self::LOGIN_USER_UNKNOWN, $user, $ip);\n\
  \                $isvalid = false;\n                break;\n        }\n        print\
  \ \"returning \".(($isvalid)?\"true\":\"false\").\"\\n\";\n        return $isvalid;\n\
  \    }\n    private function setStatus(int $status, string $user, string $ip)\n\
  \    {\n        $this->status = [$status, $user, $ip];\n    }\n    public function\
  \ getStatus(): array\n    {\n        return $this->status;\n    }\n}\n```\n\n当然，在真实世界的例子中，`handleLogin()`\
  \ 方法会针对某个存储机制来验证用户。而在这里，这个类使用 `rand()` 函数模拟了登录过程。调用 `handleLogin()` 有三种可能的结果。状态标志可能被设置为\
  \ `LOGIN_ACCESS`、`LOGIN_WRONG_PASS` 或 `LOGIN_USER_UNKNOWN`。\n\n因为 `Login` 类是守护你业务团队宝藏的网关，它在开发期间及之后的几个月里可能会引起很多关注。市场部门可能会打电话给你，要求你记录\
  \ IP 地址日志。你可以在你的系统 `Logger` 类中添加一个调用：\n\n```\n// 清单 11.22\npublic function handleLogin(string\
  \ $user, string $pass, string $ip): bool\n{\n    switch (rand(1, 3)) {\n       \
  \ case 1:\n            $this->setStatus(self::LOGIN_ACCESS, $user, $ip);\n     \
  \       $isvalid = true;\n            break;\n        case 2:\n            $this->setStatus(self::LOGIN_WRONG_PASS,\
  \ $user, $ip);\n            $isvalid = false;\n            break;\n        case\
  \ 3:\n            $this->setStatus(self::LOGIN_USER_UNKNOWN, $user, $ip);\n    \
  \        $isvalid = false;\n            break;\n    }\n    Logger::logIP($user,\
  \ $ip, $this->getStatus());\n    return $isvalid;\n}\n```\n\n出于安全考虑，系统管理员可能会要求你提供登录失败的告警通知。再次地，你不得不返回到登录方法中添加一个新的调用：\n\
  \n```\n// 清单 11.23\nif (! $isvalid) {\n    Notifier::mailWarning(\n        $user,\n\
  \        $ip,\n        $this->getStatus()\n    );\n}\n```\n\n业务开发团队可能宣布与某个特定 ISP\
  \ 合作，要求在特定用户登录时设置一个 cookie。诸如此类，不一而足。\n\n这些都是很容易满足的请求，但处理它们会以牺牲你的设计为代价。`Login` 类很快就变得与这个特定系统紧密耦合。你无法在不逐行检查代码并移除所有与旧系统相关的内容的情况下，将它抽取出来放到另一个产品中。当然，这并不太难，但随后你便走上了复制粘贴编码的道路。现在，你的系统中有两个相似但不同的\
  \ `Login` 类，你发现对一个类的改进必然需要对另一个类进行相同的修改——直到它们不可避免地、笨拙地变得彼此不一致。\n\n那么，你能做些什么来拯救 `Login`\
  \ 类呢？观察者模式在这里非常适用。\n\n### 实现\n\n观察者模式的核心是将客户端元素（观察者）从中心类（主题）解耦。当主题知道的事件发生时，观察者需要得到通知。同时，你也不希望主题与它的观察者类之间存在硬编码的关系。\n\
  \n为了实现这一点，你可以允许观察者向主题注册自身。你给 `Login` 类添加三个新方法：`attach()`、`detach()` 和 `notify()`，并通过一个名为\
  \ `Observable` 的接口来强制执行：\n\n```\n// 清单 11.24\ninterface Observable\n{\n    public\
  \ function attach(Observer $observer);\n    public function detach(Observer $observer);\n\
  \    public function notify();\n}\n// 清单 11.25\nclass Login implements Observable\n\
  {\n    private $observers = [];\n    private $storage;\n    const LOGIN_USER_UNKNOWN\
  \ = 1;\n    const LOGIN_WRONG_PASS   = 2;\n    const LOGIN_ACCESS       = 3;\n \
  \   public function attach(Observer $observer)\n    {\n        $this->observers[]\
  \ = $observer;\n    }\n    public function detach(Observer $observer)\n    {\n \
  \       $this->observers = array_filter(\n            $this->observers,\n      \
  \      function ($a) use ($observer) {\n                return (! ($a === $observer\
  \ ));\n            }\n        );\n    }\n    public function notify()\n    {\n \
  \       foreach ($this->observers as $obs) {\n            $obs->update($this);\n\
  \        }\n    }\n    // ...\n}\n```\n\n因此，`Login` 类管理一个观察者对象列表。第三方可以通过 `attach()`\
  \ 方法添加这些观察者，并通过 `detach()` 方法移除它们。调用 `notify()` 方法是为了通知观察者有关趣的事件发生了。该方法简单地遍历观察者列表，并对每个观察者调用\
  \ `update()`。\n\n`Login` 类本身从其 `handleLogin()` 方法中调用 `notify()`：\n\n```\n// 清单 11.26\n\
  public function handleLogin(string $user, string $pass, string $ip)\n{\n    switch\
  \ (rand(1, 3)) {\n        case 1:\n            $this->setStatus(self::LOGIN_ACCESS,\
  \ $user, $ip);\n            $isvalid = true;\n            break;\n        case 2:\n\
  \            $this->setStatus(self::LOGIN_WRONG_PASS, $user, $ip);\n           \
  \ $isvalid = false;\n            break;\n        case 3:\n            $this->setStatus(self::LOGIN_USER_UNKNOWN,\
  \ $user, $ip);\n            $isvalid = false;\n            break;\n    }\n    $this->notify();\n\
  \    return $isvalid;\n}\n```\n\n以下是 `Observer` 类的接口：\n\n```\n// 清单 11.27\ninterface\
  \ Observer\n{\n    public function update(Observable $observable);\n}\n```\n\n任何实现了这个接口的对象都可以通过\
  \ `attach()` 方法添加到 `Login` 类中。下面是一个具体的实例：\n\n```\n// 清单 11.28\nclass LoginAnalytics\
  \ implements Observer\n{\n    public function update(Observable $observable)\n \
  \   {\n        // not type safe!\n        $status = $observable->getStatus();\n\
  \        print __CLASS__ . \":    doing something with status info\\n\";\n    }\n\
  }\n```\n\n注意观察者对象是如何使用 `Observable` 的实例来获取关于该事件的更多信息的。这取决于主题类是否提供可供观察者查询以了解状态的方法。在这个例子中，我定义了一个名为\
  \ `getStatus()` 的方法，观察者可以调用它来获取当前状态的快照。\n\n不过，这种添加也揭示了一个问题。通过调用 `Login::getStatus()`，`LoginAnalytics`\
  \ 类假设了比其安全所能保证的更多的知识。它是在对一个 `Observable` 对象发起这个调用，但并不能保证这个对象同时也必须是 `Login` 对象。我有几个选择。我可以扩展\
  \ `Observable` 接口，加入一个 `getStatus()` 声明，并可能将其重命名为类似 `ObservableLogin` 的名字，以表明它特定于\
  \ `Login` 类型。\n\n或者，我可以让 `Observable` 接口保持通用，并让 `Observer` 类负责确保它们的主题是正确类型。它们甚至可以自己处理将自己附加到主题上的琐事。由于会有不止一种类型的\
  \ `Observer`，并且我打算执行一些对所有观察者都通用的内务管理工作，因此这里提供一个抽象超类来处理这些基础工作：\n\n\n\n```\n// listing\
  \ 11.29\nabstract class LoginObserver implements Observer\n{\nprivate $login;\n\
  public function __construct(Login $login)\n{\n$this->login = $login;\n$login->attach($this);\n\
  }\npublic function update(Observable $observable)\n{\nif ($observable === $this->login)\
  \ {\n$this->doUpdate($observable);\n}\n}\nabstract public function doUpdate(Login\
  \ $login);\n}\n```\n\n`LoginObserver`类在其构造函数中需要一个`Login`对象。它存储一个引用并调用`Login::attach()`。当`update()`被调用时，它会检查提供的`Observable`对象是否为正确的引用，然后调用模板方法`doUpdate()`。现在可以创建一套`LoginObserver`对象，它们都能确保与`Login`对象而非任意`Observable`对象配合工作：\n\
  \n```\n// listing 11.30\nclass SecurityMonitor extends LoginObserver\n{\npublic\
  \ function doUpdate(Login $login)\n{\n$status = $login->getStatus();\nif ($status[0]\
  \ == Login::LOGIN_WRONG_PASS) {\n// send mail to sysadmin\nprint __CLASS__ . \"\
  :    sending mail to sysadmin\\n\";\n}\n}\n}\n// listing 11.31\nclass GeneralLogger\
  \ extends LoginObserver\n{\npublic function doUpdate(Login $login)\n{\n$status =\
  \ $login->getStatus();\n// add login data to log\nprint __CLASS__ . \":    add login\
  \ data to log\\n\";\n}\n}\n// listing 11.32\nclass PartnershipTool extends LoginObserver\n\
  {\npublic function doUpdate(Login $login)\n{\n$status = $login->getStatus();\n//\
  \ check $ip address\n// set cookie if it matches a list\nprint __CLASS__ . \": \
  \   set cookie if it matches a list\\n\";\n}\n}\n```\n\n现在创建并附加`LoginObserver`类可以在实例化时一次性完成：\n\
  \n```\n$login = new Login();\nnew SecurityMonitor($login);\nnew GeneralLogger($login);\n\
  new PartnershipTool($login);\n```\n\n至此，我在主体类和观察者之间建立了灵活的关系。图 11-6 展示了本例的类图。\n\n\
  ![A314621_5_En_11_Fig6_HTML.gif](img/A314621_5_En_11_Fig6_HTML.gif)\n\n**图 11-6.\
  \ Observer 模式**\n\nPHP 通过内置的 SPL（标准 PHP 库）扩展提供了对 Observer 模式的原生支持。SPL 是一套帮助解决常见面向对象问题的工具集。这套面向对象瑞士军刀中的观察者部分由三个元素组成：`SplObserver`、`SplSubject`和`SplObjectStorage`。`SplObserver`和`SplSubject`是接口，与本节示例中展示的`Observer`和`Observable`接口完全对应。`SplObjectStorage`是一个实用类，旨在提供更好的对象存储和移除功能。以下是\
  \ Observer 实现的一个精简版本：\n\n```\n// listing 11.33\nclass Login implements \\SplSubject\n\
  {\nprivate $storage;\n// ...\npublic function __construct()\n{\n$this->storage =\
  \ new \\SplObjectStorage();\n}\npublic function attach(\\SplObserver $observer)\n\
  {\n$this->storage->attach($observer);\n}\npublic function detach(\\SplObserver $observer)\n\
  {\n$this->storage->detach($observer);\n}\npublic function notify()\n{\nforeach ($this->storage\
  \ as $obs) {\n$obs->update($this);\n}\n}\n// ...\n}\n// listing 11.34\nabstract\
  \ class LoginObserver implements \\SplObserver\n{\nprivate $login;\npublic function\
  \ __construct(Login $login)\n{\n$this->login = $login;\n$login->attach($this);\n\
  }\npublic function update(\\SplSubject $subject)\n{\nif ($subject === $this->login)\
  \ {\n$this->doUpdate($subject);\n}\n}\nabstract public function doUpdate(Login $login);\n\
  }\n```\n\n就`SplObserver`（原`Observer`）和`SplSubject`（原`Observable`）而言，两者之间没有实质区别——当然，我无需再声明接口，并且必须根据新名称修改类型提示。然而`SplObjectStorage`确实提供了非常有用的服务。你可能注意到，在最初的示例中，我的`Login::detach()`实现使用了`array_filter`（配合匿名函数）来查找和移除`$observers`数组中的参数对象。`SplObjectStorage`类在底层为你完成了这项工作。它实现了`attach()`和`detach()`方法，并且可以像数组一样传递给`foreach`进行迭代。\n\
  \n> **注意**  \n> 你可以在 PHP 文档 [`http://www.php.net/spl`](http://www.php.net/spl) 中了解更多关于\
  \ SPL 的信息。特别地，你会发现那里有许多迭代器工具。我在第 13 章“数据库模式”中介绍了 PHP 内置的`Iterator`接口。\n\n在`Observable`类与其`Observer`之间通信的另一种方法，是通过`update()`方法传递特定的状态信息，而不是传递主体类的实例。对于快速解决方案，我通常一开始就采用这种方法。因此，在示例中，`update()`将期望接收状态标志、用户名和\
  \ IP 地址（可能以数组形式保证可移植性），而不是`Login`实例。这让你无需在`Login`类中编写状态方法。另一方面，当主体类存储大量状态时，将其实例传递给`update()`可以为观察者提供更大的灵活性。\n\
  \n你还可以通过让`Login`类拒绝与特定观察者类（例如`LoginObserver`）之外的类型合作，来完全锁定类型。如果想这样做，你可能需要考虑在传递给`attach()`方法的对象上进行某种运行时检查；否则，你可能需要重新考虑`Observable`接口本身。\n\
  \n再次强调，我通过运行时的组合构建了一个灵活且可扩展的模型。`Login`类可以从其上下文中提取出来，无需任何限定条件即可放入完全不同的项目中。在那里，它可能与一组不同的观察者配合工作。\n\
  \n## Visitor 模式\n\n如你所见，许多模式旨在运行时构建结构，遵循组合优于继承的原则。无处不在的 Composite 模式就是这方面的一个绝佳例子。当处理对象集合时，你可能需要对结构应用各种操作，这些操作涉及与每个单独组件协作。这样的操作可以内置于组件本身中。毕竟，组件通常最适合相互调用。\n\
  \n然而这种方法并非没有问题。你并不总能预知将来需要对结构执行的所有操作。如果你逐个向类添加新操作的支持，接口可能会被不合适的职责塞满。正如你可能猜到的，Visitor\
  \ 模式解决了这些问题。\n\n\n\n### 问题\n\n回顾上一章的组合模式示例。在游戏中，我创建了一个由组件构成的军队，使得整体与局部可以互换处理。你已经看到操作可以被嵌入组件中。通常，叶对象执行操作，而组合对象则调用其子对象来执行操作：\n\
  \n```\n// 代码清单 11.35\nclass Army extends CompositeUnit\n{\npublic function bombardStrength():\
  \ int\n{\n$strength = 0;\nforeach ($this->units() as $unit) {\n$strength += $unit->bombardStrength();\n\
  }\nreturn $strength;\n}\n}\n// 代码清单 11.36\nclass LaserCanonUnit extends Unit\n{\n\
  public function bombardStrength(): int\n{\nreturn 44;\n}\n}\n```\n\n当此操作是组合类职责的核心部分时，不会存在问题。然而，还有一些更外围的任务可能并不适合放在接口中。\n\
  \n以下是一个转储叶节点文本信息的操作。它本可以被添加到抽象类 `Unit` 中：\n\n```\n// 代码清单 11.37\nabstract class\
  \ Unit\n{\n// ...\npublic function textDump($num = 0): string\n{\n$txtout = \"\"\
  ;\n$pad = 4*$num;\n$txtout .= sprintf(\"%{$pad}s\", \"\");\n$txtout .= get_class($this).\"\
  : \";\n$txtout .= \"bombard: \".$this->bombardStrength().\"\\n\";\nreturn $txtout;\n\
  }\n// ...\n}\n```\n\n这个方法随后可以在 `CompositeUnit` 类中被重写：\n\n```\n// 代码清单 11.38\nabstract\
  \ class CompositeUnit extends Unit\n{\n// ...\npublic function textDump($num = 0):\
  \ string\n{\n$txtout = parent::textDump($num);\nforeach ($this->units as $unit)\
  \ {\n$txtout .= $unit->textDump($num + 1);\n}\nreturn $txtout;\n}\n}\n```\n\n我还可以继续创建用于统计树中单元数量的方法、用于将组件保存到数据库的方法，以及用于计算军队消耗食物单位数量的方法。\n\
  \n为什么我要将这些方法包含在组合模式的接口中呢？只有一个真正有说服力的答案。我将这些不同的操作放在这里，是因为在这里操作可以轻松访问组合结构中的相关节点。\n\
  \n尽管容易遍历确实是组合模式的一部分，但这并不意味着每个需要遍历树的操作都应当在组合模式接口中占有一席之地。\n\n因此，以下是需要权衡的因素：我希望充分利用对象结构带来的简便遍历特性，但同时又不希望因此导致接口臃肿。\n\
  \n### 实现\n\n我将从接口开始。在抽象类 `Unit` 中，我定义了一个 `accept()` 方法：\n\n```\n// 代码清单 11.39\n\
  abstract class Unit\n{\n// ...\npublic function accept(ArmyVisitor $visitor)\n{\n\
  $refthis = new \\ReflectionClass(get_class($this));\n$method = \"visit\".$refthis->getShortName();\n\
  $visitor->$method($this);\n}\nprotected function setDepth($depth)\n{\n$this->depth=$depth;\n\
  }\npublic function getDepth()\n{\nreturn $this->depth;\n}\n}\n```\n\n如你所见，`accept()`\
  \ 方法期望接收一个 `ArmyVisitor` 对象作为参数。PHP 允许你动态定义要调用的 `ArmyVisitor` 方法，因此我根据当前类的名称构造了一个方法名，并在传入的\
  \ `ArmyVisitor` 对象上调用该方法。如果当前类是 `Army`，则调用 `ArmyVisitor::visitArmy()`。如果当前类是 `TroopCarrier`，则调用\
  \ `ArmyVisitor::visitTroopCarrier()`。依此类推。这让我无需在类层次结构中的每个叶节点上都实现 `accept()` 方法。趁此机会，我还添加了两个便捷方法：`getDepth()`\
  \ 和 `setDepth()`。它们可用于存储和检索单元在树中的深度。`setDepth()` 由单元的父级在将其添加到树时调用，即在 `CompositeUnit::addUnit()`\
  \ 中：\n\n```\n// 代码清单 11.40\nabstract class CompositeUnit extends Unit\n{\n// ...\n\
  public function addUnit(Unit $unit)\n{\nforeach ($this->units as $thisunit) {\n\
  if ($unit === $thisunit) {\nreturn;\n}\n}\n$unit->setDepth($this->depth+1);\n$this->units[]\
  \ = $unit;\n}\npublic function accept(ArmyVisitor $visitor)\n{\nparent::accept($visitor);\n\
  foreach ($this->units as $thisunit) {\n$thisunit->accept($visitor);\n}\n}\n}\n```\n\
  \n我在这段代码中加入了一个 `accept()` 方法。该方法先调用 `Unit::accept()` 来在传入的 `ArmyVisitor` 对象上执行相关的\
  \ `visit()` 方法，然后遍历所有子对象，对每个子对象调用 `accept()`。实际上，由于 `accept()` 覆盖了父类的操作，因此它可以实现两件事：\n\
  \n- 为当前组件调用正确的访问者方法\n- 通过 `accept()` 方法将访问者对象传递给当前元素的所有子对象（假设当前组件是组合对象）\n\n我还尚未定义\
  \ `ArmyVisitor` 的接口。`accept()` 方法应该已经给出了一些线索。访问者类将为类层次结构中的每个具体类定义 `visit()` 方法。这让我能够为不同的对象提供不同的功能。我版本的该类中还定义了一个默认的\
  \ `visit()` 方法，当实现类选择不为特定的 `Unit` 类提供专门处理时，会自动调用该方法：\n\n```\n// 代码清单 11.41\nabstract\
  \ class ArmyVisitor\n{\nabstract public function visit(Unit $node);\npublic function\
  \ visitArcher(Archer $node)\n{\n$this->visit($node);\n}\npublic function visitCavalry(Cavalry\
  \ $node)\n{\n$this->visit($node);\n}\npublic function visitLaserCanonUnit(LaserCanonUnit\
  \ $node)\n{\n$this->visit($node);\n}\npublic function visitTroopCarrierUnit(TroopCarrierUnit\
  \ $node)\n{\n$this->visit($node);\n}\npublic function visitArmy(Army $node)\n{\n\
  $this->visit($node);\n}\n}\n```\n\n现在只需提供 `ArmyVisitor` 的具体实现，就一切就绪了。以下是将简单文本转储代码重新实现为\
  \ `ArmyVisitor` 对象的样子：\n\n```\n// 代码清单 11.42\nclass TextDumpArmyVisitor extends\
  \ ArmyVisitor\n{\nprivate $text = \"\";\npublic function visit(Unit $node)\n{\n\
  $txt = \"\";\n$pad = 4*$node->getDepth();\n$txt .= sprintf(\"%{$pad}s\", \"\");\n\
  $txt .= get_class($node).\": \";\n$txt .= \"bombard: \".$node->bombardStrength().\"\
  \\n\";\n$this->text .= $txt;\n}\npublic function getText()\n{\nreturn $this->text;\n\
  }\n}\n```\n\n接下来让我们看一些客户端代码，然后逐步梳理整个过程：\n\n\n\n```php\n// listing 11.43\n$main_army\
  \ = new Army();\n$main_army->addUnit(new Archer());\n$main_army->addUnit(new LaserCanonUnit());\n\
  $main_army->addUnit(new Cavalry());\n$textdump = new TextDumpArmyVisitor();\n$main_army->accept($textdump);\n\
  print $textdump->getText();\n```\n\n这段代码产生如下输出：\n\n```\nTax levied for popp\\ch11\\\
  batch08\\Army: 1\nTax levied for popp\\ch11\\batch08\\Archer: 2\nTax levied for\
  \ popp\\ch11\\batch08\\LaserCanonUnit: 1\nTax levied for popp\\ch11\\batch08\\Cavalry:\
  \ 3\nTOTAL: 7\n```\n\n我创建了一个`Army`对象。由于`Army`是组合体，它拥有`addUnit()`方法，我用它来添加更多`Unit`对象。接着我创建了`TextDumpArmyVisitor`对象，并将其传递给`Army::accept()`。`accept()`方法构造了一个方法调用，并调用`TextDumpArmyVisitor::visitArmy()`。在本例中，我没有对`Army`对象做特殊处理，因此调用被传递给了通用的`visit()`方法。`visit()`方法接收到了`Army`对象的引用。它调用其方法（包括新增的`getDepth()`，该方法告诉任何需要了解的对象当前单元在对象层级中的深度），以生成摘要数据。`visitArmy()`调用完成后，`Army::accept()`操作会依次对其子对象调用`accept()`，并将访问者传递下去。这样，`ArmyVisitor`类就访问了树中的所有对象。\n\
  \n仅通过添加几个方法，我就创建了一种机制，可以在不破坏组合类接口、也不需要大量重复遍历代码的情况下，将新功能插入其中。\n\n在游戏中的某些格子上，军队需要缴纳税款。税务官会访问军队，对找到的每个单位征收费用。不同类型的单位税率不同。这正是利用访问者类中专用方法的好时机：\n\
  \n```php\n// listing 11.44\nclass TaxCollectionVisitor extends ArmyVisitor\n{\n\
  \    private $due = 0;\n    private $report = \"\";\n    public function visit(Unit\
  \ $node)\n    {\n        $this->levy($node, 1);\n    }\n    public function visitArcher(Archer\
  \ $node)\n    {\n        $this->levy($node, 2);\n    }\n    public function visitCavalry(Cavalry\
  \ $node)\n    {\n        $this->levy($node, 3);\n    }\n    public function visitTroopCarrierUnit(TroopCarrierUnit\
  \ $node)\n    {\n        $this->levy($node, 5);\n    }\n    private function levy(Unit\
  \ $unit, int $amount)\n    {\n        $this->report .= \"Tax levied for \" . get_class($unit);\n\
  \        $this->report .= \": $amount\\n\";\n        $this->due += $amount;\n  \
  \  }\n    public function getReport()\n    {\n        return $this->report;\n  \
  \  }\n    public function getTax()\n    {\n        return $this->due;\n    }\n}\n\
  ```\n\n在这个简单的例子中，我没有直接使用传递给各个访问方法的`Unit`对象。不过，我确实利用了这些方法的专有特性，根据发起调用的`Unit`对象的具体类型来征收不同的费用。\n\
  \n以下是一些客户端代码：\n\n```php\n// listing 11.45\n$main_army = new Army();\n$main_army->addUnit(new\
  \ Archer());\n$main_army->addUnit(new LaserCanonUnit());\n$main_army->addUnit(new\
  \ Cavalry());\n$taxcollector = new TaxCollectionVisitor();\n$main_army->accept($taxcollector);\n\
  print $taxcollector->getReport();\nprint \"TOTAL: \";\nprint $taxcollector->getTax()\
  \ . \"\\n\";\n```\n\n和之前一样，`TaxCollectionVisitor`对象被传递给`Army`对象的`accept()`方法。同样地，`Army`在对其子对象调用`accept()`之前，会先将自身的引用传递给`visitArmy()`方法。各个组件对访问者执行的操作毫不知情。它们只是配合其公共接口，每个组件都尽职尽责地根据自身类型调用对应的方法。\n\
  \n除了`ArmyVisitor`类中定义的方法外，`TaxCollectionVisitor`还提供了两个汇总方法：`getReport()`和`getTax()`。调用它们将获得你期望的数据：\n\
  \n```\nTax levied for popp\\ch11\\batch08\\Army: 1\nTax levied for popp\\ch11\\\
  batch08\\Archer: 2\nTax levied for popp\\ch11\\batch08\\LaserCanonUnit: 1\nTax levied\
  \ for popp\\ch11\\batch08\\Cavalry: 3\nTOTAL: 7\n```\n\n图 11-7 展示了本例中的参与者。\n\n![A314621_5_En_11_Fig7_HTML.gif](img/A314621_5_En_11_Fig7_HTML.gif)\n\
  \n**图 11-7.** 访问者模式\n\n### 访问者模式的问题\n\n访问者模式是另一种兼具简洁与强大的模式。然而，在部署此模式时，仍需注意几点。\n\n\
  首先，尽管访问者模式非常适合组合模式，但它实际上可以用于任何对象集合。例如，你可以将其用于一个列表，其中每个对象都存储着对其兄弟对象的引用。\n\n通过将操作外部化，你可能会冒着破坏封装性的风险。也就是说，为了让访问者能够对访问对象执行有用的操作，你可能需要暴露这些对象的内部细节。例如，你会在第一个访问者示例中看到，为了向`TextDumpArmyVisitor`对象提供信息，我被迫在`Unit`接口中添加了一个额外的方法。之前在观察者模式中，你也曾遇到过这个困境。\n\
  \n由于迭代操作与访问者对象执行的操作是分离的，因此你必须放弃一定程度的控制。例如，你很难创建一个在子节点迭代前后都执行某些操作的`visit()`方法。一个解决方法是把迭代的责任移交给访问者对象。但这样做的麻烦在于，你最终可能会在不同的访问者之间重复实现遍历代码。\n\
  \n默认情况下，我倾向于将遍历逻辑保留在被访问的类内部，但将其外部化也能为你带来一个明显的优势：你可以根据不同的访问者，以不同的方式遍历被访问的类。\n\n##\
  \ 命令模式\n\n近年来，我完成的 Web 项目几乎都会用到这个模式。命令对象最初是在图形用户界面设计的背景下提出的，但它同样适用于良好的企业应用设计，有助于分离控制器（请求和调度处理）与领域模型（应用逻辑）层级。简单来说，命令模式让系统组织得更好，也更容易扩展。\n\
  \n### 问题\n\n所有系统都必须决定如何响应用户的请求。在 PHP 中，这种决策过程通常由分散的接触点页面来处理。通过选择一个页面（例如`feedback.php`），用户清楚地表明了她所需的功能和界面。越来越多的\
  \ PHP 开发者倾向于采用单点接触的方法（我将在下一章讨论）。然而，无论是哪种情况，请求的接收者都必须将任务委托给更关注应用逻辑的层级。当用户可以向不同页面发出请求时，这种委托尤为重要。否则，项目中难免会出现重复代码。\n\
  \n那么，假设你的项目有一系列任务需要执行。特别是，系统必须允许某些用户登录，另一些用户提交反馈。你可以创建`login.php`和`feedback.php`页面来处理这些任务，实例化专门的类来完成工作。不幸的是，系统中的用户界面很少能与系统设计要完成的任务完美对应。例如，你可能需要在每个页面上都提供登录和反馈功能。如果页面必须处理许多不同的任务，那么你应该考虑将任务封装起来。这样做可以让你轻松地向系统添加新任务，并在系统的各层之间建立起一道边界。这就引出了命令模式。\n\
  \n\n\n### 实现\n\n命令对象的接口可以非常简单。它只需要一个方法：`execute()`。\n\n在图 11-8 中，我将`Command`表示为一个抽象类。在如此简单的层面上，它也可以被定义为一个接口。我倾向于为此目的使用抽象类，因为我经常发现基类还可以为其派生对象提供有用的通用功能。\n\
  \n![A314621_5_En_11_Fig8_HTML.gif](img/A314621_5_En_11_Fig8_HTML.gif)\n\n图 11-8.\
  \ Command 类\n\n命令模式中最多还有三个其他参与者：**客户端**，负责实例化命令对象；**调用者**，负责部署对象；以及**接收者**，命令在其上执行。\n\
  \n接收者可以由客户端在命令的构造函数中传入，也可以从某种工厂对象中获取。我倾向于后一种方法，保持构造函数没有参数。这样，所有`Command`对象都能以完全相同的方式实例化。\n\
  \n以下是抽象基类：\n\n```\n// listing 11.46\nabstract class Command\n{\nabstract public\
  \ function execute(CommandContext $context): bool;\n}\n```\n\n这是一个具体的`Command`类：\n\
  \n```\n// listing 11.47\nclass LoginCommand extends Command\n{\npublic function\
  \ execute(CommandContext $context): bool\n{\n$manager = Registry::getAccessManager();\n\
  $user = $context->get('username');\n$pass = $context->get('pass');\n$user_obj =\
  \ $manager->login($user, $pass);\nif (is_null($user_obj)) {\n$context->setError($manager->getError());\n\
  return false;\n}\n$context->addParam(\"user\", $user_obj);\nreturn true;\n}\n}\n\
  ```\n\n`LoginCommand`设计用于与`AccessManager`对象协同工作。`AccessManager`是一个虚构的类，负责处理用户登录系统的具体细节。请注意，`Command::execute()`方法需要一个`CommandContext`对象——这在\
  \ Alur 等人所著的《Core J2EE Patterns: Best Practices and Design Strategies》（Prentice\
  \ Hall, 2001）中被称为`RequestHelper`。这是一种机制，通过它可以将请求数据传递给`Command`对象，并将响应回传到视图层。以这种方式使用对象很有用，因为可以在不破坏接口的情况下向命令传递不同的参数。`CommandContext`本质上是一个围绕关联数组变量的对象封装，尽管它经常被扩展以执行额外的辅助任务。以下是一个简单的`CommandContext`实现：\n\
  \n```\n// listing 11.48\nclass CommandContext\n{\nprivate $params = [];\nprivate\
  \ $error = \"\";\npublic function __construct()\n{\n$this->params = $_REQUEST;\n\
  }\npublic function addParam(string $key, $val)\n{\n$this->params[$key] = $val;\n\
  }\npublic function get(string $key): string\n{\nif (isset($this->params[$key]))\
  \ {\nreturn $this->params[$key];\n}\nreturn null;\n}\npublic function setError($error):\
  \ string\n{\n$this->error = $error;\n}\npublic function getError(): string\n{\n\
  return $this->error;\n}\n}\n```\n\n因此，借助`CommandContext`对象，`LoginCommand`可以访问请求数据：提交的用户名和密码。我使用`Registry`（一个简单的类，具有用于生成通用对象的静态方法）来返回`LoginCommand`需要与之协作的`AccessManager`对象。如果`AccessManager`报告错误，命令会将错误消息存储到`CommandContext`对象中，供表示层使用，并返回`false`。如果一切顺利，`LoginCommand`只返回`true`。请注意，`Command`对象本身不执行太多逻辑。它们检查输入、处理错误状况、缓存数据，并调用其他对象来执行操作。如果你发现应用程序逻辑渗透到命令类中，这通常是应该考虑重构的信号。此类代码容易引发重复，因为它不可避免地会在命令之间复制和粘贴。你至少应该审视一下这些功能属于何处。最好将其下移到业务对象中，或者可能放入外观层。在示例中，我还缺少客户端（生成命令对象的类）和调用者（处理已生成命令的类）。在\
  \ Web 项目中，选择实例化哪个命令的最简单方法是使用请求本身中的参数。这是一个简化的客户端：\n\n```\n// listing 11.49\nclass\
  \ CommandFactory\n{\nprivate static $dir = 'commands';\npublic static function getCommand(string\
  \ $action = 'Default'): Command\n{\nif (preg_match('/\\W/', $action)) {\nthrow new\
  \ Exception(\"illegal characters in action\");\n}\n$class = __NAMESPACE__ . \"\\\
  \\commands\\\\\" . UCFirst(strtolower($action)) . \"Command\";\nif (! class_exists($class))\
  \ {\nthrow new CommandNotFoundException(\"no '$class' class located\");\n}\n$cmd\
  \ = new $class();\nreturn $cmd;\n}\n}\n```\n\n`CommandFactory`类只是查找特定的类。完全限定的类名是通过使用`CommandFactory`类自身的命名空间、字符串`'\\\
  commands\\'`以及`CommandContext`对象的`$action`参数构造的。最后一项本应从请求传递到系统中。得益于 Composer 的自动加载机制，我们无需担心显式引用类文件。如果类存在，则实例化一个对象并返回给调用者。我可以在此处添加更多错误检查，确保找到的类属于`Command`家族，并且其构造函数不期望任何参数；不过，这个版本足以满足我的需求。这种方法的优势在于，你可以随时在正确的命名空间下创建一个可发现的`Command`对象，系统会立即支持它。\n\
  \n调用者现在非常简单：\n\n```\n// listing 11.50\nclass Controller\n{\nprivate $context;\n\
  public function __construct()\n{\n$this->context = new CommandContext();\n}\npublic\
  \ function getContext(): CommandContext\n{\nreturn $this->context;\n}\npublic function\
  \ process()\n{\n$action = $this->context->get('action');\n$action = ( is_null($action)\
  \ ) ? \"default\" : $action;\n$cmd = CommandFactory::getCommand($action);\nif (!\
  \ $cmd->execute($this->context)) {\n// 处理失败情况\n} else {\n// 成功\n// 分发视图\n}\n}\n\
  }\n```\n\n以下是调用该类的代码：\n\n```\n// listing 11.51\n$controller = new Controller();\n\
  $context = $controller->getContext();\n$context->addParam('action', 'login' );\n\
  $context->addParam('username', 'bob' );\n$context->addParam('pass', 'tiddles' );\n\
  $controller->process();\nprint $context->getError();\n```\n\n\n\n在调用`Controller::process()`之前，通过设置控制器构造函数中实例化的`CommandContext`对象上的参数来模拟一个\
  \ Web 请求。`process()`方法获取`\"action\"`参数（如果没有 action 参数，则回退到字符串`\"default\"`）。该方法然后将对象实例化委托给`CommandFactory`对象。它在返回的命令上调用`execute()`。请注意控制器如何对命令的内部细节一无所知。正是这种独立于命令执行细节的特性，使得你能够在对此框架影响相对较小的情况下添加新的`Command`类。\n\
  \n这是另一个`Command`类：\n\n```\n// listing 11.52\nclass FeedbackCommand extends Command\n\
  {\npublic function execute(CommandContext $context): bool\n{\n$msgSystem = Registry::getMessageSystem();\n\
  $email = $context->get('email');\n$msg   = $context->get('msg');\n$topic = $context->get('topic');\n\
  $result = $msgSystem->send($email, $msg, $topic);\nif (! $result) {\n$context->setError($msgSystem->getError());\n\
  return false;\n}\nreturn true;\n}\n}\n```\n\n> **注意**\n> 我将在第 12 章中返回到 Command 模式，并提供一个更完整的`Command`工厂类的实现。这里呈现的执行命令的框架是另一个你将会遇到的模式的简化版本：Front\
  \ Controller。\n\n此类将响应于`\"feedback\"`动作字符串而运行，不需要在控制器或`CommandFactory`类中进行任何更改。\n\
  \n图 11-9 展示了`Command`模式的参与者。\n\n![A314621_5_En_11_Fig9_HTML.gif](img/A314621_5_En_11_Fig9_HTML.gif)\n\
  \n**图 11-9.** Command 模式参与者\n\n## Null Object 模式\n\n程序员面临的一半问题似乎都与类型有关。这就是 PHP 越来越支持方法声明和返回的类型检查的原因之一。如果处理包含错误类型的变量是一个问题，那么处理一个根本不包含任何类型的变量至少同样糟糕。这种情况经常发生，因为许多函数在无法生成有用值时会返回`null`。你可以通过在项目中使用\
  \ Null Object 模式来避免将这个问题强加给自己和他人。正如你将看到的，本章中的其他模式试图完成工作，而 Null Object 则旨在尽可能地优雅地什么都不做。\n\
  \n### 问题\n\n如果你的方法负责查找一个对象，有时除了承认失败之外别无他法。调用代码提供的信息可能已过时，或者资源可能不可用。如果失败是灾难性的，你可能会选择抛出异常。但通常，你会希望宽容一些。在这种情况下，返回一个`null`值可能看起来像是向客户端发出失败信号的好方法。\n\
  \n问题在于你的方法正在违反其契约。如果它承诺返回一个具有特定方法的对象，那么返回`null`会迫使客户端代码适应意外的情况。\n\n让我们再次回到我们的游戏。假设一个名为`TileForces`的类跟踪特定瓦片上的单位信息。我们的游戏维护系统中关于单位的本地保存信息，一个名为`UnitAcquisition`的组件负责将这些元数据转换为一个对象数组。\n\
  \n这是`TileForces`的构造函数：\n\n```\n// listing 11.53\nclass TileForces\n{\nprivate $units\
  \ = [];\nprivate $x;\nprivate $y;\nfunction __construct(int $x, int $y, UnitAcquisition\
  \ $acq)\n{\n$this->x = $x;\n$this->y = $x;\n$this->units = $acq->getUnits($this->x,\
  \ $this->y);\n}\n// ...\n}\n```\n\n`TileForces`对象几乎不做任何事情，只是将工作委托给提供的`UnitAcquisition`对象以获取一个`Unit`对象数组。让我们构建一个假的`UnitAcquisition`对象：\n\
  \n```\n// listing 11.54\nclass UnitAcquisition\n{\nfunction getUnits(int $x, int\
  \ $y): array\n{\n// 1\\. looks up x and y in local data and gets a list of unit\
  \ ids\n// 2\\. goes off to a data source and gets full unit data\n// here's some\
  \ fake data\n$army = new Army();\n$army->addUnit(new Archer());\n$found = [\nnew\
  \ Cavalry(),\nnull,\nnew LaserCanonUnit(),\n$army\n];\nreturn $found;\n}\n}\n```\n\
  \n在这个类中，我隐藏了获取`Unit`数据的过程。当然，在一个真实系统中，这里会执行一些实际的查找。我满足于直接实例化几个对象。但请注意，我在`$found`数组中嵌入了一个隐蔽的`null`值。例如，如果我们的网络游戏客户端持有的元数据与服务器上数据的状态不一致，就可能发生这种情况。\n\
  \n凭借其`Unit`对象数组，`TileForces`可以提供一些功能：\n\n```\n// listing 11.55\n// TileForces\n\
  public function firepower(): int\n{\n$power = 0;\nforeach($this->units as $unit)\
  \ {\n$power += $unit->bombardStrength();\n}\nreturn $power;\n}\n```\n\n让我们运行这段代码：\n\
  \n```\n// listing 11.56\n$acquirer = new UnitAcquisition();\n$tileforces = new TileForces(4,\
  \ 2, $acquirer);\n$power = $tileforces->firepower();\nprint \"power is {$power}\\\
  n\";\n```\n\n由于那个潜伏的`null`，这段代码会导致一个错误：\n\n```\nError: Call to a member function\
  \ bombardStrength() on null\n```\n\n`TileForces::firepower()`遍历其`$units`数组，在每个`Unit`上调用`bombardStrength()`。尝试在`null`值上调用方法当然会导致错误。\n\
  \n最显而易见的解决方案是在处理每个数组元素之前对其进行检查：\n\n```\n// listing 11.57\n// TileForces\npublic\
  \ function firepower(): int\n{\n$power = 0;\nforeach ($this->units as $unit) {\n\
  if (! is_null($unit)) {\n$power += $unit->bombardStrength();\n}\n}\nreturn $power;\n\
  }\n```\n\n单独来看，这不算什么大问题。但想象一下，如果`TileForces`在其`$units`属性中的元素上执行各种操作。一旦我们开始在多个地方重复进行`is_null()`检查，我们就会再次看到一种特定的代码坏味。通常，解决客户端代码中重复片段的方法是用多态性替换多个条件语句。我们在这里也可以这样做。\n\
  \n\n\n### 实现\n\n空对象模式让我们可以将“什么都不做”这一行为委托给一个预期类型的类。在这个例子中，我将创建一个 `NullUnit` 类。\n\n\
  ```\n// 清单 11.58\nclass NullUnit extends Unit\n{\npublic function bombardStrength():\
  \ int\n{\nreturn 0;\n}\npublic function getHealth(): int\n{\nreturn 0;\n}\npublic\
  \ function getDepth(): int {\nreturn 0;\n}\n}\n```\n\n这个 `Unit` 的实现遵循了接口，但确实什么也不做。现在，我可以修改\
  \ `UnitAcquisition`，让它创建一个 `NullUnit` 而不是返回 `null`：\n\n```\n// 清单 11.59\npublic\
  \ function getUnits(int $x, int $y): array\n{\n$army = new Army();\n$army->addUnit(new\
  \ Archer());\n$found = [\nnew Cavalry(),\nnew NullUnit(),\nnew LaserCanonUnit(),\n\
  $army\n];\nreturn $found;\n}\n```\n\n`TileForces` 中的客户端代码可以随意调用 `NullUnit` 对象上的任何方法，而不会出现任何问题或错误：\n\
  \n```\n// 清单 11.60\n// TileForces\npublic function firepower(): int {\n$power =\
  \ 0;\nforeach($this->units as $unit) {\n$power += $unit->bombardStrength();\n}\n\
  return $power;\n}\n```\n\n审视任何一个大型项目，数一数那些因返回空值的方法而被迫对程序员施加的不优雅检查的数量。如果我们更多使用空对象，又有多少这种检查可以省去呢？\n\
  \n当然，有时你需要知道自己正在处理的是一个空对象。最显而易见的方式是使用 `instanceof` 运算符来测试对象。但这甚至比原始的 `is_null()`\
  \ 调用更不优雅。\n\n或许最简洁的解决方案是，在基类（返回 `false`）和空对象（返回 `true`）中都添加一个 `isNull()` 方法：\n\n\
  ```\n// 清单 11.61\nif (! $unit->isNull()) {\n// 执行某些操作\n} else {\nprint \"null -\
  \ 无操作\\n\";\n}\n```\n\n这样我们就两全其美了。`NullUnit` 对象的任何方法都可以安全调用。并且，任何 `Unit` 对象都可以被查询其空状态。\n\
  \n## 总结\n\n在本章中，我结束了对“四人帮”模式的探讨，并着重强调了如何将事情付诸实践。我首先向你展示了如何设计一个迷你语言，并用解释器模式构建其引擎。\n\
  \n在策略模式中，你遇到了另一种使用组合来增加灵活性、减少重复子类化需求的方法。通过观察者模式，你学会了如何解决向不同且变化的组件通知系统事件的问题。你还重温了组合模式示例；并通过访问者模式，学习了如何访问树中的每个组件并对其应用多种操作。你还看到了命令模式如何帮助你构建可扩展的分层系统。最后，你借助空对象模式省去了大量空值检查工作。\n\
  \n在下一章中，我将进一步超越“四人帮”模式，探讨一些专门面向企业级编程的模式。\n\n"
- "# 12. 企业模式\n\nPHP 首先是为 Web 设计的语言。并且，由于它对对象的广泛支持，我们可以利用在其他面向对象语言（特别是 Java）背景下孵化出的模式。\n\
  \n我在本章中开发了一个示例，并用它来说明我所涵盖的模式。但请记住，选择使用某个模式，并不意味着你必须使用所有与之配合良好的模式。也不要觉得这里呈现的实现方式是部署这些模式的唯一途径。相反，你应该利用这里的示例来帮助你理解所描述模式的精髓，并可以自由地为你的项目提取所需内容。\n\
  \n由于要涵盖的材料很多，这是本书最长、最复杂的章节之一，一口气读完可能颇有挑战。本章分为引言和两个主要部分。这些分界线可以作为不错的暂停点。\n\n我还会在“架构概述”部分描述各个独立的模式。尽管这些模式在某种程度上相互依赖，但你应该能够直接跳转到任何一个特定模式，并独立地学习它，然后从容地转向相关模式。\n\
  \n本章将涵盖几个关键主题：\n\n*   架构概述：介绍通常构成企业应用的分层\n*   注册表模式：管理应用数据\n*   表示层：用于管理和响应用户请求并向用户展示数据的工具\n\
  *   业务逻辑层：触及系统的真正目的，即解决业务问题\n\n## 架构概述\n\n由于要覆盖的内容很多，让我们先概述一下即将讨论的模式，然后介绍构建分层应用的方法。\n\
  \n### 诸模式\n\n我将在本章中探讨几个模式。你可以从头到尾阅读，也可以挑选那些符合你需求或引起你兴趣的模式来深入研读：\n\n*   注册表：此模式对于使数据在进程内所有类中可用非常有用。通过谨慎使用序列化，它还可以跨会话甚至跨应用实例存储信息。\n\
  *   前端控制器：用于较大的系统，在这些系统中你知道需要尽可能灵活地管理许多不同的视图和命令。\n*   应用控制器：创建一个类来管理视图逻辑和命令选择。\n\
  *   模板视图：创建仅管理显示和用户界面的页面，以尽可能少的原始代码将动态信息整合到显示标记中。\n*   页面控制器：比前端控制器更轻量但灵活性稍差，页面控制器满足同样的需求。如果你想要快速获得结果，并且你的系统不太可能在复杂性上大幅增长，可以使用此模式来管理请求和处理视图逻辑。\n\
  *   事务脚本：当你想要快速完成任务，且只需最少的预先规划时，可以依赖过程化的库代码来处理应用逻辑。此模式的可扩展性不佳。\n*   领域模型：与事务脚本处于对立面，使用此模式为你的业务参与者和流程构建基于对象的模型。\n\
  \n> **注**  \n> 命令模式在此处不单独描述（我在第 11 章中已经介绍过）；不过，它会在前端控制器和应用控制器模式中再次出现。\n\n\n\n##\
  \ 应用与分层\n\n本章中的许多（实际上，大多数）模式旨在促进应用程序中多个不同层的独立运行。正如类代表了责任的专门化一样，企业系统的各层也是如此，尽管其粒度更粗。图\
  \ 12-1 展示了一个系统中各层的典型分解。\n\n![A314621_5_En_12_Fig1_HTML.gif](img/A314621_5_En_12_Fig1_HTML.gif)\n\
  \n图 12-1. 典型企业系统中的层级（或称层）\n\n图 12-1 所示的结构并非一成不变：其中某些层可以合并，并且根据系统的复杂程度，可以采用不同的通信策略。尽管如此，图\
  \ 12-1 展示了一个强调灵活性和可重用性的模型，许多企业应用在很大程度上都遵循它。\n\n-   **视图层**包含系统用户实际看到并与之交互的界面。它负责呈现用户请求的结果，并提供向系统发起下一个请求的机制。\n\
  -   **命令与控制层**处理来自用户的请求。基于此分析，它将履行请求所需的任何处理委托给业务逻辑层。然后，它选择最适合向用户呈现结果的视图。在实践中，此层与视图层通常会合并为一个单独的表示层。即便如此，显示的角色也应与请求处理和业务逻辑调用的角色严格分离。\n\
  -   **业务逻辑层**负责处理请求的业务。它执行所有必要的计算并组织结果数据。\n-   **数据层**将系统的其余部分与保存和获取持久化信息的机制隔离开来。在某些系统中，命令与控制层使用数据层来获取其需要处理的业务对象。在其他系统中，数据层则被尽可能地隐藏起来。\n\
  \n那么，以这种方式划分系统有何意义呢？与本书中许多其他内容一样，答案在于解耦。通过保持业务逻辑独立于视图层，您可以在几乎不需要重写的情况下为系统添加新的界面。\n\
  \n设想一个用于管理活动列表的系统（到本章结束时，这将会是一个非常熟悉的例子）。最终用户自然需要一个流畅的 HTML 界面。维护系统的管理员可能需要一个命令行界面，以便集成到自动化系统中。同时，您可能正在开发适用于手机和其他手持设备的系统版本。您甚至可能开始考虑使用\
  \ `SOAP` 或 `RESTful API`。\n\n如果您最初将系统的基础逻辑与 HTML 视图层结合在一起（这仍然是一种常见的策略），那么这些需求将会触发一次立即的重写。相反，如果您创建了一个分层的系统，则无需重新考虑业务逻辑层和数据层，就能轻松添加新的呈现策略。\n\
  \n同样，持久化策略也可能会发生变化。您应该能够切换存储模型，同时对系统中的其他层产生最小的影响。\n\n测试是创建具有独立层系统的另一个充分理由。众所周知，Web\
  \ 应用程序很难测试。在一个分层不充分的系统中，自动化测试必须在一端处理 HTML 界面，同时在另一端冒着触发对数据库进行随机查询的风险，即使它们的关注点并不在这两个领域。尽管任何测试都比没有好，但这样的测试必然是杂乱无章的。相反，在分层系统中，面向其他层的类通常被编写为继承自抽象超类或实现接口。这个超类型随后可以支持多态性。在测试环境中，整个层可以被一组虚拟对象（通常称为“桩”对象或“模拟”对象）替换。通过这种方式，您可以例如使用一个假的数据层来测试业务逻辑。您可以在第\
  \ 18 章中阅读更多关于测试的内容。\n\n即使您认为测试是给懦夫准备的，并且您的系统永远只会有单一界面，分层也仍然是有用的。通过创建具有明确职责的层，您可以构建一个各部分更易于扩展和调试的系统。通过将具有相同类型责任的代码集中在一个地方（例如，避免将数据库调用或显示策略分散在整个系统中），您可以限制代码重复。对此类系统进行添加相对容易，因为您的更改往往表现为整洁的纵向扩展，而不是混乱的横向扩展。\n\
  \n在分层系统中，一个新功能可能需要一个新的界面组件、额外的请求处理、更多的业务逻辑以及对存储机制的修改。这就是纵向变更。在非分层系统中，您添加了功能后，可能会想起有五个独立的页面引用了您修改过的数据库表。还是六个？您的界面可能被调用的地方可能有几十处，因此您需要遍历整个系统来为此添加代码。这就是横向修改。\n\
  \n当然，在现实中，您永远无法完全摆脱这类横向依赖，尤其是在处理界面中的导航元素时。然而，分层系统可以帮助最大限度地减少横向修改的需求。\n\n**注意**\n\
  \n尽管这些模式中的许多已经存在了一段时间（毕竟，模式反映了久经考验的实践），但它们的名称和边界要么来源于 Martin Fowler 关于企业模式的关键著作《企业应用架构模式》（Addison-Wesley\
  \ Professional, 2002），要么来源于 Alur 等人颇具影响力的《Core J2EE 模式：最佳实践与设计策略》（Prentice Hall,\
  \ 2001）。为了保持一致性，在两个来源出现分歧时，我倾向于使用 Fowler 的命名约定。\n\n本章中的所有示例都围绕一个虚构的列表系统展开，该系统有一个听起来很奇特的名称“Woo”，它大致代表“外面有什么”。\n\
  \n该系统的参与者包括场地（例如，剧院、俱乐部或电影院）、空间（例如，1 号屏幕或楼上舞台）和活动（例如，《漫长的美好星期五》或《认真的重要性》）。\n\n我将介绍的操作包括创建场地、为场地添加空间，以及列出系统中的所有场地。\n\
  \n请记住，本章的目的是说明关键的企业设计模式，而不是构建一个可工作的系统。鉴于设计模式相互依赖的特性，这些示例中的大多数与代码示例在很大程度上重叠，充分利用了本章其他地方讨论的基础。由于此代码主要用于演示企业模式，其中大部分并不满足生产系统所要求的所有标准。特别是，我会在可能妨碍清晰度的地方省略错误检查。您应将示例视为说明其所实现模式的手段，而不是作为框架或应用程序中的构建块。\n\
  \n## 我们在开始之前偷个懒\n\n本书中的大多数模式在企业架构的各层中都能找到自然的位置。但有些模式非常基础，以至于它们独立于这种结构之外。`注册表`模式就是一个很好的例子。实际上，`注册表`是一种突破分层所设定的约束的强大方式。它是一个例外，允许规则得以顺畅运行。\n\
  \n\n\n### 注册表（Registry）\n\n`Registry`模式旨在提供对系统级对象的访问。如今，全局变量几乎被普遍视为不良设计。但与其他“罪恶”一样，全局数据具有致命的吸引力，以至于面向对象的架构师认为有必要为其换一个新名称来重新发明它。你在第\
  \ 9 章遇到过`Singleton`模式，但单例对象确实避免了困扰全局变量的所有弊端。特别是，你不会意外覆盖单例。因此，单例是一种低脂的全局变量。尽管如此，你仍应对单例对象保持警惕，因为它们会诱使你将类锚定到系统中，从而引入耦合。\n\
  \n话虽如此，单例有时非常有用，以至于许多程序员（包括我）都无法舍弃它。\n\n### 问题\n\n如你所见，许多企业系统被划分为多个层，每个层仅通过严格定义的通道与相邻层通信。这种层分离赋予了应用程序灵活性。你可以替换或独立开发每一层，而对系统的其余部分影响最小。但问题是：当你在某一层获取的信息，稍后需要在另一个非相邻层中使用时，该怎么办？\n\
  \n假设我在`ApplicationHelper`类中获取配置数据：\n\n```\n// listing 12.01\nclass ApplicationHelper\n\
  {\npublic function getOptions(): array\n{\n$optionfile = __DIR__ . \"/data/woo_options.xml\"\
  ;\nif (! file_exists($optionfile)) {\nthrow new AppException(\"Could not find options\
  \ file\");\n}\n$options = simplexml:load_file($optionfile);\n$dsn = (string) $options->dsn;\n\
  // 现在我们要如何处理这个数据？\n// ...\n}\n}\n```\n\n获取信息很容易，但我要如何将其传递到稍后需要它的数据层？以及其他所有需要分发到整个系统的配置信息呢？\n\
  \n一种答案是：将这些信息在系统中从一个对象传递到另一个对象：从负责处理请求的控制器对象，到业务逻辑层的对象，最后到负责与数据库通信的对象。\n\n这完全可行。实际上，你可以直接传递`ApplicationHelper`对象本身，或者传递一个更专门的`Context`对象。无论哪种方式，上下文信息都会通过系统各层传输到需要它的对象。\n\
  \n但权衡是，为了做到这一点，你必须修改所有中继上下文对象的接口，无论它们是否需要使用它。显然，这在某种程度上破坏了松耦合。\n\n`Registry`模式提供了一种替代方案，但它也自有其后果。\n\
  \n注册表就是一个通过静态方法（或通过单例上的实例方法）提供对数据（通常但不仅仅是对象）访问的类。因此，系统中的每个对象都可以访问这些对象。\n\n术语“Registry”源自\
  \ Fowler 的《企业应用架构模式》；但与其他模式一样，其实现无处不在。在《程序员修炼之道：从小工到专家》（Addison-Wesley Professional,\
  \ 1999）中，David Hunt 和 David Thomas 将注册表类比作警局的事件公告板。一班警探将证据和草图留在公告板上，然后由另一班新警探取用。我也见过`Registry`模式被称为白板或黑板。\n\
  \n### 实现\n\n图 12-2 展示了一个存储并提供`Request`对象的`Registry`对象。\n\n![A314621_5_En_12_Fig2_HTML.gif](img/A314621_5_En_12_Fig2_HTML.gif)\n\
  \n图 12-2. 一个简单的注册表\n\n这是该类的代码形式：\n\n```\n// listing 12.02\nclass Registry\n{\nprivate\
  \ static $instance = null;\nprivate $request;\nprivate function __construct()\n\
  {\n}\npublic static function instance(): self\n{\nif (is_null(self::$instance))\
  \ {\nself::$instance = new self();\n}\nreturn self::$instance;\n}\npublic function\
  \ getRequest(): Request\n{\nif (is_null($this->request)) {\n$this->request = new\
  \ Request();\n}\nreturn $this->request;\n}\n}\n// listing 12.03\nclass Request\n\
  {\n}\n```\n\n然后你可以从系统的任何部分访问同一个`Request`对象：\n\n```\n// listing 12.04\n$reg = Registry::instance();\n\
  print_r($reg->getRequest());\n```\n\n如你所见，`Registry`只是一个单例（如果需要复习单例类，请参见第 9 章）。代码通过`instance()`方法创建并返回`Registry`类的唯一实例。然后可以用它来获取`Request`对象。\n\
  \n我曾有过不顾风险使用基于键的系统的经历，如下所示：\n\n```\n// listing 12.05\nclass Registry\n{\nprivate\
  \ static $instance=null;\nprivate $values = [];\nprivate function __construct()\n\
  {\n}\npublic static function instance(): self\n{\nif (is_null(self::$instance))\
  \ {\nself::$instance = new self();\n}\nreturn self::$instance;\n}\npublic function\
  \ get(string $key)\n{\nif (isset($this->values[$key])) {\nreturn $this->values[$key];\n\
  }\nreturn null;\n}\npublic function set(string $key, $value)\n{\n$this->values[$key]\
  \ = $value;\n}\n}\n```\n\n这里的好处是，你不需要为每个要存储和提供的对象创建方法。但缺点是，你通过后门重新引入了全局变量。使用任意字符串作为存储对象的键意味着，没有什么能阻止系统的一部分在添加对象时覆盖键/值对。我发现，在开发期间使用这种类似映射的结构很有用，然后在我明确需要存储和检索的数据后，再转向使用显式命名的方法。\n\
  \n注意\n\n`Registry`模式并不是管理系统所需服务的唯一方式。在第 10 章中，我们介绍了一种类似的策略，名为依赖注入，它被用在像 Symfony\
  \ 这样的流行框架中。\n\n你也可以使用注册表对象作为系统中常见对象的工厂。`Registry`类不存储提供的对象，而是创建一个实例并缓存引用。它可能还在后台做一些设置工作，比如从配置文件中检索数据或组合多个对象：\n\
  \n```\n// listing 12.06\n// class Registry\nprivate $treeBuilder = null;\nprivate\
  \ $conf = null;\n// ...\npublic function treeBuilder(): TreeBuilder\n{\nif (is_null($this->treeBuilder))\
  \ {\n$this->treeBuilder = new TreeBuilder($this->conf()->get('treedir'));\n}\nreturn\
  \ $this->treeBuilder;\n}\npublic function conf(): Conf\n{\nif (is_null($this->conf))\
  \ {\n$this->conf = new Conf();\n}\nreturn $this->conf;\n}\n```\n\n`TreeBuilder`和`Conf`只是用来演示要点的哑类。需要`TreeBuilder`对象的客户端类可以简单地调用`Registry::treeBuilder()`，而无需关心初始化的复杂性。这些复杂性可能包括应用程序级数据（如哑`Conf`对象），系统中的大多数类应该与它们隔离。\n\
  \n注册表对象也有助于测试。静态方法`instance()`可用于提供`Registry`类的子类，并预装入虚拟对象。以下是我可能如何修改`instance()`以实现这一点：\n\
  \n\n\n```\n// listing 12.07\n// class Registry\nprivate static $testmode = false;\n\
  // ...\npublic static function testMode(bool $mode = true)\n{\nself::$instance =\
  \ null;\nself::$testmode = $mode;\n}\npublic static function instance(): self\n\
  {\nif (is_null(self::$instance)) {\nif (self::$testmode) {\nself::$instance = new\
  \ MockRegistry();\n} else {\nself::$instance = new self();\n}\n}\nreturn self::$instance;\n\
  }\n```\n\n当您需要全面测试系统时，可以使用测试模式切换为伪造的注册表。它可以提供桩（stub，用于模拟真实测试环境的对象）或模拟对象（mock，既能分析对其发起的调用，又能评估调用正确性的类似对象）：\n\
  \n```\n// listing 12.08\nRegistry::testMode();\n$mockreg = Registry::instance();\n\
  ```\n\n您可以在第 18 章中了解更多关于模拟对象和桩对象的内容。\n\n### 注册表、作用域与 PHP\n\n\"作用域\"（scope）一词通常用于描述对象或值在代码结构上下文中的可见性。变量的生命周期也可以从时间维度来衡量。从这个意义上讲，您可以考虑三种作用域级别。标准的是\
  \ HTTP 请求覆盖的时间段。PHP 还内置支持会话变量。这些变量会在请求结束时被序列化并保存到文件系统或数据库中，然后在下一个请求开始时恢复。存储在 Cookie\
  \ 中或通过查询字符串传递的会话 ID 用于跟踪会话所有者。因此，您可以将某些变量视为具有会话作用域。您可以通过在请求之间存储一些对象来利用这一点，从而省去一次数据库查询。显然，您需要小心，避免最终出现同一个对象的多个版本，因此当您检查一个也存在于数据库中的对象并将其存入会话时，可能需要考虑一种锁定策略。\n\
  \n在其他语言中（尤其是 Java 和运行在 `ModPerl` Apache 模块上的 Perl），存在\"应用程序作用域\"（application scope）的概念。处于该作用域内的变量适用于应用程序的所有实例。这对\
  \ PHP 来说相当陌生；但在大型应用中，能够访问一个应用级全局空间来获取配置变量，可能会被认为是有用的。\n\n在本书的先前版本中，我演示了会话作用域和应用作用域注册表类的示例；但自从我第一次编写那段示例代码以来的大约十年间，我从未需要过除请求作用域注册表之外的任何其他类型。这种按请求处理的方式存在初始化成本，但您通常会使用缓存策略来管理它。\n\
  \n### 影响\n\n`Registry` 对象使其数据全局可访问。这意味着任何作为注册表客户端的类都会表现出一种未在其接口中声明的依赖关系。如果您开始依赖\
  \ `Registry` 对象来处理系统中的大量数据，这可能会成为一个严重的问题。最好谨慎使用 `Registry` 对象，仅将其用于一组明确定义的数据项。\n\
  \n### 表示层\n\n当请求到达您的系统时，您必须解释其所携带的需求，调用所需的任何业务逻辑，最后返回一个响应。对于简单的脚本，整个过程通常完全在视图本身内部完成，只有重量级的逻辑和持久化代码被分离到库中。\n\
  \n> **注意：** 视图是视图层中的单个元素。它可以是一个 PHP 页面（或由多个组合视图元素构成的集合），其主要职责是显示数据，并提供用户生成新请求的机制。也可以是一个像\
  \ `Twig` 这样的系统中的模板。\n\n随着系统规模的增长，这种默认策略会变得越来越不可行，因为请求处理、业务逻辑调用和视图分发逻辑必然会在各个视图之间重复。\n\
  \n在本节中，我将探讨管理表示层这三项关键职责的策略。由于视图层与命令控制层之间的界限通常相当模糊，因此将它们统一放在\"表示层\"这个通用术语下一起讨论是合理的。\n\
  \n### 前端控制器\n\n这种模式与传统的、具有多个入口点的 PHP 应用程序截然相反。前端控制器模式为所有传入请求提供一个中心访问点，最终委托视图来执行向用户呈现结果的任务。这是\
  \ Java 企业社区中的一个关键模式。`Core J2EE Patterns: Best Practices and Design Strategies` 对此有非常详细的介绍，该书至今仍是最具影响力的企业模式资源之一。这种模式在\
  \ PHP 社区中并非普遍受欢迎，部分原因在于初始化有时会带来开销。\n\n我编写的大多数系统都倾向于使用前端控制器。也就是说，我可能不会从一开始就部署完整的模式，但我清楚如果未来需要它提供的灵活性，应该如何将项目演进为前端控制器实现所需采取的步骤。\n\
  \n### 问题所在\n\n当请求在系统的多个点被处理时，很难避免代码中的重复。您可能需要验证用户身份、将术语翻译成不同语言，或者仅仅是访问通用数据。当一个请求跨视图需要执行通用操作时，您可能会发现自己反复复制粘贴代码。这会使修改变得困难，因为一个简单的改动可能需要在系统的多个位置进行部署。因此，代码的某些部分很容易与其他部分变得不一致。当然，第一步可能是将通用操作集中到库代码中，但您仍然需要在系统各处分布调用这些库函数或方法。\n\
  \n另一个可能出现在控制分散在各视图中的系统里的问题，是难以管理视图到视图的流转。在一个复杂系统中，根据输入以及在逻辑层执行的操作是否成功，一个视图中的提交可能导致任意数量的结果页面。视图之间的转发可能会变得混乱，特别是当同一个视图可能在不同流程中被使用时。\n\
  \n\n### 实现\n\n核心而言，前端控制器模式为每个请求定义了一个统一的入口点。它处理请求，并据此选择要执行的操作。这些操作通常被封装在专门的 `command`\
  \ 对象中，这些对象遵循命令模式进行组织。\n\n图 12-3 展示了前端控制器实现的概览。\n\n![A314621_5_En_12_Fig3_HTML.gif](img/A314621_5_En_12_Fig3_HTML.gif)\n\
  \n图 12-3. 一个 `Controller` 类与命令层次结构\n\n实际上，你可能会部署一些辅助类来简化流程，但我们先从核心参与者开始。下面是一个简单的\
  \ `Controller` 类：\n\n```\n// 清单 12.09\nclass Controller\n{\nprivate $reg;\nprivate\
  \ function __construct()\n{\n$this->reg = Registry::instance();\n}\npublic static\
  \ function run()\n{\n$instance = new Controller();\n$instance->init();\n$instance->handleRequest();\n\
  }\nprivate function init()\n{\n$this->reg->getApplicationHelper()->init();\n}\n\
  private function handleRequest()\n{\n$request = $reg->getRequest();\n$resolver =\
  \ new CommandResolver();\n$cmd = $resolver->getCommand($request);\n$cmd->execute($request);\n\
  }\n}\n```\n\n虽然代码已简化且缺乏错误处理，但 `Controller` 类本身并无更多内容。控制器位于系统的顶端，将工作委派给其他类。正是这些其他类完成了大部分实际工作。`run()`\
  \ 只是一个便捷方法，用于调用 `init()` 和 `handleRequest()`。它是静态方法，且构造函数是私有的，因此客户端代码唯一的选择就是启动整个系统的执行。我通常在一个名为\
  \ `index.php` 的文件中实现这一点，该文件只包含几行代码：\n\n```\n// 清单 12.10\nrequire_once(__DIR__ .\
  \ \"/../../../vendor/autoload.php\");\nuse \\popp\\ch12\\batch05\\Controller;\n\
  Controller::run();\n```\n\n请注意那个看起来不太美观的 `require` 语句。它的存在仅仅是为了让系统其余部分无需显式包含文件。`autoload.php`\
  \ 脚本由 Composer 自动生成，它管理着按需加载类文件的逻辑。如果你对此不太理解，也不必担心；我们会在第 16 章更详细地探讨自动加载。\n\n在 PHP\
  \ 中，`init()` 和 `handleRequest()` 方法之间的区别实际上只是类别上的。在某些语言中，`init()` 仅在应用程序启动时运行，而\
  \ `handleRequest()` 或其等效方法则为每个用户请求运行。即使每次请求都会调用 `init()`，此类也遵循了设置与请求处理之间的区分。\n\n\
  `init()` 方法通过 `Registry` 类（由 Controller 的 `$reg` 属性引用）调用一个名为 `ApplicationHelper`\
  \ 的类。`ApplicationHelper` 类管理整个应用程序的配置数据。`Controller::init()` 调用了 `ApplicationHelper`\
  \ 中的一个方法（也称为 `init()`），该方法会初始化应用程序所用的数据。\n\n`handleRequest()` 方法使用 `CommandResolver`\
  \ 来获取一个 `Command` 对象，然后通过调用 `Command::execute()` 来执行该对象。\n\n##### ApplicationHelper\n\
  \n`ApplicationHelper` 类对于前端控制器并非必需。不过，大多数实现都需要获取基本配置数据，因此我需要为此制定一个策略。下面是一个简单的 `ApplicationHelper`：\n\
  \n```\n// 清单 12.11\nclass ApplicationHelper\n{\nprivate $config = __DIR__ . \"/data/woo_options.ini\"\
  ;\nprivate $reg;\npublic function __construct()\n{\n$this->reg = Registry::instance();\n\
  }\npublic function init()\n{\n$this->setupOptions();\nif (isset($_SERVER['REQUEST_METHOD']))\
  \ {\n$request = new HttpRequest();\n} else {\n$request = new CliRequest();\n}\n\
  $this->reg->setRequest($request);\n}\nprivate function setupOptions()\n{\nif (!\
  \ file_exists($this->config)) {\nthrow new AppException(\"Could not find options\
  \ file\");\n}\n$options = parse_ini_file($this->config, true);\n$conf = new Conf($options['config']);\n\
  $this->reg->setConf($conf);\n$commands = new Conf($options['commands']);\n$this->reg->setCommands($commands);\n\
  }\n}\n```\n\n这个类简单地读取一个配置文件，并将各种对象添加到注册表中，从而使整个系统能够访问它们。`init()` 方法调用了一个私有方法 `setupOptions()`，它读取一个\
  \ `.ini` 文件，然后将两个数组（每个数组都封装在名为 `Conf` 的类实例中）传递给 `Registry` 对象。`Conf` 类只有 `get()`\
  \ 和 `set()` 方法——尽管更复杂的配置类可能会管理文件的搜索和解析以及数据管理。其中一个 `Conf` 数组用于存放通用配置值，并通过 `Registry::setConf()`\
  \ 传入。另一个数组用于将 URL 路径映射到 `Command` 类，我通过 `Registry::setCommands()` 传入。\n\n`init()`\
  \ 方法还会尝试判断应用程序是在 Web 环境还是命令行环境中运行（通过检查 `$_SERVER['REQUEST_METHOD']` 是否存在）。根据测试结果，它会将一个特定的\
  \ `Request` 子类传递给 `Registry` 对象。\n\n由于 `Registry` 类几乎只负责存储和提供对象，其源代码清单并不令人兴奋。但为了完整性，以下是\
  \ `ApplicationHelper` 使用或间接涉及的额外 `Registry` 方法：\n\n```\n// 清单 12.12\n// 必须由某个更智能的组件初始化\n\
  public function setRequest(Request $request)\n{\n$this->request = $request;\n}\n\
  public function getRequest(): Request\n{\nif (is_null($this->request)) {\nthrow\
  \ new \\Exception(\"No Request set\");\n}\nreturn $this->request;\n}\npublic function\
  \ getApplicationHelper(): ApplicationHelper\n{\nif (is_null($this->applicationHelper))\
  \ {\n$this->applicationHelper = new ApplicationHelper();\n}\nreturn $this->applicationHelper;\n\
  }\npublic function setConf(Conf $conf)\n{\n$this->conf = $conf;\n}\npublic function\
  \ getConf(): Conf\n{\nif (is_null($this->conf)) {\n$this->conf = new Conf();\n}\n\
  return $this->conf;\n}\npublic function setCommands(Conf $commands)\n{\n$this->commands\
  \ = $commands;\n}\npublic function getCommands(): Conf\n{\nreturn $this->commands;\n\
  }\n```\n\n以下是一个简单的配置文件：\n\n```\n[config]\ndsn=sqlite:/var/popp/src/ch12/batch05/data/woo.db\n\
  [commands]\n/=\\popp\\ch12\\batch05\\DefaultCommand\n```\n\n\n\n##### `CommandResolver`\n\
  \n控制器需要决定如何解释 HTTP 请求，以便调用正确的代码来处理该请求。虽然你可以轻松地将此逻辑放在 `Controller` 类本身中，但我更倾向于为此使用专门的类。这样，在必要时可以轻松地重构为多态形式。\n\
  \n前端控制器通常通过运行 `Command` 对象来调用应用程序逻辑（我在第 11 章介绍了 `Command` 模式）。`Command` 是根据请求 URL\
  \ 选择的（使用 URL 路径，或者较少见的 GET 参数）。无论哪种方式，最终都会得到一个可用于选择 `Command` 的令牌或模式。不止有一种方法可以使用\
  \ URL 来选择命令。例如，你可以根据配置文件或数据结构来测试令牌（逻辑策略）。或者，你可以直接在文件系统上针对类文件进行测试（物理策略）。\n\n上一章中你看到了一个使用物理策略的命令工厂示例。这次，我将采用逻辑方法，将\
  \ URL 片段映射到 `Command` 类：\n\n```php\n// listing 12.13\nclass CommandResolver\n{\n\
  private static $refcmd = null;\nprivate static $defaultcmd = DefaultCommand::class;\n\
  public function __construct()\n{\n// 可以将其设置为可配置\nself::$refcmd = new \\ReflectionClass(Command::class);\n\
  }\npublic function getCommand(Request $request): Command\n{\n$reg = Registry::instance();\n\
  $commands = $reg->getCommands();\n$path = $request->getPath();\n$class = $commands->get($path);\n\
  if (is_null($class)) {\n$request->addFeedback(\"路径 '$path' 不匹配\");\nreturn new self::$defaultcmd();\n\
  }\nif (! class_exists($class)) {\n$request->addFeedback(\"类 '$class' 未找到\");\nreturn\
  \ new self::$defaultcmd();\n}\n$refclass = new \\ReflectionClass($class);\nif (!\
  \ $refclass->isSubClassOf(self::$refcmd)) {\n$request->addFeedback(\"命令 '$refclass'\
  \ 不是一个 Command\");\nreturn new self::$defaultcmd();\n}\nreturn $refclass->newInstance();\n\
  }\n}\n```\n\n这个简单的类从注册表中获取一个 `Conf` 对象，并使用 URL 路径（由 `Request::getPath()` 方法提供）来尝试获取一个类名。如果找到类名，并且该类存在且扩展了\
  \ `Command` 基类，则实例化并返回它。\n\n如果这些条件中的任何一个不满足，`getCommand()` 方法会通过提供一个默认的 `Command`\
  \ 对象来优雅降级。\n\n更复杂的实现（例如，Silex 和 Symfony 中路由逻辑所使用的实现）将允许在这些路径中使用通配符。\n\n你可能会问，为什么这段代码会信任它找到的\
  \ `Command` 类不需要参数：\n\n```php\nreturn $refclass->newInstance();\n```\n\n答案在于 `Command`\
  \ 类本身的签名：\n\n```php\n// listing 12.14\nabstract class Command\n{\nfinal public function\
  \ __construct()\n{\n}\npublic function execute(Request $request)\n{\n$this->doExecute($request);\n\
  }\nabstract public function doExecute(Request $request);\n}\n```\n\n通过将构造函数方法声明为\
  \ `final`，我使得子类无法重写它。因此，没有 `Command` 类需要为其构造函数提供参数。\n\n在创建命令类时，你应该小心，尽可能让它们不包含应用程序逻辑。一旦它们开始处理应用程序类型的事情，你会发现它们变成了一种混乱的事务脚本，重复代码很快就会渗入。命令是一种中继站：它们应该解释请求、调用领域层来操作一些对象，然后为表示层存放数据。一旦它们开始做比这更复杂的事情，可能就是重构的时候了。好消息是重构相对容易。发现命令试图做太多事情并不难，解决方案通常也很明确：将该功能下移到辅助类或领域类中。\n\
  \n##### `Request`\n\n请求由 PHP 为我们神奇地处理，并整齐地打包在超全局数组中。你可能已经注意到，我仍然使用一个类来表示请求。一个 `Request`\
  \ 对象被传递给 `CommandResolver`，然后再传递给 `Command`。\n\n我为什么不让这些类直接查询 `$_REQUEST`、`$_POST`\
  \ 或 `$_GET` 数组呢？当然可以这样做，但通过将请求操作集中在一个地方，我开启了新的可能性。\n\n例如，你可以对传入的请求应用过滤器。或者，如下一个示例所示，你可以从\
  \ HTTP 请求之外的其他地方收集请求参数，从而允许从命令行或测试脚本运行应用程序。\n\n`Request` 对象也是一个有用的存储库，用于存放需要传递给视图层的数据。实际上，许多系统为此目的提供了单独的\
  \ `Response` 对象，但这里我们会保持精简。\n\n下面是一个简单的 `Request` 超类：\n\n```php\n// listing 12.15\n\
  abstract class Request\n{\nprotected $properties;\nprotected $feedback = [];\nprotected\
  \ $path = \"/\";\npublic function __construct()\n{\n$this->init();\n}\nabstract\
  \ public function init();\npublic function setPath(string $path)\n{\n$this->path\
  \ = $path;\n}\npublic function getPath(): string\n{\nreturn $this->path;\n}\npublic\
  \ function getProperty(string $key)\n{\nif (isset($this->properties[$key])) {\n\
  return $this->properties[$key];\n}\nreturn null;\n}\npublic function setProperty(string\
  \ $key, $val)\n{\n$this->properties[$key] = $val;\n}\npublic function addFeedback(string\
  \ $msg)\n{\narray_push($this->feedback, $msg);\n}\npublic function getFeedback():\
  \ array\n{\nreturn $this->feedback;\n}\npublic function getFeedbackString($separator\
  \ = \"\\n\"): string\n{\nreturn implode($separator, $this->feedback);\n}\npublic\
  \ function clearFeedback()\n{\n$this->feedback = [];\n}\n}\n```\n\n如你所见，这个类的大部分内容都用于设置和获取属性的机制。`init()`\
  \ 方法负责填充私有的 `$properties` 数组，这将在子类中处理。值得注意的是，这个示例实现忽略了请求方法——在现实世界中你绝不会想这样做。一个完整的实现应该管理\
  \ `GET`、`POST` 和 `PUT` 数组，并提供一个统一的查询机制。一旦你有了一个 `Request` 对象，你应该能够通过 `getProperty()`\
  \ 方法访问参数，该方法接受一个键字符串并返回对应的值（存储在 `$properties` 数组中）。你也可以通过 `setProperty()` 添加数据。\n\
  \n该类还管理一个 `$feedback` 数组。这是一个简单的通道，控制器类可以通过它向用户传递消息。在更完整的实现中，我们很可能需要区分错误消息和信息性消息。\n\
  \n你可能记得 `ApplicationHelper` 实例化了 `HttpRequest` 和 `CliRequest` 中的一个。以下是第一个：\n\n```php\n\
  // listing 12.16\nclass HttpRequest extends Request\n{\npublic function init()\n\
  {\n// 我们为了方便忽略了 POST/GET 等区别\n// 在现实世界中不要这样做！\n$this->properties = $_REQUEST;\n\
  $this->path = $_SERVER['PATH_INFO'];\n$this->path = (empty($this->path)) ? \"/\"\
  \ : $this->path;\n}\n}\n```\n\n`CliRequest` 从命令行获取参数对，形式为 `key=value`，并将它们分解为属性。它还会检测带有\
  \ `path:` 前缀的参数，并将提供的值赋给对象的 `$path` 属性：\n\n```php\n// listing 12.17\nclass CliRequest\
  \ extends Request\n{\npublic function init()\n{\n$args = $_SERVER['argv'];\nforeach\
  \ ($args as $arg) {\nif (preg_match(\"/^path:(\\S+)/\", $arg, $matches)) {\n$this->path\
  \ = $matches[1];\n} else {\nif (strpos($arg, '=')) {\nlist($key, $val) = explode(\"\
  =\", $arg);\n$this->setProperty($key, $val);\n}\n}\n}\n$this->path = (empty($this->path))\
  \ ? \"/\" : $this->path ;\n}\n}\n```\n\n\n\n##### 一个命令\n\n你已经见过`Command`基类，第 11\
  \ 章已经详细介绍了命令模式，因此无需再深入探讨命令。不过，让我们用一个简单具体的`Command`对象来做个收尾：\n\n```\n// 清单 12.18\n\
  class DefaultCommand extends Command\n{\npublic function doExecute(Request $request)\n\
  {\n$request->addFeedback(\"欢迎来到 WOO\");\ninclude(__DIR__ . \"/main.php\");\n}\n\
  }\n```\n\n这个`Command`对象是在未收到对某个特定`Command`的明确请求时，由`CommandResolver`提供的。\n\n你可能已经注意到，抽象基类自己实现了`execute()`方法，该方法会向下调用其子类的`doExecute()`实现。这样一来，我们只需修改基类，就能为所有命令添加设置和清理代码。\n\
  \n`execute()`方法接收一个`Request`对象，该对象提供了对用户输入以及`setFeedback()`方法的访问。`DefaultCommand`利用这一点来设置一条欢迎消息。\n\
  \n最后，该命令通过调用`include()`将控制权分发到视图。将命令到视图的映射嵌入到`Command`类中是最简单的分发机制；但对于小型系统来说，它可能完全够用。更灵活的策略可以在“应用程序控制器”部分找到。\n\
  \n文件`main.php`包含一些 HTML 代码以及对`Request`对象的一次调用，用于检查是否有任何反馈（稍后我将更详细地介绍视图）。现在，所有组件都已就位，可以运行系统了。以下是输出：\n\
  \n```\n\nWoo! 这是 WOO！\n\n欢迎来到 WOO\n\n```\n\n如你所见，默认命令设置的反馈消息已经出现在输出中。让我们回顾一下得出这一结果的完整流程。\n\
  \n##### 概述\n\n本节中介绍的类的细节可能会掩盖前端控制器模式的简洁性。图 12-4 展示了一个说明请求生命周期的时序图。\n\n![A314621_5_En_12_Fig4_HTML.gif](img/A314621_5_En_12_Fig4_HTML.gif)\n\
  \n图 12-4. 运行中的前端控制器\n\n如你所见，前端控制器将初始化工作委托给`ApplicationHelper`对象（该对象可以使用缓存来缩短任何昂贵的设置过程）。然后，`Controller`从`CommandResolver`对象获取一个`Command`对象。最后，它调用`Command::execute()`来启动应用程序逻辑。\n\
  \n在此模式实现中，`Command`自身负责将任务委托给视图层。你可以在下一节中看到对此的改进。\n\n### 影响\n\n前端控制器并非为胆小者设计。它确实需要在看到收益之前投入大量的前期开发工作。如果你的项目需要快速交付，或者项目规模小到前端控制器框架比系统其余部分还要重，那么这是一个严重的缺点。\n\
  \n话虽如此，一旦你在一个项目中成功部署了前端控制器，你会发现你可以用惊人的速度将其复用于其他项目。你可以将其大部分功能抽象到库代码中，从而有效地为自己构建一个可重用的框架。\n\
  \n所有配置信息必须在每次请求时加载，这是另一个缺点。所有方法在某种程度上都会受到这个问题的影响，但前端控制器通常需要额外的信息，例如命令和视图的逻辑映射。\n\
  \n通过缓存此类数据，可以大大减轻这种开销。最高效的做法是将这些数据作为原生 PHP 代码添加到你的系统中。如果你是系统的唯一维护者，这没问题；但如果你有非技术用户，你可能需要提供一个配置文件。不过，你仍然可以通过创建一个系统来使原生\
  \ PHP 方法自动化，该系统读取配置文件，然后构建 PHP 数据结构，并将其写入缓存文件。一旦创建了原生 PHP 缓存，系统会优先使用它而不是配置文件，直到进行更改并需要重建缓存。\n\
  \n从好的方面来看，前端控制器集中了系统的表示逻辑。这意味着你可以在一个地方（好吧，至少是在一组类中）控制请求的处理方式和视图的选择方式。这减少了重复，并降低了出现\
  \ Bug 的可能性。\n\n前端控制器还具有很强的可扩展性。一旦你有了一个核心并使其运行，你就可以非常轻松地添加新的`Command`类和视图。\n\n在本示例中，命令处理它们自己的视图分发。如果你将前端控制器模式与一个有助于视图（以及可能的命令）选择的对象结合使用，那么该模式就能对导航进行出色的控制，而当表示控制分散在整个系统中时，这种控制很难优雅地维护。我将在下一节介绍这样一个对象。\n\
  \n### 应用程序控制器\n\n允许命令调用它们自己的视图对于较小的系统来说是可以接受的，但这并不理想。最好尽可能地将你的命令与视图层解耦。\n\n应用程序控制器负责将请求映射到命令，并将命令映射到视图。这种解耦意味着在无需更改代码库的情况下，切换不同的视图集变得更加容易。它还允许系统所有者更改应用程序的流程，同样无需触及任何内部代码。通过支持命令解析的逻辑系统，该模式也使得同一个命令在系统中的不同上下文中使用变得更加容易。\n\
  \n### 问题\n\n记住示例问题的性质。管理员需要能够向系统添加一个场地，并将一个空间与之关联。因此，系统可能支持`AddVenue`和`AddSpace`命令。根据到目前为止的示例，这些命令将使用从路径（`/addvenue`）到类（`AddVenue`）的直接映射进行选择。\n\
  \n广义上讲，对`AddVenue`命令的成功调用应会导致对`AddSpace`命令的初始调用。这种关系可能被硬编码到类本身中，即`AddVenue`在成功时调用`AddSpace`。然后，`AddSpace`可能包含一个视图，该视图包含用于将空间添加到场地的表单。\n\
  \n两个命令都可能与至少两个不同的视图相关联：一个用于呈现输入表单的核心视图，以及一个错误或“感谢”屏幕。根据已经讨论过的逻辑，`Command`类本身会包含这些视图（通过使用条件测试来决定在何种情况下显示哪个视图）。\n\
  \n只要命令始终以相同的方式被使用，这种程度的硬编码是可以接受的。但是，如果我希望在某些情况下为`AddVenue`设置一个特殊的视图，并且我希望更改一个命令导致另一个命令的逻辑（例如，一个流程可能在成功的场地添加和开始空间添加之间包含一个额外的屏幕），那么它就开始失效了。如果你的每个命令只使用一次，与其他命令保持一种关系，并且只使用一个视图，那么你应该对命令之间的关系及其视图进行硬编码。否则，你应该继续阅读。\n\
  \n一个应用程序控制器类可以接管这个逻辑，从而释放`Command`类的压力，让它们专注于自己的工作：处理输入、调用应用程序逻辑以及处理任何结果。\n\n\n\n\
  ### 实现\n\n一如既往，该模式的关键在于接口。应用控制器是一个类（或一组类），前端控制器可使用它根据用户请求获取命令，并在命令执行后找到要呈现的正确视图。图\
  \ 12-5 展示了这种关系的基本框架。\n\n![A314621_5_En_12_Fig5_HTML.gif](img/A314621_5_En_12_Fig5_HTML.gif)\n\
  \n图 12-5.\n\n应用控制器模式\n\n与本章中的所有模式一样，其目标是为客户端代码尽可能简化操作——因此前端控制器类十分精简。然而，在接口背后，我必须部署一个实现。这里介绍的方法只是其中一种实现方式。当你阅读本节时，请记住，该模式的本质在于参与者（应用控制器、命令和视图）之间的交互方式，而非本实现的具体细节。\n\
  \n让我们从使用应用控制器的代码开始。\n\n### 前端控制器\n\n以下是 `FrontController` 与 `AppController` 类协同工作的一种方式（已简化并去除了错误处理）：\n\
  \n```\n// 列表 12.19\n// 控制器\nprivate function __construct()\n{\n$this->reg = Registry::instance();\n\
  }\npublic function handleRequest()\n{\n$request = $this->reg->getRequest();\n$controller\
  \ = new AppController();\n$cmd = $controller->getCommand($request);\n$cmd->execute($request);\n\
  $view = $controller->getView($request);\n$view->render($request);\n}\n```\n\n与上一示例相比，主要区别在于，除了将类名从\
  \ `CommandResolver` 改为 `AppController`（诚然，这在某种程度上只是外观上的改动），我们现在还同时获取了 `ViewComponent`\
  \ 和 `Command` 对象。请注意，此代码使用注册表对象来获取 `Request` 对象。我们也可以将 `AppController` 对象存储在 `Registry`\
  \ 中——即使其他组件在其他地方并未使用它。避免直接实例化的类通常更灵活且更易于测试。\n\n那么，`AppController` 是根据什么逻辑知道哪个视图与哪个命令相关联的呢？与面向对象代码一样，接口比实现更重要。不过，让我们来填充一种可能的方法。\n\
  \n##### 实现概述\n\n一个 `Command` 类可能会根据操作的不同阶段来要求显示不同的视图。`AddVenue` 命令的默认视图可能是一个数据输入表单。如果用户添加了错误类型的数据，可能会再次显示该表单，或者显示一个错误页面。如果一切顺利，并且在系统中成功创建了场地，那么我可能希望转发到一连串\
  \ `Command` 对象中的下一个：或许是 `AddSpace`。\n\n`Command` 对象通过设置状态标志来告知系统其当前状态。以下是这个最小实现所识别的标志（在\
  \ `Command` 父类中作为属性设置）：\n\n```\n// 列表 12.20\nconst CMD_DEFAULT = 0;\nconst CMD_OK\
  \ = 1;\nconst CMD_ERROR = 2;\nconst CMD_INSUFFICIENT_DATA = 3;\n```\n\n应用控制器使用 `Request`\
  \ 对象查找并实例化正确的 `Command` 类。一旦命令执行完毕，它将与一个状态相关联。可以将这种“命令+状态”的组合与一个数据结构进行比较，以确定接下来应该执行哪个命令，或者——如果没有更多命令需要执行——应该提供哪个视图。\n\
  \n##### 配置文件\n\n系统的所有者可以通过设置一组配置指令来决定命令和视图协同工作的方式。以下是一个摘录：\n\n这个 XML 片段展示了一种策略，用于将命令的执行流程及其与视图的关系从\
  \ `Command` 类本身中抽象出来。所有指令都包含在一个 `control` 元素中。\n\n每个 `command` 元素都定义了描述基本命令映射的 `path`\
  \ 和 `class` 属性。然而，视图的逻辑更为复杂。`command` 顶级下的 `view` 元素定义了一个默认关系。换句话说，如果没有匹配更具体的条件，该\
  \ `view` 将用于该命令。`status` 元素则定义了这些具体条件。它们的 `value` 属性应与你之前看到的某个命令状态相匹配。例如，当命令执行产生\
  \ `CMD_OK` 状态时，如果在 XML 文档中定义了对应的状态，则将使用相应的 `view` 元素。\n\n`view` 元素定义了一个 `name` 属性。该值用于构建一个指向模板文件的路径，随后可包含该模板文件。\n\
  \n`command` 或 `status` 元素可能包含一个 `forward` 元素来代替 `view`。WOO 系统将 `forward` 视为一种特殊的\
  \ `view`，它不会渲染模板，而是使用新的路径重新调用应用程序。\n\n让我们根据上述解释来梳理一下这段 XML 的片段：\n\n当使用 `/addvenue`\
  \ 路径调用系统时，将调用 `AddVenue` 命令。然后它会生成一个状态值——`CMD_DEFAULT`、`CMD_OK`、`CMD_ERROR` 或 `CMD_INSUFFICIENT_DATA`\
  \ 中的一个。对于除 `CMD_OK` 之外的任何状态，都将调用 `addvenue` 模板。但是，如果命令返回 `CMD_OK` 状态，则条件匹配。`status`\
  \ 元素可以简单地包含另一个视图来替换默认视图。然而，这里 `forward` 元素开始发挥作用。通过转发到另一个 `command`，配置文件将处理视图的所有责任委托给了新元素。然后，系统将在新请求中从\
  \ `/addspace` 路径重新开始。\n\n\n\n##### 解析配置文件\n\n得益于 SimpleXML 扩展，我们无需执行任何实际的解析工作——这已由该扩展代为处理。剩下要做的只是遍历\
  \ SimpleXML 数据结构，构建我们自己的数据。以下是名为 `ViewComponentCompiler` 的类，它正是执行此操作的：\n\n```php\n\
  // 代码清单 12.21\nclass ViewComponentCompiler\n{\nprivate static $defaultcmd = DefaultCommand::class;\n\
  public function parseFile($file)\n{\n$options = \\simplexml:load_file($file);\n\
  return $this->parse($options);\n}\npublic function parse(\\SimpleXMLElement $options):\
  \ Conf\n{\n$conf = new Conf();\nforeach ($options->control->command as $command)\
  \ {\n$path = (string)$command['path'];\n$cmdstr = (string)$command['class'];\n$path\
  \ = (empty($path)) ? \"/\" : $path;\n$cmdstr = (empty($cmdstr)) ? self::$defaultcmd\
  \ : $cmdstr;\n$pathobj = new ComponentDescriptor($path, $cmdstr);\n$this->processView($pathobj,\
  \ 0, $command);\nif (isset($command->status) && isset($command->status['value']))\
  \ {\nforeach ($command->status as $statusel) {\n$status = (string)$statusel['value'];\n\
  $statusval = constant(Command::class . \"::\" . $status);\nif (is_null($statusval))\
  \ {\nthrow new AppException(\"未知状态: {$status}\");\n}\n$this->processView($pathobj,\
  \ $statusval, $statusel);\n}\n}\n$conf->set($path, $pathobj);\n}\nreturn $conf;\n\
  }\npublic function processView(ComponentDescriptor $pathobj, int $statusval, \\\
  SimpleXMLElement $el)\n{\nif (isset($el->view) && isset($el->view['name'])) {\n\
  $pathobj->setView($statusval, new TemplateViewComponent((string)$el->view['name']));\n\
  }\nif (isset($el->forward) && isset($el->forward['path'])) {\n$pathobj->setView($statusval,\
  \ new ForwardViewComponent((string)$el->forward['path']));\n}\n}\n}\n```\n\n这里的实际操作发生在\
  \ `parse()` 方法中，该方法接收一个用于遍历的 `SimpleXMLElement` 对象。首先，我实例化一个 `Conf` 对象（请记住，这只是一个对数组的包装）。然后，我遍历\
  \ XML 中的命令元素。对于每个命令，我提取 `path` 和 `class` 属性的值，并将这些数据传递给 `ComponentDescriptor` 对象的构造函数。该对象将管理与一个\
  \ `command` 元素相关的信息包——你很快会看到这个类。\n\n接着，我调用一个名为 `processView()` 的私有方法，向它传递 `ComponentDescriptor`\
  \ 对象、一个值为零的整数（因为我们在处理默认状态），以及对当前 XML 元素（即当前为 `command`）的引用。根据在 XML 片段中找到的内容，`processView()`\
  \ 会创建一个 `TemplateViewComponent` 或 `ForwardViewComponent`，并将其传递给 `ComponentDescriptor::setView()`。当然，它也可能不匹配任何内容而根本不进行调用——但这可能是不明智的。或许在一个更完整的实现中，我们会将其视为一个错误条件。\n\
  \n回到 `parse()` 方法中，我开始处理 `status` 属性。我再次调用 `processView()`——但这次传入的整数对应于 `status`\
  \ 元素的 `value` 属性中的字符串。换句话说，字符串 `CMD_OK` 变为 1，`CMD_ERROR` 变为 2，以此类推。PHP 的 `constant()`\
  \ 方法提供了一种简洁的方式来进行这种转换。因此，这次我向 `processView()` 传递一个非零整数，以及 `status` XML 元素。\n\n`processView()`\
  \ 再次用找到的任何 `ViewComponent` 对象填充 `ComponentDescriptor`。\n\n最后，我将 `ComponentDescriptor`\
  \ 对象存储在 `Conf` 对象中，以命令组件的 `path` 值作为索引。\n\n循环完成后，我返回 `Conf` 对象。\n\n你可能需要再读一遍才能跟上这个流程；但本质上，这个过程非常简单：`ViewComponentCompiler`\
  \ 构建一个由 `ComponentDescriptor` 对象组成的数组（如前所述，包装在 `Conf` 对象中）。每个 `ComponentDescriptor`\
  \ 对象维护关于一个路径和一个 `Command` 类的信息，以及一个按状态值索引的 `ViewComponent` 对象数组（0 表示默认视图）。\n\n尽管有这些繁琐的工作，但重要的是要记住，高层过程相当简单。我们正在构建潜在请求与命令及视图之间的关系。图\
  \ 12-6 展示了这个初始化过程。\n\n![A314621_5_En_12_Fig6_HTML.gif](img/A314621_5_En_12_Fig6_HTML.gif)\n\
  \n**图 12-6.** 编译命令和视图\n\n\n\n## 管理组件数据\n\n你已经看到，编译后的`ComponentDescriptor`对象存储在`Conf`对象中——本质上是一个关联数组的\
  \ getter 和 setter。这里的键是系统能够识别的路径：例如`/`或`/addvenue`。\n\n那么，让我们来看看负责管理命令、视图和转发信息的`ComponentDescriptor`类：\n\
  \n```\n// 代码清单 12.22\nclass ComponentDescriptor\n{\nprivate $path;\nprivate static\
  \ $refcmd;\nprivate $cmdstr;\npublic function __construct(string $path, string $cmdstr)\n\
  {\nself::$refcmd = new \\ReflectionClass(Command::class);\n$this->path = $path;\n\
  $this->cmdstr = $cmdstr;\n}\npublic function getCommand(): Command\n{\nreturn $this->resolveCommand($this->cmdstr);\n\
  }\npublic function setView(int $status, ViewComponent $view)\n{\n$this->views[$status]\
  \ = $view;\n}\npublic function getView(Request $request): ViewComponent\n{\n$status\
  \ = $request->getCmdStatus();\n$status = (is_null($status)) ? 0 : $status;\nif (isset($this->views[$status]))\
  \ {\nreturn $this->views[$status];\n}\nif (isset($this->views[0])) {\nreturn $this->views[0];\n\
  }\nthrow new AppException(\"no view found\");\n}\npublic function resolveCommand(string\
  \ $class): Command\n{\nif (is_null($class)) {\nthrow new AppException(\"unknown\
  \ class '$class'\");\n}\nif (! class_exists($class)) {\nthrow new AppException(\"\
  class '$class' not found\");\n}\n$refclass = new \\ReflectionClass($class);\nif\
  \ (! $refclass->isSubClassOf(self::$refcmd)) {\nthrow new AppException(\"command\
  \ '$class' is not a Command\");\n}\nreturn $refclass->newInstance();\n}\n}\n```\n\
  \n这里展示了数据的存储和检索，但实际做的还不止这些。命令信息（`Command`的完整类名）通过构造函数添加，并且仅在调用`getCommand()`时才被延迟转换为`Command`对象。这个实例化和检查过程发生在私有方法`resolveCommand()`中。这里的代码看起来很熟悉——实际上它是从本章前面`CommandResolver`中的等效功能借鉴而来的（嗯……受到其启发）。\n\
  \n获取视图则更容易。请记住，每个视图组件都是通过`setView()`方法存储的。现在我们看到，`ViewComponent`对象实际上是在一个名为`$views`的数组属性中管理的，并以一个整数（即`Command`状态值）作为索引。当客户端代码调用`getView()`方法时，我们会收到一个`Request`对象，其中可能已缓存了`Command`状态。我们通过一个新的便捷方法`Request::getCmdStatus()`获取这个值。有了它，只需在`$views`数组中查找对应的`ViewComponent`元素即可。如果没有匹配项，则返回索引为零的默认视图。\n\
  \n通过这种方式，这个小小的类提供了 XML 文件中`command`元素所隐含的所有逻辑。\n\n由于大部分实际工作都由辅助类完成，应用控制器本身相对较薄。让我们来看一下：\n\
  \n```\n// 代码清单 12.23\nclass AppController\n{\nprivate static $defaultcmd = DefaultCommand::class;\n\
  private static $defaultview = \"fallback\";\npublic function getCommand(Request\
  \ $request): Command\n{\ntry {\n$descriptor = $this->getDescriptor($request);\n\
  $cmd = $descriptor->getCommand();\n} catch (AppException $e) {\n$request->addFeedback($e->getMessage());\n\
  return new self::$defaultcmd();\n}\nreturn $cmd;\n}\npublic function getView(Request\
  \ $request): ViewComponent\n{\ntry {\n$descriptor = $this->getDescriptor($request);\n\
  $view = $descriptor->getView($request);\n} catch (AppException $e) {\nreturn new\
  \ TemplateViewComponent(self::$defaultview);\n}\nreturn $view;\n}\nprivate function\
  \ getDescriptor(Request $request): ComponentDescriptor\n{\n$reg = Registry::instance();\n\
  $commands = $reg->getCommands();\n$path = $request->getPath();\n$descriptor = $commands->get($path);\n\
  if (is_null($descriptor)) {\nthrow new AppException(\"no descriptor for {$path}\"\
  , 404);\n}\nreturn $descriptor;\n}\n}\n```\n\n这个类中没有太多实际逻辑，因为大部分复杂性都被下放到了各种辅助类中。`getCommand()`和`getView()`都调用一个私有方法`getDescriptor()`来获取当前请求的`ComponentDescriptor`。`getDescriptor()`方法从`Request`对象中获取当前路径，并用它从一个`Conf`对象中提取出`ComponentDescriptor`对象，该`Conf`对象也由注册表存储，并通过`getCommands()`返回。请记住，这个`ComponentDescriptor`对象数组之前是由`ViewComponentCompiler`对象填充的，其键是潜在的路径。\n\
  \n一旦`getCommand()`和`getView()`获得了`ComponentDescriptor`对象，每个方法就可以调用其对应的方法了。在`getCommand()`中，我们调用`ComponentDescriptor::getCommand()`；在`getView()`中，我们调用`ComponentDescriptor::getView()`。\n\
  \n在继续之前，还有几个细节需要收尾。既然`Command`对象不再调用视图，我们需要一种渲染模板的机制。这由`TemplateViewComponent`对象处理。这些对象实现了一个接口`ViewComponent`：\n\
  \n```\n// 代码清单 12.24\ninterface ViewComponent\n{\npublic function render(Request\
  \ $request);\n}\n```\n\n为什么需要这个接口？我们将转发和模板显示都视为视图处理过程。下面是`TemplateViewDisplay`：\n\
  \n```\n// 代码清单 12.25\nclass TemplateViewComponent implements ViewComponent\n{\n\
  private $name = null;\npublic function __construct(string $name)\n{\n$this->name\
  \ = $name;\n}\npublic function render(Request $request)\n{\n$reg = Registry::instance();\n\
  $conf = $reg->getConf();\n$path = $conf->get(\"templatepath\");\nif (is_null($path))\
  \ {\nthrow new AppException(\"no template directory\");\n}\n$fullpath = \"{$path}/{$this->name}.php\"\
  ;\nif (! file_exists($fullpath)) {\nthrow new AppException(\"no template at {$fullpath}\"\
  );\n}\ninclude($fullpath);\n}\n}\n```\n\n这个类在实例化时接收一个名称——然后在`render()`方法中，将该名称与路径配置值结合使用，以包含一个模板。\n\
  \n下面是`ForwardViewComponent`：\n\n```\n// 代码清单 12.26\nclass ForwardViewComponent implements\
  \ ViewComponent\n{\nprivate $path = null;\npublic function __construct($path)\n\
  {\n$this->path = $path;\n}\npublic function render(Request $request)\n{\n$request->forward($this->path);\n\
  }\n}\n```\n\n这个类只是对传入的`Request`对象调用`forward()`方法。`forward()`方法的实现取决于`Request`子类型。对于`HttpRequest`，它只是设置\
  \ Location 头的问题：\n\n```\n// 代码清单 12.27\n// HttpRequest\npublic function forward(string\
  \ $path)\n{\nheader(\"Location: {$path}\");\nexit;\n}\n```\n\n对于`CliRequest`，我们不能依赖服务器来处理转发，因此必须采用不同的方法：\n\
  \n```\n// 代码清单 12.28\n// CliRequest\npublic function forward(string $path)\n{\n\
  // 将新路径附加到参数列表末尾\n// 最后出现的参数获胜\n$_SERVER['argv'][] = \"path:{$path}\";\nRegistry::reset();\n\
  Controller::run();\n}\n```\n\n我们利用了一个事实：当解析参数数组以获取路径时，最终找到的匹配项会被设置到`Request`上。我们只需添加一个路径参数，清除注册表，然后重新运行控制器。\n\
  \n这让我们回到了原点，现在正是进行总结的好时机！\n\n应用控制器获取视图和命令的策略可能差异很大；关键在于这些策略对更广泛的系统是隐藏的。图 12-7 展示了前端控制器类使用应用控制器首先获取`Command`对象，然后获取视图的高级过程。\n\
  \n![A314621_5_En_12_Fig7_HTML.gif](img/A314621_5_En_12_Fig7_HTML.gif)\n\n**图 12-7.**\
  \ 使用应用控制器获取命令和视图\n\n请注意，图 12-7 中渲染的视图可能是`ForwardViewComponent`（它将使用新路径重新启动整个过程），也可能是`TemplateViewComponent`（它将包含一个模板文件）。\n\
  \n\n\n请记住，图 12-7 中获取`Command`和`ViewComponent`对象所需的数据是由我们的老朋友`ApplicationHelper`编译的。提醒一下，以下是实现该功能的高级代码：\n\
  \n```\n// 代码清单 12.29\nprivate function setupOptions()\n{\n//...\n$vcfile = $conf->get(\"\
  viewcomponentfile\");\n$cparse = new ViewComponentCompiler();\n$commandandviewdata\
  \ = $cparse->parseFile($vcfile);\n$reg->setCommands($commandandviewdata);\n}\n```\n\
  \n### `Command`类\n\n既然命令不再负责调用模板，那么简要审视其基类和实现是值得的。我们已经看到`Command`类中的新状态，但还有一点内务处理需要注意：\n\
  \n```\n// 代码清单 12.30\nabstract class Command\n{\nconst CMD_DEFAULT = 0;\nconst CMD_OK\
  \ = 1;\nconst CMD_ERROR = 2;\nconst CMD_INSUFFICIENT_DATA = 3;\nfinal public function\
  \ __construct()\n{\n}\npublic function execute(Request $request)\n{\n$status = $this->doExecute($request);\n\
  $request->setCmdStatus($status);\n}\nabstract public function doExecute(Request\
  \ $request): int;\n}\n```\n\n这是一个模板方法模式的典型示例：`execute()`方法调用抽象的`doExecute()`方法，并将返回值缓存在`Request`对象中。稍后，`ComponentDescriptor`将利用这个返回值来选择正确的视图返回。\n\
  \n### 具体命令示例\n\n以下是一个简单的`AddVenue`命令的实现：\n\n```\n// 代码清单 12.31\nclass AddVenue extends\
  \ Command\n{\npublic function doExecute(Request $request): int\n{\n$name = $request->getProperty(\"\
  venue_name\");\nif (is_null($name)) {\n$request->addFeedback(\"未提供名称\");\nreturn\
  \ self::CMD_INSUFFICIENT_DATA;\n} else {\n// 执行某些操作\n$request->addFeedback(\"已添加'{$name}'\"\
  );\nreturn self::CMD_OK;\n}\nreturn self::CMD_DEFAULT;\n}\n}\n```\n\n实际上，这段代码缺少构建`Venue`对象并将其保存到数据库的功能代码，但我们稍后会处理这些。目前最重要的是：该命令会根据不同情况返回不同的状态。正如我们所见，不同状态会导致应用程序控制器选择并返回不同的视图。因此，如果使用示例\
  \ XML，当返回`CMD_OK`时，转发机制将触发到`/addspace`的转发。这只适用于`/addvenue`的情况。如果导致该命令被调用的请求使用路径`/quickaddvenue`，则不会发生转发，而是显示`quickaddvenue`视图。不过，`AddVenue`命令对此一无所知——它只专注于自己的核心职责。\n\
  \n### 影响与后果\n\n由于需要大量工作来获取和应用描述命令与请求、命令与命令、命令与视图之间关系的元数据，构建一个功能完备的应用程序控制器模式实例可能会很繁琐。\n\
  \n因此，我通常只在应用程序明确告诉我需要时，才会实现类似的功能。当我发现自己不得不在命令中添加条件判断，以便根据不同情况调用不同视图或执行其他命令时，我通常会听到这个提示。大约在这个时候，我会感到命令流程和显示逻辑开始失控。\n\
  \n当然，应用程序控制器可以使用各种机制来建立命令与视图之间的关联，而不仅仅是我这里采用的方法。即使你最初在所有情况下都使用请求字符串、命令名称和视图之间的固定关系，构建一个应用程序控制器来封装这种关系仍然有益。当你必须重构以适应更复杂的场景时，这将为你提供相当大的灵活性。\n\
  \n### 页面控制器\n\n尽管我非常喜欢前端控制器模式，但它并不总是正确的选择。前期设计投入往往更适合大型系统，而对于那些需要快速交付成果的简单项目来说，反而可能成为负担。页面控制器模式可能你已经很熟悉了，因为它是一种常见策略。尽管如此，探讨其中一些问题仍然很有价值。\n\
  \n### 问题所在\n\n同样的问题在于，你需要管理请求、领域逻辑和表示层之间的关系。这几乎是企业项目的永恒课题。然而，不同之处在于你所面临的约束条件。\n\n\
  如果你的项目相对简单，前期大量设计可能威胁到截止日期，且不会带来巨大的附加值，那么页面控制器是管理请求和视图的不错选择。\n\n假设你想展示一个页面，显示 Woo\
  \ 系统中所有场地的列表。即使完成了数据库检索代码，如果没有已经部署好的前端控制器，要实现这个简单的结果也是一项艰巨的任务。\n\n视图是场地列表；请求同样也是场地列表。除非出现错误，否则请求不会像复杂任务中那样导向新的视图。这里最简单有效的做法是将视图与控制器关联起来——通常将它们放在同一个页面中。\n\
  \n\n\n### 实现\n\n尽管页面控制器项目的实际实现可能变得相当复杂，但其模式本身很简单。控制权与一个视图或一组视图相关联。在最简单的情况下，这意味着控制权位于视图本身，尽管它可以被抽象出来，尤其是当一个视图与其他视图紧密关联时（即，当你在不同情况下可能需要转发到不同页面时）。\n\
  \n以下是页面控制器最简单的形式：\n\n```\nfindAll();\n} catch (\\Exception $e) {\ninclude('error.php');\n\
  exit(0);\n}\n// 默认页面跟在后面\n?>\n\n场地\n\n场地\n\ngetName(); ?>\n\n```\n\n该文档包含两个元素。视图元素负责显示，而控制器元素管理请求并调用应用程序逻辑。即使视图和控制器位于同一页面，它们也是严格分离的。\n\
  \n这个例子非常简单（除了后台的数据库操作外，你将在下一章中了解更多）。页面顶部的 PHP 代码块尝试获取一个 `Venue` 对象列表，并将其存储在 `$venues`\
  \ 全局变量中。\n\n如果发生错误，页面通过 `include()` 将处理委托给名为 `error.php` 的页面，然后使用 `exit()` 终止当前页面的任何进一步处理。我同样可以使用\
  \ HTTP 转发。如果没有包含发生，则会显示页面底部的 HTML（视图）。\n\n![A314621_5_En_12_Fig8_HTML.gif](img/A314621_5_En_12_Fig8_HTML.gif)\n\
  \n**图 12-8.** 嵌入在视图中的页面控制器\n\n这可以作为快速测试，但任何具有规模或复杂性的系统可能需要比这更多的支持。\n\n页面控制器代码之前是隐式地与视图分离的。在这里，我从一个基本的页面控制器基类开始，明确地进行了分离：\n\
  \n```\n// 清单 12.33\nabstract class PageController\n{\nabstract public function process();\n\
  public function __construct()\n{\n$this->reg = Registry::instance();\n}\npublic\
  \ function init()\n{\nif (isset($_SERVER['REQUEST_METHOD'])) {\n$request = new HttpRequest();\n\
  } else {\n$request = new CliRequest();\n}\n$this->reg->setRequest($request);\n}\n\
  public function forward(string $resource)\n{\n$request = $this->getRequest();\n\
  $request->forward($resource);\n}\npublic function render(string $resource, Request\
  \ $request)\n{\ninclude($resource);\n}\npublic function getRequest()\n{\nreturn\
  \ $this->reg->getRequest();\n}\n}\n```\n\n这个类使用了一些你已经见过的工具——特别是 `Request` 和 `Registry`\
  \ 类。`PageController` 类的主要作用是提供对 `Request` 对象的访问，并管理视图的包含。在真实项目中，随着更多子类发现需要通用功能，这个用途列表会迅速增长。\n\
  \n子类可以存在于视图内部，并像之前一样默认显示它。或者，它可以独立于视图。我认为后一种方法更清晰，所以我选择这条路径。下面是一个尝试向系统添加新场地的 `PageController`：\n\
  \n```\n// 清单 12.34\nclass AddVenueController extends PageController\n{\npublic function\
  \ process()\n{\n$request = $this->getRequest();\ntry {\n$name = $request->getProperty('venue_name');\n\
  if (is_null($request->getProperty('submitted'))) {\n$request->addFeedback(\"为场地选择一个名称\"\
  );\n$this->render(__DIR__ . '/view/add_venue.php', $request);\n} elseif (is_null($name))\
  \ {\n$request->addFeedback(\"名称是必填字段\");\n$this->render(__DIR__ . '/view/add_venue.php',\
  \ $request);\nreturn;\n} else {\n// 添加到数据库\n$this->forward('listvenues.php');\n\
  }\n} catch (Exception $e) {\n$this->render(__DIR__.'/view/error.php', $request);\n\
  }\n}\n}\n```\n\n`AddVenueController` 类只实现了 `process()` 方法。`process()` 负责检查用户的提交。如果用户尚未提交表单，或表单填写不正确，则会包含默认视图\
  \ (`add_venue.php`)，提供反馈并呈现表单。如果我成功添加了新用户，则该方法会调用 `forward()` 将用户发送到 `ListVenues`\
  \ 页面控制器。\n\n请注意我用于视图的格式。我倾向于通过使用全小写文件名来命名视图文件，而类文件则使用驼峰命名法（将单词连在一起，并使用大写字母表示边界），以区分它们。\n\
  \n你可能已经注意到 `AddVenueController` 类内部没有任何东西会导致它被运行。我可以将运行代码放在同一个文件中，但这会使测试变得困难（因为仅仅包含该类就会执行其方法）。出于这个原因，我为每个页面创建了一个运行脚本。以下是\
  \ `addvenue.php`：\n\n```\n// 清单 12.35\n$addvenue = new AddVenueController();\n$addvenue->init();\n\
  $addvenue->process();\n```\n\n以下是与 `AddVenueController` 类关联的视图：\n\n```\n\n添加场地\n\
  \n添加场地\n\ngetFeedbackString(\"\");\n?>\n\n```\n\n正如你所看到的，视图除了显示数据和提供生成新请求的机制外，不做任何事情。请求是发送给\
  \ `PageController`（通过 `/addvenue.php` 运行脚本）的，而不是返回到视图。请记住，负责处理请求的是 `PageController`\
  \ 类。\n\n你可以在图 12-9 中看到这个更复杂版本的页面控制器模式的概览。\n\n![A314621_5_En_12_Fig9_HTML.gif](img/A314621_5_En_12_Fig9_HTML.gif)\n\
  \n**图 12-9.** 页面控制器类层次结构及其包含关系\n\n\n\n### 后果\n\n这种方法的一大优点是，任何有网络经验的人都能立刻理解其含义。我请求`venues.php`，得到的就是这个文件。即便是错误信息，也符合预期范围，因为“服务器错误”和“页面未找到”页面已是日常现实。\n\
  \n如果你将视图与页面控制器类分离，情况会稍微复杂一些，但参与者之间近乎一一对应的关系仍然足够清晰。\n\n页面控制器在完成处理后，会包含其视图。但在某些情况下，它会将请求转发给另一个页面控制器。例如，当`AddVenue`成功添加一个场地后，它不再需要显示添加表单，而是委托给`ListVenues`。\n\
  \n这一操作由`PageController`中的`forward()`方法处理，该方法与我们之前看到的`ForwardViewComponent`类似，只是简单地在`Request`上调用`forward()`。\n\
  \n尽管页面控制器类可能会委托给`Command`对象，但这样做的好处不如前端控制器那样显著。前端控制器类需要分析请求的目的，而页面控制器类已经知道这一点。你通常会放在`Command`中的轻量级请求检查和逻辑层调用，同样可以轻松地放在页面控制器类中，并且你还能从中受益，因为不需要一个选择`Command`对象的机制。\n\
  \n重复可能是一个问题，但使用公共超类可以消除大量重复。你还可以节省启动时间，因为可以避免加载当前上下文中不需要的数据。当然，你也可以在前端控制器中做到这一点，但找出哪些需要、哪些不需要的过程会复杂得多。\n\
  \n该模式的真正缺点在于视图路径复杂的情况——特别是当同一个视图在不同时间以不同方式被使用时（添加和编辑屏幕就是一个很好的例子）。你可能会发现自己在条件判断和状态检查中陷入混乱，难以对整个系统有一个清晰的概览。\n\
  \n不过，从页面控制器开始并转向前端控制器模式也并非不可能。如果你使用了`PageController`超类，这一点尤其明显。根据经验法则，如果我估计一个系统需要不到一周左右的时间完成，并且未来不需要增加更多阶段，我会选择页面控制器，并受益于其快速开发周期。如果我在构建一个需要随时间增长并具有复杂视图逻辑的大型项目，我会每次都选择前端控制器。\n\
  \n### 模板视图与视图助手\n\n在 PHP 中，`模板视图`几乎是默认的机制，因为我可以在其中混入表示标记（HTML）和系统代码（原生 PHP）。正如我之前所说，这既是福音也是诅咒，因为将它们轻松结合在一起的能力，诱惑着人们将应用逻辑和显示逻辑放在同一个地方——这可能会带来灾难性的后果。\n\
  \n因此，在 PHP 中编写视图很大程度上是一个自律的问题。如果严格来说不属于显示范畴，就要对任何代码保持高度警惕。\n\n为此，视图助手模式（Alur 等人提出）提供了一个助手类，它可以专用于某个视图，也可以在多个视图之间共享，以帮助处理任何需要超过少量代码的任务。\n\
  \n### 问题\n\n如今，在显示页面中直接嵌入 SQL 查询和其他业务逻辑的情况越来越少见，但依然存在。我在之前的章节中已经详细讨论过这种特殊的弊端，所以这里简要带过。\n\
  \n包含过多代码的网页会让网站制作人员难以处理，因为表示组件会与循环和条件判断纠缠在一起。\n\n表示层中的业务逻辑会迫使你只能使用该界面。如果不移植大量应用程序代码，你就无法轻松切换为新视图。\n\
  \n将视图与逻辑分离的系统也更易于测试。这是因为测试可以仅针对逻辑层的功能进行，而无需受到表示层干扰噪音的影响。\n\n安全问题也经常出现在将逻辑嵌入表示层的系统中。在这类系统中，由于处理用户输入的数据库查询和代码往往散落在表格、表单和列表中，因此很难识别潜在的危险。\n\
  \n由于许多操作会在不同视图中重复出现，将应用程序代码嵌入模板的系统容易陷入重复的困境，因为相同的代码结构会从一个页面粘贴到另一个页面。一旦发生这种情况，错误和维护噩梦便会接踵而至。\n\
  \n为了防止这种情况发生，你应该在其他地方处理应用程序的处理逻辑，并让视图仅管理显示。这通常通过使视图成为数据的被动接收者来实现。如果视图确实需要查询系统，最好提供一个视图助手对象来替视图完成任何复杂的工作。\n\
  \n\n\n### 实现\n\n一旦你构建了更广泛的框架，视图层就不再是一个巨大的编程挑战。当然，它仍然是一个重大的设计和信息架构问题，但这已是另一本书的内容！\n\
  \n“模板视图”（`Template View`）这个命名源于福勒。它是大多数企业程序员使用的主要模式。在某些语言中，实现可能涉及构建一个标签翻译系统，将标签转换为系统设置的值。在\
  \ PHP 中你也有这个选择，可以使用像优秀的 Twig 这样的模板引擎。不过，我更喜欢谨慎地使用 PHP 已有的功能。\n\n为了让视图有东西可用，它必须能够获取数据。我倾向于定义一个视图可以使用的“视图助手”（`View\
  \ Helper`）。\n\n下面是一个简单的 `ViewHelper` 类：\n\n```php\n// listing 12.37\nclass ViewHelper\n\
  {\n    public function sponsorList()\n    {\n        // 执行一些复杂的操作来获取赞助商列表\n    \
  \    return \"鲍勃的鞋业帝国\";\n    }\n}\n```\n\n目前这个类只提供了一个赞助商列表字符串。我们假设获取或格式化这些数据涉及相对复杂的过程，而这些过程不应嵌入到模板本身。随着应用程序的发展，你可以扩展它来提供额外的功能。如果你发现在视图中需要编写超过几行的代码，那么这些代码很可能应该放在\
  \ `View Helper` 中。在大型应用中，你可以在继承层次结构中提供多个 `ViewHelper` 对象，以便为系统的不同部分提供不同的工具。\n\n\
  我可能会从某种工厂（比如注册表）中获取一个 `ViewHelper`。从模板的角度看，最简单的方法是在 `render()` 方法中使辅助实例可用：\n\n```php\n\
  // listing 12.38\npublic function render(string $resource, Request $request)\n{\n\
  \    $vh = new ViewHelper();\n    // 现在模板将拥有 $vh 变量\n    include($resource);\n}\n\
  ```\n\n下面是一个使用此 `View Helper` 的简单视图：\n\n```php\n<?php\n// 场馆\n?>\n场馆\n\n由以下机构自豪赞助：<?php\
  \ echo $vh->sponsorList(); ?>\n\n列出场馆\n```\n\n视图（`list_venues.php`）通过 `$vh` 变量获得了一个\
  \ `ViewHelper` 实例。它调用了 `sponsorList()` 方法并打印结果。\n\n显然，这个示例并没有从视图中完全消除代码，但它确实严格限制了所需编码的数量和类型。该页面包含一个简单的打印语句，并且随着复杂性的增加，不可避免会需要其他方法调用，但设计师应该能够轻松地处理此类代码。\n\
  \n稍微棘手一点的是 `if` 语句和循环。这些很难委托给 `View Helper`，因为它们通常与格式化输出紧密相关。我倾向于将简单的条件语句和循环（在构建显示数据行的表格时非常常见）保留在\
  \ `模板视图` 中；但为了尽可能保持它们的简洁，我会在可能的情况下将测试子句等内容委托出去。\n\n### 结果\n\n数据传递给视图层的方式有些令人不安，因为视图并没有一个固定的接口来保证其环境。我倾向于将每个视图视为与整个系统签订了一份契约。视图实际上是在对应用程序说：“如果我被调用，那么我有权访问对象\
  \ `This`、对象 `That` 和对象 `TheOther`。” 应用程序有责任确保这一点成立。\n\n你可以通过在辅助类中提供访问器方法使视图更加严格，但我一直发现通过\
  \ `Request`、`Response` 或 `Context` 对象为视图层动态注册对象更加容易。\n\n虽然模板通常本质上是被动的，由上次请求产生的数据填充，但有时视图可能需要发起辅助请求。`View\
  \ Helper` 是提供此功能的好地方，它将获取数据所需的任何机制知识对视图本身隐藏起来。即使是 `View Helper` 也应尽可能少做工作，将任务委托给命令，或通过外观（Facade）与领域层联系。\n\
  \n> **注意**  \n> 你在第 10 章中看到了 `Facade` 模式。Alur 等人在 `Session Facade` 模式中探讨了 Facade\
  \ 在企业编程中的一种用途（该模式旨在限制细粒度的网络事务）。福勒还描述了一种称为 `Service Layer` 的模式，它为访问层内的复杂性提供了一个简单的入口点。\n\
  \n## 业务逻辑层\n\n如果说控制层编排与外部世界的通信并组织系统对其作出响应，那么逻辑层则负责处理应用程序的业务。这一层应尽可能远离因分析查询字符串、构建\
  \ HTML 表格和编写反馈消息而产生的噪音和干扰。业务逻辑是关于完成需要完成的事情——即应用程序的真正目的。其他一切都是为了支持这些任务而存在的。\n\n在经典的面向对象应用程序中，业务逻辑层通常由模拟系统旨在解决的问题的类组成。正如你将看到的，这是一个灵活的设计决策，但也需要大量的前期规划。\n\
  \n那么，让我们从让系统快速启动并运行的最快方法开始。\n\n### 事务脚本\n\n`事务脚本`模式（《企业应用架构模式》）描述了许多系统自行演化的方式。它简单、直观且有效，尽管随着系统规模的增大，其效果会减弱。事务脚本内联处理请求，而不是委托给专门的对象。它是典型的快速解决方案。这也是一种难以分类的模式，因为它结合了本章中来自其他层的元素。我选择将其作为业务逻辑层的一部分来介绍，因为该模式的动机是实现系统的业务目标。\n\
  \n### 问题\n\n每个请求都必须以某种方式处理。正如你所看到的，许多系统提供一个评估和过滤传入数据的层。但理想情况下，这一层随后应调用旨在完成请求的类。这些类可以被分解以表示系统中的力量和职责，也许可以使用外观接口。然而，这种方法需要一定数量的精心设计。对于某些项目（通常是范围小、性质紧急的项目），这种开发开销可能是不可接受的。在这种情况下，你可能需要将业务逻辑构建到一组过程化操作中。每个操作都将被精心设计以处理特定的请求。\n\
  \n因此，问题在于需要提供一种快速有效的机制来实现系统的目标，而无需在复杂设计上进行可能代价高昂的投资。\n\n这种模式的最大好处是你能快速获得结果。每个脚本接收输入并操作数据库以确保一个结果。除了将相关方法组织在同一个类中，并保持\
  \ `事务脚本` 类位于它们自己的层（即尽可能独立于命令、控制和视图层）之外，几乎不需要前期设计。\n\n虽然业务逻辑层类往往与表示层清晰分离，但它们通常更深入地嵌入在数据层中。这是因为检索和存储数据是此类类经常执行的任务的关键。你将在本章后面看到将逻辑对象与数据库解耦的机制。不过，`事务脚本`\
  \ 类通常对数据库了如指掌（尽管它们可以使用网关类来处理实际查询的细节）。\n\n\n### 实现\n\n让我们回到我的事件列表示例。在本例中，系统支持三个关系数据库表：`venue`（场地）、`space`（空间）和`event`（事件）。一个`venue`（场地）可以有多个`spaces`（空间）（例如，一个剧院可以有多个舞台，一个舞蹈俱乐部可以有多个房间）。每个`space`（空间）都会举办许多事件。下面是模式定义：\n\
  \n```sql\nCREATE TABLE 'venue' (\n'id' int(11) NOT NULL auto_increment,\n'name'\
  \ text,\nPRIMARY KEY  ('id')\n)\nCREATE TABLE 'space' (\n'id' int(11) NOT NULL auto_increment,\n\
  'venue' int(11) default NULL,\n'name' text,\nPRIMARY KEY  ('id')\n)\nCREATE TABLE\
  \ 'event' (\n'id' int(11) NOT NULL auto_increment,\n'space' int(11) default NULL,\n\
  'start' mediumtext,\n'duration' int(11) default NULL,\n'name' text,\nPRIMARY KEY\
  \  ('id')\n)\n```\n\n显然，系统需要提供添加场地和事件的机制。每一项操作都代表一个独立的事务。我可以为每个方法创建独立的类（并按照你在第 11\
  \ 章遇到的**命令模式**来组织我的类）。不过，在本例中，我打算将这些方法放在同一个类中，尽管它属于继承层次结构的一部分。你可以在图 12-10 中看到其结构。\n\
  \n![A314621_5_En_12_Fig10_HTML.gif](img/A314621_5_En_12_Fig10_HTML.gif)\n\n**图 12-10.**\
  \ 一个事务脚本类及其父类\n\n那么，为什么这个示例要包含一个抽象父类呢？在一个任意大小的脚本中，我可能会向这个层次结构中添加更多具体类。由于其中大多数类至少会共享一些核心功能，因此将这些功能放在一个共同的父类中是合理的。\n\
  \n实际上，这本身就是一个模式（Fowler 将其命名为**层超类型**）。当同一层中的类具有共同特征时，将它们归为一个类型，并将实用操作放在基类中，是很有意义的。在本章的其余部分，你会经常看到这种做法。\n\
  \n在本例中，基类获取一个`PDO`对象，并将其存储在一个属性中。它还提供了用于缓存数据库语句和执行查询的方法：\n\n```php\n// listing 12.40\n\
  abstract class Base\n{\n    private $pdo;\n    private $config = __DIR__ . \"/data/woo_options.ini\"\
  ;\n    private $stmts = [];\n    public function __construct()\n    {\n        $reg\
  \ = Registry::instance();\n        $options = parse_ini_file($this->config, true);\n\
  \        $conf = new Conf($options['config']);\n        $reg->setConf($conf);\n\
  \        $dsn = $reg->getDSN();\n        if (is_null($dsn)) {\n            throw\
  \ new AppException(\"No DSN\");\n        }\n        $this->pdo = new \\PDO($dsn);\n\
  \        $this->pdo->setAttribute(\\PDO::ATTR_ERRMODE, \\PDO::ERRMODE_EXCEPTION);\n\
  \    }\n    public function getPdo(): \\PDO\n    {\n        return $this->pdo;\n\
  \    }\n}\n```\n\n我使用`Registry`类获取`DSN`字符串，并将其传递给`PDO`构造函数。我通过一个 getter 方法`getPdo()`提供`PDO`对象。实际上，很多此类工作都可以推回到`Registry`对象本身——你会在本章和下一章的其他地方看到我采用这种策略。\n\
  \n下面是`VenueManager`类的开头部分，它设置了我的 SQL 语句：\n\n```php\n// listing 12.41\nclass VenueManager\
  \ extends Base\n{\n    private $addvenue = \"INSERT INTO venue\n    ( name )\n \
  \   VALUES( ? )\";\n    private $addspace  = \"INSERT INTO space\n    ( name, venue\
  \ )\n    VALUES( ?, ? )\";\n    private $addevent =  \"INSERT INTO event\n    (\
  \ name, space, start, duration )\n    VALUES( ?, ?, ?, ? )\";\n    // ...\n```\n\
  \n这里没有什么新内容。这些是事务脚本将使用的 SQL 语句。它们按照`PDO`类的`prepare()`方法接受的格式构建。问号是占位符，用于替换将传递给`execute()`的值。现在是时候定义第一个旨在满足特定业务需求的方法了：\n\
  \n```php\n// listing 12.42\n// VenueManager\npublic function addVenue(string $name,\
  \ array $spaces): array\n{\n    $pdo = $this->getPdo();\n    $ret = [];\n    $ret['venue']\
  \ = [$name];\n    $stmt = $pdo->prepare($this->addvenue);\n    $stmt->execute($ret['venue']);\n\
  \    $vid = $pdo->lastInsertId();\n    $ret['spaces'] = [];\n    $stmt = $pdo->prepare($this->addspace);\n\
  \    foreach ($spaces as $spacename) {\n        $values = [$spacename, $vid];\n\
  \        $stmt->execute($values);\n        $sid = $pdo->lastInsertId();\n      \
  \  array_unshift($values, $sid);\n        $ret['spaces'][] = $values;\n    }\n \
  \   return $ret;\n}\n```\n\n如你所见，`addVenue()`需要一个场地名称和一个空间名称数组。它使用这些数据填充`venue`和`space`表。它还创建了一个包含此信息以及每行新生成的\
  \ ID 值的数据结构。\n\n如果此处出现错误，请记住，会抛出一个异常。我没有在这里捕获任何异常，因此`prepare()`抛出的任何异常也会由此方法抛出。这正是我想要的结果，尽管我应该明确说明，此方法会在我文档中抛出异常。\n\
  \n创建`venue`行后，我遍历`$spaces`，为每个元素在`space`表中添加一行。请注意，我在创建的每个`space`行中都包含了场地 ID 作为外键，将该行与场地关联起来。\n\
  \n第二个事务脚本同样简单明了：\n\n```php\n// listing 12.43\n// VenueManager\npublic function bookEvent(int\
  \ $spaceid, string $name, int $time, int $duration)\n{\n    $pdo = $this->getPdo();\n\
  \    $stmt = $pdo->prepare($this->addevent);\n    $stmt->execute([$name, $spaceid,\
  \ $time, $duration]);\n}\n```\n\n此脚本的目的是向`events`表中添加一个事件，并与一个空间关联。\n\n#### 结论\n\
  \n**事务脚本模式**是一种快速获得良好效果的有效方法。这也是许多程序员多年来一直在使用、却未曾想到需要给它命名的模式之一。通过一些好的辅助方法（比如我添加到基类中的那些），你可以专注于应用程序逻辑，而不会过多陷入数据库操作的繁琐细节中。\n\
  \n我还曾在不太受欢迎的场景中看到过事务脚本模式。我原本以为我正在编写一个比通常适合此模式要复杂得多、对象密集得多的应用程序。随着最后期限的压力开始显现，我发现自己将越来越多的逻辑放入原本打算作为**领域模型**（见下一节）的薄外观层中。虽然结果不如我期望的那么优雅，但我不得不承认，应用程序并没有因为其隐式的重新设计而受到影响。\n\
  \n在大多数情况下，对于小项目，当你确信它不会发展成一个大型项目时，你会选择事务脚本方法。这种方法扩展性不佳，因为随着脚本不可避免地相互交叉，重复常常会开始出现。当然，你可以在一定程度上将其分解出来，但可能无法完全消除。\n\
  \n在我的示例中，我决定将数据库代码嵌入到事务脚本类本身。但正如你所见，代码希望将数据库工作与应用程序逻辑分离。我可以完全将其从类中提取出来，创建一个网关类，其作用是代表系统处理数据库交互。\n\
  \n### 领域模型\n\n**领域模型**是纯粹的逻辑引擎，本章中的许多其他模式都致力于创建、培育和保护它。它是你项目中各种力量的抽象表示。它就像一种形式平面，你的业务问题在其中自由展现其本质，不受数据库和网页等讨厌的物质问题的干扰。\n\
  \n如果这听起来有点花哨，那让我们回到现实。领域模型是系统中真实世界参与者的表示。正是在领域模型中，“对象即事物”的经验法则比其他地方更为真实。在其他地方，对象往往承担职责。而在领域模型中，它们通常描述一组属性，并带有代理功能。它们是那些“做事情的东西”。\n\
  \n\n### 问题\n\n如果你一直在使用事务脚本，你可能会发现随着不同脚本需要执行相同任务，重复代码会成为一个问题。虽然可以在一定程度上进行抽象，但随着时间的推移，很容易陷入剪切-粘贴式编码。\n\
  \n你可以使用领域模型来提取并封装系统中的参与者和处理过程。与其编写脚本来向数据库添加空间数据，然后再关联事件数据，不如创建 `Space` 和 `Event`\
  \ 类。预订某个空间中的事件可以简化为调用 `Space::bookEvent()`。检查时间冲突这样的任务则变成 `Event::intersects()`，以此类推。\n\
  \n显然，对于像 Woo 这样简单的示例，事务脚本已经足够。但随着领域逻辑变得复杂，领域模型的替代方案会越来越有吸引力。复杂的逻辑可以更轻松地处理，并且在建模应用领域时，你需要的条件代码也会更少。\n\
  \n### 实现\n\n领域模型的设计可以相对简单。与此主题相关的大多数复杂性都体现在旨在保持模型纯净的模式上——也就是说，将其与应用中的其他层分离开来。\n\n\
  将领域模型的参与者与表示层分离，很大程度上只需要确保它们保持独立。然而，将参与者与数据层分离则要棘手得多。尽管理想情况是仅从模型所代表和解决的问题角度来考虑领域模型，但数据库的实际情况却难以回避。\n\
  \n领域模型类通常与关系数据库中的表直接映射，这无疑让开发更轻松。例如，图 12-11 展示了一个类图，描绘了 Woo 系统中的部分参与者。\n\n![A314621_5_En_12_Fig11_HTML.gif](img/A314621_5_En_12_Fig11_HTML.gif)\n\
  \n图 12-11.\n\n领域模型的一个片段\n\n图 12-11 中的对象镜像了为事务脚本示例建立的表结构。这种直接关联使系统更易于管理，但并非总是可行，尤其是当你使用的数据库模式先于应用存在时。这种关联本身也可能成为问题的根源。如果不小心，你最终可能是在对数据库建模，而不是在解决你试图应对的问题和驱动力。\n\
  \n领域模型经常镜像数据库结构，但这并不意味着它的类应该了解数据库的任何信息。通过将模型与数据库分离，你可以让整个层更易于测试，并且不太容易受到模式变更，甚至存储机制变更的影响。这也让每个类的职责聚焦于其核心任务。\n\
  \n以下是一个简化的 `Venue` 对象及其父类：\n\n```php\n// listing 12.44\nabstract class DomainObject\n\
  {\n    private $id;\n    public function __construct(int $id)\n    {\n        $this->id\
  \ = $id;\n    }\n    public function getId(): int\n    {\n        return $this->id;\n\
  \    }\n    public static function getCollection(string $type): Collection\n   \
  \ {\n        // 虚拟实现\n        return Collection::getCollection($type);\n    }\n\
  \    public function markDirty()\n    {\n        // 下一章再讲！\n    }\n}\n// listing\
  \ 12.45\nclass Venue extends DomainObject\n{\n    private $name;\n    private $spaces;\n\
  \    public function __construct(int $id, string $name)\n    {\n        $this->name\
  \ = $name;\n        $this->spaces = self::getCollection(Space::class);\n       \
  \ parent::__construct($id);\n    }\n    public function setSpaces(SpaceCollection\
  \ $spaces)\n    {\n        $this->spaces = $spaces;\n    }\n    public function\
  \ getSpaces(): SpaceCollection\n    {\n        return $this->spaces;\n    }\n  \
  \  public function addSpace(Space $space)\n    {\n        $this->spaces->add($space);\n\
  \        $space->setVenue($this);\n    }\n    public function setName(string $name)\n\
  \    {\n        $this->name = $name;\n        $this->markDirty();\n    }\n    public\
  \ function getName(): string\n    {\n        return $this->name;\n    }\n}\n```\n\
  \n这个类与那些设计为无需持久化的类有几点不同。我没有使用数组，而是使用 `SpaceCollection` 类型的对象来存储 `Venue` 可能包含的任何\
  \ `Space` 对象（不过，即使不涉及数据库，也有人会认为类型安全的数组也是个优点）。由于这个类使用特殊的集合对象而非 `Space` 对象数组，构造函数需要在启动时实例化一个空集合。它通过调用层超类型上的静态方法来实现这一点：\n\
  \n```php\n$this->spaces = self::getCollection(Space::class);\n```\n\n我将在下一章回到这个系统的集合对象以及如何获取它们的话题。不过目前，超类只是返回一个空数组。\n\
  \n**注意**：在本章及下一章中，我将讨论对 `Venue` 和 `Space` 对象的修改。这些是简单的领域对象，它们共享一个共同的功能核心。如果你正在跟随编码，你应该能够将我所讨论的概念应用到任何一个类上。例如，`Space`\
  \ 类可能不维护 `Space` 对象的集合，但它可能会以完全相同的方式管理 `Event` 对象。\n\n我期望构造函数中有一个 `$id` 参数，我会将它传递给超类进行存储。`$id`\
  \ 参数代表数据库中某行的唯一 ID，这一点不足为奇。另外请注意，我调用了超类上的一个方法 `markDirty()`（当你遇到工作单元模式时将会涉及这一点）。\n\
  \n### 结果\n\n领域模型的设计需要和你需要模拟的业务流程一样简单或复杂。其美妙之处在于，在设计模型时，你可以专注于问题中的驱动力，而在其他层（理论上）处理持久化和表示层等问题。\n\
  \n在实践中，我认为大多数开发者在设计领域模型时，至少会考虑数据库。没有人愿意设计出这样的结构——当需要将对象存入数据库或从数据库中取出时，会迫使你（或者更糟，你的同事）编写弯弯绕绕的复杂代码。\n\
  \n这种领域模型与数据层之间的分离在设计上代价不菲。虽然可以将数据库代码直接放在模型中（尽管你可能想设计一个网关来处理实际的 SQL），但对于相对简单的模型，特别是当每个类大体上映射到一个表时，这种方法可以真正带来好处，省去了为设计一个外部系统来协调对象与数据库之间的巨大设计开销。\n\
  \n## 总结\n\n我在这里涵盖了非常多的内容（尽管我也省略了很多）。你不应该被本章中大量的代码所吓倒。模式应该用在合适的环境中，并在有用时进行组合。使用本章中描述的那些你认为符合项目需求的模式，不要觉得在开始一个项目之前必须先构建一个完整的框架。另一方面，这里有足够的材料可以作为框架的基础，或者同样很有可能，为你可能选择部署的一些预构建框架的架构提供一些见解。\n\
  \n而且还有更多内容！我把你留在了持久化的边缘，只给出了一些关于集合和映射器的诱人提示。在下一章中，我将介绍一些用于处理数据库以及将你的对象与数据存储细节隔离开来的模式。\n\
  \n\n\n"
- "# 13. 数据库模式\n\n大多数具有一定复杂度的网络应用都会在不同程度上处理数据持久化问题。商店必须记录其商品和客户信息；游戏必须记住玩家和游戏状态；社交网站必须追踪你那\
  \ 238 位朋友以及你对 80、90 年代男孩组合那种令人费解的喜爱。无论是什么应用，它很可能都在幕后进行着数据记录。在本章中，我将探讨一些有助于解决这类问题的模式。\n\
  \n本章将涵盖以下内容：\n\n*   数据层接口：定义存储层与系统其他部分之间接触点的模式\n*   对象监控：追踪对象、避免重复，以及自动化保存和插入操作\n\
  *   灵活查询：允许客户端开发者无需考虑底层数据库即可构建查询\n*   创建已发现对象列表：构建可迭代的集合\n*   管理数据库组件：抽象工厂模式的有益回归\n\
  \n## 数据层\n\n在与客户讨论时，通常占据主导地位的是表示层。字体、颜色和易用性是主要的讨论话题。而在开发者之间，数据库往往显得举足轻重。我们关心的并非数据库本身；除非运气极差，否则我们可以信任它能完成自己的工作。不，真正引发问题的是我们用来将数据库表的行列结构转换为数据结构的机制。在本章中，我将探讨一些能够帮助完成这一过程的代码。\n\
  \n这里介绍的内容并非全部位于数据层本身。更确切地说，我将一些有助于解决持久化问题的模式归为一组。所有这些模式都由 Clifton Nock、Martin Fowler\
  \ 以及 Alur 等人分别或共同描述过。\n\n## 数据映射器\n\n如果你认为我在第 12 章的“领域模型”部分对从数据库保存和检索`Venue`对象的问题轻描淡写，那么这里或许能找到一些答案。数据映射器模式在某些地方被称为数据访问对象。首先，它由\
  \ Alur 等人在《Core J2EE Patterns: Best Practices and Design Strategies》（Prentice Hall,\
  \ 2001）中提及。此外，Martin Fowler 在《Patterns of Enterprise Application Architecture》（Addison-Wesley\
  \ Professional, 2002）中也有涉及。请注意，数据访问对象与数据映射器模式并非完全一致，因为它会生成数据传输对象；但由于这些对象经过加工后即可成为真正的对象，因此这两种模式非常接近。\n\
  \n正如你可能想象的那样，数据映射器是一个负责处理从数据库到对象转换的类。\n\n### 问题\n\n对象的组织方式与关系型数据库中的表不同。如你所知，数据库表是由行和列组成的网格。一行可以通过外键与另一个（或同一个）表中的另一行相关联。相比之下，对象之间的关联方式更为有机。一个对象可能包含另一个对象，不同的数据结构会以不同的方式组织相同的对象，在运行时通过新的关系组合和重组对象。关系型数据库针对管理大量表格化数据进行了优化，而类和对象则封装了更小、更集中的信息块。\n\
  \n这种类与关系型数据库之间的脱节通常被称为对象关系阻抗不匹配（或简称为阻抗不匹配）。\n\n那么，如何进行转换呢？一个答案是将这一问题的责任赋予一个类（或一组类），从而有效地向领域模型隐藏数据库，并管理转换过程中不可避免的粗糙边缘。\n\
  \n### 实现\n\n尽管通过细致的编程，有可能创建一个单一的`Mapper`类来服务多个对象，但通常的做法是为领域模型中的主要类各自创建一个独立的`Mapper`。\n\
  \n图 13-1 显示了三个具体的`Mapper`类和一个抽象超类。\n\n![A314621_5_En_13_Fig1_HTML.gif](img/A314621_5_En_13_Fig1_HTML.gif)\n\
  \n图 13-1.\n\nMapper 类\n\n实际上，由于`Space`对象从属于`Venue`对象，因此可以将`SpaceMapper`类纳入`VenueMapper`中。为了本练习的目的，我将保持它们分离。\n\
  \n如图所示，这些类提供了保存和加载数据的常见操作。基类存储了通用功能，而将处理特定于对象操作的职责委托给其子类。通常，这些操作包括实际的对象生成以及为数据库操作构建查询。\n\
  \n基类通常在操作前后执行一些内务处理，这就是为什么使用模板方法进行显式委托（例如，从像`insert()`这样的具体方法调用到像`doInsert()`这样的抽象方法）。实现决定了基类中的哪些方法由此具体化，你将在本章后面看到这一点。\n\
  \n以下是一个简化的`Mapper`基类版本：\n\n```\n// 清单 13.01\nabstract class Mapper\n{\n    protected\
  \ $pdo;\n    public function __construct()\n    {\n        $reg = Registry::instance();\n\
  \        $this->pdo = $reg->getPdo();\n    }\n    public function find(int $id):\
  \ DomainObject\n    {\n        $this->selectstmt()->execute([$id]);\n        $row\
  \ = $this->selectstmt()->fetch();\n        $this->selectstmt()->closeCursor();\n\
  \        if (! is_array($row)) {\n            return null;\n        }\n        if\
  \ (! isset($row['id'])) {\n            return null;\n        }\n        $object\
  \ = $this->createObject($row);\n        return $object;\n    }\n    public function\
  \ createObject(array $raw): DomainObject\n    {\n        $obj = $this->doCreateObject($raw);\n\
  \        return $obj;\n    }\n    public function insert(DomainObject $obj)\n  \
  \  {\n        $this->doInsert($obj);\n    }\n    abstract public function update(DomainObject\
  \ $object);\n    abstract protected function doCreateObject(array $raw): DomainObject;\n\
  \    abstract protected function doInsert(DomainObject $object);\n    abstract protected\
  \ function selectStmt(): \\PDOStatement;\n    abstract protected function targetClass():\
  \ string;\n}\n```\n\n构造函数使用`Registry`来获取一个 PDO 对象。对于这样的类，注册表确实展示了其价值。从控制层到`Mapper`，并不总是存在一条可以传递数据的合理路径。另一种管理映射器创建的方式是将它交给`Registry`类本身。映射器不会实例化，而是期望在构造函数参数中提供一个\
  \ PDO 对象：\n\n```\nabstract class Mapper\n{\n    protected $pdo;\n    function __construct(\\\
  PDO $pdo)\n    {\n        $this->pdo = $pdo;\n    }\n}\n```\n\n客户端代码会通过`Registry`的某个方法（例如`getVenueMapper()`）获取一个新的`VenueMapper`。这会实例化一个映射器，同时生成\
  \ PDO 对象。对于后续请求，该方法会返回缓存的映射器。由于这种方法允许映射器忽略配置的复杂性（即使使用注册表作为外观），因此我通常选择后者。\n\n回到`Mapper`类，`insert()`方法除了委托给`doInsert()`之外不做其他事情。如果不是因为我知道这里使用的实现将来会派上用场，我会将其抽象为一个`insert()`方法。\n\
  \n\n\n`find()` 负责调用预处理语句（由实现子类提供）并获取行数据，最后通过调用`createObject()`完成。将数组转换为对象的具体细节因情况而异，因此实现由抽象方法`doCreateObject()`处理。同样地，`createObject()`似乎除了委托给子类实现外什么也没做；我很快会添加一些内务处理逻辑，使这种模板方法模式的使用变得值得。\n\
  \n子类还将实现自定义方法，根据特定条件查找数据（例如，我需要定位属于`Venue`对象的`Space`对象）。\n\n你可以从子类的角度查看以下过程：\n\n\
  ```\n// listing 13.02\nclass VenueMapper extends Mapper\n{\nprivate $selectStmt;\n\
  private $updateStmt;\nprivate $insertStmt;\npublic function __construct()\n{\nparent::__construct();\n\
  $this->selectStmt = $this->pdo->prepare(\n\"SELECT * FROM venue WHERE id=?\"\n);\n\
  $this->updateStmt = $this->pdo->prepare(\n\"UPDATE venue SET name=?, id=? WHERE\
  \ id=?\"\n);\n$this->insertStmt = $this->pdo->prepare(\n\"INSERT INTO venue ( name\
  \ ) VALUES( ? )\"\n);\n}\nprotected function targetClass(): string\n{\nreturn Venue::class;\n\
  }\npublic function getCollection(array $raw): Collection\n{\nreturn new VenueCollection($raw,\
  \ $this);\n}\nprotected function doCreateObject(array $raw): DomainObject\n{\n$obj\
  \ = new Venue(\n(int)$raw['id'],\n$raw['name']\n);\nreturn $obj;\n}\nprotected function\
  \ doInsert(DomainObject $object)\n{\n$values = [$object->getName()];\n$this->insertStmt->execute($values);\n\
  $id = $this->pdo->lastInsertId();\n$object->setId((int)$id);\n}\npublic function\
  \ update(DomainObject $object)\n{\n$values = [\n$object->getName(),\n$object->getId(),\n\
  $object->getId()\n];\n$this->updateStmt->execute($values);\n}\npublic function selectStmt():\
  \ \\PDOStatement\n{\nreturn $this->selectStmt;\n}\n}\n```\n\n同样地，这个类去掉了部分尚未添加的功能特性，但依然能完成其工作。构造函数准备了一些后续使用的\
  \ SQL 语句。\n\n父类`Mapper`实现了`find()`方法，该方法调用`selectStmt()`获取准备好的`SELECT`语句。假设一切顺利，`Mapper`会调用`VenueMapper::doCreateObject()`。在这里，我使用关联数组生成`Venue`对象。\n\
  \n从客户端的角度来看，这个过程非常简单：\n\n```\n// listing 13.03\n$mapper = new VenueMapper();\n$venue\
  \ = $mapper->find(2);\nprint_r($venue);\n```\n\n调用`print_r()`是确认`find()`是否成功的快速方法。在我的系统中（假设`venue`表中存在\
  \ ID 为`2`的行），该代码片段的输出如下：\n\n```\npopp\\ch13\\batch01\\Venue Object\n(\n[name:popp\\\
  ch13\\batch01\\Venue:private] => The Likey Lounge\n[spaces:popp\\ch13\\batch01\\\
  Venue:private] =>\n[id:popp\\ch13\\batch01\\DomainObject:private] => 2\n)\n```\n\
  \n`doInsert()`和`update()`方法逆转了`find()`建立的过程。它们各自接受一个`DomainObject`，从中提取行数据，并使用提取的信息调用`PDOStatement::execute()`。注意，`doInsert()`方法会为传入的对象设置\
  \ ID。请记住，在 PHP 中对象通过引用传递，因此客户端代码会通过其自身的引用看到这一变化。\n\n另一件需要注意的事情是，`doInsert()`和`update()`并非真正类型安全。它们会无报错地接受任何`DomainObject`子类。如果传入了错误类型的对象，应执行`instanceof`测试并抛出`Exception`。\n\
  \n以下是插入和更新的客户端视角：\n\n```\n// listing 13.04\n$mapper = new VenueMapper();\n$venue\
  \ = new Venue(-1, \"The Likey Lounge\");\n// add the object to the database\n$mapper->insert($venue);\n\
  // find the object again – just to prove it works!\n$venue = $mapper->find($venue->getId());\n\
  print_r($venue);\n// alter our object\n$venue->setName(\"The Bibble Beer Likey Lounge\"\
  );\n// call update to enter the amended data\n$mapper->update($venue);\n// once\
  \ again, go back to the database to prove it worked\n$venue = $mapper->find($venue->getId());\n\
  print_r($venue);\n```\n\n\n\n### 处理多行数据\n\n`find()` 方法非常直接，因为它只需返回单个对象。但如果需要从数据库中获取大量数据，你该怎么办？你的第一反应可能是返回一个对象数组。这确实可行，但这种方法存在一个主要问题。\n\
  \n如果返回数组，集合中的每个对象都必须先实例化。如果结果集包含 1,000 个对象，这可能会造成不必要的性能开销。另一种方案是直接返回数组，让调用代码自行处理对象实例化。这虽然可行，但却违背了\
  \ `Mapper` 类的根本目的。\n\n有一种方法可以让你两者兼得：使用内置的 `Iterator` 接口。\n\n`Iterator` 接口要求实现类定义用于查询列表的方法。如果这样做了，你的类就可以像数组一样在\
  \ `foreach` 循环中使用。\n\n表 13-1 显示了 `Iterator` 接口要求实现的方法。\n\n**表 13-1. Iterator 接口定义的方法**\n\
  \n| 名称 | 描述 |\n| --- | --- |\n| `rewind()` | 将指针发送到列表开头 |\n| `current()` | 返回当前指针位置的元素\
  \ |\n| `key()` | 返回当前键（即指针值） |\n| `next()` | 返回当前指针指向的元素并将指针前移 |\n| `valid()` |\
  \ 确认当前指针位置是否存在元素 |\n\n为了实现一个 `Iterator`，你需要实现其方法，并跟踪在数据集中的位置。如何获取数据、排序或以其他方式过滤数据，对客户端来说是不可见的。\n\
  \n下面是一个 `Iterator` 的实现，它包装了一个数组，同时在构造函数中接受了一个 `Mapper` 对象，原因稍后便会明了：\n\n```php\n\
  // listing 13.05\nabstract class Collection implements \\Iterator\n{\n    protected\
  \ $mapper;\n    protected $total = 0;\n    protected $raw = [];\n    private $pointer\
  \ = 0;\n    private $objects = [];\n\n    public function __construct(array $raw\
  \ = [], Mapper $mapper = null)\n    {\n        $this->raw = $raw;\n        $this->total\
  \ = count($raw);\n        if (count($raw) && is_null($mapper)) {\n            throw\
  \ new AppException(\"need Mapper to generate objects\");\n        }\n        $this->mapper\
  \ = $mapper;\n    }\n\n    public function add(DomainObject $object)\n    {\n  \
  \      $class = $this->targetClass();\n        if (! ($object instanceof $class))\
  \ {\n            throw new AppException(\"This is a {$class} collection\");\n  \
  \      }\n        $this->notifyAccess();\n        $this->objects[$this->total] =\
  \ $object;\n        $this->total++;\n    }\n\n    abstract public function targetClass():\
  \ string;\n\n    protected function notifyAccess()\n    {\n        // deliberately\
  \ left blank!\n    }\n\n    private function getRow($num)\n    {\n        $this->notifyAccess();\n\
  \        if ($num >= $this->total || $num < 0) {\n            return null;\n   \
  \     }\n        if (isset($this->objects[$num])) {\n            return $this->objects[$num];\n\
  \        }\n        if (isset($this->raw[$num])) {\n            $this->objects[$num]\
  \ = $this->mapper->createObject($this->raw[$num]);\n            return $this->objects[$num];\n\
  \        }\n    }\n\n    public function rewind()\n    {\n        $this->pointer\
  \ = 0;\n    }\n\n    public function current()\n    {\n        return $this->getRow($this->pointer);\n\
  \    }\n\n    public function key()\n    {\n        return $this->pointer;\n   \
  \ }\n\n    public function next()\n    {\n        $row = $this->getRow($this->pointer);\n\
  \        if (! is_null($row)) {\n            $this->pointer++;\n        }\n    }\n\
  \n    public function valid()\n    {\n        return (! is_null($this->current()));\n\
  \    }\n}\n```\n\n构造函数可以不带参数调用，也可以带两个参数（一个是最终可能转换为对象的原始数据，另一个是 `Mapper` 引用）。\n\n\
  假设客户端设置了 `$raw` 参数（这通常由 `Mapper` 对象完成），该参数会与提供的数据集大小一同存储在属性中。如果提供了原始数据，则同时需要提供一个\
  \ `Mapper` 实例，因为正是它将负责把每一行数据转换为对象。\n\n如果未向构造函数传递任何参数，则该类初始化为空；但请注意，`add()` 方法可用于向集合中添加元素。\n\
  \n该类维护了两个数组：`$objects` 和 `$raw`。如果客户端请求某个特定元素，`getRow()` 方法会首先在 `$objects` 中查找是否已有其实例化对象。如果有，则直接返回。否则，该方法会在\
  \ `$raw` 中查找对应的行数据。`$raw` 数据仅在同时存在 `Mapper` 对象时才存在，因此相关行的数据可以被传递给之前遇到的 `Mapper::createObject()`\
  \ 方法。该方法返回一个 `DomainObject` 对象，该对象会被缓存在 `$objects` 数组中并附上相关的索引。新创建的 `DomainObject`\
  \ 对象随后被返回给用户。\n\n该类的其余部分是对 `$pointer` 属性的简单操作以及对 `getRow()` 的调用。不过，`notifyAccess()`\
  \ 方法除外，当你接触到懒加载模式时，它将变得非常重要。\n\n你可能已经注意到，`Collection` 类是抽象的。你需要为每个领域类提供具体的实现：\n\n\
  ```php\n// listing 13.06\nclass VenueCollection extends Collection\n{\n    public\
  \ function targetClass(): string\n    {\n        return Venue::class;\n    }\n}\n\
  ```\n\n`VenueCollection` 类简单地继承了 `Collection` 并实现了 `targetClass()` 方法。这结合父类 `add()`\
  \ 方法中的类型检查，确保了只有 `Venue` 对象才能被添加到集合中。如果你想更加安全，也可以在构造函数中提供额外的检查。\n\n显然，这个类只应与 `VenueMapper`\
  \ 协同工作。但在实际应用中，这是一个相当类型安全的集合，尤其是在领域模型方面。\n\n当然，`Event` 和 `Space` 对象也有对应的并行类。\n\n\
  图 13-2 展示了一些 `Collection` 类。\n\n![A314621_5_En_13_Fig2_HTML.gif](img/A314621_5_En_13_Fig2_HTML.gif)\n\
  \n**图 13-2.** 使用集合管理多行数据\n\n由于领域模型需要实例化 `Collection` 对象，并且我可能需要在某个时刻（特别是为了测试目的）切换实现，因此我在注册表中提供了便捷的\
  \ getter 方法，用于获取空集合。随着系统的发展，你可能将此职责委托给专门的工厂。但在开发过程中，我倾向于从最简单的方法开始，并默认使用注册表来完成大部分对象的创建。下面是我如何获取一个空的\
  \ `VenueCollection` 对象：\n\n```php\n// listing 13.07\n$reg = Registry::instance();\n\
  $collection = $reg->getVenueCollection();\n$collection->add(new Venue(-1, \"Loud\
  \ and Thumping\"));\n$collection->add(new Venue(-1, \"Eeezy\"));\n$collection->add(new\
  \ Venue(-1, \"Duck and Badger\"));\nforeach ($collection as $venue) {\n    print\
  \ $venue->getName() . \"\\n\";\n}\n```\n\n使用我在此构建的实现，你无法对该集合做更多其他操作；然而，添加 `elementAt()`、`deleteAt()`、`count()`\
  \ 以及类似的方法是一个简单的任务。（而且很有趣，享受其中吧！）\n\n注意，我使用了 `::class` 语法来获取类的完全限定字符串表示。这个特性自 PHP\
  \ 5.5 起才可用。在此之前，我必须小心地自己提供完整的 `namespace` 路径。\n\n\n\n### 使用生成器替代迭代器接口\n\n虽然实现 `Iterator`\
  \ 接口并不困难，但过程可能较为繁琐。从 PHP 5.5 开始，你可以使用一种更简单（且通常更节省内存）的机制——生成器。生成器是一种能返回多个值的函数，通常配合循环使用。生成器函数使用\
  \ `yield` 关键字替代 `return`。当 PHP 处理器在函数中遇到 `yield` 时，会向调用代码返回一个 `Generator` 类型的 `Iterator`\
  \ 对象。这个新对象可以像任何 `Iterator` 一样被处理。巧妙之处在于，使用 `yield` 产生值的循环会继续运行，但仅在 `Generator` 被请求其\
  \ `next()` 值时才会执行。实际上，其流程如下：\n\n- 客户端代码调用一个生成器函数（包含 `yield` 关键字的函数）\n- 生成器函数包含一个循环或重复过程，通过\
  \ `yield` 返回多个值。遇到 `yield` 时，PHP 处理器会创建一个 `Generator` 对象并将其返回给客户端代码\n- 生成器函数中的重复过程在此处暂时冻结\n\
  - 客户端代码获取此 `Generator` 对象，并将其视为任何 `Iterator`——通常传递给 `foreach`\n- 每次 `foreach` 迭代时，`Generator`\
  \ 对象都会从生成器函数中获取下一个值\n\n因此，我可以将此功能用于我的 `Collection` 基类。由于生成器函数（或方法）返回的是 `Generator`，`Collection`\
  \ 本身将不再可迭代——相反，我会使用一个生成器方法作为工厂：\n\n```php\n// src/ch13/batch01/GenCollection.php\n\
  // listing 13.08\nabstract class GenCollection\n{\nprotected $mapper;\nprotected\
  \ $total = 0;\nprotected $raw = [];\nprivate $result;\nprivate $pointer = 0;\nprivate\
  \ $objects = [];\npublic function __construct(array $raw = [], Mapper $mapper =\
  \ null)\n{\n$this->raw = $raw;\n$this->total = count($raw);\nif (count($raw) &&\
  \ is_null($mapper)) {\nthrow new AppException(\"need Mapper to generate objects\"\
  );\n}\n$this->mapper = $mapper;\n}\npublic function add(DomainObject $object)\n\
  {\n$class = $this->targetClass();\nif (! ($object instanceof $class )) {\nthrow\
  \ new AppException(\"This is a {$class} collection\");\n}\n$this->notifyAccess();\n\
  $this->objects[$this->total] = $object;\n$this->total++;\n}\npublic function getGenerator()\n\
  {\nfor ($x = 0; $x < $this->total; $x++) {\nyield $this->getRow($x);\n}\n}\nabstract\
  \ public function targetClass(): string;\nprotected function notifyAccess()\n{\n\
  // deliberately left blank!\n}\nprivate function getRow($num)\n{\n$this->notifyAccess();\n\
  if ($num >= $this->total || $num < 0) {\nreturn null;\n}\nif (isset($this->objects[$num]))\
  \ {\nreturn $this->objects[$num];\n}\nif (isset($this->raw[$num])) {\n$this->objects[$num]\
  \ = $this->mapper->createObject($this->raw[$num]);\nreturn $this->objects[$num];\n\
  }\n}\n}\n```\n\n如你所见，这使得基类更加紧凑。我能够去掉 `current()` 和 `reset()` 等方法。唯一的缺点是 `Collection`\
  \ 本身不能再直接迭代。相反，客户端代码必须调用 `getGenerator()` 并迭代由 `yield` 导致的 `Generator` 返回对象，如下所示：\n\
  \n```php\n// listing 13.09\n$genvencoll = new GenVenueCollection();\n$genvencoll->add(new\
  \ Venue(-1, \"Loud and Thumping\"));\n$genvencoll->add(new Venue(-1, \"Eeezy\"));\n\
  $genvencoll->add(new Venue(-1, \"Duck and Badger\"));\n$gen = $genvencoll->getGenerator();\n\
  foreach ($gen as $wrapper) {\nprint_r($wrapper);\n}\n```\n\n由于我更倾向于不为系统添加这一额外层级，在本例中我将坚持使用已实现的\
  \ `Iterator` 版本。然而，对于以最少设置创建轻量级迭代器而言，生成器确实是更好的选择。\n\n### 获取集合对象\n\n我们已经看到，我决定使用\
  \ `Registry` 作为集合的工厂。同时，我也用它来提供 `Mapper` 对象。代码如下：\n\n```php\n// listing 13.10\n\
  public function getVenueMapper(): VenueMapper\n{\nreturn new VenueMapper();\n}\n\
  public function getSpaceMapper(): SpaceMapper\n{\nreturn new SpaceMapper();\n}\n\
  public function getEventMapper(): EventMapper\n{\nreturn new EventMapper();\n}\n\
  public function getVenueCollection(): VenueCollection\n{\nreturn new VenueCollection();\n\
  }\npublic function getSpaceCollection(): SpaceCollection\n{\nreturn new SpaceCollection();\n\
  }\npublic function getEventCollection(): EventCollection\n{\nreturn new EventCollection();\n\
  }\n```\n\n我开始触及 `Registry` 的适用边界。再增加几个 getter 方法，就该重构这段代码以改用抽象工厂模式了。不过我把这个任务留给你（如果需要复习，请回顾第\
  \ 9 章）。\n\n既然访问 `Mapper` 和 `Collection` 类如此简单，`Venue` 类就可以扩展以管理 `Space` 对象的持久化。该类提供了将单个\
  \ `Space` 对象添加至其 `SpaceCollection` 或切换为全新 `SpaceCollection` 的方法：\n\n```php\n// listing\
  \ 13.11\n// Venue\npublic function getSpaces(): SpaceCollection\n{\nif (is_null($this->spaces))\
  \ {\n$reg = Registry::instance();\n$this->spaces = $reg->getSpaceCollection();\n\
  }\nreturn $this->spaces;\n}\npublic function setSpaces(SpaceCollection $spaces)\n\
  {\n$this->spaces = $spaces;\n}\npublic function addSpace(Space $space)\n{\n$this->getSpaces()->add($space);\n\
  $space->setVenue($this);\n}\n```\n\n`setSpaces()` 操作目前默认集合中的所有 `Space` 对象都指向当前 `Venue`。虽然很容易在该方法中添加检查，但此处保持简单。请注意，我仅在调用\
  \ `getSpaces()` 时才实例化 `$spaces` 属性。稍后，我将演示如何扩展这种延迟实例化以限制数据库请求。\n\n`VenueMapper`\
  \ 需要为它创建的每个 `Venue` 对象设置一个 `SpaceCollection`：\n\n```php\n// listing 13.12\n// VenueMapper\n\
  protected function doCreateObject(array $array): DomainObject\n{\n$obj = new Venue(\n\
  (int)$array['id'],\n$array['name']\n);\n$spacemapper = new SpaceMapper();\n$spacecollection\
  \ = $spacemapper->findByVenue($array['id']);\n$obj->setSpaces($spacecollection);\n\
  return $obj;\n}\n```\n\n`VenueMapper::doCreateObject()` 方法获取一个 `SpaceMapper`，并从中获取一个\
  \ `SpaceCollection`。如你所见，`SpaceMapper` 类实现了 `findByVenue()` 方法。这引出了生成多个对象的查询。为简洁起见，我从\
  \ `woo\\mapper\\Mapper` 的原始代码中省略了 `Mapper::findAll()` 方法。以下是恢复后的代码：\n\n```php\n\
  // listing 13.13\n// Mapper\npublic function findAll(): Collection\n{\n$this->selectAllStmt()->execute([]);\n\
  return $this->getCollection(\n$this->selectAllStmt()->fetchAll()\n);\n}\nabstract\
  \ protected function selectAllStmt(): \\PDOStatement;\nabstract protected function\
  \ getCollection(array $raw): Collection;\n```\n\n该方法调用了一个子方法：`selectAllStmt()`。与\
  \ `selectStmt()` 类似，该方法应包含一个预处理语句对象，用于获取表中的所有行。以下是 `SpaceMapper` 类中创建的 `PDOStatement`\
  \ 对象：\n\n```php\n// listing 13.14\n// SpaceMapper::__construct()\n$this->selectAllStmt\
  \ = $this->pdo->prepare(\n\"SELECT * FROM space\"\n);\n$this->findByVenueStmt =\
  \ $this->pdo->prepare(\n\"SELECT * FROM space where venue=?\"\n);\n```\n\n我还包含了另一个语句\
  \ `$findByVenueStmt`，用于查找特定 `Venue` 的 `Space` 对象。\n\n`findAll()` 方法调用了另一个新方法 `getCollection()`，并将查询到的数据传递给它。以下是\
  \ `SpaceMapper::getCollection()`：\n\n\n\n```\n// listing 13.15\npublic function\
  \ getCollection(array $raw): Collection\n{\nreturn new SpaceCollection($raw, $this);\n\
  }\n```\n\n`Mapper`类的完整版本应将`getCollection()`和`selectAllStmt()`声明为抽象方法，以便所有映射器都能返回包含其持久化领域对象的集合。然而，为了获取属于某个`Venue`的`Space`对象，我需要一个更受限的集合。你已经看到了用于获取数据的预编译语句；现在，这里是生成集合的`SpaceMapper::findByVenue()`方法：\n\
  \n```\n// listing 13.16\npublic function findByVenue($vid): Collection\n{\n$this->findByVenueStmt->execute([$vid]);\n\
  return new SpaceCollection($this->findByVenueStmt->fetchAll(), $this);\n}\n```\n\
  \n`findByVenue()`方法与`findAll()`相同，区别仅在于使用的 SQL 语句。回到`VenueMapper`中，生成的集合通过`Venue::setSpaces()`设置在`Venue`对象上。\n\
  \n因此，`Venue`对象现在从数据库中全新获取，并附带一个类型安全的列表中包含的所有`Space`对象。该列表中的所有对象在请求之前都不会被实例化。\n\n\
  图 13-3 展示了客户端类获取`SpaceCollection`的过程，以及`SpaceCollection`类如何与`SpaceMapper::createObject()`交互，将其原始数据转换为对象返回给客户端。\n\
  \n![A314621_5_En_13_Fig3_HTML.gif](img/A314621_5_En_13_Fig3_HTML.gif)\n\n图 13-3.\
  \ 获取 `SpaceCollection` 并使用它获取 `Space` 对象\n\n### 后果\n\n我将`Space`对象添加到`Venue`对象的方法的缺点是必须进行两次数据库查询。在大多数情况下，我认为这是值得付出的代价。此外，请注意，`VenueMapper::doCreateObject()`中获取正确填充的`SpaceCollection`的工作可以移到`Venue::getSpaces()`中，这样二次数据库连接只会在需要时发生。以下是该方法可能的样子：\n\
  \n```\n// listing 13.17\n// Venue\npublic function getSpaces2()\n{\nif (is_null($this->spaces))\
  \ {\n$reg = Registry::instance();\n$finder = $reg->getSpaceMapper();\n$this->spaces\
  \ = $finder->findByVenue($this->getId());\n}\nreturn $this->spaces;\n}\n```\n\n\
  然而，如果效率成为问题，应该很容易完全抽离`SpaceMapper`，并使用 SQL 联接一次性检索所有需要的数据。\n\n当然，你的代码可能会因此变得不那么可移植，但效率优化总是有代价的！\n\
  \n最终，`Mapper`类的粒度会有所不同。如果一个对象类型仅由另一个对象类型存储，那么你可能只考虑为容器创建`Mapper`。\n\n该模式的最大优势在于它在领域层和数据库之间实现了强解耦。`Mapper`对象在幕后承担压力，并能适应各种复杂的关系结构。\n\
  \n该模式最大的缺点可能是创建具体`Mapper`类所需的大量繁琐工作。然而，存在大量可自动生成的样板代码。一种生成`Mapper`类通用方法的巧妙方式是通过`反射`。你可以查询领域对象，发现其`setter`和`getter`方法（或许结合参数命名约定），并生成基础的`Mapper`类以供修改。本章中所有`Mapper`类最初都是这样生成的。\n\
  \n使用映射器时需要注意的一个问题是一次性加载过多对象的风险。不过，`Iterator`实现在这里有所帮助。因为`Collection`对象最初只保存行数据，所以只有在访问特定`Venue`并将其从数组转换为对象时，才会进行二次请求（获取`Space`对象）。这种惰性加载形式甚至可以进一步增强，你将在后续内容中看到。\n\
  \n你应该注意涟漪加载。在创建映射器时，请意识到使用另一个映射器来获取对象属性可能只是冰山一角。这个二级映射器在构建自身对象时可能又会用到更多映射器。如果不小心，你可能会发现表面上的简单查找操作会触发数十个其他类似操作。\n\
  \n你还应该注意数据库应用程序为构建高效查询所设定的任何指导原则，并准备好进行优化（必要时针对不同数据库进行）。适用于多种数据库应用程序的 SQL 语句很好；但快速的应用更好。尽管引入条件语句（或策略类）来管理同一查询的不同版本是一件苦差事，且在前一种情况下可能显得丑陋，但不要忘记所有这些杂乱的优化都被整洁地隐藏在客户端代码之外。\n\
  \n## 身份映射\n\n你还记得 PHP 4 中按值传递错误的噩梦吗？当两个你本以为指向同一个对象的变量，结果却指向不同但巧妙地相似的变量时，那随之而来的混乱？好吧，这个噩梦又回来了。\n\
  \n### 问题\n\n以下是为测试数据映射器示例而创建的一些测试代码：\n\n```\n// listing 13.18\n$mapper = new VenueMapper();\n\
  $venue = new Venue(-1, \"The Likey Lounge\");\n$mapper->insert($venue);\n$venue\
  \ = $mapper->find($venue->getId());\nprint_r($venue);\n$venue->setName(\"The Bibble\
  \ Beer Likey Lounge\");\n$mapper->update($venue);\n$venue = $mapper->find($venue->getId());\n\
  print_r($venue);\n```\n\n这段代码的目的是演示你添加到数据库中的对象也可以通过`Mapper`提取，并且是相同的。相同，也就是说，除了不是同一个对象之外，其他所有方面都相同。我在设计这个问题时作弊了，将新的`Venue`对象赋值给了旧的变量。不幸的是，你并不总是能够对情况有那样的控制。同一个对象可能在单个`请求`中被多次引用。如果你修改了它的一个版本并保存到数据库，你能确保该对象的另一个版本（可能已经存储在`Collection`对象中）不会覆盖你的更改吗？\n\
  \n重复对象在系统中不仅存在风险，还代表了相当大的开销。一些常用对象可能在一次处理中被加载三到四次，而除了其中一次之外，所有其他数据库查询都是完全多余的。\n\n\
  幸运的是，解决这个问题相对简单。\n\n\n\n### 实现\n\n身份映射本质上是一个对象，其任务是跟踪系统中的所有对象，从而帮助确保本应是一个对象的事物不会变成两个。\n\
  \n实际上，`Identity Map` 本身并不会主动阻止这种情况发生。它的作用是管理关于对象的信息。下面是一个简单的 `Identity Map`：\n\n\
  ```\n// 清单 13.19\nclass ObjectWatcher\n{\nprivate $all = [];\nprivate static $instance\
  \ = null;\nprivate function __construct()\n{\n}\npublic static function instance():\
  \ self\n{\nif (is_null(self::$instance)) {\nself::$instance = new ObjectWatcher();\n\
  }\nreturn self::$instance;\n}\npublic function globalKey(DomainObject $obj): string\n\
  {\n$key = get_class($obj) . \".\" . $obj->getId();\nreturn $key;\n}\npublic static\
  \ function add(DomainObject $obj)\n{\n$inst = self::instance();\n$inst->all[$inst->globalKey($obj)]\
  \ = $obj;\n}\npublic static function exists($classname, $id)\n{\n$inst = self::instance();\n\
  $key = \"{$classname}.{$id}\";\nif (isset($inst->all[$key])) {\nreturn $inst->all[$key];\n\
  }\nreturn null;\n}\n}\n```\n\n图 13-4 展示了 `Identity Map` 对象如何与你见过的其他类进行集成。\n\n![A314621_5_En_13_Fig4_HTML.gif](img/A314621_5_En_13_Fig4_HTML.gif)\n\
  \n**图 13-4.** 身份映射\n\n使用 `Identity Map` 的主要技巧，很明显，在于标识对象。这意味着你需要以某种方式标记每个对象。这里你可以采取多种不同的策略。系统所有对象已经使用的数据库表键并不合适，因为\
  \ ID 并不能保证在所有表中都是唯一的。\n\n你也可以使用数据库来维护一个全局键表。每当你创建一个对象时，你都会递增键表的运行总数，并将该全局键与对象关联到其自身的行中。这种开销相对较小，而且很容易实现。\n\
  \n如你所见，我选择了一种完全更简单的方法。我将对象的类名与其表 ID 拼接起来。不可能有两个 ID 为 4 的 `popp\\ch13\\batch03\\\
  Event` 类型的对象，所以我的键 `popp\\ch13\\batch03\\Event.4` 对于我的目的来说足够安全。\n\n`globalKey()`\
  \ 方法处理了这方面的细节。该类提供了一个 `add()` 方法用于添加新对象。每个对象都用其唯一键标记在一个数组属性 `$all` 中。\n\n`exists()`\
  \ 方法接受一个类名和一个 `$id`，而不是一个对象。我不希望为了检查某个对象是否已经存在而去实例化它！该方法从这些数据构建一个键，并检查它是否索引了 `$all`\
  \ 属性中的一个元素。如果找到了一个对象，则会相应地返回一个引用。\n\n只有一个类中我将 `ObjectWatcher` 类用作 `Identity Map`。`Mapper`\
  \ 类提供了生成对象的功能，因此在那里添加检查是合理的：\n\n```\n// 清单 13.20\n// Mapper\npublic function find(int\
  \ $id): DomainObject\n{\n$old = $this->getFromMap($id);\nif (! is_null($old)) {\n\
  return $old;\n}\n// 处理数据库\nreturn $object;\n}\nabstract protected function targetClass():\
  \ string;\nprivate function getFromMap($id)\n{\nreturn ObjectWatcher::exists(\n\
  $this->targetClass(),\n$id\n);\n}\nprivate function addToMap(DomainObject $obj)\n\
  {\nObjectWatcher::add($obj);\n}\npublic function createObject($raw)\n{\n$old = $this->getFromMap($raw['id']);\n\
  if (! is_null($old)) {\nreturn $old;\n}\n$obj = $this->doCreateObject($raw);\n$this->addToMap($obj);\n\
  return $obj;\n}\npublic function insert(DomainObject $obj)\n{\n$this->doInsert($obj);\n\
  $this->addToMap($obj);\n}\n```\n\n该类提供了两个便捷方法：`addToMap()` 和 `getFromMap()`。这些方法省去了我记忆\
  \ `ObjectWatcher` 静态调用完整语法的麻烦。更重要的是，它们会调用子类实现（例如 `VenueMapper`）来获取当前等待实例化的类的名称。\n\
  \n这是通过调用 `targetClass()` 来实现的，这是一个抽象方法，由所有具体的 `Mapper` 类实现。它应该返回该 `Mapper` 设计用来生成的类的名称。下面是\
  \ `SpaceMapper` 类对 `targetClass()` 的实现：\n\n```\n// 清单 13.21\n// SpaceMapper\nprotected\
  \ function targetClass(): string\n{\nreturn Space::class;\n}\n```\n\n`find()` 和\
  \ `createObject()` 都首先通过将对象 ID 传递给 `getFromMap()` 来检查现有对象。如果找到对象，则将其返回给客户端，并结束方法执行。然而，如果该对象尚不存在任何版本，则继续执行对象实例化。在\
  \ `createObject()` 中，新对象会被传递给 `addToMap()`，以防止将来发生任何冲突。\n\n那么，为什么我要在 `find()` 和\
  \ `createObject()` 中都调用 `getFromMap()`，从而两次经历这个过程的某个部分呢？答案在于 `Collections`。当它们生成对象时，是通过调用\
  \ `createObject()` 来完成的。我需要确保 `Collection` 对象封装的行不是过时的，同时确保将对象的最新版本返回给用户。\n\n###\
  \ 后果\n\n只要你在所有从数据库生成或向数据库添加对象的场景中都使用 `Identity Map`，那么你进程中出现重复对象的可能性几乎为零。\n\n当然，这仅在你的进程内有效。不同的进程不可避免地会同时访问同一对象的多个版本。仔细考虑并发访问可能导致的数据库损坏的可能性非常重要。如果存在严重问题，你可能需要考虑锁定策略。你也可以考虑将对象存储在共享内存中，或者使用像\
  \ Memcached 这样的外部对象缓存系统。你可以在 [`http://danga.com/memcached/`](http://danga.com/memcached/)\
  \ 了解 Memcached，并在 [`http://www.php.net/memcache`](http://www.php.net/memcache) 了解\
  \ PHP 对它的支持。\n\n## 工作单元\n\n你何时保存你的对象？在我发现 `Unit of Work` 模式（由 David Rice 在 Martin\
  \ Fowler 的《企业应用架构模式》一书中撰写）之前，我是在命令执行完成后从表示层发出保存指令的。事实证明，这是一个代价高昂的设计决策。\n\n`Unit\
  \ of Work` 模式可以帮助你只保存那些需要保存的对象。\n\n### 问题所在\n\n有一天，我将 SQL 语句回显到浏览器窗口以追踪一个问题，结果大吃一惊。我发现自己在同一个请求中一遍又一遍地保存相同的数据。我有一套精巧的复合命令系统，这意味着一个命令可能会触发多个其他命令，而每个命令都会清理自己的状态。\n\
  \n我不仅两次保存了同一个对象，我还保存了那些不需要保存的对象。\n\n那么，这个问题在某些方面与 `Identity Map` 所解决的问题类似。那个问题涉及不必要的对象加载；而这个问题则处于流程的另一端。正如这些问题互为补充一样，这些解决方案也是如此。\n\
  \n\n\n### 实现\n\n要确定需要执行哪些数据库操作，你需要跟踪对象发生的各种事件。最合适的做法可能是在对象自身内部进行跟踪。\n\n你还需要维护一个列表，记录已安排执行每种数据库操作（即插入、更新、删除）的对象。我在这里只介绍插入和更新操作。哪里是存储对象列表的好地方呢？碰巧我已经有了一个\
  \ `ObjectWatcher` 对象，因此我可以进一步对其进行开发：\n\n```\n// listing 13.22\n// ObjectWatcher\n\
  private $all = [];\nprivate $dirty = [];\nprivate $new = [];\nprivate $delete =\
  \ []; // 本例中未使用\nprivate static $instance = null;\npublic static function addDelete(DomainObject\
  \ $obj)\n{\n$inst = self::instance();\n$inst->delete[$self->globalKey($obj)] = $obj;\n\
  }\npublic static function addDirty(DomainObject $obj)\n{\n$inst = self::instance();\n\
  if (! in_array($obj, $inst->new, true)) {\n$inst->dirty[$inst->globalKey($obj)]\
  \ = $obj;\n}\n}\npublic static function addNew(DomainObject $obj)\n{\n$inst = self::instance();\n\
  // 我们还没有获取到 id\n$inst->new[] = $obj;\n}\npublic static function addClean(DomainObject\
  \ $obj)\n{\n$inst  = self::instance();\nunset($inst->delete[$inst->globalKey($obj)]);\n\
  unset($inst->dirty[$inst->globalKey($obj)]);\n$inst->new = array_filter(\n$inst->new,\n\
  function ($a) use ($obj) {\nreturn !($a === $obj);\n}\n);\n}\npublic function performOperations()\n\
  {\nforeach ($this->dirty as $key => $obj) {\n$obj->getFinder()->update($obj);\n\
  }\nforeach ($this->new as $key => $obj) {\n$obj->getFinder()->insert($obj);\nprint\
  \ \"inserting \" . $obj->getName() . \"\\n\";\n}\n$this->dirty = [];\n$this->new\
  \ = [];\n}\n```\n\n`ObjectWatcher` 类仍然是一个标识映射，并继续通过 `$all` 属性执行其跟踪系统中所有对象的功能。此示例只是向该类添加了更多功能。\n\
  \n你可以在图 13-5 中看到 `ObjectWatcher` 类的工作单元特性。\n\n![A314621_5_En_13_Fig5_HTML.gif](img/A314621_5_En_13_Fig5_HTML.gif)\n\
  \n图 13-5.\n\nObjectWatcher 类中的工作单元特性\n\n当一个对象从数据库中提取出来后被修改，则称其为“**脏的**”。脏对象会存储在\
  \ `$dirty` 数组属性中（通过 `addDirty()` 方法），直到需要更新数据库时为止。客户端代码可能出于自身原因决定某个脏对象不应被更新。它可以通过将该脏对象标记为“干净的”（使用\
  \ `addClean()` 方法）来确保这一点。正如你所料，新创建的对象应被添加到 `$new` 数组中（通过 `addNew()` 方法）。此数组中的对象被安排插入到数据库中。在这些示例中我没有实现删除功能，但其原理应该足够清晰。\n\
  \n`addDirty()` 和 `addNew()` 方法各自将一个对象添加到其对应的数组属性中。然而，`addClean()` 则是将给定的对象从 `$dirty`\
  \ 数组中移除，将其标记为不再等待更新。\n\n当最终需要处理存储在这些数组中的所有对象时，应调用 `performOperations()` 方法（可能从控制器类或其辅助类中调用）。此方法会遍历\
  \ `$dirty` 和 `$new` 数组，对对象执行更新或插入操作。\n\n现在，`ObjectWatcher` 类提供了一种更新和插入对象的机制。这段代码仍然缺少一种将对象添加到\
  \ `ObjectWatcher` 对象的方法。\n\n由于这些对象是操作的对象，因此它们最适合执行这种通知操作。以下是我可以添加到 `DomainObject`\
  \ 类中的一些实用方法——请特别注意构造函数方法：\n\n```\n// listing 13.23\nabstract class DomainObject\n\
  {\nprivate $id;\npublic function __construct(int $id)\n{\n$this->id = $id;\nif ($id\
  \ markNew();\n}\n}\nabstract public function getFinder(): Mapper;\npublic function\
  \ getId(): int\n{\nreturn $this->id;\n}\npublic function setId(int $id)\n{\n$this->id\
  \ = $id;\n}\npublic function markNew()\n{\nObjectWatcher::addNew($this);\n}\npublic\
  \ function markDeleted()\n{\nObjectWatcher::addDelete($this);\n}\npublic function\
  \ markDirty()\n{\nObjectWatcher::addDirty($this);\n}\npublic function markClean()\n\
  {\nObjectWatcher::addClean($this);\n}\n}\n```\n\n如你所见，如果构造函数方法没有接收到 `$id` 属性，它会将当前对象标记为新的（通过调用\
  \ `markNew()`）。这可以说是某种魔法，应谨慎对待。就目前而言，这段代码无需对象创建者的任何干预，就将一个新对象排入插入数据库的队列。想象一下，一个新加入团队的编码人员编写了一个临时脚本来测试某些领域行为。那里没有持久化代码的痕迹，所以一切都应该足够安全，对吧？现在想象这些测试对象（可能带有有趣的临时名称）进入了持久化存储。魔法虽好，但清晰度更佳。或许更好的做法是要求客户端代码向构造函数传递某种标志，以便将新对象排入插入队列。\n\
  \n我还需要向 `Mapper` 类添加一些代码：\n\n```\n// listing 13.24\n// Mapper\npublic function createObject($raw):\
  \ DomainObject\n{\n$old = $this->getFromMap($raw['id']);\nif (! is_null($old)) {\n\
  return $old;\n}\n$obj = $this->doCreateObject($raw);\n$this->addToMap($obj);\nreturn\
  \ $obj;\n}\n```\n\n剩下唯一要做的就是向领域模型类中的方法添加 `markDirty()` 调用。记住，脏对象是指从数据库检索出来后被修改过的对象。这是此模式中唯一带有一些瑕疵的方面。显然，确保所有改变了对象状态的方法都被标记为脏对象非常重要，但这项任务的手动特性意味着人为错误的可能性非常真实。\n\
  \n以下是 `Space` 对象中调用 `markDirty()` 的一些方法：\n\n```\n// listing 13.25\n// Space\npublic\
  \ function setVenue(Venue $venue)\n{\n$this->venue = $venue;\n$this->markDirty();\n\
  }\npublic function setName(string $name)\n{\n$this->name = $name;\n$this->markDirty();\n\
  }\n```\n\n以下是一些用于将新的 `Venue` 和 `Space` 添加到数据库的代码，取自一个 `Command` 类：\n\n```\n// listing\
  \ 13.26\n$venue = new Venue(-1, \"The Green Trees\");\n$venue->addSpace(\nnew Space(-1,\
  \ 'The Space Upstairs')\n);\n$venue->addSpace(\nnew Space(-1, 'The Bar Stage')\n\
  );\n// 这可以从控制器或辅助类中调用\nObjectWatcher::instance()->performOperations();\n```\n\n\
  我在 `ObjectWatcher` 中添加了一些调试代码，以便你看到请求结束时的输出：\n\n```\ninserting The Green Trees\n\
  inserting The Space Upstairs\ninserting The Bar Stage\n```\n\n因为通常由高级控制器对象调用 `performOperations()`\
  \ 方法，所以在大多数情况下，你只需创建或修改一个对象，而工作单元类 (`ObjectWatcher`) 会在请求结束时恰好执行一次其工作。\n\n### 结果\n\
  \n此模式非常有用，但有几个需要注意的问题。你需要确保所有修改操作确实会将相关对象标记为脏对象。如果未能做到这一点，可能会导致难以发现的错误。\n\n你可能想了解测试修改对象的其他方法。反射听起来是一个不错的选择，但你应该研究一下此类测试对性能的影响——此模式旨在提高效率，而不是削弱它。\n\
  \n### 延迟加载\n\n**延迟加载** 是那些大多数 Web 程序员自己很快就能掌握的核心模式之一，这仅仅是因为它是一个避免大规模数据库命中的基本机制，而这是我们都想做的事情。\n\
  \n\n\n### 问题\n\n在本章主导的示例中，我建立了 `Venue`、`Space` 和 `Event` 对象之间的关系。当创建一个 `Venue` 对象时，它会自动获得一个\
  \ `SpaceCollection` 对象。如果我要列出某个 `Venue` 中的每一个 `Space` 对象，这将自动触发一次数据库请求，以获取与该 `Space`\
  \ 关联的所有 `Events`。这些事件存储在一个 `EventCollection` 对象中。即使我不想查看任何事件，我也已经毫无理由地多次访问了数据库。面对众多场所，每个场所有两三个空间，每个空间管理着数十甚至上百个事件，这是一个代价高昂的过程。\n\
  \n显然，在某些情况下，我们需要限制这种自动包含集合的行为。\n\n以下是 `SpaceMapper` 中获取 `Event` 数据的代码：\n\n```\n\
  // listing 13.27\n// SpaceMapper\nprotected function doCreateObject(array $raw):\
  \ DomainObject\n{\n    $obj = new Space((int)$raw['id'], $raw['name']);\n    $venmapper\
  \ = new VenueMapper();\n    $venue = $venmapper->find((int)$raw['venue']);\n   \
  \ $obj->setVenue($venue);\n    $eventmapper = new EventMapper();\n    $eventcollection\
  \ = $eventmapper->findBySpaceId((int)$raw['id']);\n    $obj->setEvents($eventcollection);\n\
  \    return $obj;\n}\n```\n\n`doCreateObject()` 方法首先获取与该空间关联的 `Venue` 对象。这通常代价不高，因为它几乎肯定已经存储在\
  \ `ObjectWatcher` 对象中了。然后，该方法调用 `EventMapper::findBySpaceId()` 方法。这正是系统可能遇到问题的环节。\n\
  \n### 实现\n\n你可能知道，延迟加载是指在客户端实际请求某个属性之前，推迟对该属性的获取。\n\n实现这一点最简单的方法是在包含对象中显式地进行延迟处理。以下是我在\
  \ `Space` 对象中可能采用的做法：\n\n```\n// listing 13.28\n// Space\npublic function getEvents2()\n\
  {\n    if (is_null($this->events)) {\n        $this->events = $this->getFinder()->findBySpaceId($this->getId());\n\
  \    }\n    return $this->events;\n}\n```\n\n这个方法会检查 `$events` 属性是否已设置。如果没有，该方法会获取一个查找器（即\
  \ `Mapper`）并使用自身的 `$id` 属性来获取与之关联的 `EventCollection`。显然，为了让这个方法能节省一次可能不必要的数据库查询，我还需要修改\
  \ `SpaceMapper` 的代码，使其不再像上一个例子中那样自动预加载 `EventCollection` 对象！\n\n这种方法虽然有点杂乱，但能正常工作。能把这种杂乱清理干净岂不更好？\n\
  \n这就让我们回到了构成 `Collection` 对象的 `Iterator` 实现上。我已经在那个接口背后隐藏了一个秘密（即当客户端访问时，原始数据可能尚未用于实例化领域对象）。也许我可以隐藏更多。\n\
  \n这里的想法是创建一个`EventCollection` 对象，它将数据库访问推迟到收到请求时进行。这意味着，客户端对象（例如 `Space`）最初完全不需要知道它持有一个空的\
  \ `Collection`。对于客户端而言，它持有的是一个完全正常的 `EventCollection`。\n\n以下是 `DeferredEventCollection`\
  \ 对象：\n\n```\n// listing 13.29\nclass DeferredEventCollection extends EventCollection\n\
  {\n    private $stmt;\n    private $valueArray;\n    private $run = false;\n\n \
  \   public function __construct(\n        Mapper $mapper,\n        \\PDOStatement\
  \ $stmt_handle,\n        array $valueArray\n    ) {\n        parent::__construct([],\
  \ $mapper);\n        $this->stmt = $stmt_handle;\n        $this->valueArray = $valueArray;\n\
  \    }\n\n    public function notifyAccess()\n    {\n        if (! $this->run) {\n\
  \            $this->stmt->execute($this->valueArray);\n            $this->raw =\
  \ $this->stmt->fetchAll();\n            $this->total = count($this->raw);\n    \
  \    }\n        $this->run = true;\n    }\n}\n```\n\n如你所见，这个类继承自标准的 `EventCollection`。它的构造函数需要\
  \ `Mapper` 和 `PDOStatement` 对象，以及一个与预处理语句参数匹配的术语数组。最初，这个类除了存储其属性并等待之外，什么也不做。没有对数据库发起任何查询。\n\
  \n你可能还记得，`Collection` 基类定义了一个空的 `notifyAccess()` 方法，我在“数据映射器”一节中提到过。这个方法会在任何由外部世界调用而触发的方法中被调用。\n\
  \n`DeferredEventCollection` 重写了这个方法。现在，如果有人试图访问这个 `Collection`，该类就知道是时候结束伪装并获取一些真实数据了。它通过调用\
  \ `PDOStatement::execute()` 方法来实现这一点。结合 `PDOStatement::fetch()`，这会生成一个适合传递给 `Mapper::createObject()`\
  \ 的字段数组。\n\n以下是在 `EventMapper` 中实例化 `DeferredEventCollection` 的方法：\n\n```\n// listing\
  \ 13.30\n// EventMapper\npublic function findBySpaceId(int $sid)\n{\n    return\
  \ new DeferredEventCollection(\n        $this,\n        $this->selectBySpaceStmt,\n\
  \        [$sid]\n    );\n}\n```\n\n### 影响\n\n无论你是否显式地向领域类中添加延迟加载逻辑，养成延迟加载的习惯都是好的。\n\
  \n除了类型安全之外，为你的属性使用集合而非数组的一个特别好处是，这为你提供了在需要时重构以支持延迟加载的机会。\n\n## 领域对象工厂\n\n数据映射器模式非常简洁，但它也有一些缺点。特别是，`Mapper`\
  \ 类承担了过多的职责。它构建 SQL 语句；将数组转换为对象；当然，还将对象转换回数组，准备将数据添加到数据库。这种多功能性使得 `Mapper` 类既方便又强大。然而，这在一定程度上会降低灵活性。当映射器必须处理多种不同类型的查询，或者其他类需要共享\
  \ `Mapper` 的功能时，这一点尤为明显。在本章的剩余部分，我将分解数据映射器模式，将其拆解为一组更具针对性的模式。这些粒度更细的模式组合起来，可以共同承担数据映射器所管理的总体职责，并且它们中的部分或全部可以与数据映射器模式结合使用。这些模式由\
  \ Clifton Nock 在 *《数据访问模式》*（Addison Wesley，2003 年）中明确定义，我在重叠之处沿用了他的命名。\n\n让我们从一个核心功能开始：领域对象的生成。\n\
  \n### 问题\n\n你已经遇到过一种情况，其中 `Mapper` 类暴露出一个天然的薄弱点。`createObject()` 方法当然由 `Mapper`\
  \ 内部使用，但 `Collection` 对象也需要它来按需创建领域对象。这要求我们在创建 `Collection` 对象时传递一个 `Mapper` 引用。虽然允许回调（如你在访问者和观察者模式中所见）本身并无不妥，但将创建领域对象的职责迁移到其自己的类型中会更简洁。这样，`Mapper`\
  \ 和 `Collection` 类就可以共同享用它。\n\n领域对象工厂在 *《数据访问模式》* 中有所描述。\n\n\n\n### 实现\n\n设想一组 `Mapper`\
  \ 类，它们被广泛组织，每个类各自对应一个领域对象。领域对象工厂模式要求你从每个 `Mapper` 中提取出 `createObject()` 方法，并将其放置在平行层级结构中的单独类里。图\
  \ 13-6 展示了这些新类。\n\n![A314621_5_En_13_Fig6_HTML.gif](img/A314621_5_En_13_Fig6_HTML.gif)\n\
  \n图 13-6. 领域对象工厂类\n\n领域对象工厂类承担单一的核心职责，因此它们往往比较简单：\n\n```php\n// 清单 13.31\nabstract\
  \ class DomainObjectFactory\n{\n    abstract public function createObject(array\
  \ $row): DomainObject;\n}\n```\n\n以下是一个具体实现：\n\n```php\n// 清单 13.32\nclass VenueObjectFactory\
  \ extends DomainObjectFactory\n{\n    public function createObject(array $row):\
  \ DomainObject\n    {\n        $obj = new Venue((int)$row['id'], $row['name']);\n\
  \        return $obj;\n    }\n}\n```\n\n当然，你可能还想缓存对象，以防止重复并减少不必要的数据库查询，就像我在 `Mapper`\
  \ 类中所做的那样。你可以将 `addToMap()` 和 `getFromMap()` 方法移到这里，或者在 `ObjectWatcher` 与你的 `createObject()`\
  \ 方法之间建立观察者关系。具体细节由你决定。请记住，防止领域对象的克隆在你的系统中泛滥，是你的责任！\n\n### 影响\n\n领域对象工厂将数据库行数据与对象字段数据解耦。你可以在\
  \ `createObject()` 方法中进行任意数量的调整。这一过程对客户端是透明的，客户端的职责是提供原始数据。\n\n通过将此功能从 `Mapper`\
  \ 类中分离出来，它便可供其他组件使用。例如，这是一个经过修改的 `Collection` 实现：\n\n```php\n// 清单 13.33\nabstract\
  \ class Collection implements \\Iterator\n{\n    protected $dofact = null;\n   \
  \ protected $total = 0;\n    protected $raw = [];\n    private $result;\n    private\
  \ $pointer = 0;\n    private $objects = [];\n\n    // Collection\n    public function\
  \ __construct(array $raw = [], DomainObjectFactory $dofact = null)\n    {\n    \
  \    if (count($raw) && ! is_null($dofact)) {\n            $this->raw = $raw;\n\
  \            $this->total = count($raw);\n        }\n        $this->dofact = $dofact;\n\
  \    }\n\n    // ...\n```\n\n`DomainObjectFactory` 可用于按需生成对象：\n\n```php\n// 清单 13.34\n\
  private function getRow(int $num)\n{\n    // ...\n    if (isset($this->raw[$num]))\
  \ {\n        $this->objects[$num] = $this->dofact->createObject($this->raw[$num]);\n\
  \        return $this->objects[$num];\n    }\n}\n```\n\n由于领域对象工厂与数据库解耦，它们可以更有效地用于测试。例如，我可以创建一个模拟的\
  \ `DomainObjectFactory` 来测试 `Collection` 代码。这比模拟整个 `Mapper` 对象要容易得多（你可以在第 18 章中了解更多关于模拟对象与桩对象的内容）。\n\
  \n将单体组件分解为可组合部件的一个普遍影响是类的不可避免的激增。由此可能带来的混淆不容低估。即使每个组件及其与同级组件的关系都逻辑清晰、定义明确，我仍然常常觉得梳理包含数十个名称相似组件的包颇具挑战。\n\
  \n情况在好转之前还会变得更糟。我已经看到 Data Mapper 中出现了另一条断层线。`Mapper::getCollection()` 方法虽然方便，但其他类可能也希望获取某个领域类型的\
  \ `Collection` 对象，而无需通过面向数据库的类。因此，我有两个相关的抽象组件：`Collection` 和 `DomainObjectFactory`。根据我正在处理的领域对象，我将需要一组不同的具体实现：例如\
  \ `VenueCollection` 和 `VenueObjectFactory`，或者 `SpaceCollection` 和 `SpaceObjectFactory`。这个问题自然地将我们引向了抽象工厂模式。图\
  \ 13-7 展示了 `PersistenceFactory` 类。我将用它来组织构成接下来几个模式的各种组件。\n\n![A314621_5_En_13_Fig7_HTML.gif](img/A314621_5_En_13_Fig7_HTML.gif)\n\
  \n图 13-7. 使用抽象工厂模式来组织相关组件\n\n## 标识对象\n\n这里介绍的映射器实现在定位领域对象方面存在一定的僵化性。查找单个对象没有问题，查找所有相关的领域对象也同样容易。然而，介于两者之间的任何情况，都需要你添加专门的方法来构建查询（`EventMapper::findBySpaceId()`\
  \ 就是一个例子）。\n\n标识对象（Alur 等人也称之为数据传输对象）封装了查询条件，从而将系统与数据库语法解耦。\n\n### 问题\n\n很难预先知道你或其他客户端开发者需要从数据库中搜索什么。领域对象越复杂，查询中可能需要使用的筛选条件就越多。你可以通过逐个案例地向\
  \ `Mapper` 类添加更多方法来在一定程度上解决这个问题。当然，这不太灵活，并且可能涉及重复工作，因为你需要在单个 `Mapper` 类内部以及整个系统的映射器之间，编写许多相似但又有细微差别的查询。\n\
  \n标识对象以这样一种方式封装了数据库查询的条件方面，使得不同的组合可以在运行时进行合并。例如，给定一个名为 `Person` 的领域对象，客户端可以调用标识对象上的方法来指定：男性、年龄在\
  \ 30 岁以上 40 岁以下、身高不足 6 英尺。该类应设计为允许灵活组合条件（也许你对目标的身高不感兴趣，或者你想要移除年龄下限）。标识对象在一定程度上限制了客户端开发者的选择。如果你尚未编写代码来容纳\
  \ `income` 字段，那么在不做调整的情况下，它就无法被纳入查询。然而，应用不同条件组合的能力确实在灵活性方面向前迈进了一步。让我们看看这是如何实现的。\n\
  \n\n\n### 实现\n\n标识对象通常由一组可调用的方法组成，用于构建查询条件。设置好对象的状态后，你可以将其传递给负责构建 SQL 语句的方法。\n\n\
  图 13-8 展示了一组典型的 `IdentityObject` 类。\n\n![A314621_5_En_13_Fig8_HTML.gif](img/A314621_5_En_13_Fig8_HTML.gif)\n\
  \n图 13-8. 使用标识对象管理查询条件\n\n你可以使用一个基类来管理通用操作，并确保你的条件对象共享同一类型。以下是一个比图 13-8 中显示的类更简单的实现：\n\
  \n```php\n// listing 13.35\nclass IdentityObject\n{\nprivate $name = null;\npublic\
  \ function setName(string $name)\n{\n$this->name = $name;\n}\npublic function getName():\
  \ string\n{\nreturn $this->name;\n}\n}\n// listing 13.36\nclass EventIdentityObject\
  \ extends IdentityObject\n{\nprivate $start = null;\nprivate $minstart = null;\n\
  public function setMinimumStart(int $minstart)\n{\n$this->minstart = $minstart;\n\
  }\npublic function getMinimumStart()\n{\nreturn $this->minstart;\n}\npublic function\
  \ setStart(int $start)\n{\n$this->start = $start;\n}\npublic function getStart()\n\
  {\nreturn $this->start;\n}\n}\n```\n\n这里没有任何过于复杂的地方。这些类只是存储提供的数据，并在请求时返回。以下是一些可能使用\
  \ `SpaceIdentityObject` 来构建 `WHERE` 子句的代码：\n\n```php\n$idobj = new EventIdentityObject();\n\
  $idobj->setMinimumStart(time());\n$idobj->setName(\"A Fine Show\");\n$comps = [];\n\
  $name = $idobj->getName();\nif (! is_null($name)) {\n$comps[] = \"name = '{$name}'\"\
  ;\n}\n$minstart = $idobj->getMinimumStart();\nif (! is_null($minstart)) {\n$comps[]\
  \ = \"start > {$minstart}\";\n}\n$start = $idobj->getStart();\nif (! is_null($start))\
  \ {\n$comps[] = \"start = '{$start}'\";\n}\n$clause = \" WHERE \" . implode(\" and\
  \ \", $comps);\nprint \"{$clause}\\n\";\n```\n\n这种模型运行良好，但并不符合我懒惰的本性。对于一个大型领域对象，你需要构建的\
  \ getter 和 setter 方法数量之多令人望而却步。接着，按照这种模型，你还得编写代码来输出 `WHERE` 子句中的每个条件。我甚至懒得在示例代码中处理所有情况（比如我没有写\
  \ `setMaximumStart()` 方法），所以你可以想象我在现实中构建标识对象时有多么“愉悦”。\n\n幸运的是，有多种策略可以实现数据收集和 SQL\
  \ 生成的自动化。例如，过去我曾在基类中填充字段名的关联数组。这些数组本身按比较类型索引：大于、等于、小于或等于。子类提供便捷方法，将数据添加到底层结构中。然后，SQL\
  \ 构建器可以遍历该结构，动态构建其查询语句。我确信实现这样一个系统只是举手之劳，因此我将在此探讨其一种变体。\n\n我将使用一种流式接口（fluent interface）。这是一种\
  \ setter 方法返回对象实例的类，允许用户以流畅、类似自然语言的方式链式调用对象。这既能满足我的懒惰，同时我希望也能为客户端程序员提供一种灵活的定义条件的方式。\n\
  \n我从创建 `woo\\mapper\\Field` 类开始，这个类旨在存储每个最终将出现在 `WHERE` 子句中的字段的比较数据：\n\n```php\n\
  // listing 13.37\nclass Field\n{\nprotected $name = null;\nprotected $operator =\
  \ null;\nprotected $comps = [];\nprotected $incomplete = false;\n// 设置字段名称（例如 age）\n\
  public function __construct(string  $name)\n{\n$this->name = $name;\n}\n// 添加测试的操作符和值\n\
  // 例如 > 40，并将其添加到 $comps 属性中\npublic function addTest(string $operator, $value)\n\
  {\n$this->comps[] = [\n'name' => $this->name,\n'operator' => $operator,\n'value'\
  \ => $value\n];\n}\n// comps 是一个数组，以便我们可以用多种方式测试同一个字段\npublic function getComps():\
  \ array\n{\nreturn $this->comps;\n}\n// 如果 $comps 不包含元素，则意味着我们没有\n// 比较数据，该字段还不能用于查询\n\
  public function isIncomplete(): bool\n{\nreturn empty($this->comps);\n}\n}\n```\n\
  \n这个简单的类接收并存储一个字段名。通过 `addTest()` 方法，该类构建了一个包含 `operator` 和 `value` 元素的数组。这允许我们为一个字段维护多个比较测试。现在，这是新的\
  \ `IdentityObject` 类：\n\n```php\n// listing 13.38\nclass IdentityObject\n{\nprotected\
  \ $currentfield = null;\nprotected $fields = [];\nprivate $enforce = [];\n// 标识对象可以从空开始，也可以从一个字段开始\n\
  public function __construct(string $field = null, array $enforce = null)\n{\nif\
  \ (! is_null($enforce)) {\n$this->enforce = $enforce;\n}\nif (! is_null($field))\
  \ {\n$this->field($field);\n}\n}\n// 此对象被约束的字段名\npublic function getObjectFields()\n\
  {\nreturn $this->enforce;\n}\n// 启动一个新字段。\n// 如果当前字段未完成（即只有 age 而不是 age > 40），则会抛出错误\n\
  // 此方法返回当前对象的引用\n// 以支持流式语法\npublic function field(string $fieldname): self\n{\n\
  if (! $this->isVoid() && $this->currentfield->isIncomplete()) {\nthrow new \\Exception(\"\
  Incomplete field\");\n}\n$this->enforceField($fieldname);\nif (isset($this->fields[$fieldname]))\
  \ {\n$this->currentfield=$this->fields[$fieldname];\n} else {\n$this->currentfield\
  \ = new Field($fieldname);\n$this->fields[$fieldname]=$this->currentfield;\n}\n\
  return $this;\n}\n// 标识对象是否已经有字段\npublic function isVoid(): bool\n{\nreturn empty($this->fields);\n\
  }\n// 给定的字段名是否合法？\npublic function enforceField(string $fieldname)\n{\nif (! in_array($fieldname,\
  \ $this->enforce) && ! empty($this->enforce) ) {\n$forcelist = implode(', ', $this->enforce);\n\
  throw new \\Exception(\"{$fieldname} not a legal field ($forcelist)\");\n}\n}\n\
  // 为当前字段添加相等操作符\n// 即 'age' 变为 age=40\n// 返回当前对象的引用（通过 operator()）\npublic function\
  \ eq($value): self\n{\nreturn $this->operator(\"=\", $value);\n}\n// 小于\npublic\
  \ function lt($value): self\n{\nreturn $this->operator(\"<\", $value);\n}\n// 大于\n\
  public function gt($value): self\n{\nreturn $this->operator(\">\", $value);\n}\n\
  // 为操作符方法执行实际工作\n// 获取当前字段并向其添加操作符和测试值\nprivate function operator(string $symbol,\
  \ $value): self\n{\nif ($this->isVoid()) {\nthrow new \\Exception(\"no object field\
  \ defined\");\n}\n$this->currentfield->addTest($symbol, $value);\nreturn $this;\n\
  }\n// 返回迄今为止构建的所有比较结果，以关联数组形式\npublic function getComps(): array\n{\n$ret = [];\n\
  foreach ($this->fields as $field) {\n$ret = array_merge($ret, $field->getComps());\n\
  }\nreturn $ret;\n}\n}\n```\n\n要理解这里发生了什么，最简单的方法是从一些客户端代码开始，然后反向推导：\n\n```php\n//\
  \ listing 13.39\n$idobj = new IdentityObject();\n$idobj->field(\"name\")\n->eq(\"\
  The Good Show\")\n->field(\"start\")\n->gt(time())\n->lt(time() + (24 * 60 * 60));\n\
  ```\n\n\n\n## 创建标识对象与查询工厂\n\n首先创建 `IdentityObject`。调用 `field()` 方法会生成一个 `Field`\
  \ 对象，并将其赋值为 `$currentfield` 属性。请注意，`field()` 返回的是对 `identity` 对象的引用，这使得我们可以在 `field()`\
  \ 调用之后继续追加方法调用。比较方法 `eq()`、`gt()` 等均会调用 `operator()` 方法，该方法会检查是否存在当前可操作的 `Field`\
  \ 对象；若存在，则传入操作符符号和提供的值。同样地，`eq()` 返回对象引用，以便可以添加新的测试条件或再次调用 `add()` 来开始处理新字段。\n\n\
  请注意客户端代码的表述方式几乎像句子一样：字段 `\"name\"` 等于 `\"The Good Show\"`，且字段 `\"start\"` 大于当前时间，但距离当前时间不超过一天。\n\
  \n当然，去掉那些硬编码的方法也会损失一些安全性，这正是 `$enforce` 数组的设计目的。子类可以通过一组约束条件来调用基类：\n\n```\n// 清单\
  \ 13.40\nclass EventIdentityObject extends IdentityObject\n{\n    public function\
  \ __construct(string $field = null)\n    {\n        parent::__construct(\n     \
  \       $field,\n            ['name', 'id', 'start', 'duration', 'space']\n    \
  \    );\n    }\n}\n```\n\n现在 `EventIdentityObject` 类强制执行一组字段。如果尝试使用随机字段名称，会发生以下情况：\n\
  \n```\nPHP Fatal error:  Uncaught exception 'Exception' with message 'banana not\
  \ a legal field (name, id, start, duration, space)'...\n```\n\n### 影响\n\n标识对象允许客户端开发者无需引用数据库查询即可定义搜索条件。它们还省去了为各种用户可能需要的查找操作而构建特殊查询方法的麻烦。\n\
  \n标识对象的部分意义在于屏蔽用户对数据库细节的感知。因此，重要的是：如果你构建了类似上述示例中流畅接口的自动化解决方案，所使用的标签应明确指向领域对象，而非底层列名。当两者不一致时，应构建别名机制进行映射。\n\
  \n当使用专门化的实体对象（每个领域对象对应一个实体对象）时，很适合使用抽象工厂（如上一节描述的 `PersistenceFactory`）来统一提供这些实体对象及其他领域对象相关的对象。\n\
  \n现在既然能够表示搜索条件，我就可以利用它来构建查询本身。\n\n## 选择工厂与更新工厂模式\n\n之前我已经从 `Mapper` 类中剥离出部分职责。有了这些模式，`Mapper`\
  \ 不再需要创建对象或集合。由于查询条件由标识对象处理，它也无需再管理 `find()` 方法的多种变体。下一步就是将查询创建的职责剥离出去。\n\n### 问题\n\
  \n任何与数据库交互的系统都必须生成查询，但系统本身是围绕领域对象和业务规则而非数据库来组织的。本章的许多模式都可以说是为了弥合表格数据库与更有机、树状结构的领域之间的鸿沟。然而，存在一个翻译的环节——即领域数据被转换为数据库能理解的形式。正是在这个环节中实现了真正的解耦。\n\
  \n### 实现\n\n当然，你之前已经在数据映射器模式中见过部分功能。不过在这种专门化场景下，我可以利用标识对象模式提供的额外功能。这将使查询生成更加动态，因为潜在的变化数量实在太大了。\n\
  \n图 13-9 展示了我简单的选择和更新工厂。\n\n![A314621_5_En_13_Fig9_HTML.gif](img/A314621_5_En_13_Fig9_HTML.gif)\n\
  \n**图 13-9.** 选择和更新工厂\n\n选择和更新工厂通常也是按系统中领域对象的平行结构来组织的（可能通过标识对象作为中介）。正因如此，它们也是我 `PersistenceFactory`\
  \ 的候选对象：这个抽象工厂我将其维护为领域对象持久化工具的一站式服务。以下是更新工厂基类的实现：\n\n```\n// 清单 13.41\nabstract\
  \ class UpdateFactory\n{\n    abstract public function newUpdate(DomainObject $obj):\
  \ array;\n\n    protected function buildStatement(string $table, array $fields,\
  \ array $conditions = null): array\n    {\n        $terms = array();\n        if\
  \ (! is_null($conditions)) {\n            $query  = \"UPDATE {$table} SET \";\n\
  \            $query .= implode(\" = ?,\", array_keys($fields)) . \" = ?\";\n   \
  \         $terms  = array_values($fields);\n            $cond   = [];\n        \
  \    $query .= \" WHERE \";\n            foreach ($conditions as $key => $val) {\n\
  \                $cond[] = \"$key = ?\";\n                $terms[] = $val;\n   \
  \         }\n            $query .= implode(\" AND \", $cond);\n        } else {\n\
  \            $query  = \"INSERT INTO {$table} (\";\n            $query .= implode(\"\
  ,\", array_keys($fields));\n            $query .= \") VALUES (\";\n            foreach\
  \ ($fields as $name => $value) {\n                $terms[] = $value;\n         \
  \       $qs[] = '?';\n            }\n            $query .= implode(\",\", $qs);\n\
  \            $query .= \")\";\n        }\n        return array($query, $terms);\n\
  \    }\n}\n```\n\n从接口角度来说，这个类只定义了 `newUpdate()` 方法。该方法将返回一个包含查询字符串和待应用参数列表的数组。`buildStatement()`\
  \ 方法负责构建更新查询的通用工作，而针对具体领域对象的特定工作则由子类处理。`buildStatement()` 接受表名、字段及其值的关联数组，以及类似的条件关联数组。该方法将这些信息组合成查询语句。以下是一个具体的\
  \ `UpdateFactory` 类：\n\n```\n// 清单 13.42\nclass VenueUpdateFactory extends UpdateFactory\n\
  {\n    public function newUpdate(DomainObject $obj): array\n    {\n        // 注意：已移除类型检查\n\
  \        $id = $obj->getId();\n        $cond = null;\n        $values['name'] =\
  \ $obj->getName();\n        if ($id > -1) {\n            $cond['id'] = $id;\n  \
  \      }\n        return $this->buildStatement(\"venue\", $values, $cond);\n   \
  \ }\n}\n```\n\n在这个实现中，我直接操作 `DomainObject`。在需要一次更新多个对象的系统中，我可能会使用标识对象来定义要操作的对象集合。这将构成\
  \ `$cond` 数组的基础，而此处该数组仅包含 `id` 数据。\n\n`newUpdate()` 方法提取生成查询所需的数据。这是对象数据转换为数据库信息的过程。\n\
  \n请注意，`newUpdate()` 方法可以接受任何 `DomainObject`。这样做是为了让所有 `UpdateFactory` 类能共享同一接口。建议添加进一步的类型检查，以确保不会传入错误的对象类型。\n\
  \n以下是测试 `VenueUpdateFactory` 类的快速代码：\n\n```\n// 清单 13.43\n$vuf = new VenueUpdateFactory();\n\
  print_r($vuf->newUpdate(new Venue(334, \"The Happy Hairband\")));\nArray\n(\n  \
  \  [0] => UPDATE venue SET name = ? WHERE id = ?\n    [1] => Array\n        (\n\
  \            [0] => The Happy Hairband\n            [1] => 334\n        )\n)\n```\n\
  \n你可以看到 `SelectionFactory` 类也有类似的结构。以下是其基类：\n\n\n\n```\n// listing 13.44\nabstract\
  \ class SelectionFactory\n{\nabstract public function newSelection(IdentityObject\
  \ $obj): array;\npublic function buildWhere(IdentityObject $obj): array\n{\nif ($obj->isVoid())\
  \ {\nreturn [\"\", []];\n}\n$compstrings = [];\n$values = [];\nforeach ($obj->getComps()\
  \ as $comp) {\n$compstrings[] = \"{$comp['name']} {$comp['operator']} ?\";\n$values[]\
  \ = $comp['value'];\n}\n$where = \"WHERE \" . implode(\" AND \", $compstrings);\n\
  return [$where, $values];\n}\n}\n```\n\n再次强调，该类以抽象类的形式定义了公共接口。`newSelection()` 方法期望接收一个\
  \ `IdentityObject` 参数。同样需要接收 `IdentityObject` 参数但仅限内部使用的工具方法是 `buildWhere()`。它利用\
  \ `IdentityObject::getComps()` 方法获取构建 `WHERE` 子句所需的信息，同时构建一个值列表，并将两者以两个元素的数组形式返回。\n\
  \n这是一个具体的 `SelectionFactory` 类：\n\n```\n// listing 13.45\nclass VenueSelectionFactory\
  \ extends SelectionFactory\n{\npublic function newSelection(IdentityObject $obj):\
  \ array\n{\n$fields = implode(',', $obj->getObjectFields());\n$core = \"SELECT $fields\
  \ FROM venue\";\nlist($where, $values) = $this->buildWhere($obj);\nreturn [$core\
  \ . \" \" . $where, $values];\n}\n}\n```\n\n它构建了 SQL 语句的核心部分，然后调用 `buildWhere()`\
  \ 来添加条件子句。实际上，在我的测试代码中，不同具体的 `SelectionFactory` 之间的唯一区别就是表名。如果我发现不久之后并不需要独特的特化实现，我将重构掉这些子类，并使用一个单一的具体\
  \ `SelectionFactory`。此时它将从 `PersistenceFactory` 中查询表名。\n\n下面是一些客户端代码：\n\n```\n//\
  \ listing 13.46\n$vio = new VenueIdentityObject();\n$vio->field(\"name\")->eq(\"\
  The Happy Hairband\");\n$vsf = new VenueSelectionFactory();\nprint_r($vsf->newSelection($vio));\n\
  Array\n(\n[0] => SELECT name,id FROM venue WHERE name = ?\n[1] => Array\n(\n[0]\
  \ => The Happy Hairband\n)\n)\n```\n\n### 影响\n\n使用通用的身份对象实现使得使用单一的参数化 `SelectionFactory`\
  \ 类变得更加容易。如果你选择硬编码的身份对象——即由一组 getter 和 setter 方法构成的身份对象——你更可能不得不为每个领域对象构建一个单独的 `SelectionFactory`。\n\
  \n查询工厂与身份对象结合的最大好处之一是你可以生成的查询范围。这也可能带来缓存方面的棘手问题。这些方法会即时生成查询，且很难判断何时你在重复劳动。或许值得构建一种比较身份对象的方法，这样你就可以无需费力地返回缓存的字符串。在更高层面上，也可以考虑类似的数据库语句池化。\n\
  \n我在本章后半部分提出的模式组合的另一个问题是：它们虽然灵活，但并非那般灵活。我的意思是，它们被设计成在限定范围内极具适应性。然而，这里留给异常情况的空间并不多。相反，`Mapper`\
  \ 类虽然创建和维护起来更麻烦，但非常包容你需要在它们简洁的 API 背后执行的任何性能调整或数据操作。这些更优雅的模式面临的问题是，由于职责聚焦且强调组合，很难绕开精妙的设计去执行一些笨拙但强大的操作。\n\
  \n幸运的是，我并未失去更高层次的接口——仍然存在一个控制器层，在必要时我可以在那里截断精巧的设计。\n\n## 数据映射器还剩下什么？\n\n那么，我已经从`数据映射器`中剥离了对象、查询和集合的生成，更不用说条件语句的管理了。它还能剩下什么呢？嗯，需要一个非常类似于映射器的退化形态。我仍然需要一个位于我所创建的其他对象之上并协调其活动的对象。它可以帮助处理缓存职责并管理数据库连接（尽管面向数据库的工作可以进一步委托）。克利夫顿·诺克将这些数据层控制器称为领域对象组装器。\n\
  \n以下是一个示例：\n\n```\n// listing 13.47\nclass DomainObjectAssembler\n{\nprotected $pdo\
  \ = null;\npublic function __construct(PersistenceFactory $factory)\n{\n$this->factory\
  \ = $factory;\n$reg = Registry::instance();\n$this->pdo = $reg->getPdo();\n}\npublic\
  \ function getStatement(string $str): \\PDOStatement\n{\nif (! isset($this->statements[$str]))\
  \ {\n$this->statements[$str] = $this->pdo->prepare($str);\n}\nreturn $this->statements[$str];\n\
  }\npublic function findOne(IdentityObject $idobj): DomainObject\n{\n$collection\
  \ = $this->find($idobj);\nreturn $collection->next();\n}\npublic function find(IdentityObject\
  \ $idobj): Collection\n{\n$selfact = $this->factory->getSelectionFactory();\nlist\
  \ ($selection, $values) = $selfact->newSelection($idobj);\n$stmt = $this->getStatement($selection);\n\
  $stmt->execute($values);\n$raw = $stmt->fetchAll();\nreturn $this->factory->getCollection($raw);\n\
  }\npublic function insert(DomainObject $obj)\n{\n$upfact = $this->factory->getUpdateFactory();\n\
  list($update, $values) = $upfact->newUpdate($obj);\n$stmt = $this->getStatement($update);\n\
  $stmt->execute($values);\nif ($obj->getId() setId((int)$this->pdo->lastInsertId());\n\
  }\n$obj->markClean();\n}\n}\n```\n\n如你所见，这不是一个抽象类。它本身并未分解成特化类，而是使用 `PersistenceFactory`\
  \ 来确保为当前领域对象获取正确的组件。\n\n图 13-10 展示了我在分解 `Mapper` 时构建的高级参与者。\n\n![A314621_5_En_13_Fig10_HTML.gif](img/A314621_5_En_13_Fig10_HTML.gif)\n\
  \n图 13-10. 本章开发的部分持久化类\n\n除了建立数据库连接和执行查询之外，该类还管理 `SelectionFactory` 和 `UpdateFactory`\
  \ 对象。在查询的情况下，它还与 `Collection` 类协同工作来生成返回值。\n\n从客户端的角度来看，创建 `DomainObjectAssembler`\
  \ 很容易。只需获取正确的具体 `PersistenceFactory` 对象并将其传递给构造函数即可：\n\n```\n// listing 13.48\n\
  $factory = PersistenceFactory::getFactory(Venue::class);\n$finder = new DomainObjectAssembler($factory);\n\
  ```\n\n当然，这里的“客户端”不太可能指最终用户。我们可以通过在 `PersistenceFactory` 自身中添加一个 `getFinder()` 方法，将前面的示例转换为一行代码，从而让更高级别的类甚至免受这种复杂性的影响，如下所示：\n\
  \n```\n$finder = PersistenceFactory::getFinder(Venue::class);\n```\n\n不过，我把这个留给你去实现。\n\
  \n然后，客户端程序员可以继续获取 `Venue` 对象的集合：\n\n```\n// listing 13.49\n$idobj = $factory->getIdentityObject()\n\
  ->field('name')\n->eq('The Eyeball Inn');\n$collection = $finder->find($idobj);\n\
  foreach ($collection as $venue) {\nprint $venue->getName().\"\\n\";\n}\n```\n\n\n\
  \n## 摘要\n\n一如既往，你所选择的模式将取决于问题的本质。我自然而然倾向于使用与标识对象配合的`Data Mapper`。我喜欢简洁的自动化解决方案，但也需要知道，在需要时我能脱离系统手动操作，同时保持干净的接口和松耦合的数据库层。例如，我可能需要优化一条\
  \ SQL 查询，或者使用连接来跨多个表获取数据。即使你使用基于复杂模式的第三方框架，也可能会发现其提供的花哨的对象关系映射并不能完全满足你的需求。衡量一个优秀框架和良好自研系统的一个标准，就是你能轻松地在其中植入自己的代码，而又不损害系统的整体完整性。我热爱优雅、设计精美的解决方案，但同时也是一个实用主义者！\n\
  \n在本章中，我再次涵盖了很多内容。以下是我们讨论过的模式及其使用方法的快速概述：\n\n- `Data Mapper`：创建专门的类，用于将领域模型对象与关系数据库之间进行映射\n\
  - `Identity Map`：跟踪系统中所有对象，以防止重复实例化和不必要地访问数据库\n- `Unit of Work`：自动化将对象保存到数据库的过程，确保只更新已更改的对象，只插入新创建的对象\n\
  - `Lazy Load`：延迟对象创建甚至数据库查询，直到真正需要时才执行\n- `Domain Object Factory`：封装对象创建功能\n- `Identity\
  \ Object`：允许客户端构建查询条件，而无需引用底层数据库\n- `Query (Selection and Update) Factory`：封装构建\
  \ SQL 查询的逻辑\n- `Domain Object Assembler`：构建一个控制器，管理数据存储和检索的高级过程\n\n在下一章中，我们将暂时从代码中解脱出来，介绍一些有助于项目成功的更广泛的实践。\n\
  \n"
- '# 第三部分 实践


  '
- '# 14. 好（与坏）实践


  到目前为止，本书主要聚焦于编码，并特别关注设计在构建灵活可复用的工具和应用中的作用。然而，开发并不仅限于代码。人们可能会在阅读书籍和完成课程后，对一门语言有了扎实的理解，但在运行和部署项目时仍然会遇到问题。


  在本章中，我将超越代码本身，介绍一些构成成功开发过程基础的工具和技术。本章将涵盖以下内容：


  - 第三方包：从哪里获取以及何时使用

  - 构建：创建和部署包

  - 版本控制：为开发过程带来和谐

  - 文档：编写易于理解、使用和扩展的代码

  - 单元测试：用于自动检测和预防 Bug 的工具

  - 标准：为什么有时随大流是好的做法

  - `Vagrant`：一个利用虚拟化的工具，使所有开发者无论其硬件或操作系统如何，都能在类似于生产环境的系统中工作

  - 持续集成：使用这一实践和工具集来自动化项目构建和测试，并在问题发生时及时收到警报


  ## 超越代码


  当我最初从独立工作转变为加入开发团队时，我惊讶于其他开发者似乎需要了解那么多东西。关于一些看似至关重要的问题，善意的争论无休止地发酵：哪个文本编辑器最好？团队是否应该统一使用一个集成开发环境？我们是否应该强制实施编码标准？我们应该如何测试代码？我们应该在开发过程中记录文档吗？有时，这些问题似乎比代码本身更重要，而我的同事们似乎通过某种神秘的渗透过程，获得了他们对该领域百科全书般的知识。


  我之前读过的关于 PHP、Perl 和 Java 的书籍，当然没有在很大程度上偏离代码本身。正如我之前讨论过的，大多数关于编程平台的书籍很少偏离对函数和语法的紧密关注，而涉及代码设计。如果设计都算是题外话，那么你可以肯定，像版本控制和测试这样的更广泛问题就更是鲜少被讨论。这并非批评——如果一本书声称涵盖了某种语言的主要特性，那么它只做这些事也就不足为奇了。


  然而，在学习编码的过程中，我发现我忽略了项目日常运作的许多机制。我意识到，其中一些细节对我所参与开发的项目的成败至关重要。在本章及后续章节的详细讨论中，我将超越代码，探索一些可能决定你项目成败的工具和技术。



  ## 借用轮子


  当项目中遇到一个具有挑战性但相对独立的需求时（例如，需要解析特定格式，或使用新协议与远程服务器通信），构建一个满足需求的组件是很有价值的。它也可能是学习技艺的最佳途径之一。在创建包的过程中，你能深入理解问题，并掌握可能具有更广泛应用的新技术。你既是在为项目投资，也是在提升自身技能。通过将功能保留在系统内部，你可以让用户免于下载第三方包。有时，你还能规避棘手的许可问题。当你测试自己设计的组件，并惊奇地发现它竟然能正常工作——完全实现了你承诺的功能时，那种成就感是无可替代的。


  当然，这也有其阴暗面。许多包凝聚了数千工时的投入：这是你可能并不具备的资源。你或许可以通过只开发项目所需的功能来解决这个问题，而第三方工具可能还能满足其他众多需求。但问题依然存在：如果已有免费可用的工具，为何还要浪费才华去重新创造它？你是否有时间和资源来开发、测试和调试自己的包？这些时间难道不能更好地用在别处吗？


  在重复造轮子这件事上，我算是罪魁祸首之一。拆解问题并发明解决方案，是我们作为程序员工作的核心部分。着手进行一些严肃的架构设计，比编写胶水代码将三四个现有组件拼凑起来更有成就感。每当这种诱惑袭来，我都会提醒自己过往的项目。虽然在我经验中，选择从头构建从未导致项目失败，但我目睹过它吞噬项目进度、扼杀利润。我坐在那里，眼中闪烁着狂热的光芒，构思方案、绘制类图，却未曾注意到，当我沉迷于组件的细节时，全局蓝图早已变得遥不可及。


  如今，在规划项目时，我会努力培养一种直觉，判断哪些内容应属于代码库内部，哪些应作为第三方需求处理。例如，你的应用可能需要生成（或读取）RSS 源；你可能需要验证电子邮件地址、自动发送邮件、验证用户身份，或读取标准格式的配置文件。所有这些需求都可以通过外部包来实现。


  在本书的先前版本中，我建议使用 PEAR（PHP 扩展与应用库）来获取包。但时代在变，PHP 世界已明确转向 Composer 依赖管理器及其默认仓库 Packagist（[`https://packagist.org`](https://packagist.org)）。由于
  Composer 按项目管理包，它不太容易引发可怕的“依赖地狱”综合征（即不同包需要同一库的不兼容版本）。此外，所有行动都已转移至 Composer/Packagist，这意味着你更有可能在那里找到所需内容。更重要的是，许多
  PEAR 包也通过 Packagist 提供（[`https://packagist.org/packages/pear/`](https://packagist.org/packages/pear/)）。


  因此，一旦你定义了需求，第一站就应该是 Packagist 网站。然后你可以使用 Composer 安装包并管理包依赖。我将在下一章更详细地介绍 Composer。


  为了让你了解使用 Composer 和 Packagist 可以获取什么，以下是你能在那里找到的众多包所能实现的一些功能：


  - 使用 `pear/cache_lite` 缓存输出

  - 使用 `athletic/athletic` 基准测试库测试代码效率

  - 使用 `doctrine/dbal` 抽象数据库访问细节

  - 使用 `simplepie/simplepie` 提取 RSS 源

  - 使用 `pear/mail` 发送带附件的邮件

  - 使用 `symfony/config` 解析配置文件格式

  - 使用 `jwage/purl` 解析和操作 URL


  Packagist 网站提供了强大的搜索功能。你可以在那里找到满足需求的包，或者可能需要使用搜索引擎扩大搜索范围。无论如何，在着手可能重复造轮子之前，你都应该花时间评估现有的包。


  你有需求，并且存在满足该需求的包——这不应该是你决策的唯一依据。虽然使用包能节省不必要开发的成本是可取的，但在某些情况下，它可能徒增开销而无实际收益。例如，你的客户需要应用能发送邮件，这并不意味着你应该自动使用
  `pear/mail` 包。PHP 提供了相当好用的 `mail()` 函数，因此这可能是你的首选。但一旦你意识到需要根据 RFC822 标准验证所有电子邮件地址，并且设计团队想要在邮件中发送图片附件时，你可能就开始重新权衡选择了。碰巧的是，`pear/mail`
  支持这两个功能（后一个功能需结合 `mail_mime` 使用）。


  许多程序员，包括我在内，常常过分强调创作原创代码，有时甚至损害了项目利益。


  **注意**


  不愿使用第三方工具和解决方案的态度，常常是机构层面固有的。这种对外部产品持怀疑倾向的现象，有时被称为“非我发明”综合征。


  这种对原创性的强调，可能是导致可重用代码似乎被创造得多、实际用得少的原因之一。


  高效的程序员将原创代码视为帮助他们成功完成项目的工具之一。这样的程序员会审视手头的资源，并有效利用它们。如果某个包能分担压力，那就是胜利。借用并改写 Perl
  世界的一句格言：好程序员都是“懒人”。




  ## 和睦共处


  萨特那句著名的格言“他人即地狱”，其真理性在某些软件项目中每天都在被印证。这或许描述了客户与开发者之间的关系，其症状表现为沟通不畅导致的种种问题，例如需求蔓延和优先级错位。但这句话也同样适用于那些即使沟通愉快、合作积极的团队成员，尤其是在共享代码的时候。


  一旦项目有超过一个开发者，版本控制就成了一个问题。单个程序员可以直接在原有代码上工作，在开发的关键节点保存一份工作目录的副本。但只要引入另一个程序员，这种策略几分钟内就会失效。如果新开发者在同一个开发目录下工作，那么除非两人都格外小心，始终在不同的文件上工作，否则其中一个程序员保存时很可能会覆盖同事的工作成果。


  或者，我们的两位开发人员可以各自获取一份代码库的副本，进行独立开发。这方法在需要整合两个版本之前一直没问题。除非开发者们处理的是完全不同的文件集，否则合并两条或多条开发分支的任务很快就会变成巨大的难题。


  这正是 Git、Subversion 及类似工具的用武之地。使用版本控制系统，你可以签出自己那份代码库的副本，并进行开发，直到你对结果满意为止。然后，你可以用同事们所做的任何更改来更新你的版本。版本控制软件会自动将这些更改合并到你的文件中，并通知你任何它无法处理的冲突。一旦你测试了这个新的混合版本，就可以将其保存到中央仓库，使其可供其他开发者使用。


  版本控制系统还能为你带来其他好处。它们会保存项目所有阶段的完整记录，因此你可以回滚到项目生命周期中的任何一点，或抓取其快照。你还可以创建分支，这样你就可以在维护稳定发布版本的同时，维护一个前沿的开发版本。


  一旦你在项目中使用过版本控制，你将无法想象没有它如何进行另一个项目。同时处理项目的多个分支可能是一个概念上的挑战，尤其是在刚开始的时候，但其好处很快会变得显而易见。版本控制实在太有用了，不可或缺。我将在第
  17 章中介绍 Git。


  ## 为你的代码插上翅膀


  你是否曾因为代码构建过于困难而将其搁置？对于在原有环境中开发的项目尤其如此。这类项目深深嵌入其环境，密码、目录、数据库和辅助程序调用都直接编写在代码里。部署此类项目可能是一项艰巨的任务，需要程序员团队仔细检查源代码来修改设置，以便适应新环境。


  通过提供一个集中式的配置文件或类，可以在一定程度上缓解这个问题，这样设置只需在一个地方更改即可。但即便如此，构建仍然可能是一件麻烦事。安装的难易程度将严重影响你所分发的任何应用程序的普及度。它也将阻碍或促进开发期间进行多次和频繁的部署。


  就像任何重复且耗时的任务一样，构建应该被自动化。构建工具可以确定安装位置的默认值、检查和更改权限、创建数据库以及初始化变量等。事实上，构建工具几乎可以完成你需要将应用程序从分发源目录到完全部署的所有工作。


  当然，这并不能免除用户将关于其环境的信息添加到代码中的责任，但它可以使这个过程变得如同回答几个问题或提供几个命令行开关一样简单。


  像亚马逊 EC2 这样的云产品已经使得按需创建测试和模拟环境成为可能。为了充分利用这些资源，良好的构建和安装解决方案至关重要。如果你无法即时部署你的系统，那么能够自动化配置服务器也是毫无意义的。


  开发者可以使用多种构建工具。PEAR 和 Composer 都管理安装（PEAR 是集中式的，Composer 安装到本地的 `vendor` 目录）。你可以为这两个系统创建自己的包，用户随后可以轻松下载并安装这些包。然而，构建远不止是将文件
  A 放到位置 B 这个过程。


  在第 19 章中，我将介绍一个名为 Phing 的应用程序。这个开源项目是流行的 Ant 构建工具的一个移植版，后者是用 Java 编写的，并用于 Java 项目。Phing
  是用 PHP 编写的，适用于 PHP，但它在架构上与 Ant 类似，并使用相同的 XML 格式作为其构建文件。


  Composer 能够极其出色地执行数量有限的任务，并提供尽可能简单的配置。Phing 起初看起来更令人生畏，但换来的是巨大的灵活性。你不仅可以使用 Phing
  自动化从文件复制到 XSLT 转换的任何事情，而且如果你需要扩展该工具，你还可以轻松编写并整合自己的任务。Phing 使用 PHP 的面向对象特性编写，其设计强调模块化和易于扩展性。


  构建工具与专为包管理或依赖管理设计的工具并非互斥。通常，构建工具在开发期间用于运行测试、执行项目维护工作，以及准备最终通过 PEAR、Composer 甚至基于发行版的包管理系统（如
  RPM 和 Apt）部署的包。


  ### 标准


  我之前提到，本书在本版本中将重点从 PEAR 转向了 Composer。这是因为 Composer 比 PEAR 好得多吗？我确实很喜欢 Composer 的很多方面，这些本身可能就足以左右这个决定。不过，本书转变的主要原因是：其他所有人都在转变。Composer
  已成为依赖管理的标准。这一点至关重要，因为这意味着当我在 Packagist 上找到一个包时，我很有可能也能找到它的所有依赖项和相关包。我甚至能在那儿找到许多
  PEAR 包。


  因此，为依赖管理选择一个标准可以确保可用性和互操作性。但标准的适用性超越了包和依赖本身，还涉及系统的工作方式以及我们的编码方式。如果我们就协议达成一致，那么我们的系统和团队就能无缝地相互集成。而且，随着越来越多的组件在越来越多的系统中组合，这一点变得越来越重要。


  当需要某种确定的日志处理方式时，采用最佳协议显然是理想的选择。但推荐标准的质量（它将规定格式、日志级别等）可能不如我们大家共同遵守它这一事实重要。如果你是唯一遵循最佳标准的人，那实施它也没什么好处。


  在第 15 章中，我将更详细地讨论标准，特别参考由 PHP-FIG 小组管理的一组建议。这些 PSR（PHP 标准建议）涵盖了从缓存到安全的方方面面。在该章中，我将重点介绍
  PSR-1 和 PSR-2，这是针对棘手的编码风格问题（你习惯把大括号放在哪里？对于别人要求你改变习惯，你有何感受？）提出的建议。然后，我将继续介绍绝对有益的
  PSR-4，它涵盖了自动加载（对 PSR-4 的支持是 Composer 表现出色的另一个领域）。




  ## Vagrant


  你的团队使用什么操作系统？当然，有些组织会强制规定特定的硬件和软件组合。但通常情况下，会是混合使用的。一位开发者可能使用运行 Fedora 的开发机器。另一位可能对它的
  MacBook 赞不绝口，而第三位可能坚持使用他的 Windows 电脑（他大概喜欢用它来玩游戏）。


  很有可能，生产系统会运行在完全不同的系统上——也许是 CentOS。


  让一个系统跨多个平台工作可能很痛苦，而且如果这些平台没有一个与生产系统相似，这可能会带来风险。你肯定不想在上线后发现与生产操作系统相关的问题。当然，在实践中，你可能会先部署到预发布环境。即便如此，及早发现这些问题不是更好吗？


  `Vagrant` 是一种利用虚拟化技术，为所有团队成员提供一个尽可能接近生产环境的开发环境的技术。启动并运行应该简单到只需调用一两个命令，最棒的是，每个人都可以继续使用他们最喜欢的机器和发行版（顺便说一句，我是
  Fedora 爱好者）。


  我将在第 20 章中介绍 `Vagrant`。


  ### 测试


  当你创建一个类时，你很可能相当确定它能正常工作。毕竟，你会在开发过程中对它进行彻底测试。你还会让系统在包含该组件的情况下运行，检查它是否集成良好，以及你的新功能是否可用并按预期执行。


  但你能确定你的类会像预期的那样持续工作吗？这看起来可能是个愚蠢的问题。毕竟，你曾经检查过你的代码一次；它为什么应该随意停止工作呢？嗯，当然它不会；没有什么事情是随意发生的，而且如果你从未向系统添加另一行代码，你或许可以松一口气。另一方面，如果你的项目是活跃的，那么你的组件的上下文不可避免地会发生变化，并且该组件本身极有可能以多种方式被修改。


  让我们依次看看这些问题。首先，改变组件的上下文怎么会引入错误？即使在组件之间很好地解耦的系统中，它们仍然是相互依赖的。你的类所使用的对象会返回值、执行操作和接收数据。如果这些行为中的任何一个发生改变，对你类运行的影响可能会导致那种容易捕获的错误——那种系统崩溃并伴随一条包含文件名和行号的便捷错误信息的错误。然而，更隐蔽的是那种不会引起引擎级别错误，但确实会使你的组件混淆的改变。如果你的类基于另一个类的数据做出了一个假设，那么那个数据的改变可能导致它做出错误的决定。你的类现在就出错了，并且没有改变一行代码。


  而且，你很可能会继续修改你刚刚完成的类。通常，这些修改是微小且显而易见的——实际上如此微小，以至于你觉得没有必要重新执行在开发过程中进行的仔细检查。无论如何，你可能已经忘记了它们，除非你以某种方式保留了它们（也许像我有时做的那样，在类文件的底部注释掉它们）。然而，微小的改变往往会造成意想不到的重大后果——如果你曾考虑过设置一个测试工具，这些后果也许就能被捕捉到。


  测试工具是一组自动化的测试，可以应用于整个系统或其单个类。如果部署得当，测试工具有助于防止错误的发生和再次发生。一个单一的改变可能导致一连串的错误，而测试工具可以帮助你定位并消除这些错误。这意味着你可以有信心地进行修改，而不会破坏任何东西。当你对系统进行改进，然后看到一列失败的测试时，会感到相当满足。这些都是可能在你的系统中传播的错误，但现在它不必承受这些错误了。


  ## 持续集成


  你有没有制定过一个让一切都变得美好的计划？你从一个任务开始：可能是编码，或者一个学校项目。它庞大而可怕，失败潜伏其中。但你拿出一张纸，把它分割成可管理的任务。你确定要阅读的书籍和要编写的组件。也许你用不同的颜色高亮这些任务。结果发现，单独来看，没有一个任务真正那么可怕。并且，随着你逐步规划，你逐渐征服了截止日期。只要你每天做一点，你就会没事。你可以放松了。


  但有时，这个计划会具有护身符般的力量。你把它像盾牌一样举起来，保护自己免受怀疑，以及免受那种也许这次你会惨败的逐渐蔓延的恐惧。只有在几周后，你才意识到计划本身并没有魔力。你还得实际去做工作。当然，到那时，被计划令人安心的力量所麻痹，你已经让事情拖延了。除了制定一个新计划，别无他法。这次它不会那么令人安心了。


  测试和构建也是如此。你必须运行你的测试。你必须构建你的项目，并定期在新的环境中构建它们；否则，魔力就不会起作用。


  而且，如果编写测试是一种痛苦，那么运行它们可能是一件苦差事，尤其是当它们变得复杂且失败打断了你的计划时。当然，如果你更频繁地运行它们，你可能会有更少的失败，并且你遇到的那些失败很可能与你脑海中记忆犹新的新代码有关。


  在沙盒环境中很容易变得安逸。毕竟，你所有的玩具都在那里：让你生活更轻松的小脚本、开发工具和有用的库。问题是，你的项目也可能在你的沙盒中变得过于安逸。它可能开始依赖未提交的代码，或者你从构建文件中遗漏的依赖项。这意味着除了你工作的地方，它在任何其他地方都是损坏的。


  唯一的答案是构建、构建、再构建。并且每次都要在一个相对干净的环境中进行。


  当然，建议这样做是一回事，实际去做又是另一回事。程序员这个群体通常喜欢编码。他们希望将会议和日常维护工作降到最低。这就是持续集成 (CI) 发挥作用的地方。 CI
  既是一种实践，也是一套尽可能让实践变得简单的工具。理想情况下，构建和测试应该完全自动化，或者至少可以通过一条命令或一次点击来启动。任何问题都会被跟踪，并且在问题变得过于严重之前你会收到通知。我将在第
  21 章中更多地讨论 CI。


  ## 总结


  开发者的目标始终是交付一个可运行的系统。编写好的代码是实现这个目标的重要部分，但这并非全部。


  在本章中，我介绍了如何使用 `Composer` 和 `Packagist` 进行依赖管理。我还讨论了两个重要的协作辅助工具：`Vagrant` 和版本控制。我阐述了为什么版本控制需要自动化构建，并介绍了
  `Phing`，它是 Java 构建工具 `Ant` 的 PHP 实现。最后，我讨论了软件测试并介绍了持续集成，这是一套用于自动化构建和测试的工具。


  '
- "# 15. PHP 标准\n\n除非你是律师或卫生检查员，否则标准这个话题可能不会让你心跳加速。然而，标准帮助我们实现的目标是值得兴奋的。标准促进了互操作性，这让我们能够接触到大量兼容的工具和框架组件。\n\
  \n本章将涵盖标准的几个重要方面：\n\n- 为什么需要标准：什么是标准以及它们为何重要\n- PHP 标准建议：它们的起源和目的\n- PSR-1：基础编码标准\n\
  - PSR-2：编码风格指南\n- PSR-4：自动加载\n\n\n\n## 为什么需要标准？\n\n设计模式天生具备互操作性。其核心思想在于：用设计模式描述的问题会提出特定解决方案，进而产生架构层面的影响，这些影响又可以被新模式妥善处理。模式还能通过提供共享词汇表，帮助开发者实现协作。面向对象系统往往推崇\"\
  友好共处\"的原则。\n\n不过，随着我们越来越多地共享彼此的组件，这种非正式的互操作性倾向有时并不够用。正如我们所看到的，`Composer`（或我们选择的包管理工具）允许我们在项目中混用各种工具。这些组件可能是独立的库，也可能是更大框架中的一部分。无论如何，一旦部署到系统中，它们必须能够与任意数量的其他组件协同工作。通过遵循核心标准，我们能降低代码出现兼容性问题的可能性。\n\
  \n从某种意义来说，标准本身的性质不如\"被遵守\"这个事实重要。例如我个人并不喜欢`PSR-2`风格指南的每个方面——但在包括本书在内的大多数情况下，我依然采用了该标准。我希望团队的其他开发者能更容易地处理我的代码，因为他们会看到熟悉的格式。而对于自动加载等其他标准，如果未能遵守通用标准，组件之间可能完全无法协同工作，除非借助额外的中间件。\n\
  \n标准或许不是编程中最令人兴奋的部分，但其核心存在一个有趣的矛盾点。表面上看，标准似乎限制了创造力——毕竟标准告诉你什么能做、什么不能做，你必须遵守。你可能认为这根本不是创新的土壤。然而，互联网之所以能给我们的生活带来如此蓬勃的创造力，恰恰是因为这个网络之网中的每个节点都遵循开放标准。困在围墙花园里的专有系统，无论其代码多么精妙或界面多么流畅，其范围和寿命必然受限。而拥有共享协议的互联网，确保了任何网站都能链接到其他网站。大多数浏览器支持标准的`HTML`、`CSS`和`JavaScript`。虽然我们在这些标准下构建的界面并非总是最令人惊艳的（尽管限制已比过去少得多），但遵守标准能最大化我们工作的覆盖范围。\n\
  \n善用标准能促进开放、协作，最终激发创造力。即便标准本身就施加了某些限制，这一点依然成立。\n\n## 什么是 PHP 标准建议？\n\n在 2009 年 PHP\
  \ Tek 大会上，一群框架开发者组建了名为\"PHP 框架互操作组\"（`PHP-Fig`）的组织。此后，其他关键组件的开发者纷纷加入。他们的目标是制定标准，使各自系统能更好地共存。\n\
  \n该组织对标准提案进行投票，提案从草案（Draft）阶段，经由审核（Review）阶段，最终进入已接受（Accepted）状态。\n\n表 15-1 列出了撰写本书时已接受的标准。\n\
