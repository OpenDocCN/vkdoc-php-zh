- fmt: '2\. One of the benefits of namespaces is that our framework classes are no
    longer in the global namespace. Instead of 20+ classes (`Database`, `Cache`, `Configuration`,
    etc.) we only have to add one to the global `Framework` namespace. This avoids
    the many pitfalls of namespace collision.


    When we begin using `use` statements, we negate this benefit, adding more things
    to the global namespace. This is not a problem if it is done within a namespace
    block (e.g., `namespace ACME\TNT { use ACME\Glue as Glue; }`), but less so if
    the `use` statements are in the global namespace. We unset the variables because
    we don’t want them polluting the global namespace either.


    3\. Adding automatic configuration to classes within our framework allows other
    developers to customize the behavior of those classes without changing their code.


    4\. Layouts offer us a way to give our views a consistent framework, without repeating
    any markup. A good example is using layouts for navigation.


    ### Exercises


    1. We used automatic configuration to initialize some of our framework classes.
    Now try configuring the `View` class to allow for different view-rendering engines.

    2. Our bootstrapping file will attempt to execute the most applicable controller/action,
    but it has no way of channeling raised exceptions so that applicable error pages
    can be shown. Now attempt handling exceptions so that custom error pages can be
    used.


    ## Chapter 14


    ## Registration and Login


    A social network is built around the concept of users with profiles. Profiles
    are a place for users to share with other users, and in order for users to have
    profiles they need to have user accounts. In this chapter, we will be creating
    the pages and classes required for users to be able to create accounts, and log
    in to those accounts.


    ### Goals


    * Users need to be able to register new accounts. This will involve a form that
    they need to complete. After they have completed it, a new database row will be
    created with the information, and they should be able to log in.

    * Naturally, this means users need to be able to log in to their accounts. This
    will require another form, which secures their profile, allowing access through
    the verification of valid user credentials. For the sake of simplicity, we will
    require users to provide their e-mail address and password in order to log in.


    ### Shared Libraries


    Depending on the kind of application we want to build, the need may exist to share
    controller and model logic across multiple controllers and models. I am not talking
    about what we have already added to the `Controller` class for view rendering.
    What I am referring to here are actions such as connecting to a database or sharing
    common model fields.


    These examples are exactly the kinds of details we need to achieve in this chapter,
    so we will begin by adding them! The first class we would like to share common
    functionality with is the `Controller` class. If the needs of the shared code
    were application-agnostic, we might consider adding them as an extension of the
    `Controller` class.


    This is the approach we chose for the view rendering, assuming that the majority
    of actions would render in the same way.


    Unfortunately, it would seem that opening a persistent connection to the database
    is not the kind of decision we can make for all applications using our framework.
    Some applications might not want the constant connection, and some applications
    might not even need a database in order to fulfill their ORM/model requirements.


    For this reason, we will subclass the `Controller` class, to add the database
    functionality we require. This sounds trickier than it really is. Consider the
    code shown in Listing 14-1.


    ***Listing 14-1.*** `application/libraries/shared/controller.php`


    ```php

    namespace Shared


    {


    class Controller extends \Framework\Controller


    {

