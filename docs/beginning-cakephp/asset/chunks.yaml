  trans: "\n# CakePHP 中的单次操作\n\nCakePHP 中的单次操作通常会调用多个 MVC 元素，并同时在这些元素中运作。例如，在上一章中，你使用了\
    \ `Form` 辅助程序来接收来自控制器和模型获取的数据，并将用户表单数据发送给控制器进行处理。更改控制器中的内容会影响 `Form` 辅助程序的行为，这在操作\
    \ `$this->data` 等变量时尤为明显。\n\n当我在本章讨论开发控制器和模型的更高级方法时，请记住，可能需要对视图进行修改，才能使操作或自定义功能正常工作。例如，管理会话是一个集成度很高的过程，你可能需要在视图（创建登录屏幕和显示会话状态）、控制器（执行会话逻辑以确定会话的各个方面）和模型（将会话数据保存到数据库中）上花费同等的精力。换句话说，要将整个会话操作集成到应用程序中，意味着需要共同编辑和测试控制器中的操作、模型函数以及视图。\n\
    \n## 构建一个功能丰富的博客\n\n框架的经典教程通常是构建一个博客。在 CakePHP 的官方网站上，有一整套博客应用程序教程。然而，你需要的是对*发生了什么*进行透彻的解释，而不仅仅是*如何*构建程序的逐步指南。因此，本教程与其他教程的不同之处在于，我将系统地解释该应用程序中的每一行代码。你应该掌握的是这些概念，而不仅仅是步骤。掌握了这些概念，你就能深入理解\
    \ CakePHP 提供的许多功能，并学会如何将它们整合到你自己的定制应用程序中。\n\n你一直在处理的博客程序已经让你探索了 CakePHP 提供的脚手架、Bake\
    \ 和辅助程序功能。为了让博客更加强大，你需要同时处理模型、视图和控制器。既然你已经了解了各种起点和关键概念，那么是时候更详细地讨论应用程序构建了。让我们从控制器和模型开始，它们是任何\
    \ CakePHP 应用程序的命脉。\n\n你将构建的功能丰富的博客将包含以下高级特性：\n\n-   文章通过一个 wiki 处理器运行，将内容转换为 HTML\
    \ 元素\n-   读者评论及社区投票功能\n-   创建包含日期友好型 URL 的路由\n-   一个管理区域，网站管理员可以在此添加文章\n-   多作者的用户管理\n\
    -   用于动态组织帖子的分类排序\n-   一个全站菜单系统，用于浏览分类和文章\n\n诸如此类的功能实现起来不会太困难，但会充分利用所有的控制器、模型和视图。在本教程中，你将逐个实现这些功能，并将它们构建到应用程序中。在此过程中，我将继续解释在\
    \ CakePHP 中进行开发的重要概念。首先，我将讨论一般性的控制器操作，然后展示如何构建一些自定义操作。\n\n## 处理操作\n\n你已经在 CakePHP\
    \ 中构建并使用了操作。在接下来的功能丰富的博客应用程序中，你将构建一系列操作，每个操作对应网站中的一个特定功能。开发操作的规则遵循典型的 PHP 函数模式。\n\
    \n在清单 7-1 中，我创建了一个名为 `foo` 的基本控制器操作。请注意，它遵循了 PHP 中典型的函数语法。然而，控制器操作的行为与典型的 PHP\
    \ 函数有些不同。例如，当该操作被 CakePHP 启动时，它会自动渲染一个相应的视图或产生一个错误。只有当该操作被应用程序中的另一个操作调用时，它才能在不显示视图的情况下返回一个值。\n\
    \n**清单 7-1.** *一个基本的控制器操作*\n\n```\nfunction foo($bar = null) {\n    $this->set('output',$bar);\n\
    }\n```\n\n### 在操作中使用变量\n\n传递的函数变量可以通过在操作的括号中命名和设置变量来初始化并接收默认值。这些变量在整个操作中都是可用的。\n\
    \n然而，全局变量（供控制器中所有操作使用）可以在控制器类中作为类属性创建：\n\n```\nvar $myVar = 'Variable value';\n\
    ```\n\n现在，在任何控制器操作中，我都可以通过在 `$myVar` 属性前加上 `$this->` 来使用它：\n\n```\nfunction foo($bar\
    \ = null) {\n    $bar = $this->myVar;\n    $this->set('output',$bar);\n}\n```\n\
    \n在创建自己的类属性时，请确保它们不会与 `$scaffold` 或 `$helpers` 等其他 CakePHP 属性冲突。\n\n其他局部变量可以像在其他\
    \ PHP 脚本中一样在操作中调用：\n\n```\nfunction foo() {\n    $bar = 'hello world';\n    $this->set('output',$bar);\n\
    }\n```\n\n## 请求操作\n\n在你的 `Posts` 控制器中，假设你需要从 `Tags` 控制器获取一个标签列表。按照惯例，你通过模型来执行此操作，特别是当你试图完成某种数据库查询时。但为了说明控制器操作之间如何相互通信，让我们通过控制器而不是模型来运行这个查询。\n\
    \n在 `Posts` 控制器的某个操作中，我可以使用 `set()` 和 `requestAction()` 函数将标签列表传递给视图，如下所示：\n\n\
    ```\n$this->set('tags',$this->requestAction('/tags/getList'));\n```\n\n`requestAction()`\
    \ 函数指向 `Tags` 控制器的 `getList()` 操作，该操作尚未创建。为了使 `Posts` 控制器视图中的 `$tags` 变量能够被数据格式化，`Tags`\
    \ 控制器中的 `getList()` 操作需要返回一些数据，*而不是*指向视图（默认情况下它会这样做）。如果你在 `getList()` 操作中省略了返回值，那么\
    \ `Tags` 控制器默认会尝试渲染 `app/views/tags` 目录中名为 `getlist.ctp` 的视图。\n\n因此，为了使此功能正常工作，`getList()`\
    \ 操作需要类似以下这样：\n\n```\nfunction getList() {\n    return $this->Tag->find('list');\n\
    }\n```\n\n有时，确实无法绕过使用 `requestAction()` 函数。但在大多数情况下，你应该能够使用组件、模型或其他元素来导航你的代码。当需要启动另一个操作及其视图和其他所有内容时，请使用\
    \ `redirect()` 函数而不是 `requestAction()`。请求操作（与重定向相对）用于在另一个控制器中执行逻辑并将其结果拉取到当前控制器，而不是简单地在应用程序的其他地方启动另一个操作。简而言之，`redirect()`\
    \ 函数会触发另一个浏览器请求并更改 URL，而 `requestAction()` 则在内部工作以启动特定的操作。\n\n## 回调操作在控制器中的工作方式\n\
    \n控制器回调使得在启动操作之前或之后执行逻辑成为可能。例如，假设你在 `Posts` 控制器中启动了 `View` 操作。在控制器执行 `View` 操作之前，会检查某些回调中是否有任何内容。通过将代码放置在这些回调操作中，你可以在操作执行之前、执行之后或视图渲染之前，为任何及所有操作执行某些逻辑。假设你想限制对\
    \ `View` 操作的访问；你可以在一个回调操作中实现这一点。\n\n`beforeFilter`\n"
- fmt: "`beforeFilter()`回调动作在每个动作执行之前被调用。它的定义方式与其他动作相同，即作为一个PHP函数，并会中断所请求动作中的控制器逻辑处理。为了阻止用户访问网站的特定区域，`beforeFilter()`动作可以检查会话中的信息。\n\
    \n清单7-2中的这个特定回调示例确保对于`view`动作，用户必须已登录；否则，它会将用户重定向到登录动作（关于这些可能性的更多内容将在后文讨论）。这只是使用回调中断启动控制器中动作的一个例子。\n\
    \n**清单7-2.** `beforeFilter()`回调动作\n```php\nfunction beforeFilter() {\n    if ($this->action\
    \ == 'view') {\n        if (!$this->Session->check('User')) {\n            $this->redirect('/users/login');\n\
    \        }\n    }\n}\n```\n\n### `afterFilter`\n\n与`beforeFilter()`回调动作类似，`afterFilter()`在每个动作被调用后执行逻辑。\n\
    \n### `beforeRender`\n\n这个回调动作在所请求动作的逻辑执行完毕之后、所有动作的视图输出渲染之前执行。与`beforeFilter()`和`afterFilter()`一样，可以通过使用`$this->action`变量使`beforeRender()`仅应用于特定动作。\n\
    \n## 为博客定制控制器\n\n目前，`Posts`控制器已包含由`Bake`提供的典型CRUD动作。\n\n用户在应用中看到的第一个界面将是此控制器的`index`动作（清单7-3）。我们来定制这个界面，使其列出五篇博客文章及其内容和作者信息。首先，你需要查看`index()`动作，并让它执行使`Index`视图正确显示所需的逻辑。\n\
    \n**清单7-3.** `Posts`控制器中的`index`动作\n```php\nfunction index() {\n    $this->Post->recursive\
    \ = 0;\n    $this->set('posts', $this->paginate());\n}\n```\n\n### `recursive`属性\n\
    \n清单7-3的第2行将`Post`模型的`recursive`属性设置为`0`。这个属性影响Cake从表中获取数据的方式。请记住，文章与标签和用户是关联的。当`Post`模型执行查询以从数据库中获取文章时，它也会从`tags`和`users`表中获取关联的记录。`recursive`属性告诉模型在获取这些关联记录时应该探查多远。如果用户与另一个表有关联，并且`recursive`属性被设置为大于`1`的值，那么模型将不仅获取关联的用户记录，还会获取它们关联的表的记录。\n\
    \n在`index`动作中，`recursive`属性被设置为`0`，这意味着除了初始层级的关联之外，Cake将忽略其他记录。表7-1列出了可能的`recursive`值及其结果。\n\
    \n**表7-1.** 可能的`recursive`值\n\n| 值   | 结果                                    \
    \                     |\n| ---- | ------------------------------------------------------------\
    \ |\n| –1   | 仅返回当前模型，忽略所有关联                                 |\n| 0    | 返回当前模型及其所有者\
    \                                       |\n| 1    | 返回当前模型及其所有者，以及它们关联的模型    \
    \               |\n| 2    | 返回当前模型、其所有者、它们关联的模型，以及任何关联的模型的关联模型 |\n\n### 分页\n\n\
    清单7-3的第3行使用了`paginate()`控制器函数。这使得`Paginator`助手能够简化列排序和多页数据的处理。本质上，`paginate()`函数执行了一个`find()`模型函数，但同时会分析结果并将一些重要的分页参数传递给视图。然后，在视图中，`Paginator`助手利用这些参数构建多页视图和列排序。如果在控制器中没有运行`paginate()`函数，`Paginator`助手会在视图中中断。如果分页是应用的一个重要元素，那就保留这里的`paginate()`函数。然而，对于这个博客，我将从视图中移除`Paginator`助手，因此`paginate()`函数也可以从`index`动作中移除。\n\
    \n### `find()`函数\n\n实际上，你可以通过使用`find()`函数代替`paginate()`来精简`index`动作的代码，如清单7-4所示。\n\
    \n**清单7-4.** 修改后的`index`动作\n```php\nfunction index() {\n    $this->set('posts',\
    \ $this->Post->find('all'));\n}\n```\n\n请注意，第2行通过`Post`模型执行了模型函数`find()`。这个函数是Cake中最强大的功能之一。它允许你执行一系列重要的数据库查询，而无需构建任何SQL字符串。事实上，如果你将数据源切换为SQL之外的其他类型，`find()`函数仍然可以以该数据源的语法执行数据查询。`find()`动作的参数不仅仅包含查询字符串。使用这个函数，你可以对结果进行排序、限制返回的行数、设置`recursive`值等等。\n\
    \n`find()`函数的参数如表格7-2所示。一个使用了所有参数的`find()`操作看起来是这样的：\n```php\n$this->Post->find('all',\
    \ array(\n    'conditions' => array('User.id' => 1),\n    'fields' => 'Post.name',\n\
    \    'order' => 'Post.id ASC',\n    'limit' => 10,\n    'recursive' => 0\n));\n\
    ```\n\n在这个例子中，`Post`模型将执行一个查询，搜索所有与ID等于1的用户相关联的文章。它还会仅返回`name`字段，并按照文章ID的升序对结果数组进行排序。返回的数组最多包含十个结果，并且查询会从这十篇文章的第一批中获取数据。最后，`recursive`值被设置为`0`，强制查询仅提供`Post`模型数据及其所有者模型。\n\
    \n**表7-2.** `find()`模型函数中可用的参数\n\n| 名称         | 默认值    | 详细信息               \
    \                                      |\n| ------------ | --------- | ------------------------------------------------------------\
    \ |\n| `type`       | `'first'` | 可以是`all`、`first`或`list`；决定要执行的查找操作类型       |\n\
    | `conditions` | `null`    | 包含查找条件的数组，以键值对形式                             |\n\
    | `fields`     | `null`    | 指定从哪些字段检索数据的数组                                 |\n\
    | `order`      | `null`    | 排序条件；用于指定按哪个字段对结果集排序；字段名后必须跟上`ASC`或`DESC` |\n| `page`\
    \       | `null`    | 用于分页数据的页码                                           |\n\
    | `limit`      | `null`    | 每页要计算的结果数量限制                                    \
    \ |\n| `offset`     | `null`    | SQL偏移值                                     \
    \               |\n| `recursive`  |           | 关联模型的递归值；可以被`recursive`属性覆盖  \
    \                |\n\n这个例子展示了在`find()`函数中标注参数的一种方式。简单来说，函数中的参数被存储在一个数组中，并跟随要执行的查找操作类型。另一种列出`find()`中参数的方式是这样的：`find(\
    \ type[string], parameters[array] )`\n\n换句话说，所有的`find`参数都存储在`parameters`数组中，而查找的类型（`all`、`first`或`list`）则通过`type`传入。\n\
    \n当不指定查找操作的类型时，`find()`默认会执行`first`类型。当你只需要获取结果集中的第一条记录，并且希望指定更复杂的条件时，可以使用另一种省略`type`参数的标注方法。在这种情况下，每个参数都直接写在`find()`的括号中，而不是像之前解释的那样放在`parameters`数组中。`find()`函数将按以下方式接受设置：\n\
    ```php\nfind( conditions[array], fields[mixed], order[string], recursive[int]\
    \ )\n```\n如果我想获取整个表中的第一篇文章，但按日期排序，我可以这样使用`find()`：\n```php\n$this->Post->find(null,\
    \ null, 'date DESC');\n```"
  raw: 'The beforeFilter() callback action is called before every action is executed.
    It is entered like any other action, as a PHP function, and interrupts processing
    controller logic in the requested action. To block users from accessing a certain
    area of the site, the beforeFilter() action can check the session for information.


    This particular callback example in Listing 7-2 ensures that for the View action,
    the user must be logged in; otherwise, it redirects the user to a login action
    (more on these possibilities later). This is just one example of using a callback
    to interrupt launching an action in the controller.


    **Listing 7-2.** *The* beforeFilter() *Callback Aaction* function beforeFilter()
    {


    if ($this->action == ''view'') {


    if (!$this->Session->check(''User'')) {


    $this->redirect(''/users/login'');


    }


    }


    }


    afterFilter


    Just like the beforeFilter() callback action, afterFilter() performs logic after
    every action is called.


    beforeRender


    This callback action performs logic between the execution of the requested action’s
    logic and the rendering of the view output for all actions. Like beforeFilter()
    and afterFilter(), beforeRender() can be made to apply to a specific action by
    using the $this->action variable.


    **Customizing the Controller for the Blog**


    Currently, the Posts controller already contains the typical CRUD actions as supplied
    by Bake.


    The first screen in the application at which the user will arrive will be the
    Index action of this controller (Listing 7-3). Let’s customize this screen to
    list five blog posts with their content and author information. First, you will
    need to take a look at the index() action and make it perform the logic needed
    for the Index view to display properly.


    09775ch07final 7/1/08 9:46 PM Page 93


    C H A P T E R 7 ■ W O R K I N G W I T H C O N T R O L L E R S A N D M O D E L
    S


    **93**


    **Listing 7-3.** *The Index Action in the Posts Controller*


    function index() {


    $this->Post->recursive = 0;


    $this->set(''posts'', $this->paginate());


    }


    **Recursive**


    Line 2 of Listing 7-3 sets the Post model’s recursive attribute to 0. This attribute
    affects how Cake pulls data from the table. Remember that posts are associated
    with tags and users. When the Post model runs a query to pull posts from the database,
    it will also fetch associated records from the tags and users tables. The recursive
    attribute tells the model how far to look when pulling those associated records.
    If users were to have an association with another table and the recursive attribute
    were set to a value greater than 1, then the model would pull not only the associated
    user records but their associated tables’ records as well.


    In the Index action, the recursive attribute is set to zero, which means that
    beyond the initial level of associations, Cake will ignore other records. Table
    7-1 outlines the possible recursive values and their results.


    **Table 7-1.** *Possible Recursive Values*


    **Value**


    **Result**


    –1


    Returns only the current model and ignores all associations


    Returns the current model plus its owner(s)


    Returns the current model and its owner plus their associated models 2


    Returns the current model, its owner, their associated models, and the associated
    models of any associations


    **Pagination**


    Line 3 of Listing 7-3 uses the paginate() controller function. This allows the
    Paginator helper to simplify column sorting and multiple pages of data. Essentially,
    the paginate() function performs a find() model function but also analyzes the
    result and passes some important pagination parameters to the view. Then, in the
    view, the Paginator helper takes those parameters and constructs multiple pages
    and column sorting. If the paginate() function is not run in the controller, the
    Paginator helper would break in the view. If pagination is an important element
    of the application, then leave the paginate() function here. However, for this
    blog, I will remove the Paginator helper from the view, so the paginate() function
    can also be removed from the Index action.


    **The find() Function**


    You can actually cut down the code for the Index action by using the find() function
    instead of paginate(), as shown in Listing 7-4.


    09775ch07final 7/1/08 9:46 PM Page 94


    **94**


    C H A P T E R 7 ■ W O R K I N G W I T H C O N T R O L L E R S A N D M O D E L
    S


    **Listing 7-4.** *The Revised Index Action*


    function index() {


    $this->set(''posts'',$this->Post->find(''all''));


    }


    Notice that line 2 runs the model function find() through the Post model. This
    function is one of the more powerful features in Cake. It allows you to run a
    series of important database queries without constructing any SQL strings. In
    fact, if you were to switch the data source to something other than SQL, the find()
    function could still run data queries in the syntax of the data source. The parameters
    of the find() action include more than just query strings. With this function
    you can order the results, limit the number of returned rows, set the recursive
    value, and more.


    The parameters for the find() function are displayed in Table 7-2\. A find() operation
    that uses all the parameters would look something like this:


    $this->Post->find(''all'',array(''conditions''=>➥


    array(''User.id''=>1),''fields''=>''Post.name'',''order''=>➥


    ''Post.id ASC'',''limit''=>10,''recursive''=>0));


    In this example, the Post model would run a query searching for all posts associated
    with the user with an ID equal to 1\. It would also return only the name field
    and would order the results array by the posts’ IDs in ascending order. The returned
    array would have a maximum of ten results, and the query would pull from the first
    set of ten in the batch. Lastly, the recursive value is set to 0, forcing the
    query to supply only the Post model data and its owner model.


    **Table 7-2.** *Parameters Available in the* find() *Model Function* **Name**


    **Default Value**


    **Details**


    type


    ''first''


    Can be all, first, or list; determines what type of find


    operation to perform


    conditions


    null


    Array containing the find conditions as key and value


    fields


    null


    Array specifying from which fields to retrieve data


    order


    null


    Ordering conditions; used to specify by which field to order the


    result set; field name must be followed by either ASC or DESC


    page


    null


    Page number for using paged data


    limit


    null


    The limit of results to be calculated per page


    offset


    null


    The SQL offset value


    recursive


    Recursive value for associated models; can be overridden by the


    recursive attribute


    This example shows one way of notating parameters in the find() function. Simply
    put, the parameters in the function are stored in an array and follow the type
    of find action to be performed. Another way of listing the parameters in find()
    is like this: **find( type[string], parameters[array] )**


    09775ch07final 7/1/08 9:46 PM Page 95


    C H A P T E R 7 ■ W O R K I N G W I T H C O N T R O L L E R S A N D M O D E L
    S


    **95**


    In other words, all of the find parameters are stored in the parameters array,
    and the type of find (all, first, or list) is passed in type.


    When not specifying the type of find operation, find() will perform the first
    type by default. When you need to fetch only the first record of a result set
    and you want to specify more complicated conditions, then you can use an alternate
    notation method that leaves out the type parameter altogether. In this case, each
    parameter is entered in find() between parentheses, not in a parameters array
    as in the notation explained earlier. The find() function would then take on settings
    in this fashion:


    find( conditions[array], fields[mixed], order[string], recursive[int] ) If I were
    to fetch the first post of the entire table but ordered by date, I could use find()
    like this:


    **$this->Post->find(null,null,''date DESC'');**'
  trans: "\n`beforeFilter()`回调动作在每个动作执行之前被调用。它的定义方式与其他动作相同，即作为一个 PHP 函数，并会中断所请求动作中的控制器逻辑处理。为了阻止用户访问网站的特定区域，`beforeFilter()`动作可以检查会话中的信息。\n\
    \n清单 7-2 中的这个特定回调示例确保对于`view`动作，用户必须已登录；否则，它会将用户重定向到登录动作（关于这些可能性的更多内容将在后文讨论）。这只是使用回调中断启动控制器中动作的一个例子。\n\
    \n**清单 7-2.** `beforeFilter()`回调动作\n```php\nfunction beforeFilter() {\n    if\
    \ ($this->action == 'view') {\n        if (!$this->Session->check('User')) {\n\
    \            $this->redirect('/users/login');\n        }\n    }\n}\n```\n\n###\
    \ `afterFilter`\n\n与`beforeFilter()`回调动作类似，`afterFilter()`在每个动作被调用后执行逻辑。\n\n###\
    \ `beforeRender`\n\n这个回调动作在所请求动作的逻辑执行完毕之后、所有动作的视图输出渲染之前执行。与`beforeFilter()`和`afterFilter()`一样，可以通过使用`$this->action`变量使`beforeRender()`仅应用于特定动作。\n\
    \n## 为博客定制控制器\n\n目前，`Posts`控制器已包含由`Bake`提供的典型 CRUD 动作。\n\n用户在应用中看到的第一个界面将是此控制器的`index`动作（清单\
    \ 7-3）。我们来定制这个界面，使其列出五篇博客文章及其内容和作者信息。首先，你需要查看`index()`动作，并让它执行使`Index`视图正确显示所需的逻辑。\n\
    \n**清单 7-3.** `Posts`控制器中的`index`动作\n```php\nfunction index() {\n    $this->Post->recursive\
    \ = 0;\n    $this->set('posts', $this->paginate());\n}\n```\n\n### `recursive`属性\n\
    \n清单 7-3 的第 2 行将`Post`模型的`recursive`属性设置为`0`。这个属性影响 Cake 从表中获取数据的方式。请记住，文章与标签和用户是关联的。当`Post`模型执行查询以从数据库中获取文章时，它也会从`tags`和`users`表中获取关联的记录。`recursive`属性告诉模型在获取这些关联记录时应该探查多远。如果用户与另一个表有关联，并且`recursive`属性被设置为大于`1`的值，那么模型将不仅获取关联的用户记录，还会获取它们关联的表的记录。\n\
    \n在`index`动作中，`recursive`属性被设置为`0`，这意味着除了初始层级的关联之外，Cake 将忽略其他记录。表 7-1 列出了可能的`recursive`值及其结果。\n\
    \n**表 7-1.** 可能的`recursive`值\n\n| 值   | 结果                                   \
    \                      |\n| ---- | ------------------------------------------------------------\
    \ |\n| –1   | 仅返回当前模型，忽略所有关联                                 |\n| 0    | 返回当前模型及其所有者\
    \                                       |\n| 1    | 返回当前模型及其所有者，以及它们关联的模型    \
    \               |\n| 2    | 返回当前模型、其所有者、它们关联的模型，以及任何关联的模型的关联模型 |\n\n### 分页\n\n\
    清单 7-3 的第 3 行使用了`paginate()`控制器函数。这使得`Paginator`助手能够简化列排序和多页数据的处理。本质上，`paginate()`函数执行了一个`find()`模型函数，但同时会分析结果并将一些重要的分页参数传递给视图。然后，在视图中，`Paginator`助手利用这些参数构建多页视图和列排序。如果在控制器中没有运行`paginate()`函数，`Paginator`助手会在视图中中断。如果分页是应用的一个重要元素，那就保留这里的`paginate()`函数。然而，对于这个博客，我将从视图中移除`Paginator`助手，因此`paginate()`函数也可以从`index`动作中移除。\n\
    \n### `find()`函数\n\n实际上，你可以通过使用`find()`函数代替`paginate()`来精简`index`动作的代码，如清单 7-4\
    \ 所示。\n\n**清单 7-4.** 修改后的`index`动作\n```php\nfunction index() {\n    $this->set('posts',\
    \ $this->Post->find('all'));\n}\n```\n\n请注意，第 2 行通过`Post`模型执行了模型函数`find()`。这个函数是\
    \ Cake 中最强大的功能之一。它允许你执行一系列重要的数据库查询，而无需构建任何 SQL 字符串。事实上，如果你将数据源切换为 SQL 之外的其他类型，`find()`函数仍然可以以该数据源的语法执行数据查询。`find()`动作的参数不仅仅包含查询字符串。使用这个函数，你可以对结果进行排序、限制返回的行数、设置`recursive`值等等。\n\
    \n`find()`函数的参数如表格 7-2 所示。一个使用了所有参数的`find()`操作看起来是这样的：\n```php\n$this->Post->find('all',\
    \ array(\n    'conditions' => array('User.id' => 1),\n    'fields' => 'Post.name',\n\
    \    'order' => 'Post.id ASC',\n    'limit' => 10,\n    'recursive' => 0\n));\n\
    ```\n\n在这个例子中，`Post`模型将执行一个查询，搜索所有与 ID 等于 1 的用户相关联的文章。它还会仅返回`name`字段，并按照文章 ID\
    \ 的升序对结果数组进行排序。返回的数组最多包含十个结果，并且查询会从这十篇文章的第一批中获取数据。最后，`recursive`值被设置为`0`，强制查询仅提供`Post`模型数据及其所有者模型。\n\
    \n**表 7-2.** `find()`模型函数中可用的参数\n\n| 名称         | 默认值    | 详细信息              \
    \                                       |\n| ------------ | --------- | ------------------------------------------------------------\
    \ |\n| `type`       | `'first'` | 可以是`all`、`first`或`list`；决定要执行的查找操作类型       |\n\
    | `conditions` | `null`    | 包含查找条件的数组，以键值对形式                             |\n\
    | `fields`     | `null`    | 指定从哪些字段检索数据的数组                                 |\n\
    | `order`      | `null`    | 排序条件；用于指定按哪个字段对结果集排序；字段名后必须跟上`ASC`或`DESC` |\n| `page`\
    \       | `null`    | 用于分页数据的页码                                           |\n\
    | `limit`      | `null`    | 每页要计算的结果数量限制                                    \
    \ |\n| `offset`     | `null`    | SQL 偏移值                                    \
    \                |\n| `recursive`  |           | 关联模型的递归值；可以被`recursive`属性覆盖 \
    \                 |\n\n这个例子展示了在`find()`函数中标注参数的一种方式。简单来说，函数中的参数被存储在一个数组中，并跟随要执行的查找操作类型。另一种列出`find()`中参数的方式是这样的：`find(\
    \ type[string], parameters[array] )`\n\n换句话说，所有的`find`参数都存储在`parameters`数组中，而查找的类型（`all`、`first`或`list`）则通过`type`传入。\n\
    \n当不指定查找操作的类型时，`find()`默认会执行`first`类型。当你只需要获取结果集中的第一条记录，并且希望指定更复杂的条件时，可以使用另一种省略`type`参数的标注方法。在这种情况下，每个参数都直接写在`find()`的括号中，而不是像之前解释的那样放在`parameters`数组中。`find()`函数将按以下方式接受设置：\n\
    ```php\nfind( conditions[array], fields[mixed], order[string], recursive[int]\
    \ )\n```\n如果我想获取整个表中的第一篇文章，但按日期排序，我可以这样使用`find()`：\n```php\n$this->Post->find(null,\
    \ null, 'date DESC');\n```\n"
- fmt: "# Manipulating Find Conditions\n\nManipulating these parameters in the `find()`\
    \ function and using these two ways of notating find conditions allows you to\
    \ perform more complex database queries and trim the data set to exactly what\
    \ results you need. This saves you from having to run loops through data where\
    \ you can provide an array with specific conditions and the model returns data\
    \ set for you, already formatted to be handled in the controller and view.\n\n\
    ## Setting Find Conditions\n\nFind conditions are formatted as an array. The key\
    \ corresponds to the field to be searched, and the value represents the value\
    \ to be found in the field. Notice that the field provided in the find condition\
    \ is structured differently than a typical SQL query string. The associated model\
    \ (in this case `User`) followed by a period and the field name tells the `find()`\
    \ function to run the query through the associated model, not the `Post` model.\
    \ In other words, search in the associated table for fields named `id` with the\
    \ value `1`.\n\nUsing arrays for find conditions is probably the more efficient\
    \ way of putting together your queries. By default, the query will search for\
    \ values equal to what is entered in the array.\n\nTo search for the field with\
    \ values not equal to a certain value, simply add `<>` before the expression:\n\
    \n```\n$this->Post->find('all',array('conditions'=>array('User.id'=>'<> 1')));\n\
    ```\n\nCake parses other SQL expressions, which include `LIKE`, `BETWEEN`, and\
    \ `REGEX`, but you must have a space between the operator and the value. You can\
    \ search for date or datetime fields by enclosing the field name in the SQL `DATE()`\
    \ parameter.\n\n## Setting Multiple Conditions\n\nCake supports multiple conditions.\
    \ By using the array to format the conditions, multiple searches are easily managed:\n\
    \n```\n$this->Post->find('all',array('conditions'=>array('User.id'=>1,'DATE(Post.date)'=>'CURDATE()')));\n\
    ```\n\nThe default way of pulling the conditions into a single query is by using\
    \ the `AND` boolean operator. In other words, the previous example will tell the\
    \ model to find all posts owned by the user with an ID of `1` *and* all posts\
    \ with a date equal to today.\n\nSuppose you need to perform a multiple condition\
    \ query with the `OR` operator instead. You do this by setting the condition's\
    \ array as the value in an array with the key `or` like so:\n\n```\n$this->Post->find('all',array('conditions'=>array(\n\
    \  'or'=>array(\n    'User.id'=>1,'DATE(Post.date)'=>'CURDATE()'\n  )\n)));\n\
    ```\n\nAll valid SQL boolean operations can be used in place of `OR` in this example.\
    \ These include `AND`, `OR`, `NOT`, or `XOR`.\n\nYou can also have Cake search\
    \ for multiple values in a field. Simply attach an array to a field key with all\
    \ the possible values for which to search:\n\n```\n$this->Post->find('all',array('conditions'=>array('User.id'=>array(1,2,5,10))));\n\
    ```\n\n## Displaying the Most Recent Posts\n\nAs the `posts` table grows, the\
    \ results returned by the current `find()` function in the `Index` action will\
    \ grow as well. To guarantee that the server load is not compromised down the\
    \ road and because you need only the five most recent posts, you can customize\
    \ the find conditions to return only five records and not (potentially) hundreds.\n\
    \nThe easiest way to do this is to set the `limit` to `5` and `order` the results\
    \ by creation date, descending:\n\n```\n$this->Post->find('all',array('order'=>'date\
    \ DESC','limit'=>5,'recursive'=>0));\n```\n\nNow, the `find()` function will pull\
    \ all `Post` records and their owners (in this case `User` records associated\
    \ with the post), sort by the `date` field with the most recent first, and limit\
    \ the results to five.\n\nThe example database is structured with an `auto_increment`\
    \ in the `ID` field, meaning that the `ID` field not only identifies records by\
    \ a unique value but also tells you the order of creation. Because, in theory,\
    \ the administrator could manipulate the `date` field but not the `ID` field,\
    \ it may be worthwhile in some instances to order by `ID` rather than by `date`.\
    \ This, though, is at the discretion of the client or developer. In this blog,\
    \ we'll trust that the date assigned to the post will determine when the post\
    \ appears in the site.\n\nInsert the new conditions into the `find()` function\
    \ in line 2 of Listing 7-4 and replace the `Index` action with the resulting code.\n\
    \n## Adjusting the Index View\n\nThe `Index` view will need to be adjusted as\
    \ well, if only to remove administrative actions from the reach of the user.\n\
    \nGo into the `app/views/posts/index.ctp` file and insert the following code,\
    \ or work in your own customized view code that displays the content in a more\
    \ storylike form:\n\n```\n<? foreach($posts as $post): ?>\n<div class=\"story\"\
    >\n  <?=$html->link('<h1>'.$post['Post']['name'].'</h1>','/posts/view/'.$post['Post']['id'],null,null,false);?>\n\
    \  <p>\n    Posted <?=date('M jS Y, g:i a',strtotime($post['Post']['date']));?>\n\
    \  </p>\n  <p>\n    <b>By <?=$post['User']['firstname'];?> <?=$post['User']['lastname'];?></b>\n\
    \  </p>\n  <br/>\n  <p><?=$post['Post']['content'];?></p>\n</div>\n<? endforeach;\
    \ ?>\n```\n\n## The View Action\n\nThe exercise you just completed made it possible\
    \ for the user to click the title of each post in the Index view, which would\
    \ take them to the `View` action for that post. The `View` action should already\
    \ contain the baked code shown in Listing 7-5.\n\n**Listing 7-5.** *The View Action\
    \ in the Posts Controller*\n\n```\nfunction view($id = null) {\n  if (!$id) {\n\
    \    $this->Session->setFlash(__('Invalid Post.', true));\n    $this->redirect(array('action'=>'index'));\n\
    \  }\n  $this->set('post', $this->Post->read(null, $id));\n}\n```\n\nLine 6 of\
    \ Listing 7-5 shows the use of the `read()` function. This is similar to the `find()`\
    \ function I have already discussed, but it does have some unique qualities that\
    \ are especially useful for simple page requests.\n\n### The `read()` Function\n\
    \nIn short, the `read()` function reads the contents of a particular record. It\
    \ differs from `find()` in that it does not include the `recursive` parameter.\
    \ See Table 7-3 for parameters available in the `read()` model function.\n\n**Table\
    \ 7-3.** *Parameters, in Order, Available in the `read()` Model Function*\n\n\
    | Name   | Type    | Default Value | Explanation                             \
    \                     |\n| ------ | ------- | ------------- | ------------------------------------------------------------\
    \ |\n| fields | Mixed   | `null`        | String value for a single field name\
    \ or an array of field names |\n| id     | Integer | `null`        | ID of record\
    \ to be read                                      |\n\nThe `View` action's use\
    \ of the `read()` function is appropriate for the task at hand; leave it the same.\
    \ Lines 3–4 of Listing 7-5 contain functions for setting an error message through\
    \ the `Session` component and for redirecting the user in the event of an error.\n\
    \n### The `setFlash()` Function\n\nIn Chapter 6 I discussed the `setFlash()` function,\
    \ but only in basic terms. This function can go beyond displaying a mere error\
    \ message. Table 7-4 lists its parameters.\n\n**Table 7-4.** *Parameters, in Order,\
    \ Available in the `setFlash()` Function in the Session Component*\n\n| Name \
    \   | Type    | Default Value | Explanation                                  \
    \                |\n| ------- | ------- | ------------- | ------------------------------------------------------------\
    \ |\n| message | String  | `null`        | The message to be made available in\
    \ the `$session->flash()` function in the layout |\n| layout  | String  | `default`\
    \     | The layout in which to place the flash message; this can switch the `<div>`\
    \ container element in which the flash is displayed from the default to another\
    \ customized one |\n| params  | Array   | `null`        | Parameters to be passed\
    \ to the layout as view variables      |\n| key     | String  | `flash`      \
    \ | A way to distinguish various flash message types for multiple flash messages\
    \ |\n\nBy default, the `$session->flash()` function in the layout, when it receives\
    \ a flash message from the `setFlash()` function, will display the message inside\
    \ a standardized HTML string."
