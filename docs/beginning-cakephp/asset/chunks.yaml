    \ `app/webroot/files/data.xml`。通过在数据库配置文件中指定此参数，我遵循了 Cake 应用程序中的一致性；所有数据源连接都在一个地方定义，即\
    \ `database.php` 文件。现在 `database.php` 文件包含了 XML `DataSource` 的配置设置，模型便能够与 `DataSource`\
    \ 协同工作了。\n\n## 在模型中使用数据源\n\n在 `DataSource` 和模型开始协同工作之前，需要完成几个关键的设置流程：\n\n1.  `DataSource`\
    \ 文件必须被正确命名并放置在 `app/models/datasources` 文件夹中。\n2.  `DataSource` 类必须被正确命名并设置为继承\
    \ `DataSource` 对象。\n3.  `DataSource` 文件必须至少包含清单 14-3 中概述的最小函数集。\n4.  数据库配置文件必须在一个对象数组中定义\
    \ `DataSource`。\n5.  在模型中，`setDataSource()` 函数必须引用同一个对象数组。\n6.  在模型中，`DataSource`\
    \ 对象必须通过 `getDataSource()` 函数实例化。\n\n至此，您已完成设置 `DataSource` 的第 1–4 步。请注意，第 5 步和第\
    \ 6 步在模型中完成。让我们打开 `app/models/post.php` 文件，让 XML `DataSource` 在那里工作。\n\n清单 14-5\
    \ 包含了要放置在 `post.php` 文件中的 `xmlFindAll()` 函数。此函数使用 XML `DataSource` 返回 `data.xml`\
    \ 文件中的一个值数组。\n\n**清单 14-5.** *`Post` 模型中的 `xmlFindAll()` 函数*\n\n```php\nfunction\
    \ xmlFindAll() {\n    $this->setDataSource('xml');\n    $xml = $this->getDataSource();\n\
    \    return $xml->findAll();\n}\n```\n\n请注意，清单 14-5 的第 2–3 行完成了 `DataSource` 设置流程的最后几个步骤。第\
    \ 2 行使用 `setDataSource()` 函数将 `app/config/database.php` 中的 `$xml` 数组链接到模型。调用此行时，XML\
    \ `DataSource` 的 `__construct()` 函数会自动运行，并且 `$xml` 数组作为 `$config` 数组传递给此函数。`setDataSource()`\
    \ 函数不仅将模型链接到 `DataSource`，还使其成为模型的主要驱动程序。换句话说，在使用 XML `DataSource` 时，MySQL 驱动程序/`DataSource`\
    \ 不再在模型中运行。每当控制器调用模型连接到默认的 `DataSource` 时，此 XML `DataSource` 对象的实例会被销毁，并且 `__destruct()`\
    \ 方法会被自动调用。\n\n第 3 行将 XML `DataSource` 对象赋值给变量 `$xml`。从此以后，在模型中，任何 `DataSource`\
    \ 文件中的函数都可以通过引用新的 `$xml` 对象来运行，第 4 行正是这样做的；`$xml->findAll()` 函数将与您稍后将插入到 `DataSource`\
    \ 中的 `findAll()` 函数相同。"
- fmt: '# When the controller calls the `xmlFindAll()` function, the model will return
    a set of values to be used in the controller and view. Notice that this model
    function doesn’t have all the connection code that will soon appear in the `DataSource`.
    This will keep the model trim and able to deal with the data rather than managing
    all the connections to the datasource.


    ## Reading the XML File


    Now that the setup routine is complete and the model is ready to begin using `DataSource`
    functions, you’re ready to put the `DataSource` to work. Right now the `findAll()`
    function does nothing. Before it can do any reading, the `connect()` function
    on line 16 in Listing 14-3 must connect to the XML file and fetch its contents
    for use in the `DataSource`. Replace `connect()` with Listing 14-6 to provide
    the `DataSource` with the necessary connection method.


    **Listing 14-6.** *The Improved* `connect()` *Function in the XML DataSource*
    16


    ```

    function connect() {

    17 App::import(''Core'',''File'');

    18 $this->FileUtil =& new File(WWW_ROOT.''files/''.$this->config[''file'']); 19
    $this->File = $file->read();


    if (!$this->File) {

    21 return false;

    22 } else {

    return true;

    }

    25 }

    ```


    Throughout the `DataSource` file, the configuration array defined in `app/config/database.php`
    will be available as the object variable `$config`. Don’t confuse this variable
    with the `$config` variable used by the `__construct()` function from Listing
    14-3. In fact, the *result* of the constructor method—or, in other words, the
    returned value in the `__construct()` function—is assigned to the standard object
    variable `$config` for the `DataSource`. This means that anywhere in the rest
    of the `DataSource` (except the `__construct()` function), the configuration values
    returned by the constructor are available as `$this->config`. It just so happens
    that `__construct()` performs the necessary method to fetch the `$xml` array from
    `app/config/database.php` and return it as `$this->config` for the `DataSource`
    to use. The `connect()` function in Listing 14-6 uses `$this->config` to retrieve
    the datasource’s file name. Notice that line 18 calls for this file name in the
    `File` utility. Using the `WWW_ROOT` global variable, line 18 also contains the
    path to the file relative to Cake. In this case, the file will need to be stored
    in the Cake file system as `app/webroot/files/data.xml`. Of course, `$this->config[''file'']`
    corresponds to `$xml[''file'']` defined on line 3 of Listing 14-4.


    Thanks to the `File` utility class, reading the contents of `app/webroot/files/data.xml`
    is a snap. Line 18 grabs the file itself and assigns it as part of the `File`
    utility’s class object. Then, on line 19, the `File` utility’s `read()` function
    is used to read the contents of the file and assign them to a class variable named
    `$File`. You may have noticed that this variable hasn’t yet been defined; do that
    by inserting the following string under the `$description` class variable shown
    in line 3 of Listing 14-2 (or in line 3 of the current XML `DataSource` file):
    `var $File = null;`


    Assigning the contents of the file to an object variable as opposed to a standard
    variable is important for making sure that all the other functions in the `DataSource`
    have access to this file. For this same reason, the resulting `File` utility object
    ought to be made available to the rest of the `DataSource` as well. This is done
    in line 18 by assigning the new `File` object to the instance variable `$FileUtil`.
    This, too, needs to be defined in the class to work correctly. Insert this definition
    near the `$File` definition: `var $FileUtil = null;`


    Later, the `__destruct()` and `close()` functions will close the `data.xml` file
    to keep the application’s load on the server to a minimum. These functions will
    need the `File` utility object, which is accessible outside the `connect()` function
    because I’ve assigned it to the `$FileUtil` instance variable.


    The `connect()` function has essentially performed a connection method by providing
    the file contents of `data.xml` to the rest of the `DataSource`. All that’s left
    for this function is to return a `true` or `false` result to the constructor.
    Lines 20–24 check for any content in the `$File` variable and return this result.
    Now that the `data.xml` file has been opened and its contents made available to
    the rest of the `DataSource`, you’re ready to move on to the `findAll()` function
    called by the model.


    ## Disconnecting from the XML File


    For good measure, the `DataSource` should include a method for disconnecting from
    the source. The `__destruct()` function defined in Listing 14-3 already does this,
    except that the `close()` function it calls has nothing in it yet. Replace the
    `close()` function (which should now appear on line 29 of the `app/models/datasources/xml_source.php`
    file) with the contents of Listing 14-7.


    **Listing 14-7.** *The Improved* `close()` *Function*


    ```

    function close() {

    if ($this->FileUtil->close()) {

    31 return false;

    32 } else {

    return true;

    }

    35 }

    ```


    The result of this function may seem backward only because a `false` result usually
    means that the method failed. In this case, returning `false` sets the `$connected`
    class variable to the proper value; it tells the model that the connection status
    is disconnected, or zero.


    Line 30 of Listing 14-7 uses the `File` utility class function `close()` to close
    the `data.xml` file. Simply put, if this is accomplished, then all `close()` has
    left to do is report `false` to the destructor, which is done on line 31.


    ## Parsing the XML File


    Before the `DataSource` parses the XML file, let’s give it something with which
    to work. Paste something like the contents of Listing 14-8 into the `app/webroot/files/data.xml`
    file. Notice that Listing 14-8 is formatted as XML 1.0 standard tags named after
    fields in the current posts table in the database.


    **Listing 14-8.** *Contents to be Added to the* `data.xml` *File*


    ```

    <?xml version="1.0" encoding="UTF-8"?>

    <blog>

    <post>

    <id></id>

    <name>Writing Posts in XML is a Snap</name>

    <date>2008-11-08 12:00:01</date>

    <content>Using the XML utility class in Cake with the Set::reverse()➥

    function makes parsing XML easy.</content>

    <user_id>1</user_id>

    </post>

    <post>

    <id></id>

    <name>More XML Posts, Not so Bad</name>

    <date>2008-11-08 12:00:02</date>

    <content>Using the XML utility class in Cake with the Set::extract()➥

    function makes parsing XML easy.</content>

    <user_id>1</user_id>

    </post>

    </blog>

    ```


    Aside from the XML specification string on line 1 of Listing 14-8, the tags used
    here are structured hierarchically like the posts table: the `<blog>` tag is named
    after the name of the database; `<post>` is used for each row in the posts table;
    `<id>` corresponds to the ID field, and so on, through `<user_id>`. Once these
    tags are parsed by the `findAll()` function, an array will be passed to the model
    just like when the default MySQL `DataSource` passes a result set from the database.


    Currently, this same content in Listing 14-8 is assigned to `$File` upon connecting
    to the `data.xml` file. All the `read()` function has to do is parse through these
    XML tags and format the array for the model accordingly. Listing 14-9 contains
    the `findAll()` function that parses the XML. Paste this into the XML `DataSource`
    file.


    **Listing 14-9.** *The* `findAll()` *Function*


    ```

    function findAll() {

    38 App::import(''Core'',''Xml'');

    $xml = Set::reverse(new Xml($this->File));

    return Set::extract($xml,''Post'');

    41 }

    ```'
