- fmt: "# Implementation\n\nOnce you have created a wider framework, the view layer\
    \ is not a massive programming challenge. Of course, it remains a huge design\
    \ and information-architecture issue, but that’s another book!\n\n`Template View`\
    \ was so named by Fowler. It is a staple pattern used by most enterprise programmers.\
    \ In some languages, an implementation might involve cooking up a templating system\
    \ that translates tags to values set by the system. You have that option in PHP,\
    \ too. You could use a templating engine like the excellent Twig. My preferred\
    \ option, though, is to use PHP’s existing functionality, but to use it with care.\n\
    \nIn order for a view to have something to work with, it must be able to acquire\
    \ data. I like to define a `View Helper` that views can use.\n\nHere is a simple\
    \ `ViewHelper` class:\n\n```php\n// listing 12.37\nclass ViewHelper\n{\n    public\
    \ function sponsorList()\n    {\n        // do something complicated to get the\
    \ sponsor list\n        return \"Bob's Shoe Emporium\";\n    }\n}\n```\n\nAll\
    \ this class does at present is provide a sponsor list string. Let’s assume that\
    \ there is some relatively complex process to acquire or format this data that\
    \ we should not embed in the template itself. You can extend it to provide additional\
    \ functionality as your application evolves. If you find yourself doing something\
    \ in a view that takes up more than a couple of lines, chances are it belongs\
    \ in the `View Helper`. In a larger application, you may provide multiple `ViewHelper`\
    \ objects in an inheritance hierarchy in order to provide different tools for\
    \ different parts of your system.\n\nI might acquire a `ViewHelper` from a factory\
    \ of some kind—perhaps the registry. From the point of view of the template, the\
    \ simplest approach is to make a helper instance available in the `render()` method:\n\
    \n```php\n// listing 12.38\npublic function render(string $resource, Request $request)\n\
    {\n    $vh = new ViewHelper();\n    // now the template will have the $vh variable\n\
    \    include($resource);\n}\n```\n\nHere is a simple view that uses the `View\
    \ Helper`:\n\n```php\n<?php\n// Venues\n?>\nVenues\n\nProudly sponsored by: <?php\
    \ echo $vh->sponsorList(); ?>\n\nListing venues\n```\n\nThe view (`list_venues.php`)\
    \ is granted a `ViewHelper` instance in the `$vh` variable. It calls the `sponsorList()`\
    \ method and prints the results.\n\nClearly, this example doesn’t banish code\
    \ from the view, but it does severely limit the amount and kind of coding that\
    \ needs to be done. The page contains a simple print statement and will inevitably\
    \ require other method calls as it grows in complexity, but a designer should\
    \ be able to work around code of this kind with little or no effort.\n\nSlightly\
    \ more problematic are `if` statements and loops. These are difficult to delegate\
    \ to a `View Helper` because they are usually bound up with formatted output.\
    \ I tend to keep both simple conditionals and loops (which are very common in\
    \ building tables that display rows of data) inside the `Template View`; but to\
    \ keep them as simple as possible, I delegate things like test clauses, where\
    \ possible.\n\n## Consequences\n\nThere is something slightly disturbing about\
    \ the way that data is passed to the view layer, in that a view doesn’t really\
    \ have a fixed interface that guarantees its environment. I tend to think of every\
    \ view as entering into a contract with the system at large. The view effectively\
    \ says to the application, “If I am invoked, then I have a right to access object\
    \ `This`, object `That`, and object `TheOther`.” It is up to the application to\
    \ ensure that this is the case.\n\nYou could make views stricter by providing\
    \ accessor methods in the helper classes, but I have always found it easier to\
    \ register objects dynamically for the view layer through a `Request`, `Response`,\
    \ or `Context` object.\n\nWhile templates are often essentially passive, populated\
    \ with data resulting from the last request, there may be times when the view\
    \ needs to make an ancillary request. The `View Helper` is a good place to provide\
    \ this functionality, keeping any knowledge of the mechanism by which data is\
    \ required hidden from the view itself. Even the `View Helper` should do as little\
    \ work as possible, delegating to a command or contacting the domain layer via\
    \ a facade.\n\n> **Note**  \n> You saw the `Facade` pattern in Chapter [10](#A314621_5_En_10_Chapter.html).\
    \ Alur et al. look at one use of Facades in enterprise programming in the `Session\
    \ Facade` pattern (which is designed to limit fine-grained network transactions).\
    \ Fowler also describes a pattern called `Service Layer`, which provides a simple\
    \ point of access to the complexities within a layer.\n\n# The Business Logic\
    \ Layer\n\nIf the control layer orchestrates communication with the outside world\
    \ and marshals a system’s response to it, the logic layer gets on with the business\
    \ of an application. This layer should be as free as possible of the noise and\
    \ trauma generated as query strings are analyzed, HTML tables are constructed,\
    \ and feedback messages composed. Business logic is about doing the stuff that\
    \ needs doing—the true purpose of the application. Everything else exists just\
    \ to support these tasks.\n\nIn a classic object-oriented application, the business\
    \ logic layer is often composed of classes that model the problems that the system\
    \ aims to address. As you shall see, this is a flexible design decision. It also\
    \ requires significant up-front planning.\n\nLet’s begin, then, with the quickest\
    \ way of getting a system up and running.\n\n## Transaction Script\n\nThe `Transaction\
    \ Script` pattern (*Patterns of Enterprise Application Architecture*) describes\
    \ the way that many systems evolve of their own accord. It is simple, intuitive,\
    \ and effective, although it becomes less so as systems grow. A transaction script\
    \ handles a request inline, rather than delegating to specialized objects. It\
    \ is the quintessential quick fix. It is also a hard pattern to categorize because\
    \ it combines elements from other layers in this chapter. I have chosen to present\
    \ it as part of the business logic layer because the pattern’s motivation is to\
    \ achieve the business aims of the system.\n\n### The Problem\n\nEvery request\
    \ must be handled in some way. As you have seen, many systems provide a layer\
    \ that assesses and filters incoming data. Ideally, though, this layer should\
    \ then call on classes that are designed to fulfill the request. These classes\
    \ could be broken down to represent forces and responsibilities in a system, perhaps\
    \ with a facade interface. This approach requires a certain amount of careful\
    \ design, however. For some projects (typically small in scope and urgent in nature),\
    \ such development overhead can be unacceptable. In this case, you may need to\
    \ build your business logic into a set of procedural operations. Each operation\
    \ will be crafted to handle a particular request.\n\nThe problem, then, is the\
    \ need to provide a fast and effective mechanism for fulfilling a system’s objectives\
    \ without a potentially costly investment in complex design.\n\nThe great benefit\
    \ of this pattern is the speed with which you can get results. Each script takes\
    \ input and manipulates the database to ensure an outcome. Beyond organizing related\
    \ methods within the same class and keeping the `Transaction Script` classes in\
    \ their own tier (that is, as independent as possible of the command, control,\
    \ and view layers), there is little up-front design required.\n\nWhile business\
    \ logic layer classes tend to be clearly separated from the presentation layer,\
    \ they are often more embedded in the data layer. This is because retrieving and\
    \ storing data is key to the tasks that such classes often perform. You will see\
    \ mechanisms for decoupling logic objects from the database later in the chapter.\
    \ `Transaction Script` classes, though, usually know all about the database (although\
    \ they can use gateway classes to handle the details of their actual queries)."
  raw: '#### Implementation


    Once you have created a wider framework, the view layer is not a massive programming
    challenge. Of course, it remains a huge design and information-architecture issue,
    but that’s another book!


    Template View was so named by Fowler. It is a staple pattern used by most enterprise
    programmers. In some languages, an implementation might involve cooking up a templating
    system that translates tags to values set by the system. You have that option
    in PHP, too. You could use a templating engine like the excellent Twig. My preferred
    option, though, is to use PHP’s existing functionality, but to use it with care.


    In order for a view to have something to work with, it must be able to acquire
    data. I like to define a View Helper that views can use.


    Here is a simple View Helper class :


    ```

    // listing 12.37

    class ViewHelper

    {

    public function sponsorList()

    {

    // do something complicated to get the sponsor list

    return "Bob''s Shoe Emporium";

    }

    }

    ```


    All this class does at present is provide a sponsor list string. Let’s assume
    that there is some relatively complex process to acquire or format this data that
    we should not embed in the template itself. You can extend it to provide additional
    functionality as your application evolves. If you find yourself doing something
    in a view that takes up more than a couple of lines, chances are it belongs in
    the View Helper. In a larger application, you may provide multiple View Helper
    objects in an inheritance hierarchy in order to provide different tools for different
    parts of your system.


    I might acquire a View Helper from a factory of some kind—perhaps the registry.
    From the point of view of the template, the simplest approach is to make a helper
    instance available in the `render()` method :


    ```

    // listing 12.38

    public function render(string $resource, Request $request)

    {

    $vh = new ViewHelper();

    // now the template will have the $vh variable

    include($resource);

    }

    ```


    Here is a simple view that uses the View Helper:


    ```


    Venues


    Venues


    Proudly sponsored by: sponsorList(); ?>


    Listing venues


    ```


    The view (`list_venues.php`) is granted a ViewHelper instance in the $vh variable.
    It calls the `sponsorList()` method and prints the results.


    Clearly, this example doesn’t banish code from the view, but it does severely
    limit the amount and kind of coding that needs to be done. The page contains a
    simple print statement and will inevitably require other method calls as it grows
    in complexity, but a designer should be able to work around code of this kind
    with little or no effort.


    Slightly more problematic are `if` statements and loops. These are difficult to
    delegate to a View Helper because they are usually bound up with formatted output.
    I tend to keep both simple conditionals and loops (which are very common in building
    tables that display rows of data) inside the Template View; but to keep them as
    simple as possible, I delegate things like test clauses, where possible.


    #### Consequences


    There is something slightly disturbing about the way that data is passed to the
    view layer, in that a view doesn’t really have a fixed interface that guarantees
    its environment. I tend to think of every view as entering into a contract with
    the system at large. The view effectively says to the application, “If I am invoked,
    then I have a right to access object `This`, object `That`, and object `TheOther`.”
    It is up to the application to ensure that this is the case.


    You could make views stricter by providing accessor methods in the helper classes,
    but I have always found it easier to register objects dynamically for the view
    layer through a `Request`, `Response`, or `Context` object.


    While templates are often essentially passive, populated with data resulting from
    the last request, there may be times when the view needs to make an ancillary
    request. The View Helper is a good place to provide this functionality, keeping
    any knowledge of the mechanism by which data is required hidden from the view
    itself. Even the View Helper should do as little work as possible, delegating
    to a command or contacting the domain layer via a facade.


    Note


    You saw the Facade pattern in Chapter [10](#A314621_5_En_10_Chapter.html). Alur
    et al. look at one use of Facades in enterprise programming in the Session Facade
    pattern (which is designed to limit fine-grained network transactions). Fowler
    also describes a pattern called Service Layer, which provides a simple point of
    access to the complexities within a layer.


    ## The Business Logic Layer


    If the control layer orchestrates communication with the outside world and marshals
    a system’s response to it, the logic layer gets on with the business of an application.
    This layer should be as free as possible of the noise and trauma generated as
    query strings are analyzed, HTML tables are constructed, and feedback messages
    composed. Business logic is about doing the stuff that needs doing—the true purpose
    of the application. Everything else exists just to support these tasks.


    In a classic object-oriented application, the business logic layer is often composed
    of classes that model the problems that the system aims to address. As you shall
    see, this is a flexible design decision. It also requires significant up-front
    planning.


    Let’s begin, then, with the quickest way of getting a system up and running.


    ### Transaction Script


    The Transaction Script pattern (Patterns of Enterprise Application Architecture)
    describes the way that many systems evolve of their own accord. It is simple,
    intuitive, and effective, although it becomes less so as systems grow. A transaction
    script handles a request inline, rather than delegating to specialized objects.
    It is the quintessential quick fix. It is also a hard pattern to categorize because
    it combines elements from other layers in this chapter. I have chosen to present
    it as part of the business logic layer because the pattern’s motivation is to
    achieve the business aims of the system.


    #### The Problem


    Every request must be handled in some way. As you have seen, many systems provide
    a layer that assesses and filters incoming data. Ideally, though, this layer should
    then call on classes that are designed to fulfill the request. These classes could
    be broken down to represent forces and responsibilities in a system, perhaps with
    a facade interface. This approach requires a certain amount of careful design,
    however. For some projects (typically small in scope and urgent in nature), such
    development overhead can be unacceptable. In this case, you may need to build
    your business logic into a set of procedural operations. Each operation will be
    crafted to handle a particular request.


    The problem, then, is the need to provide a fast and effective mechanism for fulfilling
    a system’s objectives without a potentially costly investment in complex design.


    The great benefit of this pattern is the speed with which you can get results.
    Each script takes input and manipulates the database to ensure an outcome. Beyond
    organizing related methods within the same class and keeping the Transaction Script
    classes in their own tier (that is, as independent as possible of the command,
    control, and view layers), there is little up-front design required.


    While business logic layer classes tend to be clearly separated from the presentation
    layer, they are often more embedded in the data layer. This is because retrieving
    and storing data is key to the tasks that such classes often perform. You will
    see mechanisms for decoupling logic objects from the database later in the chapter.
    Transaction Script classes, though, usually know all about the database (although
    they can use gateway classes to handle the details of their actual queries).'
  trans: "\n# 实现\n\n一旦你构建了更广泛的框架，视图层就不再是一个巨大的编程挑战。当然，它仍然是一个重大的设计和信息架构问题，但这已是另一本书的内容！\n\
    \n“模板视图”（`Template View`）这个命名源于福勒。它是大多数企业程序员使用的主要模式。在某些语言中，实现可能涉及构建一个标签翻译系统，将标签转换为系统设置的值。在\
    \ PHP 中你也有这个选择，可以使用像优秀的 Twig 这样的模板引擎。不过，我更喜欢谨慎地使用 PHP 已有的功能。\n\n为了让视图有东西可用，它必须能够获取数据。我倾向于定义一个视图可以使用的“视图助手”（`View\
    \ Helper`）。\n\n下面是一个简单的 `ViewHelper` 类：\n\n```php\n// listing 12.37\nclass ViewHelper\n\
    {\n    public function sponsorList()\n    {\n        // 执行一些复杂的操作来获取赞助商列表\n  \
    \      return \"鲍勃的鞋业帝国\";\n    }\n}\n```\n\n目前这个类只提供了一个赞助商列表字符串。我们假设获取或格式化这些数据涉及相对复杂的过程，而这些过程不应嵌入到模板本身。随着应用程序的发展，你可以扩展它来提供额外的功能。如果你发现在视图中需要编写超过几行的代码，那么这些代码很可能应该放在\
    \ `View Helper` 中。在大型应用中，你可以在继承层次结构中提供多个 `ViewHelper` 对象，以便为系统的不同部分提供不同的工具。\n\n\
    我可能会从某种工厂（比如注册表）中获取一个 `ViewHelper`。从模板的角度看，最简单的方法是在 `render()` 方法中使辅助实例可用：\n\n\
    ```php\n// listing 12.38\npublic function render(string $resource, Request $request)\n\
    {\n    $vh = new ViewHelper();\n    // 现在模板将拥有 $vh 变量\n    include($resource);\n\
    }\n```\n\n下面是一个使用此 `View Helper` 的简单视图：\n\n```php\n<?php\n// 场馆\n?>\n场馆\n\n由以下机构自豪赞助：<?php\
    \ echo $vh->sponsorList(); ?>\n\n列出场馆\n```\n\n视图（`list_venues.php`）通过 `$vh` 变量获得了一个\
    \ `ViewHelper` 实例。它调用了 `sponsorList()` 方法并打印结果。\n\n显然，这个示例并没有从视图中完全消除代码，但它确实严格限制了所需编码的数量和类型。该页面包含一个简单的打印语句，并且随着复杂性的增加，不可避免会需要其他方法调用，但设计师应该能够轻松地处理此类代码。\n\
    \n稍微棘手一点的是 `if` 语句和循环。这些很难委托给 `View Helper`，因为它们通常与格式化输出紧密相关。我倾向于将简单的条件语句和循环（在构建显示数据行的表格时非常常见）保留在\
    \ `模板视图` 中；但为了尽可能保持它们的简洁，我会在可能的情况下将测试子句等内容委托出去。\n\n## 结果\n\n数据传递给视图层的方式有些令人不安，因为视图并没有一个固定的接口来保证其环境。我倾向于将每个视图视为与整个系统签订了一份契约。视图实际上是在对应用程序说：“如果我被调用，那么我有权访问对象\
    \ `This`、对象 `That` 和对象 `TheOther`。” 应用程序有责任确保这一点成立。\n\n你可以通过在辅助类中提供访问器方法使视图更加严格，但我一直发现通过\
    \ `Request`、`Response` 或 `Context` 对象为视图层动态注册对象更加容易。\n\n虽然模板通常本质上是被动的，由上次请求产生的数据填充，但有时视图可能需要发起辅助请求。`View\
    \ Helper` 是提供此功能的好地方，它将获取数据所需的任何机制知识对视图本身隐藏起来。即使是 `View Helper` 也应尽可能少做工作，将任务委托给命令，或通过外观（Facade）与领域层联系。\n\
    \n> **注意**  \n> 你在第 10 章中看到了 `Facade` 模式。Alur 等人在 `Session Facade` 模式中探讨了 Facade\
    \ 在企业编程中的一种用途（该模式旨在限制细粒度的网络事务）。福勒还描述了一种称为 `Service Layer` 的模式，它为访问层内的复杂性提供了一个简单的入口点。\n\
    \n# 业务逻辑层\n\n如果说控制层编排与外部世界的通信并组织系统对其作出响应，那么逻辑层则负责处理应用程序的业务。这一层应尽可能远离因分析查询字符串、构建\
    \ HTML 表格和编写反馈消息而产生的噪音和干扰。业务逻辑是关于完成需要完成的事情——即应用程序的真正目的。其他一切都是为了支持这些任务而存在的。\n\n\
    在经典的面向对象应用程序中，业务逻辑层通常由模拟系统旨在解决的问题的类组成。正如你将看到的，这是一个灵活的设计决策，但也需要大量的前期规划。\n\n那么，让我们从让系统快速启动并运行的最快方法开始。\n\
    \n## 事务脚本\n\n`事务脚本`模式（《企业应用架构模式》）描述了许多系统自行演化的方式。它简单、直观且有效，尽管随着系统规模的增大，其效果会减弱。事务脚本内联处理请求，而不是委托给专门的对象。它是典型的快速解决方案。这也是一种难以分类的模式，因为它结合了本章中来自其他层的元素。我选择将其作为业务逻辑层的一部分来介绍，因为该模式的动机是实现系统的业务目标。\n\
    \n### 问题\n\n每个请求都必须以某种方式处理。正如你所看到的，许多系统提供一个评估和过滤传入数据的层。但理想情况下，这一层随后应调用旨在完成请求的类。这些类可以被分解以表示系统中的力量和职责，也许可以使用外观接口。然而，这种方法需要一定数量的精心设计。对于某些项目（通常是范围小、性质紧急的项目），这种开发开销可能是不可接受的。在这种情况下，你可能需要将业务逻辑构建到一组过程化操作中。每个操作都将被精心设计以处理特定的请求。\n\
    \n因此，问题在于需要提供一种快速有效的机制来实现系统的目标，而无需在复杂设计上进行可能代价高昂的投资。\n\n这种模式的最大好处是你能快速获得结果。每个脚本接收输入并操作数据库以确保一个结果。除了将相关方法组织在同一个类中，并保持\
    \ `事务脚本` 类位于它们自己的层（即尽可能独立于命令、控制和视图层）之外，几乎不需要前期设计。\n\n虽然业务逻辑层类往往与表示层清晰分离，但它们通常更深入地嵌入在数据层中。这是因为检索和存储数据是此类类经常执行的任务的关键。你将在本章后面看到将逻辑对象与数据库解耦的机制。不过，`事务脚本`\
    \ 类通常对数据库了如指掌（尽管它们可以使用网关类来处理实际查询的细节）。\n"
- fmt: "#### Implementation\n\nLet’s return to my events listing example. In this\
    \ case, the system supports three relational database tables: `venue`, `space`,\
    \ and `event`. A `venue` may have a number of `spaces` (e.g., a theater can have\
    \ more than one stage, and a dance club may have different rooms). Each `space`\
    \ plays host to many events. Here is the schema:\n\n```sql\nCREATE TABLE 'venue'\
    \ (\n'id' int(11) NOT NULL auto_increment,\n'name' text,\nPRIMARY KEY  ('id')\n\
    )\nCREATE TABLE 'space' (\n'id' int(11) NOT NULL auto_increment,\n'venue' int(11)\
    \ default NULL,\n'name' text,\nPRIMARY KEY  ('id')\n)\nCREATE TABLE 'event' (\n\
    'id' int(11) NOT NULL auto_increment,\n'space' int(11) default NULL,\n'start'\
    \ mediumtext,\n'duration' int(11) default NULL,\n'name' text,\nPRIMARY KEY  ('id')\n\
    )\n```\n\nClearly, the system will need mechanisms for adding both venues and\
    \ events. Each of these represents a single transaction. I could give each method\
    \ its own class (and organize my classes according to the Command pattern that\
    \ you encountered in Chapter [11](#A314621_5_En_11_Chapter.html)). In this case,\
    \ though, I am going to place the methods in a single class, albeit as part of\
    \ an inheritance hierarchy. You can see the structure in Figure [12-10](#A314621_5_En_12_Chapter.html#Fig10).\n\
    \n![A314621_5_En_12_Fig10_HTML.gif](A314621_5_En_12_Fig10_HTML.gif)\n\n**Figure\
    \ 12-10.** A Transaction Script class with its superclass\n\nSo why does this\
    \ example include an abstract superclass? In a script of any size, I would be\
    \ likely to add more concrete classes to this hierarchy. Since most of these will\
    \ share at least some core functionality, it makes sense to lodge this in a common\
    \ parent.\n\nIn fact, this is a pattern in its own right (Fowler has named it\
    \ Layer Supertype). Where classes in a layer share characteristics, it makes sense\
    \ to group them into a single type, locating utility operations in the base class.\
    \ You will see this a lot in the rest of this chapter.\n\nIn this case, the base\
    \ class acquires a `PDO` object, which it stores in a property. It also provides\
    \ methods for caching database statements and making queries:\n\n```php\n// listing\
    \ 12.40\nabstract class Base\n{\n    private $pdo;\n    private $config = __DIR__\
    \ . \"/data/woo_options.ini\";\n    private $stmts = [];\n    public function\
    \ __construct()\n    {\n        $reg = Registry::instance();\n        $options\
    \ = parse_ini_file($this->config, true);\n        $conf = new Conf($options['config']);\n\
    \        $reg->setConf($conf);\n        $dsn = $reg->getDSN();\n        if (is_null($dsn))\
    \ {\n            throw new AppException(\"No DSN\");\n        }\n        $this->pdo\
    \ = new \\PDO($dsn);\n        $this->pdo->setAttribute(\\PDO::ATTR_ERRMODE, \\\
    PDO::ERRMODE_EXCEPTION);\n    }\n    public function getPdo(): \\PDO\n    {\n\
    \        return $this->pdo;\n    }\n}\n```\n\nI use the `Registry` class to acquire\
    \ a `DSN` string, which I pass to the `PDO` constructor. I make the `PDO` object\
    \ available via a getter method: `getPdo()`. In fact, a lot of this work can be\
    \ pushed back into the `Registry` object itself—a strategy you’ll see that I have\
    \ adopted elsewhere in this chapter and the next.\n\nHere is the start of the\
    \ `VenueManager` class, which sets up my SQL statements:\n\n```php\n// listing\
    \ 12.41\nclass VenueManager extends Base\n{\n    private $addvenue = \"INSERT\
    \ INTO venue\n    ( name )\n    VALUES( ? )\";\n    private $addspace  = \"INSERT\
    \ INTO space\n    ( name, venue )\n    VALUES( ?, ? )\";\n    private $addevent\
    \ =  \"INSERT INTO event\n    ( name, space, start, duration )\n    VALUES( ?,\
    \ ?, ?, ? )\";\n    // ...\n```\n\nNot much new here. These are the SQL statements\
    \ that the transaction scripts will use. They are constructed in a format accepted\
    \ by the `PDO` class’s `prepare()` method. The question marks are placeholders\
    \ for the values that will be passed to `execute()`. Now it’s time to define the\
    \ first method designed to fulfill a specific business need:\n\n```php\n// listing\
    \ 12.42\n// VenueManager\npublic function addVenue(string $name, array $spaces):\
    \ array\n{\n    $pdo = $this->getPdo();\n    $ret = [];\n    $ret['venue'] = [$name];\n\
    \    $stmt = $pdo->prepare($this->addvenue);\n    $stmt->execute($ret['venue']);\n\
    \    $vid = $pdo->lastInsertId();\n    $ret['spaces'] = [];\n    $stmt = $pdo->prepare($this->addspace);\n\
    \    foreach ($spaces as $spacename) {\n        $values = [$spacename, $vid];\n\
    \        $stmt->execute($values);\n        $sid = $pdo->lastInsertId();\n    \
    \    array_unshift($values, $sid);\n        $ret['spaces'][] = $values;\n    }\n\
    \    return $ret;\n}\n```\n\nAs you can see, `addVenue()` requires a venue name\
    \ and an array of space names. It uses these to populate the `venue` and `space`\
    \ tables. It also creates a data structure that contains this information, along\
    \ with the newly generated ID values for each row.\n\nIf there’s an error with\
    \ this, remember, an exception is thrown. I don’t catch any exceptions here, so\
    \ anything thrown by `prepare()` will also be thrown by this method. This is the\
    \ result I want, although I should make it clear that this method throws exceptions\
    \ in my documentation.\n\nHaving created the `venue` row, I loop through `$spaces`,\
    \ adding a row in the `space` table for each element. Notice that I include the\
    \ venue ID as a foreign key in each of the `space` rows I create, associating\
    \ the row with the venue.\n\nThe second transaction script is similarly straightforward:\n\
    \n```php\n// listing 12.43\n// VenueManager\npublic function bookEvent(int $spaceid,\
    \ string $name, int $time, int $duration)\n{\n    $pdo = $this->getPdo();\n  \
    \  $stmt = $pdo->prepare($this->addevent);\n    $stmt->execute([$name, $spaceid,\
    \ $time, $duration]);\n}\n```\n\nThe purpose of this script is to add an event\
    \ to the `events` table, associated with a space.\n\n#### Consequences\n\nThe\
    \ Transaction Script pattern is an effective way of getting good results fast.\
    \ It is also one of those patterns many programmers have used for years without\
    \ imagining it might need a name. With a few good helper methods like those I\
    \ added to the base class, you can concentrate on application logic without getting\
    \ too bogged down in database fiddle-faddling.\n\nI have seen Transaction Script\
    \ appear in a less welcome context. I thought I was writing a much more complex\
    \ and object-heavy application than would usually suit this pattern. As the pressure\
    \ of deadlines began to tell, I found that I was placing more and more logic in\
    \ what was intended to be a thin facade onto a Domain Model (see the next section).\
    \ Although the result was less elegant than I had wanted, I have to admit that\
    \ the application did not appear to suffer for its implicit redesign.\n\nIn most\
    \ cases, you would choose a Transaction Script approach with a small project when\
    \ you are certain it isn’t going to grow into a large one. The approach does not\
    \ scale well because duplication often begins to creep in as the scripts inevitably\
    \ cross one another. You can go some way to factoring this out, of course, but\
    \ you probably will not be able to excise it completely.\n\nIn my example, I decide\
    \ to embed database code in the transaction script classes themselves. As you\
    \ saw, though, the code wants to separate the database work from the application\
    \ logic. I can make that break absolute by pulling it out of the class altogether\
    \ and creating a gateway class whose role it is to handle database interactions\
    \ on the system’s behalf.\n\n### Domain Model\n\nThe Domain Model is the pristine\
    \ logical engine that many of the other patterns in this chapter strive to create,\
    \ nurture, and protect. It is an abstracted representation of the forces at work\
    \ in your project. It’s a kind of plane of forms, where your business problems\
    \ play out their nature unencumbered by nasty material issues like databases and\
    \ web pages.\n\nIf that seems a little flowery, let’s bring it down to reality.\
    \ A Domain Model is a representation of the real-world participants of your system.\
    \ It is in the Domain Model that the object-as-thing rule of thumb is truer than\
    \ elsewhere. Everywhere else, objects tend to embody responsibilities. In the\
    \ Domain Model, they often describe a set of attributes, with added agency. They\
    \ are things that do stuff."
  raw: '#### Implementation


    Let’s return to my events listing example. In this case, the system supports three
    relational database tables : `venue`, `space`, and `event`. A `venue` may have
    a number of `spaces` (e.g., a theater can have more than one stage, and a dance
    club may have different rooms). Each `space` plays host to many events. Here is
    the schema:


    ```

    CREATE TABLE ''venue'' (

    ''id'' int(11) NOT NULL auto_increment,

    ''name'' text,

    PRIMARY KEY  (''id'')

    )

    CREATE TABLE ''space'' (

    ''id'' int(11) NOT NULL auto_increment,

    ''venue'' int(11) default NULL,

    ''name'' text,

    PRIMARY KEY  (''id'')

    )

    CREATE TABLE ''event'' (

    ''id'' int(11) NOT NULL auto_increment,

    ''space'' int(11) default NULL,

    ''start'' mediumtext,

    ''duration'' int(11) default NULL,

    ''name'' text,

    PRIMARY KEY  (''id'')

    )

    ```


    Clearly, the system will need mechanisms for adding both venues and events. Each
    of these represents a single transaction. I could give each method its own class
    (and organize my classes according to the Command pattern that you encountered
    in Chapter [11](#A314621_5_En_11_Chapter.html)). In this case, though, I am going
    to place the methods in a single class, albeit as part of an inheritance hierarchy.
    You can see the structure in Figure [12-10](#A314621_5_En_12_Chapter.html#Fig10).


    ![A314621_5_En_12_Fig10_HTML.gif](A314621_5_En_12_Fig10_HTML.gif)


    Figure 12-10.


    A Transaction Script class with its superclass


    So why does this example include an abstract superclass? In a script of any size,
    I would be likely to add more concrete classes to this hierarchy. Since most of
    these will share at least some core functionality, it makes sense to lodge this
    in a common parent.


    In fact, this is a pattern in its own right (Fowler has named it Layer Supertype).
    Where classes in a layer share characteristics, it makes sense to group them into
    a single type, locating utility operations in the base class. You will see this
    a lot in the rest of this chapter.


    In this case, the base class acquires a `PDO` object, which it stores in a property.
    It also provides methods for caching database statements and making queries:


    ```

    // listing 12.40

    abstract class Base

    {

    private $pdo;

    private $config = __DIR__ . "/data/woo_options.ini";

    private $stmts = [];

    public function __construct()

    {

    $reg = Registry::instance();

    $options = parse_ini_file($this->config, true);

    $conf = new Conf($options[''config'']);

    $reg->setConf($conf);

    $dsn = $reg->getDSN();

    if (is_null($dsn)) {

    throw new AppException("No DSN");

    }

    $this->pdo = new \PDO($dsn);

    $this->pdo->setAttribute(\PDO::ATTR_ERRMODE, \PDO::ERRMODE_EXCEPTION);

    }

    public function getPdo(): \PDO

    {

    return $this->pdo;

    }

    }

    ```


    I use the `Registry` class to acquire a DSN string, which I pass to the PDO constructor.
    I make the PDO object available via a getter method: getPdo(). In fact, a lot
    of this work can be pushed back into the Registry object itself—a strategy you’ll
    see that I have adopted elsewhere in this chapter and the next.


    Here is the start of the `VenueManager` class , which sets up my SQL statements:


    ```

    // listing 12.41

    class VenueManager extends Base

    {

    private $addvenue = "INSERT INTO venue

    ( name )

    VALUES( ? )";

    private $addspace  = "INSERT INTO space

    ( name, venue )

    VALUES( ?, ? )";

    private $addevent =  "INSERT INTO event

    ( name, space, start, duration )

    VALUES( ?, ?, ?, ? )";

    // ...

    ```


    Not much new here. These are the SQL statements that the transaction scripts will
    use. They are constructed in a format accepted by the PDO class’s `prepare()`
    method . The question marks are placeholders for the values that will be passed
    to `execute()`. Now it’s time to define the first method designed to fulfill a
    specific business need:


    ```

    // listing 12.42

    // VenueManager

    public function addVenue(string $name, array $spaces): array

    {

    $pdo = $this->getPdo();

    $ret = [];

    $ret[''venue''] = [$name];

    $stmt = $pdo->prepare($this->addvenue);

    $stmt->execute($ret[''venue'']);

    $vid = $pdo->lastInsertId();

    $ret[''spaces''] = [];

    $stmt = $pdo->prepare($this->addspace);

    foreach ($spaces as $spacename) {

    $values = [$spacename, $vid];

    $stmt->execute($values);

    $sid = $pdo->lastInsertId();

    array_unshift($values, $sid);

    $ret[''spaces''][] = $values;

    }

    return $ret;

    }

    ```


    As you can see, `addVenue()` requires a venue name and an array of space names.
    It uses these to populate the `venue` and `space` tables. It also creates a data
    structure that contains this information, along with the newly generated ID values
    for each row.


    If there’s an error with this, remember, an exception is thrown. I don’t catch
    any exceptions here, so anything thrown by `prepare()` will also be thrown by
    this method. This is the result I want, although I should to make it clear that
    this method throws exceptions in my documentation.


    Having created the `venue` row, I loop through `$spaces`, adding a row in the
    `space` table for each element. Notice that I include the venue ID as a foreign
    key in each of the `space` rows I create, associating the row with the venue.


    The second transaction script is similarly straightforward:


    ```

    // listing 12.43

    // VenueManager

    public function bookEvent(int $spaceid, string $name, int $time, int $duration)

    {

    $pdo = $this->getPdo();

    $stmt = $pdo->prepare($this->addevent);

    $stmt->execute([$name, $spaceid, $time, $duration]);

    }

    ```


    The purpose of this script is to add an event to the `events` table, associated
    with a space.


    #### Consequences


    The Transaction Script pattern is an effective way of getting good results fast.
    It is also one of those patterns many programmers have used for years without
    imagining it might need a name. With a few good helper methods like those I added
    to the base class, you can concentrate on application logic without getting too
    bogged down in database fiddle-faddling.


    I have seen Transaction Script appear in a less welcome context. I thought I was
    writing a much more complex and object-heavy application than would usually suit
    this pattern. As the pressure of deadlines began to tell, I found that I was placing
    more and more logic in what was intended to be a thin facade onto a Domain Model
    (see the next section). Although the result was less elegant than I had wanted,
    I have to admit that the application did not appear to suffer for its implicit
    redesign.


    In most cases, you would choose a Transaction Script approach with a small project
    when you are certain it isn’t going to grow into a large one. The approach does
    not scale well because duplication often begins to creep in as the scripts inevitably
    cross one another. You can go some way to factoring this out, of course, but you
    probably will not be able to excise it completely.


    In my example, I decide to embed database code in the transaction script classes
    themselves. As you saw, though, the code wants to separate the database work from
    the application logic. I can make that break absolute by pulling it out of the
    class altogether and creating a gateway class whose role it is to handle database
    interactions on the system’s behalf.


    ### Domain Model


    The Domain Model is the pristine logical engine that many of the other patterns
    in this chapter strive to create, nurture, and protect. It is an abstracted representation
    of the forces at work in your project. It’s a kind of plane of forms, where your
    business problems play out their nature unencumbered by nasty material issues
    like databases and web pages.


    If that seems a little flowery, let’s bring it down to reality. A Domain Model
    is a representation of the real-world participants of your system. It is in the
    Domain Model that the object-as-thing rule of thumb is truer than elsewhere. Everywhere
    else, objects tend to embody responsibilities. In the Domain Model, they often
    describe a set of attributes, with added agency. They are things that do stuff.'
  trans: "#### 实现\n\n让我们回到我的事件列表示例。在本例中，系统支持三个关系数据库表：`venue`（场地）、`space`（空间）和`event`（事件）。一个`venue`（场地）可以有多个`spaces`（空间）（例如，一个剧院可以有多个舞台，一个舞蹈俱乐部可以有多个房间）。每个`space`（空间）都会举办许多事件。下面是模式定义：\n\
    \n```sql\nCREATE TABLE 'venue' (\n'id' int(11) NOT NULL auto_increment,\n'name'\
    \ text,\nPRIMARY KEY  ('id')\n)\nCREATE TABLE 'space' (\n'id' int(11) NOT NULL\
    \ auto_increment,\n'venue' int(11) default NULL,\n'name' text,\nPRIMARY KEY  ('id')\n\
    )\nCREATE TABLE 'event' (\n'id' int(11) NOT NULL auto_increment,\n'space' int(11)\
    \ default NULL,\n'start' mediumtext,\n'duration' int(11) default NULL,\n'name'\
    \ text,\nPRIMARY KEY  ('id')\n)\n```\n\n显然，系统需要提供添加场地和事件的机制。每一项操作都代表一个独立的事务。我可以为每个方法创建独立的类（并按照你在第\
    \ 11 章遇到的**命令模式**来组织我的类）。不过，在本例中，我打算将这些方法放在同一个类中，尽管它属于继承层次结构的一部分。你可以在图 12-10 中看到其结构。\n\
    \n![A314621_5_En_12_Fig10_HTML.gif](img/A314621_5_En_12_Fig10_HTML.gif)\n\n**图\
    \ 12-10.** 一个事务脚本类及其父类\n\n那么，为什么这个示例要包含一个抽象父类呢？在一个任意大小的脚本中，我可能会向这个层次结构中添加更多具体类。由于其中大多数类至少会共享一些核心功能，因此将这些功能放在一个共同的父类中是合理的。\n\
    \n实际上，这本身就是一个模式（Fowler 将其命名为**层超类型**）。当同一层中的类具有共同特征时，将它们归为一个类型，并将实用操作放在基类中，是很有意义的。在本章的其余部分，你会经常看到这种做法。\n\
    \n在本例中，基类获取一个`PDO`对象，并将其存储在一个属性中。它还提供了用于缓存数据库语句和执行查询的方法：\n\n```php\n// listing\
    \ 12.40\nabstract class Base\n{\n    private $pdo;\n    private $config = __DIR__\
    \ . \"/data/woo_options.ini\";\n    private $stmts = [];\n    public function\
    \ __construct()\n    {\n        $reg = Registry::instance();\n        $options\
    \ = parse_ini_file($this->config, true);\n        $conf = new Conf($options['config']);\n\
    \        $reg->setConf($conf);\n        $dsn = $reg->getDSN();\n        if (is_null($dsn))\
    \ {\n            throw new AppException(\"No DSN\");\n        }\n        $this->pdo\
    \ = new \\PDO($dsn);\n        $this->pdo->setAttribute(\\PDO::ATTR_ERRMODE, \\\
    PDO::ERRMODE_EXCEPTION);\n    }\n    public function getPdo(): \\PDO\n    {\n\
    \        return $this->pdo;\n    }\n}\n```\n\n我使用`Registry`类获取`DSN`字符串，并将其传递给`PDO`构造函数。我通过一个\
    \ getter 方法`getPdo()`提供`PDO`对象。实际上，很多此类工作都可以推回到`Registry`对象本身——你会在本章和下一章的其他地方看到我采用这种策略。\n\
    \n下面是`VenueManager`类的开头部分，它设置了我的 SQL 语句：\n\n```php\n// listing 12.41\nclass VenueManager\
    \ extends Base\n{\n    private $addvenue = \"INSERT INTO venue\n    ( name )\n\
    \    VALUES( ? )\";\n    private $addspace  = \"INSERT INTO space\n    ( name,\
    \ venue )\n    VALUES( ?, ? )\";\n    private $addevent =  \"INSERT INTO event\n\
    \    ( name, space, start, duration )\n    VALUES( ?, ?, ?, ? )\";\n    // ...\n\
    ```\n\n这里没有什么新内容。这些是事务脚本将使用的 SQL 语句。它们按照`PDO`类的`prepare()`方法接受的格式构建。问号是占位符，用于替换将传递给`execute()`的值。现在是时候定义第一个旨在满足特定业务需求的方法了：\n\
    \n```php\n// listing 12.42\n// VenueManager\npublic function addVenue(string $name,\
    \ array $spaces): array\n{\n    $pdo = $this->getPdo();\n    $ret = [];\n    $ret['venue']\
    \ = [$name];\n    $stmt = $pdo->prepare($this->addvenue);\n    $stmt->execute($ret['venue']);\n\
    \    $vid = $pdo->lastInsertId();\n    $ret['spaces'] = [];\n    $stmt = $pdo->prepare($this->addspace);\n\
    \    foreach ($spaces as $spacename) {\n        $values = [$spacename, $vid];\n\
    \        $stmt->execute($values);\n        $sid = $pdo->lastInsertId();\n    \
    \    array_unshift($values, $sid);\n        $ret['spaces'][] = $values;\n    }\n\
    \    return $ret;\n}\n```\n\n如你所见，`addVenue()`需要一个场地名称和一个空间名称数组。它使用这些数据填充`venue`和`space`表。它还创建了一个包含此信息以及每行新生成的\
    \ ID 值的数据结构。\n\n如果此处出现错误，请记住，会抛出一个异常。我没有在这里捕获任何异常，因此`prepare()`抛出的任何异常也会由此方法抛出。这正是我想要的结果，尽管我应该明确说明，此方法会在我文档中抛出异常。\n\
    \n创建`venue`行后，我遍历`$spaces`，为每个元素在`space`表中添加一行。请注意，我在创建的每个`space`行中都包含了场地 ID 作为外键，将该行与场地关联起来。\n\
    \n第二个事务脚本同样简单明了：\n\n```php\n// listing 12.43\n// VenueManager\npublic function\
    \ bookEvent(int $spaceid, string $name, int $time, int $duration)\n{\n    $pdo\
    \ = $this->getPdo();\n    $stmt = $pdo->prepare($this->addevent);\n    $stmt->execute([$name,\
    \ $spaceid, $time, $duration]);\n}\n```\n\n此脚本的目的是向`events`表中添加一个事件，并与一个空间关联。\n\
    \n#### 结论\n\n**事务脚本模式**是一种快速获得良好效果的有效方法。这也是许多程序员多年来一直在使用、却未曾想到需要给它命名的模式之一。通过一些好的辅助方法（比如我添加到基类中的那些），你可以专注于应用程序逻辑，而不会过多陷入数据库操作的繁琐细节中。\n\
    \n我还曾在不太受欢迎的场景中看到过事务脚本模式。我原本以为我正在编写一个比通常适合此模式要复杂得多、对象密集得多的应用程序。随着最后期限的压力开始显现，我发现自己将越来越多的逻辑放入原本打算作为**领域模型**（见下一节）的薄外观层中。虽然结果不如我期望的那么优雅，但我不得不承认，应用程序并没有因为其隐式的重新设计而受到影响。\n\
    \n在大多数情况下，对于小项目，当你确信它不会发展成一个大型项目时，你会选择事务脚本方法。这种方法扩展性不佳，因为随着脚本不可避免地相互交叉，重复常常会开始出现。当然，你可以在一定程度上将其分解出来，但可能无法完全消除。\n\
    \n在我的示例中，我决定将数据库代码嵌入到事务脚本类本身。但正如你所见，代码希望将数据库工作与应用程序逻辑分离。我可以完全将其从类中提取出来，创建一个网关类，其作用是代表系统处理数据库交互。\n\
    \n### 领域模型\n\n**领域模型**是纯粹的逻辑引擎，本章中的许多其他模式都致力于创建、培育和保护它。它是你项目中各种力量的抽象表示。它就像一种形式平面，你的业务问题在其中自由展现其本质，不受数据库和网页等讨厌的物质问题的干扰。\n\
    \n如果这听起来有点花哨，那让我们回到现实。领域模型是系统中真实世界参与者的表示。正是在领域模型中，“对象即事物”的经验法则比其他地方更为真实。在其他地方，对象往往承担职责。而在领域模型中，它们通常描述一组属性，并带有代理功能。它们是那些“做事情的东西”。"
- fmt: '### The Problem


    If you have been using Transaction Script, you may find that duplication becomes
    a problem as different scripts need to perform the same tasks. That can be factored
    out to a certain extent, but over time, it’s easy to fall into cut-and-paste coding.


    You can use a Domain Model to extract and embody the participants and process
    of your system. Rather than using a script to add space data to the database,
    and then associate event data with it, you can create `Space` and `Event` classes.
    Booking an event in a space can then become as simple as a call to `Space::bookEvent()`.
    A task like checking for a time clash becomes `Event::intersects()`, and so on.


    Clearly, with an example as simple as Woo, a Transaction Script is more than adequate.
    But as domain logic gets more complex, the alternative of a Domain Model becomes
    increasingly attractive. Complex logic can be handled more easily, and you need
    less conditional code when you model the application domain.


    ### Implementation


    Domain Models can be relatively simple to design. Most of the complexity associated
    with the subject lies in the patterns that are designed to keep the model pure—that
    is, to separate it from the other tiers in the application.


    Separating the participants of a Domain Model from the presentation layer is largely
    a matter of ensuring that they keep to themselves. Separating the participants
    from the data layer is much more problematic. Although the ideal is to consider
    a Domain Model only in terms of the problems it represents and resolves, the reality
    of the database is hard to escape.


    It is common for Domain Model classes to map fairly directly to tables in a relational
    database, and this certainly makes life easier. Figure [12-11](#A314621_5_En_12_Chapter.html#Fig11),
    for example, shows a class diagram that sketches some of the participants of the
    Woo system.


    ![A314621_5_En_12_Fig11_HTML.gif](A314621_5_En_12_Fig11_HTML.gif)


    Figure 12-11.


    An extract from a Domain Model


    The objects in Figure [12-11](#A314621_5_En_12_Chapter.html#Fig11) mirror the
    tables that were set up for the Transaction Script example. This direct association
    makes a system easier to manage, but it is not always possible, especially if
    you are working with a database schema that precedes your application. Such an
    association can itself be the source of problems. If you’re not careful, you can
    end up modeling the database, rather than the problems and forces you are attempting
    to address.


    Just because a Domain Model often mirrors the structure of a database does not
    mean that its classes should have any knowledge of it. By separating the model
    from the database, you make the entire tier easier to test and less likely to
    be affected by changes of schema, or even changes of storage mechanism. It also
    focuses the responsibility of each class on its core tasks.


    Here is a simplified `Venue` object, together with its parent class:


    ```php

    // listing 12.44

    abstract class DomainObject

    {

    private $id;

    public function __construct(int $id)

    {

    $this->id = $id;

    }

    public function getId(): int

    {

    return $this->id;

    }

    public static function getCollection(string $type): Collection

    {

    // dummy implementation

    return Collection::getCollection($type);

    }

    public function markDirty()

    {

    // next chapter!

    }

    }

    // listing 12.45

    class Venue extends DomainObject

    {

    private $name;

    private $spaces;

    public function __construct(int $id, string $name)

    {

    $this->name = $name;

    $this->spaces = self::getCollection(Space::class);

    parent::__construct($id);

    }

    public function setSpaces(SpaceCollection $spaces)

    {

    $this->spaces = $spaces;

    }

    public function getSpaces(): SpaceCollection

    {

    return $this->spaces;

    }

    public function addSpace(Space $space)

    {

    $this->spaces->add($space);

    $space->setVenue($this);

    }

    public function setName(string $name)

    {

    $this->name = $name;

    $this->markDirty();

    }

    public function getName(): string

    {

    return $this->name;

    }

    }

    ```


    There are a few points that distinguish this class from one intended to run without
    persistence. Instead of an array, I am using an object of type `SpaceCollection`
    to store any `Space` objects the `Venue` might contain (though it could be argued
    that a type-safe array is a bonus whether you are working with a database or not!).
    Because this class works with a special collection object rather than an array
    of `Space` objects, the constructor needs to instantiate an empty collection on
    startup. It does this by calling a static method on the layer supertype:


    ```php

    $this->spaces = self::getCollection(Space::class);

    ```


    I will return to this system’s collection objects and how to acquire them in the
    next chapter. For now, though, the superclass simply returns an empty array.


    **Note**: In this chapter and the next, I will discuss amendments to both the
    `Venue` and `Space` objects. These are simple domain objects, and they share a
    common functional core. If you’re coding along, you should be able to apply concepts
    I discuss to either class. A `Space` class may not maintain a collection of `Space`
    objects for example, but it might manage `Event` objects in exactly the same way.


    I expect an `$id` parameter in the constructor that I pass to the superclass for
    storage. It should come as no surprise to learn that the `$id` parameter represents
    the unique ID of a row in the database. Notice also that I call a method on the
    superclass called `markDirty()` (this will be covered when you encounter the Unit
    of Work pattern).


    ### Consequences


    The design of a Domain Model needs to be as simple or complicated as the business
    processes you need to emulate. The beauty of this is that you can focus on the
    forces in your problem as you design the model, handling issues like persistence
    and presentation in other layers—in theory, that is.


    In practice, I think that most developers design their domain models with at least
    one eye on the database. No one wants to design structures that will force you
    (or, worse, your colleagues) into somersaults of convoluted code when it comes
    to getting your objects in and out of the database.


    This separation between the Domain Model and the data layer comes at a considerable
    cost in terms of design and planning. It is possible to place database code directly
    in the model (although you would probably want to design a gateway to handle the
    actual SQL). For relatively simple models, especially if each class broadly maps
    to a table, this approach can be a real win, saving you the considerable design
    overhead of devising an external system for reconciling your objects with the
    database.


    ### Summary


    I have covered an enormous amount of ground here (although I have also left out
    a lot). You should not feel daunted by the sheer volume of code in this chapter.
    Patterns are meant to be used in the right circumstances, and combined when useful.
    Use those described in this chapter that you feel meet the needs of your project,
    and do not feel that you must build an entire framework before embarking on a
    project. On the other hand, there is enough material here to form the basis of
    a framework, or just as likely, to provide some insight into the architecture
    of some of the prebuilt frameworks you might choose to deploy.


    And there’s more! I left you teetering on the edge of persistence, with just a
    few tantalizing hints about collections and mappers to tease you. In the next
    chapter, I will look at some patterns for working with databases and for insulating
    your objects from the details of data storage.'
