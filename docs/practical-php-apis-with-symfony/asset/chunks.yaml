    \ = $this->apiLimiter->create($event->getRequest()->getClientIp());\n        $limiter->consume()->ensureAccepted();\n\
    \    }\n\n    public function onException(ExceptionEvent $event): void\n    {\n\
    \        $exception = $event->getThrowable();\n        if($exception instanceof\
    \ ValidationFailedException){\n            $errors = [];\n            foreach\
    \ ($exception->getViolations() as $violation) {\n                $errors[$violation->getPropertyPath()]\
    \ = $violation->getMessage();\n            }\n            $event->setResponse(new\
    \ JsonResponse([\n                'errors' => $errors\n            ], 400));\n\
    \            return;\n        }\n        if($exception instanceof RateLimitExceededException)\
    \ {\n            $event->setResponse(new JsonResponse([\n                'error'\
    \ => 'Api Rate limit exceeded'\n            ], 429));\n            return;\n \
    \       }\n        if($exception instanceof InvalidPayloadException) {\n     \
    \       $event->setResponse(new JsonResponse([\n                'error' => $exception->getMessage()\n\
    \            ], 400));\n            return;\n        }\n        if($exception\
    \ instanceof NotFoundOperationException){\n            $event->setResponse(new\
    \ JsonResponse([\n                'errors' => [\n                    'operation'\
    \ => $exception->getMessage()\n                ]\n            ], 400));\n    \
    \        return;\n        }\n    }\n}\n```\n\n`onKernelRequest` 方法通过使用 `apiLimiter`\
    \ 服务获取限流器，并检查请求是否被接受。如果不接受，则会抛出 `RateLimitExceededException`。我们还在 `onException`\
    \ 方法中检查此异常，并向客户端返回 *429 Too Many Requests* HTTP 状态码。\n\n# 结论\n\n作为本章的附加内容，我们添加了一个额外的安全层，通过使用令牌桶策略为\
    \ API 能处理的请求设置限制，帮助我们防止 DoS 攻击。在下一章中，我们将深入探讨如何使用 Symfony Messenger（Symfony 框架中的一个强大工具）来实现大型操作的异步执行，即那些可能需要一些时间才能处理完成的操作。\n\
    \n# 3. API 操作的背景执行\n\n到目前为止，我们学习了如何通过单个端点管理操作、如何使用 Symfony 防火墙保护端点，以及如何使用 Symfony\
    \ voter 授予或拒绝访问操作的权限。在本章中，我们将学习如何在后台执行操作，这样客户端就无需等待操作执行完成。这对于可能需要一段时间才能执行的操作非常有用。我们的\
    \ `SendPayment` 操作就是一个很好的例子，因为它可能需要连接到支付提供商来发送资金。由于我们不知道这种连接可能需要多长时间，因此最好在后台执行它，并在操作完成后向客户端发送通知（可以是电子邮件、短信或推送通知等）。\n\
    \n## 第 1 节 将操作标记为后台执行\n\n我们在第 1 章中创建了 `OperationMetadata` 属性，用于存储与操作相关的以下数据：\n\
    \n- 操作名称\n- 类名，包含执行操作所需的参数\n- 是否需要在验证过程中将角色作为组传递\n\n现在让我们向属性类添加一个新参数，该参数将指示操作是否必须在后台执行。\n\
    \n```\nreadonly class Background\n{\n    /**\n     * 后台操作执行前的延迟时间（秒）\n     */\n\
    \    public function __construct(\n        public ?int $delay = null\n    ){ }\n\
    }\n\n#[\\Attribute(\\Attribute::TARGET_CLASS)]\nclass OperationMetadata\n{\n \
    \   public function __construct(\n        public readonly string $name,\n    \
    \    public readonly ?string $input = null,\n        public readonly ?bool $useValidationGroups\
    \ = null,\n        public readonly ?Background $background = null\n    ){ }\n\
    }\n```\n\n由于后台执行可能会有延迟，我们首先创建一个包含可为 `null` 的 `delay` 参数的 `Background` 类。如果提供了该参数，操作将在后台执行并增加额外的延迟。`OperationMetadata`\
    \ 现在包含一个新的 `Background` 类型参数。如果提供了该参数，操作必须发送到后台执行，而不是实时执行。\n\n现在，如果我们想将 `SendPayment`\
    \ 操作标记为后台执行，只需向属性添加 `background` 参数即可。\n\n```\n#[OperationMetadata(\n    name:\
    \ OperationNames::SendPayment->name,\n    input: SendPaymentInput::class,\n  \
    \  useValidationGroups: false,\n    background: new Background(300)\n)]\nclass\
    \ SendPaymentOperation implements OperationInterface\n{\n    // 其余方法\n}\n```\n\
    \n在上面的示例中，我们指明 `SendPayment` 操作将在后台执行，并且执行将延迟 300 秒（5 分钟）。\n\n### 结论\n\n我们通过添加一个新参数扩展了现有的\
    \ `OperationMetadata` 属性，该参数允许我们指示特定操作是否应在后台执行。通过设置此标志，我们表明操作的执行可以是异步的，并且与用户的即时请求解耦。在下一节中，我们将探讨如何创建操作消息及其对应的处理程序，以及使用\
    \ Symfony 的 `AsMessageHandler` 属性将它们连接起来的魔力。\n\n## 第 2 节 操作消息和处理程序\n\n我们将使用 [Symfony\
    \ messenger 组件](https://symfony.com/doc/current/messenger.html)在后台执行操作。首先，我们必须创建一个消息类和一个消息处理程序。\n\
    \n### 创建操作消息\n\n```\nuse Symfony\\Component\\Security\\Core\\User\\UserInterface;\n\
    \nclass OperationMessage\n{\n    public function __construct(\n        public\
    \ readonly string $operation,\n        public readonly mixed $operationInput,\n\
    \        public readonly ?string $userIdentifier\n    ){ }\n}\n```\n\n消息类的构造函数中包含执行操作所需的参数：操作名称、操作数据和用户标识符（如果操作需要）。现在让我们编写消息处理程序。\n\
    \n-   正如我们将在下一节中看到的，我们将使用 User 实体中的 `getUserIdentifier` 方法来设置 `OperationMessage`\
    \ 用户参数的值。此方法返回用户的电子邮件。\n"
- fmt: "### Creating the Operation Handler\n\nNow, we need a handler to manage the\
    \ `OperationMessage` messages.\n\n```php\nuse App\\Api\\Collection\\OperationCollection;\n\
    use App\\Api\\Operation\\OperationRequiresUserInterface;\nuse Symfony\\Component\\\
    Messenger\\Attribute\\AsMessageHandler;\nuse Doctrine\\ORM\\EntityManagerInterface;\n\
    \n#[AsMessageHandler]\nclass OperationMessageHandler\n{\n    public function __construct(\n\
    \        private readonly OperationCollection $operationCollection,\n        private\
    \ readonly EntityManagerInterface $em\n    ){ }\n\n    public function __invoke(OperationMessage\
    \ $message): void\n    {\n        $apiOperation = $this->operationCollection->getOperation($message->operation);\n\
    \n        if($message->user && $apiOperation->handler instanceof OperationRequiresUserInterface)\
    \ {\n            $user = $this->em->getRepository(User::class)->findOneByEmail($message->userIdentifier);\n\
    \            if(!$user){\n                throw new \\InvalidArgumentException(\"\
    Unknown user while executing operation: \" . $message->operation);\n         \
    \   }\n            $apiOperation->handler->setUser($user);\n        }\n\n    \
    \    $apiOperation->handler->perform($message->operationInput);\n    }\n}\n```\n\
    \nThe handler `__invoke` function behaves in a similar way that the `ApiOperationHandler`\
    \ does. It gets the operation to execute from the collection, checks whether it\
    \ requires setting the user and sets it if so. Finally, it performs the operation.\
    \ If the user is required, the handler retrieves first the user from the database\
    \ and then passes it to the operation. Since `getUserIdentifier()` in the user\
    \ entity returns the user’s email, we use `findOneByEmail()` to retrieve the user\
    \ from the database in the background handler.\n\n### Conclusion\n\nWe have created\
    \ the operation message and its corresponding handler so that, after dispatching\
    \ an operation message to the background, it can be handled successfully. In the\
    \ next section, we will bridge the gap between our existing `ApiOperationHandler`\
    \ to check whether an operation requires background processing based on the previously\
    \ introduced flag in the `OperationMetadata` attribute.\n\n## Section 3. Sending\
    \ Operations to the Background\n\nSo far, we have put in place the mechanisms\
    \ to mark operations as background and to deal with those enqueued operations\
    \ (the message and its handler). Now, we need our `ApiOperationHandler` to be\
    \ able to check whether an operation must be sent to the background. Let’s modify\
    \ it to add this functionality.\n\n```php\nuse App\\Api\\Collection\\OperationCollection;\n\
    use App\\Api\\Input\\ApiInput;\nuse App\\Api\\Operation\\OperationRequiresUserInterface;\n\
    use App\\Api\\Output\\ApiOutput;\nuse App\\Messenger\\OperationMessage;\nuse App\\\
    Validation\\ValidationHandler;\nuse Symfony\\Bundle\\SecurityBundle\\Security;\n\
    use Symfony\\Component\\Messenger\\MessageBusInterface;\nuse Symfony\\Component\\\
    Messenger\\Stamp\\DelayStamp;\nuse Symfony\\Component\\Security\\Core\\Exception\\\
    AccessDeniedException;\n\nclass ApiOperationHandler\n{\n    public function __construct(\n\
    \        private readonly ValidationHandler $validationHandler,\n        private\
    \ readonly OperationCollection $operationCollection,\n        private readonly\
    \ Security $security,\n        private readonly MessageBusInterface $bus\n   \
    \ ){ }\n\n    public function performOperation(ApiInput $apiInput): ApiOutput\n\
    \    {\n        $operation = $this->operationCollection->getOperation($apiInput->operation);\n\
    \        $isGranted = $this->security->isGranted('PERFORM', $operation);\n   \
    \     if(!$isGranted){\n            throw new AccessDeniedException('Not allowed\
    \ to perform this operation');\n        }\n\n        $validationGroups = ($operation->metadata->useValidationGroups)\
    \ ? [$this->security->getUser()->getRoles()] : null;\n        $inputData = ($operation->metadata->input)\n\
    \            ? $this->validationHandler->deserializeAndValidate($apiInput->data,\
    \ $operation->metadata->input, $validationGroups)\n            : null\n      \
    \  ;\n\n        $userIdentifier = null;\n        $user = null;\n        if($operation->handler\
    \ instanceof OperationRequiresUserInterface) {\n            $user = $this->security->getToken()->getUser();\n\
    \            $userIdentifier = $user->getUserIdentifier();\n        }\n\n    \
    \    if($operation->metadata->background) {\n            // Multiply delay * 1000\
    \ since DelayStamp expects delay in milliseconds\n            $stamps = ($operation->metadata->background->delay)\
    \ ? [new DelayStamp($operation->metadata->background->delay * 1000)] : [];\n \
    \           $this->bus->dispatch(new OperationMessage($operation->metadata->name,\
    \ $inputData, $userIdentifier), $stamps);\n            return new ApiOutput(['status'\
    \ => 'queued'], 202);\n        }\n\n        if($user){\n            $operation->handler->setUser($user);\n\
    \        }\n\n        return $operation->handler->perform($inputData);\n    }\n\
    }\n```\n\nLet’s examine the changes that we have introduced:\n\n- The constructor\
    \ injects the `MessageBusInterface` service, which allows us to send an operation\
    \ to the background (we will learn in the next chapter how to route messages to\
    \ the corresponding transport).\n- After ensuring the operation can be performed,\
    \ its data is valid and whether the user is required, the handler figures out\
    \ whether the operation must be sent to the background by checking if the operation\
    \ metadata holds the background parameter, that is, it is not null. If so, the\
    \ handler proceeds as follows:\n  - It checks whether it must add a delay by looking\
    \ at the background delay value. If a delay has been specified, it creates a `DelayStamp`\
    \ passing the specified delay (we multiply the delay by 1000 since the `DelayStamp`\
    \ constructor receives the delay in milliseconds).\n  - It creates the operation\
    \ message and dispatches it using the bus service.\n  - It returns the corresponding\
    \ output within a *202 Accepted* code, which indicates that the requested operation\
    \ has been accepted and will be executed later.\n\nAs the `ApiOperationHandler`\
    \ validates the operation parameters and checks the authorization rules before\
    \ queueing the operation, we have not to make these checks again in the message\
    \ handler.\n\n### Conclusion\n\nWe have explored how to modify the handler to\
    \ identify operations flagged for background processing and leverage the Symfony\
    \ Messenger bus service to enqueue them. However, ensuring efficient background\
    \ processing requires proper configuration. In the next section, we will learn\
    \ how to configure the system to route background operation execution messages\
    \ to a designated transport.\n\n## Section 4. Routing Operations\n\nWith everything\
    \ done so far, if we send a request to execute an operation marked as background,\
    \ it won’t be queued. That’s because we need to configure the most important part,\
    \ that is, routing operation messages to a [transport](https://symfony.com/doc/6.4/messenger.html%23routing-messages-to-a-transport).\n\
    \nThe transport configuration is placed in the `config/packages/messenger.yaml`\
    \ file. Below, we are showing how to configure the Redis server we installed in\
    \ “Section 3. Prerequisites” in the Bootfront matter as a transport and how to\
    \ instruct messenger to route operation messages to that transport.\n\n```yaml\n\
    framework:\n    messenger:\n        transports:\n            operations:\n   \
    \             dsn: '%env(MESSENGER_TRANSPORT_DSN)%'\n        routing:\n      \
    \      App\\Messenger\\OperationMessage: 'operations'\n```\n\nAs we can see, the\
    \ “transports” section shows the available transports. In this case, there is\
    \ only a Redis transport created, which uses as dsn the one from the `.env` file.\
    \ The routing section specifies which messages are routed to which transports.\
    \ In this case, the `OperationMessage` will be routed to the `operations` transport."
  raw: "### Creating the Operation Handler\n\nNow, we need a handler to manage the\
    \ **OperationMessage** messages.\n\n```\nuse App\\Api\\Collection\\OperationCollection;\n\
    use App\\Api\\Operation\\OperationRequiresUserInterface;\nuse Symfony\\Component\\\
    Messenger\\Attribute\\AsMessageHandler;\nuse Doctrine\\ORM\\EntityManagerInterface;\n\
    #[AsMessageHandler]\nclass OperationMessageHandler\n{\npublic function __construct(\n\
    private readonly OperationCollection $operationCollection,\nprivate readonly EntityManagerInterface\
    \ $em\n){ }\npublic function __invoke(OperationMessage $message): void\n{\n$apiOperation\
    \ = $this->operationCollection->getOperation($message->operation);\nif($message->user\
    \ && $apiOperation->handler instanceof OperationRequiresUserInterface) {\n$user\
    \ = $this->em->getRepository(User::class)->findOneByEmail($message->userIdentifier);\n\
    if(!$user){\nthrow new \\InvalidArgumentException(“Unkown user while executing\
    \ operation: ” . $message->operation);\n}\n$apiOperation->handler->setUser($user);\n\
    }\n$apiOperation->handler->perform($message->operationInput);\n}\n}\n```\n\nThe\
    \ handler **__invoke** function behaves in a similar way that the ApiOperationHandler\
    \ does. It gets the operation to execute from the collection, checks whether it\
    \ requires setting the user and sets it if so. Finally, it performs the operation.\
    \ If the user is required, the handler retrieves first the user from the database\
    \ and then passes it to the operation. Since **getUserIdentifier()** in the user\
    \ entity returns the user’s email, we use **findOneByEmail()** to retrieve the\
    \ user from the database in the background handler.\n\n### Conclusion\n\nWe have\
    \ created the operation message and its corresponding handler so that, after dispatching\
    \ an operation message to the background, it can be handled successfully. In the\
    \ next section, we will bridge the gap between our existing ApiOperationHandler\
    \ to check whether an operation requires background processing based on the previously\
    \ introduced flag in the OperationMetadata attribute.\n\n## Section 3\\. Sending\
    \ Operations to the Background\n\nSo far, we have put in place the mechanisms\
    \ to mark operations as background and to deal with those enqueued operations\
    \ (the message and its handler). Now, we need our ApiOperationHandler to be able\
    \ to check whether an operation must be sent to the background. Let’s modify it\
    \ to add this functionality.\n\n```\nuse App\\Api\\Collection\\OperationCollection;\n\
    use App\\Api\\Input\\ApiInput;\nuse App\\Api\\Operation\\OperationRequiresUserInterface;\n\
    use App\\Api\\Output\\ApiOutput;\nuse App\\Messenger\\OperationMessage;\nuse App\\\
    Validation\\ValidationHandler;\nuse Symfony\\Bundle\\SecurityBundle\\Security;\n\
    use Symfony\\Component\\Messenger\\MessageBusInterface;\nuse Symfony\\Component\\\
    Messenger\\Stamp\\DelayStamp;\nuse Symfony\\Component\\Security\\Core\\Exception\\\
    AccessDeniedException;\nclass ApiOperationHandler\n{\npublic function __construct(\n\
    private readonly ValidationHandler $validationHandler,\nprivate readonly OperationCollection\
    \ $operationCollection,\nprivate readonly Security $security,\nprivate readonly\
    \ MessageBusInterface $bus\n){ }\npublic function performOperation(ApiInput $apiInput):\
    \ ApiOutput\n{\n$operation = $this->operationCollection->getOperation($apiInput->operation);\n\
    $isGranted = $this->security->isGranted('PERFORM', $operation);\nif(!$isGranted){\n\
    throw new AccessDeniedException('Not allowed to perform this operation');\n}\n\
    $validationGroups = ($operation->metadata->useValidationGroups) ? [$this->security->getUser()->getRoles()]\
    \ : null;\n$inputData = ($operation->metadata->input)\n? $this->validationHandler->deserializeAndValidate($apiInput->data,\
    \ $operation→metadata→input, $validationGroups)\n: null\n;\n$userIdentifier =\
    \ null;\n$user = null;\nif($operation->handler instanceof OperationRequiresUserInterface)\
    \ {\n$user = $this->security->getToken()->getUser();\n$userIdentifier = $user->getUserIdentifier();\n\
    }\nif($operation->metadata->background) {\n// Multiply delay * 1000 since DelayStamp\
    \ expects delay in miliseconds\n$stamps = ($operation->metadata->background->delay)\
    \ ? [new DelayStamp($operation->metadata->background->delay * 1000)] : [];\n$this->bus->dispatch(\
    \ new OperationMessage($operation->metadata->name, $inputData, $userIdentifier),\
    \ $stamps);\nreturn new ApiOutput(['status' => 'queued'], 202);\n}\nif($user){\n\
    $operation->handler->setUser($user);\n}\nreturn $operation->handler->perform($inputData);\n\
    }\n}\n```\n\nLet’s examine the changes that we have introduced:\n\n*   The constructor\
    \ injects the **MessageBusInterface** service, which allows us to send an operation\
    \ to the background (we will learn in the next chapter how to route messages to\
    \ the corresponding transport).\n\n*   After ensuring the operation can be performed,\
    \ its data is valid and whether the user is required, the handler figures out\
    \ whether the operation must be sent to the background by checking if the operation\
    \ metadata holds the background parameter, that is, it is not null. If so, the\
    \ handler proceeds as follows:\n    *   It checks whether it must add a delay\
    \ by looking at the background delay value. If a delay has been specified, it\
    \ creates a DelayStamp passing the specified delay (We multiply the delay by 1000\
    \ since the DelayStamp constructor receives the delay in milliseconds).\n\n  \
    \  *   It creates the operation message and dispatches it using the bus service.\n\
    \n    *   It returns the corresponding output within a *202 Accepted* code, which\
    \ indicates that the requested operation has been accepted and will be executed\
    \ later.\n\n    As the ApiOperationHandler validates the operation parameters\
    \ and checks the authorization rules before queueing the operation, we have not\
    \ to make these checks again in the message handler.\n\n### Conclusion\n\nWe have\
    \ explored how to modify the handler to identify operations flagged for background\
    \ processing and leverage the Symfony Messenger bus service to enqueue them. However,\
    \ ensuring efficient background processing requires proper configuration. In the\
    \ next section, we will learn how to configure the system to route background\
    \ operation execution messages to a designated transport.\n\n## Section 4\\. Routing\
    \ Operations\n\nWith everything done so far, if we send a request to execute an\
    \ operation marked as background, it won’t be queued. That’s because we need to\
    \ configure the most important part, that is, routing operation messages to a\
    \ [transport](https://symfony.com/doc/6.4/messenger.html%2523routing-messages-to-a-transport).\n\
    \nThe transport configuration is placed in the *config/packages/messenger.yaml*\
    \ file. Below, we are showing how to configure the Redis server we installed in\
    \ “Section 3\\. Prerequisites” in the Bootfront matter as a transport and how\
    \ to instruct messenger to route operation messages to that transport.\n\n```\n\
    framework:\nmessenger:\ntransports:\noperations:\ndsn: '%env(MESSENGER_TRANSPORT_DSN)%'\n\
    routing:\nApp\\Messenger\\OperationMessage: 'operations'\n```\n\nAs we can see,\
    \ the “transports” section shows the available transports. In this case, there\
    \ is only a Redis transport created, which uses as dsn the one from the *.env*\
    \ file. The routing section specifies which messages are routed to which transports.\
    \ In this case, the OperationMessage will be routed to the *operations* transport."
  trans: "\n### 创建操作处理器\n\n现在，我们需要一个处理器来管理 `OperationMessage` 消息。\n\n```php\nuse App\\\
    Api\\Collection\\OperationCollection;\nuse App\\Api\\Operation\\OperationRequiresUserInterface;\n\
    use Symfony\\Component\\Messenger\\Attribute\\AsMessageHandler;\nuse Doctrine\\\
    ORM\\EntityManagerInterface;\n\n#[AsMessageHandler]\nclass OperationMessageHandler\n\
    {\n    public function __construct(\n        private readonly OperationCollection\
    \ $operationCollection,\n        private readonly EntityManagerInterface $em\n\
    \    ){ }\n\n    public function __invoke(OperationMessage $message): void\n \
    \   {\n        $apiOperation = $this->operationCollection->getOperation($message->operation);\n\
    \n        if($message->user && $apiOperation->handler instanceof OperationRequiresUserInterface)\
    \ {\n            $user = $this->em->getRepository(User::class)->findOneByEmail($message->userIdentifier);\n\
    \            if(!$user){\n                throw new \\InvalidArgumentException(\"\
    Unknown user while executing operation: \" . $message->operation);\n         \
    \   }\n            $apiOperation->handler->setUser($user);\n        }\n\n    \
    \    $apiOperation->handler->perform($message->operationInput);\n    }\n}\n```\n\
    \n处理器的 `__invoke` 函数与 `ApiOperationHandler` 的行为方式类似。它从集合中获取要执行的操作，检查操作是否需要设置用户，如果需要则进行设置。最后，它执行该操作。如果需要用户，处理器会先从数据库中检索用户，然后将用户传递给操作。由于用户实体中的\
    \ `getUserIdentifier()` 方法返回用户的电子邮件，我们在后台处理器中使用 `findOneByEmail()` 从数据库中检索用户。\n\
    \n### 结论\n\n我们已经创建了操作消息及其对应的处理器，这样，在将操作消息分发到后台后，它就能被成功处理。在下一节中，我们将弥合现有 `ApiOperationHandler`\
    \ 之间的差距，以根据先前在 `OperationMetadata` 属性中引入的标志来检查操作是否需要后台处理。\n\n## 第三节：将操作发送到后台\n\
    \n到目前为止，我们已经建立了将操作标记为后台操作以及处理这些已入队操作（消息及其处理器）的机制。现在，我们需要让 `ApiOperationHandler`\
    \ 能够检查某个操作是否必须发送到后台。让我们修改它以添加此功能。\n\n```php\nuse App\\Api\\Collection\\OperationCollection;\n\
    use App\\Api\\Input\\ApiInput;\nuse App\\Api\\Operation\\OperationRequiresUserInterface;\n\
    use App\\Api\\Output\\ApiOutput;\nuse App\\Messenger\\OperationMessage;\nuse App\\\
    Validation\\ValidationHandler;\nuse Symfony\\Bundle\\SecurityBundle\\Security;\n\
    use Symfony\\Component\\Messenger\\MessageBusInterface;\nuse Symfony\\Component\\\
    Messenger\\Stamp\\DelayStamp;\nuse Symfony\\Component\\Security\\Core\\Exception\\\
    AccessDeniedException;\n\nclass ApiOperationHandler\n{\n    public function __construct(\n\
    \        private readonly ValidationHandler $validationHandler,\n        private\
    \ readonly OperationCollection $operationCollection,\n        private readonly\
    \ Security $security,\n        private readonly MessageBusInterface $bus\n   \
    \ ){ }\n\n    public function performOperation(ApiInput $apiInput): ApiOutput\n\
    \    {\n        $operation = $this->operationCollection->getOperation($apiInput->operation);\n\
    \        $isGranted = $this->security->isGranted('PERFORM', $operation);\n   \
    \     if(!$isGranted){\n            throw new AccessDeniedException('Not allowed\
    \ to perform this operation');\n        }\n\n        $validationGroups = ($operation->metadata->useValidationGroups)\
    \ ? [$this->security->getUser()->getRoles()] : null;\n        $inputData = ($operation->metadata->input)\n\
    \            ? $this->validationHandler->deserializeAndValidate($apiInput->data,\
    \ $operation->metadata->input, $validationGroups)\n            : null\n      \
    \  ;\n\n        $userIdentifier = null;\n        $user = null;\n        if($operation->handler\
    \ instanceof OperationRequiresUserInterface) {\n            $user = $this->security->getToken()->getUser();\n\
    \            $userIdentifier = $user->getUserIdentifier();\n        }\n\n    \
    \    if($operation->metadata->background) {\n            // 延迟时间乘以 1000，因为 DelayStamp\
    \ 期望延迟时间以毫秒为单位\n            $stamps = ($operation->metadata->background->delay)\
    \ ? [new DelayStamp($operation->metadata->background->delay * 1000)] : [];\n \
    \           $this->bus->dispatch(new OperationMessage($operation->metadata->name,\
    \ $inputData, $userIdentifier), $stamps);\n            return new ApiOutput(['status'\
    \ => 'queued'], 202);\n        }\n\n        if($user){\n            $operation->handler->setUser($user);\n\
    \        }\n\n        return $operation->handler->perform($inputData);\n    }\n\
    }\n```\n\n让我们检查一下我们引入的更改：\n\n- 构造函数注入了 `MessageBusInterface` 服务，这使我们能够将操作发送到后台（我们将在下一章学习如何将消息路由到相应的传输器）。\n\
    - 在确保操作可以被执行、其数据有效以及是否需要用户之后，处理器通过检查操作元数据是否包含 background 参数（即不为 null）来确定操作是否必须发送到后台。如果是，处理器将按如下方式继续：\n\
    \  - 它通过查看 background 的 delay 值来检查是否必须添加延迟。如果指定了延迟，它将创建一个 `DelayStamp`，并传入指定的延迟时间（我们将延迟时间乘以\
    \ 1000，因为 `DelayStamp` 构造函数接收的延迟时间是以毫秒为单位的）。\n  - 它创建操作消息并使用总线服务分发它。\n  - 它返回一个带有\
    \ *202 Accepted* 状态码的相应输出，这表示请求的操作已被接受，稍后将执行。\n\n由于 `ApiOperationHandler` 在将操作加入队列之前验证了操作参数并检查了授权规则，因此我们不必在消息处理器中再次进行这些检查。\n\
    \n### 结论\n\n我们已经探讨了如何修改处理器以识别被标记为后台处理的操作，并如何利用 Symfony Messenger 总线服务将其入队。然而，确保高效的后台处理需要正确的配置。在下一节中，我们将学习如何配置系统，将后台操作执行消息路由到指定的传输器。\n\
    \n## 第四节：路由操作\n\n到目前为止，如果我们发送一个请求来执行标记为后台的操作，它不会被加入队列。这是因为我们需要配置最重要的部分，即，将操作消息路由到一个[传输器](https://symfony.com/doc/6.4/messenger.html%23routing-messages-to-a-transport)。\n\
    \n传输器配置位于 `config/packages/messenger.yaml` 文件中。下面，我们将展示如何将我们在“Bootfront 关键事项”的第三节“先决条件”中安装的\
    \ Redis 服务器配置为传输器，以及如何指示 Messenger 将操作消息路由到该传输器。\n\n```yaml\nframework:\n    messenger:\n\
    \        transports:\n            operations:\n                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'\n\
    \        routing:\n            App\\Messenger\\OperationMessage: 'operations'\n\
    ```\n\n如我们所见， “transports” 部分显示了可用的传输器。在这个案例中，只有一个创建的 Redis 传输器，它使用的 dsn 来自 `.env`\
    \ 文件。routing 部分指定了哪些消息被路由到哪些传输器。在这个案例中， `OperationMessage` 将被路由到 `operations`\
    \ 传输器。\n"
- fmt: '### Consuming Messages


    Once the transport is ready, the operations sent to the background won''t be executed
    immediately. Instead, they will be queued and wait for a dedicated process called
    `worker` to handle them. These workers run continuously in the background, waiting
    for new operations to arrive in the queue. Symfony messenger comes with a useful
    command called `messenger:consume` to start a worker and keep them consuming messages.
    Let''s see how we would consume messages from the `operations` transport:


    ```

    bin/console messenger:consume operations

    ```


    We should not keep consumers running forever since they could consume more memory
    over time. To avoid this, we can use the following command options to control
    how much time the worker is alive:


    - `time-limit`: It is used to specify how much time the worker will be alive (in
    seconds).

    - `message-limit`: It is used to specify how many messages will be consumed before
    dying.


    ```

    bin/console messenger:consume operations --time-limit=3600

    ```


    The above command starts a worker which will keep consuming from `operations`
    transport for an hour. After passing an hour it will be killed.


    ### Managing Workers


    As our workers should be killed after a certain time, we should use a tool which
    can raise the workers again so they are continuously consuming from the queues.
    [Supervisor](https://symfony.com/doc/6.4/messenger.html%2523supervisor-configuration)
    is an easy-to-use tool that can help to achieve this. You can install supervisor
    via the following command:


    ```

    sudo apt-get install supervisor

    ```


    After installation, we must write the required config so that our operation workers
    can start after every reset. Supervisor configuration normally lives in the `/etc/supervisor/conf.d`
    directory. We could create a file named `operations.conf` in that folder with
    the following configuration:


    ```

    /etc/supervisor/conf.d/operations.conf

    [program:messenger-consume]

    command=php /path/to/your/app/bin/console messenger:consume operations --time-limit=3600

    user=

    numprocs=4

    startsecs=0

    autostart=true

    autorestart=true

    startretries=5

    process_name=%(program_name)s_%(process_num)02d

    ```


    Let''s review the above configuration key by key:


    - `command`: It is the command that Supervisor will handle, in our case the operation
    execution worker.

    - `user`: It is the operating system user who executes the command.

    - `numprocs`: The number of processes (workers) that will be executed.

    - `autostart`: It indicates whether the command is initialized automatically (we
    must set it to true since we want our workers to be automatically started).

    - `autorestart`: It indicates whether the command is restarted automatically (we
    must set it to true since we want our workers to automatically restart after every
    3600 seconds).

    - `startretries`: It indicates how many times Supervisor will try to start the
    process after failure.

    - `process_name`: It indicates a format to build the process name.


    ### Checking the Transport Works


    To check that an operation performing is queued for later processing, we are going
    to modify the `SendPayment` metadata attribute to flag it as background. As we
    learned in "Section 1. Marking Operations As Background," we must set the operation
    metadata `background` parameter with a new `Background` class instance.


    Now, let''s request the operation endpoint to execute a `SendPayment` operation.
    As it is flagged as background, the endpoint should queue it using the Redis transport
    and return a 202 Accepted code.


    ```

    Request:

    curl --request POST \

    --url http://127.0.0.1:8000/api/v1/operation \

    --header ''Content-Type: application/json'' \

    --header ''X-AUTH-TOKEN: zPLhK8iQqg9fg7u5jnp'' \

    --data ''{

    "operation" : "SendPayment",

    "data" : {

    "receiver" : "8528f744fg788",

    "amount" : 56.87

    }

    }''

    Response:

    202 Accepted

    {

    "status": "queued"

    }

    ```


    So far, the operation is queued, but it will not be performed after a worker starts.
    Before starting a worker, let''s ensure the operation has been successfully routed
    to the Redis transport. To do it, we can log into the Redis server and check the
    operations stream contents. We can log into the Redis server in two ways:


    - Accessing into the docker-container and then accessing into the redis shell
    using the `redis-cli` command (the container comes with the `redis-cli` command
    installed).

    - Accessing directly using the linked port (Requires installing `redis-cli`).


    Let''s use option 1. To access the container, open a terminal and execute the
    following command:


    ```

    docker exec -it  sh

    ```


    After being prompted into the container, we have to log into the Redis server.
    This is as simple as running the next command:


    ```

    redis-cli

    ```


    Then, when we are logged into the Redis server. We can run the next order to check
    the length of the operations stream:


    ```

    xlen operations

    ```


    Note: `operations` refers to the stream name as defined in the messenger transport
    configuration.


    The above command should return a length of 1, which would tell us that the operation
    has been routed successfully. Finally, we only have to start a worker and ensure
    it processes the operation. Let''s execute the `messenger:consume` command and
    observe how the operation is executed.


    ```

    bin/console messenger:consume operations -vv

    ```


    After executing the worker, we should see the following output:


    ```

    [OK] Consuming messages from transport "operations".

    // The worker will automatically exit once it has received a stop signal via the
    messenger:stop-workers command.

    // Quit the worker with CONTROL-C.

    [info] Received message App\Messenger\OperationMessage

    [info] Message App\Messenger\OperationMessage handled by App\Messenger\OperationMessageHandler::__invoke

    [info] App\Messenger\OperationMessage was handled successfully (acknowledging
    to transport).

    ```


    As we can see, the `info` logs inform us that the operation has been handled successfully.


    ### Retrying Failed Operations


    By default, if handling a message fails three times, Symfony will discard it.
    You can change these parameters using the `max_retries` option as follows:


    ```

    framework:

    messenger:

    transports:

    operations:

    dsn: ''%env(MESSENGER_TRANSPORT_DSN)%''

    retry_strategy

    max_retries 2

    ```


    As shown in the above config, we would indicate Symfony messenger to retry 2 times
    instead of 3. To avoid permanent message loss in case of failure, we must configure
    a failure transport. When Symfony messenger detects a configured failure transport,
    it will route the failed messages to that transport so that they can be retried
    later as long as the error that caused the failure has been fixed. Let''s see
    how to configure it:


    ```

    framework:

    messenger:

    failure_transport: failed

    transports:

    operations:

    dsn: ''%env(MESSENGER_TRANSPORT_DSN)%''

    retry_strategy

    max_retries 2

    failed ''doctrine://default?table_name=failed_operations''

    ```


    Now, after an operation handling fails, Symfony will not discard it but it will
    route the failed message to the failed transport. The failed transport uses doctrine
    as a backend so that the operation message will be stored in a table named `failed_operations`
    in our database. Later, we can consume those messages as we would do with any
    other transport.


    - Symfony provides a set of commands to retry messages from the failure transport.
    You can read more [here](https://symfony.com/doc/current/messenger.html): [`https://symfony.com/doc/current/messenger.html`](https://symfony.com/doc/current/messenger.html).'
  raw: '### Consuming Messages


    Once the transport is ready, the operations sent to the background won’t be executed
    immediately. Instead, they will be queued and wait for a dedicated process called
    **worker** to handle them. These workers run continuously in the background, waiting
    for new operations to arrive in the queue. Symfony messenger comes with a useful
    command called **messenger:consume** to start a worker and keep them consuming
    messages. Let’s see how we would consume messages from the **operations** transport:


    ```

    bin/console messenger:consume operations

    ```


    We should not keep consumers running forever since they could consume more memory
    over time. To avoid this, we can use the following command options to control
    how much time the worker is alive:


    *   **time-limit**: It is used to specify how much time the worker will be alive
    (in seconds).


    *   **message-limit**: It is used to specify how many messages will be consumed
    before dying.


    ```

    bin/console messenger:consume operations --time-limit=3600

    ```


    The above command starts a worker which will keep consuming from **operations**
    transport for an hour. After passing an hour it will be killed.


    ### Managing Workers


    As our workers should be killed after a certain time, we should use a tool which
    can raise the workers again so they are continuously consuming from the queues.
    [Supervisor](https://symfony.com/doc/6.4/messenger.html%2523supervisor-configuration)
    is an easy-to-use tool that can help to achieve this. You can install supervisor
    via the following command:


    ```

    sudo apt-get install supervisor

    ```


    After installation, we must write the required config so that our operation workers
    can start after every reset. Supervisor configuration normally lives in the */etc/supervisor/conf.d*
    directory. We could create a file named “operations.conf” in that folder with
    the following configuration:


    ```

    /etc/supervisor/conf.d/operations.conf

    [program:messenger-consume]

    command=php /path/to/your/app/bin/console messenger:consume operations --time-limit=3600

    user=

    numprocs=4

    startsecs=0

    autostart=true

    autorestart=true

    startretries=5

    process_name=%(program_name)s_%(process_num)02d

    ```


    Let’s review the above configuration key by key:


    *   **command**: It is the command that Supervisor will handle, in our case the
    operation execution worker.


    *   **user**: It is the operating system user who executes the command.


    *   **numprocs**: The number of processes (workers) that will be executed.


    *   **autostart**: It indicates whether the command is initialized automatically
    (we must set it to true since we want our workers to be automatically started).


    *   **autorestart**: It indicates whether the command is restarted automatically
    (we must set it to true since we want our workers to automatically restart after
    every 3600 seconds).


    *   **startretries**: It indicates how many times Supervisor will try to start
    the process after failure.


    *   **process_name**: It indicates a format to build the process name.


    ### Checking the Transport Works


    To check that an operation performing is queued for later processing, we are going
    to modify the SendPayment metadata attribute to flag it as background. As we learned
    in “Section 1\. Marking Operations As Background,” we must set the operation metadata
    background parameter with a new Background class instance.


    Now, let’s request the operation endpoint to execute a **SendPayment** operation.
    As it is flagged as background, the endpoint should queue it using the Redis transport
    and return a 202 Accepted code.


    ```

    Request:

    curl --request POST \

    --url http://127.0.0.1:8000/api/v1/operation \

    --header ''Content-Type: application/json'' \

    --header ''X-AUTH-TOKEN: zPLhK8iQqg9fg7u5jnp'' \

    --data ''{

    "operation" : "SendPayment",

    "data" : {

    "receiver" : "8528f744fg788",

    "amount" : 56.87

    }

    }''

    Response:

    202 Accepted

    {

    "status": "queued"

    }

    ```


    So far, the operation is queued, but it will not be performed after a worker starts.
    Before starting a worker, let’s ensure the operation has been successfully routed
    to the Redis transport. To do it, we can log into the Redis server and check the
    operations stream contents. We can log into the Redis server in two ways:


    *   Accessing into the docker-container and then accessing into the redis shell
    using the **redis-cli** command (the container comes with the **redis-cli** command
    installed).


    *   Accessing directly using the linked port (Requires installing **redis-cli**).


    Let’s use option 1\. To access the container, open a terminal and execute the
    following command:


    ```

    docker exec -it  sh

    ```


    After being prompted into the container, we have to log into the Redis server.
    This is as simple as running the next command:


    ```

    redis-cli

    ```


    Then, when we are logged into the Redis server. We can run the next order to check
    the length of the operations stream:


    ```

    xlen operations

    ```


    Note


    “operations” refers to the stream name as defined in the messenger transport configuration.


    The above command should return a length of 1, which would tell us that the operation
    has been routed successfully. Finally, we only have to start a worker and ensure
    it processes the operation. Let’s execute the messenger:consume command and observe
    how the operation is executed.


    ```

    bin/console messenger:consume operations -vv

    ```


    After executing the worker, we should see the following output:


    ```

    [OK] Consuming messages from transport "operations".

    // The worker will automatically exit once it has received a stop signal via the
    messenger:stop-workers command.

    // Quit the worker with CONTROL-C.

    [info] Received message App\Messenger\OperationMessage

    [info] Message App\Messenger\OperationMessage handled by App\Messenger\OperationMessageHandler::__invoke

    [info] App\Messenger\OperationMessage was handled successfully (acknowledging
    to transport).

    ```


    As we can see, the *info* logs inform us that the operation has been handled successfully.


    ### Retrying Failed Operations


    By default, if handling a message fails three times, Symfony will discard it.
    You can change these parameters using the *max_retries* option as follows:


    ```

    framework:

    messenger:

    transports:

    operations:

    dsn: ''%env(MESSENGER_TRANSPORT_DSN)%''

    retry_strategy

    max_retries 2

    ```


    As shown in the above config, we would indicate Symfony messenger to retry 2 times
    instead of 3\. To avoid permanent message loss in case of failure, we must configure
    a failure transport. When Symfony messenger detects a configured failure transport,
    it will route the failed messages to that transport so that they can be retried
    later as long as the error that caused the failure has been fixed. Let’s see how
    to configure it:


    ```

    framework:

    messenger:

    failure_transport: failed

    transports:

    operations:

    dsn: ''%env(MESSENGER_TRANSPORT_DSN)%''

    retry_strategy

    max_retries 2

    failed ''doctrine://default?table_name=failed_operations’

    ```


    Now, after an operation handling fails, Symfony will not discard it but it will
    route the failed message to the failed transport. The failed transport uses doctrine
    as a backend so that the operation message will be stored in a table named *failed_operations*
    in our database. Later, we can consume those messages as we would do with any
    other transport.


    *   Symfony provides a set of commands to retry messages from the failure transport.
    You can read more [here](https://symfony.com/doc/current/messenger.html): [`https://symfony.com/doc/current/messenger.html`](https://symfony.com/doc/current/messenger.html).'
  trans: '

    ### 消费消息


    当传输就绪后，发送至后台的操作不会立即执行。相反，它们会被加入队列，等待一个名为 `worker` 的专用进程来处理。这些 worker 会在后台持续运行，等待队列中出现新的操作。Symfony
    messenger 提供了一个名为 `messenger:consume` 的实用命令来启动 worker 并使其持续消费消息。让我们看看如何从 `operations`
    传输中消费消息：


    ```

    bin/console messenger:consume operations

    ```


    我们不应让消费者永久运行，因为它们可能会随时间推移消耗更多内存。为避免这种情况，我们可以使用以下命令选项来控制 worker 的活动时长：


    - `time-limit`：用于指定 worker 将活动多长时间（以秒为单位）。

    - `message-limit`：用于指定在退出前将消费多少条消息。


    ```

    bin/console messenger:consume operations --time-limit=3600

    ```


    上述命令启动一个 worker，它将持续从 `operations` 传输中消费消息一小时。一小时后它将被终止。


    ### 管理 Worker


    由于我们的 worker 应在一定时间后被终止，我们应该使用一个工具来重新启动 worker，以便它们持续从队列中消费消息。[Supervisor](https://symfony.com/doc/6.4/messenger.html%2523supervisor-configuration)
    是一个易于使用的工具，可以帮助实现这一点。你可以通过以下命令安装 supervisor：


    ```

    sudo apt-get install supervisor

    ```


    安装完成后，我们必须编写所需的配置，以便我们的操作 worker 能在每次重启后启动。Supervisor 的配置通常存放在 `/etc/supervisor/conf.d`
    目录中。我们可以在该文件夹中创建一个名为 `operations.conf` 的文件，配置内容如下：


    ```

    /etc/supervisor/conf.d/operations.conf

    [program:messenger-consume]

    command=php /path/to/your/app/bin/console messenger:consume operations --time-limit=3600

    user=

    numprocs=4

    startsecs=0

    autostart=true

    autorestart=true

    startretries=5

    process_name=%(program_name)s_%(process_num)02d

    ```


    让我们逐项回顾上述配置：


    - `command`：这是 Supervisor 将处理的命令，在我们的案例中是操作执行 worker。

    - `user`：执行命令的操作系统用户。

    - `numprocs`：将执行的进程（worker）数量。

    - `autostart`：指示命令是否自动初始化（我们必须将其设置为 true，因为我们希望 worker 自动启动）。

    - `autorestart`：指示命令是否自动重启（我们必须将其设置为 true，因为我们希望 worker 在每 3600 秒后自动重启）。

    - `startretries`：指示 Supervisor 在失败后尝试启动进程的次数。

    - `process_name`：指示用于构建进程名称的格式。


    ### 检查传输是否正常工作


    为了检查执行某个操作是否被放入队列以待后续处理，我们将修改 `SendPayment` 元数据属性，将其标记为后台操作。正如我们在“第 1 节：将操作标记为后台”中所学的，我们必须将操作元数据
    `background` 参数设置为一个新的 `Background` 类实例。


    现在，让我们请求操作端点来执行一个 `SendPayment` 操作。由于它被标记为后台操作，端点应使用 Redis 传输将其加入队列，并返回 202 Accepted
    状态码。


    ```

    请求：

    curl --request POST \

    --url http://127.0.0.1:8000/api/v1/operation \

    --header ''Content-Type: application/json'' \

    --header ''X-AUTH-TOKEN: zPLhK8iQqg9fg7u5jnp'' \

    --data ''{

    "operation" : "SendPayment",

    "data" : {

    "receiver" : "8528f744fg788",

    "amount" : 56.87

    }

    }''

    响应：

    202 Accepted

    {

    "status": "queued"

    }

    ```


    至此，操作已被加入队列，但在 worker 启动之前不会被执行。在启动 worker 之前，让我们确保操作已成功路由到 Redis 传输。为此，我们可以登录到
    Redis 服务器并检查操作流的内容。我们有两种方式登录 Redis 服务器：


    - 通过访问 docker 容器，然后使用 `redis-cli` 命令进入 Redis shell（该容器已预装 `redis-cli` 命令）。

    - 直接通过链接端口访问（需安装 `redis-cli`）。


    我们使用第一种方式。要访问容器，打开终端并执行以下命令：


    ```

    docker exec -it  sh

    ```


    进入容器提示符后，我们需要登录到 Redis 服务器。这只需运行下面的命令：


    ```

    redis-cli

    ```


    然后，当我们登录到 Redis 服务器后，可以运行以下命令来检查操作流的长度：


    ```

    xlen operations

    ```


    注意：`operations` 指的是在 messenger 传输配置中定义的流名称。


    上述命令应返回长度 1，这告诉我们操作已成功路由。最后，我们只需要启动一个 worker 并确保其处理该操作。让我们执行 `messenger:consume`
    命令并观察操作如何被执行。


    ```

    bin/console messenger:consume operations -vv

    ```


    执行 worker 后，我们应该看到以下输出：


    ```

    [OK] Consuming messages from transport "operations".

    // The worker will automatically exit once it has received a stop signal via the
    messenger:stop-workers command.

    // Quit the worker with CONTROL-C.

    [info] Received message App\Messenger\OperationMessage

    [info] Message App\Messenger\OperationMessage handled by App\Messenger\OperationMessageHandler::__invoke

    [info] App\Messenger\OperationMessage was handled successfully (acknowledging
    to transport).

    ```


    正如我们所见，`info` 日志告诉我们操作已成功处理。


    ### 重试失败的操作


    默认情况下，如果处理消息失败三次，Symfony 将丢弃该消息。你可以使用 `max_retries` 选项更改这些参数，如下所示：


    ```

    framework:

    messenger:

    transports:

    operations:

    dsn: ''%env(MESSENGER_TRANSPORT_DSN)%''

    retry_strategy

    max_retries 2

    ```


    如上配置所示，我们将指示 Symfony messenger 重试 2 次，而不是 3 次。为避免失败时永久丢失消息，我们必须配置一个失败传输。当 Symfony
    messenger 检测到配置了失败传输时，它会将失败的消息路由到该传输，以便在导致失败的错误得到修复后稍后重试它们。让我们看看如何配置：


    ```

    framework:

    messenger:

    failure_transport: failed

    transports:

    operations:

    dsn: ''%env(MESSENGER_TRANSPORT_DSN)%''

    retry_strategy

    max_retries 2

    failed ''doctrine://default?table_name=failed_operations''

    ```


    现在，当一个操作处理失败后，Symfony 不会丢弃它，而是将失败的消息路由到 `failed` 传输。`failed` 传输使用 doctrine 作为后端，因此操作消息将存储在我们数据库的名为
    `failed_operations` 的表中。之后，我们可以像使用任何其他传输一样消费这些消息。


    - Symfony 提供了一组命令来从失败传输中重试消息。你可以在此处阅读更多内容：[`https://symfony.com/doc/current/messenger.html`](https://symfony.com/doc/current/messenger.html)。

