  trans: '

    假设你的表单中有一个名为“`address`”的文本输入字段；当表单通过 `post` 方法提交时，PHP 会自动创建一个名为 `$_POST[''address'']`
    的数组元素，如果使用 `get` 方法，则会生成 `$_GET[''address'']`。如图 3-4 所示，`$_POST[''address'']`
    中包含访客在文本字段中输入的任何值，你可以将其显示在屏幕上、插入数据库、发送到电子邮箱，或者进行任何你需要的操作。


    ![../images/332054_4_En_3_Chapter/332054_4_En_3_Fig4_HTML.jpg](img/332054_4_En_3_Fig4_HTML.jpg)


    **图 3-4.** 你可以通过 `$_POST` 数组获取用户输入的值，该数组在使用 `post` 方法提交表单时会自动创建。


    在第 6 章中，当你通过电子邮件将在线反馈表单的内容发送至收件箱时，将会用到 `$_POST` 数组。本书中你将使用的其他超全局数组包括：在第 5、14 和
    15 章中用于从 Web 服务器获取信息的 `$_SERVER`；在第 8 章中用于将文件上传到网站的 `$_FILES`；以及在第 11 和 19 章中用于创建简单登录系统的
    `$_SESSION`。


    **注意：** 别忘了 PHP 中的变量名是区分大小写的。所有超全局数组名称均需大写。例如，`$_Post` 或 `$_Get` 将无法正常工作。


    ## 理解何时使用引号


    如果仔细查看图 3-1 中的 PHP 代码块，你会发现第一个变量赋值时并未加引号。代码如下所示：


    ```

    $startYear = 2018;

    ```


    然而，在“使用数组存储多个值”部分的所有示例却都使用了引号，例如：


    ```

    $book[''title''] = ''PHP 7 Solutions: Dynamic Web Design Made Easy, Fourth Edition'';

    ```


    简单的规则如下：


    * **数字**：无需引号

    * **文本**：需要引号


    一般来说，在文本或**字符串**（PHP 及其他计算机语言中对文本的称呼）周围使用单引号还是双引号并不重要。实际情况会复杂一些，如第 4 章所述，因为 PHP
    引擎处理单引号和双引号的方式存在细微差别。


    **注：**“字符串”一词借用于计算机和数学科学，意指简单对象的序列——此处指文本中的字符。


    引号必须始终成对匹配，因此在使用单引号字符串时需小心其中包含撇号，或在使用双引号字符串时注意包含双引号的情况。检查以下代码行：


    ```

    $book[''description''] = ''This is David''s latest book on PHP.'';

    ```


    乍看之下似乎没问题。然而，PHP 引擎的解析方式与人类肉眼不同，如图 3-5 所示。


    ![../images/332054_4_En_3_Chapter/332054_4_En_3_Fig5_HTML.jpg](img/332054_4_En_3_Fig5_HTML.jpg)


    **图 3-5.** 单引号字符串中的撇号会混淆 PHP 引擎。


    解决此问题有两种方法：


    * 如果文本中包含撇号，请使用双引号。

    * 在撇号前添加反斜杠（这称为**转义**）。


    因此，以下两种写法都是可接受的：


    ```

    $book[''description''] = "This is David''s latest book on PHP.";

    $book[''description''] = ''This is David\''s latest book on PHP.'';

    ```


    双引号字符串中的双引号也适用相同规则（只是规则相反）。以下代码会引起问题：


    ```

    $play = "Shakespeare''s "Macbeth"";

    ```


    在此例中，撇号没问题，因为它不与双引号冲突，但 *Macbeth* 前面的双引号会导致字符串提前结束。要解决此问题，以下两种方式均可：


    ```

    $play = ''Shakespeare\''s "Macbeth"'';

    $play = "Shakespeare''s \"Macbeth\"";

    ```


    在第一个示例中，整个字符串被包裹在单引号内。这解决了 *Macbeth* 周围双引号的问题，但需要对 *Shakespeare''s* 中的撇号进行转义。在双引号字符串中，撇号不会有问题，但
    *Macbeth* 周围的双引号都需要转义。因此，总结如下：


    * 在双引号字符串中，单引号和撇号可以正常使用。

    * 在单引号字符串中，双引号可以正常使用。

    * 其他情况均需使用反斜杠进行转义。


    **提示：** 大多数情况下使用单引号，仅在双引号具有特殊含义时才保留使用，详见第 4 章。


    ## 特殊情况：`true`、`false` 和 `null`


    尽管文本应加引号，但三个关键字——`true`、`false` 和 `null` ——除非你想将它们作为字符串处理，否则绝不应加引号。前两个的含义正如你所预期；`null`
    表示“不存在的值”。


    **注：** `true` 和 `false` 被称为**布尔值**。它们以 19 世纪数学家乔治·布尔（George Boole）的名字命名，其逻辑运算体系构成了现代计算的基础。


    正如下一节所述，PHP 根据某事物是否等于 `true` 或 `false` 来做决策。给 `false` 加上引号会产生令人惊讶的结果。考虑以下代码：


    ```

    $OK = ''false'';

    ```


    这恰恰与你可能期望的相反：它使 `$OK` 变成了 `true`！为什么？因为 `false` 周围的引号将其变成了字符串，而 PHP 将字符串视为 `true`。（更详细的解释请参见第
    4 章中的“根据 PHP 的真相”。）


    关键字 `true`、`false` 和 `null` 是*不区分大小写*的。以下示例均有效：


    ```

    $OK = TRUE;

    $OK = tRuE;

    $OK = true;

    ```


    因此，总结来说，PHP 将 `true`、`false` 和 `null` 视为特殊情况。


    * 不要给它们加引号。

    * 它们不区分大小写。


    ## 做出决策


    决策，决策，决策……生活中充满了决策。PHP 也是如此。决策使其能够根据情况改变输出结果。PHP 中的决策使用**条件语句**。最常见的是使用 `if`，其结构与自然语言非常接近。在现实生活中，你可能会面临以下决策（诚然在英国并不常见）：如果天气热，我就去海滩。


    用 PHP 伪代码表示，同样的决策如下：


    ```

    if (天气热) {

    我去海滩;

    }

    ```


    被测试的条件放在圆括号内，结果操作放在花括号之间。这是基本的决策模式：


    ```

    if (条件为真) {

    // 如果条件为真，则执行的代码

    }

    ```


    **提示：** 条件语句是控制结构，后面不需要跟分号。花括号用于将应作为一个整体执行的多个独立语句组合在一起。


    花括号内的代码*仅*在条件为 `true` 时执行。如果条件为 `false`，PHP 会忽略花括号之间的所有内容，并继续执行下一段代码。PHP 如何判断条件是
    `true` 还是 `false`，将在下一节中描述。


    有时，仅使用 `if` 语句就足够了，但通常你希望在条件不满足时执行一个默认操作。为此，可以使用 `else`，如下所示：


    ```

    if (条件为真) {

    // 如果条件为真，则执行的代码

    } else {

    // 如果条件为假，则执行的默认代码

    }

    ```


    如果你想要更多替代方案，可以像这样添加更多条件语句：

    '
- fmt: "```\nif (condition is true) {\n// code to be executed if condition is true\n\
    } else {\n// default code to run if condition is false\n}\nif (second condition\
    \ is true) {\n// code to be executed if second condition is true\n} else {\n//\
    \ default code to run if second condition is false\n}\n```\n\nIn this case *both*\
    \ conditional statements will be run. If you want only one code block to be executed,\
    \ use `elseif` like this:\n\n```\nif (condition is true) {\n// code to be executed\
    \ if first condition is true\n} elseif (second condition is true) {\n// code to\
    \ be executed if first condition fails\n// but second condition is true\n} else\
    \ {\n// default code if both conditions are false\n}\n```\n\nYou can use as many\
    \ `elseif` clauses in a conditional statement as you like. *Only the first condition\
    \ that equates to true will be executed; all others will be ignored, even if they're\
    \ also true.* This means you need to build conditional statements in the order\
    \ of priority that you want them to be evaluated. It's strictly a first-come,\
    \ first-served hierarchy.\n\n> **Note**  \n> Although `elseif` is normally written\
    \ as one word, you can use `else if` as separate words.\n\n## Making comparisons\n\
    \nConditional statements are interested in only one thing: whether the condition\
    \ being tested equates to `true`. If it's not `true`, it must be `false`. There's\
    \ no room for half measures or maybes. Conditions often depend on the comparison\
    \ of two values. Is this bigger than that? Are they both the same? And so on.\n\
    \nTo test for equality, PHP uses two equal signs (`==`), like this:\n\n```\nif\
    \ ($status == 'administrator') {\n// send to admin page\n} else {\n// refuse entry\
    \ to admin area\n}\n```\n\n> **Caution**  \n> Don't use a single equal sign in\
    \ the first line (`$status = 'administrator'`). Doing so opens the admin area\
    \ of your web site to everyone. Why? Because this automatically sets the value\
    \ of `$status` to `administrator`; it doesn't compare the two values. To compare\
    \ values, you must use two equal signs. It's a common mistake, but one with potentially\
    \ disastrous consequences.\n\nSize comparisons are performed using the mathematical\
    \ symbols for less than (`<`) and greater than (`>`). Let's say you're checking\
    \ the size of a file before allowing it to be uploaded to your server. You could\
    \ set a maximum size of 50 KB like this (1 kilobyte = 1024 bytes):\n\n```\nif\
    \ ($bytes > 51200) {\n// display error message and abandon upload\n} else {\n\
    // continue upload\n}\n```\n\n> **Note**  \n> Chapter [4](#332054_4_En_4_Chapter.xhtml)\
    \ describes how to test for multiple conditions simultaneously.\n\n## Using indenting\
    \ and whitespace for clarity\n\nIndenting code helps to keep statements in logical\
    \ groups, making it easier to understand the flow of the script. PHP ignores any\
    \ whitespace inside code, so you can adopt any style you like. Just be consistent\
    \ so that you can spot anything that looks out of place.\n\nMost people find indenting\
    \ four or five spaces makes for the most readable code. Perhaps the biggest difference\
    \ in styles lies in the position of curly braces. It's common to put the opening\
    \ brace on the same line as the preceding code, with the closing brace on a new\
    \ line after the code block, like this:\n\n```\nif ($bytes > 51200) {\n// display\
    \ error message and abandon upload\n} else {\n// continue upload\n}\n```\n\nHowever,\
    \ others prefer this style:\n\n```\nif ($bytes > 51200)\n{\n// display error message\
    \ and abandon upload\n}\nelse\n{\n// continue upload\n}\n```\n\nThe style isn't\
    \ important. What matters is that your code is consistent and easy to read.\n\n\
    ## Using loops for Repetitive Tasks\n\n**Loops** are huge timesavers because they\
    \ perform the same task over and over again, yet involve very little code. They're\
    \ frequently used with arrays and database results. You can step through each\
    \ item one at a time looking for matches or performing a specific task. Loops\
    \ are particularly powerful in combination with conditional statements, allowing\
    \ you to perform operations selectively on a large amount of data in a single\
    \ sweep. Loops are best understood by working with them in a real situation. Details\
    \ of all looping structures, together with examples, are in Chapter [4](#332054_4_En_4_Chapter.xhtml).\n\
    \n## Using functions for Preset Tasks\n\n**Functions** do things ... lots of things,\
    \ mind-bogglingly so in PHP. A typical PHP setup gives you access to several thousand\
    \ built-in functions. You'll only ever need to use a handful, but it's reassuring\
    \ to know that PHP is a full-featured language.\n\nThe functions you'll be using\
    \ in this book do truly useful things, such as get the height and width of an\
    \ image, create thumbnails from existing images, query a database, send email,\
    \ and much, much more. You can identify functions in PHP code because they're\
    \ always followed by a pair of parentheses. Sometimes, the parentheses are empty,\
