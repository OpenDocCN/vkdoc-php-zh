- "# 以读写模式打开和关闭文件\n\n到目前为止，我们介绍过的函数都能一次性完成所有操作。不过，PHP 还提供了一组函数，允许你打开文件、读取和/或写入内容，然后关闭文件。该文件可以是本地文件系统中的文件，也可以是其他域上公开可用的文件。\n\
  \n以下是用于此类操作的最重要的函数：\n\n*   `fopen()`：打开文件\n*   `fgets()`：读取文件内容，通常是一次读取一行\n*   `fgetcsv()`：从\
  \ CSV 文件中获取当前行，并将其转换为数组\n*   `fread()`：读取文件的指定长度\n*   `fwrite()`：写入文件\n*   `feof()`：判断是否已到达文件末尾\n\
  *   `rewind()`：将内部指针移回文件开头\n*   `fseek()`：将内部指针移动到文件中的特定位置\n*   `fclose()`：关闭文件\n\
  \n第一个函数 `fopen()` 提供了令人眼花缭乱的选项，用于指定文件打开后的使用方式：`fopen()` 有一种只读模式、四种只写模式和五种读写模式。之所以有这么多模式，是因为它们让你能够控制是覆盖现有内容还是追加新内容。有时，你可能希望\
  \ PHP 在文件不存在时创建它。\n\n每种模式都决定了打开文件时将内部指针放置在何处。它就像文字处理器中的光标：当你调用 `fread()` 或 `fwrite()`\
  \ 时，PHP 会从指针当前所在的位置开始读取或写入。\n\n表 7-2 将指导您了解所有选项。\n\n**表 7-2.** `fopen()` 使用的读写模式\n\
  \n| 类型 | 模式 | 描述 |\n| --- | --- | --- |\n| 只读 | `r` | 内部指针初始位置位于文件开头。 |\n| 只写 |\
  \ `w` | 写入前删除现有数据。如果文件不存在则创建。 |\n| | `a` | 追加模式。新数据添加到文件末尾。如果文件不存在则创建。 |\n| | `c`\
  \ | 保留现有内容，但内部指针置于文件开头。如果文件不存在则创建。 |\n| | `x` | 仅在文件不存在时创建文件。如果已存在同名文件则失败。 |\n|\
  \ 读写 | `r+` | 读写操作可以任意顺序进行，并从当前内部指针所在位置开始。指针初始位于文件开头。操作成功要求文件必须已存在。 |\n| | `w+`\
  \ | 删除现有数据。写入后可回读数据。如果文件不存在则创建。 |\n| | `a+` | 打开文件，准备在文件末尾添加新数据。移动内部指针后也允许回读数据。如果文件不存在则创建。\
  \ |\n| | `c+` | 保留现有内容，内部指针置于文件开头。如果文件不存在则创建新文件。 |\n| | `x+` | 创建新文件，但如果同名文件已存在则失败。写入后可回读数据。\
  \ |\n\n如果选错了模式，你可能会意外删除宝贵的数据。你还需注意内部指针的位置。如果指针位于文件末尾，而你试图读取内容，结果将一无所获。另一方面，如果指针位于文件开头，而你开始写入，则会覆盖等量的现有数据。本章后面的“移动内部指针”部分将对此进行更详细的解释。\n\
  \n使用 `fopen()` 需要传入以下两个参数：\n\n*   要打开文件的路径，如果文件位于不同域名下则提供 URL\n*   包含表 7-2 中列出的某个模式的字符串\n\
  \n`fopen()` 函数返回一个指向打开文件的引用，该引用随后可与其他读写函数一起使用。以下是打开文本文件进行读取的方法：\n\n```\n$file =\
  \ fopen('C:/private/sonnet.txt', 'r');\n```\n\n之后，你可以将 `$file` 作为参数传递给其他函数，例如 `fgets()`\
  \ 和 `fclose()`。通过一些实际演示，事情应该会变得更清晰。你可能会发现使用 `ch07` 文件夹中的文件更容易，而不是自行构建文件。我将快速介绍每种模式。\n\
  \n**注意：** Mac 和 Linux 用户需要调整示例文件中 `private` 文件夹的路径，以匹配其环境设置。\n\n## 使用 `fopen()`\
  \ 读取文件\n\n文件 `fopen_read.php` 包含以下代码：\n\n```\n// 存储文件路径名\n$filename = 'C:/private/sonnet.txt';\n\
  \n// 以只读模式打开文件\n$file = fopen($filename, 'r');\n\n// 读取文件并存储其内容\n$contents = fread($file,\
  \ filesize($filename));\n\n// 关闭文件\nfclose($file);\n\n// 使用 <br/> 标签显示内容\necho nl2br($contents);\n\
  ```\n\n如果你在浏览器中加载此文件，应会看到以下输出：\n\n![A978-1-4842-0635-5_7_Fige_HTML.jpg](img/A978-1-4842-0635-5_7_Fige_HTML.jpg)\n\
  \n结果与 `get_contents_03.php` 中使用 `file_get_contents()` 完全相同。与 `file_get_contents()`\
  \ 不同，`fread()` 函数需要知道要读取多少内容。你需要提供第二个参数来指示字节数。如果你只想读取一个超大文件的前 100 个左右的字符，这将非常有用。但是，如果你想要整个文件，则需要将文件路径名传递给\
  \ `filesize()` 以获取正确的大小。\n\n另一种使用 `fopen()` 读取文件内容的方法是使用 `fgets()`，它一次检索一行。这意味着你需要将\
  \ `while` 循环与 `feof()` 结合使用，才能一直读取到文件末尾。`fopen_readloop.php` 中的代码如下所示：\n\n```\n\
  $filename = 'C:/private/sonnet.txt';\n\n// 以只读模式打开文件\n$file = fopen($filename, 'r');\n\
  \n// 创建变量来存储内容\n$contents = '';\n\n// 循环遍历每一行，直到文件末尾\nwhile (!feof($file)) {\n \
  \   // 获取下一行，并追加到 $contents 中\n    $contents .= fgets($file);\n}\n\n// 关闭文件\nfclose($file);\n\
  \n// 显示内容\necho nl2br($contents);\n```\n\n`while` 循环使用 `fgets()` 逐行检索文件内容——`!feof($file)`\
  \ 等价于“直到 `$file` 的末尾”——并将它们存储在 `$contents` 中。\n\n使用 `fgets()` 与使用 `file()` 函数非常相似，因为它也是一次处理一行。区别在于，一旦你找到所需的信息，就可以使用\
  \ `fgets()` 跳出循环。如果你在处理一个非常大的文件，这是一个显著的优势。而 `file()` 函数会将整个文件加载到数组中，从而消耗内存。\n\n\n\
  \n"
- "# PHP 方案 7-2：从 CSV 文件中提取数据\n\n文本文件可作为平面文件数据库使用，每条记录存储在单独一行中，各字段之间用逗号、制表符或其他分隔符隔开。这类文件称为\
  \ CSV 文件。通常，CSV 代表逗号分隔值，但当使用制表符或其他分隔符时，也可表示字符分隔值。本 PHP 方案展示了如何使用 `fopen()` 和 `fgetcsv()`\
  \ 将 CSV 文件中的值提取到多维关联数组中。\n\n将 `ch07` 文件夹中的 `users.csv` 复制到你的 `private` 文件夹。该文件包含以下逗号分隔值数据：\n\
  \n`name,password`\n\n`david,codeslave`\n\n`ben,bigboss`\n\n第一行由文件其余数据列标题组成。只有两行数据，每行包含一个用户名和密码。该文件还将在第\
  \ 9 章中用于创建一个简单的基于文件的登录系统。\n\n> **警告**：以逗号分隔值存储数据时，逗号后不应有空格。如果添加空格，它将被视为数据字段的第一个字符。CSV\
  \ 文件中的每一行必须包含相同数量的项目。\n\n在 `filesystem` 文件夹中创建一个名为 `getcsv.php` 的文件，并使用 `fopen()`\
  \ 以读取模式打开 `users.csv`：\n\n`$file = fopen('C:/private/users.csv', 'r');`\n\n使用 `fgetcsv()`\
  \ 将文件中的第一行提取为数组，然后将其赋值给名为 `$titles` 的变量：\n\n`$titles = fgetcsv($file);`\n\n这将创建一个包含第一行（name\
  \ 和 password）值的数组 `$titles`。\n\n`fgetcsv()` 函数需要一个参数，即你已打开文件的引用。它还接受最多四个可选参数：\n\n\
  - 行的最大长度：默认值为 0，表示无限制。\n- 字段之间的分隔符：默认为逗号。\n- 封闭字符：如果字段包含作为数据一部分的分隔符，则必须用引号括起来。默认值为双引号。\n\
  - 转义字符：默认值为反斜杠。\n\n我们使用的 CSV 文件不需要设置任何可选参数。\n\n在下一行，初始化一个空数组，用于存储将从 CSV 数据中提取的值：\n\
  \n`$users = [];`\n\n从一行中提取值后，`fgetcsv()` 会移动到下一行。要获取文件中的其余数据，你需要创建一个循环。在 `fopen_readloop.php`\
  \ 中，使用了 `!feof($file)` 作为条件。这次，将 `fgetcsv()` 的返回值赋值给条件中的一个变量，如下所示：\n\n```php\nwhile\
  \ (($data = fgetcsv($file)) !== false) {\n    $users[] = array_combine($titles,\
  \ $data);\n}\n```\n\n请注意，将从 `fgetcsv()` 返回值的语句用一对单独的括号括起来，然后使用不全等运算符（`!==`）与 `false`\
  \ 进行比较。这会使得循环运行直到 `fgetcsv()` 不再产生数据。\n\n循环内的代码使用 `array_combine()` 函数生成一个关联数组，并将其添加到\
  \ `$users` 数组中。此函数需要两个参数，这两个参数必须是具有相同数量元素的数组。两个数组合并，从第一个参数提取结果关联数组的键，从第二个参数提取值。\n\
  \n关闭 CSV 文件：\n\n`fclose($file);`\n\n要检查结果，请使用 `print_r()`。将其包裹在 `<pre>` 标签中，使输出更易于阅读：\n\
  \n```php\necho '<pre>';\nprint_r($users);\necho '</pre>';\n```\n\n这对于 `users.csv`\
  \ 运行良好，但脚本可以更健壮。如果 `fgetcsv()` 遇到空行，它会返回一个包含单个 `null` 元素的数组，当作为参数传递给 `array_combine()`\
  \ 时会导致错误。通过添加以粗体突出显示的条件语句来修改 `while` 循环：\n\n![A978-1-4842-0635-5_7_Fig1_HTML.jpg](img/A978-1-4842-0635-5_7_Fig1_HTML.jpg)\n\
  \n**图 7-1.** CSV 数据已转换为多维关联数组\n\n保存 `getcsv.php` 并在浏览器中加载它。你应该会看到如图 7-1 所示的结果。\n\
  \n```php\nwhile (($data = fgetcsv($file)) !== false) {\n    if (count($data) ==\
  \ 1 && is_null($data[0])) {\n        continue;\n    }\n    $users[] = array_combine($titles,\
  \ $data);\n}\n```\n\n该条件语句使用 `count()` 方法找出数组中有多少个元素。如果只有一个，并且第一个元素的值为 `null`，则\
  \ `continue` 关键字返回循环顶部而不执行下一行。\n\n你可以对照 `ch07` 文件夹中的 `getcsv.php` 检查你的代码。\n\n###\
  \ 在 Mac OS 上创建的 CSV 文件\n\nPHP 通常难以检测 Mac 操作系统上创建的 CSV 文件的行尾。如果 `fgetcsv()` 无法正确从\
  \ CSV 文件中提取数据，请在脚本顶部添加以下代码行：\n\n`ini_set('auto_detect_line_endings', true);`\n\n\
  这对性能影响很小，因此仅当 Mac 行尾导致 CSV 文件出现问题时才应使用。\n\n## 使用 `fopen()` 替换内容\n\n第一个只写模式（`w`）会删除文件中的任何现有内容，因此对于需要频繁更新的文件非常有用。你可以使用\
  \ `fopen_write.php` 测试 `w` 模式，该文件在 `DOCTYPE` 声明之上有以下 PHP 代码：\n\n```php\n<?php\n\
  // 如果表单已提交，处理输入文本\nif (isset($_POST['putContents'])) {\n    // 以只写模式打开文件\n    $file\
  \ = fopen('C:/private/write.txt', 'w');\n    // 写入内容\n    fwrite($file, $_POST['contents']);\n\
  \    // 关闭文件\n    fclose($file);\n}\n?>\n```\n\n当页面中的表单提交时，此代码将 `$_POST['contents']`\
  \ 的值写入名为 `write.txt` 的文件中。`fwrite()` 函数接受两个参数：文件的引用以及你要写入的任何内容。\n\n> **注意**：你可能会遇到\
  \ `fputs()` 而不是 `fwrite()`。这两个函数完全相同：`fputs()` 是 `fwrite()` 的同义词。\n\n如果在浏览器中加载 `fopen_write.php`，在文本区域中键入一些内容，然后单击“写入文件”，PHP\
  \ 会创建 `write.txt` 并插入你在文本区域中键入的任何内容。由于这只是一个演示，我省略了任何检查以确保文件已成功写入。打开 `write.txt`\
  \ 以验证你的文本已插入。现在，在文本区域中键入不同的内容并再次提交表单。原始内容将从 `write.txt` 中删除，并替换为新文本。已删除的文本将永久消失。\n\
  \n## 使用 `fopen()` 追加内容\n\n追加模式不仅会在末尾添加新内容，保留任何现有内容，而且如果文件不存在，还可以创建新文件。`fopen_append.php`\
  \ 中的代码如下所示：\n\n```php\n// 以追加模式打开文件\n$file = fopen('C:/private/append.txt', 'a');\n\
  // 写入内容后跟一个新行\nfwrite($file, $_POST['contents'] . PHP_EOL);\n// 关闭文件\nfclose($file);\n\
  ```\n\n请注意，我在 `$_POST['contents']` 之后连接了 `PHP_EOL`。这是一个 PHP 常量，表示使用适合操作系统的正确字符的新行。在\
  \ Windows 上，它会插入一个回车符和换行符，但在 Mac 和 Linux 上只插入一个换行符。\n\n如果在浏览器中加载 `fopen_append.php`，键入一些文本并提交表单，它会在\
  \ private 文件夹中创建一个名为 `append.txt` 的文件并插入你的文本。键入其他内容并再次提交表单；新文本应添加到先前文本的末尾，如下面的屏幕截图所示。\n\
  \n![A978-1-4842-0635-5_7_Figf_HTML.jpg](img/A978-1-4842-0635-5_7_Figf_HTML.jpg)\n\
  \n我们将在第 9 章中再次讨论追加模式。\n\n\n\n### 写入前锁定文件\n\n使用 `c` 模式调用 `fopen()` 的目的是让你在修改文件前有机会用\
  \ `flock()` 锁定它。`flock()` 函数接受两个参数：文件引用和一个指定锁定操作方式的常量。共有三种操作类型：\n- `LOCK_SH` 获取共享锁以进行读取\n\
  - `LOCK_EX` 获取独占锁以进行写入\n- `LOCK_UN` 释放锁定\n\n要在写入前锁定文件，请以 `c` 模式打开文件，并立即调用 `flock()`，如下所示：\n\
  \n```\n// 以 c 模式打开文件\n$file = fopen('C:/private/lock.txt', 'c');\n// 获取独占锁\nflock($file,\
  \ LOCK_EX);\n```\n\n这会打开文件（如果文件不存在则创建），并将内部指针置于文件开头。这意味着你需要将指针移动到文件末尾或删除现有内容，然后才能开始使用\
  \ `fwrite()` 写入。要将指针移动到文件末尾，请使用 `fseek()` 函数，如下所示：\n\n```\n// 移动到文件末尾\nfseek($file,\
  \ 0, SEEK_END);\n```\n\n或者，通过调用 `ftruncate()` 删除现有内容：\n\n```\n// 删除现有内容\nftruncate($file,\
  \ 0);\n```\n\n完成文件写入后，你必须在调用 `fclose()` 之前手动解锁文件：\n\n```\n// 在关闭前解锁文件\nflock($file,\
  \ LOCK_UN);\nfclose($file);\n```\n\n**注意**  \n根据 `flock()` 的文档，关闭文件时不再自动解锁（参见 [`http://php.net/manual/en/function.flock.php`](http://php.net/manual/en/function.flock.php)）。即使你可以重新打开该文件，它对于其他用户和进程仍然处于锁定状态。\n\
  \n### 防止覆盖已有文件\n\n与其他写入模式不同，`x` 模式不会打开已有文件。它只会创建一个准备写入的新文件。如果同名文件已存在，`fopen()` 返回\
  \ `false`，从而防止你覆盖它。`fopen_exclusive.php` 中的处理代码如下所示：\n\n```\n// 只在文件不存在时创建并准备写入\n\
  // 错误控制运算符用于阻止显示错误信息\nif ($file = @ fopen('C:/private/once_only.txt', 'x')) {\n\
  \   // 写入内容\n   fwrite($file, $_POST['contents']);\n   // 关闭文件\n   fclose($file);\n\
  } else {\n   $error = '文件已存在，无法被覆盖。';\n}\n```\n\n尝试以 `x` 模式写入已有文件会生成一系列 PHP 错误消息。将写入和关闭操作包裹在条件语句中可以处理大部分错误，但\
  \ `fopen()` 仍然会产生一个警告。在 `fopen()` 前使用错误控制运算符（`@`）可以抑制该警告。\n\n在浏览器中加载 `fopen_exclusive.php`，输入一些文本，然后点击“写入文件”。内容应被写入目标文件夹中的\
  \ `once_only.txt`。如果再次尝试，表单上方将显示存储在 `$error` 中的消息。\n\n### 使用 `fopen()` 进行组合读写操作\n\
  \n通过在之前的任何模式后添加加号（`+`），文件将以读写模式打开。你可以按任意顺序执行任意数量的读取或写入操作，直到文件被关闭。各组合模式的区别如下：\n\n\
  - `r+`：文件必须已存在；不会自动创建新文件。内部指针置于开头，准备读取现有内容。\n- `w+`：删除现有内容，因此首次打开文件时无内容可读。\n- `a+`：文件打开时内部指针位于末尾，准备追加新内容，因此在读取任何内容前需要将指针移回。\n\
  - `c+`：文件打开时内部指针位于开头。\n- `x+`：总是创建新文件，因此首次打开文件时无内容可读。\n\n读取使用 `fread()` 或 `fgets()`，写入使用\
  \ `fwrite()`，与之前完全相同。理解内部指针的位置非常重要。\n\n### 移动内部指针\n\n读取和写入操作始终从内部指针当前所在位置开始，因此通常你希望读取时指针位于文件开头，写入时位于文件末尾。要将指针移动到开头，像这样将文件引用传递给\
  \ `rewind()`：\n\n```\nrewind($file);\n```\n\n要将指针移动到文件末尾，像这样使用 `fseek()`：\n\n```\n\
  fseek($file, 0, SEEK_END);\n```\n\n你还可以使用 `fseek()` 将内部指针移动到特定位置或相对于当前位置的偏移位置。详情参见\
  \ [`http://php.net/manual/en/function.fseek.php`](http://php.net/manual/en/function.fseek.php)。\n\
  \n**提示**  \n在追加模式（`a` 或 `a+`）下，无论指针当前在什么位置，内容总是被写入到文件末尾。\n\n## 探索文件系统\n\nPHP 的文件系统函数也可以打开目录（文件夹）并检查其内容。在\
  \ PHP 解决方案 6-6 中，你实际使用了一个这样的函数：通过 `scandir()` 创建 `images` 文件夹中现有文件名的数组，并循环遍历该数组为上传的文件创建唯一名称。从\
  \ Web 开发者的角度来看，文件系统函数的其他实际用途包括：构建显示文件夹内容的下拉菜单，以及创建提示用户下载文件（如图片或 PDF 文档）的脚本。\n\n\
  ### 使用 `scandir()` 检查文件夹\n\n让我们更仔细地看一下你在 PHP 解决方案 6-6 中用过的 `scandir()` 函数。它返回一个包含指定文件夹内文件和子文件夹的数组。只需将文件夹（目录）的路径名作为字符串传递给\
  \ `scandir()`，并将结果存储在一个变量中，如下所示：\n\n```\n$files = scandir('../images');\n```\n\n\
  你可以使用 `print_r()` 显示数组内容来检查结果，如下方截图所示（代码在 `ch07` 文件夹的 `scandir.php` 中）：\n\n![A978-1-4842-0635-5_7_Figg_HTML.jpg](img/A978-1-4842-0635-5_7_Figg_HTML.jpg)\n\
  \n`scandir()` 返回的数组不仅仅包含文件。前两项是代表当前文件夹和父文件夹的点文件。最后一项是一个名为 `thumbs` 的文件夹。该数组仅包含每个项目的名称。如果你想获取有关文件夹内容的更多信息，最好使用\
  \ `FilesystemIterator` 类。\n\n\n\n### 使用 `FilesystemIterator` 检查文件夹内容\n\n`FilesystemIterator`\
  \ 类是标准 PHP 库（SPL）的组成部分。尽管名称如此，SPL 并非外部库或框架，而是 PHP 核心的一部分。其功能之一就是提供一系列专门的迭代器，让你用极少的代码实现复杂的循环。\n\
  \n`FilesystemIterator` 类是在 PHP 5.3 中新增的。它为原始的 `DirectoryIterator` 类添加了新功能，该类允许你遍历目录或文件夹的内容。\n\
  \n因为它是一个类，你可以使用 `new` 关键字实例化一个 `FilesystemIterator` 对象，并将要检查的文件夹路径传递给构造函数，像这样：\n\
  \n`$files = new FilesystemIterator('../images');`\n\n与 `scandir()` 不同，这不会返回一个文件名数组，因此你不能使用\
  \ `print_r()` 来显示其内容。相反，它会创建一个对象，让你可以访问文件夹内部的所有内容。要显示文件名，请使用 `foreach` 循环，如下所示（代码位于\
  \ `ch07` 文件夹中的 `iterator_01.php`）：\n\n```\n$files = new FilesystemIterator('../images');\n\
  foreach ($files as $file) {\n    echo $file . '<br>';\n}\n```\n\n这将产生以下结果：\n\n![A978-1-4842-0635-5_7_Figh_HTML.jpg](img/A978-1-4842-0635-5_7_Figh_HTML.jpg)\n\
  \n关于此输出，可以得出以下观察结果：\n\n-   代表当前文件夹和父文件夹的点文件被省略了。\n-   显示的值代表文件的相对路径，而不仅仅是文件名。\n\
  -   由于截图是在 Windows 上进行的，因此相对路径中使用了反斜杠。\n\n在大多数情况下，反斜杠并不重要，因为 PHP 在 Windows 路径中接受正斜杠或反斜杠。然而，如果你想根据\
  \ `FilesystemIterator` 的输出生成 URL，有一个选项可以使用 Unix 风格的路径。设置该选项的一种方法是将一个常量作为第二个参数传递给\
  \ `FilesystemIterator()`，如下所示（参见 `iterator_02.php`）：\n\n```\n$files = new FilesystemIterator('../images',\
  \ FilesystemIterator::UNIX_PATHS);\n```\n\n或者，你也可以像这样在 `FilesystemIterator` 对象上调用\
  \ `setFlags()` 方法（参见 `iterator_03.php`）：\n\n```\n$files = new FilesystemIterator('../images');\n\
  $files->setFlags(FilesystemIterator::UNIX_PATHS);\n```\n\n两者都会产生如下截图所示的输出。\n\n![A978-1-4842-0635-5_7_Figi_HTML.jpg](img/A978-1-4842-0635-5_7_Figi_HTML.jpg)\n\
  \n当然，这在 Mac OS X 或 Linux 上不会有什么不同，但设置此选项可以使你的代码更具可移植性。\n\n> **提示**\n> SPL 类使用的常量都是类常量。它们总是以类名和作用域解析运算符（双冒号）作为前缀。像这样冗长的名称使得使用带有\
  \ PHP 代码提示和代码补全功能的编辑程序非常值得。\n\n虽然能够显示文件夹内容的相对路径很有用，但使用 `FilesystemIterator` 类的真正价值在于，每次循环运行时，它都会让你访问一个\
  \ `SplFileInfo` 对象。`SplFileInfo` 类有近 30 个方法，可用于提取关于文件和文件夹的有用信息。表 7-3 列出了一些最有用的 `SplFileInfo`\
  \ 方法。\n\n**表 7-3.** 可通过 `SplFileInfo` 方法访问的文件信息\n\n| 方法 | 返回内容 |\n| --- | --- |\n\
  | `getFilename()` | 文件的名称 |\n| `getPath()` | 当前对象的相对路径（不含文件名），如果当前对象是文件夹，则不含文件夹名称\
  \ |\n| `getPathName()` | 当前对象的相对路径，根据当前类型包含文件名或文件夹名称 |\n| `getRealPath()` | 当前对象的完整路径，如果合适则包含文件名\
  \ |\n| `getSize()` | 文件或文件夹的大小（以字节为单位） |\n| `isDir()` | 如果当前对象是文件夹（目录），则返回 True\
  \ |\n| `isFile()` | 如果当前对象是文件，则返回 True |\n| `isReadable()` | 如果当前对象可读，则返回 True |\n\
  | `isWritable()` | 如果当前对象可写，则返回 True |\n\n要访问子文件夹的内容，请使用 `RecursiveDirectoryIterator`\
  \ 类。这将向下深入文件夹结构的每一层，但你需要将其与名称奇怪的 `RecursiveIteratorIterator` 结合使用，如下所示（代码位于 `iterator_04.php`）：\n\
  \n```\n$files = new RecursiveDirectoryIterator('../images');\n$files->setFlags(RecursiveDirectoryIterator::SKIP_DOTS);\n\
  $files = new RecursiveIteratorIterator($files);\nforeach ($files as $file) {\n \
  \   echo $file->getRealPath() . '<br>';\n}\n```\n\n> **注意**\n> 默认情况下，`RecursiveDirectoryIterator`\
  \ 包含代表当前文件夹和父文件夹的点文件。要排除它们，你需要将该类的 `SKIP_DOTS` 常量作为第二个参数传递给构造函数，或者使用 `setFlags()`\
  \ 方法。\n\n如下截图所示，`RecursiveDirectoryIterator` 会检查所有子文件夹的内容，在一次操作中揭示 `thumbs` 文件夹的内容：\n\
  \n![A978-1-4842-0635-5_7_Figj_HTML.jpg](img/A978-1-4842-0635-5_7_Figj_HTML.jpg)\n\
  \n如果你只想查找特定类型的文件呢？那就轮到另一个迭代器出场了……\n\n### 使用 `RegexIterator` 限制文件类型\n\n`RegexIterator`\
  \ 充当另一个迭代器的包装器，使用正则表达式作为搜索模式来过滤其内容。假设你想在 `ch07` 文件夹中查找文本文件和 CSV 文件。用于搜索 `.txt` 和\
  \ `.csv` 文件扩展名的正则表达式如下所示：\n\n```\n'/\\.(?:txt|csv)$/i'\n```\n\n这个正则表达式以不区分大小写的方式匹配这两种文件扩展名。`iterator_05.php`\
  \ 中的代码如下所示：\n\n```\n$files = new FilesystemIterator('.');\n$files = new RegexIterator($files,\
  \ '/\\.(?:txt|csv)$/i');\nforeach ($files as $file) {\n    echo $file->getFilename()\
  \ . '<br>';\n}\n```\n\n第一行将一个点传递给 `FilesystemIterator` 构造函数，这会告诉它检查当前文件夹。\n\n然后，原始的\
  \ `$files` 对象作为第一个参数传递给 `RegexIterator` 构造函数，正则表达式作为第二个参数，过滤后的集合被重新赋值给 `$files`。在\
  \ `foreach` 循环内部，`getFilename()` 方法检索文件的名称。结果如下：\n\n![A978-1-4842-0635-5_7_Figk_HTML.jpg](img/A978-1-4842-0635-5_7_Figk_HTML.jpg)\n\
  \n现在只列出了文本文件和 CSV 文件。所有的 PHP 文件都被忽略了。\n\n> **提示**\n> 随着你阅读本书的深入，你会看到我会频繁使用正则表达式。它们是值得添加到你的技能库中的有用工具。\n\
  \n我想到了这个阶段，你可能会想知道这是否可以用于任何实际的用途。让我们来构建一个文件夹内图片的下拉菜单。\n\n\n\n"
- '# PHP 解决方案 7-3：构建文件下拉菜单


  在处理数据库时，您经常需要获取特定文件夹中的图片或其它文件列表。例如，您可能希望为商品详情页面关联一张照片。虽然您可以在文本字段中手动输入图片名称，但必须确保图片存在且名称拼写正确。让
  PHP 通过自动构建下拉菜单来完成这项艰巨任务。菜单始终保持最新状态，且绝无拼写错误的风险。


  在 `filesystem` 文件夹中创建一个名为 `imagelist.php` 的 PHP 页面。或者，使用 `ch07` 文件夹中的 `imagelist_01.php`。在
  `imagelist.php` 内创建一个表单，并插入一个仅包含一个 `<option>` 的 `<select>` 元素，如下所示（该代码已包含在 `imagelist_01.php`
  中）：


  ```

  <form method="post" action="">

  <select name="pix" id="pix">

  <option value="">选择一张图片</option>

  </select>

  </form>

  ```


  这个 `<option>` 是下拉菜单中唯一的静态元素。


  按如下方式修改表单中的 `<select>` 元素：


  ```

  <select name="pix" id="pix">

  <option value="">选择一张图片</option>

  <?php

  $files = new FilesystemIterator(''../images'');

  $images = new RegexIterator($files, ''/\.(?:jpg|png|gif)$/i'');

  foreach ($images as $image) {

  $filename = $image->getFilename();

  ?>

  <option value="<?= $filename; ?>"><?= $filename; ?></option>

  <?php } ?>

  </select>

  ```


  请确保 `images` 文件夹的路径与您站点的文件夹结构相匹配。作为 `RegexIterator` 构造函数的第二个参数的正则表达式，用于不区分大小写地匹配文件扩展名为
  `.jpg`、`.png` 和 `.gif` 的文件。


  `foreach` 循环仅获取当前图片的文件名，并将其插入到 `<option>` 元素中。


  保存 `imagelist.php` 并在浏览器中加载。您应该会看到一个下拉菜单，列出了 `images` 文件夹中的所有图片，如图 7-2 所示。


  ![A978-1-4842-0635-5_7_Fig2_HTML.jpg](img/A978-1-4842-0635-5_7_Fig2_HTML.jpg)


  **图 7-2.** PHP 轻松创建指定文件夹中图片的下拉菜单


  当融入在线表单后，所选图片的文件名会出现在 `$_POST` 数组中，并通过 `<select>` 元素的 `name` 属性进行标识——在本例中为 `$_POST[''pix'']`。就是这么简单！


  您可以将您的代码与 `ch07` 文件夹中的 `imagelist_02.php` 进行比较。


