    7. 最终的输出视图显示给客户端。


    **图 3-1.** *MVC 结构中的登录流程图*


    `MVC` 结构非常有用，因为它允许你将网站的不同流程分离开来。例如，当需要更改或添加新的表单字段时，你只需找到相应的视图文件并做出修改。你无需在 `PHP`
    输出函数或脚本中筛选，就知道所有视图都包含在 `views` 文件夹中。控制器和模型也是如此。某些功能在整个应用程序中可用，无需任何 `include` 包含。在非
    `MVC` 应用程序中，管理所有包含文件或库的路径会随着程序增长而变得困难；在这方面，`MVC` 架构有助于保持应用程序更灵活。表 3-1 解释了模型、视图和控制器分别处理什么；这些文件在
    `Cake` 中的存储位置；以及文件的命名方式。


    **表 3-1.** *MVC 结构区域*


    | 区域 | 处理流程类型 | 文件名称及在应用程序中的位置 |

    |------|-------------|------------------------------|

    | 模型 | 处理所有数据库功能 | `app/models/{模型名称}.php` |

