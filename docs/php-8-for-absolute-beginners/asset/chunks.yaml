    \ to be displayed in the dashboard. Using these techniques will improve the performance\
    \ of data analysis using PHP.\n\nLet us look at one last logical example before\
    \ we close our last chapter.\n\n## Creating the Logic for a Checkers Game\n\n\
    In this section, we will look at the logic in creating a checkers game. The intent\
    \ is to demonstrate the important use of arrays to accomplish our mission. Hopefully,\
    \ this example will demonstrate that an understanding of arrays is essential in\
    \ becoming a good programmer. This exercise will also give us an opportunity to\
    \ use embedded if/then/else structures and case statements. Along the way, we\
    \ will also discover the use of the PHP substring function.\n\nThis example will\
    \ provide several demonstrations on creating and updating a two-dimensional array\
    \ which represents a checkerboard. It is not the intent of this example to provide\
    \ the complete working code or the most efficient code. A more efficient example\
    \ would include the use of recursive looping with objects. Something that is much\
    \ more advanced than a beginning programmer should try to tackle. Once you have\
    \ grasped this example (which might take a while to completely absorb), you can\
    \ expand your knowledge by looking at the many examples on creating a checkers\
    \ game on the Internet.\n\n![](images/323857_3_En_10_Chapter/323857_3_En_10_Fig2_HTML.jpg)\n\
    \nThis empty checkerboard consists of 8 rows and 8 columns with two dimensional\
    \ array, they are highlighted by using black and red colors.\n\nFigure 10-2\n\
    Empty checkerboard\n\n1. What is the first thing we do when we play checkers?\
    \ Open the box and lay the board out on a table.\n   This would map directly to\
    \ the first logical step in creating a checkers game. A `display_board()` function\
    \ could be designed to show the initial board. Each time the user makes a move,\
    \ the board will need to be redrawn to indicate a change in what is displayed.\
    \ Thus, the `display_board()` function would be called every time the board must\
    \ be redrawn.\n   Since the location of checkers on the board continuously changes,\
    \ there needs to be a way to save these changes. As you can see from Figure [10-2](#323857_3_En_10_Chapter.xhtml#Fig2),\
    \ the checkerboard has rows and columns just like a two-dimensional array. We\
    \ can use a two-dimensional array to represent the board and its contents.\n \
    \  The board has eight columns and eight rows. The red and black colors alternate\
    \ by column and by row.\n\n```\nListing 10-30\nInitial Checkerboard Array (checkerarray.php)\n\
    ```\n\n**Note**\nIn the image above the red and black squares are reversed from\
    \ the image below. The arrays demonstrated are related to the images discussed."
  raw: 'We use *Control Wrappers* to set up each item we want to display

    in the dashboard. For the *range slider* (which the user can

    adjust and will automatically adjust the data displayed), we declare the

    div tag (`filter_div`) which

    will hold the slider, declare the actual range control to use (`NumberRangeFilter`),

    and declare that the numeric column name be displayed.


    ```

    var pieChart = new google.visualization.ChartWrapper({

    ''chartType'': ''PieChart'',

    ''containerId'': ''chart_div'',

    ''options'': {

    ''width'': 300,

    ''height'': 300,

    ''pieSliceText'': ''" . $Label . "'',

    ''legend'': ''right''

    }

    });

    ```


    For the *PieChart*, we have similar settings, but also include

    some formatting, such as width and height. The label displayed will be

    the column name which is not specifically numeric. The *line

    chart* and *column chart*   have similar

    settings.


    ```

    var tableChart = new google.visualization.ChartWrapper({

    chartType: ''Table'',

    containerId: ''table_div'',

    options: {

    ''allowHtml'': true,

    ''page'': ''enable'',

    ''width'':''48%'',

    ''height'':''250px'',

    ''pageSize'': 10,

    ''alternatingRowStyle'' : true

    }

    });

    ```


    The  *Table

    chart*  has additional settings, including the ability to

    display HTML, paging ability (for more than ten rows), alternating row

    colors, and width and height settings.


    ```

    var formatter = new google.visualization.BarFormat({width: 120});

    formatter.format(data, 1); // Apply formatter to second column

    // Establish dependencies, declaring that ''filter'' drives ''pieChart'',

    // so that the pie chart will only display entries that are let through

    // given the chosen slider range.

    dashboard.bind(donutRangeSlider, [pieChart, tableChart, columnChart, lineChart]);

    // Draw the dashboard.

    dashboard.draw(data);

    }


    Listing 10-28

    Partial Listing of googleDashboard.php

    ```


    We can now *bind* the charts to the dashboard. This will cause

    all the charts bound to adjust (via AJAX) whenever the user slides the

    range bar. Finally, we can `draw`   the dashboard. Of

    course, we need a place to display all the dashboard information.


    ```


    ";

    return $info;

    Listing 10-29

    Partial Listing of googleDashboard.php

    ```


    The HTML code contains the `div` tags to define

    the location of the dashboard, slider, and charts. It also includes some

    formatting with CSS.


    We can now run `index.php` from our

    browser, pick the data type, file (or database and table), and columns.

    Then our dashboard appears!


    ![](images/323857_3_En_10_Chapter/323857_3_En_10_Fig1_HTML.jpg)


    Two bar graphs, pie chart and line graph represent dashboard display,

    the y axis reflects semester average and the x axis is gender.


    Figure 10-1

    Dashboard display from index.php


    Not a bad-looking dashboard! Play with the slider control. Select

    different columns. It is very interactive! There is a lot more that we

    can do and display. However, the formatting logic is similar for the

    over 30 charts you can use in a Google Dashboard.


    Note


    For more information on Google Charts, visit [`https://developers.google.com/chart`](https://developers.google.com/chart)
    .


    Hopefully, this has increased your interest in what else PHP can do

    besides display web pages. When we receive data from outside sources, it

    can come in many formats. We used four common formats in this example.

    Sometimes, we need to merge data and eliminate any data that is invalid.

    While we can use one of PHP’s many array functions (there are a lot) to

    merge our data, it will not be as efficient as using our source data

    platform to merge data. For example, if our data is all MySQL/MariaDB,

    we will have a much more efficient merging of data using the *SQL

    JOIN clause*.


    Note


    For more information on the SQL JOIN clause, visit [`www.w3schools.com/sql/sql_join.asp`](http://www.w3schools.com/sql/sql_join.asp)
    .


    For multiple data sources that are Excel, we can use the

    *Consolidate Data Tool*.


    Note


    For more information on the merging Excel spreadsheets, visit [`https://support.microsoft.com/en-us/office/combine-data-from-multiple-sheets-dd7c7a2a-4648-4dbe-9a11-eedeba1546b4`](https://support.microsoft.com/en-us/office/combine-data-from-multiple-sheets-dd7c7a2a-4648-4dbe-9a11-eedeba1546b4)
    .


    For mixed data sources, we can either use an open source merging tool

    or transform  our

    data using PHP into either MySQL/MariaDB or Excel data and use the

    methods we just mentioned. Anytime we want to merge data (even if we are

    using another programming language), we should use a data management

    system function, when available. They are efficient and, in many cases,

    can manage the merging of a lot of data. Always error on the side of

    efficiency!

    **Exercise**: Using one of the techniques mentioned,

    merge data from multiple sources and then display the results using our

    Google Charts program.

    One final note, the same should be said for any calculations we want

    to perform, such as creating averages, means, and modes. Use the tools

    available in the data management application to perform the math

    required, and then return the results back to the PHP program to be

    displayed in the dashboard. Using these techniques will improve the

    performance of data analysis using PHP.

    Let us look at one last logical example before we close our last

    chapter.


    Creating the Logic for a Checkers Game

    In this section, we will look at the logic in creating a checkers

    game . The intent

    is to demonstrate the important use of arrays to accomplish our mission.

    Hopefully, this example will demonstrate that an understanding of arrays

    is essential in becoming a good programmer. This exercise will also give

    us an opportunity to use embedded if/then/else structures and case

    statements. Along the way, we will also discover the use of the PHP

    substring function.


    This example will provide several demonstrations on creating and

    updating a two-dimensional array which represents a checkerboard . It is

    not the intent of this example to provide the complete working code or

    the most efficient code. A more efficient example would include the use

    of recursive looping with objects. Something that is much more advanced

    than a beginning programmer should try to tackle. Once you have grasped

    this example (which might take a while to completely absorb), you can

    expand your knowledge by looking at the many examples on creating a

    checkers game on the Internet.


    ![](images/323857_3_En_10_Chapter/323857_3_En_10_Fig2_HTML.jpg)


    This empty checkerboard consists of 8 rows and 8 columns with two

    dimensional array, they are highlighted by using black and red

    colors.


    Figure 10-2

    Empty checkerboard


    1\. What is the first thing we do when we play checkers? Open the box

    and lay the board out on a table.

    This would map directly to the first logical step in creating a

    checkers game. A `display_board()`

    function could be designed to show the initial board. Each time the user

    makes a move, the board will need to be redrawn to indicate a change in

    what is displayed. Thus, the `display_board()`

    function would be called every time the board must be redrawn.

    Since the location of checkers on the board continuously changes,

    there needs to be a way to save these changes. As you can see from

    Figure [10-2](#323857_3_En_10_Chapter.xhtml#Fig2), the

    checkerboard has rows and columns just like a two-dimensional array .

    We can use a two-dimensional array to represent the board and its

    contents.


    The board has eight columns and eight rows. The red and black colors

    alternate by column and by row.


    ```

    Listing 10-30

    Initial Checkerboard Array (checkerarray.php)

    ```


    Note


    In the image above the red and black squares are reversed from the

    image below. The arrays demonstrated are related to the images

    discussed.'
  trans: "\n我们使用*控件包装器*来设置仪表盘中要显示的每个项目。对于*范围滑块*（用户可调整，并会自动调整显示的数据），我们声明了用于容纳滑块的`div`标签（`filter_div`），声明了要使用的实际范围控件（`NumberRangeFilter`），并声明要显示数字列名称。\n\
    \n```javascript\nvar pieChart = new google.visualization.ChartWrapper({\n'chartType':\
    \ 'PieChart',\n'containerId': 'chart_div',\n'options': {\n'width': 300,\n'height':\
    \ 300,\n'pieSliceText': '\" . $Label . \"',\n'legend': 'right'\n}\n});\n```\n\n\
    对于*饼图*，我们有类似的设置，但也包含一些格式设置，例如宽度和高度。显示的标签将是并非专门数字的列名称。*折线图*和*柱状图*具有类似的设置。\n\n```javascript\n\
    var tableChart = new google.visualization.ChartWrapper({\nchartType: 'Table',\n\
    containerId: 'table_div',\noptions: {\n'allowHtml': true,\n'page': 'enable',\n\
    'width':'48%',\n'height':'250px',\n'pageSize': 10,\n'alternatingRowStyle' : true\n\
    }\n});\n```\n\n*表格图*具有额外的设置，包括显示 HTML 的能力、分页功能（超过十行时）、交替行颜色以及宽度和高度设置。\n\n```javascript\n\
    var formatter = new google.visualization.BarFormat({width: 120});\nformatter.format(data,\
    \ 1); // 将格式化器应用于第二列\n// 建立依赖关系，声明 'filter' 驱动 'pieChart'，\n// 这样饼图将只显示在所选滑块范围内允许通过的条目。\n\
    dashboard.bind(donutRangeSlider, [pieChart, tableChart, columnChart, lineChart]);\n\
    // 绘制仪表盘。\ndashboard.draw(data);\n}\n```\n\n列表 10-28\ngoogleDashboard.php 的部分清单\n\
    \n现在，我们可以将图表*绑定*到仪表盘。这将导致所有绑定的图表在用户滑动范围条时（通过 AJAX）自动调整。最后，我们可以`draw`（绘制）仪表盘。当然，我们需要一个地方来显示所有的仪表盘信息。\n\
    \n```\n\";\nreturn $info;\n列表 10-29\ngoogleDashboard.php 的部分清单\n```\n\nHTML 代码包含用于定义仪表盘、滑块和图表位置的`div`标签。它还包括一些使用\
    \ CSS 进行的格式设置。\n\n现在，我们可以从浏览器运行`index.php`，选择数据类型、文件（或数据库和表）以及列。然后，我们的仪表盘就出现了！\n\
    \n![](img/323857_3_En_10_Fig1_HTML.jpg)\n\n两个条形图、饼图和折线图代表仪表盘显示，y 轴反映学期平均分，x 轴是性别。\n\
    \n图 10-1\n来自 index.php 的仪表盘显示\n\n看起来不错的仪表盘！可以操作滑块控件。选择不同的列。它非常具有交互性！我们可以做和显示的事情还有很多。然而，对于您可以在\
    \ Google 仪表盘中使用的 30 多种图表而言，其格式化逻辑是相似的。\n\n**注意**\n有关 Google 图表的更多信息，请访问 [`https://developers.google.com/chart`](https://developers.google.com/chart)。\n\
    \n希望这增加了您对 PHP 除了显示网页之外还能做什么的兴趣。当我们从外部来源接收数据时，它可以有多种格式。在此示例中，我们使用了四种常见格式。有时，我们需要合并数据并消除任何无效数据。虽然我们可以使用\
    \ PHP 的众多数组函数之一（数量很多）来合并数据，但使用我们的源数据平台来合并数据会更高效。例如，如果我们的数据全部是 MySQL/MariaDB 的，那么使用\
    \ *SQL JOIN 子句* 合并数据将高效得多。\n\n**注意**\n有关 SQL JOIN 子句的更多信息，请访问 [`www.w3schools.com/sql/sql_join.asp`](http://www.w3schools.com/sql/sql_join.asp)。\n\
    \n对于多个 Excel 数据源，我们可以使用*合并数据工具*。\n\n**注意**\n有关合并 Excel 电子表格的更多信息，请访问 [`https://support.microsoft.com/en-us/office/combine-data-from-multiple-sheets-dd7c7a2a-4648-4dbe-9a11-eedeba1546b4`](https://support.microsoft.com/en-us/office/combine-data-from-multiple-sheets-dd7c7a2a-4648-4dbe-9a11-eedeba1546b4)。\n\
    \n对于混合数据源，我们可以使用开源合并工具，或者使用 PHP 将我们的数据转换为 MySQL/MariaDB 或 Excel 数据，然后使用我们刚刚提到的方法。任何时候我们想要合并数据（即使我们使用另一种编程语言），我们都应该尽可能使用数据管理系统功能。它们高效，并且在许多情况下可以管理大量数据的合并。始终偏向于效率！\n\
    \n**练习**：使用提到的一种技术，合并来自多个来源的数据，然后使用我们的 Google 图表程序显示结果。\n\n最后一点，对于我们想要执行的任何计算（例如创建平均值、中位数和众数），应使用数据管理应用程序中可用的工具来执行所需的数学运算，然后将结果返回到\
    \ PHP 程序以在仪表盘中显示。使用这些技术将提高使用 PHP 进行数据分析的性能。\n\n在我们结束最后一章之前，让我们再看一个逻辑示例。\n\n##\
    \ 创建跳棋游戏的逻辑\n\n在本节中，我们将探讨创建跳棋游戏的逻辑。目的是演示使用数组来完成我们的任务的重要性。希望这个例子能表明理解数组对于成为一名优秀的程序员至关重要。这个练习还将给我们提供一个使用嵌入式\
    \ if/then/else 结构和 case 语句的机会。在这个过程中，我们还将发现 PHP 子字符串函数的用法。\n\n此示例将提供几个关于创建和更新表示棋盘二维数组的演示。本示例的目的并非提供完整的运行代码或最高效的代码。更高效的示例将包括使用对象进行递归循环。这对于初学者来说过于高级。一旦您掌握了这个示例（可能需要一段时间才能完全吸收），您可以通过查看互联网上许多关于创建跳棋游戏的示例来扩展您的知识。\n\
    \n![](img/323857_3_En_10_Fig2_HTML.jpg)\n\n这个空棋盘由 8 行 8 列组成，带有二维数组，通过使用黑色和红色来突出显示。\n\
    \n图 10-2\n空棋盘\n\n1. 我们下跳棋时做的第一件事是什么？打开盒子，把棋盘放在桌子上。\n   这可以直接映射到创建跳棋游戏的第一个逻辑步骤。可以设计一个\
    \ `display_board()` 函数来显示初始棋盘。每次用户移动棋子时，都需要重绘棋盘以指示显示内容的变化。因此，每当需要重绘棋盘时，都会调用 `display_board()`\
    \ 函数。\n   由于棋盘上棋子的位置不断变化，需要有一种方法来保存这些变化。从图 10-2 可以看出，棋盘的行和列就像一个二维数组。我们可以使用一个二维数组来表示棋盘及其内容。\n\
    \   棋盘有八列八行。红色和黑色方格按列和行交替排列。\n\n```\n列表 10-30\n初始棋盘数组 (checkerarray.php)\n```\n\
    \n**注意**\n在上图中，红色和黑色方格与下图中的相反。所演示的数组与讨论的图像相关。\n"
- fmt: "# 排版后内容\n\nOnce the array has been created, as shown, the `display_board()`\
    \ function can loop through the array, display the proper board, and color combinations\
    \ using either a series of embedded `if` statements or a `switch` statement. While\
    \ the `switch` statement was discussed in Chapter [5](#323857_3_En_5_Chapter.xhtml),\
    \ we have not had an opportunity to demonstrate it. The following example shows\
    \ how the `switch` statement can make it easier to understand the logic of the\
    \ code.\n\n```\nListing 10-31\ndisplay_board Function (display_board.php)\n```\n\
    \nThe basic structure will loop through each position in the array, determine\
    \ the color needed, and then display the color. Since there are many ways that\
    \ the actual board image could be created, this code is left to the reader to\
    \ determine.\n\nWe might create a two-dimensional table to contain each square.\
    \ The squares then can be created using color blocks designed with HTML or we\
    \ could insert small images for each position.\n\n**Exercise**: Decide how you\
    \ would like to display your red and white squares and add code to the `switch`\
    \ structure to display the checkerboard.\n\n2\\. After the player lays out the\
    \ board on a table, the pieces are then placed in their proper positions. In an\
    \ application, this can be done by replacing the positions in the array with the\
    \ checkers pieces.\n\n![](images/323857_3_En_10_Chapter/323857_3_En_10_Fig3_HTML.jpg)\n\
    \nA 2D checkerboard filled with pieces, it consists of 8 rows and 8 columns, red\
    \ and black color squares are used for the board.\n\n**Figure 10-3** Checkerboard\
    \ with pieces\n\nThe programmer could choose to start the game with the pieces\
    \ already on the board or require the user to indicate they are ready to play\
    \ (such as clicking a `'start game'` button). We will assume that the player must\
    \ indicate they want to start a game (or a new game).\n\nA `start_game()` function\
    \ could execute each time the `'start game'` button is clicked. This function\
    \ places the checker pieces in the proper positions by updating the array containing\
    \ the board and then calling the `display_board()` function to show the board\
    \ with the checker pieces. As we know or can see from the previous image, all\
    \ pieces go on the black squares. For the white pieces, the first-row pieces are\
    \ in odd locations, the second row is even (assuming zero is even), and the third\
    \ row odd again. The red pieces work in reverse.\n\n```\nListing 10-32\nstart_game\
    \ Function (start_game.php)\n```\n\nThe outside `for` loop (containing `$I`) controls\
    \ the rows. Then the initial `if` statement uses `$I` to determine if the row\
    \ is even (again assuming that zero is even). If the row is even and not the empty\
    \ row (4), then the `$J for` loop is called. This loop starts at column 1 (because\
    \ a checker is not placed in column 0 on the zero row) and places a red or white\
    \ checker in each black square on the board. If it is the sixth row, a `\"red\
    \ checker\"` is placed. If it is any other row, a `\"white checker\"` is placed.\n\
    \n**Suggestion**: Either use a checkerboard or draw a checkerboard on paper and\
    \ follow along with the logic of these examples.\n\n> **Note**  \n> This example\
    \ does not wipe out any checkers that are in the `\"blank\"` rows. This could\
    \ be accomplished by coding a loop for the two rows involved and setting each\
    \ usable position to `\"black\"`.\n\nThe `else` part of the `if` statement manages\
    \ the odd numbered rows. The logic is the same except `$I` start at 0 instead\
    \ of 1. Also, if the row is 1, then a `\"white checker\"` is placed in the position.\
    \ Otherwise, a `\"red checker\"` is placed. It skips the third empty row. After\
    \ executing the `start_game()` function, the array would now contain the following.\n\
    \n```\nListing 10-33\nCheckerboard Array After Executing Start Game Function (game_start_array.php)\n\
    ```\n\nWe will need to make some changes to the `display_board()` function to\
    \ manage the addition of the checkers.\n\n```\nListing 10-34\nDisplay Board Function\
    \ Version 2 (display_board_version2.php)\n```\n\nWe have added `case` procedures\
    \ to manage the white and red checkers that now exist in the array. When the `start_game()`\
    \ function calls this `display_board()` function, the board will display with\
    \ the checkers in the proper positions.\n\n3\\. It is now time for one of our\
    \ players to move a checker. Let's only be concerned with trying to move a piece\
    \ and not all the other factors that may affect our movement. We can always add\
    \ to a working function after we determine the basic moves.\n\nTop of board\n\n\
    ```\nx     w     x          w     x\nw     x     start     x     w\nx     a  \
    \   x         b     x\n```\n\nUsing the preceding diagram, following the rules\
    \ of checkers, if we want to move the `'start'` white checker (not yet a king),\
    \ it can only move to position `'a'` or `'b'`. All other positions are not valid.\
    \ Notice that position `'a'` is one row more than `'start'`. Also notice that\
    \ position `'b'` is one more row than `'start'`.\n\nThus, part of a valid move\
    \ is movement only to the next row (we are not concerned with jumps yet). The\
    \ column of `'a'` is one less than the column of `'start'`. The column of `'b'`\
    \ is one more than the column of `'start'`. This indicates that a valid move is\
    \ also determined if the column move is one less or one more than the original\
    \ column. Try this logic and you will discover that this holds true for all moves\
    \ from the top of the board toward the bottom of the board (until it becomes a\
    \ king).\n\n```\nX       a      x          b      x\nw      x      start     \
    \ x      w\nx      w      x          w      x\n```\n\nBottom of board\n\nIf we\
    \ want to move a `'start'` red checker, it moves in the reverse direction. The\
    \ valid moves are indicated by positions `'a'` and `'b'`. Notice that the valid\
    \ columns, again, are either one more or one less than the column of `'start'`.\
    \ The only difference is that the row will be one less than the row of `'start'`.\
    \ With the white `'start'` checker, it was one more.\n\nIn order to determine\
    \ valid moves, we will need to collect the original position (row, column) of\
    \ the checker about to be moved and the location that the user is attempting to\
    \ move the checker. Then we will need to make the comparison just described in\
    \ the last couple of paragraphs.\n\n> **Note**  \n> We could do the following\
    \ collection of information by creating objects for each position in the board.\
    \ However, to simplify this example, as much as possible, we will use a different\
    \ technique.\n\nIf every black square on the board is a button and every red square\
    \ is just an image, we eliminate the worry about the user trying to jump to a\
    \ red square or even outside the board itself. We just have to concern ourselves\
    \ with the restrictions already discussed.\n\nEach black button will actually\
    \ perform the same code, with one exception – the saving of its location in the\
    \ `$checker_board()` array.\n\nWe can call a function from any of the buttons\
    \ and pass the location in the array of that button.\n\n```\nmake_move(3, 3);\n\
    ```\n\nEach button can pass the row and column of its location in the array into\
    \ the `make_move()` function. The `make_move()` function will then determine if\
    \ this is the first click (selecting the checker) or second click (indicating\
    \ where the checker will move).\n\n```\nListing 10-35\nMake Move Function (make_move.php)\n\
    ```\n\nThe `make_move()` function must determine if it is the first click or second\
    \ click. If it is the first click, the `$first_click` flag is set to `true`. Then\
    \ the row and column that were passed into the function are saved into `$first_row`\
    \ and `$first_column`. That is all that is needed with the first click. If it\
    \ is a second click, then `$first_click` is set back to `false`, the values for\
    \ the row and column are saved in `$second_row` and `$second_column`, and the\
    \ four row and column values are passed into a `valid_move()` function.\n\n```\n\
    Listing 10-36\nValid Move Function (If Statement) (valid_move.php)\n```"
  raw: "Once the array has been created, as shown, the `display_board()`\nfunction\
    \ can loop through the array, display the proper board, and color\ncombinations\
    \ using either a series of embedded if statements or a\n*switch* statement. While\
    \ the switch statement was discussed in\nChapter [5](#323857_3_En_5_Chapter.xhtml),\
    \ we have not had an opportunity to\ndemonstrate it. The following example shows\
    \ how the switch statement can\nmake it easier to understand the logic of the\
    \ code.\n\n```\nListing 10-31\ndisplay_board Function (display_board.php)\n```\n\
    \nThe basic structure will loop through each position in the array,\ndetermine\
    \ the color needed, and then display the color. Since there are\nmany ways that\
    \ the actual board image could be created, this code is\nleft to the reader to\
    \ determine.\nWe might create a two-dimensional table to contain each square.\
    \ The\nsquares then can be created using color blocks designed with HTML or we\n\
    could insert small images for each position.\n**Exercise**: Decide how you would\
    \ like to display your\nred and white squares and add code to the switch structure\
    \ to display\nthe checkerboard.\n\n2\\. After the player lays out the board on\
    \ a table, the pieces are then\nplaced in their proper positions. In an application,\
    \ this can be done by\nreplacing the positions in the array with the checkers\
    \ pieces .\n\n![](images/323857_3_En_10_Chapter/323857_3_En_10_Fig3_HTML.jpg)\n\
    \nA 2D checkerboard filled with pieces, it consists of 8 rows and 8\ncolumns,\
    \ red and black color squares are used for the board.\n\nFigure 10-3\nCheckerboard\
    \ with pieces\n\nThe programmer could choose to start the game with the pieces\
    \ already\non the board or require the user to indicate they are ready to play\n\
    (such as clicking a ‘start game’ button). We will assume that the player\nmust\
    \ indicate they want to start a game (or a new game).\n\nA `start_game`()\nfunction\
    \  could\nexecute each time the `'start game'` button\nis clicked. This function\
    \ places the checker pieces in the proper\npositions by updating the array containing\
    \ the board and then calling\nthe `display_board()`\nfunction to show the board\
    \ with the checker pieces. As we know or can\nsee from the previous image, all\
    \ pieces go on the black squares. For the\nwhite pieces, the first-row pieces\
    \ are in odd locations, the second row\nis even (assuming zero is even), and the\
    \ third row odd again. The red\npieces work in reverse.\n\n```\nListing 10-32\n\
    start_game Function (start_game.php)\n```\n\nThe outside `for` loop (containing\n\
    `$I`) controls\nthe rows. Then the initial `if` statement uses\n`$I` to determine\n\
    if the row is even (again assuming that zero is even). If the row is\neven and\
    \ not the empty row (4), then the `$J for` loop is\ncalled. This loop starts at\
    \ column 1 (because a checker is not placed in\ncolumn 0 on the zero row) and\
    \ places a red or white checker in each\nblack square on the board. If it is the\
    \ sixth row, a `\"red checker\"` is\nplaced. If it is any other row, a `\"white\
    \ checker\"` is\nplaced.\n**Suggestion**: Either use a checkerboard or draw a\n\
    checkerboard on paper and follow along with the logic of these\nexamples.\n\n\
    Note\n\nThis example does not wipe out any checkers that are in the `“blank”`\
    \ rows. This\ncould be accomplished by coding a loop for the two rows involved\
    \ and\nsetting each usable position to `\"black\"`.\n\nThe `else` part\nof the\
    \ `if`\nstatement manages the odd numbered rows. The logic is the same except\n\
    `$I` start at 0\ninstead of 1\\. Also, if the row is 1, then a `\"white checker\"\
    ` is\nplaced in the position. Otherwise, a `\"red checker\"` is\nplaced. It skips\
    \ the third empty row. After executing the `start_game()`\nfunction, the array\
    \ would now contain the following.\n\n```\nListing 10-33\nCheckerboard Array After\
    \ Executing Start Game Function (game_start_array.php)\n```\n\nWe will need to\
    \ make some changes to the `display_board()`\nfunction to manage the addition\
    \ of the checkers.\n\n```\nListing 10-34\nDisplay Board Function Version 2 (display_board_version2.php)\n\
    ```\n\nWe have added `case` procedures to\nmanage the white and red checkers that\
    \ now exist in the array. When the\n`start_game()`\nfunction calls this `display_board()`\n\
    function, the board will display with the checkers in the proper\npositions.\n\
    3\\. It is now time for one of our players to move a checker. Let’s\nonly be concerned\
    \ with trying to move a piece and not all the other\nfactors that may affect our\
    \ movement. We can always add to a working\nfunction after we determine the basic\
    \ moves.\n\nTop of board\n\n```\nx     w     x          w     x\nw     x     start\
    \     x     w\nx     a     x         b     x\n```\n\nUsing the preceding diagram,\
    \ following the rules of checkers, if we\nwant to move the `'start'` white checker\n\
    (not yet a king), it can only move to position `'a'` or `'b'`. All other\npositions\
    \ are not valid. Notice that position `'a'` is one row more\nthan `'start'`.\n\
    Also notice that position `'b'` is one more row\nthan `'start'`.\n\nThus, part\
    \ of a valid move is movement only to the next row (we are not\nconcerned with\
    \ jumps yet). The column of `'a'` is one less than\nthe column of `'start'`. The\
    \ column\nof `'b'` is one\nmore than the column of `'start'`. This\nindicates\
    \ that a valid move is also determined if the column move is one\nless or one\
    \ more than the original column. Try this logic and you will\ndiscover that this\
    \ holds true for all moves from the top of the board\ntoward the bottom\n of the\
    \ board (until it becomes a king).\n\n```\nX       a      x          b      x\n\
    w      x      start      x      w\nx      w      x          w      x\n```\n\n\
    Bottom of board\nIf we want to move a `‘start’` red checker,\nit moves in the\
    \ reverse direction. The valid moves are indicated by\npositions `‘a’`\nand `‘b’`.\
    \ Notice\nthat the valid columns, again, are either one more or one less than\
    \ the\ncolumn of `‘start’`. The only\ndifference is that the row will be one less\
    \ than the row of `‘start’`. With the\nwhite `‘start’`\nchecker, it was one more.\n\
    In order to determine valid moves, we will need to collect the\noriginal position\
    \ (row, column) of the checker about to be moved and the\nlocation that the user\
    \ is attempting to move the checker. Then we will\nneed to make the comparison\
    \ just described in the last couple of\nparagraphs.\n\nNote\n\nWe could do the\
    \ following collection of information by creating\nobjects for each position in\
    \ the board. However, to simplify this\nexample, as much as possible, we will\
    \ use a different technique.\n\nIf every black square on the board is a button\
    \ and every red square\nis just an image, we eliminate the worry about the user\
    \ trying to jump\nto a red square or even outside the board itself. We just have\
    \ to\nconcern ourselves with the restrictions already discussed.\nEach black button\
    \ will actually perform the same code, with one\nexception – the saving of its\
    \ location in the `$checker_board()`\narray.\n\nWe can call a function from any\
    \ of the buttons and pass the location in\nthe array of that button.\n\n```\n\
    make_move(3, 3);\n```\n\nEach button can pass the row and column of its location\
    \ in the array\ninto the `make_move()` function.\nThe `make_move()`\nfunction\
    \  will\nthen determine if this is the first click (selecting the checker) or\n\
    second click (indicating where the checker will move).\n\n```\nListing 10-35\n\
    Make Move Function (make_move.php)\n```\n\nThe `make_move()`\nfunction  must\n\
    determine if it is the first click or second click. If it is the first\nclick,\
    \ the `$first_click` flag is\nset to `true`.\nThen the row and column that were\
    \ passed into the function are saved\ninto `$first_row`\nand `$first_column`\n\
    *.* That is all that is needed with the first click. If it is a\nsecond click,\
    \ then `$first_click` is set\nback to `false`,\nthe values for the row and column\
    \ are saved in `$second_row` and `$second_column`, and\nthe four row and column\
    \ values are passed into a `valid_move()` function .\n\n```\nListing 10-36\nValid\
    \ Move Function (If Statement) (valid_move.php)\n```"
  trans: "\n# 排版后内容\n\n一旦如上所示创建了数组，`display_board()` 函数就可以遍历该数组，通过一系列嵌入的 `if` 语句或\
    \ `switch` 语句来显示正确的棋盘及颜色组合。尽管 `switch` 语句已在第 5 章中讨论过，但我们此前尚未有机会演示它。下面的例子展示了 `switch`\
    \ 语句如何使代码逻辑更易于理解。\n\n```\nListing 10-31\ndisplay_board 函数 (display_board.php)\n\
    ```\n\n基本结构会遍历数组中的每个位置，确定所需的颜色，然后显示该颜色。由于创建实际棋盘图像的方法有很多种，此处的代码留给读者自行决定。\n\n我们可以创建一个二维表格来容纳每个方格。然后，可以使用通过\
    \ HTML 设计的颜色块来创建这些方格，也可以为每个位置插入小图像。\n\n**练习**：决定你希望如何显示红色和白色方格，并向 `switch` 结构中添加代码以显示棋盘。\n\
    \n2.  玩家将棋盘摆放在桌上后，棋子便会被放置在各自正确的位置上。在应用程序中，这可以通过用棋子替换数组中的位置来实现。\n\n![](img/323857_3_En_10_Fig3_HTML.jpg)\n\
    \n一个摆满棋子的二维棋盘，由 8 行 8 列组成，棋盘上使用了红色和黑色方格。\n\n**图 10-3** 摆有棋子的棋盘\n\n程序员可以选择在游戏开始时棋子已经摆在棋盘上，或者要求用户表明他们已准备好开始游戏（例如点击一个\
    \ `'start game'` 按钮）。我们假定玩家必须表明他们想要开始一局游戏（或开始一局新游戏）。\n\n每次点击 `'start game'` 按钮时，都可以执行一个\
    \ `start_game()` 函数。该函数通过更新包含棋盘的数组，将棋子放置在正确的位置，然后调用 `display_board()` 函数来显示带有棋子的棋盘。正如我们所知或从上图中可以看到的，所有棋子都放在黑色方格上。对于白棋来说，第一行的棋子位于奇数位置，第二行在偶数位置（假设零为偶数），第三行又是奇数位置。红棋则相反。\n\
    \n```\nListing 10-32\nstart_game 函数 (start_game.php)\n```\n\n外层的 `for` 循环（包含 `$I`）控制行。然后，初始的\
    \ `if` 语句使用 `$I` 来判断该行是否为偶数（同样假设零为偶数）。如果该行是偶数且不是空行（第 4 行），则会调用 `$J for` 循环。此循环从第\
    \ 1 列开始（因为在第 0 行的第 0 列不放置棋子），并在棋盘上的每个黑色方格中放置一个红色或白色棋子。如果是第 6 行，则放置一个 `\"red checker\"\
    `。如果是其他任何行，则放置一个 `\"white checker\"`。\n\n**建议**：要么使用一个棋盘，要么在纸上画一个棋盘，并跟随这些示例的逻辑进行演练。\n\
    \n> **注意**  \n> 此示例不会清除 `\"blank\"` 行中已有的任何棋子。这可以通过对涉及的两行进行循环编码，并将每个可用位置设置为 `\"\
    black\"` 来实现。\n\n`if` 语句的 `else` 部分处理奇数行。逻辑相同，只是 `$I` 从 0 开始而不是从 1 开始。此外，如果该行是第\
    \ 1 行，则在该位置放置一个 `\"white checker\"`。否则，放置一个 `\"red checker\"`。它会跳过第三行空行。执行 `start_game()`\
    \ 函数后，数组将包含以下内容。\n\n```\nListing 10-33\n执行开始游戏函数后的棋盘数组 (game_start_array.php)\n\
    ```\n\n我们需要对 `display_board()` 函数做一些修改，以处理棋子的添加。\n\n```\nListing 10-34\n显示棋盘函数版本\
    \ 2 (display_board_version2.php)\n```\n\n我们添加了 `case` 过程来处理现在数组中存在的白色和红色棋子。当 `start_game()`\
    \ 函数调用此 `display_board()` 函数时，棋盘将显示棋子位于正确的位置。\n\n3.  现在是时候让我们的其中一位玩家移动棋子了。我们只关注尝试移动一个棋子，而不考虑可能影响移动的其他所有因素。我们始终可以在确定了基本移动规则后，再向现有函数中添加功能。\n\
    \n棋盘顶部\n\n```\nx     w     x          w     x\nw     x     start     x     w\n\
    x     a     x         b     x\n```\n\n使用上面的示意图，遵循跳棋规则，如果我们想移动 `'start'` 白色棋子（尚未成王），它只能移动到位置\
    \ `'a'` 或 `'b'`。所有其他位置都是无效的。注意，位置 `'a'` 比 `'start'` 多一行。同样注意，位置 `'b'` 比 `'start'`\
    \ 多一行。\n\n因此，有效移动的一部分是只移动到下一行（我们暂不考虑跳跃）。`'a'` 的列比 `'start'` 的列少一。`'b'` 的列比 `'start'`\
    \ 的列多一。这表明，如果移动到的列比原始列少一或多一，也是一个有效移动。尝试这个逻辑，你会发现这对于从棋盘顶部向底部移动的所有步骤都成立（直到它成为王）。\n\
    \n```\nX       a      x          b      x\nw      x      start      x      w\n\
    x      w      x          w      x\n```\n\n棋盘底部\n\n如果我们想移动一个 `'start'` 红色棋子，它会向相反方向移动。有效移动由位置\
    \ `'a'` 和 `'b'` 指示。注意，有效的列再次比 `'start'` 的列多一或少一。唯一的区别是行数将比 `'start'` 的行数少一。而对于白色\
    \ `'start'` 棋子，则是多一行。\n\n为了确定有效移动，我们需要收集即将移动的棋子的原始位置（行，列）以及用户尝试将棋子移动到的位置。然后，我们需要进行上面几段中描述的比较。\n\
    \n> **注意**  \n> 我们可以通过为棋盘上的每个位置创建对象来完成上述信息收集。但是，为了尽可能简化此示例，我们将使用不同的技术。\n\n如果棋盘上的每个黑色方格都是一个按钮，而每个红色方格只是一个图像，我们就消除了对用户尝试跳到红色方格甚至跳到棋盘之外的担忧。我们只需关注已经讨论过的限制条件即可。\n\
    \n每个黑色按钮实际上都会执行相同的代码，只有一个例外——将其位置保存在 `$checker_board()` 数组中。\n\n我们可以从任何按钮调用一个函数，并将该按钮在数组中的位置传递进去。\n\
    \n```\nmake_move(3, 3);\n```\n\n每个按钮可以将其在数组中的行和列传递到 `make_move()` 函数中。然后，`make_move()`\
    \ 函数将判断这是第一次点击（选择棋子）还是第二次点击（指示棋子将移动到的位置）。\n\n```\nListing 10-35\n移动函数 (make_move.php)\n\
    ```\n\n`make_move()` 函数必须判断它是第一次点击还是第二次点击。如果是第一次点击，`$first_click` 标志被设置为 `true`。然后，传入函数的行和列被保存到\
    \ `$first_row` 和 `$first_column` 中。第一次点击只需做这些。如果是第二次点击，则将 `$first_click` 设置回 `false`，行和列的值被保存在\
    \ `$second_row` 和 `$second_column` 中，然后这四个行和列的值被传递到一个 `valid_move()` 函数中。\n\n\
    ```\nListing 10-36\n有效移动函数（If 语句） (valid_move.php)\n```\n"
- fmt: "`valid_move()`函数必须判断正在移动的是何种棋子以确定移动方向。如果是白色棋子，则从上往下移动。同时必须确保第二次点击的区域为空（`\"\
    black\"`格子）。第二行必须比第一行多一行。第二列必须比第一列多一列或少一列。如果条件成立，`\"white checker\"`会被放入数组中第二次点击的位置。第一次点击的位置则被改为空（`\"\
    black\"`格子）。\n\n```\n} else {\nIf ( ($checker_board[$first_row] [$first_column]\
    \ ==  \"red checker\") &&\n($checker_board[$second_row] [$second_column] ==  \"\
    black\"))\n{\nIf(($second_row - $first_row == -1) &&   (($second_column - $first_column\
    \ == 1) ||\n($second_column - $first_column == -1))) {\n$checker_board[$second_row][$second_column]\
    \ = \"red checker\";\n$checker_board[$first_row][$first_column] = \"black\";\n\
    }\n} // if both if statements fail it is not a valid move\n}\ndisplay_board();\n\
    }\n```\n\n清单10-37 部分有效移动函数（`else`语句）（`valid_move_with_else.php`）\n\n如果移动的是红色棋子且第二次点击的区域为空（`\"\
    black\"`格子），`valid_move()`函数会判断选择的第二行是否比第一行少一行。同时也会判断列是否比第一列多一列或少一列。如果条件为`true`，则将`\"\
    red checker\"`移动到数组中第二次点击的位置。第一次点击的位置被设为空（`\"black\"`格子）。\n\n如果发生以下任一情况，该函数将不会执行移动：\n\
    \n*   第一次点击选择了空格。\n*   第二次点击选择了已占用的格子。\n*   第二次点击没有选择正确的移动格子。\n\n如果移动未执行，用户可以重试，因为`$first_click`标志已被设为`false`。无论是否发生移动，棋盘都会重新显示（`display_board()`）。如果移动发生了，`display_board()`函数会显示这些变化。\n\
    \n4. 现在我们来考虑棋子变成`'King'`的过程。这发生在红色棋子到达第0行或白色棋子到达第7行时。我们可以在`valid_move()`函数中添加一些`if`语句来判断这种情况。此外，王棋可以向前或向后移动，但仍需遵守其他规则。\n\
    \n```\n清单10-38\n有效移动函数版本2（if语句）（valid_move_version_2.php）\n```\n\n与其分别检查白色棋子、白王或红王以允许向下移动，更简洁的做法是检查所有非红色棋子的对象。只有红色棋子不能向下移动。然而，在检查第7行以确定是否需要加冕时，我们还需要确保第7行的是白色棋子。我们既不能给红色棋子加冕，也无需给白王或红王加冕！如果不是在给白色棋子加冕，那么我们就是在将白色棋子、白王或红王移动到一个新位置。由于我们不知道移动的是什么，可以直接取第一次点击位置的值并将其复制到第二次点击位置。这样就能移动正确的对象。\n\
    \n```\n} } else {\nIf ( ($checker_board[$first_row] [$first_column] !=  \"white\
    \ checker\") &&\n($checker_board[$second_row] [$second_column] ==  \"black\"))\n\
    {\nIf(($second_row - $first_row == -1) &&\n(($second_column - $first_column ==\
    \ 1) ||\n($second_column - $first_column == -1))) {\nIf((second_row == 0) &&\n\
    ($checker_board[$first_row] [$first_column] == \"red checker\"))  {\n$checker_board[$second_row][$second_column]\
    \ =\n\"red king\";\n} else {\n$checker_board[$second_row] [$second_column] =\n\
    $checker_board[$first_row] [$first_column];\n} // else\n$checker_board[$first_row]\
    \ [$first_column] = \"black\";\n} // end if $second_column - $first_column ==\
    \ -1\n} // not white checker - if both if statements fail it is not a valid move\n\
    }\ndisplay_board();\n}\n```\n\n清单10-39 部分有效移动函数版本2（`else`语句）（`valid_move_version_2_with_else.php`）\n\
    \n对于向上移动，只有白色棋子受到限制。如果红色棋子到达第0行，它将成为`\"red king\"`。既然我们已经实现了向下移动，还需要对`display_board()`函数进行调整，使其能够显示`\"\
    red king\"`和`\"white king\"`。\n\n```\n清单10-40\n显示棋盘函数版本3（display_board_version_3.php）\n\
    ```\n\n如你所见，只需要为`\"white king\"`和`\"red king\"`添加两个额外的`case`语句即可。\n\n5. 当然，除非能跳过对手棋子并将其从棋盘上移除，否则无法赢得比赛。\n\
    \n```\n} // end if $second_column - $first_column == -1\n} // not white checker\
    \ - if both if statements fail it’s not a valid move\n}\ndisplay_board();\n}\n\
    ```\n\n在`valid_move()`函数中，如果代码流程落到了最后两个花括号之间，则说明这不是一次有效的移动。然而，这可能是一次有效的跳吃。\n\n\
    ```\n}\n} else { // not white checker, could it be a jump?\nvalid_jump(($first_row,\
    \ $first_column, $second_row, $second_column);\n}\n}\ndisplay_board();\n}\n```\n\
    \n与其在`valid_move()`函数中添加更多代码，不如创建一个`valid_jump()`函数，并在没有有效移动时调用它。\n\n棋盘顶部\n\n\
