    访问本地主机时，请键入 `http://localhost:8888` 或其他地址，[确保用相应设置替换我的说明](http://localhost:8888)。在启动
    Cake 之前，你应该熟悉本地主机的配置，特别是由于存在多种本地主机配置变体，此处不再赘述。


    ## 权限错误


    可能缺少必要的文件权限。若出现此错误，你可能会看到空白屏幕或 403 错误。当服务器拒绝用户访问所请求的内容时，便会触发 403 HTTP 服务器错误。多种设置、文件权限或
    PHP 配置错误都可能导致 403 错误。要解决此问题，请在命令行中使用 `chmod` 将 `first_app` 文件夹权限设置为 0755，或通过操作系统为用户授予读取、写入和执行权限，并为用户组授予读取和执行权限：`chmod
    -R 0755 /path/to/cakephp/folder`


    刷新 `first_app` 的 URL；若看到如图 2-2 所示的截图，则问题已解决。


    ## 使用命令行界面


    无论你使用的是 Windows、Mac OS 还是 Linux 系统，后续为了充分利用 Cake 的功能，都需要用到命令行。Mac 和 Linux 用户应能轻松运行命令行，因为该功能已内置于各自的操作系统中。与
    Web 服务器设置类似，命令行也有多种配置方式，此处无法一一详述。请务必确保命令行能够正常运行标准 Unix 命令。Mac 用户应使用“终端”应用程序来运行命令。Linux
    用户无疑对用于运行 shell 命令的 Linux 控制台很熟悉。Windows 用户可能需要安装命令行界面才能运行所有必要的 Unix 命令。[我推荐使用
    Cygwin (www.cygwin.com) 或 MinGW (](http://www.cygwin.com)[www.mingw.org)](http://www.mingw.org)
    在 Windows 环境下启动命令行。


    ## Apache AllowOverride 错误


    当你能看到内容，但其显示效果与图 2-2 不符时，便会出现此错误：没有颜色、样式、布局和字体变化——只有白底黑字。即使继续学习本教程的后续部分，你也能看到
    Cake 运行，但某些功能可能无法正常工作，或者在扩展 Cake 应用时（尤其是使用脚手架和样式时）可能会发现不一致的问题。修复此问题比权限错误稍微复杂一些，但难度并不大。


    你需要在本地主机设置中找到 `httpd.conf` 文件。该文件通常存储在名为 `conf`、`bin`、`lib` 或 `var` 的文件夹中。你可以使用任何纯文本编辑器编辑
    `httpd.conf` 文件。


    在 `httpd.conf` 文件中搜索类似如下的代码块：

    ```

    1 <Directory />

    2 Options Indexes FollowSymLinks

    3 AllowOverride None

    4 </Directory>

    ```

    别被第 1 行搞糊涂了。`Directory` 后的斜杠指向的是根文件夹。如果你需要将这些更改应用到特定的 Cake 应用文件夹，则添加 Cake 的路径而非根文件夹：

    ```

    <Directory /path/to/cake>

    ```

    将第 3 行从 `AllowOverride None` 改为 `AllowOverride All`，然后重启 Apache。如果启动 `first_app`
    URL 后看到正常的 Cake 欢迎屏幕（如图 2-2 所示），则问题已解决。


    ![Image 15](img/index-35_1.jpg)


    ## 运行设置程序


    每次在本地主机上安装 Cake 应用时，都需要遵循以下常规步骤：


    1. 准备 `tmp` 文件夹。

    2. 更改 `app/config/core.php` 中的 `Security.salt` 值。

    3. 输入 MySQL 数据库连接设置。

    4. 设计数据库架构（除非你使用的是现有架构）。

