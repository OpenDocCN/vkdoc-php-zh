    \ class\n\nThe first line of PHP code sets the start date as December 31, 2014.\
    \ The next line uses the `DateInterval` static method `createFromDateString()`\
    \ to set the interval at the second Tuesday of next month. Both values are passed\
    \ to the `DatePeriod` constructor, together with 12 as the number of recurrences\
    \ and the `DatePeriod::EXCLUDE_START_DATE` constant. The constant’s name is self-explanatory.\
    \ Finally, a `foreach` loop displays the resulting dates using the `DateTime::format()`\
    \ method.\n\nThe second way of creating a `DatePeriod` object is to replace the\
