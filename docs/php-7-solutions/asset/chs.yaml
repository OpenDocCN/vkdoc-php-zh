  \ 方法。不用说，数组的顺序必须与占位符的顺序一致。\n\n如果 `UPDATE` 查询成功执行，`execute()` 方法将返回 `true`，从而重置 `$done`\
  \ 的值。你不能在此处使用 `rowCount()` 方法获取受影响的行数，因为如果点击 `Update Entry` 按钮但未做任何更改，它将返回 `0`。你会注意到我们在重定向脚本的条件中添加了\
