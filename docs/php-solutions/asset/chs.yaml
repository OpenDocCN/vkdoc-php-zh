  \n图 15-6。\n\n未关联图片的文章的外键被设置为 `NULL`。在 `details.php` 中，包含上一章的 `utility_funcs.php`（如有必要，将其从\
  \ `ch14` 文件夹复制到 `includes` 文件夹）。然后包含数据库连接文件，创建一个只读连接，并在 `DOCTYPE` 声明之前的 PHP 代码块中准备\
  \ SQL 查询，如下所示：\n\n```php\nrequire_once './includes/utility_funcs.php';\nrequire_once\
  \ './includes/connection.php';\n// 连接到数据库\n$conn = dbConnect('read');  // 如有必要添加\
