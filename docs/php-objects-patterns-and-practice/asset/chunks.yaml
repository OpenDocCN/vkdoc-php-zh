    signature. This means that the access control of the implementing method cannot
    be stricter than that of the abstract method. The implementing method should also
    require the same number of arguments as the abstract method, reproducing any class
    type hinting.


    Here are two implementations of `ShopProductWriter`:


    ```

    // listing 04.06

    class XmlProductWriter extends ShopProductWriter

    {

    public function write()

    {

