    business, and presentation tiers.


    ## Database Modifications


    You only need to make several changes here. You’ll update these database functions:


    - `orders_get_most_recent_orders`

    - `orders_get_orders_between_dates`

    - `orders_get_orders_by_status`

    - `orders_get_order_info`


    You’ll create three new functions:


    - `orders_get_by_customer_id`

    - `orders_get_order_short_details`

    - `customer_get_customers_list`


    You’ll also drop the `orders_update_order` function, which we don’t need anymore.


    ## Exercise: Modifying the Data Tier


    **1.** Load `pgAdmin III`, and connect to the `hatshop` database.


    **2.** Click **Tools** ➤ **Query tool** (or click the **SQL** button on the toolbar).
    A new query window should appear.


    **3.** Update the `orders_get_most_recent_orders` function:


    ```sql

    -- Update orders_get_most_recent_orders function


    CREATE OR REPLACE FUNCTION orders_get_most_recent_orders(INTEGER) RETURNS SETOF
    order_short_details LANGUAGE plpgsql AS $$


    DECLARE


    inHowMany ALIAS FOR $1;


    outOrderShortDetailsRow order_short_details;


    BEGIN


    FOR outOrderShortDetailsRow IN


    SELECT o.order_id, o.total_amount, o.created_on,


    o.shipped_on, o.status, c.name


    FROM orders o


    INNER JOIN customer c


    ON o.customer_id = c.customer_id


    ORDER BY o.created_on DESC


    LIMIT inHowMany


    LOOP


    RETURN NEXT outOrderShortDetailsRow;


    END LOOP;


    END;


    $$;

    ```


    **4.** Update the `orders_get_orders_between_dates` function:


    ```sql

    -- Update orders_get_orders_between_dates function


    CREATE OR REPLACE FUNCTION orders_get_orders_between_dates(TIMESTAMP, TIMESTAMP)
    RETURNS SETOF order_short_details LANGUAGE plpgsql AS $$


    DECLARE


    inStartDate ALIAS FOR $1;


    inEndDate ALIAS FOR $2;


    outOrderShortDetailsRow order_short_details;


    BEGIN


    FOR outOrderShortDetailsRow IN


    SELECT o.order_id, o.total_amount, o.created_on,


    o.shipped_on, o.status, c.name


    FROM orders o


    INNER JOIN customer c


    ON o.customer_id = c.customer_id


    WHERE o.created_on >= inStartDate AND o.created_on <= inEndDate ORDER BY o.created_on
    DESC


    LOOP


    RETURN NEXT outOrderShortDetailsRow;


    END LOOP;


    END;


    $$;

    ```


