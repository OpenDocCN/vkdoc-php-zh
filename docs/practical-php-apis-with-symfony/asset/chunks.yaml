    ));

    }

    }

    ```


    There are two important aspects in the above subscriber that we must pay attention
    to:


    *   The subscriber’s priority is set to 2\. This allows it to intercept “access
    denied” exceptions first and customize the response.


    *   The subscriber ignores exceptions that are not instances of the **AccessDeniedException**.
    This is because these other errors will be handled by the KernelSubscriber as
    detailed in Chapter [1](#663561_1_En_1_Chapter.xhtml).'
  trans: '

    ## 第三节 保护操作


    现在，我们的端点已受到保护，只有经过身份验证的用户才能执行操作，因此下一个安全目标是启用对需要保护的操作的防护。例如，某些操作可能只允许具有特定角色的用户执行。为了实现这一目标，我们将使用
    [Symfony 投票器](https://symfony.com/doc/current/security/voters.html)。


    ### 抽象操作投票器


    首先，让我们编写一个抽象的操作投票器，其余的操作投票器都将继承它。


    ```php

    use App\Api\ApiOperation;

    use Symfony\Component\Security\Core\Authorization\Voter\Voter;

    abstract class OperationVoter extends Voter {

    protected function supports(string $attribute, mixed $subject): bool

    {

    return ($attribute === ''PERFORM'' && $subject instanceof ApiOperation);

    }

    }

    ```


    `supports` 方法为所有继承它的投票器添加了通用逻辑。它检查属性参数是否持有值 `"PERFORM"`，以及主题参数是否为 `ApiOperation`
    类的实例。考虑到当前面向操作的上下文，这两项检查是合理的：


    -   我们始终检查属性是否持有 `"PERFORM"` 值，因为我们始终想要执行一个操作。

    -   我们始终检查主题是否为 `ApiOperation` 实例，这样我们就能在子类中检查操作名称。


    ### 操作投票器


    如上一节所述，操作投票器必须继承自抽象操作投票器，并实现授权逻辑。让我们为 `SendPayment` 操作创建一个投票器，确保经过身份验证的用户拥有 `"ROLE_SENDER"`
    角色。


    ```php

    use App\Security\Miscelanea\OperationNames;

    use Symfony\Component\Security\Core\Authentication\Token\TokenInterface;

    class SendPaymentVoter extends OperationVoter

    {

    protected function supports(string $attribute, mixed $subject): bool

    {

    if(parent::supports($attribute, $subject) && $subject->metadata->name === OperationNames::SendPayment->name){

    return true;

    }

    return false;

    }

    protected function voteOnAttribute(string $attribute, mixed $subject, TokenInterface
    $token): bool

    {

    if(!in_array(''ROLE_SENDER'', $token->getUser()->getRoles())) {

    return false;

    }

    return true;

    }

    }

    ```


    `supports` 方法使用父类逻辑检查属性和主题实例，同时还检查操作名称是否为 `"SendPayment"`。如果 `supports` 方法返回 `"true"`，Symfony
    将执行 `voteOnAttribute` 方法，并检查用户是否持有 `ROLE_SENDER` 角色。如果用户角色与所需角色不匹配，将返回 403 禁止访问响应，并停止操作执行。


    可能存在一组操作共享相同授权规则的情况。在这种情况下，同一个投票器可以授权这组操作。为此，投票器的 `supports` 方法应检查请求的操作是否属于该集合。举个例子，假设我们有一个名为
    `"ApprovePayment"` 的操作，并且 `"SendPayment"` 和 `"ApprovePayment"` 操作只能由 `ROLE_SENDER`
    执行。我们可以在第 1 章的 `OperationNames` 枚举中创建一个名为 `getPaymentOperations` 的新静态方法。该方法应返回一个包含允许
    `ROLE_SENDER` 执行的操作的数组，然后投票器应检查所请求的操作是否包含在该数组中。


    ```php

    enum OperationNames

    {

    case SendPayment;

    case ApprovePayment;

    public static function getPaymentOperations(): array

    {

    return [

    self::ApprovePayment->name,

    self::SendPayment->name

    ];

    }

    }

    ```


    如我们所见，`getPaymentOperations` 方法返回了允许执行的操作。现在在投票器中，我们应该在 `supports` 方法中使用它：


    ```php

    use App\Security\Miscelanea\OperationNames;

    use Symfony\Component\Security\Core\Authentication\Token\TokenInterface;

    class SenderVoter extends OperationVoter

    {

    protected function supports(string $attribute, mixed $subject): bool

    {

    if(parent::supports($attribute, $subject) && in_array($subject->metadata->name,
    OperationNames::getPaymentOperations())){

    return true;

    }

    return false;

    }

    protected function voteOnAttribute(string $attribute, mixed $subject, TokenInterface
    $token): bool

    {

    if(!in_array(''ROLE_SENDER'', $token->getUser()->getRoles())) {

    return false;

    }

    return true;

    }

    }

    ```


    只要用户的角色是 `"ROLE_SENDER"`，上述投票器就会授予对 `getPaymentOperations` 返回的数组中所有操作的访问权限。


    在检查投票器之前，我们还需要进行一项额外的配置。由于我们不知道是否有投票器会被执行，如果没有任何投票器被执行，则被视为所有投票器都投了弃权票。当这种情况发生时，Symfony
    会查阅安全配置参数 `"allow_if_all_abstain"`，该参数默认为 `"false"`。我们必须将此参数的值更改为 `"true"`，因为我们希望
    Symfony 在没有任何投票器被执行时允许我们执行操作。如果您想查询有关访问决策策略的更多信息，可以阅读 [Symfony 安全文档](https://symfony.com/doc/current/security/voters.html%2523changing-the-access-decision-strategy)。


    我们可以通过在 `config/packages/security.yaml` 文件中设置新值来更改此配置：


    ```yaml

    security:

    access_decision_manager:

    strategy: unanimous

    allow_if_all_abstain: true

    ```


    ### 处理访问被拒绝错误


    Symfony 的安全 HTTP 组件通过异常监听器来监控安全错误。为了定制“操作被拒绝”的响应，我们需要创建一个自定义订阅者。该订阅者必须在默认的安全监听器之前执行。我们可以通过为自定义的
    `AccessDeniedSubscriber` 分配更高的优先级来实现这一点。


    ```php

    use Symfony\Component\EventDispatcher\EventSubscriberInterface;

    use Symfony\Component\HttpFoundation\JsonResponse;

    use Symfony\Component\HttpKernel\Event\ExceptionEvent;

    use Symfony\Component\HttpKernel\KernelEvents;

    use Symfony\Component\Security\Core\Exception\AccessDeniedException;

    class AccessDeniedSubscriber implements EventSubscriberInterface

    {

    public static function getSubscribedEvents(): array

    {

    return [

    KernelEvents::EXCEPTION => [''onException'', 2]

    ];

    }

    public function onException(ExceptionEvent $event): void

    {

    $exception = $event->getThrowable();

    if (!$exception instanceof AccessDeniedException) {

    return;

    }

    $event->setResponse(new JsonResponse(

    [ ''authorization'' => $exception->getMessage()],


    ));

    }

    }

    ```


    在上述订阅者中，有两个重要的方面需要我们注意：


    -   订阅者的优先级设置为 2。这使其能够首先拦截“访问被拒绝”异常并定制响应。

    -   订阅者会忽略并非 `AccessDeniedException` 实例的异常。这是因为这些其他错误将由第 1 章中详述的 `KernelSubscriber`
    处理。

