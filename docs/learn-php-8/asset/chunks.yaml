    The `create_object` method is used to create the `dog` and `get_breeds` objects.
    The `dog` object constructor was expecting four values (`dog_name`, `dog_weight`,
    `dog_breed`, and `dog_color`) in its constructor. The `get_breeds` app was not
    accepting any values in its constructor. In order to provide more efficient code
    in `dog_container`, we change the signature of the constructor (the top line of
    the function) of each class to accept an array, instead of individual values.
    This will allow us to pass any number of items into either constructor.


    ```

    function __construct($properties_array)

    { // dog class constructor

    if (method_exists(''dog_container'', ''create_object'')) {

    string $name_error = $this->set_dog_name($properties_array[0]) ==

