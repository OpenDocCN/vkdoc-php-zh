    **Microformatting Your Tags**


    The rel-tag microformat is used to apply a tag to the current page, simply by
    including the rel="tag" attribute within a hyperlink. Specifically, we apply this
    attribute to hyperlinks that link to the relevant tag space for the page.


    The HTML 4.01 specification ([http://www.w3.org/TR/html401/struct/links.html#adef-rel)](http://www.w3.org/TR/html401/struct/links.html#adef-rel)


    defines the rel attribute as “describing the relationship from the current document
    to the anchor specified by the href attribute.”


    To apply this to the tagging system we created earlier this chapter, we make this
    slight modification to the links in the view.tpl template in ./templates/user.
    If you refer to the code we developed in Listing 10-19, we now add the rel attribute
    to these links as in Listing 10-29.


    **Listing 10-29.** *Defining the Tag Space by Using the rel-tag Microformat (view.tpl)*


    {include file=''header.tpl''}


    <div id="post-tags">


    <strong>Tags:</strong>


    {foreach from=$post->getTags() item=tag name=tags}


    <a href="{geturl route=''tagspace'' username=$user->username tag=$tag}"


    **rel="tag">{$tag}</a>{if !$smarty.foreach.tags.last},{/if}**


    {foreachelse}


    (none)


    {/foreach}


    </div>


    <div class="post-date">


    {$post->ts_created|date_format:''%b %e, %Y %l:%M %p''}


    </div>


    <!-- // ... other code -->


    Importantly, though, we do not use rel-tag for the navigation on the right where
    we output all of a user’s tags. This is because these links do not necessarily
    reflect the content of the current page, whereas rel-tag is used to define the
    tag space of the current page.


    Figure 10-6 shows how the Operator plug-in for Firefox detects the tag spaces
    and makes various options available for these tags.


