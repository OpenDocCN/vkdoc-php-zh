  trans: "\n### Cake 中的多对多关系\n\n你对\"拥有并属于多个\"关联（has and belongs to many）尝试得越多，在应用程序中使用它们就越得心应手。\n\
    \n总之，我已经用 `hasOne` 关联讨论了一对一的关系，而 `hasMany` 关联展示了 Cake 如何管理一对多关系。那么多对多关系呢？\n\n\
    许多网站使用标签来组织内容。许多博客并非为一篇文章分配一个类别，而是使用标签列表，这些标签可以多次分配给多篇文章，反之亦然。这就是文章与标签之间的多对多关系。一篇文章可以拥有多个标签，每个标签也可以属于多篇文章。\n\
    \n从结构上看，数据库只有通过一个保存这些关联的第三张表才能处理多对多关系。在文章与标签的例子中，需要创建一张名为 `posts_tags` 的第三张表。这张表只包含两个字段：`post_id`\
    \ 和 `tag_id`。通过使用第三张表，你可以保持所需的灵活性，从而列出应用程序需要保存的所有关系；两个方向上的关联数量都没有限制，因为第三张表可以不断保存更多记录。\n\
    \n可以想象，Cake 在管理这种关联时节省了大量时间。与 `$hasOne` 和 `$hasMany` 属性类似，你可以通过在模型中添加 `$hasAndBelongsToMany`\
    \ 属性来创建\"拥有并属于多个\"关联。\n\n你也可以在脚手架中测试\"拥有并属于多个\"关联。与为一对多关系显示选择菜单不同，Cake 的脚手架会渲染一个多选菜单。这样，你就可以用测试\"\
    拥有多个\"关系相同的方式来测试这种关联。\n\n### 在博客中应用并测试这种关系\n\n让我们为博客应用程序添加一个\"拥有并属于多个\"关系。为此，你需要在数据库中创建一张新表。请参见清单\
    \ 4-10 中创建 `tags` 表的 SQL 语法。\n\n**清单 4-10.** *`tags` 表*\n\n```sql\nCREATE TABLE\
    \ `tags` (\n  `id` int(11) unsigned NOT NULL auto_increment,\n  `name` varchar(100)\
    \ default NULL,\n  `longname` varchar(255) default NULL,\n  PRIMARY KEY (`id`)\n\
    );\n```\n\n这张 `tags` 表将保存分类标签，以便更好地组织你的博客文章。`name` 字段将是一个字母数字字段，用于通过 URL 访问标签。`longname`\
    \ 字段将存储分类的显示标题，用于链接和页面标题。\n\n由于 `tags` 表将通过\"拥有并属于多个\"关系与文章关联，你必须创建另一张表来保存这些关联。这张表的名称将遵循\
    \ Cake 的命名规范。对于\"拥有并属于多个\"关系的表，名称必须按字母顺序排列，每个关联表的名称之间用下划线分隔。在表中，你提供外键和关联外键作为字段，字段命名遵循与一对多关系相同的规范。在本例中，字段名将按字母顺序排列，先是\
    \ `post_id`，然后是 `tag_id`。使用清单 4-11 创建新的 `posts_tags` 表。\n\n**清单 4-11.** *`posts_tags`\
    \ 表*\n\n```sql\nCREATE TABLE `posts_tags` (\n  `id` int(11) unsigned NOT NULL\
    \ auto_increment,\n  `post_id` int(11) unsigned default NULL,\n  `tag_id` int(11)\
    \ unsigned default NULL,\n  PRIMARY KEY (`id`)\n);\n```\n\n`Tag` 模型尚不存在，因此接下来请创建\
    \ `app/models/tag.php` 文件。将清单 4-12 粘贴到新的 `Tag` 模型文件中。\n\n**清单 4-12.** *`Tag` 模型*\n\
    \n```php\n<?php\nclass Tag extends AppModel {\n  var $name = 'Tag';\n  var $hasAndBelongsToMany\
    \ = array('Post');\n}\n?>\n```\n\n接下来，你还必须在 `Post` 模型中建立关联。调整该模型以反映\"拥有并属于多个\"\
    关系，如清单 4-13 所示。\n\n**清单 4-13.** *设置了 `$hasAndBelongsToMany` 属性的 `Post` 模型*\n\n\
    ```php\n<?php\n```\n"
