- fmt: "在处理数据库中的多对多关系时，需要构建一个类似图[18-1](#332054_4_En_18_Chapter.xhtml#Fig1)所示的交叉引用表。交叉引用表仅由两列组成，这两列联合声明为表的主键（称为复合主键）。\n\
    \n观察图[18-7](#332054_4_En_18_Chapter.xhtml#Fig7)可以看到，`article_id`和`cat_id`列中都多次包含相同的数字——这种情况在主键中是不可接受的，主键必须唯一。然而，在复合主键中，是两个值的组合具有唯一性。前两个组合`1,3`和`2,1`在表中没有其他重复，其他组合也是如此。\n\
    \n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig7_HTML.jpg](images/332054_4_En_18_Chapter/332054_4_En_18_Fig7_HTML.jpg)\n\
    \n图18-7. 在交叉引用表中，两列共同构成复合主键\n\n**设置categories和交叉引用表**\n\n在`ch18`文件夹中，可以找到`categories.sql`，其中包含用于创建`categories`表和交叉引用表`article2cat`的SQL语句，以及一些示例数据。在phpMyAdmin中，选择`phpsols`数据库，然后使用`Import`选项卡加载`categories.sql`来创建表和数据。表[18-1](#332054_4_En_18_Chapter.xhtml#Tab1)和[18-2](#332054_4_En_18_Chapter.xhtml#Tab2)列出了表的设置。两个数据库表都只有两列。\n\
    \n表 18-2. `article2cat`交叉引用表的设置\n\n| Name | Type | Length/Values | Attributes\
    \ | Null | Index | A_I |\n| --- | --- | --- | --- | --- | --- | --- |\n| `article_id`\
    \ | `INT` | | `UNSIGNED` | 未选中 | `PRIMARY` | |\n| `cat_id` | `INT` | | `UNSIGNED`\
    \ | 未选中 | `PRIMARY` | |\n\n表 18-1. `categories`表的设置\n\n| Name | Type | Length/Values\
    \ | Attributes | Null | Index | A_I |\n| --- | --- | --- | --- | --- | --- | ---\
    \ |\n| `cat_id` | `INT` | | `UNSIGNED` | 未选中 | `PRIMARY` | 选中 |\n| `category`\
    \ | `VARCHAR` | 20 | | 未选中 | | |\n\n关于交叉引用表定义的重要一点是，两列都设置为主键，并且两列的`A_I`（`AUTO_INCREMENT`）复选框都没有被选中。\n\
    \n**警告**\n要创建复合主键，必须同时将两列都声明为主键。如果错误地只声明一列为主键，数据库会阻止稍后添加第二列。必须从单列中删除主键索引，然后将其重新应用到两列上。两列的组合被视为主键。\n\
    \n**获取上传图片的文件名**\n该脚本使用了[第6章](#332054_4_En_6_Chapter.xhtml)中的`Upload`类，但该类需要稍作调整，因为上传文件的文件名会被合并到`$messages`属性中。\n\
    \n**PHP解决方案 18-2：改进 Upload 类**\n\n本PHP解决方案通过创建一个新的受保护属性来存储成功上传文件的名称，并提供一个公共方法来获取文件名数组，从而调整了[第9章](#332054_4_En_9_Chapter.xhtml)中的`Upload`类。\n\
    \n1.  打开`PhpSolutions/File`文件夹中的`Upload.php`。或者，从`ch18/PhpSolutions/File`文件夹复制`Upload.php`，并将其保存到`phpsols-4e`站点根目录下的`PhpSolutions/File`中。\n\
    \n2.  在文件顶部的属性列表中添加以下行：\n\n```php\nprotected $filenames = [];\n```\n\n这会将一个名为`$filenames`的受保护属性初始化为空数组。\n\
    \n3.  修改`moveFile()`方法，如果文件上传成功，则将修改后的文件名添加到`$filenames`属性中。新代码已加粗显示。\n\n```php\n\
    protected function moveFile($file) {\n    $filename = $this->newName ?? $file['name'];\n\
    \    $success = move_uploaded_file($file['tmp_name'], $this->destination . $filename);\n\
    \    if ($success) {\n        // add the amended filename to the array of uploaded\
    \ files\n        $this->filenames[] = $filename;\n        $result = $file['name']\
    \ . ' was uploaded successfully';\n        if (!is_null($this->newName)) {\n \
    \           $result .= ', and was renamed ' . $this->newName;\n        }\n   \
    \     $this->messages[] = $result;\n    } else {\n        $this->messages[] =\
    \ 'Could not upload ' . $file['name'];\n    }\n}\n```\n\n仅当文件成功移动到目标文件夹时，其名称才会被添加到`$filenames`数组中。\n\
    \n4.  添加一个公共方法，用于返回存储在`$filenames`属性中的值。代码如下：\n\n```php\npublic function getFilenames()\
    \ {\n    return $this->filenames;\n}\n```\n\n在类定义中放置这段代码的位置无关紧要，但通常的做法是将所有公共方法放在一起。\n\
    \n5.  保存`Upload.php`。如果需要检查代码，请将其与`ch18/PhpSolutions/File`文件夹中的`Upload_01.php`进行比较。\n\
    \n**调整插入表单以处理多个表**\n\n您在[第15章](#332054_4_En_15_Chapter.xhtml)中为博客文章创建的插入表单已经包含了将大部分详细信息插入`blog`表所需的代码。与其从头开始，不如调整现有页面。目前，该页面只包含用于标题的文本输入字段和用于文章的文本区域。\n\
    \n您需要为类别添加一个多选的`<select>`列表，并为现有图片添加一个下拉的`<select>`菜单。\n\n为了防止用户在上传新图片的同时选择现有图片，使用复选框和JavaScript控制相关输入字段的显示。选中复选框会禁用用于现有图片的下拉菜单，并显示用于新图片和标题的输入字段。取消选中复选框会隐藏并禁用文件和标题字段，然后重新启用下拉菜单。如果禁用了JavaScript，则上传新图片和标题的选项会被隐藏。\n\
    \n**注意**\n为节省空间，本章剩余的大部分PHP解决方案仅提供MySQLi的详细说明。PDO版本的结构和PHP逻辑是相同的。唯一的区别在于提交SQL查询和显示结果所使用的命令。带有完整注释的PDO文件位于`ch18`文件夹中。\n\
    \n**PHP解决方案 18-3：添加类别和图片的输入字段**\n\n本PHP解决方案通过添加类别和图片的输入字段，开始调整[第15章](#332054_4_En_15_Chapter.xhtml)中的博客条目插入表单。\n\
    \n1.  在`admin`文件夹中，找到并打开您在[第15章](#332054_4_En_15_Chapter.xhtml)中创建的`blog_insert_mysqli.php`版本。或者，将`ch18`文件夹中的`blog_insert_mysqli_01.php`复制到`admin`文件夹，并从文件名中删除`_01`。\n\
    \n2.  类别和现有图片的`<select>`元素需要在页面首次加载时查询数据库，因此需要将连接脚本和数据库连接移出检查表单是否已提交的条件语句。找到加粗显示的行：\n\
    \n```php\nif (isset($_POST['insert'])) {\n    require_once '../includes/connection.php';\n\
    \    // initialize flag\n    $OK = false;\n    // create database connection\n\
    \    $conn = dbConnect('write');\n```\n\n将它们移至条件语句之外，并包含`utility_funcs.php`，如下所示：\n\
    \n```php\nrequire_once '../includes/connection.php';\nrequire_once '../includes/utility_funcs.php';\n\
    // create database connection\n$conn = dbConnect('write');\nif (isset($_POST['insert']))\
    \ {\n    // initialize flag\n    $OK = false;\n```"
  raw: "When dealing with many-to-many relationships in a database, you need to\n\
    build a cross-reference table like the one in Figure [18-1](#332054_4_En_18_Chapter.xhtml#Fig1).\
    \ A\ncross-reference table consists of just two columns, which are jointly\ndeclared\
    \ as the table’s primary key (known as a **composite\nprimary key**). \nIf you\
    \ look at Figure [18-7](#332054_4_En_18_Chapter.xhtml#Fig7), you’ll see\nthat\
    \ the `article_id` and `cat_id` columns both\ncontain the same number several\
    \ times—something that’s unacceptable in a\nprimary key, which must be unique.\
    \ However, in a composite primary key,\nit’s the combination of both values that\
    \ is unique. The first two\ncombinations, `1,3` and `2,1`, are not repeated\n\
    anywhere else in the table, nor are any of the others.\n\n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig7_HTML.jpg](images/332054_4_En_18_Chapter/332054_4_En_18_Fig7_HTML.jpg)\n\
    \nFigure 18-7.\nIn a cross-reference table, both columns together form a composite\n\
    primary key\n\nSetting up the categories and cross-reference\ntables\n\nIn the\
    \ `ch18`\nfolder, you’ll find `categories.sql`, which\ncontains the SQL to create\
    \ the `categories` table and\nthe cross-reference table, `article2cat`, together\n\
    with some sample data. In phpMyAdmin, select the `phpsols` database, and\nuse\
    \ the `Import`\ntab to load `categories.sql` to\ncreate the tables and data. The\
    \ settings for the tables are listed in\nTables [18-1](#332054_4_En_18_Chapter.xhtml#Tab1)\
    \ and [18-2](#332054_4_En_18_Chapter.xhtml#Tab2). Both database\ntables have just\
    \ two columns.\n\nTable 18-2.\nSettings for the `article2cat`\ncross-reference\
    \ table\n\nName |\n Type |\n Length/Values |\n Attributes |\n Null |\n Index |\n\
    \ A_I |\n\n| --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- |\
    \ --- | --- | --- | --- |\n\n`article_id` |\n `INT` |\n   |\n `UNSIGNED` |\n Deselected\
    \ |\n `PRIMARY` |\n   |\n\n`cat_id` |\n `INT` |\n   |\n `UNSIGNED` |\n Deselected\
    \ |\n `PRIMARY` |\n   |\n\nTable 18-1.\nSettings for the `categories` table\n\n\
    Name |\n Type |\n Length/Values |\n Attributes |\n Null |\n Index |\n A_I |\n\n\
    | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | --- | ---\
    \ | --- | --- |\n\n`cat_id` |\n `INT` |\n   |\n `UNSIGNED` |\n Deselected |\n\
    \ `PRIMARY` |\n Selected |\n\n`category` |\n `VARCHAR` |\n 20 |\n   |\n Deselected\
    \ |\n   |\n   |\n\nThe important point about the definition for a cross-reference\
    \ table\nis that both columns are set as primary key, and that the `A_I` (`AUTO_INCREMENT`)\
    \ check\nbox is not selected for either column.\n\nCaution\nTo create a composite\
    \ primary key, you must declare both columns to\nbe primary keys at the same time.\
    \ If, by mistake, you declare only one\nas the primary key, the database prevents\
    \ you from adding the second one\nlater. You must delete the primary-key index\
    \ from the single column and\nthen reapply it to both. It’s the combination of\
    \ the two columns that is\ntreated as the primary key.\n\nGetting the filename\
    \ of an uploaded image\nThe script makes use of the `Upload` class from\nChapter\
    \ [6](#332054_4_En_6_Chapter.xhtml), but the class needs slight\ntweaking because\
    \ the filenames of uploaded files are incorporated into\nthe `$messages`\nproperty.\n\
    \nPHP Solution 18-2: Improving the Upload class\n\nThis PHP solution adapts the\
    \ `Upload` class from\nChapter [9](#332054_4_En_9_Chapter.xhtml) by creating a\
    \ new protected\nproperty to store the names of successfully uploaded files, together\n\
    with a public method to retrieve the array of names.\n\n1.  Open `Upload.php`\
    \ in the\n    `PhpSolutions/File`\n    folder. Alternatively, copy `Upload.php`\
    \ from the\n    `ch18/PhpSolutions/File`\n    folder and save it in `PhpSolutions/File`\
    \ in\n    the `phpsols-4e`\n    site root.\n\n2.  Add the following line to the\
    \ list of properties at the top of the\n    file:\n\n```\n    protected $filenames\
    \ = [];\n    ```\n\nThis initializes a protected property called `$filenames`\
    \ as an\n    empty array.\n\n3.  Amend the `moveFile()` method to\n    add the\
    \ amended filename to the `$filenames` property\n    if the file is successfully\
    \ uploaded. The new code is highlighted in\n    bold.\n\n```\n    protected function\
    \ moveFile($file) {\n    $filename = $this->newName ?? $file['name'];\n    $success\
    \ = move_uploaded_file($file['tmp_name'], $this->destination . $filename);\n \
    \   if ($success) {\n    // add the amended filename to the array of uploaded\
    \ files\n    $this->filenames[] = $filename;\n    $result = $file['name'] . '\
    \ was uploaded successfully';\n    if (!is_null($this->newName)) {\n    $result\
    \ .= ', and was renamed ' . $this->newName;\n    }\n    $this->messages[] = $result;\n\
    \    } else {\n    $this->messages[] = 'Could not upload ' . $file['name'];\n\
    \    }\n    }\n    ```\n\nThe name is added to the `$filenames` array only\n \
    \   if the file is successfully moved to the destination folder.\n\n4.  Add a\
    \ public method to return the values stored in the `$filenames` property.\n  \
    \  The code looks like this:\n\n```\n    public function getFilenames() {\n  \
    \  return $this->filenames;\n    }\n    ```\n\nIt doesn’t matter where you put\
    \ this code in the class definition,\n    but it’s common practice to keep all\
    \ public methods together.\n\n5.  Save `Upload.php`. If you\n    need to check\
    \ your code, compare it with `Upload_01.php` in the\n    `ch18/PhpSolutions/File`\n\
    \    folder.\n\nAdapting the insert form to deal with multiple\ntables\nThe insert\
    \ form for blog articles that you created in Chapter [15](#332054_4_En_15_Chapter.xhtml)\
    \ already contains the code needed\nto insert most of the details in the `blog`\
    \ table. Rather\nthan start again from scratch, it makes sense to adapt the existing\n\
    page. As it stands, the page contains only a text input field for the\ntitle and\
    \ a text area for the article.\nYou need to add a multiple-choice `<select>` list\n\
    for categories and a drop-down `<select>` menu\nfor existing images.\nTo prevent\
    \ a user from selecting an existing image at the same time\nas uploading a new\
    \ one, a check box and JavaScript control the display\nof the relevant input fields.\
    \ Selecting the check box disables the\ndrop-down menu for existing images and\
    \ displays the input fields for a\nnew image and caption. Deselecting the check\
    \ box hides and disables the\nfile and caption fields and re-enables the drop-down\
    \ menu. If JavaScript\nis disabled, the options for uploading a new image and\
    \ captions are\nhidden.\n\nNote\nTo save space, most of the remaining PHP solutions\
    \ in this chapter\ngive detailed instructions only for MySQLi. The structure and\
    \ PHP logic\nfor the PDO version are the same. The only differences lie in the\n\
    commands used to submit the SQL queries and to display the results.\nFully commented\
    \ PDO files are in the `ch18` folder.\n\nPHP Solution 18-3: Adding the category\
    \ and image\nInput Fields\n\nThis PHP solution begins the process of adapting\
    \ the blog entry insert\nform from Chapter [15](#332054_4_En_15_Chapter.xhtml)\
    \ by adding the input fields for\ncategories and\nimages.\n\n1.  In the `admin`\n\
    \    folder, find and open the version of `blog_insert_mysqli.php`\n    that you\
    \ created in Chapter [15](#332054_4_En_15_Chapter.xhtml). Alternatively, copy\
    \ `blog_insert_mysqli_01.php`\n    from the `ch18`\n    folder to the `admin`\
    \ folder and\n    remove `_01` from\n    the filename.\n\n2.  The `<select>`\n\
    \    elements for the categories and existing images need to query the\n    database\
    \ when the page first loads, so you need to move the connection\n    script and\
    \ database connection outside the conditional statement\n    that checks if the\
    \ form has been submitted. Locate the lines\n    highlighted in bold:\n\n```\n\
    \    if (isset($_POST['insert'])) {\n    require_once '../includes/connection.php';\n\
    \    // initialize flag\n    $OK = false;\n    // create database connection\n\
    \    $conn = dbConnect('write');\n    ```\n\nMove them outside the conditional\
    \ statement and include `utility_funcs.php`,\n    like this:\n\n```\n    require_once\
    \ '../includes/connection.php';\n    require_once '../includes/utility_funcs.php';\n\
    \    // create database connection\n    $conn = dbConnect('write');\n    if (isset($_POST['insert']))\
    \ {\n    // initialize flag\n    $OK = false;\n    ```"
  trans: "\n在处理数据库中的多对多关系时，需要构建一个类似图 18-1 所示的交叉引用表。交叉引用表仅由两列组成，这两列联合声明为表的主键（称为复合主键）。\n\
