- fmt: "### 单行注释\n\n最常见的添加单行注释的方法是在前面加上两个斜杠，如下所示：\n\n```\n// this is a comment and\
    \ will be ignored by the PHP engine\n```\n\nPHP 会忽略从双斜杠到行尾的所有内容，因此你也可以将注释放在代码旁边（但只能放在右侧）：\n\
    \n```\n$startYear = 2006; // this is a valid comment\n```\n\n注释不是 PHP 语句，因此它们不以分号结尾。但不要忘记与注释在同一行的\
    \ PHP 语句末尾的分号。\n\n另一种风格是使用井号（`#`），如下所示：\n\n```\n# this is another type of comment\
    \ that will be ignored by the PHP engine\n```\n\n```\n$startYear = 2006; # this\
    \ also works as a comment\n```\n\n因为当多个 `#` 一起使用时非常醒目，这种注释风格通常用于指示较长脚本的章节，如下所示：\n\
    \n```\n##################\n## Menu section ##\n##################\n```\n\n###\
    \ 多行注释\n\n若要跨越几行进行注释，请使用与层叠样式表 (CSS) 和 JavaScript 中相同的注释风格。`/*` 和 `*/` 之间的任何内容都被视为注释，如下所示：\n\
    \n```\n/* This is a comment that stretches\nover several lines. It uses the same\n\
    beginning and end markers as in CSS. */\n```\n\n多行注释在测试或故障排除时特别有用，因为它们可以用来禁用大段脚本而无需删除它们。\n\
    \n> **提示**  \n> 良好的注释与精心选择的变量名相结合，使代码更易于理解和维护。\n\n## 使用数组存储多个值\n\n与其他编程语言一样，PHP\
    \ 允许你将多个值存储在一个称为数组的特殊类型变量中。思考数组的一种简单方式是，它们就像一张购物清单。尽管每个项目可能不同，但你可以用一个名字来统称它们。图\
    \ [3-3] 展示了这一概念：变量 `$shoppingList` 统指所有五个项目——葡萄酒、鱼、面包、葡萄和奶酪。\n\n![A978-1-4842-0635-5_3_Fig3_HTML.jpg](A978-1-4842-0635-5_3_Fig3_HTML.jpg)\n\
    \n**图 3-3.** 数组是存储多个项目的变量，就像一张购物清单\n\n单个项目（或数组元素）通过变量名后紧跟方括号中的数字来标识。PHP 会自动分配该数字，但需要注意的是，编号总是从\
    \ 0 开始。因此，在我们的示例中，数组中的第一个项目（葡萄酒）被引用为 `$shoppingList[0]`，而不是 `$shoppingList[1]`。尽管有五个项目，但最后一个（奶酪）是\
    \ `$shoppingList[4]`。该数字被称为数组键或索引，这种类型的数组称为索引数组。\n\nPHP 使用另一种类型的数组，其中键是一个单词（或任何字母和数字的组合）。例如，一个包含本书详细信息的数组可能如下所示：\n\
    \n```\n$book['title'] = 'PHP Solutions: Dynamic Web Design Made Easy, Third Edition';\n\
    $book['author'] = 'David Powers';\n$book['publisher'] = 'Apress';\n$book['ISBN']\
    \ = '978-1-4842-0636-2';\n```\n\n这种类型的数组称为关联数组。请注意，数组键需要用引号括起来（单引号或双引号都可以）。它不应包含任何空格或标点符号，下划线除外。\n\
    \n数组是 PHP 中重要且有用的部分。你将大量使用它们，从下一章开始，你将把图片的详细信息存储到数组中，以便在网页上显示随机图像。当您以一系列数组的形式获取搜索结果时，数组也广泛用于数据库操作。\n\
    \n> **注意**  \n> 你可以在本章后半部分学习创建数组的各种方法。\n\n## PHP 的内置超全局数组\n\nPHP 有几个内置数组，它们会自动填充有用的信息。它们被称为超全局数组，并且都以美元符号后跟下划线开头。你经常会看到的两个是\
    \ `$_POST` 和 `$_GET`。它们分别包含通过超文本传输协议 (HTTP) 的 `post` 和 `get` 方法从表单传递的信息。超全局变量都是关联数组，并且\
    \ `$_POST` 和 `$_GET` 的键会自动从 URL 末尾表单元素的名称或查询字符串中的变量派生而来。\n\n假设你在表单中有一个名为 `\"address\"\
    ` 的文本输入字段；当表单通过 `post` 方法提交时，PHP 会自动创建一个名为 `$_POST['address']` 的数组元素，或者如果使用 `get`\
    \ 方法，则创建 `$_GET['address']`。如图 [3-4] 所示，`$_POST['address']` 包含访问者在文本字段中输入的任何值，使你可以将其显示在屏幕上、插入数据库、发送到你的电子邮件收件箱，或执行任何你想做的操作。\n\
    \n![A978-1-4842-0635-5_3_Fig4_HTML.jpg](A978-1-4842-0635-5_3_Fig4_HTML.jpg)\n\n\
    **图 3-4.** 你可以通过 `$_POST` 数组检索用户输入的值，该数组在使用 `post` 方法提交表单时自动创建\n\n你将在第 5 章中使用\
    \ `$_POST` 数组，通过电子邮件将在线反馈表单的内容发送到你的收件箱。你在本书中将使用的其他超全局数组包括用于从网络服务器获取信息的 `$_SERVER`（第\
    \ 4、12 和 13 章）、用于将文件上传到网站的 `$_FILES`（第 7 章），以及用于创建简单登录系统的 `$_SESSION`（第 9 章和第\
    \ 17 章）。\n\n> **警告**  \n> 不要忘记 PHP 是区分大小写的。所有超全局数组名称都大写。例如，`$_Post` 或 `$_Get`\
    \ 将无法工作。"
  raw: '#### Single-line Comments


    The most common method of adding a single-line comment is to precede it with two
    forward slashes, like this:


    `// this is a comment and will be ignored by the PHP engine`


    PHP ignores everything from the double slashes to the end of the line, so you
    can also place comments alongside code (but only to the right):


    `$startYear = 2006; // this is a valid comment`


    Comments aren’t PHP statements, so they don’t end with a semicolon. But don’t
    forget the semicolon at the end of a PHP statement that’s on the same line as
    a comment.


    An alternative style uses the hash or pound sign (`#`), like this:


    `# this is another type of comment that will be ignored by the PHP engine`


    `$startYear = 2006; # this also works as a comment`


    Because `#` stands out prominently when several are used together, this style
    of commenting often indicates sections of a longer script, like this:


    `##################`


    `## Menu section ##`


    `##################`


    #### Multi-line Comments


    For a comment to stretch over several lines, use the same style of comments as
    in Cascading Style Sheets (CSS) and JavaScript. Anything between `/*` and `*/`
    is treated as a comment, like this:


    `/* This is a comment that stretches`


    `over several lines. It uses the same`


    `beginning and end markers as in CSS. */`


    Multi-line comments are particularly useful when testing or troubleshooting, as
    they can be used to disable long sections of script without the need to delete
    them.


    Tip


    A combination of good comments and well-chosen variable names makes code easier
    to understand and maintain.


    ### Using Arrays to Store Multiple Values


    In common with other computing languages, PHP lets you store multiple values in
    a special type of variable called an array. A simple way of thinking about arrays
    is that they’re like a shopping list. Although each item might be different, you
    can refer to them collectively by a single name. Figure [3-3](#A978-1-4842-0635-5_3_Chapter.html#Fig3)
    demonstrates this concept: the variable `$shoppingList` refers collectively to
    all five items—wine, fish, bread, grapes, and cheese.


    ![A978-1-4842-0635-5_3_Fig3_HTML.jpg](A978-1-4842-0635-5_3_Fig3_HTML.jpg)


    Figure 3-3.


    Arrays are variables that store multiple items, just like a shopping list


    Individual items—or array elements—are identified by means of a number in square
    brackets immediately following the variable name. PHP assigns the number automatically,
    but it’s important to note that the numbering always begins at 0\. So the first
    item in the array, wine in our example, is referred to as `$shoppingList[0]`,
    not `$shoppingList[1]`. And although there are five items, the last one (cheese)
    is `$shoppingList[4]`. The number is referred to as the array key or index, and
    this type of array is called an indexed array.


    PHP uses another type of array in which the key is a word (or any combination
    of letters and numbers). For instance, an array containing details of this book
    might look like this:


    `$book[''title''] = ''PHP Solutions: Dynamic Web Design Made Easy, Third Edition'';`


    `$book[''author''] = ''David Powers'';`


    `$book[''publisher''] = ''Apress'';`


    `$book[''ISBN''] = ''978-1-4842-0636-2'';`


    This type of array is called an associative array. Note that the array key is
    enclosed in quotes (single or double, it doesn’t matter). It shouldn’t contain
    any spaces or punctuation, except for the underscore.


    Arrays are an important and useful part of PHP. You’ll use them a lot, starting
    with the next chapter, when you’ll store details of images in an array to display
    a random image on a webpage. Arrays are also used extensively with databases as
    you fetch the results of a search in a series of arrays.


    Note


    You can learn the various ways of creating arrays in the second half of this chapter.


    ### PHP’s Built-in Superglobal Arrays


    PHP has several built-in arrays that are automatically populated with useful information.
    They are called superglobal arrays, and all begin with a dollar sign followed
    by an underscore. Two that you will see frequently are `$_POST` and `$_GET`. They
    contain information passed from forms through the Hypertext Transfer Protocol
    (HTTP) `post` and `get` methods, respectively. The superglobals are all associative
    arrays, and the keys of `$_POST` and `$_GET` are automatically derived from the
    names of form elements or variables in a query string at the end of a URL.


    Let’s say you have a text input field called `"address"` in a form; PHP automatically
    creates an array element called `$_POST[''address'']` when the form is submitted
    by the `post` method or `$_GET[''address'']` if you use the `get` method. As Figure
    [3-4](#A978-1-4842-0635-5_3_Chapter.html#Fig4) shows, `$_POST[''address'']` contains
    whatever value a visitor enters in the text field, enabling you to display it
    onscreen, insert it in a database, send it to your email inbox, or do whatever
    you want with it.


    ![A978-1-4842-0635-5_3_Fig4_HTML.jpg](A978-1-4842-0635-5_3_Fig4_HTML.jpg)


    Figure 3-4.


    You can retrieve the values of user input through the `$_POST` array, which is
    created automatically when a form is submitted using the `post` method


    You’ll work with the `$_POST` array in [Chapter 5](#A978-1-4842-0635-5_5_Chapter.html)
    when you send the content of an online feedback form by email to your inbox. Other
    superglobal arrays that you’ll use in this book are `$_SERVER`, to get information
    from the web server in Chapters 4, 12, and 13, `$_FILES` to upload files to your
    website in [Chapter 7](#A978-1-4842-0635-5_7_Chapter.html), and `$_SESSION`, to
    create a simple login system in [Chapters 9](#A978-1-4842-0635-5_9_Chapter.html)
    and [17](#A978-1-4842-0635-5_17_Chapter.html).


    Caution


    Don’t forget that PHP is case-sensitive. All superglobal array names are written
    in uppercase. `$_Post` or `$_Get`, for example, won’t work.'
