    ### 使用函数执行预设任务


    正如我之前提到的，函数用于执行各种操作……在 PHP 中，其数量之多令人难以置信。一个典型的 PHP 环境会为你提供数千个内置函数。别担心：你实际需要用到的只有一小部分，但知道
    PHP 是一种功能完备的语言，这让人很安心。


    你在本书中将使用的函数能完成非常实用的任务，例如获取图像的高度和宽度、从现有图像创建缩略图、查询数据库、发送电子邮件等等。你能在 PHP 代码中识别出函数，因为它们总是跟随着一对圆括号。有时括号是空的，就像你在上一章
    `phpversion.php` 中使用的 `phpversion()` 那样。不过，更常见的情况是括号内包含变量、数字或字符串，就像图 3-1 脚本中的这行代码：


    `$thisYear = date(''Y'');`


    这段代码计算当前年份并将其存储在变量 `$thisYear` 中。它的工作原理是将字符串 `''Y''` 传递给 PHP 内置函数 `date()`。像这样将值放在括号之间的操作被称为向函数传递参数（argument）。函数接收参数中的值并进行处理，以产生（或返回）结果。例如，如果你向
    `date()` 传递字符串 `''M''` 而不是 `''Y''`，它将返回当前月份的三字母缩写（例如 Mar、Apr、May）。如下例所示，你将函数的结果赋值给一个命名恰当的变量来捕获它：


    `$thisMonth = date(''M'');`


    **注意：** 第 14 章会深入介绍 PHP 如何处理日期和时间。


    有些函数接受多个参数。在这种情况下，需要在括号内用逗号分隔参数，就像这样：


    `$mailSent = mail($to, $subject, $message);`


    不难理解，这会将一封电子邮件发送到第一个参数中存储的地址，主题行是第二个参数的内容，而消息体是第三个参数。你将在第 5 章中了解这个函数的具体工作方式。


    **提示：** 你经常会看到术语“参数”替代“参数（argument）”出现。从技术上讲，parameter 指的是函数定义中使用的变量，而 argument
    指的是传递给函数的实际值。在实践中，这两个术语往往可以互换使用。


    似乎所有内置函数还不够，PHP 还允许你构建自己的自定义函数。即使你不喜欢自己创建函数，在本书中你也会用到我创建的一些函数。使用它们的方式完全相同。


    ### 理解 PHP 类和对象


    函数和变量赋予了 PHP 巨大的能力和灵活性，但类和对象则将这门语言提升到了更高的层次。类是面向对象编程（OOP）的基本构建块，这是一种旨在使代码可重用且更易于维护的编程方法。PHP
    对 OOP 提供了广泛的支持，并且新特性通常以面向对象的方式实现。


    对象是一种复杂的数据类型，可以存储和操作值。类是定义对象特征的代码，可以被视为创建对象的蓝图。在 PHP 众多的内置类中，有两个特别引人关注：`DateTime`
    和 `DateTimeZone` 类，它们处理日期和时区。你将在本书中使用的另外两个内置类是 `MySQLi` 和 `PDO`，它们用于与数据库通信。


    要创建对象，你需要使用 `new` 关键字和类名，就像这样：


    `$now = new DateTime();`


    这将创建 `DateTime` 类的一个实例，并将其存储在一个名为 `$now` 的 `DateTime` 对象中。这与上一节中的 `date()` 函数的不同之处在于，`DateTime`
    对象不仅知道它被创建的日期和时间，还知道 Web 服务器所使用的时区。而 `date()` 函数仅仅是根据传递给它的参数生成一个包含格式化日期的数字或字符串。


    在前面的例子中，没有向类传递任何参数，但类可以像函数一样接受参数，你将在下一个例子中看到这一点。


    大多数类还具有属性和方法，它们类似于变量和函数，区别在于它们与类的特定实例相关。例如，你可以使用 `DateTime` 类的方法来更改某些值，比如月份、年份或时区。`DateTime`
    对象还能够执行日期计算，而使用普通函数来实现则会复杂得多。


    你可以使用 `->` 运算符（一个连字符后跟一个大于号）来访问对象的属性和方法。要重置 `DateTime` 对象的时区，可以像这样将一个 `DateTimeZone`
    对象作为参数传递给 `setTimezone()` 方法：


    `$westcoast = new DateTimeZone(''America/Los_Angeles'');`


    `$now->setTimezone($westcoast);`


    这会将 `$now` 中存储的日期和时间重置为洛杉矶的当前日期和时间，无论 Web 服务器位于何处，并会自动处理夏令时的调整。


    `DateTime` 和 `DateTimeZone` 类没有属性，但你可以使用相同的方式通过 `->` 运算符来访问对象的属性：


    `$someObject->propertyName`


    如果你觉得对象、属性和方法这些概念难以理解，也不必担心。你只需要知道如何用 `new` 关键字实例化对象，以及如何使用 `->` 运算符访问属性和方法。


    **提示：** 关于 PHP 中 OOP 的深入讨论及大量动手示例，请参阅我的书《PHP 面向对象解决方案》（friends of ED, 2008, ISBN:
    978-1-4302-1011-5）。


    ### 显示 PHP 输出


    除非你能在网页中显示结果，否则所有这些后台的魔法就没有多大意义。在 PHP 中有两种方法可以做到这一点：使用 `echo` 或 `print`。两者之间有一些细微的差别，但这些差别非常微妙，你可以把它们视为完全相同。我个人更喜欢
    `echo`，仅仅是因为它少一个字母。


    你可以将 `echo` 与变量、数字和字符串一起使用；只需把它放在你想要显示的任何内容前面，就像这样：


    `$name = ''David'';`


    `echo $name;   // 显示 David`


    `echo 5;       // 显示 5`


    `echo ''David''; // 显示 David`


    当使用 `echo` 和 `print` 处理变量时，它们只能用于包含单个值的变量。你不能用它们来显示数组或数据库结果的内容。这正是循环如此有用的地方：你在循环内部使用
    `echo` 或 `print` 来逐个显示每个元素。在本书的剩余部分，你将会看到很多这样的实际例子。


    你可能会看到脚本中 `echo` 和 `print` 使用了括号，就像这样：


    `echo(''David''); // 显示 David`


    括号没有区别。除非你喜欢为了打字而打字，否则可以省略它们。


    #### 使用 Echo 简写语法


    当你只想显示单个变量或表达式的值（且没有其他内容）时，可以使用一个简写的 PHP 开始标签，它由一个左尖括号、一个问号和一个等号组成，就像这样：


    `<p>My name is <?= $name; ?>.</p>`


    这会产生与以下代码完全相同的输出：


    `<p>My name is <?php echo $name; ?>.</p>`


    因为它是 `echo` 的简写形式，所以同一个 PHP 块中不能有其他代码，但在将数据库结果嵌入网页时，它特别有用。不言而喻，在使用此简写之前，变量的值必须在之前的
    PHP 块中设置好。


    **注意：** 在 PHP 5.4 之前，`echo` 简写语法只有在 `php.ini` 中启用了 `short_open_tag` 配置设置时才有效。自
    PHP 5.4 起，`<?=` 始终可用。

