    Download the latest Win32 Binary (MSI Installer) version of the Apache HTTP Server
    from http://httpd.apache.org/download.cgi. The file will be named something like
    apache_2.x.y-win32-x86-no_ssl.msi. Execute the file.


    At install time, you’ll be given the option to choose the location to which your
