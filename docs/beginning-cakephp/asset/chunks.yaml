    **Summary**


    When you must use third-party scripts in your Cake application, it’s best to include
    them as vendors using the App::import() method. Once the script is available,
    its functions and objects can be directly called in the application. Of course,
    because vendors work in Cake unidirectionally, how you further implement the vendor
    will depend on the vendor’s own methods. In this chapter, we discussed using components
    from Zend Framework to perform Akismet spam checks and PDF file rendering. Other
    web service components can be used in Cake using similar methods. In Chapter 13,
    we’ll examine plugins—resources that allow you to create a mini-application of
    sorts that can be distributed across multiple Cake applications.


