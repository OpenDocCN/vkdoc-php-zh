    \n## 第 15 章：使用 JSON 进行数据交换\n\n第 [14 章](http://dx.doi.org/10.1007/978-1-4842-0605-8_14)介绍了如何使用\
    \ XML 在客户端和服务端之间交换数据。当客户端使用浏览器中的 JavaScript 创建时，使用一种名为 JSON 的东西来交换数据要容易得多。JSON\
    \ 是 JavaScript Object Notation（JavaScript 对象表示法）的缩写。它是一种类似字符串的表示法，可以轻松声明像数组和对象这样的复杂结构。\n\
    \n### 配方 15-1：使用 AJAX 获取数据\n\n#### 问题\n\n传统上，浏览器用于从服务端获取 HTML 页面。通过 HTML 文档中的链接导航到同一或不同服务器的不同页面。当用户点击链接时，浏览器会获取并渲染新页面的内容。\n\
    \n随着 Web 技术的发展，为了减少加载时间，加载页面的一部分变得越来越常见。当用户点击“阅读更多”链接或滚动到页面底部时，浏览器会获取更多内容并内联渲染，而无需重新加载现有文档。\n\
    \n#### 解决方案\n\n所使用的技术是 AJAX 请求。这是一段 JavaScript 代码，它会向服务器执行 HTTP 请求（通常是与加载页面相同的服务器），然后使用响应结果将额外内容插入到\
    \ HTML 文档中。\n\n简单的方法是让服务端生成需要添加的 HTML，并将返回的值直接追加到 HTML 文档中。\n\n#### 工作原理\n\n在浏览器中使用\
    \ `XMLHTTP` 对象相对简单，但使用 jQuery 可以使其更简单。jQuery 是一个 JavaScript 库，它使得操作 HTML 文档、添加事件监听器和执行\
    \ AJAX 请求变得非常容易。本章的所有配方都将使用 jQuery 库。\n\n© Frank M. Kromann 2016\nF.M. Kromann,\
    \ *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_15\n\n第一个示例展示了如何使用 jQuery\
    \ 和 PHP 脚本加载一个包含几行数据的简单文档，然后发起 AJAX 请求来更新部分数据，而无需重新加载文档。\n\n```php\n// 15_1.php\n\
    $languages = [\n    'PHP', 'JavaScript',\n    'C', 'C++', 'C#', 'Objective-C',\n\
    \    'Python', 'Java', 'Ruby',\n    'Visual Basic',\n    'Scala'\n];\nshuffle($languages);\n\
    $data = array_slice($languages, 0, 3);\n$html = \"\";\nforeach($data as $lang)\
    \ {\n    $html .= \"<li>$lang</li>\";\n}\n\nif ($_REQUEST['data']) {\n    echo\
    \ $html;\n}\nelse {\n    echo <<<HEREDOC\n<!DOCTYPE html>\n<html>\n<head>\n<script\
    \ src=\"https://code.jquery.com/jquery-1.12.2.min.js\"\n    integrity=\"sha256-lZFHibXzMHo3GGeehn1hudTAP3Sc0uKXBXAzHX1sjtk=\"\
    \n    crossorigin=\"anonymous\"></script>\n</bead>\n<body>\n<h1>编程语言</h1>\n<ul\
    \ id=\"lang\">\n$html\n</ul>\n<button onclick=\"Update()\">更新</button>\n<script>\n\
    function Update() {\n    $.get(\"{$_SERVER['PHP_SELF']}?data=1\", function(data)\
    \ {\n        $(\"#lang\").html(data);\n    });\n}\n</script>\n</body>\n</html>\n\
    HEREDOC;\n}\n```\n\n![图 27](img/index-345_1.jpg)\n\n此脚本初始加载的输出如下所示：\n\n每当用户点击“更新”按钮时，同一脚本会以参数\
    \ `data=1` 被调用，并仅返回 3 个 `<li>` 元素的 HTML。返回的字符串将被插入到具有 `id=\"lang\"` 属性的 `<ul>`\
    \ 元素中，并替换原有的内容。\n\n### 配方 15-2：返回 JSON\n\n#### 问题\n\n从服务端返回完整的 HTML 字符串使得客户端难以在需要时操作数据。有没有一种方法可以以结构化形式获取数据，从而允许客户端操作数据，并可能创建适合其渲染设备所需的\
    \ HTML？\n\n#### 解决方案\n\nPHP 具有将变量编码和解码为 JSON 格式及从 JSON 格式还原的函数。函数 `json_encode()`\
    \ 会将变量转换为字符串化版本，`json_decode()` 会将一个字符串化的 JSON 字符串转换回 PHP 变量。将变量编码为 JSON 常用于生成响应，而解码则用于\
    \ PHP 作为客户端调用返回 JSON 响应的 API。除了 encode 和 decode 函数，PHP 还支持 `json_last_error()`。此函数不接受任何参数，可在\
    \ encode 或 decode 之后调用。它会返回一个代表上次操作结果的整数值。可能的返回值可以与以下常量之一进行比较：\n\n| 常量 | 含义 |\
    \ 可用版本 |\n|---|---|---|\n| `JSON_ERROR_NONE` | 未检测到错误 | |\n| `JSON_ERROR_DEPTH`\
    \ | 超出最大堆栈深度 | |\n| `JSON_ERROR_STATE_MISMATCH` | 无效的 JSON | |\n| `JSON_ERROR_CTRL_CHAR`\
    \ | 无效的控制字符 | |\n| `JSON_ERROR_SYNTAX` | 语法错误 | |\n| `JSON_ERROR_UTF8` | 格式错误的\
    \ UTF-8 字符 | 5.3.3 |\n| `JSON_ERROR_RECURSION` | 递归引用 | 5.5.0 |\n| `JSON_ERROR_INF_OR_NAN`\
    \ | 发现 NAN 或 INF 值 | 5.5.0 |\n| `JSON_ERROR_UNSUPPORTED_TYPE` | 不支持的类型 | 5.5.0\
    \ |\n\n当需要返回多个变量时，最简单的方法是将它们放入一个数组，然后返回该数组的 JSON 编码版本。\n\n#### 工作原理\n\n将之前的示例改为使用\
    \ JSON 而非 HTML 字符串只需要做少量修改。\n"
- fmt: "The first is to make sure the `Content-Type` is set correct. This simple example\
    \ will work without it but it’s always a good idea to set the correct `Content-Type`\
    \ to tell the clients what to expect. The second step is to only generate the\
    \ `$html` variable used on the full document load and to return the JSON encoded\
    \ value of the `$data` variable. Finally there are some small changes to the JavaScript\
    \ code. In this example the code will generate the final html segment to insert\
    \ into the document. In this case the code looks at the data and if the language\
    \ returned is PHP it will add a bold tag around it.\n\n```php\n<?php\n\n// 15_2.php\n\
    \n$languages = [\n\n'PHP', 'JavaScript',\n\n'C', 'C++', 'C#', 'Objective-C',\n\
    \n'Python', 'Java', 'Ruby',\n\n'Visual Basic',\n\n'Scala'\n\n];\n\nshuffle($languages);\n\
    \n$data = array_slice($languages, 0, 3);\n\nif ($_REQUEST['data']) {\n\nheader(\"\
    Content-Type: application/json\");\n\necho json_encode($data);\n\n}\n\nelse {\n\
    \n$html = \"\";\n\nforeach($data as $lang) {\n\n$html .= \"<li>$lang</li>\";\n\
    \n}\n\necho <<<HEREDOC\n\n<!DOCTYPE html>\n\n<html>\n\n<head>\n\n<script src=\"\
    https://code.jquery.com/jquery-1.12.2.min.js\"\n\nintegrity=\"sha256-lZFHibXzMHo3GGeehn1hudTAP3Sc0uKXBXAzHX1sjtk=\"\
    \n\ncrossorigin=\"anonymous\"></script>\n\n</bead>\n\n<body>\n\n<h1>Programming\
    \ Languages</h1>\n\n<ul id=\"lang\">\n\n$html\n\n</ul>\n\n<button onclick=\"Update()\"\
    >Update</button>\n\n<script>\n\nCHAPTER 15 ■ DATA EXCHANGE WITH JSON\n\nfunction\
    \ Update() {\n\n$.getJSON(\"{$_SERVER['PHP_SELF']}?data=1\", function(data) {\n\
    \nvar html = '';\n\n$.each(data, function(key, value) {\n\nif (value == 'PHP')\
    \ {\n\nhtml += '<li><b>PHP</b></li>';\n\n}\n\nelse {\n\nhtml += '<li>' + value\
    \ + '</li>';\n\n}\n\n});\n\n$('#lang').html(html);\n\n});\n\n}\n\n</script>\n\n\
    </body>\n\n</html>\n\nHEREDOC;\n\n}\n```\n\nThe jQuery function used in the first\
    \ example was called `$.get()`. This is now replaced with a call to `$.getJSON()`.\
    \ This function will automatically convert the JSON string into an array or object\
    \ so the script can traverse through the values.\n\n## Recipe 15-3. Consuming\
    \ a JSON API\n\n### Problem\n\nWhen you are creating Web API’s it’s often a good\
    \ idea to create a test client that can consume and validate the responses of\
    \ API’s.\n\n### Solution\n\nPHP has built-in support for fetching remote content\
    \ via the `fopen` wrappers that allow the user of URL’s to fetch content from\
    \ an HTTP based endpoint. We can use a combination of `file_get_contents()` and\
    \ `json_decode()` to work with JSON-based API’s.\n\n### How it Works\n\nTo create\
