- fmt: "Then, by using the `$html->styles()` function, I can reduce fetching these\
    \ styles to a single function. In conjunction with the `$html->para()` function\
    \ and assuming this `$styles` variable is available in the view, notice how the\
    \ `styles()` function conveniently handles dynamic CSS:\n\n```php\n<?=$html->para(null,'Paragraph\
    \ Text',array('style'=>$html->styles($styles['p_bold'])));?>\n```\n\nThis line\
    \ would return the following HTML:\n\n```html\n<p style=\"font-size:1.0em; font-weight:bold\"\
    >Paragraph Text</p>\n```\n\nThis function can also simplify loops through elements\
    \ that use database-driven styles.\n\nJust make sure the keys in the styles array\
    \ are formatted correctly by following the previous example.\n\n## `tableHeaders`\
    \ and `tableCells`\n\nThese functions display a table. Also, a common feature\
    \ of tabular displays is alternating rows.\n\nRather than build PHP formulas for\
    \ alternating through table rows, the `$html->tableCells()` function can automatically\
    \ attach a CSS class or HTML attributes to odd and even rows. Similar to other\
    \ convenience wrappers, both the `$html->tableHeaders()` and `$html->tableCells()`\
    \ functions make displaying dynamic content in HTML much easier to manage.\n\n\
    **`tableHeaders( names[array], trAttributes[array], thAttributes[array] )`**\n\
    \n- `names`: Array of names for the table’s columns\n- `trAttributes = null`:\
    \ HTML attributes to be passed to the `<tr>` tag\n- `thAttributes = null`: HTML\
    \ attributes to be passed to the `<th>` tag\n\n**`tableCells( data[array], oddTrAttributes[array],\
    \ evenTrAttributes[array], useCount[bool] )`**\n\n- `data`: Table data arranged\
    \ as rows and columns in an array\n- `oddTrAttributes = null`: HTML attributes\
    \ to be passed to odd rows\n- `evenTrAttributes = null`: HTML attributes to be\
    \ passed to even rows\n- `useCount = false`: If true, adds the class name `column-`\
    \ plus the number of the row to the `<tr>` element\n\nThe `$html->tableHeaders()`\
    \ function renders only the header row inside a table. Be sure to enter the `<table>`\
    \ element tags by hand as HTML and include these table functions inside this element.\
    \ The returned HTML contains both the `<th>` and `<tr>` tags, so to pass HTML\
    \ attributes to one or both of these, use the `trAttributes` and `thAttributes`\
    \ parameters, respectively. The following line:\n\n```php\n<?=$html->tableHeaders(array('1','2'),array('class'=>'row'),array('class'=>'header'));?>\n\
    ```\n\nwill return the following:\n\n```html\n<tr class=\"row\"><th class=\"header\"\
    >1</th> <th class=\"header\">2</th></tr>\n```\n\nThe `names` array for the `$html->tableHeaders()`\
    \ function is formatted with only the names themselves without any nested arrays.\
