    name, description, and list of categories (you wrote the necessary code for these
    tasks earlier), you also want to display the list of featured products for that
    department.


    catalog_get_products_on_department returns all the products that belong to a specific
    department and has the display set to 2 (product on department promotion) or 3
    (product on department and catalog promotion).


    In catalog_get_products_in_category, you needed to make a table join to find out
    the products that belong to a specific category. Now that you need to do this
    for departments, the task is a bit more complicated because you can’t directly
    know what products belong to each department.


    You know how to find categories that belong to a specific department (you did
    this in catalog_get_categories_list), and you know how to get the products that
    belong to a specific category (you did that in catalog_get_products_in_category).
    By combining these pieces of information, you can generate the list of products
    in a department. For this, you need two table joins.


