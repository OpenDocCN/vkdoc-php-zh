    Adjusting Views


    When the Tags views were generated by Bake, they included behavior fields (parent_id,
    left, and right). These might conflict with the Tree behavior if they stay as
    part of a form submission, so it’s important they be removed from the views. Find
    the Form helper functions in each of the baked views that call one of the behavior’s
    fields, and remove them from the file. You should be left with the name field
    only and, in some instances, the id field.


    Next, to give a tag a parent node, the Add and Edit views must have a way of selecting
    a parent ID. To do this, place a select menu containing a list of Tags in the
    Add and Edit views. For this menu to work, you will first have to generate a Tags
    list in the controller and then use the Form helper to render the select menu
    in the view. Open app/controllers/


    tags_controller.php, and add the following line to the Add and Edit actions: $tags
    = $this->Tag->find(''list'');


    Now that a list of tags is available as the $tags array, pass the variable to
    the view by rewriting the set() function to include both $posts and $tags:


    $this->set(compact(''posts'',''tags''));


    In the Add and Edit views, use the Form helper to provide the select menu. Remember
    that it will need some added parameters to work correctly with the controller.
    Listing 14-13


