- fmt: '# Security and Performance


    ## The `__toString` Method and Security


    Security and performance — the `__toString` method "exposes" whatever it returns
    to any program that makes an instance of the class in which it exists. Using this
    method to pass error messages might allow a hacker to determine what incorrect
    information they are sending into a program. In the `dog.class` example from Chapter
    5, `__toString` passes back the `error_message` string containing `''TRUE''` or
    `''FALSE''` responses. This is more secure than returning error messages. However,
    by replacing the `__toString` method with throwing a special exception, you provide
    even better security. Hackers must now not only know what the `error_message`
    means, but they must also know the name of the exception (`setException`) in order
    to capture it in their own programs.


    ```php

    asXML();

    $this->result = "";

    $this->result = $this->result . "

    Select a dog breed";

    foreach ($breed_file->children() as $name => $value)

    {

    $this->result = $this->result . "$value";

    }

    $this->result = $this->result . "";

    return $this->result;

    }

    else

    {

    throw new Exception("Breed xml file missing or corrupt");

    }

    }

    }

    ?>

    ```


    **Example 6-4** The `getbreeds.class` with exception handling


    Comparing the previous `GetBreeds` class (in Example 5-11) with Example 6-4 shows
    only one change. It returns `''FALSE''` and throws a general exception indicating
    that the `breed.xml` file is missing or corrupt. Again, the `GetBreeds` class
    pushes any exceptions to the interface. The interface no longer has to determine
    if there are any exceptions. Even though missing file errors cannot be redirected
    to be handled as exceptions, the code uses `file_exists` to throw an exception
    if the file is missing.


    ```php

