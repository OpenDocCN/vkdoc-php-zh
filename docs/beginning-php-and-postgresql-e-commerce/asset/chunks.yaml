    ## Adding Shopping Cart Recommendations


    The logic for showing shopping cart recommendations is very similar to what you
    did earlier, except now you need to take into account all products that exist
    in the shopping cart, instead of a single product. Follow the steps in the next
    exercise to add the `shopping_cart_get_recommendations` function to the `hatshop`
    database.


    ### Exercise: Adding the `shopping_cart_get_recommendations` Function


    1. Load pgAdmin III, and connect to the `hatshop` database.

    2. Click **Tools** ➤ **Query tool** (or click the **SQL** button on the toolbar).
    A new query window should appear.

    3. Use the query tool to execute this code, which creates the `shopping_cart_get_recommendations`
    function in your `hatshop` database:


    ```sql

    -- Create shopping_cart_get_recommendations function


    CREATE FUNCTION shopping_cart_get_recommendations(CHAR(32), INTEGER) RETURNS SETOF
    product_recommendation LANGUAGE plpgsql AS $$


    DECLARE


    inCartId ALIAS FOR $1;


    inShortProductDescriptionLength ALIAS FOR $2;


    outProductRecommendationRow product_recommendation;


    BEGIN


    FOR outProductRecommendationRow IN


    -- Returns the product recommendations


    SELECT product_id, name, description


    FROM product


    WHERE product_id IN


    (-- Returns the products that exist in a list of orders


    SELECT od1.product_id


    FROM order_detail od1


    JOIN order_detail od2


    ON od1.order_id = od2.order_id


    JOIN shopping_cart


    ON od2.product_id = shopping_cart.product_id


    WHERE shopping_cart.cart_id = inCartId


    -- Must not include products that already exist


    -- in the visitor''s cart


    AND od1.product_id NOT IN


    (-- Returns the products in the specified


    -- shopping cart


    SELECT product_id


    FROM shopping_cart


    WHERE cart_id = inCartId)


    -- Group the product_id so we can calculate the rank


    GROUP BY od1.product_id


    -- Order descending by rank


    ORDER BY COUNT(od1.product_id) DESC


    LIMIT 5)


    LOOP


    IF char_length(outProductRecommendationRow.description) > inShortProductDescriptionLength
