    **Displaying Pending Orders**


    In the following pages, you’ll implement the admin_orders componentized template
    and its supporting data tier and business tier functionality. admin_orders is
    the componentized template that allows the administrator to view the orders that
    have been placed on the web site.


    Because the orders list will become very long, it is important to have a few well-chosen
    filtering options.


    The administrator will be able to select the orders using the following criteria:


    • Show the most recent orders.


    • Show orders that took place in a certain period of time.


    • Show orders with a specified status value.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH09.qxd 11/17/06 3:39 PM Page 317


    C H A P T E R 9 ■ D E A L I N G W I T H C U S TO M E R O R D E R S


    **317**


    Okay, now that you know what you want, let’s start writing some code. You’ll start
    with the data tier.


    Implementing the Data Tier


    In the following exercise, you’ll create the data tier functions one at a time,
    and we’ll comment a little upon each one of them.


    **Exercise: Implementing the Functions**


    **1.** Load pgAdmin III, and connect to the hatshop database.


    **2.** Click Tools ➤ Query tool (or click the SQL button on the toolbar). A new
    query window should appear.


    **3.** Use the query tool to execute this code, which creates the order_short_details
    type and orders_get_most_recent_orders function in your hatshop database:


    -- Create order_short_details type


    CREATE TYPE order_short_details AS


    (


    order_id INTEGER,


    total_amount NUMERIC(10, 2),


    created_on TIMESTAMP,


    shipped_on TIMESTAMP,


    status INTEGER,


    customer_name VARCHAR(50)


    );


    -- Create orders_get_most_recent_orders function


    CREATE FUNCTION orders_get_most_recent_orders(INTEGER)


    RETURNS SETOF order_short_details LANGUAGE plpgsql AS $$


    DECLARE


    inHowMany ALIAS FOR $1;


    outOrderShortDetailsRow order_short_details;


    BEGIN


    FOR outOrderShortDetailsRow IN


    SELECT order_id, total_amount, created_on,


    shipped_on, status, customer_name


    FROM orders


    ORDER BY created_on DESC


    LIMIT inHowMany


    LOOP


    RETURN NEXT outOrderShortDetailsRow;


    END LOOP;


    END;


    $$;


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH09.qxd 11/17/06 3:39 PM Page 318


    **318**


    C H A P T E R 9 ■ D E A L I N G W I T H C U S TO M E R O R D E R S


    The orders_get_most_recent_orders function retrieves a list of the most recent
    orders. The SELECT


    SQL statement used in this method uses the LIMIT clause to limit the number of
    returned rows to inHowMany rows.


    The ORDER BY clause is used to sort the results. The default sorting mode is ascending,
    but by adding DESC, the descending sort mode is set (so the most recent orders
    will be listed first).


    **4.** Use the query tool to execute this code, which creates the orders_get_orders_between_dates
    function in your hatshop database:


    -- Create orders_get_orders_between_dates function


    CREATE FUNCTION orders_get_orders_between_dates(TIMESTAMP, TIMESTAMP) RETURNS
    SETOF order_short_details LANGUAGE plpgsql AS $$


    DECLARE


    inStartDate ALIAS FOR $1;


    inEndDate ALIAS FOR $2;


    outOrderShortDetailsRow order_short_details;


    BEGIN


    FOR outOrderShortDetailsRow IN


    SELECT order_id, total_amount, created_on,


    shipped_on, status, customer_name


    FROM orders


    WHERE created_on >= inStartDate AND created_on <= inEndDate ORDER BY created_on
    DESC


    LOOP


    RETURN NEXT outOrderShortDetailsRow;


    END LOOP;


    END;


    $$;


    This function returns all the records in which the current date is between inStartDate
    and inEndDate that are supplied as parameters. The results are sorted descending
    by date.'
  trans: "\n`elseif ($admin_page == 'Orders')`\n\n`$pageContentsCell = 'admin_orders.tpl';`\n\
    \n`elseif ($admin_page == 'OrderDetails')`\n\n`$pageContentsCell = 'admin_order_details.tpl';`\n\
    \n**3.** 修改 `presentation/templates/admin_menu.tpl`，将高亮的链接代码添加到购物车管理页面：\n\n`<span\
    \ class=\"menu_text\"> |`\n\n`<a href=\"{\"admin.php?Page=Orders\"|prepare_link:\"\
    https\"}\">订单管理</a>`\n\n`|`\n\n`<a href=\"{\"admin.php?Page=Cart\"|prepare_link:\"\
    https\"}\">购物车管理</a> |`\n\n### 显示待处理订单\n\n在接下来的页面中，你将实现 `admin_orders` 组件化模板及其配套的数据层和业务层功能。`admin_orders`\
    \ 是一个组件化模板，允许管理员查看网站上已下的订单。\n\n由于订单列表会变得非常长，因此选择一些合适的筛选选项非常重要。管理员将能够使用以下条件筛选订单：\n\
    \n- 显示最近的订单。\n- 显示特定时间段内的订单。\n- 显示具有指定状态值的订单。\n\n好了，既然你已经明确了需求，就让我们开始编写代码吧。我们将从数据层开始。\n\
    \n### 实现数据层\n\n在以下练习中，你将逐一创建数据层函数，并对每个函数进行简要说明。\n\n#### 练习：实现函数\n\n1. 加载 pgAdmin\
    \ III，并连接到 `hatshop` 数据库。\n2. 点击**工具** ➤ **查询工具**（或点击工具栏上的 **SQL** 按钮）。此时应出现一个新的查询窗口。\n\
    3. 使用查询工具执行以下代码，该代码将在你的 `hatshop` 数据库中创建 `order_short_details` 类型和 `orders_get_most_recent_orders`\
    \ 函数：\n\n```sql\n-- 创建 order_short_details 类型\nCREATE TYPE order_short_details\
    \ AS\n(\n  order_id INTEGER,\n  total_amount NUMERIC(10, 2),\n  created_on TIMESTAMP,\n\
    \  shipped_on TIMESTAMP,\n  status INTEGER,\n  customer_name VARCHAR(50)\n);\n\
    \n-- 创建 orders_get_most_recent_orders 函数\nCREATE FUNCTION orders_get_most_recent_orders(INTEGER)\n\
    RETURNS SETOF order_short_details LANGUAGE plpgsql AS $$\nDECLARE\n  inHowMany\
    \ ALIAS FOR $1;\n  outOrderShortDetailsRow order_short_details;\nBEGIN\n  FOR\
    \ outOrderShortDetailsRow IN\n    SELECT order_id, total_amount, created_on,\n\
    \           shipped_on, status, customer_name\n    FROM orders\n    ORDER BY created_on\
    \ DESC\n    LIMIT inHowMany\n  LOOP\n    RETURN NEXT outOrderShortDetailsRow;\n\
    \  END LOOP;\nEND;\n$$;\n```\n\n`orders_get_most_recent_orders` 函数用于检索最近订单的列表。该方法中使用的\
    \ `SELECT` SQL 语句通过 `LIMIT` 子句将返回的行数限制为 `inHowMany` 行。`ORDER BY` 子句用于对结果进行排序。默认排序模式为升序，但通过添加\
    \ `DESC`，可设置为降序排序模式（因此最近的订单将列在最前面）。\n\n4. 使用查询工具执行以下代码，该代码将在你的 `hatshop` 数据库中创建\
    \ `orders_get_orders_between_dates` 函数：\n\n```sql\n-- 创建 orders_get_orders_between_dates\
    \ 函数\nCREATE FUNCTION orders_get_orders_between_dates(TIMESTAMP, TIMESTAMP)\n\
    RETURNS SETOF order_short_details LANGUAGE plpgsql AS $$\nDECLARE\n  inStartDate\
    \ ALIAS FOR $1;\n  inEndDate ALIAS FOR $2;\n  outOrderShortDetailsRow order_short_details;\n\
    BEGIN\n  FOR outOrderShortDetailsRow IN\n    SELECT order_id, total_amount, created_on,\n\
    \           shipped_on, status, customer_name\n    FROM orders\n    WHERE created_on\
    \ >= inStartDate AND created_on <= inEndDate\n    ORDER BY created_on DESC\n \
    \ LOOP\n    RETURN NEXT outOrderShortDetailsRow;\n  END LOOP;\nEND;\n$$;\n```\n\
    \n此函数返回当前日期位于作为参数提供的 `inStartDate` 和 `inEndDate` 之间的所有记录。结果按日期降序排序。\n"
- fmt: "**5.** 使用查询工具执行以下代码，该代码在您的`hatshop`数据库中创建`orders_get_orders_by_status`函数：\n\
