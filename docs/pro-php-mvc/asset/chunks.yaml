    This method is the heart of our query class—specifically the all(), first(), and
    count() methods. It takes into account all the data stored in those protected
    properties we saw earlier, and builds a MySQL compatible SQL query, from the ground
    up. It declares the template for our SELECT statement. It then loops through all
    the stored fields (from the from() and join() methods) and determines whether
    to alias them. It neatens them up by joining them into a comma-delimited string.
    Similarly, it joins the $_join, $_where properties. It continues by creating the
    correctly formatted ORDER BY and LIMIT clauses and finally running everything
    through sprintf, generating a valid SQL query.


    The methods that build INSERT, UPDATE, and DELETE queries are a bit simpler than
    the _buildSelect() method. Take a look at Listing 9-10.


