    you’ll be shown how to perform simple database operations using a simple user
    interface application. In these kinds of programs, all the logic is probably written
    in a short, single file, instead of separate tiers.


    Although the materials might be very good, keep in mind that most of these texts
    are meant to teach you how to do different individual tasks (for example, access
    a database), and not how to correctly create a flexible and scalable application.


    A Three-Tier Architecture for HatShop


    Implementing a three-tiered architecture for the HatShop web site will help achieve
    the goals listed at the beginning of the chapter. The coding discipline imposed
    by a system that might seem rigid at first sight allows for excellent levels of
    flexibility and extensibility in the long run.


    Splitting major parts of the application into separate smaller components encourages
    reusability. More than once when adding new features to the site, you’ll see that
    you can reuse some of the already existing bits. Adding a new feature without
    needing to change much of what already exists is, in itself, a good example of
    reusability.


    Another advantage of the three-tiered architecture is that, if properly implemented,
    the overall system is resistant to changes. When bits in one of the tiers change,
    the other tiers usually remain unaffected, sometimes even in extreme cases. For
    example, if for some reason the backend database system is changed (say, the manager
    decides to use Oracle instead of PostgreSQL), you only need to update the data
    tier and maybe just a little bit of the business tier.


    Why Not Use More Tiers?


    The three-tier architecture we’ve been talking about so far is a particular (and
    the most popular) version of the *n*-Tier Architecture. ***n*****-Tier Architecture**
    refers to splitting the solution into a


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH02.qxd 11/8/06 9:33 AM Page 20


    **20**


    C H A P T E R 2 ■ L AY I N G O U T T H E F O U N D AT I O N S


    number ( *n*) of logical tiers. In complex projects, sometimes it makes sense
    to split the business layer into more than one layer, thus resulting in architecture
    with more than three layers.


    However, for our web site, it makes the most sense to stick with the three-layered
    design, which offers most of the benefits while not requiring too many hours of
    design or a complex hierarchy of framework code to support the architecture.


    Maybe with a more involved and complex architecture, you could achieve even higher
    levels of flexibility and scalability for the application, but you would need
    much more time for design before starting to implement anything. As with any programming
    project, you must find a fair balance between the time required to design the
    architecture and the time spent to implement it. The three-tier architecture is
    best suited to projects with average complexity, such as the HatShop web site.


    You also might be asking the opposite question, “Why not use fewer tiers?” A two-tier
    architecture, also called *client-server* architecture, can be appropriate for
    less complex projects. In short, a two-tier architecture requires less time for
    planning and allows quicker development in the beginning, although it generates
    an application that’s harder to maintain and extend in the long run. Because we’re
    expecting to have to extend the application in the future, the client-server architecture
    is not appropriate for our application, so it won’t be discussed further in this
    book.


    Now that the general architecture is known, let’s see what technologies and tools
    you will use to implement it. After a brief discussion of the technologies, you’ll
    create the foundation of the presentation and data tiers by creating the first
    page of the site and the backend database. You’ll start implementing some real
    functionality in each of the three tiers in Chapter 3


    when you start creating the web site’s product catalog.


    **Choosing Technologies and Tools**


    No matter which architecture is chosen, a major question that arises in every
    development project is which technologies, programming languages, and tools are
    going to be used, bear-ing in mind that external requirements can seriously limit
    your options.


    ■**Note** In this book, we’re creating a web site using PHP, PostgreSQL, and related
    technologies. We really like these technologies, but it doesn’t necessarily mean
    they’re the best choice for any kind of project, in any circumstances. Additionally,
    there are many situations in which you must use specific technologies because
    of client requirements. The System Requirements and Software Requirements stages
    in the software development process will determine which technologies you must
    use for creating the application. See Appendix B


    for more details.


    Although the book assumes some previous experience with PHP and PostgreSQL, we’ll
    take a quick look at them and see how they fit into our project and into the three-tier
    architecture.


    ■**Note** We included complete environment installation instructions (including
    Apache, PHP, and PostgreSQL) in Appendix A.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH02.qxd 11/8/06 9:33 AM Page 21


    C H A P T E R 2 ■ L AY I N G O U T T H E F O U N D AT I O N S


    **21**


    **Using PHP to Generate Dynamic Web Content**


    PHP is an open source technology for building dynamic, interactive web content.
    Its short description (on the official PHP web site, http://www.php.net) is “PHP
    is a widely-used general-purpose scripting language that is especially suited
    for Web development and can be embedded into HTML.”


    PHP stands for *PHP: Hypertext Preprocessor* (yes, it’s a recursive acronym),
    and is available for free download at its official web site. We included complete
    installation instructions for PHP in Appendix A. Because we’re using PHP to build
    a dynamic web site, you’ll also learn how to install Apache and how to integrate
    PHP with it in Appendix A.


    The story of PHP, having its roots somewhere in 1994, is a successful one. Among
    the factors that led to its success are the following:


    • PHP is free; especially when combined with Linux server software, PHP can prove
    to be a very cost-efficient technology to build dynamic web content.


    • PHP has a shorter learning curve than other scripting languages.'
