- fmt: '确实，很多 ORM 库都实现了这样的代码，从而可以对相关的数据库数据进行极大的控制。我们可以决定在未来扩展模型库，甚至使用一个更大、功能更完整的 ORM
    库，但我们现在拥有的已经能满足所有需求，没有必要现在就陷入细节。


    ### 问题


    1.  模型只用于处理数据库吗？

    2.  我们创建的`Model`类混合了实例方法和类方法来处理数据库行。为什么我们不统一使用实例方法或类方法来完成所有行的操作？


    ### 答案


    1.  不！模型可以处理各种事情，例如连接到第三方 API 或修改文件系统信息。模型不等同于 ORM。

    2.  有时，同时处理多行数据在语法上很有吸引力，例如从数据库中获取多行或删除多行。其他操作则涉及单行数据，例如 `INSERT` 或 `UPDATE` 查询。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 10 章 模型


    ### 练习


    1.  `Model`类为我们提供了一些有用的方法，使得数据库开发更容易。还有一些可以添加的便捷方法，例如一个根据给定的`LIMIT`和`WHERE`子句返回页数的方法。请尝试添加此方法。

    2.  虽然我们可以使用`Model`的子类轻松地插入或更新数据库行，但我们无法验证这些数据。请尝试添加一些方法，这些方法可用于在创建`INSERT`或`UPDATE`查询之前检查数据的有效性。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 11 章 测试


    到目前为止，我们已经编写了大量代码。这是一个成就，但如果我们的代码需要更改，它很快就会变成一种负担。对于像完整的 MVC 框架这样复杂的事物，您可以预期会有大量相互关联的代码。代码之间的关联性越强，即使我们的框架通过
    MVC 实现了分离，代码更改破坏其他代码的可能性就越大。


    想象一下，我们想要向`Model`类添加几个 ORM 方法。它们可能需要更改我们已经创建的方法，并可能微妙地改变已建立的功能。通常，这会导致应用程序中出现意外的故障。


    或者想象一下，我们需要添加额外的配置或缓存驱动。理想的做法是，能够以一致的方式比较现有驱动和新驱动的功能，并且这种方式可以在未来添加更多驱动时重复使用。


    解决方案是提供一组可重用的测试，可以定期运行这些测试，以确保我们的类继续以可预测的方式运行。


    ### 目标


    *   我们需要构建一个简单的测试类。

    *   我们需要设置覆盖我们已经创建的类的测试。


    ## 单元测试


    单元测试是将一个大系统分解为可以与系统其余部分隔离测试的小部分的过程。测试一个完整的用户驱动的 Web 应用程序很困难，但测试单个数据库命令或评估单个模板标签则很容易。


    单元测试，顾名思义，是一项永无止境的任务。编写的代码越多，就应该编写越多的单元测试。当你发现某个功能尚未被测试覆盖时，你应该创建该测试用例以便覆盖它。


    ## 测试类


    在我们开始为代码库编写测试之前，需要创建一个简单的类来帮助组织测试并评估结果。清单 11-1 展示了这个`Test`类。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 11 章 测试


    ***清单 11-1.*** `Test` 类


    ```

    namespace Framework

    {


    class Test

    {


    private static $_tests = array();


    public static function add($callback, $title = "Unnamed Test", $set = "General")

    {


    self::$_tests[] = array(

    "set" => $set,

    "title" => $title,

    "callback" => $callback

    );


    }


    public static function run($before = null, $after = null)

    {


    if ($before)

    {


    $before($this->_tests);


    }

    ```'
  raw: 'Indeed, many ORM libraries implement just such code, allowing immense control
    over related database data. We could decide to extend our model library in the
    future, or even to use a larger, more feature-complete ORM library, but what we
    have now does everything we want and there is no need to get bogged down in details
    just yet.


    Questions


    1\. Are models only for working with databases?


    2\. The Model class we created has a mix of instance and class methods for working
    with database rows. Why do we not pick either instance or class methods with which
    to do all row manipulation?


    Answers


    1\. No! Models can handle all sorts of things, such as connecting to a third-party
    API or modifying file system information. Models are not the same thing as ORM.


    2\. There are times when it is syntactically attractive to work with multiple
    rows at the same time, such as when fetching multiple rows from the database or
    deleting


    multiple rows. Other actions involve individual rows, such as with INSERT or UPDATE


    queries.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 10 ■ MOdEls


    Exercises


    1\. The Model class gives us a few good methods that make database development
    easier.


    There are more convenience methods that can be added, such as a method which


    returns the amount of pages for a given limit and WHERE clause. Try adding this


    method.


    2\. While we can use Model subclasses to easily insert or update database rows,
    there is no way for us to validate that data. Try adding a few methods that could
    be used to check for valid data before an INSERT or UPDATE query is created.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Chapter 11**


    **Testing**


    We have written an enormous amount of code, so far. That’s an achievement, but
    it can quickly turn into a burden if our code needs to be changed. For anything
    as complex as a complete MVC framework, you can expect a lot of interconnected
    code. The more connected the code is, even with the separation that MVC affords
    our framework, the more likely that changes to code can break other code.


    Imagine we wanted to add a few ORM methods to our Model class. They could require
    changes to methods we already created, and may subtly change the functionality
    already established. Usually, this will lead to unexpected breaks in our application.


    Or imagine we needed to add additional configuration or caching drivers. It would
    be ideal to have a consistent way of comparing the functionality of existing drivers
    to new ones, in such a way that the comparisons could be repeated with the addition
    of further drivers, in the future.


    The solution is to provide a set of reusable tests that can be periodically run
    to ensure that our classes continue to function in a predictable manner.


    Goals


    • We need to build a simple testing class.


    • We need to set up tests that cover the classes we have already created.


    Unit Testing


    Unit testing is the process of breaking down a big system into small parts that
    can be tested in isolation from the rest of the system. It’s tough testing a full
    user-driven web application, but testing a single command to the database, or
    evaluating a single template tag is easy.


    Unit tests are, by definition, an endless task. The more code you write, the more
    unit tests you should be writing. When you find a situation in which functionality
    isn’t already covered by a test, you should create that test case so that it will
    be covered.


    Test Class


    Before we start writing tests for our code-base, we need to create a simple class
    that will help to organize the tests and evaluate the results. Listing 11-1 shows
    this Test class.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 11 ■ TEsTing


    ***Listing 11-1.*** The Test Class


    namespace Framework


    {


    class Test


    {


    private static $_tests = array();


    public static function add($callback, $title = "Unnamed Test", $set = "General")


    {


    self::$_tests[] = array(


    "set" => $set,


    "title" => $title,


    "callback" => $callback


    );


    }


    public static function run($before = null, $after = null)


    {


    if ($before)


    {


    $before($this->_tests);


    }'
