- fmt: "## Summary\n\nIn this chapter, you learned to access products from the `products`\
    \ table and display them on the screen in tabular format. You also learned to\
    \ create a drop-down menu that shows different product categories and implements\
    \ navigation from one page to another. You also learned to display products that\
    \ belong to a specific category, define a web site header, implement a search\
    \ feature, and display detailed information about the selected product. You also\
    \ learned how a web site remembers information about a visitor via session handling.\
    \ You learned to apply sign in and sign out features to your site before coding\
    \ the site’s home page.\n\nThe next chapter focuses on the items that users choose\
    \ to place in their carts. You will learn to display the cart and edit the items\
    \ in the cart. You will also learn how a purchase order is placed and how the\
    \ user’s shipping information is entered and saved. Finally, you will learn to\
    \ provide different payment modes that users can use to purchase your product(s).\n\
    \n# 4. Managing the Shopping Cart\n\nElectronic supplementary material The online\
    \ version of this chapter (doi:[10.1007/978-1-4842-1672-9_4](http://dx.doi.org/10.1007/978-1-4842-1672-9_4))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    Up until now, you have been focusing on displaying the products’ listings and\
    \ their detailed information. In this chapter, you will enable the users to choose\
    \ the product(s) they want to purchase and add them to the shopping cart.\n\n\
    As the name suggests, a shopping cart is a software module that shows the products\
    \ chosen by the visitor for purchase. The items in the cart can be revised if\
    \ required, i.e., after adding the products to the cart, users can remove them\
    \ from the cart, add more items to the cart, and increase the quantity of the\
    \ products already selected in the cart. A cart is a database table that temporarily\
    \ keeps the user’s items selected for purchase.\n\nTo store and manage items in\
    \ the cart, a database table called `cart` was created with the structure defined\
    \ in [Chapter 1](#A978-1-4842-1672-9_1_Chapter.html). Here, you’ll learn to write\
    \ code to save items to the cart that the visitor wants to buy.\n\nIn this chapter,\
    \ you are going to learn about the following:\n\n- Saving selections to the cart\n\
    - Maintaining the cart\n- Displaying the cart count in the site header using AJAX\n\
    - Proceeding to check out\n- Supplying shipping information\n- Understanding different\
    \ payment modes\n- Making payments\n\n## Saving Selections in the Cart\n\nRecall\
    \ from [Chapter 3](#A978-1-4842-1672-9_3_Chapter.html) that the `itemdetails.php`\
    \ script shown in Listing [3-7](#A978-1-4842-1672-9_3_Chapter.html#FPar8) displays\
    \ the detailed information about the selected product and shows the following\
    \ two buttons beneath the information:\n\n- **Buy Now** — Adds the item to the\
    \ cart and proceeds to checkout.\n- **Add To Cart** — Adds the item to the cart\
    \ and remains there, thus enabling the user to choose more products.\n\nThe **Add\
    \ To Cart** button navigates to the `cart.php` script, which saves the current\
    \ product’s information in the `cart` table. The code in the `cart.php` script\
    \ is shown in Listing [4-1](#A978-1-4842-1672-9_4_Chapter.html#FPar1).\n\n**Listing\
    \ 4-1.** The `cart.php` Script Saves the Items Selected by the User\n\n```\n<?php\n\
    \ninclude('topmenu.php');\n\nif (session_status() == PHP_SESSION_NONE) {\n   \
    \ session_start();\n}\n\n$connect = mysqli_connect(\"localhost\", \"root\", \"\
    gold\", \"shopping\") or die(\"Please, check your server connection.\");\n\n$message\
    \ = \"\";\n$quantity=\"\";\n$action=\"\";\n$query=\"\";\n\nif (isset($_POST['quantity']))\
    \ {\n    $quantity = trim($_POST['quantity']);\n}\n\nif ($quantity=='')\n{\n \
    \   $quantity=1;\n}\n\nif($quantity <=0)\n{\n    echo \"Quantity value is invalid\
    \ \";\n    echo \"Go Back and enter a valid value\";\n}\nelse\n{\n    if (isset($_REQUEST['icode']))\
    \ {\n        $itemcode = $_REQUEST['icode'];\n    }\n\n    if (isset($_REQUEST['iname']))\
    \ {\n        $item_name = $_REQUEST['iname'];\n    }\n\n    if (isset($_REQUEST['iprice']))\
    \ {\n        $price = $_REQUEST['iprice'];\n    }\n\n    if (isset($_POST['modified_quantity']))\
    \ {\n        $modified_quantity = $_POST['modified_quantity'];\n    }\n\n    $sess\
    \ = session_id();\n\n    if (isset($_REQUEST['action'])) {\n        $action =\
    \ $_REQUEST['action'];\n    }\n\n    switch ($action) {\n        case \"add\"\
    :\n            $query=\"select * from cart where cart_sess = '$sess' and cart_itemcode\
    \ like '$itemcode'\";\n            $result = mysqli_query($connect, $query) or\
    \ die(mysql_error());\n            if(mysqli_num_rows($result)==1)\n         \
    \   {\n                $row=mysqli_fetch_array($result, MYSQLI_ASSOC);\n     \
    \           $qt=$row['cart_quantity'];\n                $qt=$qt + $quantity;\n\
    \                $query=\"UPDATE cart set cart_quantity=$qt where cart_sess =\
    \ '$sess' and cart_itemcode like '$itemcode'\";\n                $result = mysqli_query($connect,\
    \ $query)  or die(mysql_error());\n            }\n            else\n         \
    \   {\n                $query = \"INSERT INTO cart (cart_sess, cart_quantity,\
    \ cart_itemcode, cart_item_name, cart_price) VALUES ('$sess', $quantity, '$itemcode',\
    \ '$item_name', $price)\";\n                $message = \"<div align=\\\"center\\\
    \"><strong>Item added.</strong></div>\";\n            }\n            break;\n\n\
    \        case \"change\":\n            if($modified_quantity==0)\n           \
    \ {\n                $query = \"DELETE FROM cart WHERE cart_sess = '$sess' and\
    \ cart_itemcode like '$itemcode'\";\n                $message = \"<div style=\\\
    \"width:200px; margin:auto;\\\">Item deleted</div>\";\n            }\n       \
    \     else\n            {\n                if($modified_quantity <0)\n       \
    \         {\n                    echo \"Invalid quantity entered\";\n        \
    \        }\n                else\n                {\n                    $query\
    \ = \"UPDATE cart SET cart_quantity = $modified_quantity  WHERE cart_sess = '$sess'\
    \ and cart_itemcode like '$itemcode'\";\n                    $message = \"<div\
    \ style=\\\"width:200px; margin:auto;\\\">Quantity changed</div>\";\n        \
    \        }\n            }\n            break;\n\n        case \"delete\":\n  \
    \          $query = \"DELETE FROM cart WHERE cart_sess = '$sess' and cart_itemcode\
    \ like '$itemcode'\";\n            $message = \"<div style=\\\"width:200px; margin:auto;\\\
    \">Item deleted</div>\";\n            break;\n\n        case \"empty\":\n    \
    \        $query = \"DELETE FROM cart WHERE cart_sess = '$sess'\";\n          \
    \  break;\n    }\n\n    if($query !=\"\")\n    {\n        $results = mysqli_query($connect,\
    \ $query) or die(mysql_error());\n        echo $message;\n    }\n\n    include(\"\
    showcart.php\");\n    echo \"<SCRIPT LANGUAGE=\\\"JavaScript\\\">updateCart();</SCRIPT>\"\
    ;\n}\n\n?>\n```"
  raw: '## Summary


    In this chapter, you learned to access products from the `products` table and
    display them on the screen in tabular format. You also learned to create a drop-down
    menu that shows different product categories and implements navigation from one
    page to another. You also learned to display products that belong to a specific
    category, define a web site header, implement a search feature, and display detailed
    information about the selected product. You also learned how a web site remembers
    information about a visitor via session handling. You learned to apply sign in
    and sign out features to your site before coding the site’s home page.


    The next chapter focuses on the items that users choose to place in their carts.
    You will learn to display the cart and edit the items in the cart. You will also
    learn how a purchase order is placed and how the user’s shipping information is
    entered and saved. Finally, you will learn to provide different payment modes
    that users can use to purchase your product(s).


    # 4. Managing the Shopping Cart


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-1672-9_​4](http://dx.doi.org/10.1007/978-1-4842-1672-9_4))
    contains supplementary material, which is available to authorized users.


    Up until now, you have been focusing on displaying the products’ listings and
    their detailed information. In this chapter, you will enable the users to choose
    the product(s) they want to purchase and add them to the shopping cart.


    As the name suggests, a shopping cart is a software module that shows the products
    chosen by the visitor for purchase. The items in the cart can be revised if required,
    i.e., after adding the products to the cart, users can remove them from the cart,
    add more items to the cart, and increase the quantity of the products already
    selected in the cart. A cart is a database table that temporarily keeps the user’s
    items selected for purchase.


    To store and manage items in the cart, a database table called `cart` was created
    with the structure defined in [Chapter 1](#A978-1-4842-1672-9_1_Chapter.html).
    Here, you’ll learn to write code to save items to the cart that the visitor wants
    to buy.


    In this chapter, you are going to learn about the following:


    *   Saving selections to the cart

    *   Maintaining the cart

    *   Displaying the cart count in the site header using AJAX

    *   Proceeding to check out

    *   Supplying shipping information

    *   Understanding different payment modes

    *   Making payments


    ## Saving Selections in the Cart


    Recall from [Chapter 3](#A978-1-4842-1672-9_3_Chapter.html) that the `itemdetails.php`
    script shown in Listing [3-7](#A978-1-4842-1672-9_3_Chapter.html#FPar8) displays
    the detailed information about the selected product and shows the following two
    buttons beneath the information:


    *   Buy Now—Adds the item to the cart and proceeds to checkout.

    *   Add To Cart—Adds the item to the cart and remains there, thus enabling the
    user to choose more products.


    The Add To Cart button navigates to the `cart.php` script, which saves the current
    product’s information in the `cart` table. The code in the `cart.php` script is
    shown in Listing [4-1](#A978-1-4842-1672-9_4_Chapter.html#FPar1).


