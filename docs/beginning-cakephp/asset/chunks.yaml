    Building the Index Action


    Normally the Index action is the easiest to build because it generally displays
    a list of records in the database. This plugin, however, is one that will require
    displaying a calendar of some sort. Thanks to inconsistencies in the calendar
    year, generating a calendar will take more work than simply running through a
    list of records. The Index action will have to create a table with rows for each
    week of the month and then display each day of the week; at the same time, the


