    \ 章。\n\n`dog_container` 类包含 `get_dog_application` 方法，该方法使用多次讨论过的逻辑来搜索狗狗应用 XML\
    \ 文件，以获取所需文件（`dog_data.php`）的名称。`set_app` 方法允许我们传递应用类型（`dogdata`），以便在 `get_dog_application`\
    \ 中进行搜索。它还包含 `create_object` 类，该类将确定类名（`dog_data`），创建该类的一个实例，并将该类（类在内存中的地址）传回给调用程序。该类要求调用程序中存在一个\
