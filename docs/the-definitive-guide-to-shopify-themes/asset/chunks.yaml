- fmt: '### Technique 4: Asset Minification


    While stylesheets and scripts aren’t usually as bulky as images, they can still
    have a noticeable impact on the overall weight of your pages.


    Once you’ve followed Technique #1 and simplified and removed as much unnecessary
    styling and content as possible, you can use asset minification to further reduce
    the file size of your stylesheets and scripts.


    Minification strips out the extraneous information in assets that make it easy
    for humans to read and write but that aren’t needed by your browser (things like
    newlines and whitespace). In the case of JavaScript, minification can also aggressively
    optimize your code size by doing things like rewriting `var aLongVariableNameUsefulForHumans`
    to `var a`.


    #### How to Minify Your Assets


    If you want to experiment with minification or just want to perform a one-off
    minification, there are plenty of online tools that will take a CSS or JavaScript
    file and spit out the minified version (just Google “CSS/JavaScript minifier”).
    However, minification is at its most useful when we can slot it into the workflow
    once and not have to think about it again. Once again, the Grunt plugins `grunt-contrib-cssmin`
    and `grunt-contrib-uglify` come to your rescue with CSS and JavaScript minification,
    respectively.


    If you have a different workflow process or would like to perform minification
    from the command line, you can check out the comprehensive `YUICompressor`, which
    handles both CSS and JavaScript. The `uglify` tool is also available as a standalone
    JavaScript minifier that can be run from the command line.


    ### Technique 5: Odds and Ends


    Properly implementing all these techniques will, in most cases, get you a long
    way toward improving your theme’s performance. If, like me, you’re a little bit
    obsessive about performance or are in a situation where extracting every last
    ounce/gram of speed is going to materially affect a store’s bottom line, there
    are still a couple more things you can do.


    #### Implement Device-Responsive Design


    Before “responsive design” came to mean that thing we do by dragging the width
    of our browser back and forth, it had a broader meaning—that web sites could respond
    to a whole range of contexts to deliver the best experience.


    A good example of where this idea comes in handy in the performance arena is with
    “retina” or “high-resolution” images. A common technique for high-resolution images
    over the last few years has been to simply serve all clients a high-res image
    resized to be half the size. Browsers then do the work of resizing and displaying
    appropriately.


    The problem with this approach is that it’s very wasteful when serving to screens
    that aren’t high-resolution—they’re downloading an image that is four times the
    size for no advantage. “Device-responsive design” takes this sort of thing into
    account by only loading high-resolution images on high-resolution devices, either
    using media queries or a JavaScript library.


    #### Use Lazy Loading


    This technique can be really powerful for Shopify stores, as they are often very
    image-heavy. Lazy loading images involves using a JavaScript library to only load
    images when they should be visible in the user’s viewport, improving initial page
    load times.


    It’s especially handy when your theme involves very tall pages where lots of visitors
    won’t actually need to load the majority of your content. Matt Mlinac’s lazy load
    jQuery plugin ([`http://www.appelsiini.net/projects/lazyload`](http://www.appelsiini.net/projects/lazyload))
    is a very solid implementation.


    #### Use Conditional Loading for Shims/Fallbacks


    If you’re using “shims” or fallbacks for older browsers (for example, the `RespondJS`
    fallback that allows older browsers like Internet Explorer 8 to use media queries),
    make sure you’re not wastefully downloading them on newer browsers.


    You can implement this by using conditional comments when loading the script,
    as in Listing [10-4](#A437216_1_En_10_Chapter.html#Par132), or by using JavaScript-based
    conditional loading based on the results of testing with a library like `Modernizr`.


    ```

    ...

    Listing 10-4

    Using Conditional Comments to Load a Respond.js Fallback on Internet Explorer
    8 and Lower

    ```


    #### Master the “async” Attribute


    As mentioned, putting `<script>` tags in the `<head>` section of your HTML is
    a sure-fire way to kill your page loading times, as browsers will block page rendering
    while they wait for your JavaScript to load. Common wisdom says that the best
    place for including `script` tags on your page is at the very bottom of the page,
    just before the `</body>` tag.


    This is a great default approach, but with the advent of HTML5, we now have access
    to the `async` attribute for script elements, which tells browsers to continue
    parsing and rendering the page while loading the script in the background.


    However, there are some major caveats to the use of `async`—namely, that there
    are no guarantees on execution time or order. If you’re interested in diving into
    the nuts and bolts of `async`, Jake Archibald’s walkthrough at [`http://www.html5rocks.com/en/tutorials/speed/script-loading/`](http://www.html5rocks.com/en/tutorials/speed/script-loading/)
    is the best I’ve read.


    #### Check for Asset 404s and 301s


    Look through the Network panel or similar in your browser’s developer tools and
    check that no assets are 404-ing or 301-ing.


    Missing assets (404s) are a waste of a request and you should just remove the
    reference to the asset or replace it with one that works—this problem can be compounded
    if the site itself has a large or complex custom 404 page that needs to be downloaded
    any time an asset is missing.


    An asset request being redirected with a 301 response code is actually quite common
    (for example, a request to an `http://` version of an asset may be automatically
    redirected to the `https://` version). If you see that happening, just link directly
    to the final URL to avoid the wasted initial request.


    ## Evaluating Performance Improvements


    Once you’ve made each performance optimization, it’s always a good idea to measure
    your performance metrics again to see what’s changed. Not only will this give
    you a sense of achievement and motivate you, you’ll start to get a good idea of
    where the easy optimizations are and start to incorporate them into your normal
    development workflow.


    Now, while all this measuring is handy, there’s nothing quite like actually using
    your site to check whether your customers are getting a good experience! Next
    time you’re on a train, or out with your phone in an area with patchy reception,
    try clearing your browser cache and loading your site. Bonus points for asking
    random strangers in coffee shops to do the same and try to buy something from
    your store.


    If you can’t wait to get out of the home or office to test your performance improvements
    and you have a Mac, you can use OS X’s Network Link Conditioner, seen in Figure
    [10-9](#A437216_1_En_10_Chapter.html#Fig9). Turn your connection settings down
    to spotty 2G and see if your site holds up.


    ![A437216_1_En_10_Fig9_HTML.jpg](A437216_1_En_10_Fig9_HTML.jpg)


    *Figure 10-9 — Condition that link!*


    Get instructions on how to set up the network link conditioner at [`http://nshipster.com/network-link-conditioner/`](http://nshipster.com/network-link-conditioner/).
    Chrome users (both on Mac and Windows) have access to a similar feature (called
    Throttling) in the Network tab of Developer Tools.


    ## Final Thoughts


    Performance optimization is one of those tasks that pays significant dividends
    for storeowners, but still gets overlooked during development and testing, as
    it’s very easy to subconsciously paper over a site’s issues.


    Remember: as a theme developer, you have to wait for a Shopify store to load (it’s
    your job). Customers don’t have that obligation, and they will leave in favor
    of a competitor at the drop of a hat.'
