    ### 方法调用


    之前你已经见过一个使用字符串动态调用方法的例子：


    ```

    $product = getProduct();   // 获取一个对象

    $method = "getTitle";      // 定义一个方法名

    print $product->$method(); // 调用方法

    ```


    PHP 也提供了 `call_user_func()` 方法来实现同样的目的。`call_user_func()` 既可以调用方法，也可以调用函数。调用函数时，它只需要一个字符串作为第一个参数：


    ```

    $returnVal = call_user_func("myFunction");

    ```


    调用方法时，它需要一个数组。数组的第一个元素应该是一个对象，第二个元素是要调用的方法名：


    ```

    $returnVal = call_user_func([$myObj, "methodName"]);

    ```


    你可以将目标方法或函数所需的任何参数作为额外的参数传递给 `call_user_func()`，就像这样：


    ```

    // listing 05.31

    $product = self::getBookProduct(); // 获取一个 BookProduct 对象

    call_user_func([$product, ''setDiscount''], 20);

    ```


    当然，这种动态调用等同于下面这个写法：


    ```

    $product->setDiscount(20);

    ```


    `call_user_func()` 方法并不会给你的编程生活带来翻天覆地的变化，因为你完全可以直接用一个字符串来代替方法名，就像这样：


    ```

    $method = "setDiscount";

    $product->$method(20);

    ```


    不过，更令人印象深刻的是与之相关的 `call_user_func_array()` 函数。在选择目标方法或函数方面，它的工作方式与 `call_user_func()`
    相同。但关键在于，它接受目标方法所需的任何参数，且这些参数以数组形式提供。


    注意


    注意——使用 `call_user_func()` 传递给函数或方法的参数不是通过引用传递的。


    那么为什么这很有用呢？有时你会以数组形式获得参数。除非你事先知道要处理的参数数量，否则很难将它们传递出去。在第四章中，我介绍了可用于创建委托类的拦截器方法。下面是一个
    `__call()` 方法的简单示例：


    ```

    // listing 05.32

    public function __call($method, $args)

    {

    if (method_exists($this->thirdpartyShop, $method)) {

    return $this->thirdpartyShop->$method();

    }

    }

    ```


    如你所见，当客户端代码调用一个未定义的方法时，`__call()` 方法就会被调用。在这个例子中，我在一个名为 `$thirdpartyShop` 的属性中维护了一个对象。如果我在存储的对象中找到了一个与
    `$method` 参数匹配的方法，就调用它。我乐观地假设目标方法不需要任何参数，而这正是问题开始的地方。当我编写 `__call()` 方法时，我无法判断每次调用时
    `$args` 数组的大小。如果我直接将 `$args` 传递给委托方法，我传递的将是一个单一的数组参数，而不是它可能期望的多个独立参数。`call_user_func_array()`
    完美地解决了这个问题：


    ```

    // listing 05.33

    public function __call($method, $args)

    {

    if (method_exists($this->thirdpartyShop, $method)) {

    return call_user_func_array(

    [

    $this->thirdpartyShop,

    $method

    ],

    $args

    );

    }

    }

    ```


    ## 反射 API


    PHP 的反射 API 之于 PHP，就如同 `java.lang.reflect` 包之于 Java。它由一系列用于分析属性、方法和类的内置类组成。它在某些方面与现有的对象函数（如
    `get_class_vars()`）类似，但更灵活，并且能提供更详细的信息。它还被设计为能与 PHP 的面向对象特性（如访问控制、接口和抽象类）协同工作，而在这方面，较旧且功能更有限的类函数则无法做到。


    ### 入门指南


    反射 API 不仅可用于检查类。例如，`ReflectionFunction` 类提供有关给定函数的信息，`ReflectionExtension` 则能揭示编译到语言中的扩展的相关信息。表
    5-1 列出了该 API 中的一些类。


    表 5-1. 反射 API 中的部分类


    | 类 | 描述 |

    | --- | --- |

    | `Reflection` | 提供一个用于汇总类信息的静态 `export()` 方法 |

    | `ReflectionClass` | 类信息和工具 |

    | `ReflectionMethod` | 类方法信息和工具 |

    | `ReflectionParameter` | 方法参数信息 |

    | `ReflectionProperty` | 类属性信息 |

    | `ReflectionFunction` | 函数信息和工具 |

    | `ReflectionExtension` | PHP 扩展信息 |

    | `ReflectionException` | 一个错误类 |

    | `ReflectionZendExtension` | PHP Zend 扩展信息 |


    总的来说，反射 API 中的这些类提供了前所未有的运行时能力，让你能够访问脚本中对象、函数和扩展的相关信息。


    反射 API 的强大功能和广泛范围意味着，你通常应该优先使用它，而不是那些类和对象函数。你很快就会发现自己少不了它，尤其是在测试类时。例如，你可能想生成类图或文档，或者你可能想将对象信息保存到数据库，检查对象的访问器（getter
    和 setter）方法以提取字段名。根据命名方案在模块类中调用方法，这也是反射的另一个用途。

