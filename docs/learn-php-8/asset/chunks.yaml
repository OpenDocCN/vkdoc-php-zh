    会请求操作系统以 ASCII 格式（用于表示每个字符的 0 和 1 组合）存储属性（`$dog_breed`、`$dog_color`和`$dog_name`）中的字符串值，并以数字格式在内存中存储`$dog_size`属性中的值。当变量在程序中使用时，操作系统会创建内存表来查找变量值的实际内存地址。


    注意


    代码格式必须包括代码语句末尾的分号（所有被执行的代码行都必须包含分号）。


    ```

    Example 4-3b

    Basic class structure with data type–defined properties in dog.php file

    ```


    如前所述，我们建议使用数据类型，通过限制可存储在属性中的数据类型来提高安全性和验证。在示例[4-3b](#394210_2_En_4_Chapter.xhtml#PC4)中，`$dog_size`被声明为只允许整数（整数）。其他三个属性被定义为只允许字符串。请记住，无论何时使用数据类型，都必须将`strict`类型设置为
    1，如示例所示。默认情况下，`strict`设置不强制数据类型。


    正如你可能注意到的，在这一点上，示例并不是很有用。即使我们创建了类的一个实例，我们也无法访问类中的任何东西或显示属性中的值。让我们向类中添加一个方法，以允许我们显示类中包含的内容。为此，我们需要创建一个使用`print`语句来显示值的方法。我们也可以借此机会使用**字符串拼接**来构建一个字符串输出。


    在 PHP 中，字符串拼接可以通过多种方式完成。在许多语言中，使用属性构建字符串需要不断地打开和关闭字符串（使用`""`）。


    ```

    print "Dog_weight is " . $this->dog_weight  . ". Dog breed is " . $this->dog_breed
    . "Dog color is " . $this->dog_color;

    ```


    给定的`print`代码行在 PHP 中是有效的。然而，如你所见，有很多引号和许多句点。这可能导致难以正确匹配所有内容。句点（`.`）是 PHP 中的字符串拼接字符，如果我们选择使用这种技术，就需要用到它（在许多语言中，我们不得不使用类似疯狂的做法）。然而，PHP
    比这友好得多。


    *   *`$this`指针——`$this`指针用于访问对象中包含的属性。`$this`表示代码想要检索存在于特定对象（类的实例）中的属性的值。很快我们将创建一个名为`$lab`的类的实例。当`$lab`实例中存在的代码被执行时，`$this`指针将告诉操作系统它想要仅存在于`$lab`实例中的属性（例如`dog_weight`）的值。注意，语句的格式包含`$this`指针的`$`符号，但不包含变量（`$this->dog_weight`）的`$`符号。*


    *   *你可能会问，为什么我们需要`$this`指针？简单答案是，你可以创建一个对类的每个实例都存在的属性（称为静态属性）。*


    ```

    private static int $dog_count = 0;

    ```


    在上面的示例中，如果`$dog_count`的值发生改变，它将对`Dog`类的所有实例都发生改变。这可以作为跟踪所创建狗的数量的一种方式。三个`private
    string`属性将仅针对它被引用的特定类实例（`$lab`）发生改变。'
