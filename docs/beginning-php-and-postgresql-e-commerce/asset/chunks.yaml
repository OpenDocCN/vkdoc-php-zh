- fmt: '# CHAPTER 14 ■ II IMPLEMENTING THE ORDER PIPELINE: PART II **493**


    **Figure 14-5.** *Audit entries for completed order*


    **How It Works: The Order Pipeline**


    We’ve covered how the order pipeline works, so now we only need to explain the
    new code added to `OrderProcessor`. We changed the code in the `GetCurrentPipelineSection()`
    method, which is responsible for selecting the pipeline section that needs to
    be executed.


    The change is simply a switch block that assigns a pipeline section to the `$_mCurrentPipelineSection`
    member:


    ```

    // Gets current pipeline section


    private function GetCurrentPipelineSection()


    {


    switch($this->mOrderInfo[''status''])


    {


    case 0:


    $this->_mOrderProcessStage = $this->mOrderInfo[''status'']; $this->_mCurrentPipelineSection
    = new PsInitialNotification(); break;


    case 1:


    $this->_mOrderProcessStage = $this->mOrderInfo[''status'']; $this->_mCurrentPipelineSection
    = new PsCheckFunds(); break;


    case 2:


    $this->_mOrderProcessStage = $this->mOrderInfo[''status'']; $this->_mCurrentPipelineSection
    = new PsCheckStock(); break;


    case 3:


    $this->_mOrderProcessStage = $this->mOrderInfo[''status'']; $this->_mCurrentPipelineSection
    = new PsStockOk();


    break;


    case 4:


    $this->_mOrderProcessStage = $this->mOrderInfo[''status'']; $this->_mCurrentPipelineSection
    = new PsTakePayment(); break;


    case 5:


    $this->_mOrderProcessStage = $this->mOrderInfo[''status'']; $this->_mCurrentPipelineSection
    = new PsShipGoods(); break;


    case 6:


    $this->_mOrderProcessStage = $this->mOrderInfo[''status'']; $this->_mCurrentPipelineSection
    = new PsShipOk();


    break;


    case 7:


    $this->_mOrderProcessStage = $this->mOrderInfo[''status'']; $this->_mCurrentPipelineSection
    = new PsFinalNotification(); break;


    case 8:


    $this->_mOrderProcessStage = 100;


    throw new Exception(''Order already been completed.'');


    break;


    default:


    $this->_mOrderProcessStage = 100;


    throw new Exception(''Unknown pipeline section requested.'');


    }


    }

    ```


    If the order has been completed or an unknown section is requested, then you generate
    an exception.


    The test code gives you the additional opportunity of testing this exception generation
    because if you run it again, you’ll be processing an already completed order.
    Click the Process Order button for an order that’s already complete (has the status
    8), and you should get an error email as shown in Figure 14-6.


    **Figure 14-6.** *Order completion error email*


    The error message mailed to the administrator should be enough to get started
    on your way to finding out what happened.


    **Updating the Checkout Page**


    In the previous example, you were forced to call the `OrderProcessor::Process()`
    method three times in a row from the order details admin page. In practice, this
    won’t happen—it will be called once by `presentation/smarty_plugins/function.load_checkout_info.php`
    when a customer places an order and twice more by the supplier in `presentation/smarty_plugin/function.load_admin_order_details.php`.
    You’ll need to modify these web pages accordingly.


    You also need to add a reference to your new classes in `index.php`. Follow the
    steps in this exercise to have `function.load_checkout_info.php` work with the
    new order pipeline.


    **Exercise: Updating the Checkout Process**


    **1.** Modify the `init()` method in the `CheckoutInfo` class in `presentation/smarty_plugins/function.load_checkout_info.php`
    by adding the highlighted code:


    ```

    public function init()


    {


    // If the Place Order button was clicked, save the order to database if ($this->_mPlaceOrder
    == 1)


    {


    $this->mCustomerData = Customer::Get();


    $tax_id = '''';


    switch ($this->mCustomerData[''shipping_region_id''])


    {


    case 2:


    $tax_id = 1;


    break;


    default:


    $tax_id = 2;


    }


    $order_id = ShoppingCart::CreateOrder(


    $this->mCustomerData[''customer_id''],


    (int)$_POST[''shipping''], $tax_id);


    $redirect_page = '''';


    // Create new OrderProcessor instance


    $processor = new OrderProcessor($order_id);


    try


    {


    $processor->Process();


    }


    catch (Exception $e)


    {


    // If an error occurs, head to an error page


    $redirect_page = ''index.php?OrderError'';


    }


    // On success head to an order successful page


