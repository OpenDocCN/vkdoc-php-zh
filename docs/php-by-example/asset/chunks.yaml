    The program creates an array and then, using the `foreach` loop statement, iterates
    over the elements of the array and attempts to increase the value of the array
    elements by one (the `$v++` command in the body of the loop statement). In the
    first case, you use an ordinary variable to access the array’s elements; in the
    second case, you use a reference. As you can see, in the first case, the values
    of the elements do not change; in the second case, the value is increased by one
    for each array element.


    ## Multidimensional Arrays


    The elements of an array can be, among other things, arrays. And the elements
    of these internal arrays can also be arrays, and so on. In that case, multiple
    indexes or keys must be used to access an element of the internal array: the first
    key allows access to the internal array, the second key allows access to an element
    of that internal array, and the chain can continue. If so, you usually speak of
    multidimensional arrays. But, in the respect that in PHP, array elements can be
    of different types, this concept is rather vague. You proceed from the fact that
    a multidimensional array is an array among the elements of which there are arrays.


    From a technical point of view, creating a multidimensional array is not tricky.
    It is enough to describe one or more elements as an array when creating the initial
    (external) array. A small example is shown in Listing [4-7](#613529_1_En_4_Chapter.xhtml#PC16).


    ```

    array("X"=>2,"Y"=>3),9=>array("D","E","F"));

    echo "Array \$B:\n";

    // The contents of the array:

    print_r($B);

    echo "Array \$B:\n";

    // Iterates the elements:

    foreach($B as $k1=>$v1){

    foreach($v1 as $k2=>$v2){

    // Displays the value of the element:

    echo "\$B[$k1][$k2] = $v2\n";

    }

    }

    ?>

    Listing 4-7

    A Multidimensional Array

    ```


