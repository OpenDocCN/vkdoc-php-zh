    \ 级别的错误，从而停止脚本。\n\n### 未捕获异常处理器\n\n`set_exception_handler` 函数允许捕获任何未捕获的异常。它接受一个参数，即针对此类事件将触发的回调函数。\n\
    \n```\nset_exception_handler('myException');\n```\n"
- fmt: '回调函数只需要一个参数，即被抛出的异常对象。


    ```php

    function myException($e)

    {

      $file = ''exceptionlog.txt'';

      file_put_contents($file, $e->getMessage(), FILE_APPEND);

      require_once(''my_error_page.php'');

      exit;

    }

    ```


    由于该异常处理器是在异常发生的上下文之外调用的，从异常中恢复会比较困难。此示例处理器将异常写入日志文件，并显示一个错误页面。为了停止脚本的进一步执行，使用了内置的`exit`结构。它与`die`结构同义，并可选择接受一个字符串参数，该参数会在脚本停止前打印出来。


    ## 错误与异常


    异常被有意抛出以供脚本处理，而错误则旨在通知开发者代码中存在错误。对于运行时出现的问题，通常认为异常机制更优越。然而，由于该机制直到PHP 5才引入，所有内部函数仍使用错误机制。对于用户自定义函数，开发者可自由选择任一机制。请记住，`try-catch`语句无法捕获错误，同样，异常也不会触发错误处理器。


    [¹](http://www.php.net/manual/en/spl.exceptions.php)


