    If you have completed these steps, created an uploads folder (with the correct
    file permissions required for upload), and submitted either the register or settings
    forms, you should now see files being created in that folder. You also need to
    add the enctype = "multipart/form-data" attribute to your settings.html and register.html
    forms.


    ■ **Note** If you were adding validation to the file-upload mechanism, you would
    need to add some echo logic (below the file input) to display any validation errors.


    Showing Off, a Little


    Now that we have working file uploads, we should add these files to the profile
    and search pages. The first thing we need to do is create a new method, on the
    User model, to return the latest File row. Take a look at Listing 18-8


    to see how we do this.


    ***Listing 18-8.*** The getFile() Method


    use Shared\Model as Model;


    class User extends Model


    {


    public function getFile()


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ PHoTos


    {


    return File::first(array(


    "user = ?" = > $this- > id,


    "live = ?" = > true,


    "deleted = ?" = > false


    ), array("*"), "id", "DESC");


    }


    }


    This method simply returns the latest file from the database, which is linked
    to the current user row. The next thing we should do is update the search.html
    template to include photos, as demonstrated in Listing 18-9.


    ***Listing 18-9.*** The search.html Template (Extract)


    {foreach $_user in $users}


    {script $file = $_user- > file}


    <tr>


    <td > {if $file} < img src = "/uploads/{echo $file- > name}" />{/if}</td>


    <td > {echo $_user- > first} {echo $_user- > last}</td>


    <td>


    {if $_user- > isFriend($user- > id)}


    <a href = "/unfriend/{echo $_user- > id}.html" > unfriend</a>


    {/if}


    {else}


    <a href = "/friend/{echo $_user- > id}.html" > friend</a>


    {/else}


    </td>


    </tr>


    {/foreach}


    Because the getFile() method matches the pattern specified in the __get() method
    of the Base class, we can simply reference it by $_user- > file. If a file is
    found, we echo the file name into the src of an image element, rendering the image
    in the search results list. The final task is to modify the profile.html view,
    as demonstrated in Listing 18-10.


    ***Listing 18-10.*** The profile.html Template (Extract)


    {script $file = $user- > file}


    {if $file} < img src = "/uploads/{echo $file- > name}" />{/if}


    <h1 > {echo $user- > first} {echo $user- > last}</h1>


    This is a profile page!


    This completes the steps required to allow users to upload their own files, and
    to see these files reflected on the search and profile pages.


    Questions


    1\. Why was it necessary to save a reference to the uploaded files in the database?


    2\. We uploaded files to the public/uploads folder, and didn’t check whether they
    were valid images. What prevents users from uploading malicious files to the server?


    3\. What was the purpose of determining and storing the file width and height?


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 18 ■ PHoTos


    4\. How would we modify this functionality to allow for uploads to cloud services
    like Amazon CloudFront or Rackspace Cloud Files?


    Answers


    1\. It is not strictly necessary, but rather recommended. One of the biggest bottlenecks
    in any PHP application is reading from and writing to files. If we didn’t save
    these file references in the database, we would have to iterate through all the
    files in the uploads folder, matching those that had the user’s ID in the file
    name. This is way too intensive to be practical. With the database rows, we can
    simply query for all rows linked to the user and return the corresponding files
    by reference.


    2\. We do not validate and, therefore, cannot prevent this sort of thing from
    happening.


    There are a number of steps you should take when securing your application—from


    denying execution of any files within the uploads directory, to validating the
    mime type, size, and file name of the files you let users upload. These processes
    should take place before the file is moved to permanent storage, and will not
    prevent any of the other steps from taking place.'
