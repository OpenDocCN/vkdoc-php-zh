    **The getElementsByClassName() Function**


    If you have multiple elements on a page, all with the same class, you can use
    the getElementsByClassName() function to select all of them. An array will be
    returned, with each element corresponding to one element with the given class
    name.


    This can be an expensive function to call, as internally every element is analyzed
    to see if it is of the specified class. Because of this, you should also specify
    a parent element when calling this function. Doing so means only elements within
    the parent element are checked.


    You would typically use this function when you want a make the same update to
    all elements of a particular class. For example, suppose you had an HTML page
    with several boxes on it, each having the class name .box, contained within a
    div called #box-container. If you wanted to add a Hide All or Show All button
    on your HTML page, you could select all elements using document.getElementsByClassName(''box'',
    ''box-container''), and then loop over each element and hide or show it accordingly.
    Listing 5-2 demonstrates this.


