  trans: "\n### 创建日志包装器以记录操作执行信息\n\n在本节中，我们将探讨如何注入上一节配置的日志记录器，以及如何使用它向配置的文件写入内容。\n\
    \n```php\nuse Psr\\Log\\LoggerInterface;\nuse Symfony\\Component\\Uid\\Uuid;\n\
    class OperationPerformanceLogger\n{\npublic function __construct(\nprivate readonly\
    \ LoggerInterface $opPerformanceLogger\n){}\npublic function logStartOperation(string\
    \ $operation, ?array $inputData): string\n{\n$id = Uuid::v4();\n$this->opPerformanceLogger->info(json_encode([\n\
    'operation' => $operation,\n'id' => $id,\n'input_data' => $inputData ?? [],\n\
    'ts_start' => microtime(true)\n]));\nreturn (string)$id;\n}\npublic function logEndOperation(string\
    \ $operation, string $id, int $responseCode, ?array $outputData): void\n{\n$this->opPerformanceLogger->info(json_encode([\n\
    'operation' => $operation,\n'id' => $id,\n'output_data' => $outputData ?? [],\n\
    'ts_end' => microtime(true),\n'response_code' => $responseCode\n]));\n}\n}\n```\n\
    \n我们从构造函数开始。如你所见，我们注入了 `$opPerformanceLogger` 服务，它实现了 Symfony 内核所需的 `Psr\\Log\\\
    LoggerInterface`。该服务暴露了两个关键方法：\n\n- **`logStartOperation`**：此方法应在收到操作请求时调用。它接收操作名称和输入值数组（如果没有则为空数组），并将以下信息（以\
    \ JSON 格式）写入日志文件：\n    - **`operation`**：操作名称\n    - **`id`**：用于标识请求的 ID。这里我们使用\
    \ Symfony Uid 组件生成一个 UUID v4 作为 ID。\n    - **`input_data`**：接收到的输入数据数组，如果没有接收到输入数据则为空数组。\n\
    \    - **`ts_start`**：收到操作的时间戳。\n\n    此方法返回生成的 ID。在接下来的几节中，我们将学习如何在请求中携带此 ID，以便用于记录操作终止数据。\n\
    \n- **`logEndOperation`**：此方法应在操作请求执行结束、响应已发送给客户端后调用。它接收操作名称、在 `logStartOperation`\
    \ 方法中生成的 ID、返回给客户端的 HTTP 响应码以及执行结果数据。该方法将以下信息写入日志文件：\n    - **`operation`**：操作名称。\n\
    \    - **`id`**：用于标识请求的 ID，与 `logStartOperation` 方法中生成的 ID 相同。\n    - **`output_data`**：输出数据数组，如果没有向客户端返回响应数据则为空数组。这可能是出现\
    \ 204 No Content HTTP 响应的情况。\n    - **`ts_end`**：操作结束的时间戳。\n    - **`response_code`**：返回给客户端的\
    \ HTTP 响应码。\n\n有了这个日志服务，你可以利用 Symfony 的事件系统自动记录每个 API 操作的开始和结束。\n\n### 在收到操作请求时写入日志\n\
    \n我们将使用 `kernelEvents.REQUEST` Symfony 事件来检测是否收到了操作请求，如果是，则写入日志。为此，我们将创建一个新的 Symfony\
    \ 内核订阅者：\n\n```php\nuse App\\Api\\Input\\ApiInput;\nuse App\\Api\\Logger\\OperationPerformanceLogger;\n\
    use Symfony\\Component\\EventDispatcher\\EventSubscriberInterface;\nuse Symfony\\\
    Component\\HttpKernel\\Event\\RequestEvent;\nuse Symfony\\Component\\HttpKernel\\\
    KernelEvents;\nuse Symfony\\Component\\Serializer\\Exception\\ExceptionInterface;\n\
    use Symfony\\Component\\Serializer\\SerializerInterface;\nclass OperationPerformanceSubscriber\
    \ implements EventSubscriberInterface\n{\npublic const string OP_REQ_ATTR = 'OP_REQ';\n\
    public function __construct(\nprivate readonly SerializerInterface $serializer,\n\
    private readonly OperationPerformanceLogger $operationPerformanceLogger\n){}\n\
    public static function getSubscribedEvents(): array\n{\nreturn [\nKernelEvents::REQUEST\
    \   => ['onOperationReceived', 2]\n];\n}\npublic function onOperationReceived(RequestEvent\
    \ $event): void\n{\n$uri = $event->getRequest()->getUri();\nif(!preg_match('#\\\
    /api\\/v[1-9]{1}\\/operation#', $uri)) {\nreturn;\n}\ntry{\n$apiInput = $this->serializer->deserialize($event->getRequest()->getContent(),\
    \ ApiInput::class, 'json');\nif(!empty($apiInput->operation)) {\n$operationRequestId\
    \ = $this->operationPerformanceLogger->logStartOperation($apiInput->operation,\
    \ $apiInput->data);\n$event->getRequest()->attributes->set(self::OP_REQ_ATTR,\
    \ $operationRequestId . ':' . $apiInput->operation);\n}\n}\ncatch(ExceptionInterface\
    \ $e) {}\n}\n}\n```\n\n让我们来分析一下上述新的订阅者。该订阅者持续监听 `KernelEvents::REQUEST` 事件，并在捕获到该事件后执行\
    \ `onOperationReceived` 方法。此方法执行以下逻辑：\n\n- 检查请求 URI 是否匹配操作请求路由路径。\n- 如果不匹配，则返回且不执行额外逻辑。\n\
    - 如果匹配，则将负载反序列化为 `ApiInput` 模型。\n- 如果反序列化过程没有错误，该方法使用 `OperationPerformanceLogger`\
    \ 服务中的 `logStartOperation` 方法写入操作请求信息。然后，它获取由 `logStartOperation` 方法返回的 `$operationRequestId`，并将其保存到请求属性包中，以便稍后使用。\n\
    \n正如你所注意到的，`onOperationReceived` 的 catch 块中没有代码。这是因为，如果在验证接收到的 API 输入负载后出现任何错误，客户端将收到\
    \ 400 Bad Request 响应，并且请求不会继续到处理器，因此在这种情况下不值得写入日志。\n"
- fmt: '### Writing to the Log When an Operation Request Ends


    Finally, we just have to write to the log after an operation request ends. To
    achieve that, we will rely on the Symfony `KernelEvents.TERMINATE` event.


    ```

    use App\Api\Input\ApiInput;

    use App\Api\Logger\OperationPerformanceLogger;

    use Symfony\Component\EventDispatcher\EventSubscriberInterface;

    use Symfony\Component\HttpKernel\Event\RequestEvent;

    use Symfony\Component\HttpKernel\Event\TerminateEvent;

    use Symfony\Component\HttpKernel\KernelEvents;

    use Symfony\Component\Serializer\Exception\ExceptionInterface;

    use Symfony\Component\Serializer\SerializerInterface;

    class OperationPerformanceSubscriber implements EventSubscriberInterface

    {

    public const string OP_REQ_ATTR = ''OP_REQ'';

    public function __construct(

    private readonly SerializerInterface $serializer,

    private readonly OperationPerformanceLogger $operationPerformanceLogger

    ){}

    public static function getSubscribedEvents(): array

    {

    return [

    KernelEvents::REQUEST   => [''onOperationReceived'', 2],

    KernelEvents::TERMINATE => ''onOperationTerminated''

    ];

    }

    public function onOperationReceived(RequestEvent $event): void

    {

    $uri = $event->getRequest()->getUri();

    if(!preg_match(''#^\/api\/v[1-9]{1}\/operation#'', $uri)) {

    return;

    }

    try{

    $apiInput = $this->serializer->deserialize($event->getRequest()->getContent(),
    ApiInput::class, ''json'');

    if(!empty($apiInput->operation)) {

    $operationRequestId = $this->operationPerformanceLogger->logStartOperation($apiInput->operation,
    $apiInput->data);

    $event->getRequest()->attributes->set(self::OP_REQ_ATTR, $operationRequestId .
    '':'' . $apiInput->operation);

    }

    }

    catch(ExceptionInterface $e) {}

    }

    public function onOperationTerminated(TerminateEvent $event): void

    {

    $opReqAttr = $event->getRequest()->attributes->get(self::OP_REQ_ATTR);

    if($opReqAttr) {

    list($opId, $opName) = explode('':'', $opReqAttr);

    $responseArray = ($event->getResponse()->getContent())

    ? json_decode($event->getResponse()->getContent(), true)

    : []

    ;

    $responseCode = $event->getResponse()->getStatusCode();

    $this->operationPerformanceLogger->logEndOperation($opName, $opId, $responseCode,
    $responseArray);

    }

    }

    }

    ```


    Let’s analyze now the `onOperationTerminated` event. It proceeds as follows:


    - It checks whether the request attributes bag contains a value for a key named
    `OP_REQ`. If so, it means that a request operation has been logged within the
    `REQUEST` event and now we have to log the termination.

    - It explodes the `$opReqAttr` using the `:` token string to get both the operation
    ID and the operation name values.

    - It creates the response array by applying the PHP `json_decode` function to
    the received response content or as a `null` value if no response content has
    been sent to the client.

    - It gets the http response code.

    - Finally, it writes the termination information to the log using the `OperationPerformanceLogger
    logEndOperation` method.


    ### Conclusion


    In this chapter, we have constructed the core functionalities of our operation-oriented
    API. We have established a robust foundation by


    - Defining clear models for operation inputs and outputs

    - Defining a concrete way to create operation services (`OperationInterface` and
    `OperationMetadata`)

    - Lazy-loading operations that can be heavy to instantiate

    - Implementing a centralized collection for storing operations and a dedicated
    handler to efficiently retrieve and execute them

    - Validating operations data using a dedicated validation handler, safeguarding
    the API against invalid payloads

    - Crafting the endpoints that serve as the entry points for all API requests,
    streamlining user interaction and request handling

    - Combining the Symfony monolog bundle and the Symfony event system to log an
    operation request reception and an operation request termination so that we can
    use that information later for analyzing our API system health


    With these core functionalities in place, our API is equipped to handle various
    operations and deliver the desired functionality. However, security remains paramount.
    In the next chapter, we will shift our focus to fortifying both the endpoint and
    individual operations, ensuring a secure API environment.


    # 2. Securing Operations


    In this section, we will use the Symfony security features to protect both the
    endpoints and the operations. To protect the endpoints, we will use the Symfony
    firewall system through which we will establish the user authentication mechanism.
    Then, we will rely on Symfony voters to grant or deny an operation execution based
    on certain rules.


    ## Section 1. The User


    In this section, we are going to create the user entity, which will serve us to
    store the users who can access the API. Then we will start the database we configured
    in “Section 3. Prerequisites” in the Bookfront matter and load users on it.


    ### The User Entity


    We are going to use the Symfony maker command to create our entity. To do it,
    we need to execute the following command in the project root folder:


    ```

    bin/console make:entity

    ```


    Create a string field named `token`, another named `email`, and a JSON field named
    `roles` (JSON fields require a platform that supports them, such as PostgreSQL
    and MySQL 5.7+):


    - The `token` field will hold the token, which will be used to authenticate the
    user in the rest of the chapter.

    - The `email` field will be used as an identifier.

    - The `roles` field will hold the user roles. We will use this field to authorize
    certain roles to execute an operation using Symfony voters.


    After the command finishes, you can see a new user class under the `src/Entity`
    folder. This should look like this:


    ```

    namespace App\Entity;

    use App\Repository\UserRepository;

    use Doctrine\ORM\Mapping as ORM;

    #[ORM\Entity(repositoryClass: UserRepository::class)]

    class User

    {

    #[ORM\Id]

    #[ORM\GeneratedValue]

    #[ORM\Column]

    private ?int $id = null;

    #[ORM\Column(length: 255)]

    private ?string $token = null;

    #[ORM\Column(length: 255)]

    private ?string $email = null;

    #[ORM\Column]

    private array $roles = [];

    public function getId(): ?int

    {

    return $this->id;

    }

    public function getToken(): ?string

    {

    return $this->token;

    }

    public function setToken(string $token): static

    {

    $this->token = $token;

    return $this;

    }

    public function getEmail(): ?string

    {

    return $this->email;

    }

    public function setEmail(string $email): static

    {

    $this->email = $email;

    return $this;

    }

    public function getRoles(): array

    {

    return $this->roles;

    }

    public function setRoles(array $roles): static

    {

    $this->roles = $roles;

    return $this;

    }

    }

    ```


    We have now to make our `User` entity implement the `Symfony UserInterface`. Implementing
    this interface is required for Symfony’s authentication system to recognize the
    `User` entity as a valid user.


    ```

    namespace App\Entity;

    use App\Repository\UserRepository;

    use Doctrine\ORM\Mapping as ORM;

    use Symfony\Component\Security\Core\User\UserInterface;

    #[ORM\Entity(repositoryClass: UserRepository::class)]

    class User implements UserInterface

    {

    // ... other methods goes here

    public function eraseCredentials()

    {

    }

    public function getUserIdentifier(): string

    {

    return $this->getEmail();

    }

    }

    ```


    As our entity already defines the `getRoles` method since it is an entity property,
    we have to define the other two methods required by the interface:


    - **eraseCredentials**: We can use this method to clear sensitive information
    stored in this object. We leave it empty because we are not storing temporary
    sensitive data like plaintext passwords.

    - **getUserIdentifier**: We use this method to return the user identifier, that
    is, the email.'
  raw: '### Writing to the Log When an Operation Request Ends


    Finally, we just have to write to the log after an operation request ends. To
    achieve that, we will rely on the Symfony **KernelEvents.TERMINATE** event.


    ```

    use App\Api\Input\ApiInput;

    use App\Api\Logger\OperationPerformanceLogger;

    use Symfony\Component\EventDispatcher\EventSubscriberInterface;

    use Symfony\Component\HttpKernel\Event\RequestEvent;

    use Symfony\Component\HttpKernel\Event\TerminateEvent;

    use Symfony\Component\HttpKernel\KernelEvents;

    use Symfony\Component\Serializer\Exception\ExceptionInterface;

    use Symfony\Component\Serializer\SerializerInterface;

    class OperationPerformanceSubscriber implements EventSubscriberInterface

    {

    public const string OP_REQ_ATTR = ''OP_REQ'';

    public function __construct(

    private readonly SerializerInterface $serializer,

    private readonly OperationPerformanceLogger $operationPerformanceLogger

    ){}

    public static function getSubscribedEvents(): array

    {

    return [

    KernelEvents::REQUEST   => [''onOperationReceived'', 2],

    KernelEvents::TERMINATE => ''onOperationTerminated''

    ];

    }

    public function onOperationReceived(RequestEvent $event): void

    {

    $uri = $event->getRequest()->getUri();

    if(!preg_match(''#^\/api\/v[1-9]{1}\/operation#'', $uri)) {

    return;

    }

    try{

    $apiInput = $this->serializer->deserialize($event->getRequest()->getContent(),
    ApiInput::class, ''json'');

    if(!empty($apiInput->operation)) {

    $operationRequestId = $this->operationPerformanceLogger->logStartOperation($apiInput->operation,
    $apiInput->data);

    $event->getRequest()->attributes->set(self::OP_REQ_ATTR, $operationRequestId .
    '':'' . $apiInput->operation);

    }

    }

    catch(ExceptionInterface $e) {}

    }

    public function onOperationTerminated(TerminateEvent $event): void

    {

    $opReqAttr = $event->getRequest()->attributes->get(self::OP_REQ_ATTR);

    if($opReqAttr) {

    list($opId, $opName) = explode('':'', $opReqAttr);

    $responseArray = ($event->getResponse()->getContent())

    ? json_decode($event->getResponse()->getContent(), true)

    : []

    ;

    $responseCode = $event->getResponse()->getStatusCode();

    $this->operationPerformanceLogger->logEndOperation($opName, $opId, $responseCode,
    $responseArray);

    }

    }

    }

    ```


    Let’s analyze now the **onOperationTerminated** event. It proceeds as follows:


    *   It checks whether the request attributes bag contains a value for a key named
    “OP_REQ”. If so, it means that a request operation has been logged within the
    REQUEST event and now we have to log the termination.


    *   It explodes the **$opReqAttr** using the “:” token string to get both the
    operation ID and the operation name values.


    *   It creates the response array by applying the PHP json_decode function to
    the received response content or as a **null** value if no response content has
    been sent to the client.


    *   It gets the http response code.


    *   Finally, it writes the termination information to the log using the **OperationPerformanceLogger
    logEndOperation** method.


    ### Conclusion


    In this chapter, we have constructed the core functionalities of our operation-oriented
    API. We have established a robust foundation by


    *   Defining clear models for operation inputs and outputs


    *   Defining a concrete way to create operation services (OperationInterface and
    OperationMetadata)


    *   Lazy-loading operations that can be heavy to instantiate


    *   Implementing a centralized collection for storing operations and a dedicated
    handler to efficiently retrieve and execute them


    *   Validating operations data using a dedicated validation handler, safeguarding
    the API against invalid payloads


    *   Crafting the endpoints that serve as the entry points for all API requests,
    streamlining user interaction and request handling


    *   Combining the Symfony monolog bundle and the Symfony event system to log an
    operation request reception and an operation request termination so that we can
    use that information later for analyzing our API system health


    With these core functionalities in place, our API is equipped to handle various
    operations and deliver the desired functionality. However, security remains paramount.
    In the next chapter, we will shift our focus to fortifying both the endpoint and
    individual operations, ensuring a secure API environment.


    # 2. Securing Operations


    In this section, we will use the Symfony security features to protect both the
    endpoints and the operations. To protect the endpoints, we will use the Symfony
    firewall system through which we will establish the user authentication mechanism.
    Then, we will rely on Symfony voters to grant or deny an operation execution based
    on certain rules.


    ## Section 1\. The User


    In this section, we are going to create the user entity, which will serve us to
    store the users who can access the API. Then we will start the database we configured
    in “Section 3\. Prerequisites” in the Bookfront matter and load users on it.


    ### The User Entity


    We are going to use the Symfony maker command to create our entity. To do it,
    we need to execute the following command in the project root folder:


    ```

    bin/console make:entity

    ```


    Create a string field named token, another named email, and a JSON field named
    roles (JSON fields require a platform that supports them, such as PostgreSQL and
    MySQL 5.7+):


    *   The token field will hold the token, which will be used to authenticate the
    user in the rest of the chapter.


    *   The email field will be used as an identifier.


    *   The roles field will hold the user roles. We will use this field to authorize
    certain roles to execute an operation using Symfony voters.


    After the command finishes, you can see a new user class under the *src/Entity*
    folder. This should look like this:


    ```

    namespace App\Entity;

    use App\Repository\UserRepository;

    use Doctrine\ORM\Mapping as ORM;

    #[ORM\Entity(repositoryClass: UserRepository::class)]

    class User

    {

    #[ORM\Id]

    #[ORM\GeneratedValue]

    #[ORM\Column]

    private ?int $id = null;

    #[ORM\Column(length: 255)]

    private ?string $token = null;

    #[ORM\Column(length: 255)]

    private ?string $email = null;

    #[ORM\Column]

    private array $roles = [];

    public function getId(): ?int

    {

    return $this->id;

    }

    public function getToken(): ?string

    {

    return $this->token;

    }

    public function setToken(string $token): static

    {

    $this->token = $token;

    return $this;

    }

    public function getEmail(): ?string

    {

    return $this->email;

    }

    public function setEmail(string $email): static

    {

    $this->email = $email;

    return $this;

    }

    public function getRoles(): array

    {

    return $this->roles;

    }

    public function setRoles(array $roles): static

    {

    $this->roles = $roles;

    return $this;

    }

    }

    ```


    We have now to make our User entity implement the [Symfony UserInterface](https://symfony.com/doc/current/security.html).
    Implementing this interface is required for Symfony’s authentication system to
    recognize the User entity as a valid user.


    ```

    namespace App\Entity;

    use App\Repository\UserRepository;

    use Doctrine\ORM\Mapping as ORM;

    use Symfony\Component\Security\Core\User\UserInterface;

    #[ORM\Entity(repositoryClass: UserRepository::class)]

    class User implements UserInterface

    {

    // ... other methods goes here

    public function eraseCredentials()

    {

    }

    public function getUserIdentifier(): string

    {

    return $this->getEmail();

    }

    }

    ```


    As our entity already defines the **getRoles** method since it is an entity property,
    we have to define the other two methods required by the interface:


    *   **eraseCredentials**: We can use this method to clear sensitive information
    stored in this object. We leave it empty because we are not storing temporary
    sensitive data like plaintext passwords.


    *   **getUserIdentifier**: We use this method to return the user identifier, that
    is, the email.'
