    **`end( options[mixed] )`**


    `options`：当作为字符串输入时，此参数将渲染为提交按钮的值；如果作为数组，则向提交元素传递HTML属性。


    如果使用`options`数组来传递HTML属性，请使用`label`选项来设置提交按钮的值：


    `<?=$form->end(array(''label''=>''Submit Form'',''id''=>''submit_btn''));?>`

    此行将返回以下输出：


    `<input type="submit" value="Submit Form" id="submit_btn" />`


