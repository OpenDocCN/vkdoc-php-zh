- "# 第三章 创建产品目录：第一部分\n\n与`UPDATE`命令一样，使用`DELETE`命令时也需要小心，因为如果忘记指定`WHERE`子句，将删除表中的所有行。下面的查询将删除`department`表中的所有记录。`DELETE`命令本身不会删除表。\n\
  \n```\nDELETE FROM department;\n```\n\n## PostgreSQL 函数和类型\n\n数据库函数是存储用 PostgreSQL\
  \ 能理解的语言编写的程序的对象。PostgreSQL 能够处理用多种语言（如 Perl 或 Python）编写的函数，但我们将使用标准的基于 SQL 的语言——**PL/pgSQL**。你可以在\
  \ http://www.postgresql.org/docs/current/interactive/plpgsql.html#PLPGSQL-OVERVIEW\
  \ 找到该语言的介绍。\n\n如果你只想执行数据库操作，并不一定需要使用数据库函数。你可以直接从外部应用程序（如 HatShop 应用的 PHP 脚本）向 PostgreSQL\
  \ 数据库发送 SQL 命令。使用函数时，你无需传递要执行的 SQL 代码，只需调用函数并传入其可能需要的参数值即可。使用函数进行数据操作有以下优点：\n\n\
  - 性能可能更好，因为 PostgreSQL 在函数首次执行时会生成并缓存其执行计划。\n- 使用函数可以更好地维护数据访问和操作代码，这些代码存储在一个中心位置，并且更容易实现三层架构（数据库函数构成数据层）。\n\
  - 安全性可以更好地控制，因为 PostgreSQL 允许为每个单独的函数设置不同的安全权限。\n- 在 PHP 代码中临时创建的 SQL 查询更容易受到 SQL\
  \ 注入攻击，这是一个主要的安全威胁。（许多网络资源都涵盖了这个安全主题，例如 http://www.sitepoint.com/article/sql-injection-attacks-safe\
  \ 上的文章。）\n- 这可能是个人偏好问题，但将 SQL 逻辑与 PHP 代码分离可以使 PHP 代码更清晰、更易于管理；调用函数看起来比拼接字符串来构建传递给数据库的\
  \ SQL 查询要好得多。\n\n在开发 HatShop 时，我们将把所有数据访问代码保存为`hatshop`数据库中的 PostgreSQL **函数**。这些函数，像任何主流语言中的函数一样，具有输入参数和返回类型。在某些示例中，我们将定义自定义类型用于返回结果。\n\
  \n创建函数的语法是：\n\n```\nCREATE FUNCTION <name>(<param1 type>, <param2 type> ... ) RETURNS\
  \ [SETOF] <return type> LANGUAGE plpgsql AS $$\n<code>\n$$\n```\n\n或者，你也可以在函数代码的末尾（在关闭的`$$`之后）指定语言（`LANGUAGE\
  \ plpgsql`）。\n\n请注意，如果数据库中已经存在具有相同名称、参数数量和参数类型的函数，则无法创建该函数。但是，你可以拥有多个同名但参数不同的函数（这种方法在面向对象编程（OOP）术语中称为*重载*）。关键在于，在调用函数时，PostgreSQL\
  \ 必须知道要调用哪个版本的函数，如果参数不同，它可以做到这一点。\n\n要修改现有函数，应使用`CREATE OR REPLACE FUNCTION`而不是`CREATE\
  \ FUNCTION`，如果函数不存在，它会创建函数；如果函数存在，则会更新函数。\n\n我们将使用类型来指定函数返回的数据类型。类型的定义如下：\n\n```\n\
  CREATE TYPE name AS\n( attribute_name data_type [, ... ] )\n```\n\n对于部门列表的数据层，你需要创建一个名为`department_list`的类型和一个名为`catalog_get_departments_list`的函数。让我们在下面的练习中完成这个任务。\n\
  \n## 练习：创建 PostgreSQL 类型和函数\n\n1. 启动 pgAdmin III，并使用`hatshopadmin`用户名连接到`hatshop`数据库。\n\
  2. pgAdmin III 具有可用于创建类型的界面元素，无需编写代码（通过右键单击“类型”，然后选择“新建类型”即可查看）。但是，由于界面不太友好，我们更倾向于编写并执行执行相同操作的代码。选择“工具”➤“查询工具”，并编写以下代码：\n\
  \   ```\n   CREATE TYPE department_list AS\n   (\n       department_id INTEGER,\n\
  \       name VARCHAR(50)\n   );\n   ```\n3. 按`F5`执行命令。输出应为类似于“查询成功返回，在 30 毫秒内无结果。”\n\
  4. 选择“编辑”➤“清除窗口”以清除当前内容，并编写以下创建`catalog_get_departments_list`函数的代码：\n   ```\n  \
  \ CREATE FUNCTION catalog_get_departments_list()\n   RETURNS SETOF department_list\
  \ LANGUAGE plpgsql AS $$\n   DECLARE\n       outDepartmentListRow department_list;\n\
  \   BEGIN\n       FOR outDepartmentListRow IN\n           SELECT department_id,\
  \ name\n           FROM department\n           ORDER BY department_id\n       LOOP\n\
  \           RETURN NEXT outDepartmentListRow;\n       END LOOP;\n   END;\n   $$;\n\
  \   ```\n5. 按`F5`执行命令。输出应再次提示命令已成功执行，无结果。\n6. 要测试新函数是否返回预期结果，再次清除窗口内容，并输入以下查询。应该会检索到部门列表（参见图\
  \ 3-13）。\n   ```\n   SELECT * FROM catalog_get_departments_list();\n   ```\n\n**图\
  \ 3-13.** *使用 pgAdmin III 执行函数*\n\n7. 关闭查询工具窗口。如果系统询问是否保存更改，请点击“否”。\n\n## 工作原理：PostgreSQL\
  \ 类型和函数\n\n让我们逐步分解`catalog_get_departments_list`函数。第一行是定义函数名称的行。请记住，如果你已经创建了函数并想要修改它，可以使用`CREATE\
  \ OR REPLACE FUNCTION`。\n\n```\nCREATE FUNCTION catalog_get_departments_list()\n\
  ```\n\n下一行定义了返回类型和函数中使用的语言。我们在本书中用于此函数以及所有其他函数的语言是 PL/pgSQL（`LANGUAGE plpgsql`）。\n\
  \n```\nRETURNS SETOF department_list LANGUAGE plpgsql AS $$\n```\n\n返回类型是`SETOF\
  \ department_list`，这意味着该函数应返回一个或多个其结构由`department_list`类型定义的记录。`department_list`类型是一个由`DepartmentID`和`Description`组成的简单类型，定义如下：\n\
  \n```\nCREATE TYPE department_list AS\n(\n    department_id INTEGER,\n    name VARCHAR(50)\n\
  );\n```\n\n函数体位于开始和结束的`$$`之间。以下代码片段代表了我们编写返回数据的函数的典型方式。粗体行执行我们感兴趣的查询，其余部分是返回该查询结果所需的辅助代码。\n\
  \n```\nDECLARE\n    outDepartmentListRow department_list;\nBEGIN\n    FOR outDepartmentListRow\
  \ IN\n        **SELECT department_id, name FROM department**\n    LOOP\n       \
  \ RETURN NEXT outDepartmentListRow;\n    END LOOP;\nEND;\n```\n\n那么这里发生了什么？函数体以`DECLARE`部分开始，该部分声明了函数将使用的变量。与其它语言中的函数不同，PL/pgSQL\
  \ 函数有一个专门声明变量的特殊位置。在本例中，变量名是`outDepartmentListRow`，其类型是`department_list`。\n\n\n\n"
- "# 实现实际功能的代码\n\n实现实际功能的代码写在 `BEGIN` 和 `END` 之间。乍一看语法可能有些奇怪，但其功能非常直观。如果你还记得，该函数被声明为返回一组\
  \ `department_list` 类型的值，而实际正是如此。\n\n该函数执行 `SELECT` 语句，将每一行结果抓取到 `outDepartmentListRow`\
  \ 变量（属于 `department_list` 类型）中，并返回该变量。当此函数执行完毕时，它将返回一组 `department_list` 值。\n\n\
  ## 为网站添加逻辑\n\n业务层（或称中间层）被认为是应用程序的大脑，因为它管理着应用的业务逻辑。然而，对于像从数据层获取部门列表这样的简单任务，业务层并没有太多逻辑需要实现。它只需向数据库请求数据，并将其传递给表示层。\n\
  \n在本章中，我们将构建业务层的基础，其中包括打开和关闭数据库连接的功能、将 SQL 逻辑存储为 PostgreSQL 函数，以及从 PHP 访问这些函数。\n\
  \n对于部门列表的业务层，你将实现两个类：\n\n- `DatabaseHandler` 将存储当你需要访问数据库时会复用的通用功能。将这种通用功能封装在单独的类中，从长远来看可以减少击键次数并避免错误。\n\
  - `Catalog` 包含产品目录特有的功能，例如将从数据库中检索部门列表的 `GetDepartments` 方法。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n648XCH03.qxd 11/8/06 9:45 AM 第 82 页\n\n**82**\n\n第 3 章 ■ 创建产品目录：第一部分\n\n## 连接\
  \ PostgreSQL\n\n你编写的 SQL 查询必须以某种方式发送到数据库引擎执行。正如你在第 2 章中所学，你将使用 PHP PDO 来访问 PostgreSQL\
  \ 服务器。\n\n在编写业务层代码之前，你需要分析并理解可能的实现方案。在编写任何代码之前需要回答的重要问题包括：\n\n- 当需要执行 SQL 查询时，应该采用何种策略来打开和关闭数据库连接？\n\
  - 应该使用 PHP PDO 的哪些方法来执行数据库函数并返回结果？\n- 应如何处理可能的错误，并将错误处理方案与你在第 2 章中编写的错误处理代码集成起来？\n\
  \n让我们逐一审视这些问题，然后开始编写一些代码。\n\n### 打开和关闭 PostgreSQL 服务器的连接\n\n对此有两种主要方法可供采用。第一种方法由以下操作序列说明，每次需要访问数据库时都需要执行这些操作。\n\
  \n1. 在需要执行数据库命令之前，*打开* 一个到数据库的连接。\n2. 使用已打开的连接 *执行* SQL 查询（或数据库函数），并获取返回结果。在此阶段，你还需要处理任何可能的错误。\n\
  3. 在执行命令后立即 *关闭* 数据库连接。\n\n这种方法的优点是不会长时间保持数据库连接（这很好，因为数据库连接会消耗服务器资源），并且对于不允许同时有太多数据库连接的服务器来说，这种方法也是推荐的。缺点是在打开和关闭数据库连接时会产生持续的开销，而使用持久连接可以部分减少这种开销。\n\
  \n**注意** 持久连接指的是一种旨在提高打开和关闭数据库连接效率的技术，同时不影响功能。你可以在 http://www.php.net/manual/en/features.persistent-connections.php\
  \ 了解更多关于此技术的信息。\n\n\n\n另一种解决方案（也是在实现 HatShop 时你将采用的方案）可以描述如下：\n\n1. **打开** 数据库连接：在请求过程中首次需要访问数据库时建立连接。\n\
  \n2. **执行** 所有数据库函数（或 SQL 查询）：通过该连接进行，且不关闭连接。此处还需要处理可能出现的错误。\n\n3. **关闭** 数据库连接：当客户端请求处理完毕时关闭连接。\n\
  \n使用此方法，单个客户端请求（即用户每次访问网站新页面时）中发生的所有数据库操作都将通过同一个数据库连接进行，从而避免了每次需要从数据库获取数据时都打开和关闭连接。你仍将使用持久连接来提升为每个客户端请求打开新数据库连接的效率。\n\
  \n该解决方案就是你将在 HatShop 项目中用于数据访问的方法。\n\n## 使用 PHP PDO 进行数据库操作\n\n现在，你需要学习如何通过 PHP\
  \ PDO 将理论付诸实践。稍后在为网站构建附加功能时，你才会实际编写代码。\n\n如第 2 章所述，你不会通过 PHP 专用于 PostgreSQL 的数据库函数来访问\
  \ PostgreSQL，而是通过数据库抽象层（PHP PDO）进行访问。PDO 类允许使用相同的 API（应用程序编程接口）访问多种数据源，因此当使用非 PostgreSQL\
  \ 的数据库系统时，你无需更改 PHP 数据访问代码，也无需学习不同的数据访问技术（但如果迁移后的数据库使用不同的 SQL 方言，则可能需要修改 SQL 代码本身）。从长远来看，使用\
  \ PHP PDO 能让你的程序员生活更轻松。\n\n你将使用的重要 PHP PDO 类是 `PDO`，它提供了执行各种数据库操作的方法。\n\n> **注**\
  \ 本书中，你将学习 HatShop 中使用的 PHP PDO 功能。关于 PHP PDO 的更多细节，请参阅 PHP 手册文档：http://www.php.net/manual/en/ref.pdo.php。\n\
  \n`PDO` 类提供了连接 PostgreSQL 服务器并执行 SQL 查询的功能。打开数据库连接的函数是 `PDO` 的构造函数，它接收两个参数：数据库服务器的连接字符串，以及一个可选参数，用于指定连接是否为持久连接。连接字符串包含连接数据库服务器所需的数据。创建新的\
  \ `PDO` 对象的方法如下：\n\n```\n$dbh = new PDO('pgsql:dbname=' . $db_name . ';host=' .\
  \ $db_host, $db_user,\n$db_pass,\narray(PDO::ATTR_PERSISTENT => $persistent));\n\
  ```\n\n> **注** 如果连接成功，`PDO` 类的构造函数会返回一个初始化的数据库连接对象（该对象特定于你所连接的数据库类型，例如 `pgsql`）；否则会抛出异常。\n\
  \n上述代码片段展示了连接 PostgreSQL 服务器时需要提供的标准数据，并使用了五个变量：\n\n- `$db_user` 代表用户名。\n- `$db_pass`\
  \ 代表用户密码。\n- `$db_host` 是 PostgreSQL 服务器的主机名。\n- `$db_name` 是你所连接的数据库名称。\n- `$persistent`\
  \ 如需创建持久数据库连接则设为 `true`，否则设为 `false`。\n\n要断开数据库连接，你需要将 `$dbh` 设为 `null`。\n\n以下代码片段演示了如何创建、打开然后关闭\
  \ PostgreSQL 数据库连接，并捕获可能抛出的异常：\n\n```\ntry\n{\n    // 打开连接\n    $dbh = new PDO('pgsql:dbname='\
  \ . $db_name . ';host=' . $db_host, $db_user, $db_pass);\n\n    // 关闭连接\n    $dbh\
  \ = null;\n}\n```\n\n\n\n\n`catch (PDOException $e)`\n\n```\n{\n    echo 'Connection\
  \ failed: ' . $e->getMessage();\n}\n```\n\n`try`和`catch`关键字用于处理异常。\n\n## PHP 5 异常处理\n\
  \n在第 2 章中，你实现了用于拦截和处理（并最终报告）HatShop 站点中发生的错误的代码。**PHP 错误**是你可以用来对 PHP 代码中发生的错误做出反应的标准机制。当\
  \ PHP 错误发生时，执行会停止；但是，你可以定义一个错误处理函数，该函数在终止执行之前被调用。你在第 2 章中添加了这样一个函数，在其中你尽可能多地获取有关错误的详细信息并将其记录下来以供将来参考。\n\
  \n有了这些详细信息，程序员可以修复代码以避免将来发生相同的错误。\n\nPHP 5 与其他面向对象特性一起引入了一种处理运行时错误的新方法：异常。\n\n异常代表了在代码中管理运行时错误的现代方式，并且比\
  \ PHP 错误更强大、更灵活。异常是面向对象模型的一个非常重要的部分，PHP 5 引入了一个类似于其他面向对象语言（如 Java 和 C#）的异常模型。然而，PHP\
  \ 中的异常与标准的 PHP 错误以一种奇怪的组合共存，你不能仅仅依赖异常来处理运行时问题。一些 PHP 扩展（如 PDO）可以配置为生成异常来指示运行时发生的问题，而在其他情况下，你唯一的选择是处理标准\
  \ PHP 错误。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH03.qxd 11/8/06\
  \ 9:45 AM Page 85\n\n### 第三章：创建产品目录：第一部分 85\n\n异常相对于错误的优势在于处理它们时提供的灵活性。当生成异常时，你可以本地处理它并让脚本继续正常执行，或者你可以将异常传递给另一个类进行进一步处理。使用异常，你的脚本不会像出现\
  \ PHP 错误时那样终止。当使用异常时，你将怀疑可能抛出异常的代码放在`try`块内，并在关联的`catch`块中处理潜在的异常：\n\n```\ntry\n\
  {\n    // 可能生成你想要处理的异常的代码\n}\ncatch (Exception $e)\n{\n    // 当生成异常时执行的代码\n    //\
  \ （异常细节可通过 $e 对象访问）\n}\n```\n\n当`try`块中的任何代码生成异常时，执行会直接传递到`catch`块。除非`catch`块中的代码重新抛出异常，否则假定它已处理了该异常，并且脚本的执行会正常继续。这种灵活性允许你防止许多可能导致页面停止工作的原因，当你编写\
  \ PHP 代码时，你将体会到异常赋予你的强大功能！\n\nPHP 5 异常由`Exception`类表示，该类包含异常的详细信息。你可以使用`throw`关键字自己生成（抛出）异常。抛出的`Exception`对象会沿着调用栈传播，直到使用`catch`关键字拦截它。调用栈是正在执行的方法列表。因此，如果函数`A()`调用函数`B()`，而函数`B()`又调用函数`C()`，则调用栈将由这三个方法组成。在这种情况下，在函数`C()`中引发的异常可以在同一函数中处理，前提是有问题的代码位于`try-catch`块内。如果不是这种情况，异常会传播到方法`B()`，该方法有机会处理异常，依此类推。如果没有方法处理异常，则异常最终由\
  \ PHP 解释器拦截，它会将异常转换为 PHP 致命错误。\n\n在我们的数据库处理代码中，我们将捕获 PDO 可能生成的潜在异常。\n\n虽然默认情况下不这样做，但可以指示\
  \ PDO 在执行 SQL 命令或打开数据库连接时出现问题的情况下生成异常，如下所示：\n\n```\n// 创建一个新的 PDO 类实例\n$handler\
  \ = new PDO( ... );\n\n// 配置 PDO 以抛出异常\nself::$_mHandler->setAttribute(PDO::ATTR_ERRMODE,\n\
  \                                PDO::ERRMODE_EXCEPTION);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n648XCH03.qxd 11/8/06 9:45 AM Page 86\n\n### 86 第三章：创建产品目录：第一部分\n\n我们捕获这些异常，并将错误详细信息传递给你在第\
  \ 2 章中编写的错误处理代码。以下代码片段显示了一个实现此功能的简短函数：\n\n```\n// PDOStatement::fetch 的包装方法\npublic\
  \ static function GetRow($statementHandler, $params = null, $fetchStyle = PDO::FETCH_ASSOC)\n\
  {\n    // 将返回值初始化为 null\n    $result = null;\n\n    // 尝试执行接收到的预处理语句\n    try\n\
  \    {\n        self::Execute($statementHandler, $params);\n        $result = $statementHandler->fetch($fetchStyle);\n\
  \    }\n    catch(PDOException $e)\n    {\n        // 关闭数据库处理器并触发错误\n        self::Close();\n\
  \        trigger_error($e->getMessage(), E_USER_ERROR);\n    }\n\n    // 返回查询结果\n\
  \    return $result;\n}\n```\n\n## 使用连接发出命令\n\n打开连接后，你现在就达到了我们从一开始就追求的阶段：通过连接执行\
