  trans: "\n变量可以在使用前递增/递减（`++$num`、`--$num`），也可以在使用后递增/递减（`$num++`、`$num--`）。\n\n\
    （假设每条语句执行前 `$num = 1`。）\n\n```\n$value = $num++ - 5; // $value 为 -4，$num 为 2\n\
    $value = $num-- + 5; // $value 为 6，$num 为 0\n$value = ++$num – 5; // $value 为\
    \ -3，$num 为 2\n$value = --$num + 5; // $value 为 5，$num 为 0\n```\n\n**练习**：编写一个程序，将两个数值赋予两个不同的变量。然后计算这两个数相加、相减、相除和相乘的结果。每次计算后，用一句话显示结果，例如\"\
    1 和 2 的和是 3。\"\n\n**提示**\n\n在大多数情况下，PHP 允许你在字符串中直接放入变量名。例如，`\"$firstNumber 和 $secondNumber\
    \ 的和是 $sum\"` 就能生成所需的结果。\n\n## 条件语句\n\n*条件语句*用于判断比较结果是否为\"真\"或\"假\"。如果语句为真，则执行紧跟在\
    \ `if` 语句后的代码。如果语句为假，则执行 `else` 语句后的代码（如果有）。与上一节中介绍的赋值运算符（`=`）不同，比较两个值是否相等需要两个（`==`）或三个（`===`）等号。两个等号会忽略大小写或数据类型，\"\
    A\"和\"a\"会被视为相等，5 和 5.0 也会被视为相等。三个等号要求完全匹配，上述两个例子用三个等号比较都会被判定为不相等。\n\n**注意**\n\
    \n如果程序员错误地只使用了一个等号，程序不会报错。它会认为条件为\"真\"，从而导致条件语句可能产生无效的结果。\n\n```\nif(要比较的语句) {\n\
    // 如果比较结果为真，则执行此处代码\n}\n// 无论结果为真还是假，if 语句后的代码都会执行\nif(要比较的语句) {\n// 如果比较结果为真，则执行此处代码\n\
    }\nelse {\n// 如果比较结果为假，则执行此处代码\n}\n// 无论结果为真还是假，if/else 语句后的代码都会执行\n```\n\n以上展示了条件语句的基本结构。第一个例子中，只有条件为真时，`if`\
    \ 语句内的代码才会执行。如果条件为假，则不执行任何额外代码。第二个例子中，在 `else` 语句后提供了当条件为假时执行的代码。还可以使用嵌套的 `if`/`else`\
    \ 语句。\n\n让我们来看一些结合比较运算符使用条件语句的例子。\n\nI-1：\n\n```\n```\n\n输出：36 和 25 不相等。\n\n原因：`$a`（25）和\
    \ `$b`（36）的值不相同。因此，`else` 部分的代码会被执行。\n\nI-2：\n\n```\n```\n\n输出：A 和 a 不相等。\n原因：使用三个等号（`===`）也会比较大小写。在此例中，由于大小写不同，比较结果为假。如果去掉一个等号，结果将变为真。\n\
    \n**注意**\n\n在此例中，使用了双引号来创建字符串。由于每个字符串只有一个字符，也可以使用单引号。\n\nI-3：\n\n```\n```\n\n\
    输出：36 和 25 不相等。\n\n原因：非运算符（`!`）的作用与等于运算符的结果相反（参见示例 #1）。条件从假状态反转为真状态。执行紧跟在 `if`\
    \ 表达式后的代码。\n\nI-4：\n\n```\n```\n\n输出：a 和 A 不相等。\n\n原因：不区分大小写的非运算符（`!==`）作用与全等运算符的结果相反（参见示例\
    \ #2）。比较结果变为真。执行紧跟在 `if` 语句后的代码。\n\nI-5：\n\n```\n```\n\n输出：25.1 小于 36。\n\n原因：如果左侧的值小于右侧的值，小于运算符返回真。我们可以混用浮点数（小数）和整数进行比较。在此例中，36\
    \ 会在比较前被转换为 36.0。\n\nI-6：\n\n```\n```\n\n输出：36 小于或等于 36。\n\n原因：小于或等于运算符与示例 #5\
    \ 类似。但如果两个值相等，它也会返回真。\n\nI-7：\n\n```\n $b) {\necho \"$a 大于 $b\";\n}\nelse {\n\
