    然而，如果效率成为问题，应该很容易完全抽离`SpaceMapper`，并使用SQL联接一次性检索所有需要的数据。


    当然，你的代码可能会因此变得不那么可移植，但效率优化总是有代价的！


    最终，`Mapper`类的粒度会有所不同。如果一个对象类型仅由另一个对象类型存储，那么你可能只考虑为容器创建`Mapper`。


    该模式的最大优势在于它在领域层和数据库之间实现了强解耦。`Mapper`对象在幕后承担压力，并能适应各种复杂的关系结构。


    该模式最大的缺点可能是创建具体`Mapper`类所需的大量繁琐工作。然而，存在大量可自动生成的样板代码。一种生成`Mapper`类通用方法的巧妙方式是通过`反射`。你可以查询领域对象，发现其`setter`和`getter`方法（或许结合参数命名约定），并生成基础的`Mapper`类以供修改。本章中所有`Mapper`类最初都是这样生成的。


    使用映射器时需要注意的一个问题是一次性加载过多对象的风险。不过，`Iterator`实现在这里有所帮助。因为`Collection`对象最初只保存行数据，所以只有在访问特定`Venue`并将其从数组转换为对象时，才会进行二次请求（获取`Space`对象）。这种惰性加载形式甚至可以进一步增强，你将在后续内容中看到。


    你应该注意涟漪加载。在创建映射器时，请意识到使用另一个映射器来获取对象属性可能只是冰山一角。这个二级映射器在构建自身对象时可能又会用到更多映射器。如果不小心，你可能会发现表面上的简单查找操作会触发数十个其他类似操作。


    你还应该注意数据库应用程序为构建高效查询所设定的任何指导原则，并准备好进行优化（必要时针对不同数据库进行）。适用于多种数据库应用程序的SQL语句很好；但快速的应用更好。尽管引入条件语句（或策略类）来管理同一查询的不同版本是一件苦差事，且在前一种情况下可能显得丑陋，但不要忘记所有这些杂乱的优化都被整洁地隐藏在客户端代码之外。


    ## 身份映射


    你还记得 PHP 4 中按值传递错误的噩梦吗？当两个你本以为指向同一个对象的变量，结果却指向不同但巧妙地相似的变量时，那随之而来的混乱？好吧，这个噩梦又回来了。


    ### 问题


    以下是为测试数据映射器示例而创建的一些测试代码：


    ```

    // listing 13.18

    $mapper = new VenueMapper();

    $venue = new Venue(-1, "The Likey Lounge");

    $mapper->insert($venue);

    $venue = $mapper->find($venue->getId());

    print_r($venue);

    $venue->setName("The Bibble Beer Likey Lounge");

    $mapper->update($venue);

    $venue = $mapper->find($venue->getId());

    print_r($venue);

    ```


    这段代码的目的是演示你添加到数据库中的对象也可以通过`Mapper`提取，并且是相同的。相同，也就是说，除了不是同一个对象之外，其他所有方面都相同。我在设计这个问题时作弊了，将新的`Venue`对象赋值给了旧的变量。不幸的是，你并不总是能够对情况有那样的控制。同一个对象可能在单个`请求`中被多次引用。如果你修改了它的一个版本并保存到数据库，你能确保该对象的另一个版本（可能已经存储在`Collection`对象中）不会覆盖你的更改吗？


    重复对象在系统中不仅存在风险，还代表了相当大的开销。一些常用对象可能在一次处理中被加载三到四次，而除了其中一次之外，所有其他数据库查询都是完全多余的。


    幸运的是，解决这个问题相对简单。'
  raw: '```

    // listing 13.15

    public function getCollection(array $raw): Collection

    {

    return new SpaceCollection($raw, $this);

    }

    ```


    A full version of the `Mapper` class should declare `getCollection()` and `selectAllStmt()`
    as abstract methods, so all mappers are capable of returning a collection containing
    their persistent domain objects. In order to get the `Space` objects that belong
    to a `Venue`, however, I need a more limited collection. You have already seen
    the prepared statement for acquiring the data; now, here is the `SpaceMapper::findByVenue()`
    method, which generates the collection:


    ```

    // listing 13.16

    public function findByVenue($vid): Collection

    {

    $this->findByVenueStmt->execute([$vid]);

    return new SpaceCollection($this->findByVenueStmt->fetchAll(), $this);

    }

    ```


    The `findByVenue()` method is identical to `findAll()`, except for the SQL statement
    used. Back in the `VenueMapper`, the resulting collection is set on the `Venue`
    object via `Venue::setSpaces()`.


    So `Venue` objects now arrive fresh from the database, complete with all their
    `Space` objects in a neat type-safe list. None of the objects in that list are
    instantiated before being requested.


    Figure [13-3](#A314621_5_En_13_Chapter.html#Fig3) shows the process by which a
    client class might acquire a `SpaceCollection` and how the `SpaceCollection` class
    interacts with `SpaceMapper::createObject()` to convert its raw data into an object
    for returning to the client.


    ![A314621_5_En_13_Fig3_HTML.gif](A314621_5_En_13_Fig3_HTML.gif)


    Figure 13-3.


    Acquiring a SpaceCollection and using it to get a Space object


    ### Consequences


    The drawback with the approach I took to adding `Space` objects to `Venue` ones
    is that I had to take two trips to the database. In most instances, I think that
    is a price worth paying. Also, note that the work in `VenueMapper::doCreateObject()`
    to acquire a correctly populated `SpaceCollection` could be moved to `Venue::getSpaces()`,
    so that the secondary database connection would only occur on demand. Here’s how
    such a method might look:


    ```

    // listing 13.17

    // Venue

    public function getSpaces2()

    {

    if (is_null($this->spaces)) {

    $reg = Registry::instance();

    $finder = $reg->getSpaceMapper();

    $this->spaces = $finder->findByVenue($this->getId());

    }

    return $this->spaces;

    }

    ```


    If efficiency becomes an issue, however, it should be easy enough to factor out
    `SpaceMapper` altogether and retrieve all the data you need in one go using an
    SQL join.


    Of course, your code may become less portable as a result of that, but efficiency
    optimization always comes at a price!


    Ultimately, the granularity of your `Mapper` classes will vary. If an object type
    is stored solely by another, then you may consider only having a `Mapper` for
    the container.


    The great strength of this pattern is the strong decoupling it effects between
    the Domain layer and database. The `Mapper` objects take the strain behind the
    scenes and can adapt to all sorts of relational twistedness.


    Perhaps the biggest drawback with the pattern is the sheer amount of slog involved
    in creating concrete `Mapper` classes. However, there is a large amount of boilerplate
    code that can be automatically generated. A neat way of generating the common
    methods for `Mapper` classes is through reflection. You can query a domain object,
    discover its setter and getter methods (perhaps in tandem with an argument naming
    convention), and generate basic `Mapper` classes ready for amendment. This is
    how all the `Mapper` classes featured in this chapter were initially produced.


    One issue to be aware of with mappers is the danger of loading too many objects
    at one time. The `Iterator` implementation helps us here, though. Because a `Collection`
    object only holds row data at first, the secondary request (for a `Space` object)
    is only made when a particular `Venue` is accessed and converted from array to
    object. This form of lazy loading can be enhanced even further, as you shall see.


    You should be careful of ripple loading. Be aware as you create your mapper that
    the use of another one to acquire a property for your object may be the tip of
    a very large iceberg. This secondary mapper may itself use yet more in constructing
    its own object. If you are not careful, you could find that what looks on the
    surface like a simple find operation sets off tens of other similar operations.


    You should also be aware of any guidelines your database application lays down
    for building efficient queries and be prepared to optimize (on a database-by-database
    basis if necessary). SQL statements that apply well to multiple database applications
    are nice; fast applications are much nicer. Although introducing conditionals
    (or strategy classes) to manage different versions of the same queries is a chore,
    and potentially ugly in the former case, don’t forget that all this mucky optimization
    is neatly hidden away from client code.


    ## Identity Map


    Do you remember the nightmare of pass-by-value errors in PHP 4? The sheer confusion
    that ensued when two variables that you thought pointed to a single object turned
    out to refer to different but cunningly similar ones? Well, the nightmare has
    returned.


    ### The Problem


    Here’s some test code created to try out the Data Mapper example:


    ```

    // listing 13.18

    $mapper = new VenueMapper();

    $venue = new Venue(-1, "The Likey Lounge");

    $mapper->insert($venue);

    $venue = $mapper->find($venue->getId());

    print_r($venue);

    $venue->setName("The Bibble Beer Likey Lounge");

    $mapper->update($venue);

    $venue = $mapper->find($venue->getId());

    print_r($venue);

    ```


    The purpose of this code was to demonstrate that an object that you add to the
    database could also be extracted via a `Mapper` and would be identical. Identical,
    that is, in every way except for being the same object. I cheated when designing
    this problem by assigning the new `Venue` object over the old. Unfortunately,
    you won’t always have that kind of control over the situation. The same object
    may be referenced at several different times within a `single` request. If you
    alter one version of it and save that to the database, can you be sure that another
    version of the object (perhaps stored already in a `Collection` object) won’t
    be written over your changes?


    Not only are duplicate objects risky in a system, they also represent a considerable
    overhead. Some popular objects could be loaded three or four times in a process,
    with all but one of these trips to the database entirely redundant.


    Fortunately, fixing this problem is relatively straightforward.'
