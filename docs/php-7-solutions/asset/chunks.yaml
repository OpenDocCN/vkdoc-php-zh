    \ and the code inside the curly braces\n    initiates a PHP session and stores\
    \ the values passed through the `$_POST` array in `$username` and `$password`.\
    \ Then it\n    creates `$userlist`, which\n    defines the location of the file\
    \ that contains the registered usernames\n    and passwords, and `$redirect`,\
    \ the URL of\n    the page the user will be sent to after successfully logging\
    \ in.\n\nFinally, the code inside the conditional statement includes `authenticate.php`,\n\
    \    which you’ll create next.\n\n**Note** Adjust the value of `$userlist` to\
    \ match\n    the location in your own setup.\n\n2.  Create a file called `authenticate.php`\
    \ in\n    the `includes`\n    folder. It will contain only PHP code, so strip\
    \ out any HTML inserted by\n    your script editor and insert the following code:\n\
    \n```\n    <?php\n    if (!is_readable($userlist)) {\n    $error = 'Login facility\
    \ unavailable. Please try later.';\n    } else {\n    $file = fopen($userlist,\
    \ 'r');\n    while (!feof($file)) {\n    $data = fgetcsv($file);\n    // ignore\
    \ if the first element is empty\n    if (empty($data[0])) {\n    continue;\n \
    \   }\n    // if username and password match, create session variable,\n    //\
    \ regenerate the session ID, and break out of the loop\n    if ($data[0] == $username\
    \ && password_verify($password, $data[1])) {\n    $_SESSION['authenticated'] =\
    \ 'Jethro Tull';\n    session_regenerate_id();\n    break;\n    }\n    }\n   \
    \ fclose($file);\n    }\n    ```\n\nThis adapts the code that you used in `getcsv.php`\
    \ in PHP\n    Solution 7-2\\. The conditional statement checks for a nonexistent\
    \ file or\n    one that can’t be read. If there’s a problem with `$userlist`,\
    \ the error\n    message is created immediately.\n\nOtherwise, the main code in\
    \ the `else` block extracts\n    the content of the CSV file by opening the file\
    \ in read mode and using\n    the `fgetcsv()`\n    function  to\n    return an\
    \ array of the data in each line. The CSV file containing\n    usernames and hashed\
    \ passwords doesn’t have column titles, so the while\n    loop examines the data\
    \ in each line.\n\nIf `$data[0]`\n    is `empty`, it\n    probably means the current\
    \ line is blank, so it’s skipped.\n\nThe first array element of each line `($data[0]`)\
    \ contains\n    the stored username. It’s compared with the submitted value, `$username`.\n\
    \nThe password submitted through the login form is stored in `$password` and the\n\
    \    hashed version is stored in `$data[1]`. Both are\n    passed as arguments\
    \ to `password_verify()`\n    which returns `true` if there’s a\n    match."
  trans: "\n# PHP 用户注册与密码验证\n\n## 代码分析与注释\n\n以下代码展示了用户注册流程中的密码哈希和文件操作：\n\n```php\n\
    if (!$errors) {\n    // 使用默认算法对密码进行哈希处理\n    $password = password_hash($password,\
    \ PASSWORD_DEFAULT);\n    // 以追加模式打开文件\n    $file = fopen($userfile, 'a+');\n\
    \    // 如果文件大小为 0，则尚未注册任何用户名\n    // 因此直接将用户名和密码作为 CSV 写入文件\n    if (filesize($userfile)\
    \ === 0) {\n        fputcsv($file, [$username, $password]);\n        $result =\
    \ \"$username 已注册。\";\n    } else {\n        // 如果文件大小大于 0，则先检查用户名\n        //\
    \ 将内部指针移动到文件开头\n        rewind($file);\n        // 逐行循环读取文件\n        while (($data\
    \ = fgetcsv($file)) !== false) {\n            if ($data[0] == $username) {\n \
    \               $result = \"$username 已被占用 - 请选择其他用户名。\";\n                break;\n\
    \            }\n        }\n        // 如果$result 未设置，则用户名可用\n        if (!isset($result))\
    \ {\n            // 插入新的 CSV 记录\n            fputcsv($file, [$username, $password]);\n\
    \            $result = \"$username 已注册。\";\n        }\n        // 关闭文件\n     \
    \   fclose($file);\n    }\n}\n```\n\n前面的说明和内联注释应该能帮助你理解这个脚本。\n\n11. 注册脚本将结果存储在`$result`或`$errors`数组中。修改`register.php`主体中的代码，以显示结果或错误消息，如下所示：\n\
    \n```php\necho '<ul>';\nif (!empty($errors)) {\n    foreach ($errors as $item)\
    \ {\n        echo \"<li>$item</li>\";\n    }\n} else {\n    echo \"<li>$result</li>\"\
    ;\n}\necho '</ul>';\n```\n\n这段代码会遍历`$errors`数组（如果它不为空）。否则，它会将`$result`（字符串）显示为单个项目符号项。\n\
    \n12. 保存`register_user_csv.php`和`register.php`，然后测试注册系统。尝试多次注册同一个用户名。你应该会看到一条消息，提示该用户名已被占用，并要求你选择另一个用户名。\n\
    \n13. 打开`hashed.csv`。你应该会看到明文形式的用户名，但密码应该是经过哈希处理的。即使为两个不同的用户选择相同的密码，哈希后的版本也不同，因为`password_hash()`在加密密码之前会添加一个称为**盐**的随机值。图[11-4]显示了两个都使用密码`Codeslave&Ch11`注册的用户。\n\
    \n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fig4_HTML.jpg](img/332054_4_En_11_Fig4_HTML.jpg)\n\
    \n**图 11-4.** 使用盐会对相同的密码产生完全不同的加密结果\n\n如有必要，请对照`ch11`文件夹中的`register_user_csv_02.php`和`register_05.php`检查你的代码。\n\
    \n**提示** `register_user_csv.php`中的大部分代码都是通用的。要将其用于任何注册表单，你只需在包含它之前定义`$username`、`$password`、`$retyped`和`$userfile`，并使用`$errors`和`$result`捕获结果。你可能需要对外部文件进行的唯一更改是设置用户名的最小字符数以及设置密码强度的参数。这些设置定义在文件的顶部，因此易于访问和调整。\n\
    \n## 使用`password_verify()`验证哈希密码\n\n`password_verify()`函数的功能正如你所期望的那样：它验证使用`password_hash()`加密的密码。它只接受两个参数：提交的密码和加密后的版本。如果提交的密码正确，函数返回`true`。否则，返回`false`。\n\
    \n### PHP 解决方案 11-5：构建登录页面\n\n此 PHP 解决方案演示了如何通过`post`方法提交用户名和密码，然后检查提交的值是否与存储在外部文本文件中的值匹配。如果找到匹配项，脚本会设置一个会话变量，然后将用户重定向到另一个页面。\n\
    \n1. 在`sessions`文件夹中创建一个名为`login.php`的文件，然后插入一个包含用户名和密码文本输入字段以及一个名为`login`的提交按钮的表单，如下所示（或者，使用`ch11`文件夹中的`login_01.php`）：\n\
    \n```html\n<form method=\"post\" action=\"\">\n    <p>\n        <label for=\"\
    username\">用户名：</label>\n        <input type=\"text\" name=\"username\" id=\"\
    username\">\n    </p>\n    <p>\n        <label for=\"pwd\">密码：</label>\n     \
    \   <input type=\"password\" name=\"pwd\" id=\"pwd\">\n    </p>\n    <p>\n   \
    \     <input type=\"submit\" name=\"login\" value=\"登录\">\n    </p>\n</form>\n\
    ```\n\n这是一个简单的表单，没什么特别的：\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Figi_HTML.jpg](img/332054_4_En_11_Figi_HTML.jpg)\n\
    \n2. 在`DOCTYPE`声明上方的 PHP 块中添加以下代码：\n\n```php\n<?php\n$error = '';\nif (isset($_POST['login']))\
    \ {\n    session_start();\n    $username = $_POST['username'];\n    $password\
    \ = $_POST['pwd'];\n    // 用户名和密码文件的位置\n    $userlist = 'C:/private/hashed.csv';\n\
    \    // 登录成功后重定向的位置\n    $redirect = 'http://localhost/phpsols-4e/sessions/menu.php';\n\
    \    require_once '../includes/authenticate.php';\n}\n?>\n```\n\n这段代码初始化一个名为`$error`的变量，其值为空字符串。如果登录失败，将使用它来显示错误消息，告知用户失败原因。\n\
    \n然后，条件语句检查`$_POST`数组中是否包含名为`login`的元素。如果包含，则表示表单已提交，花括号内的代码会启动一个 PHP 会话，并将通过`$_POST`数组传递的值存储在`$username`和`$password`中。接着，它创建`$userlist`（定义包含已注册用户名和密码的文件位置）和`$redirect`（用户成功登录后将被发送到的页面的\
    \ URL）。\n\n最后，条件语句内的代码包含`authenticate.php`，你将在下一步创建它。\n\n**注意** 将`$userlist`的值调整为你自己系统中的位置。\n\
    \n3. 在`includes`文件夹中创建一个名为`authenticate.php`的文件。它只包含 PHP 代码，因此请删除脚本编辑器插入的任何 HTML，并插入以下代码：\n\
    \n```php\n<?php\nif (!is_readable($userlist)) {\n    $error = '登录功能不可用。请稍后再试。';\n\
    } else {\n    $file = fopen($userlist, 'r');\n    while (!feof($file)) {\n   \
    \     $data = fgetcsv($file);\n        // 如果第一个元素为空，则忽略\n        if (empty($data[0]))\
    \ {\n            continue;\n        }\n        // 如果用户名和密码匹配，则创建会话变量，\n      \
    \  // 重新生成会话 ID，并跳出循环\n        if ($data[0] == $username && password_verify($password,\
    \ $data[1])) {\n            $_SESSION['authenticated'] = 'Jethro Tull';\n    \
    \        session_regenerate_id();\n            break;\n        }\n    }\n    fclose($file);\n\
    }\n?>\n```\n\n这段代码改编自 PHP 解决方案 7-2 中`getcsv.php`使用的代码。条件语句检查文件不存在或无法读取的情况。如果`$userlist`有问题，则立即创建错误消息。\n\
    \n否则，`else`块中的主要代码通过以读取模式打开文件并使用`fgetcsv()`函数返回每行数据的数组来提取 CSV 文件的内容。包含用户名和哈希密码的\
    \ CSV 文件没有列标题，因此`while`循环检查每行中的数据。\n\n如果`$data[0]`为空，则可能表示当前行是空行，因此跳过它。\n\n每行的第一个数组元素（`$data[0]`）包含存储的用户名。它与提交的值`$username`进行比较。\n\
    \n通过登录表单提交的密码存储在`$password`中，哈希版本存储在`$data[1]`中。两者都作为参数传递给`password_verify()`，如果匹配则返回`true`。\n"
- fmt: 'If both `username` and `password` match, the script creates a variable called
    `$_SESSION[''authenticated'']` and assigns it the name of one of the great folk-rock
    bands of the 1970s. There’s nothing magic about either of these (apart from Jethro
    Tull’s music); I’ve chosen the name and value of the variable arbitrarily. All
    that matters is a session variable is created. As soon as a match is found, the
    session ID is regenerated, and `break` exits the loop.


    3. If the login is successful, the `header()` function needs to redirect the user
    to the URL stored in `$redirect` and then exit the script. Otherwise, an error
    message needs to be created, informing the user that the login failed. The complete
    script looks like this:


    ```

    <?php

    if (!file_exists($userlist) || !is_readable($userlist)) {

    $error = ''Login facility unavailable. Please try later.'';

    } else {

    $file = fopen($userlist, ''r'');

    while (!feof($file)) {

    $data = fgetcsv($file);

    // ignore if the first element is empty

    if (empty($data[0])) {

    continue;

    }

    // if username and password match, create session variable,

    // regenerate the session ID, and break out of the loop

    if ($data[0] == $username && password_verify($password, $data[1])) {

    $_SESSION[''authenticated''] = ''Jethro Tull'';

    session_regenerate_id();

    break;

    }

    }

    fclose($file);

    // if the session variable has been set, redirect

    if (isset($_SESSION[''authenticated''])) {

    header("Location: $redirect");

    exit;

    } else {

    $error = ''Invalid username or password.'';

    }

    }

    ?>

    ```


    4. In `login.php`, add the following short code block just after the opening `<body>`
    tag to display any error messages:


    ```

    <?php

    if (isset($error)) {

    echo "<p>$error</p>";

    }

    ?>

    ```


    The completed code is in `authenticate.php` and `login_02.php` in the `ch11` folder.
    Before you can test `login.php`, you need to create `menu.php` and restrict access
    with a session.


    ### PHP Solution 11-6: Restricting access to a page with a session


    This PHP solution demonstrates how to restrict access to a page by checking for
    the existence of a session variable that indicates the user’s credentials have
    been authenticated. If the variable hasn’t been set, the `header()` function redirects
    the user to the login page.


    1. Create two pages in the `sessions` folder called `menu.php` and `secretpage.php`.
    It doesn’t matter what they contain, as long as they link to each other. Alternatively,
    use `menu_01.php` and `secretpage_01.php` in the `ch11` folder.


    2. Protect access to each page by inserting the following above the `DOCTYPE`
    declaration:


    ```

    <?php

    session_start();

    if (!isset($_SESSION[''authenticated''])) {

    header(''Location: login.php'');

    exit;

    }

    ?>

    ```


    After starting the session, the script checks if `$_SESSION[''authenticated'']`
    has been set. If it hasn’t been, it redirects the user to `login.php` and exits.
    That’s all there is to it! The script doesn’t need to know the value of `$_SESSION[''authenticated'']`,
    although you could make doubly sure by amending line 4 like this:


    ```

    if (!isset($_SESSION[''authenticated'']) || $_SESSION[''authenticated''] != ''Jethro
    Tull'') {

    ```


    This now also rejects a visitor if `$_SESSION[''authenticated'']` has the wrong
    value.


    3. Save `menu.php` and `secretpage.php`, then try to load either of them into
    a browser. You should always be redirected to `login.php`.


    4. Enter a valid username and password from one of those you registered in `hashed.csv`
    (the values are case-sensitive) in `login.php`, and then click `Log in`. You should
    be redirected immediately to `menu.php`, and the link to `secretpage.php` should
    also work.


    You can check your code against `menu_02.php` and `secretpage_02.php` in the `ch11`
    folder.


    All you need to do to protect any page on your site is to add the eight lines
    of code in step 2 above the `DOCTYPE` declaration.


    ### PHP Solution 11-7: Creating a Reusable Logout Button


    As well as logging in to a site, users should be able to log out. This PHP solution
    shows how to create a logout button that can be inserted in any page.


    Continue working with the files from the preceding section.


    1. Create a logout button in the `<body>` of `menu.php` by inserting the following
    form:


    ```

    <form method="post" action="">

    <input type="submit" name="logout" value="Log out">

    </form>

    ```


    The page should look similar to the following screenshot:


    ![../images/332054_4_En_11_Chapter/332054_4_En_11_Figj_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Figj_HTML.jpg)


    2. You now need to add the script that runs when the logout button is clicked.
    Amend the code above the `DOCTYPE` declaration like this (the code is in `menu_02.php`):


    ```

    <?php

    session_start();

    if (isset($_POST[''logout''])) {

    $_SESSION = array();

    if (ini_get("session.use_cookies")) {

    $params = session_get_cookie_params();

    setcookie(session_name(), '''', time() - 42000,

    $params["path"], $params["domain"],

    $params["secure"], $params["httponly"]

    );

    }

    session_destroy();

    header(''Location: login.php'');

    exit;

    }

    if (!isset($_SESSION[''authenticated''])) {

    header(''Location: login.php'');

    exit;

    }

    ?>

    ```


    This is the same code as in “Destroying a session” earlier in the chapter. The
    only differences are that it’s enclosed in a conditional statement so that it
    runs only when the logout button is clicked, and it uses `header()` to redirect
    the user to `login.php`.


    3. Save `menu.php` and test it by clicking Log out. You should be redirected to
    `login.php`. Any attempt to return to `menu.php` or `secretpage.php` will bring
    you back to `login.php`.


    4. You can put the same code in every restricted page, but PHP is all about saving
    work, not making it. It makes sense to turn this into an include file. Create
    a new file called `logout.php` in the `includes` folder. Cut and paste the new
    code from steps 1 and 2 into the new file, like this (it’s in `logout.php` in
    the `ch11` folder):


    Because the form will be included in different pages, you can’t set the `action`
    attribute to a specific page. However, omitting it simply results in the current
    page being reloaded, so the logout script will be available in every page that
    includes `logout.php`.


    5. At the same point in `menu.php` from which you cut the code for the form, include
    the new file, as follows:


    ```

    <?php include(''includes/logout.php''); ?>

    ```


    Including the code from an external file like this means that there will be output
    to the browser before the calls to `setcookie()` and `header()`. So you need to
    buffer the output, as shown in PHP Solution 11-2.


    6. Add `ob_start();` immediately after the call to `session_start()` at the top
    of `menu.php`. There’s no need to use `ob_end_flush()` or `ob_end_clean()`. PHP
    automatically flushes the buffer at the end of the script if you haven’t already
    explicitly done so.


    7. Save `menu.php` and test the page. It should look and work exactly the same
    as before.


    8. Repeat steps 5 and 6 with `secretpage.php`. You now have a simple, reusable
    logout button that can be incorporated into any restricted page.


    You can check your code against `menu_04.php`, `secretpage_03.php`, and `logout.php`
    in the `ch11` folder.


    ### Keeping the Hashing Algorithm up to date


    PHP Solutions 11-3 to 11-7 build a simple yet effective user authentication system
    that doesn’t require a database backend. However, it does have its limitations.
    Above all, it’s essential that the CSV file containing the usernames and passwords
    be located outside the server root. Also, once you get more than a few records,
    querying a database is usually much faster than looping through a CSV file line
    by line. Chapter [19](#332054_4_En_19_Chapter.xhtml) covers user authentication
    with a database.


    The major advantage of using `password_hash()` and `password_verify()` is that
    they’re designed to keep abreast of improvements in cryptography. Instead of specifying
    a particular hashing algorithm, using `PASSWORD_DEFAULT` as the second argument
    to `password_hash()` ensures that new registrations always use whatever is considered
    to be the most secure method at the time. Even if the default changes, existing
    passwords can still be verified by the `password_verify()` function because the
    hashed password contains information that identifies how it was hashed.'
