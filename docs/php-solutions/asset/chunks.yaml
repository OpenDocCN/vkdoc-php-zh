    script:


    `<?php`


    `ini_set(''display_errors'', ''1'');`


    `$mailSent = mail(''you@example.com'', ''PHP mail test'', ''This is a test email'');`


    `if ($mailSent) {`


    `echo ''Mail sent'';`


    `} else {`


    `echo ''Failed'';`


    `}`


    Replace `you@example.com` with your own email address. Upload the file to your
    website and load the page into a browser.


    If you see an error message about there being no `From` header, add one as a fourth
    argument to the `mail()` function, like this:


    `$mailSent = mail(''you@example.com'', ''PHP mail test'', ''This is a test email''`
    `,`


    `''From: me@example.com''` `);`


    It’s usually a good idea to use a different address from the destination address
    in the first argument.


    If your hosting company requires the fifth argument, adjust the code like this:


    `$mailSent = mail(''you@example.com'', ''PHP mail test'', ''This is a test email''`
    `, null,`


    `''-fme@example.com''` `);`


    Using the fifth argument normally replaces the need to supply a `From` header,
    so using `null` (without quotes) as the fourth argument indicates that it has
    no value.


    If you see “Mail sent” and no mail arrives, or you see “Failed” after trying all
    five arguments, consult your hosting company for advice.


    If you receive the test email from this script but not from `contact.php`, it
