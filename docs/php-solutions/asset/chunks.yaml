    `$currentFile[''size''] = $uploaded[''size''][$key];`


    `if ($this->checkFile($currentFile)) {`


    `$this->moveFile($currentFile);`


    `}`


    `}`


    `} else {`


    `if ($this->checkFile($uploaded)) {`


    `$this->moveFile($uploaded);`


    `}`


    `}`


    `}`


    All you’re interested in is `$key`, so `$value` is never used. The first time
    the loop runs, `$uploaded[''name''][$key]` accesses the value stored in `$uploaded[''name''][0]`
    and assigns it to `$currentFile[''name'']`; `$uploaded[''type''][$key]` accesses
    `$uploaded[''type''][0]` and assigns it to `$currentFile[''type'']`, and so on.
    You never loop through the arrays for `type`, `tmp_name`, `error`, and `size`.
    Their values are accessible through the key thanks to the predictable nature of
    the `$_FILES` array.


    Each time the loop runs, `$currentFile` contains the details of a single file,
    which are then passed to the `checkFile()` and `moveFile()` methods exactly as
    before.


    Save `Upload.php` and test it with `file_upload.php`. It should work the same
    as before, uploading only one file at a time.   Add a pair of square brackets
    at the end of the `name` attribute in the file field and insert the `multiple`
    attribute, like this:


    `<input type="file" name="image` `[]` `" id="image"` `multiple` `>`


    You don’t need to make any changes to the PHP code above the `DOCTYPE` declaration.
    The code is the same for both single and multiple uploads.


    Note


    Internet Explorer prior to IE 10 will upload only the last file selected.


    Save `file_upload.php` and reload it in your browser. Test it by selecting multiple
    files. When you click Upload, you should see messages relating to each file. Files
    that meet your criteria are uploaded. Those that are too big or of the wrong type
    are rejected.


    You can check your code against `Upload_06.php` in the `ch06/PhpSolutions/File`
    folder.'
  trans: "\n### `$_FILES` 数组如何处理多个文件\n\n由于 `$_FILES` 是一个多维数组，因此它能够处理多个上传。除了在 `<input>`\
    \ 标签中添加 `multiple` 属性外，还需要在 `name` 属性中添加一对方括号，如下所示：\n\n`<input type=\"file\" name=\"\
    image[]\" id=\"image\" multiple>`\n\n正如在第 5 章中学到的，在 `name` 属性中添加方括号会以数组形式提交多个值。你可以使用\
    \ `ch06` 文件夹中的 `multi_upload_01.php` 或 `multi_upload_02.php` 来查看这对 `$_FILES` 数组的影响。图\
    \ 6-10 显示了在使用支持 `multiple` 属性的现代桌面浏览器中选择四个文件后的结果。\n\n![A978-1-4842-0635-5_6_Fig10_HTML.jpg](img/A978-1-4842-0635-5_6_Fig10_HTML.jpg)\n\
    \n图 6-10. `$_FILES` 数组可以一次性上传多个文件\n\n虽然这种结构不如将每个文件的详细信息分别存储在单独的子数组中那么方便，但数字键可以追踪指向每个文件的详细信息。例如，`$_FILES['image']['name'][2]`\
    \ 直接对应 `$_FILES['image']['tmp_name'][2]`，以此类推。\n\n在撰写本文时，所有现代桌面浏览器都支持 `multiple`\
    \ 属性，iOS 上的 Safari（自 6.1 版本起）也支持该属性。Internet Explorer 9 及更早版本以及 Android（当前版本为\
    \ 4.4）不支持该属性。\n\n不支持 `multiple` 属性的浏览器会使用相同的结构上传单个文件，因此文件名称存储为 `$_FILES['image']['name'][0]`。\n\
    \n**提示**\n\n如果需要在旧版浏览器上支持多文件上传，请省略 `multiple` 属性，并为要同时上传的文件数量创建单独的文件输入字段。为每个 `<input>`\
    \ 标签设置相同的 `name` 属性，后跟方括号。生成的 `$_FILES` 数组结构与图 6-10 相同。\n\n### PHP 解决方案 6-7：调整类以处理多文件上传\n\
    \n本 PHP 解决方案展示了如何调整 `Upload` 类的 `upload()` 方法来处理多文件上传。该类会自动检测 `$_FILES` 数组是否如图\
    \ 6-10 所示的结构，并使用循环来处理上传的任意数量文件。\n\n当你从设计为仅处理单次上传的表单上传文件时，`$_FILES` 数组将文件名作为字符串存储在\
    \ `$_FILES['image']['name']` 中。但是，当你从能处理多文件上传的表单上传时，`$_FILES['image']['name']`\
    \ 是一个数组。即使只上传了一个文件，其名称也存储为 `$_FILES['image']['name'][0]`。\n\n因此，通过检测 `name` 元素是否为数组，你可以决定如何处理\
    \ `$_FILES` 数组。如果 `name` 元素是数组，你需要遍历它，使用其索引提取当前文件的其他详细信息，然后将它们存储在一个变量中，该变量可以被传递给\
    \ `checkFile()` 方法。\n\n基于这一点，继续使用你现有的类文件。或者，使用 `ch06/PhpSolutions/File` 文件夹中的\
    \ `Upload_05.php`。\n\n通过添加一个条件语句来检查 `$uploaded` 的 `name` 元素是否为数组，从而修改 `upload()`\
    \ 方法：\n\n```\npublic function upload($renameDuplicates = true) {\n    $this->renameDuplicates\
    \ = $renameDuplicates;\n    $uploaded = current($_FILES);\n    if (is_array($uploaded['name']))\
    \ {\n        // 处理多文件上传\n    } else {\n        if ($this->checkFile($uploaded))\
    \ {\n            $this->moveFile($uploaded);\n        }\n    }\n}\n```\n\n条件语句检查\
    \ `$uploaded['name']` 是否是一个数组。如果是，则需要特殊处理。现有的 `checkFile()` 调用现在位于 `else` 块中。\n\
    \n**注意**\n\n如果你需要提醒 `$uploaded` 如何包含对 `$_FILES` 数组中第一个元素的引用，请参考 PHP 方案 6-2。\n\n\
    为了处理多文件上传，挑战在于将单个文件关联的五个值（`name`, `type` 等）收集起来，然后将它们传递给 `checkFile()` 和 `moveFile()`\
    \ 方法。\n\n如果你参考图 6-10，`$uploaded['name']` 是一个包含已上传文件名称的索引数组。通过使用 `foreach` 循环遍历该数组，你可以同时访问键和值，如下所示：\n\
    \n```\nforeach ($uploaded['name'] as $key => $value) { }\n```\n\n循环第一次运行时，`$key`\
    \ 为 0。使用这个键，你可以访问 `$_FILES` 数组中第一个文件的其他元素，并将它们分配给一个名为 `$currentFile` 的新数组。第二次运行时，你会获得第二个文件的详细信息，以此类推。\n\
    \n修改后的 `upload()` 方法代码如下所示：\n\n```\npublic function upload($renameDuplicates =\
    \ true) {\n    $this->renameDuplicates = $renameDuplicates;\n    $uploaded = current($_FILES);\n\
    \    if (is_array($uploaded['name'])) {\n        // 处理多文件上传\n        foreach ($uploaded['name']\
    \ as $key => $value) {\n            $currentFile['name'] = $uploaded['name'][$key];\n\
    \            $currentFile['type'] = $uploaded['type'][$key];\n            $currentFile['tmp_name']\
    \ = $uploaded['tmp_name'][$key];\n            $currentFile['error'] = $uploaded['error'][$key];\n\
    \            $currentFile['size'] = $uploaded['size'][$key];\n            if ($this->checkFile($currentFile))\
    \ {\n                $this->moveFile($currentFile);\n            }\n        }\n\
    \    } else {\n        if ($this->checkFile($uploaded)) {\n            $this->moveFile($uploaded);\n\
    \        }\n    }\n}\n```\n\n你所关心的只是 `$key`，因此 `$value` 从未被使用。循环第一次运行时，`$uploaded['name'][$key]`\
    \ 访问存储在 `$uploaded['name'][0]` 中的值，并将其赋给 `$currentFile['name']`；`$uploaded['type'][$key]`\
    \ 访问 `$uploaded['type'][0]` 并赋给 `$currentFile['type']`，依此类推。你永远不会循环遍历 `type`、`tmp_name`、`error`\
    \ 和 `size` 的数组。由于 `$_FILES` 数组的可预测性，它们的值可以通过键来访问。\n\n每次循环运行时，`$currentFile` 都包含单个文件的详细信息，然后这些详细信息会像之前一样传递给\
    \ `checkFile()` 和 `moveFile()` 方法。\n\n保存 `Upload.php` 并使用 `file_upload.php` 进行测试。它的表现应和之前一样，一次只上传一个文件。在文件字段的\
    \ `name` 属性末尾添加一对方括号，并插入 `multiple` 属性，如下所示：\n\n`<input type=\"file\" name=\"\
    image[]\" id=\"image\" multiple>`\n\n你不需要对 `DOCTYPE` 声明之上的 PHP 代码做任何更改。该代码对于单次和多次上传都是相同的。\n\
    \n**注意**\n\nIE 10 之前的 Internet Explorer 版本只会上传最后选定的文件。\n\n保存 `file_upload.php`\
    \ 并在浏览器中重新加载。通过选择多个文件进行测试。当你点击“上传”时，应该会看到与每个文件相关的消息。符合你条件的文件会被上传。太大或类型错误的文件会被拒绝。\n\
    \n你可以对照 `ch06/PhpSolutions/File` 文件夹中的 `Upload_06.php` 检查你的代码。\n"
- fmt: "## Using the Upload Class\n\nThe `Upload` class is simple to use—just import\
    \ the namespace as described in “Using a namespaced class” earlier in this chapter.\
    \ Include the class definition in your script and create an `Upload` object by\
    \ passing the file path to the `upload_test` folder as an argument, like this:\n\
    \n`$destination = 'C:/upload_test/';`\n\n`$loader = new Upload($destination);`\n\
    \n> **Caution:** The path to the upload folder must end in a trailing slash.\n\
    \nBy default, the class permits only images to be uploaded, but this can be overridden.\
    \ The class has the following public methods:\n\n- `setMaxSize()`: Takes an integer\
    \ and sets the maximum size for each upload file, overriding the default 51200\
    \ bytes (50 KB). The value must be expressed as bytes.\n- `getMaxSize()`: Reports\
    \ the maximum size in KB formatted to one decimal place.\n- `allowAllTypes()`:\
    \ Allows any type of file to be uploaded. By default, `.upload` is appended as\
    \ a suffix to files with filename extensions listed in the `$notTrusted` property.\
    \ To prevent the suffix from being appended, pass `false` as an argument to this\
    \ method.\n- `upload()`: Saves the file(s) to the destination folder. Spaces in\
    \ filenames are replaced by underscores. By default, files with the same name\
    \ as an existing file are renamed by inserting a number in front of the filename\
    \ extension. To overwrite files, pass `false` as an argument to this method.\n\
    - `getMessages()`: Returns an array of messages reporting the status of uploads.\n\
    \n## Points to Watch with File Uploads\n\nUploading files from a web form is fairly\
    \ straightforward with PHP. The main causes of failure are not setting the correct\
    \ permissions on the upload directory or folder, and forgetting to move the uploaded\
    \ file to its target destination before the end of the script. Letting other people\
    \ upload files to your server, however, exposes you to risk. In effect, you’re\
    \ allowing visitors the freedom to write to your server’s hard disk. It’s not\
    \ something you would allow strangers to do on your own computer, so you should\
    \ guard access to your upload directory with the same degree of vigilance.\n\n\
    Ideally, uploads should be restricted to registered and trusted users, so the\
    \ upload form should be in a password-protected part of your site. Also, the upload\
    \ folder does not need to be inside your site root, so locate it in a private\
    \ directory whenever possible unless you want uploaded material to be displayed\
    \ immediately in your webpages. Remember, though, there is no way PHP can check\
    \ that material is legal or decent, so immediate public display entails risks\
    \ that go beyond the merely technical. You should also bear the following security\
    \ points in mind:\n\n- Set a maximum size for uploads both in the web form and\
    \ on the server side.\n- Restrict the types of uploaded files by inspecting the\
    \ MIME type in the `$_FILES` array. Alternatively, add a suffix to the name of\
    \ executable files to prevent them from being run remotely.\n- Replace spaces\
    \ in filenames with underscores or hyphens.\n- Inspect your upload folder on a\
    \ regular basis. Make sure there’s nothing in there that shouldn’t be, and do\
    \ some housekeeping from time to time. Even if you limit file upload sizes, you\
    \ may run out of your allocated space without realizing it.\n\n## Chapter Review\n\
    \nThis chapter has introduced you to creating a PHP class. If you’re new to PHP\
    \ or programming, you might have found it tough going. Don’t be disheartened.\
    \ The `Upload` class contains more than 180 lines of code, some of it complex,\
    \ although I hope the descriptions have explained what the code is doing at each\
    \ stage. Even if you don’t understand all the code, the `Upload` class will save\
    \ you a lot of time. It implements the main security measures necessary for file\
    \ uploads, yet using it involves as little as a dozen lines of code:\n\n```php\n\
    use PhpSolutions\\File\\Upload;\n\nif (isset($_POST['upload'])) {\n    require_once\
    \ 'PhpSolutions/File/Upload.php';\n\n    try {\n        $loader = new Upload('C:/upload_test/');\n\
    \        $loader->upload();\n        $result = $loader->getMessages();\n    }\
    \ catch (Exception $e) {\n        echo $e->getMessage();\n    }\n}\n```\n\nIf\
    \ you found this chapter to be a struggle, come back to it later when you have\
    \ more experience, and you should find the code easier to understand.\n\nIn the\
    \ next chapter, you’ll learn some techniques for inspecting the contents of files\
    \ and folders, including how to use PHP to read and write text files.\n\n# 7.\
    \ Using PHP to Manage Files\n\nPHP has a huge range of functions designed to work\
    \ with the server’s file system, but finding the right one for the job isn’t always\
    \ easy. This chapter cuts through the tangle to show you some practical uses of\
    \ these functions, such as reading and writing text files to store small amounts\
    \ of information without a database. Loops play an important role in inspecting\
    \ the contents of the file system, so you’ll also explore some of the Standard\
    \ PHP Library (SPL) iterators that are designed to make loops more efficient.\n\
    \nAs well as opening local files, PHP can read public files, such as news feeds,\
    \ on other servers. News feeds are normally formatted as XML (Extensible Markup\
    \ Language). In the past, extracting information from an XML file was a tortuous\
    \ process, but that’s no longer the case thanks to the very aptly named SimpleXML.\
    \ In this chapter, you’ll see how to create a drop-down menu that lists all images\
    \ in a folder, to create a function to select files of a particular type from\
    \ a folder, to pull in a live news feed from another server, and to prompt a visitor\
    \ to download an image or PDF file rather than open it in the browser. As an added\
    \ bonus, you’ll learn how to change the time zone of a date retrieved from another\
    \ website.\n\nThis chapter covers the following subjects:\n\n- Reading and writing\
    \ files\n- Listing the contents of a folder\n- Inspecting files with the `SplFileInfo`\
    \ class\n- Controlling loops with SPL iterators\n- Using SimpleXML to extract\
    \ information from an XML file\n- Consuming an RSS feed\n- Creating a download\
    \ link\n\n## Checking that PHP Can Open a File\n\nAs I explained in the previous\
    \ chapter, PHP runs on most Linux servers as `nobody` or `apache`. Consequently,\
    \ a folder must have minimum access permissions of `755` for scripts to open a\
    \ file. To create or alter files, you normally need to set global access permissions\
    \ of `777`, the least secure setting. If PHP is configured to run in your own\
    \ name, you can be more restrictive, because your scripts can create and write\
    \ to files in any folder for which you have read, write, and execute permissions.\
    \ On a Windows server you need write permission to create or update a file. If\
    \ you need assistance with changing permissions, consult your hosting company."
  raw: '## Using the Upload Class


    The `Upload` class is simple to use—just import the namespace as described in
    “Using a namespaced class” earlier in this chapter. Include the class definition
    in your script and create an `Upload` object by passing the file path to the `upload_test`
    folder as an argument, like this:


    `$destination = ''C:/upload_test/'';`


    `$loader = new Upload($destination);`


    Caution


    The path to the upload folder must end in a trailing slash.


    By default, the class permits only images to be uploaded, but this can be overridden.
    The class has the following public methods:


    *   `setMaxSize()`: Takes an integer and sets the maximum size for each upload
    file, overriding the default 51200 bytes (50 KB). The value must be expressed
    as bytes.

    *   `getMaxSize()`: Reports the maximum size in KB formatted to one decimal place.

    *   `allowAllTypes()`: Allows any type of file to be uploaded. By default, `.upload`
    is appended as a suffix to files with filename extensions listed in the `$notTrusted`
    property. To prevent the suffix from being appended, pass `false` as an argument
    to this method.

    *   `upload()`: Saves the file(s) to the destination folder. Spaces in filenames
    are replaced by underscores. By default, files with the same name as an existing
    file are renamed by inserting a number in front of the filename extension. To
    overwrite files, pass `false` as an argument to this method.

    *   `getMessages()`: Returns an array of messages reporting the status of uploads.


    ## Points to Watch with File Uploads


    Uploading files from a web form is fairly straightforward with PHP. The main causes
    of failure are not setting the correct permissions on the upload directory or
    folder, and forgetting to move the uploaded file to its target destination before
    the end of the script. Letting other people upload files to your server, however,
    exposes you to risk. In effect, you’re allowing visitors the freedom to write
    to your server’s hard disk. It’s not something you would allow strangers to do
    on your own computer, so you should guard access to your upload directory with
    the same degree of vigilance.


    Ideally, uploads should be restricted to registered and trusted users, so the
    upload form should be in a password-protected part of your site. Also, the upload
    folder does not need to be inside your site root, so locate it in a private directory
    whenever possible unless you want uploaded material to be displayed immediately
    in your webpages. Remember, though, there is no way PHP can check that material
    is legal or decent, so immediate public display entails risks that go beyond the
    merely technical. You should also bear the following security points in mind:


    *   Set a maximum size for uploads both in the web form and on the server side.

    *   Restrict the types of uploaded files by inspecting the MIME type in the `$_FILES`
    array. Alternatively, add a suffix to the name of executable files to prevent
    them from being run remotely.

    *   Replace spaces in filenames with underscores or hyphens.

    *   Inspect your upload folder on a regular basis. Make sure there’s nothing in
    there that shouldn’t be, and do some housekeeping from time to time. Even if you
    limit file upload sizes, you may run out of your allocated space without realizing
    it.


    ## Chapter Review


    This chapter has introduced you to creating a PHP class. If you’re new to PHP
    or programming, you might have found it tough going. Don’t be disheartened. The
    `Upload` class contains more than 180 lines of code, some of it complex, although
    I hope the descriptions have explained what the code is doing at each stage. Even
    if you don’t understand all the code, the `Upload` class will save you a lot of
    time. It implements the main security measures necessary for file uploads, yet
    using it involves as little as a dozen lines of code:


    `use PhpSolutions\File\Upload;`


    `if (isset($_POST[''upload''])) {`


    `require_once ''PhpSolutions/File/Upload.php'');`


    `try {`


    `$loader = new Upload(''C:/upload_test/'');`


    `$loader->upload();`


    `$result = $loader->getMessages();`


    `} catch (Exception $e) {`


    `echo $e->getMessage();`


    `}`


    `}`


    If you found this chapter to be a struggle, come back to it later when you have
    more experience, and you should find the code easier to understand.


    In the next chapter, you’ll learn some techniques for inspecting the contents
    of files and folders, including how to use PHP to read and write text files.


    # 7. Using PHP to Manage Files


    PHP has a huge range of functions designed to work with the server’s file system,
    but finding the right one for the job isn’t always easy. This chapter cuts through
    the tangle to show you some practical uses of these functions, such as reading
    and writing text files to store small amounts of information without a database.
    Loops play an important role in inspecting the contents of the file system, so
    you’ll also explore some of the Standard PHP Library (SPL) iterators that are
    designed to make loops more efficient.


    As well as opening local files, PHP can read public files, such as news feeds,
    on other servers. News feeds are normally formatted as XML (Extensible Markup
    Language). In the past, extracting information from an XML file was a tortuous
    process, but that’s no longer the case thanks to the very aptly named SimpleXML.
    In this chapter, you’ll see how to create a drop-down menu that lists all images
    in a folder, to create a function to select files of a particular type from a
    folder, to pull in a live news feed from another server, and to prompt a visitor
    to download an image or PDF file rather than open it in the browser. As an added
    bonus, you’ll learn how to change the time zone of a date retrieved from another
    website.


    This chapter covers the following subjects:


    *   Reading and writing files

    *   Listing the contents of a folder

    *   Inspecting files with the `SplFileInfo` class

    *   Controlling loops with SPL iterators

    *   Using SimpleXML to extract information from an XML file

    *   Consuming an RSS feed

    *   Creating a download link


    ## Checking that PHP Can Open a File


    As I explained in the previous chapter, PHP runs on most Linux servers as `nobody`
    or `apache`. Consequently, a folder must have minimum access permissions of `755`
    for scripts to open a file. To create or alter files, you normally need to set
    global access permissions of `777`, the least secure setting. If PHP is configured
    to run in your own name, you can be more restrictive, because your scripts can
    create and write to files in any folder for which you have read, write, and execute
    permissions. On a Windows server you need write permission to create or update
    a file. If you need assistance with changing permissions, consult your hosting
    company.'
  trans: "\n## 使用上传类\n\n`Upload`类的使用非常简单——只需按照本章前面“使用命名空间类”中所述导入命名空间即可。在脚本中包含该类定义，并通过将文件路径作为参数传递给`upload_test`文件夹来创建一个`Upload`对象，如下所示：\n\
    \n`$destination = 'C:/upload_test/';`\n\n`$loader = new Upload($destination);`\n\
    \n> **注意：** 上传文件夹的路径必须以尾部斜杠结尾。\n\n默认情况下，该类只允许上传图像，但可以覆盖此设置。该类具有以下公共方法：\n\n- `setMaxSize()`：接受一个整数，设置每个上传文件的最大大小，覆盖默认的\
    \ 51200 字节（50 KB）。该值必须以字节表示。\n- `getMaxSize()`：报告以 KB 为单位的最大大小，格式化为一位小数。\n- `allowAllTypes()`：允许上传任何类型的文件。默认情况下，对于文件名扩展名列在`$notTrusted`属性中的文件，会追加`.upload`作为后缀。要阻止追加后缀，可向此方法传递`false`作为参数。\n\
    - `upload()`：将文件保存到目标文件夹。文件名中的空格会被替换为下划线。默认情况下，与现有文件同名的文件会通过在文件扩展名前插入一个数字来重命名。要覆盖文件，可向此方法传递`false`作为参数。\n\
    - `getMessages()`：返回一个消息数组，报告上传的状态。\n\n## 文件上传注意事项\n\n使用 PHP 从 Web 表单上传文件相当直接。失败的主要原因是没有为上传目录或文件夹设置正确的权限，以及在脚本结束前忘记将上传的文件移动到其目标位置。然而，允许其他人将文件上传到您的服务器会让您面临风险。实际上，您是在允许访问者自由写入您服务器的硬盘。您不会允许陌生人在您自己的计算机上这样做，因此您应该以同样的警惕性来保护对上传目录的访问。\n\
    \n理想情况下，上传应仅限于已注册且受信任的用户，因此上传表单应位于您网站中受密码保护的部分。此外，上传文件夹不需要位于您的网站根目录内，因此应尽可能将其放在私有目录中，除非您希望上传的内容立即显示在网页上。但请记住，PHP\
    \ 无法检查内容是否合法或得体，因此立即公开显示会带来超出纯技术层面的风险。您还应牢记以下安全要点：\n\n- 在 Web 表单和服务器端都设置上传文件的最大大小。\n\
    - 通过检查`$_FILES`数组中的 MIME 类型来限制上传文件的类型。或者，向可执行文件的名称添加后缀，以防止它们被远程运行。\n- 将文件名中的空格替换为下划线或连字符。\n\
    - 定期检查您的上传文件夹。确保里面没有不应该存在的内容，并定期进行清理。即使您限制了文件上传大小，也可能在未意识到的情况下耗尽分配的空间。\n\n## 章节回顾\n\
    \n本章向您介绍了如何创建 PHP 类。如果您是 PHP 或编程新手，可能会觉得有些困难。不要灰心。`Upload`类包含超过 180 行代码，其中一些很复杂，尽管我希望描述已经解释了代码在每个阶段的作用。即使您不理解所有代码，`Upload`类也会为您节省大量时间。它实现了文件上传所需的主要安全措施，但使用它只需十几行代码：\n\
    \n```php\nuse PhpSolutions\\File\\Upload;\n\nif (isset($_POST['upload'])) {\n\
    \    require_once 'PhpSolutions/File/Upload.php';\n\n    try {\n        $loader\
    \ = new Upload('C:/upload_test/');\n        $loader->upload();\n        $result\
    \ = $loader->getMessages();\n    } catch (Exception $e) {\n        echo $e->getMessage();\n\
    \    }\n}\n```\n\n如果您觉得本章内容比较吃力，可以在更有经验时再回来看，届时您会发现代码更容易理解。\n\n在下一章中，您将学习一些检查文件和文件夹内容的技术，包括如何使用\
    \ PHP 读写文本文件。\n\n# 7. 使用 PHP 管理文件\n\nPHP 拥有大量用于处理服务器文件系统的函数，但要找到合适的函数并不总是那么容易。本章将理清这些纷繁复杂的内容，向您展示这些函数的一些实际用途，例如读写文本文件以存储少量信息而无需数据库。循环在检查文件系统内容方面起着重要作用，因此您还将探索一些标准\
    \ PHP 库（SPL）迭代器，这些迭代器旨在提高循环效率。\n\n除了打开本地文件，PHP 还可以读取其他服务器上的公共文件，例如新闻源。新闻源通常格式化为\
    \ XML（可扩展标记语言）。在过去，从 XML 文件中提取信息是一个繁琐的过程，但由于名副其实的 SimpleXML，情况已不再如此。在本章中，您将看到如何创建一个下拉菜单来列出文件夹中的所有图像，如何创建一个函数从文件夹中选择特定类型的文件，如何从另一台服务器拉取实时新闻源，以及如何提示访问者下载图像或\
    \ PDF 文件而不是在浏览器中打开它。额外的好处是，您将学习如何更改从另一个网站获取的日期的时区。\n\n本章涵盖以下主题：\n\n- 读写文件\n- 列出文件夹中的内容\n\
    - 使用`SplFileInfo`类检查文件\n- 使用 SPL 迭代器控制循环\n- 使用 SimpleXML 从 XML 文件中提取信息\n- 消费 RSS\
    \ 源\n- 创建下载链接\n\n## 检查 PHP 能否打开文件\n\n正如我在上一章中解释的，PHP 在大多数 Linux 服务器上以`nobody`或`apache`身份运行。因此，文件夹必须具有最低访问权限`755`，脚本才能打开文件。要创建或更改文件，您通常需要设置全局访问权限`777`，这是最不安全的设置。如果\
    \ PHP 配置为以您自己的名称运行，您可以设置得更严格，因为您的脚本可以在您拥有读取、写入和执行权限的任何文件夹中创建和写入文件。在 Windows 服务器上，您需要写入权限才能创建或更新文件。如果您需要更改权限的帮助，请咨询您的主机服务商。\n"
- fmt: '### Configuration Settings that Affect File Access


    Hosting companies can impose further restrictions on file access through `php.ini`.
    To find out what restrictions have been imposed, run `phpinfo()` on your website
    and check the settings in the Core section. Table [7-1](#A978-1-4842-0635-5_7_Chapter.html#Tab1)
    lists the settings you need to check. Unless you run your own server, you normally
    have no control over these settings.


    Table 7-1. PHP configuration settings that affect file access


    | Directive | Default value | Description |

    | --- | --- | --- |

    | `allow_url_fopen` | On | Allows PHP scripts to open public files on the Internet
    |

    | `allow_url_include` | Off | Controls the ability to include remote files |


    The settings in Table [7-1](#A978-1-4842-0635-5_7_Chapter.html#Tab1) both control
    access to files through a URL (as opposed to the local file system), but there’s
    an important difference between them. The first one, `allow_url_fopen`, allows
    you to read remote files but not to include them directly in your scripts. This
    is generally safe, so the default is for it to be enabled. If `allow_url_fopen`
    is disabled on your website, you cannot access useful external data sources, such
    as news feeds and public XML documents.


    On the other hand, `allow_url_include` lets you include remote files directly
    in your scripts. This is a major security risk, so the default is for `allow_url_include`
    to be disabled.


    **Tip**: If your hosting company has disabled `allow_url_fopen`, ask for it to
    be enabled. Otherwise, you won’t be able to use PHP Solution 7-5. But don’t get
    the names mixed up: `allow_url_include` should always be turned off in a hosting
    environment.


    Prior to PHP 5.4, some servers placed restrictions on access to local files. These
    restrictions have now been removed. Access to files on the local file system is
    controlled by the permissions set on each file and folder.


    ### Creating a File Storage Folder for Local Testing


    Storing data inside your site root is highly insecure, particularly if you need
    to set global access permissions on the folder. If you have access to a private
    folder outside the site root, create your data store as a subfolder and give it
    the necessary permissions.


    For the purposes of this chapter, I suggest that Windows users create a folder
    called `private` on their C drive.


    Mac users should create a `private` folder inside their home folder. If necessary,
    set Read & Write permissions in the folder’s info panel as described in the previous
    chapter.


    If you’re testing on Linux, you also need to make sure the web server has read
    and write permissions for the `private` folder.


    ## Reading and Writing Files


    The ability to read and write files has a wide range of applications. For example,
    you can open a file on another website, read the contents into your server’s memory,
    extract information using string and XML manipulation functions, and then write
    the results to a local file. You can also query a database on your own server
    and output the data as a text or CSV (comma-separated values) file. You can even
    generate files in Open Document Format or as Microsoft Excel spreadsheets. But
    first, let’s look at the basic operations.


    **Tip**: If you subscribe to the lynda.com Online Training Library, you can learn
    how to export data from a database to various formats, such as Microsoft Excel
    and Word, in my Exporting Data to Files with PHP course ( [`www.lynda.com/PHP-tutorials/Exporting-Data-Files-PHP/158375-2.html`](http://www.lynda.com/PHP-tutorials/Exporting-Data-Files-PHP/158375-2.html)
    ).


    ### Reading Files in a Single Operation


    PHP has three functions that read the contents of a text file in a single operation.


    *   `readfile()` opens a file and directly outputs its contents.

    *   `file_get_contents()` reads the whole contents of a file into a single string
    but doesn’t generate direct output.

    *   `file()` reads each line into an array.


    #### PHP Solution 7-1: Getting the Contents of a Text File


    This PHP solution demonstrates the difference between using `readfile()`, `file_get_contents()`,
    and `file()` to access the contents of a file.


    Copy `sonnet.txt` to your `private` folder. It’s a text file that contains Shakespeare’s
    Sonnet 116. Create a new folder called `filesystem` in your `phpsols` site root,
    then create a PHP file called `get_contents.php` in the new folder. Insert the
    following code inside a PHP block ( `get_contents_01.php` in the `ch07` folder
    shows the code embedded in a webpage, but you can use just the PHP code for testing
    purposes):


    ```

    readfile(''C:/private/sonnet.txt'');

    ```


    If you’re on a Mac, amend the path name like this, using your own Mac username:


    ```

    readfile(''/Users/username/private/sonnet.txt'');

    ```


    If you’re testing on Linux or on a remote server, amend the path name accordingly.


    **Note**: For brevity, the remaining examples in this chapter show only the Windows
    path name.


    Save `get_contents.php` and view it in a browser. You should see something similar
    to the following screenshot. The browser ignores the line breaks in the original
    text and displays Shakespeare’s sonnet as a solid block.


    ![A978-1-4842-0635-5_7_Figa_HTML.jpg](A978-1-4842-0635-5_7_Figa_HTML.jpg)


    **Tip**: If you see an error message, check that you typed the code correctly
    and that the correct file and folder permissions have been set on a Mac or Linux.


    PHP has a function called `nl2br()` that converts newline characters to `<br/>`
    tags. Change the code in `get_contents.php` like this (it’s in `get_contents_02.php`):


    ```

    nl2br(readfile(''C:/private/sonnet.txt''));

    ```


    **Note**: `nl2br()` inserts a trailing slash before the closing angle bracket
    of `<br/>` for compatibility with XHTML. The trailing slash is optional in HTML5.
    Both `<br/>` and `<br>` are valid.


    Save `get_contents.php` and reload it in your browser. The output is still a solid
    block of text. When you pass one function as an argument to another one like this,
    the result of the inner function is normally passed to the outer one, performing
    both operations in a single expression. So, you would expect the file’s contents
    to be passed to `nl2br()` before being displayed in the browser. However, `readfile()`
    outputs the file’s contents immediately. By the time it’s finished, there’s nothing
    for `nl2br()` to insert `<br/>` tags into. The text is already in the browser.


    **Note**: When two functions are nested like this, the inner function is executed
    first, and the outer function processes the result. But the return value of the
    inner function needs to be meaningful as an argument to the outer function. The
    return value of `readfile()` is the number of bytes read from the file. Even if
    you add `echo` at the beginning of the line, all you get is 594 added to the end
    of text. Nesting functions doesn’t work in this case, but it’s often a very useful
    technique, avoiding the need to store the result of the inner function in a variable
    before processing it with another function.


    Instead of `readfile()`, you need to use `file_get_contents()` to convert the
    newline characters to `<br/>` tags. Whereas `readfile()` simply outputs the content
    of a file, `file_get_contents()` returns the contents of a file as a single string.
    It’s up to you to decide what to do with it. Amend the code like this (or use
    `get_contents_03.php`):


    ```

    echo nl2br(file_get_contents(''C:/private/sonnet.txt''));

    ```


    Reload the page in a browser. Each line of the sonnet is now on a line of its
    own.


    ![A978-1-4842-0635-5_7_Figb_HTML.jpg](A978-1-4842-0635-5_7_Figb_HTML.jpg)


    The advantage of `file_get_contents()` is that you can assign the file contents
    to a variable and process it in some way before deciding what to do with it. Change
    the code in `get_contents.php` like this (or use `get_contents_04.php`) and load
    the page into a browser:


    ```

    $sonnet = file_get_contents(''C:/private/sonnet.txt'');

    // replace new lines with spaces

    $words = str_replace("\r\n", '' '', $sonnet);

    ```'
