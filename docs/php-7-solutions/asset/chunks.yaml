    PHP解决方案9-5：重命名重复文件

    默认情况下，如果上传的文件与上传文件夹中已有的文件名相同，PHP会覆盖现有文件。此PHP解决方案通过添加选项，在文件名冲突时，在文件扩展名前插入一个数字来改进Upload类。它还会将文件名中的空格替换为下划线，因为空格有时会导致问题。


