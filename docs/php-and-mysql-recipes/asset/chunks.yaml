    # 设置 `X-` 标头后，PHP 代码可以结束，Web 服务器将接管并向用户提供所选文件。如果文件缺失或服务器缺少相应配置，Web 服务器将返回 `404
    – file not found` 状态码。


    ## 方案 7-8. 目录


    ### 问题


    正如我们所见，在文件系统中，文件和目录并没有太大区别。它们都通过相对路径或绝对路径来标识。大多数用于获取状态或检查特定类型的函数都同样适用于文件和目录，但我们如何创建、移动和删除目录呢？


    ### 解决方案


    使用 `mkdir()` 函数可以创建目录。此函数最多接受四个参数，其中第一个参数是新目录的相对或绝对路径，第二个参数是文件权限或模式，其格式与之前描述的
    `chmod()` 函数相同。第三个参数是一个布尔标志，用于指示是否启用递归功能，可用来创建嵌套目录。无需多次调用 `mkdir()`，只需提供一个路径，如果设置了递归标志，该函数将创建指定路径中所有尚未存在的目录。第四个参数是上下文（context），仅在该函数与流一起使用时才生效。


    要删除目录，需使用 `rmdir()` 函数。在调用此函数之前，请确保目录为空。


    ### 工作原理


    在大多数情况下，网站并不需要创建新目录。其设计初衷是为已位于服务器上的内容提供服务。如果你正在构建一个支持用户之间交换文件或允许用户上传图片的系统，你可能希望为每个用户创建一个目录。这样便于追踪文件来源，并避免一个用户覆盖其他用户的文件。你的应用程序甚至可以允许用户自行创建目录来对文件进行分组。


    一个用于创建目录的简单脚本可能如下所示：


    ```php

    <?php


    // 7_18.php


    // 在此处执行访问控制


    mkdir(''MyFiolder'', 0700);

    ```


    创建完成完整路径所需的所有目录的脚本如下：


    ```php

    <?php


    // 7_19.php


    // 在此处执行访问控制


    mkdir(''path/to/MyFiolder'', 0700, true);

    ```


    在这个例子中，第三个参数表示系统应创建所有缺失的目录。此脚本将首先在脚本所在位置旁边创建一个名为 `path` 的目录，随后在 `path` 目录内创建一个名为
    `to` 的目录，最后在 `to` 目录内创建名为 `MyFolder` 的目录。所有这三个目录的权限均为：所有者拥有 `rwx` 权限，组用户和其他用户没有任何权限。


    第二次运行此脚本将会产生一个警告，这是因为名为 `''MyFolder''` 的最终目录已经存在。当仅存在 `''path''` 和 `''path/to''`
    目录时运行该脚本，则不会产生任何警告。


    ## 方案 7-9. CSV 文件


    ### 问题


    如果你要处理大型数据集，将数据导出为能被 Microsoft Excel 等程序读取的格式可能会很有用；或者你可能从其他系统接收使用逗号分隔值（CSV）格式的数据。因此，需要能够基于用户提供的参数（例如用于过滤数据等），使用
    PHP 创建或解析 CSV 文件。


    ### 解决方案


    `fgetcsv()` 和 `fputcsv()` 函数用于读取或写入 CSV 文件。这些函数操作由 `fopen()` 函数创建的文件句柄，并且在读取或写入之前，需要以正确的读取或写入模式打开文件。


    ### 工作原理


    从一个数据数组（例如数据库查询的结果集，其中每行包含相同数量的列）创建一个 `.csv` 文件，可能如下所示：


    ```php

    <?php


    // 7_20.php


    $data = [


    [''orange'', 10],


    [''blood orange'', 10],


    [''apple'', 25],


    [''pineapple'', 1]


    ];


    $fp = fopen(''fruits.csv'', ''wt'');


    if ($fp) {


    foreach($data as $fruit) {


    fputcsv($fp, $fruit);


    }


    fclose($fp);


    }

    ```

