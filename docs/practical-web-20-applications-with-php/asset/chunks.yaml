    **What Is Web 2.0?**


    So exactly what defines a web site as being “Web 2.0”? There are many different
    opinions on this, making it difficult to pinpoint an exact definition; however,
    some of the features typically associated with Web 2.0 sites are as follows:


    • **Using standards-compliant HTML and CSS.** This allows sites to work across
    many platforms and helps with accessibility. This includes the use of microformats
    to generate friendly HTML that can be used across a variety of platforms (as we
    will see in Chapter 10).


    • **Using Ajax to provide a rich user interface.** By performing trivial operations
    in the background using XMLHttpRequest, web pages can be more functional and intuitive.


    ■**Note** XMLHttpRequest is a JavaScript API that allows a background HTTP request
    to occur while a user is viewing a web page. This means that the current page
    can be updated based on a response from the server without the user navigating
    to another page on the web site. The phrase “making an Ajax request”


    (or similar) typically refers to performing an HTTP request in the background
    using XMLHttpRequest.


    • **Sharing data using web feeds and web services.** Users like to aggregate many
    feeds to easily receive content updates from their favorite sites using web feeds
    (such as RSS or Atom). Additionally, web services can enable one site to use data
    from other sites (for instance, we will display maps on our site using Google
    Maps).


    • **Incorporating social networking tools.** Blogs and forums can enable users
    to commu-nicate with each other.


    While none of these features or aspects of development are new, we use the Web
    2.0 term to describe the current generation of web sites that make good use of
    HTML and CSS while perhaps improving their interface with Ajax and social-networking
    tools. These are sites that


    “do things right.” However, that’s not to say that a site that uses any of these
    features is necessarily a good site.


    **Database Connectivity**


    In this application, we will need to save a number of different types of data,
    including


    • User accounts


    • User settings


    • User-submitted data (such as blog posts, images, tags)


    We will make use of a database abstraction layer to insert, update, and delete
    data from the database. This allows us to develop PHP code that will work regardless
    of the type of underlying database server. Within this book we will make use of
    MySQL, but if you want to use PostgreSQL


    instead, it would simply be a matter of changing the application’s database connection
    settings.


