    Type Conversions


    PHP will automatically convert a variable’s data type as necessary given the context
    in which it is used. For this reason explicit type conversions are seldom required.
    Nonetheless, the type of a variable or expression may be changed by performing
    an explicit type cast.


    Explicit casts


    An explicit cast is performed by placing the desired data type in parentheses
    before the variable or value that is to be evaluated. In the example below, the
    explicit cast forces the bool variable to be evaluated as an int.


    ```

    $myBool = false;

    $myInt = (int)$myBool; // 0

