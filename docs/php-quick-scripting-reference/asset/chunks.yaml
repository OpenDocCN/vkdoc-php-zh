    CHAPTER 14


    ![image](images/frontdot.jpg)


    Interface


    An interface specifies methods that classes using the interface must implement.
    They are defined with the `interface` keyword followed by a name and a code block.
    Their naming convention is to start with a small “i” and then to have each word
    initially capitalized.


    ```

    interface iMyInterface {}

    ```


    Interface signatures


    The code block for an interface can contain signatures for instance methods. These
    methods cannot have any implementations. Instead, their bodies are replaced by
    semicolons. Interface methods must always be public.


    ```

    interface iMyInterface

    {

      public function myMethod();

    }

    ```


    Additionally, interfaces may define constants. These interface constants behave
    just as class constants, except that they cannot be overridden.


    ```

    interface iMyInterface

    {

      const PI = 3.14;

    }

    ```


    An interface may not inherit from a class, but it may inherit from another interface,
    which effectively combines the interfaces into one.


    ```

    interface i1 {}

    interface i2 extends i1 {}

    ```


    Interface example


    The example below shows an interface called iComparable, which has a single method
    named Compare. Note that this method makes use of type hinting to make sure that
    the method is called with the correct type. This functionality will be covered
    in a later chapter.


    ```

    interface iComparable

    {

      public function compare(iComparable $o);

    }

    ```


    The Circle class implements this interface, by using the `implements` keyword
    after the class name followed by the interface name. If the class also has an
    extends clause, the implements clause needs to be placed after it. Bear in mind
    that although a class can only inherit from one parent class it may implement
    any number of interfaces, by specifying them in a comma separated list.


    ```

    class Circle implements iComparable

    {

      public $r;

    }

    ```


    Because `Circle` implements `iComparable` it must define the compare() method.
    For this class the method will return the difference between the circle radiuses.
    The implemented method must be public, in addition to having the same signature
    as the method defined in the interface. It may also have more parameters, as long
    as they are optional.


    ```

    class Circle implements iComparable

    {

      public $r;


    public function compare(iComparable $o)

      {

        return $this->r - $o->r;

      }

    }

    ```


    Interface usages


    Interfaces allow for multiple inheritance of class design without the complications
    associated with allowing multiple inheritance of functionality. The main benefit
    of requiring a specific class design can be seen with the iComparable interface,
    which defines a specific functionality that classes can share. It allows developers
    to use interface members without having to know the actual type of a class. To
    illustrate, the example below shows a simple method that takes two iComparable
    objects and returns the largest one.


    ```

    function largest(iComparable $a, iComparable $b)

    {

      return ($a->compare($b) > 0) ? $a : $b;

    }

    ```


    This method will work for any two objects of the same type that implement the
    iComparable interface. It will work regardless of what type the objects are since
    the method only uses the functionality exposed through that interface.


    Interface guideline


    An interface provides a design for a class without any implementation. It is a
    contract by which classes that implement it agree to provide certain functionality.
    This has two benefits. First, it provides a way to make sure developers implement
    certain methods. Second, because these classes are guaranteed to have certain
    methods, they can be used even without knowing the class’s actual type, which
    allows the code to be more flexible.


    CHAPTER 15


    ![image](images/frontdot.jpg)


    Abstract


    An abstract class provides a partial implementation that other classes can build
    upon. When a class is declared as abstract it means that the class can contain
    incomplete methods that must be implemented in child classes, in addition to normal
    class members.


    Abstract methods


    In an abstract class any method can be declared abstract. These methods are then
    left unimplemented and only their signatures are specified, while their code blocks
    are replaced by semicolons.


    ```

    abstract class Shape

    {

      abstract public function myAbstract();

    }

    ```


    Abstract example


    To give an example, the class below has two properties and an abstract method.


    ```

    abstract class Shape

    {

      private $x = 100, $y = 100;

      abstract public function getArea();

    }

    ```


    If a class inherits from this abstract class it is then forced to override the
    abstract method. The method signature must match, except for the access level
    which can be made less restricted.


    ```


    class Rectangle extends Shape

    {

      public function getArea()

      {

        return $this->x * $this->y;

      }

    }

    ```


    It is not possible to instantiate an abstract class. They serve only as parents
    for other classes, partly dictating their implementation.


    ```

    $s = new Shape(); // compile-time error

    ```


    However, an abstract class may inherit from a non-abstract (concrete) class.


    ```

    class NonAbstract {}

    abstract class MyAbstract extends NonAbstract {}

    ```


    Abstract classes and interfaces


    Abstract classes are in many ways similar to interfaces. They can both define
    member signatures that the deriving classes must implement, and neither one of
    them can be instantiated. The key differences are first that the abstract class
    can contain non-abstract members, while the interface cannot. Second, a class
    can implement any number of interfaces but only inherit from one class, abstract
    or not.


    ```

    // Defines default functionality and definitions

    abstract class Shape

    {

      public $x = 100, $y = 100;

      abstract public function getArea();

    }

    // Class is a Shape

    class Rectangle extends Shape { /*...*/ }


    // Defines a specific functionality

    interface iComparable

    {

      function compare();

    }

    // Class can be compared

    class MyClass implements iComparable { /*...*/ }

    ```


    Abstract guideline


    An abstract class provides a partially implemented base class that dictates how
    child classes must behave. They are most useful when child classes share some
    similarities, but differ in other implementations that child classes are required
    to define. Just like interfaces, abstract classes are useful constructs in object-oriented
    programming that help developers follow good coding standards.


    CHAPTER 16


    ![image](images/frontdot.jpg)


    Traits


    A trait is a group of methods that can be inserted into classes. They were added
    in PHP 5.4 to enable greater code reuse without the added complexity that comes
    from allowing multiple-inheritance. Traits are defined with the `trait` keyword
    followed by a name and a code block. The naming convention is the same as for
    classes, with each word initially capitalized. The code block may only contain
    static and instance methods.


    ```

    trait PrintFunctionality

    {

      public function myPrint() { echo ''Hello''; }

    }

    ```


    Classes that need the functionality that a trait provides can include it with
    the `use` keyword followed by the trait’s name. The trait’s methods will then
    behave just as if they had been directly defined in that class.


    ```

    class MyClass

    {

      // Insert trait methods

      use PrintFunctionality;

    }


    $o = new MyClass();

    $o->myPrint(); // "Hello"

    ```


    A class may use multiple traits by placing them in a comma-separated list. Similarly,
    a trait may be composed from one or more other traits.


    Inheritance and traits


    Trait methods will override inherited methods. Likewise, methods defined in the
    class will override methods inserted by a trait.


    ```

    class MyParent

    {

      public function myPrint() { echo ''Base''; }

    }


    class MyChild extends MyParent

    {

      // Overrides inherited method

      use PrintFunctionality;'
