- fmt: '# Moving to Local Development


    The first improvement we’re going to make to our development workflow is to move
    where we edit our theme files from the online editor to a local machine. Getting
    a copy of our current theme’s files is straightforward. From the Themes section
    of your store’s admin, use the Actions dropdown and select Download theme file
    (see Figure [2-1](#A437216_1_En_2_Chapter.html#Fig1)).


    ![A437216_1_En_2_Fig1_HTML.jpg](A437216_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Downloading the current theme as a .`zip` file


    Shopify will e-mail you a download link, which you can fetch, unzip, and move
    to a working directory, as in Listing [2-1](#A437216_1_En_2_Chapter.html#Par13).


    ```

    $ unzip ~/Downloads/example-theme.zip -d /projects/example-theme

    $ cd /projects/example-theme

    $ ls

    assets        config        layout        locales

    sections      snippets     templates

    Listing 2-1

    Unzipping a Downloaded Theme File and Viewing Its Contents from the Command Line

    ```


    Now that we have a copy of the theme files locally, we’re able to use a text editor
    or IDE of choice to develop the theme. There’s no one “best” choice for an editor
    or toolset; really, it’s up to you and what you’re familiar or comfortable with.
    If you’re stuck for ideas, popular editors include Vim, Sublime Text, and Atom.


    **Tip**


    If your editor of choice supports plugins or syntax extensions, make sure you
    check to see if one for the Liquid templating language is available, as it will
    make working with Shopify theme files a much more pleasant experience. If you
    can’t find anything to support Liquid specifically, you can try finding an extension
    that supports Twig (an alternate templating language with syntax very similar
    to Liquid) and associating `.liquid` files with it in your editor.


    ## Synchronizing Changes to Shopify


    Being able to make changes in our own editor is nice and solves the first few
    issues identified at the start of the chapter. However, now we have another problem:
    how do we push any changes we make on our local files back to our Shopify store?


    We could copy and paste the contents of your changed files from our local environment
    to the online web editor, but that hardly seems like an improvement. We could
    also zip up the theme directory and upload the .`zip` file through the Shopify
    admin, but that would be a pain if we needed to do it every time we made a change.


    ### Introducing Theme Kit


    The solution to this problem is Theme Kit ( [`https://github.com/Shopify/themekit`](https://github.com/Shopify/themekit)
    ), a small command-line utility built and maintained by Shopify. Because it’s
    built as a simple, single cross-platform binary, developers can use it regardless
    of the platform they’re working on. (Theme Kit was built as a replacement for
    the previous solution, the `shopify_theme` gem. It performed a similar function
    but required users to have a working copy of Ruby operating on their local machines.)


    I’ll leave the download and setup instructions for different platforms to Theme
    Kit’s thorough documentation (found at [`https://shopify.github.io/themekit`](https://shopify.github.io/themekit)
    ), but once it’s set up, it will let you download and upload theme files from
    the command line, as seen in Listing [2-2](#A437216_1_En_2_Chapter.html#Par20).
    Even better, you can use it to watch a theme directory and automatically upload
    changed files as they are saved, as seen in Listing [2-3](#A437216_1_En_2_Chapter.html#Par21).


    ```

    $ cd /projects

    $ mkdir /projects/example-theme

    $ cd ./example-theme

    $ theme configure --store example.myshopify.com --password 905bbb49ee10d0eb9c7b380183b2bc43
    --themeid 74729482

    $ theme download layout/theme.liquid

    [development]: 1 / 1 [================] 100 %

    (... edit layout/theme.liquid ...)

    $ theme upload layout/theme.liquid

    [development]: 1 / 1 [================] 100 %

    Listing 2-2

    Command-Line Example Showing Theme Kit Configuration and Download/Upload Flow

    ```


    ```

    $ cd /projects/example-theme

    $ theme watch

    [development] Watching for changes on host example.myshopify.com

    [development] Received Update event of layout/theme.liquid

    [development] Successfully performed Update operation for file layout/theme.liquid
    to example.myshopify.com

    Listing 2-3

    Command-Line Example Showing Theme Kit Watching a Theme Directory for Changes
    and Uploading Them to Shopify Automatically

    ```


    ### Using Theme Kit


    With Theme Kit set up and watching our files for changes, we can use the local
    text editor or IDE to manage and edit the theme files, then switch over to the
    browser and refresh to see the changes. It’s not the most ideal workflow for web
    development (and can seem a bit clunky when compared with some modern web development
    workflows that allow automated and instant “hot reloading” of code in the browser),
    but it has a short enough feedback cycle to be practical for day-to-day development.


    A couple of things to note about Theme Kit:


    *   It stores all configuration details (store URL, API credentials, etc.) in
    a file called `config.yml`. This file allows for the definition of different “environments”
    (e.g., development, staging, and production) to aid the process of updating multiple
    themes from a single theme directory.

    *   Using Theme Kit, we can skip the .`zip` file download step to get started
    working on an existing theme, just by running the theme configuration step and
    running `theme download` without any arguments from the command line.

    *   You’re able to work on and preview themes that aren’t currently published
    on a Shopify store (a recommended practice for sites actively being used by customers).
    You can do this by finding the ID of the unpublished theme in the Shopify Admin
    (Theme Kit’s documentation has instructions on how to do this), setting it in
    `config.yml`, and running `theme open` to preview the theme in your default browser.


    ## Putting Your Theme Under Version Control


    If you’re not doing it already, the biggest takeaway from this lesson should be
    this: use a version control system (such as Git or Mercurial) when developing
    your themes. If you’re not familiar with VCSes, the Git book provides a great
    overview at [`https://git-scm.com/book/en/v2/Getting-Started-About-Version-Control`](https://git-scm.com/book/en/v2/Getting-Started-About-Version-Control).


    In the context of Shopify themes, version control:


    *   Stops you from making mistakes in your theme’s codebase that can’t be recovered
    from

    *   Makes it easier for teams to work on a theme together

    *   Keeps track of the work that’s been done on your theme (and who’s done it)

    *   Lets you experiment with new features on “feature” or “topic” branches, which
    can be tested without affecting your production code

    *   Provides a means to simplify the deployment of your themes in conjunction
    with a deployment tool (you’ll see how this works in Chapter [11](#A437216_1_En_11_Chapter.html))


    After you start using revision control for a little while, you’ll also notice
    that the way you start thinking about your development process changes. You’ll
    find yourself thinking about changes to your theme’s codebase in terms of small,
    atomic chunks that are easily comprehensible to yourself, your teammates, and
    future developers. You can also take advantage of the wide range of tools and
    services in the version control ecosystem, such as GitHub, GitLab, or Bitbucket
    for code hosting, or tools like GitX for code review (see Figure [2-2](#A437216_1_En_2_Chapter.html#Fig2)).


    ![A437216_1_En_2_Fig2_HTML.jpg](A437216_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    GitX, a visual Git diff tool, gives an overview of the theme’s history and changes'
  raw: '## Moving to Local Development


    The first improvement we’re going to make to our development workflow is to move
    where we edit our theme files from the online editor to a local machine. Getting
    a copy of our current theme’s files is straightforward. From the Themes section
    of your store’s admin, use the Actions dropdown and select Download theme file
    (see Figure [2-1](#A437216_1_En_2_Chapter.html#Fig1)).


    ![A437216_1_En_2_Fig1_HTML.jpg](A437216_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Downloading the current theme as a .zip file


    Shopify will e-mail you a download link, which you can fetch, unzip, and move
    to a working directory, as in Listing [2-1](#A437216_1_En_2_Chapter.html#Par13).


    ```

    $ unzip ~/Downloads/example-theme.zip -d /projects/example-theme

    $ cd /projects/example-theme

    $ ls

    assets        config        layout        locales

    sections      snippets     templates

    Listing 2-1

    Unzipping a Downloaded Theme File and Viewing Its Contents from the Command Line

    ```


    Now that we have a copy of the theme files locally, we’re able to use a text editor
    or IDE of choice to develop the theme. There’s no one “best” choice for an editor
    or toolset; really, it’s up to you and what you’re familiar or comfortable with.
    If you’re stuck for ideas, popular editors include Vim, Sublime Text, and Atom.


    Tip


    If your editor of choice supports plugins or syntax extensions, make sure you
    check to see if one for the Liquid templating language is available, as it will
    make working with Shopify theme files a much more pleasant experience. If you
    can’t find anything to support Liquid specifically, you can try finding an extension
    that supports Twig (an alternate templating language with syntax very similar
    to Liquid) and associating `.liquid` files with it in your editor.


    ### Synchronizing Changes to Shopify


    Being able to make changes in our own editor is nice and solves the first few
    issues identified at the start of the chapter. However, now we have another problem:
    how do we push any changes we make on our local files back to our Shopify store?


    We could copy and paste the contents of your changed files from our local environment
    to the online web editor, but that hardly seems like an improvement. We could
    also zip up the theme directory and upload the .`zip` file through the Shopify
    admin, but that would be a pain if we needed to do it every time we made a change
    .


    #### Introducing Theme Kit


    The solution to this problem is Theme Kit ( [`https://github.com/Shopify/themekit`](https://github.com/Shopify/themekit)
    ), a small command-line utility built and maintained by Shopify. Because it’s
    built as a simple, single cross-platform binary, developers can use it regardless
    of the platform they’re working on. (Theme Kit was built as a replacement for
    the previous solution, the `shopify_theme` gem. It performed a similar function
    but required users to have a working copy of Ruby operating on their local machines.)


    I’ll leave the download and setup instructions for different platforms to Theme
    Kit’s thorough documentation (found at [`https://shopify.github.io/themekit`](https://shopify.github.io/themekit)
    ), but once it’s set up, it will let you download and upload theme files from
    the command line, as seen in Listing [2-2](#A437216_1_En_2_Chapter.html#Par20).
    Even better, you can use it to watch a theme directory and automatically upload
    changed files as they are saved, as seen in Listing [2-3](#A437216_1_En_2_Chapter.html#Par21).


    ```

    $ cd /projects

    $ mkdir /projects/example-theme

    $ cd ./example-theme

    $ theme configure --store example.myshopify.com --password 905bbb49ee10d0eb9c7b380183b2bc43
    --themeid 74729482

    $ theme download layout/theme.liquid

    [development]: 1 / 1 [================] 100 %

    (... edit layout/theme.liquid ...)

    $ theme upload layout/theme.liquid

    [development]: 1 / 1 [================] 100 %

    Listing 2-2

    Command-Line Example Showing Theme Kit Configuration and Download/Upload Flow

    ```


    ```

    $ cd /projects/example-theme

    $ theme watch

    [development] Watching for changes on host example.myshopify.com

    [development] Received Update event of layout/theme.liquid

    [development] Successfully performed Update operation for file layout/theme.liquid
    to example.myshopify.com

    Listing 2-3

    Command-Line Example Showing Theme Kit Watching a Theme Directory for Changes
    and Uploading Them to Shopify Automatically

    ```


    #### Using Theme Kit


    With Theme Kit set up and watching our files for changes, we can use the local
    text editor or IDE to manage and edit the theme files, then switch over to the
    browser and refresh to see the changes. It’s not the most ideal workflow for web
    development (and can seem a bit clunky when compared with some modern web development
    workflows that allow automated and instant “hot reloading” of code in the browser),
    but it has a short enough feedback cycle to be practical for day-to-day development.


    A couple of things to note about Theme Kit:


    *   It stores all configuration details (store URL, API credentials, etc.) in
    a file called `config.yml`. This file allows for the definition of different “environments”
    (e.g., development, staging, and production) to aid the process of updating multiple
    themes from a single theme directory.

    *   Using Theme Kit, we can skip the .`zip` file download step to get started
    working on an existing theme, just by running the theme configuration step and
    running `theme download` without any arguments from the command line.

    *   You’re able to work on and preview themes that aren’t currently published
    on a Shopify store (a recommended practice for sites actively being used by customers).
    You can do this by finding the ID of the unpublished theme in the Shopify Admin
    (Theme Kit’s documentation has instructions on how to do this), setting it in
    `config.yml`, and running `theme open` to preview the theme in your default browser
    .


    ## Putting Your Theme Under Version Control


    If you’re not doing it already, the biggest takeaway from this lesson should be
    this: use a version control system (such as Git or Mercurial) when developing
    your themes. If you’re not familiar with VCSes, the Git book provides a great
    overview at [`https://git-scm.com/book/en/v2/Getting-Started-About-Version-Control`](https://git-scm.com/book/en/v2/Getting-Started-About-Version-Control)
    .


    In the context of Shopify themes, version control:


    *   Stops you from making mistakes in your theme’s codebase that can’t be recovered
    from

    *   Makes it easier for teams to work on a theme together

    *   Keeps track of the work that’s been done on your theme (and who’s done it)

    *   Lets you experiment with new features on “feature” or “topic” branches, which
    can be tested without affecting your production code

    *   Provides a means to simplify the deployment of your themes in conjunction
    with a deployment tool (you’ll see how this works in Chapter [11](#A437216_1_En_11_Chapter.html))


    After you start using revision control for a little while, you’ll also notice
    that the way you start thinking about your development process changes. You’ll
    find yourself thinking about changes to your theme’s codebase in terms of small,
    atomic chunks that are easily comprehensible to yourself, your teammates, and
    future developers. You can also take advantage of the wide range of tools and
    services in the version control ecosystem, such as GitHub, GitLab, or Bitbucket
    for code hosting, or tools like GitX for code review (see Figure [2-2](#A437216_1_En_2_Chapter.html#Fig2)).


    ![A437216_1_En_2_Fig2_HTML.jpg](A437216_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    GitX, a visual Git diff tool, gives an overview of the theme’s history and changes'
  trans: '

    # 迁移至本地开发环境


    我们对开发工作流程的第一项改进，就是将主题文件的编辑地点从在线编辑器迁移到本地机器。获取当前主题文件副本的操作很简单。在商店后台的“主题”板块，使用“操作”下拉菜单并选择“下载主题文件”（见图
    2-1）。


    ![A437216_1_En_2_Fig1_HTML.jpg](img/A437216_1_En_2_Fig1_HTML.jpg)


    图 2-1


    将当前主题下载为 `.zip` 文件


    Shopify 会通过电子邮件向您发送一个下载链接。您可以获取该链接，解压缩文件，并将其移动到一个工作目录中，如代码清单 2-1 所示。


    ```

    $ unzip ~/Downloads/example-theme.zip -d /projects/example-theme

    $ cd /projects/example-theme

    $ ls

    assets        config        layout        locales

    sections      snippets     templates

    代码清单 2-1

    在命令行中解压已下载的主题文件并查看其内容

    ```


    现在我们在本地有了主题文件的副本，就可以使用文本编辑器或自己偏好的 IDE 来开发主题了。编辑器或工具集没有唯一的“最佳”选择；实际上，这完全取决于您个人，取决于您熟悉或舒适的工具。如果您暂无头绪，流行的编辑器包括
    Vim、Sublime Text 和 Atom。


    **提示**


    如果您偏好的编辑器支持插件或语法扩展，请务必检查是否有适用于 Liquid 模板语言的扩展。这将极大地提升您处理 Shopify 主题文件的体验。如果找不到专门支持
    Liquid 的扩展，您可以尝试寻找支持 Twig（一种语法与 Liquid 非常相似的替代模板语言）的扩展，并在编辑器中将其与 `.liquid` 文件关联。


    ## 将更改同步到 Shopify


    能够在自己的编辑器中修改代码固然很好，这解决了本章开头提到的前几个问题。然而，现在我们又遇到了另一个问题：如何将我们在本地文件中所做的任何更改推送回我们的
    Shopify 商店？


    我们可以将更改后的文件内容从本地环境复制粘贴到在线网页编辑器，但这似乎算不上改进。我们也可以将主题目录打包成 `.zip` 文件，然后通过 Shopify
    后台上传，但如果每次修改都需要这样做，那将非常麻烦。


    ### 介绍 Theme Kit


    解决这个问题的方案是 Theme Kit ( [`https://github.com/Shopify/themekit`](https://github.com/Shopify/themekit)
    )，这是一个由 Shopify 构建和维护的小型命令行工具。由于它被构建为简单的、单一的跨平台二进制文件，开发者无论使用什么平台都可以使用它。（Theme
    Kit 是作为之前解决方案 `shopify_theme` gem 的替代品而构建的。它执行类似的功能，但要求用户在其本地机器上有一个可运行的 Ruby 环境。）


    关于不同平台的下载和安装说明，我将留给 Theme Kit 详尽的文档（位于 [`https://shopify.github.io/themekit`](https://shopify.github.io/themekit)
    ）。但一旦设置完成，它就能让您从命令行下载和上传主题文件，如代码清单 2-2 所示。更棒的是，您可以使用它来监视一个主题目录，并在文件保存时自动上传更改后的文件，如代码清单
    2-3 所示。


    ```

    $ cd /projects

    $ mkdir /projects/example-theme

    $ cd ./example-theme

    $ theme configure --store example.myshopify.com --password 905bbb49ee10d0eb9c7b380183b2bc43
    --themeid 74729482

    $ theme download layout/theme.liquid

    [development]: 1 / 1 [================] 100 %

    (... 编辑 layout/theme.liquid ...)

    $ theme upload layout/theme.liquid

    [development]: 1 / 1 [================] 100 %

    代码清单 2-2

    命令行示例，展示 Theme Kit 的配置及下载/上传流程

    ```


    ```

    $ cd /projects/example-theme

    $ theme watch

    [development] 正在监听主机 example.myshopify.com 上的更改

    [development] 收到 layout/theme.liquid 的更新事件

    [development] 成功对文件 layout/theme.liquid 执行更新操作，已上传至 example.myshopify.com

    代码清单 2-3

    命令行示例，展示 Theme Kit 监视主题目录的更改并自动上传到 Shopify

    ```


    ### 使用 Theme Kit


    设置好 Theme Kit 并让它监视我们的文件更改后，我们就可以使用本地文本编辑器或 IDE 来管理和编辑主题文件，然后切换到浏览器并刷新以查看更改。对于
    Web 开发来说，这并非最理想的工作流程（与一些允许在浏览器中自动、即时“热重载”代码的现代 Web 开发工作流程相比，它可能显得有些笨拙），但它的反馈循环足够短，足以应用于日常开发。


    关于 Theme Kit 需要注意的几点：


    *   它将所有配置细节（商店 URL、API 凭据等）存储在一个名为 `config.yml` 的文件中。此文件允许定义不同的“环境”（例如，开发、预发布和生产），以方便从单个主题目录更新多个主题。

    *   使用 Theme Kit，我们可以跳过 `.zip` 文件下载步骤来开始处理现有主题，只需运行主题配置步骤，然后从命令行运行不带任何参数的 `theme
    download` 命令即可。

    *   您可以处理并预览当前未在 Shopify 商店中发布的主题（对于正在被客户积极使用的网站，这是推荐的做法）。您可以通过在 Shopify 后台查找未发布主题的
    ID（Theme Kit 的文档中有相关操作说明），将其设置在 `config.yml` 中，然后运行 `theme open` 命令，在默认浏览器中预览该主题。


    ## 将主题纳入版本控制


    如果您尚未这样做，那么本课最重要的收获应该是：在开发主题时，请使用版本控制系统（如 Git 或 Mercurial）。如果您不熟悉 VCS，Git 书籍在
    [`https://git-scm.com/book/en/v2/Getting-Started-About-Version-Control`](https://git-scm.com/book/en/v2/Getting-Started-About-Version-Control)
    上提供了很好的概述。


    在 Shopify 主题的上下文中，版本控制可以：


    *   防止您在主题代码库中犯下无法挽回的错误

    *   使团队更容易共同开发一个主题

    *   跟踪对主题所做的工作（以及由谁完成）

    *   让您能够在“功能”分支或“主题”分支上试验新功能，这些分支可以在不影响生产代码的情况下进行测试

    *   提供了一种结合部署工具简化主题部署的方法（您将在第 11 章中看到其工作原理）


    在开始使用版本控制一段时间后，您还会注意到自己对开发流程的思考方式发生了变化。您会发现自己在思考对主题代码库的修改时，会将其视为一个个小的、原子的、便于您自己、您的同事以及未来的开发者理解的变更块。您还可以利用版本控制生态系统中的各种工具和服务，例如用于代码托管的
    GitHub、GitLab 或 Bitbucket，或者用于代码审查的工具如 GitX（见图 2-2）。


    ![A437216_1_En_2_Fig2_HTML.jpg](img/A437216_1_En_2_Fig2_HTML.jpg)


    图 2-2


    GitX，一个可视化的 Git diff 工具，展示了主题的历史记录和更改概览

