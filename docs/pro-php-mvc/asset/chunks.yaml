  trans: '

    现在让我们看看如何在 Users 控制器中使用这个类，我们将在其中修改 `profile()` 方法。请参考清单 24-6。


    **清单 24-6.** 修改后的 `profile()` 方法


    ```

    class Users extends CI_Controller


    {


    public function profile()


    {


    // 检查用户会话状态


    $this->_isSecure();


    // 获取个人资料照片


    $this->load->model("file");


    $file = File::first(array(


    "user" => $this->user->id


    ));


    // 生成缩略图


    $this->load->library("thumbnail", array(


    "file" => $file


    ));


    $filename = $this->thumbnail->getFilename();


    // 加载视图


    $this->load->view("users/profile", array(


    "user" => $this->user,


    "filename" => $filename


    ));


    }


    }

    ```


    我们的 `profile()` 方法有两个新特点。第一，我们从数据库中获取了第一条 `File` 记录。第二，我们需要将其传递给 `$this->load->library()`。这将使用我们想要生成缩略图的文件来初始化
    `Thumbnail` 类。


    **注意** 你可以在 [`codeigniter.com/user_guide/libraries/loader.html`](http://codeigniter.com/user_guide/libraries/loader.html)
    了解有关 CodeIgniter 资源加载细节的更多信息。


    最后，我们需要修改 `profile.html` 视图文件和主 `.htaccess` 文件，如清单 24-7 和 24-8 所示。


    **清单 24-7.** 修改后的 `.htaccess` 文件


    ```

    RewriteEngine on


    RewriteCond $1 !^(index\.php|images|uploads|robots\.txt)


    RewriteRule ^(.*)$ /index.php/$1 [L]

    ```


    **清单 24-8.** 修改后的 `profile.html` 视图


    ```

    <?php if ($filename): ?>


    <img src="/uploads/<?php echo $filename; ?>" />


    <?php endif; ?>


    <h1><?php echo $user->first; ?> <?php echo $user->last; ?></h1> 这是一个个人资料页面！

    ```


    我们对 `.htaccess` 文件（在正则表达式中）所做的修改允许对 `uploads` 目录中的文件进行调用。同时，如果控制器提供了个人资料照片，我们也会将其添加到
    `profile.html` 视图中。


    **注意** 从安全角度来看，文件上传目录不应允许通过网络直接访问，或者应有严格的 `.htaccess` 规则来防止在 `uploads` 目录内执行脚本。当恶意用户能够通过专门设计用于文件上传的界面上传脚本并在服务器上执行时，网站通常会崩溃。


    ## 扩展核心


    我们需要介绍的最后一个话题是如何扩展 CodeIgniter 核心类。诀窍在于在 `application/core` 目录中添加与核心类名称匹配并带有特殊前缀的类。如果我们想创建一个可供应用程序继承的控制器，我们只需在此目录中创建一个
    `MY_Controller.php` 文件，如清单 24-9 所示。


    **清单 24-9.** `application/core/MY_Controller.php`


    ```

    class MY_Controller extends CI_Controller


    {


    public $user;


    public static function redirect($url)


    {


    header("Location: {$url}");


    exit();


    }


    protected function _isSecure()


    {


    // 获取用户会话


    $this->_getUser();


    if (!$this->user)


    {


    self::redirect("/login");


    }


    }


    protected function _getUser()


    {


    // 加载会话库


    $this->load->library("session");


    // 获取用户 ID


    $id = $this->session->userdata("user");


    if ($id)


    {


    // 加载用户模型


    $this->load->model("user");


    // 获取用户


    $this->user = new User(array(


    "id" => $id


    ));


    }


    }


    }

    ```


    关于扩展核心类需要注意的重要事项是：文件名必须符合 `my_*` 模式，并且自定义核心类必须继承内置的核心类。我们可以将 `redirect()`、`_isSecure()`
    和 `_getUser()` 方法移入这个新类，因为任何控制器都可以重用它们。


    **注意** 关于扩展核心类还有很多知识需要了解，你可以在 [`codeigniter.com/user_guide/general/core_classes.html`](http://codeigniter.com/user_guide/general/core_classes.html)
    了解更多。


    ## 问题


    1. 在我们最初的应用程序中，我们也创建了一个 `File` 模型来存储对数据库中已上传文件的引用。为什么不直接在 `uploads` 目录中搜索属于用户的文件？

    2. 在我们最初的应用程序中，我们还创建了一个专门的 `/thumbnails/*` 路由用于生成缩略图，然后将缩略图生成集成到控制器中。这种新方法有什么缺点吗？


    ## 答案


    1. 我们在文件查找中引入数据库，只是因为查询数据库比遍历文件系统中的文件要快。我们还可以通过缓存属于用户的文件列表来进一步提高速度。

    2. 这种新方法有两个缺点。第一，控制器现在需要知道缩略图是如何生成的。第二，缩略图变得不够动态——你无法再简单地请求一个新的缩略图尺寸，因为它必须通过编码实现！


    ## 练习


    1. 我们已经了解了这种缩略图生成方法的缺点。现在请使用 CodeIgniter MVC 重新创建我们之前的方法。

    2. 我们还学习了如何扩展核心类，并且对 `CI_Controller` 类进行了扩展。尝试将这种思路应用到我们创建的模型上，将可重用的代码移入一个扩展的
    `CI_Model` 子类中。


    # 第 25 章 CodeIgniter：测试


    我们通过探讨如何使用 CodeIgniter 内置类进行单元测试来结束对 CodeIgniter 的讨论。


    ## 目标


    - 我们需要了解 CodeIgniter 在单元测试方面提供了什么功能。

    - 我们需要了解有哪些替代方案。


    ## 工具


    CodeIgniter 提供了一个简单的单元测试类，你可以用来为你的 CodeIgniter 应用程序编写测试。


    它有一个方法可用于添加更多测试，还有一个方法用于返回格式化后的结果。让我们看一个如何使用它的示例，如清单 25-1 所示。


    **清单 25-1.** 使用 CodeIgniter 单元测试类


    ```

    class Welcome extends CI_Controller


    {


    public function index()


    {


    $this->load->view(''welcome_message'');


    }


    public function tests()


    {


    $this->load->library("unit_test");


    $test = $this->testing();


    $expected_result = "hello world";


    $test_name = "testing function returns hello world";


    $this->unit->run($test, $expected_result, $test_name);


    echo $this->unit->report();


    }


    public function testing()


    {


    return "hello world";


    }


    }

    ```


    如清单 25-1 所示，你可以使用 CodeIgniter 提供的单元测试库来比较两个值（其中一个值很可能是对某个方法或函数调用的结果）。这在测试当提供表单提交数据时方法如何执行方面有些局限。


    我们需要意识到的另一个局限是，CodeIgniter 允许的单元测试必须在 MVC 架构内部进行。这使测试与它们应该测试的框架紧密耦合，这从来都不是一件好事。


    ### 替代方案


    使用第三方库来测试 CodeIgniter 应用程序的功能要好得多。


    像 `PHPUnit` 这样的单元测试库包含大量不同的断言函数，不仅可以测试两个值的相等性，还可以测试数组的大小、抛出的异常类型、文件是否存在于目录中等等。


    **注意** 如果你想下载或了解更多关于 `PHPUnit` 的信息，可以访问 [`github.com/sebastianbergmann/phpunit`](https://github.com/sebastianbergmann/phpunit)。


    你可以通过将第三方单元测试库包含在 `application/libraries` 文件夹中（如我们在第 24 章中所做的那样），甚至将它们完全分离到应用程序之外来使用它们。选择权在你手中。

