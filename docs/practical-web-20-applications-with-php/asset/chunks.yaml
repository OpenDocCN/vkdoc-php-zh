    **From Prototype to Scriptaculous**


    Prototype is a very useful JavaScript framework, and we just covered a large amount
    of the functionality it provides. We didn’t cover everything available in Prototype,
    however, as it is simply not all relevant to most of the code you will write in
    your Web 2.0 applications.


    We now move on to Scriptaculous, a JavaScript library used to add special effects
    to web sites. Scriptaculous is built upon Prototype, as it makes extensive use
    of nearly all classes provided by Prototype—even ones we haven’t yet looked at,
    such as Position (used for element positioning and other issues related to the
    complex task of cross-browser layout). We will briefly cover exactly what Scriptaculous
    can do, then go over the installation of the library on your web pages, and finally
    look at an extensive example, which will make use of Scriptaculous effects and
    controls, Prototype classes, Ajax, and PHP.


    Before we go any further, though, let’s look at what Scriptaculous can do for
    us. We won’t go into all features in detail, but we will cover the more important
    ones, and anything else that will be required in this book.


    **Prebuilt Controls**


    Scriptaculous provides a number of prebuilt controls that can easily be included
    on your page.


    A control is a complex element for user interaction, typically used within or
    in place of forms.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063CH05CMP2 10/29/07 8:39 PM Page 152


