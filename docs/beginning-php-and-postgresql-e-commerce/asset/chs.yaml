  \ 函数，并创建一个考虑对 `orders` 表所做修改的新函数：\n\n```sql\n-- 删除 shopping_cart_create_order 函数\n\
  DROP FUNCTION shopping_cart_create_order(CHAR(32), INTEGER);\n\n-- 创建 shopping_cart_create_order\
  \ 函数\nCREATE FUNCTION shopping_cart_create_order(CHAR(32), INTEGER, INTEGER, INTEGER)\n\
  RETURNS INTEGER LANGUAGE plpgsql AS $$\nDECLARE\n  inCartId ALIAS FOR $1;\n  inCustomerId\
  \ ALIAS FOR $2;\n  inShippingId ALIAS FOR $3;\n  inTaxId ALIAS FOR $4;\n  outOrderId\
  \ INTEGER;\n  cartItem cart_product;\n  orderTotalAmount NUMERIC(10, 2);\nBEGIN\n\
  \  -- 向 orders 表插入新记录\n  INSERT INTO orders (created_on, customer_id, shipping_id,\
  \ tax_id)\n  VALUES (NOW(), inCustomerId, inShippingId, inTaxId);\n\n  -- 获取新订单\
  \ ID\n  SELECT INTO outOrderId\n  currval('orders_order_id_seq');\n\n  orderTotalAmount\
  \ := 0;\n\n  -- 在 order_detail 表中插入订单详情\n  FOR cartItem IN\n    SELECT p.product_id,\
  \ p.name,\n           COALESCE(NULLIF(p.discounted_price, 0), p.price) AS price,\n\
  \           sc.quantity,\n           COALESCE(NULLIF(p.discounted_price, 0), p.price)\
  \ * sc.quantity AS subtotal\n    FROM shopping_cart sc\n    INNER JOIN product p\n\
  \      ON sc.product_id = p.product_id\n    WHERE sc.cart_id = inCartId AND sc.buy_now\n\
  \  LOOP\n    INSERT INTO order_detail (order_id, product_id, product_name, quantity,\
  \ unit_cost)\n    VALUES (outOrderId, cartItem.product_id, cartItem.name, cartItem.quantity,\
  \ cartItem.price);\n\n    orderTotalAmount := orderTotalAmount + cartItem.subtotal;\n\
  \  END LOOP;\n\n  -- 保存订单总金额\n  UPDATE orders\n  SET total_amount = orderTotalAmount\n\
  \  WHERE order_id = outOrderId;\n\n  -- 清空购物车\n  PERFORM shopping_cart_empty(inCartId);\n\
  \n  -- 返回订单 ID\n  RETURN outOrderId;\nEND;\n$$;\n```\n\n**10.** 创建 `order_info`\
  \ 类型，并通过删除旧版本并创建新版本来修改 `orders_get_order_info` 函数。我们不能简单替换它，因为返回数据类型不同。\n\n```sql\n\
  -- 创建 order_info 类型\nCREATE TYPE order_info AS\n(\n  order_id INTEGER,\n  total_amount\
  \ NUMERIC(10, 2),\n  created_on TIMESTAMP,\n  shipped_on TIMESTAMP,\n  status VARCHAR(9),\n\
  \  comments VARCHAR(255),\n  customer_id INTEGER,\n  auth_code VARCHAR(50),\n  reference\
  \ VARCHAR(50),\n  shipping_id INTEGER,\n  shipping_type VARCHAR(100),\n  shipping_cost\
  \ NUMERIC(10, 2),\n  tax_id INTEGER,\n  tax_type VARCHAR(100),\n  tax_percentage\
  \ NUMERIC(10, 2)\n);\n\n-- 删除 orders_get_order_info 函数\nDROP FUNCTION orders_get_order_info(INTEGER);\n\
  \n-- 创建 orders_get_order_info 函数\nCREATE FUNCTION orders_get_order_info(INTEGER)\n\
  RETURNS order_info LANGUAGE plpgsql AS $$\nDECLARE\n  inOrderId ALIAS FOR $1;\n\
  \  outOrderInfoRow order_info;\nBEGIN\n  SELECT INTO outOrderInfoRow\n    o.order_id,\
  \ o.total_amount, o.created_on, o.shipped_on, o.status,\n    o.comments, o.customer_id,\
  \ o.auth_code, o.reference,\n    o.shipping_id, s.shipping_type, s.shipping_cost,\n\
  \    o.tax_id, t.tax_type, t.tax_percentage\n  FROM orders o\n  INNER JOIN tax t\n\
  \    ON t.tax_id = o.tax_id\n  INNER JOIN shipping s\n    ON s.shipping_id = o.shipping_id\n\
  \  WHERE o.order_id = inOrderId;\n\n  RETURN outOrderInfoRow;\nEND;\n$$;\n```\n\n\
