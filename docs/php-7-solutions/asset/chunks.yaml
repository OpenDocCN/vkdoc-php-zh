    \ the time zone of a date retrieved from another web\nsite.\n\nThis chapter covers\
    \ the following subjects:\n\n*   Reading and writing files\n\n*   Listing the\
    \ contents of a folder\n\n*   Inspecting files with the `SplFileInfo`\n    class\n\
    \n*   Controlling loops with SPL iterators\n\n*   Using SimpleXML to extract information\
    \ from an XML file\n\n*   Consuming an RSS feed\n\n*   Creating a download link\n\
    \nChecking that PHP can Open a File\nMany of the PHP solutions in this chapter\
    \ involve opening files for\nreading and writing, so it’s important to make sure\
    \ the correct\npermissions are set in your local testing environment and on your\
    \ remote\nserver. PHP is capable of reading and writing files anywhere, as long\
    \ as\nit has the correct permissions and knows where to find the file. So, for\n\
    security, you should store files that you plan to read or write outside\nthe web\
    \ server root (typically called `htdocs`, `public_html`, or `www`). This prevents\n\
    unauthorized people from reading your files or—worse—altering their\ncontent.\
    \ \nMost hosting companies use Linux or Unix servers, which impose strict\nrules\
    \ about the ownership of files and directories. Check that the\npermissions on\
    \ the directory where you store files outside the web\nserver root have been set\
    \ to 644 (this allows the owner to read and\nwrite to the directory, all other\
    \ users can read only). If you still get\nthe warning about permission being denied,\
    \ consult your hosting company.\nIf you are told to elevate any setting to 7,\
    \ be aware that this gives\npermission for scripts to be executed, which could\
    \ be exploited by a\nmalicious attacker.\n\nTip\nIf you don’t have access to a\
    \ directory outside the site root, I\nrecommend moving to a different hosting\
    \ company. Files that are uploaded\nto a site other than by the site maintainer\
    \ should always be checked\nbefore they are included in web pages. Storing them\
    \ out of public view\nreduces any security risk.\n\nCreating a Folder Outside\
    \ the Server Root for Local\nTesting on Windows\nFor the following exercises,\
    \ I suggest  you create a folder\ncalled `private`\nat the top level of the C\
    \ drive. There are no permissions issues on\nWindows, so that’s all that you need\
    \ to do.\n\nCreating a Folder Outside the Server Root for Local\nTesting on MacOS\n\
    Mac users might need to do a little more preparation because file\npermissions\
    \ are similar to Linux. Create a folder called `private` in your home\nfolder\
    \ and follow the instructions in PHP Solution 7-1\\.\n\nIf everything goes smoothly,\
    \ you won’t need to do anything extra. But if\nyou get a warning that PHP “failed\
    \ to open stream,” change the\npermissions for the `private` folder like\nthis:\n\
    \n1.  Select `private` in the Mac\n    Finder and select File ➤ Get Info (Cmd+I)\
    \ to open its info panel.\n\n2.  In Sharing & Permissions click the padlock icon\
    \ at the bottom\n    right to unlock the settings, then change the setting for\
    \ everyone from\n    Read only to Read & Write, as shown in the following screenshot.\n\
    \n![../images/332054_4_En_7_Chapter/332054_4_En_7_Figa_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figa_HTML.jpg)\n\
    \n3.  Click the padlock icon again to preserve the new settings and close\n  \
    \  the info panel. You should now be able to use the `private` folder to\n   \
    \ continue with the rest of the chapter.\n\nConfiguration Settings that Affect\
    \ File Access\n\nHosting companies can impose further restrictions on file access\
    \ through\n`php.ini`. To\nfind out what restrictions have been imposed, run `phpinfo()`\
    \ on your web\nsite and check the settings in the Core section. Table [7-1](#332054_4_En_7_Chapter.xhtml#Tab1)\
    \ lists the\nsettings you need to check. Unless you run your own server, you normally\n\
    have no control over these settings.\n\nTable 7-1.\nPHP configuration settings\
    \ that affect file access\n\nDirective |\n Default value |\n Description |\n\n\
    | --- | --- | --- | --- | --- | --- | --- |\n\n`allow_url_fopen` |\n On |\n Allows\
    \ PHP scripts to open public files on the Internet |\n\n`allow_url_include` |\n\
    \ Off |\n Controls the ability to include remote files |"
  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n请勾选复选框\n\n```\n\
    仅当 `$_POST` 数组包含值且 `$errors['terms']` 尚未设置时，`<input>` 元素\n    内的 PHP 代码块才会插入 `checked`\
    \ 属性。这确保了页面首次加载时复选框\n    未被选中。如果用户未确认接受条款就提交了表单，该复选框也将保持未选中\n    状态。\n\n如果 `$errors['terms']`\
    \ 已被设置，第二个 PHP 代码块会在标签旁显示一\n    条错误信息。\n```\n\n除了向 `$expected` 和 `$required` 数组添加条款外，你还需要为\
    \ `$_POST['terms']` 设置一个默认值；然后在表单提交时处理数据的代码中设置 `$errors['terms']`：\n\n```\nif\
    \ (!isset($_POST['characteristics'])) {\n    $_POST['characteristics'] = [];\n\
    }\nif (!isset($_POST['terms'])) {\n    $_POST['terms'] = \"\";\n    $errors['terms']\
    \ = true;\n}\n```\n\n仅当复选框为必填项时，你才需要创建 `$errors['terms']`。对于可选的复选框，如果它未包含在 `$_POST`\
    \ 数组中，只需将其值设置为空字符串即可。\n\n## 章节回顾\n\n构建 `processmail.php` 花费了大量工作，但此脚本的美妙之处在于它适用于任何表单。唯一需要更改的部分是\
    \ `$expected` 和 `$required` 数组，以及表单特有的细节，例如目标地址、邮件头，以及如果未选择任何值则不会包含在 `$_POST`\
    \ 数组中的多选元素的默认值。\n\n我避免讨论 HTML 邮件，因为 `mail()` 函数处理它的能力不足。位于 [`www.php.net/manual/en/book.mail.php`](http://www.php.net/manual/en/book.mail.php)\
    \ 的 PHP 在线手册展示了一种通过添加额外邮件头来发送 HTML 邮件的方法。然而，普遍认为 HTML 邮件应始终包含一个纯文本版本，以供不接受 HTML\
    \ 的邮件程序使用。如果你想发送 HTML 邮件或附件，可以尝试使用 PHPMailer（[`https://github.com/PHPMailer/PHPMailer/`](https://github.com/PHPMailer/PHPMailer/)）。\n\
    \n正如你将在后续章节中看到的，在线表单几乎是你用 PHP 所做一切的核心。它们是浏览器和 Web 服务器之间的网关。你将反复用到在本章中学到的技术。\n\n\
    ## 使用 PHP 管理文件\n\nPHP 提供了大量用于操作服务器文件系统的函数，但要为特定任务找到合适的函数并不总是那么容易。本章将拨开迷雾，向你展示这些函数的一些实际用途，例如读取和写入文本文件以在没有数据库的情况下存储少量信息。循环在检查文件系统内容方面发挥着重要作用，因此你还将探索一些旨在提高循环效率的标准\
    \ PHP 库（SPL）迭代器。\n\n除了打开本地文件，PHP 还可以读取其他服务器上的公共文件，例如新闻源。新闻源通常格式化为 XML（可扩展标记语言）。过去，从\
    \ XML 文件中提取信息是一个繁琐的过程，但恰如其名的 SimpleXML 让这一切在 PHP 中变得简单。在本章中，你将学习如何创建一个列出文件夹中所有图像的下拉菜单，如何创建一个从文件夹中选择特定类型文件的函数，如何从另一台服务器拉取实时新闻源，以及如何提示访问者下载图像或\
    \ PDF 文件而不是在浏览器中打开它。额外福利是，你将学习如何更改从另一个网站检索到的日期的时区。\n\n本章涵盖以下主题：\n\n*   读取和写入文件\n\
    *   列出文件夹的内容\n*   使用 `SplFileInfo` 类检查文件\n*   使用 SPL 迭代器控制循环\n*   使用 SimpleXML\
    \ 从 XML 文件中提取信息\n*   消费一个 RSS 源\n*   创建下载链接\n\n### 检查 PHP 能否打开文件\n\n本章中的许多 PHP\
    \ 解决方案都涉及打开文件进行读写，因此确保在本地测试环境和远程服务器上设置了正确的权限非常重要。只要拥有正确的权限并知道文件位置，PHP 就可以在任何地方读写文件。因此，出于安全考虑，你应该将要读写的文件存储在\
    \ Web 服务器根目录（通常称为 `htdocs`、`public_html` 或 `www`）之外。这可以防止未经授权的人读取你的文件，或者更糟的是，更改其内容。\n\
    \n大多数托管公司使用 Linux 或 Unix 服务器，这些服务器对文件和目录的所有权有严格的规定。请检查 Web 服务器根目录之外存储文件的目录权限是否已设置为\
    \ 644（这允许所有者读写该目录，其他所有用户只能读取）。如果你仍然收到权限拒绝的警告，请咨询你的托管公司。如果有人告诉你将任何设置提升到 7，请注意这将允许执行脚本，可能会被恶意攻击者利用。\n\
    \n#### 提示\n\n如果您无法访问站点根目录之外的目录，我建议您更换一家托管公司。除了站点维护者之外，上传到站点的文件在包含到网页之前应始终进行检查。将它们存放在公众视野之外可以降低安全风险。\n\
    \n### 在 Windows 上为本地测试创建服务器根目录外的文件夹\n\n对于以下练习，我建议您在 C 盘的根目录下创建一个名为 `private` 的文件夹。Windows\
    \ 上没有权限问题，所以你只需要这样做。\n\n### 在 MacOS 上为本地测试创建服务器根目录外的文件夹\n\nMac 用户可能需要多做一点准备工作，因为文件权限与\
    \ Linux 类似。在你的主文件夹中创建一个名为 `private` 的文件夹，并按照 PHP 解决方案 7-1 中的说明进行操作。\n\n如果一切顺利，你不需要做任何额外的事情。但是，如果你收到\
    \ PHP “无法打开流”的警告，请像这样更改 `private` 文件夹的权限：\n\n1.  在 Mac Finder 中选择 `private`，然后选择文件\
    \ ➤ 显示简介（Cmd+I）以打开其信息面板。\n2.  在“共享与权限”中，点击右下角的挂锁图标以解锁设置，然后将“所有人”的设置从“只读”更改为“读与写”，如下面的屏幕截图所示。\n\
    \    ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figa_HTML.jpg](img/332054_4_En_7_Figa_HTML.jpg)\n\
    3.  再次点击挂锁图标以保存新设置并关闭信息面板。你现在应该能够使用 `private` 文件夹继续本章其余部分的内容了。\n\n### 影响文件访问的配置设置\n\
    \n托管公司可以通过 `php.ini` 对文件访问施加进一步的限制。要了解已施加了哪些限制，请在您的网站上运行 `phpinfo()` 并检查 Core\
    \ 部分中的设置。表 7-1 列出了您需要检查的设置。除非您运行自己的服务器，否则通常无法控制这些设置。\n\n**表 7-1.** 影响文件访问的 PHP\
    \ 配置设置\n\n| 指令 | 默认值 | 描述 |\n| --- | --- | --- |\n| `allow_url_fopen` | On | 允许\
    \ PHP 脚本打开互联网上的公共文件 |\n| `allow_url_include` | Off | 控制包含远程文件的能力 |\n"
- fmt: "# The settings in Table [7-1](#332054_4_En_7_Chapter.xhtml#Tab1) both control\
    \ access to files through a URL (as opposed to the local file system). The first\
    \ one, `allow_url_fopen`, allows you to read remote files but not to include them\
    \ in your scripts. This is generally safe, so the default is for it to be enabled.\
    \ On the other hand, `allow_url_include` lets you include remote files directly\
    \ in your scripts. This is a major security risk, so the default is for `allow_url_include`\
    \ to be disabled.\n\n> **Tip**  \n> If your hosting company has disabled `allow_url_fopen`,\
    \ ask for it to be enabled. Otherwise, you won’t be able to use PHP Solution 7-5.\
    \ But don’t get the names mixed up: `allow_url_include` should always be turned\
    \ off in a hosting environment. Even if `allow_url_fopen` is disabled on your\
    \ web site, you might still be able to access useful external data sources, such\
    \ as news feeds and public XML documents using the Client URL Library (cURL).\
    \ See [`www.php.net/manual/en/book.curl.php`](http://www.php.net/manual/en/book.curl.php)\
    \ for more information.\n\n## Reading and Writing Files\n\nThe ability to read\
    \ and write files has a wide range of applications. For example, you can open\
    \ a file on another web site, read the contents into your server’s memory, extract\
    \ information using string and XML manipulation functions, and then write the\
    \ results to a local file. You can also query a database on your own server and\
    \ output the data as a text or CSV (comma-separated values) file. You can even\
    \ generate files in Open Document Format or as Microsoft Excel spreadsheets. But\
    \ first, let’s look at the basic operations.\n\n> **Tip**  \n> If you subscribe\
    \ to LinkedIn Learning or [Lynda.​com](http://lynda.com), you can learn how to\
    \ export data from a database to various formats, such as Microsoft Excel and\
    \ Word, in my *PHP: Exporting Data to Files* course.\n\n## Reading Files in a\
    \ Single Operation\n\nPHP has three functions that read the contents of a text\
    \ file in a single operation:\n\n* `readfile()` opens a file and directly outputs\
    \ its contents.\n* `file_get_contents()` reads the whole contents of a file into\
    \ a single string but doesn’t generate direct output.\n* `file()` reads each line\
    \ into an array.\n\n### PHP Solution 7-1: Getting the Contents of a Text File\n\
    \nThis PHP solution demonstrates the difference between using `readfile()`, `file_get_contents()`,\
    \ and `file()` to access the contents of a file.\n\n1. Copy `sonnet.txt` to your\
    \ `private` folder. It’s a text file that contains Shakespeare’s Sonnet 116.\n\
    \n2. Create a new folder called `filesystem` in your phpsols `-4e` site root,\
    \ then create a PHP file called `get_contents.php` in the new folder. Insert the\
    \ following code inside a PHP block (`get_contents_01.php` in the `ch07` folder\
    \ shows the code embedded in a web page, but you can use just the PHP code for\
    \ testing purposes):\n\n   ```\n   readfile('C:/private/sonnet.txt');\n   ```\n\
    \n   If you’re on a Mac, amend the path name like this, using your own Mac username:\n\
    \n   ```\n   readfile('/Users/username/private/sonnet.txt');\n   ```\n\n   If\
    \ you’re testing on Linux or on a remote server, amend the path name accordingly.\n\
    \n> **Note**  \n> For brevity, the remaining examples in this chapter show only\
    \ the Windows path name.\n\n3. Save `get_contents.php` and view it in a browser.\
    \ You should see something similar to the following screenshot. The browser ignores\
    \ the line breaks in the original text and displays Shakespeare’s sonnet as a\
    \ solid block.\n\n   ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figb_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figb_HTML.jpg)\n\
    \n> **Tip**  \n> If you see an error message, check that you typed the code correctly\
    \ and that the correct file and folder permissions have been set on a Mac or Linux.\n\
    \n4. PHP has a function called `nl2br()` that converts newline characters to `<br/>`\
    \ tags (the trailing slash is for compatibility with XHTML and is valid in HTML5).\
    \ Change the code in `get_contents.php` like this (it’s in `get_contents_02.php`):\n\
    \n   ```\n   nl2br(readfile('C:/private/sonnet.txt'));\n   ```\n\n5. Save `get_contents.php`\
    \ and reload it in your browser. The output is still a solid block of text. When\
    \ you pass one function as an argument to another one like this, the result of\
    \ the inner function is normally passed to the outer one, performing both operations\
    \ in a single expression. So, you would expect the file’s contents to be passed\
    \ to `nl2br()` before being displayed in the browser. However, `readfile()` outputs\
    \ the file’s contents immediately. By the time it’s finished, there’s nothing\
    \ for `nl2br()` to insert `<br/>` tags into. The text is already in the browser.\n\
    \n> **Note**  \n> When two functions are nested like this, the inner function\
    \ is executed first, and the outer function processes the result. But the return\
    \ value of the inner function needs to be meaningful as an argument to the outer\
    \ function. The return value of `readfile()` is the number of bytes read from\
    \ the file. Even if you add `echo` at the beginning of the line, all you get is\
    \ 594 added to the end of the text. Nesting functions doesn’t work in this case,\
    \ but it’s often a very useful technique, avoiding the need to store the result\
    \ of the inner function in a variable before processing it with another function.\n\
    \n6. Instead of `readfile()`, you need to use `file_get_contents()` to convert\
    \ the newline characters to `<br/>` tags. Whereas `readfile()` simply outputs\
    \ the content of a file, `file_get_contents()` returns the contents of a file\
    \ as a single string. It’s up to you to decide what to do with it. Amend the code\
    \ like this (or use `get_contents_03.php`):\n\n   ```\n   echo nl2br(file_get_contents('C:/private/sonnet.txt'));\n\
    \   ```\n\n7. Reload the page in a browser. Each line of the sonnet is now on\
    \ a line of its own.\n\n   ![../images/332054_4_En_7_Chapter/332054_4_En_7_Figc_HTML.jpg](images/332054_4_En_7_Chapter/332054_4_En_7_Figc_HTML.jpg)\n\
    \n8. The advantage of `file_get_contents()` is that you can assign the file contents\
    \ to a variable and process it in some way before deciding what to do with it.\
    \ Change the code in `get_contents.php` like this (or use `get_contents_04.php`)\
    \ and load the page into a browser:\n\n   ```\n   $sonnet = file_get_contents('C:/private/sonnet.txt');\n\
    \   // replace new lines with spaces\n   $words = str_replace(\"\\r\\n\", ' ',\
    \ $sonnet);\n   // split into an array of words\n   $words = explode(' ', $words);\n\
    \   // extract the first nine array elements\n   $first_line = array_slice($words,\
    \ 0, 9);\n   // join the first nine elements and display\n   echo implode(' ',\
    \ $first_line);\n   ```\n\n   This stores the contents of `sonnet.txt` in a variable\
    \ called `$sonnet`, which is passed to `str_replace()`, which then replaces the\
    \ carriage return and newline characters with a space and stores the result as\
    \ `$words`.\n\n> **Note**  \n> See “Using escape sequences inside double quotes”\
    \ in Chapter [4](#332054_4_En_4_Chapter.xhtml) for an explanation of `\"\\r\\\
    n\"`. The text file was created in Windows, so line breaks are represented by\
    \ a carriage return and newline character. Files created on macOS and Linux use\
    \ only a newline character (`\"\\n\"`)."
