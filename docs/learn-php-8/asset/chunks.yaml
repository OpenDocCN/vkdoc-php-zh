    \ of the class\n(`Dog`). Finally,\nthe program will need to call the method (`display_properties`)\n\
    to display the\ncontents of the properties.\n\n*   *Program design recommendation—PHP\
    \ will allow the*\n    *include,* *include_once,* *require, and*\n    *require_once*\
    \ *statements to be used anywhere in your program\n    code. This could cause\
    \ potential issues if it is used in the incorrect\n    location or used more than\
    \ once. It is strongly recommended that these\n    statements be included together\
    \ as close to the top of your code as\n    possible for easy review to determine\
    \ if libraries have already been\n    installed. In PHP 8 we can preload these\
    \ files into the memory of the\n    server. We will demonstrate this ability in\
    \ a later\n    chapter.*\n\n*   *Security and reliability—PHP has several methods\
    \ available to\n    pull libraries into PHP programs. The* *include* *method\n\
    \    will attempt to pull in a library. However, if the library does not\n   \
    \ exist, the program will continue to run (or display a warning. The*\n    *include*\
    \ *method also does not concern itself with\n    possibility* \n    *that the\
    \ library might already have been attached to the code. It is\n    possible that\
    \ a large program might accidentally try to pull in the same\n    library more\
    \ than once (which would throw an exception in the program\n    due to duplicate\
    \ method and/or class names). The*\n    *include_once* *method*  *eliminates the\n\
    \    possibility of attempting to pull in a library more than once. If the\n \
    \   library has already been included, the statement will not execute.\n    The*\
    \ *require* *method does not allow the program to\n    continue running if the\
    \ library cannot be found. However, like the*\n    *include* *method, it could\
    \ attempt to pull in the same\n    library more than once. The* *require_once*\n\
    \    *method* \n    *solves these potential problems by only including the library\
    \ if it\n    has not already been installed.*\n\nWe briefly looked at the require\
    \ statement in the previous chapter.\nHowever, it is worth reviewing its use here\
    \ because we will now be using\nit throughout the remainder of the book. The format\
