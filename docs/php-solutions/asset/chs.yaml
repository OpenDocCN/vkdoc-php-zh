- "# 从自定义格式创建 DateTime 对象\n\n你可以使用表 14-4 中的格式字符为 `DateTime` 对象指定自定义的输入格式。无需使用 `new`\
  \ 关键字创建对象，而是使用 `createFromFormat()` 静态方法，如下所示：\n\n```\n$date = DateTime::createFromFormat(format_string,\
  \ input_date, timezone);\n```\n\n第三个参数 `timezone` 是可选的。如果包含，它应该是一个 `DateTimeZone`\
  \ 对象。\n\n静态方法属于整个类，而不是特定对象。你使用类名后跟作用域解析运算符（双冒号）和方法名来调用静态方法。\n\n**提示**\n\n在内部，这个作用域解析运算符被称为\
  \ `PAAMAYIM_NEKUDOTAYIM`，在希伯来语中意为“双冒号”。为什么是希伯来语？驱动 PHP 的 Zend 引擎最初是由 Zeev Suraski\
  \ 和 Andi Gutmans 在以色列理工学院（Technion–Israel Institute of Technology）学习时开发的。除了在极客冷知识测验中加分之外，了解\
  \ `PAAMAYIM_NEKUDOTAYIM` 的含义可以让你在 PHP 错误消息中看到它时，省去许多挠头困惑的功夫。\n\n例如，你可以使用 `createFromFormat()`\
  \ 方法来接受欧洲格式的日期（日、月、年，用斜杠分隔），如下所示（代码在 `date_format_04.php` 中）：\n\n```\n$xmas2014\
  \ = DateTime::createFromFormat('d/m/Y', '25/12/2014');\necho $xmas2014->format('l,\
  \ jS F Y');\n```\n\n这将产生以下输出：\n\n![A978-1-4842-0635-5_14_Figb_HTML.jpg](img/A978-1-4842-0635-5_14_Figb_HTML.jpg)\n\
  \n**警告**\n\n尝试将 `25/12/2014` 作为 `DateTime` 构造函数的输入会触发致命错误，因为不支持 `DD/MM/YYYY` 格式。如果你想使用\
  \ `DateTime` 构造函数不支持的格式，则必须使用 `createFromFormat()` 静态方法。\n\n尽管 `createFromFormat()`\
  \ 方法很有用，但它只能在你知道日期始终采用特定格式的情况下使用。\n\n\n\n### 在 `Date()` 和 `DateTime` 类之间做选择\n\n\
  在显示日期时，使用 `DateTime` 类总是需要两步操作。你必须先实例化对象，然后才能调用 `format()` 方法。而使用 `date()` 函数，一步就能完成。由于它们使用相同的格式字符，因此在处理当前日期和/或时间时，`date()`\
  \ 无疑更胜一筹。\n\n对于显示当前日期、时间或年份等简单任务，请使用 `date()`。而 `DateTime` 类的真正优势在于，它可以使用表 14-5\
  \ 列出的方法处理与日期相关的计算和时区。\n\n表 14-5. 主要的 `DateTime` 方法\n\n| 方法 | 参数 | 描述 |\n| --- |\
  \ --- | --- |\n| `format()` | 格式字符串 | 使用表 14-4 中的格式字符格式化日期/时间。 |\n| `setDate()`\
  \ | 年，月，日 | 更改日期。参数应用逗号分隔。超出允许范围的月份或天数会累加到结果日期中，如正文所述。 |\n| `setTime()` | 小时，分钟，秒\
  \ | 重置时间。参数是用逗号分隔的值。秒是可选的。超出允许范围的值会累加到结果日期/时间中。 |\n| `modify()` | 相对日期字符串 | 使用相对表达式更改日期/时间，例如\
  \ '+2 weeks'。 |\n| `getTimestamp()` | 无 | 返回日期/时间的 Unix 时间戳。 |\n| `setTimestamp()`\
  \ | Unix 时间戳 | 根据 Unix 时间戳设置日期/时间。 |\n| `setTimezone()` | `DateTimeZone` 对象 | 更改时区。\
  \ |\n| `getTimezone()` | 无 | 返回一个表示 `DateTime` 对象时区的 `DateTimeZone` 对象。 |\n| `getOffset()`\
  \ | 无 | 返回与 UTC 的时区偏移量，以秒为单位。 |\n| `add()` | `DateInterval` 对象 | 将日期/时间增加指定时段。 |\n\
  | `sub()` | `DateInterval` 对象 | 从日期/时间中减去指定时段。 |\n| `diff()` | `DateTime` 对象，布尔值\
  \ | 返回一个 `DateInterval` 对象，表示当前 `DateTime` 对象与作为参数传入的对象之间的差值。将可选的第二个参数设为 `true`，可以将负值转换为其正值。\
  \ |\n\n使用带有超出范围值的 `setDate()` 和 `setTime()` 时，超出部分会累加到结果日期或时间中。例如，将月份设为 14 会将日期设置为下一年的二月。将小时设为\
  \ 26 会导致下一天的凌晨 2 点。\n\n`setDate()` 有一个有用的技巧：通过将月份值设为下一个月，并将日期设为 0，可以将日期设置为任意月份的最后一天。`setDate.php`\
  \ 中的代码演示了这一点，分别以 2015 年 2 月和 2016 年（闰年）2 月的最后一天为例。\n\n```\n<?php\n\n$format = 'F\
  \ j, Y';\n\n$date = new DateTime();\n\n$date->setDate(2015, 3, 0);\n\n?>\n```\n\n\
  ```\n<p>非闰年：<?= $date->format($format); ?>。</p>\n\n<p>闰年：<?php $date->setDate(2016,\
  \ 3, 0);\n\necho $date->format($format); ?>。</p>\n```\n\n上述示例将产生以下输出：\n\n![A978-1-4842-0635-5_14_Figc_HTML.jpg](img/A978-1-4842-0635-5_14_Figc_HTML.jpg)\n\
  \n### 使用相对日期处理溢出问题\n\n`modify()` 方法接受一个相对日期字符串，这可能会产生意想不到的结果。例如，如果你向一个表示 2011 年\
  \ 1 月 31 日的 `DateTime` 对象添加一个月，得到的结果值不是 2 月的最后一天，而是 3 月 3 日。\n\n这是因为在原始日期上加一个月会得到\
  \ 2 月 31 日，但在非闰年中，二月只有 28 天。于是，超出范围的值会累加到月份中，得到 3 月 3 日。如果你随后从同一个 `DateTime` 对象中减去一个月，你会回到\
  \ 2 月 3 日，而不是原始起始日期。`date_modify_01.php` 中的代码说明了这一点，如图 14-9 所示。\n\n```\n<?php\n\n\
  $format = 'F j, Y';\n\n$date = new DateTime('January 31, 2015');\n\n?>\n```\n\n\
  ```\n<p>原始日期：<?= $date->format($format); ?>。</p>\n\n<p>加一个月：<?php\n\n$date->modify('+1\
  \ month');\n\necho $date->format($format);\n\n$date->modify('-1 month');\n\n?>\n\
  \n<p>减一个月：<?= $date->format($format); ?>\n```\n\n![A978-1-4842-0635-5_14_Fig9_HTML.jpg](img/A978-1-4842-0635-5_14_Fig9_HTML.jpg)\n\
  \n图 14-9. 加减月数可能导致意外结果\n\n避免此问题的方法是在相对表达式中使用 `'last day of'`，如下所示（代码在 `date_modify_02.php`\
  \ 中）：\n\n```\n<?php\n\n$format = 'F j, Y';\n\n$date = new DateTime('January 31,\
  \ 2015');\n\n?>\n```\n\n```\n<p>原始日期：<?= $date->format($format); ?>。</p>\n\n<p>加一个月：<?php\n\
  \n$date->modify('last day of +1 month');\n\necho $date->format($format);\n\n$date->modify('last\
  \ day of -1 month');\n\n?>\n\n<p>减一个月：<?= $date->format($format); ?>\n```\n\n如图\
  \ 14-10 所示，现在产生了期望的结果。\n\n![A978-1-4842-0635-5_14_Fig10_HTML.jpg](img/A978-1-4842-0635-5_14_Fig10_HTML.jpg)\n\
  \n图 14-10. 在相对表达式中使用 'last day of' 消除了该问题\n\n\n\n### 使用 `DateTimeZone` 类\n\n`DateTime`\
  \ 对象会自动使用 Web 服务器的默认时区，除非你已使用前述方法之一重置了时区。不过，你可以通过构造函数的可选第二个参数或使用 `setTimezone()`\
  \ 方法来设置单个 `DateTime` 对象的时区。这两种情况下，参数都必须是一个 `DateTimeZone` 对象。\n\n要创建 `DateTimeZone`\
  \ 对象，请将 [`http://php.net/manual/en/timezones.php`](http://php.net/manual/en/timezones.php)\
  \ 中列出的受支持时区之一作为参数传递给构造函数，如下所示：\n\n`$UK = new DateTimeZone('Europe/London');`\n\n\
  `$USeast = new DateTimeZone('America/New_York');`\n\n`$Hawaii = new DateTimeZone('Pacific/Honolulu');`\n\
  \n在查看受支持的时区列表时，必须意识到这些时区是基于地理区域和城市，而非官方时区名称。这是因为 PHP 会自动考虑夏令时。例如，不使用夏令时的亚利桑那州由 `America/Phoenix`\
  \ 覆盖。\n\n按地理区域组织时区会带来一些意想不到的情况。`America` 并非指美利坚合众国，而是指南北美洲及加勒比地区。因此，檀香山不列在 `America`\
  \ 下，而是作为一个太平洋时区。`Europe` 同样指欧洲大陆，包括不列颠群岛，但不包括其他岛屿。因此，雷克雅未克和马德拉被列为大西洋时区，而挪威的朗伊尔城则独享作为唯一北极时区的特权。\n\
  \n`timezones.php` 中的代码为伦敦、纽约和檀香山创建了 `DateTimeZone` 对象，然后使用第一个时区初始化了一个 `DateTime`\
  \ 对象，如下所示：\n\n`$now = new DateTime('now', $UK);`\n\n使用 `echo` 和 `format()` 方法显示日期和时间后，通过\
  \ `setTimezone()` 方法更改时区，如下所示：\n\n`$now->setTimezone($USeast);`\n\n下次显示 `$now` 时，它将显示纽约的日期和时间。最后，再次使用\
  \ `setTimezone()` 将时区更改为檀香山，产生以下输出：\n\n![A978-1-4842-0635-5_14_Figd_HTML.jpg](img/A978-1-4842-0635-5_14_Figd_HTML.jpg)\n\
  \n要查找服务器的时区，你可以检查 `php.ini`，或对 `DateTime` 对象使用 `getTimezone()` 方法。`getTimezone()`\
  \ 方法返回一个 `DateTimeZone` 对象，而非包含时区名称的字符串。要获取时区的值，你需要使用 `DateTimeZone` 对象的 `getName()`\
  \ 方法，如下所示（代码位于 `timezone_display.php` 中）：\n\n`$now = new DateTime();`\n\n`$timezone\
  \ = $now->getTimezone();`\n\n`echo $timezone->getName();`\n\n`DateTimeZone` 类还有其他几个方法可以公开有关时区的信息。为了完整性，这些方法列在表\
  \ 14-6 中，但 `DateTimeZone` 类的主要用途是为 `DateTime` 对象设置时区。\n\n**表 14-6.** DateTimeZone\
  \ 方法\n\n| 方法 | 参数 | 描述 |\n| --- | --- | --- |\n| `getLocation()` | 无 | 返回一个关联数组，包含国家代码、纬度、经度以及关于该时区的说明。\
  \ |\n| `getName()` | 无 | 返回一个字符串，包含该时区的地理区域和城市。 |\n| `getOffset()` | `DateTime`\
  \ 对象 | 计算作为参数传入的 `DateTime` 对象相对于 UTC 的偏移量（以秒为单位）。 |\n| `getTransitions()` | 开始，结束\
  \ | 返回一个多维数组，包含历史及未来进出夏令时的日期和时间。接受两个可选的时间戳参数来限制结果范围。 |\n| `listAbbreviations()`\
  \ | 无 | 生成一个大型多维数组，包含 PHP 支持的时区的 UTC 偏移量和名称。 |\n| `listIdentifiers()` | `DateTimeZone`\
  \ 常量，国家代码 | 返回一个包含所有 PHP 时区标识符的数组，例如 `Europe/London`、`America/New_York` 等。接受两个可选参数来限制结果范围。使用\
  \ [`http://php.net/manual/en/class.datetimezone.php`](http://php.net/manual/en/class.datetimezone.php)\
  \ 中列出的 `DateTimeZone` 常量之一作为第一个参数。如果第一个参数是 `DateTimeZone::PER_COUNTRY`，则可以使用两个字母的国家代码作为第二个参数。\
  \ |\n\n表 14-6 中的最后两个方法是静态方法。通过使用范围解析操作符直接在类上调用它们，如下所示：\n\n```\n$abbreviations =\
  \ DateTimeZone::listAbbreviations();\n```\n\n\n\n### 使用 DateInterval 类添加和减去时间段\n\
  \n`DateInterval` 类用于指定要通过 `add()` 和 `sub()` 方法对 `DateTime` 对象进行添加或减去的时间段。它也用于 `diff()`\
  \ 方法，该方法会返回一个 `DateInterval` 对象。刚开始使用 `DateInterval` 类可能会感觉有点奇怪，但它其实相对容易理解。\n\n\
  要创建一个 `DateInterval` 对象，你需要向构造函数传递一个指定时间间隔长度的字符串；该字符串必须按照 ISO 8601 标准格式化。该字符串始终以字母\
  \ `P`（代表 period）开头，后跟一个或多个整数与被称为周期指示符的字母组成的键值对。如果时间间隔包含小时、分钟或秒，则时间部分前需加上字母 `T`。表\
  \ 14-7 列出了有效的周期指示符。\n\n**表 14-7.** `DateInterval` 类使用的 ISO 8601 周期指示符\n\n| 周期指示符\
  \ | 含义 |\n| --- | --- |\n| `Y` | 年 |\n| `M` | 月 |\n| `W` | 周——不能与天组合使用 |\n| `D`\
  \ | 天——不能与周组合使用 |\n| `H` | 小时 |\n| `M` | 分钟 |\n| `S` | 秒 |\n\n以下示例应能说明如何指定一个时间间隔：\n\
  \n```\n$interval1 = new DateInterval('P2Y');           // 2 年\n$interval2 = new\
  \ DateInterval('P5W');           // 5 周\n$interval3 = new DateInterval('P37D');\
  \          // 5 周 2 天\n$interval4 = new DateInterval('PT6H20M');       // 6 小时 20\
  \ 分钟\n$interval5 = new DateInterval('P1Y2DT3H5M50S'); // 1 年 2 天 3 小时 5 分 50 秒\n\
  ```\n\n请注意，`$interval3` 需要指定总天数，因为周会自动转换为天，所以 `W` 和 `D` 不能在同一个时间间隔定义中组合使用。\n\n要将\
  \ `DateInterval` 对象与 `DateTime` 类的 `add()` 或 `sub()` 方法一起使用，请将对象作为参数传递。例如，以下代码为\
  \ 2014 年圣诞节日期增加了 12 天：\n\n```\n$xmas2014 = new DateTime('12/25/2014');\n$interval\
  \ = new DateInterval('P12D');\n$xmas2014->add($interval);\n```\n\n如果你不需要重用该时间间隔，可以直接将\
  \ `DateInterval` 构造函数作为参数传递给 `add()`，如下所示：\n\n```\n$xmas2014 = new DateTime('12/25/2014');\n\
  $xmas2014->add(new DateInterval('P12D'));\n```\n\n此计算的结果在 `date_interval_01.php`\
  \ 中进行了演示，该文件产生以下输出：\n\n![A978-1-4842-0635-5_14_Fige_HTML.jpg](img/A978-1-4842-0635-5_14_Fige_HTML.jpg)\n\
  \n除了使用表 14-7 列出的周期指示符之外，另一种方法是使用静态方法 `createFromDateString()`，该方法接受一个英文相对日期字符串作为参数，其工作方式与\
  \ `strtotime()` 相同。使用 `createFromDateString()`，前述示例可以重写如下（代码位于 `date_interval_02.php`）：\n\
  \n```\n$xmas2014 = new DateTime('12/25/2014');\n$xmas2014->add(DateInterval::createFromDateString('+12\
  \ days'));\n```\n\n这会得到完全相同的结果。\n\n> **注意：** 使用 `DateInterval` 增加和减去月份的效果与前面描述的一致。如果结果日期超出范围，则会增加额外的天数。例如，将一月三十一日增加一个月，结果可能是三月三日或二日，具体取决于是否为闰年。要获取当月的最后一天，请使用前面“使用相对日期处理溢出”中描述的技术。\n\
  \n### 使用 `diff()` 方法查找两个日期之间的差异\n\n要查找两个日期之间的差异，请为两个日期分别创建一个 `DateTime` 对象，并将第二个对象作为参数传递给第一个对象的\
  \ `diff()` 方法。结果会作为一个 `DateInterval` 对象返回。要从 `DateInterval` 对象中提取结果，你需要使用该对象的 `format()`\
  \ 方法，该方法使用表 14-8 中列出的格式字符。这些字符与 `DateTime` 类使用的格式字符不同。幸运的是，其中大部分都很容易记住。\n\n**表 14-8.**\
  \ `DateInterval::format()` 方法使用的格式字符\n\n| 格式字符 | 描述 | 示例 |\n| --- | --- | --- |\n\
  | `%Y` | 年。至少两位数字，必要时前导补零 | 12, 01 |\n| `%y` | 年，无前导零 | 12, 1 |\n| `%M` | 月，带前导零\
  \ | 02, 11 |\n| `%m` | 月，无前导零 | 2, 11 |\n| `%D` | 日，带前导零 | 03, 24 |\n| `%d` | 日，无前导零\
  \ | 3, 24 |\n| `%a` * | 总天数 | 15, 231 |\n| `%H` | 小时，带前导零 | 03, 23 |\n| `%h` | 小时，无前导零\
  \ | 3, 23 |\n| `%I` | 分钟，带前导零 | 05, 59 |\n| `%i` | 分钟，无前导零 | 5, 59 |\n| `%S` | 秒，带前导零\
  \ | 05, 59 |\n| `%s` | 秒，无前导零 | 5, 59 |\n| `%R` | 负号显示减号，正号显示加号 | -, + |\n| `%r`\
  \ | 负号显示减号，正号无符号 | - |\n| `%%` | 百分号 | % |\n\n* 在某些 Windows 版本的 PHP 5.3 中存在一个错误，总天数始终返回\
  \ 6015。\n\n`date_interval_03.php` 中的以下示例展示了如何使用 `diff()` 获取当前日期与美国独立宣言日期之间的差异，并使用\
  \ `format()` 方法显示结果：\n\n```\n<p><?php\n$independence = new DateTime('7/4/1776');\n\
  $now = new DateTime();\n$interval = $now->diff($independence);\necho $interval->format('%Y\
  \ years %m months %d days'); ?>\nsince American independence.</p>\n```\n\n如果你在浏览器中加载\
  \ `date_interval_03.php`，应该会看到类似于以下截图的内容（当然，实际的时间段会有所不同）。\n\n![A978-1-4842-0635-5_14_Figf_HTML.jpg](img/A978-1-4842-0635-5_14_Figf_HTML.jpg)\n\
  \n格式字符遵循一种逻辑模式。大写字母始终生成至少两位数字，必要时前导补零。小写字母没有前导零。\n\n> **注意：** 除了代表总天数的 `%a`，格式字符仅表示整个时间间隔的特定部分。例如，如果你将格式字符串改为\
  \ `$interval->format('%m months')`，它仅显示自上次七月四日以来经过的完整月数。它不会显示自 1776 年七月四日以来的总月数。\n\
  \n\n\n### 使用 `DatePeriod` 类计算重复日期\n\n借助 `DatePeriod` 类，计算重复日期（例如每个月的第二个星期二）现在变得异常简单。它需要与\
  \ `DateInterval` 一起配合使用。\n\n`DatePeriod` 的构造函数很特别，因为它可以接受三种不同形式的参数。创建 `DatePeriod`\
  \ 对象的第一种方式是提供以下参数：\n\n*   一个 `DateTime` 对象，代表起始日期\n*   一个 `DateInterval` 对象，代表重复间隔\n\
  *   一个整数，代表重复次数\n*   `DatePeriod::EXCLUDE_START_DATE` 常量（可选）\n\n创建好 `DatePeriod`\
  \ 对象后，你可以在 `foreach` 循环中使用 `DateTime::format()` 方法来显示这些重复日期。\n\n`date_interval_04.php`\
  \ 中的代码显示了 2015 年每个月的第二个星期二：\n\n```\n$start = new DateTime('12/31/2014');\n$interval\
  \ = DateInterval::createFromDateString('second Tuesday of next month');\n$period\
  \ = new DatePeriod($start, $interval, 12, DatePeriod::EXCLUDE_START_DATE);\nforeach\
  \ ($period as $date) {\n    echo $date->format('l, F jS, Y') . '<br>';\n}\n```\n\
  \n它会产生如图 14-11 所示的输出。\n\n![A978-1-4842-0635-5_14_Fig11_HTML.jpg](img/A978-1-4842-0635-5_14_Fig11_HTML.jpg)\n\
  \n**图 14-11.** 使用 `DatePeriod` 类可以非常轻松地计算重复日期\n\n第一行 PHP 代码将起始日期设置为 2014 年 12 月\
  \ 31 日。下一行使用 `DateInterval` 的静态方法 `createFromDateString()` 将间隔设置为下个月的第二个星期二。这两个值连同重复次数\
  \ 12 以及 `DatePeriod::EXCLUDE_START_DATE` 常量一起传递给 `DatePeriod` 构造函数。这个常量的名称不言自明。最后，一个\
  \ `foreach` 循环使用 `DateTime::format()` 方法显示生成的日期。\n\n创建 `DatePeriod` 对象的第二种方式是用一个代表结束日期的\
  \ `DateTime` 对象替换第三个参数中的重复次数。`date_interval_05.php` 中的代码已修改如下：\n\n```\n$start =\
  \ new DateTime('12/31/2014');\n$interval = DateInterval::createFromDateString('second\
  \ Tuesday of next month');\n$end = new DateTime('12/31/2015');\n$period = new DatePeriod($start,\
  \ $interval, $end, DatePeriod::EXCLUDE_START_DATE);\nforeach ($period as $date)\
  \ {\n    echo $date->format('l, F jS, Y') . '<br>';\n}\n```\n\n这会产生与图 14-11 完全相同的输出。\n\
  \n你还可以使用 ISO 8601 重复时间间隔标准 ([`en.wikipedia.org/wiki/ISO_8601#Repeating_intervals`](http://en.wikipedia.org/wiki/ISO_8601#Repeating_intervals))\
  \ 来创建 `DatePeriod` 对象。这种方式不太友好，主要是因为需要按照正确的格式构造字符串，格式如下：\n\n`R` `n` `/YYYY-MM-DDTHH:MM:SS`\
  \ `tz` `/P` `interval`\n\n`R` `n` 是字母 `R` 后跟重复次数；`tz` 是相对于 UTC 的时区偏移量（或使用 `Z` 表示\
  \ UTC，如下例所示）；`P` `interval` 使用与 `DateInterval` 类相同的格式。`date_interval_06.php` 中的代码演示了如何将\
  \ `DatePeriod` 与 ISO 8601 重复间隔一起使用。代码如下：\n\n```\n$period = new DatePeriod('R5/2015-02-10T00:00:00Z/P10D');\n\
  foreach ($period as $date) {\n    echo $date->format('l, F j, Y') . '<br>';\n}\n\
  ```\n\nISO 重复间隔设置了自 2015 年 2 月 10 日 UTC 午夜开始，间隔为 10 天的 5 次重复。重复次数是在原始日期之后进行的，因此上面的示例会生成\
  \ 6 个日期，如下面输出所示。\n\n![A978-1-4842-0635-5_14_Figg_HTML.jpg](img/A978-1-4842-0635-5_14_Figg_HTML.jpg)\n\
  \n### 本章回顾\n\n本章的大部分内容都致力于介绍 PHP 5.2 和 5.3 中引入的强大日期和时间特性。我没有介绍 PHP 5.5 中引入的 `DateTimeImmutable`\
  \ 类，因为它除了一个方面之外，在其他所有方面都与 `DateTime` 相同。`DateTimeImmutable` 对象从不修改自身。相反，它总是返回一个包含修改后值的新对象。如果你有一个不会改变的日期（例如一个人的出生日期），这可能会很有用。对此类对象使用\
  \ `setDate()` 或 `add()` 方法会返回一个新对象，从而保留原始详细信息，并为更新后的信息（例如入职日期、结婚日期、退休年龄等）提供一个新对象。\n\
  \n你可能不会每天都需要使用日期和时间相关的类，但它们非常有用，并且是对原始 PHP 日期和时间函数的重大改进。MySQL 的日期和时间函数也使得根据时间条件格式化日期和执行查询变得容易。\n\
  \n也许日期最大的问题在于决定是使用 SQL 还是 PHP 来处理格式化和/或计算。PHP `DateTime` 类的一个有用特性是，其构造函数接受以 ISO\
  \ 格式存储的日期，因此你可以使用数据库中未格式化的日期或时间戳来创建 `DateTime` 对象。但是，除非你需要执行进一步的计算，否则在 `SELECT`\
  \ 查询中使用 `DATE_FORMAT()` 函数会更高效。\n\n本章还为你提供了三个用于格式化文本和日期的函数。在下一章中，你将学习如何在多个数据库表中存储和检索相关信息。\n\
  \n"
- '# 15. 从多个表中提取数据


  正如我在第 11 章中所述，关系型数据库的主要优势之一是能够通过使用一个表中的主键作为另一个表中的外键来链接不同表中的数据。`phpsols` 数据库有两个表：`images`
  和 `blog`。现在是时候添加更多表并将它们关联起来，以便你可以为博客文章分配类别，并将图像与单个文章关联。


  你并不是物理上地连接多个表，而是通过 SQL 来实现。通常，你可以通过识别主键和外键之间的直接关系来连接表。然而，在某些情况下，关系更为复杂，需要通过第三个表来作为其他两个表之间的交叉引用。


  在本章中，你将学习如何建立表之间的关系，以及如何将一个表的主键作为外键插入到另一个表中。虽然概念上听起来很困难，但实际上相当简单——你使用一个数据库查询来查找第一个表中的主键，保存结果，然后在另一个查询中使用该结果将其插入到第二个表中。


  具体来说，你将学习以下内容：


  - 理解不同类型的表关系

  - 使用交叉引用表处理多对多关系

  - 修改表结构以添加新列或索引

  - 将主键作为外键存储在另一个表中

  - 使用 `INNER JOIN` 和 `LEFT JOIN` 连接表




  '
- "# 理解表关系\n\n最简单的关系类型是一对一（通常表示为 1:1）。这种关系类型常见于包含仅供特定人员查看信息的数据库中。例如，公司通常将员工薪资详情和其他机密信息存储在一个与更广泛可访问的员工名单分开的表中。将每位员工记录的主键作为外键存储在薪资表中，可在表之间建立直接关系，从而允许财务部门查看所有信息，同时将其他人限制为仅能查看公开信息。\n\
  \n`phpsols`数据库中不包含机密信息，但你可能会在`images`表中的单张照片与`blog`表中的一篇文章之间创建一对一关系，如图 15-1 所示。\n\
  \n![A978-1-4842-0635-5_15_Fig1_HTML.jpg](img/A978-1-4842-0635-5_15_Fig1_HTML.jpg)\n\
  \n图 15-1.\n\n一对一关系将一个记录与另一个记录直接关联\n\n这是在两个表之间创建关系的最简单方式，但并非理想方案。随着更多文章的添加，关系的性质可能会发生变化。图\
  \ 15-1 中与第一篇文章关联的照片显示枫叶漂浮在水面上，因此它可能适合用来阐释一篇关于季节变换或秋日色调的文章。清澈的水、竹制水舀和竹管也暗示了这张照片可能用来阐释的其他主题。因此，你完全可能最终将同一张照片用于多篇文章，或者形成一对多（或\
  \ 1:n）关系，如图 15-2 所示。\n\n![A978-1-4842-0635-5_15_Fig2_HTML.jpg](img/A978-1-4842-0635-5_15_Fig2_HTML.jpg)\n\
  \n图 15-2.\n\n一对多关系将一个记录与多个其他记录关联\n\n正如你已经了解到的，主键必须是唯一的。因此，在`1:n`关系中，你将来自关系“`1`”侧（主表或父表）的主键作为外键存储在“`n`”侧（副表或子表）的表中。在这种情况下，来自`images`表的`image_id`需要作为外键存储在`blog`表中。关于`1:n`关系需要理解的重要一点是，它也是一组`1:1`关系的集合。从右向左阅读图\
  \ 15-2，每篇文章都与一张图片存在关系。如果没有这种一对一关系，你将无法识别出哪张图片与哪篇文章关联。\n\n如果你想为每篇文章关联多张图片，该怎么办？你可以在`blog`表中创建多个列来存储外键，但这会很快变得难以管理。你可能从`image1`、`image2`和`image3`开始，但如果大多数文章只有一张图片，那么两列在很大程度上是多余的。而且，对于那些需要四张图片的特殊文章，你是否还要额外增加一列？\n\
  \n当面临处理多对多（或 n:m）关系的需求时，你需要采用不同的方法。`images`和`blog`表没有包含足够的记录来演示`n:m`关系，但你可以添加一个`categories`表来标记单个文章。大多数文章可能属于多个分类，而每个分类也会与多个文章相关联。\n\
  \n解决复杂关系的方法是通过一个交叉引用表（有时称为链接表），它在相关记录之间建立一系列一对一关系。这是一个特殊的表，仅包含两列，且这两列都被声明为联合主键。图\
  \ 15-3 展示了这是如何工作的。交叉引用表中的每条记录都存储了`blog`表和`categories`表中单独文章之间的关系详情。要查找所有属于“`Kyoto`”分类的文章，你将`categories`表中的`cat_id\
  \ 1`与交叉引用表中的`cat_id 1`进行匹配。这将标识出`blog`表中`article_id`为`2`、`3`和`4`的记录与“`Kyoto`”相关联。\n\
  \n![A978-1-4842-0635-5_15_Fig3_HTML.jpg](img/A978-1-4842-0635-5_15_Fig3_HTML.jpg)\n\
  \n图 15-3.\n\n交叉引用表将多对多关系解析为 1:1\n\n通过外键在表之间建立关系，对你更新和删除记录的方式有重要影响。如果不够小心，你最终会遇到链接断裂的问题。确保依赖关系不被破坏被称为维护引用完整性。我们将在下一章处理这个重要主题。首先，让我们专注于从通过外键关系链接的独立表中检索信息。\n\
  \n## 将图片链接到文章\n\n为了演示如何处理多个表，让我们从图 15-1 和图 15-2 中概述的简单场景开始：通过将一个表（父表）的主键作为外键存储在第二个表（子表或依赖表）中来解决的`1:1`关系。这涉及在子表中添加一个额外的列来存储外键。\n\
  \n### 修改现有表的结构\n\n理想情况下，你应该在向数据库中填充数据之前设计好数据库结构。然而，像 MySQL 这样的关系型数据库足够灵活，允许你添加、删除或更改表中的列，即使表中已经包含记录。为了将图片与`phpsols`数据库中的文章关联起来，你需要向`blog`表添加一个额外的列来存储`image_id`作为外键。\n\
  \n#### PHP 解决方案 15-1：为表添加额外的列\n\n本 PHP 解决方案演示了如何使用 phpMyAdmin 为现有表添加额外的列。它假设你在第\
  \ 13 章中已在`phpsols`数据库中创建了`blog`表。\n\n在 phpMyAdmin 中，选择`phpsols`数据库，然后点击`blog`表的`结构`链接。在`blog`表结构下方，有一个表单允许你添加额外的列。你只需要添加一列，因此`添加字段`文本框中的默认值即可。通常的做法是将外键紧挨在表的主键之后放置，因此选择`在...之后`单选按钮，并确认下拉菜单设置为`article_id`，如下面的截图所示。然后点击`执行`。\n\
  \n![A978-1-4842-0635-5_15_Figa_HTML.jpg](img/A978-1-4842-0635-5_15_Figa_HTML.jpg)\n\
  \n这将打开一个用于定义列属性的屏幕。使用以下设置：\n\n* 名称：`image_id`\n* 类型：`INT`\n* 属性：`UNSIGNED`\n* 空值：选中\n\
  * 索引：`INDEX`\n\n不要选中`A_I`（`AUTO_INCREMENT`）复选框。你不希望`image_id`自动递增。其值将从`images`表中插入。\n\
  \n之所以选中`空值`复选框，是因为并非所有文章都会关联图片。点击`保存`。\n\n选择`结构`选项卡，确认`blog`表结构现在如下所示：\n\n![A978-1-4842-0635-5_15_Figb_HTML.jpg](img/A978-1-4842-0635-5_15_Figb_HTML.jpg)\n\
  \n如果你点击屏幕左上角的`浏览`选项卡，你将看到每条记录中`image_id`的值都是 NULL。现在的挑战是如何在不手动查找数字的情况下插入正确的外键。我们接下来将处理这个问题。\n\
  \n\n\n### 在数据表中插入外键\n\n在另一个数据表中插入外键的基本原理相当简单：你查询数据库以找到想要链接到另一条记录的主键，然后使用 `INSERT`\
  \ 或 `UPDATE` 查询将外键添加到目标记录中。\n\n为了演示这一基本原理，你将修改来自第 13 章的更新表单，增加一个下拉菜单，用于列出已在 `images`\
  \ 表中注册的图片（见图 15-4）。\n\n![A978-1-4842-0635-5_15_Fig4_HTML.jpg](img/A978-1-4842-0635-5_15_Fig4_HTML.jpg)\n\
  \n**图 15-4.** 动态生成的下拉菜单插入相应的外键\n\n该菜单通过一个循环动态生成，该循环显示 `SELECT` 查询的结果。每张图片的主键都存储在\
  \ `<option>` 标签的 `value` 属性中。提交表单后，所选值作为外键被合并到 `UPDATE` 查询中。\n\n#### PHP 解决方案 15-2：添加图片外键（MySQLi）\n\
  \n该 PHP 解决方案展示了如何通过将所选图片的主键作为外键添加，从而更新 `blog` 表中的记录。它改编自第 13 章的 `admin/blog_update_mysqli.php`。请使用你在第\
  \ 13 章中创建的版本。或者，将 `ch13` 文件夹中的 `blog_update_mysqli_03.php` 复制到 `admin` 文件夹，并从文件名中删除\
  \ `_03`。\n\n现有的用于检索待更新文章详细信息的 `SELECT` 查询需要修改，以包含外键 `image_id`，并且结果需要绑定到一个新的结果变量\
  \ `$image_id` 上。接着，你需要运行第二个 `SELECT` 查询来获取 `images` 表的详细信息。在此之前，你需要通过调用预处理语句的 `free_result()`\
  \ 方法来释放数据库资源。将以下以粗体突出显示的代码添加到现有脚本中：\n\n```\nif (isset($_GET['article_id']) && !$_POST)\
  \ {\n\n    // 准备 SQL 查询\n    $sql = 'SELECT article_id, image_id, title, article\
  \ FROM blog\n            WHERE article_id = ?';\n\n    if ($stmt->prepare($sql))\
  \ {\n        // 绑定查询参数\n        $stmt->bind_param('i', $_GET['article_id']);\n\n\
  \        // 执行查询\n        $OK = $stmt->execute();\n\n        // 将结果绑定到变量并获取\n  \
  \      $stmt->bind_result($article_id, $image_id, $title, $article);\n        $stmt->fetch();\n\
  \n        // 为第二个查询释放数据库资源\n        $stmt->free_result();\n    }\n}\n```\n\n你可以在调用\
  \ `fetch()` 方法后立即释放结果，因为结果集中只有一条记录，并且每列的值都已绑定到一个变量。\n\n在表单内部，你需要显示存储在 `images` 表中的文件名。由于第二个\
  \ `SELECT` 语句不依赖外部数据，使用 `query()` 方法比使用预处理语句更简单。在 `article` 文本区域后添加以下代码（所有代码均为新增，但为了便于参考，PHP\
  \ 部分以粗体突出显示）：\n\n```\n<p>\n    <label for=\"image_id\">已上传的图片：</label>\n    <select\
  \ name=\"image_id\" id=\"image_id\">\n        <option value=\"\">选择图片</option>\n\
  \        <?php\n        // 获取图片列表\n        $getImages = 'SELECT image_id, filename\n\
  \                      FROM images ORDER BY filename';\n        $images = $conn->query($getImages);\n\
  \        while ($row = $images->fetch_assoc()) {\n        ?>\n        <option value=\"\
  <?= $row['image_id']; ?>\"\n            <?php\n            if ($row['image_id']\
  \ == $image_id) {\n                echo 'selected';\n            }\n           \
  \ ?>>  <?= $row['filename']; ?></option>\n        <?php } ?>\n    </select>\n</p>\n\
  ```\n\n第一个 `<option>` 标签是硬编码的，标签为 `选择图片`，其 `value` 设置为空字符串。其余的 `<option>` 标签通过一个\
  \ `while` 循环填充，该循环将每条记录提取到一个名为 `$row` 的数组中。\n\n一个条件语句检查当前的 `image_id` 是否与已存储在 `articles`\
  \ 表中的相同。如果相同，则将 `selected` 插入到 `<option>` 标签中，以便在下拉菜单中显示正确的值。\n\n确保不要遗漏以下行中的第三个字符：\n\
  \n```\n?>>  <?= $row['filename']; ?></option>\n```\n\n它是 `<option>` 标签的右尖括号，夹在两个\
  \ PHP 标签之间。\n\n保存页面并在浏览器中加载。你应自动被重定向到 `blog_list_mysqli.php`。选择其中一个 EDIT 链接，确保你的页面看起来像图\
  \ 15-4。检查浏览器源代码视图，验证 `<option>` 标签的 `value` 属性是否包含每张图片的主键。\n\n**提示：** 如果 `<select>`\
  \ 菜单没有列出图片，那么几乎可以肯定是第 2 步中的 `SELECT` 查询有错误。在调用 `query()` 方法后立即添加 `echo $conn->error;`，然后重新加载页面。你需要查看浏览器源代码才能看到错误信息。如果消息是“Commands\
  \ out of sync; you can't run this command now”，问题在于未能在第 1 步中使用 `free_result()` 释放数据库资源。\n\
  \n最后阶段是将 `image_id` 添加到 `UPDATE` 查询中。由于某些博客条目可能没有关联图片，你需要创建备用的预处理语句，如下所示：\n\n```\n\
  // 如果表单已提交，则更新记录\nif (isset($_POST['update'])) {\n    // 准备更新查询\n    if (!empty($_POST['image_id']))\
  \ {\n        $sql = 'UPDATE blog SET image_id = ?, title = ?, article = ?\n    \
  \            WHERE article_id = ?';\n        if ($stmt->prepare($sql)) {\n     \
  \       $stmt->bind_param('issi', $_POST['image_id'], $_POST['title'],\n       \
  \                       $_POST['article'], $_POST['article_id']);\n            $done\
  \ = $stmt->execute();\n        }\n    } else {\n        $sql = 'UPDATE blog SET\
  \ image_id = NULL, title = ?, article = ?\n                WHERE article_id = ?';\n\
  \        if ($stmt->prepare($sql)) {\n            $stmt->bind_param('ssi', $_POST['title'],\
  \ $_POST['article'],\n                              $_POST['article_id']);\n   \
  \         $done = $stmt->execute();\n        }\n    }\n}\n```\n\n如果 `$_POST['image_id']`\
