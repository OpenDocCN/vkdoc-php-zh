    in this chapter). The tier will also accept information from the user\nthrough\
    \ interactive objects (such as text boxes and buttons). Static information can\n\
    be provided from within the tier (via menus, logos, or footers). Dynamic information\
    \ is\nusually provided to the tier from the business rules tier (such as the\n\
    output from `myfirstprogram.php`\nshown in this chapter)."
