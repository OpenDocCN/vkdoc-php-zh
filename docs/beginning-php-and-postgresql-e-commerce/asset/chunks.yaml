- fmt: '• 1: The order is verified. The administrator marks the order as `verified`
    after the payment was confirmed.


    • 2: The order is `completed`. The administrator marks the order as `completed`
    after the products have been shipped. At the same time, the `shipped_on` field
    is also populated.


    • 3: The order is `canceled`. Typically, the administrator marks the order as
    `canceled` if the order has been placed (by clicking the `Place Order` button),
    but the payment wasn’t processed, or in other scenarios that require canceling
    the order.


    > **Note** PayPal can automatically tell your web site when a payment is completed
    through the `Instant Payment Notification` feature. Using this feature can make
    things easier for the site administrator because he or she wouldn’t need to manually
    check orders for which payment was received; however, we won’t use this feature
    in HatShop because it’s too specific to PayPal. Consult the documentation of the
    payment provider you choose to check what specific features they have prepared
    for you to play with.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00153.png)


    `648XCH09.qxd 11/17/06 3:39 PM Page 308`


    **308**


    ## CHAPTER 9 ■ Dealing with Customer Orders


    ### The order_detail Table


    Let’s see what information the `order_detail` table contains. Take a look at Figure
    9-3 to see some typical `order_detail` records.


    **Figure 9-3.** *Sample data in the* `order_detail` *table* Each record in `order_detail`
    represents an ordered product that belongs to the order specified by `order_id`.


    The primary key is formed by both `order_id` and `product_id` because a particular
    product can be ordered only once in one order. A `quantity` field contains the
    number of ordered items, so it wouldn’t make any sense to have one `product_id`
    recorded more than once for one order.


    You might be wondering why the `product_id` and the `price` and product name are
    recorded in the `order_detail` table, especially because if you have the product
    id, you can get all of the product’s details from the `product` table without
    having any duplicated information.


    We chose to duplicate the product data (the product’s name and price) in the `order_detail`
    table to guard against product information changes; products can be removed from
    the database, and their name and price can change, but this shouldn’t affect the
    orders’ data.


    We store the `product_id` because apart from being the only programmatic way to
    link back to the original product info (if the product still exists), `product_id`
    is used to create the primary key of `order_detail`.


    `product_id` comes in very handy here because having it in the composite primary
    key in `order_detail` saves you from needing to add another primary key field,
    and also ensures that you won’t have the same product more than once in a single
    order.


    ### Implementing the Data Tier


    At this stage, you need to add two additional data tier functions in the `hatshop`
    database. The most important is `shopping_cart_create_order`, which takes the
    products from the shopping cart and creates an order with them. The other function
    is `shopping_cart_empty`, which empties the visitor’s cart after the order has
    been placed.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    `648XCH09.qxd 11/17/06 3:39 PM Page 309`


    **309**


    In the following exercise we’ll implement those functions starting with `shopping_cart_empty`
    because this is called from `shopping_cart_create_order`.


    #### Exercise: Implementing the Functions


    1. Load `pgAdmin III`, and connect to the `hatshop` database.


    2. Click `Tools` ➤ `Query tool` (or click the `SQL` button on the toolbar). A
    new query window should appear.


    3. Use the query tool to execute this code, which creates the `shopping_cart_empty`
    function in your `hatshop` database:


    ```sql

    -- Create shopping_cart_empty function


    CREATE FUNCTION shopping_cart_empty(CHAR(32))


    RETURNS VOID LANGUAGE plpgsql AS $$


    DECLARE


    inCartId ALIAS FOR $1;


    BEGIN


    DELETE FROM shopping_cart WHERE cart_id = inCartId;


    END;


    $$;

    ```'
