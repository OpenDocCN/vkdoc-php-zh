    can be used by setting admin to true.


    **$loginRedirect = array(''controller''=>''users'',''action''=>''index'');** This
    parameter tells Auth where to redirect the user after a successful login.


    **$loginError = ''Login failed. Invalid username or password.'';**


    09775ch11final 7/1/08 9:51 PM Page 194


    **194**


    C H A P T E R 1 1 ■ C O M P O N E N T S A N D U T I L I T I E S


    The error message displayed in the event of a login error can be customized here.


    **$autoRedirect = true;**


    If you set this parameter to false, the Auth component will not automatically
    redirect the user after authenticating. Other checks can be run in the Login action
    after a successful authentication occurs, such as writing information to or checking
    the contents of a cookie or checking other session variables.


    **$ajaxLogin = null;**


    When doing Ajax-based logins, set this preference to the view the file that should
    be displayed in the event of an unsuccessful login.


    **Session**


    The Session component handles various methods for reading, writing, starting,
    and destroying sessions.


    Some settings may be manipulated to change how Cake saves sessions in the core
    configuration. The Session.save parameter in the core configuration file contains
    one of three possibilities: php, cake, and database. By default, this value is
    set to php, which means that sessions will be saved depending on the current PHP
    settings on the host. Setting this to cake will tell Cake to write session information
    in temporary files in the app/tmp folder. The third option, database, requires
    that a table be present in the database that has corresponding fields where Cake
    can save session information. The necessary SQL statements to generate this table
    are found in the app/config/sql/session.sql file. Simply run this file through
    your database, and a default table named cake_sessions should appear with all
    the necessary fields to store session data. Other session settings that the Session
    component will use follow the Session.save preference and are fairly self-explanatory.


    Reading and Writing Session Variables


    Reading and writing variables in a session are easy with the Session component.
    In the controller, after instantiating the Session component, of course, you can
    create a new session by specifying a session name with the create() function:


    $this->Session->create(''User'');


    Now, anywhere in the application, this session can be read by using the read()
    function: $user = $this->Session->read(''User'');


    This function will produce an array that follows the typical Cake array structure,
    allowing you to pull anything you want to store in the session by calling the
    key: $password = $user[''password''];


    Writing to the session is just as simple. With the write() function, supply the
    session name and the value:


    $this->Session->write(''User'',$locale);


    09775ch11final 7/1/08 9:51 PM Page 195


    C H A P T E R 1 1 ■ C O M P O N E N T S A N D U T I L I T I E S


    **195**


    Deleting and Destroying Sessions


    The delete() and destroy() functions allow you to stop storing session information
    or kill a session entirely. With delete(), supply the name of the session key
    you want to remove. This will not completely destroy the whole session—only the
    data associated with the provided key.


    The destroy() function, on the other hand, removes all sessions for the current
    user; it’s the equivalent of PHP’s session_destroy() function.


