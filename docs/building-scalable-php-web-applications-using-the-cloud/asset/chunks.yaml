  raw: '## 4.1 Setting Up the Database Service


    Any good web application has a database. My database of choice has always been
    PostgreSQL ([`www.postgresql.org`](http://www.postgresql.org)). There is a myth
    that PostgreSQL is slow. There was some truth to that—in the 1990s.


    However, starting with PostgreSQL 7, PostgreSQL has been a top performer, and
    it just gets better with every release. Additionally, PostgreSQL has *always*
    been fantastic with complex queries, and it remains so today. PostgreSQL aims
    at no-limit programming. For instance, in a PostgreSQL text column, you can store
    up to 4 gigabytes in a single column of a single row—and still sort by it. On
    many databases, most of your time is spent making the data match the preferred
    architecture of the database. I have found that, with PostgreSQL, the database
    is much more often already ready for your own data architecture.


    While this is not a book on PostgreSQL, we will discuss a few of its features
    related to clusters of nodes.


    To install PostgreSQL, simply do the following as root (all of this section should
    be performed as the root user):


    ```

    yum install -y postgresql-server

    ```


    This will install all of the needed packages for PostgreSQL. To set up the initial
    database, type in the following:


    ```

    postgresql-setup initdb

    ```


    This creates all of the necessary directories and files for PostgreSQL to run.
    Next, we need to set up the authentication method for connecting to our PostgreSQL
    databases. PostgreSQL stores both its data and its configuration in the directory
    `/var/lib/pgsql/data`. The file which controls access to the database is `pg_hba.conf`.


    Edit that file (type `nano /var/lib/pgsql/data/pg_hba.conf`) to add the following
    two lines to the top:


    ```

    local all all trust

    host all all all md5

    ```


    The first line says to trust all connections coming in locally (i.e., not through
    the network). Therefore, we won’t need a password when dealing with the database
    directly on the command line. The second line says that anyone can connect to
    the database over the network using an appropriate password. This would be somewhat
    unsafe (we don’t want just anyone being able to connect to our database), except
    that by default the database only listens on the local address, 127.0.0.1, so
    right now you can’t connect to it from outside anyway. Be sure to save the file
    and then exit the editor.


    Note that even with the restrictions we have in place (local-only connections,
    firewalls, etc.), many people would consider the preceding configuration too exposed
    for their liking. The measures here are for balancing security and ease of learning.
    For more information about securing PostgreSQL, you should read the documentation
    on [`www.postgresql.org`](http://www.postgresql.org) about the `pg_hba.conf` file.


    Now it is time to turn on our database. To do that, enter the following:


    ```

    systemctl enable postgresql

    systemctl start postgresql

    ```


    Your database system is now up and running. You have created the database *system*,
    but not the database itself. First, however, we need a database user. The `createuser`
    command creates a new database user:


    ```

    createuser -U postgres -d -P gbuser

    ```


    The command runs as the database admin user (`-U postgres`) and creates a new
    user named `gbuser` who can create databases (`-d`) and prompts you to set a password
    for this new database user (`-P`). When it prompts you, set the password to whatever
    you want and write it down so you have it later. We will use the password `mypassword`
    where needed in this book, but note that this would be a terrible password to
    actually use in production. You will not need to use the password when using the
    command line since we have it set to `trust`, but you will need it when connecting
    from your application.


    To create a database as this user, type:


    ```

    createdb -U gbuser guestbookapp

    ```


    This creates a new database as the given database user. Now, to create the tables,
    we will need to log in to the database. The `psql` command will give you an interactive
    SQL session to your database. To use it, just type:


    ```

    psql -U gbuser guestbookapp

    ```


    The command prompt will switch to something like `guestbookapp=>`, which indicates
    you are in the database. To quit at any time, you can type `\q`. Like many of
    the system administration commands, PostgreSQL doesn’t really care where in the
    filesystem you are when you run its commands. It is communicating to a database
    service, which is running in its own directory.


    Now that we are connected to the database, we will create a single table using
    this command:


    ```

    create table gb_entries(id serial primary key, name text, email text, message
    text, created_at timestamp,

    has_img bool default false);

    ```


    The `id` field was created with type `serial`, which is PostgreSQL’s mechanism
    for autonumbering. To view the table you just created, type `\d gb_entries`. When
    you are done, exit out of the database by entering in `\q`.'
