    charset


    This function outputs the HTML <meta> tag, specifying the character set for the
    page. Using this function generally occurs in a layout file.


    **charset( charset[string] )**


    charset = null: The character set to be used in the <meta> tag For example, the
    following:


    <?=$html->charset(''UTF-16'');?>


    will output this:


    <meta http-equiv="Content-Type" content="text/html; charset=UTF-16"/> The default
    character set can be specified in the app/config/core.php file. Change the App.encoding
    setting on or near line 47 following the standard HTML character set specifications.
    (For your information, a list of registered character set values is available
    from the World Wide Web Consor[tium at www.w3.org/International/O-charset-lang.html.)
    The](http://www.w3.org/International/O-charset-lang.html) App.encoding value is
    originally set to UTF-8.


    css


    This function outputs a tag for including a style sheet. Generally, CSS files
    are stored in the app/webroot/css directory and are made available by using the
    CSS function as described in this section. A <link> or <style> tag is returned
    depending on the values specified in the parameters.


    **css( path[mixed], rel[string], attributes[array], inline[bool] )**


    path: The name of the style sheet (excluding the .css extension) or an array of
    multiple style sheets in the app/webroot/css directory.


    rel = ''stylesheet'': The rel attribute; if set to import, then the function will
    return the


    @import link in the <style> tags rather than the <link rel=''stylesheet''> tag.


