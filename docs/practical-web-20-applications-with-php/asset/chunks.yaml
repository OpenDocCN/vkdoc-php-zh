    ■**Note** This example might be slightly confusing, since you observe the window
    element in Event.observe(), whereas the inline version was in the body tag. Technically
    speaking, when using


    <body onload="">, this event is being attached to the window DOM element. Also,
    the reference to the something function is a function pointer, so you don’t include
    the brackets; if you did, it would mean the result of the something() function
    would be used as the third argument.


    Note that you can also call the observe() function directly on an element. In
    this case, you omit the first argument. For instance, you might add an image to
    your web page with the following HTML code:


    <img src="image.jpg" id="my-image" />


    You can observe the onclick event on this image by using Event.observe() as you
    saw already:


    Event.observe(''my-image'', ''click'', something);


    Or you can first retrieve the element and then call observe() on it:


    $(''my-image'').observe(''click'', something);


    **Finding Out Which Element an Event Occurred On**


    When a function is triggered by an event occurring, the event object is passed
    in as the first argument to the callback. This lets you find out certain things
    about the event, such as the element on which the event occurred (so if the onclick
    event was observed on several elements, you could find out exactly which element
    was clicked on).


    To find the element, you call the Event.element() function. I’ll use the example
    of clicking on an image:


    <img src="image.jpg" id="my-image" />


    <script type="text/javascript">


    $(''my-image'').observe(''click'', something);


    </script>


    Next I can write the something() function, which is called when the image is clicked.
    I assume the first argument will be the event (which I like to simply call e).
    I can then pass e to Event.element() to return the image element.


    <script type="text/javascript">


    function something(e)


    {


    var img = Event.element(e);


    }


    </script>


