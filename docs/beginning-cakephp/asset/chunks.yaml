    **40**


    C H A P T E R 4 ■ N A M I N G F I L E S A N D D E S I G N I N G T H E D ATA B
    A S E


    On the other hand, a good database design would separate different categories
    of data into different tables. There would be a table for profiles, another for
    books, and another for users. The users table would store some basic information
    such as a username and password as well as an e-mail address. As users interact
    with others through the site, they could select other users to be their friends,
    and rather than saving that association as a field in the profiles table, another
    table could store the associations. A profile would be able to display any number
    of books in the books table by storing the associations in a separate table like
    the users’ friends. In this way, the database stores *associations* as well as
    individual records. This fact is important for Cake development because of how
    it separates data into categories and allows for associations to exist between
    categories. Cake’s fundamental design of separating various operations into different
    areas allows for tighter control of each of these tables in controllers, models,
    and views of their own.


    **Feature Creep and Cake**


    Consider the phenomenon of *feature creep* before designing the database. Feature
    creep occurs when a project is under way and contributors to the project realize
    potential for new features based on existing features in the uncompleted project.
    Before long, the contributors end up requesting so many features that the project
    becomes much more complicated than at the outset.'
  trans: '

    `routes.php`文件。在这种情况下，最好先按照约定构建数据库，然后进入`routes.php`文件，创建一些指向相应控制器的 URL 别名。你可以在数据库中创建一个名为`posts`的表来存储所有博客文章，并在`posts_controller.php`文件中编写一个动作，从
    URL 中提取日期并为检索到的文章渲染视图。然后，在`routes.php`中，你可以为所有以`/view`开头的 URL 字符串编写一个路由，使其指向`Posts`控制器并传递日期参数。如果现在这听起来不太明白，别担心——你将在第
    10 章中更详细地了解 Cake 的路由可能性。只需确保在考虑如何命名数据库表以及相应的控制器和模型时，首先坚持约定。之后，你可以使用路由来确保 URL 的结构符合你的喜好。


    ## 以人为本命名动作


    动作出现在控制器中，执行遵循 PHP 函数语法的一系列操作。它们还会与视图文件链接，将输出渲染到浏览器。了解动作名称在 URL 中如何显示，对于决定如何在控制器中命名函数非常重要。对于旨在用户友好且针对搜索引擎优化的网站，其动作名称可能比仅供应用程序内部使用的引用名称更重要。


    命名控制器动作的一个好经验法则是：像要在电话中拼写出来一样命名。例如，包含大量非字母数字字符（如下划线和破折号）的电子邮件地址，在向他人拼写时会令人沮丧。简洁为上，尤其是当名称将出现在通过口头交流、纸质媒介或搜索引擎反复提及的
    URL 中时。


    ## 谨慎使用 PHP 函数名作为动作名


    另一个要点是，动作可能与 PHP 函数存在名称冲突。例如，将动作命名为`date`会与 PHP 的`date()`函数冲突。通常，你可以通过命名那些对动作要执行的通用逻辑具有专指性的动作来避免此问题。当该逻辑恰好与其它
    PHP 函数中的逻辑类型相符时，实际上只需逐个尝试动作，看它是否与 PHP 冲突。许多 PHP 编辑程序会用不同的颜色高亮显示 PHP 函数，这也有助于在尝试动作名称时进行判断。


    **40**


    **设计不良的数据库**


    雄心勃勃的 Web 应用程序无疑需要复杂的数据库设计。开发者常常试图将所有数据塞进一个字段，而不在表之间建立关联。或者，有些开发者不存储指向另一个表中记录的引用，而是编写脚本将信息写入文本字段。更糟的是，有些开发者在网站的
    HTML 中编写静态列表，并根据列表在应用程序中出现的位置手动更改列表。这些方法不仅使应用程序代码的更新更加繁琐且可移植性差，而且不符合 Cake 快速开发方法的范式。设计不良的数据库会对
    Cake 的快速开发特性产生不利影响，导致错误或死胡同，从而浪费时间，迫使你适应一个糟糕的数据库。


    **为什么良好的数据库设计很重要**


    Cake 的许多快速开发功能源于与数据库设计紧密相关的约定。良好的数据库设计不仅对脚手架功能或 Cake 控制台至关重要，它更是 Cake 数据处理的核心与基石。


    不同类型数据之间的交互将影响在整个应用程序中使用这些数据所需的时间。理论上，数据库应将数据分为相互协作的类别，而不是由 MVC 结构将操作的角色分离到不同的区域。


    Cake 的命名约定和模型函数依赖于数据库范式化的过程。范式化是一种设计关系型数据库表的技术，旨在最小化数据冗余并保护数据库免受结构性问题的影响。通过规范化数据库，你可以生成一个有效的模式，从而改进
    Cake 应用程序，并避免可能导致数据处理错误的数据异常。


    为了对比设计不良与良好的数据库设计，或者说，解释为什么数据库范式化如此重要，我将讨论一个社交网络应用程序的场景。对于为用户提供个人网页的网站，需要存储大量数据。一个设计不良的数据库会为每个用户的个人资料创建一个记录，并为个人资料中的每个项目设置一个字段：用户名、电子邮件地址、主页地址、喜爱的书籍
    1、喜爱的书籍 2、图片、头像尺寸图片、标语、描述、朋友 1、朋友 2，等等。当通过 URL 获取用户个人资料时，一个糟糕的数据库不会有任何类型的唯一 ID，因此记录会通过用户名来提取。


    这种场景是有问题的，因为字段数量是静态的。用户无法添加超过两本书或两个朋友，除非开发者手动添加更多字段。而且，随着开发者向应用程序添加更多功能，字段数量会迅速膨胀。大量的字段会使后端数据库维护变得令人沮丧。像`favorite_book_1`这样的字段名很笨拙，并且在处理数据时使得代码组织更加困难。此外，如果没有唯一标识符来区分个人资料记录，则存在用户名可能重复的可能性，从而破坏旨在获取用户个人资料的查询。理论上，如果没有记录的某种唯一标识符，该记录可能会永久丢失在数据库中而无法检索。


    **40**


    另一方面，一个良好的数据库设计会将不同类别的数据分离到不同的表中。会有一个`profiles`表，一个`books`表，以及一个`users`表。`users`表会存储一些基本信息，如用户名、密码以及电子邮件地址。当用户通过网站与他人互动时，他们可以选择其他用户作为朋友，并且不是将这种关联保存为`profiles`表中的一个字段，而是由另一个表来存储这些关联。一个个人资料可以通过在像用户朋友这样的单独表中存储关联，来显示`books`表中的任意数量的书籍。通过这种方式，数据库既存储了*关联*，也存储了单独的记录。这一点对于
    Cake 开发很重要，因为它将数据分为不同的类别，并允许类别之间存在关联。Cake 将各种操作分离到不同区域的基本设计，允许在其各自的控制器、模型和视图中对这些表进行更紧密的控制。


    ## 特性蔓延与 Cake


    在设计数据库之前，请考虑*特性蔓延*的现象。特性蔓延发生在项目进行过程中，项目贡献者意识到基于未完成项目中的现有特性，可以添加新特性。不久，贡献者最终会要求如此多的特性，以至于项目比最初复杂得多。

    '
- fmt: "`Cake` 将有助于应对功能蔓延，因为它将特定功能划分到了专门的区域。然而，如果数据库本身不具备处理功能蔓延的能力，那么日后利用`Cake`的灵活性可能并不可行，甚至可能需要重写整个应用。关键在于设计数据库时，应使用关联（associations）而非为所有数据类别设置单独的字段。`Cake`能出色地处理关联，并会显著减少处理复杂数据结构所需的数据库查询量。\n\
    \n## 表关联\n\n一个能很好展示`Cake`快速开发功能和表关联的优秀 Web 应用是博客。在这里，你将使用脚手架（scaffolding）功能构建一个简单的博客应用来测试关联。之后，你将扩展这个博客以融入更强大的功能。掌握表关联及其在`Cake`中的工作方式，对于引入对复杂网站至关重要的高级功能必不可少。一个简单的博客应用程序将帮助我们以更简单的方式讨论表关联，并且如果你不熟悉表关联，它应该能帮助你更好地掌握`Cake`的使用。\n\
    \n在你的本地主机根目录下创建一个名为`blog`的新`Cake`应用。它应包含标准的`Cake 1.2`库和文件夹。在构建这个博客的过程中，请记住如何在浏览器中启动该应用。我会引用一个控制器，你可以通过在\
    \ URL 中使用正确的字符串调用它来执行，例如`http://localhost/blog/posts`。\n\n## 数据库设计\n\n在博客的数据库中创建三个表：`posts`、`comments`和`users`。清单\
    \ 4-3 包含了用于在这些表中创建字段的 MySQL 查询。\n\n**清单 4-3.** *SQL 表结构*\n\n```sql\nCREATE TABLE\
    \ `posts` (\n  `id` int(11) unsigned NOT NULL auto_increment,\n  `name` varchar(255)\
    \ default NULL,\n  `date` datetime default NULL,\n  `content` text,\n  `user_id`\
    \ int(11) default NULL,\n  PRIMARY KEY (`id`)\n);\n\nCREATE TABLE `comments` (\n\
    \  `id` int(11) unsigned NOT NULL auto_increment,\n  `name` varchar(100) default\
    \ NULL,\n  `content` text,\n  `post_id` int(11) default NULL,\n  PRIMARY KEY (`id`)\n\
    );\n\nCREATE TABLE `users` (\n  `id` int(11) unsigned NOT NULL auto_increment,\n\
    \  `name` varchar(100) default NULL,\n  `email` varchar(150) default NULL,\n \
    \ `firstname` varchar(60) default NULL,\n  `lastname` varchar(60) default NULL,\n\
    \  PRIMARY KEY (`id`)\n);\n```\n\n`users`表将包含博客文章可用作者的运行列表。当创建一篇文章时，它将被分配一个来自`users`表的作者。请注意，在`posts`表中有一个名为`user_id`的字段。这将与`users`表中的`id`字段匹配，从而将作者链接到文章。同样，在`comments`表中，每条评论将以相同方式归属于一篇文章。在这种情况下，有一个名为`post_id`的字段，它将与`posts`表中的`id`字段匹配。\n\
    \n在模型中，你将明确指定这些关联，以便`Cake`能将它们组合在一起。更重要的是，你可以使用脚手架功能来测试你指定关联的程度。如前所述，`Cake`应用构建的一个主要理念是从`Cake`对象开始，然后逐步构建。通常，你会先设计数据库结构，在脚手架中测试它们的关联，然后用自己的代码来增强应用。\n\
    \n## 属于（Belongs To）\n\n在关联表时，你需要告诉`Cake`每个表与其他表之间的关系类型。这个博客将在几个表中建立“属于”关系。首先，由于每篇博客文章都会有一个指定的作者，因此每篇博客文章“属于”一个用户。换句话说，`posts`表“属于”`users`表。你已经在`posts`表中放置了一个`user_id`字段，作为保存这种关系的方式。对于`posts`表中的每条记录，将通过分配`users`表中某个记录的\
    \ ID 到`user_id`来保存该记录。"
  raw: 'Cake will help with feature creep because of the specific areas that are devoted
    to specific functions. However, if the database is not equipped to handle feature
    creep, then taking advantage of Cake’s flexibility later might not be possible
    and may necessitate rewriting the application. The trick is to design the database
    to use associations rather than individual fields for all categories of data.
    Cake handles associations wonderfully and will dramatically reduce the amount
    of database querying required to handle complex data structures.


    **Table Associations**


    A good web application that illustrates Cake’s rapid development functionality
    and table associations is a blog. Here, you will build a simple blog application
    using the scaffolding feature to test associations. Later, you’ll expand the blog
    to take on more powerful features. Mastering table associations and how they work
    in Cake is essential for pulling in advanced features that matter for complex
    web sites. A simple blog application will help us discuss table associations in
    an easier way and should help you if you’re unfamiliar with table associations
    to be better equipped to use Cake.


    Create a new Cake application in your localhost root named blog. It should have
    the standard Cake 1.2 libraries and folders inside. As you walk through building
    this blog, remember how to launch the application in the browser. I’ll reference
    a controller, and that will be executed by calling it in the URL with the correct
    string, like [http://localhost/blog/posts.](http://localhost/blog/posts)


    **The Database Design**


    Create three tables in the blog’s database: posts, comments, and users. Listing
    4-3 contains the MySQL query to create fields in the tables.


    09775ch04final 7/1/08 9:40 PM Page 41


    C H A P T E R 4 ■ N A M I N G F I L E S A N D D E S I G N I N G T H E D ATA B
    A S E


    **41**


    **Listing 4-3.** *The SQL Table Structures*


    CREATE TABLÈposts` (


    ìdìnt(11) unsigned NOT NULL auto_increment,


    `namè varchar(255) default NULL,


    `datè datetime default NULL,


    `content` text,


    ùser_idìnt(11) default NULL,


    PRIMARY KEY (ìd`)


    );


    CREATE TABLÈcomments` (


    ìdìnt(11) unsigned NOT NULL auto_increment,


    `namè varchar(100) default NULL,


    `content` text,


    `post_idìnt(11) default NULL,


    PRIMARY KEY (ìd`)


    );


    CREATE TABLE ùsers` (


    ìdìnt(11) unsigned NOT NULL auto_increment,


    `namè varchar(100) default NULL,


    èmail` varchar(150) default NULL,


    `firstnamè varchar(60) default NULL,


    `lastnamè varchar(60) default NULL,


    PRIMARY KEY (ìd`)


    );


    The users table will contain a running list of available authors of blog posts.
    When a post is created, it will be assigned an author from the users table. Notice
    that there is a field in the posts table named user_id. This will match up with
    the id field in the users table, thus linking an author to the post. Also, in
    the comments table, each comment will be assigned to a post in the same manner.
    In this case there is a field named post_id, which will match up with the id field
    in the posts table.


    In the models, you will spell out these associations so Cake can pull them together.
    What’s more, you can test how well you’ve specified the associations using the
    scaffolding feature. As noted earlier, one main idea in Cake application building
    is to start with the Cake objects and build out. In general, you will design your
    database structure first, test their associations in the scaffolding, and then
    build out with your own code to enhance the application.


    **“Belongs To”**


    When associating tables, you need to tell Cake what type of relationship each
    table has with the others. This blog will have a “belongs to” relationship in
    a couple of tables. First, since each blog post will have an assigned author,
    each blog post “belongs to” one user. In other words, the posts table “belongs
    to” the users table. You have placed a user_id field in the posts table as a way
    to save this relationship. For each record in the posts table, one of the records
    from the users table will be saved by assigning one of its IDs to user_id.'
