- fmt: "当程序结束时（无论是正常结束还是崩溃），操作系统会清理该程序使用的内存，并将其提供给下一个可能需要它的程序。实际上，从技术上说，操作系统只是在内存位置设置一个*标志*（位），将其标记为可用。当另一个程序或数据存储到这些位置时，旧的0和1会被覆盖。由于新代码或数据将被放置到该位置，因此在使用前无需清空该位置，覆盖掉旧内容即可。\n\
    \n让我们看看操作系统为帮助程序运行所做的最后一件事情。操作系统是一个*任务管理器*，它决定程序在停止或中断之前可以运行多长时间以及何时运行。让我们通过一个快速练习来查看正在运行的任务。\n\
    \n**练习**：找到您操作系统的任务管理器。您可以在计算机上搜索“任务管理器”，如果您使用的是Microsoft Windows机器，可以同时按下`ctrl`（键盘左下角）、`alt`（键盘左下角）和`delete`（键盘右上角）键，然后在弹出的列表中点击“任务管理器”。\n\
    \n您的任务管理器应该类似于图[1-1](#323857_3_En_1_Chapter.xhtml#Fig1)。显示的图表提示了操作系统在计算机上维护的许多任务，它正在管理CPU、内存、磁盘和网络的使用情况，这包括我们正在使用的任何应用程序（如Microsoft\
    \ Word）。其他我们可能直接使用或未直接使用的程序也在后台运行（例如Amazon Photos）。正如任务管理器中的选项卡或图[1-1](#323857_3_En_1_Chapter.xhtml#Fig1)所示，操作系统还管理性能和其他服务。\n\
    \n![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig1_HTML.jpg)\n\n该图像反映了计算机上的任务管理器对话框，显示所有正在运行的应用程序和后台进程。\n\
    \n**图 1-1** 任务管理器\n\n当我们启动一个程序时，如前所述，系统将为该程序确定内存使用量和内存位置。它还会确定程序在停止或中断之前运行多长时间以及何时运行。系统会确定程序的*优先级*（像操作系统这样的系统程序具有最高优先级）以及允许程序运行的时间片大小。系统的算法在确定程序的*运行时间*方面非常精确。然而，外部因素可能会减慢程序速度，例如紧急的系统问题（可能是内存不足）。必要时，操作系统可以对您的程序进行*交换*以运行其他更高优先级的程序。但通常情况下，因为一切执行速度极快，我们甚至不会注意到。\n\
    \n> **注意**\n> \n> 如果您已经使用计算机一段时间，您可能遇到过某些应用程序似乎永远无法正常工作（看起来像挂起）的情况。这可能是由内存（或存储）短缺引起的，系统试图通过将程序换入换出内存来共享有限的可用内存来解决这个问题。然而，这可能导致系统花费大量时间进行交换，而留给应用程序运行的时间很少。关注您要安装的任何应用程序高效运行所需的内存量（和存储量）非常重要。否则，不仅您的应用程序可能无法正常运行，而且持续的交换可能会拖慢您的计算机，导致所有程序都无法正常运行。\n\
    \n关于计算机如何运作这个话题，我们只是触及了广阔海洋的表面。有许多书籍、视频和课程可以帮助您获得更深入的理解。然而，我们的目标是让我们掌握足够的关于这一切如何影响我们创建的任何程序的知识。幸运的是，我们已经建立了这方面的基本理解，那么让我们继续下一个主题。\n\
    \n## 为什么要从PHP开始？\n\n这确实是一个非常好的问题。有很多编程语言可供我们选择。为什么选择`PHP`作为我们的第一门语言体验？首先，`PHP`是比较容易学习的语言之一。仅凭一些基本命令和概念，您就能完成很多工作。它是最流行的语言之一，因为它能够管理网页和应用程序。它通常被认为是成为*全栈开发者*所需的技能之一。\n\
    \n> **注意**\n> \n> 全栈开发者既了解Web应用程序的前端（显示给用户的网页），也了解后端（存在于Web服务器上供网页使用的代码）。他们掌握前端工具的知识，如`HTML`、`CSS`和`JavaScript`。他们拥有使用能够支持后端的Web页面的语言（如`PHP`和`Java`）的经验。他们还可能使用其他工具来管理开发周期。\n\
    \n随着*PHP 8*的出现，该语言在操作和计算效率上比以往任何时候都高。虽然在本书编写时，由于先前的限制，`PHP`并不以开发游戏平台或大数据操作而闻名，但最新版本的效率可能很快让这成为现实。已经有一些团体开始使用`PHP`开发智能手机应用程序。但即使它永远不会成为游戏平台，仅通过托管网页和创建应用程序，`PHP`也有大量的工作要完成。\n\
    \n**练习**：`PHP`还活着并且发展良好吗？不要相信我们的话。去您最喜欢的搜索引擎并提问：“谁在使用`PHP`？”或者“`PHP`还活着且发展良好吗？”您找到了什么？答案应该告诉您：“是的，`PHP`还活着且发展良好”以及“很多组织都在使用`PHP`。”目前有哪些组织在使用`PHP`？他们用它来做什么？`PHP`的未来是怎样的？您会发现，除了Web应用程序之外，目前在创建大数据仪表盘、智能手机应用程序和游戏应用程序方面也有开发。小心点，`Python`，`PHP`可能正在抢你的饭碗！"
  raw: 'When a program ends (either because it is done or has crashed), the operating
    system will clean up the memory the program used and make it available for the
    next program that may need it. Actually, technically, it just sets a *flag* (bit)
    in the memory locations which declares them as available. When another program
    or data is stored in these locations, the old 0s and 1s are written over. It’s
    not necessary to empty out the location before using it again because new code
    or data will be placed in that location. Thus, overwriting it anyway.


    Let’s look at one final thing that an operating system does to help our program.
    The operating system is a *task manager* . It decides on when and how long our
    program can run before it stops or gets interrupted. Let’s do a quick exercise
    to look at tasks running.


    **Exercise**: Locate the task manager for your operating system. You can do a
    search on your computer for “task manager,” or if you are using a Microsoft Windows
    machine, you can click the ctrl (lower left of keyboard), alt (lower left of keyboard),
    and delete (upper right of keyboard) keys at the same time. Then click “task manager”
    on the list that appears.


    Your manager should be similar to Figure [1-1](#323857_3_En_1_Chapter.xhtml#Fig1).
    The chart presented gives us a hint of many tasks the operating system is maintaining
    on our computer. It is managing CPU, memory, disk, and network usage. This includes
    any applications we are using (like Microsoft Word). Other programs, which we
    may or may not have directly used ourselves, are also running in the background
    (such as Amazon Photos). As the tabs in your manager or in Figure [1-1](#323857_3_En_1_Chapter.xhtml#Fig1)
    indicate, the operating system also manages performance and other services.


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig1_HTML.jpg)


    This image reflects the task manager dialer on a computer, it indicates what are
    all the applications are running and the background processes.


    Figure 1-1


    Task manager


    When we start a program, as stated before, the system will determine memory usage
    and memory location for the program. It will also determine when and how long
    the program will run before it stops or is interrupted. The system determines
    the *priority* of the program (system programs like the operating system itself
    have the highest priority ) and how much of a time slice it will allow for the
    program to run. The system’s algorithms are very accurate in determining *runtimes*
    for programs. However, outside factors can slow a program down, such as emergency
    system problems (might be a memory shortage). The operating system can *swap*
    out your program when necessary to run other programs with higher priority. But,
    normally, we never even notice because everything executes extremely fast.


    Note


    If you have been using computers for a while, you may have experienced using applications
    that never seem to work (they seem to be hung). This could be caused by a shortage
    of memory (or storage), which the system is trying to resolve by swapping programs
    in and out of memory to share what limited memory is available. However, it can
    cause the system to spend a lot of time swapping and allowing very little time
    for the application to run. It’s important that you pay attention to the amount
    of memory (and storage) any application you install will need to run efficiently.
    Otherwise, not only might your application not run properly, but it could tie
    up your computer with constant swapping, so nothing will run properly.


    We have only skimmed the surface of a very deep ocean when talking about how computers
    operate. There are many books, videos, and courses you can discover which can
    provide a much deeper understanding. Our goal, however, is to give us enough knowledge
    on how all of this affects any program we create. Hopefully, we have built a basic
    understanding of this, so let’s move on to another subject.


    Why start with PHP?


    A very good question indeed. There are a lot of programming languages that we
    could choose. Why select PHP as our first experience? First, PHP is one of the
    easier languages to learn. You can accomplish a lot with just some basic commands
    and concepts. It is one of the more popular languages used because it can manage
    web pages and applications. It is commonly considered one of the skills needed
    to become a *full stack developer* .


    Note


    A full stack developer understands both the front end of a web application (the
    web page displayed to the user) and the back end (code used by the web page existing
    on the web server). They have knowledge of front-end tools, such as HTML, CSS,
    and JavaScript. They have experience using languages that can support the web
    page on the back end (such as PHP and Java). They also may use additional tools
    to manage the development cycle.


    With *PHP 8*, the language has become much more efficient in operation and in
    computations than ever before. While, as of the creation of this book, PHP is
    not known as a language for developing gaming platforms or big data operations
    due to its previous limitations, the efficiency of the newest versions could soon
    make this a reality. There are some groups beginning development of smartphone
    applications using PHP. But even if it never becomes a gaming platform, there
    is plenty of work for PHP to accomplish by just hosting web pages and creating
    applications .


    **Exercise**: Is PHP alive and well? Don’t believe us. Go to your favorite search
    engine and ask the following question: “Who uses PHP?” or “Is PHP alive and well?”
    What did you find? The answer should tell you, “Yes, PHP is alive and well” and
    “Lots of organizations use PHP.” What organizations are currently using PHP? What
    are they using it for? What does the future hold for PHP? You will discover that
    there is current development in creating big data dashboards, smartphone applications,
    and gaming applications, along with web applications. Lookout Python, PHP might
    be after your job!'
