    \n648XCH07a.qxd 10/25/06 10:56 PM Page 214\n\n**214** C H A P T E R 7 ■ C ATA\
    \ L O G A D M I N I S T R AT I O N\n\n**Figure 7-8.** *The login page*\n\nAfter\
    \ you supply the correct login info (`hatshopadmin/hatshopadmin`), you’ll be redirected\
    \ to the catalog admin page. Currently the catalog admin page contains only the\
    \ main menu but we’ll change this immediately.\n\n## How It Works: The admin Page\n\
    \nSo far, you’ve created the `admin.php` that you’ll continue to develop in the\
    \ rest of the chapter to allow the user to administer catalog data and the `admin_login`\
    \ componentized template that contains the admin authentication and authorization\
    \ functionality.\n\nAll the fun begins in `admin.php`, which checks to see whether\
    \ the visitor has been authenticated as administrator (by checking whether the\
    \ `admin_logged` session variable is true). If the visitor is not logged in as\
    \ administrator, the `admin_login` componentized template is loaded:\n\n```\n\
    // If admin is not logged, assign admin_login template to $pageContentsCell\n\
    if (!(isset ($_SESSION['admin_logged'])) || $_SESSION['admin_logged'] != true)\n\
    \    $pageContentsCell = 'admin_login.tpl';\n```\n\nThe login mechanism in the\
    \ `AdminLogin` helper class stores the current authentication state in the visitor’s\
    \ session under a variable named `admin_logged`. In the `__construct` function,\
    \ we test whether the supplied username and password match the values stored in\
    \ `config.php` as `ADMIN_USERNAME` and `ADMIN_PASSWORD`; if they match, we set\
    \ the value of `admin_logged` to true and redirect to `admin.php`:\n\n```\n//\
    \ Verify if the correct username and password have been supplied\nif (isset ($_POST['submit']))\n\
    {\n    if ($_POST['username'] == ADMIN_USERNAME\n        && $_POST['password']\
    \ == ADMIN_PASSWORD)\n    {\n        $_SESSION['admin_logged'] = true;\n     \
    \   header('Location: admin.php');\n        exit;\n    }\n    else\n        $this->mLoginMessage\
    \ = 'Login failed. Please try again:';\n}\n```\n\nThe logout link in `admin_menu.tpl`\
    \ simply unsets the `admin_logged` session variable in `admin.php` and redirects\
    \ the administrator to `index.php`. This way, on the next attempt to access the\
    \ admin page, the administrator will be redirected to the login page.\n\n```\n\
    // If loggin out ...\nif (isset ($_GET['Page']) && ($_GET['Page'] == 'Logout'))\n\
    {\n    unset($_SESSION['admin_logged']);\n    header('Location: admin.php');\n\
    \    exit;\n}\n```\n\n## Administering Departments\n\nThe department administration\
    \ section allows the client to add, remove, or change department information.\
    \ To implement this functionality, you’ll need to write the necessary code for\
    \ the presentation, business, and data layers.\n\nOne fundamental truth regarding\
    \ *n*-Tiered applications (which also applies to this particular case) is that\
    \ the business and data tiers are ultimately created to support the presentation\
    \ tier. Drawing on paper and establishing exactly how you want the site to look\
    \ (in other words, what functionality needs to be supported by the UI) is a good\
    \ indication of what the database and business tier will contain.\n\nWith the\
    \ proper design work, you can know exactly what to place in each tier, so the\
    \ order of writing the code doesn’t matter. When the design is clearly established,\
    \ a team of programmers can work at the same time and implement the three tiers\
    \ concurrently, which is one of the benefits of having a tiered architecture.\n\
    \nHowever, this rarely happens in practice, except for the largest projects that\
    \ really need very careful design and planning. In our case, usually the best\
    \ way is to start with the lower levels (the database and data object) to have\
    \ the basics established before creating the UI.\n\nFor this to happen, first\
    \ you need to analyze what functionality you’ll need for the UI; otherwise, you\
    \ won’t know what to write in the data and business tiers."
