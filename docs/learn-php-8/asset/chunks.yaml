    安全性与性能——`__toString` 方法会将其返回的任何内容“暴露”给任何创建了该函数所在类实例的程序。使用此方法传递错误消息可能让黑客判断出他们正在向程序发送何种错误信息。在第
    5 章的 `dog.class` 示例中，`__toString` 返回了包含 `''TRUE''` 或 `''FALSE''` 响应的 `error_message`
