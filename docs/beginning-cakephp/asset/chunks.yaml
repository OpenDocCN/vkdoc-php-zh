    Name Actions for People, Not Code


    Actions appear in controllers and perform a set of operations that follow PHP
    syntax for functions. They also will link up with a view file to render output
    to the browser. Knowing how the action name might appear in a URL is important
    when deciding on how to name functions in the controller. For web sites that aim
    to be user-friendly and optimized for search engines, their action names might
    be more important than an internal reference name for the application alone.


    A good rule of thumb for naming controller actions is to write names as if you
    had to spell it out over the phone. E-mail addresses with lots of nonalphanumeric
    characters (such as underscores and dashes), for instance, are frustrating when
    spelling them out to someone. Simplicity is best especially when the name will
    appear in a URL that will be repeated through verbal communication, on paper,
    or for a search engine.


    Be Careful Using PHP Function Names as Action Names


    Another important point is that actions can have conflicting names with PHP functions.


    Naming an action date, for instance, would conflict with the PHP date() function.
    Generally, you can get around this problem by naming actions that are specific
    to the general logic the action will perform. When that logic does coincide with
    the kind of logic found in other PHP


    functions, it’s only really a matter of trying the action on a case-by-case basis
    to see whether it conflicts with PHP. Many PHP editing programs highlight PHP
    functions with a different color, which may also help when trying action names.


