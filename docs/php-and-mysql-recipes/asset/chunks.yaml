    ### 配方 8-7 颜色变换


    #### 问题


    在处理图片（从零创建或对现有图片进行编辑）时，需要定义添加到图片中对象所使用的颜色。


    #### 解决方案


    位图通常由像素表示，每个像素被赋予一种颜色及可能的透明/不透明度。根据图片格式和压缩方式，颜色处理方式有所不同。`gd` 扩展使用内部 GD/GD2 格式表示图片，在生成最终输出图片时再转换为目标格式。


    在 GD 格式中，每种颜色都存储在调色板中，通过索引指向特定颜色。为图片像素添加颜色时，只需指定使用某个索引。如果之后要更改所有使用该颜色的像素，只需修改该索引对应的颜色即可。


    基于此原理，使用颜色前需先在调色板中分配颜色。若使用现有图片，调色板会初始化所有已用颜色；若从零创建，则调色板为空。常用的颜色分配与释放函数有三个：`ImageColorAllocate()`、`ImageColorAlocateAlpha()`
    和 `ImageColorDeallocate()`。第一个分配的颜色将作为图片背景色。如配方 8-1 所示，用 `ImageCreate()` 创建空白图片时，背景色默认为黑色，除非通过分配函数定义。分配函数使用三个
    0 到 255 的整数值分别表示红、绿、蓝分量。若分配带 alpha 透明度的颜色，还需第四个值（0 到 127）表示透明度，其中 0 为完全不透明，127
