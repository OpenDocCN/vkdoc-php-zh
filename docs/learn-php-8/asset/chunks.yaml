- fmt: "文本框名称（`customername`）以及在该文本框中输入的值（`Fred`）现在显示在 URL 行上。实际上，`customername`现在是一个参数，而`Fred`是该参数的值。这是使用\
    \ GET 过程的结果。\n\n当我们点击 Google 搜索按钮或我们简单示例中的搜索按钮时，请求的信息会通过 GET HTTP 过程发送。接收程序所需的所有信息（和参数）都通过实际的\
    \ URL 行发送，以供 Web 服务器上的程序接收并处理初始请求。\n\n为什么 Google 搜索引擎通过 GET 而不是 POST（POST 会隐藏信息）发送信息？主要原因是为了节省服务器内存。试想一下\
    \ Google 每天要处理数百万的信息请求。如果所有这些请求都驻留在内存中，服务器很快就会崩溃。此外，由于用户是在进行“公开”信息搜索，因此没有理由隐藏这些信息。在后面的章节中，我们将了解如何在\
    \ PHP 程序中读取 GET 和 POST 参数。\n\n现在，让我们回到关于 Apache、PHP 和 DBMS 的讨论中。PHP 可以访问多种 DBMS\
    \ 系统中的信息，包括 Oracle 和 SQL Server。然而，最流行的组合（如前所述）是将 PHP 与 MySQL 或 MariaDB 配对使用。我猜你现在能猜出原因了？是的，两者都有免费版本。MySQL\
    \ 和 MariaDB 也是较易使用的 DBMS 系统之一。MySQL 还允许使用 NoSQL 数据库结构。\n\n就像我们讨论过的所有开源产品一样，用户可以访问官方网站\
    \ [www.mysql.com](https://www.mysql.com) 下载最新版本。当前版本及之前的几个版本的文档均可下载。这些文档非常详尽，不适合心智薄弱者或初学者阅读。同样，你可能已经读腻了，但建议在你经验更丰富之前，不要单独下载新版本的\
    \ MySQL。至少现在，请坚持使用 WAMP、LAMP 和 MAMP 集成软件包。我们将在后面的章节中向你展示如何在服务器集成软件包内升级 MySQL 版本。\n\
    \n## 动手实践\n\n1.  为什么 PHP 处理器将 SQL 发送给 DBMS，而不是 Apache Web 服务器直接将其发送给 DBMS？\n2.\
    \  在将 DBMS 返回的信息发送回用户的浏览器之前，Apache 可能会对这些信息做什么处理？\n3.  前往 [`www.mysql.com`](http://www.mysql.com)。MySQL\
    \ 的最新版本是什么？哪些版本的 Apache 和 PHP 与其兼容？\n4.  为什么搜索引擎通过 GET HTTP 请求而非 POST HTTP 请求传递信息？你会在什么时候使用\
    \ POST 请求？\n\n## 整合起来——PHP、Apache 和 MySQL\n\n正如你到目前为止所发现的，PHP、Apache 和 MySQL/MariaDB\
    \ 需要无缝协同工作，才能成功创建动态网页。有许多可用的 **服务器集成软件包** 提供了这些产品的组合，以及诸如 phpMyAdmin 和 MySQL Workbench（在设置\
    \ Web 服务器和数据库方面非常有帮助）等其他工具。通过安装其中一个产品，你将大大降低挫败感，甚至可能保住大部分头发。\n\n选择服务器集成软件包时有很多选择。有些软件包仅适用于特定操作系统；有些则提供了许多你可以选择添加的附加工具。一些最受欢迎的选择包括：\n\
    \n- *XAMPP*: [`www.apachefriends.org/index.html`](http://www.apachefriends.org/index.html)\n\
    - *easyPHP*: [`www.easyphp.org/`](http://www.easyphp.org/)\n- *AMAPPS*: [`www.ampps.com/`](http://www.ampps.com/)\n\
    - *LAMP*: [`www.linux.com/training-tutorials/easy-lamp-server-installation/`](http://www.linux.com/training-tutorials/easy-lamp-server-installation/)\n\
    - *LEMP*: [`https://linuxtechlab.com/beginners-guide-creating-lemp-server/`](https://linuxtechlab.com/beginners-guide-creating-lemp-server/)\n\
    - *MAMP*: [`www.mamp.info/en/downloads/`](http://www.mamp.info/en/downloads/)\n\
    \n对于 Microsoft Visual Studio 开发者，你还可以安装 DevSense 的 PHP Tools 插件。对于那些希望使用 Microsoft\
    \ IIS 服务器（而不是 Apache）或 NGINX 的人来说，这是集成 PHP 最简单的方法。更多信息，请访问 [`www.devsense.com/en`](http://www.devsense.com/en)。\n\
    \n现在让我们简要地看看两个受欢迎的选择：easyPHP 和 XAMPP。我们不会深入探讨或提供分步安装说明，原因有二：本书出版后，相关说明很可能会发生变化；而且使用默认设置通常没问题。接受开发者建议的设置大多数情况下都能正常工作。\n\
    \n### easyPHP\n\n你可以从以下链接下载 easyPHP 的开发者版本。除非你打算直接将计算机上的“真实”网页托管到互联网上，否则无需下载主机版本。[`www.easyphp.org/easyphp-devserver.php`](http://www.easyphp.org/easyphp-devserver.php)\n\
    \neasyPHP 的开发者版本是一个 WAMP（Windows, Apache, MariaDB, PHP）集成软件包，用于 Microsoft Windows\
    \ 环境。当 Oracle 收购 MySQL 时，easyPHP 的开发者转向了 MariaDB 数据库。这个数据库由一些创建 MySQL 的相同开发者创建。因此，它的工作方式类似。在后面的章节中，我们将了解如何安装最新版本的\
    \ MySQL。你可以选择安装一些额外的工具来辅助开发（包括代码嗅探器）。然而，就我们的目的而言，你只需要基本安装。安装后，文件将位于你程序文件目录下的 easyPHP\
    \ 目录中。\n\n> **警告**\n> \n> 在下载过程中，请注意点击网站上的哪些按钮。你可能会下载到不需要的额外项目。\n\n在网站上点击下载箭头下载安装程序后，按照软件提供的说明进行操作。在初次尝试时，请保留所有默认设置。希望一切都能正确安装。如果你没有选择让\
    \ easyPHP 自动启动 Apache 和 PHP，那么在 easyPHP 启动后，右键单击系统托盘中的 easyPHP 图标，选择 `Dashboard`。然后点击\
    \ HTTP 服务器标题下的启动按钮。如果它启动了（启动按钮会切换为停止按钮），则用同样的方式启动数据库。如果出现问题，请阅读下一节“常见安装问题”。\n\n\
    ### 常见安装问题\n\n#### 缺少 C# 库\n\nPHP 8（以及早期版本的 PHP）需要 Microsoft Visual Studio C#\
    \ 库。如果你使用的是 Windows 8 或更高版本，这个库可能已经安装。此外，如果你安装了较新版本的 Microsoft Visual Studio，它也可能已经安装。如果你收到指示缺少\
    \ C# 或版本错误的错误信息，请将错误信息粘贴到互联网的搜索引擎中。搜索来自 Microsoft 的关于如何修复该错误的说明。回复信息中应包含下载缺失文件和安装说明的链接。\n\
    \n#### 端口冲突\n\n如果你已经有服务在使用端口 80（PC 与外部世界之间 HTML 流量的默认端口），当 Apache 尝试运行时，你将会收到一条错误消息。你可以通过多种方法解决这个问题。\n\
    \n1.  如果你不介意在开发期间关闭其他使用该端口的服务，可以按照给定的说明进行操作。在你使用完 Apache 和 PHP 后，可以重新打开这些服务，或者只需重启电脑，这些服务就会重新启动。\n\
    \    1.  前往 Microsoft Windows 任务管理器（同时按下 `Ctrl+Alt+Delete`）。\n    2.  选择“服务”选项卡。"
  raw: "The name of the text box (`customername`) and the\nvalue entered in the text\
    \ box (Fred) are now visible on the URL line.\nActually, `customername` is now\
    \ a\nparameter and `Fred` is now the value\nthe parameter holds. This is the result\
    \ of using the GET process.\nWhen we click the Google Search button or the Search\
    \ button in our\nsimple example, the requested information is sent via the GET\
    \ HTTP\nprocess. All information (and parameters) needed for the receiving\nprogram\
    \ are sent on the actual URL line to be received by the program on\nthe web server\
    \ that will process the initial request.\nWhy does the Google search engine send\
    \ information via GET instead of\nPOST (which would have hidden the information)?\n\
    The main reason is to save server memory. Just think of the millions\nof requests\
    \ that Google has for information. If all of these requests\nresided in memory,\
    \ the servers would soon crash. Also, since the user is\ndoing a “public” search\
    \ for information, there is no reason to hide the\ninformation. In later chapters,\
    \ we will discover how to read both GET and POST parameters\nwithin PHP programs.\n\
    However, for now let us get back to our discussion of Apache, PHP,\nand DBMS.\n\
    PHP can access information from many types of DBMS systems, including\nOracle\
    \ and SQL Server. However, the most popular combination (as\nmentioned already)\
    \ is to pair PHP with MySQL or MariaDB. I bet at this\npoint you can guess why?\
    \ Yes, both have free versions. MySQL and MariaDB\nare also one of the easier\
    \ DBMS systems to use. MySQL also allows the\nuse of NoSQL database structures.\n\
    Just like all the open source products we have discussed, the user\ncan go to\
    \ the official web site[www.​mysql.​com](https://www.mysql.com)\nto download the\
    \ latest versions. Documentation of current and several\nprevious versions is\
    \ available for download. The documentation is pretty\nintense and not for the\
    \ weak of mind or the beginner. Also, as you\nprobably are tired of reading, it\
    \ is not recommended that you download a\nnew version of MySQL individually until\
    \ you have more experience. Stick\nwith the WAMP, LAMP, and MAMP stack packages,\
    \ at least for now. We will\nshow you how to upgrade your version of MySQL within\
    \ a server stack\npackage in a later chapter.\n\nDo It\n\n1.  Why does the PHP\
    \ processor send SQL to the DBMS instead of the Apache\n    web server sending\
    \ it directly to the DBMS?\n\n2.  What might Apache do with the information received\
    \ from the DBMS\n    before sending it back to the user’s browser?\n\n3.  Go to\
    \ [`www.mysql.com`](http://www.mysql.com).\n    What is the latest version of\
    \ MySQL? Which versions of Apache and PHP\n    are compatible?\n\n4.  Why do search\
    \ engines pass information via GET HTTP requests instead\n    of POST HTTP requests?\
    \ When would you use a POST request?\n\nPutting It All Together—PHP, Apache, and\
    \ MySQL\nAs you have hopefully discovered by this point, PHP, Apache, and\nMySQL/MariaDB\
    \ need to run seamlessly together to successfully create\ndynamic web pages. There\
    \ are numerous **server stack\npackages**  available that provide a combination\
    \ of these\nproducts, along with other tools such as phpMyAdmin and MySQL Workbench\n\
    (which is a great help in setting up your web server and databases). By\ninstalling\
    \ one of these products, you will greatly reduce your\nfrustration level and maybe\
    \ even manage to keep most of your hair.\n\nThere are lots of choices when selecting\
    \ a server stack package. Some\nwork only on a particular operating system; some\
    \ have lots of additional\ntools you can add, if you choose. Some of the most\
    \ popular choices include\n\n*   *XAMPP*: [`www.apachefriends.org/index.html`](http://www.apachefriends.org/index.html)\n\
    \n*   *easyPHP*: [`www.easyphp.org/`](http://www.easyphp.org/)\n\n*   *AMAPPS*:\
    \ [`www.ampps.com/`](http://www.ampps.com/)\n\n*   *LAMP*: [`www.linux.com/training-tutorials/easy-lamp-server-installation/`](http://www.linux.com/training-tutorials/easy-lamp-server-installation/)\n\
    \n*   *LEMP*: [`https://linuxtechlab.com/beginners-guide-creating-lemp-server/`](https://linuxtechlab.com/beginners-guide-creating-lemp-server/)\n\
    \n*   *MAMP*: [`www.mamp.info/en/downloads/`](http://www.mamp.info/en/downloads/)\n\
    \nFor Microsoft Visual Studio developers, you can also install the\nDevSense’s\
    \ PHP Tools plug-in. For those that want to use the Microsoft\nIIS Server instead\
    \ of Apache, or NGINX, this is the easiest way to\nintegrate PHP.\nFor more information,\
    \ visit [`www.devsense.com/en`](http://www.devsense.com/en).\nNow let us briefly\
    \ look at two of the popular choices: easyPHP and\nXAMPP. We will not dive in\
    \ depth or provide step-by-step install\ndirections for two reasons. As soon as\
    \ this book is published, the\ndirections probably will change, and it is fine\
    \ to use the default\nsettings. Accepting what the developers suggest works most\
    \ of the\ntime.\n\neasyPHP\nYou can download the developer’s\nversion of easyPHP\
    \ from the following link. It is not necessary to\ndownload the host version unless\
    \ you are planning on hosting “live” web\npages directly from your computer onto\
    \ the Internet.[`www.easyphp.org/easyphp-devserver.php`](http://www.easyphp.org/easyphp-devserver.php)\n\
    The developer's version of easyPHP is a WAMP\n(Windows, Apache, MariaDB, PHP)\
    \ package that is used in the Microsoft\nWindows environment. When Oracle purchased\
    \ MySQL, the developers of\neasyPHP switched to the MariaDB database. This database\
    \ was created by\nsome of the same developers who created MySQL. Thus, it works\
    \ in a\nsimilar way. In a later chapter, we will discover how to install the\n\
    latest version of MySQL. There are additional tools that you can choose\nto also\
    \ install to assist in development (including a code sniffer).\nHowever, for our\
    \ purposes you need only the basic install. After\ninstallation, the files will\
    \ be located in your program files directory\nunder the easyPHP directory.\n\n\
    Warning\n\nPay attention to which buttons you click on the web site during\ndownload.\
    \ You might download extra items you do not want.\n\nAfter downloading the installer\
    \ by clicking the download arrow on the\nweb site, follow the directions provided\
    \ with the software. On your\nfirst attempt, leave all the default settings. Hopefully,\
    \ everything\nwill install correctly. If you did not choose to have easyPHP\n\
    automatically start Apache and PHP, once easyPHP has been started,\nright-click\
    \ the easyPHP icon in your system tray and select Dashboard.\nThen click the start\
    \ button under the HTTP server title. If it starts\n(the start button will switch\
    \ to a stop button), then start the database\nin the same way. If there are problems,\
    \ read the next section entitled,\n“Common Installation Problems”.\n\nCommon Installation\
    \ Problems\n\nMissing C# Library\nPHP 8 (and earlier versions of PHP)  requires\
    \ the Microsoft\nVisual Studio C# library. If you have Windows 8 or later, this\
    \ library\nis probably already installed. Also, if you have a recent version of\n\
    Microsoft Visual Studio, it is also probably already installed. If you\nreceive\
    \ an error indicating that C# is missing or the wrong version,\npaste the message\
    \ into a search engine on the Internet. Search for a\nresponse from Microsoft\
    \ for directions to fix the error. The response\nshould include a link to download\
    \ the missing\nfiles and installation instructions.\n\nPort Conflicts\nIf you\
    \ already have a service using port 80,\nthe default port for HTML traffic between\
    \ your PC and the outside world,\nyou will receive an error message from Apache\
    \ when it attempts to run.\nYou can fix this problem in multiple ways.\n\n1. \
    \ If you do not mind shutting down other services using the port while you\n \
    \   are developing, you can follow the given directions. Once you are done\n \
    \   using Apache and PHP, you can turn the services back on or just reboot\n \
    \   your PC and the services will turn back on.\n\n1.  Go to the Microsoft Windows\
    \ Task Manager (press Ctrl+Alt+Delete at\n        the same time).\n\n2.  Select\
    \ the Services tab."
