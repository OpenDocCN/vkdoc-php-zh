    基本设置（包括如何响应脚本错误）包含在 `php.ini` 初始化文件中，该文件在 PHP 服务器启动时被读取。要管理错误监控模式，你可以使用 `error_reporting()`
    函数。其参数是一个常量，用于定义要显示的错误消息。例如，`E_ERROR` 常量对应监控导致程序执行终止的致命错误的模式。`E_WARNING` 常量表示监控非关键警告的模式。`E_ALL`
    常量则指定了监控几乎所有错误的模式（即最大控制模式）。


    在实践中，你可以使用 `set_exception_handler()` 函数来处理异常。该函数接受一个函数名作为参数，当代码执行过程中发生未捕获的异常时，该函数会被调用。代码在执行完传递给
    `set_exception_handler()` 的函数后会停止运行。清单 10-8 中展示了一个简单示例。


    ```

    清单 10-8

    用于处理异常的函数

    ```


    以下为程序输出。


    ```

    程序输出（来自清单 10-8）

    即将发生错误...

    出现了一个错误！

    ```


    在本例中，你定义了 `handler()` 函数，并将该函数的名称（作为字符串）作为参数传递给 `set_exception_handler()` 函数。因此，当使用
    `throw new Exception()` 语句抛出异常时，`handler()` 函数会被自动调用，从而终止程序的执行。


    一个圆形图标，中心有一个字母 i。注意：还有其他一些函数在处理错误和异常时很有用。例如，你可以使用 `set_error_handler()` 函数来定义错误处理器。你可以使用
    `trigger_error()` 函数来抛出错误。此列表并不完整。另一个有趣的功能与错误消息禁用 `@` 运算符有关。该运算符放置在某些表达式之前，如果表达式执行过程中发生错误，则不会显示相应的消息。


    ![](img/613529_1_En_10_Figi_HTML.gif) 一个钟形图标。**PHP 8 标准** 自 PHP 8 起，`@` 运算符不再隐藏致命错误。


    ## 总结


    *   你可以使用 `try-catch-finally` 结构来处理异常。受控代码放在 `try` 块中。如果执行该代码时抛出异常，则可以在 `catch`
    块中处理它。可选的 `finally` 块中的命令始终会被执行。

    *   为了处理不同的异常，可以使用多个 `catch` 块。对于每个块，你需要指定要处理的异常类。

    *   异常可以被人为地抛出。为此，请使用 `throw` 指令，后跟异常对象。

    *   你可以创建自定义异常类。这些类继承自 `Exception` 类。内置的异常类实现了 `Throwable` 接口。

    *   `try-catch-finally` 结构可以嵌套，并且异常可以被重新抛出。在这种情况下，抛出的异常对象会被多次使用。

    *   特殊的函数和工具允许你设置错误控制模式。其中包括错误消息禁用 `@` 运算符、`error_reporting()` 函数（定义错误控制模式）、`set_exception_handler()`
    和 `set_error_handler()` 函数（定义错误处理器），以及 `trigger_error()` 函数（抛出错误）。


    ## 11. 生成器和迭代器


    *哦，我明白。在这个星球上，没有人会说出他们真正的意思。* ——*《家有阿福》*（电视剧）


    在本章中，你将熟悉生成器和迭代器。迭代器是一种特殊对象，允许你遍历集合。生成器是一种特定的迭代器。因此，无论哪种情况，你都是在处理集合的遍历。让我们从更简单的问题开始：生成器。

