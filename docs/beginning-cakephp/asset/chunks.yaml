    \n**表 14-3.** *用于测试控制器、视图以及最终树形行为的一些示例标签*\n\n| **ID** | **Name** |\n| --- | ---\
    \ |\n| 1 | CakePHP |\n| 2 | PHP |\n| 3 | Programming |\n| 4 | Web |\n| 5 | Frameworks\
    \ |\n\n表 14-3 展示的标签可以轻松地组织成一个数据树。例如，“CakePHP”作为子节点关联到“PHP”；“PHP”是“Programming”的子节点，“Web”和“Frameworks”也是如此。树形行为（Tree\
    \ behavior）将允许你相应地给每个标签分配父标签。\n\n然而，在此之前，你必须确保`$this->data`数组包含了正确的父级 ID 名称和值，以便模型能正确地传递选择菜单的结果。如果`$this->data['parent_id']`一开始没有设置，那么所有标签都将没有父级，树形行为也就无法按你的期望管理数据。因此，在编辑（Edit）动作中，使用`debug()`函数来显示`$this->data`的内容，如下所示：\n\
    \n```php\n<? debug($this->data);?>\n```\n\n接下来，通过输入一个与某个标签匹配的 URL（例如 `http://localhost/blog/tags/edit/1`）在编辑视图中打开一个标签记录。你应该能看到`debug()`函数显示的`$this->data`，如清单\
    \ 14-14 所示。\n\n**清单 14-14.** *添加了* `parent_id` *字段和选择菜单后的* `$this->data` *内容*\n\
    \n```php\nArray\n(\n    [Tag] => Array\n        (\n            [id] => 1\n   \
    \         [parent_id] => 2\n            [left] =>\n            [right] =>\n  \
    \          [name] => CakePHP\n        )\n\n    [Post] => Array\n        (\n  \
    \          [0] => Array\n                (\n                    [id] => 1\n  \
    \                  [name] => New Cake 1.2 Functions\n                    [date]\
    \ => 2008-01-01 01:01:01\n                     => Some snazzy new functions are\
    \ now available in 1.2 that you should check out!\n                    [user_id]\
    \ => 1\n                    [PostsTag] => Array\n                        (\n \
    \                           [id] =>\n                            [post_id] =>\
    \ 1\n                            [tag_id] => 1\n                        )\n  \
    \              )\n        )\n)\n```\n\n注意，由于`Post`和`Tag`模型中已经设置了`hasAndBelongsToMany`关联，关联的文章会出现在`$this->data['Post']`数组中（清单\
    \ 14-14 的第 11-27 行）。如果当前标签关联了更多文章，这个数组会更大，但清单 14-14 至少展示了`$this->data`将如何包含这些关联记录。\n\
    \n然而，我在此数组中寻找的不是关联的文章，而是`parent_id`字段。既然我已经从“Parent Tag”选择菜单中选了一个父节点并保存了标签，`$this->data`显示该值已正确保存；清单\
    \ 14-14 的第 6 行显示，当前记录的`parent_id`字段已保存 ID 值为`2`。\n\n现在“Parent Tag”选择菜单在编辑视图中已正常工作，并能将选中的值保存到`parent_id`字段中。将同样的表单辅助器（`Form`\
    \ helper）代码粘贴到添加（Add）视图文件中：\n\n```php\necho $form->input('parent_id', array('label'=>'Parent\
    \ Tag', 'type'=>'select', 'options'=>$tags, 'empty'=>'- No Parent Tag -'));\n\
    ```\n\n### 当查看标签时获取所有关联文章\n\n添加和编辑视图现在支持分配父标签，模型将其保存在`parent_id`字段中。由于模型表现得像一个数据树（参见清单\
    \ 14-12），树形行为会自动分析`tags`表以及每个标签的父节点 ID 值，然后分配`left`值和`right`值。在创建和编辑标签时，你现在可以从现有标签列表中选择每个标签的父级，剩下的工作都由树形行为完成。剩下的唯一任务是在用户请求某个标签时，使用树形辅助器（`Tree`\
    \ helper）来检索关联的文章。\n\n使用`children()`函数来执行查找请求，获取提供的标签 ID 及其所有关联标签。根据我们提供的参数不同，`children()`不仅可以返回这些标签的列表，还可以返回它们所有关联的文章。将`app/controllers/tags_controller.php`中的当前查看（View）动作替换为清单\
    \ 14-15。\n\n**清单 14-15.** *包含* `children()` *函数的查看动作*\n\n```php\nfunction view($id\
    \ = null) {\n    if (!$id) {\n        $this->Session->setFlash(__('Invalid Tag.',\
    \ true));\n        $this->redirect(array('action'=>'index'));\n    }\n    $children\
    \ = $this->Tag->children($id, null, null, null, null, null, 1);\n    $tag = $this->Tag->read(null,\
    \ $id);\n    $this->set(compact('children', 'tag', 'list'));\n}\n```\n\n注意清单 14-15\
    \ 的第 6 行，树形行为的函数`children()`是如何像其他模型函数一样被使用的。如果`Tag`模型中没有将`$actsAs`属性设置为`Tree`，那么这一行将会出错；或者至少模型会在`app/models/tag.php`中寻找一个名为`children()`的自定义函数。但是，由于树形行为已被应用到当前的`Tag`模型上，它的所有函数都可以通过引用模型在控制器中访问，如清单\
    \ 14-15 的第 6 行所示。\n\n让我解释一下`children()`函数。这个函数是树形行为执行之前描述的查找请求，返回给定记录的子节点的方式。\n\
    \n`children( &$model, id[mixed], direct[bool], fields[mixed], order[string], limit[int],\
    \ page[int], recursive[int] )`\n\n*   `id`: 父节点记录的 ID。\n*   `direct = false`:\
    \ 是否仅返回直接子节点，还是返回所有子节点。设置为`true`时，仅返回直接的子节点，不返回子节点的子节点；设置为`false`时，将返回当前父节点的任何及所有子节点。\n\
    *   `fields = null`: 可以是单个字段名字符串或字段名数组；用于限制查找查询返回的字段。\n*   `order = null`: SQL\
    \ 排序条件，例如 `name DESC`；默认为树中的顺序。\n*   `limit = null`: 用于计算每页数据项的数量；以 SQL `LIMIT`子句形式输入。\n\
    *   `page = 1`: 页码；用于访问分页数据。\n*   `recursive = -1`: 当获取关联记录时，用于指定返回的深度层级；对应于在模型函数（如`find()`和`read()`）中使用的`recursive`参数。\n\
    \n在清单 14-15 的第 6 行，`children()`函数使用了`id`和`recursive`参数调用。通过为中间的其他参数输入`null`值，我指示树形行为在其他方面使用默认值。如果不改变`recursive`参数，该函数只会向控制器提供一个子标签的数组，而不是这些标签及其关联文章的数组。所以，你可以看到第\
    \ 6 行将`recursive`值设置为`1`，而不是默认的`-1`。\n\n标签控制器现在向视图提供了一个包含相关标签及其关联文章的数组。让我们在`app/views/tags/view.ctp`文件中遍历这个数组，以显示文章。在此文件的某处（大约在第\
    \ 16 行），插入清单 14-16，其中包含了这个循环并为每个关联文章显示一个 HTML 链接。\n"
- fmt: '**Listing 14-16.** *Displaying Each Related Post As a Link in the View* 1


    ```

    <? if (isset($children)): ?>

    <? foreach($children as $child): ?>

    <? foreach($child[''Post''] as $post): ?>

    <?=$html->link($post[''name''],array(''controller''=>''posts'',''action''=>➥

    ''view'',''id''=>$post[''id'']));?>

    <? endforeach;?>

    <? endforeach;?>

    <? endif;?>

    ```


    You can see that Listing 14-16 is a loop through the `$children` array passed
    by the controller (as shown in Listing 14-15). Because I’m interested only in
    displaying all related posts to the supplied tag, I’ve looped through each post
    contained in each tag record, so both lines 2 and 3 contain a `foreach()` function.
    Lines 1 and 7 are a way for testing whether anything is present in the `$children`
    variable to begin with. Using the HTML helper on line 4 let me render a link for
    each post that is reverse-routed and contains the post’s name. To adjust how each
    post is displayed, just retool line 4 to meet your own styles; the full contents
    of the post record are available as `$post` at this point in the process.


    That’s it! Thanks to the `Tree` behavior and its `children()` function, all related
    posts, including those of related child tags, are displayed in this view. By applying
    this same process to other areas of the blog, the user could more quickly access
    categorized posts. And since the `Tree` behavior is managing the hierarchy, the
    work for the administrator is reduced by having only to set the parent ID value
    in the Tags Add and Edit views. The `Tree` behavior also let me bypass writing
    my own set of functions to find the child nodes and their associated posts.


    ## Using Other Tree Behavior Functions


    Like the `children()` function, other `Tree` behavior functions may be called
    in the model or controller by referencing the model. This is done in the controller
    by entering the model name and calling out the `Tree` behavior function desired,
    *not* by entering the name of the behavior:


    ```

    $this->Model->children($id); // this will work

    $this->Model->Tree->children($id); // this will not work

    ```


    In the model, the model name is left out, as with referencing other model functions,
    like so:


    ```

    $this->children($id); // this will work

    $this->Tree->children($id); // this will not work

    $this->Model->children($id); // neither will this

    ```


    ### childCount


    The `childCount()` function returns the number of child nodes for a given parent
    ID.


    **`childCount( &$model, id[mixed], direct[bool] )`**


    When `id` is set to `false`, all top-level nodes will be read; otherwise, it will
    read only the supplied ID node as the parent; when `direct` is set to `true`,
    only direct children are counted.


    09775ch14final 7/1/08 9:57 PM Page 264


    **264**


    C H A P T E R 1 4 ■ D ATA S O U R C E S A N D B E H AV I O R S


    ### generateTreeList


    This function is a convenience method for returning a hierarchical array to be
    used in making HTML select boxes or breadcrumbs.


    **`generateTreeList( &$model, conditions[mixed], keyPath[string],`** ➥

    **`valuePath[string], spacer[string], recursive[int] )`**


    - `conditions` = null: SQL conditions as a string or as an array (similar to conditions
    used in the `find()` model function)

    - `keyPath` = null: A string path to the key, for example, `{n}.Tag.name`

    - `valuePath` = null: A string path to the value; similar to `keyPath`

    - `spacer` = ''_'': For each level that a node falls under the parent, this character
    will be placed before the returned list item; for example, the grandchild of the
    parent node would be returned with two spacers in front of the name

    - `recursive` = -1: The recursive value for the returned data


    ### moveUp and moveDown


    To reorder a given node without changing its parent, use the `moveUp()` and `moveDown()`
    functions.


    **`moveUp( &$model, id[int], number[mixed] )`**

    **`moveDown( &$model, id[int], number[mixed] )`**


    These functions move the node `id`, or in other words, dynamically adjust the
    left and right fields, based on the value set in `number`. If `number` is set
    `true`, `moveUp()` will set the node to the topmost, or first, position; `moveDown()`
    will set the node to the last position.


    ### getParentNode and getPath


    To fetch the parent of a given child node, use `getParentNode()`. Simply provide
    an ID for a given node, and this function will find its parent and return the
    contents. To retrieve the path to a given node, supply the ID of the record, and
    `getPath()` will return an array of the topmost node down to the current one.
    This function is handy for displaying breadcrumb links.


    ### recover, removeFromTree, setParent, setup, and verify


    Recovering a corrupted tree, meaning that the left and right fields are realigned
    by the `Tree` behavior, is done with the `recover()` function. No passed value
    is necessary when calling `recover()`; just make sure that the database table
    in question is set up properly in the `$actsAs` property.


    To remove a node from the tree, use `removeFromTree()`. Simply provide the node
    ID, and this function will remove the node from the tree and re-parent all the
    remaining children up one level.


    09775ch14final 7/1/08 9:57 PM Page 265


    C H A P T E R 1 4 ■ D ATA S O U R C E S A N D B E H AV I O R S


    **265**


    Normally, as already demonstrated in this chapter, the `Tree` behavior automatically
    assigns the parent so long as `parent_id` is properly set up in the view and passed
    to the model through `$this->data`. However, the `setParent()` function is available
    as a backward-compatible method for assigning a parent manually. When used, `setParent()`
    takes the ID value provided as its first parameter and assigns the matching record
    as the parent of whatever record is currently being saved. This function should
    be used when the model is undergoing a save.


    To manually adjust the settings used in `$actsAs` in an action or model function,
    use the `setup()` function. The first parameter must be an array with the same
    structure as the `$actsAs` property; in other words, set an array just as you
    would format the `$actsAs` property and pass it to `setup()`. Then the new settings
    will be applied to the model when invoking behaviors.


    To test whether a model has a valid tree, use the `verify()` function. No parameters
    here are necessary. Simply call out this function in the model or controller,
    and it will return a `true` value if the model has a valid tree.


    ## Using the ACL and Translate Behaviors


    So far, I’ve explained the `Tree` behavior at length to demonstrate how to use
    a behavior in your Cake application. Without adding any more than one line of
    code (specifically, setting the `$actsAs` property), you were able to extend the
    model to behave differently. On the fly, the `Tree` behavior adjusts the tags
    to include associations between them, and you don’t have to write any more functions
    in the model to maintain the data tree (unless, of course, you want to beef up
    the tree to include more methods and structures). But, in relatively little time,
    you can add basic tree structures to your database.


    Other behaviors work in a similar fashion, meaning that they perform similar tasks
    for the model that make it easier to move data around. Unfortunately, the other
    two built-in behaviors, namely, `ACL` and `Translate`, are much more complicated
    than the `Tree` behavior. (The `Containable` behavior is easy to use, but I’ll
    get into more detail on this behavior in a moment.) The very nature of managing
    access control lists (which is what `ACL` stands for) is one of the most complex
    tasks of establishing user control in an application. Delving into this behavior
    would certainly be useful for many developers, but it would also go beyond the
    scope of this book. I’ll simply bring it to your attention and encourage you to
    take a look at this built-in behavior if your application calls for a detailed
    hierarchy of various user groups and individual users.'
