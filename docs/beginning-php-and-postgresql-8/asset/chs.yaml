  ```\n\n#### 进一步了解邮箱与邮件\n\n一旦建立了连接，你就可以开始处理它了。一些最基本的任务包括通过该连接检索关于邮箱和邮件的更多信息。本节将介绍几个能够执行此类任务的函数。\n\
  \n##### `imap_getmailboxes()`\n\n`array imap_getmailboxes(resource msg_stream, string\
  \ ref, string pattern)` `imap_getmailboxes()` 函数返回一个由对象组成的数组，其中每个对象包含关于通过 `msg_stream`\
  \ 指定流找到的每个邮箱的信息。对象属性包括 `name`（表示邮箱名称）、`delimiter`（表示文件夹之间的分隔符）以及 `attributes`（一个位掩码，表示以下内容）：\n\
  \n- `LATT_NOINFERIORS`：此邮箱没有子邮箱。\n- `LATT_NOSELECT`：这是一个容器，而不是邮箱。\n- `LATT_MARKED`：此邮箱已“标记”，这是华盛顿大学\
  \ IMAP 实现特有的功能。\n- `LATT_UNMARKED`：此邮箱“未标记”，这是华盛顿大学 IMAP 实现特有的功能。\n\n`ref` 参数重复了\
  \ `imap_open()` 函数中使用的 mailbox 参数的值。`pattern` 参数提供了一种指定尝试位置和范围的方法。将 `pattern` 设置为\
