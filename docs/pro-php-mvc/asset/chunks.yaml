    \ within a file that will be included in almost every page of our application.\
    \ Doesn’t that mean we will constantly have to draw the serialized user row from\
    \ the session and assign it to the view? In a manner of speaking, that is exactly\
    \ what we need to do. The way we will achieve this is to add the logic for the\
    \ retrieval and deserialization to the shared Controller subclass, by altering\
    \ the `__construct()` method, as shown in Listing 15-14.\n\n**Listing 15-14.**\
    \ Modified `__construct()` Method\n\n```\n/**\n * @readwrite\n */\nprotected $_user;\n\
    \npublic function __construct($options = array())\n{\n    parent::__construct($options);\n\
    \n    $database = \\Framework\\Registry::get(\"database\");\n    $database->connect();\n\
    \n    $session = \\Framework\\Registry::get(\"session\");\n    $user = unserialize($session->get(\"\
    user\", null));\n\n    $this->setUser($user);\n}\n```\n\nWe add a new property\
    \ to the `Shared\\Controller` class. In the `__construct()` method, after setting\
    \ up the database, we draw the user row from the session and deserialize it. After\
    \ this, we set the controller’s `$_user` property, so it will effectively be available\
    \ to every application controller.\n\nHow then do we assign it to the view? Our\
    \ original framework Controller class has a `render` method, which is responsible\
    \ for issuing the render commands on the layout and action views. We can override\
    \ this method, and add our user logic to it, as demonstrated in Listing 15-15.\n\
    \n**Listing 15-15.** Modified `render()` Method\n\n```\npublic function render()\n\
    {\n    if ($this->getUser())\n    {\n        if ($this->getActionView())\n   \
    \     {\n            $this->getActionView()->set(\"user\", $this->getUser());\n\
    \        }\n\n        if ($this->getLayoutView())\n        {\n            $this->getLayoutView()->set(\"\
    user\", $this->getUser());\n        }\n    }\n\n    parent::render();\n}\n```\n\
    \nAfter checking whether the user is set, we assign it to both the layout and\
    \ action views. This is so that it can be used in both. We could store it in the\
    \ shared storage, but we would be limited to yielding the whole object.\n\nDoing\
    \ it this way lets us access the properties of the session user object.\n\n> **Note:**\
    \ Other than determining which links to show in our navigation, we don’t really\
    \ make heavy use of the user session in this chapter. It will come in handy in\
    \ the next chapter when we create the user settings page.\n\nWe can now build\
    \ the action and view for searching, as shown in Listing 15-16.\n\n**Listing 15-16.**\
    \ The `search()` Action\n\n```\npublic function search()\n{\n    $view = $this->getActionView();\n\
    \n    $query = RequestMethods::post(\"query\");\n    $order = RequestMethods::post(\"\
    order\", \"modified\");\n    $direction = RequestMethods::post(\"direction\",\
    \ \"desc\");\n    $page = RequestMethods::post(\"page\", 1);\n    $limit = RequestMethods::post(\"\
    limit\", 10);\n\n    $count = 0;\n    $users = false;\n\n    if (RequestMethods::post(\"\
    search\"))\n    {\n        $where = array(\n            \"SOUNDEX(first) = SOUNDEX(?)\"\
    \ => $query,\n            \"live = ?\" => true,\n            \"deleted = ?\" =>\
    \ false\n        );\n\n        $fields = array(\n            \"id\", \"first\"\
    , \"last\"\n        );\n\n        $count = User::count($where);\n        $users\
    \ = User::all($where, $fields, $order, $direction, $limit, $page);\n    }\n\n\
    \    $view\n        ->set(\"query\", $query)\n        ->set(\"order\", $order)\n\
    \        ->set(\"direction\", $direction)\n        ->set(\"page\", $page)\n  \
    \      ->set(\"limit\", $limit)\n        ->set(\"count\", $count)\n        ->set(\"\
    users\", $users);\n}\n```\n\nThe `search()` action does a few important things.\
    \ It begins by setting some defaults that will be overridden by posted form field\
    \ data. It is good to remember that our search form will have fields by default,\
    \ and then populate these fields with whatever form data was previously submitted.\
    \ The defaults need to be sensible, and will be used for the first (and subsequent)\
    \ queries.\n\nIf there is posted form data available, it then attempts to draw\
    \ database user rows, based on a query. We are actually performing two queries:\
    \ first getting a count of rows matching the conditions, and then returning a\
    \ limited set (or page) of user rows."
  raw: 'It might seem strange to depend on the presence of a variable, within a file
    that will be included in almost every page of our application. Doesn’t that mean
    we will constantly have to draw the serialized user row from the session and assign
    it to the view? In a manner of speaking, that is exactly what we need to do. The
    way we will achieve this is to add the logic for the retrieval and deserialization
    to the shared Controller subclass, by altering the __construct() method, as shown
    in Listing 15-14.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ SEARCH


    ***Listing 15-14.*** Modified __construct() Method


    /**


    * @readwrite


    */


    protected $_user;


    public function __construct($options = array())


    {


    parent::__construct($options);


    $database = \Framework\Registry::get("database");


    $database- >connect();


    $session = \Framework\Registry::get("session");


    $user = unserialize($session- > get("user", null));


    $this- >setUser($user);


    }


    We add a new property to the Shared\Controller class. In the __construct() method,
    after setting up the database, we draw the user row from the session and deserialize
    it. After this, we set the controller’s $_user property, so it will effectively
    be available to every application controller.


    How then do we assign it to the view? Our original framework Controller class
    has a render method, which is responsible for issuing the render commands on the
    layout and action views. We can override this method, and add our user logic to
    it, as demonstrated in Listing 15-15.


    ***Listing 15-15.*** Modified render() Method


    public function render()


    {


    if ($this- > getUser())


    {


    if ($this- > getActionView())


    {


    $this- >getActionView()


    - >set("user", $this- >getUser());


    }


    if ($this- >getLayoutView())


    {


    $this- >getLayoutView()


    - >set("user", $this- >getUser());


    }


    }


    parent::render();


    }


    After checking whether the user is set, we assign it to both the layout and action
    views. This is so that it can be used in both. We could store it in the shared
    storage, but we would be limited to yielding the whole object.


    Doing it this way lets us access the properties of the session user object.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ SEARCH


    ■ **Note** Other than determining which links to show in our navigation, we don’t
    really make heavy use of the user session in this chapter. It will come in handy
    in the next chapter when we create the user settings page.


    We can now build the action and view for searching, as shown in Listing 15-16.


    ***Listing 15-16.*** The search() Action


    public function search()


    {


    $view = $this- > getActionView();


    $query = RequestMethods::post("query");


    $order = RequestMethods::post("order", "modified");


    $direction = RequestMethods::post("direction", "desc");


    $page = RequestMethods::post("page", 1);


    $limit = RequestMethods::post("limit", 10);


    $count = 0;


    $users = false;


    if (RequestMethods::post("search"))


    {


    $where = array(


    "SOUNDEX(first) = SOUNDEX(?)" = > $query,


    "live = ?" = > true,


    "deleted = ?" = > false


    );


    $fields = array(


    "id", "first", "last"


    );


    $count = User::count($where);


    $users = User::all($where, $fields, $order, $direction, $limit, $page);


    }


    $view


    - > set("query", $query)


    - > set("order", $order)


    - > set("direction", $direction)


    - > set("page", $page)


    - > set("limit", $limit)


    - > set("count", $count)


    - > set("users", $users);


    }


    The search() action does a few important things. It begins by setting some defaults
    that will be overridden by posted form field data. It is good to remember that
    our search form will have fields by default, and then populate these fields with
    whatever form data was previously submitted. The defaults need to be sensible,
    and will be used for the first (and subsequent) queries.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ SEARCH


    If there is posted form data available, it then attempts to draw database user
    rows, based on a query. We are actually performing two queries: first getting
    a count of rows matching the conditions, and then returning a limited set (or
    page) of user rows.'
  trans: "\n# 排版后的内容\n\n在一个几乎会被我们应用每个页面所包含的文件中，依赖某个变量的存在，这看起来可能有些奇怪。这是否意味着我们得不断从会话中取出序列化的用户记录，并将其赋值给视图？从某种角度来说，这正是我们需要做的。实现这一目标的方法是，通过修改\
    \ `__construct()` 方法，将检索和反序列化的逻辑添加到共享的 Controller 子类中，如代码清单 15-14 所示。\n\n**代码清单\
    \ 15-14.** 修改后的 `__construct()` 方法\n\n```\n/**\n * @readwrite\n */\nprotected\
    \ $_user;\n\npublic function __construct($options = array())\n{\n    parent::__construct($options);\n\
    \n    $database = \\Framework\\Registry::get(\"database\");\n    $database->connect();\n\
    \n    $session = \\Framework\\Registry::get(\"session\");\n    $user = unserialize($session->get(\"\
    user\", null));\n\n    $this->setUser($user);\n}\n```\n\n我们向 `Shared\\Controller`\
    \ 类添加了一个新属性。在 `__construct()` 方法中，设置好数据库之后，我们从会话中取出用户记录并对其进行反序列化。之后，我们设置控制器的 `$_user`\
    \ 属性，这样它就能有效地被每个应用控制器所使用。\n\n那么，我们如何将其赋值给视图呢？我们最初的框架 Controller 类有一个 `render`\
    \ 方法，负责在布局视图和动作视图上执行渲染命令。我们可以重写这个方法，并向其中添加我们的用户逻辑，如代码清单 15-15 所示。\n\n**代码清单 15-15.**\
    \ 修改后的 `render()` 方法\n\n```\npublic function render()\n{\n    if ($this->getUser())\n\
    \    {\n        if ($this->getActionView())\n        {\n            $this->getActionView()->set(\"\
    user\", $this->getUser());\n        }\n\n        if ($this->getLayoutView())\n\
    \        {\n            $this->getLayoutView()->set(\"user\", $this->getUser());\n\
    \        }\n    }\n\n    parent::render();\n}\n```\n\n检查用户是否设置之后，我们将其赋值给布局视图和动作视图。这样它就能在这两个视图中使用。我们可以将其存储在共享存储中，但那样只会局限于获取整个对象。\n\
    \n采用这种方法，我们可以访问会话用户对象的属性。\n\n> **注意：** 除了确定导航中显示哪些链接之外，本章我们并没有大量使用用户会话。下一章创建用户设置页面时，它就会派上用场。\n\
    \n现在，我们可以构建用于搜索的动作和视图了，如代码清单 15-16 所示。\n\n**代码清单 15-16.** `search()` 动作\n\n```\n\
    public function search()\n{\n    $view = $this->getActionView();\n\n    $query\
    \ = RequestMethods::post(\"query\");\n    $order = RequestMethods::post(\"order\"\
    , \"modified\");\n    $direction = RequestMethods::post(\"direction\", \"desc\"\
    );\n    $page = RequestMethods::post(\"page\", 1);\n    $limit = RequestMethods::post(\"\
    limit\", 10);\n\n    $count = 0;\n    $users = false;\n\n    if (RequestMethods::post(\"\
    search\"))\n    {\n        $where = array(\n            \"SOUNDEX(first) = SOUNDEX(?)\"\
    \ => $query,\n            \"live = ?\" => true,\n            \"deleted = ?\" =>\
    \ false\n        );\n\n        $fields = array(\n            \"id\", \"first\"\
    , \"last\"\n        );\n\n        $count = User::count($where);\n        $users\
    \ = User::all($where, $fields, $order, $direction, $limit, $page);\n    }\n\n\
    \    $view\n        ->set(\"query\", $query)\n        ->set(\"order\", $order)\n\
    \        ->set(\"direction\", $direction)\n        ->set(\"page\", $page)\n  \
    \      ->set(\"limit\", $limit)\n        ->set(\"count\", $count)\n        ->set(\"\
    users\", $users);\n}\n```\n\n`search()` 动作做了几件重要的事情。它首先设置一些默认值，这些默认值会被提交的表单字段数据覆盖。要记住，我们的搜索表单默认会带有一些字段，然后用之前提交的表单数据来填充这些字段。默认值需要是合理的，并且会用于第一次（以及后续的）查询。\n\
    \n如果有可用的已提交表单数据，它就会尝试根据查询条件从数据库中取出用户记录。我们实际上执行了两个查询：首先获取符合条件记录的总数，然后返回一个限制后的记录集（或页码）。\n"
- fmt: '我们需要获取所有匹配行的计数，以便能够呈现准确的页码数，让用户能够浏览第一页之后的行。`search()`动作最后将我们操作的所有变量赋值给视图。


    接下来，我们需要创建一个相当大的视图，它由两个主要部分组成。我们首先创建用于搜索用户行的表单字段，如清单15-17所示。


    **清单15-17.** `application/views/users/search.html`（节选）


    ```

    <h1 > Search</h1>


    <form method = "post">


    <ol>


    <li>


    <label>


    Query:


    <input type = "text" name = "query" value = "{echo $query}" />


    </label>


    </li>


    <li>


    <label>


    Order:


    <select name = "order">


    <option {if $order == "created"}selected = "selected"{/if} 


    value = "created" > Created</option>


    <option {if $order == "modified"}selected = "selected"{/if} 


    value = "modified" > Modified</option>


    <option {if $order == "first"}selected = "selected"{/if} 


    value = "first" > First name</option>


    <option {if $order == "last"}selected = "selected"{/if} 


    value = "last" > Last name</option>


    </select>


    </label>


    </li>


    <li>


    <label>


    Direction:


    <select name = "direction">


    <option {if $direction == "asc"}selected = "selected"{/if} 


    value = "asc" > Ascending</option>


    <option {if $direction == "desc"}selected = "selected"{/if} 


    value = "desc" > Descending</option>


    </select>


    </label>


    </li>


    <li>


    <label>


    Page:


    <select name = "page">


    {if $count == 0}


    <option value = "1" > 1</option>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ SEARCH


    {/if}


    {else}


    {foreach $_page in range(1, ceil($count / $limit))}


    <option {if $page == $_page}selected = "selected"{/if} 


    value = "{echo $_page}" > {echo $_page}</option>


    {/foreach}


    {/else}


    </select>


    </label>


    </li>


    <li>


    <label>


    Limit:


    <select name = "limit">


    <option {if $limit == "10"}selected= "selected"{/if} value= "10" > 10</option>


    <option {if $limit == "20"}selected= "selected"{/if} value= "20" > 20</option>


    <option {if $limit == "30"}selected= "selected"{/if} value= "30" > 30</option>


    </select>


    </label>


    </li>


    <li>


    <input type = "submit" name = "search" value = "search" />


    </li>


    </ol>


    </form>

    ```


    首先你应该注意到，我们没有用任何条件语句来包裹表单。它应该始终可见（并且（如果可能的话）预先填充之前提交的数据）。我们可以用我们赋值的变量来填充字段，即使表单尚未提交，因为我们已经选择了合理的默认值。


    `order`和`direction`字段相对容易理解——它们只是静态字段。如果任何选项匹配它们各自的提交字段，则默认选中它们。这有助于向用户指示之前选择了哪些选项。


    `page`字段有点棘手。如果`$users`变量中没有用户行，那么此字段仅适用于后续查询，在这种情况下，进入第1页是唯一合理的操作。另一方面，如果有用户行，则需要考虑总共有多少匹配行，并渲染一个可能的页码列表。这是通过生成一个介于1和总行数除以页面大小之间的页码范围来实现的。我们对这个数字向上取整，以处理列表末尾的不完整行集。`limit`字段是一个简单的、静态的页面大小列表。所有这些字段都会反馈到用户行的查询中。


    我们还需要创建一个找到的用户行列表，如清单15-18所示。


    **清单15-18.** `application/views/users/search.html`（节选）


    ```

    {if $users ! = false}


    <table>


    <tr>


    <th > Name</th>


    </tr>


    {foreach $row in $users}


    <tr>


    <td > {echo $row- > first} {echo $row- > last}</td>


    </tr>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ SEARCH


    {/foreach}


    </table>


    {/if}

    ```


    这段代码生成一个简单的表格，其中包含找到的用户的姓名。在下一章中，我们将研究如何访问用户的个人资料页面并将他们添加为好友，因此这可以作为该代码的良好基础。


    最后，让我们整体看一下完整的搜索模板，如清单15-19所示。'
  raw: 'The reason we need to get a count of all the matching rows is so that we can
    render accurate page counts, so users can navigate beyond the first page of rows.
    The search() action ends by assigning all of the variables we worked with, to
    the view.


    Next, we need to create a fairly large view, in two main parts. We begin with
    the form fields that will be used to search for user rows, as shown in Listing
    15-17.


    ***Listing 15-17.*** application/views/users/search.html (Extract)


    <h1 > Search</h1>


    <form method = "post">


    <ol>


    <li>


    <label>


    Query:


    <input type = "text" name = "query" value = "{echo $query}" />


    </label>


    </li>


    <li>


    <label>


    Order:


    <select name = "order">


    <option {if $order == "created"}selected = "selected"{/if} 


    value = "created" > Created</option>


    <option {if $order == "modified"}selected = "selected"{/if} 


    value = "modified" > Modified</option>


    <option {if $order == "first"}selected = "selected"{/if} 


    value = "first" > First name</option>


    <option {if $order == "last"}selected = "selected"{/if} 


    value = "last" > Last name</option>


    </select>


    </label>


    </li>


    <li>


    <label>


    Direction:


    <select name = "direction">


    <option {if $direction == "asc"}selected = "selected"{/if} 


    value = "asc" > Ascending</option>


    <option {if $direction == "desc"}selected = "selected"{/if} 


    value = "desc" > Descending</option>


    </select>


    </label>


    </li>


    <li>


    <label>


    Page:


    <select name = "page">


    {if $count == 0}


    <option value = "1" > 1</option>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ SEARCH


    {/if}


    {else}


    {foreach $_page in range(1, ceil($count / $limit))}


    <option {if $page == $_page}selected = "selected"{/if} 


    value = "{echo $_page}" > {echo $_page}</option>


    {/foreach}


    {/else}


    </select>


    </label>


    </li>


    <li>


    <label>


    Limit:


    <select name = "limit">


    <option {if $limit == "10"}selected= "selected"{/if} value= "10" > 10</option>


    <option {if $limit == "20"}selected= "selected"{/if} value= "20" > 20</option>


    <option {if $limit == "30"}selected= "selected"{/if} value= "30" > 30</option>


    </select>


    </label>


    </li>


    <li>


    <input type = "submit" name = "search" value = "search" />


    </li>


    </ol>


    </form>


    The first thing you should notice is that we do not wrap the form in any conditionals.
    It should always be visible (and prepopulated with previously posted data, where
    available). We can populate the fields with the variables we assigned, even if
    the form has not been posted, since we chose sensible default values.


    The order and direction fields are relatively straightforward to understand—they
    are simply static fields. If any of the options match their respective post fields,
    they are selected by default. This helps to indicate to users which options were
    previously selected.


    The page field is a little tricky. If there are no user rows in the $users variable,
    then this field applies only to the following query, in which case it only makes
    sense to go to page 1\. If, on the other hand, there are user rows, this needs
    to take into account how many total matching rows there are, and render a list
    of possible page numbers. This is done by generating a range of page numbers between
    1 and the total rows divided by the page size. We round this number up to account
    for a partial set of rows, at the end of the list. The limit field is a simple,
    static list of page sizes. All of these fields feed back into the query of user
    rows.


    We also need to create a list of found user rows, as shown in Listing 15-18.


    ***Listing 15-18.*** application/views/users/search.html (Extract)


    {if $users ! = false}


    <table>


    <tr>


    <th > Name</th>


    </tr>


    {foreach $row in $users}


    <tr>


    <td > {echo $row- > first} {echo $row- > last}</td>


    </tr>


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    CHAPTER 15 ■ SEARCH


    {/foreach}


    </table>


    {/if}


    This code generates a simple table, containing the first/last names of the found
    users. In the next chapter, we will look at how to visit the users’ profile pages,
    and add them as friends, so this serves as a good basis for that code.


    Let us take one final look at the complete search template, as shown in Listing
    15-19.'
