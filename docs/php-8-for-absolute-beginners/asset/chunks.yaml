    \ The expected output is shown in Figure 3-4.\n\n![Figure 3-4](images/323857_3_En_3_Chapter/323857_3_En_3_Fig4_HTML.jpg)\n\
    \n**Figure 3-4** Output of `index.php`\n\n**Exercise**: There is no Zen master\
    \ to prod you with a stick but see if you can answer these questions. Your answers\
    \ will indicate what you have learned so far. If you’re in doubt, you can consult\
    \ Chapter 2 for explanations.\n\n*   What does `include_once` do?\n*   How can\
    \ `$pageData->title` change the `<title>` of the generated HTML page?\n*   What\
    \ does `.=` mean? What is the technical name for it?\n*   What happens when we\
    \ `echo $page`?\n\n### Creating a Dynamic Navigation\n\nWe will be creating two\
    \ different forms. Thus, we will require a site menu to navigate between these\
    \ forms. Let’s create a new file, `ch3/views/navigation.php`, with the following\
    \ code.\n\n```php\n<?php\n$nav = <<< NAV\n<nav>\n<a href=\"index.php?page=search\"\
    >Search on bing</a>\n<a href=\"index.php?page=quiz\">Dynamic quiz</a>\n</nav>\n\
    NAV;\n?>\n```\n\n**Listing 3-2** `navigation.php`\n\nNotice that the code we are\
    \ using for navigation is very similar to the code used in Chapter 2. We only\
    \ changed the pages and the strings to be displayed in the navigation. Now let’s\
    \ add the code required to display this navigation in the index file.\n\n```php\n\
    <?php\n$title = \"Building and processing HTML forms with PHP\";\n$pageData->content\
    \ = $nav;\n$pageData->content .= \"...and a form here\";\nrequire \"templates/pagewithcss.php\"\
    ;\necho $page;\n?>\n```\n\n**Listing 3-3** `indexwithnavigation.php`\n\nThe output\
    \ is not pretty, yet. But we are making progress. We now have a new index page\
    \ with navigation by using similar code to what we learned in Chapter 2.\n\n![Figure\
    \ 3-5](images/323857_3_En_3_Chapter/323857_3_En_3_Fig5_HTML.jpg)\n\n**Figure 3-5**\
    \ Output from `indexwithnavigation.php`\n\n### Creating Page Views for the Form\n\
    \nWe can follow the naming convention from Chapter 2, because it provides a solid\
    \ code architecture for dynamic websites. This way of organizing and naming page\
    \ views can give us a mental framework for building dynamic sites. When we have\
    \ the framework internalized, we’ll know which files we need to develop for the\
    \ site. We don’t need to reinvent a good dynamic architecture every time we make\
    \ a new site.\n\nThe navigation described in the preceding section has links to\
    \ pages called *search* and *quiz*. So, we will have to create two new PHP files\
    \ in the `views` folder.\n\n| Href | url variable | view file |\n| --- | --- |\
    \ --- |\n| `index.php?page = search` | `page = search` | `views/search.php` |\n\
    | `index.php?page = quiz` | `page = quiz` | `views/quiz.php` |\n\nLet’s create\
    \ the two new files as follows.\n\n```php\n<?php\n// views/search.php\n$info =\
    \ \"<h1>Search on bing</h1>\";\n$info .= \"<p>Search the web with a simple form.</p>\"\
    ;\n?>\n```\n\n**Listing 3-4** `search.php`\n\n```php\n<?php\n// views/quiz.php\n\
    $info = \"<h1>Dynamic quiz</h1>\";\n$info .= \"<p>Test your knowledge with a quiz.</p>\"\
    ;\n?>\n```\n\n**Listing 3-5** `quiz.php`\n\nVery simple code. But enough to help\
    \ us start testing our navigation.\n\n### Displaying Page Views on the Index Page\n\
    \nTo display these page views when requested, we have to write a few extra lines\
    \ of code almost identical to those we wrote in the index file for Chapter 2.\
    \ The only changes from the Chapter 2 project are the use of the quiz and search\
    \ views. Professional programmers develop a style of coding and stick with that\
    \ style to increase reliability, security, and code development time.\n\n```php\n\
    <?php\n$title = \"Building and processing HTML forms with PHP\";\n$pageData->content\
    \ = $nav;\n$pageData->content .= \"...and a form here\";\n$navigationIsClicked\
    \ = isset($_GET['page']);\nif ($navigationIsClicked ) {\n    $fileToLoad = $_GET['page'];\n\
    } else {\n    $fileToLoad = \"search\";\n}\ninclude_once \"views/$fileToLoad.php\"\
    ;\n$pageData->content .= $info;\nrequire \"templates/pagewithcss.php\";\necho\
    \ $page;\n?>\n```\n\n**Listing 3-6** `indexwithclass.php`\n\nThe page will now\
    \ load any view requested by a user. If no navigation item is clicked, it will\
    \ display `views/search.php`. We can test our code by loading `http://localhost/ch3/indexwithclass.php`\
    \ in a browser.\n\n![Figure 3-6](images/323857_3_En_3_Chapter/323857_3_En_3_Fig6_HTML.jpg)\n\
    \n**Figure 3-6** Output from `indexwithclass.php`\n\n### Program Design and Logic\n\
    \nReusing code is a good idea, because this allows the programmer to develop solutions\
    \ much faster, more reliable, and more secure. If you have scripts that work in\
    \ one project that has been well tested, you can trust them to do the same in\
    \ other projects. Hence, code reuse decreases debugging time and speeds up development\
    \ time.\n\nThere will always be parts you can’t easily reuse, such as the navigation.\
    \ But if you get into the habit of creating dynamic navigations in much the same\
    \ way across different projects, you’ll be able to develop new dynamic navigations\
    \ quickly and painlessly. So, when you can’t reuse code as is, you can still reuse\
    \ the principles underpinning the code that is already tested and reliable.\n\n\
    ### A Simple Search Form\n\nHTML forms are created with the `<form>` element.\
    \ There are a number of other HTML elements that are made specifically for forms.\
    \ Perhaps the most essential one is the `<input>` element to accept values from\
    \ the user. Let’s create a short form as follows.\n\n```php\n<?php\n$info = \"\
    <h1>Search on bing</h1>\";\n$info .= \"<form action=\\\"http://www.bing.com/search\\\
    \" method=\\\"get\\\">\";\n$info .= \"<input type=\\\"text\\\" name=\\\"q\\\"\
    \ />\";\n$info .= \"<input type=\\\"submit\\\" value=\\\"Search\\\" />\";\n$info\
    \ .= \"</form>\";\n?>\n```\n\n**Listing 3-7** `simplesearch.php`\n\n**Note**:\
    \ The navigation (`simplenavigation.php`) and index (`simpleindex.php`) files\
    \ were also updated to use the simple search form. Take some time to view the\
    \ changes to these files.\n\nLet’s test our new search form by calling it from\
    \ `simpleindex.php`.\n\n![Figure 3-7](images/323857_3_En_3_Chapter/323857_3_En_3_Fig7_HTML.jpg)\n\
    \n**Figure 3-7** Output from `simpleindex.php`\n\nWe can type a search string\
    \ in the text field and click the button. The browser will load `bing.com` because\
    \ the action setting in the form tag will pass the information via the get command\
    \ to the Bing search engine. Bing will perform a search for whatever we enter.\
    \ If we type *cats* and click the search button, then “cats” is passed to Bing.\
    \ After passing “cats,” the URL for Bing will contain `www.bing.com/search?q=cats`.\
    \ As we have stated previously, search engines accept information via the get\
    \ method to avoid using extra server memory when completing searches. Thus, Bing\
    \ was expecting a URL variable and we provided it. Notice that Bing uses the variable\
    \ `q` for the search information. Listing 3-7 shows that this variable is created\
    \ with the text box from the simple search form.\n\n**Note**: When using a form,\
    \ clicking the Submit button will cause any GET or POST variables to be sent to\
    \ the application on the web server listed in the action parameter. The application\
    \ can then retrieve that information for its use. The application will execute\
    \ within the web server, and the results of that execution will be sent to the\
    \ user’s browser to be displayed. In our example, the browser will display the\
    \ results of Bing’s search for cats."
