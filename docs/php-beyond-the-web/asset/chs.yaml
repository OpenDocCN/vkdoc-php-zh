  \ |\n\n### 5.15 SiteFusion\n\n`SiteFusion` 是一个基于 Mozilla `XULrunner` 的 GUI 解决方案。`XULrunner`\
  \ 是 Mozilla 的技术平台，Firefox 和 Thunderbird 等应用程序就是基于它构建的，它是一个通用的 XUL/HTML/Javascript\
  \ 运行时。`SiteFusion` 并非提供一个完全的本地解决方案，而是专注于服务器-客户端场景。一个本地客户端助手“XULrunner”应用程序安装在客户端\
  \ PC 上，但 PHP 应用程序代码则运行在服务器上，由定制的 `SiteFusion` 服务器软件管理。虽然可以将客户端和服务器安装在同一台机器上，但“本地\
  \ Web 服务器和浏览器”中列出的许多“缺点”也适用于这种配置。`SiteFusion` 将 XUL 作为构建界面的主要方法，尽管 XUL 与 HTML 类似，但仍有一个学习曲线。当然，由于\
  \ XUL 拥有浏览器元素，HTML 也可以被使用，然而 `SiteFusion` 没有提供任何 HTML/DOM 的抽象来辅助处理浏览器元素的内容。某些 HTML\
  \ 标签可以直接在 XUL 代码中使用（在浏览器元素之外），但 Mozilla 出于各种原因不推荐这样做。`SiteFusion` 的主要市场目标以及绝对值得考虑的应用领域是客户端-服务器应用程序，即需要在组织内部的本地网络上部署，并且希望对应用程序进行集中控制的场景。\n\
  \n**优点：**\n*   原生体验\n*   跨平台\n*   专为客户端-服务器应用程序设计\n*   项目稳定、成熟且持续开发\n\n**缺点：**\n\
  *   响应速度可能受网络延迟影响\n*   不适用于纯本地安装\n*   XUL 不如 HTML 常见，因此文档、支持和工具包较少，但 HTML 组件可以在浏览器元素中运行，并且一些\
  \ Javascript 工具/组件可以在 XUL 界面中/上运行。\n\n全面的教程和文档可以在 `SiteFusion.org` 网站上找到。\n\n| ![](img/image00249.gif)\
