    \ 8 个字符。\n用户名： \n密码：\n```\n\n## 示例 8-4\n\n具有密码超时和三次登录超时机制的 login.php 文件\n\n在示例\
    \ 8-4 中，`if` 语句将当前日期/时间与 `datestamp` 中保存的日期/时间进行比较。如果当前日期/时间比 `datestamp` 中的值晚\
    \ 30 天以上，则会调用密码修改程序（`changepassword`）。下一个 `if` 语句用于判断用户的无效登录尝试次数是否少于三次，并且距离上次尝试是否已超过五分钟。如果是这种情况，PHP\
    \ 方法 `password_verify` 会将用户输入的密码与 XML 文件中包含的密码进行比较。如果密码匹配，`validattempts` 值将更新为当前日期/时间，尝试次数将重置为\
    \ 0，用户 ID 和密码将保存在会话变量中。然后保存对 XML 文件的更改。此外，用户登录信息会记录在日志文件中。如果密码不匹配，`lastattempt`\
    \ 值将更新为当前日期/时间。\n\n由于有效的登录或密码过期会使应用程序通过 PHP 的 `header` 方法重定向到不同的程序，因此仅当用户 ID 和密码组合无效，或在五分钟内尝试次数过多时，程序才会执行到最后一个\
    \ `if` 语句。此时，会显示“无效用户 ID/密码”消息，并且尝试次数增加 1。然后保存对 XML 文件的更改。程序随后将继续显示用户 ID 和密码输入框，并附上“无效的用户\
    \ ID/密码”消息。如前所述，即使是有效的用户 ID/密码组合，如果在五分钟内被输入，或者出现三次或以上的无效输入（连续），也会被拒绝。\n\n## JSON\
    \ 数据\n\nJSON 数据需要做一些更改以容纳新增的字段。\n\n```\n{\"user\":[\n{\"userid\":\"Fredfred\"\
    ,\"password\":\"$2y$10$VosI32FejL.bOMaCjGbBp.Jre6Ipa.tLYQrVqj9kiVpef5zZ25qQK\"\
    ,\"datestamp\":\"2015-09-03\",\"attempts\":\"0\",\"lastattempt\":\"08052015044229\"\
    ,\"validattempt\": \"08052015045431\"},\n{\"userid\":\"Poppoppop\",\"password\"\
    :\"$2y$10$C1jXhTl0myamuLKhZxK5m.4X4TVcdeFbeLSBIA7l4fx6tUnC8vrg6\",\"datestamp\"\
    :\"2015-09-04\",\"attempts\":\"2\",\"lastattempt\":\"08062015011347\",\"validattempt\"\
    : \"08062015113038\"}\n]}\n```\n\n由于新增了这些字段，`$newupstring` 也需要进行更改。如前所述，部分代码的位置也需要移至方法中。\n\
    \n```\n$newupstring = ',{\"userid\":\"' . $user['userid'] . '\",\"password\":\"\
    ' . $user['password'] . '\",\"';\n$newupstring .= 'datestamp\":\"' . $user['datestamp']\
    \ . '\",\"attempts\":\"' . $user['attempts'] . \"',\"';\n$newupstring .= 'lastattempt\"\
    :\"' . $user['lastattempt'] . '\",\"validattempt\":\"' . $user['validattempt']\
    \ .'\"';\n$newupstring .= '\"}\\n]}';\n```\n\n## MySQL 数据\n\nMySQL 登录代码需要使用 `UPDATE`\
    \ 语句（而不是注册代码中的 `INSERT` 语句）来更新已更改的字段。此外，应使用第 5 章中的 `filter_var` 方法，从 `userid`\
    \ 字段中移除任何有害的 PHP 和 SQL 语句。这将有助于降低发生 *SQL 注入* 的几率，因为 SQL 注入可能导致 SQL 语句更改超出所需字段和记录的范围。例如，如果\
    \ `$user['userid']` 字段包含 `'*'`，则所有记录都将被更新，而不仅仅是具有有效用户 ID 的单条记录。在执行 `UPDATE` 语句之前，还可以验证用户\
    \ ID 是否存在于数据库中。这样做（假设数据库中的所有数据均有效）也能减少发生有害更改的可能性。\n\n在以下示例中，所有可能的文件会一次性更新。或者，也可以在需要时仅更新已更改的字段。但这样做需要更多代码，且不一定更高效。此外，如果未事先验证用户\
    \ ID 是否存在于数据库中，而 `userid` 又不在数据库里，那么 SQL 语句将自动不更新任何字段。\n"
