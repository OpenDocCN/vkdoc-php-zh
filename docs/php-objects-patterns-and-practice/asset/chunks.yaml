- fmt: '### Using the Reflection API


    With the basics of the Reflection API under your belt, you can now put the API
    to work.


    Imagine that you’re creating a class that calls `Module` objects dynamically.
    That is, it can accept plug-ins written by third parties that can be slotted into
    the application without the need for any hard-coding. To achieve this, you might
    define an `execute()` method in the `Module` interface or abstract base class,
    forcing all child classes to define an implementation. You could allow the users
    of your system to list `Module` classes in an external XML configuration file.
    Your system can use this information to aggregate a number of `Module` objects
    before calling `execute()` on each one.


    What happens, however, if each `Module` requires different information to do its
    job? In that case, the XML file can provide property keys and values for each
    `Module`, and the creator of each `Module` can provide setter methods for each
    property name. Given that foundation, it’s up to your code to ensure that the
    correct setter method is called for the correct property name.


    Here’s some groundwork for the `Module` interface and a couple of implementing
    classes:


    ```

    // listing 05.46

    class Person

    {

    public $name;

    public function __construct(string $name)

    {

    $this->name = $name;

    }

    }

    // listing 05.47

    interface Module

    {

    public function execute();

    }

    // listing 05.48

    class FtpModule implements Module

    {

    public function setHost($host)

    {

    print "FtpModule::setHost(): $host\n";

    }

    public function setUser($user)

    {

    print "FtpModule::setUser(): $user\n";

    }

    public function execute()

    {

    // do things

    }

    }

    // listing 05.49

    class PersonModule implements Module

    {

    public function setPerson(Person $person)

    {

    print "PersonModule::setPerson(): {$person->name}\n";

    }

    public function execute()

    {

    // do things

    }

    }

    ```


    Here, `PersonModule` and `FtpModule` both provide empty implementations of the
    `execute()` method. Each class also implements setter methods that do nothing
    but report that they were invoked. The system lays down the convention that all
    setter methods must expect a single argument: either a string or an object that
    can be instantiated with a single string argument. The `PersonModule::setPerson()`
    method expects a `Person` object, so I include a `Person` class in my example.


    To work with `PersonModule` and `FtpModule`, the next step is to create a `ModuleRunner`
    class. It will use a multidimensional array indexed by module name to represent
    configuration information provided in the XML file. Here’s that code:


    ```

    // listing 05.50

    class ModuleRunner

    {

    private $configData = [

    "popp\\ch05\\batch08\\PersonModule" => [''person'' => ''bob''],

    "popp\\ch05\\batch08\\FtpModule"    => [

    ''host'' => ''example.com'',

    ''user'' => ''anon''

    ]

    ];

    private $modules = [];

    // ...

    }

    ```


    The `ModuleRunner::$configData` property contains references to the two `Module`
    classes. For each module element, the code maintains a subarray containing a set
    of properties. `ModuleRunner`’s `init()` method is responsible for creating the
    correct `Module` objects, as shown here:


    ```

    // listing 05.51

    // class ModuleRunner

    public function init()

    {

    $interface = new \ReflectionClass(''popp\\ch05\\batch08\\Module'');

    foreach ($this->configData as $modulename => $params) {

    $module_class = new \ReflectionClass($modulename);

    if (! $module_class->isSubclassOf($interface)) {

    throw new Exception("unknown module type: $modulename");

    }

    $module = $module_class->newInstance();

    foreach ($module_class->getMethods() as $method) {

    $this->handleMethod($module, $method, $params);

    // we cover handleMethod() in a future listing!

    }

    array_push($this->modules, $module);

    }

    }

    // listing 05.52

    $test = new ModuleRunner();

    $test->init();

    ```


    The `init()` method loops through the `ModuleRunner::$configData` array, and for
    each module element, it attempts to create a `ReflectionClass` object. An exception
    is generated when `ReflectionClass`’s constructor is invoked with the name of
    a nonexistent class, so in a real-world context, I would include more error handling
    here. I use the `ReflectionClass::isSubclassOf()` method to ensure that the module
    class belongs to the `Module` type.


    Before you can invoke the `execute()` method of each `Module`, an instance has
    to be created. That’s the purpose of `ReflectionClass::newInstance()`. That method
    accepts any number of arguments, which it passes on to the relevant class’s constructor
    method. If all’s well, it returns an instance of the class (for production code,
    be sure to code defensively: check that the constructor method for each `Module`
    object doesn’t require arguments before creating an instance).


    `ReflectionClass::getMethods()` returns an array of all `ReflectionMethod` objects
    available for the class. For each element in the array, the code invokes the `ModuleRunner::handleMethod()`
    method. It then passes it a `Module` instance, the `ReflectionMethod` object,
    and an array of properties to associate with the `Module`. `handleMethod()` verifies
    and invokes the `Module` object’s setter methods:


    ```

    // listing 05.53

    // class ModuleRunner

    public function handleMethod(Module $module, \ReflectionMethod $method, $params)

    {

    $name = $method->getName();

    $args = $method->getParameters();

    if (count($args) != 1 || substr($name, 0, 3) != "set") {

    return false;

    }

    $property = strtolower(substr($name, 3));

    if (! isset($params[$property])) {

    return false;

    }

    $arg_class = $args[0]->getClass();

    if (empty($arg_class)) {

    $method->invoke($module, $params[$property]);

    } else {

    $method->invoke(

    $module,

    $arg_class->newInstance($params[$property])

    );

    }

    }

    ```


    `handleMethod()` first checks that the method is a valid setter. In the code,
    a valid setter method must be named `setXXXX()` and must declare one—and only
    one—argument.


    Assuming that the argument checks out, the code then extracts a property name
    from the method name by removing `set` from the beginning of the method name and
    converting the resulting substring to lowercase characters. That string is used
    to test the `$params` array argument. This array contains the user-supplied properties
    that are to be associated with the `Module` object. If the `$params` array doesn’t
    contain the property, the code gives up and returns `false`.


    If the property name extracted from the module method matches an element in the
    `$params` array, I can go ahead and invoke the correct setter method. To do that,
    the code must check the type of the first (and only) required argument of the
    setter method. The `ReflectionParameter::getClass()` method provides this information.
    If the method returns an empty value, the setter expects a primitive of some kind;
    otherwise, it expects an object.


    To call the setter method, I need a new Reflection API method. `ReflectionMethod::invoke()`
    requires an object (or `null` for a static method) and any number of method arguments
    to pass on to the method it represents. `ReflectionMethod::invoke()` throws an
    exception if the provided object does not match its method. I call this method
    in one of two ways. If the setter method doesn’t require an object argument, I
    call `ReflectionMethod::invoke()` with the user-supplied property string. If the
    method requires an object, I use the property string to instantiate an object
    of the correct type, which is then passed to the setter.


    The example assumes that the required object can be instantiated with a single
    string argument to its constructor. It’s best, of course, to check this before
    calling `ReflectionClass::newInstance()`.


    By the time that the `ModuleRunner::init()` method has run its course, the object
    has a store of `Module` objects, all primed with data. The class can now be given
    a method to loop through the `Module` objects, calling `execute()` on each one.'
  raw: '### Using the Reflection API


    With the basics of the Reflection API under your belt, you can now put the API
    to work.


    Imagine that you’re creating a class that calls `Module` objects dynamically.
    That is, it can accept plug-ins written by third parties that can be slotted into
    the application without the need for any hard-coding. To achieve this, you might
    define an `execute()` method in the `Module` interface or abstract base class,
    forcing all child classes to define an implementation. You could allow the users
    of your system to list `Module` classes in an external XML configuration file.
    Your system can use this information to aggregate a number of `Module` objects
    before calling `execute()` on each one.


    What happens, however, if each `Module` requires different information to do its
    job? In that case, the XML file can provide property keys and values for each
    `Module`, and the creator of each `Module` can provide setter methods for each
    property name. Given that foundation, it’s up to your code to ensure that the
    correct setter method is called for the correct property name.


    Here’s some groundwork for the `Module` interface and a couple of implementing
    classes:


    ```

    // listing 05.46

    class Person

    {

    public $name;

    public function __construct(string $name)

    {

    $this->name = $name;

    }

    }

    // listing 05.47

    interface Module

    {

    public function execute();

    }

    // listing 05.48

    class FtpModule implements Module

    {

    public function setHost($host)

    {

    print "FtpModule::setHost(): $host\n";

    }

    public function setUser($user)

    {

    print "FtpModule::setUser(): $user\n";

    }

    public function execute()

    {

    // do things

    }

    }

    // listing 05.49

    class PersonModule implements Module

    {

    public function setPerson(Person $person)

    {

    print "PersonModule::setPerson(): {$person->name}\n";

    }

    public function execute()

    {

    // do things

    }

    }

    ```


    Here, `PersonModule` and `FtpModule` both provide empty implementations of the
    `execute()` method. Each class also implements setter methods that do nothing
    but report that they were invoked. The system lays down the convention that all
    setter methods must expect a single argument: either a string or an object that
    can be instantiated with a single string argument. The `PersonModule::setPerson()`
    method expects a `Person` object, so I include a `Person` class in my example.


    To work with `PersonModule` and `FtpModule`, the next step is to create a `ModuleRunner`
    class. It will use a multidimensional array indexed by module name to represent
    configuration information provided in the XML file. Here’s that code:


    ```

    // listing 05.50

    class ModuleRunner

    {

    private $configData = [

    "popp\\ch05\\batch08\\PersonModule" => [''person'' => ''bob''],

    "popp\\ch05\\batch08\\FtpModule"    => [

    ''host'' => ''example.com'',

    ''user'' => ''anon''

    ]

    ];

    private $modules = [];

    // ...

    }

    ```


    The `ModuleRunner::$configData` property contains references to the two `Module`
    classes. For each module element, the code maintains a subarray containing a set
    of properties. `ModuleRunner`’s `init()` method is responsible for creating the
    correct `Module` objects, as shown here:


    ```

    // listing 05.51

    // class ModuleRunner

    public function init()

    {

    $interface = new \ReflectionClass(''popp\\ch05\\batch08\\Module'');

    foreach ($this->configData as $modulename => $params) {

    $module_class = new \ReflectionClass($modulename);

    if (! $module_class->isSubclassOf($interface)) {

    throw new Exception("unknown module type: $modulename");

    }

    $module = $module_class->newInstance();

    foreach ($module_class->getMethods() as $method) {

    $this->handleMethod($module, $method, $params);

    // we cover handleMethod() in a future listing!

    }

    array_push($this->modules, $module);

    }

    }

    // listing 05.52

    $test = new ModuleRunner();

    $test->init();

    ```


    The `init()` method loops through the `ModuleRunner::$configData` array, and for
    each module element, it attempts to create a `ReflectionClass` object. An exception
    is generated when `ReflectionClass`’s constructor is invoked with the name of
    a nonexistent class, so in a real-world context, I would include more error handling
    here. I use the `ReflectionClass::` `isSubclassOf()` method to ensure that the
    module class belongs to the `Module` type.


    Before you can invoke the `execute()` method of each `Module`, an instance has
    to be created. That’s the purpose of `ReflectionClass::newInstance()`. That method
    accepts any number of arguments, which it passes on to the relevant class’s constructor
    method. If all’s well, it returns an instance of the class (for production code,
    be sure to code defensively: check that the constructor method for each `Module`
    object doesn’t require arguments before creating an instance).


    `ReflectionClass::getMethods()` returns an array of all `ReflectionMethod` objects
    available for the class. For each element in the array, the code invokes the `ModuleRunner::`
    `handleMethod()` method . It then passes it a `Module` instance, the `ReflectionMethod`
    object, and an array of properties to associate with the `Module. handleMethod()`
    verifies and invokes the `Module` object’s setter methods :


    ```

    // listing 05.53

    // class ModuleRunner

    public function handleMethod(Module $module, \ReflectionMethod $method, $params)

    {

    $name = $method->getName();

    $args = $method->getParameters();

    if (count($args) != 1 || substr($name, 0, 3) != "set") {

    return false;

    }

    $property = strtolower(substr($name, 3));

    if (! isset($params[$property])) {

    return false;

    }

    $arg_class = $args[0]->getClass();

    if (empty($arg_class)) {

    $method->invoke($module, $params[$property]);

    } else {

    $method->invoke(

    $module,

    $arg_class->newInstance($params[$property])

    );

    }

    }

    ```


    `handleMethod()` first checks that the method is a valid setter. In the code,
    a valid setter method must be named `setXXXX()` and must declare one—and only
    one—argument.


    Assuming that the argument checks out, the code then extracts a property name
    from the method name by removing `set` from the beginning of the method name and
    converting the resulting substring to lowercase characters. That string is used
    to test the `$params` array argument . This array contains the user-supplied properties
    that are to be associated with the `Module` object. If the `$params` array doesn’t
    contain the property, the code gives up and returns `false`.


    If the property name extracted from the module method matches an element in the
    `$params` array, I can go ahead and invoke the correct setter method. To do that,
    the code must check the type of the first (and only) required argument of the
    setter method. The `ReflectionParameter::getClass()` method provides this information.
    If the method returns an empty value, the setter expects a primitive of some kind;
    otherwise, it expects an object.


    To call the setter method, I need a new Reflection API method. `ReflectionMethod::invoke()`
    requires an object (or `null` for a static method) and any number of method arguments
    to pass on to the method it represents. `ReflectionMethod::` `invoke()` throws
    an exception if the provided object does not match its method. I call this method
    in one of two ways. If the setter method doesn’t require an object argument, I
    call `ReflectionMethod::invoke()` with the user-supplied property string. If the
    method requires an object, I use the property string to instantiate an object
    of the correct type, which is then passed to the setter.


    The example assumes that the required object can be instantiated with a single
    string argument to its constructor. It’s best, of course, to check this before
    calling `ReflectionClass::newInstance()`.


    By the time that the `ModuleRunner::init()` method has run its course, the object
    has a store of `Module` objects, all primed with data. The class can now be given
    a method to loop through the `Module` objects, calling `execute()` on each one.'
