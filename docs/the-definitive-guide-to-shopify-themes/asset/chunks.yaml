  trans: '

    # 首页


    如前一章所述，我认为客户常常过于关注首页上每个微小细节的完美呈现，却牺牲了客户旅程中的其他环节。然而，精心设计的首页之重要性也不容低估——只是对像素级完美的执念不应导致你忽视页面本身的主要目标。


    ## 首页的设计目标


    在设计首页时，应努力实现三个主要目标：


    *   向客户传达品牌定位

    *   向客户传达店铺提供的商品

    *   向客户传达下一步操作指引


    ### 传达品牌定位


    “品牌个性”、“企业形象”、“生活方式品牌”。无论你想用哪种营销术语，首页都必须让访客立刻感受到店铺的本质特质。


    用户对不同垂直行业的在线商店外观有着强烈的预期。这并不意味着你应该完全照搬竞争对手的设计而放弃创新，但值得关注市场惯例——比如通用术语、分类方式和风格元素——以避免因过度创新而影响转化率。简而言之，滑板品牌不应该看起来像沃尔玛。


    传达信息的最佳方式是将店铺的简短描述与合适的视觉素材相结合。（没错，这听起来简单得可笑。但你会发现，许多店铺在这方面做得有多差。）你可以在图 6-1 中看到实现与未实现该目标的首页两极分化的例子。


    ![A437216_1_En_6_Fig1_HTML.jpg](img/A437216_1_En_6_Fig1_HTML.jpg)


    图 6-1


    Brooklinen 的首页（左图）清晰展示了其产品系列，而 Clove Club 则为了保持神秘感牺牲了转化率


    ### 传达产品范围


    Baymard 研究所的 Christian Holst 将电商首页的试金石测试描述为：


    > 快速浏览你的首页能否充分传达店铺的产品多样性？如果不能，首次访问者可能会对网站产品目录的范围得出错误结论。


    简而言之，如果你的店铺销售种类繁多的产品，但首页只突出展示了其中一小部分或单一产品系列，客户可能会认为你不出售他们想要的商品而离开网站。传达产品的最佳方式取决于所提供的产品范围。如果店铺更偏向“产品型”公司，只销售单一产品线（如苹果），那么只需突出展示几款最热门或最新的商品可能就足够了。相反，如果店铺更偏向“零售商”模式，销售多种不同产品线（如沃尔玛），则更可能在首页突出展示并推广整个品类或产品线（见图
    6-2）。


    ![A437216_1_En_6_Fig2_HTML.jpg](img/A437216_1_En_6_Fig2_HTML.jpg)


    图 6-2


    苹果（“产品型”公司）和沃尔玛（“零售型”公司）的首页


    注意两家店铺在关注点上的差异——苹果侧重于突出某一关键产品并直接链接到该产品，而沃尔玛则直接通过首页展示整个品类的链接。


    ### 清晰的下一步操作


    电商店铺设计师可能犯的最大错误之一，就是让访客不清楚该采取什么行动才能更接近购买目标。


    在传达了品牌定位和所提供的产品之后，下一步任务是确保潜在客户拥有清晰的路径，能够浏览店铺的品类和/或深入查看特定产品。与你选择展示产品范围的方式一样，设计如何实现这一目标很可能取决于所提供的品类和产品数量。


    “产品型”公司可以在首页不同位置展示其全部产品线，并直接链接到各个产品页面。行动号召可以更具体（“了解更多关于新款 MacBook Air 的信息”）。


    “零售型”公司则应在首页展示关键品类，鼓励用户点击并浏览其全部产品范围，以增加找到心仪商品的几率。产品范围广泛的店铺应设计首页，使其更侧重于导航元素和搜索功能——回顾第
    4 章对这些元素的讨论。


    ## 实现首页


    正如设计目标所示，你的首页通常需要高度的灵活性，以适配使用你主题的不同类型商家，并允许展示不同内容类型——这些内容可能不与产品或系列直接相关（例如，博客文章）。即使你正在为特定商家设计主题，他们的需求和营销活动也会随时间变化，这要求首页内容能够被定制。


    幸运的是，Shopify 为其网站首页提供了一项名为“动态分区”的功能，它允许你设计各种关键组件，商家随后可以选择并配置这些组件，以匹配自己的使用场景。下一节将介绍如何在我们的示例主题中创建三种不同类型的动态分区——“主视觉图片”、“特色产品”区块和“特色系列”区块（见图
    6-3）。使用此主题的店主将能够根据需要在其首页上添加、配置和重新排列这些分区，以满足本章开头列出的设计目标。


    ![A437216_1_En_6_Fig3_HTML.jpg](img/A437216_1_En_6_Fig3_HTML.jpg)


    图 6-3


    显示我们将实现的三个关键首页分区——“主视觉图片”、特色产品区块和特色系列区块的示意图


    ### 上手首页分区


    Shopify 使用文件`template/index.liquid`来渲染商店的首页。与其他模板一样，由`index.liquid`生成的 HTML 将在`layout/theme.liquid`内部渲染。传统上，首页模板的实现方式与其他页面模板相同，首页所需的
    HTML 和 Liquid 代码直接添加到`index.liquid`中。


    然而，在主题首页上引入动态分区意味着，用于渲染首页内容的大部分代码将出现在独立定义的分区中。就像`layout/theme.liquid`中的`{{ content_for_layout
    }}`标签会被当前主题的页面内容替换一样，`templates/index.liquid`中的`{{ content_for_index }}`标签也会被店主配置的动态生成的分区内容替换。


    由于目前将所有首页内容交由分区管理已足够，我们可以更新`templates/index.liquid`的内容，使其仅包含清单 6-1 中的代码。


    ```

    {{ content_for_index }}


    清单 6-1

    `templates/index.liquid`的简单内容，用于在首页启用动态分区渲染

    ```

