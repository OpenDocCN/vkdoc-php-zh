  \ Amazon Super Hats 部门。\n\n\n\n"
- "# 工作原理：在 HatShop 中展示亚马逊商品\n\n在本练习中，您只需使用本章第一部分学习的技术，更新 `HatShop` 以展示亚马逊的商品。这项新功能并不特别复杂，但其带来的可能性令人兴奋。\n\
  \n若要更改访问方式，请修改 `include/config.php` 中的以下内容：\n\n```\n// Amazon E-Commerce Service\n\
  define('AMAZON_METHOD', 'REST');\n//define('AMAZON_METHOD', 'SOAP');\n```\n\n当点击“从亚马逊购买”链接时，亚马逊会将客户及其购买的商品关联到您的合作伙伴\
  \ ID（该 ID 在链接中提及）。在 `AmazonProductsList` 类的 `init` 方法中，会调用 `Amazon` 类的 `GetProducts`\
  \ 方法来获取数据，从而填充产品列表。这些数据会被读取，用于构建指向检索到产品的亚马逊链接：\n\n```\npublic function init()\n\
  {\n    $amazon = new Amazon();\n    $this->mProducts = $amazon->GetProducts();\n\
  \    for ($i = 0;$i < count($this->mProducts); $i++)\n        $this->mProducts[$i]['link']\
  \ =\n            'http://www.amazon.com/exec/obidos/ASIN/' .\n            $this->mProducts[$i]['asin']\
  \ .\n            '/ref=nosim/' . AMAZON_ASSOCIATES_ID;\n}\n```\n\n不过，您必须知道，亚马逊提供了许多方式，让您可以允许访客购买他们的产品。\n\
  \n如果您登录到合作伙伴页面，您会看到多种可以构建并集成到您网站中的链接类型。\n\n或许最有趣且最强大的功能是，通过使用亚马逊 API，您可以从 PHP 代码中创建和管理亚马逊购物车。如果您真的希望将亚马逊整合到您的网站中，您应该仔细研究\
  \ ECS 文档并充分利用它。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n648XCH17a.qxd\
  \ 11/22/06 5:42 AM Page 569\n\n第 17 章 ■ 连接 Web 服务\n\n**569**\n\n## 总结\n\n在本章中，您学习了如何使用\
  \ `REST` 和 `SOAP` 访问亚马逊电子商务服务。在通过这些协议访问任何类型的外部功能时，您都可以使用相同的技术。\n\n恭喜您，您刚刚完成了学习使用\
  \ PHP 和 PostgreSQL 构建电子商务网站的旅程。您已经具备了构建自己定制解决方案的知识，这些方案甚至可能比本书展示的更令人兴奋、更强大。我们希望您喜欢阅读这本书，并祝您在自己的\
  \ PHP 和 PostgreSQL 项目中好运！\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  648XCH17a.qxd 11/22/06 5:42 AM Page 570\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n648XAppA.qxd 11/19/06 1:45 PM Page 571\n\n## 附录 A：安装 Apache、PHP 和 PostgreSQL\n\
  \n在本附录中，您将学习如何安装：\n\n- Apache 2.2\n- PHP 5.1 以及本书所需的额外模块\n- PostgreSQL 8.1\n\n这些是本附录测试过的软件版本。不过，您应该安装所有软件包的最新版本，并理解安装步骤可能会略有不同。我们将分别讨论在\
  \ Windows 和 Linux 下的安装。\n\n您在本书中开发的 `HatShop` 应用程序也可能在旧版本的软件上运行。非常重要的是，PHP 版本应为\
  \ PHP 5.0 或更高版本；代码使用了旧版 PHP 无法识别的 OOP 语法。\n\n由于信用卡信息等高度敏感数据必须在网络上安全传输，因此将您的应用程序托管在支持\
  \ SSL 的 Web 服务器上至关重要。此外，PHP 安装必须包含以下模块：`CURL`、`mcrypt`、`mhash`、`SOAP`、`PDO` 以及适用于\
  \ PostgreSQL 的 `PDO` 驱动程序。\n\n## 准备您的 Windows 开发环境\n\n在本节中，您将学习如何在您的开发机上安装 Apache\
  \ 2.2、PHP 5.1 和 PostgreSQL 8.1。\n\n在 Windows 中，安装支持 SSL 的 Apache 比安装不带 SSL 的 Apache\
  \ 要稍微复杂一些。即使您没有支持 SSL 的 Apache，也可以继续学习本书；如果选择这样做，您可以跳到接下来的“安装 Apache（无 SSL）”部分。\n\
  \n\n\n"
- "# 安装支持 SSL 的 Apache\n\n以下步骤将在 80 端口安装 Apache，因此必须确保没有其他 Web 服务器（如 IIS）在该端口运行。\n\
  \n1. 从 `http://www.apachelounge.com/download/` 下载 `httpd-2.2.3-win32-x86-ssl.zip`\
  \ 或更新版本。\n2. 解压存档，按照 `Read Me First.txt` 中的步骤操作。Apache 将安装在 `C:\\Apache2` 目录下，但此时\
  \ `https://localhost` 尚无法响应——还需执行以下步骤。\n3. 将 `C:\\Apache2\\bin` 中的 `ssleay32.dll`\
  \ 和 `libeay32.dll` 复制到 Windows 安装目录的 `System32` 文件夹中（通常完整路径为 `C:\\Windows\\System32`）。\n\
  4. 打开命令提示符窗口，通过类似 `cd C:\\Apache2\\bin` 的命令导航至 Apache 安装目录的 `C:\\Apache2\\bin` 文件夹。\n\
  5. 执行以下命令，可根据需要将 `hatshop.csr` 替换为其他名称（但请务必保留 `.csr` 扩展名）：\n   ```\n   openssl req\
  \ -config C:\\Apache2\\conf\\openssl.cnf -new -out hatshop.csr\n   ```\n6. 当提示输入\"\
  通用名称（即您的网站域名）\"时，请提供 Web 服务器的准确域名（例如 `www.example.com`）。如果证书中的名称与 URL 不严格匹配，浏览器会向用户显示警告信息。\n\
  7. 执行以下命令：\n   ```\n   openssl rsa -in privkey.pem -out hatshop.key\n   ```\n8.\
  \ 执行以下命令：\n   ```\n   openssl x509 -in hatshop.csr -out hatshop.crt -req -signkey\
  \ hatshop.key -days 365\n   ```\n9. 在 Apache 文件夹中创建名为 `C:\\Apache2\\conf\\ssl` 的目录，并将\
  \ `hatshop.key` 和 `hatshop.crt` 移动至该目录。\n10. 打开 `C:\\Apache2\\conf\\httpd.conf`，取消以下两行的注释：\n\
  \    ```\n    LoadModule ssl_module modules/mod_ssl.so\n    Include conf/extra/httpd-ssl.conf\n\
  \    ```\n11. 打开 `C:\\Apache2\\conf\\extra\\httpd-ssl.conf`，找到 `SSLCertificateFile\
  \ c:/Apache2/conf/server.crt` 并将其更改为 `SSLCertificateFile c:/Apache2/conf/ssl/hatshop.crt`。\n\
  12. 同样在 `httpd-ssl.conf` 中，找到 `SSLCertificateKeyFile c:/Apache2/conf/server.key`\
  \ 并将其更改为 `SSLCertificateKeyFile c:/Apache2/conf/ssl/hatshop.key`。\n13. 重启 Apache，并访问\
  \ `https://localhost`。您将看到一个简单的\"It Works\"页面。\n\n## 安装 Apache（无 SSL）\n\n如果您已安装支持\
  \ SSL 的 Apache，则无需执行以上步骤，可直接跳至下一节安装 PHP。\n\n从 `http://httpd.apache.org/download.cgi`\
  \ 下载 Apache HTTP Server 的最新 Win32 二进制版本（MSI 安装程序）。文件名称类似 `apache_2.x.y-win32-x86-no_ssl.msi`。运行该文件。\n\
  \n安装过程中，您可以选择 Apache Web 服务器的安装位置。默认位置为 `C:\\Program Files\\Apache Software Foundation\\\
  Apache2.2\\`，但您可以选择更方便的路径（例如 `C:\\Apache2`），这能让您在后续使用 Apache 时更轻松。\n\n接受许可协议并阅读简介后，系统会要求您输入服务器信息（见图\
  \ A-1）。\n\n**图 A-1.** *安装 Apache*\n\n如果不确定如何填写表单，只需在前两个字段中使用 `localhost`，并在最后一个字段中输入电子邮件地址。您之后可以通过编辑\
  \ `httpd.conf` 文件（默认位于 `C:\\Program Files\\Apache Software Foundation\\ApacheX.Y\\\
  conf\\httpd.conf`）来修改这些信息。\n\n\n\n如果你已经有一个 Web 服务器（例如 IIS）在 80 端口上运行，你就需要将 Apache\
  \ 安装到其他端口上。安装过程中，你会有一个选项，指定 Apache 应“仅为当前用户工作，在端口 8080 上，且手动启动”。如果选择该选项，你需要手动进入\
  \ Apache 的安装目录（默认是 `C:\\Program Files\\Apache Software Foundation\\Apache2.2\\bin`），并输入以下命令来启动\
  \ Apache 服务：\n\n```\napache -k install\n```\n\n在其他屏幕中，你可以使用默认选项。\n\n安装 Apache 服务后，你将能在“Apache\
  \ 服务监视器”程序（可从任务栏访问）中看到它，该程序也允许你启动、停止或重启 Apache 服务。在对 `httpd.conf` 配置文件进行更改后，你需要重启（或停止后再启动）该服务。\n\
  \n确保 Apache2 服务已启动并运行后，测试其是否工作正常。如果你将其安装在 80 端口上，请访问 `http://localhost/`。如果安装在 8080\
  \ 端口上，请访问 `http://localhost:8080/`。你应看到一个欢迎消息，对于 Apache 2.2，该消息显示为“It works!”。\n\
  \n## 安装 PHP 5\n\n首先从 `http://www.php.net/downloads.php` 下载最新版本 PHP 的 Windows 二进制文件。不要使用\
  \ PHP 安装程序，因为它不包含 HatShop 所需的外部扩展。\n\n> **注意**：该代码无法在 PHP 4 或更旧版本上运行！\n\n下载完 Windows\
  \ 二进制文件后，按照以下步骤安装 PHP：\n\n1.  将压缩文件（文件名类似 `php-5.x.y-win32.zip`）解压到名为 `C:\\PHP`\
  \ 的文件夹中。你也可以为此文件夹选择其他名称或位置。\n\n2.  将 `php5ts.dll` 从 `C:\\PHP` 复制到 `C:\\Windows\\\
  System32`（如果 `System32` 文件夹在其他位置，则复制到相应位置）。\n\n3.  将 `php.ini-recommended` 从 `C:\\\
  PHP` 复制到你的 Windows 文件夹，并将其重命名为 `php.ini`。\n\n4.  取消 `php.ini` 中以下行的注释，以启用 `mhash`、`mcrypt`、`curl`、`pdo`\
  \ 和 `soap` 扩展。如果文件中没有这些行，直接添加即可。\n\n    ```\n    extension=php_mhash.dll\n    extension=php_mcrypt.dll\n\
  \    extension=php_curl.dll\n    extension=php_pdo.dll\n    extension=php_pdo_pgsql.dll\n\
  \    extension=php_soap.dll\n    ```\n\n5.  同样在 `php.ini` 中找到以下行：\n\n    ```\n \
  \   extension_dir = \"./\"\n    ```\n\n    并将其改为：\n\n    ```\n    extension_dir\
  \ = \"C:\\PHP\\ext\"\n    ```\n\n6.  将 `libmhash.dll`、`libeay32.dll`、`ssleay32.dll`\
  \ 和 `libmcrypt.dll` 从你的 PHP 文件夹复制到 Windows 的 `System32` 文件夹。\n\n7.  使用任意文本编辑器（甚至记事本）打开\
  \ Apache 配置文件进行编辑。该文件的默认位置是 Apache 安装目录下的 `conf\\httpd.conf`。\n\n8.  在 `httpd.conf`\
  \ 中找到包含多个 `LoadModule` 条目的部分，并添加以下行（具体名称可能因你的 Apache 和 PHP 版本而异）：\n    ```\n   \
  \ LoadModule php5_module c:/php/php5apache2_2.dll\n    AddType application/x-httpd-php\
  \ .php\n    ```\n\n    > **注意**：如果你的 PHP 文件夹中没有 `php5apach2_2.dll` 文件，可以从 `http://snaps.php.net/`\
  \ 下载的包中获取。\n\n9.  同样在 `httpd.conf` 中找到 `DirectoryIndex` 条目，并在行末添加 `index.php`，如下所示：\n\
  \    ```\n    DirectoryIndex index.html index.php\n    ```\n\n10. 保存对 `httpd.conf`\
  \ 的更改，然后重启 Apache 2。如果在此阶段遇到任何错误，应检查你是否正确执行了前面的步骤。\n\n11. 为测试 PHP 安装是否正常，请在 Apache\
  \ 安装目录的 `htdocs` 文件夹中创建一个名为 `test.php` 的文件，其中包含对 PHP 的 `phpinfo()` 函数的调用：\n\n  \
  \  ```\n    <?php\n    phpinfo();\n    ?>\n    ```\n\n12. 在 Web 浏览器中访问 `http://localhost/test.php`（如果你将\
  \ Apache 安装在 8080 端口上，则访问 `http://localhost:8080/test.php`），以测试安装是否一切顺利。你应看到一个与第\
  \ 2 章图 2-7 类似的 PHP 信息页面。\n\n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00175.png)\n\n`648XAppA.qxd 11/19/06 1:45 PM Page 576`\n\n**576**\n\n\
  附录 A ■ 安装 Apache、PHP 和 PostgreSQL\n\n**安装 PostgreSQL**\n\n要安装 PostgreSQL，请遵循以下简单步骤。我们已使用\
  \ PostgreSQL 8.1 对这些步骤进行了测试，但你应下载 PostgreSQL 的最新可用版本。\n\n1. 访问 `http://www.postgresql.org/`，并从菜单中点击“Downloads”（下载）链接。\n\
  2. 在“Download Core Distribution”（下载核心发行版）对话框中，点击“Via FTP”。\n3. 从列表中选择二进制目录。\n4.\
  \ 选择最新稳定版本的文件夹。\n5. 选择 `win32`。\n6. 下载安装程序文件，其名称类似于 `postgresql-*version*.zip`。之后可能会要求你选择一个镜像位置。请选择一个离你当前位置较近的镜像。\n\
  7. 解压下载的文件，并运行安装程序的可执行文件。\n8. 在第一个设置界面中，选择你的语言，然后点击“Start”（开始）。\n9. 在前几个设置界面中使用默认选项，但务必在“Service\
  \ configuration”（服务配置）界面中设置账户密码（见图 A-2）。\n\n**图 A-2.** *测试 PHP 安装*\n\n10. 点击“Next”（下一步）后，确认在\
  \ Windows 中创建 `postgres` 用户账户。如果系统警告你的密码强度较弱，在本地机器上开发期间，当被询问是否用随机密码替换时，选择“否”（No）通常是安全的。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n`648XAppA.qxd 11/19/06 1:45\
  \ PM Page 577`\n\n**577**\n\n附录 A ■ 安装 Apache、PHP 和 PostgreSQL\n\n11. 在下一个界面中，系统将要求你配置数据库集群。请根据你的特定需求选择设置。例如，如果你打算存储默认编码不支持的文本，选择默认编码为\
  \ UTF-8 可能是安全的。\n12. 点击“Next”（下一步），确保已选中选定的过程语言 `PL/pgsql`，然后再次点击“Next”。\n13. 在“Enable\
  \ Contrib Modules”（启用贡献模块）界面中，选择 `TSearch2`（用于全文搜索），然后点击两次“Next”（下一步）以安装 PostgreSQL。\n\
  \n**准备你的 Unix 测试环境**\n\n几乎所有 Linux 发行版都包含 Apache、PHP 和 PostgreSQL，但是这些程序的版本可能已经过时。在尝试下载任何内容之前，你应该首先检查是否能在系统、在线资源或\
  \ Linux 发行版的安装光盘中找到所需内容。我们对 Apache 和 PostgreSQL 的要求不高，因此你可以为它们进行二进制安装，但你必须从源代码编译\
  \ PHP，以启用所有必需的库。\n\n**安装 Apache 2**\n\n创建支持 SSL 的 Web 服务器最常见的方法是使用 Apache 和 OpenSSL。你的系统上可能已经安装了它们。\n\
  \n你应首先使用以下命令检查系统上是否已安装 OpenSSL RPM 包：\n\n`rpm -qa | grep openssl`\n\n如果没有 OpenSSL，请从\
  \ `http://www.rpmfind.net/` 等资源处获取以下 RPM 包并进行安装。请务必获取最新的可用版本。\n\n- `openssl-*version*.rpm`\n\
  - `openssl-devel-*version*.rpm`\n\n我们决定从源代码构建最新的 Apache Web 服务器（撰写本文时为版本 2.2.3）。首先，你应从\
  \ `http://httpd.apache.org/download.cgi` 下载最新的 Unix Apache 源代码，并使用类似以下命令解压：`tar\
  \ -zxvf httpd-2.2.3.tar.gz`\n\n现在你可以继续在系统上编译并安装 Apache Web 服务器。进入 Apache 源代码的根目录，并执行以下命令（执行\
  \ `make install` 时需要以 `root` 身份登录）：\n\n```\n./configure --prefix=/usr/local/apache2\
  \ --enable-so --enable-ssl --with-ssl --enable-auth-digest\nmake\nmake install\n\
  ```\n\n`648XAppA.qxd 11/19/06 1:45 PM Page 578`\n\n**578**\n\n附录 A ■ 安装 Apache、PHP\
  \ 和 PostgreSQL\n\n要启用 SSL，你需要在 Apache 中安装 SSL 证书。如果你使用提供 SSL 的主机托管服务商托管应用程序，可以在开发机器上使用自己生成的“假”SSL\
  \ 证书进行所有测试。你可以通过将自己设为证书颁发机构来做到这一点。要生成自己的证书，应遵循网上一些优秀的教程，例如 `http://www.linux.com/howtos/SSL-Certificates-HOWTO/index.shtml`\
  \ 上的教程（你也可以通过简单的网络搜索找到更多教程）。否则，如果你希望为生产环境安装 SSL 证书，则需要从证书颁发机构（如 VeriSign）获取“真正的”SSL\
  \ 证书，如第 7 章所述。\n\n在 `httpd.conf` 配置文件中进行所需的所有更改，然后使用以下命令启动 Apache 服务器：\n\n`/usr/local/apache2/bin/apachectl\
  \ start`\n\n> **注意：** 如果遇到类似“module access_module is built in and can’t be loaded”（模块\
  \ access_module 已内置且无法加载）的错误，请尝试注释掉 `httpd.conf` 中与生成该错误的模块相对应的 `LoadModule` 行。更好的方法是尝试注释掉所有不需要的模块。\n\
  \n现在在浏览器中加载 `http://localhost/`，确保 Apache Web 服务器已启动并运行，然后浏览 `https://localhost/`\
  \ 以测试是否也能通过 SSL 访问 Apache。\n\n**安装 PostgreSQL 8**\n\n请按照以下步骤在您的系统上安装 PostgreSQL：\n\
  \n1. 从 `http://www.postgresql.org/ftp/source/` 下载 PostgreSQL 源代码。就本安装指南而言，我们使用 `postgresql-8.1.5.tar.gz`，但你应下载最新的可用版本。\n\
  2. 使用如下命令解压存档：`tar -zxvf postgresql-8.1.5.tar.gz`\n3. 切换到 `postgresql-8.1.5` 文件夹：`cd\
  \ postgresql-8.1.5`\n4. 执行以下命令，将 PostgreSQL 准备安装到 `/usr/local/pgsql`：`./configure\
  \ --prefix=/usr/local/pgsql`\n5. 确保以 `root` 身份登录（如有必要，使用 `su` 命令），然后执行：`make install`\n\
  6. 出于安全原因，PostgreSQL 不允许 `root` 启动服务器。执行以下命令以将所有文件的所有者更改为 `postgres`：`chown -R postgres:postgres\
  \ /usr/local/pgsql`\n7. 以 `postgres` 身份登录，或使用 `su` 命令，然后切换目录到 `/usr/local/pgsql`：`cd\
  \ /usr/local/pgsql`\n8. 使用此命令初始化数据库集群：`bin/initdb -D ./data`\n9. 使用此命令启动 PostgreSQL：`bin/pg_ctl\
