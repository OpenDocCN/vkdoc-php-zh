  trans: '

    我们需要以类似于之前使用 PHP `explode` 方法拆分数据的方式，对此处数据进行拆分。在 JavaScript 中，`split` 方法会根据所提供的参数
    (`|`) 将字符串拆分为一个数组。在本例中，这将创建一个名为 `responsevalues` 的数组。`var` 关键字使此数组成为该方法的局部变量。当方法结束（即遇到
    `}` 符号）时，该数组将不再需要并被销毁。现在，该数组包含三行。第一行 (`[0]`) 包含了 `getBreeds` 列表框的代码。第二行 (`[1]`)
    包含了 `dogs` 列表框的代码。第三行（我猜你已经猜到了）包含了完整的 dogs 数组。


    *安全性与性能——在此应用程序中，狗狗信息并非高度敏感。此外，这些信息会显示给用户。这让用户能够查看并修复任何可能已损坏的数据。对于更敏感的信息，应使用 `private`
    声明数组，以确保数据仅对当前方法（函数）可访问。*


    现在，可以使用这些下标（0、1 和 2）来提取数组的每个部分，并将其释放到适当的位置。`responsevalues[0]` 被放置到 `AjaxResponse`
    中，用于显示 `getBreeds` 列表。`responsevalues[1]` 被放置到 `AjaxReturnValue` 中，用于显示 dogs 列表框。由于我们还不知道用户选择了哪只狗，因此
    dogs 数组将被放置到一个 JSON 对象 (`obj`) 中。正如我们所见，JSON 数据包含命名的索引和值，这与 PHP 中的关联数组非常相似。这里没有使用
    `var` 语句，因为此对象必须是公开的，并且可供整个应用程序使用。


    如果你还记得前几章的内容，数组不能直接格式化为字符串。数组必须经过序列化。然而，JSON 数据也可以用字符串的形式传递。我们很快就会看到，`responsevalues[3]`
    中的“数组”已经被 `dog_interface` 程序格式化为 JSON 数据。JavaScript 的 `JSON.parse` 方法能够检查数据，如果数据有效，则将其转换为
    JSON 对象。这与 PHP 的 `json_encode` 方法非常相似。现在，让我们看看当用户从 dogs 列表框中选择一只狗时，我们如何填充表单。


    JavaScript 方法 `process_select`（当用户从 dogs 列表中选择后，由 HTML 按钮调用）已被放置在 `lab.php` 文件的代码顶部。它也可以放在自己的
    JS 文件中，并像导入 `getlists.js` 文件一样被导入。这个新方法使用 `obj`（包含所有狗的 JSON 狗狗对象）中包含的信息，用用户在列表框中选择的狗的信息来填充文本框（`dog_name`
    和 `dog_weight`）、单选按钮（`dog_color`）和列表框（`dog_breed`）。


    ```

    function process_select() {

    var colorbuttons = document.getElementsByName(''dog_color'');

    ```


    首先，使用 JavaScript 方法 `getElementsByName`，将来自 HTML 表单的所有单选按钮颜色值提取出来，并放入一个名为 `colorbuttons`
    的数组中。`dog_color`（每个单选按钮的名称）被传入该方法。此过程将创建一个与颜色单选按钮下标索引一致的单选按钮数组。例如，数组的 `0` 位置现在将包含
    `brown`，这是 HTML 表单中显示的第一个单选按钮。这样，我们就可以通过引用其位置（例如 `colorbuttons[0]` 来设置 `brown`）来设置正确的颜色单选按钮。


    ```

    if(!(document.getElementById(''dogs'').value == -1))

    {

    index = document.getElementById(''dogs'').selectedIndex -1;

    document.getElementById(''index'').value = index;

    document.getElementById(''dog_name'').value = obj.dogs[index].dog_name;

    document.getElementById(''dog_weight'').value = obj.dogs[index].dog_weight;

    ```


    HTML 列表框包含文本和值。文本是用户看到的内容；值代表其含义。这与 PHP 关联数组——键（索引）和值——非常相似。`if` 语句检查 dogs 数组以确定其当前值。如果值为
    `-1`，表示用户未选择任何内容，或者他们选择了“新建”。JavaScript 中的 `!` 符号与 PHP 中的 `!` 符号作用相同。该符号会改变 `if`
    部分的判断逻辑，使其在 `''dogs''` 的值不等于 `-1` 时执行。因此，如果用户从 dogs 列表框中选择了某只狗，这段代码就会执行。


    列表框的 `selectedIndex` 属性指示用户选择的索引。然而，HTML 列表框的编号是从 1 开始的。而 JavaScript 数组和 JSON
    对象的索引是从 0 开始的。这导致 `selectedIndex` 比在 JavaScript 数组或 JSON 对象中的位置多 1。示例中的代码减去了 1
    以平衡这个关系。这个值被存入变量 `index` 中。它也被保存在同名（`index`）的隐藏属性（在 HTML 表单上）中。由于 `index` 是一个属性而不是
    `div` 标签，因此必须使用 JavaScript 的 `value` 属性来设置 `index` 的值。


    `obj` 是在进行 AJAX 调用时创建的 JSON 对象（包含所有狗）。从 JSON 对象中检索信息的方式与从 PHP 关联数组中检索信息的方式非常相似。`obj`
    对象类似于前几章中展示的多维 dogs 数组。顶层数组是 dogs “数组”。在 dogs 数组中，是每只单独的狗的“数组”。这些数组没有关联的键名，但有数字索引。每个狗的数组包含单独的字段（`dog_name`、`dog_color`、`dog_breed`
    和 `dog_weight`）。在前一行代码中设置的 `index` 属性包含了用户选择的狗的索引。它将用于从 `obj` 中提取所选狗的信息并填充表单对象。由于我们知道要检索的数据的确切位置（在
    `index` 中），因此不需要循环。


    `obj.dogs[index].dog_name` 使用 JSON 对象名 (`obj`)、顶层数组名 (`dogs`)、所需狗数组的编号 (`index`)
    和所需字段的名称 (`dog_name`) 来访问所需信息。再次强调，此格式类似于从 PHP 关联数组中提取信息。`dog_name` 和 `dog_weight`
    值使用这种点符号格式从 `obj` JSON 对象中提取信息，并将其放置在 HTML 表单上相应的文本框中。


    ```

    dog_color = obj.dogs[index].dog_color;

    if(dog_color == "Brown")

    {

    colorbuttons[0].checked = true;

    } else if (dog_color == "Black")

    {

    colorbuttons[1].checked = true;

    } else if (dog_color == "Yellow")

    {

    colorbuttons[2].checked = true;

    } else if (dog_color == "White")

    {

    colorbuttons[3].checked = true;

    }

    ```


    设置颜色需要稍微多一些工作。从 `obj` 对象中提取出 `dog_color`（`dog_color = obj.dogs[index].dog_color;`）并放入一个属性（`dog_color`）中。然后使用
    `if` 语句来确定该属性中存在何种颜色。（是的，JavaScript 也有 `case` 语句可供选择。）`if` 语句将正确单选按钮的 `checked`
    属性设置为 `true`，从而使该单选按钮被选中。请注意，默认值（`''mixed''`）没有包含在 `if` 语句中。如果狗是 `''mixed''`，或者因为某种原因该对象中的颜色属性没有值，则没有理由更改默认值（`''mixed''`）。


    ```

    dog_breed = obj.dogs[index].dog_breed;

    document.getElementById(''dog_breed'').value = dog_breed;

    document.getElementById(''update'').style.display = "inline";

    document.getElementById(''delete'').style.display = "inline";

    document.getElementById(''insert'').style.display = "none";

    }

    ```

