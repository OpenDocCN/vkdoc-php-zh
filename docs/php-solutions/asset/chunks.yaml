    \ {\n    $error = $errorInfo[2];\n} else {\n    $numRows = $result->rowCount();\n\
    }\n```\n\n现在你可以在页面主体中显示查询结果，如下所示：\n\n```\n<?php\nif (isset($error)) {\n    echo\
    \ \"<p>$error</p>\";\n} else {\n    echo \"<p>共找到 $numRows 条记录。</p>\";\n}\n?>\n\
    ```\n\n保存页面并在浏览器中加载。你应该会看到与 PHP 解决方案 11-2 步骤 8 相同的结果。如有必要，可将你的代码与 `pdo_01.php`\
    \ 进行对照检查。\n\n#### 在其他数据库中使用 PDO 统计记录数\n\n使用 PDO 的 `rowCount()` 来报告 `SELECT` 查询找到的记录数在\
    \ MySQL 和 MariaDB 中均有效，但无法保证在所有其他数据库上都能工作。如果 `rowCount()` 不起作用，请改用以下代码：\n\n```\n\
    // 准备 SQL 查询\n$sql = 'SELECT COUNT(*) FROM images';\n// 提交查询并捕获结果\n$result = $conn->query($sql);\n\
    $errorInfo = $conn->errorInfo();\nif (isset($errorInfo[2])) {\n    $error = $errorInfo[2];\n\
    } else {\n    // 找出检索到了多少条记录\n    $numRows = $result->fetchColumn();\n    // 释放数据库资源\n\
    \    $result->closeCursor();\n}\n```\n\n这段代码使用带星号的 SQL `COUNT()` 函数来计算表中的所有项目。结果只有一个，因此可以使用\
    \ `fetchColumn()` 方法检索，该方法从数据库结果中获取第一列。将结果存储在 `$numRows` 中后，你必须调用 `closeCursor()`\
