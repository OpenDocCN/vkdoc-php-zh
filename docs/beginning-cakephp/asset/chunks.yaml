  trans: '

    稍后，我们将介绍更高级的 Ajax 方法，这些方法需要在视图中进行大量编辑。目前，只需了解异步序列是 Cake 中的一个可选方案，并且其处理方式与其他两种响应几乎相同。


    ## 编写单个视图文件


    有了控制器逻辑后，接下来，各个视图文件必须正确处理用户交互序列。打开 `app/views/posts/view.ctp` 文件。滚动到第 1–30 行；它们应该看起来像清单
    6-6 中的代码。


    **清单 6-6.** *视图操作视图文件，第 1–30 行*


    ```php

    <div class="posts view">

    <h2><?php __(''Post'');?></h2>

    <dl><?php $i = 0; $class = '' class="altrow"'';?>

    <dt<?php if ($i % 2 == 0) echo $class;?>><?php __(''Id''); ?></dt>

    <dd<?php if ($i++ % 2 == 0) echo $class;?>>

    <?php echo $post[''Post''][''id'']; ?>

    &nbsp;

    </dd>

    <dt<?php if ($i % 2 == 0) echo $class;?>><?php __(''Name''); ?></dt>

    <dd<?php if ($i++ % 2 == 0) echo $class;?>>

    <?php echo $post[''Post''][''name'']; ?>

    &nbsp;

    </dd>

    <dt<?php if ($i % 2 == 0) echo $class;?>><?php __(''Date''); ?></dt>

    <dd<?php if ($i++ % 2 == 0) echo $class;?>>

    <?php echo $post[''Post''][''date'']; ?>

    &nbsp;

    </dd>

    <dt<?php if ($i % 2 == 0) echo $class;?>><?php __(''Content''); ?></dt>

    <dd<?php if ($i++ % 2 == 0) echo $class;?>>

    <?php echo $post[''Post''][''content'']; ?>

    &nbsp;

    </dd>

    <dt<?php if ($i % 2 == 0) echo $class;?>><?php __(''User''); ?></dt>

    <dd<?php if ($i++ % 2 == 0) echo $class;?>>

    <?php echo $html->link($post[''User''][''name''],

    array(''controller''=>''users'', ''action''=>''view'', $post[''User''][''id'']));
    ?>

    &nbsp;

    </dd>

    </dl>

    </div>

    ```


    简而言之，视图操作是一个简单的页面请求。用户请求显示特定记录，而此视图文件正是为了以有组织的方式完成此任务。这些行中渲染的大部分是 HTML。第 1 行创建一个新的
    `<div>` 元素，第 30 行将其关闭。然而，这里有一些重要的 Cake 操作在起作用，它们与控制器提供的数据相对应。回顾清单 6-1 的第 6 行，视图操作执行了一个
    `read()` 模型函数，并使用 `set()` 函数将结果赋值给一个名为 `post` 的变量。该变量现在在视图文件中以 `$post` 的形式可用，并且可以根据你的需要在整个视图中显示。


    Bake 为你提供了一系列环绕着 `$post` 变量实例的 HTML 标签，这些标签用于清晰地显示返回记录的内容。请注意，`$post` 的格式类似于 `$this->data`。它包含一个以模型名为键的数组，每个键对应一个包含其各自表中字段的嵌套数组。注意第
    26 行如何显示关联模型的数据。在本例中，帖子与用户相关联，当控制器执行 `read()` 函数时，它注意到了这种关联，并同时提供了相关的记录。所有这些数据都可在
    `$post` 数组中找到。


    ### 使用调试函数


    你经常需要查看这些数据数组的内容。Cake 的 `debug()` 函数提供了一个详细且格式清晰的指定数组视图。在此视图文件中，插入以下使用 `debug()`
    函数的行：


    ```php

    <? debug($post);?>

    ```


    当你刷新视图操作时，你应该会看到一个亮黄色的框，其中打印出了 `$post` 变量的内容（参见图 6-1）。


    **图 6-1.** *`debug()` 函数显示 `$post` 变量的内容*


    每个模型在数组中以其名称作为键，并附加了相关的记录。Cake 不仅提供了用户请求的帖子记录内容，还提供了来自关联模型的记录。假设你想通过帖子标题来显示分配给此博客帖子的用户名。你可以通过对正确的数组、键和值执行
    `echo()` 函数来实现：


    ```php

    <h2><?=$post[''User''][''firstname''].'' ''.$post[''User''][''lastname''];?></h2>

    ```


    `debug()` 函数能帮助你在开发过程中弄清楚视图中到底在传递什么。它可以用于任何数组。当然，也可以使用其他数组显示函数，例如 PHP 原生的 `print_r()`
    函数或 Cake 的便捷函数 `pr()`。


    ### 从头开始自定义视图文件


    Bake 为这个简单的页面请求提供了一个极好的起点。让我们从头开始简化视图，使其对网站访问者更具可读性。在你的博客应用程序中，这个视图将像其他博客或新闻网站一样，是一个简单的故事展示。你不需要显示诸如
    ID 或作者 ID 之类的字段，尽管这些字段可能对构建指向其他操作或控制器的链接有用。


    编辑 `app/views/posts/view.ctp` 文件，删除 Bake 生成的代码，并插入清单 6-7 中的代码。


    **清单 6-7.** *简化后的视图*


    ```php

    <h1><?=$post[''Post''][''name''];?></h1>

    <p>作者: <?=$post[''User''][''firstname''];?> <?=$post[''User''][''lastname''];?></p>

    <p>发布日期: <?=$post[''Post''][''date''];?></p>

    <hr/>

    <p><?=$post[''Post''][''content''];?></p>

    ```


    清单 6-7 的代码非常简单，但从小处着手有助于你在后续开发中包含其他有用的功能。第 1 行将帖子标题显示为 `<h1>` 元素。第 2–3 行在单独的 `<p>`
    标签中显示关联用户的姓名以及帖子日期。最后，第 5 行显示帖子的文本内容。`$post` 变量仍然包含你可以使用的其他数组数据，但视图中只调用了几个字段。


    ### HTML 助手


    假设你希望帖子标题本身就是一个链接，以保持整个应用程序的一致性。在这种情况下，可以使用内置的 HTML 助手来为你生成适当的链接。将视图文件中的第 1 行改为清单
    6-8 中的内容。


    **清单 6-8.** *HTML 助手及其 `link()` 函数*


    ```php

    <?=$html->link(''<h1>''.$post[''Post''][''name''].''</h1>'',''/posts/view/''.$post[''Post''][''id''],null,null,false);?>

    ```


    `link()` 函数中的每个参数都像其他 PHP 函数参数一样用逗号分隔。当需要时，你可以通过数组将自定义变量和设置传递给助手函数，它会返回一些 HTML
    用于显示。你不需要使用每个参数，因此在这些情况下可以传入一个 `null` 值。在清单 6-8 中，你首先通过调用 `$html` 对象来调用 HTML 助手中的
    `link()` 函数。对于这个特定的助手，它的大多数函数都需要你执行一个 `echo()` 函数，这里你使用了简写操作符 `<?=` 而不是完整拼写出该函数。函数中的最后一个参数对应于
    `link()` 函数的转义特性。在这种情况下，你将其设置为 `false`，以便该函数忽略将大于号和小于号转义为 HTML 实体。


    HTML 助手的 `link()` 函数的第一个参数是要显示的文本。第二个参数是 URL（遵循应用程序的路由），它将被放入链接中。请注意，你使用了 `$post`
    变量来提供标题和当前 ID，以使此链接可操作并与用户的请求相对应。

