    # PHP 过滤


    现在是时候看看对 PHP 文件（`lab.php`）需要做哪些更改了。我们需要能够接收来自 HTML 程序的属性与值（`dog_name`、`dog_breed`、`dog_color`和`dog_weight`）。但是，我们需要担心有人可能会尝试发送可能影响程序运行甚至导致系统崩溃的信息。


    本节采用两种方法来帮助减少有害数据的可能性。首先，我们将确定是否已收到所有必需信息。如果没有，我们将要求用户返回 HTML 页面（`lab.html`）输入信息。这至少可以确保我们拥有所有数据，并且这些数据可能已经通过了
    HTML5 页面提供的验证。其次，我们将从接收到的数据中过滤掉 HTML、JavaScript 和 PHP 语法。这将减少可执行语句被传递到程序中的机会。


