- fmt: "```sql\n$sql = 'SELECT image_id, filename, caption FROM images WHERE caption\
    \ LIKE :search';\n```\n\n使用命名占位符（named placeholders）使代码更易于理解，特别是当你选择基于包含要嵌入 SQL\
    \ 的值的变量名时。\n\n### 准备语句（Preparing the statement）\n\n准备和初始化语句在一个步骤中完成（与需要两个步骤的MySQLi不同）。你将带有占位符的\
    \ SQL 直接传递给连接对象的`prepare()`方法，该方法返回准备好的语句，如下所示：\n\n```php\n$stmt = $conn->prepare($sql);\n\
    ```\n\n### 将值绑定到占位符（Binding values to the placeholders）\n\n有几种不同的方法可以将值绑定到占位符。使用匿名占位符时，最简单的方法是创建一个与占位符顺序相同的值数组，然后将该数组传递给语句的`execute()`方法。即使只有一个占位符，也必须使用数组。例如，要将`$searchterm`绑定到一个匿名占位符，你必须用方括号将它括起来，如下所示：\n\
    \n```php\n$stmt->execute([$searchterm]);\n```\n\n你也可以类似地将值绑定到命名占位符，但传递给`execute()`方法的参数必须是一个关联数组，使用命名占位符作为每个值的键。因此，以下代码将`$searchterm`绑定到`:search`命名占位符：\n\
    \n```php\n$stmt->execute([':search' => $searchterm]);\n```\n\n或者，你可以使用语句的`bindParam()`和`bindValue()`方法在调用`execute()`方法之前绑定值。当与匿名占位符一起使用时，这两个方法的第一个参数是一个数字（从1开始计数），表示占位符在\
    \ SQL 中的位置。对于命名占位符，第一个参数是作为字符串的命名占位符。第二个参数是你要插入到查询中的值。\n\n然而，这两种方法之间有一个微妙的区别：\n\
    \n*   使用`bindParam()`时，第二个参数*必须*是一个变量。它不能是字符串、数字或任何其他类型的表达式。\n*   使用`bindValue()`时，第二个参数应该是一个字符串、数字或表达式。但它也可以是一个变量。\n\
    \n由于`bindValue()`接受任何类型的值，`bindParam()`可能显得多余。区别在于，传递给`bindValue()`的参数的值必须是已知的，因为它绑定的是实际值，而`bindParam()`只绑定变量。因此，该值可以在之后赋值给变量。\n\
    \n为了说明区别，我们使用“使用命名占位符”中的`SELECT`查询。`:search`占位符跟在`LIKE`关键字之后，因此该值需要与通配符组合。试图执行以下操作会产生错误：\n\
    \n```php\n// 这不会生效\n$stmt->bindParam(':search', '%'. $_GET['search'] .'%');\n\
    ```\n\n你无法使用`bindParam()`将通配符连接到变量上。通配符需要在变量作为参数传递之前添加，如下所示：\n\n```php\n$searchterm\
    \ = '%'. $_GET['search'] .'%';\n$stmt->bindParam(':search', $searchterm);\n```\n\
    \n或者，你可以将表达式构建为`bindValue()`的参数。\n\n```php\n// 这会生效\n$stmt->bindValue(':search',\
    \ '%'. $_GET['search'] .'%');\n```\n\n`bindParam()`和`bindValue()`方法接受一个可选的第三个参数：一个指定数据类型的常量。主要的常量如下：\n\
    \n*   `PDO::PARAM_INT`：整数（整型）\n*   `PDO::PARAM_LOB`：二进制（如：图像、Word 文档或 PDF 文件）\n\
    *   `PDO::PARAM_STR`：字符串（文本）\n*   `PDO::PARAM_BOOL`：布尔值（真或假）\n*   `PDO::PARAM_NULL`：空值\n\
    \n`PDO::PARAM_NULL`在你想将数据库列的值设置为`null`时非常有用。例如，如果主键是自动递增的，你需要在插入新记录时传递`null`作为值。以下是使用`bindValue()`将名为`:id`的命名参数设置为`null`的方法：\n\
    \n```php\n$stmt->bindValue(':id', NULL, PDO::PARAM_NULL);\n```\n\n注意：没有一个用于浮点数的\
    \ PDO 常量。\n\n### 执行语句（Executing the statement）\n\n如果你使用`bindParam()`或`bindValue()`将值绑定到占位符，你只需调用不带参数的`execute()`方法：\n\
    \n```php\n$stmt->execute();\n```\n\n否则，按上一节所述传递一个值数组。在这两种情况下，查询的结果都存储在`$stmt`中。\n\
    \n错误信息的访问方式与 PDO 连接相同。但是，不是在连接对象上调用`errorInfo()`方法，而是在 PDO 语句对象上使用它，如下所示：\n\n\
    ```php\n$error = $stmt->errorInfo()[2];\n```\n\n如果没有错误，`$error`将为`null`。否则，它将包含一个描述问题的字符串。\n\
    \n### （可选）绑定结果（Binding the results (optional)）\n\n要将`SELECT`查询的结果绑定到变量，每个列需要使用`bindColumn()`方法单独绑定，该方法接受两个参数。第一个参数可以是列的名称，也可以是从1开始计数的列编号。该编号来自`SELECT`查询中的列位置，而不是其在数据库表中的显示顺序。因此，要将我们一直使用的\
    \ SQL 示例中的`filename`列的结果绑定到`$filename`，以下两种方式都是可以接受的：\n\n```php\n$stmt->bindColumn('filename',\
    \ $filename);\n$stmt->bindColumn(2, $filename);\n```\n\n因为每个列是单独绑定的，所以不需要绑定所有列。然而，这样做会更方便，因为它避免了将`fetch()`方法的结果赋值给数组。\n\
    \n### 获取结果（Fetching the result）\n\n要获取`SELECT`查询的结果，请调用语句的`fetch()`方法。如果你使用了`bindColumn()`将输出绑定到变量，你可以直接使用这些变量。否则，它将返回一个当前行的数组，该数组既可以通过列名索引，也可以通过从0开始的列编号索引。\n\
    \n注意：你可以通过向 PDO 的`fetch()`方法传递一个常量作为参数来控制其输出类型。请参阅[`https://php.net/manual/en/pdostatement.fetch.php`](https://php.net/manual/en/pdostatement.fetch.php)。\n\
    \n## PHP Solution 13-8：在搜索中使用 PDO 预处理语句（Using a PDO Prepared Statement in a search）\n\
    \n该 PHP 解决方案展示了如何将用户从搜索表单提交的值嵌入到带有 PDO 预处理语句的`SELECT`查询中。它使用了与 PHP Solution 13-7\
    \ 中 MySQLi 版本相同的搜索表单。\n\n1.  从`ch13`文件夹复制`pdo_prepared_01.php`并将其保存到`pdo`文件夹中，命名为`pdo_prepared.php`。\n\
    2.  在`DOCTYPE`声明上方的 PHP 代码块中添加以下代码：\n\n```php\nif (isset($_GET['go'])) {\n   \
    \ require_once '../includes/connection.php';\n    require_once '../includes/utility_funcs.php';\n\
    \    $conn = dbConnect('read', 'pdo');\n    $sql = 'SELECT image_id, filename,\
    \ caption FROM images\n    WHERE caption LIKE :search';\n    $stmt = $conn->prepare($sql);\n\
    \    $stmt->bindValue(':search', '%' . $_GET['search'] . '%');\n    $stmt->execute();\n\
    \    $error = $stmt->errorInfo()[2];\n    if (!$error) {\n        $stmt->bindColumn('image_id',\
    \ $image_id);\n        $stmt->bindColumn('filename', $filename);\n        $stmt->bindColumn(3,\
    \ $caption);\n        $numRows = $stmt->rowCount();\n    }\n}\n```\n\n当表单被提交时，此代码包含连接文件并创建一个\
    \ `PDO` 只读连接。预处理语句使用`:search`作为命名参数，代替用户提交的值。\n\n`%`通配符在绑定到预处理语句的同时与搜索词连接。因此，这里使用了`bindValue()`而不是`bindParam()`。\n\
    \n在语句执行后，调用语句的`errorInfo()`方法，查看是否生成了错误信息并存储在`$errorInfo[2]`中。"
  raw: "```\n$sql = 'SELECT image_id, filename, caption FROM images WHERE caption\
    \ LIKE :search';\n```\n\nUsing named placeholders makes the code a lot easier\
    \ to understand,\nparticularly if you choose names that are based on the variables\
    \ that\ncontain the values to be embedded in the SQL.\n\nPreparing the statement\n\
    \nPreparing and initializing a statement is done in a single step (unlike\nwith\
    \ MySQLi, which requires two). You pass the SQL with placeholders\ndirectly to\
    \ the connection object’s `prepare()` method , which returns the\nprepared statement,\
    \ like this:\n\n```\n$stmt = $conn->prepare($sql);\n```\n\nBinding values to the placeholders\n\
    \nThere are several different ways to bind values to placeholders. When\nusing\
    \ anonymous placeholders, the simplest way is to create an array of\nvalues in\
    \ the same order as the placeholders, then to pass the array to\nthe statement’s\
    \ `execute()` method . Even if there’s only\none placeholder, you must use an\
    \ array. For example, to bind `$searchterm` to a\nsingle anonymous placeholder,\
    \ you must enclose it in a pair of square\nbrackets, like this:\n\n```\n$stmt->execute([$searchterm]);\n\
    ```\n\nYou can also bind values to named placeholders in a similar way, but the\n\
    argument passed to the `execute()` method must\nbe an associative array, using\
    \ the named placeholder as the key of each\nvalue. So, the following binds `$searchterm`\
    \ to the\n`:search` named\nplaceholder:\n\n```\n$stmt->execute([':search' => $searchterm]);\n\
    ```\n\nAlternatively, you can use the statement’s `bindParam()` and `bindValue()`\
    \ methods\nto bind the values before calling the `execute()` method.\nWhen used\
    \ with anonymous placeholders, the first argument to both\nmethods is a number,\
    \ counting from 1, representing the placeholder’s\nposition in the SQL. With named\
    \ placeholders, the first argument is the\nnamed placeholder as a string. The\
    \ second argument is the value you want\nto insert in the query.\n\nHowever, there’s\
    \ a subtle difference between the two methods:\n\n*   With `bindParam()`, the\n\
    \    second argument *must* be a variable. It cannot be a string, number, or any\n\
    \    other type of expression.\n\n*   With  `bindValue()`\n    ,the second argument\
    \ should be a string, number, or expression.\n    But it can also be a variable.\n\
    \nBecause `bindValue()` accepts\nany type of value, `bindParam()` might\nseem\
    \ redundant. The difference is that the value of the argument passed\nto `bindValue()`\n\
    must already be known because it binds the actual value, whereas `bindParam()`\
    \ binds\nonly the variable. Consequently, the value can be assigned to the\nvariable\
    \ later.\n\nTo illustrate the difference, let’s use the `SELECT` query in\n“Using\
    \ named placeholders.” The `:search` placeholder\nfollows the `LIKE` keyword,\
    \ so the\nvalue needs to be combined with wildcard characters. Trying to do the\n\
    following generates an error:\n\n```\n// This will NOT work\n$stmt->bindParam(':search',\
    \ '%'. $_GET['search'] .'%');\n```\n\nYou cannot concatenate the wildcard characters\
    \ to the variable with\n`bindParam()`.\nThe wildcard characters need to be added\
    \ before the variable is passed\nas an argument, like this:\n\n```\n$searchterm\
    \ = '%'. $_GET['search'] .'%';\n$stmt->bindParam(':search', $searchterm);\n```\n\
    \nAlternatively, you can build the expression as an argument to `bindValue()`.\n\
    \n```\n// This WILL work\n$stmt->bindValue(':search', '%'. $_GET['search'] .'%');\n\
    ```\n\nThe `bindParam()`\nand `bindValue()`\nmethods accept an optional third\
    \ argument: a constant specifying the\ndata type. The main constants are as follows:\n\
    \n*   `PDO::PARAM_INT`:\n    Integer (whole number)\n\n*   `PDO::PARAM_LOB`:\n\
    \    Binary (such as an image, Word document, or PDF file)\n\n*   `PDO::PARAM_STR`:\n\
    \    String (text)\n\n*   `PDO::PARAM_BOOL`:\n    Boolean (true or false)\n\n\
    *   `PDO::PARAM_NULL`:\n    Null\n\n`PDO::PARAM_NULL`\nis useful if you want to\
    \ set the value of a database column to `null`. For example, if\na primary key\
    \ is auto-incremented, you need to pass `null` as the value\nwhen inserting new\
    \ records. This is how you set a named parameter called\n`:id` to `null` with\
    \ `bindValue()`:\n\n```\n$stmt->bindValue(':id', NULL, PDO::PARAM_NULL);\n```\n\
    \nNote\nThere isn’t a PDO constant for floating-point numbers.\n\nExecuting the\
    \ statement\n\nIf you bind the values to placeholders using `bindParam()` or `bindValue()`,\
    \ you\nsimply call the `execute()` method\nwithout arguments:\n\n```\n$stmt->execute();\n\
    ```\n\nOtherwise, pass an array of values as described in the previous\nsection.\
    \ In both cases, the result of the query is stored in `$stmt`.\n\nError messages\
    \ can be accessed in the same way as with a PDO connection.\nHowever, instead\
    \ of calling the `errorInfo()` method on\nthe connection object, use it on the\
    \ PDO statement, like this:\n\n```\n$error = $stmt->errorInfo()[2];\n```\n\nIf\
    \ there’s no error, `$error` will be `null`. Otherwise, it\nwill contain a string\
    \ describing the problem.\n\nBinding the results (optional)\n\nTo bind the results\
    \ of a `SELECT` query to\nvariables, each column needs to be bound separately\
    \ using the `bindColumn()`\nmethod , which\ntakes two arguments. The first argument\
    \ can be either the name of the\ncolumn or its number counting from 1\\. The number\
    \ comes from its position\nin the `SELECT`\nquery, not the order in which it appears\
    \ in the database table. So, to\nbind the result from the `filename` column to\n\
    `$filename` in\nthe SQL example we’ve been using, either of the following is acceptable:\n\
    \n```\n$stmt->bindColumn('filename', $filename);\n$stmt->bindColumn(2, $filename);\n\
    ```\n\nBecause each column is bound separately, you don’t need to bind all\nof\
    \ them. However, it’s more convenient to do so because it avoids the\nneed to\
    \ assign the result of the `fetch()` method to an\narray.\n\nFetching the result\n\
    To fetch the results of a `SELECT` query, call\nthe statement’s `fetch()` method.\
    \ If\nyou have used `bindColumn()` to bind\nthe output to variables, you can use\
    \ the variables directly. Otherwise,\nit returns an array of the current row indexed\
    \ both by column name and a\nzero-indexed column number.\n\nNote\nYou can control\
    \ the PDO `fetch()` method’s type\nof output by passing it a constant as an argument.\
    \ See [`https://php.net/manual/en/pdostatement.fetch.php`](https://php.net/manual/en/pdostatement.fetch.php)\
    \ .\n\nPHP Solution 13-8: Using a PDO Prepared Statement in\na search\n\nThis\
    \ PHP solution shows how to embed the user-submitted value from a\nsearch form\
    \ into a `SELECT` query with a\nPDO prepared statement. It uses the same search\
    \ form as that in the\nMySQLi version in PHP Solution 13-7.\n\n1.  Copy `pdo_prepared_01.php`\n\
    \    from the `ch13`\n    folder and save it in the `pdo` folder as `pdo_prepared.php`.\n\
    \n2.  Add the following code in a PHP block above the `DOCTYPE`\n    declaration\
    \ :\n\n```\n    if (isset($_GET['go'])) {\n    require_once '../includes/connection.php';\n\
    \    require_once '../includes/utility_funcs.php';\n    $conn = dbConnect('read',\
    \ 'pdo');\n    $sql = 'SELECT image_id, filename, caption FROM images\n    WHERE\
    \ caption LIKE :search';\n    $stmt = $conn->prepare($sql);\n    $stmt->bindValue(':search',\
    \ '%' . $_GET['search'] . '%');\n    $stmt->execute();\n    $error = $stmt->errorInfo()[2];\n\
    \    if (!$error) {\n    $stmt->bindColumn('image_id', $image_id);\n    $stmt->bindColumn('filename',\
    \ $filename);\n    $stmt->bindColumn(3, $caption);\n    $numRows = $stmt->rowCount();\n\
    \    }\n    }\n    ```\n\nWhen the form is submitted, this includes the connection\
    \ file and\n    creates a PDO read-only connection. The prepared statement uses\
    \ `:search` as a named\n    parameter in place of the user-submitted value.\n\n\
    The `%`\n    wildcard characters are concatenated with the search term at the\
    \ same\n    time as binding it to the prepared statement. So, `bindValue()` is\
    \ used\n    instead of `bindParam()` .\n\nAfter the statement is executed, the\
    \ statement’s `errorInfo()` method is\n    called to see if an error message has\
    \ been generated and stored in `$errorInfo[2]`."
