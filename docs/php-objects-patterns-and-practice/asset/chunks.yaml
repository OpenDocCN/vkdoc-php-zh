    So now I can run a sexy IDE on my local machine and have the changes it makes
    transparently available on the guest box!


    Of course, placing files on a CentOS VM is not the same as running the system.
    A typical Vagrant box comes without too much pre-installed. The assumption is
    that the developer will want to customize the environment according to need and
    circumstance.


    The next stage is to provision our box.


    ## Provisioning


    Once again, provisioning is directed by the `Vagrantfile` document. Vagrant supports
    several tools designed for provisioning machines, including chef ( [`https://www.chef.io/chef/`](https://www.chef.io/chef/)
    ), puppet ( [`https://puppet.com`](https://puppet.com) ), and ansible ( [`https://www.ansible.com`](https://www.ansible.com)
    ). They’re all worth investigating. For the purposes of this example, though,
    I’m going to use a good old-fashioned shell script.


    Once again I begin with `Vagrantfile`:


    ```

    config.vm.provision "shell", path: "setup.sh"

    ```


    This should be reasonably clear. I’m telling Vagrant to use a shell script to
    provision my box, and I specify `setup.sh` as the script which should be executed.


    What you put in your shell script depends upon your requirements, of course. I’m
    going to begin by setting a couple of variables, and installing some packages:


    ```

    #!/bin/bash

    VAGRANTDIR=/vagrant

    SERVERDIR=/var/www/poppch20/

    sudo rpm -Uvh https://mirror.webtatic.com/yum/el6/latest.rpm

    sudo yum install -y patch

    sudo yum install -y vim

    sudo yum -q -y install mysql-server

    sudo yum -q -y install httpd;

    sudo yum -q -y install php70w

    sudo yum -q -y install php70w-mysql

    sudo yum -q -y install php70w-xml

    sudo yum -q -y install php70w-dom

    ```


    PHP 7 is not available by default on CentOS 6. However, installing a yum repository
    from `webtatic.com` provides access to a package named `php70w` and a stack of
    related extensions. I write my script to a file named `setup.sh` which I place
    in the infrastructure directory alongside `Vagrantfile`.


    Now, how do I kick off the provisioning process? If the `config.vm.provision`
    directive and the `setup.sh` script had both been in place when I ran `vagrant
    up`, then the provisioning would have been automatic. As it is, I’ll now need
    to run it manually:


    ```

    $ vagrant provision

    ```


    This will spew an awful lot of information onto your terminal as the `setup.sh`
    script is run within the Vagrant box. Let’s see if it worked:


    ```

    $ vagrant ssh

    $ php -v

    PHP 7.0.7 (cli) (built: May 28 2016 08:26:36) ( NTS )

    Copyright (c) 1997-2016 The PHP Group

    Zend Engine v3.0.0, Copyright (c) 1998-2016 Zend Technologies

    ```


    ## Setting Up the Web Server


    Of course, even with MySQL and Apache installed, the system is not ready to be
    run. First of all, we should configure Apache. The easiest way to do this is to
    create a configuration file that can be copied into Apache’s `conf.d` directory.
    Let’s call the file `poppch20.conf` , and drop it into the infrastructure directory:


    ```

    NameVirtualHost *:80


    ServerAdmin matt@getinstance.com

    DocumentRoot /var/www/poppch20

    ServerName poppch20.vagrant.internal

    ErrorLog logs/poppch20-error_log

    CustomLog logs/poppch20-access_log common


    AllowOverride all


    ```


    I’ll return to that hostname a little later. Leaving aside that tantalizing detail,
    this is enough to tell Apache about our `/var/www/poppch20` directory and to set
    up logging. Of course, I’ll also have to update `setup.sh` to copy the configuration
    file at provision time:


    ```

    sudo cp $VAGRANTDIR/poppch20.conf /etc/httpd/conf.d/

    sudo service httpd restart

    sudo /sbin/chkconfig httpd on

    ```


    I copy the configuration file into place and restart the web server so that the
    configuration is picked up. I also run `chkconfig` to ensure that the server will
    be started at boot time.


    After making this change, I can re-run this script:


    ```

    $ vagrant provision

    ```


    It’s important to note that those parts of the set up script we previously covered
    will also be re-run. When you create a provisioning script, you must design it
    so it can be executed repeatedly without serious repercussions. Luckily, Yum detects
    that my specified packages have already been installed and grumbles harmlessly,
    in part because I take the precaution of passing it the `-q` flag, which keeps
    the complaints relatively muted.


    ## Setting Up MySQL


    For many applications you’ll need to make sure that a database is available and
    ready for connections. Here’s a simple addition to my setup script:


    ```

    sudo service mysqld start

    /usr/bin/mysqladmin -s -u root password ''vagrant'' || echo "** unable to create
    pass - probably already done"

    echo "CREATE DATABASE IF NOT EXISTS poppch20_vagrant" | mysql -u root -pvagrant


    # install data here if needed

    #

    echo "GRANT ALL PRIVILEGES  ON poppch20_vagrant.* TO

    ''vagrant''@''localhost'' IDENTIFIED BY ''vagrant''

    WITH GRANT OPTION" | mysql -u root -pvagrant

    echo "FLUSH PRIVILEGES" | mysql -u root -pvagrant

    sudo /sbin/chkconfig mysqld on

    ```


    I start MySQL. Then I run the `mysqladmin` command to create a root password.
    This will fail after the first run because the password will already be set, so
    I use the `-s` flag to suppress error messages and print a message of my own if
    the command fails. Then I create a database, a user, and a password. Finally,
    I run `chkconfig` to ensure that the MySQL daemon will start at boot time.


    With that in place, I can provision again, and then test my database:


    ```

    $ vagrant provision

    ```'
