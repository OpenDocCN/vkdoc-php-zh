    # `switch` 选择语句


    `switch` 语句允许你根据某个表达式的值，执行某一个命令块。在某种意义上，这条语句类似于嵌套的条件语句。但是，在条件语句中，检查的是条件（一个布尔类型值或可转换为布尔类型值的表达式），而在选择语句中，检查的是表达式的值，其类型可能不同于布尔类型。


    选择语句的调用语法如下。


    ```

    switch(expression){

    case value:

    # 命令

    break;

    case value:

    # 命令

    break;

    default:

    # 命令

    }

    ```


    `switch` 关键字后面跟着一个括号内的表达式，其值将被检查。然后，跟着 `case` 块。在上面的模板中有两个 `case` 块，但通常，这种块的数量几乎没有限制。最后一个可以是
    `default` 块（它是可选的）。整个结构用花括号括起来。


    每个 `case` 块在 `case` 关键字之后包含一个控制值。其后跟一个冒号和一个命令块，该命令块通常以 `break` 指令结束。在 `default`
    块中，如果存在，则不使用 `break` 指令（在那里使用它没有任何意义）。


    选择语句是如何执行的？首先计算 `switch` 关键字后括号内的表达式。然后将该表达式的值与 `case` 块中的控制值依次比较，直到找到第一个匹配项。


    | 详细信息 |

    | --- |

    | 这是普通的比较，而不是检查全等。 |


    如果找到匹配项，则执行相应 `case` 块中的命令。这是在命令块以 `break` 指令结束时的情况。如果 `case` 块末尾没有 `break` 指令，则会执行下一个块中的命令，然后是它后面的块，依此类推。此过程会一直持续，直到遇到
    `break` 指令或到达选择语句的右花括号。


    选择语句有一种替代语法。


    ```

    switch(expression):

    case value:

    # 命令

    break;

    case value:

    # 命令

    break;

    default:

    # 命令

    endswitch;

    ```


    这里不使用花括号：用冒号代替左花括号，用 `endswitch` 语句（后跟分号）代替右花括号。


    代码清单 3-9 展示了一个程序，说明了选择语句的用法。


    ```

    代码清单 3-9

    选择语句

    ```


    该程序提示用户输入三位火枪手中一位的名字：阿多斯、波尔托斯或阿拉米斯。


    程序“认识”名字 `"Athos"`、`"Porthos"` 和 `"Aramis"`。如果用户输入了这些名字之一，程序会显示该火枪手的名字。如果用户输入的名字程序“不认识”，则会打印消息
    `"Strange. Is this a fourth Musketeer?"`。如果用户输入名字 `"Athos"`，程序输出如下所示。


    ```

    程序的输出（来自代码清单 3-9）

    来自《三个火枪手》的名字：Athos

    是的，Athos 是一名火枪手

    ```


    如果用户输入 `"Porthos"`，输出结果如下。


    ```

    程序的输出（来自代码清单 3-9）

    来自《三个火枪手》的名字：Porthos

    是的，Porthos 是一名火枪手

    ```


    当用户输入名字 `"Aramis"` 时，输出结果如下。


    ```

    程序的输出（来自代码清单 3-9）

    来自《三个火枪手》的名字：Aramis

    是的，Aramis 是一名火枪手

    ```


    最后，如果程序“不认识”这个名字，输出结果如下。


    ```

    程序的输出（来自代码清单 3-9）

    来自《三个火枪手》的名字：D''Artanian

    奇怪。这是第四位火枪手吗？

    ```


    该程序使用变量 `$athos`、`$porthos` 和 `$aramis` 来存储三位火枪手的名字。变量 `$name` 被赋值为用户输入的名字。`switch`
    语句用于查找匹配项。要测试的表达式是 `$name` 变量的值。`$athos`、`$porthos` 和 `$aramis` 变量在 `case` 块中用作控制值。


    我们来讨论一下选择语句是如何执行的。`$name` 变量的值依次与 `$athos`、`$porthos` 和 `$aramis` 变量的值进行比较。一旦找到匹配项，就执行相应
    `case` 块中的命令。如果没有匹配项，则执行 `default` 块中的命令。


    代码清单 3-10 说明了如何以替代形式使用选择语句。在这个程序中，检查用户输入的数字是否能被 `2` 和 `4` 整除。


    ```

    代码清单 3-10

    数字的整除性

    ```


    如果用户输入一个能被 `4` 整除的数字，输出结果如下。


    ```

    程序的输出（来自代码清单 3-10）

    输入一个数字：140

    这个数可以被 4 整除

    ```


    如果数字能被 `2` 整除但不能被 `4` 整除，输出结果如下。


    ```

    程序的输出（来自代码清单 3-10）

    输入一个数字：70

    这个数可以被 2 整除

    ```


    最后，如果用户输入的数字不能被 `2` 整除，程序产生如下结果。


    ```

    程序的输出（来自代码清单 3-10）

    输入一个数字：123

    这个数不能被 2 整除

    ```


    在此例中，用户输入的整数存储在变量 `$number` 中。`switch` 语句检查表达式 `$number%4`（`$number` 除以 `4` 的余数）的值。如果余数为
    `0`，则执行 `print("The number can be divided by 4")` 命令。如果余数为 `2`，则 `print("The number
    can be divided by 2")` 命令会显示消息。此时，数字能被 `2` 整除但不能被 `4` 整除。最后，所有其他情况都在 `default`
    块中处理。如果是这样，则执行 `print("The number cannot be divided by 2")` 命令。


    在所举的例子中，`case` 块都以 `break` 指令结尾。但这并非必须。存在某些情况，需要为多个控制值执行同一组命令。代码清单 3-11 中的程序展示了如何做到这一点。


    ```

    代码清单 3-11

    一周中的一天

    ```


    程序执行的结果可能如下所示（用户输入的值以粗体标记）。


    ```

    程序的输出（来自代码清单 3-11）

    一周中的一天：Wednesday

    这是工作日

    ```


    也可能如下所示。


    ```

    程序的输出（来自代码清单 3-11）

    一周中的一天：Saturday

    这是假日

    ```


    或者如下所示。


    ```

    程序的输出（来自代码清单 3-11）

    一周中的一天：Midday

    没有这一天

    ```


    在该程序中，用户输入一周中某天的名称，程序判断它是工作日还是假日。关键点是，对于值 `"Monday"`、`"Tuesday"`、`"Wednesday"`、`"Thursday"`
    和 `"Friday"`，需要执行相同的 `print("It is a working day")` 命令。为了避免将代码重复五次，创建了四个空的 `case`
    块（它们不包含命令），只有最后一个（五个中的）`case` 块包含必要的命令和 `break` 指令。例如，如果用户输入 `"Wednesday"`，则执行控制值为
    `"Wednesday"` 的 `case` 块中的代码，直到遇到第一个 `break` 指令。结果就是，对于五个控制值中的每一个，都执行了相同的命令。


    类似的方法处理 `"Saturday"` 和 `"Sunday"` 这两个值。如果用户输入的值不是控制值之一，则执行 `default` 块中的命令。

