  DirectoryIndex index.php index.html\n```\n\n## 应用程序文件系统结构\n\n现在让我们来看一下我们将用于 Web\
  \ 应用程序的文件系统结构。Web 应用程序中目录的精确命名和组织本身并不重要——重要的是所有内容都易于查找和管理。\n\n在本书中，我们将在名为`/var/www/phpweb20`的目录中开发整个应用程序（其中“phpweb20”指的是本书的标题）。当然，你可以使用自己服务器上的任意目录，不过我们会在多个地方引用到这个目录名称。\n\
  \n#### Web 根目录\n\n我们需要定义一个供 Web 服务器访问的根目录。这是在 Apache 配置中指定的目录，当用户请求网站中的某个页面时，Apache\
  \ 会在这个目录中查找文件。我将把这个目录称为 `htdocs`（完整路径为 `/var/www/phpweb20/htdocs`）。\n\n我们应用程序中的大部分文件将位于此目录之外（例如\
  \ PHP 类和网站模板），这可以防止用户直接访问这些文件。\n\n#### 数据存储目录\n\n接下来，我们需要一个用于存储应用程序数据的目录（即数据库之外的数据）。这里我们将存储日志文件（包括\
  \ Apache 的日志和我们自己创建的日志）、用户上传的文件，以及其他任何临时数据。\n\n我将把这个目录称为 `data`，它内部将包含多个子目录，用于存储不同类型的数据。这些子目录分别是\
  \ `logs`、`uploaded-files` 和 `tmp`。\n\n#### PHP 类目录\n\n我们接下来需要一个名为 `include` 的目录，用于存储所有的\
  \ PHP 函数和库。我们使用的任何第三方脚本（如 Smarty）以及我们自己的代码也会存储在这个目录中。应用程序控制器（定义用户在网站上可以执行的不同操作的脚本）将存储在\
  \ `include` 目录下的 `Controllers` 目录中。\n\n当我们为应用程序创建 Apache 虚拟主机时（在本章的“配置 Web 服务器”部分），我们会将\
  \ `include` 目录包含在 PHP 的 `include_path` 指令中，这样我们的应用程序就会知道在哪里找到这些代码。\n\n#### 模板目录\n\
  \n最后，我们需要一个目录来存放所有的网站模板。我们可以直接将这些模板放在 `htdocs` 目录或 `include` 目录中；然而，它们既不是 PHP 代码（尽管包含了显示逻辑），也不应该被直接访问（尽管包含了\
  \ HTML 标记）。我们把它们放在一个名为 `templates` 的目录中。\n\n#### 完整目录结构\n\n综合以上所有内容，我们 Web 应用程序的目录结构将如下所示：\n\
