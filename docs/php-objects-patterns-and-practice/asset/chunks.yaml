  trans: '

    #### 原始类型至关重要：一个示例


    你需要密切关注代码中的类型。以下是一个你可能遇到的类型相关问题的示例。


    假设你正在从 XML 文件中提取配置设置。`<resolvedomains>` XML 元素告知应用程序是否应尝试将 IP 地址解析为域名，这是一个有用但相对耗时的过程。以下是示例
    XML：


    ```

    <resolvedomains>false</resolvedomains>

    ```


    应用程序提取出字符串 `"false"`，并将其作为标志传递给一个名为 `outputAddresses()` 的方法，该方法用于显示 IP 地址数据。以下是
    `outputAddresses()` 的代码：


    ```

    // listing 03.15

    class AddressManager

    {

    private $addresses = ["209.131.36.159", "216.58.213.174"];

    public function outputAddresses($resolve)

    {

    foreach ($this->addresses as $address) {

    print $address;

    if ($resolve) {

    print " (".gethostbyaddr($address).")";

    }

    print "\n";

    }

    }

    }

    ```


    当然，`AddressManager` 类还有改进空间。例如，将 IP 地址硬编码到类中并不是很有用。不过，`outputAddresses()` 方法会遍历
    `$addresses` 数组属性并打印每个元素。如果 `$resolve` 参数变量本身解析为 `true`，该方法会同时输出域名和 IP 地址。


    以下是结合 `AddressManager` 类使用 `settings` XML 配置元素的一种方法。看看你是否能发现其中的缺陷：


    ```

    // listing 03.16

    $settings = simplexml:load_file(__DIR__."/resolve.xml");

    $manager = new AddressManager();

    $manager->outputAddresses((string)$settings->resolvedomains);

    ```


    这段代码片段使用 `SimpleXML` API 来获取 `resolvedomains` 元素的值。在此示例中，我知道该值是文本元素 `"false"`，并且按照
    `SimpleXML` 文档的建议，我将其强制转换为字符串。


    这段代码的行为可能与你预期的不同。将字符串 `"false"` 传递给 `outputAddresses()` 方法时，我误解了该方法对参数所做的隐式假设。该方法期望的是一个布尔值（即
    `true` 或 `false`）。实际上，在测试中，字符串 `"false"` 会被解析为 `true`。这是因为 PHP 在测试上下文中会友好地将非空字符串值强制转换为布尔值
    `true`。考虑以下代码：


    ```

    if ( "false" ) {

    // ...

    }

    ```


    它实际上等同于以下代码：


    ```

    if ( true ) {

    // ...

    }

    ```


    有几种方法可以解决这个问题。


    你可以让 `outputAddresses()` 方法更宽容一些，使其能够识别字符串并应用一些基本规则将其转换为等价的布尔值：


    ```

    // listing 03.17

    public function outputAddresses($resolve)

    {

    if (is_string($resolve)) {

    $resolve =

    (preg_match("/^(false|no|off)$/i", $resolve) ) ? false : true;

    }

    // ...

    }

    ```


    然而，出于良好的设计原因，通常应该避免采用这种方法。一般来说，为方法或函数提供一个清晰严格的接口，比提供一个模糊宽容的接口更好。模糊且宽容的函数和方法可能会引起混淆，从而滋生错误。


    你可以采用另一种方法：保持 `outputAddresses()` 方法不变，并添加一条注释，明确说明 `$resolve` 参数应包含布尔值。这种方法本质上是告诉程序员仔细阅读细则，否则后果自负：


    ```

    /**

    * Outputs the list of addresses.

    * If $resolve is true then each address will be resolved

    * @param    $resolve    boolean    Resolve the address?

    */

    function outputAddresses($resolve)

    {

    // ...

    }

    ```


    这是一种合理的方法，前提是你的客户端程序员能够勤于阅读文档。


    最后，你可以让 `outputAddresses()` 方法严格要求 `$resolve` 参数中准备接收的数据类型。对于像布尔值这样的原始类型，在 PHP
    7 发布之前，只有一种方法可以做到这一点。你必须编写代码来检查传入的数据，并在数据不符合所需类型时采取某些操作：


    ```

    function outputAddresses($resolve)

    {

    if (! is_bool($resolve)) {

    // do something drastic

    }

    //...

    }

    ```


    这种方法可用于强制客户端代码在 `$resolve` 参数中提供正确的数据类型，或发出警告。


    注意


    在下一节“接受提示：对象类型”中，我将描述一种更好的方法来限制传递给方法和函数的参数类型。


    代表客户端转换字符串参数会很友好，但可能会带来其他问题。通过提供转换机制，你是在臆测客户端的上下文和意图。另一方面，通过强制使用布尔数据类型，你让客户端自行决定是否将字符串映射为布尔值，并确定哪些词应映射为
    `true` 或 `false`。同时，`outputAddresses()` 方法则专注于其设计的任务。这种有意识地忽略更广泛上下文、专注于执行特定任务的理念，是面向对象编程中的一个重要原则，我将在本书中反复提及。


    事实上，处理参数类型的策略将取决于可能存在的错误严重程度以及灵活性的好处。根据上下文的不同，PHP 会为你强制转换大多数原始值。例如，当在数学表达式中使用时，字符串中的数字会被转换为其整数或浮点数等价形式。因此，你的代码可能天生对类型错误具有容忍度。然而，如果你期望方法参数是一个数组，就需要更加小心。将非数组值传递给
    PHP 的数组函数不会产生有用的结果，并可能导致方法中发生一连串错误。


    因此，你很可能需要在类型检查、类型转换以及依赖良好清晰的文档之间取得平衡（无论你决定做什么，你都应该提供文档）。


    无论你如何处理这类问题，有一件事是确定的——类型至关重要。PHP 是弱类型语言，这一点使得类型问题更加重要。你不能依赖编译器来防止与类型相关的错误；你必须考虑当意外类型进入参数时可能产生的影响。你不能指望客户端程序员能猜到你的想法，你应该始终考虑你的方法将如何处理传入的垃圾数据。

    '
- fmt: '### Taking the Hint: Object Types


    Just as an argument variable can contain any primitive type, by default it can
    contain an object of any type. This flexibility has its uses, but can present
    problems in the context of a method definition.


    Imagine a method designed to work with a `ShopProduct` object:


    ```

    // listing 03.18

    class ShopProductWriter

    {

    public function write($shopProduct)

    {

    $str  = $shopProduct->title . ": "

    . $shopProduct->getProducer()

    . " (" . $shopProduct->price . ")\n";

    print $str;

    }

    }

    ```


    You can test this class like this:


    ```

    // listing 03.19

    $product1 = new ShopProduct("My Antonia", "Willa", "Cather", 5.99);

    $writer = new ShopProductWriter();

    $writer->write($product1);

    ```


    This outputs the following:


    ```

    My Antonia: Willa Cather (5.99)

    ```


    The `ShopProductWriter` class contains a single method, `write()`. The `write()`
    method accepts a `ShopProduct` object and uses its properties and methods to construct
    and print a summary string. I used the name of the argument variable, `$shopProduct`,
    as a signal that the method expects a `ShopProduct` object, but I did not enforce
    this. That means I could be passed an unexpected object or primitive type and
    be none the wiser until I begin trying to work with the `$shopProduct` argument.
    By that time, my code may already have acted on the assumption that it has been
    passed a genuine `ShopProduct` object.


    **Note**


    You might wonder why I didn''t add the `write()` method directly to `ShopProduct`.
    The reason lies with areas of responsibility. The `ShopProduct` class is responsible
    for managing product data; the `ShopProductWriter` is responsible for writing
    it. You will begin to see why this division of labor can be useful as you read
    this chapter.


    To address this problem, PHP 5 introduced class type declarations (known then
    as type hints). To add a class type declaration to a method argument, you simply
    place a class name in front of the method argument you need to constrain. So I
    can amend the `write()` method thus:


    ```

    // listing 03.20

    public function write(ShopProduct $shopProduct)

    {

    // ...

    }

    ```


    Now the `write()` method will only accept the `$shopProduct` argument if it contains
    an object of type `ShopProduct`. This snippet tries to call `write()` with a dodgy
    object:


    ```

    // listing 03.21

    class Wrong

    {

    }

    $writer = new ShopProductWriter();

    $writer->write(new Wrong());

    ```


    Because the `write()` method contains a class type declaration, passing it a `Wrong`
    object causes a fatal error.


    ```

    TypeError: Argument 1 passed to ShopProductWriter::write() must be an instance
    of ShopProduct, instance of Wrong given, called in Runner.php on ...

    ```


    This saves me from having to test the type of the argument before I work with
    it. It also makes the method signature much clearer for the client coder. She
    can see the requirements of the `write()` method at a glance. She does not have
    to worry about some obscure bug arising from a type error because the declaration
    is rigidly enforced.


    Even though this automated type checking is a great way of preventing bugs, it
    is important to understand that type declarations are checked at runtime. This
    means that a class declaration will only report an error at the moment that an
    unwanted object is passed to the method. If a call to `write()` is buried in a
    conditional clause that only runs on Christmas morning, you may find yourself
    working the holiday if you haven’t checked your code carefully.


    Armed with scalar type declarations, I can add some constraints to the `ShopProduct`
    class:


    ```

    // listing 03.22

    class ShopProduct

    {

    public $title;

    public $producerMainName;

    public $producerFirstName;

    public $price = 0;

    public function __construct(

    string $title,

    string $firstName,

    string $mainName,

    float $price

    ) {

    $this->title = $title;

    $this->producerFirstName = $firstName;

    $this->producerMainName = $mainName;

    $this->price = $price;

    }

    // ...

    }

    ```


    With the constructor method shored up in this way, I can be sure that the `$title`,
    `$firstName`, `$mainName` arguments will always contain string data, and that
    `$price` will contain a float. I can demonstrate this by instantiating `ShopProduct`
    with the wrong information:


    ```

    // listing 03.23

    // will fail

    $product = new ShopProduct("title", "first", "main", []);

    ```


    I attempt to instantiate a `ShopProduct` object. I pass three strings to the constructor,
    but I fail at the final hurdle by passing in an empty array instead of the required
    float. Thanks to type declarations, PHP won’t let me get away with that:


    ```

    TypeError: Argument 4 passed to ShopProduct::__construct() must be of the type
    float, array given, called in...

    ```


    By default, PHP will implicitly cast arguments to the required type, where possible.
    This is an example of the tension between safety and flexibility we encountered
    earlier. The new implementation of the `ShopProduct` class, for example, will
    quietly turn a string into a float for us. So, this instantiation would not fail:


    ```

    // listing 03.24

    $product = new ShopProduct("title", "first", "main", "4.22");

    ```


    Behind the scenes, the string `"4.22"` becomes the float `4.22`.


    So far, so useful. But think back to the problem we encountered with the `AddressManager`
    class. The string `"false"` was quietly resolving to the Boolean `true`. By default,
    this will still happen if I use a `bool` type declaration in the `AddressManager::outputAddresses()`
    method like this:


    ```

    // listing 03.25

    public function outputAddresses(bool $resolve)

    {

    // ...

    }

    ```


    Now consider a call that passes along a string like this:


    ```

    // listing 03.26

    $manager->outputAddresses("false");

    ```


    Because of implicit casting, it is functionally identical to one that passes the
    Boolean value `true`.


    You can make scalar type declarations strict, although only on a file by file
    basis. Here, I turn on strict type declarations and call `outputAddresses()` with
    a string once again:


    ```

    // listing 03.27

    declare(strict_types=1);

    $manager->outputAddresses("false");

    ```


    Because I declare strict typing, this call causes a `TypeError` to be thrown:


    ```

    TypeError: Argument 1 passed to AddressManager::outputAddresses() must be of the
    type boolean, string given, called in ...

    ```


    **Note**


    A `strict_types` declaration applies to the file from which a call is made, and
    not to the file in which a function or method is implemented. So it’s up to client
    code to enforce strictness.


    You may need to make an argument optional, but nonetheless constrain its type
    if it is provided. You can do this by providing a default value:


    ```

    // listing 03.28

    class ConfReader

    {

    public function getValues(array $default = null)

    {

    $values = [];

    // do something to get values

    // merge the provided defaults (it will always be an array)

    $values = array_merge($default, $values);

    return $values;

    }

    }

    ```


    In Table 3-2, I list the type declarations supported by PHP.


    **Table 3-2. Type declarations**


    | Type declaration | Since | Description |

    | --- | --- | --- |

    | `array` | 5.1 | An array. Can default to `null` or an array |

    | `int` | 7.0 | An integer. Can default to `null` or an integer |

    | `float` | 7.0 | A floating point number (a number with a decimal point). An
    integer will be accepted—even with strict mode enabled. Can default to `null`,
    a float, or an integer |

    | `callable` | 5.4 | Callable code (such as an anonymous function). Can default
    to `null` |

    | `bool` | 7.0 | A Boolean. Can default to `null` or a Boolean |

    | `string` | 5.0 | Character data. Can default to `null` or a string |

    | `self` | 5.0 | A reference to the containing class |

    | `[a class type]` | 5.0 | The type of a class or interface. Can default to `null`
    |'
  raw: '### Taking the Hint : Object Types


    Just as an argument variable can contain any primitive type, by default it can
    contain an object of any type. This flexibility has its uses, but can present
    problems in the context of a method definition.


    Imagine a method designed to work with a `ShopProduct` object:


    ```

    // listing 03.18

    class ShopProductWriter

    {

    public function write($shopProduct)

    {

    $str  = $shopProduct->title . ": "

    . $shopProduct->getProducer()

    . " (" . $shopProduct->price . ")\n";

    print $str;

    }

    }

    ```


    You can test this class like this:


    ```

    // listing 03.19

    $product1 = new ShopProduct("My Antonia", "Willa", "Cather", 5.99);

    $writer = new ShopProductWriter();

    $writer->write($product1);

    ```


    This outputs the following:


    ```

    My Antonia: Willa Cather (5.99)

    ```


    The `ShopProductWriter` class contains a single method, `write()`. The `write()`
    method accepts a `ShopProduct` object and uses its properties and methods to construct
    and print a summary string. I used the name of the argument variable, `$shopProduct`,
    as a signal that the method expects a `ShopProduct` object, but I did not enforce
    this. That means I could be passed an unexpected object or primitive type and
    be none the wiser until I begin trying to work with the `$shopProduct` argument.
    By that time, my code may already have acted on the assumption that it has been
    passed a genuine `ShopProduct` object.


    Note


    You might wonder why I didn''t add the `write()` method directly to `ShopProduct`.
    The reason lies with areas of responsibility. The `ShopProduct` class is responsible
    for managing product data; the `ShopProductWriter` is responsible for writing
    it. You will begin to see why this division of labor can be useful as you read
    this chapter.


    To address this problem, PHP 5 introduced class type declarations (known then
    as type hints). To add a class type declaration to a method argument, you simply
    place a class name in front of the method argument you need to constrain. So I
    can amend the `write()` method thus:


    ```

    // listing 03.20

    public function write(ShopProduct $shopProduct)

    {

    // ...

    }

    ```


    Now the `write()` method will only accept the `$shopProduct` argument if it contains
    an object of type `ShopProduct`. This snippet tries to call `write()` with a dodgy
    object:


    ```

    // listing 03.21

    class Wrong

    {

    }

    $writer = new ShopProductWriter();

    $writer->write(new Wrong());

    ```


    Because the `write()` method contains a class type declaration, passing it a `Wrong`
    object causes a fatal error.


    ```

    TypeError: Argument 1 passed to ShopProductWriter::write() must be an instance
    of ShopProduct, instance of Wrong given, called in Runner.php on ...

    ```


    This saves me from having to test the type of the argument before I work with
    it. It also makes the method signature much clearer for the client coder. She
    can see the requirements of the `write()` method at a glance. She does not have
    to worry about some obscure bug arising from a type error because the declaration
    is rigidly enforced.


    Even though this automated type checking is a great way of preventing bugs, it
    is important to understand that type declarations are checked at runtime. This
    means that a class declaration will only report an error at the moment that an
    unwanted object is passed to the method. If a call to `write()` is buried in a
    conditional clause that only runs on Christmas morning, you may find yourself
    working the holiday if you haven’t checked your code carefully.


    Armed with scalar type declarations, I can add some constraints to the `ShopProduct`
    class:


    ```

    // listing 03.22

    class ShopProduct

    {

    public $title;

    public $producerMainName;

    public $producerFirstName;

    public $price = 0;

    public function __construct(

    string $title,

    string $firstName,

    string $mainName,

    float $price

    ) {

    $this->title = $title;

    $this->producerFirstName = $firstName;

    $this->producerMainName = $mainName;

    $this->price = $price;

    }

    // ...

    }

    ```


    With the constructor method shored up in this way, I can be sure that the `$title`,
    `$firstName`, `$mainName` arguments will always contain string data, and that
    `$price` will contain a float. I can demonstrate this by instantiating `ShopProduct`
    with the wrong information:


    ```

    // listing 03.23

    // will fail

    $product = new ShopProduct("title", "first", "main", []);

    ```


    I attempt to instantiate a `ShopProduct` object. I pass three strings to the constructor,
    but I fail at the final hurdle by passing in an empty array instead of the required
    float. Thanks to type declarations, PHP won’t let me get away with that:


    ```

    TypeError: Argument 4 passed to ShopProduct::__construct() must be of the type
    float, array given, called in...

    ```


    By default, PHP will implicitly cast arguments to the required type, where possible.
    This is an example of the tension between safety and flexibility we encountered
    earlier. The new implementation of the `ShopProduct` class, for example, will
    quietly turn a string into a float for us. So, this instantiation would not fail:


    ```

    // listing 03.24

    $product = new ShopProduct("title", "first", "main", "4.22");

    ```


    Behind the scenes, the string `"4.22"` becomes the float `4.22`


    So far, so useful. But think back to the problem we encountered with the `AddressManager`
    class. The string `"false"` was quietly resolving to the Boolean `true`. By default,
    this will still happen if I use a `bool` type declaration in the `AddressManager::outputAddresses()`
    method like this:


    ```

    // listing 03.25

    public function outputAddresses(bool $resolve)

    {

    // ...

    }

    ```


    Now consider a call that passes along a string like this:


    ```

    // listing 03.26

    $manager->outputAddresses("false");

    ```


    Because of implicit casting, it is functionally identical to one that passes the
    Boolean value `true`.


    You can make scalar type declarations strict, although only on a file by file
    basis. Here, I turn on strict type declarations and call `outputAddresses()` with
    a string once again:


    ```

    // listing 03.27

    declare(strict_types=1);

    $manager->outputAddresses("false");

    ```


    Because I declare strict typing, this call causes a `TypeError` to be thrown:


    ```

    TypeError: Argument 1 passed to AddressManager::outputAddresses() must be of the
    type boolean, string given, called in ...

    ```


    Note


    A `strict_types` declaration applies to the file from which a call is made, and
    not to the file in which a function or method is implemented. So it’s up to client
    code to enforce strictness.


    You may need to make an argument optional, but nonetheless constrain its type
    if it is provided. You can do this by providing a default value:


    ```

    // listing 03.28

    class ConfReader

    {

    public function getValues(array $default = null)

    {

    $values = [];

    // do something to get values

    // merge the provided defaults (it will always be an array)

    $values = array_merge($default, $values);

    return $values;

    }

    }

    ```


    In Table [3-2](#A314621_5_En_3_Chapter.html#Tab2), I list the type declarations
    supported by PHP.


    Table 3-2.


    Type declarations


    | Type declaration | Since | Description |

    | --- | --- | --- |

    | `array` | 5.1 | An array. Can default to `null` or an array |

    | `int` | 7.0 | An integer Can default to `null` or an integer |

    | `float` | 7.0 | A floating point number (a number with a decimal point). An
    integer will be accepted—even with strict mode enabled. Can default to `null`,
    a float, or an integer |

    | `callable` | 5.4 | Callable code (such as an anonymous function). Can default
    to `null` |

    | `bool` | 7.0 | A Boolean. Can default to `null` or a Boolean. |

    | `string` | 5.0 | Character data. Can default to `null` or a string. |

    | `self` | 5.0 | A reference to the containing class |

    | `[a class type]` | 5.0 | The type of a class or interface. Can default to `null`
    |'
  trans: '

    ### 善用提示：对象类型


    正如参数变量可以包含任何基本类型一样，默认情况下它也可以包含任何类型的对象。这种灵活性有其用途，但在方法定义的上下文中可能会带来问题。


    假设有一个方法被设计用来处理 `ShopProduct` 对象：


    ```

    // listing 03.18

    class ShopProductWriter

    {

    public function write($shopProduct)

    {

    $str  = $shopProduct->title . ": "

    . $shopProduct->getProducer()

    . " (" . $shopProduct->price . ")\n";

    print $str;

    }

    }

    ```


    你可以这样测试这个类：


    ```

    // listing 03.19

    $product1 = new ShopProduct("My Antonia", "Willa", "Cather", 5.99);

    $writer = new ShopProductWriter();

    $writer->write($product1);

    ```


    输出结果如下：


    ```

    My Antonia: Willa Cather (5.99)

    ```


    `ShopProductWriter` 类包含一个方法 `write()`。`write()` 方法接受一个 `ShopProduct` 对象，并使用其属性和方法来构造并打印摘要字符串。我使用参数变量名
    `$shopProduct` 来暗示该方法期望一个 `ShopProduct` 对象，但并未强制执行此规则。这意味着我可能会传入一个意外的对象或基本类型，并且直到我开始尝试使用
    `$shopProduct` 参数时才会发现问题。到那时，我的代码可能已经基于“已传入一个真正的 `ShopProduct` 对象”这个假设执行了操作。


    **注意**


    你可能会好奇为什么我不直接把 `write()` 方法添加到 `ShopProduct` 中。原因在于职责划分。`ShopProduct` 类负责管理产品数据，而
    `ShopProductWriter` 负责输出数据。随着你阅读本章，你会开始理解这种分工为何有用。


    为了解决这个问题，PHP 5 引入了类类型声明（当时称为类型提示）。要为方法参数添加类类型声明，只需将类名放在需要约束的方法参数前面即可。因此，我可以这样修改
    `write()` 方法：


    ```

    // listing 03.20

    public function write(ShopProduct $shopProduct)

    {

    // ...

    }

    ```


    现在，只有当 `$shopProduct` 参数包含 `ShopProduct` 类型的对象时，`write()` 方法才会接受它。以下代码片段尝试使用一个无效的对象调用
    `write()`：


    ```

    // listing 03.21

    class Wrong

    {

    }

    $writer = new ShopProductWriter();

    $writer->write(new Wrong());

    ```


    由于 `write()` 方法包含类类型声明，传入一个 `Wrong` 对象会导致致命错误。


    ```

    TypeError: Argument 1 passed to ShopProductWriter::write() must be an instance
    of ShopProduct, instance of Wrong given, called in Runner.php on ...

    ```


    这让我无需在使用参数前测试其类型，同时也使方法签名对客户端开发者更加清晰。她可以一目了然地看到 `write()` 方法的要求，并且不必担心由于类型错误而导致的某些难以发现的
    bug，因为声明是严格强制执行的。


    尽管这种自动类型检查是防止错误的好方法，但重要的是要理解类型声明是在运行时检查的。这意味着类声明只有在不期望的对象被传递给方法时才会报告错误。如果对 `write()`
    的调用嵌在仅在圣诞节早上运行的某个条件子句中，而你没有仔细检查代码，那么你可能就得在节日里加班了。


    借助标量类型声明，我可以为 `ShopProduct` 类添加一些约束：


    ```

    // listing 03.22

    class ShopProduct

    {

    public $title;

    public $producerMainName;

    public $producerFirstName;

    public $price = 0;

    public function __construct(

    string $title,

    string $firstName,

    string $mainName,

    float $price

    ) {

    $this->title = $title;

    $this->producerFirstName = $firstName;

    $this->producerMainName = $mainName;

    $this->price = $price;

    }

    // ...

    }

    ```


    通过这种方式加固构造函数，我可以确保 `$title`、`$firstName`、`$mainName` 参数始终包含字符串数据，而 `$price` 包含浮点数。我可以通过传入错误信息来实例化
    `ShopProduct` 来演示这一点：


    ```

    // listing 03.23

    // 会失败

    $product = new ShopProduct("title", "first", "main", []);

    ```


    我尝试实例化一个 `ShopProduct` 对象。我向构造函数传递了三个字符串，但在最后一步失败了——我传入了一个空数组，而不是所需的浮点数。感谢类型声明，PHP
    不会允许我这样做：


    ```

    TypeError: Argument 4 passed to ShopProduct::__construct() must be of the type
    float, array given, called in...

    ```


    默认情况下，PHP 会尽可能将参数隐式转换为所需类型。这是我们之前遇到的“安全性与灵活性之间的权衡”的一个例子。例如，新的 `ShopProduct` 类实现会悄悄地将字符串转换为浮点数。因此，以下实例化不会失败：


    ```

    // listing 03.24

    $product = new ShopProduct("title", "first", "main", "4.22");

    ```


    在幕后，字符串 `"4.22"` 变成了浮点数 `4.22`。


    到目前为止，这一切都很有用。但回想一下我们在 `AddressManager` 类中遇到的问题。字符串 `"false"` 被静默地解析为布尔值 `true`。默认情况下，如果我在
    `AddressManager::outputAddresses()` 方法中使用 `bool` 类型声明，这种情况仍然会发生，如下所示：


    ```

    // listing 03.25

    public function outputAddresses(bool $resolve)

    {

    // ...

    }

    ```


    现在考虑一个传入字符串的调用：


    ```

    // listing 03.26

    $manager->outputAddresses("false");

    ```


    由于隐式转换，这个调用在功能上与传入布尔值 `true` 的调用完全相同。


    你可以使标量类型声明变为严格的，尽管这需要逐文件进行。在这里，我开启了严格类型声明，并再次使用字符串调用 `outputAddresses()`：


    ```

    // listing 03.27

    declare(strict_types=1);

    $manager->outputAddresses("false");

    ```


    因为我声明了严格类型，这个调用会抛出一个 `TypeError`：


    ```

    TypeError: Argument 1 passed to AddressManager::outputAddresses() must be of the
    type boolean, string given, called in ...

    ```


    **注意**


    `strict_types` 声明应用于发起调用的文件，而不是函数或方法所在的文件。因此，由客户端代码来决定是否强制严格检查。


    你可能需要让参数成为可选的，但如果有值传入，仍需约束其类型。你可以通过提供默认值来实现这一点：


    ```

    // listing 03.28

    class ConfReader

    {

    public function getValues(array $default = null)

    {

    $values = [];

    // 执行一些操作来获取值

    // 合并提供的默认值（它始终是一个数组）

    $values = array_merge($default, $values);

    return $values;

    }

    }

    ```


    在表 3-2 中，我列出了 PHP 支持的类型声明。


    **表 3-2. 类型声明**


    | 类型声明 | 起始版本 | 描述 |

    | --- | --- | --- |

    | `array` | 5.1 | 数组。默认值可以为 `null` 或一个数组 |

    | `int` | 7.0 | 整数。默认值可以为 `null` 或一个整数 |

    | `float` | 7.0 | 浮点数（带小数点的数字）。即使启用了严格模式，也会接受整数。默认值可以为 `null`、一个浮点数或一个整数 |

    | `callable` | 5.4 | 可调用的代码（如匿名函数）。默认值可以为 `null` |

    | `bool` | 7.0 | 布尔值。默认值可以为 `null` 或一个布尔值 |

    | `string` | 5.0 | 字符数据。默认值可以为 `null` 或一个字符串 |

    | `self` | 5.0 | 对包含类的引用 |

    | `[a class type]` | 5.0 | 类或接口的类型。默认值可以为 `null` |

    '
- fmt: "# When I described class type declarations\n\nWhen I described class type\
    \ declarations, I implied that types and classes are synonymous. There is a key\
    \ difference between the two, however. When you define a class, you also define\
    \ a type, but a type can describe an entire family of classes. The mechanism by\
    \ which different classes can be grouped together under a type is called inheritance.\
    \ I discuss inheritance in the next section.\n\n## Inheritance\n\nInheritance\
    \ is the means by which one or more classes can be derived from a base class.\n\
    \nA class that inherits from another is said to be a subclass of it. This relationship\
    \ is often described in terms of parents and children. A child class is derived\
    \ from and inherits characteristics from the parent. These characteristics consist\
    \ of both properties and methods. The child class will typically add new functionality\
    \ to that provided by its parent (also known as a superclass); for this reason,\
    \ a child class is said to extend its parent.\n\nBefore I dive into the syntax\
    \ of inheritance, I’ll examine the problems it can help you to solve.\n\n### The\
    \ Inheritance Problem\n\nLook again at the `ShopProduct` class. At the moment,\
    \ it is nicely generic. It can handle all sorts of products:\n\n```\n// listing\
    \ 03.29\n$product1 = new ShopProduct(\"My Antonia\", \"Willa\", \"Cather\", 5.99);\n\
    $product2 = new ShopProduct(\n\"Exile on Coldharbour Lane\",\n\"The\",\n\"Alabama\
    \ 3\",\n10.99\n);\nprint \"author: \" . $product1->getProducer() . \"\\n\";\n\
    print \"artist: \" . $product2->getProducer() . \"\\n\";\n```\n\nHere’s the output:\n\
    \n```\nauthor: Willa Cather\nartist: The Alabama 3\n```\n\nSeparating the producer\
    \ name into two parts works well with both books and CDs. I want to be able to\
    \ sort on `Alabama 3` and `Cather`, not on `The` and `Willa`. Laziness is an excellent\
    \ design strategy, so there is no need to worry about using `ShopProduct` for\
    \ more than one kind of product at this stage.\n\nIf I add some new requirements\
    \ to my example, however, things rapidly become more complicated. Imagine, for\
    \ example, that you need to represent data specific to books and CDs. For CDs,\
    \ you must store the total playing time; for books, the total number of pages.\
    \ There could be any number of other differences, but this will serve to illustrate\
    \ the issue.\n\nHow can I extend my example to accommodate these changes? Two\
    \ options immediately present themselves. First, I could throw all the data into\
    \ the `ShopProduct` class. Second, I could split `ShopProduct` into two separate\
    \ classes.\n\nLet’s examine the first approach. Here, I combine CD- and book-related\
    \ data in a single class:\n\n```\n// listing 03.30\nclass ShopProduct\n{\n   \
    \ public $numPages;\n    public $playLength;\n    public $title;\n    public $producerMainName;\n\
    \    public $producerFirstName;\n    public $price;\n\n    public function __construct(\n\
    \        string $title,\n        string $firstName,\n        string $mainName,\n\
    \        float $price,\n        int $numPages = 0,\n        int $playLength =\
    \ 0\n    ) {\n        $this->title             = $title;\n        $this->producerFirstName\
    \ = $firstName;\n        $this->producerMainName  = $mainName;\n        $this->price\
    \             = $price;\n        $this->numPages          = $numPages;\n     \
    \   $this->playLength        = $playLength;\n    }\n\n    public function getNumberOfPages()\n\
    \    {\n        return $this->numPages;\n    }\n\n    public function getPlayLength()\n\
    \    {\n        return $this->playLength;\n    }\n\n    public function getProducer()\n\
    \    {\n        return $this->producerFirstName . \" \"\n            . $this->producerMainName;\n\
    \    }\n}\n```\n\nI have provided method access to the `$numPages` and `$playLength`\
    \ properties to illustrate the divergent forces at work here. An object instantiated\
    \ from this class will include a redundant method and, for a CD, must be instantiated\
    \ using an unnecessary constructor argument: a CD will store information and functionality\
    \ relating to book pages, and a book will support play-length data. This is probably\
    \ something you could live with right now. But what would happen if I added more\
    \ product types, each with its own methods, and then added more methods for each\
    \ type? Our class would become increasingly complex and hard to manage.\n\nSo\
    \ forcing fields that don’t belong together into a single class leads to bloated\
    \ objects with redundant properties and methods.\n\nThe problem doesn’t end with\
    \ data, either. I run into difficulties with functionality as well. Consider a\
    \ method that summarizes a product. The sales department has requested a clear\
    \ summary line for use in invoices. They want me to include the playing time for\
    \ CDs and a page count for books, so I will be forced to provide different implementations\
    \ for each type. I could try using a flag to keep track of the object’s format.\
    \ Here’s an example:\n\n```\n// listing 03.31\npublic function getSummaryLine()\n\
    {\n    $base  = \"{$this->title} ( {$this->producerMainName}, \";\n    $base .=\
    \ \"{$this->producerFirstName} )\";\n    if ($this->type == 'book') {\n      \
    \  $base .= \": page count - {$this->numPages}\";\n    } elseif ($this->type ==\
    \ 'cd') {\n        $base .= \": playing time - {$this->playLength}\";\n    }\n\
    \    return $base;\n}\n```"
  raw: 'When I described class type declarations, I implied that types and classes
    are synonymous. There is a key difference between the two, however. When you define
    a class, you also define a type, but a type can describe an entire family of classes.
    The mechanism by which different classes can be grouped together under a type
    is called inheritance. I discuss inheritance in the next section.


    ## Inheritance


    Inheritance is the means by which one or more classes can be derived from a base
    class.


    A class that inherits from another is said to be a subclass of it. This relationship
    is often described in terms of parents and children. A child class is derived
    from and inherits characteristics from the parent. These characteristics consist
    of both properties and methods. The child class will typically add new functionality
    to that provided by its parent (also known as a superclass); for this reason,
    a child class is said to extend its parent.


    Before I dive into the syntax of inheritance, I’ll examine the problems it can
    help you to solve.


    ### The Inheritance Problem


    Look again at the `ShopProduct` class . At the moment, it is nicely generic. It
    can handle all sorts of products:


    ```

    // listing 03.29

    $product1 = new ShopProduct("My Antonia", "Willa", "Cather", 5.99);

    $product2 = new ShopProduct(

    "Exile on Coldharbour Lane",

    "The",

    "Alabama 3",

    10.99

    );

    print "author: " . $product1->getProducer() . "\n";

    print "artist: " . $product2->getProducer() . "\n";

    ```


    Here’s the output:


    ```

    author: Willa Cather

    artist: The Alabama 3

    ```


    Separating the producer name into two parts works well with both books and CDs.
    I want to be able to sort on “Alabama 3” and “Cather”, not on “The” and “Willa”.
    Laziness is an excellent design strategy, so there is no need to worry about using
    `ShopProduct` for more than one kind of product at this stage.


    If I add some new requirements to my example, however, things rapidly become more
    complicated. Imagine, for example, that you need to represent data specific to
    books and CDs . For CDs, you must store the total playing time; for books, the
    total number of pages. There could be any number of other differences, but this
    will serve to illustrate the issue.


    How can I extend my example to accommodate these changes? Two options immediately
    present themselves. First, I could throw all the data into the `ShopProduct` class.
    Second, I could split `ShopProduct` into two separate classes.


    Let’s examine the first approach . Here, I combine CD- and book-related data in
    a single class:


    ```

    // listing 03.30

    class ShopProduct

    {

    public $numPages;

    public $playLength;

    public $title;

    public $producerMainName;

    public $producerFirstName;

    public $price;

    public function __construct(

    string $title,

    string $firstName,

    string $mainName,

    float $price,

    int $numPages = 0,

    int $playLength = 0

    ) {

    $this->title             = $title;

    $this->producerFirstName = $firstName;

    $this->producerMainName  = $mainName;

    $this->price             = $price;

    $this->numPages          = $numPages;

    $this->playLength        = $playLength;

    }

    public function getNumberOfPages()

    {

    return $this->numPages;

    }

    public function getPlayLength()

    {

    return $this->playLength;

    }

    public function getProducer()

    {

    return $this->producerFirstName . " "

    . $this->producerMainName;

    }

    }

    ```


    I have provided method access to the `$` `numPages` and `$playLength` properties
    to illustrate the divergent forces at work here. An object instantiated from this
    class will include a redundant method and, for a CD, must be instantiated using
    an unnecessary constructor argument: a CD will store information and functionality
    relating to book pages, and a book will support play-length data. This is probably
    something you could live with right now. But what would happen if I added more
    product types, each with its own methods, and then added more methods for each
    type? Our class would become increasingly complex and hard to manage.


    So forcing fields that don’t belong together into a single class leads to bloated
    objects with redundant properties and methods.


    The problem doesn’t end with data, either. I run into difficulties with functionality
    as well. Consider a method that summarizes a product. The sales department has
    requested a clear summary line for use in invoices. They want me to include the
    playing time for CDs and a page count for books, so I will be forced to provide
    different implementations for each type. I could try using a flag to keep track
    of the object’s format. Here’s an example:


    ```

    // listing 03.31

    public function getSummaryLine()

    {

    $base  = "{$this->title} ( {$this->producerMainName}, ";

    $base .= "{$this->producerFirstName} )";

    if ($this->type == ''book'') {

    $base .= ": page count - {$this->numPages}";

    } elseif ($this->type == ''cd'') {

    $base .= ": playing time - {$this->playLength}";

    }

    return $base;

    }

    ```'
  trans: "\n# 关于类类型声明的说明\n\n在介绍类类型声明时，我暗示了类型和类是等同的概念。然而，两者之间存在一个关键区别。当你定义一个类时，同时也定义了一个类型，但一个类型可以描述整个类家族。将不同类归入同一类型的机制称为**继承**。我将在下一节讨论继承。\n\
    \n## 继承\n\n继承是一种允许一个或多个类从基类派生出来的机制。\n\n继承自另一个类的类被称为该类的子类。这种关系通常用父与子来描述。子类继承自父类并继承父类的特性。这些特性包括属性和方法。子类通常会在父类（也称为超类）提供的功能基础上添加新功能；因此，子类也被称为扩展了其父类。\n\
    \n在深入探讨继承的语法之前，我先分析一下继承能帮你解决什么问题。\n\n### 继承问题\n\n再看一下`ShopProduct`类。目前，它非常通用，可以处理各种类型的产品：\n\
    \n```\n// listing 03.29\n$product1 = new ShopProduct(\"我的安冬妮亚\", \"薇拉\", \"凯瑟\"\
    , 5.99);\n$product2 = new ShopProduct(\n\"冷港巷的放逐\",\n\"乐队\",\n\"阿拉巴马 3 号\",\n\
    10.99\n);\nprint \"作者: \" . $product1->getProducer() . \"\\n\";\nprint \"艺人: \"\
    \ . $product2->getProducer() . \"\\n\";\n```\n\n输出结果如下：\n\n```\n作者: 薇拉·凯瑟\n艺人:\
    \ 乐队·阿拉巴马 3 号\n```\n\n将作者名分为两部分来处理，对于书籍和 CD 都适用。我希望能够按`阿拉巴马 3 号`和`凯瑟`进行排序，而不是按`乐队`和`薇拉`。懒惰是一种优秀的设计策略，因此现阶段无需担心使用`ShopProduct`处理多种产品的问题。\n\
    \n但如果我为示例添加一些新需求，事情很快就会变得更复杂。例如，假设你需要表示书籍和 CD 各自特有的数据。对于 CD，必须存储总播放时长；对于书籍，需要存储总页数。虽然还可能存在其他差异，但这足以说明问题。\n\
    \n如何扩展我的示例来适应这些变化呢？有两个方法立即浮现在眼前。第一，我可以把所有数据都塞进`ShopProduct`类。第二，我可以将`ShopProduct`拆分成两个独立的类。\n\
    \n我们先来看第一种方法。这里，我将 CD 和书籍相关的数据合并到一个类中：\n\n```\n// listing 03.30\nclass ShopProduct\n\
    {\n    public $numPages;\n    public $playLength;\n    public $title;\n    public\
    \ $producerMainName;\n    public $producerFirstName;\n    public $price;\n\n \
    \   public function __construct(\n        string $title,\n        string $firstName,\n\
    \        string $mainName,\n        float $price,\n        int $numPages = 0,\n\
    \        int $playLength = 0\n    ) {\n        $this->title             = $title;\n\
    \        $this->producerFirstName = $firstName;\n        $this->producerMainName\
    \  = $mainName;\n        $this->price             = $price;\n        $this->numPages\
    \          = $numPages;\n        $this->playLength        = $playLength;\n   \
    \ }\n\n    public function getNumberOfPages()\n    {\n        return $this->numPages;\n\
    \    }\n\n    public function getPlayLength()\n    {\n        return $this->playLength;\n\
    \    }\n\n    public function getProducer()\n    {\n        return $this->producerFirstName\
    \ . \" \"\n            . $this->producerMainName;\n    }\n}\n```\n\n我为`$numPages`和`$playLength`属性提供了方法访问，以说明这里存在的不同需求。从这个类实例化出的对象会包含一个冗余的方法；对于\
    \ CD，实例化时必须使用一个不必要的构造参数：CD 会存储与书籍页数相关的信息和功能，而书籍则会支持播放时长数据。也许你现在还能忍受这种情况。但如果我添加更多产品类型，每种类型都有自己特有的方法，然后再为每种类型添加更多的方法，会发生什么？我们的类会变得越来越复杂，难以管理。\n\
    \n因此，将本不该放在一起的字段强制塞入一个类，会导致对象臃肿，包含冗余的属性和方法。\n\n问题并不仅限于数据层面，功能方面也会遇到困难。考虑一个汇总产品信息的方法。销售部门要求为发票提供一个清晰的摘要行。他们希望我能为\
    \ CD 包含播放时长，为书籍包含页数，因此我必须为每种类型提供不同的实现。我可以尝试使用一个标志来跟踪对象的格式。示例如下：\n\n```\n// listing\
    \ 03.31\npublic function getSummaryLine()\n{\n    $base  = \"{$this->title} (\
    \ {$this->producerMainName}, \";\n    $base .= \"{$this->producerFirstName} )\"\
    ;\n    if ($this->type == 'book') {\n        $base .= \": 页数 - {$this->numPages}\"\
    ;\n    } elseif ($this->type == 'cd') {\n        $base .= \": 播放时间 - {$this->playLength}\"\
    ;\n    }\n    return $base;\n}\n```\n"
- fmt: '为了设置`$type`属性，我可以测试传递给构造函数的`$numPages`参数。然而，`ShopProduct`类又一次变得比必要的更复杂。随着我为不同格式添加更多差异或添加新格式，这些功能上的差异将变得更加难以管理。也许我应该尝试另一种方法来解决这个问题。


    由于`ShopProduct`开始感觉像是一个类里包含了两个类，我可以接受这一点并创建两种类型而不是一种。下面是我的实现方式：


    ```php

    // listing 03.32

    class CdProduct

    {

    public $playLength;

    public $title;

    public $producerMainName;

    public $producerFirstName;

    public $price;

    public function __construct(

    string $title,

    string $firstName,

    string $mainName,

    float  $price,

    int    $playLength

    ) {

    $this->title             = $title;

    $this->producerFirstName = $firstName;

    $this->producerMainName  = $mainName;

    $this->price             = $price;

    $this->playLength        = $playLength;

    }

    public function getPlayLength()

    {

    return $this->playLength;

    }

    public function getSummaryLine()

    {

    $base  = "{$this->title} ( {$this->producerMainName}, ";

    $base .= "{$this->producerFirstName} )";

    $base .= ": playing time - {$this->playLength}";

    return $base;

    }

    public function getProducer()

    {

    return $this->producerFirstName . " "

    . $this->producerMainName;

    }

    }

    // listing 03.33

    class BookProduct

    {

    public $numPages;

    public $title;

    public $producerMainName;

    public $producerFirstName;

    public $price;

    public function __construct(

    string $title,

    string $firstName,

    string $mainName,

    float  $price,

    int    $numPages

    ) {

    $this->title             = $title;

    $this->producerFirstName = $firstName;

    $this->producerMainName  = $mainName;

    $this->price             = $price;

    $this->numPages          = $numPages;

    }

    public function getNumberOfPages()

    {

    return $this->numPages;

    }

    public function getSummaryLine()

    {

    $base  = "{$this->title} ( {$this->producerMainName}, ";

    $base .= "{$this->producerFirstName} )";

    $base .= ": page count - {$this->numPages}";

    return $base;

    }

    public function getProducer()

    {

    return $this->producerFirstName . " "

    . $this->producerMainName;

    }

    }

    ```


    我解决了复杂性问题，但付出了代价。现在我可以为每种格式创建`getSummaryLine()`方法，而无需测试标志。两个类都不维护与其不相关的字段或方法。


    代价在于重复。`getProducerName()`方法在每个类中完全相同。每个构造函数都以相同的方式设置多个相同的属性。这是你应该训练自己嗅探到的另一种不良气味。


    如果我希望`getProducer()`方法在每个类中的行为完全相同，那么我对一个实现所做的任何更改都需要对另一个做出同样的更改。如果不小心，这两个类很快就会失去同步。


    即使我有信心维护这种重复，我的担忧也还没有结束。现在我有两个类型而不是一个。


    还记得`ShopProductWriter`类吗？它的`write()`方法被设计为处理单一类型：`ShopProduct`。我该如何修改它以使其像以前一样工作？我可以从方法签名中删除类类型声明，但这样我就只能寄希望于`write()`被传入一个正确类型的对象。我可以在方法体内添加自己的类型检查代码：


    ```php

    // listing 03.34

    class ShopProductWriter

    {

    public function write($shopProduct)

    {

    if (

    ! ($shopProduct instanceof CdProduct)  &&

    ! ($shopProduct instanceof BookProduct)

    ) {

    die("wrong type supplied");

    }

    $str  = "{$shopProduct->title}: "

    . $shopProduct->getProducer()

    . " ({$shopProduct->price})\n";

    print $str;

    }

    }

    ```


    注意示例中的`instanceof`运算符；如果左侧操作数的对象是右侧操作数所代表的类型，则`instanceof`解析为`true`。


    再一次，我被迫加入了一层新的复杂性。我不仅需要在`write()`方法中针对两种类型测试`$shopProduct`参数，还必须相信每种类型会继续支持与另一种类型相同的字段和方法。当我简单地要求一个单一类型时，一切都要整洁得多，因为我可以使用类类型声明，并且可以确信`ShopProduct`类支持特定的接口。


    `ShopProduct`类的CD和图书方面似乎不能很好地协同工作，但又似乎不能分开。我希望将图书和CD作为单一类型来处理，同时为每种格式提供独立的实现。我想在一个地方提供通用功能以避免重复，但同时允许每种格式以不同的方式处理某些方法调用。我需要使用继承。'
  raw: 'In order to set the `$type` property, I could test the `$numPages` argument
    to the constructor. Still, once again, the `ShopProduct` class has become more
    complex than necessary. As I add more differences to my formats, or add new formats,
    these functional differences will become even harder to manage. Perhaps I should
    try another approach to this problem.


    As `ShopProduct` is beginning to feel like two classes in one, I could accept
    this and create two types rather than one. Here’s how I might do it:


    ```

    // listing 03.32

    class CdProduct

    {

    public $playLength;

    public $title;

    public $producerMainName;

    public $producerFirstName;

    public $price;

    public function __construct(

    string $title,

    string $firstName,

    string $mainName,

    float  $price,

    int    $playLength

    ) {

    $this->title             = $title;

    $this->producerFirstName = $firstName;

    $this->producerMainName  = $mainName;

    $this->price             = $price;

    $this->playLength        = $playLength;

    }

    public function getPlayLength()

    {

    return $this->playLength;

    }

    public function getSummaryLine()

    {

    $base  = "{$this->title} ( {$this->producerMainName}, ";

    $base .= "{$this->producerFirstName} )";

    $base .= ": playing time - {$this->playLength}";

    return $base;

    }

    public function getProducer()

    {

    return $this->producerFirstName . " "

    . $this->producerMainName;

    }

    }

    // listing 03.33

    class BookProduct

    {

    public $numPages;

    public $title;

    public $producerMainName;

    public $producerFirstName;

    public $price;

    public function __construct(

    string $title,

    string $firstName,

    string $mainName,

    float  $price,

    int    $numPages

    ) {

    $this->title             = $title;

    $this->producerFirstName = $firstName;

    $this->producerMainName  = $mainName;

    $this->price             = $price;

    $this->numPages          = $numPages;

    }

    public function getNumberOfPages()

    {

    return $this->numPages;

    }

    public function getSummaryLine()

    {

    $base  = "{$this->title} ( {$this->producerMainName}, ";

    $base .= "{$this->producerFirstName} )";

    $base .= ": page count - {$this->numPages}";

    return $base;

    }

    public function getProducer()

    {

    return $this->producerFirstName . " "

    . $this->producerMainName;

    }

    }

    ```


    I have addressed the complexity issue, but at a cost. I can now create a `getSummaryLine()`
    method for each format without having to test a flag. Neither class maintains
    fields or methods that are not relevant to it.


    The cost lies in duplication. The `getProducerName()` method is exactly the same
    in each class. Each constructor sets a number of identical properties in the same
    way. This is another unpleasant odor you should train yourself to sniff out.


    If I need the `getProducer()` methods to behave identically for each class, any
    changes I make to one implementation will need to be made for the other. Without
    care, the classes will soon slip out of synchronization.


    Even if I am confident that I can maintain the duplication, my worries are not
    over. I now have two types rather than one.


    Remember the `ShopProductWriter` class? Its `write()` method is designed to work
    with a single type: `ShopProduct`. How can I amend this to work as before? I could
    remove the class type declaration from the method signature, but then I must trust
    to luck that `write()` is passed an object of the correct type. I could add my
    own type checking code to the body of the method:


    ```

    // listing 03.34

    class ShopProductWriter

    {

    public function write($shopProduct)

    {

    if (

    ! ($shopProduct instanceof CdProduct)  &&

    ! ($shopProduct instanceof BookProduct)

    ) {

    die("wrong type supplied");

    }

    $str  = "{$shopProduct->title}: "

    . $shopProduct->getProducer()

    . " ({$shopProduct->price})\n";

    print $str;

    }

    }

    ```


    Notice the `instanceof` operator in the example; `instanceof` resolves to `true`
    if the object in the left-hand operand is of the type represented by the right-hand
    operand.


    Once again, I have been forced to include a new layer of complexity. Not only
    do I have to test the `$shopProduct` argument against two types in the `write()`
    method, but I have to trust that each type will continue to support the same fields
    and methods as the other. It was all much neater when I simply demanded a single
    type because I could use a class type declaration and because I could be confident
    that the `ShopProduct` class supported a particular interface.


    The CD and book aspects of the `ShopProduct` class don’t work well together but
    can’t live apart, it seems. I want to work with books and CDs as a single type
    while providing a separate implementation for each format. I want to provide common
    functionality in one place to avoid duplication, but allow each format to handle
    some method calls differently. I need to use inheritance.'
