    **Constructing the CSS**


    Now that we’ve integrated the HTML markup into our Smarty templates, we can incorporate
    the CSS so the page displays nicely as the three-column layout we discussed. All
    styles will be stored in a file called styles.css, which will reside in the css
    directory of the web site (/var/www/phpweb20/htdocs/css).


    ■**Note** There’s no particular reason for choosing this directory, other than
    that it keeps the files organized.


    You may find that an internal section of your web site may require its own CSS
    file—for example, it might require a large number of custom styles that you don’t
    want to include in the main site’s CSS file (why slow down the loading of the
    home page with extra styles that aren’t required?). Creating a separate directory
    for your CSS files will help you keep the files organized, just as you might organize
    images.


    **Specifying Media Types and Loading the CSS File**


    Later in this chapter we will look at creating a print-only style sheet, so we
    must keep in mind that we need to provide styles for different media types. There
    are two different ways of telling the browser which media type is being used:
    the @media rule and the media attribute (used when loading the CSS file with a
    <link> tag). For our application, we will use the @media CSS


    rule, but we will look at them both here first.


    ■**Note** I’m not necessarily advocating using @media over loading a separate
    style sheet with <link>; however, using @media is my personal preference in most
    cases, since it means fewer files are loaded when a user visits the site, reducing
    page-load time and server overhead.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch06CMP2 11/13/07 7:56 PM Page 193


    C H A P T E R 6 ■ S T Y L I N G T H E W E B A P P L I C AT I O N


    **193**


    To load separate style sheets for the screen and for printing, you could use the
    following HTML code:


    <link rel="stylesheet" href="screen.css" type="text/css" media="screen" />


    <link rel="stylesheet" href="print.css" type="text/css" media="print" /> Alternatively,
    if you wanted to use the @media rule, you could load a single style sheet and
    separate the media types within that file. First, you would load the file specifying
    media="all"


    so this style sheet would be used regardless of what type of device is viewing
    the page:


    <link rel="stylesheet" href="styles.css" type="text/css" media="all" /> Next,
    you would use the @media rule to separate the media types. Within styles.css,
    you would use the following:


    .some-css-item { color : #000; }


    @media screen {


    .some-css-item { color : #f00; }


    }


    @media print {


    .some-css-item { color : #00f; }


    }


    In this example, the global styles for .some-css-item would use the color black,
    while red (#f00) would be used for screen, and blue (#00f) would be used when
    printing.


    Other media types you might use include aural (for screen-reading software) and
    handheld (for handheld devices, such as a phone with a small screen and limited
    capabilities).


    ■**Tip** According to the Apple Developer Connection web site at [http://developer.apple.com/iphone](http://developer.apple.com/iphone)


    /designingcontent.html, you can specify a style sheet specifically for the Apple
    iPhone by using the only keyword in combination with the screen media type. Other
    devices will ignore the only keyword and therefore not use the style sheet. For
    example, to load the iphone.css file only for people viewing on an iPhone you
    can use <link rel="stylesheet" href="iphone.css" type="text/css" media="only screen
    and (max-device-width: 480px)" />.


