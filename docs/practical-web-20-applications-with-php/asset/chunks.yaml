    Now we must define the onSortUpdate() callback function. This is called when an
    item in the sortable list is dropped into a new location. In this function we
    initiate a new Ajax request that sends the order of the list to the imagesAction()
    function. Sortable will pass the container element of the sortable list to this
    callback.


    When sending this request, we must send the updated order. We can retrieve this
    order using the Sortable utility function serialize(), which retrieves all values
    and builds them into a URL-friendly string that we can post. As mentioned previously,
    the unordered list we’ve made sortable has an ID of post_images. This means that
    if we have three images with IDs of 5, 6, and 7, calling Sortable.serialize()
    will generate a string such as this: post_images[]=5&post_images[]=6&post_images[]=7


    PHP will automatically turn this into an array. In other words, the equivalent
    PHP code to create this structure would be as follows:


    <?php


    $post_images = array(5, 6, 7);


    ?>


    This is exactly what we need in setImageOrder().


