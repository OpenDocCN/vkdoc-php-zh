    \    any error messages. This is because `$done` will be set to\n    `true` by\
    \ any\n    query that would have succeeded outside of the transaction.\n\n9. \
    \ The conditional\n    statement that redirects the page needs to be amended to\
    \ handle\n    the transaction. Add the new code highlighted in bold:\n\n```\n\
    \    // redirect page after updating or if $_GET['article_id']) not defined\n\
    \    if (($done || $trans_error) || (!$_POST && !isset($_GET['article_id'])))\
    \ {\n    $url = 'http://localhost/phpsols-4e/admin/blog_list_mysqli.php';\n  \
    \  if ($done) {\n    $url .= '?updated=true';\n    } elseif ($trans_error) {\n\
    \    $url .= '?trans_error=' . serialize($trans_error);\n    }\n    header(\"\
    Location: $url\");\n    exit;\n    }\n    ```\n\nThe conditions are now grouped\
    \ inside parentheses to make sure\n    they’re interpreted correctly. The first\
    \ pair checks whether `$done` or `$trans_error` equates\n    to `true`. The\n\
    \    final condition is made more specific by checking that the `$_POST` array\
    \ is\n    empty. This is necessary because `!isset($_GET['article_id'])`\n   \
    \ is always `true`\n    after the Update button has been clicked.\n\nIf  `$trans_error`\
    \ \n    contains any error messages, it equates to `true`, so a query\n    string\
    \ is appended to the redirect location. Because `$trans_error` is an\n    array,\
    \ it needs to be passed to the `serialize()` function\n    before it can be concatenated\
    \ onto the query string. This converts the\n    array to a string that can be\
    \ converted back to its original format.\n\n10.  The final change is in the PHP\
    \ block above the table in `blog_list_mysqli.php`.\n    Add the code in bold to\
    \ display any error messages if the update fails:\n\n```\n    if (isset($_GET['updated']))\
    \ {\n    echo 'Record updated';\n    } elseif (isset($_GET['trans_error'])) {\n\
    \    $trans_error = unserialize($_GET['trans_error']);\n    echo \"Can't update\
    \ record because of the following error(s):\";\n    echo '';\n    foreach ($trans_error\
    \ as $item) {\n    echo '' . safe($item) . '';\n    }\n    echo '';\n    }\n \
    \   ```\n\nThe `unserialize()`\n    function reverses the effect of `serialize()`,\n\
    \    converting the error messages back into an array, which are then\n    displayed\
    \ in a `foreach` loop.\n\n11.  Save `blog_update_mysqli.php`\n    and `blog_list_mysqli.php`,\n\
    \    and update an existing record. The script should work the same as\n    before.\n\
    \n12.  Introduce some deliberate errors into the SQL in `blog_update_mysqli.php`,\n\
    \    and test it again. This time, you should see a series of error messages similar\n\
    \    to Figure [18-11](#332054_4_En_18_Chapter.xhtml#Fig11) when you\n    return\
    \ to `blog_list_mysqli.php`."
  trans: "\n```php\n// 设置 PDO 在遇到问题时抛出异常\n$conn->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);\n\
    try {\n    $conn->beginTransaction();\n    // 运行一系列 SQL 查询\n    // 如果没有遇到问题，则提交事务\n\
    \    $done = $conn->commit();\n    // 如果出现问题，则捕获异常\n} catch (Exception $e) {\n\
    \    // 回滚到原始状态并获取错误信息\n    $conn->rollBack();\n    $trans_error = $e->getMessage();\n\
    }\n```\n\n**警告**：PHP 中的函数和方法名不区分大小写，因此对于 MySQLi 和 PDO，`rollBack()` 和 `rollback()`\
    \ 都是可接受的。然而，`begin_transaction()`（MySQLi）和 `beginTransaction()`（PDO）之间存在细微差别。PDO\
    \ 方法中没有下划线。\n\n## PHP 解决方案 18-6：将表转换为 InnoDB 存储引擎\n\n此 PHP 解决方案展示了如何将表从 MyISAM\
    \ 转换为 InnoDB。如果你计划将表上传到远程服务器，该服务器也必须支持 InnoDB（参见 PHP 解决方案 18-1）。\n\n1. 在 phpMyAdmin\
    \ 中选择 `phpsols` 数据库，然后选择 `article2cat` 表。\n\n2. 点击屏幕右上角的 **操作** 选项卡。\n\n3. 在 **表选项**\
    \ 部分，**存储引擎** 字段显示了表当前使用的引擎。如果显示为 **MyISAM**，从下拉菜单中选择 **InnoDB**，如图 18-10 所示。\n\
    \n   ![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig10_HTML.jpg](img/332054_4_En_18_Fig10_HTML.jpg)\n\
    \n   **图 18-10.** 在 phpMyAdmin 中更改表的存储引擎非常容易\n\n4. 点击 `Go`。更改存储引擎就这么简单！\n\n**注意**：每个表都需要单独转换。你无法在一次操作中更改数据库中所有表的引擎。\n\
    \n## PHP 解决方案 18-7：将更新序列封装在事务中（MySQLi）\n\n此 PHP 解决方案改进了 `blog_update_mysqli.php`\
    \ 中的脚本，将更新 `blog` 和 `article2cat` 表的 SQL 查询序列封装在一个事务中，如果序列的任何部分失败，则将数据库回滚到其原始状态。\n\
    \n1. 如有必要，按照上一个 PHP 解决方案中所述，将 `blog` 和 `article2cat` 表的存储引擎转换为 InnoDB。\n\n2. 继续使用\
    \ PHP 解决方案 18-5 中的 `blog_update_mysqli.php` 和 `blog_list_mysqli.php` 进行操作。或者，从\
    \ `ch18` 文件夹将 `blog_update_mysqli_06.php` 和 `blog_list_mysqli_04.php` 复制到 `phpsols-4e`\
    \ 站点根目录下的 `admin` 文件夹，并移除文件名中的数字。\n\n3. 在 `blog_update_mysqli.php` 顶部初始化一个空数组，用于存储错误消息：\n\
    \n   ```php\n   $trans_error = [];\n   ```\n\n4. 在运行更新查询序列的条件语句开头，关闭自动提交模式并开始一个事务，如下所示：\n\
    \n   ```php\n   // 如果表单已提交，则更新记录\n   if (isset($_POST ['update'])) {\n       //\
    \ 关闭自动提交\n       $conn->autocommit(false);\n       $conn->begin_transaction();\n\
    \       // 准备更新查询\n   ```\n\n5. 在更新 `blog` 表的查询之后，添加一个条件语句，以便在查询失败时将任何错误消息添加到\
    \ `$trans_error` 数组中。为节省空间，省略了部分现有代码：\n\n   ```php\n   if (!empty($_POST['image_id']))\
    \ {\n       // 省略现有代码\n       $done = $stmt->execute();\n   }\n   } else {\n \
    \      // 省略现有代码\n       $done = $stmt->execute();\n   }\n   }\n   if (!$done)\
    \ {\n       $trans_error[] = $stmt->error;\n   }\n   ```\n\n6. 添加类似的条件语句，以捕获从交叉引用表中删除现有值时可能出现的任何错误消息。\n\
    \n   ```php\n   // 删除交叉引用表中的现有值\n   $sql = 'DELETE FROM article2cat WHERE article_id\
    \ = ?';\n   if ($stmt->prepare($sql)) {\n       $stmt->bind_param('i', $_POST['article_id']);\n\
    \       $done = $stmt->execute();\n       if (!$done) {\n           $trans_error[]\
    \ = $stmt->error;\n       }\n   }\n   ```\n\n7. 捕获向 `article2cat` 表插入更新值时可能出现的错误消息的代码需要略有不同，因为它使用的是\
    \ `query()` 方法而非预处理语句。你需要访问数据库连接对象的 `error` 属性，而不是语句对象的 `error` 属性，如下所示：\n\n \
    \  ```php\n   if ($values) {\n       $sql = 'INSERT INTO article2cat (article_id,\
    \ cat_id)\n               VALUES ' . implode(',', $values);\n       $done = $conn->query($sql);\n\
    \       if (!$done) {\n           $trans_error[] = $conn->error;\n       }\n \
    \  }\n   ```\n\n8. 在查询序列之后，使用条件语句来回滚或提交事务，如下所示（该代码放在点击“更新”按钮时运行脚本的条件语句内）：\n\n\
    \   ```php\n   if ($trans_error) {\n       $conn->rollback();\n       $done =\
    \ false;\n   } else {\n       $conn->commit();\n   }\n   ```\n\n   如果 `$trans_error`\
    \ 包含任何错误消息，则必须将 `$done` 显式设置为 `false`。这是因为任何在事务外部本应成功的查询都会将 `$done` 设置为 `true`。\n\
    \n9. 需要修改重定向页面的条件语句以处理事务。添加以粗体突出显示的新代码：\n\n   ```php\n   // 更新后或未定义 $_GET['article_id']\
    \ 时重定向页面\n   if (($done || $trans_error) || (!$_POST && !isset($_GET['article_id'])))\
    \ {\n       $url = 'http://localhost/phpsols-4e/admin/blog_list_mysqli.php';\n\
    \       if ($done) {\n           $url .= '?updated=true';\n       } elseif ($trans_error)\
    \ {\n           $url .= '?trans_error=' . serialize($trans_error);\n       }\n\
    \       header(\"Location: $url\");\n       exit;\n   }\n   ```\n\n   现在条件被分组在括号内，以确保它们被正确解释。第一对检查\
    \ `$done` 或 `$trans_error` 是否等于 `true`。最后一个条件通过检查 `$_POST` 数组是否为空来使其更具体。这是必要的，因为在点击“更新”按钮后，`!isset($_GET['article_id'])`\
    \ 始终为 `true`。\n\n   如果 `$trans_error` 包含任何错误消息，则它等于 `true`，因此会将查询字符串附加到重定向位置。由于\
    \ `$trans_error` 是一个数组，因此需要先将其传递给 `serialize()` 函数，然后才能将其连接到查询字符串上。这会将数组转换为一个字符串，该字符串可以转换回其原始格式。\n\
    \n10. 最后一个更改位于 `blog_list_mysqli.php` 中表格上方的 PHP 代码块中。添加以粗体显示的代码，以便在更新失败时显示任何错误消息：\n\
    \n    ```php\n    if (isset($_GET['updated'])) {\n        echo '记录已更新';\n    }\
    \ elseif (isset($_GET['trans_error'])) {\n        $trans_error = unserialize($_GET['trans_error']);\n\
    \        echo '由于以下错误，无法更新记录：';\n        echo '';\n        foreach ($trans_error\
    \ as $item) {\n            echo '' . safe($item) . '';\n        }\n        echo\
    \ '';\n    }\n    ```\n\n    `unserialize()` 函数反转了 `serialize()` 的效果，将错误消息转换回一个数组，然后在\
    \ `foreach` 循环中显示。\n\n11. 保存 `blog_update_mysqli.php` 和 `blog_list_mysqli.php`，并更新一条现有记录。脚本应该像以前一样工作。\n\
    \n12. 在 `blog_update_mysqli.php` 的 SQL 中故意引入一些错误，并再次测试。这次，当你返回 `blog_list_mysqli.php`\
    \ 时，应该会看到类似于图 18-11 的一系列错误消息。\n"
- fmt: "# PHP Solution 18-8: Wrapping the update sequence in a transaction (PDO)\n\
    \n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig11_HTML.jpg](images/332054_4_En_18_Chapter/332054_4_En_18_Fig11_HTML.jpg)\n\
    \n**Figure 18-11.** The update fails because of errors in the column names\n\n\
    13. Click the `EDIT` link for the record you just tried to update and verify that\
    \ none of the values has changed. You can check your code against `blog_update_mysqli_07.php`\
    \ and `blog_list_mysqli_05.php` in the `ch18` folder.\n\nThis PHP solution improves\
    \ the script in `blog_update_pdo.php` by wrapping the sequence of SQL queries\
    \ that update the `blog` and `article2cat` tables in a transaction, rolling back\
    \ the database to its original state if any part of the sequence fails.\n\n1.\
    \ If necessary, convert the storage engine for the `blog` and `article2cat` tables\
    \ to InnoDB as described in PHP Solution 18-6.\n\n2. Continue working with `blog_update_pdo.php`\
    \ and `blog_list_pdo.php` from PHP Solution 18-5. Alternatively, copy `blog_update_pdo_06.php`\
    \ and `blog_list_pdo_04.php` from the `ch18` folder to the `admin` folder in the\
    \ `phpsols-4e` site root, and remove the numbers from the filenames.\n\n3. Initialize\
    \ a variable at the top of the page to keep track of the transaction, and set\
    \ its value to `false`:\n\n```php\n$trans_error = false;\n```\n\n4. Inside the\
    \ conditional statement that runs the sequence of queries to update the `blog`\
    \ and `article2cat` tables, set PDO to throw an exception when it encounters a\
    \ problem like this:\n\n```php\nif (isset($_POST['update'])) {\n    $conn->setAttribute(PDO::ATTR_ERRMODE,\
    \ PDO::ERRMODE_EXCEPTION);\n    // prepare update query\n    $sql = 'UPDATE blog\
    \ SET image_id = ?, title = ?, article = ?\n    WHERE article_id = ?';\n```\n\n\
    5. Wrap all the code that runs the update queries in a `try`/`catch` block, and\
    \ begin a transaction at the beginning of the `try` block like this:\n\n```php\n\
    $conn->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);\ntry {\n    $conn->beginTransaction();\n\
    \    // prepare update query\n    // other database queries omitted\n} catch (Exception\
    \ $e) {\n    $conn->rollBack();\n    $trans_error = $e->getMessage();\n}\n```\n\
    \n6. In the existing code, the return value of executing each query is set to\
    \ `$done`. This is no longer necessary because we’re using a transaction. We’ll\
    \ use `$done` as the return value of committing the transaction successfully.\
    \ Locate the following lines (they’re around lines 53, 57, and 69):\n\n```php\n\
    $done = $stmt->execute();\n$done = $stmt->execute([$_POST['article_id']]);\n$done\
    \ = $conn->exec($sql);\n```\n\nChange them to this:\n\n```php\n$stmt->execute();\n\
    $stmt->execute([$_POST['article_id']]);\n$conn->exec($sql);\n```\n\n7. Immediately\
    \ before the `catch` block, add the code in bold to commit the transaction:\n\n\
    ```php\n$done = $conn->commit();\n} catch (Exception $e) {\n    $conn->rollBack();\n\
    \    $trans_error = $e->getMessage();\n}\n```\n\n8. The conditional statement\
    \ that redirects the page needs to be amended to handle the transaction. Add the\
    \ new code highlighted in bold:\n\n```php\n// redirect page after updating or\
    \ if $_GET['article_id'] not defined\nif (($done || $trans_error) || (!$_POST\
    \ && !isset($_GET['article_id']))) {\n    $url = 'http://localhost/phpsols-4e/admin/blog_list_pdo.php';\n\
    \    if ($done) {\n        $url .= '?updated=true';\n    } elseif ($trans_error)\
    \ {\n        $url .= \"?trans_error=$trans_error\";\n    }\n    header(\"Location:\
    \ $url\");\n    exit;\n}\n```\n\nThe conditions are now grouped inside parentheses\
    \ to make sure they’re interpreted correctly. The first pair checks whether `$done`\
    \ or `$trans_error` equates to `true`. The final condition is made more specific\
    \ by checking that the `$_POST` array is empty. This is necessary because `!isset($_GET['article_id'])`\
    \ is always `true` after the Update button has been clicked."
