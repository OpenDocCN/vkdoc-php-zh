- fmt: '### MySQL naming rules


    The basic MySQL naming rules for databases, tables, and columns are as follows:


    - Names can be up to 64 characters long.

    - Legal characters are numbers, letters, the underscore, and `$`.

    - Names can begin with a number but cannot consist exclusively of numbers.


    Some hosting companies seem blissfully ignorant of these rules and assign clients
    databases that contain one or more hyphens (an illegal character) in their name.
    If a database, table, or column name contains spaces or illegal characters, you
    must always surround it by backticks (`` ` ``) in SQL queries. Note that this
    is not a single quote (`''`), but rather is a separate character. On my Windows
    keyboard, it’s directly above the Tab key. On my Mac keyboard, it’s next to the
    left Shift key on the same key as the tilde (`~`).


    When choosing names, you might accidentally choose one of MySQL’s many reserved
    words (http://dev.mysql.com/doc/refman/5.6/en/reserved-words.html), such as `date`
    or `time`. One technique to avoid this is to use compound words, such as `arrival_date`,
    `arrival_time`, and so on. Alternatively, surround all names with backticks. phpMyAdmin
    does this automatically, but you need to do this manually when writing your own
    SQL in a PHP script.


    Note


    Because so many people have used `date`, `text`, `time`, and `timestamp` as column
    names, MySQL permits their use without backticks. However, you should avoid using
    them. It’s bad practice and is unlikely to work if you migrate your data to a
    different database system.


    #### Case sensitivity of names


    Windows and Mac OS X treat MySQL names as case-insensitive. However, Linux and
    Unix servers respect case sensitivity. To avoid problems when transferring databases
    and PHP code from your local computer to a remote server, I strongly recommend
    that you use lowercase exclusively in database, table, and column names. When
    building names from more than one word, join them with an underscore.


    ### Using phpMyAdmin to create a new database


    Creating a new database in phpMyAdmin is easy.


    Launch phpMyAdmin and select the `Databases` tab at the top of the main window.
    Type the name of the new database (`phpsols`) into the field labeled `Create new
    database`. Leave the `Collation` drop-down menu at its default setting and click
    `Create`, as shown in the following screenshot:


    ![A978-1-4842-0635-5_10_Figa_HTML.jpg](A978-1-4842-0635-5_10_Figa_HTML.jpg)


    Note


    Collation determines the sort order of records according to the rules of the language
    being used. Unless you are using a language other than English, Swedish, or Finnish,
    you never need to change its value.


    You should see confirmation that the database has been created.


    ![A978-1-4842-0635-5_10_Figb_HTML.jpg](A978-1-4842-0635-5_10_Figb_HTML.jpg)


    Before creating tables in a new database, it’s a good idea to create user accounts
    for it. Leave phpMyAdmin open, as you’ll continue using it in the next section.


    ### Creating database-specific user accounts


    A new installation of MySQL normally has only one registered user—the superuser
    account called "root," which has complete control over everything. (XAMPP also
    creates a user account called "pma," which phpMyAdmin uses for advanced features
    not covered by this book.) The root user should never be used for anything other
    than top-level administration, such as the creation and removal of databases,
    creating user accounts, and exporting and importing data. Each individual database
    should have at least one—preferably two—dedicated user accounts with limited privileges.


    When you put a database online, you should grant users the fewest privileges they
    need, and no more. There are four important privileges—all named after the equivalent
    SQL commands:


    - `SELECT`: Retrieves records from database tables

    - `INSERT`: Inserts records into a database

    - `UPDATE`: Changes existing records

    - `DELETE`: Deletes records but not tables or databases (the command for that
    is `DROP`)


    Most of the time, visitors only need to retrieve information, so the `psread`
    user account will have just the `SELECT` privilege and will be read-only. However,
    for user registration or site administration, you need all four privileges. These
    will be made available to the `pswrite` account.


    #### Granting user privileges


    In phpMyAdmin, click the `Users` tab at the top of the screen.


    Tip


    If you can’t see the `Users` tab, return to the main screen by clicking the little
    house icon at the top left of the screen. The `Users` tab should now be visible.


    On the `Users overview` page, click the `Add a new User` link halfway down the
    page. On the page that opens, enter `pswrite` (or the name of the user account
    that you want to create) in the `User name` field. Select `Local` from the `Host`
    drop-down menu. This automatically enters `localhost` in the field alongside.
    Selecting this option allows the `pswrite` user to connect to MySQL only from
    the same computer. Then enter a password in the `Password` field, and type it
    again for confirmation in the `Re-type` field.


    Note


    In the example files for this book, I’ve used `0Ch@Nom1$u` as the password. MySQL
    passwords are case-sensitive.


    Beneath the `Login Information` table are sections labeled `Database for user`
    and `Global privileges`. Ignore both of them. Scroll down to the bottom of the
    page and click the `Go` button. This returns you to the `Users overview` page
    with confirmation that the user has been created.


    In the `Users overview` table, click the `Edit Privileges` link in the row that
    lists the new user, as shown in the following screenshot:


    ![A978-1-4842-0635-5_10_Figc_HTML.jpg](A978-1-4842-0635-5_10_Figc_HTML.jpg)


    This opens a page with the `Global privileges` table again. If you see four buttons
    at the top of the page, click the `Database` button, as shown in the following
    screenshot.


    ![A978-1-4842-0635-5_10_Figd_HTML.jpg](A978-1-4842-0635-5_10_Figd_HTML.jpg)


    Activate the drop-down menu labeled `Add privileges on the following database`
    and select `phpsols`.


    - This displays a section labeled `Database-specific privileges`. In older versions
    of phpMyAdmin that don’t have the buttons at the top of the page, scroll down
    to the `Database-specific privileges` section below `Global privileges`.


    ![A978-1-4842-0635-5_10_Fige_HTML.jpg](A978-1-4842-0635-5_10_Fige_HTML.jpg)


    Note


    MySQL has three default databases: `information_schema`, a read-only, virtual
    database that contains details of all other databases on the same server; `mysql`,
    which contains details of all user accounts and privileges; and `test`, which
    is empty. You should never edit the `mysql` database directly unless you’re sure
    what you’re doing.


    - If you hover your mouse pointer over each option, phpMyAdmin displays a tooltip
    describing what the option is for, as shown. After selecting the four privileges,
    click the top `Go` button.


    The next screen allows you to set the privileges for this user on just the `phpsols`
    database. You want `pswrite` to have all four privileges listed earlier, so click
    the check boxes next to `SELECT`, `INSERT`, `UPDATE`, and `DELETE`.


    ![A978-1-4842-0635-5_10_Figf_HTML.jpg](A978-1-4842-0635-5_10_Figf_HTML.jpg)


    Caution


    Many screens in phpMyAdmin have more than one `Go` button. Always click the button
    at the foot of or alongside the section with the options you want to set.


    phpMyAdmin presents you with confirmation that the privileges have been updated
    for the `pswrite` user account; the page displays the `Database-specific privileges`
    table again, in case you need to change anything. Click the `Users` tab at the
    top of the page to return to the `Users overview`.


    Click `Add a new User` and repeat steps 3 through 8 to create a second user account
    called `psread`. This user will have much more restricted privileges, so when
    you get to step 7, check only the `SELECT` option. The password used for `psread`
    in the example files is `K1y0mi$u`.'
  raw: '### MySQL naming rules


    The basic MySQL naming rules for databases, tables, and columns are as follows:


    *   Names can be up to 64 characters long.

    *   Legal characters are numbers, letters, the underscore, and $.

    *   Names can begin with a number but cannot consist exclusively of numbers.


    Some hosting companies seem blissfully ignorant of these rules and assign clients
    databases that contain one or more hyphens (an illegal character) in their name.
    If a database, table, or column name contains spaces or illegal characters, you
    must always surround it by backticks (`` ` ``) in SQL queries. Note that this
    is not a single quote (`''`), but rather is a separate character. On my Windows
    keyboard, it’s directly above the Tab key. On my Mac keyboard, it’s next to the
    left Shift key on the same key as the tilde (`∼`).


    When choosing names, you might accidentally choose one of MySQL’s many reserved
    words ( [`http://dev.mysql.com/doc/refman/5.6/en/reserved-words.html`](http://dev.mysql.com/doc/refman/5.6/en/reserved-words.html)
    ), such as `date` or `time`. One technique to avoid this is to use compound words,
    such as `arrival_date`, `arrival_time`, and so on. Alternatively, surround all
    names with backticks. phpMyAdmin does this automatically, but you need to do this
    manually when writing your own SQL in a PHP script.


    Note


    Because so many people have used `date`, `text`, `time`, and `timestamp` as column
    names, MySQL permits their use without backticks. However, you should avoid using
    them. It’s bad practice and is unlikely to work if you migrate your data to a
    different database system.


    #### Case sensitivity of names


    Windows and Mac OS X treat MySQL names as case-insensitive. However, Linux and
    Unix servers respect case sensitivity. To avoid problems when transferring databases
    and PHP code from your local computer to a remote server, I strongly recommend
    that you use lowercase exclusively in database, table, and column names. When
    building names from more than one word, join them with an underscore.


    ### Using phpMyAdmin to create a new database


    Creating a new database in phpMyAdmin is easy.


    Launch phpMyAdmin and select the Databases tab at the top of the main window.
      Type the name of the new database (phpsols) into the field labeled Create new
    database. Leave the Collation drop-down menu at its default setting and click
    Create, as shown in the following screenshot:  


    ![A978-1-4842-0635-5_10_Figa_HTML.jpg](A978-1-4842-0635-5_10_Figa_HTML.jpg)


    Note


    Collation determines the sort order of records according to the rules of the language
    being used. Unless you are using a language other than English, Swedish, or Finnish,
    you never need to change its value.


    You should see confirmation that the database has been created.  


    ![A978-1-4842-0635-5_10_Figb_HTML.jpg](A978-1-4842-0635-5_10_Figb_HTML.jpg)


    Before creating tables in a new database, it’s a good idea to create user accounts
    for it. Leave phpMyAdmin open, as you’ll continue using it in the next section.


    ### Creating database-specific user accounts


    A new installation of MySQL normally has only one registered user—the superuser
    account called “root,” which has complete control over everything. (XAMPP also
    creates a user account called “pma,” which phpMyAdmin uses for advanced features
    not covered by this book.) The root user should never be used for anything other
    than top-level administration, such as the creation and removal of databases,
    creating user accounts, and exporting and importing data. Each individual database
    should have at least one—preferably two—dedicated user accounts with limited privileges.


    When you put a database online, you should grant users the fewest privileges they
    need, and no more. There are four important privileges—all named after the equivalent
    SQL commands:


    *   `SELECT`: Retrieves records from database tables

    *   `INSERT`: Inserts records into a database

    *   `UPDATE`: Changes existing records

    *   `DELETE`: Deletes records but not tables or databases (the command for that
    is `DROP`)


    Most of the time, visitors only need to retrieve information, so the `psread`
    user account will have just the `SELECT` privilege and will be read-only. However,
    for user registration or site administration, you need all four privileges. These
    will be made available to the `pswrite` account.


    #### Granting user privileges


    In phpMyAdmin, click the Users tab at the top of the screen.   Tip


    If you can’t see the Users tab, return to the main screen by clicking the little
    house icon at the top left of the screen. The Users tab should now be visible.


    On the Users overview page, click the Add a new User link halfway down the page.
      On the page that opens, enter pswrite (or the name of the user account that
    you want to create) in the User name field. Select Local from the Host drop-down
    menu. This automatically enters localhost in the field alongside. Selecting this
    option allows the `pswrite` user to connect to MySQL only from the same computer.
    Then enter a password in the Password field, and type it again for confirmation
    in the Re-type field.   Note


    In the example files for this book, I’ve used `0Ch@Nom1$u` as the password. MySQL
    passwords are case-sensitive.


    Beneath the Login Information table are sections labeled Database for user and
    Global privileges. Ignore both of them. Scroll down to the bottom of the page
    and click the Go button. This returns you to the Users overview page with confirmation
    that the user has been created.   In the `Users overview` table, click the `Edit
    Privileges` link in the row that lists the new user, as shown in the following
    screenshot:  


    ![A978-1-4842-0635-5_10_Figc_HTML.jpg](A978-1-4842-0635-5_10_Figc_HTML.jpg)


    This opens a page with the Global privileges table again. If you see four buttons
    at the top of the page, click the Database button, as shown in the following screenshot.
     


    ![A978-1-4842-0635-5_10_Figd_HTML.jpg](A978-1-4842-0635-5_10_Figd_HTML.jpg)


    Activate the drop-down menu labeled Add privileges on the following database and
    select phpsols.  


    *   This displays a section labeled Database-specific privileges. In older versions
    of phpMyAdmin that don’t have the buttons at the top of the page, scroll down
    to the Database-specific privileges section below Global privileges.


    ![A978-1-4842-0635-5_10_Fige_HTML.jpg](A978-1-4842-0635-5_10_Fige_HTML.jpg)


    Note


    MySQL has three default databases: `information_schema`, a read-only, virtual
    database that contains details of all other databases on the same server; `mysql`,
    which contains details of all user accounts and privileges; and `test`, which
    is empty. You should never edit the `mysql` database directly unless you’re sure
    what you’re doing.


    *   If you hover your mouse pointer over each option, phpMyAdmin displays a tooltip
    describing what the option is for, as shown. After selecting the four privileges,
    click the top `Go` button.


    The next screen allows you to set the privileges for this user on just the `phpsols`
    database. You want `pswrite` to have all four privileges listed earlier, so click
    the check boxes next to `SELECT, INSERT, UPDATE`, and `DELETE`.  


    ![A978-1-4842-0635-5_10_Figf_HTML.jpg](A978-1-4842-0635-5_10_Figf_HTML.jpg)


    Caution


    Many screens in phpMyAdmin have more than one Go button. Always click the button
    at the foot of or alongside the section with the options you want to set.


    phpMyAdmin presents you with confirmation that the privileges have been updated
    for the `pswrite` user account; the page displays the Database-specific privileges
    table again, in case you need to change anything. Click the Users tab at the top
    of the page to return to the Users overview.   Click Add a new User and repeat
    steps 3 through 8 to create a second user account called `psread`. This user will
    have much more restricted privileges, so when you get to step 7, check only the
    SELECT option. The password used for `psread` in the example files is `K1y0mi$u`.'
  trans: '好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，将英文文本翻译成中文。


    ---



    ### MySQL 命名规则


    MySQL 中数据库、表和字段的基本命名规则如下：


    - 名称长度最多可达 64 个字符。

    - 合法字符包括数字、字母、下划线和 `$`。

    - 名称可以以数字开头，但不能完全由数字组成。


    一些托管公司似乎对这些规则浑然不知，会为客户分配名称中包含一个或多个连字符（非法字符）的数据库。如果数据库、表或字段名称包含空格或非法字符，则必须在 SQL
    查询中使用反引号（`` ` ``）将其括起来。请注意，这不是单引号 (`''`)，而是一个单独的字符。在我的 Windows 键盘上，它位于 Tab 键的正上方。在我的
    Mac 键盘上，它位于左 Shift 键旁边，与波浪号 (`~`) 在同一个键上。


    在选择名称时，你可能会不小心用到 MySQL 的众多保留字 (http://dev.mysql.com/doc/refman/5.6/en/reserved-words.html)
    之一，例如 `date` 或 `time`。避免这种情况的一种方法是使用复合词，例如 `arrival_date`、`arrival_time` 等。另一种方法是用反引号将所有名称括起来。phpMyAdmin
    会自动执行此操作，但在 PHP 脚本中编写自己的 SQL 时，你需要手动执行此操作。


    注意


    因为很多人都使用过 `date`、`text`、`time` 和 `timestamp` 作为字段名称，所以 MySQL 允许不使用反引号使用它们。但是，你应该避免使用它们。这是一种不好的做法，而且如果要将数据迁移到其他数据库系统，很可能无法正常工作。


    #### 名称的大小写敏感性


    Windows 和 Mac OS X 将 MySQL 名称视为不区分大小写。但是，Linux 和 Unix 服务器会区分大小写。为了避免在将数据库和 PHP
    代码从本地计算机传输到远程服务器时出现问题，我强烈建议您在所有数据库、表和字段名称中***只使用小写字母***。当使用多个单词构建名称时，用下划线连接它们。


    ### 使用 phpMyAdmin 创建新数据库


    在 phpMyAdmin 中创建新数据库很容易。


    启动 phpMyAdmin，然后选择主窗口顶部的 `Databases` 选项卡。在标记为 `Create new database` 的字段中键入新数据库的名称
    (`phpsols`)。将 `Collation` 下拉菜单保留为默认设置，然后单击 `Create`，如下面的屏幕截图所示：


    ![A978-1-4842-0635-5_10_Figa_HTML.jpg](img/A978-1-4842-0635-5_10_Figa_HTML.jpg)


    注意


    排序规则根据所用语言的规则确定记录的排序顺序。除非您使用的语言不是英语、瑞典语或芬兰语，否则永远不需要更改其值。


    您应该会看到数据库已创建的确认信息。


    ![A978-1-4842-0635-5_10_Figb_HTML.jpg](img/A978-1-4842-0635-5_10_Figb_HTML.jpg)


    在新数据库中创建表之前，最好先为其创建用户帐户。保持 phpMyAdmin 打开，因为您将在下一节中继续使用它。


    ### 创建特定于数据库的用户帐户


    MySQL 的新安装通常只有一个注册用户——名为“root”的超级用户帐户，它拥有对一切的完全控制权。（XAMPP 还会创建一个名为“pma”的用户帐户，phpMyAdmin
    使用它来实现本书未涵盖的高级功能。）root 用户只能用于顶级管理，例如创建和删除数据库、创建用户帐户以及导出和导入数据。每个单独的数据库都应该有至少一个（最好是两个）具有有限权限的专用用户帐户。


    当您将数据库上线时，应授予用户所需的最少权限，且不要更多。有四个重要的权限——全部以等效的 SQL 命令命名：


    - `SELECT`：从数据库表中检索记录

    - `INSERT`：向数据库中插入记录

    - `UPDATE`：更改现有记录

    - `DELETE`：删除记录，但不删除表或数据库（用于此的命令是 `DROP`）


    大多数情况下，访问者只需要检索信息，因此 `psread` 用户帐户将仅具有 `SELECT` 权限，并且是只读的。但是，对于用户注册或站点管理，您需要所有四个权限。这些权限将提供给
    `pswrite` 帐户。


    #### 授予用户权限


    在 phpMyAdmin 中，点击屏幕顶部的 `Users` 选项卡。


    提示


    如果您看不到 `Users` 选项卡，请点击屏幕左上角的小房子图标返回主屏幕。现在应该可以看到 `Users` 选项卡。


    在 `Users overview` 页面上，点击页面中间位置的 `Add a new User` 链接。在打开的页面上，在 `User name` 字段中输入
    `pswrite`（或您要创建的用户帐户的名称）。从 `Host` 下拉菜单中选择 `Local`。这会在旁边的字段中自动输入 `localhost`。选择此选项允许
    `pswrite` 用户仅从同一台计算机连接到 MySQL。然后在 `Password` 字段中输入密码，并在 `Re-type` 字段中再次输入以进行确认。


    注意


    在本书的示例文件中，我使用了 `0Ch@Nom1$u` 作为密码。MySQL 密码是区分大小写的。


    在 `Login Information` 表格下方，是有 `Database for user` 和 `Global privileges` 标签的部分。忽略它们两者。向下滚动到页面底部，然后单击
    `Go` 按钮。这将带您返回 `Users overview` 页面，并确认用户已创建。


    在 `Users overview` 表格中，点击列出新用户的行中的 `Edit Privileges` 链接，如下面的屏幕截图所示：


    ![A978-1-4842-0635-5_10_Figc_HTML.jpg](img/A978-1-4842-0635-5_10_Figc_HTML.jpg)


    这将打开一个页面，其中再次显示 `Global privileges` 表格。如果您在页面顶部看到四个按钮，请单击 `Database` 按钮，如下面的屏幕截图所示。


    ![A978-1-4842-0635-5_10_Figd_HTML.jpg](img/A978-1-4842-0635-5_10_Figd_HTML.jpg)


    激活标有 `Add privileges on the following database` 的下拉菜单，然后选择 `phpsols`。


    - 这将显示一个标记为 `Database-specific privileges` 的部分。在没有页面顶部按钮的较旧版本的 phpMyAdmin 中，向下滚动到
    `Global privileges` 下方的 `Database-specific privileges` 部分。


    ![A978-1-4842-0635-5_10_Fige_HTML.jpg](img/A978-1-4842-0635-5_10_Fige_HTML.jpg)


    注意


    MySQL 有三个默认数据库：`information_schema`，一个只读的虚拟数据库，包含同一服务器上所有其他数据库的详细信息；`mysql`，包含所有用户帐户和权限的详细信息；以及
    `test`，它是空的。除非您确定自己在做什么，否则永远不应直接编辑 `mysql` 数据库。


    - 如果您将鼠标指针悬停在每个选项上，phpMyAdmin 会显示一个工具提示，描述该选项的用途，如图所示。在选择了四个权限后，点击顶部的 `Go` 按钮。


    下一个屏幕允许您仅为此用户设置 `phpsols` 数据库的权限。您希望 `pswrite` 拥有前面列出的所有四个权限，因此选中 `SELECT`、`INSERT`、`UPDATE`
    和 `DELETE` 旁边的复选框。


    ![A978-1-4842-0635-5_10_Figf_HTML.jpg](img/A978-1-4842-0635-5_10_Figf_HTML.jpg)


    警告


    phpMyAdmin 中的许多屏幕都有多个 `Go` 按钮。始终点击您要设置的选项所在部分底部或旁边的按钮。


    phpMyAdmin 会向您显示权限已为 `pswrite` 用户帐户更新的确认信息；页面再次显示 `Database-specific privileges`
    表，以防您需要更改任何内容。点击页面顶部的 `Users` 选项卡返回 `Users overview`。


    点击 `Add a new User` 并重复步骤 3 到 8，以创建第二个名为 `psread` 的用户帐户。此用户将拥有更严格的权限，因此当您执行到步骤
    7 时，只选中 `SELECT` 选项。示例文件中为 `psread` 使用的密码是 `K1y0mi$u`。


