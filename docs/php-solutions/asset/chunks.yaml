- fmt: '# PHP Solution 17-2: Authenticating a user’s credentials with a database


    This PHP solution shows how to authenticate a user’s stored credentials by querying
    the database to find the username’s encrypted password and then passing it as
    an argument to `password_verify()` together with the user-submitted password.
    If `password_verify()` returns `true`, the user is redirected to a restricted
    page.


    Copy `login_db.php`, `menu_db.php`, and `secretpage_db.php` from the `ch17` folder
    to the `authenticate` folder. Also copy `logout_db.php` and `session_timeout_db.php`
    from the `ch17` folder to the `includes` folder.


    This sets up the same basic test platform as was used in [Chapter 9](#A978-1-4842-0635-5_9_Chapter.html).
    The only difference is that the links have been changed to redirect to the `authenticate`
    folder.


    In `login_db.php` add the following code in a PHP block above the `DOCTYPE` declaration:


    ```

    $error = '''';


    if (isset($_POST[''login''])) {


    session_start();


    $username = trim($_POST[''username'']);


    $password = trim($_POST[''pwd'']);


    // location to redirect on success


    $redirect = ''http://localhost/phpsols/authenticate/menu_db.php'';


    require_once ''../includes/authenticate_mysqli.php'';


    }

    ```


    This follows a similar pattern to the code in the login form in [Chapter 9](#A978-1-4842-0635-5_9_Chapter.html).
    It begins by initializing `$error` as an empty string. The conditional statement
    initiates a session if the form has been submitted. Whitespace is trimmed from
    the user input fields, and the location of the page the user will be redirected
    to on success is stored in a variable. Finally, the authentication script, which
    you’ll build next, is included.


    If you’re using PDO, use `authenticate_pdo.php` as the processing script.


    Create a new file called `authenticate_mysqli.php` or `authenticate_pdo.php` and
    save it in the `includes` folder. The file will contain only PHP script, so strip
    out any HTML markup. Include the database connection file, create a connection
    to the database with the read-only account, and use a prepared statement to fetch
    the user’s details.


    For MySQLi use the following code:


    ```

    <?php


    require_once ''connection.php'';


    $conn = dbConnect(''read'');


    // get the username''s encrypted password from the database


    $sql = ''SELECT pwd FROM users WHERE username = ?'';


    // initialize and prepare statement


    $stmt = $conn->stmt_init();


    $stmt->prepare($sql);


    // bind the input parameter


    $stmt->bind_param(''s'', $username);


    $stmt->execute();


    // bind the result, using a new variable for the password


    $stmt->bind_result($storedPwd);


    $stmt->fetch();

    ```


    This is such a straightforward `SELECT` query that I haven’t used a conditional
    statement when passing it to the MySQLi `prepare()` method. The username is a
    string, so the first argument to `bind_param()` is `''s''`. If a match is found,
    the result is bound to `$storedPwd`. You need to use a new variable for the stored
    password to avoid overwriting the password submitted by the user.


    After the statement has been executed, the `fetch()` method gets the result.


    For PDO, use the following code instead:


    ```

    <?php


    require_once ''connection.php'';


    $conn = dbConnect(''read'', ''pdo'');


    // get the username''s encrypted password from the database


    $sql = ''SELECT pwd FROM users WHERE username = ?'';


    // prepare statement


    $stmt = $conn->prepare($sql);


    // pass the input parameter as a single-element array


    $stmt->execute([$username]);


    $storedPwd = $stmt->fetchColumn();

    ```


    This code does the same as the MySQLi version does, but uses PDO syntax. The username
    is passed to the `execute()` method as a single-element array. Because there’s
    only one column in the result, `fetchColumn()` returns the value and assigns it
    to `$storedPwd`.


    Once you have retrieved the username’s password, all you need to do is to pass
    the submitted and stored versions to `password_verify()`. If `password_verify()`
    returns `true`, create the session variables to indicate a successful login and
    the time the session began, regenerate the session ID, and redirect to the restricted
    page. Otherwise, store an error message in `$error`.


    Insert the following code after the code you entered in the preceding step. It’s
    the same for both MySQLi and PDO.


    ```

    // check the submitted password against the stored version


    if (password_verify($password, $storedPwd)) {


    $_SESSION[''authenticated''] = ''Jethro Tull'';


    // get the time the session started


    $_SESSION[''start''] = time();


    session_regenerate_id();


    header("Location: $redirect");


    exit;


    } else {


    // if not verified, prepare error message


    $error = ''Invalid username or password'';


    }

    ```


    As in [Chapter 9](#A978-1-4842-0635-5_9_Chapter.html), the value of `$_SESSION[''authenticated'']`
    is of no real importance.


    Save `authenticate_mysqli.php` or `authenticate_pdo.php`, and test `login_db.php`
    by logging in with the username and password that you registered at the end of
    PHP Solution 17-1. The login process should work in exactly the same way as in
    [Chapter 9](#A978-1-4842-0635-5_9_Chapter.html). The difference is that all the
    details are stored more securely in a database.


    You can check your code, if necessary, against `login_mysqli.php` and `authenticate_mysqli.php`,
    or `login_pdo.php` and `authenticate_pdo.php`, all found in the `ch17` folder.
    If you encounter problems, the most common mistake is creating too narrow a column
    for the encrypted password in the database. It must be at least 60 characters
    wide, and it’s recommended to make it capable of storing up to 255 characters
    in case future encryption methods generate longer strings.


    Although storing an encrypted password in a database is more secure than using
    a text file, the password is sent from the user’s browser to the server in plain,
    unencrypted text. This is adequate for most websites, but if you need a higher
    level of security, the login and access to subsequent pages should be made through
    a Secure Sockets Layer (SSL) connection.


    ## Using Two-Way Encryption


    The main differences in setting up user registration and authentication for two-way
    encryption are that the password needs to be stored in the database as a binary
    object using the `BLOB` data type (see “Storing binary data” in [Chapter 10](#A978-1-4842-0635-5_10_Chapter.html)
    for more information), and that the password verification takes place in the SQL
    query, rather than in the PHP script.


    ### Creating the table to store users’ details


    In phpMyAdmin, create a new table called `users_2way` in the `phpsols` database.
    It needs three columns, with the settings listed in Table [17-2](#A978-1-4842-0635-5_17_Chapter.html#Tab2).


    **Table 17-2. Settings for the `users_2way` table**


    | Name | Type | Length/Values | Attributes | Null | Index | A_I |

    | --- | --- | --- | --- | --- | --- | --- |

    | `user_id` | `INT` | | `UNSIGNED` | Deselected | `PRIMARY` | Selected |

    | `username` | `VARCHAR` | `15` | | Deselected | `UNIQUE` | |

    | `pwd` | `BLOB` | | | Deselected | | |'
