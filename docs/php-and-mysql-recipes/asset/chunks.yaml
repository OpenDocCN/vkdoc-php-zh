    Recipe 2-16\. Debugging Objects


    Problem


    When objects are passed to functions like var_export() or var_dump() they might
    expose database credentials or other configuration options that should be hidden
    from the user of the class/object.


    Solution


    Using the magic methods __set_state() and [__debugInfo](http://php.net/manual/en/language.oop5.magic.php#object.debuginfo)
    ()() makes it possible to change how the objects are handled by the debugging
    functions. The method __set_state() must be declared static and takes a single
    parameter that will be an array with all properties defined on the object and
    it should return the value var_export() should process. This can be any type so
    it is possible to simply return an array with some of the input parameters removed.
    If __set_state() is undefined when an object is passed to var_export() the system
    will generate a fatal error and stop execution.


    The method __debugInfo() was introduced in PHP 5.6 and can be used to overwrite
    the properties dumped by var_dump() . If __debugInfo() is undefined var_dump()
    will dump all private, protected, and public members.


    CHAPTER 2 ■ CLASSES AND OBJECTS


    How it Works


    This can be used to hide content like database credentials in debug output as
    shown in the next example.


    <?php


    // 2_23.php


    class database {


    protected $host;


    protected $user;


    protected $password;


    function __construct($host, $user, $password) {


    $this->host = $host;


    $this->user = $user;


    $this->password = $password;


    }


    }


    $db = new database(''localhost'', ''user'', ''secret'');


    var_dump($db);


    class database2 {


    protected $host;


    protected $user;


    protected $password;


    function __construct($host, $user, $password) {


    $this->host = $host;


    $this->user = $user;


    $this->password = $password;


    }


    function __debugInfo() {


    return array(


    ''host'' => $this->host,


    );


    }


    }


    $db = new database2(''localhost'', ''user'', ''secret'');


    var_dump($db);


    When this script is executed with PHP 5.6 or newer it will produce the following
    output where the first section is from the object with no __debugInfo() method
    and the second section only contains the properties that were elected to export.


    object(database)#1 (3) {


    ["host":protected]=>


    string(9) "localhost"


    ["user":protected]=>


    string(4) "user"


    ["password":protected]=>


    CHAPTER 2 ■ CLASSES AND OBJECTS


    string(9) "secret"


    }


    object(database2)#2 (1) {


    ["host"]=>


    string(9) "localhost"


    }


    Recipe 2-17\. Using Objects without a Class


    Problem


    Converting an associated array to an object makes it possible to access the member
    data as if they were defined in a regular object.


    Solution


    PHP has a built-in class called stdClass . It is used when typecasting arrays
    to objects or it can be used to create an object without defining a class first.


    How it Works


    The stdClass does not have any member variables or methods but it will turn all
    the elements of an associative array into public members when the array is cast
    to an object as shown in this next example:


    <?php


    // 2_24.php


    $a = [


    ''host'' => ''localhost'',


    ''database'' => ''mydb'',


    ''user'' => ''user''


    ];


    $o = (object)$a;


    echo $o->host;


    The stdClass can also be used to create an empty object and manually add public
    member variables to it.


    <?php


    // 2_25.php


    $a = new stdClass();


    $a->host = ''localhost'';


    In this example the default setter will cause a public member variable called
    host to be created on the object.


    CHAPTER 2 ■ CLASSES AND OBJECTS


