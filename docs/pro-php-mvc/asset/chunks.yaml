    \ $where, $limit);\n```\n\nThe `_buildInsert()`, `_buildUpdate()`, and `_buildDelete()`\
    \ methods are relatively simple in comparison. They too construct a SQL query,\
    \ but for different purposes, and utilizing different data.\n\nThe `_buildInsert()`\
    \ method defines the template for a valid `INSERT` query, and then goes about\
    \ splitting the passed `$data` into two arrays: for `$fields` and `$values`. It\
    \ joins those arrays, and finally runs the results through `sprintf`.\n\nThe `_buildUpdate()`\
    \ does pretty much the same, except it combines both the fields and values into\
    \ a single array (as is consistent with MySQL `UPDATE` queries). It also has the\
    \ added task of dealing with `WHERE` clauses, since most updates are done on specific\
    \ sets of database rows. Failure to specify a valid `WHERE` clause, on an `UPDATE`\
    \ query, will lead to all rows in the table being updated with the same data.\n\
    \nIt also takes into account the `LIMIT` clause, so that updates can be limited\
    \ to a finite amount of records that match the `WHERE` clause. It is always good\
    \ to set a limit of table updates, in case your `WHERE` clause is missing, or\
    \ targets more than the amount of rows you were intending for it to target.\n\n\
    The `_buildDelete()` method does everything the `_buildUpdate()` method does,\
    \ and nothing that the `_buildInsert()` method does. This is because there is\
    \ no row data to take into account except for whatever the `WHERE` clauses target.\
    \ It is also recommended that you always use the `LIMIT` clause on row deletions,\
    \ as you might be deleting more rows than you intend to target.\n\nThese four\
    \ methods perform the bulk of the required work, but we can simplify their use\
    \ with the methods shown in Listing 9-11.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 9 ■ Databases\n\n### Listing 9-11. Convenience Methods\n\n```php\n\
    namespace Framework\\Database\n{\n    use Framework\\Base as Base;\n    use Framework\\\
    ArrayMethods as ArrayMethods;\n    use Framework\\Database\\Exception as Exception;\n\
    \n    class Query extends Base\n    {\n        public function save($data)\n \
    \       {\n            $isInsert = sizeof($this->_where) == 0;\n\n           \
    \ if ($isInsert)\n            {\n                $sql = $this->_buildInsert($data);\n\
    \            }\n            else\n            {\n                $sql = $this->_buildUpdate($data);\n\
    \            }\n\n            $result = $this->_connector->execute($sql);\n\n\
    \            if ($result === false)\n            {\n                throw new\
    \ Exception\\Sql();\n            }\n\n            if ($isInsert)\n           \
    \ {\n                return $this->_connector->lastInsertId;\n            }\n\n\
    \            return 0;\n        }\n\n        public function delete()\n      \
    \  {\n            $sql = $this->_buildDelete();\n            $result = $this->_connector->execute($sql);\n\
    \n            if ($result === false)\n            {\n                throw new\
    \ Exception\\Sql();\n            }\n\n            return $this->_connector->affectedRows;\n\
    \        }\n    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## Chapter 9 ■ Databases\n\nThe `save()` method determines what kind of query\
    \ you need by looking at whether you have called the `where()` method on this\
    \ query object. If you have, it assumes it is to specify a row ID (or other row-specific\
    \ criteria), and calls the `_buildUpdate()` method accordingly. If the `INSERT`/`UPDATE`\
    \ query fails to execute, a `Database\\Exception\\Sql` exception is thrown. If\
    \ they do execute correctly, and an `INSERT` query was performed, the last inserted\
    \ ID will be returned. If an `UPDATE` query was performed, `0` is returned (as\
    \ a means of specifying that the operation was successful).\n\n> **Note:** We\
    \ don’t return affected rows or boolean values with the `save()` method—those\
    \ would make this function’s results ambiguous. You can find the affected rows\
    \ of an `UPDATE` query, by calling the `getAffectedRows()` method on the database\
    \ connector.\n\nThe `delete()` method simply calls the `_buildDelete()` method\
    \ and executes its result. If the query could not execute, a `Database\\Exception\\\
    Sql` exception is thrown; otherwise, the number of affected rows are returned.\
    \ The last three public methods we need return all rows matching a query, the\
    \ first row matching a query, and a count of all rows to be returned by a query.\
    \ You can see how this is demonstrated in Listings 9-12 and 9-13."
