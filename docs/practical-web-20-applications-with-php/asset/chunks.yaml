    **Creating the JavaScript Form Validator**


    Now that we have added the necessary PHP code to implement client-side validation,
    we can implement the client-side portion of code. To do this, we will create a
    JavaScript class called UserRegistrationForm to trigger validation of the form
    and to display errors. Then we will attach this class to the existing HTML form.


    This class essentially performs the following steps:


    **1.** Observes the existing HTML form so that when it is submitted, the JavaScript
    validation is triggered.


    **2.** Clears any existing errors that are being displayed (just in case the user
    already submitted the form).


    **3.** Submits the form data to the server for validation using Ajax.


