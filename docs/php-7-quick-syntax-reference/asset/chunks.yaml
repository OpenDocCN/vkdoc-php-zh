    # 嵌入 PHP


    PHP 代码可以通过多种方式嵌入到 Web 文档的任何位置。标准表示法是使用 `<?php` 和 `?>` 来界定代码。这被称为 PHP 代码块，或简称为
    PHP 块。


    ```

    ```


    在 PHP 块内，引擎处于 PHP 模式；在块外，引擎处于 HTML 模式。在 PHP 模式下，所有内容都由 PHP 引擎解析（执行）；而在 HTML 模式下，所有内容都会直接发送到生成的网页中，不进行任何执行。


    切换到 PHP 模式的第二种表示法是第一种的简写形式，即省略了 `php` 部分。虽然这种表示法更简短，但如果需要 PHP 代码具有可移植性，则更推荐使用较长的表示法。这是因为在
    `php.ini` 配置文件中可以禁用对短定界符的支持。¹


    ```

    ```


