  trans: "\n### PHP 方案 9-4：通过会话限制页面访问\n\n本 PHP 方案演示了如何通过检查指示用户凭证已验证的会话变量是否存在，来限制对页面的访问。如果该变量未被设置，`header()`\
    \ 函数会将用户重定向到登录页面。\n\n在 `sessions` 文件夹中创建两个页面，分别命名为 `menu.php` 和 `secretpage.php`。只要它们相互链接，内容无所谓。或者，使用\
    \ `ch09` 文件夹中的 `menu_01.php` 和 `secretpage_01.php`。通过在 `DOCTYPE` 声明上方插入以下代码来保护每个页面的访问：\n\
    \n```\n<?php\nsession_start();\n// 如果会话变量未设置，重定向到登录页面\nif (!isset($_SESSION['authenticated']))\
    \ {\n    header('Location: http://localhost/phpsols/sessions/login.php ');\n \
    \   exit;\n}\n?>\n```\n\n- 启动会话后，脚本检查 `$_SESSION['authenticated']` 是否已设置。如果未设置，它会将用户重定向到\
    \ `login.php` 并退出。就是这么简单！脚本无需知道 `$_SESSION['authenticated']` 的值，尽管你可以通过将第 4 行修改如下来加倍确认：\n\
    \n```\nif (!isset($_SESSION['authenticated']) || $_SESSION['authenticated']\n\
    != 'Jethro Tull' ) {\n```\n\n- 你可以对照 `ch09` 文件夹中的 `menu_02.php` 和 `secretpage_02.php`\
    \ 检查代码。\n\n保存 `menu.php` 和 `secretpage.php`，然后尝试在浏览器中加载它们中的任何一个。你应该总是被重定向到 `login.php`。在\
    \ `login.php` 中输入 `users.csv` 中的有效用户名和密码（值区分大小写），然后点击 `Log in`。你应该会立即被重定向到 `menu.php`，并且指向\
    \ `secretpage.php` 的链接也应该可以正常工作。\n\n- 如果 `$_SESSION['authenticated']` 的值不正确，现在也会拒绝访客访问。\n\
    \n**提示**\n\n如果在 Mac OS X 上创建自己的 `users.csv` 版本，登录可能会失败。如果发生这种情况，按照第 7 章中\"在 Mac\
    \ OS 上创建的 CSV 文件\"所述，在 `authenticate.php` 顶部添加以下行：\n\n`ini_set('auto_detect_line_endings',\
    \ true);`\n\n要保护网站上的任何页面，你只需将上述步骤 2 中的八行代码添加到 `DOCTYPE` 声明上方即可。\n\n### PHP 方案\
    \ 9-5：创建可重用的退出按钮\n\n除了登录网站之外，用户还应该能够退出登录。本 PHP 方案演示了如何创建可插入到任何页面的退出按钮。\n\n继续使用上一节中的文件进行操作。\n\
    \n在 `menu.php` 的 `<body>` 中插入以下表单，创建一个退出按钮：\n\n```\n<form method=\"post\" action=\"\
    \">\n<input name=\"logout\" type=\"submit\" value=\"Log out\">\n</form>\n```\n\
    \n- 页面应类似于以下截图：\n\n![A978-1-4842-0635-5_9_Figg_HTML.jpg](img/A978-1-4842-0635-5_9_Figg_HTML.jpg)\n\
    \n现在需要添加点击退出按钮时运行的脚本。将 `DOCTYPE` 声明上方的代码修改如下（代码位于 `menu_02.php` 中）：\n\n```\n<?php\n\
    session_start();\n// 如果会话变量未设置，重定向到登录页面\nif (!isset($_SESSION['authenticated']))\
    \ {\n    header('Location: http://localhost/phpsols/sessions/login.php ');\n \
    \   exit;\n}\n// 仅当退出按钮被点击时才运行此脚本\nif (isset($_POST['logout'])) {\n    // 清空 $_SESSION\
    \ 数组\n    $_SESSION = [];\n    // 使会话 cookie 失效\n    if (isset($_COOKIE[session_name()]))\
    \ {\n        setcookie(session_name(), '', time()-86400, '/');\n    }\n    //\
    \ 结束会话并重定向\n    session_destroy();\n    header('Location: http://localhost/phpsols/sessions/login.php\
    \ ');\n    exit;\n}\n?>\n```\n\n保存 `menu.php` 并通过点击 `Log out` 进行测试。你应该会被重定向到 `login.php`。任何尝试返回\
    \ `menu.php` 或 `secretpage.php` 的操作都会将你带回 `login.php`。你可以将相同的代码放在每个受限页面中，但 PHP\
    \ 的精髓在于节省工作，而不是增加工作量。因此将其转换为包含文件是合理的。在 `includes` 文件夹中创建一个名为 `logout.php` 的新文件。将步骤\
    \ 1 和 2 中的新代码剪切并粘贴到新文件中，如下所示（位于 `ch09` 文件夹的 `logout.php` 中）：\n\n- 此代码与本章前面\"销毁会话\"\
    中的代码相同。唯一的区别是，它被包含在条件语句中，使其仅在点击退出按钮时运行，并且它使用 `header()` 将用户重定向到 `login.php`。\n\
    \n```\n<?php\n// 仅当退出按钮被点击时才运行此脚本\nif (isset($_POST['logout'])) {\n    // 清空 $_SESSION\
    \ 数组\n    $_SESSION = array();\n    // 使会话 cookie 失效\n    if (isset($_COOKIE[session_name()]))\
    \ {\n        setcookie(session_name(), '', time()-86400, '/');\n    }\n    //\
    \ 结束会话并重定向\n    session_destroy();\n    header('Location: http://localhost/phpsols/sessions/login.php\
    \ ');\n    exit;\n}\n?>\n<form method=\"post\" action=\"\">\n<input name=\"logout\"\
    \ type=\"submit\" value=\"Log out\">\n</form>\n```\n\n在 `menu.php` 中你剪切表单代码的相同位置，包含新文件，如下所示：\n\
    \n`<?php include '../includes/logout.php'; ?>`\n\n- 你可以对照 `ch09` 文件夹中的 `menu_04.php`、`secretpage_03.php`\
    \ 和 `logout.php` 检查代码。\n\n在 `menu.php` 顶部调用 `session_start()` 之后立即添加 `ob_start();`。无需使用\
    \ `ob_end_flush()` 或 `ob_end_clean()`。如果你没有显式地刷新缓冲区，PHP 会在脚本结束时自动刷新。保存 `menu.php`\
    \ 并测试页面。它的外观和工作方式应该与之前完全相同。对 `secretpage.php` 重复步骤 5 和 6。现在你拥有一个简单、可重用的退出按钮，可以将其集成到任何受限页面中。\n\
    \n- 像这样从外部文件包含代码意味着在调用 `setcookie()` 和 `header()` 之前会有输出发送到浏览器。因此，你需要像 PHP 方案\
    \ 9-2 所示那样缓冲输出。\n"
- fmt: "### Making Passwords More Secure\n\nAlthough this file-based user authentication\
    \ setup is adequate for restricting access to webpages, all the passwords are\
    \ stored in plain text. For greater security, it’s advisable to encrypt passwords.\
    \ For many years, it was recommended to use the `MD5` or `SHA-1` algorithms to\
    \ encrypt passwords as a 32- or 40-digit hexadecimal number. One of their original\
    \ strengths, speed, has turned out to be a major weakness. Automated scripts can\
    \ process huge numbers of calculations per second in a brute force attack to determine\
    \ the original value—not so much guessing as trying every possible combination.\n\
    \nPHP 5.5 introduced a much more robust system of encrypting and verifying passwords\
    \ using two functions: `password_hash()` and `password_verify()`. To encrypt a\
    \ password, just pass it to the `password_hash()` function, like this:\n\n```\n\
    $encrypted = password_hash($password, PASSWORD_DEFAULT);\n```\n\nThe second argument\
    \ to `password_hash()` is a constant that leaves the choice of encryption method\
    \ up to PHP, allowing you to keep up to date with what is considered the most\
    \ secure method at the time.\n\n**Note:** The `password_hash()` function has other\
    \ options for advanced users. For details, see [`http://php.net/manual/en/function.password-hash.php`](http://php.net/manual/en/function.password-hash.php).\
    \ There’s also a FAQ (frequently asked questions) page about safe password hashing\
    \ at [`http://php.net/manual/en/faq.passwords.php`](http://php.net/manual/en/faq.passwords.php).\n\
    \nUsing `password_hash()` performs one-way encryption. This means that even if\
    \ your password file is exposed, no one will be able to work out what the passwords\
    \ are. It also means that you have no way of converting an encrypted password\
    \ back to its original value. In one respect, this is unimportant: when a user\
    \ logs in, `password_verify()` checks the submitted value against the encrypted\
    \ version. The disadvantage is that there is no way that you can send users password\
    \ reminders if they forget them; you must generate a new password. Nevertheless,\
    \ good security demands encryption.\n\n### Enabling Password Hashing in Older\
    \ Versions of PHP\n\nThe password hashing functions are not available prior to\
    \ PHP 5.5. However, if your server is running PHP 5.3.7 or later, or any version\
    \ of PHP 5.4, you can enable the same functionality with the `password_compat`\
    \ library.\n\nTo check whether `password_compat` will run on your version of PHP,\
    \ download `version-test.php` from [`https://github.com/ircmaxell/password_compat`](https://github.com/ircmaxell/password_compat).\
    \ If it outputs \"Pass\", include `password.php` to enable the password hashing\
    \ functions in a script. This is a single file that can be downloaded from the\
    \ `lib` folder at the same URL.\n\nOnce you have included `password.php`, the\
    \ functions work exactly the same as in PHP 5.5 and later.\n\nEncryption is no\
    \ protection against the most common problem with passwords: ones that are easy\
    \ to guess or that use common words. Many registration systems now enforce the\
    \ use of stronger passwords by requiring a mixture of alphanumeric characters\
    \ and symbols.\n\nTo improve the basic login system developed so far, you need\
    \ to create a user registration form that checks the following:\n\n- That the\
    \ password and username contain a minimum number of characters\n- That the password\
    \ matches minimum strength criteria, such as containing a mixture of numbers,\
    \ uppercase and lowercase characters, and symbols\n- That the password matches\
    \ a second entry in a confirmation field\n- That the username isn’t already in\
    \ use\n\n## PHP Solution 9-6: Creating a Password-strength Checker\n\nThis PHP\
    \ solution shows how to create a class that checks whether a password meets certain\
    \ requirements, such as no spaces, a minimum number of characters, and a combination\
    \ of different types of characters. By default, the class checks only that the\
    \ password has no spaces and contains a minimum number of characters. Optional\
    \ methods allow you to set tougher conditions, such as using a combination of\
    \ uppercase and lowercase characters, numbers, and nonalphanumeric symbols.\n\n\
    This PHP solution starts by building the user registration form that will also\
    \ be used in PHP Solution 9-7.\n\nCreate a page called `register.php` in the `sessions`\
    \ folder and insert a form with three text input fields and a Submit button. Lay\
    \ out the form and name the input elements as shown in the following screenshot.\
    \ If you want to save time, use `register_01.php` in the `ch09` folder.\n\n![A978-1-4842-0635-5_9_Figh_HTML.jpg](A978-1-4842-0635-5_9_Figh_HTML.jpg)\n\
    \nAs always, you want the processing script to run only if the form has been submitted,\
    \ so everything needs to be enclosed in a conditional statement that checks whether\
    \ the `name` attribute of the Submit button is in the `$_POST` array. Then you\
    \ need to check that the input meets your minimum requirements. Insert the following\
    \ code in a PHP block above the `DOCTYPE` declaration:\n\n```\nif (isset($_POST['register']))\
    \ {\n    $username = trim($_POST['username']);\n    $password = trim($_POST['pwd']);\n\
    \    $retyped = trim($_POST['conf_pwd']);\n    require_once '../PhpSolutions/Authenticate/CheckPassword.php';\n\
    }\n```\n\nCreate a new folder called `Authenticate` in the `PhpSolutions` folder.\
    \ Then create a file called `CheckPassword.php` inside the new folder. It will\
    \ contain only PHP script, so strip out any HTML and add the following code:\n\
    \n- The code inside the conditional statement passes the input from the three\
    \ text fields to `trim()` to remove whitespace from the beginning and end, and\
    \ it assigns the results to simple variables. Next it includes the file that will\
    \ contain the class that checks the password, which you’ll define next.\n\n```\n\
    <?php\nnamespace PhpSolutions\\Authenticate;\n\nclass CheckPassword {\n    protected\
    \ $password;\n    protected $minimumChars;\n    protected $mixedCase = false;\n\
    \    protected $minimumNumbers = 0;\n    protected $minimumSymbols = 0;\n    protected\
    \ $errors = [];\n\n    public function __construct($password, $minimumChars =\
    \ 8) {\n        $this->password = $password;\n        $this->minimumChars = $minimumChars;\n\
    \    }\n\n    public function check() {\n        if (preg_match('/\\s/', $this->password))\
    \ {\n            $this->errors[] = 'Password cannot contain spaces.';\n      \
