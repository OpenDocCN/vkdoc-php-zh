- fmt: "### Using GD Functions to Create a Scaled Copy of an Image\n\nAfter you have\
    \ gathered all the necessary information, you can generate a thumbnail image from\
    \ a larger one. This involves creating image resources for both the original image\
    \ and the thumbnail. For the original image, you need to use a function that matches\
    \ the image’s MIME type. Each of the following functions takes a single argument:\
    \ the path to the file.\n\n- `imagecreatefromjpeg()`\n- `imagecreatefrompng()`\n\
    - `imagecreatefromgif()`\n\nBecause the thumbnail doesn’t yet exist, you use a\
    \ different function, `imagecreatetruecolor()`, which takes two arguments—the\
    \ width and height (in pixels).\n\nYet another function creates a resized copy\
    \ of an image: `imagecopyresampled()`. This takes no fewer than ten arguments—all\
    \ of them required. The arguments fall into five pairs, as follows:\n\n- References\
    \ to the two image resources—copy first, original second\n- The `x` and `y` coordinates\
    \ of where to position the top-left corner of the copied image\n- The `x` and\
    \ `y` coordinates of the top-left corner of the original\n- The width and height\
    \ of the copy\n- The width and height of the area to copy from the original\n\n\
    Figure [8-5](#A978-1-4842-0635-5_8_Chapter.html#Fig5) shows how the last four\
    \ pairs of arguments can be used to extract a specific area, using the following\
    \ arguments to `imagecopyresampled()`:\n\n```\nimagecopyresampled($thumb, $source,\
    \ 0, 0, 170, 20, $thbwidth,$thbheight, 170, 102);\n```\n\n![A978-1-4842-0635-5_8_Fig5_HTML.jpg](A978-1-4842-0635-5_8_Fig5_HTML.jpg)\n\
    \n**Figure 8-5.** The `imagecopyresampled()` function allows you to copy part\
    \ of an image\n\nThe `x` and `y` coordinates of the area to copy are measured\
    \ in pixels from the top left of the image. The x and y axes begin at 0 at the\
    \ top left, and increase to the right and down. By setting the width and height\
    \ of the area to copy to 170 and 102, respectively, PHP extracts the area outlined\
    \ in white.\n\nSo now you know how websites manage to crop uploaded images. They\
    \ calculate the coordinates dynamically using JavaScript or some other technology.\
    \ For the `Thumbnail` class, you’ll use the whole of the original image to generate\
    \ the thumbnail.\n\nAfter creating the copy with `imagecopyresampled()`, you need\
    \ to save it, again using a function specific to the MIME type, namely:\n\n- `imagejpeg()`\n\
    - `imagepng()`\n- `imagegif()`\n\nEach function takes as its first two arguments\
    \ the image resource and the path to where you want to save it.\n\nThe `imagejpeg()`\
    \ and `imagepng()` functions take an optional third argument to set the image\
    \ quality. For `imagejpeg()`, you set the quality by specifying a number in the\
    \ range of 0 (worst) to 100 (best). If you omit the argument, the default is 75.\
    \ For `imagepng()`, the range is 0 to 9. Confusingly, 0 produces the best quality\
    \ (no compression).\n\nFinally, once you have saved the thumbnail you need to\
    \ destroy the image resources by passing them to `imagedestroy()`. In spite of\
    \ its destructive name, this function has no effect on the original image or the\
    \ thumbnail. It simply frees the server memory by destroying the image resources\
    \ required during processing.\n\n### PHP Solution 8-4: Generating the thumbnail\
    \ image\n\nThis PHP solution completes the `Thumbnail` class by creating the image\
    \ resources, copying the thumbnail, and saving it in the destination folder.\n\
    \nContinue working with your existing class definition. Alternatively, use `Thumbnail_03.php`\
    \ in the `ch08/PhpSolutions/Image` folder.\n\nThe image resource for the original\
    \ image needs to be specific to its MIME type, so start by creating an internal\
    \ method to select the correct type. Add the following code to the class definition.\
    \ It’s a protected method, so put it at the bottom of the page (but inside the\
    \ class’s closing curly brace).\n\n```\nprotected function createImageResource()\
    \ {\n    if ($this->imageType == 'jpeg') {\n        return imagecreatefromjpeg($this->original);\n\
    \    } elseif ($this->imageType == 'png') {\n        return imagecreatefrompng($this->original);\n\
    \    } elseif ($this->imageType == 'gif') {\n        return imagecreatefromgif($this->original);\n\
    \    }\n}\n```\n\nThe `checkType()` method that you created in PHP Solution 8-1\
    \ stores the MIME type as `jpeg`, `png`, or `gif`. So, the conditional statement\
    \ checks the MIME type, matches it to the appropriate function, and passes the\
    \ original image as an argument. The method then returns the resulting image resource.\n\
    \nNow it’s time to define the internal method that does all the hard work. It\
    \ contains a lot of code, so I’ll break it into sections. Start by defining the\
    \ `createThumbnail()` method, like this:\n\n```\nprotected function createThumbnail()\
    \ {\n    $resource = $this->createImageResource();\n    $thumb = imagecreatetruecolor($this->thumbwidth,\
    \ $this->thumbheight);\n}\n```\n\nThis calls the `createImageResource()` method\
    \ that you created in step 1 and then creates an image resource for the thumbnail,\
    \ passing the thumbnail’s width and height to `imagecreatetruecolor()`.\n\nThe\
    \ next stage in creating the thumbnail involves passing both image resources to\
    \ `imagecopyresampled()` and setting the coordinates and dimensions. Amend the\
    \ `createThumbnail()` method like this:\n\n```\nprotected function createThumbnail()\
    \ {\n    $resource = $this->createImageResource();\n    $thumb = imagecreatetruecolor($this->thumbwidth,\
    \ $this->thumbheight);\n    imagecopyresampled($thumb, $resource, 0, 0, 0, 0,\
    \ $this->thumbwidth,\n        $this->thumbheight, $this->originalwidth, $this->originalheight);\n\
    }\n```\n\nThe first two arguments are the image resources you have just created\
    \ for the thumbnail and original image. The next four arguments set the `x` and\
    \ `y` coordinates for both the copy and the original to the top-left corner. Next\
    \ come the width and height calculated for the thumbnail, followed by the original\
    \ image’s width and height. Setting arguments 3–6 to the top-left corner and both\
    \ sets of dimensions to the full amounts copies the whole original image to the\
    \ whole of the thumbnail. In other words, it creates a smaller copy of the original.\n\
    \nYou don’t need to assign the result of `imagecopyresampled()` to a variable.\
    \ The scaled-down image is now stored in `$thumb`, but you still need to save\
    \ it.\n\nComplete the definition of `createThumbnail()` like this:\n\n```\nprotected\
    \ function createThumbnail() {\n    $resource = $this->createImageResource();\n\
    \    $thumb = imagecreatetruecolor($this->thumbwidth, $this->thumbheight);\n \
    \   imagecopyresampled($thumb, $resource, 0, 0, 0, 0, $this->thumbwidth,\n   \
    \     $this->thumbheight, $this->originalwidth, $this->originalheight);\n    $newname\
    \ = $this->basename . $this->suffix;\n    if ($this->imageType == 'jpeg') {\n\
    \        $newname .= '.jpg';\n        $success = imagejpeg($thumb, $this->destination\
    \ . $newname, 100);\n    } elseif ($this->imageType == 'png') {\n        $newname\
    \ .= '.png';\n        $success = imagepng($thumb, $this->destination . $newname,\
    \ 0);\n    } elseif ($this->imageType == 'gif') {\n        $newname .= '.gif';\n\
    \        $success = imagegif($thumb, $this->destination . $newname);\n    }\n\
    \    if ($success) {\n        $this->messages[] = \"$newname created successfully.\"\
    ;\n    } else {\n        $this->messages[] = \"Couldn't create a thumbnail for\
    \ \" .\n            basename($this->original);\n    }\n    imagedestroy($resource);\n\
    \    imagedestroy($thumb);\n}\n```"
  raw: '#### Using GD Functions to Create a Scaled Copy of an Image


    After you have gathered all the necessary information, you can generate a thumbnail
    image from a larger one. This involves creating image resources for both the original
    image and the thumbnail. For the original image, you need to use a function that
    matches the image’s MIME type. Each of the following functions takes a single
    argument: the path to the file.


    *   `imagecreatefromjpeg()`

    *   `imagecreatefrompng()`

    *   `imagecreatefromgif()`


    Because the thumbnail doesn’t yet exist, you use a different function, `imagecreatetruecolor()`,
    which takes two arguments—the width and height (in pixels).


    Yet another function creates a resized copy of an image: `imagecopyresampled()`.
    This takes no fewer than ten arguments—all of them required. The arguments fall
    into five pairs, as follows:


    *   References to the two image resources—copy first, original second

    *   The `x` and `y` coordinates of where to position the top-left corner of the
    copied image

    *   The `x` and `y` coordinates of the top-left corner of the original

    *   The width and height of the copy

    *   The width and height of the area to copy from the original


    Figure [8-5](#A978-1-4842-0635-5_8_Chapter.html#Fig5) shows how the last four
    pairs of arguments can be used to extract a specific area, using the following
    arguments to `imagecopyresampled()`:


    `imagecopyresampled($thumb, $source, 0, 0, 170, 20, $thbwidth,$thbheight, 170,
    102);`


    ![A978-1-4842-0635-5_8_Fig5_HTML.jpg](A978-1-4842-0635-5_8_Fig5_HTML.jpg)


    Figure 8-5.


    The `imagecopyresampled()` function allows you to copy part of an image


    The `x` and `y` coordinates of the area to copy are measured in pixels from the
    top left of the image. The x and y axes begin at 0 at the top left, and increase
    to the right and down. By setting the width and height of the area to copy to
    170 and 102, respectively, PHP extracts the area outlined in white.


    So now you know how websites manage to crop uploaded images. They calculate the
    coordinates dynamically using JavaScript or some other technology. For the `Thumbnail`
    class, you’ll use the whole of the original image to generate the thumbnail.


    After creating the copy with `imagecopyresampled()`, you need to save it, again
    using a function specific to the MIME type, namely:


    *   `imagejpeg()`

    *   `imagepng()`

    *   `imagegif()`


    Each function takes as its first two arguments the image resource and the path
    to where you want to save it.


    The `imagejpeg()` and `imagepng()` functions take an optional third argument to
    set the image quality. For `imagejpeg()`, you set the quality by specifying a
    number in the range of 0 (worst) to 100 (best). If you omit the argument, the
    default is 75\. For `imagepng()`, the range is 0 to 9\. Confusingly, 0 produces
    the best quality (no compression).


    Finally, once you have saved the thumbnail you need to destroy the image resources
    by passing them to `imagedestroy()`. In spite of its destructive name, this function
    has no effect on the original image or the thumbnail. It simply frees the server
    memory by destroying the image resources required during processing.


    #### PHP Solution 8-4: Generating the thumbnail image


    This PHP solution completes the `Thumbnail` class by creating the image resources,
    copying the thumbnail, and saving it in the destination folder.


    Continue working with your existing class definition. Alternatively, use `Thumbnail_03.php`
    in the `ch08/PhpSolutions/Image` folder.


    The image resource for the original image needs to be specific to its MIME type,
    so start by creating an internal method to select the correct type. Add the following
    code to the class definition. It’s a protected method, so put it at the bottom
    of the page (but inside the class’s closing curly brace).


    `protected function createImageResource() {`


    `if ($this->imageType == ''jpeg'') {`


    `return imagecreatefromjpeg($this->original);`


    `} elseif ($this->imageType == ''png'') {`


    `return imagecreatefrompng($this->original);`


    `} elseif ($this->imageType == ''gif'') {`


    `return imagecreatefromgif($this->original);`


    `}`


    `}`


    The `checkType()` method that you created in PHP Solution 8-1 stores the MIME
    type as `jpeg`, `png`, or `gif`. So, the conditional statement checks the MIME
    type, matches it to the appropriate function, and passes the original image as
    an argument. The method then returns the resulting image resource.


    Now it’s time to define the internal method that does all the hard work. It contains
    a lot of code, so I’ll break it into sections. Start by defining the `createThumbnail()`
    method, like this:


    `protected function createThumbnail() {`


    `$resource = $this->createImageResource();`


    `$thumb = imagecreatetruecolor($this->thumbwidth, $this->thumbheight);`


    `}`


    This calls the `createImageResource()` method that you created in step 1 and then
    creates an image resource for the thumbnail, passing the thumbnail’s width and
    height to `imagecreatetruecolor()`.


    The next stage in creating the thumbnail involves passing both image resources
    to `imagecopyresampled()` and setting the coordinates and dimensions. Amend the
    `createThumbnail()` method like this:


    `protected function createThumbnail() {`


    `$resource = $this->createImageResource();`


    `$thumb = imagecreatetruecolor($this->thumbwidth, $this->thumbheight);`


    `imagecopyresampled($thumb, $resource, 0, 0, 0, 0, $this->thumbwidth,`


    `$this->thumbheight, $this->originalwidth, $this->originalheight);`


    `}`


    The first two arguments are the image resources you have just created for the
    thumbnail and original image. The next four arguments set the `x` and `y` coordinates
    for both the copy and the original to the top-left corner. Next come the width
    and height calculated for the thumbnail, followed by the original image’s width
    and height. Setting arguments 3–6 to the top-left corner and both sets of dimensions
    to the full amounts copies the whole original image to the whole of the thumbnail.
    In other words, it creates a smaller copy of the original.


    You don’t need to assign the result of `imagecopyresampled()` to a variable. The
    scaled-down image is now stored in `$thumb`, but you still need to save it.


    Complete the definition of `createThumbnail()` like this:


    `protected function createThumbnail() {`


    `$resource = $this->createImageResource();`


    `$thumb = imagecreatetruecolor($this->thumbwidth, $this->thumbheight);`


    `imagecopyresampled($thumb, $resource, 0, 0, 0, 0, $this->thumbwidth,`


    `$this->thumbheight, $this->originalwidth, $this->originalheight);`


    `$newname = $this->basename . $this->suffix;`


    `if ($this->imageType == ''jpeg'') {`


    `$newname .= ''.jpg'';`


    `$success = imagejpeg($thumb, $this->destination . $newname, 100);`


    `} elseif ($this->imageType == ''png'') {`


    `$newname .= ''.png'';`


    `$success = imagepng($thumb, $this->destination . $newname, 0);`


    `} elseif ($this->imageType == ''gif'') {`


    `$newname .= ''.gif'';`


    `$success = imagegif($thumb, $this->destination . $newname);`


    `}`


    `if ($success) {`


    `$this->messages[] = "$newname created successfully.";`


    `} else {`


    `$this->messages[] = "Couldn''t create a thumbnail for " .`


    `basename($this->original);`


    `}`


    `imagedestroy($resource);`


    `imagedestroy($thumb);`


    `}`'
  trans: "\n### 使用 GD 函数创建图像的缩放副本\n\n收集完所有必要信息后，您就可以从较大的图像中生成缩略图。这需要为原始图像和缩略图分别创建图像资源。对于原始图像，您需要使用与图像\
    \ MIME 类型匹配的函数。以下每个函数都接受一个参数：文件的路径。\n\n- `imagecreatefromjpeg()`\n- `imagecreatefrompng()`\n\
    - `imagecreatefromgif()`\n\n由于缩略图尚不存在，您需要使用另一个函数 `imagecreatetruecolor()`，它接受两个参数——宽度和高度（以像素为单位）。\n\
    \n还有一个函数用于创建图像的缩放副本：`imagecopyresampled()`。它至少需要十个参数——且均为必填参数。这些参数分为五对，如下所示：\n\
    \n-   两个图像资源的引用——先副本，后原始\n-   要放置复制图像左上角的 `x` 和 `y` 坐标\n-   原始图像左上角的 `x` 和 `y`\
    \ 坐标\n-   副本的宽度和高度\n-   要从原始图像复制区域的宽度和高度\n\n图 8-5 展示了如何使用最后四对参数来提取特定区域，以下是对 `imagecopyresampled()`\
    \ 的参数设置：\n\n```\nimagecopyresampled($thumb, $source, 0, 0, 170, 20, $thbwidth,$thbheight,\
    \ 170, 102);\n```\n\n![A978-1-4842-0635-5_8_Fig5_HTML.jpg](img/A978-1-4842-0635-5_8_Fig5_HTML.jpg)\n\
    \n**图 8-5.** `imagecopyresampled()` 函数允许您复制图像的一部分\n\n要复制区域的 `x` 和 `y` 坐标是从图像左上角以像素为单位测量的。x\
    \ 轴和 y 轴从左上角的 0 开始，向右和向下递增。通过将要复制区域的宽度和高度分别设置为 170 和 102，PHP 提取出白色轮廓标出的区域。\n\n\
    现在您明白了网站是如何裁剪上传的图像的。它们使用 JavaScript 或其他技术动态计算坐标。对于 `Thumbnail` 类，您将使用原始图像的全部内容来生成缩略图。\n\
    \n使用 `imagecopyresampled()` 创建副本后，您需要保存它，再次使用特定于 MIME 类型的函数，即：\n\n- `imagejpeg()`\n\
    - `imagepng()`\n- `imagegif()`\n\n每个函数都将图像资源和要保存的路径作为其前两个参数。\n\n`imagejpeg()`\
    \ 和 `imagepng()` 函数接受一个可选的第三个参数来设置图像质量。对于 `imagejpeg()`，您可以通过指定一个 0（最差）到 100（最佳）范围内的数字来设置质量。如果省略该参数，默认值为\
    \ 75。对于 `imagepng()`，范围是 0 到 9。令人困惑的是，0 产生最佳质量（无压缩）。\n\n最后，保存缩略图后，您需要通过将图像资源传递给\
    \ `imagedestroy()` 来销毁它们。尽管名称带有破坏性，但此函数对原始图像或缩略图没有影响。它仅通过销毁处理过程中所需的图像资源来释放服务器内存。\n\
    \n### PHP 解决方案 8-4：生成缩略图\n\n此 PHP 解决方案通过创建图像资源、复制缩略图并将其保存到目标文件夹来完成 `Thumbnail`\
    \ 类的编写。\n\n继续处理您现有的类定义。或者，使用 `ch08/PhpSolutions/Image` 文件夹中的 `Thumbnail_03.php`。\n\
    \n原始图像的图像资源必须与其 MIME 类型对应，因此首先创建一个内部方法来选择正确的类型。将以下代码添加到类定义中。这是一个受保护的方法，因此将其放在页面底部（但在类的右花括号内）。\n\
    \n```\nprotected function createImageResource() {\n    if ($this->imageType ==\
    \ 'jpeg') {\n        return imagecreatefromjpeg($this->original);\n    } elseif\
    \ ($this->imageType == 'png') {\n        return imagecreatefrompng($this->original);\n\
    \    } elseif ($this->imageType == 'gif') {\n        return imagecreatefromgif($this->original);\n\
    \    }\n}\n```\n\n您在 PHP 解决方案 8-1 中创建的 `checkType()` 方法将 MIME 类型存储为 `jpeg`、`png`\
    \ 或 `gif`。因此，条件语句检查 MIME 类型，将其与相应的函数匹配，并传递原始图像作为参数。然后该方法返回生成的图像资源。\n\n现在该定义执行所有实际工作的内部方法了。它包含大量代码，因此我将分部分进行说明。首先像这样定义\
    \ `createThumbnail()` 方法：\n\n```\nprotected function createThumbnail() {\n   \
    \ $resource = $this->createImageResource();\n    $thumb = imagecreatetruecolor($this->thumbwidth,\
    \ $this->thumbheight);\n}\n```\n\n这会调用您在步骤 1 中创建的 `createImageResource()` 方法，然后为缩略图创建一个图像资源，将缩略图的宽度和高度传递给\
    \ `imagecreatetruecolor()`。\n\n创建缩略图的下一步涉及将两个图像资源传递给 `imagecopyresampled()` 并设置坐标和尺寸。像这样修改\
    \ `createThumbnail()` 方法：\n\n```\nprotected function createThumbnail() {\n   \
    \ $resource = $this->createImageResource();\n    $thumb = imagecreatetruecolor($this->thumbwidth,\
    \ $this->thumbheight);\n    imagecopyresampled($thumb, $resource, 0, 0, 0, 0,\
    \ $this->thumbwidth,\n        $this->thumbheight, $this->originalwidth, $this->originalheight);\n\
    }\n```\n\n前两个参数是您刚刚为缩略图和原始图像创建的图像资源。接下来的四个参数将副本和原始图像的 `x` 和 `y` 坐标都设置为左上角。接着是为缩略图计算出的宽度和高度，然后是原始图像的宽度和高度。将参数\
    \ 3 到 6 设置为左上角，并将两组尺寸均设置为完整大小，这样会将整个原始图像复制到整个缩略图中。换句话说，它创建了一个原始图像的缩小版副本。\n\n您不需要将\
    \ `imagecopyresampled()` 的结果赋给一个变量。缩放后的图像现在存储在 `$thumb` 中，但您仍需保存它。\n\n像这样完成 `createThumbnail()`\
    \ 的定义：\n\n```\nprotected function createThumbnail() {\n    $resource = $this->createImageResource();\n\
    \    $thumb = imagecreatetruecolor($this->thumbwidth, $this->thumbheight);\n \
    \   imagecopyresampled($thumb, $resource, 0, 0, 0, 0, $this->thumbwidth,\n   \
    \     $this->thumbheight, $this->originalwidth, $this->originalheight);\n    $newname\
    \ = $this->basename . $this->suffix;\n    if ($this->imageType == 'jpeg') {\n\
    \        $newname .= '.jpg';\n        $success = imagejpeg($thumb, $this->destination\
    \ . $newname, 100);\n    } elseif ($this->imageType == 'png') {\n        $newname\
    \ .= '.png';\n        $success = imagepng($thumb, $this->destination . $newname,\
    \ 0);\n    } elseif ($this->imageType == 'gif') {\n        $newname .= '.gif';\n\
    \        $success = imagegif($thumb, $this->destination . $newname);\n    }\n\
    \    if ($success) {\n        $this->messages[] = \"$newname 创建成功。\";\n    } else\
    \ {\n        $this->messages[] = \"无法为 \" .\n            basename($this->original)\
    \ . \" 创建缩略图。\";\n    }\n    imagedestroy($resource);\n    imagedestroy($thumb);\n\
    }\n```\n"
- fmt: "\nThe first line of new code concatenates the suffix to the filename stripped\
    \ of its filename extension. So, if the original file is called `menu.jpg` and\
    \ the default `_thb` suffix is used, `$newname` becomes `menu_thb`.\n\nThe conditional\
    \ statement checks the image’s MIME type and appends the appropriate filename\
    \ extension. In the case of `menu.jpg`, `$newname` becomes `menu_thb.jpg`. The\
    \ scaled-down image is then passed to the appropriate function to save it, using\
    \ the destination folder and `$newname` as the path for where it is saved. For\
    \ JPEG and PNG images, the optional quality argument is set to the highest level:\
    \ 100 for JPEG and 0 for PNG.\n\nThe result of the save operation is stored in\
    \ `$success`. Depending on the outcome, `$success` is either `true` or `false`,\
    \ and an appropriate message is added to the `$messages` property. The message\
    \ is created using the `basename()` function rather than the `$basename` property\
    \ because the filename extension has been stripped from the property, whereas\
    \ the function preserves it.\n\nFinally, `imagedestroy()` frees the server memory\
    \ by destroying the resources used to create the thumbnail image.\n\nUpdate the\
    \ definition of the `create()` method to call the `createThumbnail()` method:\n\
    \n```\npublic function create() {\n    if ($this->canProcess && $this->originalwidth\
    \ != 0) {\n        $this->calculateSize($this->originalwidth, $this->originalheight);\n\
    \        $this->createThumbnail();\n    } elseif ($this->originalwidth == 0) {\n\
    \        $this->messages[] = 'Cannot determine size of ' . $this->original;\n\
    \    }\n}\n```\n\nYou no longer need the `test()` method. You can either delete\
    \ it from the class definition or comment it out. If you plan to experiment further\
    \ or make enhancements to the class, commenting it out saves the effort of creating\
    \ it again from scratch. Up to now, you have used the `test()` method to display\
    \ error messages. Create a public method to get the messages:\n\n```\npublic function\
    \ getMessages() {\n    return $this->messages;\n}\n```\n\nSave `Thumbnail.php`.\
    \ In `create_thumb.php`, replace the call to the `test()` method with a call to\
    \ `getMessages()` and assign the result to a variable, like this:\n\n```\n$thumb->create();\n\
    $messages = $thumb->getMessages();\n```\n\nAdd a PHP code block just after the\
    \ opening `<body>` tag to display any messages:\n\n```\n<?php\nif (isset($messages)\
    \ && !empty($messages)) {\n    echo '<ul>';\n    foreach ($messages as $message)\
    \ {\n        echo \"<li>$message</li>\";\n    }\n    echo '</ul>';\n}\n?>\n```\n\
    \nYou’ve seen this code in previous chapters, so it needs no explanation.\n\n\
    If the thumbnail isn’t created, the error message generated by the `Thumbnail`\
    \ class should help you detect the source of the problem. Also, check your code\
    \ carefully against `Thumbnail_04.php` in the `ch08/PhpSolutions/Image` folder.\
    \ If the tests in the previous PHP solutions worked, the error is likely in the\
    \ `create()`, `createImageResource()`, or `createThumbnail()` method definitions.\
    \ The other place to check is, of course, your PHP configuration. The class depends\
    \ on the GD extension being enabled. Although GD is widely supported, it’s not\
    \ always on by default.\n\n![A978-1-4842-0635-5_8_Fig6_HTML.jpg](A978-1-4842-0635-5_8_Fig6_HTML.jpg)\n\
    \nFigure 8-6.\n\nThe thumbnail has been successfully created in the destination\
    \ folder Save `create_thumb.php`, load it in a browser, and test it by selecting\
    \ an image from the list and clicking Create Thumbnail. If all goes well, you\
    \ should see a message reporting the creation of the thumbnail and you can confirm\
    \ its existence in the `thumbs` subfolder of `upload_test`, as shown in Figure\
    \ [8-6](#A978-1-4842-0635-5_8_Chapter.html#Fig6).\n\n## Resizing an Image Automatically\
    \ on Upload\n\nNow that you have a class that creates a thumbnail from a larger\
    \ image, it’s relatively simple to adapt the `Upload` class from [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html)\
    \ to generate a thumbnail from an uploaded image—in fact, not only from a single\
    \ image but also from multiple images.\n\nInstead of changing the code in the\
    \ `Upload` class, it’s more efficient to extend the class and create a subclass.\
    \ You then have the choice of using the original class to perform uploads of any\
    \ type of file, or the subclass to create thumbnail images on upload. The subclass\
    \ also needs to provide the option to save or discard the larger image after the\
    \ thumbnail has been created.\n\nBefore diving into the code, let’s take a quick\
