    Lines 1–4 of Listing 8-8 are just like the baked Add action: they check for supplied
    data found in the parsed $this->data array, they create a new record in the database
    if data has been supplied, and they run the save() function in the model to insert
    the data into the new database record and check for a successful result from the
    model. Lines 5–7 are executed when a successful save has occurred, and line 9
    is called only upon a failed save. (You could, if you wanted, run data validation
    in the model, and the controller would be prepared to handle the results.)


    So, assuming that the supplied comment was saved successfully, then you would
    want to fetch all the comments in the database, including the newly added one,
    and display them in the <div id="comments"> element. Therefore, you must run a
    database query to pull the comments and pass that along to the view. Line 5 does
    this with the find() function; it pulls all comments with a post_id equal to the
    value supplied in the hidden form element you created in line 18 of Listing 8-7\.
    I’ve also set the recursive value to -1 so that each comment in the resulting
    array doesn’t include the entire contents of the associated post; you want the
    comments themselves without their associations. Line 6 passes the results of the
    find() function to the view.


    **Rendering for Ajax**


    The secret of making Ajax work in the controller is nothing more than using the
    render() function to bypass the typical view-rendering mechanism in the MVC structure
    of Cake applications. In line 7 of Listing 8-8, you use the render() function,
    with a second parameter to specify that the output is of the Ajax type. By including
    this parameter, you instruct Cake to disable its viewing mechanism and send only
    the view’s output (not the layout as well) to the waiting JavaScript event. You
    must create a corresponding view file in the app/views/comments folder to be used
    by the controller and displayed in the <div id="comments"> element back in the
    Posts view.


    Create the app/views/comments/add_success.ctp file. This file will be rendered
    to complete the Ajax form submission, so it will need to also iterate through
    the $comments array as does the app/views/posts/view.ctp file. Paste Listing 8-9
    into the add_success.ctp file.


