    \ Web 服务器也可以用来托管其他类型的内容，例如 XML 文件或 JSON 字符串。我将在后面的章节中详细介绍这些 Web 服务，但接下来的示例展示了如何使用\
    \ PHP 获取 JSON 字符串并将其转换为 PHP 对象。\n"
- fmt: "Most web services or APIs require authentication and other parameters to be\
    \ passed to the server in order to retrieve data. There are a few APIs available\
    \ that can be used without authentication, like the one used here that will simply\
    \ return the public IP address of your computer as seen by the web server.\n\n\
    ```php\n<?php\n\n// 7_24.php\n\n$data = json_decode(file_get_contents(\"http://jsonip.com\"\
    )); print_r($data);\n```\n\n## CHAPTER 7 ■ FILES AND DIRECTORIES\n\nThe output\
    \ from this example is the response from the API. In this case the response is\
    \ an object with three properties.\n\n```\nstdClass Object\n(\n    [ip] => 180.190.203.15\n\
    \    [about] => /about\n    [Pro!] => http://getjsonip.com\n)\n```\n\n### Recipe\
    \ 7-11. Stream Context\n\n**Problem**\n\nWorking with streams of different types\
    \ might require options and parameters that can't be passed in a generic way to\
    \ the `fopen()` function. These options and parameters can be used to control\
    \ how the stream reacts to various requests.\n\n**Solution**\n\nWith the function\
    \ `stream_context_create()` it's possible to create a context resource that can\
    \ be used as an optional parameter to most of the file handling functions. To\
    \ create a stream context you must pass one or two associative arrays to the function.\
    \ The first array will hold the options and the second optional array will be\
    \ the parameters. The second `params` parameter is not widely used but can be\
    \ used to set a notification callback function that can be used for things like\
    \ progress indication.\n\n**How it Works**\n\nBy default when the function `file_get_contents()`\
    \ is used to retrieve content with the http protocol the request will be created\
    \ as a GET request where all the parameters are passed on as part of the URL.\
    \ If you want to pass parameters as header values or you want to send a POST request\
    \ you can use `stream_context_create()` to generate these parameters in a form\
    \ that can be passed to the third argument for `file_get_contents()`. The next\
