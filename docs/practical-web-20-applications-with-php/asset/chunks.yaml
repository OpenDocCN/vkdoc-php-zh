    Handling the Form Submission


    At this stage in the development of the registration form, if you were to click
    the submit button, nothing would happen other than the empty form being redisplayed.
    When the page reloads, the register action handler should process the request
    by either using the FormProcessor_


    UserRegistration class to check the form and save the user data, or to simply
    display the form.


    ■**Note** If an error occurs while processing the form (such as the user entering
    a username already in use), the code is designed to fall through to displaying
    the form again. On this subsequent rendering of the form, the submitted values
    will be available to redisplay in the template, along with any generated error
    messages.


    We’ll accomplish this by first checking for a post request (using $request->isPost()),
    and then calling process() accordingly. Once the form has been successfully processed,
    the browser is redirected to the registercomplete action. This redirection to
    a new action prevents the user from refreshing the page (and therefore resubmitting
    their registration data, which would fail at this point since the username now
    exists).


