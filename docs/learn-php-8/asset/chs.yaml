  ## 章节目标/学生学习成果\n\n完成本章学习后，学生将能够\n\n*   创建一个能够执行删除、更新和插入操作的完整 PHP 应用程序\n*   使用 CSS\
  \ 为完成的应用程序创建专业外观\n*   使用 JavaScript 接收和处理来自其他程序的数据\n*   保护应用程序内需要用户 ID/密码的所有程序\n\
  *   使用 JSON 对象中的值填充 HTML 对象\n*   创建一个使用当前密码加密技术的 PHP 程序\n\n## 完整的应用程序\n\n在本章中，我们将完成\
  \ ABC 流浪犬收容所预约系统的开发。系统的当前版本允许用户在每次添加完一只狗的信息后，必须重新登录才能添加别的狗。此外，系统也不允许用户更新或删除系统中已有的狗狗信息。我们在第\
  \ 7 章（数据对象）已经完成了提供更新和删除功能所需的大部分 PHP 代码。现在，我们需要将数据对象(`dog_data`)的这一部分附加到业务规则层(`dog`)。此外，我们还需要对界面层(`dog_interface`和`lab`)进行一些修改，以便调用`update`和`delete`方法并显示结果。正如你将很快看到的，大部分所需的编码工作都将在`lab.php`文件中进行。因此，我们将从这些修改开始。\n\
  \n\n\n### 使用 JavaScript 处理数据\n\n当前的 `lab.php` 文件只允许用户输入将被插入数据存储（`XML`、`JSON` 或 `MySQL`）的狗狗信息。需要修改界面，让用户能够指明他们想要完成的操作（`插入`、`更新`或`删除`）。同时，如果操作涉及更新或删除，还需要允许用户选择一只现有的狗狗。这应该能说明，我们需要一个列表框，其中填充了收容所当前所有狗狗的信息。\n\
  \n我们将在本章后续部分讨论所需的 PHP 修改。现在，我们先假设 `dog_interface`（接口层）将返回这些信息，这些信息是通过 `dog` 方法（业务规则层）从\
  \ `dog_data`（数据层）检索而来的。我们还将假设将创建与 `dog_breeds` 程序（第 4 章）类似的代码，以生成一个狗狗列表框。\n\n此外，`lab.php`\
  \ 需要访问所选特定狗狗的所有信息。代码需要将所有信息放入 `dog_name` 和 `dog_weight` 文本框、`dog_breeds` 列表框以及 `dog_color`\
  \ 单选按钮中。我们可以通过两种方式完成此任务。一种是允许用户从列表框中选择狗狗，然后重新调用 `dog_interface` 程序，向 dog 类请求该特定狗狗的信息，dog\
  \ 类再向 `dog_data` 类请求信息。然而，这需要在互联网上进行一次额外的、不必要的调用来请求信息。相反，我们可以在用户首次调用 `lab.php` 界面时，收集所有必要的信息（`dog_breed`\
  \ 列表框信息、`dogs` 列表框信息以及当前数据存储中所有狗狗的完整信息）。我们可以使用当前的 JavaScript AJAX 代码，只需稍作修改即可检索所有必要信息。\n\
  \n在填充表单对象（文本框、列表框和单选按钮）之前，我们必须确保用户指明了所请求的操作类型（至少是插入还是更改/删除）。我们可以通过在选择之前不显示表单对象来实现这一点。我们可以对第\
  \ 5 章中使用的 JavaScript 代码和 CSS 代码的组合稍作调整，要求用户在表单显示之前先从一个狗狗列表框中进行选择。\n\n#### 备注\n\n\
  我们即将审视的过程是 Web 应用程序中非常常见的做法。许多 Web 应用程序以数组、`JSON` 或 `XML` 格式返回数据。然后，接口（在此例中为 `lab.php`）可以使用\
  \ JavaScript 来检索所需的信息。\n\n*编程说明——购物车使用类似的技术。当客户选择要购买的商品时，这些商品会被放置在客户端机器上的一个数据对象（很可能是一个\
  \ `JSON` 对象）中。当客户开始结账流程时，数据会被传输到服务器。这允许客户进行更改，而不会引起对服务器的额外调用。由于购买信息不被视为安全风险，这通常是一个安全的流程。当然，处理信用卡信息时就不适合采用这种方式。*\n\
  \n使用图 9-1 所示的格式，用户必须先选择 `新建` 或从列表框中选择一只狗狗才能继续。一旦用户做出选择，就可以显示带有默认值（用于插入操作）或所选狗狗当前值的\
  \ HTML 表单。CSS 代码最初会将按钮（和表单）的显示设置为 `\"none\"`。JavaScript 代码（我们稍后会看到）会在适当的时候将相应按钮和表单的显示更改为\
  \ `\"inline\"`。\n\n![../images/394210_2_En_9_Chapter/394210_2_En_9_Fig1_HTML.jpg](img/394210_2_En_9_Fig1_HTML.jpg)\n\
