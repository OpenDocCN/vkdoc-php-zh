    You can check your code against `index_05.php` and `random_image_02.php` in the
    `ch04` folder.


    ### Preventing Errors with Include Files


    Many hosting companies turn off error reporting for notices, so you probably wouldn’t
    be aware of the problem shown in Figure [4-13](#A978-1-4842-0635-5_4_Chapter.html#Fig13)
    if you did all your testing on your remote server. However, it’s important to
    eliminate all errors before deploying PHP pages on the Internet. Just because
    you can’t see the error message doesn’t mean your page is okay.


    Pages that use a server-side technology such as PHP deal with a lot of unknowns,
    so it’s wise to code defensively, checking values before using them. This section
    describes measures you can take to prevent and troubleshoot errors with include
    files.


    #### Checking the Existence of Variables


    The lesson that can be drawn from PHP Solution 4-7 is that you should always use
    `isset()` to verify the existence of a variable that comes from an include file
    and wrap any code that uses it in a conditional statement. In this particular
    case, you know there’s no image to display if `$imageSize` doesn’t exist, so the
    figure element is dropped. However, in other cases you might be able to assign
    a default value to the variable, like this:


    `if (!isset($someVariable)) {`


    `$someVariable =` `default value` `;`


    `}`


    This uses the logical `Not` operator (see Table 3-6 in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html))
    to check whether `$someVariable` has not been set. If `$someVariable` doesn’t
    exist, it’s assigned a default value, which can then be used later in your script.
    If it does exist, the code inside the conditional statement is skipped, and the
    original value is used.


    #### Checking Whether a Function or Class has Been Defined


    Include files are frequently used to define custom functions or classes. Attempting
    to use a function or class that hasn’t been defined triggers a fatal error. To
    check whether a function has been defined, pass the name of the function as a
    string to `function_exists()`. When passing the name of the function to `function_exists()`,
    omit the parentheses at the end of function name. For example, you check whether
    a function called `doubleIt()` has been defined like this:


    `if (function_exists(''doubleIt'')) {`


    `// use doubleIt()`


    `}`


    To check whether a class has been defined, use `class_exists()` in the same way,
    passing a string containing the class name as the argument:


    `if (class_exists(''MyClass'')) {`


    `// use MyClass`


    `}`


    Assuming you want to use the function or class, a more practical approach is to
    use a conditional statement to include the definition file if the function or
    class hasn’t already been defined. For example, if the definition for `doubleIt()`
    is in a file called `utilities.php`:


    `if (!function_exists(''doubleIt'')) {`


    `require_once ''./includes/utilities.php'';`


    `}`


    ### Suppressing Error Messages on a Live Website


    Assuming that your include files are working normally on your remote server, the
    measures outlined in the previous sections are probably all the error checking
    you need. However, if your remote server displays error messages, you should take
    steps to suppress them. The following techniques hide all error messages, not
    only those related to include files.


    #### Using the Error Control Operator


    A rather crude, but effective, technique is to use the PHP error control operator
    (`@`), which suppresses error messages associated with the line in which it’s
    used. You place `@` either at the beginning of the line or directly in front of
    the function or command that you think might generate an error, like this:


    `@ include ''./includes/random_image.php'';`


    The problem with the error control operator is that it hides errors rather than
    working around them. It’s only one character, so it’s easy to forget you have
    used it. Consequently, you can waste a lot of time looking for errors in the wrong
    part of your script. If you use the error control operator, the `@` mark should
    be the first thing you remove when troubleshooting a problem.


    The other drawback is that you need to use the error control operator in every
    line that might generate an error message, because it affects only the current
    line.


    #### Turning Off display_errors in the PHP Configuration


    A better way of suppressing error messages in a live website is to turn off the
    `display_errors` directive in the web server’s configuration. The most effective
    way to do this is to edit `php.ini` if your hosting company gives you control
    over its settings. Locate the `display_errors` directive and change `On` to `Off`.


    If you don’t have control of `php.ini`, many hosting companies allow you to change
    a limited range of configuration settings using a file called either `.htaccess`
    or `.user.ini`. The choice of file depends on how PHP was installed on the server,
    so check with your hosting company to find out which to use.


    If your server supports `.htaccess` files, add the following command to the `.htaccess`
    file in the server root folder:


    `php_flag display_errors Off`


    In a `.user.ini` file, the command is simply this:


    `display_errors Off`


    Both `.htaccess` and .`user.ini` are plain text files. Like `php.ini`, each command
    should be on a separate line. If the file doesn’t already exist on your remote
    server, you can simply create it in a text editor. Make sure your editor doesn’t
    automatically add `.txt` to the end of the filename. Then upload the file to your
    website’s server root folder.


    Tip


    Mac OS X hides files with names that begin with a dot, so you won’t be able to
    see them in the Mac Finder. However, you should be able to open them with a dedicated
    script editor. In the File ➤ Open dialog box, select “Enable: Everything” and
    the “Show hidden items” check box.


    #### Turning Off display_errors in an Individual File


    If you don’t have control over the server configuration, you can prevent error
    messages from being displayed by adding the following line at the top of any script:


    `<?php ini_set(''display_errors'', ''0''); ?>`'
  trans: "\n已存在的图像会正常显示，但即使文件缺失或损坏，你也能避免令人尴尬的错误信息——这显得更加专业。别忘了恢复你在上一步中修改的图像名称。\n\n\
    你可以在`ch04`文件夹中的`index_05.php`和`random_image_02.php`文件中核对你的代码。\n\n### 使用包含文件防止错误\n\
    \n许多主机商会关闭通知级别的错误报告，因此，如果你只在远程服务器上进行测试，可能不会意识到图 4-13 所示的问题。然而，在互联网上部署 PHP 页面之前，消除所有错误非常重要。仅仅因为你看不到错误信息，并不意味着你的页面没有问题。\n\
    \n使用 PHP 这类服务器端技术的页面会处理许多未知因素，因此明智的做法是进行防御性编码，在使用值之前先进行检查。本节将介绍一些措施，你可以用来预防和排查包含文件相关的错误。\n\
    \n#### 检查变量的存在性\n\n从 PHP 解决方案 4-7 中可以得出的教训是，你应该始终使用`isset()`来验证来自包含文件的变量是否存在，并将使用该变量的任何代码包装在条件语句中。在这个特定案例中，如果`$imageSize`不存在，你就知道没有图像可显示，因此需要移除`<figure>`元素。不过，在其他情况下，你或许可以为变量分配一个默认值，如下所示：\n\
    \n```\nif (!isset($someVariable)) {\n    $someVariable = default value;\n}\n```\n\
    \n这段代码使用了逻辑`非`运算符（参见第 3 章的表格 3-6），检查`$someVariable`是否未被设置。如果`$someVariable`不存在，则为其分配一个默认值，该值可以在后面的脚本中使用。如果它已存在，则条件语句内的代码会被跳过，并会使用原始值。\n\
    \n#### 检查函数或类是否已定义\n\n包含文件经常用于定义自定义函数或类。尝试使用一个未定义的函数或类会触发致命错误。要检查一个函数是否已定义，请将函数名作为字符串传递给`function_exists()`。在向`function_exists()`传递函数名时，省略函数名末尾的括号。例如，你可以这样检查一个名为`doubleIt()`的函数是否已定义：\n\
    \n```\nif (function_exists('doubleIt')) {\n    // 使用 doubleIt()\n}\n```\n\n要检查一个类是否已定义，可以类似地使用`class_exists()`，将一个包含类名的字符串作为参数传递：\n\
    \n```\nif (class_exists('MyClass')) {\n    // 使用 MyClass\n}\n```\n\n假设你想使用该函数或类，那么更实用的方法是：如果函数或类尚未定义，则使用条件语句来包含定义文件。例如，如果`doubleIt()`的定义位于名为`utilities.php`的文件中：\n\
    \n```\nif (!function_exists('doubleIt')) {\n    require_once './includes/utilities.php';\n\
    }\n```\n\n### 在线上网站中抑制错误信息\n\n假设你的包含文件在远程服务器上正常工作，那么前几节概述的措施可能就是你需要的全部错误检查了。但是，如果你的远程服务器显示了错误信息，你应该采取措施来抑制它们。以下技术可以隐藏所有错误信息，而不仅仅是与包含文件相关的那些。\n\
    \n#### 使用错误控制运算符\n\n一种比较粗糙但有效的技术是使用 PHP 错误控制运算符（`@`），它可以抑制与其所在行相关的错误信息。你可以将`@`放在行的开头，或者直接放在你可能认为会生成错误的函数或命令前面，如下所示：\n\
    \n```\n@ include './includes/random_image.php';\n```\n\n错误控制运算符的问题在于，它隐藏了错误，而不是绕开它们解决问题。它只有一个字符，因此很容易忘记你使用过它。结果，你可能在脚本的错误部分浪费大量时间查找错误。如果你使用了错误控制运算符，那么在排查问题时，`@`标记应该是你第一个移除的东西。\n\
    \n另一个缺点是，你需要在每一个可能生成错误信息的行上都使用错误控制运算符，因为它只影响当前行。\n\n#### 在 PHP 配置中关闭`display_errors`\n\
    \n在线上网站中抑制错误信息的一个更好方法是，在 Web 服务器的配置中关闭`display_errors`指令。最有效的方式是你的主机商允许你控制`php.ini`设置时，直接编辑它。找到`display_errors`指令，并将其从`On`改为`Off`。\n\
    \n如果你无法控制`php.ini`，许多主机商允许你通过一个名为`.htaccess`或`.user.ini`的文件来更改有限范围的配置设置。具体使用哪个文件取决于\
    \ PHP 在服务器上的安装方式，因此请咨询你的主机商以确定使用哪一个。\n\n如果你的服务器支持`.htaccess`文件，请在服务器根目录下的`.htaccess`文件中添加以下命令：\n\
    \n```\nphp_flag display_errors Off\n```\n\n在`.user.ini`文件中，命令则很简单：\n\n```\ndisplay_errors\
    \ Off\n```\n\n`.htaccess`和`.user.ini`都是纯文本文件。与`php.ini`一样，每个命令都应单独占一行。如果这些文件在你的远程服务器上尚不存在，你可以直接在文本编辑器中创建它们。确保你的编辑器不会自动在文件名末尾添加`.txt`。然后，将该文件上传到你的网站服务器根目录。\n\
    \n> **提示**\n> Mac OS X 会隐藏以点号开头的文件名，因此你在 Mac Finder 中将无法看到它们。但是，你应该可以使用专门的脚本编辑器打开它们。在“文件\
    \ ➤ 打开”对话框中，选择“启用: 所有项目”并勾选“显示隐藏项目”复选框。\n\n#### 在单个文件中关闭`display_errors`\n\n如果你无法控制服务器配置，可以通过在任何脚本的顶部添加以下代码行来阻止错误信息显示：\n\
    \n```\n<?php ini_set('display_errors', '0'); ?>\n```\n"
- fmt: "# PHP Solution 4-8: Redirecting when an Include File Can’t be Found\n\nAll\
    \ the techniques suggested so far only suppress error messages if an include file\
    \ can’t be found. If a page would be meaningless without the include file, you\
    \ should redirect the user to an error page if the include file is missing.\n\n\
    One way to do so is to throw an exception, like this:\n\n```\n$file = './includes/menu.php';\n\
    if (file_exists($file) && is_readable($file)) {\n    include $file;\n} else {\n\
    \    throw new Exception(\"$file can't be found\");\n}\n```\n\nWhen using code\
    \ that might throw an exception, you need to wrap it in a `try` block and create\
    \ a `catch` block to handle the exception (see “Handling Exceptions” in [Chapter\
    \ 3](#A978-1-4842-0635-5_3_Chapter.html)). This PHP solution shows how to do this,\
    \ using the `catch` block to redirect users to a different page if an include\
    \ file can’t be found.\n\nIf you have designed and tested your site thoroughly,\
    \ this technique should not be necessary on most pages that use include files.\
    \ However, this is by no means a pointless exercise. It demonstrates several important\
    \ features of PHP: how to throw and catch exceptions and how to redirect to another\
    \ page. As you’ll see from the following instructions, redirection isn’t always\
    \ straightforward. This PHP solution shows how to overcome the most common problem.\n\
    \nContinue working with `index.php` from PHP Solution 4-7. Alternatively, use\
    \ `index_05.php` from the `ch04` folder.\n\nCopy `error.php` from the `ch04` folder\
    \ to the site root. Don’t update the links in the page if your editing program\
    \ prompts you to do so. This is a static page that contains a generic error message\
    \ and links back to the other pages. Open `index.php` in your editing program.\
    \ The navigation menu is the most indispensable include file, so edit the `require`\
    \ command in `index.php` like this:\n\n```\n$file = './includes/menu.php';\nif\
    \ (file_exists($file) && is_readable($file)) {\n    require $file;\n} else {\n\
    \    throw new Exception(\"$file can't be found\");\n}\n```\n\nTip: Storing the\
    \ path of the include file in a variable like this avoids the need to retype it\
    \ four times, reducing the likelihood of spelling mistakes.\n\nTo redirect the\
    \ user to another page, use the `header()` function. However, redirection doesn’t\
    \ work if any output has been sent to the browser before you call `header()`.\
    \ Unless there’s a syntax error, the PHP engine normally processes a page from\
    \ the top, outputting the HTML until it reaches a problem. This means that output\
    \ will have already begun by the time the PHP engine gets to this code. To prevent\
    \ this from happening, start the `try` block before any output is generated. (This\
    \ actually won’t work on many setups, but bear with me, because it demonstrates\
    \ an important point.)\n\nScroll to the top of the page and edit the opening PHP\
    \ code block like this:\n\n```php\n<?php try {\n    include './includes/title.php';\n\
    \    include './includes/random_image.php'; ?>\n```\n\nThis opens the `try` block.\n\
    \nScroll down to the bottom of the page and add the following code after the closing\
    \ `</html>` tag:\n\n```php\n<?php } catch (Exception $e) {\n    header('Location:\
    \ http://localhost/phpsols/error.php ');\n} ?>\n```\n\nThis closes the `try` block\
    \ and creates a `catch` block to handle the exception. The code in the `catch`\
    \ block uses `header()` to redirect the user to `error.php`.\n\nThe `header()`\
    \ function sends an HTTP header to the browser. It takes as its argument a string\
    \ containing the header and its value separated by a colon. In this case, it uses\
    \ the `Location` header to redirect the browser to the page specified by the URL\
    \ following the colon. Adjust the URL to match your own setup if necessary.\n\n\
    ![A978-1-4842-0635-5_4_Fig14_HTML.jpg](A978-1-4842-0635-5_4_Fig14_HTML.jpg)\n\n\
    Figure 4-14. The `header()` function won’t work if output has already been sent\
    \ to the browser.\n\nSave `index.php` and test the page in a browser. It should\
    \ display as normal. Change the value of `$file`, the variable you created in\
    \ step 2, to point to a nonexistent include file, such as `men.php`. Save `index.php`\
    \ and reload it in your browser. If you’re using XAMPP in your testing environment,\
    \ you’ll probably be correctly redirected to `error.php`. With MAMP (and probably\
    \ other testing setups) you’re likely to see the message in Figure [4-14](#A978-1-4842-0635-5_4_Chapter.html#Fig14).\n\
    \nThe error message in Figure [4-14](#A978-1-4842-0635-5_4_Chapter.html#Fig14)\
    \ is probably responsible for more heads being banged against keyboards than any\
    \ other. (I, too, bear the scars.) As mentioned earlier, the `header()` function\
    \ cannot be used if output has been sent to the browser. So, what’s happened?\n\
    \nThe answer is in the error message, but it’s not immediately obvious. It says\
    \ the error happened on line 51, which is where the `header()` function is called.\
    \ What you really need to know is where the output was generated. That information\
    \ is buried here:\n\n`(output started at /Applications/MAMP/htdocs/phpsols/index.php:8)`\n\
    \nThe number 8 after the colon is the line number. So, what’s on line 8 of `index.php`?\
    \ As you can see from the following screenshot, line 8 uses `echo` to display\
    \ the value of `$title`.\n\n![A978-1-4842-0635-5_4_Fige_HTML.jpg](A978-1-4842-0635-5_4_Fige_HTML.jpg)\n\
    \nBecause there’s no error in the code up to this point, the PHP engine has already\
    \ output the HTML. Once that has happened, `header()` can’t redirect the page.\n\
    \nEven if you remove this line of PHP, the error message simply reports that output\
    \ started on the next line that contains a PHP block. What’s happening is that\
    \ the web server is outputting all the HTML following the `DOCTYPE`, but the PHP\
    \ engine needs to process a PHP code block before it can report a line number.\
    \ This poses the problem of how to redirect a page after output has been sent\
    \ to the browser. Fortunately, PHP provides the answer by allowing you to store\
    \ the output in a buffer (the web server’s memory).\n\nNote: The reason you don’t\
    \ get this error message in XAMPP and some other setups is because output buffering\
    \ has been turned on in the PHP configuration. XAMPP sets the value to 4096, which\
    \ means that 4 KB of output is stored in the buffer before the HTTP headers are\
    \ sent to the browser. Although useful, this gives you a false sense of security\
    \ because output buffering might not be enabled on your remote server. So, keep\
    \ reading even if you were correctly redirected.\n\nEdit the code block at the\
    \ top of `index.php` like this:\n\n```php\n<?php ob_start();\ntry {\n    include\
    \ './includes/title.php';\n    include './includes/random_image.php'; ?>\n```\n\
    \nThe `ob_start()` function turns on output buffering, preventing any output from\
    \ being sent to the browser before the `header()` function is called.\n\nThe PHP\
    \ engine automatically flushes the buffer at the end of the script, but it’s better\
    \ to do so explicitly. Edit the PHP code block at the foot of the page like this:\n\
    \n```php\n<?php } catch (Exception $e) {\n    ob_end_clean();\n    header('Location:\
    \ http://localhost/phpsols/error.php ');\n}\nob_end_flush();\n?>\n```\n\nTwo different\
    \ functions have been added here. When redirecting to another page, you don’t\
    \ want the HTML stored in the buffer. So, inside the `catch` block, a call is\
    \ made to `ob_end_clean()`, which turns off the buffer and discards its contents.\n\
    \nHowever, if an exception isn’t thrown, you want to display the contents of the\
    \ buffer, so `ob_end_flush()` is called at the end of the page after both the\
    \ `try` and `catch` blocks. This flushes the contents of the buffer and sends\
    \ it to the browser.\n\nChange the value of `$file` back to `./includes/menu.php`\
    \ and save `index.php`. When you click the Home link on the error page, `index.php`\
    \ should display normally.\n\n![A978-1-4842-0635-5_4_Fig15_HTML.jpg](A978-1-4842-0635-5_4_Fig15_HTML.jpg)\n\
    \nFigure 4-15."
  raw: '#### PHP Solution 4-8: Redirecting when an Include File Can’t be Found


    All the techniques suggested so far only suppress error messages if an include
    file can’t be found. If a page would be meaningless without the include file,
    you should redirect the user to an error page if the include file is missing.


    One way to do so is to throw an exception, like this:


    `$file = ''./includes/menu.php'';`


    `if (file_exists($file) && is_readable($file)) {`


    `include $file;`


    `} else {`


    `throw new Exception("$file can''t be found");`


    `}`


    When using code that might throw an exception, you need to wrap it in a `try`
    block and create a `catch` block to handle the exception (see “Handling Exceptions”
    in [Chapter 3](#A978-1-4842-0635-5_3_Chapter.html)). This PHP solution shows how
    to do this, using the `catch` block to redirect users to a different page if an
    include file can’t be found.


    If you have designed and tested your site thoroughly, this technique should not
    be necessary on most pages that use include files. However, this is by no means
    a pointless exercise. It demonstrates several important features of PHP: how to
    throw and catch exceptions and how to redirect to another page. As you’ll see
    from the following instructions, redirection isn’t always straightforward. This
    PHP solution shows how to overcome the most common problem.


    Continue working with `index.php` from PHP Solution 4-7\. Alternatively, use `index_05.php`
    from the `ch04` folder.


    Copy `error.php` from the `ch04` folder to the site root. Don’t update the links
    in the page if your editing program prompts you to do so. This is a static page
    that contains a generic error message and links back to the other pages.   Open
    `index.php` in your editing program. The navigation menu is the most indispensable
    include file, so edit the `require` command in `index.php` like this:


    `$file =` `''./includes/menu.php'';`


    `if (file_exists($file)` `&&` `is_readable($file)) {`


    `require $file;`


    `} else {`


    `throw new Exception("$file can''t be found");`


    `}`


    Tip


    Storing the path of the include file in a variable like this avoids the need to
    retype it four times, reducing the likelihood of spelling


    To redirect the user to another page, use the `header()` function. However, redirection
    doesn’t work if any output has been sent to the browser before you call `header()`.
    Unless there’s a syntax error, the PHP engine normally processes a page from the
    top, outputting the HTML until it reaches a problem. This means that output will
    have already begun by the time the PHP engine gets to this code. To prevent this
    from happening, start the `try` block before any output is generated. (This actually
    won’t work on many setups, but bear with me, because it demonstrates an important
    point.)


    Scroll to the top of the page and edit the opening PHP code block like this:


    `<?php` `try {`


    `include ''./includes/title.php'';`


    `include ''./includes/random_image.php''; ?>`


    This opens the `try` block.


    Scroll down to the bottom of the page and add the following code after the closing
    `</html>` tag:


    `<?php } catch (Exception $e) {`


    `header(''Location:` `http://localhost/phpsols/error.php` `'');`


    `} ?>`


    This closes the `try` block and creates a `catch` block to handle the exception.
    The code in the `catch` block uses `header()` to redirect the user to `error.php`.


    The `header()` function sends an HTTP header to the browser. It takes as its argument
    a string containing the header and its value separated by a colon. In this case,
    it uses the `Location` header to redirect the browser to the page specified by
    the URL following the colon. Adjust the URL to match your own setup if necessary.


    ![A978-1-4842-0635-5_4_Fig14_HTML.jpg](A978-1-4842-0635-5_4_Fig14_HTML.jpg)


    Figure 4-14.


    The `header()` function won’t work if output has already been sent to the browser
    Save `index.php` and test the page in a browser. It should display as normal.
      Change the value of `$file`, the variable you created in step 2, to point to
    a nonexistent include file, such as `men.php`.   Save `index.php` and reload it
    in your browser. If you’re using XAMPP in your testing environment, you’ll probably
    be correctly redirected to `error.php`. With MAMP (and probably other testing
    setups) you’re likely to see the message in Figure [4-14](#A978-1-4842-0635-5_4_Chapter.html#Fig14).


    The error message in Figure [4-14](#A978-1-4842-0635-5_4_Chapter.html#Fig14) is
    probably responsible for more heads being banged against keyboards than any other.
    (I, too, bear the scars.) As mentioned earlier, the `header()` function cannot
    be used if output has been sent to the browser. So, what’s happened?


    The answer is in the error message, but it’s not immediately obvious. It says
    the error happened on line 51, which is where the `header()` function is called.
    What you really need to know is where the output was generated. That information
    is buried here:


    `(output started at /Applications/MAMP/htdocs/phpsols/index.php:8)`


    The number 8 after the colon is the line number. So, what’s on line 8 of `index.php`?
    As you can see from the following screenshot, line 8 uses `echo` to display the
    value of `$title`.


    ![A978-1-4842-0635-5_4_Fige_HTML.jpg](A978-1-4842-0635-5_4_Fige_HTML.jpg)


    Because there’s no error in the code up to this point, the PHP engine has already
    output the HTML. Once that has happened, `header()` can’t redirect the page.


    Even if you remove this line of PHP, the error message simply reports that output
    started on the next line that contains a PHP block. What’s happening is that the
    web server is outputting all the HTML following the `DOCTYPE`, but the PHP engine
    needs to process a PHP code block before it can report a line number. This poses
    the problem of how to redirect a page after output has been sent to the browser.
    Fortunately, PHP provides the answer by allowing you to store the output in a
    buffer (the web server’s memory).


    Note


    The reason you don’t get this error message in XAMPP and some other setups is
    because output buffering has been turned on in the PHP configuration. XAMPP sets
    the value to 4096, which means that 4 KB of output is stored in the buffer before
    the HTTP headers are sent to the browser. Although useful, this gives you a false
    sense of security because output buffering might not be enabled on your remote
    server. So, keep reading even if you were correctly redirected.


    Edit the code block at the top of `index.php` like this:


    `<?php` `ob_start();`


    `try {`


    `include ''./includes/title.php'';`


    `include ''./includes/random_image.php''; ?>`


    The `ob_start()` function turns on output buffering, preventing any output from
    being sent to the browser before the `header()` function is called.


    The PHP engine automatically flushes the buffer at the end of the script, but
    it’s better to do so explicitly. Edit the PHP code block at the foot of the page
    like this:


    `<?php } catch (Exception $e) {`


    `ob_end_clean();`


    `header(''Location:` `http://localhost/phpsols/error.php` `'');`


    `}`


    `ob_end_flush();`


    `?>`


    Two different functions have been added here. When redirecting to another page,
    you don’t want the HTML stored in the buffer. So, inside the `catch` block, a
    call is made to `ob_end_clean()`, which turns off the buffer and discards its
    contents.


    However, if an exception isn’t thrown, you want to display the contents of the
    buffer, so `ob_end_flush()` is called at the end of the page after both the `try`
    and `catch` blocks. This flushes the contents of the buffer and sends it to the
    browser.


    Change the value of `$file` back to `./includes/menu.php` and save `index.php`.
    When you click the Home link on the error page, `index.php` should display normally.


    ![A978-1-4842-0635-5_4_Fig15_HTML.jpg](A978-1-4842-0635-5_4_Fig15_HTML.jpg)


    Figure 4-15.'
  trans: "\n# PHP 解决方案 4-8：在无法找到包含文件时进行重定向\n\n到目前为止所有建议的技术都只是抑制在找不到包含文件时的错误消息。如果缺少包含文件会导致页面失去意义，那么你应该在包含文件缺失时将用户重定向到错误页面。\n\
    \n一种实现方式是抛出异常，像这样：\n\n```\n$file = './includes/menu.php';\nif (file_exists($file)\
    \ && is_readable($file)) {\n    include $file;\n} else {\n    throw new Exception(\"\
    $file can't be found\");\n}\n```\n\n当使用可能抛出异常的代码时，你需要将其包装在 `try` 块中，并创建一个 `catch`\
    \ 块来处理异常（参见第 3 章中的\"处理异常\"）。这个 PHP 解决方案展示了如何做到这一点，即当找不到包含文件时，使用 `catch` 块将用户重定向到不同的页面。\n\
    \n如果你已经彻底设计和测试了你的网站，那么在大多数使用包含文件的页面上应该不需要用到这种技术。然而，这绝非一个毫无意义的练习。它展示了 PHP 的几个重要特性：如何抛出和捕获异常，以及如何重定向到另一个页面。正如你将从下面的说明中看到的，重定向并不总是那么简单。这个\
    \ PHP 解决方案展示了如何克服最常见的问题。\n\n继续使用 PHP 解决方案 4-7 中的 `index.php`。或者，使用 `ch04` 文件夹中的\
    \ `index_05.php`。\n\n将 `ch04` 文件夹中的 `error.php` 复制到站点根目录。如果你的编辑程序提示你更新页面中的链接，请不要更新。这是一个静态页面，包含一条通用错误消息和返回其他页面的链接。在你的编辑程序中打开\
    \ `index.php`。导航菜单是最不可或缺的包含文件，因此像这样编辑 `index.php` 中的 `require` 命令：\n\n```\n$file\
    \ = './includes/menu.php';\nif (file_exists($file) && is_readable($file)) {\n\
    \    require $file;\n} else {\n    throw new Exception(\"$file can't be found\"\
    );\n}\n```\n\n提示：像这样将包含文件的路径存储在一个变量中，可以避免重复输入四次，从而减少拼写错误的可能性。\n\n要重定向用户到另一个页面，请使用\
    \ `header()` 函数。但是，如果在调用 `header()` 之前有任何输出已经发送到浏览器，重定向就不会工作。除非存在语法错误，否则 PHP 引擎通常会从页面顶部开始处理，输出\
    \ HTML，直到遇到问题。这意味着当 PHP 引擎执行到这段代码时，输出已经开始了。为了防止这种情况，在任何输出生成之前启动 `try` 块。（这在许多设置上实际上不会起作用，但请稍安勿躁，因为它展示了一个重要的点。）\n\
    \n滚动到页面顶部，像这样编辑开头的 PHP 代码块：\n\n```php\n<?php try {\n    include './includes/title.php';\n\
    \    include './includes/random_image.php'; ?>\n```\n\n这样就打开了 `try` 块。\n\n向下滚动到页面底部，在结束的\
    \ `</html>` 标签之后添加以下代码：\n\n```php\n<?php } catch (Exception $e) {\n    header('Location:\
    \ http://localhost/phpsols/error.php ');\n} ?>\n```\n\n这样就关闭了 `try` 块并创建了一个 `catch`\
    \ 块来处理异常。`catch` 块中的代码使用 `header()` 将用户重定向到 `error.php`。\n\n`header()` 函数向浏览器发送一个\
    \ HTTP 头。它接受一个字符串作为参数，该字符串包含由冒号分隔的头及其值。在这里，它使用 `Location` 头将浏览器重定向到冒号后 URL 指定的页面。如果需要，请调整\
    \ URL 以匹配你自己的设置。\n\n![A978-1-4842-0635-5_4_Fig14_HTML.jpg](img/A978-1-4842-0635-5_4_Fig14_HTML.jpg)\n\
    \n图 4-14。如果输出已经发送到浏览器，`header()` 函数将无法工作。\n\n保存 `index.php` 并在浏览器中测试该页面。它应该正常显示。更改\
    \ `$file`（你在第 2 步中创建的变量）的值，使其指向一个不存在的包含文件，例如 `men.php`。保存 `index.php` 并在浏览器中重新加载它。如果你在测试环境中使用\
    \ XAMPP，你很可能被正确地重定向到 `error.php`。使用 MAMP（以及其他测试环境），你很可能会看到图 4-14 中的消息。\n\n图 4-14\
    \ 中的错误消息可能是导致最多人捶键盘的原因了。（我也心头带伤。）如前所述，如果输出已经发送到浏览器，则不能使用 `header()` 函数。那么，到底发生了什么？\n\
    \n答案就在错误消息中，但并非一目了然。它说错误发生在第 51 行，这是调用 `header()` 函数的地方。你真正需要知道的是输出是在哪里生成的。这个信息隐藏在这里：\n\
    \n`(output started at /Applications/MAMP/htdocs/phpsols/index.php:8)`\n\n冒号后面的数字\
    \ 8 是行号。那么，`index.php` 的第 8 行是什么？正如你从下面的屏幕截图中看到的，第 8 行使用 `echo` 来显示 `$title` 的值。\n\
    \n![A978-1-4842-0635-5_4_Fige_HTML.jpg](img/A978-1-4842-0635-5_4_Fige_HTML.jpg)\n\
    \n因为直到这一点代码都没有错误，PHP 引擎已经输出了 HTML。一旦发生这种情况，`header()` 就无法重定向页面。\n\n即使你删除这行 PHP\
    \ 代码，错误消息也只会报告输出是从包含 PHP 块的下一行开始的。实际发生的情况是，web 服务器正在输出 `DOCTYPE` 之后的所有 HTML，但\
    \ PHP 引擎需要处理一个 PHP 代码块才能报告行号。这就提出了一个问题：在输出已经发送到浏览器之后，如何重定向页面。幸运的是，PHP 提供了答案，它允许你将输出存储在一个缓冲区（web\
    \ 服务器的内存）中。\n\n注意：你在 XAMPP 和其他一些设置中不会收到此错误消息的原因是，PHP 配置中已启用输出缓冲。XAMPP 将该值设置为 4096，这意味着在\
    \ HTTP 头发送到浏览器之前，缓冲区中存储了 4 KB 的输出。虽然这很有用，但它给你一种虚假的安全感，因为你的远程服务器上可能没有启用输出缓冲。所以，即使你被正确重定向了，也请继续阅读。\n\
    \n像这样编辑 `index.php` 顶部的代码块：\n\n```php\n<?php ob_start();\ntry {\n    include './includes/title.php';\n\
    \    include './includes/random_image.php'; ?>\n```\n\n`ob_start()` 函数会开启输出缓冲，防止在调用\
    \ `header()` 函数之前有任何输出被发送到浏览器。\n\nPHP 引擎会在脚本结束时自动刷新缓冲区，但最好显式地进行刷新。像这样编辑页面底部的 PHP\
    \ 代码块：\n\n```php\n<?php } catch (Exception $e) {\n    ob_end_clean();\n    header('Location:\
    \ http://localhost/phpsols/error.php ');\n}\nob_end_flush();\n?>\n```\n\n这里添加了两个不同的函数。当重定向到另一个页面时，你不希望缓冲区中存储的\
    \ HTML 被发送出去。因此，在 `catch` 块内部，调用了 `ob_end_clean()`，它会关闭缓冲区并丢弃其内容。\n\n然而，如果没有抛出异常，你希望显示缓冲区的内容，因此在\
    \ `try` 和 `catch` 两个块之后的页面末尾调用了 `ob_end_flush()`。这会刷新缓冲区的内容并将其发送到浏览器。\n\n将 `$file`\
    \ 的值改回 `./includes/menu.php` 并保存 `index.php`。当你点击错误页面上的 Home 链接时，`index.php` 应该会正常显示。\n\
    \n![A978-1-4842-0635-5_4_Fig15_HTML.jpg](img/A978-1-4842-0635-5_4_Fig15_HTML.jpg)\n\
    \n图 4-15。\n"
- fmt: "# 排版后的文本\n\n缓冲输出（Buffering）使浏览器能够重定向到错误页面。保存`index.php`并在浏览器中重新加载。这次，您应该会被重定向到错误页面，如图[4-15](#A978-1-4842-0635-5_4_Chapter.html#Fig15)所示。\n\
    \n您可以将代码与`ch04`文件夹中的`index_06.php`进行比较。\n\n## 选择包含文件（Include Files）的存放位置\n\nPHP包含文件的一个有用特性是它们可以放在任何位置，只要使用`include`命令的页面知道在哪里找到它们即可。包含文件甚至不需要放在Web服务器的根目录内。这意味着您可以将包含敏感信息（如密码）的包含文件保护在浏览器无法访问的私有目录（文件夹）中。因此，如果您的托管公司提供了服务器根目录之外的存储区域，您应该认真考虑将部分（如果不是全部）包含文件存放在那里。\n\
    \n`include`命令需要一个相对路径或完整路径。如果两者都未指定，PHP会自动在PHP配置中指定的`include_path`中查找。下一节将解释如何更改PHP自动搜索包含文件的文件夹。\n\
    \n## 调整您的`include_path`\n\n将包含文件存放在Web服务器的`include_path`中指定的文件夹中的好处是，您无需担心相对路径或绝对路径是否正确。您只需要文件名即可。如果您使用大量包含文件，或者您的站点层级较深，这将非常有用。更改`include_path`有三种方法：\n\
    \n- 编辑`php.ini`中的值：如果您的托管公司允许您访问`php.ini`，这是添加自定义包含文件夹的最佳方式。\n- 使用`.htaccess`或`.user.ini`：如果您的托管公司允许通过`.htaccess`或`.user.ini`文件更改配置，这是一个很好的替代方案。\n\
    - 使用`set_include_path()`：仅在其他选项不可用时使用此方法，因为它仅影响当前文件的`include_path`。\n\n运行`phpinfo()`时，您的Web服务器的`include_path`值会列在配置详情的Core部分。它通常以句点开头，表示当前文件夹，后跟每个要搜索的文件夹的绝对路径。在Linux和Mac\
    \ OS X上，每个路径由冒号分隔。在Windows上，分隔符是分号。在Linux或Mac服务器上，您现有的`include_path`指令可能如下所示：\n\
    \n```\n.:/php/PEAR\n```\n\n在Windows服务器上，等效内容如下所示：\n\n```\n.;C:\\php\\PEAR\n```\n\
    \n### 在`php.ini`或`.user.ini`中编辑`include_path`\n\n在`php.ini`中，找到`include_path`指令。要在您自己的站点中添加一个名为`includes`的文件夹，请在现有值的末尾添加一个冒号或分号（取决于服务器的操作系统），后跟`includes`文件夹的绝对路径。\n\
    \n在Linux或Mac服务器上，像这样使用冒号：\n\n```\ninclude_path=\".:/php/PEAR:/home/mysite/public_html/includes\"\
    \n```\n\n在Windows服务器上，使用分号：\n\n```\ninclude_path=\".;C:\\php\\PEAR;C:\\sites\\\
    mysite\\www\\includes\"\n```\n\n`.user.ini`文件的命令相同。`.user.ini`中的值会覆盖默认值，因此请确保从`phpinfo()`复制现有值并将新路径添加到其中。\n\
    \n### 使用`.htaccess`更改`include_path`\n\n`.htaccess`文件中的值会覆盖默认值，因此请从`phpinfo()`复制现有值并将新路径添加到其中。在Linux或Mac服务器上，值应类似于以下内容：\n\
    \n```\nphp_value include_path \".:/php/PEAR:/home/mysite/public_html/includes\"\
    \n```\n\n在Windows上命令相同，只不过需要用分号分隔路径：\n\n```\nphp_value include_path \".;C:\\php\\\
    PEAR;C:\\sites\\mysite\\www\\includes\"\n```\n\n注意：在`.htaccess`中，不要在`include_path`和路径名列表之间插入等号。\n\
    \n### 使用`set_include_path()`\n\n虽然`set_include_path()`仅影响当前页面，但您可以轻松创建代码片段并将其粘贴到要使用它的页面中。PHP还简化了获取现有`include_path`并以平台无关的方式将其与新路径结合的操作。\n\
    \n将新路径存储在一个变量中，然后与现有值结合，如下所示：\n\n```php\n$includes_folder = '/home/mysite/public_html/includes';\n\
    set_include_path(get_include_path() . PATH_SEPARATOR . $includes_folder);\n```\n\
    \n看起来像是向`set_include_path()`传递了三个参数，但实际上只有一个；这三个元素由连接运算符（句点）连接，而不是逗号。\n\n- `get_include_path()`\
    \ 获取现有的`include_path`。\n- `PATH_SEPARATOR`是一个PHP常量，它会根据操作系统自动插入冒号或分号。\n- `$includes_folder`添加新路径。\n\
    \n这种方法的问题在于，新`includes`文件夹的路径在远程服务器和本地测试服务器上可能不相同。您可以使用条件语句来解决这个问题。超全局变量`$_SERVER['HTTP_HOST']`包含网站的域名。如果您的域名是`www.example.com`，您可以像这样为每个服务器设置正确的路径：\n\
    \n```php\nif ($_SERVER['HTTP_HOST'] == 'www.example.com') {\n    $includes_folder\
    \ = '/home/example/public_html/includes';\n} else {\n    $includes_folder = 'C:/xampp/htdocs/phpsols/includes';\n\
    }\nset_include_path(get_include_path() . PATH_SEPARATOR . $includes_folder);\n\
    ```\n\n对于不使用许多包含文件的小型网站来说，使用`set_include_path()`可能并不值得。但在更复杂的项目中，您可能会发现它很有用。\n\
    \n## 为什么我不能在PHP包含文件中使用站点根目录相对链接？\n\n嗯，您可以使用，但也不能用。为清楚起见，我将首先解释文档相对链接和站点根目录相对链接之间的区别。\n\
    \n### 文档相对链接\n\n当您单击链接转到另一个页面时，`<a>`标签中的路径告诉浏览器如何从当前页面到达下一个页面。大多数Web创作工具指定的路径是相对于当前文档的。如果目标页面在同一文件夹中，则仅使用文件名。如果目标页面比当前页面高一级，则文件名前会加上`../`。这被称为文档相对路径或链接。如果您的站点有许多文件夹层级，这种类型的链接可能难以理解（至少对人类来说如此）。\n\
    \n### 站点根目录相对链接\n\n另一种类型的链接始终以正斜杠开头，它是站点根目录的简写。站点根目录相对路径的优点是，无论当前页面在站点层级中多深，开头的正斜杠都能保证Web服务器将从站点的顶层开始查找。尽管站点根目录相对链接更容易阅读，但PHP的`include`命令无法处理它们。您必须使用文档相对路径、绝对路径，或者在`include_path`指令中指定`includes`文件夹。\n\
    \n您可以通过将超全局变量`$_SERVER['DOCUMENT_ROOT']`连接到路径的开头来将站点根目录相对路径转换为绝对路径，如下所示：\n\n```php\n\
    include $_SERVER['DOCUMENT_ROOT'] . '/includes/filename.php';\n```\n\n大多数服务器支持`$_SERVER['DOCUMENT_ROOT']`，但您应该检查`phpinfo()`显示的配置详情底部的PHP\
    \ Variables部分以确认。"
  raw: 'Buffering the output enables the browser to redirect to the error page Save
    `index.php` and reload it in a browser. This time, you should be redirected to
    the error page, as shown in Figure [4-15](#A978-1-4842-0635-5_4_Chapter.html#Fig15).


    You can compare your code with `index_06.php` in the `ch04` folder.


    ### Choosing where to Locate your Include Files


    A useful feature of PHP include files is that they can be located anywhere, as
    long as the page with the include command knows where to find them. Include files
    don’t even need to be inside your web server root. This means that you can protect
    include files that contain sensitive information, such as passwords, in a private
    directory (folder) that cannot be accessed through a browser. So, if your hosting
    company provides a storage area outside your server root, you should seriously
    consider locating some, if not all, of your include files there.


    An include command expects either a relative path or a fully qualified path. If
    neither is given, PHP automatically looks in the `include_path` specified in your
    PHP configuration. The following section explains how to change the folders in
    which PHP automatically searches for include files.


    ### Adjusting your include_path


    The advantage of locating include files in a folder specified in your web server’s
    `include_path` is that you don’t need to worry about getting the relative or absolute
    path correct. All you need is the filename. This can be very useful if you use
    a lot of includes or you have a site hierarchy several levels deep. There are
    three ways to change the `include_path`:


    *   Edit the value in `php.ini`: If your hosting company gives you access to `php.ini`,
    this is the best way to add a custom includes folder.

    *   Use `.htaccess` or `.user.ini`: If your hosting company allows changes to
    the configuration with an `.htaccess` or `.user.ini` file, this is a good alternative.

    *   Use `set_include_path()`: Use this only if the previous options are not available
    to you, because it affects the `include_path` only for the current file.


    The value of the `include_path` for your web server is listed in the Core section
    of the configuration details when you run `phpinfo()`. It normally begins with
    a period, which indicates the current folder, and is followed by the absolute
    path of each folder to be searched. On Linux and Mac OS X, each path is separated
    by a colon. On Windows, the separator is a semicolon. On a Linux or Mac server
    your existing `include_path` directive might look like this:


    `.:/php/PEAR`


    On a Windows server, the equivalent would look like this:


    `.;C:\php\PEAR`


    #### Editing the include_path in php.ini or .user.ini


    In `php.ini`, locate the `include_path` directive. To add a folder called `includes`
    in your own site, add a colon or semicolon—depending on your server’s operating
    system—at the end of the existing value, followed by the absolute path to the
    `includes` folder.


    On a Linux or Mac server, use a colon like this:


    `include_path=".:/php/PEAR` `:/home/mysite/public_html/includes` `"`


    On a Windows server, use a semicolon:


    `include_path=".;C:\php\PEAR` `;C:\sites\mysite\www\includes` `"`


    The commands are the same for a `.user.ini` file. The value in `.user.ini` overrides
    the default, so make sure you copy the existing value from `phpinfo()` and add
    the new path to it.


    #### Using .htaccess to Change the include_path


    The value in an `.htaccess` file overrides the default, so copy the existing value
    from `phpinfo()` and add the new path to it. On a Linux or Mac server, the value
    should be similar to this:


    `php_value include_path ".:/php/PEAR` `:/home/mysite/public_html/includes` `"`


    The command is the same on Windows, except that you separate the paths with a
    semicolon:


    `php_value include_path ".;C:\php\PEAR` `;C:\sites\mysite\www\includes` `"`


    Caution


    In `.htaccess`, do not insert an equal sign between `include_path` and the list
    of path names.


    #### Using set_include_path( )


    Although `set_include_path()` affects only the current page, you can easily create
    a code snippet and paste it into pages in which you want to use it. PHP also makes
    it easy to get the existing `include_path` and combine it with the new one in
    a platform-neutral way.


    Store the new path in a variable and then combine it with the existing value,
    like this:


    `$includes_folder = ''/home/mysite/public_html/includes'';`


    `set_include_path(get_include_path() . PATH_SEPARATOR . $includes_folder);`


    It looks as though three arguments are being passed to `set_include_path()`, but
    it’s only one; the three elements are joined by the concatenation operator (a
    period), not commas.


    *   `get_include_path()` gets the existing `include_path`.

    *   `PATH_SEPARATOR` is a PHP constant that automatically inserts a colon or semicolon
    depending on the operating system.

    *   `$includes_folder` adds the new path.


    The problem with this approach is that the path to the new `includes` folder won’t
    be the same on your remote and local testing servers. You can fix that with a
    conditional statement. The superglobal variable `$_SERVER[''HTTP_HOST'']` contains
    the domain name of the website. If your domain is [`www.example.com`](http://www.example.com/)
    , you can set the correct path for each server like this:


    `if ($_SERVER[''HTTP_HOST''] == ''` [`www.example.com`](http://www.example.com/)
    `'') {`


    `$includes_folder = ''/home/example/public_html/includes'';`


    `} else {`


    `$includes_folder = ''C:/xampp/htdocs/phpsols/includes'';`


    `}`


    `set_include_path(get_include_path() . PATH_SEPARATOR . $includes_folder);`


    Using `set_include_path()` is probably not worthwhile for small websites that
    don’t use many include files. However, you might find it useful on more complex
    projects.


    ### Why can’t I Use Site-root-relative Links with PHP Includes?


    Well, you can and you can’t. For the sake of clarity, I’ll begin by explaining
    the distinction between links relative to the document and to the site root.


    #### Document-relative Links


    When you click a link to go to another page, the path in the `<a>` tag tells the
    browser how to get from the current page to the next one. Most web-authoring tools
    specify the path relative to the current document. If the target page is in the
    same folder, just the filename is used. If it’s one level higher than the current
    page, the filename is preceded by `../`. This is known as a document-relative
    path or link. If you have a site with many levels of folders, this type of link
    can be difficult to understand—at least for humans.


    #### Links Relative to the Site Root


    The other type of link always begins with a forward slash, which is shorthand
    for the site root. The advantage of a site-root-relative path is that it doesn’t
    matter how deep the current page is in the site hierarchy, the forward slash at
    the beginning guarantees the web server will start looking from the top level
    of the site. Although site-root-relative links are much easier to read, PHP include
    commands can’t handle them. You must use a document-relative path, an absolute
    path, or specify the `includes` folder in your `include_path` directive.


    You can convert a site-root-relative path to an absolute one by concatenating
    the superglobal variable `$_SERVER[''DOCUMENT_ROOT'']` to the beginning of the
    path, like this:


    `include` `$_SERVER[''DOCUMENT_ROOT''] .` `''/includes/filename.php'';`


    Most servers support `$_SERVER[''DOCUMENT_ROOT'']`, but you should check the PHP
    Variables section at the bottom of the configuration details displayed by `phpinfo()`
    to make sure.'
  trans: "\n# 排版后的文本\n\n缓冲输出（Buffering）使浏览器能够重定向到错误页面。保存`index.php`并在浏览器中重新加载。这次，您应该会被重定向到错误页面，如图\
    \ 4-15 所示。\n\n您可以将代码与`ch04`文件夹中的`index_06.php`进行比较。\n\n## 选择包含文件（Include Files）的存放位置\n\
    \nPHP 包含文件的一个有用特性是它们可以放在任何位置，只要使用`include`命令的页面知道在哪里找到它们即可。包含文件甚至不需要放在 Web 服务器的根目录内。这意味着您可以将包含敏感信息（如密码）的包含文件保护在浏览器无法访问的私有目录（文件夹）中。因此，如果您的托管公司提供了服务器根目录之外的存储区域，您应该认真考虑将部分（如果不是全部）包含文件存放在那里。\n\
    \n`include`命令需要一个相对路径或完整路径。如果两者都未指定，PHP 会自动在 PHP 配置中指定的`include_path`中查找。下一节将解释如何更改\
    \ PHP 自动搜索包含文件的文件夹。\n\n## 调整您的`include_path`\n\n将包含文件存放在 Web 服务器的`include_path`中指定的文件夹中的好处是，您无需担心相对路径或绝对路径是否正确。您只需要文件名即可。如果您使用大量包含文件，或者您的站点层级较深，这将非常有用。更改`include_path`有三种方法：\n\
    \n- 编辑`php.ini`中的值：如果您的托管公司允许您访问`php.ini`，这是添加自定义包含文件夹的最佳方式。\n- 使用`.htaccess`或`.user.ini`：如果您的托管公司允许通过`.htaccess`或`.user.ini`文件更改配置，这是一个很好的替代方案。\n\
    - 使用`set_include_path()`：仅在其他选项不可用时使用此方法，因为它仅影响当前文件的`include_path`。\n\n运行`phpinfo()`时，您的\
    \ Web 服务器的`include_path`值会列在配置详情的 Core 部分。它通常以句点开头，表示当前文件夹，后跟每个要搜索的文件夹的绝对路径。在\
    \ Linux 和 Mac OS X 上，每个路径由冒号分隔。在 Windows 上，分隔符是分号。在 Linux 或 Mac 服务器上，您现有的`include_path`指令可能如下所示：\n\
    \n```\n.:/php/PEAR\n```\n\n在 Windows 服务器上，等效内容如下所示：\n\n```\n.;C:\\php\\PEAR\n\
    ```\n\n### 在`php.ini`或`.user.ini`中编辑`include_path`\n\n在`php.ini`中，找到`include_path`指令。要在您自己的站点中添加一个名为`includes`的文件夹，请在现有值的末尾添加一个冒号或分号（取决于服务器的操作系统），后跟`includes`文件夹的绝对路径。\n\
    \n在 Linux 或 Mac 服务器上，像这样使用冒号：\n\n```\ninclude_path=\".:/php/PEAR:/home/mysite/public_html/includes\"\
    \n```\n\n在 Windows 服务器上，使用分号：\n\n```\ninclude_path=\".;C:\\php\\PEAR;C:\\sites\\\
    mysite\\www\\includes\"\n```\n\n`.user.ini`文件的命令相同。`.user.ini`中的值会覆盖默认值，因此请确保从`phpinfo()`复制现有值并将新路径添加到其中。\n\
    \n### 使用`.htaccess`更改`include_path`\n\n`.htaccess`文件中的值会覆盖默认值，因此请从`phpinfo()`复制现有值并将新路径添加到其中。在\
    \ Linux 或 Mac 服务器上，值应类似于以下内容：\n\n```\nphp_value include_path \".:/php/PEAR:/home/mysite/public_html/includes\"\
    \n```\n\n在 Windows 上命令相同，只不过需要用分号分隔路径：\n\n```\nphp_value include_path \".;C:\\\
    php\\PEAR;C:\\sites\\mysite\\www\\includes\"\n```\n\n注意：在`.htaccess`中，不要在`include_path`和路径名列表之间插入等号。\n\
    \n### 使用`set_include_path()`\n\n虽然`set_include_path()`仅影响当前页面，但您可以轻松创建代码片段并将其粘贴到要使用它的页面中。PHP\
    \ 还简化了获取现有`include_path`并以平台无关的方式将其与新路径结合的操作。\n\n将新路径存储在一个变量中，然后与现有值结合，如下所示：\n\
    \n```php\n$includes_folder = '/home/mysite/public_html/includes';\nset_include_path(get_include_path()\
    \ . PATH_SEPARATOR . $includes_folder);\n```\n\n看起来像是向`set_include_path()`传递了三个参数，但实际上只有一个；这三个元素由连接运算符（句点）连接，而不是逗号。\n\
    \n- `get_include_path()` 获取现有的`include_path`。\n- `PATH_SEPARATOR`是一个 PHP 常量，它会根据操作系统自动插入冒号或分号。\n\
    - `$includes_folder`添加新路径。\n\n这种方法的问题在于，新`includes`文件夹的路径在远程服务器和本地测试服务器上可能不相同。您可以使用条件语句来解决这个问题。超全局变量`$_SERVER['HTTP_HOST']`包含网站的域名。如果您的域名是`www.example.com`，您可以像这样为每个服务器设置正确的路径：\n\
    \n```php\nif ($_SERVER['HTTP_HOST'] == 'www.example.com') {\n    $includes_folder\
    \ = '/home/example/public_html/includes';\n} else {\n    $includes_folder = 'C:/xampp/htdocs/phpsols/includes';\n\
    }\nset_include_path(get_include_path() . PATH_SEPARATOR . $includes_folder);\n\
    ```\n\n对于不使用许多包含文件的小型网站来说，使用`set_include_path()`可能并不值得。但在更复杂的项目中，您可能会发现它很有用。\n\
    \n## 为什么我不能在 PHP 包含文件中使用站点根目录相对链接？\n\n嗯，您可以使用，但也不能用。为清楚起见，我将首先解释文档相对链接和站点根目录相对链接之间的区别。\n\
    \n### 文档相对链接\n\n当您单击链接转到另一个页面时，`<a>`标签中的路径告诉浏览器如何从当前页面到达下一个页面。大多数 Web 创作工具指定的路径是相对于当前文档的。如果目标页面在同一文件夹中，则仅使用文件名。如果目标页面比当前页面高一级，则文件名前会加上`../`。这被称为文档相对路径或链接。如果您的站点有许多文件夹层级，这种类型的链接可能难以理解（至少对人类来说如此）。\n\
    \n### 站点根目录相对链接\n\n另一种类型的链接始终以正斜杠开头，它是站点根目录的简写。站点根目录相对路径的优点是，无论当前页面在站点层级中多深，开头的正斜杠都能保证\
    \ Web 服务器将从站点的顶层开始查找。尽管站点根目录相对链接更容易阅读，但 PHP 的`include`命令无法处理它们。您必须使用文档相对路径、绝对路径，或者在`include_path`指令中指定`includes`文件夹。\n\
    \n您可以通过将超全局变量`$_SERVER['DOCUMENT_ROOT']`连接到路径的开头来将站点根目录相对路径转换为绝对路径，如下所示：\n\n```php\n\
    include $_SERVER['DOCUMENT_ROOT'] . '/includes/filename.php';\n```\n\n大多数服务器支持`$_SERVER['DOCUMENT_ROOT']`，但您应该检查`phpinfo()`显示的配置详情底部的\
    \ PHP Variables 部分以确认。\n"
- fmt: '### Links Inside Include Files


    This is the point that tends to confuse many people. Although the PHP include
    commands don’t understand site-root-relative links, the links inside an include
    file should normally be relative to the site root. This is because an include
    file can be included at any level of the site hierarchy, so document-relative
    links break when a file is included at a different level.


    **Note:** The navigation menu in `menu.php` uses document-relative links rather
    than ones relative to the site root. They have been deliberately left like that
    because, unless you have created a virtual host, the site root is `localhost`,
    not `phpsols`. This is a disadvantage of testing a site in a subfolder of the
    web server’s document root. The Japan Journey site used throughout this book has
    only one level, so the document-relative links work. When developing a site that
    uses multiple levels of folders, use site-root-relative links inside your include
    files and consider setting up a virtual host for testing (see [Chapter 2](#A978-1-4842-0635-5_2_Chapter.html)
    for details).


    ### Nesting Include Files


    Once a file has been included in another, relative paths are calculated from the
    parent file, not from the included file. This presents problems for functions
    or class definitions in an external file that need to include another external
    file.


    If both external files are in the same folder, you include a nested file with
    just the filename, like this:


    `require_once ''Thumbnail.php'';`


    In this case, the relative path should not begin with `./` because `./` means
    “start from this folder.” With an include file, “this folder” means the parent
    file’s folder, not the include file’s folder, resulting in an incorrect path to
    the nested file.


    When the include files are in different folders, you can build an absolute path
    to the target file using the PHP constant `__DIR__`. This constant returns the
    absolute path of the include file’s directory (folder) without a trailing slash.
    Concatenating `__DIR__`, a forward slash, and a document-relative path converts
    the relative path into an absolute one. For example, let’s say this is the relative
    path from one include file to another:


    `''../File/Upload.php''`


    You convert it into an absolute path like this:


    `__DIR__ . ''/../File/Upload.php''`


    For convenience, the forward slash is added to the beginning of the document-relative
    path. This has the effect of finding the parent folder of the include file, then
    going back up one level to find the correct path.


    You’ll see an example of this in use in [Chapter 8](#A978-1-4842-0635-5_8_Chapter.html),
    where an include file needs to include another file that’s in a different folder.


    ## Security Considerations with Includes


    Include files are a very powerful feature of PHP. With that power come security
    risks. As long as the external file is accessible, PHP includes it and incorporates
    any code into the main script. But, as mentioned earlier in this chapter, include
    files can be located anywhere. Technically speaking, they can even be on a different
    server. However, this was considered such a security risk that a new configuration
    directive, `allow_url_include`, was introduced in PHP 5.2. The default setting
    is `Off`, so it’s now impossible to include files from a different server unless
    you have complete control over your server’s configuration. Unlike `include_path`,
    the `allow_url_include` directive cannot be overridden except by the server administrator.


    Even if you control both servers yourself, you should never include a file from
    a different server. It’s possible for an attacker to spoof the address and try
    to execute a malicious script on your site.


    ## Chapter Review


    This chapter has plunged you headlong into the world of PHP, using includes, arrays,
    and multidimensional arrays. It has shown you how to extract the name of the current
    page, display a random image, and get the image’s dimensions. You have also learned
    how to throw and catch exceptions and to redirect to a different page. There’s
    a lot to absorb, so don’t worry if it doesn’t all sink in the first time. The
    more you use PHP, the more familiar you’ll become with the basic techniques. In
    the next chapter you’ll learn how PHP processes input from online forms and will
    use that knowledge to send feedback from a website to your email inbox.


    # 5. Bringing Forms to Life


    Forms lie at the very heart of working with PHP. You use forms for logging in
    to restricted pages, registering new users, placing orders with online stores,
    entering and updating information in a database, sending feedback... and the list
    goes on. The same principles lie behind all these uses, so the knowledge you gain
    from this chapter will have practical value in most PHP applications. To demonstrate
    how to process information from a form, I’m going to show you how to gather feedback
    from visitors to your site and send it to your mailbox.


    Unfortunately, user input can expose your site to malicious attacks. It’s important
    to check data submitted from a form before accepting it. Although HTML5 form elements
    validate user input in the most recent browsers, you still need to check the data
    on the server. HTML5 validation helps legitimate users avoid submitting a form
    with errors, but malicious users can easily sidestep checks performed in the browser.
    Server-side validation is not optional, but essential. The PHP solutions in this
    chapter show you how to filter out or block anything suspicious or dangerous.
    It doesn’t take a lot of effort to keep marauders at bay. It’s also a good idea
    to preserve user input and redisplay it if the form is incomplete or errors are
    discovered.


    These solutions build a complete mail-processing script that can be reused in
    different forms, so it’s important to read them in sequence.


    In this chapter, you’ll learn about the following:


    - Understanding how user input is transmitted from an online form

    - Displaying errors without losing user input

    - Validating user input

    - Sending user input by email'
