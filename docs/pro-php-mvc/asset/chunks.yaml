    \n> **注意** 如果您想了解更多关于 PHP 命名空间的信息，可以查看完整的文档（以及一些示例），网址为 [`php.net/manual/en/language.namespaces.php`](http://php.net/manual/en/language.namespaces.php)。\n\
    \n## 异常\n\nPHP 处理改变程序正常流程的特殊情况（例如运行时错误）的方式之一是抛出异常。除了内置的 `Exception` 类，PHP 还具备检测\
    \ `Exception` 发生并在发生时执行有用操作的机制。清单 2-4 展示了一个示例。\n\n***清单 2-4.*** Try/Catch 控制流语句\n\
    \n```\ntry\n{\n    throw new Exception();\n}\ncatch (Exception $e)\n{\n    echo\
    \ \"已抛出一个异常。\";\n}\n```\n\n在本书中，我们将看到处理各种 `Exception` 子类的代码。其中大部分子类将由我们自己创建，尽管它们会是\
    \ SPL 中发现的异常类的子类。您可能想知道，如果我们能直接使用 `try`/`catch` `Exception` 来处理框架中的错误（如清单 2-5\
    \ 所示），为什么还需要继承 `Exception`（或任何 SPL Exception 子类）。\n\n`[www.it-ebooks.info](http://www.it-ebooks.info/)`\n\
    \n## 第 2 章 ■ 基础\n\n***清单 2-5.*** 捕获多种异常类型\n\n```\ntry\n{\n    throw new LogicException();\n\
    }\ncatch (ClassDidNotLoadException $e)\n{\n    // 仅当抛出的 Exception\n    // 类型为\
    \ \"LogicException\" 时执行\n    echo \"LogicException 已抛出！\";\n}\ncatch (Exception\
    \ $e)\n{\n    // 仅当抛出的 Exception\n    // 未被之前任何 catch 块捕获时执行\n    echo \"出错了，但我们不知道具体是什么问题……\"\
    ;\n}\n```\n\n如您所见，PHP 的 `try`/`catch` 语句允许我们捕获多种类型的 `Exception`。当我们只能预期发生一种类型的\
    \ `Exception` 时，这并没有太大价值；但在一个包含许多类和上下文的复杂框架中，它在维护系统稳定性方面变得非常有价值。\n\n设想一个我们与数据库交互的场景。一次简单的记录更新可能会因上下文不同而失败。可能无法连接数据库、缺少数据导致验证失败，甚至是我们发送给数据库的底层\
    \ SQL 中存在语法错误。所有这些上下文都可能对应不同的 `Exception` 子类，并且可以通过同一个 `try`/`catch` 语句轻松捕获。\n"
- fmt: "创建许多异常子类的一个好处是，我们可以根据抛出的异常子类来响应用户界面。我们可能希望根据抛出的`Exception`是由数据库问题还是缓存类问题等引起的，来显示不同的视图。\n\
    \n重要的是要记住，任何时候看到抛出的类实例包含单词`Exception`，这很可能是我们创建来表示特定错误的`Exception`子类。我们不会总是涵盖每个`Exception`子类的代码，但至少我们知道创建它们的原因，并且它们与原始的`Exception`类相似。\n\
    \n## 类型方法\n\n在本章及后续章节中，我们将使用许多实用方法来处理我们在PHP中找到的基本数据类型。为了保持代码的组织性，我们会将这些实用方法作为静态类型类上的静态方法包含进来；例如，`StringMethods`类上的字符串方法（见列表2-6），`ArrayMethods`类上的数组方法（见列表2-7），等等。随着时间的推移，我们将向这些类添加内容，但现在它们将包含列表2-6和2-7中给出的方法。\n\
    \n**列表2-6.** `StringMethods`类\n\n```php\nnamespace Framework\n{\n    class StringMethods\n\
    \    {\n        private static $_delimiter = \"#\";\n        private function\
    \ __construct()\n        {\n            // do nothing\n        }\n        private\
    \ function __clone()\n        {\n            // do nothing\n        }\n      \
    \  private static function _normalize($pattern)\n        {\n            return\
    \ self::$_delimiter.trim($pattern, self::$_delimiter).self::$_delimiter;\n   \
    \     }\n        public static function getDelimiter()\n        {\n          \
    \  return self::$_delimiter;\n        }\n        public static function setDelimiter($delimiter)\n\
    \        {\n            self::$_delimiter = $delimiter;\n        }\n        public\
    \ static function match($string, $pattern)\n        {\n            preg_match_all(self::_normalize($pattern),\
    \ $string, $matches, PREG_PATTERN_ORDER);\n            if (!empty($matches[1]))\n\
    \            {\n                return $matches[1];\n            }\n         \
    \   if (!empty($matches[0]))\n            {\n                return $matches[0];\n\
    \            }\n            return null;\n        }\n        public static function\
    \ split($string, $pattern, $limit = null)\n        {\n            $flags = PREG_SPLIT_NO_EMPTY\
    \ | PREG_SPLIT_DELIM_CAPTURE;\n            return preg_split(self::_normalize($pattern),\
    \ $string, $limit, $flags);\n        }\n    }\n}\n```\n\n`$_delimiter`和`_normalize()`成员都是用于正则表达式字符串的规范化，以便其余方法无需先检查或规范化就能对它们进行操作。`match()`和`split()`方法执行类似于`preg_match_all()`和`preg_split()`函数的功能，但对正则表达式所需的正式结构要求更低，并返回更可预测的结果集。`match()`方法将返回第一个捕获的子字符串、整个子字符串匹配或`null`。`split()`方法将在设置一些标志并规范化正则表达式后，返回对`preg_split()`函数的调用结果。\n\
    \n**列表2-7.** `ArrayMethods`类\n\n```php\nnamespace Framework\n{\n    class ArrayMethods\n\
    \    {\n        private function __construct()\n        {\n            // do nothing\n\
    \        }\n        private function __clone()\n        {\n            // do nothing\n\
    \        }\n        public static function clean($array)\n        {\n        \
    \    return array_filter($array, function($item) {\n                return !empty($item);\n\
    \            });\n        }\n        public static function trim($array)\n   \
    \     {\n            return array_map(function($item) {\n                return\
    \ trim($item);\n            }, $array);\n        }\n    }\n}\n```\n\n`clean()`方法移除所有被视为空值（`empty()`）的元素，并返回结果数组。`trim()`方法返回一个数组，该数组包含初始数组经过去除所有空白字符处理后的所有元素。\n\
    \n> **注意** 我们并不是要重新创建每一个内置的PHP函数。只要你的代码可以轻松地使用内置函数实现，就一定要确保你创建方法的原因值得由此带来的混淆和重复。什么时候是重新发明轮子的好时机？只有当你有一个更好的轮子的时候！"
  raw: 'One final benefit of creating many Exception subclasses is that we can respond
    to the user interface based on what Exception subclass is being thrown. We might
    want to display different views depending on whether the Exception thrown is caused
    by a problem in the database, or caused by a problem in the caching classes, and
    so forth.


    It is important to remember that any time you see a class instance being thrown
    that contains the word Exception, it is likely an Exception subclass that we have
    created to signify a specific error. We won’t always cover the code for individual
    Exception subclasses, but at least we know the reasons for creating them, and
    that they resemble the original Exception class.


    Type Methods


    In the remainder of this chapter, and the following chapters, we will be using
    many utility methods for working with the basic data types we find in PHP. To
    keep the code organized, we will include these utility methods as static methods
    on static type classes; for example, string methods on the StringMethods class
    (see Listing 2-6), array methods on the ArrayMethods class (see Listing 2-7),
    and so forth. We will be adding to these classes over time, but for now they will
    contain the methods given in Listings 2-6 and 2-7.


    ***Listing 2-6.*** The StringMethods Class


