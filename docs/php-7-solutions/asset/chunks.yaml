    \ comparisons to make decisions\n\n*   Executing the same code repeatedly inside\
    \ a loop\n\n*   Modularizing code with functions\n\n*   Using generators to yield\
    \ a series of values\n\n*   Understanding classes and objects\n\n*   Creating\
    \ new variables dynamically\n\nUsing PHP in an Existing Web Site \nPHP code is\
    \ normally processed only in pages that use the `.php` filename\nextension. Although\
    \ you can mix `.html` and `.php` pages in the\nsame web site, it’s a good idea\
    \ to use only `.php`, even if not\nevery page contains dynamic features. This\
    \ gives you the flexibility to\nadd PHP to pages without breaking existing links\
