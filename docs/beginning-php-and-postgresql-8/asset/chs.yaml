  ?>\n```\n\n如果您使用该字段搜索关键词“Apache PHP”，它将返回以下结果列表，每个条目都是一个指向指定网站的链接：  \nApache 站点\
  \  \nPHP：超文本预处理器  \nApache 周刊  \n\n当然，与前面的示例一样，您需要添加额外的代码来处理数据清理。您可能还想修改查询，以利用 `tsearch2`\
  \ 中的排名函数，并对结果进行相应排序——我们将这些任务留给读者作为练习。\n\n### 总结\n\n表索引是优化查询的可靠方法。在本章中，我们介绍了这一主题，并向您展示了如何创建主键索引、唯一索引、普通索引和全文索引，其中后者使用了\
  \ `tsearch2` 模块。接着，我们演示了如何轻松创建支持 PHP 的搜索界面，用于查询 PostgreSQL 表。\n\n在下一章中，我们将介绍 PostgreSQL\
  \ 的事务特性，并向您展示如何通过扩展第 31 章首次介绍的 PostgreSQL 数据类，将事务整合到您的 Web 应用程序中。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n第 36 章  \n■ ■ ■  \n事务\n\n**本**章介绍 PostgreSQL 的事务能力，并演示如何通过 PostgreSQL 客户端和 PHP\
  \ 脚本执行事务。通过本章的学习，您将全面了解事务的概念、PostgreSQL 如何实现事务，以及如何在 PHP 应用程序中使用事务。首先，我们正式定义事务。\n\
  \n### 什么是事务？\n\n*事务*是一组被视为单个单元的有序数据库操作。  \n如果组中的所有操作都成功，则该事务被视为成功；如果哪怕只有一个操作失败，则该事务被视为失败。如果所有操作都成功完成，该事务将被*提交*，其更改将对所有其他数据库进程可见。如果某个操作失败，该事务将被*回滚*，组成该事务的所有操作的效果都将被撤销。在事务执行期间发生的任何更改，仅对该事务所属的进程可见，并且这种状态将一直持续到更改被实际提交。这可以防止其他线程可能使用那些因回滚而即将失效的数据，从而导致数据完整性受损。\n\
  \n事务能力是企业数据库的关键组成部分，因为许多业务流程都包含多个步骤。以客户尝试在线购物为例。在结账时，客户的购物车将与现有库存进行比对，以确保有货。接着，客户必须提供账单和收货信息，此时系统将检查信用卡是否有足够的可用资金并进行扣款。然后，产品库存将相应减少，发货部门将收到待处理订单的通知。如果其中任何一步失败，则不应执行其他任何步骤。试想一下，客户发现信用卡已被扣款，但产品却因库存不足而从未送达时的沮丧。同样，作为在线卖家，如果信用卡无效或提供的收货信息不足，您也不会想减少库存甚至发货。\n\
  \n事务由其遵循的四个原则定义，这些原则体现在 ACID 这个缩写词中：\n\n- **原子性（Atomicity）：** 事务的所有步骤必须成功完成；否则，任何一个步骤都不会被提交。\n\
  - **一致性（Consistency）：** 事务的所有步骤必须成功完成；否则，所有数据将恢复到事务开始前的状态。\n- **隔离性（Isolation）：**\
  \ 任何尚未完成的事务所执行的步骤必须与系统隔离，直到该事务被认定为完成。\n- **持久性（Durability）：** 所有已提交的数据必须由系统以某种方式保存，以便在系统发生故障时，数据能够成功恢复到有效状态。\n\
  \n随着您在本章中进一步了解 PostgreSQL 的事务支持，您将理解必须遵循这些原则以确保数据库完整性。\n\n### PostgreSQL 的事务能力\n\
  \nPostgreSQL 通过一种称为多版本并发控制（MVCC）的方法来支持事务。这意味着，当一个事务正在进行时，它会看到自己独立于底层数据实际状态的数据库快照。这可以防止任何给定事务看到其他事务可能已启动但尚未提交的部分数据更改。这一原则被称为*事务隔离*。\n\
  \n#### 事务隔离\n\nSQL 标准规定了三个属性，用于确定事物处于四种隔离级别中的哪一种。这三个属性如下：\n\n- **脏读（Dirty reads）：**\
  \ 一个事务可以读取另一个未提交的并发事务所写入的数据。\n- **不可重复读（Nonrepeatable reads）：** 一个事务重新读取之前已读取过的数据，并看到了另一个并发事务已提交的数据。\n\
  - **幻读（Phantom reads）：** 一个事务重新执行返回一组数据的查询，并发现满足条件的数据因另一个最近提交的事务而发生了变化。\n\n这三个条件决定了一个事务的隔离级别，可以是表\
  \ 36-1 中列出的四个级别之一。\n\n**表 36-1.** *SQL 标准事务隔离级别*\n\n| 事务隔离级别 | 脏读 | 不可重复读 | 幻读 |\n\
  |----------------------------|-------------|--------------------|---------------|\n\
  | 读未提交（Read Uncommitted） | 允许 | 允许 | 允许 |\n| 读已提交（Read Committed） | 不允许 | 允许 | 允许\
  \ |\n| 可重复读（Repeatable Read） | 不允许 | 不允许 | 允许 |\n| 可串行化（Serializable） | 不允许 | 不允许\
  \ | 不允许 |\n\nPostgreSQL 允许您请求任何事务隔离级别。然而，在内部，该级别将被设置为以下两个级别之一：`read committed` 或\
  \ `serializable`。虽然这似乎有悖直觉，但这是 SQL 标准所允许的，该标准只要求数据库强制执行那些*不允许*的事务属性，而允许可选地强制执行那些*允许*的事务属性。例如，如果您请求\
  \ `repeatable read` 模式，标准只要求您禁止脏读和不可重复读，但实际上并不要求允许幻读。因此，`serializable` 事务模式符合 `repeatable\
  \ read` 模式的要求，即使它与定义不完全匹配。正因为如此，您应该知道，当您请求 `read uncommitted` 时，您实际得到的是 `read committed`；而您请求\
  \ `repeatable read` 时，您实际得到的是 `serializable`。\n\n您还应该知道，默认情况下，当您不请求特定隔离级别时，您会得到\
  \ `read committed` 隔离级别。这两个级别的主要区别在于，在 `read committed` 模式下，`SELECT` 查询会看到在给定事务内发生更改的已提交数据；但在\
  \ `serializable` 模式下，`SELECT` 语句始终看到事务开始时的数据。这意味着连续的 `SELECT` 语句在 `read committed`\
  \ 模式下可能看到不同的数据，但在 `serializable` 模式下始终看到相同的数据。\n\n### 示例项目\n\n\n我们将通过在线跳蚤市场的一些相关组件为例，说明本章迄今为止讨论的主题。为了准备这些示例，我们将在名为`company`的数据库中创建两个表：`participant`和`trunk`。每个表的用途及其结构也会一同呈现。创建表之后，我们还会添加一些示例数据，这些数据将在以下章节中提供。\n\
  \n#### `participant` 表\n\n此表存储每位跳蚤市场参与者的信息，包括他们的姓名、电子邮件地址和可用现金：\n\n```sql\nCREATE\
  \ TABLE participant (\n  participantid SERIAL,\n  name TEXT NOT NULL,\n  email TEXT\
  \ NOT NULL,\n  cash NUMERIC(5,2) NOT NULL,\n  PRIMARY KEY (participantid)\n);\n\
  ```\n\n#### `trunk` 表\n\n此表存储参与者拥有的每件物品的信息，包括所有者、名称、描述和价格：\n\n```sql\nCREATE TABLE\
  \ trunk (\n  trunkid SERIAL,\n  participantid INTEGER NOT NULL REFERENCES participant(participantid),\n\
  \  name TEXT NOT NULL,\n  price NUMERIC(5,2) NOT NULL,\n  description TEXT NOT NULL,\n\
  \  PRIMARY KEY (trunkid)\n);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n768 第 36 章 ■ 事 务\n\n#### 添加一些示例数据\n\n接下来，向两个表中添加几行数据。为了简化操作，我们添加两位参与者：Robert 和\
  \ Howard，以及他们各自货箱中的几件物品：\n\n```sql\nINSERT INTO participant (name,email,cash) VALUES\n\
  \  ('Robert','robert@example.com','100.00');\n\nINSERT INTO participant (name,email,cash)\
  \ VALUES\n  ('Howard','howard@example.com','150.00');\n\nINSERT INTO trunk (participantid,name,price,description)\
  \ VALUES\n  (1,'Linux CD','1.00','光盘上完整的操作系统');\n\nINSERT INTO trunk (participantid,name,price,description)\
  \ VALUES\n  (2,'Abacus','12.99','算力不足？用算盘吧！');\n\nINSERT INTO trunk (participantid,name,price,description)\
  \ VALUES\n  (2,'Magazines','6.00','一摞计算机杂志');\n```\n\n### 一个简单示例\n\n为了更好地了解事务的具体行为，本节将通过命令行运行一个简单的事务示例。该示例演示了两位跳蚤市场参与者如何完成用现金交换物品的过程。在查看代码之前，请先花一点时间阅读伪代码：\n\
  \n1. 参与者 Robert 请求一件物品，比如参与者 Howard 虚拟货箱中的算盘。\n2. 参与者 Robert 将 12.99 美元的现金转入参与者\
  \ Howard 的账户。其效果是，这笔金额从 Robert 的账户中扣除，并等额记入 Howard 的账户。\n3. 算盘的所有权转移给参与者 Robert。\n\
  \n如您所见，流程中的每一步对于事务的整体成功都至关重要，以确保我们的数据不会因为某一步的失败而损坏。尽管在真实场景中还有其他步骤（例如确保购买方有足够的资金），但本示例中简化了流程，以便将重点集中在主要议题上。\n\
  \n您可以通过发出`START TRANSACTION`命令来启动事务：\n\n```sql\ncompany=# START TRANSACTION;\nSTART\
  \ TRANSACTION\n```\n\n> **注意：** `BEGIN`命令是`START TRANSACTION`的别名。虽然两者完成的任务相同，但建议使用后者，因为它符合\
  \ SQL 规范。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n第 36 章 ■ 事 务\n\n\
  769\n\n接下来，从 Robert 的账户中扣除 12.99 美元：\n\n```sql\ncompany=# UPDATE participant SET\
  \ cash=cash-12.99 WHERE participantid=1;\nUPDATE 1\n```\n\n然后，向 Howard 的账户存入 12.99\
  \ 美元：\n\n```sql\ncompany=# UPDATE participant SET cash=cash+12.99 WHERE participantid=2;\n\
  UPDATE 1\n```\n\n接着，将算盘的所有权转移给 Robert：\n\n```sql\ncompany=# UPDATE trunk SET participantid=1\
  \ WHERE name='Abacus' AND\ncompany-# participantid=2;\nUPDATE 1\n```\n\n此时，我们已经完成了最初设定的使事务完整的目标，因此，或许现在是利用另一个\
  \ PostgreSQL 功能——保存点——的好时机。\n\n\n\n■ **注意** 保存点功能最早在 PostgreSQL 8.0.0 中引入，因此如果你运行的是更早的版本，将无法执行以下命令。\n\
  \n保存点就像事务中的书签，让你能够在事务中设置一个点，以便在后续事务出现错误时回滚到该点。现在让我们创建一个保存点：\n\n```\ncompany=# SAVEPOINT\
  \ savepoint1;\nSAVEPOINT\n```\n\n创建保存点后，我们可以继续执行语句。假设我们想验证对 participant 表所做的更改，但出于本例的目的，我们假设在查询时因拼写错误而打错了表名：\n\
  \n```\ncompany=# SELECT * FROM particapant;\n错误: 关系 \"particapant\" 不存在\n```\n\n\
  如果在没有设置保存点的情况下执行此查询，整个事务将因事务块内的这个错误而不得不回滚。即使我们纠正了错误，也能发现 PostgreSQL 不会允许我们继续执行当前事务：\n\
  \n```\ncompany=# SELECT * FROM participant;\n错误: 当前事务已中止，在事务块结束前命令被忽略\n```\n\n■\
  \ **注意** 在 PostgreSQL 8.0.0 之前的版本中，此时你将不得不回滚整个事务。\n\n然而，由于我们已创建了保存点，我们可以回滚到该保存点，这将使事务恢复到导致错误之前的状态：\n\
  \n```\ncompany=# ROLLBACK TO savepoint1;\nROLLBACK\n```\n\n■ **注意** 拼写错误问题曾相当令人烦恼，因此在\
  \ PostgreSQL 8.1 中，`psql` 客户端将提供一个 `\\reseterror` 选项，它会在出错时自动设置保存点并回滚到该点。\n\n现在我们可以像什么都没发生一样在事务中查询了。我们来快速检查一下\
  \ participant 表，确保现金金额已正确扣除和增加：\n\n```\ncompany=# SELECT * FROM participant;\n```\n\
  \n返回结果如下：\n\n```\nparticipantid | name | email | cash\n---------------+--------+--------------------+--------\n\
  1 | Robert | robert@example.com | 87.01\n2 | Howard | howard@example.com | 162.99\n\
  (2 行)\n```\n\n也花点时间检查一下 trunk 表；你会看到算盘的所有权确实发生了变化。但请注意，由于 PostgreSQL 遵循 ACID 原则，此更改目前仅对执行事务的当前连接可见。\n\
  \n为了说明这一点，启动第二个 `psql` 客户端，同样登录到 `company` 数据库。检查 `participant` 表。你会看到每位参与者的现金值保持不变。这是\
  \ ACID 测试中隔离性的体现。在你使用 `COMMIT` 提交更改之前，事务过程中所做的任何更改对其他连接都是不可见的。\n\n尽管更新操作确实正确执行了，但假设有一个或多个更新失败。返回第一个客户端窗口，通过执行\
  \ `ROLLBACK` 命令来撤销更改：\n\n```\ncompany=# ROLLBACK;\nROLLBACK\n```\n\n现在，再次执行 `SELECT`\
  \ 命令：\n\n```\ncompany=# SELECT * FROM participant;\n```\n\n返回结果如下：\n\n```\nparticipantid\
  \ | name | email | cash\n---------------+--------+--------------------+--------\n\
  1 | Robert | robert@example.com | 100.00\n2 | Howard | howard@example.com | 150.00\n\
  (2 行)\n```\n\n请注意，每位参与者的现金持有量已重置为初始值。检查 trunk 表也会发现算盘的所有权并未改变。尝试重新执行上述过程，这次使用 `COMMIT`\
  \ 命令而不是回滚来提交更改。一旦事务被提交，再次返回第二个客户端并查看表；你会看到提交的更改会立即可用。\n\n\n\n**注意** 在发出`COMMIT`或`ROLLBACK`命令之前，事务序列中的任何数据更改都不会生效。这意味着如果\
  \ PostgreSQL 服务器在你提交更改之前崩溃，这些更改将不会生效，并且你需要重新开始事务序列才能使这些更改发生。\n\n在稍后的章节中，我们将使用 PHP\
  \ 脚本重新创建这一过程。\n\n### 事务使用技巧\n\n以下是使用事务时需要记住的一些技巧：\n\n-   仅在确保整个流程必须成功执行时使用事务。例如，将产品添加到购物车的过程至关重要；而浏览所有可用产品则不是。\n\
  -   PostgreSQL 允许你回滚数据定义语言语句；即任何用于创建、修改或删除数据库对象（包括表、索引、触发器、函数、视图等）的语句。\n-   事务不能嵌套。在`COMMIT`或`ROLLBACK`之前发出多个`START\
  \ TRANSACTION`命令将不会产生任何效果。相反，你应该使用保存点来实现嵌套事务提供的功能。\n\n### 使用 PHP 构建事务型应用程序\n\n将\
  \ PostgreSQL 的事务功能集成到你的 PHP 应用程序中其实并非难事；你只需要记住在适当的时间开始事务，然后在相关操作完成后提交或回滚事务即可。\n\n\
  本节演示了在 PHP 中执行事务的一般方法。学完本节后，你应该能够非常熟悉将此重要功能集成到你的应用程序中所需的一般流程。\n\n当然，你应该继续使用我们最初在第\
  \ 34 章创建的 PostgreSQL 类。因此，首先在你的 PostgreSQL 类中添加以下五个额外的方法：`begintransaction()`、`commit()`、`rollback()`、`setsavepoint()`\
  \ 和 `rollbacktosavepoint()`。到现在为止，每个方法的目的都应该是显而易见的。\n\n```php\nfunction begintransaction()\
  \ {\n    $this->query('START TRANSACTION');\n}\n\nfunction commit() {\n    $this->query('COMMIT');\n\
  }\n\nfunction rollback() {\n    $this->query('ROLLBACK');\n}\n\nfunction setsavepoint($savepointname)\
  \ {\n    $this->query(\"SAVEPOINT $savepointname\");\n}\n\nfunction rollbacktosavepoint($savepointname)\
  \ {\n    $this->query(\"ROLLBACK TO SAVEPOINT $savepointname\");\n}\n```\n\n由于这些命令通常不会导致错误，为了简化示例代码，我们将省略异常处理。\n\
  \n#### 谨防 `pg_query()`\n\n`pg_query()` 函数的行为方式可能不像你想象的那么直观。不完全理解其行为可能会对你的事务逻辑造成严重破坏。\n\
  \n这种混淆可能源于 `pg_query()` 判断成功与失败的方式。当调用 `pg_query()` 时，任何成功执行的查询都会返回一个资源标识符。这看起来很简单，但你必须记住，仅仅因为查询成功执行并不意味着有任何实质性的改变发生。例如，假设你执行以下代码：\n\
  \n```php\n$query = \"UPDATE participant SET name = 'Treat' WHERE name = 'Rob'\"\
  ;\necho pg_query($query);\n```\n\n根据你在本章开头插入的测试信息，此查询不会更新任何行，因为没有名为“Rob”的参与者。然而，`pg_query()`\
  \ 仍然会很乐意返回一个资源标识符，就像它做了某事一样，因为查询本身是有效的。这在处理事务时可能是一个大问题，因为你需要确切地知道预期的结果是否已经发生。为了正确处理事务，你需要同时检查查询是否已正确执行以及是否有行受到影响。你可以使用第\
  \ 30 章首次介绍的 `pg_affected_rows()` 函数来实现这一点。例如，你可以重写此代码来确定查询是否有效以及是否有行受到影响：\n\n```php\n\
  $query = \"UPDATE participant SET name = 'Treat' WHERE name = 'Rob'\";\n$result\
  \ = pg_query($query);\nif ($result AND pg_affected_rows($result) == 1)\n    echo\
  \ \"TRUE\";\nelse\n    echo \"FALSE\";\n```\n\n这将返回 `FALSE`。这个概念对于将 PostgreSQL 数据库事务与\
  \ PHP 结合使用至关重要，因此它将被纳入以下示例中。\n\n#### 重温交换市场\n\n在这个示例中，你将使用 PHP 重新创建之前演示的交换市场场景。为了将不相关的细节控制在最低限度，页面将显示一个产品，并为用户提供一种将商品添加到购物车的方式；它可能看起来像这样：\n\
  \n```html\n<p>\n    <strong>算盘</strong><br />\n    所有者：霍华德<br />\n    价格：$12.99<br\
  \ />\n    计算能力不足？来一个算盘吧！<br />\n    <form action=\"purchase.php\" method=\"post\"\
  >\n        <input type=\"hidden\" name=\"itemid\" value=\"1\" />\n        <br />\n\
  \        <input type=\"submit\" value=\"购买！\" />\n    </form>\n</p>\n```\n\n如你所料，此页面中显示的数据可以很容易地从\
  \ `participant` 和 `trunk` 表中提取。在浏览器中渲染后，此页面将如图 36-1 所示。\n\n**图 36-1.** *典型的产品展示*\n\
  \n点击“购买！”按钮会将用户带到 `purchase.php` 脚本。这里传递了一个变量，即 `$_POST['itemid']`。通过将此变量与一些用于检索参与者和后备箱商品主键的假设类方法结合使用，你可以使用\
  \ PostgreSQL 事务将产品添加到数据库，并相应地扣除和贷记参与者的账户，如清单 36-1 所示。\n\n**清单 36-1.** *使用 purchase.php\
  \ 交换商品*\n\n```php\n<?php\nsession_start();\ninclude \"pgsql.class.php\";\n\n// 使用某个虚构的类（用于将会话\
  \ ID 映射回特定用户）检索参与者的主键\n// 该类引用某种用户会话表\n$participant = new participant();\n$buyerid\
  \ = $participant->getparticipantkey();\n\n// 为 POST 提交的商品 ID 赋予一个友好的变量名\n$itemid\
  \ = $_POST['itemid'];\n\n// 使用某个虚构的商品类检索商品卖家及其价格\n$item = new item();\n$sellerid\
  \ = $item->getitemowner($itemid);\n$price = $item->getprice($itemid);\n\n// 实例化\
  \ pgsql 类\n$pgsqldb = new pgsql(\"localhost\",\"company\",\"webuser\",\"secret\"\
  );\n\n// 连接 PostgreSQL 数据库\n$pgsqldb->connect();\n\n// 假设事务操作都会成功\n$transactionsuccess\
  \ = TRUE;\n\n// 开始事务\n$pgsqldb->begintransaction();\n\n// 从买家账户扣款\n$query = \"UPDATE\
  \ participant SET cash=cash-$price WHERE participantid=$buyerid\";\n$result = $pgsqldb->query($query);\n\
  if (!$result OR $result->affectedrows() != 1)\n    $transactionsuccess = FALSE;\n\
  \n// 向卖家账户入账\n$query = \"UPDATE participant SET cash=cash+$price WHERE participantid=$sellerid\"\
  ;\n$result = $pgsqldb->query($query);\nif (!$result OR $result->affectedrows() !=\
  \ 1)\n    $transactionsuccess = FALSE;\n\n// 更新后备箱商品的所有权\n$query = \"UPDATE trunk\
  \ SET participantid=$buyerid WHERE trunkid=$itemid\";\n$result = $pgsqldb->query($query);\n\
  if (!$result OR $result->affectedrows() != 1)\n    $transactionsuccess = FALSE;\n\
  \n// 如果 $transactionstatus 为真，则提交事务\n// 否则回滚所有更改\nif ($transactionsuccess) {\n \
  \   $pgsqldb->commit();\n    echo \"交换成功！恭喜！\";\n} else {\n    $pgsqldb->rollback();\n\
  \    echo \"交换出现问题！:-(\";\n}\n?>\n```\n\n\n好的，遵照您的要求，以下是英文原文的中文翻译。\n\n\n\n如您所见，在事务的每一步执行后，都会检查查询的状态和受影响的行数。如果在任何时候其中一项失败，`$transactionsuccess`\
  \ 就会被设置为 `FALSE`，并且在脚本结束时所有步骤都会被回滚。当然，您可以优化这个脚本，使每个查询以锁步方式启动，即只有在确定前一个查询已正确执行后，才进行下一个查询，但这个练习留给您自己去完成。\n\
  \n### 总结\n\n在建模业务过程时，数据库事务非常有用，因为它们有助于确保组织中最有价值的资产——其信息的完整性。\n\n如果谨慎使用，数据库事务在构建数据库驱动的应用程序时是一笔巨大的财富。\n\
  \n在下一章，也就是最后一章中，我们不仅将演示使用 PostgreSQL 的内置工具来导入和导出大量数据是多么容易，我们还将看看如何使用简单的 PHP 脚本来做一些很酷的事情，比如格式化基于表单的信息，以便通过电子表格应用程序（如\
  \ Microsoft Excel）进行查看。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n"
- "# 第 37 章\n\n### 导入和导出数据\n\n早在石器时代，穴居人从未真正遇到过数据不兼容的问题，因为石板和自身的记忆是唯一的存储介质。复制数据涉及取出旧凿子，然后在一块新花岗岩上忙碌起来。当然，如今的情况大不相同，因为存在数百种数据存储解决方案。例如，如何将\
  \ PostgreSQL 表中的数据转换为适合在电子表格中查看的格式，或者反之亦然？如果以非最优的方式完成，您可能会花费数小时，甚至数天或数周，来将转换后的数据整理成可用格式。市场部或公司总裁不太可能愿意为这样的数据等待超过几分钟，更不用说提出特殊请求来为他们准备数据了。\n\
  \n那么，如何以编程方式创建机制，以便轻松地将数据导入和导出为其他格式呢？在本章中，您将学习如何使用各种 SQL 命令、PostgreSQL 专用命令和编程技术轻松地做到这一点。具体来说，本章将介绍以下主题：\n\
  \n- **PostgreSQL 的 COPY 命令**：PostgreSQL 的 `COPY` 命令及其 PHP 等价函数 `pg_copy_to()` 和\
  \ `pg_copy_from()`，使导入和导出表数据变得轻而易举。您将看到如何从命令行以及从 PHP 脚本中完成这些任务。\n\n- **使用 phpPgAdmin\
  \ 导入和导出数据**：phpPgAdmin 提供了用户友好且功能强大的工具，无需编程即可轻松导入和导出数据。\n\n> **注意**：在第 26 章中，您了解到了几个\
  \ PostgreSQL 的备份和恢复相关工具，包括 `pg_dump`、`pg_dumpall` 和 `pg_restore`，它们能够帮助您消除这些问题。然而，这些命令通常在从\
  \ PostgreSQL 数据库导入数据和恢复数据时最有效，而不是为了在另一个数据管理器或查看器中使用而准备数据。\n\n### COPY 命令\n\n`COPY`\
  \ 命令是一个 PostgreSQL 专用命令，用于在数据库表和文件之间快速复制数据。本节将介绍将数据从表复制到文件以及反向复制所需的语法。接下来的部分将向您展示如何使用\
  \ `pg_copy_from()` 和 `pg_copy_to()` 函数从 PHP 脚本执行 `COPY`，这两个函数首次在第 30 章中介绍。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n#### 向表复制数据和从表复制数据\n\n使用 `COPY` 命令可以将数据从表复制到文本文件或标准输出。\n\n\n\n\n`tablename` TO\
  \ { `filename` | STDOUT } 是 `COPY` 命令的一种变体。完整语法如下：\n\n`COPY tablename` [( `column`\
  \ [, ...])]  \nTO { '`filename`' | STDOUT }  \n[ [ WITH ]  \n[ BINARY ]  \n[ OIDS\
  \ ]  \n[ DELIMITER [ AS ] '`delimiter`' ]  \n[ NULL [ AS ] '`null string`' ]  \n\
  [ CSV [ HEADER ]  \n[ QUOTE [ AS ] '`quote`' ]  \n[ ESCAPE [ AS ] '`escape`' ] \
  \ \n[ FORCE NOT NULL `column` [, ...] ] ]\n\n将文本文件中的数据复制到表或标准输出所使用的语法与从表复制数据的语法相同，只是有三处细微差异。这些差异在以下语法中以粗体标出：\n\
  \n`COPY tablename` [( `column` [, ...])]  \n**FROM** { '`filename`' | **STDIN**\
  \ }  \n[ [ WITH ]  \n[ BINARY ]  \n[ OIDS ]  \n[ DELIMITER [ AS ] '`delimiter`'\
  \ ]  \n[ NULL [ AS ] '`null string`' ]  \n[ CSV [ HEADER ]  \n[ QUOTE [ AS ] '`quote`'\
  \ ]  \n[ ESCAPE [ AS ] '`escape`' ]  \n[ FORCE **QUOTE** `column` [, ...] ] ]\n\n\
  可以看出，`COPY` 的功能相当丰富。要理解其众多能力，最好的方式莫过于通过几个示例。\n\n### 从表中复制数据\n\n首先，让我们将包含员工信息的表中的数据转储到标准输出：\n\
  \n`psql>COPY employee TO STDOUT;`\n\n这会返回以下结果：\n\n```\n1 JG100011 Jason Gilmore\
  \ jason@example.com\n2 RT435234 Robert Treat rob@example.com\n3 GS998909 Greg Sabino\
  \ Mullane greg@example.com\n4 MW777983 Matt Wade matt@example.com\n```\n\n要将此输出重定向到文件，只需指定一个文件名，如下所示：\n\
  \n`psql>COPY employee TO '/home/jason/sqldata/employee.sql';`\n\n请记住，PostgreSQL\
  \ 守护进程用户需要具备写入指定目录的必要权限。此外，必须使用绝对路径，因为 `COPY` 不接受相对路径名。\n\n**注意：** 在 Windows 上，应使用正斜杠指定绝对路径。例如，要将数据\
  \ `COPY` 到 PostgreSQL 的数据目录，路径可能看起来像 `c:/pgsql/data/employee.sql`。\n\n### 从文本文件复制数据\n\
  \n将数据从文本文件复制到表与将数据复制到文本文件一样简单。让我们先从将之前示例中转储到 `employee.sql` 的员工数据导入到一个结构相同、但已重新命名且为空的员工表开始：\n\
  \n`psql>COPY employeenew FROM '/home/jason/sqldata/employee.sql';`\n\n现在，`SELECT`\
  \ `employeenew` 中的数据，你将看到以下输出：\n\n```\nemployeeid | employeecode | name        \
  \     | email\n------------+--------------+---------------------+---------------\n\
  1          | JG100011     | Jason Gilmore    | jason@example.com\n2          | RT435234\
  \     | Robert Treat     | rob@example.com\n3          | GS998909     | Greg Sabino\
  \ Mullane | greg@example.com\n4          | MW777983     | Matt Wade        | matt@example.com\n\
  (4 rows)\n```\n\n请注意，必须使用绝对路径来引用文件。此外，PostgreSQL 守护进程用户必须能够读取目标文件。最后，切记 `COPY` 不会尝试对文件进行任何处理来判断每个字段中的数据是否可以合法地放入特定表列；相反，它只会逐步将文本文件中的每个字段与相同偏移量的表列进行匹配。\n\
  \n`COPY FROM` 假定每个字段都由预定义的字符串分隔，默认为文本文件中的制表符（`\\t`），以及 CSV 文件中的逗号（参见后面的章节“使用 CSV\
  \ 文件”）。此外，每行都被假定由类似的预定义字符串分隔，默认为换行符（`\\n`）。如有必要，可以更改这些预定义字符；更多信息请参见后面的章节“更改默认分隔符”。\n\
  \n#### 二进制\n\n该子句告诉 PostgreSQL 使用自定义格式复制数据，从而略微提升性能。然而，只有在数据之前是使用 `COPY TO ... BINARY`\
  \ 写入的情况下，才能执行 `COPY FROM ... BINARY`。此外，这与存储 Word 文档或图像等数据无关。它仅仅是一种略微更高效的复制大文件的方式。\n\
  \n\n"
- '# 第 37 章 导入和导出数据


  ### 导出表 OID


  如果目标表是使用 OID（对象标识符）创建的，您可以通过使用`OIDS`子句指定 OID 与表数据的其余部分一起输出。例如：


  ```

  psql>COPY employee TO STDOUT OIDS;

  ```


  这将产生：


  ```

  24627 1 GM100011 Jason Gilmore jason@example.com

  24628 2 RT435234 Robert Treat rob@example.com

  24629 3 GS998909 Greg Sabino Mullane greg@example.com

  24630 4 MW777983 Matt Wade matt@example.com

  ```


  ### 更改默认分隔符


  请注意，上一个示例输出中每列之间出现的空白实际上是制表符（`\t`），这是默认的分隔符。通过使用`DELIMITER`子句，您可以将默认分隔符更改为，例如，竖线（`|`）：


  ```

  psql>COPY employee TO STDOUT DELIMITER ''|'';

  ```


  这将以以下格式返回前述输出（不含 OID）：


  ```

  1|GM100011|Jason Gilmore|jason@example.com

  2|RT435234|Robert Treat|rob@example.com

  3|GS998909|Greg Sabino Mullane|greg@example.com

  4|MW777983|Matt Wade|matt@example.com

  ```


  同样，如果您要导入的文本文件不使用制表符分隔字段，请像前面的命令一样指定它：


  ```

  psql>COPY employeenew FROM ''/home/jason/sqldata/employee.sql'' DELIMITER |;

  ```


  ### 仅复制特定列


  如果您只想将员工的姓名和电子邮件地址复制到标准输出，请像这样指定列名：


  ```

  psql>COPY employee (name,email) TO STDOUT;

  ```


  这将产生以下结果：


  ```

  Jason Gilmore jason@example.com

  Robert Treat rob@example.com

  Greg Sabino Mullane greg@example.com

  Matt Wade matt@example.com

  ```


  同样，如果文本文件只包含要插入到表中的部分字段，您可以像之前那样指定它们。但请记住，其他表列需要要么可为空，要么具有默认值。


  ### 处理 NULL 值


  虽然电子邮件对于在办公环境中工作的个人来说是一个重要的通信工具，但假设有些员工只在仓库工作，因此不需要电子邮件。因此，`employee`表中的某些电子邮件值可能为`NULL`。使用`COPY`导出数据时，`NULL`值的默认值是`\N`，而在使用
  CSV 模式（将在本节后面讨论）时，它是一个空字符串。但是，如果您想为此类实例声明自定义字符串，例如`no email`，该怎么办？您应该使用`NULL`子句，如下所示：


  ```

  psql>COPY employee TO STDOUT NULL ''no email'';

  ```


  这会产生类似于以下的输出（假设某些员工的电子邮件地址已设置为`NULL`）：


  ```

  Jason Gilmore no email

  Robert Treat rob@example.com

  Greg Sabino Mullane greg@example.com

  Matt Wade no email

  ```


  同样，如果您从文本文件导入数据并且指定了`NULL`值，则无论何时找到该值，相应的列都将被设置为`NULL`。


  ### 使用 CSV 文件


  逗号分隔值（CSV）文件是当今几乎所有主流关系数据库都接受的格式，更不用说各种各样的产品，如 Microsoft Excel。您可以通过使用带有`CSV`子句的`COPY`轻松地从
  PostgreSQL 表创建 CSV 文件。例如，要创建一个可以在 Microsoft Excel 或 OpenOffice.org Calc 中立即查看的文件，请执行以下命令：


  ```

  psql>COPY employee (name, email) TO ''/home/jason/sqldata/employee.csv'' CSV HEADER;

  ```


  如上所述指定`HEADER`子句会导致检索到的列名在第一行中作为列标题列出。例如，执行此命令并在 Microsoft Excel 中打开`employee.csv`文件会产生类似于图
  37-1 所示的输出。


  **图 37-1.** *在 Microsoft Excel 中查看 employee.csv 文件*




  '
- '# 第 37 章 导入和导出数据


  如果你使用`COPY FROM`将 CSV 文件读入表，并且声明了`HEADER`子句，第一行将被忽略。


  某些数据可能由单引号或双引号分隔，这些引号在 PostgreSQL 中具有特殊意义，因此你需要留意它们，以确保正确处理。你可以使用`QUOTE`子句指定此字符，默认设置为双引号。然后，可以使用`ESCAPE`子句标识的字符对指定的引号字符进行转义，该子句默认也使用双引号。


  如果你从表中导出数据并使用`FORCE NOT NULL`，则假定没有值为空；如果遇到任何空值，它将被插入为空字符串。


  如果你向表中导入数据并使用`FORCE QUOTE`，则所有非空值都将被引用，要么使用默认的双引号，要么使用声明`QUOTE`子句时指定的任何值。


  ### 从 PHP 脚本调用 COPY


  虽然前面描述的`COPY`命令对开发人员和数据库管理员很有用，但最终用户肯定需要更直观的解决方案。为满足此需求，PHP 的 PostgreSQL 扩展提供了`pg_copy_from()`和`pg_copy_to()`函数（在第
  30 章介绍过）。这两个函数的功能分别与前面介绍的`COPY FROM`和`COPY TO`命令相同，不同之处在于它们可以轻松地从你的 Web 应用程序中执行。


  在本节中，我们将考虑一个实际示例，使用`pg_copy_to()`将数据从 PostgreSQL 表复制到文本文件。


  ### 将数据从表复制到文本文件


  假设你想创建一个界面，允许管理人员创建包含员工联系信息的 CSV 文件。这些文件按日期保存到共享驱动器上的某个文件夹中。实现此功能的代码见清单 37-1。


  **清单 37-1.** 将员工数据保存到 CSV 文件（`saveemployeedata.php`）


  ```php

  <?php


  $pg = pg_connect("host=localhost user=jason password=secret dbname=corporate") or
  die("Could not connect to db server.");


  // Copy the employee table data to an array


  $array = pg_copy_to($pg, "employee", ",");


  // Retrieve current date for file-naming purposes


  $date = date("Ymd");


  // Open the file


  $fh = fopen("/home/reports/share/employees-$date.csv", "w");


  // Collapse the array to a newline-delimited set of rows


  $contents = implode("\n", $array);


  // Write $contents to the file


  fwrite($fh, $contents);


  // Close the file


  fclose($fh);


  ?>

  ```


  脚本执行后，打开新创建的文件，你会看到类似如下的输出：


  ```

  1,JG1000011,Jason Gilmore,jason@example.com

  2,RT435234,Robert Treat,rob@example.com

  3,GS998909,Greg Sabino Mullane,greg@example.com

  4,MW777983,Matt Wade,matt@example.com

  ```


  现在尝试在电子表格程序（如 Microsoft Excel 或 OpenOffice.org Calc）中打开它！


  你还可以在输出数组内容之前，先向 CSV 文件写入一行标题，轻松添加表头，如下所示：


  ```php

  fwrite($fh, "Employee ID,Name,Email\n");

  ```


  ### 使用 phpPgAdmin 导入和导出数据


  如果你正在寻找一个方便且功能强大的管理工具，能够从任何有 Web 浏览器的地方访问，phpPgAdmin（http://www.phppgadmin.net/）是目前最强大的解决方案。phpPgAdmin
  首次在第 27 章介绍，它不仅可以轻松管理你的数据库，还能以多种格式导入和导出数据。


  > **注意** 目前，此 phpPgAdmin 功能在 Windows 上不受支持。


  要导出数据，请导航到目标表，然后单击页面右上角的“Export”链接。这样做会打开如图 37-2 所示的界面。


  ![Image 46](img/index-791_1.png)




  '
- '# 784


  ## 第 37 章：导入和导出数据


  ![图 47](img/index-791_2.png)


  **图 37-2.** *phpPgAdmin 的导出界面*


  如您所见，可以通过三种方式导出数据：


  - **仅表数据**：如果您只想导出数据，可以六种不同格式进行导出，包括 `COPY`、`CSV`、`SQL`、`Tabbed`、`XHTML` 和 `XML`。

  - **仅表结构**：如果您只想导出表结构，则会导出用于创建表的 `SQL` 语法。勾选相应的 `Drop` 复选框，会在输出文件的顶部插入 `DROP` 表命令，以便在重新创建之前删除任何已存在的同名表。

  - **数据和结构两者**：如果您想同时导出表结构和表数据，可以选择以 `COPY` 和 `SQL` 两种格式进行导出。勾选相应的 `Drop` 复选框，会在输出文件的顶部插入
  `DROP` 表命令，以便在重新创建之前删除任何已存在的同名表。


  请注意，在所有情况下，您都可以将信息输出到浏览器或下载它。


  选择下载会将信息保存到扩展名为 `.sql` 的文件中，然后提示您将其下载到本地计算机。


  导入数据通过导航到目标表并点击 `Import` 菜单项来完成。执行此操作将会看到图 37-3 所示的界面。


  **图 37-3.** *phpPgAdmin 的导入界面*


  支持四种格式的导入文件：`Auto`、`CSV`、`Tabbed` 和 `XML`。每种格式的用途应该很明显，除了 `Auto` 模式。选择 `Auto` 会使
  `phpPgAdmin` 通过检查文件扩展名（有效的扩展名是 `.csv`、`.tab` 和 `.xml`）来选择其他三种格式之一。此外，如果在文件中发现任何空字符，您可以指定它们是使用序列
  `\N`、单词 `NULL` 还是空字符串来表示。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  ### 小结


  如本章所学，您有几种选择可以将数据导入到您的 PostgreSQL 数据库以及从中导出数据。您可以通过命令行手动操作，或者通过使用 `COPY` 命令编写脚本实现。或者，您可以通过使用
  PHP 的 `pg_copy_to()` 和 `pg_copy_from()` 函数将这些功能整合到 Web 应用程序中。此外，您也可以依赖像 `phpPgAdmin`
  这样的应用程序来简化此过程。


