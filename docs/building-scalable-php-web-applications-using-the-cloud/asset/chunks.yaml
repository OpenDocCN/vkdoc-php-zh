  trans: '

    # 11.3 创建副本映像


    在 GCP 中创建副本映像是一个略显繁琐的三步流程。首先，你需要为实例创建一个“快照”；然后，基于该快照创建一个“映像”；最后，你需要创建一个“实例模板”。快照本质上是机器的一个备份。映像则是一种专门用于为机器创建新启动盘的快照。实例模板则将映像与机器设置（大小、配置等）结合在一起，可用于快速部署相同的机器。


    创建快照是一个相当直接的过程。从主菜单（点击“Google Cloud Platform”旁边的三条横线图标）进入“计算”部分，选择“Compute Engine”，然后选择“快照”。点击“创建快照”按钮。系统会要求你提供快照名称、源磁盘和位置。你可以随意命名，选择现有的
    VM 实例作为源磁盘，位置可以保持默认（“多区域”是最灵活的选择）。点击“创建”，GCP 就会为你创建一个新的快照。


    现在，GCP 确实允许你直接从快照创建实例。但是，为了能使用 GCP 的更多功能，最好基于你的快照创建一个 GCP 所谓的“映像”。为此，请进入主菜单，然后进入“计算”部分，选择“Compute
    Engine”，再选择“映像”。页面会加载一个包含大量预配置映像的列表。你可以忽略它们。我们要创建自己的映像。点击“创建映像”按钮开始操作。


    为映像命名（例如 `template-image`），并将“来源”设置为“快照”。这会弹出一个菜单，询问你要基于哪个快照创建映像。选择你刚刚创建的那个快照。如果需要，你可以添加一个“系列”名称。这将允许你创建具有相同“系列”名称的该实例的更新版本。


    现在点击“创建”。至此，你就可以从这个映像创建新的机器了。在创建新机器时，在“启动磁盘”下的“自定义映像”标签页中，就可以找到你的映像。


    最后，我们需要将这个映像打包到一个实例模板中。实例模板可以在主菜单下的“Compute Engine” -> “实例模板”中找到。创建实例模板的过程与创建普通
    VM 实例相同。区别在于，它不会立即创建任何实例，而是可以稍后用于快速部署完全预配置好的机器。请确保在创建实例模板时，将启动映像设置为你上一步刚刚创建的映像。


    ![../images/487291_1_En_11_Chapter/487291_1_En_11_Figb_HTML.jpg](img/487291_1_En_11_Figb_HTML.jpg)


    ## 更谨慎地对待模板


    请注意，因为我们在成为模板的机器上设置了数据库，所以集群中的每个新 Web 服务器实际上都会有一个未使用的数据库副本，并且其上运行着 PostgreSQL。这本身不是问题，但如果你要进行生产部署，你可能需要确保在模板上关闭
    PostgreSQL。由于 GCP 的步骤已经很多，本章的目标是简化获得运行配置所需执行的步骤。


    # 11.4 创建负载均衡组


    然而，你也可以创建一个可自动扩展、负载均衡的机器组，称为“实例组”。这类似于我们在第 5 章中所做的，但 GCP 会实际为你管理应用程序的扩展。换句话说，当机器负载增加时，GCP
    会自动启动新的、相同的机器，并将它们添加到负载均衡器下。


    ![../images/487291_1_En_11_Chapter/487291_1_En_11_Fig3_HTML.jpg](img/487291_1_En_11_Fig3_HTML.jpg)


    *图 11-3 创建实例组*


    你可以在主菜单的“Compute Engine”下找到实例组。点击“创建实例组”开始该过程。图 11-3 显示了该过程的界面。


    为你的实例组命名。为了增强容错能力，请在“位置”下选择“多个可用区”。选择我们在 11.3 节中创建的实例模板。确保“自动扩展”设置为“开启”。如果你愿意，可以将最小实例数设置为大于
    1，以确保 GCP 在多个服务器之间对你的应用进行负载均衡。点击“创建”来构建你的实例组。


    默认情况下，实例组几乎不做任何事。我们需要一种将流量引入实例组的方法。这可以通过负载均衡器实现。


    要创建负载均衡器，在主菜单下，找到“网络服务”，然后选择“负载均衡”。点击“创建负载均衡器”开始操作。接下来选择“HTTP(S) 负载均衡”。然后选择“从互联网到我的虚拟机”，因为我们希望此负载均衡器充当互联网与机器之间的网关。


    下一个屏幕提供了主要的配置区域。首先，为你的负载均衡器命名。接下来，在“后端配置”下，选择“后端服务”，然后选择“创建后端服务”。你需要为你的后端服务命名（名称无关紧要），然后选择你的实例组，再创建一个健康检查（健康检查只需设置为
    TCP 端口 80）。然后点击“创建”，它将创建你的后端服务。你可以将“主机和路径规则”以及“前端配置”保留为默认值。点击“检查并最终确定”查看所有设置。最后，点击“创建”来构建你的负载均衡器。你可以访问生成的
    IP 地址，它将平衡机器之间的负载。


    请记住，GCP 实际完成负载均衡器的创建需要相当长的时间。即使 GCP 在其界面中“认为”全部创建完成，并告诉你所有实例都已添加到负载均衡器，实际生效仍需要几分钟时间。因此，在负载均衡器激活后的最初几分钟内，访问
    URL 时 GCP 可能会报告错误。


    ![../images/487291_1_En_11_Chapter/487291_1_En_11_Figc_HTML.jpg](img/487291_1_En_11_Figc_HTML.jpg)


    ## 移除负载均衡器


    移除 GCP 负载均衡器比看起来要困难。要移除我们以这种方式创建的负载均衡器，需要执行以下步骤：


    1. 从负载均衡器列表中删除负载均衡器本身。

    2. 在负载均衡器列表页面，有一个名为“后端”的标签页。点击该标签页查看你的后端服务。

    3. 在“后端”标签页下，点击你为负载均衡器创建的后端服务，并将其删除。

    4. 现在你的负载均衡器已被移除，但你还需要处理你的实例组，否则你将持续为你的机器付费（在其他步骤完成之前，你无法移除你的实例或实例组）。

    5. 如果你希望不为你的映像付费，你还必须删除你的实例模板，然后删除你的映像以及你的快照。


    # 11.5 其他 GCP 服务


    与 AWS 一样，GCP 也提供许多其他在创建云应用时可能有用的服务。几个类似的服务包括：


    *   Cloud SQL（类似于 RDS）

    *   Storage（类似于 S3）

    *   Memorystore（类似于 ElastiCache）

    '
- fmt: '另外，GCP 也通过名为 Google App Engine 的服务提供 PaaS 服务。总的来说，GCP 拥有许多与 Linode 和 AWS 相同的服务，但使用起来稍微复杂一些。在某些极端情况下，这种复杂性可能会带来额外的可配置性，但通常并不需要。例如，GCP
    使得将不同的子目录映射到不同的实例组变得相对简单。这使得在同一个主机名下托管多个应用程序，并将每个应用程序放在不同的实例组中变得更加容易。对于大多数应用程序来说，GCP
    的复杂性超过了它所提供的可配置性。


    ## 12. 服务器管理技术


    到目前为止，每当我们需要向云端推送更新时，都必须重新镜像所有服务器。这并非不可接受，但也不是最佳方案。想象一下，如果你运营着一个拥有 20 台不同服务器的服务器集群，你真的愿意每次重新部署代码时都去重新镜像它们吗？很可能不愿意。如果你想安装一个服务器补丁，你愿意去重新镜像所有服务器吗？同样，很可能不愿意。


    幸运的是，有许多工具可以帮助管理大量机器。它们各有不同的侧重点——有些专注于简化重复性任务，而另一些则是完整的管理解决方案。我是一个简单的人，通常更喜欢简单的工具，而不是庞大、包罗万象的解决方案。


    ### 12.1 在多个服务器上运行命令


    假设我们想在集群中的每台机器上安装一个新的软件包。`ImageMagick` 是一个流行的图像处理软件包。如果我们想在所有节点上安装 `ImageMagick`，过程相当简单。我们只需通过
    `ssh` 登录到每台机器，运行 `yum install -y ImageMagick`，然后退出。


    幸运的是，有一种软件可以帮我们完成这项工作，叫做 `pssh`，它是 Parallel SSH 的缩写。你不需要在服务器上安装任何新东西。`pssh` 安装在你本地的机器上，然后仅通过常规的
    `ssh` 机制，就能在所有远程机器上运行相同的命令。


    然而，将 `pssh` 安装在你的 `template_node` 机器上可能更简单，这样你就可以从任何地方使用它（即，你可以登录到你的模板节点，然后在那里运行
    `pssh`）。`pssh` 在 EPEL 软件包中可用，因此我们可以通过以下方式将其安装到 `template_node` 上：


    ```

    yum install -y pssh

    ```


    要使用它，我们需要创建一个文件（我们将其命名为 `servers.txt`），其中列出我们正在管理的所有服务器。使用 `nano` 创建该文件，并将每台服务器的*公网*
    IP 地址放入文件中。要使用 `pssh`，你只需输入：


    ```

    pssh -A -h servers.txt --user root COMMAND

    ```


    只需将 `COMMAND` 替换为你要运行的命令。因此，我们可以发出以下命令来为每台服务器安装 `ImageMagick`：


    ```

    pssh -A -h servers.txt --user root yum install -y ImageMagick

    ```


    `pssh` 会询问我们密码（这就是 `-A` 的作用），然后它会通知我们何时完成任务。现在，你只需确保 `servers.txt` 文件保持最新，你就可以从单台机器上轻松地执行大多数管理任务。


    当命令运行时，它会告诉你每台服务器的状态，如果出现故障，它会告诉你命令给出的错误代码。例如，对于三台服务器，输出可能如下所示：


    ```

    [1] 23:00:32 [SUCCESS] 45.79.7.179

    [2] 23:00:32 [SUCCESS] 45.79.7.180

    [3] 23:00:32 [FAILURE] 45.79.7.181 Exited with error code 1

    ```


    然后你需要检查命令执行失败的机器，并确定哪里出了问题。


    ### 12.2 在多个服务器上同步文件


    既然在每台服务器上运行命令现在很容易了，那么能够将一组文件复制到每台服务器上也将非常方便。幸运的是，`pssh` 自带两个文件复制工具，名为 `pscp`
    和 `prsync`，因此你可以轻松地将文件复制到远程服务器。这样，当你部署新版本的软件时，就不必重新镜像每台服务器了。`pscp` 程序有时被称为 `pscp.pssh`，因此如果在安装
    `pssh` 后找不到 `pscp` 命令，请尝试使用 `pscp.pssh`。


    假设你有一个文件 `testme.html`，并且你想以用户 `fred` 的身份将其复制到每台服务器的 `/var/www/html` 目录下。要执行此任务，只需输入以下命令（全部在一行内）：


    ```

    pscp -A -h servers.txt --user fred testme.html /var/www/html/testme.html

    ```


    如果你想复制整个目录，可以使用相同的过程，但需要添加 `-r` 参数进行递归复制。然而，`pscp` 的一个问题是它不会为你删除文件。如果你想保持两个目录完全同步（包括添加和删除），你可以使用
    `prsync`，尽管它的语法稍微复杂一些。


    如果我想将本地目录 `mirror_me` 镜像到服务器的 `/var/www/html/mirror_me` 目录下，我会发出以下命令（全部在一行内）：


    ```

    prsync -A -a -x --delete --user fred -h hosts.txt mirror_me /var/www/html/

    ```


    通过使用 `pssh` 执行命令，使用 `pscp` 处理单个文件，以及使用 `prsync` 处理整个目录，就可以相当轻松地完成一组服务器的基本管理工作。


    此外，还有一些专门用于在多个服务器上进行应用程序部署的工具。其中比较流行的一个是 Capistrano。Capistrano 使用 Ruby 编写和定制，但它可以部署任何语言的应用程序。Capistrano
    自动化了许多与文件部署相关的任务，包括：


    *   与 `git` 仓库同步

    *   在服务器上维护应用程序的先前版本，以便快速回滚

    *   使用符号链接管理部署，使整个部署瞬间切换

    *   运行与部署相关的自定义任务和脚本


    随着你的应用程序变得越来越复杂，你对工具的需求也会越来越复杂，而拥有像 Capistrano 这样的工具可以满足许多此类需求。


    ### 12.3 全服务解决方案


    虽然 `pssh` 允许你向一组机器发出命令，Capistrano 允许你以更稳健的方式自动化部署，但还有一些更进一步的解决方案，它们可以为你完全管理目标系统。这些解决方案被称为“配置管理系统”。这些系统虽然能处理各种情况，但也带来了复杂性。对于大多数系统来说，我认为配置管理系统有些大材小用，它们增加的复杂性比解决的问题还多。然而，它们做得很好的一件事是，迫使你记录你的配置是什么（并且希望也能记录为什么这样设置）。仅仅拥有一台配置正确的服务器，并不能向未来的管理员（或未来的你自己）传达哪些配置部分是默认设置的，哪些部分是为特定目的而专门配置的。使用配置管理工具，你的系统配置既可以记录在案，也可以进行版本控制。


    作为一个喜欢极简方法的人，在系统配置方面，我真的很欣赏 Ansible 系统，它甚至不需要在远程服务器上安装任何东西。Ansible 通过 `ssh` 完成所有配置，并且很容易上手和运行。在
    [`http://ansible.com/`](http://ansible.com/) 上有一个不错的用户界面，但它需要额外的费用（尽管也有开源的 GUI
    可用）。然而，如果你只需要一个命令行工具，那么开源版本拥有所有配置管理工具中最小的占用空间之一。


    你甚至可以通过一个简单的命令从 EPEL 仓库安装它：'
  raw: "Additionally, GCP also provides PaaS services through a service\ncalled Google\
    \ App Engine.\nIn all, GCP has many of the same services as Linode and AWS, but\
    \ they\nare a little more complicated to use. In certain extreme cases, that\n\
    complexity can add to additional configurability, but it is rarely\nneeded. As\
    \ an example, GCP makes it relatively straightforward to map\ndifferent subdirectories\
    \ onto different instance groups. This makes it\neasier to host multiple applications\
    \ under the same hostname and have\neach application be a different instance group.\n\
    For most applications, GCP’s complexity outweighs the configurability\nthat it\
    \ offers.\n\n12. Server Management Techniques\n\nSo far, any time we have wanted\
    \ to push an update to our cloud, we\nhave had to reimage all of our servers.\
    \ That isn’t terrible, but neither\nis it the best option. If you imagine running\
    \ a server farm with 20\ndifferent servers, do you really want to go and reimage\
    \ them all every\ntime you redeploy code? Probably not. If you want to install\
    \ a server\npatch, do you want to go and reimage all your servers? Again, probably\n\
    not.\nThankfully, there are a number of tools which can aid the management\nof\
    \ a number of machines. They all have a variety of different\nfocuses—some are\
    \ focused on just making repetitive tasks easier, while\nothers are full management\
    \ solutions. I’m a simple guy, and I usually\nprefer the simpler tools to the\
    \ large, all-encompassing ones.\n\n12.1 Running\nCommands on Multiple Servers\n\
    Let’s say that we wanted to install a new piece of\nsoftware on every machine\
    \ in the cluster. ImageMagick is a popular\npackage for image\nmanipulation. If\
    \ we wanted to install ImageMagick on all of the\nnodes, the process is rather\
    \ straightforward. We just ssh in to each\nbox, run `yum install -y ImageMagick`,\
    \ and then exit.\nThankfully, there is a piece of software that will do that for\
    \ us,\ncalled `pssh`,\nwhich stands for Parallel SSH. You don’t need to install\
    \ anything new on\nthe server. `pssh` installs  on your local machine\nand then\
    \ just uses the regular `ssh` mechanisms for\nrunning the same command on all\
    \ of the remote machines.\n\nHowever, it might be simpler to install `pssh` on\
    \ your `template_node` machine\nso you can use it from anywhere (i.e., you can\
    \ log in to your template\nnode and run `pssh` from there).\n`pssh` is\navailable\
    \ in the EPEL packages, so we can install it onto `template_node` just by\ndoing\
    \ the following:\n\n```\nyum install -y pssh\n```\n\nTo use it, we need to create\
    \ a file (we will call it `servers.txt`) that\nlists all of our servers that we\
    \ are managing. Use `nano` to create the\nfile, and put the\n*public* IP addresses\
    \ of each server in the file. To use `pssh` all you have to\ndo is type:\n\n```\n\
    pssh -A -h servers.txt --user root COMMAND\n```\n\nJust replace `COMMAND` with\
    \ the\ncommand you want to run. Therefore, we can issue the following command\n\
    to install ImageMagick to each\nserver:\n\n```\npssh -A -h servers.txt --user\
    \ root yum install -y ImageMagick\n```\n\n`pssh` will\nask us for the password\
    \ (that’s what `-A` does), and then it\nwill let us know when it has completed\
    \ its tasks. Now all you have to do\nis make sure you keep the `servers.txt` file\
    \ up\nto date, and you can easily perform most management tasks from a single\n\
    machine.\n\nWhen the commands are run, it will tell you the status on each server,\n\
    and, if there is a failure, it will tell you the error code given by the\ncommand.\
    \ For example, for three servers, the output could look like the\nfollowing:\n\
    \n```\n[1] 23:00:32 [SUCCESS] 45.79.7.179\n[2] 23:00:32 [SUCCESS] 45.79.7.180\n\
    [3] 23:00:32 [FAILURE] 45.79.7.181 Exited with error code 1\n```\n\nThen you would\
    \ want to look into the machine(s) that failed the\ncommand and determine what\
    \ went wrong.\n\n12.2 Syncing\nFiles on Multiple Servers\nSince running a command\
    \ on every server\nis now easy, it would be nice to be able to copy a set of files\
    \ to every\nserver. Thankfully, `pssh` comes with two\nfile-copying utilities\
    \ called `pscp` and `prsync` so that you\ncan easily copy files out to remote\
    \ servers. That way, when you deploy a\nnew version of your software, you won’t\
    \ have to reimage every server.\nThe `pscp`\nprogram is sometimes called `pscp.pssh`\
    \ , so\nif after installing `pssh` the command\n`pscp` is not\nfound, try using\
    \ `pscp.pssh`.\n\nLet’s say you had the file `testme.html` and you\nwanted it\
    \ to be copied to `/var/www/html` on\nevery server as user `fred`. To perform\
    \ that\ntask, just type the following (all on one line):\n\n```\npscp -A -h servers.txt\
    \ --user fred\ntestme.html /var/www/html/testme.html\n```\n\nIf you want to copy\
    \ a whole directory, you can use the same process,\nbut add `-r` for\nrecursive\
    \ copying.\nOne issue with `pscp`, however, is\nthat it won’t delete files for\
    \ you. If you want to keep two directories\nin full sync with each other, for\
    \ both additions and deletions, you can\nuse `prsync`,\nthough its syntax is a\
    \ little tougher.\n\nIf I want to mirror a local directory `mirror_me` to the\n\
    servers at `/var/www/html/mirror_me`,\nI would issue the following command (all\
    \ on one line):\n\n```\nprsync -A -a -x --delete --user fred\n-h hosts.txt mirror_me\
    \ /var/www/html/\n```\n\nBy using `pssh` for commands,\n`pscp` for\nindividual\
    \ files, and `prsync` for entire\ndirectories, it is fairly easy to do basic management\
    \ of a set of\nservers.\n\nThere are also several tools available specifically\
    \ for application\ndeployment on multiple servers. One of the more popular of\
    \ these is\nCapistrano. Capistrano is written and customized in Ruby, though it\
    \ can\ndeploy applications in any language. Capistrano automates many tasks\n\
    concerned with file deployment including\n\n*   Synchronizing with `git`\n   \
    \ repositories\n\n*   Maintaining previous versions of the application on the\
    \ server\n    for fast rollbacks\n\n*   Using symlinks to manage the deployment\
    \ so that the entire\n    deployment switches over in an instant\n\n*   Running\
    \ custom tasks and scripts associated with the\n    deployment\n\nAs your app\
    \ gets more and more complex, your tooling needs will\nbecome more complex as\
    \ well, and\nhaving a tool such as Capistrano will satisfy many of these needs.\n\
    \n12.3 Full-Service\nSolutions\nWhile `pssh`\nallows   you to issue commands\n\
    to a group of machines and Capistrano allows you to automate deployments\nin a\
    \ more robust manner, there are additional solutions that go further\nand completely\
    \ manage the target systems for you. These are known as\n“configuration management”\
    \ systems. These systems, while they handle a\nwide variety of situations, also\
    \ come with complications. For most\nsystems, I think that configuration management\
    \ systems are overkill, and\nthey add more complexity than they solve. However,\
    \ one thing that they\ndo well is to force you to document what your configuration\
    \ is (and\nhopefully why it is set that way). Simply having a properly configured\n\
    server does not communicate to future admins (or yourself in the future)\nwhich\
    \ parts of your configuration were set by default and which parts\nare specifically\
    \ configured for a purpose. With configuration management\ntools, your system\
    \ configuration can be both documented and version\ncontrolled.\nAs someone who\
    \ likes minimalist approaches, for system configuration\nI really appreciate the\
    \ Ansible system, which does not even require\nanything to be installed on the\
    \ remote servers. Ansible does\nall of its configuration via `ssh`, and is fairly\n\
    easy to get up and running. There is a nice UI available from [`http://ansible.com/`](http://ansible.com/)\n\
    but it comes with additional monetary costs (though there are open\nsource GUIs\
    \ available as well). However, if all you need is a\ncommand-line tool, the open\
    \ source version has one of the most minimal\nfootprints of all of the configuration\
    \ management tools.\n\nYou can even install it from the EPEL repository just with\
    \ a simple:"
