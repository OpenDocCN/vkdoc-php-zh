    All screenshots used in this book were taken on a computer running Windows 10\.
    Your installation might differ slightly, if you use a different operating system.
    XAMPP for Windows offers additional options, such as the ability to install FileZilla
    (an FTP server) as one of its services. This is unnecessary and will consume computer
    resources, even when they are not being used, so it’s probably best to leave these
    services off. Additionally, Windows users should select to install XAMPP in the
    `c:\xampp` directory for the sake of following this book’s examples more easily.


    Click the Next button to move to the next screen (see Figure [1-6](#323857_3_En_1_Chapter.xhtml#Fig6)),
    to choose which components to install. Let’s just go with the default selections
    to make life easier. This will install some tools we will not use in this book.
    However, they are very useful in program development. The XAMPP installer will
    guide you through the installation process.


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig6_HTML.jpg)


    After clicking next in the setup dialer, we can select what the components need
    to be installed based on our requirements.


