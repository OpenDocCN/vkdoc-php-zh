    \ checked to be true for the complete `if` statement to be considered `true`\n\
    \    4.  Are relational operators and conjunctions used in PHP to connect programs\n\
    \n7.  An integer is which of the following?\n    1.  A string or text value\n\
    \    2.  A floating-point number\n    3.  A whole number\n    4.  A fraction\n\
    \n8.  A ternary operator is which of the following?\n    1.  An alternative to\
    \ setting a variable\n    2.  An alternative to using an `if-else` conditional\
    \ statement\n    3.  An alternative to using an embedded `if-else` conditional\
    \ statement\n    4.  B and C\n\n9.  How does one create an instance of the class\
    \ `fred` and execute the constructor method in PHP?\n    1.  `$this->fred`\n \
    \   2.  `$variable = new fred`\n    3.  `$load_class = fred`\n    4.  `$fred`\n\
    \n10. What purpose does the method `ctype_digit` serve?\n    1.  Randomly generates\
