  \n#### 设置方法\n\n\n\n这个示例仍然非常有限，因为目前我们无法调整属性中的值，使其与我们创建的实际对象（例如 `$lab`）相关联。为了调整这些属性，我们必须能够从使用该对象的程序（`lab.php`）中访问这些属性。然而，出于封装和安全性的考虑，我们不希望将属性暴露给调用程序直接操作。面向对象编程的标准要求我们将属性设置为“私有”（正如我们已经做的那样），然后使用类中的实际方法来更改任何值。\n\
  \n- **安全性与可靠性**——在类中创建 `set` 方法，使得类能够在更新属性之前，验证将要放入属性中的信息是否有效。验证不仅包括数据类型，还包括有效范围，例如一个人的年龄范围是\
  \ 1 到 140。如果在更改属性值之前未进行此项验证，则可能导致数据损坏。事后，纠正已接受的无效数据可能变得不可能或非常困难。`Set` 方法可以拒绝无效数据，并向调用程序返回错误消息或抛出异常。\n\
  \n一个 `set` 方法允许将值传入该方法。然后，这些值可以在更新对象属性之前进行验证。参数（值）在方法调用的括号 `()` 内传递给方法。\n\n```\n\
  $dog_error_message = $lab->set_dog_name('Fred');\n```\n\n如果 `set_dog_name` 方法存在于\
  \ `Dog` 类中，并且接受一个表示狗名的字符串，你可以使用类似于前面代码的方法调用。此调用会将字符串 `\"Fred\"` 传递到 `set_dog_name`\
  \ 方法中。它还使 `set` 方法能够将一个值返回给属性 `$dog_error_message`，以指示属性是否已正确更新。你可以简单地从方法中返回一个 `'true'`\
  \ 或 `'false'` 的布尔值来表示更新的状态。然后，调用程序可以决定如何处理更新的状态。\n\n如果你只是传回一个 `'true'` 或 `'false'`\
  \ 的布尔值，你可以使用一种简化的 PHP 条件语句版本，称为*三元运算符*来检查 `$dog_error_message`。\n\n```\nprint $dog_error_message\
  \ ? 'Name update successful' :\n'Name update not successful';\n```\n\n*有关**三元条件运算符**的更多信息，请访问*\
  \ [*www.php.net/manual/en/language.operators.comparison.php*](http://www.php.net/manual/en/language.operators.comparison.php)*。*\n\
  \n- **安全性与性能**——在向应用程序的实际最终用户显示错误消息时要谨慎。你可能会提供过多信息，不必要地暴露你的程序代码。向用户显示一条通用错误消息，例如“系统当前不可用”，可能是更安全的选择。在实际运行的应用程序中，应创建日志文件来记录错误和应用程序自身的访问。\n\
  \n采用这种格式，调用程序（`lab.php`）可以轻松确定更新的状态并显示相应的消息。如果 `$dog_error_message` 中的字符串为 `'true'`，则会显示\
  \ `?` 和 `:` 之间的消息（“`Name update successful`”）。如果 `$dog_error_message` 中的值为 `'false'`，则会显示\
  \ `:` 和 `;` 之间的字符串（“`Name update not successful`”）。\n\n注意\n\n当一个比较结构的定义中不包含比较运算符（==,\
  \ <=, >=, ...）和要比较的值时，PHP 会假定它是一个布尔（true/false）比较。因此，我们不需要包含实际检查 'true' 或 'false'\
  \ 的代码。不过，我们也可以包含它，如下所示。\n\n```\nset_dog_name('Fred');\nprint $dog_error_message\
  \ ? 'Name update successful' :\n'Name update not successful';\nbool $dog_error_message\
  \ = $lab->set_dog_weight(50);\nprint $dog_error_message ? 'Weight update successful'\
  \ :\n'Weight update not successful';\nbool $dog_error_message = $lab->set_dog_breed('Lab');\n\
  print $dog_error_message ? 'Breed update successful' :\n'Breed update not successful';\n\
  bool $dog_error_message = $lab->set_dog_color('Yellow');\nprint $dog_error_message\
  \ ? 'Color update successful' :\n'Color update not successful';\n//-----------------------------获取属性---------------------------\n\
  $dog_properties = $lab->get_properties();\nlist($dog_weight, $dog_breed, $dog_color)\
  \ = explode(',', $dog_properties);\nprint \"狗的重量是 $dog_weight。狗的品种是 $dog_breed。\n\
  狗的颜色是 $dog_color。\";\n?>\n示例 4-8\n包含 set 方法和错误检查的 lab.php 文件\n```\n\n```\nprint\
  \ $dog_error_message == TRUE ? 'Name update successful' :\n'Name update not successful';\n\
  ```\n\n在示例 4-8 中，`lab.php` 现在能够将信息传递到 `Dog` 类的 `$lab` 对象的属性中。它还可以确定每个属性的更新是否成功并做出相应响应。这个示例中有机会让你编写的代码量更高效。不过，我们会先暂缓考虑效率问题，等你掌握了更多技能再说。\n\
  \n`lab.php` 代码现在为每个要更新的属性调用一个 `set` 方法（`set_dog_name`、`set_dog_breed`、`set_dog_weight`\
  \ 和 `set_dog_color`），并将信息传递给每个方法。注意，除了 `set_dog_weight` 方法接受一个整数（整型）值外，其他方法都接受字符串。\n\
  \n我们现在需要在 `Dog` 类中创建 `set` 方法。每个方法现在都接受一个参数（字符串或整数）并返回一个 `'true'` 或 `'false'` 的布尔值。方法的创建风格与我们之前创建的\
  \ `get_properties` 方法类似。暂时让我们保持验证过程简单，你将在后面的章节中学习如何改进它。\n\n```\nfunction set_dog_name(string\
  \ $value) : bool\n{\nbool $error_message = TRUE;\n(ctype_alpha($value) && strlen($value)\
  \ < 21) ? $this->dog_name = $value : $error_message = FALSE;\nreturn $error_message;\n\
  }\n```\n\n`set_dog_name` 方法将接受一个字符串进入函数头中定义的 `$value` 属性（参数）（`function set_dog_name(\
  \ string $value) : bool`）。接下来，该方法创建一个属性 `$error_message` 并提供一个初始值 `TRUE`。该属性（连同\
  \ `$value` 属性）只会在方法执行期间存在。一旦执行到达 `}` 闭合大括号，这些属性将不再可用。\n\n- **编程说明**——`TRUE` 和 `FALSE`\
  \ 是作为 PHP 语言一部分包含的常量。常量不可更改，且全部大写。`TRUE` 在内部实际上表示为 `1`，而 `FALSE` 在内部表示为 `0`。\n\n\
  注意\n\n由于我们在示例中包含了标量类型提示（数据类型），我们不需要包含 `ctype_alpha` 函数来确定该值是否为字符串。然而，我们将其作为判断变量是否包含字符串的另一个工具提供。\n\
  \n- **编程说明**——`&&` 是一个 `AND` 运算符。为了使 `(ctype_alpha($value) && strlen($value) < 21)`\
  \ 语句为 `TRUE`，`$value` 必须只包含字母字符，并且长度必须少于 21 个字符。\n\n一个**三元运算符**会检查 `$value` 属性的两种可能状态（该属性包含传入方法的内容）。\n\
  \n1.  `ctype` 方法用于确定 `$value` 中的字符是否为字母（`ctype_alpha($value)`）。\n\n2.  `strlen`\
  \ 方法用于确定 `$value` 中字符串的长度是否小于 21 个字符（`strlen($value) < 21`）。\n\n\n要了解其他 `ctype`\
  \ 函数，请访问 [`www.php.net/manual/en/book.ctype.php`](http://www.php.net/manual/en/book.ctype.php)。\n\
  \n如果 `$value` 属性仅包含字母字符且长度小于 21 个字符，则 `$dog_name` 属性会更新为传入的值。如果存在非字母字符或字符串长度超过 20\
  \ 个字符，则 `$error_message` 会更新为布尔值 `FALSE`（表示更新未发生）。最后，`$error_message` 中的值（`TRUE`\
  \ 或 `FALSE`）会被返回给调用程序。\n\n*安全与性能 — 这个过程现在可能有点令人困惑。然而，创建安全的程序非常重要。每当应用程序或对象从外部来源（如另一个程序或用户）接收信息时，都必须对信息进行验证。这种验证应包括对接收信息大小的限制以及其他约束。通过互联网传输的数据（例如从用户的浏览器到\
  \ Web 服务器）可能被拦截和篡改。在服务器上的应用程序中使用这些信息之前，对其进行验证至关重要。验证可以在浏览器中（通过 JavaScript）进行，以确保用户输入了正确的信息。但是，如前所述，数据包嗅探程序可以拦截这些信息，并在\
  \ Web 服务器上的应用程序接收之前对其进行篡改。*\n\n在查看代码更改之前，还有最后一点说明。下表总结了第 3 章中介绍的比较运算符。\n\n```\n\
  操作                    结果 – 如果...则返回 TRUE\n$a == $b                $a 和 $b 忽略大小写时相等\n\
  $a === $b               $a 和 $b 大小写相同时相等\n$a != $b, $a <> $b      $a 和 $b 忽略大小写时不相等\n\
  $a !== $b               $a 和 $b 不相等或大小写不同\n$a < $b                 $a 小于 $b\n$a\
  \ > $b                 $a 大于 $b\n$a <= $b                $a 小于或等于 $b\n$a >= $b \
  \               $a 大于或等于 $b\n$a <=> $b               $a 小于 $b 时返回 -1，等于时返回 0，大于时返回\
  \ 1\n```\n\n此外，空合并运算符（Null Coalesce Operator）可用于在三元运算中使用某个值之前，检查该值是否“已设置”（即包含内容）。\n\
  \n```php\n$dog_name = $value ?? 'No Name';\n```\n\n在此示例中，如果 `value` 中存在内容，则将其放入\
  \ `$dog_name`。如果 `value` 未设置，则将 `No Name` 放入 `$dog_name`。\n\n让我们更新 `Dog` 类，以包含所有必要的\
  \ `set` 方法。\n\n*程序设计建议 — 在编码和测试程序时，请先只编写一个 `set` 方法。然后测试该方法以纠正错误。当您成功完成一个 `set`\
  \ 方法后，将其复制并粘贴到代码中，并进行必要的修改。不要试图在测试之前完整地编写一个程序。应逐个片段地编写程序，然后进行测试。尽管您可能认为这会减慢编码速度，但实际上并非如此。通过每次对程序进行小规模添加时捕获错误，更容易找到它们。如果您试图编写一个完整的程序，可能会遇到大量错误，并花费大量时间尝试查找每个错误。如果您在查找错误时遇到困难，请注释掉（使用\
  \ `//`）程序中的新代码行并重新测试。如果一切正常，则逐渐（一次几行）从代码行中移除注释行（`//`）并重新测试。这个过程应该有助于您找到可能导致问题的代码行。*\n\
  \n*安全与性能 — 在实时环境中，程序员不应向用户显示导致更新失败的具体细节。提供过多信息可能会让黑客知道可以更改什么来使用无效信息成功更新属性。应将导致更新失败的详细信息传递到服务器上的安全日志文件中。*\n\
  \n```php\n$dog_name = $value ?: $error_message = FALSE;\nreturn $error_message;\n\
  }\nfunction set_dog_weight(int $value) : bool\n{\nbool $error_message = TRUE;\n\
  (ctype_digit($value) && ($value > 0 && $value < 1001)) ? $this->dog_weight = $value\
  \ : $error_message = FALSE;\nreturn $error_message;\n}\nfunction set_dog_breed(string\
  \ $value) : bool\n{\nbool $error_message = TRUE;\n(ctype_alpha($value) && strlen($value)\
