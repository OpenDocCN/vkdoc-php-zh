  trans: '

    ### 检查方法


    正如使用 `ReflectionClass` 检查类一样，`ReflectionMethod` 对象用于检查方法。


    你可以通过两种方式获取 `ReflectionMethod`。首先，你可以从 `ReflectionClass::getMethods()` 获取一个 `ReflectionMethod`
    对象数组。其次，如果你需要处理特定方法，`ReflectionClass::getMethod()` 接受一个方法名称并返回相应的 `ReflectionMethod`
    对象。


    在此，我们使用 `ReflectionClass::getMethods()` 来全面演示 `ReflectionMethod` 类的功能：


    ```

    // listing 05.40

    $prodclass = new \ReflectionClass(''popp\\ch04\\batch02\\CdProduct'');

    $methods = $prodclass->getMethods();

    foreach ($methods as $method) {

    print ClassInfo::methodData($method);

    print "\n----\n";

    }

    // listing 05.41

    // class ClassInfo

    public static function methodData(\ReflectionMethod $method)

    {

    $details = "";

    $name = $method->getName();

    if ($method->isUserDefined()) {

    $details .= "$name is user defined\n";

    }

    if ($method->isInternal()) {

    $details .= "$name is built-in\n";

    }

    if ($method->isAbstract()) {

    $details .= "$name is abstract\n";

    }

    if ($method->isPublic()) {

    $details .= "$name is public\n";

    }

    if ($method->isProtected()) {

    $details .= "$name is protected\n";

    }

    if ($method->isPrivate()) {

    $details .= "$name is private\n";

    }

    if ($method->isStatic()) {

    $details .= "$name is static\n";

    }

    if ($method->isFinal()) {

    $details .= "$name is final\n";

    }

    if ($method->isConstructor()) {

    $details .= "$name is the constructor\n";

    }

    if ($method->returnsReference()) {

    $details .= "$name returns a reference (as opposed to a value)\n";

    }

    return $details;

    }

    ```


    这段代码使用 `ReflectionClass::getMethods()` 获取一个 `ReflectionMethod` 对象数组，然后遍历该数组，将每个对象传递给
    `methodData()`。


    `methodData()` 中使用的方法名称反映了它们的意图：代码检查方法是否为用户定义、内置、抽象、公开、受保护、静态或 final。你还可以检查该方法是否是其类的构造函数，以及它是否返回引用。


    有一点需要注意：如果被测试的方法只是返回一个对象，`ReflectionMethod::returnsReference()` 不会返回 `true`，即使在
    PHP 5 中对象是通过引用传递和赋值的。相反，只有当被测试的方法被显式声明为返回引用时（通过在方法名称前放置一个 `&` 符号），`ReflectionMethod::returnsReference()`
    才会返回 `true`。


    如你所料，你可以使用与之前处理 `ReflectionClass` 类似的技术来访问方法的源代码：


    ```

    // listing 05.42

    // class ReflectionUtil

    public static function getMethodSource(\ReflectionMethod $method): string

    {

    $path  = $method->getFileName();

    $lines = @file($path);

    $from  = $method->getStartLine();

    $to    = $method->getEndLine();

    $len   = $to - $from + 1;

    return implode(array_slice($lines, $from - 1, $len));

    }

    // listing 05.43

    $class = new \ReflectionClass(''popp\\ch04\\batch02\\CdProduct'');

    $method = $class->getMethod(''getSummaryLine'');

    print ReflectionUtil::getMethodSource($method);

    ```


    因为 `ReflectionMethod` 为我们提供了 `getFileName()`、`getStartLine()` 和 `getEndLine()`
    方法，所以提取方法的源代码变得非常简单。


    ### 检查方法参数


    现在方法签名可以约束对象参数的类型，因此检查方法签名中声明的参数的能力变得非常有用。Reflection API 为此目的提供了 `ReflectionParameter`
    类。要获取 `ReflectionParameter` 对象，你需要借助 `ReflectionMethod` 对象。`ReflectionMethod::getParameters()`
    方法返回一个 `ReflectionParameter` 对象数组。


    `ReflectionParameter` 可以告诉你参数的名称，以及变量是否通过引用传递（即在方法声明中带有前置的 `&`）。它还可以告诉你通过参数类型提示所要求的类，以及该方法是否接受该参数的
    `null` 值。


    以下是一些 `ReflectionParameter` 方法的使用示例：


    ```

    // listing 05.44

    $class = new \ReflectionClass(''popp\\ch04\\batch02\\CdProduct'');

    $method = $class->getMethod("__construct");

    $params = $method->getParameters();

    foreach ($params as $param) {

    print ClassInfo::argData($param) . "\n";

    }

    // listing 05.45

    // class ClassInfo

    public function argData(\ReflectionParameter $arg)

    {

    $details = "";

    $declaringclass = $arg->getDeclaringClass();

    $name  = $arg->getName();

    $class = $arg->getClass();

    $position = $arg->getPosition();

    $details .= "\$$name has position $position\n";

    if (! empty($class)) {

    $classname = $class->getName();

    $details .= "\$$name must be a $classname object\n";

    }

    if ($arg->isPassedByReference()) {

    $details .= "\$$name is passed by reference\n";

    }

    if ($arg->isDefaultValueAvailable()) {

    $def = $arg->getDefaultValue();

    $details .= "\$$name has default: $def\n";

    }

    if ($arg->allowsNull()) {

    $details .= "\$$name can be null\n";

    }

    return $details;

    }

    ```


    通过使用 `ReflectionClass::getMethod()` 方法，代码获取了一个 `ReflectionMethod` 对象。然后它使用 `ReflectionMethod::getParameters()`
    获取一个 `ReflectionParameter` 对象数组。`argData()` 函数使用传入的 `ReflectionParameter` 对象来获取有关参数的信息。


    首先，它使用 `ReflectionParameter::getName()` 获取参数的变量名。如果提供了类型提示，`ReflectionParameter::getClass()`
    方法会返回一个 `ReflectionClass` 对象。代码使用 `isPassedByReference()` 检查参数是否为引用；最后，它查找默认值的可用性，并将其添加到返回字符串中。

