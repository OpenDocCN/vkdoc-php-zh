    \ // access global\n```\n\n命名空间代码声明了自己的`Lister`类。同一命名空间中的客户端代码使用非限定名称来访问本地版本。用单个反斜杠限定的名称用于访问全局空间中的类。\n\
    \n以下是前面代码片段的输出：\n\n```\nhello from popp\\ch05\\batch04\\util\nhello from global\n\
    ```\n\n这很值得展示，因为它演示了`__NAMESPACE__`常量的操作。它会输出当前命名空间，并且在调试中很有用。\n\n你可以使用你已经见过的语法在同一个文件中声明多个命名空间。你也可以使用另一种语法，该语法将大括号与`namespace`关键字一起使用：\n\
    \n```\n// listing 05.12\nnamespace com\\getinstance\\util {\n    class Debug\n\
    \    {\n        public static function helloWorld()\n        {\n            print\
    \ \"hello from Debug\\n\";\n        }\n    }\n}\nnamespace other {\n    \\com\\\
    getinstance\\util\\Debug::helloWorld();\n}\n```\n\n如果你必须在同一个文件中组合多个命名空间，那么这是推荐的做法。然而，通常的最佳实践是按文件定义命名空间。\n\
    \n注意\n\n你不能在同一个文件中同时使用大括号和行内命名空间语法。你必须选择一种并全程使用它。\n\n### 使用文件系统模拟包\n\n无论你使用哪个版本的\
    \ PHP，你都应该使用文件系统来组织类，这提供了一种包结构。例如，你可以创建`util`和`business`目录，并使用`require_once()`语句包含类文件，如下所示：\n\
    \n```\nrequire_once('business/Customer.php');\nrequire_once('util/WebTools.php');\n\
    ```\n\n你也可以使用`include_once()`，效果相同。`include()`和`require()`语句之间唯一的区别在于它们对错误的处理方式。使用`require()`调用的文件在遇到错误时会导致整个进程崩溃。通过`include()`调用遇到的相同错误只会生成一个警告并结束被包含文件的执行，让调用代码继续运行。这使得`require()`和`require_once()`成为包含库文件的安全选择，而`include()`和`include_once()`则适用于模板等操作。\n\
    \n注意\n\n`require()`和`require_once()`实际上是语句，而不是函数。这意味着在使用它们时可以省略括号。就个人而言，我仍然喜欢使用括号，但如果你也这样做，就要准备好忍受那些急于指出你错误的人的说教。\n\
    \n图 5-1 从 Nautilus 文件管理器的角度展示了`util`和`business`包。\n\n![A314621_5_En_5_Fig1_HTML.jpg](img/A314621_5_En_5_Fig1_HTML.jpg)\n\
    \n图 5-1.\n\n使用文件系统组织的 PHP 包\n\n注意\n\n`require_once()`接受一个文件的路径，并将其包含进来，在当前脚本中进行评估。只有当其目标尚未在其他地方被包含时，该函数才会纳入它。这种一次性方法在访问库代码时特别有用，因为它可以防止类或函数的意外重复定义。当同一个文件在单个进程中被脚本的不同部分使用`require()`或`include()`等函数包含时，就可能发生这种重复定义。\n\
    \n习惯上，推荐使用`require()`和`require_once()`，而不是类似的`include()`和`include_once()`函数。这是因为在通过`require()`函数访问的文件中遇到致命错误会使整个脚本崩溃。而通过`include()`函数访问的文件中遇到的相同错误会导致被包含文件停止执行，但只会在调用脚本中生成一个警告。前者更激烈的行为更为安全。\n\
    \n与`require()`相比，使用`require_once()`会带来一些性能开销。如果你需要为系统榨取每一毫秒的性能，你可能需要考虑改用`require()`。像通常情况一样，这是效率与便利性之间的权衡。\n\
    \n就 PHP 而言，这种结构并没有什么特别之处。你只是将库脚本放置在不同的目录中。它确实有助于清晰的组织，并且可以与命名空间或命名约定并行使用。\n\n\
    ### PEAR 风格的命名\n\n在命名空间引入之前，开发人员被迫依靠约定来避免类名冲突。正如我们所见，最常见的就是由 PEAR 开发者维护的伪命名空间。\n\
    \n注意\n\nPEAR 代表 PHP 扩展与应用库（PHP Extension and Application Repository）。它是一个官方维护的包和工具档案库，用于扩展\
    \ PHP 的功能。核心 PEAR 包包含在 PHP 发行版中，其他包则可以通过一个简单的命令行工具添加。你可以在 [`http://pear.php.net`](http://pear.php.net)\
    \ 浏览 PEAR 包。\n\nPEAR 使用文件系统来定义其包，正如我所描述的那样。在引入命名空间之前，每个类都根据其包路径进行命名，每个目录名用下划线字符分隔。\n\
    \n例如，PEAR 包含一个名为`XML`的包，它有一个`RPC`子包。`RPC`包包含一个名为`Server.php`的文件。`Server.php`中定义的类并不像你预期的那样叫做`Server`。没有命名空间，这个类迟早会与\
    \ PEAR 项目或用户代码中其他地方的另一个`Server`类发生冲突。相反，这个类被命名为`XML_RPC_Server`。这种方法导致类名不够美观。然而，它确实使代码易于阅读，因为类名总是描述其自身的上下文。\n"
- fmt: '#### Include Paths


    When you organize your components, there are two perspectives that you should
    bear in mind. I have covered the first, where files and directories are placed
    on the filesystem. But you should also consider the way that components access
    one another. I have glossed over the issue of include paths so far in this section.
    When you include a file, you could refer to it using a relative path from the
    current working directory or an absolute path on the file system.


    **Note:** Although it is important to understand the way that include paths work
    and the issues involved in requiring files, it is also important to bear in mind
    that many modern systems no longer rely upon `require` statements at the class
    level. Instead, they use a combination of autoload and namespaces. I will cover
    autoload below, and then look in more detail at practical autoload recommendations
    and tools in Chapters [15](#A314621_5_En_15_Chapter.html) and [16](#A314621_5_En_16_Chapter.html).


    The examples you have seen so far have occasionally specified a fixed relationship
    between the requiring and required files:


    ```

    require_once(__DIR__ . ''/../useful/Outputter.php'');

    ```


    This works quite nicely, except that it hardcodes the relationship between files.
    There must always be a `useful` directory alongside the calling class’s containing
    directory.


    Perhaps the worst approach is the tortuous relative path:


    ```

    require_once(''../../projectlib/business/User.php'');

    ```


    This is problematic because the path specified here is not relative to the file
    that contains this `require_once` statement, but to a configured calling context
    (often, but not always, the current working directory). Paths like this are a
    recipe for confusion (and in my experience almost always a sign that a system
    will need considerable improvement in other areas, too).


    You could use an absolute path, of course:


    ```

    require_once(''/home/john/projectlib/business/User.php'');

    ```


    This will work for a single instance—but it’s brittle. By specifying paths in
    this much detail, you freeze the library file into a particular context. Whenever
    you install the project on a new server, all `require` statements will need changing
    to account for a new file path. This can make libraries hard to relocate and impractical
    to share among projects without making copies. In either case, you lose the package
    idea in all the additional directories. Is it the `business` package, or is it
    the `projectlib/business` package?


    If you must manually include files in your code, the neatest approach is to decouple
    the invoking code from the library:


    ```

    business/User.php

    ```


    The preceding snippet can be referenced from anywhere on a system. You can do
    this with the include path. This is a list of directories that PHP searches when
    attempting to require a file. You can add to this list by altering the `include_path`
    directive. `include_path` is usually set in PHP’s central configuration file,
    `php.ini`. It defines a list of directories separated by colons on Unix-like systems
    and semicolons on Windows systems:


    ```

    include_path = ".:/usr/local/lib/php-libraries"

    ```


    If you’re using Apache, you can also set `include_path` in the server application’s
    configuration file (usually called `httpd.conf`) or a per-directory Apache configuration
    file (usually called `.htaccess`) with this syntax:


    ```

    php_value  include_path  value    .:/usr/local/lib/php-libraries

    ```


    **Note:** `.htaccess` files are particularly useful in web space provided by some
    hosting companies, which provide very limited access to the server environment.


    When you use a filesystem function such as `fopen()` or `require()` with a nonabsolute
    path that does not exist relative to the current working directory, the directories
    in the include path are searched automatically, beginning with the first in the
    list (in the case of `fopen()`, you must include a flag in its argument list to
    enable this feature). When the target file is encountered, the search ends, and
    the file function completes its task.


    So by placing a package directory in an include directory, you need only refer
    to packages and files in your `require()` statements:


    ```

    require_once("business/User.php");

    ```


    You may need to add a directory to the `include_path` so that you can maintain
    your own library directory. To do this, you can edit the `php.ini` file (remember
    that, for the PHP server module, you will need to restart your server for the
    changes to take effect).


    If you do not have the privileges necessary to work with the `php.ini` file, you
    can set the include path from within your scripts using the `set_include_path()`
    function. `set_include_path()` accepts an include path (as it would appear in
    `php.ini`) and changes the `include_path` setting for the current process only.
    The `php.ini` file probably already defines a useful value for `include_path`,
    so rather than overwrite it, you can access it using the `get_include_path()`
    function and append your own directory. Here’s how you can add a directory to
    the current include path:


    ```

    set_include_path(get_include_path() . PATH_SEPARATOR . "/home/john/phplib/");

    ```


    The `PATH_SEPARATOR` constant will resolve to a colon on a Unix system and a semicolon
    on a Windows platform. So, for reasons of portability, its use is considered best
    practice.'
