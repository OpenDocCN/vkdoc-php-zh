- fmt: "已存在的图像会正常显示，但即使文件缺失或损坏，你也能避免令人尴尬的错误信息——这显得更加专业。别忘了恢复你在上一步中修改的图像名称。\n\n你可以在`ch04`文件夹中的`index_05.php`和`random_image_02.php`文件中核对你的代码。\n\
    \n### 使用包含文件防止错误\n\n许多主机商会关闭通知级别的错误报告，因此，如果你只在远程服务器上进行测试，可能不会意识到图[4-13](#A978-1-4842-0635-5_4_Chapter.html#Fig13)所示的问题。然而，在互联网上部署PHP页面之前，消除所有错误非常重要。仅仅因为你看不到错误信息，并不意味着你的页面没有问题。\n\
    \n使用PHP这类服务器端技术的页面会处理许多未知因素，因此明智的做法是进行防御性编码，在使用值之前先进行检查。本节将介绍一些措施，你可以用来预防和排查包含文件相关的错误。\n\
    \n#### 检查变量的存在性\n\n从PHP解决方案4-7中可以得出的教训是，你应该始终使用`isset()`来验证来自包含文件的变量是否存在，并将使用该变量的任何代码包装在条件语句中。在这个特定案例中，如果`$imageSize`不存在，你就知道没有图像可显示，因此需要移除`<figure>`元素。不过，在其他情况下，你或许可以为变量分配一个默认值，如下所示：\n\
    \n```\nif (!isset($someVariable)) {\n    $someVariable = default value;\n}\n```\n\
    \n这段代码使用了逻辑`非`运算符（参见第3章的表格3-6），来检查`$someVariable`是否未被设置。如果`$someVariable`不存在，则为其分配一个默认值，该值可以在后面的脚本中使用。如果它已存在，则条件语句内的代码会被跳过，并会使用原始值。\n\
    \n#### 检查函数或类是否已定义\n\n包含文件经常用于定义自定义函数或类。尝试使用一个未定义的函数或类会触发致命错误。要检查一个函数是否已定义，请将函数名作为字符串传递给`function_exists()`。在向`function_exists()`传递函数名时，省略函数名末尾的括号。例如，你可以这样检查一个名为`doubleIt()`的函数是否已定义：\n\
    \n```\nif (function_exists('doubleIt')) {\n    // 使用 doubleIt()\n}\n```\n\n要检查一个类是否已定义，请以相同的方式使用`class_exists()`，将一个包含类名的字符串作为参数传递：\n\
    \n```\nif (class_exists('MyClass')) {\n    // 使用 MyClass\n}\n```\n\n假设你想使用该函数或类，那么更实用的方法是：如果函数或类尚未定义，则使用条件语句来包含定义文件。例如，如果`doubleIt()`的定义在名为`utilities.php`的文件中：\n\
    \n```\nif (!function_exists('doubleIt')) {\n    require_once './includes/utilities.php';\n\
    }\n```\n\n### 在线上网站中抑制错误信息\n\n假设你的包含文件在远程服务器上正常工作，那么前几节概述的措施可能就是你需要的全部错误检查了。但是，如果你的远程服务器显示了错误信息，你应该采取措施来抑制它们。以下技术可以隐藏所有错误信息，而不仅仅是与包含文件相关的那些。\n\
    \n#### 使用错误控制运算符\n\n一种比较粗糙但有效的技术是使用PHP错误控制运算符（`@`），它可以抑制与其所在行相关的错误信息。你可以将`@`放在行的开头，或者直接放在你可能认为会生成错误的函数或命令前面，如下所示：\n\
    \n```\n@ include './includes/random_image.php';\n```\n\n错误控制运算符的问题在于，它隐藏了错误，而不是绕开它们解决问题。它只有一个字符，因此很容易忘记你使用过它。结果，你可能在脚本的错误部分浪费大量时间查找错误。如果你使用了错误控制运算符，那么在排查问题时，`@`标记应该是你第一个移除的东西。\n\
    \n另一个缺点是，你需要在每一个可能生成错误信息的行上都使用错误控制运算符，因为它只影响当前行。\n\n#### 在PHP配置中关闭`display_errors`\n\
    \n在线上网站中抑制错误信息的一个更好方法是，在Web服务器的配置中关闭`display_errors`指令。最有效的方法是你的主机商允许你控制`php.ini`设置时，直接编辑它。找到`display_errors`指令，并将其从`On`改为`Off`。\n\
    \n如果你无法控制`php.ini`，许多主机商允许你通过一个名为`.htaccess`或`.user.ini`的文件来更改有限范围的配置设置。具体使用哪个文件取决于PHP在服务器上的安装方式，因此请咨询你的主机商以确定使用哪一个。\n\
    \n如果你的服务器支持`.htaccess`文件，请在服务器根目录下的`.htaccess`文件中添加以下命令：\n\n```\nphp_flag display_errors\
    \ Off\n```\n\n在`.user.ini`文件中，命令则很简单：\n\n```\ndisplay_errors Off\n```\n\n`.htaccess`和`.user.ini`都是纯文本文件。与`php.ini`一样，每个命令都应单独占一行。如果这些文件在你的远程服务器上尚不存在，你可以直接在文本编辑器中创建它们。确保你的编辑器不会自动在文件名末尾添加`.txt`。然后，将该文件上传到你的网站服务器根目录。\n\
    \n> **提示**\n> Mac OS X会隐藏以点号开头的文件名，因此你在Mac Finder中将无法看到它们。但是，你应该可以使用专门的脚本编辑器打开它们。在“文件\
    \ ➤ 打开”对话框中，选择“启用: 所有项目”并勾选“显示隐藏项目”复选框。\n\n#### 在单个文件中关闭`display_errors`\n\n如果你无法控制服务器配置，可以通过在任何脚本的顶部添加以下代码行来阻止错误信息显示：\n\
    \n```\n<?php ini_set('display_errors', '0'); ?>\n```"
