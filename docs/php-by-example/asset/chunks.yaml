- fmt: '### Recursion


    There is a method of defining functions that deserves special attention. It is
    about recursion. In that case, the function is declared to call itself. That can
    be achieved by placing a command that calls the same function (usually with a
    different argument) in the function''s body. Listing [5-9](#613529_1_En_5_Chapter.xhtml#PC18)
    is a program in which several functions are defined using recursion.


    ```

    Listing 5-9

    Recursion

    ```


    The following is the program''s output.


    ```

    The output of the program (from Listing 5-9)

    5! = 120

    1+2+...+5 = 15

    The number 2 in the power 5: 32

    ```


    The program uses recursion to define functions for calculating the factorial of
    a number, the sum of natural numbers, and for raising a number to a power.


    The factorial is calculated by the `factorial()` function, which takes one argument
    (denoted as `$n`). The function''s body consists of only one conditional statement,
    in which the `$n==0` condition is checked. If it is true, then the function returns
    `1` as a result (by definition, the factorial of `0` is equal to `1`). Otherwise,
    the value of the function is calculated by the `$n*factorial($n-1)` expression,
    in which the function calls itself, but with an argument one less than the value
    of the original argument.


    | Details |

    | --- |

    | In this case, consider that the factorial of some number *n* is the product
    of the number *n* and the factorial of the number (*n* − 1), that is, *n* ! =
    *n* · (*n* − 1)!. |


    What happens when the function is called? If the function is called with a zero
    argument, the result is `1`. Let''s say the argument is non-zero; for example,
    `5`. Then the result is calculated as the product of the number `5`, and the result
    of the function call with argument `4`. When the function is called with argument
    `4`, the product of the number `4` and the result of the function call with argument
    `3` is calculated. When the function is called with argument `3`, the product
    of the number `3` and the result of calling the function with argument `2` is
    calculated, and so on. The chain of calls ends when the function is called with
    argument `0`. After that, everything is "rolled up": the values of expressions
    are sequentially evaluated until the result of calling the function with argument
    `5` is received.


    ![](images/613529_1_En_5_Chapter/613529_1_En_5_Figo_HTML.jpg)An information icon
    with the letter ''i''.Note


    For the sake of clarity and compactness of the code, curly braces were not used
    in the conditional statement, although that is not very good practice.


    The function for calculating the sum of numbers `sum()` also has one argument
    `$n`, and when calculating the result, the `$n==0` condition in the conditional
    statement is checked. If the condition is true, the result is zero (the sum of
    zero terms is assumed to be zero). If the condition is false, the result is calculated
    by the `$n+sum($n-1)` expression.


    | Details |

    | --- |

    | The sum of the numbers from 1 to *n* can be thought of as the sum of the number
    *n* and the sum of the numbers from 1 to (*n* − 1). |


    The `power()` function for raising a number to a power has two arguments: `$x`
    (the number to be raised to the power) and `$n` (the power). If the power is zero
    (the `$n==0` is true condition), then the result is `1` (the number in the power
    `0` is `1`). Otherwise, the result is calculated by multiplying the value of the
    `$x` argument by the result of calling the `power()` function with arguments `$x`
    and `$n-1` (the `$x*power($x,$n-1)` expression).


    | Details |

    | --- |

    | When determining the function, the obvious relation *x*^( *n*) = *x* · *x*^(
    *n* − 1) is taken into account. |


    In addition to describing functions, the program contains commands that check
    the correctness of calling the functions with recursion. It is hopeful to believe
    that they do not require comments.


    ### The `eval()` Function


    In PHP, there are many features worthy to be noted. However, let''s focus on the
    `eval()` function (more precisely, a syntax construction). It allows you to evaluate
    the expression passed to it as a string argument. For example, if you pass the
    `''$number=2*3+4;''` string as an argument to the `eval()` function, `10` is written
    to the `$number` variable. That result is obtained by evaluating the `2*3+4` expression.


    | Details |

    | --- |

    | First, the commands with the `eval()` syntax construction are very dangerous—so
    much so that the corresponding codes can be blocked by antivirus programs (in
    that case, you need to "ask" the antivirus to make an exception). The reason for
    the potential danger is that `eval()` allows you to execute previously unknown
    code, which can affect the vulnerability of the entire system. Therefore, the
    `eval()` construction should not be overused.Second, it matters in which quotes
    (single or double) you pass the string to `eval()`. The string must contain a
    valid PHP instruction (including the semicolon at the end of the command). You
    should also remember that their values are substituted in double quotes instead
    of variable names. Therefore, for example, an alternative to the `eval(''$number=2*3+4;'')`
    command is the `eval("\$number=2*3+4;")` command. In the latter case, the `\$`
    instruction is used to include the `$` character in the string. The result is
    the same in both cases. |


    Listing [5-10](#613529_1_En_5_Chapter.xhtml#PC20) is an example of using the `eval()`
    function.


    ```

    Listing 5-10

    Using eval()

    ```


    The result of the program''s execution could look as follows (the user input is
    marked in bold).


    ```

    The output of the program (from Listing 5-10)

    The statement for $x: $x=$A+$B;

    $x = 25

    ```


    The program is small. It uses two string variables `$first=''$A=2*3+4;''` and
    `$second="\$B=2*\$A-5;"`. These variables contain text with commands executed
    when the `eval($first)` and `eval($second)` instructions are executed.


    | Details |

    | --- |

    | That is, the `$A=2*3+4` and `$B=2*$A-5` commands are indeed executed, as a result
    of which `$A` is set to `10` and `$B` is set to `15`. |


    Then, the expression entered by the user is read and passed as an argument to
    `eval()` (the `eval(trim(fgets(STDIN)))` command). The user must enter a command
    assigning a value to the `$x` variable. That command is executed because the corresponding
    text is passed as an argument to `eval()`. After that, the value of the `$x` variable
    is checked using the `echo "\$x = $x\n"` command.


    | Details |

    | --- |

    | The preceding is the program''s output when the user enters the `$x=$A+$B;`
    expression. The expression is read (subject to the transformations due to the
    `trim()` function) as the text `''$x=$A+$B;''` and is passed as an argument to
    `eval()`. As a result, the `$x=$A+$B` command is executed, and the `$x` variable
    is set to `25`. |'
