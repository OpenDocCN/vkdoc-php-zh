  \ “PHP 之道” - PHP 最佳实践、公认编码标准和权威教程链接的快速参考 [`www.phptherightway.com/`](http://www.phptherightway.com/)\
  \ “PHP 最佳实践” - 针对常见和令人困惑的 PHP 任务的简短实用指南 [`phpbestpractices.org/`](http://phpbestpractices.org/)\
  \ “PHP 学习指南” - 面向希望通过 ZCE（Zend 认证工程师）考试的人士的 PHP 学习指南 [`php-guide.evercodelab.com/`](http://php-guide.evercodelab.com/)\
  \ “Zend 认证备考包” - 样题及答案，以及准备和参加 ZCE 考试的指南 [`leanpub.com/zce`](https://leanpub.com/zce?a=0_YKAEBrn4BvyagDZlmBZy&subID=b)\
  \ “PSR 是什么？” - “PSR” PHP 标准建议指南 [`www.lornajane.net/posts/2013/psr-what`](http://www.lornajane.net/posts/2013/psr-what)\
  \ |\n\n\n\n### 1.3 读者前提——或者说，这本书不是什么\n\n要充分掌握本书内容，你需要具备基本的 PHP 编程经验（多数情况下是 Web 开发），拥有常规编程或\
  \ IT 背景，并且愿意学习、敢于走出舒适区。\n本书并非 PHP 或通用编程的入门读物。虽然你不需要计算机学位或高级编程概念的知识，但本书的难度设定在普通 PHP\
  \ 程序员（即对 PHP 的掌握不仅限于基础层面的人）的水平，并会在讲解过程中解释任何必要的概念。本书对于高级程序员同样有用，他们可以将其作为快速参考，探索 Web\
  \ 之外 PHP 的应用。\n书中提供了代码示例来阐述概念和函数用法，但通常不会提供完整的脚本或程序。本书作为参考和入门读物，旨在为你提供信息和灵感，帮助你开发自己的\
  \ PHP 解决方案。同样，在讨论外部工具和第三方库时，我通常会提供概述、基本介绍或示例代码，然后附上官方文档和在线教程的链接。像这样涵盖广泛领域的书籍，若对某个特定软件（尤其是那些已有详尽文档的）进行深入探讨和大篇幅介绍，意义不大。当然，对于官方或在线文档缺失的相关领域，我们会进行补充，并在必要时直接为你指明相关章节。\n\
  \n### 1.4 给 Windows 和 Mac 用户的重要说明\n\n本书中的大部分示例均在 Linux 环境下（多数情况下为最新的 Ubuntu 桌面版/服务器版）运行和测试。PHP\
  \ 可在包括 MS Windows 和 Apple OS X 在内的多种操作系统上运行，代码通常能以完全相同的方式运行。当然，由于文件系统、操作系统、可用库等方面的差异，确实存在不同之处，但在本书中一一覆盖这些情况并不现实。此外，某些特性（例如依赖\
  \ POSIX 标准的特性）在某些系统（如 Windows）上无法（轻易）使用。由于 OS X 源自符合 POSIX 标准的操作系统，你可能会发现与 Windows\
  \ 相比，更多代码是兼容的，但实际体验可能仍有差异。关于操作系统特定问题的良好信息来源是官方 PHP 在线手册，特别是每页底部的用户评论。在可能的情况下，也会涉及其他操作系统的特定领域，例如我们会探讨如何访问\
  \ Windows 注册表。\n\n### 1.5 关于示例代码\n\n正如你将全书所见，我在编码示例中主要使用“传统”的命令式/过程式 PHP，以尽可能让所有水平的编码者都能轻松理解。本书并非关于编码最佳实践或风格的课程，也不是面向对象编程指南，更不推崇任何特定的编程模型或教条。我还避免使用任何代码框架。许多框架都基于\
  \ Web 模型，在我们将要探讨的应用类型中，它们并不总能按预期运行——尽管有些框架现在确实包含“控制台”或 `cli` 模块。MVC 风格的框架在构建 GUI\
  \ 应用时可能很有用（实际上 MVC 范式远在 Web 出现之前就已存在！），但由于存在众多不同的实现细节和风格，这里我们将坚持使用无框架的代码。\n从所展示的简洁、直白的\
  \ PHP 代码中，你应该能够清楚地看出如何将其使用或改编，以符合你自己的编程风格、框架或模型。我们将主要关注特定任务的具体实现细节，而将编程本身这一热门话题留给其他众多书籍去探讨。\n\
  示例代码通常也不会试图实现任何特别有用的程序。它力求最小化，以尽可能清晰，并勾勒出完成特定类型任务所需的基本框架。例如，用于创建守护进程的示例代码侧重于创建后台进程和运行事件循环的机制。这样做是为了保持代码清晰：作为一名\
  \ PHP 程序员，你可能已经知道如何检查你的 Twitter 帐户以获取贾斯汀·比伯的最新动态，你只想知道如何将进程守护化。这些代码旨在作为一种通用 PHP\
  \ 编程的参考，而非编程本身的教程。\n本书中的所有 PHP 示例代码均允许您免费使用、随意处置，无任何限制或许可要求。请根据您的需要随意使用或修改！\n如果您在运行或理解示例代码时遇到问题，请参阅本书最后一章的反馈部分，了解如何联系作者寻求帮助。\n\
