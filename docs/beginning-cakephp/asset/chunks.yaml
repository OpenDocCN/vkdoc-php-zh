    `Cake` 生成视图，允许客户端列出、编辑、删除和创建新事项。就这么简单。


    在开始将事项保存到数据库之前，必须首先创建数据库表及其字段。通常，在设计应用程序时，创建顺序大致如下：


    1. 设计并创建数据库。

    2. 创建模型。

    3. 创建控制器。

    4. 创建并调整视图。


    你的 `localhost` 根目录下已经有一个名为 `first_app` 的文件夹，其中运行着 `Cake 1.2`。让我们将此文件夹重命名为 `todo`
    并构建数据库。你应该能够通过输入 `http://localhost/todo` 来启动待办事项列表应用程序。


