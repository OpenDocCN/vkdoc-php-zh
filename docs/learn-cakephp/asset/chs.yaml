- '# 2. 什么是单元测试？


  ![A337704_2_En_2_Figa_HTML.jpg](img/A337704_2_En_2_Figa_HTML.jpg)


  把手给我，宝贝


  单元测试允许你对软件进行隔离测试。通常情况下，单元测试规模小、运行快，只测试一小段代码——即一个单元——例如一个函数。单元测试本身也是代码，旨在测试其他代码。


  它有助于保持代码简洁、易于理解和阅读。同时，它也有助于编写更易于维护的代码。最终，这有助于创建缺陷更少的软件。单元测试将测试过程自动化。


  单独依靠单元测试并不能保证应用程序完美无缺、毫无缺陷，但它们确实能带来很大帮助。


  ## 从手动测试到单元测试


  当你编写代码时，必须确保它能完成预期工作。由于我们讨论的是 PHP 测试，新手应在浏览器中进行测试。编写代码；打开浏览器；输入不同数据；检查输出是否符合预期。听起来很熟悉？这被称为手动测试，通过这种方式，我们测试的是功能，而非代码本身。


  下一步是建立一个自动化测试系统，这样你就不必在浏览器中手动点击各处来检查软件了。有许多工具可以完成这项工作。两种主要方法是测试驱动开发（TDD）和行为驱动开发（BDD）。


  简而言之，TDD 要求在编写代码之前先编写测试。这种方法依赖于单元测试。


  由于单元测试针对的是小段代码，编写起来很容易，并且你的代码也很容易被它们覆盖。


  在 BDD 中，任何单元的测试都应基于该单元的期望行为来指定。


  ## 争论


  关于反对编写单元测试，存在一些常见论点。我想通过回应这些论点，并分享我在这些问题上的个人经验，来强调单元测试的优势。然后，你可以亲自尝试单元测试，并做出自己的判断。


  ### 论点 #1：不可能测试所有变体


  是的，确实如此。你无法测试所有可能的变体。但至少单元测试能显示你的测试覆盖了哪些变体。如果你能确定应用程序因某个未覆盖的变体而失败，只需扩展测试即可。


  例如，如果我的测试能在正整数上成功运行，那么日后必要时，我可以将其扩展为测试 0、负整数或浮点数。


  ### 论点 #2：编写测试太耗时


  编写（以及维护）额外的代码确实需要时间。这显而易见。但编写本身只是众多耗时因素之一。还有哪些？花费在理解自己三、四个月前所写代码上的时间；花费在理解他人代码上的时间；花费在寻找包含
  bug 的特定代码片段上的时间；每当第三方代码变更时，花费在重新审查代码上的时间。当我们把所有这些事情花费的时间加起来，就会发现单元测试似乎能够节省时间。节省时间意味着节省成本，但要小心。单元测试**可能**节省时间，并非**绝对**会节省时间。你必须正确使用测试。


  学习使用单元测试本身也需要时间。但我认为学习曲线很短暂，并且即使在你第一次使用时，也会有所回报。


  ### 论点 #3：编写测试很难


  编写**测试**很容易。编写**好的测试**才难。但这只需要一点练习。


  有一个例外。为面条式代码，或做很多事情的函数编写测试，确实很难。因此，当你遇到困难的测试时，应意识到这可能表明你的代码需要重构。


  ### 论点 #4：我不需要测试；我了解自己的代码


  大约 99.9% 的情况下，你并非独自编码。我们经常使用第三方代码。而且，随着时间的推移，我们往往会忘记或改变自己对编码方式的思考。也许当初编写代码时思路很清晰，但一段时间后，我们可能需要花费几分钟（甚至几小时）来理解自己当时做了什么。


  很多时候，我会为自己仅五六行的辅助函数编写测试。当你的代码运行在不同的服务器、不同的 PHP 版本上时，这些函数测试起来要简单得多。测试不同的输入——甚至包括那些根本不应该出现的数据——比如除零错误，也更简单。


  ### 论点 #5：这纯粹是浪费时间


  这个论点通常来自那些刚开始编写单元测试，且心中抱有论点 #4 想法的 Web 开发者。他们常说：“我写了一些单元测试，但运行时一个 bug 都没发现。我觉得这是在浪费时间。”


  好吧，现在你有了测试。这意味着你手头有了一项资产，它可以在你进行某些修改或重构后，帮助你检查代码的相同部分。至少，为此你无需再回到手动测试。编写更多的测试，三个月后再回到你的代码，看看有什么不同。编写代码和维护代码是两件不同的事。有了单元测试，你在维护代码上浪费的时间会比没有它们时少得多。


  ### 论点 #6：测试本身可能也有 bug


  是的。任何代码都可能存在 bug。但是单元测试通常很短，因此更容易编写成无 bug 的版本。完全有可能编写出即使本应失败的测试也能通过的通过测试。再次强调，解决方案在于练习。


  永远不要忘记：测试能证明错误的存在，但不能证明错误不存在。




  ### 论点 #7：开发过程会破坏测试


  随着你在开发周期中不断添加新层，你同样需要维护你的测试。当代码发生变化时，相应的测试也应随之改变；否则，测试将会失败。不过，既然你修改了代码，你就应该知道如何修改测试。


  实际上，这正是拥有测试的优势之一。当我重构代码时，测试应该能够成功运行。如果我修改了代码的签名或返回值，测试会失败，或者也可能成功运行。如果失败，你就能看到代码在哪些地方可能会产生问题或
  bug。因此，它促进了安全的修改。


  ## 我们为什么要编写测试？


  测试能显著缩短测试时间，这最终会节省成本。测试有助于编写高质量的代码，并且是重构过程中的重要资产。它们将改变你对代码的思考方式。


  ### 测试功能


  当我们首次编写代码时，应该检查它是否真的实现了我们想要的功能。我们所有人都会这样做——无论有没有单元测试。实际上，`var_dump` 及其同类工具也算是一种测试。只是它们无法满足测试的真正目的。


  一段时间后，你必然需要对旧代码进行修改，要么是因为存在 bug，要么仅仅是因为你想优化之前的工作。在这种情况下，你也需要一些手段来测试代码是否依然满足你的需求。手动测试既枯燥、缓慢又低效。


  与任何其他测试系统相比，手动测试耗时都多得多，至少在你认真细致地操作时是如此。同一个方法可能在应用程序的许多地方被调用，你需要测试所有地方，以确保你的应用程序按预期工作。除此之外，你还应该列出可能的输入列表，例如“我应该用负数、零、字母、特殊字符来测试它。”
  也许在部署到生产环境之前，你忽略了测试所有情况。不，这种情况绝对不会发生！


  ### 重构


  重命名变量或函数可以提高代码的可读性。但你必须注意，重命名不会引入新的 bug 或冲突。修改方法的签名或返回值也是如此。测试能为你提供帮助。


  有时候，代码中会存在一些与代码目标毫无关联，或者根本不做任何事情的片段。显然，你想要移除这些代码，但之后你必须检查代码的主体部分是否仍然能正常工作。如果你的代码有测试覆盖，你就可以安全地移除那些不需要的代码片段，因为如果你移除了有用的部分，测试就会失败。


  在另一些时候，你可能知道自己的代码有问题，但不想花时间去修复。于是，你只是在代码中留下一段注释，比如 `// TODO: 如果 $num = 0 将会出错`。而一个失败的测试则要清晰得多。


  有句名言：“如果没坏，就别修它。” 你可能会问：我辛苦写出来的代码运行得好好的，你在说什么呢？但简单来说，这句话对于软件开发并不适用。重构是开发中非常重要的一部分。通过成功地重构代码，你最终会得到和没有重构时相同的结果，但你的代码将变得可复用、可维护、更快、更整洁，并且质量更高。


  ### 获取快速反馈


  快速反馈非常重要。开发人员没有时间点击每一个链接，以所有可能的顺序按每一个按钮，多次按浏览器的“返回”按钮，用各种数据（甚至是恶意数据）填写表单，或者部署新代码然后等待客户反馈。


  我认为 Firebug ( [`getfirebug.com`](https://getfirebug.com) ) 是一个很好的例子。我打开 HTML 选项卡并更改一些内容，我立刻就能在浏览器中看到结果。


  还有其他语言的工具，它们通过在每一个分号后或每次保存文件时实际运行测试来提供即时反馈。这些都是极其强大的开发工具。虽然 PHP 中没有这样的工具，但无论如何，测试是实现这一目标的最佳工具。


  ### 高质量的代码


  测试是在隔离环境中运行的。因此，通过运行一个测试，你正在验证一个不依赖于其他代码段的特定代码片段。但这很容易违反单一职责原则。测试为我们的代码编写过程增加了一个视角。更多内容可参见第
  3 章。


  ### 发挥大脑的最佳状态


  在压力之下，即使是最聪明的人（是的，甚至包括程序员）也会犯愚蠢的错误。


  你曾经写过像 `if(3 < 5)` 这样的代码吗？从来没有？我保证，你会的。即使是最微不足道的代码或代码变更，你也很可能会破坏某些东西。你是否总是放松？你是否总是有足够的时间编写代码？你的老板是否总是开心？你的客户是否总是耐心？你是否总是有明确的规格说明？你的孩子是否整夜安睡？如果答案是否定的，你就会犯愚蠢的错误。测试能帮助你以一种简单的方式检查你的代码。


  ### 节省时间和金钱


  正如我之前提到的，无论通过何种方式，你终究会测试你的代码。但你可以选择一种更有效的方法。你可以选择一种让你花更少时间修复 bug 和重构，而花更多时间实际编写代码的方法。节省时间很有趣——你总是可以把这些时间用来追你最喜欢的下一集电视剧——而节省时间也就意味着节省金钱。


  ## 总结


  在本章中，你学习了我们为什么要测试，什么是单元测试，以及反对它的论点是什么。由此，你了解到你可以节省维护代码的时间——因为几个月后的代码对你来说可能就像别人写的一样陌生——以及测试如何帮助你发挥大脑的最佳状态。


  '
- '# 3. 整洁代码


  ![A337704_2_En_3_Figa_HTML.jpg](img/A337704_2_En_3_Figa_HTML.jpg)


  我们的 API 似乎存在一些沟通问题


  谁在意代码呢？只要它能运行，那就没问题了。对吧？我不这么认为。


  有几个理由让你应该关注代码质量。


  首先，你代码的质量将决定软件的质量。如果你认为可以用混乱的代码构建出优秀的软件，那你是在做梦。其次，整洁代码节省时间。你花在阅读代码上的时间将多于编写它的时间。你团队中的其他人也会花相当一部分时间来阅读你的代码。你同样会花时间阅读别人的代码。整洁代码易于阅读，因此整洁代码能节省时间。第三，你的代码是你自身的反映。如果你不重视代码的质量，你就不会被录用。混乱的代码意味着你对自己或自己的作品没有坚持高标准。客户和雇主都要求质量。


  整洁代码是可维护的。它易于阅读和理解。这意味着它易于使用和修改。整洁代码是直截了当的。


  ## 如何编写整洁代码


  编写整洁代码不需要花费大量时间。编写整洁代码是一种习惯，在编写和重构过程中需要多加注意。幸运的是，这是一种可以学会的习惯。


  永远不要忘记：我们为机器和人编写代码。人更重要。


  以下是关于如何编写整洁代码的一些提示。当你在团队中工作时，至少应该明确这些选项。




  '
- '# 注释


  有些人认为单元测试可以替代注释。另一些人则说“不要注释——重构”。两种方法各有千秋，但注释对于编写更好的代码大有裨益。


  了解何时以及如何添加注释需要时间。我认为最好的方法是将注释视为代码中的便利贴。因此，如果某段代码不直观或需要花时间理解，就给它加上注释。例如，大多数时候，我会为正则表达式添加注释。但别忘了：修改代码后，你也应该更新注释。否则，可能会遇到具有误导性或令人困惑的注释。


  使用 PHPDoc (`www.phpdoc.org/`) 是一个最佳实践，并被 CakePHP 的核心所采用。PHPDoc 使得直接从源代码生成文档成为可能。它促进了所有类和方法的标准注释。


  '
- '# 命名


  我们应该为类、方法、变量、参数等进行命名。名称应该具有描述性和意义。“Foo” 和 “bar” 在简短的代码示例中还行，但在生产代码中可能会非常令人困惑。


  当你完全沉浸在代码中时，一个名为 `$lld` 的变量可能很清楚，但 `$last_login_date` 难道不是更具可读性、更容易理解吗？


  按照惯例，CakePHP 对数据库表、字段名和视图文件使用下划线命名。对于类名，它使用驼峰命名法（CamelCase）。对于变量名和参数名，你可以选择其中任何一种，但请坚持使用一种。因此，如果你更喜欢带下划线的变量名，那么所有变量名都使用下划线，不要混用驼峰命名。


  最好遵循 PHP 标准建议 (PSR) (`www.php-fig.org/psr`)。`PSR-1` 建议使用驼峰命名的方法名。使用动词作为方法名是一个最佳实践。


  '
- '# 方法


  方法应该只做一件事，且要做好。这就是单一职责原则。这意味着方法应该简短，这也就意味着它们易于理解。有些开发者推荐每个方法最多不超过三行代码。


  如果一个函数接受超过两个参数，那它就是重构的理想候选。


  CakePHP 的 ORM 是使用方法链的一个很好的例子。它可以显著提高代码的可读性，也可能使其变得一团糟。所以，请从好的范例中学习。


  '
- '# 代码格式


  历史学家说，历史上最血腥的战役是 1942 年的斯大林格勒战役。他们这么说是因为他们从未参加过开发人员试图就新项目中要遵循的代码风格达成一致的会议。


  多亏了 `PSR-2`，这场战役结束了，我们有了一个可以遵循的建议。


  代码格式涵盖缩进、左右花括号的位置、换行的位置等。


  '
- '# MVC


  正如 MVC（模型-视图-控制器）所强调的，不要将模型、控制器和视图的功能混在同一个文件或类中。这也有助于保持代码整洁。


  也许你还可以做很多其他事情来确保代码整洁，但在此列出并介绍所有选项超出了本书的范围。你可以使用一些巧妙的工具，例如 PHP Mess Detector (`https://phpmd.org/`)，来帮助你编写整洁的代码。


  '
- '# 测试如何帮助编写整洁的代码


  即使你在应用中使用单元测试，代码仍然可能变得混乱。单元测试不会替你完成工作。我将在第 `4` 章更详细地讨论这个话题。


  ## 规划


  规划是创建优秀软件中非常重要的一部分，但像我和你这样的人常常缺乏耐心，无法将每个细节都规划周全。我们喜欢尽快动手。不幸的是，这种编码方式会制造问题。使用单元测试会促使我们在开发过程中进行深思熟虑（或规划）。如果我想给一个
  Web 应用添加新功能，我当然会思考它如何运作。如果连这点规划都没有，我就无法编写代码。当代码能运行时，我的工作就完成了——至少是直到有人发现 bug 之前。当我编写测试时，我不得不思考可能且可接受的输入、输出以及返回值。编写测试有助于我们从远处、在更抽象的层面上思考，而测试驱动开发（TDD）则能帮助我们从中获得最大收益。


  ## 重构


  只要你的测试没有失败，你就可以确信你测试过的代码按预期运行。测试有助于检查代码中的修改是否破坏了什么。因为单元测试是隔离运行的，它们有助于生成更好、更简单的代码。


  有了测试，你无需担心改变函数签名或返回值的类型。测试会指出在哪些地方需要为函数调用进行相应修改。


  如果你的测试不只是几行代码，这可能是你的代码中违反了单一职责原则的标志。如果你在重构代码后修改了测试，这种情况常常发生。记住这一点，你最终将得到更整洁的代码。


  '
- '# 总结


  在本章中，我介绍了整洁代码的理念和重要性。你学习了一些用于确保代码整洁的应遵循的原则，以及为什么命名或代码格式很重要。最后，你了解了单元测试如何有助于编写更简洁的代码。


  '
- '# 4. 测试驱动开发


  ![A337704_2_En_4_Figa_HTML.jpg](img/A337704_2_En_4_Figa_HTML.jpg)


  让我们通过尝试和实践来开始吧。


  严重依赖单元测试的开发人员使用一种称为“测试驱动开发”或 TDD 的技术。


  TDD 是一个软件开发过程，你在实现代码之前先编写测试。因此，测试引导开发者编写代码本身。TDD 是一个循环过程，包含 4+1 个步骤：编写测试、编写代码、重构、再次测试，然后重复此过程。


  ## PHP TDD 工具


  有许多工具对 PHP 中的 TDD 非常有帮助。


  ### PHPUnit


  PHPUnit (`https://phpunit.de/`) 是 PHP 进行单元测试和 TDD 的事实标准工具。它已集成到 CakePHP 中，因此你很快就会熟悉它的使用。


  然而，还有其他工具也拥有不断增长的社区并提供支持。


  ### Codeception


  Codeception (`http://codeception.com/`) 支持编写单元测试、功能测试和验收测试。它已集成到几个 PHP 开发框架中，例如
  Zend、Symfony、Laravel 等。


  ### SimpleTest


  SimpleTest (`http://simpletest.org/`) 是一个易于使用的框架，支持 SSL、代理和认证。JUnit 的用户会熟悉其界面。


  ### Atoum


  Atoum (`https://github.com/atoum`) 是一个相对较新的参与者，它使用了 PHP 5.3 版本中引入的新 PHP 特性。


  ### Selenium


  Selenium (`http://www.seleniumhq.org/`) 实际上比前面提到的工具更全面，因为它是一个自动化浏览器的复杂、健壮的系统。使用它可以对整个
  Web 应用进行测试。


  ## TDD 开发周期


  TDD 需要一种不同的思维方式以及不同的编码风格。让我们看看它需要什么。对于手头的 CakePHP 来说，你无需从头开始。它的框架已经包含了许多优秀的功能。所以，现在我们只需专注于我们的应用开发。




  '
- '# 步骤 #1：编写测试


  为你尚不存在的代码编写一个单元测试。在编写测试时——以及在你真正编写任何代码之前——要考虑到所有可能的输入、错误和输出。这一步增加了一个额外的、抽象的但重要的层次。


  当你第一次运行单元测试时，它会失败。它应该失败，因为你正在测试的代码还不存在。


  通过单一测试方法，你会基于可能的输入或错误生成一个或多个断言。


  大多数情况下，我会从编写模型测试开始。我会创建一个测试方法，该方法调用相应模型的一个方法（例如，`getUserComments()`），即使该方法当前并不存在。我知道期望得到什么结果，因此我会做出断言。这意味着我必须确定该方法返回值的数据类型。


  '
- '# 步骤 #2：编写代码


  现在你已经写好了测试，就可以开始编写代码了。在这一步中，我会创建模型类的 `getUserComments()` 方法。当我认为它没问题时，就直接运行测试，看看它是否会失败。


  当你的所有测试都通过时，你的代码就准备好了。


  在编写代码时，或许最好遵循第 3 章中描述的原则。


  '
- '# 步骤 #3：重构


  一旦你所有的测试都成功通过，你就可以开始重构代码，清理不必要的变量、函数调用等。


  这是很重要的一部分。当我们专注于小的代码片段，并且处于理解其问题及解决方案的最佳心态时，这就是重新思考解决方案并尽可能保持其简单性的最佳时机。


  '
- '# 步骤 #4：再次测试


  现在重新运行你的测试。如果一个或多个测试没有通过，说明你在重构过程中引入了新的错误。如果你所有的测试都通过了，你的代码可能就没问题。但不要忘记第 2 章中的论点
  #1 和 #6。


  '
- '# 步骤 #5：为新功能编写代码


  这一步要求你重新开始同样的过程，但针对另一个任务。不要忘记也要彻底测试这一部分。你在代码任何地方所做的更改都可能影响这一部分，反之亦然。这意味着处理某个功能可能会在别处引发错误或导致测试失败。


  ## 总结


  在本章中，你学习了什么是测试驱动开发，以及它如何与单元测试相关联。我列出了一些主要的便于 TDD 的 PHP 工具。其中，PHPUnit 对我们来说最重要，因为它已集成到
  CakePHP 中。然后，我介绍了 TDD 的开发周期，无论是在 CakePHP 中，还是在一般情况下。


  '
- '# 5. 开发周期


  ![A337704_2_En_5_Figa_HTML.jpg](img/A337704_2_En_5_Figa_HTML.jpg)


  伟大的生命循环


  开发模型有很多种。在我看来，选择合适的模型可能是开发过程中的重要一环，尤其是在习惯和实践方式确实存在差异的情况下。处理 Web 应用程序和桌面应用程序也有不同的方法。我们都有自己偏爱的实践方式。让我来分享一下我的做法：那就是敏捷软件开发。


  ## 敏捷


  敏捷软件开发是一套[软件开发](https://en.wikipedia.org/wiki/Software_development)原则，其需求和解决方案源自团队协作。它提倡适应性规划、渐进式开发、早期交付和持续改进，并鼓励对变化做出快速而灵活的反应。


  敏捷宣言（ [`http://agilemanifesto.org/`](http://agilemanifesto.org/) ）简短而明了。


  ### 敏捷宣言


  “我们正在通过实践并帮助他人实践，揭示更好的软件开发方法。通过这项工作，我们开始重视：


  1.  个体和互动 高于 流程和工具

  2.  可工作的软件 高于 详尽的文档

  3.  客户合作 高于 合同谈判

  4.  响应变化 高于 遵循计划


  也就是说，虽然右项也有其价值，但我们更重视左项的价值。”


  ### 宣言背后的 12 条原则


  敏捷宣言背后有 12 条原则。


  1.  我们的最高优先事项是通过尽早并持续地交付有价值的软件来满足客户。

  2.  欢迎不断变化的需求，即使是在开发后期。敏捷流程利用变化为客户创造竞争优势。

  3.  频繁地交付可工作的软件，交付间隔可以从几周到几个月，倾向于采用更短的时间尺度。

  4.  业务人员和开发人员必须在项目期间每天一起工作。

  5.  项目由有动力的个体构建。给予他们所需的环境和支持，并信任他们能够完成工作。

  6.  向开发团队传达信息或在团队内部传达信息，最高效且最有效的方法是面对面的交谈。

  7.  可工作的软件是衡量进度的首要标准。

  8.  敏捷流程促进可持续的开发。赞助人、开发者和用户应该能够无限期地保持恒定的节奏。

  9.  持续关注技术卓越和良好设计能增强敏捷性。

  10.  简单性——最大化未完成工作的艺术——是至关重要的。

  11.  最好的架构、需求和设计源自自组织团队。

  12.  团队定期反思如何能变得更有效，然后相应地调整其行为。


  ### CakePHP 如何支持敏捷开发


  正如你所见，上述某些原则需要特定的思维模式、思考方式，而有些原则实际上需要一些技术支持。


  烘焙是在短时间内让某些东西可见的好方法。因此，它有助于遵循原则 1、4 和 7。


  得益于 CakePHP 的 MVC 模式以及 CakePHP3 中引入的优秀新 ORM，至少在模型层面，后期更改变得很容易。即使在后期阶段，处理数据库表或字段的更改也很简单。因此，它符合原则
  2 和 7。


  定期交付（原则 3）与其说是一个技术问题，不如说是一个习惯或工作流程组织问题。尽管如此，由于前面提到的两点，CakePHP 为我们实现这一目标提供了一些帮助。


  TDD 能帮助你遵循原则 9 和 10。


  ## 通往价值的敏捷路线图


  任何项目都需要一些步骤或阶段。在敏捷中，“通往价值的路线图”提供了项目的高层概览。该路线图包含七个阶段。


  ### 产品愿景


  在第 1 阶段，产品负责人概述产品愿景：项目的定义，它将如何服务于用户（或公司）的目标，以及目标用户是谁。


  一个例子：对于想要一个简单易用博客的人来说，`cakeBlog` 是一个提供专注于博客的最小化功能的博客引擎。与其他功能过多的引擎不同，我们的软件是真正为小白设计的。


  据我估计，有 90–95% 的情况，客户并不确切知道自己想要什么。他们有一些想法，但远非具体。这没问题，这不是问题——记住原则 2。


  ### 产品路线图


  产品负责人在第 2 阶段创建产品路线图。这是产品需求的高层视图，并包含对这些需求何时开发的大致估算时间表。


  ### 发布计划


  在第 3 阶段，产品负责人制定发布计划，这实际上是可工作软件发布的时间表。它会有多次发布，优先级最高的功能会最先推出。


  ### 冲刺规划


  冲刺是创建软件的迭代周期。在第 4 阶段，团队规划冲刺。冲刺规划在每个冲刺开始时进行，团队在此决定本次冲刺应包含哪些需求。




  ### 每日站会


  在每个冲刺周期中，团队都会召开每日站会。这是阶段 5。会议不超过 15 分钟，内容涉及昨天完成了什么、今天要做什么，以及任何潜在的障碍。


  ### 冲刺评审


  在每个冲刺周期结束时，会展示冲刺过程中创建的可运行产品。这是阶段 6。


  ### 冲刺回顾


  在每个冲刺回顾（即阶段 7）结束时，会召开一次会议，团队在会上讨论冲刺的进展以及下个冲刺的改进想法。


  ## 总结


  在本章中，我介绍了敏捷软件开发的原则和阶段。你了解了 CakePHP 如何支持敏捷开发。即使你遵循其他开发方法，CakePHP 也为你提供了有用的工具。


  '
- "# 6. 准备测试\n\n![A337704_2_En_6_Figa_HTML.jpg](img/A337704_2_En_6_Figa_HTML.jpg)\n\
  \n比尔觉得自己的训练还不够完整。\n\n## 安装\n\n为了让一切都能正常运行，你需要安装 Web 服务器、MySQL 服务器、PHP、CakePHP（`http://book.cakephp.org`）和\
  \ PHPUnit（`http://phpunit.de`）。我将以 Ubuntu 16.04 为例，逐一讲解这些步骤。其他系统，如 MacOS 或 Windows，甚至其他\
  \ Linux 系统，都有不同的安装方法。\n\n我们将通过终端安装所有软件，为此你需要系统的 root 密码。\n\n### 安装 Web 服务器\n\nWeb\
  \ 服务器，或 HTTP 服务器，是一种处理浏览器请求的软件。它的主要功能是存储、交付和处理网页。最广泛使用的是 Apache（`https://httpd.apache.org/`）。\n\
  \n打开终端并执行以下命令。如果系统尚未安装，该命令将安装最新的 Apache Web 服务器。\n\n```\n$ sudo apt-get install\
  \ apache2\n```\n\n结果会很长，但开头和结尾应该类似如下内容：\n\n```\nReading package lists... Done\n\
  Building dependency tree\nReading state information... Done\nThe following package\
  \ was automatically installed and is no longer required:\n...\nProcessing triggers\
  \ for libc-bin (2.23-0ubuntu3) ...\nProcessing triggers for systemd (229-4ubuntu6)\
  \ ...\nProcessing triggers for ureadahead (0.100.0-19) ...\nProcessing triggers\
  \ for ufw (0.35-0ubuntu2) ...\n```\n\n### 安装 MySQL\n\nMySQL 是 Web 应用程序中最流行的开源关系型数据库系统。如果你需要一个数据库来存储应用程序数据，MySQL\
  \ 是最简单的选择。\n\n打开终端并执行以下命令来安装 MySQL 服务器：\n\n```\n$ sudo apt-get install mysql-server\n\
  ```\n\n结果也很长，所以我省略了中间部分。\n\n```\nReading package lists...\nBuilding dependency tree...\n\
  Reading state information...\nThe following package was automatically installed\
  \ and is no longer required:\nlibnghttp2-14\n...\nPreparing to unpack .../mysql-server_5.7.12-0ubuntu1_all.deb\
  \ ...\nUnpacking mysql-server (5.7.12-0ubuntu1) ...\nSetting up mysql-server (5.7.12-0ubuntu1)\
  \ ...\n```\n\n### 安装 PHP\n\nPHP 是一种主要针对 Web 开发而设计的服务器端脚本语言。它非常流行：超过 80% 的 Web 服务器都安装了\
  \ PHP。它易于学习、灵活且健壮，并且可能是 CakePHP 所使用的底层语言。\n\n最新版本是 PHP 7，它代表了 PHP 5 之后的一次重大飞跃。PHP\
  \ 7 引入了标量类型声明、返回类型声明、null 合并运算符、太空船运算符、匿名类以及许多其他特性。\n\n为了确保一切正常工作，PHP 应与一些模块一起安装。我们将\
  \ PHP 作为 Apache 模块运行，并安装 MySQL、mbstring、intl 和 xml 模块。\n\n```\n$ sudo apt-get install\
  \ php7.0 libapache2-mod-php7.0 php7.0-mysql php7.0-mbstring php7.0-intl php7.0-xml\n\
  ```\n\n输出结果同样做了删减。\n\n```\nReading package lists...\nBuilding dependency tree...\n\
  Reading state information...\nThe following packages were automatically installed\
  \ and are no longer required:\nlibjs-excanvas mercurial mercurial-common php-cli-prompt\
  \ php-composer-semver\n...\nCreating config file /etc/php/7.0/mods-available/xsl.ini\
  \ with new version\nProcessing triggers for libapache2-mod-php7.0 (7.0.4-7ubuntu2.1)\
  \ ...\n```\n\n### 安装后配置\n\n为了充分利用 CakePHP 的路由功能，我们应该启用 `mod_rewrite`。由于是在开发服务器上，我们将\
  \ CakePHP 安装到用户目录，因此我们也需要启用并配置它。\n\n首先，让我们启用 `userdir`。\n\n```\n$ sudo a2enmod userdir\n\
  ```\n\n编辑 `/etc/apache2/mods-enabled/userdir.conf` 并粘贴以下代码：\n\n```\n2     UserDir\
  \ public_html\n3     UserDir disabled root\n\n6       AllowOverride FileInfo AuthConfig\
  \ Limit Indexes\n7       Options MultiViews Indexes SymLinksIfOwnerMatch IncludesNoExec\n\
  \n9         Require all granted\n\n12       Require all denied\n```\n\n下一个要编辑的文件是\
  \ `/etc/apache2/mods-available/php7.0.conf`。在 Ubuntu 上，默认禁用了在用户目录中运行 PHP 脚本，因此我们应该启用它。注释掉该文件的最后五行。\n\
  \n```\n21  #\n22  #    \n23  #        php_admin_flag engine Off\n24  #    \n25 \
  \ #\n```\n\n让我们启用并配置 `mod_rewrite`。\n\n```\n$ sudo a2enmod rewrite\n```\n\n为了让所有功能加载并正常工作，我们应该重启\
  \ Apache。\n\n```\n$ sudo service apache2 restart\n```\n\n### 安装 Composer\n\nComposer\
  \ 是 PHP 的应用程序级包管理器，它提供了管理 PHP 软件及其所需库依赖关系的标准格式。它是任何 PHP 开发必不可少的工具。由于 Composer 是安装\
  \ CakePHP 的推荐方式，我们将首先安装它。\n\n打开终端并执行以下命令，通过 `curl` 下载 Composer 并安装到当前目录。\n\n```\n\
  $ curl -s https://getcomposer.org/installer | php\n```\n\n### 安装 CakePHP\n\n作为示例，我们将使用一个博客来熟悉\
  \ CakePHP 单元测试。首先，使用 Composer 创建一个新的 CakePHP 项目。\n\n```\n$ cd ~/public_html\n$ php\
  \ composer.phar create-project --prefer-dist cakephp/app cakeBlog\n```\n\n这将在当前工作目录下创建一个\
  \ `cakeBlog` 文件夹，并下载最新版本的 `cakephp`（撰写本文时为 3.2.8）以及所有必需的包。\n\n安装完成后，你应该为 Web 服务器用户设置\
  \ `/tmp` 和 `/logs` 文件夹的写入权限。\n\nComposer 会在项目目录中创建 `composer.json` 和 `composer.lock`\
  \ 文件。这些文件描述了项目的标识数据、依赖关系以及其他与依赖相关的设置。\n\n由于我们通过 Apache 和 PHP 启用了用户目录，我将它放在了我的主目录（`/home/rrd`）下的\
  \ `public_html` 文件夹中，因此我将通过 `http://localhost/~rrd/cakeBlog/` 访问我的应用程序，并在示例中使用此\
  \ URL。\n\n如果一切正常，你应该能够通过浏览器导航到你的安装路径。你将看到类似图 6-1 的内容。\n\n![A337704_2_En_6_Fig1_HTML.jpg](img/A337704_2_En_6_Fig1_HTML.jpg)\n\
  \n**图 6-1.** 安装后的博客\n\n暂时不必担心有关数据库连接的错误消息。我很快就会回到这个问题。\n\n### 安装 PHPUnit\n\nPHPUnit\
  \ 是 PHP 单元测试的事实标准。PHPUnit 已集成到 CakePHP 中用于单元测试。得益于 Composer，安装它及其所有必需的包非常简单。我们不需要在生产服务器上安装\
  \ PHPUnit，因此我们将使用 `--dev` 选项。\n\n```\n$ cd ~/public_html/cakeBlog\n$ php composer.phar\
  \ require --dev phpunit/phpunit\n```\n\n如果你使用 `--dev` 选项，Composer 会将此依赖项放入 `composer.json`\
  \ 的 `require-dev` 部分。然后，在生产服务器上，你可以通过使用以下命令跳过这些仅在开发时需要的依赖项的安装：\n\n```\n$ php composer.phar\
  \ --no-dev install\n```\n\n\n\n### 安装 phpMyAdmin\n\n`phpMyAdmin` 是一款免费开源的 PHP 工具，旨在通过\
