    is best obtained by directly accessing it from the web site.


    ![../images/394210_2_En_1_Chapter/394210_2_En_1_Fig5_HTML.jpg](images/394210_2_En_1_Chapter/394210_2_En_1_Fig5_HTML.jpg)


    Figure 1-5


    The Manual (03/28/2020)


    You can use the manual as if it were a textbook by clicking through each link
    from the beginning. The limited amount of explanation provided with each section
    of the manual might cause a beginner to want to give up on programming and change
    interests to something ghastly like networking! The manual does provide a great
    guide for experienced programmers, as the syntax of the language is similar to
    other languages such as Python, JavaScript, Perl, and Java.


    On any page of the web site, the user can enter a term, an expression, or even
    a function name to find more information. As the information is entered in search
    box, the web page will provide the user with one or more options below the box
    for the user to select.


    Once the user has selected an option (such as echo shown in Figure [1-7](#394210_2_En_1_Chapter.xhtml#Fig7)),
    the results of the search provide the user with a general description of the item
    requested, any inputs or outputs for a function (parameters), and example code.'
  trans: '

    # PHP 7、PHP 7.4+、PHP 8 与 PHP.NET


    如今，`PHP`（超文本预处理器）是用于 Web 应用程序开发的最流行的语言之一。该语言经过不断演进，允许程序员使用`过程式`和`面向对象`的编程技术快速开发结构良好、无错误的程序。它提供了使用许多预存代码库的能力，这些代码库要么随基础安装自带，要么可以在
    PHP 环境中安装。这为你提供了多种完成特定任务的方式。它比许多其他语言提供了更多的灵活性。能够轻松地将额外的代码库添加到环境中，是其广受欢迎的众多驱动力之一。


    - `过程式语言` — 一种过程式编程语言包含可以从程序主流程中调用的函数/方法。程序流程跳转到该函数/方法，执行模块内的代码，然后返回到程序主流程中的下一条语句。有些过程式语言包含一个主函数/方法，当程序执行时，它会被自动调用。


    - `面向对象语言` — 一种面向对象语言使用类和对象。类类似于蓝图。一个类描述了一个对象可以包含的内容，包括属性/变量和函数/方法。对象是类的一个实例（就像根据蓝图建造的建筑物）。面向对象语言提供了多态性、封装性和继承性。对象通过将所有相关的函数/方法和属性/变量包含在对象自身内部而自然地被封装起来。多态性允许在面向对象的对象中使用重复的方法/函数名称。然而，“签名”必须不同。“签名”是传递给方法/函数的变量类型（数字和字符）以及从方法/函数传出的信息类型的组合。例如，可以创建多个`add`方法——一个只接受整数（整数），一个只接受浮点数（带小数点的数字），还有一个接受组合类型。程序将根据传递给方法/函数的内容来决定调用哪个方法/函数。面向对象编程中的继承性允许一个对象从另一个对象继承属性/变量和函数/方法。该对象也可以覆盖那些继承来的项。这类似于孩子从父母那里继承特征。面向对象语言也可以是事件驱动的。事件驱动程序会“休眠”，直到某个事件发生。这类似于
    ATM 机程序等待用户插入 ATM 卡或走到机器前。


    PHP 是一种`开源`语言。因此，该语言的每个版本都是在使用它的人——即程序员自身——的输入下创建的。这使得该语言能够随着时间推移不断演进，并朝着用户驱动的方向发展。自
    1995 年由拉斯马斯·勒德尔夫首次发布为个人主页工具（PHP）以来，其各个版本已在互联网上发布，并配有论坛，让用户能够提出建议，甚至提供代码更改和补充。如今，[`www.php.net`](http://www.php.net)
    是 PHP 的官方网站。


    - `开源语言` — 一种开源编程语言由相关利益方组成的社区开发。社区接受来自同行程序员的输入，以获取建议的升级和更正。社区中的一些成员共同提出提案并对语言进行更改。开源语言是“免费”的。非开源语言（例如微软
    C#）由一家公司或主要组织创建和更新。非开源语言通常不是“免费”的。


    ![../images/394210_2_En_1_Chapter/394210_2_En_1_Fig1_HTML.jpg](img/394210_2_En_1_Fig1_HTML.jpg)


    图 1-1


    PHP.NET（2020 年 3 月 28 日）


    [`www.php.net`](http://www.php.net) 主页提供了该语言每个最新版本的信息。它还提供了关于未来版本、这些版本计划的功能以及计划发布日期等信息。此外，还可以找到其他相关的
    PHP 信息，包括主要 PHP 会议的链接和信息。


    ![../images/394210_2_En_1_Chapter/394210_2_En_1_Fig2_HTML.jpg](img/394210_2_En_1_Fig2_HTML.jpg)


    图 1-2


    参与进来（2020 年 3 月 28 日）


    如前所述，该网站为用户提供了帮助语言未来发展的能力。用户可以参与测试测试版并报告错误或程序缺陷。访问者还可以查看与未来可能版本开发相关的文档。这是在重大公告向公众发布之前发现未来增强功能或安全修复的好方法。


    ![../images/394210_2_En_1_Chapter/394210_2_En_1_Fig3_HTML.jpg](img/394210_2_En_1_Fig3_HTML.jpg)


    图 1-3


    下载页面（2020 年 3 月 28 日）


    正如你可能猜到的，下载页面允许轻松获取该语言的最新版本。但是，你会注意到，只提供了语言本身。更常见且推荐的做法是，初学者使用`WAMP`（Windows、Apache、MySQL/MariaDB、PHP）、`LAMP`（Linux、Apache、MySQL/MariaDB、PHP）或`MAMP`（Mac、Apache、MySQL/MariaDB、PHP）集成软件包进行初始安装。这些软件包（我们将在后面介绍）允许同时轻松安装多个产品。否则，你必须运行许多单独的安装程序。


    ![../images/394210_2_En_1_Chapter/394210_2_En_1_Fig4_HTML.jpg](img/394210_2_En_1_Fig4_HTML.jpg)


    图 1-4


    文档页面（2020 年 3 月 28 日）


    - `WAMP/LAMP/MAMP` — 开源（免费）组合，包括适用于特定操作系统（Windows、Linux 和 Mac）的 Apache Web 服务器、MySQL/MariaDB
    和 PHP。这些软件包是开源的。该软件组合用于创建动态网站和 Web 应用程序。


    PHP 网站中比较重要的页面之一是文档页面。该页面允许用户搜索语言本身的描述和功能。你也可以下载完整的文档。然而，由于这是一个“实时”网站，可能会有变化，最好直接从网站访问以获取最新的信息。


    ![../images/394210_2_En_1_Chapter/394210_2_En_1_Fig5_HTML.jpg](img/394210_2_En_1_Fig5_HTML.jpg)


    图 1-5


    手册（2020 年 3 月 28 日）


    你可以像使用教科书一样使用手册，从一开始点击每个链接。手册每个部分提供的有限解释可能会让初学者想要放弃编程，转而对其网络之类可怕的东西感兴趣！不过，对于有经验的程序员来说，手册确实是一个很好的指南，因为该语言的语法与其他语言（如
    Python、JavaScript、Perl 和 Java）相似。


    在网站的任何页面上，用户都可以输入一个术语、一个表达式，甚至一个函数名称来查找更多信息。当信息输入到搜索框中时，网页会在框下方为用户提供一个或多个选项供其选择。


    一旦用户选择了一个选项（例如图 1-7 中所示的 `echo`），搜索结果会向用户提供所请求项的一般描述、函数的任何输入或输出（参数）以及示例代码。

    '
- fmt: "示例代码通过注释（以`//`和[图1-8](#394210_2_En_1_Chapter.xhtml#Fig8)中的金色表示）在代码内部解释了函数的使用方法。注释不是可执行代码。可执行代码通过颜色编码来高亮显示字符串（红色）、变量（蓝色）、关键字（绿色）以及PHP的开闭标签（蓝色）。颜色编码有助于使代码更易读，也有助于在创建程序时更容易发现语法错误。许多PHP编辑器都提供类似的配色方案。\n\
    \n### PHP版本：PHP 7+、PHP 7.4+ 和 PHP 8+\n\n随着PHP 7环境的发布，实现了巨大的改进，包括重大的安全升级和显著的性能提升。\n\
    \n> *PHP 7基于PHPNG项目（PHP Next-Gen），该项目由Zend领导，旨在加速PHP应用程序。从PHP 7获得的性能提升是巨大的！在真实世界的应用中，性能提升幅度在25%到70%之间，而这一切仅仅是通过升级PHP实现的，无需更改一行代码！*\n\
    > \n> —[`www.zend.com`](http://www.zend.com)\n\nPHP 7还用一个可以在程序内部处理的异常取代了以前会导致程序崩溃的致命错误。PHP\
    \ 7增加了许多额外特性，包括为类和函数增加类型声明，以及一个太空船操作符。\n\n除了错误修复和安全增强之外，PHP 7.4引入了`spread`操作符，它在合并数组方面提供了比`array_merge`好得多的性能。PHP\
    \ 7.4中可用的函数和类的预加载功能极大地提高了在重度使用系统上的PHP性能。任何预加载项都已经常驻在Web服务器中，可以立即执行。只要服务器在运行，它们就会一直常驻。引入了箭头函数以提供更易用的匿名函数。类属性中的类型声明也得到了改进和扩展。字符串和数字连接的优先级顺序已经调整，以减少错误情况。\n\
    \n```\n在 PHP 7.5 之前，\n如果从左到右求值，这条语句会产生一个非数值错误。\n在 PHP 7.5 之后，右侧的两个值（$num1\n和 $num2）会先被相加，然后结果数字和字符串会\n\
    被连接起来，生成\n\"Hello 3\"\n```\n\n随着5G网速的普及以及我们的ISP提供商承诺的实时结果，PHP必须再次提高速度和性能。虽然PHP\
    \ 7和PHP 7.4大大改进了相对于之前版本的执行时间，但像Facebook这样的大型系统的PHP开发者要求更高的效率。在PHP 8之前，这些开发者必须在按原始设计编译PHP\
    \ 7和使用Facebook的`HHVM`（`Hip Hop Virtual Machine`）之间做出选择，后者将PHP代码转换为C++代码，然后可以执行以获得更好的性能。\n\
    \n随着PHP 8的引入，代码使用JIT（`just-in-time`）编译器进行编译。这种技术在其他语言（如Java）中已经使用了多年。使用JIT编译的代码首先会被转换成操作码。当操作码被执行时，它会转变为可执行的机器级代码。这一改变，结合PHP\
    \ 7.4中引入的预加载类和函数，极大地提高了代码的效率和速度。以至于一些开发者现在可能开始考虑将PHP用于不仅仅是Web应用程序！游戏开发者可能最终会将PHP视为一个合法的开发平台！\n\
    \n此外，PHP 8引入了联合类型和静态返回类型。它建立在PHP 7.4引入的弱引用之上，并允许与对象建立弱映射关系，使它们能够保留在内存中而不会被服务器的垃圾回收器销毁。`str_contains`函数（终于）允许我们更有效地在字符串中搜索内容。内部函数错误现在与用户自定义函数错误的行为方式相同。你可能在旧版PHP代码中见过的`@`运算符已被移除。要停止显示错误，你必须在你的服务器中设置此功能。\n\
    \n如果你正在从旧版PHP迁移到PHP 8，请查阅在线手册附录中的迁移说明：\n\n*   [`http://php.net/manual/`](http://php.net/manual/)\n\
    \n本书示例中使用的代码与PHP 8兼容。大多数示例也与PHP 7和PHP 7.4兼容。\n\n### 动手练习\n\n1.  访问[`www.php.net`](http://www.php.net)。搜索关于`print`和`printf`函数的信息。这些函数有何相似之处？又有何不同？\n\
    \n2.  如何“加入团队”并帮助创建下一个版本的PHP？提示：访问[`www.php.net`](http://www.php.net)并搜索答案。\n\n\
    3.  [`www.php.net`](http://www.php.net)网站对于初学PHP的程序员在哪些方面有用？\n\n4.  PHP是用什么语言创建的？提示：答案就在[`www.php.net`](http://www.php.net)网站的某个地方。\n\
    \n5.  访问[`www.php.net`](http://www.php.net)。搜索PHP 8的改进和变更列表。列出这些改进和变更。你认为其中哪些会影响初学者程序员？自PHP\
    \ 8初始发布以来发生了哪些变化？\n\n### PHP，JavaScript，CSS，HTML 和 Apache Web 服务器\n\nPHP是一种脚本语言。**脚本语言**不同于实际的编程语言。**编程语言**（如Java）由程序员用类似英语的语法编写。程序会被编译，这意味着它从英语语法转换为机器（可执行）代码（0和1）。然后，这段代码在兼容的操作系统和硬件上执行（运行）。首次访问代码时，脚本语言会逐行解释命令。它们不会在初始执行之前预编译代码。\n\
    \n你可能会怀疑这是否会导致代码比编译后的代码慢。答案是否定的。在PHP 8中，代码首先被转换成操作码，操作码可以快速转换为高效的机器级（可执行）代码。可选地，可执行代码可以保留在计算机或服务器的内存中，以供其他执行使用。如果程序员更改了这段代码，新版本可以替换内存中的旧版本。尽管这可能需要在生效前重启Web服务器。\n\
    \n**JavaScript**也是一种脚本语言。你可能知道，JavaScript代码可以通过查看源代码在**Web浏览器**中看到，如图[1-9](#394210_2_En_1_Chapter.xhtml#Fig9)所示。图[1-9](#394210_2_En_1_Chapter.xhtml#Fig9)中显示的**源代码**来自[`www.yahoo.com`](http://www.yahoo.com)，它显示了包括**HTML**、**CSS**和JavaScript在内的几种语言的组合。JavaScript代码位于**script标签**`(<script\
    \ type=\"text/JavaScript\">`和`</script>)`之间。然而，当我们查看[`www.php.net`](http://www.php.net)的源代码（在图[1-10](#394210_2_En_1_Chapter.xhtml#Fig10)中）时，我们看不到任何PHP脚本代码。其中存在一些指向PHP文件的链接，但没有显示实际的PHP代码。为什么？\n\
    \nJavaScript代码被下载到用户的计算机上。它在浏览器内被解释和执行。PHP代码驻留在**Web服务器**上。该代码也被解释和执行，但这是在Web服务器内部进行的，而不是由浏览器执行。执行PHP代码的结果被返回给浏览器，而不是返回实际代码本身。PHP返回浏览器可以解释的语句，例如JavaScript、HTML和CSS代码。\n\
    \n注意\n\n你可能会注意到使用PHP的其他格式（例如`<%`，`<%=`，`%>`或`<script language=\"php\">`）；在PHP\
    \ 7中，这些样式不再有效。它们实际上在之前已被弃用，但仍然可用。"
  raw: "The example code provides explanations of the use of the function within the\
    \ code itself by using comments (indicated by the `//` and gold color in Figure\
    \ [1-8](#394210_2_En_1_Chapter.xhtml#Fig8)). The comments are not executable code.\
    \ The executable code is color-coded to highlight strings (red), variables (blue),\
    \ keywords (green), and the PHP opening and closing tags (blue). Color-coding\
    \ helps make the code more readable. It also can make it easier to find syntax\
    \ errors when creating programs. Many PHP editors provide similar color schemes.\n\
    \n### PHP Versions: PHP 7+, PHP 7.4+, and PHP 8+\n\nWith the release of the PHP\
    \ 7 environment, great improvements took place, including major security upgrades\
    \ and major performance improvements.\n\n> *PHP 7* *is based on the PHPNG project\
    \ (PHP Next-Gen), that was led by Zend to speed up PHP applications. The performance\
    \ gains realized from PHP 7 are huge! They vary between 25% and 70% on real-world\
    \ apps, and all of that just from upgrading PHP, without having to change a single\
    \ line of code!*\n> \n> —[`www.zend.com`](http://www.zend.com)\n\nPHP 7 also replaces\
    \ fatal errors, which previously would crash a program, with exceptions that can\
    \ be handled within the program itself. PHP 7 added many additional features,\
    \ including type declarations for classes and functions, and a spaceship operator.\n\
    \nIn addition to bug fixes and security enhancements, PHP 7.4 introduced the spread\
    \ operator which provides much better performance for merging arrays than array_merge.\
    \ The preload of functions and classes available in PHP 7.4 greatly increases\
    \ PHP performance on heavy used systems. Any preloaded items are already resident\
    \ in the web server and can immediately be executed. They stay resident as long\
    \ as the sever is running. Arrow functions have been introduced to provide easier\
    \ use of anonymous functions. Type declarations in class properties have also\
    \ been improved and expanded. The order of preference for concatenation of strings\
    \ and numbers has been adjusted to reduce error situations.\n\n```\nBefore PHP\
    \ 7.5,\nthis statement would produce a nonnumeric value error when evaluated\n\
    from left to right. After PHP 7.5, the two values on the right ($num1\nand $num2)\
    \ are first added and then the resulting number and string will\nbe concatenated\
    \ to produce\n“Hello 3”\nWith the rollout of 5G Internet speeds and real-time\
    \ results promised\nby our ISP providers, PHP must again increase speed and performance.\n\
    While PHP 7 and PHP 7.4 greatly improved execution times over previous\nversions,\
    \ PHP developers of large-scale systems, like Facebook, demanded\neven more efficiencies.\
    \ Before PHP 8, these developers had to decide\nbetween compiling PHP 7 as it\
    \ was originally designed and using\nFacebook’s HHVM (Hip Hop Virtual Machine)\
    \ which converts PHP code into\nC++ code which can then be executed for better\
    \ performance.\nWith the introduction of PHP 8, code is compiled\nusing a JIT\
    \ (just-in-time) compiler. This technique has been used for\nmany years in other\
    \ languages, such as Java. Code compiled with JIT will\ninitially be transformed\
    \ into opcode. When the opcode is executed, it\ntransitions into executable machine-level\
    \ code. This change in\ncombination with the preloaded classes and functions introduced\
    \ in PHP\n7.4 dramatically increases code efficiency and speed. So much so that\n\
    some developers may now begin to look at using PHP for more than just\nweb applications!\
    \ Game developers may finally look at PHP as a legit\ndevelopment platform!\n\
    In addition, PHP\n8 introduces union types and static return types. It builds\
    \ upon\nPHP 7.4’s introduction of weak references and allows a weakmap\nrelationship\
    \ with objects to allow them to remain in memory without\nbeing destroyed by the\
    \ server’s garbage collector. The str_contains\nfunction (finally) allows us to\
    \ search more efficiently for contents in\na string. Internal function errors\
    \ now behave in the same way as\nuser-defined function errors. The @ operator,\
    \ which you may have seen in\nolder PHP code, is removed. To stop errors from\
    \ being displayed, you\nmust set this feature within your server.\n\nIf you are\
    \ migrating from a previous version of PHP to PHP 8, please review the\nmigration\
    \ notes in the appendix of the online manual:\n\n*   [`http://php.net/manual/`](http://php.net/manual/)\n\
    \nThe code used in the examples in this book are compatible with PHP 8.\nMost\
    \ examples are also compatible with PHP 7 and PHP 7.4.\n\nDo It\n\n1.  Go to [`www.php.net`](http://www.php.net).\n\
    \    Search for information on the `print` and `printf` functions. How\n    are\
    \ these functions similar? How are they different?\n\n2.  How do you “join the\
    \ team” and help with the creation of the next\n    version of PHP? Hint: Go to\
    \ [`www.php.net`](http://www.php.net)\n    `and search for the answer.`\n\n3.\
    \  Which ways can the [`www.php.net`](http://www.php.net)\n    web site be useful\
    \ for a beginning PHP programmer?\n\n4.  What language is used to create PHP?\
    \ Hint: The answer is somewhere on\n    the [`www.php.net`](http://www.php.net)\n\
    \    web site.\n\n5.  Go to [`www.php.net`](http://www.php.net).\n    Search for\
    \ the list of improvements and changes with PHP 8\\. List those\n    improvements\
    \ and changes. Which of these do you think will affect a\n    beginner-level programmer?\
    \ What changes have occurred since the initial\n    release of PHP 8?\n\nPHP,\
    \ JavaScript, CSS, HTML, and Apache Web\nServer\nPHP is a scripting\nlanguage.\
    \ A **scripting language** is different than\nan actual programming language.\
    \ **Programming\nlanguages**  (such as Java) are written by the programmer\nin\
    \ an English-like syntax. The program is compiled, which means it is\nconverted\
    \ from the English syntax into machine (executable) code (0s and\n1s). This code\
    \ is then executed (run) within a compatible operating\nsystem and hardware. The\
    \ first-time code is accessed, Scripting\nlanguages interpreted commands line\
    \ by line. They do not precompile the\ncode before initial execution.\nYou may\
    \ wonder if this causes the code to be slower than compiled\ncode. The answer\
    \ is no. In PHP 8, the code is first transformed into\nopcode, which can quickly\
    \ be transformed into efficient machine-level\n(executable) code. The executable\
    \ code can, optionally, stay in the\nmemory of the computer, or server, for other\
    \ executions. If the\nprogrammer changes this code, a new version can replace\
    \ the previous\nversion in memory. Although, this may require rebooting the web\
    \ server\nto take effect.\n**JavaScript**\n is also a scripting language. As you\
    \ may be aware, JavaScript\ncode can be seen within a **web browser** by viewing\
    \ the\nsource, as shown\nin Figure [1-9](#394210_2_En_1_Chapter.xhtml#Fig9).\n\
    The **source code**  displayed in Figure\n[1-9](#394210_2_En_1_Chapter.xhtml#Fig9)\
    \ is from [`www.yahoo.com`](http://www.yahoo.com),\nand it shows a combination\
    \ of several languages, including\n**HTML**, **CSS**, and JavaScript. The\nJavaScript\
    \ code is located between **script tags** `(<script type=\"text/JavaScript\">`\
    \ and `</script>`).\nHowever, when we look at the [`www.php.net`](http://www.php.net)\n\
    source code (in\nFigure [1-10](#394210_2_En_1_Chapter.xhtml#Fig10)), we cannot\n\
    see any PHP script code. There are links to some PHP files present, but\nno actual\
    \ PHP code is displayed. Why?\n\nJavaScript code is\ndownloaded to the user’s\
    \ computer. It is interpreted and executed within\nthe browser. PHP code resides\
    \ on a **web server**\n. The code is also interpreted and executed, but within\
    \ the web\nserver, not by the browser. The results of executing the PHP code are\n\
    returned to the browser, not to the actual code itself. PHP returns\nstatements\
    \ the browser can interpret, such as JavaScript, HTML, and CSS\ncode.\n\n```\n\
    \nNote\n\nYou may notice other formats for using PHP (such as `<%`, `<%=`, `%>`,\
    \ or `<script language=\"php\">`); with PHP 7 these styles are no longer valid.\n\
    There were actually depreciated previously, but still usable."
  trans: "\n示例代码通过注释（以`//`和图 1-8 中的金色表示）在代码内部解释了函数的使用方法。注释不是可执行代码。可执行代码通过颜色编码来高亮显示字符串（红色）、变量（蓝色）、关键字（绿色）以及\
    \ PHP 的开闭标签（蓝色）。颜色编码有助于使代码更易读，也有助于在创建程序时更容易发现语法错误。许多 PHP 编辑器都提供类似的配色方案。\n\n###\
    \ PHP 版本：PHP 7+、PHP 7.4+ 和 PHP 8+\n\n随着 PHP 7 环境的发布，实现了巨大的改进，包括重大的安全升级和显著的性能提升。\n\
    \n> *PHP 7 基于 PHPNG 项目（PHP Next-Gen），该项目由 Zend 领导，旨在加速 PHP 应用程序。从 PHP 7 获得的性能提升是巨大的！在真实世界的应用中，性能提升幅度在\
    \ 25%到 70%之间，而这一切仅仅是通过升级 PHP 实现的，无需更改一行代码！*\n> \n> —[`www.zend.com`](http://www.zend.com)\n\
    \nPHP 7 还用一个可以在程序内部处理的异常取代了以前会导致程序崩溃的致命错误。PHP 7 增加了许多额外特性，包括为类和函数增加类型声明，以及一个太空船操作符。\n\
    \n除了错误修复和安全增强之外，PHP 7.4 引入了`spread`操作符，它在合并数组方面提供了比`array_merge`好得多的性能。PHP 7.4\
    \ 中可用的函数和类的预加载功能极大地提高了在重度使用系统上的 PHP 性能。任何预加载项都已经常驻在 Web 服务器中，可以立即执行。只要服务器在运行，它们就会一直常驻。引入了箭头函数以提供更易用的匿名函数。类属性中的类型声明也得到了改进和扩展。字符串和数字连接的优先级顺序已经调整，以减少错误情况。\n\
    \n```\n在 PHP 7.5 之前，\n如果从左到右求值，这条语句会产生一个非数值错误。\n在 PHP 7.5 之后，右侧的两个值（$num1\n和 $num2）会先被相加，然后结果数字和字符串会\n\
    被连接起来，生成\n\"Hello 3\"\n```\n\n随着 5G 网速的普及以及我们的 ISP 提供商承诺的实时结果，PHP 必须再次提高速度和性能。虽然\
    \ PHP 7 和 PHP 7.4 大大改进了相对于之前版本的执行时间，但像 Facebook 这样的大型系统的 PHP 开发者要求更高的效率。在 PHP\
    \ 8 之前，这些开发者必须在按原始设计编译 PHP 7 和使用 Facebook 的`HHVM`（`Hip Hop Virtual Machine`）之间做出选择，后者将\
    \ PHP 代码转换为 C++代码，然后可以执行以获得更好的性能。\n\n随着 PHP 8 的引入，代码使用 JIT（`just-in-time`）编译器进行编译。这种技术在其他语言（如\
    \ Java）中已经使用了多年。使用 JIT 编译的代码首先会被转换成操作码。当操作码被执行时，它会转变为可执行的机器级代码。这一改变，结合 PHP 7.4\
    \ 中引入的预加载类和函数，极大地提高了代码的效率和速度。以至于一些开发者现在可能开始考虑将 PHP 用于不仅仅是 Web 应用程序！游戏开发者可能最终会将\
    \ PHP 视为一个合法的开发平台！\n\n此外，PHP 8 引入了联合类型和静态返回类型。它建立在 PHP 7.4 引入的弱引用之上，并允许与对象建立弱映射关系，使它们能够保留在内存中而不会被服务器的垃圾回收器销毁。`str_contains`函数（终于）允许我们更有效地在字符串中搜索内容。内部函数错误现在与用户自定义函数错误的行为方式相同。你可能在旧版\
    \ PHP 代码中见过的`@`运算符已被移除。要停止显示错误，你必须在你的服务器中设置此功能。\n\n如果你正在从旧版 PHP 迁移到 PHP 8，请查阅在线手册附录中的迁移说明：\n\
    \n*   [`http://php.net/manual/`](http://php.net/manual/)\n\n本书示例中使用的代码与 PHP 8\
    \ 兼容。大多数示例也与 PHP 7 和 PHP 7.4 兼容。\n\n### 动手练习\n\n1.  访问[`www.php.net`](http://www.php.net)。搜索关于`print`和`printf`函数的信息。这些函数有何相似之处？又有何不同？\n\
    \n2.  如何“加入团队”并帮助创建下一个版本的 PHP？提示：访问[`www.php.net`](http://www.php.net)并搜索答案。\n\
    \n3.  [`www.php.net`](http://www.php.net)网站对于初学 PHP 的程序员在哪些方面有用？\n\n4.  PHP 是用什么语言创建的？提示：答案就在[`www.php.net`](http://www.php.net)网站的某个地方。\n\
    \n5.  访问[`www.php.net`](http://www.php.net)。搜索 PHP 8 的改进和变更列表。列出这些改进和变更。你认为其中哪些会影响初学者程序员？自\
    \ PHP 8 初始发布以来发生了哪些变化？\n\n### PHP，JavaScript，CSS，HTML 和 Apache Web 服务器\n\nPHP\
    \ 是一种脚本语言。**脚本语言**不同于实际的编程语言。**编程语言**（如 Java）由程序员用类似英语的语法编写。程序会被编译，这意味着它从英语语法转换为机器（可执行）代码（0\
    \ 和 1）。然后，这段代码在兼容的操作系统和硬件上执行（运行）。首次访问代码时，脚本语言会逐行解释命令。它们不会在初始执行之前预编译代码。\n\n你可能会怀疑这是否会导致代码比编译后的代码慢。答案是否定的。在\
    \ PHP 8 中，代码首先被转换成操作码，操作码可以快速转换为高效的机器级（可执行）代码。可选地，可执行代码可以保留在计算机或服务器的内存中，以供其他执行使用。如果程序员更改了这段代码，新版本可以替换内存中的旧版本。尽管这可能需要在生效前重启\
    \ Web 服务器。\n\n**JavaScript**也是一种脚本语言。你可能知道，JavaScript 代码可以通过查看源代码在**Web 浏览器**中看到，如图\
    \ 1-9 所示。图 1-9 中显示的**源代码**来自[`www.yahoo.com`](http://www.yahoo.com)，它显示了包括**HTML**、**CSS**和\
    \ JavaScript 在内的几种语言的组合。JavaScript 代码位于**script 标签**`(<script type=\"text/JavaScript\"\
    >`和`</script>)`之间。然而，当我们查看[`www.php.net`](http://www.php.net)的源代码（在图 1-10 中）时，我们看不到任何\
    \ PHP 脚本代码。其中存在一些指向 PHP 文件的链接，但没有显示实际的 PHP 代码。为什么？\n\nJavaScript 代码被下载到用户的计算机上。它在浏览器内被解释和执行。PHP\
    \ 代码驻留在**Web 服务器**上。该代码也被解释和执行，但这是在 Web 服务器内部进行的，而不是由浏览器执行。执行 PHP 代码的结果被返回给浏览器，而不是返回实际代码本身。PHP\
    \ 返回浏览器可以解释的语句，例如 JavaScript、HTML 和 CSS 代码。\n\n注意\n\n你可能会注意到使用 PHP 的其他格式（例如`<%`，`<%=`，`%>`或`<script\
    \ language=\"php\">`）；在 PHP 7 中，这些样式不再有效。它们实际上在之前已被弃用，但仍然可用。\n"
- fmt: '您可能猜测这段代码会显示`Hello`。虽然这是正确的，但问题在于，产生这个结果经历了哪些处理过程？


    如果这段代码被放置在网络服务器上的一个文件（例如`index.php`）中，我们将使用网页浏览器，通过在URL（地址）框中输入其名称和位置（例如[`www.servera.com/index.php`](http://www.servera.com/index.php)）来请求这个文件。输入的地址指示浏览器向网络服务器（`mysita.com`）发送一个HTTP`Get`请求，以返回该网页（`index.php`）。接收到请求的网络服务器会确定必须首先解释和执行PHP代码。它通过查看所请求文件的扩展名（`.php`）来做出这个判断。文件中的任何PHP代码（标签之间的代码）随后被发送到PHP处理器进行解释和执行。代码执行的结果返回给网络服务器，网络服务器再将其（以及任何其他HTML和/或JavaScript代码）发送回浏览器。在这个例子中，`Hello`将被返回并由浏览器显示。如果我们随后查看源代码，如前所述，我们只会看到实际的单词`Hello`。我们不会看到任何HTML或PHP。为什么？因为我们没有向浏览器发送任何HTML。


    您可能想知道是否可以使用此过程发送实际的HTML（和/或JavaScript）代码来创建动态网页。答案是肯定的。PHP的`print`或`echo`函数将返回置于双引号`""`之间的任何HTML（或JavaScript、CSS）代码。浏览器将解释网络服务器返回的任何代码。


    *   **Print函数** —`print`函数实际上不是一个函数，而是一个语言结构。函数要求传递时字符串用引号括起来。语言结构不要求字符串周围有引号。不过，仍然建议使用引号。`print`会将传递给它的任何内容转发到浏览器。它会尝试将任何非字符串项转换为字符串（文本）格式，因为网页中显示的所有项都是文本格式。

    *   **更多信息**，请访问[`http://php.net/manual/en/function.print.php`](http://php.net/manual/en/function.print.php)。


    ```

    Hello";

    ?>

    ```


    如果我们将代码更改为上述内容，浏览器会将`Hello`显示为HTML标题（`h1`）。使用`print`函数的缺点是程序无法控制该语句在网页上的显示位置。该语句实际上会作为第一行代码显示，甚至在任何其他现有HTML标签之前。如果我们只是向用户返回一条语句，例如“您的进程已完成”，这也许没问题。但是，如果您的目标是在页面的确切位置格式化输出，则这可能不可接受。还有其他技术和函数可供我们选择来消除此问题。然而，这超出了我们当前的讨论范围。现在我们知道必须借助网络服务器来解释和执行PHP代码，我们应该使用什么服务器呢？


    有许多可以与PHP和MySQL/MariaDB数据库配合使用的网络服务器可供选择。一些最受欢迎的选择包括：


    *   **Microsoft Internet Information Server (IIS)**：[`www.iis.net/`](http://www.iis.net/)

    *   **Lighttpd**：[`www.lighttpd.net/`](http://www.lighttpd.net/)

    *   **NGINX**：[`www.nginx.com/`](http://www.nginx.com/)（事件驱动，适用于静态页面）

    *   **Apache**：[`www.apache.org/`](http://www.apache.org/)（进程驱动，适用于动态页面）


    虽然所有这些服务器都是绝佳的选择，并且在不同的情况下各有优势，但Apache网络服务器仍然是托管和处理PHP网页请求最常用的。Apache可以托管在UNIX和Windows操作系统上。与其他网络服务器一样，Apache也可以接受和返回其他类型文件的请求，包括HTML、JavaScript、PERL、Python、图像和RSS源。如前所述，Apache通过首先查看请求文件的扩展名来确定需要从HTTP请求中完成哪些处理。


    Apache和PHP一样，是一个开源产品。对Apache网络服务器的所有更改都由Apache软件基金会（ASP）协调。ASP维护着`apache.org`网站，为用户和开发者提供发现当前正在开发的项目以及下载最新版本Apache的能力。然而，如前所述，单独下载不同版本的PHP、Apache和MySQL可能会导致版本不兼容的问题。除非您知道自己在做什么，否则更明智的做法是下载一个完整的WAMP、LAMP或MAMP版本。


    Apache软件基金会也鼓励其所有用户保持更新并参与到未来产品的开发中。鼓励用户加入讨论和邮件列表，测试新版本，甚至帮助修复错误或为其产品添加新功能。


    **动手练习**


    1.  执行PHP代码与执行Java代码相比有何不同？

    2.  脚本语言和编程语言之间的区别是什么？PHP属于哪种类型的语言？

    3.  Apache网络服务器如何处理PHP网页的请求？

    4.  为什么我们可以在网页浏览器中看到JavaScript代码，但看不到PHP代码？

    5.  访问[`www.apache.org`](http://www.apache.org)。即使您经验有限，有哪些方式可以参与Apache项目的开发？


    **PHP、Apache 和 MySQL/MariaDB**

    当网页请求数据库中的信息时会发生什么？

    通常，数据库存储在与网络服务器本身不同的服务器上。

    数据请求是来自网络服务器还是PHP处理器？

    由于SQL语句包含在PHP代码本身中，PHP处理器将SQL语句发送给数据库管理系统（MySQL/MariaDB）进行处理。


    *   **SQL——结构化查询语言** 是一种用于更新、插入或删除DBMS（数据库管理系统）中数据的特殊语言。DBMS是一种应用程序，它与编程语言和数据库交互以更新、插入或删除数据。DBMS使用SQL来解释数据库中所需的数据更改。有关SQL的更多信息，请访问[`http://en.wikipedia.org/wiki/SQL`](http://en.wikipedia.org/wiki/SQL)。有关DBMS的更多信息，请访问[`http://en.wikipedia.org/wiki/Database`](http://en.wikipedia.org/wiki/Database)。'
  raw: "You might guess that this code will display `Hello`. While this is\ncorrect,\
    \ the question is, what processes happen to produce this\nresult?\nIf this code\
    \ is placed in a file (such as `index.php`) on a web\nserver, we would use our\
    \ web browser to request this file by entering\nits name and location in the URL\
    \ (address) box (such as [`www.servera.com/index.php`](http://www.servera.com/index.php)).\n\
    The address entered instructs the browser to send an HTTP `Get` request to the\n\
    web server (`mysita.com`) to return\nthe web page (`index.php`).\nThe web server\
    \ receiving the request will determine that PHP code must first be\ninterpreted\
    \ and executed. It determines this simply by looking at the\nfile extension (`.php`)\
    \ of the file\nrequested. Any PHP code within the file (code between the  tags)\
    \ is then sent to the PHP processor for interpretation and\nexecution. The results\
    \ of the execution of the code are returned to the\nweb server, which in turn\
    \ sends it (and any other HTML and/or JavaScript\ncode) back to the browser. In\
    \ this example, `Hello` would be\nreturned and displayed by the browser. If we\
    \ then viewed the source\ncode, as mentioned, we would only see the actual word\
    \ `Hello`. We would not\nsee any HTML or PHP. Why? Because we did not send any\
    \ HTML back to the\nbrowser.\n\nYou may be wondering if you can use this process\
    \ to send back actual\nHTML (and/or JavaScript) code to create a dynamic web page.\
    \ The answer\nis yes. The PHP `print or echo` functions will return any HTML (or\
    \ JavaScript or CSS)\ncode that has been placed between the `\"\"`. The browser\
    \ will\ninterpret any code returned by the web server.\n\n*   *Print function*\
    \  *—The print function\n    is not actually a function. It is a language construct.\
    \ Functions\n    require that strings be included in quotes when passed. Language\n\
    \    constructs do not require quotes around strings. However, it is still\n \
    \   recommended. Print will forward whatever has been passed into it to the\n\
    \    browser. It will attempt to convert any item that is not a string to\n  \
    \  string (text) format since all items displayed within a web page are in\n \
    \   text format.*\n\n*   *For more information*, `visit` [`http://php.net/manual/en/function.print.php`](http://php.net/manual/en/function.print.php).\n\
    \n```\nHello\";\n?>\n```\n\nIf we change our code to the preceding listing, the\
    \ browser will\ndisplay `Hello`\nas an HTML header (`h1`). The disadvantage\n\
    of using the `print` function  is that the program\nwill have no control over\
    \ where the statement is displayed on the web\npage. The statement will actually\
    \ be displayed as the first line of\ncode, even before any other existing HTML\
    \ tags. This might be okay if we\nare just returning a statement to the user,\
    \ such as “Your process has\nbeen completed”. However, this might not be acceptable\
    \ if your goal is\nto format output at an exact location on the page. There are\
    \ other\ntechniques and functions that we could choose to eliminate this problem.\n\
    However, it is beyond our current discussion.\nNow that we know we must interpret\
    \ and execute PHP code with the help\nof a web server,\nwhat server should we\
    \ use?\n\nThere are many choices of web servers that will work with PHP and\n\
    MySQL/MariaDB databases. Some of the most popular choices include\n\n*   *Microsoft\
    \ Internet Information Server (IIS)*: [`www.iis.net/`](http://www.iis.net/)\n\n\
    *   *Lighttpd*: [`www.lighttpd.net/`](http://www.lighttpd.net/)\n\n*   *NGINX*:\
    \ [`www.nginx.com/`](http://www.nginx.com/)\n    (event-driven, good for static\
    \ pages)\n\n*   *Apache*: [`www.apache.org/`](http://www.apache.org/)\n    (process-driven,\
    \ good for dynamic pages)\n\nWhile all of these servers are great choices, and\
    \ have their\nstrengths in different situations, the Apache web server is\nstill\
    \ the most commonly used to host and handle PHP web page requests.\nApache can\
    \ be hosted on both UNIX and Windows operating systems. Like\nother web servers,\
    \ Apache can also accept and return requests for other\ntypes of files, including\
    \ HTML, JavaScript, PERL, Python, images, and\nRSS feeds. Apache, as mentioned,\
    \ determines what processes need to be\ncompleted from HTTP requests by first\
    \ looking at the file extensions of\nthe requested files.\nApache, like PHP, is\
    \ an open source product. All changes to the\nApache web server are coordinated\
    \ by the Apache Software Foundation\n(ASP). ASP maintains the `apache.org` web\
    \ site\nto provide users and developers the ability to discover projects\ncurrently\
    \ under development and the ability to download the latest\nversions of Apache.\
    \ However, as mentioned, downloading separate versions\nof PHP, Apache, and MySQL\
    \ can cause issues with incompatible versions.\nUnless you know what you are doing,\
    \ it is much wiser to download a\ncomplete WAMP, LAMP, or MAMP version.\nThe Apache\
    \ Software Foundation also encourages all users of their\nproducts to keep up\
    \ to date and to get involved in the development of\nfuture products. Users are\
    \ encouraged to join discussion and mailing\ngroups, test out new releases, and\
    \ even help fix bugs or add new\nfeatures to their products.\n\nDo It\n\n1.  What\
    \ are the differences in executing PHP code compared to executing\n    Java code?\n\
    \n2.  What is the difference between a scripting language and a programming\n\
    \    language? What type of language is PHP?\n\n3.  How does the Apache web server\
    \ handle requests for a PHP web\n    page?\n\n4.  Why can we see JavaScript code\
    \ within a web browser, but we cannot\n    see PHP code?\n\n5.  Go to [`www.apache.org`](http://www.apache.org).\n\
    \    What are some of the ways that you can become involved with the\n    development\
    \ of Apache projects, even though you have limited\n    experience?\n\nPHP, Apache,\
    \ and MySQL/MariaDB\nWhat happens when a web page requests information from a\n\
    database?\nCommonly databases are stored on servers that are separate from the\n\
    web server itself.\nDoes the request for data come from the web server or from\
    \ the PHP\nprocessor?\nSince the SQL statements are contained within the PHP code\
    \ itself,\nthe PHP processor sends the SQL statements to the Database Management\n\
    System (MySQL/MariaDB) to be processed.\n\n*   *SQL—Structured\n    Query Language*\
    \  *is a special language used to update,\n    insert, or delete data from a DBMS\
    \ (Database Management System). A DBMS\n    is an application that interacts with\
    \ a programming language and a\n    database to update, insert, or delete data.\
    \ The DBMS uses SQL to\n    interpret the required changes to the data within\
    \ the database. For more\n    information on SQL, visit* [*http://en.wikipedia.org/wiki/SQL*](http://en.wikipedia.org/wiki/SQL)*.\n\
    \    For more information on DBMS, visit* [*http://en.wikipedia.org/wiki/Database*](http://en.wikipedia.org/wiki/Database)*.*"
  trans: '

    您可能猜测这段代码会显示`Hello`。虽然这是正确的，但问题在于，产生这个结果经历了哪些处理过程？


    如果这段代码被放置在网络服务器上的一个文件（例如`index.php`）中，我们将使用网页浏览器，通过在 URL（地址）框中输入其名称和位置（例如[`www.servera.com/index.php`](http://www.servera.com/index.php)）来请求这个文件。输入的地址指示浏览器向网络服务器（`mysita.com`）发送一个
    HTTP `Get`请求，以返回该网页（`index.php`）。接收到请求的网络服务器会确定必须首先解释和执行 PHP 代码。它通过查看所请求文件的扩展名（`.php`）来做出这个判断。文件中的任何
    PHP 代码（标签之间的代码）随后被发送到 PHP 处理器进行解释和执行。代码执行的结果返回给网络服务器，网络服务器再将其（以及任何其他 HTML 和/或
    JavaScript 代码）发送回浏览器。在这个例子中，`Hello`将被返回并由浏览器显示。如果我们随后查看源代码，如前所述，我们只会看到实际的单词`Hello`。我们不会看到任何
    HTML 或 PHP。为什么？因为我们没有向浏览器发送任何 HTML。


    您可能想知道是否可以使用此过程发送实际的 HTML（和/或 JavaScript）代码来创建动态网页。答案是肯定的。PHP 的`print`或`echo`函数将返回置于双引号`""`之间的任何
    HTML（或 JavaScript、CSS）代码。浏览器将解释网络服务器返回的任何代码。


    *   **Print 函数** — `print`函数实际上不是一个函数，而是一个语言结构。函数要求传递时字符串用引号括起来。语言结构不要求字符串周围有引号。不过，仍然建议使用引号。`print`会将传递给它的任何内容转发到浏览器。它会尝试将任何非字符串项转换为字符串（文本）格式，因为网页中显示的所有项都是文本格式。

    *   **更多信息**，请访问[`http://php.net/manual/en/function.print.php`](http://php.net/manual/en/function.print.php)。


    ```

    Hello";

    ?>

    ```


    如果我们将代码更改为上述内容，浏览器会将`Hello`显示为 HTML 标题（`h1`）。使用`print`函数的缺点是程序无法控制该语句在网页上的显示位置。该语句实际上会作为第一行代码显示，甚至在任何其他现有
    HTML 标签之前。如果我们只是向用户返回一条语句，例如“您的进程已完成”，这也许没问题。但是，如果您的目标是在页面的确切位置格式化输出，则这可能不可接受。还有其他技术和函数可供我们选择来消除此问题。然而，这超出了我们当前的讨论范围。现在我们知道必须借助网络服务器来解释和执行
    PHP 代码，我们应该使用什么服务器呢？


    有许多可以与 PHP 和 MySQL/MariaDB 数据库配合使用的网络服务器可供选择。一些最受欢迎的选择包括：


    *   **Microsoft Internet Information Server (IIS)**：[`www.iis.net/`](http://www.iis.net/)

    *   **Lighttpd**：[`www.lighttpd.net/`](http://www.lighttpd.net/)

    *   **NGINX**：[`www.nginx.com/`](http://www.nginx.com/)（事件驱动，适用于静态页面）

    *   **Apache**：[`www.apache.org/`](http://www.apache.org/)（进程驱动，适用于动态页面）


    虽然所有这些服务器都是绝佳的选择，并且在不同的情况下各有优势，但 Apache 网络服务器仍然是托管和处理 PHP 网页请求最常用的。Apache 可以托管在
    UNIX 和 Windows 操作系统上。与其他网络服务器一样，Apache 也可以接受和返回其他类型文件的请求，包括 HTML、JavaScript、PERL、Python、图像和
    RSS 源。如前所述，Apache 通过首先查看请求文件的扩展名来确定需要从 HTTP 请求中完成哪些处理。


    Apache 和 PHP 一样，是一个开源产品。对 Apache 网络服务器的所有更改都由 Apache 软件基金会（ASP）协调。ASP 维护着`apache.org`网站，为用户和开发者提供发现当前正在开发的项目以及下载最新版本
    Apache 的能力。然而，如前所述，单独下载不同版本的 PHP、Apache 和 MySQL 可能会导致版本不兼容的问题。除非您知道自己在做什么，否则更明智的做法是下载一个完整的
    WAMP、LAMP 或 MAMP 版本。


    Apache 软件基金会也鼓励其所有用户保持更新并参与到未来产品的开发中。鼓励用户加入讨论和邮件列表，测试新版本，甚至帮助修复错误或为其产品添加新功能。


    **动手练习**


    1.  执行 PHP 代码与执行 Java 代码相比有何不同？

    2.  脚本语言和编程语言之间的区别是什么？PHP 属于哪种类型的语言？

    3.  Apache 网络服务器如何处理 PHP 网页的请求？

    4.  为什么我们可以在网页浏览器中看到 JavaScript 代码，但看不到 PHP 代码？

    5.  访问[`www.apache.org`](http://www.apache.org)。即使您经验有限，有哪些方式可以参与 Apache 项目的开发？


    **PHP、Apache 和 MySQL/MariaDB**

    当网页请求数据库中的信息时会发生什么？

    通常，数据库存储在与网络服务器本身不同的服务器上。

    数据请求是来自网络服务器还是 PHP 处理器？

    由于 SQL 语句包含在 PHP 代码本身中，PHP 处理器将 SQL 语句发送给数据库管理系统（MySQL/MariaDB）进行处理。


    *   **SQL——结构化查询语言** 是一种用于更新、插入或删除 DBMS（数据库管理系统）中数据的特殊语言。DBMS 是一种应用程序，它与编程语言和数据库交互以更新、插入或删除数据。DBMS
    使用 SQL 来解释数据库中所需的数据更改。有关 SQL 的更多信息，请访问[`http://en.wikipedia.org/wiki/SQL`](http://en.wikipedia.org/wiki/SQL)。有关
    DBMS 的更多信息，请访问[`http://en.wikipedia.org/wiki/Database`](http://en.wikipedia.org/wiki/Database)。

    '
- fmt: 'The Apache server will first discover that PHP code must be interpreted. The
    server is aware that PHP code exists within the file by looking at the file ending
    (`php`) of the file itself. The actual PHP code exists within the file between
    the PHP tags (`<?php` and `?>`). The PHP code will then be sent to the PHP processor.
    The PHP processor interprets the code (line by line). The code is initially converted
    to opcode (intermediate-level code). While doing so, it will discover that SQL
    statements must be executed against a database. The SQL statements are then transferred
    to the appropriate Database Management System (DBMS) for processing. The DBMS
    will return the results of the execution of the SQL statements to the PHP processor.
    The PHP processor will then use those results to format output to be given to
    the Apache server. The Apache server will then combine the results of what is
    returned by the PHP processor with any other HTML (and/or JavaScript) code that
    might reside on the original page requested and return all output to the browser
    on the user’s machine. The browser will then interpret the HTML and JavaScript
    to display the results of the page requested.


