  \ |\n\n## 7. 与其他软件交互\n\n很少有软件是完全孤立运行的，大多数都会与你系统上的其他进程和程序进行通信。尤其是在开源系统上（许可问题不那么突出），当你可以轻松地调用其他已有的、能解决“已知问题”的软件和库来执行任务时，通常没有必要重新发明轮子。\n\
  \n尽管你在进行网络编程时可能已经接触过其中一些方法，但当你的脚本在瞬间执行并消失时，通常很少有交互的需求。有多种调用和与其他软件交互的方法，我们将在下面介绍。这些方法主要用于与非\
  \ PHP 软件交互，然而，由于这些方法是与语言无关的，它们当然也可以用于两个或多个 PHP 编写的脚本之间的通信。\n\n### 7.1 从 PHP 启动外部进程，或称为“外部调用”\n\
  \n在我们开始与另一个进程通信之前，该进程必须先启动。你当然可以在 PHP 脚本运行的同时手动启动另一个软件，但让 PHP 脚本在需要时自行启动其他软件通常也很有用。这通常被称为“外部调用”。\n\
  \nPHP 中有多个函数可以实现这一点，每个函数的实现方式略有不同：\n\n*   `exec()` : 执行一个程序并将文本输出发送给用户\n*   `passthru()`\
  \ : 执行一个程序并将二进制输出发送给用户\n*   `system()` : 执行一个程序并收集输出供 PHP 使用\n*   `shell_exec()`\
  \ : 通过 shell 执行一个命令并收集其输出供 PHP 使用\n*   反引号运算符（例如 `` `command` ``）: 与上面的 `shell_exec()`\
  \ 功能相同\n*   `pcntl_exe()` : 在当前进程空间中执行一个程序，也就是说它会停止当前的 PHP 脚本并用指定的程序替换它\n*   `popen()`\
  \ : 执行一个程序并打开一个文件指针（与例如 `fopen()` 返回的指针相同），以通过 STDOUT 或 STDIN 对进程进行读取或写入。只能读或只能写，不能同时进行。\n\
  *   `proc_open()` : 类似于 `popen()`，但拥有更多控制权。允许同时进行读取和写入。使用上不如 `popen()` 简单。\n\n你选择哪种方法取决于你打算如何操作新打开的进程以及你想如何与之通信。如果你从上面的描述中不确定哪个函数适合你的用例，下面的扩展阅读列表提供了一些指引、信息和实现示例，应该能为你指明方向。\n\
  \n| ![信息](img/image00248.jpeg) | **扩展阅读**关于使用上述函数的“食谱”式教程 [`pleac.sourceforge.net/pleac_php/processmanagementetc.html`](http://pleac.sourceforge.net/pleac_php/processmanagementetc.html)蒂莫西·博龙奇克的教程《Proc_Open:\
  \ 与外部世界通信》[`www.sitepoint.com/proc-open-communicate-with-the-outside-world/`](http://www.sitepoint.com/proc-open-communicate-with-the-outside-world/)斯特凡·卡平斯基的文章《外部调用糟透了》，讨论了通过中间\
  \ shell 调用外部程序的缺点 [`julialang.org/blog/2012/03/shelling-out-sucks/`](http://julialang.org/blog/2012/03/shelling-out-sucks/)\
  \ |\n\n当调用外部脚本时，请记住，在命令名称或选项中使用不受信任的用户输入是糟糕安全状况的根源！`escapeshellarg()` 函数可以保护你免受一些无意的错误影响，但无法阻止你执行“不良”的函数或文件。\n\
  \n| ![信息](img/image00248.jpeg) | **扩展阅读**在 PHP 手册中使用 `escapeshellarg()` 清理 shell\
  \ 参数 [`www.php.net/escapeshellarg`](http://www.php.net/escapeshellarg) |\n\n###\
  \ 7.2 与其他进程通信\n\n一旦我们让其他进程启动并运行起来，PHP 支持多种与它们通信的方式，我们将在下面介绍。这些方法主要适用于那些通过其他方式启动的进程，或者你的脚本已启动但已与之分离的进程。如果你使用\
  \ `popen()` 或 `proc_open()` 来启动它们，你可以像通常一样直接通过 PHP 流进行通信。不过，如果你需要额外的通信渠道，你仍然可以使用下面这些方法。\n\
  \n\n\n### 7.3 信号量\n\n程序之间交互的基本形式是“对共享资源的协商”。如果你有一个数据源、外设、数据集或任何其他类型的资源，并且你希望同一时间只有一个程序能够访问它，就需要某种形式的程序间通信来决定谁在使用该资源，并确认它们何时使用完毕。自\
  \ System V 问世以来，Unix 便引入了“信号量”的概念来管理这一过程，而 PHP 通过`sysvsem`扩展实现了对信号量的使用，该扩展通常已编译在大多数\
  \ PHP 发行版中。信号量就像一个传递的旗帜，只有持有旗帜的程序才能访问资源。以下代码展示了传递信号量的示例。打开两个 shell 窗口，并在每个窗口中运行该脚本。你将看到脚本获取和释放信号量的过程，使得在任何时刻只有一个脚本持有信号量。\n\
  \n```\n 1 <?\n\n3 $process = getmypid();\n\n5 $semaphore = sem_get('123456', 1,\
  \ 0666, 1);\n\n7 if (!$semaphore) { echo(\"Couldn't get semaphore\\n\"); exit;};\n\
  \n9 while (1) {\n\n11 \tsem_acquire($semaphore);\n\n13 \techo ($process.\" has the\
  \ semaphore\\n\");\n\n15 \tsleep(rand(0,5));\n\n17 \tif (!sem_release($semaphore))\
  \ {\n\n19 \t\techo(\"Couldn't release semaphore\\n\");\n\n21 \t\texit;\n\n23 \t\
  };\n\n25 \techo ($process.\" has released the semaphore\\n\");\n\n27 };\n```\n\n\
  首先，我们获取脚本的 pid（进程 ID），以确保运行的是不同进程。接着，通过`sem_get()`创建一个信号量，并返回该信号量的 ID（你可以同时为不同用途运行多个信号量，因此\
  \ ID 很重要）。如果其他脚本已创建了该信号量，此处仅返回其 ID。请注意，所有想要共享特定信号量的脚本/程序必须为`sem_get()`函数（或其他语言中的等效函数）使用相同的参数，否则会创建一个新的信号量。`sem_get()`的第一个参数是用于标识信号量的唯一整数键（这与`sem_get()`函数返回的\
  \ ID 不同，后者是 PHP 内部用于信号量的资源 ID，对于同一信号量，不同脚本的该 ID 会有所不同）。第二个参数是允许同时持有信号量的唯一用户数量。例如，这允许你让\
  \ 2 个（或更多）程序同时“持有旗帜”，从而对资源的连续用户数量设定上限。第三个参数指定标准的 Unix 权限（例如你使用`chmod`时所用的权限），第四个参数则指定当请求结束时是否自动释放信号量。\n\
  \n通过`sem_get()`设置好信号量后，我们进入一个循环。每次循环中，我们尝试用`sem_acquire()`获取旗帜。这是一个阻塞函数，意味着程序会等待直到信号量可用且我们能获取它。一旦获取成功，程序将继续执行。我们会随机休眠一段时间（在“实际应用”中，我们会对信号量保护的资源进行有用操作），然后释放信号量。此时，下一个等待的进程会立即“抢到旗帜”，而我们则回到循环起点，再次尝试获取信号量。\n\
  \n需要注意的是，信号量基于信任机制运作。每个程序都应实现并遵守信号量规则。系统本身并不了解或强制信号量，因此“不守规矩”的程序可以无视“谁持有旗帜”而直接使用资源。因此，信号量不应用于你未完全控制的系统（或不介意未授权软件抢占资源的系统），且仅适用于所有程序*自愿*共享资源的情况。此外，信号量对死锁的保护也很有限——比如某个程序获取信号量后因自身错误未能释放。`sem_get()`函数的最后一个参数允许在请求消失时自动释放信号量（例如进程崩溃，或在当前脚本中通过`sem_remove()`关闭信号量），但这可能无法防范进程单纯挂起的情况。\n\
  \n`sem_get()`函数需要一个唯一的整数键来标识信号量，并且这个键（如同电话号码）必须事先被所有程序知晓。如果你在确定或共享这个键时遇到困难，可以试试`ftok()`函数，它能基于已知文件的路径名和项目标识符生成一个键。不过，请阅读\
  \ PHP 手册中关于该函数的用户评论，以了解一些潜在陷阱。\n\n| ![信息图标](img/image00248.jpeg) | **延伸阅读** PHP\
  \ 手册中的`ftok()`函数 [`php.net/manual/en/function.ftok.php`](http://php.net/manual/en/function.ftok.php)\
  \ |\n|---|---|\n\n当信号量运行起来后，你可以在 shell 中使用`ipcs -s`命令检查其状态，该命令会显示系统上所有信号量的详细信息。\n\
  \n虽然信号量不直接允许你与其他程序交换数据，但可以通过其他方式促进通信，比如下面将要介绍的共享文件或共享内存段。\n\n| ![信息图标](img/image00248.jpeg)\
  \ | **延伸阅读** PHP 手册中的信号量函数 [`www.php.net/manual/en/ref.sem.php`](http://www.php.net/manual/en/ref.sem.php)\
  \ 乔纳森·希尔（Jonathon Hill）的《PHP 信号量扩展有何问题》 [`jonathonhill.net/2012-12-08/what-is-wrong-with-phps-semaphore-extension/`](http://jonathonhill.net/2012-12-08/what-is-wrong-with-phps-semaphore-extension/)\
  \ |\n|---|---|\n\n\n\n### 7.4 共享内存\n\n“共享内存”是一种简单且被广泛支持的、用于在多个进程之间传递数据的方法，它确实如其名一样简单。一个进程可以创建一段内存，使用一个键作为唯一标识符，为其分配标准的\
  \ Unix 类型权限，然后该进程及其他进程便可以根据需要（并且在权限允许的情况下）读取、写入和删除该段中的数据。\n\n共享内存可能是两个进程之间共享信息最快的方式。例如，它没有磁盘\
  \ I/O 或数据库访问拖慢速度，也没有中间消息代理花费时间处理和分发信息。其缺点是你必须自己管理整个过程，尽管这并没有听起来那么困难。\n\n共享内存由两个扩展支持：SystemV\
  \ 的 `sysvshm` 扩展（像上一节描述的 `sysvsem` 一样，属于信号量扩展的一部分）以及更新的 `shmop` 扩展。我们将关注后者，因为它基于\
  \ C 的 `shm` 接口，这使得与*非* PHP 程序共享数据更容易，而不像前者那样使用自己专有的数据格式，导致很难与除 PHP 之外的任何程序共享数据。`Shmop`\
  \ 通常也比 `sysvshm` 更快，因为它以原始形式存储数据。\n\n与文件类似，如果多个进程同时尝试写入共享内存，它可能会损坏。在我们下面的示例中，我们不必担心锁定共享内存段，因为只有一个进程会写入它，为了简洁和清晰，我们不会包含任何锁定代码。但是，当锁定成为问题时，你可以使用上一节概述的信号量方法来确保一次只有一个进程写入该内存段。同时使用相同或不同进程的多个内存段不需要锁定，只要在给定时间只有一个进程写入特定的段即可。\n\
  \n是时候看一个共享内存的实际例子了。下面是两个脚本。第一个脚本 `generator.php` 每秒生成一个包含三个随机数的数组，将其编码为 JSON 并放入一个共享内存段。第二个脚本\
  \ `display.php` 检索该数据并将其输出到终端。要尝试这些脚本，请打开两个终端窗口，同时在每个窗口中运行一个脚本。\n\n-   第一个脚本是 **generator.php**\n\
  \n```\n<?\n\n$segment = shmop_open('1234456', 'c', 0755, 1024);\n\nfor ($counter=0;\
  \ $counter < 20; $counter++) {\n\n    $jsonArray = json_encode(\n        array(rand(0,50000),\
  \ \n        rand(0,2000),\n        rand(5000,100000))\n    );\n\n    $jsonArray\
  \ = str_pad($jsonArray, 1024-strlen($jsonArray), ' ');\n\n    $dataSize = strlen($jsonArray);\n\
  \n    $bytesWritten = shmop_write($segment, $jsonArray, 0);\n\n    if (!$bytesWritten)\
  \ { echo(\"Error - couldn't write to memory\\n\"); };\n\n    if ($dataSize != $bytesWritten)\
  \ { \n        echo(\"Error - couldn't write all data to memory\\n\");     \n   \
  \ };\n\n    sleep(1);\n\n};\n\nshmop_delete($segment);\n\nshmop_close($segment);\n\
  ```\n\n-   第二个脚本是 **display.php**\n\n```\n<?\n\n$segment = shmop_open('1234456',\
  \ 'c', 0755, 1024);\n\nwhile (1) {\n\n    sleep(1);\n\n    $size = shmop_size($segment);\n\
  \n    $jsonArray = shmop_read($segment, 0, $size);\n\n    echo(\"Fetched $size bytes\
  \ of data at \".date(\"H:i:s\").\n        \". Our random numbers are :\\n\");\n\n\
  \    print_r(json_decode(trim($jsonArray)));\n\n};\n```\n\n让我们仔细看看 `generator.php`。首先，我们使用\
  \ `shmop_open()` 创建一个共享内存段。它接受四个参数，第一个是唯一的整型键，用于标识此段，与信号量一样，它必须唯一，并且与将要访问我们共享内存段的其他进程共享。请参阅信号量部分中关于使用\
  \ `ftok()` 创建唯一 ID 的说明，了解生成和共享唯一 ID 的一种方法。第二个参数是我们打开段的“模式”。选项有：\n\n- `a` - 以只读方式打开现有段\n\
  - `c` - 创建一个新段，如果已存在则打开以供读写\n- `w` - 以读写方式打开现有段\n- `n` - 创建一个新段，如果已存在则失败\n\n请注意，上面的“只读”访问仅适用于我们所在进程，另一个进程可以打开该段进行写入（如果它具有写权限，请参见下文）。\n\
  \n`shmop_open()` 的第三个参数指定内存段的权限，使用八进制。这些与 Unix 文件权限相同（例如，你使用 `chmod` 分配的权限）。它们仅适用于尚未创建的段，并且对现有段被忽略。最后一个参数是共享内存段的大小，以字节为单位。你应该确保该段足够大以容纳你要放入其中的数据（否则写入时数据将被截断），但也不要大于必要的大小（否则会浪费其他进程可能使用的内存）。创建后，`shmop_open()`\
  \ 返回一个标识符，我们可以用它来引用此段，并将其存储在 `$segment` 中。请注意，这是一个内部的 PHP 资源标识符，与我们用作 `shmop_open()`\
  \ 第一个参数的唯一键不同。\n\n一旦创建了内存段，我们执行一个循环 20 次，然后将该段标记为删除并关闭它。在循环中，我们创建一个包含三个随机数的数组，并将其编码为名为\
  \ `$jsonArray` 的 JSON 字符串。然后使用 `str_pad()` 用空格将其填充至 1024 字节。这种填充很重要，因为内存段不像 PHP\
  \ 中的变量，它有一个固定大小。例如，如果你在其中存储一个 5 个字符的字符串，然后替换存储一个 3 个字符的字符串，你会发现当你尝试读取它时，你最初的字符串的最后\
  \ 2 个字符会出现在你新 3 个字符的字符串末尾。因此，如果你要重复使用同一个段，你需要找到一种方法来清除该段中当前未使用的任何额外空间，或者找到一种方法将你写入的数据长度传递给另一个进程，以便它只读取正确数量的数据。一种常见的方法是先将字符串的长度写入内存（例如，总是在内存的前\
  \ 4 个字节中），然后将实际数据写入其后。接收进程首先读取长度数据，然后仅从段中的剩余数据中读取所需数量的字节。另一种方法，正如我们在这里所做的，是始终完全填满该段。我们通过将数据用\
  \ `str_pad()` 填充空格至 1024 字节，然后在接收端用 `trim()` 去掉空格来实现这一点。\n\n填充 `$jsonArray` 后，我们获取其大小（在本例中应该始终为\
  \ 1024），并使用 `shmop_write()` 将其写入内存段，该函数返回成功写入 `$bytesWritten` 的字节数（如果一切顺利，希望是 1024）。`shmop_write()`\
  \ 需要三个参数。第一个是 `$segment` PHP 资源标识符，第二个是要写入内存的字符串，第三个是偏移量。偏移量指定我们要开始写入数据的内存段位置。在我们的示例中，我们希望从头开始，因此我们使用\
  \ 0；如果你使用前 4 个字节来写入数据大小，那么你第二次写入实际数据的 `shmop_write()` 将以偏移量 5 开始。\n\n完成写入后，我们检查是否成功写入（`$bytesWritten`\
  \ 不是 -1），以及我们是否写入了*所有*数据（本例中我们没有尝试写入超过 1024 字节）。\n\n在我们循环了 20 次（每次睡眠一秒以使输出内容可读！）之后，我们将内存段标记为删除并关闭它。我们稍后会回到最后两行。\n\
  \n\n\n现在让我们来看另一个脚本 `display.php`。我们使用与第一个脚本完全相同的方式，通过 `shmop_open()` 打开共享内存段。因为我们使用了可以创建内存段的“c”模式，所以实际上先运行哪个脚本并不重要。如果我们知道\
  \ `generator.php` 会先运行（或者愿意等它运行），也可以使用“a”只读模式。\n\n打开内存段后，我们进入持续循环（每次休眠一秒，因为我们知道\
  \ `generator.php` 脚本每秒只会更新一次内存段），获取并显示内存段的内容。\n\n要获取内容，我们使用 `shmop_read()`。这个函数接受三个参数：第一个是\
  \ `$segment` PHP 资源标识符，第二个是起始读取的偏移量，第三个是要读取的数据量。在我们的例子中，我们需要整个段，所以从头开始（偏移量 = 0）读取到末尾（总共\
  \ 1024 字节）。如果你想读取到段末尾但不知道其大小，可以像我们这里一样使用 `shmop_size()` 来获取，尽管在我们的例子中这一步是多余的，因为我们知道它大小是\
  \ 1024 字节。\n\n获取数据后（这应该是一个填充了空格的 `$jsonArray` 字符串），我们用 `trim()` 去掉空格，再用 `json_decode()`\
  \ 将字符串还原为数组，最后通过 `print_r()` 输出。\n\n现在回到 `generator.php` 的最后两行，调用 `shmop_delete()`\
  \ 和 `shmop_close()`。`shmop_delete()` 实际上并不会删除内存段，而是“标记它为待删除”。这意味着新进程无法再打开该内存段，但已经打开它的现有进程可以继续访问。在所有已打开的进程关闭（或退出）之前，它仍然可访问，之后就会被删除。\n\
  \n你可以通过运行这两个脚本来观察删除过程。`generator.php` 会在 20 秒后退出，而 `display.php` 会一直运行（由于 `while(1)`\
  \ 循环）。当 `generator.php` 退出后，你会发现 `display.php` 每次都输出相同的 3 个随机数。这是因为虽然我们在 `generator.php`\
  \ 中标记了待删除内存段，但 `display.php` 仍然处于打开状态，所以它仍然可以读取（只不过每次读取到相同值，因为没有数据更新了）。如果你终止 `display.php`\
  \ 并重新启动它（不启动 `generator.php`），你会发现它现在读取不到任何内容，因为当上一个 `display.php` 进程（最后一个使用它的进程）退出时，内存段已被删除。\n\
  \n另一个特别之处是我们先调用 `shmop_delete()` *再*调用 `shmop_close()`。原因是如果先关闭，PHP 将不再持有内部引用，也就不知道要标记删除哪个内存段。一旦调用了\
  \ `shmop_delete()`，在脚本中就不能再对该内存段进行任何操作，只能关闭它。你必须拥有适当的权限才能标记删除内存段。你应该确保在所有进程使用完内存段之前的某个时间点，标记它为待删除。否则会导致“内存泄漏”，即内存被“分配”而无法被其他程序使用，从而降低系统整体的可用内存量。\n\
  \n当然，`shmop` 函数仅负责进程间的数据传输。理解或解析数据则留给程序员自行处理。如果你正在通信的应用程序没有规定数据格式（例如，你自己开发系统而不是接入现有系统），那么你需要决定合适的格式。在上面的例子中，我们使用\
  \ JSON 将数组编码为字符串，但如果你知道数据只会在 PHP 脚本之间共享，也可以使用 PHP 的 `serialize()` 和 `unserialize()`\
  \ 函数。不过，如果你认为软件将来可能与其他语言编写的程序交互，坚持使用 JSON 或 XML 等语言无关的编码方式会是更明智的选择。\n\n虽然这应该是显而易见的，但请记住内存中的任何数据都是易失的。如果系统崩溃、内存段被删除（通常在一个或多个程序退出时）或重启后，数据将不复存在。因此，任何关键数据也应写入磁盘。\n\
  \n| ![信息](img/image00248.jpeg) | **延伸阅读**PHP 手册中的 SHMOP 共享内存 [`php.net/manual/en/book.shmop.php`](http://php.net/manual/en/book.shmop.php)\
  \ |\n| -------------------------------- | ----------------------------------------------------------------------------------------------------------------------------------------------------\
  \ |\n\n| ![](img/image00249.gif) | ***SimpleSHM*** |\n| --------------------------\
  \ | --------------- |\n|                            |                 |\n|     \
  \                       | 一个用于简化 `shmop` 获取和设置共享内存的抽象层 |\n|                    \
  \        |                 |\n|                            | ***主页*** : [`github.com/klaussilveira/SimpleSHM`](https://github.com/klaussilveira/SimpleSHM)\
  \ |\n\n\n\n### 7.5 PHP 消息队列\n\n消息队列为多进程交互提供了一种简单的方式。最简单的形式是，一个进程向队列添加消息，另一个进程从中取出消息。队列通常由中间进程或操作系统本身维护。相比使用共享内存进行消息传递，队列能让程序员的生活更轻松，因为程序员无需（过多）担心时序和同步问题，而且通常不需要锁。发送进程可以发出消息然后将其遗忘（如果需要的话），接收进程可以等待消息到达（或执行其他任务，稍后再回来检查消息）。PHP\
  \ 提供了多种消息队列 API 和扩展，我们将在本章后续部分介绍其中大部分内容。在本节中，我们将探讨 `sysvmsg` 消息队列，它是我们之前章节中讨论的信号量扩展的一部分。这是一个基础但实用的消息队列系统，其优点是通常被编译到大多数\
  \ PHP 发行版中，并且不需要任何第三方 API、守护进程或库。\n\n让我们直接通过一个示例来学习。我们将修改上一节中的随机数生成器脚本，使其使用消息队列。我们的第一个脚本\
  \ `generator2.php` 将快速连续发送 20 条消息，每条消息包含 3 个随机数，然后退出。第二个脚本 `display2.php` 将按照自己的节奏（每秒\
  \ 1 条）取出这些消息并显示。\n\n*   此脚本为 `generator2.php`\n\n```\n 1 <?\n\n3 $queue = msg_get_queue('1234456',\
  \ 0666);\n\n5 for ($counter=0; $counter < 20; $counter++) {\n\n7 \t$phpArray = array(rand(0,50000),\
  \ rand(0,2000), rand(5000,100000));\n\n9 \tif (!msg_send($queue, 3, $phpArray, true,\
  \ true, $errorCode)) {\n\n11 \t\t echo(\"Error - couldn't send message - code $errorCode\\\
  n\");\n\n13 \t};\n\n15 };\n```\n\n*   此脚本为 `display2.php`\n\n```\n 1 <?\n\n3 $queue\
  \ = msg_get_queue('1234456', 0666);\n\n5 while (1) {\n\n7 \tsleep(1);\n\n9 \tif\
  \ (!msg_receive($queue, -4, $realType, 1024, $phpArray, true, \n10 \t\t0, $errorCode))\
  \ {\n11 \t\t\techo(\"Error - Couldn't receive message - code $errorCode\\n\");\n\
  12 \t};\n\n14 \techo(\"Fetched message at \".date(\"H:i:s\").\". Random numbers\
  \ are :\\n\");\n\n16 \tprint_r($phpArray);\n\n18 };\n```\n\n如果先运行 `generator2.php`，你会看到它几乎立即完成并退出。然后你可以等待任意长时间（几小时甚至几天）再运行\
  \ `display2.php`，因为消息会安然地待在队列中（除非你关闭电脑）。当你运行 `display2.php` 时，你会看到随机数每秒出现一组。如果在读取完所有\
  \ 20 条消息之前使用 `ctrl-c` 终止脚本，你可以简单地重新启动它，它会从上次中断的地方继续读取，直到所有 20 条消息都显示完毕。此时，它会等待队列中出现任何新消息。如果在\
  \ `display2.php` 等待时，你在另一个终端中再次运行 `generator2.php`，你会看到 `display2.php` 几乎立即再次活跃起来，并开始显示我们刚刚生成的新一组数字。\n\
  \n现在让我们看看这些脚本是如何工作的。它们应该与之前的共享内存示例类似，但更简单。在每个脚本中，我们首先使用 `msg_get_queue()` 函数打开消息队列。如果队列不存在，此函数会创建它；如果已存在，则直接打开。我们提供一个唯一的整数键作为第一个参数，以指示我们要使用哪个队列。请参阅上文信号量部分关于\
  \ `ftok()` 函数的注释，了解如何生成唯一键。第二个参数是队列的标准 Unix 权限。该函数返回一个唯一的 `$queue` ID，我们将其用于 `msg_send()`\
  \ 和 `msg_receive()` 函数。此 ID 是一个内部 PHP 资源 ID，与我们之前指定的队列键不同。\n\n在 `generator2.php`\
  \ 中，我们像之前一样生成一个包含随机数的 PHP 数组，然后使用 `msg_send()` 函数将这个数组放入队列。我们快速连续执行 20 次，然后退出。此函数接受多个参数：\n\
  \n*   `queue`：这是 `$queue` 资源标识符。\n*   `msgtype`：这是一个任意整数，用于指定消息的“类型”。你可以根据自己的需求为消息分配一个整数，然后在接收消息时可以根据此类型字段进行筛选。例如，你可以选择接收类型为“3”的下一条消息，或者接收任何类型的下一条消息。这很有用，例如，你可以使用类型参数为消息分配优先级，并在接收端根据优先级顺序处理它们。\n\
  *   `message`：这是要发送的实际消息。它应该是一个字符串，除非你将下一个参数（`serialize`）设置为 `true`，在这种情况下，你可以传递任何类型的变量或对象，PHP\
  \ 可以将其序列化为字符串。例如，在我们的示例中，我们直接将 PHP 数组传递给 `msg_send()` 函数，而无需先调用任何编码函数（例如 `json_encode()`\
  \ 或 `serialize()`），因为我们将下一个参数设置为 `true`。\n*   `serialize`：如果设置为 `true`，这将自动调用会话模块序列化机制将消息序列化为字符串。这通常是\
  \ `serialize()` 函数（除非你选择使用 WDDX 序列化器或类似工具）。如果你打算通过消息队列将数据传递给非 PHP 程序，则不应使用这种自动序列化（这是\
  \ PHP 特有的），而应使用其他编码器，例如 `json_encode()`，或将数据格式化为 XML，具体取决于你通信的程序接受的格式。\n*   `blocking`：如果队列已满并且你尝试发送消息，`msg_send()`\
  \ 函数将“阻塞”。这意味着它会等待队列中有可用空间，并暂停你的脚本直到空间可用。如果你将此参数设置为 `false`，函数将不会阻塞，而是返回 `false`，将\
  \ `errorcode` 参数设置为 `MSG_EAGAIN`（表示你应该稍后重试），并让脚本继续运行。在这种情况下，你有责任记住该消息并尝试再次发送，因为\
  \ `msg_send()` 函数会完全忘记它。\n*   `errorcode`：此参数存储发生错误时产生的任何错误代码。如果发生错误，函数将返回 `false`\
  \ 并设置此代码。\n\n因此，在上面的示例中，我们使用 `msg_send()` 的阻塞模式将 PHP 数组 `$phpArray` 作为消息发送，将其指定为类型“3”的消息（在我们的示例中纯属随意），使用自动序列化将数组转换为字符串，并在\
  \ `$errorCode` 中捕获任何错误代码。\n\n现在我们来看 `display2.php` 脚本。在调用 `msg_get_queue()` 加入队列后，我们启动一个连续循环（使用\
  \ `while(1)`），每次循环都会尝试从队列中读取一条消息。我们添加了一个 `sleep(1)` 一秒的延迟来间隔消息请求，并表明消息请求的时机并不重要（你可以将其更改为其他值，它同样可以工作，或者完全删除它，立即获取所有消息）。为了获取消息，我们使用\
  \ `msg_receive()`，它接受以下参数：\n\n\n\n-   `queue`：`$queue` 资源标识符\n-   `desiredmsgtype`：你想要接收的消息类型。如果此值为\
  \ 0，你将简单获取队列中的下一条消息。如果设置为一个正整数，比如 5，你将获取下一条使用 5 作为 `msg_send()` 中类型参数发送的消息。如果它是一个负整数，比如\
  \ -3，你将获取队列中类型最低且小于等于此参数绝对值（非负值）的下一条消息。例如，如果我们指定 -3，我们将获取类型为 1、2 或 3 的第一条消息（如果存在多条此类类型的消息，则我们首先获取类型为\
  \ 1 的第一条消息，当所有类型为 1 的消息被取完后，再获取类型为 2 的第一条消息，依此类推）。\n-   `msgtype`：这是我们实际接收到的消息的类型。当我们为上面的\
  \ `desiredmsgtype` 指定一个负值以从某一类型范围获取消息，并想查看我们实际收到的消息的具体类型时，这会非常有用。\n-   `maxsize`：这指定了你愿意接收的消息的最大大小（以字节为单位）。如果你要接收的消息大于此大小，那么\
  \ `msg_receive()` 函数将返回 `false` 且完全不返回任何消息，或者如果在下面的 `flags` 参数中设置了 `MSG_NOERROR`，则函数会截断消息并仅返回前\
  \ `maxsize` 个字节。请注意，`msg_receive()` 函数在尝试读取消息之前会分配一块等于 `maxsize` 大小的内存。这意味着即使消息很小（例如\
  \ 10kb），如果你在此处指定了过大的大小（例如，当你仅有 512Mb 可用内存时指定 1Gb），你的脚本将会崩溃。\n-   `message`：这是你实际接收到的消息。如果下面的\
  \ `unserialize` 参数设置为 `true`，则任何 PHP 类型（如数组或对象）都会被反序列化并以正确的类型返回。如果设置为 `false`，你将接收到作为（可能已序列化的）字符串的消息。\n\
  -   `unserialize`：如果为 true，消息的内容将被自动反序列化。\n-   `flags`：你可以指定以下标志：\n    -   `MSG_IPC_NOWAIT`：如果没有合适的消息可接收，默认情况下\
  \ `msg_receive()` 会“阻塞”脚本的执行并等待新消息到达。如果你设置此标志，脚本将不会阻塞，会返回整数 `MSG_ENOMSG`，并且你的脚本将继续执行。\n\
  \    -   `MSG_EXCEPT`：如果你使用上面 `desiredmsgtype` 中的正整数请求特定类型的消息，并设置此标志，你将获取除了你指定的类型之外的**任何**类型的消息。\n\
  \    -   `MSG_NOERROR`：当消息过大时阻止错误发生，详情请参见上面的 `msgtype`。\n-   `errorcode`：如果发生错误，`msg_receive()`\
  \ 函数返回 `false`，并且此参数被设置为**相关**的错误代码。\n\n因此，在我们的示例中，我们请求一个最大为 1024 字节、类型为 -4（也就是说，其类型为\
  \ 1、2、3 或 4）的消息。我们的 `generator2.php` 脚本创建了类型为 3 的消息，且所有消息都小于 1024 字节，因此它们都将匹配并被返回。`$realType`\
  \ 将被设置为 3，而 `$phpArray` 将以数组形式包含我们的数据，因为我们将 `unserialize` 设置为 true。我们没有设置 `MSG_IPC_NOWAIT`\
  \ 标志，所以如果没有消息，我们的脚本将在 `msg_receive()` 命令处“阻塞”，等待新消息。\n\n你可以使用 `msg_queue_exists()`\
  \ 在尝试使用消息队列前检查它是否存在，并使用 `msg_remove_queue()` 在你使用完毕后销毁队列。要获取有关队列的更多信息，可以调用 `msg_stat_queue()`，它会返回一个包含以下键的数组：\n\
  \n-   `msg_perm.uid`：拥有（创建）队列的进程的 uid（用户 ID）。\n-   `msg_perm.gid`：拥有（创建）队列的进程的 gid（组\
  \ ID）。\n-   `msg_perm.mode`：队列的文件访问模式（权限）。\n-   `msg_stime`：最后一条消息被添加到队列的时间。\n-\
  \   `msg_rtime`：最后一条消息从队列中被移除的时间。\n-   `msg_ctime`：队列最后被改变的时间（无论是添加还是移除了消息）。\n-\
  \   `msg_qnum`：当前队列中的消息数量。\n-   `msg_qbytes`：消息队列的最大总大小，以字节为单位。\n-   `msg_lspid`：最后向队列添加消息的进程的\
  \ pid（进程 ID）。\n-   `msg_lrpid`：最后从队列移除消息的进程的 pid（进程 ID）。\n\n队列的最大大小（任何时候队列中所有消息的总和）可以从这个数组中作为\
  \ `msg_qbytes` 读取。这通常设置为 16kb。如果你想更改此值，在 Linux 上可以将文件 `/proc/sys/kernel/msgmnb`\
  \ 改为更大的值（以字节为单位）。请记住，你需要在部署系统的任何机器上都进行此更改，并且需要拥有 root 权限才能执行此操作。\n\n我们使用的消息队列是“双向的”。这意味着，假设每个进程拥有适当的权限，每个进程都可以向队列添加和从队列移除消息。执行此操作时，你需要确保不会在其他进程有机会之前，无意中移除了你自己添加的消息，例如，通过使用消息的“类型”字段来指定预期的接收者。或者，你可以打开两个消息队列，在你的进程中使用一个用于发送，一个用于接收（在另一个进程中则相反）。当你开始向队列中添加超过两个进程时，保持此方面的“井然有序”尤为重要，请记住，可以加入你队列的进程数量仅受你可用系统资源的限制。\n\
