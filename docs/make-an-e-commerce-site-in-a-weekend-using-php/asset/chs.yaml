  \n$query = \"SELECT * FROM cart WHERE cart_sess = '$sessid'\";\n\n$results = mysqli_query($connect,\
  \ $query) or die (mysql_query());\n\nif(mysqli_num_rows($results)==0)\n{\n    echo\
  \ \"<div style=\\\"width:200px; margin:auto;\\\">Your Cart is empty</div> \";\n\
  }\nelse\n{\n    ?>\n    <table border=\"1\" align=\"center\" cellpadding=\"5\">\n\
  \    <tr><td> Item Code</td><td>Quantity</td><td>Item Name</td><td>Price</td><td>Total\
