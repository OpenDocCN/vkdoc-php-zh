    \n**Figure 11-7.** The Visitor pattern\n\n### Visitor Issues\n\nThe Visitor pattern,\
    \ then, is another pattern that combines simplicity and power. There are a few\
    \ things to bear in mind when deploying this pattern, however.\n\nFirst, although\
    \ it is perfectly suited to the Composite pattern, Visitor can, in fact, be used\
