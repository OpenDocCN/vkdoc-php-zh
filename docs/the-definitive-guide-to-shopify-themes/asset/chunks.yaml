  raw: '### Presenting Customers with Multiple Currencies


    As mentioned in the beginning of this section, storeowners can only select a single
    currency for use at checkout. This can obviously be an issue for stores selling
    to an international audience, but theme developers can mitigate the problem somewhat
    by building multiple currency display support into their themes.


    This solution won’t affect the currency that’s used at checkout, but it does allow
    customers to get their heads around exactly how much the products cost in their
    own currency. The gist of the most commonly used approach to this is:


    1.  Ensure the HTML for any elements displaying price information in your Liquid
    files are marked up with a special `data-` attribute.  

    2.  Use a file named `currencies.js` (provided by Shopify) to obtain a list of
    current foreign exchange rates.  

    3.  Add a dropdown input with a list of supported currencies to allow the users
    to select their preferred currency.  

    4.  When the dropdown is changed, find all specially-marked-up elements and use
    the exchange rate information to convert to the given currency.  

    5.  Use a cookie to store the user’s preferred currency for the future.  


    The specific code used to implement this pattern on your exercise store is shown
    in the code resources for this book. If you’re using this technique, you should
    make sure that you explain to customers that they’ll be charged in the store’s
    currency at checkout even if they’ve selected a different currency.


    ## Summary


    This chapter discussed the different use cases for Shopify themes (one-off, multi-use,
    and distributed) and the types of theme settings you might want to use for each.
    We covered the practical implementation of theme settings and discussed some best
    practices to make sure your settings are easy to use for merchants.


    Finally, the chapter covered Shopify’s built-in support for internationalization
    and translation. You learned how to implement translation in Liquid templates
    and learned about some of Shopify’s limitations in this area.


    Footnotes [1](#A437216_1_En_8_Chapter.html#Fn1_source)


    [`https://help.shopify.com/themes/development/theme-editor/settings-schema.`](https://help.shopify.com/themes/development/theme-editor/settings-schema.)


      [2](#A437216_1_En_8_Chapter.html#Fn2_source)


    [`https://github.com/luciddesign/bootstrapify/wiki/Escaping-liquid-in-SASS`](https://github.com/luciddesign/bootstrapify/wiki/Escaping-liquid-in-SASS)


      [3](#A437216_1_En_8_Chapter.html#Fn3_source)


    [`https://ecommerce.shopify.com/c/shopify-discussion/t/definitively-time-for-multi-language-support-19980`](https://ecommerce.shopify.com/c/shopify-discussion/t/definitively-time-for-multi-language-support-19980)


    # 9. SEO and Social Sharing


    Ever known a client that wanted less traffic to their web site?


    Me neither.


    Traffic is the lifeblood of any online store, and while it can vary greatly in
    quality, when it comes to quantity, bigger is usually better. The difficult part,
    of course, is getting that traffic in the first place.


    Every day, Shopify storeowners experiment with hundreds of different marketing
    channels and tactics, trying to bring more paying customers to their sites. Covering
    even a fraction of these strategies is well beyond the scope of this book.


    Instead, this chapter focuses on the specific things you can do as a Shopify theme
    developer to make sure that your themes offer the best possible starting point
    for merchants looking to market and grow their brands. This chapter covers a checklist
    of “on-page” best practices, discusses ways to provide search engines with structured
    information about a Shopify store, and finally looks at what we can do to promote
    the sharing of store content via social channels.


    ## Search Engine Optimization (SEO)


    Driving quality traffic to a web site is a tricky, confusing, and time-consuming
    business—a fact that the huge, complex, and often slimy Search Engine Optimization
    (SEO) and online marketing industry depends on. The amount of misinformation and
    scammy business practices prevalent in the industry has often trained clients
    to treat “SEO” as a magical black box they pour money into on one end and get
    traffic out of from the other.


    The good news is that as search engines have gotten smarter and less susceptible
    to sketchy practices and “gaming”, sites are being better rewarded for the “right
    things,” like providing better experiences for their visitors. In my opinion,
    this makes the job of a theme developer straightforward when it comes to SEO—follow
    best practices when structuring your site, make sure search engines can read and
    understand your pages, and above all, make sure the site is accessible and usable
    for the human beings interacting with it.


    ### Off-Page versus On-Page


    Broadly speaking, the myriad of SEO strategies, tricks, and techniques can be
    categorized into two main groups:


    *   On-page methods are implemented directly in a web site’s code to aid in increasing
    traffic and click-through rates. Examples of on-page methods include ensuring
    pages have a sensible HTML structure, adding appropriate metadata, and making
    sure the site is fast.

    *   Off-Page methods cover everything else you might use to get someone looking
    at your site: e-mail marketing, pay-per-click ads, social sharing, or advertising
    on the side of the Goodyear blimp.


    When we’re wearing our Shopify theme developer hats, we are focused on the on-page
    category, as it’s the only one we have direct control over. Off-page methods are
    just as important to merchant success, but could (and do) take an entire book
    to describe. If you’re interested in learning more, I can highly recommend `Moz.com`,
    which provides a wealth of free and paid SEO resources. Their material is not
    only well written, detailed, and up to date, but honest and absent that slimy
    feeling you can get elsewhere in the SEO world.


    The primary on-page methods covered in this chapter and elsewhere in this book
    are:


    *   Semantic HTML

    *   Keywords and content

    *   Structured data

    *   Performance (see Chapter [10](#A437216_1_En_10_Chapter.html))

    *   Layout and navigation design (see Chapter [4](#A437216_1_En_4_Chapter.html))


    ### Semantic HTML


    The word “semantic” here just means, “use the various types of HTML tags for the
    purpose they were intended.” This helps search engines (as well as accessibility
    tools like screen readers) make sense of the information on your pages and display
    the right information to users.


    *   Title tags (`<h1>`, `<h2>`, `<h3>`, etc.) should be used in order of importance,
    with the text content most relevant to the page appearing inside a `<h1>`, with
    subheadings appearing inside a `<h2>`, and so on. Titles should be under 70 characters
    long and unique to each page.

    *   Use HTML5 elements like `<nav>`, `<main>`, and `<article>` to help indicate
    the role of the elements on your page.

    *   Ensure each page renders a unique meta description (the content inside a `<meta
    name="description">` tag in your site’s `<head>`).

    *   Make sure all images have defined an `alt="Image description"` attribute so
    that image-based search engines can index and display them for relevant search
    terms.


    Shopify won’t automatically validate your theme’s HTML for you, so make sure you
    run the key pages in your theme through a HTML validation tool (like [`https://validator.w3.org`](https://validator.w3.org)
    ) as part of your quality assurance process .


    ### Keywords and Content


    In the early days of the web, search engines could be “gamed” quite easily. Relevance
    for certain phrases was determine by how often particular words appeared, meaning
    you’d end up with pages practicing “keyword stuffing,” as shown in Figure [9-1](#A437216_1_En_9_Chapter.html#Fig1).


    ![A437216_1_En_9_Fig1_HTML.jpg](A437216_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


