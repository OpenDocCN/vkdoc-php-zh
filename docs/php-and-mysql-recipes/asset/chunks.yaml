- fmt: "  \nThe source code to the MySQL database is owned and maintained by Oracle\
    \ today, and there is a new open source version developed by the original MySQL\
    \ team called MariaDB. This database is compatible with the MySQL API’s and can\
    \ be used as a drop-in replacement for MySQL. The standard database provided by\
    \ CentOS 7 today is MariaDB.\n\nAnother advantage is the small footprint that\
    \ makes it possible to use MySQL on limited hardware or embedded systems.\n\n\
    In this chapter we are going to show how to perform common database tasks from\
    \ PHP scripts using the `mysqli` extension.\n\n## Recipe 16-1. Connecting to MySQL\n\
    \n### Problem\n\nAlthough MySQL data in a database is stored in a file system,\
    \ it can’t be accessed by opening and reading/writing a file using the `fopen()`\
    \ or `file_get_contents()` functions. In order to issue commands and receive data,\
    \ it is necessary to have the database server running and use a TCP/IP connection\
    \ between the client and the server. How can this be done from PHP?\n\n### Solution\n\
    \nThe `mysqli` extension includes a function called `mysqli_connect()`. This function\
    \ requires a host name, user id, password, name of the database, tcp port, and\
    \ socket, as parameters and it will return a connection resource if the connection\
    \ could be made and `false` if the connection failed.\n\nIt is also possible to\
    \ connect to MySQL using the PHP Data Objects (`PDO`) extension.\n\n© Frank M.\
    \ Kromann 2016  \nF.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_16\n\
    \nCHAPTER 16 ■ USING MYSQL DATABASES\n\nAll the parameters can have default values\
    \ provided as configuration options in `php.ini`. These are defined as the following:\n\
    \n```\nmysqli.default_host = \"127.0.0.1\"\nmysqli.default_user = \"db_user\"\n\
    mysqli.default_pw = \"secret\"\nmysqli.default_port = 3306\nmysqli.default_socket\
    \ = \"\"\n```\n\nAs a minimum it is required to provide values for host, user,\
    \ and password. If the database is specified, an attempt to connect to that database\
    \ is made. The database can always be switched to a different database under the\
    \ same host with the use of the `mysqli_select_db()` function.\n\nIf the database\
    \ server and web server are running on the same box, we can use `localhost` or\
    \ the IP address `127.0.0.1` as the host name for the database server. If the\
    \ two services are on different servers, it’s necessary to provide the remote\
    \ host name or IP address. In a high-traffic environment it can provide better\
    \ performance to use an IP address. In that case, it’s not necessary for the client\
    \ to perform a DNS query to resolve a host name to an IP address on every connect\
    \ request.\n\n### How It Works\n\nIn order to connect to a database we need one\
    \ created on the server. Using the `mysql` command on the server can do this.\n\
    \n```\nmysql –u root –p\n```\n\nThis command will connect to the MySQL (or MariaDB)\
    \ server on the local host using the `root` user.\n\nThe connection will be interactive\
    \ and can be used to create new databases, tables, and add/update or delete data.\n\
    \nIn this example we will create a table called `music` to store albums, tracks,\
    \ and artist information. The first step is to create the database:\n\n```\ncreate\
    \ database music;\n```\n\nUse the command `show databases;` to get a list of all\
    \ databases available on the server.\n\n```\nMariaDB [mysql]> show databases;\n\
    +--------------------+\n| Database           |\n+--------------------+\n| information_schema\
    \ |\n| book               |\n| music              |\n| mysql              |\n\
    | performance_schema |\n+--------------------+\n5 rows in set (0.00 sec)\n```\n\
    \nCHAPTER 16 ■ USING MYSQL DATABASES\n\nIt is also necessary to create a database\
    \ user and grant that user access to the database. This is the user account that\
    \ will be used when connecting to the database from PHP.\n\n```\nMariaDB [mysql]>\
    \ CREATE USER 'php'@'localhost' IDENTIFIED BY 'secret';\nQuery OK, 0 rows affected\
    \ (0.01 sec)\n```\n\nThis will create a user account called `php` with the password\
    \ `secret`. The final step is to grant the `php` user access to the `music` database.\n\
    \n```\nMariaDB [mysql]> GRANT ALL PRIVILEGES ON music . * TO 'php'@'localhost';\n\
    Query OK, 0 rows affected (0.00 sec)\n```\n\nThis statement will grant the user\
    \ access to all tables in the `music` database.  \n"
  raw: 'The source code to the MySQL database is owned and maintained by Oracle today
    and there is a new open source version developed by the original MySQL team called
    MariaDB . This database is compatible with the MySQL API’s and can be used as
    a drop in replacement for MySQL. The standard database provided by CentOS 7 today
    is MariaDB.


    Another advantage is the small footprint that makes it possible to use MySQL on
    limited hardware or embedded systems.


    In this chapter we are going to show how to perform common database tasks from
    PHP scripts using the mysqli extension.


    Recipe 16-1\. Connecting to MySQL


    Problem


    Although MySQL data in a database is stored in a file system it can’t be accessed
    by opening and reading/


    writing a file using the fopen() or file_get_contents() functions . In order to
    issue commands and receive data it is necessary to have the database server running
    and use a TCP/IP connection between the client and the server. How can this be
    done from PHP?


    Solution


    The mysqli extension includes a function called mysqli_connect() . This function
    requires a host name, user id, password, name of the database, tcp port, and socket,
    as parameters and it will return a connection resource if the connection could
    be made and false if the connection failed.


    It is also possible to connect to MySQL using the PHP Data Objects ( PDO ) extension.


    © Frank M. Kromann 2016


    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_16


    CHAPTER 16 ■ USING MYSQL DATABASES


    All the parameters can have default values provided as configuration options in
    php.ini. These are defined as the following:


    mysqli.default_host = "127.0.0.1"


    mysqli.default_user = "db_user"


    mysqli.default_pw = "secret"


    mysqli.default_port = 3306


    mysqli.default_socket = ""


    As a minimum it is required to provide values for host, user, and password. If
    the database is specified an attempt to connect to that database is made. The
    database can always be switched to a different database under the same host with
    the user of the mysqli_select_db() function .


    If the database server and web server is running on the same box we can use localhost
    or the ip address 127.0.0.1 as the host name for the database server. If the two
    services are on different servers it’s necessary to provide the remote host name
    or IP address. In a high-traffic environment it can provide better performance
    by using an IP address. In that case it’s not necessary for the client to perform
    a DNS query to resolve a host name to an IP address on every connect request.


    How it Works


    In order to connect to a database we need one created on the server. Using the
    mysql command on the server can do this.


    mysql –u root –p


    This command will connect to the MySQL (or MariaDB) server on the local host using
    the root user .


    The connection will be interactive and can be used to create new databases, tables,
    and add/update or delete data.


    In this example we will create a table called music to store albums, tracks, and
    artist information. The first step is to create the database:


    create database music;


    Use the command '' show databases ;'' to get a list of all databases available
    on the server.


    MariaDB [mysql]> show databases;


    +--------------------+


    | Database |


    +--------------------+


    | information_schema |


    | book |


    | music |


    | mysql |


    | performance_schema |


    +--------------------+


    5 rows in set (0.00 sec)


    CHAPTER 16 ■ USING MYSQL DATABASES


    It is also necessary to create a database user and grant that user access to the
    database. This is the user account that will be used when connecting to the database
    from PHP.


    MariaDB [mysql]> CREATE USER ''php''@''localhost'' IDENTIFIED BY ''secret''; Query
    OK, 0 rows affected (0.01 sec)


    This will create a user account called php with the password secret. The final
    step is to grant the php user access to the music database.


    MariaDB [mysql]> GRANT ALL PRIVILEGES ON music . * TO ''php''@''localhost''; Query
    OK, 0 rows affected (0.00 sec)


    This statement will grant the user access to all tables in the music database.'
  trans: "\n\nMySQL 数据库的源代码目前由 Oracle 公司拥有和维护，而 MySQL 原始团队开发了一个名为 MariaDB 的新开源版本。该数据库与\
    \ MySQL API 兼容，可作为 MySQL 的即插即用替代品。目前 CentOS 7 提供的标准数据库正是 MariaDB。\n\n另一个优势在于其体积小巧，这使得\
    \ MySQL 能够用于硬件资源有限的环境或嵌入式系统。\n\n本章将演示如何使用 `mysqli` 扩展从 PHP 脚本执行常见的数据库操作。\n\n##\
    \ 食谱 16-1. 连接 MySQL\n\n### 问题\n\n尽管数据库中的 MySQL 数据存储在文件系统中，但无法通过使用 `fopen()` 或\
    \ `file_get_contents()` 函数打开并读取/写入文件来访问。要发送命令并接收数据，需要让数据库服务器保持运行，并在客户端与服务器之间建立\
    \ TCP/IP 连接。如何在 PHP 中实现这一点呢？\n\n### 解决方案\n\n`mysqli` 扩展包含一个名为 `mysqli_connect()`\
    \ 的函数。该函数需要主机名、用户 ID、密码、数据库名称、TCP 端口和套接字作为参数。如果连接成功，它将返回一个连接资源；如果连接失败，则返回 `false`。\n\
    \n也可以使用 PHP 数据对象（`PDO`）扩展来连接 MySQL。\n\n© Frank M. Kromann 2016  \nF.M. Kromann,\
    \ *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_16\n\n第 16 章 ■ 使用 MySQL\
    \ 数据库\n\n所有参数都可以通过在 `php.ini` 中提供的配置选项来设置默认值。这些默认值定义如下：\n\n```\nmysqli.default_host\
    \ = \"127.0.0.1\"\nmysqli.default_user = \"db_user\"\nmysqli.default_pw = \"secret\"\
    \nmysqli.default_port = 3306\nmysqli.default_socket = \"\"\n```\n\n至少需要提供主机名、用户名和密码的值。如果指定了数据库，则会尝试连接到该数据库。随时可以使用\
    \ `mysqli_select_db()` 函数切换到同一主机下的其他数据库。\n\n如果数据库服务器和 Web 服务器运行在同一台机器上，我们可以使用\
    \ `localhost` 或 IP 地址 `127.0.0.1` 作为数据库服务器的主机名。如果两个服务位于不同的服务器上，则需要提供远程主机名或 IP\
    \ 地址。在高流量环境中，使用 IP 地址可以提供更好的性能。在这种情况下，客户端无需在每次连接请求时都执行 DNS 查询来将主机名解析为 IP 地址。\n\
    \n### 工作原理\n\n要连接数据库，我们需要在服务器上创建一个数据库。可以通过在服务器上使用 `mysql` 命令来创建。\n\n```\nmysql\
    \ –u root –p\n```\n\n该命令将使用 `root` 用户连接到本地主机上的 MySQL（或 MariaDB）服务器。\n\n连接将是交互式的，可用于创建新的数据库、表，以及添加、更新或删除数据。\n\
    \n在此示例中，我们将创建一个名为 `music` 的表来存储专辑、曲目和艺术家信息。第一步是创建数据库：\n\n```\ncreate database\
    \ music;\n```\n\n使用命令 `show databases;` 可以获取服务器上所有可用数据库的列表。\n\n```\nMariaDB [mysql]>\
    \ show databases;\n+--------------------+\n| Database           |\n+--------------------+\n\
    | information_schema |\n| book               |\n| music              |\n| mysql\
    \              |\n| performance_schema |\n+--------------------+\n5 rows in set\
    \ (0.00 sec)\n```\n\n第 16 章 ■ 使用 MySQL 数据库\n\n还需要创建一个数据库用户，并授予该用户对数据库的访问权限。这是从\
    \ PHP 连接数据库时将使用的用户账户。\n\n```\nMariaDB [mysql]> CREATE USER 'php'@'localhost' IDENTIFIED\
    \ BY 'secret';\nQuery OK, 0 rows affected (0.01 sec)\n```\n\n这将创建一个名为 `php`、密码为\
    \ `secret` 的用户账户。最后一步是授予 `php` 用户对 `music` 数据库的访问权限。\n\n```\nMariaDB [mysql]>\
    \ GRANT ALL PRIVILEGES ON music . * TO 'php'@'localhost';\nQuery OK, 0 rows affected\
    \ (0.00 sec)\n```\n\n该语句将授予该用户对 `music` 数据库中所有表的访问权限。\n\n"
- fmt: "退出`mysql`工具，然后使用新帐户重新登录：\n\n```bash\nmysql -u php -p\n```\n\n输入密码（`secret`），然后输入显示数据库的命令。\n\
    \n```\nMariaDB [(none)]> show databases;\n+--------------------+\n| Database \
    \          |\n+--------------------+\n| information_schema |\n| music        \
    \      |\n+--------------------+\n2 rows in set (0.01 sec)\n```\n\n这将仅列出用户有权访问的数据库。`information_schema`数据库由MySQL用于存储有关表、列、键和索引等数据，这是一个所有用户都可以访问（只读）的数据库。\n\
    \n为了在数据库中存储数据，我们需要创建一个或多个表。每个表定义了多个不同数据类型（如整数、字符、日期时间等）的列。数据以行的形式添加到表中。\n\n每行将包含每个列的一个值。如果模式定义允许，某些列的值可以为空，但所有行将具有相同数量的列。\n\
    \n```\nMariaDB [music]> create table album (\n    -> id int auto_increment,\n\
    \    -> title varchar(250) not null,\n    -> description varchar(2000),\n    ->\
    \ primary key(id)\n    -> );\nQuery OK, 0 rows affected (0.02 sec)\n```\n\n第16章\
    \ ■ 使用MySQL数据库\n\n`show tables;`和`describe album;`命令可用于显示可用表的列表以及`album`表的定义。\n\
    \n```\nMariaDB [music]> show tables;\n+-----------------+\n| Tables_in_music |\n\
    +-----------------+\n| album           |\n+-----------------+\n1 row in set (0.00\
    \ sec)\n\nMariaDB [music]> describe album;\n+-------------+---------------+------+-----+---------+----------------+\n\
    | Field       | Type          | Null | Key | Default | Extra          |\n+-------------+---------------+------+-----+---------+----------------+\n\
    | id          | int(11)       | NO   | PRI | NULL    | auto_increment |\n| title\
    \       | varchar(250)  | NO   |     | NULL    |                |\n| description\
    \ | varchar(2000) | YES  |     | NULL    |                |\n+-------------+---------------+------+-----+---------+----------------+\n\
    3 rows in set (0.00 sec)\n```\n\n包含在主键中的列不能有`NULL`值，因此无需在任何属于主键的列上指定禁止空值的约束。\n\
    \n`auto_increment`约束用于在`INSERT`语句未提供值时自动为列分配值。\n\n现在我们有了一个包含单个表的数据库，以及一个可用于从PHP脚本连接和操作数据库的用户。在过程化设置中，这可能类似于`16_1.php`示例。\n\
    \n```php\n<?php\n// 16_1.php\n$con = mysqli_connect('127.0.0.1', 'php', 'secret',\
    \ 'music');\nif (mysqli_connect_error()) {\n    die(\"Error connecting: \" . mysqli_connect_errno()\
    \ . ' '\n        . mysqli_connect_error() . \"\\n\");\n}\nelse {\n    echo \"\
    Connected to music\\n\";\n}\n```\n\n作为一种替代方案，相同的功能可以通过面向对象的方法实现。\n\n```php\n<?php\n\
    // 16_2.php\n$mysqli = new mysqli('127.0.0.1', 'php', 'secret', 'music');\nif\
    \ ($mysqli->connect_error) {\n    die(\"Error connecting: {$mysqli->connect_errno}\
    \ {$mysqli->connect_error}\\n\");\n}\nelse {\n    echo \"Connected to music\\\
    n\";\n}\n```\n\n第16章 ■ 使用MySQL数据库\n\n如果脚本作为来自Web服务器的请求调用，则无需断开连接或释放任何资源。当脚本终止时，PHP会自动处理这些。如果脚本运行时间较长或不再需要数据库连接，最好关闭连接。这可以通过`mysqli_close()`函数或`mysqli::close()`方法完成。\n\
    \n```php\n<?php\n// 16_3.php\n$con = mysqli_connect('127.0.0.1', 'php', 'secret',\
    \ 'music');\nif (mysqli_connect_error()) {\n    die(\"Error connecting: \" . mysqli_connect_errno()\
    \ . ' '\n        . mysqli_connect_error() . \"\\n\");\n}\nelse {\n    echo \"\
    Connected to music\\n\";\n    mysqi_close($con);\n}\n```\n\n或者使用面向对象的代码：\n\n```php\n\
    <?php\n// 16_4.php\n$mysqli = new mysqli('127.0.0.1', 'php', 'secret', 'music');\n\
    if ($mysqli->connect_error) {\n    die(\"Error connecting: {$mysqli->connect_errno}\
    \ {$mysqli->connect_error}\\n\");\n}\nelse {\n    echo \"Connected to music\\\
    n\";\n    $mysqli->close();\n}\n```\n\n配方16-2。持久连接\n\n问题"
  raw: 'Exit the mysql tool and enter it again with the new account:


    mysql -u php -p


    Enter the password (secret) and type the command to show the databases.


    MariaDB [(none)]> show databases;


    +--------------------+


    | Database |


    +--------------------+


    | information_schema |


    | music |


    +--------------------+


    2 rows in set (0.01 sec)


    This will only list the databases the user has access to. The information_schema
    database is used by mysql to store data about tables, columns keys, and indexes,
    etc. It’s a database all users can access (read-only).


    In order to store data in a database we need to create one or more tables. Each
    table defines a number of columns of various data types (integer, char, datetime,
    etc.). Data is added to a table in the form of a row.


    Each row will contain a value for each column. The value of some columns can be
    empty if that is allowed by the schema definition but all rows will have the same
    number of columns.


    MariaDB [music]> create table album (


    -> id int auto_increment,


    -> title varchar(250) not null,


    -> description varchar(2000),


    -> primary key(id)


    -> );


    Query OK, 0 rows affected (0.02 sec)


    CHAPTER 16 ■ USING MYSQL DATABASES


    The show tables; and describe album; commands can be used to show a list of available
    tables and the definition of the album table.


    MariaDB [music]> show tables;


    +-----------------+


    | Tables_in_music |


    +-----------------+


    | album |


    +-----------------+


    1 row in set (0.00 sec)


    MariaDB [music]> describe album;


    +-------------+---------------+------+-----+---------+----------------+


    | Field | Type | Null | Key | Default | Extra |


    +-------------+---------------+------+-----+---------+----------------+


    | id | int(11) | NO | PRI | NULL | auto_increment |


    | title | varchar(250) | NO | | NULL | |


    | description | varchar(2000) | YES | | NULL | |


    +-------------+---------------+------+-----+---------+----------------+


    3 rows in set (0.00 sec)


    Columns included in the primary key can’t have a null value so it’s not necessary
    to specify a constraint disallowing null values on any column that is included
    in the primary key.


    The auto_increment constraint is used to automatically assign a value to the column,
    if the insert statement does not provide a value.


    We now have a database with a single table and a user that can be used to connect
    and interact with the database from a PHP script. In a procedural setting this
    could look like example 16_1.php.


    <?php


    // 16_1.php


    $con = mysqli_connect(''127.0.0.1'', ''php'', ''secret'', ''music'');


    if (mysqli_connect_error()) {


    die("Error connecting: " . mysqli_connect_errno() . '' ''


    . mysqli_connect_error() . "\n");


    }


    else {


    echo "Connected to music\n";


    }


    As an alternative the same functionality can be obtained with an object-oriented
    approach .


    <?php


    // 16_2.php


    $mysqli = new mysqli(''127.0.0.1'', ''php'', ''secret'', ''music'');


    if ($mysqli->connect_error) {


    die("Error connecting: {$mysqli->connect_errno} {$mysqli->connect_error}\n");


    }


    else {


    echo "Connected to music\n";


    }


    CHAPTER 16 ■ USING MYSQL DATABASES


    If the script is called as a request from a web server it is not necessary to
    disconnect or release any resources. This is handled by PHP automatically when
    the script terminates. If the script is long running or no longer needs the connection
    to the database, it’s a good idea to get rid of the connection. This can be done
    with the mysqli_close() function or the mysqli::close() method .


    <?php


    // 16_3.php


    $con = mysqli_connect(''127.0.0.1'', ''php'', ''secret'', ''music'');


    if (mysqli_connect_error()) {


    die("Error connecting: " . mysqli_connect_errno() . '' ''


    . mysqli_connect_error() . "\n");


    }


    else {


    echo "Connected to music\n";


    mysqi_close($con);


    }


    Or in object-oriented code:


    <?php


    // 16_4.php


    $mysqli = new mysqli(''127.0.0.1'', ''php'', ''secret'', ''music'');


    if ($mysqli->connect_error) {


    die("Error connecting: {$mysqli->connect_errno} {$mysqli->connect_error}\n");


    }


    else {


    echo "Connected to music\n";


    $mysqli->close();


    }


    Recipe 16-2\. Persistent Connections


