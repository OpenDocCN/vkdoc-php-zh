    \ logs in is imperceptibly fast on most servers and may be worth adding to your\
    \ login routine to keep your site secure.\n\n## Setting a Time Limit on Sessions\n\
    \nBy default, PHP sets the lifetime of the session cookie on the user’s computer\
    \ to 0, which keeps the session active until the user logs out or the browser\
    \ is closed. You can make the session timeout earlier through a call to `ini_set()`,\
    \ the function that allows you to change some PHP configuration directives on\
