    ## 配方 2-20：避免名称冲突\n\n### 问题\n\n对于被包含在其他项目中的库的作者来说，一个常见的问题是名称冲突。不能使用相同名称多次定义函数或类。早期，通过在函数和类名中添加前缀来解决这个问题，但这通常会导致代码库可读性降低。\n\
    \n### 解决方案\n\n命名空间的概念在 PHP 5.3 中引入，并被认为是该版本中对该语言最重要的改进之一。随着关键字`namespace`和`use`的引入，可以在命名空间内定义和使用函数，从而允许在多个地方使用相同的函数名。命名空间的定义必须是脚本中的第一个语句。如果在任何其他位置定义，解释器将停止脚本并产生致命错误。如果同一个文件中需要多个命名空间，可以通过再次使用`namespace`关键字来定义它们。这不会导致错误，因为脚本的第一部分已经属于一个命名空间。\n\
    \n虽然在命名空间定义之后允许任何脚本代码，但它仅适用于函数、类和常量。其他所有内容都将出现在全局空间中。\n\n名为`PHP`的命名空间保留给内部函数使用，除此之外，命名名称遵循与变量名相同的规则。它们必须以字母或下划线开头，后面的字符可以是字母、数字和下划线。\n\
    \n反斜杠字符也是允许的，但它实际上不会成为名称的一部分。它充当子命名空间的分隔符。这在大型项目中非常有用，因为项目的多个部分可能有同名函数或类。\n\n\
    ### 工作原理\n\n以下示例展示了一个简单的命名空间声明。\n\n```php\n// 2_35.php\n\nnamespace Test;\n\n\
    function t1() {\n\n}\n```\n\n在许多方面，命名空间的工作方式类似于文件系统，其中文件名或路径可以是相对于当前目录的、相对于当前目录的子目录的，或者可以相对于文件系统根目录进行绝对指定。\n\
    \n同样的原则也适用于命名空间，其中当前命名空间由`namespace`关键字设置，而常量、函数和类则是相对于当前命名空间或绝对引用的。以下两个示例脚本对此进行了说明。\n\
    \n```php\n// 2_36.php\n\nnamespace Test\\Utilities;\n\nfunction f1($a) {\n\n \
    \   return $a * 2;\n\n}\n```\n\n第 2 章 ■ 类与对象\n\n```php\n// 2_37.php\n\nnamespace\
    \ Test;\n\ninclude \"2_36.php\";\n\nfunction f1($a) {\n\n    return $a * 3;\n\n\
    }\n\necho \"相对引用\\n\";\n\necho f1(5) . \"\\n\";\n\necho Utilities\\f1(5) . \"\\\
    n\";\n\nnamespace MyProject;\n\necho \"绝对引用\\n\";\n\necho \\Test\\f1(5) . \"\\\
    n\";\n\necho \\Test\\Utilities\\f1(5) . \"\\n\";\n```\n\n函数`f1()`在第一个脚本文件中定义，它属于命名空间`Test\\\
    Utilities`。\n\n函数`f1()`也在第二个脚本文件中定义，但这次是在命名空间`Test`下，因此这两个函数不会产生冲突。访问这两个函数可以通过相对方式或绝对方式进行：`f1(5)`将调用`Test`命名空间（当前命名空间）中的函数版本，而`Utilities\\\
    f1(5)`则调用来自包含文件中定义在子命名空间中的版本。\n\n然后命名空间更改为`MyProject`，此时引用`f1()`函数的两个副本的唯一方法是使用从根开始的绝对路径。\n\
    \n有时，当使用包含子命名空间的长命名空间时，为完整名称创建别名会很有用，如下一个示例所示，其中包含了前面的`2_35.php`文件，并将该文件中使用的命名空间别名为命名空间`U`。\n\
    \n```php\n// 2_38.php\n\ninclude \"2_36.php\";\n\nuse Test\\Utilities as U;\n\n\
    echo U\\f1(3) . \"\\n\";\n```\n\n此脚本没有定义命名空间，尽管包含的文件中定义了一个，但当前命名空间仍然是根命名空间或全局空间。现在可以通过别名`U`访问命名空间`Test\\\
    Utilities`中的函数。除了为命名空间创建别名之外，还可以在当前命名空间中导入或使用类和接口。此功能在 PHP 5.6 版本中得到扩展，允许包含函数和常量。这是通过`use\
    \ function`或`use constant`完成的，其中单独的`use`关键字作用于类。\n\n```php\n// 2_39.php\n\ninclude\
    \ \"2_36.php\";\n\nuse function Test\\Utilities\\f1;\n\necho f1(3) . \"\\n\";\n\
    ```\n"
- fmt: "# 排版后的文档\n\n如果与PHP 5.5或更早版本一起使用，上面的示例将产生解析错误（`parse error`）。\n\n## 第2章 ■ 类与对象\n\
    \n### 配方2-21：在首次使用时自动加载类\n\n#### 问题\n\n处理许多类并记住包含正确的类定义文件是很繁琐的。\n\n#### 解决方案\n\
    \n自动加载是一种概念，它允许在首次使用类时自动包含定义该类的文件。\n\n#### 工作原理\n\n有几种不同的方法可以实现此功能。简单的方法是将每个文件命名为与其定义的类相同的名称，并定义魔术函数`__autoload()`。\n\
    \n```php\n<?php\n// 2_40.php\nfunction __autoload($class_name) {\n    include\
    \ $class_name . '.php';\n}\n```\n\n使用这种方法将减少在每个文件开头编写长串`include`语句的需要，并将确保只包含脚本所需的类。函数的内容可以像上面的示例那样是一个简单的`include`，也可以是一个更复杂的语句，通过查找表来确定需要哪个文件。\n\
    \n或者，可以使用来自SPL扩展的`spl_autoload_register()`函数来注册一个函数或类方法，该方法可以根据查找表或其他方法将类名称解析为特定的文件名。SPL扩展在大多数PHP安装中默认启用。\n\
    \n下面是一个如何使用`spl_autoload_register()`函数的示例：\n\n```php\n<?php\n// 2_41.php\nfunction\
    \ autoload($class) {\n    include \"../classes/{$class}.inc\";\n}\nspl_autoload_register(\"\
    autoload\");\n```\n\n当使用此代码时，如果一个在PHP和当前脚本中尚未定义的类被实例化，自动加载器将执行`autoload()`函数。如果文件未找到或者它没有定义该类，将会出现错误；否则，该类将被包含，并且该类被定义。\n\
    \n## 第3章\n\n## 执行数学运算\n\n大量数学函数内置于PHP核心中，通过扩展（包括任意精度数字、统计和线性代数）可以获得额外的功能。\n\n\
    内置函数涵盖指数、对数、三角函数、双曲函数以及舍入和随机数生成器。\n\nPHP支持整数和浮点数据类型，可用于执行基本的数学运算：加法（`+`）、减法（`-`）、乘法（`*`）和除法（`/`）。执行这些操作不需要特殊的函数，逻辑可以直接写入代码中。\n\
    \n```php\n<?php\n// 3_1.php\n$i = 5;\n$j = 5 * $i;\n```\n\n数学运算的执行顺序遵循与其他大多数编程语言相同的标准，即乘法和除法在加法和减法之前执行。\n\
    \n在下一个示例中，计算执行的是`3 * $i`，在这种情况下是15，然后加上5，所以`$j`的内容将是20。\n\n```php\n<?php\n// 3_2.php\n\
    $i = 5;\n$j = 5 + 3 * $i;\n```\n\n如果需要先加3和5，然后再乘以`$i`，则该操作必须用括号括起来。\n\n```php\n\
    <?php\n// 3_3.php\n$i = 5;\n$j = (5 + 3) * $i;\n```\n\n在这种情况下，先加5和3再进行乘法，所以`$j`中的结果是`8\
    \ * 5`，即40。\n\nPHP 5.6版本引入了一个新的数学运算符（`**`），作为创建指数表达式的一种简单方法。在5.6版本之前，使用`pow()`函数是执行此数学运算的唯一方法。\n\
    \n```php\n<?php\n// 3_4.php\n$k = 2 ** 10;\n```\n\n© Frank M. Kromann 2016\n\n\
    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_3\n\n第3章\
    \ ■ 执行数学运算\n\n使用`pow()`函数编写此代码的旧方式如下：\n\n```php\n<?php\n// 3_5.php\n$k = pow(2,\
    \ 10);\n```\n\n如果底数和指数都是非负整数，并且结果可以用整数表示（小于`PHP_INT_MAX`），则结果将是整数。在所有其他情况下，结果将是一个浮点值。\n\
    \nPHP还支持取模（`%`）运算符，用于查找整数除法的余数。\n\n### 配方3-1：更改数字的基数\n\n#### 问题\n\n默认情况下，PHP使用十进制表示数字。当数字作为输出打印，或数字用于给变量赋值或用于计算时，都假定使用的是十进制。在各种情况下，对其他基值数字的使用会使代码更具可读性。\n\
    \n#### 解决方案\n\nPHP支持其他3种基值（2、8、16）：二进制、八进制和十六进制。为了告诉PHP公式中写的数字不是十进制数，需要为数字添加限定符：二进制为`0b`，八进制为`0`，十六进制为`0x`。\n\
    \n#### 工作原理\n\n在下一个示例中，数字100分别在不带限定符以及使用三种特殊限定符转换为二进制、八进制和十六进制值的情况下使用。输出不进行相同的转换，因此程序将显示数字100在每种表示中的十进制值。\n\
    \n```php\n<?php\n// 3_6.php\n$i = 100;\n$b = 0b100;\n$o = 0100;\n$h = 0x100;\n\
    echo $i . \"\\n\";\necho $b . \"\\n\";\necho $o . \"\\n\";\necho $h . \"\\n\"\
    ;\n```\n\n此示例的输出如下：\n\n第3章 ■ 执行数学运算\n\n在数字上使用基限定符时，有效的数字如下：\n\n*   `0b`或二进制：只允许0和1，\n\
    *   `0`或八进制：只允许0到7，\n*   `0x`或十六进制：允许0-9以及字母a-f或A-F。\n\n使用无效数字将产生解析错误。\n\n允许这些限定符使得某些类型的值更具可读性。考虑Linux文件系统上的文件权限。这些通常用三个八进制数字表示所有者、组和其他权限，其中4代表读取，2代表写入，1代表执行权限。数字`0750`表示所有者具有读、写和执行权限；组具有读和执行权限；而其他所有人没有任何访问权限。如果这个数字用十进制表示，它将是488，并且不容易读取访问权限。\n\
    \n### 配方3-2：转换为不同的基值\n\n#### 问题\n\n在数字上使用限定符仅当数字作为PHP代码的一部分编写时才是选项。如果数字来自数据库或API调用，并且数字作为程序的输出写入，我们需要其他方法来在不同的基值之间进行转换。\n\
    \n#### 解决方案\n\nPHP自带了一些函数使这变得容易。函数`dechex()`将十进制整数值转换为对应的十六进制值。将十六进制字符串转换为整数的相反操作由`hexdec()`函数处理。类似地，函数`decbin()`和`bindec()`在十进制和二进制之间转换，最后函数`decoct()`和`octdec()`在十进制和八进制之间转换。\n\
    \n除了基限定符和转换函数之外，PHP还带有一个内置函数，可用于在任意基数之间转换数字。函数`base_convert()`接受三个参数，分别称为值（`value`）、源基数（`frombase`）和目标基数（`tobase`）。\n\
    \n`base_convert(number, frombase, tobase);`\n\n该值可以是整数或表示整数的字符串。如果使用整数，PHP会在进行转换前将数字转换为字符串。返回值始终是一个字符串。如果返回值是十进制的，则生成的字符串可以在计算中用作数字字符串，PHP会在执行计算时将其转换为数字。\n\
    \n#### 工作原理\n\n下面的示例将打印值4。\n\n```php\n<?php\n// 3_7.php\necho base_convert(100,\
    \ 2, 10);\n```\n\n请注意，输入值100是作为整数给出的，函数会在执行操作之前使用常规的十进制表示将其转换为字符串。如果该数字是以二进制表示形式（`0b100`）编写的，系统会将该值转换为字符串（4），在这种情况下，函数将返回0，因为4在二进制中不是有效数字。\n\
    \n第3章 ■ 执行数学运算\n\n```php\n<?php\n// 3_8.php\necho base_convert(0b100, 2, 10);\n\
    ```"
  raw: 'The example above will produce a parse error if used with PHP 5.5 or older.


    CHAPTER 2 ■ CLASSES AND OBJECTS


    Recipe 2-21\. Autoloading Classes on First Use


    Problem


    Working with many classes and remembering to include the right class definition
    files is tedious.


    Solution


    Autoloading is a concept that allows automatic inclusion of files that defines
    classes the first time a class is used.


    How it Works


    There are a couple of different methods to implement this functionality. The simple
    way is to give each file the same name as the class it defines and define a the
    magic function __autoload() .


    <?php


    // 2_40.php


    function __autoload($class_name) {


    include $class_name . ''.php'';


    }


    Using this will reduce the need to have a long list of include statements at the
    beginning of each file and it will ensure that only the classes that are needed
    by the script are included. The content of the function can be a simple include
    as in the example above or it can be a more elaborate statement that figures out
    which file is needed through a lookup table.


    Alternatively the function spl_autoload_register() , from the SPL extension, can
    be used to register a function or a class method that can resolve the class name
    into a specific file name based on a lookup table or other method. The SPL extension
    is enabled by default on most PHP installations.


    An example of how to use the spl_autoload_register() function is shown below:


    <?php


    // 2_41.php


    function autoload($class) {


    include "../classes/{$class}.inc";


    }


    spl_autoload_register("autoload");


    When this code is used and a class not currently defined within PHP and the current
    script is instantiated the autoloader will execute the autoload() function. If
    the file is not found or it doesn’t define the class there will be an error, otherwise
    the class will be included and the class defined.


    **CHAPTER 3**


    **Performing Math Operations**


    A large number of math functions are built in to the core of PHP and additional
    functionality is available through extensions including arbitrary precision numbers,
    statistics, and linear algebra.


    The built-in functions cover exponential, logarithmic, trigonometric, hyperbolic
    functions as well as rounding and random number generators.


    PHP supports integer and float data types that can be used to perform the basic
    math operations: addition (+), subtraction (-), multiplication (*), and division
    (/). No special functions are needed to perform these actions and the logic can
    be written directly into the code.


    <?php


    // 3_1.php


    $i = 5;


    $j = 5 * $i;


    The order in which math operations are executed follows the same standard as most
    other programming languages where multiplication and division are performed before
    addition and subtraction.


    In the next example the calculation is performed as 3 × $i , in this case 15 and
    then 5 is added so the content of $j will be 20.


    <?php


    // 3_2.php


    $i = 5;


    $j = 5 + 3 * $i;


    If it’s needed to add 3 and 5 before multiplying with $i, that operation must
    be isolated with parentheses.


    <?php


    // 3_3.php


    $i = 5;


    $j = (5 + 3) * $i;


    In this case 5 and 3 are added before the multiplication so the result in $j is
    8 × 5 or 40.


    PHP version 5.6 introduces a new math operator ( ** ) as a simple way of creating
    an exponential expression . Before version 5.6 the use of the pow() function was
    the only way to perform this math operation.


    <?php


    // 3_4.php


    $k = 2 ** 10;


    © Frank M. Kromann 2016


    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_3


    CHAPTER 3 ■ PERFORMING MATH OPERATIONS


    The old way of writing this with the pow() function is


    <?php


    // 3_5.php


    $k = pow(2, 10);


    The result of this will be an integer if both base and exponent are non-negative
    integers and the result can be represented by an integer (less than PHP_INT_MAX
    ). In all other cases the result will be a float value.


    PHP also support the modulus ( % ) operator that is used to find the reminder
    of an integer division.


    Recipe 3-1\. Changing the Base Values for Numbers


    Problem


    By default PHP uses base 10 to represent numbers when numbers are printed as output
    or numbers are used to assign values to variables or used in calculations it is
    assumed that base 10 is used. In various situations it makes the code more readable
    to use other base values for numbers .


    Solution


    PHP supports 3 other base values (2, 8, 16) binary, octal, and hexadecimal. In
    order to tell PHP that the number written in a formula is not a base 10 number
    is to add a qualifier to the number 0b for binary, 0 for octal, and 0x for hexadecimal
    numbers.


    How it Works


    In the next example the number 100 is used without qualifier and with each of
    the three special qualifiers to turn the number into binary, octal, and hexadecimal
    values. The output does not do the same conversion so the program will show the
    base 10 value of the number 100 in each of the representations.


    <?php


    // 3_6.php


    $i = 100;


    $b = 0b100;


    $o = 0100;


    $h = 0x100;


    echo $i . "\n";


    echo $b . "\n";


    echo $o . "\n";


    echo $h . "\n";


    The output of this example is the following:


    CHAPTER 3 ■ PERFORMING MATH OPERATIONS


    When using the base qualifiers on numbers the valid digits are these:


    • 0b or binary only allow 0 and 1,


    • 0 or octal only allow 0 to 7,


    • 0x or hexadecimal allow 0-9 and the letters a-f or A-F.


    Using invalid digits will produce a parse error.


    Allowing these qualifiers makes certain types of values more readable. Consider
    the file permissions on a Linux file system. These are normally represented with
    three octal digits for owner, group, and other permission where 4 represents read,
    2 represents write, and 1 represents execute permissions. The number 0750 means
    the owner has read, written, and executed permissions; and that the group has
    read and executed and everyone else has no access. If this number would have been
    represented in the decimal number system it would be 488 and it would not be easy
    to read the access.


    Recipe 3-2\. Converting to a Different Base Value


    Problem


    Using qualifiers on numbers is only an option when the numbers are written as
    part of the PHP code. If the number comes from a database or an API call and when
    numbers are written as output from the program, we need other methods to convert
    between different base values.


    Solution


    PHP comes with a few functions that make this easy. The function dechex() converts
    an integer value in base 10 to the corresponding value in base 16\. The opposite
    operation of converting a hexadecimal string to an integer is handled by the hexdec()
    function. Similarly the functions decbin() and bindec() convert between base 10
    and base 2 and finally the functions decoct() and octdec() convert between base
    10 and base 8.


    In addition to the base qualifiers and conversion functions PHP also comes with
    a built-in function that can be used to convert numbers between arbitrary bases.
    The function base_convert() takes three arguments called value, from base, and
    to base.


    base_convert(number, frombase, tobase);


    The value can be either an integer or a string representing an integer. If an
    integer is used PHP will convert the number to a string before making the conversion.
    The return value is always a string. If the return value is in base 10 the resulting
    string can be used as a numerical string in calculations and PHP will convert
    it to a number when the calculation is performed.


    How it Works


    The example below will print the value 4.


    <?php


    // 3_7.php


    echo base_convert(100, 2, 10);


    Note that the input value of 100 is given as an integer and the function will
    convert that into a string, using the conventional base 10 representations, before
    performing the operation. If the number was written in binary representation (0b100)
    the system would convert that value to a string (4) and in that case the function
    will return 0 as 4 is not a valid number in base 2.


    CHAPTER 3 ■ PERFORMING MATH OPERATIONS


    <?php


    // 3_8.php


    echo base_convert(0b100, 2, 10);'
