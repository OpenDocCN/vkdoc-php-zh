    \ ID。其次需要注意的是，该方法在`public/uploads`文件夹内为新文件定义了一个路径。这将允许文件通过 URL 直接访问。\n\n与我们的示例代码一样，该方法检查是否有文件被上传。如果有，该方法会尝试将文件移动到永久位置。\n\
    \n**注意：** 当文件无法移动到永久存储时，这可能是上传不安全或无效的迹象。此时正好可以引发异常，让开发者意识到出现了问题。\n\n文件移动到永久存储后，会创建一个新的`File`实例，并将一行记录保存到数据库中。我们还会确定上传文件的宽度/高度。既然我们有了一个可重用的上传方法，现在是时候将其集成到`Users`控制器的`register()`和`settings()`操作中了。\n\
    \n这些方法应类似于代码清单 18-5 和 18-6 所示。\n\n## 代码清单 18-5. `register()`操作\n\n```php\nuse\
    \ Framework\\RequestMethods as RequestMethods;\nuse Shared\\Controller as Controller;\n\
    \nclass Users extends Controller\n{\n    public function register()\n    {\n \
    \       if (RequestMethods::post(\"save\"))\n        {\n            $user = new\
    \ User(array(\n                \"first\" => RequestMethods::post(\"first\"),\n\
    \                \"last\" => RequestMethods::post(\"last\"),\n               \
    \ \"email\" => RequestMethods::post(\"email\"),\n                \"password\"\
    \ => RequestMethods::post(\"password\")\n            ));\n\n            if ($user->validate())\n\
    \            {\n                $user->save();\n                $this->_upload(\"\
    photo\", $user->id);\n                $this->actionView->set(\"success\", true);\n\
    \            }\n\n            $this->actionView->set(\"errors\", $user->errors);\n\
    \        }\n    }\n}\n```\n\n## 代码清单 18-6. `settings()`操作\n\n```php\nuse Framework\\\
    RequestMethods as RequestMethods;\nuse Shared\\Controller as Controller;\n\nclass\
    \ Users extends Controller\n{\n    /**\n     * @before _secure\n     */\n    public\
    \ function settings()\n    {\n        $errors = array();\n\n        if (RequestMethods::post(\"\
    save\"))\n        {\n            $this->user->first = RequestMethods::post(\"\
    first\");\n            $this->user->last = RequestMethods::post(\"last\");\n \
    \           $this->user->email = RequestMethods::post(\"email\");\n\n        \
    \    if (RequestMethods::post(\"password\"))\n            {\n                $this->user->password\
    \ = RequestMethods::post(\"password\");\n            }\n\n            if ($this->user->validate())\n\
    \            {\n                $this->user->save();\n                $this->_upload(\"\
    photo\", $this->user->id);\n                $this->actionView->set(\"success\"\
    , true);\n            }\n\n            $errors = $this->user->errors;\n      \
    \  }\n\n        $this->actionView->set(\"errors\", $errors);\n    }\n}\n```\n\n\
    集成我们可重用的`_upload()`方法相当简单。在每种情况下，我们只需提供正确的表单输入名称和用户 ID 即可执行文件上传。我们还需要将表单输入添加到`register.html`和`settings.html`视图中，如代码清单\
    \ 18-7 所示。\n\n## 代码清单 18-7. 文件输入\n\n```html\n<li>\n    <label>\n        照片：\n\
    \        <input type=\"file\" name=\"photo\" />\n    </label>\n</li>\n```\n"
- fmt: "- 确认已完成所有步骤：创建了 `uploads` 文件夹（并设置了上传所需的正确文件权限），且已提交注册或设置表单。此时，你应该能看到该文件夹中开始生成文件。同时，你需要在\
    \ `settings.html` 和 `register.html` 表单中添加 `enctype = \"multipart/form-data\"`\
    \ 属性。\n\n> **注意**：如果要为文件上传机制添加验证，你需要在文件输入控件下方添加一些 `echo` 逻辑，以显示验证错误信息。\n\n**稍加展示**\n\
    \n既然文件上传功能已可正常工作，接下来应将上传的文件整合到个人资料页面和搜索页面中。首先，我们需要在 `User` 模型上创建一个新方法，用于返回最新的\
    \ `File` 行。请参见清单 18-8，了解具体实现方式。\n\n***清单 18-8.*** `getFile()` 方法\n\n```php\nuse\
    \ Shared\\Model as Model;\n\nclass User extends Model\n{\n    public function\
    \ getFile()\n    {\n        return File::first(array(\n            \"user = ?\"\
    \ => $this->id,\n            \"live = ?\" => true,\n            \"deleted = ?\"\
    \ => false\n        ), array(\"*\"), \"id\", \"DESC\");\n    }\n}\n```\n\n该方法仅从数据库中返回与当前用户行关联的最新文件。接下来，我们需要更新\
    \ `search.html` 模板以包含照片，如清单 18-9 所示。\n\n***清单 18-9.*** `search.html` 模板（节选）\n\n\
    ```html\n{foreach $_user in $users}\n{script $file = $_user->file}\n<tr>\n   \
    \ <td>{if $file} <img src=\"/uploads/{echo $file->name}\" />{/if}</td>\n    <td>{echo\
    \ $_user->first} {echo $_user->last}</td>\n    <td>\n        {if $_user->isFriend($user->id)}\n\
    \            <a href=\"/unfriend/{echo $_user->id}.html\">unfriend</a>\n     \
    \   {/if}\n        {else}\n            <a href=\"/friend/{echo $_user->id}.html\"\
    >friend</a>\n        {/else}\n    </td>\n</tr>\n{/foreach}\n```\n\n由于 `getFile()`\
    \ 方法符合 `Base` 类中 `__get()` 方法的模式，我们可以直接通过 `$_user->file` 引用它。如果找到了文件，则将文件名回显到\
    \ `img` 元素的 `src` 属性中，从而在搜索结果列表中渲染该图片。最后一步是修改 `profile.html` 视图，如清单 18-10 所示。\n\
    \n***清单 18-10.*** `profile.html` 模板（节选）\n\n```html\n{script $file = $user->file}\n\
    {if $file} <img src=\"/uploads/{echo $file->name}\" />{/if}\n<h1>{echo $user->first}\
    \ {echo $user->last}</h1>\n```\n\n这是一个个人资料页面！\n\n至此，我们已完成允许用户上传文件，并让这些文件在搜索页面和个人资料页面上显示的所有步骤。\n\
    \n**问题**\n\n1. 为什么有必要在数据库中保存对上传文件的引用？\n2. 我们将文件上传到了 `public/uploads` 文件夹，并且没有检查它们是否为有效的图片。是什么阻止了用户上传恶意文件到服务器？\n\
    3. 确定并存储文件的宽度和高度的目的是什么？\n4. 如何修改此功能以支持上传到像 Amazon CloudFront 或 Rackspace Cloud\
    \ Files 这样的云服务？\n\n**答案**\n\n1. 这并不是绝对必要的，但强烈建议这样做。任何 PHP 应用中最大的瓶颈之一就是文件的读写操作。如果我们不在数据库中保存这些文件引用，就必须遍历\
    \ `uploads` 文件夹中的所有文件，匹配那些文件名中包含用户 ID 的文件。这种方法效率太低，不实用。而通过数据库行，我们可以简单地查询与用户关联的所有行，并通过引用返回对应的文件。\n\
    2. 我们没有进行验证，因此无法阻止此类事情发生。\n3. 在保护应用程序安全时，你应该采取一系列步骤——从拒绝执行 `uploads` 目录中的任何文件，到验证允许用户上传的文件的\
    \ MIME 类型、大小和文件名。这些过程应在文件被移动到永久存储之前完成，并且不会妨碍其他步骤的执行。"
