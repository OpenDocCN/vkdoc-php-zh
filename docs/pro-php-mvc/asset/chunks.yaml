  raw: 'For this kind of template parser, we will need to perform three steps to get
    from text to template. The first is tokenizing the source template. We can achieve
    this in a number of ways, and it is usually done using complicated regular expressions.
    We will be reading the source template, piece by piece, and adding each segment
    to an array.


    The second step our parser must take is to organize the tokenized segments into
    a hierarchy, so that we can put the template in terms of control structures and
    functions. This step looks at the contents of each segment and determines whether
    it is important to the template dialect, or is just another piece of data.


    The last step is transforming the hierarchy into the string representation of
    a function, which can be converted to an actual function and called with any arbitrary
    data. The function is stored so that multiple data sets do not cause the template
    to be parsed multiple times. Since we will be working largely with strings, we
    need to extend our StringMethods class with three new methods to sanitize strings,
    remove duplicate characters, and determine substrings within larger strings.


    ***Listing 8-2.*** Additional StringMethods Methods


