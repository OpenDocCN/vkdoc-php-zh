- "# PHP 解决方案 11-9：使用会话实现多页表单\n\n顾名思义，隐藏字段是表单代码的一部分，但屏幕上不会显示任何内容。隐藏字段适合存储一两个项目，但假设你有一个分布在四页上的调查问卷。如果每页有\
  \ 10 个项目，则总共需要 60 个隐藏字段（第二页 10 个，第三页 20 个，第四页 30 个）。**会话变量**可以省去所有这些编码工作。它们还可以确保访问者始终从多页表单的正确页面开始。\n\
  \n在本 PHP 解决方案中，你将构建一个用于多页表单的脚本，该脚本从 `$_POST` 数组中收集数据并将其分配给会话变量。如果有人试图直接访问表单的其他页面，该脚本会自动将用户重定向到表单的第一页。\n\
  \n1. 将 `ch11` 文件夹中的 `multiple_01.php`、`multiple_02.php`、`multiple_03.php` 和 `multiple_04.php`\
  \ 复制到 `sessions` 文件夹。前三页包含简单的表单，用于询问用户的姓名、年龄和地址。每个 `<form>` 标签的 `action` 属性都设置为当前页面，因此表单是自处理的，但它们尚不包含任何处理脚本。最后一页将最终显示前三页的数据。\n\
  \n2. 在 `multiple_01.php` 的 `DOCTYPE` 声明上方的一个 PHP 代码块中添加以下代码：\n\n```\nif (isset($_POST['next']))\
  \ {\n    session_start();\n    // 设置一个变量来控制对其他页面的访问\n    $_SESSION['formStarted']\
  \ = true;\n    // 设置必填字段\n    $required = 'first_name';\n    $firstPage = 'multiple_01.php';\n\
  \    $nextPage = 'multiple_02.php';\n    $submit = 'next';\n    require_once '../includes/multiform.php';\n\
  }\n```\n\n提交按钮的 `name` 属性是 `next`，因此仅当表单已提交时，此代码块中的代码才会运行。它会启动一个会话并创建一个会话变量，该变量将用于控制对其他表单页面的访问。\n\
  \n接下来是四个变量，它们将由处理多页表单的脚本使用：\n\n- `$required`：这是一个数组，包含当前页面中必填字段的 `name` 属性。如果只有一个必填字段，则可以使用字符串而不是数组。如果没有必填字段，则可以省略。\n\
  - `$firstPage`：表单第一页的文件名。\n- `$nextPage`：表单中下一页的文件名。\n- `$submit`：当前页面中提交按钮的名称。\n\
  \n最后，代码包含了处理多页表单的脚本。\n\n3. 在 `includes` 文件夹中创建一个名为 `multiform.php` 的文件。删除所有 HTML\
  \ 标记并插入以下代码：\n\n```\n<?php\nif (!isset($_SESSION)) {\n    session_start();\n}\n\
  $filename = basename($_SERVER['SCRIPT_FILENAME']);\n$current = 'http://' . $_SERVER['HTTP_HOST']\
  \ . $_SERVER['PHP_SELF'];\n```\n\n多页表单的每一页都需要调用 `session_start()`，但在同一页上调用两次会导致错误，因此条件语句首先检查\
  \ `$_SESSION` 超全局变量是否可访问。如果不可访问，它会为当前页面启动会话。\n\n条件语句之后，`$_SERVER['SCRIPT_FILENAME']`\
  \ 被传递给 `basename()` 函数以提取当前页面的文件名。这与您在 PHP 解决方案 5-3 中使用的技术相同。\n\n`$_SERVER['SCRIPT_FILENAME']`\
  \ 包含父文件的路径，因此当此脚本被包含在 `multiple_01.php` 中时，`$filename` 的值将是 `multiple_01.php`，*而不会是*\
  \ `multiform.php`。\n\n下一行通过字符串 `http://` 以及 `$_SERVER['HTTP_HOST']`（包含当前域名）和 `$_SERVER['PHP_SELF']`（包含当前文件除域名外的路径）的值来构建当前页面的\
  \ URL。如果您在本地测试，当多页表单的第一页加载时，`$current` 将是 `http://localhost/phpsols-4e/sessions/multiple_01.php`。\n\
  \n4. 现在你已经有了当前文件的名称及其 URL，你可以使用 `str_replace()` 来创建第一页和下一页的 URL，如下所示：\n\n```\n$redirectFirst\
  \ = str_replace($filename, $firstPage, $current);\n$redirectNext = str_replace($filename,\
  \ $nextPage, $current);\n```\n\n第一个参数是要替换的字符串，第二个参数是替换字符串，第三个参数是目标字符串。在第 2 步中，你将\
  \ `$firstPage` 设置为 `multiple_01.php`，将 `$nextPage` 设置为 `multiple_02.php`。因此，`$redirectFirst`\
  \ 变成 `http://localhost/phpsols-4e/sessions/multiple_01.php`，而 `$redirectNext` 是\
  \ `http://localhost/phpsols-4e/sessions/multiple_02.php`。\n\n5. 为防止用户不从头开始就访问多页表单，请添加一个条件语句来检查\
  \ `$filename` 的值。如果它不是第一页，并且 `$_SESSION['formStarted']` 尚未创建，则 `header()` 函数会重定向到第一页，如下所示：\n\
  \n```\nif ($filename != $firstPage && !isset($_SESSION['formStarted'])) {\n    header(\"\
  Location: $redirectFirst\");\n    exit;\n}\n```\n\n6. 脚本的其余部分会遍历 `$_POST` 数组，检查是否有必填字段为空，并将它们添加到\
  \ `$missing` 数组中。如果没有缺失项，`header()` 函数会将用户重定向到多页表单的下一页。`multiform.php` 的完整脚本如下所示：\n\
  \n```\n     $value) {\n    // 跳过提交按钮\n    if ($key == $submit) continue;\n    //\
  \ 如果不是数组，则去除空白\n    if (!is_array($value)) {\n        $value = trim($value);\n \
  \   }\n    // 如果为空且是必填字段，则添加到 $missing 数组\n    if (in_array($key, $required) &&\
  \ empty($value)) {\n        $missing[] = $key;\n        continue;\n    }\n    //\
  \ 否则，分配给与 $key 同名的会话变量\n    $_SESSION[$key] = $value;\n}\n// 如果没有必填字段缺失，则重定向到下一页\n\
  if (!$missing) {\n    header(\"Location: $redirectNext\");\n    exit;\n}\n```\n\n\
  这段代码与第 6 章中用于处理反馈表单的代码非常相似，因此内联注释应该足以说明其工作原理。包裹新代码的条件语句使用 `$_POST[$submit]` 来检查表单是否已提交。我使用了变量而不是硬编码提交按钮的名称，以使代码更加灵活。虽然此脚本仅在表单提交后被包含在第一页中，但它直接被包含在其他页面中，因此有必要在此处添加条件语句。\n\
  \n提交按钮的名称和值始终包含在 `$_POST` 数组中，因此 `foreach` 循环使用 `continue` 关键字，以便在键与提交按钮的名称相同时跳过该项。这可以避免将不需要的值添加到\
  \ `$_SESSION` 数组中。有关 `continue` 的描述，请参见第 4 章的“跳出循环”。\n\n7. 在 `multiple_02.php` 的\
  \ `DOCTYPE` 声明上方的一个 PHP 代码块中添加以下代码：\n\n```\n$firstPage = 'multiple_01.php';\n$nextPage\
  \ = 'multiple_03.php';\n$submit = 'next';\nrequire_once '../includes/multiform.php';\n\
  ```\n\n\n\n这段代码设置了 `$firstPage`、`$nextPage` 和 `$submit` 的值，并包含了你刚刚创建的处理脚本。此页面上的表单只包含一个可选字段，因此不需要\
  \ `$required` 变量。如果处理脚本在主页面中未设置该变量，它会自动创建一个空数组。\n\n8.  在 `multiple_03.php` 中，在 `DOCTYPE`\
  \ 声明上方的 PHP 代码块中添加以下内容：\n\n```\n// 设置必填字段\n$required = ['city', 'country'];\n$firstPage\
  \ = 'multiple_01.php';\n$nextPage = 'multiple_04.php';\n$submit = 'next';\nrequire_once\
  \ '../includes/multiform.php';\n```\n\n这里有两个必填字段，因此它们的 `name` 属性被列为一个数组并赋值给 `$required`。其他代码与上一页中的相同。\n\
  \n9.  在 `multiple_01.php`、`multiple_02.php` 和 `multiple_03.php` 的 `<form>` 标签上方添加以下代码：\n\
  \n```\n<?php\nif ($missing) {\n    echo '请修复以下必填字段：<ul>';\n    foreach ($missing\
  \ as $item) {\n        echo \"<li>$item</li>\";\n    }\n    echo '</ul>';\n}\n?>\n\
  ```\n\n这会显示一个尚未填写的必填字段列表。\n\n10. 在 `multiple_04.php` 中，在 `DOCTYPE` 声明上方的 PHP 代码块中添加以下代码，以便在用户不是从第一页进入表单时将其重定向回第一页：\n\
  \n```\n<?php\nsession_start();\nif (!isset($_SESSION['formStarted'])) {\n    header('Location:\
  \ http://localhost/phpsols-4e/sessions/multiple_01.php');\n    exit;\n}\n?>\n```\n\
  \n11. 在页面正文中，将以下代码添加到无序列表中以显示结果：\n\n```\n<?php\n$expected = ['city', 'country',\
  \ 'first_name', 'last_name', 'age'];\nforeach ($expected as $key) {\n    echo \"\
  <li>$key: \" . htmlentities($_SESSION[$key]) . '</li>';\n    // 删除会话变量\n    unset($_SESSION[$key]);\n\
  }\n?>\n```\n\n这段代码将表单字段的 `name` 属性列为一个数组，并将该数组赋值给 `$expected`。这是一种安全措施，用于确保你不会处理可能被恶意用户注入到\
  \ `$_POST` 数组中的虚假值。\n\n然后，该代码取消设置 `$_SESSION['formStarted']`，并遍历 `$expected` 数组，使用每个值访问\
  \ `$_SESSION` 数组中的相关元素，并在无序列表中显示它。随后删除会话变量。逐个删除会话变量可以保留其他与会话相关的信息。\n\n12. 保存所有页面，然后尝试在浏览器中加载表单的中间页面之一或最后一页。你应被重定向到第一页。在不填写任何字段的情况下点击“下一步”。系统将提示你填写\
  \ `first_name` 字段。填写必填字段并在每个页面点击“下一步”。最终页面上应显示结果，如图 11-5 所示。\n\n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fig5_HTML.jpg](img/332054_4_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5. 会话变量保留了来自多个页面的输入\n\n你可以在 `ch11` 文件夹中将你的代码与 `multiple_01_done.php`、`multiple_02_done.php`、`multiple_03_done.php`、`multiple_04_done.php`\
  \ 和 `multiform.php` 进行比对。\n\n这只是一个多页面表单的简单演示。在实际应用中，当必填字段留空时，你需要保留用户输入。`multiform.php`\
  \ 中的脚本可用于任何多页面表单，只需在表单提交后的第一页创建 `$_SESSION['formStarted']`，并在每个页面使用 `$required`、`$firstPage`、`$nextPage`\
  \ 和 `$submit`。使用 `$missing` 数组来处理未填写的必填字段。\n\n## 章节回顾\n\n如果你在开始阅读本书时对 PHP 知之甚少或一无所知，那么你已不再属于新手行列，而是正在以许多有用的方式利用\
  \ PHP 的强大功能。希望到现在为止，你已经开始意识到相同或相似的技术会反复出现。你不应只是复制代码，而应开始识别那些可以按需调整的技术，然后自行实践。\n\n\
  本书的其余部分将继续扩展你的知识，但引入了一个新因素：MySQL 关系数据库（以及它的替代品 MariaDB），这将把你的 PHP 技能提升到一个更高的水平。下一章将介绍\
  \ MySQL，并向你展示如何为后续章节进行设置。\n\n## 12. 数据库入门\n\n动态网站与数据库相结合后，将呈现出全新的面貌。从数据库提取内容可以让你以静态网站无法实现（即使不是不可能）的方式呈现内容。脑海中浮现的例子包括\
  \ [Amazon.com](http://amazon.com) 等在线商店、BBC（[www.bbcnews.com](http://www.bbcnews.com)）等新闻网站，以及\
  \ Google 和 Bing 等大型搜索引擎。数据库技术使这些网站能够呈现成千上万，甚至数百万个独特的页面。即使你的目标远没有那么宏大，数据库也可以相对轻松地增加你网站的丰富内容。\n\
  \nPHP 支持所有主流数据库，包括 Microsoft SQL Server、Oracle 和 PostgreSQL，但它最常与开源 MySQL 数据库结合使用。根据\
  \ DB-Engines 排名，截至 2019 年初，MySQL 已成为第二广泛使用的数据库，这一地位已保持多年。然而，围绕 MySQL 的未来存在争议，谷歌和维基百科已转而使用\
  \ MariaDB（排名第 15 位）。一些主要的 Linux 发行版也已用 MariaDB 取代了 MySQL。本章首先简要讨论这两个数据库之间竞争的影响。\n\
  \n在本章中，你将学习以下内容：\n\n* 了解数据库如何存储信息\n* 选择与数据库交互的图形界面\n* 创建用户帐户\n* 使用适当的数据类型定义数据库表\n\
  * 备份数据并将其传输到另一台服务器\n\n\n\n"
- '# MySQL 还是 MariaDB？


  MySQL 最初由瑞典的 MySQL AB 公司开发，是一款免费的开源数据库。它迅速在个人开发者中流行起来，并被维基百科和 BBC 新闻等大型企业采用。然而，MySQL
  AB 于 2008 年被 Sun Microsystems 收购，而 Sun 又在两年后被主要商业数据库供应商 Oracle 收购。许多人认为这威胁到了 MySQL
  作为免费开源数据库的持续生存。Oracle 公开表示：“MySQL 是 Oracle 完整、开放、集成战略中不可或缺的一部分。”但这并未打动 MySQL 的原始创建者之一
  Michael “Monty” Widenius，他指责 Oracle 移除了 MySQL 的功能，并且在修复安全问题时反应迟缓。


  由于 MySQL 代码是开源的，Widenius 将其分支出来创建了 MariaDB，并描述其为“MySQL 的增强型即插即用替代品”。此后，MariaDB 开始实现自身的新功能。尽管存在分歧，这两个数据库系统实际上几乎可以互换使用。MariaDB
  的可执行文件与 MySQL 同名（macOS 和 Linux 上为 `mysqld`，Windows 上为 `mysqld.exe`）。主权限表也名为 `mysql`，默认存储引擎自称为
  InnoDB，尽管它实际上是 InnoDB 的一个分支，名为 Percona XtraDB。


  就本书中的代码而言，使用 MariaDB 还是 MySQL 应该没有区别。MariaDB 能理解所有 MySQL 特定的 PHP 代码。它也得到了我将在此后章节中使用的
  phpMyAdmin 图形界面的支持。


  > **注**：为避免重复，除非特别提及 MariaDB，否则所有对 MySQL 的引用均同样适用于 MariaDB。


  ## 数据库如何存储信息


  关系型数据库（如 MySQL）中的所有数据都存储在表中，这与电子表格非常相似，信息按行和列组织。图 12-1 显示了本章稍后你将创建的数据库表，该表显示在 phpMyAdmin
  中。


  ![images/332054_4_En_12_Chapter/332054_4_En_12_Fig1_HTML.jpg](img/332054_4_En_12_Fig1_HTML.jpg)


  *图 12-1. 数据库表像电子表格一样以行和列存储信息*


  每个**列**都有一个名称（`image_id`、`filename` 和 `caption`），指明其存储的内容。行没有标签，但第一列（`image_id`）包含一个称为**主键**的唯一值，用于标识与该行关联的数据。每一行包含一个独立的**记录**，记录相关数据。行与列交汇处，即数据存储的位置，称为**字段**。例如，图
  12-1 中第三个记录的 `caption` 字段包含值“京都金阁寺”，该记录的主键是 3。


  > **注**：“字段”和“列”这两个术语经常互换使用，尤其是在旧版 phpMyAdmin 中。字段为一个记录保存一条信息，而列则包含所有记录的相同字段。


  ## 主键如何工作


  尽管图 12-1 显示 `image_id` 是从 1 到 8 的连续序列，但它们并非行号。图 12-2 显示了相同的表，但标题按字母顺序排序。图 12-1 中高亮显示的字段已移至第七行，但它仍然具有相同的
  `image_id` 和 `filename`。


  ![images/332054_4_En_12_Chapter/332054_4_En_12_Fig2_HTML.jpg](img/332054_4_En_12_Fig2_HTML.jpg)


  *图 12-2. 即使表以不同顺序排序，主键仍能标识行*


  尽管主键很少显示，但它标识了记录及其存储的所有数据。一旦知道记录的主键，你就可以更新它、删除它，或者用它来在单独的页面中显示数据。不要担心如何找到主键。使用**结构化查询语言**（SQL），即与所有主流数据库通信的标准方式，可以轻松完成。重要的是要记住为每条记录分配一个主键。


  > **提示**：有些人将 SQL 发音为“sequel”。其他人则逐个字母念作“ess-queue-ell”。MySQL 的官方发音是“My-ess-queue-ell”。


  - 主键不必是数字，但*它必须是唯一的*。

  - 产品编号是很好的主键。它们可能由数字、字母和其他字符组成，但始终是唯一的。社保号和员工 ID 号也是唯一的，但可能导致个人数据泄露，因为在检索或更新数据时，主键会附加到查询字符串中。

  - MySQL 可以自动为你生成主键。

  - 一旦分配了主键，它就不应重复，且永远不应更改。


  由于主键必须唯一，MySQL 在删除记录时通常不会重用该编号。虽然这会留下序列中的间隙，但这并不重要。主键的目的是标识记录。任何试图填补间隙的行为都会严重危及数据库的完整性。


  > **提示**：有些人希望移除序列中的间隙，以便跟踪表中的记录数。但正如你将在下一章中发现的，这并非必要。


  ## 用主键和外键链接表


  与电子表格不同，大多数数据库将数据存储在几个较小的表中，而不是一个巨大的表中。这可以防止重复和不一致。假设你正在构建一个你最爱语录的数据库。与其每次输入作者姓名，不如将作者姓名放在一个单独的表中，并在每条语录中存储作者主键的引用，这样效率更高。如图
  12-3 所示，左侧表中由 `author_id 32` 标识的每条记录都是威廉·莎士比亚的语录。


  ![images/332054_4_En_12_Chapter/332054_4_En_12_Fig3_HTML.jpg](img/332054_4_En_12_Fig3_HTML.jpg)


  *图 12-3. 外键用于链接存储在独立表中的信息*


  由于姓名只存储在一个地方，这保证了它始终拼写正确。而且，如果你确实犯了拼写错误，只需一次更正就能确保更改反映在整个数据库中。


  将一个表中的主键存储在另一个表中，被称为创建**外键**。使用外键链接不同表中的信息是关系型数据库最强大的特性之一。这在早期阶段也可能难以掌握，因此我们将在第
  17 章和第 18 章之前只使用单表，届时会详细讨论外键。与此同时，请牢记以下几点：


  - 当用作表的主键时，该值在列内必须唯一。因此，图 12-3 右侧表中的每个 `author_id` 仅使用一次。

  - 当用作外键时，可以多次引用同一个值。因此，`32` 在左侧表的 `author_id` 列中出现多次。




  '
- '# 将信息拆解为小块


  你可能已经注意到，图 12-3 右侧的表格为每位作者的**名**和**姓**分别设置了单独的列。这是关系型数据库的一条重要原则：*将复杂信息拆解为其组成部分，并分别存储每个部分。*


  决定拆分到什么程度并不总是那么容易。除了名和姓之外，你可能还希望为称呼（先生、太太、女士、博士等）以及中间名或首字母设置单独的列。地址最好拆分为街道、城镇、县、州、邮政编码等字段。虽然将信息拆分为小块可能有些繁琐，但你随时可以使用
  SQL 和/或 PHP 将它们重新组合起来。然而，一旦你拥有超过几十条记录，要尝试拆分存储在单个字段中的复杂信息，就会是一项艰巨的任务。


  '
- '# 良好数据库设计的检查点


  数据库设计没有所谓的*正确*方法——每个数据库都各不相同。不过，以下指南应该能为你指明正确方向：


  - 为表中的每条记录赋予一个唯一标识符（主键）。

  - 将每组相关数据放入其独立的表中。

  - 通过使用一个表中的主键作为其他表中的外键来交叉引用相关信息。

  - 在每个字段中仅存储一条信息。

  - 遵循 DRY 原则（不要重复自己）。


  在早期阶段，你很可能会犯下一些日后会后悔的设计错误。试着预见未来的需求，并让你的表结构保持灵活。你可以随时添加新表以应对新的需求。


  理论暂且讲到这里。让我们通过为第 5 章和第 6 章的日本之旅网站构建一个数据库，来探讨一些更实际的内容。


  '
- '# 使用图形界面


  与 MySQL 数据库交互的传统方式是通过命令提示符窗口或终端。但使用第三方图形界面（如 phpMyAdmin，一个基于浏览器的 MySQL 前端）要容易得多（见图
  12-4）。


  ![../images/332054_4_En_12_Chapter/332054_4_En_12_Fig4_HTML.jpg](img/332054_4_En_12_Fig4_HTML.jpg)


  *图 12-4. phpMyAdmin 是一个免费的 MySQL 图形界面，可在浏览器中运行*


  由于 phpMyAdmin (<http://www.phpmyadmin.net>) 随 XAMPP、MAMP 以及大多数其他免费的一体化软件包自动安装，因此本书选择了它作为用户界面。它易于使用，并具备设置和管理
  MySQL 数据库所需的所有基本功能。它适用于 Windows、Mac OS X 和 Linux。许多托管公司都将其作为 MySQL 的标准界面提供。


  如果你经常使用数据库，最终可能会想探索其他图形界面。其中一个值得关注的是 Navicat (<http://www.navicat.com/en/>)，这是一款付费产品，适用于
  Windows、macOS 和 Linux。Navicat Cloud 服务还允许你通过 iPhone 或 iPad 管理数据库。Navicat 在网络开发者中尤其受欢迎，因为它能够将数据库从远程服务器计划备份到你的本地计算机。Navicat
  for MySQL 同时支持 MySQL 和 MariaDB。


  ## 启动 phpMyAdmin


  如果你在 Windows 上运行 XAMPP，有三种方法可以启动 phpMyAdmin：


  - 在浏览器地址栏中输入 `http://localhost/phpMyAdmin/`。

  - 点击 XAMPP 控制面板中的 MySQL `Admin` 按钮。

  - 在 XAMPP 管理页面（`http://localhost/xampp/`）的 `Tools` 下点击 `phpMyAdmin` 链接。


  如果你在 macOS 上安装了 MAMP，请点击 MAMP 启动页面顶部菜单中的 `Tools` ➤ `phpMyAdmin`（点击 MAMP 控制小部件中的
  `Open start page`）。


  如果你手动安装了 phpMyAdmin，或者使用的是其他一体化软件包，请按照该软件包的说明操作，或者在浏览器地址栏中输入相应的地址（通常是 `http://localhost/phpmyadmin/`）。


  '
- '# 提示

  如果系统提示服务器无响应或套接字配置不正确，请确保 MySQL 服务器正在运行。


  如果你安装了 XAMPP，可能会看到一个要求输入用户名和密码的屏幕。如果是这样，请以 root 超级用户身份登录 phpMyAdmin。在用户名处输入 `root`，并使用你在设置
  XAMPP 时为 root 创建的密码。


  ### 警告

  在远程服务器上访问 phpMyAdmin 时，请始终使用安全连接（https）。任何在不安全连接上窃听的人都可能获得对你宝贵数据的控制权，进而窃取、破坏甚至完全删除数据。


  '
- '# 设置 phpsols 数据库


  在本地测试环境中，你可以在 MySQL 中创建的数据库数量没有限制，并且可以随意命名它们。我假设你正在本地测试环境中工作，因此将向你展示如何创建一个名为 `phpsols`
  的数据库，以及两个分别名为 `psread` 和 `pswrite` 的用户账户。


  #### 注意

  在共享托管环境中，你可能仅限于使用托管公司设置的一个数据库。如果你在远程服务器上进行测试，并且无法自由创建新的数据库和用户账户，请将托管公司分配给你的数据库名称和用户名分别替换
  `phpsols` 和 `pswrite`。


  ## MySQL 命名规则


  MySQL 对于数据库、表和列的基本命名规则如下：


  - 名称长度最多为 64 个字符。

  - 合法字符包括数字、字母、下划线和 `$`。

  - 名称可以以数字开头，但不能完全由数字组成。


  一些托管公司似乎对这些规则一无所知，会分配给客户端名称中包含一个或多个连字符（非法字符）的数据库。如果数据库、表或列的名称包含空格或非法字符，在 SQL 查询中必须始终用反引号（``
  ` ``）将其括起来。请注意，这不是单引号（`''`），而是一个单独的字符。在我的 Windows 键盘上，它直接位于 Tab 键上方。在我的 Mac 键盘上，它位于左
  Shift 键旁边，与波浪号（`~`）在同一个键上。


  在选择名称时，你可能会不小心选到 MySQL 众多保留字中的一个（<https://dev.mysql.com/doc/refman/8.0/en/keywords.html>），例如
  `date` 或 `time`。避免这种情况的一种技巧是使用复合词，例如 `arrival_date`、`arrival_time` 等。或者，用反引号将所有名称括起来。phpMyAdmin
  会自动执行此操作，但在 PHP 脚本中编写自己的 SQL 时，你需要手动执行此操作。


  #### 注意

  由于很多人使用过 `date`、`text`、`time` 和 `timestamp` 作为列名，MySQL 允许在不使用反引号的情况下使用它们。但是，你应该避免使用它们。这是一种不良实践，如果将来将数据迁移到不同的数据库系统，可能无法正常工作。


  ### 名称的大小写敏感性

  Windows 和 macOS 将 MySQL 名称视为不区分大小写。然而，Linux 和 Unix 服务器则区分大小写。为了避免在将数据库和 PHP 代码从本地计算机传输到远程服务器时出现问题，我强烈建议你仅在数据库、表和列名称中使用小写字母。当使用多个单词构建名称时，请用下划线连接它们。


  '
- "# 使用 phpMyAdmin 创建新数据库\n\n在 phpMyAdmin 中创建新数据库非常简单。\n\n\n\n#### 注意\n\n`phpMyAdmin`\
  \ 的发布周期较为频繁，用户界面时常会出现细微变化，偶尔也会有较大改动。以下说明及配套截图基于 `phpMyAdmin 4.8.5` 版本。虽然您所使用的版本可能与之存在差异，但基本操作流程应大致相同。\n\
  \n1. 启动 `phpMyAdmin`，在主窗口顶部选择 `数据库` 选项卡。\n\n2. 在 `创建数据库` 下方的第一个字段中输入新数据库的名称（`phpsols`）。字段右侧的下拉菜单用于设置数据库的**排序规则**。排序规则决定了数据的排序方式。如下方截图所示，我安装环境中的默认设置为\
  \ `latin1_swedish_ci`。这反映了 MySQL 的瑞典血统。英语使用相同的排序顺序。其中的 `ci` 表示排序不区分大小写。如果您使用的语言并非英语、瑞典语或芬兰语，请从下拉菜单中选择\
  \ `utf8mb4_unicode_ci`。此选项几乎支持所有人类语言，并能避免多字节字符引发的问题。然后点击 `创建`。\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figa_HTML.jpg](img/332054_4_En_12_Figa_HTML.jpg)\n\
  \n3. 屏幕上会短暂闪现在线确认数据库已创建成功的提示，随后出现的页面会引导您创建数据表：\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figb_HTML.jpg](img/332054_4_En_12_Figb_HTML.jpg)\n\
  \n4. 在新数据库中创建数据表之前，建议先为其创建用户帐户。请保持 `phpMyAdmin` 处于打开状态，因为您将在下一节中继续使用它。\n\n## 创建特定于数据库的用户帐户\n\
  \n新安装的 MySQL 通常只有一个注册用户——名为 “root” 的超级用户帐户，它拥有对一切内容的完全控制权。（XAMPP 还会创建一个名为 “pma”\
  \ 的用户帐户，`phpMyAdmin` 会使用它来启用本书未涉及的高级功能。）root 用户*绝不应*用于除顶级管理（例如创建和删除数据库、创建用户帐户、导出和导入数据）之外的任何其他操作。每个独立的数据库都应至少拥有一个——最好是两个——权限有限的专用用户帐户。\n\
  \n当您将数据库部署上线时，应授予用户所需的最少权限，并且不要给予更多。有四个重要的权限——均以对应的 SQL 命令命名：\n\n* `SELECT`：从数据库表中检索记录\n\
  * `INSERT`：向数据库中插入记录\n* `UPDATE`：更改现有记录\n* `DELETE`：删除记录（但不删除数据表或数据库，后者对应的命令是 `DROP`）\n\
  \n大多数情况下，访问者只需检索信息，因此 `psread` 用户帐户将仅拥有 `SELECT` 权限，属于只读帐户。然而，对于用户注册或站点管理，您则需要全部四个权限。这些权限将授予\
  \ `pswrite` 帐户。\n\n## 授予用户权限\n\n1. 在 `phpMyAdmin` 中，点击屏幕左上角的小房子图标返回主屏幕。然后点击 `用户帐户`\
  \ 选项卡（在旧版 `phpMyAdmin` 中，它被称为 `用户`）。\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figc_HTML.jpg](img/332054_4_En_12_Figc_HTML.jpg)\n\
  \n2. 在 `用户帐户概览` 页面上，点击页面中部的 `添加用户帐户` 链接。\n\n3. 在打开的页面中，于 `用户名` 字段中输入 `pswrite`（或您想要创建的用户帐户名称）。从\
  \ `主机名` 下拉菜单中选择 `本地`。这会在旁边的字段中自动填入 `localhost`。选择此选项允许 `pswrite` 用户仅从同一台计算机连接到 MySQL。然后在\
  \ `密码` 字段中输入密码，并在 `重新输入` 字段中再次输入以确认。\n\n\n\n**注意** 在本书的示例文件中，我使用了 `0Ch@Nom1$u` 作为密码。MySQL\
  \ 密码是区分大小写的。\n\n3.  在 `Login Information` 表格下方，是标有 `Database for user account`（用户账户数据库）和\
  \ `Global privileges`（全局权限）的区域。忽略这两部分。向下滚动到页面底部，点击 `Go` 按钮。\n\n4.  页面将确认用户已创建，并提供编辑用户权限的选项。点击\
  \ `Edit privileges` 上方的 `Database` 按钮：\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figd_HTML.jpg](img/332054_4_En_12_Figd_HTML.jpg)\n\
  \n1.  在 `Database-specific privileges`（数据库特定权限）下，从列表中选择 `phpsols`（如有必要，激活标有 `Add\
  \ privileges on the following database(s)` 的下拉菜单），然后点击 `Go`。\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Fige_HTML.jpg](img/332054_4_En_12_Fige_HTML.jpg)\n\
  \n注意 MySQL 有三个默认数据库：`information_schema`（一个只读的虚拟数据库，包含同一服务器上所有其他数据库的详细信息）；`mysql`（包含所有用户账户和权限的详细信息）；以及\
  \ `test`（空的）。除非你确定自己在做什么，否则不应直接编辑 `mysql` 数据库。\n\n1.  下一个屏幕允许你仅为此用户设置对 `phpsols`\
  \ 数据库的权限。你需要让 `pswrite` 拥有之前列出的全部四个权限，因此请勾选 `SELECT`、`INSERT`、`UPDATE` 和 `DELETE`\
  \ 旁边的复选框。\n\n如果将鼠标悬停在每个选项上，phpMyAdmin 会显示一个工具提示，描述该选项的用途，如图所示。选择这四个权限后，点击 `Go`。\n\
  \n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figf_HTML.jpg](img/332054_4_En_12_Figf_HTML.jpg)\n\
  \n警告 phpMyAdmin 的许多屏幕中有多个 `Go` 按钮。请始终点击包含你要设置的选项所在部分的底部或旁边的按钮。\n\n1.  phpMyAdmin\
  \ 会确认 `pswrite` 用户账户的权限已更新；页面再次显示 `Database-specific privileges` 表格，以便你进行任何修改。点击页面顶部的\
  \ `User accounts` 标签，返回 `User accounts overview`（用户账户概览）。\n\n2.  点击 `Add user account`（添加用户账户），重复步骤\
  \ 3 到 8，创建第二个名为 `psread` 的用户账户。此用户的权限将受到更多限制，因此在执行步骤 7 时，只需勾选 `SELECT` 选项。在示例文件中，`psread`\
  \ 使用的密码是 `K1yoMizu^dera`。\n\n## 创建数据库表\n\n现在你已有一个数据库和专用的用户账户，可以开始创建表了。让我们首先创建一个存储图片详细信息的表，如图\
  \ 12-1 本章开头所示。在开始输入数据之前，你需要定义表结构。这包括确定以下内容：\n\n*   表的名称\n*   它将包含多少列\n*   每列的名称\n\
  *   每列将存储什么类型的数据\n*   列是否必须在每个字段中都包含数据\n*   哪一列包含表的主键\n\n如果查看图 12-1，你会看到该表包含三列：`image_id`（主键）、`filename`\
  \ 和 `caption`。由于它包含图片细节，因此“images”是一个适合用作表名的好名字。存储文件名而不存储说明没什么意义，因此每列都必须包含数据。太好了！除了数据类型，所有决策都已做出。我将在过程中解释数据类型。\n\
  \n### 定义 Images 表\n\n以下说明展示了如何在 phpMyAdmin 中定义表。如果你更愿意使用 Navicat 或其他 MySQL 用户界面，请使用表\
  \ 12-1 中的设置。\n\n**表 12-1.** `images` 表的设置\n\n\n\n## 使用 phpMyAdmin 创建表\n\n| 字段 |\
  \ 类型 | 长度/值 | 属性 | 空值 | 索引 | A_I |\n| --- | --- | --- | --- | --- | --- | --- |\n\
  | `image_id` | `INT` | | `UNSIGNED` | 未选中 | `PRIMARY` | 已选中 |\n| `filename` | `VARCHAR`\
  \ | `25` | | 未选中 | | |\n| `caption` | `VARCHAR` | `120` | | 未选中 | | |\n\n1.  启动\
  \ phpMyAdmin（如果尚未打开），从屏幕左侧的数据库列表中选择 `phpsols`。这将打开 `Structure` 选项卡，并报告数据库中未找到任何表。\n\
  2.  在 `Create table` 部分，在 `Name` 字段中输入新表的名称（`images`），并在 `Number of columns` 字段中输入\
  \ `3`。然后点击 `Go` 按钮。\n3.  下一个屏幕用于定义表。这里有很多选项，但并非所有都需要填写。表 12-1 列出了 `images` 表的设置。\n\
  \n    第一列 `image_id` 被定义为 `INT` 类型，代表整数。其属性设置为 `UNSIGNED`，这意味着只允许正数。当你从索引下拉菜单中选择\
  \ `PRIMARY` 时，phpMyAdmin 会打开一个模式面板，你可以在其中指定高级选项。接受默认设置，然后点击 `Go` 关闭面板。接着，选中 `A_I`（`AUTO_INCREMENT`）复选框。这告诉\
  \ MySQL，每当插入新记录时，自动在该列插入下一个可用数字（从 1 开始）。\n    下一列 `filename` 被定义为 `VARCHAR` 类型，长度为\
  \ `25`。这意味着它最多接受 25 个字符的文本。\n    最后一列 `caption` 也是 `VARCHAR` 类型，长度为 `120`，因此它最多接受\
  \ 120 个字符的文本。\n    所有列的 `Null` 复选框均未选中，因此它们必须始终包含内容。不过，这个“内容”可以是一个空字符串。我将在本章后面的“在\
  \ MySQL 中选择正确的数据类型”部分更详细地描述列类型。\n    以下截图显示了在 phpMyAdmin 中设置完这些选项后的状态（`A_I` 右侧的列已被省略，因为它们无需填写）：\n\
  \    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figg_HTML.jpg](img/332054_4_En_12_Figg_HTML.jpg)\n\
  \    屏幕底部有一个 `Storage Engine`（存储引擎）选项。这决定了数据库文件内部存储的格式。自 MySQL 5.5 以来，InnoDB 一直是默认引擎。在此之前，MyISAM\
  \ 是默认引擎。我将在第 17 章中解释这些存储引擎之间的差异。在此之前，请使用 InnoDB。从一个存储引擎转换到另一个非常简单。\n    完成后，点击屏幕底部的\
  \ `Save` 按钮。\n\n**提示**  \n如果你点击的是 `Go` 而不是 `Save`，phpMyAdmin 会添加一个额外的列供你定义。如果发生这种情况，只需点击\
  \ `Save`。只要你不向字段中输入值，phpMyAdmin 就会忽略这个额外的列。\n\n1.  下一个屏幕列出 `images` 表，并显示一系列你可以对该表执行的操作。在\
  \ `Action` 下，点击 `Structure`，或者点击屏幕顶部的 `Structure` 选项卡。这会显示你刚刚创建的表的详细信息。\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figh_HTML.jpg](img/332054_4_En_12_Figh_HTML.jpg)\n\
  `image_id` 右侧的**金色钥匙**图标表示它是该表的主键。要编辑任何设置，请点击相应行的 `Change`。这会打开之前的屏幕并允许你更改值。\n\n\
  **提示**  \n如果你完全搞砸了并想重新开始，请点击屏幕顶部的 `Operations` 选项卡。然后，在 `Delete data or table` 部分，点击\
  \ `Delete the table (DROP)` 并确认你想要删除该表。（在 SQL 中，*delete* 仅指记录。而删除列、表或数据库则用 *drop*。）\n\
  \n## 向表中插入记录\n\n既然你已经有了表，就需要向其中放入一些数据。最终，你需要使用 HTML 表单、PHP 和 SQL 来构建自己的内容管理系统，但使用\
  \ phpMyAdmin 是快速简便的方法。\n\n### 使用 phpMyAdmin 手动插入记录\n\n以下说明演示了如何通过 phpMyAdmin 界面将记录添加到\
  \ `images` 表。\n\n1.  如果 phpMyAdmin 仍在显示上一节末尾的 `images` 表结构，请跳到步骤 2。否则，启动 phpMyAdmin\
  \ 并从左侧列表中选择 `phpsols` 数据库。然后，点击 `images` 右侧的 `Structure`，如下截图所示：\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figi_HTML.jpg](img/332054_4_En_12_Figi_HTML.jpg)\n\
  \n**提示**  \n主框架顶部的面包屑导航提供了页面头部各选项卡的上下文。前面截图中左上角的 `Structure` 选项卡是指 `phpsols` 数据库的结构。要访问单个表的结构，请点击该表名称旁边的\
  \ `Structure` 链接。\n\n1.  点击页面顶部中央的 `Insert` 选项卡。这将显示以下屏幕，供你插入多达两条记录：\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figj_HTML.jpg](img/332054_4_En_12_Figj_HTML.jpg)\n\
  \n1.  表单显示了每个列的名称和详细信息。你可以忽略 `Function` 字段。MySQL 拥有大量函数，你可以将它们应用于存储在表中的值。你将在接下来的章节中了解更多有关它们的信息。`Value`\
  \ 字段是你输入要插入到表中的数据的地方。\n\n    由于你已经将 `image_id` 定义为 `AUTO_INCREMENT`，MySQL 会自动插入下一个可用数字。因此，你*必须*将\
  \ `image_id` 的 `Value` 字段留空。按如下方式填写接下来的两个 `Value` 字段：\n\n    *   `filename`：`basin.jpg`\n\
  \    *   `caption`：`京都龙安寺水盆`\n\n2.  在第二个表单中，将 `image_id` 的 `Value` 字段留空，并按如下方式填写接下来的两个字段：\n\
  \n    *   `filename`：`fountains.jpg`\n    *   `caption`：`东京市中心喷泉`\n\n    通常，当你向第二个表单添加值时，`Ignore`\
  \ 复选框会自动取消选中，但如果需要，请手动取消选中。\n\n1.  点击第二个表单底部的 `Go` 按钮。用于插入记录的 SQL 语句将显示在页面顶部。我将在剩余章节中解释基本的\
  \ SQL 命令，但研究 phpMyAdmin 显示的 SQL 是学习如何构建自己的查询的好方法。SQL 在很大程度上基于人类语言，因此并不难学。\n\n2.\
  \  点击页面左上角的 `Browse` 选项卡。你现在应该看到 `images` 表中的前两条条目，如下所示：\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figk_HTML.jpg](img/332054_4_En_12_Figk_HTML.jpg)\n\
  \n如你所见，MySQL 已在 `image_id` 字段中插入 `1` 和 `2`。你可以继续输入其余六张图像的详细信息，但让我们用一个包含所有必要数据的 SQL\
  \ 文件来加快速度。\n\n### 从 SQL 文件加载图像记录\n\n由于 `images` 表的主键已设置为 `AUTO_INCREMENT`，因此需要删除该表及其所有数据。SQL\
  \ 文件会自动执行此操作，并从头开始构建表。以下说明假定 phpMyAdmin 已打开到上一节第 6 步的页面。\n\n\n\n1.  如果你不介意覆盖`images`表中的数据，请跳到步骤\
  \ 2。但是，如果你已输入不想丢失的数据，请将数据复制到另一个表中。点击页面顶部的`Operations`选项卡（根据屏幕大小，`Operations`可能隐藏在最右侧的`More`中），在`Copy\
  \ table to (database.table)`部分的空白字段中输入新表的名称，然后点击`Go`。以下截图显示了将`phpsols`数据库中的`images`表的结构和数据复制到`images_backup`的设置。\n\
  \n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figl_HTML.jpg](img/332054_4_En_12_Figl_HTML.jpg)\n\
  \n点击`Go`后，您会看到已复制表的确认信息。页面顶部的面包屑导航指示`phpMyAdmin`仍停留在`images`表中，因此即使屏幕上显示的是另一个页面，您也可以继续执行步骤\
  \ 2。\n\n2.  点击页面顶部的`Import`选项卡。在下一个屏幕中，点击`File to import`中的`Browse`（或`Choose File`）按钮，然后导航至`ch12`文件夹中的`images.sql`。将所有选项保留为默认设置，并点击页面底部的`Go`。\n\
  \n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figm_HTML.jpg](img/332054_4_En_12_Figm_HTML.jpg)\n\
  \n3.  `phpMyAdmin`会删除原始表，创建一个新版本，并插入所有记录。当看到文件已导入的确认信息后，点击页面左上角的`Browse`按钮。现在您应该能看到与本章开头图\
  \ 12-1 中相同的数据。\n\n如果使用文本编辑器打开`images.sql`，您会看到它包含创建`images`表并填充数据的 SQL 命令。该表的构建方式如下：\n\
  \n```\nDROP TABLE IF EXISTS `images`;\nCREATE TABLE `images` (\n`image_id` int(10)\
  \ unsigned NOT NULL,\n`filename` varchar(25) NOT NULL,\n`caption` varchar(120) NOT\
  \ NULL\n) ENGINE=InnoDB  DEFAULT CHARSET=latin1;\n```\n\n设置主键和自增（`auto_increment`）的命令位于文件末尾。\n\
  像这样从 SQL 文件导入数据，就是将数据从本地测试环境传输到网站所在远程服务器的方式。假设您的托管公司提供了`phpMyAdmin`来管理远程数据库，那么要传输数据，您只需启动远程服务器上的`phpMyAdmin`，点击`Import`选项卡，选择本地计算机上的\
  \ SQL 文件，然后点击`Go`即可。下一节将描述如何创建 SQL 文件。\n\n## 创建用于备份和数据传输的 SQL 文件\n\n`MySQL`不会将数据库存储为可以简单上传到网站的单个文件。即使您找到了正确的文件，除非`MySQL`服务器已关闭，否则很可能会损坏它们。无论如何，大多数托管公司都不允许您上传原始文件，因为这也意味着要关闭他们的服务器，给每个人带来极大的不便。\n\
  \n不过，将数据库从一个服务器迁移到另一个服务器是很容易的。它只需要创建数据的备份**转储**（`dump`），然后使用`phpMyAdmin`或任何其他数据库管理程序将其加载到另一个数据库中。转储文件是一个文本文件，包含填充单个表甚至整个数据库所需的所有\
  \ SQL 命令。`phpMyAdmin`可以创建整个`MySQL`服务器、单个数据库、选定表或单个表的备份。\n\n> **提示**  \n> 在您准备好将数据传输到另一个服务器或创建备份之前，不需要阅读如何创建转储文件的详细信息。\n\
  \n为简单起见，以下说明仅展示如何备份单个数据库。\n\n1.  在`phpMyAdmin`中，从左侧列表中选择`phpsols`数据库。如果已选择了该数据库，请点击屏幕顶部的`Database:\
  \ phpsols`面包屑链接，如下所示：\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Fign_HTML.jpg](img/332054_4_En_12_Fign_HTML.jpg)\n\
  \n2.  从屏幕顶部的选项卡中选择`Export`。\n\n3.  有两种导出方式：`Quick`（快速）和`Custom`（自定义）。`Quick`方式只有一个用于导出文件格式的选项。默认为`SQL`，因此您只需点击`Go`，`phpMyAdmin`就会创建\
  \ SQL 转储文件并将其保存到浏览器的默认`Downloads`文件夹中。该文件与数据库同名，因此对于`phpsols`数据库，文件名为`phpsols.sql`。\n\
  \n4.  `Quick`方式适用于导出少量数据，但通常您需要对导出选项有更多控制；请选择`Custom`单选按钮。这里有很多选项，让我们逐个部分地看看。\n\n\
  5.  `Format`部分默认选择`SQL`，但也提供了一系列其他格式，包括`CSV`、`JSON`和`XML`。\n\n6.  `Table(s)`部分列出了数据库中的所有表。默认情况下，所有表都被选中，但您可以通过取消选中不需要的选项复选框来选择要导出的表。在下面的截图中，只选择了`images`表的结构和数据，因此不会导出`images_backup`。\n\
  \n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figo_HTML.jpg](img/332054_4_En_12_Figo_HTML.jpg)\n\
  \n> **提示**  \n> 备份单个表而不是整个数据库通常是个好主意，因为大多数`PHP`服务器被配置为将上传限制在 2 MB。如下一步所述，压缩转储文件也有助于解决大小限制问题。\n\
  \n7.  `Output`部分有几个有用的选项。\n\n选中标记为`Rename exported databases/tables/columns`的复选框会启动一个模态面板，您可以在其中指定新名称。\n\
  \n`Use LOCK TABLES statement`复选框会添加命令，以防止在转储文件用于导入数据和/或结构时，其他人插入、更新或删除记录。\n\n还有一些单选按钮，让您可以选择将\
  \ SQL 转储保存到文件（这是默认选项）或将输出显示为文本。如果您想在创建文件之前检查生成的 SQL，将输出显示为文本会很有用。\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figp_HTML.jpg](img/332054_4_En_12_Figp_HTML.jpg)\n\
  \n`File name template`包含位于`@`标记之间的值。这将根据服务器、数据库或表自动生成文件名。一个非常酷的功能是，您可以使用`PHP strftime()`格式化字符（参见[`https://secure.php.net/manual/en/function.strftime.php`](https://secure.php.net/manual/en/function.strftime.php)）来增强模板。例如，您可以就在文件扩展名之前自动将当前日期添加到文件名中，如下所示：\n\
  \n```\n@DATABASE@_%Y-%m-%d\n```\n\n`Character set of the file`的默认值是`utf-8`。仅当您的数据以特定区域格式存储时，才需要更改此项。\n\
  \n默认情况下，转储文件不会被压缩，但下拉菜单提供了使用`zip`、`gzip`或`bzip`压缩的选项。这可以大大减小转储文件的大小，从而加快数据传输速度。导入压缩文件时，`phpMyAdmin`会自动检测压缩类型并解压。\n\
  \n最后一个选项允许您跳过大于指定 MB 数的文件。\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵守您提供的注意事项，将给定的英文文本（已内嵌在您提供的内容中）翻译成中文。\n\
  \n\n2. 在`Format-specific options`中，选项取决于步骤 5 中选择的格式。对于 SQL，你可以选择在转储文件中显示注释，并将导出内容包含在事务中。使用事务的价值在于，如果因错误导致导入中断，数据库会回滚到之前的状态。\n\
  \n其他选项包括禁用外键检查、将视图导出为表以及导出元数据。最后，还可以选择最大化与不同数据库系统或旧版 MySQL 的兼容性。通常，该值应设置为默认值：`NONE`。\n\
  \n3. `Object creation options`部分允许你微调用于创建数据库和表的 SQL。以下截图显示了默认设置。\n\n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figq_HTML.jpg](img/332054_4_En_12_Figq_HTML.jpg)\n\
  \n创建备份时，通常建议选中`Add DROP TABLE / VIEW / PROCEDURE / FUNCTION / EVENT / TRIGGER statement`复选框，因为备份通常用于替换已损坏的现有数据。\n\
  \n最后一个复选框默认选中，它会将表和列名用反引号（backticks）括起来，以避免名称中包含无效字符或使用保留字时出现问题。建议始终保留此项选中状态。\n\n\
  4. `Data creation options`部分控制数据如何插入到表中。大多数情况下，默认设置即可。不过，你可能对修改前四个选项感兴趣，如下截图所示。\n\
  \n![../images/332054_4_En_12_Chapter/332054_4_En_12_Figr_HTML.jpg](img/332054_4_En_12_Figr_HTML.jpg)\n\
  \n第一个复选框允许你在插入数据前清空表。如果你想替换现有数据（例如数据已损坏），这会很有用。\n\n另外两个复选框会影响`INSERT`命令的执行方式。`INSERT\
  \ DELAYED`不适用于默认的`InnoDB`表。此外，从 MySQL 5.6.6 开始已弃用它，因此最好避免使用。\n\n`INSERT IGNORE`会跳过错误，例如主键重复。就个人而言，我认为最好能收到错误警报，因此不推荐使用它。\n\
  \n标记为`Function to use when dumping data`的下拉菜单允许你选择`INSERT`、`UPDATE`或`REPLACE`。默认使用`INSERT`插入新记录。如果选择`UPDATE`，则仅更新现有记录。`REPLACE`会在必要时更新，并在记录不存在时插入新记录。\n\
  \n5. 完成所有选择后，点击页面底部的`Go`。现在，你拥有一个备份，可用于将数据库内容迁移到另一台服务器。\n\n**提示** 默认情况下，由 phpMyAdmin\
  \ 创建的文件仅包含用于创建和填充数据库表的 SQL 命令。除非你选择自定义选项，否则它不包含创建数据库的命令。这意味着你可以将表导入任何数据库，而不必与本地测试环境中的数据库同名。\n\
  \n选择 MySQL 中的正确数据类型\n当为`image_id`列选择`Type`时，你可能会感到有些震惊。phpMyAdmin 列出了所有可用数据类型——在\
  \ MySQL 8 和 MariaDB 10 中有超过 40 种。为了避免不必要的细节让你困惑，我将仅解释最常用的数据类型。你可以在 MySQL 文档中找到所有数据类型的完整详情，网址为：[`https://dev.mysql.com/doc/refman/8.0/en/data-types.html`](https://dev.mysql.com/doc/refman/8.0/en/data-types.html)。\n\
  \n存储文本\n\n主要文本数据类型之间的区别归结为单个字段中可存储的最大字符数、对尾随空格的处理，以及是否可以设置默认值。\n\n*   `CHAR`：定长字符串。你必须在`Length/Values`字段中指定所需长度。最大允许值为\
  \ 255。在内部，字符串会用空格右填充到指定长度，但在检索值时尾随空格会被去除。你可以定义默认值。\n*   `VARCHAR`：可变长字符串。你必须指定计划使用的最大字符数（在\
  \ phpMyAdmin 中，在`Length/Values`字段中输入该数字）。最大字符数为 65,535。如果存储的字符串带有尾随空格，检索时会保留这些空格。接受默认值。\n\
  *   `TEXT`：存储最多 65,535 个字符的文本（大约比本章篇幅长 50%）。不能定义默认值。\n\n`TEXT`很方便，因为你不需要指定最大大小（实际上，你也不能指定）。尽管`VARCHAR`和`TEXT`的最大大小都是\
  \ 65,535 个字符，但有效大小会更少，因为一行中所有列可存储的最大数据量是 65,535 字节。\n\n**提示**\n保持简单：对于短文本项使用`VARCHAR`，对于较长文本项使用`TEXT`。`VARCHAR`和`TEXT`列仅占用存储输入值所需的磁盘空间。`CHAR`列始终分配声明长度所需的全部空间，即使为空也是如此。\n\
  \n存储数字\n\n最常用的数字列类型如下：\n\n*   `INT`：介于-2,147,483,648 和 2,147,483,647 之间的任何整数（整数）。如果列声明为`UNSIGNED`，则范围是\
  \ 0 到 4,294,967,295。\n*   `FLOAT`：浮点数。你可以选择指定两个以逗号分隔的数字来限制范围。第一个数字指定最大位数，第二个数字指定小数点后应有多少位。由于\
  \ PHP 会在计算后格式化数字，我建议使用不带可选参数的`FLOAT`。\n*   `DECIMAL`：带小数的数字；小数点后包含固定位数。定义表时，你需要指定最大位数以及小数点后应有多少位。在\
  \ phpMyAdmin 中，在`Length/Values`字段中输入以逗号分隔的数字。例如，`6,2`允许-9999.99 到 9999.99 范围内的数字。如果不指定大小，当值存储在此类型列中时，小数部分会被截断。\n\
  \n`FLOAT`和`DECIMAL`的区别在于精度。浮点数被视为近似值，容易受到舍入误差的影响（详细说明请参阅[`https://dev.mysql.com/doc/refman/8.0/en/problems-with-float.html`](https://dev.mysql.com/doc/refman/8.0/en/problems-with-float.html)）。请使用`DECIMAL`存储货币。\n\
  \n**注意**\n不要使用逗号或空格作为千位分隔符。除数字外，数字中仅允许使用负号（-）和小数点（.）。\n\n存储日期和时间\n\nMySQL 仅以一种格式存储日期：`YYYY-MM-DD`。这是\
  \ ISO（国际标准化组织）批准的标准，避免了不同国家惯例中固有的歧义。我将在第 16 章中回到日期主题。最重要的日期和时间列类型如下：\n\n*   `DATE`：以`YYYY-MM-DD`格式存储的日期。范围是`1000-01-01`到`9999-12-31`。\n\
  *   `DATETIME`：组合的日期和时间，以`YYYY-MM-DD HH:MM:SS`格式显示。\n*   `TIMESTAMP`：时间戳（通常由计算机自动生成）。合法值范围从\
  \ 1970 年初到 2038 年 1 月中旬。\n\n\n\n### 警告\n\n**警告**：MySQL 的时间戳采用与 `DATETIME` 相同的格式，这意味着它们与基于\
  \ 1970 年 1 月 1 日以来秒数的 Unix 和 PHP 时间戳不兼容。切勿混用。\n\n## 存储预定义列表\n\nMySQL 允许存储两种可被视为数据库版单选按钮和复选框状态的预定义列表：\n\
  \n- `ENUM`：此列类型从预定义列表中存储单个选项，例如“是、否、不知道”或“100–110 V、220–240 V”。预定义列表最多可存储的项目数量令人难以置信——高达\
  \ 65,535 个——这称得上是一个庞大的单选按钮组！\n\n- `SET`：此列类型从预定义列表中存储零个或多个选项。该列表最多可容纳 64 个选项。\n\n\
  尽管 `ENUM` 相当有用，但 `SET` 往往不那么有用，这主要是因为其违反了每个字段只存储一条信息的原则。`SET` 适用的场景包括记录汽车的可选附加配置或调查问卷中的多选答案。\n\
  \n## 存储二进制数据\n\n存储图像等二进制数据并非好主意。它会使数据库变得臃肿，而且无法直接从数据库中显示图像。不过，以下列类型是为二进制数据设计的：\n\
  \n- `TINYBLOB`：最大 255 字节\n- `BLOB`：最大 64 KB\n- `MEDIUMBLOB`：最大 16 MB\n- `LONGBLOB`：最大\
  \ 4 GB\n\n尽管名字如此奇特，但发现 `BLOB` 代表**二进制大对象**（**binary large object**）时，难免会感到有些失望。\n\
  \n## 章节回顾\n\n本章大部分内容致力于理论，阐述了良好数据库设计的基本原则。你需要仔细规划数据库结构，将重复信息移至单独的表中，而不是像电子表格那样将所有信息都塞进一个巨大的表里。只要为表中的每条记录赋予一个唯一标识符（即主键），你就能跟踪信息，并通过外键将其与其他表中的相关记录关联起来。外键的概念起初可能难以理解，但在阅读完本书后，你就能豁然开朗。\n\
  \n你还学习了如何创建具有有限权限的 MySQL 用户账户，以及如何定义表并使用 SQL 文件导入和导出数据。下一章中，你将使用 PHP 连接到 `phpsols`\
  \ 数据库，以显示 `images` 表中存储的数据。\n\n---\n\n"
- "# 13. 使用 PHP 和 SQL 连接数据库\n\nPHP 7 提供了两种连接并与 MySQL 数据库交互的方式：MySQL 改进版（`MySQLi`）和\
  \ PHP 数据对象（`PDO`）。选择哪种方式至关重要，因为它们使用不兼容的代码。你不能在同一数据库连接中混用它们。同样重要的是，不要将 `MySQLi` 与原始\
  \ MySQL 扩展混淆，后者在 PHP 7 中已不再支持。大多数情况下，`MySQLi` 函数名称唯一的区别是多了一个字母 *I*（例如，`mysqli_query()`\
  \ 替代了 `mysql_query()`）。然而，参数的顺序通常不同，因此转换旧脚本不仅仅是在函数名中插入一个 *I* 那么简单。\n\n顾名思义，`MySQLi`\
  \ 是专门为与 MySQL 配合使用而设计的。它也与 MariaDB 完全兼容。另一方面，`PDO` 是与数据库系统无关的。至少理论上，你只需更改几行 PHP\
  \ 代码，就能将网站从 MySQL 切换到 Microsoft SQL Server 或其他数据库系统。但在实践中，你通常需要至少重写部分 SQL 查询，因为每个数据库供应商都会在标准\
  \ SQL 之上添加自定义函数。\n\n我个人偏好使用 `PDO`；但为了内容全面，其余章节将同时介绍 `MySQLi` 和 `PDO`。如果你只想专注于其中之一，忽略与另一种相关的部分即可。虽然你使用\
  \ PHP 连接数据库并存储结果，但数据库查询需要用 SQL 编写。本章教你检索表中存储信息的基础知识。\n\n在本章中，我们将涵盖以下内容：\n\n- 使用\
  \ `MySQLi` 和 `PDO` 连接到 MySQL 和 MariaDB\n- 统计表中的记录数\n- 使用 `SELECT` 查询检索数据并将其显示在网页上\n\
  - 使用预处理语句和其他技术确保数据安全\n\n## 检查远程服务器设置\n\n`XAMPP` 和 `MAMP` 都支持 `MySQLi` 和 `PDO`，但你需要检查远程服务器的\
  \ PHP 配置以验证其支持程度。在你的远程服务器上运行 `phpinfo()`，向下滚动配置页面，查找以下部分。它们是按字母顺序列出的，因此你需要向下滚动很长一段距离才能找到。\n\
  \n![images/332054_4_En_13_Chapter/332054_4_En_13_Figa_HTML.jpg](img/332054_4_En_13_Figa_HTML.jpg)\n\
  \n所有托管公司都应该拥有第一个部分（`mysqli`）。如果只列出了 `mysql`（不带最后的 *I*），说明你的服务器版本已过时，存在危险。请尽快让你的托管公司为你迁移到运行新版\
  \ PHP 7.x 的服务器上（你可以在 [`php.net/supported-versions.php`](https://php.net/supported-versions.php)\
  \ 查看当前支持的 PHP 版本）。如果你打算使用 `PDO`，你不仅需要检查 `PDO` 是否已启用，还必须确保列出了 `pdo_mysql`。`PDO` 需要针对每种数据库类型使用不同的驱动程序。\n\
  \n## PHP 如何与数据库通信\n\n无论你使用 `MySQLi` 还是 `PDO`，流程总是遵循以下顺序：\n\n1.  使用主机名、用户名、密码和数据库名连接到数据库。\n\
  2.  准备一个 SQL 查询。\n3.  执行查询并保存结果。\n4.  从结果中提取数据（通常使用循环）。\n\n\n\n用户名和密码是你在第 12 章创建或由托管公司提供的账户信息。那么主机名呢？在本地测试环境中，主机名是`localhost`。令人惊讶的是，在远程服务器上它通常也是`localhost`。这是因为在很多情况下，数据库服务器与你的网站位于同一台服务器上。换句话说，显示页面的\
  \ Web 服务器和数据库服务器是相互本地的。然而，如果数据库服务器位于另一台机器上，你的托管公司会告知你需要使用的地址。重点是主机名*通常不*等于你网站的域名。\n\
  \n让我们快速看看如何使用每种方法连接数据库。\n\n## 使用 MySQL 改进版扩展连接\n\n`MySQLi`有两种接口：过程式和面向对象式。过程式接口旨在简化从原始\
  \ MySQL 函数的过渡。由于面向对象版本更简洁，这里采用后者。\n\n要连接 MySQL 或 MariaDB，你需要向构造函数传递四个参数来创建`mysqli`对象：主机名、用户名、密码和数据库名。以下是连接`phpsols`数据库的方式：\n\
  \n```php\n$conn = new mysqli($hostname, $username, $password, 'phpsols');\n```\n\
  \n这将连接对象存储为`$conn`。如果你的数据库服务器使用非标准端口，你需要将端口号作为第五个参数传递给`mysqli`构造函数。\n\n**提示**：MAMP\
  \ 使用套接字连接 MySQL，即使 MySQL 监听端口 8889，也无需添加端口号。这同时适用于`MySQLi`和`PDO`。\n\n## 使用 PDO 连接\n\
  \n`PDO`需要略微不同的方法。最重要的区别是：如果连接失败，`PDO`会抛出异常。如果你不捕获异常，调试信息会显示所有连接详情，包括你的用户名和密码。因此，你需要将代码包裹在`try`块中并捕获异常，以防止敏感信息泄露。\n\
  \n传递给`PDO`构造函数的第一个参数是**数据源名称(DSN)**。这是一个字符串，由`PDO`驱动名称后跟冒号，再跟`PDO`驱动特定的连接详情组成。\n\
  \n要连接 MySQL 或 MariaDB，DSN 需采用以下格式：\n\n```\n'mysql:host=hostname;dbname=databaseName'\n\
  ```\n\n如果你的数据库服务器使用非标准端口，DSN 还应包含端口号，如下所示：\n\n```\n'mysql:host=hostname;port=portNumber;dbname=databaseName'\n\
  ```\n\n在 DSN 之后，你将用户名和密码传递给`PDO()`构造函数。因此连接`phpsols`数据库的代码如下：\n\n```php\ntry {\n\
  $conn = new PDO(\"mysql:host=$hostname;dbname=phpsols\", $username, $password);\n\
  } catch (PDOException $e) {\necho $e->getMessage();\n}\n```\n\n使用`echo`显示异常生成的消息在测试阶段是可以接受的，但在将脚本部署到实际网站时，你需要将用户重定向到错误页面，如\
  \ PHP 解决方案 5-9 所述。\n\n**提示**：DSN 是`PHP`代码中唯一需要更改以连接不同数据库系统的部分。所有剩余的`PDO`代码完全与数据库无关。关于如何为\
  \ PostgreSQL、Microsoft SQL Server、SQLite 和其他数据库系统创建 DSN 的详细信息，请访问[`www.php.net/manual/en/pdo.drivers.php`](http://www.php.net/manual/en/pdo.drivers.php)。\n\
  \n## PHP 解决方案 13-1：制作可复用的数据库连接器\n\n连接数据库是一项常规任务，从现在开始每个页面都需要执行。这个 PHP 解决方案创建了一个存储在外部文件中的简单函数，用于连接数据库。它主要为测试剩余章节中不同的`MySQLi`和`PDO`脚本而设计，无需每次重新输入连接详情或在不同的连接文件之间切换。\n\
  \n1. 在`includes`文件夹中创建一个名为`connection.php`的文件，并插入以下代码（`ch13`文件夹中有一个完成脚本的副本）：\n\n\
  ```php\n    <?php\n    function dbConnect($usertype, $connectionType = 'mysqli')\
  \ {\n    $host = 'localhost';\n    $db = 'phpsols';\n    if ($usertype  == 'read')\
  \ {\n    $user = 'psread';\n    $pwd = 'K1yoMizu^dera';\n    } elseif ($usertype\
  \ == 'write') {\n    $user = 'pswrite';\n    $pwd = '0Ch@Nom1$u';\n    } else {\n\
  \    exit('Unrecognized user');\n    }\n    // Connection code goes here\n    }\n\
  \    ```\n\n   该函数接受两个参数：用户类型和连接类型。第二个参数默认为`mysqli`。如果你想专注于使用`PDO`，请将第二个参数的默认值设置为`pdo`。\n\
  \n   函数内部的前两行存储了要连接的主机服务器和数据库的名称。\n\n   条件语句检查第一个参数的值，并在`psread`和`pswrite`用户名和密码之间切换。如果用户账户无法识别，`exit()`函数会终止脚本并显示`Unrecognized\
  \ user`。\n\n2. 将`Connection code goes here`注释替换为以下内容：\n\n```php\n    if ($connectionType\
  \ == 'mysqli') {\n    $conn = @ new mysqli($host, $user, $pwd, $db);\n    if ($conn->connect_error)\
  \ {\n    exit($conn->connect_error);\n    }\n    return $conn;\n    } else {\n \
  \   try {\n    return new PDO(\"mysql:host=$host;dbname=$db\", $user, $pwd);\n \
  \   } catch (PDOException $e) {\n    echo $e->getMessage();\n    }\n    }\n    ```\n\
  \n   如果第二个参数设置为`mysqli`，则会创建一个名为`$conn`的`MySQLi`连接对象。错误控制运算符(`@`)阻止构造函数显示错误消息。如果连接失败，原因会存储在对象的`connect_error`属性中。如果该属性为空，则视为`false`，因此下一行被跳过，并返回`$conn`对象。但如果出现问题，`exit()`会显示`connect_error`的值并终止脚本。\n\
  \n   否则，函数返回一个`PDO`连接对象。无需对`PDO`构造函数使用错误控制运算符，因为如果有问题它会抛出`PDOException`。`catch`块使用异常的`getMessage()`方法显示问题原因。\n\
  \n"
- "# 提示\n\n如果你的数据库服务器使用非标准端口，不要忘记将端口号作为第五个参数添加到`mysqli()`构造函数中，并将其包含在`PDO`的 DSN 中，如前几节所述。如果数据库使用套接字连接（这在\
  \ macOS 和 Linux 上很常见），则不需要这样做。\n\n3. 在`phpsols`站点根文件夹中创建一个名为`connection_test.php`的文件，并插入以下代码：\n\
  \n```php\n    <?php\n    require_once './includes/connection.php';\n    if ($conn\
  \ = dbConnect('read')) {\n    echo 'Connection successful';\n    }\n    ```\n\n\
  \   这包含了连接脚本，并使用`psread`用户账户和`MySQLi`进行测试。\n\n4. 保存页面并在浏览器中加载。如果看到`Connection successful`，则一切正常。如果收到错误消息，请查阅下一节的故障排除提示。\n\
  \n5. 使用`pswrite`用户和`MySQLi`测试连接：\n\n```php\n    if ($conn = dbConnect('write'))\
  \ {\n    echo 'Connection successful';\n    }\n    ```\n\n6. 通过将`'pdo'`作为第二个参数传递给`dbConnect()`来测试两个用户账户与`PDO`的连接。\n\
  \n\n\n7.  如果一切顺利，你现在就可以开始与`phpsols`数据库交互了。如果遇到问题，请查看下一节。\n\n## 解决数据库连接问题\n\n连接数据库时最常见的失败原因是用户名或密码错误。密码和用户名是区分大小写的。请仔细检查拼写。例如，以下截图显示了将`psread`改为`Psread`会发生什么。\n\
  \n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figb_HTML.jpg](img/332054_4_En_13_Figb_HTML.jpg)\n\
  \n访问被拒绝是因为没有这个用户。用户名的首字母大写造成了完全不同的结果。但即使用户名正确，你也可能收到同样的错误信息，如下所示：\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figc_HTML.jpg](img/332054_4_En_13_Figc_HTML.jpg)\n\
  \n这让许多人感到十分困惑。错误信息确认你正在使用密码。那么为什么访问被拒绝呢？因为密码错误，就是这个原因。如果错误信息显示`using password: NO`，则表示你忘记提供密码。短语`using\
  \ password`是问题与登录凭据相关的线索。当这个短语缺失时，表示是另一个不同的问题，如下一张截图所示。\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Figd_HTML.jpg](img/332054_4_En_13_Figd_HTML.jpg)\n\
  \n这里的问题是数据库名称不正确。如果你拼写错了主机名，你会收到一条未知主机的消息。本节中的截图是由 MySQLi 生成的。PDO 会生成相同的消息，但还会包含错误编号和代码。\n\
  \n## 清洗来自数据库的文本结果\n\n在显示 SQL 查询结果时，你可以确信存储在特定类型列中的值将采用特定格式。例如，数字类型的列只能存储数字。同样，日期和时间相关的列只能以\
  \ ISO 日期时间格式存储值。然而，文本相关的列可以存储任何类型的字符串，包括 HTML、JavaScript 和其他可执行代码。在输出来自文本列的值时，你应该始终对其进行清洗，以防止任意代码被执行。\n\
  \n清洗文本输出的简单方法是将其传递给`htmlspecialchars()`。此函数与`htmlentities()`相关，但它将更有限范围的字符转换为其等效的\
  \ HTML 字符实体。具体来说，它会转换&符号、引号和尖括号；但会保留句点（点号）。这起到了在浏览器中显示时中和执行代码尝试的效果，因为`<script>`和\
  \ PHP 标签的尖括号被转换了。重要的是不要转换点号，因为它们用于我们想要显示的文件名中。\n\n`htmlspecialchars()`的缺点是默认情况下它会对现有的字符实体进行双重编码。结果，`&amp;`被转换为`&amp;amp;`。你可以通过将`false`作为第四个参数传递给`htmlspecialchars()`来关闭此默认行为。\n\
  \n每次调用`htmlspecialchars()`都输入四个参数很繁琐。因此，我在`ch13`文件夹中一个名为`utility_funcs.php`的文件里定义了以下自定义函数：\n\
  \n```\nfunction safe($text) {\nreturn htmlspecialchars($text, ENT_COMPAT|ENT_HTML5,\
  \ 'UTF-8', false);\n}\n```\n\n这简单地将`$text`传递给`htmlspecialchars()`，设置了三个可选参数，并返回结果。其他参数如下：\n\
  \n- `ENT_COMPAT|ENT_HTML5`：将双引号转换为实体，但保留单引号不变，并将输出视为 HTML5\n- `UTF-8`：将编码设置为 UTF-8\n\
  - `false`：关闭 HTML 字符实体的双重编码\n\n将`utility_funcs.php`复制到`includes`文件夹，并在从数据库输出文本的脚本中引入它。\n\
  \n作为`htmlspecialchars()`的替代方案，你可以将文本值传递给`strip_tags()`，它允许你指定允许的 HTML 标签（参见第 7 章的“访问远程文件”）。\n\
  \n## 查询数据库并显示结果\n\n在尝试显示数据库查询结果之前，最好先了解有多少条结果。如果没有结果，你将没有内容可显示。这也对于为长结果集创建分页导航系统是必要的（你将在下一章学习如何操作）。在用户认证中（第\
  \ 19 章介绍），搜索用户名和密码时没有结果意味着登录应失败。\n\nMySQLi 和 PDO 在计数和显示结果时使用不同的方法。接下来的两个 PHP 解决方案展示了如何使用\
  \ MySQLi 实现。对于 PDO，请跳到 PHP 解决方案 13-4。\n\n### PHP 解决方案 13-2: 统计结果集中的记录数 (MySQLi)\n\
  \n此 PHP 解决方案展示了如何提交一条选择`images`表中所有记录的 SQL 查询，并将结果存储在`MySQLi_Result`对象中。该对象的`num_rows`属性包含查询检索到的记录数。\n\
  \n1.  在`phpsols-4e`站点根目录中创建一个名为`mysqli`的新文件夹，然后在该文件夹内创建一个名为`mysqli.php`的新文件。该页面最终将用于显示一个表格，因此它应包含`DOCTYPE`声明和一个\
  \ HTML 骨架。\n\n2.  在`DOCTYPE`声明上方的 PHP 代码块中包含连接文件，并使用具有只读权限的账户连接到`phpsols`数据库，如下所示：\n\
  \n```\n    require_once '../includes/connection.php';\n    $conn = dbConnect('read');\n\
  ```\n\n3.  接下来，准备 SQL 查询。在上一步之后（但在结束 PHP 标签之前）立即添加以下代码：\n\n```\n    $sql = 'SELECT\
  \ * FROM images';\n```\n\n这意味着“从`images`表中选择所有内容”。星号（`*`）是“所有列”的简写。\n\n4.  现在通过调用连接对象的`query()`方法并将\
  \ SQL 查询作为参数传递来执行查询，如下所示：\n\n```\n    $result = $conn->query($sql);\n```\n\n结果存储在一个变量中，我将其直观地命名为`$result`。\n\
  \n5.  如果出现问题，`$result`将为`false`。要找出问题所在，我们需要获取错误信息，该信息存储为`mysqli`连接对象的`error`属性。在前一行之后添加以下条件语句：\n\
  \n```\n    if (!$result) {\n    $error = $conn->error;\n    }\n```\n\n6.  假设没有问题，`$result`现在持有一个`MySQLi_Result`对象，它有一个名为`num_rows`的属性。要获取查询找到的记录数，在条件语句中添加一个`else`块并将该值赋给一个变量，如下所示：\n\
  \n```\n    if (!$result) {\n    $error = $conn->error;\n    } else {\n    $numRows\
  \ = $result->num_rows;\n    }\n```\n\n7.  现在可以像这样在页面的主体中显示结果：\n\n```\n    $error\"\
  ;\n    } else {\n    echo \"共找到 $numRows 条记录。\";\n    }\n    ?>\n```\n\n如果出现问题，`$error`将被设置，因此会显示它。否则，`else`块显示找到的记录数。两个字符串都嵌入了变量，因此它们用双引号括起来。\n\
  \n8.  保存`mysqli.php`并在浏览器中加载它。你应该会看到以下结果：\n\n![../images/332054_4_En_13_Chapter/332054_4_En_13_Fige_HTML.jpg](img/332054_4_En_13_Fige_HTML.jpg)\n\
  \n如有必要，请对照`ch13`文件夹中的`mysqli_01.php`检查你的代码。\n\n\n\n"
