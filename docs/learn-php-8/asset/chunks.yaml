    \ 与 `easyPHP` 类似，但 `XAMPP` 更受欢迎，因为它有免费的 Windows、Linux 和 OS X 版本。它还包含许多附加组件，包括一些最受欢迎的内容管理系统——`Drupal`、`Joomla`\
    \ 和 `WordPress`。`XAMPP` 使用 `MariaDB` 代替 `MySQL`。此更改发生在 `Oracle` 收购 `MySQL` 时。`MariaDB`\
    \ 和 `MySQL` 的基础知识非常相似。我们将在本书后面探讨如何更改为最新版本的 `MySQL`。在某些设置中，`XAMPP` 仍然引用 `MySQL`，而实际上它是\
    \ `MariaDB`。最新版本可以直接从 `XAMPP` 官方网站或许多其他下载站点获取。[www.​apachefriends.​org/​](https://www.apachefriends.org/)\n\
    \n> **警告**  \n> 注意你点击网站上的哪些按钮。你可能会下载到不想安装的额外项目。\n"
- fmt: "During your first attempt at installing, use the default settings that the\
    \ developers have suggested in the installation software. You will greatly reduce\
    \ the possibility of problems or headaches. If you did not choose to AutoStart\
    \ the server and the database, and you would like to do so or you would like to\
    \ turn it off, double-click the XAMPP icon in your system tray. Then click the\
    \ Config button at the upper right (not the one next to the server or MySQL).\
    \ The next screen will display check boxes to allow you to choose which applications\
    \ you would like to AutoStart. Check the items to AutoStart and then click the\
    \ save button.\n\nIf you want to manually start the server or the database, you\
    \ can click the start button to the right of the server. Then when the server\
    \ starts, click the start button to the right of MySQL. If they start correctly,\
    \ the buttons will change to stop buttons and the items will be highlighted in\
    \ green. If they do not correctly start, the item(s) will be highlighted in red.\
    \ If you do have errors, read the next section entitled \"Common Installation\
    \ Problems\" for assistance.\n\n## Common Installation Problems\n\nYou might receive\
    \ a warning message from Microsoft Windows Firewall which requests that you approve\
    \ the start of Apache and MariaDB. Of course, you should click to allow them to\
    \ run. Also, in Windows, you might receive a message during installation that\
    \ tells you that User Security Control is turned on for your machine. Your installation\
    \ should still work properly, on your own machine, if you tell it to install anyway.\n\
    \n### Port Conflicts\n\nIf you already have a service using port 80, the default\
    \ port for HTML traffic between your PC and the outside world, you will receive\
    \ an error message from Apache when it attempts to run. You can fix this problem\
    \ in multiple ways.\n\n1.  If you do not mind shutting down other services using\
    \ the port while you are developing, you can follow the directions on the video\
    \ link. Once you are done using Apache and PHP, you can turn the services back\
    \ on or just reboot your PC and the services will turn back on.\n\n2.  Go to the\
    \ Windows Task Manager (press `Ctrl+Alt+Delete` at the same time).\n    - Select\
    \ the Services tab.\n    - Look for any of the following services in Windows:\
    \ SQL Server Reporter, Web Deployment Agent, BranchCache, Sync Share Service,\
    \ WAS (IIS Administrator), and W3SVC. If you find one running, right-click it\
    \ and turn it off. Then try restarting Apache again. If that does not work, turn\
    \ that one back on and try another one. (The names may be slightly different depending\
    \ on the version of Windows.)\n\n3.  If you need your other services running or\
    \ you do not have the administrative privileges to turn off services on port 80,\
    \ you can change the default listening port location for Apache.\n\nGo to your\
    \ system tray (in Microsoft Windows, it is at the bottom-right corner of your\
    \ screen). Find the XAMPP icon by scrolling your mouse over the icons. A description\
    \ of each should appear. If you do not see the icon, click the up arrow in the\
    \ system tray to see more icons. Double-click the icon. The Control Panel should\
    \ appear. You should see startup error messages in red on the console. If it is\
    \ a port conflict, click the Config button to the right of Apache. Select the\
    \ Services and Port Setting button (near the bottom right). The tabs provided\
    \ will default to Apache. If Apache is the problem, change the port setting from\
    \ 80 to 8080 or 81. This will allow the Apache server to listen to one of these\
    \ ports that are not commonly used.\n\nYou can then restart Apache by clicking\
    \ the Start button next to Apache in the XAMPP console. If you get a green status\
    \ for Apache, you will also want to start MariaDB by clicking the Start button\
    \ to the right of MariaDB.\n\n### Missing Files\n\nIf you receive an error message\
    \ related to this, somehow your files have become corrupted before installation.\
    \ Return to the XAMPP web site and download and install the files again. If you\
    \ somehow have messed up the Apache configuration file, you also will need to\
    \ download the files again.\n\n### Cannot Install Files in Program Files Directory\n\
    \nThis would indicate that you or something else has a high security restriction\
    \ on that directory. Rerun the installation and change the location of your installation\
    \ to another directory. Just remember, when you reference the program files directory\
    \ later in this book, that you should instead look at the directory in which your\
    \ files were installed.\n\n### Apache Delays and Hang-Ups\n\nIn Windows you may\
    \ experience problems with Apache working slowly or hanging up. To correct this\
    \ problem, go to your system tray (bottom-right corner of your screen). Find the\
    \ XAMPP icon by scrolling over the icons. A description of each should appear.\
    \ If you do not see the icon, click the up arrow in the system tray to see more\
    \ icons. Double-click the XAMPP icon. Select Config button to the right of Apache\
    \ (not the button in the upper right, not the PHP config button). Select Apache\
    \ (httpd.conf). This will open the Apache configuration file (`httpd.conf`) into\
    \ Notepad (or your default text editor). First save a copy of this file somewhere\
    \ in case you make an error. This will allow you to recover from any major mistakes\
    \ that occur.\n\n> **Note**\n> \n> Make sure when you are using Notepad or any\
    \ other text editor that you use Save As, and then select All Files for the file\
    \ type. Also make sure to include the `.conf` file extension. If you do not change\
    \ the file type to all files, your file will be saved as `httpd.conf.txt`. If\
    \ that happens, the server will not see the file. You can easily fix the problem\
    \ by reopening the file and saving it in the proper method.\n\nThen add the following\
    \ two lines to the bottom of the file:\n\n```\nAcceptFilter http none\nAcceptFilter\
    \ https none\n```\n\nResave the file (make sure you are resaving the original\
    \ file to the original location).\n\n### Other Errors\n\nFor errors that have\
    \ not been discussed here, copy and paste the error into a search engine. Locate\
    \ an answer column or blog that provides suggestions to fix your error. There\
    \ are many free resources on the Internet. Do not pay for a web site (or someone\
    \ else) to fix your problem.\n\n### Configurations\n\nYou can change configurations\
    \ for XAMPP by going to the Control Panel (double-click the XAMPP on the system\
    \ tray at the bottom right of your screen). Then click the config button at the\
    \ upper right of your screen (not the config buttons to the right of the applications).\
    \ To AutoStart (or stop AutoStart) your applications, you can then check (or uncheck)\
    \ the boxes provided to automatically start items the next time the Control Panel\
    \ starts. Then click Save. Of course, you can always start them from the Control\
    \ Panel when needed.\n\nThere are many optional libraries that you can link or\
    \ unlink to PHP as needed. In many cases, the libraries are already loaded and\
    \ just need to be linked. You can add these libraries by going to the PHP configuration\
    \ file (`php.ini`) and remove the comment (`;`) character at the beginning of\
    \ the line. The PHP configuration file can easily be found by double-clicking\
    \ the XAMPP icon in the system tray. Then click the Config button to the right\
    \ of Apache. A list will display; select `php.ini`. It is not necessary to make\
    \ any changes at this point. It is also suggested that you make these changes\
    \ only when needed.\n\n### Microsoft Internet Information Server\n\nAlternatively,\
    \ if you are unable to get Apache to perform properly in Windows (especially Windows\
    \ 10), or you like Microsoft's IIS Server, you can install PHP to use Microsoft\
    \ IIS (Internet Information Server) instead of Apache. For more information, visit\
    \ [`www.php.net/manual/en/install.windows.php`](http://www.php.net/manual/en/install.windows.php).\n\
    \n## Do It"
