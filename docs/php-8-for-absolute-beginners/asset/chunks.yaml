    if they did not login.\n\nSummary\nThis was a long chapter. We covered a lot.\
    \ Too much to list here. But\nsome of the most important new skills we have gained\
    \ include one-way\nencryption for privacy, a session for stateful memory, and\
    \ effectively\nrestricting access to the administration module of the blog. I\
    \ hope you\nwill agree it was very rewarding to implement a login system. As\n\
    mentioned before, the blog is ready for beta testing. Have your\nsignificant other\
    \ or a friend test the system out. It is not perfect,\nbut close. Whatever potential\
    \ problems the tester finds, take the time\nto fix them.\nRemember, PHP programs\
    \ can do more than manage websites. In the last\nchapter, we will diverge from\
    \ creating websites to look at creating a\ndata dashboard and the logic for a\
    \ checkers game.\n\nProjects\n\n1.  Using the design practices from this and previous\
    \ chapters, update\n    the student registration system from Chapter [7](#323857_3_En_7_Chapter.xhtml).\
    \ Provide the requirement that\n    users must log in to the system before they\
    \ can access student\n    records.\n\n2.  Update the blog application to provide\
    \ the ability to recover from a\n    lost password. The program should require\
    \ that the user verify either\n    the userid or password. Then, once verified,\
    \ the user will have access\n    to a form to change the password. For a bigger\
    \ challenge, discover how\n    PHP can send emails. Have the system send the user\
    \ an email with a\n    temporary passcode. Then require the user to enter the\
    \ passcode before\n    they can change the password.\n\n3.  Update the blog application\
    \ to provide the ability for the deletion\n    of unused administrative userids\
    \ from the system.\n\n4.  Update the admin user verification system of the blog\
    \ application to\n    limit the number of attempts to sign in to four. After four,\
    \ the system\n    should reject all attempts from the same userid for ten minutes.\
    \ This\n    can be accomplished by creating another session variable to populate\
    \ the\n    last time attempted after four tries. Then clear the variable after\
    \ ten\n    minutes has expired. This is a common authorization requirement in\
    \ the\n    IT industry.\n\n10. Data Dashboard and Gaming\n\nObjectives\n\nAfter\
    \ completing this chapter, you will be able to\n\n*   Convert data from one data\
    \ type to another\n\n*   Use the PHP function `json_encode()` to\n    create JSON\
    \ data\n\n*   Use the PHP function `fputcsv()` to create\n    CSV data\n\n*  \
    \ Use SQL statements to determine a database name, table name, and\n    column\
    \ names\n\n*   Use SQL statements to determine if the values in a column are\n\
    \    numeric\n\n*   Convert a database table to a PHP array\n\n*   Use the PHP\
    \ function `fopen()` to read and\n    write to a file\n\n*   Use the PHP function\
    \ `fgetcsv()` to convert\n    a CSV file into an array\n\n*   Use the PHP function\
    \ `file_get_contents()`\n    to retrieve all the contents of a file at one time\n\
    \n*   Use the PHP function `json_decode()` to\n    convert a JSON file into an\
    \ array\n\n*   Use the open source class `SIMPLEXLSX` to read\n    data from a\
    \ Microsoft Excel spreadsheet into an array\n\n*   Use the PHP function `explode()`\
    \ to break a\n    string into an array based on a delimiter\n\n*   Use the PHP\
    \ function `is_numeric()` to\n    determine if a value contains a number\n\n*\
    \   Use the PHP function `is_string()` to\n    determine if a value is a string\n\
    \n*   Use the PHP `continue` statement to\n    skip an iteration of a loop\n\n\
    *   Create a *Google Data Table* from a PHP array\n\n*   Use JavaScript and the\
    \ *Google Charts Library* to create a\n    data dashboard\n\n*   Create the logic\
    \ for a checkers game using two-dimensional\n    arrays\n\n*   Use a `switch`\
    \ control to\n    determine multiple outcomes from a single variable\n\nIn this\
    \ final chapter, we will explore other tasks that PHP can\naccomplish besides\
    \ controlling the interactivity of a standard website.\nAlthough PHP is not known\
    \ as a tool for *data analysis* and\ngaming, we will demonstrate that it can be\
    \ used for just that purpose.\nLet’s first take a brief look at data analysis\
    \ and discover how we can\ndisplay a dashboard and related charts."
