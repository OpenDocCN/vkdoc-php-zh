    }\n```\n\n**4.** Add some fictional orders to the database, and then load the\
    \ `admin.php` file in your browser. Click on the ORDERS ADMIN menu link, click\
    \ on a Go! button to show some orders, and click the View Details button for one\
    \ of the orders. The order details admin page will show up allowing you to edit\
    \ the order’s details, as advertised earlier in this chapter.\n\n## How It Works:\
    \ The `admin_order_details` Componentized Template\n\nThe three files you just\
    \ wrote, `admin_order_details.tpl`, `function.load_admin_order_details.php`, and\
    \ `admin_order_details.php`, allow you to view and update the details of a particular\
    \ order.\n\nThe function plugin is loaded from the template file using the usual\
    \ mechanism. The constructor of the `AdminOrderDetails` class (the `__construct`\
    \ method) ensures that there’s an `OrderId` parameter in the query string because\
    \ without it this componentized template doesn’t make sense:\n\n```php\n// Class\
    \ constructor\npublic function __construct()\n{\n  // Get the back link from session\n\
    \  $this->mAdminOrdersPageLink = $_SESSION['admin_orders_page_link'];\n\n  //\
    \ We receive the order ID in the query string\n  if (isset ($_GET['OrderId']))\n\
    \    $this->mOrderId = (int) $_GET['OrderId'];\n  else\n    trigger_error('OrderId\
    \ paramater is required');\n\n  $this->mOrderStatusOptions = Orders::$mOrderStatusOptions;\n\
    }\n```\n\nThe `init()` method reacts to user’s actions and calls various business\
    \ tier methods to accomplish the user’s requests. It populates the form with data\
    \ it gets from the `Orders::GetOrderInfo` and the `Orders::GetOrderDetails` business\
    \ tier methods.\n\nThe `mEditEnabled` class member enters or exits edit mode depending\
    \ on whether the `submitEdit` parameter from the query string is set or not. When\
    \ entering edit mode, all text boxes and the Update and Cancel buttons become\
    \ enabled, but the Edit button is disabled. The reverse happens when exiting edit\
    \ mode, which happens when either the Cancel or Update button is clicked.\n\n\
    ## Summary\n\nWe covered a lot of ground in this chapter. In two separate stages,\
    \ you implemented a system for taking orders and manually administering them.\
    \ You added a Place Order button to the shopping cart control to allow the visitor\
    \ to order the products in the shopping cart. You implemented a simple orders\
    \ administration page, in which the site administrator can view and handle pending\
    \ orders.\n\nBecause order data is now stored in the database, you can do various\
    \ statistics and calculations based on the items sold. In the next chapter, you’ll\
    \ learn how to implement a “Visitors who bought this also bought…” feature, which\
    \ wouldn’t have been possible without the order data stored in the database.\n\
    \n---\n\n## Chapter 10: Product Recommendations\n\nOne of the most important advantages\
    \ of an Internet store compared to a brick-and-mortar location is the capability\
    \ to customize the web site for each visitor based on his or her preferences or\
    \ based on data gathered from other visitors with similar preferences. If your\
    \ web site knows how to suggest additional products to your visitor in a clever\
    \ way, he or she might end up buying more than initially planned."
