    \    \n    <form method=\"post\"\n          action=\"{$admin_departments->mAdminDepartmentsTarget|prepare_link:\"\
    https\"}\">\n    \n    {if $admin_departments->mDepartmentsCount eq 0}\n    <strong>您的数据库中没有部门！</strong><br\
    \ />\n    {else}\n    <table>\n    <tr>\n      <th>部门名称</th>\n      <th>部门描述</th>\n\
