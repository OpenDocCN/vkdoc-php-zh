  \ |\n\n超越基本的 Lint 类型功能和单一目的的扫描，目前已有多个高级的开源和商业分析平台可用于 PHP，它们提供了更广泛的分析和报告能力，包括各种代码质量指标、代码重复分析、安全模式分析等，并且能够与单元测试软件、IDE\
  \ 等其他工具集成。这些工具通常具有不可忽视的学习曲线以及部署/使用“成本”（就时间和资源而言），更适用于大型项目、关键任务项目和拥有多位开发者的项目。然而，即使是从单一开发人员的小项目起步，如果你确实相信项目未来会扩展规模，那么从一开始就考虑使用这样的工具也是值得的，这有助于将日后需要“偿还”的“技术债务”最小化。此类工具包括：\n\
  \n| ![](img/image00249.gif) | ***Sonarqube*** |\n|   |   |\n|   | 一款通过代码分析来管理代码质量的广泛使用的开放平台。\
