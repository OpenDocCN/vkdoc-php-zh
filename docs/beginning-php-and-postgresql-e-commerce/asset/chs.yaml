  \n### 为`OrderProcessor`添加更多功能\n\n你需要为`OrderProcessor`类再添加一些零散的功能，但这似乎不值得再通过一节\"\
  练习\"来完成。相反，我们将简要地过一遍代码。\n\n我们需要关注以下内容：\n\n- 更新订单状态\n\n\n\n# 实现订单流水线：第一部分\n\n## 更新订单状态\n\
  \n每个流水线环节都需要能够更改订单的状态，使其进入下一个流水线环节。此项功能并非简单地递增状态，而是保持灵活性，以防最终出现更复杂的分支式流水线。这需要在数据库中新增一个名为\
  \ `orders_update_status` 的函数，以及一个数据层方法 `UpdateOrderStatus`，你需要将其添加到 `Orders` 类中（位于\
  \ `business/orders.php`）。\n\n首先，在你的 `hatshop` 数据库中创建 `orders_update_status` 函数：\n\
  \n```sql\n-- 创建 orders_update_status 函数\n\nCREATE FUNCTION orders_update_status(INTEGER,\
  \ INTEGER)\nRETURNS VOID LANGUAGE plpgsql AS $$\nDECLARE\n  inOrderId ALIAS FOR\
  \ $1;\n  inStatus ALIAS FOR $2;\nBEGIN\n  UPDATE orders SET status = inStatus WHERE\
  \ order_id = inOrderId;\nEND;\n$$;\n```\n\n然后，将 `UpdateOrderStatus` 方法添加到 `business/order.php`\
  \ 文件中的 `Orders` 类：\n\n```php\n// 更新订单的流水线状态\npublic static function UpdateOrderStatus($orderId,\
  \ $status)\n{\n  // 构建 SQL 查询\n  $sql = 'SELECT orders_update_status(:order_id,\
  \ :status);';\n\n  // 构建参数数组\n  $params = array (':order_id' => $orderId, ':status'\
  \ => $status);\n\n  // 使用 PDO 特定功能准备语句\n  $result = DatabaseHandler::Prepare($sql);\n\
  \n  // 执行查询\n  return DatabaseHandler::Execute($result, $params);\n}\n```\n\n`OrderProcessor`\
  \ 类（位于 `business/order_processor.php`）中调用业务数据层方法的方法同样名为 `UpdateOrderStatus`：\n\n\
  ```php\n// 设置订单状态\npublic function UpdateOrderStatus($status)\n{\n  Orders::UpdateOrderStatus($this->mOrderInfo['order_id'],\
  \ $status);\n  $this->mOrderInfo['status'] = $status;\n}\n```\n\n## 设置信用卡认证详细信息\n\
  \n在下一章中，当我们处理信用卡使用时，你将需要在 `orders` 表的 `auth_code` 和 `reference` 字段中设置数据。\n\n为了支持该功能，首先在你的数据库中添加\
  \ `orders_set_auth_code` 函数：\n\n```sql\n-- 创建 orders_set_auth_code 函数\n\nCREATE\
  \ FUNCTION orders_set_auth_code(INTEGER, VARCHAR(50), VARCHAR(50))\nRETURNS VOID\
  \ LANGUAGE plpgsql AS $$\nDECLARE\n  inOrderId ALIAS FOR $1;\n  inAuthCode ALIAS\
  \ FOR $2;\n  inReference ALIAS FOR $3;\nBEGIN\n  UPDATE orders\n  SET auth_code\
  \ = inAuthCode, reference = inReference\n  WHERE order_id = inOrderId;\nEND;\n$$;\n\
