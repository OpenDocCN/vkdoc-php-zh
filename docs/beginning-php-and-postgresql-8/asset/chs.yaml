  上优秀的 Apache 文档以获取更多信息。


  ##### `AcceptPathInfo`


  `AcceptPathInfo` 指令是 Apache 回头查找功能的关键组件。启用后，Apache 会理解一个网址可能不会明确映射到预期的目标。打开这个指令会使
  Apache 开始搜索请求的 URL 路径，寻找一个可行的目标，并将任何尾部 URL 组件放入 `PATH_INFO` 变量中。


  这个指令通常与 `Directory` 容器结合使用。因此，如果你要在 Web 服务器的文档根目录级别启用回头查找功能，你可以像这样启用 `AcceptPathInfo`：


  ```

  <Directory />

  ```




