    }

    }

    ```


    As you can see, the `accept()` method expects an `ArmyVisitor` object to be passed
    to it. PHP allows you dynamically to define the method on the `ArmyVisitor` you
    wish to call, so I construct a method name based on the name of the current class
    and `invoke that` method on the provided `ArmyVisitor` object. If the current
    class is `Army`, then I invoke `ArmyVisitor::visitArmy()`. If the current class
    is `TroopCarrier`, then I invoke `ArmyVisitor::visitTroopCarrier()`. And so on.
