  trans: "\n首次尝试安装时，请使用开发人员在安装软件中建议的**默认设置**。这能极大降低出现问题的可能性或避免令人头疼的情况。如果你没有选择自动启动服务器和数据库，而现在想要启用自动启动，或者想关闭它，请双击系统托盘中的\
    \ XAMPP 图标。然后点击右上角的 **Config** 按钮（而不是服务器或 MySQL 旁边的那个）。下一个屏幕将显示复选框，允许你选择要自动启动的应用程序。勾选要自动启动的项目，然后点击\
    \ **save** 按钮。\n\n如果你想要手动启动服务器或数据库，可以点击服务器右侧的 **start** 按钮。当服务器启动后，再点击 MySQL 右侧的\
    \ **start** 按钮。如果它们正确启动，按钮会变为 **stop** 按钮，并且相关项目会高亮显示为**绿色**。如果未能正确启动，相关项目则会高亮显示为**红色**。如果你确实遇到错误，请阅读下一节“常见安装问题”以获取帮助。\n\
    \n## 常见安装问题\n\n你可能会收到 Microsoft Windows 防火墙的警告消息，要求你批准启动 Apache 和 MariaDB。当然，你应该点击允许它们运行。此外，在\
    \ Windows 中，安装过程中你可能会收到一条消息，告知你该机器已启用**用户安全控制**。如果你选择继续安装，在你的机器上安装过程通常仍能正常工作。\n\
    \n### 端口冲突\n\n如果你已经有服务在使用端口 80（PC 与外部世界之间传输 HTML 数据的默认端口），Apache 在尝试运行时将会收到错误消息。你可以通过多种方式解决此问题。\n\
    \n1.  如果你不介意在开发期间关闭使用该端口的其他服务，可以按照视频链接中的说明进行操作。完成 Apache 和 PHP 的使用后，你可以重新开启这些服务，或者只需重启\
    \ PC，这些服务便会自动重新启动。\n\n2.  转到 Windows 任务管理器（同时按 `Ctrl+Alt+Delete`）。\n    -   选择\
    \ **服务** 选项卡。\n    -   在 Windows 中查找以下任意服务：SQL Server Reporter、Web Deployment\
    \ Agent、BranchCache、Sync Share Service、WAS（IIS 管理员）和 W3SVC。如果发现某个服务正在运行，右键单击它并选择**关闭**。然后尝试重新启动\
    \ Apache。如果不起作用，请重新打开该服务，再尝试关闭另一个。（名称可能因 Windows 版本而异。）\n\n3.  如果你需要保持其他服务运行，或者没有关闭端口\
    \ 80 上服务的**管理权限**，则可以更改 Apache 的默认监听端口。\n\n转到你的系统托盘（在 Microsoft Windows 中，位于屏幕右下角）。通过将鼠标悬停在图标上找到\
    \ XAMPP 图标。每个图标的描述应该会显示出来。如果看不到该图标，请单击系统托盘中的向上箭头以查看更多图标。双击该图标，会出现**控制面板**。你应该会在控制台上看到以红色显示的启动错误消息。如果是端口冲突，请点击\
    \ Apache 右侧的 **Config** 按钮。选择 **Services and Port Setting** 按钮（靠近右下角）。弹出的选项卡默认会选中\
    \ Apache。如果问题是 Apache 引起的，请将端口设置从 80 更改为 `8080` 或 `81`。这将允许 Apache 服务器监听这些不常用的端口之一。\n\
    \n然后，你可以通过点击 XAMPP 控制台中 Apache 旁边的 **Start** 按钮来重新启动 Apache。如果 Apache 状态变为绿色，你还应点击\
    \ MariaDB 右侧的 **Start** 按钮来启动它。\n\n### 文件缺失\n\n如果你收到与此相关的错误消息，说明你的文件在安装前已损坏。请返回\
    \ XAMPP 网站，重新下载并安装文件。如果你不小心弄乱了 Apache 配置文件，你同样需要重新下载文件。\n\n### 无法在 Program Files\
    \ 目录安装文件\n\n这表明你或其他程序对该目录有**很高的安全限制**。请重新运行安装程序，并将安装位置更改为其他目录。请记住，当你之后在本书中引用程序文件目录时，应该查看你实际安装文件的目录。\n\
    \n### Apache 延迟和挂起\n\n在 Windows 中，你可能会遇到 Apache 运行缓慢或挂起的问题。要解决此问题，请转到系统托盘（屏幕右下角）。通过将鼠标悬停在图标上找到\
    \ XAMPP 图标。每个图标的描述应该会显示出来。如果看不到该图标，请单击系统托盘中的向上箭头以查看更多图标。双击 XAMPP 图标。选择 Apache\
    \ 右侧的 **Config** 按钮（不是右上角的按钮，也不是 PHP 的 config 按钮）。选择 **Apache (httpd.conf)**。这将在记事本（或你的默认文本编辑器）中打开\
    \ Apache 配置文件（`httpd.conf`）。首先，在此文件某处保存一个副本，以防出现错误。这将允许你从可能发生的任何重大错误中恢复。\n\n>\
    \ **注意**\n>\n> 确保在使用记事本或任何其他文本编辑器时，你使用了**另存为**，然后选择**所有文件**作为文件类型。同时确保包含 `.conf`\
    \ 文件扩展名。如果你不将文件类型更改为所有文件，你的文件将被保存为 `httpd.conf.txt`。如果发生这种情况，服务器将无法找到该文件。你可以通过重新打开文件并以正确方法保存来轻松解决此问题。\n\
    \n然后将以下两行添加到文件底部：\n\n```\nAcceptFilter http none\nAcceptFilter https none\n```\n\
    \n重新保存文件（确保将原始文件保存回原始位置）。\n\n### 其他错误\n\n对于此处未讨论的错误，请将错误信息复制并粘贴到搜索引擎中。查找提供修复错误建议的问答专栏或博客。互联网上有许多免费资源。不要付费让某个网站（或其他人）来修复你的问题。\n\
    \n### 配置\n\n你可以通过转到**控制面板**（双击屏幕右下角系统托盘中的 XAMPP）来更改 XAMPP 的配置。然后点击你屏幕右上角的 **config**\
    \ 按钮（而不是应用程序右侧的 config 按钮）。要**自动启动**（或停止自动启动）你的应用程序，你可以勾选（或取消勾选）提供的复选框，以便在下一次控制面板启动时自动启动相应项目。然后点击\
    \ **Save**。当然，你也可以在需要时随时从控制面板启动它们。\n\n有许多可选的库，你可以根据需要链接或取消链接到 PHP。在许多情况下，库已经加载，只需链接即可。你可以通过转到\
    \ PHP 配置文件（`php.ini`）并删除行首的注释（`;`）字符来添加这些库。通过双击系统托盘中的 XAMPP 图标，可以轻松找到 PHP 配置文件。然后点击\
    \ Apache 右侧的 **Config** 按钮。将显示一个列表；选择 `php.ini`。目前无需进行任何更改。也建议只在需要时才进行这些更改。\n\n\
    ### Microsoft Internet Information Server\n\n或者，如果你无法让 Apache 在 Windows（尤其是 Windows\
    \ 10）中正常运行，或者你喜欢 Microsoft 的 IIS 服务器，你可以安装 PHP 以使用 Microsoft IIS（Internet Information\
    \ Server）替代 Apache。有关更多信息，请访问 [`www.php.net/manual/en/install.windows.php`](http://www.php.net/manual/en/install.windows.php)。\n\
    \n## 动手实践\n"
- fmt: '# Use a Search Engine to Answer These Questions


    1. You receive the following error either while installing or as soon as you try
    to start XAMPP or easyPHP. How can you find the solution to your problem? What
    might be causing this error?


    ```

    Internal Server Error


    The server encountered an internal error or misconfiguration and was unable to
    complete your request.


    Please contact the server administrator, you@example.com, and inform them of the
    time the error occurred, and anything you might have done that may have caused
    the error.


    More information about this error may be available in the server error log.

    ```


    2. What is XAMPP error #1130? How can you fix this error?


    3. When trying to run a PHP program using easyPHP (and Apache), you receive the
    following error. What is causing this error? How can you fix it?


    ```

    Cannot load mcrypt extension. Please check your PHP configuration.

    ```


    4. If you have not already attempted to do so, install either easyPHP or XAMPP
    on your personal machine. Did you have any problems with your installation? If
    so, what problems did you have? How did you solve those problems?


    ## Testing Your Environment


    You have green lights now, right? Everything is working correctly? Well, hopefully.
    However, you need to make sure. The best way to do this is to test your environment.


    ### Testing Your Administration Environment


    First, we need to test the server and see if our administration pages will display.
    In easyPHP, you can do either of the following:


    1. Right-click the easyPHP icon and select **Dashboard**.

    2. Open your favorite browser and enter the following:


    `http://127.0.0.1:1111/index.php`


    If you had to change your port due to conflicts, you may need to enter the port
    number, such as:


    `http://127.0.0.1:8080/index.php`


    You should see a screen similar to the one shown in Figure [1-23](#394210_2_En_1_Chapter.xhtml#Fig23).


    For XAMPP, open your favorite browser and enter this address:


    `http://127.0.0.1/dashboard/`


    If you had to change your port due to conflicts, then you must also include this
    port:


    `http://127.0.0.1:8080/dashboard/`


    If XAMPP is installed properly, you should see a screen similar to the one shown
    in Figure [1-24](#394210_2_En_1_Chapter.xhtml#Fig24).


    If at this point you are not seeing this page (or some page with XAMPP displayed),
    something is wrong. Check the following:

    - Is easyPHP or XAMPP running (started)?

    - Do you see the green light or green shaded color for Apache either in the XAMPP
    Control Panel or in easyPHP? If not, try clicking the start buttons or links.

    - If Apache will not start, are you seeing an error message? If not, check the
    error log file. For easyPHP, open the Dashboard, select the gear icon (**Server
    Config**), and then select the **Error Log** button. For XAMPP, click the **Log**
    button on the Control Panel next to Apache and select **Error Log**.

    - If you see green and the pages seem to be locked up, try stopping and restarting
    Apache. It might take a couple of attempts to wake it up. If it continues to hang,
    check your computer settings. Are you maxing out on CPU usage?


    Can you determine the problem? If you have an error message, paste it in your
    favorite search engine and see what the experts say about the problem.


    ### Do It


    1. If you have not already done so, test your environment using the directions
    earlier. Did you have any problems? If so, what problems occurred? How did you
    fix those problems?


    ### Testing Your PHP Environment


    Hopefully, everything is good at this point. Either you have been flying through
    with great luck, or you managed to fix all the problems you have encountered.
    However, you still need to see if you can actually run your own PHP program in
    Apache.


    Open a text editor (not Word, but Notepad or Notepad++ is good), and enter the
    following code exactly as it has been shown:'
