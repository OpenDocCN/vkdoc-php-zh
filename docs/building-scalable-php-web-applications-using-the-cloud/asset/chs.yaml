  \ 10-20 分钟），你就可以上传应用程序了。\n\n要上传你的应用程序，请将所有文件打包成一个 zip 归档文件。然后，在仪表板上，点击标有“Upload\
  \ and Deploy”的按钮。从硬盘中选择 zip 文件，为版本命名（具体名称无关紧要），然后点击“Deploy”。运行状态图标将变为一个旋转的刷新图标，开始部署你的应用程序。当图标变回对勾时，你的应用程序就部署完成了！\n\
  \n但是，我们还没有完全结束。当你点击链接时，它会显示一条“Forbidden”消息。这是因为我们没有 `index.php` 文件（不过如果你愿意，可以添加一个）。然而，我们需要创建数据库，所以首先需要导航到\
  \ `createdb.php` 文件来创建数据库（只需在浏览器 URL 末尾添加 `/createdb.php` 并按回车键）。这应该会显示一个空白页面，这没问题。\n\
  \n现在，如果你将 URL 更改为访问 `list.php`，一切应该都能正常工作了！\n\n现在，你可以对你的应用程序进行许多操作，使其具有可伸缩性。所有这些都可以从环境的“Configuration”选项卡中找到。默认情况下，EB\
  \ 创建的环境是单服务器环境。要将其升级为负载均衡的应用程序，只需进入“Capacity”部分，将“Environment Type”更改为“Load Balanced”。这将为你提供许多可供选择的选项。最简单（也最重要）的是实例的“minimum”和“maximum”数量。将最小值设置为\
