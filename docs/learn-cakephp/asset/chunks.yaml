    27              ''default'' => null, ''comment'' => '''', ''precision'' => null,

    28              ''fixed'' => null

    29              ],

    30          ''password'' => [

    31              ''type'' => ''string'', ''length'' => 50, ''null'' => true,

    32              ''default'' => null, ''comment'' => '''', ''precision'' => null,

    33              ''fixed'' => null

    34              ],

    35          ''role'' => [

