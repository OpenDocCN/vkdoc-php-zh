    \ `UNSIGNED` | 未选中 | `PRIMARY` | 选中 |\n| `category` | `VARCHAR` | 20 | | 未选中 |\
    \ | |\n\n关于交叉引用表定义的重要一点是，两列都设置为主键，并且两列的`A_I`（`AUTO_INCREMENT`）复选框都没有被选中。\n\n**警告**\n\
    要创建复合主键，必须同时将两列都声明为主键。如果错误地只声明一列为主键，数据库会阻止稍后添加第二列。必须从单列中删除主键索引，然后将其重新应用到两列上。两列的组合被视为主键。\n\
    \n**获取上传图片的文件名**\n该脚本使用了第 6 章中的`Upload`类，但该类需要稍作调整，因为上传文件的文件名会被合并到`$messages`属性中。\n\
    \n**PHP 解决方案 18-2：改进 Upload 类**\n\n本 PHP 解决方案通过创建一个新的受保护属性来存储成功上传文件的名称，并提供一个公共方法来获取文件名数组，从而调整了第\
    \ 9 章中的`Upload`类。\n\n1.  打开`PhpSolutions/File`文件夹中的`Upload.php`。或者，从`ch18/PhpSolutions/File`文件夹复制`Upload.php`，并将其保存到`phpsols-4e`站点根目录下的`PhpSolutions/File`中。\n\
    \n2.  在文件顶部的属性列表中添加以下行：\n\n```php\nprotected $filenames = [];\n```\n\n这会将一个名为`$filenames`的受保护属性初始化为空数组。\n\
    \n3.  修改`moveFile()`方法，如果文件上传成功，则将修改后的文件名添加到`$filenames`属性中。新代码已加粗显示。\n\n```php\n\
    protected function moveFile($file) {\n    $filename = $this->newName ?? $file['name'];\n\
    \    $success = move_uploaded_file($file['tmp_name'], $this->destination . $filename);\n\
    \    if ($success) {\n        // add the amended filename to the array of uploaded\
    \ files\n        $this->filenames[] = $filename;\n        $result = $file['name']\
    \ . ' was uploaded successfully';\n        if (!is_null($this->newName)) {\n \
    \           $result .= ', and was renamed ' . $this->newName;\n        }\n   \
    \     $this->messages[] = $result;\n    } else {\n        $this->messages[] =\
    \ 'Could not upload ' . $file['name'];\n    }\n}\n```\n\n仅当文件成功移动到目标文件夹时，其名称才会被添加到`$filenames`数组中。\n\
    \n4.  添加一个公共方法，用于返回存储在`$filenames`属性中的值。代码如下：\n\n```php\npublic function getFilenames()\
    \ {\n    return $this->filenames;\n}\n```\n\n在类定义中放置这段代码的位置无关紧要，但通常的做法是将所有公共方法放在一起。\n\
    \n5.  保存`Upload.php`。如果需要检查代码，请将其与`ch18/PhpSolutions/File`文件夹中的`Upload_01.php`进行比较。\n\
    \n**调整插入表单以处理多个表**\n\n您在第 15 章中为博客文章创建的插入表单已经包含了将大部分详细信息插入`blog`表所需的代码。与其从头开始，不如调整现有页面。目前，该页面只包含用于标题的文本输入字段和用于文章的文本区域。\n\
    \n您需要为类别添加一个多选的`<select>`列表，并为现有图片添加一个下拉的`<select>`菜单。\n\n为了防止用户在上传新图片的同时选择现有图片，使用复选框和\
    \ JavaScript 控制相关输入字段的显示。选中复选框会禁用用于现有图片的下拉菜单，并显示用于新图片和标题的输入字段。取消选中复选框会隐藏并禁用文件和标题字段，然后重新启用下拉菜单。如果禁用了\
    \ JavaScript，则上传新图片和标题的选项会被隐藏。\n\n**注意**\n为节省空间，本章剩余的大部分 PHP 解决方案仅提供 MySQLi 的详细说明。PDO\
    \ 版本的结构和 PHP 逻辑是相同的。唯一的区别在于提交 SQL 查询和显示结果所使用的命令。带有完整注释的 PDO 文件位于`ch18`文件夹中。\n\n\
    **PHP 解决方案 18-3：添加类别和图片的输入字段**\n\n本 PHP 解决方案通过添加类别和图片的输入字段，开始调整第 15 章中的博客条目插入表单。\n\
    \n1.  在`admin`文件夹中，找到并打开您在第 15 章中创建的`blog_insert_mysqli.php`版本。或者，将`ch18`文件夹中的`blog_insert_mysqli_01.php`复制到`admin`文件夹，并从文件名中删除`_01`。\n\
    \n2.  类别和现有图片的`<select>`元素需要在页面首次加载时查询数据库，因此需要将连接脚本和数据库连接移出检查表单是否已提交的条件语句。找到加粗显示的行：\n\
    \n```php\nif (isset($_POST['insert'])) {\n    require_once '../includes/connection.php';\n\
    \    // initialize flag\n    $OK = false;\n    // create database connection\n\
    \    $conn = dbConnect('write');\n```\n\n将它们移至条件语句之外，并包含`utility_funcs.php`，如下所示：\n\
    \n```php\nrequire_once '../includes/connection.php';\nrequire_once '../includes/utility_funcs.php';\n\
    // create database connection\n$conn = dbConnect('write');\nif (isset($_POST['insert']))\
    \ {\n    // initialize flag\n    $OK = false;\n```\n"
- fmt: "3.  页面主体中的表单需要能够上传文件，因此你需要在开头的`<form>`标签中添加`enctype`属性，如下所示：\n\n4.  如果尝试上传文件时发生错误（例如，文件太大或不是图像文件），插入操作将停止。修改现有的文本输入字段和文本区域，使用与第[6](#332054_4_En_6_Chapter.xhtml)章相同的技术重新显示这些值。文本输入字段如下所示：\n\
    \n    ```\n    \">\n    ```\n\n文本区域如下所示：\n\n```\n确保开始和结束的PHP标签与HTML之间没有间隙。否则，你会在文本输入字段和文本区域内部添加不需要的空白。\n\
    ```\n\n5.  新的表单元素位于文本区域和提交按钮之间。首先，为分类添加多选的`<select>`列表代码。代码如下所示：\n\n```\n分类：\n\
    \nquery($getCats);\nwhile ($row = $categories->fetch_assoc()) {\n?>\n\" >\n\n\
    ```\n\n为了允许选择多个值，`multiple`属性已被添加到`<select>`标签中，并且`size`属性设置为`5`。这些值需要以数组形式提交，因此一对中括号已附加到`name`属性上。\n\
    \nSQL查询`categories`表，`while`循环使用主键和分类名称填充`<option>`标签。`while`循环中的条件语句在`insert`操作失败时，会向`<option>`标签添加`selected`以重新显示已选中的值。\n\
    \n6.  保存`blog_insert_mysqli.php`并在浏览器中加载该页面。此时表单应如图[18-8](#332054_4_En_18_Chapter.xhtml#Fig8)所示。\n\
    \n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig8_HTML.jpg](images/332054_4_En_18_Chapter/332054_4_En_18_Fig8_HTML.jpg)\n\
    \n图 18-8.\n\n多选`<select>`列表从`categories`表中拉取值\n\n7.  查看页面的源代码，以验证每个分类的主键已正确嵌入到每个`<option>`标签的`value`属性中。你可以将自己的代码与`ch18`文件夹中的`blog_insert_mysqli_02.php`进行比较。\n\
    \n8.  接下来，创建`<select>`下拉菜单以显示已注册到数据库中的图像。在步骤5中插入的代码之后立即添加此代码：\n\n```\n已上传的图像：\n\
    \n选择图像\nquery($getImages);\nwhile ($row = $images->fetch_assoc()) {\n?>\n\"\n\
    >\n\n```\n\n这将创建另一个`SELECT`查询，以获取存储在`images`表中的每个图像的主键和文件名。现在你应该非常熟悉这段代码，因此无需解释。\n\
    \n9.  用于标题的复选框、文件输入字段和文本输入字段位于上一步的代码和提交按钮之间。代码如下所示：\n\n```\n\n上传新图像\n\n选择图像：\n\
    \n标题：\n\n```\n\n包含复选框的段落已被赋予`allowUpload`的ID，另外两个段落被分配了一个名为`optional`的类。`admin.css`中的样式规则将这些段落的`display`属性设置为`none`。\n\
    \n10. 保存`blog_insert_mysqli.php`并在浏览器中加载该页面。`images <select>`下拉菜单显示在`categories`列表下方，但你在步骤9中插入的三个表单元素是隐藏的。如果浏览器中禁用了JavaScript，将会显示此状态。用户将可以选择分类和现有图像，但不能上传新图像。\n\
    \n如有必要，请对照`ch18`文件夹中的`blog_insert_mysqli_03.php`检查你的代码。\n\n11. 将`toggle_fields.js`从`ch18`文件夹复制到`admin`文件夹。该文件包含以下JavaScript：\n\
    \n```\nvar cbox = document.getElementById('allowUpload');\ncbox.style.display\
    \ = 'block';\nvar uploadImage = document.getElementById('upload_new');\nuploadImage.onclick\
    \ = function () {\nvar image_id = document.getElementById('image_id');\nvar image\
    \ = document.getElementById('image');\nvar caption = document.getElementById('caption');\n\
    var sel = uploadImage.checked;\nimage_id.disabled = sel;\nimage.parentNode.style.display\
    \ = sel ? 'block' : 'none';\ncaption.parentNode.style.display = sel ? 'block'\
    \ : 'none';\nimage.disabled = !sel;\ncaption.disabled = !sel;\n}\n```\n\n这使用了步骤8中插入的元素的ID来控制它们的显示。如果启用了JavaScript，页面加载时会自动显示复选框，但标题的文件输入字段和文本输入字段仍保持隐藏。如果复选框被选中，现有图像的下拉菜单将被禁用，并且隐藏的元素会显示出来。如果随后取消选中复选框，下拉菜单会重新启用，文件输入字段和标题字段将再次隐藏。\n\
    \n12. 使用`<script>`标签将`toggle_fields.js`链接到`blog_insert_mysqli.php`，放在结束的`</body>`标签之前，如下所示：\n\
    \n在页面底部添加JavaScript可以加快下载和显示速度。如果你将其添加到`<head>`中，`toggle_fields.js`中的代码将无法正常运行。\n\
    \n13. 保存`blog_insert_mysqli.php`并在浏览器中加载该页面。在支持JavaScript的浏览器中，复选框应显示在`<select>`下拉菜单和提交按钮之间。选中复选框可禁用下拉菜单并显示隐藏字段，如图[18-9](#332054_4_En_18_Chapter.xhtml#Fig9)所示。\n\
    \n![../images/332054_4_En_18_Chapter/332054_4_En_18_Fig9_HTML.jpg](images/332054_4_En_18_Chapter/332054_4_En_18_Fig9_HTML.jpg)\n\
    \n图 18-9.\n\n复选框控制文件和标题输入字段的显示\n\n14. 取消选中复选框。文件和标题输入字段被隐藏，下拉菜单重新启用。如有必要，你可以对照`ch18`文件夹中的`blog_insert_mysqli_04.php`和`toggle_fields.js`检查你的代码。\n\
    \n我使用JavaScript而不是PHP来控制文件和标题输入字段的显示，因为PHP是一种服务器端语言。在PHP引擎将输出发送到浏览器之后，除非你向Web服务器发送另一个请求，否则它将不再与页面进行交互。另一方面，JavaScript在浏览器中运行，因此它能够在本地操作页面内容。JavaScript还可以与PHP结合使用，在后台向Web服务器发送请求，并使用结果刷新页面的一部分而无需重新加载页面——这种技术称为Ajax，超出了本书的范围。\n\
    更新后的插入表单现在包含了分类和图像的输入字段，但处理脚本仍然只处理标题的文本输入字段和博客条目的文本区域。\n\n## PHP解决方案18-4：将数据插入多个表\n\
    \n此PHP解决方案改编了`blog_insert_mysqli.php`中的现有脚本，以按需上传新图像，然后按照图[18-6](#332054_4_En_18_Chapter.xhtml#Fig6)中概述的决策链将数据插入`images`、`blog`和`article2cat`表。它假设你已经设置了`article2cat`交叉引用表，并完成了PHP解决方案18-2和18-3。\n\
    不要试图匆忙完成本节。代码相当长，但它整合了许多你之前学过的技术。\n\n> **注意**\n> 如果你使用的是PDO，此PHP解决方案之后会有一个单独的部分描述代码中的主要差异。"
