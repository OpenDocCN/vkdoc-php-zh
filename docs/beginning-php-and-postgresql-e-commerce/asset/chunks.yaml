    Essentially, a relational database is made up of **data tables** and the **relationships**
    that exist between them. Because you’ll work with a single data table in this
    chapter, we’ll cover only the database theory that applies to the table as a separate,
    individual database item. In the next chapter, when you’ll add the other tables
    to the picture, we’ll take a closer look at the theory behind relational databases
    by analyzing how the tables relate to each other and how PostgreSQL helps you
    deal with these relationships.


    ■**Note** In a real-world situation, you would probably design the whole database
    (or at least all the tables relevant to the feature you build) from the start.
    In this book, we chose to split the development over two chapters to maintain
