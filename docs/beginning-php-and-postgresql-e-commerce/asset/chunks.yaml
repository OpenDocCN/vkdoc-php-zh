  trans: "\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00149.png)\n\
    \n`648XCH13.qxd 11/17/06 3:46 PM Page 464`\n\n**464**\n\n第 13 章 ■ 实现订单管道：第一部分\n\
    \n```\nif (isset ($_GET['submitUpdate']))\n{\n    Orders::UpdateOrder($this->mOrderId,\
    \ $_GET['status'], $_GET['comments'], $_GET['authCode'], $_GET['reference']);\n\
    }\n```\n\n```\nif (isset ($_GET['submitProcessOrder']))\n{\n    $processor = new\
    \ OrderProcessor($this->mOrderId);\n    $processor->Process();\n}\n```\n\n`$this->mOrderInfo\
    \ = Orders::GetOrderInfo($this->mOrderId);`\n`$this->mOrderDetails = Orders::GetOrderDetails($this->mOrderId);`\n\
    `$this->mCustomerInfo = Customer::Get($this->mOrderInfo['customer_id']);`\n`$this->mTotalCost\
    \ = $this->mOrderInfo['total_amount'];`\n\n**13.** 在浏览器中加载管理订单部分，选择一个订单以查看其详情。在订单详情页面中，点击“处理订单”按钮（见图\
    \ 13-4）。\n\n**图 13-4.** *点击 HatShop 订单管理中的“处理订单”按钮*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![](img/00122.png)\n\n`648XCH13.qxd 11/17/06 3:46 PM Page 465`\n\n第 13 章 ■ 实现订单管道：第一部分\
    \ **465**\n\n■**注意** 如果未正确配置 SMTP 服务器，代码尝试发送电子邮件时会报错。如果出现这种情况，请参考附录 A 中的安装和配置说明。\n\
    \n**14.** 检查收件箱，确认是否收到一封标题为“来自 PsDummy 的测试邮件”的新邮件。\n\n**15.** 检查数据库中的审计表，查看新增的条目（见图\
    \ 13-5）。\n\n**图 13-5.** *来自 PsDummy 的审计表条目*\n\n**工作原理：订单处理功能的框架**\n\n`OrderProcessor`\
    \ 以及各个管道阶段会添加条目，以指示成功或失败。随后可以检查这些条目，了解订单的处理情况，这在错误检查时是一项重要功能。\n\n消息编号列很有意思，因为它允许你将特定消息与标识编号关联起来。你可以另外创建一个数据库表，将这些消息编号与描述对应起来，不过这并非必要，因为编号方案（本章后面会看到）本身就具有相当描述性。\n\
    \n此外，你还有消息列，它已经提供了人类可读的信息。\n\n为了演示目的，我们将管理员和供应商的电子邮件地址设置为虚构的电子邮箱，该邮箱地址也应与用于生成测试订单的客户地址一致。这样做是为了确保在向外部发送邮件之前一切运行正常。\n\
    \n现在，让我们来看看 `OrderProcessor` 类。`OrderProcessor` 类的主体是 `Process()` 方法，目前该方法由 `function.load_admin_order_details.php`\
    \ 调用，用于处理订单。\n\n```\npublic function Process()\n{\n    // 配置处理器\n    $this->mContinueNow\
    \ = true;\n```\n\n接下来，你使用 `CreateAudit()` 方法添加了一条审计条目，表示 `OrderProcessor` 已启动：\n\
    \n```\n// 记录执行开始\n$this->CreateAudit('订单处理器已启动。', 10000);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n`648XCH13.qxd 11/17/06 3:46 PM Page 466`\n\n**466**\n\n第 13 章 ■ 实现订单管道：第一部分\n\
    \n■**注意** 10000 是为该审计条目存储的消息编号。我们稍后将详细讨论这些代码。\n\n接下来进入订单处理本身。这里采用的模型是在处理管道某部分之前，先检查布尔值\
    \ `$mContinueNow` 字段。这样各部分可以指定：当前任务完成后是继续处理（将 `$mContinueNow` 设为 `true`），还是暂停处理（将\
    \ `$mContinueNow` 设为 `false`）。这是必要的，因为在管道的某些节点上，你需要等待外部输入（例如检查产品库存以及客户信用卡上的资金是否可用）。\n"
- fmt: "要处理的管道段由私有方法`GetCurrentPipelineSection`选择，该方法最终返回一个与订单当前状态相对应的管道段类（你将在下一章中构建这些类）。然而目前，`GetCurrentPipelineSection`负责设置处理阶段并返回`PsDummy`的实例。在下一章中，你将实现表示每个管道段的类，并返回其中一个类而不是`PsDummy`。\n\
    \n```\n// Gets current pipeline section\nprivate function GetCurrentPipelineSection()\n\
    {\n    $this->_mOrderProcessStage = 100;\n    $this->_mCurrentPipelineSection\
    \ = new PsDummy();\n}\n```\n\n回到`Process()`，你会看到这个方法在一个`try`块中被调用：\n\n```\n//\
    \ Process pipeline section\ntry\n{\n    while ($this->mContinueNow)\n    {\n \
    \       $this->mContinueNow = false;\n        $this->GetCurrentPipelineSection();\n\
    \        $this->_mCurrentPipelineSection->Process($this);\n    }\n}\n```\n\n请注意，`$mContinueNow`在`while`循环中被设置为`false`——默认行为是在每个管道段之后停止。但是，当前管道段类的`Process`方法（它接收当前`OrderProcessor`实例作为参数，因此可以访问`$mContinueNow`成员）会在处理应继续到下一个管道段而无需等待用户交互的情况下，将`$mContinueNow`的值改回`true`。\n\
    \n请注意，在上一个代码片段中，调用`Process`方法时并不知道`$this->_mCurrentPipelineSection`引用的是哪种类型的对象。每个管道段都由一个不同的类表示，但所有这些类都需要公开一个名为`Process`的方法。当需要这种行为的时，标准技术是创建一个接口，定义这组类所需的共同行为。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n所有订单管道段类都支持简单的`IPipelineSection`接口，定义如下：\n\
    \n```\n<?php\ninterface IPipelineSection\n{\n    public function Process($processor);\n\
    }\n?>\n```\n\n**注意**：接口是一组方法签名，它作为实现该接口的类的契约。当一个类实现接口时，该类保证将实现该接口中定义的每个签名。接口不能像普通类那样实例化，因为它不包含任何方法实现，只包含签名。通过在所有订单管道段类中实现`IPipelineSection`（你将在下一章中编写它们），你保证了它们都将导出一个名为`Process`的公有方法。这样，你就可以从`OrderProcessor`类安全地调用任何管道段类上的`Process`方法，而没有产生错误的风险。\n\
    \n所有管道段都使用`Process`方法来执行其工作。该方法需要一个`OrderProcessor`引用作为参数，因为管道段需要访问`OrderProcessor`类公开的公有字段和方法。\n\
    \n`OrderProcessor`中`Process`方法的最后一部分涉及异常捕获。在这里，你捕获订单管道段类可能抛出的任何异常，并通过使用`MailAdmin`方法向管理员发送电子邮件、添加审核条目以及抛出一个可由使用`OrderProcessor`类的\
    \ PHP 页面捕获的新异常来响应它们：\n\n```\ncatch(Exception $e)\n{\n    $this->MailAdmin('Order\
    \ Processing error occurred.',\n        'Exception: \"' . $e->getMessage() . '\"\
    \ on ' .\n        $e->getFile() . ' line ' . $e->getLine(),\n        $this->_mOrderProcessStage);\n\
    \    $this->CreateAudit('Order Processing error occurred.', 10002);\n    throw\
    \ new Exception('Error occurred, order aborted. ' .\n        'Details mailed to\
    \ administrator.');\n}\n```\n\n无论处理是否成功，你都会添加一条最终审核条目，说明处理已完成：\n\n```\n$this->CreateAudit('Order\
    \ Processor finished.', 10001);\n```"
  raw: 'The pipeline section to process is selected by the private GetCurrentPipelineSection
    method, which eventually returns a pipeline section class (you’ll build these
    classes in the next chapter) corresponding to the current status of the order.
    However, at this moment, the GetCurrentPipelineSection has the job of setting
    the process stage and returning an instance of PsDummy. In the next chapter, you’ll
    implement classes representing each pipeline section, and you’ll return one of
    those classes instead of PsDummy.


    // Gets current pipeline section


    private function GetCurrentPipelineSection()


    {


    $this->_mOrderProcessStage = 100;


    $this->_mCurrentPipelineSection = new PsDummy();


    }


    Back to Process(), you see this method being called in a try block:


    // Process pipeline section


    try


    {


    while ($this->mContinueNow)


    {


    $this->mContinueNow = false;


    $this->GetCurrentPipelineSection();


    $this->_mCurrentPipelineSection->Process($this);


    }


    }


    Note that $mContinueNow is set to false in the while loop—the default behavior
    is to stop after each pipeline section. However, the call to the Process method
    of the current pipeline section class (which receives a parameter of the current
    OrderProcessor instance, thus having access to the $mContinueNow member) changes
    the value of $mContinueNow back to true, in case processing should go to the next
    pipeline section without waiting for user interaction.


    Note that in the previous code snippet, the Process method is called without knowing
    what kind of object $this->_mCurrentPipelineSection references. Each pipeline
    section is represented by a different class, but all these classes need to expose
    a method named Process. When such behavior is needed, the standard technique is
    to create an interface that defines the common behavior you need in that set of
    classes.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    648XCH13.qxd 11/17/06 3:46 PM Page 467


    C H A P T E R 1 3 ■ I M P L E M E N T I N G T H E O R D E R P I P E L I N E :
    PA RT I **467**


    All order pipeline section classes support the simple IPipelineSection interface,
    defined as follows:


    <?php


    interface IPipelineSection


    {


    public function Process($processor);


    }


    ?>


    ■**Note** An interface is a set of method signatures that serves as a contract
    for classes that implement that interface. When a class implements an interface,
    the class guarantees that it will implement every signature defined in that interface.
    An interface cannot be instantiated like a normal class because it doesn’t contain
    any method implementations, only their signatures. By implementing IPipelineSection
    in all order pipeline section classes (you’ll write them in the next chapter),
    you guarantee that they all will export a public method named Process. This way,
    you can safely call the Process method on any pipeline section class from your
    OrderProcessor class without the risk of generating an error.


    All pipeline sections use a Process method to perform their work. This method
    requires an OrderProcessor reference as a parameter because the pipeline sections
    need access to the public fields and methods exposed by the OrderProcessor class.


    The last part of the Process method in OrderProcessor involves catching exceptions.
    Here, you catch any exceptions that may be thrown by the order pipeline section
    classes and react to them by sending an email to the administrator using the MailAdmin
    method, adding an audit entry, and throwing a new exception that can be caught
    by PHP pages that use the OrderProcessor class:


    catch(Exception $e)


    {


    $this->MailAdmin(''Order Processing error occurred.'',


    ''Exception: "'' . $e->getMessage() . ''" on '' .


    $e->getFile() . '' line '' . $e->getLine(),


    $this->_mOrderProcessStage);


    $this->CreateAudit(''Order Processing error occurred.'', 10002); throw new Exception(''Error
    occurred, order aborted. '' .


    ''Details mailed to administrator.'');


    }


    Regardless of whether processing is successful, you add a final audit entry saying
    that the processing has completed:


    $this->CreateAudit(''Order Processor finished.'', 10001);


    }'
