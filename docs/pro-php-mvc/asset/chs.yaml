  \n### 第三方库\n\n在 CakePHP 中使用第三方库与使用内置库略有不同。这有两种不同的方式：要么通过插件，要么将它们放在`vendor`目录中。\n\
  \n#### 插件\n\n创建插件的操作与复制`app`目录的结构类似，并用控制器、视图、模型以及插件运行所需的集合来填充它。问题在于，如果我们只是想使用一个已有的\
  \ PHP 库，这种方法会产生大量工作量。\n\n> **注意：** 你可以在以下网址找到更多关于 CakePHP 插件的信息：[`book.cakephp.org/2.0/en/plugins.html`](http://book.cakephp.org/2.0/en/plugins.html)\n\
  \n#### Vendor 目录\n\n我们将采取的方法是将 Imagine 库放在`Vendor`目录中。首先将 Imagine 库放在`~/app/Vendor`目录下，然后在`UsersController`中添加一个新的`_thumbnail()`方法，如清单\
  \ 32-8 所示。\n\n***清单 32-8.*** `~/app/Controller/UsersController.php`（摘录）\n\n```\n\
