    \ like Figure [9-5](#487291_1_En_9_Chapter.xhtml#Fig5). It lists the user and\
    \ then two special fields: “Access Key ID” and “Secret Access Key.” These two\
    \ fields essentially operate as a resettable username (“Access Key ID”) and password\
    \ (“Secret Access Key”) for the API for this user. You can either download the\
    \ credentials or copy them from the fields on the screen.  \n\n![../images/487291_1_En_9_Chapter/487291_1_En_9_Fig5_HTML.jpg](images/487291_1_En_9_Chapter/487291_1_En_9_Fig5_HTML.jpg)\
    \  \n\n### Figure 9-5  \nRetrieving IAM Credentials  \n\nGoing forward, we will\
    \ refer to the actual Access Key ID as `MYACCESSKEYID` and the actual Secret Access\
    \ Key as `MYSECRETACCESSKEY`.  \nIf you later lose those credentials, you won’t\
    \ be able to obtain them again. However, you can go back into the user’s record\
    \ and create a *new* set of credentials. If, at a later time, your server’s security\
    \ is compromised, you can deactivate the old credentials and issue new ones for\
    \ the same user.  \n\n## 9.4 Access S3 via Command Line  \n\nAWS has a command-line\
    \ tool that allows access to not only S3 but a wide range of their scalability\
    \ APIs. To install this, issue the following command as root on the template node:\
    \  \n\n```\nyum install -y awscli\n```\n\nThe AWS command line has two main ways\
    \ to specify your Access Key ID and Secret Access Key. You can either do it via\
    \ environment variables or via a configuration file. Environment variables are\
    \ more flexible, so we will do that route.  \nIf you are not familiar with the\
    \ command line, an environment variable is a variable that is set in your command-line\
    \ session. Not only that, but commands that you call have access to all of your\
    \ environment variables. Additionally, any environment variables that you set\
    \ go away when you log out, so they will need to be reset every time you log in\
    \ (if you want them to be set automatically upon login, you can put the commands\
    \ to set them in a file called `.bash_profile`).  \n\nThe environment variables\
    \ that the `aws` command uses for your credentials are `AWS_ACCESS_KEY_ID` and\
    \ `AWS_SECRET_ACCESS_KEY`.  \nTo set these variables, enter the following commands\
    \ in your terminal (replacing `MYACCESSKEYID` and `MYSECRETACCESSKEY` with your\
    \ actual keys):  \n\n```\nexport AWS_ACCESS_KEY_ID=MYACCESSKEYID\nexport AWS_SECRET_ACCESS_KEY=MYSECRETACCESSKEY\n\
    ```\n\nNow you can use the `aws` command to manipulate your S3 buckets. To get\
    \ a list of your buckets, issue the following command:  \n\n```\naws s3 ls s3://\n\
    ```\n\nIt should list the bucket that you created in Section 9.1.  \n\nTo list\
    \ the contents of that bucket, issue the following command (replace `BUCKET` with\
    \ the actual name of your bucket):  \n\n```\naws s3 ls s3://BUCKET/\n```\n\nTo\
    \ understand the way the command works, `aws` is the main command we are using,\
    \ `s3` tells which group of subcommands to work with, `ls` is just like the `ls`\
    \ command on Linux (it lists the contents), and `s3://BUCKET/` is the location\
    \ that we would like to look at.  \n\nThe `aws` command also gives other common\
    \ commands for manipulating files. Instead of `ls`, we can use `cp` to copy files\
    \ in and out of the bucket. If you had a file called `test.txt`, you could copy\
    \ it to your bucket with the command:  \n\n```\naws s3 cp test.txt s3://BUCKET/\n\
    ```\n\nTo copy a file *from* your bucket *to* your node, just switch the places\
    \ of `s3://BUCKET/` and `test.txt`.  \nAdditionally, you can create temporary\
    \ access URLs for your files. These URLs are signed URLs. This means that AWS\
    \ knows that an authorized person generated the URL, and AWS will trust that URL\
    \ for a specified amount of time as a valid means of accessing that file.  \n\
    This allows you to direct people directly to the AWS site to retrieve data that\
    \ they need, instead of having to transfer it to your server and then send it\
    \ yourself. It saves processing power, bandwidth, and response time.  \n\nHowever,\
    \ in order to do this, we will need to know what region the bucket is in. You\
    \ specified a region when you created the bucket, but AWS doesn’t always show\
    \ the “computerized” version of the region, which you will need for the command\
    \ line. Issue the following command to find the region of your bucket (replacing\
    \ `BUCKET` with your bucket name):  \n\n```\naws s3api get-bucket-location --bucket\
    \ BUCKET\n```\n\nThis will return a JSON-encoded value. The key is called `LocationConstraint`,\
    \ and the value is the name of the region that the bucket is hosted in. Some common\
    \ values for the region are strings like `us-east-1`, `us-east-2`, `ca-central-1`,\
    \ `eu-west-2`, and others. We will use `REGION` to represent whatever your region\
    \ is.  \n\nTo get a URL to access your file, use the following command:  \n\n\
    ```\naws s3 presign s3://BUCKET/FILE --region REGION\n```\n\nThis will generate\
    \ a URL that you can copy and paste into your browser. Lo and behold—the file\
    \ will appear! However, this URL will only be good for 3600 seconds (1 hour).\
    \ If you want the URL to be good for a different amount of time, you can tell\
    \ it using the `--expires-in` flag. So, if you want the URL to expire in 20 seconds,\
    \ you would just add `--expires-in 20` to the command.  \n\n![../images/487291_1_En_9_Chapter/487291_1_En_9_Figa_HTML.jpg](images/487291_1_En_9_Chapter/487291_1_En_9_Figa_HTML.jpg)\
    \  \n\nSpecifying Environment Variables Inline  \nBefore we start coding, I wanted\
    \ to take a quick sidebar and let you know another way to set environment variables.\
    \  \nYou can set an environment variable so that it will be valid only for one\
    \ application by specifying the environment variables to set on the same line\
    \ as a given command before the command itself.  \n\nSo, for instance, if I were\
    \ to run the command `example-command`, and I wanted to set the environment variable\
    \ `MYVAR` to `myval`, I could run the command like this:  \n\n```\nMYVAR=myval\
    \ example-command\n```\n\nThis would set the environment variable, but only for\
    \ running the command. You can actually set as many environment variables as you\
    \ wish when running commands, they just have to be separated by spaces. So, for\
    \ instance, to set two values, we could do:  \n\n```\nMYVAR1=val1 MYVAR2=val2\
    \ example-command\n```\n\nThis is how we will be setting our credentials in the\
    \ application we will create. For configuration purposes, it is actually best\
    \ to leave the credentials (and other configuration information) out of your code\
