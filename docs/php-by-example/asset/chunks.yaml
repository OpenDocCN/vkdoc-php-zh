- fmt: '# 计算几何图形面积的抽象类与方法


    The area is calculated using the method because this characteristic of a geometric
    figure is determined by its characteristic size and must change according to how
    the characteristic size of the figure changes. It is best to use a method that,
    when called, refers to the field in which the characteristic size of the figure
    is written. Note that the area of a square with side `R` is equal to `R²`. The
    area of a circle of radius `R` is equal to `πR²`. The area of an equilateral triangle
    with side `R` is defined by the expression `√(3)R² / 4`.


    Thus, in all three cases, the objects have a similar structure. The only difference
    is how the method that calculates the area is implemented. But those are different
    objects, and they must be created based on different classes. Then, you can ask
    yourself: how do you get the different classes to have the same structure (the
    same set of fields and methods, but the implementation of the methods should be
    different)? The answer could be as follows: you can describe an abstract class
    and then create different classes based on it using inheritance. Those classes
    have the same structure defined by the abstract class.


    A circular icon reads a letter `i` at the center.


    ## 抽象类优于普通类的原因


    In principle, instead of an abstract class to implement your strategy, you could
    take a regular class and override the inherited methods. But that is not a good
    option since if some method is accidentally not overridden, there is no formal
    error, but the code does not execute correctly. Such situations are pretty challenging
    to keep track of. Abstract classes are more reliable in that sense.


    ## 示例代码：抽象类的实现


    Let’s examine Listing 9-1.


    ```

    R=$R;

    $this->name=$name;

    }

    // An explicitly described method:

    function getName(){

    return $this->name;

    }

    // An abstract method:

    abstract function getArea();

    }

    // The class to realize a square:

    class Square extends Figure{

    // The description of the method:

    function getArea(){

    $r=$this->R;

    return $r*$r;

    }

    }

    // The class to realize a circle:

    class Circle extends Figure{

    // The description of the method:

    function getArea(){

    $r=$this->R;

    $k=3.141592;

    return $k*$r*$r;

    }

    }

    // The class to realize a triangle:

    class Triangle extends Figure{

    // The description of the method:

    function getArea(){

    $r=$this->R;

    $k=sqrt(3)/4;

    return $k*$r*$r;

    }

    }

    // The function displays information about an object:

    function show($F){

    echo $F->getName(),": ",$F->getArea(),"\n";

    }

    // Creates objects:

    $S=new Square(2.5,"Square");

    $C=new Circle(3,"Circle");

    $T=new Triangle(4,"Triangle");

    // Checks the result:

    show($S);

    show($C);

    show($T);

    ?>

    Listing 9-1

    ```


    ## 程序输出


    The following is the program’s output:


    ```

    The output of the program (from Listing 9-1)

    Square: 6.25

    Circle: 28.274328

    Triangle: 6.9282032302755

    ```


    ## 抽象类的结构与继承


    In that case, you describe the abstract `Figure` class and then create the `Square`,
    `Circle`, and `Triangle` classes based on it.


    The `Figure` class has two protected fields: `$name` (for the name of the figure)
    and `$R` (for the characteristic size of the geometric figure).


    | Details |

    |---------|

    | On the one hand, you want the fields to be inaccessible outside the class code,
    but on the other hand, you need the fields to be inheritable. That is why you
    make the fields protected. |


    The `Figure` class has the constructor with two arguments that define the value
    of the fields `$R` and `$name`. Since the `$name` field is protected, to read
    its value, you describe the `getName()` method, which returns the value of that
    field. You also declare the abstract `getArea()` method in the `Figure` class.
    Assume that that method should calculate the area of the figure. How exactly the
    area is calculated is defined in the child classes.


    A circular icon reads a letter `i` at the center.


    ## 抽象方法与继承特性


    The abstract class has an abstract method and a method described explicitly. The
    child class defines the abstract method and inherits the explicitly described
    method. The constructor and protected fields are also inherited.


    The `Square`, `Circle`, and `Triangle` classes differ only in the way they implement
    the `getArea()` method; there is nothing else in them besides that method. You
    create objects based on each class and then use the `show()` function to display
    information about those objects (the name and area). The important thing here
    is that in the description of the `show()` function, you refer to the `getName()`
    and `getArea()` methods of the object passed as an argument to the function. The
    function is called three times, and each time, it takes an object of a different
    class as an argument. But since all these classes are child classes of the abstract
    class `Figure`, each object has the `getName()` and `getArea()` methods.


    # 接口


    Thus, abstract classes can be used as a template for creating other classes. They
    have a similar structure, which is very convenient in practice. There is one problem
    here, however. The point is that a child class can have only one parent class.
    If you need to “combine” several templates into one child class at the same time,
    the abstract class is of little help in that case. Fortunately, there is another
    mechanism that allows you to solve the problem. It is based on using *interfaces*.


    An interface is very similar to an abstract class. The only fundamental difference
    is that an abstract class can have non-abstract methods, while an interface cannot.
    Also, an interface has no fields (but it can have constants—their description
    contains the `const` keyword). An interface can be considered a “very abstract”
    class. In that sense, the capabilities of an interface are more modest than those
    of an abstract class. The advantage of interfaces, however, is that a single class
    can implement several interfaces at once.


    To use interfaces in practice, you first need to figure out how to create an interface
    and, second, how to implement it in a class. Creating an interface is easy. It
    starts with the `interface` keyword, after which the contents of the interface
    are described in curly brackets. That is a declaration (without a description)
    of the methods that are part of the interface. There, you can use the access level
    specifiers `public` and `protected`. You can also declare constants.


    If a class implements an interface, then all methods from the interface must be
    described in the class. The fact that the class implements an interface is stated
    in the class description: the name of the interface implemented in the class is
    given after the class name, using the keyword `implements`. If the class implements
    multiple interfaces, they are listed after the `implements` keyword, separated
    by commas. How all that looks like in practice is illustrated in Listing 9-2.


    ```

    set($val);

    }

    function set($val){

    $this->num=$val;

    }

    function show(){

    echo "\$num = ",$this->num,"\n";

    }

    }

    // Creates an object of the class:

    $obj=new MyClass(100);

    // Checks the result:

    $obj->show();

    $obj->set(200);

    $obj->show();

    ?>

    Listing 9-2

    ```


    The following shows the result of the program execution:


    ```

    The output of the program (from Listing 9-2)

    $num = 100

    $num = 200

    ```'
