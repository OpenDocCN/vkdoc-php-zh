  \ PM Page 478\n\n**478**\n\n第 14 章 ■ 实现订单管道：第二部分\n\n我们将在进行过程中讨论你创建的这些类。在继续之前，请记住，这些代码可在\
  \ Apress 网站（http://www.apress.com）的源代码/下载部分找到。\n\n### PsInitialNotification\n\n\
  这是第一个管道阶段，负责向客户发送一封确认订单已下的电子邮件。在业务文件夹中创建一个名为`ps_initial_notification.php`的新文件，并开始向其中添加如下代码。这个类的开头很快就变得非常熟悉：\n\
  \n```\n<?php\n```\n\n\n\n\n# 排版后的文本\n\n```php\nclass PsInitialNotification implements\
  \ IPipelineSection\n{\n    private $_mProcessor;\n\n    public function Process($processor)\n\
  \    {\n        // 设置处理器引用\n        $this->_mProcessor = $processor;\n\n       \
  \ // 审计\n        $processor->CreateAudit('PsInitialNotification started.', 20000);\n\
  \    }\n}\n```\n\n该类实现了`IPipelineSection`接口，然后有一个私有字段用于存储对调用`PsInitialNotification`的`OrderProcessor`的引用，最后是`Process`方法的实现。此方法首先存储对`OrderProcessor`的引用，某些管道部分会这样做，因为使用其暴露的方法（在`Process`方法或其他方法中）至关重要。我们还使用第\
  \ 13 章介绍的编号方案添加了一条审计条目（开头的`2`表示它来自管道部分，接下来的`00`表示它是第一个管道部分，最后的`00`表示该管道部分的起始消息）。\n\
  \n`Process`方法的剩余部分发送通知邮件。这需要客户信息，你可以轻松获取这些信息。你还使用一个私有方法来构建邮件正文，稍后我们将会看到：\n\n```php\n\
  // 向客户发送邮件\n$processor->MailCustomer('HatShop 订单已收到。',\n    $this->GetMailBody());\n\
  ```\n\n邮件发送后，你添加一条审计消息并更改订单状态，然后告诉订单处理器可以继续直接进入下一个管道部分：\n\n```php\n// 审计\n$processor->CreateAudit('已向客户发送通知邮件。',\
  \ 20002);\n\n// 更新订单状态\n$processor->UpdateOrderStatus(1);\n\n// 继续处理\n$processor->mContinueNow\
  \ = true;\n```\n\n如果一切按计划进行，`Process`方法最后会添加一条审计条目：\n\n```php\n// 审计\n$processor->CreateAudit('PsInitialNotification\
  \ 已完成。', 20001);\n```\n\n`GetMailBody`方法用于构建发送给客户的邮件正文。文本使用客户和订单数据，但遵循普遍接受的电子商务邮件格式。\n\
  \n继续将此方法添加到`PsInitialNotification`类中：\n\n```php\nprivate function GetMailBody()\n\
  {\n    $body = '感谢您的订单！' .\n        '您订购的产品如下：';\n    $body.= \"\\n\\n\";\n    $body.=\
  \ $this->_mProcessor->GetOrderAsString(false);\n    $body.= \"\\n\\n\";\n    $body.=\
  \ '您的订单将运送至：';\n    $body.= \"\\n\\n\";\n    $body.= $this->_mProcessor->GetCustomerAddressAsString();\n\
  \    $body.= \"\\n\\n\";\n    $body.= '订单参考编号：';\n    $body.= $this->_mProcessor->mOrderInfo['order_id'];\n\
  \    $body.= \"\\n\\n\";\n    $body.= '当此订单发货时，您将收到一封确认邮件。感谢您在 HatShop 购物！';\n \
  \   return $body;\n}\n```\n\n当此管道阶段完成后，处理过程直接进入`PsCheckFunds`。\n\n## PsCheckFunds\n\
  \n此管道阶段负责确保客户信用卡上有所需资金。现在你将提供一个虚拟实现，并假设这些资金可用。你将在下一章处理信用卡交易时实现真正的功能。\n\n在`business`文件夹中创建一个名为`ps_check_funds.php`的新文件，并添加以下代码。\n\
  \n`Process`方法的代码几乎以与`PsInitialNotification`相同的方式开始：\n\n```php\n<?php\n\nclass PsCheckFunds\
  \ implements IPipelineSection\n{\n    public function Process($processor)\n    {\n\
  \        // 审计\n        $processor->CreateAudit('PsCheckFunds started.', 20100);\n\
  \    }\n}\n```\n\n即使你没有实际执行检查，也要为事务设置授权码和参考码，以确保`OrderProcessor`中的代码正常工作：\n\n```php\n\
  /* 检查客户资金，暂时假设资金充足\n设置订单授权码和参考码 */\n```\n\n\n\n`$processor->SetAuthCodeAndReference('DummyAuthCode',\
  \ 'DummyReference');`\n\n最后，你还需要完成一些审计工作以及用于继续处理的代码：\n\n```php\n// 审计\n$processor->CreateAudit('购买资金可用。',\
  \ 20102);\n\n// 更新订单状态\n$processor->UpdateOrderStatus(2);\n\n// 继续处理\n$processor->mContinueNow\
  \ = true;\n\n// 审计\n$processor->CreateAudit('PsCheckFunds 完成。', 20101);\n}\n}\n\
  ?>\n```\n\n当此管道阶段结束后，处理流程将进入 `PsCheckStock`。\n\n## PsCheckStock\n\n此管道阶段负责发送一封电子邮件，通知供应商检查库存情况。在业务文件夹中新建一个名为\
  \ `ps_check_stock.php` 的文件，并添加以下代码：\n\n```php\n<?php\nclass PsCheckStock implements\
  \ IPipelineSection\n{\n    private $_mProcessor;\n\n    public function Process($processor)\n\
  \    {\n        // 设置处理器引用\n        $this->_mProcessor = $processor;\n\n       \
  \ // 审计\n        $processor->CreateAudit('PsCheckStock 开始。', 20200);\n```\n\n邮件发送方式与\
  \ `PsInitialNotification` 类似，通过一个私有方法构建邮件正文：\n\n```php\n        // 向供应商发送邮件\n  \
  \      $processor->MailSupplier('HatShop 库存检查。',\n            $this->GetMailBody());\n\
  ```\n\n和之前一样，最后进行审计并更新状态，不过这次你不通知订单处理器立即继续处理：\n\n```php\n        // 审计\n       \
  \ $processor->CreateAudit('通知邮件已发送给供应商。', 20202);\n\n        // 更新订单状态\n       \
  \ $processor->UpdateOrderStatus(3);\n\n        // 审计\n        $processor->CreateAudit('PsCheckStock\
  \ 完成。', 20201);\n    }\n```\n\n构建邮件正文的代码很简单：它只是列出订单中的商品，并通知供应商通过 HatShop 网站（使用订单管理页面，稍后你将对其进行修改）进行确认：\n\
  \n```php\n    private function GetMailBody()\n    {\n        $body = '以下商品已被订购：';\n\
  \        $body .= \"\\n\\n\";\n        $body .= $this->_mProcessor->GetOrderAsString(false);\n\
  \        $body .= \"\\n\\n\";\n        $body .= '请检查库存情况，并通过 ' .\n            'http://www.hatshop.com/admin.php\
  \ 进行确认';\n        $body .= \"\\n\\n\";\n        $body .= '订单参考编号：';\n        $body\
  \ .= $this->_mProcessor->mOrderInfo['order_id'];\n        return $body;\n    }\n\
  }\n?>\n```\n\n当此管道阶段结束后，处理流程将暂停。随后，当供应商确认库存可用时，处理流程将继续进入 `PsStockOk`。\n\n## PsStockOk\n\
  \n此管道阶段仅用于确认供应商有库存商品，然后继续推进。其 `Process` 方法适用于那些库存已确认、需要进入下一个管道阶段的订单。在业务文件夹中新建一个名为\
  \ `ps_stock_ok.php` 的文件，并添加以下代码：\n\n```php\n<?php\nclass PsStockOk implements IPipelineSection\n\
  {\n    public function Process($processor)\n    {\n        // 审计\n        $processor->CreateAudit('PsStockOk\
  \ 开始。', 20300);\n\n        /* 此方法在供应商确认库存可用时被调用，因此除了审计之外，我们无需在此处执行任何操作 */\n    \
  \    $processor->CreateAudit('库存已由供应商确认。', 20302);\n\n        // 更新订单状态\n      \
  \  $processor->UpdateOrderStatus(4);\n\n        // 继续处理\n        $processor->mContinueNow\
  \ = true;\n\n        // 审计\n        $processor->CreateAudit('PsStockOk 完成。', 20301);\n\
  \    }\n}\n?>\n```\n\n当此管道阶段结束后，处理流程将直接进入 `PsTakePayment`。\n\n## PsTakePayment\n\
  \n此管道阶段负责完成由 `PsCheckFunds` 启动的事务。与前一阶段类似，你在此处仅提供一个虚拟实现。在业务文件夹中新建一个名为 `ps_take_payment.php`\
  \ 的文件，并添加以下代码：\n\n```php\n<?php\nclass PsTakePayment implements IPipelineSection\n\
  {\n    public function Process($processor)\n    {\n        // 审计\n        $processor->CreateAudit('PsTakePayment\
  \ 开始。', 20400);\n\n        // 从客户处扣款，暂时假设成功\n    }\n}\n?>\n```\n\n\n\n# 第 14 章：实现订单流水线：第二部分\n\
  \n```php\n// 审计\n$processor->CreateAudit('已从客户信用卡账户扣除资金。', 20402);\n\n// 更新订单状态\n\
  $processor->UpdateOrderStatus(5);\n\n// 继续处理\n$processor->mContinueNow = true;\n\
  \n// 审计\n$processor->CreateAudit('PsTakePayment 处理完成。', 20401);\n```\n\n当此流水线阶段完成后，处理将直接进入\
  \ `PsShipGoods`。\n\n## PsShipGoods\n\n此流水线部分与 `PsCheckStock` 非常相似，因为它会向供应商发送一封电子邮件，并暂停流水线，直到供应商确认货物已发出。不过，这次你需要客户信息，因为供应商需要知道订单的送货地址！请在\
  \ business 文件夹中新建一个名为 `ps_ship_goods.php` 的文件，并添加以下代码：\n\n```php\n<?php\n\nclass\
  \ PsShipGoods implements IPipelineSection\n{\n    private $_mProcessor;\n\n    public\
  \ function Process($processor)\n    {\n        // 设置处理器引用\n        $this->_mProcessor\
  \ = $processor;\n\n        // 审计\n        $processor->CreateAudit('PsShipGoods 已启动。',\
  \ 20500);\n\n        // 向供应商发送邮件\n        $processor->MailSupplier('HatShop 发货通知。',\n\
  \            $this->GetMailBody());\n\n        // 审计\n        $processor->CreateAudit('已向供应商发送发货邮件。',\
  \ 20502);\n\n        // 更新订单状态\n        $processor->UpdateOrderStatus(6);\n\n  \
  \      // 审计\n        $processor->CreateAudit('PsShipGoods 处理完成。', 20501);\n   \
  \ }\n```\n\n与之前一样，一个名为 `GetMailBody` 的私有方法用于构建发送给供应商的邮件正文：\n\n```php\n    private\
  \ function GetMailBody()\n    {\n        $body = '已收到以下商品的付款：';\n        $body.=\
  \ \"\\n\\n\";\n        $body.= $this->_mProcessor->GetOrderAsString(false);\n  \
  \      $body.= \"\\n\\n\";\n        $body.= '请发货至：';\n        $body.= \"\\n\\n\"\
  ;\n        $body.= $this->_mProcessor->GetCustomerAddressAsString();\n        $body.=\
  \ \"\\n\\n\";\n        $body.= '货物发出后，请通过以下链接确认：' .\n            'http://www.hatshop.com/admin.php';\n\
  \        $body.= \"\\n\\n\";\n        $body.= '订单参考号：';\n        $body.= $this->_mProcessor->mOrderInfo['order_id'];\n\
  \        return $body;\n    }\n}\n?>\n```\n\n当此流水线阶段完成后，处理将暂停。稍后，当供应商确认订单已发货后，处理将进入\
  \ `PsShipOk`。\n\n## PsShipOk\n\n此流水线部分与 `PsStockOk` 非常相似，但它要处理的事情稍多一些。由于你已经知道商品已发出，因此可以在订单表中添加一个发货日期值。从技术上讲，这并不是必需的，因为所有审计条目都带有日期。但是，这种做法的好处是你可以在一个数据库表中轻松访问所有信息。请在\
  \ business 文件夹中新建一个名为 `ps_ship_ok.php` 的文件，并添加以下代码：\n\n```php\n<?php\n\nclass PsShipOk\
  \ implements IPipelineSection\n{\n    public function Process($processor)\n    {\n\
  \        // 审计\n        $processor->CreateAudit('PsShipOk 已启动。', 20600);\n\n   \
  \     // 设置订单发货日期\n        $processor->SetDateShipped();\n\n        // 审计\n    \
  \    $processor->CreateAudit('订单已由供应商发出。', 20602);\n\n        // 更新订单状态\n      \
  \  $processor->UpdateOrderStatus(7);\n\n        // 继续处理\n        $processor->mContinueNow\
  \ = true;\n\n        // 审计\n        $processor->CreateAudit('PsShipOk 处理完成。', 20601);\n\
  \    }\n}\n?>\n```\n\n当此流水线阶段完成后，处理将直接进入 `PsFinalNotification`。\n\n## PsFinalNotification\n\
  \n这最后一个流水线部分与第一个非常相似，因为它会向客户发送一封电子邮件。不过，这次是在确认订单已发货。请在 business 文件夹中新建一个名为 `ps_final_notification.php`\
