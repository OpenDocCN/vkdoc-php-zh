- "# 4. 构建动态图像画廊\n\n## 目标\n\n完成本章后，你将能够\n\n*   设置动态网站\n*   创建命名函数\n*   使用 `$_GET`\
  \ 和 `$_POST` 超全局数组\n*   使用 `foreach` 循环创建和迭代\n*   使用 PHP 的 `glob` 限制对特定文件类型的访问\n\
  *   编写自定义对象方法\n*   使用 PHP 的 `$_FILES` 超全局数组上传文件\n\n我们现在知道如何制作一个简单的动态网站。我们也知道如何创建动态表单。我们学习了如何使用\
  \ `$_GET` 或 `$_POST` 访问 URL 变量。是时候好好利用我们的新知识了。让我们构建一个动态图像画廊，并带有一个表单，允许用户向画廊上传新图像。在此过程中，我们将学习如何上传文件、使用循环以及提高创建动态网站的能力。\n\
  \n## 设置动态网站\n\n让我们创建一个名为 `ch4` 的新项目文件夹。然后我们可以从出版商网站将文件夹和 PHP 文件复制到这些位置。当然，你也可以在阅读本章时逐步创建文件。熟能生巧。如果选择这样做，你需要创建几个文件夹：`classes`、`views`、`templates`\
  \ 和 `imgs`。\n\n## 先决条件：一个包含一些图像的文件夹\n\n我们的图像画廊需要一些图像。我们将限制此图像画廊仅使用 JPEG 图像。让我们为画廊准备少量\
  \ JPEG 图像。这些图像将存放在 `img` 文件夹中。\n\n## 版权法\n\n作为开发者，我们必须了解我们网站可能使用的任何国家/地区的*版权法*。我们必须尊重并遵守这些法律。在美国，图像通常受版权保护，这意味着我们必须征得所有者的许可才能使用该图像。有一些例外情况，包括教育目的。但是，我们不应该养成看到喜欢的图片就随意抓取的习惯。\n\
  \n如何判断图像是否受版权保护？\n\n![](img/323857_3_En_4_Fig1_HTML.jpg)\n\n该图像反映了我们在搜索栏中搜索“green\
  \ pig”时谷歌的显示方式。\n\n**图 4-1** 谷歌搜索 green pig\n\n在谷歌中，`Tools` 菜单选项允许你根据图像使用的限制类型来缩小搜索结果范围。然而，这并不是一个完美的方法（即使谷歌也同意这一点）。一旦你发现可能不受版权保护的图像，请访问包含该图像的网站。在网站上查找版权信息。如果你仍然不确定，请发送电子邮件给网站所有者以获得使用该图像的许可。一旦收到回复（如果收到的话），请保存该电子邮件。它可以在以后帮你避免麻烦。\n\
  \n获取非版权图像最安全的方法是在网上搜索非版权图像网站。网上有很多这样的网站。有些是免费的，有些则收取少量费用。这笔费用非常值得，可以避免未来的任何问题！\n\
  \n**练习**：搜索你所在国家、地区或州/省的版权法。这些法律与其他地区有何不同？请记住，你必须遵守可能使用你网站的国家的所有版权法。在网上搜索一些非版权图像，用于我们将要创建的照片画廊。\n\
