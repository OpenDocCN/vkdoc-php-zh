  trans: '

    GET 方法也可通过 HTTP Socket 工具执行。序列化的 GET 名称和值组通常附加到 URL 字符串上，因此在使用 `HttpSocket::get()`
    函数时，你可以将 GET 查询作为第二个参数提供。GET 响应的内容会返回给变量，因此如果服务器返回了一些 HTML、错误信息或 HTTP 标头，它们都将以返回字符串的形式出现。


    `$response = $http->get(''http://domain.com/'');`


    要抓取其他网站的页面或执行其他 HTTP 请求，请使用 `HttpSocket::request()` 函数。该函数将执行一个 HTTP 请求，并返回原始的服务器响应，无论它是一个网页还是其他文本。


    `$response = $http->request(''http://domain.com/web_page.html'');`


    ## 使用其他 HTTP Socket 函数


    HTTP Socket 工具中的其他函数包括 `buildHeader()`、`buildRequestLine()`、`buildUri()`、`decodeBody()`、`delete()`、`parseHeader()`、`parseUri()`、`put()`
    等。在考虑如何为你的网站执行 HTTP 请求或 socket 方法时，请查阅此工具，它很可能包含有用的函数，能最大限度地减少你需要编写的代码量。


    ## 本地化与国际化


    对于拥有国际受众的网站来说，翻译网站内容可能比较困难。近年来，一些重要的本地化（L10n）和国际化（I18n）标准已在 Web 及其他软件系统中得到实施。Cake
    利用 L10n 和 I18n 的标准和方法，并通过各自的工具来实现。


    > **注意** `L10n` 和 `I18n` 中的“10”和“18”分别代表单词 *localization* 和 *internationalization*
    首尾字母之间的字母数量。（开发者经常使用这些术语，以至于拼写出完整单词耗时过长。）Cake 的工具类使用这些缩写形式命名，而非全称，因此本地化工具类在核心中被命名为
    `L10n`，而非 Localization。


    ## 使用区域设置文件


    要本地化一个网站，或者说，使网站内容符合访问者的语言、数字系统、货币及其他标准，请使用 `L10n` 工具。例如，如果西班牙的用户需要使用该应用程序，你可能需要将一些重要的标题、按钮、链接及其他字符串翻译成西班牙语。为此，你必须首先为
    `L10n` 设置西班牙语地区或地区文件，以便在翻译中使用。


    地区文件存储在 `app/locale` 目录中，并按语言或地区命名的子文件夹进行组织。`L10n` 使用的名称和字符串符合 ISO 639–2 标准（更多信息，请咨询作为该标准官方注册机构的美国国会图书馆：[`www.loc.gov/standards/iso639-2/`](http://www.loc.gov/standards/iso639-2)）。地区文件使用
    `.po` 文件扩展名，并按地区组织。


    默认情况下，Cake 包含了英语区域文件夹 `app/locale/eng`。在它里面，你会看到另一个子文件夹 `LC_MESSAGES`，其中包含用于翻译字符串和消息的地区文件。对于你想要本地化的每种语言，创建一个
    `default.po` 文件并将其存储在其区域文件夹中。例如，对于西班牙语，你不仅需要为 `app/locale/eng/LC_MESSAGES` 目录创建
    `default.po` 文件，还需要为 `app/locale/spa/LC_MESSAGES` 文件夹创建一个。下一步是在这些区域文件中写入你想要翻译的字符串。


    ## 翻译字符串


    通过使用两个键：`msgid` 和 `msgstr`，翻译字符串变得非常简单。在 `default.po` 区域文件中，为每一行提供其中一个键及其关联值。例如，在英语区域文件中，你可以包含清单
    11-11 的内容。


    **清单 11-11.** *英语区域文件内容示例*


    ```

    msgid

    "home"

    msgstr

    "Welcome to Our Site"


    msgid "contact"

    msgstr

    "Contact Us"


    msgid

    "login"

    msgstr "Log In"

    ```

