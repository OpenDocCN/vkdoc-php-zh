    # 融会贯通


    程序开发生命周期（`PDLC`）引导我们完成应用开发的整体设计与创建过程。应用开发成功的关键在于，在开始编码和开发之前，对系统布局进行合理规划。这样做可以减少可能出现的错误和问题的数量。许多项目可能会陷入开发者因前期规划不足而无法摆脱的"困境"。不同的作者和讲师对规划过程所需时间的估算各不相同，因为这取决于个人情况。技能更娴熟或经验更丰富的人可能比不那么自信的人所做的规划要少。然而，每个人至少都会规划出所需的模块以及模块之间流动的数据类型，即使只是在草稿纸上完成。另一个关键点在于，要在编码和开发过程中不断修正你的计划。当你开始编码时，你会发现自己"没想到"某些情况。这时应立即返回并调整你的计划。你越常这样做，就越不可能陷入找不到解决办法的"困境"。


    在`PDLC`过程中，始终要邀请用户参与，并组建一支强大的专家团队。请记住，你开发这个项目是为了让你的客户满意。你或许自认为拥有终极的设计和解决方案。然而，如果用户不认同你，那一切都没有意义。有时你确实需要调整自己的思路，使其与客户更加一致。在行业工作中，我记得在我的工作组内曾开发过一个重大的变更管理系统（我很庆幸自己没有参与这个项目）。设计人员和编码人员创建了一个非常花哨且昂贵的系统，但一旦在数据中心实施后，却几乎无人使用。为什么？数据中心的工作人员并不想要一个花哨的系统；他们想要一个能快速完成所需任务的简单系统。尽管原始项目耗时六个月才完成，但一名数据中心员工利用自己的几个周末时间创建了另一个能满足他们需求的系统。那个系统后来被投入使用，并沿用了许多年。


    通常，`PDLC`被定义为五个步骤：规划与信息收集、分析、设计、实施和评估。在规划与信息收集步骤中，需要汇集项目及项目团队的所有需求。同时还会创建初步文档，以回答以下问题："我们试图完成什么？"、"我们将如何完成它？"以及"我们将使用什么团队？"。在分析步骤中，需要确定项目的可行性。文档会回答以下问题："我们能否利用现有团队和资源完成项目？"、"还需要收集哪些额外资源？"以及"能否在给定的时间框架和预算内完成项目？"如果项目通过了分析步骤（许多项目未能通过），那么实际设计就开始了。在设计阶段，采用自上而下的方法，首先着眼于所需的整体模块以及模块之间的数据流。随着所需方法的确定、平台的选择、通信工具的整合以及信息存储的设计，会逐步添加更多细节。


    在详细设计创建并获批后，项目进入开发和测试阶段。将进行单元测试（单个模块）和完整的应用程序测试。测试成功完成后，项目便可进入实施步骤。在实施过程中，必须决定如何安装项目以及何时安装。实施完成后，应用程序便"上线"了。但仍应持续进行评估，以确定效率需求、安全问题、逻辑问题以及可能对项目进行的整体增强。最终，大多数项目将返回该流程的第一步，以开发新版本。


    本节假设规划与信息收集以及分析步骤已成功完成，这将使你进入设计步骤。我们将大致探讨确定应用程序各层中应发生何种类型活动的过程。我们还将研究可能在层之间流动的数据或信息类型。在后续章节中，我们将通过确定所需的方法类型以及必须流入和流出这些方法的信息和数据，来完善这一分析。我们还将研究为这些方法创建的实际活动和代码。


    最好的学习方式是边做边学，因此让我们来看一个案例问题，并由此展开。'
- fmt: "# Case Study\n\n**Company**: Atomic Fish Hatchery, Inc.  \n**Project**: Field\
    \ Sales Ordering and Commission Application  \n**Scope**: This application will\
    \ be accessible from multiple devices (mobile and PC) to allow field sales agents,\
    \ managers, and payroll personnel easy access to necessary information. The system\
    \ will accept information from the sales agent that will be used to determine\
    \ purchase costs to the customer, sales volume for the sales manager, and commissions\
    \ for the payroll department. Phase one of the project is the development of the\
    \ application to accept information from the sales agents, display purchase cost,\
    \ determination of commissions, and storage of the information into a `MySQL`\
    \ database. After successful testing the platform, it will be moved and secured\
    \ in the company’s cloud platform.  \n**Inputs (from Sales Agent)**: Sales Agent\
    \ Number, Customer Number, Order Number, Item Number, Quantity, and Special Needs\
    \  \n**Outputs**: (Additional information may be determined for future phases)\
    \  \n**To database**: In addition to the input from the sales agent: commission,\
    \ sales total  \n\nThe goal is to determine the types of information and processes\
    \ that will occur in each tier and the data flow between the tiers. Once determined,\
    \ this information could be used to develop a general empty structure of tiers\
    \ that would eventually hold the completed project.\n\n## Interface Tier\n\nThe\
    \ company has requested access from multiple devices. Thus, we must keep in mind\
    \ that mobile devices (tablets and smart phones) will be used to input and output\
    \ information in addition to laptops and PCs. We may decide to create multiple\
    \ interfaces for each type of device. With three-tier design, you could design\
    \ a system that shares the business rules tier and data tier contents while allowing\
    \ this flexibility.\n\nAs a designer and/or programmer, you must determine the\
    \ type of information that will be entered; several fields (Sales Agent Number,\
    \ Customer Number, Order Number, Item Number, and Quantity) all indicate that\
    \ numbers will be entered. You need to determine the size of these fields and\
    \ verify that only numeric information is entered. The Amount field is the only\
    \ field that possibly could be used in a future calculation. Therefore, all other\
    \ fields can remain in text format. The Amount field would need to be converted\
    \ to `Integer` format (whole numbers) before passing the information to the business\
    \ rules tier. The Special Needs field would be a larger field that can accept\
    \ alphanumeric characters. The database does not currently exist, so we must determine\
    \ field sizes from company policy and/or current paper forms used. Once reviewed,\
    \ it has been determined that the customer and sales agent numbers are eight characters.\
    \ The order number and item numbers are six characters.\n\nAfter gathering this\
    \ information, you can now design the top view of the interface tier, as shown\
    \ in Figure [2-9](#394210_2_En_2_Chapter.xhtml#Fig9).\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig9_HTML.jpg](images/394210_2_En_2_Chapter/394210_2_En_2_Fig9_HTML.jpg)\n\
    \nFigure 2-9  \nAtomic Fish Hatchery, Inc. sales and order application interface\n\
    \nFields with `+` may be used more than once to enter in all information by the\
    \ sales agent. When the actual datasets and data tables are created, multiple\
    \ columns must be available for these entries.\n\nAn additional form (not pictured)\
    \ would also exist to display the results of the order. This form would display\
    \ a summary of the items purchased and the total cost. All information could be\
    \ entered by the sales agent, submitted, and held in the interface tier (a cookie?),\
    \ until the sales agent indicated that the order is complete. Then the information\
    \ could be transferred to the business rules tier for processing. The business\
    \ rules tier could then return the information to be displayed in the second form.\
    \ The second form could include an “approved” (or cancel) button. Once “approved,”\
    \ the information could then be passed to the data tier for storage.\n\n## Business\
    \ Rules Tier\n\nThe business rules tier would include two processes. One process\
    \ would accept the complete order (dataset/data table) and determine the total\
    \ sales cost after the sales agent clicked a “competed order” button. It would\
    \ then return a summary of this information to the second form. The other process\
    \ would execute when the agent clicks an “approved” button. The process would\
    \ then determine the commission and create a dataset (there are now additional\
    \ fields) to be passed to the data tier. The information would then be passed\
    \ for storage.\n\nAdditionally, to make sure order data is valid, methods would\
    \ be needed to validate the fields received from the interface. Security of all\
    \ data transferred is vital. Any data moving between tiers will need to pass security\
    \ validation before being processed. The top view of the Business Rules Tier would\
    \ be the one shown in Figure [2-10](#394210_2_En_2_Chapter.xhtml#Fig10).\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig10_HTML.jpg](images/394210_2_En_2_Chapter/394210_2_En_2_Fig10_HTML.jpg)\n\
    \nFigure 2-10  \nAtomic sales and order application business rules tier\n\n##\
    \ Data Tier\n\nIn this case, the data tier is only used to store the information\
    \ provided by the business rules tier. The tier would verify the information received\
    \ and store it into the database, as shown in Figure [2-11](#394210_2_En_2_Chapter.xhtml#Fig11).\n\
    \n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig11_HTML.jpg](images/394210_2_En_2_Chapter/394210_2_En_2_Fig11_HTML.jpg)\n\
    \nFigure 2-11  \nAtomic sales and order application data tier\n\nThere are many\
    \ tools available to help in the design process. The important factor is that\
    \ the designer includes all the important information in the process. As an alternative\
    \ to the example, you could remove the description of the datasets from the tiers\
    \ and place them in the data flow between the tiers, as shown in Figure [2-12](#394210_2_En_2_Chapter.xhtml#Fig12).\n\
    \n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig13a_HTML.jpg](images/394210_2_En_2_Chapter/394210_2_En_2_Fig13a_HTML.jpg)![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig13b_HTML.jpg](images/394210_2_En_2_Chapter/394210_2_En_2_Fig13b_HTML.jpg)\n\
    \nFigure 2-13  \nAtomic sales and order application three-tier model\n\n![../images/394210_2_En_2_Chapter/394210_2_En_2_Fig12_HTML.jpg](images/394210_2_En_2_Chapter/394210_2_En_2_Fig12_HTML.jpg)\n\
    \nFigure 2-12  \nAlternate three-tier model\n\n## Do It\n\n1. When must you convert\
    \ numbers to numeric form (such as `Integer`) for storage within a database?\n\
    2. Why use datasets to pass information between tiers?\n3. What items have been\
    \ missed or ignored in the case example?\n\n## MVC and Dependency Injection\n\n\
    MVC (Model-View-Controller) is a design pattern used by software engineers (including\
    \ PHP application designers) to communicate between the view and model using a\
    \ controller. The *controller* is software that transfers any user input to the\
    \ model. MVC design can be considered circular because the model, controller,\
    \ and view have the ability to communicate with each other. The standard three-tier\
    \ model is linear; for the Interface to receive or pass information to the data\
    \ tier, it must pass the information through the business rules tier. There are\
    \ many tools on the market (such as Ruby on Rails) that can assist software engineers\
    \ in designing MVC applications.\n\n- Visit [https://rubyonrails.org/](https://rubyonrails.org/)\
    \ for an example of an MVC application."
