    **178**


    C H A P T E R 1 0 ■ R O U T E S


    Verbose Linking


    To reverse a route, you first must use the verbose method for writing links. Instead
    of writing a path string in the $html->link() function, you include some URL parameters
    in an array like this:


    $html->link(''View Post'',array(''controller''=>''posts'',''action''=>''view'',$post➥


    [''Post''][''id'']));


    This array does not tell the function what the URL path is but rather gives it
    the necessary parameters to construct the path dynamically. Although this array
    does result in more characters being entered to put a link together, it allows
    you to use the router to intercept any links in the entire application in one
    place, the routes.php configuration file, and not have to go back and find links
    that needed changing.


    To complete the reverse route, you need to enter only a new connection string
    in the routes.php configuration that changes the route:


    Router::connect(''/articles/*'', array(''controller''=>''posts'',''action''=>''view''));
    Without using the verbose array in the $html->link() function, the router would
    still try to access the Posts controller and the word *posts* would still appear
    in the URL. However, now that you’ve specified that you want the word *articles*
    to link up with the Posts controller, the router will construct the paths in the
    application for you. Wherever links call for both the Posts controller and the
    View action, the router will substitute *articles* in the path. For example, the
    link that would normally point here:


    /posts/view/25'
