- fmt: "#### Handling Exceptions\n\nPHP 5 introduced a new way of handling errors,\
    \ common to many other programming languages, known as exceptions. When a problem\
    \ arises, many built-in classes automatically throw an exception—or generate a\
    \ special type of object that contains details of what caused the error and where\
    \ it arose. You can also throw custom exceptions, using the keyword `throw`, like\
    \ this:\n\n```\nif (error occurs) {\n    throw new Exception('Houston, we have\
    \ a problem');\n}\n```\n\nThe string inside the parentheses is used as the error\
    \ message. Obviously, in a real script, you need to make the message more explicit.\
    \ When an exception is thrown, you should deal with it in a separate code block\
    \ called—appropriately enough—`catch`.\n\nWhen using objects, wrap your main script\
    \ in a block called `try` and put the error-handling code in a `catch` block.\
    \ If an exception is thrown, the PHP engine abandons the code in the `try` block\
    \ and executes only the code in the `catch` block. The advantage is that you can\
    \ use the `catch` block to redirect the user to an error page rather than displaying\
    \ an ugly error message onscreen—or a blank screen if the display of error messages\
    \ is turned off, as it should be on a live website.\n\n> **Note**: The `try` and\
    \ `catch` blocks must always be used as a pair. You can’t have one without the\
    \ other.\n\nDuring the development stage, you should use the `catch` block to\
    \ display the error message generated by the exception like this:\n\n```\ntry\
    \ {\n    // main script goes here\n} catch (Exception $e) {\n    echo $e->getMessage();\n\
    }\n```\n\nThis produces an error message that’s usually much easier to understand\
    \ than the lengthy message generated by a recoverable error. In the case of the\
    \ previous problem, it would output “Houston, we have a problem.” Although I advised\
    \ you earlier to use descriptive variable names, using `$e` for an exception is\
    \ a common convention.\n\n> **Tip**: Congratulations if you’ve managed to read\
    \ this far. You should now have sufficient knowledge to get started. The rest\
    \ of this chapter goes into greater detail about individual aspects of writing\
    \ PHP scripts. Rather than plowing straight on, I suggest you take a short break\
    \ and then move on to the next chapter. Come back to the following reference section\
    \ when you’ve gained some practical experience of working with PHP, as it will\
    \ make much more sense then.\n\n## PHP: A Quick Reference\n\nThe following sections\
    \ don’t attempt to cover every aspect of PHP syntax. For that, you should refer\
    \ to the PHP documentation at [`http://php.net/manual/en/`](http://php.net/manual/en/)\
    \ or check out a more detailed reference book, such as *Beginning PHP and MySQL:\
    \ From Novice to Professional, Fourth Edition* by W. Jason Gilmore (Apress, 2010,\
    \ ISBN: 978-1-4302-3114-1).\n\n### Using PHP in an Existing Website\n\nThere is\
    \ no problem mixing `.html` and `.php` pages in the same website. However, PHP\
    \ code will normally be processed only in files that have the `.php` filename\
    \ extension, so it’s a good idea to give the same extension to all your pages,\
    \ even if they don’t all contain dynamic features. That way, you have the flexibility\
    \ to add PHP to pages without breaking existing links or losing search engine\
    \ rankings.\n\n### Data Types in PHP\n\nPHP is what’s known as a weakly typed\
    \ language. In practice, this means that, unlike some other computer languages\
    \ (e.g., Java or C#), PHP doesn’t care what type of data you store in a variable.\n\
    \nMost of the time, this is very convenient, although you need to be careful with\
    \ user input. You may expect a user to enter a number in a form, but PHP won’t\
    \ object if it encounters a word instead. Checking user input carefully is one\
    \ of the major themes of later chapters.\n\nEven though PHP is weakly typed, it\
    \ uses the following eight data types:\n\n- **Integer**: This is a whole number,\
    \ such as 1, 25, 42, or 2006. Integers must not contain any commas or other punctuation\
    \ as thousand separators. You can also use hexadecimal numbers, which should be\
    \ preceded by `0x` (e.g., `0xFFFFFF`, `0x000000`).\n- **Floating-point number**:\
    \ This is a number that contains a decimal point, such as 9.99, 98.6, or 2.1.\
    \ PHP does not support the use of the comma as the decimal point, as is common\
    \ in many European countries. You must use a period. Like integers, floating-point\
    \ numbers must not contain thousand-separators. (This type is also referred to\
    \ as float or double.)\n- **String**: A string is text of any length. It can be\
    \ as short as zero characters (an empty string) and has no upper limit.\n- **Boolean**:\
    \ This type has only two values: `true` or `false`. However, PHP treats other\
    \ values as implicitly true or false. See “The truth according to PHP” later in\
    \ this chapter.\n- **Array**: An array is a variable capable of storing multiple\
    \ values, although it may contain none at all (an empty array). Arrays can hold\
    \ any data type, including other arrays. An array of arrays is called a multidimensional\
    \ array. See “Creating arrays” later in this chapter for details of how to populate\
    \ an array with values.\n- **Object**: An object is a sophisticated data type\
    \ capable of storing and manipulating values. You’ll learn more about objects\
    \ in [Chapter 6](#A978-1-4842-0635-5_6_Chapter.html).\n- **Resource**: When PHP\
    \ connects to an external data source, such as a file or database, it stores a\
    \ reference to it as a resource.\n- **NULL**: This is a special data type that\
    \ indicates that a variable has no value.\n\nAn important side effect of PHP’s\
    \ weak typing is that if you enclose an integer or floating-point number in quotes,\
    \ PHP automatically converts it from a string to a number, allowing you to perform\
    \ calculations without the need for any special handling. This is different from\
    \ JavaScript, and it can have unexpected consequences. When PHP sees the plus\
    \ sign (`+`), it assumes you want to perform addition, and thus it tries to convert\
    \ strings to integers or floating-point numbers, as in the following example (the\
    \ code is in `data_conversion_01.php` in the `ch03` folder):\n\n```\n$fruit =\
    \ '2 apples';\n$veg = ' 2 carrots';\necho $fruit + $veg;  // displays 4\n```\n\
    \nPHP sees that both `$fruit` and `$veg` begin with a number, so it extracts the\
    \ number and ignores the rest. However, if the string doesn’t begin with a number,\
    \ PHP converts it to 0, as shown in this example (the code is in `data_conversion_02.php`):\n\
    \n```\n$fruit = '2 apples';\n$veg = ' and 2 carrots';\necho $fruit + $veg;  //\
    \ displays 2\n```\n\nWeak typing is a mixed blessing. It makes PHP very easy for\
    \ beginners, but it means you often need to check that a variable contains the\
    \ correct data type before using it.\n\n### Doing Calculations with PHP\n\nPHP\
    \ is highly adept at working with numbers and can perform a wide variety of calculations,\
    \ from simple arithmetic to complex math. This reference section covers only the\
    \ standard arithmetic operators. See [`http://php.net/manual/en/book.math.php`](http://php.net/manual/en/book.math.php)\
    \ for details of the mathematical functions and constants supported by PHP.\n\n\
    > **Note**: A constant is similar to a variable in that it uses a name to represent\
    \ a value. However, the value of a constant, once defined, cannot be changed.\
    \ All PHP predefined constants are in uppercase. Unlike variables, they do not\
    \ begin with a dollar sign. For example, the constant for π (pi) is `M_PI`."
