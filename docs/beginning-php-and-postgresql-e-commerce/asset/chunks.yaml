- fmt: "# Chapter 12: Storing Customer Orders\n\n## Updating the `UpdateOrder` Method\n\
    \nModify the `UpdateOrder` method of the `Orders` class as follows:\n\n```php\n\
    // Updates order details\npublic static function UpdateOrder($orderId, $status,\
    \ $comments, $authCode, $reference)\n{\n    // Build the SQL query\n    $sql =\
    \ 'SELECT orders_update_order(:order_id, :status, :comments,\n            :auth_code,\
    \ :reference);';\n\n    // Build the parameters array\n    $params = array (':order_id'\
    \ => $orderId,\n                     ':status' => $status,\n                 \
    \    ':comments' => $comments,\n                     ':auth_code' => $authCode,\n\
    \                     ':reference' => $reference);\n\n    // Prepare the statement\
    \ with PDO-specific functionality\n    $result = DatabaseHandler::Prepare($sql);\n\
    \n    // Execute the query\n    return DatabaseHandler::Execute($result, $params);\n\
    }\n```\n\n## Adding the `GetCustomersList` Method\n\nAdd a new method named `GetCustomersList`\
    \ to the `Customer` class in `business/customer.php`:\n\n```php\n// Gets all customers\
    \ names with their associated id\npublic static function GetCustomersList()\n\
    {\n    // Build the SQL query\n    $sql = 'SELECT * FROM customer_get_customers_list();';\n\
    \n    // Prepare the statement with PDO-specific functionality\n    $result =\
    \ DatabaseHandler::Prepare($sql);\n\n    // Execute the query and return the results\n\
    \    return DatabaseHandler::GetAll($result);\n}\n```\n\n## Presentation Tier\
    \ Modifications\n\nNow you need to update the presentation tier to make use of\
    \ the new data tier and business tier features. You're not going to implement\
    \ massive changes to the order administration code at this stage because you'll\
    \ just end up modifying it later after you've finished the new order-processing\
    \ system.\n\nFigure 12-1 shows the `admin_orders` template. This page gives administrators\
    \ various means of filtering current orders.\n\n![admin_orders template](images/00165.png)\n\
    ![admin_orders template](images/00023.png)\n\n**Figure 12-1.** *The orders_admin\
    \ template in action*\n\nNo matter what selection method you use, you'll get a\
    \ list with the orders that match the criteria. In Figure 12-2, you can see the\
    \ two orders I've just placed.\n\n**Figure 12-2.** *The orders admin page*\n\n\
    The `admin_order_details` template looks like Figure 12-3. Notice also the Tax\
    \ and Shipping data, which you'll add later in this chapter.\n\n![admin_order_details\
    \ template](images/00098.png)\n\n**Figure 12-3.** *Administering order details*\n\
    \n### Exercise: Modifying the Presentation Tier\n\nAdd the highlighted piece of\
    \ code to `presentation/templates/admin_orders.tpl`:\n\n```smarty\n<form action=\"\
    {\"admin.php\"|prepare_link:\"https\"}\" method=\"get\">\n\n<input name=\"Page\"\
    \ type=\"hidden\" value=\"Orders\" />\n\n<span class=\"admin_page_text\">Show\
    \ orders by customer</span>\n<select name=\"customer_id\">\n{section name=cCustomers\
    \ loop=$admin_orders->mCustomers}\n<option value=\"{$admin_orders->mCustomers[cCustomers].customer_id}\"\
    \n{if $admin_orders->mCustomers[cCustomers].customer_id ==\n$admin_orders->mCustomerId}selected=\"\
    selected\"{/if}>\n{$admin_orders->mCustomers[cCustomers].name}\n</option>\n{/section}\n\
    </select>\n\n<input type=\"submit\" name=\"submitByCustomer\" value=\"Go!\" />\n\
    <br /><br />\n\n<span class=\"admin_page_text\">Get by order ID</span>\n<input\
    \ name=\"orderId\" type=\"text\"\nvalue=\"{$admin_orders->mOrderId}\" />\n<input\
    \ type=\"submit\" name=\"submitByOrderId\" value=\"Go!\" />\n<br /><br />\n\n\
    <span class=\"admin_page_text\">Show the most recent</span>\n```"
