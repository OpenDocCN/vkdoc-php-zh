    \n**注意**  \n数组的合并顺序与数组联合运算符不同。数组联合运算符保留第一个重复值，而`array_merge()`保留最后一个重复值。\n\n要保留重复键的值，需要使用`array_merge_recursive()`。`merge_07.php`中的代码合并了相同的数组，如下所示：\n\
    \n```\n$lead_developers = array_merge_recursive($first, $second);\n```\n\n如下所示，重复键的值被合并到一个索引子数组中：\n\
    ![../images/332054_4_En_8_Chapter/332054_4_En_8_Figo_HTML.jpg](img/332054_4_En_8_Figo_HTML.jpg)\n\
    Robert Gentleman 的名字被存储在新数组中，即`$lead_developers['R'][0]`。\n\n**注意**  \n数组联合运算符、`array_merge()`和`array_merge_recursive()`可应用于两个以上的数组。关于重复键和值的规则相同。对于`array_merge()`，始终保留最后一个重复值。\n\
    \n## 将两个索引数组合并为关联数组\n\n`array_combine()`函数将两个索引数组合并成一个关联数组，它使用第一个数组作为键，第二个数组作为值。两个数组必须具有相同数量的值，否则函数返回`false`并触发警告。\n\
    \n以下`array_combine.php`中的简单示例展示了其工作原理：\n\n```\n$colors = ['red', 'amber', 'green'];\n\
    $actions = ['stop', 'caution', 'go'];\n$signals = array_combine($colors, $actions);\n\
    // $signals 为 ['red' => 'stop', 'amber' => 'caution', 'green' => 'go']\n```\n\n\
    **提示**  \n请参见 PHP 解决方案 7-2 “从 CSV 文件中提取数据”，了解`array_combine()`的实际应用。\n\n## 比较数组\n\
    \n表 8-1 列出了可用于查找数组差异或交集的 PHP 核心函数。表中的所有函数都接受两个或更多数组作为参数。如果使用回调函数进行比较，则回调函数应作为传递给函数的最后一个参数。\n\
    \n**表 8-1.** 用于比较数组的 PHP 函数\n\n| 函数 | 描述 |\n| --- | --- |\n| `array_diff()` |\
    \ 将第一个数组与一个或多个其他数组进行比较。返回第一个数组中存在而其他数组中不存在的值数组。 |\n| `array_diff_assoc()` | 类似于`array_diff()`，但在比较中同时使用数组键和值。\
    \ |\n| `array_diff_key()` | 类似于`array_diff()`，但基于键而非值进行比较。 |\n| `array_diff_uassoc()`\
    \ | 与`array_diff_assoc()`相同，但使用用户提供的回调函数来比较键。 |\n| `array_diff_ukey()` | 与`array_diff_key()`相同，但使用用户提供的回调函数来比较键。\
    \ |\n| `array_intersect()` | 比较两个或多个数组。返回一个包含第一个数组中所有在其他数组中也存在的值的数组。键会被保留。 |\n\
    | `array_intersect_assoc()` | 类似于`array_intersect()`，但在比较中同时使用数组键和值。 |\n| `array_intersect_key()`\
    \ | 返回一个包含第一个数组中所有键在其他数组中也存在的条目。 |\n| `array_intersect_uassoc()` | 与`array_intersect_assoc()`相同，但使用用户提供的回调函数来比较键。\
    \ |\n| `array_intersect_ukey()` | 与`array_intersect_key()`相同，但使用用户提供的回调函数来比较键。\
    \ |\n\n我不会详细介绍每个函数，但让我们通过比较以下两个数组，看看`array_diff_assoc()`和`array_diff_key()`返回的不同结果：\n\
    \n```\n$first = [\n'PHP' => 'Rasmus Lerdorf',\n'JavaScript' => 'Brendan Eich',\n\
    'R' => 'Robert Gentleman'];\n$second = [\n'Java' => 'James Gosling',\n'R' => 'Ross\
    \ Ihaka',\n'Python' => 'Guido van Rossum'];\n$diff = array_diff_assoc($first,\
    \ $second); // $diff 等同于 $first\n```\n\n`array_diff_assoc()`会同时检查键和值，返回存在于第一个数组但不存在于其他数组中的元素。在此示例中，尽管两个数组都包含键\
    \ R，但第一个数组中的所有三个元素都被返回，这是因为分配给 R 的值不同。\n\n```\n$diff = array_diff_key($first,\
    \ $second);\n// $diff 为 ['PHP' => 'Rasmus Lerdorf','JavaScript' => 'Brendan Eich']\n\
    ```\n\n然而，`array_diff_key()`只检查键，忽略值。结果，它返回第一个数组的前两个元素，但不返回第三个，因为 R 作为键存在于第二个数组中。分配给\
    \ R 的值不同这一事实无关紧要。\n\n`ch08`文件夹包含了表 8-1 中其他函数的简单示例，并附有简要的说明注释。`*_uassoc()`和`*_ukey()`版本需要一个回调函数作为最后一个参数来比较每个元素的键。回调函数必须接受两个参数，如果第一个参数分别小于、等于或大于第二个参数，则返回一个小于、等于或大于零的整数。`ch08`文件夹中的示例使用了内置的\
    \ PHP `strcasecmp()`函数来执行不区分大小写的比较，如果两个字符串被认为相等，则返回`0`。\n\n**提示**  \n比较两个值最有效的方式是使用飞船运算符，这是\
    \ PHP 7 的新特性。您将在本章后面的 PHP 解决方案 8-5 “使用飞船运算符进行自定义排序”中看到一个示例。\n\n## PHP 解决方案 8-4：用逗号连接数组\n\
    \n内置的 PHP `implode()`函数使用用户提供的字符串连接数组的所有元素。此 PHP 解决方案通过在最后一个元素前插入 “and” 来增强输出，并提供限制元素数量的选项，将多余的值替换为\
    \ “and one other” 或 “and others”。\n\n1. 打开`ch08`文件夹中的`commas_01.php`。它包含一系列索引数组，每个数组包含\
    \ 0 到 5 个来自 1960 年代和 1970 年代的录音艺术家的名字。最后一行使用`implode()`以逗号连接最后一个数组：\n\n```\n \
    \   $too_many = ['Dave Dee', 'Dozy', 'Beaky', 'Mick', 'Tich'];\n    echo implode(',\
    \ ', $too_many);\n```\n\n2. 在浏览器中加载该脚本。如下面的截图所示，输出看起来不自然，因为在最后一个名字前缺少 “and”：\n\
    \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figp_HTML.jpg](img/332054_4_En_8_Figp_HTML.jpg)\n\
    \n3. 删除最后一行，并像这样开始定义一个函数：\n\n```\n    function with_commas(array $array, $max\
    \ = 4) { }\n```\n"
- fmt: "The function signature takes two arguments: `$array` and `$max`. `$array`\
    \ is preceded by a type declaration for an array, so the function will trigger\
    \ an error if any other type of data is passed to it. `$max` sets the maximum\
    \ number of elements to be joined. It has a default value of `4`, so it’s an optional\
    \ argument.\n\nInside the function, we can use a `switch` statement to determine\
    \ how to handle the output depending on the number of elements in the array:\n\
    \n```\nswitch (count($array)) {\ncase 0:\nreturn '';\ncase 1:\nreturn array_pop($array);\n\
    case 2:\nreturn implode(' and ', $array);\ndefault:\n$last = array_pop($array);\n\
    return implode(', ', $array) . \" and $last\";\n}\n```\n\nThe argument passed\
    \ to the `switch` statement is `count($array)`, in other words, the number of\
    \ elements in the array.\n\nIf the array contains no elements, an empty string\
    \ is returned. If there’s just one, the array is passed to the `array_pop()` function\
    \ before the result is returned. We need to do this because the function should\
    \ return a string ready for display. If you just return `$array`, it’s still an\
    \ array that can’t be displayed using `echo` or `print`. The `array_pop()` function\
    \ removes the final element in an array and returns it.\n\nIf there are two elements\
    \ in the array, the `switch` statement passes the array to the `implode()` function\
    \ with the string “and” surrounded by a space on either side, and returns the\
    \ result.\n\nThe default action uses the `array_pop()` function to remove the\
    \ last element from the array. Then the array is passed to the `implode()` function\
    \ with a comma followed by a space as the first argument. And the value of the\
    \ last element is concatenated to the comma-separated string preceded by “and”\
    \ before the result is returned.\n\n**Tip**  \nThere’s no need to use `break`\
    \ statements after each case because the `return` keyword immediately halts any\
    \ further execution.\n\n1. Save the script, and test it with each of the test\
    \ arrays in turn. For example:\n\n```\necho with_commas($threesome);\n```\n\n\
    2. This joins the array elements with commas in a grammatical way:\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figq_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figq_HTML.jpg)\n\
    \n3. Let’s fix the situation where the number of array elements exceeds `$max`,\
    \ starting with one in excess. Insert the following code immediately before `default`:\n\
    \n```\ncase $max + 1:\nreturn implode(', ', array_slice($array, 0, $max)) . '\
    \ and one other';\n```\n\nThis passes `array_slice($array, 0, $max)` as the second\
    \ argument to `implode()`. The `array_slice()` function takes three arguments:\
    \ the array you want to extract elements from, the index of the element you want\
    \ to start from, and the number of elements to extract. Arrays are counted from\
    \ zero, so this begins at the start of the array, and extracts `$max` elements.\
    \ Then the string “and one other” is concatenated onto the result before returning\
    \ it.\n\n4. Save the script and test it again. If you test it with `$threesome`,\
    \ you’ll get the same result as in the preceding screenshot. `$fab_four` also\
    \ works the same as before. Trying it with `$too_many` now produces the following\
    \ result:\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figr_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figr_HTML.jpg)\n\
    \n5. Multiple elements in excess of `$max` are handled similarly. However, a `case`\
    \ statement cannot begin with a comparison operator. It must be a complete expression.\
    \ Insert the following code immediately after the code in step 7:\n\n```\ncase\
    \ count($array) > $max + 1:\nreturn implode(', ', array_slice($array, 0, $max))\
    \ . ' and others';\n```\n\nThe important point here is that you need to pass `$array`\
    \ to the `count()` function again to get the number of elements in the array.\
    \ You can’t use the following:\n\n```\n// This triggers a parse error\ncase >\
    \ $max + 1:\n```\n\n6. Save the script and run it again. With `$too_many`, the\
    \ result is unchanged. However, change the second argument to `with_commas()`\
    \ to a smaller number like this:\n\n```\necho with_commas($too_many, 3);\n```\n\
    \nThis changes the output as follows:\n\n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figs_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figs_HTML.jpg)\n\
    \n7. You can check the completed code with `commas_02.php` in the `ch08` folder.\n\
    \n## Sorting Arrays\n\nTable 8-2 lists the many built-in PHP functions for sorting\
    \ arrays.\n\n**Table 8-2. Array sort functions**\n\n| Function | Description |\n\
    | --- | --- |\n| `sort()` | Sorts in ascending order (lowest to highest) |\n|\
    \ `rsort()` | Sorts in descending order (highest to lowest) |\n| `asort()` | Sorts\
    \ by values in ascending order, maintaining key to value relations |\n| `arsort()`\
    \ | Sorts by values in descending order, maintaining key to value relations |\n\
    | `ksort()` | Sorts in ascending order by keys, maintaining key to value relations\
    \ |\n| `krsort()` | Sorts in descending order by keys, maintaining key to value\
    \ relations |\n| `natsort()` | Sorts by values in a “natural order,” maintaining\
    \ key to value relations |\n| `natcasesort()` | Sorts by values in a case-insensitive\
    \ “natural order,” maintaining key to value relations |\n| `usort()` | Sorts by\
    \ values using a callback comparison function |\n| `uasort()` | Sorts by values\
    \ using a callback comparison function, maintaining key to value relations |\n\
    | `uksort()` | Sorts by keys using a callback comparison function, maintaining\
    \ key to value relations |\n| `array_multisort()` | Sorts multiple or multidimensional\
    \ arrays |\n\nAll the functions in Table 8-2 affect the original array(s) and\
    \ return only `true` or `false` depending on whether the operation was successful.\
    \ The first six functions (down to and including `krsort()`) can take as an optional\
    \ second argument the PHP constants listed in Table 8-3 to modify the sort order.\n\
    \n**Table 8-3. Constants that modify the sort order**\n\n| Constant | Description\
    \ |\n| --- | --- |\n| `SORT_REGULAR` | Compares items without changing their types\
    \ (default) |\n| `SORT_NUMERIC` | Compares items as numbers |\n| `SORT_STRING`\
    \ | Compares items as strings |\n| `SORT_LOCALE_STRING` | Compares items based\
    \ on the current locale |\n| `SORT_NATURAL` | Compares items in “natural order”\
    \ |\n| `SORT_FLAG_CASE` | Can be combined with `SORT_STRING` or `SORT_NATURAL`\
    \ using a vertical pipe (`|`) to sort strings case-insensitively |\n\nThe two\
    \ functions and constant that sort values in a “natural order” sort strings that\
    \ contain numbers in the same way as a human being. There’s an example in `natsort.php`\
    \ in the `ch08` folder, which sorts the following array with both `sort()` and\
    \ `natsort()`:\n\n```\n$images = ['image10.jpg', 'image9.jpg', 'image2.jpg'];\n\
    ```\n\nThe following screenshot shows the different results:  \n![../images/332054_4_En_8_Chapter/332054_4_En_8_Figt_HTML.jpg](images/332054_4_En_8_Chapter/332054_4_En_8_Figt_HTML.jpg)\
    \  \nWith `sort()`, the order is not only counterintuitive, but the indices have\
    \ been renumbered. With `natsort()`, the order is more human-friendly, and the\
    \ original indices have been preserved.\n\n**Tip**  \nThe `natsort()` and `natcasesort()`\
    \ functions don’t have reverse-order equivalents, but you can pass the result\
    \ to the built-in `array_reverse()` function. This returns a new array with the\
    \ elements in reverse order without sorting. Unlike the functions in Table 8-2,\
    \ the original array is not changed. Associative array keys are preserved, but\
    \ indexed arrays are renumbered. To prevent indexed arrays from being renumbered,\
    \ pass the Boolean `true` as the second (optional) argument."
