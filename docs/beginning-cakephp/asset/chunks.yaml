- fmt: "# XML 数据源与行为\n\n得益于 `XML` 工具类（该工具类在第 14-9 清单第 38 行被导入到函数中），解析所有 XML 标签变得容易得多。例如，第\
    \ 39 行根据 `$File` 的内容创建了一个新的 `XML` 工具类对象，而 `$File` 当前包含 `data.xml` 文件的内容。通过这个对象，`DataSource`\
    \ 可以使用 `XML` 工具函数，例如计算特定标签的子节点数量、从 XML 数据中提取名称和值等。减少遍历所有标签和节点循环次数的一个便捷方法是使用 `Set`\
    \ 工具类，第 39 行和第 40 行就使用了它。\n\n`Set` 工具包含几个用于处理数据结果集的函数。Cake 的核心库在构建构成 `$this->data`\
    \ 和 `$this->params` 的数组时使用了这个工具，这在前面章节中我们探讨 `Form` 助手和管理表单提交时已被证明非常有用。使用 `Set`\
    \ 不仅减少了构建 Cake 友好数据数组所需的操作次数，还可以与 `XML` 工具一起使用，从 XML 文件中拼接出一个与模型中使用的标准数组相匹配的数据数组。\n\
    \n在第 39 行，`Set::reverse()` 与一个新的 `XML` 工具类对象实例一起使用，从 XML 标签创建出一个 Cake 友好的数组。这里使用\
    \ `Set::reverse()` 函数是因为它可以将对象转换为数组。\n\n该数组的结构会因 XML 文件中的层级关系而变化，甚至可能因为 `$this->File`\
    \ 中出现 `<post>` 标签的数量不同而不一致。为了确保数组应用相同的结构，第 40 行使用了 `Set::extract()` 函数。简而言之，`Set::extract()`\
    \ 获取由第 39 行 `Set::reverse()` 格式化的 `$xml` 数组，并查找名为 `Post` 的数组键。然后，它提取每个嵌套数组，并根据结果构建一个新数组。最后，这个数组通过\
    \ `return` 命令转发给模型。\n\n如果你想对这个 XML 文件进行更复杂的操作，可以更深入地探索 `XML` 工具并使用更多它的函数。例如，为标签分配属性可以扩展\
    \ XML 文件以包含更多类型的数据，更不用说通过使用其他标签（如 `<user>` 或 `<tag>` 来匹配当前数据库中的 `users` 和 `tags`\
    \ 表）在文件内建立更多关联了。目前，`XML DataSource` 解析 `data.xml` 文件以供控制器和视图使用。剩下的工作就是显示数据并使其可供用户访问。\n\
    \n## 查看数据\n\n`XML DataSource` 和模型现在工作正常。在控制器和视图中查看 `data.xml` 中的 XML 数据，就像从数据库中获取数据一样简单。\n\
    \n在 `app/controllers/posts_controller.php` 的 `Posts` 控制器的 `Index` 操作中，使用 `Post`\
    \ 模型中的 `xmlFindAll()` 函数对新数据源执行“查找所有”查询，插入以下代码行：\n\n```\n$this->set('xml',$this->Post->xmlFindAll());\n\
    ```\n\n解析后的 XML 现在可以在 `Index` 视图中作为 `$xml` 使用。使用 `debug()` 函数查看其内容。你应该会得到以下结果：\n\
    \n```\nArray\n(\n    [0] => Array\n        (\n            [Post] => Array\n  \
    \              (\n                    [name] => Writing Posts in XML is a Snap\n\
    \                    [date] => 2008-11-08 12:00:01\n                     => Using\
    \ the XML utility class in Cake with the\nSet::reverse() function makes parsing\
    \ XML easy.\n                    [user_id] => 1\n                )\n        )\n\
    \    [1] => Array\n        (\n            [Post] => Array\n                (\n\
    \                    [name] => More XML Posts, Not so Bad\n                  \
    \  [date] => 2008-11-08 12:00:02\n                     => Using the XML utility\
    \ class in Cake with the\nSet::extract() function makes parsing XML easy.\n  \
    \                  [user_id] => 1\n                )\n        )\n)\n```\n\n这个数组看起来就像你在\
    \ Cake 中习惯使用的数组一样。在 `Index` 视图中，你可以通过运行一个类似于当前 `$posts` 变量循环的循环，将这些结果添加到列表中。当然，在\
    \ `app/webroot/files/data.xml` 文件中，我将 `<id>` 标签留空了；你必须手动设置它们，或者在 `DataSource`\
    \ 中构建一个 `auto_increment` 方法，为 XML 文件中的每个帖子提供唯一的 ID。\n\n数据源不仅可以连接外部文件，还可以用于从任何地方提取数据，例如网络服务、电子邮件或某些遗留系统。\n\
    \n本教程探讨了将 XML 作为外部数据源的使用，并演示了以这种方式扩展模型实际上如何改进代码并在整个框架中保持更好的秩序。其他开发者开发的第三方数据源已经可以在线获取；你可能想尝试安装一个，以此作为在\
    \ Cake 应用程序中使用数据源的练习。\n\n## 使用行为\n\n扩展模型的另一种方式是使用行为。行为为模型提供“规则”，就像你可以在邮件程序中为收件邮件设置规则一样。例如，你可能希望模型在更新数据库中的记录时，能即时对数据执行多种计算，不仅更新一条记录或几个关联记录，而是跨数据库执行一系列更新。使用行为，而不是在模型中构建所有必要的函数来管理这种更新，可以将重复性任务保留在单独的资源文件中，并通过允许多个模型访问更复杂的过程而不使其负担过重，从而使模型更加通用。Cake\
    \ 内置了四种行为：`ACL`、`Containable`、`Translate` 和 `Tree`。在本章中，我将解释如何使用 `Tree` 行为来改进博客对帖子的分类方式。创建自定义行为实际上比创建你自己的数据源更简单；理解内置行为的工作原理将使创建你自己的行为变得更加容易。\n\
    \n### 使用 Tree 行为对博客文章进行分类\n\n博客应用程序使用 `tags` 表来管理可应用于帖子的多个标签。\n\n如果你想创建标签的层级结构，或者某种“树状”数据结构呢？一个标签可以成为另一个标签的“父级”，一系列标签可以被指定为某个标签的“子级”。然后，一旦标签被分配给帖子，通过点击父级标签，该父标签及其子标签的所有相关帖子都将被列出给用户。这种处理层级数据的方法比构建多个关系数据库来管理层级关系更有效。幸运的是，Cake\
    \ 提供了 `Tree` 行为，它可以动态维护一棵数据树。\n\n#### 向 Tags 表插入所需字段\n\n使用 `Tree` 行为要求与该行为关联的数据库表按特定方式组织。在这种情况下，`tags`\
    \ 表需要包含一些额外的字段，以便 `Tree` 行为保存其自身参数。无论你在哪里使用 `Tree` 行为，请记住提供以下三个字段：\n\n- `parent_id`\n\
    - `lft`\n- `rght`\n\n左字段和右字段，即 `lft` 和 `rght`，由 `Tree` 行为用于组织节点在树中的位置。`parent_id`\
    \ 字段链接到表中作为当前记录父节点的记录的 ID。目前，`tags` 表不包含这些字段。为了准备让博客使用 `Tree` 行为，请按照清单 14-10 中的规范替换\
    \ `tags` 表。\n\n**清单 14-10.** *包含 Tree 行为所需字段的 Tags 表*\n\n```\nCREATE TABLE `tags`\
    \ (\n  `id` int(11) unsigned NOT NULL auto_increment,\n  `parent_id` int(11) unsigned\
    \ default NULL,\n  `lft` int(11) unsigned default NULL,\n  `rght` int(11) unsigned\
    \ default NULL,\n  `name` varchar(255) default NULL,\n  PRIMARY KEY (`id`)\n);\n\
    ```"
  raw: 'Thanks to the XML utility class (which is imported into the function on line
    38 of Listing 14-9), parsing through all those XML tags is made much easier. Line
    39, for instance, creates a new XML utility class object from the contents of
    $File, which currently contains the contents of the data.xml file. With this object,
    XML utility functions are available to the DataSource such as counting the number
    of child nodes for a particular tag, pulling names and values from the XML data,
    and so forth. A handy method for cutting down on the number of loops through all
    those tags and nodes is to use the Set utility class, which is done on lines 39
    and 40.


    The Set utility contains several functions for working with result sets of data.
    Cake’s core libraries use this utility when constructing the arrays that make
    $this->data and $this->params, which has proven useful in earlier chapters when
    we explored the Form helper and managing form submissions. Using Set not only
    cuts down on the number of operations needed to construct Cake-friendly data arrays
    but can be used with the XML


    utility to piece together an array of data from the XML file that matches the
    standard arrays used in the model.


    On line 39, Set::reverse() is used together with a new instantiation of the XML
    utility class object to create a Cake-friendly array out of the XML tags. The
    Set::reverse() function is used here because it converts objects into arrays.


    This array would vary in its structure depending on the hierarchy in the XML file
    and can even be inconsistent depending on how many <post> tags appear in $this->File.
    To guarantee that the same structure is applied to the array, the Set::extract()
    function is used on line 40\. In short, Set::extract() takes the $xml array formatted
    by Set::reverse() on line 39 and looks for array keys named Post. It then extracts
    each of those nested arrays and constructs a new array out of the results. This
    array is then forwarded to the model with the return command.


    If you wanted to get more elaborate with this XML file, you could explore the
    XML utility in more depth and use more of its functions. Assigning attributes
    to tags, for example, could extend the XML file to include more types of data,
    not to mention more associations within the file with the use of other tags (like
    <user> or <tag> to match the users and tags tables in the current database). For
    the moment, the XML DataSource parses the data.xml file for use in the controller
    and view. All that’s left is to display the data and make it accessible for the
    user.


    Viewing the Data


    The XML DataSource and the model are now working correctly. Viewing the XML data
    in data.xml is now as simple in the controller and view as fetching data from
    the database.


    In the Posts Index action in app/controllers/posts_controller.php, use the xmlFindAll()
    function from the Post model to run a “find all” query of the new datasource by
    inserting the following line:


    $this->set(''xml'',$this->Post->xmlFindAll());


    The parsed XML is now available in the Index view as $xml. Use the debug() function
    to view its contents. You should get the following results:


