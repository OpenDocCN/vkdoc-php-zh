  trans: '

    *   `pwd`：代表“print working directory”（打印工作目录）。此命令会显示你当前所在的工作目录。如果你在首次登录时执行此命令，它应该会显示`/root`。Linux
    目录不以盘符开头，而是以斜杠（`/`）作为顶层目录。`/root` 是 root 用户的主目录。

    *   `mkdir`：代表“make directory”（创建目录）。此命令会在当前目录下创建一个新目录。

    *   `cd`：代表“change directory”（切换目录）。如果后面跟一个目录名称，它会切换到该目录。如果直接输入命令而不带任何参数，它会带你回到你的主目录。命令`cd
    /`会将你带到根目录（请注意，根目录指的是顶层目录，而非 root 用户的目录）。如果目录名称以斜杠开头，`cd`命令会将其视为从根目录开始的绝对路径。如果目录名称以波浪号（`~`）开头，`cd`命令会将其解释为相对于你的主目录的路径。否则，它会将该路径解释为相对于当前目录。

    *   `ls`：代表“list”（列表），它会列出当前目录中的文件列表。要查看文件权限，请在命令后添加选项`-l`。要同时查看隐藏文件，请添加选项`-a`。因此，要*同时*查看隐藏文件和文件权限，请输入`ls
    -l -a`。

    *   `nano`：Nano 是你易用的文本编辑器。如果你的工作职责包含运行机器，你还应该学习`vim`，因为它对你来说效率更高，但学习难度也更大。Nano
    易于使用，足以满足入门需求。如果你想在当前目录下创建一个名为`test.txt`的文件，请输入`nano test.txt`并开始输入。组合键 `control-o`
    可以保存（即输出）你的文件，`control-x` 可以退出。

    *   `systemctl`：此命令负责在包括 CentOS 在内的某些 Linux 发行版上启动和停止系统服务。你将在本章稍后部分了解如何使用它。

    *   `logout`：此命令退出当前用户会话。你也可以通过输入`exit`或按 `control-d` 来实现。


    我鼓励你花些时间动手练习`mkdir`、`cd`、`ls`和`nano`这些命令。尝试创建一个新目录，进入该目录，并在其中创建一个新文件。然后，尝试注销，用`ssh`重新登录，找到你的文件并查看它。重复这个操作几次，直到你完全熟悉登录、注销、导航目录和编辑文件的过程。


    当你熟练在主目录下创建文件和目录后，应该扩展范围，去查看其他目录。你还不要在那里编辑文件（主目录之外的文件可能对操作系统有重要意义），但四处看看是无害的。


    要开始查看，请转到根目录（`cd /`）并查看（`ls`）。你会看到许多目录，其中大部分在 Linux 文件系统层次结构标准（参见 `www.pathname.com/fhs`）中都有说明。尽管文件系统层次结构标准是了解各目录用途的好资料，但它已不再被严格遵守，因此遇到一些偏差时不必惊讶。不过，简而言之，`/etc`
    包含服务器配置信息，`/home` 包含除 root 之外的用户的主目录，`/usr` 包含已安装的程序，`/opt` 包含定制程序和其他服务器特定项目，`/var`
    包含经常变化的信息（例如日志文件、缓存、队列等）。


    ## 3.3 更新你的系统


    在系统启动并运行后，你应该做的第一件事就是用最新的升级包和安全包更新服务器。CentOS 使用 `yum` 来管理系统软件安装。`yum` 能够简单安全地处理软件包的下载、安装、升级、移除和验证。当你要求
    `yum` 安装或更新一个软件包时，它能聪明地在远程服务器上找到该软件包，验证其真实性，查找并安装该软件包所依赖的任何其他软件，并跟踪所有已安装的软件包及其文件。`yum`
    只能由 root 用户运行，但到目前为止，这是我们唯一可用的用户。


    当你拥有新服务器时，应该做的第一件事是将其所有已安装的软件包更新到最新版本。幸运的是，使用 `yum` 这非常简单。只需运行以下命令：


    ```

    yum -y update

    ```


    这通常会下载*非常大量*的软件包——这完全没问题。CentOS 持续修复发行版中每个软件的错误和安全问题，因此这些更新可能会变得很大。然而，CentOS 也非常小心地确保其包含的修订版不包含任何不兼容的升级。因此，运行
    `yum update` 可以使你保持最新状态，并且你不太可能因为运行它而意外破坏任何东西。

    '
- fmt: '## 3.4 Running the Web Server


    By default, the Linux distributions that come with Linode only install the absolute
    essentials. This is actually great, because one of the primary means of maintaining
    security is to install only what you absolutely need, which minimizes the number
    of potential vulnerabilities that you are exposed to. However, by default the
    web server is not installed.


    If you put in the IP address of your web server into your browser, your browser
    will respond that it cannot connect to the computer. This is because the web server
    is not running yet. To install the web server, we will use CentOS’s `yum` package
    manager. This book covers the Apache web server, known to the computer as `httpd`,
    but there are other possibilities as well.


    To install `httpd`, run:


    ```

    yum -y install httpd

    ```


    It doesn’t matter what directory you are in when you run `yum`. It will install
    the packages to the correct directory no matter where you run it from. `yum` will
    list the package you want to install, as well as the other packages required to
    run it.


    Now your web server is installed, but it is not *running*. To run the web server,
    simply type in:


    ```

    systemctl start httpd

    ```


    This command also does not care what directory you are in.


    Now your web server is running, but you probably still can’t connect to it. This
    is because CentOS comes with a firewall running by default. Therefore, we will
    need to add holes in the firewall to allow access to the web server from outside.


    To do this, issue the following commands:


    ```

    firewall-cmd --add-service http

    firewall-cmd --add-service http –permanent

    firewall-cmd --add-service https

    firewall-cmd --add-service https --permanent

    ```


    These commands will add both HTTP and HTTPS to the list of services that remote
    users can connect to. `firewall-cmd` manages your firewall. Adding a service (`--add-service`)
    allows access to that service. Running it without the `--permanent` flag modifies
    the current firewall. Adding the `--permanent` flag tells the firewall to have
    that rule in place when the server is rebooted. To enable the rule now and have
    it still enabled if the server is rebooted, you need both commands.


    You can see the list of allowed services by issuing the following command:


    ```

    firewall-cmd --list-services

    ```


    When these commands have been run, you can simply go to your server’s IP address
    in your browser, and you should get a test screen like Figure [3-5](#487291_1_En_3_Chapter.xhtml#Fig5).


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig5_HTML.jpg](images/487291_1_En_3_Chapter/487291_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    The Web Server’s Test Screen


    This means that your web server is up and running like it should be—congratulations!


    However, there is one more issue to consider. Even though the server is running
    right now, if you reboot your machine, it won’t be running when it starts. To
    make sure this service runs at startup as well, issue the command:


    ```

    systemctl enable httpd

    ```


    To test it out, go to your node’s dashboard, and in the top-right hand of the
    page, it should say “Running.” If you click that, it will show you a “Reboot”
    button. Click that button to reboot your machine. While your service is rebooting,
    the test web page will probably go away at some point. However, once the progress
    bar for the reboot finishes, the test web page should be available again.


    Rebooting will log you off since the computer is no longer running. However, you
    can just log right back in again, and you will be back in root’s home directory.


    ## 3.5 Putting Up Your Own Web Pages


    The test page we get is automatically generated if there is no content for the
    web site. To create content for the web site, you simply have to put some in the
    right place.


    Go into `/var` (type `cd /var`) and look around (type `ls`). One of the directories
    you see will be `www`. This is the default directory for data served from the
    web server (i.e., web pages). Go into `www` (type `cd www`) and look around (type
    `ls`). The `html` directory is where you will put your HTML and PHP files. Go
    into that directory (type `cd html`). To verify you are in the right place, type
    `pwd` and it should tell you that you are in `/var/www/html`.


    Now that you are in `/var/www/html`, you will create pages for the web service
    to serve up. Create the file `index.html` using `nano index.html` and put something
    in it (if you don’t know what to type, just type in `hello there` or something
    similar). Use control-o to save the file and control-x to exit the editor. As
    soon as you have created the file, you can go to your IP address, and that file
    will show up as the default page.'
  raw: '## 3.4 Running the Web Server


    By default, the Linux distributions that come with Linode only install the absolute
    essentials. This is actually great, because one of the primary means of maintaining
    security is to install only what you absolutely need, which minimizes the number
    of potential vulnerabilities that you are exposed to. However, by default the
    web server is not installed.


    If you put in the IP address of your web server into your browser, your browser
    will respond that it cannot connect to the computer. This is because the web server
    is not running yet. To install the web server, we will use CentOS’s `yum` package
    manager. This book covers the Apache web server, known to the computer as `httpd`,
    but there are other possibilities as well.


    To install `httpd`, run:


    ```

    yum -y install httpd

    ```


    It doesn’t matter what directory you are in when you run `yum`. It will install
    the packages to the correct directory no matter where you run it from. `yum` will
    list the package you want to install, as well as the other packages required to
    run it.


    Now your web server is installed, but it is not *running*. To run the web server,
    simply type in:


    ```

    systemctl start httpd

    ```


    This command also does not care what directory you are in.


    Now your web server is running, but you probably still can’t connect to it. This
    is because CentOS comes with a firewall running by default. Therefore, we will
    need to add holes in the firewall to allow access to the web server from outside.


    To do this, issue the following commands:


    ```

    firewall-cmd --add-service http

    firewall-cmd --add-service http –permanent

    firewall-cmd --add-service https

    firewall-cmd --add-service https --permanent

    ```


    These commands will add both HTTP and HTTPS to the list of services that remote
    users can connect to. `firewall-cmd` manages your firewall. Adding a service (`--add-service`)
    allows access to that service. Running it without the `--permanent` flag modifies
    the current firewall. Adding the `--permanent` flag tells the firewall to have
    that rule in place when the server is rebooted. To enable the rule now and have
    it still enabled if the server is rebooted, you need both commands.


    You can see the list of allowed services by issuing the following command:


    ```

    firewall-cmd --list-services

    ```


    When these commands have been run, you can simply go to your server’s IP address
    in your browser, and you should get a test screen like Figure [3-5](#487291_1_En_3_Chapter.xhtml#Fig5).


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig5_HTML.jpg](images/487291_1_En_3_Chapter/487291_1_En_3_Fig5_HTML.jpg)


    Figure 3-5


    The Web Server’s Test Screen


    This means that your web server is up and running like it should be—congratulations!


    However, there is one more issue to consider. Even though the server is running
    right now, if you reboot your machine, it won’t be running when it starts. To
    make sure this service runs at startup as well, issue the command:


    ```

    systemctl enable httpd

    ```


    To test it out, go to your node’s dashboard, and in the top-right hand of the
    page, it should say “Running.” If you click that, it will show you a “Reboot”
    button. Click that button to reboot your machine. While your service is rebooting,
    the test web page will probably go away at some point. However, once the progress
    bar for the reboot finishes, the test web page should be available again.


    Rebooting will log you off since the computer is no longer running. However, you
    can just log right back in again, and you will be back in root’s home directory.


    ## 3.5 Putting Up Your Own Web Pages


    The test page we get is automatically generated if there is no content for the
    web site. To create content for the web site, you simply have to put some in the
    right place.


    Go into `/var` (type `cd /var`) and look around (type `ls`). One of the directories
    you see will be `www.` This is the default directory for data served from the
    web server (i.e., web pages). Go into `www` (type `cd www`) and look around (type
    `ls`). The `html` directory is where you will put your HTML and PHP files. Go
    into that directory (type `cd html`). To verify you are in the right place, type
    `pwd` and it should tell you that you are in `/var/www/html`.


    Now that you are in `/var/www/html`, you will create pages for the web service
    to serve up. Create the file `index.html` using `nano index.html` and put something
    in it (if you don’t know what to type, just type in `hello there` or something
    similar). Use control-o to save the file and control-x to exit the editor. As
    soon as you have created the file, you can go to your IP address, and that file
    will show up as the default page.'
  trans: '

    ## 3.4 运行 Web 服务器


    默认情况下，Linode 附带的 Linux 发行版只安装绝对必要的组件。这其实很棒，因为维护安全的主要方法之一就是只安装你确实需要的东西，从而最大限度地减少你暴露在外的潜在漏洞数量。然而，默认情况下
    Web 服务器并未安装。


    如果你在浏览器中输入 Web 服务器的 IP 地址，浏览器会回应无法连接到该计算机。这是因为 Web 服务器尚未运行。要安装 Web 服务器，我们将使用 CentOS
    的 `yum` 包管理器。本书介绍的是 Apache Web 服务器，它在系统中被称为 `httpd`，当然也有其他可选项。


    要安装 `httpd`，请运行：


    ```

    yum -y install httpd

    ```


    运行 `yum` 时，你位于哪个目录并不重要。无论你从哪里运行它，它都会将包安装到正确的目录。`yum` 会列出你想要安装的包，以及运行它所需的其他包。


    现在你的 Web 服务器已安装，但它并未*运行*。要运行 Web 服务器，只需输入：


    ```

    systemctl start httpd

    ```


    这个命令同样不在意你当前位于哪个目录。


    现在你的 Web 服务器正在运行，但你可能仍然无法连接到它。这是因为 CentOS 默认会运行一个防火墙。因此，我们需要在防火墙中打开一些端口，以允许从外部访问
    Web 服务器。


    为此，请执行以下命令：


    ```

    firewall-cmd --add-service http

    firewall-cmd --add-service http –permanent

    firewall-cmd --add-service https

    firewall-cmd --add-service https --permanent

    ```


    这些命令会将 HTTP 和 HTTPS 都添加到远程用户可以连接的服务列表中。`firewall-cmd` 用于管理你的防火墙。添加一个服务（`--add-service`）允许访问该服务。不带
    `--permanent` 标志运行会修改当前的防火墙。添加 `--permanent` 标志则告知防火墙在服务器重启后仍保留该规则。要同时启用当前规则并使其在服务器重启后仍然有效，你需要执行这两条命令。


    你可以通过执行以下命令来查看允许的服务列表：


    ```

    firewall-cmd --list-services

    ```


    当这些命令执行完毕后，你只需在浏览器中访问你的服务器 IP 地址，就应该能看到一个如图 3-5 所示的测试页面。


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig5_HTML.jpg](img/487291_1_En_3_Fig5_HTML.jpg)


    图 3-5


    Web 服务器的测试页面


    这意味着你的 Web 服务器已按预期启动并运行——恭喜你！


    然而，还有一个问题需要考虑。尽管服务器当前正在运行，但如果你重启机器，它启动时并不会自动运行。为了确保该服务也能在启动时运行，请执行以下命令：


    ```

    systemctl enable httpd

    ```


    为了测试，请前往你的节点控制面板，在页面右上角应该显示“运行中”。如果你点击它，会显示一个“重启”按钮。点击该按钮重启你的机器。在服务重启过程中，测试网页可能会在某时刻消失。但是，一旦重启的进度条完成，测试网页应该会再次可用。


    重启会导致你登出，因为计算机关机了。不过，你可以立即重新登录，然后你会回到 root 用户的主目录。


    ## 3.5 搭建你自己的网页


    如果网站没有内容，我们看到的测试页面会自动生成。要为网站创建内容，你只需将内容放到正确的位置即可。


    进入 `/var` 目录（输入 `cd /var`）并查看一下（输入 `ls`）。你会看到其中一个目录是 `www`。这是 Web 服务器提供数据服务的默认目录（即网页目录）。进入
    `www` 目录（输入 `cd www`）并查看一下（输入 `ls`）。`html` 目录就是你放置 HTML 和 PHP 文件的地方。进入该目录（输入 `cd
    html`）。为了确认你身处正确的位置，输入 `pwd`，它应该会告诉你当前位于 `/var/www/html`。


    现在你已经在 `/var/www/html` 目录中，你需要创建供 Web 服务提供的页面。使用 `nano index.html` 命令创建 `index.html`
    文件，并在其中输入一些内容（如果你不知道写什么，就输入 `hello there` 或类似的内容）。使用 control-o 保存文件，使用 control-x
    退出编辑器。一旦你创建了文件，你就可以访问你的 IP 地址，该文件将作为默认页面显示。

