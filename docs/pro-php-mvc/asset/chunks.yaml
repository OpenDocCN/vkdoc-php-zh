- fmt: "Similar to how we handled file uploads in our original application, the `register()`\
    \ action does not actually perform the file upload logic, yet it calls a protected\
    \ `_upload()` method. The `_upload()` method is slightly changed from our original\
    \ implementation in that it has less flexibility before the file is uploaded and\
    \ more information after the file is uploaded.\n\nThe built-in CodeIgniter file\
    \ upload library is actually quite powerful in terms of validating uploaded files\
    \ and handling all the PHP required to move the files around in the file system.\
    \ We simply need to give the field name for the file we want to upload, and it\
    \ will figure out the rest (with a little help from initialization parameters).\n\
    \n**Note:** You can learn more about the CodeIgniter File Upload class at [http://codeigniter.com/user_guide/libraries/file_uploading.html](http://codeigniter.com/user_guide/libraries/file_uploading.html).\n\
    \nAfter the file is uploaded, we create a row in the `file` table, linking it\
    \ to the user ID. Before we can use this photo on the profile page, we need to\
    \ look at another aspect of extending CodeIgniter through third-party libraries.\n\
