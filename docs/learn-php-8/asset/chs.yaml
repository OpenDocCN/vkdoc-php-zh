  \ // in array?\n{               $dog_id = rand(0,9999); // if it is getting another\
  \ number\n}\n$chge_string .=\"INSERT INTO Dogs VALUES('\";\n$chge_string .= $dog_id\
  \ . \"', '\" . $records_array[$I]['dog_name'] . \"', '\";\n$chge_string .= $records_array[$I]['dog_weight']\
  \ . \"', '\";\n$chge_string .= $records_array[$I]['dog_color'] . \"', '\";\n$chge_string\
  \ .= $records_array[$I]['dog_breed'] . \"');\";\n}\n$chge_log_file = date('mdYhis')\
  \ . $this->change_log_file;\nerror_log($chge_string,3,$chge_log_file); // might\
  \ exceed 120 chars\n}\n```\n\n\n\n如果我们回顾 `changeRecords` 方法，会看到它是通过一个名为 `dog_id`\
  \ 的属性构建 SQL `WHERE` 子句的。在 XML 和 JSON 示例中，我们并没有这个字段。然而，SQL `UPDATE` 语句需要 `where`\
  \ 子句来确定要更新哪条（或哪些）记录。所使用的属性必须是唯一的，以便精准识别记录。唯一需要代码生成这个 `dog_id` 的地方，是在数据库中创建新记录时（在\
  \ `insertRecords` 方法中）。这可以通过 PHP 的 `rand` 方法来实现。\n\nPHP 的 `rand` 方法用于生成随机数。第一个参数是起始数字（0），第二个参数是结束数字（9999）。该字段在数据库中被设置为\
  \ `char(4)` 类型，最多允许四个字符。这样我们最多就能容纳 10,000 条狗狗记录。我确信这绰绰有余！\n\n`insertRecords` 方法中的\
  \ `while` 循环使用 PHP 的 `in_array` 方法来判断生成的数字是否已经存在于 `dogs_array`（该数组包含了数据库中所有当前的记录）中。必须指定第三个参数，用于决定是否进行严格（`strict`）搜索（即比较数据类型），这样才能在处理多维关联数组时得到可靠的结果。如果该数字已存在，逻辑会继续生成新的随机数，直到找到唯一的数字为止。然后，该值被赋值给\
  \ `$dog_id`，并与其他字段（`dog_name`、`dog_weight`、`dog_color` 和 `dog_breed`）一起插入到数据库中。注意：此代码假设数据库中的\
  \ `Dogs` 表已按所示顺序创建了字段（`dog_id`、`dog_name`、`dog_weight`、`dog_color` 和 `dog_breed`）。\n\
  \n变更日志（现在也是一个 SQL 脚本文件）现在会包含类似于下面的语句：\n\n```\nINSERT INTO Dogs VALUES('2288', 'tester1',\
  \ '19', 'Green', 'Lab');\nUPDATE Dogs SET dog_name=\"tester1\", dog_weight=\"19\"\
  , dog_color=\"Green\",\ndog_breed='Lab' WHERE dog_id=\"0111\";\nUPDATE Dogs SET\
  \ dog_name=\"tester2\", dog_weight=\"19\", dog_color=\"Green\",\ndog_breed='Lab'\
  \ WHERE dog_id=\"1211\";\nDELETE FROM Dogs WHERE dog_id=\"1111\";\n```\n\n当所有变更都被记录后，这个文件就可以针对数据库运行。析构函数现在可以执行这个文件（而不是删除表并将所有记录重新插入到一个新表中）。\n\
  \n```\n$mysqli = new mysqli($server, $db_username, $db_password, $database);\nif\
  \ ($mysqli->connect_errno)\n{\nthrow new Exception(\"MySQL 连接错误:\" . $mysqli->connect_error);\n\
  }\n$chge_log_file = date('mdYhis') . $this->change_log_file;\n$sql = explode(\"\
  ;\",file_get_contents($chge_log_file));\nforeach($sql as $query)  {\nIf(!$mysqli->query($query))\n\
  {\nthrow new Exception(\"狗狗表变更错误: \" . $mysqli->error);\n}\n}\n```\n\n与原始的 MySQL\
  \ 示例相比，析构函数的代码变得更简单了。析构函数不需要格式化任何 SQL 语句，只需要执行它们。该方法从变更日志中读取变更记录，并通过每条 SQL 命令行末尾的\
  \ `;` 进行分割。每一行被放入数组 `$sql` 中。然后，逻辑会遍历该数组，并通过 `query` 命令执行每条语句。如果任何 SQL 语句出现问题，就会抛出异常（该异常也会通过\
  \ `dog_interface` 程序向支持人员发送邮件）。\n\n**注意**\n\n如前所述，提供 MySQL 示例是为了帮助读者理解 `dog_data`\
  \ 类的整体逻辑能够很好地适用于所有数据类型。关于如何使用 PHP 与数据库交互，有专门的书籍进行阐述。本书的目的并非培训用户完全掌握数据库操作。\n\n**动手实践**\n\
