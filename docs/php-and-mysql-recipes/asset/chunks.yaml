    that is too high to use on a web site. If the image is to be used as a profile
    image or thumbnail it might be a good idea to scale it down or crop a section
    out in order to get rid of irrelevant areas of the image. Scaling and cropping
    can be done with CSS, but that still requires the full image to be downloaded
    to the client and that would be a waste of bandwidth.


    Using the GD extension in PHP makes it possible to perform these and many other
    image manipulation tasks on the server. This chapter will demonstrate how to perform
    these and many other tasks. The function names used in the examples are written
    in so-called camel case where the first letter of each word is capitalized. This
    is done for readability. All internal functions in PHP are case insensitive and
    can be written in any way you like, as long as all the letters are in the right
    order.


    Recipe 8-1\. Creating Images


    Problem


    Browsers can render a number of different image formats. These are all binary
    encodings of pixels and colors with or without compression. The most common are
    GIF, JPEG, and PNG. Although it would be possible to build images as a string
    of bytes according to the specifications of each file format, that is not practical
    and would most likely lead to performance problems.


    Solution


    The GD extension for PHP is a wrapper around a library called libgd as well as
    a number of other libraries to handle and create various image formats and compression.
    The libgd is bundled with PHP source code so it is relatively easy to enable the
    extension. The GD extension is also available in most distributions of Linux and
    it comes as a standard dll with the Windows version of PHP.


    There are a couple of functions in the GD extensions to create images. This can
    be done by copying an image that exists in the file system with the functions
    ImageCreateFromJpeg() , ImageCreateFromGif() , ImageCreateFromPng() . PHP also
    supports the formats GD and GD2\. These are not supported in browsers but can
    be used as the base format for creating images of other types.'
  trans: "\n大多数现代浏览器还支持一种基于 JavaScript 的表单数据 API，允许用户通过拖放操作，将本地文件系统中的文件拖拽到浏览器窗口的特定位置。这会触发一个\
    \ JavaScript 函数，该函数可以读取文件系统中的文件并创建 POST 请求。使用这种模式，无需每 500 毫秒就由一个独立的进程向服务器发送请求，即可获得精确的上传进度。上传过程不必与\
    \ HTML 表单关联。这可以用于让用户轻松地通过一次拖放操作上传新的个人资料图片。\n\n## 工作原理\n\n基本的文件上传包含两个部分。第一部分是一个\
    \ HTML 表单，其属性 `enctype` 设置为 `multipart/form-data`。默认值为 `application/x-www-form-urlencoded`，这会导致数据以与\
    \ URL 或查询字符串参数相同的方式进行编码。该 HTML 表单至少需要一个类型为 file 的输入字段，如下所示：\n\n```\n<html>\n<body>\n\
    <form method=\"POST\" enctype=\"multipart/form-data\" action=\"/upload.php\">\n\
    <input type=\"file\" name=\"file\" />\n<button type=\"submit\">上传</button>\n</form>\n\
    </body>\n</html>\n```\n\n这将创建一个表单，允许用户从本地文件系统中选择一个文件，然后点击提交按钮将文件发送到服务器。服务器上应有一个\
    \ PHP 脚本来接收文件。在此例中，该脚本名为 `upload.php`。在下面的示例中，PHP 脚本在上传后简单地显示了 `$_FILES` 变量的内容。\n\
    \n```\n<?php\n// upload.php\nheader(\"Content-Type: text/plain\");\nprint_r($_FILES);\n\
    ```\n\n该脚本的输出显示了如下信息：\n\n```\nArray (\n    [file] => Array\n        (\n      \
    \      [name] => myfile.gz\n            [type] => application/x-gzip\n       \
    \     [tmp_name] => /tmp/php1zqVJF\n            [error] => 0\n            [size]\
    \ => 23435\n        )\n)\n```\n\n这个数组提供了元数据以及临时文件的位置，可供进一步处理。位于 `/tmp/php1zqVJF`\
    \ 的文件会在脚本结束时自动删除，可以使用 `move_uploaded_file()` 函数将其复制/移动到所需位置。该函数接受两个参数。第一个是临时文件的路径，第二个是新位置的路径。在移动文件之前，调用\
    \ `is_uploaded_file()` 也是一个好主意。\n\n## 配方 7-15\\. 压缩文件\n\n### 问题\n\n虽然上传系统可用于选择多个文件并将其上传到\
    \ Web 服务器，但每个请求只能下载一个文件。如果用户想下载一个相册中的所有图片，那么逐个点击每个图片的链接并选择保存位置将会是一个缓慢的过程。如果服务器能够接收一个包含多个文件的上传文件，或者创建一个包含多个文件供下载的单一文件，那就太好了。\n\
    \n### 解决方案\n\n`ZipArchive()` 类可用于在服务器上组装或解压缩 zip 文件。\n\n### 工作原理\n\n一个简单的函数，用于将服务器上某个目录中的所有文件打包成一个\
    \ zip 文件，并将其内容作为响应发送出去，可能如下所示：\n\n```\n<?php\n// 7_31.php\n\nini_set(\"zlib.output_compression\"\
    , \"Off\");\n\n$files = glob('.');\n\nif (!empty($files)) {\n    $zip = new ZipArchive();\n\
    \    $tmp_name = tempnam(\"/tmp\", \"zipfile\");\n    $res = $zip->open($tmp_name\
    \ . \".zip\", ZipArchive::CREATE);\n    if ($res === true) {\n        foreach($files\
    \ as $file) {\n            if (is_file($file) || is_link($file)) {\n         \
    \       $zip->addFile($file);\n            }\n        }\n        $zip->close();\n\
    \        if (file_exists($tmp_name . \".zip\")) {\n            $file_name = 'archive.zip';\n\
    \            $file_size = filesize($tmp_name . \".zip\");\n            header('Content-Type:\
    \ application/octet-stream; Content-Disposition: attachment');\n            readfile($tmp_name\
    \ . \".zip\");\n            unlink($tmp_name . \".zip\");\n            unlink($tmp_name);\n\
    \        }\n    }\n}\n```\n\n首先，关闭了输出压缩。如果开启此功能，可能会导致下载的文件出现问题，而且它是一个 zip 文件，本身就已经被压缩了。\n\
    \n然后，我们从当前目录生成一个文件列表。如果数组中存在文件，则在 `/tmp` 文件夹中创建临时存档。zip 文件可能很容易变得过大而无法在内存中处理，因此它将在磁盘上创建。如果创建成功，则逐个添加文件，最后，如果\
    \ zip 文件仍然存在，我们设置用于下载文件的标头并将文件发送给客户端。任何临时文件都会在脚本结束时被删除。\n\n与上传许多单独的文件相比，在本地将文件压缩，上传一个单独的文件，然后在服务器上解压缩以便访问各个文件，可能会更快，并且在浏览器中的点击次数也更少。执行解压功能的脚本可能类似于下一个示例。该脚本应从表单的\
    \ POST 请求中调用，该请求至少包含一个类型为 file 且名称为 `file` 的输入字段。\n\n```\n<?php\n// 7_32.php\n\
    \n// 此脚本期望从一个表单的 POST 请求中调用，该表单至少包含一个输入字段\n// <input type=\"file\" name=\"file\"\
    \ />\n\n// 这将在 $_FILES 超全局变量中生成以下值\n// $_FILES['file']['error']\n// $_FILES['file']['name']\n\
    // $_FILES['file']['tmp_name']\n// $_FILES['file']['type']\n// $_FILES['file']['size']\n\
    \n// 从文件名中获取文件扩展名\nfunction GetExtension($file_name) {\n    $arrParts = explode(\"\
    .\", $file_name);\n    if (sizeof($arrParts) > 1) {\n        return strtolower(end($arrParts));\n\
    \    }\n    else {\n        return null;\n    }\n}\n\n$res = false;\n$ext = GetExtension($_FILES['file']['name']);\n\
    if ($ext == \"zip\") {\n    $zip = new ZipArchive();\n    $res = $zip->open($_FILES['file']['tmp_name']);\n\
    }\n\nif ($res === true) {\n    $zip->extractTo('folder');\n    $zip->close();\n\
    }\n```\n\n# 第 8 章\n\n# 动态图像\n\n上传到网站的图像可能并不总是立即可用。直接来自智能手机或高分辨率数码相机的图像，其分辨率/尺寸可能过高，不适合在网站上使用。如果要将图像用作个人资料图片或缩略图，最好将其缩小或裁剪出一部分，以去除图像中无关的区域。可以使用\
    \ CSS 进行缩放和裁剪，但这仍然需要将完整图像下载到客户端，这会浪费带宽。\n\n使用 PHP 的 GD 扩展，可以在服务器上执行这些以及许多其他图像处理任务。本章将演示如何执行这些以及许多其他任务。示例中使用的函数名称采用所谓的驼峰式写法，即每个单词的首字母大写。这样做是为了提高可读性。PHP\
    \ 中的所有内部函数都不区分大小写，可以以任何你喜欢的方式编写，只要所有字母的顺序正确即可。\n\n## 配方 8-1\\. 创建图像\n\n### 问题\n\
    \n浏览器可以渲染多种不同的图像格式。这些都是像素和颜色的二进制编码，可能带有压缩，也可能没有。最常见的是 GIF、JPEG 和 PNG。虽然可以根据每种文件格式的规范，将图像构建为字节字符串，但这并不实用，并且很可能导致性能问题。\n\
    \n### 解决方案\n\nPHP 的 GD 扩展是一个封装库，它包装了一个名为 `libgd` 的库以及许多其他用于处理和创建各种图像格式及压缩的库。`libgd`\
    \ 与 PHP 源代码捆绑在一起，因此启用该扩展相对容易。GD 扩展也适用于大多数 Linux 发行版，并且作为标准 DLL 随 Windows 版本的 PHP\
    \ 一起提供。\n\nGD 扩展中有几个用于创建图像的函数。可以通过使用 `ImageCreateFromJpeg()`、`ImageCreateFromGif()`、`ImageCreateFromPng()`\
    \ 函数复制文件系统中已存在的图像来实现。PHP 还支持 GD 和 GD2 格式。这些格式在浏览器中不受支持，但可以作为创建其他类型图像的基础格式。\n"
- fmt: "`ImageCreateFrom*()`函数都接受一个参数，该参数可以是本地文件系统中的文件路径或URL。大多数情况下，从本地文件系统加载图像速度更快，但如果图像在多个服务器之间共享，使用URL获取图像后再进行处理可能更实用。如果不需要处理图像，则让客户端直接从URL加载图像或使用简单的HTTP重定向会更快。\n\
    \n© Frank M. Kromann 2016\n\nF.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_8\n\
    \n## 第8章 ■ 动态成像\n\n此外，可以通过`ImageCreateFromString()`函数从字符串创建图像。如果图像存储在数据库或其他存储中，或者通过API调用获取图像，这会非常有用。如果传入的字符串不表示有效图像，该函数会发出错误。\n\
    \n最后，还可以创建一个指定大小的新空白图像。这是通过`ImageCreate()`和`ImageCreateTrueColor()`函数完成的。这两个函数都接受两个参数：新图像的宽度和高度。建议使用`ImageCreateTrueColor()`，因为它提供了最高质量的图像。使用`ImageCreate()`会创建基于调色板的图像，其中每个像素由颜色调色板中的索引表示。使用`ImageCreateTrueColor()`时，每个像素将由实际颜色表示。\n\
    \n尽管PHP在脚本结束时提供自动清理，但最好手动处理不再需要的图像资源。这通过调用`ImageDestroy()`函数完成。\n\n### 工作原理\n\n\
    最简单的图像是所有像素颜色相同的图像。当你使用`ImageCreateTrueColor()`创建新的空白图像时，就会得到这样的图像。根据要发送给浏览器的格式，你可以选择相应的输出函数。在此示例中，我们创建一个50x50像素的小图像，并使用查询参数`f`选择格式。如果参数`f`缺失、为空或格式不受支持，默认格式将为GIF。\n\
    \n```php\n// 8_1.php\n\n$img = ImageCreateTrueColor(50, 50);\n\n$f = $_GET['f']\
    \ ?: 'gif';\n\nswitch (strtolower($f)) {\n\ncase 'jpg' :\n\ncase 'jpeg' :\n\n\
    header('Content-Type: image/jpeg');\n\nImageJPEG($img);\n\nbreak;\n\ncase 'png'\
    \ :\n\nheader('Content-Type: image/png');\n\nImagePNG($img);\n\nbreak;\n\ndefault\
    \ :\n\nheader('Content-Type: image/gif');\n\nImageGIF($img);\n\nbreak;\n\n}\n\n\
    ImageDestroy($img);\n```\n\n来自PHP脚本的`Content-Type`标准值是`text/html`。当浏览器返回二进制数据流时，帮助浏览器了解它正在接收什么类型的数据是个好主意。现代浏览器能够查看数据内容并确定其类型。对于图像数据尤其如此，因为其格式众所周知。在此情况下，我们根据请求的文件类型将`Content-Type`设置为`image/jpeg`、`image/png`或`image/gif`。\n\
    \n如果从命令行执行此脚本，它将产生以字符串`GIF87a22?,223?????`开头的二进制输出。如果将其放置在Web服务器上并通过浏览器请求，它将提供一个小的黑色图像。\n\
    \n## 第8章 ■ 动态成像\n\n单色图像并不那么有用。实际上，使用HTML和CSS可以达到相同效果，且不会对服务器产生任何影响，但此示例演示了图像生成的基本功能。接下来让我们看一些更有用的示例。\n\
    \n### 配方8-2：图像缩放\n\n#### 问题\n\n在你的网站上，有一个允许注册用户上传图像的板块，他们可以在博客评论中将其用作头像。用户使用最新的智能手机拍摄自拍照并将其上传到你的网站。这将是一张高分辨率图像，每次新访客浏览你网站的页面时都会占用空间和带宽。可以在浏览器中缩放图像，但这仍然会导致高分辨率图像至少每个访客从服务器传输一次到浏览器。\n\
    \n#### 解决方案\n\n基于前面的示例，我们可以创建一个从文件加载图像的脚本。然后它会计算同一图像的较小版本。为了不使图像变形，我们必须保持与原始图像相同的宽高比。要获取图像的大小，可以使用`ImagesX()`和`ImagesY()`函数，或者使用`GetImageSize()`，该函数还会返回其他信息，如图像类型。当你知道原始图像的宽度和高度时，可以计算新的宽度和高度，使其保持在固定尺寸的边界内。在此示例中，缩放后图像的大小被设置为160x120像素以内。\n\
    \n从PHP 5.6.3开始，可以将高度设为`-1`，缩放将自动保留宽高比。\n\n#### 工作原理\n\n示例中使用的基础图像名为`IMG_0099.JPG`。其宽度为2048像素，高度为1536像素。首先，我们查看`GetImageSize()`返回的值。\n\
    \n```php\n// 8_2.php\n\n$orig = GetImageSize('IMG_0099.JPG');\n\nprint_r($orig);\n\
    ```\n\n这将产生以下输出：\n\n```\nArray\n(\n    [0] => 2048\n    [1] => 1536\n    [2] =>\
    \ 2\n    [3] => width=\"2048\" height=\"1536\"\n    [bits] => 8\n    [channels]\
    \ => 3\n    [mime] => image/jpeg\n)\n```\n\n## 第8章 ■ 动态成像\n\n前两个值包含宽度和高度。第三个值是图像类型。你可以使用常量`IMG_GIF`、`IMG_JPG`、`IMG_JPEG`（与`IMG_JPG`相同）、`IMG_PNG`、`IMG_WBPM`和`IMG_XPM`来比较该值以确定类型，或者直接使用MIME字符串。第三个值是一个表示宽度和高度的字符串，而`bits`和`channels`的值表示比特数和通道数。在此示例中，图像有8比特和3个通道，允许每像素24比特。\n\
    \n```php\n// 8_3.php\n\n$size = [160, 120];\n$orig = GetImageSize('IMG_0099.JPG');\n\
    $a1 = $size[0] / $size[1];\n$a2 = $orig[0] / $orig[1];\nif ($a1 > $a2) {\n   \
    \ $d = ceil($orig[0] / $size[0]);\n}\nelse {\n    $d = ceil($orig[1] / $size[1]);\n\
    }\n$w = $orig[0] / $d;\n$h = $orig[1] / $d;\n$img = ImageCreateFromJpeg('IMG_0099.JPG');\n\
    $thumb = ImageScale($img, $w, $h);\nheader('Content-Type: ' . $orig['mime']);\n\
    switch ($orig[2]) {\ncase IMG_JPG :\ncase IMG_JPEG :\n    ImageJPEG($thumb);\n\
    \    break;\ncase IMG_PNG :\n    ImagePNG($thumb);\n    break;\ncase IMG_GIF :\n\
    \    ImageGIF($thumb);\n    break;\n}\nImageDestroy($thumb);\nImageDestroy($img);\n\
    ```\n\n首先，我们计算新图像的宽高比（`$a1`）和原始图像的宽高比（`$a2`）。然后根据宽度或高度的尺寸比例确定缩放因子。这将确保两个维度都按相同因子缩放，并且整个图像将适合较小的框内。\n\
    \n此代码假设原始图像大于所需的缩略图。如果原始图像较小，则无需缩放，可以直接使用原始图像。\n\n最后有两个对`ImageDestroy()`函数的调用。这是因为`ImageScale()`创建了原始资源的副本，我们需要同时释放原始资源和副本。`ImageDestroy()`仅从内存中移除图像。使用`unlink()`从磁盘删除图像文件。\n\
    \n![Image 14](index-205_1.jpg)\n\n## 第8章 ■ 动态成像\n\n结果图像如下所示：\n\n### 配方8-3：图像裁剪\n\
    \n#### 问题\n\n在前面的示例中，我们努力保持了与原始图像相同的宽高比。如果我们想从上传的图像中创建一个正方形图像呢？换句话说，基于最小边缩放图像，并剪掉另一个维度中不适合正方形的部分。"
  raw: 'The ImageCreateFrom*() functions all takes a single parameter that can be
    the path to a file from the local file system or a URL. In most case it is faster
    to load the image from the local file system but if images are shared among multiple
    servers it might be practical to use an URL to fetch the image before manipulation.
    If no manipulation is needed it will be faster to instruct the client to load
    the image directly from the URL or by using a simple HTTP redirect.


    © Frank M. Kromann 2016


    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_8


    CHAPTER 8 ■ DYNAMIC IMAGING


    Additionally the image can be created from a string with the function ImageCreateFromString()
    . This is useful if the image is stored in a database or other storage or the
    image is retrieved from an API call. The function will emit an error if the string
    passed in doesn''t represent a valid image.


    Finally it''s possible to create a new blank image of a specified size. This is
    done with the functions ImageCreate() and ImageCreateTrueColor() . Both functions
    take two parameters: the width and height of the new image. It is recommended
    to use ImageCreateTrueColor() as it provides the highest quality of the image.
    Using ImageCreate() will create a palette based image where each pixel is represented
    by an index in the color palette. When using ImageCreateTrueColor() each pixel
    will be represented by the actual color.


    Although PHP provides an automated cleanup when the script ends it is always a
    good idea to manually get rid of the image resources when they are no longer needed
    by the script. This is done by calling the function ImageDestroy() .


    How it Works


    The simplest image is one where all the pixels have the same color. When you create
    a new blank image with ImageCreateTrueColor() that is what you will get. Depending
    on what format you want to send to the browser you can choose the output function
    that corresponds to it. In this example we create a small image of 50x50 pixels
    and use a query parameter f to select the format. If the parameter f is missing,
    empty, or an unsupported format the default format will be GIF.


    <?php


    // 8_1.php


    $img = ImageCreateTrueColor(50, 50);


    $f = $_GET[''f''] ?: ''gif'';


    switch (strtolower($f)) {


    case ''jpg'' :


    case ''jpeg'' :


    header(''Content-Type: image/jpeg'');


    ImageJPEG($img);


    break;


    case ''png'' :


    header(''Content-Type: image/png'');


    ImagePNG($img);


    break;


    default :


    header(''Content-Type: image/gif'');


    ImageGIF($img);


    break;


    }


    ImageDestroy($img);


    The standard value for the Content-Type from a PHP script is text/html . When
    the browser returns a stream of binary data, it''s a good idea to help the browser
    understand what type of data it''s getting. Modern browsers are able to look at
    the content of the data and determine what it is. This is especially the case
    with image data where the formats are well known. In this case we set the Content-Type
    to image/jpeg , image/


    png, or image/gif depending on the type of file requested.


    If this script is executed form the command line it will produce a binary output
    starting with the letters GIF87a22?,223????? . If it''s placed on a web server
    and requested from a browser it will provide a small black image.


    CHAPTER 8 ■ DYNAMIC IMAGING


    Images with a single color are not that useful. In fact the same effect can be
    done with HTML and CSS


    without any impact to the server, but the example demonstrates the basic functionality
    of image generation.


    So let’s move on to some more useful examples.


    Recipe 8-2\. Image Resize


    Problem


    On your web site you have a section that allows registered users to upload an
    image they can use as an avatar when they add comments to your blog. The user
    takes a selfie with the latest smart phone and uploads the image to your site.
    This will be a high-resolution image that takes up space and bandwidth each time
    a new visitor look at pages on your site. It is possible to scale the image in
    the browser, but that will still cause the high-resolution image to be transferred
    from the server to the browser at least once per visitor.


    Solution


    Building on the previous example we can create a script that loads an image from
    a file. And then it will calculate a smaller version of the same image. In order
    not to skew the image we will have to maintain the same aspect ratio as the original
    image. To get the size of the we can either use the functions ImagesX() and ImagesY()
    on the image resource or we can use GetImageSize() , which also returns additional
    information like the type of the image. When you know the width and height of
    the original image you can calculate the new width and height in order to stay
    within the borders of a fixed size. In the example the size of the scaled image
    is set to be within 160x120 pixels.


    From PHP 5.6.3 you can provide -1 as the height and the scaling will be done so
    the aspect ratio is retained.


    How it Works


    The base image used in the example is named IMG_0099.JPG. It is 2048x1536 pixels
    wide and tall. First we look at the values returned by GetImageSize() .


    <?php


    // 8_2.php


    $orig = GetImageSize(''IMG_0099.JPG'');


    print_r($orig);


    This will produce the following output:


    Array


    (


    [0] => 2048


    [1] => 1536


    [2] => 2


    [3] => width="2048" height="1536"


    [bits] => 8


    [channels] => 3


    [mime] => image/jpeg


    )


    CHAPTER 8 ■ DYNAMIC IMAGING


    The first two values contain the width and height. The third value is the image
    type. You can use the constants IMG_GIF , IMG_JPG , IMG_JPEG (same as IMG_JPG
    ), IMG_PNG , IMG_WBPM, and IMG_XPM to compare the value to determine the type,
    or you can use the mime string directly. The third value is a string representation
    of the width and height and the values for bits and channels indicates the number
    of bits and channels. In this example the image has 8 bits and 3 channels allowing
    for 24 bits per pixel.


    <?php


    // 8_3.php


    $size = [160, 120];


    $orig = GetImageSize(''IMG_0099.JPG'');


    $a1 = $size[0] / $size[1];


    $a2 = $orig[0] / $orig[1];


    if ($a1 > $a2) {


    $d = ceil($orig[0] / $size[0]);


    }


    else {


    $d = ceil($orig[1] / $size[1]);


    }


    $w = $orig[0] / $d;


    $h = $orig[1] / $d;


    $img = ImageCreateFromJpeg(''IMG_0099.JPG'');


    $thumb = ImageScale($img, $w, $h);


    header(''Content-Type: '' . $orig[''mime'']);


    switch ($orig[2]) {


    case IMG_JPG :


    case IMG_JPEG :


    ImageJPEG($thumb);


    break;


    case IMG_PNG :


    ImagePNG($thumb);


    break;


    case IMG_GIF :


    ImageGIF($thumb);


    break;


    }


    ImageDestroy($thumb);


    ImageDestroy($img);


    First we calculate the aspect ratio of the new image ( $a1 ) and the aspect ratio
    of the original. This is then used to determine the scaling factor based on the
    size ratio on either the width or height. This will ensure that both sizes are
    scaled with the same factor and that the whole image will fit in the smaller box.


    This code assumes the original image is larger than the desired thumbnail. If
    it''s smaller no scaling is needed and the original could be used as is.


    At the end there are two calls to the ImageDestroy() function. This is because
    the ImageScale() creates a copy of the original resource and we need to get rid
    of both the original and the copy. ImageDestroy() only removes the image from
    memory. Use unlink() to delete the image file from disk.


    ![Image 14](index-205_1.jpg)


    CHAPTER 8 ■ DYNAMIC IMAGING


    The resulting image looks like this:


    Recipe 8-3\. Image Crop


    Problem


    In the previous example we made an effort to keep the same aspect ratio as the
    original image had. What if we want to create a square image from the uploaded
    image? In other words, scale the image based on the smallest side and cut off
    any part of the other dimension that won’t fit within the square.'
  trans: "好的，作为高级文档工程师和翻译员，我将遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n`ImageCreateFrom*()`\
    \ 函数都接受一个参数，该参数可以是本地文件系统中的文件路径或 URL。大多数情况下，从本地文件系统加载图像速度更快，但如果图像在多个服务器之间共享，使用\
    \ URL 获取图像后再进行处理可能更实用。如果不需要处理图像，则让客户端直接从 URL 加载图像或使用简单的 HTTP 重定向会更快。\n\n© Frank\
    \ M. Kromann 2016\n\nF.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_8\n\
    \n## 第 8 章 ■ 动态成像\n\n此外，可以通过 `ImageCreateFromString()` 函数从字符串创建图像。如果图像存储在数据库或其他存储中，或者通过\
    \ API 调用获取图像，这会非常有用。如果传入的字符串不表示有效图像，该函数会发出错误。\n\n最后，还可以创建一个指定大小的新空白图像。这是通过 `ImageCreate()`\
    \ 和 `ImageCreateTrueColor()` 函数完成的。这两个函数都接受两个参数：新图像的宽度和高度。建议使用 `ImageCreateTrueColor()`，因为它提供了最高质量的图像。使用\
    \ `ImageCreate()` 会创建基于调色板的图像，其中每个像素由颜色调色板中的索引表示。使用 `ImageCreateTrueColor()` 时，每个像素将由实际颜色表示。\n\
    \n尽管 PHP 在脚本结束时提供自动清理，但最好手动处理不再需要的图像资源。这通过调用 `ImageDestroy()` 函数完成。\n\n### 工作原理\n\
    \n最简单的图像是所有像素颜色相同的图像。当你使用 `ImageCreateTrueColor()` 创建新的空白图像时，就会得到这样的图像。根据要发送给浏览器的格式，你可以选择相应的输出函数。在此示例中，我们创建一个\
    \ 50x50 像素的小图像，并使用查询参数 `f` 选择格式。如果参数 `f` 缺失、为空或格式不受支持，默认格式将为 GIF。\n\n```php\n\
    // 8_1.php\n\n$img = ImageCreateTrueColor(50, 50);\n\n$f = $_GET['f'] ?: 'gif';\n\
    \nswitch (strtolower($f)) {\n\ncase 'jpg' :\n\ncase 'jpeg' :\n\nheader('Content-Type:\
    \ image/jpeg');\n\nImageJPEG($img);\n\nbreak;\n\ncase 'png' :\n\nheader('Content-Type:\
    \ image/png');\n\nImagePNG($img);\n\nbreak;\n\ndefault :\n\nheader('Content-Type:\
    \ image/gif');\n\nImageGIF($img);\n\nbreak;\n\n}\n\nImageDestroy($img);\n```\n\
    \n来自 PHP 脚本的 `Content-Type` 标准值是 `text/html`。当浏览器返回二进制数据流时，帮助浏览器了解它正在接收什么类型的数据是个好主意。现代浏览器能够查看数据内容并确定其类型。对于图像数据尤其如此，因为其格式众所周知。在此情况下，我们根据请求的文件类型将\
    \ `Content-Type` 设置为 `image/jpeg`、`image/png` 或 `image/gif`。\n\n如果从命令行执行此脚本，它将产生以字符串\
    \ `GIF87a22?,223?????` 开头的二进制输出。如果将其放置在 Web 服务器上并通过浏览器请求，它将提供一个小的黑色图像。\n\n## 第\
    \ 8 章 ■ 动态成像\n\n单色图像并不那么有用。实际上，使用 HTML 和 CSS 可以达到相同效果，且不会对服务器产生任何影响，但此示例演示了图像生成的基本功能。接下来让我们看一些更有用的示例。\n\
    \n### 配方 8-2：图像缩放\n\n#### 问题\n\n在你的网站上，有一个允许注册用户上传图像的板块，他们可以在博客评论中将其用作头像。用户使用最新的智能手机拍摄自拍照并将其上传到你的网站。这将是一张高分辨率图像，每次新访客浏览你网站的页面时都会占用空间和带宽。可以在浏览器中缩放图像，但这仍然会导致高分辨率图像至少每个访客从服务器传输一次到浏览器。\n\
    \n#### 解决方案\n\n基于前面的示例，我们可以创建一个从文件加载图像的脚本。然后它会计算同一图像的较小版本。为了不使图像变形，我们必须保持与原始图像相同的宽高比。要获取图像的大小，可以使用\
    \ `ImagesX()` 和 `ImagesY()` 函数，或者使用 `GetImageSize()`，该函数还会返回其他信息，如图像类型。当你知道原始图像的宽度和高度时，可以计算新的宽度和高度，使其保持在固定尺寸的边界内。在此示例中，缩放后图像的大小被设置为\
    \ 160x120 像素以内。\n\n从 PHP 5.6.3 开始，可以将高度设为 `-1`，缩放将自动保留宽高比。\n\n#### 工作原理\n\n示例中使用的基础图像名为\
    \ `IMG_0099.JPG`。其宽度为 2048 像素，高度为 1536 像素。首先，我们查看 `GetImageSize()` 返回的值。\n\n```php\n\
    // 8_2.php\n\n$orig = GetImageSize('IMG_0099.JPG');\n\nprint_r($orig);\n```\n\n\
    这将产生以下输出：\n\n```\nArray\n(\n    [0] => 2048\n    [1] => 1536\n    [2] => 2\n \
    \   [3] => width=\"2048\" height=\"1536\"\n    [bits] => 8\n    [channels] =>\
    \ 3\n    [mime] => image/jpeg\n)\n```\n\n## 第 8 章 ■ 动态成像\n\n前两个值包含宽度和高度。第三个值是图像类型。你可以使用常量\
    \ `IMG_GIF`、`IMG_JPG`、`IMG_JPEG`（与 `IMG_JPG` 相同）、`IMG_PNG`、`IMG_WBPM` 和 `IMG_XPM`\
    \ 来比较该值以确定类型，或者直接使用 MIME 字符串。第三个值是一个表示宽度和高度的字符串，而 `bits` 和 `channels` 的值表示比特数和通道数。在此示例中，图像有\
    \ 8 比特和 3 个通道，允许每像素 24 比特。\n\n```php\n// 8_3.php\n\n$size = [160, 120];\n$orig\
    \ = GetImageSize('IMG_0099.JPG');\n$a1 = $size[0] / $size[1];\n$a2 = $orig[0]\
    \ / $orig[1];\nif ($a1 > $a2) {\n    $d = ceil($orig[0] / $size[0]);\n}\nelse\
    \ {\n    $d = ceil($orig[1] / $size[1]);\n}\n$w = $orig[0] / $d;\n$h = $orig[1]\
    \ / $d;\n$img = ImageCreateFromJpeg('IMG_0099.JPG');\n$thumb = ImageScale($img,\
    \ $w, $h);\nheader('Content-Type: ' . $orig['mime']);\nswitch ($orig[2]) {\ncase\
    \ IMG_JPG :\ncase IMG_JPEG :\n    ImageJPEG($thumb);\n    break;\ncase IMG_PNG\
    \ :\n    ImagePNG($thumb);\n    break;\ncase IMG_GIF :\n    ImageGIF($thumb);\n\
    \    break;\n}\nImageDestroy($thumb);\nImageDestroy($img);\n```\n\n首先，我们计算新图像的宽高比（`$a1`）和原始图像的宽高比（`$a2`）。然后根据宽度或高度的尺寸比例确定缩放因子。这将确保两个维度都按相同因子缩放，并且整个图像将适合较小的框内。\n\
    \n此代码假设原始图像大于所需的缩略图。如果原始图像较小，则无需缩放，可以直接使用原始图像。\n\n最后有两个对 `ImageDestroy()` 函数的调用。这是因为\
    \ `ImageScale()` 创建了原始资源的副本，我们需要同时释放原始资源和副本。`ImageDestroy()` 仅从内存中移除图像。使用 `unlink()`\
    \ 从磁盘删除图像文件。\n\n![Image 14](img/index-205_1.jpg)\n\n## 第 8 章 ■ 动态成像\n\n结果图像如下所示：\n\
    \n### 配方 8-3：图像裁剪\n\n#### 问题\n\n在前面的示例中，我们努力保持了与原始图像相同的宽高比。如果我们想从上传的图像中创建一个正方形图像呢？换句话说，基于最小边缩放图像，并剪掉另一个维度中不适合正方形的部分。\n"
- fmt: "# Solution\n\nInstead of using the `ImageScale()` function we can use `ImageCrop()`.\
    \ This is a relatively new function (PHP 5.5.0 and PHP 7.0.0). If you are using\
    \ an older version of PHP you can use `ImageCopyResampled()` to achieve the same\
    \ result. This function is used to copy a rectangular section of one image to\
    \ a rectangular section of another image (or the same image) and it will resample\
    \ the pixels to make the copy as smooth as possible.\n\nThe `ImageCrop()` function\
    \ takes two parameters. The first is an image resource for the original image\
    \ and the second is an array with four values for `x`, `y`, `width`, and `height`\
    \ of the section to return. The coordinates `x`, `y` is from the upper-left corner\
    \ of the image.\n\n## How it Works\n\nIf we use the same image as before but want\
    \ to crop and scale it to fit in a box of 150x150 pixels we first need to calculate\
    \ which side to crop, and then calculate the `x`, `y`, `width`, and `height` to\
    \ copy of the original image.\n\nWhen we have a square image it can be scaled\
    \ to the size required. It is assumed that both width and height of the original\
    \ image are larger than 150 px. There are no checks for this in the example but\
    \ that could easily be added. There is no need to crop an image that already fits\
    \ within the box.\n\n```\n<?php\n// 8_4.php\n\n$size = [150, 150];\n\n$orig =\
    \ GetImageSize('IMG_0099.JPG');\n\n$a1 = $orig[0] / $size[0];\n$a2 = $orig[1]\
    \ / $size[1];\n\nif ($a1 < $a2) {\n    $width = $size[0] * $a1;\n    $height =\
    \ $size[1] * $a1;\n    $x = 0;\n    $y = ($orig[1] - $height) / 2;\n}\nelse {\n\
    \    $width = $size[0] * $a2;\n    $height = $size[1] * $a2;\n    $x = ($orig[0]\
    \ - $width) / 2;\n    $y = 0;\n}\n\n$area = ['x' => $x, 'y' => $y, 'width' =>\
    \ $width, 'height' => $height];\n$img = ImageCreateFromJpeg('IMG_0099.JPG');\n\
    $crop = ImageCrop($img, $area);\n$thumb = ImageScale($crop, $size[0], $size[1]);\n\
    \nheader('Content-Type: ' . $orig['mime']);\n\nswitch ($orig[2]) {\n    case IMG_JPG\
    \ :\n    case IMG_JPEG :\n        ImageJPEG($thumb);\n        break;\n    case\
    \ IMG_PNG :\n        ImagePNG($thumb);\n        break;\n    case IMG_GIF :\n \
    \       ImageGIF($thumb);\n        break;\n}\n\nImageDestroy($thumb);\nImageDestroy($crop);\n\
    ImageDestroy($img);\n```\n\nIn this example we end up with three image resources\
    \ to free at the end of the script. The image created from this code is now a\
    \ square with the center of the image.\n\n![Image 15](index-207_1.jpg)\n\nIf you\
    \ are using an older version of PHP or just want to work with one less image resource\
    \ you can use the `ImageCopyResampled()` function to achieve the same result.\n\
    \n```\n<?php\n// 8_5.php\n\n$size = [150, 150];\n\n$orig = GetImageSize('IMG_0099.JPG');\n\
    \n$a1 = $orig[0] / $size[0];\n$a2 = $orig[1] / $size[1];\n\nif ($a1 < $a2) {\n\
    \    $width = $size[0] * $a1;\n    $height = $size[1] * $a1;\n    $x = 0;\n  \
    \  $y = ($orig[1] - $height) / 2;\n}\nelse {\n    $width = $size[0] * $a2;\n \
    \   $height = $size[1] * $a2;\n    $x = ($orig[0] - $width) / 2;\n    $y = 0;\n\
    }\n\n$img = ImageCreateFromJpeg('IMG_0099.JPG');\n$thumb = ImageCreateTrueColor($size[0],\
    \ $size[1]);\n\nImageCopyResampled($thumb, $img, 0, 0, $x, $y, $size[0], $size[1],\
    \ $width, $height);\n\nheader('Content-Type: ' . $orig['mime']);\n\nswitch ($orig[2])\
    \ {\n    case IMG_JPG :\n    case IMG_JPEG :\n        ImageJPEG($thumb);\n   \
    \     break;\n    case IMG_PNG :\n        ImagePNG($thumb);\n        break;\n\
    \    case IMG_GIF :\n        ImageGIF($thumb);\n        break;\n}\n\nImageDestroy($thumb);\n\
    ImageDestroy($img);\n```\n\nIn this example we create a new blank image and we\
    \ copy a resized section of the original image onto this image. There are 10 parameters\
    \ to keep track of to the `ImageCopyResampled()` function. This include destination\
    \ and source image and `x`, `y`, `width`, and `height` of both images.\n\n## Recipe\
    \ 8-4. Image Rotate\n\n### Problem\n\nImages that come from cell phones are either\
    \ portrait or landscape (or something in between). Sometimes they even show up\
    \ upside down depending on how the cell phone was held when the picture was taken.\n\
    \nCell phone software and some image viewing programs can use metadata in the\
    \ image to correct this when showing the image. Typically browsers do not support\
    \ that. When users upload images from phones they might want to rotate the image\
    \ before sizing or cropping it.\n\n### Solution"
  raw: 'Solution


