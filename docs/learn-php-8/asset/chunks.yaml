    `handleerror`程序（在示例 6-2 中）包含一个将处理用户错误（`errorHandler`）的方法，以及`set_error_handler`命令，该命令将错误重定向到此方法。它还包含一个类（`userException`），当在`try`块中抛出`userException`异常时，该类可以做出响应。`require_once`语句包含在`try`块中，以便在文件缺失时尝试捕获错误。然而，这恰好是一个系统错误（而非用户错误），无法被重定向。要捕获系统错误，必须在`catch`块中使用`Error`类。

    在`require_once`语句之后，创建了类`testerror`的一个实例。如果此类缺失，系统也会因致命消息而出错。该块调用`produceerror`方法，该方法会导致用户错误。此错误被重定向到`errorHandler`，后者抛出一个异常（`errorException`）。`catch`块接收该异常并显示错误消息。由于异常不会关闭程序（如致命错误），程序流程会跳转到所有`catch`块之后的第一行，并执行`echo`语句（`echo
    "此行会显示";`）。对错误的反应将导致程序跳过`try`块中任何剩余的代码。在此示例中，`throwexception`方法调用将被忽略。

