- fmt: '# Defining String Values for Your Objects


    Another Java-inspired feature introduced by PHP 5 was the `__toString()` method.
    Before PHP 5.2, when you printed an object, it would resolve to a string like
    this:


    ```

    // listing 04.86

    class StringThing

    {

    }

    // listing 04.87

    $st = new StringThing();

    print $st;

    Object id #1

    ```


    Since PHP 5.2, this code will produce an error like this:


    ```

    Object of class popp\ch04\batch22\StringThing could not be converted to string
    ...

    ```


    By implementing a `__toString()` method, you can control how your objects represent
    themselves when printed. `__toString()` should be written to return a string value.
    The method is invoked automatically when your object is passed to `print` or `echo`,
    and its return value is substituted. Here I add a `__toString()` version to a
    minimal `Person` class:


    ```

    // listing 04.88

    class Person

    {

    function getName(): string

    {

    return "Bob";

    }

    function getAge(): int

    {

    return 44;

    }

    function __toString(): string

    {

    $desc  = $this->getName() . " (age ";

    $desc .= $this->getAge() . ")";

    return $desc;

    }

    }

    ```


    Now when I print a `Person` object, the object will resolve to this:


    ```

    $person = new Person();

    print $person;

    Bob (age 44)

    ```


    The `__toString()` method is particularly useful for logging and error reporting,
    as well as for classes whose main task is to convey information. The `Exception`
    class, for example, summarizes exception data in its `__toString()` method.


    ## Callbacks, Anonymous Functions, and Closures


    Although not strictly an object-oriented feature, anonymous functions are useful
    enough to mention here because you may encounter them in object-oriented applications
    that utilize callbacks.


    To kick things off, here are a couple of classes:


    ```

    // listing 04.89

    class Product {

    public $name;

    public $price;

    public function __construct(string $name, float $price)

    {

    $this->name = $name;

    $this->price = $price;

    }

    }

    class ProcessSale

    {

    private $callbacks;

    public function registerCallback(callable $callback)

    {

    if (! is_callable($callback)) {

    throw new Exception("callback not callable");

    }

    $this->callbacks[] = $callback;

    }

    public function sale(Product $product)

    {

    print "{$product->name}: processing \n";

    foreach ($this->callbacks as $callback) {

    call_user_func($callback, $product);

    }

    }

    }

    ```


    This code is designed to run my various callbacks. It consists of two classes,
    `Product` and `ProcessSale`. `Product` simply stores `$name` and `$price` properties.
    I''ve made these public for the purposes of brevity. Remember, in the real world,
    you''d probably want to make your properties private or protected and provide
    accessor methods. `ProcessSale` consists of two methods.


    The first, `registerCallback()`, accepts an unhinted scalar, tests it, and adds
    it to a callback array. The test, a built-in function called `is_callable()`,
    ensures that whatever I''ve been given can be invoked by a function such as `call_user_func()`
    or `array_walk()`.


    The second method, `sale()`, accepts a `Product` object, outputs a message about
    it, and then loops through the `$callback` array property. It passes each element
    to `call_user_func()`, which calls the code, passing it a reference to the product.
    All of the following examples will work with the framework.


    Why are callbacks useful? They allow you to plug functionality into a component
    at runtime that is not directly related to that component''s core task. By making
    a component callback aware, you give others the power to extend your code in contexts
    you don''t yet know about.


    Imagine, for example, that a future user of `ProcessSale` wants to create a log
    of sales. If the user has access to the class, she might add logging code directly
    to the `sale()` method. This isn''t always a good idea, though. If she is not
    the maintainer of the package that provides `ProcessSale`, then her amendments
    will be overwritten the next time the package is upgraded. Even if she is the
    maintainer of the component, adding many incidental tasks to the `sale()` method
    will begin to overwhelm its core responsibility, and potentially make it less
    usable across projects. I will return to these themes in the next section.


    Luckily, though, I made `ProcessSale` callback-aware. Here I create a callback
    that simulates logging:


    ```

    // listing 04.90

    $logger = create_function(

    ''$product'',

    ''print "    logging ({$product->name})\n";''

    );

    $processor = new ProcessSale();

    $processor->registerCallback($logger);

    $processor->sale(new Product("shoes", 6));

    print "\n";

    $processor->sale(new Product("coffee", 6));

    ```


    I use `create_function()` to build my callback. As you can see, it accepts two
    string arguments: first, a list of parameters; and second, the function body.
    The result is often called an anonymous function as it''s not named in the manner
    of a standard function. Instead, it can be stored in a variable and passed to
    functions and methods as a parameter. That''s just what I do, storing the function
    in the `$logger` variable and passing it to `ProcessSale::registerCallback()`.
    Finally, I create a couple of products and pass them to the `sale()` method. You
    have already seen what happens there. The sale is processed (in reality a simple
    message is printed about the product) and any callbacks are executed. Here is
    the code in action:


    ```

    shoes: processing

    logging (shoes)

    coffee: processing

    logging (coffee)

    ```'
