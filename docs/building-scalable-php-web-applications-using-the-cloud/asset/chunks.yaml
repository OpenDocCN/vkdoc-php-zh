    in the cloud. A service that is built to be scalable in the cloud is called a
    *cloud cluster* , or just a *cloud*.


    The term *scalability* is an important term in cloud computing. Scalability is
    different than just performance. Performance refers to either efficiency or raw
    speed. Scalability refers to the ability of the system to expand its processing
    power quickly. For instance, a program that can handle 2,000 requests per second
    might be considered high performing, but if that program’s speed cannot be increased
    by adding another node, it is not scalable.


    On the other hand, even a low-performing program might be scalable. If my program
    only handles 1 request per second, but every node I add increases the number of
    requests it can handle, then my program is scalable. If I scale this low-performing
    program up to 4,000 nodes, it will be able to handle more requests than the previous
    case which handled at most 2,000 requests per second. The whole cluster (with
    its 4,000 nodes) might now be considered high performance based on the throughput
    of the whole cluster even though its individual parts are not high performance.


    Usually, scalability depends on your ability to *parallelize* tasks. Parallelization
    refers to the ability of tasks to run independently of each other, even on other
    machines. The more that two tasks need to coordinate with each other, the less
    parallelizable they are. In designing applications for scalability, you need to
    take particular note of the way in which different parts of the system require
    coordination, and aim to minimize or remove the impact of these coordination points.


    Hopefully, the things that you build are *both* high performance (even for a small
    number of nodes) *and* scalable (so that adding more nodes increases performance).
    Making an application perform well is about looking for slow code and replacing
    it with fast code or rewriting your application to not need the slow code. Making
    an application scalable is about looking for *bottlenecks* which prevent parallelization
    and replacing those bottlenecks with code that can scale to multiple nodes or
    reworking your architecture so that the bottleneck doesn’t arise in the first
    place.


    The focus of this book is on scalability, though performance is also considered.


    ### ![../images/487291_1_En_2_Chapter/487291_1_En_2_Figa_HTML.jpg](images/487291_1_En_2_Chapter/487291_1_En_2_Figa_HTML.jpg)
    Skipping The Server Room


    Here is an amusing story of things that I don’t miss about dealing with server
    rooms. In the late 1990s, I once worked as a programmer/system administrator for
    a company that hosted its own servers. These servers were not in regular server
    racks, but rather on essentially metal wire shelving. The primary external-facing
    server was on the top shelf.


    We needed some extra drive space on this server, so I had installed an external
    drive pack on the server. At the time, the main mode of connecting external storage
    to servers was called SCSI (pronounced “scuzzy”), and it was fraught with problems.
    After some time, there started being a lot of problems with the server accessing
    the drive pack, so I went to troubleshoot.


    Since the server was on the top shelf, I stood on top of a stool to work with
    the machine. I spent about a half an hour trying to figure out what was wrong.
    Realize that this was happening with our main external server, so every minute
    counted, because our (very active) web site was having problems.


    So, I managed to move everything off of the new drive packs, then disconnected
    the drives to take them back to my office to see what the problem was. However,
    I had spent so much time standing on the stool messing with the computer, I forgot
    that I was, you know, standing on a stool. So, I grabbed the drive pack and just
    walked out of the room, or so I intended. Thankfully, neither I nor the drive
    pack was injured by the fall, but my pride certainly was.


    As fun as stories such as these are to reminisce over, I’m glad that those days
    are behind us.


    # 3. Setting Up a Cloud Server


    As with most cloud providers, setting up a cloud server on Linode is extremely
    simple. This chapter shows you the basic process to get something up and running,
    with screenshots.


    ## 3.1 Creating Your Virtual Server


    Hopefully, if you are a web developer or manager, you can sign up for the Linode
    service without too much trouble. It requires a credit card up front, but you
    will find the costs of running everything in this book are likely less than the
    book itself, assuming that you turn off your services when you are done with them.


    Before moving ahead, go ahead and create your account with Linode now.


    After you sign up and sign in, Linode brings you to your dashboard, which should
    look something like Figure [3-1](#487291_1_En_3_Chapter.xhtml#Fig1).


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig1_HTML.jpg](images/487291_1_En_3_Chapter/487291_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    The Linux Dashboard


    You currently have nothing set up, so your dashboard is pretty empty. To get started,
    click the “Create” button. Linode calls their virtual servers “nodes” or “Linodes,”
    so choose “Linode” to create a new machine.


    Linode will then ask you several questions to help you configure your node for
    use. While there are any number of good choices, use the ones here in order to
    be able to follow along with the book:


    1.  Under “Choose a Distribution,” pick “CentOS 7.”


    2.  Under “Region,” it doesn’t matter what you choose, but you have to pick the
    same one each time for your servers to talk to each other. This book will use
    the “Dallas, TX” facility.


    3.  Under “Linode Plan,” the cheapest one, which is sufficient for our purposes,
    is the “Nanode 1GB” plan. At the time of this writing, this plan costs less than
    1 cent per hour to operate.


    4.  Under “Linode Label,” we will call this machine `template_node`.


    5.  You can ignore the “Add Tags” section. Tags are useful for grouping machines
    together when you have a lot of them.


    6.  Under “Root Password,” add a password for this machine. Be sure the password
    is secure, as there are a lot of hackers that just go around attempting various
    passwords for root accounts. It is not unusual to have 50,000 such hack attempts
    each month.


    7.  For the moment, you can leave “Optional Add-ons” untouched. We will deal with
    backups and private IP addresses later on in the book.


    After setting all of these, hit the “Create” button, and Linode will start building
    your machine. Linode will bring you to a dashboard for your machine which will
    have, among other things, a progress bar and an “Activity Feed” (see Figure [3-2](#487291_1_En_3_Chapter.xhtml#Fig2)).
    When the progress bar is done, you are now the proud owner of a new server in
    the cloud!


    ![../images/487291_1_En_3_Chapter/487291_1_En_3_Fig2_HTML.jpg](images/487291_1_En_3_Chapter/487291_1_En_3_Fig2_HTML.jpg)


    Figure 3-2


    Your New Node’s Dashboard'
