    small the contribution, can lead to lots of interesting opportunities and pay
    real dividends.


    Now that you’re reaching the end of this book, you’re hopefully in a position
    where you feel more confident about tackling your next Shopify theme development
    project. (Well, I certainly hope you are—if not, you’d better get in touch with
    me to let me know what needs to improve for the next edition.)


    As you work on that project, I encourage you to think about how the things you’re
    learning and developing could be turned into something valuable for the wider
    community. When I say “community,” I’m not referring to anything official. There’s
    no admission process or secret handshake. I also don’t believe that you need to
    have years and years of experience with Shopify to teach others something valuable.


    It might be a blog post describing how you overcame a difficulty when building
    your theme, or replying to someone who’s asked a question on the Shopify forums.
    Even just raising an issue on GitHub for an open-source library you’ve been using
    is super useful and will be very much appreciated by the maintainers!


    A rising tide lifts all boats, and having a Shopify developer community that’s
    vibrant and full of active and supportive members is only going to encourage the
    ecosystem’s growth .


    ## Where to Join


    This section contains a list of resources that I think are useful for participating
    in the Shopify community.'
  trans: '

    #### 单打独斗


    我推荐的第一种方法就是直接搭建一个自己的落地页来销售主题（顺便说一句，即使你已被主题商店收录，也可以并且应该这样做）。撰写落地页内容时，要瞄准那些有特定使用场景的店主——你的主题能完美呈现这种场景，而常规的主题商店里却找不到类似方案。


    这种方法的优势在于，你到手的收入是 **100%** 减去手续费，而不是 70%。当然，缺点也很明显：在官方渠道之外推动销售会困难得多，而且这类主题的定价通常较低（大约在
    50 到 100 美元之间）。


    近年来，一些成熟的 Shopify 主题开发者已经尝试在官方商店之外以更高的价格销售主题。一个典型的例子是图 11-8 中由长期开发者 Out of the
    Sandbox 开发的“Turbo”主题，其目前零售价为 350 美元。虽然这对他们来说是一个成功的策略，也更公平地补偿了他们支持主题所花费的时间，但我觉得，对于一个没有现有客户基础的“非知名”开发者来说，要效仿这种做法会非常困难。


    ![A437216_1_En_11_Fig8_HTML.jpg](img/A437216_1_En_11_Fig8_HTML.jpg)


    图 11-8


    这个“Turbo”主题由 Out of the Sandbox 在主题商店之外销售


    #### 使用替代的主题市场


    像 ThemeForest（`https://themeforest.net`）和 Creative Market（`https://creativemarket.com`）这样的网站提供了替代的主题市场，你可以将主题上架到这些平台。这些网站通常是一场价格的“下限竞赛”，所以你需要做好心理准备，你的主题在这里可能只能卖到
    30 到 50 美元。这些平台上主题的质量通常（但并非总是）比较低。


    #### 框架化


    大多数为客户构建定制主题的 Shopify 主题开发者，最终都会开始开发自己的主题“框架”——一套起始模板和样式，以避免一遍又一遍地重复相同的步骤。考虑将你构建的部分内容提取出来，形成你自己的框架或模式库，这样你下次为客户开展项目时就能抢占先机。


    #### 使用开源策略


    你无法直接从这种策略中获利，但将你的主题开源是让你被更多精明的客户和其他主题开发者注意到的绝佳方式。这反过来又能为定制开发工作带来潜在的业务线索。下一节将讨论将你的
    Shopify 作品开源的一些好处。


    ## 利用 Shopify 生态系统


    当我刚开始以 Shopify 专家的身份工作时，我和其他开发者的互动并不多。我喜欢独来独往，靠着专家列表推荐或口碑推荐来的客户，也勉强能维持生计。


    在摆弄这个平台几年后，我建立了信心，开始在我的个人博客上偶尔发表文章。这些文章并非什么颠覆性的东西——大部分只是描述我当时如何绕过 Shopify 的一些限制，比如让
    `Respond.js` 库在 Shopify 的 CDN 上工作。¹ 我收到了一些（Shopify 内部和外部的）开发者的积极反馈，所以我就继续发表一些与
    Shopify 相关的文章。


    随着时间的推移，知道我的博客内容有人阅读并且觉得有用，这给了我勇气，开始将我正在做的其他事情发布出来。从那时起，我发布了一个付费框架来帮助人们使用 Bootstrap
    前端框架构建主题，开发了一系列开源项目来辅助 Shopify 开发（可见于 `https://github.com/discolabs`），录制了几个关于主题和应用程序开发的截屏视频，在世界各地的聚会和会议上就
    Shopify 发表演讲并举办研讨会，现在又写了这本书。


    这些项目没有一个让我赚得盆满钵满，也没有一个发展成极受欢迎且备受瞩目的项目（尽管其中一个，`Cart.js`，被 Kanye West 的 Yeezy 商店使用，这相当酷）。尽管没有直接获得巨大的经济回报，但我觉得在每种情况下我都收获了一些东西：


    -   当完全陌生的人对我的文章或项目表示赞赏时，我感到了许多温暖和欣慰。

    -   当完全陌生的人为我的文章或项目付费时，我感到了更多的温暖和欣慰。

    -   来自更优质客户的咨询数量增加了，而当你能说自己真正写过一本关于 Shopify 的书时，说服客户也变得更加容易。

    -   我和一个最重要的客户的关系，始于多年前他们请我对我的付费框架做一个小的调整，这种关系至今仍在继续，并且对我们双方都有利可图！

    -   我得以联系并结识了 Shopify 生态系统中一些非常棒的人。


    我之所以不厌其烦地讲这些，并非想做个史上最长的低调炫耀，而是想强调，将你的工作（无论贡献多么微小）分享给社区，可以带来许多有趣的机会，并产生切实的回报。


    现在你已经读到了这本书的结尾，希望你对自己的下一个 Shopify 主题开发项目更有信心了。（嗯，我当然希望如此——如果不是，你最好联系我，让我知道下一版需要改进什么。）


    当你开展那个项目时，我鼓励你思考一下，你正在学习和开发的东西如何能转化为对更广泛社区有价值的东西。当我说“社区”时，我指的不是任何官方组织。没有准入流程，也没有秘密握手礼。我也不认为你需要拥有多年的
    Shopify 经验才能教给别人有价值的东西。


    它可以是一篇描述你在构建主题时如何克服困难的博客文章，也可以是回复一个在 Shopify 论坛上提问的人。甚至只是在 GitHub 上为你一直在使用的开源库提交一个问题（issue）也是非常有用的，维护者会非常感激！


    水涨船高，拥有一个充满活力、充满积极和支持性成员的 Shopify 开发者社区，只会促进整个生态系统的成长。


    ## 去哪里参与


    本节列出了我认为对于参与 Shopify 社区有用的一些资源列表。

