    function create_object($properties_array)

    ```


    `create_object` 方法用于创建 `dog` 和 `get_breeds` 对象。`dog` 对象的构造函数原本期望接收四个值（`dog_name`、`dog_weight`、`dog_breed`
    和 `dog_color`）。而 `get_breeds` 应用程序的构造函数不接收任何值。为了在 `dog_container` 中提供更高效的代码，我们更改了每个类构造函数的签名（函数的第一行），使其接收一个数组，而非单独的值。这样，我们就可以将任意数量的项传递到任何一个构造函数中。


    ```

