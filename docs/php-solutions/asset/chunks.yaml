  trans: '

    # PHP 如何从表单中收集信息


    虽然 HTML 包含了构建表单所需的所有标签，但它并未提供任何在提交时处理表单的方法。为此，你需要一个服务器端解决方案，例如 PHP。


    日本之旅网站包含一个简单的反馈表单（见图 5-1）。其他元素——如单选按钮、复选框和下拉菜单——稍后会添加。


    ![A978-1-4842-0635-5_5_Fig1_HTML.jpg](img/A978-1-4842-0635-5_5_Fig1_HTML.jpg)


    图 5-1. 处理反馈表单是 PHP 最流行的用途之一


    首先，让我们看一下该表单的 HTML 代码（位于 `ch05` 文件夹的 `contact_01.php` 中）：


    ```

    <form method="post" action="">

    <p>

    <label for="name">Name:</label>

    <input name="name" id="name" type="text">

    </p>

    <p>

    <label for="email">Email:</label>

    <input name="email" id="email" type="text">

    </p>

    <p>

    <label for="comments">Comments:</label>

    <textarea name="comments" id="comments"></textarea>

    </p>

    <p>

    <input name="send" type="submit" value="Send message">

    </p>

    </form>

    ```


    前两个 `<input>` 标签和 `<textarea>` 标签都包含 `name` 和 `id` 属性，且被设置为相同的值。这种重复的原因是：HTML、CSS
    和 JavaScript 都引用 `id` 属性，而表单处理脚本依赖于 `name` 属性。因此，尽管 `id` 属性是可选的，但对于每个需要处理的元素，你必须使用
    `name` 属性。


    另外需要注意的两点是，起始 `<form>` 标签中的 `method` 和 `action` 属性。`method` 属性决定了表单如何发送数据。它可以设置为
    `post` 或 `get`。`action` 属性告诉浏览器当点击“提交”按钮时将数据发送到哪里进行处理。如果该值留空（如此处所示），则页面会尝试自行处理表单。


    **注意**


    我刻意没有使用任何新的 HTML5 表单功能，例如 `type="email"` 和 `required` 属性。这样可以更轻松地测试 PHP 服务器端验证脚本。测试完成后，你可以更新表单以使用
    HTML5 验证功能。浏览器中的验证主要是为了方便用户，防止提交不完整的信息，因此它是可选的。服务器端验证则绝不可省略。


    ## 理解 `post` 和 `get` 的区别


    演示 `post` 和 `get` 方法之间区别的最佳方式是使用一个真实的表单。如果你完成了上一章，可以继续使用相同的文件。


    否则，`ch05` 文件夹中包含日本之旅网站的完整文件集，其中包含了 第 4 章 中的所有代码。将 `contact_01.php` 复制到站点根目录，并将其重命名为
    `contact.php`。另外，将 `ch05/includes` 文件夹的内容复制到站点根目录的 `includes` 文件夹中。


    找到 `contact.php` 中的起始 `<form>` 标签，并将 `method` 属性的值从 `post` 改为 `get`，如下所示：


    ```

    <form method="get" action="">

    ```


    保存 `contact.php` 并在浏览器中加载该页面。在表单中输入你的姓名、电子邮件地址和一条简短的消息，然后点击“发送消息”。


    ![A978-1-4842-0635-5_5_Figa_HTML.jpg](img/A978-1-4842-0635-5_5_Figa_HTML.jpg)


    查看浏览器地址栏。你应该会看到表单的内容附加在 URL 的末尾，如下所示：


    ![A978-1-4842-0635-5_5_Figb_HTML.jpg](img/A978-1-4842-0635-5_5_Figb_HTML.jpg)


    如果你分解这个 URL，它看起来是这样的：


    ```

    http://localhost/phpsols/contact.php

    ?name=David+Powers

    &email=david%40example.com

    &comments=I+hope+you+get+this.+%3B-%29

    &send=Send+message

    ```


    基本 URL 之后的每一行都以表单元素的 `name` 属性开头，后跟一个等号和输入字段的内容。URL 不能包含空格或某些字符（例如我的笑脸符号），因此浏览器将它们编码为十六进制值，这个过程称为
    URL 编码（有关完整的值列表，请参见 [`www.w3schools.com/tags/ref_urlencode.asp`](http://www.w3schools.com/tags/ref_urlencode.asp)）。


    第一个 `name` 属性前面有一个问号（`?`），其余前面有一个 & 符号（`&`）。在使用搜索引擎时你会看到这种类型的 URL，这有助于解释为什么问号之后的所有内容被称为查询字符串。


    回到 `contact.php` 的代码中，将 `method` 改回 `post`，如下所示：


    ```

    <form method="post" action="">

    ```


    保存 `contact.php` 并在浏览器中重新加载页面。输入另一条消息并点击“发送消息”。你的消息应该会消失，但不会发生其他任何事情。消息并没有丢失，只是你还未做任何处理。


    在 `contact.php` 中，在结束的 `</form>` 标签正下方添加以下代码：


    ```

    <pre>

    <?php if ($_POST) { print_r($_POST); } ?>

    </pre>

    ```


    如果已发送任何 `post` 数据，这将显示 `$_POST` 超全局数组的内容。如 第 3 章 所述，`print_r()` 函数允许你检查数组的内容；`<pre>`
    标签只是让输出更易于阅读。


    保存页面并点击浏览器中的“刷新”按钮。你可能会看到一个类似于下面的警告。这告诉你数据将被重新发送，这完全正是你想要的。确认你希望再次发送信息。


    ![A978-1-4842-0635-5_5_Figc_HTML.jpg](img/A978-1-4842-0635-5_5_Figc_HTML.jpg)


    来自第 6 步的代码现在应该会在表单下方显示你消息的内容，如图 5-2 所示。所有内容都已存储在 PHP 的超全局数组 `$_POST` 中，该数组包含使用
    `post` 方法发送的数据。每个表单元素的 `name` 属性被用作数组键，这使得检索内容变得很容易。


    ![A978-1-4842-0635-5_5_Fig2_HTML.jpg](img/A978-1-4842-0635-5_5_Fig2_HTML.jpg)


    图 5-2. `$_POST` 数组使用表单的 `name` 属性来标识每个数据元素


    正如你刚刚看到的，`get` 方法以一种非常暴露的方式发送数据，使其容易受到篡改。此外，某些浏览器将 URL 的最大长度限制在约 2000 个字符，因此 `get`
    方法只能用于少量数据。`post` 方法更安全，并且可以用于更大量的数据。默认情况下，PHP 允许最多 8 MB 的 `post` 数据，尽管托管公司可能会设置不同的限制。


    因此，在处理表单时，你通常应使用 `post` 方法。`get` 方法主要与数据库搜索结合使用；将你的搜索结果加入书签非常有用，因为所有搜索条件都包含在 URL
    中。我们将在本书后面再次讨论 `get` 方法。本章重点介绍 `post` 方法及其相关的超全局数组 `$_POST`。


    **警告**


    尽管 `post` 方法比 `get` 更安全，但你不应假设它是 100% 安全的。为了实现安全传输，你需要使用加密技术或安全套接字层（SSL），并且 URL
    必须以 `https://` 开头。

