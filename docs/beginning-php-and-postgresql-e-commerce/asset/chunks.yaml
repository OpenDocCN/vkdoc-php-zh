    C H A P T E R 4 ■ C R E AT I N G T H E P R O D U C T C ATA L O G : PA RT I I The
    SHORT_PRODUCT_DESCRIPTION_LENGTH constant specifies how many characters from the
    product’s description should appear when displaying product lists. The complete
    description gets displayed in the product’s details page, which you’ll implement
    at the end of this chapter.


    PRODUCTS_PER_PAGE specifies the maximum number of products that can be displayed
    in any catalog page. If the visitor’s selection contains more than PRODUCTS_PER_PAGE
    products, the list of products is split into subpages, accessible through the
    navigation controls.


    We also enabled the PHP session, which will help us improve performance when navigating
    through pages of products.


    ■**Note** Session handling is a great PHP feature that allows you to keep track
    of variables specific to a certain visitor accessing the web site. While the visitor
    browses the catalog, its session variables are persisted by the web server and
    associated to a unique visitor identifier (which is stored by default in the visitor’s
    browser as a **cookie**). The visitor’s session object stores (name, value) pairs
    that are saved at server-side and are accessible for the entire visitor’s session.
    In this chapter, we’ll use the session feature for improving performance. When
    implementing the paging functionality, before requesting the list of products,
    you first ask the database for the total number of products that are going to
    be returned, so you can show the visitor how many pages of products are available.
    This number will be saved in the visitor’s session, so if the visitor browses
    the pages of a list of products, the database wouldn’t be queried multiple times
    for the total number of products—on subsequent calls, this number will be directly
    read from the session (this functionality is implemented in the HowManyPages method
    that you’ll implement later). In this chapter, you’ll also use the session to
    implement the Continue Shopping buttons in product details pages.


    Let’s work through each business tier method. All these methods need to be added
    to the Catalog class, located in the business/catalog.php file that you started
    writing in Chapter 3.


