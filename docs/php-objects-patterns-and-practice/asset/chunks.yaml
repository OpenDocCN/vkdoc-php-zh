  trans: '

    ## 接口


    尽管抽象类允许你提供一定程度的实现，但接口是纯粹的模板。接口只能定义功能，绝不能实现它。接口使用 `interface` 关键字声明。它可以包含属性和方法声明，但不能包含方法体。


    以下是一个接口示例：


    ```

    // listing 04.08

    interface Chargeable

    {

    public function getPrice(): float;

    }

    ```


    如你所见，接口看起来非常像类。任何包含该接口的类都必须实现其定义的所有方法，否则必须声明为抽象类。


    类可以在其声明中使用 `implements` 关键字实现接口。完成此操作后，实现接口的过程与扩展一个仅包含抽象方法的抽象类相同。现在我将让 `ShopProduct`
    类实现 `Chargeable`：


    ```

    // listing 04.09

    class ShopProduct implements Chargeable

    {

    // ...

    protected $price;

    // ...

    public function getPrice(): float

    {

    return $this->price;

    }

    // ...

    }

    ```


    `ShopProduct` 已经有一个 `getPrice()` 方法，那么实现 `Chargeable` 接口有什么用呢？答案再次与类型有关。实现类会同时获得它所继承的父类类型和它所实现的接口类型。


    这意味着 `CdProduct` 类属于以下类型：


    ```

    CdProduct

    ShopProduct

    Chargeable

    ```


    这一点可以被客户端代码利用。了解对象的类型就是了解其能力。请考虑以下方法：


    ```

    public function cdInfo(CdProduct $prod)

    {

    // ...

    }

    ```


    该方法知道 `$prod` 对象除了拥有 `ShopProduct` 类和 `Chargeable` 接口中定义的所有方法外，还有一个 `getPlayLength()`
    方法。


    如果传递同一个对象，该方法知道 `$prod` 支持 `ShopProduct` 中的所有方法：


    ```

    public function addProduct(ShopProduct $prod)

    {

    // ...

    }

    ```


    然而，未经进一步测试，该方法对 `getPlayLength()` 方法一无所知。


    同样，传递同一个 `CdProduct` 对象，该方法对 `ShopProduct` 或 `CdProduct` 类型完全不知晓：


    ```

    public function addChargeableItem(Chargeable $item)

    {

    //...

    }

    ```


    但该方法只关心 `$item` 参数是否包含一个 `getPrice()` 方法。


    因为任何类都可以实现接口（实际上，一个类可以实现任意数量的接口），所以接口可以有效地将原本无关的类型连接起来。我可以定义一个全新的类来实现 `Chargeable`：


    ```

    class Shipping implements Chargeable

    {

    public function getPrice(): float

    {

    //...

    }

    }

    ```


    我可以将一个 `Shipping` 对象传递给 `addChargeableItem` 方法，就像传递一个 `ShopProduct` 对象一样。


    对于处理 `Chargeable` 对象的客户端来说，重要的是它可以调用 `getPrice()` 方法。任何其他可用的方法，无论是通过对象自身的类、父类还是其他接口，都与其他类型相关联。这些与客户端无关。


    一个类既可以扩展一个父类，也可以实现任意数量的接口。`extends` 子句应位于 `implements` 子句之前：


    ```

    class Consultancy extends TimedService implements Bookable, Chargeable

    {

    // ...

    }

    ```


    请注意，`Consultancy` 类实现了多个接口。多个接口排列在 `implements` 关键字之后，用逗号分隔。


    PHP 只支持单一父类继承，因此 `extends` 关键字后只能跟一个类名。


    ## 特质


    如我们所见，接口帮助你管理这样一个事实：与 Java 一样，PHP 不支持多重继承。换句话说，PHP 中的类只能扩展一个父类。但是，你可以让一个类承诺实现任意数量的接口；每实现一个接口，该类就获得相应的类型。


    因此，接口提供了类型，但不提供实现。但是，如果你想在继承层次结构之间共享实现呢？PHP 5.4 引入了特质，这正好解决了这个问题。


    特质是一种类似类的结构，它本身不能被实例化，但可以被合并到类中。特质中定义的任何方法都会成为使用它的类的一部分。特质会改变类的结构，但不会改变其类型。可以把特质看作是类的“包含文件”。


    让我们看看特质为什么会有用。


    ### 特质要解决的问题


    这是 `ShopProduct` 类的一个版本，其中包含一个 `calculateTax()` 方法：


    ```

    // listing 04.10

    class ShopProduct

    {

    private $taxrate = 17;

    // ...

    public function calculateTax(float $price): float

    {

    return (($this->taxrate / 100) * $price);

    }

    }

    // listing 04.11

    $p = new ShopProduct("Fine Soap", "", "Bob''s Bathroom", 1.33);

    print $p->calculateTax(100) . "\n";

    ```


    `calculateTax()` 方法接受一个 `$price` 参数，并基于私有的 `$taxrate` 属性计算销售税金额。


    当然，子类可以访问 `calculateTax()`。但完全不同的类层次结构呢？想象一个名为 `UtilityService` 的类，它继承自另一个类 `Service`。如果
    `UtilityService` 需要使用相同的例程，我可能会发现自己需要完整地重复编写 `calculateTax()`：


    ```

    abstract class Service

    {

    // 面向服务的功能

    }

    class UtilityService extends Service

    {

    private $taxrate = 17;

    function calculateTax(float $price): float

    {

    return ( ( $this->taxrate/100 ) * $price );

    }

    }

    $u = new UtilityService();

    print $u->calculateTax(100)."\n";

    ```


    ### 定义和使用特质


    我将在本书中介绍的面向对象设计核心目标之一是消除重复。正如你在第 11 章中看到的，解决这种重复的一种方法是将其提取到可重用的策略类中。特质提供了另一种方法——也许不够优雅，但肯定有效。


    这里我声明一个定义 `calculateTax()` 方法的单一特质，然后将其同时包含在 `ShopProduct` 和 `UtilityService`
    中：


    ```

    // listing 04.12

    trait PriceUtilities

    {

    private $taxrate = 17;

    public function calculateTax(float $price): float

    {

    return (($this->taxrate / 100) * $price);

    }

    // 其他实用功能

    }

    // listing 04.13

    class ShopProduct

    {

    use PriceUtilities;

    }

    // listing 04.14

    abstract class Service

    {

    // 面向服务的功能

    }

    // listing 04.15

    class UtilityService extends Service

    {

    use PriceUtilities;

    }

    // listing 04.16

    $p = new ShopProduct();

    print $p->calculateTax(100) . "\n";

    $u = new UtilityService();

    print $u->calculateTax(100) . "\n";

    ```


    我使用 `trait` 关键字声明了 `PriceUtilities` 特质。特质的主体看起来与类的主体非常相似。它只是花括号内的一组方法和属性。一旦声明完成，我就可以在我的类中访问
    `PriceUtilities` 特质。我通过 `use` 关键字后跟要合并的特质名称来实现这一点。因此，在一个地方声明并实现了 `calculateTax()`
    方法后，我便将其包含到 `ShopProduct` 和 `UtilityService` 这两个类中。

    '
- fmt: '### Using More than One Trait


    You can include multiple traits in a class by listing each one after the `use`
    keyword, separated by commas. In this example, I define and apply a new trait,
    `IdentityTrait`, keeping my original `PriceUtilities` trait:


    ```

    // listing 04.17

    trait IdentityTrait

    {

    public function generateId(): string

    {

    return uniqid();

    }

    }

    // listing 04.18

    class ShopProduct

    {

    use PriceUtilities, IdentityTrait;

    }

    // listing 04.19

    $p = new ShopProduct();

    print $p->calculateTax(100) . "\n";

    print $p->generateId() . "\n";

    ```


    By applying both `PriceUtilities` and `IdentityTrait` with the `use` keyword,
    I make the `calculateTax()` and the `generateId()` methods available to the `ShopProduct`
    class. This means the class offers both the `calculateTax()` and `generateId()`
    methods.


    **Note**


    The `IdentityTrait` trait provides the `generateId()` method. In fact, a database
    often generates identifiers for objects, but you might switch in a local implementation
    for testing purposes. You can find out more about objects, databases, and unique
    identifiers in Chapter [12](#A314621_5_En_12_Chapter.html), which covers the Identity
    Map pattern. You can learn more about testing and mocking in Chapter [18](#A314621_5_En_18_Chapter.html).


    ### Combining Traits and Interfaces


    Although traits are useful, they don’t change the type of the class to which they
    are applied. So when you apply the `IdentityTrait` trait to multiple classes,
    they won’t share a type that could be hinted for in a method signature.


    Luckily, traits play well with interfaces. I can define an interface that requires
    a `generateId()` method, and then declare that `ShopProduct` implements it:


    ```

    // listing 04.20

    interface IdentityObject

    {

    public function generateId(): string;

    }

    // listing 04.21

    trait IdentityTrait

    {

    public function generateId(): string

    {

    return uniqid();

    }

    }

    // listing 04.22

    class ShopProduct implements IdentityObject

    {

    use PriceUtilities, IdentityTrait;

    }

    ```


    As before, `ShopProduct` uses the `IdentityTrait` trait. However, the method this
    imports, `generateId()` now also fulfills a commitment to the `IdentityObject`
    interface. This means that we can pass `ShopProduct` objects to methods and functions
    that use type hinting to demand `IdentityObject` instances, like this:


    ```

    // listing 04.23

    public static function storeIdentityObject(IdentityObject $idobj)

    {

    // do something with the IdentityObject

    }

    // listing 04.24

    $p = new ShopProduct();

    self::storeIdentityObject($p);

    print $p->calculateTax(100) . "\n";

    print $p->generateId() . "\n";

    ```


    ### Managing Method Name Conflicts with `insteadof`


    The ability to combine traits is a nice feature, but sooner or later conflicts
    are inevitable. Consider what would happen, for example, if I were to use two
    traits that provide a `calculateTax()` method:


    ```

    // listing 04.25

    trait TaxTools

    {

    function calculateTax(float $price): float

    {

    return 222;

    }

    }

    // listing 04.26

    trait PriceUtilities

    {

    private $taxrate = 17;

    public function calculateTax(float $price): float

    {

    return (($this->taxrate / 100) * $price);

    }

    // other utilities

    }

    // listing 04.27

    class UtilityService extends Service

    {

    use PriceUtilities, TaxTools;

    }

    // listing 04.28

    $u = new UtilityService();

    print $u->calculateTax(100) . "\n";

    ```


    Because I have included two traits that contain `calculateTax()` methods, PHP
    is unable to work out which should override the other. The result is a fatal error:


    ```

    PHP Fatal error:  Trait method calculateTax has not been applied, because there

    are collisions with other trait methods on...

    ```


    To fix this problem, I can use the `insteadof` keyword. Here’s how:


    ```

    // listing 04.29

    class UtilityService extends Service

    {

    use PriceUtilities, TaxTools {

    TaxTools::calculateTax insteadof PriceUtilities;

    }

    }

    // listing 04.30

    $u = new UtilityService();

    print $u->calculateTax(100) . "\n";

    ```


    In order to apply further directives to a `use` statement, I must first add a
    body. I do this with opening and closing braces. Within this block, I use the
    `insteadof` operator. This requires a fully qualified method reference (i.e.,
    one that identifies both the trait and the method names, separated by a scope
    resolution operator) on the left-hand side. On the right-hand side, `insteadof`
    requires the name of the trait whose equivalent method should be overridden:


    ```

    TaxTools::calculateTax insteadof PriceUtilities;

    ```


    The preceding snippet means, “Use the `calculateTax()` method of `TaxTools` instead
    of the method of the same name in `PriceUtilities`.”


    So when I run this code, I get the dummy output I planted in `TaxTools::calculateTax()`:


    ```


    ```


    ### Aliasing Overridden Trait Methods


    We have seen that you can use `insteadof` to disambiguate between methods. What
    do you do, though, if you want to then access the overridden method? The `as`
    operator allows you to alias trait methods. Once again, the `as` operator requires
    a full reference to a method on its left-hand side. On the right-hand side of
    the operator, you should put the name of the alias. So here, for example, I reinstate
    the `calculateTax()` method of the `PriceUtilities` trait using the new name `basicTax()`:


    ```

    // listing 04.31

    class UtilityService extends Service

    {

    use PriceUtilities, TaxTools {

    TaxTools::calculateTax insteadof PriceUtilities;

    PriceUtilities::calculateTax as basicTax;

    }

    }

    // listing 04.32

    $u = new UtilityService();

    print $u->calculateTax(100) . "\n";

    print $u->basicTax(100) . "\n";

    ```


    This gives the following output:


    ```


    ```


    So `PriceUtilities::calculateTax()` has been resurrected as part of the `UtilityService`
    class under the name `basicTax()`.


    **Note**


    Where a method name clashes between traits, it is not enough to alias one of the
    method names in the `use` block. You must first determine which method supercedes
    the other using the `insteadof` operator. Then you can reassign the discarded
    method a new name with the `as` operator.


    Incidentally, you can also use method name aliasing where there is no name clash.
    You might, for example, want to use a trait method to implement an abstract method
    signature declared in a parent class or in an interface.


