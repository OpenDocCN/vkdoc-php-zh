    \ 和 `$b` 的值相同；因此，显示了第一个字符串。\n```\n\n```\n $b ? \"它们相等\" : \"$a 大于 $b\" : \"$b\
    \ 大于 $a\";\n?>\n```\n\n输出：`36` 大于 `24`。\n\n原因：你也可以使用宇宙飞船运算符来评估等于（`0`）、大于（`-1`）和小于（`1`）的情况。这种比较方式非常简短且高效，可以判断数值是否相等或谁更大。由于\
