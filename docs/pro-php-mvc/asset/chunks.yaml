    **CakePHP: Extending**


    Extensions to the core CakePHP functionality come in many forms. They can be in
    the form of Components, Helpers, Behaviors, or Tasks (which are all referred to
    as Collections).


    Whether you require libraries bundled with CakePHP or intend to use your own (third-party)
    libraries, you will need to utilize the unified API that all of the Collections
    share, in order to load, unload, enable, disable, or invoke their functionality.


    Goals


    • We need to learn how to use built-in CakePHP functionality.


    • We need to learn how to include our own (third-party) functionality in our CakePHP


    applications.


