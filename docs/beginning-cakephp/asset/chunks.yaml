    <id></id>

    <name>更多 XML 文章，也不难</name>

    <date>2008-11-08 12:00:02</date>

    <content>在 Cake 中使用 XML 工具类配合 Set::extract() 函数使得解析 XML 变得简单。</content>

    <user_id>1</user_id>

    </post>

    </blog>

    ```


    除了清单 14-8 第 1 行的 XML 规范字符串外，此处使用的标签按层级结构组织，类似于 posts 表：`<blog>` 标签以数据库名称命名；`<post>`
    用于 posts 表中的每一行；`<id>` 对应 ID 字段，依此类推，一直到 `<user_id>`。一旦这些标签被 `findAll()` 函数解析，就会像默认的
    MySQL `DataSource` 传递来自数据库的结果集一样，将一个数组传递给模型。


    当前，在连接到 `data.xml` 文件时，清单 14-8 中的相同内容被赋值给了 `$File`。`read()` 函数需要做的就是解析这些 XML 标签，并相应地为模型格式化数组。清单
    14-9 包含了解析 XML 的 `findAll()` 函数。将其粘贴到 XML `DataSource` 文件中。


    **清单 14-9.** *`findAll()` *函数*


    ```

    function findAll() {

    38 App::import(''Core'',''Xml'');

    $xml = Set::reverse(new Xml($this->File));

    return Set::extract($xml,''Post'');

    41 }

    ```

