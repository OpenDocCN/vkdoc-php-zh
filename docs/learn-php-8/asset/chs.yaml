  \ . $this->change_log_file;\nerror_log($chge_string,3,$chge_log_file); // might\
  \ exceed 120 chars\n}\n```\n\n这个示例中的`delete()`方法一次只删除一条记录。因此，`delete`字符串是在循环外部构建的。而`update()`方法允许更新多条记录，所以`update`字符串是在循环内部构建的。`insert()`方法也需要在循环内部构建字符串。\n\
