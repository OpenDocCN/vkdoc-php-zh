- fmt: '# The `switch` Selection Statement


    Depending on the value of some expression, the `switch` statement allows you to
    execute one or another block of commands. In some sense, this statement resembles
    nested conditional statements. But while in a conditional statement, a condition
    is checked (an expression with a value of the boolean type or a value that can
    be cast to the boolean type), in a selection statement, the value of an expression
    is checked, whose type may differ from the boolean.


    The syntax for calling the selection statement is as follows.


    ```

    switch(expression){

    case value:

    # commands

    break;

    case value:

    # commands

    break;

    default:

    # commands

    }

    ```


    The `switch` keyword is followed by an expression in parentheses whose value is
    being checked. Then, `case` blocks follow. There are two of them in the preceding
    template, but generally, the count of such blocks is practically unlimited. The
    last one can be the `default` block (it is optional). The whole structure is enclosed
    in curly braces.


    Each `case` block contains, after the `case` keyword, a control value. It is followed
    by a colon and a block of commands, which usually ends with the `break` instruction.
    In the `default` block, if it exists, the `break` instruction is not used (it
    simply does not make any sense to use it there).


    How is the selection statement executed? The expression in parentheses after the
    `switch` keyword is evaluated first. The value of that expression is sequentially
    compared with the control values in the `case` blocks until the first match.


    | Details |

    | --- |

    | That is an ordinary comparison, not a check for identical equality. |


    The commands in the corresponding `case` block are executed if a match is found.
    That is the situation when the command block ends with the `break` instruction.
    If there is no `break` instruction at the end of the `case` block, the commands
    in the next block are executed, the block after it, and so on. The process continues
    until a `break` instruction is encountered or until the closing curly brace of
    the selection statement is reached.


    The selection statement has an alternative syntax.


    ```

    switch(expression):

    case value:

    # commands

    break;

    case value:

    # commands

    break;

    default:

    # commands

    endswitch;

    ```


    Here, the curly braces are not used: a colon is used instead of the opening curly
    brace, and the `endswitch` statement (followed by a semicolon) is used instead
    of the closing curly brace.


    Listing [3-9](#613529_1_En_3_Chapter.xhtml#PC35) shows a program illustrating
    how the selection statement can be used.


    ```

    Listing 3-9

    The Selection Statement

    ```


    The program prompts the user to enter the name of one of the Three Musketeers:
    Athos, Porthos, or Aramis.


    The program "knows" the names `"Athos"`, `"Porthos"`, and `"Aramis"`. If the user
    enters one of these names, the program displays the name of the Musketeer. If
    the name entered by the user is "not known" to the program, then the message `"Strange.
    Is this a fourth Musketeer?"` is printed. The following shows the program’s output
    if the user enters the name `"Athos"`.


    ```

    The output of the program (from Listing 3-9)

    A name from "The Three Musketeers": Athos

    Yes, Athos is a Musketeer

    ```


    If the user enters `"Porthos"`, the result is as follows.


    ```

    The output of the program (from Listing 3-9)

    A name from "The Three Musketeers": Porthos

    Yes, Porthos is a Musketeer

    ```


    The following is the result for the case when the user enters the name `"Aramis"`.


    ```

    The output of the program (from Listing 3-9)

    A name from "The Three Musketeers": Aramis

    Yes, Aramis is a Musketeer

    ```


    Finally, if the program “doesn’t recognize” the name, the result is as follows.


    ```

    The output of the program (from Listing 3-9)

    A name from "The Three Musketeers": D''Artanian

    Strange. Is this a fourth Musketeer?

    ```


    The program uses the `$athos`, `$porthos`, and `$aramis` variables to store the
    names of the Three Musketeers in them. The `$name` variable is assigned the name
    entered by the user. The `switch` statement is used to find matches. The expression
    to be tested is the value of the `$name` variable. The `$athos`, `$porthos`, and
    `$aramis` variables are used as control values in the `case` blocks.


    Let’s discuss how the selection statement is executed. The value of the `$name`
    variable is sequentially compared with the values of the `$athos`, `$porthos`,
    and `$aramis` variables. As soon as a match is found, the commands of the corresponding
    `case` block are executed. If there are no matches, then the commands in the `default`
    block are executed.


    Listing [3-10](#613529_1_En_3_Chapter.xhtml#PC40) illustrates how to use the selection
    statement in the alternative form. In this program, the number the user enters
    is checked for divisibility by `2` and `4`.


    ```

    Listing 3-10

    The Divisibility of a Number

    ```


    If the user enters a number that can be divided by `4`, the result is as follows.


    ```

    The output of the program (from Listing 3-10)

    Enter a number: 140

    The number can be divided by 4

    ```


    If the number can be divided by `2` but not by `4`, the result is as follows.


    ```

    The output of the program (from Listing 3-10)

    Enter a number: 70

    The number can be divided by 2

    ```


    Finally, if the number the user enters is not divisible by `2`, the program produces
    the following result.


    ```

    The output of the program (from Listing 3-10)

    Enter a number: 123

    The number can not be divided by 2

    ```


    In this case, the integer entered by the user is stored in the `$number` variable.
    The `switch` statement checks the value of the `$number%4` expression (the remainder
    of dividing `$number` by `4`). If the remainder is `0`, the `print("The number
    can be divided by 4")` command is executed. If the remainder is `2`, the `print("The
    number can be divided by 2")` command displays the message. Here, the number is
    divisible by `2` but not by `4`. Finally, all other situations are handled in
    the `default` block. If so, the `print("The number cannot be divided by 2")` command
    is executed.


    The `case` blocks ended with the `break` instructions in the considered examples.
    However, that is not required. There exist situations when the same set of commands
    must be executed for several control values. The program in Listing [3-11](#613529_1_En_3_Chapter.xhtml#PC44)
    shows how that could be done.


    ```

    Listing 3-11

    A Day of the Week

    ```


    The result of the program execution can be as follows (the value entered by the
    user is marked in bold).


    ```

    The output of the program (from Listing 3-11)

    A day of the week: Wednesday

    It is a working day

    ```


    It could also look as follows.


    ```

    The output of the program (from Listing 3-11)

    A day of the week: Saturday

    It is a holiday

    ```


    Or it could look as follows.


    ```

    The output of the program (from Listing 3-11)

    A day of the week: Midday

    There is no such day

    ```


    In the program, the user enters the name of a day of the week, and the program
    determines whether it is a working day or a holiday. The critical point is that
    for the values `"Monday"`, `"Tuesday"`, `"Wednesday"`, `"Thursday"`, and `"Friday"`,
    the same `print("It is a working day")` command must be executed. To not duplicate
    the code five times, create four empty `case` blocks (they do not contain commands),
    and only the last (out of five) `case` block contains the necessary command and
    the `break` instruction. If, for example, the user enters `"Wednesday"`, the code
    from the `case` block with the control value `"Wednesday"` is executed until the
    first `break` instruction. It turns out that the same commands are executed for
    each of the five control values.


    A similar tactic handles the `"Saturday"` and `"Sunday"` values. The commands
    in the `default` block are executed if the user enters a value other than one
    of the controls.'
