  **注意**\n\n\n\n## 排版后的文档\n\n每个被复制的文件都需要更新，以使用任何重命名的程序。\n\n接下来，为了完成更新和删除的任务，让我们向管理员显示所有条目的列表。点击一个条目会将其加载到条目编辑器中。我们可以使用`Blog`类中的`getAllEntries()`方法来完成此任务。\n\
  \n### 显示管理链接\n\n在之前的模型（`Blog_Entry_Table.class.php`）经过尝试、测试和理解后，我们可以开始处理视图。让我们创建一个可点击的博客条目标题列表。这使我们能够采用与`blog.php`程序类似的逻辑。我们可以使用`while`循环通过`PDO\
