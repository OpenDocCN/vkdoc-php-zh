    \n```\n$ zephir init type\n```\n\n这将在当前工作目录中创建一个框架项目文件夹。进入新的 `type` 目录并运行：\n\n\
    ```\n$ ls -la\next/ type/ config.json\n```\n\n扩展类放在 `type` 文件夹中（该文件夹的名称特定于我们提供给\
    \ `init` 命令的扩展名）。在其中创建一个名为 `StringType.zep` 的文件，并在编辑器中打开它。\n\nZephir 的语法与 PHP\
