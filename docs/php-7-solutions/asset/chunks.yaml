    # 将信息拆解为小块


    你可能已经注意到，图 12-3 右侧的表格为每位作者的**名**和**姓**分别设置了单独的列。这是关系型数据库的一条重要原则：*将复杂信息拆解为其组成部分，并分别存储每个部分。*


    决定拆分到什么程度并不总是那么容易。除了名和姓之外，你可能还希望为称呼（先生、太太、女士、博士等）以及中间名或首字母设置单独的列。地址最好拆分为街道、城镇、县、州、邮政编码等字段。虽然将信息拆分为小块可能有些繁琐，但你随时可以使用
    SQL 和/或 PHP 将它们重新组合起来。然而，一旦你拥有超过几十条记录，要尝试拆分存储在单个字段中的复杂信息，就会是一项艰巨的任务。


    # 良好数据库设计的检查点


    数据库设计没有所谓的*正确*方法——每个数据库都各不相同。不过，以下指南应该能为你指明正确方向：


    - 为表中的每条记录赋予一个唯一标识符（主键）。

    - 将每组相关数据放入其独立的表中。

    - 通过使用一个表中的主键作为其他表中的外键来交叉引用相关信息。

    - 在每个字段中仅存储一条信息。

    - 遵循 DRY 原则（不要重复自己）。


    在早期阶段，你很可能会犯下一些日后会后悔的设计错误。试着预见未来的需求，并让你的表结构保持灵活。你可以随时添加新表以应对新的需求。


    理论暂且讲到这里。让我们通过为第 5 章和第 6 章的日本之旅网站构建一个数据库，来探讨一些更实际的内容。


    # 使用图形界面


    与 MySQL 数据库交互的传统方式是通过命令提示符窗口或终端。但使用第三方图形界面（如 phpMyAdmin，一个基于浏览器的 MySQL 前端）要容易得多（见图
    12-4）。


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Fig4_HTML.jpg](img/332054_4_En_12_Fig4_HTML.jpg)


    *图 12-4. phpMyAdmin 是一个免费的 MySQL 图形界面，可在浏览器中运行*


    由于 phpMyAdmin (<http://www.phpmyadmin.net>) 随 XAMPP、MAMP 以及大多数其他免费的一体化软件包自动安装，因此本书选择了它作为用户界面。它易于使用，并具备设置和管理
    MySQL 数据库所需的所有基本功能。它适用于 Windows、Mac OS X 和 Linux。许多托管公司都将其作为 MySQL 的标准界面提供。


    如果你经常使用数据库，最终可能会想探索其他图形界面。其中一个值得关注的是 Navicat (<http://www.navicat.com/en/>)，这是一款付费产品，适用于
    Windows、macOS 和 Linux。Navicat Cloud 服务还允许你通过 iPhone 或 iPad 管理数据库。Navicat 在网络开发者中尤其受欢迎，因为它能够将数据库从远程服务器计划备份到你的本地计算机。Navicat
    for MySQL 同时支持 MySQL 和 MariaDB。


    ## 启动 phpMyAdmin


    如果你在 Windows 上运行 XAMPP，有三种方法可以启动 phpMyAdmin：


    - 在浏览器地址栏中输入 `http://localhost/phpMyAdmin/`。

    - 点击 XAMPP 控制面板中的 MySQL `Admin` 按钮。

    - 在 XAMPP 管理页面（`http://localhost/xampp/`）的 `Tools` 下点击 `phpMyAdmin` 链接。


    如果你在 macOS 上安装了 MAMP，请点击 MAMP 启动页面顶部菜单中的 `Tools` ➤ `phpMyAdmin`（点击 MAMP 控制小部件中的
    `Open start page`）。


    如果你手动安装了 phpMyAdmin，或者使用的是其他一体化软件包，请按照该软件包的说明操作，或者在浏览器地址栏中输入相应的地址（通常是 `http://localhost/phpmyadmin/`）。


    ### 提示

    如果系统提示服务器无响应或套接字配置不正确，请确保 MySQL 服务器正在运行。


    如果你安装了 XAMPP，可能会看到一个要求输入用户名和密码的屏幕。如果是这样，请以 root 超级用户身份登录 phpMyAdmin。在用户名处输入 `root`，并使用你在设置
    XAMPP 时为 root 创建的密码。


    ### 警告

    在远程服务器上访问 phpMyAdmin 时，请始终使用安全连接（https）。任何在不安全连接上窃听的人都可能获得对你宝贵数据的控制权，进而窃取、破坏甚至完全删除数据。


    # 设置 phpsols 数据库


    在本地测试环境中，你可以在 MySQL 中创建的数据库数量没有限制，并且可以随意命名它们。我假设你正在本地测试环境中工作，因此将向你展示如何创建一个名为 `phpsols`
    的数据库，以及两个分别名为 `psread` 和 `pswrite` 的用户账户。


    ### 注意

    在共享托管环境中，你可能仅限于使用托管公司设置的一个数据库。如果你在远程服务器上进行测试，并且无法自由创建新的数据库和用户账户，请将托管公司分配给你的数据库名称和用户名分别替换
    `phpsols` 和 `pswrite`。


    ## MySQL 命名规则


    MySQL 对于数据库、表和列的基本命名规则如下：


    - 名称长度最多为 64 个字符。

    - 合法字符包括数字、字母、下划线和 `$`。

    - 名称可以以数字开头，但不能完全由数字组成。


    一些托管公司似乎对这些规则一无所知，会分配给客户端名称中包含一个或多个连字符（非法字符）的数据库。如果数据库、表或列的名称包含空格或非法字符，在 SQL 查询中必须始终用反引号（``
    ` ``）将其括起来。请注意，这不是单引号（`''`），而是一个单独的字符。在我的 Windows 键盘上，它直接位于 Tab 键上方。在我的 Mac 键盘上，它位于左
    Shift 键旁边，与波浪号（`~`）在同一个键上。


    在选择名称时，你可能会不小心选到 MySQL 众多保留字中的一个（<https://dev.mysql.com/doc/refman/8.0/en/keywords.html>），例如
    `date` 或 `time`。避免这种情况的一种技巧是使用复合词，例如 `arrival_date`、`arrival_time` 等。或者，用反引号将所有名称括起来。phpMyAdmin
    会自动执行此操作，但在 PHP 脚本中编写自己的 SQL 时，你需要手动执行此操作。


    ### 注意

    由于很多人使用过 `date`、`text`、`time` 和 `timestamp` 作为列名，MySQL 允许在不使用反引号的情况下使用它们。但是，你应该避免使用它们。这是一种不良实践，如果将来将数据迁移到不同的数据库系统，可能无法正常工作。


    ### 名称的大小写敏感性

    Windows 和 macOS 将 MySQL 名称视为不区分大小写。然而，Linux 和 Unix 服务器则区分大小写。为了避免在将数据库和 PHP 代码从本地计算机传输到远程服务器时出现问题，我强烈建议你仅在数据库、表和列名称中使用小写字母。当使用多个单词构建名称时，请用下划线连接它们。


    # 使用 phpMyAdmin 创建新数据库


    在 phpMyAdmin 中创建新数据库非常简单。

    '
- fmt: '# Note


    `phpMyAdmin` has a frequent release cycle, which often results in minor changes
    to the user interface. Occasionally, the changes are more significant. These instructions
    and the accompanying screenshots are based on `phpMyAdmin 4.8.5`. Although there
    might be differences with the version you’re using, the basic process should be
    broadly the same.


    1. Launch `phpMyAdmin` and select the `Databases` tab at the top of the main window.


    2. Type the name of the new database (`phpsols`) into the first field under `Create
    database`. The drop-down menu to the right of the field sets the **collation**
    for the database. Collation determines the order data is sorted. As the following
    screenshot shows, the default setting on my installation is `latin1_swedish_ci`.
    This reflects MySQL’s Swedish origins. English uses the same sort order. The `ci`
    indicates that the sort order is case-insensitive. If you’re using a language
    other than English, Swedish, or Finnish, select `utf8mb4_unicode_ci` from the
    drop-down. This supports virtually every human language and will avoid problems
    with multibyte characters. Then click `Create`.


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figa_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figa_HTML.jpg)


    3. Confirmation that the database has been created should flash up onscreen, followed
    by a screen that invites you to create a table:


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figb_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figb_HTML.jpg)


    4. Before creating tables in a new database, it’s a good idea to create user accounts
    for it. Leave `phpMyAdmin` open, as you’ll continue using it in the next section.


    ## Creating database-specific User Accounts


    A new installation of MySQL normally has only one registered user—the superuser
    account called “root,” which has complete control over everything. (XAMPP also
    creates a user account called “pma,” which `phpMyAdmin` uses for advanced features
    not covered by this book.) The root user should *never* be used for anything other
    than top-level administration, such as the creation and removal of databases,
    creating user accounts, and exporting and importing data. Each individual database
    should have at least one—preferably two—dedicated user account with limited privileges.


    When you put a database online, you should grant users the fewest privileges they
    need, and no more. There are four important privileges—all named after the equivalent
    SQL commands:


    * `SELECT`: Retrieves records from database tables

    * `INSERT`: Inserts records into a database

    * `UPDATE`: Changes existing records

    * `DELETE`: Deletes records but not tables or databases (the command for that
    is `DROP`)


    Most of the time, visitors only need to retrieve information, so the `psread`
    user account will have just the `SELECT` privilege and will be read-only. However,
    for user registration or site administration, you need all four privileges. These
    will be made available to the `pswrite` account.


    ## Granting User Privileges


    1. In `phpMyAdmin`, return to the main screen by clicking the little house icon
    at the top left of the screen. Then click the `User accounts` tab (on older versions
    of `phpMyAdmin`, it’s called `Users`).


    ![../images/332054_4_En_12_Chapter/332054_4_En_12_Figc_HTML.jpg](images/332054_4_En_12_Chapter/332054_4_En_12_Figc_HTML.jpg)


    2. On the `User accounts overview` page, click the `Add user account` link halfway
    down the page.


    3. On the page that opens, enter `pswrite` (or the name of the user account that
    you want to create) in the `User name` field. Select `Local` from the `Host name`
    drop-down menu. This automatically enters `localhost` in the field alongside.
    Selecting this option allows the `pswrite` user to connect to MySQL only from
    the same computer. Then enter a password in the `Password` field, and type it
    again for confirmation in the `Re-type` field.'
