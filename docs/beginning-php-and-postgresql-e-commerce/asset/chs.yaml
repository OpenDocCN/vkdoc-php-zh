- '# 确保项目成功的基础


  为了确保这个项目的成功，你需要想出一个聪明的方法来实现你在合同中签署的内容。你希望项目顺利且快速地开发，但最终目标是确保客户对你的工作感到满意。因此，你应该通过创建一个美观、功能强大且响应迅速的网站，为网站日益增多的访问者提供积极的网络体验。


  需求很高，但对于当今的电子商务网站来说，这是正常的。为了最大化成功的机会，我们将尽可能多地分析和预见技术需求，并以一种能够以最小精力支持变更和扩展的方式实施解决方案。


  本章为未来的`HatShop`网站奠定基础。我们将讨论你将使用的技术和工具，更重要的是，以及你将如何使用它们。


  本章的目标是：

  - 从技术角度分析项目

  - 分析并为你的应用选择一种架构

  - 决定使用哪些技术、编程语言和工具

  - 考虑命名和编码规范

  - 创建网站的基本结构并设置数据库

  - 在网站骨架中实现错误处理例程和报告例程


  '
- '# 为增长而设计


  在 Web 应用的语境下，“设计”一词可以指代很多方面。它最流行的用法可能指的是网站的视觉和用户界面设计。


  这方面至关重要，因为，坦率地说，访问者通常更看重网站的外观和易用性，而不是后台使用了哪些技术或 Web 服务器运行的是什么操作系统。如果网站运行缓慢、难以使用或容易被遗忘，那么无论用什么尖端技术来创建它都无关紧要。


  不幸的是，这种现实使得许多缺乏经验的程序员低估了网站不可见部分（代码、数据库等）实现方式的重要性。网站的视觉部分最初能吸引访问者，但功能性能让他们再次光顾。一个网站有时可以根据初始需求快速实现，但如果没有正确的架构，后续变更将会变得困难甚至不可能。


  对于任何规模的项目，在开始编码之前都必须做一些准备工作。尽管如此，无论做了多少准备和设计工作，意外总会发生，隐藏的问题、新的需求和不断变化的规则似乎总是在与截止日期作对。


  即使没有这些意外因素，网站设计者通常也会被要求，在项目完成并部署后，多次更改或添加新功能。`HatShop`也是如此，它将分三个独立的阶段实施，这在第 1 章中已经讨论过。


  你将学习如何创建网站，以便在功能扩展或进行更新时，网站（或你）不会崩溃。因为这是一本关于编程的书，所以我们将重点关注如何设计使它们工作的代码，而不是聚焦于如何设计用户界面或营销技巧。


  “设计代码”这个短语可能有不同的含义；例如，我们需要简短地讨论一下命名约定。尽管如此，我们需要考虑的最重要的方面是应用架构。架构指的是将单一功能（例如产品搜索功能）的代码拆分成更小组件的方式。虽然以尽可能快和简单的方式在单个组件中实现该功能可能更容易，但通过创建更多协同工作以实现预期结果的组件，你可以获得巨大的长期优势。


  在讨论架构本身之前，你必须确定你希望从这个架构中获得什么。


  '
- '# 以最小精力满足长期需求


  除了你需要一个快速的网站之外，我们在第 1 章中讨论的每个开发阶段都会带来必须满足的新需求。


  每当你进入一个新阶段，你都希望能够**重用**大部分现有解决方案。仅仅因为需要添加一个新功能就重新设计整个网站（不仅包括视觉部分，还包括代码！）是非常低效的。通过提前规划，你可以使重用解决方案变得更容易，这样任何需要添加的新功能都可以轻松地嵌入，而不是每次更改都带来新的麻烦。


  在构建网站时，实现一个由可插拔组件组成的**灵活架构**，允许你通过将新功能（如购物车、部门列表、产品搜索功能）编码为独立组件，并将它们插入到现有应用中。实现良好的灵活性水平是应用架构的目标之一，本章将展示如何将其付诸实践。


  你会发现，灵活性与设计和实现它所需的时间成正比，因此我们将尝试找到一个折衷方案，在不过度复杂化代码的情况下提供最大的收益。


  所有在线应用共有的另一个主要需求是拥有一个**可扩展的架构**。可扩展性被定义为增加资源以产生服务能力的线性增长。换句话说，理想情况下，在一个可扩展的系统中，客户端请求数量与处理这些请求所需的硬件资源之间的比率（比例）是恒定的，即使客户端数量增加也是如此。一个不可扩展的系统无法处理不断增长的客户端数量，无论提供多少硬件资源。因为我们对客户数量持乐观态度，我们必须确保网站能够向大量客户提供其功能，而不会抛出错误或性能低下。


  **可靠性**对于电子商务应用来说也是一个关键方面。借助一致的错误处理策略和强大的关系型数据库，你可以确保数据完整性，并确保非关键性错误得到妥善处理，而不会导致网站崩溃。


  '
- '# 三层架构的魅力


  通常，架构指的是根据功能将应用的每个功能块拆分成独立的组件，并将每种组件分组到单个逻辑层中。


  你将为你网站创建的几乎每个模块都将包含来自应用服务器的这三个层的组件：

  - 表示层

  - 业务层

  - 数据层


  **表示层**包含网站的用户界面元素，并包含管理访问者与客户业务之间交互的所有逻辑。这一层让整个网站感觉充满活力，其设计方式对网站的成功至关重要。因为你的应用是一个网站，所以它的表示层由动态网页组成。


  **业务层**（也称为*中间层*）接收来自表示层的请求，并根据其包含的业务逻辑将结果返回给表示层。几乎表示层中发生的任何事件通常都会调用业务层。





  除了可由表示层本地处理的事件（如简单的输入数据验证等）之外，其他调用均由表示层发出。例如，如果访问者正在执行产品搜索，表示层会调用业务层并告知：“请将与搜索条件匹配的产品发回给我。”几乎总是如此，业务层需要调用数据层来获取信息，才能响应表示层的请求。


  **数据层**（有时也称为*数据库层*）负责管理应用程序的数据，并在收到请求时将其发送给业务层。对于 `HatShop` 电子商务网站，你需要存储关于产品（包括其类别和部门）、用户、购物车等数据。几乎每个客户端请求最终都会导致数据层被询问以获取信息（除非之前检索到的数据已在业务层或表示层缓存），因此拥有一个快速的数据库系统至关重要。在第
  3 章和第 4 章中，你将学习如何设计数据库以达到最佳性能。


  这些层纯粹是逻辑上的——对每一层的物理位置没有限制。理论上，你可以自由地将整个应用程序及其所有层放在一台服务器上，或者如果应用程序允许，也可以将每一层放在不同的机器上。第
  17 章将解释如何使用 `XML Web Services` 集成其他网站的功能。`XML Web Services` 允许跨多个服务器轻松集成功能。


  三层架构模型中一个重要的约束是，信息必须在各层之间按顺序流动。表示层只能访问业务层，绝不能直接访问数据层。业务层是中间的“大脑”，负责与其他层通信，并处理和协调所有信息流。如果表示层直接访问数据层，就破坏了三层架构编程的规则。在实现三层架构时，你必须保持一致并遵守其规则，才能获得益处。


  图 2-1 简要展示了在实现三层架构的应用程序中数据传递的方式。


  ```

  表示层

  业务层

  数据层

  ```


