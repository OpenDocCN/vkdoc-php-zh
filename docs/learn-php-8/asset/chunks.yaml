    \ : 'FALSE,';\nstring $breed_error = $this->set_dog_breed($value2) == TRUE ? 'TRUE,'\
    \ : 'FALSE,';\nstring $color_error = $this->set_dog_color($value3) == TRUE ? 'TRUE,'\
    \ : 'FALSE,';\nstring $weight_error= $this->set_dog_weight($value4) == TRUE ?\
    \ 'TRUE' : 'FALSE';\n$this->error_message = $name_error . $breed_error . $color_error\
    \ . $weight_error;\n}\n//---------------------------------toString--------------------------------\n\
    public function __toString()\n{\nreturn $this->error_message;\n}\n//... There\
    \ are no other code changes to dog.php below this line.\nExample 4-12\nDog class\
    \ with constructor—dog.php\n```\n\n*For more information about the* *__construct*\n\
    *method, visit* [*www.php.net/manual/en/language.oop5.decon.php*](http://www.php.net/manual/en/language.oop5.decon.php)*.*\n\
    First, let us discuss the use of the special method called **__toString**\n (note\
    \ the two underscores) in Example [4-12](#394210_2_En_4_Chapter.xhtml#PC37). Constructor\n\
    methods are not allowed to return information (by default). The `return` statement\n\
    cannot be used within the constructor. In order to return error messages\ncreated\
    \ in the constructor to the calling program (`lab.php`), you must\ntrick the program.\
    \ The `__toString` method\nallows the programmer to decide what will occur if\
    \ an attempt is made to\nuse the `print`\n(or `echo`)\nmethod with the object\
    \ name (`print $lab;`). This\ncan be overridden by including a `__toString` method\n\
    with a statement that returns a string. You can overcome this problem of\nbeing\
    \ able to return the error messages by allowing the value in the\n`$error_message`\n\
    property to be returned if the `print $lab;` statement\nis executed.\n*For more\
    \ information on the* *__toString* *method\nand other magic methods, visit* [*www.php.net/manual/en/language.oop5.magic.php*](http://www.php.net/manual/en/language.oop5.magic.php)*.*\n\
    \nThe `TRUE` and\n`FALSE` constants\nthat are returned by the `set` methods also\n\
    cause a problem because they are constants and not strings. If you\nattempt to\
    \ convert these constants to a string using a method (such as\n`strval(TRUE);`),\n\
    the values that they represent (1 for `TRUE`, 0 for `FALSE`) would become a\n\
    string instead of ‘`TRUE'` or ‘`FALSE'`. Therefore,\nthey cannot be returned via\
    \ the `__toString` method. To\novercome this problem, we create the following\
    \ code in the constructor\nto do a conversion from `TRUE` to ‘`TRUE'` or `FALSE`\
    \ to ‘`FALSE'`:\n\n```\n$name_error = $this->set_dog_name($value1) == TRUE ? 'TRUE,'\
    \ : 'FALSE,';\n```\n\nThe order of operations will cause\nthe `set_dog_name`\n\
    method  to execute\nbefore any part of this code. The `set_dog_name` method\n\
    returns `TRUE` or\n`FALSE`\n(constants). Assuming that the method returns a `TRUE`\
    \ after the\nexecution, the code line would now be\n\n```\n$name_error == TRUE\
    \ == TRUE ? 'TRUE,' : 'FALSE,';\n```\n\nThe order of operations then requires\
    \ that the comparison (`TRUE == TRUE`) be\nevaluated. Of course, this evaluates\
    \ to `TRUE`. The statements\nbetween the `?`\nand the `:` are\nused.\n\n```\n\
    $name_error = 'TRUE,';\n```\n\nThus `$name_error` \nis set to the string `\"TRUE,\"\
    `, which is now\na string, not a constant.\nAlso note that a ‘,’ has been added\
    \ in preparation for the next\n‘`TRUE'` or\n‘`FALSE'` value.\nEach value passed\
    \ (except the last value) must be separated by a ‘,’ to\nallow the string to be\
    \ separated later.\nThe other three similar lines are evaluated and also place\
    \ a ‘`TRUE`,’ or ‘`FALSE`,’ in the error\nmessage properties (the weight error\
    \ evaluation does not include a comma\nat the end of the string since it is the\
    \ last one evaluated).\n\nThe last line of code in the constructor is evaluated.\n\
    \n```\n$this->error_message = $name_error . $breed_error . $color_error . $weight_error;\n\
    ```\n\nThis line places the values of each error property into the `error_message`\n\
    property . If all\nthe updates were successful, the `$error_message`\nproperty\
    \ would contain\n\n```\n\"TRUE,TRUE,TRUE,TRUE\"\n```\n\nNotice that each item\
    \ passed includes a “,’ for separation except the\nlast item. This is necessary\
    \ to break apart the results of the string.\n\n```\n' :\n'Name update not successful';\n\
    print $breed_error == 'TRUE' ? 'Breed update successful' :\n'Breed update not\
    \ successful';\nprint $color_error == 'TRUE' ? 'Color update successful' :\n'Color\
    \ update not successful';\nprint $weight_error == 'TRUE' ? 'Weight update successful'\
    \ :\n'Weight update not successful';\n// ------------------------------Set Properties--------------------------\n\
    ...There are no other changes to lab.php below this line.\nExample 4-13\nThe lab.php\
    \ file calling a constructor\n```"
  trans: '

    # 构造方法


    前述示例中存在一个难点：若需初始创建对象并为其属性赋值，则需大量调用 `set` 例程。`Dog` 类要求我们调用四个 set 方法（`set_dog_name`、`set_dog_breed`、`set_dog_color`
    和 `set_dog_weight`）才能为所有属性赋值。我们可以采用更高效的方法一次性更新所有这些属性，从而精简 `lab.php` 文件中的代码。在提供初始值后，我们仍可借助
    `Dog` 类中的 `set` 例程进行后续修改（例如狗狗体重增加了）。这些初始值并非默认值，但若初始值无效，则仍需默认值作为备选。


    当在内存中创建类的实例（对象）时，操作系统会执行**构造方法**，该方法会用所有现有的属性和方法构建该对象。系统还会在内存中构建表格，用于追踪对象的位置及对象属性中存在的值。当对象不再需要时，操作系统的垃圾回收器将被该对象的**析构方法**调用，从而将其从内存中移除。


    您也可以编写一个构造方法，当对象被放入内存时，该方法会被自动调用。当执行创建对象的代码行（`$lab = new Dog;`）时，系统会在对象中查找构造方法。若存在，则执行该方法。您可以在同一行创建对象的代码中，将所有属性的初始值传递给该构造方法。


    ```

    $lab = new Dog(''Fred'', ''Lab'', ''Yellow'', 50);

    ```


    这样就能从 `lab.php` 程序中更高效地提供初始值。


    构造方法是一种通用格式，其函数名为 `__construct`（注意 construct 前有两个下划线）。


    您可以在构造方法中使用现有的 `set` 方法来更新属性。您需要收集所有消息（`TRUE`/`FALSE`）并将其返回给调用程序（`lab.php`）。您可以采用最初编写
    `get_properties` 方法时使用的类似流程。


    ```

    set_dog_name($value1) == TRUE ? ''TRUE,'' : ''FALSE,'';

    string $breed_error = $this->set_dog_breed($value2) == TRUE ? ''TRUE,'' : ''FALSE,'';

    string $color_error = $this->set_dog_color($value3) == TRUE ? ''TRUE,'' : ''FALSE,'';

    string $weight_error= $this->set_dog_weight($value4) == TRUE ? ''TRUE'' : ''FALSE'';

    $this->error_message = $name_error . $breed_error . $color_error . $weight_error;

    }

    //---------------------------------toString-------------------------------

    public function __toString()

    {

    return $this->error_message;

    }

    //... 此行以下 dog.php 无其他代码变更。

    示例 4-12

    带构造方法的 Dog 类——dog.php

    ```


    有关 `__construct` 方法的更多信息，请访问 [www.php.net/manual/en/language.oop5.decon.php](http://www.php.net/manual/en/language.oop5.decon.php)。


    首先，我们来讨论示例 4-12 中名为 `__toString` 的特殊方法（注意有两个下划线）的用法。默认情况下，构造方法不允许返回信息。`return`
    语句不能在构造方法内部使用。为了将构造方法中生成的错误消息返回给调用程序（`lab.php`），您必须采用技巧。`__toString` 方法允许程序员决定：当尝试对对象名使用
    `print`（或 `echo`）方法（如 `print $lab;`）时会发生什么。可以通过包含一个返回字符串的 `__toString` 方法来覆盖此行为。您可以通过允许在执行
    `print $lab;` 语句时返回 `$error_message` 属性中的值，来解决无法返回错误消息的问题。


    有关 `__toString` 方法及其他魔术方法的更多信息，请访问 [www.php.net/manual/en/language.oop5.magic.php](http://www.php.net/manual/en/language.oop5.magic.php)。


    由 `set` 方法返回的 `TRUE` 和 `FALSE` 常量也会引发问题，因为它们是常量而非字符串。如果您尝试使用某个方法（例如 `strval(TRUE);`）将这些常量转换为字符串，那么它们所代表的值（`TRUE`
    为 1，`FALSE` 为 0）将变成字符串，而非 `''TRUE''` 或 `''FALSE''`。因此，它们无法通过 `__toString` 方法返回。为解决此问题，我们在构造方法中编写以下代码，将
    `TRUE` 转换为 `''TRUE''` 或将 `FALSE` 转换为 `''FALSE''`：


    ```

    $name_error = $this->set_dog_name($value1) == TRUE ? ''TRUE,'' : ''FALSE,'';

    ```


    运算顺序将导致 `set_dog_name` 方法在该代码的任何部分之前执行。`set_dog_name` 方法返回 `TRUE` 或 `FALSE`（常量）。假设执行后该方法返回
    `TRUE`，那么该行代码现在变为：


    ```

    $name_error == TRUE == TRUE ? ''TRUE,'' : ''FALSE,'';

    ```


    运算顺序随后要求评估比较 (`TRUE == TRUE`)。显然，此结果为 `TRUE`。因此将使用 `?` 和 `:` 之间的语句。


    ```

    $name_error = ''TRUE,'';

    ```


    因此 `$name_error` 被设置为字符串 `"TRUE,"`，这现在是一个字符串，而非常量。同时请注意，为了准备接收下一个 `''TRUE''` 或
    `''FALSE''` 值，已添加了一个 '',''。每个传递的值（最后一个值除外）都必须用 '','' 分隔，以便后续拆分该字符串。另外三行类似的代码被评估，并在错误消息属性中放置
    `''TRUE,''` 或 `''FALSE,''`（权重错误评估的字符串末尾不包含逗号，因为它是最后一个被评估的）。


    构造方法中的最后一行代码被评估。


    ```

    $this->error_message = $name_error . $breed_error . $color_error . $weight_error;

    ```


    这一行将每个错误属性的值放入 `error_message` 属性中。如果所有更新都成功，`$error_message` 属性将包含：


    ```

    "TRUE,TRUE,TRUE,TRUE"

    ```


    请注意，除了最后一个项目外，每个传递的项目都包含一个 '','' 作为分隔符。这对于拆分字符串的结果是必要的。


    ```

    '' :

    ''Name update not successful'';

    print $breed_error == ''TRUE'' ? ''Breed update successful'' :

    ''Breed update not successful'';

    print $color_error == ''TRUE'' ? ''Color update successful'' :

    ''Color update not successful'';

    print $weight_error == ''TRUE'' ? ''Weight update successful'' :

    ''Weight update not successful'';

    // ------------------------------Set Properties----------------------------

    ...此行以下 lab.php 无其他变更。

    示例 4-13

    调用构造方法的 lab.php 文件

    ```

