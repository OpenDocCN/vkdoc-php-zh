    Finally, the presentation tier generates an updated view of the shopping cart
    (step 6). The results of the execution are wrapped up by generating an `HTML`
    web page that is returned to the visitor (step 7), where the updated shopping
    cart can be seen in the visitor’s web browser.


    Note that in this simple example, the business tier doesn’t do a lot of processing,
    and its business logic isn’t very complex. However, if new business rules appear
    for your application, you would change the business tier. If, for example, the
    business logic specified that a product could only be added to the shopping cart
    if its quantity in stock was greater than zero, an additional data tier call would
    have been made to determine the quantity. The data tier would only be requested
    to update the shopping cart if products are in stock. In any case, the presentation
    tier is informed about the status and provides human-readable feedback to the
    visitor.


    ## What''s in a Number?


    It’s interesting to note how each tier interprets the same piece of information
    differently. For the data tier, the numbers and information it stores have no
    significance because this tier is an engine that saves, manages, and retrieves
    numbers, strings, or other data types—not product quantities or product names.
    In the context of the previous example, a product quantity of `0` represents a
    simple, plain number without any meaning to the data tier (it is simply `0`, a
    32-bit integer).


    The data gains significance when the business tier reads it. When the business
    tier asks the data tier for a product quantity and gets a `0` result, this is
    interpreted by the business tier as “Hey, no products in stock!” This data is
    finally wrapped in a nice, visual form by the presentation tier, such as a label
    reading, “Sorry, at the moment the product cannot be ordered.”


    Even if it’s unlikely that you want to forbid a customer from adding a product
    to the shopping cart if the product is not in stock, the example (described in
    Figure 2-3) is good enough to present in yet another way how each of the three
    tiers has a different purpose.


