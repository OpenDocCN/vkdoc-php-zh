    # 1. Shopify 主题入门


    对于某些内容平台而言，“主题”一词意味着有限的控制权。它让人联想到从几个预设选项中进行选择，或许只是挑选配色方案或替换一些图片。


    Shopify 主题远不止于此；它们让店主能够完全控制其网站前端的每一个方面，包括 HTML、样式表和脚本。我相信，这是 Shopify 最强大的优势之一。这也是它既能适合初次创业的独立企业家，同时又能为世界
    500 强公司提供支持的原因。


    本章首先解释 Shopify 如何赋予我们这种灵活性。它涵盖了主题包的目录结构，更好地解释了 Liquid（Shopify 的模板语言），说明了资源文件（Assets）的处理方式，并让我们了解这些部分如何协同工作，为我们的客户提供可用的购物体验。


    ## Shopify 主题剖析


    一个 Shopify 商店可以安装多个主题，尽管在任何给定时间只能有一个主题发布并对公众可见。主题可以来自不同的来源——从官方 Shopify 主题商店（`https://themes.shopify.com`）购买、从第三方市场下载、由自由职业者或代理商为特定客户构建，或由商家内部开发。


    安装到 Shopify 商店中的每个主题都会在 Shopify 管理后台的“在线商店 - 主题”部分中显示，如图 1-1 所示。


    ![A437216_1_En_1_Fig1_HTML.jpg](img/A437216_1_En_1_Fig1_HTML.jpg)


    图 1-1：Shopify 管理后台中的主题列表。请注意，其中一个主题（顶部较大的那个）已“发布”，意味着它当前处于激活状态并展示给客户。其他主题已安装，但仅对店主在“预览”模式下可见。


    可以通过两种方式向 Shopify 商店添加新主题：直接从主题商店添加，或上传包含标准主题目录结构文件的 `.zip` 文件。主题在发布前可以“预览”，让店主有机会在实际推送给真实客户之前，了解新主题的外观和感觉。


    当客户访问商店首页的某个页面时，Shopify 会查看主题中包含的文件，找到合适的模板文件进行渲染，并将它们与“动态”信息（例如商店的当前库存、已登录客户的详细信息以及购物车内容）结合使用，生成
    HTML，然后传送给浏览器。通过这种方式，Shopify 主题的运作方式与许多用于生成动态、内容驱动网站的基于模板的平台或编程语言（如 WordPress
    或 Drupal）类似。


    ### 主题结构


    无论来源如何，所有 Shopify 主题在底层都共享一种通用格式：一个按特定目录结构组织的文件包，如图 1-2 所示。


    ![A437216_1_En_1_Fig2_HTML.jpg](img/A437216_1_En_1_Fig2_HTML.jpg)


    图 1-2：完成版 Shopify 主题的标准目录结构


    如您所见，该结构相当扁平，包含七个顶级目录（以及一个子目录），其中包含大量 Liquid 模板文件（`.liquid`）、配置文件（`.json`）和资源文件（`.css`、`.js`、`.png`
    等）。


    资源文件（Assets）包含您希望在主题中使用的所有静态资源，如图像、样式表和脚本。Shopify 内置了对 Sass 样式表的支持（有一些限制，稍后讨论），因此如果您是
    Sass 爱好者，只需将文件以 `.scss` 扩展名直接保存在您的主题中即可。您的主题资源将自动通过 Shopify 的 CDN 提供。


    配置（Config）是一个目录，包含全局主题设置的规范，它允许主题设计师创建能够赋予商家对其商店前端布局、外观和数据模型进行控制和灵活调整的主题。主题设置通过
    `settings_schema.json` 中定义的标记呈现给店主，并在保存时存储到 `settings_data.json` 中。目前，这是 `/config`
    目录中仅有的两个文件。


    布局（Layouts）充当主题中所有页面的“主模板”，因此它们包含每个页面共有的所有 HTML（例如，`<head>` 部分）。大多数主题只需要一个名为 `theme.liquid`
    的默认布局，但您可以根据需要创建任意数量的基本布局。如果您在 Shopify Plus（Shopify 的企业版产品）上运营商店，您还可以访问 `checkout.liquid`，该文件定义了商店结账页面的布局。


    本地化（Locales）是 JSON 格式的翻译文件，用于您的主题可能支持的所有不同区域（地点）——`en.default.json`、`es.json`
    等。您不必为主题提供多种语言的翻译，但确保您的主题支持未来的国际化是个好主意。所有提交至 Shopify 主题商店销售的主题都必须完全支持国际化。


    块（Sections）和代码片段（Snippets）类似，它们都包含可以从其他模板中引入的小段 HTML 和 Liquid 代码。它们的目标是让您能够将主题代码拆分成更小、更合乎逻辑的组件，从而使维护和重用变得更加容易。它们的不同之处在于，块（两者中较新的概念）允许您定义组件级别的主题设置、样式表和
    JavaScript。


    虽然块和代码片段都可以通过直接从主题的模板文件中引入来进行“静态”使用，但块还具有额外的能力，即可以由商家在商店主页上动态引入和配置。稍后在我们逐步构建主题的细节中，我们将看到
    `块` 和 `代码片段` 的详细示例。


    模板（Templates）包含主题中不同类型页面的 HTML 结构——例如，`product.liquid` 用于产品页面，而 `index.liquid`
    用于主页，`article.liquid` 用于博客文章。这些单独的页面模板会在主题布局文件（通常是 `theme.liquid`）的“内容”部分中进行渲染。


    您可以创建每种模板类型的变体——例如，`article.photo.liquid` 用于基于照片的帖子，`article.video.liquid` 用于基于视频的帖子。请注意，这是唯一包含子目录的顶级目录，该子目录为
    `/customers`，其中包含如果商店启用了客户登录账户所必需的几个模板。

