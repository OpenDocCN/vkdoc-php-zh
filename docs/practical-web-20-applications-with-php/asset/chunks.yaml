    **Reordering Blog Post Images**


    We will now implement a system that will allow users to change the order of the
    images associated with a blog post. While this may not seem overly important,
    we do this because we are controlling the layout of images when blog posts are
    displayed.


    Additionally, in the next section we will modify the blog index to display an
    image beside each blog post that has one. If a blog post has more than one image,
    we will use the first image for the post.


    Drag and Drop


    In the past, programmers have used two common techniques to allow users to change
    the order of list items, both of which are slow and difficult to use.


    The first method was to provide “up” and “down” links beside each item in the
    list, which moved the items up or down when clicked. Some of these implementations
    might have included a “move to top” and “move to bottom” button, but on the whole
    they are difficult to use.


    The other method was to provide a text input box beside each item. Each box contained
    a number, which determined the order of the list. To change the order, you would
    update the numbers inside the boxes.


    For our implementation, we will use a drag-and-drop system. Thanks to Scriptaculous’s
    Sortable class, this is not difficult to achieve. We will implement this by extending
    the BlogImageManager JavaScript class we created earlier this chapter.


    ■**Note** As an exercise, try extending this reordering system so it is accessible
    for non-JavaScript users.


    You could try implementing this by including a form on the page within <noscript>
    tags (meaning it won’t be shown to users who have JavaScript enabled).


