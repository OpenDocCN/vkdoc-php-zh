  \ |\n\n\n\n### 6.4 使用 inotify 的文件监控守护进程\n\n能够响应文件系统事件的守护进程通常非常有用。示例用途包括：\n\n- **文件转换守护进程**：守护进程监控特定文件夹，当指定类型的文件添加到该文件夹时，它会自动将其转换为另一种格式\n\
  - **文件同步守护进程**：守护进程监控一个或多个文件夹，并自动将任何更改与外部存储服务或设备同步\n- **变更通知守护进程**：想知道别人何时更新你的重要文件吗？让一个守护进程监控它们并向你报告！\n\
  - **文件搜索服务**：守护进程监控文件系统，并在文件被创建或修改时对其建立索引，以便日后快速搜索\n\n当然，能够监控文件和目录事件的守护进程还有很多其他用途。如上所述，`libevent`\
  \ 可用于监控单个文件的变更，不过这在所有平台上并非都适用，并且监控目录更为复杂。\n\n接下来介绍 `inotify`。`Inotify` 提供了一种监控文件或目录（如果你愿意，也可以监控整个文件系统）的简单方法。它在\
  \ Linux 类型的系统中可用，直接与内核通信以获取实时的文件系统事件，并将这些事件缓冲起来供你的脚本处理。\n\n在你的 PHP 脚本中，可以通过两种不同的方式使用\
  \ `inotify`。第一种是使用 `inotify` PECL 扩展直接与之交互。第二种方式是从你的脚本中调用 `inotify-tools` 命令行程序之一。默认情况下，`inotify`\
  \ 扩展允许你在一个*监控点*下监控*一个*文件或*一个*目录。因此，如果你想递归地监控给定目录的所有子目录，你需要遍历目录树并为每个目录设置监控点（同时还要监控新目录的创建，并为这些新目录也设置监控点）。如果你只对监控几个文件或几个目录感兴趣，那么使用\
  \ PECL 扩展是一种直接的方法，而且可以完全在 PHP 中完成。另一方面，如果你想递归地监控一个或多个目录及其子目录（或整个文件系统），那么命令行工具 `inotifywait`\
  \ 通常更容易使用，因为它会自动为你递归地设置监控点。\n\n#### 6.4.1 使用 inotify PECL 扩展\n\n以下脚本是使用 PECL 扩展作为守护进程的一个示例，它用于监控当前目录中的任何文件\
  \ `访问` 或 `修改` 事件，并弹出一个通知气泡。\n\n```\n 1 <?\n\n 3 # 将此脚本转变为守护进程（参见本章开头了解相关信息）\n\n\
  \ 5 $pid = pcntl_fork();\n\n 7 if ($pid == -1) { exit(\"无法创建子进程\"); };\n\n 9 if\
  \ ($pid) { exit(0); };\n\n11 if ( posix_setsid()  === -1 ) { \n12 \texit(\"无法成为会话领导者\"\
  ); \n13 };\n\n15 $pid = pcntl_fork();\n\n17 if ($pid == -1) { exit(\"无法创建子进程作为孙进程\"\
  ); };\n\n19 if ($pid) { exit(0); };\n\n21 if (!fclose(STDIN)) { exit('无法关闭 STDIN');\
  \ };\n22 if (!fclose(STDERR)) { exit('无法关闭 STDERR'); };\n23 if (!fclose(STDOUT))\
  \ { exit('无法关闭 STDOUT'); };\n\n25 $STDIN = fopen('/dev/null', 'r');\n26 $STDOUT\
  \ = fopen('/dev/null', 'w');\n27 $STDERR = fopen('/var/log/our_error.log', 'wb');\n\
  \n29 $stayInLoop = true;\n\n31 # 让用户知道我们现在已经启动并运行\n\n33 `notify-send -i face-glasses\
  \ '文件监控守护进程已启动'`;\n\n35 # 我们创建一个要使用的 inotify 实例\n\n37 $inotify = inotify_init();\n\
  \n39 # 然后我们向该实例添加一个或多个“监控点”。每个监控点\n40 # 告诉 inotify 要监控的文件或目录，以及要监控哪些事件。\n41 # 在本例中，我们想要监控当前目录\n\
  42 # （PHP 通过魔术常量 __DIR__ 提供），并且我们想要查找\n43 # 文件访问（IN_ACCESS）或（|）文件修改（IN_MODIFY）。\n\
  44 # 这是一个事件的“位掩码”，稍后会讨论。\n\n46 $watch = inotify_add_watch($inotify, __DIR__, IN_ACCESS\
  \ | IN_MODIFY);\n\n48 # 一旦我们的监控点设置好，它会持续运行，因此我们可以进入\n49 # 常规的程序循环，并等待 inotify 告诉我们何时发生事件\n\
  \n51 while ($stayInLoop) {\n\n53 \t# 现在我们调用 inotify_read 来获取监控点检测到的文件事件数组。\n54 \t\
  # inotify_read 会阻塞执行，直到事件发生，\n55 \t# 所以如果没有事情发生，我们的脚本会在此处等待。\n\n58 \t$events = inotify_read($inotify);\n\
  \n60 \t# inotify_read 返回一个事件数组。在非繁忙的文件/目录上，\n61 \t# 通常这只是一个包含一个事件的数组。然而，多个事件\n62\
  \ \t# 可能同时发生，并且当你的程序在处理其他事情时（比如处理之前的事件），\n63 \t# inotify 会排队事件，因此你应该始终准备好处理多个事件。\n\
  64 \t# 所以我们遍历 $events 数组...\n\n67 \tforeach ($events as $event) {\n\n69 \t\t# “mask”值告诉我们发生了哪种类型的事件\n\
  \n72 \t\t$type = $event[\"mask\"];\n\n74 \t\t# “name”提供了事件的目录或文件名\n\n76 \t\t$filename\
  \ = $event[\"name\"];\n\n78 \t\t# 我们将组成一个人类可读的字符串呈现给用户\n\n80 \t    switch ($type)\
  \ {\n\n82 \t\t\tcase IN_ACCESS :\n83         \t\t$what =  \"被访问\";\n84         \t\
  \tbreak;\n85         \tcase IN_MODIFY :\t\n86         \t\t$what = \"被修改\";\n87 \
  \        \t\tbreak;\n88         \tcase (INACCESS+IN_MODIFY) :\n89         \t\t$what\
  \ = \"被访问且被修改\";\n\n91 \t\t};\n\n93         # 我们现在弹出一个包含事件详细信息的气泡通知\n\n95      \
  \   `notify-send -i document '$filename 已 $what'`;\n\n97         # 最后，如果一个名为 bye.txt\
  \ 的文件被访问或修改，\n98         # 我们将退出循环并退出守护进程\n\n100 \t\tif ($filename == 'bye.txt')\
  \ { $stayInLoop = false; };\t  \n101 \t};\n\n103 };\n\n105 `notify-send -i face-raspberry\
  \ '文件监控守护进程已停止'`;\n\n107 exit(0);\n```\n\n在上述脚本中，我们通过创建一个“位掩码”来告诉 `inotify` 我们感兴趣的事件类型。如果你不熟悉位掩码，在这种情况下可以按以下（简化）方式理解：\n\
  \n- 每种可能的事件类型由一个常量表示（例如 `IN_ACCESS` 和 `IN_MODIFY`）\n- 每个常量只是一个整数（例如 `echo IN_ACCESS;`\
  \ 输出 1，`echo IN_MODIFY` 输出 2）\n- 每个整数的选择方式是，任何这些整数相加的组合总会得到一个唯一的数字。（从技术上讲，这些数字是\
  \ 2 的幂）\n- `echo IN_ACCESS+IN_MODIFY;` 会输出 3。任何其他常量的加法都不会得到 3。因此，如果在事件中“mask”值是\
  \ 3，你就知道该事件中同时发生了 `IN_ACCESS` 和 `IN_MODIFY`。\n\n| ![信息](img/image00248.jpeg) | **延伸阅读**维基百科上关于位掩码的完整解释\
  \ [`en.wikipedia.org/wiki/Mask_%28computing%29`](http://en.wikipedia.org/wiki/Mask_%28computing%29)\
  \ |\n\n在上面的例子中，我们使用 `inotify_read()` 来获取已发生的文件事件的详细信息。`inotify_read()` 是一个阻塞函数，会导致我们的脚本暂停。如果你想要偶尔检查事件，但在没有事件发生时不让脚本阻塞，你可以将\
  \ inotify 实例当作流来处理（`inotify_init()` 函数实际上返回一个标准的文件描述符）。通过这种方式，例如，你可以使用 `stream_set_blocking()`\
  \ 将其设置为非阻塞流。\n\n| ![信息](img/image00248.jpeg) | **延伸阅读**PHP 手册中关于将 inotify 作为流访问的示例\
  \ [`php.net/manual/en/function.inotify-init.php#refsect1-function.inotify-init-examples`](http://php.net/manual/en/function.inotify-init.php#refsect1-function.inotify-init-examples)\
  \ |\n\n\n\n#### 6.4.2 使用 `inotifywait` 命令\n\n第二种调用 `inotify` 的方式是通过“外壳调用” `inotifywait`\
  \ 外壳命令。下面的示例设置了一个监视器，用于监听 `/home` 目录下文件系统中任何文件的修改或删除操作。为简洁起见，我将其展示为一个简单的 CLI 脚本；如有需要，你可以使用之前展示的技术将其转换为守护进程。\n\
  \n```\n 1 <?\n\n 3 # 创建命令行字符串，用于以我们想要的选项执行 inotifywait。\n 4 # 在本例中，我们使用以下选项：\n 5\
  \ # \t--csv : 以易于解析的 csv 格式返回输出\n 6 #\t-q : 抑制所有消息，仅显示事件输出\n 7 #\t-r : 以递归模式运行，从而包含所有子目录\n\
  \ 8 #\t-m : 以“监视”模式运行，即持续运行\n 9 #\t-e : 指定要监听的事件（修改和删除）\n10 # 最后，我们指定要监听的目录（/home）。如果你想监听整个文件系统，\n\
  11 # 这里可以只写 '/'。\n\n13 $command = 'inotifywait --csv -q -r -m -e modify -e delete\
  \ /home';\n\n15 # 因为我们希望在事件发生时立即开始显示它们，而不是等命令完成\n16 # 之后（实际上命令不会完成），所以我们不能使用反引号或\
  \ shell_exec()\n17 # 这类方法来运行脚本。相反，我们使用 popen() 将其视为一个文件流。\n\n20 $handle = popen($command,\
  \ 'r');\n\n22 # 读取输出的每一行，事件发生时即读取\n\n24 while ($line = fgets($handle)) {\n\n26 \t\
  # 数据是 CSV 格式（由于使用了 --csv），因此将其解析为\n27 \t# 一个 PHP 数组\n\n29 \t$event = str_getcsv($line);\n\
  \n31 \t# 将事件详情输出到外壳\n\n33 \techo 'A '.$event[1].' event occured in Directory '.$event[0];\n\
  34 \techo ' on file '.$event[2].\"\\n\";\n\n36 };\n```\n\n当使用 `-r` 递归选项时，`inotifywait`\
  \ 会自动对所有子目录设置监视。然而，在大型文件系统上，首次启动时这可能需要几秒甚至更长时间。有关所有可用选项，请参阅 `inotifywait` 的 `man`\
  \ 手册页。阅读本书下一章，了解有关 `popen()` 以及从 PHP 与外壳命令交互的其他方式的详细信息。\n\n#### 6.4.3 Inotify 限制\n\
  \n虽然 `inotify` 是一个非常通用的工具，但仍需注意一些限制。首先，如上所述，设置递归监视可能需要一些时间，在此期间事件将不会被监听。其次，“监视点”（目录或子目录）数量的默认限制通常设为\
  \ 8192。如果你的文件系统有更多目录，则需要在 `/proc/sys/fs/inotify/max_user_watches` 中增加此限制。最后，虽然 `inotify`\
  \ 会在你的脚本忙碌时为你缓冲通知，但该缓冲区的大小是有限的。因此，如果你的脚本响应事件时执行的任务耗时较长（例如，文件类型转换），你可能希望将该处理任务分发给外部脚本，以便你的脚本能更快地恢复响应事件。有关实现此目的的方法，请参阅下一节关于任务分发和管理的系统。\n\
  \n### 6.5 任务分发与管理系统\n\n在本章的前面部分，我们了解了如何派生新进程，并在下一章中将介绍如何执行或调用其他外部命令并进行通信。这些示例应该能给你一些很好的启发，让你了解如何创建与主\
  \ PHP 脚本并行执行处理的工作任务。在许多情况下，自己编写任务/工作进程分发和管理脚本是个好主意，但也有很多情况下，使用专家已经编写好的工具可能更为明智。幸运的是，在这种情况下，我们可以利用许多优秀的、能与\
  \ PHP 协同工作的任务分发与管理系统。下面列出了一些较为常见且实用的系统，但首先我们将介绍一个特定的系统——`Gearman`——它拥有出色的 PHP 绑定和良好的社区支持，是一个让你新手入门的理想任务系统。\n\
  \n### 6.6 Gearman 与 PHP\n\n来自 PHP 手册：\n\n> *“Gearman 是一个通用的应用程序框架，用于将工作分发给多台机器或多个进程。它允许应用程序并行完成任务、实现处理负载均衡，以及在不同语言之间调用函数。该框架可用于多种应用程序，从高可用性网站到数据库复制事件传输。”*\
  \ [`www.php.net/manual/en/intro.gearman.php`](http://www.php.net/manual/en/intro.gearman.php)\n\
  \n本质上，`Gearman` 是主脚本和工作脚本之间的“中间人”。你的主脚本可以将任务发送给 `Gearman`，当工作进程可用时，`Gearman` 会将这些任务分配给它们。然后，`Gearman`\
  \ 会监控工作进程，并将它们的进度以及任务结果报告回主脚本。为了冗余，你可以设置多个 `Gearman` 服务器，并且可以在多台不同机器上以分布式方式运行所有操作。你只需告诉主脚本你的\
  \ `Gearman` 服务器在哪里，然后开始发送任务即可。如果你不想等待任务结果，甚至不必等待，并且你可以注册回调函数来处理来自多个任务的结果。要配置工作脚本，你需要告诉它们\
  \ `Gearman` 服务器的位置，并指定该特定脚本可以处理哪些任务，如果需要，还可以添加一些代码来在任务执行期间反馈进度。然后，你启动工作脚本，它们就会持续运行并等待任务到来。\n\
  \n为了帮助你更直观地了解 `Gearman` 提供的可能性，下图展示了一个包含冗余 `Gearman` 服务器的多机器配置。\n\n![多机器/主控/客户端/服务器示例](img/image00250.gif)\n\
  \n多机器/主控/客户端/服务器示例\n\n在这个特定的网络中，我们在两台不同的机器上运行着六个 PHP“主控”脚本。每个主控脚本都连接到两个 `Gearman`\
  \ 服务器实例，其中一个运行在自己的机器上，另一个运行在一台共享机器上。相应地，有五个 PHP“工作”脚本，其中四个运行在自己的机器上，一个运行在共享机器上。所有工作脚本也都连接到这两个\
  \ `Gearman` 服务器实例。在这种配置下，你可以看到，如果其中一个 `Gearman` 服务器实例不可用，系统仍然可以继续运行，因为所有组件同时连接到了两个服务器实例，因此可以使用任何一个。同样，如果一个或多个主控或工作脚本不可用，工作依然会进行，因为\
  \ `Gearman` 服务器实例会将任务分发给剩余的脚本。而最棒的是，`Gearman` 会为你处理这种“后备”系统。你只需将主控和工作者指向 `Gearman`\
  \ 服务器，`Gearman` 就会负责适当地路由任务。\n\n当然，你也可以将所有内容都运行在同一台机器上，这是一种常见的配置。这使得在没有额外硬件需求、但\
  \ PHP 的单线程操作限制了机器资源充分利用的情况下，使用 `Gearman` 来支持 PHP 中的并行计算变得十分合适。\n\n\n| ![信息](img/image00248.jpeg)\
