    folder.


    Now you can run all your model table tests at once.


    ```

    $ cd ∼/public_html/cakeBlog

    $ vendor/bin/phpunit tests/TestCase/AllModelTableTest.php

    ```


    You can create a test suite for all controllers, etc., in the same way.


