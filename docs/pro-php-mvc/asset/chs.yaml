  public function validate()\n{\n    $this->_errors = array();\n    $columns = $this->getColumns();\n\
  \ \n    foreach ($columns as $column)\n    {\n        if ($column[\"validate\"])\n\
  \        {\n            $error = false;\n            $pattern = \"#[a-z] + \\(([a-zA-Z0-9,\
