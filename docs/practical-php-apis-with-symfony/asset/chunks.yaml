- fmt: "# Installing the Database\n\nAs we will create a User entity in Chapter [2](#663561_1_En_2_Chapter.xhtml),\
    \ we will need to have a ready-to-use database. We are using [SQLite](https://www.sqlite.org/index.html)\
    \ to manage our database. To install it, we are going to use [docker](https://www.docker.com/)\
    \ and [docker-compose](https://docs.docker.com/compose/).\n\nFeel free to use\
    \ the database you want (MySQL, Postgres, MariaDB…) and to install it using the\
    \ procedure you consider appropriate. Personally, I like using docker since it's\
    \ easy to create new containers without having to install services on my computer,\
    \ and there are plenty of pre-built images available in the docker hub.\n\nLet’s\
    \ create the `docker-compose.yaml` file in our project root folder and add the\
    \ SQLite service:\n\n```\nversion: '3'\nservices:\n  sqlite3:\n    image: keinos/sqlite3:latest\n\
    \    volumes:\n      - './db:/var/db'\n```\n\nAs you can see, we are going to\
    \ use the latest SQLite3 image version (you can use any other image of your choice)\
    \ and we are creating a new volume that links the container `db` folder with our\
    \ `var/db` folder. To start the container, use the following command:\n\n```\n\
    docker compose up -d\n```\n\nThen, we only have to add the `DATABASE_URL` environment\
    \ variable to the `.env` file, which is located in the project root folder.\n\n\
    ```\nDATABASE_URL=\"sqlite:///%kernel.project_dir%/var/db/data.db\"\n```\n\nThis\
    \ variable contains the path to the SQLite database file. This path matches with\
    \ the volume path defined in the compose file. Ensure you have created the directory\
    \ `var/db`.\n\n# Installing Redis\n\n[Redis](https://redis.io/) is an open source,\
    \ in-memory database that can be used as a cache or message broker among other\
    \ uses. It supports various data structures such as strings, hashes, lists, sets,\
    \ and streams. It is known for its high performance and versatility in handling\
    \ data. We are going to use Redis as a messenger transport in Chapter [3](#663561_1_En_3_Chapter.xhtml).\
    \ As we did with SQLite, we are going to install it using docker.\n\nAs I said\
    \ before, feel free to install Redis following a procedure of your choice.\n\n\
    Let’s add the Redis service to our compose file:\n\n```\nversion: '3'\nservices:\n\
    \  sqlite3:\n    image: sqlite:latest\n    volumes:\n      - './db:/var/db'\n\
    \  redis:\n    image: redis\n    ports:\n      - '6401:6379'\n```\n\nAs you can\
    \ see, we are using the Redis image and linking the container Redis port 6379\
    \ to our computer port 6401. Let’s start the Redis container by executing the\
    \ compose up command again:\n\n```\ndocker compose up -d\n```\n\nThis will create\
    \ the container for the recently added Redis service. Now, as we did before with\
    \ the `DATABASE_URL` environment variable, let’s add the `MESSENGER_TRANSPORT_DSN`\
    \ variable which will contain the Redis DSN where the messages will be routed.\n\
    \n```\nMESSENGER_TRANSPORT_DSN=redis://localhost:6401/operations\n```\n\nThe `operations`\
    \ path indicates the Redis stream name where the messages will be queued.\n\n\
    The redis-messenger component uses [Redis streams](https://redis.io/docs/latest/develop/data-types/streams/)\
    \ to queue messages. You can learn more about them by following the last link,\
    \ but you must not worry about how they work since the Symfony Messenger does\
    \ all the routing work internally.\n\n# Conclusion\n\nThis section has helped\
    \ us to know and install all the necessary components and backend services that\
    \ we will need throughout the entire book. Now, we can start to write some code\
    \ in the first chapter, where we will build the basic skeleton of an operation-oriented\
    \ API.\n\nAny source code or other supplementary material referenced by the author\
    \ in this book is available to readers on GitHub. For more detailed information,\
    \ please visit [https://www.apress.com/gp/services/source-code](https://www.apress.com/gp/services/source-code).\n\
    \n# About the Author\n\n# About the Technical Reviewer\n\n# 1. Crafting Inputs,\
    \ Outputs, and Operations\n\nIn this chapter, we are going to build the basic\
    \ core functionalities of an operation-oriented API. Specifically, we will write\
    \ the necessary code to:\n\n*   Create models to represent inputs and outputs\n\
    *   Create services to represent operations\n*   Create an accessible collection\
    \ to store and retrieve those operations\n*   Perform operations based on the\
    \ request payload\n*   Validate payloads\n*   Create the endpoint to receive and\
    \ perform the operation requests\n\n## Section 1. Request Inputs and Outputs\n\
    \nIn the context of an API request, the following is a quick breakdown of inputs\
    \ and outputs:\n\n*   **Inputs**: This refers to the data or instructions you\
    \ provide to the API. These typically come in the request payload or headers,\
    \ depending on the API design. For instance, in a \"send payment\" operation,\
    \ the inputs might include the recipient's information, the amount, and potentially\
    \ a reference code.\n\n*   **Outputs**: This is the data or response you receive\
    \ back from the API after it processes your request. The output format can vary\
    \ depending on the API, but it often comes in JSON or XML format. For example,\
    \ the output for a \"send payment\" operation might be a confirmation message\
    \ with a success status and a transaction ID.\n\nIn the next sections, we are\
    \ going to create a class for both the request input and output so that we can\
    \ deserialize and validate them later.\n\n*   You will notice in this section\
    \ that some models’ properties are wrapped with some Symfony validation constraints.\
    \ In \"Section 5. Validating Operations,\" we will learn how to validate those\
    \ models according to the constraints that their properties hold.\n\n### The Input\
    \ Model\n\nBelow we can find a class that represents an API input request model:\n\
    \n```\nnamespace App\\Api\\Input;\n\nuse Symfony\\Component\\Validator\\Constraints\\\
    NotBlank;\n\nreadonly class ApiInput\n{\n    public function __construct(\n  \
    \      #[NotBlank(message: 'Operation name cannot be empty')]\n        public\
    \ string $operation,\n        public array $data = []\n    ) {}\n}\n```\n\nThe\
    \ input model contains the following properties:\n\n*   **Operation**: Holds the\
    \ name of the operation we want to execute.\n*   **Data**: Holds the data that\
    \ the operation requires to be performed. If the operation requires no data, then\
    \ this property can be empty.\n\nThe previous `ApiInput` model uses the `NotBlank`\
    \ Symfony validation constraint, which means that the operation name cannot be\
    \ empty.\n\n### The Output Model\n\n```\nnamespace App\\Api\\Output;\n\nreadonly\
    \ class ApiOutput\n{\n    public function __construct(\n        public mixed $data,\n\
    \        public int $code\n    ) {}\n}\n```\n\nThe output model contains the following\
    \ properties:\n\n*   **Data**: The operation execution result. It could be an\
    \ object array, a simple object, or even be empty if the operation returns no\
    \ result.\n*   **Code**: The HTTP code returned within the response. We should\
    \ take into account the following tips to choose the output HTTP code:\n    *\
    \   If we return the final operation result, we should opt for a `200 OK` HTTP\
    \ code.\n    *   If we return an operation process tracking key (the endpoint\
    \ accepts the execution, but it's been delayed), we should opt for a `202 ACCEPTED`\
    \ HTTP code.\n    *   If we do not return any operation result, we should opt\
    \ for a `204 NO CONTENT` HTTP code. `204` should only be used when no content\
    \ is returned at all, not even an empty JSON object."
