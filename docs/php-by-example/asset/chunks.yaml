    print_r($B);

    echo "数组 \$B:\n";

    // 遍历元素：

    foreach($B as $k1=>$v1){

    foreach($v1 as $k2=>$v2){

    // 显示元素的值：

    echo "\$B[$k1][$k2] = $v2\n";

    }

    }

    ?>

