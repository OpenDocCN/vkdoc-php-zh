    \n```\nfunction myFunc()\n{\n  $num  = func_num_args();\n  $args = func_get_args();\n\
    \  for ($i = 0; $i < $num; $i++)\n    echo $args[$i] . ' ';\n}\n\nmyFunc('Fee',\
    \ 'Fi', 'Fo'); // \"Fee Fi Fo\"\n```\n\n## Return 语句\n\n`Return` 是一个跳转语句，它会导致函数结束执行并返回到调用它的位置。\n\
    \n```\nfunction myFunc()\n{\n  return; // 退出函数\n}\n```\n\n它可以选择返回一个值，在这种情况下，函数调用将求值为该值。\n\
    \n```\nfunction myFunc()\n{\n  return 'Hello'; // 退出函数并返回值\n}\n\necho myFunc();\
    \    // \"Hello\"\n```\n\n没有返回值的函数将被求值为 `null`。\n\n## 作用域与生命周期\n\n通常，PHP 变量的作用域从其声明处开始，一直持续到页面结束。然而，在函数内部会引入一个局部函数作用域。在函数内部使用的任何变量默认都限于此局部作用域。一旦函数作用域结束，局部变量就会被销毁。\n\
    \n```\n$x = 'Hello';    // 全局变量\n\nfunction myFunc()\n{\n  $y = ' World'; // 局部变量\n\
