  raw: '#### Calculating Recurring Dates with the DatePeriod Class


    Working out recurring dates, such as the second Tuesday of each month, is now
    remarkably easy thanks to the `DatePeriod` class. It works in conjunction with
    a `DateInterval`.


    The `DatePeriod` constructor is unusual in that it accepts arguments in three
    different ways. The first way of creating a `DatePeriod` object is to supply the
    following arguments:


    *   A `DateTime` object representing the start date

    *   A `DateInterval` object representing the recurring interval

    *   An integer representing the number of recurrences

    *   The `DatePeriod::EXCLUDE_START_DATE` constant (optional)


    Once you have created a `DatePeriod` object, you can display the recurring dates
    in a `foreach` loop using the `DateTime format()` method.


    The code in `date_interval_04.php` displays the second Tuesday of each month in
    2015:


    `$start = new DateTime(''12/31/2014'');`


    `$interval = DateInterval::createFromDateString(''second Tuesday of next month'');`


    `$period = new DatePeriod($start, $interval, 12, DatePeriod::EXCLUDE_START_DATE);`


    `foreach ($period as $date) {`


    `echo $date->format(''l, F jS, Y'') . ''<br>'';`


    `}`


    It produces the output shown in Figure [14-11](#A978-1-4842-0635-5_14_Chapter.html#Fig11).


    ![A978-1-4842-0635-5_14_Fig11_HTML.jpg](A978-1-4842-0635-5_14_Fig11_HTML.jpg)


    Figure 14-11.


    Calculating a recurring date is remarkably easy with the `DatePeriod` class


    The first line of PHP code sets the start date as December 31, 2014\. The next
    line uses the `DateInterval` static method `createFromDateString()` to set the
    interval at the second Tuesday of next month. Both values are passed to the `DatePeriod`
    constructor, together with 12 as the number of recurrences and the `DatePeriod::EXCLUDE_START_DATE`
    constant. The constant’s name is self-explanatory. Finally, a `foreach` loop displays
    the resulting dates using the `DateTime format()` method.


    The second way of creating a `DatePeriod` object is to replace the number of recurrences
    in the third argument with a `DateTime` object representing the end date. The
    code in `date_interval_05.php` has been amended like this:


    `$start = new DateTime(''12/31/2014'');`


    `$interval = DateInterval::createFromDateString(''second Tuesday of next month'');`


    `$end = new DateTime(''12/31/2015'');`


    `$period = new DatePeriod($start, $interval,` `$end` `, DatePeriod::EXCLUDE_START_DATE);`


    `foreach ($period as $date) {`


    `echo $date->format(''l, F jS, Y'') . ''<br>'';`


    `}`


    This produces exactly the same output as shown in Figure [14-11](#A978-1-4842-0635-5_14_Chapter.html#Fig11).


    You can also create a `DatePeriod` object using the ISO 8601 recurring time-interval
    standard ( [`http://en.wikipedia.org/wiki/ISO_8601#Repeating_intervals`](http://en.wikipedia.org/wiki/ISO_8601#Repeating_intervals)
    ). This is not as user-friendly, mainly because of the need to construct a string
    in the correct format, which looks like this:


    `R` `n` `/YYYY-MM-DDTHH:MM:SS` `tz` `/P` `interval`


    `R` `n` is the letter `R` followed by the number of recurrences; `tz` is the time
    zone offset from UTC (or `Z` for UTC, as shown in the following example); and
    `P` `interval` uses the same format as the `DateInterval` class. The code in `date_interval_06.php`
    shows an example of how to use `DatePeriod` with an ISO 8601 recurring interval.
    It looks like this:


    `$period = new DatePeriod(''R5/2015-02-10T00:00:00Z/P10D'');`


    `foreach ($period as $date) {`


    `echo $date->format(''l, F j, Y'') . ''<br>'';`


    `}`


    The ISO recurring interval sets five recurrences from midnight UTC on February
    10, 2015 at an interval of 10 days. The recurrences are subsequent to the original
    date, so the preceding example produces six dates, as shown in the following output.


    ![A978-1-4842-0635-5_14_Figg_HTML.jpg](A978-1-4842-0635-5_14_Figg_HTML.jpg)


    ## Chapter Review


    A large part of this chapter has been devoted to the powerful date and time features
    introduced in PHP 5.2 and 5.3\. I haven’t covered the `DateTimeImmutable` class
    that was introduced in PHP 5.5 because it’s identical to `DateTime` in every respect
    except one. A `DateTimeImmutable` object never modifies itself. Instead, it always
    returns a new object with the modified values. This can be useful if you have
    a date, such as a person’s date of birth, which never changes. Using the `setDate()`
    or `add()` methods with this type of object returns a new object, preserving the
    original details and providing a new object for the updated ones, such as start
    of employment, marriage, pensionable age, and so on.


    You probably don’t need the date- and time-related classes every day, but they’re
    extremely useful and are a major improvement on the original PHP date and time
    functions. MySQL’s date and time functions also make it easy to format dates and
    execute queries based on temporal criteria.


    Perhaps the biggest problem with dates is deciding whether to use SQL or PHP to
    handle the formatting and/or calculations. A useful feature of the PHP `DateTime`
    class is that the constructor accepts a date stored in the ISO format, so you
    can use an unformatted date or timestamp from your database to create `DateTime`
    objects. However, unless you need to perform further calculations, it’s more efficient
    to use the `DATE_FORMAT()` function as part of a `SELECT` query.


    This chapter has also provided you with three functions for formatting text and
    dates. In the next chapter, you’ll learn how to store and retrieve related information
    in multiple database tables.


    # 15. Pulling Data from Multiple Tables


    As I explained in [Chapter 11](#A978-1-4842-0635-5_11_Chapter.html), one of the
    major strengths of a relational database is the ability to link data in different
    tables by using the primary key from one table as a foreign key in another table.
    The `phpsols` database has two tables: `images` and `blog`. It’s time to add some
    more and join them, so that you can assign categories to blog entries and associate
    images with individual articles.


    You don’t physically join multiple tables, but rather do so through SQL. Often,
    you can join tables by identifying a direct relationship between primary and foreign
    keys. In some cases, though, the relationship is more complex and needs to go
    through a third table that acts as a cross-reference between the other two.


    In this chapter, you’ll learn how to establish the relationship between tables
    and how to insert the primary key from one table as a foreign key in another table.
    Although it sounds difficult conceptually, it’s actually quite easy—you use a
    database query to look up the primary key in the first table, save the result,
    and use that result in another query to insert it in the second table.


    In particular, you’ll learn about the following:


    *   Understanding the different types of table relationships

    *   Using a cross-reference table for many-to-many relationships

    *   Altering a table’s structure to add new columns or an index

    *   Storing a primary key as a foreign key in another table

    *   Linking tables with `INNER JOIN` and `LEFT JOIN`'
