    \ may be needlessly expensive. An alternative would be to simply return an array\
    \ and let the calling code sort out object instantiation. This is possible, but\
    \ it violates the very purpose of the `Mapper` classes.\n\nThere is one way that\
    \ you can have your cake and eat it. You can use the built-in `Iterator` interface.\n\
