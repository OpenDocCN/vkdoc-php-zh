- fmt: "# PHP Loops and Date/Time Functions\n\n## While Loop\n\nThis short script\
    \ gives back each number 1 to 99. It is used in a so-called `while()` loop. The\
    \ header of the `while()` loop is used to specify a condition as an `if` function.\
    \ The loop is repeated as long as the condition is true or till a `break` command\
    \ is invoked inside the loop.\n\nThe script also has a small gimmick. It took\
    \ over from C++ to PHP: `++` increases the value of a variable by +1, `--` reduces\
    \ it to -1.\n\nHere is another example of the same output, only this time, it\
    \ is written in a quasi-infinite loop because the condition is true. The loop\
    \ runs until there is a `break`; the command is cancelled:\n\n```php\n<?php\n\
    $number = 1;\nwhile (true) {\n    echo $number . \"<br />\";\n    $number++;\n\
    \    if ($number > 99) {\n        break;\n    }\n}\n?>\n```\n\n## For Loop\n\n\
    For fixed numbers, there is a much more beautiful loop: the `for()` loop.\n\n\
    The function of the `for()` loop is as follows:\n\n```php\nfor (start value; condition;\
    \ to repeat command at each execution) {\n}\n```\n\nHere is a brief example:\n\
    \n```php\n<?php\nfor ($x = 1; $x < 100; $x++) {\n    echo $x . \"<br />\";\n}\n\
    ?>\n```\n\nThis would result in the same output as we had with our `while()` loop.\
    \ The third parameter of the function specifies a command to be executed after\
    \ each loop. In this case, we increase the value of the variable `$x` by 1. The\
    \ variable can be used only within the loop.\n\n## Foreach Loop\n\nThere is another\
    \ loop function to work through arrays: `foreach()`. Here is an example of how\
    \ this is used:\n\n```php\n<?php\n$valueArray = array(2,4,8,16,32);\nforeach ($valueArray\
    \ as $index => $value) {\n    echo $value . \"<br />\";\n}\n?>\n```\n\nOutput:\n\
    Within the function, the `$index` and `$value` variables are available. With `$index`,\
    \ you can determine which entry you have entered within the array (counted from\
    \ 0 ascending), or if you have defined the index of an array entry, you have this\
    \ within the loop. The names of the variables are freely definable; but it should\
    \ be clear within the loop code block what the variables are used for.\n\nIf you\
    \ do not need the array index within the loop, for example, as you only want to\
    \ output the values in sequence, it is even easier:\n\n```php\n<?php\n$valueArray\
    \ = array(2,4,8,16,32);\nforeach ($valueArray as $value) {\n    echo $value .\
    \ \"<br />\";\n}\n?>\n```\n\n# Date and Time\n\n## Date()\n\nWith the function\
    \ `date(format [, time])`, you can print a certain time in a formatted form.\n\
    \nThe first parameter specifies the format, while a second optional parameter\
    \ states a specific time. If the second parameter is absent, the current server\
    \ time is as shown below.\n\nHere is an example:\n\n```php\n<?php\necho date(\"\
    Y-m-d\");\n?>\n```\n\nOutput (if the actual server time is 24 December 2016):\
    \ `2016-12-24`\n\nThe second parameter must be specified in the PHP `time()` format.\
    \ This output would be the same:\n\n```php\n<?php\necho date(\"Y-m-d\", time());\n\
    ?>\n```\n\nThe `time()` function returns the desired time as a number. The value\
    \ is always the number of seconds after the UNIX time. This began on 1 January\
    \ 1970 through 00:00:00 GMT.\n\n## microtime()\n\nMore precisely, but not suitable\
    \ for the `date()` function, is the function `microtime()`. The parameter can\
    \ specify optionally whether you want to receive the return value as point number.\
    \ The function returns the current date in the UNIX time in the exact number of\
    \ microseconds. This is, for example, useful for measuring how long a script has\
    \ run in order to find programs that would still have potential for optimization:\n\
    \n```php\n<?php\n$start = microtime(true);\n\n/*\nTwo dummy variables, so that\
    \ we can generate some computing time for the script:\n*/\n$dummyVariable1 = 1;\n\
    $dummyVariable2 = 3;\n$x = 0;\n\nwhile ($x < 1000000) {\n    $x++;\n    $dummyVariable1\
    \ *= $dummyVariable2;\n    $dummyVariable1 = $dummyVariable1 / $dummyVariable2;\n\
    }\n\n$end = microtime(true);\necho \"Runtime: \" . ($end - $start) . \"ms\";\n\
    ?>\n```\n\nThis has, for example, the output: `Runtime: 0.0886830329895ms`\n\n\
    ## Give a Point in Time to Date() with mktime()\n\nIf you want to specify a certain\
    \ time, you have to do this, for example, with the function `mktime(hour, minute,\
    \ second, month, day, year)`:\n\n```php\n<?php\necho date(\"Y-m-d\", mktime(0,\
    \ 0, 0, 12, 24, 2012));\n?>\n```\n\nIt would have the same output again.\n\n##\
    \ strtotime()\n\nTo forestall a function from the chapter of text functions from\
    \ this book, I shall tell you the right `strtotime(\"date in text format\")`.\
    \ With this, you can convert a written text in human readable form of a certain\
    \ time in the `time()` format for the `date()` function:\n\n```php\n<?php\necho\
    \ date(\"Y-m-d\", strtotime(\"May 17th, 2012\"));\n?>\n```\n\nSome examples of\
    \ such conversions are as follows:\n- `strtotime(\"now\")`\n- `strtotime(\"2012-05-17\"\
    )`\n\nYou can even do some simple calculations from the actual point in time:\n\
    - `strtotime(\"next Friday\")`\n- `strtotime(\"last Monday\")`\n- `strtotime(\"\
    +1 day\")`\n- `strtotime(\"+1 week 2 days 3 hours 4 seconds\")`\n\n## Format Options\n\
    \n### Day\n- `d` - Day of the month, two digits with leading zeros: `01` to `31`\n\
    - `D` - Weekday, truncated to three letters: `Mon` to `Sun`\n- `j` - Day of the\
    \ month without leading zeros: `1` to `31`\n- `l` (lowercase `L`) - Full weekday:\
    \ `Sunday` to `Saturday`\n- `N` - Numeric representation of the day of the week\
    \ according to ISO 8601 (added in PHP 5.1.0): `1` (Monday) to `7` (Sunday)\n-\
    \ `S` - English ordinal suffix for day of the month, two characters. Recommended\
    \ for use with `j`: `st`, `nd`, `rd` or `th`\n- `w` - Numeric day of the week:\
    \ `0` (Sunday) to `6` (Saturday)\n- `z` - The day of the year (starting from 0):\
    \ `0` to `365`\n\n### Week\n- `W` - ISO 8601 week number of year, weeks starting\
    \ on Monday. Example: `42` (the 42nd week of the year)\n\n### Month\n- `F` - Month\
    \ as a whole word, such as January or March: `January` to `December`\n- `m` -\
    \ Month as a number, with leading zeros: `01` to `12`\n- `M` - Month name with\
    \ three letters: `Jan` to `Dec`\n- `n` - Month number without leading zeros: `1`\
    \ to `12`\n- `t` - Number of days of that month: `28` to `31`\n\n### Year\n- `L`\
    \ - Leap year or not: `1` if it is a leap year, otherwise `0`\n- `o` - Year, in\
    \ accordance with ISO 8601. This is the same value as `Y`, except when the ISO\
    \ calendar week (`W`) belongs to the previous or next year, in which case that\
    \ year is used. Example: `1999` or `2003`\n- `Y` - Four-digit year. Example: `1999`\
    \ or `2003`\n- `y` - Year, double-digit. Example: `99` or `03`\n\n### Time\n-\
    \ `a` - Lowercase ante meridiem (morning) and post meridiem (afternoon): `am`\
    \ or `pm`\n- `A` - Capital letters: ante meridiem (morning) and post meridiem\
    \ (afternoon): `AM` or `PM`\n- `B` - Swatch Internet Time: From `000` to `999`\
    \ per day\n- `g` - Hour in 12-hour format, without leading zeros: `1` to `12`\n\
    - `G` - Hour in 24-hour format, without leading zeros: `0` to `23`\n- `h` - Hour\
    \ in 12-hour format, with leading zeros: `01` to `12`\n- `H` - Hour in 24-hour\
    \ format, with leading zeros: `00` to `23`\n- `i` - Minutes, with leading zeros:\
    \ `00` to `59`\n- `s` - Seconds, with leading zeros: `00` to `59`\n- `u` - Microseconds.\
    \ Example: `654321`\n\n### Time Zone\n- `e` - Name of the time zone. Example:\
    \ `UTC`, `GMT`, `Atlantic/Azores`\n- `I` (uppercase `i`) - A date in the daylight\
    \ (summer) time: `1` if it is in daylight time, otherwise `0`\n- `O` - Difference\
    \ to Greenwich time (GMT) in hours. Example: `+0200`\n- `P` - Difference to Greenwich\
    \ time (GMT) in hours with colon between hours and minutes. Example: `+02:00`\n\
    - `T` - Abbreviation for time zone. Example: `EST`, `MDT`\n- `Z` - Time zone offset\
    \ in seconds. The offset for time zones west of UTC is always negative and for\
    \ time zones east of UTC it is always positive: `-43200` to `50400`\n\n### Complete\
    \ Date/Time\n- `c` - ISO 8601 date: `2004-02-12T15:19:21+00:00`\n- `r` - According\
    \ to RFC 2822 formatted date. Example: `Thu, 21 Dec 2000 16:01:07 +0200`\n- `U`\
    \ - Seconds since the Unix epoch (1 January 1970, 00:00:00 GMT)\n\n# Text Functions\
    \ (String Operations)\n\nIn PHP, there are a large number of functions for manipulating\
    \ text, such as splitting a longer string and assemble it different again, search\
    \ for characters, and more. I wish to show you the key functions, so that you\
    \ can solve almost all the problems of the manipulation of strings. There are\
    \ many other functions, which would be beyond the scope of this book for beginners.\
    \ But you can find some links at the end of the book to sites where all available\
    \ PHP functions are explained.\n\n## str_replace"
