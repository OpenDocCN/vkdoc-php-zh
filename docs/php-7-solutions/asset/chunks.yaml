    The Web is a brilliant illusion. When you visit a well-designed web\nsite, you\
    \ get a great feeling of continuity, as though flipping through\nthe pages of\
    \ a book or a magazine. Everything fits together as a\ncoherent entity. The reality\
    \ is quite different. Each part of an\nindividual page is stored and handled separately\
    \ by the web server.\nApart from needing to know where to send the relevant files,\
    \ the server\nhas no interest in who you are. Each time a PHP script runs, the\n\
    variables exist only in the server’s memory and are normally discarded\nas soon\
    \ as the script finishes. Even variables in the `$_POST` and `$_GET` arrays have\n\
    only a brief lifespan. Their value is passed once to the next script and\nthen\
    \ removed from memory unless you do something with it, such as\nstoring the information\
    \ in a hidden form field. Even then, it persists\nonly if the form is submitted.\n\
    To get around these problems, PHP uses  **sessions**\n. After briefly describing\
    \ how sessions work, I’ll show you how\nyou can use session variables to create\
    \ a simple, file-based login\nsystem and pass information from one page to another\
    \ without the need to\nuse hidden form fields.\n\nIn this chapter, you’ll learn\
    \ about the following:\n\n*   Understanding what sessions are and how to create\
    \ them\n\n*   Creating a file-based login system\n\n*   Checking password strength\
    \ with a custom-built class\n\n*   Setting a time limit for sessions\n\n*   Using\
    \ sessions to keep track of information over multiple\n    pages\n\nWhat Sessions\
    \ are and How They Work\nA session\nensures continuity by storing a random identifier—the\
    \ session ID—on the\nweb server and as a cookie on the visitor’s computer. The\
    \ web server\nuses the cookie to recognize that it’s communicating with the same\n\
    person (or, to be more precise, with the same computer). Figures [11-1](#332054_4_En_11_Chapter.xhtml#Fig1)\
    \ to [11-3](#332054_4_En_11_Chapter.xhtml#Fig3) show the\ndetails of a simple\
    \ session created in my local testing environment.\n\nAs Figure [11-1](#332054_4_En_11_Chapter.xhtml#Fig1)\
    \ shows, the\ncookie stored in the browser is called  `PHPSESSID` ,\nand the content\
    \ is a jumble of letters and numbers. This random string\nis the session’s ID.\n\
    \n![../images/332054_4_En_11_Chapter/332054_4_En_11_Fig1_HTML.jpg](images/332054_4_En_11_Chapter/332054_4_En_11_Fig1_HTML.jpg)"
