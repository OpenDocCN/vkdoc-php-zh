    `} elseif (!checkdate($month,$day,$year)) {`


    `$result[1] = ''You have used an invalid date'';`


    `} else {`


    `$result[0] = true;`


    `$result[1] = sprintf(''%d-%02d-%02d'', $year, $month, $day);`


    `}`


    `return $result;`


    `}`


    *   The function takes three arguments: month, day, and year, all of which should
    be numbers. The first three lines of code trim any whitespace from either end
    of the input, and the next line initializes the first element of an array called
    `$result`. If the input fails validation, the first element of the array is `false`,
