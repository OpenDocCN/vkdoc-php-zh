    CHAPTER 3 ■ BASE CLASS


    In this example, the properties of the Car class are publicly accessible. This
    is how PHP 4 (and earlier versions) treated all class properties and methods.
    Since the release of PHP 5, PHP developers have been able to start using property/method
    scope—something most other OOP languages have allowed for a long time.


    The main reason instance/class properties are used is to influence the execution
    of instance/class method logic. It follows that we may often want to prevent outside
    interference, or at least intercept this interference with what are commonly called
    getters/setters.


    Consider the example given in Listing 3-2.


    ***Listing 3-2.*** Variables That Should Be Private/Protected


    class Database


    {


    public $instance;


    public function __construct($host, $username, $password, $schema)


    {


    $this->instance = new MySQLi($host, $username, $password, $schema);


    }


    public function query($sql)


    {


    return $this->instance->query($sql);


    }


    }


    // you should specify a username, password and schema that matches your database
    $database = new Database("localhost", "username", "password", "schema"); $database->instance
    = "cheese";


    $database->query("select * from pantry");


    In this example, our class opens a connection to a MySQL database when we create
    a new Database instance. Since the $instance property is public, it can be modified
    externally, at any time. It is not a valid database connector instance; a call
    to the query() method will raise an exception. In fact, we do this by setting
    the $instance property to "cheese", which makes the following call to the query()
    method raise an exception.


    Let us see how getters/setters might help us avoid this problem, as demonstrated
    in Listing 3-3.


    ***Listing 3-3.*** Protecting Sensitive Variables


    class Database


    {


    protected $_instance;


    public function getInstance()


    {


    throw new Exception("Instance is protected");


    }


    public function setInstance($instance)


    {


    if ($instance instanceof MySQLi)


    {


    $this->_instance = $instance;


    }


    throw new Exception("Instance must be of type MySQLi");


    }


