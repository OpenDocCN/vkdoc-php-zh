  \ |\n\n### 8.12 数据库——此处无变化\n\n本书将不涉及数据库访问，因为总的来说，在使用 PHP CLI SAPI 时连接和查询数据库的过程与在\
  \ Web 上使用 PHP 时是相同的。\n\n唯一与数据库相关的备注是关于超时和断开的，这些将在下一章中讨论，届时我们将探讨长时间运行 PHP 进程的稳定性问题。\n\
  \n\n\n### 8.13 其他硬件与系统交互\n\n我们已介绍了部分常见的硬件与系统交互类型，但显然还有大量其他交互方式。若你遇到需要控制的硬件，或需要交互的系统级进程，第一步应检查\
  \ Pear、Pecl 和 Packagist 仓库中相关的 PHP 库与扩展。若未找到，再检查操作系统软件仓库中是否有可用的辅助应用或库。最后，可尝试使用常用搜索引擎。尽管\
  \ PHP 最常作为网络工具使用，但已有成千上万的开发者不断拓展 PHP 的能力边界（通常还会在线撰写博客分享），因此十有八九你会发现，前人早已涉足此领域并解决了问题。若所有方法均无效，可尝试观察其他语言开发者如何实现。PHP\
  \ 拥有许多与其他语言相同的函数，包括大量系统级调用，因此你或许能通过将他们的代码转换为 PHP 来找到解决方法。\n\n### 8.14 树莓派：PHP 与\
  \ RP\n\n以下章节的目的（除了让作者借机买一个新玩具外），是探索树莓派（RP）这种低功耗、信用卡大小的 PC。我们将研究如何在 RP 上开始使用 PHP，如何为\
  \ GPIO（通用输入输出）接口构建基本电子开关电路，以及如何从 PHP 内部访问连接到 GPIO 的电子设备。这些章节仅是主题入门，涵盖在 RP 上使用 PHP\
  \ 的关键要点，同时我们也会为你指引其他涵盖 RP 所有功能的综合性资料（通常与编程语言无关）。很快你就能构建出 PHP 控制的机器人霸主！\n\n本质上，RP\
  \ 只是另一台采用低功耗 ARM 架构 CPU 的 Linux 计算机。RP 有多种免费操作系统可供选择，多半基于 Debian、Fedora 或 Arch Linux。此外还有\
  \ Risc OS（ARM 原生系统）版本可用，但我们假设你使用的是基于 Linux 的发行版。所有给出的命令仅在 Raspbian（RP 官方操作系统，Debian\
  \ 衍生版）上测试过，但在其他基于 Linux 的操作系统上应能类似工作（或应能获得类似功能）。\n\n由于我们使用“另一台”Linux 设备，PHP 的安装与配置与桌面/服务器设备大致相同，因此本书其他部分提供的信息通常适用，此处不再赘述。不过有两个显著差异。首先，在\
  \ RP 上编译等操作通常*慢得多*，因为其处理器性能较弱，因此明智的做法是使用操作系统软件仓库中的预编译版本（例如在 Raspbian 上运行 `apt-get\
  \ install php5`）以加快速度。其次，RP 的 CPU 是 ARM 芯片，而非 x86。这意味着某些特别使用 x86 特性的 PHP 扩展可能不可用。其他扩展可能能工作，但尚未编译或打包为\
  \ ARM 版本，因此可能不在标准操作系统软件仓库中。此时，你可以按常规方式自行编译，详见附录 A。不过，几乎所有“常见扩展”在 Raspbian 上都有，因此你很可能不会察觉到差异。\n\
  \n再次重申，由于它只是“另一台”Linux 设备，你可以安装 Apache/Nginx、MySQL 及同类软件，与 PHP 一起使用，将其作为小型 Web 服务器。但这并非本书重点！\n\
  \n安装完成后，你可以像往常一样调用和使用 PHP，`php` 命令可像平时一样在 shell 中使用。再次强调，在 RP 上使用 PHP 的方式与普通桌面设备大致相同，更多信息请阅读本书其他部分。但与大多数\
  \ PC 和服务器不同的是，RP 板载 GPIO 接口，可让你开始涉足自制电子设备的世界，这正是我们接下来要探讨的内容。网上许多教程使用 Python、C 甚至\
  \ Shell 脚本介绍 GPIO 编程，但同样可以用 PHP 实现，我们这就开始！\n\n\n### 8.15 树莓派：三态逻辑基础\n\n作为程序员，我们都非常熟悉二进制逻辑：真或假、是或否、1\
  \ 或 0、开或关。这些二进制状态构成了所有编程的基础，即使在 PHP 这类高级语言中，它们也是维持程序状态的基本要素。同样，电子输入的基本要素之一便是开关。无论是电灯开关、键盘按键、磁簧开关、被动红外运动传感器还是其他许多输入类型，它们通常都可归结为一个（或多个）逻辑开关，我们可以通过测量来判断它们处于一种状态（断开、未按下、无运动）还是另一种状态（闭合、按下、检测到运动）。电路图中基本开关的符号通常如下所示：\n\
  \n![示例开关符号](img/image00252.gif)\n\n示例开关符号\n\n非常二进制的符号。当一个缺乏电子学经验的程序员拿到树莓派和一个开关时，很可能会想把一个\
  \ GPIO 引脚通过开关连接到 Gnd（地线），然后轮询其状态。如果这样做，你可能会在来回拨动开关时注意到状态变化。很好。但请继续观察。你可能会开始看到输入状态自行变化，显得有些随机。你实际上看到的是第三种“抖动”或“浮动”状态。如果没有直接连接到正电压或地线，GPIO\
  \ 引脚的状态就会浮动或抖动，无法保证其正确性。这有点像开启了`register_globals`的 PHP 变量：如果你没有明确设置它，就不能相信它的值。\n\
  \n树莓派的 GPIO 引脚采用“CMOS 逻辑”。这意味着二进制“1”（也称为“高电平”）是通过将 GPIO 引脚连接到`+3v3`（正 3.3 伏电压，由另一个引脚提供）产生的。二进制“0”（或“低电平”）则是通过将\
  \ GPIO 引脚连接到`Gnd`（地线引脚）产生的。要使用前面图示中的单个开关实现这种双路切换，我们需要利用电子和 PHP 程序员一样懒惰这一事实。请考虑下面的电路图：\n\
  \n![基本三态电路](img/image00253.jpeg)\n\n基本三态电路\n\n电子喜欢流经电阻最小的路径。如图所示，当开关断开时，唯一可能的路径（电路）是通过电阻连接`+3v3`引脚和\
  \ GPIO 引脚。电阻使得这条路径变得困难，但总比跨过断开的开关容易（在我们使用的电压下这是不可能的），所以电子选择了通过电阻这条更容易的路径。因此，当开关断开时，从\
  \ PHP 脚本轮询 GPIO 引脚，你会得到值“1”。一旦开关闭合，电子就开心多了，因为大部分电子可以直接通过几乎无电阻的开关快速流向 Gnd，其电阻肯定远小于电阻。因此，当开关闭合时，你的\
  \ PHP 会得到值“0”。你将始终能获得这个值，并且可以信赖它，因为连接要么直接接地，要么被电阻电路“上拉”到正电压。不再有抖动问题。\n\n我们电路的最后一个补充是在\
  \ GPIO 引脚上增加另一个电阻。顾名思义，树莓派的 GPIO 引脚既可以作为输入也可以作为输出，而且它们没有“缓冲”，即没有针对误用的保护。如果我们不小心在这个电路布局中设置并使用\
  \ GPIO 引脚作为输出，可能会损坏它。下面最终电路图中所示的电阻将为我们提供一些保护，同时允许电子以上述方式继续流动（因为它位于两条可能路径上，所以不会“偏向”任何一条）。\n\
  \n![带保护的三态电路](img/image00254.jpeg)\n\n带保护的三态电路\n\n这应该能让你对在树莓派上使用开关传感器的“逻辑”有所了解。由于有\
  \ 17 个 GPIO 引脚（新的树莓派 B+型号上甚至更多），所有引脚都可以单独寻址，你可以通过这种简单的方式快速轻松地为树莓派添加许多传感器。\n\n本节说明电子设备和接口并不像编程那样直接明了，但就像编程一样，一旦你掌握了规则，一切就都很合乎逻辑！我们不会进一步深入树莓派的电子学方面，因为电路（网上有很多很多）本质上与编程语言无关。而与语言相关的是如何通过软件访问连接的\
  \ GPIO 设备，这正是我们接下来要探讨的内容。\n\n\n\n### 8.16 树莓派：通过 PHP 访问 GPIO 端口\n\n假设我们已经搭建了一个基本开关电路，就像上面描述的那样。这个开关可能是一个门铃按钮，连接到，比方说，GPIO\
  \ 引脚 17。我们希望有人在按下按钮时通过连接的扬声器播放门铃声。我们需要编写一个 PHP 脚本，它可以轮询 GPIO 引脚的状态，并检测按钮何时被按下。这实际上是一个“Hello\
  \ World”类型的脚本，是你能做的最基础的东西，但它应该足以带你入门 GPIO 编程。\n\n在查看执行此操作所需的 PHP 代码之前，了解事情在“后台”是如何工作的会很有帮助。Linux\
  \ 内核包含一个用于处理 GPIO 引脚的专用接口模块（不仅适用于树莓派，也适用于其他拥有 GPIO 引脚的 PC 和嵌入式主板）。由于该接口是使用“万物皆文件”的\
  \ Unix 模型实现的，因此如有必要，你实际上可以使用标准 shell 命令手动访问它们。\n\n要访问和使用 GPIO 引脚，我们需要遵循几个基本步骤：\n\
  \n*   首先，确保 Linux 内核已加载 GPIO 模块\n*   接下来，为你的进程保留（“export”）该引脚\n*   将引脚设置为输入或输出\n\
  *   然后，通过读取或写入来管理该引脚\n*   最后，当你完成操作后，释放该引脚以供其他人使用\n\n要临时启用 Linux 内核中的 GPIO 接口，你可以发出以下\
  \ shell 命令：\n\n```\n1 ~: sudo modprobe w1-gpio\n```\n\n要永久启用该模块，请编辑 `/etc/modules`\
  \ 文件，单独添加 `w1-gpio` 作为一行，然后重启。要检查模块是否已加载，请执行：\n\n```\n1 ~: lsmod | grep \"w1-gpio\"\
  \n```\n\n一旦模块加载完毕，一个特殊的文件路径就会出现在 `/sys/class/gpio`下，这里就是所有操作发生的地方。要保留（或“export”）一个引脚，我们将引脚编号（在我们的例子中是\
  \ 17）写入伪文件`/sys/class/gpio/export`：\n\n```\n1 ~: echo 17 > /sys/class/gpio/export\n\
  ```\n\n如果保留成功，我们会在 `/sys/class/gpio/gpio17/` 下找到一个新建的伪文件夹。这个文件夹允许我们控制该引脚。首先，我们需要为它指定方向（在我们的例子中，`\"\
  in\"`表示输入，`\"out\"`表示输出）：\n\n```\n1 ~: echo \"in\" > /sys/class/gpio/gpio17/direction\n\
  ```\n\n如果我们使用该引脚作为输出，可以通过向 `/sys/class/gpio/gpio17/value` 写入 0 或 1 来设置引脚的值，方式与上述命令类似。然而，我们将其用作输入，所以需要读取引脚的值。要做到这一点，我们可以像读取文件一样简单地读取它：\n\
  \n```\n1 ~: cat /sys/class/gpio/gpio17/value\n```\n\n这将返回 0 或 1，后跟一个换行符 `\\n`。你可以根据需要持续（或间歇地）读取（或写入）该引脚，想读多久就读多久。当你完成后，例如当你的程序准备结束时，你应该释放它（或“unexport”它）以供其他人使用：\n\
  \n```\n1 ~: echo 17 > /sys/class/gpio/unexport\n```\n\n鉴于你可能知道在 PHP 中读写文件的众多不同方式，你大概已经在想如何从我们的脚本中访问我们的门铃电路了。先别急，因为\
  \ Ronan Guilloux 已经为我们完成了这项工作，并将输入和输出抽象成一个名为 `\"php-gpio\"` 的免费库，这就是我们将要在下面的脚本中使用的内容。\n\
  \n```php\n 1 <?\n\n3 # 首先我们需要包含库本身，它包含两个主要文件，\n 4 # 第一个文件包含 GPIO 类，第二个文件包含一个表示\n\
  \ 5 # 树莓派本身的类，该类被第一个文件所使用。\n\n7 include('php-gpio/src/PhpGpio/Gpio.php');\n 8 include('php-gpio/src/PhpGpio/Pi.php');\n\
  \n10 # 接下来，创建一个 GPIO 对象 $gpio\n\n12 $gpio = new PhpGpio\\Gpio();\n\n14 # 保留引脚 17\
  \ 并将其设置为输入\n\n16 $gpio->setup(17, \"in\");\n\n18 # 进入一个循环，等待门铃被按下\n\n20 while (1)\
  \ {\n\n22 \t# 读取引脚 17 的当前状态\n\n24 \t$currently = $gpio->input(17);\n\n26 \t# 如果开关没有被按下，状态将为\
  \ 1。如果开关\n27 \t# 被按下，状态将为 0。由于状态是一个设计为用\n28 \t# 像 cat 这样的 shell 命令读取的“文件”，它将作为\n\
  29 \t# 包含 1 或 0 以及 \\n 的字符串返回。不要仅仅测试它是否为 0，\n30 \t# 例如使用 $currently == 0，因为某些错误下该函数会返回\
  \ false，\n31 \t# 而这会被计算为 0。\n\n33 \tif ($currently === \"0\\n\") {\n\n35 \t\t# 叮咚！有人按了我们的门铃。使用\
  \ mplayer 来\n36 \t\t# 播放合适的音效文件。这需要在树莓派的\n37 \t\t# 音频插孔或 HDMI 接口上连接带放大器的扬声器。\n\n\
  39 \t\tshell_exec('mplayer dingdong.mp3');\n\n41 \t\t# 然后我们继续循环，等待下一位访客。\n\n43 \t\
  };\n\n45 \t# 让处理器喘口气。但不要等太久，否则\n46 \t# 我们可能会错过一次快速的门铃开关按下。\n\n48 \tusleep(1000);\n\
  49 };\n```\n\n设置输出引脚的值也同样简单，你只需要调用 `$gpio->output($pin, $value)`。该库提供的其他有用函数包括：\n\
  \n| 函数 | 描述 |\n| :--- | :--- |\n| `getHackablePins()` | 返回你所用树莓派版本上所有可访问的 GPIO 引脚数组\
  \ |\n| `setup($pinNo, $direction)` | 保留一个引脚并将其设置为输入或输出引脚 |\n| `input($pinNo)` |\
  \ 获取指定引脚的当前状态 |\n| `output($pinNo, $value)` | 设置指定引脚的状态 |\n| `unexport($pinNo)`\
  \ | 当使用完引脚后释放它 |\n| `unexportAll()` | 释放你当前已保留的所有引脚 |\n| `isExported($pinNo)` |\
  \ 检查你是否已保留某个引脚 |\n| `currentDirection($pinNo)` | 检查某个引脚是输入还是输出 |\n\n好了，这就是一个将真实世界电子设备连接到\
  \ PHP 的基本示例。当我们使用像上面这样的事件循环时，需要考虑一件事：当我们忙于响应一个 GPIO“事件”而做某事时，其他事件可能会被遗漏。围绕这个问题有几种解决策略：\n\
  \n*   创建一个 PHP 脚本来监控 GPIO 事件，该脚本快速触发并忘记网络事件以作为响应，然后使用第二个 PHP 脚本，配合像 `libevent` 这样的事件库来缓冲这些事件并按需响应（参见第\
  \ 6.3 节，使用 libevent 的网络守护进程）\n*   在你的脚本中，使用 ticks 或 POSIX 信号，通过定时语句定期检查是否有其他事件发生（参见第\
  \ 8.9 节，Linux 定时事件信号）\n*   作为对事件的响应，在后台启动额外的 PHP 脚本（或其他程序）（参见第 7.1 节，从 PHP 启动外部进程，或“shell\
  \ out”）\n\n| ![](img/image00249.gif) | ***php-gpio*** |\n| :--- | :--- |\n| | 一个用于简化树莓派上\
  \ GPIO 访问的库。 |\n| | ***主网站*** : [`github.com/ronanguilloux/php-gpio`](https://github.com/ronanguilloux/php-gpio)\
  \ |\n| | ***主要文档与安装信息*** : [`github.com/ronanguilloux/php-gpio/#php-gpio`](https://github.com/ronanguilloux/php-gpio/#php-gpio)\
  \ |\n\n\n\n\n### 8.17 树莓派：使用其余硬件\n\n树莓派的大部分硬件都是标准的 PC 类硬件，使用音频插孔、USB 端口或 HDMI 输出的方式与你预期的大致相同。除了这些以及上面讨论的标准\
  \ GPIO 引脚之外，树莓派上还有一些更专门的硬件可供使用，包括我们将在下面介绍的 I2C 和 SPI 接口。\n\n树莓派通过板子上的一对引脚支持 I2C\
  \ 设备。`I2C`是一种通信总线，旨在允许多个芯片通过同一线路相互通信。这意味着你可以轻松连接多个传感器、设备、芯片、扩展板和其他外设，而不会出现接口不足的情况。T.\
  \ Brian Jones 制作了一个用于控制 `I2C` 设备的 PHP 库，并编写了访问通过 `I2C` 连接的加速度计、磁力计以及气压、温度和高度传感器的示例代码。\n\
  \n树莓派还使用板上的 5 个引脚支持`SPI`（串行外设接口）协议。`SPI`是一种更高级的通信协议，常用于`ADC`（模数转换器）、GPIO 扩展芯片等芯片，特别是需要更高（全双工）通信速度的外设。Michael\
  \ Davey 为 PHP 创建了一个`SPI`扩展，使你可以与连接到树莓派的`SPI`设备进行通信。\n\n| ![](img/image00249.gif)\
  \ | ***TBJ 的树莓派 PHP 工具*** |\n|---|---|\n|   | 用于访问树莓派上`I2C`设备的 PHP 脚本。 |\n|   |\
  \ ***主网站***： [`github.com/tbrianjones/raspberry-pi-i2c-bus`](https://github.com/tbrianjones/raspberry-pi-i2c-bus)\
  \ |\n|   | ***主要文档与安装信息***： [`github.com/tbrianjones/raspberry-pi-i2c-bus#tbjs-raspberry-pi-php-tools`](https://github.com/tbrianjones/raspberry-pi-i2c-bus#tbjs-raspberry-pi-php-tools)\
  \ |\n\n| ![](img/image00249.gif) | ***php_spi*** |\n|---|---|\n|   | 一个用于访问`SPI`设备的\
  \ PHP 扩展 |\n|   | ***主网站***： [`github.com/frak/php_spi`](https://github.com/frak/php_spi)\
  \ |\n|   | ***主要文档与安装信息***： [`github.com/frak/php_spi#building`](https://github.com/frak/php_spi#building)\
  \ |\n\n### 8.18 树莓派：更多资源\n\n网络上还有非常多的树莓派教程、文章、书籍和套件。下面我列出了一些比较受欢迎的树莓派在线资源，虽然其中许多在软件部分并未使用\
  \ PHP，但你应该能够利用上面的 PHP 库来创建所需的大部分软件。教育是树莓派项目背后的驱动力之一，因此许多教程使用面向编程初学者的高级语言。这应该会使你更容易理解它们，从而在“翻译”成\
  \ PHP 时有所帮助。\n\n| ![信息](img/image00248.jpeg) | **延伸阅读** **The MagPi**，一本面向初学者和高级用户的月刊，内容全是关于树莓派的新闻、文章和教程。可免费在线阅读（包括全部过刊），也可购买印刷版。\
  \ [`www.themagpi.com/`](http://www.themagpi.com/) **嵌入式 Linux 维基上的树莓派专区**。一个了解树莓派硬件规格、软件、教程、指南及其他信息的绝佳资源。\
  \ [`elinux.org/RPi_Hub`](http://elinux.org/RPi_Hub) 特别是 **elinux 维基上的 GPIO 专区**，提供了关于\
  \ GPIO 功能的优秀参考资料。 [`elinux.org/RPi_Low-level_peripherals#General_Purpose_Input.2FOutput_.28GPIO.29`](http://elinux.org/RPi_Low-level_peripherals#General_Purpose_Input.2FOutput_.28GPIO.29)\
