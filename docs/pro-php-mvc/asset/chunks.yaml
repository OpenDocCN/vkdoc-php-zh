    ***Figure A-12.** Installing tasksel*


    Select LAMP server from the list of options shown in Figure [A-13\. A](#index_split_007.html#p444)t
    some point in the installation, you will be asked to provide a MySQL username
    and password. I chose to use root/root, as it’s simple to remember and fine for
    a development environment.


    ***Figure A-13.** Selecting packages to install*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 16](index-445_1.png)


    ![Image 17](index-445_2.png)


    appendix a ■ Setting Up a Web Server


    Step 2


    Unlike WAMP, tasksel does not automatically install phpMyAdmin with the LAMP server
    software packages.


    To install phpMyAdmin, type the command apt-get install phpMyAdmin. Select apache2
    (see Figure [A-14),](#index_split_007.html#p445)


    configure with dbconfig-common (see Figure [A-15](#index_split_007.html#p445)),
    and provide the username/password you just set up for MySQL (see Figure [A-16](#index_split_007.html#p446)).


    ***Figure A-14.** Integrating phpMyAdmin with Apache*


    ***Figure A-15.** Using dbconfig-common*


