    We will create a script that allows a user to sort a list of items using drag
    and drop. The script will do the following:


    **1.** Once the user loads the page, use Ajax to fetch the list of items to be
    sorted and display them to the user


    **2.** Allow the user to click and drag items to new locations to change the list
    order **3.** Save the new order of the list after the user releases an item in
    a new location **4.** Notify the user when the new order has been saved


    We will look at everything that is involved, including these functions:


    • Fetching the list of items using Ajax and using the DOM to create an unordered
    list (<ul></ul>) in which to display the items.


    • Making the list of items into a drag-and-drop list using the Scriptaculous Sortable
    class.


    • Styling the list of items in a manner that makes it easy for the user to drag
    items.


    • Handling Ajax events, including errors that may occur.


    • Using PHP in the background to save the list order. The list will be saved in
    a MySQL


    database.


    The code will be structured as follows:


    • index.php: A simple HTML page containing placeholders in which to show the sortable
    list and to show status messages.


    • styles.css: An external CSS file used to style the HTML page.


    • items.php: A PHP utility script used to manage the list of items, including
    connecting to the database, retrieving the list of items, and updating the order
    of the items.


    • processor.php: A PHP script to respond to the two different Ajax requests.


    • scripts.js: An external JavaScript file (in addition to Prototype and Scriptaculous)
    to handle the client-side application logic. This will be responsible for making
    the two Ajax requests required (fetching the list of items, and saving its new
    order).


    ■**Note** These files should be kept separate from the main web application we
    began in earlier chapters, since these files will not form part of the final application.
    This code will work just fine from a subdirectory.


