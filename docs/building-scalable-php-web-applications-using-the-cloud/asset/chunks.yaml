    Linux 系统中最危险的部分是 root 用户。它之所以危险，有两个原因。首先，它是超级用户，因此拥有对其他一切的完全控制权。其次，每个人都知道它的用户名，这使得自动化的黑客工具更容易入侵。


    有几种方法可以缓解与 root 用户相关的问题，包括：


    1.  root 口令应该是安全的（即，即使是计算机也难以猜测）。实际上，*每个*用户的口令都应该是安全的。

    2.  服务器不应允许远程直接 root 登录。要阻止通过 `ssh` 的直接 root 登录，请修改 `/etc/ssh/sshd_config`。如果已存在一行
    `PermitRootLogin`，请将值从 `yes` 改为 `no`。如果没有这一行，则添加一行 `PermitRootLogin no`。保存文件后，执行
    `systemctl restart sshd`，更改将生效。此后，你将需要以普通用户身份登录，并使用 `su` 命令切换到 `root` 用户。

    3.  服务应尽量避免以 root 用户身份运行，除非有压倒性的理由这样做。如果某个服务必须以 root 身份执行某些操作，那么该服务中直接与远程计算机通信的部分不应是
    root。

    4.  用户不应长时间以 root 用户身份操作。在本书中，我们大部分时间都是以 root 用户身份操作的。实际上，用户应以自己的账户登录，然后使用 `su`
    或 `sudo` 临时切换到 root 用户以获取 root 权限。

    5.  你应该安装某种服务拒绝程序，例如 `fail2ban`，它会在特定 IP 地址经过一定次数的失败尝试后禁止其登录。


    通过防止他人成为 root 用户、运行不以 root 用户身份运行的服务，以及保护 root 账户免受外部访问，入侵者造成破坏的能力将大大降低。


    大多数管理员使用 `sudo` 来管理对 root 用户的访问。`sudo` 命令允许用户*使用自己的密码*临时获得 root 用户的访问权限，或者登录后无需密码即可获得。它已经安装在你的机器上，并允许任何属于
    `wheel` 组的用户以 root 身份运行任何命令。要将用户（例如 `fred`）添加到 `wheel` 组，请执行以下命令：


    ```

    usermod -a -G wheel fred

    ```

    '
- fmt: 'Now, the `fred` user can run any command as the root user by just prepending
    `sudo` to the beginning of the command. For instance, if `fred` wanted to display
    the file `/etc/sudoers` (the configure file for the `sudo` command), Linux would
    not normally let him. If he did `cat /etc/sudoers`, the operating system would
    give him an error. But, if `fred` is in the `wheel` group, and he issued the command
    `sudo cat /etc/sudoers`, the operating system would ask him for his password and,
    after reauthenticating him, would run the command for him.


    In order to use `pssh` with `PermitRootLogin=no`, you will need to use `sudo`
    to switch users. However, `pssh` doesn''t like interaction and will cause problems
    when the user is asked for the password. Therefore, you need to modify the default
    configuration of `sudo` in order to allow the user to utilize `sudo` without supplying
    a password (they will still need their password to log in). To do this, as the
    root user, add the following line to `/etc/sudoers`:


    ```

    %wheel ALL=(ALL) NOPASSWD: ALL

    ```


    Now, to use `pssh`, you would log in as `fred` and `sudo` to perform your system
    administration command, like this:


    ```

    pssh -A -h servers.txt --user fred sudo put_your_command_here

    ```


    ## 13.4 Installing a Web Application Firewall


    A web application firewall is a piece of software that sits between your web application
    and the Internet. The purpose of a web application firewall is to check incoming
    traffic for patterns that are known to be consistent with malicious intent, and
    then block those requests. A web application firewall does not make up for bad
    programming in a web application, but it will often prevent automated hacking
    tools from finding holes.


    Apache has a web application firewall available for it that is easy to install.
    To install it, just do the following as root:


    ```

    yum install -y mod_security mod_security_crs

    systemctl restart httpd

    ```


    However, with our test site, the web application firewall will likely block requests
    that use the IP address in the URL, as that is a characteristic of many hack attempts!
    In fact, I have found that for many production systems I have to disable several
    individual rules to get the web application firewall to work with my application.
    This can be painful, but on the whole it is worthwhile to do. The web application
    firewall will log which rule denied the request in the log file `/var/log/httpd/error_log`.
    Therefore, you can find the rule ID number in the log and then disable it in the
    configuration. Just add the line `SecRuleRemoveById IDNUM` to the file `/etc/httpd/conf.d/mod_security.conf`
    to disable unwanted rules.


    ## 13.5 Checking for Rootkits


    A rootkit is a piece of software installed by someone who has broken into your
    server that makes it easier to control your server for nefarious deeds. If your
    server is secure, it is unlikely that someone will break in, but nonetheless it
    is good to periodically check.


    The two standard pieces of software for rootkit checking are `rkhunter` and `chkrootkit`.
    `rkhunter` is currently a part of EPEL and can be installed with:


    ```

    yum install -y rkhunter

    ```


    To run the program, just do `rkhunter --check`. Be aware that it can generate
    false warnings and false positives, so be sure to check the logs to see what,
    specifically, it found when it was looking at an issue.


    ## 13.6 Other Security Software


    There are a host of other security packages that you can install and use. The
    important thing is to know what measures are available, and to see whether or
    not they are cost-effective for your needs.


    Some additional common security packages for Linux include:


    * **logwatch**: This tool analyzes log files and e-mails administrators when suspicious
    activity is recorded.

    * **fail2ban**: This program looks for repeated login failures and other suspicious
    behaviors and will block IP addresses that look like they are attempting to break
    in.'
