    # 模式与设计原则


    模式具有相互契合的沟槽与曲线，某些模式拼合时会发出令人愉悦的咔嗒声。使用模式解决问题必然会引发连锁反应，这些后果可能成为催生互补模式的先决条件。当然，在选用相关模式时务必确保解决的是真实需求与问题，而非构建精巧却无用的互锁代码塔——编程领域同样存在建造建筑愚行的诱惑。


    ## 通用词汇表


    模式是构建描述问题与解决方案通用词汇表的手段。命名至关重要——它代替了描述过程，使我们能快速覆盖大量领域。当然，命名对尚未掌握这套词汇的人来说也会模糊含义，这也是模式有时令人恼火的原因之一。


    ## 模式推动设计


    如后续章节所述，恰当运用模式可促进优秀设计。但需注意重要警示：模式并非魔法粉尘。


    ## 模式与设计原则


    设计模式本质上关注优秀设计。善用之可助你构建松耦合的灵活代码。然而模式批评者指出，初学者容易过度使用模式，这个观点确有道理。由于模式实现会形成优美精巧的结构，人们容易忘记优秀设计始终在于"适用性"。请记住：模式的存在是为了解决问题。


    初学模式时，我曾将`AbstractFactory`遍布整个代码。当需要生成对象时，`AbstractFactory`确实帮了忙。但实际上，我是在偷懒并为自己制造不必要的工作。我需要生成的对象集合确实相关，但尚未存在替代实现。经典的`AbstractFactory`模式适用于根据场景生成多种对象集合的情况。要使其生效，需为每类对象创建工厂类，再创建服务类来调用工厂类——仅描述这个过程就令人疲惫。


    如果当时创建基础工厂类，待发现需要生成并行对象集时再重构为`AbstractFactory`，代码会更加简洁。


    使用模式并不保证优质设计。开发时最好记住同一原则的两种表述：KISS（"保持简单，笨蛋"）和"做最简单可行的事"。极限编程还提供另一个相关缩写：YAGNI（"你不需要它"），意思是不应实现非必要功能。


    结束这些警示后，我可以恢复热情洋溢的语调。正如第 9 章所述，模式往往体现可泛化并应用于所有代码的原则体系。


    ### 优先使用组合而非继承


    继承关系功能强大。我们利用继承支持运行时类切换（多态），这正是本书探讨的许多模式与技术的核心。但设计时若仅依赖继承，会产生易复制且缺乏灵活性的结构。


    ### 避免紧密耦合


    本章已讨论过此问题，但为完整性仍需提及。一个组件的变化可能要求项目其他部分相应调整，这是无法回避的事实。但可通过避免重复（示例中的平行条件语句）和过度使用全局变量（或单例）来最小化影响。同时当抽象类型可促进多态时，应尽量减少具体子类的使用，这点引出了另一个原则。


    ### 针对接口编程，而非实现


    为软件组件设计清晰定义的公共接口，使各组件职责透明化。若在抽象超类中定义接口，并让客户端类要求使用此抽象类型，即可将客户端与具体实现解耦。


    但需谨记 YAGNI 原则。若开始仅需某个类型的单一实现，则无立即创建抽象超类的必要。完全可以在具体类中定义清晰接口。当发现单一实现试图同时处理多项任务时，可将该具体类重设为两个子类的抽象父类。客户端代码无需调整，仍继续使用单一类型。


    判断是否需要拆分实现并将所得类隐藏在抽象父类后的经典标志，是具体实现中条件语句的出现。


    ### 封装变化的概念


    若发现子类泛滥成灾，应考虑将导致子类化的原因提取为独立类型。尤其当这种分层是为了实现与类型主要目的无关的辅助功能时。


    例如给定`UpdatableThing`类型，可能会创建`FtpUpdatableThing`、`HttpUpdatableThing`和`FileSystemUpdatableThing`子类。但该类型的核心职责是"可更新的东西"——存储与检索机制只是附属功能。`Ftp`、`Http`和`FileSystem`是真正变化的部分，应归入独立类型——命名为`UpdateMechanism`。该类型将拥有不同实现的子类。如此即可无限扩展更新机制而不影响`UpdatableThing`类型，使其保持核心职责聚焦。


    注意这里我用动态运行时结构替代了静态编译时结构，这（看似偶然地）将我们带回了第一个原则："优先使用组合而非继承"。


    ## 实践


    本书这部分（及第 14 章介绍）讨论的问题，常被教材和程序员忽视。作为程序员，我发现这些工具和技术对项目成功的重要性至少与设计相当。诸如文档和自动化构建等问题，其本质震撼力虽不及`Composite`模式等奇迹，但同样关键。


    > **注：** 让我们重温`Composite`之美：简单的继承树，其对象可在运行时组合成同样具备树状结构，但灵活性与复杂度高出数个量级的结构。多个对象共享统一接口对外呈现。简单与复杂、多元与单一的交织，足以令人心跳加速——这不仅是软件设计，更是诗篇。'
- fmt: '# Documentation, Build, Testing, and Version Control


    Even if issues such as documentation and build, testing, and version control are
    more prosaic than patterns, they are no less important. In the real world, a fantastic
    design will not survive if multiple developers cannot easily contribute to it
    or understand the source. Systems become hard to maintain and extend without automated
    testing. Without build tools, no one is going to bother to deploy your work. As
    PHP’s user base widens, so does our responsibility as developers to ensure quality
    and ease-of-deployment.


    A project exists in two modes. A project is its structures of code and functionality,
    and it is also a set of files and directories, a ground for cooperation, a set
    of sources and targets, and a subject for transformation. In this sense, a project
    is a system from the outside as much as it is within its code. Mechanisms for
    build, testing, documentation, and version control require the same attention
    to detail as the code such mechanisms support. Focus on the metasystem with as
    much fervor as you do on the system itself.


    ## Testing


    Although testing is part of the framework that one applies to a project from the
    outside, it is intimately integrated into the code itself. Because total decoupling
    is not possible, or even desirable, test frameworks are a powerful way of monitoring
    the ramifications of change. Altering the return type of a method could influence
    client code elsewhere, causing bugs to emerge weeks or months after the change
    is made. A test framework gives you half a chance of catching errors of this kind
    (the better the tests, the better the odds here).


    Testing is also a tool for improving object-oriented design. Testing first (or
    at least concurrently) helps you to focus on a class’s interface and think carefully
    about the responsibility and behavior of every method. I introduced `PHPUnit`,
    which is used for testing, in Chapter [18](#A314621_5_En_18_Chapter.html).


    ## Standards


    I am a contrarian by nature. I hate being told what to do. Words like *compliance*
    instantly invoke a fight-or-flight response in me. But, counter-intuitive as it
    may seem, standards drive innovation. That is because they drive interoperability.
    The rise of the Internet was fueled in part by the fact that open standards are
    built in to its core. Web sites can link to one another, and web servers can be
    reused in any domain because protocols are well-known and respected. A solution
    in a silo may be better than a widely accepted and applied standard, but what
    if the silo burns down? What if it is bought, and the new owner decides to charge
    for access? What happens when some people decide that the silo next door is better?
    In Chapter [16](#A314621_5_En_16_Chapter.html) I discussed PSR, PHP Standard Recommendations.
    I focused in particular on standards for autoloading, which have done much to
    clean up the way that PHP developers include classes. I also looked at `PSR-2`,
    the standard for coding style. Programmers have strong feelings about the placement
    of braces and the deployment of argument lists, but agreeing to abide by a common
    set of rules makes for readable and consistent code, and allows us to use tools
    to check and reformat our source files. In that spirit I have reformatted all
    code examples in this edition to comply with `PSR-2`.


    ## Version Control


    Collaboration is hard. Let’s face it: people are awkward. Programmers are even
    worse. Once you’ve sorted out the roles and tasks on your team, the last thing
    you want to deal with is clashes in the source code itself. As you saw in Chapter
    [17](#A314621_5_En_17_Chapter.html), `Git` (and similar tools such as `CVS` and
    `Subversion`) enable you to merge the work of multiple programmers into a single
    repository. Where clashes are unavoidable, `Git` flags the fact and points you
    to the source to fix the problem.


    Even if you are a solo programmer, version control is a necessity. `Git` supports
    branching, so that you can maintain a software release and develop the next version
    at the same time, merging bug fixes from the stable release to the development
    branch.


    `Git` also provides a record of every commit ever made on your project. This means
    that you can roll back by date or tag to any moment. This will save your project
    someday—believe me.


    ## Automated Build


    Version control without automated build is of limited use. A project of any complexity
    takes work to deploy. Various files need to be moved to different places on a
    system, configuration files need to be transformed to have the right values for
    the current platform and database, and database tables need to be set up or transformed.
    I covered two tools designed for installation. The first, `Composer` (see Chapter
    [15](#A314621_5_En_15_Chapter.html)), is ideal for standalone packages and small
    applications. The second build tool I covered was `Phing` (see Chapter [19](#A314621_5_En_19_Chapter.html)),
    which is a tool with enough power and flexibility to automate the installation
    of the largest and most labyrinthine project.


    Automated build transforms deployment from a chore to a matter of a line or two
    at the command line. With little effort, you can invoke your test framework and
    your documentation output from your build tool. If the needs of your developers
    do not sway you, bear in mind the pathetically grateful cries of your users as
    they discover that they need no longer spend an entire afternoon copying files
    and changing configuration fields every time you release a new version of your
    project.


    ## Continuous Integration


    It is not enough to be able to test and build a project; you have to do it all
    the time. This becomes increasingly important as a project grows in complexity
    and you manage multiple branches. You should build and test the stable branch
    from which you make minor bug fix releases, an experimental development branch
    or two, and your main trunk. If you were to try to do all that manually, even
    with the aid of build and test tools, you’d never get around to any coding. Of
    course, all coders hate that, so build and testing inevitably get skimped on.


    In Chapter [20](#A314621_5_En_20_Chapter.html), I looked at Continuous Integration,
    a practice and a set of tools that automate the build and test processes as much
    as possible.


    ## What I Missed


    A few tool categories I have had to omit from this book due to time and space
    constraints are, nonetheless, supremely useful for any project. In most cases,
    there is more than one good tool for the job at hand so, although I’ll suggest
    one or two, you may want to spend some time talking with other developers and
    digging around with your favorite search engine before you make your choice.


    If your project has more than one developer or even just an active client, then
    you will need a tool to track bugs and tasks. Like version control, a bug tracker
    is one of those productivity tools that, once you have tried it on a project,
    you cannot imagine not using. Trackers allow users to report problems with a project,
    but they are just as often used as a means of describing required features and
    allocating their implementation to team members.


    You can get a snapshot of open tasks at any time, narrowing the search according
    to product, task owner, version number, and priority. Each task has its own page,
    in which you can discuss any ongoing issues. Discussion entries and changes in
    task status can be copied by mail to team members, so it’s easy to keep an eye
    on things without going to the tracker URL all the time.'
