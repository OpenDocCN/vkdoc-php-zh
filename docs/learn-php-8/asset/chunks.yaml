    string $color_error = $this->set_dog_color($properties_array[2]) ==

    TRUE ? ''TRUE,'' : ''FALSE,'';

    string $weight_error= $this->set_dog_weight($properties_array[3]) ==

    TRUE ? ''TRUE'' : ''FALSE'';

    ```


    这就需要修改 `dog.php` 文件中的这些行，使其能够接受一个数组，并使用数组中的值来设置每个属性。


    注意，第一行中的 `$properties_array` 并没有声明其为数组（除了名称本身）。请记住，PHP 属性是通过传入属性的内容来决定其数据类型的。数组也是如此。如果向
    `$properties_array` 传入一个数组，它就会成为数组。


    数组的地址被传入该方法。接受该地址的属性（`$properties_array`）实际上指向了该数组在内存中的位置。这非常高效。如果你需要向一个方法传递 50
    个项目，你可以在方法签名中为每个项目声明不同的属性，然后逐一传递。但相反，你可以创建一个包含这 50 个项目的数组，并传递这个数组。通过这种方法，你只传递了一个值，即该数组在内存中的地址。此外，如本例所示，使用数组使得我们可以灵活调整传递到方法签名中的项目数量。


    ```

