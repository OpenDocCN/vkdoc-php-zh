  \  JavaScript 实现\n\n## 引言\n\n### 为何写这本书\n\n在花费了大量时间致力于构建能够简化处理字符串、数字、数组等操作方法的库之后，我决定写这本书。它们被称为标量类型，因为\
  \ PHP 对待它们的方式与对象不同。它们没有属性，也没有方法。\n\nPHP 有着悠久的历史，并且在网络世界中占据着主导地位。尽管存在语言上的不一致性和困难（尤其是在涉及这些标量类型时），它仍然取得了巨大的成就。比雅尼·斯特劳斯特鲁普曾说过：“只有两种编程语言：人们抱怨的和没人用的。”\
