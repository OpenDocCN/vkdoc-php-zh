  \ Linux 系统上。如果尚未安装，可以通过输入 `apt-get install vim` 来安装。或者，你也可以使用自己喜爱的文本编辑器，但重要的是将 `DocumentRoot`\
  \ 路径更新到正确位置。\n\n## MAC OS X\n\n在本节中，我们将介绍在 OS X 中的安装过程。这些软件包的安装通常被称为 MAMP（**M**ac\
  \ **A**pache **M**ySQL **P**HP）。\n\n#### 步骤 1\n\n安装 OS X 的 Web 服务器非常简单。首先，前往 [`www.mamp.info/en/downloads/`](http://www.mamp.info/en/downloads/index.html)\
  \ 下载最新版本的 MAMP 和 MAMP PRO。解压下载的归档文件，并运行相应的安装程序（32 位或 64 位）。\n\n安装程序会将 MAMP 文件夹放置在你的\
  \ `Applications` 文件夹中，这需要管理员权限。系统会提示你输入管理员密码。当你打开 MAMP 应用程序（现在应位于你的 `Applications`\
  \ 文件夹中）时，你可以轻松地停止/启动服务器，并查看本地 Web 服务器的登录页面（见图 A-19）。你可以将默认端口设置为 `80/3306`（见图 A.20），就像在\
  \ Windows 7/Linux 中一样，并且还可以选择要运行的 PHP 版本（应选择 PHP 5.3+）。最后，你还可以在 Apache 标签页中设置正确的\
  \ `DocumentRoot` 文件夹。\n\n重复我们之前为应用程序创建数据库模式、用户名和密码的步骤，通过随 MAMP 一起安装的 `phpMyAdmin`\
  \ 进行操作。\n\n#### 步骤 2\n\n在 OS X 中安装 Memcached PHP 扩展有些棘手。你需要输入以下命令：\n\n- `chmod u+x\
  \ /Applications/MAMP/bin/php/php5.3.X/bin/p*`（其中 `5.3.X` 是你在 MAMP 应用程序中选择的 PHP 版本）\n\
  - `cd /tmp`\n- `wget http://pecl.php.net/get/memcache-2.2.5.tgz`\n- `tar -zxvf memcache-2.2.5.tgz`\n\
  - `cd memcache-2.2.5`\n- `/Applications/MAMP/bin/php/phpX.X.X/bin/phpize`\n- `MACOSX_DEPLOYMENT_TARGET=10.6\
  \ CFLAGS='-O3 -fno-common -arch i386 -arch x86_64' LDFLAGS='-O3 -arch i386 -arch\
  \ x86_64' CXXFLAGS='-O3 -fno-common -arch i386 -arch x86_64' ./configure`\n- `make`\n\
  - `cp modules/memcache.so /Applications/MAMP/bin/php/phpX.X.X/lib/php/extensions/no-debug-non-zts-20060613/`\n\
  - `echo 'extension=memcache.so' > /Applications/MAMP/bin/php/phpX.X.X/conf/php.ini`\n\
  \n重新启动服务器后，通过 MAMP 应用程序，PECL Memcache 类将可以在我们的代码中使用。\n\n#### 如果 wget 缺失怎么办？\n\n\
