  raw: 'exempt or charged at a reduced rate) and be relatively happy that you’ve done
    all you can. If you want to take things one step further, you can consider an
    offshore business to ship your goods (Amazon does it, so why shouldn’t you?).
    The United States (and other countries) has a much more complex system to deal
    with. Within the United States, sales tax varies not just from state to state,
    but often within states as well. In fact, pretty much the only time you’ll know
    exactly what to do is when you are shipping goods to a customer in the same tax
    area as your business. At other times...well, to be perfectly honest, your guess
    is as good as ours.


    Many states are aware of the issue, and may well have resolved things by the time
    you read this, but this is far from certain. Recent estimates (from http://www.


    offshore-e-com.com/) put the loss of revenue from e-commerce trading at between
    $300 million and $3.8 billion annually; the margin of error here probably informs
    you that the officials are as confused about all this as we are. Calls have gone
    out to provide a “taxation calculator”


    where a source and target ZIP code could be used to obtain a tax rate, but as
    far as we know, no such service exists yet.


    In this book, the taxation scheme you add is as simple as possible. A database
    table will include information concerning various tax rates that can be applied,
    and the choice of these will for now depend on the shipping region of the customer.
    All products are considered to be taxable at the same rate. This does leave a
    lot to be desired, but at least tax will be calculated and applied. You can replace
    it with your own system later.


    **Shipping Issues**


    Shipping is somewhat simpler to deal with than tax, although again you can make
    things as complicated as you want. Because sending out orders from a company that
    trades via an e-commerce front end is much the same as sending out orders from,
    say, a mail-order company, the practices are very much in place and relatively
    easy to come to understand. There may be new ways of doing things at your disposal,
    but the general principles are well known.


    You may have an existing relationship with a postal service from pre-online trading
    times, in which case, it’s probably easiest to keep things as close to the “old”
    way of doing things as possible. However, if you’re just starting out or revising
    the way you do things, you have plenty of options to consider.


    The simplest option is not to worry about shipping costs at all, which makes sense
    if there are no costs, for example, in the case of digital downloads. Alternatively,
    you could simply include the cost of shipping in the cost of your products. Or
    you could impose a flat fee regardless of the items ordered or the destination.
    However, some of these options could involve customers either overpaying or underpaying,
    which isn’t ideal.


    The other extreme involved is accounting for the weight and dimensions of all
    the products ordered and calculating the exact cost yourself. This can be simplified
    slightly because some shipping companies (including FedEx, and others) provide
    useful APIs to help you. In some cases, you can use a dynamic system to calculate
    the shipping options available (overnight, three to four days, and so on) based
    on a number of factors, including package weight and delivery location. The exact
    methods for doing this, however, can vary a great deal among shipping companies,
    and we’ll leave it to you to implement such a solution if you require it.


    In this book, we’ll again take a simple line. For each shipping region in the
    database, you’ll provide a number of shipping options for the user to choose from,
    each of which will have an associated cost. This cost is simply added to the cost
    of the order. This is the reason why, in Chapter 11, you included a shipping_region
    table—its use will soon become apparent.


