  trans: "\n### 在 Windows 上安装集成环境包\n\n目前有三大主流集成环境包，可在 Windows 系统中一键安装 Apache、PHP、MySQL\
    \ 或 MariaDB、phpMyAdmin 及其他多种工具：XAMPP（[`www.apachefriends.org/index.html`](http://www.apachefriends.org/index.html)）、WampServer（[`www.wampserver.com/en/`](http://www.wampserver.com/en/)）和\
    \ EasyPHP（[`www.easyphp.org`](http://www.easyphp.org)）。安装过程通常只需几分钟。安装完成后，可能需要根据本章后续内容调整一些设置。\n\
    \n由于印刷书籍的时效性，各版本会随时间变化，因此我不详述安装过程。每个集成环境包在其官方网站上都有安装说明。\n\n## 在 macOS 上进行设置\n\n\
    macOS 系统预装了 Apache Web 服务器和 PHP，但默认并未启用。我建议不使用预装版本，而是安装 MAMP，它能一键安装 Apache、PHP、MySQL、phpMyAdmin\
    \ 及其他多种工具。\n\n为避免与预装的 Apache 和 PHP 发生冲突，MAMP 将所有应用程序安装在硬盘上的专用文件夹中。这样，如果你决定不再使用\
    \ MAMP，只需将 MAMP 文件夹拖入废纸篓即可轻松卸载所有内容。\n\n### 安装 MAMP\n\n开始前，请确保你以管理员权限登录到计算机。\n\n\
    1.  访问 [`www.mamp.info/en/downloads/`](http://www.mamp.info/en/downloads/) 并选择\
    \ MAMP & MAMP PRO 的下载链接。这将下载一个包含免费版和付费版 MAMP 的磁盘映像。\n2.  下载完成后，启动磁盘映像。你将看到一份许可协议。必须点击“同意”才能继续装载磁盘映像。\n\
    3.  按照屏幕上的说明进行操作。\n4.  确认 MAMP 已安装在你的 `Applications` 文件夹中。\n\n### 注意\n\nMAMP 会自动将免费版和付费版分别安装到名为\
    \ `MAMP` 和 `MAMP PRO` 的独立文件夹中。付费版可以更方便地配置 PHP 和操作虚拟主机，但免费版完全够用，尤其适合初学者。如果你想删除\
    \ `MAMP PRO` 文件夹，请勿直接将其拖入废纸篓。请打开该文件夹，双击 `MAMP PRO` 卸载图标。付费版需要这两个文件夹才能运行。\n\n###\
    \ 测试与配置 MAMP\n\n默认情况下，MAMP 会为 Apache 和 MySQL 使用非标准端口。除非你同时运行了多个 Apache 或 MySQL\
    \ 实例，否则请按照以下步骤更改端口设置：\n\n1.  双击 `Applications/MAMP` 中的 MAMP 图标。如果弹出提示面板，邀请你通过\
    \ MAMP Cloud Functions 在多台 Mac 上访问数据，请点击左上角的“关闭”按钮关闭面板。MAMP Cloud Functions 是一项付费服务，本书不需要使用。你可以点击“了解更多”按钮获取详细信息。这里还有一个复选框，可以防止每次启动\
    \ MAMP 时都显示该面板。\n2.  在 MAMP 控制面板中点击“启动服务器”（见图 2-1）。Apache Server 和 MySQL Server\
    \ 旁边应亮起绿色小灯，表示它们正在运行。你的默认浏览器也应启动并显示 MAMP 欢迎页面。\n    \n    ![../images/332054_4_En_2_Chapter/332054_4_En_2_Fig1_HTML.jpg](img/332054_4_En_2_Fig1_HTML.jpg)\n\
    \    \n    图 2-1. 在 MAMP 控制面板中启动服务器\n    \n3.  如果浏览器没有自动启动，请在 MAMP 控制面板中点击“打开\
    \ WebStart 页面”。\n4.  检查浏览器地址栏中的 URL。它以 `localhost:8888` 开头。其中的 `:8888` 表示 Apache\
    \ 正在非标准端口 8888 上监听请求。\n5.  最小化浏览器，在 MAMP 控制面板的任意位置单击，使其成为活动应用。\n6.  转到屏幕顶部的 MAMP\
    \ 主菜单，选择“偏好设置”（或使用键盘快捷键 Cmd+,）。\n7.  在打开的窗口顶部选择“端口”。它显示 Apache 和 MySQL 分别运行在端口\
    \ 8888 和 8889 上（见图 2-2）。\n    \n    ![../images/332054_4_En_2_Chapter/332054_4_En_2_Fig2_HTML.jpg](img/332054_4_En_2_Fig2_HTML.jpg)\n\
    \    \n    图 2-2. 更改 Apache 和 MySQL 端口\n    \n8.  如图 2-2 所示，点击“将 Web 和 MySQL 端口设置为\
    \ 80 和 3306”。数字将变为标准端口：Apache 为 80，MySQL 为 3306。\n\n### 注意\n\nMAMP 现在支持将 Nginx\
    \ 作为备选 Web 服务器。当我点击“将 Web 和 MySQL 端口设置为 80 和 3306”时，Apache Port 和 Nginx Port 都变成了\
    \ 80，这会导致设置无法生效。如果发生这种情况，请手动将 Nginx Port 重置为 7888。\n\n1.  点击“确定”，并在提示时输入你的 Mac\
    \ 密码。MAMP 将重启两个服务器。\n\n### 提示\n\n如果端口 80 已被其他程序占用，Apache 将无法重启。如果你找不到是什么程序占用了端口\
    \ 80，请打开 MAMP 偏好设置面板，点击“将 MAMP 端口设置为默认值”。\n\n1.  当两个指示灯再次变为绿色时，MAMP 欢迎页面会重新加载到你的浏览器中。此时，URL\
    \ 中 `localhost` 之后不应再出现冒号加数字的格式，因为 Apache 现在正在默认端口上监听。\n\n## PHP 文件应放置在何处（Windows\
    \ 和 Mac）\n\n你需要将文件创建在 Web 服务器可以处理它们的位置。通常，这意味着文件应位于服务器的文档根目录或文档根目录的子文件夹中。最常见配置下文档根目录的默认位置如下：\n\
    \n- **XAMPP**: `C:\\xampp\\htdocs`\n- **WampServer**: `C:\\wamp\\www`\n- **EasyPHP**:\
    \ `C:\\EasyPHP\\www`\n- **IIS**: `C:\\inetpub\\wwwroot`\n- **MAMP**: `/Applications/MAMP/htdocs`\n\
    \n要查看一个 PHP 页面，你需要使用 URL 在浏览器中加载它。在你的本地测试环境中，Web 服务器文档根目录的 URL 是 `http://localhost/`。\n\
    \n### 警告\n\n如果你需要将 MAMP 重置回默认端口，则必须使用 `http://localhost:8888` 而不是 `http://localhost`。\n\
    \n如果你将本书的示例文件存放在文档根目录下名为 `phpsols-4e` 的子文件夹中，那么 URL 将是 `http://localhost/phpsols-4e/`\
    \ 后跟文件夹名称（如果有）和文件名。\n\n### 提示\n\n如果使用 `http://localhost/` 时出现问题，请改用 `http://127.0.0.1/`。`127.0.0.1`\
    \ 是所有计算机用来指向本机的回环 IP 地址。\n"
- fmt: "### Using Virtual Hosts\n\nThe alternative to storing your PHP files in the\
    \ web server’s document root is to use a virtual host. A virtual host creates\
    \ a unique address for each site and is how hosting companies manage shared hosting.\
    \ MAMP PRO simplifies setting up virtual hosts through its control panel. EasyPHP\
    \ also has a plug-in module for administering virtual hosts.\n\nManually setting\
    \ up virtual hosts involves editing one of your computer’s system files to register\
    \ the host name on your local machine. You also need to tell the web server in\
    \ your local testing environment where the files are located. The process isn’t\
    \ difficult, but it needs to be done each time you set up a new virtual host.\n\
    \nThe advantage of setting up each site in a virtual host is that it matches more\
    \ accurately the structure of a live web site. However, when learning PHP, it’s\
    \ probably more convenient to use a subfolder of your testing server’s document\
    \ root. Once you have gained experience with PHP, you can advance to using virtual\
    \ hosts. Instructions for manually setting up virtual hosts in Apache are on my\
    \ web site at the following addresses:\n\n- **Windows**: [`http://foundationphp.com/tutorials/apache_vhosts.php`](http://foundationphp.com/tutorials/apache_vhosts.php)\n\
    - **MAMP**: [`http://foundationphp.com/tutorials/vhosts_mamp.php`](http://foundationphp.com/tutorials/vhosts_mamp.php)\n\
    \n### Tip\n\nRemember to start the web server in your testing environment to view\
    \ PHP pages.\n\n## Checking Your PHP Settings\n\nAfter installing PHP, it’s a\
    \ good idea to check its configuration settings. In addition to the core features,\
    \ PHP has a large number of optional extensions. Both the all-in-one packages\
    \ and the Microsoft Web PI install all the extensions that you need for this book.\
    \ However, some of the basic configuration settings might be slightly different.\
    \ To avoid unexpected problems, adjust your PHP configuration to match the settings\
    \ recommended in the following pages.\n\n### Displaying the Server Configuration\
    \ with phpinfo()\n\nPHP has a built-in command, `phpinfo()`, that displays details\
    \ of how PHP is configured on the server. The amount of detail produced by `phpinfo()`\
    \ can feel like massive information overload, but it’s invaluable for determining\
    \ why something works perfectly on your local computer yet not on your live web\
    \ site. The problem usually lies in the remote server having disabled a feature\
    \ or not having installed an optional extension.\n\nThe all-in-one packages make\
    \ it easy to run `phpinfo()`:\n\n- **XAMPP**: Click the `phpinfo` link in the\
    \ menu on the top of the XAMPP welcome screen.\n- **MAMP**: Click `phpinfo` in\
    \ the main menu at the top of the MAMP welcome page.\n- **WampServer**: Open the\
    \ WampServer menu and click Localhost. The link for `phpinfo()` is under Tools.\n\
    \nAlternatively, create a simple test file and load it in your browser using the\
    \ following instructions:\n\n1. Make sure that Apache or IIS is running on your\
    \ local computer.\n2. Type the following in a script editor:\n \n   ```\n   <?php\
    \ phpinfo();\n   ```\n \n   There should be nothing else in the file.\n3. Save\
    \ the file as `phpinfo.php` in the server’s document root (see “Where to Locate\
    \ Your PHP Files (Windows and Mac)” earlier in this chapter).\n4. Type `http://localhost/phpinfo.php`\
    \ in your browser address bar and press Enter.\n5. You should see a page similar\
    \ to that in Figure [2-3](#332054_4_En_2_Chapter.xhtml#Fig3) displaying the version\
    \ of PHP followed by extensive details of your PHP configuration.\n \n   ![../images/332054_4_En_2_Chapter/332054_4_En_2_Fig3_HTML.jpg](images/332054_4_En_2_Chapter/332054_4_En_2_Fig3_HTML.jpg)\n\
    \ \n   Figure 2-3. Running the `phpinfo()` command displays full details of your\
    \ PHP configuration\n6. Make a note of the value for the Loaded Configuration\
    \ File item. This tells you where to find `php.ini`, the text file that you need\
    \ to edit in order to change most settings in PHP.\n7. Scroll down to the section\
    \ labeled Core and compare the settings with those recommended in Table [2-1](#332054_4_En_2_Chapter.xhtml#Tab1).\
    \ Make a note of any differences so you can change them as described later in\
    \ this chapter.\n\n**Table 2-1. Recommended PHP configuration settings**\n\n|\
    \ Directive | Local value | Remarks |\n| --- | --- | --- |\n| `display_errors`\
    \ | On | Essential for debugging mistakes in your scripts. If set to Off, errors\
    \ result in a completely blank screen, leaving you clueless as to the possible\
    \ cause. |\n| `error_reporting` | 32767 | This sets error reporting to the highest\
    \ level. |\n| `file_uploads` | On | Allows you to use PHP to upload files to a\
    \ web site. |\n| `log_errors` | Off | With `display_errors` set on, you don’t\
    \ need to fill your hard disk with an error log. |\n\n8. The rest of the configuration\
    \ page shows you which PHP extensions are enabled. Although the page seems to\
    \ go on forever, the extensions are all listed in alphabetical order. To work\
    \ with this book, make sure the following extensions are enabled:\n\n   - **gd**:\
    \ Enables PHP to generate and modify images and fonts.\n   - **mysqli**: Connects\
    \ to MySQL/MariaDB (note the “i,” which stands for “improved.” PHP 7 doesn’t support\
    \ the older `mysql` one, which should no longer be used).\n   - **PDO**: Provides\
    \ software-neutral support for databases (optional).\n   - **pdo_mysql**: Alternative\
    \ method of connecting to MySQL/MariaDB (optional).\n   - **session**: Sessions\
    \ maintain information associated with a user and are used, among other things,\
    \ for user authentication.\n\nYou should also run `phpinfo()` on your remote server\
    \ to check which features are enabled. If the listed extensions aren’t supported,\
    \ some of the code in this book won’t work when you upload your files to your\
    \ web site. `PDO` and `pdo_mysql` aren’t always enabled on shared hosting, but\
    \ you can use `mysqli` instead. The advantage of `PDO` is that it’s software-neutral,\
    \ so you can adapt scripts to work with a database other than MySQL by changing\
    \ only one or two lines of code. Using `mysqli` ties you to MySQL/MariaDB.\n\n\
    If any of the Core settings in your setup are different from the recommendations\
    \ in Table [2-1](#332054_4_En_2_Chapter.xhtml#Tab1), you will need to edit the\
    \ PHP configuration file, `php.ini`, as described in the next section.\n\n###\
    \ Caution\n\nThe output displayed by `phpinfo()` reveals a lot of information\
    \ that could be used by a malicious hacker to attack your web site. Always delete\
    \ the file from your remote server after checking your configuration. Don’t leave\
    \ it there for future convenience. What’s convenient for you is even more convenient\
    \ for the bad guys."
