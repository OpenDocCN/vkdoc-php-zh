    Installation complete


    #### Step 3: Test XAMPP to Ensure Proper Installation


    So far, we’ve used the XAMPP wizard to install Apache, PHP, and MySQL. The next
    step is to activate Apache , so we can write some PHP.'
  trans: '

    ### 步骤 1：下载 XAMPP


    在本演示中，我们将安装 Windows 版本的 XAMPP。其他操作系统的安装过程类似。如果你不清楚如何为你的操作系统安装 XAMPP，可以在 YouTube
    上搜索相关视频。


    你的第一项任务是获取 XAMPP 软件副本。请访问 XAMPP 官网（`www.apachefriends.org`）。然后点击菜单中的“下载”。通过点击版本右侧的“下载”按钮，为你的操作系统选择最新的稳定版本。以下步骤及本书中的示例均基于
    Windows 版 8.1.1 版本制作。


    ![](img/323857_3_En_1_Fig2_HTML.jpg)


    此窗口展示了 XAMPP 提供的不同版本，并附有 Windows、Linux 和 OS X 的下载选项。


    **图 1-2** XAMPP 版本


    点击按钮后，系统可能会询问你是要打开还是保存安装文件。如图 1-3 所示，选择“保存”。


    ![](img/323857_3_En_1_Fig3_HTML.jpg)


    当我们开始将 XAMPP 版本下载到系统中时，会弹出此对话框，询问我们想要将文件保存到哪里或直接打开文件。


    **图 1-3** 保存安装文件


    点击“确定”后，安装程序将下载到你的计算机。根据你使用的浏览器不同，你需要找到已下载的文件。在 Firefox 中，你可以点击浏览器右上角的下载箭头找到该文件。找到安装文件后，点击它即可开始安装过程。


    ### 步骤 2：按照说明进行操作


    在 Windows 环境下，操作系统可能会询问你是否允许此应用程序进行更改。请回答“是”。系统可能还会弹出关于用户账户控制（UAC）的警告。你可以选择关闭计算机上的这一安全功能，或者（更好的选择是）依照警告提示，将
    XAMPP 安装到“Program Files”之外的其他位置。


    ![](img/323857_3_En_1_Fig4_HTML.jpg)


    当我们开始下载 XAMPP 时，会显示一条警告信息，该信息可能因我们使用的浏览器而异。


    **图 1-4** UAC 警告信息


    点击警告信息上的“确定”，或点击初始窗口中的“确定”后，你应该会看到类似图 1-5 的界面。


    ![](img/323857_3_En_1_Fig5_HTML.jpg)


    在针对警告信息点击“确定”按钮后，初始设置界面便会打开，在这里我们可以看到用于安装的“下一步”和“取消”选项。


    **图 1-5** 初始设置界面


    **注意：** 本书中的所有截图均取自运行 Windows 10 的计算机。如果你使用不同的操作系统，安装过程可能会略有差异。Windows 版 XAMPP
    提供额外选项，例如可以将 FileZilla（一个 FTP 服务器）作为其服务之一进行安装。这是不必要的，并且会消耗计算机资源（即使在不使用时也是如此），因此最好保持这些服务处于关闭状态。此外，Windows
    用户应选择将 XAMPP 安装到 `c:\xampp` 目录，以便更轻松地跟随本书的示例操作。


    点击“下一步”按钮进入下一个界面（见图 1-6），以便选择要安装的组件。为了简化操作，我们就使用默认选项。这样会安装一些本书中不会用到的工具。然而，这些工具在程序开发中非常有用。XAMPP
    安装程序会引导你完成整个安装过程。


    ![](img/323857_3_En_1_Fig6_HTML.jpg)


    在安装对话框中点击“下一步”后，我们可以根据自己的需求选择需要安装的组件。


    **图 1-6** 选择要安装的组件


    如下所示，保留默认位置用于创建 XAMPP 文件。如果你之前已经安装过旧版本的 XAMPP，可以更改此位置。请记住，本书中的示例均假定文件位于 `C:\xampp`。


    ![](img/323857_3_En_1_Fig7_HTML.jpg)


    此对话框显示了我们希望将此下载文件保存到系统中的位置，我们可以自由选择。


    **图 1-7** 安装文件夹


    选择你偏好的语言。


    ![](img/323857_3_En_1_Fig8_HTML.jpg)


    在选定位置并点击“下一步”后，我们可以选择希望用哪种语言与 XAMPP 控制面板交互。


    **图 1-8** 选择语言


    取消勾选“了解更多”选项，以节省时间和空间。你可以随时安装这些工具中的一个或多个。


    ![](img/323857_3_En_1_Fig9_HTML.jpg)


    选择语言后点击“下一步”，你会看到这个对话框，这里可以选择是否进一步了解 Bitnami。


    **图 1-9** 了解 Bitnami 更多信息


    在图 1-10 所示的界面中点击“下一步”。


    ![](img/323857_3_En_1_Fig10_HTML.jpg)


    此对话框给了我们最后一次机会，来决定是否要在系统中安装 XAMPP。


    **图 1-10** 准备安装


    最后，安装开始了！


    ![](img/323857_3_En_1_Fig11_HTML.jpg)


    一旦 XAMPP 开始在系统中安装，此对话框便会显示安装进度。


    **图 1-11** 安装开始


    安装完成！点击“完成”。


    ![](img/323857_3_En_1_Fig12_HTML.jpg)


    在系统完成安装过程后，此对话框提示我们需要点击“完成”，同时我们也可以在此处勾选启动控制面板。


    **图 1-12** 安装完成


    ### 步骤 3：测试 XAMPP 以确保正确安装


    到目前为止，我们已经使用 XAMPP 向导安装了 Apache、PHP 和 MySQL。下一步是激活 Apache，这样我们就可以编写一些 PHP 代码了。

    '
- fmt: '### Open the XAMPP Control Panel


    In Figure [1-12](#323857_3_En_1_Chapter.xhtml#Fig12), we left the start control
    panel button checked. This will automatically show us the control panel (Figure
    [1-13](#323857_3_En_1_Chapter.xhtml#Fig13)). Whenever you need the panel, you
    can locate it in your start menu for your operating system. If you need to access
    it after it has started, click the XAMPP icon located in your system tray (the
    menu line at the bottom of your operating system window). This icon will only
    appear after the panel has initially been started.


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig13_HTML.jpg)


    This dialer represents the control panel of XAMPP, it shows only when we select
    the start control panel now an option on the previous dialer.


    **Figure 1-13** — Control panel


    **Note:** The author has stored the files in the folder `xampp8.1.1` because other
    versions exist on the demo machine. Your message should indicate the files are
    stored in the folder `xampp`.


    Activating Apache, PHP, and MySQL on your development machine is as simple as
    clicking the Start buttons next to Apache and MySQL in the XAMPP manager. You
    might be prompted to confirm that the server is allowed to run on your computer,
    and you might be required to enter your system password. After you do this, the
    Status should indicate that Apache is running, as shown in Figure [1-14](#323857_3_En_1_Chapter.xhtml#Fig14).


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig14_HTML.jpg)


    This dialer reflects different controlling options, here we can manage the start
    and stop actions for all modules and we can see configurations also.


    **Figure 1-14** — Apache and MySQL running successfully


    **Note:** There is an FTP FileZilla (file transfer protocol) option available
    in XAMPP. FTP provides a method for moving files between networks. The examples
    in this book don’t require this option, so there is no need to activate it in
    the XAMPP control panel. Mercury and Tomcat also do not need to be activated.
    The first few chapters don’t even require a MySQL database.


    ### What If Apache Isn’t Running?


    Sometimes, XAMPP Apache Server doesn’t run, even if you try to start it. The most
    common problem is that it conflicts with some other service using the same *port*
    on your computer. Check if you have Skype or Messenger or some similar networking
    service running. Shut them completely down, and if you’re lucky, your Apache can
    run. If you are brave, you can also click the config button in the control panel
    to change the port in which Apache (or MySQL) is running.


    If it still doesn’t run, you could turn to the Internet for help. The XAMPP online
    community is extremely helpful, and most installation issues have been addressed
    in the Apache Friends forum at [`https://community.apachefriends.org/f/`](https://community.apachefriends.org/f/).
    You could also check [`http://stackoverflow.com/`](http://stackoverflow.com/).
    Remember the Internet is your friend; someone has run into the same problem. If
    you receive an error message, copy and paste it into the browser. You will discover
    suggested solutions to your problem. Don’t ever pay for a solution. There are
    free sites and blogs that will provide the answers you are seeking.


    ### Verify That Apache and PHP Are Running


    It’s a simple matter to check whether Apache is running properly on your development
    machine. Simply open a browser and go to the following address: `http://localhost`.
    If everything has gone correctly, you should see a screen similar to Figure [1-15](#323857_3_En_1_Chapter.xhtml#Fig15).


    ![](images/323857_3_En_1_Chapter/323857_3_En_1_Fig15_HTML.jpg)


    This window reflects the welcome note of XAMPP, and also it provides complete
    information about which modules we can access by using this.


    **Figure 1-15** — Apache works!


    If this screen loads, you’ve installed Apache and PHP on your development machine
    successfully! We have not checked the status of MySQL/MariaDB; we will check that
    status when we create programs using databases. The address `http://localhost`
    is an alias for the current computer you’re working on. When using XAMPP, navigating
    to `http://localhost` in a browser tells the server to open the root web directory.
    This is the `htdocs` folder contained in the XAMPP install directory. Another
    way to use your server to access the root web directory on your local machine
    is to navigate to the *IP address* (a numerical identifier assigned to any device
    connected to a computer network) that serves as the “home” address for all HTTP
    servers: `http://127.0.0.1`.'
