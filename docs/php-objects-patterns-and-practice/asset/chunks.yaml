    public function getNumberOfPages()

    {

    return $this->numPages;

    }

    public function getSummaryLine()

    {

    $base  = "{$this->title} ( $this->producerMainName, ";

    $base .= "$this->producerFirstName )";

    $base .= ": page count – {$this->numPages}";

    return $base;

    }

    }

    // listing 03.41

    class CdProduct extends ShopProduct

    {

    public $playLength;

    public function __construct(

    string $title,

    string $firstName,

    string $mainName,

    float  $price,

    int    $playLength

    ) {

    parent::__construct(

    $title,

    $firstName,

    $mainName,

    $price

    );

    $this->playLength = $playLength;

    }

    public function getPlayLength()

    {

    return $this->playLength;

    }

    public function getSummaryLine()

    {

    $base  = "{$this->title} ( {$this->producerMainName}, ";

    $base .= "{$this->producerFirstName} )";

    $base .= ": playing time - {$this->playLength}";

    return $base;

    }

    }

    ```


    Each child class invokes the constructor of its parent before setting its own
    properties. The base class now knows only about its own data. Child classes are
    generally specializations of their parents. As a rule of thumb, you should avoid
    giving parent classes any special knowledge about their children.


    Note


    Prior to PHP 5, constructors took on the name of the enclosing class. The new
    unified constructors use the name `__construct()`. Using the old syntax, a call
    to a parent constructor would tie you to that particular class: `parent::ShopProduct();.`
    The old constructor syntax was deprecated in PHP 7.0 and should not be used.


    #### Invoking an Overridden Method


    The `parent` keyword can be used with any method that overrides its counterpart
    in a parent class. When you override a method, you may not wish to obliterate
    the functionality of the parent, but rather to extend it. You can achieve this
    by calling the parent class’s method in the current object’s context. If you look
    again at the `getSummaryLine()` method implementations, you will see that they
    duplicate a lot of code. It would be better to use rather than reproduce the functionality
    already developed in the `ShopProduct` class:


    ```

    // listing 03.42

    // ShopProduct class...

    function getSummaryLine()

    {

    $base  = "{$this->title} ( {$this->producerMainName}, ";

    $base .= "{$this->producerFirstName} )";

    return $base;

    }

    // listing 03.43

    // BookProduct class...

    public function getSummaryLine()

    {

    $base  = parent::getSummaryLine();

    $base .= ": page count - $this->numPages";

    return $base;

    }

    ```


    I set up the core functionality for the `getSummaryLine()` method in the `ShopProduct`
    base class. Rather than reproduce this in the `CdProduct` and `BookProduct` subclasses,
    I simply call the parent method before proceeding to add more data to the summary
    string.


    Now that you have seen the basics of inheritance, I will reexamine property and
    method visibility in light of the full picture.


    ### Public, Private, and Protected: Managing Access to Your Classes


    So far, I have declared all properties `public`. Public access is the default
    setting for methods and for properties if you use the old `var` keyword in your
    property declaration.


    Elements in your classes can be declared `public`, `private`, or `protected`:


    *   Public properties and methods can be accessed from any context.

    *   A private method or property can only be accessed from within the enclosing
    class. Even subclasses have no access.

    *   A protected method or property can only be accessed from within either the
    enclosing class or from a subclass. No external code is granted access.


    So how is this useful to us? Visibility keywords allow you to expose only those
    aspects of a class that are required by a client. This sets a clear interface
    for your object.


    By preventing a client from accessing certain properties, access control can also
    help prevent bugs in your code. Imagine, for example, that you want to allow `ShopProduct`
    objects to support a discount. You could add a `$discount` property and a `setDiscount()`
    method:


    ```

    // listing 03.44

    // ShopProduct class

    public $discount = 0;

    //...

    public function setDiscount(int $num)

    {

    $this->discount = $num;

    }

    ```


    Armed with a mechanism for setting a discount, you can create a `getPrice()` method
    that takes account of the discount that has been applied:


    ```

    public function getPrice()

    {

    return ($this->price - $this->discount);

    }

    ```


    At this point, you have a problem. You only want to expose the adjusted price
    to the world, but a client can easily bypass the `getPrice()` method and access
    the `$price` property:


    ```

    print "The price is {$product1->price}\n";

    ```


    This will print the raw price and not the discount-adjusted price you wish to
    present. You can put a stop to this straight away by making the `$price` property
    private. This will prevent direct access, forcing clients to use the `getPrice()`
    method. Any attempt from outside the `ShopProduct` class to access the `$price`
    property will fail. As far as the wider world is concerned, this property has
    ceased to exist.


    Setting properties to `private` can be an overzealous strategy. A `private` property
    cannot be accessed by a child class. Imagine that our business rules state that
    books alone should be ineligible for discounts. You could override the `getPrice()`
    method so that it returns the `$price` property, applying no discount:


    ```

    // listing 03.45

    // BookProduct

    public function getPrice()

    {

    return $this->price;

    }

    ```


    As the private `$price` property is declared in the `ShopProduct` class and not
    `BookProduct`, the attempt to access it here will fail. The solution to this problem
    is to declare `$price protected`, thereby granting access to descendant classes.
    Remember that a protected property or method cannot be accessed from outside the
    class hierarchy in which it was declared. It can only be accessed from within
    its originating class or from within children of the originating class.


    As a general rule, err on the side of privacy. Make properties private or protected
    at first and relax your restriction only as needed. Many (if not most) methods
    in your classes will be public, but once again, if in doubt, lock it down. A method
    that provides local functionality for other methods in your class has no relevance
    to your class’s users. Make it `private` or `protected`.'
  trans: "\n#### 构造函数与继承\n\n在子类中定义构造函数时，你需负责将所有参数传递给父类。若未能如此，可能会导致生成一个部分初始化的对象。\n\n\
    要调用父类中的方法，首先需要找到一种方式来引用类本身：这需要一个“句柄”。PHP 为我们提供了 `parent` 关键字来实现这一目的。\n\n要引用类上下文中的方法（而非对象上下文），应使用\
    \ `::` 而非 `->`：\n\n```\nparent::__construct()\n```\n\n上述代码的含义是：“调用父类的 `__construct()`\
    \ 方法”。现在，我修改示例，使每个类只处理与其自身相关的数据：\n\n```\n// 代码清单 03.39\nclass ShopProduct\n{\n\
    public $title;\npublic $producerMainName;\npublic $producerFirstName;\npublic\
    \ $price;\nfunction __construct(\n$title,\n$firstName,\n$mainName,\n$price\n)\
    \ {\n$this->title             = $title;\n$this->producerFirstName = $firstName;\n\
    $this->producerMainName  = $mainName;\n$this->price             = $price;\n}\n\
    function getProducer()\n{\nreturn $this->producerFirstName . \" \"\n. $this->producerMainName;\n\
    }\nfunction getSummaryLine()\n{\n$base  = \"{$this->title} ( {$this->producerMainName},\
    \ \";\n$base .= \"{$this->producerFirstName} )\";\nreturn $base;\n}\n}\n// 代码清单\
    \ 03.40\nclass BookProduct extends ShopProduct\n{\npublic $numPages;\npublic function\
    \ __construct(\nstring $title,\nstring $firstName,\nstring $mainName,\nfloat \
    \ $price,\nint    $numPages\n) {\nparent::__construct(\n$title,\n$firstName,\n\
    $mainName,\n$price\n);\n$this->numPages = $numPages;\n}\npublic function getNumberOfPages()\n\
    {\nreturn $this->numPages;\n}\npublic function getSummaryLine()\n{\n$base  = \"\
    {$this->title} ( $this->producerMainName, \";\n$base .= \"$this->producerFirstName\
    \ )\";\n$base .= \": page count - {$this->numPages}\";\nreturn $base;\n}\n}\n\
    // 代码清单 03.41\nclass CdProduct extends ShopProduct\n{\npublic $playLength;\npublic\
    \ function __construct(\nstring $title,\nstring $firstName,\nstring $mainName,\n\
    float  $price,\nint    $playLength\n) {\nparent::__construct(\n$title,\n$firstName,\n\
    $mainName,\n$price\n);\n$this->playLength = $playLength;\n}\npublic function getPlayLength()\n\
    {\nreturn $this->playLength;\n}\npublic function getSummaryLine()\n{\n$base  =\
    \ \"{$this->title} ( {$this->producerMainName}, \";\n$base .= \"{$this->producerFirstName}\
    \ )\";\n$base .= \": playing time - {$this->playLength}\";\nreturn $base;\n}\n\
    }\n```\n\n每个子类在设置自身属性之前，都会调用其父类的构造函数。基类现在只知道自身的数据。子类通常是其父类的特化。作为一条经验法则，应避免赋予父类任何关于其子类的特殊知识。\n\
    \n**注意**  \n在 PHP 5 之前，构造函数采用所在类的名称。新的统一构造函数使用名称 `__construct()`。使用旧语法时，对父类构造函数的调用会将你绑定到特定类：`parent::ShopProduct();`。旧的构造函数语法已在\
    \ PHP 7.0 中弃用，不应再使用。\n\n#### 调用被重写的方法\n\n`parent` 关键字可用于任何覆盖了父类中对应方法的方法。当重写一个方法时，你可能不希望完全取代父类的功能，而是想对其进行扩展。你可以通过在当前对象的上下文中调用父类的方法来实现这一点。如果你再次查看\
    \ `getSummaryLine()` 方法的实现，会发现它们重复了大量代码。更好的做法是利用（而非重新实现）`ShopProduct` 类中已有的功能：\n\
    \n```\n// 代码清单 03.42\n// ShopProduct 类...\nfunction getSummaryLine()\n{\n$base\
    \  = \"{$this->title} ( {$this->producerMainName}, \";\n$base .= \"{$this->producerFirstName}\
    \ )\";\nreturn $base;\n}\n// 代码清单 03.43\n// BookProduct 类...\npublic function\
    \ getSummaryLine()\n{\n$base  = parent::getSummaryLine();\n$base .= \": page count\
    \ - $this->numPages\";\nreturn $base;\n}\n```\n\n我在 `ShopProduct` 基类中设置了 `getSummaryLine()`\
    \ 方法的核心功能。与其在 `CdProduct` 和 `BookProduct` 子类中重复此代码，我只需在向摘要字符串添加更多数据之前，调用父类的方法即可。\n\
    \n现在你已经了解了继承的基础知识，我将结合整个图景，重新审视属性和方法的可见性。\n\n### 公有、私有与受保护：管理类的访问权限\n\n到目前为止，我已将所有属性声明为\
    \ `public`。如果你在属性声明中使用旧的 `var` 关键字，那么 `public` 访问权限是方法和属性的默认设置。\n\n类中的元素可以声明为\
    \ `public`、`private` 或 `protected`：\n\n- 公有属性和方法可以从任何上下文中访问。\n- 私有方法或属性只能在其所属类内部访问。即使是子类也无权访问。\n\
    - 受保护的方法或属性只能在其所属类或其子类内部访问。外部代码一律无权访问。\n\n那么这对我们有何用处？可见性关键字允许你只公开客户端所需的那些类方面。这为你的对象设定了一个清晰的接口。\n\
    \n通过阻止客户端访问某些属性，访问控制还有助于防止代码中的错误。例如，假设你想允许 `ShopProduct` 对象支持折扣。你可以添加一个 `$discount`\
    \ 属性和一个 `setDiscount()` 方法：\n\n```\n// 代码清单 03.44\n// ShopProduct 类\npublic $discount\
    \ = 0;\n//...\npublic function setDiscount(int $num)\n{\n$this->discount = $num;\n\
    }\n```\n\n有了设置折扣的机制，你可以创建一个考虑已应用折扣的 `getPrice()` 方法：\n\n```\npublic function getPrice()\n\
    {\nreturn ($this->price - $this->discount);\n}\n```\n\n此时，你遇到了一个问题。你只想向外部暴露调整后的价格，但客户端可以轻易绕过\
    \ `getPrice()` 方法，直接访问 `$price` 属性：\n\n```\nprint \"The price is {$product1->price}\\\
    n\";\n```\n\n这将打印原始价格，而非你希望呈现的折后价。你可以通过将 `$price` 属性设为 private 来立即阻止这种情况。这将阻止直接访问，强制客户端使用\
    \ `getPrice()` 方法。任何从 `ShopProduct` 类外部访问 `$price` 属性的尝试都会失败。对于外部世界而言，此属性已不复存在。\n\
    \n将属性设置为 `private` 可能是一种过激的策略。`private` 属性无法被子类访问。假设我们的业务规则规定只有书籍不应享受折扣。你可以重写\
    \ `getPrice()` 方法，使其返回 `$price` 属性而不应用任何折扣：\n\n```\n// 代码清单 03.45\n// BookProduct\n\
    public function getPrice()\n{\nreturn $this->price;\n}\n```\n\n由于私有属性 `$price`\
    \ 是在 `ShopProduct` 类中声明的，而非 `BookProduct`，因此在此处访问它的尝试会失败。解决此问题的方法是将 `$price` 声明为\
    \ protected，从而授予子类访问权限。请记住，受保护的属性或方法不能在其声明的类层次结构之外被访问。它只能从其原始类或其子类内部访问。\n\n作为一般规则，应倾向于私有化。起初将属性设为\
    \ private 或 protected，然后仅在必要时放宽限制。类中的许多（若非大多数）方法都应是 public 的，但同样，如有疑问，就将其锁定。为类中其他方法提供局部功能的方法与类的用户无关。请将其设为\
    \ `private` 或 `protected`。\n"
- fmt: '### Accessor Methods


    Even when client programmers need to work with values held by your class, it is
    often a good idea to deny direct access to properties, providing methods instead
    that relay the needed values. Such methods are known as accessors or getters and
    setters.


    You have already seen one benefit afforded by accessor methods. You can use an
    accessor to filter a property value according to circumstances, as was illustrated
    by the `getPrice()` method.


    You can also use a setter method to enforce a property type. Type declarations
    can be used to constrain method arguments, but a property can contain data of
    any type. Remember the `ShopProductWriter` class that uses a `ShopProduct` object
    to output list data? I can develop this further, so that it writes any number
    of `ShopProduct` objects at one time:


    ```

    // listing 03.46

    class ShopProductWriter

    {

    public $products = [];

    public function addProduct(ShopProduct $shopProduct)

    {

    $this->products[] = $shopProduct;

    }

    public function write()

    {

    $str =  "";

    foreach ($this->products as $shopProduct) {

    $str .= "{$shopProduct->title}: ";

    $str .= $shopProduct->getProducer();

    $str .= " ({$shopProduct->getPrice()})\n";

    }

    print $str;

    }

    }

    ```


    The `ShopProductWriter` class is now much more useful. It can hold many `ShopProduct`
    objects and write data for them all in one go. I must trust my client coders to
    respect the intentions of the class, though. Despite the fact that I have provided
    an `addProduct()` method, I have not prevented programmers from manipulating the
    `$products` property directly. Not only could someone add the wrong kind of object
    to the `$products` array property, but he could even overwrite the entire array
    and replace it with a primitive value. I can prevent this by making the `$products`
    property private:


    ```

    class ShopProductWriter {

    private $products = [];

    //...

    ```


    It’s now impossible for external code to damage the `$products` property. All
    access must be via the `addProduct()` method, and the class type declaration I
    use in the method declaration ensures that only `ShopProduct` objects can be added
    to the array property.


    ### The ShopProduct Classes


    Let’s close this chapter by amending the `ShopProduct` class and its children
    to lock down access control:


    ```

    // listing 03.48

    class ShopProduct

    {

    private   $title;

    private   $producerMainName;

    private   $producerFirstName;

    protected $price;

    private   $discount = 0;

    public function __construct(

    string $title,

    string $firstName,

    string $mainName,

    float  $price

    ) {

    $this->title             = $title;

    $this->producerFirstName = $firstName;

    $this->producerMainName  = $mainName;

    $this->price             = $price;

    }

    public function getProducerFirstName()

    {

    return $this->producerFirstName;

    }

    public function getProducerMainName()

    {

    return $this->producerMainName;

    }

    public function setDiscount($num)

    {

    $this->discount = $num;

    }

    public function getDiscount()

    {

    return $this->discount;

    }

    public function getTitle()

    {

    return $this->title;

    }

    public function getPrice()

    {

    return ($this->price - $this->discount);

    }

    public function getProducer()

    {

    return $this->producerFirstName . ” ”

    . $this->producerMainName;

    }

    public function getSummaryLine()

    {

    $base  = "{$this->title} ( {$this->producerMainName}, ";

    $base .= "{$this->producerFirstName} )";

    return $base;

    }

    }

    // listing 03.49

    class CdProduct extends ShopProduct

    {

    private $playLength;

    public function __construct(

    string $title,

    string $firstName,

    string $mainName,

    float  $price,

    int    $playLength

    ) {

    parent::__construct(

    $title,

    $firstName,

    $mainName,

    $price

    );

    $this->playLength = $playLength;

    }

    public function getPlayLength()

    {

    return $this->playLength;

    }

    public function getSummaryLine()

    {

    $base  = "{$this->title} ( {$this->producerMainName}, ";

    $base .= "{$this->producerFirstName} )";

    $base .= ": playing time - {$this->playLength}";

    return $base;

    }

    }

    // listing 03.50

    class BookProduct extends ShopProduct

    {

    private $numPages;

    public function __construct(

    string $title,

    string $firstName,

    string $mainName,

    float  $price,

    int    $numPages

    ) {

    parent::__construct(

    $title,

    $firstName,

    $mainName,

    $price

    );

    $this->numPages = $numPages;

    }

    public function getNumberOfPages()

    {

    return $this->numPages;

    }

    public function getSummaryLine()

    {

    $base  = parent::getSummaryLine();

    $base .= ": page count - $this->numPages";

    return $base;

    }

    public function getPrice()

    {

    return $this->price;

    }

    }

    ```


    There is nothing substantially new in this version of the `ShopProduct` family.
    All properties are either `private` or `protected`, and I added a number of accessor
    methods to round things off.


    ## Summary


    This chapter covered a lot of ground, taking a class from an empty implementation
    through to a fully featured inheritance hierarchy. You took in some design issues,
    particularly with regard to type and inheritance. You saw PHP’s support for visibility
    and explored some of its uses. In the next chapter, I will show you more of PHP’s
    object-oriented features.


    # 4. Advanced Features


    You have already seen how class type hinting and access control give you more
    control over a class’s interface. In this chapter, I will delve deeper into PHP’s
    object-oriented features.


    This chapter will cover several subjects:


    - Static methods and properties: Accessing data and functionality through classes
    rather than objects

    - Abstract classes and interfaces: Separating design from implementation

    - Traits: Sharing implementation between class hierarchies

    - Error handling: Introducing exceptions

    - Final classes and methods: Limiting inheritance

    - Interceptor methods: Automating delegation

    - Destructor methods: Cleaning up after your objects

    - Cloning objects: Making object copies

    - Resolving objects to strings: Creating a summary method

    - Callbacks: Adding functionality to components with anonymous functions and classes'
