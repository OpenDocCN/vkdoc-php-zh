  trans: "`catalog_get_products_on_catalog`函数返回要在商品目录首页上显示的商品。这些商品的`display`字段值为`1`（商品在首页推广）或`3`（商品在首页和部门页面推广）。商品描述会在指定字符数处截断。分页功能的实现方式与之前两个返回商品列表的函数相同。\n\
    \n```sql\n-- Create catalog_get_products_on_catalog function\n\nCREATE FUNCTION\
    \ catalog_get_products_on_catalog(INTEGER, INTEGER, INTEGER) RETURNS SETOF product_list\
    \ LANGUAGE plpgsql AS $$\n\nDECLARE\n\ninShortProductDescriptionLength ALIAS FOR\
    \ $1;\n\ninProductsPerPage ALIAS FOR $2;\n\ninStartItem ALIAS FOR $3;\n\noutProductListRow\
    \ product_list;\n\nBEGIN\n\nFOR outProductListRow IN\n\nSELECT product_id, name,\
