    \n        case 2:\n            print $_SESSION['pre_response'];\n            break;\n\
    \n        case 3:\n            print $_SESSION['fulfill_response'];\n        \
    \    break;\n    }\n\n    exit;\n}\n```\n\n## Integrating DataCash with HatShop"
