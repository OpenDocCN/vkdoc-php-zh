    # 计算几何图形面积的抽象类与方法


    面积是通过方法计算的，因为几何图形的这一特性由其特征尺寸决定，并且必须根据图形特征尺寸的变化而改变。最好使用一个在被调用时能引用存储图形特征尺寸字段的方法。注意，边长为
    `R` 的正方形面积等于 `R²`。半径为 `R` 的圆面积等于 `πR²`。边长为 `R` 的等边三角形面积由表达式 `√(3)R² / 4` 定义。


    因此，在这三种情况下，对象都具有相似的结构。唯一的区别在于计算面积方法的实现方式。但它们是不同的对象，必须基于不同的类来创建。那么，你可能会问：如何让不同的类具有相同的结构（即相同的字段和方法集，但方法的实现不同）？答案如下：你可以描述一个抽象类，然后通过继承基于它创建不同的类。这些类具有由抽象类定义的相同结构。


    一个圆形图标，中心有一个字母 `i`。


    ## 抽象类优于普通类的原因


    原则上，要实现你的策略，你可以使用一个普通类来替代抽象类，并重写继承的方法。但这不是一个好选择，因为如果某个方法意外未被重写，虽然不会出现形式上的错误，但代码无法正确执行。这种情况很难追踪。从这个意义上说，抽象类更可靠。


    ## 示例代码：抽象类的实现


    我们来看看清单 9-1。


    ```

    R=$R;

    $this->name=$name;

    }

    // 显式描述的方法：

    function getName(){

    return $this->name;

    }

    // 抽象方法：

    abstract function getArea();

    }

    // 实现正方形的类：

    class Square extends Figure{

    // 方法的描述：

    function getArea(){

    $r=$this->R;

    return $r*$r;

    }

    }

    // 实现圆形的类：

    class Circle extends Figure{

    // 方法的描述：

    function getArea(){

    $r=$this->R;

    $k=3.141592;

    return $k*$r*$r;

    }

    }

    // 实现三角形的类：

    class Triangle extends Figure{

    // 方法的描述：

    function getArea(){

    $r=$this->R;

    $k=sqrt(3)/4;

    return $k*$r*$r;

    }

    }

    // 显示对象信息的函数：

    function show($F){

    echo $F->getName(),": ",$F->getArea(),"\n";

    }

    // 创建对象：

    $S=new Square(2.5,"Square");

    $C=new Circle(3,"Circle");

    $T=new Triangle(4,"Triangle");

    // 检查结果：

    show($S);

    show($C);

    show($T);

    ?>

    清单 9-1

    ```


    ## 程序输出


    以下是程序的输出：


    ```

    The output of the program (from Listing 9-1)

    Square: 6.25

    Circle: 28.274328

    Triangle: 6.9282032302755

    ```


    ## 抽象类的结构与继承


    在这种情况下，你描述了抽象的 `Figure` 类，然后基于它创建了 `Square`、`Circle` 和 `Triangle` 类。


    `Figure` 类有两个受保护的字段：`$name`（用于存储图形名称）和 `$R`（用于存储几何图形的特征尺寸）。


    | 详细信息 |

    |---------|

    | 一方面，你希望这些字段在类代码外部不可访问，但另一方面，你又需要这些字段可以被继承。这就是为什么你将字段设置为受保护的原因。 |


    `Figure` 类有一个带有两个参数的构造函数，用于定义字段 `$R` 和 `$name` 的值。由于 `$name` 字段是受保护的，为了读取其值，你描述了
    `getName()` 方法，该方法返回该字段的值。你还在 `Figure` 类中声明了抽象的 `getArea()` 方法。假设该方法应计算图形的面积。面积具体如何计算则在子类中定义。


    一个圆形图标，中心有一个字母 `i`。


    ## 抽象方法与继承特性


    抽象类包含一个抽象方法和一个显式描述的方法。子类定义了抽象方法并继承了显式描述的方法。构造函数和受保护的字段也被继承。


    `Square`、`Circle` 和 `Triangle` 类仅在实现 `getArea()` 方法的方式上有所不同；除此之外，它们没有其他内容。你基于每个类创建对象，然后使用
    `show()` 函数显示这些对象的信息（名称和面积）。这里重要的是，在 `show()` 函数的描述中，你引用了作为参数传递给该函数的对象的 `getName()`
    和 `getArea()` 方法。该函数被调用了三次，每次都以一个不同类的对象作为参数。但由于所有这些类都是抽象类 `Figure` 的子类，每个对象都拥有
    `getName()` 和 `getArea()` 方法。


    # 接口


    因此，抽象类可以用作创建其他类的模板。它们具有相似的结构，这在实践中非常方便。然而，这里有一个问题。关键在于，一个子类只能有一个父类。如果你需要同时将多个“模板”组合到一个子类中，抽象类在这种情况下就帮助不大了。幸运的是，有另一种机制可以解决这个问题。它基于使用*接口*。


    接口与抽象类非常相似。唯一根本的区别在于，抽象类可以包含非抽象方法，而接口则不能。此外，接口没有字段（但可以包含常量——它们的描述中使用了 `const`
    关键字）。接口可以被视为一个“非常抽象”的类。从这个意义上说，接口的功能比抽象类更有限。然而，接口的优势在于，一个类可以同时实现多个接口。


    要在实践中使用接口，你首先需要弄清楚如何创建接口，其次是如何在类中实现它。创建接口很容易。它以 `interface` 关键字开头，然后在花括号中描述接口的内容。这是对接口中包含的方法的声明（没有描述）。在这里，你可以使用访问级别说明符
    `public` 和 `protected`。你也可以声明常量。


    如果一个类实现了一个接口，那么该接口中的所有方法都必须在类中进行描述。类实现了某个接口这一事实在类描述中说明：在类名之后，使用关键字 `implements`
    给出该类实现的接口名称。如果该类实现了多个接口，则它们以逗号分隔，列在 `implements` 关键字之后。在实践中，所有这些看起来是怎样的，如清单 9-2
    所示。


    ```

    set($val);

    }

    function set($val){

    $this->num=$val;

    }

    function show(){

    echo "\$num = ",$this->num,"\n";

    }

    }

    // 创建类的对象：

    $obj=new MyClass(100);

    // 检查结果：

    $obj->show();

    $obj->set(200);

    $obj->show();

    ?>

    清单 9-2

    ```


    以下是程序执行的结果：


    ```

    The output of the program (from Listing 9-2)

    $num = 100

    $num = 200

    ```

    '
- fmt: "该程序描述了两个接口：`Alpha`和`Bravo`，以及实现这两个接口的`MyClass`类。`Alpha`接口包含`show()`方法（无参数），`Bravo`接口包含带一个参数的`set()`方法。因此，这些方法都在`MyClass`类中进行了描述。此外，该类还包含私有字段`$num`和一个带参数的构造函数。调用构造函数时，会调用`set()`方法，该方法将值赋给`$num`字段。`show()`方法被定义为在调用时显示`$num`的值。基于`MyClass`类，通过`$obj=new\
    \ MyClass(100)`命令创建`$obj`对象，其`$num`字段的值为`100`。`$obj->show()`命令用于检查字段的值。`$obj->set(200)`命令为字段赋予新值。\n\
    \n## 接口继承\n\n一个接口可以继承另一个接口。其机制与类继承相同：在接口描述后跟`extends`关键字，然后是被继承接口的名称。这样，被继承接口中的所有声明都会“传递”给正在创建的接口。下面的清单[9-3](#613529_1_En_9_Chapter.xhtml#PC5)展示了一个简单示例。\n\
    \n```\n    num=$val;\n    }\n    function show(){\n        echo \"\\$num = \"\
    ,$this->num,\"\\n\";\n    }\n}\n// Creates an object:\n$obj=new MyClass;\n// Checks\
    \ the result:\n$obj->set(123);\n$obj->show();\n?>\n```\n\n**清单 9-3** 接口继承\n\n\
    以下是程序执行的结果。\n\n```\nThe output of the program (from Listing 9-3)\n$num = 123\n\
    ```\n\n这个例子与前一个类似，但存在一个本质区别。如前所述，声明了带有`show()`方法的`Alpha`接口。`Bravo`接口声明了`set()`方法。但除此之外，`Bravo`接口还继承了`Alpha`接口。因此，`Bravo`接口隐式获得了`show()`方法和`set()`方法。相应地，实现`Bravo`接口的`MyClass`类必须包含（并且确实包含）`set()`和`show()`方法的描述。\n\
    \n> **注意**\n> 一个接口继承另一个接口，然后由类来实现这种方案并不好。我们通过例子来解释这一点。特别是，`Bravo`接口只明确声明了`set()`方法。你必须追溯接口继承链才能理解在实现该接口时必须定义`show()`方法。这不太理想。第一种方案，即类实现两个不同的接口，要方便得多，因为你可以立即识别出需要在类中实现的内容。\n\
    \n## 类继承与接口实现\n\n一个类可以继承另一个类并同时实现一个或多个接口。在这种情况下，在类描述中，类名之后依次放置`extends`关键字、被继承的类名、`implements`关键字以及要实现的接口名称。清单[9-4](#613529_1_En_9_Chapter.xhtml#PC7)展示了这样一个示例。\n\
    \n```\n    number=$number;\n    }\n    function show(){\n        echo \"\\$number\
    \ = \",$this->number,\"\\n\";\n    }\n}\n// Creates an object:\n$obj=new MyClass;\n\
    // Checks the result:\n$obj->set(123);\n$obj->show();\n?>\n```\n\n**清单 9-4** 类继承与接口实现\n\
    \n以下是程序执行的结果。\n\n```\nThe output of the program (from Listing 9-4)\n$number =\
    \ 123\n```\n\n该程序描述了带有`$number`字段的`Base`类。此外，还声明了带有`show()`方法的`Alpha`接口和带有`set()`方法的`Bravo`接口。`MyClass`类继承了`Base`类并实现了`Alpha`和`Bravo`接口。`$number`字段从`Base`类继承到`MyClass`类中，以便在`set()`和`show()`方法的描述中可以引用它。`$obj`对象是基于`MyClass`类创建的，因此它拥有`$number`字段以及`show()`和`set()`方法。\n\
    \n## 特征（Traits）\n类的继承和接口的实现都解决了一个战略性问题：代码复用。还有另一种语法结构专门用于解决这个问题，那就是**特征**。\n\n\
    特征是一段可用于“构建”类的代码块。特征本身并不独立发挥作用，但你可以通过组合它们来得到一个类。特征的描述方式如下：使用`trait`关键字，然后在花括号内放置特征代码块。这是当你包含该特征时，会被添加到类中的代码块。要在类中包含特征，需要在类体中使用`use`指令，然后列出要包含的特征，用逗号分隔。清单[9-5](#613529_1_En_9_Chapter.xhtml#PC9)展示了其实际用法。\n\
    \n```\n    number,\"\\n\";\n        echo \"\\$symbol = \",$this->symbol,\"\\n\"\
    ;\n    }\n}\n// The second trait:\ntrait Second{\n    function set($number,$symbol){\n\
    \        $this->number=$number;\n        $this->symbol=$symbol;\n    }\n}\n//\
    \ Including the traits in the class:\nclass MyClass{\n    use First,Second;\n\
    \    private $symbol;\n    function __construct($number,$symbol){\n        $this->set($number,$symbol);\n\
    \        $this->show();\n    }\n}\n// Creates an object of the class:\n$obj=new\
    \ MyClass(100,'A');\n?>\n```\n\n**清单 9-5** 初识特征\n\n以下是程序的输出。\n\n```\nThe output\
    \ of the program (from Listing 9-5)\n$number = 100\n$symbol = A\n```\n\n程序的核心是创建`MyClass`类（然后基于该类创建`$obj`对象）。但这个类是“分部分”“组装”起来的。具体来说，描述了两个特征（`First`和`Second`）。`First`特征包含了私有字段`$number`的声明以及`show()`方法。调用该方法时，会显示`$number`和`$symbol`字段的值（`$symbol`字段未在特征中声明）。`Second`特征描述了带有两个参数的`set()`方法。调用时，该方法会将值赋给`$number`和`$symbol`字段（这些字段未在特征中声明）。`MyClass`类的描述以`use\
    \ First,Second`指令开始，该指令将`First`和`Second`特征的内容添加到类中。\n\n> **注意**\n> 情况就像是`First`和`Second`特征的内容被直接写入了`MyClass`类体中一样。\n\
    \n除了特征之外，在类中还声明了私有字段`$symbol`。同时，在类中还描述了一个带两个参数的构造函数。在构造函数中调用了`set()`和`show()`方法，以便为`$number`和`$symbol`字段赋值，然后显示这些字段的值。因此，创建`MyClass`类对象的命令`$obj=new\
    \ MyClass(100,'A')`会自动显示一条消息。\n\n## 对象类型控制"
  raw: 'The program describes two interfaces, `Alpha` and `Bravo`, and the `MyClass`
    class that

    implements both. The `Alpha` interface has

    the `show()`

    method (without arguments), and the `Bravo` interface has

    the `set()`

    method with one argument. Therefore, these methods are described in the

    `MyClass` class.

    In addition, the class has the private field `$num` and the

    constructor with one argument. When the constructor is called, it calls

    the `set()` method, which assigns a value

    to the `$num`

    field. The `show()` method is

    described so that the value of `$num` is displayed

    when it is called.

    Based on the `MyClass` class, the

    `$obj=new MyClass(100)` command creates the `$obj` object with the

    value `100` of

    the field `$num`.

    The `$obj->show()`

    command checks the field’s value. The `$obj->set(200)`

    command assigns a new value to the field.


    Interface Inheritance


    One interface can inherit another interface. Everything happens the same

    way as with class inheritance: the interface description is

    followed by the `extends` keyword, and

    then the name of the inherited interface follows. As a result, all the

    declarations from the inherited interface are “passed” to the interface

    being created. A small illustration is shown in Listing [9-3](#613529_1_En_9_Chapter.xhtml#PC5).


    ```

    num=$val;

    }

    function show(){

    echo "\$num = ",$this->num,"\n";

    }

    }

    // Creates an object:

    $obj=new MyClass;

    // Checks the result:

    $obj->set(123);

    $obj->show();

    ?>

    Listing 9-3

    Interface Inheritance

    ```


    The following is the result of the program execution.


    ```

    The output of the program (from Listing 9-3)

    $num = 123

    ```


    The example is similar to the previous one, but there is a strategic

    difference. As before, you declare the `Alpha` interface with

    the `show()`

    method. The `Bravo` interface

    declares the `set()` method. But

    apart from that, the `Bravo` interface

    inherits the `Alpha` interface.

    Therefore, the `Bravo` interface

    implicitly gets the `show()` method and the

    `set()` method.

    Accordingly, the `MyClass` class that

    implements the `Bravo` interface

    should contain (and does contain) descriptions of the `set()` and `show()` methods.


    A circular icon

    reads a letter i at the center.Note


    A scheme where one interface inherits another interface and then is

    implemented in a class is not good. Let’s explain that using the

    example. In particular, the `Bravo` interface only

    explicitly declares the `set()` method. You

    must trace the interface inheritance chain to understand that you must

    define the `show()` method when implementing

    the interface. That is not very good. The first option, when the class

    implements two different interfaces, is much more convenient since you

    can immediately identify the contents you need to implement in the

    class.


    Class Inheritance and Interface Implementation


    A class can inherit another class and implement an interface or interfaces.

    In such a case, in the class description after the class name, you put

    the `extends`

    keyword, the name of the inherited class, the `implements` keyword,

    and the names of the interfaces to be implemented. An example of that is

    shown in Listing [9-4](#613529_1_En_9_Chapter.xhtml#PC7).


    ```

    number=$number;

    }

    function show(){

    echo "\$number = ",$this->number,"\n";

    }

    }

    // Creates an object:

    $obj=new MyClass;

    // Checks the result:

    $obj->set(123);

    $obj->show();

    ?>

    Listing 9-4

    Class Inheritance and Interface Implementation

    ```


    The following shows the result of the program execution.


    ```

    The output of the program (from Listing 9-4)

    $number = 123

    ```


    The program describes the `Base` class with the

    `$number` field.

    In addition, you describe the `Alpha` interface with

    the `show()`

    method declared and the `Bravo` interface with

    the `set()`

    method declared. The `MyClass` class

    inherits the `Base` class and

    implements the `Alpha` and `Bravo` interfaces. The

    `$number` field

    is inherited from the `Base` class in the

    `MyClass` class

    so that you can refer to it in the description of the `set()` and `show()` methods.
    The

    `$obj` object is created based

    on the `MyClass`

    class, so it has the `$number` field and the

    `show()` and

    `set()`

    methods.


    Traits

    Both class inheritance and interface implementations solve one

    strategic problem: code reuse. There is another syntax construction

    designed to solve that problem. You mean *traits*.


    A trait is a block of code that can be used when “constructing” a class.

    Traits do not play an independent role, but you can get a class by

    putting them together. A trait is described as

    follows. You use the `trait` keyword, after

    which a trait block is placed in curly braces. That is the block of code

    added to the class if you include the trait. To include traits in a

    class, you put the `use` instruction in

    the class body, then list the traits to be included in the class,

    separated by commas. Listing [9-5](#613529_1_En_9_Chapter.xhtml#PC9) shows how
    that

    looks in practice.


    ```

    number,"\n";

    echo "\$symbol = ",$this->symbol,"\n";

    }

    }

    // The second trait:

    trait Second{

    function set($number,$symbol){

    $this->number=$number;

    $this->symbol=$symbol;

    }

    }

    // Including the traits in the class:

    class MyClass{

    use First,Second;

    private $symbol;

    function __construct($number,$symbol){

    $this->set($number,$symbol);

    $this->show();

    }

    }

    // Creates an object of the class:

    $obj=new MyClass(100,''A'');

    ?>

    Listing 9-5

    Getting Familiar with Traits

