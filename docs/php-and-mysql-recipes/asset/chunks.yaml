    ## CHAPTER 6 ■ STRINGS


    ```php

    <?php

    // 6_1.php


    $t1 = "7:00 am";

    $t2 = "11:00 am";


    echo str_pad($t1, 8, ''0'', STR_PAD_LEFT) . "\n";

    echo str_pad($t2, 8, ''0'', STR_PAD_LEFT) . "\n";

    ```


    The two time values will be the same lengths:


    ```

    07:00 am

    11:00 am

    ```


    If the strings were used as a response to a web request it could be simpler to
    set the CSS property for `text-align` to right in order to justify the strings
    to the right.


    In the next example we create a string based on a pattern `''abc''` repeated 15
    times.


    ```php

    <?php

    // 6_2.php


    $s = str_repeat(''abc'', 15);

    echo $s . "\n";

    ```


    This example generates the following output:


    ```

    abcabcabcabcabcabcabcabcabcabcabcabcabcabcabc

    ```


    A more practical example would be to create strings of a given length with a single
    character as shown in Recipe 6-2.


    ## Recipe 6-2. Working with the Characters in a String


    ### Problem


    A string is, in essence, a long list of single characters. In many ways it looks
    like an array of characters, so is it possible to access or change characters
    at a given position of the string?


    ### Solution


    Using the square brackets after the variable name it''s possible to access each
    character as if it''s an element in an array. The characters start at index 0
    and ends at index length -1. Getting the third character from a string `$a="abcdef"`;
    can be done by referencing `$a[2]`.


    ### How it Works


    In the next example a string `$s` is declared with a static value and we use the
    array syntax to replace a single character based on the knowledge of where the
    character 7 is in the string.


    ```php

    <?php

    // 6_3.php


    $s = "The sun is up @ 7am";

    $s[16] = ''6'';

    echo $s . "\n";

    ```


    This example shows how to replace a single character in an existing string. If
    you want to add characters or strings you can use the concatenate operator (`.`
    period) to build longer strings.


    ```php

    <?php

    // 6_4.php


    $s = "The sun is up @ 7am";

    $s .= " and it sets again at 7pm";

    echo $s . "\n";

    ```


    Concatenation can either be done as `$a = $b . $c;` where a new variable is created
    to store the result or by using `$a .= $b;`. This is equivalent to `$a = $a .
    $b;` but it is slightly shorter.


    ## Recipe 6-3. Replacing Characters


    ### Problem


    Knowing the exact position of one character is not always possible and replacing
    a single character with a different character is also limiting. Having the ability
    to replace a number of characters with zero or more characters gives more flexibility.


    ### Solution


    The function `str_replace()` is the simple way to replace all instances of a string
    with another string. The function takes three parameters. The first one is the
    string to replace, the second is the string to replace it with, and the third
    is the string to perform the replacement on.


    The first two parameters can be arrays of strings. In that case the replace function
    will be performed for each string in the arrays. If the first argument is an array
    and the second is a string, the function will replace all elements defined in
    the first array with the string passed as the second parameter.


    If the first array contains more values than the second array, any value in the
    first array without a matching value in the second will be replaced with the empty
    string.


    If the first value is a string and the second is an array the string will be replaced
    with the word `''Array''`.


    There is a variant of `str_replace()` called `str_ireplace()`. This function is
    case insensitive on the search part of the function.


    ### How it Works


    Consider the HTML fragment `''<h1>Document Title</h1>''` stored in a string. If
    we decided to change the tag from `<h1>` to `<h2>` we could use the `str_replace()`
    function.


    ```php

    <?php

    // 6_5.php


    $s = "''<h1>Document Title</h1>";

    echo str_replace("h1", "h2", $s) . "\n";

    ```


    This only works if we know for sure that the string `h1` only exists as a tag.
    If it was used as part of the string it would also be replaced there, but only
    if the case was exactly the same. To improve a little on this we could include
    the ending `>` and use the case-insensitive version of the function.


    ```php

    <?php

    // 6_6.php

    ```'
