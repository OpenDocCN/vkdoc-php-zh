  trans: "好的，这是根据您的要求翻译的中文版本。\n\n\n# 添加网站页眉\n\n为了显示网站页眉，您需要修改清单 3-2 中显示的 `menu.php`\
    \ 脚本，使其变成清单 3-5 中显示的 `topmenu.php` 脚本。只有加粗的代码是新增的；其余代码与您在清单 3-2 中看到的相同。\n\n**清单\
    \ 3-5.** 用于显示电子商务网站页眉（包括下拉菜单）的 `topmenu.php` 脚本\n\n```html\n<!DOCTYPE html>\n\
    <head>\n<meta charset=\"utf-8\">\n<title>Bintu Online Bazar</title>\n<link rel=\"\
    stylesheet\" href=\"css/style.css\">\n</head>\n<body>\n<table  width=\"100%\"\
    \ cellspacing=\"0\" cellpadding=\"2\">\n<col style=\"width:30%\">\n<col style=\"\
    width:40%\">\n<col style=\"width:20%\">\n<tr><td style=\"background-color:cyan;color:Blue;\"\
    ></td><td style=\"background-color:cyan;color:Blue;\"></td><td style=\"background-color:cyan;color:Blue;\"\
    >\n<tr><td style=\"font-size: 35px;color:blue;background-color:cyan;\"> <!-- #1\
    \ -->\n<b>Bintu Online Bazar</b></font></td>\n<td bgcolor=\"cyan\">\n<form  method=\"\
    post\" action=\"searchitems.php\"> <!-- #2 -->\n<input  size=\"50\" type=\"text\"\
    \ name=\"tosearch\">\n<input  type=\"submit\" name=\"submit\" value=\"Search\"\
    >\n</form></td>\n<td bgcolor=\"cyan\" ><a href=\"cart.php\"><img style=\"max-width:40px;max-height:40px;width:auto;height:auto;\"\
    \ src=\"images/cart.png\"></img><span id=\"cartcountinfo\"></span></a> <!-- #3\
    \ -->\n</td></tr>\n</table>\n<div class=\"container\">\n<nav>\n<ul class=\"nav\"\
    >\n<li><a href=\"index.php\">Home</a></li>\n<li class=\"dropdown\">\n<a href=\"\
    index.php\">Electronics</a>\n<ul>\n<li><a href=\"itemlist.php?category=CellPhone\"\
    >Smart Phones</a></li>\n<li><a href=\"itemlist.php?category=Laptop\">Laptops</a></li>\n\
    <li><a href=\"index.php\">Cameras </a></li>\n<li><a href=\"index.php\">Televisions</a></li>\n\
    </ul>\n</li>\n<li class=\"dropdown\">\n<a href=\"index.php\">Home & Furniture</a>\n\
    <ul class=\"large\">\n<li><a href=\"index.php\">Kitchen Essentials</a></li>\n\
    <li><a href=\"index.php\">Bath Essentials</a></li>\n<li><a href=\"index.php\"\
    >Furniture</a></li>\n<li><a href=\"index.php\">Dining & Serving</a></li>\n<li><a\
    \ href=\"index.php\">Cookware</a></li>\n</ul>\n</li>\n<li><a href=\"index.php\"\
    >Books</a></li>\n</ul>\n</nav>\n</div>\n<p>\n```\n\n为了显示页眉，定义了一个包含三列的 `table`\
    \ 元素。为了显示网站标题、搜索框和购物车图标，各列的宽度按比例定义为 30%、40% 和 20%。表格的背景色设置为青色，前景色设置为蓝色。为了显示网站标题“Bintu\
    \ Online Bazar”，通过语句 #1 将字体大小设置为 35px。当用户点击“搜索”按钮时，语句 #2 将用户导航到 `searchitems.php`\
    \ 脚本。用户在搜索框中输入的文本也通过 `$_POST` 数组传递给 `searchitems.php` 脚本。\n\n在搜索框之后，通过语句 #3 显示了一个购物车图标。该图标的宽度和高度设置为\
    \ 30px。点击购物车图标，将导航到 `cart.php` 脚本，该脚本进而显示购物车中所选产品的信息。span 的 ID `cartcountinfo`\
    \ 将用于显示购物车中选择的产品数量。\n\n当执行 `topmenu.php` 脚本时，会显示如图 3-4 所示的网站页眉。\n\n![A978-1-4842-1672-9_3_Fig4_HTML.jpg](img/A978-1-4842-1672-9_3_Fig4_HTML.jpg)\n\
    \n**图 3-4.** 网站页眉，显示标题、搜索框以及带下拉菜单的购物车图像\n\n您的大多数网站访问者不会有足够的时间浏览您销售的全部产品。他们只想搜索他们想要的产品并立即在屏幕上查看其详细信息。要添加此功能，您必须为您的网站添加一个搜索框，您将在下一节中学习如何操作。\n\
    \n## 实现搜索功能\n\n回想一下，您已经在网站页眉中添加了一个搜索框。用户可以在搜索框中输入文本，然后单击“搜索”按钮。系统将搜索整个 `products`\
    \ 表以查找指定的文本，并且所有包含该文本的产品（无论是在其名称、描述、特性还是其他方面）都将显示在屏幕上。\n\n清单 3-6 中显示的 `searchitems.php`\
    \ 脚本会在 `products` 表的所有列中搜索搜索框中输入的文本。如果该文本出现在任何列中，则该行将显示在屏幕上。\n\n**清单 3-6.** `searchitems.php`\
    \ 脚本显示与搜索框中输入的文本匹配的商品\n\n```php\n<?php\ninclude('topmenu.php');\n$connect = mysqli_connect(\"\
    localhost\", \"root\", \"gold\", \"shopping\") or die(\"请检查您的服务器连接。\");\n$tosearch=$_POST['tosearch'];\n\
    $query = \"select * from products where \";\n$query_fields = Array();\n$sql =\
    \ \"SHOW COLUMNS FROM products\";                                            \
    \       // #1\n$columnlist = mysqli_query($connect, $sql) or die(mysql_error());\
    \                      // #2\nwhile($arr = mysqli_fetch_array($columnlist, MYSQLI_ASSOC)){\
    \                           // #3\n    extract($arr);\n    $query_fields[] = $Field\
    \ . \" like('%\". $tosearch . \"%')\";\n}\n$query .= implode(\" OR \", $query_fields);\n\
    $results = mysqli_query($connect, $query) or die(mysql_error());\necho \"<table\
    \ border=\\\"0\\\" >\";\n$x=1;\necho \"<tr>\";\nwhile ($row = mysqli_fetch_array($results,\
    \ MYSQLI_ASSOC))  {\n    if ($x <= 3)\n    {\n        $x = $x + 1;\n        extract($row);\n\
    \        echo \"<td style=\\\"padding-right:15px;\\\">\";\n        echo \"<a href=itemdetails.php?itemcode=$item_code>\"\
    ;\n        echo '<img src=' . $imagename . ' style=\"max-width:220px;max-height:240px;width:auto;height:auto;\"\
    ></img><br/>';\n        echo $item_name .'<br/>';\n        echo \"</a>\";\n  \
    \      echo '$'.$price .'<br/>';\n        echo \"</td>\";\n    }\n    else\n \
    \   {\n        $x=1;\n        echo \"</tr><tr>\";\n    }\n}\necho \"</table>\"\
    ;\n?>\n```\n\n在顶部包含了 `topmenu.php` 脚本以显示网站页眉和下拉菜单。代码首先作为用户 root 连接到 MySQL 服务器，并选择\
    \ `shopping` 数据库来执行操作。访问用户在 `topmenu.php` 脚本的搜索框中输入的文本，并将其赋值给 `tosearch` 变量。\n\
    \n因为您希望在 `products` 表的所有列中搜索 `tosearch` 变量中的文本，所以会访问 `products` 表的所有列名（参见语句 #1），并通过语句\
    \ #2 将它们赋值给 `columnlist` 变量。使用 `while` 循环，创建一个 SQL 查询，该查询会访问 `products` 表的每一列，并检查其中是否包含所需的文本（参见语句\
    \ #3）。执行该 SQL 查询后，所有在任何列中包含所搜索文本的产品都会显示在屏幕上。例如，如果您在搜索框中输入 `lenovo`，您将获得所有包含该文本的产品，如图\
    \ 3-5 所示。\n\n![A978-1-4842-1672-9_3_Fig5_HTML.jpg](img/A978-1-4842-1672-9_3_Fig5_HTML.jpg)\n\
    \n**图 3-5.** 显示与搜索框中输入的文本相匹配的产品的网页\n\n本章中您创建的所有脚本都只显示产品的最少信息——产品图片、名称和价格。如果用户想查看产品的更多详细信息该怎么办？\n"
- fmt: "# Showing Product Details\n\nSo, how do you display additional product details,\
    \ like a description and its different features? Recall from [Chapter 1](#A978-1-4842-1672-9_1_Chapter.html)\
    \ that all the information about the product—including its code, name, price,\
    \ description, and so on—is stored in the `products` table. The product features\
    \ are stored in a separate table called `productfeatures`. The `itemdetails.php`\
    \ script, shown in Listing [3-7](#A978-1-4842-1672-9_3_Chapter.html#FPar8), displays\
    \ detailed information about the selected product.\n\nListing 3-7. The `itemdetails.php`\
    \ script displays detailed information about the selected item\n\n```php\n<?php\n\
    \ninclude('topmenu.php');\n\n$connect = mysqli_connect(\"localhost\", \"root\"\
    , \"gold\", \"shopping\") or die(\"Please, check your server connection.\");\n\
    \n$code=$_REQUEST['itemcode'];\n\n$query = \"SELECT item_code, item_name, description,\
    \ imagename, price FROM products \" .\n    \"where item_code like '$code'\";\n\
    \n$results = mysqli_query($connect, $query) or       die(mysql_error()); // #1\n\
    \n$row = mysqli_fetch_array($results, MYSQLI_ASSOC);\n\nextract($row);\n\necho\
    \ \"<table width=\\\"100%\\\" cellspacing=\\\"0\\\" cellpadding=\\\"5\\\">\";\n\
    echo \"<tr><td style=\\\"padding: 3px;\\\" rowspan=\\\"6\\\">\";\necho '<img src='\
    \ . $imagename . ' style=\"max-width:200px;max-height:260px;width:auto;height:auto;\"\
    ></img></td>';\necho \"<td colspan=\\\"2\\\" align=\\\"center\\\" style=\\\"font-family:verdana;\
    \ font-size:150%;\\\"><b>\";\necho $item_name;\necho \"</b></td></tr><tr><td colspan=\\\
    \"2\\\"><table><tr><td>\";\n$itemname=urlencode($item_name);\n$itemprice=$price;\n\
    $itemdescription=$description;\n$pfquery = \"SELECT feature1, feature2, feature3,\
    \ feature4, feature5, feature6 FROM productfeatures \" .\n    \"where item_code\
    \ like '$code'\";                                                        // #2\n\
    $pfresults = mysqli_query($connect, $pfquery) or die(mysql_error());\n$pfrow =\
    \ mysqli_fetch_array($pfresults, MYSQLI_ASSOC);\nextract($pfrow);\necho $feature1;\n\
    echo \"</td><td>\";\necho $feature2;\necho \"</td></tr><tr><td>\";\necho $feature3;\n\
    echo \"</td><td>\";\necho $feature4;\necho \"</td></tr><tr><td>\";\necho $feature5;\n\
    echo \"</td><td>\";\necho $feature6;\necho \"</td></tr><tr>\";\necho \"<form method=\\\
    \"POST\\\" action=\\\"cart.php?action=add&icode=$item_code&iname=$itemname&iprice=$itemprice\\\
    \">\";\necho \"<td colspan=\\\"2\\\" style=\\\"font-family:verdana; font-size:150%;\\\
    \">\";\necho \" Quantity: <input type=\\\"text\\\" name=\\\"quantity\\\" size=\\\
    \"2\\\">   Price: \" . $itemprice;\necho \"</td></tr><tr><td  colspan=\\\"2\\\"\
    ><input type=\\\"submit\\\" name=\\\"buynow\\\" value=\\\"Buy Now\\\" style=\\\
    \"font-size:150%;\\\">\";\necho \"      <input type=\\\"submit\\\" name=\\\"addtocart\\\
    \" value=\\\"Add To Cart\\\" style=\\\"font-size:150%;\\\"></td>\";\necho\"  </form>\"\
    ;\necho \"</tr></table></table>\";\necho \"<p  style=\\\"font-size:140%;\\\">Description</p>\"\
    ;\necho $itemdescription;\n?>\n```\n\nAfter establishing a connection with the\
    \ SQL server and selecting the `shopping` database, the product code sent by the\
    \ `itemlist.php` and `searchitems.php` scripts is accessed and assigned to the\
    \ code variables. Recall that the `itemlist.php` and `searchitems.php` scripts\
    \ display the products list consisting of the product's image, its name, and its\
    \ price. When a user clicks on any product's image or name, the user is navigated\
    \ to the `itemdetails.php` script and the code of the selected product is sent\
    \ to the script.\n\nStatement #1 executes the SQL command that accesses the item\
    \ name, description, image name, and price of the product that matches the product\
    \ code.\n\nThe fetched product information is displayed on the screen. Besides\
    \ the product's description and price, you want to display its features too. So,\
    \ statement #2 defines a SQL statement that accesses the `feature1`, `feature2`,\
    \ etc. columns from the `productfeatures` table. The SQL statement is executed\
    \ and the features of the product are displayed on the screen.\n\nBelow the product\
    \ features, a text box is provided so users can enter the required quantity of\
    \ the product being displayed. The quantity entered by the user is assigned to\
    \ the `quantity` variable and is sent to the `cart.php` script along with the\
    \ `item_code`, `item_name`, and `price` of the item when the user presses the\
    \ Add to Cart button.\n\nThe `itemdetails.php` script is executed from the `itemlist.php`\
    \ and `searchitems.php` scripts when any product image or its name is clicked.\
    \ Upon clicking on any product image or name, its detailed information will be\
    \ displayed, as shown in Figure [3-6](#A978-1-4842-1672-9_3_Chapter.html#Fig6).\n\
    \n![A978-1-4842-1672-9_3_Fig6_HTML.jpg](A978-1-4842-1672-9_3_Fig6_HTML.jpg)\n\n\
    Figure 3-6. Web page displaying the detailed information of the selected product\n\
    \nAfter learning the technique for displaying products and their information,\
    \ you're ready to learn how a web site can remember user information.\n\n# Session\
    \ Handling\n\nBecause HTTP is a stateless protocol, the interaction between browsers\
    \ and web servers is stateless. This means that each HTTP request that a browser\
    \ sends to a web server is independent of any other request. The stateless nature\
    \ of HTTP allows users to browse the web by following hypertext links and visiting\
    \ pages in any order. HTTP also allows applications to distribute or even replicate\
    \ content across multiple servers to balance the load generated by a high number\
    \ of requests. These features are possible because of the stateless nature of\
    \ HTTP.\n\nThe drawback of HTTP being stateless is that a web page does not remember\
    \ the user's information. If the user inserts some information on one web page\
    \ and moves to another page, that data will be lost. For example, if the user\
    \ has signed in through a sign-in page, the moment the user clicks on some link\
    \ and navigates to another page, that information is lost. In order to remember\
    \ certain data between web pages, like the items that are selected in the cart\
    \ by a particular user, sites must use session handling. The session enables storing\
    \ of user information in the server's memory. It can store any type of object\
    \ along with the custom objects. Session data is stored separately for every client.\n\
    \nBecause HTTP is a stateless protocol, to keep track of the user, the session\
    \ ID needs to be continually correlated with the user. This correlation is done\
    \ through the following methods:\n\n- **Cookies**—When the client connects to\
    \ the server for the first time, the server drops the cookies on the client's\
    \ machine. In every subsequent request, the server uses the cookies to recognize\
    \ the user and his settings.\n- **URL Rewriting**—The session ID is often appended\
    \ to the query string of the URL, as shown in this example: `http://www.bmharwani.com/productdetails.php;jsessionid=2243781FG55544K1`\n\
    - **Hidden fields**—A hidden field is embedded into the session ID within a web\
    \ form. The session ID is extracted from the hidden field to recognize the user.\n\
    \nLet's take a quick look at the different functions that are required in session\
    \ handling.\n\n## Functions Used in Session Handling\n\nA session is a combination\
    \ of a server-side file containing all the data you want to store and a client-side\
    \ cookie containing a reference to the server data. The file and the client-side\
    \ cookie are created using the `session_start()` function, as explained next."
