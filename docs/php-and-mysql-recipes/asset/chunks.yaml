    Recipe 16-7\. Schema Information


    Problem


    In the previous example the schema definition for the two tables were hard coded
    and would need to be updated if there were any changes to the database. Would
    it be possible to extract the schema information from the database?


    Solution


    There is a special purpose database or schema in the MySQL database. This is called
    INFORMATION_


    SCHEMA and it contains information about all the tables and columns in any of
    the databases on the server.


    INFORMATION_SCHEMA is common among many SQL92 database engines.


    The commands show databases; and show tables; that were used on the command line,
    and they can also be used from the Query() method of the mysqli class. These commands
    use the information in the INFORMATION_SCHEMA to extract data about the system.


    The command show databases; is equivalent to this:


    select schema_namèDatabasè from information_schema.schemata;


    The ticks around the alias Database is there because database is a reserved word
    and it must be escaped to be used as a column name in the query.


    In a similar way we can write a statement to get all the tables in the database
    called music. This will be equivalent to the following:


    use music;


    Show tables;


    Using the information schema makes it possible to use this from any location.
    You don’t have to select a specific database before querying this schema.


    select table_name from information_schema.tables where table_schema=''music'';
    And finally we can get the list of columns in each of the tables by using this
    SQL statement: select column_name, column_type from information_schema.columns
    where table_name=''album''; 355


    CHAPTER 16 ■ USING MYSQL DATABASES


    How it Works


    With this information we can now change the constructor of the music class to
    query the database for the schema information.


    <?php


    // 16_10.php


    class music extends mysqli {


    private $schema = [];


    function __construct() {


    parent::__construct(''127.0.0.1'', ''php'', ''secret'', ''music'');


    if ($this->connect_error) {


    die("Unable to connect to music\n");


    }


    $sql = "select table_name from information_schema.tables where table_schema=''music'';";
    $rs = $this->Query($sql);


    while ($table = $rs->fetch_assoc()) {


    $sql = "select column_name, column_type from information_schema.columns where
    table_


    name=''{$table[''table_name'']}'';";


    $rs1 = $this->query($sql);


    while($col = $rs1->fetch_assoc()) {


    $this->schema[$table[''table_name'']][$col[''column_name'']] = $col[''column_type''];


    }


    $rs1->close();


    }


    $rs->close();


    print_r($this->schema);


    }


    }


    $music = new music();


