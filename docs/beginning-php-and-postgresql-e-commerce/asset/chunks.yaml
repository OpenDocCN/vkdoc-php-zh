  trans: "\n现在一切就绪，用几个订单进行测试非常重要。只需确保使用\"魔法\"信用卡详细信息创建客户，即可轻松完成测试。正如本章前面提到的，`DataCash`\
    \ 提供了这些用于测试目的的数字，以便从 `DataCash` 获取特定响应。表 15-2 展示了部分数字示例；完整列表可在 `DataCash` 网站上找到。\n\
    \n**表 15-2.** `DataCash` *信用卡测试号码* **卡类型** | **卡号** | **返回代码** | **描述** | **示例信息**\n\
    --- | --- | --- | --- | ---\n`Switch` | | 授权通过，返回 | `AUTH CODE ??????` | 随机授权码。\n\
    | | | 拒绝，返回 | `DECLINED` | 交易被拒绝。\n| | | 授权通过，返回 | `AUTH CODE ??????` | 随机授权码。\n\
    | | | 拒绝，返回 | `DECLINED` | 交易被拒绝。\n| | | 授权通过，返回 | `AUTH CODE ??????` | 随机授权码。\n\
    `Visa` | | 拒绝，返回 | `DECLINED` | 交易被拒绝。\n| | | 授权通过，返回 | `AUTH CODE ??????` | 随机授权码。\n\
    | | | 授权通过，返回 | `AUTH CODE ??????` | 随机授权码。\n\n此时，您可以通过使用测试信用卡号码下订单、检查网站发送的电子邮件，以及了解网站在特定情况下的反应（例如如何记录错误、如何使用订单管理页面管理订单等），来试验您全新且功能完备的电子商务网站。\n\
    \n## 正式上线\n\n现在，从测试账户切换到正式账户只需替换 `include/config.php` 中的 `DataCash` 登录信息即可。在您设置好商户银行账户后，您可以使用新详细信息创建一个新的\
    \ `DataCash` 账户，从而获得新的客户端和密码数据。您还需要更改发送数据的目标 `DataCash` 服务器 URL：\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n`648XCH15.qxd 11/15/06 6:21 PM Page 524`\n\n**524**\n\n第 15 章 ■ 信用卡交易\n\n因为它需要是生产服务器而不是测试服务器。除了从数据库中删除测试用户账户并将网站迁移到互联网位置（更多详细信息请参阅附录\
    \ B）之外，这就是您在向客户公开新完成的电子商务应用之前需要做的所有事情。\n\n## 使用 Authorize.net\n\n要使用 `Authorize.net`，您需要通过\
    \ `http://developer.authorize.net/testaccount/` 注册一个开发者测试账户。开发人员可以获取 `Authorize.net`\
    \ 集成信息的主页是 `http://developer.authorize.net/`。\n\n与 `Authorize.net` 通信的方式不同于与 `DataCash`\
    \ 通信。无需发送和接收 XML 文件，而是发送由名称-值对组成的字符串，这些名称-值对通过 & 符号分隔。实际上，您使用的语法类似于附加到 URL 的查询字符串。\n\
    \n`Authorize.net` 以包含返回值（不含名称）的字符串形式返回交易结果，这些返回值由您在初始请求时指定的字符分隔。在我们的示例中，我们将使用管道符（`|`）。返回值按预定顺序排列，其含义由它们在返回字符串中的位置决定。\n\
