  \n$query = \"SELECT item_code, item_name, description, imagename, price FROM products\
  \ \" .\n    \"where item_code like '$code'\";\n\n$results = mysqli_query($connect,\
  \ $query) or       die(mysql_error()); // #1\n\n$row = mysqli_fetch_array($results,\
  \ MYSQLI_ASSOC);\n\nextract($row);\n\necho \"<table width=\\\"100%\\\" cellspacing=\\\
  \"0\\\" cellpadding=\\\"5\\\">\";\necho \"<tr><td style=\\\"padding: 3px;\\\" rowspan=\\\
  \"6\\\">\";\necho '<img src=' . $imagename . ' style=\"max-width:200px;max-height:260px;width:auto;height:auto;\"\
  ></img></td>';\necho \"<td colspan=\\\"2\\\" align=\\\"center\\\" style=\\\"font-family:verdana;\
  \ font-size:150%;\\\"><b>\";\necho $item_name;\necho \"</b></td></tr><tr><td colspan=\\\
  \"2\\\"><table><tr><td>\";\n$itemname=urlencode($item_name);\n$itemprice=$price;\n\
  $itemdescription=$description;\n$pfquery = \"SELECT feature1, feature2, feature3,\
  \ feature4, feature5, feature6 FROM productfeatures \" .\n    \"where item_code\
  \ like '$code'\";                                                        // #2\n\
  $pfresults = mysqli_query($connect, $pfquery) or die(mysql_error());\n$pfrow = mysqli_fetch_array($pfresults,\
  \ MYSQLI_ASSOC);\nextract($pfrow);\necho $feature1;\necho \"</td><td>\";\necho $feature2;\n\
  echo \"</td></tr><tr><td>\";\necho $feature3;\necho \"</td><td>\";\necho $feature4;\n\
  echo \"</td></tr><tr><td>\";\necho $feature5;\necho \"</td><td>\";\necho $feature6;\n\
  echo \"</td></tr><tr>\";\necho \"<form method=\\\"POST\\\" action=\\\"cart.php?action=add&icode=$item_code&iname=$itemname&iprice=$itemprice\\\
  \">\";\necho \"<td colspan=\\\"2\\\" style=\\\"font-family:verdana; font-size:150%;\\\
  \">\";\necho \" 数量: <input type=\\\"text\\\" name=\\\"quantity\\\" size=\\\"2\\\"\
  >   价格: \" . $itemprice;\necho \"</td></tr><tr><td  colspan=\\\"2\\\"><input type=\\\
  \"submit\\\" name=\\\"buynow\\\" value=\\\"立即购买\\\" style=\\\"font-size:150%;\\\"\
  >\";\necho \"      <input type=\\\"submit\\\" name=\\\"addtocart\\\" value=\\\"\
  加入购物车\\\" style=\\\"font-size:150%;\\\"></td>\";\necho\"  </form>\";\necho \"</tr></table></table>\"\
  ;\necho \"<p  style=\\\"font-size:140%;\\\">描述</p>\";\necho $itemdescription;\n\
  ?>\n```\n\n在与 SQL 服务器建立连接并选择了 `shopping` 数据库之后，将获取由 `itemlist.php` 和 `searchitems.php`\
  \ 脚本发送过来的产品代码，并将其赋值给代码变量。回想一下，`itemlist.php` 和 `searchitems.php` 脚本会显示包含产品图片、名称和价格的产品列表。当用户点击任何产品的图片或名称时，用户会被导航到\
  \ `itemdetails.php` 脚本，并且所选产品的代码也会被发送到该脚本。\n\n语句 #1 执行 SQL 命令，访问与产品代码匹配的产品的项目名称、描述、图片名称和价格。\n\
  \n获取到的产品信息会显示在屏幕上。除了产品的描述和价格，你还想显示其功能特性。因此，语句 #2 定义了一条 SQL 语句，该语句从 `productfeatures`\
  \ 表中访问 `feature1`、`feature2` 等列。该 SQL 语句被执行，产品的功能特性便显示在屏幕上。\n\n在产品特性下方，提供了一个文本框，以便用户输入所需产品的数量。当用户按下“加入购物车”按钮时，用户输入的数量会被赋值给\
  \ `quantity` 变量，并连同该商品的 `item_code`、`item_name` 和 `price` 一起发送到 `cart.php` 脚本。\n\
  \n当用户点击任何产品图片或名称时，会从 `itemlist.php` 和 `searchitems.php` 脚本执行 `itemdetails.php` 脚本。点击任何产品图片或名称后，其详细信息将显示出来，如图\
  \ 3-6 所示。\n\n![A978-1-4842-1672-9_3_Fig6_HTML.jpg](img/A978-1-4842-1672-9_3_Fig6_HTML.jpg)\n\
  \n图 3-6. 显示所选产品详细信息的网页\n\n学习了显示产品及其信息的技术后，接下来你将了解网站如何记住用户信息。\n\n## 会话处理\n\n由于 HTTP\
  \ 是一种无状态协议，浏览器和 Web 服务器之间的交互是无状态的。这意味着浏览器发送给 Web 服务器的每个 HTTP 请求都独立于任何其他请求。HTTP 的无状态特性允许用户通过跟踪超文本链接并以任意顺序访问页面来浏览网页。HTTP\
  \ 还允许应用程序跨多个服务器分发甚至复制内容，以平衡大量请求产生的负载。这些特性之所以成为可能，正是因为 HTTP 的无状态特性。\n\nHTTP 无状态的缺点在于，网页不会记住用户的信息。如果用户在一个网页上输入了一些信息，然后转到另一个页面，那些数据就会丢失。例如，如果用户已通过登录页面登录，当用户点击某个链接并导航到另一个页面时，该登录信息就会丢失。为了在网页之间记住某些数据，比如特定用户在购物车中选择的商品，网站必须使用会话处理。会话使得用户信息能够存储在服务器内存中。它可以存储任何类型的对象以及自定义对象。会话数据是为每个客户端分别存储的。\n\
  \n由于 HTTP 是一种无状态协议，为了跟踪用户，需要将会话 ID 与用户持续关联起来。这种关联通过以下方法实现：\n\n- **Cookies** — 当客户端首次连接到服务器时，服务器会在客户端机器上放置\
  \ cookies。在随后的每一个请求中，服务器都使用 cookies 来识别用户及其设置。\n- **URL 重写** — 会话 ID 通常会被附加到 URL\
  \ 的查询字符串中，如下例所示：`http://www.bmharwani.com/productdetails.php;jsessionid=2243781FG55544K1`\n\
  - **隐藏字段** — 在 Web 表单中嵌入一个隐藏字段，其中包含会话 ID。通过提取隐藏字段中的会话 ID 来识别用户。\n\n让我们快速了解一下会话处理中所需的不同函数。\n\
  \n### 会话处理中使用的函数\n\n会话由两部分组成：一个包含所有你想存储数据的服务器端文件，以及一个包含对服务器数据引用的客户端 cookie。该文件和客户端\
  \ cookie 都是通过 `session_start()` 函数创建的，具体情况如下所述。\n\n\n\n#### `session_start()`\n\n\
  `session_start()` 函数用于初始化会话数据。它会基于当前的会话 ID 创建一个新会话，或恢复现有会话。该函数的语法如下：\n\n`bool session_start\
  \ ( void )`\n\n此函数始终返回 `true`。如果你想使用一个指定的会话名称，必须在调用 `session_start()` 之前先调用 `session_name()`\
  \ 函数。\n\n当调用 `session_start()` 时，PHP 会检查访问者是否发送了会话 cookie。如果已发送，PHP 会加载会话数据；否则，PHP\
  \ 会在服务器上创建一个新的会话文件，并向访问者返回一个 ID，将其与该新文件关联。由于每位访问者的数据都独立存储在各自的会话文件中，因此在尝试读取会话变量之前，每次都需要调用\
  \ `session_start()`。由于 `session_start()` 需要将引用 cookie 发送到用户的计算机，因此这条语句应写在网页正文之前——甚至在任何空格之前。\n\
  \n#### `session_id()`\n\n`session_id()` 函数用于获取或设置当前会话的会话 ID。更精确地说，如果没有当前会话（即不存在当前会话\
  \ ID），`session_id()` 函数会返回当前会话的 ID 或一个空字符串（`\"\"`）。其语法如下：\n\n`string session_id\
  \ ([ string $id ] )`\n\n当不提供 `id` 参数时，该函数返回当前会话的会话 ID。如果提供了 `id` 参数，该函数会将当前会话替换为指定\
  \ ID 的会话。在这种情况下，`session_id()` 函数必须在调用 `session_start()` 之前调用。\n\n#### `isset()`\n\
  \n`isset()` 函数用于判断一个变量是否已设置，即它是否被赋予了某个值，或者是否为 `NULL`。其语法如下：\n\n`bool isset ( variable/variable\
  \ list)`\n\n如果指定的变量已设置，该函数返回 `true`。如果指定变量已被 `unset()` 函数取消设置，或已被设置为 `NULL`，则 `isset()`\
  \ 函数返回 `false`。\n\n如果提供了多个参数，那么仅当所有参数都已设置时，`isset()` 才会返回 `true`。求值过程从左到右进行，一旦遇到未设置的变量便会停止。\n\
  \n名为 `sessionscript1.php` 的 PHP 脚本如代码清单 3-8 所示。它展示了如何启动一个会话以及如何设置某些变量。\n\n**代码清单\
  \ 3-8.** 脚本 `sessionscript1.php` 在会话变量中设置值\n\n```php\n<?php\nif (session_status()\
  \ == PHP_SESSION_NONE) {                           // #1\n    session_start();\n\
  }\n?>\n<!DOCTYPE html>\n<html>\n<body>\n<?php\n$_SESSION[\"username\"] = \"John\"\
  ;                                       // #2\n$_SESSION[\"cartquantity\"] = 3;\n\
  $_SESSION[\"cartprice\"] = 19.99;\n?>\n购物结束了吗？<br>\n点击 <a href=\"sessionscript2.php\"\
  > 查看购物车 </a> 链接，查看购物车中已选产品的数量和金额\n</body>\n</html>\n```\n\n语句 #1 确保如果会话尚未启动，则调用\
  \ `session_start()` 函数创建一个新会话。语句 #2 将 `username` 变量设置为 `John`。类似地，接下来的两条语句分别将 `cartquantity`\
  \ 和 `cartprice` 变量设置为 `3` 和 `19.99`。\n\n设置会话变量后，脚本显示一个名为“查看购物车”的超链接，该链接会将用户导航到另一个名为\
  \ `sessionscript2.php` 的脚本。正如预期，`sessionscript2.php` 脚本将从会话变量中访问值并将其显示在屏幕上。运行此脚本后，会显示“查看购物车”超链接以及一条消息，如图\
  \ 3-7 所示。\n\n![A978-1-4842-1672-9_3_Fig7_HTML.jpg](img/A978-1-4842-1672-9_3_Fig7_HTML.jpg)\n\
  \n**图 3-7.** 会话变量的值已设置，并显示了一个用于访问和查看会话变量的链接\n\n> **注意：** 如有需要，会话信息甚至可以永久存储在数据库中。\n\
  \n代码清单 3-9 中所示的 `sessionscript2.php` 脚本完成了以下任务：\n\n- 检查会话是否存在。如果不存在，则启动一个新会话。\n\
  - 检查 `username` 变量是否已设置，并显示一条欢迎消息。\n- 检索在 `sessionscript1.php` 脚本中设置的会话变量 `cartquantity`\
  \ 和 `cartprice` 的值，并将其显示在屏幕上。\n\n**代码清单 3-9.** 脚本 `sessionscript2.php` 从会话变量中检索值\n\
  \n```php\n<?php\nif (session_status() == PHP_SESSION_NONE) {\n    session_start();\n\
  }\n?>\n<html>\n<body>\n<?php\nif (isset($_SESSION['username']))\n    $username=$_SESSION[\"\
  username\"];\nelse\n    $username=\"先生/女士\";\n$cartquantity=$_SESSION[\"cartquantity\"\
  ];\n$cartprice=$_SESSION[\"cartprice\"];\necho \"会话已开启，会话 ID 为 \" . session_id()\
  \ . \"<br>\";\necho \"欢迎您，$username。 <br>\";\necho \"购物车中有 $cartquantity 件产品，总价值\
  \ $$cartprice\";\n?>\n</body>\n</html>\n```\n\n当脚本运行时，会显示会话 ID 以及一条欢迎用户的问候语。同时，购物车数量和总价也会显示出来，如图\
  \ 3-8 所示。\n\n![A978-1-4842-1672-9_3_Fig8_HTML.jpg](img/A978-1-4842-1672-9_3_Fig8_HTML.jpg)\n\
