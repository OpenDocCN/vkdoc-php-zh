    **Doing More with the Ajax Helper**


    You have barely scratched the surface of the possibilities that the Ajax helper
    opens up. As you can see in Table 8-1, the Ajax helper includes much more than
    the form(), submit(), and link() functions. True, these functions are useful because
    they allow you to discuss the main concepts of using Ajax in a Cake application.
    What about using Ajax with animation frameworks? Or building fancy Web 2.0 features
    such as a drag-and-drop shopping cart or a slider tool that adjusts sizes of HTML
    elements? When considering how you want to bring Ajax into your Cake application,
    remember some of these fundamental steps.


