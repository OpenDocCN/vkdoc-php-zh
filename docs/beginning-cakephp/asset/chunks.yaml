    # 自定义视图


    对于简单的页面请求，除了显示所传递数组的内容之外，通常不需要更多操作。然而，表单提交流程则需要更详细的处理。如前所述，Cake 提供了辅助此工作的助手函数。


    ## 自定义 HTML 表单


    列表 6-4 描述了一个基础的 Cake 表单，它使用 `Form` 助手来渲染表单元素。


    如何自定义这些功能，需要你对 `Form` 助手的工作方式有一致的理解和认识。


    打开 `app/views/posts/add.ctp` 文件。其内容应与列表 6-9 中的烘焙代码一致。


    **列表 6-9.** *Posts 添加视图文件的烘焙内容*


    ```

    <div class="posts form">

    <?php echo $form->create(''Post'');?>

    <fieldset>

    <legend><?php __(''Add Post'');?></legend>

    <?php

    echo $form->input(''name'');

    echo $form->input(''date'');

    echo $form->input(''content'');

    echo $form->input(''user_id'');

    echo $form->input(''Tag'');

    ?>

    </fieldset>

    <?php echo $form->end(''Submit'');?>

    </div>

    <div class="actions">

    <ul>

    <li><?php echo $html->link(__(''List Posts'', true), array(''action''=>''index''));?></li>

    <li><?php echo $html->link(__(''List Users'', true), array(''controller''=> ''users'',
    ''action''=>''index'')); ?></li>

    <li><?php echo $html->link(__(''New User'', true), array(''controller''=> ''users'',
    ''action''=>''add'')); ?></li>

    <li><?php echo $html->link(__(''List Tags'', true), array(''controller''=> ''tags'',
    ''action''=>''index'')); ?></li>

    <li><?php echo $html->link(__(''New Tag'', true), array(''controller''=>''tags'',
    ''action''=>''add'')); ?></li>

    </ul>

    </div>

    ```


    第 15–23 行包含了指向各种操作的链接，这些链接都使用了 `HTML` 助手的 `link()` 函数。第 2–13 行包含了表单及其字段，这些字段使操作得以实现。当应用程序在视图和控制器之间来回通信时，`Form`
    助手会拦截所有被传递的数据，并分析每一条数据以决定它在表单中应该如何显示。只要 `$this->data` 与 Cake 的默认构造保持一致，`Form`
    助手就能保持同步。有时，应用程序的设计可能需要一些额外的设置才能使 `Form` 助手正常工作，但大多数情况下，它与 `$this->data` 协作得非常好，并能为你省去很多麻烦。告别那个老旧的
    PHP `$_POST` 数组吧！


    就像我们对 `View` 视图所做的那样，让我们从头重新构建 `Add` 视图。用列表 6-10 中的内容替换 `app/views/posts/add.ctp`
    文件的内容。


    **列表 6-10.** *Add 操作的极简代码*


    ```

    <div class="posts form">

    <?=$form->create(''Post'');?>

    <fieldset>

    <legend>Add Post</legend>

    <?

    e($form->input(''name''));

    e($form->input(''date''));

    e($form->input(''content''));

    e($form->input(''User''));

    e($form->input(''Tag''));

    ?>

    </fieldset>

    <?=$form->end(''Submit'');?>

    </div>

    ```


    这段代码与 Bake 提供的代码类似，但它使用了 `e()` 便捷函数（与 `echo()` 相同），并去掉了操作链接。请注意，每个字段都使用了 `input()`
    函数，并且 `Form` 助手会自动识别每个字段中包含的数据类型。对于关联模型，提供了模型名称（例如 `User` 和 `Tag`），`Form` 助手会假定该字段是一个关联关系，并基于此关系进行构建。这样，你会自动获得一个用于用户的单选下拉菜单和一个用于标签的多选下拉菜单。


    要自定义表单元素，必须使用 `Form` 助手函数中提供的选项。一个例子是向 `input()` 函数添加一些参数。目前，`Tag` 输入元素是一个多选下拉菜单，其中包含
    `$this->data` 数组中的标签列表。如果将其更改为多个复选框，通常需要编写多行 HTML 标签来渲染每个单独的复选框。使用 `Form` 助手，你可以通过一行代码来自定义表单以处理多个复选框（见列表
    6-11）。


    **列表 6-11.** *Form 助手的 `input()` 函数渲染多个复选框而非多选下拉菜单*


    ```

    echo $form->input(''Tag'',array(''type''=>''select'',''multiple''=>''checkbox''));

    ```


    `input()` 函数的第一个参数是模型名或当前模型的字段名。第二个参数是一个数组，包含多个作为键的选项及其具体的设置值作为值。注意，你已告诉 `Form`
    助手使用 `$this->data` 数组中 `Tag` 键所存放的数据来渲染一个输入元素，并且该元素必须是 select 类型，但其多选选项应使用复选框而非默认样式。刷新
    `Add` 操作，你应该会看到表单简化了，并带有自定义的复选框。无论 HTML 元素的类型如何，Cake 都会以相同的方式格式化数据，并且由于控制器已设置为保存从视图接收到的数据，因此
    `Add` 操作会继续正常工作。


    ## 使用其他助手


    Cake 预装了多个助手：


    - Ajax

    - Cache

    - Form

    - HTML

    - JavaScript

    - Number

    - Paginator

    - RSS

    - Session

    - Text

    - Time

    - XML


    每个助手都包含多个函数，用于简化数据处理和内容显示。每个助手都将遵循相同的基本语法——在视图中作为一个变量可用的对象，加上其函数及其在括号中提供的参数。互联网上也有第三方助手可用，其中许多来自
    Cake 的官方 Bakery (http://bakery.cakephp.org)。要使助手可用，除了 `HTML` 和 `Form` 助手之外，你必须在控制器中指定正在使用该助手。这通过使用相应助手的类名填充助手设置数组来实现：`var
    $helpers = array(''Ajax'',''Session'',''Time'');`


    通过将这行字符串放置在调用 `var $name` 和 `var $scaffold` 属性的位置附近，Cake 能够启动一个助手类对象的新实例，并使其在视图中可用。使用更多助手会为你增添定制方案的更多可能性。你对
    Cake 的助手越熟悉，在自定义视图时拥有的选项就越多。


    ## 可读的日期和时间


    尝试使用 `Time` 助手来练习在视图中使用助手。记得先在控制器中设置 `$helpers` 属性以包含 `Time` 助手。然后在 Posts 的 `View`
    视图中，使用 `nice()` 函数使 `$post[''Post''][''date'']` 值更具可读性。提示：你需要将变量传递给该函数才能使其正常工作。


    ## 总结


    用户通常通过以下三种方式之一与你的 Cake 应用程序交互：发出一个简单的页面请求、提交某种表单、或异步发送页面或表单请求（也称为 Ajax 过程）。控制器和视图在
    Cake 中协同工作来处理这些类型的序列。当自定义用户将与之交互的视图时，你也将在控制器中工作，以提供处理用户请求所需的逻辑。控制器将使用诸如 `set()`
    和 `render()` 之类的函数来调用视图，并为其提供必要的参数和变量。标准化的数组（如 `$this->data`）使得处理用户表单数据变得更加容易，因为控制器会解析视图中渲染的数据，并通过模型运行它。本章解释了
    Cake 如何格式化 `$this->data`，以及它与 `Form` 助手的交互。接下来将扩展控制器和模型的功能——第 7 章将描述如何自定义控制器和模型以执行更复杂的操作。


    # 使用控制器和模型

