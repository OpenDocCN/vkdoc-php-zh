  ### MySQL 命名规则


  MySQL 中数据库、表和字段的基本命名规则如下：


  - 名称长度最多可达 64 个字符。

  - 合法字符包括数字、字母、下划线和 `$`。

  - 名称可以以数字开头，但不能完全由数字组成。


  一些托管公司似乎对这些规则浑然不知，会为客户分配名称中包含一个或多个连字符（非法字符）的数据库。如果数据库、表或字段名称包含空格或非法字符，则必须在 SQL 查询中使用反引号（``
  ` ``）将其括起来。请注意，这不是单引号 (`''`)，而是一个单独的字符。在我的 Windows 键盘上，它位于 Tab 键的正上方。在我的 Mac 键盘上，它位于左
  Shift 键旁边，与波浪号 (`~`) 在同一个键上。


  在选择名称时，你可能会不小心用到 MySQL 的众多保留字 (http://dev.mysql.com/doc/refman/5.6/en/reserved-words.html)
  之一，例如 `date` 或 `time`。避免这种情况的一种方法是使用复合词，例如 `arrival_date`、`arrival_time` 等。另一种方法是用反引号将所有名称括起来。phpMyAdmin
  会自动执行此操作，但在 PHP 脚本中编写自己的 SQL 时，你需要手动执行此操作。


  注意


  因为很多人都使用过 `date`、`text`、`time` 和 `timestamp` 作为字段名称，所以 MySQL 允许不使用反引号使用它们。但是，你应该避免使用它们。这是一种不好的做法，而且如果要将数据迁移到其他数据库系统，很可能无法正常工作。


  #### 名称的大小写敏感性


  Windows 和 Mac OS X 将 MySQL 名称视为不区分大小写。但是，Linux 和 Unix 服务器会区分大小写。为了避免在将数据库和 PHP 代码从本地计算机传输到远程服务器时出现问题，我强烈建议您在所有数据库、表和字段名称中***只使用小写字母***。当使用多个单词构建名称时，用下划线连接它们。


  ### 使用 phpMyAdmin 创建新数据库


  在 phpMyAdmin 中创建新数据库很容易。


  启动 phpMyAdmin，然后选择主窗口顶部的 `Databases` 选项卡。在标记为 `Create new database` 的字段中键入新数据库的名称
  (`phpsols`)。将 `Collation` 下拉菜单保留为默认设置，然后单击 `Create`，如下面的屏幕截图所示：


  ![A978-1-4842-0635-5_10_Figa_HTML.jpg](img/A978-1-4842-0635-5_10_Figa_HTML.jpg)


  注意


  排序规则根据所用语言的规则确定记录的排序顺序。除非您使用的语言不是英语、瑞典语或芬兰语，否则永远不需要更改其值。


  您应该会看到数据库已创建的确认信息。


  ![A978-1-4842-0635-5_10_Figb_HTML.jpg](img/A978-1-4842-0635-5_10_Figb_HTML.jpg)


  在新数据库中创建表之前，最好先为其创建用户帐户。保持 phpMyAdmin 打开，因为您将在下一节中继续使用它。


  ### 创建特定于数据库的用户帐户


  MySQL 的新安装通常只有一个注册用户——名为“root”的超级用户帐户，它拥有对一切的完全控制权。（XAMPP 还会创建一个名为“pma”的用户帐户，phpMyAdmin
  使用它来实现本书未涵盖的高级功能。）root 用户只能用于顶级管理，例如创建和删除数据库、创建用户帐户以及导出和导入数据。每个单独的数据库都应该有至少一个（最好是两个）具有有限权限的专用用户帐户。


  当您将数据库上线时，应授予用户所需的最少权限，且不要更多。有四个重要的权限——全部以等效的 SQL 命令命名：


  - `SELECT`：从数据库表中检索记录

  - `INSERT`：向数据库中插入记录

  - `UPDATE`：更改现有记录

  - `DELETE`：删除记录，但不删除表或数据库（用于此的命令是 `DROP`）


  大多数情况下，访问者只需要检索信息，因此 `psread` 用户帐户将仅具有 `SELECT` 权限，并且是只读的。但是，对于用户注册或站点管理，您需要所有四个权限。这些权限将提供给
  `pswrite` 帐户。


