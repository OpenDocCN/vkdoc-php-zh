- '# 测试函数命名


  测试函数名应以`test`开头。


  不要害怕使用描述性函数名，即使它们很长。它们非常有帮助。我们想检查谁是最后注册的用户，根据我们的测试数据，我们知道应该是唯一用户`''rrd''`。因此，我们使用了`testIfWeGetRrdAsLastRegisteredUser`作为方法名。请记住，当向测试数据添加新用户时，也应更新此测试。


