    \ that an operation is successfully sent to the background. For this test, you\
    \ will have to create an operation in which metadata attribute sets the operation\
    \ as background. In Chapter [3](#663561_1_En_3_Chapter.xhtml), we learned how\
    \ to achieve that by passing a `Background` class instance to the `background`\
    \ parameter of the `OperationMetadata` attribute.\n\n```\npublic function testBackgroundOperation():\
    \ void\n{\n    $client = static::createClient();\n    $client->request('POST',\
    \ '/api/v1/operation', [], [], [\n        'HTTP_X-AUTH-TOKEN' => 'fYDg7nMhlvxAtL7KfBnS',\n\
    \        'HTTP_Content-Type' => 'application/json'\n    ], json_encode([\n   \
    \     'operation' => 'SendPaymentBackground',\n        'data' => [\n         \
    \   'amount' => 13.69,\n            'receiver' => 'hghgfyyfg'\n        ]\n   \
    \ ]));\n    $this->assertResponseStatusCodeSame(202);\n}\n```\n\nAs the operation\
    \ is flagged as background, the test should return a `202 ACCEPTED` code."
  raw: '### Listening to the Kernel Controller Event


    We are going to add a method in the KernelSubscriber class that we created in
    Chapter [1](#663561_1_En_1_Chapter.xhtml) to listen to the controller event.


    #### An Exception for Informing About Context Invalid Operations


    Before coding the event-associated subscriber, let’s write the exception that
    will be thrown when the operation cannot be performed.


    ```

    use Symfony\Component\HttpKernel\Attribute\WithHttpStatus;

    #[WithHttpStatus(403)]

    class InvalidContextForOperationException extends \RuntimeException

    {

    public function __construct(string $context, string $operation, int $code = 403,
    ?\Throwable $previous = null)

    {

    $msg = sprintf(''Operation %s does not belong to context %s'', $operation, $context);

    parent::__construct($msg, $code, $previous);

    }

    }

    ```


    The above exception extends the PHP **RuntimeException** . The “**WithHttpStatus**”
    attribute is responsible for the HTTP response that will be sent to the client
    when the exception is thrown, while the “$code” variable refers to the error code
    of the exception itself. In this specific case, both are set to 403, but they
    could be different if desired. We use a 403 Access Denied exception because we
    are denying access to the execution of an operation, although for different reasons
    than when we did it in Chapter [3](#663561_1_En_3_Chapter.xhtml) when we used
    the Symfony voters.


    #### The Kernel-Controller Subscriber


    Now that we have an exception to report context errors, let’s finally code the
    kernel-controller subscriber.


    ```

    public function onKernelController(ControllerEvent $event): void

    {

    $controllerAttributes = $event->getAttributes();

    $operationContextAttributes = $controllerAttributes[OperationContext::class] ??
    null;

    if(count($operationContextAttributes) > 0) {

    $operationContextAttribute = $operationContextAttributes[0];

    $apiInput = $this->validationHandler->deserializeAndValidate($event->getRequest()->getContent(),
    ApiInput::class, null);

    if(!in_array($apiInput->operation, $operationContextAttribute->context->getAllowedOperations()))
    {

    throw new InvalidContextForOperationException($operationContextAttribute->context->name,
    $apiInput->operation);

    }

    }

    }

    ```


    The above listener works as follows:


    *   It checks whether the event-associated controller is annotated with the OperationContext
    attribute.


    *   If the controller is wrapped with that attribute, it checks whether the operation
    can be executed using the *getAllowedOperations* method of the Context enum. If
    do not, it throws an InvalidContextForOperationException to inform about the error.


    #### Checking for an InvalidContextForOperationException in the KernelSubscriber


    As we have done with all exceptions so far, we must instruct the **KernelSubscriber**
    subscriber so that it can detect this exception and format the message as JSON.


    ```

    if($exception instanceof InvalidContextForOperationException){

    $event->setResponse(new JsonResponse([

    ''errors'' => [

    ''operation_endpoint_context'' => $exception->getMessage()

    ]

    ], 400));

    }

    ```


    As you can see, we have only been added another condition for the **InvalidContextForOperationException**.


    ### Conclusion


    Again, we have resorted to Symfony’s event system to capture the controller requests.
    This way, we can check whether the controller method is decorated with the OperationContext
    attribute and, if so, ensure that the context allows the requested operation execution.


    In the next chapter, we will create the necessary application tests to ensure
    that our API behaves as expected.


    # 5. Testing the API


    Having constructed and secured our operation-oriented API, it’s crucial to solidify
    its functionality and ensure it behaves as intended. This final chapter will show
    you how to use Symfony application tests to check the API works as expected.


    ## Section 1\. Creating the Test Class


    The Symfony Test Pack component allows us to easily create a test class by using
    the Symfony maker, so let’s use it to automatically generate the test class.


    ```

    bin/console make:test

    ```


    After executing the above command, it will require you to enter some input to
    create the test class:


    *   **The test type you want to generate**: Choose the *WebTestCase* type.


    *   **The name of the class**: Write the name you want.


    After it is finished, it will generate the test class in the */tests/* directory
    at the root of the project typically as *tests/Controller/ApiControllerTest.php*.
    If we open the test class, we will see something like this:


    ```

    namespace App\Tests;

    use Symfony\Bundle\FrameworkBundle\Test\WebTestCase;

    class ApiControllerTest extends WebTestCase

    {

    public function testSomething(): void

    {

    $client = static::createClient();

    $crawler = $client->request(''GET'', ''/'');

    $this->assertResponseIsSuccessful();

    $this->assertSelectorTextContains(''h1'', ''Hello World'');

    }

    }

    ```


    The class contains an example test (*testSomething*). Let’s examine its content
    line by line:


    1.  Creates a client instance so we can make requests


    2.  Executes a GET request to the URL


    3.  Checks that the response status code is in the 200–299 range


    4.  Checks whether the h1 selector contains the “Hello World” text


    This is only a template. If you run the test as is, it will fail because the “/”
    route and the expected HTML content (<h1>Hello World</h1>) do not exist in the
    application yet.


    Let’s write our tests in the next section.


    ### Conclusion


    In this section, we explored how to create a test class using the Symfony Test
    Pack component with the help of the Symfony maker. By executing the command *bin/console
    make:test*, we can easily generate a template for our test class, which includes
    a basic example test. In the next section, we are going to fill the test class
    with a set of tests so that we can cover the maximum number of use cases possible.


    ## Section 2\. The API Tests


    The following sections show a bunch of tests which test a specific case of use.


    *   To be able to send our custom HTTP headers, specifically the authentication
    token, we must prefix the header keys with the “HTTP_” string.


    When creating your own tests, you should use your User fixtures authentication
    tokens to authenticate against the API.


    ### Test a Successful Operation Execution


    This test checks that an operation is performed successfully.


    ```

    public function testOperationSuccess(): void

    {

    $client = static::createClient();

    $client->request(''POST'', ''/api/v1/operation'', [], [], [

    ''HTTP_X-AUTH-TOKEN'' => ''fYDg7nMhlvxAtL7KfBnS'',

    ''HTTP_Content-Type'' => ''application/json''

    ], json_encode([

    ''operation'' => ''SendPayment'',

    ''data'' => [

    ''amount'' => 13.69,

    ''receiver'' => ''hghgfyyfg''

    ]

    ]));

    $this->assertResponseStatusCodeSame(200);

    }

    ```


    The test sends an existing token, the operation payload contains an existing operation,
    and the required parameters are valid so that the test should return a *200 HTTP
    OK* code.


    ### Test a Successful Background Operation


    This test checks that an operation is successfully sent to the background. For
    this test, you will have to create an operation in which metadata attribute sets
    the operation as background. In Chapter [3](#663561_1_En_3_Chapter.xhtml), we
    learned how to achieve that by passing a Background class instance to the “background”
    parameter of the **OperationMetadata** attribute.


    ```

    public function testBackgroundOperation(): void

    {

    $client = static::createClient();

    $client->request(''POST'', ''/api/v1/operation'', [], [], [

    ''HTTP_X-AUTH-TOKEN'' => ''fYDg7nMhlvxAtL7KfBnS'',

    ''HTTP_Content-Type'' => ''application/json''

    ], json_encode([

    ''operation'' => ''SendPaymentBackground'',

    ''data'' => [

    ''amount'' => 13.69,

    ''receiver'' => ''hghgfyyfg''

    ]

    ]));

    $this->assertResponseStatusCodeSame(202);

    }

    ```


    As the operation is flagged as background, the test should return a *202 ACCEPTED*
    code.'
  trans: "\n### 监听内核控制器事件\n\n我们将在第 1 章创建的`KernelSubscriber`类中添加一个方法来监听控制器事件。\n\n####\
    \ 用于通知上下文操作无效的异常\n\n在编写事件相关的订阅器之前，我们先编写当操作无法执行时将抛出的异常。\n\n```\nuse Symfony\\Component\\\
    HttpKernel\\Attribute\\WithHttpStatus;\n#[WithHttpStatus(403)]\nclass InvalidContextForOperationException\
    \ extends \\RuntimeException\n{\n    public function __construct(string $context,\
    \ string $operation, int $code = 403, ?\\Throwable $previous = null)\n    {\n\
    \        $msg = sprintf('操作 %s 不属于上下文 %s', $operation, $context);\n        parent::__construct($msg,\
    \ $code, $previous);\n    }\n}\n```\n\n上述异常继承了 PHP 的 `RuntimeException`。`WithHttpStatus`\
    \ 属性负责在抛出异常时发送给客户端的 HTTP 响应，而 `$code` 变量则指异常本身的错误码。在此特定情况下，两者都设置为 403，但如有需要也可以设置不同的值。我们使用\
    \ 403 Access Denied 异常是因为我们拒绝执行某个操作的访问，尽管原因与在第 3 章中使用 Symfony 投票器时不同。\n\n####\
    \ 内核控制器订阅器\n\n现在我们有了一个用于报告上下文错误的异常，终于可以编写内核控制器订阅器了。\n\n```\npublic function onKernelController(ControllerEvent\
    \ $event): void\n{\n    $controllerAttributes = $event->getAttributes();\n   \
    \ $operationContextAttributes = $controllerAttributes[OperationContext::class]\
    \ ?? null;\n    if(count($operationContextAttributes) > 0) {\n        $operationContextAttribute\
    \ = $operationContextAttributes[0];\n        $apiInput = $this->validationHandler->deserializeAndValidate($event->getRequest()->getContent(),\
    \ ApiInput::class, null);\n        if(!in_array($apiInput->operation, $operationContextAttribute->context->getAllowedOperations()))\
    \ {\n            throw new InvalidContextForOperationException($operationContextAttribute->context->name,\
    \ $apiInput->operation);\n        }\n    }\n}\n```\n\n以上监听器的工作流程如下：\n\n- 检查与事件关联的控制器是否标注了\
    \ `OperationContext` 属性。\n- 如果控制器已标注该属性，则通过 `Context` 枚举的 `getAllowedOperations`\
    \ 方法检查操作是否可执行。如果不可执行，则抛出 `InvalidContextForOperationException` 异常以通知错误。\n\n####\
    \ 在 `KernelSubscriber` 中检查 `InvalidContextForOperationException`\n\n与迄今为止处理所有异常的方式一样，我们必须指示\
    \ `KernelSubscriber` 订阅器检测此异常并将消息格式化为 JSON。\n\n```\nif($exception instanceof InvalidContextForOperationException){\n\
    \    $event->setResponse(new JsonResponse([\n        'errors' => [\n         \
    \   'operation_endpoint_context' => $exception->getMessage()\n        ]\n    ],\
    \ 400));\n}\n```\n\n如您所见，我们仅为 `InvalidContextForOperationException` 添加了另一个条件。\n\
    \n### 结论\n\n我们再次借助 Symfony 的事件系统来捕获控制器请求。这样，我们就可以检查控制器方法是否标注了 `OperationContext`\
    \ 属性，如果是，则确保上下文允许请求的操作执行。\n\n在下一章中，我们将创建必要的应用程序测试，以确保我们的 API 按预期运行。\n\n# 5. 测试\
    \ API\n\n在构建并保护了我们的面向操作的 API 之后，巩固其功能并确保其按预期运行至关重要。本章作为最后一章，将向您展示如何使用 Symfony\
    \ 应用程序测试来检查 API 是否按预期工作。\n\n## 第 1 节 创建测试类\n\nSymfony Test Pack 组件允许我们通过 Symfony\
    \ 生成器轻松创建测试类，因此我们用它来自动生成测试类。\n\n```\nbin/console make:test\n```\n\n执行上述命令后，系统会要求您输入一些信息来创建测试类：\n\
    \n- **要生成的测试类型**：选择 `WebTestCase` 类型。\n- **类的名称**：输入您想要的名称。\n\n完成后，它将在项目根目录的 `/tests/`\
    \ 目录下生成测试类，通常为 `tests/Controller/ApiControllerTest.php`。如果我们打开测试类，会看到类似以下内容：\n\
    \n```\nnamespace App\\Tests;\nuse Symfony\\Bundle\\FrameworkBundle\\Test\\WebTestCase;\n\
    class ApiControllerTest extends WebTestCase\n{\n    public function testSomething():\
    \ void\n    {\n        $client = static::createClient();\n        $crawler = $client->request('GET',\
    \ '/');\n        $this->assertResponseIsSuccessful();\n        $this->assertSelectorTextContains('h1',\
    \ 'Hello World');\n    }\n}\n```\n\n该类包含一个示例测试（`testSomething`）。让我们逐行分析其内容：\n\n\
    1. 创建一个客户端实例，以便我们可以发送请求\n2. 向 URL 执行 GET 请求\n3. 检查响应状态码是否在 200–299 范围内\n4. 检查\
    \ `h1` 选择器是否包含 \"Hello World\" 文本\n\n这只是一个模板。如果您直接运行此测试，它会失败，因为 \"/\" 路由和预期的 HTML\
    \ 内容（`<h1>Hello World</h1>`）在应用程序中尚不存在。\n\n让我们在下一节编写我们的测试。\n\n### 结论\n\n在本节中，我们探讨了如何在\
    \ Symfony 生成器的帮助下，使用 Symfony Test Pack 组件创建测试类。通过执行 `bin/console make:test` 命令，我们可以轻松生成测试类的模板，其中包含一个基本的示例测试。在下一节中，我们将用一组测试填充测试类，以便覆盖尽可能多的用例。\n\
    \n## 第 2 节 API 测试\n\n以下各节展示了一系列测试，每个测试都针对特定的使用场景。\n\n- 为了能够发送自定义的 HTTP 标头，特别是身份验证令牌，我们必须使用\
    \ `HTTP_` 字符串作为标头键的前缀。\n\n在创建自己的测试时，应使用用户夹具中的身份验证令牌来对 API 进行身份验证。\n\n### 测试成功执行操作\n\
    \n此测试检查操作是否成功执行。\n\n```\npublic function testOperationSuccess(): void\n{\n   \
    \ $client = static::createClient();\n    $client->request('POST', '/api/v1/operation',\
    \ [], [], [\n        'HTTP_X-AUTH-TOKEN' => 'fYDg7nMhlvxAtL7KfBnS',\n        'HTTP_Content-Type'\
    \ => 'application/json'\n    ], json_encode([\n        'operation' => 'SendPayment',\n\
    \        'data' => [\n            'amount' => 13.69,\n            'receiver' =>\
    \ 'hghgfyyfg'\n        ]\n    ]));\n    $this->assertResponseStatusCodeSame(200);\n\
    }\n```\n\n该测试发送一个有效的令牌，操作负载包含一个现有操作，并且所需参数有效，因此测试应返回 `200 HTTP OK` 状态码。\n\n###\
    \ 测试成功后台操作\n\n此测试检查操作是否成功发送到后台。对于此测试，您需要创建一个操作，其元数据属性将操作标记为后台操作。在第 3 章中，我们学习了如何通过将\
    \ `Background` 类实例传递给 `OperationMetadata` 属性的 `background` 参数来实现这一点。\n\n```\n\
    public function testBackgroundOperation(): void\n{\n    $client = static::createClient();\n\
    \    $client->request('POST', '/api/v1/operation', [], [], [\n        'HTTP_X-AUTH-TOKEN'\
    \ => 'fYDg7nMhlvxAtL7KfBnS',\n        'HTTP_Content-Type' => 'application/json'\n\
    \    ], json_encode([\n        'operation' => 'SendPaymentBackground',\n     \
    \   'data' => [\n            'amount' => 13.69,\n            'receiver' => 'hghgfyyfg'\n\
    \        ]\n    ]));\n    $this->assertResponseStatusCodeSame(202);\n}\n```\n\n\
    由于该操作被标记为后台操作，测试应返回 `202 ACCEPTED` 状态码。\n"
- fmt: '### Test Invalid Operation Data


    In this case, we are going to test that an operation cannot be performed because
    the sent data is invalid.


    ```

    public function testOperationInvalidData(): void

    {

    $client = static::createClient();

    $client->request(''POST'', ''/api/v1/operation'', [], [], [

    ''HTTP_X-AUTH-TOKEN'' => ''fYDg7nMhlvxAtL7KfBnS'',

    ''HTTP_Content-Type'' => ''application/json''

    ], json_encode([

    ''operation'' => ''SendPayment'',

    ''data'' => [

    ''amount'' => 0,

    ''receiver'' => ''hghgfyyfg''

    ]

    ]));

    $this->assertResponseStatusCodeSame(400);

    }

    ```


    The test sends an invalid payload since the `amount` parameter must be greater
    than 0\. It should return a *400 Bad request* response. This test assumes that
    the operation input model contains an `amount` parameter, and such a parameter
    is wrapped by a Symfony `GreaterThan` validation constraint which specifies that
    the amount value must be greater than 0\. Let’s remember how the input model created
    in the first chapter looked like.


    ```

    readonly class SendPaymentInput

    {

    public function __construct(

    #[Assert\NotBlank(message: ''Receiver cannot be empty'')]

    public string $receiver,

    #[Assert\NotBlank(message: ''Amount cannot be empty'')]

    #[Assert\GreaterThan(0, message: ''Amount must be greater than 0'')]

    public float|int $amount,

    public ?string $label = null

    ){}

    }

    ```


    As you can see above, the `amount` parameter cannot be empty nor 0.


    ### Test an Unexisting Operation


    This test checks that an operation cannot be performed since it does not exist.


    ```

    public function testUnexistingOperation(): void

    {

    $client = static::createClient();

    $client->request(''POST'', ''/api/v1/operation'', [], [], [

    ''HTTP_X-AUTH-TOKEN'' => ''fYDg7nMhlvxAtL7KfBnS'',

    ''HTTP_Content-Type'' => ''application/json''

    ], json_encode([

    ''operation'' => ''SendPayme'',

    ''data'' => [

    ''amount'' => 0,

    ''receiver'' => ''hghgfyyfg''

    ]

    ]));

    $this->assertResponseStatusCodeSame(404);

    }

    ```


    The test sends an invalid operation name so that a *404 Not Found* response code
    should be returned.


    ### Test Missing Operation


    The test checks that an operation request validation fails since the operation
    name has not been sent.


    ```

    public function testMissingOperationName(): void

    {

    $client = static::createClient();

    $client->request(''POST'', ''/api/v1/operation'', [], [], [

    ''HTTP_X-AUTH-TOKEN'' => ''zPLhK8iQqg9fg7u5jnp'',

    ''HTTP_Content-Type'' => ''application/json''

    ], json_encode([

    ''operation'' => '''',

    ''data'' => [

    ''amount'' => 13.69,

    ''receiver'' => ''hghgfyyfg''

    ]

    ]));

    $this->assertResponseStatusCodeSame(422);

    }

    ```


    The test sends a valid data payload; however, the operation name is missing, which
    should result in a *422 UnprocessableEntityHttpException* code being returned.
    This response occurs because the absence of the operation name triggers an exception
    during the validation of the `ApiInput` model. Specifically, this happens when
    the request reaches the controller, where the Symfony `MapRequestPayload` attribute
    performs the validation and subsequently throws the `UnprocessableEntityHttpException`.


    ### Test an Invalid User Token


    This test checks that an operation is not performed because the token sent is
    invalid.


    ```

    public function testInvalidAuth(): void

    {

    $client = static::createClient();

    $client->request(''POST'', ''/api/v1/operation'', [], [], [

    ''HTTP_X-AUTH-TOKEN'' => ''fYDg7AtL7KfBnS'',

    ''HTTP_Content-Type'' => ''application/json''

    ], json_encode([

    ''operation'' => ''SendPayment'',

    ''data'' => [

    ''amount'' => 13.69,

    ''receiver'' => ''hghgfyyfg''

    ]

    ]));

    $this->assertResponseStatusCodeSame(401);

    }

    ```


    The test sends the right payload, but the header `X-AUTH-TOKEN` contains an invalid
    token, so the response code should be *401 Unauthorized*.


    ### Testing Unauthorized User


    This test checks that, as the user does not have the right role, the API rejects
    the operation execution.


    ```

    public function testUnauthorizedToExecuteOperation(): void

    {

    $client = static::createClient();

    $client->request(''POST'', ''/api/v1/operation'', [], [], [

    ''HTTP_X-AUTH-TOKEN'' => ''vWvn1GOu2Lx5foFgQrRp'',

    ''HTTP_Content-Type'' => ''application/json''

    ], json_encode([

    ''operation'' => ''SendPayment'',

    ''data'' => [

    ''amount'' => 13.69,

    ''receiver'' => ''hghgfyyfg''

    ]

    ]));

    $this->assertResponseStatusCodeSame(403);

    }

    ```


    The test sends the right payload and an existing user token, but this user does
    not hold the right role, so the returned code should be *403 Forbidden*. For executing
    this test, we should create a user holding a role that is not allowed to execute
    the `SendPayment` operation and use its token for the test.


    ### Testing an Invalid Context


    This test tries to request an operation execution which is not allowed for the
    context.


    ```

    public function testInvalidContext(): void

    {

    $client = static::createClient();

    $client->request(''POST'', ''/api/v1/inventory-management/operation'', [], [],
    [

    ''HTTP_X-AUTH-TOKEN'' => ''fYDg7nMhlvxAtL7KfBnS'',

    ''HTTP_Content-Type'' => ''application/json''

    ], json_encode([

    ''operation'' => ''SendPayment'',

    ''data'' => [

    ''amount'' => 13.69,

    ''receiver'' => ''hghgfyyfg''

    ]

    ]));

    $this->assertResponseStatusCodeSame(403);

    }

    ```


    The test sends the right payload and a valid user token, but as the `SendPayment`
    operation cannot be executed in the `inventory-management` context, a *403 Forbidden*
    response code should be returned.


    ### Making a Short Refactory


    You should notice that all the tests share the same code to send the API request.
    To improve readability and avoid duplication, we can create a private method to
    perform the API request.


    ```

    private function postOperation(array $payload, string $token, string $uri = ''/api/v1/operation''):
    void

    {

    static::createClient()->request(''POST'', $uri, [], [], [

    ''HTTP_X-AUTH-TOKEN'' => $token,

    ''HTTP_Content-Type'' => ''application/json'',

    ], json_encode($payload));

    }

    ```


    The above method receives the payload to send, the authentication token, and the
    URI to call. The `uri` parameter holds the `/api/v1/operation` path as a default
    value because it is used in most tests.


    Then we can use this method in our tests. For instance, let’s use it in the invalid
    context test.


    ```

    public function testInvalidContext(): void

    {

    $this->postOperation([

    ''operation'' => ''SendPayment'',

    ''data'' => [

    ''amount'' => 13.69,

    ''receiver'' => ''hghgfyyfg''

    ]], ''vWvn1GOu2Lx5foFgQrRp'');

    $this->assertResponseStatusCodeSame(403);

    }

    ```


    As you can see, thanks to this change, we stop repeating the logic of sending
    the request. We only need the payload and the authentication token in each test.


    ### Executing the Tests


    To execute the test, we have to execute the following command from the project
    root folder:


    ```

    bin/phpunit

    ```


    This will execute all your tests.


    ### Conclusion


    This chapter has provided a detailed guide on how to implement effective tests
    for an API using Symfony. Through various examples, we have learned to verify
    the expected behavior of operations, from successful execution to error handling
    and validations. These tests not only ensure the functionality of the API but
    also help maintain code quality throughout development. By integrating these testing
    practices, developers can ensure that their API is robust and reliable, thereby
    enhancing the overall experience for end users.


    ## Afterword


    Throughout this journey, we have explored the intricacies of crafting powerful
    and versatile operation-oriented APIs using PHP and the Symfony framework. We
    have traversed the path from defining operations and their input/output models
    to implementing security measures and optimizing performance with background execution.
    This afterword serves as a final reflection on the key takeaways and the advantages
    that an operation-oriented approach offers in the realm of API development.'
