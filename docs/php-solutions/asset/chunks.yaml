- fmt: "# Creating a database table\n\nNow that you have a database and dedicated\
    \ user accounts, you can begin creating tables. Let’s begin by creating a table\
    \ to hold the details of images, as shown in Figure [10-1](#A978-1-4842-0635-5_10_Chapter.html#Fig1)\
    \ at the beginning of this chapter. Before you can start entering data, you need\
    \ to define the table structure. This involves deciding the following:\n\n- The\
    \ name of the table\n- How many columns it will have\n- The name of each column\n\
    - What type of data will be stored in each column\n- Whether the column must always\
    \ have data in each field\n- Which column contains the table’s primary key\n\n\
    If you look at Figure [10-1](#A978-1-4842-0635-5_10_Chapter.html#Fig1), you can\
    \ see that the table contains three columns: `image_id` (primary key), `filename`,\
    \ and `caption`. Because it contains details of images, that’s a good name to\
    \ use for the table. There’s not much point in storing a filename without a caption,\
    \ so every column must contain data. Great! Apart from the data type, all the\
    \ decisions have been made. I’ll explain the data types as we go along.\n\n##\
    \ Defining the `images` table\n\nThese instructions show how to define a table\
    \ in phpMyAdmin. If you prefer to use Navicat or a different UI for MySQL, use\
    \ the settings in Table [10-1](#A978-1-4842-0635-5_10_Chapter.html#Tab1).\n\n\
    - The first column, `image_id`, is defined as type `INT`, which stands for integer.\
    \ Its attribute is set to `UNSIGNED`, which means that only positive numbers are\
    \ allowed. Its index is declared as `PRIMARY`, and the `A_I` (`AUTO_INCREMENT`)\
    \ check box is selected, so MySQL automatically inserts in this column the next\
    \ available number (starting at 1) whenever a new record is inserted.\n- The next\
    \ column, `filename`, is defined as type `VARCHAR` with a length of `25`. This\
    \ means it accepts up to 25 characters of text.\n- The final column, `caption`,\
    \ is also `VARCHAR` with a length of `120`, so it accepts up to 120 characters\
    \ of text.\n- The Null check box for all columns is deselected, so they must always\
    \ contain something. However, that “something” can be as little as an empty string.\
    \ I’ll describe the column types in more detail in the “Choosing the right column\
    \ type” section later in this chapter.\n- The following screenshot shows the options\
    \ after they have been set in phpMyAdmin (the columns to the right of `A_I` have\
    \ been left out because they don’t need to be filled in):\n\n**Table 10-1.** Settings\
    \ for the `images` table\n\n| Field | Type | Length/Values | Attributes | Null\
    \ | Index | A_I |\n| --- | --- | --- | --- | --- | --- | --- |\n| `image_id` |\
    \ `INT` | | `UNSIGNED` | Deselected | `PRIMARY` | Selected |\n| `filename` | `VARCHAR`\
    \ | `25` | | Deselected | | |\n| `caption` | `VARCHAR` | `120` | | Deselected\
    \ | | |\n\nLaunch phpMyAdmin, if it’s not already open, and select `phpsols` from\
    \ the list of databases on the left of the screen. This opens the `Structure`\
    \ tab, which reports that no tables have been found in the database. In the **Create\
    \ table** section, type the name of the new table (`images`) in the Name field\
    \ and enter 3 in the Number of columns field. Then click the **Go** button. The\
    \ next screen is where you define the table. There are a lot of options, but not\
    \ all of them need to be filled in. Table [10-1](#A978-1-4842-0635-5_10_Chapter.html#Tab1)\
    \ lists the settings for the `images` table.\n\n![A978-1-4842-0635-5_10_Figg_HTML.jpg](A978-1-4842-0635-5_10_Figg_HTML.jpg)\n\
    \n- Toward the bottom of the screen is an option for Storage Engine. This determines\
    \ the format used internally to store the database files. `InnoDB` became the\
    \ default in MySQL 5.5. Prior to that `MyISAM` was the default. I’ll explain the\
    \ differences between these storage engines in [Chapter 15](#A978-1-4842-0635-5_15_Chapter.html).\
    \ In the meantime, use `InnoDB`. Converting from one storage engine to another\
    \ is very simple.\n- When you have finished, click the **Save** button at the\
    \ bottom of the screen.\n\n**Tip**  \nIf you click **Go** instead of **Save**,\
    \ phpMyAdmin adds an extra column for you to define. If this happens, just click\
    \ **Save**. As long as you don’t enter values into the fields, phpMyAdmin ignores\
    \ the extra column.\n\nThe next screen lists the `images` table with a series\
    \ of actions you can perform on the table. Under **Action**, click **Structure**,\
    \ or click the **Structure** tab at the top of the screen. This displays the details\
    \ of the table you have just created.\n\n![A978-1-4842-0635-5_10_Figh_HTML.jpg](A978-1-4842-0635-5_10_Figh_HTML.jpg)\n\
    \nDon’t be alarmed by the fact that Collation displays `latin1_swedish_ci`. MySQL\
    \ was originally developed in Sweden, and Swedish uses the same sort order as\
    \ English (and Finnish). The underlining of `image_id` indicates that it’s the\
    \ table’s primary key. To edit any settings, click **Change** in the appropriate\
    \ row. This opens the previous screen and allows you to change the values.\n\n\
    **Tip**  \nIf you made a complete mess and want to start again, click the **Operations**\
    \ tab at the top of the screen. Then, in the **Delete data or table** section,\
    \ click **Delete the table (DROP)** and confirm that you want to drop the table.\
    \ (In SQL, `delete` refers only to records. You `drop` a table or a database.)\n\
    \n# Inserting records into a table\n\nNow that you have a table, you need to put\
    \ some data into it. Eventually, you’ll need to build your own content management\
    \ system using HTML forms, PHP, and SQL, but the quick and easy way to do it is\
    \ with phpMyAdmin."
  raw: '### Creating a database table


    Now that you have a database and dedicated user accounts, you can begin creating
    tables. Let’s begin by creating a table to hold the details of images, as shown
    in Figure [10-1](#A978-1-4842-0635-5_10_Chapter.html#Fig1) at the beginning of
    this chapter. Before you can start entering data, you need to define the table
    structure. This involves deciding the following:


    *   The name of the table

    *   How many columns it will have

    *   The name of each column

    *   What type of data will be stored in each column

    *   Whether the column must always have data in each field

    *   Which column contains the table’s primary key


    If you look at Figure [10-1](#A978-1-4842-0635-5_10_Chapter.html#Fig1), you can
    see that the table contains three columns: `image_id` (primary key), `filename`,
    and `caption`. Because it contains details of images, that’s a good name to use
    for the table. There’s not much point in storing a filename without a caption,
    so every column must contain data. Great! Apart from the data type, all the decisions
    have been made. I’ll explain the data types as we go along.


    #### Defining the images table


    These instructions show how to define a table in phpMyAdmin. If you prefer to
    use Navicat or a different UI for MySQL, use the settings in Table [10-1](#A978-1-4842-0635-5_10_Chapter.html#Tab1).


    *   The first column, `image_id`, is defined as type `INT`, which stands for integer.
    Its attribute is set to `UNSIGNED`, which means that only positive numbers are
    allowed. Its index is declared as `PRIMARY`, and the `A_I` (`AUTO_INCREMENT`)
    check box is selected, so MySQL automatically inserts in this column the next
    available number (starting at 1) whenever a new record is inserted.

    *   The next column, `filename`, is defined as type `VARCHAR` with a length of
    `25`. This means it accepts up to 25 characters of text.

    *   The final column, `caption`, is also `VARCHAR` with a length of `120`, so
    it accepts up to 120 characters of text.

    *   The Null check box for all columns is deselected, so they must always contain
    something. However, that “something” can be as little as an empty string. I’ll
    describe the column types in more detail in the “Choosing the right column type”
    section later in this chapter.

    *   The following screenshot shows the options after they have been set in phpMyAdmin
    (the columns to the right of `A_I` have been left out because they don’t need
    to be filled in):


    Table 10-1.


    Settings for the `images` table


    | Field | Type | Length/Values | Attributes | Null | Index | A_I |

    | --- | --- | --- | --- | --- | --- | --- |

    | `image_id` | `INT` |   | `UNSIGNED` | Deselected | `PRIMARY` | Selected |

    | `filename` | `VARCHAR` | `25` |   | Deselected |   |   |

    | `caption` | `VARCHAR` | `120` |   | Deselected |   |   |


    Launch phpMyAdmin, if it’s not already open, and select phpsols from the list
    of databases on the left of the screen. This opens the `Structure` tab, which
    reports that no tables have been found in the database.   In the Create table
    section, type the name of the new table (`images`) in the Name field and enter
    3 in the Number of columns field. Then click the Go button.   The next screen
    is where you define the table. There are a lot of options, but not all of them
    need to be filled in. Table [10-1](#A978-1-4842-0635-5_10_Chapter.html#Tab1) lists
    the settings for the `images` table.


    ![A978-1-4842-0635-5_10_Figg_HTML.jpg](A978-1-4842-0635-5_10_Figg_HTML.jpg)


    *   Toward the bottom of the screen is an option for Storage Engine. This determines
    the format used internally to store the database files. InnoDB became the default
    in MySQL 5.5\. Prior to that MyISAM was the default. I’ll explain the differences
    between these storage engines in [Chapter 15](#A978-1-4842-0635-5_15_Chapter.html).
    In the meantime, use InnoDB. Converting from one storage engine to another is
    very simple.

    *   When you have finished, click the Save button at the bottom of the screen.


    Tip


    If you click Go instead of Save, phpMyAdmin adds an extra column for you to define.
    If this happens, just click Save. As long as you don’t enter values into the fields,
    phpMyAdmin ignores the extra column.


    The next screen lists the `images` table with a series of actions you can perform
    on the table. Under Action, click Structure, or click the Structure tab at the
    top of the screen. This displays the details of the table you have just created.


    ![A978-1-4842-0635-5_10_Figh_HTML.jpg](A978-1-4842-0635-5_10_Figh_HTML.jpg)


    Don’t be alarmed by the fact that Collation displays latin1_swedish_ci. MySQL
    was originally developed in Sweden, and Swedish uses the same sort order as English
    (and Finnish). The underlining of `image_id` indicates that it’s the table’s primary
    key. To edit any settings, click Change in the appropriate row. This opens the
    previous screen and allows you to change the values.


    Tip


    If you made a complete mess and want to start again, click the Operations tab
    at the top of the screen. Then, in the Delete data or table section, click Delete
    the table (DROP) and confirm that you want to drop the table. (In SQL, delete
    refers only to records. You drop a table or a database.)


    ### Inserting records into a table


    Now that you have a table, you need to put some data into it. Eventually, you’ll
    need to build your own content management system using HTML forms, PHP, and SQL,
    but the quick and easy way to do it is with phpMyAdmin.'
  trans: "\n# 创建数据库表\n\n既然你已经拥有了数据库和专用用户账户，现在可以开始创建表了。首先，我们来创建一个存储图片详情的数据表，如本章开头的图\
    \ 10-1 所示。在开始输入数据之前，你需要定义表结构。这包括决定以下内容：\n\n- 表的名称\n- 包含多少列\n- 每一列的名称\n- 每一列将存储何种数据类型\n\
    - 各字段是否必须始终包含数据\n- 哪一列作为表的主键\n\n如果你查看图 10-1，可以看到该表包含三列：`image_id`（主键）、`filename`\
    \ 和 `caption`。由于它存储的是图片详情，因此“images”是一个不错的表名。存储文件名而不附带说明意义不大，所以每列都必须包含数据。很好！除了数据类型之外，所有决定都已做出。我将在后续讲解中介绍数据类型。\n\
    \n## 定义 `images` 表\n\n以下说明展示了如何在 phpMyAdmin 中定义表。如果你更倾向于使用 Navicat 或其他 MySQL 界面工具，请参照表\
    \ 10-1 中的设置。\n\n- 第一列 `image_id` 定义为类型 `INT`（代表整数）。其属性设为 `UNSIGNED`，意味着只允许正数。其索引声明为\
    \ `PRIMARY`，并且选中了 `A_I`（`AUTO_INCREMENT`）复选框，这样每当插入新记录时，MySQL 会自动在此列填入下一个可用数字（从\
    \ 1 开始）。\n- 下一列 `filename` 定义为类型 `VARCHAR`，长度为 `25`。这意味着它最多接受 25 个字符的文本。\n- 最后一列\
    \ `caption` 也为 `VARCHAR`，长度为 `120`，因此最多接受 120 个字符的文本。\n- 所有列的“Null”复选框均未选中，因此它们必须始终包含内容。不过，这个“内容”可以仅仅是一个空字符串。我将在本章后面的“选择正确的列类型”一节中更详细地介绍列类型。\n\
    - 以下截图显示了在 phpMyAdmin 中设置完成后的选项（`A_I` 右侧的列已被省略，因为它们无需填写）：\n\n**表 10-1.** `images`\
    \ 表的设置\n\n| 字段 | 类型 | 长度/值 | 属性 | 空值 | 索引 | A_I |\n| --- | --- | --- | --- | ---\
    \ | --- | --- |\n| `image_id` | `INT` | | `UNSIGNED` | 未选中 | `PRIMARY` | 已选中 |\n\
    | `filename` | `VARCHAR` | `25` | | 未选中 | | |\n| `caption` | `VARCHAR` | `120`\
    \ | | 未选中 | | |\n\n启动 phpMyAdmin（如果尚未打开），然后从屏幕左侧的数据库列表中选择 `phpsols`。这将打开“结构”选项卡，并提示未在数据库中找到任何表。在\
    \ **创建表** 部分，在“名称”字段中输入新表的名称（`images`），并在“列数”字段中输入 3。然后点击 **执行** 按钮。下一个屏幕是你定义表的地方。这里有很多选项，但并非所有都需要填写。表\
    \ 10-1 列出了 `images` 表的设置。\n\n![A978-1-4842-0635-5_10_Figg_HTML.jpg](img/A978-1-4842-0635-5_10_Figg_HTML.jpg)\n\
    \n- 靠近屏幕底部有一个存储引擎的选项。这决定了用于内部存储数据库文件的格式。`InnoDB` 自 MySQL 5.5 起成为默认引擎。在此之前 `MyISAM`\
    \ 是默认引擎。我将在第 15 章中解释这些存储引擎之间的区别。在此之前，请使用 `InnoDB`。从一种存储引擎转换到另一种非常简单。\n- 完成后，点击屏幕底部的\
    \ **保存** 按钮。\n\n**提示**  \n如果你点击的是 **执行** 而非 **保存**，phpMyAdmin 会添加一个额外的列供你定义。如果发生这种情况，只需点击\
    \ **保存**。只要不在字段中输入值，phpMyAdmin 就会忽略该额外列。\n\n下一个屏幕列出了 `images` 表以及一系列可对其执行的操作。在\
    \ **操作** 下，点击 **结构**，或者点击屏幕顶部的 **结构** 选项卡。这将显示你刚刚创建的表的详细信息。\n\n![A978-1-4842-0635-5_10_Figh_HTML.jpg](img/A978-1-4842-0635-5_10_Figh_HTML.jpg)\n\
    \n不必因为“排序规则”显示为 `latin1_swedish_ci` 而惊慌。MySQL 最初是在瑞典开发的，瑞典语的排序规则与英语（及芬兰语）相同。`image_id`\
    \ 的下划线表明它是表的主键。要编辑任何设置，请点击相应行的 **更改**。这将打开之前的屏幕，并允许你修改数值。\n\n**提示**  \n如果你完全搞砸了想重新开始，请点击屏幕顶部的\
    \ **操作** 选项卡。然后在 **删除数据或表** 部分，点击 **删除表 (DROP)** 并确认你要删除该表。（在 SQL 中，`delete` 仅指记录。删除表或数据库使用\
    \ `drop`。）\n\n# 向表中插入记录\n\n既然你已经有了表，就需要向其中放入一些数据。最终，你需要使用 HTML 表单、PHP 和 SQL 构建自己的内容管理系统，但使用\
    \ phpMyAdmin 是快捷简便的方法。\n"
- fmt: "### Using phpMyAdmin to insert records manually\n\nThese instructions show\
    \ how to add records to the `images` table through the phpMyAdmin interface.\n\
    \nIf phpMyAdmin is still displaying the structure of the `images` table as at\
    \ the end of the previous section, skip to step 2. Otherwise, launch phpMyAdmin\
    \ and select the `phpsols` database from the list on the left. Then click `Structure`\
    \ to the right of `images`, as shown in the following screenshot:\n\n![A978-1-4842-0635-5_10_Figi_HTML.jpg](A978-1-4842-0635-5_10_Figi_HTML.jpg)\n\
    \n**Tip:** The breadcrumb trail at the top of the main frame provides the context\
    \ for the tabs across the head of the page. The `Structure` tab at the top left\
    \ of the preceding screenshot refers to the structure of the `phpsols` database.\
    \ To access the structure of an individual table, click the `Structure` link alongside\
    \ the table’s name.\n\nClick the `Insert` tab in the center top of the page. This\
    \ displays the following screen, ready for you to insert up to two records:\n\n\
    ![A978-1-4842-0635-5_10_Figj_HTML.jpg](A978-1-4842-0635-5_10_Figj_HTML.jpg)\n\n\
    Click the `Go` button at the bottom of the second form. The SQL used to insert\
    \ the records is displayed at the top of the page. I’ll explain the basic SQL\
    \ commands in the remaining chapters, but studying the SQL that phpMyAdmin displays\
    \ is a good way to learn how to build your own queries. SQL is closely based on\
    \ human language, so it isn’t all that difficult to learn.\n\nClick the `Browse`\
    \ tab at the top left of the page. You should now see the first two entries in\
    \ the `images` table, as shown here:\n\n*   Normally, the `Ignore` check box is\
    \ automatically deselected when you add values to the second form, but deselect\
    \ it if necessary.\n\nIn the second form, leave the `Value` field for `image_id`\
    \ blank and fill in the next two fields like this:\n\n*   `filename`: `fountains.jpg`\n\
    *   `caption`: `Fountains in central Tokyo`\n\n*   Because you have defined `image_id`\
    \ as `AUTO_INCREMENT`, MySQL inserts the next available number automatically.\
    \ So you must leave the `image_id` `Value` field blank. Fill in the next two `Value`\
    \ fields as follows:\n    *   `filename`: `basin.jpg`\n    *   `caption`: `Water\
    \ basin at Ryoanji temple, Kyoto`\n\nThe forms display the names and details of\
    \ each column. You can ignore the `Function` fields. MySQL has a large number\
    \ of functions that you can apply to the values being stored in your table. You’ll\
    \ learn more about them in the following chapters. The `Value` field is where\
    \ you enter the data you want to insert in the table.\n\n![A978-1-4842-0635-5_10_Figk_HTML.jpg](A978-1-4842-0635-5_10_Figk_HTML.jpg)\n\
    \n*   As you can see, MySQL has inserted `1` and `2` in the `image_id` fields.\n\
    \nYou could continue typing out the details of the remaining six images, but let’s\
    \ speed things up a bit by using an SQL file that contains all the necessary data.\n\
    \n### Loading the images records from an SQL file\n\nBecause the primary key of\
    \ the `images` table has been set to `AUTO_INCREMENT`, it’s necessary to drop\
    \ the table and all its data. The SQL file does this automatically and builds\
    \ the table from scratch. These instructions assume that phpMyAdmin is open to\
    \ the page in step 6 of the previous section.\n\nIf you’re happy to overwrite\
    \ the data in the `images` table, skip to step 2. However, if you have entered\
    \ data that you don’t want to lose, copy your data to a different table. Click\
    \ the `Operations` tab at the top of the page, type the name of the new table\
    \ in the blank field in the section titled `Copy table to (database.table)`, and\
    \ click `Go`. The following screenshot shows the settings for copying the structure\
    \ and data of the `images` table to `images_backup` within the `phpsols` database.\n\
    \n![A978-1-4842-0635-5_10_Figl_HTML.jpg](A978-1-4842-0635-5_10_Figl_HTML.jpg)\n\
    \nClick the `Import` tab at the top of the page. In the next screen, click the\
    \ `Browse` (or `Choose File`) button in `File to import`, then navigate to `images.sql`\
    \ in the `ch10` folder. Leave all options at their default setting, and click\
    \ `Go` at the foot of the page.\n\n*   After clicking `Go` you should see confirmation\
    \ that the table has been copied. The breadcrumb trail at the top of the page\
    \ indicates that phpMyAdmin is still in the `images` table, so you can proceed\
    \ to step 2, even though you have a different page onscreen.\n\n![A978-1-4842-0635-5_10_Figm_HTML.jpg](A978-1-4842-0635-5_10_Figm_HTML.jpg)\n\
    \nphpMyAdmin drops the original table, creates a new version, and inserts all\
    \ the records. When you see confirmation that the file has been imported, click\
    \ the `Browse` button at the top left of the page. You should now see the same\
    \ data as shown in Figure 10-1 at the beginning of the chapter.\n\nIf you open\
    \ `images.sql` in a text editor, you’ll see that it contains the SQL commands\
    \ that create the `images` table and populate it with data. This is how the table\
    \ is built:\n\n```\nDROP TABLE IF EXISTS `images`;\n\nCREATE TABLE `images` (\n\
    \n `image_id` int(10) unsigned NOT NULL AUTO_INCREMENT,\n\n `filename` varchar(25)\
    \ NOT NULL,\n\n `caption` varchar(120) NOT NULL,\n\nPRIMARY KEY (`image_id`)\n\
    \n) ENGINE=InnoDB  DEFAULT CHARSET=latin1 AUTO_INCREMENT=9 ;\n```\n\nImporting\
    \ data from an SQL file like this is how you transfer data from your local testing\
    \ environment to the remote server where your website is located. Assuming that\
    \ your hosting company provides phpMyAdmin for you to administer your remote database,\
    \ all you need to do to transfer the data is to launch the version of phpMyAdmin\
    \ on your remote server, click the `Import` tab, select the SQL file on your local\
    \ computer, and click `Go`.\n\nThe next section describes how to create the SQL\
    \ file."
