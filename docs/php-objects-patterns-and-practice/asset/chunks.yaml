  trans: "\n# 模式启示录\n\n我最初是在 Java 语言中使用对象。可以想见，某些概念花了些时间才真正理解。不过一旦开窍，进展就快得像顿悟一般。继承和封装的美妙深深震撼了我。我能感受到这是定义和构建系统的一种不同方式。我理解了多态——处理一种类型并在运行时切换实现。当时在我看来，这种理解能解决大部分设计问题，帮助我设计出优美而雅致的系统。\n\
    \n当时桌面上所有书籍都聚焦于语言特性以及 Java 程序员可用的众多 API。除了对多态的简要定义外，几乎没有探讨设计策略的内容。\n\n仅凭语言特性并不能催生面向对象设计。尽管我的项目满足了功能需求，但继承、封装和多态看似许诺的那种设计却始终与我失之交臂。\n\
    \n当我想为每种可能情况都构建新类时，我的继承层次变得又宽又深。我的系统结构使得在层级间传递消息变得困难，要么让中间类过度了解周边环境，要么将它们绑定到应用程序中使其无法在新的上下文中使用。\n\
    \n直到我发现了《设计模式：可复用面向对象软件的基础》（Addison-Wesley Professional，1995 年）——也就是著名的\"四人帮\"\
    （GoF）著作——我才意识到自己错过了整个设计维度。那时我虽然已经自己发现了某些核心模式，但其他模式还是帮助我形成了全新的思维方式。\n\n我发现自己在设计中过度偏重继承，试图在类中构建过多功能。但在面向对象系统中，功能还能放在哪里呢？\n\
    \n我在组合中找到了答案。软件组件可以通过在运行时组合灵活关系的对象来定义。四人帮将此提炼为一条原则：\"优先使用组合而非继承\"。这些模式描述了在运行时组合对象的方式，能达到仅靠继承树无法企及的灵活性。\n\
    \n## 组合与继承\n\n继承是为应对变化场景或上下文而设计的强大方式。但它可能限制灵活性，特别是当类承担多重职责时。\n\n### 问题所在\n\n如你所知，子类会继承父类的方法和属性（只要它们是受保护或公开元素）。你可以利用这一点来设计提供特定功能的子类。\n\
    \n图 8-1 展示了使用 UML 的简单示例。\n\n![A314621_5_En_8_Fig1_HTML.gif](img/A314621_5_En_8_Fig1_HTML.gif)\n\
    \n图 8-1.  \n一个父类与两个子类\n\n图 8-1 中的抽象`Lesson`类对大学课程进行建模。它定义了抽象的`cost()`和`chargeType()`方法。图示展示了两个实现类：`FixedPriceLesson`和`TimedPriceLesson`，它们为课程提供不同的计费机制。\n\
    \n使用这种继承方案，我可以在课程实现之间切换。客户端代码只需知道它处理的是`Lesson`对象，因此费用细节是透明的。\n\n但如果引入一组新的特化呢？我需要处理讲座和研讨会。由于它们在组织报名和课程资料方面方式不同，因此需要单独的类。现在我的设计面临两种力量：既要处理定价策略，又要区分讲座和研讨会。\n\
    \n图 8-2 展示了一种简单粗暴的解决方案。\n\n![A314621_5_En_8_Fig2_HTML.gif](img/A314621_5_En_8_Fig2_HTML.gif)\n\
    \n图 8-2.  \n糟糕的继承结构\n\n图 8-2 展示了明显有缺陷的层次结构。我再也无法通过继承树来管理定价机制，而无需重复大量功能。定价策略在`Lecture`和`Seminar`类族中镜像存在。\n\
    \n此时，我可能会考虑在`Lesson`超类中使用条件语句，消除这些令人遗憾的重复。本质上，我将定价逻辑完全移出继承树，将其上提至超类。这与通常的重构方向相反——通常你会用多态替换条件语句。以下是修改后的`Lesson`类：\n\
    \n```\n// 代码清单 08.01\nabstract class Lesson\n{\nprotected $duration;\nconst  \
    \   FIXED = 1;\nconst     TIMED = 2;\nprivate   $costtype;\n\npublic function\
    \ __construct(int $duration, int $costtype = 1)\n{\n$this->duration = $duration;\n\
    $this->costtype = $costtype;\n}\n\npublic function cost(): int\n{\nswitch ($this->costtype)\
    \ {\ncase self::TIMED:\nreturn (5 * $this->duration);\nbreak;\ncase self::FIXED:\n\
    return 30;\nbreak;\ndefault:\n$this->costtype = self::FIXED;\nreturn 30;\n}\n\
    }\n\npublic function chargeType(): string\n{\nswitch ($this->costtype) {\ncase\
    \ self::TIMED:\nreturn \"hourly rate\";\nbreak;\ncase self::FIXED:\nreturn \"\
    fixed rate\";\nbreak;\ndefault:\n$this->costtype = self::FIXED;\nreturn \"fixed\
    \ rate\";\n}\n}\n\n// 更多课程方法...\n}\n\n// 代码清单 08.02\nclass Lecture extends Lesson\n\
    {\n// 讲座特定实现...\n}\n\n// 代码清单 08.03\nclass Seminar extends Lesson\n{\n// 研讨会特定实现...\n\
    }\n```\n\n以下是我使用这些类的方式：\n\n```\n// 代码清单 08.04\n$lecture = new Lecture(5, Lesson::FIXED);\n\
    print \"{$lecture->cost()} ({$lecture->chargeType()})\\n\";\n$seminar = new Seminar(3,\
    \ Lesson::TIMED);\nprint \"{$seminar->cost()} ({$seminar->chargeType()})\\n\"\
    ;\n```\n\n输出如下：\n\n```\n30 (fixed rate)\n15 (hourly rate)\n```\n\n你可以在图 8-3 中看到新的类图。\n\
    \n![A314621_5_En_8_Fig3_HTML.gif](img/A314621_5_En_8_Fig3_HTML.gif)\n\n图 8-3.\
    \  \n通过从子类中移除费用计算来改进的继承层次\n\n我让类结构变得更容易管理，但付出了代价。在这段代码中使用条件语句是一种倒退。通常你会尝试用多态替换条件语句，而这里我反其道而行之。如你所见，这迫使我在`chargeType()`和`cost()`方法中重复了相同的条件语句。\n\
    \n我似乎注定了要重复代码。\n"
- fmt: "### Using Composition\n\nI can use the Strategy pattern to compose my way\
    \ out of trouble. Strategy is used to move a set of algorithms into a separate\
    \ type. By moving cost calculations, I can simplify the `Lesson` type. You can\
    \ see this in Figure [8-4](#A314621_5_En_8_Chapter.html#Fig4).\n\n![A314621_5_En_8_Fig4_HTML.gif](A314621_5_En_8_Fig4_HTML.gif)\n\
    \nFigure 8-4. Moving algorithms into a separate type\n\nI create an abstract class,\
    \ `CostStrategy`, which defines the abstract methods, `cost()` and `chargeType()`.\
    \ The `cost()` method requires an instance of `Lesson`, which it will use to generate\
    \ cost data. I provide two implementations for `CostStrategy`. `Lesson` objects\
    \ work only with the `CostStrategy` type, not a specific implementation, so I\
    \ can add new cost algorithms at any time by subclassing `CostStrategy`. This\
    \ would require no changes at all to any `Lesson` classes.\n\nHere’s a simplified\
    \ version of the new `Lesson` class illustrated in Figure [8-4](#A314621_5_En_8_Chapter.html#Fig4):\n\
    \n```php\n// listing 08.05\nabstract class Lesson\n{\n    private $duration;\n\
    \    private $costStrategy;\n    public function __construct(int $duration, CostStrategy\
    \ $strategy)\n    {\n        $this->duration = $duration;\n        $this->costStrategy\
    \ = $strategy;\n    }\n    public function cost(): int\n    {\n        return\
    \ $this->costStrategy->cost($this);\n    }\n    public function chargeType():\
    \ string\n    {\n        return $this->costStrategy->chargeType();\n    }\n  \
    \  public function getDuration(): int\n    {\n        return $this->duration;\n\
    \    }\n    // more lesson methods...\n}\n// listing 08.06\nclass Lecture extends\
    \ Lesson\n{\n    // Lecture-specific implementations ...\n}\n// listing 08.07\n\
    class Seminar extends Lesson\n{\n    // Seminar-specific implementations ...\n\
    }\n```\n\nThe `Lesson` class requires a `CostStrategy` object, which it stores\
    \ as a property. The `Lesson::cost()` method simply invokes `CostStrategy::cost()`.\
    \ Equally, `Lesson::chargeType()` invokes `CostStrategy::chargeType()`. This explicit\
    \ invocation of another object’s method in order to fulfill a request is known\
    \ as delegation. In my example, the `CostStrategy` object is the delegate of `Lesson`.\
    \ The `Lesson` class washes its hands of responsibility for cost calculations\
    \ and passes on the task to a `CostStrategy` implementation. Here, it is caught\
    \ in the act of delegation:\n\n```php\npublic function cost(): int\n{\n    return\
    \ $this->costStrategy->cost($this);\n}\n```\n\nHere is the `CostStrategy` class,\
    \ together with its implementing children:\n\n```php\n// listing 08.08\nabstract\
    \ class CostStrategy\n{\n    abstract public function cost(Lesson $lesson): int;\n\
    \    abstract public function chargeType(): string;\n}\n// listing 08.09\nclass\
    \ TimedCostStrategy extends CostStrategy\n{\n    public function cost(Lesson $lesson):\
    \ int\n    {\n        return ($lesson->getDuration() * 5);\n    }\n    public\
    \ function chargeType(): string\n    {\n        return \"hourly rate\";\n    }\n\
    }\n// listing 08.10\nclass FixedCostStrategy extends CostStrategy\n{\n    public\
    \ function cost(Lesson $lesson): int\n    {\n        return 30;\n    }\n    public\
    \ function chargeType(): string\n    {\n        return \"fixed rate\";\n    }\n\
    }\n```\n\nI can change the way that any `Lesson` object calculates cost by passing\
    \ it a different `CostStrategy` object at runtime. This approach then makes for\
    \ highly flexible code. Rather than building functionality into my code structures\
    \ statically, I can combine and recombine objects dynamically:\n\n```php\n// listing\
    \ 08.11\n$lessons[] = new Seminar(4, new TimedCostStrategy());\n$lessons[] = new\
    \ Lecture(4, new FixedCostStrategy());\nforeach ($lessons as $lesson) {\n    print\
    \ \"lesson charge {$lesson->cost()}. \";\n    print \"Charge type: {$lesson->chargeType()}\\\
    n\";\n}\nlesson charge 20. Charge type: hourly rate\nlesson charge 30. Charge\
    \ type: fixed rate\n```\n\nAs you can see, one effect of this structure is that\
    \ I have focused the responsibilities of my classes. `CostStrategy` objects are\
    \ responsible solely for calculating cost, and `Lesson` objects manage lesson\
    \ data.\n\nSo, composition can make your code more flexible because objects can\
    \ be combined to handle tasks dynamically in many more ways than you can anticipate\
    \ in an inheritance hierarchy alone. There can be a penalty with regard to readability,\
    \ though. Because composition tends to result in more types, with relationships\
    \ that aren’t fixed with the same predictability as they are in inheritance relationships,\
    \ it can be slightly harder to digest the relationships in a system.\n\n## Decoupling\n\
    \nYou saw in Chapter [6](#A314621_5_En_6_Chapter.html) that it makes sense to\
    \ build independent components. A system with highly interdependent classes can\
    \ be hard to maintain. A change in one location can require a cascade of related\
    \ changes across the system.\n\n### The Problem\n\nReusability is one of the key\
    \ objectives of object-oriented design, and tight coupling is its enemy. You can\
    \ diagnose tight coupling when you see that a change to one component of a system\
    \ necessitates many changes elsewhere. You should aspire to create independent\
    \ components, so that you can make changes without a domino effect of unintended\
    \ consequences. When you alter a component, the extent to which it is independent\
    \ is related to the likelihood that your changes will cause other parts of your\
    \ system to fail.\n\nYou saw an example of tight coupling in Figure [8-2](#A314621_5_En_8_Chapter.html#Fig2).\
    \ Because the cost logic was mirrored across the `Lecture` and `Seminar` types,\
    \ a change to `TimedPriceLecture` would necessitate a parallel change to the same\
    \ logic in `TimedPriceSeminar`. By updating one class and not the other, I would\
    \ break my system—without any warning from the PHP engine. My first solution,\
    \ using a conditional statement, produced a similar dependency between the `cost()`\
    \ and `chargeType()` methods.\n\nBy applying the Strategy pattern, I distilled\
    \ my cost algorithms into the `CostStrategy` type, locating them behind a common\
    \ interface and implementing each only once.\n\nCoupling of another sort can occur\
    \ when many classes in a system are embedded explicitly into a platform or environment.\
    \ Let’s say that you are building a system that works with a MySQL database, for\
    \ example. You might use methods such as `mysqli::query()` to speak to the database\
    \ server.\n\nShould you be required to deploy the system on a server that does\
    \ not support MySQL, you could convert your entire project to use SQLite. You\
    \ would be forced to make changes throughout your code, though, and face the prospect\
    \ of maintaining two parallel versions of your application.\n\nThe problem here\
    \ is not the system’s dependency on an external platform. Such a dependency is\
    \ inevitable. You need to work with code that speaks to a database. The problem\
    \ comes when such code is scattered throughout a project. Talking to databases\
    \ is not the primary responsibility of most classes in a system, so the best strategy\
    \ is to extract such code and group it together behind a common interface. In\
    \ this way, you promote the independence of your classes. At the same time, by\
    \ concentrating your gateway code in one place, you make it much easier to switch\
    \ to a new platform without disturbing your wider system. This process, the hiding\
    \ of implementation behind a clean interface, is known as encapsulation. The Doctrine\
    \ database library solves this problem with the `DBAL` (database abstraction layer)\
    \ project. This provides a single point of access for multiple databases.\n\n\
    The `DriverManager` class provides a static method called `getConnection()` that\
    \ accepts a parameters array. According to the makeup of this array, it returns\
    \ a particular implementation of an interface called `Doctrine\\DBAL\\Driver`.\
    \ You can see the class structure in Figure [8-5](#A314621_5_En_8_Chapter.html#Fig5).\n\
    \n![A314621_5_En_8_Fig5_HTML.gif](A314621_5_En_8_Fig5_HTML.gif)\n\nFigure 8-5.\
    \ The DBAL package decouples client code from database objects\n\nThe `DBAL` package,\
    \ then, lets you decouple your application code from the specifics of your database\
    \ platform. You should be able to run a single system with MySQL, SQLite, MSSQL,\
    \ and others without changing a line of code (apart from your configuring parameters,\
    \ of course)."
  raw: '### Using Composition


    I can use the Strategy pattern to compose my way out of trouble. Strategy is used
    to move a set of algorithms into a separate type. By moving cost calculations,
    I can simplify the `Lesson` type. You can see this in Figure [8-4](#A314621_5_En_8_Chapter.html#Fig4).


    ![A314621_5_En_8_Fig4_HTML.gif](A314621_5_En_8_Fig4_HTML.gif)


    Figure 8-4.


    Moving algorithms into a separate type


    I create an abstract class , `CostStrategy`, which defines the abstract methods,
    `cost()` and `chargeType()` . The `cost()` method requires an instance of `Lesson`,
    which it will use to generate cost data. I provide two implementations for `CostStrategy.
    Lesson` objects work only with the `CostStrategy` type, not a specific implementation,
    so I can add new cost algorithms at any time by subclassing `CostStrategy`. This
    would require no changes at all to any `Lesson` classes.


    Here’s a simplified version of the new `Lesson` class illustrated in Figure [8-4](#A314621_5_En_8_Chapter.html#Fig4):


    ```

    // listing 08.05

    abstract class Lesson

    {

    private $duration;

    private $costStrategy;

    public function __construct(int $duration, CostStrategy $strategy)

    {

    $this->duration = $duration;

    $this->costStrategy = $strategy;

    }

    public function cost(): int

    {

    return $this->costStrategy->cost($this);

    }

    public function chargeType(): string

    {

    return $this->costStrategy->chargeType();

    }

    public function getDuration(): int

    {

    return $this->duration;

    }

    // more lesson methods...

    }

    // listing 08.06

    class Lecture extends Lesson

    {

    // Lecture-specific implementations ...

    }

    // listing 08.07

    class Seminar extends Lesson

    {

    // Seminar-specific implementations ...

    }

    ```


    The `Lesson` class requires a `CostStrategy` object, which it stores as a property.
    The `Lesson::cost()` method simply invokes `CostStrategy::cost()`. Equally, `Lesson::chargeType()`
    invokes `CostStrategy::chargeType()`. This explicit invocation of another object’s
    method in order to fulfill a request is known as delegation. In my example, the
    `CostStrategy` object is the delegate of `Lesson`. The `Lesson` class washes its
    hands of responsibility for cost calculations and passes on the task to a `CostStrategy`
    implementation . Here, it is caught in the act of delegation:


    ```

    public function cost(): int

    {

    return $this->costStrategy->cost($this);

    }

    ```


    Here is the `CostStrategy` class, together with its implementing children:


    ```

    // listing 08.08

    abstract class CostStrategy

    {

    abstract public function cost(Lesson $lesson): int;

    abstract public function chargeType(): string;

    }

    // listing 08.09

    class TimedCostStrategy extends CostStrategy

    {

    public function cost(Lesson $lesson): int

    {

    return ($lesson->getDuration() * 5);

    }

    public function chargeType(): string

    {

    return "hourly rate";

    }

    }

    // listing 08.10

    class FixedCostStrategy extends CostStrategy

    {

    public function cost(Lesson $lesson): int

    {

    return 30;

    }

    public function chargeType(): string

    {

    return "fixed rate";

    }

    }

    ```


    I can change the way that any `Lesson` object calculates cost by passing it a
    different `CostStrategy` object at runtime. This approach then makes for highly
    flexible code. Rather than building functionality into my code structures statically,
    I can combine and recombine objects dynamically:


    ```

    // listing 08.11

    $lessons[] = new Seminar(4, new TimedCostStrategy());

    $lessons[] = new Lecture(4, new FixedCostStrategy());

    foreach ($lessons as $lesson) {

    print "lesson charge {$lesson->cost()}. ";

    print "Charge type: {$lesson->chargeType()}\n";

    }

    lesson charge 20\. Charge type: hourly rate

    lesson charge 30\. Charge type: fixed rate

    ```


    As you can see, one effect of this structure is that I have focused the responsibilities
    of my classes. `CostStrategy` objects are responsible solely for calculating cost,
    and `Lesson` objects manage lesson data.


    So, composition can make your code more flexible because objects can be combined
    to handle tasks dynamically in many more ways than you can anticipate in an inheritance
    hierarchy alone. There can be a penalty with regard to readability, though. Because
    composition tends to result in more types, with relationships that aren’t fixed
    with the same predictability as they are in inheritance relationships, it can
    be slightly harder to digest the relationships in a system.


    ## Decoupling


    You saw in Chapter [6](#A314621_5_En_6_Chapter.html) that it makes sense to build
    independent components. A system with highly interdependent classes can be hard
    to maintain. A change in one location can require a cascade of related changes
    across the system.


    ### The Problem


    Reusability is one of the key objectives of object-oriented design, and tight
    coupling is its enemy. You can diagnose tight coupling when you see that a change
    to one component of a system necessitates many changes elsewhere. You should aspire
    to create independent components, so that you can make changes without a domino
    effect of unintended consequences. When you alter a component, the extent to which
    it is independent is related to the likelihood that your changes will cause other
    parts of your system to fail.


    You saw an example of tight coupling in Figure [8-2](#A314621_5_En_8_Chapter.html#Fig2).
    Because the cost logic was mirrored across the `Lecture` and `Seminar` types,
    a change to `TimedPriceLecture` would necessitate a parallel change to the same
    logic in `TimedPriceSeminar`. By updating one class and not the other, I would
    break my system—without any warning from the PHP engine. My first solution, using
    a conditional statement, produced a similar dependency between the `cost()` and
    `chargeType()` methods.


    By applying the Strategy pattern, I distilled my cost algorithms into the `CostStrategy`
    type, locating them behind a common interface and implementing each only once.


    Coupling of another sort can occur when many classes in a system are embedded
    explicitly into a platform or environment. Let’s say that you are building a system
    that works with a MySQL database , for example. You might use methods such as
    `mysqli::query()` to speak to the database server.


    Should you be required to deploy the system on a server that does not support
    MySQL, you could convert your entire project to use SQLite. You would be forced
    to make changes throughout your code, though, and face the prospect of maintaining
    two parallel versions of your application.


    The problem here is not the system’s dependency on an external platform. Such
    a dependency is inevitable. You need to work with code that speaks to a database.
    The problem comes when such code is scattered throughout a project. Talking to
    databases is not the primary responsibility of most classes in a system, so the
    best strategy is to extract such code and group it together behind a common interface.
    In this way, you promote the independence of your classes. At the same time, by
    concentrating your gateway code in one place, you make it much easier to switch
    to a new platform without disturbing your wider system. This process, the hiding
    of implementation behind a clean interface, is known as encapsulation . The Doctrine
    database library solves this problem with the `DBAL` (database abstraction layer)
    project. This provides a single point of access for multiple databases.


    The `DriverManager` class provides a static method called `getConnection()` that
    accepts a parameters array. According to the makeup of this array, it returns
    a particular implementation of an interface called `Doctrine\DBAL\Driver`. You
    can see the class structure in Figure [8-5](#A314621_5_En_8_Chapter.html#Fig5).


    ![A314621_5_En_8_Fig5_HTML.gif](A314621_5_En_8_Fig5_HTML.gif)


    Figure 8-5.


    The DBAL package decouples client code from database objects


    The `DBAL` package, then, lets you decouple your application code from the specifics
    of your database platform. You should be able to run a single system with MySQL,
    SQLite, MSSQL, and others without changing a line of code (apart from your configuring
    parameters, of course).'
  trans: "\n### 使用组合\n\n我可以运用策略模式通过组合来摆脱困境。策略模式用于将一组算法转移到独立的类型中。通过移动成本计算，我可以简化`Lesson`类型。如图\
    \ 8-4 所示。\n\n![A314621_5_En_8_Fig4_HTML.gif](img/A314621_5_En_8_Fig4_HTML.gif)\n\
    \n图 8-4. 将算法移入独立类型\n\n我创建了一个抽象类`CostStrategy`，它定义了抽象方法`cost()`和`chargeType()`。`cost()`方法需要接收一个`Lesson`实例，并据此生成成本数据。我为`CostStrategy`提供了两个实现。`Lesson`对象仅与`CostStrategy`类型交互，而非其具体实现，因此我随时可以通过继承`CostStrategy`来添加新的成本算法，而无需对任何`Lesson`类进行任何修改。\n\
    \n以下是图 8-4 中所示的新`Lesson`类的简化版本：\n\n```php\n// 清单 08.05\nabstract class Lesson\n\
    {\n    private $duration;\n    private $costStrategy;\n    public function __construct(int\
    \ $duration, CostStrategy $strategy)\n    {\n        $this->duration = $duration;\n\
    \        $this->costStrategy = $strategy;\n    }\n    public function cost():\
    \ int\n    {\n        return $this->costStrategy->cost($this);\n    }\n    public\
    \ function chargeType(): string\n    {\n        return $this->costStrategy->chargeType();\n\
    \    }\n    public function getDuration(): int\n    {\n        return $this->duration;\n\
    \    }\n    // 更多课程方法...\n}\n// 清单 08.06\nclass Lecture extends Lesson\n{\n  \
    \  // Lecture 特有的实现 ...\n}\n// 清单 08.07\nclass Seminar extends Lesson\n{\n   \
    \ // Seminar 特有的实现 ...\n}\n```\n\n`Lesson`类需要接收一个`CostStrategy`对象并将其存储为属性。`Lesson::cost()`方法直接调用`CostStrategy::cost()`。同样地，`Lesson::chargeType()`调用`CostStrategy::chargeType()`。这种为了完成请求而显式调用另一个对象方法的行为被称为委托。在我的示例中，`CostStrategy`对象是`Lesson`的委托对象。`Lesson`类卸下了成本计算的责任，并将其传递给一个`CostStrategy`实现。以下代码即体现了委托行为：\n\
    \n```php\npublic function cost(): int\n{\n    return $this->costStrategy->cost($this);\n\
    }\n```\n\n以下是`CostStrategy`类及其子类的实现：\n\n```php\n// 清单 08.08\nabstract class CostStrategy\n\
    {\n    abstract public function cost(Lesson $lesson): int;\n    abstract public\
    \ function chargeType(): string;\n}\n// 清单 08.09\nclass TimedCostStrategy extends\
    \ CostStrategy\n{\n    public function cost(Lesson $lesson): int\n    {\n    \
    \    return ($lesson->getDuration() * 5);\n    }\n    public function chargeType():\
    \ string\n    {\n        return \"按小时收费\";\n    }\n}\n// 清单 08.10\nclass FixedCostStrategy\
    \ extends CostStrategy\n{\n    public function cost(Lesson $lesson): int\n   \
    \ {\n        return 30;\n    }\n    public function chargeType(): string\n   \
    \ {\n        return \"固定收费\";\n    }\n}\n```\n\n我可以在运行时通过向任何`Lesson`对象传递不同的`CostStrategy`对象来改变其计算成本的方式。这种方法使代码变得高度灵活。与其静态地将功能构建到代码结构中，不如动态地组合和重组对象：\n\
    \n```php\n// 清单 08.11\n$lessons[] = new Seminar(4, new TimedCostStrategy());\n\
    $lessons[] = new Lecture(4, new FixedCostStrategy());\nforeach ($lessons as $lesson)\
    \ {\n    print \"课程费用 {$lesson->cost()}. \";\n    print \"收费类型: {$lesson->chargeType()}\\\
    n\";\n}\n课程费用 20. 收费类型: 按小时收费\n课程费用 30. 收费类型: 固定收费\n```\n\n如你所见，这种结构的一个效果是，我聚焦了各个类的职责。`CostStrategy`对象仅负责计算成本，而`Lesson`对象负责管理课程数据。\n\
    \n因此，组合可以使你的代码更加灵活，因为对象可以以你仅靠继承层次结构所无法预见的多种方式组合起来，动态地处理任务。不过，这可能会对可读性造成一定影响。由于组合往往会产生更多类型，且关系不像继承关系那样具有可预测的固定性，因此消化系统中的关系可能会稍微困难一些。\n\
    \n## 解耦\n\n你在第 6 章中看到，构建独立的组件是合理的。一个高度相互依赖的类组成的系统将难以维护。在一处进行更改可能需要在系统中级联进行一系列相关更改。\n\
    \n### 问题\n\n可重用性是面向对象设计的关键目标之一，而紧耦合则是其敌人。当你发现对系统某个组件的更改导致大量其他位置的更改时，你就可以诊断出紧耦合。你应该致力于创建独立的组件，以便在不产生意外连锁反应的情况下进行更改。当你更改一个组件时，其独立程度与你的更改导致系统其他部分失败的可能性相关。\n\
    \n你可以在图 8-2 中看到紧耦合的示例。由于成本逻辑在`Lecture`和`Seminar`类型之间是镜像的，因此对`TimedPriceLecture`的更改将需要对`TimedPriceSeminar`中的相同逻辑进行并行更改。如果只更新了一个类而另一个未更新，就会破坏系统——而\
    \ PHP 引擎不会发出任何警告。我使用条件语句的第一个解决方案在`cost()`和`chargeType()`方法之间产生了类似的依赖关系。\n\n通过应用策略模式，我将成本算法提炼到`CostStrategy`类型中，将它们置于一个公共接口之后，并且每个算法只实现一次。\n\
    \n另一种耦合发生在系统的许多类被显式嵌入到某个平台或环境中时。例如，假设你正在构建一个与 MySQL 数据库配合使用的系统。你可能会使用`mysqli::query()`等方法与数据库服务器通信。\n\
    \n如果你需要将系统部署在不支持 MySQL 的服务器上，你可能需要将整个项目转换为使用 SQLite。不过，你将被迫在整个代码中进行更改，并且面临维护应用程序的两个并行版本的前景。\n\
    \n这里的问题不在于系统对外部平台的依赖。这种依赖是不可避免的。你需要使用与数据库通信的代码。问题在于此类代码遍布整个项目。与数据库通信并不是系统中大多数类的主要职责，因此最佳策略是将此类代码提取出来，并将其分组到公共接口之后。通过这种方式，你可以提升类的独立性。同时，通过将网关代码集中在一个地方，可以更容易地切换到新平台，而不会影响到你的整个系统。这种将实现隐藏在清晰接口背后的过程被称为封装。Doctrine\
    \ 数据库库通过`DBAL`（数据库抽象层）项目解决了这个问题。它为多个数据库提供统一的访问入口。\n\n`DriverManager`类提供了一个名为`getConnection()`的静态方法，该方法接受一个参数数组。根据该数组的构成，它会返回`Doctrine\\\
    DBAL\\Driver`接口的特定实现。你可以在图 8-5 中看到类结构。\n\n![A314621_5_En_8_Fig5_HTML.gif](img/A314621_5_En_8_Fig5_HTML.gif)\n\
    \n图 8-5. DBAL 包将客户端代码与数据库对象解耦\n\n因此，`DBAL`包让你可以将应用程序代码与数据库平台的细节解耦。你应该能够使用 MySQL、SQLite、MSSQL\
    \ 等运行单个系统，而无需更改任何代码（当然，配置参数除外）。\n"
- fmt: "### Loosening Your Coupling\n\nTo handle database code flexibly, you should\
    \ decouple the application logic from the specifics of the database platform it\
    \ uses. You will see lots of opportunities for this kind of separation of components\
    \ in your own projects.\n\nImagine, for example, that the `Lesson` system must\
    \ incorporate a registration component to add new lessons to the system. As part\
    \ of the registration procedure, an administrator should be notified when a lesson\
    \ is added. The system’s users can’t agree whether this notification should be\
    \ sent by mail or by text message. In fact, they’re so argumentative that you\
    \ suspect they might want to switch to a new mode of communication in the future.\
    \ What’s more, they want to be notified of all sorts of things, so that a change\
    \ to the notification mode in one place will mean a similar alteration in many\
    \ other places.\n\nIf you’ve hard-coded calls to a `Mailer` class or a `Texter`\
    \ class, then your system is tightly coupled to a particular notification mode,\
    \ just as it would be tightly coupled to a database platform by the use of a specialized\
    \ database API.\n\nHere is some code that hides the implementation details of\
    \ a notifier from the system that uses it:\n\n```\n// listing 08.12\nclass RegistrationMgr\n\
    {\npublic function register(Lesson $lesson)\n{\n// do something with this Lesson\n\
    // now tell someone\n$notifier = Notifier::getNotifier();\n$notifier->inform(\"\
    new lesson: cost ({$lesson->cost()})\");\n}\n}\n// listing 08.13\nabstract class\
    \ Notifier\n{\npublic static function getNotifier(): Notifier\n{\n// acquire concrete\
    \ class according to\n// configuration or other logic\nif (rand(1, 2) === 1) {\n\
    return new MailNotifier();\n} else {\nreturn new TextNotifier();\n}\n}\nabstract\
    \ public function inform($message);\n}\n// listing 08.14\nclass MailNotifier extends\
    \ Notifier\n{\npublic function inform($message)\n{\nprint \"MAIL notification:\
    \ {$message}\\n\";\n}\n}\n// listing 08.15\nclass TextNotifier extends Notifier\n\
    {\npublic function inform($message)\n{\nprint \"TEXT notification: {$message}\\\
    n\";\n}\n}\n```\n\nI create `RegistrationMgr`, a sample client for my Notifier\
    \ classes. The `Notifier` class is abstract, but it does implement a static method,\
    \ `getNotifier()`, which fetches a concrete `Notifier` object (`TextNotifier`\
    \ or `MailNotifier`). In a real project, the choice of `Notifier` would be determined\
    \ by a flexible mechanism, such as a configuration file. Here, I cheat and make\
    \ the choice randomly. `MailNotifier` and `TextNotifier` do nothing more than\
    \ print out the message they are passed along with an identifier to show which\
    \ one has been called.\n\nNotice how the knowledge of which concrete `Notifier`\
    \ should be used has been focused in the `Notifier::getNotifier()` method. I could\
    \ send notifier messages from a hundred different parts of my system, and a change\
    \ in Notifier would only have to be made in that one method.\n\nHere is some code\
    \ that calls the `RegistrationMgr`:\n\n```\n// listing 08.16\n$lessons1 = new\
    \ Seminar(4, new TimedCostStrategy());\n$lessons2 = new Lecture(4, new FixedCostStrategy());\n\
    $mgr = new RegistrationMgr();\n$mgr->register($lessons1);\n$mgr->register($lessons2);\n\
    ```\n\nAnd here’s the output from a typical run:\n\n```\nTEXT notification: new\
    \ lesson: cost (20)\nMAIL notification: new lesson: cost (30)\n```\n\nFigure [8-6](#A314621_5_En_8_Chapter.html#Fig6)\
    \ shows these classes.\n\n![A314621_5_En_8_Fig6_HTML.gif](A314621_5_En_8_Fig6_HTML.gif)\n\
    \n**Figure 8-6.**  \nThe `Notifier` class separates client code from `Notifier`\
    \ implementations\n\nNotice how similar the structure in Figure [8-6](#A314621_5_En_8_Chapter.html#Fig6)\
    \ is to that formed by the Doctrine components shown in Figure [8-5](#A314621_5_En_8_Chapter.html#Fig5).\n\
    \n## Code to an Interface, Not to an Implementation\n\nThis principle is one of\
    \ the all-pervading themes of this book. You saw in Chapter [6](#A314621_5_En_6_Chapter.html)\
    \ (and in the last section) that you can hide different implementations behind\
    \ the common interface defined in a superclass. Client code can then require an\
    \ object of the superclass’s type rather than that of an implementing class, unconcerned\
    \ by the specific implementation it is actually getting.\n\nParallel conditional\
    \ statements, like the ones I rooted out from `Lesson::cost()` and `Lesson::chargeType()`,\
    \ are a common sign that polymorphism is needed. They make code hard to maintain\
    \ because a change in one conditional expression necessitates a change in its\
    \ siblings. Conditional statements are occasionally said to implement a “simulated\
    \ inheritance.”\n\nBy placing the cost algorithms in separate classes that implement\
    \ `CostStrategy`, I remove duplication. I also make it much easier should I need\
    \ to add new cost strategies in the future.\n\nFrom the perspective of client\
    \ code, it is often a good idea to require abstract or general types in your methods’\
    \ parameters. By requiring more specific types, you could limit the flexibility\
    \ of your code at runtime.\n\nHaving said that, of course, the level of generality\
    \ you choose in your argument hints is a matter of judgment. Make your choice\
    \ too general, and your method may become less safe. If you require the specific\
    \ functionality of a subtype, then accepting a differently equipped sibling into\
    \ a method could be risky.\n\nStill, make your choice of argument hint too restricted,\
    \ and you lose the benefits of polymorphism. Take a look at this altered extract\
    \ from the `Lesson` class:\n\n```\n// listing 08.17\npublic function __construct(int\
    \ $duration, FixedCostStrategy $strategy)\n{\n$this->duration = $duration;\n$this->costStrategy\
    \ = $strategy;\n}\n```\n\nThere are two issues arising from the design decision\
    \ in this example. First, the `Lesson` object is now tied to a specific cost strategy,\
    \ which closes down my ability to compose dynamic components. Second, the explicit\
    \ reference to the `FixedPriceStrategy` class forces me to maintain that particular\
    \ implementation.\n\nBy requiring a common interface, I can combine a `Lesson`\
    \ object with any `CostStrategy` implementation:\n\n```\n// listing 08.18\npublic\
    \ function __construct(int $duration, CostStrategy $strategy)\n{\n$this->duration\
    \ = $duration;\n$this->costStrategy = $strategy;\n}\n```\n\nI have, in other words,\
    \ decoupled my `Lesson` class from the specifics of cost calculation. All that\
    \ matters is the interface and the guarantee that the provided object will honor\
    \ it.\n\nOf course, coding to an interface can often simply defer the question\
    \ of how to instantiate your objects. When I say that a `Lesson` object can be\
    \ combined with any `CostStrategy` interface at runtime, I beg the question, “But\
    \ where does the `CostStrategy` object come from?”\n\nWhen you create an abstract\
    \ superclass, there is always the issue of how its children should be instantiated.\
    \ Which child do you choose and according to which condition? This subject forms\
    \ a category of its own in the Gang of Four pattern catalog, and I will examine\
    \ this further in the next chapter."
  raw: '### Loosening Your Coupling


    To handle database code flexibly, you should decouple the application logic from
    the specifics of the database platform it uses. You will see lots of opportunities
    for this kind of separation of components in your own projects.


    Imagine, for example, that the `Lesson` system must incorporate a registration
    component to add new lessons to the system. As part of the registration procedure,
    an administrator should be notified when a lesson is added. The system’s users
    can’t agree whether this notification should be sent by mail or by text message.
    In fact, they’re so argumentative that you suspect they might want to switch to
    a new mode of communication in the future. What’s more, they want to be notified
    of all sorts of things, so that a change to the notification mode in one place
    will mean a similar alteration in many other places.


    If you’ve hard-coded calls to a `Mailer` class or a `Texter` class, then your
    system is tightly coupled to a particular notification mode, just as it would
    be tightly coupled to a database platform by the use of a specialized database
    API.


    Here is some code that hides the implementation details of a notifier from the
    system that uses it:


    ```

    // listing 08.12

    class RegistrationMgr

    {

    public function register(Lesson $lesson)

    {

    // do something with this Lesson

    // now tell someone

    $notifier = Notifier::getNotifier();

    $notifier->inform("new lesson: cost ({$lesson->cost()})");

    }

    }

    // listing 08.13

    abstract class Notifier

    {

    public static function getNotifier(): Notifier

    {

    // acquire concrete class according to

    // configuration or other logic

    if (rand(1, 2) === 1) {

    return new MailNotifier();

    } else {

    return new TextNotifier();

    }

    }

    abstract public function inform($message);

    }

    // listing 08.14

    class MailNotifier extends Notifier

    {

    public function inform($message)

    {

    print "MAIL notification: {$message}\n";

    }

    }

    // listing 08.15

    class TextNotifier extends Notifier

    {

    public function inform($message)

    {

    print "TEXT notification: {$message}\n";

    }

    }

    ```


    I create `RegistrationMgr` , a sample client for my Notifier classes. The `Notifier`
    class is abstract, but it does implement a static method, `getNotifier(),` which
    fetches a concrete `Notifier` object (`TextNotifier` or `MailNotifier`). In a
    real project, the choice of `Notifier` would be determined by a flexible mechanism,
    such as a configuration file. Here, I cheat and make the choice randomly. `MailNotifier`
    and `TextNotifier` do nothing more than print out the message they are passed
    along with an identifier to show which one has been called.


    Notice how the knowledge of which concrete `Notifier` should be used has been
    focused in the `Notifier::` `getNotifier()` method . I could send notifier messages
    from a hundred different parts of my system, and a change in Notifier would only
    have to be made in that one method.


    Here is some code that calls the `RegistrationMgr` :


    ```

    // listing 08.16

    $lessons1 = new Seminar(4, new TimedCostStrategy());

    $lessons2 = new Lecture(4, new FixedCostStrategy());

    $mgr = new RegistrationMgr();

    $mgr->register($lessons1);

    $mgr->register($lessons2);

    ```


    And here’s the output from a typical run:


    ```

    TEXT notification: new lesson: cost (20)

    MAIL notification: new lesson: cost (30)

    ```


    Figure [8-6](#A314621_5_En_8_Chapter.html#Fig6) shows these classes.


    ![A314621_5_En_8_Fig6_HTML.gif](A314621_5_En_8_Fig6_HTML.gif)


    Figure 8-6.


    The Notifier class separates client code from Notifier implementations


    Notice how similar the structure in Figure [8-6](#A314621_5_En_8_Chapter.html#Fig6)
    is to that formed by the Doctrine components shown in Figure [8-5](#A314621_5_En_8_Chapter.html#Fig5).


    ## Code to an Interface, Not to an Implementation


    This principle is one of the all-pervading themes of this book. You saw in Chapter
    [6](#A314621_5_En_6_Chapter.html) (and in the last section) that you can hide
    different implementations behind the common interface defined in a superclass.
    Client code can then require an object of the superclass’s type rather than that
    of an implementing class, unconcerned by the specific implementation it is actually
    getting.


    Parallel conditional statements, like the ones I rooted out from `Lesson::cost()`
    and `Lesson::chargeType()`, are a common sign that polymorphism is needed. They
    make code hard to maintain because a change in one conditional expression necessitates
    a change in its siblings. Conditional statements are occasionally said to implement
    a “simulated inheritance.”


    By placing the cost algorithms in separate classes that implement `CostStrategy`,
    I remove duplication. I also make it much easier should I need to add new cost
    strategies in the future.


    From the perspective of client code, it is often a good idea to require abstract
    or general types in your methods’ parameters. By requiring more specific types,
    you could limit the flexibility of your code at runtime.


    Having said that, of course, the level of generality you choose in your argument
    hints is a matter of judgment. Make your choice too general, and your method may
    become less safe. If you require the specific functionality of a subtype, then
    accepting a differently equipped sibling into a method could be risky.


    Still, make your choice of argument hint too restricted, and you lose the benefits
    of polymorphism. Take a look at this altered extract from the `Lesson` class:


    ```

    // listing 08.17

    public function __construct(int $duration, FixedCostStrategy $strategy)

    {

    $this->duration = $duration;

    $this->costStrategy = $strategy;

    }

    ```


    There are two issues arising from the design decision in this example. First,
    the `Lesson` object is now tied to a specific cost strategy, which closes down
    my ability to compose dynamic components. Second, the explicit reference to the
    `FixedPriceStrategy` class forces me to maintain that particular implementation.


    By requiring a common interface, I can combine a `Lesson` object with any `CostStrategy`
    implementation:


    ```

    // listing 08.18

    public function __construct(int $duration, CostStrategy $strategy)

    {

    $this->duration = $duration;

    $this->costStrategy = $strategy;

    }

    ```


    I have, in other words, decoupled my `Lesson` class from the specifics of cost
    calculation. All that matters is the interface and the guarantee that the provided
    object will honor it.


    Of course, coding to an interface can often simply defer the question of how to
    instantiate your objects. When I say that a `Lesson` object can be combined with
    any `CostStrategy` interface at runtime, I beg the question, “But where does the
    `CostStrategy` object come from?”


    When you create an abstract superclass, there is always the issue of how its children
    should be instantiated. Which child do you choose and according to which condition?
    This subject forms a category of its own in the Gang of Four pattern catalog,
    and I will examine this further in the next chapter.'
  trans: "\n### 降低耦合度\n\n为了灵活处理数据库代码，应将应用程序逻辑与所使用数据库平台的特性解耦。在自己的项目中，你会看到很多进行这种组件分离的机会。\n\
    \n例如，假设`Lesson`系统必须包含一个注册组件，用于向系统添加新课程。作为注册流程的一部分，当添加课程时，应通知管理员。系统用户无法就应通过邮件还是短信发送此通知达成一致。事实上，他们争论不休，以至于你怀疑他们将来可能想切换为新的通信方式。更麻烦的是，他们希望所有事情都能收到通知，因此对一处通知方式的更改将意味着许多其他地方也要进行类似的修改。\n\
    \n如果你硬编码了对`Mailer`类或`Texter`类的调用，那么你的系统就与特定的通知模式紧密耦合，就像通过使用专用的数据库 API 而与某个数据库平台紧密耦合一样。\n\
    \n以下是将通知程序的实现细节对使用它的系统隐藏的代码：\n\n```\n// 清单 08.12\nclass RegistrationMgr\n{\npublic\
    \ function register(Lesson $lesson)\n{\n// 处理此 Lesson\n// 现在通知相关人员\n$notifier\
    \ = Notifier::getNotifier();\n$notifier->inform(\"新课程：费用 ({$lesson->cost()})\"\
    );\n}\n}\n// 清单 08.13\nabstract class Notifier\n{\npublic static function getNotifier():\
    \ Notifier\n{\n// 根据配置或其他逻辑获取具体类\nif (rand(1, 2) === 1) {\nreturn new MailNotifier();\n\
    } else {\nreturn new TextNotifier();\n}\n}\nabstract public function inform($message);\n\
    }\n// 清单 08.14\nclass MailNotifier extends Notifier\n{\npublic function inform($message)\n\
    {\nprint \"邮件通知：{$message}\\n\";\n}\n}\n// 清单 08.15\nclass TextNotifier extends\
    \ Notifier\n{\npublic function inform($message)\n{\nprint \"短信通知：{$message}\\\
    n\";\n}\n}\n```\n\n我创建了`RegistrationMgr`，作为通知程序（Notifier）类的一个示例客户端。`Notifier`类是抽象类，但它实现了一个静态方法`getNotifier()`，该方法会获取一个具体的`Notifier`对象（`TextNotifier`或`MailNotifier`）。在真实项目中，选择哪个`Notifier`将由灵活的机制（例如配置文件）决定。这里我偷了个懒，随机选择。`MailNotifier`和`TextNotifier`所做的只是打印出传递给它们的消息以及一个标识符，以显示哪个被调用了。\n\
    \n请注意，关于应该使用哪个具体`Notifier`的知识如何集中在了`Notifier::getNotifier()`方法中。我可以从系统中的数百个不同位置发送通知消息，而对通知程序的更改只需在一个方法中进行。\n\
    \n以下调用`RegistrationMgr`的代码：\n\n```\n// 清单 08.16\n$lessons1 = new Seminar(4, new\
    \ TimedCostStrategy());\n$lessons2 = new Lecture(4, new FixedCostStrategy());\n\
    $mgr = new RegistrationMgr();\n$mgr->register($lessons1);\n$mgr->register($lessons2);\n\
    ```\n\n以下是典型运行的输出：\n\n```\n短信通知：新课程：费用 (20)\n邮件通知：新课程：费用 (30)\n```\n\n图 8-6 展示了这些类。\n\
    \n![A314621_5_En_8_Fig6_HTML.gif](img/A314621_5_En_8_Fig6_HTML.gif)\n\n**图 8-6.**\
    \  \n`Notifier` 类将客户端代码与 `Notifier` 的实现分离开来\n\n请注意，图 8-6 中的结构与图 8-5 中由 Doctrine\
    \ 组件形成的结构有多么相似。\n\n## 面向接口编程，而非面向实现编程\n\n这一原则是本书贯穿始终的主题之一。你在第 6 章（以及上一节）中看到，可以将不同的实现隐藏在超类定义的公共接口之后。然后，客户端代码可以要求超类类型的对象，而非实现类的对象，无需关心它实际获取的是哪个具体实现。\n\
    \n像我从 `Lesson::cost()` 和 `Lesson::chargeType()` 中剔除的那些平行条件语句，通常表明需要用到多态性。它们使得代码难以维护，因为对一个条件表达式的更改必然导致其姊妹条件表达式的相应更改。条件语句有时被称为实现了“模拟继承”。\n\
    \n通过将费用算法放在实现 `CostStrategy` 的独立类中，我消除了重复。这也使得未来如果需要添加新的费用策略时更加容易。\n\n从客户端代码的角度来看，在方法的参数中要求抽象类型或通用类型通常是个好主意。如果要求更具体的类型，可能会限制代码在运行时的灵活性。\n\
    \n当然，话虽如此，你在参数提示中选择的通用程度取决于判断。选择过于通用，你的方法可能会变得不够安全。如果你需要子类型的特定功能，那么接受一个装备不同的兄弟类进入方法可能会有风险。\n\
    \n然而，如果参数提示的选择过于受限，你就会失去多态性的好处。看看这个从 `Lesson` 类修改而来的片段：\n\n```\n// 清单 08.17\n\
    public function __construct(int $duration, FixedCostStrategy $strategy)\n{\n$this->duration\
    \ = $duration;\n$this->costStrategy = $strategy;\n}\n```\n\n此示例中的设计决策引发了两个问题。首先，`Lesson`\
    \ 对象现在绑定到了特定的费用策略，这限制了我组合动态组件的能力。其次，显式引用 `FixedPriceStrategy` 类迫使我维护该特定实现。\n\n\
    通过要求一个公共接口，我可以将 `Lesson` 对象与任何 `CostStrategy` 实现组合：\n\n```\n// 清单 08.18\npublic\
    \ function __construct(int $duration, CostStrategy $strategy)\n{\n$this->duration\
    \ = $duration;\n$this->costStrategy = $strategy;\n}\n```\n\n换句话说，我将 `Lesson` 类与费用计算的细节解耦了。重要的是接口以及所提供对象会遵守该接口的保证。\n\
    \n当然，面向接口编程通常只是推迟了如何实例化对象的问题。当我说一个 `Lesson` 对象可以在运行时与任何 `CostStrategy` 接口组合时，这引出了一个问题：“但是\
    \ `CostStrategy` 对象从何而来？”\n\n当你创建一个抽象超类时，总是存在如何实例化其子类的问题。你根据什么条件选择哪个子类？这在四人组（Gang\
    \ of Four）模式目录中自成一体，我将在下一章进一步探讨这个主题。\n"
- fmt: '# The Concept that Varies


    It’s easy to interpret a design decision once it has been made, but how do you
    decide where to start?


    The Gang of Four recommend that you “encapsulate the concept that varies.” In
    terms of my lesson example, the varying concept is the cost algorithm. Not only
    is the cost calculation one of two possible strategies in the example, but it
    is obviously a candidate for expansion: special offers, overseas student rates,
    introductory discounts—all sorts of possibilities present themselves.


    I quickly established that subclassing for this variation was inappropriate, and
    I resorted to a conditional statement. By bringing my variation into the same
    class, I underlined its suitability for encapsulation.


    The Gang of Four recommend that you actively seek varying elements in your classes
    and assess their suitability for encapsulation in a new type. Each alternative
    in a suspect conditional may be extracted to form a class that extends a common
    abstract parent. This new type can then be used by the class or classes from which
    it was extracted. This has the following effects:


    - Focusing responsibility

    - Promoting flexibility through composition

    - Making inheritance hierarchies more compact and focused

    - Reducing duplication


    So how do you spot variation? One sign is the misuse of inheritance. This might
    include inheritance deployed according to multiple forces at one time (e.g., lecture/seminar
    and fixed/timed cost). It might also include subclassing on an algorithm where
    the algorithm is incidental to the core responsibility of the type. The other
    sign of variation suitable for encapsulation is, as you have seen, a conditional
    expression.


    ## Patternitis


    One problem for which there is no pattern is the unnecessary or inappropriate
    use of patterns. This has earned patterns a bad name in some quarters. Because
    pattern solutions are neat, it is tempting to apply them wherever you see a fit,
    whether they truly fulfill a need or not.


    The eXtreme Programming (XP) methodology offers a couple of principles that might
    apply here. The first is, “You aren’t going to need it” (often abbreviated to
    YAGNI). This is generally applied to application features, but it also makes sense
    for patterns.


    When I build large environments in PHP, I tend to split my application into layers,
    separating application logic from presentation and persistence layers. I use all
    sorts of core and enterprise patterns in conjunction with one another.


    When I am asked to build a feedback form for a small business web site, however,
    I may simply use procedural code in a single page script. I do not need enormous
    amounts of flexibility; I won’t be building on the initial release. I don’t need
    to use patterns that address problems in larger systems. Instead, I apply the
    second XP principle: “Do the simplest thing that works.”


    When you work with a pattern catalog, the structure and process of the solution
    are what stick in the mind, consolidated by the code example. Before applying
    a pattern, though, pay close attention to the problem, or “when to use it,” section,
    and then read up on the pattern’s consequences. In some contexts, the cure may
    be worse than the disease.


    ## The Patterns


    This book is not a pattern catalog. Nevertheless, in the coming chapters, I will
    introduce a few of the key patterns in use at the moment, providing PHP implementations
    and discussing them in the broad context of PHP programming.


    The patterns described will be drawn from key catalogs, including *Design Patterns:
    Elements of Reusable Object-Oriented Software*, *Patterns of Enterprise Application
    Architecture* by Martin Fowler (Addison-Wesley Professional, 2002) and *Core J2EE
    Patterns: Best Practices and Design Strategies* (Prentice Hall, 2001) by Alur,
    et al. I use the Gang of Four’s categorization as a starting point, dividing patterns
    into five categories, as follows.


    ### Patterns for Generating Objects


    These patterns are concerned with the instantiation of objects. This is an important
    category given the principle, “Code to an interface.” If you are working with
    abstract parent classes in your design, then you must develop strategies for instantiating
    objects from concrete subclasses. It is these objects that will be passed around
    your system.


    ### Patterns for Organizing Objects and Classes


    These patterns help you to organize the compositional relationships of your objects.
    More simply, these patterns show how you combine objects and classes.


    ### Task-Oriented Patterns


    These patterns describe the mechanisms by which classes and objects cooperate
    to achieve objectives.


    ### Enterprise Patterns


    I look at some patterns that describe typical Internet programming problems and
    solutions. Drawn largely from *Patterns of Enterprise Application Architecture*
    and *Core J2EE Patterns: Best Practices and Design Strategies*, the patterns deal
    with presentation and application logic.


    ### Database Patterns


    An examination of patterns that help with storing and retrieving data, and with
    mapping objects to and from databases.


    ## Summary


    In this chapter, I examined some of the principles that underpin many design patterns.
    I looked at the use of composition to enable object combination and recombination
    at runtime, resulting in more flexible structures than would be available using
    inheritance alone. I also introduced you to decoupling, the practice of extracting
    software components from their context to make them more generally applicable.
    Finally, I reviewed the importance of interface as a means of decoupling clients
    from the details of implementation.


    In the coming chapters, I will examine some design patterns in detail.


    # 9. Generating Objects


    Creating objects is a messy business. So, many object-oriented designs deal with
    nice, clean abstract classes, taking advantage of the impressive flexibility afforded
    by polymorphism (the switching of concrete implementations at runtime). To achieve
    this flexibility, though, I must devise strategies for object generation. This
    is the topic I will look at in this chapter.


    This chapter will cover the following patterns:


    - The Singleton pattern: A special class that generates one—and only one—object
    instance

    - The Factory Method pattern: Building an inheritance hierarchy of creator classes

    - The Abstract Factory pattern: Grouping the creation of functionally related
    products

    - The Prototype pattern: Using `clone` to generate objects

    - The Service Locator pattern: Asking your system for objects

    - The Dependency Injection pattern: Letting your system give you objects'
