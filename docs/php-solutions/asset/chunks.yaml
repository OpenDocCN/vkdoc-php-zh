    if (isset($_POST[''category'']) && in_array($row[''cat_id''],

    $_POST[''category''])) { echo ''selected'';

    } ?>><?php echo $row[''category'']; ?></option>

    <?php } ?>

    </select>

    </p>

    ```


    To allow the selection of multiple values, the `multiple` attribute has been added
    to the `<select>` tag, and the `size` attribute has been set to `5`. The values
    need to be submitted as an array, so a pair of square brackets has been appended
    to the `name` attribute.


    The SQL queries the `categories` table, and a `while` loop populates the `<option>`
    tags with the primary keys and category names. The conditional statement in the
    `while` loop adds `selected` to the `<option>` tag to redisplay selected values
    if the `insert` operation fails.


