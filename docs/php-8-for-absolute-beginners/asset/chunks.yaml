  trans: "\n如果点击了`save`按钮，则会获取标题和条目内容，并将其传递给`saveEntry`方法以插入到数据库中。\n\n**注意：** 以下程序已更新为链接到最新版本。所有代码的改动都很微小。`insertadminWithNavigation.php`前端控制器现在也包含了一条`include_once`语句，用来插入`database.php`程序。（涉及文件：`insert-editor-html.php`、`insert-admin-navigation.php`、`insertadminWithNavigation.php`）\n\
    \n现在，我们可以通过在浏览器中执行`insertadminWithNavigation.php`程序来测试插入过程。然后点击`Editor`菜单项，输入一些测试数据，再点击保存按钮。这些信息将被正确地放入数据库的`blog_entry`表中。表单会自动清除所有数据，这通常向用户表明数据已成功插入。你可以通过\
    \ phpMyAdmin 控制面板浏览`blog_entry`表中的内容。\n\n**练习：** 使用提供的代码或你自己开发的代码，对当前系统进行一次完整的测试。尝试让系统崩溃。输入\
    \ SQL 信息，看看能否攻破该程序。你发现任何弱点了吗？\n\n## 用户视图：获取所有博客条目的数据\n\n现在，我们需要让用户能够查看博客条目。我们将从管理员视角（最终会通过用户\
    \ ID 和密码进行控制）切换到用户视角。因此，我们将为用户创建一个不同的入口（前端控制器），它不需要用户 ID 和密码，还需要一个不同的模型和一个不同的视图。我们可以使用管理员前端控制器的精简版作为用户控制器。\n\
    \n```\nsetTitle(\"PHP/MySQL 博客演示\");\ninclude_once \"models/database.php\";\n\
    include_once \"controllers/blog.php\";\n$pageData->setContent($info);\ninclude_once\
    \ \"views/page.php\";\necho $page;\n?>\n清单 7-14\nindex.php\n```\n\n如我们所见，当前不需要导航，因为用户只有查看博客条目的权限。使用了相同的`Page_Data`类、`database.php`和`page.php`脚本。由于没有菜单，当前也不需要判断选择了哪个菜单项。当然，控制器和视图已更改为用户版本。\n\
    \n接下来，我们开始处理`blog_entry`类中所需的更改。我们将显示数据库中所有博客条目的列表。我们将显示每个博客条目的`title`（标题）、`entry_text`（条目文本）的前\
    \ 150 个字符，以及一个*Read more*（阅读更多）链接。\n\n首先，我们创建一个新的方法，用于从`blog_entry`表中检索博客条目。\n\
    \n```\n// 在 Blog_Entry_Table 类内部声明一个新方法\npublic function getAllEntries () {\n\
    $sql = \"SELECT entry_id, title,\nSUBSTRING(entry_text, 1, 150) AS intro\nFROM\
    \ blog_entry\";\n$statement = $this->db->prepare( $sql );\ntry {\n$statement->execute();\n\
    } catch ( Exception $e ) {\n$exceptionMessage = \"你尝试运行此 SQL：$sql \n异常信息：$e\"\
    ;\ntrigger_error($exceptionMessage);\n}\nreturn $statement;\n}\n清单 7-15\nNew_Blog_Entry_Table.class.php\
    \ 的部分代码\n```\n\n此方法将被放置在类中`saveEntries`方法之前。此方法与之前的`saveEntry`方法格式相似，但有一些细微的改动，例如这里是检索信息，而不是插入信息。\n\
    \n`getAllEntries()`方法将返回一个`PDOStatement`对象，通过该对象我们可以逐个访问所有博客条目。该语句涉及一些我们之前没见过的\
    \ SQL，因此一开始可能有点难以理解。我们一步一步地来分析。\n\n### 使用 SQL SUBSTRING 子句\n\n```\n$sql = \"SELECT\
    \ entry_id, title,\nSUBSTRING(entry_text, 1, 150) AS intro\nFROM blog_entry\"\
    ;\n```\n\n首先要注意的是，`SELECT`语句从`blog_entry`表中选取了三列——`entry_id`、`title`和`entry_text`。但我们并没有选取`entry_text`列的全部内容，只选取了前\
    \ 150 个字符。我们可以通过 SQL 的`SUBSTRING()`函数来实现这一点。`SUBSTRING()`函数的一般语法如下：\n\n```\nSUBSTRING(\
    \ 字符串, 起始位置, 长度 )\n```\n\n`SUBSTRING()`函数返回字符串中请求的部分：一个子串。`string`参数指明要返回哪部分字符串。正如你可能猜到的，`start`位置参数指明子串从哪个位置开始。`length`参数指定返回的子串有多长。因此，在上述`SELECT`语句中，我们从`entry_text`字段中的字符串里选取了前\
    \ 150 个字符。\n\n### 使用 SQL 别名\n\n在 SQL 语句中，我们可以使用别名来重命名表或列。在用于选取所有博客条目的 SQL 中，我们将子串结果命名为`intro`。虽然重命名并非必要，但它为我们提供了一种直接的方式来访问子串中的信息。\n\
    \n## 为所有博客条目准备用户视图\n\n现在，是时候创建一个用户视图了。这个视图将列出所有博客条目。博客条目的数量可能会变化，因此为特定数量的条目创建视图是个坏主意。该视图应能自动调整，以适应数据库中无论有多少——或少——博客条目。我们将使用循环来遍历博客条目。\n\
    \n```\n 元素\n$info = \"博客条目\";\n$info .= \"\";\n// 循环遍历数据库中的所有 $entries\n// 每次将一行临时记住为\
    \ $entry\n// $entry 将是一个包含 entry_id、title 和 intro 属性的 StdClass 对象\nwhile ( $entry\
    \ = $entries->fetchObject() ) {\n$href  = \"index.php?page=blog&id=$entry->entry_id\"\
    ;\n// 为每个条目创建一个 \n$info .= \"\n$entry->title\n$entry->intro\n阅读更多\n\n\";\n}\n\
    // 结束 \n$info .= \"\";\n?>\n清单 7-16\nlist-entries-html.php\n```\n\n```\n$entriesFound\
    \ = isset( $entries );\nif ( $entriesFound === false ) {\ntrigger_error( 'views/list-entries-html.php\
    \ 需要 $entries' );\n}\n```\n\n`$entries`将包含数据库中的博客条目。如果缺少该变量，则会触发错误以指示问题。在实际生产环境中，这需要替换为一条告知用户当前没有博客的提示信息。\n\
    \n```\nwhile ( $entry = $entries->fetchObject() ) {\n$href  = \"index.php?page=blog&id=$entry->entry_id\"\
    ;\n// 为每个条目创建一个 \n$info .= \"\n$entry->title\n$entry->intro\n阅读更多\n\n\";\n}\n\
    ```\n\n`while`循环首先尝试获取下一个对象（数据库表中的条目）并将其放入`$entry`中。`while`循环将成功的获取视为`true`状态。如果获取不成功（没有更多记录），则会向`$entry`放入一个`false`值，循环将停止。只要状态为`true`，循环就会根据`blog_entry`数据库表中的行数动态创建`<li>`元素。如果数据库里有一条博客条目，就会有一个`<li>`。如果数据库里有十条博客条目，就会有十个`<li>`元素。\n\
    \n`$href`变量包含一个链接，该链接将重新调用索引页面，并传递两个属性——`page`设置为`blog`，`id`设置为数据库表中记录包含的`entry_id`。如果用户想阅读更多博客内容，将用到此信息。除了显示`title`和`intro`（子串）之外，还提供了实际的`href`链接，允许用户点击`阅读更多`来查看完整的博客条目。\n\
    \n## 连接用户视图和用户模型\n\n最后一步是将用户视图与用户模型中的数据连接起来。这不需要太多代码，但它会生成一个简单的条目显示页面。\n"
