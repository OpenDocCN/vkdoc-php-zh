    接着，我们修改`index.php`启动文件以读取并使用这些值。这些值并非必须指定：如果配置中未包含它们，我们将使用默认设置文件`settings.ini`和默认配置段落`production`。


    > **注意** 通常情况下，你无需更改设置文件的文件名，但具备这种能力有时会很有用。例如，如果你想基于同一代码库运行两个独立的网站，可以为每个站点使用独立的设置文件，然后在每个站点的
    Web 服务器配置中指定使用哪个文件。


    如前所述，Apache 中使用`SetEnv`指令来设置环境变量。该指令的第一个值是环境变量的名称，第二个值是值。我们将使用的值如下：


    ```

    SetEnv APP_CONFIG_FILE "settings.ini"

    SetEnv APP_CONFIG_SECTION "development"

    ```


    > **注意** 我们将使用`APP_CONFIG_SECTION`值为`development`（而不是`production`），因为我将此段落视为正在开发应用程序。一旦你部署了它（使用本章后面的说明），你便可以将此值设置为`production`，或者完全省略它（因为我们将使用`production`作为默认值）。


    然后，这些值可以通过`$_SERVER`变量从任何 PHP 脚本中访问。


    例如，要获取配置文件名，你可以使用`$_SERVER[''APP_CONFIG_FILE'']`。


    清单 14-20 展示了我们对第 2 章（清单 2-1）中创建的 Web 服务器配置所做的更改。这些更改位于`/var/www/phpweb20/httpd.conf`文件中。你需要重启
    Web 服务器才能使这些值生效。


    **清单 14-20.** *在 Apache 配置中设置设置文件名和段落 (`httpd.conf`)*


    ```

    <VirtualHost 192.168.0.80>

    ServerName phpweb20

    DocumentRoot /var/www/phpweb20/htdocs

    <Directory /var/www/phpweb20/htdocs>

    AllowOverride All

    Options All

    </Directory>

    php_value include_path .:/var/www/phpweb20/include:/usr/local/lib/pear


    php_value magic_quotes_gpc off

    php_value register_globals off


    SetEnv APP_CONFIG_FILE "settings.ini"

    SetEnv APP_CONFIG_SECTION "development"

    </VirtualHost>

    ```


    下一步是更新应用程序启动文件以使用这些值。清单 14-21 展示了我们对`./htdocs/index.php`文件所做的更改，以便配置文件名和段落不再被硬编码。


    **清单 14-21.** *使用 Apache 环境变量决定配置 (`index.php`)*


    ```php

    <?php

    require_once(''Zend/Loader.php'');

    Zend_Loader::registerAutoload();


    // 设置应用程序日志记录器

    $logger=new Zend Log(new Zend Log Writer Null());

    try {

    $writer = new EmailLogger($ SERVER[''SERVER ADMIN'']);

    $writer->addFilter(new Zend Log Filter Priority(Zend Log::CRIT));

    $logger->addWriter($writer);


    // 加载应用配置

    $configFile = '''';

    if (isset($_SERVER[''APP_CONFIG_FILE'']))

    $configFile = basename($_SERVER[''APP_CONFIG_FILE'']);

    if (strlen($configFile) == 0)

    $configFile = ''settings.ini'';


    $configSection = '''';

    if (isset($_SERVER[''APP_CONFIG_SECTION'']))

    $configSection = basename($_SERVER[''APP_CONFIG_SECTION'']);

    if (strlen($configSection) == 0)

    $configSection = ''production'';


    $config = new Zend_Config_Ini(''../'' . $configFile, $configSection);

    Zend_Registry::set(''config'', $config);


    // ... 其他代码

    ```


    这些更改首先尝试从服务器变量读取`APP_CONFIG_FILE`段落。如果没有找到值（或值为空），则使用默认值`settings.ini`。接着，我们做同样的事情来确定要使用的配置段落（使用`APP_CONFIG_SECTION`）。最后，在实例化`Zend_Config_Ini`时使用这些值。


    > **注意** 此代码通过使用`basename()`强制设置文件位于应用程序根目录（`/var/www/phpweb20`）。如果你希望能够在系统其他地方存储该文件，可以修改此代码以允许在`APP_CONFIG_FILE`设置中使用完整路径。


    ## 使用 Rsync 部署应用文件


    为了帮助部署应用文件（包括初始部署和后续更新），你可以使用`rsync`程序。`Rsync`是一种用于在两个位置之间同步文件和目录的工具。尽管 FTP 和
    SFTP 等程序可能有用，但用它们来部署更新却很繁琐（因为文件可能跨越许多目录）。


    `Rsync`通过确定副本 A（在我们的例子中，是开发服务器上的副本）和副本 B（生产服务器上的副本）之间的差异，然后将这些差异应用到副本 B 来实现同步。通过仅传输副本之间的差异，需要传输的数据量被最小化。


    `rsync`可以通过 SSH 连接使用，这一特性使其成为同步两个代码副本的绝佳方式。但要注意，`rsync`必须安装在两台服务器上（如果使用 SSH，则
    SSH 也必须安装）。


    如果你的服务器上还没有`rsync`，可以从[`rsync.samba.org`](http://rsync.samba.org)下载。每个你想要同步文件的服务器都需要安装它。


    现在让我们看一个使用`rsync`的例子。假设两台服务器都已安装`rsync`，你可以从开发环境拉取文件到生产环境（通过在**生产**服务器上运行`rsync`），或者将文件从开发环境推送到生产环境（通过在**开发**服务器上运行`rsync`）。


    如果你想将应用程序部署到一个虚构的生产服务器`production.example.com`上，你需要执行以下命令：


    ```

    # rsync -rlptzv -e ssh /var/www/phpweb20 myUsername@production.example.com:/var/www

    ```


    此命令中使用的参数含义如下：


    - `-r`：递归复制文件（即复制所有目录和子目录）。

    - `-l`：复制符号链接。

    - `-p`：保持文件和目录的权限。

    - `-t`：保持文件的时间戳。

    - `-z`：在传输过程中压缩数据。

    - `-v`：执行过程中输出详细信息。

    - `-e`：指定用作传输工具的 shell。这里我们使用`ssh`。


    下一个参数指明被同步文件的主副本，而最后一个参数是正在被更新的副本。在这个例子中，我们从开发服务器复制，所以可以使用本地路径。如果我们从生产服务器运行`rsync`，那么在此参数中会使用一个
    URL，并将生产服务器上的本地路径作为最后一个参数。


    第一次运行此命令时，所有应用文件都会被复制，而后续只会复制更改过的文件。你可以通过先运行两次命令轻松看出这一点——第二次不会有任何文件被复制。


    > **注意** 你也可以使用`-n`参数预览哪些文件将被传输，而无需实际执行传输。


    ## 备份与恢复


    我们将要探讨的应用程序管理的下一个方面是生产服务器上数据的备份与恢复。在以下部分中，我们将介绍如何备份应用程序中使用的 MySQL 数据库，以及如何在需要时恢复它。我们开发的
    PHP 代码无需从生产服务器备份，因为它只是开发代码的一个副本（假设你已经备份了本地开发代码或已使用版本控制）。

