    S


    The URL parameter for the redirect() function can be set up as an array. Notice
    in line 4


    of Listing 7-5 that the array has a key and value corresponding to locations in
    the Cake application. The available keys for use in this function correspond with
    Cake’s router arguments.


    For example, the array would redirect the user to the Index action in the Users
    controller: array(''controller''=>''users'',''action''=>''index'')


    Single strings are also possible in the URL parameter. These follow the same URL
    structure used in the web browser to access areas of the Cake application. This
    same path shown in the previous array could be formatted as a string like so:


    ''/users/index''


    Other Cake functions can help with the URL parameter. One example is the referer()
    function. By placing $this->referer() in the URL parameter, Cake will redirect
    to the referring page of the current action.


    The status parameter allows you to pass an HTTP status code as part of the server
    response. One of the most frequent error responses from the server is a 404 Not
    Found error.


    Sometimes you may want the redirect() function to be used for unresolved URLs.
    In these cases, using 404 as an integer in the status parameter allows the application
    to respond to the error like a typical 404 server response. All the HTTP status
    codes are available.


    In line 4 of Listing 7-5, you’re assuming that the user accesses the View action
    from the Index action, so in the event of an error, you’ll redirect them back
    to this action.


