    Deployment and Maintenance


    **S**o farin this book we have developed asomewhat complete webapplication. Although
    features can be added to an application, there is an old saying that the last
    10 percent of the development of an application takes 90 percent of the time.


    What this typically refers to are all the little details in making the application
    something that can be used reliably by many people. In this chapter, I will cover
    some of the details that this refers to, such as handling errors and notifying
    the user accordingly that something went wrong, deploying the application on a
    production server, using application logs, and backing up the application.


    **Application Logging**


    In Chapter 2 we set up logging capabilities for our web application, meaning we
    can record when various events occur. Although the only events we actually recorded
    were related to user logins and blog indexing, the idea was that we put a foundation
    in place that can easily be used anywhere in the application whenever required.


    Having said that, a logging system isn’t much use if there’s no way to use the
    log. In the following sections, I will talk more about the logging system and
    show how it can be extended and used.


    The reason for looking at the logging system first in this chapter is that the
    changes we will make later in this chapter for handling site errors rely partly
    on the features added here.


    **E-mailing Critical Errors to an Administrator**


    Zend_Log provides the ability to have multiple writers for a single logger. A
    *writer* is a class that is used to output log messages, be it to a file (as we
    have done so far), a database, or an e-mail.


    The Zend Framework doesn’t ship with a writer that can e-mail log messages, but
    we can easily write our own by extending the Zend_Log_Writer_Abstract class. We
    then register the new writer with the logger so critical errors can be sent to
    the e-mail address we will add to the application configuration.


    Creating the Log Writer


    The main log writers that come with the Zend Framework are the stream writer (for
    writing to files) and the database writer. Both of these writers record the message
    to their target locations as soon as the message is logged. If we were to do the
    same thing for our e-mail writer, then a new e-mail would be sent for every recorded
    message. Since a single request could result in **519**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    9063Ch14CMP2 11/13/07 8:20 PM Page 520


    **520**


    C H A P T E R 1 4 ■ D E P L OY M E N T A N D M A I N T E N A N C E


    several log messages, we must accumulate log messages and send them in one e-mail
    message at the completion of the request.


    Thankfully, Zend_Log simplifies this by allowing us to define a method called
    shutdown(), which is automatically called (using PHP 5 class deconstructors) when
    the request completes.


    The shutdown() function we create will use Zend_Mail to send an e-mail to the
    nominated address.


    We will call this class EmailLogger, which we store in ./include/EmailLogger.php.
    Listing 14-1 shows the constructor for this class. We create an array in which
    to hold the log messages until they are ready to be sent. Additionally, we use
    Zend_Validator to ensure a valid e-mail address has been included in the constructor
    arguments. By implementing the setEmail() function, we can easily change the target
    e-mail address during runtime if required.


    The other key line of code to note here is the final statement where we instantiate
    Zend_


    Log_Formatter_Simple. With Zend_Log you can create a custom formatter, used to
    define how a log message appears in the writer’s output. We will use the built-in
    Zend_Log_Formatter_Simple class (you saw an example of its output in Chapter 2),
    but you could also use the built-in XML


    formatter or create your own.


    ■**Note** If you want to use a different formatter, you would typically call the
    setFormatter() method on the writer once it has been instantiated rather than
    changing the code in the writer.


    **Listing 14-1.** *Initializing the EmailLogger Class (EmailLogger.php)*


    <?php


    class EmailLogger extends Zend_Log_Writer_Abstract


    {


    protected $_email;


    protected $_events = array();


    public function __construct($email)


    {


    $this->_formatter = new Zend_Log_Formatter_Simple();


    $this->setEmail($email);


    }


    public function setEmail($email)


    {


    $validator = new Zend_Validate_EmailAddress();


    if (!$validator->isValid($email))


    throw new Exception(''Invalid e-mail address specified'');


    $this->_email = $email;


    }


