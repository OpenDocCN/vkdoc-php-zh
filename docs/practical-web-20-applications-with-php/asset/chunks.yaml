    Detecting Ajax Requests


    Using Zend_Controller we can easily determine whether a request came from an Ajax
    subrequest by calling the isXmlHttpRequest() method on the request object that
    is available inside controller actions. Internally, this method looks for the
    presence of the X-Requested-With HTTP header. If the value of this header is XMLHttpRequest,
    this method returns true.


    This header is not automatically set when using XMLHttpRequest to initiate HTTP


    subrequests, but Prototype will set this header automatically. This means the
    Prototype Ajax.Request class is compatible with the isXmlHttpRequest() method
    from the Zend_


    Controller_Request_Http class.


