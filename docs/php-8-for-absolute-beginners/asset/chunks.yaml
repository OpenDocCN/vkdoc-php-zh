  raw: "You can consult [ `www.w3schools.com/php/php_functions.asp`\n](http://www.w3schools.com/php/php_functions.asp)\
    \ to learn a little more about function arguments with\ndefault values.\n\nIn\
    \ the other cases where `executeSQL()` is\ncalled with two arguments, the second\
    \ argument will be used to replace\nSQL placeholders with actual values. Using\
    \ optional arguments is a very\npowerful concept in code. It can often lead to\
    \ a clean solution when\nencapsulating nearly duplicate code into a single separate\
    \ method.\n\nNote\n\nMinor changes have been made to the following files to properly\
    \ use\nthe new Blog Entry Table class.\n`updated-entries-html.php, updatedblog.php,\
    \ updatedindex.php`\n\nWe can test our changes by executing `updatedindex.php`\
    \ in\nour browser. The same output will occur when displaying all entries and\n\
    retrieving more information for an individual entry.\nRemember: Refactoring is\
    \ to change code without changing what it\ndoes. So, a successful test confirms\
    \ when the code behaves exactly as it\ndid before refactoring. Refactoring is\
    \ done with the sole purpose of\nmaking the code easier to maintain and more efficient.\n\
    \nSecure Programming\nYou may have noticed that the `executeSQL()` method\nis\
    \ `private`\ninstead of `public`. It is a\nfragile member of the Blog Entry Table\
    \ class. It is only meant to be\ncalled internally and only by other methods in\
    \ the class. It is\ncertainly not meant to be called from outside the class.\n\
    The `executeSQL()` method  is a\n*submethod* used by the other methods. This method\
    \ makes the\nactual changes to the data in the database table. It is very vulnerable\n\
    to attacks by hackers. Thus, it needs to be protected from any attempt\nto use\
    \ it outside of the class. Simply setting it to `private` provides this\nextra\
    \ protection. It can only be used by a method within the class\nitself.\nRemember:\
    \ The single responsibility principle, also known as Curly’s law   , applied to\
    \ classes. A\nclass should have a single purpose, and all its properties and behaviors\n\
    should be strictly aligned with that purpose. A class with one\nresponsibility\
    \ is simpler than a class with many, and a simple class is\neasier to use than\
    \ a complex class. By hiding some properties and\nmethods using a `private` access\n\
    modifier, we present a public interface that’s even simpler and easier\nto use.\
    \ So, as a rule of thumb, use `private` by default,\n`public` when you\nneed it.\n\
    \nNote\n\nThere is a third access modifier: `protected`. In PHP, it\nis similar\
    \ to `private`, except it\ncan be shared with subclasses through *inheritance*.\
    \ You can find\na nice tutorial covering inheritance, access modifiers, and other\n\
    central OOP topics at [`www.killerphp.com/tutorials/object-oriented-php/`](http://www.killerphp.com/tutorials/object-oriented-php/)\
    \ .\n\nSummary\nIn this chapter, we have created a basic blog. The blog provides\n\
    administrative ability to create new entries and user ability to display\nblog\
    \ entries. In the process, we learned about prepared statements, and\nwe were\
    \ introduced to design patterns. We also discovered how to\nrefactor duplicate\
    \ code. We created a Blog Entry Table class which is\nthe data gateway that provides\
    \ a single point of access from the PHP\ncode to the `blog_entry` database\ntable.\
    \ We have eliminated smelly code and have produced DRY code in the\nprocess.\n\
    While our code provides us a good functioning blog, it is missing\nsome key components.\
    \ For example, we do not have the ability to update\nor delete a blog entry. We\
    \ will enhance the features of this blog\nnext.\n\nProjects\n1. Using the design\
    \ practices from this and previous chapters, create\na student registration system.\
    \ The basic system will accept student\ninformation (name, address, date of birth,\
    \ and major) and save the\ninformation in a database. The system will also display\
    \ the name of all\nstudents registered. Next to each student name will be a link\
    \ to provide\nadditional student information. When the link is clicked, the name,\n\
    address, date of birth, and major will be displayed.\n2. Using MVC, create a web\
    \ page that the user can use to request more\ninformation. The page should accept\
    \ the user’s name, email, subject, and\ndetailed description. This information\
    \ will be stored in a database.\nCreate administrator pages to display the subjects\
    \ entered by all users.\nNext to each subject provides a link to display the user’s\
    \ name, email,\nand detailed description. For an extra challenge, search [ `www.php.net`\n\
    ](http://www.php.net) to discover how to send emails using PHP. After the\nuser\
    \ submits the information, send an email to your email address (in\naddition to\
    \ saving the information in the database).\n\n8. Basic Blog: Entries and\nComments\n\
    \nObjectives\n\nAfter completing this chapter, you will be able to\n\n*   Create\
    \ a view containing an interactive HTML form\n\n*   Create a controller to handle\
    \ input from the form\n\n*   Create a model to save and retrieve any entry using\
    \ a database\n    table\n\n*   Use a foreign key to associate rows and tables\
    \ comments in a\n    database\n\n*   Use inheritance to avoid redundant code\n\
    \n*   Create a search algorithm to find data in a database\n    table\n\nIn this\
    \ chapter, we will make improvements to both the administrator\nmodule and the\
    \ user (blog) module. We will begin with the administrator\nmodule.\nThe second\
    \ iteration of the administration module \nwill update and delete existing entries\
    \ through the entry editor (front\ncontroller). In the process of improving the\
    \ entry manager, we will\nstart by writing small, informal code tests. These tests\
    \ check the\nlogical flow of the information between the controller, model, and\
    \ view\nbefore adding additional code which can complicate the debugging\nprocess.\
    \ Integrating testing into the development process will improve\nthe overall code\
    \ quality and decrease debugging time.\n\nCreating a Model for the Administrative\
    \ Module\nWhen looking at the version of our administrative module from the\n\
    previous chapter, we can clearly see that there are already buttons that\ncan\
    \ be used for saving or deleting existing entries. We can also see\nthat something\
    \ is missing. Where would we click to load an existing\nentry into the entry editor,\
    \ so that we could edit or delete it?\nLet us start our development process  to\n\
    solve this problem by copying the files from the publisher’s website.\nYou can\
    \ choose to copy files from the `ch7` folder and modify\nthem, as discussed in\
    \ the next paragraph. However, due to the number of\nchanges, this is not recommended.\
    \ If you do want to venture into that\nswamp, follow the directions in the following.\n\
    \nStart by creating a `ch8` folder. Under\nthis folder, create a `blog` folder.\
    \ Under\nthe `blog`\nfolder, create the `controllers`, `css`, `models`, and `views`\
    \ folders. Under\nthe `controllers`\nfolder, create an `admin` folder. Under\n\
    the `views`\nfolder, create an `admin` folder. Then\ncopy the programs from the\
    \ `ch7` folder as shown\nin the following table.\n\n**Original Name** |\n **New\
    \ Name** |\n **Location** |\n\n| --- | --- | --- | --- | --- | --- | --- |\n\n\
    `newesteditor.php` |\n `editor.php` |\n `controllers/admin` |\n\n`database.php`\
    \ |\n `database.php` |\n `Models` |\n\n`Page_Data.class.php` |\n `Page_Data.class.php`\
    \ |\n `Models` |\n\n`Updated_Blog_Entry_Table.class.php` |\n `Blog_Entry_Table.class.php`\
    \ |\n `Models` |\n\n`updated-admin-navigation.php` |\n `admin-navigation.php`\
    \ |\n `views/admin` |\n\n`insert-editor-html.php` |\n `editor-html.php` |\n `views/admin`\
    \ |\n\n`insertadminWithNavigation.php` |\n `admin.php` |\n `Blog` |\n\n`newblog.css`\
    \ |\n `blog.css` |\n `css` |\n\n`page.php` |\n `page.php` |\n `views` |\n\nNote"
