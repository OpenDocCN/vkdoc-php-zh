    Next we must add the data we want users to be able to search on to this document.
    Since we want to search on this data but we don’t need to store it in the index
    (since we will retrieve the found blog posts from the database), we can use the
    UnStored field type.


    Listing 12-2 shows the code we use to index the other fields for a blog post.
