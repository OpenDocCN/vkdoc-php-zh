    ## Displaying Front Page Contents


    Apart from general information about the web site, you also want to show some
    promotional products on the first page of HatShop.


    If the visitor browses a department or a category, the department Smarty template
    is used to build the output. For the main web page, we’ll create the `first_page_contents`
    componentized template that will build the output.


    Remember in `index.tpl` you have a cell named `pageContentsCell` that you fill
    with different details depending on what part of the site is being visited? When
    a department or a category is being visited, the department componentized template
    is loaded, and it takes care of filling that space. We still haven’t done anything
    with that cell for the first page, when no department or category has been selected.


    In the following exercise, you’ll write a template file that contains some information
    about the web site and shows the products that have been set up as promotions
    on the first page. Remember that the product table contains a field named `display`.
    Site administrators will set this field to `on_catalog` for products that need
    to be displayed in the first page.


