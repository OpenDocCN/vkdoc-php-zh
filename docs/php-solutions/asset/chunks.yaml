    the formatted number.


    The `getMaxSize()` method has been declared public in case you want to display
    the value in another part of a script that uses the `Upload` class.


    Save `Upload.php` and test it again with `file_upload.php`. With images smaller
    than 50 KB, it works the same as before. But if you try uploading a file that’s
