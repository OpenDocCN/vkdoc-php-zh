  \ 函数之前将任何输出发送到浏览器。\n\n```\n\n9.  PHP 引擎会在脚本结束时自动刷新缓冲区，但最好显式地执行此操作。像这样编辑页面底部的 PHP\
  \ 代码块：\n\n```\n    这里添加了两个不同的函数。重定向到另一个页面时，您不希望将 HTML 存储在缓冲区中。因此，在 `catch` 块内部，调用了\
  \ `ob_end_clean()`，它会关闭缓冲区并丢弃其内容。\n    但是，如果没有抛出异常，您希望显示缓冲区的内容，因此在页面末尾的 `try` 和\
  \ `catch` 块之后调用了 `ob_end_flush()`。这会刷新缓冲区的内容并将其发送到浏览器。\n\n```\n\n10. 保存 `index.php`\
  \ 并在浏览器中重新加载它。这次，无论您的服务器配置中是否启用了缓冲，您都应该被重定向到错误页面，如图 5-16 所示。\n\n![../images/332054_4_En_5_Chapter/332054_4_En_5_Fig16_HTML.jpg](img/332054_4_En_5_Fig16_HTML.jpg)\n\
  \n图 5-16。\n\n缓冲输出使浏览器能够重定向到错误页面\n\n11. 将 `$file` 的值更改回 `./includes/menu.php` 并保存\
  \ `index.php`。当您在错误页面上单击“主页”链接时，`index.php` 应正常显示。\n\n您可以将您的代码与 `ch05` 文件夹中的 `index_07.php`\
  \ 进行比较。\n\n为什么我不能对 PHP 包含使用站点根目录相对链接？\n嗯，您可以，也不能。为清楚起见，我首先解释相对于文档的链接和相对于站点根的链接之间的区别。\n\
  \n**文档相对链接**\n大多数 Web 创作工具指定到其他文件（如样式表、图像和其他网页）的路径时，都是相对于当前文档的。如果目标页面在同一文件夹中，则仅使用文件名。如果目标页面比当前页面高一级，则文件名前加上\
  \ `../`。这被称为**文档相对路径**或链接。如果您有一个包含许多层级文件夹的站点，这种类型的链接可能难以理解——至少对人类来说是这样。\n\n**相对于站点根的链接**\n\
  网页中使用的另一种链接类型始终以正斜杠开头，这是站点根的简写。**站点根相对路径**的优点是，无论当前页面在站点层次结构中的深度如何，开头的正斜杠都能保证浏览器从站点的顶层开始查找。尽管站点根相对链接更易于阅读，但\
  \ PHP 包含命令无法处理它们。您必须使用文档相对路径、绝对路径，或者在您的 `include_path` 指令中指定 `includes` 文件夹（请参阅本章后面的“调整您的\
  \ include_path”）。\n\n注意\n只有当开头的斜杠代表站点根时，PHP 包含命令才无法定位外部文件。Linux 和 macOS 上的绝对路径也以正斜杠开头。绝对路径是明确的，因此它们没有问题。\n\
  \n\n\n你可以通过将超全局变量 `$_SERVER['DOCUMENT_ROOT']` 拼接到路径开头，将站点根目录的相对路径转换为绝对路径，如下所示：\n\
  \n```\nrequire $_SERVER['DOCUMENT_ROOT'] . '/includes/filename.php';\n```\n\n大多数服务器都支持\
  \ `$_SERVER['DOCUMENT_ROOT']`，但请检查远程服务器上 `phpinfo()` 显示的配置详情底部的 PHP 变量部分，以确认无误。\n\
  \n## 包含文件中的链接\n\n这是容易让许多人混淆的一点。PHP 和浏览器对以正斜杠开头的路径解释方式不同。因此，虽然你不能使用相对于站点根目录的链接来包含文件，但包含文件*内部*的链接通常应相对于站点根目录。这是因为包含文件可能被引入站点层次结构的任何层级，因此当文件在不同层级被包含时，基于文档的相对链接就会失效。\n\
  \n> **注意：** `menu.php` 中的导航菜单使用的是基于文档的相对链接，而非相对于站点根目录的链接。这样设计是有意为之，因为除非你创建了虚拟主机，否则站点根目录是\
  \ `localhost`，而不是 `phpsols-4e`。这是在 Web 服务器文档根目录的子文件夹中测试站点的一个缺点。本书全程使用的日本之旅网站只有一个层级，因此基于文档的相对链接可以正常工作。在开发包含多级文件夹的站点时，建议在包含文件中使用相对于站点根目录的链接，并考虑设置一个虚拟主机进行测试（详见第\
  \ 2 章）。\n\n## 选择包含文件的存放位置\n\nPHP 包含文件一个有用的特性是它们可以放在任何位置，只要包含 `include` 命令的页面知道它们在哪里即可。包含文件甚至不需要放在\
  \ Web 服务器的根目录下。这意味着你可以将包含密码等敏感信息的包含文件存放在浏览器无法访问的私有目录（文件夹）中，从而保护它们。\n\n> **提示：**\
  \ 如果你的托管服务商在服务器根目录之外提供了存储区域，你应认真考虑将部分（若非全部）包含文件存放在那里。\n\n## 包含功能的安全考虑\n\n包含文件是 PHP\
  \ 一个非常强大的特性。强大之处也伴随着安全风险。只要外部文件可访问，PHP 就会将其包含进来，并将其中任何代码合并到主脚本中。从技术上讲，包含文件甚至可以位于不同的服务器上。但这被认为存在极大的安全隐患，以至于配置指令\
  \ `allow_url_include` 默认是禁用的。因此，除非你完全控制服务器配置，否则无法从其他服务器包含文件。与 `include_path` 不同，`allow_url_include`\
  \ 指令只能由服务器管理员覆盖。即使你同时控制着两台服务器，也绝不应该从另一台服务器包含文件。攻击者有可能伪造地址并尝试在你的网站上执行恶意脚本。永远不要包含公众可以上传或覆盖的文件。\n\
  \n> **注意：** 本章剩余部分技术性较强，主要作为参考提供。你可以随意跳过。\n\n## 调整你的 `include_path`\n\n`include`\
  \ 命令需要相对路径或绝对路径。如果两者都未指定，PHP 会自动在 PHP 配置中指定的 `include_path` 中查找。将包含文件放在 Web 服务器的\
  \ `include_path` 所指定的文件夹中的好处是，你无需费心去弄准相对或绝对路径。你只需要文件名即可。如果你使用大量包含文件，或者站点层级很深，这会非常有用。有三种方法可以更改\
  \ `include_path`：\n\n*   **在 `php.ini` 中编辑值**：如果你的托管服务商允许你访问 `php.ini`，这是添加自定义包含文件夹的最佳方式。\n\
  *   **使用 `.htaccess` 或 `.user.ini`**：如果你的托管服务商允许通过 `.htaccess` 或 `.user.ini` 文件更改配置，这是一个不错的替代方案。\n\
  *   **使用 `set_include_path()`**：仅当前面选项不可用时才使用此方法，因为它仅影响当前文件的 `include_path`。\n\n\
  当你运行 `phpinfo()` 时，Web 服务器的 `include_path` 值会列在配置详情的 Core 部分。它通常以句点开头，表示当前文件夹，其后是要搜索的每个文件夹的绝对路径。在\
  \ Linux 和 macOS 上，每个路径之间用冒号分隔。在 Windows 上，分隔符是分号。在 Linux 或 Mac 服务器上，你现有的 `include_path`\
  \ 指令可能如下所示：\n\n```\n.:/php/PEAR\n```\n\n在 Windows 服务器上，等价形式如下：\n\n```\n.;C:\\php\\\
  PEAR\n```\n\n### 在 `php.ini` 或 `.user.ini` 中编辑 `include_path`\n\n在 `php.ini` 中找到\
  \ `include_path` 指令。要添加一个名为 `includes` 的文件夹到你的站点中，请在现有值的末尾添加一个冒号或分号（取决于服务器操作系统），后跟\
  \ `includes` 文件夹的绝对路径。\n\n在 Linux 或 Mac 服务器上，使用冒号，示例如下：\n\n```\ninclude_path=\"\
  .:/php/PEAR:/home/mysite/includes\"\n```\n\n在 Windows 服务器上，使用分号：\n\n```\ninclude_path=\"\
  .;C:\\php\\PEAR;C:\\sites\\mysite\\includes\"\n```\n\n`.user.ini` 文件的命令相同。`.user.ini`\
  \ 中的值会覆盖默认值，因此请确保从 `phpinfo()` 复制现有值，然后将新路径添加进去。\n\n### 使用 `.htaccess` 更改 `include_path`\n\
  \n`.htaccess` 文件中的值会覆盖默认值，因此请从 `phpinfo()` 复制现有值，然后将新路径添加进去。在 Linux 或 Mac 服务器上，该值应类似于：\n\
  \n```\nphp_value include_path \".:/php/PEAR:/home/mysite/includes\"\n```\n\n在 Windows\
  \ 上命令相同，只是路径之间用分号分隔：\n\n```\nphp_value include_path \".;C:\\php\\PEAR;C:\\sites\\\
  mysite\\includes\"\n```\n\n> **注意：** 在 `.htaccess` 中，不要在 `include_path` 和路径名列表之间插入等号。\n\
  \n### 使用 `set_include_path()`\n\n尽管 `set_include_path()` 仅影响当前页面，但你可以轻松创建一段代码片段并粘贴到你想要使用它的页面中。PHP\
  \ 还支持以平台无关的方式轻松获取现有的 `include_path` 并将其与新的路径合并。\n\n将新路径存储在一个变量中，然后将其与现有值组合，如下所示：\n\
  \n```\n$includes_folder = '/home/mysite/includes';\nset_include_path(get_include_path()\
  \ . PATH_SEPARATOR . $includes_folder);\n```\n\n看起来好像传递了三个参数给 `set_include_path()`，但实际上只有一个；这三个元素通过连接运算符（句点）连接，而不是逗号。\n\
  \n*   `get_include_path()` 获取当前的 `include_path`。\n*   `PATH_SEPARATOR` 是一个 PHP 常量，它会根据操作系统自动插入冒号或分号。\n\
  *   `$includes_folder` 添加新路径。\n\n这种方法的问题在于，新 `includes` 文件夹的路径在你的远程服务器和本地测试服务器上可能不同。你可以通过条件语句来解决这个问题。超全局变量\
  \ `$_SERVER['HTTP_HOST']` 包含网站的域名。如果你的域名是 `www.example.com`，你可以像这样为每个服务器设置正确的路径：\n\
  \n```\nif ($_SERVER['HTTP_HOST'] == 'www.example.com') {\n$includes_folder = '/home/example/includes';\n\
  } else {\n$includes_folder = 'C:/xampp/htdocs/phpsols-4e/includes';\n}\nset_include_path(get_include_path()\
  \ . PATH_SEPARATOR . $includes_folder);\n```\n\n对于不使用大量包含文件的小型网站来说，使用 `set_include_path()`\
  \ 可能并不划算。不过，在更复杂的项目中，你可能会发现它很有用。\n\n\n\n"
- '# 嵌套包含文件


  当一个文件被包含到另一个文件中时，相对路径是基于父文件计算的，而不是基于被包含的文件。这给需要包含另一个外部文件的外部函数或类定义带来了问题。


  如果两个外部文件位于同一文件夹中，你可以仅使用文件名来包含嵌套文件，如下所示：


  ```php

  require_once ''Thumbnail.php'';

  ```


  在这种情况下，相对路径*不应*以 `./` 开头，因为 `./` 表示“从当前文件夹开始”。对于包含文件而言，“当前文件夹”指的是父文件的文件夹，而非包含文件本身的文件夹，这会导致嵌套文件的路径错误。


  当包含文件位于不同文件夹时，你可以使用 PHP 常量 `__DIR__` 为目标文件构建绝对路径。该常量返回包含文件所在目录（文件夹）的绝对路径，且不带尾部斜杠。将
  `__DIR__`、一个正斜杠和文档相对路径拼接起来，即可将相对路径转换为绝对路径。例如，假设这是从一个包含文件到另一个包含文件的相对路径：


  ```php

  ''../File/Upload.php''

  ```


  你可以像这样将其转换为绝对路径：


  ```php

  __DIR__ . ''/../File/Upload.php''

  ```


  在文档相对路径开头添加正斜杠的效果是：先找到包含文件的父文件夹，然后向上跳一级以找到正确的路径。在第 10 章中你将看到一个这样的实际示例，其中某个包含文件需要包含另一个位于不同文件夹的文件。


  ## 章节回顾


  本章将你直接带入 PHP 的世界，涵盖了 include、数组和多维数组的使用。本章向你展示了如何提取当前页面名称、显示随机图像以及获取图像尺寸。你还学习了如何抛出和捕获异常，以及如何重定向到另一个页面。内容很多，所以如果第一次没有完全理解也不要担心。你使用
  PHP 越多，就会对基本技术越熟悉。在下一章中，你将学习 PHP 如何处理来自在线表单的输入，并利用该知识将网站反馈发送到你的电子邮箱。


