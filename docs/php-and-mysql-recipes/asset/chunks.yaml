    Recipe 1-4\. Installing MySQL


    Problem


    We now have a system with a web server that supports executing PHP scripts and
    returning the output of the script instead of the raw source file. In order to
    complete the installation of a fully functional development stack we need to install
    the MySQL database server.


    Solution


    The basic installation of a MySQL compatible database on CentOS 7 is called MariaDB.
    The official MySQL


    database is owned by Oracle. It is still kept as an open source and they have
    a few community-based versions. When Oracle purchased Sun Microsystems and thereby
    acquired the MySQL source code the original development team created a new version.
    They have been developing new features and improved performance. So far the two
    products provide a feature set that is compatible but as time goes by we might
    see the two products develop features that are not compatible.


    CHAPTER 1 ■ INSTALLATION AND CONFIGURATION


    To install the MariaDb Server and all its dependencies, run these commands as
    the root user: $ yum install mariadb-server


    $ systemctl enable mariadb


    $ systemctl start mariadb


    After that it is recommended to run the command mysql_secure_installation. This
    is a script that will set a root password, disable remote root login, and perform
    other changes that will enhance security. With the exception of setting a root
    password it is safe to answer yes to all questions. The name of the script is
    the same for both MySQL and MariaDb installations.


    How it Works


    This completes the installation of the database sever but there is no support
    in PHP for this database.


    In order to get the MySQLi extension installed it is necessary to reconfigure
    PHP to add the extension, recompile, and reinstall:


    $ ./configure --with-apxs2 --with-mysqli


    $ make


    $ sudo make install


    In this environment it is necessary to re-edit the /etc/httpd/conf/httpd.conf
    file and remove the entry added for the php7_module.


    The PHP installation is now complete. If other extensions are needed the steps
    above can be repeated.


    To install MariaDB on Windows is equally easy. The latest installation packages
    can be found at


    [https://mariadb.org/download/ , or if you pr](https://mariadb.org/download/)efer
    the MySQL version you can download the installation files fr[om http://www.mysql.com/downloads/
    .](http://www.mysql.com/downloads/)


    Recipe 1-5\. Virtual Machines


    Problem


    When development is done on a Windows or Mac OSX computer and deployment is done
    on a Linux environment it is easy to run into issues that are related to differences
    in the operating systems, or there could be issues with lack of support for specific
    extensions on one of the platforms. Is there a way to minimize these problems?


    Solution


    There are a number of cloud-based services that offer relatively cheap virtual
    Linux environments. Many of these can be configured and launched in a few minutes
    and the user only pays for the time the configuration is active. The cost is as
    low as $10 per month.


    Having a virtual server in the cloud requires an Internet connection to use with
    the server. If work is done offline it is more convenient to install a Virtual
    Machine on the development environment. A Virtual Machine is a system that allows
    the primary operating system on a computer to be the host for one or more client
    systems. This is supported on Windows, Mac OSX, and Linus systems, either with
    native software, third-party freeware (VirtualBox), or commercial products (VM-Ware
    or Parallels).


    CHAPTER 1 ■ INSTALLATION AND CONFIGURATION


    How it Works


    VirtualBox is supported by Oracle and can be downloaded for free at [https://www.virtualbox.org/
    .](https://www.virtualbox.org/) After installation of the software you can create
    as many virtual machines as you have space on the hard drive.


    Each virtual machine requires 10-100Gb of disk space. It is possible to install
    both Windows and Linux guests. The guests can be installed from an ISO image that
    can be downloaded from the preferred Linux distributions web site. Windows even
    provides distributions of prebuilt systems that can be downloaded and launched.
    Most of these can be used for up to 90 days for testing purposes. If you have
    a valid Windows license you can also create an installation that doesn’t expire.


    **CHAPTER 2**


    **Classes and Objects**


    Object-oriented programming provides many advantages over procedural programming.
    It helps with encapsulation when code is shared within a team or between teams
    and it can help protect elements of the code from being abused. This is especially
    the case when code is shared in compiled form but the same mechanisms can be applied
    to a scripting language like PHP. This chapter describes how object-oriented programming
    works in PHP.


    Recipe 2-1\. Writing a Simple Class


    Problem


    PHP can be used as a procedural programming language, but you want to make use
    of the many features of object-oriented programming with classes and objects to
    create advanced libraries and applications that make collaboration and encapsulation
    easy.


    Solution


    A class is the foundation of object-oriented programming. A class is a collection
    of properties and methods that goes together and so this is where to start when
    writing an object-oriented PHP application.


    Like most other object-oriented programming languages the keyword class is used
    to define classes that consist of class variables, class constants, and methods.
    The class is used to define all the data and all the functionality associated
    with the object that can be instantiated from the class. In other words, the class
    is the definition and the object is the live instance and multiple instances can
    be created from the same class where each instance exists as a value in a variable.


    How it Works


    The first example is a simple class definition where the class foo has a single
    method called a() . Methods are defined as any regular function but because it’s
    defined within a class it becomes a method that belongs to that class.


    <?php


    // 2_1.php


    class foo {


    function a() {


    echo "Method foo::a()\n";


    }


    }


    © Frank M. Kromann 2016


    F.M. Kromann, *PHP and MySQL Recipes*, DOI 10.1007/978-1-4842-0605-8_2


    CHAPTER 2 ■ CLASSES AND OBJECTS


    Recipe 2-2\. Writing a Base Class


    Problem


    PHP supports different types of classes that serve various purposes. These are
    called base, abstract, and interface classes. You want to use a base class to
    include functionality that is shared by multiple subclasses that all share the
    same base functionality.


    Solution


    A base class is usually a simple class that can be used to instantiate objects
    that store member data and can perform actions on the data. A base class can also
    be extended to add additional or changed functionality.


    This principle can be repeated so extended classes can be extended further and
    so on.


    How it Works


    In the following example we have a class with one member function and a second
    class that extends the first one and adds a second member.


    <?php


    // 2_2.php


    class foo {


    function a() {


    echo "Method foo::a()\n";


    }


