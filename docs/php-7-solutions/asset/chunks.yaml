    \ stage involves retrieving the details of the record that you\n    want to update.\
    \ Put the following code in a PHP block above the `DOCTYPE` declaration:\n\n```\n\
    \    require_once '../includes/connection.php';\n    require_once '../includes/utility_funcs.php';\n\
    \    // initialize flags\n    $OK = false;\n    $done = false;\n    // create\
    \ database connection\n    $conn = dbConnect('write');\n    // initialize statement\n\
    \    $stmt = $conn->stmt_init();\n    // get details of selected record\n    if\
    \ (isset($_GET['article_id']) && !$_POST) {\n    // prepare SQL query\n    $sql\
    \ = 'SELECT article_id, title, article\n    FROM blog WHERE article_id = ?';\n\
    \    if ($stmt->prepare($sql)) {\n    // bind the query parameter\n    $stmt->bind_param('i',\
    \ $_GET['article_id']);\n    // execute the query, and fetch the result\n    $OK\
    \ = $stmt->execute();\n    // bind the results to variables\n    $stmt->bind_result($article_id,\
    \ $title, $article);\n    $stmt->fetch();\n    }\n    }\n    // redirect if $_GET['article_id']\
    \ not defined\n    if (!isset($_GET['article_id'])) {\n    $url = 'http://localhost/phpsols-4e/admin/blog_list_mysqli.php';\n\
    \    header(\"Location: $url\");\n    exit;\n    }\n    // get error message if\
    \ query fails\n    if (isset($stmt) && !$OK && !$done) {\n    $error = $stmt->error;\n\
    \    }\n    ```\n\nAlthough this is very similar to the code used for the insert\
    \ page,\n    the first few lines are *outside* the conditional statements.\n \
    \   Both stages of the update process require the database connection and a\n\
    \    prepared statement, so this avoids the need to duplicate the same code\n\
    \    later. Two flags are initialized: `$OK` to check the\n    success of retrieving\
    \ the record and `$done` to check\n    whether the update succeeds.\n\nThe first\
    \ conditional statement makes sure that `$_GET['article_id']`\n    exists and\
    \ that the `$_POST` array is\n    empty. So the code inside the braces is executed\
    \ only when the query\n    string is set, but the form hasn’t been submitted.\n\
    \nYou prepare the `SELECT` query in the\n    same way as for an `INSERT` command,\
    \ using\n    a question mark as a placeholder for the variable. However, note\
    \ that\n    instead of using an asterisk to retrieve all columns, the query\n\
    \    specifies three columns by name like this:\n\n```\n    $sql = 'SELECT article_id,\
    \ title, article\n    FROM blog WHERE article_id = ?';\n    ```\n\nThis is because\
    \ a MySQLi prepared statement lets you bind the result\n    of a `SELECT`\n  \
    \  query to variables, and to be able to do this, you must specify the\n    column\
    \ names and the order you want them to be in.\n\nFirst, you need to initialize\
    \ the prepared statement and bind `$_GET['article_id']`\n    to the query with\
    \ `$stmt->bind_param()`.\n    Because the value of `article_id` must be an\n \
    \   integer, you pass `'i'` as the first\n    argument.\n\nThe code executes the\
    \ query and then binds the result to variables in\n    the same order as the columns\
    \ specified in the `SELECT` query before\n    fetching the result.\n\nThe next\
    \ conditional statement redirects the page to `blog_list_mysqli.php`\n    if `$_GET['article_id']`\n\
    \    hasn’t been defined. This prevents anyone from trying to load the update\n\
    \    page directly in a browser. The redirect location has been assigned to a\n\
    \    variable because a query string will be added to it later if the update\n\
    \    is successful.\n\nThe final conditional statement stores an error message\
    \ if the\n    prepared statement has been created but both `$OK` and `$done` remain\
    \ `false`. You haven’t\n    added the update script yet, but if the record is\
    \ retrieved or updated\n    successfully, one of them will be switched to `true`.\
    \ So if both\n    remain `false`,\n    you know there was something wrong with\
    \ one of the SQL queries.\n\n3.  Now that you have retrieved the contents of the\
    \ record, you need to\n    display them in the update form. If the prepared statement\
    \ succeeded,\n    `$article_id`\n    should contain the primary key of the record\
    \ to be updated, because it’s\n    one of the variables you bound to the result\
    \ set with the `bind_result()`\n    method.\n\nHowever, if there’s an error, you\
    \ need to display the message onscreen.\n    But if someone alters the query string\
    \ to an invalid number, `$article_id` will be\n    set to `0`, so\n    there is\
    \ no point in displaying the update form. Add the following\n    conditional statements\
    \ immediately before the opening `<form>` tag:\n\n```\n    List all entries \n\
    \    Error: $error\";\n    }\n    if($article_id == 0) { ?>\n    Invalid request:\
    \ record does not exist.\n\n```\n\nThe first conditional statement displays any\
    \ error message reported\n    by the MySQLi prepared statement. The second wraps\
    \ the update form in an\n    `else` block, so\n    the form will be hidden if\
    \ `$article_id` is `0`.\n\n4.  Add the closing curly brace of the `else` block\n\
    \    immediately after the closing `</form>` tag,\n    like this:\n\n5.  If `$article_id`\
    \ is not\n    `0`, you know\n    that `$title` and\n    `$article` also\n    contain\
    \ valid values and can be displayed in the update form without\n    further testing.\
    \ However, you need to pass text values to `safe()` to avoid\n    problems with\
    \ quotes and executable code. Display `$title` in the `value` attribute of\n \
    \   the `title` input\n    field like this:\n\n```\n    \">\n    ```\n\n6.  Do\
    \ the same for the `article` text area.\n    Because text areas don’t have a value\
    \ attribute, the code goes between\n    the opening and closing `<textarea>` tags\n\
    \    like this:\n\n```\n    Make sure there is no space between the opening and\
    \ closing PHP and\n    `<textarea>`\n    tags. Otherwise, you’ll get unwanted\
    \ spaces in your updated record.\n\n```"
  trans: "\n**提示** 此代码假设表中始终存在记录。作为练习，请使用 PHP 解决方案 13-2（MySQLi）或 13-4（PDO）中的技术统计结果数量，并使用条件语句在未找到记录时显示消息。解决方案位于\
    \ `blog_list_norec_mysqli.php` 和 `blog_list_norec_pdo.php` 中。\n\n## 更新记录\n\n更新页面需要执行两个独立的流程，如下所示：\n\
    \n1.  检索选定的记录，并将其显示以供编辑\n2.  在数据库中更新已编辑的记录\n\n第一阶段使用 `$_GET` 超全局数组从 URL 中检索主键，然后使用它在更新表单中选择并显示记录，如图\
    \ 15-3 所示。\n\n![../images/332054_4_En_15_Chapter/332054_4_En_15_Fig3_HTML.jpg](img/332054_4_En_15_Fig3_HTML.jpg)\n\
    \n**图 15-3.** 在更新过程中，主键用于跟踪记录\n\n主键存储在更新表单的隐藏字段中。在更新页面中编辑记录后，使用 `post` 方法提交表单，将所有详细信息（包括主键）传递给\
    \ `UPDATE` 命令。\n\nSQL `UPDATE` 命令的基本语法如下所示：\n\n```\nUPDATE table_name SET column_name\
    \ = value, column_name = value\nWHERE condition\n```\n\n更新特定记录时的条件是主键。因此，在 `blog`\
    \ 表中更新 `article_id 3` 时，基本的 `UPDATE` 查询如下所示：\n\n```\nUPDATE blog SET title = value,\
    \ article = value\nWHERE article_id = 3\n```\n\n尽管 MySQLi 和 PDO 的基本原理相同，但它们的代码差异很大，因此需要分别说明。\n\
    \n### PHP 解决方案 15-4：使用 MySQLi 更新记录\n\n此 PHP 解决方案演示如何将现有记录加载到更新表单中，然后将编辑后的详细信息发送到数据库，以便使用\
    \ MySQLi 进行更新。要加载记录，您需要按照 PHP 解决方案 15-3 中的描述创建列出所有记录的管理页面。\n\n1.  从 `ch15` 文件夹复制\
    \ `blog_update_mysqli_01.php`，并将其保存到 `admin` 文件夹中，命名为 `blog_update_mysqli.php`。\n\
    \n2.  第一阶段涉及检索要更新的记录的详细信息。将以下代码放在 `DOCTYPE` 声明上方的 PHP 块中：\n\n```\n    require_once\
    \ '../includes/connection.php';\n    require_once '../includes/utility_funcs.php';\n\
    \    // 初始化标志\n    $OK = false;\n    $done = false;\n    // 创建数据库连接\n    $conn\
    \ = dbConnect('write');\n    // 初始化语句\n    $stmt = $conn->stmt_init();\n    //\
    \ 获取选定记录的详细信息\n    if (isset($_GET['article_id']) && !$_POST) {\n    // 准备 SQL\
    \ 查询\n    $sql = 'SELECT article_id, title, article\n    FROM blog WHERE article_id\
    \ = ?';\n    if ($stmt->prepare($sql)) {\n    // 绑定查询参数\n    $stmt->bind_param('i',\
    \ $_GET['article_id']);\n    // 执行查询并获取结果\n    $OK = $stmt->execute();\n    //\
    \ 将结果绑定到变量\n    $stmt->bind_result($article_id, $title, $article);\n    $stmt->fetch();\n\
    \    }\n    }\n    // 如果未定义 $_GET['article_id']，则重定向\n    if (!isset($_GET['article_id']))\
    \ {\n    $url = 'http://localhost/phpsols-4e/admin/blog_list_mysqli.php';\n  \
    \  header(\"Location: $url\");\n    exit;\n    }\n    // 如果查询失败，则获取错误消息\n    if\
    \ (isset($stmt) && !$OK && !$done) {\n    $error = $stmt->error;\n    }\n```\n\
    \n虽然这与用于插入页面的代码非常相似，但前几行位于条件语句*之外*。更新过程的两个阶段都需要数据库连接和预处理语句，因此这避免了稍后重复相同代码。初始化了两个标志：`$OK`\
    \ 用于检查检索记录是否成功，`$done` 用于检查更新是否成功。\n\n第一个条件语句确保 `$_GET['article_id']` 存在且 `$_POST`\
    \ 数组为空。因此，仅当设置了查询字符串但表单尚未提交时，才会执行花括号内的代码。\n\n以与 `INSERT` 命令相同的方式准备 `SELECT` 查询，使用问号作为变量的占位符。但是，请注意，查询没有使用星号检索所有列，而是按名称指定了三列，如下所示：\n\
    \n```\n$sql = 'SELECT article_id, title, article\nFROM blog WHERE article_id =\
    \ ?';\n```\n\n这是因为 MySQLi 预处理语句允许您将 `SELECT` 查询的结果绑定到变量，要能够做到这一点，您必须指定列名及其所需顺序。\n\
    \n首先，您需要初始化预处理语句，并使用 `$stmt->bind_param()` 将 `$_GET['article_id']` 绑定到查询。由于 `article_id`\
    \ 的值必须是整数，因此您将 `'i'` 作为第一个参数传递。\n\n该代码执行查询，然后在获取结果之前，将结果绑定到与 `SELECT` 查询中指定的列顺序相同的变量。\n\
    \n如果 `$_GET['article_id']` 未定义，下一个条件语句会将页面重定向到 `blog_list_mysqli.php`。这可以防止任何人在浏览器中直接加载更新页面。重定向位置已分配给一个变量，因为如果更新成功，稍后会将查询字符串添加到该变量。\n\
    \n最后一个条件语句会在已创建预处理语句但 `$OK` 和 `$done` 仍为 `false` 时存储错误消息。您尚未添加更新脚本，但如果记录检索或更新成功，其中一个将切换为\
    \ `true`。因此，如果两者都保持 `false`，您就知道其中一个 SQL 查询出了问题。\n\n3.  现在您已经检索到记录的内容，需要在更新表单中显示它们。如果预处理语句成功，`$article_id`\
    \ 应包含要更新记录的主键，因为它是您使用 `bind_result()` 方法绑定到结果集的变量之一。\n\n但是，如果出现错误，您需要在屏幕上显示消息。但如果有人将查询字符串更改为无效数字，`$article_id`\
    \ 将设置为 `0`，因此显示更新表单就没有意义了。在开始 `<form>` 标签之前立即添加以下条件语句：\n\n```\n<?php if (isset($error))\
    \ {\n    echo \"<p>Error: $error</p>\";\n} ?>\n<?php if($article_id == 0) { ?>\n\
    \    <p>Invalid request: record does not exist.</p>\n    <p><a href=\"blog_list_mysqli.php\"\
    >List all entries</a></p>\n<?php } else { ?>\n```\n\n第一个条件语句显示 MySQLi 预处理语句报告的任何错误消息。第二个条件语句将更新表单包装在\
    \ `else` 块中，因此如果 `$article_id` 为 `0`，表单将被隐藏。\n\n4.  在结束 `</form>` 标签之后立即添加 `else`\
    \ 块的右花括号，如下所示：\n\n```\n<?php } ?>\n```\n\n5.  如果 `$article_id` 不是 `0`，您就知道 `$title`\
    \ 和 `$article` 也包含有效值，并且可以在更新表单中显示，无需进一步测试。但是，您需要将文本值传递给 `safe()` 以避免引号和可执行代码带来的问题。像这样在\
    \ `title` 输入字段的 `value` 属性中显示 `$title`：\n\n```\n<input type=\"text\" name=\"title\"\
    \ value=\"<?= safe($title) ?>\">\n```\n\n6.  对 `article` 文本区域执行相同操作。由于文本区域没有 `value`\
    \ 属性，因此代码如下所示放在开始和结束 `<textarea>` 标签之间：\n\n```\n<textarea name=\"article\" cols=\"\
    60\" rows=\"10\"><?= safe($article) ?></textarea>\n```\n\n确保开始和结束 PHP 标签与 `<textarea>`\
    \ 标签之间没有空格。否则，在更新的记录中将会出现不需要的空格。\n"
