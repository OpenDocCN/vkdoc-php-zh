    `SELECT title, article, DATE_FORMAT(updated, ''%W, %M %D, %Y'') AS updated, filename,
    caption`


    `FROM blog` `LEFT` `JOIN images USING (image_id)`


    When you run it in phpMyAdmin, you get all four articles, as shown in Figure [15-10](#A978-1-4842-0635-5_15_Chapter.html#Fig10).


    ![A978-1-4842-0635-5_15_Fig10_HTML.jpg](A978-1-4842-0635-5_15_Fig10_HTML.jpg)


    Figure 15-10.


    LEFT JOIN includes records that don''t have a match in the right table


    As you can see, the empty fields from the right table (`images`) are displayed
    as `NULL`.


    If the column names are not the same in both tables, use ON like this:


    `FROM` `table_1` `LEFT JOIN` `table_2` `ON` `table_1.col_name` `=` `table_2.col_name`


    So, now you can rewrite the SQL query in `details.php` like this:


    `$sql = "SELECT title, article, DATE_FORMAT(updated, ''%W, %M %D, %Y'') AS updated,`


    `filename, caption`


    `FROM blog` `LEFT` `JOIN images USING (image_id)`


    `WHERE blog.article_id = $article_id";`


    If you click the `More` link to view the article that doesn’t have an associated
    image, you should now see the article correctly displayed as shown in Figure [15-11](#A978-1-4842-0635-5_15_Chapter.html#Fig11).
    The other articles should still display correctly, too. The finished code can
    be found in `details_mysqli_02.php` and `details_pdo_02.php`.


    ![A978-1-4842-0635-5_15_Fig11_HTML.jpg](A978-1-4842-0635-5_15_Fig11_HTML.jpg)


    Figure 15-11.


    LEFT JOIN also retrieves articles that don''t have a matching foreign key


    ### Creating an Intelligent Link


    The link at the bottom of `details.php` goes straight back to `blog.php`. That’s
    fine with only four items in the `blog` table, but once you start getting more
    records in a database, you need to build a navigation system, as I showed you
    in [Chapter 12](#A978-1-4842-0635-5_12_Chapter.html). The problem with a navigation
    system is that you need a way to return visitors to the same point in the result
    set that they came from.


    #### PHP Solution 15-5: Returning to the Same Point in a Navigation System


    This PHP solution checks whether the visitor arrived from an internal or an external
    link. If the referring page was within the same site, the link returns the visitor
    to the same place. If the referring page was an external site, or if the server
    doesn’t support the necessary superglobal variables, the script substitutes a
    standard link. It is shown here in the context of `details.php`, but it can be
    used on any page.


    The code is not database-dependent, so it’s identical for both MySQLi and PDO.


    Locate the back link in the main body of `details.php`. It looks like this:  


    `<p><a href="blog.php">Back to the blog</a></p>`


    Place your cursor immediately to the right of the first quotation mark, and insert
    the following code highlighted in bold:  


    `<p><a href="`


    `<?php`


    `// check that browser supports $_SERVER variables`


    `if (isset($_SERVER[''HTTP_REFERER''])` `&&` `isset($_SERVER[''HTTP_HOST'']))
    {`


    `$url = parse_url($_SERVER[''HTTP_REFERER'']);`


    `// find if visitor was referred from a different domain`


    `if ($url[''host''] == $_SERVER[''HTTP_HOST'']) {`


    `// if same domain, use referring URL`


    `echo $_SERVER[''HTTP_REFERER''];`


    `}`


    `} else {`


    `// otherwise, send to main page`


    `echo ''blog.php'';`


    `} ?>` `">Back to the blog</a></p>`


    `$_SERVER[''HTTP_REFERER'']` and `$_SERVER[''HTTP_HOST'']` are superglobal variables
    that contain the URL of the referring page and the current hostname. You need
    to check their existence with `isset()` because not all servers support them.
    Also, the browser might block the URL of the referring page.


    The `parse_url()` function creates an array containing each part of a URL, so
    `$url[''host'']` contains the hostname. If it matches `$_SERVER[''HTTP_HOST'']`,
    you know that the visitor was referred by an internal link, so the full URL of
    the internal link is inserted in the `href` attribute. This includes any query
    string, so the link sends the visitor back to the same position in a navigation
    system. Otherwise, an ordinary link is created to the target page.


    The finished code is in `details_mysqli_03.php` and `details_pdo_3.php` in the
    `ch15` folder.


    ## Chapter Review


    Retrieving information stored in multiple tables is relatively simple with `INNER
    JOIN` and `LEFT JOIN`. The key to working successfully with multiple tables lies
    in structuring the relationship between them so that complex relationships can
    always be resolved as `1:1`, if necessary through a cross-reference (or linking)
    table. The next chapter continues the exploration of working with multiple tables,
    showing you how to deal with foreign-key relationships when inserting, updating,
    and deleting records.


    # 16. Managing Multiple Database Tables


    The previous chapter showed you how to use `INNER JOIN` and `LEFT JOIN` to retrieve
    information stored in multiple tables. You also learned how to link existing tables
    by adding an extra column to the child table and updating each record individually
    to insert a foreign key. However, most of the time you’ll want to insert data
    simultaneously in both tables. That presents a challenge, because `INSERT` commands
    can operate on only one table at a time. You need to handle the insert operations
    in the correct sequence, starting with the parent table, so that you can get the
    new record’s primary key and insert it in the child table at the same time as
    other details. Similar considerations also need to be taken into account when
    updating and deleting records. The code involved isn’t difficult, but you need
    to keep the sequence of events clearly in mind as you build the scripts.


    This chapter guides you through the process of inserting new articles in the `blog`
    table, optionally selecting a related image or uploading a new one, and assigning
    the article to one or more categories, all in a single operation. Then you’ll
    build the scripts to update and delete articles without destroying the referential
    integrity of related tables.


    You’ll also learn about foreign-key constraints, which control what happens if
    you try to delete records that still have a foreign-key relationship in another
    table. Not all databases support foreign-key constraints, so it’s important to
    check whether your remote server does. This chapter also explains what measures
    you can take to preserve the integrity of your data if your server doesn’t support
    foreign-key constraints.


    In particular, you’ll learn about the following:


    *   Inserting, updating, and deleting records in related tables

    *   Finding the primary key of a record immediately after it has been created

    *   Converting a table’s storage engine

    *   Establishing foreign-key constraints between InnoDB tables'
