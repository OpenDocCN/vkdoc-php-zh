- fmt: "# Creating the Product Catalog: Part II\n\n## Relating Products to Categories\n\
    \nThe `product_category` table is the linking table that allows implementing the\
    \ Many-to-Many relationship between `product` and `category`. It has two fields,\
    \ `product_id` and `category_id`, which form the primary key of the table.\n\n\
    Create and populate the table following the steps in the exercise.\n\n### Exercise:\
    \ Creating the `product_category` Table\n\n1. Start pgAdmin III, and connect to\
    \ the `hatshop` database.\n2. Select **Tools ➤ Query Tool**.\n3. Enter the following\
    \ code:\n\n```sql\n-- Create product_category table\n\nCREATE TABLE product_category\n\
    (\n  product_id INTEGER NOT NULL,\n  category_id INTEGER NOT NULL,\n  CONSTRAINT\
    \ pk_product_id_category_id PRIMARY KEY (product_id, category_id),\n  CONSTRAINT\
    \ fk_product_id FOREIGN KEY (product_id) REFERENCES product (product_id)\n   \
    \ ON UPDATE RESTRICT ON DELETE RESTRICT,\n  CONSTRAINT fk_category_id FOREIGN\
    \ KEY (category_id) REFERENCES category (category_id)\n    ON UPDATE RESTRICT\
    \ ON DELETE RESTRICT\n);\n```\n\n4. Execute the query by selecting **Query ➤ Execute**,\
    \ or by pressing F5.\n5. Populate the table with data. Because there are many\
    \ rows, use the `populate_product_category.sql` script provided in the Source\
    \ Code/Download section (http://www.apress.com).\n\n### How It Works: Many-to-Many\
    \ Relationships\n\nMany-to-Many relationships are created by adding a third table,\
    \ called a junction table, which is named `product_category` in this case. This\
    \ table contains (`product_id`, `category_id`) pairs, and each record in the table\
    \ associates a particular product with a particular category. So, if you see a\
    \ record such as `(1,4)` in `product_category`, you know that the product with\
    \ the ID of 1 belongs to the category with the ID of 4.\n\nThe Many-to-Many relationship\
    \ is physically enforced through two FOREIGN KEY constraints—one that links the\
    \ table `product` to the table `product_category`, and the other that links the\
    \ table `product_category` to the table `category`. In English, this means, “one\
    \ product can be associated with many product-category entries, each of those\
    \ being associated with one category.” The foreign keys ensure that the products\
    \ and categories that appear in the `product_category` table actually exist in\
    \ the database and won’t allow you to delete a product if you have a category\
    \ associated with it and vice versa.\n\nThis is also the first time that you set\
    \ a primary key consisting of more than one column. The primary key of `product_category`\
    \ is formed by both its fields: `product_id` and `category_id`. This means that\
    \ you won’t be allowed to have two identical (`product_id`, `category_id`) pairs\
    \ in the table. However, it’s perfectly legal to have a `product_id` or `category_id`\
    \ appear more than once, as long as it is part of a unique (`product_id`, `category_id`)\
    \ pair. This makes sense because you don’t want to have two identical records\
    \ in the `product_category` table. A product can be associated with a particular\
    \ category, or not; it cannot be associated with a category multiple times.\n\n\
    At first, all the theory about table relationships can be a bit confusing, until\
    \ you get used to it. To understand the relationship more clearly, you can get\
    \ a picture by using database diagrams.\n\n### Using Database Diagrams\n\nA number\
    \ of tools allow you to build database structures visually, implement them physically\
    \ in the database for you, and generate the necessary SQL script. Although we\
    \ won’t present any particular tool in this book, it’s good to know that they\
    \ exist. You can find a list of the most popular tools at http://www.databaseanswers.com/modelling_tools.htm.\n\
    \nDatabase diagrams also have the capability to implement the relationships between\
    \ tables. For example, if you had implemented the relationships between your four\
    \ tables so far, the database diagram would look something like Figure 4-8.\n\n\
    **Figure 4-8.** *Viewing tables and relationships using the database diagram*\n\
    \nIn the diagram, the primary keys of each table are marked with the PK notation.\
    \ Foreign keys are marked with FK (because there can be more of them in a table,\
    \ they’re numbered). The arrows between two tables point toward the table in the\
    \ One part of the relationship.\n\n## Querying the New Data\n\nNow you have a\
    \ database with a wealth of information just waiting to be read by somebody. However,\
    \ the new elements bring with them a set of new things you need to learn.\n\n\
    For this chapter, the data tier logic is a little bit more complicated than in\
    \ the previous chapter because it must answer to queries like “give me the second\
    \ page of products from the Cartoons category” or “give me the products on promotion\
    \ for department X.” Before moving on to writing the stored procedures that implement\
    \ this logic, let’s first cover the theory about:\n\n- Retrieving short product\
    \ descriptions\n- Joining data tables\n- Implementing paging\n\nLet’s deal with\
    \ these tasks one by one.\n\n### Getting Short Descriptions\n\nIn the product\
    \ lists your visitor sees while browsing the catalog, we won’t display full product\
    \ descriptions but only a portion of them. In HatShop, we’ll display the first\
    \ 150 characters of every product description, after which we append “...”.\n\n\
    In PostgreSQL, you can extract a substring from a string using the `substring`\
    \ function. The following SELECT command returns products’ descriptions trimmed\
    \ at 30 characters, with “...” appended:\n\n```sql\nSELECT name,\n       substring(description,\
    \ 1, 30) || '...' AS description\nFROM product\nORDER BY name;\n```\n\nThe new\
    \ column generated by the `(substring(description, 1, 30) || '...')` expression\
    \ doesn’t have a name, so we created an alias for it using the `AS` keyword. With\
    \ your current data, this query would return something like this:\n\n| name  \
    \             | description                            |\n|--------------------|----------------------------------------|\n\
    | 454 Black Pirate Hat | Our wool felt Pirate Hat comes...     |\n| 9 Green MadHatter\
    \ Top Hat | Each of our MadHatter hats is ...   |\n| Black Basque Beret  | This\
    \ is our tried and true men...      |\n| Black Puritan Hat   | Haentze Hatcrafters\
    \ has been m...      |\n| Black Wizard Hat    | This cool Merlin-style wizard\
    \ ...      |\n| ...                | ...                                    |\n\
    \n### Joining Data Tables\n\nBecause your data is stored in several tables, frequently\
    \ not all of the information you’ll need is in one table. Take a look at the following\
    \ list, which contains data from both the `department` and `category` tables:\n\
    \n| Department Name       | Category Name            |\n|-----------------------|--------------------------|\n\
    | Holiday               | Christmas Hats           |\n| Holiday              \
    \ | Halloween Hats           |\n| Holiday               | St. Patrick’s Day Hats\
    \   |\n| Caps and Berets       | Berets                   |\n| Caps and Berets\
    \       | Driving Caps             |\n| Costume Hats          | Theatrical Hats\
    \          |\n| Costume Hats          | Military Hats            |\n\nIn other\
    \ cases, all the information you need is in just one table, but you need to place\
    \ conditions on it based on the information in another table. You cannot get this\
    \ kind of result set with simple queries such as the ones you’ve used so far.\
    \ Needing a result set based on data from multiple tables is a good indication\
    \ that you might need to use **table joins**."
