  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n> **注意**  \n虽然你在选择变量名方面有很大的自由度，但你不能使用\
    \ `$this`，因为它在 PHP 面向对象编程中有特殊含义。同时建议避免使用 [`https://secure.php.net/manual/en/reserved.php`](https://secure.php.net/manual/en/reserved.php)\
    \ 中列出的任何关键字。\n\n## 为变量赋值\n\n变量的值来源有多种，包括以下几种：\n\n-   通过在线表单的用户输入\n-   数据库\n- \
    \  外部源，例如新闻源或 XML 文件\n-   计算结果\n-   直接包含在 PHP 代码中\n\n无论值来自何处，总是使用等号（`=`）进行赋值，如下所示：\n\
    \n```php\n$variable = value;\n```\n\n变量位于等号左侧，值位于右侧。因为它用于赋值，所以等号被称为**赋值运算符**。\n\
    \n> **注意**  \n> 从小对等号的熟悉，让我们很难摆脱认为它表示“等于”的思维习惯。然而，PHP 使用两个等号（`==`）来表示相等。这是导致初学者犯错的主要原因，有时甚至也会让经验丰富的开发者中招。`=`\
    \ 和 `==` 之间的区别将在本章后面更详细地介绍。\n\n## 以分号结束命令\n\nPHP 被编写为一系列命令或语句。通常，每个语句都告诉 PHP 引擎执行一个操作，并且后面必须跟一个分号，如下所示：\n\
    \n```php\necho \"Hello, World!\";\n```\n\n同所有规则一样，这里有一个例外：你可以省略代码块中最后一个语句后的分号。但是，**不要这样做**，除非是使用本章后面描述的短\
    \ `echo` 标签。与 JavaScript 不同，如果你省略分号，PHP 不会假设行尾应该有分号。这有一个很好的副作用：你可以将长语句分散到多行以便于阅读。与\
    \ HTML 一样，PHP 会忽略代码中的空白。相反，它依靠分号来指示一条命令的结束和另一条命令的开始。\n\n> **提示**  \n> 缺少分号会使你的脚本彻底停止运行。\n\
    \n## 注释脚本\n\n除非你将一段代码标记为注释，否则 PHP 会将所有内容视为要执行的语句。以下三个原因解释了为什么你可能想要这样做：\n\n-  \
    \ 插入对脚本功能的提醒\n-   插入一个占位符，用于稍后添加代码\n-   暂时禁用一段代码\n\n当一个脚本在你的脑海中还很新鲜时，插入任何不会被处理的内容似乎没有必要。然而，如果你需要在几个月后修改脚本，你会发现注释比单独阅读代码本身要容易得多。在团队协作时，注释也至关重要。它们有助于你的同事理解代码的意图。\n\
    \n在测试期间，阻止一行代码，甚至整个代码段运行通常很有用。PHP 会忽略任何标记为注释的内容，因此这是一种开启和关闭代码的有用方式。\n\n有三种添加注释的方法：两种用于单行注释，一种用于跨越多行的注释。\n\
    \n### 单行注释\n\n最常见的单行注释类型以两个正斜杠开头，如下所示：\n\n```php\n// 这是一个注释，PHP 引擎会忽略它\n```\n\n\
    PHP 会忽略从双斜杠到行尾的所有内容，因此你也可以将注释放在代码旁（但只能在右侧）：\n\n```php\n$startYear = 2018; // 这是一个有效的注释\n\
    ```\n\n注释不是 PHP 语句，因此它们不以分号结尾。但不要忘记与注释在同一行的 PHP 语句末尾的分号。\n\n另一种替代风格是使用井号（`#`），如下所示：\n\
    \n```php\n# 这是另一种类型的注释，PHP 引擎会忽略它\n$startYear = 2018; # 这也作为注释使用\n```\n\n这种注释风格通常用于指示较长脚本的各个部分，如下所示：\n\
    \n```php\n##################\n## 菜单部分 ##\n##################\n```\n\n### 多行注释\n\
    \n要使注释跨越多行，请使用与层叠样式表（CSS）和 JavaScript 相同的风格。`/*` 和 `*/` 之间的任何内容都被视为注释，如下所示：\n\n\
    ```php\n/* 这是一个跨越\n多行的注释。它使用了与 CSS 中相同的\n开始和结束标记。 */\n```\n\n多行注释在测试或故障排除时特别有用，因为它们可用于禁用脚本的长段代码，而无需删除它们。\n\
    \n> **提示**  \n> 良好的注释和精心选择的变量名使代码更易于理解和维护。\n\n## 使用数组存储多个值\n\nPHP 允许你将多个值存储在一个称为**数组**的特殊变量类型中。一个简单的理解方式是：数组就像一个购物清单。虽然每个项目可能不同，但你可以用同一个名字来统称它们。图\
    \ 3-3 展示了这个概念：变量 `$shoppingList` 统称所有五个项目——酒、鱼、面包、葡萄和奶酪。\n\n![../images/332054_4_En_3_Chapter/332054_4_En_3_Fig3_HTML.jpg](img/332054_4_En_3_Fig3_HTML.jpg)\n\
    \n**图 3-3.** 数组是存储多个项目的变量，就像一个购物清单\n\n单个项目——或**数组元素**——通过变量名后面紧跟着方括号中的数字来标识。PHP\
    \ 会自动分配该数字，但重要的是要注意编号总是从 0 开始。因此，数组中的第一个项目，在我们的示例中是酒，被引用为 `$shoppingList[0]`，而不是\
    \ `$shoppingList[1]`。虽然总共有五个项目，但最后一个（奶酪）是 `$shoppingList[4]`。这个数字被称为数组的**键**或**索引**，这种类型的数组被称为**索引数组**。\n\
    \nPHP 使用另一种类型的数组，其中键是一个单词（或字母和数字的任意组合）。例如，一个包含本书详细信息的数组可能如下所示：\n\n```php\n$book['title']\
    \ = 'PHP 7 Solutions: Dynamic Web Design Made Easy, Fourth Edition';\n$book['author']\
    \ = 'David Powers';\n$book['publisher'] = 'Apress';\n```\n\n这种类型的数组被称为**关联数组**。注意，数组键被括在引号中（单引号或双引号，都可以）。\n\
    \n数组是 PHP 中重要且有用的部分。你将大量使用它们，从第 5 章开始，你将把图像详情存储在一个数组中，以便在网页上显示随机图像。当您以一系列数组的形式获取搜索结果时，数组也会与数据库一起被广泛使用。\n\
    \n> **注意**  \n> 你可以在第 4 章了解创建数组的各种方法。\n\n## PHP 的内置超全局数组\n\nPHP 有几个内置数组，它们会自动填充有用的信息。它们被称为**超全局数组**，通常以美元符号后跟一个下划线开头。唯一的例外是\
    \ `$GLOBALS`，它包含对脚本**全局作用域**中所有变量的引用（有关作用域的说明，请参阅第 4 章的“变量作用域——黑盒函数”）。\n\n你会经常看到两个超全局变量：`$_POST`\
    \ 和 `$_GET`。它们分别包含通过超文本传输协议（HTTP）的 `post` 和 `get` 方法从表单传递的信息。这些超全局变量都是关联数组，并且\
    \ `$_POST` 和 `$_GET` 的键会自动从表单元素的名称或 URL 末尾查询字符串中的变量派生而来。\n"
- fmt: 'Let’s say you have a text input field called “`address`” in a form; PHP automatically
    creates an array element called `$_POST[''address'']` when the form is submitted
    by the `post` method or `$_GET[''address'']` if you use the `get` method. As Figure
    [3-4](#332054_4_En_3_Chapter.xhtml#Fig4) shows, `$_POST[''address'']` contains
    whatever value a visitor enters in the text field, enabling you to display it
    onscreen, insert it in a database, send it to your email inbox, or do whatever
    you want with it.


    ![../images/332054_4_En_3_Chapter/332054_4_En_3_Fig4_HTML.jpg](images/332054_4_En_3_Chapter/332054_4_En_3_Fig4_HTML.jpg)


    **Figure 3-4.** You can retrieve the values of user input through the `$_POST`
    array, which is created automatically when a form is submitted using the `post`
    method.


    You’ll work with the `$_POST` array in Chapter [6](#332054_4_En_6_Chapter.xhtml)
    when you send the content of an online feedback form by email to your inbox. Other
    superglobal arrays that you’ll use in this book are `$_SERVER`, to get information
    from the web server in Chapters [5](#332054_4_En_5_Chapter.xhtml), [14](#332054_4_En_14_Chapter.xhtml),
    and [15](#332054_4_En_15_Chapter.xhtml), `$_FILES` to upload files to your web
    site in Chapter [8](#332054_4_En_8_Chapter.xhtml), and `$_SESSION`, to create
    a simple login system in Chapters [11](#332054_4_En_11_Chapter.xhtml) and [19](#332054_4_En_19_Chapter.xhtml).


    **Caution:** Don’t forget that variable names in PHP are case-sensitive. All superglobal
    array names are written in uppercase. `$_Post` or `$_Get`, for example, won’t
    work.


    ## Understanding When to Use Quotes


    If you look closely at the PHP code block in Figure [3-1](#332054_4_En_3_Chapter.xhtml#Fig1),
    you’ll notice that the value assigned to the first variable isn’t enclosed in
    quotes. It looks like this:


    ```

    $startYear = 2018;

    ```


    Yet all the examples in “Using arrays to store multiple values” *did* use quotes,
    like this:


    ```

    $book[''title''] = ''PHP 7 Solutions: Dynamic Web Design Made Easy, Fourth Edition'';

    ```


    The simple rules are as follows:


    * **Numbers**: No quotes

    * **Text**: Requires quotes


    As a general principle, it doesn’t matter whether you use single or double quotes
    around text or a **string**, as text is called in PHP and other computer languages.
    The situation is a bit more complex, as explained in Chapter [4](#332054_4_En_4_Chapter.xhtml),
    because there’s a subtle difference in the way single and double quotes are treated
    by the PHP engine.


    **Note:** The word “string” is borrowed from computer and mathematical science,
    where it means a sequence of simple objects—in this case, the characters in text.


    Quotes must always be in matching pairs, so you need to be careful about including
    apostrophes in a single-quoted string or double quotes in a double-quoted string.
    Examine the following line of code:


    ```

    $book[''description''] = ''This is David''s latest book on PHP.'';

    ```


    At first glance, there seems to be nothing wrong with it. However, the PHP engine
    sees things differently than the human eye does, as Figure [3-5](#332054_4_En_3_Chapter.xhtml#Fig5)
    demonstrates.


    ![../images/332054_4_En_3_Chapter/332054_4_En_3_Fig5_HTML.jpg](images/332054_4_En_3_Chapter/332054_4_En_3_Fig5_HTML.jpg)


    **Figure 3-5.** An apostrophe inside a single-quoted string confuses the PHP engine.


    There are two ways around this problem:


    * Use double quotes if the text includes any apostrophes.

    * Precede apostrophes with a backslash (this is known as **escaping**).


    So, either of the following is acceptable:


    ```

    $book[''description''] = "This is David''s latest book on PHP.";

    $book[''description''] = ''This is David\''s latest book on PHP.'';

    ```


    The same applies with double quotes in a double-quoted string (although with the
    rules reversed). The following code causes a problem:


    ```

    $play = "Shakespeare''s "Macbeth"";

    ```


    In this case, the apostrophe is fine, because it doesn’t conflict with the double
    quotes, but the opening quotes in front of *Macbeth* bring the string to a premature
    end. To solve the problem, either of the following is acceptable:


    ```

    $play = ''Shakespeare\''s "Macbeth"'';

    $play = "Shakespeare''s \"Macbeth\"";

    ```


    In the first example, the entire string has been enclosed in single quotes. This
    gets around the problem of the double quotes surrounding *Macbeth* but introduces
    the need to escape the apostrophe in *Shakespeare’s*. The apostrophe presents
    no problem in a double-quoted string, but the double quotes around *Macbeth* both
    need to be escaped. So, to summarize:


    * Single quotes and apostrophes are fine inside a double-quoted string.

    * Double quotes are fine inside a single-quoted string.

    * Anything else must be escaped with a backslash.


    **Tip:** Use single quotes most of the time and reserve double quotes for situations
    where they have a special meaning, as described in Chapter [4](#332054_4_En_4_Chapter.xhtml).


    ## Special Cases: `true`, `false`, and `null`


    Although text should be enclosed in quotes, three keywords—`true`, `false`, and
    `null`—should never be unless you want to treat them as strings. The first two
    mean what you expect; `null` means “nonexistent value.”


    **Note:** `true` and `false` are known as **Boolean values**. They’re named after
    nineteenth-century mathematician George Boole whose system of logical operations
    became the basis of much modern-day computing.


    As the next section explains, PHP makes decisions based on whether something equates
    to `true` or `false`. Putting quotes around `false` has surprising consequences.
    Consider the following code:


    ```

    $OK = ''false'';

    ```


    This does exactly the opposite of what you might expect: it makes `$OK` true!
    Why? Because the quotes around `false` turn it into a string, and PHP treats strings
    as `true`. (There’s a more detailed explanation in “The truth according to PHP”
    in Chapter [4](#332054_4_En_4_Chapter.xhtml).)


    The keywords `true`, `false`, and `null` are *case-insensitive*. The following
    examples are all valid:


    ```

    $OK = TRUE;

    $OK = tRuE;

    $OK = true;

    ```


    So, to recap, PHP treats `true`, `false`, and `null` as special cases.


    * Don’t enclose them in quotes.

    * They are case-insensitive.


    ## Making Decisions


    Decisions, decisions, decisions… Life is full of decisions. So is PHP. They enable
    it to change the output according to circumstances. Decision-making in PHP uses
    **conditional statements**. The most common of these uses `if` and closely follows
    the structure of normal language. In real life, you may be faced with the following
    decision (admittedly not very often in Britain): if the weather’s hot, I’ll go
    to the beach.


    In PHP pseudocode, the same decision looks like this:


    ```

    if (the weather''s hot) {

    I''ll go to the beach;

    }

    ```


    The condition being tested goes inside parentheses, and the resulting action goes
    between curly braces. This is the basic decision-making pattern:


    ```

    if (condition is true) {

    // code to be executed if condition is true

    }

    ```


    **Tip:** Conditional statements are control structures and are not followed by
    a semicolon. The curly braces keep together one or more individual statements
    that are intended to be executed as a group.


    The code inside the curly braces is executed *only* if the condition is `true`.
    If it’s `false`, PHP ignores everything between the braces and moves on to the
    next section of code. How PHP determines whether a condition is `true` or `false`
    is described in the following section.


    Sometimes, the `if` statement is all you need, but you often want a default action
    to be invoked if the condition isn’t met. To do this, use `else`, like this:


    ```

    if (condition is true) {

    // code to be executed if condition is true

    } else {

    // default code to run if condition is false

    }

    ```


    If you want more alternatives, you can add more conditional statements like this:'
