- fmt: '### Time to Roll up Your Sleeves


    You have already encountered some functions for examining the attributes of classes.
    These are useful but often limited. Here’s a tool that is up to the job. `ReflectionClass`
    provides methods that reveal information about every aspect of a given class,
    whether it’s a user-defined or internal class. The constructor of `ReflectionClass`
    accepts a class or interface name (or an object instance) as its sole argument:


    ```

    // listing 05.34

    $prodclass = new \ReflectionClass(''popp\\ch04\\batch02\\CdProduct'');

    \Reflection::export($prodclass);

    ```


    Once you’ve created a `ReflectionClass` object, you can use the `Reflection` utility
    class to dump information about `CdProduct`. `Reflection` has a static `export()`
    method that formats and dumps the data managed by a `Reflection` object (that
    is, any instance of a class that implements the `Reflector` interface, to be pedantic).
    Here’s an abridged extract from the output generated by a call to `Reflection::export()`:


    ```

    Class [  class popp\ch04\batch02\CdProduct extends popp\ch04\batch02\ShopProduct
    ] {

    @@ /var/popp/src/ch04/batch02/CdProduct.php 6-37

    - Constants [2] {

    Constant [ integer AVAILABLE ] { 0 }

    Constant [ integer OUT_OF_STOCK ] { 1 }

    }

    - Static properties [0] {

    }

    - Static methods [1] {

    Method [  static public method getInstance ] {

    @@ /var/popp/src/ch04/batch02/ShopProduct.php 93 - 130

    - Parameters [2] {

    Parameter #0 [  integer $id ]

    Parameter #1 [  PDO $pdo ]

    }

    - Return [ popp\ch04\batch02\ShopProduct ]

    }

    }

    - Properties [3] {

    Property [  private $playLength ]

    Property [  public $status ]

    Property [  protected $price ]

    }

    - Methods [11] {

    Method [  public method __construct ] {

    @@ /var/popp/src/ch04/batch02/CdProduct.php 10 - 24

    - Parameters [5] {

    Parameter #0 [  string $title ]

    Parameter #1 [  string $firstName ]

    Parameter #2 [  string $mainName ]

    Parameter #3 [  float $price ]

    Parameter #4 [  integer $playLength ]

    }

    }

    ...

    }

    ```


    As you can see, `Reflection::export()` provides remarkable access to information
    about a class. `Reflection::export()` provides summary information about almost
    every aspect of `CdProduct`, including the access control status of properties
    and methods, the arguments required by every method, and the location of every
    method within the script document. Compare that with a more established debugging
    function. The `var_dump()` function is a general-purpose tool for summarizing
    data. You must instantiate an object before you can extract a summary, and even
    then, it provides nothing like the detail made available by `Reflection::export()`:


    ```

    // listing 05.35

    $cd = new CdProduct("cd1", "bob", "bobbleson", 4, 50);

    var_dump($cd);

    ```


    Here’s the output:


    ```

    object(popp\ch04\batch02\CdProduct)#17 (8) {

    ["playLength":"popp\ch04\batch02\CdProduct":private]=>

    int(50)

    ["status"]=>

    NULL

    ["title":"popp\ch04\batch02\ShopProduct":private]=>

    string(3) "cd1"

    ["producerMainName":"popp\ch04\batch02\ShopProduct":private]=>

    string(9) "bobbleson"

    ["producerFirstName":"popp\ch04\batch02\ShopProduct":private]=>

    string(3) "bob"

    ["price":protected]=>

    float(4)

    ["discount":"popp\ch04\batch02\ShopProduct":private]=>

    int(0)

    ["id":"popp\ch04\batch02\ShopProduct":private]=>

    int(0)

    }

    ```


    `var_dump()` and its cousin `print_r()` are fantastically convenient tools for
    exposing the data in your scripts. For classes and functions, the Reflection API
    takes things to a whole new level, though.


    ### Examining a Class


    The `Reflection::export()` method can provide a great deal of useful information
    for debugging, but we can use the API in more specialized ways. Let’s work directly
    with the `Reflection` classes.


    You’ve already seen how to instantiate a `ReflectionClass` object:


    ```

    $prodclass = new \ReflectionClass(''popp\\ch04\\batch02\\CdProduct'');

    ```


    Next, I will use the `ReflectionClass` object to investigate `CdProduct` within
    a script. What kind of class is it? Can an instance be created? Here’s a function
    to answer these questions:


    ```

    // listing 05.36

    // class ClassInfo

    public static function getData(\ReflectionClass $class)

    {

    $details = "";

    $name = $class->getName();

    if ($class->isUserDefined()) {

    $details .= "$name is user defined\n";

    }

    if ($class->isInternal()) {

    $details .= "$name is built-in\n";

    }

    if ($class->isInterface()) {

    $details .= "$name is interface\n";

    }

    if ($class->isAbstract()) {

    $details .= "$name is an abstract class\n";

    }

    if ($class->isFinal()) {

    $details .= "$name is a final class\n";

    }

    if ($class->isInstantiable()) {

    $details .= "$name can be instantiated\n";

    } else {

    $details .= "$name can not be instantiated\n";

    }

    if ($class->isCloneable()) {

    $details .= "$name can be cloned\n";

    } else {

    $details .= "$name can not be cloned\n";

    }

    return $details;

    }

    // listing 05.37

    $prodclass = new \ReflectionClass(''popp\\ch04\\batch02\\CdProduct'');

    print ClassInfo::getData($prodclass);

    ```


    I create a `ReflectionClass` object, assigning it to a variable called `$prodclass`
    by passing the `CdProduct` class name to `ReflectionClass`''s constructor. `$prodclass`
    is then passed to a method named `ClassInfo::classData()` that demonstrates some
    of the methods that can be used to query a class.


    The methods should be self-explanatory, but here’s a brief description of some
    of them:


    *   `ReflectionClass::getName()` returns the name of the class being examined.

    *   The `ReflectionClass::isUserDefined()` method returns `true` if the class
    has been declared in PHP code, and `ReflectionClass::isInternal()` yields `true`
    if the class is built-in.

    *   You can test whether a class is abstract with `ReflectionClass::isAbstract()`
    and whether it''s an interface with `ReflectionClass::isInterface()`.

    *   If you want to get an instance of the class, you can test the feasibility
    of that with `ReflectionClass::isInstantiable()`.

    *   You can check whether a class is cloneable with the `ReflectionClass::isCloneable()`
    method.

    *   You can even examine a user-defined class''s source code. The `ReflectionClass`
    object provides access to its class''s file name and to the start and finish lines
    of the class in the file.


    Here’s a quick-and-dirty method that uses `ReflectionClass` to access the source
    of a class:


    ```

    // listing 05.38

    class ReflectionUtil

    {

    public static function getClassSource(\ReflectionClass $class): string

    {

    $path  = $class->getFileName();

    $lines = file($path);

    $from  = $class->getStartLine();

    $to    = $class->getEndLine();

    $len   = $to - $from + 1;

    return implode(array_slice($lines, $from - 1, $len));

    }

    }

    // listing 05.39

    print ReflectionUtil::getClassSource(

    new \ReflectionClass(''popp\\ch04\\batch02\\CdProduct'')

    );

    ```


    `ReflectionUtil` is a simple class with a single static method, `ReflectionUtil::getClassSource()`.
    That method takes a `ReflectionClass` object as its only argument and returns
    the referenced class''s source code. `ReflectionClass::getFileName()` provides
    the path to the class''s file as an absolute path, so the code should be able
    to go right ahead and open it. `file()` obtains an array of all the lines in the
    file. `ReflectionClass::getStartLine()` provides the class''s start line; `ReflectionClass::getEndLine()`
    finds the final line. From there, it''s simply a matter of using `array_slice()`
    to extract the lines of interest.


    To keep things brief, this code omits error handling. In a real-world application,
    you''d want to check arguments and result codes.'
