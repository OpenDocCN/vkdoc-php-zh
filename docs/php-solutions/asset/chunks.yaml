  trans: '

    ### 理解何时使用引号


    仔细观察图 3-1 中的 PHP 代码块，你会注意到第一个变量所赋的值并没有用引号括起来。它看起来像这样：


    `$startYear = 2006;`


    然而，“使用数组存储多个值”的所有示例都使用了引号，例如：


    `$book[''title''] = ''PHP Solutions: Dynamic Web Design Made Easy, Third Edition'';`


    简单的规则如下：


    - 数字：无需引号

    - 文本：需要引号


    作为一般原则，在文本或字符串（PHP 和其他计算机语言中对文本的称呼）周围使用单引号还是双引号并不重要。实际情况其实比这更复杂一些，正如本章后半部分所述，因为
    PHP 引擎对单引号和双引号的处理方式存在细微差别。


    **注意**


    “字符串”（string）一词借用于计算机和数学科学，它指的是一系列简单对象——在这里，就是文本中的字符。


    现在需要记住的重点是，引号必须始终成对匹配。这意味着在单引号字符串中需要小心处理撇号（单引号），或在双引号字符串中处理双引号。请看下面这行代码：


    `$book[''description''] = ''This is David''s latest book on PHP.'';`


    乍一看，似乎没什么问题。然而，PHP 引擎的解读方式与人眼不同，如图 3-5 所示。


    ![A978-1-4842-0635-5_3_Fig5_HTML.jpg](img/A978-1-4842-0635-5_3_Fig5_HTML.jpg)


    *图 3-5. 单引号字符串中的撇号会混淆 PHP 引擎*


    解决这个问题有两种方法：


    - 如果文本中包含撇号，则使用双引号。

    - 在撇号前加上反斜杠（这称为转义）。


    因此，以下两种写法都是可行的：


    `$book[''description''] = "This is David''s latest book on PHP.";`


    `$book[''description''] = ''This is David\''s latest book on PHP.'';`


    同样的规则也适用于双引号字符串中的双引号（只是规则反过来了）。下面的代码会引起问题：


    `$play = "Shakespeare''s \"Macbeth"";`


    这种情况下，撇号没问题，因为它与双引号不冲突，但 Macbeth 前面的双引号会导致字符串提前结束。要解决这个问题，以下两种写法均可接受：


    `$play = ''Shakespeare\''s "Macbeth"'';`


    `$play = "Shakespeare''s \"Macbeth\"";`


    在第一个示例中，整个字符串被括在单引号内。这解决了 Macbeth 周围双引号的问题，但需要对 Shakespeare''s 中的撇号进行转义。撇号在双引号字符串中没问题，但
    Macbeth 两边的双引号都需要转义。因此，总结如下：


    - 在双引号字符串中，单引号和撇号是安全的。

    - 在单引号字符串中，双引号是安全的。

    - 其他任何情况都必须使用反斜杠进行转义。


    **提示**


    关键在于记住最外层的引号必须匹配。我偏好使用单引号，而将双引号保留用于它们具有特殊含义的情况，正如本章后半部分所述。


    ### 特殊情况：True、False 和 Null


    虽然文本应该用引号括起来，但有三种特殊情况——`true`、`false` 和 `null`——永远不应该用引号括起来，除非你想将它们视为真正的文本（或字符串）。前两者的意思正如你所想；最后一个，`null`，表示“无”或“无值”。


    **注意**


    从技术上讲，`true` 和 `false` 是布尔值。这个名字来源于十九世纪数学家乔治·布尔，他设计了一套逻辑运算系统，该系统后来成为现代计算机运算的基础。这是一个复杂的主题，但你可以在
    [`http://en.wikipedia.org/wiki/Boolean_algebra`](http://en.wikipedia.org/wiki/Boolean_algebra)
    了解更多。对大多数人来说，知道布尔值意味着 `true` 或 `false` 就足够了。


    如下一节所述，PHP 根据某事物是否等同于 `true` 或 `false` 来做决策。给 `false` 加上引号会产生令人惊讶的后果。请看下面这段代码：


    `$OK = false;`


    它的效果正如你所预期：使 `$OK` 为 false。现在，再看看这个：


    `$OK = ''false'';`


    这与你预期的效果完全相反：它让 `$OK` 变成了 true！为什么？因为 `false` 周围的引号将它变成了字符串，而 PHP 将字符串视为 `true`。（本章后半部分的“PHP
    眼中的真理”一节有更详细的解释。）


    关于 `true`、`false` 和 `null` 还需要注意的一点是，它们是大小写不敏感的。以下示例都是有效的：


    `$OK = TRUE;`


    `$OK = tRuE;`


    `$OK = true;`


    因此，总结一下，PHP 将 `true`、`false` 和 `null` 视为特殊情况。


    - 不要用引号括起它们。

    - 它们对大小写不敏感。

    '
- fmt: "### Making Decisions\n\nDecisions, decisions, decisions… Life is full of decisions.\
    \ So is PHP. They give it the ability to display different output according to\
    \ circumstances. Decision-making in PHP uses conditional statements. The most\
    \ common of these uses `if` and closely follows the structure of normal language.\
    \ In real life, you may be faced with the following decision (admittedly not very\
    \ often if you live in Britain): If the weather’s hot, I’ll go to the beach.\n\
    \nIn PHP pseudo-code, the same decision looks like this:\n\n```\nif (the weather's\
    \ hot) {\n    I'll go to the beach;\n}\n```\n\nThe condition being tested goes\
    \ inside parentheses, and the resulting action goes between curly braces. This\
    \ is the basic decision-making pattern:\n\n```\nif (condition is true) {\n   \
    \ // code to be executed if condition is true\n}\n```\n\n> **Tip**  \n> Conditional\
    \ statements are control structures and are not followed by a semicolon. The curly\
    \ braces keep together one or more individual statements that are intended to\
    \ be executed as a group.\n\nThe code inside the curly braces is executed only\
    \ if the condition is `true`. If it’s `false`, PHP ignores everything between\
    \ the braces and moves on to the next section of code. How PHP determines whether\
    \ a condition is `true` or `false` is described in the following section.\n\n\
    Sometimes, the `if` statement is all you need, but you often want a default action\
    \ to be invoked if the condition isn’t met. To do this, use `else`, like this:\n\
    \n```\nif (condition is true) {\n    // code to be executed if condition is true\n\
    } else {\n    // default code to run if condition is false\n}\n```\n\nIf you want\
    \ more alternatives, you can add more conditional statements like this:\n\n```\n\
    if (condition is true) {\n    // code to be executed if condition is true\n} else\
    \ {\n    // default code to run if condition is false\n}\n\nif (second condition\
    \ is true) {\n    // code to be executed if second condition is true\n} else {\n\
    \    // default code to run if second condition is false\n}\n```\n\nIn this case\
    \ both conditional statements will be run. If you want only one code block to\
    \ be executed, use `elseif` like this:\n\n```\nif (condition is true) {\n    //\
    \ code to be executed if first condition is true\n} elseif (second condition is\
    \ true) {\n    // code to be executed if first condition fails\n    // but second\
    \ condition is true\n} else {\n    // default code if both conditions are false\n\
    }\n```\n\nYou can use as many `elseif` clauses in a conditional statement as you\
    \ like. Only the first condition that equates to true will be executed; all others\
    \ will be ignored, even if they’re also true. This means you need to build conditional\
    \ statements in the order of priority that you want them to be evaluated. It’s\
    \ strictly a first-come, first-served hierarchy.\n\n> **Note**  \n> Although `elseif`\
    \ is normally written as one word, you can use `else if` as separate words.\n\n\
    An alternative decision-making structure, the `switch` statement, is described\
    \ in the second half of this chapter.\n\n### Making Comparisons\n\nConditional\
    \ statements are interested in only one thing: whether the condition being tested\
    \ equates to `true`. If it’s not `true`, it must be `false`. There’s no room for\
    \ half-measures or maybes. Conditions often depend on the comparison of two values.\
    \ Is this bigger than that? Are they both the same? And so on.\n\nTo test for\
    \ equality, PHP uses two equal signs (`==`), like this:\n\n```\nif ($status ==\
    \ 'administrator') {\n    // send to admin page\n} else {\n    // refuse entry\
    \ to admin area\n}\n```\n\n> **Caution**  \n> Don’t use a single equal sign in\
    \ the first line (`$status = 'administrator'`). Doing so opens the admin area\
    \ of your website to everyone. Why? Because this automatically sets the value\
    \ of `$status` to `administrator`; it doesn’t compare the two values. To compare\
