  \ must log in to add a review.</strong>\n  </span>\n{/if}\n```\n\n\n\n2. 创建`presentation/smarty_plugins/function.load_reviews.php`文件，并在其中添加以下内容：\n\
  \n```php\n<?php\n\n// 插件文件中的插件函数必须命名为: smarty_type_name\nfunction smarty_function_load_reviews($params,\
  \ $smarty)\n{\n    // 创建评论对象\n    $reviews = new Reviews();\n    $reviews->init();\n\
  \n    // 分配模板变量\n    $smarty->assign($params['assign'], $reviews);\n}\n\n// 处理产品评论的类\n\
  class Reviews\n{\n    public $mProductId;\n    public $mReviews;\n    public $mTotalReviews;\n\
  \    public $mReviewerName;\n    public $mEnableAddProductReviewForm = false;\n\
  \    public $mAddProductReviewTarget = 'index.php';\n\n    public function __construct()\n\
  \    {\n        if (isset ($_GET['ProductID']))\n            $this->mProductId =\
  \ (int)$_GET['ProductID'];\n        else\n            trigger_error('未设置产品 ID',\
  \ E_USER_ERROR);\n\n        $this->mAddProductReviewTarget .= '?ProductID=' . $this->mProductId;\n\
  \    }\n\n    public function init()\n    {\n        // 如果访客已登录...\n        if (Customer::IsAuthenticated())\n\
  \        {\n            // 检查访客是否正在添加评论\n            if (isset($_POST['AddProductReview']))\n\
  \                Catalog::CreateProductReview(\n                    Customer::GetCurrentCustomerId(),\n\
  \                    $this->mProductId,\n                    $_POST['review'],\n\
  \                    $_POST['rating']\n                );\n\n            // 显示\"\
  添加评论\"表单，因为访客已注册\n            $this->mEnableAddProductReviewForm = true;\n\n   \
  \         // 获取访客（评论者）的姓名\n            $customer_data = Customer::Get();\n     \
  \       $this->mReviewerName = $customer_data['name'];\n        }\n\n        //\
  \ 获取该产品的评论\n        $this->mReviews = Catalog::GetProductReviews($this->mProductId);\n\
  \n        // 获取评论数量\n        $this->mTotalReviews = count($this->mReviews);\n  \
  \  }\n}\n?>\n```\n\n3. 打开`presentation/templates/product.tpl`，并在其末尾添加以下行：\n\n```\n\
  <br /><br />\n{include file=\"reviews.tpl\"}\n```\n\n4. 在`hatshop.css`末尾添加以下样式：\n\
  \n```css\nul\n{\n    list-style-type: none;\n    padding: 0px;\n}\n\nli span\n{\n\
  \    background: #ccddff;\n    display: block;\n    padding: 5px;\n}\n\n.add_review\
  \ tr td\n{\n    background: #e6e6e6;\n    border: none;\n}\n```\n\n5. 在浏览器中加载`index.php`，点击某个产品查看其产品详情页面，并欣赏结果（请参考本章开头的图\
  \ 16-1）。您必须登录才能添加新评论。\n\n## 工作原理：评论组件化模板\n\n评论组件化模板负责显示评论和添加新评论。`reviews.tpl`文件的第一部分判断当前产品是否有评论要显示。如果没有，则会显示一条简短消息，鼓励访客撰写第一条评论。\n\
  \n```\n{if $reviews->mTotalReviews != 0}\n<span class=\"description\">客户评论：</span><br\
  \ />\n**[评论列表]**\n{else}\n<span class=\"description\">\n成为第一个发表意见的人！<br /><br />\n\
  </span>\n{/if}\n```\n\n模板的第二部分显示用于添加评论的表单，或者显示一条邀请访客“登录”以添加评论的消息：\n\n```\n{if $reviews->mEnableAddProductReviewForm}\n\
  {* 添加评论表单 *}\n<span class=\"description\">添加一条评论：</span><br /><br />\n**[添加评论表单]**\n\
  {else}\n<span>\n<strong>您必须登录才能添加评论。<strong/>\n</span>\n{/if}\n```\n\n函数插件中的代码相当简单，应该不会对您造成困扰。\n\
  \n## 总结\n\n是的，就这么简单。尽管您可能希望为自己的解决方案添加某些改进（例如，允许访客编辑他们的评论，或禁止他们添加更多评论），但基础已经存在，并且按预期工作。\n\
  \n您现在已准备好进入本书的最后一章，在那里您将学习如何通过使用 XML Web Services 从 Amazon.com 向您的客户销售商品。\n\n\n\n"
- '# 连接 Web 服务


  在瞬息万变的互联网世界中，仅仅拥有一个重要的网络存在有时是不够的；你还需要与第三方提供的功能进行交互以实现你的目标。在本书的前面部分，你已经看到了如何集成外部功能来处理客户的支付。


  在本章中，你将学习通过 Web 服务集成外部功能的新可能性。**Web 服务**是一种通过网络接口使用标准互联网协议（如`HTTP`）暴露出来的功能单元。客户端和服务器之间交换的消息采用基于
  XML 的协议 `SOAP`（简单对象访问协议）或 `REST`（表述性状态转移）进行编码。


  这些消息通过 `HTTP` 发送。稍后你将更详细地了解这些技术。


  使用 Web 服务的美妙之处在于，客户端和服务器可以使用任何技术、任何语言和任何平台。只要它们通过标准协议（例如基于 `HTTP` 的 `SOAP`）交换信息，即使客户端是手机，而服务器是在
  Solaris 上运行的 Java 应用程序，也毫无问题。


  这些可能性令人振奋，我们建议你购买一本专门介绍 Web 服务的书籍，以深入了解其世界。可以查看 `http://www.xmethods.net/` 上的公共
  Web 服务列表，了解你可以集成到应用程序中的外部功能类型。


  在本章中，你将学习如何集成 **Amazon 电子商务服务**（`ECS`；Amazon.com 提供的 Web 服务接口，以前称为 Amazon Web Services——`AWS`），通过你的
  HatShop 网站销售 Amazon.com 的产品。


  你已经拥有一个向客户销售帽子的电子商务网站。你可以更进一步，通过将 Amazon.com 上其他一些与帽子相关的礼品整合到你的网站中，从他们对帽子的热情中赚取更多收入。免费吗？哦不……你将在网站上展示
  Amazon.com 的详细信息，但最终结账将由 Amazon.com 处理，并且 Amazon.com 会将通过你网站产生的购买佣金存入你的银行账户。听起来像是轻松赚钱，不是吗？


  在本章中，你将学习如何使用 `ECS` 向你的网店添加一个名为“Amazon Super Hats”的特殊部门，如图 17-1 所示。这将是一个“特殊”部门，其处理方式与其他部门不同——例如，当访问者想要购买产品时，付款直接由
  Amazon 处理。本章仅探讨了 `ECS` 功能的一小部分，因此，如果你真的想通过此服务发财，应该更深入地挖掘以找到更多内容。


