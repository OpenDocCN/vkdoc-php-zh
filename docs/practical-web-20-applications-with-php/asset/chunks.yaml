    In Chapter 3 we looked at how to authenticate using Zend_Auth (see Listing 3-5).
    We will now implement this functionality.


    The basic algorithm for the login action is as follows:


    **1.** Display the login form.


    **2.** If the user submits the form, try to authenticate them with Zend_Auth.


    **3.** If they successfully authenticate, write their identity to the session
    and redirect them to their account home page (or to the protected page they originally
    requested).


    **4.** If their authentication attempt was unsuccessful, display the login form
    again, indicating that an error occurred.


