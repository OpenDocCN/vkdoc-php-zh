- fmt: "### Executing SQL Commands Through PHP\n\nAfter establishing the connection\
    \ with the database, the next task is to execute the required SQL statement on\
    \ it. For executing required SQL statements on the database, the `mysqli_query()`\
    \ method is used with the given syntax:\n\n```\n$result = mysqli_query($connect,\
    \ $sql) or die(mysql_error());\n```\n\nThe `$connect` variable represents the\
    \ connection with the MySQL server and `$sql` represents the SQL statement that\
    \ you want to execute on the connected database. The `$result` variable will store\
    \ the result of the execution of the SQL statement.\n\nThe PHP script shown in\
    \ Listing [2-12](#A978-1-4842-1672-9_2_Chapter.html#FPar15) checks whether the\
    \ connection with the MySQL server has been established.\n\n**Listing 2-12.**\
    \ The `checkconnection.php` Script Confirms if the Connection with the MySQL Server\
    \ Is Established\n\n```\n<?php\n    // Connect to the database server\n    $MySQLi\
    \ = new MySQLi(\"localhost\", \"root\", \"gold\", \"shopping\");\n    if ($MySQLi->errno)\
    \ {\n        printf(\"Unable to connect to the database:<br /> %s\",$MySQLi->error);\n\
    \        exit();\n    }\nelse\n    printf(\"Successfully connected with the MySQL\
    \ server and shopping database is opened\");\n?>\n```\n\nIn the previous code,\
    \ the connection to the MySQL server is established and the `shopping` database\
    \ is selected. Upon successful connection, you get the message shown in Figure\
    \ [2-8](#A978-1-4842-1672-9_2_Chapter.html#Fig8).\n\n![A978-1-4842-1672-9_2_Fig8_HTML.jpg](A978-1-4842-1672-9_2_Fig8_HTML.jpg)\n\
    \n**Figure 2-8.** Message confirms successful connection with the MySQL server\
    \ and opens the `shopping` database\n\n#### Storing Information in the Database\
    \ Table\n\nThe PHP script for storing a new user’s information in the underlying\
    \ database table is shown in Listing [2-13](#A978-1-4842-1672-9_2_Chapter.html#FPar16).\n\
    \n**Listing 2-13.** The `addcustomer.php` Script Saves the Customer’s Information\
    \ in the Database Table\n\n```\n<?php\n$connect = mysqli_connect(\"localhost\"\
    , \"root\", \"gold\", \"shopping\") or die (\"Please, check the server connection.\"\
    );\n$email_address = $_POST['emailaddress'];\n$password = $_POST['password'];\n\
    $repassword = $_POST['repassword'];\n$completename = $_POST['complete_name'];\n\
    $address1 = $_POST['address1'];\n$address2 = $_POST['address2'];\n$city = $_POST['city'];\n\
    $state = $_POST['state'];\n$country = $_POST['country'];\n$zipcode = $_POST['zipcode'];\n\
    $phone_no = $_POST['phone_no'];\n$sql = \"INSERT INTO customers (email_address,\
    \ password, complete_name, address_line1, address_line2, city, state, zipcode,\
    \ country, cellphone_no) VALUES ('$email_address',(PASSWORD('$password')), '$completename',\
    \ '$address1','$address2','$city', '$state', '$zipcode', '$country', '$phone_no')\"\
    ;\n$result = mysqli_query($connect, $sql) or die(mysql_error());\nif ($result)\n\
    {\n?>\n    <p>\n    Dear, <?php echo $completename; ?> your account is successfully\
    \ created\n<?php\n}\nelse\n{\n    echo \"Some error occurred. Please use different\
    \ email address\";\n}\n?>\n```\n\nThis PHP script saves the information entered\
    \ by the user in the web form that was displayed through the `validatesignup.php`\
    \ script (refer to Listing [2-10](#A978-1-4842-1672-9_2_Chapter.html#FPar11))\
    \ into the `customers` table of the `shopping` database. Recall in [Chapter 1](#A978-1-4842-1672-9_1_Chapter.html)\
    \ that you created the `shopping` database and the different tables that will\
    \ be required for this e-commerce site.\n\nYou can see that first of all, the\
    \ connection to MySQL server is established and the `shopping` database is selected.\
    \ The information of the user-entered `validatesignup.php` script is assigned\
    \ to the `$_POST` array. The information in the `$_POST` array is retrieved and\
    \ stored in different variables. Thereafter, a SQL statement to insert a record\
    \ in the `customers` table is executed and the users are informed about their\
    \ successful account creation, as shown in Figure [2-9](#A978-1-4842-1672-9_2_Chapter.html#Fig9).\n\
    \n![A978-1-4842-1672-9_2_Fig9_HTML.jpg](A978-1-4842-1672-9_2_Fig9_HTML.jpg)\n\n\
    **Figure 2-9.** Message confirming successful user account creation\n\n#### Accessing\
    \ Information from the Database\n\nInformation that is stored in the database\
    \ is meant for future use. It means you can access information from the database\
    \ whenever required. To access information from the database, the following four\
    \ methods are used:\n\n*   `mysqli_num_rows()` — Returns the count of rows in\
    \ a given recordset.\n*   `mysqli_affected_rows()` — Returns the count of rows\
    \ affected by the specified SQL command.\n*   `mysqli_fetch_array()` — Returns\
    \ one row at a time from the given recordset.\n*   `extract()` — Extracts the\
    \ columns or fields in the specified row.\n\nLet’s discuss these methods in detail.\n\
    \n##### `mysqli_num_rows()`\n\nThe `mysqli_num_rows()` method returns the count\
    \ of rows that exists in the specified recordset. The syntax for using this method\
    \ is as follows:\n\n```\nint mysqli_num_rows(recordset)\n```\n\nWhere `recordset`\
    \ represents the records or rows that are retrieved upon execution of the SQL\
    \ `SELECT` statement through the `mysqli_query()` method.\n\n##### `mysqli_affected_rows()`\n\
    \nThe `mysqli_affected_rows()` method returns the count of the rows that are affected\
    \ by a `DELETE`, `INSERT`, `REPLACE`, or `UPDATE` statement executed in the specified\
    \ SQL query. This method is used immediately after an SQL statement is executed\
    \ through the `mysqli_query()` method. The syntax for using this method is as\
    \ follows:\n\n```\nint mysqli_affected_rows()\n```\n\n##### `mysqli_fetch_array()`\n\
    \nThe `mysqli_fetch_array()` function fetches one row at a time from the specified\
    \ recordset or array of rows. It gets one row from the given recordset and returns\
    \ `true`. Each row is returned either as an associative array or a numeric array.\
    \ The function returns `false` when there are no more rows left in the recordset.\
    \ The syntax for using this method is:\n\n```\nrow = mysqli_fetch_array(recordset,\
    \ array_type)\n```\n\nWhere the `recordset` represents the rows that are returned\
    \ upon executing the `mysqli_query()` function.\n\nThe `array_type` parameter\
    \ is optional and it represents the array format in which the fetched row needs\
    \ to be returned. Available options for this parameter are:\n\n*   `MYSQL_ASSOC`\
    \ — Returns a row in associative array format.\n*   `MYSQL_NUM` — Returns a row\
    \ in numeric array format.\n*   `MYSQL_BOTH` — The default. Returns a row that\
    \ can be used as both an associative as well as a numeric array. That is, the\
    \ array returned has both associative and number indices.\n\nAfter a row is retrieved,\
    \ the `mysqli_fetch_array()` function automatically moves to the next row in the\
    \ recordset. Each subsequent call to this function returns the next row in the\
    \ specified recordset. For example, the following statement fetches one row from\
    \ the specified `$result` i.e. recordset and returns the row in associative array\
    \ format:\n\n```\n$row = mysqli_fetch_array($result, MYSQLI_ASSOC)\n```\n\n#####\
    \ `extract()`\n\nThe `extract()` function extracts all the variables or columns\
    \ stored in the specified array or row. The syntax for using this method is as\
    \ follows:\n\n```\nextract(array/row)\n```\n\nFor example, this extracts all the\
    \ columns in the specified row:\n\n```\nextract($row);\n```\n\nLet’s now look\
    \ at how to apply these methods to authenticate a user."
  raw: '### Executing SQL Commands Through PHP


    After establishing the connection with the database, the next task is to execute
    the required SQL statement on it. For executing required SQL statements on the
    database, the `mysqli_query` method is used with the given syntax:


    `$result = mysqli_query($connect, $sql) or die(mysql_error());`


    The `$connect` variable represents the connection with the MySQL server and `$sql`
    represents the SQL statement that you want to execute on the connected database.
    The `$result` variable will store the result of the execution of the SQL statement.


    The PHP script shown in Listing [2-12](#A978-1-4842-1672-9_2_Chapter.html#FPar15)
    checks whether the connection with the MySQL server has been established.


    Listing 2-12\. The checkconnection.php Script Confirms if the Connection with
    the MySQL Server Is Established


    `<?php`


        `// Connect to the database server`


        `$MySQLi = new MySQLi("localhost", "root", "gold", "shopping");`


        `if ($MySQLi->errno) {`


            `printf("Unable to connect to the database:<br /> %s",$MySQLi->error);`


            `exit();`


        `}`


    `else`


