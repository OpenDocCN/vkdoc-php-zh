    **Working with the Form Helper**


    Just as the HTML helper is essential to streamlining your use of HTML markup in
    the view, the Form helper is indispensable for form processing. In fact, avoiding
    this helper would likely take more effort than learning its functions.


    A couple of important points ought to be explained before examining the Form helper
    functions in detail. First, some functions are designed to display the results
    of a processed form. In a way, these functions act as a kind of receiver and are
    not immediately visible in the page. Other functions work to format and send data
    for the model to use. Both receiver and supplier functions must follow model naming
    conventions to work properly. For instance, Model.fieldname is used to tell the
    $form->input() function in which field and in which table in the database to store
    the user input data. Whenever the field parameter or an array of fields are called
    in the function, be sure to name the fields properly. To ensure that the helper
    is able to send the data to the correct model, include the camel-cased model’s
    name, followed by a period and then followed by the field name:


    <?=$form->error(''Post.content'');?>


    When you’re sure the controller will experience no conflicts with multiple models,
    you can usually specify only the field’s name:


    <?=$form->error(''content'');?>


    ■**Note** Earlier versions of Cake followed this convention for specifying models
    and fields using the HTML


    helper and with a slash instead of a period, such as Model/fieldname. If you do
    come across earlier Cake applications, be sure to replace the forward slash with
    a period to be consistent with Cake 1.2\. Use the Form helper to render all form
    elements, not the HTML helper.


    Second, most form elements will use the options or attributes parameters the same
    way.


    Because form elements can be more elaborate than other HTML elements with regard
    to


