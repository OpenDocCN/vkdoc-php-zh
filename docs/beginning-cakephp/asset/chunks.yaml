    ## Chapter 9: Helpers


    ### Table 9-4. Form Input Element Options


    **Option:** `id[string]`

    **Description:** Sets the ID attribute to the value supplied.


    **Option:** `error[string]`

    **Description:** When set, the text here will be displayed in the event of a validation
    error; leave blank to allow the default message to appear.


    **Option:** `selected[string]`

    **Description:** The value of the item in a selection-based input element to be
    selected when the field is rendered.


    **Option:** `rows[int]`

    **Description:** The number of rows to size the `<textarea>` element.


    **Option:** `cols[int]`

    **Description:** The number of columns to size the `<textarea>` element.


    **Option:** `empty[mixed]`

    **Description:** When set to `true`, the field is forced to remain empty upon
    submission; when used with a select menu, a string may be supplied to be displayed
    as an empty option (for example, "Please Select One...").


    **Option:** `timeFormat[string]`

    **Description:** The format of select menus for time-related fields; the only
    options are `12`, `24`, `none`.


    **Option:** `dateFormat[string]`

    **Description:** Like the `timeFormat` option; the only possible values are `DMY`,
    `MDY`, `YMD`, and `none`.


    **Option:** `label[mixed]`

    **Description:** As a string, results in the text to be displayed as the label;
    when set to `false`, disables the label element.


    **Option:** `(continued)`

    **Description:** When set to `false`, the wrapper `<div>` tag is disabled.


    If you mix and match the available options skillfully, you may find there is no
    scenario that the `$form->input()` function can''t handle.


    At times you may need to use a form element function directly instead of specifying
    the type in the `$form->input()` function. Or, perhaps you would just rather organize
    your views with functions specific to the types of fields being rendered. In either
    case, the Form helper comes with element-specific functions that behave exactly
    like the `$form->input()` function.


    Other Form helper functions help with other tasks, such as displaying an error
    or splitting apart the datetime elements into separate menus. Table 9-5 contains
    a list of these functions and their parameters.


