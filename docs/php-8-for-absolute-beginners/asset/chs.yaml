  \n我们已经完成了基本的编辑器视图。不久，我们将能够通过编辑器表单将新的博客条目插入到`blog_entry`数据库表中。为此，我们需要从应用程序到数据库建立数据库连接。\n\
  \n我们将采用与投票应用程序相同的方法：使用`PDO`进行连接，并将连接包含在前端控制器中，以便与后续加载的控制器共享。\n\n```php\n<?php\n\
  ### database.php\n\ntry {\n    $db = new PDO(\"sqlite:../data/simple_blog.db\");\n\
  \    $db->setAttribute(PDO::ATTR_ERRMODE, PDO::ERRMODE_EXCEPTION);\n} catch (Exception\
  \ $e) {\n    $pageData->setContent(\"Connection failed! $e\");\n    exit();\n}\n\
  ?>\n```\n\n我们可以使用位于投票程序`models`文件夹中的`database.php`文件来访问数据库。我们唯一需要做的更改是将数据库改为`simple_blog`。我们很快会将其包含到前端控制器中。\n\
  \n## 使用设计模式\n\n设计模式是针对常见任务的通用最佳实践解决方案。有些设计模式被定义得很全面。随着经验的增长，你会遇到更多的设计模式。作为一名绝对初学者，你不需要全面了解设计模式——那可能弊大于利。\n\
  \n本书使用了几个设计模式的简单实现。我们已经看到了前端控制器设计模式的简单实现，以及同样简单的 MVC 实现。可以在同一个项目中组合多个设计模式。\n\n>\
  \ **注意**\n> \n> 有关设计模式的更多信息，请访问[`http://en.wikipedia.org/wiki/Software_design_pattern`](http://en.wikipedia.org/wiki/Software_design_pattern)。\n\
  \n### 表数据网关设计模式\n\n表数据网关设计模式是一个相对容易理解的设计模式。该模式规定，数据库中的每个表对应创建一个 PHP 类。其理念是系统与某个表之间的所有通信都通过一个特定的对象进行。表数据网关封装了系统与特定数据库表之间的数据通信。\n\
  \n所有用于此通信的 SQL 语句都将在表数据网关类定义中声明。这有几个优点：一是我们知道在哪里编写 SQL 语句。相应地，我们也知道在哪里找到与特定数据库表相关的\
  \ SQL 语句。\n\n如果作为 PHP 开发者的你将所有 SQL 封装在相对较少的类定义中，那么团队中的任何数据库专家只需处理这几个类。这比将 SQL 语句分散在整个代码库中具有巨大优势。始终记住，保持代码尽可能简洁清晰。这有助于减少逻辑编码错误。\n\
  \n## 编写`Blog_Entry_Table`类\n\n最初，我们需要能够插入从编辑器表单接收的新博客条目。我们可以为`blog_entry`表创建一个新的表网关类定义。\n\
  \n让我们在`models`文件夹中创建新的类定义，将其命名为`Blog_Entry_Table.class.php`。\n\n```php\n<?php\n\
  class Blog_Entry_Table {\n    private $db;\n\n    public function __construct($db)\
  \ {\n        $this->db = $db;\n    }\n\n    public function saveEntry($title, $entry)\
  \ {\n        // 注意 SQL 字符串中的占位符。? 是占位符\n        // 注意属性的顺序：先是 title，然后是 entry_text\n\
  \        $entrySQL = \"INSERT INTO blog_entry (title, entry_text) VALUES (?, ?)\"\
  ;\n        $entryStatement = $this->db->prepare($entrySQL);\n        \n        //\
  \ 创建一个包含动态数据的数组\n        // 顺序很重要：$title 必须在前，$entry 在后\n        $formData = array($title,\
  \ $entry);\n\n        try {\n            // 将$formData 作为参数传递给 execute\n       \
  \     $entryStatement->execute($formData);\n        } catch (Exception $e) {\n \
  \           $msg = \"You tried to run this sql: $entrySQL Exception: $e\";\n   \
  \         trigger_error($msg);\n        }\n    }\n}\n?>\n```\n\n`Blog_Entry_Table`在被其他脚本使用之前不会执行任何操作。`Blog_Entry_Table`有一个属性`db`和两个方法：构造函数和`saveEntry()`。构造函数接受一个`PDO`对象作为参数。接收到的`PDO`对象将存储在`db`属性中。这样，`Blog_Entry_Table`的所有方法都可以访问`PDO`对象并访问`simple_blog`数据库。\n\
  \n在面向对象的术语中，`Blog_Entry_Table`和`PDO`现在通过`has-a`关系关联。`Blog_Entry_Table`拥有一个`PDO`对象。\n\
  \n目前，我们只会保存新条目。因此，`Blog_Entry_Table`类除了构造函数外只有一个方法。`saveEntry()`方法接受两个参数：`title`和`blog_entry`。\n\
  \n代码使用了预处理语句将数据插入到表中。在创建投票应用程序时，我们没有直接将用户提供的任何信息插入到数据库中。但在博客中，我们希望保存标题和博客条目信息。\n\
  \n### 安全编程\n\n你可能在网上发现一些 PHP 和 SQL 代码直接将信息保存到数据库中。然而，这是一个主要的安全风险。黑客可以利用 SQL 注入破坏我们的数据库信息。简单来说，黑客可以篡改我们原本要创建、更改或删除信息的\
  \ SQL 语句。\n\n> **注意**\n> \n> 有关 SQL 注入的更多信息，请访问[`http://en.wikipedia.org/wiki/SQL_injection`](http://en.wikipedia.org/wiki/SQL_injection)。\n\
  \n预处理语句还有一个积极作用，即允许用户将包含引号的信息传递到数据库中。预处理语句将所有输入视为不可执行的字符串，从而消除了这两个问题。\n\n使用预处理语句有三个同等重要的要求：\n\
  \n1.  在 SQL 字符串中使用`?`字符作为占位符。\n\n```php\n$entrySQL = \"INSERT INTO blog_entry (title,\
  \ entry_text) VALUES (?, ?)\";  // ? ? 用作占位符\n```\n\n2.  创建一个包含动态数据的数组。项目的顺序必须与\
  \ SQL 字符串中使用的顺序匹配。\n\n```php\n// $formdata 是一个包含动态数据的数组\n// 顺序很重要：$title 必须在前，$entry\
  \ 在后\n$formData = array($title, $entry);\n```\n\n3.  将包含动态数据的数组作为参数传递给`execute()`方法。\n\
  \n```php\n// 将$formData 作为参数传递给 execute\n$entryStatement->execute($formData);\n\
  ```\n\n当语句执行时，数组中的值将被插入到占位符所在的位置。插入的信息不会允许任何 SQL 注入。\n\n```php\n} catch (Exception\
  \ $e) {\n    $msg = \"You tried to run this sql: $entrySQL Exception: $e\";\n  \
  \  trigger_error($msg);\n}\n```\n\n如果发生异常，代码将触发一个错误，显示导致异常的 SQL 字符串以及对异常的更详细信息。在生产环境中，我们不想向用户显示所有这些信息，但这是一个帮助我们在开发过程中调试任何问题的好方法。\n\
  \n## 处理管理表单输入并保存条目\n\n创建了`Blog_Entry_Table`类后，我们可以继续开发。逻辑上的下一步是处理从编辑器表单接收的输入，并使用`Blog_Entry_Table`对象将新的博客条目保存到数据库中。让我们更新编辑器控制器。\n\
  \n```php\n<?php\n### newesteditor.php\n\ninclude_once \"models/Blog_Entry_Table.class.php\"\
  ;\n$entryTable = new Blog_Entry_Table($db);\n\nif (isset($_POST['buttonClicked']))\
  \ {\n    $buttonClicked = $_POST['buttonClicked'];\n\n    if ($buttonClicked ===\
  \ 'save') {\n        // 从编辑器表单获取标题和条目数据\n        $title = $_POST['title'];\n   \
  \     $entry = $_POST['entry'];\n        // 保存新条目\n        $entryTable->saveEntry($title,\
  \ $entry);\n    }\n}\n\ninclude_once \"views/admin/insert-editor-html.php\";\n?>\n\
  ```\n\n```php\ninclude_once \"models/Blog_Entry_Table.class.php\";\n$entryTable\
  \ = new Blog_Entry_Table($db);\n```\n\n类被包含进来，数据库连接被传递到构造函数中。\n\n```php\nif ($buttonClicked\
  \ === 'save') {\n    // 从编辑器表单获取标题和条目数据\n    $title = $_POST['title'];\n    $entry\
  \ = $_POST['entry'];\n    // 保存新条目\n    $entryTable->saveEntry($title, $entry);\n\
  }\n```\n\n```\n\n\n如果点击了`save`按钮，则会获取标题和条目内容，并将其传递给`saveEntry`方法以插入到数据库中。\n\n**注意：**\
  \ 以下程序已更新为链接到最新版本。所有代码的改动都很微小。`insertadminWithNavigation.php`前端控制器现在也包含了一条`include_once`语句，用来插入`database.php`程序。（涉及文件：`insert-editor-html.php`、`insert-admin-navigation.php`、`insertadminWithNavigation.php`）\n\
  \n现在，我们可以通过在浏览器中执行`insertadminWithNavigation.php`程序来测试插入过程。然后点击`Editor`菜单项，输入一些测试数据，再点击保存按钮。这些信息将被正确地放入数据库的`blog_entry`表中。表单会自动清除所有数据，这通常向用户表明数据已成功插入。你可以通过\
  \ phpMyAdmin 控制面板浏览`blog_entry`表中的内容。\n\n**练习：** 使用提供的代码或你自己开发的代码，对当前系统进行一次完整的测试。尝试让系统崩溃。输入\
  \ SQL 信息，看看能否攻破该程序。你发现任何弱点了吗？\n\n## 用户视图：获取所有博客条目的数据\n\n现在，我们需要让用户能够查看博客条目。我们将从管理员视角（最终会通过用户\
  \ ID 和密码进行控制）切换到用户视角。因此，我们将为用户创建一个不同的入口（前端控制器），它不需要用户 ID 和密码，还需要一个不同的模型和一个不同的视图。我们可以使用管理员前端控制器的精简版作为用户控制器。\n\
  \n```\nsetTitle(\"PHP/MySQL 博客演示\");\ninclude_once \"models/database.php\";\ninclude_once\
  \ \"controllers/blog.php\";\n$pageData->setContent($info);\ninclude_once \"views/page.php\"\
  ;\necho $page;\n?>\n清单 7-14\nindex.php\n```\n\n如我们所见，当前不需要导航，因为用户只有查看博客条目的权限。使用了相同的`Page_Data`类、`database.php`和`page.php`脚本。由于没有菜单，当前也不需要判断选择了哪个菜单项。当然，控制器和视图已更改为用户版本。\n\
  \n接下来，我们开始处理`blog_entry`类中所需的更改。我们将显示数据库中所有博客条目的列表。我们将显示每个博客条目的`title`（标题）、`entry_text`（条目文本）的前\
  \ 150 个字符，以及一个*Read more*（阅读更多）链接。\n\n首先，我们创建一个新的方法，用于从`blog_entry`表中检索博客条目。\n\n\
  ```\n// 在 Blog_Entry_Table 类内部声明一个新方法\npublic function getAllEntries () {\n$sql\
  \ = \"SELECT entry_id, title,\nSUBSTRING(entry_text, 1, 150) AS intro\nFROM blog_entry\"\
  ;\n$statement = $this->db->prepare( $sql );\ntry {\n$statement->execute();\n} catch\
  \ ( Exception $e ) {\n$exceptionMessage = \"你尝试运行此 SQL：$sql \n异常信息：$e\";\ntrigger_error($exceptionMessage);\n\
  }\nreturn $statement;\n}\n清单 7-15\nNew_Blog_Entry_Table.class.php 的部分代码\n```\n\n\
