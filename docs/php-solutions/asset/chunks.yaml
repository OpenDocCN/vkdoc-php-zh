    on whether daylight saving time is in operation. Amend the code like this:


    `<p class="datetime"><?php $date = new DateTime($item->pubDate);`


    `$date->setTimezone(new DateTimeZone(''America/New_York''));`


    `$offset = $date->getOffset();`


