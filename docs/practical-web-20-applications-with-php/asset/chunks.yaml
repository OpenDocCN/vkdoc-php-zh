    **Event Handling in Prototype**


    One key benefit Prototype offers developers is enhanced DOM event handling. Writing
    code to handle events across different browsers can be difficult, but with Prototype
    these issues can be avoided.


    One difficulty when not using Prototype is that event handlers can easily be overwritten.


    For example, if you have HTML code that includes <body onload="doSomething()">
    and also loads an external JavaScript file containing window.onload = doSomethingElse,
    which function is called? Certainly not both of them!


    Prototype solves this problem by allowing us to add to existing event observers.
    This means that if you observe the same event on the same element twice, both
    event handlers will be triggered when the event occurs.


    **Observing an Event**


    To observe an event with Prototype, use the Event.observe() method. This method
    takes three arguments:


    • The element on which the event is being observed.


    • The event to observe; this is a string containing the event name. The event
    names are the same ones you might already be used to in JavaScript, except they
    don’t begin with on. For instance, to observe the onmouseover event, you would
    specify mouseover as the second argument.


    • The function to execute when the event is triggered.


    Going back to the “body onload” example, rather than using <body onload="doSomething()">,
    you would use the following to correctly observe this event:


    Event.observe(window, ''load'', something);


    This code would appear either in an external JavaScript file or within <script>
    tags in your HTML document.


