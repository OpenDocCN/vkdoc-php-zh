    economic regime, the employer’s legal obligations, the import-export conditions,
    and so on—


    facts that are clarified with the commercial, economic, and personnel departments
    of the company. The analysts build the database and describe the reports and the
    operations that the software must accomplish.


    After the customer reviews and comments upon this assemblage of material, the
    analyti-cal stage ends with the addition of a written annex to the contract with
    all these features and a timeline that is agreed to by the customer. After this,
    any modifications in the database structure, the reports, or software functionality
    are typically handled with additional charges to the customer.


    Next, the design team creates a user-friendly, attractive interface that can be
    presented to the customer and changed to fit the customer’s artistic taste. After
    this phase is completed, the coding stage begins. This shouldn’t take long because
    the programmers know exactly what they need to do. When they finish coding, the
    software is installed on a test platform at the customer site, and the customer
    team simulates using the software for a definite period of time. During the testing
    period, the eventual programming and design bugs are revealed and fixed by the
    programmers. At the end of this phase, the customer should have a software application
    that runs by the agreed specifications and deploys on the production machines.


    That’s the end of the project; the final payments are made, and every modification
    the customer asks for in the future is billed.


    That was a short version of a story about commercial software. Of course, the
    theory doesn’t apply the same for all software projects. For smaller projects,
    such as many e-commerce sites, several, if not all, the tasks can be performed
    by a single person.


    **Considering the Theory Behind Project**


    **Management**


    Many theories exist about how to manage the software development life cycle (SDLC).
    No model can be deemed a silver bullet because choosing an SDLC model depends
    on the particularities of your project. You’ll learn about the most popular project-management
    theories in the following pages.


    **The Waterfall (or Traditional) Method**


    The Waterfall method, also known as the traditional method, is the father of all
    methodologies. Now, it’s considered by many to be a rather outdated development
    technology for software, but it’s still the cornerstone of modern software development.
    It consists of breaking the software project into six or seven phases that must
    be processed in sequential order to deliver the final product. The input of each
    phase consists of the output of the preceding phase (see Figure B-1).


    Establishing the requirements is the first phase and can be divided in two as
    shown in Figure B-1\. First, you must establish the system requirements of the
    project; at the end of this phase, you have a paper describing all the hardware
    needed for implementing, testing, and deploying the application. You also need
    the software platforms your application will be developed and tested on. The first
    two phases must include an opportunity study at the beginning and a feasibility
    study at the end. Basically, the first question is “Do we really need this from


