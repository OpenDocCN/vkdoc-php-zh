  trans: '

    ### 存储文本


    主要文本数据类型之间的区别，归结于单个字段可存储的最大字符数、对尾随空格的处理方式，以及是否可设置默认值。


    -   `CHAR`：固定长度字符串。您必须在“长度/值”字段中指定所需长度。最大允许值为 255。在内部，字符串会用空格右填充至指定长度，但在检索值时，尾随空格会被剥离。您可以定义默认值。

    -   `VARCHAR`：可变长度字符串。您必须指定计划使用的最大字符数（在 phpMyAdmin 中，在“长度/值”字段中输入该数字）。在 MySQL
    5.0 之前，限制为 255。在 MySQL 5.0 中，该限制增加到了 65,535。如果存储的字符串包含尾随空格，则在检索时会保留这些空格。接受默认值。

    -   `TEXT`：存储最多 65,535 个字符（大约比本章节长 50%）的文本。无法定义默认值。


    `TEXT` 很方便，因为您不需要指定最大大小（实际上，您也无法指定）。尽管在 MySQL 5.0 及更高版本中 `VARCHAR` 的最大长度与 `TEXT`
    相同，但其他因素可能会限制实际可存储的数量。


    **提示：** 保持简单：对于较短的文本项使用 `VARCHAR`，对于较长的文本项使用 `TEXT`。


    ### 存储数字


    最常用的数字列类型如下：


    -   `INT`：介于 –2,147,483,648 和 2,147,483,647 之间的任何整数。如果列被声明为 `UNSIGNED`，则范围为 0
    到 4,294,967,295。

    -   `FLOAT`：浮点数。您可以选择指定两个用逗号分隔的数字来限制范围。第一个数字指定最大位数，第二个数字指定小数点后应有多少位。由于 PHP 会在计算后格式化数字，我建议您使用不带可选参数的
    `FLOAT`。

    -   `DECIMAL`：带小数的数字；在小数点后包含固定位数。在定义表时，您需要指定最大位数以及小数点后应有多少位。在 phpMyAdmin 中，在“长度/值”字段中输入用逗号分隔的数字。例如，`6,2`
    允许范围从 –9999.99 到 9999.99 的数字。如果您不指定大小，当值存储在此类型的列中时，小数部分将被截断。


    `FLOAT` 和 `DECIMAL` 的区别在于精度。浮点数被视为近似值，并且容易受到舍入误差的影响（详细解释，请参阅 [`http://dev.mysql.com/doc/refman/5.6/en/problems-with-float.html`](http://dev.mysql.com/doc/refman/5.6/en/problems-with-float.html)）。


    使用 `DECIMAL` 存储货币。然而，需要注意的是，在 MySQL 5.0.3 之前，`DECIMAL` 数据类型是作为字符串存储的，因此无法与 SQL
    函数（如 `SUM()`）一起用于在数据库内部执行计算。如果您使用的远程服务器运行的是较旧版本的 MySQL，请将货币以“分”为单位存储在 `INT` 列中；如果是英镑，则使用“便士”。然后使用
    PHP 将结果除以 100 并按需格式化货币。更好的是，迁移到运行 MySQL 5.0 或更高版本的服务器上。


    **注意：** 不要使用逗号或空格作为千位分隔符。除数字外，数字中只允许使用负号（`-`）和小数点（`.`）。


    ### 存储日期和时间


    MySQL 仅以一种格式存储日期：`YYYY-MM-DD`。这是国际标准化组织（ISO）批准的标准，并避免了不同国家惯例固有的歧义。我将在第 14 章中回到日期这个话题。最重要的日期和时间列类型如下：


    -   `DATE`：以 `YYYY-MM-DD` 格式存储的日期。范围是从 1000-01-01 到 9999-12-31。

    -   `DATETIME`：以 `YYYY-MM-DD HH:MM:SS` 格式显示的日期和时间组合。

    -   `TIMESTAMP`：时间戳（通常由计算机自动生成）。有效值范围从 1970 年初到 2038 年 1 月中旬的某段时间。


    **注意：** MySQL 的时间戳基于人类可读的日期，并且自 MySQL 4.1 起，使用与 `DATETIME` 相同的格式。因此，它们与基于自 1970
    年 1 月 1 日以来经过的秒数的 Unix 和 PHP 时间戳不兼容。请不要混淆它们。


    ### 存储预定义列表


    MySQL 允许您存储两种类型的预定义列表，它们可以被视为数据库中单选按钮和复选框状态的等效物：


    -   `ENUM`：此列类型存储来自预定义列表的单个选择，例如“是、否、不知道”或“男、女”。预定义列表中可以存储的项目最大数量是令人难以置信的 65,535——好一个单选按钮组！

    -   `SET`：此列类型存储来自预定义列表的零个或多个选择。该列表最多可容纳 64 个选择。


    虽然 `ENUM` 非常有用，但 `SET` 往往不那么有用，主要是因为它违反了在每个字段中仅存储一条信息的原则。它可以发挥作用的情况包括：记录汽车的选装配件或调查中的多项选择。


    ### 存储二进制数据


    存储诸如图像之类的二进制数据并不是一个好主意。它会使您的数据库变得臃肿，并且您无法直接从数据库显示图像。但是，以下的列类型是为二进制数据设计的：


    -   `TINYBLOB`：最多 255 字节

    -   `BLOB`：最多 64 KB

    -   `MEDIUMBLOB`：最多 16 MB

    -   `LONGBLOB`：最多 4 GB


    拥有如此异想天开的名字，发现 `BLOB` 代表“二进制大对象”（binary large object）时，难免会有些失望。


    ## 章节回顾


    本章的大部分内容都致力于理论，解释了良好数据库设计的基本原则。您需要仔细规划数据库的结构，将重复信息移到单独的表中，而不是像电子表格那样，将所有要存储的信息放在一个单一的大表中。只要您为表中的每条记录提供一个唯一标识符——即它的主键——您就可以跟踪信息，并通过使用外键将其与其他表中的相关记录关联起来。使用外键的概念一开始可能难以理解，但在本书结束时应该会变得更加清晰。


    您还学习了如何创建具有有限权限的 MySQL 用户账户，以及如何定义表以及如何使用 SQL 文件导入和导出数据。在下一章中，您将使用 PHP 连接到 `phpsols`
    数据库，以显示 `images` 表中存储的数据。

    '
- fmt: '# 11. Connecting to a Database with PHP and SQL


    PHP 提供了三种不同的方式来连接和与 MySQL 数据库交互：原始的 MySQL 扩展、MySQL Improved（`MySQLi`）或 PHP Data
    Objects（`PDO`）。选择哪一种是一个重要的决定，因为它们使用不兼容的代码。你不能在同一个脚本中混用它们。原始的 MySQL 扩展在 PHP 5.5
    中已被弃用，并将在未来某个未指定的日期被移除。本书不涉及它。


    如果你计划只使用 MySQL（或其替代品 `MariaDB`），我推荐你使用 `MySQLi`。它专门为与 MySQL 协作而设计，并且与 `MariaDB`
    完全兼容。


    另一方面，如果数据库的灵活性对你很重要，请选择 `PDO`。`PDO` 的优势在于它是软件中立的。至少在理论上，你可以通过只修改几行 PHP 代码，将你的网站从
    MySQL 切换到 Microsoft SQL Server 或其他数据库系统。在实践中，你通常需要重写至少部分 SQL 查询，因为每个数据库供应商都在标准
    SQL 之上添加了自定义函数。


    本书的其余章节将同时涵盖 `MySQLi` 和 `PDO`。如果你只想专注于其中一种，只需忽略与另一种相关的部分即可。


    尽管 PHP 连接到数据库并存储任何结果，但数据库查询需要用 SQL 编写。本章教你在表中检索存储信息的基础知识。


    在本章中，我们将涵盖以下内容：


    *   使用 `MySQLi` 和 `PDO` 连接到 MySQL 和 MariaDB

    *   计算表中的记录数

    *   使用 `SELECT` 查询检索数据并在网页中显示

    *   使用预处理语句和其他技术保持数据安全


    ## 检查你的远程服务器设置


    XAMPP 和 MAMP 同时支持 `MySQLi` 和 `PDO`，但你需要检查远程服务器的 PHP 配置以验证其提供的支持程度。在你的远程服务器上运行
    `phpinfo()`，滚动配置页面，并查找以下部分。它们是按字母顺序列出的，因此你需要向下滚动很长一段距离才能找到它们。


    ![A978-1-4842-0635-5_11_Figa_HTML.jpg](A978-1-4842-0635-5_11_Figa_HTML.jpg)


    所有托管公司都应该拥有前两个部分（`mysql` 和 `mysqli`）。如果只列出了第一个，那么你的服务器已经危险地过时了。你的主机至少应该列出 `mysqli`。如果你计划使用
    `PDO`，你不仅需要检查 `PDO` 是否已启用，还必须确保列出了 `pdo_mysql`。`PDO` 需要为每种类型的数据库提供不同的驱动程序。


    **厘清困惑**


    PHP 弃用原始 MySQL 扩展的决定，加上对 Oracle 关于 MySQL 计划的不确定性，导致一些人宣称 MySQL 已经死亡。事实并非如此。如前一章所述，MySQL
    在 2014 年底排名第二的数据库。排名第一的数据库是 Oracle。一个拥有前两大数据库的公司不太可能扼杀这样一个成功的产品。即使它这样做了，`MariaDB`
    也是 MySQL 的无缝替代品。


    运行 MariaDB 的大部分代码是相同的，因为 MySQL 是一个开源项目。许多在 MariaDB 上工作的工程师来自最初的 MySQL 团队，因此他们非常有资格维护和开发它。MariaDB
    在保持 MySQL 所有核心功能的同时，已经开始添加新功能。除非你需要 MariaDB 的新功能，否则 MySQL 和 MariaDB 是可互换的。


    PHP 放弃原始 MySQL 扩展的决定完全无关。MySQL Improved（`MySQLi`）于 2004 年在 PHP 5.0 中引入，作为原始 MySQL
    扩展的替代品，但 PHP 5 的缓慢采用使得无法淘汰旧函数。


    尽管本书不使用原始的 MySQL 扩展，但你需要意识到它的存在，并知道如何识别使用它的脚本。原始 MySQL 扩展中的所有函数都以`mysql_`开头。避免使用它们的所有脚本、文章和书籍。它们现在已经完全过时了。


    `MySQLi` 可以用两种方式编写：使用普通函数（过程式代码）或使用对象。在本书中，我使用 `MySQLi` 对象，因为它们涉及更少的输入。然而，如果你遇到使用
    `MySQLi` 函数的其他来源，你可以识别它们，因为它们以`mysqli_`开头。但是，请注意：它们中的大多数都有对应的`mysql_`版本。例如，`mysql_connect()`和`mysqli_connect()`，`mysql_query()`和`mysqli_query()`，等等。乍一看，它们很容易混淆。名称上唯一的区别是在下划线前多了字母“i”。尽管它们相似，但从旧函数转换到新函数并不仅仅是插入那个“i”的问题。函数接受的参数通常略有不同。


    最后，如果你担心 MySQL 的未来，简单的答案是学习如何使用 `PDO`。有超过 10 个主要数据库的 `PDO` 驱动程序。你可能需要对 SQL 进行一些更改以使其适用于不同的数据库，但本书中教授的所有
    PHP 代码都将完全相同。


    ## PHP 如何与数据库通信


    无论你使用 `MySQLi` 还是 `PDO`，过程总是遵循以下顺序：


    1.  使用主机名、用户名、密码和数据库名称连接到数据库。

    2.  准备一个 SQL 查询。

    3.  执行查询并保存结果。

    4.  从结果中提取数据（通常使用循环）。


    用户名和密码是你刚刚创建的账户或托管公司提供给你的账户的用户名和密码。但是主机名呢？在本地测试环境中，它是`localhost`。令人惊讶的是，即使在远程服务器上，它通常也是`localhost`。这是因为在许多情况下，数据库服务器位于与你网站相同的服务器上。换句话说，显示页面的
    Web 服务器和数据库服务器是彼此本地的。然而，如果数据库服务器位于单独的机器上，你的托管公司会告诉你使用的地址。需要理解的重要一点是，主机名与你的网站域名不同。


    让我们快速看一下如何通过每种方法连接到数据库。


    ### 使用 MySQL Improved 扩展连接


    `MySQLi` 有两个接口：过程式和面向对象式。过程式接口旨在简化从原始 MySQL 函数的过渡。由于面向对象版本更紧凑，这里采用该版本。


    要连接到 MySQL 或 MariaDB，你通过向构造函数方法传递四个参数来创建一个`mysqli`对象：主机名、用户名、密码和数据库名称。以下是你如何连接到`phpsols`数据库的方法：


    ```

    $conn = new mysqli($hostname, $username, $password, ''phpsols'');

    ```


    这将连接对象存储为`$conn`。


    如果你的数据库服务器使用非标准端口，你需要将端口号作为第五个参数传递给`mysqli`构造函数。


    提示


    MAMP 使用套接字连接到 MySQL，因此即使 MySQL 在端口 8889 上监听，也无需添加端口号。这同时适用于 `MySQLi` 和 `PDO`。'
  raw: '# 11. Connecting to a Database with PHP and SQL


    PHP offers three different ways to connect to and interact with a MySQL database:
    the original MySQL extension, MySQL Improved (MySQLi), or PHP Data Objects (PDO).
    Which one you choose is an important decision, because they use incompatible code.
    You can’t mix them in the same script. The original MySQL extension was deprecated
    in PHP 5.5 and will be removed at some unspecified date in the future. It’s not
    covered in this book.


    If you plan to use only MySQL (or its drop-in replacement, MariaDB), I recommend
    that you use MySQLi. It’s designed specifically to work with MySQL and is fully
    compatible with MariaDB.


    On the other hand, if database flexibility is important to you, choose PDO. The
    advantage of PDO is that it’s software-neutral. In theory, at least, you can switch
    your website from MySQL to Microsoft SQL Server or a different database system
    by changing only a couple of lines of PHP code. In practice, you normally need
    to rewrite at least some of your SQL queries because each database vendor adds
    custom functions on top of the standard SQL.


    The remaining chapters of this book cover both MySQLi and PDO. If you want to
    concentrate on only one of them, just ignore the sections that relate to the other.


    Although PHP connects to the database and stores any results, the database queries
    need to be written in SQL. This chapter teaches you the basics of retrieving information
    stored in a table.


    In this chapter, we’ll cover the following:


    *   Connecting to MySQL and MariaDB with MySQLi and PDO

    *   Counting the number of records in a table

    *   Using `SELECT` queries to retrieve data and display it in a webpage

    *   Keeping data secure with prepared statements and other techniques


    ## Checking Your Remote Server Setup


    XAMPP and MAMP support both MySQLi and PDO, but you need to check the PHP configuration
    of your remote server to verify the degree of support it offers. Run `phpinfo()`
    on your remote server, scroll down the configuration page, and look for the following
    sections. They’re listed alphabetically, so you’ll need to scroll down a long
    way to find them.


    ![A978-1-4842-0635-5_11_Figa_HTML.jpg](A978-1-4842-0635-5_11_Figa_HTML.jpg)


    All hosting companies should have the first two sections (mysql and mysqli). If
    only the first one is listed, you’re on a server that’s dangerously out of date.
    Your host should have at least mysqli listed. If you plan to use PDO, you not
    only need to check that PDO is enabled, but you must also make sure that pdo_mysql
    is listed. PDO requires a different driver for each type of database.


    CUTTING THROUGH THE CONFUSION


    PHP’s decision to deprecate the original MySQL extension along with uncertainty
    about Oracle’s plans for MySQL have led some people to declare that MySQL is dead.
    It’s not. As mentioned in the previous chapter, MySQL ranked as the number two
    database in late 2014\. The number one database was Oracle. A company that owns
    the top two databases is hardly likely to kill such a successful product. Even
    if it does, MariaDB is a seamless replacement for MySQL.


    Most of the code that runs MariaDB is identical because MySQL is an open source
    project. Many of the engineers working on MariaDB came from the original MySQL
    team, so they’re eminently qualified to maintain and develop it. MariaDB has started
    adding new features while maintaining all of MySQL’s core functionality. Unless
    you need MariaDB’s new features, MySQL and MariaDB are interchangeable.


    PHP’s decision to drop the original MySQL extension is completely unrelated. MySQL
    Improved (MySQLi) was introduced in PHP 5.0 in 2004 as a replacement for the original
    MySQL extension, but the slow adoption of PHP 5 made it impossible to phase out
    the old functions.


    Although this book doesn’t use the original MySQL extension, you need to be aware
    of its existence and know how to identify scripts that use it. All functions in
    the original MySQL extension begin with `mysql_`. Avoid all scripts, articles,
    and books that use them. They’re now hopelessly out of date.


    MySQLi can be written two ways: using ordinary functions (procedural code) or
    using objects. In this book, I use MySQLi objects because they involve less typing.
    However, if you come across other sources that use MySQLi functions, you can recognize
    them because they begin with `mysqli_`. However, beware: most of them have `mysql_`
    equivalents. For example, `mysql_connect()` and `mysqli_connect()`, `mysql_query()`
    and `mysqli_query()`, and so on. At first glance, they’re easy to mix up. The
    only difference in name is the letter “i” before the underscore. In spite of their
    similarity, conversion from the old function to the new one isn’t simply a question
    of inserting that “i.” The arguments taken by the functions are usually slightly
    different.


    Finally, if you’re concerned about the future of MySQL, the simple answer is to
    learn how to use PDO. There are PDO drivers for more than 10 major databases.
    You might need to make some changes to the SQL so as to work with a different
    database, but all the PHP code taught in this book will be exactly the same.


    ## How PHP Communicates with a Database


    Regardless of whether you use MySQLi or PDO, the process always follows this sequence:


    Connect to the database using the hostname, username, password, and database name.
      Prepare an SQL query.   Execute the query and save the result.   Extract the
    data from the result (usually with a loop).  


    Username and password are the usernames and passwords of the accounts you have
    just created or of the account given to you by your hosting company. But what
    about hostname? In a local testing environment it’s `localhost`. What comes as
    a surprise is that it’s often `localhost` even on a remote server. This is because
    in many cases the database server is located on the same server as your website.
    In other words, the web server that displays your pages and the database server
    are local to each other. However, if the database server is on a separate machine,
    your hosting company will tell you the address to use. The important thing to
    understand is that the hostname is not the same as your website’s domain name.


    Let’s take a quick look at how you connect to a database with each of the methods.


    ### Connecting with the MySQL Improved extension


    MySQLi has two interfaces: procedural and object-oriented. The procedural interface
    is designed to ease the transition from the original MySQL functions. Since the
    object-oriented version is more compact, that’s the version adopted here.


    To connect to MySQL or MariaDB, you create a `mysqli` object by passing four arguments
    to the constructor method: the hostname, username, password, and name of the database.
    This is how you connect to the `phpsols` database:


    `$conn = new mysqli($hostname, $username, $password, ''phpsols'');`


    This stores the connection object as `$conn`.


    If your database server uses a nonstandard port, you need to pass the port number
    as a fifth argument to the `mysqli` constructor.


    Tip


    MAMP uses a socket connection to MySQL, so there’s no need to add the port number
    even if MySQL is listening on port 8889\. This applies to both MySQLi and PDO.'
