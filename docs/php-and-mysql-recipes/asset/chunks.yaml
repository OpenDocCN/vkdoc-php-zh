    object is created without any class definitions. This happens because the JSON
    response returns an object and not an array.


    In the JSON there is no unit on the temperature value. It is assumed that it always
    returns the temperature in Kelvin, so there is no need to have special check for
    that. The calculation of the temperature value in Celsius and Fahrenheit stays
    the same.


    The elements for the name of the city and for the wind’s speed, etc., are also
    structured slightly different but the concept is similar. The code to process
    the response looks like this:


    <?php


    // 15_4.php


    $json = file_get_contents(''http://api.openweathermap.org/data/2.5/weather?q=Los%20


    Angeles,usxxx&appid=<API KEY>'');


    $weather = json_decode($json);


    echo "City: {$weather->name}\n";


    $k = $weather->main->temp;


    $c = $k - 273.15;


