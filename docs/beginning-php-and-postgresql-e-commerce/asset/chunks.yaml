    ## Installing PHP 5


    Every time you want to get a new PHP library working on Linux, you need to recompile
    the PHP module. That’s why it’s recommended to make a “good” compilation, with
    all the needed libraries, from the start.


    Go to `http://www.php.net/downloads.php`, get the complete source code archive
    of PHP 5.x, and extract the contents in a directory.


    Before compiling PHP and making Apache aware of it (by updating Apache’s configuration
    file `httpd.conf`), you need to install the extra modules you’ll need to work
    under PHP.


    Let’s deal with them one by one.


    ### mhash


    The mhash library provides a uniform interface to a large number of hashing algorithms.
    You used it to hash customers’ passwords in Chapter 11. Refer to that chapter
    to learn more about hashing.


    Download mhash from `http://mhash.sourceforge.net/`, unpack it (using `tar -zxvf`),
    and install it by executing the following commands:


    ```

    ./configure

    ./make

    ./make install

    ```


    Alternatively, if you use Red Hat, you can download the RPMs from `http://www.ottolander.nl/opensource/mhash/libmhash.html`
    and install them. We installed both `libmhash-0.8.18-2a.i386.rpm` and `libmhash-devel-0.8.18-2a.i386.rpm`
    RPMs.


    ### mcrypt


    This library allows you to use a wide range of encryption functions. You’ll need
    it to encrypt highly sensitive information such as credit card details as discussed
    in Chapter 11. (Refer to Chapter 11 for more details about this.)


    Download mcrypt from `http://mcrypt.sourceforge.net/`, unpack it (using `tar -zxvf`),
    and install it by executing the following commands:


    ```

    ./configure

    ./make

    ./make install

    ```


    Alternatively, you can find the RPMs for Red Hat at `http://www.ottolander.nl/opensource/mcrypt/mcrypt.html`.
    We installed both `libmcrypt-2.5.7-1a.i386.rpm` and `libmcrypt-devel-2.5.7-1a.i386.rpm`
    RPMs.


    Alternatively, you can use the source code from `http://mcrypt.sourceforge.net`.


    ### CURL (Client URL Library) Functions


    You’ll use libcurl, a library that allows you to connect and communicate to many
    different types of servers with many different types of protocols. You need it
    to communicate through SSL with the payment gateways in Chapter 14. You can take
    a fresh version of the curl library from `http://curl.haxx.se/download.html`,
    but you can also use `http://www.rpmfind.net` to find the RPM packages for your
    system.


    ### libxml2


    PHP 5 requires a libxml2 library version 2.5.10 or greater. If your Unix or Linux
    system doesn’t have a recent enough version, go get fresh RPMs of `libxml2` and
    `libxml2-devel` from `http://xmlsoft.org/` and install them.


    You can check for your libxml2 library with the following command: `rpm -qa |
    grep libxml2`.


    ## Compiling and Installing PHP 5


    To compile and install PHP 5, follow these steps:


    1.  Go to the folder where you extracted the PHP source and execute the following
    commands:


    ```

    ./configure --with-config-file-path=/etc

    --with-pdo-pgsql=/usr/local/pgsql/bin/pg_config

    --with-apxs2=/usr/local/apache2/bin/apsx2

    --with-mcrypt --with-mhash

    --with-openssl-dir --with-curl --with-zlib

    --with-pdo --enable-soap

    make

    make install

    ```


    2.  Copy `php.ini-recommended` to `/etc/php.ini` by executing the following command:
    `cp php.ini-recommended /etc/php.ini`.


    3.  In `httpd.conf`, find the portion with many `LoadModule` entries, and add
    the following lines (the names may vary depending on your specific Apache and
    PHP versions):


    ```

    LoadModule php5_module modules/libphp5.so

    ```'
