    \n现在，你应该能够上传纯文本文件的内容，并使其在“Add”操作中立即可用，而无需重新加载页面。得益于 jQuery 及其 Form 插件，你可以通过 Ajax\
    \ 实现这一点。不幸的是，Ajax 辅助函数尚不支持 jQuery 函数或文件上传，因此你必须在`onClick`属性中提供 JavaScript 函数来实现此功能。\n\
    \n## 更多 Ajax 功能\n\nAjax 的世界在不断扩展。一些开源项目已经将以前昂贵或复杂的库提供给了大众。随着 Ajax 方法的不断改进，你可以放心，Cake\
    \ 的架构将始终对 Ajax 保持开放，并允许将这些方法引入你的 Cake 应用程序中。将`onClick`和其他 DOM 事件硬编码到代码中，无疑扩展了\
    \ Cake 应用程序的能力，但通过练习使用其他 Ajax 辅助函数，你可以用 Cake 处理大多数常见的 Ajax 流程。\n\n## 总结\n\n在本章中，我们讨论了\
    \ Cake 如何通过其内置的 Ajax 辅助函数简化 Ajax 方法。\n"
- fmt: '# Helpers


    In the previous chapters, you capitalized on some of Cake’s built-in helpers to
    dramatically improve and speed up the development of some typical web application
    processes. Using the Ajax helper, you added some flare to the process of submitting
    and voting on the blog’s comments. The Form helper facilitated data handling and
    form submissions, and the HTML helper condensed the amount of markup you wrote
    by hand in the views and managed the links throughout the site to prevent any
    breaks. In this chapter, you will explore built-in helper functions in depth and
    even build a couple of your own. First, I’ll briefly discuss installing helpers.


    ## Installing Helpers


    You have already used some built-in helpers and made them available to the application
    by entering their names in the `var $helpers` array in the controller or App controller.
    When installing third-party helpers or creating your own, you must take the following
    steps to ensure the helpers work properly:


    1. Every helper file should go in the `app/views/helpers` directory.

    2. Include the helper’s class name in the `var $helpers` array in either the App
    controller or in a specific controller in whose views the helper may be called.

    3. When using the helper in the view, make sure you call the helper’s class object
    correctly (that is, use the `$ajax` variable to call the Ajax helper object).
    Don’t create local variables in the view that might conflict with available helper
    objects.


    In Chapter 8, you created the App controller file to make some helpers available
    to the whole application. This is generally good practice when most of the controllers
    in the application use a set of helpers because it allows you to use one string
    of code in one location rather than spelling out the helper includes in various
    places. You may ask, why not include all the built-in helpers in the App controller
    by default rather than having to go through this extra step? The answer is that,
    by so doing, you compromise the load time of the application. It’s better to use
    the App controller to specify helpers that all or most controllers use most often,
    rather than include them all at the outset and bog down the application.


    If, for example, only one controller in the application uses the Time helper,
    then it’s best to include this helper in that controller alone. Helpers such as
    HTML, Form, and Ajax are best called in the App controller because of their common
    use throughout the application. When a helper is called in the App controller,
    the helper object will be created and loaded into the server memory for each action
    the application performs. That can add up quickly if too many helpers are called
    for the whole site.


    Because PHP code is parsed and compiled each time it is accessed, anything you
    can do to reduce the amount of code will help site performance. Using code only
    where it is needed will also help you when troubleshooting. Including too many
    helpers in the App controller increases server load and may necessitate adjusting
    PHP settings or using a runtime accelerator with PHP.


    ## Using Cake’s Built-in Helpers


    One of the most attractive qualities of Cake is its collection of helpers. Tasks
    such as rendering RSS feeds, managing form submissions, truncating and highlighting
    text, and performing Ajax methods are all simplified by helpers. Cake provides
    a large assortment of web-specific functions that can save you hours of headaches;
    knowing what is available in Cake’s built-in helpers is key to building advanced
    Cake applications.


    > **Note** Rather than inundate the chapter with long explanatory tables, I’ve
    opted for a more “dictionary” approach to explaining the helpers and their functions.
    Each function will have its own set of parameters that are called by populating
    the parameter in the view. Each parameter is separated from the previous one by
    a comma and includes in brackets the type of data specified in the parameter.
    Beneath each description, I include each parameter’s default value. Leaving the
    parameter blank, or entering `null` in its place, means that the default value
    for that parameter will be used when the function is executed.


    ### Explain Every Helper Function?


    This chapter could get very boring very fast. Listing all the possible helper
    functions would make for a very long list indeed and would turn this chapter,
    more or less, into API documentation. (If API documentation is what you want,
    then by all means check out Cake’s online API [at `http://api.cakephp.org`](http://api.cakephp.org).
    It’s kept up-to-date and contains resource links to the source code itself for
    each function.) I will explain the functions in detail rather than reprinting
    the API documentation. The fact remains that some helpers are used so frequently
    that, for most developers, leaving out a detailed survey of Cake’s built-in helper
    functions would hinder your progress in really using what Cake has to offer. Therefore,
    I will only highlight the HTML and Form helpers in detail, since these are fundamentally
    necessary for anything to happen in even the most basic Cake application.


    Don’t be afraid to try these functions on your own; most of the time, they’re
    rather straightforward, and since they don’t manipulate your database, you can’t
    inflict any permanent damage on your application. Usually the more helpers you
    use, the more time you save, so it’s worth practicing. A common pitfall for inexperienced
    Cake developers is to be unaware of helper functions so they resort to building
    their own processes or custom helpers to perform tasks that have already been
    standardized in a helper function. (I have certainly been guilty of this—I once
    wrote an entire console script to automate building views before I realized that
    Cake already came with Bake!)


    Let’s move on to the HTML and Form helpers. You should already be acquainted with
    them since you have used them previously; but they do offer more features than
    those mentioned so far.


    ### Working with the HTML Helper'
