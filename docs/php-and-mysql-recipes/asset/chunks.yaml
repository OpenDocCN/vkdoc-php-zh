  raw: 'Note that the array fruit is defined twice because the sort() function will
    replace the keys with numerical keys. The sorting of the array will cause the
    items to be sorted by inventory count, but by using the sort() function we lose
    the keys so we no longer know what each item is. In the second half of the example
    we use asort() that keeps the keys and we can still tell what the items are.


    Array


    (


    [0] => 2


    [1] => 3


    [2] => 5


    [3] => 10


    [4] => 15


    )


    Array


    (


    [kiwi] => 2


    [apple] => 3


    [banana] => 5


    [pear] => 10


    [orange] => 15


    )


    If instead of getting the items sorted by inventory count we wanted to get them
    in alphabetical order we can sort by the keys by the use of the ksort() function.


    <?php


    // 4_20.php


    $fruit = array(''pear'' => 10, ''apple'' => 3, ''orange'' => 15, ''banana'' =>
    5, ''kiwi'' => 2); ksort($fruit);


    print_r($fruit);


    CHAPTER 4 ■ WORKING WITH ARRAYS


    And the elements would appear like this:


    Array


    (


    [apple] => 3


    [banana] => 5


    [kiwi] => 2


    [orange] => 15


    [pear] => 10


    )


    So far the sorting has worked on simple arrays. If we return to the example of
    retrieving data from a database where we get rows and columns and try to sort
    the resulting array directly, we would get a result that is based on comparing
    arrays. This is done by comparing all the elements of each of the arrays to determine
    which one is “bigger” and then using that to set the order of the elements.


    <?php


    // 4_21.php


    $con = mysqli_connect("127.0.0.1", "root", "Wbp2Theworld", "book"); $rs = mysqli_query($con,
    "select * from person");


    if ($rs) {


    $persons = array();


    while($row = mysqli_fetch_assoc($rs)) {


    $persons[] = $row;


    }


    mysqli_free_result($rs);


    }


    mysqli_close($con);


    sort($persons);


    print_r($persons);


    In this example we have added a call to the sort() function to the code from example
    4_9.php and instead of the records showing up in the order of John, Paul, Ringo,
    and George they will now show up in alphabetically order based on the first element
    of each record.


    Array


    (


    [0] => Array


    (


    [first_name] => George


    [last_name] => Harrison


    [date_of_birth] => -847324800


    )


    CHAPTER 4 ■ WORKING WITH ARRAYS


    [1] => Array


    (


    [first_name] => John


    [last_name] => Lenon


    [date_of_birth] => -922406400


    )


    [2] => Array


    (


    [first_name] => Paul


    [last_name] => McCartney


    [date_of_birth] => -869097600


    )


    [3] => Array


    (


    [first_name] => Ringo


    [last_name] => Star


    [date_of_birth] => -930528000


    )


    )


    If we wanted this example to sort by the last name column we could change the
    order of the columns in the query.


    <?php


    // 4_22.php


    $con = mysqli_connect("127.0.0.1", "root", "Wbp2Theworld", "book"); $rs = mysqli_query($con,
    "select last_name, first_name, date_of_birth from person"); if ($rs) {


    $persons = array();


    while($row = mysqli_fetch_assoc($rs)) {


    $persons[] = $row;


    }


    mysqli_free_result($rs);


    }


    mysqli_close($con);


    sort($persons);


    print_r($persons);


    In this case the order of the columns has changed so when the sort() function
    is called the comparison will start with the last name column and thus produce
    the following result.


    CHAPTER 4 ■ WORKING WITH ARRAYS


    Array


    (


    [0] => Array


    (


    [last_name] => Harrison


    [first_name] => George


    [date_of_birth] => -847324800


    )


    [1] => Array


    (


    [last_name] => Lenon


    [first_name] => John


    [date_of_birth] => -922406400


    )


    [2] => Array


    (


    [last_name] => McCartney


    [first_name] => Paul


    [date_of_birth] => -869097600


    )


    [3] => Array


    (


    [last_name] => Star


    [first_name] => Ringo


    [date_of_birth] => -930528000


    )


    )


    The sort() function has an optional second parameter called sort_flags. This parameter
    is used to define how the sorting is done. The default value is SORT_REGULAR and
    it will use the standard PHP


    compare functions to determine is one value is greater or less than another value.
    There are four other flags that can be used:


    • SORT_NUMERIC will convert the values to numbers. This is useful if the values
    are numerical strings.


    • SORT_STRING will convert the values to strings before comparing.


    CHAPTER 4 ■ WORKING WITH ARRAYS


    • SORT_LOCALE_STRING will convert to strings but use the locale setting on the
    system to sort.


    • SORT_NATURAL will use the string comparison method but numerical strings.'
