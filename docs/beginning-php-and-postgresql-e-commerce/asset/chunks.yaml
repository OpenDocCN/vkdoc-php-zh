    The catalog_remove_product_from_category function verifies how many categories
    the product exists in. If the product exists in more than one category, then it
    just removes the product from the specified category (ID received as a parameter).
    If the product is associated with a single category, it is removed completely
    from the database.


    **5.** Use the query tool to execute this code, which creates the catalog_get_categories
    function in your hatshop database:


    -- Create catalog_get_categories function


    CREATE FUNCTION catalog_get_categories()


    RETURNS SETOF department_category LANGUAGE plpgsql AS $$


    DECLARE


