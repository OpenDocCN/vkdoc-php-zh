- fmt: "`\"first\" = > RequestMethods::post(\"first\"),`\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n# CHAPTER 16 ■ SETTingS\n\n`\"last\" = > RequestMethods::post(\"last\"),`\n\n\
    `\"email\" = > RequestMethods::post(\"email\"),`\n\n`\"password\" = > RequestMethods::post(\"\
    password\")`\n\n));\n\n```\nif ($user- > validate())\n{\n    $user- >save();\n\
    \    $view- >set(\"success\", true);\n}\n$view- > set(\"errors\", $user- >getErrors());\n\
    }\n```\n\nThere are two main differences in this new `register()` action. The\
    \ first is that we have removed the validation code from each of the form fields.\
    \ This is now handled by the new Model validation logic. Furthermore, we can do\
    \ all sorts of validation, instead of the simple (required) validation conditions\
    \ we had before.\n\nThe second big change is that we first check the results of\
    \ the `validate()` method before we save the `$user` row. Where before, we only\
    \ created the new `User` instance after all our data was correct, we now do it\
    \ before checking the data. As long as we don’t save incorrect data, this difference\
    \ doesn’t matter much.\n\nOur `register()` action is significantly shorter than\
    \ the previous iteration. Future actions (which concern saving data to a database)\
    \ should also be significantly shorter with this new validation code.\n\n## Validate\
    \ As Required\n\nYou might be wondering why we didn’t change our `login()` action.\
    \ The `login()` action actually remains completely unmodified for two reasons:\n\
    \n- It gives more information than the user needs at login. They don’t need to\
    \ know what constitutes good first/last name data, or how many characters a password\
    \ should be; they just need to know if their credentials allowed them to log in\
    \ (or not).\n- The new validation requires us to create a `User` instance before\
    \ validating. This is the opposite of how the login should work. We want to return\
    \ a user row if the credentials were valid, not the other way around.\n\nIt is\
    \ important that we use this new validation at the right time. Adding it to the\
    \ `login()` action is not ideal (for these reasons), and working around them will\
    \ only further complicate our `login()` action.\n\n## Settings\n\nIn the previous\
    \ chapter, we refactored the controller to automatically load the user session,\
    \ and modified the navigation by adding a link to the settings page we were expecting\
    \ to create. Now, we need to create a view for the settings page. It will resemble\
    \ the registration page, since we want to be able to edit all of those fields.\
    \ Take a look at Listing 16-7 to see how we accomplish this.\n\n***Listing 16-7.***\
    \ `application/views/users/settings.html`\n\n```\n<h1>Settings</h1>\n{if isset($success)}\n\
    \    Your account has been updated!\n{/if}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nCHAPTER 16 ■ SETTingS\n\n```\n{else}\n<form method=\"post\">\n    <ol>\n   \
    \     <li>\n            <label>\n                First name:\n               \
    \ <input type=\"text\" name=\"first\" value=\"{echo $user- > first}\" />\n   \
    \         </label>\n        </li>\n        <li>\n            <label>\n       \
    \         Last name:\n                <input type=\"text\" name=\"last\" value=\"\
    {echo $user- > last}\" />\n            </label>\n        </li>\n        <li>\n\
    \            <label>\n                Email:\n                <input type=\"text\"\
    \ name=\"email\" value=\"{echo $user- > email}\" />\n            </label>\n  \
    \      </li>\n        <li>\n            <label>\n                Password:\n \
    \               <input type=\"password\" name=\"password\" value=\"{echo $user-\
    \ > password}\" />\n            </label>\n        </li>\n        <li>\n      \
    \      <input type=\"submit\" name=\"update\" value=\"update\" />\n        </li>\n\
    \    </ol>\n</form>\n{/else}\n```\n\nThe only important deviation here is that\
    \ we are populating all of the fields with their respective data, stored in the\
    \ session user object.\n\n> **Note:** it is better not to show the password in\
